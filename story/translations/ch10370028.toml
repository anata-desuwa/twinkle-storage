[[dialogue]]
speaker = "unk"
original = "ハロウィン当日、恋人のサランと一緒にデートに出かけていたのだが……"
translation = "할로윈 당일, 연인인 사랑과 함께 데이트를 나갔는데……"

[[dialogue]]
speaker = "unk"
original = "食べ歩きで美味しい物を沢山食べたサランは、美食酔い状態になったようで――"
translation = "길거리 음식을 잔뜩 먹은 사랑은 미식 취기 상태가 된 모양이라――"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ん～♪\u3000気分ふわふわ～♪\u3000会長ちゃ～ん<emoji=heart04>\u3000サラン、今日はまだ帰りたくないなぁ～い<emoji=heart04>」"
translation = "「음~♪ 기분 둥실둥실해~♪ 회장 차~앙<emoji=heart04> 사랑, 오늘은 아직 집에 가기 싫어어~<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「だって～、こんなにふわふわした気分なのに、会長ちゃんと離れちゃうの寂しいも～ん」"
translation = "「그치만~, 이렇게 둥실둥실한 기분인데, 회장 창이랑 떨어지는 거 외로운 거어~ㄹ」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「サラン、このままお家で会長ちゃんとイチャイチャした～い<emoji=heart04>」"
translation = "「사랑, 이대로 집에서 회장 창이랑 꽁냥꽁냥하고 싶어어~<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ねぇ、ダメぇ……？」"
translation = "「있지, 안 돼……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（う、腕にサランのふわふわな胸が当たって……！）"
translation = "（으, 팔에 사랑의 말랑말랑한 가슴이 닿아서……！）"

[[dialogue]]
speaker = "unk"
original = "ハロウィンの夜で盛り上がった気分の中、年頃の男子がその誘惑に抗えるわけもなく――"
translation = "할로윈 밤으로 달아오른 기분 속에서, 한창때의 남자가 그 유혹을 뿌리칠 수 있을 리도 만무하고――"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「サラン、出すぞ……！」"
translation = "「사랑, 싼다……!」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「あんっ<emoji=heart04>\u3000会長ちゃん、きてぇ<emoji=heart04>\u3000サランのおま○こに、精液いっぱい飲ませてぇっ<emoji=heart04>」"
translation = "「앙<emoji=heart04> 회장 창, 와줘어<emoji=heart04> 사랑의 보지에, 정액 잔뜩 먹여줘어<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ふあああぁぁぁっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000イックぅぅぅーーーーーーっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후아아아아아<emoji=heart04><emoji=heart04><emoji=heart04> 가버려어어어어어어——————<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「はぁ……<emoji=heart04>\u3000はぁ……<emoji=heart04>」"
translation = "「하아……<emoji=heart04> 하아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ん……<emoji=heart04>\u3000ふわぁ～……<emoji=heart04>\u3000激しいエッチ、しちゃったねぇ……<emoji=heart04>\u3000気持ちよかったぁ～<emoji=heart04>」"
translation = "「응……<emoji=heart04> 후아아~……<emoji=heart04> 격렬한 섹스, 해버렸네에……<emoji=heart04> 기분 좋았어어~<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「また、この場所でしちゃったな……」"
translation = "「또, 이 장소에서 해버렸네……」"

[[dialogue]]
speaker = "unk"
original = "ここは高級マンションの一室。サランがお菓子作りに集中できる場所として、両親が買ってくれたというプライベートハウスだ。"
translation = "이곳은 고급 맨션의 한 호실. 사랑이 과자 만들기에 집중할 수 있는 장소로서, 부모님이 사주셨다는 프라이빗 하우스다."

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「そうだね～。お父さんもお母さんも、使うのはいいけど、学園生活に支障が出ないように気をつけなさいって言ってたよ～」"
translation = "「그렇네~. 아빠도 엄마도, 사용하는 건 좋지만, 학원 생활에 지장이 생기지 않도록 조심하라고 하셨어~」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そっか……って、え！？\u3000ご両親にバレてない、それ！？」"
translation = "「그렇구나…… 어, 에!? 부모님한테 들킨 거 아냐, 그거!?」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ぽよ？\u3000うん♪\u3000サランが会長ちゃんとラブラブだけど、２人きりでイチャイチャする場所がなかなかないんだ～って話を前にしたら」"
translation = "「뽀요? 응♪ 사랑이 회장 창이랑 러브러브인데, 둘이서 꽁냥꽁냥할 장소가 좀처럼 없네~라고 전에 이야기했더니」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ここを使えばいいよって、提案してくれたんだよ～♪」"
translation = "「여기를 쓰면 된다고, 제안해 줬거든~♪」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「エッチ事情、サランの家族に筒抜けだった……！\u3000めちゃくちゃ恥ずかしい……」"
translation = "「엣지 사정, 사란의 가족에게 전부 새어 나가고 있었어……! 엄청나게 창피해……」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「それよりも～♪」"
translation = "「그것보다~♪」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「会長ちゃん、今日もいっぱい出たね～<emoji=heart04>\u3000――ちゅっ<emoji=heart04>」"
translation = "「회장짱, 오늘도 잔뜩 나왔네~<emoji=heart04> ――쪽<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「あっ、チューしたら、ぴくって反応したよ～？\u3000おち○ちん、可愛い～<emoji=heart04>」"
translation = "「앗, 뽀뽀하니까, 움찔하고 반응했어~? 자지, 귀여워~<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「いつも通り、サランがお掃除してあげるね……<emoji=heart04>\u3000はあぁ<emoji=heart04>\u3000会長ちゃんのおち○ちん、精液まみれでエッチぃ……<emoji=heart04>」"
translation = "「평소처럼, 사란이 청소해 줄게……<emoji=heart04> 하아아<emoji=heart04> 회장짱의 자지, 정액투성이라 야해……<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「んっ……<emoji=heart04>\u3000ちゅっ<emoji=heart04>\u3000れろっ……んちゅっ<emoji=heart04>\u3000ちゅぱっ……れろちゅっ<emoji=heart04>」"
translation = "「응……<emoji=heart04> 쪽<emoji=heart04> 레로…… 응츄<emoji=heart04> 츄릅…… 레로츄<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「んふぅ……<emoji=heart04>\u3000精液と愛液混ざってて、すごいエッチな匂いするぅ……<emoji=heart04>\u3000サランこれだけで、頭ふわふわしてきちゃう……<emoji=heart04>\u3000すうぅ……はあぁ<emoji=heart04>」"
translation = "「응후……<emoji=heart04> 정액이랑 애액이 섞여서, 엄청 야한 냄새 나아……<emoji=heart04> 사란 이것만으로도, 머리가 몽롱해져 버려……<emoji=heart04> 스으으…… 하아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「それに味もぉ……<emoji=heart04>\u3000れろっ……ちゅっ……ごくっ<emoji=heart04>\u3000んはあぁ……<emoji=heart04>\u3000新鮮で濃厚な、エッチの味ぃ……<emoji=heart04>\u3000ちゅぱっ……んくっ……<emoji=heart04>\u3000\u3000れろちゅっ……んむっ<emoji=heart04>」"
translation = "「게다가 맛도오……<emoji=heart04> 레로…… 쪽…… 꿀꺽<emoji=heart04> 응하아……<emoji=heart04> 신선하고 농후한, 엣지한 맛……<emoji=heart04> 츄릅…… 응긋……<emoji=heart04> 레로츄…… 응무<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ん～？\u3000うんっ……<emoji=heart04>\u3000サラン、会長ちゃんの精液大好きぃ……<emoji=heart04>」"
translation = "「응~? 으응……<emoji=heart04> 사란, 회장짱의 정액 너무 좋아아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「会長ちゃんが食べた物で、味が変わるのも好きだし～。れろっ……ごくっ<emoji=heart04>\u3000んはぁ……<emoji=heart04>」"
translation = "「회장짱이 먹은 거에 따라, 맛이 변하는 것도 좋고~. 레로…… 꿀꺽<emoji=heart04> 응하아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「大好きな会長ちゃんが、サランで気持ち良くなってくれた証だって思うと……ちゅぱっ<emoji=heart04>\u3000れろっ……体の中が熱くなって、ふわふわしちゃうの～<emoji=heart04>\u3000んふぅ<emoji=heart04>」"
translation = "「좋아하는 회장짱이, 사란 덕분에 기분 좋아졌다는 증거라고 생각하면…… 츄릅<emoji=heart04> 레로…… 몸속이 뜨거워져서, 몽롱해져 버려~<emoji=heart04> 응후<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「れるっ……<emoji=heart04>\u3000癖になって、止まらなくなっちゃう味ぃ……<emoji=heart04>\u3000んむっ……<emoji=heart04>\u3000ちゅっ……ぺろっ……<emoji=heart04>\u3000れろちゅっ……れるれるっ<emoji=heart04>」"
translation = "「레를……<emoji=heart04> 버릇이 돼서, 멈출 수 없게 되는 맛……<emoji=heart04> 응무……<emoji=heart04> 쪽…… 페로……<emoji=heart04> 레로츄…… 레를레를<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「うぅっ。もしかしてサラン、また精液で美食酔いが……？」"
translation = "「우으. 설마 사란, 또 정액으로 미식 취기가……?」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「うんっ♪\u3000会長ちゃんの精液、とっても美味しいからぁ……<emoji=heart04>\u3000サラン、ふわふわ～ってなっちゃうのぉ<emoji=heart04>」"
translation = "「으응♪ 회장짱의 정액, 너무 맛있으니까아……<emoji=heart04> 사란, 몽롱~하게 돼버려어<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「エッチな味でサラン、おま○こムズムズしてぇ……はあぁ<emoji=heart04>\u3000愛液溢れてきちゃうよぉ……んふぅ……<emoji=heart04>」"
translation = "「야한 맛 때문에 사란, 보지 근질근질해서어…… 하아아<emoji=heart04> 애액이 넘쳐 나와 버려어…… 응후……<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「あっ<emoji=heart04>\u3000会長ちゃんの指、サランのおま○こに当たってるぅ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000感じちゃうよぉ……<emoji=heart04>\u3000あんっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 회장짱의 손가락, 사란의 보지에 닿고 있어어<emoji=heart04> 응우으<emoji=heart04> 느껴버려어……<emoji=heart04> 앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「――お掃除フェラのお礼？\u3000サランのことも、気持ちよくしてくれるのぉ～？」"
translation = "「――청소 펠라의 답례? 사란도, 기분 좋게 해주는 거야~?」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「じゃあ、サランもおち○ちん気持ちよくするから～、一緒に、ね？」"
translation = "「그럼, 사란도 자지 기분 좋게 해줄 테니까~, 같이, 응?」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「んっ<emoji=heart04>\u3000会長ちゃんの指が、おま○この中に入ってくるぅ……<emoji=heart04>\u3000サランもぉ、おち○ちん咥えて……んむっ――<emoji=heart04>」"
translation = "「응<emoji=heart04> 회장짱의 손가락이, 보지 안으로 들어와아……<emoji=heart04> 사란도오, 자지 물고…… 응무――<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「んっ<emoji=heart04>\u3000んむぅ～～～っ<emoji=heart04><emoji=heart04>\u3000ぷあぁっ<emoji=heart04>\u3000指入ってきたぁ……やぁんっ<emoji=heart04>」"
translation = "「응<emoji=heart04> 응무우우~~~<emoji=heart04><emoji=heart04> 푸아<emoji=heart04> 손가락 들어왔어아…… 야앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「あむっ<emoji=heart04>\u3000ちゅっぽ、ちゅっぽ<emoji=heart04>\u3000れろちゅっ<emoji=heart04>\u3000ちゅっぷ、ちゅっぷ<emoji=heart04>\u3000ちゅぷぷっ……ちゅるるっ<emoji=heart04>\u3000ちゅっぽ、ちゅっぽ<emoji=heart04>\u3000ちゅっぷ、ちゅっぷ<emoji=heart04>」"
translation = "「아무<emoji=heart04> 츕포, 츕포<emoji=heart04> 레로츄<emoji=heart04> 츕푸, 츕푸<emoji=heart04> 츄푸푸…… 츄르르<emoji=heart04> 츕포, 츕포<emoji=heart04> 츕푸, 츕푸<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ちゅぱっ<emoji=heart04>\u3000会長ちゃんのおち○ちんに、こびりついた精液、全部舐めちゃうね～<emoji=heart04>」"
translation = "「츄파<emoji=heart04> 회장짱의 자지에, 눌어붙은 정액, 전부 핥아줄게~<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ちゅぷぷっ<emoji=heart04>\u3000ちゅっぽ、ちゅっぽ<emoji=heart04>\u3000れろちゅっ、れるれる<emoji=heart04>\u3000ちゅぷぷっ、ちゅるるるっ<emoji=heart04>」"
translation = "「츄푸푸<emoji=heart04> 츕포, 츕포<emoji=heart04> 레로츄, 레를레를<emoji=heart04> 츄푸푸, 츄르르르<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「んふぅ<emoji=heart04>\u3000新しく我慢汁も出てきたぁ～<emoji=heart04>\u3000会長ちゃんの雄の味、好きぃ～<emoji=heart04>\u3000ちゅぷぷっ……ちゅっぱ、ちゅっぱ<emoji=heart04>\u3000れろちゅっ<emoji=heart04>\u3000ちゅっぽ、ちゅっぽ<emoji=heart04>」"
translation = "「응후<emoji=heart04> 새로 쿠퍼액도 나왔다아~<emoji=heart04> 회장짱의 수컷 맛, 좋아아~<emoji=heart04> 츄푸푸…… 츄파, 츄파<emoji=heart04> 레로츄<emoji=heart04> 츕포, 츕포<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ちゅぱっ<emoji=heart04>\u3000ふあぁ～、すごいぃ<emoji=heart04>\u3000会長ちゃんのおち○ちん、また大きくなってるぅ<emoji=heart04>\u3000サランのお口で興奮してくれたのぉ？」"
translation = "「츄파<emoji=heart04> 후아아~, 대단해애<emoji=heart04> 회장짱의 자지, 또 커지고 있어어<emoji=heart04> 사란의 입으로 흥분해 준 거야아?」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「嬉しい～……<emoji=heart04>\u3000もっと気持ちよくしてあげるね～<emoji=heart04>\u3000んむっ<emoji=heart04>\u3000ちゅっぽ、ちゅっぽ<emoji=heart04>\u3000ちゅっぷ、ちゅっぷ<emoji=heart04>\u3000れろちゅっ<emoji=heart04>\u3000れろれろっ……ちゅるるっ<emoji=heart04>」"
translation = "「기뻐~……<emoji=heart04> 더 기분 좋게 해줄게~<emoji=heart04> 응무<emoji=heart04> 츕포, 츕포<emoji=heart04> 츕푸, 츕푸<emoji=heart04> 레로츄<emoji=heart04> 레로레로…… 츄르르<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「んっ<emoji=heart04>\u3000おち○ちんのカリの裏にも、精液こびり付いてるよ～<emoji=heart04>\u3000ここもほら<emoji=heart04>\u3000ちゅむっ、ちゅぱっ<emoji=heart04>\u3000綺麗にお掃除しないと……<emoji=heart04>」"
translation = "「응<emoji=heart04> 자지 귀두 테두리 뒤에도, 정액이 눌어붙어 있어~<emoji=heart04> 여기도 봐봐<emoji=heart04> 츄무, 츄파<emoji=heart04> 깨끗하게 청소해야지……<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ちゅぷぷっ……れるれるっ<emoji=heart04>\u3000れろちゅっ<emoji=heart04>\u3000れろれろっ……んくっ<emoji=heart04>」"
translation = "「츄푸푸…… 레를레를<emoji=heart04> 레로츄<emoji=heart04> 레로레로…… 응긋<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「んはぁ～<emoji=heart04>\u3000精液、美味しぃよぉ～……<emoji=heart04>\u3000サランの頭の中、どんどんふわふわになっちゃう～<emoji=heart04>」"
translation = "「응하아~<emoji=heart04> 정액, 맛있어어~……<emoji=heart04> 사란의 머릿속, 점점 몽롱해져 버려~<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「あむっ<emoji=heart04>\u3000ちゅっぽ、ちゅっぽっ<emoji=heart04>\u3000ちゅっぷ、ちゅっぷ<emoji=heart04>\u3000ちゅっ……ちゅるるるるっ<emoji=heart04>\u3000ちゅぱっ……れるれるっ<emoji=heart04>\u3000ちゅっぽ、ちゅっぽ<emoji=heart04>\u3000ちゅっぱ、ちゅっぱ<emoji=heart04>」"
translation = "「아무<emoji=heart04> 츕포, 츕포<emoji=heart04> 츕푸, 츕푸<emoji=heart04> 쪽…… 츄르르르르<emoji=heart04> 츄파…… 레를레를<emoji=heart04> 츕포, 츕포<emoji=heart04> 츄파, 츄파<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「――サランのおま○こも、愛液いっぱいでぐちょぐちょになってる？\u3000……だって～、会長ちゃんが指でサランの気持ちいいところばっかり撫でるからぁ～……あんっ<emoji=heart04>」"
translation = "「――사란의 보지도, 애액 가득해서 질척질척해졌어? ……그치만~, 회장짱이 손가락으로 사란의 기분 좋은 곳만 쓰다듬으니까아~…… 앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「サランも、会長ちゃんがカリ裏気持ちいいって知ってるんらから～<emoji=heart04>\u3000んむっ<emoji=heart04>\u3000ちゅっぽちゅっぽ<emoji=heart04>\u3000れろっ<emoji=heart04>\u3000れろちゅっ<emoji=heart04>\u3000れるれるっ<emoji=heart04>\u3000ちゅっぱちゅっぱちゅっぱ<emoji=heart04>」"
translation = "「사란도, 회장짱이 귀두 테두리 뒤가 기분 좋다는 거 알고 있으니까아~<emoji=heart04> 응무<emoji=heart04> 츕포츕포<emoji=heart04> 레로<emoji=heart04> 레로츄<emoji=heart04> 레를레를<emoji=heart04> 츄파츄파츄파<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「どぉう？\u3000おち○ちん、気持ちいい？\u3000ちゅっぷちゅっぷちゅっぷ<emoji=heart04>\u3000ちゅっぽちゅっぽちゅっぽ<emoji=heart04>」"
translation = "「어때애? 자지, 기분 좋아? 츕푸츕푸츕푸<emoji=heart04> 츕포츕포츕포<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「――えへへぇ～<emoji=heart04>\u3000じゃあ、もっとしてあげりゅね～<emoji=heart04>\u3000ちゅぷぷっ<emoji=heart04>\u3000れるれるっ<emoji=heart04>\u3000ちゅっぽちゅっぽちゅっぽ<emoji=heart04>\u3000れろれろっ、ちゅれるっ<emoji=heart04>\u3000ちゅるるるるっ<emoji=heart04>」"
translation = "「――에헤헤~<emoji=heart04> 그럼, 더 해줄게에~<emoji=heart04> 츄푸푸<emoji=heart04> 레를레를<emoji=heart04> 츕포츕포츕포<emoji=heart04> 레로레로, 츄레를<emoji=heart04> 츄르르르르<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「うぁっ……！\u3000さ、サラン、なんか最近、どんどんフェラが上手くなってない……？」"
translation = "「우앗……! 사, 사란, 왠지 요즘, 점점 펠라가 능숙해지지 않았어……?」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ちゅぱっ<emoji=heart04>\u3000――えへへぇ～<emoji=heart04>\u3000いつも会長ちゃんから気持ちよくしてもらってるからぁ～、会長ちゃんにも気持ちよくなってもらえるように、サラン勉強してりゅの～<emoji=heart04>」"
translation = "「츄파<emoji=heart04> ――에헤헤~<emoji=heart04> 항상 회장짱한테 기분 좋게 도움받고 있으니까아~, 회장짱도 기분 좋아질 수 있게, 사란 공부하고 있어어~<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「お口でするの上手になればぁ、いっぱい精液出してもらえるし～。それにサラン、会長ちゃんが気持ちいいって言ってくれると、ふわふわな気持ちになりゅの～♪」"
translation = "「입으로 하는 거 잘하게 되면, 정액 잔뜩 내줄 테고~. 게다가 사란, 회장짱이 기분 좋다고 말해 주면, 몽롱한 기분이 돼버려어~♪」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「だから、会長ちゃ～ん<emoji=heart04>\u3000サランのお口ご奉仕でぇ、いっぱい気持ちよくなって<emoji=heart04>\u3000んむっ<emoji=heart04>\u3000ちゅっぽちゅっぽ<emoji=heart04>\u3000ちゅっぷちゅっぷ<emoji=heart04>」"
translation = "「그러니까, 회장짱~<emoji=heart04> 사란의 입 봉사로오, 잔뜩 기분 좋아져어<emoji=heart04> 응무<emoji=heart04> 츕포츕포<emoji=heart04> 츕푸츕푸<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「んっ<emoji=heart04>\u3000――ぷあっ……ふあぁっ<emoji=heart04>\u3000会長ちゃんの指、サランのおま○この深いところにきてりゅぅ～<emoji=heart04>」"
translation = "「응<emoji=heart04> ――푸하…… 후아아<emoji=heart04> 회장짱의 손가락, 사란의 보지 깊은 곳까지 오고 있어어~<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「サランも、会長ちゃんのおち○ちん、もっと気持ちよくするね<emoji=heart04>\u3000あむっ――じゅぷぷぷっ<emoji=heart04>」"
translation = "「사란도, 회장짱의 자지, 더 기분 좋게 해줄게<emoji=heart04> 아무――쥬푸푸푸<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「じゅっぽじゅっぽじゅっぽ<emoji=heart04>\u3000じゅっぷじゅっぷじゅっぷ<emoji=heart04>\u3000んぶっ<emoji=heart04>\u3000れるれるっ<emoji=heart04>\u3000じゅっぽじゅっぽじゅっぽ<emoji=heart04>\u3000じゅっぷじゅっぷじゅっぷ<emoji=heart04>」"
translation = "「쥬포쥬포쥬포<emoji=heart04> 쥬푸쥬푸쥬푸<emoji=heart04> 응부<emoji=heart04> 레를레를<emoji=heart04> 쥬포쥬포쥬포<emoji=heart04> 쥬푸쥬푸쥬푸<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ちゅばっ……ふうぅっ<emoji=heart04>\u3000喉奥まで咥えちゃうりょ～<emoji=heart04>\u3000んぶぶっ<emoji=heart04>\u3000じゅぽっじゅぽっじゅぽっ<emoji=heart04>\u3000じゅぷっじゅぷっじゅぷっ<emoji=heart04>\u3000じゅれるっ<emoji=heart04>\u3000じゅるるるるっ<emoji=heart04>」"
translation = "「츄바…… 후우우<emoji=heart04> 목구멍 깊숙이까지 물어버릴 거야아~<emoji=heart04> 응부부<emoji=heart04> 쥬포쥬포쥬포<emoji=heart04> 쥬푸쥬푸쥬푸<emoji=heart04> 쥬레를<emoji=heart04> 쥬르르르르<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「タマタマも揉んじゃう<emoji=heart04>\u3000もみもみ<emoji=heart04>\u3000じゅっぽじゅっぽじゅっぽっ<emoji=heart04>\u3000じゅっぱじゅっぱじゅっぱっ<emoji=heart04>\u3000もみもみ<emoji=heart04>\u3000じゅっぷじゅっぷじゅっぷ<emoji=heart04>\u3000じゅるるるるっ<emoji=heart04>」"
translation = "「불알도 주물러줄게<emoji=heart04> 조물조물<emoji=heart04> 쥬포쥬포쥬포<emoji=heart04> 쥬파쥬파쥬파<emoji=heart04> 조물조물<emoji=heart04> 쥬푸쥬푸쥬푸<emoji=heart04> 쥬르르르르<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「えへへぇ～<emoji=heart04>\u3000会長ちゃん、気持ちよさそうな顔ぉ<emoji=heart04>\u3000んぶっ<emoji=heart04>\u3000じゅっぽじゅっぽじゅっぽ<emoji=heart04>\u3000じゅっぱじゅっぱじゅっぱ<emoji=heart04>」"
translation = "「에헤헤~<emoji=heart04> 회장짱, 기분 좋아 보이는 얼굴어<emoji=heart04> 응부<emoji=heart04> 쥬포쥬포쥬포<emoji=heart04> 쥬파쥬파쥬파<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ちゅばっ<emoji=heart04>\u3000んふぅ<emoji=heart04>\u3000――もうイキそうなの？\u3000いいよ<emoji=heart04>\u3000いっぱい精液出してぇ<emoji=heart04>\u3000じゅぷっじゅぷっじゅぷっ<emoji=heart04>\u3000じゅぽっじゅぽっじゅぽっ<emoji=heart04>\u3000じゅるるるっ<emoji=heart04>」"
translation = "「츄바<emoji=heart04> 응후<emoji=heart04> ――벌써 갈 것 같아? 괜찮아<emoji=heart04> 정액 잔뜩 내줘어<emoji=heart04> 쥬푸쥬푸쥬푸<emoji=heart04> 쥬포쥬포쥬포<emoji=heart04> 쥬르르르<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「れるれるっ<emoji=heart04>\u3000――ぷはぁ<emoji=heart04>\u3000サラン全部飲んであげるからぁ<emoji=heart04>\u3000じゅぽっじゅぽっじゅぽっ<emoji=heart04>\u3000じゅぷっじゅぷっじゅぷっ<emoji=heart04>\u3000じゅぱっじゅぱっじゅぱっ<emoji=heart04>」"
translation = "「레를레를<emoji=heart04> ――푸하<emoji=heart04> 사란이 전부 마셔줄 테니까아<emoji=heart04> 쥬포쥬포쥬포<emoji=heart04> 쥬푸쥬푸쥬푸<emoji=heart04> 쥬파쥬파쥬파<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「んんっ<emoji=heart04>\u3000サランも会長ちゃんの指でイキそう<emoji=heart04>」"
translation = "「응응<emoji=heart04> 사란도 회장짱의 손가락 때문에 갈 것 같아<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「じゅっぽじゅっぽじゅっぽ<emoji=heart04>\u3000じゅっぷじゅっぷじゅっぷ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000じゅっぱじゅっぱじゅっぱ<emoji=heart04>\u3000んぶっ<emoji=heart04>」"
translation = "「쥬포쥬포쥬포<emoji=heart04> 쥬푸쥬푸쥬푸<emoji=heart04> 응응<emoji=heart04> 쥬파쥬파쥬파<emoji=heart04> 응부<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……サラン、出すぞ！」"
translation = "「윽…… 사란, 싼다!」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「じゅぱっ<emoji=heart04>\u3000きてぇっ<emoji=heart04>\u3000サランも、もうっ<emoji=heart04>\u3000じゅぽっじゅぽっじゅぽっ<emoji=heart04>\u3000じゅぱっじゅぱっじゅぱっ<emoji=heart04>\u3000じゅるるるるっ<emoji=heart04>\u3000んぶぅっ<emoji=heart04><emoji=heart04>」"
translation = "「쥬파<emoji=heart04> 기분 좋아<emoji=heart04> 사랑도, 이제<emoji=heart04> 쥬포쥬포쥬포<emoji=heart04> 쥬파쥬파쥬파<emoji=heart04> 쥬르르르르<emoji=heart04> 응부웃<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「んっ<emoji=heart04>\u3000んんんーーーーーーっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응<emoji=heart04> 으으으으으으으으<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ふあああぁぁぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000サランもイっちゃうぅぅぅ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후아아아아아~~~<emoji=heart04><emoji=heart04><emoji=heart04> 사랑도 가버려어어어어어~~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「んぶぅっ<emoji=heart04>\u3000んっ……んっ……ごくっ<emoji=heart04>\u3000れろっ……れるれるっ<emoji=heart04>\u3000んくっ……<emoji=heart04>」"
translation = "「응부웃<emoji=heart04> 응…… 응…… 꿀꺽<emoji=heart04> 레로…… 레를레를<emoji=heart04> 응긋……<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「れろちゅっ<emoji=heart04>\u3000――ぷはぁっ……<emoji=heart04>\u3000はぁっ……はぁっ……サランもお潮、吹いちゃったぁ……<emoji=heart04>」"
translation = "「레로츄<emoji=heart04> ――푸하아……<emoji=heart04> 하아…… 하아…… 사랑도 애액, 뿜어버렸어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ふわぁ……<emoji=heart04>\u3000おち○ちんにご奉仕しながら、おま○こ弄られるの、会長ちゃんと好きを伝え合ってる感じがして、すごく気持ちよかったぁ……<emoji=heart04>」"
translation = "「후와아……<emoji=heart04> 자지를 봉사하면서, 보지 만져지는 거, 회장님이랑 서로 사랑을 전하는 느낌이 들어서, 너무 기분 좋았어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「――会長ちゃんも気持ちよかった？\u3000あ……<emoji=heart04>\u3000頭撫でてくれるの？」"
translation = "「――회장님도 기분 좋았어? 아……<emoji=heart04> 머리 쓰다듬어 주는 거야?」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「えへへ<emoji=heart04>\u3000会長ちゃんにありがとうって言ってもらえて、サランふわふわ～……♪」"
translation = "「에헤헤<emoji=heart04> 회장님한테 고맙다는 말 들어서, 사랑은 둥실둥실~……♪」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「サランもまた、会長ちゃんにありがとうってお礼しないと<emoji=heart04>\u3000おち○ちん、精液で汚れちゃったから、またお口でお掃除するね～<emoji=heart04>」"
translation = "「사랑도 다시, 회장님한테 고맙다고 답례해야지<emoji=heart04> 자지가 정액으로 더러워졌으니까, 다시 입으로 청소해 줄게~<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「――そんなことしたら、またおち○ちん大きくなっちゃう？\u3000えへへ～<emoji=heart04>」"
translation = "「――그런 짓 하면, 다시 자지 커져 버려? 에헤헤~<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「その時はぁ～、さっきの精液もすごく美味しかったから……またおかわりしたいな～<emoji=heart04>\u3000……ダメ～？」"
translation = "「그때는~, 아까 정액도 정말 맛있었으니까…… 다시 한 그릇 더 먹고 싶어~<emoji=heart04> ……안 돼~?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「食べすぎて、このまま眠れなくなっちゃっても知らないぞ？」"
translation = "「너무 많이 먹어서, 이대로 잠들지 못하게 돼도 모른다?」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「うん<emoji=heart04>\u3000サランは大丈夫だから、いっぱい食べさせてぇ～<emoji=heart04>\u3000あっ……やぁんっ<emoji=heart04>」"
translation = "「응<emoji=heart04> 사랑은 괜찮으니까, 잔뜩 먹여줘~<emoji=heart04> 앗…… 야앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その後、俺も夢中になって、眠れなくなるくらいサランのことをおかわりしてしまうのだった。"
translation = "그 후, 나도 정신없이 빠져들어, 잠들지 못할 정도로 사랑을 몇 번이고 탐하고 말았다."

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ふぅ……はぁ……<emoji=heart04>\u3000ん……はぁ……ふぅ……<emoji=heart04>\u3000ちゅっ……れろっ……ちゅぱっ……<emoji=heart04>\u3000んっ……ちゅっ……れろちゅっ……<emoji=heart04>\u3000はぁ……はぁ……んちゅっ……<emoji=heart04>」"
translation = "「후우…… 하아……<emoji=heart04> 응…… 하아…… 후우……<emoji=heart04> 츄…… 레로…… 츄파……<emoji=heart04> 응…… 츄…… 레로츄……<emoji=heart04> 하아…… 하아…… 응츄……<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「んむっ<emoji=heart04>\u3000ちゅっぽ、ちゅっぽ<emoji=heart04>\u3000ちゅぱっ……ちゅっぷ、ちゅっぷ<emoji=heart04>\u3000んはぁ……ちゅっ、ちゅぷぷっ……<emoji=heart04>\u3000ちゅっぽ、ちゅっぽ<emoji=heart04>\u3000れろちゅっ、ちゅぷっ……ちゅるるっ<emoji=heart04>」"
translation = "「응뭇<emoji=heart04> 츄포, 츄포<emoji=heart04> 츄파…… 츄푸, 츄푸<emoji=heart04> 응하아…… 츄, 츄푸푸……<emoji=heart04> 츄포, 츄포<emoji=heart04> 레로츄, 츄푸…… 츄르르<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「んぶっ<emoji=heart04>\u3000じゅっぽじゅっぽじゅっぽ<emoji=heart04>\u3000じゅっぷじゅっぷじゅっぷ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000じゅぽっじゅぽっじゅぽっ<emoji=heart04>\u3000じゅぷっじゅぷっじゅぷっ<emoji=heart04>\u3000じゅるるるるっ、れろちゅっ<emoji=heart04>」"
translation = "「응붓<emoji=heart04> 쥬포쥬포쥬포<emoji=heart04> 쥬푸쥬푸쥬푸<emoji=heart04> 응응<emoji=heart04> 쥬포쥬포쥬포<emoji=heart04> 쥬푸쥬푸쥬푸<emoji=heart04> 쥬르르르르, 레로츄<emoji=heart04>」"

