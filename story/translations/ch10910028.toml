[[dialogue]]
speaker = "unk"
original = "俺と梨緒が海を訪れたところ、モンスターが出現し、２人でそれを撃破した。"
translation = "나와 리오가 바다를 방문했을 때, 몬스터가 출현하여 둘이서 그것을 격파했다."

[[dialogue]]
speaker = "unk"
original = "すると近くのリゾートホテルのオーナーから『海を守ってくれたお礼にホテルに泊まってほしい』と申し出があって……"
translation = "그러자 근처 리조트 호텔의 오너로부터 『바다를 지켜준 답례로 호텔에 묵어줬으면 한다』는 제의가 있어서……"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「モンスター討伐の謝礼として、過度に高価な品やサービスを受け取るのは校則で禁止されている」"
translation = "「몬스터 토벌의 사례로서, 과도하게 고가인 물품이나 서비스를 받는 것은 교칙으로 금지되어 있다」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「とはいえ『過度に高価』の基準ははっきり定められていないが……」"
translation = "「그렇다고는 해도 『과도하게 고가』의 기준은 명확히 정해져 있지 않지만……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「無下に断るのも悪いし、部屋で少し休憩させてもらうくらいならいいんじゃないか？」"
translation = "「무정하게 거절하는 것도 미안하고, 방에서 조금 휴식하는 정도라면 괜찮지 않을까?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「まぁ……それぐらいなら問題ないか」"
translation = "「뭐…… 그 정도라면 문제없겠지」"

[[dialogue]]
speaker = "unk"
original = "しかし若い男女がホテルですることといえば──"
translation = "하지만 젊은 남녀가 호텔에서 하는 일이라고 하면──"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「んちゅっ……ちゅっ、ちゅぱっ……れる、ちゅるるっ<emoji=heart04>\u3000んふぅ……ちゅぷちゅるっ……じゅるる……ぷぁっ──<emoji=heart04>」"
translation = "「응츄……츄, 츄릅……레루, 츄르르<emoji=heart04> 응후……츄푸츄룻……쥬르르……푸하──<emoji=heart04>」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「はぁ……最初からそのつもりで、部屋で休もうと誘ったのか？」"
translation = "「하아…… 처음부터 그럴 셈으로, 방에서 쉬자고 유혹한 건가?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「いや普通に休憩するつもりだったけど、水着の梨緒と一緒にいたら、<b>そういう</b>気分になっちゃって……」"
translation = "「아니, 평범하게 휴식할 생각이었지만, 수영복 차림의 리오와 같이 있으니까, <b>그런</b> 기분이 되어버려서……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「まったくもう……」"
translation = "「정말이지 정말……」"

[[dialogue]]
speaker = "unk"
original = "梨緒は俺の足元にしゃがむと、膨らんだ股間に水着の上からキスをする。"
translation = "리오는 내 발치에 앉더니, 부풀어 오른 가랑이에 수영복 위로 키스를 한다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ちゅっ<emoji=heart04>」"
translation = "「츄<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「うぁっ……！？」"
translation = "「우왓……!?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「君のここ、こんなに大きくなっているぞ。これを何とかしないと部屋の外に出ることもできないだろう」"
translation = "「너의 여기, 이렇게나 커져 있다고. 이걸 어떻게든 하지 않으면 방 밖으로 나갈 수도 없겠지」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「だが君には喘がされてばかりだからな……勝負といこうじゃないか」"
translation = "「하지만 너에게는 계속 신음소리만 내게 되었으니까 말이야…… 승부라고 하지 않겠나」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「はぁ……勝負だ、魔王……」"
translation = "「하아…… 승부다, 마왕……」"

[[dialogue]]
speaker = "unk"
original = "ベッドの上でお尻を突き出し、早く入れてくれと言わんばかりの体勢をとる梨緒。"
translation = "침대 위에서 엉덩이를 내밀고, 빨리 넣어 달라고 말하는 듯한 자세를 취하는 리오."

[[dialogue]]
speaker = "unk"
original = "綺麗な背中、折れてしまうんじゃないかと心配になるような細い腰、そして対照的に肉感たっぷりなお尻。"
translation = "매끈한 등, 부러져 버리는 게 아닐까 걱정될 정도로 가느다란 허리, 그리고 대조적으로 육감적인 엉덩이."

[[dialogue]]
speaker = "unk"
original = "梨緒の体に見惚れて興奮がさらに高まっていき、いきり立ったペニスを梨緒のお尻に押し付ける。"
translation = "리오의 몸에 넋을 잃어 흥분이 더욱 고조되어 가고, 발기한 페니스를 리오의 엉덩이에 밀어붙인다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「んんっ……<emoji=heart04>\u3000お尻に、熱いのが……はあぁ……ふぅ……<emoji=heart04>」"
translation = "「응으……<emoji=heart04> 엉덩이에, 뜨거운 게…… 하아아…… 후우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ふはぁ……ぁっ……お尻に、おち○ちん擦れて……はあぁ……<emoji=heart04>\u3000そっちはいいだろう……んん……早く、入れてくれ……<emoji=heart04>」"
translation = "「후하아……아…… 엉덩이에, 자지가 스쳐서…… 하아아……<emoji=heart04> 그쪽은 좋겠지…… 응…… 빨리, 넣어 줘……<emoji=heart04>」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「今日は、私が君をイかせるんだからな……<emoji=heart04>\u3000私のおま○こで君のおち○ちんをかわいがって、たっぷり射精させてやるっ……<emoji=heart04>」"
translation = "「오늘은, 내가 너를 가게 만들 거니까 말이야……<emoji=heart04> 내 보지로 네 자지를 예뻐해 줘서, 듬뿍 사정하게 해 줄게……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "このまま梨緒の尻肉を味わっていたい気持ちもあるが、膣口は熱い蜜を垂らしながら物欲しそうにひくつき、俺を誘惑してくる。"
translation = "이대로 리오의 엉덩잇살을 맛보고 싶은 마음도 있지만, 질구는 뜨거운 애액을 흘리며 갈구하듯 움찔거리며, 나를 유혹해 온다."

[[dialogue]]
speaker = "unk"
original = "その誘惑に負けて亀頭を膣口にあてがうと、くちゅっと湿った音が鳴った。"
translation = "그 유혹에 져서 귀두를 질구에 갖다 대자, 쿠츄 하고 젖은 소리가 났다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「んっ……<emoji=heart04>\u3000君のは、やっぱり熱いな……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 너의 건, 역시 뜨겁네……<emoji=heart04>」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「そうだ……私の中に来てくれ……そのまま──」"
translation = "「그래…… 내 안으로 들어와 줘…… 그대로──」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「んんぁああ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응으아아아～～～～～～윽<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "腰を突き出すと、ペニスが濡れた膣口をこじ開け、容易く中に侵入した。"
translation = "허리를 내밀자, 페니스가 젖은 질구를 비집고 열어, 손쉽게 안으로 침입했다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ふぅぅ……はぁ……<emoji=heart04>\u3000君のが、私の中に入ってきてる……はぁ、はぁ……<emoji=heart04>」"
translation = "「후우우…… 하아……<emoji=heart04> 너의 것이, 내 안으로 들어오고 있어…… 하아, 하아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「君のおち○ちん大きくて、私のおま○こ広げられてる……ふっ、はぁ……<emoji=heart04>\u3000君が中にいるのを、すごく感じる……<emoji=heart04>」"
translation = "「너의 자지가 커서, 내 보지가 벌려지고 있어…… 훗, 하아……<emoji=heart04> 네가 안에 있는 게, 엄청 느껴져……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "熱くてとろとろの蜜で濡れた粘膜が、ペニスを包み込んで刺激する。"
translation = "뜨겁고 걸쭉한 애액으로 젖은 점막이, 페니스를 감싸 안으며 자극한다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「んんっ……<emoji=heart04>\u3000おち○ちんが中でビクビクしているぞ……はぁ……私のおま○こで感じている証拠だな」"
translation = "「응윽……<emoji=heart04> 자지가 안에서 움찔거리고 있어…… 하아…… 내 보지로 느끼고 있다는 증거구나」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「はぁ、はぁ……このまま君をイかせてやるから、覚悟しろ……！」"
translation = "「하아, 하아…… 이대로 너를 가게 해줄 테니까, 각오해……!」"

[[dialogue]]
speaker = "unk"
original = "梨緒がイかせてくれるのは魅力的だが、勝負なら負けられない。今のうちに先制させてもらおう。"
translation = "리오가 가게 해주는 것은 매력적이지만, 승부라면 질 수 없다. 지금 기회에 선제공격을 하도록 하자."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ひぁああっ～～～っ！？」"
translation = "「히아아앗～～～윽!?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「んぁあっ……ああっ……君のおち○ちんが動いて……はぁっ、はっ、んんっ……<emoji=heart04>」"
translation = "「응아앗…… 아앗…… 너의 자지가 움직여서…… 하앗, 핫, 응윽……<emoji=heart04>」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「私が、君をイかせると言ったのに……はぁっ……君から動くなんて、卑怯だぞ……っ」"
translation = "「내가, 너를 가게 해준다고 했는데…… 하앗…… 네가 먼저 움직이다니, 비겁하다구……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「勝負なんだから、俺も攻めないとフェアじゃないだろ？」"
translation = "「승부니까, 나도 공격하지 않으면 페어가 아니잖아?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「それは、そうだが……あんっ、んんっ、あぁ……ふあぁっ<emoji=heart04>\u3000中で、ゴリゴリ当たって……ひやぁあっ<emoji=heart04>」"
translation = "「그건, 그렇지만…… 앙, 응윽, 아아…… 후아앗<emoji=heart04> 안에서, 고리고리 닿아서…… 히야아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「おち○ちんが、私の中で、擦れてぇ……んん～～っ<emoji=heart04><emoji=heart04>\u3000ふああぁ……はぁっ、はっ……ぁんっ……<emoji=heart04>」"
translation = "「자지가, 내 안에서, 쓸려서어…… 응으～～윽<emoji=heart04><emoji=heart04> 후아아아…… 하앗, 핫…… 아앙……<emoji=heart04>」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「はあぁ、あっ……おち○ちん、太くて、硬いぃ……ひああっ<emoji=heart04>\u3000だが、私も攻められて、ばかりじゃないぞ……っ」"
translation = "「하아아, 앗…… 자지, 굵고, 딱딱해에…… 히아앗<emoji=heart04> 하지만, 나도 당하고, 있지만은 않겠다구……」"

[[dialogue]]
speaker = "unk"
original = "梨緒も自分から腰を使い、粘膜とペニスが強く摩擦する。"
translation = "리오는 자신도 허리를 움직여, 점막과 페니스가 강하게 마찰한다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「んんっ……<emoji=heart04>\u3000君のが、私の中で、ドクドクと跳ねて……はぁ、はっ……感じているんだな……<emoji=heart04>」"
translation = "「응윽……<emoji=heart04> 너의 것이, 내 안에서, 두근두근 뛰어서…… 하아, 핫…… 느끼고 있는 거구나……<emoji=heart04>」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「はぁ……あっ……んんっ<emoji=heart04>\u3000このまま君をもっと感じさせて、射精させてやる……ふぅ、はぁ、はぁ……<emoji=heart04>」"
translation = "「하아…… 앗…… 응윽<emoji=heart04> 이대로 너를 더 느끼게 해서, 사정시켜 줄게…… 후우, 하아, 하아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「君を、イかせてやるから、な……はあぁ、はぁ……<emoji=heart04>\u3000私の中で、イけ……あっ、はぁ、んんっ……<emoji=heart04>」"
translation = "「너를, 가게 해줄 테니까, 말이야…… 하아아, 하아……<emoji=heart04> 내 안에서, 가버려…… 앗, 하아, 응윽……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言って自分からお尻をぶつけてくる梨緒がかわいい。"
translation = "그렇게 말하며 스스로 엉덩이를 부딪쳐 오는 리오가 귀엽다."

[[dialogue]]
speaker = "unk"
original = "それにお尻が下半身に当たり、尻肉の柔らかさを肌で感じる。"
translation = "그 바람에 엉덩이가 하반신에 닿아, 엉덩잇살의 부드러움이 피부로 느껴진다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「どう、だ……あ、んっ……<emoji=heart04>\u3000さっさと、果てろっ……私の中で、びゅーって、射精しろっ……<emoji=heart04>」"
translation = "「어, 때……아, 응……<emoji=heart04> 얼른, 가버려…… 내 안에서, 뷰릇하고, 사정해……<emoji=heart04>」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「はっ、あっ……はぁんっ<emoji=heart04>\u3000ちゃんと、私の中で受け止めてやるから、射精しろっ<emoji=heart04>\u3000ふはぁ、はぁっ……早く、出せっ<emoji=heart04>」"
translation = "「하아, 아……하앙<emoji=heart04> 제대로, 내 안에서 받아내 줄 테니까, 사정해<emoji=heart04> 후하아, 하아…… 빨리, 내보내<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言ってくれるのはありがたいが、勝負に手は抜けない。"
translation = "그렇게 말해주는 건 고맙지만, 승부에서 힘을 뺄 수는 없다."

[[dialogue]]
speaker = "unk"
original = "先に梨緒をイかせるべく、強めにペニスを突き入れる。"
translation = "먼저 리오를 가버리게 하기 위해, 강하게 페니스를 찔러 넣는다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ひぃあああっ<emoji=heart04>\u3000ズンって、来て……んんっ……お腹に響くっ……<emoji=heart04>\u3000ぐちゅぐちゅって、いやらしい音が響いてぇ……<emoji=heart04>」"
translation = "「히이아아앗<emoji=heart04> 즈윽 하고, 들어와서…… 응…… 배까지 울려……<emoji=heart04> 구츄구츄하고, 야한 소리가 울려서……<emoji=heart04>」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「それでも私は、負けないっ……今日は、私が君をイかせてやるんだからな……<emoji=heart04>\u3000くっ……はぁ……はぁんっ……<emoji=heart04>」"
translation = "「그래도 나는, 지지 않아…… 오늘은, 내가 너를 가버리게 해줄 거니까……<emoji=heart04> 큭…… 하아…… 하앙……<emoji=heart04>」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「はぁ、あっ、ああっ……君がそう来るなら……あっ<emoji=heart04>\u3000これなら、どうだ……っ」"
translation = "「하아, 아, 아아…… 네가 그렇게 나온다면…… 앗<emoji=heart04> 이건, 어떠냐……!」"

[[dialogue]]
speaker = "unk"
original = "梨緒の体が力むと同時、膣壁がぎゅっと収縮してペニスを刺激した。"
translation = "리오의 몸에 힘이 들어감과 동시에, 질벽이 꽉 수축하며 페니스를 자극했다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「くぁっ……！」"
translation = "「콰앗……!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ふふ、いい反応だ……はぁはぁ……<emoji=heart04>\u3000もっと感じろ……もっと声を出せ……はあぁ、はっ、ああっ、んんっ……<emoji=heart04>」"
translation = "「후후, 좋은 반응이다…… 하아하아……<emoji=heart04> 더 느껴…… 더 목소리를 내…… 하아아, 하아, 아아, 응……<emoji=heart04>」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「おま○こを締めたまま、動いてやるからな……はあぁっ、はっ……あっ、んんん……っ<emoji=heart04>」"
translation = "「보지를 조인 채로, 움직여 줄 테니까…… 하아아, 하아…… 앗, 응응……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスを締め付けたまま膣壁で擦られ、このままでは本当に梨緒をイかせる前に達してしまいそうだ。"
translation = "페니스를 조인 채 질벽으로 문질러대서, 이대로라면 정말로 리오를 가버리게 하기 전에 도달해 버릴 것 같다."

[[dialogue]]
speaker = "unk"
original = "だけどそれは梨緒自身も快感を強く感じる諸刃の剣のはず。"
translation = "하지만 그것은 리오 자신도 쾌감을 강하게 느끼는 양날의 검일 터."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ふはあっ、はっ、あんっ<emoji=heart04>\u3000あっ、はっ、あぁっ……んんんっ<emoji=heart04>」"
translation = "「후하아, 하아, 아앙<emoji=heart04> 앗, 하아, 아아…… 응응<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "より艶めかしい喘ぎを漏らす梨緒の奥めがけ、下半身を勢いよく突きだ出す。"
translation = "더욱 요염한 신음소리를 내뱉는 리오의 안쪽을 향해, 하반신을 기세 좋게 찔러댄다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ひぁああっ！？\u3000はぁ、あっ……<emoji=heart04>\u3000おち○ちんが、深いところまで、来てる……はあぁ……<emoji=heart04>\u3000そこは……ふぁああっ<emoji=heart04>」"
translation = "「히아아앗!? 하아, 아……<emoji=heart04> 자지가, 깊은 곳까지, 오고 있어…… 하아아……<emoji=heart04> 거기는…… 화아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「んんっ<emoji=heart04>\u3000ダメだっ<emoji=heart04>\u3000そこは、感じる、から……んぁ、あっ、ぁんっ<emoji=heart04>\u3000あっ、あっ、ひああぁっ<emoji=heart04>」"
translation = "「응<emoji=heart04> 안 돼<emoji=heart04> 거기는, 느껴지, 니까…… 응아, 아, 아앙<emoji=heart04> 앗, 앗, 히아아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「こうしてると、梨緒のお尻の穴まで丸見えだな」"
translation = "「이렇게 하고 있으니까, 리오의 똥구멍까지 다 보이네.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「なっ──！？\u3000う、うるさい、こんな体勢なんだから仕方ないだろう！」"
translation = "「나, 앗──!? 시, 시끄러워, 이런 자세니까 어쩔 수 없잖아!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「お尻を突き出してる梨緒がすごくエッチでかわいいよ。それにお尻が当たって気持ちいい」"
translation = "「엉덩이를 내밀고 있는 리오가 정말 야하고 귀여워. 게다가 엉덩이가 닿아서 기분 좋아.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「お尻お尻うるさいぞ！\u3000そんなに私の尻が好きか！？」"
translation = "「엉덩이 엉덩이 시끄럽다고! 그렇게 내 엉덩이가 좋냐!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ、好きだよ。戦ってる時もつい見ちゃいそうだし」"
translation = "「아아, 좋아해. 싸우고 있을 때도 그만 봐버릴 것 같고.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「なっ……！？\u3000真剣に戦ってるのに、そんな目で見ていたのか！？」"
translation = "「나, 앗……!? 진지하게 싸우고 있는데, 그런 눈으로 보고 있었던 거냐!?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ふしだらなやつめ……やはり君は悪い魔王だ……！\u3000はぁっ、はっ……悪い魔王は、私が倒さないと……！」"
translation = "「부도덕한 녀석…… 역시 너는 나쁜 마왕이다……! 하앗, 하…… 나쁜 마왕은, 내가 쓰러뜨리지 않으면……!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「そんなに私の尻が好きなら、もっと叩きつけてやる……ほら……！\u3000ほら……！」"
translation = "「그렇게 내 엉덩이가 좋다면, 더 부딪쳐 주마…… 자……! 자……!」"

[[dialogue]]
speaker = "unk"
original = "その言葉通り、梨緒がお尻をぶつけ、俺の下腹部で肉が弾む。"
translation = "그 말대로, 리오가 엉덩이를 부딪쳐 오자 내 하복부에서 살점이 튀어 오른다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「君は、私が、倒すんだからな……はぁっ、あっ、んっ<emoji=heart04>\u3000今日こそ……ふぁっ、あっ……私が勝つ……んああぁ<emoji=heart04>」"
translation = "「너는, 내가, 쓰러뜨릴 거니까…… 하아, 앗, 응<emoji=heart04> 오늘이야말로…… 후아, 앗…… 내가 이길 거야…… 응아아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「はぁ、はっ……早く、イけ<emoji=heart04>\u3000出せっ<emoji=heart04>\u3000あっ、はっ、んっ<emoji=heart04>\u3000私のおま○こで、おち○ちんイかせてやるっ<emoji=heart04>」"
translation = "「하아, 하…… 어서, 가버려<emoji=heart04> 싸버려<emoji=heart04> 앗, 하, 응<emoji=heart04> 내 보지로, 자지 가버리게 해줄게<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "互いに相手を絶頂させようと、責めが激しくなって──"
translation = "서로 상대를 절정시키려 공격이 격렬해지며──"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ひぁあああっ<emoji=heart04><emoji=heart04>\u3000あっ、あっ、あっ──あぁんっ<emoji=heart04>\u3000激しっ、いっ<emoji=heart04>\u3000おち○ちん、ズンズン来てるっ<emoji=heart04>」"
translation = "「히아아아앗<emoji=heart04><emoji=heart04> 앗, 앗, 앗── 아앙<emoji=heart04> 격렬, 해<emoji=heart04> 자지가, 쿡쿡 들어오고 있어<emoji=heart04>」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「はぁはっ、はっ、あぁっ<emoji=heart04>\u3000お腹の奥が、熱いぃっ<emoji=heart04>\u3000おち○ちん、奥にっ、ああぁっ<emoji=heart04>\u3000子宮に、当たってるぅっ<emoji=heart04>」"
translation = "「하아하, 하, 아아<emoji=heart04> 배 속 깊은 곳이, 뜨거워어<emoji=heart04> 자지가, 깊숙이, 아아아<emoji=heart04> 자궁에, 닿고 있어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「でも、負けない……ふぁああっ<emoji=heart04>\u3000ああっ<emoji=heart04>\u3000君を、イかせるんだっ……はっ、あっ、あぁっ<emoji=heart04>\u3000ふはぁ、あっ、あんっ<emoji=heart04>」"
translation = "「하지만, 지지 않아…… 후아아앗<emoji=heart04> 아앗<emoji=heart04> 너를, 가버리게 할 거야…… 하, 앗, 아아<emoji=heart04> 후하아, 앗, 안<emoji=heart04>」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「君が、イけ……<emoji=heart04>\u3000イけ、イけ、イけ……<emoji=heart04>\u3000はっ、あっ、あっ、んっ<emoji=heart04>\u3000私のおま○こで、イけ……んぁっ、はああぁっ<emoji=heart04>」"
translation = "「네가, 가버려……<emoji=heart04> 가, 가, 가……<emoji=heart04> 하, 앗, 앗, 응<emoji=heart04> 내 보지로, 가버려…… 응아, 하아아아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "奥を突かれながらも、負けじとお尻をぶつけてくる梨緒。"
translation = "안쪽을 찔리면서도, 지지 않겠다는 듯 엉덩이를 부딪쳐 오는 리오."

[[dialogue]]
speaker = "unk"
original = "お尻の弾力と粘膜の摩擦で責められ、俺も絶頂が近づいてくる。"
translation = "엉덩이의 탄력과 점막의 마찰로 공략당해, 나도 절정이 가까워진다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「んんっ<emoji=heart04>\u3000またおち○ちん、脈打ってるぞ<emoji=heart04>\u3000射精しそうなんだなっ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>」"
translation = "「응응<emoji=heart04> 또 자지가, 맥동하고 있어<emoji=heart04> 사정할 것 같구나<emoji=heart04> 하아<emoji=heart04> 앗<emoji=heart04> 후아아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「でもおち○ちんビクビクすると……はぁ、あっ……奥に熱いの注がれたの、思い出して<emoji=heart04>\u3000お腹の奥がきゅうって、切なくなるっ<emoji=heart04>」"
translation = "「하지만 자지가 움찔움찔하면…… 하아, 앗…… 깊은 곳에 뜨거운 게 쏟아졌던 게, 생각나서<emoji=heart04> 배 속 깊은 곳이 꽉 하고, 애달파져<emoji=heart04>」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「子宮が、精液を欲しがって、いる……んはっ、あっ、ああぁっ<emoji=heart04>\u3000子宮が、キュンキュンするっ<emoji=heart04>\u3000ひぁあっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んんぁあっ<emoji=heart04>」"
translation = "「자궁이, 정액을 원하고, 있어…… 응하, 앗, 아아아<emoji=heart04> 자궁이, 큥큥거려<emoji=heart04> 히아앗<emoji=heart04> 앗<emoji=heart04> 응응아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「んんんっ<emoji=heart04>\u3000おち○ちん、子宮に当たって……あっ、んっ……余計に、お腹の奥、きゅぅって<emoji=heart04>\u3000ふああぁっ<emoji=heart04>」"
translation = "「응응응<emoji=heart04> 자지가, 자궁에 닿아서…… 앗, 응…… 더욱더, 배 속 깊은 곳이, 꽉 하고<emoji=heart04> 후아아아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "膣壁が震え、締め付けが強くなるのを感じながら、梨緒のお尻を揉みしだく。"
translation = "질벽이 떨리고, 조임이 강해지는 것을 느끼며 리오의 엉덩이를 주물러 터뜨린다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ひぁあああっ<emoji=heart04>\u3000お尻ぐにぐにって、もみくちゃにされてぇ……<emoji=heart04>」"
translation = "「히아아아앗<emoji=heart04> 엉덩이 구니구니하고, 엉망진창으로 주물러져서어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「くっ……このお尻を好きにできるなんてたまらないよ」"
translation = "「큭…… 이 엉덩이를 마음대로 할 수 있다니 참을 수 없군」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「君はどれだけ、私の尻が好きなんだっ……んんっ<emoji=heart04>\u3000この、変態魔王っ……っ<emoji=heart04>」"
translation = "「너는 대체, 내 엉덩이를 얼마나 좋아하는 거냐…… 응응<emoji=heart04> 이, 변태 마왕……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "変態と言われようと、梨緒のお尻が魅力的なんだから仕方ない。"
translation = "변태라고 불리든 말든, 리오의 엉덩이가 매력적인 것이니 어쩔 수 없다."

[[dialogue]]
speaker = "unk"
original = "言葉で答える代わりに、お尻を叩くように激しく腰をぶつけてやる。"
translation = "말로 대답하는 대신, 엉덩이를 때리듯이 격렬하게 허리를 부딪쳐 준다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ひぁああっ<emoji=heart04>\u3000ああっ<emoji=heart04>\u3000んぁあっ<emoji=heart04>\u3000あ──あ──あ──ああああぁっ<emoji=heart04><emoji=heart04>」"
translation = "「히아아앗<emoji=heart04> 아앗<emoji=heart04> 응아앗<emoji=heart04> 아──아──아──아아아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「パンパンって、いやらしい音が……くっ……ふぁああっ<emoji=heart04>\u3000あっ、あっ、あんっ<emoji=heart04>\u3000おち○ちん、激しいっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ダメだ、イキそうっ<emoji=heart04>」"
translation = "「팍팍 하고, 야한 소리가…… 큭…… 화아앗<emoji=heart04> 앗, 앗, 안앗<emoji=heart04> 자지, 격렬해<emoji=heart04> 앗<emoji=heart04> 안 돼, 갈 것 같아<emoji=heart04>」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ひぁああああっ<emoji=heart04><emoji=heart04>\u3000んぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000おま○こ、きゅうって、切ないっ<emoji=heart04>\u3000ひああっ──あっ──ああぁっ<emoji=heart04>」"
translation = "「히아아아앗<emoji=heart04><emoji=heart04> 응앗<emoji=heart04> 앗<emoji=heart04> 안앗<emoji=heart04> 보지, 꽉 조여서, 애달파<emoji=heart04> 히아앗──앗──아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "絶頂が近づき、膣壁がしがみつくようにぎゅっと絞ってくる。"
translation = "절정이 다가오고, 질벽이 매달리듯이 꽉 조여온다."

[[dialogue]]
speaker = "unk"
original = "俺も限界が迫ってくるのを感じながら、射精をこらえながら突き続ける。"
translation = "나도 한계가 다가오는 것을 느끼며, 사정을 참으면서 계속 찌른다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「はぁはっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000このままイッて、しまうぅっ<emoji=heart04>\u3000はっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000でも、負けない<emoji=heart04>\u3000おち○ちん、イかせてやるっ<emoji=heart04>」"
translation = "「하아핫<emoji=heart04> 응응<emoji=heart04> 이대로 가, 버려어엇<emoji=heart04> 핫<emoji=heart04> 앗<emoji=heart04> 하지만, 지지 않아<emoji=heart04> 자지, 가게 만들어 줄게<emoji=heart04>」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ほら、早く出せっ<emoji=heart04>\u3000私の中にぶちまけろ<emoji=heart04>\u3000出せっ<emoji=heart04>\u3000出せ、出せっ<emoji=heart04>」"
translation = "「자, 어서 내보내<emoji=heart04> 내 안에 쏟아부어<emoji=heart04> 내보내<emoji=heart04> 내보내, 내보내<emoji=heart04>」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「魔王の精液、搾り取って、やるっ<emoji=heart04>\u3000ふぁああっ<emoji=heart04>\u3000ああんっ<emoji=heart04>\u3000勝つのは、私、だぁっ<emoji=heart04>\u3000ひぁっ、あああっ<emoji=heart04>」"
translation = "「마왕의 정액, 짜내, 줄게<emoji=heart04> 화아앗<emoji=heart04> 아안앗<emoji=heart04> 이기는 건, 나, 다앗<emoji=heart04> 히앗, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "絶頂寸前まで追い詰められ、自爆覚悟で激しくお尻を叩きつけてくる梨緒。"
translation = "절정 직전까지 몰려, 자폭할 각오로 격렬하게 엉덩이를 부딪쳐 오는 리오."

[[dialogue]]
speaker = "unk"
original = "お互い絶頂寸前で、相手にイけと念じながらひたすら腰を動かす。"
translation = "서로 절정 직전에서, 상대에게 가라고 염원하며 오로지 허리를 움직인다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「んんん～～っ<emoji=heart04>\u3000イクっ<emoji=heart04>\u3000おま○こイッちゃうぅっ<emoji=heart04>\u3000あ──あ──あ──ふぁああ～～っ<emoji=heart04>」"
translation = "「응응응~~앗<emoji=heart04> 간다<emoji=heart04> 보지 가버려어엇<emoji=heart04> 아──아──아──화아아아~~앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「だけど、その前に、イかせてやるっ<emoji=heart04>\u3000ひぁああっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000お腹の奥に、出せっ<emoji=heart04>\u3000私の中に、熱い精液、出せぇっ<emoji=heart04>」"
translation = "「하지만, 그 전에, 가게 해 줄게<emoji=heart04> 히아아앗<emoji=heart04> 앗<emoji=heart04> 응응<emoji=heart04> 배 깊숙한 곳에, 내보내<emoji=heart04> 내 안에, 뜨거운 정액, 내보내엣<emoji=heart04>」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「んぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000おま○こイクっ<emoji=heart04>\u3000イクイクっ<emoji=heart04>\u3000精液出してほしくて、キュンキュンするっ<emoji=heart04>」"
translation = "「응앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 보지 간다<emoji=heart04> 가버려 가버려<emoji=heart04> 정액 내보내 주길 원해서, 큥큥거려<emoji=heart04>」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「私がイク前に、イけっ<emoji=heart04>\u3000イけイけイけっ<emoji=heart04>\u3000おち○ちんイッけぇっ<emoji=heart04>\u3000ふぁっ<emoji=heart04>\u3000ああぁっ<emoji=heart04>\u3000あ──あ──あ──んんっ──」"
translation = "「내가 가기 전에, 가<emoji=heart04> 가버려 가버려 가버려<emoji=heart04> 자지 가버려어엇<emoji=heart04> 화앗<emoji=heart04> 아아앗<emoji=heart04> 아──아──아──응응──」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ひぃああっ<emoji=heart04>\u3000ああっ──ふぁあああぁ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「히이아앗<emoji=heart04> 아앗──화아아아아아~~~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「んんっ<emoji=heart04>\u3000んんん～～～っ<emoji=heart04>\u3000熱いの、ビュクビュクって、出てるっ<emoji=heart04>\u3000はぁ、はっ<emoji=heart04>\u3000おま○こイッてるぅ～っ<emoji=heart04>」"
translation = "「응응<emoji=heart04> 응응응~~~앗<emoji=heart04> 뜨거운 거, 울컥울컥하고, 나오고 있어<emoji=heart04> 하아, 핫<emoji=heart04> 보지 가고 있어어~앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "梨緒と同時に達し、膣の奥で精をぶちまける。"
translation = "리오와 동시에 달하여, 질 깊숙한 곳에서 정을 쏟아붓는다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ふああぁっ──あっ──あああぁっ<emoji=heart04>\u3000子宮に、おち○ちん、ぐりぐりされながら、精液、出されてるっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000ああぁっ<emoji=heart04>」"
translation = "「화아아앗──앗──아아아앗<emoji=heart04> 자궁에, 자지, 구릿구릿 비벼지면서, 정액, 나오고 있어<emoji=heart04> 응응<emoji=heart04> 아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「おち○ちんドクドク脈打って……はぁああっ<emoji=heart04>\u3000子宮が、精液で、いっぱいにされるぅっ<emoji=heart04>\u3000あっ……はぁ……まだ出て……ふあぁ……<emoji=heart04>」"
translation = "「자지가 맥동하며 두근두근거려서…… 하아아앗<emoji=heart04> 자궁이, 정액으로, 가득 채워져어엇<emoji=heart04> 앗…… 하아…… 아직 나오고…… 화아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "強く締め付けてくる膣の圧力と、尻肉の柔らかさを味わいながら、梨緒の中に全て吐き出した。"
translation = "강하게 조여오는 질의 압력과, 엉덩잇살의 부드러움을 맛보며, 리오의 안에 모든 것을 뱉어냈다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「はーっ……はーっ……はーっ……<emoji=heart04>」"
translation = "「하아…… 하아…… 하아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "快楽の波に呑まれ、荒い息を吐くことしかできない。"
translation = "쾌락의 파도에 휩쓸려, 거친 숨을 내뱉는 것밖에 할 수 없다."

[[dialogue]]
speaker = "unk"
original = "ペニスが抜けた膣口から、白濁がどろりと垂れ落ちる。"
translation = "페니스가 빠진 질구에서, 백탁액이 걸쭉하게 흘러내린다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「引き分け……だな。あともう少しで、私の勝ちだったのに……」"
translation = "「무승부……네. 조금만 더 있었으면, 내가 이기는 거였는데……」"

[[dialogue]]
speaker = "unk"
original = "俺も梨緒も同時に絶頂し、どっと疲労感が襲い掛かる。"
translation = "나도 리오도 동시에 절정하여, 확 피로감이 엄습한다."

[[dialogue]]
speaker = "unk"
original = "梨緒の目は強い光を宿したままで……"
translation = "리오의 눈은 강한 빛을 머금은 채로……"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「だが私はこの程度では引き下がらない。休憩したらもう一戦だ。決着がつくまでやるぞ」"
translation = "「하지만 난 이 정도로 물러나지 않아. 휴식하면 한 판 더다. 결판이 날 때까지 할 거야」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「もちろん付き合ってくれるな……魔王？」"
translation = "「물론 어울려 주겠지…… 마왕?」"

[[dialogue]]
speaker = "unk"
original = "梨緒らしい負けず嫌いと諦めの悪さ。そして俺はそんな梨緒が好きだ。"
translation = "리오다운 지기 싫어함과 끈질김. 그리고 나는 그런 리오가 좋다."

[[dialogue]]
speaker = "unk"
original = "だけどお互いイかせ合おうとヘトヘトになってしまい、少しの休憩とはならず、結局ホテルに泊まることになったのだった。"
translation = "하지만 서로 가게 만들려고 녹초가 되어 버려, 짧은 휴식이 되지 못하고, 결국 호텔에 묵게 된 것이었다."

