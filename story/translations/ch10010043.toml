[[dialogue]]
speaker = "unk"
original = "第３話,フィオナの初夢,P"
translation = "제3화, 피오나의 첫 꿈"

[[dialogue]]
speaker = "unk"
original = "守護天使オオヒメの解放から少し経った朝。おせちにお雑煮と、２人で正月らしい朝食を満喫していた。"
translation = "수호천사 오오히메의 해방으로부터 조금 지난 아침. 오세치 요리에 오조니(떡국)까지, 둘이서 정월다운 아침 식사를 만끽하고 있었다."

[[dialogue]]
speaker = "フィオナ"
original = "「おせちはどれもキリカに教わって作りました。特に伊達巻は自信作です」"
translation = "「오세치 요리는 전부 키리카에게 배워서 만들었어요. 특히 다테마키는 자신작입니다」"

[[dialogue]]
speaker = "unk"
original = "以前、卵焼きマイスターとなった彼女の自信作とあっては、期待せざるを得ない。ひとつ口に運ぶ。"
translation = "이전에 달걀말이 마이스터가 된 그녀의 자신작이라고 하니, 기대하지 않을 수 없다. 하나 입으로 가져간다."

[[dialogue]]
speaker = "unk"
original = "とてつもなくおいしい！"
translation = "엄청나게 맛있다!"

[[dialogue]]
speaker = "フィオナ"
original = "「お口に合ったようで何よりです。……今まで食べた中で一番おいしい、ですか？\u3000それはさすがに言い過ぎなのでは……？」"
translation = "「입에 맞으신 것 같아 무엇보다 기쁩니다. ……지금까지 먹어본 것 중에서 가장 맛있다,고요? 그건 아무리 그래도 과장이 아닐까요……?」"

[[dialogue]]
speaker = "フィオナ"
original = "「ふわふわ食感と出汁の旨みが合わさって……まさに完璧な伊達巻？\u3000も、もう、お上手なんですから……」"
translation = "「폭신폭신한 식감과 육수의 감칠맛이 어우러져…… 그야말로 완벽한 다테마키? 모, 정말, 칭찬이 과하시네요……」"

[[dialogue]]
speaker = "フィオナ"
original = "「では、私も緋宮会長のお雑煮をいただきますね」"
translation = "「그럼, 저도 히노미야 회장님의 오조니를 먹겠습니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「あれ？\u3000でもリノさんは魔女だから……うちは見様見真似？\u3000ふふ、そうなんですね。でもちゃんとしたお雑煮に見えます」"
translation = "「어라? 하지만 리노 씨는 마녀라서…… 우리 집은 어깨너머로 배운 것? 후후, 그렇군요. 하지만 제대로 된 오조니로 보여요」"

[[dialogue]]
speaker = "フィオナ"
original = "「シンプルな醤油のすまし汁で……だからこそカツオ節をしっかり感じますね。骨太な味わいで美味しいです」"
translation = "「심플한 간장 맑은장국으로…… 그래서인지 가다랑어포를 확실히 느낄 수 있네요. 굵직한 맛으로 맛있습니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「今日はこれからお出かけしませんか？\u3000２人きりで初詣に行きたいんです」"
translation = "「오늘은 이제부터 외출하지 않으시겠어요? 둘이서만 신년 참배를 가고 싶어요」"

[[dialogue]]
speaker = "フィオナ"
original = "「私に合わせて袴をレンタルしてくれたんですね。よくお似合いですよ。和服もかっこいいです」"
translation = "「저에게 맞춰서 하카마를 빌려주셨군요. 아주 잘 어울리세요. 일본 옷도 멋있습니다」"

[[dialogue]]
speaker = "unk"
original = "フィオナも華やかですごく綺麗だ"
translation = "피오나도 화려하고 무척 아름답다"

[[dialogue]]
speaker = "フィオナ"
original = "「ありがとうございます。でも、やっぱり大胆すぎるような……」"
translation = "「감사합니다. 하지만, 역시 너무 대담한 것 같아서……」"

[[dialogue]]
speaker = "フィオナ"
original = "「いえ、せっかくあなたに綺麗だと言ってもらえたんです。堂々としています」"
translation = "「아뇨, 모처럼 당신에게 아름답다는 말을 들었으니까요. 당당하게 있겠습니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「こんなときにモンスター！？\u3000しかも近い！」"
translation = "「이런 때에 몬스터!? 게다가 가깝다!」"

[[dialogue]]
speaker = "モンスター"
original = "「イ～～～～！」"
translation = "「이~~~~!」"

[[dialogue]]
speaker = "フィオナ"
original = "「厄介な新型もいないようですし、早く倒してしまいましょう。まずは可愛くないのから！」"
translation = "「성가신 신형도 없는 것 같고, 빨리 쓰러뜨려 버리죠. 우선은 귀엽지 않은 것부터!」"

[[dialogue]]
speaker = "unk"
original = "可愛くないのってどれ！？"
translation = "귀엽지 않은 거라니 어떤 거!?"

[[dialogue]]
speaker = "フィオナ"
original = "「あれです！\u3000羽の生えたやつ！\u3000……いえ、そっちの可愛いのではなく！」"
translation = "「저거예요! 날개가 달린 녀석! ……아뇨, 그쪽의 귀여운 것이 아니라!」"

[[dialogue]]
speaker = "モンスター"
original = "「イ～～……」"
translation = "「이~……」"

[[dialogue]]
speaker = "フィオナ"
original = "「うう～……仕方ありません、一気に片付けます！」"
translation = "「으으~…… 어쩔 수 없네요, 단숨에 해치우겠습니다!」"

[[dialogue]]
speaker = "フィオナ"
original = "「星見流羽根突術・曙！」"
translation = "「호시미류 하네츠키술・새벽!」"

[[dialogue]]
speaker = "モンスター"
original = "「イ～～～～ッ！？」"
translation = "「이~~~~윽!?」"

[[dialogue]]
speaker = "フィオナ"
original = "「はぁ……すみません、緋宮会長。私のせいでこんなことになってしまうなんて……」"
translation = "「하아…… 죄송합니다, 히노미야 회장. 제 탓에 이런 일이 벌어지다니……」"

[[dialogue]]
speaker = "unk"
original = "フィオナのせい？"
translation = "피오나의 탓?"

[[dialogue]]
speaker = "フィオナ"
original = "「戦っている最中に思い出したんです。今年の初夢を」"
translation = "「싸우는 도중에 생각났어요. 올해의 첫 꿈이」"

[[dialogue]]
speaker = "フィオナ"
original = "「可愛らしいモンスターと戯れる夢だったんですが、まさか現実になってしまうなんて……」"
translation = "「귀여운 몬스터와 노는 꿈이었는데, 설마 현실이 되어버릴 줄이야……」"

[[dialogue]]
speaker = "unk"
original = "フィオナのセンスは独特だ。少しでも丸ければ、ほぼ１００パーセント可愛い判定されてしまう。例え、それがモンスターであっても。"
translation = "피오나의 센스는 독특하다. 조금이라도 둥글면, 거의 100퍼센트 귀엽다고 판정되어 버린다. 설령, 그것이 몬스터일지라도."

[[dialogue]]
speaker = "フィオナ"
original = "「もちろん、モンスターは世界を脅かすもの。戦いに手加減などありえません。でも、自分の手で倒すのはちょっぴり心が痛みます……」"
translation = "「물론, 몬스터는 세계를 위협하는 존재. 싸움에 봐주기란 있을 수 없어요. 하지만, 제 손으로 쓰러뜨리는 건 조금 마음이 아파요……」"

[[dialogue]]
speaker = "フィオナ"
original = "「どのモンスターが可愛いと思うか、ですか？\u3000ちょっとＤＩＳＣで画像を見せてもらえます？」"
translation = "「어떤 몬스터가 귀엽다고 생각하냐고요? 잠깐 DISC로 이미지를 보여주시겠어요?」"

[[dialogue]]
speaker = "フィオナ"
original = "「一番よく見るモンスターですね。もちろん可愛いです」"
translation = "「가장 자주 보는 몬스터네요. 물론 귀엽습니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「まるまるブヨブヨで、可愛いです」"
translation = "「둥글둥글 물컹물컹해서, 귀여워요」"

[[dialogue]]
speaker = "フィオナ"
original = "「鳥型のは可愛いとは思えないですね……」"
translation = "「새 모양은 귀엽다고 생각되지 않네요……」"

[[dialogue]]
speaker = "フィオナ"
original = "「大型モンスターなので、実際に対峙したらそれどころじゃないですけど、見た目は可愛いと思います」"
translation = "「대형 몬스터라서, 실제로 마주치면 그럴 상황이 아니겠지만, 외형은 귀엽다고 생각해요」"

[[dialogue]]
speaker = "フィオナ"
original = "「煌竜ヴィライアじゃないですか！\u3000これを可愛いと思える人っているんでしょうか……」"
translation = "「황룡 빌라이아가 아닌가요! 이걸 귀엽다고 생각할 수 있는 사람이 있을까요……」"

[[dialogue]]
speaker = "unk"
original = "（やっぱり丸いかどうかが大事なのか……）"
translation = "（역시 둥근지 아닌지가 중요한 건가……）"

[[dialogue]]
speaker = "フィオナ"
original = "「こ、これは……！！」"
translation = "「이, 이것은……!!」"

[[dialogue]]
speaker = "フィオナ"
original = "「可愛い！\u3000文句なしの可愛さです！\u3000緋宮会長、いつどこで遭遇したんですか！？\u3000この画像、私のＤＩＳＣにも送ってください！」"
translation = "「귀여워요! 나무랄 데 없는 귀여움입니다! 히노미야 회장, 언제 어디서 조우하신 건가요!? 이 이미지, 제 DISC에도 보내주세요!」"

[[dialogue]]
speaker = "unk"
original = "他にも画像を見てもらったが、ディーラックがまさかの優勝。これで俺もフィオナのことをもっとよく知れた……と思う。"
translation = "그 외에도 이미지를 보여줬지만, 디럭쿠가 설마 했던 우승. 이걸로 나도 피오나에 대해 더 잘 알게 되었다……고 생각한다."

[[dialogue]]
speaker = "unk"
original = "後日──"
translation = "훗날──"

[[dialogue]]
speaker = "フィオナ"
original = "「おかえりなさい、あなた。あれ、その手に持っているのは……？」"
translation = "「어서 오세요, 당신. 어라, 그 손에 들고 있는 것은……?」"

[[dialogue]]
speaker = "unk"
original = "これ、よかったらもらってほしい"
translation = "이거, 괜찮다면 받아줬으면 해"

[[dialogue]]
speaker = "フィオナ"
original = "「これは……モンスターのぬいぐるみ！？\u3000どこで売って……いえ、モンスターのぬいぐみなんて、売っているはずがありません」"
translation = "「이것은…… 몬스터 인형!? 어디서 팔고…… 아뇨, 몬스터 인형 같은 건, 팔고 있을 리가 없어요」"

[[dialogue]]
speaker = "フィオナ"
original = "「もしかして手作り……ええ、やっぱりそうなんですね」"
translation = "「혹시 직접 만드신…… 네, 역시 그렇군요」"

[[dialogue]]
speaker = "フィオナ"
original = "「本当に嬉しいです。モンスターを可愛らしく思うことは、許されないと思っていたので……絶対に大切にします」"
translation = "「정말로 기쁩니다. 몬스터를 귀엽게 생각하는 것은, 용서받지 못할 거라고 생각했었기에…… 반드시 소중히 할게요」"

[[dialogue]]
speaker = "フィオナ"
original = "「ふふふ♪\u3000初夢、叶っちゃいましたね」"
translation = "「후후후♪ 첫 꿈, 이루어졌네요」"

[[dialogue]]
speaker = "unk"
original = "それから、フィオナがうちにいる間、ぬいぐるみは枕元に置かれたのだった。"
translation = "그리고 나서, 피오나가 집에 있는 동안, 인형은 머리맡에 놓였다."

