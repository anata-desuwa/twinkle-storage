[[dialogue]]
speaker = "unk"
original = "第１話,アルタイル,P"
translation = "제1화, 알타이르, P"

[[dialogue]]
speaker = "unk"
original = "別世界であるデネブから、元いた世界アルタイルへと戻ってきて──"
translation = "다른 세계인 데네브에서 원래 있던 세계인 알타이르로 돌아와서──"

[[dialogue]]
speaker = "unk"
original = "その際に保護したエステルの身柄は、極星学園との戦いが収まるまで星見家で預かることになった。"
translation = "그때 보호한 에스텔의 신변은 극성 학원과의 싸움이 진정될 때까지 호시미 가문에서 맡기로 했다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「戦いがいつまで続くかはわかりませんが、それまでの間は当家でゆっくりお過ごしください」"
translation = "「싸움이 언제까지 계속될지는 모르겠습니다만, 그때까지는 당가에서 편히 지내주십시오.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「別世界からやってきて戸惑うことも多いだろう。似た境遇に身を置く者同士、助け合っていこう」"
translation = "「다른 세계에서 건너와서 당황스러운 일도 많겠지. 비슷한 처지에 놓인 이들끼리 서로 돕고 살자고.」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「フィオナさん、梨緒さん、ありがとうございます」"
translation = "「피오나 씨, 리오 씨, 감사합니다.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ナミエル。エステルさんの身の回りのお世話はお願いね」"
translation = "「나미엘. 에스텔 씨의 신변 수발을 부탁해.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「お任せください、フィオナお嬢様」"
translation = "「맡겨주십시오, 피오나 아가씨.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「エステルさま、ナミエルと申します。こちらの世界にご滞在の間、身の回りのお世話をさせていただきます。どうぞよろしくお願い致します」"
translation = "「에스텔 님, 나미엘이라고 합니다. 이쪽 세계에 머무시는 동안 신변 수발을 들도록 하겠습니다. 아무쪼록 잘 부탁드립니다.」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「これはご丁寧に。こちらこそよろしくお願いしますね、ナミエルさん」"
translation = "「이거 정중하시기도 해라. 저야말로 잘 부탁드려요, 나미엘 씨.」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「けれど、こんなに色々していただいて良いのでしょうか？\u3000何だか申し訳なくなってしまいます」"
translation = "「그렇지만, 이렇게나 여러모로 배려받아도 괜찮은 걸까요? 왠지 죄송스러운 마음이 드네요.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「遠慮することはないですよ。エステルさんは大切なお客様なのですから」"
translation = "「사양하실 것 없어요. 에스텔 씨는 소중한 손님이시니까요.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「はい、何なりとお申し付けください」"
translation = "「네, 무엇이든 말씀만 해 주십시오.」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「ありがとうございます」"
translation = "「감사합니다.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「おーい！\u3000新しくうちで過ごすことになったって奴がいるんだろ？\u3000顔を見に来たぞ！」"
translation = "「어ー이! 새로 우리 집에서 지내게 됐다는 녀석이 있다며? 얼굴 보러 왔다구!」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「あら……？」"
translation = "「어라……?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「どれどれ、ふーん……こいつか。あたしはアポロだ、よろしくなっ！」"
translation = "「어디 어디, 흠…… 이 녀석인가. 난 아폴로다, 잘 부탁해!」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「アポロさん！\u3000やはりあなたはアポロさんなのですね！？」"
translation = "「아폴로 씨! 역시 당신은 아폴로 씨인 거군요!?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「そうだ。彼女がこちらの世界のアポロだ」"
translation = "「그렇다. 그녀가 이쪽 세계의 아폴로야.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ん？\u3000それってもしかして……デネブであっちのあたしと会ったのか！？」"
translation = "「응? 그 말은 혹시…… 데네브에서 저쪽의 나랑 만난 거야!?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「そうなんだ。もっとも向こうの世界のアポロは、君よりもずっと大人びた姿をしていたがな」"
translation = "「그렇단다. 다만 저쪽 세계의 아폴로는 너보다 훨씬 어른스러운 모습이었지만 말이야.」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「はい。ですからひと目見ただけでは分かりませんでしたけど……確かにその面影はあります」"
translation = "「네. 그래서 한눈에 봐서는 알아보지 못했습니다만…… 확실히 그 면모가 남아있네요.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「……どういうことだ？\u3000あっちのあたしはそんなに成長してるってことか？」"
translation = "「……어떻게 된 거야? 저쪽의 나는 그렇게 성장해 있다는 뜻이야?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「むぅぅ……！\u3000使徒としてアルタイルに居た時は、今のあたしと同じ体型だったってのに！」"
translation = "「으으으……! 사도로서 알타이르에 있었을 때는 지금의 나랑 똑같은 체형이었는데!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「というか寸分たがわず同じ体型でしたね」"
translation = "「그보다 추호도 다름없이 똑같은 체형이었죠.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「そうだ！\u3000それがなんで向こうのあたしだけ、そんな大人になってるんだ！\u3000ずるいっ！」"
translation = "「그래! 그런데 왜 저쪽의 나만 그렇게 어른이 되어 있는 거야! 치사해!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「まあまあ、落ち着いてください姉さん。将来姉さんが成長したら同じような姿になるという保証が出来たわけですから」"
translation = "「자자, 진정하세요 언니. 장래에 언니가 성장하면 비슷한 모습이 될 거라는 보장이 생긴 셈이니까요.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「そうか……だったらまあいいか」"
translation = "「그런가…… 그렇다면 뭐 상관없나.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「よろしくな、ええと……」"
translation = "「잘 부탁해, 에……」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「エステルです、よろしくお願いします」"
translation = "「에스텔입니다, 잘 부탁드려요.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「おうっ！！！」"
translation = "「오우!!!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「……真っ先に、大聖堂へ案内して欲しいなんて。どこでも案内してやるって言ってるのに」"
translation = "「……가장 먼저 대성당으로 안내해 달라고 하다니. 어디든 안내해 주겠다고 했는데 말이야.」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「ふふっ、ありがとうございます。でも、まずは女神様への祈りを捧げたくて」"
translation = "「후훗, 감사합니다. 하지만 우선은 여신님께 기도를 드리고 싶어서요.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ふーん……変わったやつだな」"
translation = "「흐음…… 특이한 녀석이네.」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「いえいえ、素晴らしいお心がけだと思います！」"
translation = "「아니요, 아주 훌륭한 마음가짐이라고 생각합니다!」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「あなた方は……」"
translation = "「당신들은……」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「こちらの大聖堂にてお勤めさせて頂いているシスター、シャロン・ミストリアと申します」"
translation = "「이곳 대성당에서 소임을 다하고 있는 수녀, 샤론 미스트리아라고 합니다!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「神官のイレーナ・ロレンツェッティです。ようこそおいで下さいました」"
translation = "「신관인 이레이나 로렌체티야. 잘 왔어.」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「初めまして、エステル・ミルフォードと申します」"
translation = "「처음 뵙겠습니다, 에스텔 밀포드라고 합니다.」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「こちらの世界に来て、まず何より先に大聖堂へ足を運んでくださるなんて……エステルさまは深い信仰心をお持ちなのですね」"
translation = "「이쪽 세계에 오셔서 다른 무엇보다 먼저 대성당으로 발걸음을 해 주시다니…… 에스텔 님은 깊은 신앙심을 갖고 계시는군요.」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「深い信仰心……もちろん女神様への信仰は忘れたことはありません」"
translation = "「깊은 신앙심…… 물론 여신님에 대한 신앙을 잊은 적은 없습니다.」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「ですが私が祈るのは、リクリエによって犠牲となった方々に対して、哀悼の気持ちを忘れずに持ち続けたいからなのです」"
translation = "「하지만 제가 기도하는 것은, 리크리에로 인해 희생된 분들에 대해 애도의 마음을 잊지 않고 계속 간직하고 싶기 때문입니다.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「エステル……おまえ……」"
translation = "「에스텔…… 너……」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「デネブは、リクリエによって甚大な被害を受けました」"
translation = "「데네브는 리크리에에 의해 막대한 피해를 입었습니다.」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「多くの人々がその犠牲となりました。魔王様がいなければあの時、私もその犠牲者の１人となっていたでしょう」"
translation = "「수많은 사람들이 그 희생양이 되었죠. 마왕님이 계시지 않았다면 그때 저도 그 희생자 중 한 명이 되었을 겁니다.」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「こうして救われた私が、亡くなった方々のために出来ることといえば……祈りをささげることだけですから。そうですよね、魔王様」"
translation = "「이렇게 구원받은 제가 돌아가신 분들을 위해 할 수 있는 일이라곤…… 기도를 올리는 것뿐이니까요. 그렇죠, 마왕님?」"

[[dialogue]]
speaker = "unk"
original = "エステルの祈りで救われてる"
translation = "에스텔의 기도로 구원받고 있어."

[[dialogue]]
speaker = "unk"
original = "そうかもしれないな"
translation = "그럴지도 모르겠네."

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「エステルさま……色々とお辛いご経験をされてきたのですね？」"
translation = "「에스텔 님…… 여러 가지로 고통스러운 경험을 해오셨군요?」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「私は今、切実に思いますっ。あなたのお力になりたいと！」"
translation = "「저 지금 절실하게 생각해요! 당신의 힘이 되어드리고 싶다고요!」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「何かして欲しいことはありませんかっ？\u3000元気の出るおまじないをかけますかっ？\u3000それとも心の落ち着くマッサージはいかがですかっ？」"
translation = "「뭐든 원하시는 건 없나요? 활력이 솟는 주문을 걸어드릴까요? 아니면 마음이 편안해지는 마사지는 어떠신가요?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「シャロン……落ち着いてください」"
translation = "「샤론…… 진정해.」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「ふふっ、ありがとうございますシャロンさん。お気持ちだけでもとても嬉しいです」"
translation = "「후훗, 감사합니다 샤론 씨. 마음만으로도 정말 기뻐요.」"

[[dialogue]]
speaker_original = "エステル"
speaker_translation = "에스텔"
original = "「そうですね……ではシャロンさん、私と一緒に祈って頂けないでしょうか？\u3000デネブと、アルタイルの、尊い犠牲者のために」"
translation = "「그렇네요…… 그럼 샤론 씨, 저와 함께 기도해 주시지 않겠어요? 데네브와 알타이르의 숭고한 희생자들을 위해서요.」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「もちろんですっ。共に祈りましょう、エステルさまっ」"
translation = "「물론이죠! 함께 기도해요, 에스텔 님!」"

[[dialogue]]
speaker = "unk"
original = "２人は揃って女神様への祈りを捧げ始める。"
translation = "두 사람은 나란히 여신님께 기도를 드리기 시작한다."

[[dialogue]]
speaker = "unk"
original = "少し話を聞いただけでも、エステルとシャロンの相性は抜群に良さそうだった。"
translation = "조금 이야기를 나눈 것만으로도 에스텔과 샤론의 궁합은 굉장히 좋아 보였다."

[[dialogue]]
speaker = "unk"
original = "逆にイレーナは、面倒な子が増えたかもしれない、とでも言いたげな表情を浮かべながら、祈りをささげる様子を眺めていたのだった。"
translation = "반대로 이레이나는 귀찮은 애가 늘었을지도 모른다는 듯한 표정을 지으며 기도하는 모습을 지켜보고 있었다."

