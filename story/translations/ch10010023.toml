[[dialogue]]
speaker = "unk"
original = "第３話,水着でキャンプ！,P"
translation = "제3화, 수영복으로 캠프!, P"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「こんにちは、緋宮会長。ご足労いただきありがとうございます」"
translation = "「안녕하세요, 히노미야 회장. 와주셔서 감사합니다.」"

[[dialogue]]
speaker = "unk"
original = "先日の合宿はリップルのおかげで楽しく過ごせたものの、あまり合宿らしくはなかったので、改めて海辺でキャンプをしようということになったのだった。"
translation = "지난번 합숙은 리플 덕분에 즐겁게 보냈지만, 너무 합숙답지 않았기 때문에, 다시 해변에서 캠프를 하기로 한 것이었다."

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「ここは星見家メイド隊の教導施設の一部、つまり私たちの修行の場です。部外者は立ち入りませんのでご安心ください」"
translation = "「여기는 호시미 가문 메이드대의 교도 시설 일부, 즉 저희의 수련장입니다. 외부인은 출입할 수 없으니 안심하십시오.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「食材はメイド長が用意しましたが、釣りや素潜りで魚を獲ることも可能です」"
translation = "「식재료는 메이드장이 준비했지만, 낚시나 맨몸 잠수로 물고기를 잡는 것도 가능합니다.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「シャワーとトイレはあちらに。着替えも用意しております。他にもご要望があればお申し付けください」"
translation = "「샤워실과 화장실은 저쪽에. 갈아입을 옷도 준비해 두었습니다. 그 외에도 요청 사항이 있으시면 말씀해 주십시오.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「何から何までありがとう、ナミエル」"
translation = "「이것저것 전부 고마워요, 나미엘」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「いいえ。フィオナお嬢様にご不便を強いたとあれば、このナミエル、星見家に合わせる顔がございませんから」"
translation = "「아닙니다. 피오나 아가씨께 불편을 드린다면, 이 나미엘, 호시미 가문에 얼굴을 들 수 없으니까요.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「緋宮会長。私は近くに待機しておりますので、くれぐれも間違いなど起こさぬようご注意ください。もし何かあれば私とメイド長が地の果てまで追いかけます」"
translation = "「히노미야 회장. 저는 근처에 대기하고 있을 테니, 부디 실수 같은 것은 저지르지 않도록 주의하십시오. 만약 무슨 일이라도 생기면 저와 메이드장이 땅끝까지 쫓아갈 것입니다.」"

[[dialogue]]
speaker_original = "ナミエル"
speaker_translation = "나미엘"
original = "「では１泊２日の海キャンプ、お楽しみください」"
translation = "「그럼 1박 2일 해변 캠프, 즐기십시오.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「まずは何をしましょうか？\u3000私はあまりキャンプの経験がないので、緋宮会長を頼らせてください」"
translation = "「우선 무엇을 할까요? 저는 캠프 경험이 별로 없으니, 히노미야 회장에게 의지하게 해 주세요.」"

[[dialogue]]
speaker = "unk"
original = "とりあえずテント！"
translation = "일단 텐트!"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「そうでした、キャンプといえばテント！\u3000これがないと寝るところがありませんからね」"
translation = "「그랬죠, 캠프 하면 텐트! 이게 없으면 잘 곳이 없으니까요.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ふむふむ……テントを広げて……フレームを通して……テントらしくなってきました」"
translation = "「흠흠…… 텐트를 펼치고…… 프레임을 통과시키고…… 텐트다워졌습니다.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「フレームを繋げて……あ、ちゃんとテントになりました！\u3000もっと複雑かと思っていたんですけど、けっこう手軽にできるんですね」"
translation = "「프레임을 연결하고…… 아, 제대로 텐트가 되었어요! 더 복잡할 거라고 생각했는데, 꽤 간단하게 할 수 있네요.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「上にフライシートをかけて、ペグで地面に固定して……テントの完成です！\u3000テントがあるだけでもずいぶんキャンプらしくなった気がします」"
translation = "「위에 플라이 시트를 덮고, 펙으로 땅에 고정해서…… 텐트 완성입니다! 텐트가 있는 것만으로도 꽤 캠프다워진 기분이 듭니다.」"

[[dialogue]]
speaker = "unk"
original = "次はバーベキュー！"
translation = "다음은 바비큐!"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「！\u3000いいですね、私もバーベキューしてみたかったんです」"
translation = "「! 좋네요, 저도 바비큐 해보고 싶었어요.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「確か炭と道具はナミエルが用意してくれたはず……あ、ありました。お肉と野菜も串に刺してありますね」"
translation = "「분명 숯과 도구는 나미엘이 준비해 줬을 텐데…… 아, 있었어요. 고기와 채소도 꼬치에 꽂혀 있네요.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「火はどうすれば……はい、空気が入るように炭をバーベキューコンロに並べて……これでいいですか？」"
translation = "「불은 어떻게 해야…… 네, 공기가 통하도록 숯을 바비큐 그릴에 늘어놓고…… 이걸로 됐나요?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「すぐに炭に火がつかないから、着火剤も必要……？\u3000なるほど、着火剤が燃えている間に炭に火がつくんですね」"
translation = "「바로 숯에 불이 붙지 않으니까, 착화제도 필요……? 과연, 착화제가 타고 있는 동안 숯에 불이 붙는군요.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「うちわで扇いで……あ、炭が赤くなってきました。では焼いていきましょう」"
translation = "「부채로 부치고…… 아, 숯이 빨갛게 달아올랐습니다. 그럼 구워 봅시다.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「おお……炭の火力で肉がじゅ～っと焼けて……いい匂いです♪」"
translation = "「오오…… 숯불 화력으로 고기가 지글~하고 구워져서…… 좋은 냄새예요♪」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「そろそろいけそうでしょうか？\u3000……もうちょっと焼いた方がいい？\u3000そうですね、ちゃんと中まで火を通さないと」"
translation = "「슬슬 먹을 수 있을까요? ……좀 더 구워야 할까요? 그렇네요, 제대로 속까지 익혀야죠.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「普段は食事の用意もメイドたちがしてくれますから、こうして自分で調理するのも新鮮です」"
translation = "「평소에는 식사 준비도 메이드들이 해 주니까, 이렇게 직접 조리하는 것도 신선합니다.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「もう食べられそうですね……わっ、熱い。とてもおいしそう……。串から外した方が食べやすいですかね？」"
translation = "「이제 먹을 수 있을 것 같네요…… 앗, 뜨거워. 정말 맛있을 것 같아요……. 꼬치에서 빼서 먹는 게 더 편할까요?」"

[[dialogue]]
speaker = "unk"
original = "ここはワイルドにがぶっと！"
translation = "여기는 와일드하게 덥석!"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「そうですね、せっかくのバーベキューですから豪快にいただきます。あ～ん」"
translation = "「그렇네요, 모처럼의 바비큐이니 호쾌하게 먹겠습니다. 아~앙」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ん～♪\u3000おいし～♪」"
translation = "「음~♪ 맛있~어♪」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ほら、お肉はまだまだありますから、緋宮会長も食べてください」"
translation = "「자, 고기는 아직 많이 있으니, 히노미야 회장도 드세요.」"

[[dialogue]]
speaker = "unk"
original = "おいしい！"
translation = "맛있다!"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ですよね。海辺で食べると、普段と違う味わいがあります」"
translation = "「그렇죠. 해변에서 먹으니, 평소와 다른 맛이 있어요.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「……デザートにはスモア？\u3000それはいったい？\u3000焼いたマシュマロとチョコをビスケットに挟んで……確かにバーベキューにピッタリですね。とってもおいしそうです♪」"
translation = "「……디저트로는 스모어? 그건 대체? 구운 마시멜로와 초콜릿을 비스킷에 끼워서…… 확실히 바비큐에 딱이네요. 정말 맛있을 것 같아요♪」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「そうだ、食べたらカヤックに乗りませんか？\u3000２人で乗ってもいいですし、競走してもいいですし」"
translation = "「맞다, 먹고 나면 카약을 타지 않을래요? 둘이서 타도 좋고, 시합을 해도 좋고요.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「もちろん釣りだってしたいです。さ、海を楽しみましょう！」"
translation = "「물론 낚시도 하고 싶어요. 자, 바다를 즐겨요!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「すっかり日が暮れてしまいましたね」"
translation = "「완전히 해가 져 버렸네요.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「う……夜になると、夏でもさすがに肌寒いですね……」"
translation = "「으…… 밤이 되니, 여름이라도 역시 쌀쌀하네요……」"

[[dialogue]]
speaker = "unk"
original = "こっち来て"
translation = "이리 와"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「あ……」"
translation = "「아……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ふふ、こうしてくっついていると温かいですね」"
translation = "「후후, 이렇게 붙어 있으니 따뜻하네요.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「見てください。夜空が綺麗ですよ。流星市国でも星は見えますけど、海で見る星はまた違った趣があります」"
translation = "「보세요. 밤하늘이 아름다워요. 유성 시국에서도 별은 보이지만, 바다에서 보는 별은 또 다른 정취가 있습니다.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「空に輝くあの星たちが、私たちに力を貸してくれてるんですね。昼間はあんなに眩しかったのに、今はこんなに落ち着いていて……不思議な気分です」"
translation = "「하늘에 빛나는 저 별들이, 우리에게 힘을 빌려주고 있는 거네요. 낮에는 그렇게 눈부셨는데, 지금은 이렇게 차분해서…… 신기한 기분입니다.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「もう少し……このままでいいですか？\u3000今夜は一緒に星を見ていたい気分なんです」"
translation = "「조금 더…… 이대로 있어도 괜찮을까요? 오늘 밤은 함께 별을 보고 싶은 기분이에요.」"

