[[dialogue]]
speaker = "エリス"
original = "「くっ……！\u3000３人がかりでもっ……！」"
translation = "「큭……! 셋이서 덤벼도……!」"

[[dialogue]]
speaker = "ミア"
original = "「はぁはぁ、もう星力を打ち消す力もほとんど使えなくなってるのに……！\u3000ここまで強いなんて……！」"
translation = "「하아 하아, 이제 성력을 무효화하는 힘도 거의 못 쓰게 됐는데……! 이렇게까지 강하다니……!」"

[[dialogue]]
speaker = "キサナ"
original = "「あーあ、さすがに飽きてきたな……もうコイツらの顔見るのもかったりぃ……」"
translation = "「아아, 역시 질리는구만…… 이제 네놈들 얼굴 보는 것도 나른해……」"

[[dialogue]]
speaker = "キサナ"
original = "「しゃらくせえ。いい加減終わらせるか……！」"
translation = "「거추장스러워. 슬슬 끝내볼까……!」"

[[dialogue]]
speaker = "unk"
original = "また来るぞ！"
translation = "또 오는 건가!"

[[dialogue]]
speaker = "キサナ"
original = "「──あぁ？\u3000誰だよ、こんな時に……！」"
translation = "「── 아앙? 누구냐, 이럴 때……!」"

[[dialogue]]
speaker = "キサナ"
original = "「うるせぇな！\u3000……はぁ？\u3000誰が退くかよ、今トドメを刺すところで──」"
translation = "「시끄러워! ……하아? 누가 물러난대, 지금 숨통을 끊으려던 참──」"

[[dialogue]]
speaker = "キサナ"
original = "「なっ──！？\u3000飯抜きはねえだろ！？\u3000わかった帰るっ、帰りゃいいんだろ、クソが！」"
translation = "「뭐──!? 밥 굶는 건 안 되지!? 알았어 돌아가면 될 거 아냐, 젠장!」"

[[dialogue]]
speaker = "キサナ"
original = "「チッ……どいつもこいつも萎えさせてくれっぜ。おい、もうやめだ。ひとまず身を隠せだとよ」"
translation = "「치…… 하나같이 김새게 만드는구만. 야, 이제 끝이다. 일단 몸을 숨기라네」"

[[dialogue]]
speaker = "ミア"
original = "「っっ。逃がすと思うのっ！？\u3000絶対に捕まえてやるんだからっ！」"
translation = "「윽. 놓칠 줄 알고!? 절대로 잡고 말 거니까!」"

[[dialogue]]
speaker = "キサナ"
original = "「るせぇなぁ。やめだっつってんだろ」"
translation = "「시끄럽다니까. 끝이라고 했잖아」"

[[dialogue]]
speaker = "ミア"
original = "「きゃあっ！？」"
translation = "「꺄악!?」"

[[dialogue]]
speaker = "エリス"
original = "「ミアさんっ！」"
translation = "「미아 씨!」"

[[dialogue]]
speaker = "キサナ"
original = "「星騎士どもが集まってきてるってよ。これ以上囲まれる前に戻ってこいって言われちまった」"
translation = "「성기사 놈들이 모여들고 있다네. 더 이상 포위되기 전에 돌아오라는 명령이다」"

[[dialogue]]
speaker = "キサナ"
original = "「それとボスからの言伝だ……。『これは星騎士への宣戦布告に過ぎない。覚悟しておけ』だとよ。ハッ」"
translation = "「그리고 보스님이 전하는 말이다…… 『이것은 성기사를 향한 선전포고에 불과하다. 각오해라』라고 말이야. 하」"

[[dialogue]]
speaker = "ミア"
original = "「宣戦、布告……？」"
translation = "「선전, 포고……?」"

[[dialogue]]
speaker = "エリス"
original = "「あなたたちは一体……」"
translation = "「당신들은 대체……」"

[[dialogue]]
speaker = "キサナ"
original = "「あぁ？\u3000あ、そーいや名乗ってなかったな……。言えっつわれてたのすっかり忘れてたぜ……」"
translation = "「아앙? 아, 그러고 보니 통성명을 안 했군……. 말하라는 걸 까맣게 잊고 있었어……」"

[[dialogue]]
speaker = "キサナ"
original = "「アタシらはコラプサー。星の光を喰らう者だ」"
translation = "「우리는 콜랩서. 별의 빛을 먹는 자다」"

[[dialogue]]
speaker = "キサナ"
original = "「ま、覚えておかなくてもいいぜ。ボケッとしてる間に息の根止めてやるからよ」"
translation = "「뭐, 기억하지 않아도 상관없어. 멍하니 있는 사이에 숨통을 끊어줄 테니까」"

[[dialogue]]
speaker = "ミア"
original = "「あっ、待ちなさいっ……！」"
translation = "「앗, 기다려……!」"

[[dialogue]]
speaker = "エリス"
original = "「いえ、深追いは禁物です。彼女の組織の応援も来ているかもしれません」"
translation = "「아뇨, 무리한 추격은 금물입니다. 그녀 조직의 원군이 오고 있을지도 모릅니다」"

[[dialogue]]
speaker = "ミア"
original = "「くっ……もう少し足止めできれば捕まえられたのに……。こんなことなら最初からもっと大人数で攻めるべきでしたでしょうか……」"
translation = "「큭…… 조금만 더 붙잡아뒀으면 잡을 수 있었을 텐데……. 이럴 거면 처음부터 더 많은 인원으로 공격했어야 했을까요……」"

[[dialogue]]
speaker = "エリス"
original = "「そんなことありませんよ。集団で挑めば、さしもの彼女も即時撤退したはずです。貴重な情報も得られなかったでしょう」"
translation = "「그렇지 않아요. 집단으로 덤볐다면 그녀도 즉시 후퇴했을 겁니다. 귀중한 정보도 얻지 못했겠죠」"

[[dialogue]]
speaker = "unk"
original = "コラプサー……か"
translation = "콜랩서……인가"

[[dialogue]]
speaker = "エリス"
original = "「星の光を食らう者……私たちへの宣戦布告……」"
translation = "「별의 빛을 먹는 자…… 우리를 향한 선전포고……」"

[[dialogue]]
speaker = "エリス"
original = "「事態は思っていたより深刻なのかもしれませんね。私たち星騎士を憎み、そして狙う集団が現れた……」"
translation = "「사태는 생각보다 심각할지도 모르겠네요. 우리 성기사를 증오하고, 또 노리는 집단이 나타났다니……」"

[[dialogue]]
speaker = "ミア"
original = "「ごめんなさい。そもそも私が軽率な行動を取らなければ、もっと色んな情報を得ることもできたかもしれないのに……」"
translation = "「죄송해요. 애당초 제가 경솔하게 행동하지 않았더라면 더 많은 정보를 얻을 수 있었을지도 모르는데……」"

[[dialogue]]
speaker = "エリス"
original = "「ふふ、いいえ。ミアさんは素晴らしい活躍をされましたよ」"
translation = "「후후, 아니에요. 미아 씨는 훌륭한 활약을 하셨는걸요」"

[[dialogue]]
speaker = "ミア"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker = "エリス"
original = "「ミアさんが彼女の力の弱点を見抜いてくださったからこそ、彼女を捕縛するための作戦を立てられたんです」"
translation = "「미아 씨가 그녀의 힘의 약점을 간파해주셨기에 그녀를 포획하기 위한 작전을 세울 수 있었던 거예요」"

[[dialogue]]
speaker = "エリス"
original = "「そしてミアさんが身を挺して彼女の力を消耗させたおかげで、こうして彼女を撃退することができたんです」"
translation = "「그리고 미아 씨가 몸을 던져 그녀의 힘을 소모시킨 덕분에 이렇게 그녀를 격퇴할 수 있었던 거고요」"

[[dialogue]]
speaker = "エリス"
original = "「彼女の力は脅威ですが……力に限界があると知れた以上、無闇に星騎士を襲うこともできないでしょう。彼女の容貌も記録できたはずです」"
translation = "「그녀의 힘은 위협적이지만…… 힘에 한계가 있다는 걸 안 이상 함부로 성기사를 습격할 수는 없겠죠. 그녀의 인상착의도 기록했을 거고요」"

[[dialogue]]
speaker = "エリス"
original = "「私が襲われた時はただ逃げ延びるだけで精一杯でしたからね。ミアさんの慧眼と勇気を私も見習わなくては」"
translation = "「제가 습격당했을 때는 그저 도망치는 것만으로도 벅찼으니까요. 미아 씨의 혜안과 용기를 저도 본받아야겠어요」"

[[dialogue]]
speaker = "ミア"
original = "「そんな……。私はただ無謀な真似をしちゃっただけで……。子どもみたいに意地になって飛び出して行っちゃっただけで……」"
translation = "「그럴 수가……. 저는 그저 무모한 짓을 했을 뿐이고……. 어린애처럼 고집부리며 튀어 나갔을 뿐인데……」"

[[dialogue]]
speaker = "エリス"
original = "「ですがそうして自省して、次に活かしているではありませんか。私がミアさんを尊敬しているのはそういうところですよ」"
translation = "「하지만 그렇게 자성하고 다음을 위해 활용하고 계시지 않나요. 제가 미아 씨를 존경하는 건 바로 그런 점이에요」"

[[dialogue]]
speaker = "エリス"
original = "「常に反省と努力を行い、邁進していくその姿。風紀委員としても、星騎士としても、いつも見習わせてもらっています」"
translation = "「항상 반성과 노력을 게을리하지 않고 매진하는 그 모습. 풍기위원으로서도, 성기사로서도 항상 본받고 있습니다」"

[[dialogue]]
speaker = "ミア"
original = "「尊敬って……。見習ってるって……。そんなの、嘘……。エリス先輩は私のこと、もっと子どもだと思ってたんじゃ……」"
translation = "「존경이라니……. 본받고 있다니……. 그런 거, 거짓말……. 에리스 선배는 저를 좀 더 어린애라고 생각하셨던 게……」"

[[dialogue]]
speaker = "エリス"
original = "「はい？\u3000ミアさんのことを子どもだなんて一度も思ったことはありませんよ？」"
translation = "「네? 미아 씨를 어린애라고 생각한 적은 한 번도 없답니다?」"

[[dialogue]]
speaker = "エリス"
original = "「だって私たちは志を同じとする星騎士ではありませんか」"
translation = "「우리는 뜻을 같이하는 성기사잖아요」"

[[dialogue]]
speaker = "エリス"
original = "「ミアさんは尊敬に値する立派な星騎士ですよ」"
translation = "「미아 씨는 존경받아 마땅한 훌륭한 성기사예요」"

[[dialogue]]
speaker = "ミア"
original = "「立派なって──……ひっくっ……！」"
translation = "「훌륭한── …… 히윽……!」"

[[dialogue]]
speaker = "unk"
original = "すごく立派だったよ──ミア"
translation = "정말 훌륭했어── 미아"

[[dialogue]]
speaker = "ミア"
original = "「っっ……！\u3000会長さんの、バカぁ……！」"
translation = "「윽……! 회장님, 바보……!」"

[[dialogue]]
speaker = "ミア"
original = "「私まだっ、だって……ひくっ……！」"
translation = "「나 아직, 그게…… 히윽……!」"

[[dialogue]]
speaker = "ミア"
original = "「絶対まだっ、ぐすっ、立派になんて……！\u3000うぅぅっっ～……！！\u3000ふぇぇぇええっっ～……！！」"
translation = "「절대 아직, 흑, 훌륭한 건……! 으으으~~……!! 흐에에에엥~~……!!」"

[[dialogue]]
speaker = "エリス"
original = "「ふふ。少し泣き虫なところは確かにちょっぴり子どもっぽいかもしれませんね」"
translation = "「후후. 조금 울보인 점은 확실히 약간 어린애 같을지도 모르겠네요」"

[[dialogue]]
speaker = "ミア"
original = "「うぅ、ぐすっ……！\u3000泣いてなんか、いませんもんっ……！\u3000私はこんなことで泣くような子どもじゃ、ありませんっ……！」"
translation = "「으으, 흑……! 울지 않았단 말이에요……! 저는 이런 일로 우는 어린애가 아니라고요……!」"

[[dialogue]]
speaker = "エリス"
original = "「ふふふ。これは失礼しました」"
translation = "「후후후. 실례했습니다」"

[[dialogue]]
speaker = "unk"
original = "このまま３人で何か食べて帰ろうか"
translation = "이대로 셋이서 뭐라도 먹고 돌아갈까"

[[dialogue]]
speaker = "ミア"
original = "「な、何を言ってるの……！\u3000もうとっくに帰宅時間は過ぎてるんだからっ……！\u3000夜遊びは減点よっ……！」"
translation = "「무, 무슨 소리를 하는 거예요……! 이미 귀가 시간은 한참 지났단 말이에요……! 밤놀이는 감점이에요……!」"

[[dialogue]]
speaker = "エリス"
original = "「ふふ。緊急事態でしたから。戦闘後の栄養補給くらい、いいんじゃないでしょうか」"
translation = "「후후. 긴급사태였으니까요. 전투 후의 영양 보충 정도는 괜찮지 않을까요」"

[[dialogue]]
speaker = "ミア"
original = "「エリス先輩まで！？」"
translation = "「에리스 선배까지!?」"

[[dialogue]]
speaker = "unk"
original = "決まりだね"
translation = "결정됐네"

[[dialogue]]
speaker = "ミア"
original = "「あっ、コラ……！\u3000勝手に話を進めないで……！\u3000風紀委員が規律を破るなんて絶対ダメっ……！」"
translation = "「앗, 이봐요……! 마음대로 정하지 마세요……! 풍기위원이 규율을 어기다니 절대 안 돼……!」"

[[dialogue]]
speaker = "エリス"
original = "「この近くに深夜までやっているスイーツのお店があるんです。しかも夜限定のケーキもあるんだとか」"
translation = "「이 근처에 늦게까지 하는 디저트 가게가 있어요. 게다가 밤 한정 케이크도 있다고 하더라고요」"

[[dialogue]]
speaker = "ミア"
original = "「限定ケーキ……！？」"
translation = "「한정 케이크……!?」"

[[dialogue]]
speaker = "ミア"
original = "「って、ケ、ケーキなんかに釣られないもんっ……！\u3000やっぱり２人とも、私のこと子ども扱いしてるっ……！\u3000絶対してるっ……！」"
translation = "「아니, 케, 케이크 같은 거에 안 낚여요……! 역시 둘 다 저를 어린애 취급하고 있어……! 절대 그러고 있어……!」"

[[dialogue]]
speaker = "ミア"
original = "「私を、ひっく、子ども扱いしないでってばぁ～……！」"
translation = "「나를, 히윽, 어린애 취급하지 말라니까요──……!」"

[[dialogue]]
speaker = "キサナ"
original = "「──現場待機だぁ？\u3000おいおい、そりゃねえだろ、結局飯抜きじゃねえか……！」"
translation = "「── 현장 대기라고? 어이 어이, 너무하잖아, 결국 밥은 굶으라는 거냐고……!」"

[[dialogue]]
speaker = "キサナ"
original = "「チッ、わかったよ、待機してりゃいいんだろ。けどアタシの好きにさせてもらうぜ？\u3000暴れたりはしねえからよ」"
translation = "「치, 알았다고, 대기하면 될 거 아냐. 하지만 내 마음대로 하겠어. 난동 부리지는 않을 테니까」"

[[dialogue]]
speaker = "キサナ"
original = "「……それもわかってるっつの。テメエらには恩があるからな。その恩を返すまではコラプサーの一員でいてやんよ」"
translation = "「……그것도 알고 있다고. 네놈들에게는 빚이 있으니까 말이야. 그 빚을 갚을 때까지는 콜랩서의 일원으로 있어 주지」"

[[dialogue]]
speaker = "キサナ"
original = "「……星の光を喰らう者、コラプサーか。相変わらず何考えてんのかよくわかんねえヤツらだ」"
translation = "「……별의 빛을 먹는 자, 콜랩서인가. 여전히 무슨 생각을 하는지 모르겠는 녀석들이야」"

[[dialogue]]
speaker = "キサナ"
original = "「コラプサーにはアタシ以上に厄介なヤツがウジャウジャいるぜ」"
translation = "「콜랩서에는 나보다 훨씬 까다로운 녀석들이 우글우글하다고」"

[[dialogue]]
speaker = "キサナ"
original = "「ハッ……あの星騎士どもがどうなるか見物じゃねえか」"
translation = "「하…… 저 성기사 놈들이 어떻게 될지 볼만하겠군」"

