[[dialogue]]
speaker = "unk"
original = "果たして、附属生とシャドウサチのバトルの行方は――"
translation = "과연 부속생과 섀도우 사치의 배틀의 행방은──"

[[dialogue]]
speaker_original = "シャドウサチ"
speaker_translation = "섀도우 사치"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「――よっし！\u3000ついにやったのじゃ！\u3000見たか！！\u3000サチの幸運を打ち破ってやったのじゃ！！！\u3000ふははははははっ♪」"
translation = "「──조아써! 드디어 해냈느니라! 보았느냐!! 사치의 행운을 깨부수었느니라!!! 푸하하하하핫♪」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「おお～っ！\u3000プリムラさん渾身のガッツポーズ！\u3000これは記憶魔法でしっかりコレクションしておかないと～☆」"
translation = "「오오~! 프리뮬라 씨 혼신의 승리 포즈! 이건 기억 마법으로 제대로 컬렉션해둬야겠네요~☆」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「どうじゃ、妃竜院マハムート！\u3000これが悪の終末兵器にして、サチのライバルである我の力なのじゃ！」"
translation = "「어떠냐, 키류인 마하무트! 이것이 악의 종말병기이자 사치의 라이벌인 나의 힘이니라!」"

[[dialogue]]
speaker_original = "マハムート（覚醒）"
speaker_translation = "마하무트(각성)"
original = "「――悪くないわね」"
translation = "「──나쁘지 않네」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「うえぇっ！？」"
translation = "「우엣!?」"

[[dialogue]]
speaker_original = "マハムート（覚醒）"
speaker_translation = "마하무트(각성)"
original = "「口は悪くて生意気だけど、協調性は想像以上に悪くなかったわ」"
translation = "「입은 험하고 건방지지만, 협조성은 상상 이상으로 나쁘지 않았어」"

[[dialogue]]
speaker_original = "マハムート（覚醒）"
speaker_translation = "마하무트(각성)"
original = "「てっきりスタンドプレーをするものだと思っていたけれど……ちゃんと周りと合わせられていた。あなた、意外と修羅場をくぐって来てるのね」"
translation = "「틀림없이 단독 행동을 할 거라고 생각했는데…… 제대로 주변과 맞추더군. 너, 의외로 산전수전을 다 겪었나 보네」"

[[dialogue]]
speaker_original = "マハムート（覚醒）"
speaker_translation = "마하무트(각성)"
original = "「私が手を貸したとはいえ、今日のところはよくやったと褒めてあげるわ、プリムラ」"
translation = "「내가 손을 빌려주긴 했지만, 오늘은 잘했다고 칭찬해 주마, 프리뮬라」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「なっ……何を言っとるのじゃ貴様！？\u3000そんな褒めたりしても、我は決して服従したりせぬぞ！」"
translation = "「뭐…… 무슨 말을 하는 거냐 네놈!? 그런 칭찬을 해도 나는 결코 복종하거나 하지 않을 것이니라!」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「――フヘヘヘ♪」"
translation = "「──후헤헤헤♪」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「めっちゃ嬉しそう！」"
translation = "「무지 기뻐 보이네!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「相変わらず、すごくチョロい……」"
translation = "「여전하네, 정말 다루기 쉬워……」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「ふふふっ、それでどうだった、エルゼ？\u3000あたしの水着フォームも、めっちゃ活躍してたでしょ？\u3000これがフォームチェンジの力ってね♪」"
translation = "「후후후, 그래서 어땠어, 엘제? 내 수영복 폼도 엄청 활약했지? 이게 폼 체인지의 힘이라니까♪」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「ぐぬぬ……悔しいですけれど、強かったですわ……！」"
translation = "「그느느…… 분하지만 강했답니다……!」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「でも、私だってすぐに追いついてみせますわ！\u3000ライバルとして！」"
translation = "「하지만 저도 금방 따라잡아 보이겠어요! 라이벌로서!」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「そう来なくっちゃ！\u3000まあ、エルゼが新フォームを手に入れたとしても、あたしがまた３着目を手に入れて追い抜いちゃうけどね～♪」"
translation = "「그렇게 나와야지! 뭐, 엘제가 새로운 폼을 얻는다고 해도 내가 또 세 번째 옷을 얻어서 앞질러 버리겠지만 말이야~♪」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「ねぇねぇ！\u3000みんなで協力して戦って、結構イイ感じになったんじゃない？」"
translation = "「저기 저기! 다 같이 협력해서 싸우니까 꽤 괜찮은 느낌 아니었어?」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「私、思いついたんだけど、今度みんなで本物の遊園地に遊びに行こうよ！」"
translation = "「나 생각났는데 다음에 다 같이 진짜 유원지에 놀러 가자!」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「おっ！\u3000いいね～♪\u3000絶対楽しいよ、それ！」"
translation = "「오! 좋은데~♪ 절대 즐거울 거야, 그거!」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「はいは～い！\u3000私も行きたいで～す！\u3000素敵な思い出コレクションになりそうですから～♪」"
translation = "「네, 네~! 저도 가고 싶어요! 멋진 추억 컬렉션이 될 것 같으니까요~♪」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「というか、あわよくば、アムさんとエルゼさんを新しい魔法少女に勧誘してしまうのも……ふふふ……！」"
translation = "「그보다 기회만 된다면 아무 씨랑 엘제 씨를 새로운 마법소녀로 권유해 버리는 것도…… 후후후……!」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「？\u3000トレジアンナ様、魔法少女とは一体、何のことですの？」"
translation = "「? 트레지안나 님, 마법소녀란 대체 무엇을 말하시는 건가요?」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「あっ、聞こえちゃいました～？\u3000それはですね～」"
translation = "「앗, 들렸나요~? 그건 말이죠~」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「トレジアンナさん、それ以上は禁止です！！！」"
translation = "「세나리 씨, 그 이상은 금지예요!!!」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「おっといけない、てへぺろ☆」"
translation = "「어이쿠 이런, 데헤페로☆」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「ねぇ、プリムラちゃんもみんなと一緒に来るでしょ？」"
translation = "「저기, 프리뮬라 짱도 모두랑 같이 갈 거지?」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「はぁ？\u3000我が遊園地へ遊びになど、行くわけなかろう！」"
translation = "「하아? 짐이 유원지에 놀러 가는 등의 일을 할 리가 없지 않느냐!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「もしかしてプリムラ、絶叫マシーンが怖いの～？」"
translation = "「혹시 프리뮬라, 절규 머신이 무서운 거야~?」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「なんじゃと！？\u3000いきなり何を言い出すのじゃ、サチ！」"
translation = "「무엇이라!? 갑자기 무슨 소리를 하는 것이냐, 사치!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「別に怖くないっていうなら、私と絶叫マシーンに乗って勝負しない？\u3000どっちが怖がらないか」"
translation = "「딱히 무섭지 않다면, 나랑 절규 머신 타고 승부하지 않을래? 누가 더 안 무서워하나 말이야」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「望むところじゃ！\u3000我が勝って、貴様の『もう勘弁して～』という泣き顔を拝んでやるのじゃ！」"
translation = "「바라던 바니라! 짐이 이겨서, 네놈의 『이제 좀 봐줘~』 하는 울상인 얼굴을 배알해 주겠노라!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ふふっ、じゃあプリムラも参加決定ね♪」"
translation = "「후훗, 그럼 프리뮬라도 참가 결정이네♪」"

[[dialogue]]
speaker_original = "マハムート（覚醒）"
speaker_translation = "마하무트(각성)"
original = "「やれやれ、もう打ち上げみたいにはしゃいじゃって。私は行くから、後は好きになさい」"
translation = "「이런 이런, 벌써 뒤풀이라도 하는 것처럼 들떠서는. 나는 갈 테니, 나머지는 마음대로 하렴」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「そうだ！\u3000せっかくですし、マムも一緒に遊園地行きませんか？」"
translation = "「맞다! 기왕 이렇게 된 거, 마무도 같이 유원지 안 갈래요?」"

[[dialogue]]
speaker_original = "マハムート（覚醒）"
speaker_translation = "마하무트(각성)"
original = "「は？\u3000行かないわよ。附属生同士のところに私がいたら、あなた達が畏怖して楽しめないでしょ」"
translation = "「하? 안 가. 부속생들끼리 있는 곳에 내가 있으면, 너희가 경외심 때문에 즐기지 못할 거 아냐」"

[[dialogue]]
speaker_original = "アム"
speaker_translation = "아무"
original = "「でも前にビーチバレー特訓した後、あたしとマトイ先輩と３人でお出かけした時、すごく楽しかったけどな～」"
translation = "「하지만 예전에 비치발리볼 특훈 한 다음에, 나랑 마토이 선배랑 셋이서 외출했을 때, 엄청 즐거웠는데~」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「そんなことあったの！？\u3000ち、ちょっと羨ましいかも……」"
translation = "「그런 일이 있었어!? 조, 조금 부러울지도……」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「いいな～！\u3000私もマムとお出かけした～い♪」"
translation = "「좋겠다~! 나도 마무랑 외출하고 싶어~♪」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「マムのプライベートな素顔、私もコレクション欲がそそられますね～♪\u3000ふふふ……！」"
translation = "「마무의 프라이빗한 민낯, 저도 컬렉션 욕구가 솟구치네요~♪ 후후후……!」"

[[dialogue]]
speaker_original = "マハムート（覚醒）"
speaker_translation = "마하무트(각성)"
original = "「あなた達、意外と恐れ知らずね……」"
translation = "「너희들, 의외로 겁이 없구나……」"

[[dialogue]]
speaker = "unk"
original = "その後、なんだかんだ言いつつも、一緒に遊園地へ出かけることを承諾してしまうマハムートなのであった――"
translation = "그 후, 이런저런 소리를 하면서도, 함께 유원지에 나가는 것을 승낙하고 마는 마하무트였다――"

