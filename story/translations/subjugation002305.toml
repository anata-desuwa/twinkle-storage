[[dialogue]]
speaker = "unk"
original = "お互い全力を出し切っての激闘を繰り広げる俺とクーシェン――"
translation = "서로 전력을 다한 격투를 펼치는 나와 쿠셴──"

[[dialogue]]
speaker = "クーシェン"
original = "「はぁ……はぁ……！」"
translation = "「하아…… 하아……!」"

[[dialogue]]
speaker = "unk"
original = "やがて、先に片膝を着いた俺は――彼女を見上げる。"
translation = "이윽고, 먼저 한쪽 무릎을 꿇은 나는── 그녀를 올려다본다."

[[dialogue]]
speaker = "クーシェン"
original = "「ウキキ♪\u3000強かったよ、魔王様……。ボクの――」"
translation = "「우키키♪ 강했어, 마왕님……. 나의──」"

[[dialogue]]
speaker = "クーシェン"
original = "「負けだ……」"
translation = "「패배다……」"

[[dialogue]]
speaker = "unk"
original = "クーシェンが仰向けに倒れ、その手から如意棒が離れて、地面に転がる。"
translation = "쿠셴이 대자로 드러눕고, 그 손에서 여의봉이 떨어져 지면에 구른다."

[[dialogue]]
speaker = "紅明（羅刹）"
original = "『試合終了ーーーっ！！！\u3000勝者、新星学園星徒会長・緋宮クロト～～～っ！！！』"
translation = "『시합 종료──!!! 승자, 신성학원 성도회장 히노미야 쿠로토──!!!』"

[[dialogue]]
speaker = "unk"
original = "紅明がマイクで宣言する。"
translation = "코우메이가 마이크로 선언한다."

[[dialogue]]
speaker = "unk"
original = "俺は立ち上がると、クーシェンに歩み寄り、彼女の体を支えて起き上がらせた。"
translation = "나는 일어서서 쿠셴에게 다가가, 그녀의 몸을 부축해 일으켜 세웠다."

[[dialogue]]
speaker = "クーシェン"
original = "「ん……ありがと♪」"
translation = "「으음…… 고마워♪」"

[[dialogue]]
speaker = "クーシェン"
original = "「よいしょっと……。はぁ～♪\u3000本当に強かった～！」"
translation = "「영차…… 하아~♪ 정말 강했어~!」"

[[dialogue]]
speaker = "クーシェン"
original = "「まさか……金斗雲の速さを見切れないのを、カウンターで対抗してくるとは思わなかったよ」"
translation = "「설마…… 근두운의 속도를 못 읽는 걸 카운터로 대항해올 줄은 몰랐어」"

[[dialogue]]
speaker = "unk"
original = "そう、俺は結局、金斗雲の動きを終始見切れなかった。だから、攻撃は全て避けずに、くらい続けることにしたのだ。"
translation = "그렇다, 나는 결국 근두운의 움직임을 끝까지 읽어내지 못했다. 그래서 공격을 전부 피하지 않고 계속 맞아주기로 한 것이다."

[[dialogue]]
speaker = "unk"
original = "そして、攻撃をして来る瞬間、必ず生まれる隙を突いて、捨て身の反撃で分身を１体１体倒して行くことにした。"
translation = "그리고 공격을 해오는 순간 반드시 생기는 빈틈을 찔러, 목숨을 건 반격으로 분신을 한 명씩 쓰러뜨려 가기로 했다."

[[dialogue]]
speaker = "クーシェン"
original = "「……何か特殊な力を使ったわけじゃない。でも、何度攻撃を受けても立ち上がって、ボクの分身を全滅させるまで戦い続けた」"
translation = "「…… 뭔가 특수한 힘을 쓴 건 아냐. 하지만 몇 번이나 공격을 받아도 일어서서, 내 분신을 전멸시킬 때까지 계속 싸웠어」"

[[dialogue]]
speaker = "クーシェン"
original = "「それは地道に鍛え続けて身に付けた力と、リクリエとの戦いを潜り抜けた経験による、<b>決して諦めない心</b>があってこそできた戦い方だ」"
translation = "「그건 꾸준히 단련해서 익힌 힘과, 리크리에와의 싸움을 헤쳐 나온 경험에 의한, <b>결코</b> <b>포기하지</b> <b>않는</b> <b>마음</b>이 있었기에 가능했던 싸움 방식이야」"

[[dialogue]]
speaker = "クーシェン"
original = "「それが魔王の持つ、本当の強さ。……だから、認めるよ。ボクの負けだ」"
translation = "「그게 마왕이 가진 진짜 강함. …… 그러니까 인정할게. 나의 패배야」"

[[dialogue]]
speaker = "クーシェン"
original = "「それで……あのさ。お願いがあるんだけど……」"
translation = "「그래서…… 저기 말야. 부탁이 하나 있는데……」"

[[dialogue]]
speaker = "unk"
original = "俺がなんだろうと首を傾げると──"
translation = "내가 무엇인지 고개를 갸우뚱하자──"

[[dialogue]]
speaker = "クーシェン"
original = "「魔王のこと――これからは『にーにー』って呼んでもいい？」"
translation = "「마왕── 이제부터는 『오빠』라고 불러도 돼?」"

[[dialogue]]
speaker = "unk"
original = "えっ！？"
translation = "엣!?"

[[dialogue]]
speaker = "クーシェン"
original = "「聞いたんだけど……魔王、下級生の子から『お兄ちゃん』って呼ばれてたりするんでしょ？」"
translation = "「들었는데…… 마왕, 하급생 아이들한테 『오빠』라고 불리고 있다며?」"

[[dialogue]]
speaker = "クーシェン"
original = "「それにボクを負かしちゃうくらい、すごく強かったし。だからボクも……ダメかな？」"
translation = "「게다가 나를 이겨버릴 정도로 엄청 강했으니까. 그러니까 나도…… 안 될까?」"

[[dialogue]]
speaker = "unk"
original = "ちょっと驚きはしたが……下級生の子たちから兄のように呼ばれるのは、今更ではあるし、決して嫌ではない。"
translation = "조금 놀라긴 했지만…… 하급생 아이들에게 오빠처럼 불리는 건 이제 와서 새삼스럽기도 하고, 결코 싫지 않다."

[[dialogue]]
speaker = "unk"
original = "いいよ。クーシェンがそう呼びたいのなら"
translation = "좋아. 쿠셴이 그렇게 부르고 싶다면"

[[dialogue]]
speaker = "クーシェン"
original = "「本当？\u3000えへへっ♪\u3000じゃあ、これから遠慮なく、妹みたいに振舞っちゃうからね！」"
translation = "「정말? 에헤헷♪ 그럼 이제부터 사양 않고 여동생처럼 굴 테니까!」"

[[dialogue]]
speaker = "クーシェン"
original = "「改めて、よろしくね♪\u3000にーにー♪」"
translation = "「새삼스럽지만 잘 부탁해♪ 오빠♪」"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "「ダーリン、お疲れ様～♪」"
translation = "「달링, 수고했어~♪」"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "「いや～、クーちんと仲良くなれたみたいでよかったよかった☆」"
translation = "「이야~, 쿠셴이랑 사이좋아진 것 같아서 다행이다 다행이야☆」"

[[dialogue]]
speaker = "unk"
original = "屈託のない元気な笑顔で言う彼女に、俺はやれやれと思いながら……"
translation = "거리낌 없는 활기찬 미소로 말하는 그녀에게, 나는 어쩔 수 없다고 생각하며……"

[[dialogue]]
speaker = "unk"
original = "もし俺が負けてたら、どうするつもりだったんだ？"
translation = "만약 내가 졌다면 어떻게 할 생각이었어?"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "「え？\u3000ダーリンなら１００％勝つっしょ☆\u3000だって、ダーリンだしね♪」"
translation = "「에? 달링이라면 100% 이길 거라구☆ 왜냐면, 달링이니까♪」"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "「――危うく負けるくらい、ボロボロだったって？\u3000ふふっ♪\u3000ダーリン……」"
translation = "「──하마터면 질 정도로 너덜너덜했다고? 후훗♪ 달링……」"

[[dialogue]]
speaker = "unk"
original = "彼女は俺の耳元まで顔を近づけると──"
translation = "그녀는 내 귓가까지 얼굴을 가까이 대고는──"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "「すごくカッコよかったよ<emoji=heart04>\u3000アタシ、惚れ直しちった<emoji=heart04>」"
translation = "「엄청 멋있었어♥ 나, 다시 반해버렸다구♥」"

[[dialogue]]
speaker = "unk"
original = "他の人には聞こえないくらいの声でそんなことを言うので、ドキッとしてしまう。"
translation = "다른 사람에게는 들리지 않을 정도의 목소리로 그런 소리를 하니, 가슴이 두근거리고 만다."

[[dialogue]]
speaker = "紅明（羅刹）"
original = "「それに、クーちんのこともみんなにバッチリ紹介できたし☆\u3000結果オーライってことで♪」"
translation = "「게다가 쿠셴도 모두에게 확실히 소개할 수 있었고☆ 결과 좋으면 다 좋은 거지♪」"

[[dialogue]]
speaker = "女生徒Ａ"
original = "「クーちん、強かったよ～！」"
translation = "「쿠셴, 강했어~!」"

[[dialogue]]
speaker = "附属生Ｂ"
original = "「これからよろしくね～！」"
translation = "「앞으로 잘 부탁해~!」"

[[dialogue]]
speaker = "クーシェン"
original = "「……！\u3000え、えへへっ♪」"
translation = "「……! 에, 에헤헷♪」"

[[dialogue]]
speaker = "クーシェン"
original = "「みんな、ありがと～！\u3000こちらこそ、よろしく～♪」"
translation = "「모두 고마워~! 나야말로 잘 부탁해~♪」"

[[dialogue]]
speaker = "unk"
original = "これが１番の目的だったんだな"
translation = "이게 가장 큰 목적이었구나"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "「ん？\u3000ふふっ、まぁね～♪」"
translation = "「응? 후훗, 뭐 그렇지~♪」"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "「もしクーちんの性格が悟空と同じなら……普段は素直じゃないところがあると思ったんだ」"
translation = "「만약 쿠셴의 성격이 손오공과 같다면…… 평소에는 솔직하지 못한 면이 있을 거라 생각했거든」"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "「だけど悟空、戦いの時はすごく素直になる奴だからさ♪\u3000それをみんなに見せたら、変な誤解とかなくわかってもらえるっしょ？\u3000うしし☆」"
translation = "「하지만 오공, 싸울 때는 엄청 솔직해지는 녀석이니까♪ 그걸 모두에게 보여주면 이상한 오해 없이 이해해 줄 거 아냐? 우시시☆」"

[[dialogue]]
speaker = "unk"
original = "そこまで言うと、紅明は再びマイクを持って、呼びかける。"
translation = "거기까지 말하고 코우메이는 다시 마이크를 잡고 호응을 유도한다."

[[dialogue]]
speaker = "紅明（羅刹）"
original = "『――さてと。クーち～ん！\u3000この後はどうする？』"
translation = "『──자. 쿠셴~! 이 다음엔 어떻게 할래?』"

[[dialogue]]
speaker = "クーシェン"
original = "「この後……？\u3000あっ！\u3000もしかして、紅明とバトル！？\u3000もちろん、やるやる～！」"
translation = "「이 다음……? 앗! 혹시 코우메이랑 배틀!? 당연히 할래 할래~!」"

[[dialogue]]
speaker = "unk"
original = "えっ！？\u3000クーシェン、まだ戦えるのか！？"
translation = "엣!? 쿠셴, 아직 싸울 수 있는 거야!?"

[[dialogue]]
speaker = "クーシェン"
original = "「うん！\u3000ボク、体力には自信あるからね♪\u3000少し休んだし、もう行けるよ！」"
translation = "「응! 나, 체력에는 자신 있거든♪ 조금 쉬었으니까 이제 갈 수 있어!」"

[[dialogue]]
speaker = "クーシェン"
original = "「それに、連戦で限界を迎えた時にこそ、自分の中の新たな強さが見えてくるものだからね！」"
translation = "「게다가 연전으로 한계에 부딪혔을 때야말로, 자신 안의 새로운 강함이 보이기 마련이니까!」"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "『うしし♪\u3000そう言うと思ってたっしょ☆』"
translation = "『우시시♪ 그렇게 말할 줄 알았다구☆』"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "『んじゃまぁ、アタシも久しぶりに全力出しちゃいますか！』"
translation = "『그럼 뭐, 나도 오랜만에 전력을 다해볼까!』"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "『というわけで、会場のみんな～！\u3000ここからは延長戦！\u3000アタシがクーちんと戦っちゃうぜ～☆』"
translation = "『그런 고로 회장의 여러분~! 여기서부터는 연장전! 내가 쿠셴이랑 싸워버리겠다구~☆』"

[[dialogue]]
speaker = "紅明（羅刹）"
original = "『実はアタシのこの衣装、つい先日に覚醒したばかりの新フォームなんだ！\u3000今日はその力を披露しちゃうぜ～！』"
translation = "『사실 내 이 의상, 며칠 전에 갓 각성한 새로운 폼이라구! 오늘은 그 힘을 선보여주지!』"

[[dialogue]]
speaker = "unk"
original = "楽しそうに全力でぶつかり合う紅明とクーシェン。……再び大盛り上がりする会場。"
translation = "즐거운 듯 전력으로 부딪히는 코우메이와 쿠셴. …… 다시 크게 달아오르는 행사장."

[[dialogue]]
speaker = "unk"
original = "そんな雰囲気に押されてか、俺もだんだん楽しくなって来てしまって。"
translation = "그런 분위기에 휩쓸려서인지, 나도 점점 즐거워져서."

[[dialogue]]
speaker = "unk"
original = "最終的には、ノリノリで試合を実況してしまうのだった――"
translation = "최종적으로는 신나서 시합을 중계하고 마는 것이었다──"

