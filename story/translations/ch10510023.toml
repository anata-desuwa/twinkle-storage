[[dialogue]]
speaker = "unk"
original = "第３話,余に好き嫌いなどない！,P"
translation = "제3화, 여에게 편식 따윈 없다!, P"

[[dialogue]]
speaker = "unk"
original = "魔女の森に住むクラウディアは海を見たことがないらしい。そこで俺はリップルのリゾート結界に彼女を招待することにした──"
translation = "마녀의 숲에 사는 클라우디아는 바다를 본 적이 없다고 한다. 그래서 나는 리플의 리조트 결계에 그녀를 초대하기로 했다──"

[[dialogue]]
speaker = "クラウディア"
original = "「おぉ！\u3000これが海か……！\u3000文献で見聞きはしていたが、実に美しい！」"
translation = "「오오! 이것이 바다냐……! 문헌으로 보고 듣기는 했지만, 참으로 아름답구나!」"

[[dialogue]]
speaker = "クラウディア"
original = "「そしてそして……バーベキューまで用意してあるとは洒落ておる！\u3000気が利くではないか～、魔王♪」"
translation = "「그리고 그리고…… 바비큐까지 준비해두다니 세련됐구나! 센스 있지 않느냐~, 마왕♪」"

[[dialogue]]
speaker = "unk"
original = "クラウディアはお肉が好きだからね"
translation = "클라우디아는 고기를 좋아하니까"

[[dialogue]]
speaker = "クラウディア"
original = "「うむ！\u3000伴侶の好みを把握するのは大切だ。これからも励むがよい！」"
translation = "「음! 반려의 취향을 파악하는 건 중요하다. 앞으로도 정진하도록!」"

[[dialogue]]
speaker = "クラウディア"
original = "「ほう、このタレに漬けてから食らうのだな。もぐもぐもぐ……！\u3000うむッ、うまい！\u3000実にうまいぞ！」"
translation = "「호오, 이 소스에 담갔다가 먹는 것이군. 우물우물우물……! 음ッ, 맛있다! 참으로 맛있구나!」"

[[dialogue]]
speaker = "unk"
original = "野菜もおいしいよ"
translation = "야채도 맛있어"

[[dialogue]]
speaker = "クラウディア"
original = "「草っ葉は嫌いだから全部お前が食え、余は肉専門だ！\u3000うまい、うまいぞー！\u3000もぐもぐもぐっ……！」"
translation = "「풀때기는 싫으니까 네놈이 다 먹거라, 여는 고기 전문이다! 맛있다, 맛있다구─! 우물우물우물……!」"

[[dialogue]]
speaker = "クラウディア"
original = "「ふう。食った食った。浜辺でのバーベキュー、実に気に入ったぞ！」"
translation = "「후우. 잘 먹었다. 해변에서의 바비큐, 아주 마음에 들었다!」"

[[dialogue]]
speaker = "クラウディア"
original = "「……む？\u3000どうした魔王、曇った顔をしおって」"
translation = "「……음? 왜 그러느냐 마왕, 어두운 얼굴을 하고」"

[[dialogue]]
speaker = "unk"
original = "好き嫌いはよくないよ？"
translation = "편식은 좋지 않아?"

[[dialogue]]
speaker = "クラウディア"
original = "「何を言うか。余は偉くて凄い存在なのだから、草っ葉など食わんでもよいのだ！」"
translation = "「무슨 소리를 하느냐. 여는 위대하고 대단한 존재니까 풀때기 따위 안 먹어도 되는 것이다!」"

[[dialogue]]
speaker = "クラウディア"
original = "（む……魔王のやつ、何だか不満そうじゃのう……確かにせっかく準備してくれたのに、１つも草っ葉は食わなんだが……）"
translation = "(음…… 마왕 녀석, 왠지 불만스러워 보이는구나…… 확실히 기껏 준비해줬는데 풀때기는 하나도 안 먹었지만……)"

[[dialogue]]
speaker = "クラウディア"
original = "（そういえばハナヨメ修行の記事に『好き嫌いをする妻は夫に好かれん』とあったな……）"
translation = "(그러고 보니 신부 수업 기사에 『편식하는 아내는 남편에게 사랑받지 못한다』라고 있었지……)"

[[dialogue]]
speaker = "クラウディア"
original = "（ま、まあ余は普通とは違う。草っ葉を食わんくらいでその魅力に陰りが出るとも思えんが……）"
translation = "(뭐, 여는 보통과는 다르다. 풀때기를 안 먹는 정도로는 그 매력에 그늘이 질 것 같지는 않지만……)"

[[dialogue]]
speaker = "クラウディア"
original = "「な、なあ魔王よ。つかぬことを聞くが、お前はそのー……食い物の好き嫌いをせん女の方が、好きだったりするのか？」"
translation = "「저, 저기 마왕이여. 뜬금없는 소리지만, 네놈은 그── 음식을 가리지 않고 먹는 여자가 더 좋은 것이냐?」"

[[dialogue]]
speaker = "unk"
original = "何でもおいしく食べる子が好き"
translation = "뭐든 맛있게 먹는 애가 좋아"

[[dialogue]]
speaker = "unk"
original = "それはもちろん"
translation = "그건 당연하지"

[[dialogue]]
speaker = "クラウディア"
original = "「なぁっ──！？」"
translation = "「나앗──!?」"

[[dialogue]]
speaker = "クラウディア"
original = "「ぐ、ぐむむむ……魔王！\u3000来週もバーベキューをするぞ、よいな！！\u3000余にりべんじをさせい！」"
translation = "「그, 그으으으…… 마왕! 다음 주에도 바비큐를 할 것이다, 알겠느냐!! 여에게 리벤지를 하게 해다오!」"

[[dialogue]]
speaker = "クラウディア"
original = "「余だって……余だってなぁ！\u3000やろうと思えば、できるのだからなーっ！」"
translation = "「여도…… 여도 말이다! 마음만 먹으면 할 수 있으니까 말이다─!」"

[[dialogue]]
speaker = "セドナ"
original = "「今日の夕食の作戦はこうだ。まずこの大皿で山盛りのサラダを姫にお出しする」"
translation = "「오늘 저녁 식사 작전은 이렇다. 우선 이 큰 접시로 산더미 같은 샐러드를 공주님께 내드린다」"

[[dialogue]]
speaker = "ウェンディ"
original = "「お言葉ですがセドナ長官、それはあまりにも無謀かと……！」"
translation = "「외람된 말씀입니다만 세드나 장관님, 그건 너무 무모한 게 아닐지……!」"

[[dialogue]]
speaker = "セドナ"
original = "「聞け。この大皿はデコイ。私も姫がこれを食すとは思っていない。拒否されたタイミングでこの小皿のサラダを出すのだ」"
translation = "「들어라. 이 큰 접시는 미끼다. 나도 공주님이 이걸 드실 거라 생각지 않는다. 거절당한 타이밍에 이 작은 접시의 샐러드를 내놓는 거다」"

[[dialogue]]
speaker = "ウェンディ"
original = "「クラウディア様がいつも使われている食器ですね。なるほど、無理難題を提示したのちにスケールの小さい本命を通す……交渉術の基本ですね！」"
translation = "「클라우디아 님이 평소 쓰시는 식기군요. 과연, 무리한 요구를 제시한 뒤에 규모가 작은 본안을 통과시킨다…… 협상술의 기본이군요!」"

[[dialogue]]
speaker = "セドナ"
original = "「フ──それだけではない。この小皿のサラダ、いつもより分量を増やしてある。姫の苦手なトマトとパプリカも１割増しだ」"
translation = "「후── 그뿐만이 아니다. 이 작은 접시의 샐러드, 평소보다 분량을 늘려뒀다. 공주님이 싫어하시는 토마토와 파프리카도 10% 증량이다」"

[[dialogue]]
speaker = "ウェンディ"
original = "「流石です、セドナ長官……！」"
translation = "「과연 세드나 장관님……!」"

[[dialogue]]
speaker = "セドナ"
original = "「私が皿を運んでは警戒されてしまう。行け、ウェンディ。『姫に野菜をいっぱい食べてもらおう作戦』──決行だ」"
translation = "「내가 접시를 나르면 경계할 거다. 가라, 웬디. 『공주님께 야채를 듬뿍 먹게 하자 작전』── 결행이다」"

[[dialogue]]
speaker = "ウェンディ"
original = "「イエス、マム！」"
translation = "「예스, 맘!」"

[[dialogue]]
speaker = "クラウディア"
original = "「む……これが今日の夕餉か」"
translation = "「음…… 이것이 오늘 저녁이냐」"

[[dialogue]]
speaker = "ウェンディ"
original = "「はい。どうぞ召し上がってください」"
translation = "「네. 자, 드셔보세요」"

[[dialogue]]
speaker = "クラウディア"
original = "「うむ。いただくとしよう。もぐもぐもぐ……」"
translation = "「음. 먹어보도록 하지. 우물우물우물……」"

[[dialogue]]
speaker = "ウェンディ"
original = "「なるほど、食べるのはお嫌ですか。そうですよね、では仕方ありません。こちらの小皿を──」"
translation = "「과연, 드시는 게 싫으신가요. 그렇죠, 그럼 어쩔 수 없네요. 이 작은 접시를──」"

[[dialogue]]
speaker = "ウェンディ"
original = "「って！？\u3000食べてる～～～！？」"
translation = "「어!? 먹고 있어~~~!?」"

[[dialogue]]
speaker = "クラウディア"
original = "「騒々しいぞ。食事中は静かにせんか！」"
translation = "「소란스럽다. 식사 중에는 조용히 하지 못할까!」"

[[dialogue]]
speaker = "ウェンディ"
original = "「セドナ長官っ！\u3000大変ですっ、緊急事態です！」"
translation = "「세드나 장관님! 큰일이에요, 비상사태입니다!」"

[[dialogue]]
speaker = "セドナ"
original = "「どうした敵襲か！？\u3000──なっ！？\u3000姫が、山盛りのサラダを……一体何が起こっているというのだ！？」"
translation = "「무슨 일이냐 적습인가!? ──나앗!? 공주님이 산더미 같은 샐러드를…… 대체 무슨 일이 벌어지고 있는 거지!?」"

[[dialogue]]
speaker = "ウェンディ"
original = "「クラウディア様。人間界で何か悪いものでも召し上がったのですか？\u3000拾い食いをしてはいけませんとあれほど……」"
translation = "「클라우디아 님. 인간계에서 뭐 잘못 드신 거 아니에요? 아무거나 주워 먹으면 안 된다고 그렇게나……」"

[[dialogue]]
speaker = "クラウディア"
original = "「しとらん！\u3000ああもう、仕方なかろうが！\u3000余は草っ葉を食う練習をせねばならんのだ！」"
translation = "「안 그랬다! 아 정말, 어쩔 수 없지 않느냐! 여는 풀때기를 먹는 연습을 해야 한단 말이다!」"

[[dialogue]]
speaker = "セドナ"
original = "「それは結構なことですが、いったいどういう心境の変化が……」"
translation = "「그건 좋은 일입니다만, 대체 무슨 심경의 변화가……」"

[[dialogue]]
speaker = "クラウディア"
original = "「…………だって魔王が、食い物の好き嫌いをせん女が好きだと言うから」"
translation = "「…………그게, 마왕이 음식을 가리지 않고 먹는 여자가 좋다고 하니까」"

[[dialogue]]
speaker = "セドナ"
original = "「は？」"
translation = "「하?」"

[[dialogue]]
speaker = "クラウディア"
original = "「──はっ！？\u3000い、いや勘違いするな！\u3000草っ葉も食えんのかと小馬鹿にされたから、見返してやるだけだ！\u3000他意はないからな！」"
translation = "「──핫!? 아, 아니 착각하지 마라! 풀때기도 못 먹느냐고 얕보였으니까 본때를 보여주는 것뿐이다! 다른 뜻은 없으니까 말이다!」"

[[dialogue]]
speaker = "クラウディア"
original = "「ほれ、とっとと出て行かんか、２人とも！」"
translation = "「자, 어서 나가지 못할까, 둘 다!」"

[[dialogue]]
speaker = "ウェンディ"
original = "「予想外の展開でしたが……よかったですねセドナ長官。クラウディア様が自らお野菜を召し上がられるだなんて、これは大変な進歩ですよ！」"
translation = "「예상 밖의 전개였지만…… 잘됐네요 세드나 장관님. 클라우디아 님이 스스로 야채를 드시다니, 이건 엄청난 진보예요!」"

[[dialogue]]
speaker = "セドナ"
original = "「……っ」"
translation = "「……윽」"

[[dialogue]]
speaker = "ウェンディ"
original = "「セドナ長官？\u3000あの……？」"
translation = "「세드나 장관님? 저기……?」"

[[dialogue]]
speaker = "セドナ"
original = "「なぜだ。私がどれだけ進言しても野菜を自ら食べてはくれなかったのに……」"
translation = "「어째서냐. 내가 아무리 진언해도 야채를 스스로 먹어주지 않았는데……」"

[[dialogue]]
speaker = "セドナ"
original = "「飴と鞭を使い分けたり、情操教育を子育て教本から学んだり、魔女の霊薬を用いたり、長老たちに相談もした……全て効果がなかった……！」"
translation = "「당근과 채찍을 번갈아 쓰고, 정서 교육을 육아 교본에서 배우고, 마녀의 영약을 사용하고, 장로들에게 상담도 했다…… 전부 효과가 없었는데……!」"

[[dialogue]]
speaker = "セドナ"
original = "「それなのに魔王の一言で……くそっ、何なのだこの感情は！？」"
translation = "「그런데 마왕의 말 한마디에…… 젠장, 대체 뭐냐 이 감정은!?」"

[[dialogue]]
speaker = "セドナ"
original = "「あの男に感謝はしている、だが同時にくすぶるこの怒り……どうすれば鎮められるのだ……おのれ、魔王め……！」"
translation = "「그 남자에게 감사하고는 있다, 하지만 동시에 타오르는 이 분노…… 어떻게 해야 가라앉힐 수 있는 거지…… 이놈, 마왕 녀석……!」"

[[dialogue]]
speaker = "unk"
original = "街で偶然セドナさんに会った時、いつもの３割増しで睨まれたのだけど、俺は何か嫌われるようなことをしてしまったのだろうか……？"
translation = "거리에서 우연히 세드나 씨를 만났을 때, 평소보다 30%는 더 무섭게 노려보셨는데, 내가 뭔가 미움받을 짓이라도 한 걸까……?"

[[dialogue]]
speaker = "unk"
original = "せっかくクラウディアがバーベキューで野菜を食べてくれて、嬉しい気分になっていたのだけれど。結局どれだけ考えても答えは出ないのだった──"
translation = "기껏 클라우디아가 바비큐에서 야채를 먹어줘서 기쁜 기분이었는데. 결국 아무리 생각해도 답은 나오지 않는 것이었다──"

