[[dialogue]]
speaker = "unk"
original = "第２話,尻フェチガール,P"
translation = "제2화, 엉덩이 페티시 걸, P"

[[dialogue]]
speaker = "unk"
original = "放課後、俺が星徒会室に戻ってくると、部屋の中でシズハ、サチ、プリムラの３人が何やら騒いでいた。"
translation = "방과 후, 내가 성도회실로 돌아오자, 방 안에서 시즈하, 사치, 프리뮬러 세 사람이 무언가 소란을 피우고 있었다."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「さあ、今度はサチちゃんの番よ♪」"
translation = "「자, 이번에는 사치 짱 차례야♪」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「いや～！\u3000待って！\u3000ちょっと待って～！」"
translation = "「싫어~! 기다려! 잠깐만 기다려~!」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「よくもこの我を生贄に差し出してくれたな！\u3000次は貴様の番じゃぞ、サチ～！」"
translation = "「감히 이 몸을 제물로 바치다니! 다음은 네놈 차례니라, 사치~!」"

[[dialogue]]
speaker = "unk"
original = "見れば、サチがシズハとプリムラに追いかけ回されている。"
translation = "보니, 사치가 시즈하와 프리뮬러에게 쫓기고 있다."

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「あっ、お兄さん！\u3000助けて下さい～！\u3000このままじゃ私――」"
translation = "「앗, 오빠! 도와주세요~! 이대로라면 저──」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「２時間たっぷりお尻を揉みしだかれちゃいますぅ～～～っ！」"
translation = "「2시간 내내 엉덩이를 잔뜩 주물러지게 돼요오오~~~옷!」"

[[dialogue]]
speaker = "unk"
original = "どういう状況！？"
translation = "무슨 상황이야!?"

[[dialogue]]
speaker = "unk"
original = "すると、サチが頭に付けている四つ葉のクローバーの髪飾りが点滅し、そこに憑依しているトレジアンナさんが喋り出す。"
translation = "그러자 사치가 머리에 달고 있는 네잎클로버 머리장식이 점멸하고, 그곳에 빙의해 있는 트레지안나 씨가 말하기 시작한다."

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「会長さん、実はですね～。シズハさんのいつもの面白い性癖が、また発動しまして～」"
translation = "「회장님, 사실은 말이죠~. 시즈하 씨의 평소의 재미있는 성벽이 또 발동해서~」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「サチさんとプリムラさんのお尻を追いかけ回しているんですよ♪」"
translation = "「사치 씨와 프리뮬러 씨의 엉덩이를 쫓아다니고 있답니다♪」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「ふふっ、別にそんな大したことじゃないわ。これはお互い仲良くする為の、コミュニケーションなんだから♪」"
translation = "「후훗, 별로 그렇게 대단한 일 아니야. 이건 서로 친해지기 위한 커뮤니케이션이니까♪」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「女の子同士でも、お尻を勝手に触ろうとするのはセクハラだからね！？」"
translation = "「여자끼리라도 엉덩이를 마음대로 만지려고 하는 건 성희롱이라니까!?」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「大丈夫よ♪\u3000私だけじゃなくて、次はサチちゃんも私のお尻を触っていいから♪」"
translation = "「괜찮아♪ 나뿐만 아니라, 다음에는 사치 짱도 내 엉덩이를 만져도 되니까♪」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「それはそれでおかしいよね！？\u3000普通のコミュニケーションじゃないよ！？」"
translation = "「그건 그것대로 이상하잖아!? 평범한 커뮤니케이션이 아니라고!?」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「我も散々、尻を揉まれたのじゃ……」"
translation = "「나도 잔뜩, 엉덩이를 주물러졌느니라……」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「サチのやつ、自分が逃がれる為に、尻を揉むなら我の方にすべきじゃと、シズハに差し出しおったのじゃ！」"
translation = "「사치 그 녀석, 자기가 벗어나기 위해 엉덩이를 주무를 거면 내 쪽으로 하라고 시즈하에게 넘겨버렸느니라!」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「いや～、やっぱりプリムラちゃんはいいお尻してるわよね～♪\u3000小さい体なのに、揉み甲斐のあるプリプリもちもち肌で、青い果実って感じがして～」"
translation = "「이야~ 역시 프리뮬러 짱은 좋은 엉덩이를 가졌단 말이지~♪ 작은 몸인데도 주무르는 보람이 있는 탱글탱글 쫀득쫀득한 피부라, 풋과일 같은 느낌이 들어서~」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「言ってることが、完全に変態のおじさんだよ！？」"
translation = "「말하는 게 완전히 변태 아저씨잖아!?」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「それで今はプリムラちゃんと協力して、サチちゃんとコミュケーションしようとしてるところなの♪」"
translation = "「그래서 지금은 프리뮬러 짱이랑 협력해서 사치 짱이랑 커뮤니케이션하려던 참이야♪」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「手出しは無用じゃぞ、眷族！\u3000自分の代わりにヒトを差し出すような悪い裏切り者には、報復が必要なのじゃ！」"
translation = "「참견은 무용이니라, 권속! 자신을 대신해 사람을 넘겨준 나쁜 배신자에게는 보복이 필요한 법이니라!」"

[[dialogue]]
speaker = "unk"
original = "――どうやら星徒会室で騒いでいたのは、俺がちょうど留守のタイミングで、サチが逃げ込んできたかららしい。"
translation = "──아무래도 성도회실에서 소란을 피웠던 건, 내가 마침 자리를 비운 타이밍에 사치가 도망쳐 들어왔기 때문인 듯하다."

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「――とにかく！\u3000助けて下さい、お兄さん！\u3000このままじゃ私、エッチな目にあわされちゃいます～！」"
translation = "「──어쨌든! 도와주세요, 오빠! 이대로라면 저, 야한 일을 당해버려요~!」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「あははっ♪\u3000そんな私が卑猥なことをしてるみたいに～♪\u3000ちょ～っとお尻を中心に、マッサージしてあげるだけよ。ちょっとだけだから♪」"
translation = "「아하하♪ 그렇게 내가 비외한 짓을 하는 것처럼~♪ 아주 조~금 엉덩이를 중심으로 마사지해 주는 것뿐이야. 아주 잠깐이니까♪」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「絶対にウソ！！！\u3000手の指がワキワキといやらしい動きを隠せてないし！」"
translation = "「절대로 거짓말!!! 손가락이 꼼지락꼼지락 음란한 움직임을 숨기지 못하고 있잖아!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「お兄さんもシズハちゃんを止めて下さい！\u3000セクハラはいけないよって！」"
translation = "「오빠도 시즈하 짱을 말려주세요! 성희롱은 안 된다고!」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「あっ、そうだ！\u3000次は会長の番ね♪\u3000せっかく星徒会室まで来たんだから、コミュニケーションしとかないと勿体ないし♪」"
translation = "「앗, 맞다! 다음은 회장 차례네♪ 어렵게 성도회실까지 왔으니까, 커뮤니케이션해두지 않으면 아깝잖아♪」"

[[dialogue]]
speaker = "unk"
original = "女の子同士、どうぞごゆっくり"
translation = "여자끼리, 부디 천천히 즐겨"

[[dialogue]]
speaker = "unk"
original = "部外者はお邪魔みたいなので"
translation = "외부인은 방해되는 것 같으니"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ちょっ、お兄さん！？\u3000逃げたぁ！？」"
translation = "「잠깐, 오빠!? 도망갔어!?」"

[[dialogue]]
speaker = "unk"
original = "しばらくして俺が星徒会室に戻って来ると、そこには顔をつやつやとさせたシズハの姿があった。"
translation = "잠시 후 내가 성도회실로 돌아오자, 그곳에는 얼굴이 반질반질해진 시즈하의 모습이 있었다."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「――ふぅ～♪\u3000サチちゃんの可愛いお尻、堪能した～♪」"
translation = "「──후우~♪ 사치 짱의 귀여운 엉덩이, 만끽했어~♪」"

[[dialogue]]
speaker = "unk"
original = "これで解散ということで――"
translation = "이걸로 해산하는 걸로──"

[[dialogue]]
speaker = "unk"
original = "よし！\u3000じゃあ俺もそろそろ仕事したいから"
translation = "좋아! 그럼 나도 슬슬 일하고 싶으니까"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「お兄さん？」"
translation = "「오빠?」"

[[dialogue]]
speaker = "unk"
original = "そんな俺の手首を掴んだのは、貼り付けたような笑顔を浮かべたサチだった。"
translation = "그런 내 손목을 붙잡은 것은, 박제한 듯한 미소를 짓고 있는 사치였다."

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「何を言ってるんですか？\u3000次はお兄さんの番ですよ？」"
translation = "「무슨 소리를 하시는 건가요? 다음은 오빠 차례라고요?」"

[[dialogue]]
speaker = "unk"
original = "エッチなのは禁止なんじゃ……"
translation = "야한 건 금지였을 텐데……"

[[dialogue]]
speaker = "unk"
original = "えっと……サチさん？"
translation = "저기…… 사치 씨?"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ふふっ、大丈夫です。これはシズハちゃんのコミュニケーションですから♪\u3000ねぇ、プリムラ？」"
translation = "「후훗, 괜찮아요. 이건 시즈하 짱의 커뮤니케이션이니까요♪ 그치, 프리뮬러?」"

[[dialogue]]
speaker = "unk"
original = "続いて、反対側の手首もプリムラに掴まれる。"
translation = "이어서 반대쪽 손목도 프리뮬러에게 붙잡힌다."

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「……許せ、眷族よ。わかるじゃろう？」"
translation = "「……용서하거라, 권속이여. 알지 않느냐?」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「今のサチはヤバいのじゃ。あれは相当に怒っておる……今逆らうと、簀巻きにされるどころではすまぬ。悪く思うでないぞ」"
translation = "「지금의 사치는 위험하느니라. 저건 상당히 화가 나 있어…… 지금 거스르면 멍석말이 정도로 끝나지 않을 것이니라. 나쁘게 생각지 말거라」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ふふふふふふっ♪」"
translation = "「후후후후후훗♪」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「大丈夫よ、会長。ただマッサージをするだけだから♪」"
translation = "「괜찮아, 회장. 그냥 마사지만 하는 거니까♪」"

[[dialogue]]
speaker = "unk"
original = "どうしてそんなに嬉しそうなんだ！？"
translation = "왜 그렇게 기뻐 보이는 거야!?"

[[dialogue]]
speaker = "unk"
original = "待て待て！\u3000男の尻を触るのに"
translation = "잠깐 잠깐! 남자의 엉덩이를 만지는 데"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「そりゃあもちろん、女の子のお尻にはない魅力が、そこにあるからよ！\u3000言っとくけど、誰のお尻でもいいわけじゃないわよ？」"
translation = "「그야 물론, 여자아이 엉덩이에는 없는 매력이 거기에 있으니까! 말해두겠는데, 아무 엉덩이나 다 좋다는 건 아니라고?」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「会長のはね、男らしく筋肉が付いてて、しかしそれでいて固くなく、弾力に満ち溢れていて、瑞々しいっていうか～♪」"
translation = "「회장 건 말이야, 남자답게 근육이 붙어 있으면서도, 그러면서도 딱딱하지 않고 탄력이 넘쳐서 싱그럽다고나 할까~♪」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「これはもう女神様の悪戯だと思うんだけど……そう！\u3000中性的なのよ！\u3000会長は、男性と女性のお尻のいいとこどりをした――」"
translation = "「이건 정말 여신님의 장난이라고 생각하는데…… 그래! 중성적이야! 회장은 남성과 여성 엉덩이의 장점만 모아놓은──」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「ズバリ、『ハイブリッドプリケツ』なの！\u3000男にも女にも好かれるお尻！」"
translation = "「바로, 『하이브리드 탱글 엉덩이』라고! 남자에게도 여자에게도 사랑받는 엉덩이!」"

[[dialogue]]
speaker = "unk"
original = "早くなんとかしないと……！"
translation = "빨리 어떻게든 하지 않으면……!"

[[dialogue]]
speaker = "unk"
original = "ダメだ、この尻フェチガール"
translation = "안 되겠어, 이 엉덩이 페티시 걸"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「…………ふむ」"
translation = "「…………흠」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「そう聞くと、我もちょっと触ってみたくなってきたのじゃ」"
translation = "「그렇게 들으니 나도 좀 만져보고 싶어졌느니라」"

[[dialogue]]
speaker = "unk"
original = "プリムラさん！？"
translation = "프리뮬러 씨!?"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「ほうほう…………これは確かに、いい尻をしておるのじゃ」"
translation = "「호오호오………… 이건 확실히 좋은 엉덩이를 하고 있느니라」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「でしょ～？\u3000プリムラちゃんにもこの良さがわかるのね♪」"
translation = "「그치~? 프리뮬러 짱도 이 장점을 알아보는구나♪」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "（お兄さんのお尻、そんなに良いんだ……？）"
translation = "（오빠 엉덩이, 그렇게 좋은가……?）"

[[dialogue]]
speaker = "unk"
original = "キャーーーーーーーーー！！？"
translation = "꺄아아아아아아아아아!!?"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「どーしてお兄さんは、私が触った時だけ悲鳴をあげるんですかっ！？」"
translation = "「어째서 오빠는 제가 만졌을 때만 비명을 지르는 건가요!?」"

[[dialogue]]
speaker_original = "プリムラ（覚醒）"
speaker_translation = "프리뮬러(각성)"
original = "「お前は手つきがいやらしいんじゃ。このむっつりドスケベめっ！」"
translation = "「네 녀석은 손놀림이 음란하느니라. 이 음흉한 도스케베 같으니!」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「ふむふむ、なるほど……サチちゃんはむっつりドスケベ、っと」"
translation = "「흠흠, 과연…… 사치 짱은 음흉한 도스케베, 메모」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ちょっと！？\u3000違うからね！？\u3000ねぇ、お兄さんもちゃんと言って下さい！\u3000私、別に変な触り方してないですよね！？」"
translation = "「잠깐!? 아니거든요!? 저기, 오빠도 제대로 말해 주세요! 저, 딱히 이상하게 만지지 않았죠!?」"

[[dialogue]]
speaker = "unk"
original = "……サチのエッチ！"
translation = "……사치 변태!"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「そんなぁ～～！\u3000シズハちゃんもプリムラも触ってたのに、なんで私だけぇ～～！！」"
translation = "「너무해~~! 시즈하 짱이랑 프리뮬러도 만졌는데 왜 나만~~!!」"

[[dialogue]]
speaker = "unk"
original = "申し訳ないがこの件に関しては、プリムラの言葉が真実を突いていると思わざるを得ない俺なのであった。"
translation = "미안하지만 이 건에 관해서는 프리뮬러의 말이 진실을 꿰뚫고 있다고 생각할 수밖에 없는 나였다."

