[[dialogue]]
speaker = "unk"
original = "第２話,汐ルカルカの『お姉ちゃん』,P"
translation = "제2화, 시오 루카루카의 『언니』, P"

[[dialogue]]
speaker = "unk"
original = "『汐ルカルカ』の水着衣装の発表。そして新曲の動画が公開されて、しばらく経ったある日の放課後のこと──"
translation = "『시오 루카루카』의 수영복 의상 발표. 그리고 신곡 영상이 공개되고, 한참이 지난 어느 날 방과 후의 일──"

[[dialogue]]
speaker = "ルルカ"
original = "「よーっし！\u3000モンスター撃破～♪\u3000アナちゃん、記録はどうだった？」"
translation = "「좋─아! 몬스터 격파~♪ 아나짱, 기록은 어땠어?」"

[[dialogue]]
speaker = "アナ"
original = "「イエス。先ほどよりもタイムが縮まりました。ルルカさんも水着フォームに慣れてきたようですね」"
translation = "「예스. 아까보다 타임이 단축되었습니다. 루루카 씨도 수영복 폼에 익숙해진 모양이군요」"

[[dialogue]]
speaker = "リーリア"
original = "「だねー。即席のクラスメイトチームでこれだけの成績が出せるなら、もうばっちりだよね。お疲れマジカル！」"
translation = "「그렇네─. 즉석 클래스메이트 팀으로 이 정도 성적을 낼 수 있다면, 이제 완벽하네. 수고 매지컬!」"

[[dialogue]]
speaker = "アナ"
original = "「お疲れマジカルです」"
translation = "「수고 매지컬입니다」"

[[dialogue]]
speaker = "ルルカ"
original = "「２人とも模擬戦闘に付き合ってくれてありがとう！\u3000お疲れマジカル～♪」"
translation = "「둘 다 모의 전투 도와줘서 고마워! 수고 매지컬~♪」"

[[dialogue]]
speaker = "unk"
original = "その挨拶、流行ってるの？"
translation = "그 인사, 유행하는 거야?"

[[dialogue]]
speaker = "ルルカ"
original = "「あっ、お兄ちゃん！\u3000あたしたちの訓練、見てくれてたの？」"
translation = "「앗, 오빠! 우리들 훈련, 보고 있었어?」"

[[dialogue]]
speaker = "アナ"
original = "「会長、朗報です。ルルカさんが覚醒した水着フォームの数値計測をした結果、十分に実戦が可能との結論に至りました」"
translation = "「회장, 낭보입니다. 루루카 씨가 각성한 수영복 폼의 수치 계측을 한 결과, 충분히 실전이 가능하다는 결론에 이르렀습니다」"

[[dialogue]]
speaker = "リーリア"
original = "「これは今後、センパイの指揮が試されちゃうことになりそうですね～？\u3000頑張ってください！」"
translation = "「이건 앞으로, 선배의 지휘가 시험받게 될 것 같네요~? 힘내주세요!」"

[[dialogue]]
speaker = "unk"
original = "ああ、任せてくれ"
translation = "아아, 맡겨줘"

[[dialogue]]
speaker = "ルルカ"
original = "「お兄ちゃんを助けられるように、あたしも頑張るからね！」"
translation = "「오빠를 도울 수 있도록, 나도 열심히 할게!」"

[[dialogue]]
speaker = "リーリア"
original = "「あ、そういえば話は変わるんだけど……ルルカちゃんってＶチューバーの汐ルカルカって知ってる？」"
translation = "「아, 그러고 보니 이야기는 바뀝니다만…… 루루카 짱은 VTuber 시오 루카루카라고 알아?」"

[[dialogue]]
speaker = "ルルカ"
original = "「うぇっ！？\u3000な、何で？\u3000そんなことをいきなりっ……」"
translation = "「우엣!? 어, 어째서? 그런 걸 갑자기……」"

[[dialogue]]
speaker = "リーリア"
original = "「え。だってその水着、ルカルカの新アバターとそっくりだから気になっちゃって」"
translation = "「에. 그치만 그 수영복, 루카루카의 새 아바타랑 똑같아서 신경 쓰였거든요」"

[[dialogue]]
speaker = "ルルカ"
original = "「え゛っ──！？」"
translation = "「에엑──!?」"

[[dialogue]]
speaker = "unk"
original = "リ、リーリアもＶチューバーを見るの？"
translation = "리, 리리아도 VTuber를 봐?"

[[dialogue]]
speaker = "リーリア"
original = "「えー、そりゃあ見ますよ。今どきの乙女ですから～」"
translation = "「에이, 당연히 보죠. 요즘 시대의 소녀니까요~」"

[[dialogue]]
speaker = "アナ"
original = "「私も汐ルカルカは知っていますよ。人間界の文化研究も、留学の目的。流行とされるものは当然調査をしていますから」"
translation = "「저도 시오 루카루카는 알고 있습니다. 인간계의 문화 연구도 유학의 목적. 유행하는 것이라고 여겨지는 것은 당연히 조사하고 있으니까요」"

[[dialogue]]
speaker = "ルルカ"
original = "「な、ななな、なるほどっ……２人とも、ルカルカの視聴者さん、なんだ……？」"
translation = "「나, 나나나, 과연…… 둘 다, 루카루카의 시청자구나……?」"

[[dialogue]]
speaker = "リーリア"
original = "「うん！\u3000特にショート動画で切り抜かれる、激辛ラーメンチャレンジ。あれ大好き～♪」"
translation = "「응! 특히 쇼츠 영상으로 잘려 나오는, 매운 라면 챌린지. 그거 너무 좋아~♪」"

[[dialogue]]
speaker = "アナ"
original = "「私も好きです。女性が出してはいけないような汚い声が癖になります」"
translation = "「저도 좋아합니다. 여성이 내서는 안 될 것 같은 추한 목소리가 버릇이 됩니다」"

[[dialogue]]
speaker = "ルルカ"
original = "（そこは歌動画を見てよぉ……！）"
translation = "(그 부분은 노래 영상을 봐달라구……!)"

[[dialogue]]
speaker = "リーリア"
original = "「ルルカちゃんって、いつもの戦闘服もルカルカの衣装とそっくりでしょ？\u3000で、今回の水着フォームも瓜二つ」"
translation = "「루루카 짱은 평소 전투복도 루카루카 의상이랑 똑같잖아? 그리고 이번 수영복 폼도 판박이고」"

[[dialogue]]
speaker = "アナ"
original = "「なるほど。言われてみればそうですね」"
translation = "「과연. 듣고 보니 그렇군요」"

[[dialogue]]
speaker = "ルルカ"
original = "（どどどどどっ、どうしよう！？\u3000お兄ちゃん、身バレ！？\u3000もしかして身バレしちゃった！？）"
translation = "(어어어어떡하지!? 오빠, 정체 탄로!? 혹시 정체 들켜버린 거야!?)"

[[dialogue]]
speaker = "unk"
original = "（落ち着こう、まだバレたわけじゃない）"
translation = "(진정해, 아직 들킨 건 아냐)"

[[dialogue]]
speaker = "リーリア"
original = "「私、思ったんですよねえ。ルルカちゃんはきっと──」"
translation = "「저, 생각했거든요. 루루카 짱은 분명──」"

[[dialogue]]
speaker = "ルルカ"
original = "「ひぃ～っ！？」"
translation = "「히익~!?」"

[[dialogue]]
speaker = "リーリア"
original = "「汐ルカルカの『お姉ちゃん』なんでしょ！\u3000ねっ♪」"
translation = "「시오 루카루카의 『언니』인 거지! 그치♪」"

[[dialogue]]
speaker = "ルルカ"
original = "「はっ……？」"
translation = "「하……?」"

[[dialogue]]
speaker = "unk"
original = "お、お姉ちゃん？"
translation = "어, 언니?"

[[dialogue]]
speaker = "アナ"
original = "「会長。ご存じないのですか？\u3000汐ルカルカは、自身の男性ファンを『お兄ちゃん』、女性ファンを『お姉ちゃん』と呼称します」"
translation = "「회장. 모르십니까? 시오 루카루카는 자신의 남성 팬을 『오빠』, 여성 팬을 『언니』라고 호칭합니다」"

[[dialogue]]
speaker = "リーリア"
original = "「ねー。ルルカちゃん、きっとメンバーシップにも入ってるよ。相当熱狂的なルカルカファンなんだよ、きっと」"
translation = "「그치─. 루루카 짱, 분명 멤버십에도 가입했을 거야. 상당히 열광적인 루카루카 팬인 거야, 분명」"

[[dialogue]]
speaker = "アナ"
original = "「はい。私の水着フォームが覚醒した時も、その時着ていた水着がそのまま戦闘服となりました」"
translation = "「네. 제 수영복 폼이 각성했을 때도, 그때 입고 있던 수영복이 그대로 전투복이 되었습니다」"

[[dialogue]]
speaker = "アナ"
original = "「おそらくリゾート結界の疑似守護星は、本人の強いイメージに影響を受ける傾向があるのだと思います。あくまで憶測ですが」"
translation = "「아마 리조트 결계의 의사 수호성은 본인의 강한 이미지에 영향을 받는 경향이 있다고 생각합니다. 어디까지나 억측입니다만」"

[[dialogue]]
speaker = "リーリア"
original = "「うんうん！\u3000ルルカちゃんってルカルカのことがすっごく好きなんだな～って。……あ、もしかして違った？」"
translation = "「응응! 루루카 짱은 루카루카를 정말 좋아하는구나~ 싶어서. ……아, 혹시 아니었어?」"

[[dialogue]]
speaker = "ルルカ"
original = "「え、え、えっと──」"
translation = "「에, 에, 에또──」"

[[dialogue]]
speaker = "ルルカ"
original = "「そ、そうっ！\u3000あたし、実は汐ルカルカの大ファンなの！！\u3000デビューした時からずーっと追ってるんだぁ！！」"
translation = "「그, 그래! 나, 사실 시오 루카루카의 대팬이야!! 데뷔했을 때부터 쭈─욱 쫓고 있거든!!」"

[[dialogue]]
speaker = "ルルカ"
original = "「もぉ可愛いからね、とにかく可愛いからね！\u3000歌もうまいしダンスもできるし、トークだってテンポが良くて、えっと、えっとえっと──」"
translation = "「정말 귀여우니까 말야, 아무튼 귀여우니까! 노래도 잘하고 춤도 출 줄 알고, 토크도 템포가 좋고, 에또, 에또에또──」"

[[dialogue]]
speaker = "リーリア"
original = "「あ、やっぱりそうなんだ～♪」"
translation = "「아, 역시 그렇구나~♪」"

[[dialogue]]
speaker = "アナ"
original = "「意外です。ルルカさんが、そこまでルカルカフリークだったとは」"
translation = "「의외입니다. 루루카 씨가 그렇게까지 루카루카 프리크였다니」"

[[dialogue]]
speaker = "ルルカ"
original = "「もぉ大好きだよぉ！\u3000耳かき動画も癒されるしラーメン食べてむせてるところは笑えるし！」"
translation = "「정말 좋아해애! 귀 파기 영상도 힐링 되고 라면 먹고 사레들리는 부분은 웃기고!」"

[[dialogue]]
speaker = "ルルカ"
original = "「通知アラートも設定してるしメンバーシップアイコンも金冠だよ！\u3000最古参！\u3000ルカルカのことなら何でも聞いて！」"
translation = "「알림 설정도 해뒀고 멤버십 아이콘도 금관이야! 최고참! 루카루카에 대해서라면 뭐든 물어봐!」"

[[dialogue]]
speaker = "ルルカ"
original = "「で、でもでも！\u3000でもね！？\u3000ルカルカの一番の魅力は歌だから！\u3000歌動画を聴いて！\u3000ねっ！！\u3000お願いだからぁ～っ！！」"
translation = "「하, 하지만 하지만! 하지만 말야!? 루카루카의 가장 큰 매력은 노래니까! 노래 영상을 들어줘! 응!! 부탁이니까아~앗!!」"

[[dialogue]]
speaker = "アナ"
original = "「あ、はい……わ、わかりました……歌ですね……？」"
translation = "「아, 네…… 아, 알겠습니다…… 노래 말이죠……?」"

[[dialogue]]
speaker = "リーリア"
original = "「お、おぉ～……流石は戦闘服がアバターそっくりになっちゃうレベルの『お姉ちゃん』……パッションすごーい……」"
translation = "「오, 오오~…… 역시 전투복이 아바타랑 똑같이 변해버릴 정도의 『언니』…… 패션 대단해~……」"

[[dialogue]]
speaker = "unk"
original = "（でもここはこれで乗り切るしか……！）"
translation = "（하지만 여기선 이걸로 버틸 수밖에……！）"

[[dialogue]]
speaker = "unk"
original = "（２人が若干引いている……！）"
translation = "（두 사람이 약간 질려 하고 있어……！）"

[[dialogue]]
speaker = "ルルカ"
original = "「ルカルカちゃんのことなら何でも聞いてよー！\u3000わっはっはっは～！」"
translation = "「루카루카에 대해서라면 뭐든 물어봐! 왓하하하~!」"

[[dialogue]]
speaker = "unk"
original = "その後、ルルカと２人きりになって──"
translation = "그 후, 루루카와 단둘이 남게 되어──"

[[dialogue]]
speaker = "ルルカ"
original = "「う、ぅぅうぅうー……」"
translation = "「우, 우우우우우-……」"

[[dialogue]]
speaker = "ルルカ"
original = "「だ、ダメージが大きいよ、お兄ちゃん……自分で自分を褒めちぎるとか……ほんと何様って感じだよぉ……」"
translation = "「데, 데미지가 커, 오빠…… 스스로 자신을 입에 침이 마르도록 칭찬하다니…… 진짜 내가 봐도 어이가 없네에……」"

[[dialogue]]
speaker = "ルルカ"
original = "「今日はお兄ちゃんのお家、行ってもいい……？\u3000一人だと羞恥心でおかしくなっちゃいそう……慰めてぇ……」"
translation = "「오늘은 오빠네 집, 가도 돼……? 혼자 있으면 수치심 때문에 이상해질 것 같아…… 위로해 줘……」"

[[dialogue]]
speaker = "unk"
original = "しおしおになったルルカに、俺は「もちろん」と返すしかないのだった……"
translation = "풀이 죽은 루루카에게, 나는 「물론이지」라고 대답할 수밖에 없었다……"

