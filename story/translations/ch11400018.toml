[[dialogue]]
speaker = "ノルトハウゼン"
original = "「──その時はわたくし、自分の身に何が起こったのか、しばらく分かりませんでしたわ」"
translation = "「──그때 저는 제 몸에 무슨 일이 일어난 건지 한동안 알지 못했어요」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「ですが以前に車掌さまから、プトラさんが異世界に転移したというお話を聞いておりましたので、それほど取り乱さずに済みましたの」"
translation = "「하지만 예전에 차장님으로부터 푸트라 씨가 이세계로 전이했다는 이야기를 들었기에 그리 당황하지 않고 끝낼 수 있었죠」"

[[dialogue]]
speaker = "unk"
original = "異世界から戻ってきたその日、ノルトハウゼンはすぐに車掌の元にやってきて、そこで経験した出来事を語ってくれていた。"
translation = "이세계에서 돌아온 그날, 노르트하우젠은 곧장 차장에게 찾아와 그곳에서 겪은 일들을 들려주었다."

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「短い間でしたが、とても楽しい時間を過ごさせて頂きましたわ」"
translation = "「짧은 시간이었지만 아주 즐거운 시간을 보냈답니다」"

[[dialogue]]
speaker = "unk"
original = "その話を一通り聞き終えた後、ずっと気になっていたことを訊ねる。"
translation = "그 이야기를 대충 다 듣고 난 뒤, 계속 신경 쓰였던 것을 묻는다."

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「この服のことですの？\u3000はい、あちらの世界に転移した際、少し変化したようですわ。車掌さまにもぜひ見ていただきたいと思って、着てきましたの」"
translation = "「이 옷 말인가요? 네, 저쪽 세계로 전이했을 때 조금 변화한 것 같아요. 차장님께도 꼭 보여드리고 싶어서 입고 왔답니다」"

[[dialogue]]
speaker = "unk"
original = "ノルトハウゼンは優雅にポーズを決めて、そしてくすりと笑う。"
translation = "노르트하우젠은 우아하게 포즈를 취하고는 생긋 웃는다."

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「車掌さま……わたくし、お願いがありますの」"
translation = "「차장님…… 저, 부탁이 있어요」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「しばらくの間、わたくしと車掌さまは離れ離れでした。ですから……車掌さまからの鉄分注入を、少々求めていると言いますか……」"
translation = "「한동안 저와 차장님은 떨어져 있었죠. 그러니까…… 차장님의 철분 주입을 조금 원하고 있달까……」"

[[dialogue]]
speaker = "unk"
original = "それほど長い間だったろうかと首を傾げるこちらに、ノルトハウゼンはゆっくりとしな垂れかかってくる。"
translation = "그렇게 긴 시간이었나 하고 고개를 갸우뚱하는 나에게 노르트하우젠은 천천히 몸을 기대어 온다."

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「わたくしの感覚では、とても長い間、車掌さまと触れ合っていないと……そう感じてしまいましたわ」"
translation = "「저의 감각으로는 아주 오랫동안 차장님과 닿지 못했다고…… 그렇게 느껴버렸거든요」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「ですから車掌さま、お願いします……」"
translation = "「그러니까 차장님, 부탁해요……」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「わたくしがお願いしたことですから、車掌さまはそのまま……楽になさっていてください」"
translation = "「제가 부탁한 것이니까 차장님은 그대로…… 편히 계셔주세요」"

[[dialogue]]
speaker = "unk"
original = "こちらがベッドのふちに腰掛けると、ノルトハウゼンはそっと微笑みながら、包み込むような優しさでこちらの膝上にまたがってきた。"
translation = "내가 침대 가장자리에 걸터앉자 노르트하우젠은 살며시 미소 지으며 감싸 안는 듯한 부드러움으로 내 무릎 위에 올라탔다."

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「まあ……もうこんなに固くしていらっしゃいますのね……」"
translation = "「어머…… 벌써 이렇게 단단하게 만드셨네요……」"

[[dialogue]]
speaker = "unk"
original = "ノルトハウゼンの細く滑らかな指が、熱くたぎった陰茎をなぞるように触れた。"
translation = "노르트하우젠의 가늘고 매끄러운 손가락이 뜨겁게 달아오른 음경을 훑듯이 스쳤다."

[[dialogue]]
speaker = "unk"
original = "それだけで背中にゾクゾクとしたものが走る。"
translation = "그것만으로 등줄기에 전율이 흐른다."

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「嬉しいですわ……わたくしで、こんなに大きくしてくださって……」"
translation = "「기뻐요…… 저 때문에 이렇게 크게 만들어 주셔서……」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「これがわたくしの中に入って、それから激しく脈打ちながら……わたくしに沢山の鉄分を注ぎ込んでくださるのですね」"
translation = "「이것이 제 안으로 들어와서, 그다음 격렬하게 맥동하며…… 저에게 많은 철분을 쏟아부어 주시는 거군요」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「ふふっ。先の方が少しだけ、もうヌルヌルしてきていますわ。早くわたくしの中に入りたいのでしょうか……」"
translation = "「후후. 끝부분이 조금씩 벌써 미끌미끌해졌네요. 빨리 제 안으로 들어오고 싶은 걸까요……」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「わたくし、車掌さまを受け入れる準備は、もう整っておりますのよ。すぐに、気持ちよくして差し上げますから……」"
translation = "「저, 차장님을 받아들일 준비는 이미 다 되었답니다. 금방 기분 좋게 해드릴 테니까……」"

[[dialogue]]
speaker = "unk"
original = "ノルトハウゼンは語りかけるようにこちらのものを撫でながら、自身の花弁へその先端を誘導した。"
translation = "노르트하우젠은 말을 걸듯 나의 것을 쓰다듬으며 자신의 꽃잎으로 그 끝을 유도했다."

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「では、挿れさせていただきますね……んんっ……！」"
translation = "「그럼, 삽입할게요…… 응……!」"

[[dialogue]]
speaker = "unk"
original = "肉棒の先端を秘部に押し当てたまま、ゆっくりと腰を落としていく。"
translation = "육봉의 끝을 비부에 밀착시킨 채 천천히 허리를 내린다."

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「んっ……んん……はぁあ……あぁ、はぁああ……<emoji=heart04>」"
translation = "「응…… 으응…… 하아…… 아아, 하아아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ズブズブとかき分けるような感触と共に、こちらの身体の尖った一部分がノルトハウゼンの中に埋まっていく。"
translation = "질척하게 헤치고 들어가는 감각과 함께 내 몸의 뾰족한 일부분이 노르트하우젠의 안으로 묻혀 들어간다."

[[dialogue]]
speaker = "unk"
original = "やがてそれを根元までのみ込むと、ノルトハウゼンは笑みと共に甘い吐息を漏らした。"
translation = "이윽고 그것을 뿌리까지 집어삼키자 노르트하우젠은 미소와 함께 달콤한 숨결을 내뱉었다."

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「ふふふふっ。ひとつに繋がりあって、感じますわ……車掌さまのこれ、こんなに硬く、大きく張り詰めて……」"
translation = "「후후후후. 하나로 이어져서 느껴져요…… 차장님의 이거, 이렇게나 단단하고 크게 부풀어서……」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「わたくしを内から強く押し広げて……んんっ……それが、車掌さまと結ばれている実感を、与えてくれますの……」"
translation = "「저를 안에서부터 강하게 밀어 넓히고…… 응…… 그것이 차장님과 맺어져 있다는 실감을 준답니다……」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「その逞しさが……わたくしを幸せな気持ちに、させてくれるんです……<emoji=heart04>」"
translation = "「그 늠름함이…… 저를 행복한 기분으로 만들어줘요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "こちらもノルトハウゼンとこうしている時間が、どうしようもなく幸せだ。"
translation = "나 또한 노르트하우젠과 이러고 있는 시간이 어쩔 수 없이 행복하다."

[[dialogue]]
speaker = "unk"
original = "感謝の気持ちを伝えると、ノルトハウゼンは全て伝わったといった風に小さく頷き、ゆっくりと身体を上下に揺さぶり始める。"
translation = "감사의 마음을 전하자 노르트하우젠은 전부 전해졌다는 듯 작게 고개를 끄덕이고 천천히 몸을 위아래로 흔들기 시작한다."

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「はぁ、ぅ……んんっ……気持ちいい、ですか……車掌さま……」"
translation = "「하아, 윽…… 응…… 기분 좋으신가요…… 차장님……」"

[[dialogue]]
speaker = "unk"
original = "ただ繋がり合っているだけでも気持ちよかったのに、膣内に包まれた敏感な部分を柔らかい感触が刺激していく。"
translation = "단순히 이어져 있는 것만으로도 기분 좋았는데, 질내에 감싸인 민감한 부분을 부드러운 감촉이 자극해 온다."

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「わたくしが動くたび……んんっ……車掌さまのが、ビクッビクッって……反応していますわ……<emoji=heart04>」"
translation = "「제가 움직일 때마다…… 응…… 차장님의 것이, 파르르 떨리면서…… 반응하고 있어요……<emoji=heart04>」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「動く速さは、このくらいが良いんですよね？\u3000わたくし、車掌さまと何度も交わって……少しずつ、学びましたの……」"
translation = "「움직이는 속도는, 이 정도가 좋은 거죠? 저, 차장님과 몇 번이나 교미하며…… 조금씩, 배웠답니다……」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「ですけど……んんっ……わたくし、もっともっと車掌さまに……喜んでもらいたいですわ……」"
translation = "「하지만…… 응…… 저, 좀 더 좀 더 차장님을…… 기쁘게 해드리고 싶어요……」"

[[dialogue]]
speaker = "unk"
original = "ノルトハウゼンの勤勉さは、ここでも発揮されているようだった。"
translation = "노르트하우젠의 근면함은 여기에서도 발휘되고 있는 듯했다."

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「それだけが、わたくしの取柄ですから……んっ、あっ……努力を認めて頂けるのは、嬉しいです……んんっ<emoji=heart04>」"
translation = "「그것만이 저의 장점이니까요…… 응, 아…… 노력을 인정받는 건, 기뻐요…… 으응<emoji=heart04>」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「はぁ、う、んんっ……んっ……ん、あ……はぁ……あ、んっ……あぁあ、ん、んんっ……<emoji=heart04>」"
translation = "「하아, 윽, 으응…… 응…… 응, 아…… 하아…… 아, 응…… 아아아, 응, 으응……<emoji=heart04>」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「ぁ、はぁ、はぁ、んくぅ……息が、乱れてしまいます……車掌さまと交わるのが……あまりに気持ちよすぎて……<emoji=heart04>」"
translation = "「아, 하아, 하아, 응쿠…… 숨이, 가빠져 버려요…… 차장님과 교미하는 게…… 너무나 기분 좋아서……<emoji=heart04>」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「上下に、身体を揺さぶってるだけなのに……車掌さまの……わたくしの一番感じるところを……擦ってきて……<emoji=heart04>」"
translation = "「위아래로, 몸을 흔들고 있을 뿐인데…… 차장님의…… 제가 가장 느끼는 곳을…… 문질러 와서……<emoji=heart04>」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「その部分が火照って……疼きが集まっていくような感覚がして……はぁ、う……何も、考えられなくなってしまいます……<emoji=heart04>」"
translation = "「그 부분이 달아올라…… 욱신거림이 모여드는 듯한 감각이 들어서…… 하아, 윽…… 아무것도, 생각할 수 없게 되어버려요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "膣内の摩擦によって、ノルトハウゼンの身体も昂りつつあるようだった。"
translation = "질내의 마찰로 인해 노르트하우젠의 몸도 고조되고 있는 듯했다."

[[dialogue]]
speaker = "unk"
original = "それを助勢するように、こちらの腰も勝手に彼女を突き上げるように動いてしまう。"
translation = "그것을 돕기라도 하듯, 이쪽의 허리도 멋대로 그녀를 치받듯이 움직이고 만다."

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「ぁ、んうっ！\u3000はぁ、ふぅ……ぁ、ああ……んんっ……車掌、さまも……動いて……んんっ……<emoji=heart04>」"
translation = "「아, 응윽! 하아, 후우…… 아, 아아…… 응…… 차장, 님도…… 움직여서…… 으응……<emoji=heart04>」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「車掌さまも動いて、くださるのですね……はぁ、ん……んんっ……ふぅ、ぁ、あぁあ、んっ、あああ……<emoji=heart04>」"
translation = "「차장님도 움직여, 주시는 거군요…… 하아, 응…… 으응…… 후우, 아, 아아아, 응, 아아아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "我慢し切れずにヘコヘコと動いてしまうこちらの腰に合わせるように、ノルトハウゼンの腰は艶めかしくピクピクと痙攣していた。"
translation = "참지 못하고 헐떡이며 움직이는 이쪽의 허리에 맞추듯, 노르트하우젠의 허리는 요염하게 파르르 경련하고 있었다."

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「ぁあ、あ……車掌さま……そこ、弱いです……んんっ、あ、ああ、あっ……んっ、あっ、あ、あ、ああっ……<emoji=heart04>」"
translation = "「아아, 아…… 차장님…… 거기, 약해요…… 응, 아, 아아, 앗…… 응, 앗, 아, 아, 아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "次第に高まっていくノルトハウゼンの声に、こちらの興奮もかき立てられていく。"
translation = "차츰 높아지는 노르트하우젠의 목소리에 이쪽의 흥분도 고조되어 간다."

[[dialogue]]
speaker = "unk"
original = "汗ばんだ体をしっかりと抱えると、ノルトハウゼンを求めるように自然とピストンの速度も早まっていった。"
translation = "땀에 젖은 몸을 꽉 껴안자, 노르트하우젠을 갈구하듯 자연스레 피스톤 속도도 빨라졌다."

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「ああっ、んっ……あっ、あっ、あっ、あ、ああ、あああっ……！\u3000んんっ、あっ、ああっ……<emoji=heart04>」"
translation = "「아앗, 응…… 앗, 앗, 앗, 아, 아아, 아아앗……! 응, 앗, 아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「車掌さまのが、あ、ああうっ……！\u3000んんっ、激しく、わたくしの奥、突き上げてっ、んっ、あっ、ああっ……<emoji=heart04>」"
translation = "「차장님의 것이, 아, 아아욱……! 응, 격렬하게, 저의 안쪽을, 치받아서, 응, 앗, 아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「あんっ<emoji=heart04>\u3000わたくしの体を、求めてくださってるっ<emoji=heart04>\u3000あぁあ、あんっ……いいですっ<emoji=heart04>\u3000たくさん求めて、ください……<emoji=heart04>」"
translation = "「안<emoji=heart04> 저의 몸을, 원해주고 계셔<emoji=heart04> 아아아, 안…… 좋아요<emoji=heart04> 잔뜩 원해, 주세요……<emoji=heart04>」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「車掌さまの欲望を、受け止められて……<emoji=heart04>\u3000はぁん、あああっ……お腹の奥が、あぁあっ<emoji=heart04>\u3000喜んでいますっ<emoji=heart04>」"
translation = "「차장님의 욕망을, 받아낼 수 있어서……<emoji=heart04> 하앙, 아아앗…… 배 안쪽이, 아아앗<emoji=heart04> 기뻐하고 있어요<emoji=heart04>」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「赤ちゃんのお部屋、ぐりぐりしてっ……夢中で求められたら……あ、んんっ<emoji=heart04>\u3000はぁ、あ……嬉しくなってしまいますのっ……<emoji=heart04>」"
translation = "「아기 방을, 구리구리 헤집어줘서…… 정신없이 원해지면…… 아, 응<emoji=heart04> 하아, 아…… 기뻐져 버린답니다……<emoji=heart04>」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「はぁ、ぅ、ああ……わたくし、車掌さまを……全て受け止めますわ……ですからっ……あ、ああっ……<emoji=heart04>」"
translation = "「하아, 윽, 아아…… 저, 차장님을…… 전부 받아낼게요…… 그러니까…… 아, 아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「どうぞ、好きなだけ……んぁあっ、あっ、は、ああっ……<emoji=heart04>\u3000気持ちよく、なってくださいっ……はぁ、あっ、あっ、あああっ！」"
translation = "「어서, 마음껏…… 응아앗, 앗, 하, 아앗……<emoji=heart04> 기분 좋아, 지세요…… 하아, 앗, 앗, 아아앗!」"

[[dialogue]]
speaker = "unk"
original = "ノルトハウゼンの歓びの声に応じるように、夢中になって快楽を貪る。"
translation = "노르트하우젠의 환희 섞인 목소리에 응하듯, 정신없이 쾌락을 탐닉한다."

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「はぁ、あっ、あっ、ん、あ、ああっ！\u3000はぁ、あ、んぅう……んんっ、はぁ、あああ……車掌さまぁっ……んんっ……<emoji=heart04>」"
translation = "「하아, 앗, 앗, 응, 아, 아아앗! 하아, 아, 응으으…… 응, 하아, 아아아…… 차장님…… 응……<emoji=heart04>」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「車掌さまの、わたくしの中でっ……んんっ、ビクビクし始めていますわっ<emoji=heart04>\u3000あぁあ、んっ、もうすぐ、なのですわねっ、んんんっ<emoji=heart04>」"
translation = "「차장님의 것이, 제 안에서…… 응, 파르르 떨리기 시작했어요<emoji=heart04> 아아아, 응, 이제 곧, 이군요, 으으응<emoji=heart04>」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「もうすぐ、車掌さまのが脈打って、熱い液体をほとばしらせて……んんっ、わたくしの膣をいっぱいに、満たしてくれるのですねっ……<emoji=heart04>」"
translation = "「이제 곧, 차장님의 것이 맥동하며, 뜨거운 액체를 내뿜어서…… 응, 제 보지를 가득, 채워주시는 거군요……<emoji=heart04>」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「はぁ、あっ、んんっ……本当はわたくし……ずっと我慢、していましたのっ……」"
translation = "「하아, 앗, 응…… 사실 저…… 계속 참고, 있었답니다……」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「車掌さまのこれを受け入れた時からずっと、んんぅっ、あああっ……体内を満たす熱い感覚、待ち遠しく想っていましたのっ……！」"
translation = "「차장님의 이것을 받아들였을 때부터 계속, 응으윽, 아아앗…… 체내를 채우는 뜨거운 감각을, 애타게 기다리고 있었답니다……!」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「あの熱いのが注がれた瞬間っ、身も心も焼き尽くすような快感に、襲われるのですわ……あ、あああっ……！」"
translation = "「그 뜨거운 것이 쏟아지는 순간, 몸도 마음도 다 태워버릴 듯한 쾌감이, 덮쳐오는 거에요…… 아, 아아앗……!」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「あっ、ああっ、車掌、さまぁっ……んんっ、お願いしますっ……あ、あああっ、わたくしに……ありったけ、注いでくださいっ……！」"
translation = "「앗, 아아앗, 차장, 님…… 응, 부탁드려요…… 아, 아아앗, 저에게…… 있는 대로 다, 쏟아주세요……!」"

[[dialogue]]
speaker = "unk"
original = "ノルトハウゼンの腰がこちらの欲望のすべて受け入れるように、さらに一段深いところまで肉棒を飲み込んでいく。"
translation = "노르트하우젠의 허리가 이쪽의 욕망을 전부 받아들이듯, 한 단계 더 깊은 곳까지 자지를 집어삼킨다."

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「あっ、あああっ！\u3000嬉しい、ですわ、っ<emoji=heart04>\u3000いっぱいいっぱい、注いでくださいっ！\u3000わたくしの膣に収まりきらないくらいの鉄分っ、あっ、ああっ！！」"
translation = "「앗, 아아앗! 기뻐요, 앗<emoji=heart04> 잔뜩잔뜩, 쏟아주세요! 제 보지에 다 담기지 않을 정도의 정액, 앗, 아아앗!!」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「はぁ、あっ、う、んんんっ！\u3000んっ、あっ、あ、ああっ、あっ、あっ、あ、ああっ！\u3000あ、あ、はぁあっ……！！」"
translation = "「하아, 앗, 윽, 으으응! 응, 앗, 아, 아앗, 앗, 앗, 아, 아앗! 아, 아, 하아앗……!!」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「伝わって、きますっ……んんっ、あっ、あ、ああっ！\u3000車掌さま、もうすぐ、なのですねっ、んんっ、あっ、あ、ああっ！」"
translation = "「전해져, 와요…… 응, 앗, 아, 아앗! 차장님, 이제 곧, 이군요, 응, 앗, 아, 아앗!」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「あぁあ、あっ、んっ、わたくしもっ……もうっ、いき、そうですわっ……！\u3000んっ、んっ、んぅ、う、んんっ、あっ、ああっ！」"
translation = "「아아아, 앗, 응, 저도…… 이제, 갈 것, 같아요……! 응, 응, 응, 윽, 응, 앗, 아아앗!」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「はぁ、あっ、あっ、ああ……車掌さまっ、このまま一緒に、イッてもいい、ですかっ？\u3000んんっ、あっ、ああっ！」"
translation = "「하아, 앗, 앗, 아아…… 차장님, 이대로 함께, 가도 될까요? 응, 앗, 아아앗!」"

[[dialogue]]
speaker = "unk"
original = "もちろんこちらも、イクなら一緒にイキたいと思っていた。"
translation = "물론 나 또한, 간다면 함께 가고 싶다고 생각했다."

[[dialogue]]
speaker = "unk"
original = "こちらがそう伝えると、彼女と繋がり合った部分がきゅうっと強く絞られ、膣全体も何かを吸い上げるように収縮していく。"
translation = "그렇게 전하자 그녀와 이어진 부분이 꽉 강하게 조여지고, 질 전체도 무언가를 빨아올리듯 수축해 간다."

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「はぁ、あっ、あっ、車掌さまっ、んんっ、あっ、あ、ああっ！\u3000お願い、しますっ、んんっ、わたくしと、一緒にっ、あ、あああっ！」"
translation = "「하아, 앗, 앗, 차장님, 응, 앗, 아, 아앗! 부탁, 드려요, 응, 저와, 함께, 아, 아아앗!」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「あ、あ、ああっ、あっ、んっ、あっ、あ、あ、ああっ！\u3000あ、んんっ、あっ、イクっ、んんっ、もう、あ、ああっ！」"
translation = "「아, 아, 아앗, 앗, 응, 앗, 아, 아, 아앗! 아, 응, 앗, 가요, 응, 이제, 아, 아아앗!」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「気持ちいいの、膨らんでっ、んんっ、あっ、あ、あああっ！\u3000もう、止められ、ませんっ、あっ、あ、ああ、あ、あああっ！！」"
translation = "「기분 좋은 게, 부풀어서, 응, 앗, 아, 아아앗! 이제, 멈출 수, 없어요, 앗, 아, 아아, 아, 아아앗!!」"

[[dialogue]]
speaker = "unk"
original = "声を昂らせながら、ノルトハウゼンが大きく断続的に全身を震わせる。"
translation = "목소리를 높이며 노르트하우젠이 크게 단속적으로 전신을 떨었다."

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「ああっ、あっ、んっ、は、あっ、あっ、あ、ああ、あ、あああっ！\u3000や、あ、く、イクっ、い、くぅっ、んんっ、んっ、あ、あああっ！！」"
translation = "「아앗, 앗, 응, 하, 앗, 앗, 아, 아아, 아, 아아앗! 야, 아, 쿠, 가요, 가아앗, 응, 응, 아, 아아앗!!」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「は、あ、あ、ああっ……あ、んんっ、あ、ああ、あっ……んんんっ……あ、ああ、んぅ、あ、ああ、あ、あ、あ、あ、あああっ……！」"
translation = "「하, 아, 아, 아앗…… 아, 응, 아, 아아, 앗…… 으으응…… 아, 아아, 응으, 아, 아아, 아, 아, 아, 아, 아아앗……!」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「ひぁ、あぁあ……ふぁああああっっ！！！！！！！」"
translation = "「히아, 아아아…… 화아아아아앗!!!!!!!」"

[[dialogue]]
speaker = "unk"
original = "張り詰めた快感が、激しい脈動と共に一気に吐き出される。"
translation = "팽팽했던 쾌감이 격렬한 맥동과 함께 단번에 쏟아져 나온다."

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「ああああっ、あっ、あああっ！\u3000んんっ、あっ、あああっ！\u3000はぁ、あ、ああああっ、あ、あ、あああっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아아아앗, 앗, 아아앗! 응, 앗, 아아앗! 하아, 아, 아아아앗, 아, 아, 아아앗……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ノルトハウゼンは注ぎ込まれる鉄分を感じながら、絶頂の余韻に浸っていた。"
translation = "노르트하우젠은 쏟아져 들어오는 정액을 느끼며 절정의 여운에 젖어 있었다."

[[dialogue]]
speaker = "unk"
original = "しかし、結合部は一滴もこぼすまいとするように強く締め付け続けている。この心地良い拘束感に、こちらは何度も何度も自身を脈打たせる。"
translation = "하지만 결합부는 한 방울도 흘리지 않겠다는 듯 강하게 계속 조이고 있다. 이 기분 좋은 구속감에 이쪽은 몇 번이고 자신을 맥동시킨다."

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「あぁあ、あ、んんっ……<emoji=heart04>\u3000ドクドクって、流れ込んでいますわ……<emoji=heart04>\u3000車掌さまぁ、んんんっ、あ、ああっ……<emoji=heart04>」"
translation = "「아아아, 아, 응……<emoji=heart04> 울컥울컥하며, 흘러들어오고 있어요……<emoji=heart04> 차장님, 으으응, 아, 아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「ずっと……射精、止りませんわ<emoji=heart04>\u3000ずっと、あ、んんっ……<emoji=heart04>\u3000脈打って、ますっ……ん……ふぅ、んんんっ……<emoji=heart04>」"
translation = "「계속…… 사정, 멈추지 않아요<emoji=heart04> 계속, 아, 응……<emoji=heart04> 맥동하고, 있어요…… 음…… 후우, 으으응……<emoji=heart04>」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「嬉しいですわ、車掌さま<emoji=heart04>\u3000はぁ、う……んんっ……こんなに沢山、車掌さまの鉄分を頂けて……あ、ああっ<emoji=heart04>」"
translation = "「기뻐요, 차장님<emoji=heart04> 하아, 윽…… 응…… 이렇게나 많이, 차장님의 정액을 받을 수 있어서…… 아, 아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "全てを吸いつくそうとするかのように、膣壁は収縮を続けていた。"
translation = "모든 것을 빨아들이려는 듯 질벽은 수축을 계속하고 있었다."

[[dialogue]]
speaker = "unk"
original = "やがて全てを出し尽くし、こちらの身体から力が抜けていくのを感じたのか、結合部の締め付けが少しずつ緩んでいく。"
translation = "이윽고 모든 것을 다 쏟아내고 이쪽의 몸에서 힘이 빠져나가는 것을 느꼈는지, 결합부의 조임이 조금씩 풀려간다."

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「はぁ……はぁ……んぅ、ふ……はぁ、車掌さま……ありがとう、ございます……<emoji=heart04>」"
translation = "「하아…… 하아…… 응으, 후…… 하아, 차장님…… 감사, 합니다……<emoji=heart04>」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「車掌さまの鉄分、とっても濃くて……今日のはいつも以上に、気持ちよくなってしまいましたわ……<emoji=heart04>」"
translation = "「차장님의 정액, 정말 진해서…… 오늘은 평소보다 더, 기분 좋아져 버렸답니다……<emoji=heart04>」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「あっ、車掌さま……！\u3000ふふ、後ろから抱きしめて下さって、どうされたのですか……？」"
translation = "「앗, 차장님……! 후후, 뒤에서 안아주시다니, 무슨 일이신가요……?」"

[[dialogue]]
speaker = "ノルトハウゼン"
original = "「いえ、とても嬉しいですわ<emoji=heart04>\u3000好きなだけ、抱きしめてください……<emoji=heart04>\u3000わたくしのこと……肌で感じてくださいませ……<emoji=heart04>」"
translation = "「아뇨, 정말 기뻐요<emoji=heart04> 마음껏, 안아주세요……<emoji=heart04> 저를…… 살결로 느껴주세요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ノルトハウゼンの肌は、その白さに反して熱く火照っていた。"
translation = "노르트하우젠의 피부는 그 하얀 빛깔과는 반대로 뜨겁게 달아올라 있었다."

[[dialogue]]
speaker = "unk"
original = "けれどその火照りが心地よくて……いつまでも、その温もりを離すことが出来ずにいたのだった。"
translation = "하지만 그 열기가 기분 좋아서…… 언제까지고 그 온기를 놓지 못하고 있었다."

