[[dialogue]]
speaker = "unk"
original = "第１話,保健委員フロレンシア,P"
translation = "제1화, 보건위원 플로렌시아, P"

[[dialogue]]
speaker = "フロレンシア"
original = "「ふぅ……大丈夫そうで良かった」"
translation = "「후우…… 괜찮아 보여서 다행이에요」"

[[dialogue]]
speaker = "unk"
original = "何かあったのか？"
translation = "무슨 일 있었어?"

[[dialogue]]
speaker = "フロレンシア"
original = "「あ、こんにちは、会長さん」"
translation = "「아, 안녕하세요, 회장님」"

[[dialogue]]
speaker = "フロレンシア"
original = "「シャロンさんを保健室に連れて行ったところでして。戦闘の後に貧血で倒れてしまったんです」"
translation = "「샤론 씨를 보건실에 데려다준 참이에요. 전투 후에 빈혈로 쓰러지셨거든요」"

[[dialogue]]
speaker = "シャロン"
original = "「きゅぅ～……」"
translation = "「뀨우~……」"

[[dialogue]]
speaker = "フロレンシア"
original = "「少し休んでもらったら良くなりました。シャロンさんは慣れっこだって言ってましたけど、安心しました」"
translation = "「조금 쉬게 해드렸더니 좋아지셨어요. 샤론 씨는 늘 있는 일이라고 하셨지만, 안심했어요」"

[[dialogue]]
speaker = "フロレンシア"
original = "「星徒会のお仕事でお忙しいと思いますが、会長さんはお元気ですか？」"
translation = "「성도회 일로 바쁘시겠지만, 회장님은 건강하신가요?」"

[[dialogue]]
speaker = "フロレンシア"
original = "「……ええ、それなら良かったです。でも無理はしないでくださいね」"
translation = "「……네, 그렇다면 다행이에요. 하지만 무리는 하지 마세요」"

[[dialogue]]
speaker = "フロレンシア"
original = "「それではまた。会長さんも、気分が優れない時は気兼ねなく保健委員を頼ってください」"
translation = "「그럼 다음에 봬요. 회장님도 기분이 좋지 않을 때는 사양 말고 보건위원을 의지해 주세요」"

[[dialogue]]
speaker = "パワゴン"
original = "「イイイイーーッッ！」"
translation = "「이이이이이익!!」"

[[dialogue]]
speaker = "unk"
original = "ぐっ……！"
translation = "윽……!"

[[dialogue]]
speaker = "フロレンシア"
original = "「モンスターは倒せましたけど、怪我が……今治療しますね！\u3000傷を見せてください！」"
translation = "「몬스터는 쓰러뜨렸지만 상처가…… 지금 치료할게요! 상처를 보여주세요!」"

[[dialogue]]
speaker = "unk"
original = "新星学園と流星学園では、保健委員は戦闘で負傷した星騎士や一般人を治療する役目も担っている。"
translation = "신성학원과 유성학원에서는 보건위원이 전투에서 부상당한 성기사나 일반인을 치료하는 역할도 맡고 있다."

[[dialogue]]
speaker = "unk"
original = "のだが──"
translation = "그런데──"

[[dialogue]]
speaker = "フロレンシア"
original = "「ひぁああああああっ！？\u3000血が……血がこんなに……」"
translation = "「히아아아아아앗!? 피가…… 피가 이렇게나……」"

[[dialogue]]
speaker = "フロレンシア"
original = "「ガクッ」"
translation = "「털썩」"

[[dialogue]]
speaker = "unk"
original = "フロレンシアこそ大丈夫……？"
translation = "플로렌시아야말로 괜찮은 거야……?"

[[dialogue]]
speaker = "？？？"
original = "「キヒヒ、キヒヒヒヒッ……」"
translation = "「키히히, 키히히히히……」"

[[dialogue]]
speaker = "フロレンシア？"
original = "「ヒハハハハハハハハッ！！」"
translation = "「히하하하하하하하하!!」"

[[dialogue]]
speaker = "unk"
original = "！？"
translation = "!? "

[[dialogue]]
speaker = "フロレンシア？"
original = "「あ～、最近ご無沙汰だったからシャバの空気がうまいぜ。ありがとよ、会長サン」"
translation = "「아~ 최근에 뜸했더니 바깥 공기가 맛있구만. 고맙다구, 회장님」"

[[dialogue]]
speaker = "フロレンシア？"
original = "「って、そういや怪我してるとこだったな」"
translation = "「그나저나 그러고 보니 다친 참이었지」"

[[dialogue]]
speaker = "フロレンシア？"
original = "「どれどれ……なんだこんなもんか。死なねえ程度にもっとハデに怪我してくれりゃよかったんだが、普通のモンスターじゃこんなもんか」"
translation = "「어디 보자…… 뭐야 고작 이 정도냐. 안 죽을 정도로 좀 더 화끈하게 다쳐줬으면 좋았을 텐데, 평범한 몬스터로는 이 정도인가」"

[[dialogue]]
speaker = "フロレンシア？"
original = "「まあいいや、アタシが治してやる。ほれ、いた～いいた～いお注射だ」"
translation = "「뭐 됐어, 내가 치료해 주지. 자, 아프~고 아픈 주사다」"

[[dialogue]]
speaker = "unk"
original = "ぎゃ～～～～～～ッ！？"
translation = "갸아아아아아악!!?"

[[dialogue]]
speaker = "フロレンシア？"
original = "「ヒハハッ、それが見たかったんだよ！\u3000トゲだらけの蛇が全身の血管を這い回ってるような痛みだろ？\u3000生きてるって感じがするだろ～？」"
translation = "「히하핫, 그걸 보고 싶었다고! 가시 돋친 뱀이 전신의 혈관을 기어 다니는 듯한 고통이지? 살아있다는 느낌이 들지 않냐~?」"

[[dialogue]]
speaker = "フロレンシア？"
original = "「いいザマだぜ……地面にのたうち回って、顔を苦痛に歪ませてよぉ。アタシはそういうのが好きなんだ」"
translation = "「꼴 좋구만…… 바닥을 뒹굴면서 얼굴을 고통으로 일그러뜨리고 말이야. 난 그런 게 좋단 말이지」"

[[dialogue]]
speaker = "フロレンシア？"
original = "「もっと悶えろ、もっと痛がれ……キヒヒッ、ヒャハハハハッ！」"
translation = "「더 몸부림쳐라, 더 아파해라…… 키히히, 햐하하하하!」"

[[dialogue]]
speaker = "フロレンシア？"
original = "「……っと。もう痛みがおさまったか。どうだ、傷は塞がってるだろ」"
translation = "「……이런. 벌써 통증이 가라앉았나. 어때, 상처는 붙었지?」"

[[dialogue]]
speaker = "フロレンシア？"
original = "「何驚いてやがる、保健委員なんだからそりゃ治すだろ。アタシの星術は痛みがある分、治りもはえーんだ」"
translation = "「뭘 놀라고 자빠졌어, 보건위원이니까 당연히 치료하겠지. 내 성술은 아픈 만큼 낫는 것도 빠르거든」"

[[dialogue]]
speaker = "フロレンシア？"
original = "「チッ……まだモンスターがいやがったか。ヤツらの悲鳴は耳障りなんだよ。見かけばっか生き物らしくしてんじゃねぇ」"
translation = "「칫…… 아직 몬스터가 남아 있었나. 놈들의 비명은 귀에 거슬린단 말이야. 겉모습만 생물인 척하지 말라고」"

[[dialogue]]
speaker = "フロレンシア？"
original = "「じゃあな。次はもっといい声聞かせてくれよ、会長サン」"
translation = "「잘 있어라. 다음엔 더 좋은 목소리 들려달라고, 회장님」"

[[dialogue]]
speaker = "フロレンシア"
original = "「んん……会長、さん……？」"
translation = "「으음…… 회장, 님……?」"

[[dialogue]]
speaker = "フロレンシア"
original = "「そうだ、私、会長さんの怪我を治療しようとして……あれ、もう治ってる……？\u3000どうして……？」"
translation = "「맞다, 저, 회장님의 상처를 치료하려고 하다가…… 어라, 벌써 나았어……? 어째서……?」"

[[dialogue]]
speaker = "フロレンシア"
original = "「モンスター！？\u3000あわわっ、私も戦わないと……でも私、支援とかの方が得意でして……」"
translation = "「몬스터!? 아와왓, 저도 싸워야 하는데…… 하지만 저, 지원 같은 걸 더 잘해서……」"

[[dialogue]]
speaker = "フロレンシア"
original = "「え～い、どうにでもなれ～！\u3000ホーネットニードル！」"
translation = "「에잇, 어떻게든 되겠지~! 호넷 니들!」"

[[dialogue]]
speaker = "フロレンシア"
original = "「あ、倒せた……なんというかこう、いい感じのところに刺さったみたいです！」"
translation = "「아, 쓰러뜨렸다…… 뭐랄까 이렇게, 딱 좋은 곳에 찔린 것 같아요!」"

[[dialogue]]
speaker = "フロレンシア"
original = "「もう一度……プスッといきます！」"
translation = "「한 번 더…… 푹 찌를게요!」"

[[dialogue]]
speaker = "フロレンシア"
original = "「やった！\u3000また倒せました！」"
translation = "「해냈다! 또 쓰러뜨렸어요!」"

[[dialogue]]
speaker = "フロレンシア"
original = "「きゃっ！？\u3000またモンスターが！？\u3000うぅ～っ、こうなったらお注射打ちまくりですっ！」"
translation = "「꺄악!? 또 몬스터가!? 으으~ 이렇게 된 이상 주사를 마구마구 놓겠어요!」"

