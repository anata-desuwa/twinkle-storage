[[dialogue]]
speaker = "unk"
original = "第１話,蝶の妖精族……？,P"
translation = "제1화, 나비 요정족……?"

[[dialogue]]
speaker = "unk"
original = "グレイス・オベロニア──極星学園の星徒会メンバーであり、かつては俺たちアルタイルと敵対していた星騎士だ。"
translation = "그레이스 오베로니아── 극성학원의 성도회 멤버이자, 한때는 우리 알타이르와 적대했던 성기사다."

[[dialogue]]
speaker = "unk"
original = "しかし『デネブの緋宮クロト』に対する誤解は無事に解け、今では協力を申し出てくれる関係にまでになっていた。"
translation = "하지만 『데네브의 히노미야 쿠로토』에 대한 오해는 무사히 풀렸고, 지금은 협력을 제안해 주는 관계에까지 이르렀다."

[[dialogue]]
speaker = "トリュファイナ"
original = "「失礼いたします。グレイス様、ご注文のフライドチキンをお届けに参りました」"
translation = "「실례하겠습니다. 그레이스 님, 주문하신 프라이드치킨을 배달하러 왔습니다」"

[[dialogue]]
speaker = "グレイス"
original = "「ありがとうございます、トリュファイナさん！」"
translation = "「감사합니다, 트류파이나 씨!」"

[[dialogue]]
speaker = "チナ"
original = "「グレイスお前、購買部にデリバリーまで頼んでたのか？\u3000アルタイルに馴染みすぎだろ、たった数日で……」"
translation = "「그레이스 너, 매점에 배달까지 시킨 거냐? 알타이르에 너무 적응했잖아, 고작 며칠 만에……」"

[[dialogue]]
speaker = "グレイス"
original = "「共闘すると決めた以上、遠慮をしていては魔王さんたちも居心地が悪いですからね！\u3000もぐもぐ──チナも食べます？」"
translation = "「공투하기로 결정한 이상, 사양하고 있으면 마왕 씨 일행도 불편해할 테니까요! 우물우물── 치나도 먹을래요?」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「ふふ。おかわりはたくさんありますからね。ご遠慮なくどうぞ！」"
translation = "「후후. 리필은 많이 있으니까요. 사양 말고 드세요!」"

[[dialogue]]
speaker = "アナ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "サーシャ"
original = "「あら、どうかしたのアナちゃん。難しい顔をしちゃって」"
translation = "「어라, 무슨 일이야 아나짱. 심각한 표정을 짓고」"

[[dialogue]]
speaker = "アナ"
original = "「いえ。やはり文献だけで知った気になるのはダメだなと、自戒をしていました」"
translation = "「아뇨. 역시 문헌으로만 아는 척하는 건 안 되겠다고 자계하고 있었습니다」"

[[dialogue]]
speaker = "unk"
original = "……と言うと？"
translation = "……그게 무슨 소리야?"

[[dialogue]]
speaker = "アナ"
original = "「天界から留学した際、私は図書館で多くの書籍にあたりました」"
translation = "「천계에서 유학 왔을 때, 저는 도서관에서 많은 서적을 접했습니다」"

[[dialogue]]
speaker = "アナ"
original = "「人間界は数多くの種族がごった返す場所です。特に魔界からの留学生は、広大な土地ゆえに様々な種族の方がいらっしゃいます」"
translation = "「인간계는 수많은 종족이 뒤섞이는 곳입니다. 특히 마계에서 온 유학생은 광대한 토지 덕분에 다양한 종족 분들이 계시죠」"

[[dialogue]]
speaker = "アナ"
original = "「知らぬ間に不作法をしないようにと調べている時に、蝶の妖精族についても知る機会がありました」"
translation = "「모르는 사이에 결례를 범하지 않도록 조사하던 중에, 나비 요정족에 대해서도 알 기회가 있었습니다」"

[[dialogue]]
speaker = "グレイス"
original = "「おぉ！\u3000私の一族のことですね！\u3000そうです、魔界の片隅にある、妖精の森で暮らす一族です！」"
translation = "「오오! 저희 일족 이야기군요! 맞아요, 마계 구석에 있는 요정의 숲에서 사는 일족입니다!」"

[[dialogue]]
speaker = "チナ"
original = "「グレイスはかなり珍しい一族って聞いてるけど……よく残ってたな、そんな本」"
translation = "「그레이스는 꽤 희귀한 일족이라고 들었는데…… 잘도 남아 있었네, 그런 책」"

[[dialogue]]
speaker = "アナ"
original = "「アルタイルの図書館の蔵書は並ではありませんので──で、ここからが本題なのですが」"
translation = "「알타이르 도서관의 장서는 보통이 아니니까요── 그래서, 여기서부터가 본론입니다만」"

[[dialogue]]
speaker = "アナ"
original = "「……私が本で得た妖精族の知識と、グレイスさんのイメージがまったく一致しないんです」"
translation = "「……제가 책에서 얻은 요정족 지식과 그레이스 씨의 이미지가 전혀 일치하지 않아요」"

[[dialogue]]
speaker = "グレイス"
original = "「えぇっ？\u3000そんな……その本、本当に信用できるものなんですか？」"
translation = "「에엣? 설마…… 그 책, 정말 믿을 만한 건가요?」"

[[dialogue]]
speaker = "アナ"
original = "「魔界の人種研究の権威が記したものです。だから私も信頼していたのですが……」"
translation = "「마계 인종 연구의 권위자가 저술한 것입니다. 그래서 저도 신뢰하고 있었습니다만……」"

[[dialogue]]
speaker = "unk"
original = "蝶の妖精族は、どんな一族なんだ？"
translation = "나비 요정족은 어떤 일족인데?"

[[dialogue]]
speaker = "アナ"
original = "「『彼らは特徴的な長い耳を持ち、人間に比べてはるかに長命な種族であり──』」"
translation = "「『그들은 특징적인 긴 귀를 가졌으며, 인간에 비해 훨씬 장수하는 종족이고──』」"

[[dialogue]]
speaker = "グレイス"
original = "「合ってますね！\u3000私、お耳が長いです！\u3000人間さんに比べて、長生きですよ！」"
translation = "「맞아요! 저, 귀가 길어요! 인간님들에 비해 오래 산다구요!」"

[[dialogue]]
speaker = "アナ"
original = "「『人里離れた静謐な森に住み、小鳥や花と語らい──』」"
translation = "「『인적 드문 정적 속의 숲에 살며, 작은 새나 꽃과 대화하고──』」"

[[dialogue]]
speaker = "グレイス"
original = "「またまた合ってますね！\u3000故郷の妖精の森は、それはもう豊かな自然がありました！」"
translation = "「또 맞았네요! 고향인 요정의 숲은 그야말로 풍요로운 자연이 있었답니다!」"

[[dialogue]]
speaker = "アナ"
original = "「『生まれながらにして高度な知能を持ち、冷静で聡明。幼くして星力に目覚める者も多い。種族の絶対数が少ないためか、逸材ばかりである』」"
translation = "「『태어나면서부터 고도의 지능을 가졌으며, 냉정하고 총명하다. 어린 나이에 성력에 눈을 뜨는 자도 많다. 종족의 절대수가 적기 때문인지 인재들뿐이다』」"

[[dialogue]]
speaker = "グレイス"
original = "「おやおや、ばっちり何もかも合ってるではないですか！\u3000そうです、私はしっかり者です、えっへん！」"
translation = "「오호라, 하나부터 열까지 딱 들어맞지 않습니까! 맞아요, 저는 야무진 사람이라구요, 에헴!」"

[[dialogue]]
speaker = "チナ"
original = "「……そうか？\u3000グレイスって、地頭はいいけど普通にアホの子だぞ」"
translation = "「……그러냐? 그레이스는 머리는 좋은데 그냥 바보 같은 애라고」"

[[dialogue]]
speaker = "グレイス"
original = "「そこ！\u3000うるさいですよっ！」"
translation = "「거기! 시끄러워요!」"

[[dialogue]]
speaker = "アナ"
original = "「『人間と同じく雑食であるが、肉食を極端に嫌う。木の実や果実を主に食べ、そして食も細い。出会った際は食文化の違いに注意するべし』」"
translation = "「『인간과 마찬가지로 잡식이지만, 육식을 극단적으로 싫어한다. 나무 열매나 과일을 주로 먹으며 식사량도 적다. 만났을 때는 식문화 차이에 주의해야 한다』」"

[[dialogue]]
speaker = "unk"
original = "……んっ？"
translation = "……응?"

[[dialogue]]
speaker = "チナ"
original = "「全然違うじゃねーか。グレイスって野菜が嫌いだろ」"
translation = "「전혀 다르잖아. 그레이스 너 채소 싫어하잖아」"

[[dialogue]]
speaker = "グレイス"
original = "「好んで食べたくはないですね……もぐもぐ」"
translation = "「즐겨 먹고 싶지는 않네요…… 우물우물」"

[[dialogue]]
speaker = "チナ"
original = "「で、肉好きの大食いだ。焼肉はタレにどっぷりつけて、白飯に乗っけて食うし……シメに冷麺とジェラートまで食うんだぜこいつ」"
translation = "「게다가 고기 좋아하는 대식가야. 불고기는 양념에 듬뿍 찍어서 흰밥에 얹어 먹고…… 입가심으로 냉면이랑 젤라토까지 먹는다고 이 녀석」"

[[dialogue]]
speaker = "グレイス"
original = "「そ、そんなプライベートなことまで魔王さんの前で言わなくてもいいじゃないですか！？\u3000──もぐもぐ！」"
translation = "「그, 그런 사적인 것까지 마왕 씨 앞에서 말하지 않아도 되잖아요!? ──우물우물!」"

[[dialogue]]
speaker = "チナ"
original = "「さっきからチキン食いながらつっこむんじゃねーよ！？」"
translation = "「아까부터 치킨 처먹으면서 태클 걸지 마!」"

[[dialogue]]
speaker = "アナ"
original = "「『長命ゆえに他種族との交流も積極的ではなく、排他的な傾向があり、気難しい者も多い』……そんな記述があったと記憶しています」"
translation = "「『장수하기 때문에 타 종족과의 교류도 적극적이지 않고 배타적인 경향이 있으며, 까다로운 자도 많다』…… 그런 기술이 있었던 걸로 기억합니다」"

[[dialogue]]
speaker = "サーシャ"
original = "「あらあら、うふふ♪」"
translation = "「어머 어머, 우후후♪」"

[[dialogue]]
speaker = "チナ"
original = "「そんなまさか……グレイスは、もしかして蝶の妖精じゃなかったのかよ……！？」"
translation = "「설마…… 그레이스, 혹시 나비 요정이 아니었던 거냐……!?」"

[[dialogue]]
speaker = "グレイス"
original = "「合ってますよ！？\u3000蝶の<ruby>翅<rt>はね</rt></ruby>、見せましょうか！？\u3000パタパタですよ私！？」"
translation = "「맞다니까요!? 나비 날개, 보여드릴까요!? 파닥파닥거린다구요 저!?」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「……私もかつて、魔界を<ruby>探訪<rt>たんぼう</rt></ruby>したことがあります。蝶の妖精族の方とも出会ったことがありますが──」"
translation = "「……저도 예전에 마계 탐방을 한 적이 있습니다. 나비 요정족 분과 만난 적도 있습니다만──」"

[[dialogue]]
speaker = "グレイス"
original = "「おぉ、そうだったのですか！？\u3000では訂正をお願いしますトリュファイナさんっ！」"
translation = "「오오, 그랬나요!? 그럼 정정 부탁드려요 트류파이나 씨!」"

[[dialogue]]
speaker = "トリュファイナ"
original = "「……アナ様の読んだ図書の記述が、た、正しいかと」"
translation = "「……아나 님이 읽으신 도서의 기술이, 마, 맞을 거예요」"

[[dialogue]]
speaker = "グレイス"
original = "「そんなぁあ～っ！？」"
translation = "「그럴 수가아~!?」"

[[dialogue]]
speaker = "グレイス"
original = "「……た、確かに私はちょっぴり変わった妖精族かもしれませんが！\u3000ほ、ほらチナ。フォローしてください、親友でしょう！？」"
translation = "「……화, 확실히 제가 조금 특이한 요정족일지도 모르지만! 자, 자 치나. 팔로우 좀 해줘요, 절친이잖아요!」"

[[dialogue]]
speaker = "チナ"
original = "「フォローっつったって……」"
translation = "「팔로우라고 해봤자……」"

[[dialogue]]
speaker = "グレイス"
original = "「私がいかに聡明で有能な星騎士であるかを語ってください！」"
translation = "「제가 얼마나 총명하고 유능한 성기사인지 말해달라구요!」"

[[dialogue]]
speaker = "グレイス"
original = "「そ、そうです、就任してから会計の仕事っ。計算間違いなんて一度もしたことないはずですよ！？」"
translation = "「그, 그래요, 취임하고 나서 회계 업무! 계산 실수 같은 건 한 번도 한 적 없을걸요!?」"

[[dialogue]]
speaker = "unk"
original = "グレイスって会計なんだ……？（戦慄）"
translation = "그레이스가 회계라고……? (전율)"

[[dialogue]]
speaker = "グレイス"
original = "「何ですかその反応は！？」"
translation = "「뭐예요 그 반응은!?」"

[[dialogue]]
speaker = "チナ"
original = "「確かに計算間違いはないな。でもよくレシート失くすし……」"
translation = "「확실히 계산 실수는 없지. 근데 영수증을 자주 잃어버리고……」"

[[dialogue]]
speaker = "グレイス"
original = "「しまった！？\u3000今のは無しですっ！」"
translation = "「아차!? 방금 건 없던 걸로 해요!」"

[[dialogue]]
speaker = "グレイス"
original = "「じゃ、じゃあ……そうです、ちょっと前に！\u3000デネブでモンスターに襲われていた子供を救出したことが……！」"
translation = "「그, 그럼…… 그래요, 얼마 전에! 데네브에서 몬스터에게 습격당하던 아이를 구출한 적이……!」"

[[dialogue]]
speaker = "チナ"
original = "「ああ、あれか──確かにお前が一番乗りで解決したよな」"
translation = "「아, 그거── 확실히 네가 제일 먼저 해결했었지」"

[[dialogue]]
speaker = "チナ"
original = "「でもあれ、授業中のモンスター出現だったろ。お前、休校日だと勘違いして街で遊んでて、だから現場に近くて──」"
translation = "「근데 그거 수업 중에 몬스터 나온 거였잖아. 너 휴교일인 줄 착각하고 거리에서 놀고 있다가, 그래서 현장에 가까웠던 거──」"

[[dialogue]]
speaker = "グレイス"
original = "「ああぁぁっ！？\u3000思い出しました！\u3000今のも無し、無しですッ！！」"
translation = "「아아아악!? 기억났어요! 방금 것도 취소, 취소예요!!」"

[[dialogue]]
speaker = "unk"
original = "その後も、チナの口から語られるのは、グレイスのうっかりエピソードばっかりで。"
translation = "그 후로도 치나의 입에서 나오는 건 그레이스의 덜렁거리는 에피소드뿐이라서."

[[dialogue]]
speaker = "グレイス"
original = "「し、信じてください！\u3000私はしっかり者の、蝶の妖精なんです～っ！！」"
translation = "「미, 믿어주세요! 저는 야무진 나비 요정이라구요~!!」"

[[dialogue]]
speaker = "unk"
original = "本だけの知識で全てを知った気になるのはいけないなと、俺も思うのだった──"
translation = "책으로만 아는 지식으로 모든 걸 안다고 생각하면 안 되겠다고 나도 생각하는 것이었다──"

