[[dialogue]]
speaker = "unk"
original = "第４話,バトルフォーム強化装置,B"
translation = "제4화, 배틀 폼 강화 장치, B"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「はい、これ。腰に巻いてね」"
translation = "「자, 여기. 허리에 감아줘.」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「何です？\u3000やたらとゴツゴツしたベルトのようですが……」"
translation = "「이게 뭐죠? 무척이나 울퉁불퉁한 벨트 같습니다만……」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「バックルのところに何かがセットできるようになっていますけど、こんな玩具みたいなもので本当に性能が向上するんですか？」"
translation = "「버클 부분에 뭔가를 세팅할 수 있게 되어 있는데, 이런 장난감 같은 걸로 정말 성능이 향상되는 건가요?」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「論より証拠、って言葉はあんま好きじゃないんだけど。まあ騙されたと思って使ってみてよ」"
translation = "「백문이 불여일견, 이라는 말은 별로 안 좋아하지만. 뭐, 속는 셈 치고 한번 써봐.」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「わかりました。うんしょ、と……」"
translation = "「알겠습니다. 영차, 하고……」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「あー、ウェンディでも装着出来るように、ちゃーんとサイズは調整されてるよん♪」"
translation = "「아ー, 웨디라도 장착할 수 있게 사ー이즈는 잘 조정해 뒀다구♪」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「ひと言多いです！\u3000つけましたけど、これでいいんですか？」"
translation = "「말이 많으시네요! 찼습니다만, 이걸로 된 건가요?」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「バッチリ！\u3000それじゃ次はこの端末にウェンディの隊員コードを入力して」"
translation = "「완벽해! 그럼 다음은 이 단말기에 웨디의 대원 코드를 입력해줘.」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「えーと……入力しましたよ」"
translation = "「어디 보자…… 입력했어요.」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「そしたらそれをバックルにセットしながら、アタシのアクションを真似して『変身っ』て叫びながら変身してみよう！」"
translation = "「그러면 그걸 버클에 세팅하면서, 내 액션을 따라 하며 『변신』이라고 외치면서 변신해 보자!」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「いくよ～♪\u3000バッ！\u3000バババッ！\u3000へん……しんっ……！！」"
translation = "「간다아~♪ 팟! 파파팟! 변……신……!!」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「はぁ！？\u3000そ、それ必要なんですか？」"
translation = "「하아!? 그, 그거 필요한 건가요?」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「めっちゃ大事。星騎士たちだって変身する時、叫んでたりする子もいるでしょ？」"
translation = "「엄청 중요해. 성기사들만 해도 변신할 때 외치는 애들도 있잖아?」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「まあ、確かに……」"
translation = "「뭐, 확실히……」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「まんまじゃなくてもいいよ。多少のアレンジなら入れてもいいからね」"
translation = "「똑같지 않아도 돼. 어느 정도 어레인지는 넣어도 되니까.」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「わかりました。コホン……では、いきます……」"
translation = "「알겠습니다. 흠흠…… 그럼, 갑니다……」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「すぅ……はぁ……バッ！\u3000ババババッ！\u3000変身ですっ！！」"
translation = "「스읍…… 하아…… 팟! 파파파팟! 변신입니다!!」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「たははははははっ！\u3000ウェンディ、カッコイイｗｗｗｗｗｗ！！」"
translation = "「타하하하하하핫! 웨디, 멋있어ㅋㅋㅋㅋㅋㅋ!!」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「笑わないでくださいっ！\u3000あなたやっぱり私を騙して――！」"
translation = "「웃지 마세요! 당신 역시 나를 속이고――!」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「えっ！？」"
translation = "「엣!?」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「どう？\u3000パワーアップした戦闘服の着心地は」"
translation = "「어때? 파워 업한 전투복의 착용감은.」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「すごいです！\u3000体感でも分かるくらい性能が向上しています！」"
translation = "「대단해요! 체감으로도 알 수 있을 정도로 성능이 향상되었어요!」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「２００パーセントっていう数字も嘘じゃないかも……本当にすごい発明じゃありませんか、ツェツィーリエ！！」"
translation = "「200퍼센트라는 숫자도 거짓말이 아닐지도…… 정말 대단한 발명 아닌가요, 체칠리에!!」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「うんうん、ウェンディもようやくアタシのすごさを認める気になったわけね」"
translation = "「응응, 웨디도 드디어 나의 위대함을 인정할 마음이 생겼나 보네.」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「ええ、まあ……あとはコストの問題ですが、どのくらいになります？」"
translation = "「에에, 뭐…… 남은 건 비용 문제인데, 어느 정도나 되죠?」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「今回の発明は多少コストがかかったとしても、予算を確保したいほど有用な発明だと思っていますよ！」"
translation = "「이번 발명은 비용이 다소 든다 해도 예산을 확보하고 싶을 만큼 유용한 발명이라고 생각해요!」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「お金的には、そうだね～。一本あたりこのくらいになるんだけど……」"
translation = "「돈 문제라면, 글쎄~. 개당 이 정도가 되는데……」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「むむ……それなりにかかりますね。でも許容範囲内です。これならきっと長官も前向きに考えてくださるでしょう」"
translation = "「으음…… 제법 드는군요. 하지만 허용 범위 내입니다. 이 정도라면 분명 장관님도 긍정적으로 생각해주시겠죠.」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「ホント？\u3000やったあ～♪」"
translation = "「정말? 야호~♪」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「私からも推しておきますよ」"
translation = "「저도 추천해 둘게요.」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「たはは、財布の紐が硬いで有名なウェンディが珍しいね」"
translation = "「타하하, 돈주머니 끈이 꽉 조이기로 유명한 웨디가 웬일이래.」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「それじゃ気が変わらないうちに見積もりを出しておくから」"
translation = "「그럼 마음 바뀌기 전에 견적서 뽑아 둘 테니까.」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「ええ、お願いします」"
translation = "「네, 부탁드려요.」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「それにしても……これはどういう仕組みなんですか？\u3000簡単に私にも分かるよう教えてくれませんか？」"
translation = "「그건 그렇고…… 이건 어떤 원리인가요? 간단하게 저도 알 수 있게 가르쳐주지 않겠어요?」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「簡単にか～。うーん……クラウディア様の光の魔法を応用してるんだよ。鏡の反射を利用して魔力を増幅して戦闘服に注ぎ込んでる感じかな」"
translation = "「간단하게라~. 으음…… 클라우디아 님의 빛의 마법을 응용하고 있어. 거울의 반사를 이용해서 마력을 증폭해 전투복에 쏟아붓는 느낌이랄까.」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「魔力を注ぎ込む……となるとある程度魔力の強さは必要そうですね」"
translation = "「마력을 쏟아붓는다…… 그렇다면 어느 정도 마력의 강도는 필요하겠군요.」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「そうね～、どうしてもある程度以上、魔力を持った者でないとダメっていう制限はあるね～」"
translation = "「그렇지~, 아무래도 일정 수준 이상의 마력을 가진 자가 아니면 안 된다는 제한은 있어~」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「とはいえ、要求される出力や量はそれほど大きいものじゃないよ」"
translation = "「그렇다 해도 요구되는 출력이나 양이 그렇게 큰 건 아니야.」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「魔女なら大半が使えるだろうし、ネビュラのメンバーだったら誰が使っても問題ないんじゃないかな？」"
translation = "「마녀라면 대부분 쓸 수 있을 테고, 네뷸라의 멤버라면 누가 써도 문제없지 않을까?」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「すごいです……ケチを付けるところがありませんね」"
translation = "「대단해요…… 흠잡을 데가 없네요.」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「でしょでしょ？\u3000今回のはアタシ的にも自信作だからっ」"
translation = "「그치그치? 이번 건 나로서도 자신작이니까.」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「きっと元老会の時代遅れどもも、この発明を見たら度肝を抜かれるだろうね～」"
translation = "「분명 원로회의 구시대 유물들도 이 발명을 보면 깜짝 놀라 자빠질걸~」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「ええ、ええ、想像しただけで愉快です。目を丸くして口をあんぐりさせている光景が目に浮かびますね。見ものですよ～、たっはっは～」"
translation = "「네, 네, 상상만 해도 유쾌하네요. 눈을 동그랗게 뜨고 입을 떡 벌리고 있는 광경이 눈에 선합니다. 볼만하겠어요~, 타하하~」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「一緒にドヤ顔しまくってやろうぜ～、たははははは♪」"
translation = "「같이 거들먹거려 주자구~, 타하하하하하♪」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「どうした、ずいぶんと盛り上がっているようだが？」"
translation = "「무슨 일이지, 꽤나 분위기가 달아오른 모양이다만?」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「セドナ長官、もう大丈夫なんですか？\u3000もう少しお休みになられていても……」"
translation = "「세드나 장관님, 이제 괜찮으신 건가요? 조금 더 쉬고 계셔도……」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「大丈夫だ、十分に休ませてもらった」"
translation = "「괜찮다, 충분히 쉬었다.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「それよりも珍しいな。犬猿の仲であるウェンディとツェツィーリエが一緒になって盛り上がっているとは」"
translation = "「그보다 희한하군. 견원지간인 웨디와 체칠리에가 함께 어울려 떠들고 있다니.」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「たはは、実は極秘に行っていた研究がついに完成したんで、それを見せに来たんですよ～」"
translation = "「타하하, 사실 극비리에 진행하던 연구가 드디어 완성돼서 그거 보여드리러 온 거예요~」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「長官、今回の発明は本当にすごいですよ！」"
translation = "「장관님, 이번 발명은 정말 대단해요!」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「ウェンディがそこまで言うなら余程のものだろうな」"
translation = "「웨디가 그 정도로 말한다면 대단한 것이겠군.」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「そうなんです！\u3000ご覧ください！\u3000私が今着ている戦闘服はツェツィーリエの装置で能力が向上されているんですよ！」"
translation = "「그렇습니다! 보세요! 제가 지금 입고 있는 전투복은 체칠리에의 장치로 능력이 향상되어 있다구요!」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「なに？\u3000……近くで見ても構わないか？」"
translation = "「뭐라고? ……가까이서 봐도 상관없겠나?」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「ええ、どうぞご確認ください」"
translation = "「네, 어서 확인해 보세요.」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「どーぞどーぞ、舐めるように見てやってくださいな～」"
translation = "「어서요 어서, 핥듯이 봐주시라구요~」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「えっ……？\u3000あ……ちょ、長官……そんな、近くで……熱い視線を……」"
translation = "「엣……? 아…… 저, 장관님…… 그렇게, 가까이서…… 뜨거운 시선을……」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「これはすごいな……触ってみてもいいか？」"
translation = "「이거 놀랍군…… 만져봐도 되겠나?」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「もっちろん♪」"
translation = "「무우론♪」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「ふえっ！？\u3000ちょっと待ってください！\u3000さ、触るって、そんな、大胆なコトっ！\u3000こ、困りますっ！！」"
translation = "「후에!? 잠깐 기다려 주세요! 마, 만진다니, 그렇게 대담한 짓을! 고, 곤란합니다!!」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「む……ダメなのか？」"
translation = "「음…… 안 되는 건가?」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「あ……いえ……ダメ、ではなくて……むしろ触って欲しいまでありますけど……」"
translation = "「아…… 아니요…… 안 되는 건 아니고…… 오히려 만져주셨으면 할 정도입니다만……」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「そうか、では、いいんだな？」"
translation = "「그런가, 그럼 괜찮은 거지?」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「…………はい<emoji=heart04>\u3000優しく、お願いします……」"
translation = "「…………네<emoji=heart04> 살살, 부탁드려요……」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「あ、でも、そろそろ時間切れかも？」"
translation = "「아, 근데 슬슬 시간 다 됐을지도?」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「きゃーーーーーーーーーーーーーーーーーーっ！！！！！！」"
translation = "「꺄아아아아아아아아아아아아아아아악!!!!!!」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「……服が、消えてしまったようだが？」"
translation = "「……옷이 사라져 버린 것 같다만?」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「時間制限あるんだよね、それが今抱えてる最大の問題点なのよ」"
translation = "「시간 제한이 있거든, 그게 지금 안고 있는 최대 문제점이야.」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「なんでそれを先に言わないんですか！！！」"
translation = "「왜 그걸 먼저 말 안 하는 건데요!!!」"

[[dialogue]]
speaker_original = "ツェツィーリエ"
speaker_translation = "체칠리에"
original = "「ごめんごめん♪」"
translation = "「미안 미안♪」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「長官に全部見られた……私の裸……全部、見られちゃった……」"
translation = "「장관님한테 전부 보였어…… 내 알몸…… 전부, 보여버렸어……」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「まあ……幸い、我々は女性同士だ。それほど気にすることはないだろう」"
translation = "「뭐…… 다행히 우리는 같은 여자다. 그리 신경 쓸 것 없겠지.」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「そうなんですけど～っ！\u3000ふぇええええええええんっっ！！！」"
translation = "「그렇긴 하지만요오~! 흐아아아아아아아아아앙!!!」"

