[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "（あの後の戦いについて、私の口から少しだけ）"
translation = "(그 뒤의 전투에 대해 제 입으로 조금만)"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "（サチさまが記憶を取り戻してからは、それまでの苦戦が嘘のように、幸運がこちらに舞い込みました）"
translation = "(사치 님이 기억을 되찾고 나서는 그때까지의 고전이 거짓말처럼 행운이 이쪽으로 굴러 들어왔습니다)"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "（メルクリウスはビームをこれでもかと連射しますが、当たらないと決まっているかのように、突撃するサチさま、プリムラさまを捉えることはなく）"
translation = "(메르쿠리우스는 빔을 이래도 되나 싶을 정도로 연사했지만, 맞지 않기로 정해진 것처럼 돌격하는 사치 님, 프리뮬러 님을 포착하지 못했고)"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "（私、会長さま、マトイ姉さまはそんな２人を全力で援護）"
translation = "(저, 회장님, 마토이 누님은 그런 두 분을 전력으로 원호)"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "（距離を詰めた魔法少女のお２人は、まるでダンスを踊るように息ぴったりの連携で、メルクリウスを終始圧倒）"
translation = "(거리를 좁힌 마법소녀 두 분은 마치 춤을 추듯 호흡이 척척 맞는 연계로 메르쿠리우스를 시종 압도)"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "（最後は、プリムラさまが強烈なアッパーで、メルクリウスの巨体を天高く打ち上げ――）"
translation = "(마지막에는 프리뮬러 님이 강렬한 어퍼로 메르쿠리우스의 거구를 하늘 높이 쳐올리고――)"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「タイダルフィーバーーーッ！！！」"
translation = "「타이달 피버―――!!」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "（サチさまの幸運を込めた必殺の一撃によって、ロストアイテムはついに、その機能を停止させたのでした――）"
translation = "(사치 님의 행운을 담은 필살의 일격에 의해 로스트 아이템은 마침내 그 기능을 정지한 것이었습니다――)"

[[dialogue]]
speaker = "unk"
original = "記憶のロストアイテムを回収した後、俺たちは受けた傷の治療も兼ねて、保健室に集まっていた。"
translation = "기억의 로스트 아이템을 회수한 뒤 우리들은 입은 상처의 치료도 겸해 보건실에 모여 있었다."

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「はい、サチさま。これで処置は終わりです」"
translation = "「네, 사치 님. 이걸로 처치는 끝났습니다.」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ありがとう、トマルくん」"
translation = "「고마워, 토마루 군.」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「いや～、一時はどうなることかと思いましたが、皆さん、無事でよかったですね～」"
translation = "「이야~ 한때는 어떻게 되나 싶었습니다만 여러분 무사해서 다행이네요~」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「本当にね。まさかリクリエの危機にまで発展するとは思わなかったよ……」"
translation = "「정말이야. 설마 리크리에의 위기까지 발전할 줄은 몰랐어……」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「マトイ先輩、この度は手伝っていただいて、ありがとうございました。それから、お兄さんも」"
translation = "「마토이 선배, 이번에 도와주셔서 감사합니다. 그리고 오빠도요.」"

[[dialogue]]
speaker = "unk"
original = "気にしなくていいよ。仲間なんだからさ"
translation = "「신경 쓰지 마. 동료니까 말이야.」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「お兄さんの記憶も戻ったみたいで、安心しました。これからまた、よろしくお願いしますね」"
translation = "「오빠의 기억도 돌아온 것 같아서 안심했어요. 앞으로 다시 잘 부탁드려요.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「私も、ロストアイテムを放っておくとどうなるか、身をもって知っちゃったしね。だから困った時はまた、遠慮なく相談してね。サチちゃん」"
translation = "「나도 로스트 아이템을 방치하면 어떻게 되는지 몸소 알게 됐으니까. 그러니까 곤란할 때는 다시 주저 말고 상담해 줘, 사치 짱.」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「はい、先輩にそう言っていただけると、心強いです」"
translation = "「네, 선배님이 그렇게 말씀해 주시니 든든해요.」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「トマルくんも、今回は色々とフォローしてくれて、ありがとう」"
translation = "「토마루 군도 이번에 여러 가지로 팔로우해 줘서 고마워.」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「保健室であの時、プリムラとのことをアドバイスしてくれたから、土壇場で記憶を取り戻せたんだと思う」"
translation = "「보건실에서 그때 프리뮬러와의 일을 조언해 줘서 막판에 기억을 되찾을 수 있었다고 생각해.」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「いえいえ。私はただ、サチさまの友達として、自分のしたかったことをしただけですから」"
translation = "「아니요. 저는 그저 사치 님의 친구로서 제가 하고 싶었던 일을 했을 뿐이니까요.」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「それがサチさまの助けになったのなら、嬉しく思います」"
translation = "「그것이 사치 님께 도움이 되었다면 기쁘게 생각합니다.」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「そっか……ふふっ」"
translation = "「그렇구나…… 후후.」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「トマルくんはやっぱり、美少女だね。見た目も、心も」"
translation = "「토마루 군은 역시 미소녀네. 겉모습도, 마음도.」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「サチさまみたいな可愛らしい女性に言っていただけるなんて、光栄です。ふふっ……♪」"
translation = "「사치 님 같은 사랑스러운 여성분께 그런 말씀을 듣다니 영광입니다. 후후……♪」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「やれやれ。記憶を奪うロストアイテムが、こんなに面倒くさいとは思わんかったのじゃ。２度と回収したくないぞ」"
translation = "「이런 이런. 기억을 뺏는 로스트 아이템이 이렇게나 귀찮을 줄은 몰랐느니라. 두 번 다시 회수하고 싶지 않구나.」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「まあまあ、そのおかげでプリムラさんにも、いいことがあったじゃないですか♪」"
translation = "「자자, 그 덕분에 프리뮬러 씨에게도 좋은 일이 있었지 않습니까♪」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「いいこと？\u3000なんじゃそれは？」"
translation = "「좋은 일? 그게 무엇이냐?」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「プリムラ」"
translation = "「프리뮬러.」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「ん？\u3000なんじゃ、サチ」"
translation = "「응? 무엇이냐, 사치.」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「あの、さ……今回のことなんだけど――」"
translation = "「저기, 그…… 이번 일 말인데――」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「記憶を失った時のことか？\u3000戻ったからもういいじゃろ。さすがの我も、今日の戦いは疲れた。怒る気力も残ってないわ」"
translation = "「기억을 잃었을 때의 일 말이냐? 돌아왔으니 이제 됐느니라. 아무리 나라도 오늘의 전투는 지쳤느니라. 화낼 기력도 남아있지 않구나.」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ありがとう」"
translation = "「고마워.」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「あ？」"
translation = "「어?」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「攻撃から庇ってくれたこと、それに記憶を奪われた私に怒ってくれたこと」"
translation = "「공격으로부터 감싸준 거, 그리고 기억을 빼앗긴 나에게 화내준 거.」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「ちゃんとお礼は伝えておかなくちゃと思って。……感謝してる」"
translation = "「제대로 고맙다는 말은 전해야겠다고 생각해서. ……감사하고 있어.」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「な……」"
translation = "「내……」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「馬鹿か貴様は！？\u3000い、いきなり何わけわからんことを言い出しとるんじゃ！？」"
translation = "「바보냐 네놈은!? 가, 갑자기 무슨 알 수 없는 소리를 지껄이는 것이냐!?」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「我と貴様の関係で、礼とか……反応に困るじゃろ！\u3000こちとら悪の終末兵器じゃぞ！？」"
translation = "「나와 네놈 사이에서 감사라니…… 반응하기 곤란하지 않느냐! 이쪽은 악의 종말 병기이니라!?」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「それをそんな、今まで１度も言ったことない癖に、急に……！\u3000あ～、もう、それなのに……！\u3000貴様というやつはっ！\u3000貴様というやつはぁぁぁ～～～っ！」"
translation = "「그걸 그렇게, 지금까지 한 번도 말한 적도 없는 주제에 갑자기……! 아~ 정말, 그런데도……! 네놈이란 녀석은! 네놈이란 녀석은～～～!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「……ふっ……ふふっ……あはっ、あははははははっ」"
translation = "「……훗…… 후후…… 아핫, 아하하하하하하하」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「って、なに笑っとんのじゃお前はぁぁぁっ！」"
translation = "「아니, 왜 웃는 것이냐 네놈은!」"

[[dialogue]]
speaker_original = "サチ"
speaker_translation = "사치"
original = "「い、いやプリムラ……そんな顔真っ赤にしているの、見たことないから……あはっ、あははははははっ」"
translation = "「아, 아니 프리뮬러…… 그렇게 얼굴 빨개진 거 본 적 없으니까…… 아핫, 아하하하하하하하」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「このっ……！\u3000馬鹿にしとるな貴様！？\u3000ええい、笑うでない！」"
translation = "「이익……! 바보 취급 하는 것이냐 네놈!? 에잇, 웃지 말거라!」"

[[dialogue]]
speaker_original = "トレジアンナ"
speaker_translation = "트레지안나"
original = "「ふふっ☆\u3000ほら、プリムラさんにもいいことあったでしょう？」"
translation = "「후후☆ 봐요, 프리뮬러 씨에게도 좋은 일 있었죠?」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「お、おのれ、貴様ら……！」"
translation = "「이, 이놈들, 네놈들이……!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「我を笑うなど、１０万年早いのじゃあぁぁぁ～～～っ！」"
translation = "「나를 비웃다니 10만 년은 이르느니라아아아～～～!」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「ああ……そうです。この感じ――」"
translation = "「아아…… 맞아요. 이 느낌――」"

[[dialogue]]
speaker_original = "トマル"
speaker_translation = "토마루"
original = "「私の大好きな、いつもの附属校生徒会のお２人が、戻ってきました」"
translation = "「제가 정말 좋아하는, 평소의 부속교 학생회 두 분이 돌아오셨네요.」"

[[dialogue]]
speaker = "unk"
original = "サチとプリムラのじゃれ合いを見ながら、トマルは嬉しそうに微笑むのだった――"
translation = "사치와 프리뮬러의 장난을 보며 토마루는 기쁘다는 듯 미소 짓는 것이었다――"

