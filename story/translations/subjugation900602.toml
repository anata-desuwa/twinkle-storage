[[dialogue]]
speaker = "unk"
original = "次の休日。"
translation = "다음 휴일."

[[dialogue]]
speaker = "unk"
original = "イレーナとシャロンと一緒に、子どもたちへのクリスマスプレゼントを買い求めて街を巡った。"
translation = "이레이나와 샤론과 함께 아이들에게 줄 크리스마스 선물을 사러 거리 곳곳을 돌아다녔다."

[[dialogue]]
speaker = "unk"
original = "その後──"
translation = "그 후──"

[[dialogue]]
speaker = "シャロン"
original = "「パーティー開始までここに置かせていただきますね。ふふ、イレーナさまと会長さまのおかげでいいプレゼントを購入できました！」"
translation = "「파티 시작 전까지 여기 두도록 할게요. 후후, 이레이나 님과 회장님 덕분에 좋은 선물을 구입할 수 있었습니다!」"

[[dialogue]]
speaker = "イレーナ"
original = "「はぁはぁ……それは何よりですけど、流石に買い込みすぎでは……。それにこの大量のクリスマスカードは……？」"
translation = "「하아 하아…… 그거 다행이네요, 하지만 아무리 그래도 너무 많이 산 거 아닌지……. 게다가 이 대량의 크리스마스 카드는……?」"

[[dialogue]]
speaker = "シャロン"
original = "「プレゼントに女神様のありがたいお言葉を添えてお渡しできればと思いまして。女神様のお言葉は心の支えになりますから！」"
translation = "「선물에 여신님의 감사한 말씀을 곁들여서 전달하면 좋을 것 같아서요. 여신님의 말씀은 마음의 버팀목이 되니까요!」"

[[dialogue]]
speaker = "イレーナ"
original = "「え？\u3000まさかその量を１枚ずつ書くおつもりですか？」"
translation = "「네? 설마 그 양을 한 장씩 다 쓰실 생각인가요?」"

[[dialogue]]
speaker = "シャロン"
original = "「はい、そうですが……あ、クリスマスカード作りに没頭していては、肝心の準備が進められませんね」"
translation = "「네, 그렇습니다만…… 아, 크리스마스 카드 제작에 몰두하다가는 정작 준비가 늦어지겠네요.」"

[[dialogue]]
speaker = "イレーナ"
original = "「そうではなくて。一旦、休憩を入れた方が……。散々街中を走り回ったわけですし……」"
translation = "「그게 아니라, 일단 휴식을 좀 취하는 게……. 한참 동안 시내를 뛰어다녔잖아요……」"

[[dialogue]]
speaker = "シャロン"
original = "「いえいえ、休んでいる暇なんてありませんよ！\u3000子どもたちがとびきりの笑顔になれるよう頑張らなくては！」"
translation = "「아니요 아니요, 쉬고 있을 틈 따윈 없답니다! 아이들이 최고의 미소를 지을 수 있도록 힘내야 해요!」"

[[dialogue]]
speaker = "シャロン"
original = "「これからも子どもたちが女神様のご加護を、愛を賜れるように、聖誕祭を言祝ぐのです。それがシスターたる私の務めでございますので！」"
translation = "「앞으로도 아이들이 여신님의 가호와 사랑을 받을 수 있도록, 성탄제를 축복하는 겁니다. 그것이 시스터인 저의 의무니까요!」"

[[dialogue]]
speaker = "イレーナ"
original = "「……女神様のご加護、ねぇ……」"
translation = "「……여신님의 가호, 라니……」"

[[dialogue]]
speaker = "シャロン"
original = "「？？？\u3000どうかなさいましたか？」"
translation = "「??? 무슨 일이라도 있으신가요?」"

[[dialogue]]
speaker = "イレーナ"
original = "「ああ、いえ。だとしてもご無理をなさるのは如何なものかと……」"
translation = "「아아, 아니요. 그렇다 해도 무리하시는 건 좀 어떨까 싶어서요……」"

[[dialogue]]
speaker = "シャロン"
original = "「ふふ、お気遣いありがとうございます。しかしご心配無用です。私はまだまだ元気ですから！」"
translation = "「후후, 신경 써주셔서 감사합니다. 하지만 걱정하실 필요 없어요. 저는 아직 쌩쌩하니까요!」"

[[dialogue]]
speaker = "シャロン"
original = "「イレーナさまはクリスマスカードの制作をお願いいたします！\u3000私は飾り付けやお料理の準備を手伝ってきますね！」"
translation = "「이레이나 님은 크리스마스 카드 제작을 부탁드릴게요! 저는 장식이나 요리 준비를 도우러 다녀오겠습니다!」"

[[dialogue]]
speaker = "イレーナ"
original = "「あっ、ちょっと──はぁ、ホント忙しないわね……」"
translation = "「앗, 잠깐── 하아, 정말 분주하다니까……」"

[[dialogue]]
speaker = "イレーナ"
original = "「張り切るなとは言わないけど大丈夫なのかしら……。ここのところずっと働きっぱなしみたいだし」"
translation = "「의욕 내지 말라는 건 아니지만 괜찮은 건지 원……. 요 근래 계속 일만 하는 것 같고.」"

[[dialogue]]
speaker = "イレーナ"
original = "「あの子、貧血持ちでしょ？\u3000小さい頃に重い病気にかかったとも聞いたわ。今もちょくちょくダウンしてるし……頑張りすぎてまた倒れなきゃいいけど」"
translation = "「저 아이, 빈혈이 있잖아? 어릴 때 무거운 병에 걸렸었다고도 들었어. 지금도 이따금 쓰러지고 있고…… 너무 힘내다가 또 쓰러지지나 않으면 좋겠는데.」"

[[dialogue]]
speaker = "unk"
original = "シャロンのことが心配？"
translation = "샤론이 걱정돼?"

[[dialogue]]
speaker = "イレーナ"
original = "「別に心配なんかしてないわよ。下手に倒れられたら仕事が増えて面倒ってだけ」"
translation = "「별로 걱정 같은 거 안 한다구. 괜히 쓰러지면 일만 늘어나서 귀찮을 뿐이야.」"

[[dialogue]]
speaker = "イレーナ"
original = "「まったくもう、シャロンってば女神サマとやらがそんなに大事なのかしら。意味わかんないわ」"
translation = "「정말이지, 샤론 녀석은 여신님인지 뭔지가 그렇게나 소중한 걸까. 의미를 모르겠어.」"

[[dialogue]]
speaker = "イレーナ"
original = "「ていうか、女神サマってのが本当にいるのなら、どうしてあたしなんかにこんな力をよこしたのよ。どう考えても人選ミスでしょうが」"
translation = "「그보다, 여신님이라는 게 정말로 있다면 어째서 나 같은 애한테 이런 힘을 준 거야. 아무리 생각해도 인선 미스잖아.」"

[[dialogue]]
speaker = "イレーナ"
original = "「──って、こんなこと考えてても疲れるだけね。ん～……やっと解放してもらえたわけだし、ちょっと休憩しましょ♪」"
translation = "「──라니, 이런 거 생각하고 있어봤자 지칠 뿐이네. 음~…… 겨우 해방됐으니 좀 쉬자구♪」"

[[dialogue]]
speaker = "イレーナ"
original = "「あ、このソファいいじゃない。このところ書類仕事が溜まってて寝不足だったのよねー。じゃああたし、仮眠するから。クリスマスカード作るのは任せたわよ♪」"
translation = "「아, 이 소파 좋잖아. 요 근래 서류 업무가 쌓여서 수면 부족이었단 말이지. 그럼 나 낮잠 좀 잘 테니까. 크리스마스 카드 만드는 건 네가 알아서 해♪」"

[[dialogue]]
speaker = "unk"
original = "ちょっと用事を思い出し──"
translation = "잠깐 볼일이 생각나서──"

[[dialogue]]
speaker = "イレーナ"
original = "「──逃がすと思う？\u3000いいから誰も教室に入ってこないように見張ってなさいってば」"
translation = "「──도망칠 수 있을 것 같아? 됐으니까 아무도 교실에 들어오지 못하게 감시나 하라구.」"

[[dialogue]]
speaker = "イレーナ"
original = "「あたしは、その……。あんたと２人きりの時くらいしか気を抜けないんだから……」"
translation = "「나는, 그……. 너랑 둘이 있을 때 정도밖에 긴장을 풀 수 없으니까……」"

[[dialogue]]
speaker = "イレーナ"
original = "「ん……？\u3000なんか騒がしいわね……。目が覚めちゃったじゃない……」"
translation = "「응……? 뭔가 시끄럽네……. 잠이 깨버렸잖아……」"

[[dialogue]]
speaker = "unk"
original = "何かあったのかな"
translation = "무슨 일이라도 생겼나."

[[dialogue]]
speaker = "サラン"
original = "「あ～、イレーナさん見つけたぁ……！\u3000悪いけど、すぐ来て～！」"
translation = "「아~, 이레이나 씨 찾았다……! 미안하지만, 빨리 와줘~!」"

[[dialogue]]
speaker = "イレーナ"
original = "「サランさん？\u3000どうかされましたか？」"
translation = "「사란 씨? 무슨 일이 생겼나요?」"

[[dialogue]]
speaker = "サラン"
original = "「シャロンさんが倒れちゃったの～～！」"
translation = "「샤론 씨가 쓰러져 버렸어~~!」"

[[dialogue]]
speaker = "イレーナ"
original = "「！」"
translation = "「!」"

[[dialogue]]
speaker = "イレーナ"
original = "「……軽い貧血ですね。ですから言ったではありませんか」"
translation = "「……가벼운 빈혈이네요. 그러니까 제가 말하지 않았습니까.」"

[[dialogue]]
speaker = "シャロン"
original = "「うぅ、返す言葉もございません……」"
translation = "「으으, 드릴 말씀이 없네요……」"

[[dialogue]]
speaker = "イレーナ"
original = "「これに懲りたらあまり無理をしないでください。貧血といえど倒れる場所によっては命に関わりますから」"
translation = "「이번 일로 깨달으셨으면 너무 무리하지 마세요. 빈혈이라 해도 쓰러지는 장소에 따라서는 목숨과 직결되니까요.」"

[[dialogue]]
speaker = "シャロン"
original = "「はい。本当にありがとうございました。女神様にも感謝いたしませんと」"
translation = "「네. 정말로 감사합니다. 여신님께도 감사드려야겠어요.」"

[[dialogue]]
speaker = "イレーナ"
original = "「……女神様に？」"
translation = "「……여신님께요?」"

[[dialogue]]
speaker = "シャロン"
original = "「ええ。幸運にも近くに人がいる状況で倒れることができたわけですから」"
translation = "「네. 운 좋게도 근처에 사람이 있는 상황에서 쓰러질 수 있었으니까요.」"

[[dialogue]]
speaker = "シャロン"
original = "「全ては女神様が惜しみのない愛で私を包んでくださっているおかげです。ご加護に感謝しなければ」"
translation = "「모든 것은 여신님께서 아낌없는 사랑으로 저를 감싸주신 덕분입니다. 가호에 감사드려야 해요.」"

[[dialogue]]
speaker = "イレーナ"
original = "「私があなたを癒したのも女神様の思し召しだと？」"
translation = "「제가 당신을 치료한 것도 여신님의 뜻이라는 건가요?」"

[[dialogue]]
speaker = "シャロン"
original = "「ふふ、もちろんですっ。きっと女神様が聖女さまを遣わせてくださったのですよ！\u3000多くの人を救うイレーナさまの力は、女神様の愛の<ruby>顕<rt>あらわ</rt></ruby>れなのです！」"
translation = "「후후, 물론입니다! 분명 여신님께서 성녀님을 보내주신 거예요! 많은 사람을 구하는 이레이나 님의 힘은 여신님의 사랑의 현이니까요!」"

[[dialogue]]
speaker = "イレーナ"
original = "「そう。じゃあ女神様は私を愛しておられないのね」"
translation = "「그래. 그럼 여신님은 나를 사랑하시지 않는 거네.」"

[[dialogue]]
speaker = "シャロン"
original = "「え──？」"
translation = "「에──?」"

[[dialogue]]
speaker = "イレーナ"
original = "「だってそうでしょ？\u3000女神様があたしを愛しておられたなら、こんなうざったい力を与えはしないわ」"
translation = "「그야 그렇잖아? 여신님이 나를 사랑하신다면, 이런 지긋지긋한 힘을 주지는 않았을 거야.」"

[[dialogue]]
speaker = "イレーナ"
original = "「この力のおかげで聖女って呼ばれて、あたしはうんざりしてるのよ。ボランティアで人助けさせられて、神官までさせられて、遊ぶ暇もないっての」"
translation = "「이 힘 덕분에 성녀라고 불리며 나는 진저리가 난다구. 자원봉사로 사람 돕기에 동원되고 신관 노릇까지 떠맡아서 놀 틈도 없다니까.」"

[[dialogue]]
speaker = "シャロン"
original = "「え？\u3000え？\u3000え？」"
translation = "「네? 네? 네?」"

[[dialogue]]
speaker = "イレーナ"
original = "「人を女神の使いっ走りみたいに言わないで！\u3000こちとら迷惑してるのよ、勝手に聖女なんかに仕立て上げられてね！」"
translation = "「사람을 여신의 심부름꾼처럼 말하지 마! 이쪽은 민폐라고, 멋대로 성녀 같은 걸로 만들어버리고 말이야!」"

[[dialogue]]
speaker = "イレーナ"
original = "「大体、女神に愛されてるって何？\u3000あんたの言う女神なんて本当にいるの？\u3000惜しみのない愛なんて本当に注いでるの？」"
translation = "「애초에 여신에게 사랑받는다는 게 뭐야? 네가 말하는 여신이란 게 정말 있어? 아낌없는 사랑이란 걸 정말로 쏟고 있냐구?」"

[[dialogue]]
speaker = "イレーナ"
original = "「ならどうしてあんたは病気に罹ったのよ？\u3000むしろ女神のせいで病気になったんじゃないの！？」"
translation = "「그럼 왜 너는 병에 걸린 거야? 오히려 여신 때문에 병에 걸린 거 아니냐구!?」"

[[dialogue]]
speaker = "シャロン"
original = "「──！」"
translation = "「──!」"

[[dialogue]]
speaker = "イレーナ"
original = "「この力をくれたのが女神なら、女神はあたしに嫌がらせしたいに違いないわ」"
translation = "「이 힘을 준 게 여신이라면, 여신은 나를 괴롭히고 싶은 게 분명해.」"

[[dialogue]]
speaker = "イレーナ"
original = "「本当に女神が人を愛しているのなら、あたしを聖女なんかに選ばずに、普通の女の子のままで──」"
translation = "「정말로 여신이 사람을 사랑한다면, 나를 성녀 같은 걸로 고르지 말고 평범한 여자아이인 채로──」"

[[dialogue]]
speaker = "シャロン"
original = "「イレーナ、さま……？」"
translation = "「이레이나, 님……?」"

[[dialogue]]
speaker = "イレーナ"
original = "「あっ──……！\u3000っ……！」"
translation = "「앗──……! 윽……!」"

[[dialogue]]
speaker = "unk"
original = "イレーナ！！"
translation = "이레이나!!"

[[dialogue]]
speaker = "シャロン"
original = "「イレーナさま……」"
translation = "「이레이나 님……」"

