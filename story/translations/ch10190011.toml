[[dialogue]]
speaker = "unk"
original = "第１話,メイドで忍者でござる,P"
translation = "제1화, 메이드이자 닌자이오, P"

[[dialogue]]
speaker = "unk"
original = "最近、誰かにストーキングされている気がする――"
translation = "최근, 누군가에게 스토킹당하고 있는 기분이 든다──"

[[dialogue]]
speaker = "unk"
original = "というわけで、俺はストーキングの専門家……もといヴィーナスの護衛である九浄家メイド隊の閃の元を訪ねた。"
translation = "그래서 나는 스토킹 전문가…… 아니 비너스의 호위인 쿠죠 가문 메이드대의 센을 찾아갔다."

[[dialogue]]
speaker = "閃"
original = "「それで何故、私のところに……！？\u3000言っておきますけど、犯人は私じゃありませんよ！？」"
translation = "「그래서 어째서 제 쪽으로……!? 말해두겠는데, 범인은 제가 아니라고요!?」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスのストーキングはしてるでしょ？"
translation = "비너스를 스토킹하고는 있잖아?"

[[dialogue]]
speaker = "閃"
original = "「ストーキングではなく、護衛ですっ。まさか私に相談に来たのは、同類だからとかそういうアレですか！？」"
translation = "「스토킹이 아니라 호위입니다. 설마 제게 상담하러 온 건, 동류라거나 그런 이유인가요!?」"

[[dialogue]]
speaker = "閃"
original = "「うぅっ……お嬢様にも同じように思われてないでしょうか……？\u3000だ、大丈夫……ですよね？」"
translation = "「으윽…… 아가씨께서도 똑같이 생각하고 계시진 않을까요……? 개, 괜찮……겠죠?」"

[[dialogue]]
speaker = "せつな"
original = "「大丈夫でござる！\u3000お嬢様は閃殿なら許容範囲だと仰っていたでござるよ！」"
translation = "「괜찮소! 아가씨께선 센 공이라면 허용 범위라고 말씀하셨소!」"

[[dialogue]]
speaker = "閃"
original = "「ストーキングだと思われてる――――っ！！？」"
translation = "「스토킹이라고 생각하고 계시잖아──!!?」"

[[dialogue]]
speaker = "せつな"
original = "「しかし、会長殿に勘づかれていたとは、せつなも忍者としてまだまだ未熟でござる。感情を抑え切れず、気配を消し切れなかったのが原因でござろうか？」"
translation = "「하지만 회장 공에게 눈치채이다니, 세츠나도 닌자로서 아직 미숙하오. 감정을 억누르지 못하고 기척을 다 지우지 못한 것이 원인이겠지 소?」"

[[dialogue]]
speaker = "unk"
original = "へぇ、忍者……って誰！？"
translation = "헤에, 닌자……라니 누구!?"

[[dialogue]]
speaker = "せつな"
original = "「おっと、これは失礼つかまつりました。会長殿と閃殿の会話が楽しそうだったのでつい、忍ぶのを忘れてしまったでござる」"
translation = "「오호, 이거 실례했소. 회장 공과 센 공의 대화가 즐거워 보여서 그만, 숨어 있는 것을 잊어버렸소.」"

[[dialogue]]
speaker = "閃"
original = "「ああ、なるほど。会長さんをストーキングしていた犯人は、あなただったんですね、せつな」"
translation = "「아아, 그렇군요. 회장님을 스토킹하던 범인은 당신이었군요, 세츠나.」"

[[dialogue]]
speaker = "せつな"
original = "「はい♪\u3000お初にお目に掛かりまする、会長殿。新星学園１年生で、紫桜の里出身、甲賀流くノ一兼メイド！\u3000『せつな』と申しまする！」"
translation = "「예♪ 처음 뵙겠소, 회장 공. 신성학원 1학년으로, 시오의 마을 출신, 코가류 쿠노이치 겸 메이드! 『세츠나』라고 하오!」"

[[dialogue]]
speaker = "unk"
original = "メイドってことは、もしかして──"
translation = "메이드라는 건 설마──"

[[dialogue]]
speaker = "閃"
original = "「ええ、彼女も私と同じく、『九浄家メイド隊』の一員です。紫桜の里は、甲賀流忍者が暮らす隠れ里で、彼女はそこで育った、正真正銘本物の忍者なんですよ」"
translation = "「네, 그녀도 저와 마찬가지로 『쿠죠 가문 메이드대』의 일원입니다. 시오의 마을은 코가류 닌자가 사는 숨겨진 마을로, 그녀는 그곳에서 자란 진짜배기 닌자예요.」"

[[dialogue]]
speaker = "せつな"
original = "「にんにん♪\u3000故にストーキングは、閃殿以上に得意でござるよ！」"
translation = "「닌닌♪ 고로 스토킹은 센 공 이상으로 자신 있소!」"

[[dialogue]]
speaker = "閃"
original = "「私は別に、得意なつもりはないんですが……」"
translation = "「저는 딱히 자신 있는 건 아닙니다만……」"

[[dialogue]]
speaker = "せつな"
original = "「会長殿はもうご存知のようですが、九浄家メイド隊は、お館様が星見家メイド隊に対抗して作った組織でござる」"
translation = "「회장 공은 이미 알고 계신 듯하오만, 쿠죠 가문 메이드대는 주군께서 호시미 가문 메이드대에 대항하여 만든 조직이오.」"

[[dialogue]]
speaker = "せつな"
original = "「お屋敷の仕事はもちろんですが、学園運営の手伝いも行っておりまする」"
translation = "「저택의 일은 물론이오나, 학원 운영의 도움도 드리고 있소.」"

[[dialogue]]
speaker = "せつな"
original = "「せつながメイド隊に入ったのは、九浄家のお館様へ恩返しをする為。以前、アステラ発生の余波で里に大量のモンスターが現れたことがあったでござるが――」"
translation = "「세츠나가 메이드대에 들어온 것은 쿠죠 가문의 주군께 은혜를 갚기 위함이오. 이전에 아스테라 발생의 여파로 마을에 대량의 몬스터가 나타난 적이 있었소만──」"

[[dialogue]]
speaker = "せつな"
original = "「それによって大きな被害が出た際、お館様が復興の支援をして下さったのでござる。その奉公として、メイドの仕事をさせて頂くことになったのでござるよ」"
translation = "「그로 인해 큰 피해가 났을 때, 주군께서 복구 지원을 해주셨소. 그 봉공으로서 메이드 일을 하게 된 것이오.」"

[[dialogue]]
speaker = "unk"
original = "どうして俺をストーキングしてたんだ？"
translation = "왜 나를 스토킹하고 있었던 거야?"

[[dialogue]]
speaker = "unk"
original = "とりあえず、キミの素性は分かったけど"
translation = "일단 네 정체는 알겠는데."

[[dialogue]]
speaker = "せつな"
original = "「それはズバリ、見極めたかったのでござる！\u3000会長殿がどのようなお方なのかを！」"
translation = "「그건 바로 지켜보고 싶었기 때문이오! 회장 공이 어떤 분인지!」"

[[dialogue]]
speaker = "せつな"
original = "「そして、やはり会長殿は、せつなの想像通りのお方に間違いないと思ったでござる！\u3000故に会長殿、どうか――」"
translation = "「그리고 역시 회장 공은 세츠나의 상상대로의 분임에 틀림없다고 생각했소! 고로 회장 공, 부디──」"

[[dialogue]]
speaker = "せつな"
original = "「せつなの『主様』となって頂けませぬか！\u3000一旦仮でもいいので！」"
translation = "「세츠나의 『주군』이 되어주시지 않겠소! 일단 임시라도 좋으니!」"

[[dialogue]]
speaker = "unk"
original = "え！？"
translation = "에!?"

[[dialogue]]
speaker = "閃"
original = "「そういえばよく、自分が仕えるべき主を探している、と言っていましたね。確かそれは、男性である必要があるとも……」"
translation = "「그러고 보니 자주 자신이 섬겨야 할 주인을 찾고 있다고 말했었죠. 분명 그건 남성일 필요가 있다고도……」"

[[dialogue]]
speaker = "せつな"
original = "「はい、師匠の教えにござる。一生側に仕えたいと思える強い殿方を己が主に選べと。御前試合であのお嬢様に勝った会長殿は、まさにせつなの探していた存在でござる！」"
translation = "「그렇소, 스승님의 가르침이오. 평생 곁에서 모시고 싶다 생각되는 강한 사내를 자신의 주인으로 택하라고. 어전 시합에서 그 아가씨를 이긴 회장 공은 그야말로 세츠나가 찾던 존재요!」"

[[dialogue]]
speaker = "せつな"
original = "「……まぐれ勝ち？\u3000いやいや会長殿、謙遜など不要でござる」"
translation = "「……운 좋게 이겼다? 아니 아니 회장 공, 겸손은 필요 없소.」"

[[dialogue]]
speaker = "せつな"
original = "「戦いが強いかどうかだけでなく、せつなは会長殿を観察させて頂き、そのお人柄も好ましいと感じたのでござる。それこそ――」"
translation = "「싸움이 강한가뿐만 아니라, 세츠나는 회장 공을 관찰하며 그 인품도 호감이 간다고 느꼈소. 그야말로──」"

[[dialogue]]
speaker = "せつな"
original = "「この人ならば、師匠から伝授された房中術を捧げても構わないと思える程に！」"
translation = "「이 사람이라면 스승님께 전수받은 방중술을 바쳐도 상관없다 생각될 정도로!」"

[[dialogue]]
speaker = "閃"
original = "「ぼっ！？」"
translation = "「바!?」"

[[dialogue]]
speaker = "unk"
original = "いま何て！？"
translation = "지금 뭐라고!?"

[[dialogue]]
speaker = "せつな"
original = "「む？\u3000房中術にござる。どういう術かというと、女の体を使い、殿方の――」"
translation = "「음? 방중술이오. 어떤 술법인가 하면 여자의 몸을 써서 사내의──」"

[[dialogue]]
speaker = "閃"
original = "「いっ、言わなくていいです！\u3000それ以上は説明しなくていいですからっ！」"
translation = "「마, 말 안 해도 돼요! 그 이상은 설명 안 해도 되니까요!」"

[[dialogue]]
speaker = "せつな"
original = "「せつなの師匠は、里１番のくノ一で、房中術を最も得意としているのでござるよ。せつなにとって、こんな風になりたいと憧れる女性であり、忍びとしての目標なのでござる」"
translation = "「세츠나의 스승님은 마을 제일의 쿠노이치로, 방중술을 가장 잘하신다오. 세츠나에겐 저렇게 되고 싶다 동경하는 여성이자 닌자로서의 목표요.」"

[[dialogue]]
speaker = "せつな"
original = "「その師匠から『強い男を掴まえて、私の教えた房中術を使って欲しい。出来ればその後、里に連れ帰って欲しい』と言われ、主様を探していたのでござるよ！」"
translation = "「그 스승님께서 『강한 남자를 붙잡아 내가 가르친 방중술을 써주렴. 가능하다면 그 후에 마을로 데려오렴』이라 하셔서 주군을 찾고 있었소!」"

[[dialogue]]
speaker = "unk"
original = "さっきと意味合いが変わって来るよ！？"
translation = "방금 거랑 의미가 달라지는데!?"

[[dialogue]]
speaker = "閃"
original = "「ひょっとして紫桜の里、若い男性が少なかったりするのでは……？」"
translation = "「혹시 시오의 마을, 젊은 남성이 적은 건가요……?」"

[[dialogue]]
speaker = "せつな"
original = "「その通りでござる。何故分かったのでござるか？」"
translation = "「그 말이 맞소. 어찌 알았소?」"

[[dialogue]]
speaker = "閃"
original = "「……会長さん、婿入り大変そうですが、頑張って下さい」"
translation = "「……회장님, 데릴사위 들어가기 힘들 것 같지만 힘내세요.」"

[[dialogue]]
speaker = "unk"
original = "まだ決めたわけじゃないから！"
translation = "아직 결정한 거 아니니까!"

[[dialogue]]
speaker = "unk"
original = "いやいや待って！"
translation = "아니 아니 기다려 봐!"

[[dialogue]]
speaker = "せつな"
original = "「そんな……！\u3000学園に来てからずっと主様と呼べる殿方を探し続け、ようやく見つけたと思ったのに……！」"
translation = "「세상에……! 학원에 온 뒤로 줄곧 주군이라 부를 사내를 찾아 헤매다 겨우 찾았다 생각했는데……!」"

[[dialogue]]
speaker = "せつな"
original = "「うぅ……会長殿ぉ、何とか、何とかお試しだけでも、ダメでござるかぁ……？」"
translation = "「으으…… 회장 공, 어떻게든, 어떻게든 시험 삼아서라도 안 되겠소……?」"

[[dialogue]]
speaker = "unk"
original = "まあ、お試しだけなら……"
translation = "뭐, 시험 삼아서라면……"

[[dialogue]]
speaker = "unk"
original = "そ、そんな悲しそうな顔をされると……"
translation = "그, 그렇게 슬픈 표정을 지으면……"

[[dialogue]]
speaker = "せつな"
original = "「本当でござるか！？\u3000やったー！\u3000房中術成功でござるにゃん♪」"
translation = "「정말이오!? 만세! 방중술 성공이오냥♪」"

[[dialogue]]
speaker = "せつな"
original = "「殿方には瞳を潤ませながらの上目遣い！\u3000これも師匠の教えにござりますれば！」"
translation = "「사내에겐 눈을 적시며 올려다보기! 이것도 스승님의 가르침이오!」"

[[dialogue]]
speaker = "unk"
original = "というか、それは房中術なのか！？"
translation = "그보다 그게 방중술인 거야!?"

[[dialogue]]
speaker = "unk"
original = "騙されたぁ――――っ！？"
translation = "속았다──!!?"

[[dialogue]]
speaker = "せつな"
original = "「お試しとはいえ、せつな自身で会長殿にお仕えすると決めた以上、一生を捧げる覚悟で尽くします故、どうかせつなの忠義を見ていて下さいませ」"
translation = "「시험 삼아라곤 해도 세츠나 스스로 회장 공을 모시기로 정한 이상, 평생을 바칠 각오로 다할 것이니 부디 세츠나의 충의를 지켜봐 주시오.」"

[[dialogue]]
speaker = "せつな"
original = "「己が掟を貫きて、耐えて忍ぶが我が忍道――」"
translation = "「자신의 법도를 관철하며 참고 인내하는 것이 나의 닌도──」"

[[dialogue]]
speaker = "せつな"
original = "「このせつな、仮では無く、必ずや認めて頂けるような立派な忍になってみせまする！」"
translation = "「이 세츠나, 임시가 아니라 반드시 인정받을 수 있는 훌륭한 닌자가 되어 보이겠소!」"

[[dialogue]]
speaker = "せつな"
original = "「ですので、どうか末永く、よろしくお願い致しますね、主様♪」"
translation = "「그러니 부디 오래오래 잘 부탁드리오, 주군♪」"

