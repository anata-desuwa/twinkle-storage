[[dialogue]]
speaker = "unk"
original = "第３話,新衣装で遊園地デート♪,P"
translation = "제3화, 새 의상으로 놀이공원 데이트♪, P"

[[dialogue]]
speaker = "unk"
original = "色々あったが、無事に元の世界へと戻ってこれた俺たち。それから少し経った、とある休日。"
translation = "우여곡절 끝에 무사히 원래 세계로 돌아온 우리. 그로부터 얼마 지나지 않은 어느 휴일."

[[dialogue]]
speaker = "unk"
original = "俺はメイプルと２人で、遊園地へとやって来ていた――"
translation = "나는 메이플과 둘이서 놀이공원에 와 있었다――"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「わぁ～♪\u3000ここが遊園地か～♪\u3000人がいっぱいだね！」"
translation = "「와아~♪ 여기가 놀이공원이구나~♪ 사람이 정말 많네!」"

[[dialogue]]
speaker = "unk"
original = "メイプルは魔界出身の為、遊園地は今回が初めてだと言う。以前から「遊園地に行きたい！」とおねだりされたのだ。"
translation = "메이플은 마계 출신이라 놀이공원은 이번이 처음이라고 한다. 이전부터 「놀이공원에 가고 싶어!」라고 졸랐던 것이다."

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「お兄ちゃん、今日は連れて来てくれてありがとう♪\u3000にへへっ。絶叫マシーン、楽しみ～♪」"
translation = "「오빠, 오늘 데려다줘서 고마워♪ 니헤헤. 절규 머신, 기대돼~♪」"

[[dialogue]]
speaker = "unk"
original = "メイプル、今日はその衣装なんだな"
translation = "메이플, 오늘은 그 의상이구나"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「あっ、うん♪\u3000この『クルセイダーフォーム』、可愛くて私服っぽいし、気に入っているんだ～♪」"
translation = "「앗, 응♪ 이 『크루세이더 폼』, 귀엽고 사복 같아서 마음에 들거든~♪」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「ちなみにフォーム名はね～、ナナお姉ちゃんやロロットたちの『流星クルセイダース』から取ってきたんだ♪」"
translation = "「참고로 폼 이름은 나나 언니랑 로롯토 일행의 『유성 크루세이더즈』에서 따왔어♪」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「――そういえばこの前、上着の状態が違ったって？」"
translation = "「――그러고 보니 저번에 겉옷 상태가 달랐다고?」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「それは『軽装モード』だね♪\u3000不思議なんだけど、このフォーム、モード切り替えができるんだよ～。――えいっ♪」"
translation = "「그건 『경장 모드』야♪ 신기하게도 이 폼은 모드 전환이 가능하더라고~. ――에잇♪」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「ほら、こんな感じ♪」"
translation = "「봐봐, 이런 느낌♪」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「ちなみに、お兄ちゃんはどっちの方が好きかな？」"
translation = "「그나저나 오빠는 어느 쪽이 더 좋아?」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「――どっちも可愛い？ にへへ～<emoji=heart04> ありがと♪」"
translation = "「――둘 다 귀여워? 니헤헤~<emoji=heart04> 고마워♪」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「じゃあ、そろそろ絶叫マシーンに乗りに行こっか♪\u3000お兄ちゃん♪」"
translation = "「그럼 슬슬 절규 머신 타러 가볼까♪ 오빠♪」"

[[dialogue]]
speaker = "unk"
original = "そう言って、メイプルは何気なく俺の腕を取り、抱き着いてくる。"
translation = "그렇게 말하며 메이플은 자연스럽게 내 팔을 잡고 달라붙어 온다."

[[dialogue]]
speaker = "unk"
original = "俺は思わずドキッとしてしまい――"
translation = "나는 나도 모르게 두근거리고 말았고――"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「ん？\u3000どうかした？\u3000お兄ちゃん」"
translation = "「응? 왜 그래? 오빠」"

[[dialogue]]
speaker = "unk"
original = "い、いや、なんでもない"
translation = "아, 아니, 아무것도 아니야"

[[dialogue]]
speaker = "unk"
original = "俺は誤魔化して、そのままメイプルと一緒に歩き出すのだった。"
translation = "나는 얼버무리며 그대로 메이플과 함께 걷기 시작했다."

[[dialogue]]
speaker = "unk"
original = "そうして、ジェットコースターに乗ることになって――"
translation = "그렇게 제트 코스터를 타게 되었는데――"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「わあああぁぁぁ～っ！\u3000すごいすごいすご～いっ♪」"
translation = "「와아아아아~! 굉장해 굉장해 굉장해~♪」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「星騎士の力で空を飛ぶのとは違う感覚！\u3000スリルを楽しむ為の乗り物って、こんなに面白いんだ！」"
translation = "「성기사의 힘으로 하늘을 나는 것과는 다른 감각! 스릴을 즐기기 위한 탈것이 이렇게나 재밌다니!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「ふっ……あはははははっ♪\u3000この妹魔王を怖がらせようとは笑止千万！\u3000甘いぞ、ジェットコースター！\u3000もっと恐怖を味合わせてみせるがいい！」"
translation = "「훗…… 아하하하하하♪ 이 여동생 마왕을 겁주려 하다니 가소롭구나! 무르다, 제트 코스터! 더 공포를 맛보게 해보아라!」"

[[dialogue]]
speaker = "unk"
original = "こらっ、あんまりはしゃいでると舌噛むぞ！"
translation = "이봐, 너무 들떠 있으면 혀 깨물어!"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「は～い！\u3000ごめんなさい、お兄ちゃんっ♪」"
translation = "「네~에! 미안해, 오빠♪」"

[[dialogue]]
speaker = "unk"
original = "それから幾つかの絶叫マシーンを楽しんだ後、俺たちはフードコートの席で休憩することになった。"
translation = "그 후 몇 가지 절규 머신을 즐긴 뒤, 우리는 푸드 코트 좌석에서 휴식을 취하기로 했다."

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「ん～！\u3000絶叫マシーン、最高～！」"
translation = "「음~! 절규 머신 최고~!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「ふぅっ♪\u3000やっぱり、人間界ってすごいね！ こんなに楽しい乗り物が存在するなんて！」"
translation = "「후우♪ 역시 인간계는 대단해! 이렇게 즐거운 탈것이 존재하다니!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「星騎士をやってるからこそ、純粋にスリルを楽しめて、気分爽快！\u3000って感じ♪」"
translation = "「성기사를 하고 있으니까 순수하게 스릴을 즐길 수 있어서 기분 상쾌! 라는 느낌♪」"

[[dialogue]]
speaker = "unk"
original = "気に入ったなら何よりだ"
translation = "마음에 들었다니 다행이네"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「うん♪\u3000でも、絶叫マシーンばっかりじゃなくて、デートの方も忘れずに楽しまないとね」"
translation = "「응♪ 하지만 절규 머신만 탈 게 아니라 데이트 쪽도 잊지 말고 즐겨야지」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「というわけで、お兄ちゃん、パフェ食べさせて♪」"
translation = "「그런 의미에서 오빠, 파페 먹여줘♪」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「はい、あ～ん♪」"
translation = "「자, 아~앙♪」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「――あむっ♪\u3000ん～、美味しい～<emoji=heart04>\u3000人間界のスイーツってやっぱりいいよね～♪\u3000お口の中が幸せで、顔がふにゃふにゃになっちゃう<emoji=heart04>」"
translation = "「――아암♪ 음~ 맛있다~<emoji=heart04> 인간계의 디저트는 역시 최고라니까~♪ 입안이 행복해서 얼굴이 흐물흐물해져 버려<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言って、メイプルは俺の腕に再び抱き着いてくる。"
translation = "그렇게 말하며 메이플은 내 팔에 다시 달라붙는다."

[[dialogue]]
speaker = "unk"
original = "そう……メイプルが座っているのはテーブルを挟んだ向かい側ではなく――俺のすぐ隣。肩も腕もくっつくほどの、真隣だった。"
translation = "그랬다…… 메이플이 앉아 있는 곳은 테이블을 사이에 둔 맞은편이 아니라―― 바로 내 옆. 어깨와 팔이 닿을 정도의 정옆이었다."

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「お兄ちゃ～ん、もう１回食べさせて？\u3000あ～ん<emoji=heart04>」"
translation = "「오빠아~ 한 번 더 먹여줘? 아~앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「あむっ。んふふ～♪\u3000甘～い<emoji=heart04>」"
translation = "「아암. 응후후~♪ 달콤해<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そんなぴったりくっ付いた状態で可愛く甘えられては、ドキドキせざるを得ない。"
translation = "그렇게 딱 달라붙은 상태에서 귀엽게 응석을 부리니 두근거리지 않을 수 없다."

[[dialogue]]
speaker = "unk"
original = "だって俺は……もう既に１度、言葉で伝えているくらい、メイプルに恋愛的な意味での好意を抱いているのだから。"
translation = "왜냐하면 나는…… 이미 한 번 말로 전했을 정도로 메이플에게 연애적인 의미의 호감을 품고 있었으니까."

[[dialogue]]
speaker = "unk"
original = "今までになく、積極的じゃないか？"
translation = "여태껏 없던 정도로 적극적이네?"

[[dialogue]]
speaker = "unk"
original = "今日のメイプルはなんか……"
translation = "오늘의 메이플은 왠지……"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「ほぇ？\u3000――ああ、そっか！」"
translation = "「호에? ――아아, 그렇구나!」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「そういえばまだ、そのことをお兄ちゃんに話してなかったね。実は――」"
translation = "「그러고 보니 아직 그 이야기를 오빠한테 안 했었네. 사실은――」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「このクルセイダーフォームになるとね、なんだか不思議と<b>いつもよりお兄ちゃんに甘えたくなる</b>の♪」"
translation = "「이 크루세이더 폼이 되면 왠지 신기하게 <b>평소보다</b> <b>오빠한테</b> <b>응석</b> <b>부리고</b> <b>싶어져</b>♪」"

[[dialogue]]
speaker = "unk"
original = "なにその効果！？"
translation = "뭐야 그 효과!?"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「つまりは、妹力アップ♪\u3000みたいな？\u3000にへへ♪」"
translation = "「그러니까 여동생력 업♪ 같은 거? 니헤헤♪」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「だから今日のデートは、魔王の妹として、いっぱい甘えさせてくれると嬉しいな♪」"
translation = "「그래서 오늘 데이트는 마왕의 여동생으로서 잔뜩 응석 부리게 해주면 기쁠 것 같아♪」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「ねっ、お兄ちゃん<emoji=heart04>」"
translation = "「그치, 오빠<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そんな風に甘い声でおねだりされて、断れるわけがなく。"
translation = "그런 달콤한 목소리로 조르는데 거절할 수 있을 리가 없었다."

[[dialogue]]
speaker = "unk"
original = "俺はその後もドキドキしながら、デートをすることになるのだった――"
translation = "나는 그 후로도 두근거리며 데이트를 계속하게 되었다――"

