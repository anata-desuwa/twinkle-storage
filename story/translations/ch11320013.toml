[[dialogue]]
speaker = "unk"
original = "第３話,制圧天使,P"
translation = "제3화, 제압천사, P"

[[dialogue]]
speaker = "unk"
original = "街中を歩いていると、ケイティさんの姿を見つけた。"
translation = "거리 안을 걷다 보니 케이티 씨의 모습을 발견했다."

[[dialogue]]
speaker = "unk"
original = "小さな雑貨屋の店先で、そこの店員らしき女性と話をしている。"
translation = "작은 잡화점 앞에서 그곳 점원인 듯한 여성과 이야기를 나누고 있다."

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「あらあら、こちらのティーセットもすごく可愛いですね～」"
translation = "「어머어머, 이 티 세트도 무척 귀엽네요~」"

[[dialogue]]
speaker_original = "女性店員"
speaker_translation = "여성 점원"
original = "「いいわよね～。今人気だから品薄なの。上品な雰囲気がケイティさんにピッタリだと思うし、オススメよ～」"
translation = "「좋지요~. 지금 인기라서 재고가 적답니다. 우아한 분위기가 케이티 씨에게 딱 어울린다고 생각해서 추천해요~」"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「うふふ、そうですか～？\u3000ありがとうございます。それじゃこちらを頂いていいですか～？」"
translation = "「우후후, 그런가요~? 감사합니다. 그럼 이걸로 주시겠어요~?」"

[[dialogue]]
speaker_original = "女性店員"
speaker_translation = "여성 점원"
original = "「ありがとう。それじゃすぐに包んでくるわね」"
translation = "「고마워요. 그럼 바로 포장해 올게요.」"

[[dialogue]]
speaker = "unk"
original = "今日はお休みですか？"
translation = "오늘은 쉬는 날인가요?"

[[dialogue]]
speaker = "unk"
original = "こんにちは"
translation = "안녕하세요"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「あら、魔王さん。こんにちは」"
translation = "「어머, 마왕님. 안녕하세요.」"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「ええ、今日は非番の日なんです。だから、せっかく人間界に来ているのですし、以前からやってみたかった雑貨屋巡りを満喫しているんですよ～」"
translation = "「네, 오늘은 비번인 날이랍니다. 그래서 기왕 인간계에 와 있는 것이니 예전부터 해보고 싶었던 잡화점 투어를 만끽하고 있는 중이에요~.」"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「人間界の雑貨は種類も豊富だし、可愛いものが多いからいいですね～。眺めているだけでも楽しい気分になれます」"
translation = "「인간계의 잡화는 종류도 풍부하고 귀여운 게 많아서 좋네요~. 바라보고 있는 것만으로도 즐거운 기분이 돼요.」"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「天界にもこういったお店はあるのですが、やはりこういったものは人間界が一番充実しているのだとはっきり分かりました～」"
translation = "「천계에도 이런 가게는 있습니다만 역시 이런 종류는 인간계가 가장 충실하다는 걸 확실히 알았답니다~」"

[[dialogue]]
speaker = "unk"
original = "お茶会の道具狙いですか？"
translation = "다도회 도구를 노리시는 건가요?"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「そうですね。でも私、それ以外でも可愛い小物なら何でも好きなので……」"
translation = "「그렇네요. 하지만 저, 그 외에도 귀여운 소품이라면 뭐든지 좋아해서……」"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「あっ、このコースターも可愛いです♪\u3000あっちの写真立ても……どれもこれも欲しくなっちゃいます～♪」"
translation = "「앗, 이 코스터도 귀여워요♪ 저기 있는 액자도…… 이것도 저것도 다 갖고 싶어지네요~♪」"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「この音は？」"
translation = "「이 소리는?」"

[[dialogue]]
speaker = "unk"
original = "近くにアステラが出現しました"
translation = "근처에 아스텔라가 출현했습니다"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「まあ、それは大変です。はやく皆さんを安全なところへ避難させないと～」"
translation = "「어머, 그거 큰일이네요. 얼른 여러분을 안전한 곳으로 피난시켜야~」"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「店員さん、ここは私に任せて逃げてください」"
translation = "「점원 분, 여기는 저에게 맡기고 도망치세요.」"

[[dialogue]]
speaker_original = "女性店員"
speaker_translation = "여성 점원"
original = "「あ、ありがとうございます──あっ！」"
translation = "「가, 감사합니다── 앗!」"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「イーーーーーーーーッ！！！！」"
translation = "「이이이이이이이익!!!!」"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「モンスターさーん！\u3000ここで暴れるのはやめてください、争いは何も生みませんよ～！」"
translation = "「몬스터 씨! 여기서 난폭하게 구는 건 멈춰 주세요, 다툼은 아무것도 낳지 않는답니다~!」"

[[dialogue]]
speaker = "unk"
original = "モンスターを説得！？"
translation = "몬스터를 설득!?"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「イーーーーーーーーッ！！！！」"
translation = "「이이이이이이이익!!!!」"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「危ない！」"
translation = "「위험해!」"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「大丈夫ですか店員さん、お怪我はありませんか？」"
translation = "「괜찮으신가요 점원 분, 다치신 곳은 없나요?」"

[[dialogue]]
speaker_original = "女性店員"
speaker_translation = "여성 점원"
original = "「は、はい……おかげさまで。ですが……」"
translation = "「네, 네…… 덕분에요. 하지만……」"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「あっ……」"
translation = "「앗……」"

[[dialogue]]
speaker = "unk"
original = "モンスターの攻撃から店員さんをかばった時に、買ったばかりのティーセットが路面に落ちて粉々に砕けてしまっていた。"
translation = "몬스터의 공격으로부터 점원을 감싸느라 방금 산 티 세트가 길바닥에 떨어져 산산조각이 나 있었다."

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "あの、ケイティさん、どうか冷静に"
translation = "저기, 케이티 씨, 부디 냉정하게"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「ええ、もちろんです。私は平和主義ですから」"
translation = "「네, 물론이죠. 저는 평화주의자니까요.」"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「けれど、モンスターさんは私の忠告にも関わらず暴れ続けています」"
translation = "「하지만 몬스터 씨는 저의 충고에도 불구하고 계속 난폭하게 굴고 있어요.」"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「……で、あれば……平和のために戦うしかありませんね」"
translation = "「……그렇다면…… 평화를 위해 싸울 수밖에 없겠네요.」"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「では、参ります……平和の重みを思い知りなさーーいっ！！！」"
translation = "「그럼, 가겠습니다…… 평화의 무게를 뼈저리게 느끼도록 하세욧!!!」"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「アステラも消滅しましたし、もう安心ですね。街の平和を取り戻せて何よりです～」"
translation = "「아스텔라도 소멸했고 이제 안심이네요. 거리의 평화를 되찾아서 무엇보다 다행이에요~」"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「店員さんもお怪我はありませんか？」"
translation = "「점원 분도 다친 곳은 없으신가요?」"

[[dialogue]]
speaker_original = "女性店員"
speaker_translation = "여성 점원"
original = "「は、はい……」"
translation = "「네, 네……」"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「もう震えなくても大丈夫です、モンスターは私たちが倒しましたから～」"
translation = "「이제 떨지 않아도 괜찮아요, 몬스터는 저희가 쓰러뜨렸으니까요~」"

[[dialogue]]
speaker_original = "女性店員"
speaker_translation = "여성 점원"
original = "「ありがとう……ございます……」"
translation = "「고맙……습니다……」"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「ですが申し訳ないことになってしまいました～。せっかくお薦めしてもらったティーセットが……」"
translation = "「하지만 죄송하게 되어버렸네요~. 귀하게 추천해 주신 티 세트가……」"

[[dialogue]]
speaker_original = "女性店員"
speaker_translation = "여성 점원"
original = "「それでしたら！\u3000こちらをお持ちください！\u3000お代は要りませんので！」"
translation = "「그거라면! 이걸 가져가세요! 돈은 필요 없으니까요!」"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「まあ、こちらも可愛いティーセット♪」"
translation = "「어머, 이쪽도 귀여운 티 세트네요♪」"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「ですがそれは申し訳ありません。お代はきちんとお支払いいたしますから……」"
translation = "「하지만 그건 면목 없네요. 값은 제대로 치를 테니까……」"

[[dialogue]]
speaker_original = "女性店員"
speaker_translation = "여성 점원"
original = "「いいえ、命を助けて頂いたのですから！\u3000そんなことはおっしゃらず！\u3000命だけはっ！」"
translation = "「아니요, 목숨을 구해주셨는데! 그런 말씀 마시고! 목숨만은!」"

[[dialogue]]
speaker_original = "ケイティ"
speaker_translation = "케이티"
original = "「そう、ですか……ではありがたく頂いておきますね～♪」"
translation = "「그, 그런가요…… 그럼 감사히 받도록 할게요~♪」"

[[dialogue]]
speaker = "unk"
original = "嬉しそうに新しいティーセットを受け取るケイティさん。"
translation = "기쁜 듯이 새로운 티 세트를 받는 케이티 씨."

[[dialogue]]
speaker = "unk"
original = "けど、おそらく……店員さんが怯えていたのはモンスターじゃなくてケイティさんではないかと思う。"
translation = "하지만 아마도…… 점원이 겁에 질렸던 건 몬스터가 아니라 케이티 씨가 아닐까 싶다."

[[dialogue]]
speaker = "unk"
original = "何しろあの大剣をぶん回して、モンスターたちを完膚なきまでに叩き潰して回る光景を目の当たりにしたのだから。"
translation = "그도 그럴 것이 그 대검을 휘둘러 몬스터들을 완벽하게 짓뭉개버리는 광경을 목격했으니까."

