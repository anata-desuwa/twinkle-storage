[[dialogue]]
speaker = "unk"
original = "それから、クリスマスプレゼントを配るサンタ大作戦は、順調に進んでいた。"
translation = "그 후로 크리스마스 선물을 나눠주는 산타 대작전은 순조롭게 진행되었다."

[[dialogue]]
speaker = "unk"
original = "知り合いの多い紅明と俺が事前に相談して、各生徒たちの喜ぶものをリサーチし、プレゼントを決めて渡していく形だ。"
translation = "지인이 많은 코우메이와 내가 사전에 상의해서 각 학생들이 기뻐할 만한 것을 리서치하고 선물을 정해서 건네주는 방식이다."

[[dialogue]]
speaker = "セシア"
original = "「――はい、メリークリスマス。あなたにクリスマスプレゼントのお届けものよ」"
translation = "「――네, 메리 크리스마스. 당신에게 크리스마스 선물을 배달해 왔어요」"

[[dialogue]]
speaker = "女生徒Ｃ"
original = "「まぁ♪\u3000ありがとう！\u3000セシアちゃんっていったかしら？\u3000その制服、附属校のよね？」"
translation = "「어머♪ 고마워! 세시아 짱이라고 했나? 그 교복, 부속 학교 거지?」"

[[dialogue]]
speaker = "セシア"
original = "「ええ。今度、見学に行く予定なの」"
translation = "「네. 이번에 견학 갈 예정이에요」"

[[dialogue]]
speaker = "女生徒Ｃ"
original = "「そうなのね。私、附属校の３年生だから、わからないことがあったら遠慮なく聞きにきてね」"
translation = "「그렇구나. 나 부속 학교 3학년이니까 모르는 거 있으면 사양 말고 물어보러 오렴」"

[[dialogue]]
speaker = "セシア"
original = "「じ～っ……」"
translation = "「빤히……」"

[[dialogue]]
speaker = "女生徒Ｃ"
original = "「セシアちゃん？\u3000私の顔をじっと見て……どうかした？」"
translation = "「세시아 짱? 내 얼굴을 그렇게 빤히 보고…… 무슨 일 있니?」"

[[dialogue]]
speaker = "セシア"
original = "「――ううん。あなたは優しい人なのね。附属校に行くのが楽しみになったわ」"
translation = "「――으응. 당신은 다정한 사람이구나. 부속 학교에 가는 게 기대되기 시작했어」"

[[dialogue]]
speaker = "女生徒Ｃ"
original = "「ふふっ、セシアちゃんなら大歓迎よ。待ってるわね♪」"
translation = "「후훗, 세시아 짱이라면 대환영이야. 기다릴게♪」"

[[dialogue]]
speaker = "セシア"
original = "「これで一旦、用意していたプレゼントは配り終わったわ」"
translation = "「이걸로 일단 준비한 선물은 다 나눠줬어」"

[[dialogue]]
speaker = "unk"
original = "みんな喜んでくれて、よかったね"
translation = "다들 기뻐해 줘서 다행이네"

[[dialogue]]
speaker = "セシア"
original = "「ええ。それだけじゃなく、優しくしてくれて……中には面白い人もいるけど、会長の紹介してくれる人はみんな、心の温かい人だわ」"
translation = "「네. 그뿐만 아니라 다정하게 대해줘서…… 그중엔 재밌는 사람도 있었지만, 회장님이 소개해 주는 사람은 모두 마음이 따뜻한 사람이에요」"

[[dialogue]]
speaker = "セシア"
original = "「それと、会長。あなたも含めてね」"
translation = "「그리고 회장님, 당신을 포함해서 말이죠」"

[[dialogue]]
speaker = "セシア"
original = "「沢山の人を紹介して貰ったけど、あなたは嫌な顔１つせず、わたくしのことを繰り返し丁寧に説明してくれた」"
translation = "「많은 사람을 소개받았지만 당신은 싫은 내색 하나 없이 저에 대해 반복해서 정중하게 설명해 줬어요」"

[[dialogue]]
speaker = "セシア"
original = "「あなたはわたくしのママではないと感じるけれど、ヴィーナスが力説する通り、素敵な人ね」"
translation = "「당신은 저의 마마가 아니라고 느끼지만, 비너스가 역설한 대로 멋진 사람이네요」"

[[dialogue]]
speaker = "セシア"
original = "「ありがとう、会長。わたくし、あなたのことがもっと知りたくなったわ」"
translation = "「고마워요, 회장님. 저 당신에 대해 더 알고 싶어졌어요」"

[[dialogue]]
speaker = "unk"
original = "どういたしまして"
translation = "천만에요"

[[dialogue]]
speaker = "セシア"
original = "「ふふっ、後でＤＩＳＣの連絡先を交換しましょう」"
translation = "「후훗, 나중에 DISC 연락처 교환해요」"

[[dialogue]]
speaker = "紅明"
original = "「セッシ～、ダーリン～！」"
translation = "「세시~, 달링~!」"

[[dialogue]]
speaker = "セシア"
original = "「あっ、紅明ママだわ♪\u3000ママ～♪」"
translation = "「앗, 코우메이 마마야♪ 마마~♪」"

[[dialogue]]
speaker = "紅明"
original = "「アタシとヨミヨミの方は、プレゼント配り終わったよ☆\u3000そっちはどう？\u3000って、ありゃ？」"
translation = "「나랑 요미요미 쪽은 선물 배달 끝났어☆ 그쪽은 어때? 어라?」"

[[dialogue]]
speaker = "ヨミ"
original = "「セシアちゃん、いい笑顔してますけど、なにかありました？」"
translation = "「세시아 짱, 좋은 표정을 짓고 있는데 무슨 일 있었나요?」"

[[dialogue]]
speaker = "セシア"
original = "「ええ。わたくし、会長と少し仲良くなったのよ」"
translation = "「네. 저 회장님과 조금 사이가 좋아졌어요」"

[[dialogue]]
speaker = "紅明"
original = "「おっ♪\u3000いいじゃ～ん！\u3000セッシーもヴィナちーやヨミヨミと同じで、アタシの恋敵に仲間入りか～☆\u3000こいつは強敵だな～」"
translation = "「오♪ 좋은데! 세시도 비나치나 요미요미랑 똑같이 내 연적 대열에 합류한 건가~☆ 이거 강적이네~」"

[[dialogue]]
speaker = "ヨミ"
original = "「ちょっ、なんか私も入ってます！？\u3000わ、私は別にそういうのじゃ……！」"
translation = "「잠깐, 왠지 저도 들어있는데요!? 저, 저는 딱히 그런 게……!」"

[[dialogue]]
speaker = "セシア"
original = "「会長に衣装を褒められた時、あんなに嬉しそうだったのに？」"
translation = "「회장님에게 의상을 칭찬받았을 때 그렇게 기뻐 보였는데?」"

[[dialogue]]
speaker = "ヨミ"
original = "「こやっ！？\u3000違います！\u3000あれはその、違いますからっ！」"
translation = "「코야!? 아니에요! 그건 그, 아니니까요!」"

[[dialogue]]
speaker = "紅明"
original = "「あはははっ☆\u3000んモ～、ヨミヨミってば可愛いなぁ♪」"
translation = "「아하하하☆ 음메~ 요미요미도 참 귀엽다니까♪」"

[[dialogue]]
speaker = "unk"
original = "そういえばセシア、記憶の方はどう？"
translation = "그러고 보니 세시아, 기억 쪽은 어때?"

[[dialogue]]
speaker = "セシア"
original = "「プレゼントを配りながら、みんなの喜びを分けてもらって。それがわたくしの中に蓄積されて、どんどん力が湧いてくるのを感じるわ」"
translation = "「선물을 나눠주면서 모두의 기쁨을 나눠 받았어요. 그것이 제 안에 축적되어 점점 힘이 솟아나는 걸 느껴요」"

[[dialogue]]
speaker = "セシア"
original = "「でも、記憶はまだ思い出せないの。残念だけど……」"
translation = "「하지만 기억은 아직 떠오르지 않아요. 아쉽지만……」"

[[dialogue]]
speaker = "ヨミ"
original = "「そうですか……」"
translation = "「그렇군요……」"

[[dialogue]]
speaker = "紅明"
original = "「ふ～む……」"
translation = "「흐음……」"

[[dialogue]]
speaker = "紅明"
original = "「ならもっと、みんなに喜んでもらえるように、サンタらしい方法でプレゼントを配ってみるっしょ♪」"
translation = "「그럼 더 모두가 기뻐할 수 있도록 산타다운 방법으로 선물을 나눠보자구♪」"

[[dialogue]]
speaker = "セシア"
original = "「サンタらしい方法……？」"
translation = "「산타다운 방법……?」"

[[dialogue]]
speaker = "紅明"
original = "「古事記のサンタ曰く、プレゼントはクリスマスの夜、枕元に置かれてた方が、子供たちに喜ばれるんだぜ☆\u3000ってことで――」"
translation = "「고사기의 산타 가라사대, 선물은 크리스마스 밤 머리맡에 놓여 있는 편이 아이들이 더 기뻐한다구☆ 그런 고로――」"

[[dialogue]]
speaker = "紅明"
original = "「みんなが寝静まった丑三つ時、我が新星学園の学生寮――『ラルーナ』に、こっそり忍び込もうじゃないか！」"
translation = "「모두가 잠든 한밤중인 인시, 우리 신성학원의 학생 기숙사―― 『라루나』에 몰래 잠입하자구!」"

[[dialogue]]
speaker = "ヨミ"
original = "「こやっ！？\u3000いやいやいや、紅明先輩、なに言ってるんですか！？」"
translation = "「코야!? 아니아니아니, 코우메이 선배, 무슨 말씀을 하시는 거예요!?」"

[[dialogue]]
speaker = "unk"
original = "寮に無断で侵入なんてしたら……！"
translation = "기숙사에 무단으로 침입했다간……!"

[[dialogue]]
speaker = "ヨミ"
original = "「マムに殺されますよ！？」"
translation = "「마무님한테 죽는다구요!?」"

[[dialogue]]
speaker = "セシア"
original = "「マム？\u3000ヨミヨミのママってこと？」"
translation = "「마무? 요미요미의 마마라는 뜻이야?」"

[[dialogue]]
speaker = "ヨミ"
original = "「いえ、マムっていうのは、新星寮の寮長を務めている人で……新星学園３年生の、妃竜院マハムートという先輩です」"
translation = "「아뇨, 마무라는 건 신성료의 기숙사장을 맡고 있는 사람으로…… 신성학원 3학년인 키류인 마하무트라는 선배예요」"

[[dialogue]]
speaker = "ヨミ"
original = "「その高いカリスマ性から、寮母のように慕われているのですが、一方で怒らすと爆裂恐ろしいというか……」"
translation = "「그 높은 카리스마 덕분에 사감 선생님처럼 존경받고 있지만, 한편으론 화나게 하면 폭렬 무섭다고 할까……」"

[[dialogue]]
speaker = "unk"
original = "（前に怒らせた時のことを思い出して震える）"
translation = "（예전에 화나게 했을 때를 떠올리며 떤다）"

[[dialogue]]
speaker = "unk"
original = "ガクガクブルブル……"
translation = "덜덜덜덜……"

[[dialogue]]
speaker = "セシア"
original = "「寮母……！\u3000セシア、それはとても興味があるわ♪」"
translation = "「사감……! 세시아, 그건 아주 흥미가 생겨요♪」"

[[dialogue]]
speaker = "ヨミ"
original = "「いやいやいや！\u3000だからって、忍び込むのはダメですからね！？\u3000絶対に！！！」"
translation = "「아니아니아니! 그렇다고 잠입하는 건 안 된다니까요!? 절대로!!!」"

[[dialogue]]
speaker = "unk"
original = "そうして、時刻は深夜。新星寮の前にて――"
translation = "그렇게 시각은 심야. 신성료 앞에서――"

[[dialogue]]
speaker = "ヨミ"
original = "「結局、押し切られてしまいました……」"
translation = "「결국 떠밀려 오고 말았네요……」"

[[dialogue]]
speaker = "紅明"
original = "「と言いつつ、なんだかんだ付いてきてくれてありがとね。ヨミヨミ、ダーリン♪」"
translation = "「그렇게 말하면서도 이런저런 핑계로 따라와 줘서 고마워. 요미요미, 달링♪」"

[[dialogue]]
speaker = "ヨミ"
original = "「だって、心配じゃないですか……セシアちゃんも付いて行く気満々でしたし……」"
translation = "「그치만 걱정되잖아요…… 세시아 짱도 따라올 기세가 가득했고……」"

[[dialogue]]
speaker = "セシア"
original = "「マムに会うの、楽しみだわ。わくわく……♪」"
translation = "「마무를 만나는 거 기대돼요. 두근두근……♪」"

[[dialogue]]
speaker = "unk"
original = "会ったらダメなんだって！"
translation = "만나면 안 된다니까!"

[[dialogue]]
speaker = "紅明"
original = "「まぁ、バレなきゃ大丈夫っしょ☆\u3000うん……マムにバレさえしなければ……」"
translation = "「뭐, 안 들키면 괜찮다구☆ 응…… 마무한테 들키지만 않으면……」"

[[dialogue]]
speaker = "ヨミ"
original = "「言いながらちょっと震えてるじゃないですか！？\u3000今からでも中止にしましょうよ！」"
translation = "「말하면서 좀 떨고 있지 않나요!? 지금이라도 중단하자구요!」"

[[dialogue]]
speaker = "unk"
original = "（紅明でもマムは怖いんだな……）"
translation = "（코우메이라도 마무는 무섭구나……）"

[[dialogue]]
speaker = "紅明"
original = "「いや、ここで退いたら、サンタの名が廃るぜ！\u3000アタシはこの潜入ミッションをやり遂げてみせる！」"
translation = "「아니, 여기서 물러나면 산타의 이름이 아깝다구! 난 이 잠입 미션을 완수해 보이겠어!」"

[[dialogue]]
speaker = "紅明"
original = "「サンタの袋から出でよ、プレゼント！\u3000箱をオープン！\u3000新星寮の鍵を召喚！」"
translation = "「산타 보따리에서 나오너라, 선물! 상자 오픈! 신성료 열쇠를 소환!」"

[[dialogue]]
speaker = "ヨミ"
original = "「サンタの袋、そんなものまで生み出せるんですか！？\u3000爆裂物騒なんですけど！」"
translation = "「산타 보따리, 그런 것까지 만들어낼 수 있는 건가요!? 폭렬 위험한데요!」"

[[dialogue]]
speaker = "紅明"
original = "「さあ、皆の衆、ここからが本当のサンタ大作戦の始まりだぜ……！」"
translation = "「자, 여러분, 여기서부터가 진짜 산타 대작전의 시작이라구……!」"

[[dialogue]]
speaker = "unk"
original = "新星寮の玄関扉が開き、俺たちは潜入ミッションを開始するのだった――"
translation = "신성료의 현관문이 열리고 우리들은 잠입 미션을 개시하는 것이었다――"

