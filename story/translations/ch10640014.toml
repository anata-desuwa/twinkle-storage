[[dialogue]]
speaker = "unk"
original = "第４話,呪いと罪,P"
translation = "제4화, 저주와 죄, P"

[[dialogue]]
speaker = "unk"
original = "現場に駆けつけると、またマリーベルが１人でモンスターの大群と戦っていた。"
translation = "현장으로 달려가니, 또 마리벨이 혼자서 몬스터 대군과 싸우고 있었다."

[[dialogue]]
speaker_original = "マリーベル"
speaker_translation = "메리벨"
original = "「遅かったわね。当てにはしてないけど、前みたいにふらふらじゃないだけマシかしら」"
translation = "「늦었네. 기대는 안 했지만, 전처럼 비틀거리지 않는 것만으로도 다행이라고 해야 할까.」"

[[dialogue]]
speaker_original = "マリーベル"
speaker_translation = "메리벨"
original = "「無茶な戦い方とかあなたに言われたくないわ。言ったでしょう、私はモンスターを殺すだけ」"
translation = "「무모한 싸움 방식이라니 당신에게 듣고 싶지 않아. 말했잖아, 나는 몬스터를 죽일 뿐이야.」"

[[dialogue]]
speaker_original = "マリーベル"
speaker_translation = "메리벨"
original = "「……ああ、プリマステラじゃない星騎士は勝手に戦ったらいけないんだったっけ」"
translation = "「……아아, 프리마스텔라가 아닌 성기사는 마음대로 싸우면 안 된다고 했던가.」"

[[dialogue]]
speaker_original = "マリーベル"
speaker_translation = "메리벨"
original = "「こっちはそういう制度だったわね。星騎士はモンスターと戦うためにいるのに、変な仕組みだわ」"
translation = "「이쪽은 그런 제도였지. 성기사는 몬스터와 싸우기 위해 있는데, 이상한 시스템이야.」"

[[dialogue]]
speaker = "unk"
original = "これ以上無茶するなら退学させることもできる"
translation = "이 이상 무리한다면 퇴학시킬 수도 있어."

[[dialogue]]
speaker_original = "マリーベル"
speaker_translation = "메리벨"
original = "「星徒会長の強権ってやつ？\u3000そういえばそんなのもあったわね。つくづく変な学園だわ」"
translation = "「성도회장의 강권이라는 거? 그러고 보니 그런 것도 있었지. 정말이지 이상한 학원이야.」"

[[dialogue]]
speaker_original = "マリーベル"
speaker_translation = "메리벨"
original = "「でも関係ない。たとえセレスティアを失っても私はモンスターと戦う。それが私の贖罪」"
translation = "「하지만 상관없어. 설령 셀레스티아를 잃더라도 나는 몬스터와 싸워. 그것이 나의 속죄.」"

[[dialogue]]
speaker_original = "マリーベル"
speaker_translation = "메리벨"
original = "「あの子は私が傷つけた。だからあの子の分までモンスターを狩って、狩り尽くして、根絶やしにして……」"
translation = "「그 아이는 내가 상처 입혔어. 그러니까 그 아이 몫까지 몬스터를 사냥하고, 사냥해서, 씨를 말려 버릴 거야……」"

[[dialogue]]
speaker_original = "マリーベル"
speaker_translation = "메리벨"
original = "「大きいわね。ふてぶてしくて嫌いだわ」"
translation = "「거대하네. 뻔뻔해서 싫어.」"

[[dialogue]]
speaker_original = "マリーベル"
speaker_translation = "메리벨"
original = "「また串刺しにしてあげる。ブラッディエクス──」"
translation = "「또 꼬챙이로 만들어 줄게. 블러디 엑스──」"

[[dialogue]]
speaker_original = "マリーベル"
speaker_translation = "메리벨"
original = "「──ッ！\u3000星力が暴走しかけて……首輪が……」"
translation = "「──윽! 성력이 폭주하려고 해서…… 목걸이가……」"

[[dialogue]]
speaker_original = "マリーベル"
speaker_translation = "메리벨"
original = "「く……はぁ……発作みたいなものだから、放っておいて……それより早くモンスターを……」"
translation = "「큭…… 하아…… 발작 같은 거니까, 내버려 둬…… 그보다 빨리 몬스터를……」"

[[dialogue]]
speaker_original = "マリーベル"
speaker_translation = "메리벨"
original = "「今ので最後……みたいね。助けられたから一応礼は言っておくわ」"
translation = "「방금 게 마지막……인가 보네. 도움을 받았으니 일단 고맙다고는 해 두지.」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「２人とも大丈夫？\u3000あ、マリーベルちゃん怪我してるじゃない。治してあげるね」"
translation = "「둘 다 괜찮아? 아, 마리벨 짱 상처 입었잖아. 고쳐 줄게.」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「ウィステリアさんが呼んでたよ、マリーベルちゃん。会長くんもついでに来てもらおうかな」"
translation = "「위스테리아 씨가 불렀어, 마리벨 짱. 회장 군도 겸사겸사 같이 가 줄래?」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「まったく、また無茶したのね。会長くんがいるなら任せておけばいいのに」"
translation = "「정말이지, 또 무리했구나. 회장 군이 있다면 맡겨두면 좋을 텐데.」"

[[dialogue]]
speaker_original = "マリーベル"
speaker_translation = "메리벨"
original = "「関係ないわ、私がこの手でやらなきゃいけないの。だって私は罪人なんだから──」"
translation = "「상관없어, 내 손으로 직접 해야만 해. 왜냐하면 나는 죄인이니까──」"

[[dialogue]]
speaker = "unk"
original = "マリーベルの罪って？"
translation = "마리벨의 죄란 게 뭐야?"

[[dialogue]]
speaker_original = "マリーベル"
speaker_translation = "메리벨"
original = "「彼女を傷つけたことよ」"
translation = "「그녀를 상처 입힌 거야.」"

[[dialogue]]
speaker_original = "マリーベル"
speaker_translation = "메리벨"
original = "「星騎士に助けられたっていうありふれた理由で、私は流星学園のイギリス分校に入った。彼女とはそこで友達になった」"
translation = "「성기사에게 구원받았다는 흔한 이유로, 나는 유성학원의 영국 분교에 들어갔어. 그녀와는 거기서 친구가 됐지.」"

[[dialogue]]
speaker_original = "マリーベル"
speaker_translation = "메리벨"
original = "「不器用で、怖がりだったけど、いつも誰かを守ろうとする、優しい女の子だった」"
translation = "「서투르고, 겁이 많았지만, 언제나 누군가를 지키려 하던 착한 여자아이였어.」"

[[dialogue]]
speaker_original = "マリーベル"
speaker_translation = "메리벨"
original = "「イギリスでモンスターが大量に現れた時、私は彼女と一緒に戦った」"
translation = "「영국에서 몬스터가 대량으로 나타났을 때, 나는 그녀와 함께 싸웠어.」"

[[dialogue]]
speaker_original = "マリーベル"
speaker_translation = "메리벨"
original = "「モンスターが彼女に迫った時、私はとっさに星術を放った。彼女を守ろうと無我夢中だった」"
translation = "「몬스터가 그녀에게 다가왔을 때, 나는 급히 성술을 발사했어. 그녀를 지키려고 정신이 없었지.」"

[[dialogue]]
speaker_original = "マリーベル"
speaker_translation = "메리벨"
original = "「だけど私は星力の制御が利かなくて──彼女は深い傷を負った。一命は取り留めたけど、二度と戦えない体になった」"
translation = "「하지만 나는 성력 제어가 되지 않아서── 그녀는 깊은 상처를 입었어. 목숨은 건졌지만, 두 번 다시 싸울 수 없는 몸이 됐지.」"

[[dialogue]]
speaker_original = "マリーベル"
speaker_translation = "메리벨"
original = "「それが『ブラッディ・マリー』と呼ばれるようになった理由。私の罪」"
translation = "「그게 『블러디 메리』라고 불리게 된 이유. 나의 죄.」"

[[dialogue]]
speaker_original = "マリーベル"
speaker_translation = "메리벨"
original = "「戦えなくなったあの子の分まで私は戦う。世界を守ろうとしていたあの子の代わりに、モンスターもアステラもリクリエも全部滅ぼす」"
translation = "「싸울 수 없게 된 그 아이 몫까지 나는 싸울 거야. 세계를 지키려 했던 그 아이를 대신해서, 몬스터도 아스텔라도 리크리에도 전부 멸망시킬 거야.」"

[[dialogue]]
speaker_original = "マリーベル"
speaker_translation = "메리벨"
original = "「それが私の贖罪。せめてもの罪滅ぼし」"
translation = "「그것이 나의 속죄. 최소한의 죄풀이.」"

[[dialogue]]
speaker_original = "マリーベル"
speaker_translation = "메리벨"
original = "「私は災いをもたらす存在だから。会長さんももう私に関わらない方がいいわ」"
translation = "「나는 재앙을 가져오는 존재니까. 회장님도 이제 나랑 엮이지 않는 게 좋아.」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「とはいえ、強すぎる星力を放っておくわけにはいかないから、私とトワちゃん先生が協力してるってわけ」"
translation = "「그렇다고는 해도, 너무 강한 성력을 내버려 둘 수는 없으니까, 나랑 토와 짱 선생님이 협력하고 있다는 거야.」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「星力の強さは人それぞれだけど、強すぎて暴走する星力なんて、ちょっと異常だからね」"
translation = "「성력의 강도는 사람마다 다르지만, 너무 강해서 폭주하는 성력이라니, 좀 이상하니까 말이야.」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「マリーベルさんがいつも付けてるあの首輪。あれは私とトワちゃん先生で作ったんだけど……」"
translation = "「마리벨 씨가 항상 차고 있는 저 목걸이. 저건 나랑 토와 짱 선생님이 만든 건데……」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「制御できないほど強い星力が出そうになると呪いが発動して、首輪が絞まって星力にリミッターをかけるようになっているの」"
translation = "「제어할 수 없을 정도로 강한 성력이 나오려고 하면 저주가 발동해서, 목걸이가 조여지며 성력에 리미터를 걸게 되어 있어.」"

[[dialogue]]
speaker_original = "マリーベル"
speaker_translation = "메리벨"
original = "「──ッ！\u3000星力が暴走しかけて……首輪が……」"
translation = "「──윽! 성력이 폭주하려고 해서…… 목걸이가……」"

[[dialogue]]
speaker_original = "マリーベル"
speaker_translation = "메리벨"
original = "「く……はぁ……発作みたいなものだから、放っておいて……それより早くモンスターを……」"
translation = "「큭…… 하아…… 발작 같은 거니까, 내버려 둬…… 그보다 빨리 몬스터를……」"

[[dialogue]]
speaker_original = "マリーベル"
speaker_translation = "메리벨"
original = "「首輪を作ってくれたのは感謝してるけど、必要以上に近づかないで。私は不幸を呼ぶ『ブラッディ・マリー』なのよ」"
translation = "「목걸이를 만들어 준 건 감사하지만, 필요 이상으로 다가오지 마. 나는 불행을 부르는 『블러디 메리』라고.」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「私はもう不幸だから効かないわよそんなの」"
translation = "「난 이미 충분히 불행해서 그런 거 안 통하거든.」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「本当にマリーベルちゃんが不幸を引き起こすなら、その“不幸”を研究するのが、星体力学の専門家のわたしの仕事だからね」"
translation = "「정말로 마리벨 짱이 불행을 일으킨다면, 그 “불행”을 연구하는 게 성체역학 전문가인 나의 업무니까.」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「マリーベルちゃんの守護星はさそり座λ星シャウラ。それは間違いないんだけど、なんか時々数値がブレるんだよね」"
translation = "「마리벨 짱의 수호성은 전갈자리 λ성 샤울라. 그건 확실한데, 가끔 수치가 흔들린단 말이지.」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「それにマリーベルちゃんから懐かしい気配がする……う～ん、気のせいかなー？」"
translation = "「게다가 마리벨 짱에게서 그리운 기운이 느껴져…… 으음, 기분 탓인가─?」"

[[dialogue]]
speaker = "unk"
original = "でもマリーベルは友達を守ろうとして……"
translation = "하지만 마리벨은 친구를 지키려고……"

[[dialogue]]
speaker_original = "マリーベル"
speaker_translation = "메리벨"
original = "「あなたはきっとお人好しなのね。優しい人。それは認める」"
translation = "「당신은 분명 참견쟁이인 거네. 다정한 사람. 그건 인정할게.」"

[[dialogue]]
speaker_original = "マリーベル"
speaker_translation = "메리벨"
original = "「だから私のためを思うなら邪魔しないで。お願いだから」"
translation = "「그러니까 나를 생각한다면 방해하지 마. 부탁이니까.」"

[[dialogue]]
speaker = "unk"
original = "……わかった"
translation = "……알았어"

[[dialogue]]
speaker_original = "マリーベル"
speaker_translation = "메리벨"
original = "「ええ。助かるわ」"
translation = "「응. 고마워.」"

[[dialogue]]
speaker = "unk"
original = "だけどマリーベルの贖罪を見届ける"
translation = "하지만 마리벨의 속죄를 끝까지 지켜보겠어"

[[dialogue]]
speaker_original = "マリーベル"
speaker_translation = "메리벨"
original = "「は……？\u3000どういう意味？\u3000それって結局、放っておかないってことじゃない」"
translation = "「하……? 무슨 의미야? 그건 결국 내버려 두지 않겠다는 거잖아.」"

[[dialogue]]
speaker_original = "ウィステリア"
speaker_translation = "위스테리아"
original = "「邪魔はしてないから文句は言えないわね。ふふ、一本取られたんじゃない？」"
translation = "「방해는 안 하고 있으니 뭐라 할 수도 없겠네. 후후, 한 방 먹은 거 아냐?」"

[[dialogue]]
speaker_original = "トワ先生"
speaker_translation = "토와 선생님"
original = "「会長くんがついてるなら安心、かな」"
translation = "「회장 군이 붙어 있다면 안심이려나.」"

[[dialogue]]
speaker_original = "マリーベル"
speaker_translation = "메리벨"
original = "「……はぁ。頑固なのね。そこまで言うなら好きにすればいいわ」"
translation = "「……하아. 고집불통이네. 거기까지 말한다면 마음대로 해.」"

[[dialogue]]
speaker_original = "マリーベル"
speaker_translation = "메리벨"
original = "「その代わり、あなたがどうなっても恨まないで。後悔しても知らないから。いい？」"
translation = "「그 대신, 당신이 어떻게 되든 원망하지 마. 후회해도 난 모를 테니까. 알겠어?」"

[[dialogue]]
speaker = "unk"
original = "後悔なんかしないよ"
translation = "후회 같은 건 안 해"

[[dialogue]]
speaker_original = "マリーベル"
speaker_translation = "메리벨"
original = "「そう。それならいいのだけど。じゃあ、また戦場で会いましょう」"
translation = "「그래. 그렇다면 다행이지만. 그럼, 다시 전장에서 보자고.」"

