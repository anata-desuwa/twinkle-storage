[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「こいつで、トドメぇっ！」"
translation = "「이걸로 끝이다아!」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「きゃああぁあぁぁぁぁっ！」"
translation = "「꺄아아아아아악!」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「あ、あああ……まだバレンタインは終わっていないのに……終わらせたくないのに……波動が、抜け出て……！\u3000エンドレスバレンタインが、終わってしまいます……！」"
translation = "「아, 아아아…… 아직 발렌타인은 끝나지 않았는데…… 끝내고 싶지 않은데…… 파동이 빠져나가서……! 엔들리스 발렌타인이 끝나버려요……!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「バレンタインは１年に一度だから特別感があるんでしょ。こんな甘ったるい日が、何日も続いたら胃もたれしちゃうわ」"
translation = "「발렌타인은 1년에 한 번뿐이라 특별한 거잖아. 이런 달짝지근한 날이 며칠이나 계속되면 위장병 생겨.」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「くぅ……やむを得ませんね。今回は負けを認めます。ですが、私は永遠のバレンタインを諦めたりはしませんよ」"
translation = "「으으…… 어쩔 수 없네요. 이번엔 패배를 인정할게요. 하지만 전 영원한 발렌타인을 포기하지 않을 거예요.」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「またお会いしましょう。バレンタインデーは毎年必ず訪れるのですから。うふふふふ<emoji=heart04>」"
translation = "「다음에 또 봐요. 발렌타인 데이는 매년 반드시 찾아오니까요. 우후후후후<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「まだそんなに動ける元気が残ってるの！？\u3000ちっとも懲りてないわね！」"
translation = "「아직 그렇게 움직일 기운이 남아있는 거야!? 조금도 반성 안 했네!」"

[[dialogue]]
speaker = "unk"
original = "悪役めいた捨て台詞を言い残し、まるでバレンタインデーが見せた幻のように、ウルスラの姿は何処ともなく消え去った。"
translation = "악당 같은 대사를 남기고, 마치 발렌타인 데이가 보여준 환상처럼 우르술라의 모습은 어디론가 사라졌다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あの怪人、またやらかすつもりかしら……もっとボコボコにとっちめた方が良かったわね……」"
translation = "「저 괴인, 또 사고 칠 셈인가…… 좀 더 처절하게 혼내주는 게 좋았겠어……」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「う、うーん……はっ！？」"
translation = "「우, 우웅…… 핫!?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あっ、シャロン、気づいた？」"
translation = "「앗, 샤론, 정신이 들어?」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「イレーナさま、会長さま……私は何をしていたのでしょう……？\u3000なんだか楽しい夢を見ていたような……」"
translation = "「이레이나 님, 회장님…… 제가 뭘 하고 있었죠……? 왠지 즐거운 꿈을 꾸고 있었던 것 같은……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あれ楽しい夢だったの……？\u3000まぁいいわ、とりあえず全部終わったから安心しなさい」"
translation = "「그게 즐거운 꿈이었어……? 뭐 됐어, 일단 전부 끝났으니까 안심해.」"

[[dialogue]]
speaker = "unk"
original = "大丈夫？\u3000肩を貸そうか？"
translation = "괜찮아? 부축해 줄까?"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「か、会長さま……ありがとうございますっ<emoji=heart04>\u3000では、お言葉に甘えて……<emoji=heart04>」"
translation = "「회, 회장님…… 감사합니다<emoji=heart04> 그럼, 말씀하신 대로 실례할게용……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "まだ矢に撃たれた後遺症が残っているのか、足取りの覚束ないシャロンに肩を貸しつつ、帰路につく。"
translation = "아직 화살에 맞은 후유증이 남았는지 발걸음이 위태로운 샤론을 부축하며 귀가길에 오른다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「かばってくれてありがとう、シャロン。あなたのおかげでウルスラに勝てたわ」"
translation = "「감싸줘서 고마워, 샤론. 너 덕분에 우르술라에게 이길 수 있었어.」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「と、と、とんでもないですっ！\u3000イレーナさまをお守りするのは、当然のことですから。それに──」"
translation = "「처, 처, 천만의 말씀이에요! 이레이나 님을 지키는 건 당연한 일이니까요. 게다가──」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「撃たれたおかげで、こうやって会長さんに寄りかかれるんですから役得です……えへへへ、しゅきぃ……<emoji=heart04>」"
translation = "「화살에 맞은 덕분에 이렇게 회장님께 기댈 수 있으니 이득이에용…… 에헤헤헤, 조와용……<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "（まだ矢の効果が残ってるの……？\u3000それとも、シャロンの本心？）"
translation = "（아직 화살 효과가 남은 건가……? 아니면 샤론의 본심?）"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "（どちらにせよ……その素直さは羨ましいわ、ホント）"
translation = "（어느 쪽이든…… 그 솔직함은 부럽네, 정말로.）"

[[dialogue]]
speaker = "unk"
original = "シャロンを修道院に送り届けた後、イレーナを教皇庁近くの宿舎まで送っていく。"
translation = "샤론을 수녀원에 데려다준 뒤, 이레이나를 교황청 근처 숙소까지 바래다준다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「別にあたしまで送ってくれなくていいのに……あんたの家だと遠回りじゃない？」"
translation = "「딱히 나까지 안 데려다줘도 되는데…… 네 집이랑은 반대 방향이잖아?」"

[[dialogue]]
speaker = "unk"
original = "女の子だけで夜道を歩かせられないよ"
translation = "여자아이 혼자 밤길을 걷게 할 수는 없지."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「……そう。相変わらず、お優しいことで」"
translation = "「……그래. 여전히 다정하시네.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「まったく、学園に閉じ込められるなんて……とんでもないバレンタインイベントだったわ」"
translation = "「정말이지, 학원에 갇히다니…… 엄청난 발렌타인 이벤트였어.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「普段のあたしには縁のないイベントなのに……こんな強烈なインパクトだらけのバレンタインは初めてよ。一生忘れられそうにないわ」"
translation = "「평소의 나랑은 인연 없는 이벤트인데…… 이렇게 강렬한 임팩트투성이인 발렌타인은 처음이야. 평생 못 잊을 것 같네.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「そうね……どうせ一生忘れられないなら……」"
translation = "「그래…… 어차피 평생 못 잊을 거라면……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「はい、あんた用のチョコレート。あげるわ」"
translation = "「자, 네 몫인 초콜릿. 줄게.」"

[[dialogue]]
speaker = "unk"
original = "俺に！？"
translation = "나한테!?"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「今更なに驚いてんのよ」"
translation = "「이제 와서 뭘 그렇게 놀라.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「なんだかんだそれなりの付き合いだし、世話になってるお礼をするのに、ちょうどいい機会ってだけ」"
translation = "「이래저래 나름대로 알고 지낸 사이고, 신세 진 보답을 하기에 딱 좋은 기회일 뿐이야.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「言っておくけど、本命チョコとかじゃないからね！\u3000絶ッッッ対に勘違いするんじゃないわよ！」"
translation = "「말해두겠는데, 본명 초코 같은 거 아니니까! 절대로 착각하지 마!」"

[[dialogue]]
speaker = "unk"
original = "ここで渡すなら、学園で渡しても……"
translation = "여기서 줄 거라면 학원에서 줘도……"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「だから！\u3000それじゃダメって言ってたのが、わかんない！？」"
translation = "「그러니까! 그건 안 된다고 말한 거 못 알아들어!?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「人に言われてホイって渡したら、ありがたみ激減でしょ？\u3000いや別にありがたがってもらわなくてもいいけど」"
translation = "「남이 시켜서 휙 하고 주면 고마움이 반감되잖아? 아니 딱히 고맙게 생각 안 해도 되지만.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ま、厄介ごとも山ほどあったわけだし、あたしからチョコもらう程度のこと、すぐに忘れるでしょ？\u3000あたしのチョコなんて、それくらいの扱いが丁度いいわ」"
translation = "「뭐, 골치 아픈 일도 산더미였고, 나한테 초코 받는 정도는 금방 잊어버리겠지? 내 초코 따위 그 정도 취급이 딱 적당해.」"

[[dialogue]]
speaker = "unk"
original = "（忘れるわけない）"
translation = "（잊을 리가 없잖아.）"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ホワイトデーのお返しとかいらないから。変な気を利かせなくていいから。あー、渡せてすっきりしたー」"
translation = "「화이트 데이 답례 같은 거 필요 없으니까. 이상한 신경 쓰지 않아도 되니까. 아─ 줘버리니 속 시원하네─」"

[[dialogue]]
speaker = "unk"
original = "イレーナは俺の方を振り返ることなく、教皇庁の宿舎に入ろうとする──その寸前。"
translation = "이레이나는 내 쪽을 돌아보지 않고 교황청 숙소로 들어가려 한다── 그 직전."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「じゃあね。ありがと」"
translation = "「잘 가. 고마웠어.」"

[[dialogue]]
speaker = "unk"
original = "一言だけ残して、扉の奥に姿を隠したのだった。"
translation = "한마디만 남기고 문 너머로 모습을 감췄다."

[[dialogue]]
speaker = "unk"
original = "イレーナからもらったバレンタインチョコの封を開け、そのひとつを手に取り、口に運ぶと、カカオの苦さが口に広がった。大人の味だ。"
translation = "이레이나에게 받은 발렌타인 초코의 포장을 뜯어 하나를 입에 넣자, 카카오의 씁쓸함이 입안에 퍼졌다. 어른의 맛이다."

[[dialogue]]
speaker = "unk"
original = "チョコの甘さと苦さを噛みしめつつ、帰路に就くのだった。"
translation = "초코의 달콤함과 씁쓸함을 음미하며 귀가길에 올랐다."

