[[dialogue]]
speaker = "unk"
original = "第４話,イジワルなご主人様,P"
translation = "제4화, 심술궂은 주인님, P"

[[dialogue]]
speaker = "unk"
original = "今日は週に１度の、蘭美と２人きりで陳情書や報告書を確認して、情報をまとめたり指示の内容を決定する作業を行う日だった。"
translation = "오늘은 일주일에 한 번, 라비와 단둘이 진정서나 보고서를 확인하고, 정보를 정리하거나 지시 내용을 결정하는 작업을 하는 날이었다."

[[dialogue]]
speaker = "unk"
original = "放課後からすぐに取りかかり、気が付けばぶっ続けで４時間。蘭美の事務能力の高さもあって、あれだけ大量にあった書類はすべて片付いていた。"
translation = "방과 후부터 바로 시작하여, 정신을 차려보니 4시간 내리 계속했다. 라비의 사무 능력 덕분에, 그렇게나 많았던 서류는 전부 정리되어 있었다."

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「さて、今日の仕事はあらかた片付いたわね！」"
translation = "「자, 오늘 할 일은 대충 정리됐네!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「というわけで残った時間は、私が貴方の専属メイドとして修業を積む時間にするわよ、ご主人様！」"
translation = "「그런 고로 남은 시간은, 내가 당신의 전속 메이드로서 수련을 쌓는 시간으로 할 거야, 주인님!」"

[[dialogue]]
speaker = "unk"
original = "この『専属メイドとして修業を積む時間』というのは、蘭美が『恋人としてイチャイチャしたい』時に言い出す、最近のトレンドワードだと俺は密かに分析していた。"
translation = "이 『전속 메이드로서 수련을 쌓는 시간』이라는 건, 라비가 『연인으로서 알콩달콩하고 싶을』 때 꺼내는, 최근의 트렌드 워드라고 나는 은밀히 분석하고 있었다."

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「…………全部わかったような顔でニコニコされるのは、ちょっと腹が立つわね」"
translation = "「…………전부 다 안다는 듯한 얼굴로 생글생글 웃는 건, 좀 짜증 나네」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「なんでメイドなのに白無垢姿に変身するんだ、とか……わかりやすいツッコミ所があるんだから、乗って来てくれないと張り合いがないじゃない」"
translation = "「왜 메이드인데 시로무쿠(일본 전통 혼례복) 차림으로 변신하는 거냐, 라든가…… 알기 쉬운 태클 걸 부분이 있는데, 같이 호응해 주지 않으면 재미가 없잖아」"

[[dialogue]]
speaker = "unk"
original = "覚えててくれてたんだよな？"
translation = "기억하고 있었던 거지?"

[[dialogue]]
speaker = "unk"
original = "また着てほしいってお願いしてたの"
translation = "또 입어줬으면 좋겠다고 부탁했었지"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「むぅ……わかっているなら、いいのだけれど」"
translation = "「음…… 알고 있다면, 괜찮지만」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「でも、ツッコミ所はそれだけじゃないでしょう？」"
translation = "「하지만, 태클 걸 부분은 그것뿐만이 아니잖아?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「修行よ、修行？\u3000どうしてデートしたり、イチャイチャする時間じゃないのか、理由は聞かなくていいのかしら？」"
translation = "「수련이야, 수련? 어째서 데이트하거나, 알콩달콩하는 시간이 아닌 건지, 이유는 묻지 않아도 괜찮을까?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「それをご主人様の口から説明すると、私が恥をかくから言わない……？」"
translation = "「그걸 주인님의 입으로 설명하면, 내가 창피를 당하니까 말하지 않는다……?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「へぇ～？\u3000ご主人様は恋人の女心に、大変お詳しいようね？」"
translation = "「헤에~? 주인님은 연인의 여자 마음에, 아주 잘 아는 것 같네?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「どうせここには私たち２人しかいないんだから、答え合わせをしてみようじゃない」"
translation = "「어차피 여기엔 우리 둘밖에 없으니까, 정답을 맞춰보자」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「いいわよ、別に間違っていても怒ったりしないから。答えてみなさい、ご主人様！」"
translation = "「괜찮아, 딱히 틀렸다고 화내거나 하지 않을 테니까. 대답해 봐, 주인님!」"

[[dialogue]]
speaker = "unk"
original = "従者の立場でイチャイチャしたいんでしょ？"
translation = "종자의 입장에서 알콩달콩하고 싶은 거지?"

[[dialogue]]
speaker = "unk"
original = "実は俺に命令されるのが結構好きで"
translation = "실은 나에게 명령받는 걸 꽤 좋아해서"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ぴゃっ！！？」"
translation = "「뺫!!?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「そ、そそそ、そんなわけないぴょんっ！？？」"
translation = "「스, 스스스, 그럴 리 없잖아뿅!!??」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ご主人様は、そんな破廉恥なことを考えてたぴょんっ！？\u3000破廉恥だぴょん！！\u3000そんなわけないぴょんっ！？」"
translation = "「주인님은, 그런 파렴치한 생각을 했던 거냐뿅!? 파렴치하다뿅!! 그럴 리 없잖아뿅!?」"

[[dialogue]]
speaker = "unk"
original = "誤魔化すのは止めなさい！！"
translation = "얼버무리는 건 그만둬!!"

[[dialogue]]
speaker = "unk"
original = "蘭美！\u3000恥ずかしいからって"
translation = "라비! 부끄럽다고"

[[dialogue]]
speaker = "unk"
original = "俺がわざと、普段の蘭美にはしないような、強い口調でピシャリと命令する。"
translation = "내가 일부러, 평소의 라비에게는 하지 않는 듯한, 강한 어조로 딱 잘라 명령한다."

[[dialogue]]
speaker = "unk"
original = "すると蘭美は背筋をゾクゾクっと振るわせて、とろんと顔を赤らめる。"
translation = "그러자 라비는 등골을 오싹 떨게 하고, 헤롱거리며 얼굴을 붉힌다."

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ご、ごめんなさい、ご主人様。蘭美は嘘をついたぴょん……<emoji=heart04>」"
translation = "「저, 죄송해요, 주인님. 라비는 거짓말을 했어요뿅……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "本当のこと、言ってごらん"
translation = "사실을, 말해 봐"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「はぅぅ……本当はご主人様に命令されたり、叱られたりするの、大好きだぴょん」"
translation = "「하으으…… 사실은 주인님께 명령받거나, 꾸중 듣는 거, 정말 좋아해요뿅」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「でもメイド長として、そんなだらしないところばっかり、見せるわけにもいかなくて……」"
translation = "「하지만 메이드장으로서, 그런 흐트러진 모습만, 보여줄 수도 없어서……」"

[[dialogue]]
speaker = "unk"
original = "俺は蘭美にこっちへ来るように手招きして、近づいてきた彼女を抱き寄せて膝の上に乗せる。"
translation = "나는 라비에게 이쪽으로 오라고 손짓하고, 다가온 그녀를 끌어안아 무릎 위에 앉힌다."

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「わぷっ。ご、ご主人様……？」"
translation = "「와풋. 주, 주인님……?」"

[[dialogue]]
speaker = "unk"
original = "膝の上に乗った小さな恋人の頭を、優しく撫でていく。"
translation = "무릎 위에 앉은 작은 연인의 머리를, 상냥하게 쓰다듬는다."

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「飛び級しただけで、本当はご主人様たちより若い私が、メイド長としてリーダーを務めているのは偉い……？」"
translation = "「월반했을 뿐인데, 사실은 주인님들보다 어린 내가, 메이드장으로서 리더를 맡고 있는 건 대단한…… 걸까?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「だってそんなの……私の年齢は、仕事や立場の言い訳には、ならないもの……」"
translation = "「왜냐면 그런 건…… 내 나이는, 일이나 입장의 변명이 될 수 없으니까……」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ヘレナ様やヴィーナスお嬢様の期待には応えたいし、それに貴方の恋人として、立派だって思われたいから……」"
translation = "「헬레나 님이나 비너스 아가씨의 기대에는 부응하고 싶고, 게다가 당신의 연인으로서, 훌륭하다고 여겨지고 싶으니까……」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「２人きりの時くらい、もっと欲望全開でもいいって……？」"
translation = "「단둘이 있을 때 정도는, 좀 더 욕망 전개여도 괜찮다고……?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「むぅ。そうは言うけど、私、ご主人様には結構欲望全開で接しているでしょう？」"
translation = "「음. 그렇게 말하지만, 나, 주인님에게는 꽤 욕망 전개로 대하고 있잖아?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「メリハリがあるのは良いことだけど、もっと素直に甘えることも覚えて欲しい……まあ、言いたいことはわかるけれど」"
translation = "「강약 조절이 있는 건 좋은 일이지만, 좀 더 솔직하게 응석 부리는 것도 배웠으면 좋겠어…… 뭐, 하고 싶은 말은 알겠지만」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「こればっかりは性格だから、多少は受け入れてもらえると嬉しいわ」"
translation = "「이것만은 성격이니까, 어느 정도는 받아들여 주면 좋겠어」"

[[dialogue]]
speaker = "unk"
original = "強引なご主人様になってみようかな"
translation = "강압적인 주인님이 되어볼까"

[[dialogue]]
speaker = "unk"
original = "じゃあ俺もたまには……"
translation = "그럼 나도 가끔은……"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「……っ！」"
translation = "「……읏!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「それ、他の人がいる前では絶対やめてよね……！」"
translation = "「그거, 다른 사람이 있는 앞에서는 절대 하지 마……!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「いくら人前でイチャイチャするのを気にしないと言っても、限度はあるでしょう！？」"
translation = "「아무리 남들 앞에서 알콩달콩하는 걸 신경 쓰지 않는다고 해도, 한계는 있잖아!?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「私、貴方に命令されたり、叱られたりすると……へ、変な気分になっちゃうから、２人きりの時以外は絶対やめて！」"
translation = "「나, 당신에게 명령받거나, 꾸중 들으면…… 히, 이상한 기분이 되어버리니까, 단둘이 있을 때 외에는 절대 하지 마!」"

[[dialogue]]
speaker = "unk"
original = "じゃあ、２人きりの今は……？"
translation = "그럼, 단둘이 있는 지금은……?"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「そ、そんなの……」"
translation = "「그, 그런 건……」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「そんな破廉恥なこと、言えないぴょんっ<emoji=heart04>」"
translation = "「그런 파렴치한 말, 할 수 없다뿅<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "腕の中で顔を真っ赤にする蘭美の頭を、俺は何度も何度も撫でながら、俺たちは夜が更けるまで２人きりでイチャイチャしまくるのだった。"
translation = "품 안에서 얼굴을 새빨갛게 물들이는 라비의 머리를, 나는 몇 번이고 쓰다듬으며, 우리는 밤이 깊어질 때까지 단둘이 알콩달콩했다."

