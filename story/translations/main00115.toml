[[dialogue]]
speaker = "unk"
original = "第１９話,御前試合Ⅰ,B"
translation = "제19화, 어전 시합Ⅰ, B"

[[dialogue]]
speaker = "unk"
original = "そうしてついに、決戦の時を迎えた。"
translation = "그리하여 마침내, 결전의 때를 맞이했다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「よく来たわね──緋宮クロト」"
translation = "「잘 왔어── 히노미야 쿠로토」"

[[dialogue]]
speaker = "クロト"
original = "「ああ……逃げるわけにはいかないからな」"
translation = "「아아…… 도망칠 수는 없으니까」"

[[dialogue]]
speaker = "unk"
original = "俺の前に立つは現新星星徒会会長・九浄ヴィーナス。"
translation = "내 앞에 서 있는 것은 현 신성 학원 성도회 회장, 쿠죠 비너스."

[[dialogue]]
speaker = "unk"
original = "アリーナの全席を埋め尽くすのは、新星学園全２５４２名の生徒たち。"
translation = "아레나의 모든 좌석을 가득 메운 것은, 신성 학원 전체 2542명의 학생들."

[[dialogue]]
speaker = "unk"
original = "これから始まるのは、この新星学園の命運を左右する一大イベント──"
translation = "지금부터 시작되는 것은, 이 신성 학원의 명운을 좌우할 일대 이벤트──"

[[dialogue]]
speaker = "unk"
original = "御前試合だ。"
translation = "어전 시합이다."

[[dialogue]]
speaker = "クロト"
original = "「（あれが……新星学園の学園長……）」"
translation = "「(저것이…… 신성 학원의 학원장……)」"

[[dialogue]]
speaker = "unk"
original = "こうしてこの目で見るのは初めてだ。"
translation = "이렇게 이 눈으로 보는 것은 처음이다."

[[dialogue]]
speaker = "unk"
original = "俺たちは今から彼の前で、雌雄を決する戦いを行う──"
translation = "우리는 지금부터 그의 앞에서, 승패를 결정지을 싸움을 벌인다──"

[[dialogue]]
speaker = "クロト"
original = "「戦いを始める前に……ひとつ訊いておきたい」"
translation = "「싸움을 시작하기 전에…… 하나 물어보고 싶다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「何かしら」"
translation = "「뭔데」"

[[dialogue]]
speaker = "クロト"
original = "「君が、そこまで俺を買っている理由はなんだ？」"
translation = "「네가, 그렇게까지 나를 높이 사는 이유는 뭐지?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「決まっているわ」"
translation = "「정해져 있어」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスは、さも当然のこととばかりに言った。"
translation = "비너스는, 마치 당연하다는 듯이 말했다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「あなたこそ、真の魔王だからよ」"
translation = "「당신이야말로, 진정한 마왕이니까」"

[[dialogue]]
speaker = "クロト"
original = "「魔王……」"
translation = "「마왕……」"

[[dialogue]]
speaker = "unk"
original = "以前も口にしていた言葉だったが、やはり聞き間違えではないようだ。"
translation = "이전에도 입에 담았던 말이었지만, 역시 잘못 들은 것은 아닌 듯하다."

[[dialogue]]
speaker = "クロト"
original = "「詳しい意味が聞きたい。俺は別に、魔族でもないただの人間だが……」"
translation = "「자세한 의미를 듣고 싶다. 나는 별로, 마족도 아닌 평범한 인간이지만……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「この場で話すことではないわ。それに、戦えばすぐにわかるはず」"
translation = "「이 자리에서 이야기할 것은 아니야. 게다가, 싸우면 바로 알 수 있을 거야」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あなたの血に眠る──その資質にね」"
translation = "「당신의 피에 잠들어 있는── 그 자질을 말이야」"

[[dialogue]]
speaker = "unk"
original = "血に眠る資質──やはり、ヴィーナスは俺のあの力のことを知っているのだろうか？"
translation = "피에 잠들어 있는 자질── 역시, 비너스는 나의 그 힘을 알고 있는 것일까?"

[[dialogue]]
speaker = "unk"
original = "しかし、彼女はこの場でこれ以上説明してくれそうもない。"
translation = "하지만, 그녀는 이 자리에서 더 이상 설명해 줄 것 같지 않다."

[[dialogue]]
speaker = "クロト"
original = "「──わかった。聞くのはよそう。俺はただ、君の頼みに応えるだけだ」"
translation = "「──알겠다. 묻는 건 그만두지. 나는 그저, 네 부탁에 응할 뿐이다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふふ。話が早くて助かるわ」"
translation = "「후후. 말이 빨라서 다행이네」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「さて……本来、私は３ヶ月前にサーシャさんから星徒会長を継いだばかりの身」"
translation = "「자…… 본래, 나는 3개월 전에 사샤 씨에게서 성도 회장 자리를 물려받은 참」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「けれど。イレギュラーながら──本日をもってこの座をあなたに明け渡すわ」"
translation = "「하지만. 이례적이긴 하지만── 오늘부로 이 자리를 당신에게 넘겨주겠어」"

[[dialogue]]
speaker = "unk"
original = "腕章を示すヴィーナス。"
translation = "완장을 보여주는 비너스."

[[dialogue]]
speaker = "unk"
original = "それだけならば確かに光栄で、この上ない話だ。"
translation = "그것뿐이라면 확실히 영광스럽고, 더할 나위 없는 이야기다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「でも……タダでというわけにはいかない。示しがつかないものね」"
translation = "「하지만…… 공짜로 줄 수는 없어. 체면이 서지 않으니까」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスのセレスティアが<ruby>金色<rt>こんじき</rt></ruby>に輝く。"
translation = "비너스의 셀레스티아가 금색으로 빛난다."

[[dialogue]]
speaker = "unk"
original = "彼女の奉ずる守護星が、その身に騎士としての加護を与え──変身。"
translation = "그녀가 받드는 수호성이, 그 몸에 기사로서의 가호를 부여하여── 변신."

[[dialogue]]
speaker = "unk"
original = "戦闘態勢へ移ったのを見て、学園長はアリーナ席から俺たちへ呼びかけた。"
translation = "전투 태세로 들어간 것을 보고, 학원장은 아레나 좌석에서 우리에게 말을 걸었다."

[[dialogue]]
speaker = "セイファート"
original = "「星徒会長には──この新星学園に集う、全<ruby>星騎士<rt>スターナイト</rt></ruby>たちを束ねるだけの実力が求められる」"
translation = "「성도 회장에게는── 이 신성 학원에 모인, 모든 성기사들을 통솔할 만한 실력이 요구된다」"

[[dialogue]]
speaker = "セイファート"
original = "「ゆえにこそ……これから行うのは、私だけではない、君たちを見守る彼らへ向けての御前試合だ」"
translation = "「그러므로…… 지금부터 행할 것은, 나뿐만이 아닌, 너희들을 지켜보는 그들을 향한 어전 시합이다」"

[[dialogue]]
speaker = "unk"
original = "アリーナ席を埋め尽くす学生たち。"
translation = "아레나 좌석을 가득 메운 학생들."

[[dialogue]]
speaker = "unk"
original = "皆が皆、俺よりも早く入学した先輩たちだ。"
translation = "모두가 모두, 나보다 먼저 입학한 선배들이다."

[[dialogue]]
speaker = "unk"
original = "星徒会への憧れを持った生徒も多いだろう。なればこそ、俺が認められるべきは彼らをおいて他にない。"
translation = "성도회에 대한 동경을 가진 학생도 많을 것이다. 그렇다면, 내가 인정받아야 할 대상은 그들 외에는 없다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「示してみなさい。緋宮クロト──彼ら全員を従える覇者としての器があなたにあるか」"
translation = "「보여줘 봐. 히노미야 쿠로토── 그들 전원을 복종시킬 패자로서의 그릇이 당신에게 있는지」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そして……私があなたを、真の魔王として導いてあげる！」"
translation = "「그리고…… 내가 당신을, 진정한 마왕으로 인도해 줄게!」"

[[dialogue]]
speaker = "クロト"
original = "「いいだろう──星騎士としての最初の責務、ここで果たさせてもらう！」"
translation = "「좋다── 성기사로서의 첫 번째 책무, 여기서 완수하도록 하지!」"

