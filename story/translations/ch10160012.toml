[[dialogue]]
speaker = "unk"
original = "第２話,不知火ヒトリは壁になりたい,P"
translation = "제2화, 시라누이 히토리는 벽이 되고 싶어, P"

[[dialogue]]
speaker = "unk"
original = "──昼休み、昼食を取りにカフェテリアに来ると、ぼーっとしているヒトリを見つけた。"
translation = "──점심시간, 점심을 먹으러 카페테리아에 오니, 멍하니 있는 히토리를 발견했다."

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「はぁぁぁ～～～……見て、ゆーちゃん……あの子たち、お互いにあーんってやってる～～」"
translation = "「하아아아~~~~…… 봐, 유ー짱…… 저 아이들, 서로 아ー앙 하고 있어~~」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「はぁぁぁ～～～、てぇてぇ……」"
translation = "「하아아아~~~~, 귀여워(테에테에)……」"

[[dialogue]]
speaker_original = "ゆーちゃん"
speaker_translation = "유짱"
original = "「てーてー！」"
translation = "「테ー테ー!」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「新星と流星学園は、女の子が多くて天国みたいだよ……はぁぁ～～」"
translation = "「신성과 유성 학원은 여자가 많아서 천국 같아…… 하아아~~」"

[[dialogue]]
speaker = "unk"
original = "ここ、座ってもいいか？"
translation = "여기, 앉아도 될까?"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「ひぁっ！？\u3000か、会長さん……？\u3000どうしてここに……」"
translation = "「히익!? 회, 회장님……? 어째서 여기에……」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「え、えっと、席ならほかにもたくさんあって、その、こ、ここに座る必要はないんじゃないでしょうか……！」"
translation = "「에, 에또, 자리는 다른 데도 많이 있고, 그, 여, 여기에 앉을 필요는 없지 않을까요……!」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「あ……い、意外と埋まってますね……。そ、その……ど、どうぞ」"
translation = "「아…… 의, 의외로 꽉 찼네요……. 그, 그게…… 드, 드세요.」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「……か、会長さんも１人なんですか？\u3000い、いつも星徒会のみなさんと一緒だと思ってたんですけど」"
translation = "「……회, 회장님도 혼자신가요? 하, 항상 성도회 여러분과 함께라고 생각했는데요.」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「今日はたまたま？\u3000そ、そうですか……」"
translation = "「오늘은 우연히? 그, 그렇군요……」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「わ、わたしはいつもこんな感じです……基本、ぼっちなので……」"
translation = "「저, 저는 항상 이런 느낌이에요…… 기본, 아싸라서……」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「あっ、し、心配には及びませんっ、わたしにはゆーちゃんがいるので全然大丈夫です……！」"
translation = "「앗, 거, 걱정하실 필요 없어요, 저한테는 유ー짱이 있으니까 전혀 괜찮습니다……!」"

[[dialogue]]
speaker_original = "ゆーちゃん"
speaker_translation = "유짱"
original = "「ゆー！」"
translation = "「유ー!」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「……す、すみませんっ、やっぱり、すぐ食べてすぐ教室戻ります～っ」"
translation = "「……죄, 죄송해요, 역시 금방 먹고 바로 교실로 돌아갈게요~!」"

[[dialogue]]
speaker = "unk"
original = "一緒にお昼食べない？"
translation = "같이 점심 먹지 않을래?"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「い、いいんですか……？\u3000わたしと一緒にいると寒気がするとか、突然誰もいない空間に喋り出して怖いとか、色々言われるんですけど……」"
translation = "「괘, 괜찮나요……? 저랑 같이 있으면 한기가 느껴진다거나, 갑자기 아무도 없는 공간에 말을 걸어서 무섭다거나, 여러 소리를 듣는데……」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「き、気にしない……そうですか。あ、ありがとうございます……」"
translation = "「시, 신경 안 쓴다…… 그렇군요. 고, 고맙습니다……」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「……小さな頃、幽霊が見えることがおかしいことだって気づかなくて、人前でも普通に、幽霊と会話してたんです」"
translation = "「……어릴 때, 유령이 보이는 게 이상한 일이라는 걸 깨닫지 못해서, 사람들 앞에서도 평범하게 유령이랑 대화했었어요.」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「そ、そりゃあ周りの人から見れば、変な子に見えますよね……」"
translation = "「그, 그럼 주변 사람들 눈에는 이상한 아이로 보이겠죠……」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「そんなだから、全然お友達もできなくて……ま、まあ、幽霊のお友達はたくさんいたので、寂しくはなかったんですけど……」"
translation = "「그래서 전혀 친구도 못 사귀고…… 뭐, 뭐, 유령 친구는 많이 있어서 외롭지는 않았지만요……」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「でも、どうしても人と接しなきゃいけない時とかって……あるじゃないですか」"
translation = "「하지만, 아무래도 사람과 접해야만 할 때가…… 있잖아요.」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「例えばその……た、体育の時間とかで、２人組を作ってとか言われた時」"
translation = "「예를 들면 그…… 체, 체육 시간 같은 때, 2인 1조를 만들라고 한다든가.」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「うっ……！\u3000お、思い出したら胸が痛くなってきました……」"
translation = "「윽……! 떠, 떠올리니 가슴이 아파오기 시작했어요……」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「家庭科の時間で、チームを作って料理をすることになった時とか……」"
translation = "「가정 시간 때, 팀을 짜서 요리를 하게 됐을 때라든가……」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「ううっ……！\u3000ポルターガイスト現象が起こったのは、わたしのせいじゃないのに……！」"
translation = "「우우윽……! 폴터가이스트 현상이 일어난 건 제 탓이 아닌데……!」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「修学旅行の時も、体育祭の時も、課外活動の時も……っ」"
translation = "「수학여행 때도, 체육대회 때도, 야외 활동 때도……!」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「う、ううぅぅ……！\u3000ど、どうして人生には誰かと一緒に何かをしなければならない瞬間が、こんなに多いんでしょう……っ」"
translation = "「우, 우우우……! 어, 어째서 인생에는 누군가와 함께 무언가를 해야만 하는 순간이 이렇게 많은 걸까요……!」"

[[dialogue]]
speaker = "unk"
original = "い、色々大変だったんだな……"
translation = "여, 여러모로 힘들었겠구나……"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「……でも、悪いことばっかりじゃありませんでした」"
translation = "「……하지만, 나쁜 일만 있지는 않았어요.」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「わ、わたしが誰かと一緒にチームを組むのは苦手でしたけど、誰かがチームを組んで、仲良さそうに頑張ってるのを眺めるのは、好きだなって気づいたんです」"
translation = "「저, 제가 누군가와 함께 팀을 짜는 건 서툴렀지만, 누군가가 팀을 짜서 사이좋게 열심히 하는 걸 지켜보는 건 좋아한다는 걸 깨달았거든요.」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「羨ましいなって思う気持ちよりも、見守っていることで凄く胸がポカポカして……これはなんだろうってずっと思ってたんですけど……」"
translation = "「부럽다는 마음보다는, 지켜보는 것만으로 가슴이 뭉클해져서…… 이게 뭘까 하고 계속 생각했었는데……」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「最近、この気持ちの正体に気づいたんです。それで──」"
translation = "「최근에 이 감정의 정체를 깨달았어요. 그래서──」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「わたしは壁になりたかったんだな、って──」"
translation = "「나는 벽이 되고 싶었구나, 하고──」"

[[dialogue]]
speaker = "unk"
original = "なんて……？"
translation = "뭐라고……?"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「『尊い』っていうんでしょうか。わたし、女の子同士が仲良さそうに手を繋いだりボディタッチしてるのを見ると、胸がきゅーーってなるんですっ」"
translation = "「『숭고하다』고 할까요. 저, 여자아이들끼리 사이좋게 손을 잡거나 스킨십을 하는 걸 보면 가슴이 큥ー 해요!」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「ほらっ、あそこ見てくださいっ、女の子同士で『あーん』ってして食べさせあってるんですよっ」"
translation = "「보세요, 저기 좀 보세요, 여자아이들끼리 『아ー앙』 하며 먹여주고 있다고요!」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「はぁぁぁ～～～……て、てぇてぇ……」"
translation = "「하아아아~~~~…… 귀, 귀여워(테에테에)……」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「あの子たちと友達になりたいとか思いません。わたしは女の子同士の絡み──すなわち『百合』を眺める壁でありたい……」"
translation = "「저 아이들과 친구가 되고 싶지는 않아요. 저는 여자아이들끼리의 얽힘── 즉 『백합』을 지켜보는 벽이고 싶어요……」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「そのためなら、ぼっちも受け入れます……！」"
translation = "「그걸 위해서라면, 아싸인 것도 받아들이겠어요……!」"

[[dialogue]]
speaker = "unk"
original = "ま、まさかの百合好き女子……！"
translation = "서, 설마 했던 백합 좋아하는 여자애……!"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「あっ、ほら、あっちでは一緒に写真撮ってますよっ！\u3000頬っぺたくっつく距離でピースしててっ、わぁぁっ……！\u3000て、てぇてぇ……」"
translation = "「앗, 봐요, 저기서는 같이 사진 찍고 있어요! 볼을 맞댄 거리에서 브이를 하고, 와아아……! 귀, 귀여워……」"

[[dialogue]]
speaker_original = "ゆーちゃん"
speaker_translation = "유짱"
original = "「てーてー！」"
translation = "「테ー테ー!」"

[[dialogue]]
speaker = "unk"
original = "ヒトリ。百合について、俺にも教えてくれないか？"
translation = "히토리. 백합에 대해서 나한테도 알려주지 않을래?"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「もちろんいいですよ……って、えっ！？\u3000か、会長さんいま何て！？\u3000ひ、ひょっとして百合にご興味が！？」"
translation = "「물론 좋죠…… 어, 엣!? 회, 회장님 방금 뭐라고!? 호, 혹시 백합에 관심이!?」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「ままま、まさか、同志ができる！？\u3000そんなこと……今まで考えたこともなかった！」"
translation = "「서서서, 설마 동지가 생기는 거야!? 그런 거…… 지금까지 생각해 본 적도 없었어!」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「だ、ダメじゃないですっ！\u3000百合に興味を持つのは、素晴らしいことだと思いますっ！\u3000わ、わたしでよければ、布教させて頂きますっ」"
translation = "「아, 안 될 거 없어요! 백합에 관심을 갖는 건 멋진 일이라고 생각해요! 저, 저라도 괜찮다면 포교해 드릴게요!」"

[[dialogue]]
speaker = "unk"
original = "その後、ヒトリは昼休みギリギリまで百合に対する情熱を語ってくれて。"
translation = "그 후, 히토리는 점심시간이 끝날 때까지 백합에 대한 정열을 이야기해 주었다."

[[dialogue]]
speaker = "unk"
original = "俺はほんの少し、彼女との距離を縮められたような気がしたのだった。"
translation = "나는 아주 조금, 그녀와의 거리를 좁힌 것 같은 기분이 들었다."

