[[dialogue]]
speaker = "unk"
original = "第４話,流星教皇庁,B"
translation = "제4화, 유성 교황청, B"

[[dialogue]]
speaker = "unk"
original = "──翌日。"
translation = "──다음 날."

[[dialogue]]
speaker = "unk"
original = "週末ということで学園もお休みの今日だったが、俺たちは制服を着てある場所へと出向いていた。"
translation = "주말이라 학원도 쉬는 오늘이었지만, 우리는 교복을 입고 어떤 장소로 향하고 있었다."

[[dialogue]]
speaker = "unk"
original = "それというのが……"
translation = "그곳은 바로……"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「こ──ここが星見会長の邸宅……！」"
translation = "「여── 여기가 호시미 회장의 저택……!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ん～ゴージャスね♪\u3000ふふふ、お姫様になったみたいだわ」"
translation = "「음~ 호화롭네♪ 후후후, 공주님이 된 것 같아」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「やるわね！\u3000九浄の家とは違った趣があるわ」"
translation = "「대단하네! 쿠죠의 집과는 다른 정취가 있어」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ひええ……！\u3000初めて入るでありますっ！\u3000わたしのような者が踏み入って良いものでしょうか……！？」"
translation = "「히에에……! 처음 들어오는 것입니다! 저 같은 자가 발을 들여도 괜찮은 것일까요……!?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「フィ、フィ、フィオナ会長のお家に……！\u3000し、しし深呼吸しないと……！」"
translation = "「피, 피, 피오나 회장 댁에……! 스, 스스 심호흡해야 해……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「すごいな……」"
translation = "「대단하군……」"

[[dialogue]]
speaker = "unk"
original = "口々に豪奢な景観への感想を述べる。"
translation = "입을 모아 호화로운 경관에 대한 감상을 말한다."

[[dialogue]]
speaker = "unk"
original = "誰にそうしろと言われたわけでもないが、自然と口をついてしまうほどその場の空気が圧巻だった。"
translation = "누가 그렇게 하라고 시킨 것도 아니었지만, 자연스레 입에서 나올 정도로 그곳의 분위기가 압권이었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "『もしもし──』"
translation = "『여보세요──』"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "『夜分にごめんなさい、緋宮会長。フィオナです』"
translation = "『늦은 시간에 죄송합니다, 히노미야 회장. 피오나입니다』"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "『あ……うん。どうしたの』"
translation = "『아…… 응. 무슨 일이야』"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "『明日の休日、少しお時間もらえませんか。来てほしい場所があります』"
translation = "『내일 휴일, 잠시 시간 내주실 수 있나요. 와주셨으면 하는 장소가 있습니다』"

[[dialogue]]
speaker = "unk"
original = "夜、かかってきた連絡というのがフィオナからのもので……"
translation = "밤에 걸려온 연락이라는 것이 피오나로부터 온 것이었고……"

[[dialogue]]
speaker = "unk"
original = "用件としては、新星星徒会のみんなを連れて彼女の実家──流星教皇庁まで来てほしいとのことだった。"
translation = "용건으로는, 신성 성도회 모두를 데리고 그녀의 본가── 유성 교황청까지 와 달라는 것이었다."

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「あたしは何度か来たことあるけどな～。ま、初めてのヤツじゃそんな反応でも無理ねーか」"
translation = "「나는 몇 번 와봤지만 말이야~. 뭐, 처음인 녀석들은 저런 반응도 무리는 아니겠지」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「どーしてユウリ先輩まで得意げでありますかっ！\u3000羨ましいですけどっ！」"
translation = "「왜 유우리 선배까지 득의양양한 것입니까! 부럽지만요!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「あはは、うちも何度かお招きされちゃってまーす」"
translation = "「아하하, 나도 몇 번 초대받았지이~」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「興味深い調度品が随所に見られます。こうして入れただけで貴重な経験」"
translation = "「흥미로운 장식품들이 곳곳에서 보입니다. 이렇게 들어온 것만으로도 귀중한 경험」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "流星教皇庁──その内部に構えられた居住スペース。"
translation = "유성 교황청── 그 내부에 마련된 주거 공간."

[[dialogue]]
speaker = "unk"
original = "俺のような庶民じゃ、本来一生入ることのない領域だった。"
translation = "나 같은 서민은, 본래 평생 들어올 일 없는 영역이었다."

[[dialogue]]
speaker = "unk"
original = "ただ……"
translation = "다만……"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "『あら、そう？\u3000でも～、女の子の声がしたわねえ。一体どんな関係なんでしょう。デートのお誘い？』"
translation = "『어머, 그래? 그런데~, 여자아이 목소리가 났는데. 대체 어떤 관계일까. 데이트 신청?』"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「……？\u3000あの、やはりご迷惑だったでしょうか。お忙しいところ……」"
translation = "「……? 저, 혹시 폐가 되었을까요. 바쁘신데……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「いや！\u3000なんでもない。全然暇だったし──まさかあの教皇庁に入れるなんてと思ってさ。緊張してただけだ」"
translation = "「아니! 아무것도 아니야. 전혀 한가했고── 설마 그 교황청에 들어올 수 있을 줄이야 싶어서. 긴장했을 뿐이야」"

[[dialogue]]
speaker = "unk"
original = "どんなに豪勢な装いでも、ここは俺にとって『同級生の女子の家』になる。"
translation = "아무리 호화로운 모습이라도, 이곳은 나에게 『동급생 여자의 집』이 된다."

[[dialogue]]
speaker = "unk"
original = "そう考えると、男子ならば身がこわばってしまうのも致し方なかった。"
translation = "그렇게 생각하니, 남자라면 몸이 경직되는 것도 어쩔 수 없었다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「それで？\u3000私たちをわざわざ招待してくれたからには、きっと用があるのよね」"
translation = "「그래서? 우리를 일부러 초대해 줬으니, 분명 용건이 있겠지」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「はい。私にとって、誰よりも信頼のおける星徒会の皆さん……あなた方にだけは、改めて説明の責を果たすべきと考えました」"
translation = "「예. 저에게 있어, 누구보다 신뢰할 수 있는 성도회 여러분…… 여러분에게만은, 다시 한번 설명의 책임을 다해야 한다고 생각했습니다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「──確たる証拠をもって」"
translation = "「──확실한 증거를 가지고」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「！\u3000それって、もしかして昨日の……」"
translation = "「! 그거, 혹시 어제 그……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「はい。それでは、こちらへ」"
translation = "「예. 그럼, 이쪽으로」"

[[dialogue]]
speaker = "unk"
original = "真剣な表情のフィオナに連れられ、俺たちは別室へと移動する。"
translation = "진지한 표정의 피오나에게 이끌려, 우리는 별실로 이동한다."

[[dialogue]]
speaker = "unk"
original = "そして、その先にあったのは……"
translation = "그리고, 그 앞에 있던 것은……"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「！？」"
translation = "「!?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あら……さすがに驚きね」"
translation = "「어머…… 역시 놀랍네」"

[[dialogue]]
speaker = "unk"
original = "──ベッドに横たわる、一人の少女の姿だった。"
translation = "──침대에 누워 있는, 한 소녀의 모습이었다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「こ──これは……！」"
translation = "「이── 이것은……!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「アポロ……！？」"
translation = "「아폴로……!?」"

[[dialogue]]
speaker = "unk"
original = "その顔を見て、俺たちは誰しも驚愕する。"
translation = "그 얼굴을 보고, 우리는 누구든 경악한다."

[[dialogue]]
speaker = "unk"
original = "アポロ──そう名乗っていた仮面の少女の素顔と、目の前にあるそれはまったく同じだった。"
translation = "아폴로──라고 자칭했던 가면 소녀의 맨얼굴과, 눈앞에 있는 그것은 완전히 똑같았다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「彼女は──私の姉。本来の、星見フィオナ。５年前、眠りについたきりの<b>本人</b>です」"
translation = "「그녀는── 제 언니. 본래의, 호시미 피오나. 5년 전, 잠이 든 채인 <b>본인</b>입니다」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……なるほど、な」"
translation = "「……과연, 그렇군」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「なーんとなくは昨日のうちに聞いてたけど……こうして実際に見せられると、ねえ」"
translation = "「어렴풋이는 어제 들었지만…… 이렇게 실제로 보여주니, 말이지」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「わ、わたしは頭が混乱して参りました！\u3000昨日暴れてらっしゃったのはこのお方ではなく……！？」"
translation = "「와, 저는 머리가 혼란스러워졌습니다! 어제 날뛰고 계셨던 분은 이분이 아니라……!?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「あれは彼女を象ったまがい物──と言ったところでしょうか」"
translation = "「그것은 그녀를 본뜬 가짜──라고 해야 할까요」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……改めて聞こうか」"
translation = "「……다시 한번 물어볼까」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「はい。私と姉は……元より、ただ仲の良い双子でした。星見の家に生まれたという背景はありましたが」"
translation = "「예. 저와 언니는…… 원래부터, 그저 사이좋은 쌍둥이였습니다. 호시미 가문에 태어났다는 배경은 있었지만요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「しかし、５年前──姉は突如として覚めぬ眠りについてしまいました。それ以来、彼女はずっとここにおります」"
translation = "「하지만, 5년 전── 언니는 돌연 깨어나지 않는 잠에 빠지고 말았습니다. 그 이후로, 그녀는 계속 여기에 있습니다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「元々──『フィオナ』というのは星見の家の長女が襲名する名にすぎないのです」"
translation = "「원래── 『피오나』라는 것은 호시미 가문의 장녀가 습명하는 이름에 지나지 않습니다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「本来それは、妹の私ではなく姉に与えられた名でした。ですが、姉の昏睡をきっかけに私が『フィオナ』へと成り代わった」"
translation = "「본래 그것은, 여동생인 제가 아니라 언니에게 주어진 이름이었습니다. 하지만, 언니의 혼수를 계기로 제가 『피오나』로 대신하게 되었습니다」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（今のフィオナさんの本名は、エリシアさんだったかしら……？）"
translation = "（지금의 피오나 씨의 본명은, 엘리시아 씨였던가……?）"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（星見家の長女が空位になったとなれば大問題だ。入れ替われる妹がいたのは、教皇庁としても好都合だったんだろう）"
translation = "（호시미 가문의 장녀가 공석이 되었다면 큰 문제다. 대신할 여동생이 있었다는 건, 교황청으로서도 형편이 좋았겠지）"

[[dialogue]]
speaker = "unk"
original = "聞いた事情と、先日の出来事を突き合わせてみる。"
translation = "들었던 사정과, 지난번의 사건을 맞춰본다."

[[dialogue]]
speaker = "unk"
original = "それらを妹フィオナの立場で見れば──こうなる。"
translation = "그것들을 여동생 피오나의 입장에서 보면── 이렇게 된다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「５年前から昏睡したきりだった君のお姉さんが──突如『アポロ』として俺たちの前に現れた」"
translation = "「5년 전부터 혼수상태였던 네 누나가── 돌연 『아폴로』로서 우리 앞에 나타났다」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「自称・正義のヒーロー……だけど」"
translation = "「자칭・정의의 히어로……지만」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「実態は『リクリエの使徒』として、ですね……」"
translation = "「실체는 『리크리에의 사도』로서, 이군요……」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「それであんな好き勝手されてたら……そりゃーむかつくよね」"
translation = "「그래서 저렇게 제멋대로 굴고 있다면…… 당연히 짜증 나겠지」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「……はい。私にとって、姉は……かけがえのない家族でした。優しくて。いつも私と遊んでくれて」"
translation = "「……예. 저에게 언니는…… 둘도 없는 가족이었습니다. 상냥하고. 언제나 저와 놀아주었고요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「あんな──人に迷惑をかけて笑っているような方では、決してありませんでした」"
translation = "「저런── 남에게 폐를 끼치고 웃는 듯한 분은, 결코 아니었습니다」"

[[dialogue]]
speaker = "unk"
original = "フィオナは慈しむように、寝たきりになった少女の頬へ指を這わせた。"
translation = "피오나는 사랑스럽게, 누워 있는 소녀의 뺨에 손가락을 댄다."

[[dialogue]]
speaker = "unk"
original = "あの時、彼女の見せた激昂の理由も知れた。"
translation = "그때, 그녀가 보였던 격앙의 이유도 알게 되었다."

[[dialogue]]
speaker = "unk"
original = "『アポロ』という存在は明らかにリクリエの生み出した産物──それが事もあろうに、姉の姿かたちを模しているというのだ。"
translation = "『아폴로』라는 존재는 명백히 리크리에가 만들어낸 산물── 그것이 하필이면, 언니의 모습과 형태를 모방하고 있다는 것이다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「会長のお姉さんを利用するなんて、許せませんね……！」"
translation = "「회장님의 언니를 이용하다니, 용서할 수 없네요……!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「同感です。ただ……本物のお姉さんがこちらにいるのに、あの仮面の少女が現れたというのも不可解ですね」"
translation = "「동감입니다. 다만…… 진짜 언니가 여기에 계시는데, 그 가면 소녀가 나타났다는 것도 불가사의하네요」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「乗っ取られた……っつうわけじゃねえんだよな」"
translation = "「빼앗긴…… 건 아니라는 거군」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「それについてはまだ、私も整理ができていません」"
translation = "「그것에 대해서는 아직, 저도 정리가 되지 않았습니다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「……戻りましょう。これ以上は姉さんの耳に入れるべきことではありません」"
translation = "「……돌아갑시다. 이 이상은 언니의 귀에 들어갈 일은 아닙니다」"

