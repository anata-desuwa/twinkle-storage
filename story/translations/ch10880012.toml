[[dialogue]]
speaker = "unk"
original = "第２話,兄妹らしく……？,P"
translation = "제2화, 남매답게……?"

[[dialogue]]
speaker = "unk"
original = "リーナのことを知るには、俺がもっとリーナのお兄ちゃんらしくならないといけないのかもしれない。"
translation = "리나에 대해 알려면, 내가 좀 더 리나의 오빠다워져야 할지도 모른다."

[[dialogue]]
speaker = "リーナ"
original = "「お兄ちゃんとお買い物～♪\u3000ふんふふ～ん♪」"
translation = "「오빠랑 쇼핑~♪ 흥흥흐흥~♪」"

[[dialogue]]
speaker = "リーナ"
original = "「ねぇ、おやつ買っていい？\u3000チョコと～、キャラメルと～、あとウエハースも買ってほしいな。カードがおまけで付いてるんだよ♪」"
translation = "「저기, 간식 사도 돼? 초코랑~, 캐러멜이랑~, 그리고 웨하스도 사줬으면 좋겠어. 카드가 덤으로 들어있거든♪」"

[[dialogue]]
speaker = "unk"
original = "お菓子ばっかり食べてちゃダメだよ"
translation = "과자만 먹으면 안 돼"

[[dialogue]]
speaker = "リーナ"
original = "「は～い」"
translation = "「네~에」"

[[dialogue]]
speaker = "unk"
original = "俺がどうしてリーナと買い物に来たかというと──"
translation = "내가 왜 리나와 쇼핑을 하러 왔느냐 하면──"

[[dialogue]]
speaker = "コハルコ"
original = "『お姉ちゃんとして妹と何をしてるか？\u3000そうだなぁ……年が離れてるから、一緒に遊んだりはあまりないけど……ご飯作ったり、宿題見てあげたり……』"
translation = "『언니로서 여동생과 뭘 하냐고? 글쎄…… 나이 차이가 꽤 나서, 같이 놀거나 하는 건 별로 없지만…… 밥을 차려주거나, 숙제를 봐주거나……』"

[[dialogue]]
speaker = "コハルコ"
original = "『あと、買い物かな。食材とか、日用品とか。そういう普段食べるものや使うものを一緒に買うのって家族っぽい気がするかも』"
translation = "『그리고, 쇼핑일까. 식재료나, 일용품 같은 거. 그런 평소에 먹는 거나 쓰는 걸 같이 사는 게 가족 같은 느낌이 드는 것 같아』"

[[dialogue]]
speaker = "リーナ"
original = "「お兄ちゃんは何買うの？\u3000……ご飯の材料？\u3000何作るの？」"
translation = "「오빠는 뭐 사? ……저녁 재료? 뭐 만들 거야?」"

[[dialogue]]
speaker = "リーナ"
original = "「……ピーマンの肉詰め？\u3000え～、ピーマン！？\u3000リーナ、ピーマンきら～いっ！」"
translation = "「……피망 고기 채우기? 에~, 피망!? 리나, 피망 싫어~!」"

[[dialogue]]
speaker = "リーナ"
original = "「好き嫌いしちゃダメってわかってるけどぉ～……ピーマンは苦いから嫌いなのっ」"
translation = "「편식하면 안 된다는 건 알지만~…… 피망은 쓰니까 싫단 말이야」"

[[dialogue]]
speaker = "リーナ"
original = "「……苦くないピーマンを選ぶから大丈夫？\u3000できるだけ美味しく作る？\u3000お兄ちゃんがそう言うなら、挑戦してみるけど……」"
translation = "「……쓰지 않은 피망을 고를 테니까 괜찮다고? 최대한 맛있게 만들겠다고? 오빠가 그렇게 말한다면, 도전해 보겠지만……」"

[[dialogue]]
speaker = "リーナ"
original = "「うぅ……ピーマン嫌いだけど、お兄ちゃんが作ってくれたから、頑張って食べる。あ～……んっ」"
translation = "「으으…… 피망 싫지만, 오빠가 만들어 줬으니까, 힘내서 먹을게. 아~…… 냠」"

[[dialogue]]
speaker = "リーナ"
original = "「んんっ……！？\u3000やっぱり苦い……けど、思ったより苦くない、気がする……んくっ」"
translation = "「으응……!? 역시 써…… 하지만, 생각보다 안 쓴, 것 같아…… 꿀꺽」"

[[dialogue]]
speaker = "リーナ"
original = "「これなら我慢して食べられるかも……あむ……あむあむ……ごくん」"
translation = "「이거라면 참고 먹을 수 있을지도…… 우물…… 우물우물…… 꿀꺽」"

[[dialogue]]
speaker = "リーナ"
original = "「お兄ちゃん、ピーマン食べられたよっ！」"
translation = "「오빠, 피망 다 먹었어!」"

[[dialogue]]
speaker = "unk"
original = "偉いぞ、リーナ"
translation = "장하다, 리나"

[[dialogue]]
speaker = "リーナ"
original = "「えへへへ～♪\u3000ピーマン食べたご褒美に、リーナにナデナデして？」"
translation = "「에헤헤헤~♪ 피망 먹은 보상으로, 리나 쓰담쓰담 해줘?」"

[[dialogue]]
speaker = "unk"
original = "リーナは甘えん坊だな"
translation = "리나는 어리광쟁이구나"

[[dialogue]]
speaker = "リーナ"
original = "「そうなの<emoji=heart04>\u3000お兄ちゃんが大好きだからつい甘えちゃうの<emoji=heart04>」"
translation = "「맞아<emoji=heart04> 오빠를 너무 좋아하니까 나도 모르게 어리광 부리게 돼<emoji=heart04>」"

[[dialogue]]
speaker = "リーナ"
original = "「えへへ<emoji=heart04>\u3000お兄ちゃんにナデナデされるの好き～<emoji=heart04>」"
translation = "「에헤헤<emoji=heart04> 오빠가 쓰담쓰담 해주는 거 좋아~<emoji=heart04>」"

[[dialogue]]
speaker = "リーナ"
original = "「リーナはお兄ちゃん好き……スキ……ダイスキ……」"
translation = "「리나는 오빠가 좋아…… 좋아…… 정말 좋아……」"

[[dialogue]]
speaker = "リーナ"
original = "「お兄ちゃん……リーナの、お兄ちゃん……」"
translation = "「오빠…… 리나의, 오빠……」"

[[dialogue]]
speaker = "リーナ"
original = "「お兄ちゃん……嫌い……いらない……」"
translation = "「오빠…… 싫어…… 필요 없어……」"

[[dialogue]]
speaker = "unk"
original = "リーナ……？"
translation = "리나……?"

[[dialogue]]
speaker = "リーナ"
original = "「──ッ！？\u3000お兄ちゃんっ！？\u3000リーナ、今、何しようとして……？」"
translation = "「──윽!? 오빠!? 리나, 지금, 뭘 하려고……?」"

[[dialogue]]
speaker = "リーナ"
original = "「どうして……なんだろう……？\u3000お兄ちゃんのこと大好きなはずなのに、胸の奥がズキズキするよ……」"
translation = "「어째서…… 일까……? 오빠를 정말 좋아할 텐데, 가슴 속이 욱신욱신 거려……」"

[[dialogue]]
speaker = "リーナ"
original = "「お兄ちゃんのこと好きって思えば思うほど、何もかもズタズタにしたくなるの……」"
translation = "「오빠를 좋아한다고 생각하면 할수록, 모든 걸 갈가리 찢어버리고 싶어져……」"

[[dialogue]]
speaker = "unk"
original = "今はおやつを食べよう"
translation = "지금은 간식을 먹자"

[[dialogue]]
speaker = "リーナ"
original = "「！\u3000そうだ、おやつもあるんだった！\u3000お兄ちゃんも一緒に食べようねっ」"
translation = "「! 맞아, 간식도 있었지! 오빠도 같이 먹자」"

[[dialogue]]
speaker = "リーナ"
original = "「おやつ食べたらゲームしよっ。リーナ負けないんだからっ」"
translation = "「간식 먹고 게임 하자. 리나 지지 않을 거니까」"

[[dialogue]]
speaker = "リーナ"
original = "「んん……すぅ……ムニャムニャ……」"
translation = "「으음…… 즈으…… 냐암냐암……」"

[[dialogue]]
speaker = "シアン"
original = "「よう、邪魔するぜ──おわっと！？\u3000どうしてリーナがあんたんちにいるんだよ！？」"
translation = "「여어, 실례하지── 엇!? 왜 리나가 당신 집에 있는 거야!?」"

[[dialogue]]
speaker = "リーナ"
original = "「ん～……ムニャ……お兄ちゃん……」"
translation = "「음~…… 냐암…… 오빠……」"

[[dialogue]]
speaker = "シアン"
original = "「すやすや寝てやがる。導火線に火のついた爆弾抱えてる気分だぜ……」"
translation = "「쌔근쌔근 잘도 자고 있구만. 도화선에 불붙은 폭탄을 안고 있는 기분이라고……」"

[[dialogue]]
speaker = "シアン"
original = "「まぁいいや。リーナについてわかったことだが、会長さんにも共有しておくべきだと思ってな」"
translation = "「뭐 됐어. 리나에 대해 알아낸 건데, 회장님하고도 공유해두는 게 좋을 것 같아서 말이야」"

[[dialogue]]
speaker = "シアン"
original = "「まずリーナの名前だが……最初は偽名かと思ったんだが、普通に本名だった。おかげで調査するのは苦労しなかった。後味は悪かったがな」"
translation = "「우선 리나의 이름인데…… 처음엔 가명인가 했더니, 그냥 본명이었어. 덕분에 조사하는 건 어렵지 않았지. 뒷맛은 나빴지만 말이야」"

[[dialogue]]
speaker = "シアン"
original = "「<ruby>火憑<rt>ひづき</rt></ruby>リーナ。生まれは流星市国からも遠くない場所で、会社員の父とパート勤めの母の間に生まれた、ごくごく普通の女の子だ」"
translation = "「히즈키 리나. 태어난 곳은 유성시국에서도 멀지 않은 곳으로, 회사원인 아버지와 파트타임 일을 하는 어머니 사이에서 태어난, 아주 평범한 여자아이야」"

[[dialogue]]
speaker = "シアン"
original = "「けどな、リーナには本当に兄貴がいたんだ。リーナが生まれる前に死んじまったがな」"
translation = "「하지만 말이야, 리나에게는 정말로 오빠가 있었어. 리나가 태어나기도 전에 죽어버렸지만 말이지」"

[[dialogue]]
speaker = "シアン"
original = "「リーナの兄は幼くして重い病を患い、長い闘病生活も実らず亡くなった。その後に生まれたのがリーナだ」"
translation = "「리나의 오빠는 어릴 적에 중병을 앓아서, 긴 투병 생활도 보람 없이 죽었어. 그 후에 태어난 게 리나다.」"

[[dialogue]]
speaker = "シアン"
original = "「だから両親はいつもリーナに言っていたそうだ。『本当はお兄ちゃんがいたんだよ』って」"
translation = "「그래서 부모님은 항상 리나에게 말했다더군. 『사실은 오빠가 있었단다』라고.」"

[[dialogue]]
speaker = "シアン"
original = "「『お兄ちゃんが天国から見守ってくれてる』『お兄ちゃんと違ってリーナは健康でよかった』とか、何かにつけて“お兄ちゃん”が出てくるんだ」"
translation = "「『오빠가 천국에서 지켜봐 주고 있어』 『오빠랑 다르게 리나는 건강해서 다행이야』라든가, 걸핏하면 “오빠” 이야기가 나오는 거야.」"

[[dialogue]]
speaker = "シアン"
original = "「要するに、リーナの両親は兄のことをふっ切れてなかったんだろうな。写真でしか兄のことを知らないリーナにとっちゃ重荷だろうよ」"
translation = "「요컨대, 리나의 부모님은 아들을 잊지 못했던 거겠지. 사진으로밖에 오빠를 모르는 리나에게는 큰 짐이었을 거야.」"

[[dialogue]]
speaker = "シアン"
original = "「自分を見ないで、死んだ兄貴にずっと執着する両親……まぁちょっとした呪いだな。そりゃ歪むっての」"
translation = "「자신을 보지 않고, 죽은 오빠에게만 계속 집착하는 부모님…… 뭐, 일종의 저주지. 그러니 비뚤어질 수밖에.」"

[[dialogue]]
speaker = "unk"
original = "リーナの両親は……？"
translation = "리나의 부모님은……?"

[[dialogue]]
speaker = "シアン"
original = "「死んでる」"
translation = "「죽었어.」"

[[dialogue]]
speaker = "シアン"
original = "「交通事故だってよ。リーナも一緒に死んだとみられていたが、遺体は見つからず……」"
translation = "「교통사고였다더군. 리나도 함께 죽은 줄 알았지만, 시신은 발견되지 않았고……」"

[[dialogue]]
speaker = "シアン"
original = "「そして、あたしたちの前にコラプサーとして姿を現したってわけだ。あたしが調べられたのはそこまでだ」"
translation = "「그리고, 우리 앞에 콜랩서로서 모습을 드러냈다는 거지. 내가 조사한 건 여기까지야.」"

[[dialogue]]
speaker = "シアン"
original = "「コラプサーとか関係なくリーナには気を付けろ。リーナは“お兄ちゃん”って存在を恨んでるかもしれねえ」"
translation = "「콜랩서고 뭐고 간에 리나를 조심해. 리나는 “오빠”라는 존재를 원망하고 있을지도 몰라.」"

[[dialogue]]
speaker = "シアン"
original = "「それがどうして今のお兄ちゃん大好きっ娘になってるかは、あたしも知らねえがな」"
translation = "「그게 어째서 지금의 오빠 바라기 소녀가 됐는지는, 나도 모르겠지만 말이야.」"

[[dialogue]]
speaker = "シアン"
original = "「あたしがしてやれるのはここまでだ。じゃあな」"
translation = "「내가 해줄 수 있는 건 여기까지야. 그럼 이만.」"

[[dialogue]]
speaker = "リーナ"
original = "「ん～……誰かいたの……？」"
translation = "「으음~…… 누가 있었어……?」"

[[dialogue]]
speaker = "リーナ"
original = "「でもどうでもいいや。リーナにはお兄ちゃんがいるんだから」"
translation = "「하지만 아무래도 좋아. 리나에겐 오빠가 있으니까.」"

[[dialogue]]
speaker = "リーナ"
original = "「リーナはお兄ちゃん以外いらないの。だから──」"
translation = "「리나는 오빠 말고는 필요 없어. 그러니까──」"

[[dialogue]]
speaker = "リーナ"
original = "「お兄ちゃんはずっとリーナのお兄ちゃんでいてね……？」"
translation = "「오빠는 계속 리나의 오빠로 있어 줘……?」"

