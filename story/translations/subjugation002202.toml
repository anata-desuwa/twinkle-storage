[[dialogue]]
speaker = "unk"
original = "大聖堂のカフェテリアへと話す場所を移したミネコは、頼んだコーヒーに口を付ける。"
translation = "대성당 카페테리아로 자리를 옮긴 미네코는 주문한 커피를 한 모금 마신다."

[[dialogue]]
speaker_original = "ミネコ"
speaker_translation = "미네코"
original = "「ん～♪\u3000大聖堂カフェテリア、流星市国で１、２を争う程に料理が美味しいと聞いていたけど、コーヒーも絶品だね～♪」"
translation = "「음~♪ 대성당 카페테리아, 유성시국에서 한두 손가락 안에 꼽힐 정도로 요리가 맛있다고 들었는데 커피도 일품이네~♪」"

[[dialogue]]
speaker_original = "ミネコ"
speaker_translation = "미네코"
original = "「価格はすごく安いのに、いい豆を使ってるよ」"
translation = "「가격은 엄청 싼데 좋은 원두를 쓰고 있어.」"

[[dialogue]]
speaker_original = "ミネコ"
speaker_translation = "미네코"
original = "「それに、入れ方も素人技じゃない。有名なバリスタでも居るのかな～？」"
translation = "「게다가 내리는 솜씨도 아마추어 수준이 아닌걸. 유명한 바리스타라도 있는 걸까~?」"

[[dialogue]]
speaker = "unk"
original = "俺が同じくコーヒー、ジュエリーが紅茶を飲んで、落ち着いたところで、ミネコは再び口を開く。"
translation = "내가 똑같이 커피, 주얼리가 홍차를 마시고 진정이 된 시점에 미네코는 다시 입을 열었다."

[[dialogue]]
speaker_original = "ミネコ"
speaker_translation = "미네코"
original = "「ふふっ♪\u3000会長、その顔はまだ、私が怪盗だって信じられない顔だね？」"
translation = "「후훗♪ 회장님, 그 표정은 아직 내가 괴도라는 걸 믿지 못하겠다는 표정이네?」"

[[dialogue]]
speaker = "unk"
original = "『大怪盗フランボウ』……ジュエリーから因縁があると聞かされる以前から、その名前は知っていた。"
translation = "『대괴도 플랑보』…… 주얼리에게 악연이 있다는 이야기를 듣기 이전부터 그 이름은 알고 있었다."

[[dialogue]]
speaker = "unk"
original = "３年程前から、世界各国の高価な品を盗み出し、テレビや新聞、ネットニュースでも話題に上がる程の世界的に有名な怪盗の１人だからだ。"
translation = "3년쯤 전부터 세계 각국의 고가품을 훔쳐내어 TV나 신문, 인터넷 뉴스에서도 화제가 될 정도의 세계적으로 유명한 괴도 중 한 명이기 때문이다."

[[dialogue]]
speaker = "unk"
original = "しかし――"
translation = "하지만──"

[[dialogue]]
speaker = "unk"
original = "大怪盗フランボウ"
translation = "대괴도 플랑보."

[[dialogue]]
speaker = "unk"
original = "確か長身の男性のはずじゃ……？"
translation = "분명 장신의 남성일 텐데……?"

[[dialogue]]
speaker = "unk"
original = "写真や映像で撮られた姿は『長身の紳士』――男性だったはずだ。ミネコとは似ても似つかない。"
translation = "사진이나 영상에 찍힌 모습은 『장신의 신사』── 남성이었을 터다. 미네코와는 닮은 구석이라곤 전혀 없다."

[[dialogue]]
speaker_original = "ジュエリー（究明）"
speaker_translation = "쥬얼리(규명)"
original = "「――それがおそらく、彼女の能力なのだろう」"
translation = "「──그게 아마 그녀의 능력일 거야.」"

[[dialogue]]
speaker_original = "ミネコ"
speaker_translation = "미네코"
original = "「ふふっ♪\u3000仕事する時は、そういう風に『変装』しているからね。怪盗のイメージとしては、それが王道でしょ？」"
translation = "「후훗♪ 일할 때는 그런 식으로 『변장』하거든. 괴도의 이미지로서는 그게 정석이잖아?」"

[[dialogue]]
speaker_original = "ミネコ"
speaker_translation = "미네코"
original = "「さて、改めて、『本当』の自己紹介をさせてもらおうかな♪」"
translation = "「자, 그럼 다시 한번 『진짜』 자기소개를 해볼까♪」"

[[dialogue]]
speaker_original = "ミネコ"
speaker_translation = "미네코"
original = "「私はミネコ・フランボワーズ。世間を騒がす『大怪盗フランボウ』、その正体である可愛い女の子だよ<emoji=heart04>」"
translation = "「나는 미네코 플랑보와즈. 세상을 떠들썩하게 만드는 『대괴도 플랑보』, 그 정체인 귀여운 여자아이야<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミネコ"
speaker_translation = "미네코"
original = "「あっ、ちなみにミネコ・フランボワーズも偽名なので、悪しからず♪\u3000でも、自分で考えて付けたお気に入りネームだから、普段はミネコって呼んでくれると嬉しいな♪」"
translation = "「앗, 참고로 미네코 플랑보와즈도 가명이니까 너무 서운해하지 마♪ 그래도 직접 생각해서 지은 마음에 드는 이름이니까, 평소에는 미네코라고 불러주면 좋겠어♪」"

[[dialogue]]
speaker_original = "ミネコ"
speaker_translation = "미네코"
original = "「一応、ジュエリーとは単純に探偵と怪盗っていう間柄以外にも、『選星者』として、『名探偵』と『大怪盗』で対の役職にあるって感じかな」"
translation = "「일단 주얼리와는 단순한 탐정과 괴도라는 관계 말고도, 『선성자』로서 『명탐정』과 『대괴도』라는 대칭되는 역직에 있는 느낌이랄까.」"

[[dialogue]]
speaker_original = "ミネコ"
speaker_translation = "미네코"
original = "「まあでも、私がプライベートで他の選星者と顔を合わせたのは、今日が初めてなんだけどね～♪」"
translation = "「뭐, 그래도 내가 사적으로 다른 선성자와 얼굴을 마주한 건 오늘이 처음이지만 말이야~♪」"

[[dialogue]]
speaker = "unk"
original = "『選星者』――それは、ジュエリー曰く、女神から『役職』を授けられた者のことを指すという。"
translation = "『선성자』── 그것은 주얼리의 말에 따르면 여신으로부터 『역직』을 부여받은 자를 가리킨다고 한다."

[[dialogue]]
speaker = "unk"
original = "選星者は天からの啓示により、生まれながらにそのことを自覚し、役職に応じた特殊な能力を与えられているという。"
translation = "선성자는 하늘의 계시에 의해 태어날 때부터 그 사실을 자각하며, 역직에 따른 특수한 능력을 부여받는다고 한다."

[[dialogue]]
speaker = "unk"
original = "ジュエリーの役職は『名探偵』。"
translation = "주얼리의 역직은 『명탐정』."

[[dialogue]]
speaker = "unk"
original = "それから以前仲良くなった『<ruby>祓魔師<rt>エクソシスト</rt></ruby>』の『恵原フェリシー』。他には『予言者』なども存在しているらしい。"
translation = "그리고 이전에 친해졌던 『엑소시스트』인 『에바라 펠리시』. 그 외에는 『예언자』 등도 존재하고 있는 모양이다."

[[dialogue]]
speaker = "unk"
original = "そして、今回出会ったミネコが『大怪盗』というわけだ。"
translation = "그리고 이번에 만난 미네코가 『대괴도』라는 것이다."

[[dialogue]]
speaker = "unk"
original = "どうしてわざわざ自分の正体を？"
translation = "어째서 굳이 자신의 정체를?"

[[dialogue]]
speaker_original = "ミネコ"
speaker_translation = "미네코"
original = "「うんうん、当然の疑問だよね！\u3000その理由は――」"
translation = "「응응, 당연한 의문이지! 그 이유는──」"

[[dialogue]]
speaker_original = "ミネコ"
speaker_translation = "미네코"
original = "「キミたちと仲良くなりたいからだよ♪」"
translation = "「너희와 친해지고 싶어서야♪」"

[[dialogue]]
speaker_original = "ミネコ"
speaker_translation = "미네코"
original = "「仲良くなるには、まずは自分から名乗らなくちゃでしょ？」"
translation = "「친해지려면 우선 자신부터 이름을 밝혀야 하잖아?」"

[[dialogue]]
speaker_original = "ミネコ"
speaker_translation = "미네코"
original = "「かつて、ジュエリーのご先祖様……世界三大探偵の『ブラウン神父』も、初代の大怪盗フランボウと、最終的に仲良くなったって聞くしね♪」"
translation = "「예전에 주얼리의 조상님…… 세계 3대 탐정인 『브라운 신부』도 초대 대괴도 플랑보와 결국엔 친해졌다고 들었거든♪」"

[[dialogue]]
speaker_original = "ジュエリー（究明）"
speaker_translation = "쥬얼리(규명)"
original = "「確かに、同じ選星者同士だ。和解できるなら、それに越したことはない。だが――」"
translation = "「확실히 같은 선성자끼리다. 화해할 수 있다면 그보다 좋은 건 없지. 하지만──」"

[[dialogue]]
speaker_original = "ジュエリー（究明）"
speaker_translation = "쥬얼리(규명)"
original = "「これまで３年間、キミは幾つもの貴重な品を盗み出してきた。その事実は消えない。キミは自首して、窃盗の罪を償う気はあるのかい？」"
translation = "「지금까지 3년간 너는 수많은 귀중품을 훔쳐 왔다. 그 사실은 사라지지 않아. 너는 자수해서 절도죄를 갚을 마음이 있는 건가?」"

[[dialogue]]
speaker_original = "ミネコ"
speaker_translation = "미네코"
original = "「ふふっ♪」"
translation = "「후훗♪」"

[[dialogue]]
speaker_original = "ミネコ"
speaker_translation = "미네코"
original = "「――もちろん、ないよ！\u3000怪盗はこれからも続けるし、捕まるつもりもさらさらない」"
translation = "「──물론, 없어! 괴도는 앞으로도 계속할 거고, 잡힐 생각도 추호도 없거든.」"

[[dialogue]]
speaker = "unk"
original = "なのに、正体を明かしたのか……？"
translation = "그런데도 정체를 밝힌 건가……?"

[[dialogue]]
speaker_original = "ミネコ"
speaker_translation = "미네코"
original = "「うん。別に、たかだか正体を明かした程度のことで、私は捕まったりしないからね♪」"
translation = "「응. 딱히 고작 정체를 밝힌 정도로는 난 잡히지 않으니까 말이야♪」"

[[dialogue]]
speaker_original = "ジュエリー（究明）"
speaker_translation = "쥬얼리(규명)"
original = "「キミの能力は、もう見当が付いている。明解に換言するならば……『情報改竄』。――そうだろう？」"
translation = "「네 능력은 이미 짐작이 가. 명쾌하게 환언하자면…… 『정보 개찬』. ──그렇지?」"

[[dialogue]]
speaker_original = "ミネコ"
speaker_translation = "미네코"
original = "「さすがは『名探偵』♪\u3000その通～り！」"
translation = "「역시 『명탐정』♪ 정~답!」"

[[dialogue]]
speaker_original = "ミネコ"
speaker_translation = "미네코"
original = "「私は選星者『大怪盗』としての能力で、物理的な証拠はもちろん、人の記憶さえも、やろうと思えば書き換えることができる」"
translation = "「나는 선성자 『대괴도』로서의 능력으로 물리적인 증거는 물론, 사람의 기억조차도 마음만 먹으면 다시 쓸 수 있어.」"

[[dialogue]]
speaker_original = "ミネコ"
speaker_translation = "미네코"
original = "「たとえば今回みたいに、書類を偽造して最初から流星学園に在籍していたという『記録』を作り出したり――」"
translation = "「예를 들어 이번처럼 서류를 위조해서 처음부터 유성 학원에 재적하고 있었다는 『기록』을 만들어 내거나──」"

[[dialogue]]
speaker_original = "ミネコ"
speaker_translation = "미네코"
original = "「周囲の記憶に存在していない私の情報を、ちょちょいっ♪\u3000と上書きしたりね。その逆で、情報を『消す』こともできるよ」"
translation = "「주변 기억에 존재하지 않는 내 정보를 뚝딱♪ 하고 덮어쓰기도 하지. 반대로 정보를 『지우는』 것도 가능해.」"

[[dialogue]]
speaker_original = "ジュエリー（究明）"
speaker_translation = "쥬얼리(규명)"
original = "「そう。元々、能力の推測はしていた。『大怪盗』は現場に都合の悪い証拠を決して残さない」"
translation = "「그래. 원래부터 능력 추측은 하고 있었어. 『대괴도』는 현장에 불리한 증거를 절대 남기지 않지.」"

[[dialogue]]
speaker_original = "ジュエリー（究明）"
speaker_translation = "쥬얼리(규명)"
original = "「指紋や足跡はもちろん、監視カメラに映らず、全てのセンサーに感知されず――更には、直接追っても幻のように消えて、物理的に視認できなくなる」"
translation = "「지문이나 발자국은 물론 감시 카메라에 찍히지 않고, 모든 센서에 감지되지 않으며── 더 나아가서는 직접 뒤쫓아도 환상처럼 사라져 물리적으로 시인할 수 없게 된다.」"

[[dialogue]]
speaker_original = "ミネコ"
speaker_translation = "미네코"
original = "「ふふっ♪\u3000人間の五感もまた、情報だからね～♪\u3000都合が悪ければ、その情報を改ざんして、目の前に存在しない『透明人間』になってしまえばいい」"
translation = "「후훗♪ 인간의 오감도 결국 정보니까 말이야~♪ 상황이 불리하면 그 정보를 개찬해서 눈앞에 존재하지 않는 『투명 인간』이 되어버리면 그만이야.」"

[[dialogue]]
speaker = "unk"
original = "反則級の能力じゃないか……！"
translation = "반칙급 능력이잖아……!"

[[dialogue]]
speaker_original = "ジュエリー（究明）"
speaker_translation = "쥬얼리(규명)"
original = "「ああ。『捕まらない』という１点において、彼女はこの学園の星騎士……いや」"
translation = "「아아. 『잡히지 않는다』는 한 점에 있어서 그녀는 이 학원의 성기사…… 아니.」"

[[dialogue]]
speaker_original = "ジュエリー（究明）"
speaker_translation = "쥬얼리(규명)"
original = "「世界で最強の能力者と言っていいだろう。故に――」"
translation = "「세계에서 최강의 능력자라고 해도 과언이 아니겠지. 고로──」"

[[dialogue]]
speaker_original = "ジュエリー（究明）"
speaker_translation = "쥬얼리(규명)"
original = "「今こうして目の前にいても、物理的な証拠を何も残さないから法的に捕まえることができないし、無理矢理拘束しようとしても、逃げられるからできない」"
translation = "「지금 이렇게 눈앞에 있어도 물리적인 증거를 아무것도 남기지 않으니 법적으로 잡을 수 없고, 억지로 구속하려 해도 도망칠 테니 불가능해.」"

[[dialogue]]
speaker_original = "ミネコ"
speaker_translation = "미네코"
original = "「そういうこと♪\u3000ああ、試しにここで大声で叫んで、周りにバラしてくれて構わないよ？」"
translation = "「그런 말씀♪ 아, 시험 삼아 여기서 큰 소리로 외쳐서 주변에 알려도 상관없어?」"

[[dialogue]]
speaker_original = "ミネコ"
speaker_translation = "미네코"
original = "「その場合は、ちょちょいっとみんなの記憶を書き換えて、上手い具合に修正しちゃうから♪」"
translation = "「그 경우에는 뚝딱 모두의 기억을 다시 써서 좋게 좋게 수정해 버릴 테니까♪」"

[[dialogue]]
speaker = "unk"
original = "ニコニコしながら言うミネコ。おそらく、本当にできてしまうのだろう。"
translation = "싱글벙글 웃으며 말하는 미네코. 아마 정말로 할 수 있는 것이리라."

[[dialogue]]
speaker = "unk"
original = "一体、キミの目的はなんなんだ……？"
translation = "도대체 네 목적은 뭐지……?"

[[dialogue]]
speaker_original = "ミネコ"
speaker_translation = "미네코"
original = "「さっきも言った通り、キミたちと仲良くなりたいってのは本当だよ」"
translation = "「아까도 말했듯이 너희와 친해지고 싶다는 건 진심이야.」"

[[dialogue]]
speaker_original = "ミネコ"
speaker_translation = "미네코"
original = "「でもまぁ、それだけじゃ当然納得できないよね～」"
translation = "「하지만 뭐, 그것만으로는 당연히 납득할 수 없겠지~」"

[[dialogue]]
speaker_original = "ミネコ"
speaker_translation = "미네코"
original = "「だけど――私の目的については、ひとまず『謎』ということで♪」"
translation = "「하지만── 내 목적에 대해서는 우선 『수수께끼』인 걸로♪」"

[[dialogue]]
speaker_original = "ミネコ"
speaker_translation = "미네코"
original = "「ほら、ジュエリーと会長は、『名探偵』とその助手、なんでしょ？」"
translation = "「자, 주얼리와 회장은 『명탐정』과 그 조수잖아?」"

[[dialogue]]
speaker_original = "ミネコ"
speaker_translation = "미네코"
original = "「ならば、この大怪盗フランボウの目的を、推理して当ててくれたまえ♪\u3000ふっふっふ～♪」"
translation = "「그렇다면 이 대괴도 플랑보의 목적을 추리해서 맞춰보시지♪ 훗훗후~♪」"

[[dialogue]]
speaker_original = "ミネコ"
speaker_translation = "미네코"
original = "「そういうわけで改めて、これからよろしくね、会長♪」"
translation = "「그런 고로 다시 한번, 앞으로 잘 부탁해, 회장님♪」"

[[dialogue]]
speaker = "unk"
original = "彼女はそう言うと、有無を言わさず俺の手を取って、ぶんぶんと握手する。"
translation = "그녀는 그렇게 말하더니 다짜고짜 내 손을 잡고 붕붕 흔들며 악수한다."

[[dialogue]]
speaker = "unk"
original = "それから、悪戯好きの子供のように、楽しそうな笑顔を浮かべてみせるのだった。"
translation = "그러고는 장난기 많은 아이처럼 즐거운 미소를 지어 보이는 것이었다."

