[[dialogue]]
speaker = "unk"
original = "第２話,各国のバレンタイン事情,P"
translation = "제2화, 각국의 발렌타인 사정, P"

[[dialogue]]
speaker = "unk"
original = "バレンタインの時期になると、カフェテリアもバレンタイン仕様になっていて、限定メニューなんかも出ている。"
translation = "발렌타인 시기가 되자 카페테리아도 발렌타인 사양으로 바뀌어 있고, 한정 메뉴 같은 것도 나오고 있다."

[[dialogue]]
speaker = "イレーナ"
original = "「本当にバレンタイン一色ですね……」"
translation = "「정말 발렌타인 일색이네요……」"

[[dialogue]]
speaker = "エリス"
original = "「そうですね、恋人が想い合う日は、どの国でも大切なものなのでしょう」"
translation = "「그렇네요, 연인이 서로를 생각하는 날은 어느 나라에서나 소중한 것이겠죠」"

[[dialogue]]
speaker = "unk"
original = "珍しい組み合わせだ"
translation = "드문 조합이네"

[[dialogue]]
speaker = "イレーナ"
original = "「あ、会長さん、こんにちは」"
translation = "「아, 회장님, 안녕하세요」"

[[dialogue]]
speaker = "イレーナ"
original = "「私たち、海外の出身で、流星学園では同学年なので、しばしば情報交換をしているんです」"
translation = "「저희, 해외 출신이고 유성 학원에서는 같은 학년이라 종종 정보 교환을 하고 있어요」"

[[dialogue]]
speaker = "イレーナ"
original = "「エリスさんは私よりも流星市国での暮らしが長いので、いろいろと教えていただきました」"
translation = "「에리스 씨는 저보다 유성 시국에서의 생활이 길어서 여러 가지로 가르쳐 주셨답니다」"

[[dialogue]]
speaker = "エリス"
original = "「私など微力だと思いますが、お役に立てたのなら何よりです」"
translation = "「저 따위가 미력하겠지만, 도움이 되었다면 다행입니다」"

[[dialogue]]
speaker = "イレーナ"
original = "「実はさっき、エリスさんとバレンタインの風習について話していまして」"
translation = "「실은 방금 에리스 씨와 발렌타인 풍습에 대해 이야기하고 있었거든요」"

[[dialogue]]
speaker = "エリス"
original = "「私はフランス、イレーナさんがイタリアの出身なので、国ごとにどんな違いがあるのかと気になったんです」"
translation = "「저는 프랑스, 이레이나 씨는 이탈리아 출신이라 나라마다 어떤 차이가 있는지 궁금했거든요」"

[[dialogue]]
speaker = "unk"
original = "具体的にはどう違うの？"
translation = "구체적으로 어떻게 달라?"

[[dialogue]]
speaker = "イレーナ"
original = "「そうですね……例えばイタリアと日本の違いですが、バレンタインに女性から男性にチョコレートを渡すのは日本独自の風習です」"
translation = "「그렇네요…… 예를 들어 이탈리아와 일본의 차이입니다만, 발렌타인에 여성이 남성에게 초콜릿을 건네는 건 일본 독자적인 풍습이에요」"

[[dialogue]]
speaker = "イレーナ"
original = "「イタリアでは男性から女性にプレゼントを渡す方が多いです。赤いバラの花束が定番ですね」"
translation = "「이탈리아에서는 남성이 여성에게 선물을 주는 경우가 많아요. 빨간 장미 꽃다발이 정석이죠」"

[[dialogue]]
speaker = "イレーナ"
original = "「夜はお洒落なレストランでディナーをしたりします。レストランの予約がもっとも難しい日、なんて言われることもありますね」"
translation = "「밤에는 멋진 레스토랑에서 저녁 식사를 하기도 해요. 레스토랑 예약이 가장 어려운 날, 이라고 불리기도 하죠」"

[[dialogue]]
speaker = "エリス"
original = "「その点はフランスも近いですね」"
translation = "「그 점은 프랑스도 비슷하네요」"

[[dialogue]]
speaker = "エリス"
original = "「『恋人の日』というのは変わりませんが、すでにカップルになっている２人が愛を確かめ合ったり、愛を深めたりする日……といった感じでしょうか」"
translation = "「『연인의 날』이라는 건 변함없지만, 이미 커플이 된 두 사람이 사랑을 확인하거나 사랑을 깊게 하는 날……이라는 느낌일까요」"

[[dialogue]]
speaker = "エリス"
original = "「映画を見に行ったり、普段行かない高級なお店でディナーを楽しんだり、小旅行に出かけたりと、恋人と特別な時間を過ごすことが多いです」"
translation = "「영화 보러 가거나 평소 가지 않는 고급 식당에서 저녁을 즐기거나 소풍을 떠나는 등 연인과 특별한 시간을 보내는 일이 많아요」"

[[dialogue]]
speaker = "エリス"
original = "「プレゼントとしては、花束やメッセージカード、アクセサリーや香水などが一般的でしょうか」"
translation = "「선물로는 꽃다발이나 메시지 카드, 액세서리나 향수 등이 일반적일까요」"

[[dialogue]]
speaker = "エリス"
original = "「こちらのように『告白の日』ではないので、ホワイトデーはありませんね」"
translation = "「이곳처럼 『고백의 날』은 아니라서 화이트데이는 없답니다」"

[[dialogue]]
speaker = "unk"
original = "チョコレートは渡さないの？"
translation = "초콜릿은 안 줘?"

[[dialogue]]
speaker = "イレーナ"
original = "「いいえ、チョコレート<b>も</b>贈ります」"
translation = "「아니요, 초콜릿<b>도</b> 선물해요」"

[[dialogue]]
speaker = "イレーナ"
original = "「チョコレートはバレンタインの贈り物の有力な選択肢の１つですが、バレンタイン＝チョコレート、というわけではありません」"
translation = "「초콜릿은 발렌타인 선물의 유력한 선택지 중 하나지만, 발렌타인=초콜릿인 건 아니에요」"

[[dialogue]]
speaker = "エリス"
original = "「ヨーロッパはだいたい似たような感じだと思います。でも他の国の話も聞きたいところですね」"
translation = "「유럽은 대체로 비슷한 느낌이라고 생각해요. 하지만 다른 나라 이야기도 듣고 싶네요」"

[[dialogue]]
speaker = "unk"
original = "あ、ちょうどいいところに"
translation = "아, 마침 잘 왔네"

[[dialogue]]
speaker = "ジグ"
original = "「おや、君たちもお茶しに来たのかい？」"
translation = "「오야, 자네들도 차 마시러 온 건가?」"

[[dialogue]]
speaker = "梨緒"
original = "「私たちに何か用か？\u3000今なら別に構わないが」"
translation = "「우리에게 무슨 용건이라도? 지금이라면 상관없다만」"

[[dialogue]]
speaker = "unk"
original = "２人はイギリスとドイツの出身だよね？"
translation = "둘은 영국이랑 독일 출신이지?"

[[dialogue]]
speaker = "イレーナ"
original = "「今、各国のバレンタインについてお話していたところなんです。それで、おふたりからもご自分の国のバレンタインについてお聞きしたいなと」"
translation = "「지금 각국의 발렌타인에 대해 이야기하던 중이었어요. 그래서 두 분께도 자기 나라의 발렌타인에 대해 듣고 싶어서요」"

[[dialogue]]
speaker = "梨緒"
original = "「なるほど、そういうことか。もちろん構わない。私たちは平行世界ベガの出身だが、さすがにバレンタインの風習は変わらないからな」"
translation = "「과연, 그런 건가. 물론 상관없다. 우리는 평행 세계 베가 출신이지만, 역시 발렌타인 풍습은 변하지 않으니까」"

[[dialogue]]
speaker = "梨緒"
original = "「とはいえ、イギリスも他のヨーロッパの国とそう違わないと思うが」"
translation = "「그렇다 해도 영국도 다른 유럽 국가와 크게 다르지 않다고 생각한다만」"

[[dialogue]]
speaker = "梨緒"
original = "「しいて言うなら、バレンタインにチョコレートを贈るようになったのは、イギリスの会社がバレンタイン向けにチョコを売り出したのがきっかけだ……と聞いたことがあるな」"
translation = "「굳이 말하자면, 발렌타인에 초콜릿을 선물하게 된 건 영국의 회사가 발렌타인용으로 초코를 팔기 시작한 게 계기다……라고 들은 적이 있군」"

[[dialogue]]
speaker = "ジグ"
original = "「ドイツも男性から女性にプレゼントをするね。だけど他の国ほどは盛り上がらないかな」"
translation = "「독일도 남자가 여자에게 선물을 해. 하지만 다른 나라만큼 고조되지는 않으려나」"

[[dialogue]]
speaker = "ジグ"
original = "「あと、ドイツのバレンタインでは、豚のお守りやスタチューを贈る人もいるんだ」"
translation = "「그리고 독일 발렌타인에서는 돼지 부적이나 조각상을 선물하는 사람도 있어」"

[[dialogue]]
speaker = "梨緒"
original = "「豚の？\u3000何か意味があるのか？」"
translation = "「돼지? 무슨 의미라도 있나?」"

[[dialogue]]
speaker = "イレーナ"
original = "（お前はメスブタだ、ってこと！？）"
translation = "（너는 암돼지다, 라는 뜻!?）"

[[dialogue]]
speaker = "ジグ"
original = "「ドイツでは豚は幸運の象徴でね。縁起物なんだよ。まぁ、どちらかというと年末年始の方が豚を見ることは多いかな」"
translation = "「독일에서 돼지는 행운의 상징이거든. 길조를 비는 물건이지. 뭐, 어느 쪽인가 하면 연말연시에 돼지를 보는 일이 더 많긴 하지만」"

[[dialogue]]
speaker = "イレーナ"
original = "（違った！？\u3000そりゃそうだけど、とんでもない想像しちゃったわ……）"
translation = "（아니었어!? 그야 그렇겠지만, 엉뚱한 상상을 해버렸네……）"

[[dialogue]]
speaker = "エリス"
original = "「イレーナさん？\u3000少し顔が赤いようですが、大丈夫ですか？」"
translation = "「이레이나 씨? 얼굴이 좀 붉은 것 같은데 괜찮으세요?」"

[[dialogue]]
speaker = "イレーナ"
original = "「ああいえ、少し空調が利きすぎているのかもしれません。大丈夫ですよ」"
translation = "「아아 아니요, 에어컨이 너무 세게 틀어져 있어서 그럴지도 몰라요. 괜찮아요」"

[[dialogue]]
speaker = "イレーナ"
original = "「ちなみにイタリアでは、バレンタインの翌日に、恋人がいない人たちが集まってパーティーをするんです」"
translation = "「참고로 이탈리아에서는 발렌타인 다음 날에 연인이 없는 사람들이 모여서 파티를 해요」"

[[dialogue]]
speaker = "イレーナ"
original = "「出会いを求めてだったり、パートナーがいないことを慰め合ったり、これはこれで楽しいものだそうですよ」"
translation = "「만남을 원해서거나 파트너가 없는 것을 서로 위로하거나, 이건 이것대로 즐거운 모양이더라고요」"

[[dialogue]]
speaker = "梨緒"
original = "「それは初耳だ。ヨーロッパでもバレンタインに違いがあるものなんだな」"
translation = "「그건 처음 듣는군. 유럽에서도 발렌타인에 차이가 있는 거였나」"

[[dialogue]]
speaker = "エリス"
original = "「ふふ、面白い風習ですね。寂しさも紛れそうです」"
translation = "「후후, 재밌는 풍습이네요. 외로움도 달랠 수 있겠어요」"

[[dialogue]]
speaker = "unk"
original = "外国のバレンタインか……"
translation = "외국의 발렌타인인가……"

[[dialogue]]
speaker = "イレーナ"
original = "「どうしました、会長さん？\u3000何かお考えの様子ですが」"
translation = "「왜 그러세요, 회장님? 뭔가 생각하시는 모양인데」"

[[dialogue]]
speaker = "unk"
original = "いや、何でもないよ"
translation = "아니, 아무것도 아니야"

[[dialogue]]
speaker = "イレーナ"
original = "「そうですか。ならよいのですが……」"
translation = "「그렇습니까. 그럼 다행입니다만……」"

[[dialogue]]
speaker = "ジグ"
original = "（おや、可能性が見えてしまった。行動を起こすようだね）"
translation = "（오야, 가능성이 보여버렸군. 행동을 개시할 모양이네）"

[[dialogue]]
speaker = "ジグ"
original = "（うまくいくといいね……魔王）"
translation = "（잘 됐으면 좋겠군…… 마왕）"

