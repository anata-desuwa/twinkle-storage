[[dialogue]]
speaker = "unk"
original = "メイプルと恋人の関係になってから、しばらく経ったある日のこと。"
translation = "메이플과 연인 사이가 되고 나서 얼마간의 시간이 흐른 어느 날."

[[dialogue]]
speaker = "unk"
original = "週末の休みで、メイプルが俺の家に遊びに来ていたのだが――"
translation = "주말 휴일에 메이플이 우리 집에 놀러 와 있었는데――"

[[dialogue]]
speaker = "メイプル"
original = "「――問おう。お兄ちゃんは本当に、我のことが好きなのか！？」"
translation = "「――묻겠다. 오빠는 정말로 짐을 좋아하는 것이냐!?」"

[[dialogue]]
speaker = "クロト"
original = "「ど、どうしたんだ？\u3000いきなり魔王モードで……。もちろん好きだけど……」"
translation = "「어, 어떻게 된 거야? 갑자기 마왕 모드로……. 당연히 좋아하지만……」"

[[dialogue]]
speaker = "メイプル"
original = "「じ～っ……」"
translation = "「지긋이~……」"

[[dialogue]]
speaker = "クロト"
original = "「なんでそこでジト目！？」"
translation = "「왜 거기서 곁눈질이야!?」"

[[dialogue]]
speaker = "メイプル"
original = "「だって……恋人になってから結構経つのに……」"
translation = "「그치만…… 연인이 되고 나서 꽤 지났는데……」"

[[dialogue]]
speaker = "メイプル"
original = "「未だにお兄ちゃん、手を出して来ないし……」"
translation = "「아직도 오빠, 손을 안 대고……」"

[[dialogue]]
speaker = "メイプル"
original = "「――ハグしたりとか、キスとかはそれなりにしてる？\u3000そうだけど……そうじゃくて！」"
translation = "「――포옹하거나 키스는 나름대로 하고 있다고? 그렇긴 하지만…… 그게 아니라!」"

[[dialogue]]
speaker = "メイプル"
original = "「我が言いたいのは、それ以上の……ということだ！」"
translation = "「짐이 말하고 싶은 건 그 이상의……라는 것이다!」"

[[dialogue]]
speaker = "メイプル"
original = "「まさか、我の体が女の子らしくないから、魅力を感じていないのか！？」"
translation = "「설마 내 몸이 여자애 같지 않아서 매력을 못 느끼는 거야!?」"

[[dialogue]]
speaker = "クロト"
original = "「そんなことない！」"
translation = "「그럴 리 없어!」"

[[dialogue]]
speaker = "unk"
original = "メイプルは不安そうな顔をしながら、"
translation = "메이플은 불안한 표정을 지으며,"

[[dialogue]]
speaker = "メイプル"
original = "「……本当に？」"
translation = "「……정말로?」"

[[dialogue]]
speaker = "クロト"
original = "「だったら――証明する」"
translation = "「그렇다면―― 증명하겠어」"

[[dialogue]]
speaker = "unk"
original = "それから俺の部屋に移動して、ベッドの上で服を脱ぐ。"
translation = "그리고 내 방으로 이동해 침대 위에서 옷을 벗는다."

[[dialogue]]
speaker = "メイプル"
original = "「ん……<emoji=heart04>\u3000ふぅ…………」"
translation = "「응……<emoji=heart04> 후으…………」"

[[dialogue]]
speaker = "メイプル"
original = "「そ、そんなに見つめたら恥ずかしいよ、お兄ちゃん……<emoji=heart04>」"
translation = "「그, 그렇게 빤히 보면 부끄러워, 오빠……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「メイプルの裸、綺麗だ……」"
translation = "「메이플의 알몸, 아름다워……」"

[[dialogue]]
speaker = "メイプル"
original = "「ほ、本当……？」"
translation = "「저, 정말……?」"

[[dialogue]]
speaker = "クロト"
original = "「ああ、本当だ。その証拠に……ほら」"
translation = "「아아, 정말이야. 그 증거로…… 자」"

[[dialogue]]
speaker = "メイプル"
original = "「あっ……<emoji=heart04>\u3000お兄ちゃんの、大きくなってる……<emoji=heart04>」"
translation = "「앗……<emoji=heart04> 오빠 거, 커졌어……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「メイプルの体、触ってもいいか……？」"
translation = "「메이플의 몸, 만져도 될까……?」"

[[dialogue]]
speaker = "メイプル"
original = "「う、うん……<emoji=heart04>\u3000――あっ<emoji=heart04>」"
translation = "「으, 응……<emoji=heart04> ――앗<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「んっ……<emoji=heart04>\u3000はあぁ……<emoji=heart04>\u3000お兄ちゃんに、おっぱい触られちゃってる……<emoji=heart04>」"
translation = "「응읏……<emoji=heart04> 하아아……<emoji=heart04> 오빠한테 가슴 만져지고 있어……<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「あっ<emoji=heart04>\u3000あんっ……<emoji=heart04>\u3000はあぁ……<emoji=heart04>\u3000んんっ……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 앙……<emoji=heart04> 하아아……<emoji=heart04> 으응……<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「んっ<emoji=heart04>\u3000お兄ちゃん、ごめんね……。あたしのおっぱい、小さくて……」"
translation = "「응읏<emoji=heart04> 오빠 미안해……. 내 가슴, 작아서……」"

[[dialogue]]
speaker = "クロト"
original = "「どうして謝るんだ？\u3000こんなに可愛いのに」"
translation = "「어째서 사과하는 거야? 이렇게 귀여운데」"

[[dialogue]]
speaker = "メイプル"
original = "「あっ<emoji=heart04>\u3000お兄ちゃんの指が乳首に触れて……<emoji=heart04>\u3000んっ……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 오빠 손가락이 젖꼭지에 닿아서……<emoji=heart04> 응읏……<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「はあぁ……<emoji=heart04>\u3000あっ、あんっ……<emoji=heart04>\u3000ふうぅ……あっ<emoji=heart04>\u3000ふあぁっ……<emoji=heart04>」"
translation = "「하아아……<emoji=heart04> 앗, 앙……<emoji=heart04> 후우…… 앗<emoji=heart04> 후아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「やぁ……<emoji=heart04>\u3000そんな、乳首コリコリしちゃダメぇ……<emoji=heart04>\u3000あっ……はあぁっ……ふうぅ……<emoji=heart04>」"
translation = "「야아……<emoji=heart04> 그렇게 젖꼭지 비비면 안 돼에……<emoji=heart04> 앗…… 하아앗…… 후우우……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「感度もよくて、エッチだ……おま○こ、もう濡れてきてるよ？」"
translation = "「감도도 좋아서 야해…… 보지, 벌써 젖어있어?」"

[[dialogue]]
speaker = "メイプル"
original = "「んっ……<emoji=heart04>\u3000だって……お兄ちゃんにエッチなことされてると思ったら、ドキドキしちゃって……<emoji=heart04>」"
translation = "「응읏……<emoji=heart04> 그치만…… 오빠한테 야한 짓 당한다고 생각하니까 두근거려서……<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「あっ<emoji=heart04>\u3000おま○こ触られてる……<emoji=heart04>\u3000んっ……ふうぅっ……あっ……ふあぁっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 보지 만져지고 있어……<emoji=heart04> 응읏…… 후우읏…… 앗…… 후아앗<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「そこっ……ダメぇ<emoji=heart04>\u3000あっ、あんっ<emoji=heart04>\u3000クリは敏感だからぁ……んっ<emoji=heart04>\u3000はあぁっ……ふあぁっ……<emoji=heart04>」"
translation = "「거기…… 안 돼에<emoji=heart04> 앗, 앙<emoji=heart04> 클리는 예민하니까아…… 응읏<emoji=heart04> 하아앗…… 후아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「あっ<emoji=heart04>\u3000お兄ちゃんの指が、中に入って……んっ<emoji=heart04>\u3000あっ、あんっ……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 오빠 손가락이 안에 들어와서…… 응읏<emoji=heart04> 앗, 앙……<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「ふあぁ……<emoji=heart04>\u3000そんなくちゅくちゅしたら、愛液いっぱい溢れてきちゃう……<emoji=heart04>」"
translation = "「후아아……<emoji=heart04> 그렇게 질척질척하게 하면 애액이 잔뜩 넘쳐버려……<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「あっ……あんっ<emoji=heart04>\u3000はあぁ……んうぅっ……<emoji=heart04>\u3000あっ……んあぁっ……<emoji=heart04>」"
translation = "「앗…… 앙<emoji=heart04> 하아아…… 으응읏……<emoji=heart04> 앗…… 응아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「メイプル、もうそろそろ、挿れてもいいか……？」"
translation = "「메이플, 이제 슬슬 넣어도 될까……?」"

[[dialogue]]
speaker = "メイプル"
original = "「んっ……<emoji=heart04>\u3000うん……<emoji=heart04>\u3000もうおま○こ、ぐちょぐちょになっちゃってるから……<emoji=heart04>」"
translation = "「응읏……<emoji=heart04> 응……<emoji=heart04> 벌써 보지, 질척질척하게 돼버렸으니까……<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「あっ<emoji=heart04>\u3000お兄ちゃんのが、おま○こに当たってる……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 오빠 거, 보지에 닿고 있어……<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「んっ……<emoji=heart04>\u3000おち○ちん……すごい……<emoji=heart04>\u3000大きくて……熱くて……固くて……<emoji=heart04>\u3000はあぁ……ふうぅ……<emoji=heart04>\u3000んんっ……<emoji=heart04>」"
translation = "「응읏……<emoji=heart04> 자지…… 대단해……<emoji=heart04> 크고…… 뜨거워서…… 딱딱해……<emoji=heart04> 하아아…… 후우우……<emoji=heart04> 으응……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そうしてペニスも愛液でヌルヌルになったところで、彼女の秘部にあてがう。"
translation = "그렇게 페니스도 애액으로 미끌미끌해진 참에 그녀의 비부에 갖다 댄다."

[[dialogue]]
speaker = "クロト"
original = "「挿れるぞ、メイプル」"
translation = "「넣을게, 메이플」"

[[dialogue]]
speaker = "メイプル"
original = "「う、うん……<emoji=heart04>\u3000来て……<emoji=heart04>\u3000お兄ちゃ――あっ<emoji=heart04>」"
translation = "「으, 응……<emoji=heart04> 와 줘……<emoji=heart04> 오빠――앗<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「んっ……ふああぁっ！\u3000おち○ちん、中に入ってきたぁっ……<emoji=heart04>」"
translation = "「응읏…… 후아아앗! 자지, 안에 들어왔어어……<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「はあぁ…………ふうぅ…………<emoji=heart04>\u3000んっ……<emoji=heart04>\u3000はあぁ…………んんっ……<emoji=heart04>」"
translation = "「하아아………… 후우우…………<emoji=heart04> 응읏……<emoji=heart04> 하아아………… 으응……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「大丈夫か……？」"
translation = "「괜찮아……?」"

[[dialogue]]
speaker = "メイプル"
original = "「んっ……大丈夫……<emoji=heart04>\u3000ちょっと痛いけど……それよりも――」"
translation = "「응읏…… 괜찮아……<emoji=heart04> 조금 아프지만…… 그것보다――」"

[[dialogue]]
speaker = "メイプル"
original = "「お兄ちゃんとこうして繋がれたのが嬉しい……<emoji=heart04>」"
translation = "「오빠랑 이렇게 이어진 게 기뻐……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そんなことを言う彼女が愛おしくて、そっと頭を撫でる。"
translation = "그런 말을 하는 그녀가 사랑스러워서 살며시 머리를 쓰다듬는다."

[[dialogue]]
speaker = "メイプル"
original = "「あっ……にへへ……<emoji=heart04>\u3000お兄ちゃんに撫でられると、安心する……<emoji=heart04>」"
translation = "「앗…… 니헤헤……<emoji=heart04> 오빠한테 쓰다듬어지면 안심돼……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そのまましばらくゆっくりしていると――"
translation = "그대로 잠시 쉬고 있자니――"

[[dialogue]]
speaker = "メイプル"
original = "「――お兄ちゃん、そろそろ大丈夫だよ。落ち着いてきたから……その……」"
translation = "「――오빠, 이제 괜찮아. 진정됐으니까…… 그게……」"

[[dialogue]]
speaker = "クロト"
original = "「わかった。ゆっくり動くからな……？」"
translation = "「알았어. 천천히 움직일 테니까……?」"

[[dialogue]]
speaker = "メイプル"
original = "「うん……<emoji=heart04>\u3000あっ――<emoji=heart04>」"
translation = "「응……<emoji=heart04> 앗――<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「あっ、ふあああっ<emoji=heart04><emoji=heart04>\u3000あっ……はあぁっ……んうぅっ……ふあぁっ……<emoji=heart04>\u3000あっ、あんっ……<emoji=heart04>\u3000ふうぅっ……はあぁっ……<emoji=heart04>\u3000んっ……ふあぁっ……<emoji=heart04>」"
translation = "「앗, 후아아앗<emoji=heart04><emoji=heart04> 앗…… 하아앗…… 응으읏…… 후아앗……<emoji=heart04> 앗, 앙……<emoji=heart04> 후우읏…… 하아앗……<emoji=heart04> 응읏…… 후아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「痛くないか……？」"
translation = "「아프지는 않아……?」"

[[dialogue]]
speaker = "メイプル"
original = "「んっ<emoji=heart04>\u3000平気……ちょっとだけまだ痛いけど……<emoji=heart04>\u3000あっ……あんっ……<emoji=heart04>\u3000それと同じくらい、気持ちよくなってきてるから……<emoji=heart04>\u3000はあぁっ……ふあぁっ……<emoji=heart04>」"
translation = "「응읏<emoji=heart04> 괜찮아…… 아주 조금 아직 아프지만……<emoji=heart04> 앗…… 앙……<emoji=heart04> 그만큼 기분 좋아지고 있으니까……<emoji=heart04> 하아앗…… 후아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「んうぅっ……ふあぁっ……んっ……<emoji=heart04>\u3000あっ……はあぁっ……んうぅっ……ふあぁっ<emoji=heart04>」"
translation = "「응으읏…… 후아앗…… 응읏……<emoji=heart04> 앗…… 하아앗…… 응으읏…… 후아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はメイプルの首筋に、キスをする。"
translation = "나는 메이플의 목덜미에 키스를 한다."

[[dialogue]]
speaker = "メイプル"
original = "「ひゃっ！？\u3000お兄ちゃん、首筋にキス……<emoji=heart04>\u3000あんっ……<emoji=heart04>\u3000それゾクゾクしちゃう……<emoji=heart04>\u3000はあぁっ……ふうぅっ……<emoji=heart04>」"
translation = "「히얏!? 오빠, 목덜미에 키스……<emoji=heart04> 앙……<emoji=heart04> 그거 전율 돋아버려……<emoji=heart04> 하아앗…… 후우읏……<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「んっ……<emoji=heart04>\u3000キス、唇の方にも、するの？\u3000んむっ……ちゅっ……<emoji=heart04>」"
translation = "「응읏……<emoji=heart04> 키스, 입술 쪽에도 하는 거야? 음뭇…… 츄우……<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「ちゅっ……ちゅっ……<emoji=heart04>\u3000ちゅぱっ……んちゅっ……れろちゅっ……<emoji=heart04>」"
translation = "「츄우…… 츄우……<emoji=heart04> 츄파…… 응츄…… 레로츄……<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「んっ……ちゅっ……ちゅぱっ……<emoji=heart04>\u3000お兄ちゃん、好き……<emoji=heart04>」"
translation = "「응읏…… 츄우…… 츄파……<emoji=heart04> 오빠, 좋아해……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「俺も好きだ……」"
translation = "「나도 좋아해……」"

[[dialogue]]
speaker = "メイプル"
original = "「んむっ……<emoji=heart04>\u3000ちゅっ……ちゅぷぷっ……<emoji=heart04>\u3000れろちゅっ……んむっ……ちゅっ……ちゅぱっ……<emoji=heart04>」"
translation = "「음뭇……<emoji=heart04> 츄우…… 츄푸푸……<emoji=heart04> 레로츄…… 음뭇…… 츄우…… 츄파……<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「ぷはぁっ……<emoji=heart04>\u3000んふぅ……<emoji=heart04>\u3000キスされて、おま○こもキュンキュンしちゃう……<emoji=heart04>」"
translation = "「푸하앗……<emoji=heart04> 응후……<emoji=heart04> 키스 당해서 보지도 큥큥거려……<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「あっ、あんっ……<emoji=heart04>\u3000んうぅっ……おま○こ、だんだん気持ちよくなってきてる……<emoji=heart04>\u3000はあぁっ……んっ<emoji=heart04>\u3000あっ……ふあぁっ……<emoji=heart04>」"
translation = "「앗, 앙……<emoji=heart04> 응으읏…… 보지, 점점 기분 좋아지고 있어……<emoji=heart04> 하아앗…… 응읏<emoji=heart04> 앗…… 후아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「お兄ちゃんはどう？\u3000あたしのおま○こで気持ちよくなれてる？\u3000あっ……あんっ……<emoji=heart04>」"
translation = "「오빠는 어때? 내 보지로 기분 좋아졌어? 앗…… 앙……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ああ、すごく気持ちいいぞ。でも――」"
translation = "「아아, 정말 기분 좋아. 하지만――」"

[[dialogue]]
speaker = "クロト"
original = "「１度こうなっちゃったら、次から我慢できなくなるかもしれない……」"
translation = "「한번 이렇게 돼버리면 다음부터는 참을 수 없게 될지도 몰라……」"

[[dialogue]]
speaker = "メイプル"
original = "「んっ<emoji=heart04>\u3000それってどういうこと……？」"
translation = "「응읏<emoji=heart04> 그게 무슨 뜻이야……?」"

[[dialogue]]
speaker = "unk"
original = "俺は、メイプルと一線を越えてしまったら、歯止めが利かなくなってしまいそうで、これまで我慢していたと伝える。"
translation = "나는 메이플과 선을 넘어버리면 제어할 수 없게 될 것 같아 지금까지 참아왔다고 전한다."

[[dialogue]]
speaker = "メイプル"
original = "「――そうだったんだ……お兄ちゃん、気が付かなくてごめんね」"
translation = "「――그랬구나…… 오빠, 눈치채지 못해서 미안해」"

[[dialogue]]
speaker = "メイプル"
original = "「でも、大丈夫。これからはお兄ちゃんがしたくなったら、我慢せずにあたしに言って？」"
translation = "「하지만 괜찮아. 앞으로는 오빠가 하고 싶어지면 참지 말고 나한테 말해줘?」"

[[dialogue]]
speaker = "メイプル"
original = "「お兄ちゃんがしたいように、いっぱいしていいから」"
translation = "「오빠가 하고 싶은 대로 잔뜩 해도 되니까」"

[[dialogue]]
speaker = "メイプル"
original = "「だから今も、我慢しなくて大丈夫だよ」"
translation = "「그러니까 지금도 참지 않아도 괜찮아」"

[[dialogue]]
speaker = "クロト"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker = "メイプル"
original = "「あたしを気遣って、優しくしてくれてるんだよね？\u3000でも……あたしはお兄ちゃんにも気持ちよくなって欲しいから」"
translation = "「나를 배려해서 상냥하게 대해주는 거지? 하지만…… 나는 오빠도 기분 좋아졌으면 좋겠으니까」"

[[dialogue]]
speaker = "メイプル"
original = "「だから遠慮しないで……もっと動いていいよ<emoji=heart04>\u3000お兄ちゃん<emoji=heart04>」"
translation = "「그러니까 사양하지 말고…… 좀 더 움직여도 돼<emoji=heart04> 오빠<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「メイプル……！」"
translation = "「메이플……!」"

[[dialogue]]
speaker = "unk"
original = "俺はそれ以上我慢できず、腰の動きを激しくした。"
translation = "나는 더 이상 참지 못하고 허리 움직임을 격렬하게 했다."

[[dialogue]]
speaker = "メイプル"
original = "「あっ<emoji=heart04><emoji=heart04>\u3000ふあああぁぁぁっ<emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04><emoji=heart04> 후아아아아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「あっ、あっ、あっ、あんっ<emoji=heart04>\u3000あっ、あっ、あっ、お兄ちゃんっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000あっ、あっ、あっ、あっ、ふああぁんっ<emoji=heart04>」"
translation = "「앗, 앗, 앗, 앙<emoji=heart04> 앗, 앗, 앗, 오빠앗<emoji=heart04> 응아앗<emoji=heart04> 앗, 앗, 앗, 앗, 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「おち○ちん、すごいっ<emoji=heart04>\u3000あっ、あっ、あっ、あんっ<emoji=heart04>\u3000あっ、あっ、あっ、はあぁっ<emoji=heart04>\u3000んっ、あっ、あっ、あっ<emoji=heart04>\u3000んああぁんっ<emoji=heart04>」"
translation = "「자지, 대단해엣<emoji=heart04> 앗, 앗, 앗, 앙<emoji=heart04> 앗, 앗, 앗, 하아앗<emoji=heart04> 응, 앗, 앗, 앗<emoji=heart04> 응아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「初めてなのに、おま○こ気持ちいいっ<emoji=heart04>\u3000あっ、あっ、あっ、あっ、ふああぁっ<emoji=heart04>\u3000あっ、あっ、あっ、あんっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「처음인데 보지 기분 좋아앗<emoji=heart04> 앗, 앗, 앗, 앗, 후아아앗<emoji=heart04> 앗, 앗, 앗, 앙<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「メイプル、好きだ！」"
translation = "「메이플, 좋아해!」"

[[dialogue]]
speaker = "メイプル"
original = "「あっ、あっ、あっ、あんっ<emoji=heart04>\u3000あたしもぉ<emoji=heart04>\u3000あっ、あっ、あっ、んあぁっ<emoji=heart04>\u3000お兄ちゃん、大好きぃ<emoji=heart04>」"
translation = "「앗, 앗, 앗, 앙<emoji=heart04> 나도오<emoji=heart04> 앗, 앗, 앗, 응아앗<emoji=heart04> 오빠, 너무 좋아아<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「あっ、あっ、あっ、ふああぁっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000お兄ちゃん、もっとぉっ<emoji=heart04>\u3000あっ、あっ、あっ、あっ<emoji=heart04>\u3000んああぁっ<emoji=heart04>\u3000あっ、あっ、あっ、あっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「앗, 앗, 앗, 후아아앗<emoji=heart04> 응읏<emoji=heart04> 오빠, 더어엇<emoji=heart04> 앗, 앗, 앗, 앗<emoji=heart04> 응아아앗<emoji=heart04> 앗, 앗, 앗, 앗<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「あっ、あっ、あっ<emoji=heart04>\u3000お兄ちゃん、なんかすごいの来てる<emoji=heart04>\u3000あたし、気持ちいいのが登って来てるよぉ<emoji=heart04>」"
translation = "「앗, 앗, 앗<emoji=heart04> 오빠, 뭔가 엄청난 게 오고 있어<emoji=heart04> 나, 기분 좋은 게 올라오고 있어어<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「俺も、イキそうだ……！」"
translation = "「나도, 갈 것 같아……!」"

[[dialogue]]
speaker = "メイプル"
original = "「んっ<emoji=heart04>\u3000じゃあ、一緒に<emoji=heart04>\u3000あっ、あっ、あっ、あっ、んあぁっ<emoji=heart04>\u3000あっ、あっ、あっ、あっ、ふああぁっ<emoji=heart04>」"
translation = "「응읏<emoji=heart04> 그럼 같이<emoji=heart04> 앗, 앗, 앗, 앗, 응아앗<emoji=heart04> 앗, 앗, 앗, 앗, 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「あっ、あっ、あっ、あっ<emoji=heart04>\u3000イク<emoji=heart04>\u3000イクイクイクイク――<emoji=heart04><emoji=heart04>」"
translation = "「앗, 앗, 앗, 앗<emoji=heart04> 가<emoji=heart04> 가버려가버려가버려가버려――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「メイプル、もう出る！」"
translation = "「메이플, 이제 나온다!」"

[[dialogue]]
speaker = "メイプル"
original = "「来て！\u3000お兄ちゃんっ<emoji=heart04>\u3000あっ、あっあっあっあっあっ――<emoji=heart04><emoji=heart04>」"
translation = "「와 줘! 오빠앗<emoji=heart04> 앗, 앗앗앗앗앗――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「ふあああああああああっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000イックうぅぅぅーーーーーーーーーっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후아아아아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 가버려어어어ーーーーーーーーー엇<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「はあああぁぁぁ～～～っ<emoji=heart04><emoji=heart04>\u3000お兄ちゃんのがおま○この奥にいっぱい出てるぅ～～～っ<emoji=heart04><emoji=heart04>\u3000熱いぃ……<emoji=heart04>」"
translation = "「하아아아아아~~~앗<emoji=heart04><emoji=heart04> 오빠 거 보지 깊숙한 곳에 잔뜩 나오고 있어어~~~엇<emoji=heart04><emoji=heart04> 뜨거워어……<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「あんっ……はあぁっ……<emoji=heart04>\u3000すごい……<emoji=heart04>\u3000まだ射精、ドクドクって……<emoji=heart04>\u3000はあぁ……ふうぅ……<emoji=heart04>」"
translation = "「앙…… 하아앗……<emoji=heart04> 대단해……<emoji=heart04> 아직 사정, 울컥울컥하고……<emoji=heart04> 하아아…… 후우우……<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「んっ……<emoji=heart04>\u3000やっと止まった……<emoji=heart04>\u3000はあぁ……<emoji=heart04>」"
translation = "「응읏……<emoji=heart04> 이제야 멈췄어……<emoji=heart04> 하아아……<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「んんっ……抜けちゃう……<emoji=heart04>」"
translation = "「으응…… 빠져버려……<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「ふうぅ……お兄ちゃんの精液、溢れて来てる……<emoji=heart04>」"
translation = "「후우우…… 오빠 정액, 넘쳐 나오고 있어……<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「こんなにいっぱい出してくれたんだね……<emoji=heart04>\u3000お兄ちゃん、気持ちよかった……？」"
translation = "「이렇게 잔뜩 내보내 줬구나……<emoji=heart04> 오빠, 기분 좋았어……?」"

[[dialogue]]
speaker = "クロト"
original = "「ああ、メイプルのおま○こ、すごく気持ちよかった……」"
translation = "「아아, 메이플 보지, 정말 기분 좋았어……」"

[[dialogue]]
speaker = "unk"
original = "俺はメイプルの頭をそっと撫でる。"
translation = "나는 메이플의 머리를 살며시 쓰다듬는다."

[[dialogue]]
speaker = "メイプル"
original = "「にへへ……♪\u3000あたしも初めてなのに、気持ちよくイっちゃった……<emoji=heart04>」"
translation = "「니헤헤……♪ 나도 처음인데 기분 좋게 가버렸어……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「俺がどれだけメイプルのことを魅力的に思ってるか……伝わったか？」"
translation = "「내가 얼마나 메이플을 매력적이라고 생각하는지…… 전해졌어?」"

[[dialogue]]
speaker = "メイプル"
original = "「うん<emoji=heart04>\u3000でも……その……」"
translation = "「으응<emoji=heart04> 하지만…… 그게……」"

[[dialogue]]
speaker = "メイプル"
original = "「まだちょっと、不安かも……<emoji=heart04>\u3000だから、ね？」"
translation = "「아직 조금, 불안할지도……<emoji=heart04> 그러니까, 응?」"

[[dialogue]]
speaker = "メイプル"
original = "「もっといっぱい伝えてくれたら、嬉しいな<emoji=heart04>」"
translation = "「더 많이 전해주면, 기쁠 것 같아<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
original = "「あっ……<emoji=heart04>\u3000んっ……ちゅっ……<emoji=heart04>\u3000お兄ちゃん……大好き……<emoji=heart04>」"
translation = "「앗……<emoji=heart04> 응…… 츄……<emoji=heart04> 오빠…… 정말 좋아해……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "可愛いおねだりをする口に、俺は再びキスをするのだった――"
translation = "귀엽게 조르는 입술에, 나는 다시 한번 키스를 했다――"

