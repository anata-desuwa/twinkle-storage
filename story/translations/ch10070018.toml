[[dialogue]]
speaker = "unk"
original = "以前のアステラでの一件以来、ルリエルとはより親密になり、男女として交際するようになった。"
translation = "이전 아스테라에서의 사건 이후, 루리엘과는 더욱 친밀해져 남녀로서 교제하게 되었다."

[[dialogue]]
speaker = "unk"
original = "今日もルリエルとの出撃で――"
translation = "오늘도 루리엘과의 출격에서――"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「角笛ビィーーーーム！！」"
translation = "「뿔나팔 비이이이이임!!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ふぅ、これでこのアステラも消滅しますね。あ……でも今の疲れで体が動かないのです……」"
translation = "「후우, 이걸로 이 아스테라도 소멸하겠네요. 아…… 하지만 방금 피로로 몸이 움직이지 않아요……」"

[[dialogue]]
speaker = "unk"
original = "早く脱出しないとアステラの消滅に巻き込まれてしまう。"
translation = "빨리 탈출하지 않으면 아스테라의 소멸에 휘말리고 만다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "へたりこむルリエルを抱きかかえて脱出しようとした瞬間――"
translation = "주저앉은 루리엘을 껴안고 탈출하려던 순간――"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「きゃあああっ！？」"
translation = "「꺄아아악!?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「いたたた……あれ、ここどこですか……？」"
translation = "「아야야…… 어라, 여기 어디인가요……?」"

[[dialogue]]
speaker = "unk"
original = "どうやら流星市国内のどこかの公園に出たらしい。"
translation = "아무래도 유성시국 내의 어느 공원으로 나온 모양이다."

[[dialogue]]
speaker = "unk"
original = "それより問題なのは――"
translation = "그보다 문제는――"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「はわわわっ！？\u3000どうしてこうなってるんですかぁっ！？」"
translation = "「하와와왓!? 어째서 이렇게 되어 있는 건가요!?」"

[[dialogue]]
speaker = "unk"
original = "それは俺が聞きたい。"
translation = "그건 내가 묻고 싶다."

[[dialogue]]
speaker = "unk"
original = "アステラから出る時にもつれた結果、ルリエルのトラブル体質が災いしたのか、２人揃ってとんでもない有様になっていた。"
translation = "아스테라에서 나올 때 뒤엉킨 결과, 루리엘의 트러블 체질이 화근이 되었는지 두 사람 모두 엉망진창인 꼴이 되어 있었다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「会長さんのお、おち○ちんが目の前に……！？\u3000あれ、なんか下半身がスースーするような……ということは──！？」"
translation = "「회장님의 자, 자지가 눈앞에……!? 어라, 왠지 하반신이 허전한 것 같은데…… 그렇다는 건──!?」"

[[dialogue]]
speaker = "unk"
original = "そう、丸出しになったルリエルの股間が俺の目の前に。"
translation = "그렇다, 훤히 드러난 루리엘의 가랑이가 내 눈앞에 있었다."

[[dialogue]]
speaker = "unk"
original = "まるで生まれたばかりのような、綺麗なスリットからはピンク色の小陰唇が覗いていた。"
translation = "마치 갓 태어난 것처럼 매끄러운 틈새 사이로 분홍빛 소음순이 들여다보였다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「うぅ、恥ずかしいですぅ～……。あ……会長さんのおち○ちん、大きくなってます……？」"
translation = "「우으, 부끄러워요~…… 아…… 회장님의 자지, 커지고 있나요……?」"

[[dialogue]]
speaker = "unk"
original = "ルリエルの股間が目の前にあるのだから反応しないはずがない。"
translation = "루리엘의 가랑이가 눈앞에 있으니 반응하지 않을 리가 없다."

[[dialogue]]
speaker = "unk"
original = "間近でふりふりと揺れるお尻の肉に、無防備なお尻の穴、柔らかそうな恥部……全てつまびらかになっていて、否応なく下半身に血流が集まっていく。"
translation = "눈앞에서 살랑살랑 흔들리는 엉덩잇살에, 무방비한 항문, 부드러워 보이는 치부…… 모든 것이 적나라하게 드러나 있어, 속절없이 하반신으로 혈류가 모여들었다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「はぁ……会長さん……こくっ」"
translation = "「하아…… 회장님…… 꿀꺽」"

[[dialogue]]
speaker = "unk"
original = "熱っぽい吐息を漏らし、眼前の俺のペニスを見つめるルリエル。"
translation = "뜨거운 숨결을 내뱉으며 눈앞의 내 페니스를 바라보는 루리엘."

[[dialogue]]
speaker = "unk"
original = "そして――"
translation = "그리고――"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ちゅっ<emoji=heart04>」"
translation = "「쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ぷるっと柔らかな唇がペニスに触れ、鮮烈な快感に下半身が跳ねた。"
translation = "탱글하고 부드러운 입술이 페니스에 닿자, 강렬한 쾌감에 하반신이 튀어 올랐다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「れろっ、れちゅっ……ん……へろ、れろ……ちゅっ……ちゅぱっ……んっ、ふぅ……<emoji=heart04>」"
translation = "「낼름, 레츄…… 응…… 헤로, 레로…… 츄…… 츕…… 응, 후우……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "硬さを増しつつあるペニスに舌を這わせるルリエル。"
translation = "단단해져 가는 페니스에 혀를 놀리는 루리엘."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ちろ、ちろんっ……おち○ちんおっきくなると、男の人は苦しいんですよね？\u3000れぇろ……るれろ……れろ、れろ……はぁ……んちゅ、ちゅぷっ<emoji=heart04>」"
translation = "「할짝, 할짝…… 자지 커지면, 남자는 괴로운 거죠? 레로…… 루레로…… 레로, 레로…… 하아…… 응츄, 츄릅<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「だからすっきりさせてあげないと……ちゅぷ……ちゅぱっ、ぺろっ……ん……れろれろ……ん、へろんっ……<emoji=heart04>」"
translation = "「그러니까 시원하게 해줘야…… 츄릅…… 츄릅, 할짝…… 응…… 레로레로…… 응, 헤롱……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "温かい唾液をまとった舌にペニスを撫でられ、背筋がゾクゾクと震える。"
translation = "따뜻한 타액을 머금은 혀에 페니스를 애무당하자, 등줄기가 오싹오싹 떨린다."

[[dialogue]]
speaker = "unk"
original = "寒くもないのに鳥肌が立ち、喜びを表すようにペニスがビクッと跳ねた。"
translation = "춥지도 않은데 소름이 돋고, 기쁨을 표시하듯 페니스가 파르르 튀어 올랐다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「知ってますよぉ、会長さんのおち○ちんはここが弱いんですよねぇ？\u3000れぇろんっ」"
translation = "「알고 있다구요오, 회장님의 자지는 여기가 약한 거죠오? 레에롱」"

[[dialogue]]
speaker = "unk"
original = "雁首の部分を舌先で撫でられ、痺れるような快感が走り抜ける。"
translation = "귀두 부분을 혀끝으로 핥아 올리자, 저릿한 쾌감이 스쳐 지나간다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「おち○ちん熱い……ちゅっ、ちゅっ……ぴちゅっ、ちゅる……んぅ……んれろ、れろ、れる……<emoji=heart04>」"
translation = "「자지 뜨거워…… 츄, 츄…… 피츄, 츄르…… 응으…… 응레로, 레로, 레루……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ルリエルの唾液で濡れたペニスに外の空気が当たると、ひやっとして緊張するが、不思議と心地いい。"
translation = "루리에엘의 타액으로 젖은 페니스에 바깥 공기가 닿자, 서늘해서 긴장되지만 묘하게 기분이 좋다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「根元から先っぽに……れぇろ……あ、またおち○ちんビクビクしましたぁ<emoji=heart04>」"
translation = "「뿌리부터 끝부분까지…… 레에로…… 아, 또 자지 파르르 떨렸어요오<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「会長さんのおち○ちん、かわいいかもです……ぺろ、れろ……あ……ちゅっ……ちろちろ……れぇろ、れる…………はあぁ……ちゅっ、ちゅぱっ<emoji=heart04>」"
translation = "「회장님의 자지, 귀여울지도 몰라요…… 할짝, 레로…… 아…… 츄…… 할짝할짝…… 레에로, 레루………… 하아아…… 츄, 츄릅<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ぴちゃぴちゃと舐める音の合間に、艶めかしい吐息がこぼれているのは気のせいではないだろう。"
translation = "챱챱거리며 핥는 소리 사이로, 요염한 한숨이 새어 나오고 있는 것은 기분 탓이 아닐 것이다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ぴちゃ、ぺちゃ……ちゅ、ちゅっ、れぇろ……はぁ……おち○ちん、硬くなってます……んちゅ、ちゅる……ん……るれろん<emoji=heart04>」"
translation = "「챱, 챱…… 츄, 츄, 레에로…… 하아…… 자지, 딱딱해졌어요…… 응츄, 츄르…… 응…… 루레론<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "感触を確かめるように、キス混じりにペニスを舐めるルリエル。"
translation = "감촉을 확인하듯, 키스를 섞어가며 페니스를 핥는 루리에엘."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「んちゅっ、ちゅれろっ……れるっ、ちゅぱ、ぴちゃ……んん……おち○ちん、おっきい……れる、ん……へるっ、へろへろ<emoji=heart04>」"
translation = "「응츄, 츄레로…… 레루, 츄릅, 챱챱…… 응응…… 자지, 커요…… 레루, 응…… 헤루, 헤로헤로<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "秘裂からはいつの間にか透明な蜜がにじみ出しているが、ルリエルはペニスを舐めるのに夢中な様子。"
translation = "비열에서는 어느새 투명한 애액이 배어 나오고 있지만, 루리에엘은 페니스를 핥는 데 열중한 모습이다."

[[dialogue]]
speaker = "unk"
original = "淫らな匂いを漂わせる蜜に誘われて、ルリエルの秘裂を舐め上げた。"
translation = "음란한 냄새를 풍기는 애액에 이끌려, 루리에엘의 비열을 핥아 올렸다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ひゃうっ！？\u3000あっ……ひゃんっ、あっ……そこ舐められたら……んんっ……<emoji=heart04>」"
translation = "「히얏!? 앗…… 히양, 앗…… 거기 핥아지면…… 응응……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「そっちがそう来るなら……れろ、れろれろ……んんっ、はぁ……んぅ……へろ、れぇろ、んん……ちゅくる、ちゅるっ、ちゅぱっ……んふ、ん～っ<emoji=heart04>」"
translation = "「그쪽이 그렇게 나온다면…… 레로, 레로레로…… 응응, 하아…… 응으…… 헤로, 레에로, 응응…… 츄쿠루, 츄르, 츄릅…… 응후, 으음~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺に反撃するように、ルリエルの責めが激しさを増す。"
translation = "나에게 반격하듯, 루리에엘의 공세가 격렬함을 더한다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あ……はんっ……<emoji=heart04>\u3000ルリエルのおま○こ、ペロペロされて……ん……はぁ……んちゅるっ、れろっ……負けませんから……ひゃぅっ<emoji=heart04>」"
translation = "「아…… 항……<emoji=heart04> 루리에엘의 보지, 할짝할짝 당해서…… 응…… 하아…… 응츄르, 레로…… 지지 않을 거니까요…… 히야우<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「んれろれろ、んちゅっ、ちゅぱっ……ん……あっ、そこ……んんっ……<emoji=heart04>\u3000はぁ、はぁ……るろん、れぇろんっ<emoji=heart04>」"
translation = "「응레로레로, 응츄, 츄파…… 응…… 앗, 거기…… 응으……<emoji=heart04> 하아, 하아…… 루론, 레에론<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "舌をルリエルの股間に押し付けると、ぷにぷにとした肉の弾力が返ってきた。"
translation = "혀를 루리에르의 가랑이에 밀어붙이자, 말랑말랑한 살의 탄력이 되돌아왔다."

[[dialogue]]
speaker = "unk"
original = "舐める度に蜜も絡みついてきて、ルリエルの味に血が沸き上がる。"
translation = "핥을 때마다 애액도 얽혀 들어와, 루리에르의 맛에 피가 끓어오른다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あ……おち○ちんからおつゆが出てきました……れぇろん<emoji=heart04>」"
translation = "「아…… 자지에서 즙이 나왔어요…… 레에론<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "まるで甘いシロップを味見するように、鈴口から垂れた汁を舌で舐め取る。"
translation = "마치 달콤한 시럽을 맛보듯이, 귀두 끝에서 흘러나온 즙을 혀로 핥아 올린다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「会長さんの味……もっとぉ……んちゅっ、ちゅっ、ちゅっ……はぁ……れろ、へろ……んふ……ちゅぱ、んちゅっ<emoji=heart04>」"
translation = "「회장님의 맛…… 좀 더어…… 응츄, 츄, 츄…… 하아…… 레로, 헤로…… 응후…… 츄파, 응츄<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "幼い外見に不釣り合いな艶っぽい声を漏らしながら、膨張して敏感になった亀頭にキスを繰り返すルリエル。"
translation = "어린 외모에 어울리지 않는 요염한 목소리를 흘리며, 팽창해서 민감해진 귀두에 키스를 반복하는 루리에르."

[[dialogue]]
speaker = "unk"
original = "対抗するように、秘裂の中へと舌をねじ込む。"
translation = "대항하듯이, 비열 안으로 혀를 비틀어 넣는다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ひゃああっ！？」"
translation = "「히야아앗!?」"

[[dialogue]]
speaker = "unk"
original = "舌先で感じるルリエルの中は熱く湿っていて、味と匂いを直に感じて下半身が熱を増していく。"
translation = "혀끝으로 느껴지는 루리에르의 안은 뜨겁고 젖어 있어, 맛과 냄새를 직접 느끼며 하반신이 열기를 더해간다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「んん～っ……<emoji=heart04>\u3000会長さんの舌が、わたしの中に入ってきて……ひゃぅっ……んっ……ふぁっ、あっ、はんっ……<emoji=heart04>」"
translation = "「응응~……<emoji=heart04> 회장님의 혀가, 제 안으로 들어와서…… 히야우…… 응…… 화아, 앗, 항……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ルリエルが俺の弱点を知っているなら、俺もルリエルの感じる場所や責め方を知っているのも当然だ。"
translation = "루리에르가 내 약점을 알고 있다면, 나도 루리에르가 느끼는 곳이나 괴롭히는 법을 알고 있는 것도 당연하다."

[[dialogue]]
speaker = "unk"
original = "肉の感触を味わいながら、ルリエルの中で舌を波打たせる。"
translation = "살의 감촉을 맛보며, 루리에르의 안에서 혀를 일렁이게 한다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ふぁあ～～っ！？\u3000ひやっ、はぁっ……ルリエルの中、舐められてますぅ……ふぁっ、ぁんっ……はぁ、はんっ、んんぅっ……<emoji=heart04>」"
translation = "「화아아~~!? 히얏, 하아…… 루리에르의 안, 핥아지고 있어요오…… 화아, 아앙…… 하아, 항, 응응으……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「わたしだって、もっと気持ち良くしてあげますから……れぇろんっ……ちろちろ……ちろちろ、へるっ<emoji=heart04>」"
translation = "「저도, 좀 더 기분 좋게 해 드릴 테니까요…… 레에론…… 치로치로…… 치로치로, 헤루<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ルリエルが舌を素早く往復させて敏感な亀頭を舐め回す。"
translation = "루리에르가 혀를 빠르게 왕복시키며 민감한 귀두를 핥아 돌린다."

[[dialogue]]
speaker = "unk"
original = "さらに尖らせた舌先で鈴口をなぞられ、強烈すぎる刺激で意識が一瞬飛びそうになった。"
translation = "거기에 뾰족하게 세운 혀끝으로 요도구를 덧그리자, 너무나 강렬한 자극에 의식이 한순간 날아갈 뻔했다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「れぇろ、へる……おつゆいっぱい……ちゅるっ……ぴちゃ、ちゅぱっ……<emoji=heart04>\u3000会長さんのおち○ちん、おいしい…………んんっ……へろれろっ<emoji=heart04>」"
translation = "「레에로, 헤루…… 즙 잔뜩…… 츄루…… 피차, 츄파……<emoji=heart04> 회장님의 자지, 맛있어요………… 응으…… 헤로레로<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "昼日中の公園で、互いの性器を舐めることに没頭する俺とルリエル。"
translation = "한낮의 공원에서, 서로의 성기를 핥는 것에 몰두하는 나와 루리에르."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ふぁっ、あっ……んんっ……<emoji=heart04>\u3000ちゅぱっ、ぴちゃぴちゃ……んれろ、れろ……はぁ、はぁん……くちゅるっ、ちゅるっ……んふっ……<emoji=heart04>」"
translation = "「화아, 앗…… 응응……<emoji=heart04> 츄파, 피차피차…… 응레로, 레로…… 하아, 하앙…… 쿠츄루, 츄루…… 응후……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「んちゅる、ちゅるちゅる……へるっ……んふっ、んん～っ……<emoji=heart04>\u3000ひやぁっ、はっ……んっ……れろっ、ぴちゃっ……ふぁ、はんっ……<emoji=heart04>」"
translation = "「응츄루, 츄루츄루…… 헤루…… 응후, 응응~……<emoji=heart04> 히야앗, 핫…… 응…… 레로, 피챠…… 화, 하앙……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "人が来たら見つかるとわかっているのにやめられなくて、ルリエルの味に夢中になる。"
translation = "사람이 오면 들킬 것을 알고 있는데도 멈출 수가 없어서, 루리에르의 맛에 열중하게 된다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「んぅ……んっ、はっ、あんっ……ふ…………れろ、ぴちゃぴちゃ……おち○ちん、もっとほしいれすぅ……ん……あ～<emoji=heart04>」"
translation = "「응으…… 응, 핫, 아앙…… 후………… 레로, 피챠피챠…… 자지, 더 갖고 싶어여어…… 응…… 아~<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あむっ……んじゅっ、んっ……<emoji=heart04>」"
translation = "「아무…… 응쥬, 응……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ルリエルが小さな口をめいっぱい広げ、パンパンに膨張したペニスを咥え込んだ。"
translation = "루리에르가 작은 입을 한껏 벌려, 팽팽하게 팽창한 페니스를 물었다."

[[dialogue]]
speaker = "unk"
original = "亀頭がぬるりとした唾液の感触とルリエルの体温に包まれ、ペニスが脈打って射精欲が増していく。"
translation = "귀두가 미끈거리는 타액의 감촉과 루리에르의 체온에 감싸여, 페니스가 맥동하며 사정욕이 더해져 간다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「んじゅるっ、じゅっ、じゅぷっ……んっ、ふぅ……会長さんのおち○ちんで、おくちいっぱい……じゅぷるっ……じゅるるっ<emoji=heart04>」"
translation = "「응쥬루, 쥬, 쥬푸…… 응, 후우…… 회장님의 자지로, 입안 가득…… 쥬푸루…… 쥬루루<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「会長、さん……んっ……じゅぷっ、んじゅっ……ずっ、ずるるっ……<emoji=heart04>\u3000んふ……じゅくるっ、じゅっ……ちゅぷちゅぷっ<emoji=heart04>」"
translation = "「회장, 님…… 응…… 쥬푸, 응쥬…… 즈, 즈루루……<emoji=heart04> 응후…… 쥬쿠루, 쥬…… 츄푸츄푸<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスをしゃぶりながら、舐めてくださいと言わんばかりに女性器を俺の顔に押し付けてくるルリエル。"
translation = "페니스를 빨면서, 핥아 달라고 말하는 듯이 여성기를 내 얼굴에 밀어붙여 오는 루리에르."

[[dialogue]]
speaker = "unk"
original = "顔面に柔肉を押し付けられ、蜜で塗りたくられ、まるで俺の顔でオナニーしているかのようだ。"
translation = "안면에 부드러운 살덩이를 밀어붙이고, 애액으로 칠해져, 마치 내 얼굴로 자위하고 있는 것만 같다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「んふっ……んぅっ……じゅぱっ、じゅるるっ、じゅぷるっ<emoji=heart04>\u3000ちゅぷっ、ちゅるるるっ……んっ……んんっ……ふっ、んっ……んぅ～っ<emoji=heart04>」"
translation = "「응후…… 응으…… 쥬파, 쥬루루, 쥬푸루<emoji=heart04> 츄푸, 츄루루루…… 응…… 응응…… 훗, 응…… 응으~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "さらに快楽を欲するルリエルに応じて、貪るように蜜が溢れた秘裂を舐め回す。"
translation = "더욱 쾌락을 원하는 루리에르에 응하여, 탐하듯 애액이 넘쳐흐르는 비열을 핥아댄다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「んっ、んん～っ……<emoji=heart04>\u3000んじゅっ、じゅっ、じゅるっ……ぷぁっ……会長さんのおち○ちん、好きれすっ……はぷっ、じゅるるんっ<emoji=heart04>」"
translation = "「응, 응응~……<emoji=heart04> 응쥬, 쥬, 쥬루…… 푸핫…… 회장님의 자지, 좋아해여…… 하푸, 쥬루룬<emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「んふっ、んっ、んんっ……んじゅぷっ、じゅぷじゅぷっ、んっ……じゅっ、じゅるっ……じゅぱっ、じゅるるんっ……<emoji=heart04>」"
translation = "「응후, 응, 응응…… 응쥬푸, 쥬푸쥬푸, 응…… 쥬, 쥬루…… 쥬파, 쥬루룬……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "幼い外見のルリエルから感じる女の味、女の匂い。"
translation = "어린 외모의 루리에르에게서 느껴지는 여자의 맛, 여자의 냄새."

[[dialogue]]
speaker = "unk"
original = "公園で淫らな行為をふける背徳感と倒錯観が癖になりそうだ。"
translation = "공원에서 음란한 행위에 빠지는 배덕감과 도착증이 버릇이 될 것 같다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「れりゅれりゅ……じゅる、じゅぱっ……んんっ……れぇるっ、れろれろ、じゅくるっ……ずずっ<emoji=heart04>」"
translation = "「레류레류…… 쥬루, 쥬파…… 응응…… 레에루, 레로레로, 쥬쿠루…… 즈즈<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ルリエルが口内で舌を動かして亀頭を舐め回す。"
translation = "루리에르가 입안에서 혀를 움직여 귀두를 핥아댄다."

[[dialogue]]
speaker = "unk"
original = "お返しにと膣口に舌先をねじ込み、めいっぱい膣壁を舐め上げた。"
translation = "답례로 질구에 혀끝을 비틀어 넣고, 한껏 질벽을 핥아 올렸다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「んっはぁ……<emoji=heart04>\u3000んぁっ……おま○こ気持ちいいですぅっ……はむっ……んじゅっ……じゅるる、じゅぽっ……じゅぷぷっ、じゅぷんっ<emoji=heart04>」"
translation = "「응하아……<emoji=heart04> 응아…… 보지 기분 좋아여어…… 하무…… 응쥬…… 쥬루루, 쥬포…… 쥬푸푸, 쥬푼<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "いやらしく腰をくねらせて秘裂を押し付けながら、ペニスを咥えたまま頭を揺らすルリエル。"
translation = "야하게 허리를 비틀며 비열을 밀어붙이면서, 자지를 물고 있는 채로 머리를 흔드는 루리엘."

[[dialogue]]
speaker = "unk"
original = "ペニスがルリエルのかわいらしい口に出たり入ったりする度に、舌や唇、口内と摩擦して快感が押し寄せる。"
translation = "자지가 루리엘의 귀여운 입에 들어갔다 나왔다 할 때마다, 혀와 입술, 구강과 마찰하며 쾌감이 밀려온다."

[[dialogue]]
speaker = "unk"
original = "さらに口を軽くすぼめて――"
translation = "게다가 입을 가볍게 오므리고――"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ずずっ……じゅるるるっ……！」"
translation = "「즈읏…… 쥬르르릇……!」"

[[dialogue]]
speaker = "unk"
original = "ペニスを深く咥えたまま強く吸われ、そのまま射精しそうになるのを何とかこらえた。"
translation = "자지를 깊숙이 문 채 강하게 빨려, 그대로 사정할 것 같아지는 것을 어떻게든 견뎌냈다."

[[dialogue]]
speaker = "unk"
original = "自分だけ達したくなくてクリトリスを舌先で刺激してやる。"
translation = "나만 가버리고 싶지 않아서 클리토리스를 혓바닥 끝으로 자극해 준다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「んん～～～～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「응으～～～～～～읏<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスを咥えながらルリエルが唸った。"
translation = "자지를 문 채 루리엘이 신음했다."

[[dialogue]]
speaker = "unk"
original = "互いを絶頂に導こうと、競うように相手の性器をねぶり続ける。"
translation = "서로를 절정으로 이끌기 위해, 경쟁하듯 상대의 성기를 계속 핥는다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「くちゅるっ、じゅっ、じゅっ……んふっ、んんっ……れりゅれりゅ、るろっ……ふぁ、は……んじゅるっ、じゅぷっ、じゅぷぷっ……<emoji=heart04>」"
translation = "「쿠츄릇, 쥬옷, 쥬옷…… 응훗, 응읏…… 레류레류, 루롯…… 하아, 하…… 응쥬릇, 쥬풋, 쥬푸풋…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「はぶっ、んっ……ずずずっ……<emoji=heart04>\u3000ずるる……じゅぽじゅぽ、じゅぷぷっ……んんぅ……んっ……ん～っ……<emoji=heart04>\u3000んじゅぷっ、じゅぷっ……ずずずずっ……」"
translation = "「하붑, 응…… 즈즈즛…… <emoji=heart04> 쥬르르…… 쥬포쥬포, 쥬푸풋…… 응응우…… 응…… 응～…… <emoji=heart04> 응쥬풋, 쥬풋…… 즈즈즈즛……」"

[[dialogue]]
speaker = "unk"
original = "射精寸前のペニスを小さな口で吸われ、下半身に力を込めながら陰核を重点的に舐める。"
translation = "사정 직전의 자지를 작은 입으로 빨려, 하반신에 힘을 주면서 음핵을 중점적으로 핥는다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「そこ、気持ち良すぎれす……<emoji=heart04>\u3000んぶっ、じゅっ、じゅっ……んんっ……<emoji=heart04>\u3000ふ……じゅぷぷっ、じゅぷじゅぷっ……<emoji=heart04>」"
translation = "「거기, 너무 기분 좋아여…… <emoji=heart04> 응붑, 쥬옷, 쥬옷…… 응응…… <emoji=heart04> 후…… 쥬푸풋, 쥬푸쥬풋…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「じゅりゅりゅっ、じゅりゅっ……じゅりゅっ……ぢゅるるるんっ……<emoji=heart04>\u3000ふっ……ふっ……ふっ……んんっ……<emoji=heart04>」"
translation = "「쥬류류읏, 쥬류읏…… 쥬류읏…… 쥬르르릉…… <emoji=heart04> 훗…… 훗…… 훗…… 응응…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そしてもう一度強く吸引された瞬間、視界が白く染まって――"
translation = "그리고 다시 한번 강하게 흡인된 순간, 시야가 하얗게 물들며――"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「んっ――んん～～～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응――응응～～～～～～～～～～～읏<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ルリエルの口内でペニスが脈打ち、熱くたぎった精が爆発するように迸る。"
translation = "루리엘의 입안에서 자지가 맥동하고, 뜨겁게 끓어오른 정자가 폭발하듯 뿜어져 나온다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「んんぶっ、んっ……んんっ……んぅっ……<emoji=heart04>\u3000んぶぅっ……ふ……んん～っ<emoji=heart04>」"
translation = "「응응붑, 응…… 응응…… 응우읏…… <emoji=heart04> 응부웃…… 후…… 응응～ <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "一度始まった射精の勢いを抑えることはできず、ドロドロとした精がルリエルの口へ容赦なく送り込まれていく。"
translation = "한번 시작된 사정의 기세를 억제할 수는 없었고, 걸쭉한 정액이 루리엘의 입으로 용서 없이 보내진다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「んぶっ……んっ……んぅ～っ<emoji=heart04>\u3000んふっ……んんーーっ<emoji=heart04>」"
translation = "「응붑…… 응…… 응우～ <emoji=heart04> 응훗…… 응응ーー <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その小さな口で射精を受け止めながら、ルリエルの小さな体がぶるりと震えて──"
translation = "그 작은 입으로 사정을 받아내며, 루리엘의 작은 몸이 부르르 떨리고──"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「んん～～～～～～～～っ！？」"
translation = "「응응～～～～～～～～읏!?」"

[[dialogue]]
speaker = "unk"
original = "ルリエルの股間から黄色い液体が飛び出して俺に降りかかる。"
translation = "루리엘의 가랑이에서 노란 액체가 튀어나와 나에게 쏟아진다."

[[dialogue]]
speaker = "unk"
original = "立ち上る匂いで、小水を漏らしたのだとわずかに遅れて理解した。"
translation = "피어오르는 냄새로, 소변을 지렸다는 것을 조금 늦게 이해했다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「んんっ！？\u3000ふっ……んんぅっ……！」"
translation = "「응응!? 훗…… 응응웃……!」"

[[dialogue]]
speaker = "unk"
original = "ルリエル自身思いがけないことだったようで、ペニスに口を塞がれたまま戸惑いの声を上げるが、放尿を止めることはできない。"
translation = "루리엘 자신도 예상치 못한 일이었던 듯, 자지에 입이 막힌 채 당황한 목소리를 내지만, 방뇨를 멈출 수는 없다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「んふ……ふっ……んんっ<emoji=heart04>\u3000んぶっ……んっ──ん～～っ<emoji=heart04>」"
translation = "「응후…… 훗…… 응응 <emoji=heart04> 응붑…… 응──응～～ <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "天使の小さな体が羞恥と快感に震える。"
translation = "천사의 작은 몸이 수치와 쾌감에 떨린다."

[[dialogue]]
speaker = "unk"
original = "ルリエルの小水を浴びながら、射精の勢いはなぜか増していた。"
translation = "루리엘의 소변을 뒤집어쓰면서, 사정의 기세는 왠지 더 거세지고 있었다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「んっ……こくこく……んくっ。ぢゅるっ、ぢゅるるるんっ…………ん、ごくっ<emoji=heart04>」"
translation = "「응…… 꿀꺽꿀꺽…… 응윽. 쥬릇, 쥬르르릉………… 응, 꿀꺽 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そしてルリエルの白い喉が二度三度と動き、口内に吐き出された精を飲み干した。"
translation = "그리고 루리엘의 하얀 목구멍이 두 번 세 번 움직이며, 입안에 뱉어진 정액을 다 마셨다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ぷはぁ……はぁ……はぁ……<emoji=heart04>\u3000会長さんに、おしっこしちゃいましたぁ……」"
translation = "「푸하아…… 하아…… 하아…… <emoji=heart04> 회장님에게, 오줌 싸버렸어여……」"

[[dialogue]]
speaker = "unk"
original = "おしっこを見られた恥ずかしさで赤くなりながら、申し訳なさそうにするルリエル。"
translation = "오줌을 들킨 부끄러움에 붉어지면서, 미안한 듯이 하는 루리엘."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ごめんなさい……でしたぁ……」"
translation = "「죄송해요…… 였어여……」"

[[dialogue]]
speaker = "unk"
original = "絞り出すようなルリエルの謝罪。"
translation = "쥐어짜는 듯한 루리엘의 사과."

[[dialogue]]
speaker = "unk"
original = "だけどその幼い顔には快楽も浮かんでいて。"
translation = "하지만 그 앳된 얼굴에는 쾌락도 떠올라 있어서."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「くちゅっ……ちゅくっ、ちゅくちゅく……んっ、こくっ」"
translation = "「쿠츄…… 츄쿠, 츄쿠츄쿠…… 응, 꿀꺽」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ぺろ……ぺろ……会長さんのせーし、おいしいのです……れぇろ……ぴちゃ、ぴちゃ……」"
translation = "「낼름…… 낼름…… 회장님의 정자, 맛있는 거여요…… 레로…… 핥짝, 핥짝……」"

[[dialogue]]
speaker = "unk"
original = "口内の精液の残滓を味わって飲み込み、名残惜しそうにペニスに付着した精液をすべて舐めとるのだった。"
translation = "입안의 정액 잔해를 맛보며 삼키고, 아쉬운 듯 자지에 묻은 정액을 전부 핥아내는 것이었다."

