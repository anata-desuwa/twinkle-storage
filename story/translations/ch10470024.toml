[[dialogue]]
speaker = "unk"
original = "第４話,あなただけのアイドル,P"
translation = "제4화, 당신만의 아이돌, P"

[[dialogue]]
speaker = "unk"
original = "どうしてこう、星徒会の業務ってやつは次から次へとやってくるんだろう？"
translation = "어째서 이렇게 성도회 업무라는 건 끊임없이 밀려오는 걸까?"

[[dialogue]]
speaker = "unk"
original = "なんとかメルエルとデートの約束を取り付けたいけれど、それもままならない多忙な日々が続いていた──"
translation = "어떻게든 멜레르와 데이트 약속을 잡고 싶지만, 그럴 여유조차 없는 바쁜 나날이 계속되고 있었다──"

[[dialogue]]
speaker = "メルエル"
original = "「会長くん、よかったら今日の放課後、一緒に帰らない？\u3000素敵な猫カフェを見つけたんだけど……！」"
translation = "「회장군, 괜찮으면 오늘 방과 후에 같이 안 갈래? 멋진 고양이 카페를 찾았는데……!」"

[[dialogue]]
speaker = "unk"
original = "また今度でもいいかな……？"
translation = "다음에 가도 될까……?"

[[dialogue]]
speaker = "unk"
original = "ごめん、メルエル"
translation = "미안, 멜레르"

[[dialogue]]
speaker = "メルエル"
original = "「あ……お仕事、忙しかった？\u3000ごめんね、呼び止めちゃって……」"
translation = "「아…… 일 바빴어? 미안해, 불러 세워서……」"

[[dialogue]]
speaker = "unk"
original = "猫カフェは今度の週末に行こう！"
translation = "고양이 카페는 이번 주말에 가자!"

[[dialogue]]
speaker = "unk"
original = "こっちこそ時間取れなくてごめん"
translation = "나야말로 시간 못 내서 미안해"

[[dialogue]]
speaker = "メルエル"
original = "「うん、それじゃあ頑張ってね……！」"
translation = "「응, 그럼 힘내……!」"

[[dialogue]]
speaker = "メルエル"
original = "「はあ。今日も会長くん、大変そうだったなあ……でも私は役員じゃないから、流石にお仕事には首を突っ込めないし……」"
translation = "「하아. 오늘도 회장군, 힘들어 보였지…… 하지만 난 임원이 아니니까 역시 일에 참견할 수는 없고……」"

[[dialogue]]
speaker = "メルエル"
original = "「来年こそは星徒会役員に立候補したいし。訓練も欠かせないんだけど……何だか身が入らないよ～……」"
translation = "「내년에는 꼭 성도회 임원에 입후보하고 싶어. 훈련도 빼놓을 수 없지만…… 왠지 의욕이 안 나네~……」"

[[dialogue]]
speaker = "レミカ"
original = "「あれ……メルエル。どうかしたの、浮かない顔して」"
translation = "「어라…… 멜레르. 무슨 일이야, 안색이 안 좋네.」"

[[dialogue]]
speaker = "メルエル"
original = "「レミカちゃん。実は──」"
translation = "「레미카 짱. 사실은──」"

[[dialogue]]
speaker = "レミカ"
original = "「なるほど。彼氏が大変そうなのに、その手伝いができないことを気にしてるんだ？」"
translation = "「그렇구나. 남자친구가 힘들어 보이는데 그걸 못 도와주는 게 신경 쓰이는 거야?」"

[[dialogue]]
speaker = "メルエル"
original = "「肝心な時に支えられないのが歯がゆいっていうか……恋人なのにふがいないっていうか……」"
translation = "「정작 중요할 때 힘이 되어주지 못하는 게 답답하달까…… 연인인데 한심하달까……」"

[[dialogue]]
speaker = "レミカ"
original = "「うーん……だったら、仕事以外のところで支えてあげるのはどうかな。お弁当を作ってあげるとか」"
translation = "「으음…… 그럼 업무 이외의 부분에서 힘이 되어주는 건 어때? 도시락을 싸준다든가.」"

[[dialogue]]
speaker = "メルエル"
original = "「それはさせてもらってるよ！\u3000今日も会長くんの好きなものでお弁当箱をぎっちりにして、でも栄養バランスも考えて……！」"
translation = "「그건 하고 있어! 오늘도 회장군이 좋아하는 걸로 도시락통을 꽉 채워서, 하지만 영양 밸런스도 생각해서……!」"

[[dialogue]]
speaker = "レミカ"
original = "「してるんだ。じゃあ、朝起こしに行ってあげるとか……」"
translation = "「하고 있구나. 그럼 아침에 깨우러 가준다든가……」"

[[dialogue]]
speaker = "メルエル"
original = "「それもさせてもらってる！\u3000合鍵あるし！\u3000ぁ、でもリノお義母さんに『あんまり甘やかさなくていいのよ』って言われちゃって……しょぼん」"
translation = "「그것도 하고 있어! 보조 열쇠도 있고! 아, 하지만 리노 시어머님이 『너무 응석 받아주지 않아도 된단다』라고 하셔서…… 시무룩」"

[[dialogue]]
speaker = "レミカ"
original = "「してるんだ……それなら仮眠のサポートとかどうかな。昼休みとかの短い時間に、ちょっとでも寝てもらうの」"
translation = "「하고 있구나…… 그렇다면 낮잠 서포트 같은 건 어때? 점심시간 같은 짧은 시간에 조금이라도 자게 해주는 거야.」"

[[dialogue]]
speaker = "レミカ"
original = "「私もマネージャーさんに『１０分経ったら起こして』ってお願いすることあるし」"
translation = "「나도 매니저님한테 『10분 지나면 깨워줘』라고 부탁할 때가 있거든.」"

[[dialogue]]
speaker = "メルエル"
original = "「それもさせてもらってるよ！\u3000お昼休みに膝枕してあげてね、頭を撫でたり、たまに耳かきをしてあげたり！」"
translation = "「그것도 하고 있어! 점심시간에 무릎베개 해주고 말이야, 머리를 쓰다듬거나 가끔 귀도 파주고!」"

[[dialogue]]
speaker = "レミカ"
original = "「してるんだ……え、むしろ何ならしてないの？\u3000もう十分だと思うけど」"
translation = "「하고 있구나…… 에, 오히려 안 하는 게 뭐야? 이미 충분하다고 생각하는데.」"

[[dialogue]]
speaker = "メルエル"
original = "「ぜんぜん十分じゃないよ～っ……あんなに大変そうなのに。頑張って！\u3000って言うことしかできないし……」"
translation = "「전혀 충분하지 않아~…… 그렇게 힘들어 보이는데. 힘내! 라고 말해주는 것밖에 못 하고……」"

[[dialogue]]
speaker = "レミカ"
original = "「いや、至れり尽くせりでしょ。完全無欠、パーフェクトな彼女だよ」"
translation = "「아니, 지극정성이잖아. 완전무결, 퍼펙트한 여자친구야.」"

[[dialogue]]
speaker = "メルエル"
original = "「そうなのかなあ……もっと私にできること、ないかなあ……」"
translation = "「그런 걸까…… 내가 할 수 있는 일, 더 없을까……」"

[[dialogue]]
speaker = "レミカ"
original = "「──良いこと思いついた。ねぇ、もう一度『アーネスト』を結成してみない？」"
translation = "「──좋은 생각이 났어. 저기, 다시 한번 『어니스트』를 결성해보지 않을래?」"

[[dialogue]]
speaker = "レミカ"
original = "「男の子の元気を引き出すには、アイドルのライブが一番だよ。ね、会長のためにさ？」"
translation = "「남자의 기운을 북돋아 주는 데는 아이돌 라이브가 최고야. 그치, 회장을 위해서 말이야?」"

[[dialogue]]
speaker = "メルエル"
original = "「アイドルは１日で終わりって約束したよねっ！？\u3000レミカちゃんが再結成したいだけのような気がするっ……！」"
translation = "「아이돌은 하루로 끝내기로 약속했잖아!? 레미카 짱이 재결성하고 싶을 뿐인 것 같은 기분이 들어……!」"

[[dialogue]]
speaker = "レミカ"
original = "「残念、またフられちゃった」"
translation = "「아쉽네, 또 차였어.」"

[[dialogue]]
speaker = "メルエル"
original = "「も～っ……私は会長くんとお付き合いしてるから、アイドル活動は無理なんだってば～……！」"
translation = "「정말~…… 난 회장군이랑 사귀고 있으니까 아이돌 활동은 무리라니까~……!」"

[[dialogue]]
speaker = "メルエル"
original = "（……あれ？\u3000でも、再結成はしなくても、アイドルの衣装で元気づけることはできるんじゃ……？）"
translation = "(……어라? 하지만 재결성은 안 하더라도 아이돌 의상으로 기운을 북돋아 줄 수는 있지 않을까……?)"

[[dialogue]]
speaker = "unk"
original = "メルエルの放課後デートを断って、書類を片付けているうちに夜になってしまった。"
translation = "멜레르의 방과 후 데이트를 거절하고 서류를 정리하는 사이에 밤이 되어버렸다."

[[dialogue]]
speaker = "unk"
original = "お腹は空いたし、目はしょぼしょぼするし、くたびれた……飲み物のお使いに出かけたヴィーナスはまだかな……？"
translation = "배는 고프고 눈은 침침하고, 지쳤다…… 마실 거 사러 나간 비너스는 아직인가……?"

[[dialogue]]
speaker = "unk"
original = "あ。おかえり、ヴィーナ──"
translation = "아. 왔어, 비너──"

[[dialogue]]
speaker = "メルエル"
original = "「会長くんっ！\u3000お疲れ様っ<emoji=heart04>\u3000今夜だけ復帰しちゃいました、アーネストの姫咲メルエルですっ！」"
translation = "「회장군! 수고했어<emoji=heart04> 오늘 밤만 복귀했습니다, 어니스트의 히메사키 멜레르입니다!」"

[[dialogue]]
speaker = "unk"
original = "メルエル！？\u3000その衣装は……！"
translation = "멜레르!? 그 의상은……!"

[[dialogue]]
speaker = "メルエル"
original = "「えへへっ、お仕事を頑張ってるキミが、元気になったらいいなって思って……変身してきちゃった！」"
translation = "「에헤헤, 일 열심히 하는 네가 기운을 차렸으면 좋겠다고 생각해서…… 변신하고 왔어!」"

[[dialogue]]
speaker = "メルエル"
original = "「ど、どうかなっ……ちょっとは癒しになったかな……？」"
translation = "「어, 어때…… 조금은 힐링이 됐을까……?」"

[[dialogue]]
speaker = "unk"
original = "２４時間、戦える！！"
translation = "24시간, 싸울 수 있어!!"

[[dialogue]]
speaker = "メルエル"
original = "「わわっ！？\u3000そんなに喜んでくれるなんて思わなかったな……ふふっ<emoji=heart04>」"
translation = "「와와!? 그렇게 기뻐해 줄 줄은 몰랐네…… 후훗<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
original = "「それじゃあもっと元気いっぱいになるように……歌とダンスで応援しちゃってもいい？」"
translation = "「그럼 더 기운이 펄펄 나도록…… 노래와 춤으로 응원해줘도 될까?」"

[[dialogue]]
speaker = "unk"
original = "ありがとう、メルエル！"
translation = "고마워, 멜레르!"

[[dialogue]]
speaker = "メルエル"
original = "「それじゃあ早速。ライブで一番盛り上がったあの曲、いっちゃうね～！」"
translation = "「그럼 바로. 라이브에서 제일 분위기 좋았던 그 노래, 갑니다~!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「待たせたわね、クロト！\u3000さっきそこでレミカに会ったの！\u3000一緒に晩御飯でもどうかしら！」"
translation = "「기다리게 했네, 쿠로토! 방금 저기서 레미카를 만났어! 같이 저녁이라도 어떠니!」"

[[dialogue]]
speaker = "レミカ"
original = "「失礼します、会長──」"
translation = "「실례하겠습니다, 회장──」"

[[dialogue]]
speaker = "メルエル"
original = "「ラブハート・ペネトレイターっ<emoji=heart04>\u3000──って！？」"
translation = "「러브 하트 페네트레이터<emoji=heart04> ──랄까!?」"

[[dialogue]]
speaker = "メルエル"
original = "「あ、２人とも、これはね、え～っと……」"
translation = "「아, 둘 다, 이건 말이지, 어~ 그러니까……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「もしかしてこれは……アーネスト再結成……ってコト！？」"
translation = "「설마 이건…… 어니스트 재결성……이라는 거니!?」"

[[dialogue]]
speaker = "メルエル"
original = "「違うよ！？\u3000これは会長くんを元気づけようと思って……！」"
translation = "「아니야! 이건 회장군 기운 차리게 해주려고……!」"

[[dialogue]]
speaker = "メルエル"
original = "「レミカちゃん！\u3000無言で変身しないでーっ！？」"
translation = "「레미카 짱! 아무 말 없이 변신하지 마──!?」"

[[dialogue]]
speaker = "レミカ"
original = "「──いいね、再結成。待ちわびてたんだ」"
translation = "「──좋네, 재결성. 기다리고 있었어.」"

[[dialogue]]
speaker = "メルエル"
original = "「話を聞いて～っ……！！」"
translation = "「내 말 좀 들어줘~~!!」"

[[dialogue]]
speaker = "unk"
original = "その後、メルエルはレミカの勧誘攻撃を何とかかわしきり──けれど一晩だけなら、ということで。"
translation = "그 후, 멜레르는 레미카의 권유 공격을 어떻게든 다 피해냈고── 하지만 하룻밤뿐이라면, 이라는 조건으로."

[[dialogue]]
speaker = "unk"
original = "俺とヴィーナスだけを観客に、トレーニング施設で一夜限りのアーネスト復活ライブを見せてくれたのだった──"
translation = "나와 비너스만을 관객으로 삼아 훈련 시설에서 하룻밤 한정 어니스트 부활 라이브를 보여주었다──"

