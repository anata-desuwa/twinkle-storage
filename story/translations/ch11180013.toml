[[dialogue]]
speaker = "unk"
original = "第３話,ナターシャの好きな場所,P"
translation = "제3화, 나타샤가 좋아하는 장소, P"

[[dialogue]]
speaker = "メルエル"
original = "「あ、おはよう、会長くん！」"
translation = "「아, 안녕, 회장 군!」"

[[dialogue]]
speaker = "ナターシャ"
original = "「おはよー」"
translation = "「안녕─」"

[[dialogue]]
speaker = "unk"
original = "２人ともおはよう"
translation = "둘 다 안녕."

[[dialogue]]
speaker = "unk"
original = "天界からの留学生、そして聖庭園の特務エージェントであるナターシャだが、すでに新星学園の日常に馴染みつつあった。"
translation = "천계에서의 유학생, 그리고 성정원의 특무 에이전트인 나타샤였지만, 이미 신성학원의 일상에 스며들고 있었다."

[[dialogue]]
speaker = "ナターシャ"
original = "「前から思ってたんだけどさー」"
translation = "「전부터 생각했던 건데 말이야─」"

[[dialogue]]
speaker = "メルエル"
original = "「うん？」"
translation = "「응?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「メルエルと会長さんってホントに幼なじみなの？」"
translation = "「메르엘이랑 회장님은 정말로 소꿉친구야?」"

[[dialogue]]
speaker = "メルエル"
original = "「ほえっ？」"
translation = "「호에?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「メルエルが昔流星市国にいたのって、半年だけなんだよね？\u3000会長さんもほとんど覚えてなかったみたいだし」"
translation = "「메르엘이 예전에 유성시국에 있었던 건 반년뿐이잖아? 회장님도 거의 기억 못 했던 것 같고.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「それで幼なじみって言っちゃっていいのかなーって」"
translation = "「그걸로 소꿉친구라고 말해도 되는 걸까나─ 싶어서.」"

[[dialogue]]
speaker = "メルエル"
original = "「ナターシャちゃ～んっ！？」"
translation = "「나타샤짱─!?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「あはは、冗談冗談。でも会長さんよりメルエルと付き合いの長い幼なじみとしては、ちょっと妬けちゃうな」"
translation = "「아하하, 농담 농담. 하지만 회장님보다 메르엘이랑 알고 지낸 기간이 긴 소꿉친구로서는, 조금 질투 나네.」"

[[dialogue]]
speaker = "ナターシャ"
original = "「……ね、会長さん？」"
translation = "「……그치, 회장님?」"

[[dialogue]]
speaker = "unk"
original = "（圧を感じる……）"
translation = "（압박감이 느껴져……）"

[[dialogue]]
speaker = "メルエル"
original = "「ねぇ、会長くん。こ、今週末のお話、なんだけどぉ……」"
translation = "「저기, 회장 군. 이, 이번 주말 이야기, 인데에……」"

[[dialogue]]
speaker = "メルエル"
original = "（お休みの日に遊園地へ行こうって、これ、デートのお誘いになっちゃうかな……？\u3000ひゃーっ）"
translation = "（쉬는 날에 유원지에 가자니, 이거, 데이트 신청이 되어 버리려나……? 히야앗）"

[[dialogue]]
speaker = "ナターシャ"
original = "「会長さん、私たち遊園地に行くんだけどさ、一緒に来てくれないかな？」"
translation = "「회장님, 우리 유원지에 갈 건데 말이야, 같이 가 주지 않을래?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「天界には遊園地がないから、メルエルに案内してもらうんだけど、女の子だけだとまたナンパされるかもしれないじゃない？」"
translation = "「천계에는 유원지가 없어서 메르엘이 안내해 주기로 했는데, 여자애들끼리만 있으면 또 헌팅당할지도 모르잖아?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「だから会長さんが一緒にいてくれると安心だなって」"
translation = "「그러니까 회장님이 같이 있어 주면 안심될 것 같아서.」"

[[dialogue]]
speaker = "unk"
original = "そういうことなら喜んで"
translation = "그런 거라면 기꺼이."

[[dialogue]]
speaker = "メルエル"
original = "「やったぁ！」"
translation = "「만세!」"

[[dialogue]]
speaker = "メルエル"
original = "（ありがとう、ナターシャちゃんっ）"
translation = "（고마워, 나타샤 짱）"

[[dialogue]]
speaker = "ナターシャ"
original = "（どうしたしまして。当日は私消えるから頑張って）"
translation = "（천만에. 당일엔 내가 비켜줄 테니까 힘내）"

[[dialogue]]
speaker = "メルエル"
original = "（それはそれで不安だよっ！？）"
translation = "（그건 그것대로 불안하다구!?）"

[[dialogue]]
speaker = "unk"
original = "そして次の休日──"
translation = "그리고 다음 휴일──"

[[dialogue]]
speaker = "ナターシャ"
original = "「メルエル、来れなくなっちゃったねー。まさか風邪ひいて熱を出すなんて思わなかったよ」"
translation = "「메르엘, 못 오게 되어버렸네. 설마 감기 걸려서 열이 날 줄은 몰랐어」"

[[dialogue]]
speaker = "ナターシャ"
original = "「メルエルは気にしないで楽しんでって言ってたけど、どうしよっか？」"
translation = "「메르엘은 신경 쓰지 말고 즐기라고 했지만, 어떡할까?」"

[[dialogue]]
speaker = "unk"
original = "チケット無駄になるし、お言葉に甘えようか"
translation = "티켓이 아까우니까, 호의를 받아들일까"

[[dialogue]]
speaker = "ナターシャ"
original = "「あー……ま、そうなるよね」"
translation = "「아~…… 뭐, 그렇게 되겠지」"

[[dialogue]]
speaker = "ナターシャ"
original = "（それじゃ意味ないんだけど……仕方ないか。ここで帰っても不自然だし）"
translation = "（그러면 의미가 없는데…… 어쩔 수 없나. 여기서 돌아가도 부자연스럽고）"

[[dialogue]]
speaker = "ナターシャ"
original = "「じゃ、会長さんにエスコートをお願いしようかな。デートの練習だと思って、紳士的にお願いね？」"
translation = "「그럼, 회장님한테 에스코트를 부탁해볼까. 데이트 연습이라고 생각하고, 신사답게 부탁해?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「会長さんは何がおすすめ？\u3000遊園地に来たら何に乗るものなの？」"
translation = "「회장님은 뭐가 좋아? 유원지에 오면 보통 뭘 타는 거야?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「……遊園地といえばジェットコースター？\u3000ああ、聞いたことある。あの大きなレールのやつだね」"
translation = "「……유원지 하면 제트 코스터? 아아, 들어본 적 있어. 그 커다란 레일이 있는 거 말이지」"

[[dialogue]]
speaker = "ナターシャ"
original = "「他には……メリーゴーラウンド、お化け屋敷……ふんふん、いろいろあるんだね。じゃあ行ってみよっか」"
translation = "「그 외에는…… 회전목마, 귀신의 집…… 흠흠, 여러 가지가 있구나. 그럼 가볼까」"

[[dialogue]]
speaker = "unk"
original = "早速、ナターシャといくつかアトラクションに乗ってみたが──"
translation = "곧바로 나타샤와 몇 가지 어트랙션을 타보았지만──"

[[dialogue]]
speaker = "ナターシャ"
original = "「へ～、遊園地ってこういうのなんだね」"
translation = "「헤~, 유원지란 이런 거구나」"

[[dialogue]]
speaker = "unk"
original = "反応薄っ！？"
translation = "반응 너무 없어!?"

[[dialogue]]
speaker = "ナターシャ"
original = "「ごめんごめん。私、昔からこういう感じでさ。何やっててもそう言われるんだよね」"
translation = "「미안 미안. 나, 옛날부터 이런 느낌이라서. 뭘 해도 그런 소릴 듣거든」"

[[dialogue]]
speaker = "ナターシャ"
original = "「アトラクションは乗ったし、趣向を変えて、遊園地の中歩いてみよっか？」"
translation = "「어트랙션은 탔으니까, 기분 전환 겸 유원지 안을 좀 걸어볼까?」"

[[dialogue]]
speaker = "ナターシャ"
original = "「へ～、売店もあるんだ。ホットドッグと、チュロスと、ソフトクリームと……ふぅん、こんな感じなんだ」"
translation = "「헤~, 매점도 있네. 핫도그랑, 츄러스랑, 소프트크림이랑…… 흐음, 이런 느낌이구나」"

[[dialogue]]
speaker = "ナターシャ"
original = "「あ、向こうは家族かな？\u3000子ども連れが多いなぁ。カップルもいるし、いろんな人がいるね」"
translation = "「아, 저쪽은 가족인가? 아이를 동반한 사람이 많네. 커플도 있고, 다양한 사람이 있어」"

[[dialogue]]
speaker = "ナターシャ"
original = "「でもみんな楽しそう。遊園地ってこんな場所なんだ」"
translation = "「하지만 다들 즐거워 보여. 유원지는 이런 곳이구나」"

[[dialogue]]
speaker = "unk"
original = "ナターシャが楽しめてなかったらごめん"
translation = "나타샤가 즐겁지 않다면 미안해"

[[dialogue]]
speaker = "ナターシャ"
original = "「ううん、会長さんが謝ることじゃないよ。私がそういう性分なだけ」"
translation = "「으응, 회장님이 사과할 일이 아니야. 내가 그런 성격일 뿐인걸」"

[[dialogue]]
speaker = "ナターシャ"
original = "「私、人が楽しいと思うものを、楽しいと思えなくてさ」"
translation = "「나, 남들이 즐겁다고 생각하는 걸 즐겁다고 느끼지 못해서 말이야」"

[[dialogue]]
speaker = "ナターシャ"
original = "「でも人が楽しんでるところを見るのは好き。私もそんな気持ちになれる気がするから」"
translation = "「하지만 사람들이 즐거워하는 모습을 보는 건 좋아해. 나도 그런 기분이 될 수 있을 것 같거든」"

[[dialogue]]
speaker = "ナターシャ"
original = "「だから遊園地は気に入ったよ。みんな笑顔で、楽しそうにしてる」"
translation = "「그래서 유원지는 마음에 들었어. 다들 웃는 얼굴로 즐거워하고 있어」"

[[dialogue]]
speaker = "ナターシャ"
original = "「会長さんが楽しんでるところも見せて？\u3000私のことは気にしないでいいから」"
translation = "「회장님이 즐거워하는 모습도 보여줘. 내 일은 신경 쓰지 않아도 되니까」"

[[dialogue]]
speaker = "unk"
original = "それからナターシャの言う通り、俺が乗りたいアトラクションに乗った。"
translation = "그 후 나타샤의 말대로, 내가 타고 싶은 어트랙션을 탔다."

[[dialogue]]
speaker = "unk"
original = "遊園地を楽しむ俺を、ナターシャはすぐ近くから微笑とともに眺めていた。"
translation = "유원지를 즐기는 나를, 나타샤는 바로 곁에서 미소와 함께 바라보고 있었다."

[[dialogue]]
speaker = "ナターシャ"
original = "「ふふ、結局、暗くなるまで遊んじゃったね。私なりに楽しめたよ」"
translation = "「후후, 결국 어두워질 때까지 놀아버렸네. 나름대로 즐거웠어」"

[[dialogue]]
speaker = "ナターシャ"
original = "「会長さんも楽しんでたね。撮れ高ばっちり。……それじゃメルエルに写真送信っと」"
translation = "「회장님도 즐거워 보였어. 사진도 잘 찍혔고. ……그럼 메르엘에게 사진 전송」"

[[dialogue]]
speaker = "unk"
original = "いつの間に撮ったんだ！？"
translation = "언제 찍은 거야!?"

[[dialogue]]
speaker = "ナターシャ"
original = "「特務エージェントだからね、監視対象に気付かれずに撮影するくらいはお手の物だよ」"
translation = "「특무 에이전트니까 말이야, 감시 대상에게 들키지 않고 촬영하는 것 정도는 식은 죽 먹기야」"

[[dialogue]]
speaker = "ナターシャ"
original = "「それじゃまたね、会長さん。次は楽しんでるところ以外も見たいな？」"
translation = "「그럼 또 봐, 회장님. 다음엔 즐거워하는 모습 말고 다른 면도 보고 싶네?」"

