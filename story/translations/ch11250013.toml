[[dialogue]]
speaker = "unk"
original = "第３話,先輩ヒーロー,P"
translation = "제3화, 선배 히어로, P"

[[dialogue]]
speaker = "unk"
original = "アクション女優を目指すアポロのために、俺が演技の相手をすることになった。"
translation = "액션 배우를 꿈꾸는 아폴로를 위해 내가 연기 상대를 해주기로 했다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「話は聞いたわ！\u3000私が監督としてアポロとクロトに指示を出すわよ！」"
translation = "「이야기는 들었어! 내가 감독으로서 아폴로와 쿠로토에게 지시를 내리겠어!」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「正直、ヴィーナスが監督なのはちょっと不安なんだが……」"
translation = "「솔직히 비너스가 감독인 건 좀 불안한데……」"

[[dialogue]]
speaker = "リノ"
original = "「アポロちゃん、名演技期待してるわよー」"
translation = "「아폴로짱, 명연기 기대할게~」"

[[dialogue]]
speaker = "フィオナ"
original = "「姉さーん、頑張ってくださーい」"
translation = "「언니~ 힘내세요~」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「しかもオーディエンスまでいるし……まぁ、これくらいでビビるようじゃ役者になんてなれないか。よし、やるぞ！」"
translation = "「게다가 관객까지 있고…… 뭐, 이 정도로 겁먹어서야 배우 같은 건 될 수 없겠지. 좋아, 한다!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「クロトは主人公の新米ヒーロー、アポロは年上の先輩ヒーロー役よ。まずは基地での最初の出会いから。よーい、アクション！」"
translation = "「쿠로토는 주인공인 신입 히어로, 아폴로는 연상의 선배 히어로 역이야. 우선 기지에서의 첫 만남부터. 레디, 액션!」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「お前が新入りか」"
translation = "「네가 신참이냐」"

[[dialogue]]
speaker = "unk"
original = "よろしくお願いします、先輩"
translation = "잘 부탁드립니다, 선배"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「ふん、戦いを知らない能天気な顔だ。いいか、あたしたちの仕事は悪を倒すことだ。弱いヒーローに価値はない」"
translation = "「흥, 싸움을 모르는 태평한 얼굴이군. 잘 들어, 우리 일은 악을 쓰러뜨리는 거다. 약한 히어로에게 가치는 없어」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「お前には期待していないが、せいぜいあたしの足を引っ張るなよ」"
translation = "「너에게 기대는 안 하지만, 기껏해야 내 발목이나 잡지 마라」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「へぇ～、やるじゃない！\u3000ツンな感じがちゃんと出てるわ！」"
translation = "「헤에~ 제법이잖아! 츤데레 같은 느낌이 제대로 나오고 있어!」"

[[dialogue]]
speaker = "フィオナ"
original = "「主人公に厳しくクールな先輩ヒーローがどう変化していくか、楽しみですね」"
translation = "「주인공에게 엄격하고 쿨한 선배 히어로가 어떻게 변화해갈지 기대되네요」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「この役、そういうキャラなのか……？」"
translation = "「이 역, 그런 캐릭터인 거냐……?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「次は先輩ヒーローが、主人公を助けてお説教するシーンよ。それじゃスタート！」"
translation = "「다음은 선배 히어로가 주인공을 도와주고 설교하는 장면이야. 그럼 스타트!」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「言ったはずだ。足を引っ張るな、と。お前の勝手な行動があたしたち全員を危険にさらすことになる」"
translation = "「말했을 텐데. 발목 잡지 말라고. 네 멋대로인 행동이 우리 모두를 위험에 빠뜨리게 된다」"

[[dialogue]]
speaker = "unk"
original = "……すみませんでした"
translation = "……죄송했습니다"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「誰かを助けるためだろうと関係ない。敵に背中を見せれば、助けた相手ごとやられるだけだ」"
translation = "「누군가를 돕기 위해서든 뭐든 상관없어. 적에게 등을 보이면 도와준 상대까지 당할 뿐이다」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「お前のそういうのは優しさじゃない。甘さっていうんだ。あたしが間に合わなければ命を落としていたんだぞ」"
translation = "「너의 그런 건 상냥함이 아니야. 무름이라고 하는 거다. 내가 늦었다면 목숨을 잃었을 거라고」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「……だが、あの過酷な状況で子どもを救出したことだけは褒めてやる。根性はあるようだな」"
translation = "「……하지만, 그 가혹한 상황에서 아이를 구출한 것만은 칭찬해주지. 근성은 있는 모양이군」"

[[dialogue]]
speaker = "リノ"
original = "「厳しさの中に見え隠れする感情……いいわね～」"
translation = "「엄격함 속에 살짝 엿보이는 감정…… 좋네~」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ここからは変身して撮るわよ！\u3000主人公が身を挺して先輩を助けた後のシーン！」"
translation = "「여기서부턴 변신해서 찍을 거야! 주인공이 몸을 던져 선배를 구한 뒤의 장면!」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「バカ野郎！\u3000どうしてあたしを助けた！？\u3000あんな無茶をして……お前も死ぬところだったんだぞ！？」"
translation = "「이 바보 자식! 왜 나를 구했어!? 그런 무모한 짓을…… 너도 죽을 뻔했단 말이다!?」"

[[dialogue]]
speaker = "unk"
original = "気付いたら体が動いていました"
translation = "정신을 차려 보니 몸이 움직이고 있었습니다"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「気付いたら……ってこのバカ！\u3000いいか、あたしが危険な状況に陥ったら、次は見捨てるんだぞ！」"
translation = "「정신을 차려 보니…… 라니 이 바보! 잘 들어, 내가 위험한 상황에 빠지면 다음엔 버리는 거다!」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「イヤだ？\u3000この前はあたしが助けたって？\u3000それは先任者として未熟なお前をフォローしただけで……」"
translation = "「싫다고? 저번에는 내가 구해줬지 않냐고? 그건 선임자로서 미숙한 너를 보조했을 뿐이고……」"

[[dialogue]]
speaker = "unk"
original = "大事な先輩を見捨てるなんてできません！"
translation = "소중한 선배를 저버릴 수는 없습니다!"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「──！」"
translation = "「──!」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「大事とかそういうことじゃないだろう！\u3000私情を挟むな、組織の一員として立場を考えて動け！」"
translation = "「소중하다든가 그런 문제가 아니잖아! 사적인 감정을 개입시키지 마, 조직의 일원으로서 입장을 생각하고 움직여!」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「……ったく、お前は本当に仕方ないやつだ」"
translation = "「……나 원 참, 너는 정말 어쩔 수 없는 녀석이구나」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「……バカ」"
translation = "「……바보」"

[[dialogue]]
speaker = "フィオナ"
original = "「これはなかなか……見ているこちらもキュンときてしまいそうです」"
translation = "「이거 제법…… 보는 저도 가슴이 두근거릴 것 같아요」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「う……今のはちょっとはずいな……」"
translation = "「으…… 방금 건 좀 부끄럽군……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「いい感じに温まってきたわね～！\u3000次はクライマックス！\u3000抱き合って気持ちを伝え合う場面よ！」"
translation = "「분위기 좋게 달아 올랐네~! 다음은 클라이맥스! 껴안고 마음을 전하는 장면이야!」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「待て待て待て！\u3000流星ライダーにそんなロマンスシーンはいらないだろ！」"
translation = "「잠깐 잠깐 잠깐! 유성 라이더에 그런 로맨스 장면은 필요 없잖아!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あなたの演技力を鍛えるためなんだから、つべこべ言わない！\u3000監督が必要だって言ったらやるのが役者でしょ？」"
translation = "「당신의 연기력을 단련하기 위한 거니까 군말 말기! 감독이 필요하다고 하면 하는 게 배우잖아?」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「それは……そうだが……」"
translation = "「그건…… 그렇지만……」"

[[dialogue]]
speaker = "リノ"
original = "「ヴィーナスちゃんの言う通りよ！\u3000ラブシーンもこなせてこその女優だわ！」"
translation = "「비너스짱 말이 맞아! 러브신도 소화해내야 비로소 여배우지!」"

[[dialogue]]
speaker = "フィオナ"
original = "「絆を深め合ったヒーロー同士のロマンス……興味があります」"
translation = "「유대를 깊게 다진 히어로끼리의 로맨스…… 흥미롭네요」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「お前らもう楽しんでるだろ！！」"
translation = "「너희들 아주 즐기고 있구만!!」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「ええい、こうなったら全力でやるまでだ！\u3000お前も本気で来い、魔王！」"
translation = "「에잇, 이렇게 된 이상 전력으로 할 뿐이다! 너도 진심으로 덤벼라, 마왕!」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「お前のおかげで悪の組織を倒せた。これであたしたちの戦いも終わりだ」"
translation = "「너 덕분에 악의 조직을 쓰러뜨릴 수 있었어. 이걸로 우리 싸움도 끝이다」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「最初は甘ちゃんの世話を任されて、どうなることかと思ったが……ここまで戦い抜けたのはお前のおかげだ。ありがとう」"
translation = "「처음엔 풋내기 뒷바라지를 맡게 돼서 어떻게 될까 싶었지만…… 여기까지 싸워올 수 있었던 건 너 덕분이야. 고맙다」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「あたしたちの組織も解散になる。お前も元いた場所に──」"
translation = "「우리 조직도 해산하게 돼. 너도 원래 있던 곳으로──」"

[[dialogue]]
speaker = "unk"
original = "別れの言葉を切り出そうとしたアポロを、ぎゅっと抱きしめる。"
translation = "작별 인사를 꺼내려던 아폴로를 꽉 껴안는다."

[[dialogue]]
speaker = "アポロ（大人）"
original = "「な、なんのつもりだ……？」"
translation = "「무, 무슨 속셈이냐……?」"

[[dialogue]]
speaker = "unk"
original = "俺は先輩と一緒に生きたいです！"
translation = "저는 선배와 함께 살고 싶습니다!"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「なっ！？\u3000お前、それどういう意味かわかってるのか！？」"
translation = "「나앗!? 너, 그게 무슨 의미인지 알고 하는 소리냐!?」"

[[dialogue]]
speaker = "unk"
original = "好きです、先輩"
translation = "좋아합니다, 선배"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「ッ──！」"
translation = "「윽──!」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「お前は本当に……バカなやつだ。さんざん厳しくしたのに、こんなあたしのどこがいいんだ」"
translation = "「너는 정말…… 바보 같은 녀석이구나. 그렇게 엄하게 대했는데, 이런 나의 어디가 좋다는 거야」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「だけどあたしも、そんなバカなお前が好きになってしまった。お似合いのバカだ」"
translation = "「하지만 나도, 그런 바보 같은 네가 좋아져 버렸어. 끼리끼리 어울리는 바보군」"

[[dialogue]]
speaker = "unk"
original = "アポロが俺を強く抱き返し、至近距離で見つめ合う。"
translation = "아폴로가 나를 강하게 마주 안고, 지척에서 서로를 응시한다."

[[dialogue]]
speaker = "アポロ（大人）"
original = "「これからも、あたしの背中はお前に預ける」"
translation = "「앞으로도 내 등은 너에게 맡기마」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「お前はあたしの……一生の相棒だ」"
translation = "「너는 나의…… 평생의 파트너다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「カーット！！\u3000最高のシーンだったわよ！」"
translation = "「컷!! 최고의 장면이었어!」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「はぁ～……疲れた。役者ってのは大変なんだなぁ～」"
translation = "「하아~…… 지친다. 배우라는 건 힘든 일이구나~」"

[[dialogue]]
speaker = "リノ"
original = "「アポロちゃん、さっきの良かったわよ～！」"
translation = "「아폴로짱, 방금 거 좋았어~!」"

[[dialogue]]
speaker = "フィオナ"
original = "「姉さんの演技、とても素敵でした。つい見入ってしまいました」"
translation = "「언니의 연기, 정말 멋졌어요. 나도 모르게 넋을 잃고 봤습니다」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「そうか？\u3000へへ、あたしには役者の才能があるみたいだな」"
translation = "「그래? 헤헤, 나에겐 배우 소질이 있는 모양이네」"

[[dialogue]]
speaker = "unk"
original = "お疲れ様、アポロ"
translation = "수고했어, 아폴로"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「あ、ああ……練習付き合ってくれてありがとな。おかげでいい経験になったよ」"
translation = "「아, 아아…… 연습 같이 해줘서 고맙다. 덕분에 좋은 경험이 됐어」"

[[dialogue]]
speaker = "アポロ（大人）"
original = "「気が向いたらまた相手になってくれよ……な？」"
translation = "「생각나면 또 상대해 줘…… 알았지?」"

[[dialogue]]
speaker = "unk"
original = "さっき演技したシーンのせいか、アポロの顔がほんのり赤い。"
translation = "방금 연기한 장면 때문인지 아폴로의 얼굴이 살짝 붉다."

[[dialogue]]
speaker = "unk"
original = "俺もアポロの顔を見ると、胸の鼓動が速くなるのだった。"
translation = "나도 아폴로의 얼굴을 보자 가슴의 고동이 빨라지는 것이었다."

