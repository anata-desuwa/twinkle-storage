[[dialogue]]
speaker = "unk"
original = "第２話,甘えん坊のヴィーナス,P"
translation = "제2화, 응석꾸러기 비너스"

[[dialogue]]
speaker = "unk"
original = "放課後、教室で授業の課題を片付けていると──"
translation = "방과 후, 교실에서 수업 과제를 정리하고 있자──"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「か、会長っ！\u3000大変、大変なの！」"
translation = "「회, 회장! 큰일이야, 큰일 났어!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ヴィーナスが、お子ちゃま化しちゃった！！！」"
translation = "「비너스가, 어린애가 되어버렸어!!!」"

[[dialogue]]
speaker = "unk"
original = "どういうこと！？"
translation = "그게 무슨 소리야!?"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「おそいわよっ！\u3000まちくたびれちゃったじゃないっ！」"
translation = "「늦잖아! 기다리다 지쳤단 말이야!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ええと、会長。状況を簡単に説明するとね──」"
translation = "「저기, 회장. 상황을 간단히 설명하자면 말이지──」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「今朝、業者が来て星徒会室にワックスをかけたそうです。そうとは知らず前会長がやってきて、ズッコケて頭を打ちました」"
translation = "「오늘 아침, 업자가 와서 성도회실에 왁스칠을 했다고 합니다. 그걸 모르고 전 회장님이 오셨다가, 콰당 하고 넘어져서 머리를 부딪쳤습니다.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「こんなこともあるのね～。お姉ちゃん、びっくりしちゃったわ。記憶とか大丈夫みたいだけど、精神年齢だけ子供に戻っちゃったみたいね～」"
translation = "「이런 일도 있네~. 언니, 깜짝 놀랐단다. 기억 같은 건 괜찮은 것 같은데, 정신 연령만 어린애로 돌아가 버린 모양이야~」"

[[dialogue]]
speaker = "unk"
original = "いや、そんなことあります！？"
translation = "아니, 그런 일이 있을 수 있어요!?"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「や、やっぱマズいよね？\u3000病院、病院に電話しなくちゃ……！」"
translation = "「역시 위험하지? 병원, 병원에 전화해야……!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「びょういんはヤ～。おちゅうしゃ、きらいだもの」"
translation = "「병원은 시러~. 주사, 싫단 말이야.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ねぇねぇ、それよりもみんな！」"
translation = "「있지 있지, 그것보다 모두들!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「わたしと、かけっこでしょうぶしましょっ！」"
translation = "「나랑 달리기 시합하자!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「凄い。中身は前会長のまま。この唐突さ、覚えがありすぎる」"
translation = "「대단해. 알맹이는 전 회장님 그대로. 이 돌발성, 너무나 익숙해.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あら可愛らしい♪\u3000ねえ、かけっこって……グラウンドで競争するってこと？」"
translation = "「어머 귀여워라♪ 저기, 달리기라는 게…… 운동장에서 경주한다는 거니?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ううん。せいりょくで、そらをとぶかけっこよ！\u3000おにくわきおどるわ！」"
translation = "「으응. 성력으로 하늘을 나는 달리기야! 가슴이 두근두근해!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「結構ガチなやつじゃないそれ！？」"
translation = "「꽤나 진심인 녀석이잖아 그거!?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「よーし、かけっこスタートよ、みんな！\u3000まけないんだからっ！」"
translation = "「좋아, 달리기 시작이야, 모두들! 지지 않을 거니까!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふふっ。会長くんに手を繋いでもらって、本当に子供みたいね。可愛いわ～♪」"
translation = "「후훗. 회장군에게 손을 잡히고, 정말 어린애 같네. 귀여워라~♪」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「んうぅ……ねむい……」"
translation = "「으으…… 졸려……」"

[[dialogue]]
speaker = "unk"
original = "（ヴィーナスの頭を撫でてみる）"
translation = "(비너스의 머리를 쓰다듬어 본다)"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「んふふふ……くすぐったい……かいちょーのて、おっきい……」"
translation = "「음후후후…… 간지러워…… 회장의 손, 크다……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「……じゃあ、九浄邸までヴィーナスのこと、よろしくね。何かあったら連絡してくれていいから。私、早く帰ってお風呂入りたい……」"
translation = "「……그럼, 쿠죠 저택까지 비너스를 잘 부탁해. 무슨 일 있으면 연락해도 되니까. 나, 빨리 돌아가서 목욕하고 싶어……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「疲労困憊。子供に戻った前会長が、ここまでとは思いませんでした……。それじゃあ申し訳ありませんが、私たちは先に失礼します」"
translation = "「피로곤비. 어린애가 된 전 회장님이 이 정도일 줄은 몰랐습니다……. 그럼 죄송합니다만, 저희는 먼저 실례하겠습니다.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「……かいちょー、つかれたぁ……おんぶしてぇ……」"
translation = "「……회장, 힘들어…… 업어줘……」"

[[dialogue]]
speaker = "unk"
original = "（ヴィーナスをおぶってやる）"
translation = "(비너스를 업어 준다)"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「かいちょーのせなか、あったかぁい……んふふふ……おっきぃ……いいにおいするぅ……」"
translation = "「회장의 등, 따뜻해…… 음후후후…… 크다…… 좋은 냄새 나……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「なんだか、おとうさん、みたい～……」"
translation = "「왠지, 아빠, 같아~……」"

[[dialogue]]
speaker = "unk"
original = "お父さん……？"
translation = "아빠……?"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「……すぅ……すぅ……んんっ、すう…………かいちょぉ……」"
translation = "「……쌔근……쌔근……음, 쌔근…………회장……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「…………んっ、んんっ……」"
translation = "「…………음, 으음……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「……ん？\u3000あれ、私、何して……」"
translation = "「……어? 어라, 나, 뭐 하고……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「って、クロト！？\u3000なんで私のことおんぶしてるの！？」"
translation = "「그보다, 쿠로토!? 왜 나를 업고 있는 거야!?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「えっ、ていうか、もう夜になってる！？\u3000なんで！？\u3000どうして！？」"
translation = "「엣, 그나저나 벌써 밤이 됐어!? 왜!? 어째서!?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「……ハッ！\u3000もしかして私……時間旅行してたのでは！？」"
translation = "「……핫! 설마 나…… 시간 여행을 했던 건가!?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「さすが私ね！\u3000いつかやれると思ってたのよ！」"
translation = "「역시 나네! 언젠가 할 수 있을 거라 생각했어!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「──ふうん、なるほど。頭を打って気絶してたのね、私」"
translation = "「──흐음, 그렇구나. 머리를 부딪쳐서 기절했었구나, 나.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「どおりで記憶がないわけね。たんこぶもできてるし」"
translation = "「어쩐지 기억이 없다 했어. 혹도 나 있고.」"

[[dialogue]]
speaker = "unk"
original = "復活したなら背中から降りて貰えると……"
translation = "부활했다면 등에서 내려와 줬으면 하는데……"

[[dialogue]]
speaker = "unk"
original = "それよりも……"
translation = "그것보다……"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「えー？\u3000いいじゃないこのままで。私、クロトの背中、好きよ。おっきくてなんだか安心するわ」"
translation = "「에이~? 괜찮잖아 이대로도. 나, 쿠로토의 등, 좋아해. 넓어서 왠지 안심돼.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「……ねえ、このままぎゅって抱き着いてみてもいい？」"
translation = "「……저기, 이대로 꼬옥 안겨봐도 돼?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「……うん。いいわねこれは。すっごく安心する」"
translation = "「……응. 좋네 이거. 엄청 안심돼.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「すんすんっ……なんだかいい匂いもするわね。もしかしてクロトって、アロマ的なものを放出してたりするのかしら？」"
translation = "「킁킁…… 왠지 좋은 냄새도 나네. 혹시 쿠로토는 아로마 같은 걸 방출하고 있는 걸까?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ま、なんでもいいわねっ。それよりもっと抱きしめて、リラックス成分を吸収しなくちゃ」"
translation = "「뭐, 아무렴 어때! 그것보다 더 꽉 안아서, 릴랙스 성분을 흡수해야겠어.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「んん～～～♪\u3000生き返る～～～！」"
translation = "「으으음~~~♪ 살 것 같아~~~!」"

[[dialogue]]
speaker = "unk"
original = "（ま、今日は好きなようにさせてやるか……）"
translation = "(뭐, 오늘은 마음대로 하게 놔둘까……)"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「さあ、九浄邸までゴーゴーよ！\u3000疾風となって夜を切り裂きなさい！」"
translation = "「자, 쿠죠 저택까지 고고야! 질풍이 되어 밤을 가르렴!」"

[[dialogue]]
speaker = "unk"
original = "俺はやれやれと思いつつも、ヴィーナスの望むように、九浄邸に向けて走り出すのだった。"
translation = "나는 어쩔 수 없다고 생각하면서도, 비너스가 원하는 대로 쿠죠 저택을 향해 달려나갔다."

