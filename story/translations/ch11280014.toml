[[dialogue]]
speaker = "unk"
original = "第４話,リコさんと大人な休日,P"
translation = "제4화, 리코 씨와 어른스러운 휴일, P"

[[dialogue]]
speaker = "unk"
original = "リコさんと学園でもよく会って関わるようになり、しばらく経ったある休日のこと。"
translation = "리코 씨와 학원에서도 자주 만나며 엮이게 된 지 얼마간의 시간이 흐른 어느 휴일의 일."

[[dialogue]]
speaker = "unk"
original = "俺はリコさんに誘われて、リゾート結界のプライベートビーチへ遊びにやって来ていた――"
translation = "나는 리코 씨의 권유로 리조트 결계의 프라이빗 비치에 놀러 오게 되었다──"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「少年、休日にすまないな。お姉さんに付き合ってくれて感謝する」"
translation = "「소년, 휴일에 미안하군. 이 누나와 어울려줘서 고맙다」"

[[dialogue]]
speaker = "unk"
original = "今日はまた、依頼の相談でしょうか？"
translation = "오늘은 또 의뢰 상담인가요?"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「ん？\u3000もしかして、公安委員会の依頼だと思ってしまっていたか？」"
translation = "「음? 설마 공안위원회의 의뢰라고 생각하고 있었나?」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「そうか……だとしたらすまない。単純に、たまたまオフだったから、試しに声をかけてみただけなんだ」"
translation = "「그런가…… 그렇다면 미안하군. 단순히 마침 비번이라서 시험 삼아 말을 걸어본 것뿐이다」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「そうしたら、少年が即決でＯＫしてくれたものだから、つい調子に乗ってしまった」"
translation = "「그랬더니 소년이 즉답으로 OK를 해주는 바람에 그만 우쭐해져 버렸어」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「昨日の夜は酒を飲んでしまっていたのもあるが……冷静に考えてみれば、そうだな。……年の離れた私から連絡が来れば、そう思うのが普通か」"
translation = "「어젯밤에 술을 좀 마셨던 탓도 있겠다만…… 냉정하게 생각해보면 그렇군. ……나이 차이가 나는 나한테서 연락이 오면 그렇게 생각하는 게 보통인가」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「最近は学園でもよく会っていたから、いつの間にか感覚が麻痺してしまっていたようだ」"
translation = "「최근 학원에서도 자주 만났기에 어느샌가 감각이 마비되어 버렸던 모양이군」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「少年からすれば私は、キミの母親であるリノの友人だというのにな……」"
translation = "「소년 입장에서 보면 나는 자네 어머니인 리노의 친구인데 말이야……」"

[[dialogue]]
speaker = "unk"
original = "そんなことないです！"
translation = "그렇지 않아요!"

[[dialogue]]
speaker = "unk"
original = "俺は慌てて首を横に振り、年齢なんて気にしていないと伝える。"
translation = "나는 서둘러 고개를 저으며 나이 같은 건 신경 쓰지 않는다고 전한다."

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「気を遣わせてしまってすまない、少年。休みに付き合わせてしまっているお詫びと言ってはなんだが、今日はお姉さんが食事を何でも奢ろう」"
translation = "「신경 쓰게 해서 미안하군, 소년. 휴일에 어울려준 사과라고 하긴 그렇다만, 오늘은 이 누나가 식사를 뭐든 사마」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「リゾート結界でもいいし、外の高級な飯屋で食べるのでもいいぞ？\u3000何がいい？」"
translation = "「리조트 결계도 좋고, 밖의 고급 식당에서 먹는 것도 좋다. 뭐가 좋나?」"

[[dialogue]]
speaker = "unk"
original = "俺は少し考えてから、口を開く。"
translation = "나는 조금 생각하다 입을 연다."

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「――せっかく遊ぶんだから、変なことは気にしないで、全力で楽しまないと損……？」"
translation = "「──기왕 노는 거니까 이상한 건 신경 쓰지 말고 전력으로 즐기지 않으면 손해……?」"

[[dialogue]]
speaker = "unk"
original = "今日は２人で海を楽しみましょう"
translation = "오늘은 둘이서 바다를 즐겨요"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「……そうか」"
translation = "「……그런가」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「なら、少年の気持ちに甘えさせてもらうとしよう」"
translation = "「그럼 소년의 마음에 기대기로 하지」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「ちなみに、元々は海でゆっくり過ごしながら、少年に色々話を聞きたかったんだが……それについてはどうだ？」"
translation = "「참고로 원래는 바다에서 느긋하게 시간을 보내며 소년에게 이런저런 이야기를 듣고 싶었다만…… 그것에 대해선 어떤가?」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「私の趣味は、『情報収集』でな」"
translation = "「내 취미는 『정보 수집』이라서 말이야」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「昔から知識欲が強くて、知ることが好きなんだ」"
translation = "「옛날부터 지적 호기심이 강해서 아는 것을 좋아한다」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「少年のことについては、御前試合の時から注目して情報を追って来てはいるが、実際にじっくり話してみないと分からないことも当然あるだろう？」"
translation = "「소년에 대해서는 어전 시합 때부터 주목해서 정보를 쫓아오고는 있지만, 실제로 진득하게 대화해보지 않으면 모르는 부분도 당연히 있겠지?」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「だから、よければビーチチェアーに座りながら、キミのことを色々と教えてくれ」"
translation = "「그러니 괜찮다면 비치 체어에 앉아서 자네에 대해 이것저것 가르쳐주게」"

[[dialogue]]
speaker = "unk"
original = "それから浜辺に設置されたパラソルの下、２つ並んだビーチチェアーに寝そべりながら、俺はリコさんに今までのことを話していた。"
translation = "그 후 해변에 설치된 파라솔 아래, 두 개 나란히 놓인 비치 체어에 누워 나는 리코 씨에게 지금까지의 일을 이야기했다."

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「ふむふむ……なるほど」"
translation = "「흠흠…… 과연」"

[[dialogue]]
speaker = "unk"
original = "リコさんは、手帳にボールペンでメモを取りながら頷く。"
translation = "리코 씨는 수첩에 볼펜으로 메모를 하며 고개를 끄덕인다."

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「少年のバイト経験の話は面白いな。まさか猫耳メイド喫茶で女装して務めていたことがあるとは……」"
translation = "「소년의 알바 경험 이야기는 재미있군. 설마 고양이 귀 메이드 카페에서 여장을 하고 근무한 적이 있을 줄이야……」"

[[dialogue]]
speaker = "unk"
original = "そこまで話すつもりはなかったのに……！"
translation = "거기까지 이야기할 생각은 없었는데……!"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「ふっ、私は公安委員会の本部長にまでなった女だぞ？\u3000経歴くらい調べるのはわけもないさ」"
translation = "「훗, 나는 공안위원회 본부장까지 지낸 여자라고? 경력 정도 조사하는 건 일도 아니지」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「それで、その時はどんな名前でメイドをやっていたんだ？」"
translation = "「그래서 그때는 어떤 이름으로 메이드를 했었나?」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「――クロにゃん？\u3000ふっ……ふふっ……！」"
translation = "「──쿠로냥? 훗…… 후후……!」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「可愛い名前じゃないか。その時の写真とかはないのか？」"
translation = "「귀여운 이름 아닌가. 그때의 사진 같은 건 없나?」"

[[dialogue]]
speaker = "unk"
original = "……残念ながら無いですね"
translation = "……아쉽게도 없네요"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「本当か？\u3000お姉さんの目をちゃんと見てから、もう１度言ってみろ」"
translation = "「정말인가? 이 누나의 눈을 똑바로 보고서 다시 한번 말해봐라」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「じ～っ……」"
translation = "「지이~……」"

[[dialogue]]
speaker = "unk"
original = "チェアーから起き上がって、顔を近づけて覗き込んで来るリコさん。"
translation = "체어에서 일어나 얼굴을 가까이 대고 들여다보는 리코 씨."

[[dialogue]]
speaker = "unk"
original = "俺は思わずドキッとしてしまう。"
translation = "나는 나도 모르게 두근거리고 만다."

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「ふふっ、目が泳いだぞ。その反応はやはり、写真などの記録が残っているとみた」"
translation = "「후후, 눈이 헤엄쳤군. 그 반응은 역시 사진 같은 기록이 남아있다고 본다」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「後で秋葉原のその店に行って、店長に聞き込みしてみるとしよう」"
translation = "「나중에 아키하바라의 그 가게에 가서 점장에게 탐문해보기로 하지」"

[[dialogue]]
speaker = "unk"
original = "そ、それはちょっと……！"
translation = "그, 그건 좀……!"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「ああでも、猫耳メイドっぽくお願いしてくれたら、お姉さんも気が変わるかもしれないな？」"
translation = "「아아 하지만, 고양이 귀 메이드처럼 부탁해준다면 이 누나도 마음이 바뀔지 모르겠는데?」"

[[dialogue]]
speaker = "unk"
original = "勘弁してくれにゃーーーん！！！"
translation = "봐달라냐아아앙!!!"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「くっ……ふふっ……！\u3000ははっ♪\u3000あははっ♪\u3000あははははははっ！」"
translation = "「큭…… 후후……! 하핫♪ 아하핫♪ 아하하하하하하핫!」"

[[dialogue]]
speaker = "unk"
original = "これまで見たことのない爆笑を見せて、満面の笑顔を見せるリコさんなのだった――"
translation = "지금까지 본 적 없는 폭소를 터뜨리며 만면에 미소를 띄우는 리코 씨였다──"

[[dialogue]]
speaker = "unk"
original = "学園に入学してから出会った人たちや事件のことを、リコさんはメモを取りながら、楽しそうに聞き続けて――"
translation = "학원에 입학하고 나서 만난 사람들이나 사건들을, 리코 씨는 메모를 하며 즐겁게 계속 들었고──"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「――気づけば、もうこんな時間か」"
translation = "「──어느덧 벌써 이런 시간인가」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「充実した１日だった。こんなにも長い時間、誰かと話していたのは初めてだよ」"
translation = "「충실한 하루였다. 이렇게 오랫동안 누군가와 대화한 건 처음이야」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「ちょっとは海に入ったりもするつもりだったのだが……つい話を聞くのに夢中になってしまった。付き合わせてすまなかったな、少年」"
translation = "「조금은 바다에 들어갈 생각도 있었다만…… 그만 이야기를 듣는 데 정신이 팔려버렸군. 어울려줘서 미안했다, 소년」"

[[dialogue]]
speaker = "unk"
original = "なら、今度また、一緒に泳ぎに来ましょう"
translation = "그럼 다음에 다시 같이 수영하러 와요"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「それは、２人でという意味か？」"
translation = "「그건 둘이서라는 뜻인가?」"

[[dialogue]]
speaker = "unk"
original = "俺は頷いてみせる。"
translation = "나는 고개를 끄덕여 보인다."

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「…………少年」"
translation = "「…………소년」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「キミがお人好しであることはもう知っているが、そんな甘い毒を振り撒いていると、お姉さんでもそのうち勘違いしてしまうかもしれないぞ？」"
translation = "「자네가 호인이라는 건 이미 알고 있지만, 그런 달콤한 독을 뿌리고 다니면 이 누나라도 머지않아 착각해 버릴지도 모른다고?」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「私は人間界に来てから今まで、異性にそこまで興味を持った経験がなかったが――」"
translation = "「나는 인간계에 오고 나서 지금까지 이성에게 그 정도로 흥미를 가졌던 경험이 없었지만──」"

[[dialogue]]
speaker = "unk"
original = "リコさんが不意に顔を近づけて来て、耳元で囁く。"
translation = "리코 씨가 불쑥 얼굴을 가까이 대고 귓가에 속삭인다."

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「どうやらそれは、年下趣味だったから、なのかも」"
translation = "「아무래도 그건 연하 취향이었기 때문일지도」"

[[dialogue]]
speaker_original = "リコリンフィア"
speaker_translation = "리코린피아"
original = "「……なんて、冗談だ。ふふっ……♪」"
translation = "「……라는 건 농담이다. 후후……♪」"

[[dialogue]]
speaker = "unk"
original = "大人な笑みを浮かべて小さくウインクするリコさんに、俺はまたちょっとドキッとして、１人の女性として意識してしまうのだった――"
translation = "어른스러운 미소를 띄우며 살짝 윙크하는 리코 씨에게 나는 다시 조금 두근거려 한 명의 여성으로서 의식하게 되어버리는 것이었다──"

