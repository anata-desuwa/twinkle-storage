[[dialogue]]
speaker = "unk"
original = "ソフィアとヴィーナスはカフェテリアに移動し、温かい飲み物を手にしながら向かい合っていた――"
translation = "소피아와 비너스는 카페테리아로 이동해 따뜻한 음료를 손에 들고 마주 보고 있었다――"

[[dialogue]]
speaker = "ヴィーナス"
original = "「はい、ホットココア。せっかくだし、私も同じものにしちゃった♪」"
translation = "「자, 핫초코. 모처럼이니까 나도 같은 걸로 했어♪」"

[[dialogue]]
speaker = "ソフィア"
original = "「あ、ありがとうございます……」"
translation = "「가, 감사합니다……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「冷めないうちに飲みましょう。――うん、美味しい♪\u3000温まるわね」"
translation = "「식기 전에 마시자. ――응, 맛있다♪ 따뜻해지네.」"

[[dialogue]]
speaker = "ソフィア"
original = "「はい。ホットです……」"
translation = "「네. 핫하네요……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「――ねぇ、ソフィア」"
translation = "「――있잖아, 소피아.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「私は学園も違うし、正直、あなたのことをよく知っているわけじゃないわ！」"
translation = "「나는 학원도 다르고, 솔직히 너를 잘 아는 건 아니야!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「だから、見たままを言うだけになっちゃうんだけど……」"
translation = "「그러니까 보이는 대로 말하는 것뿐이겠지만……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ソフィアは、サーシャさんのことが好きよね？\u3000なのに、何故か近づくのを意識して避けている感じがするわ……！」"
translation = "「소피아는 사샤 씨를 좋아하잖아? 그런데 왠지 다가가는 걸 의식해서 피하고 있는 느낌이 들어……!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「サーシャさんは、ソフィアが反抗期だからって言ってて、妹がいない私は、そういうものなのね～って思っていたけれど……」"
translation = "「사샤 씨는 소피아가 사춘기라서 그렇다고 해서, 여동생이 없는 나는 그런 거구나~ 하고 생각했지만……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「実際にサーシャさんの話題を出した時のソフィアを見て、ちょっと違うって思ったの！」"
translation = "「실제로 사샤 씨 이야기를 할 때의 소피아를 보고 좀 다르다고 생각했어!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「それで思い出したんだけど……サーシャさんが前に、学園に入学する時、ソフィアとは上手くお別れできないまま人間界にきた、って言っていたのよね」"
translation = "「그래서 생각난 건데…… 사샤 씨가 전에 학원에 입학할 때, 소피아와는 제대로 작별 인사를 하지 못한 채 인간계에 왔다고 했었거든.」"

[[dialogue]]
speaker = "ソフィア"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「それって、ソフィアがサーシャさんと距離を置いていることに、関係があったりするのかしら？」"
translation = "「그게 소피아가 사샤 씨와 거리를 두고 있는 거랑 관계가 있는 걸까?」"

[[dialogue]]
speaker = "ソフィア"
original = "「…………姉さんが」"
translation = "「…………언니가」"

[[dialogue]]
speaker = "ソフィア"
original = "「３年前、姉さんが新星学園に入学すると言い出した時……」"
translation = "「3년 전, 언니가 신성학원에 입학하겠다고 말했을 때……」"

[[dialogue]]
speaker = "ソフィア"
original = "「私はその瞬間まで、姉さんがそんなことを考えていただなんて、全く知らなかったんです……」"
translation = "「저는 그 순간까지 언니가 그런 생각을 하고 있었다니 전혀 몰랐어요……」"

[[dialogue]]
speaker = "ソフィア"
original = "「なんの相談もなくて……私はすごいショックで、人生であれほど怒ったことがないってくらいに、喧嘩したんです……」"
translation = "「아무런 상의도 없이…… 저는 엄청 충격받아서 인생에서 그렇게 화난 적이 없을 정도로 싸웠어요……」"

[[dialogue]]
speaker = "ソフィア"
original = "「姉妹なんだから、相談の１つくらいしてくれても、よかったじゃないですか」"
translation = "「자매니까 상의 한 번 정도는 해줄 수도 있었잖아요.」"

[[dialogue]]
speaker = "ソフィア"
original = "「それまでずっと、一緒に過ごしてきたんですよ？」"
translation = "「그때까지 계속 같이 지내왔다구요.」"

[[dialogue]]
speaker = "ソフィア"
original = "「なのに姉さんは、全部自分１人で進めて。私に言う頃には、周りがどう言おうと関係なく、心に決めていたんです」"
translation = "「그런데 언니는 전부 혼자서 진행하고. 나한테 말할 때쯤엔 주변에서 뭐라 하든 상관없이 마음을 정한 상태였어요.」"

[[dialogue]]
speaker = "ソフィア"
original = "「私が何を言っても、姉さんは困った顔でごめんと謝るだけでした」"
translation = "「제가 무슨 말을 해도 언니는 곤란한 얼굴로 미안하다고 사과할 뿐이었죠.」"

[[dialogue]]
speaker = "ソフィア"
original = "「人間界に行くその日になっても、涙１つ見せることなく」"
translation = "「인간계로 가는 그날이 되어도 눈물 한 방울 보이지 않고.」"

[[dialogue]]
speaker = "ソフィア"
original = "「結局、姉さんにとって妹なんて、その程度の存在だってことです」"
translation = "「결국 언니에게 여동생 따윈 그 정도 존재라는 거예요.」"

[[dialogue]]
speaker = "ソフィア"
original = "「会えば嬉しいとか言いますけど、離れたって別に、泣くほど感情が動いたりとかしないんです。姉さんは」"
translation = "「만나면 기쁘다느니 말하지만, 떨어져 있어도 딱히 울 정도로 감정이 움직이거나 하지 않아요. 언니는.」"

[[dialogue]]
speaker = "ソフィア"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "ソフィア"
original = "「……だから、私はいつまでも子供みたいにベタベタしてないで、姉さんとは大人の距離で付き合うようにしよう、と思ったまでです」"
translation = "「……그러니까 저는 언제까지나 어린애처럼 끈적거리지 말고, 언니와는 어른스러운 거리감으로 사귀려고 생각한 것뿐이에요.」"

[[dialogue]]
speaker = "ソフィア"
original = "「あと、薄情な姉さんには、ちょっと怒っています。自覚もないみたいなので、私からわざわざ指摘するつもりもありませんが」"
translation = "「그리고 냉정한 언니한테는 좀 화가 나 있어요. 자각도 없는 것 같으니까 제가 굳이 지적할 생각도 없지만요.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「う～～ん……」"
translation = "「으음~~~……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ソフィアは怒っているというよりも、悲しんでいるみたいね」"
translation = "「소피아는 화를 내고 있다기보다 슬퍼하고 있는 것 같네.」"

[[dialogue]]
speaker = "ソフィア"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「だって、怒っているだけなら、すぐにでも文句を言いに行けたはずだもの。それができなかったってことは、<b>それだけじゃない</b>感情があったんじゃないかしら？」"
translation = "「그야 화만 나 있다면 당장이라도 따지러 갈 수 있었을 텐데. 그러지 못했다는 건 <b>그것만은</b> <b>아닌</b> 감정이 있었던 거 아닐까?」"

[[dialogue]]
speaker = "ソフィア"
original = "「そ、それは……っ」"
translation = "「그, 그건……윽」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「もちろん、腹を立てているのだって嘘ではないと思うわ！\u3000だけど……ほら、『怒る』のと『悲しむ』のって、ちょっと似てるじゃない？」"
translation = "「물론 화가 나 있다는 것도 거짓말은 아닐 거야! 하지만…… 봐, 『화내는 것』과 『슬퍼하는 것』은 좀 비슷하잖아?」"

[[dialogue]]
speaker = "ソフィア"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「今ここにサーシャさんはいないんだから。思っていたこと、不満だったことを全部、まずは吐き出しちゃいなさい」"
translation = "「지금 여기 사샤 씨는 없으니까. 생각했던 것, 불만이었던 것을 전부 우선은 쏟아내 버려.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「それを１つ１つ確認していけば、サーシャさんになんて言ったらいいのか、きっと見つかるんじゃないかしら！」"
translation = "「그걸 하나하나 확인해 가면 사샤 씨에게 뭐라고 하면 좋을지 분명 찾을 수 있을 거야!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「大丈夫！\u3000あなたなら絶対に、自分の答えを見つけ出せるわ、ソフィア！」"
translation = "「괜찮아! 너라면 반드시 자신의 답을 찾아낼 수 있어, 소피아!」"

[[dialogue]]
speaker = "ソフィア"
original = "「ヴィーナスさん……」"
translation = "「비너스 씨……」"

[[dialogue]]
speaker = "ソフィア"
original = "（ああ、どうしてだろう。今まで姉さんには、何を言っても変わらないって諦めていたのに……）"
translation = "(아아, 왜일까. 지금까지 언니에게는 무슨 말을 해도 변하지 않을 거라고 포기하고 있었는데……)"

[[dialogue]]
speaker = "ソフィア"
original = "（この人に大丈夫だって言われると、なんだか、本当に変えられそうな気がしてくる）"
translation = "(이 사람에게 괜찮다는 말을 들으니 왠지 정말로 바꿀 수 있을 것 같은 기분이 들어)"

[[dialogue]]
speaker = "ソフィア"
original = "（正直、星騎士としての強さだけで星徒会長になった人だって、ずっと思っていたけれど……）"
translation = "(솔직히 성기사로서의 강함만으로 성도회장이 된 사람이라고 계속 생각했었지만……)"

[[dialogue]]
speaker = "ヴィーナス"
original = "「？\u3000ソフィア、私の顔をじっと見て、どうかした？\u3000なにか顔に付いているかしら？」"
translation = "「? 소피아, 내 얼굴을 빤히 보고 왜 그래? 뭐 묻었니?」"

[[dialogue]]
speaker = "unk"
original = "むにむにと自分の顔を触るヴィーナスに、ソフィアは首を横に振る。"
translation = "말랑말랑 자기 얼굴을 만지는 비너스에게 소피아는 고개를 가로저었다."

[[dialogue]]
speaker = "ソフィア"
original = "「いいえ。ただ――」"
translation = "「아니요. 다만――」"

[[dialogue]]
speaker = "ソフィア"
original = "「ヴィーナスさんは、本当に前星徒会長を務めていたんだなって、改めて思っただけです」"
translation = "「비너스 씨는 정말로 전 성도회장을 맡았었구나 하고 새삼 생각했을 뿐이에요.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふっふ～ん♪\u3000なんで褒められたのかはわからないけど、褒められるのは気分がいいわ♪」"
translation = "「훗후~웅♪ 왜 칭찬받았는지는 모르겠지만 칭찬받는 건 기분이 좋네♪」"

[[dialogue]]
speaker = "unk"
original = "そう言って笑顔を見せるヴィーナスに。"
translation = "그렇게 말하며 미소 짓는 비너스에게."

[[dialogue]]
speaker = "unk"
original = "ソフィアのマフラーで隠れた口元もまた、柔らかく微笑むのだった――"
translation = "소피아의 머플러로 가려진 입가 또한 부드럽게 미소 짓는 것이었다――"

