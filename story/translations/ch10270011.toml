[[dialogue]]
speaker = "unk"
original = "第１話,何でもできるコハルコさん,P"
translation = "제1화, 뭐든지 할 수 있는 쿠하루코 씨, P"

[[dialogue]]
speaker = "サーシャ"
original = "「あら、シミュレーターが止まっちゃったわね～。せっかく会長くんとトレーニングしようと思ったのに～」"
translation = "「어머, 시뮬레이터가 멈춰버렸네~. 간만에 회장군이랑 트레이닝하려고 했는데~」"

[[dialogue]]
speaker = "サーシャ"
original = "「う～ん……よくわからないし、こういう時は専門家を呼びましょう」"
translation = "「으음…… 잘 모르겠고, 이럴 때는 전문가를 부르자꾸나.」"

[[dialogue]]
speaker = "サーシャ"
original = "「もしもし～、コハルコちゃん？\u3000シミュレーターが急に動かなくなっちゃって……うん、うん……お願いね～」"
translation = "「여보세요~, 쿠하루코짱? 시뮬레이터가 갑자기 안 움직여서…… 응, 응…… 부탁해~」"

[[dialogue]]
speaker = "コハルコ"
original = "「お待たせ、サーシャ」"
translation = "「기다렸지, 사샤.」"

[[dialogue]]
speaker = "サーシャ"
original = "「いらっしゃ～い」"
translation = "「어서 와~」"

[[dialogue]]
speaker = "コハルコ"
original = "「別にサーシャの家でも星徒会室でもないんだけど……相変わらずマイペースだね」"
translation = "「딱히 사샤의 집도 성도회실도 아니지만…… 여전히 마이페이스네.」"

[[dialogue]]
speaker = "コハルコ"
original = "「君は……この間ヴィーナスさんに勝った会長さんだね。私は３年の朝比奈コハルコ。よろしく」"
translation = "「너는…… 요전에 비너스 씨를 이긴 회장님이네. 나는 3학년 아사히나 쿠하루코. 잘 부탁해.」"

[[dialogue]]
speaker = "unk"
original = "よろしくお願いします"
translation = "잘 부탁드립니다."

[[dialogue]]
speaker = "コハルコ"
original = "「うん。で、シミュレーターの調子が悪くなっちゃったんだっけ？\u3000もっと具体的に教えてくれる？」"
translation = "「응. 그래서, 시뮬레이터 상태가 안 좋아졌다고 했지? 좀 더 구체적으로 알려줄래?」"

[[dialogue]]
speaker = "サーシャ"
original = "「う～んと……会長くんと一緒だから、できるだけ強いモンスターをたくさん出したんだけど、戦ってる途中で真っ暗になっちゃったのよね」"
translation = "「음~…… 회장군이랑 함께니까, 가능한 한 강한 몬스터를 잔뜩 내보냈는데, 싸우는 도중에 깜깜해져 버렸단다.」"

[[dialogue]]
speaker = "コハルコ"
original = "「ふむふむ、ちょっとログを見てみるね。……やっぱりそうか」"
translation = "「흠흠, 로그를 좀 살펴볼게. ……역시 그렇네.」"

[[dialogue]]
speaker = "コハルコ"
original = "「このシミュレーターは元々デリケートな上、安全のためにリミッターがかかってるの」"
translation = "「이 시뮬레이터는 원래 예민한 데다, 안전을 위해 리미터가 걸려 있어.」"

[[dialogue]]
speaker = "コハルコ"
original = "「どうやらモンスターの設定が強すぎてリミッターが誤作動してるみたい。ちょっと待ってて」"
translation = "「아무래도 몬스터 설정이 너무 강해서 리미터가 오작동한 것 같아. 잠깐 기다려 봐.」"

[[dialogue]]
speaker = "コハルコ"
original = "「……はい、ＯＫ」"
translation = "「……응, 됐어.」"

[[dialogue]]
speaker = "サーシャ"
original = "「あ、シミュレーターが動いたわ～」"
translation = "「아, 시뮬레이터가 움직이네~」"

[[dialogue]]
speaker = "unk"
original = "ありがとうございます"
translation = "감사합니다."

[[dialogue]]
speaker = "コハルコ"
original = "「どうしたしまして」"
translation = "「별말씀을.」"

[[dialogue]]
speaker = "サーシャ"
original = "「コハルコちゃんは機械のこと何でもできてすごいわ～」"
translation = "「쿠하루코짱은 기계에 대해서라면 뭐든지 할 수 있어서 대단해~」"

[[dialogue]]
speaker = "コハルコ"
original = "「何でもってわけじゃないよ。ハードウェアよりも、プログラムとかのソフトウェアが専門かな。それでも趣味でパソコンくらいは作るけど」"
translation = "「뭐든지인 건 아니야. 하드웨어보다는 프로그램 같은 소프트웨어가 전문이려나. 그래도 취미로 컴퓨터 정도는 만들지만.」"

[[dialogue]]
speaker = "サーシャ"
original = "「十分すごいわ～。それにコハルコちゃんはハッカーなのよ～」"
translation = "「충분히 대단하단다~. 게다가 쿠하루코짱은 해커인걸~」"

[[dialogue]]
speaker = "unk"
original = "ハッカー！？"
translation = "해커!?"

[[dialogue]]
speaker = "サーシャ"
original = "「とっても大きな会社の厳重なセキュリティを突破したり、国の存亡に関わる大事なデータを盗んだりする人なのよね～」"
translation = "「엄청나게 큰 회사의 엄중한 보안을 뚫거나, 국가의 존망이 걸린 중요한 데이터를 훔치거나 하는 사람이지~」"

[[dialogue]]
speaker = "コハルコ"
original = "「そんな大それたことしてないよ。私の仕事はもっと地味だから」"
translation = "「그렇게 거창한 짓은 안 해. 내 일은 좀 더 수수하니까.」"

[[dialogue]]
speaker = "コハルコ"
original = "「ハッカーというと悪いことをしている人をイメージするかもしれないけど、私はいわゆるホワイトハッカー」"
translation = "「해커라고 하면 나쁜 짓을 하는 사람을 이미지할지도 모르지만, 나는 이른바 화이트 해커.」"

[[dialogue]]
speaker = "コハルコ"
original = "「攻撃される前にセキュリティの脆弱性を発見したり、新しいセキュリティシステムを構築したり、あと情報の漏洩をチェックしたりするのが仕事かな」"
translation = "「공격받기 전에 보안 취약점을 발견하거나, 새로운 보안 시스템을 구축하거나, 또 정보 유출을 체크하거나 하는 게 일이야.」"

[[dialogue]]
speaker = "サーシャ"
original = "「ハッカーと言えば、最近噂になってるわよね。え～っと……ジャスミンリザードだっけ～？」"
translation = "「해커라고 하면 최근에 소문이 자자하잖니. 음~…… 재스민 리저드였나~?」"

[[dialogue]]
speaker = "コハルコ"
original = "「正義の魔法使い──ジャスティスウィザード」"
translation = "「정의의 마법사── 저스티스 위저드.」"

[[dialogue]]
speaker = "サーシャ"
original = "「そう、それ～。確か大手の製薬会社の不正を暴いたのよ。あと政治家の汚職の証拠を出したりとか」"
translation = "「맞아, 그거~. 분명 대형 제약회사의 비리를 폭로했단다. 또 정치인의 부패 증거를 내놓기도 하고.」"

[[dialogue]]
speaker = "unk"
original = "じゃあいいハッカー？"
translation = "그럼 좋은 해커인가요?"

[[dialogue]]
speaker = "サーシャ"
original = "「そうとは限らないかも。動物を開放するって言って動物園を攻撃したり、義賊を名乗って何も悪いことしてない資産家からお金を盗んだり……過激なこともやってるみたい」"
translation = "「꼭 그렇지만은 않을지도. 동물을 해방하겠다며 동물원을 공격하거나, 의적을 자처하며 아무 잘못 없는 자산가로부터 돈을 훔치거나…… 과격한 짓도 하는 모양이야.」"

[[dialogue]]
speaker = "サーシャ"
original = "「コハルコちゃんはどう思う？」"
translation = "「쿠하루코짱은 어떻게 생각하니?」"

[[dialogue]]
speaker = "コハルコ"
original = "「うーん、特に興味ないから聞かれても答えづらいなぁ。とりあえずハッカーのイメージを損なうことはやめてほしいけど」"
translation = "「으음, 딱히 관심 없어서 물어봐도 대답하기 어렵네. 일단 해커의 이미지를 훼손하는 짓은 그만둬 줬으면 좋겠지만.」"

[[dialogue]]
speaker = "コハルコ"
original = "「それに最近の彼は手当たり次第というか、自分のスキルを誇示するためにやってるように見える」"
translation = "「게다가 최근의 그는 닥치는 대로랄까, 자기 기술을 과시하기 위해 하는 것처럼 보여.」"

[[dialogue]]
speaker = "コハルコ"
original = "「あと名前も好きじゃないし。元々優れたハッカーをウィザードと呼ぶけど、そのまますぎというか……」"
translation = "「그리고 이름도 마음에 안 들고. 원래 뛰어난 해커를 위저드라고 부르지만, 너무 그대로랄까……」"

[[dialogue]]
speaker = "サーシャ"
original = "「ふふ、コハルコちゃんきびし～」"
translation = "「후후, 쿠하루코짱 엄격해~」"

[[dialogue]]
speaker = "コハルコ"
original = "「――って、なんか愚痴っぽくなっちゃった。ごめんごめん」"
translation = "「──어라, 왠지 푸념처럼 돼버렸네. 미안 미안.」"

[[dialogue]]
speaker = "コハルコ"
original = "「ちなみに、セキュリティ以外にもシステムやプログラム関係の仕事もしてるんだ。今のＤＩＳＣの星騎士用アプリを作ったりとか」"
translation = "「참고로 보안 말고도 시스템이나 프로그램 관련 일도 하고 있어. 지금 DISC의 성기사용 앱을 만들거나 하는 거.」"

[[dialogue]]
speaker = "unk"
original = "これもコハルコさんが？"
translation = "이것도 쿠하루코 씨가?"

[[dialogue]]
speaker = "コハルコ"
original = "「うん。会長さんは知らないだろうけど、前のは使いにくかったから新しいの作っちゃった」"
translation = "「응. 회장님은 모르겠지만, 전의 건 쓰기 불편해서 새로 만들어버렸어.」"

[[dialogue]]
speaker = "サーシャ"
original = "「戦闘中もお話しできて便利よね～。モンスターやアステラを感知するシステムを改良したのもコハルコちゃんだし、ほんと助かってるわ～」"
translation = "「전투 중에도 대화할 수 있어서 편리하단다~. 몬스터나 아스테라를 감지하는 시스템을 개량한 것도 쿠하루코짱이고, 정말 도움받고 있어~」"

[[dialogue]]
speaker = "unk"
original = "あれもこれもコハルコさんなんだ……"
translation = "이것저것 다 쿠하루코 씨였구나……"

[[dialogue]]
speaker = "コハルコ"
original = "「世界を守るためだから。それに新星学園には恩もあるし」"
translation = "「세계를 지키기 위해서니까. 게다가 신성학원에는 은혜도 있고.」"

[[dialogue]]
speaker = "コハルコ"
original = "「あ、そろそろ帰って晩ご飯のお買い物しないと」"
translation = "「아, 슬슬 돌아가서 저녁 찬거리 사야겠다.」"

[[dialogue]]
speaker = "コハルコ"
original = "「またね、サーシャ、会長さん」"
translation = "「나중에 봐, 사샤, 회장님.」"

