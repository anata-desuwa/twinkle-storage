[[dialogue]]
speaker = "unk"
original = "日曜日の午後、大聖堂に行くと……"
translation = "일요일 오후, 대성당에 가니……"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「何かご用ですか──って、あんたか。礼拝ならもっと早く来なさいよ」"
translation = "「무슨 용건인가요── 아, 당신인가. 예배라면 좀 더 일찍 오라고.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「どうしてここで変身してるんだ？」"
translation = "「어째서 여기서 변신하고 있는 거야?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「礼拝の後、急病で倒れた人がいてね。変身して治療してたのよ」"
translation = "「예배 후에 급병으로 쓰러진 사람이 있어서 말이야. 변신해서 치료하고 있었어.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「まさかこの格好で説法してると思った？\u3000あんたこれ好きだもんね～。このスケベ会長」"
translation = "「설마 이 차림으로 설법하고 있다고 생각했어? 당신 이거 좋아하잖아~. 이 변태 회장.」"

[[dialogue]]
speaker = "unk"
original = "イレーナがこの姿で説法している様子を想像すると、男として欲望が刺激される。"
translation = "이레나가 이 모습으로 설법하고 있는 모습을 상상하니, 남성으로서 욕망이 자극된다."

[[dialogue]]
speaker = "unk"
original = "もしそんな礼拝があったら、変な性癖に目覚めてしまうかもしれない。"
translation = "만약 그런 예배가 있다면, 이상한 성적 취향에 눈을 떠버릴지도 모른다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ていうか、あんた何しに来たのよ。ま、これでも神官だから懺悔するなら聞いてあげるけど」"
translation = "「그나저나, 당신 뭐 하러 온 거야. 뭐, 이래 봬도 신관이니까 참회할 거라면 들어줄게.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「じゃあお願いするよ」"
translation = "「그럼 부탁할게.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「じゃあって何よ。あんたのことだから、告白する罪がたくさんありそうね」"
translation = "「'그럼'은 뭐야. 당신이니까 고백할 죄가 아주 많겠네.」"

[[dialogue]]
speaker = "unk"
original = "懺悔とは神官に罪を告白し、女神様の<ruby>赦<rt>ゆる</rt></ruby>しを乞うもの。"
translation = "참회란 신관에게 죄를 고백하고, 여신님의 용서를 구하는 것."

[[dialogue]]
speaker = "unk"
original = "少しご機嫌斜めなイレーナに、聖堂の隅にある懺悔室に案内されて……"
translation = "조금 기분이 언짢아 보이는 이레나에게 이끌려 성당 구석에 있는 참회실로 안내받고……"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「なんであんたもこっちに入ってくるのよ！？」"
translation = "「왜 당신도 이쪽으로 들어오는 거야!?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ちょっと、待ちなさい！\u3000ここは大聖堂の──きゃあっ！？」"
translation = "「잠깐, 기다려! 여기는 대성당의── 꺄앗!?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「うぅ～……このヘンタイ！\u3000エロ会長！\u3000さすが魔王ね。油断してたらすぐ手を出してくるんだから」"
translation = "「으으~…… 이 변태! 에로 회장! 역시 마왕이네. 방심하면 바로 손을 뻗는다니까.」"

[[dialogue]]
speaker = "unk"
original = "あられもない姿にされ、頬を染めながら口を尖らせるイレーナ。"
translation = "부끄러운 모습이 되어 뺨을 붉히며 입술을 내미는 이레나."

[[dialogue]]
speaker = "unk"
original = "だけど本気の抵抗は見せない。"
translation = "하지만 진심으로 저항하지는 않는다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「すみません、聖女様を見ていたら邪な気持ちが湧き上がってしまって」"
translation = "「죄송합니다, 성녀님을 보고 있으니 사악한 마음이 솟구쳐 올라서.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「正直に告白すればいいってもんじゃないでしょうがスケベ」"
translation = "「솔직하게 고백한다고 다 되는 게 아니잖아, 변태야.」"

[[dialogue]]
speaker = "unk"
original = "狭い懺悔室の中で密着し、肉感的なお尻と太ももが当たって心地良い。"
translation = "좁은 참회실 안에서 밀착하자, 육감적인 엉덩이와 허벅지가 닿아 기분이 좋다."

[[dialogue]]
speaker = "unk"
original = "手のひらをイレーナの胸に添えると、大きなおっぱいの重みがずしりと乗ってくる。"
translation = "손바닥을 이레나의 가슴에 대자, 커다란 가슴의 무게감이 묵직하게 전해진다."

[[dialogue]]
speaker = "unk"
original = "そのまま軽く力を込めると──"
translation = "그대로 가볍게 힘을 주자──"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「んっ……<emoji=heart04>」"
translation = "「응읏……<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ふぅ、はぁ……<emoji=heart04>\u3000こら、勝手に揉むんじゃないわよ……はぁ……あん<emoji=heart04>」"
translation = "「후우, 하아……<emoji=heart04> 이봐, 멋대로 주무르지 마…… 하아…… 앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "柔らかな乳房に指が食い込み、イレーナの口から艶めかしい声が漏れる。"
translation = "부드러운 유방에 손가락이 파고들고, 이레나의 입에서 요염한 목소리가 흘러나온다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「っ……はぁ……ふぅ<emoji=heart04>\u3000ここ懺悔室なのよ。わかってるの？」"
translation = "「윽…… 하아…… 후우<emoji=heart04> 여기 참회실이라고. 알고 있어?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ、防音になってるんだろ」"
translation = "「아아, 방음 처리되어 있잖아.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あんたそこまで知ってて……はぁ、ほんと男の欲望には呆れるわ」"
translation = "「당신 거기까지 알고…… 하아, 정말 남자의 욕망에는 질린다니까.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あ……あんたのお、おち○ちん、大きくなってる……」"
translation = "「아…… 당신 자, 자지가 커졌어……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「もう、仕方ないわね……神官としてあなたの罪を受け入れます」"
translation = "「정말, 어쩔 수 없네…… 신관으로서 당신의 죄를 받아들이겠어요.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「好きにしなさいって言ってるのよ。そのケダモノち○ぽぶち込んで、さっさとスッキリすれば？」"
translation = "「마음대로 하라고 하는 거야. 그 짐승 같은 자지 처박고 얼른 시원해지면 어때?」"

[[dialogue]]
speaker = "unk"
original = "呆れるように言うイレーナだが、胸を揉んでいるうちに股間から蜜が垂れてきていた。"
translation = "어이없다는 듯 말하는 이레나지만, 가슴을 주무르는 사이 가랑이에서 꿀이 흘러나오고 있었다."

[[dialogue]]
speaker = "unk"
original = "聖女様の許しを得たところで、物欲しそうな秘裂にペニスを突き立てる。"
translation = "성녀님의 허락을 얻은 뒤, 애타게 기다리는 비열에 페니스를 들이민다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「んん～～っ<emoji=heart04>\u3000熱くて、大きいの、入ってきて……はっ……あんっ<emoji=heart04>」"
translation = "「으으응~ <emoji=heart04> 뜨겁고 커다란 게 들어와서…… 핫…… 앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ふっ……んん……っ<emoji=heart04>\u3000あたしの中で、動いてる……はぁ、はぁ……ふぅ、んんっ<emoji=heart04>」"
translation = "「훗…… 으응…… 윽<emoji=heart04> 내 안에서 움직이고 있어…… 하아, 하아…… 후우, 으응<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "亀頭で膣口を押し広げると、蜜で濡れた粘膜に包まれた。"
translation = "귀두로 질 입구를 벌리자, 애액으로 젖은 점막에 감싸였다."

[[dialogue]]
speaker = "unk"
original = "懺悔室という神聖な場所で、聖女と交わる背徳感が興奮をかきたてる。"
translation = "참회실이라는 신성한 장소에서 성녀와 섞이는 배덕감이 흥분을 돋운다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あ……あぁ……あんっ<emoji=heart04>\u3000相変わらず大きいわね、あんたのこれ……」"
translation = "「아…… 아아…… 앙<emoji=heart04> 여전히 크네, 당신 이거……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「他の男の大きさ知ってるのか？」"
translation = "「다른 남자의 크기를 알고 있는 거야?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「知らないわよ、あんたがあたしの初めてだったんだから！\u3000このバカ！」"
translation = "「모른다고, 당신이 내 처음이었으니까! 이 바보야!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「でもこんなにお腹広げられてるのに、大きくないわけないでしょ……ふっ、んっ……はあぁ<emoji=heart04>」"
translation = "「하지만 이렇게 배가 벌어지는데 안 클 리가 없잖아…… 훗, 응…… 하아아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "イレーナの言う通り、ペニスの圧迫感は小さくないだろうし、実際最初は苦しそうにしていた。"
translation = "이레나의 말대로 페니스의 압박감은 작지 않을 것이고, 실제로 처음에는 괴로운 듯한 표정을 지었다."

[[dialogue]]
speaker = "unk"
original = "だけど今では……"
translation = "하지만 지금은……"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「中で、擦れてる……はぁっ、はぁっ……んんっ<emoji=heart04>\u3000ふっ……んっ……ああぁっ<emoji=heart04>」"
translation = "「안에서, 쓸리고 있어…… 하아, 하아…… 으으응<emoji=heart04> 훗…… 응…… 아아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あっ、あっ、あっ……ふあぁっ<emoji=heart04>\u3000あっ、ぁん……おち○ちん大きくて、あたしの中いっぱいになってる……ん～～っ<emoji=heart04>」"
translation = "「앗, 앗, 앗…… 후아앗<emoji=heart04> 앗, 아앙…… 자지가 커서, 내 안이 가득 차버려…… 으으음~<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「聖女なのにエッチな声が出てるな」"
translation = "「성녀인데 야한 목소리가 나오는군」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ちがっ……別に感じてなんか──ひあぁああっ<emoji=heart04>」"
translation = "「아냐…… 딱히 느끼는 건── 히아아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ほら、また声が出た。中も濡れてるし」"
translation = "「봐, 또 목소리가 나왔어. 안도 젖어 있고」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あんたのせいでしょうが……！\u3000はぁっ……あっ……あんっ<emoji=heart04>\u3000あ、弱いところ、当たって──んーーっ<emoji=heart04>」"
translation = "「당신 때문이잖아……! 하앗…… 앗…… 앙<emoji=heart04> 아, 약한 곳, 닿아── 으으응~<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あぁ、はぁ……ぐちゅぐちゅって、いやらしい音、してる……んぅっ<emoji=heart04>\u3000おち○ちん、熱いぃっ<emoji=heart04>」"
translation = "「아아, 하아…… 구츄구츄하고, 상스러운 소리, 나고 있어…… 응으윽<emoji=heart04> 자지, 뜨거워어<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「んっ……はぁっ、はぁっ、あぁんっ<emoji=heart04>\u3000ちょっと、待ちなさいよ……はぁっ、はっ──ひあぁ～っ<emoji=heart04>」"
translation = "「응…… 하앗, 하앗, 아앙<emoji=heart04> 잠깐, 기다리라니까…… 하앗, 핫── 히아아~앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "イレーナの喘ぎ声とともに膣が締まり、粘膜が密着してぎゅっとペニスを絞る。"
translation = "이레나의 신음과 함께 질이 조여지고, 점막이 밀착되어 꽉 페니스를 쥐어짠다."

[[dialogue]]
speaker = "unk"
original = "肉の柔らかさにとろとろの愛液、それにイレーナの体温が相まって、極上の快感を生んでいた。"
translation = "살의 부드러움과 걸쭉한 애액, 거기에 이레나의 체온이 어우러져 극상의 쾌감을 낳고 있었다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あんっ<emoji=heart04>\u3000また、胸、揉んで……ひあぁっ<emoji=heart04>\u3000はぁ、あぁっ、あんっ<emoji=heart04>」"
translation = "「앙<emoji=heart04> 다시, 가슴, 주물러줘…… 히아앗<emoji=heart04> 하아, 아앗, 앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "力を込めて揉みしだくと、指の間から肉がこぼれる。"
translation = "힘을 주어 주무르자 손가락 사이로 살집이 넘쳐흐른다."

[[dialogue]]
speaker = "unk"
original = "とても手に収まりきらない、このボリュームがたまらない。"
translation = "도저히 손에 다 들어오지 않는 이 볼륨감이 참을 수 없다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ふぁっ、あっ、あっ──ん～っ<emoji=heart04>\u3000好き勝手揉んでくれちゃって……あたしのおっぱいは、あんたのおもちゃじゃないのよ？」"
translation = "「후앗, 앗, 앗── 응~<emoji=heart04> 마음대로 주물러대고…… 내 가슴은 당신 장난감이 아니라고?」"

[[dialogue]]
speaker = "unk"
original = "抗議するイレーナの言葉を無視して、ぎゅっと強めに揉んでやる。"
translation = "항의하는 이레나의 말을 무시하고 꽉 강하게 주물러준다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ふやああぁっ<emoji=heart04>」"
translation = "「후야아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "すると甲高い声が上がり、膣壁も悦ぶようにきゅうっと締め付けてきた。"
translation = "그러자 날카로운 비명이 터져 나오고, 질벽도 기뻐하듯 꽉 조여 왔다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ん～っ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000おっぱい、そんなに揉みくちゃにされたら……ふっ、んっ……んん～っ<emoji=heart04>」"
translation = "「응~<emoji=heart04> 후아앗<emoji=heart04> 하앙<emoji=heart04> 가슴, 그렇게 엉망진창으로 주물러지면…… 훗, 응…… 으으응~<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「はぁっ、はぁっ、あんっ<emoji=heart04>\u3000揉みながら、動くなっての……はぁっ、あぁっ<emoji=heart04>\u3000あっ、あっ、あっ、あぁんっ<emoji=heart04>」"
translation = "「하앗, 하앗, 앙<emoji=heart04> 주무르면서 움직이지 말라니까…… 하앗, 아앗<emoji=heart04> 앗, 앗, 앗, 아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あっ、ダメっ……おっぱいとおま○こ、気持ちいいっ<emoji=heart04>\u3000ふぁっ、ぁっ、あぁっ……ん～っ<emoji=heart04>」"
translation = "「앗, 안 돼…… 가슴이랑 보지, 기분 좋아<emoji=heart04> 후앗, 앗, 아앗…… 응~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "強く力を入れると、イレーナのおっぱいに深く指が沈み込む。"
translation = "강하게 힘을 주자 이레나의 가슴에 손가락이 깊숙이 파묻힌다."

[[dialogue]]
speaker = "unk"
original = "根元から先端へと繰り返し揉みしだいて、その大きさと柔らかさを堪能する。"
translation = "뿌리부터 끝부분까지 반복해서 주무르며 그 크기와 부드러움을 만끽한다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「んんっ、はあぁっ、ぁんっ<emoji=heart04>\u3000いやらしい触り方するわね……本当におっぱい好きなんだから……ふぅっ、はぁ、あぁっ<emoji=heart04>」"
translation = "「응, 하아아앗, 앙<emoji=heart04> 야하게 만지네…… 정말 가슴 좋아한다니까…… 후우, 하아, 아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000乳首くりくりしないでっ<emoji=heart04>\u3000乳首弱いからっ<emoji=heart04>\u3000あ──あ──ふぁああ～っ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 앗<emoji=heart04> 유두 굴리지 마<emoji=heart04> 유두 약하단 말이야<emoji=heart04> 아── 아── 후아아아~앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "膝の上に乗ったイレーナの体が震え、愛液にまみれた膣壁がペニスに絡みつく。"
translation = "무릎 위에 올라탄 이레나의 몸이 떨리고, 애액에 젖은 질벽이 페니스에 휘감긴다."

[[dialogue]]
speaker = "unk"
original = "無意識なのかイレーナも腰を上下に動かし、より快感を得ようとしていた。"
translation = "무의식인지 이레나도 허리를 상하로 움직이며 더 큰 쾌감을 얻으려 하고 있었다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あっ、あっ……ぁ、んんっ<emoji=heart04>\u3000あたしの中で、おち○ちん、ビクビクしてるっ<emoji=heart04>」"
translation = "「앗, 앗…… 아, 응으윽<emoji=heart04> 내 안에서 자지가 움찔거리고 있어!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ふああぁっ、はぁっ、あっ、あぁっ<emoji=heart04>\u3000んんぅっ<emoji=heart04>\u3000おち○ちん、硬くて、太くて、あたしの中、おち○ちんの形になっちゃうっ<emoji=heart04>」"
translation = "「후아아앗, 하앗, 앗, 아앗<emoji=heart04> 응으윽<emoji=heart04> 자지, 딱딱하고 굵어서 내 안이 자지 모양이 되어버려어<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「はあぁっ、はっ、はんっ<emoji=heart04>\u3000おま○こ熱いぃっ<emoji=heart04>\u3000ふはぁっ、はぁっ、ああぁ～～っ<emoji=heart04>」"
translation = "「하아아앗, 핫, 항<emoji=heart04> 보지 뜨거워어<emoji=heart04> 후하앗, 하앗, 아아아~~앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「んん～～～っ<emoji=heart04>\u3000硬いの、奥まで、来てるっ<emoji=heart04>\u3000はぁっ、あっ、あぁんっ<emoji=heart04>\u3000調子に、乗るなぁ……っ<emoji=heart04>」"
translation = "「으으응~~~<emoji=heart04> 딱딱한 게 안쪽까지 오고 있어! 하앗, 앗, 아앙<emoji=heart04> 너무 우쭐대지 마……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「好きにしろって言ったのはイレーナだろ」"
translation = "「마음대로 하라고 한 건 이레나잖아」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「そういう意味じゃ、ないわよっ……んっ<emoji=heart04>\u3000はぁ、はぁっ、はぁっ<emoji=heart04>」"
translation = "「그런 의미가 아니라고…… 응<emoji=heart04> 하아, 하앗, 하앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "こんな時でも負けん気の強いイレーナだけど、俺が唇に舌を捻じ入れると、イレーナも応えてくれる。"
translation = "이런 때에도 지기 싫어하는 이레나지만, 내가 입술에 혀를 밀어 넣자 이레나도 응해온다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「んちゅっ、んっ<emoji=heart04>\u3000ちゅぱっ、ちゅぅっ、ちゅるるっ<emoji=heart04>\u3000ふ、んむっ……れろれろ、れぇろ<emoji=heart04>」"
translation = "「응츄, 응<emoji=heart04> 츄파, 츄우, 츄르르<emoji=heart04> 후, 응믓…… 레로레로, 레에로<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「んふぅっ……んぷっ……んちゅるっ、ちゅぅっ<emoji=heart04>\u3000ちゅぷっ……れるっ……じゅるっ、じゅるるるっ<emoji=heart04>」"
translation = "「응후으…… 응픗…… 응츄르, 츄우<emoji=heart04> 츄픗…… 레르…… 쥬르, 쥬르르르<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "唾液を滴らせて舌を舐め合いながら、また胸を揉んでやる。"
translation = "타액을 흘리며 혀를 서로 핥으면서 다시 가슴을 주물러준다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「んふぅ～～っ<emoji=heart04>\u3000ちゅくっ、れるっ……んんっ<emoji=heart04>\u3000ふっ、んっ……じゅぷるるっ<emoji=heart04>\u3000──ぷあぁっ<emoji=heart04>」"
translation = "「응후우~~<emoji=heart04> 츄쿠, 레르…… 응응<emoji=heart04> 훗, 응…… 쥬푸르르<emoji=heart04> ──푸아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "唇を離すと、混じり合った唾液が糸となって、つうっと垂れ落ちた。"
translation = "입술을 떼자 뒤섞인 타액이 실이 되어 주르륵 흘러내렸다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ここ懺悔室、しかも大聖堂なのに……あんたみたいなスケベは罰が当たればいいんだわ」"
translation = "「여긴 참회실, 게다가 대성당인데…… 당신 같은 변태는 벌을 받아야 마땅해」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それなら気持ちよさそうにしてるイレーナにも罰が必要だな」"
translation = "「그렇다면 기분 좋은 표정을 짓고 있는 이레나에게도 벌이 필요하겠군」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「はぁっ！？\u3000なんでそうなるのよ！？\u3000全部あんたのせいで──」"
translation = "「하앗!? 왜 그렇게 되는 거야!? 전부 당신 때문에──」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ひぁああぁぁ～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「히아아아아아~~~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "イレーナの抗議をかき消すように、全力でペニスを突き上げる。"
translation = "이레나의 항의를 지워버리듯 전력으로 페니스를 찔러 올린다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「いきなり、激しくしちゃ、ダメっ<emoji=heart04>\u3000あん<emoji=heart04>\u3000あん<emoji=heart04>\u3000あん<emoji=heart04>\u3000ふぁっ──ん──んん～～～っ<emoji=heart04>」"
translation = "「갑자기 격하게 하면 안 돼<emoji=heart04> 앙<emoji=heart04> 앙<emoji=heart04> 앙<emoji=heart04> 후앗── 응── 으으으응~~~<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あっ、あっ<emoji=heart04>\u3000それ強いぃっ<emoji=heart04>\u3000はぁ、はぁっ、んんっ<emoji=heart04>\u3000ひぁ、はあぁっ<emoji=heart04>」"
translation = "「앗, 앗<emoji=heart04> 그거 강해<emoji=heart04> 하아, 하앗, 응응<emoji=heart04> 히아, 하아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "一人分のスペースしかない懺悔室に、ぐちゅぐちゅ、ぐちゅぐちゅと男女が交わる卑猥な音が響く。"
translation = "한 사람분의 공간밖에 없는 참회실에 구츄구츄, 구츄구츄하며 남녀가 섞이는 비릿한 소리가 울려 퍼진다."

[[dialogue]]
speaker = "unk"
original = "限界まで膨張したペニスが粘膜と激しく摩擦し、強烈な快感が俺とイレーナを襲った。"
translation = "한계까지 팽창한 페니스가 점막과 격렬하게 마찰하며, 강렬한 쾌감이 나와 이레나를 덮쳤다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「おま○ことろけちゃうっ<emoji=heart04>\u3000はっ、はっ、はっ──はあぁんっ<emoji=heart04>」"
translation = "「보지 녹아버려어<emoji=heart04> 핫, 핫, 핫── 하아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ふぁっ、はぁっ、んんっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んんぅ～っ<emoji=heart04>\u3000あっ、ダメっ、気持ちいいっ<emoji=heart04>\u3000おち○ちん気持ちいいのぉっ<emoji=heart04>」"
translation = "「후앗, 하앗, 응응<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 응으으~윽<emoji=heart04> 앗, 안 돼, 기분 좋아<emoji=heart04> 자지 너무 기분 좋아아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "大きな胸を揉みしだかれ、濡れた性器をペニスで貫かれ、淫らに喘ぐ聖女。"
translation = "커다란 가슴을 주물러지고 젖은 성기를 페니스로 꿰뚫리며 음란하게 신음하는 성녀."

[[dialogue]]
speaker = "unk"
original = "堕ちた聖女への罰として、イレーナをさらに快楽で責め立てる。"
translation = "타락한 성녀에 대한 벌로서 이레나를 더욱 쾌락으로 몰아붙인다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ん～～～～っ<emoji=heart04>\u3000子宮に、当たってっ……んっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000んんーーっ<emoji=heart04>」"
translation = "「으으으으응~<emoji=heart04> 자궁에 닿아서…… 응<emoji=heart04> 응<emoji=heart04> 으으으응~<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「はぁはっ、あっ、あんっ<emoji=heart04>\u3000おち○ちんが、ズン、ズンって……ふああぁっ<emoji=heart04>」"
translation = "「하아하, 앗, 앙<emoji=heart04> 자지가 즈응, 즈응 하고…… 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あ<emoji=heart04>\u3000あ<emoji=heart04>\u3000あん<emoji=heart04>\u3000頭、真っ白になるぅっ<emoji=heart04>\u3000それダメっ<emoji=heart04>\u3000変になるぅっ<emoji=heart04>」"
translation = "「아<emoji=heart04> 아<emoji=heart04> 앙<emoji=heart04> 머릿속이 하얘져어<emoji=heart04> 그거 안 돼<emoji=heart04> 이상해져어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスの先端が子宮口をノックすると、衝撃が快感となって下半身に響く。"
translation = "페니스의 끝이 자궁구를 노크하자 충격이 쾌감이 되어 하반신에 울린다."

[[dialogue]]
speaker = "unk"
original = "さらに、射精寸前でパンパンに膨らんだ亀頭をイレーナの奥に押し付けた。"
translation = "나아가 사정 직전으로 팽팽하게 부풀어 오른 귀두를 이레나의 안쪽에 밀어붙였다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ああぁあぁ～～～～っ<emoji=heart04>\u3000おち○ちんで、お腹の奥、ぐりぐりされてるぅっ<emoji=heart04>」"
translation = "「아아아아아~~~~앗<emoji=heart04> 자지로 뱃속 깊은 곳을 그리그리 당하고 있어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「んっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000んーーっ<emoji=heart04>\u3000お腹、熱くてっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あ～～っ<emoji=heart04>」"
translation = "「응<emoji=heart04> 응<emoji=heart04> 응<emoji=heart04> 으으응~<emoji=heart04> 배가 뜨거워서<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 아아~~앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "大きなおっぱいを持ち上げて、硬くなった乳首を吸う。"
translation = "커다란 가슴을 들어 올려 딱딱해진 유두를 빤다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ふぁああ～～～～～っ<emoji=heart04>」"
translation = "「후아아아~~~~~앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「やっ、吸うなぁっ<emoji=heart04>\u3000乳首、弱いって、言ってるのにっ<emoji=heart04>\u3000気持ち、よすぎるからぁっ<emoji=heart04>」"
translation = "「앗, 빨지 마아<emoji=heart04> 유두 약하다고 말했잖아아<emoji=heart04> 기분 너무 좋으니까아<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ミルクとか、出ないからぁっ<emoji=heart04>\u3000吸うなっ<emoji=heart04>\u3000ダメダメダメぇっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んんんっ<emoji=heart04>」"
translation = "「우유 같은 거 안 나오니까아<emoji=heart04> 빨지 마<emoji=heart04> 안 돼안 돼안 돼애<emoji=heart04> 앗<emoji=heart04> 응응응<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そんなこと言われたら、もっといじめたくなるに決まってる。"
translation = "그런 말을 들으면 더 괴롭히고 싶어지는 게 당연하다."

[[dialogue]]
speaker = "unk"
original = "口に含んだまま舌先でつついたり、ねぶったりして乳首を責めてやる。"
translation = "입에 머금은 채 혀끝으로 찌르거나 핥으며 유두를 공략한다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ん～～～っ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000うああっ<emoji=heart04>\u3000ああぁあぁ～～っ<emoji=heart04>」"
translation = "「으으으응~<emoji=heart04> 후아아앗<emoji=heart04> 앗<emoji=heart04> 우아앗<emoji=heart04> 아아아아아~~앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「おっぱい吸われながらっ<emoji=heart04>\u3000おま○こズボズボされてっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000ああぁっ<emoji=heart04>」"
translation = "「가슴 빨려지면서<emoji=heart04> 보지 즈보즈보 당해서<emoji=heart04> 응응<emoji=heart04> 아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "片方の乳首を指でつまみながら、もう片方も同時に強く吸う。"
translation = "한쪽 유두를 손가락으로 꼬집으면서 다른 한쪽도 동시에 강하게 빤다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「んん～～～～～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「으으으으으으으응~~~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "瞬間、声にならない叫びを上げてイレーナの全身が痙攣した。"
translation = "순간 소리 없는 비명을 지르며 이레나의 온몸이 경련했다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ふああぁっ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000あぁんっ<emoji=heart04>\u3000おっぱいも、おま○こも、熱くてっ<emoji=heart04>\u3000らめっ、らめっ<emoji=heart04>」"
translation = "「후아아앗<emoji=heart04> 하앗<emoji=heart04> 아앙<emoji=heart04> 가슴도, 보지도 뜨거워서<emoji=heart04> 안 돼, 안 돼애<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ここ懺悔室なのにっ<emoji=heart04>\u3000あっ、あっ、ああっ<emoji=heart04>\u3000腰が動くの、止まらないっ<emoji=heart04>\u3000あっ、あっ──ふああぁっ<emoji=heart04>」"
translation = "「여기 참회실인데에<emoji=heart04> 앗, 앗, 아앗<emoji=heart04> 허리 움직이는 게 안 멈춰어<emoji=heart04> 앗, 앗── 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "狭い懺悔室の中でふたりきり。"
translation = "좁은 참회실 안에서 둘이서만."

[[dialogue]]
speaker = "unk"
original = "本能のまま肉体をぶつけ、快楽が上り詰めていく。"
translation = "본능대로 육체를 부딪치며 쾌락이 절정에 달해간다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ひああぁっ<emoji=heart04>\u3000あっ、あぁんっ<emoji=heart04>\u3000おち○ちんが、子宮、当たってっ<emoji=heart04>\u3000あ<emoji=heart04>\u3000あ<emoji=heart04>\u3000赤ちゃんの部屋で感じてるぅっ<emoji=heart04>」"
translation = "「히아아앗<emoji=heart04> 앗, 아앙<emoji=heart04> 자지가 자궁에 닿아서<emoji=heart04> 아<emoji=heart04> 아<emoji=heart04> 아기 방에서 느끼고 있어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「はっ、はっ、はあぁっ<emoji=heart04>\u3000おち○ちん、ビクビクしてるっ<emoji=heart04>\u3000あたしも、おま○こイクっ<emoji=heart04>\u3000イク、イクぅ～っ<emoji=heart04>」"
translation = "「하앗, 하앗, 하아아앗<emoji=heart04> 자지 움찔거리고 있어<emoji=heart04> 나도, 보지 가버려어<emoji=heart04> 가, 가아아~앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "思い切り奥を突くと、イレーナの体重が乗って強烈すぎる刺激が走った。"
translation = "힘껏 안쪽을 찌르자 이레나의 체중이 실리며 너무나 강렬한 자극이 달렸다."

[[dialogue]]
speaker = "unk"
original = "まるでマーキングするように、爆発寸前のペニスをイレーナの子宮に何度も叩きつける。"
translation = "마치 마킹이라도 하듯 폭발 직전의 페니스를 이레나의 자궁에 몇 번이고 내리친다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ふわぁっ、はっ、あっ──ひああぁっ<emoji=heart04>\u3000神官なのにっ<emoji=heart04>\u3000聖女なのにっ<emoji=heart04>\u3000おち○ちんで子宮ズンズンされて、射精されちゃうっ<emoji=heart04>」"
translation = "「후와앗, 핫, 앗── 히아아앗<emoji=heart04> 신관인데에<emoji=heart04> 성녀인데에<emoji=heart04> 자지로 자궁 즈응즈응 당해서 사정당해버려어<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000イクっ<emoji=heart04>\u3000イクっ<emoji=heart04>\u3000おっぱいイクっ<emoji=heart04>\u3000おま○こイッちゃうぅっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04> 가버려<emoji=heart04> 가버려<emoji=heart04> 가슴 가버려어<emoji=heart04> 보지 가버려어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「らめっ<emoji=heart04>\u3000おち○ちんいいのぉっ<emoji=heart04>\u3000イク<emoji=heart04>\u3000イクイクイク<emoji=heart04>\u3000イッくぅ～～～～っ<emoji=heart04>」"
translation = "「안 돼애<emoji=heart04> 자지 너무 좋아아<emoji=heart04> 가<emoji=heart04> 가가각<emoji=heart04> 가버려어어어어~~~엇<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そしておっぱいをぎゅっと握りながら、イレーナの奥で欲望を吐き出した。"
translation = "그리고 가슴을 꽉 쥐면서 이레나의 안쪽에 욕망을 토해냈다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「うあ──あ──ああぁあぁ～～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「우아── 아── 아아아아아~~~~~~~~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ふあぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あたしイッてるっ<emoji=heart04>\u3000聖女なのに、聖堂でエッチして、イッてるぅっ<emoji=heart04>」"
translation = "「후아앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 나 가고 있어어<emoji=heart04> 성녀인데, 성당에서 섹스하고 가버리고 있어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「んんっ<emoji=heart04>\u3000出しながら、おっぱい揉むなぁ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000お腹、熱いぃっ<emoji=heart04>\u3000あたしの奥に、びゅーって、熱いの出てるぅ<emoji=heart04>」"
translation = "「응응<emoji=heart04> 싸면서 가슴 주무르지 마아<emoji=heart04> 앙<emoji=heart04> 배 뜨거워어<emoji=heart04> 내 안쪽에 뷰우우 하고 뜨거운 게 나오고 있어어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "イレーナの胸を揉みながら射精する無上の幸福。"
translation = "이레나의 가슴을 주무르며 사정하는 무상의 행복."

[[dialogue]]
speaker = "unk"
original = "亀頭を子宮口に隙間なく密着させ、イレーナの奥に精を注ぐ。"
translation = "귀두를 자궁구에 틈 없이 밀착시켜 이레나의 안쪽에 정을 쏟는다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あっ……おち○ちん脈打ってる……<emoji=heart04>\u3000せーえき、びゅるびゅるって、子宮に注ぎ込まれてる……っ<emoji=heart04>\u3000ふっ……んっ……んっ<emoji=heart04>」"
translation = "「앗…… 자지 맥박치고 있어……<emoji=heart04> 정액, 뷰루뷰루하고 자궁에 쏟아지고 있어……<emoji=heart04> 훗…… 응…… 응<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ダメっ<emoji=heart04>\u3000おっぱいもおま○こも気持ちいい……<emoji=heart04>\u3000ふぁ、はぁ……んん～～～っ<emoji=heart04>」"
translation = "「안 돼<emoji=heart04> 가슴도 보지도 기분 좋아……<emoji=heart04> 후아, 하아…… 으으으으응~<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ふはぁっ、はぁ……はあぁ……<emoji=heart04>\u3000エロ会長め……どんだけあたしの中に出せば気が済むのよ。まだお腹熱いわ……」"
translation = "「후하앗, 하아…… 하아아……<emoji=heart04> 변태 회장 녀석…… 얼마나 내 안에 싸야 직성이 풀리는 거야. 아직 배가 뜨겁잖아……」"

[[dialogue]]
speaker = "unk"
original = "イレーナの中を満たしたせいか、繋がった部分から精液が溢れている。"
translation = "이레나의 안을 가득 채운 탓인지 연결된 부분에서 정액이 넘쳐흐르고 있다."

[[dialogue]]
speaker = "unk"
original = "白くどろりとした精液が綺麗な太ももにまで伝っているのがいやらしい。"
translation = "하얗고 걸쭉한 정액이 매끄러운 허벅지까지 타고 내려오는 것이 야하다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「もう、こんなに出しちゃって……赤ちゃんできたら聖女じゃいられなくなるでしょうが。お腹大きくなったらどうすんのよ」"
translation = "「정말, 이렇게나 싸버리고…… 아기라도 생기면 성녀로 있을 수 없게 되잖아. 배가 불러오면 어쩔 거야」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「んっ<emoji=heart04>\u3000ちょっ、何ち○ぽビクビクさせてんの！？\u3000まさか想像して興奮してんの！？\u3000ヘンタイ！」"
translation = "「응<emoji=heart04> 잠깐, 왜 자지를 움찔거리는 거야!? 설마 상상하고 흥분한 거야!? 변태!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「はぁ、エセ聖女でもさすがにやりすぎたわね……。つか何よ、神官として罪を受け入れますって。ダメに決まってんでしょうが」"
translation = "「하아, 가짜 성녀라지만 역시 너무 과했네……. 그보다 뭐야, 신관으로서 죄를 받아들이겠다니. 안 되는 게 당연하잖아」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「しかもあんな声出して恥ずかしい……こら、思い出すんじゃないわよ。ち○ぽ脈打ってるのわかるんだからね」"
translation = "「게다가 그런 목소리나 내고 창피해…… 이봐, 회상하지 마. 자지 맥박치는 거 다 느껴지니까」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「そもそも、あんた何しにここに来たのよ。まさか神官を襲いに来たわけじゃないでしょうね」"
translation = "「애초에 당신 여기 뭐 하러 온 거야. 설마 신관을 덮치러 온 건 아니겠지」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「もちろんイレーナに会いにだけど」"
translation = "「물론 이레나를 만나러 온 거지만」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「はぁっ！？」"
translation = "「하앗!?」"

[[dialogue]]
speaker = "unk"
original = "好きな人に会いに来るのに理由なんていらない。"
translation = "좋아하는 사람을 만나러 오는 데 이유 같은 건 필요 없다."

[[dialogue]]
speaker = "unk"
original = "礼拝の後だから遠慮しようかとも思ったけど、やっぱりイレーナと話がしたかった。それだけだ。"
translation = "예배 직후라 사양할까도 생각했지만, 역시 이레나와 이야기하고 싶었다. 그뿐이다."

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「そう言えば女が喜ぶと思ってるの？\u3000単純ね。５０点……いや３０点よ」"
translation = "「그렇게 말하면 여자가 기뻐할 줄 알아? 단순하네. 50점…… 아니 30점이야」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「でもまぁ……嫌いではないわよ。バーカ」"
translation = "「하지만 뭐…… 싫지는 않아. 바보」"

