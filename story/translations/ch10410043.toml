[[dialogue]]
speaker = "unk"
original = "第３話,可愛い水着を見てみたい,P"
translation = "제3화, 귀여운 수영복을 보고 싶어, P"

[[dialogue]]
speaker = "unk"
original = "ある日、星徒会室に遊びに来ていたマインが、ソファーに寝転がってファッション雑誌を読みながら口を開く。"
translation = "어느 날, 성도회실에 놀러 온 마인이, 소파에 누워 패션 잡지를 읽으며 입을 열었다."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ねぇ、会長～」"
translation = "「저기, 회장님~」"

[[dialogue]]
speaker = "unk"
original = "なんだ、マイン？"
translation = "왜 그래, 마인?"

[[dialogue]]
speaker = "unk"
original = "会長席に座って休憩していた俺は、まったりと緑茶を飲みながら聞き返す。"
translation = "회장석에 앉아 휴식을 취하고 있던 나는, 느긋하게 녹차를 마시며 되물었다."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「夏が来てから気になってたんだけど――」"
translation = "「여름이 오고 나서부터 궁금했던 건데──」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「会長って、女の子用の水着とか持ってたりしないの？」"
translation = "「회장님은, 여자애용 수영복 같은 거 가지고 있지 않아?」"

[[dialogue]]
speaker = "unk"
original = "俺は思わず、緑茶を噴き出してしまった。"
translation = "나는 나도 모르게, 녹차를 뿜고 말았다."

[[dialogue]]
speaker = "unk"
original = "持ってないよ！？"
translation = "안 가지고 있어!?"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「えっ、そうなんだ？\u3000意外～」"
translation = "「엣, 그렇구나? 의외네~」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「会長の女の子フォームなら、水着絶対似合いそうなのに～」"
translation = "「회장님의 여자애 폼이라면, 수영복 진짜 잘 어울릴 것 같은데~」"

[[dialogue]]
speaker = "unk"
original = "アニマ先輩の薬の実験等で女体に変身すること自体は、不本意ながら慣れてしまっている。しかし――"
translation = "아니마 선배의 약 실험 등으로 여체로 변신하는 것 자체는, 본의 아니게 익숙해져 버렸다. 하지만──"

[[dialogue]]
speaker = "unk"
original = "女体で水着姿にって……恥ずかしいじゃないか！？"
translation = "여체로 수영복 차림이라니…… 부끄럽잖아!?"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ぷっ……きゃはっ☆\u3000きゃははははははっ！\u3000今更！？」"
translation = "「큭…… 캬핫☆ 캬하하하하하하핫! 이제 와서!?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「――水着は露出度が高いから？\u3000きゃははははははっ！\u3000やばっ、ちょっと待って……本当にツボった……！\u3000お腹痛い……☆」"
translation = "「──수영복은 노출도가 높아서? 캬하하하하하하핫! 대박, 잠깐만…… 진짜 웃겨……! 배 아파……☆」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「くふっ……ふふふっ♪\u3000そんなの聞くと、ますます見たくなっちゃうじゃ～ん♪」"
translation = "「크훗…… 후후훗♪ 그런 소릴 들으니까, 점점 더 보고 싶어지잖아~♪」"

[[dialogue]]
speaker = "unk"
original = "絶対に着ないよ！？"
translation = "절대로 안 입을 거야!?"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「え～？\u3000いいじゃ～ん☆」"
translation = "「에~? 좋잖아~☆」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「他の誰にも見せたりしないから、恋人のプレイとして、ね？」"
translation = "「다른 누구한테도 안 보여줄 테니까, 연인끼리의 플레이로서, 응?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「というわけで、今日は<b>女の子</b>になった会長と、水着を買いに来ちゃいました～♪」"
translation = "「그런 고로, 오늘은 <b>여자애</b>가 된 회장님과, 수영복을 사러 왔습니다~♪」"

[[dialogue]]
speaker = "unk"
original = "結局、俺はマインの交渉術に負けてしまい、女子に性転換した状態で街にやって来た――のだが。"
translation = "결국, 나는 마인의 교섭술에 패배하여, 여자로 성전환한 상태로 거리에 나오게 되었다── 그런데."

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「わ～♪\u3000ぱちぱちぱちぱち～♪」"
translation = "「와아~♪ 짝짝짝짝~♪」"

[[dialogue]]
speaker = "unk"
original = "なんで母さんもいるの！？"
translation = "왜 엄마까지 있는 거야!?"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「ふふっ、だって、可愛い息子が女の子用の水着を買うとか、面白過ぎるじゃな～い♪」"
translation = "「후훗, 그치만, 귀여운 아들이 여자애용 수영복을 산다니, 너무 재밌잖아~♪」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「きゃはははっ☆\u3000ですよね～！」"
translation = "「캬하하하☆ 그렇죠~!」"

[[dialogue]]
speaker = "unk"
original = "くっ、そうだ、マインには前科があるんだった……！"
translation = "큭, 맞다, 마인에게는 전과가 있었지……!"

[[dialogue]]
speaker = "unk"
original = "以前、アステラカジノの事件でバニー服に変身できるようになった時、内緒と言ったのに、トワ先生やヒトリにバラされてしまったことがあった。"
translation = "이전에, 아스테라 카지노 사건으로 바니걸 복장으로 변신할 수 있게 되었을 때, 비밀이라고 했는데 토와 선생님이나 히토리에게 폭로해버린 적이 있었다."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ごめ～ん、リノさんに話した方が面白そうかもって、どうしても悪戯心を抑えきれなくて～☆」"
translation = "「미안해~, 리노 씨에게 말하는 게 더 재밌을 것 같아서, 아무래도 장난기를 억누를 수가 없었어~☆」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「でも、安心して！\u3000リノさんには私が責任を持って、ちゃんとネゴシエーションしてあるから♪」"
translation = "「그치만 안심해! 리노 씨에게는 내가 책임을 지고, 제대로 네고시에이션 해 뒀으니까♪」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「大丈夫よ、クロト！\u3000息子がどんな趣味でも、母さんは受け入れるわ♪」"
translation = "「괜찮아, 쿠로토! 아들이 어떤 취미를 가졌든, 엄마는 받아들일게♪」"

[[dialogue]]
speaker = "unk"
original = "いや、なんか勘違いしてない！？"
translation = "아니, 뭔가 착각하고 있는 거 아니야!?"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「それじゃあ、会長に似合う水着を探しに、レディ～」"
translation = "「그럼, 회장님에게 어울리는 수영복을 찾으러, 레디~」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「ゴ～☆」"
translation = "「고~☆」"

[[dialogue]]
speaker = "unk"
original = "すっかり息の合うようになった２人に背中を押され、俺は水着ショップへと向かうことになってしまうのだった――"
translation = "완벽하게 호흡이 척척 맞는 두 사람에게 떠밀려, 나는 수영복 샵으로 향하게 되고 마는 것이었다──"

[[dialogue]]
speaker = "unk"
original = "そして……買い物した後、リゾート結界にて。"
translation = "그리고…… 쇼핑을 마친 뒤, 리조트 결계에서."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「さあ♪\u3000それでは、私とリノさんで選んだ会長の水着姿を、海で改めてお披露目で～す♪」"
translation = "「자♪ 그럼, 저와 리노 씨가 고른 회장님의 수영복 차림을, 바다에서 새롭게 선보이겠습니다~♪」"

[[dialogue]]
speaker = "unk"
original = "俺が顔を猛烈に熱くしながら、女体化＆水着姿で海の家から出て来ると――"
translation = "내가 얼굴을 맹렬히 붉히며, 여체화 & 수영복 차림으로 해변의 집에서 나오자──"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「きゃ～っ♪\u3000とっても可愛いわ～、クロト～♪」"
translation = "「꺄아~♪ 너무너무 귀엽단다, 쿠로토~♪」"

[[dialogue]]
speaker = "unk"
original = "はぅ……また１つ、女の子の階段を登ってしまった……"
translation = "하으…… 또 하나, 여자애의 계단을 올라버렸어……"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「きゃはははははっ☆\u3000大丈夫<emoji=heart04>」"
translation = "「캬하하하하하☆ 괜찮아❤️」"

[[dialogue]]
speaker = "unk"
original = "後ろから俺の両肩に手を置いたマインは、そっと耳元に唇を寄せて来て。"
translation = "뒤에서 내 양어깨에 손을 얹은 마인은, 살며시 귓가에 입술을 가까이 가져왔다."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「会長が女の子になって恥ずかしがってるの見ても……私、ちゃんとゾクゾクして、興奮しちゃってるから<emoji=heart04>」"
translation = "「회장님이 여자애가 돼서 부끄러워하는 걸 봐도…… 나, 제대로 오싹오싹하고, 흥분해버렸으니까❤️」"

[[dialogue]]
speaker = "unk"
original = "母さんに聞こえないくらいの声で囁くマインに、俺はドキッとさせられてしまうのだった――"
translation = "엄마에게 들리지 않을 정도의 목소리로 속삭이는 마인에게, 나는 가슴이 두근거리고 마는 것이었다──"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「にひひ<emoji=heart04>」"
translation = "「니히히❤️」"

