[[dialogue]]
speaker = "unk"
original = "第１話,保健委員の妄想天使,P"
translation = "제1화, 보건위원의 망상 천사, P"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「あ、会長、来てくれたんですね！\u3000モンスターに囲まれたビルの中に、人が取り残されているらしいんです」"
translation = "「아, 회장, 와주셨군요! 몬스터에게 둘러싸인 빌딩 안에 사람이 남겨져 있다는 모양이에요」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「ビル内にもモンスターが侵入していて、早く助けに行かないと危険な状態だそうで……」"
translation = "「빌딩 내에도 몬스터가 침입해서 빨리 구하러 가지 않으면 위험한 상태라고 해서……」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「よりによって、居合わせたのがボクとモネでさ。プリマステラじゃないから手の出しようがないんだよ」"
translation = "「하필이면 같이 있었던 게 나랑 모네라서 말이야. 프리마스텔라가 아니니까 손을 쓸 방도가 없어」"

[[dialogue]]
speaker = "unk"
original = "俺が突入する"
translation = "내가 돌입한다"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「会長１人で！？\u3000あのモンスターの数はいくら会長でも無茶なんじゃ……」"
translation = "「회장 혼자서요!? 저 몬스터 숫자는 아무리 회장이라도 무모한 게……」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「……それなら私もお供します。私でも少しは役に立ちますから！」"
translation = "「……그렇다면 저도 동행하겠습니다. 저라도 조금은 도움이 될 테니까요!」"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「イーーーーッ！」"
translation = "「이이잇!」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「きゃっ！？」"
translation = "「꺄악!?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「せやっ！」"
translation = "「세얏!」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「遅くなってすみません。イクシリオン、ただいま到着しました」"
translation = "「늦어서 죄송합니다. 익실리온, 방금 도착했습니다」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「イクシー！」"
translation = "「이크시!」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「詳しいお話は後で。私が会長と突入します。おふたりは外でバックアップをお願いします」"
translation = "「자세한 이야기는 나중에. 제가 회장과 돌입하겠습니다. 두 분은 밖에서 백업을 부탁드려요」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「わかりました！」"
translation = "「알겠습니다!」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「では行きましょう！」"
translation = "「그럼 가죠!」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「あ、お疲れ様でした、会長。皆さん無事に救助できましたね」"
translation = "「아, 수고하셨습니다, 회장. 여러분 무사히 구조했네요」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「改めまして、私は１年生のイクシリオン・グレゴール。保健委員所属のプリマステラです。イクシーとお呼びください」"
translation = "「다시 인사드릴게요, 저는 1학년 익실리온 그레고르. 보건위원 소속 프리마스텔라입니다. 이크시라고 불러주세요」"

[[dialogue]]
speaker = "unk"
original = "ありがとう、さっきは助かった"
translation = "고마워, 아까는 고마웠어"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「いいえ、命を守るのは我々星騎士の責務ですから」"
translation = "「아니요, 목숨을 지키는 것은 우리 성기사의 책무니까요」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「それに要救助者の確保は保健委員の仕事です。私はフロレンシアさんのように治癒の星術は得意でないので、戦闘面で貢献できるように努めています」"
translation = "「게다가 요구조자 확보는 보건위원의 업무입니다. 저는 플로렌시아 씨처럼 치유 성술은 특기가 아니라서 전투 면에서 공헌할 수 있도록 노력하고 있습니다」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「……おや。会長もお怪我をされていませんか？」"
translation = "「……어라. 회장도 다치지 않으셨나요?」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「上着を脱いで見せていただいても……いえ、殿方とはいえ、肌を人前に晒すのはお恥ずかしいかもしれませんね。人のいない場所に移動しましょう」"
translation = "「윗옷을 벗어서 보여주셔도…… 아니, 남성이라 해도 피부를 남 앞에 드러내는 건 부끄러우실지도 모르겠네요. 사람이 없는 곳으로 이동하죠」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「ハッ──！？」"
translation = "「핫──!?」"

[[dialogue]]
speaker = "unk"
original = "どうかした？"
translation = "왜 그래?"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「人気のないところで服を脱いで──なんて、ハレンチな……！」"
translation = "「사람 없는 곳에서 옷을 벗고──라니, 파렴치해……!」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「密室で若い男女が２人きり、何も起こらないわけはなく……」"
translation = "「밀실에서 젊은 남녀가 단둘이, 아무 일도 일어나지 않을 리가 없고……」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「怪我の治療を終えた後、『こっちも診てくれ。腫れて赤くなってるんだ』とズボンに手をかけて──」"
translation = "「상처 치료를 마친 뒤, 『이쪽도 좀 봐줘. 부어서 빨개졌어』라며 바지에 손을 대고──」"

[[dialogue]]
speaker = "unk"
original = "何の話？"
translation = "무슨 소리야?"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「ハッ！？\u3000いけません、私としたことがお恥ずかしい……」"
translation = "「핫!? 안 됩니다, 저답지 않게 부끄러운 짓을……」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「失礼しました。あちらにフロレンシアさんが来られてますので、怪我はそちらで診ていただきましょうか」"
translation = "「실례했습니다. 저쪽에 플로렌시아 씨가 오고 계시니 상처는 그쪽에서 진찰받기로 할까요」"

[[dialogue]]
speaker = "unk"
original = "絶対痛くされるからやめとく……"
translation = "분명 아프게 할 테니까 관둘래……"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「そんなにですか？\u3000私には優しくしてくださったような……」"
translation = "「그 정도인가요? 저에게는 상냥하게 대해주셨던 것 같은데……」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「お腹減ったし、帰りに何か食べようよ。あっちのコンビニ、キャンペーンでソーセージとフライドチキン増量中だってよ」"
translation = "「배고픈데 돌아가는 길에 뭐 좀 먹자. 저쪽 편의점, 캠페인으로 소시지랑 프라이드치킨 증량 중이래」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「あそこはスーパーホットチキンがおすすめですよ。辛さはそこまでじゃありませんけど」"
translation = "「저기는 슈퍼 핫 치킨을 추천해요. 맵기는 그렇게 심하지 않지만요」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「それ言う人の辛くないってめちゃくちゃ辛いよね。ボクも辛いのは好きだからいいけど」"
translation = "「그 말 하는 사람의 안 맵다는 건 엄청 맵단 말이지. 나도 매운 건 좋아하니까 괜찮지만」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「ありがとうございます、環さん。いいことをお聞きしました。戦うとお腹が空きますからね♪」"
translation = "「감사합니다, 타마키 씨. 좋은 정보를 들었네요. 싸우면 배가 고파지니까요♪」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「ソーセージ……増量中……大きなソーセージ……」"
translation = "「소시지…… 증량 중…… 커다란 소시지……」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「口に入りきらないくらい太くて、お汁たっぷりで……ごくり」"
translation = "「입에 다 들어가지 않을 정도로 굵고, 즙이 가득해서…… 꿀꺽」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「大きくて立派な……会長のソーセージ……」"
translation = "「크고 훌륭한…… 회장의 소시지……」"

[[dialogue]]
speaker = "unk"
original = "俺のソーセージ？"
translation = "내 소시지?"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「いえ、何でもありませんっ。お気になさらず」"
translation = "「아니요, 아무것도 아닙니다. 신경 쓰지 마세요」"

[[dialogue]]
speaker_original = "環"
speaker_translation = "타마키"
original = "「あー……ま、ほどほどにね……」"
translation = "「아ー…… 뭐, 적당히 해……」"

[[dialogue]]
speaker_original = "モネ"
speaker_translation = "모네"
original = "「そうですね、食べすぎには気を付けます」"
translation = "「그렇네요, 과식은 주의할게요」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「さっそくコンビニに参りましょう。善は急げです！」"
translation = "「어서 편의점으로 가죠. 쇠뿔도 단김에 빼야죠!」"

[[dialogue]]
speaker_original = "イクシリオン"
speaker_translation = "익실리온"
original = "「ほら、会長も。買い食いは学生生活の華ですからね♪」"
translation = "「자, 회장도요. 군것질은 학생 생활의 꽃이니까요♪」"

