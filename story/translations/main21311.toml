[[dialogue]]
speaker = "unk"
original = "第１１話,掴み取るべき未来,B"
translation = "제11화, 움켜쥐어야 할 미래, B"

[[dialogue]]
speaker = "unk"
original = "チナが外出先に選んだ<ruby>肉肉飯店<rt>ローローハンテン</rt></ruby>の店先で、俺たちは一組の男女に出会った。"
translation = "치나가 외출지로 선택한 <ruby>고기괵반점<rt>로로한텐</rt></ruby>의 가게 앞에서, 우리는 한 쌍의 남녀를 만났다."

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「……………………母さん？」"
translation = "「……………………엄마?」"

[[dialogue]]
speaker = "unk"
original = "チナは確かに『母さん』と言った。それならば、隣に立つ男性は父親か。"
translation = "치나는 분명히 『엄마』라고 했다. 그렇다면, 옆에 서 있는 남성은 아버지인가."

[[dialogue]]
speaker = "unk"
original = "言われてみれば確かに面影があるが──こんな偶然があるだなんて。"
translation = "듣고 보니 확실히 닮은 구석이 있지만── 이런 우연이 있다니."

[[dialogue]]
speaker_original = "チナの母"
speaker_translation = "치나의 어머니"
original = "「ごめんなさい。私たちの名前を呼ばれたとばかり……」"
translation = "「미안해요. 우리 이름을 부른 줄만 알고……」"

[[dialogue]]
speaker_original = "チナの父"
speaker_translation = "치나의 아버지"
original = "「君、大丈夫だったかい？\u3000ケガとかしてないかな？」"
translation = "「학생, 괜찮니? 다치지는 않았니?」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「……………………父さん、も」"
translation = "「……………………아빠, 도」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……しっかり。呼ばれてるぞ」"
translation = "「……정신 차려. 부르고 계시잖아.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「──え。あっ……！」"
translation = "「──에. 앗……!」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「だ、大丈夫です！\u3000すみませんっ、前を見てなくって……！」"
translation = "「괘, 괜찮습니다! 죄송해요, 앞을 안 봐서……!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……ご無沙汰しております。香堂さん。偶然、ですね」"
translation = "「……오랜만입니다. 코도 씨. 우연, 이네요.」"

[[dialogue]]
speaker_original = "チナの母"
speaker_translation = "치나의 어머니"
original = "「あ……新星星徒会のアナさん！\u3000あなた、アナさんですよ。ほら、チナの入院の時に、学園長さんと一緒に便宜をはかってくださった……」"
translation = "「아…… 신성 성도회의 아나 씨! 여보, 아나 씨예요. 봐요, 치나 입원했을 때, 학원장님과 함께 편의를 봐주셨던……」"

[[dialogue]]
speaker_original = "チナの父"
speaker_translation = "치나의 아버지"
original = "「ああ！\u3000その節は本当にありがとうございました。すみません、自分は出撃していたので、連絡は妻に任せきりで……」"
translation = "「아아! 그때는 정말 감사했습니다. 죄송합니다, 저는 출격 중이라 연락은 아내에게 다 맡겨버려서……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「いいえ。こちらこそお世話になっております。私たち現役も、ＯＢ・ＯＧの星騎士の方から学ぶことばかりで……」"
translation = "「아니요. 저희야말로 신세 지고 있습니다. 저희 현역들도, OB·OG 성기사분들로부터 배울 점뿐이라……」"

[[dialogue]]
speaker = "unk"
original = "学園卒業後も、星力の衰え方には個人差がある──チナの父親は、未だに現役の星騎士みたいだ。"
translation = "학원 졸업 후에도, 성력이 쇠퇴하는 정도에는 개인차가 있다── 치나의 아버지는, 아직 현역 성기사인 모양이다."

[[dialogue]]
speaker_original = "チナの父"
speaker_translation = "치나의 아버지"
original = "「しかし私ももうすっかり星力が弱くなってしまって……そろそろあがりも近いかなと。足を引っ張っていないか心配ですが……」"
translation = "「하지만 저도 이제 완전히 성력이 약해져서…… 슬슬 은퇴도 가깝나 싶네요. 발목을 잡고 있지는 않은지 걱정입니다만……」"

[[dialogue]]
speaker_original = "チナの父"
speaker_translation = "치나의 아버지"
original = "「ああ、アナさんと一緒にいるということは、あなたが──」"
translation = "「아아, 아나 씨와 함께 있다는 건, 학생이──」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「はい、新星学園の現星徒会長、緋宮クロトです。そしてこちらの彼女も……同じ星騎士です」"
translation = "「네, 신성학원의 현 성도회장, 히노미야 쿠로토입니다. 그리고 여기 이 친구도…… 같은 성기사입니다.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「こ、こん、にちは……」"
translation = "「안, 안녕, 하세요……」"

[[dialogue]]
speaker_original = "チナの父"
speaker_translation = "치나의 아버지"
original = "「そうでしたか。平和が守られているのは、君たち後輩のおかげだよ。本当にありがとう」"
translation = "「그렇군요. 평화가 지켜지고 있는 건, 여러분 같은 후배들 덕분입니다. 정말 고마워요.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「い、いえ……でも、あ、あのっ……その……」"
translation = "「아, 아뇨…… 하지만, 저, 저기…… 그……」"

[[dialogue]]
speaker_original = "チナの母"
speaker_translation = "치나의 어머니"
original = "「……？\u3000どうかしましたか」"
translation = "「……? 무슨 일인가요.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「娘さん、あの……入院、してるって……」"
translation = "「따님, 저기…… 입원, 했다고……」"

[[dialogue]]
speaker_original = "チナの母"
speaker_translation = "치나의 어머니"
original = "「あ……心配してくださって、ありがとうございます。でも大丈夫ですよ。新星学園の方々に、とてもよくしていただいていますから」"
translation = "「아…… 걱정해 주셔서 감사합니다. 하지만 괜찮아요. 신성학원 분들이 아주 잘해주고 계시니까요.」"

[[dialogue]]
speaker_original = "チナの父"
speaker_translation = "치나의 아버지"
original = "「以前にも似たようなことがあったからね。あの時はすぐに目が覚めたんだが……まあ今回もきっと、すぐによくなる」"
translation = "「전에도 비슷한 일이 있었거든. 그때는 금방 깨어났는데…… 뭐 이번에도 분명, 금방 좋아질 거야.」"

[[dialogue]]
speaker_original = "チナの母"
speaker_translation = "치나의 어머니"
original = "「学園長さんからもまめに連絡をいただいていますし、優秀なスタッフに看ていただいています」"
translation = "「학원장님께도 수시로 연락을 받고 있고, 우수한 스태프분들이 돌봐주고 계시니까요.」"

[[dialogue]]
speaker_original = "チナの父"
speaker_translation = "치나의 아버지"
original = "「ええ。どうかあなたたちは、リクリエとの戦いに集中してください」"
translation = "「네. 부디 여러분은 리크리에와의 싸움에 집중해 주세요.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「……………そう、ですか」"
translation = "「……………그렇, 군요.」"

[[dialogue]]
speaker_original = "チナの母"
speaker_translation = "치나의 어머니"
original = "「どうかお気になさらず。大丈夫です、うちの娘は本当にわんぱくな子ですから！」"
translation = "「부디 마음 쓰지 마세요. 괜찮습니다, 우리 딸은 정말 개구쟁이인 아이니까요!」"

[[dialogue]]
speaker_original = "チナの母"
speaker_translation = "치나의 어머니"
original = "「今日にでも目を覚ますんじゃないかって話してるんですよ。ねえ、あなた？」"
translation = "「오늘이라도 눈을 뜨지 않을까 이야기하고 있었답니다. 그렇죠, 여보?」"

[[dialogue]]
speaker_original = "チナの父"
speaker_translation = "치나의 아버지"
original = "「ああ。チナなら大丈夫さ。きっと目が覚めたら『お腹が空いた』って言ってくれるよ」"
translation = "「그래. 치나라면 괜찮을 거야. 분명 깨어나면 『배고파』라고 말해줄 거야.」"

[[dialogue]]
speaker_original = "チナの母"
speaker_translation = "치나의 어머니"
original = "「ふふ。だからお見舞いに行く前に、必ずここの肉まんを買っていくんです。あの子は本当に、これに目がないから」"
translation = "「후후. 그래서 병문안 가기 전에, 반드시 여기 고기만두를 사 간답니다. 그 애는 정말 이걸 좋아하거든요.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「お見舞いって……こんな平日に？\u3000お仕事とか、あるんじゃ……」"
translation = "「병문안이라니…… 이런 평일에? 일 같은 거, 있으실 텐데……」"

[[dialogue]]
speaker_original = "チナの母"
speaker_translation = "치나의 어머니"
original = "「ええ。でも反省してるんです。私たち、あの子が文句を言わないから、それに甘えてしまって……」"
translation = "「네. 하지만 반성하고 있어요. 우리, 그 애가 불평하지 않으니까 거기에 어리광 부리고 있어서……」"

[[dialogue]]
speaker_original = "チナの父"
speaker_translation = "치나의 아버지"
original = "「仕事ばかりで寂しい思いをさせていたって、今さら気づいて。親失格ですよ……今度あの子が目を覚ましたら、うんと遊んでやるつもりなんです」"
translation = "「일만 하느라 외롭게 만들었다는 걸 이제야 깨달았죠. 부모 실격이에요…… 이번에 그 애가 깨어나면, 실컷 놀아줄 생각입니다.」"

[[dialogue]]
speaker_original = "チナの母"
speaker_translation = "치나의 어머니"
original = "「世界の平和も大切ですが……あの子は、私たちにとって全てですから。私も夫も、家族の時間を増やそうって話をしているんです」"
translation = "「세계의 평화도 소중하지만…… 그 애는 저희에게 전부니까요. 저도 남편도, 가족 시간을 늘리자고 이야기하고 있어요.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「…………っ」"
translation = "「…………윽」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「その。お見舞いに行くにしては、お荷物がたくさんありますね？」"
translation = "「그게. 병문안 가시는 것치고는 짐이 참 많으시네요?」"

[[dialogue]]
speaker_original = "チナの母"
speaker_translation = "치나의 어머니"
original = "「もう──そうなんですよアナさん！\u3000この人ったら、買い物は帰りにしようって言うのに、聞かなくて」"
translation = "「정말── 그러니까요 아나 씨! 이 사람이 글쎄, 쇼핑은 돌아오는 길에 하자고 하는데도 말을 안 들어서.」"

[[dialogue]]
speaker_original = "チナの父"
speaker_translation = "치나의 아버지"
original = "「仕方ないだろう、善は急げって言うし……」"
translation = "「어쩔 수 없잖아, 쇠뿔도 단김에 빼라고들 하니까……」"

[[dialogue]]
speaker = "unk"
original = "チナの母親が持っていた荷物を開いて見せてくれた。そこにあったのは、新生児用の、たくさんの買い物──"
translation = "치나의 어머니가 들고 있던 짐을 열어 보여주었다. 그곳에 있었던 것은, 신생아용의 수많은 물건들──"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「…………え？」"
translation = "「…………에?」"

[[dialogue]]
speaker_original = "チナの母"
speaker_translation = "치나의 어머니"
original = "「つい先日、わかったんです。チナったら、早く起きてくれないかしら」"
translation = "「불과 며칠 전에 알게 됐거든요. 치나도 참, 빨리 일어나 주지 않으려나.」"

[[dialogue]]
speaker_original = "チナの母"
speaker_translation = "치나의 어머니"
original = "「お姉ちゃんになるのよって、教えてあげたいのに──」"
translation = "「언니가 되는 거라고, 알려주고 싶은데──」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「────っ！！」"
translation = "「────윽!!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「あ……！」"
translation = "「아……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「アナ、あとは頼む！\u3000こっちは任せろ……！」"
translation = "「아나, 나머지는 부탁해! 이쪽은 맡겨줘……!」"

[[dialogue]]
speaker = "unk"
original = "俺は駆け出して行ったチナを追いかける。"
translation = "나는 달려 나간 치나를 뒤쫓는다."

[[dialogue]]
speaker = "unk"
original = "何度も道を折れたその先に──彼女はうずくまっていた。"
translation = "몇 번이나 길을 꺾은 그 끝에── 그녀는 웅크리고 있었다."

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「うぅぅっ……くぅっ……！\u3000なんでだよ……なんで、こんな……」"
translation = "「으으윽…… 큭……! 왜냐고…… 왜, 이런……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……チナ」"
translation = "「……치나.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「会いたくなかった……会ったら、絶対にアルタイルを滅ぼせなくなるって……アタシ……」"
translation = "「만나고 싶지 않았어…… 만나면, 절대로 알타이르를 멸망시킬 수 없게 될 거라고…… 나……」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「魔王、聞いたかよ……母さんのお腹に……子供が、いるって……」"
translation = "「마왕, 들었어? 엄마 배 속에…… 아이가, 있다는 거……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「…………ああ」"
translation = "「…………그래.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「──アタシが１０年前に亡くしたのは、両親だけじゃ、なかったんだ……」"
translation = "「──내가 10년 전에 잃은 건, 부모님뿐만이 아니었던 거야……」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ニュクス流星群なんて起きなかったら、きっと……デネブでも、同じ事が起きてた……」"
translation = "「닉스 유성우 같은 게 일어나지 않았다면, 분명…… 데네브에서도 똑같은 일이 일어났겠지……」"

[[dialogue]]
speaker = "unk"
original = "弟か妹が産まれるはずだった。"
translation = "남동생이나 여동생이 태어났을 것이다."

[[dialogue]]
speaker = "unk"
original = "起きるはずだったその祝い事も、デネブでは消えてしまって、もう戻らない。"
translation = "일어났어야 할 그 축복도, 데네브에서는 사라져 버려서 이제 돌아오지 않는다."

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「………………無理だ」"
translation = "「………………무리야.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「無理だよ、ルヴィ……アルタイルを滅ぼすだなんて、アタシにはもう、できない……」"
translation = "「무리라고, 루비…… 알타이르를 멸망시킨다니, 나한테는 이제 못 해……」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「全部、守りたい……父さんも、母さんも……アタシのきょうだいもっ……」"
translation = "「전부, 지키고 싶어…… 아빠도, 엄마도…… 내 형제도……」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「デネブも、アルタイルも……全員が生き残る道を、知りたい……！！」"
translation = "「데네브도, 알타이르도…… 전원이 살아남는 길을 알고 싶어……!!」"

[[dialogue]]
speaker = "unk"
original = "俺は彼女の肩を掴んで、まっすぐに見つめた。"
translation = "나는 그녀의 어깨를 잡고 똑바로 바라보았다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「探そう、俺たち全員で」"
translation = "「찾자, 우리 모두가 함께.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「……いい、のか？\u3000アタシは……ずっとデネブとアルタイルを、天秤にかけて……故郷のためならお前らとも戦うって、言い続けてたんだぞ……？」"
translation = "「……괜찮은, 거야? 나는…… 계속 데네브와 알타이르를 저울질하며…… 고향을 위해서라면 너희와도 싸우겠다고 계속 말해왔단 말이야……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「虫がいいって？\u3000それの何が問題なんだ。俺たちだってチナに、虫のいいことばかり言っている」"
translation = "「이기적이라고? 그게 뭐가 문제야. 우리도 치나에게 이기적인 말만 하고 있잖아.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「だけどチナはちゃんと聞く耳を持ってくれた。交渉の余地はあるって歩み寄ってくれた……天界襲撃の時だって、助太刀してくれたじゃないか」"
translation = "「하지만 치나는 제대로 귀를 기울여 줬어. 협상의 여지는 있다고 다가와 줬고…… 천계 습격 때도 도와줬잖아.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「全員が生き残る道を掴む──全部を都合よく解決できたら最高だ。力を合わせれば、可能性は開ける……！」"
translation = "「전원이 살아남는 길을 잡는 거야── 전부를 좋게 해결할 수 있다면 최고지. 힘을 합치면 가능성은 열려……!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ハッピーエンドを掴み取るんだ、俺たちの手で！」"
translation = "「해피 엔딩을 쟁취하는 거야, 우리 손으로!」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「……今まで、魔王は理想論ばかり言うって、思ってた」"
translation = "「……지금까지 마왕은 이상론만 말한다고 생각했어.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「欲張って全部を取ろうとすれば、きっと何かを取りこぼす。本当に手に入れられるものはちょっぴりなのに、夢ばっかり見やがって、って……」"
translation = "「욕심부려 전부를 가지려 하면 분명 뭔가를 놓치게 돼. 정말로 손에 넣을 수 있는 건 아주 조금뿐인데 꿈만 꾸고 있다고……」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「……１０年前のことが、あったから。あの時デネブは、全部を守ろうとして、全部失ったから……」"
translation = "「……10년 전의 일이 있었으니까. 그때 데네브는 전부를 지키려다 전부 잃었으니까……」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「だから大切なものの中から、選ぶべきだって。切り捨てなきゃって、欲張っちゃダメだって、ずっと思ってたんだ……」"
translation = "「그러니까 소중한 것 중에서 선택해야 한다고. 잘라내야 한다고, 욕심부리면 안 된다고 계속 생각했었어……」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「…………だけどアタシには、無理だ。ぜんぶ……ぜんぶ大切なんだ……これ以上、何も失いたくないんだ……」"
translation = "「…………하지만 나한테는 무리야. 전부…… 전부 소중해…… 더 이상 아무것도 잃고 싶지 않아……」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「……頼む。アタシは大切なものを、すべて守りたい！」"
translation = "「……부탁이야. 나는 소중한 것들을 모두 지키고 싶어!」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「だから──力を貸してくれ、魔王……！！」"
translation = "「그러니까── 힘을 빌려줘, 마왕……!!」"

[[dialogue]]
speaker = "unk"
original = "その後、香堂夫妻と別れを告げて戻ってきたアナもまじえて、全員で肉まんを食べた。"
translation = "그 후, 코도 부부와 작별 인사를 나누고 돌아온 아나도 합류하여 전원이서 고기만두를 먹었다."

[[dialogue]]
speaker = "unk"
original = "ものを食べながら伝えるのも不謹慎かとも思ったけれど……このくらい砕けていた方が、今のチナには受け入れやすいと思った。"
translation = "음식을 먹으면서 전하는 것도 불경하다고 생각했지만…… 이 정도로 격식 없는 편이 지금의 치나에게는 받아들이기 쉬울 것 같았다."

[[dialogue]]
speaker = "unk"
original = "俺とアナは、ジグの星眼のこと、ルヴィネに起きうる未来……そのすべてをチナに打ち明けた。"
translation = "나와 아나는 지그의 성안에 관한 것, 루비네에게 일어날 수 있는 미래…… 그 모든 것을 치나에게 털어놓았다."

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「……そういうことか。あいつら、ここ数日なーんか隠し事してると思ってたんだよ」"
translation = "「……그런 거였나. 이 녀석들, 요 며칠 왠~지 숨기는 게 있다고 생각했거든.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「わかるものなんですね。一応、口外しないようにお願いはしていましたが」"
translation = "「알아채시는군요. 일단 발설하지 않도록 부탁은 드렸습니다만.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「わかるよ。幼なじみなんだから……ベアトは無理に明るくふるまってるし、グレイスはいつもに増して落ち着きがないし」"
translation = "「알지. 소꿉친구니까…… 베아토는 억지로 밝게 행동하고 있고, 그레이스는 평소보다 더 침착하지 못하고.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「…………ルヴィが死ぬ未来、か。ごめんだな、そいつは」"
translation = "「…………루비가 죽는 미래, 인가. 미안하게 됐네, 그거.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「教えられたの、アタシが最後だったのは<ruby>癪<rt>しゃく</rt></ruby>だけど……いや、ありがとな魔王。気を遣ってくれて」"
translation = "「듣게 된 게 내가 마지막이라는 건 배가 아프지만…… 아니, 고마워 마왕. 신경 써줘서.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ルヴィが死ぬだなんていきなり聞かせられても……たぶん、なかなか信じられなかったと思う」"
translation = "「루비가 죽는다는 소리를 갑자기 들었어도…… 아마 쉽게 믿지 못했을 거야.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「アタシたち１人１人に、わざわざ時間を作って、向き合ってくれたんだろ？\u3000だから……ありがとな」"
translation = "「우리 한 명 한 명을 위해 일부러 시간을 내서 마주해 준 거지? 그러니까…… 고마워.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「──お前たちアルタイルの星騎士の想い、確かに受け取ったよ」"
translation = "「──너희 알타이르 성기사들의 마음, 확실히 받았어.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「デネブもアルタイルも両方救う……アタシはもう、迷わない！」"
translation = "「데네브도 알타이르도 양쪽 다 구한다…… 나는 이제 망설이지 않아!」"

