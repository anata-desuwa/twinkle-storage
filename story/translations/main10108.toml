[[dialogue]]
speaker = "unk"
original = "第８話,大いなる福,B"
translation = "제8화 커다란 복 B"

[[dialogue]]
speaker = "アナ"
original = "「この後は特に用事はないです。和菓子を買いに行くのが、最も大切な用件でしたから」"
translation = "「이다음에는 딱히 용건 없어요. 화과자를 사러 가는 게 가장 중요한 용건이었으니까요.」"

[[dialogue]]
speaker = "マトイ"
original = "「それならここで、大福、一緒に食べない？」"
translation = "「그럼 여기서 찹쌀떡 같이 먹지 않을래?」"

[[dialogue]]
speaker = "アナ"
original = "「それは……一刻も早く食べたいですが……！\u3000星徒会役員が、買い食いをしてもいいのでしょうか……？」"
translation = "「그건…… 한시라도 빨리 먹고 싶지만……! 성도회 임원이 길거리 음식을 먹어도 되는 걸까요……?」"

[[dialogue]]
speaker = "マトイ"
original = "「お行儀悪いけど、２人だけの秘密ってことで、ね」"
translation = "「예의에 어긋나지만, 둘만의 비밀로 하자, 응?」"

[[dialogue]]
speaker = "アナ"
original = "「そうですね。絶対に秘密です、ふふ。いけないことをするのはドキドキします」"
translation = "「그러게요. 절대 비밀이에요, 후후. 안 되는 짓을 하는 건 두근거리네요.」"

[[dialogue]]
speaker = "マトイ"
original = "「そこのベンチが空いてるかな。よいっしょ──」"
translation = "「저기 벤치가 비어 있네. 영차──」"

[[dialogue]]
speaker = "アナ"
original = "「待ってください、マトイ先輩」"
translation = "「기다려 주세요, 마토이 선배.」"

[[dialogue]]
speaker = "マトイ"
original = "「えっ、なに？」"
translation = "「엣, 왜?」"

[[dialogue]]
speaker = "アナ"
original = "「ヤマトシジミの幼虫がいます。お尻で潰したら大変ですよ」"
translation = "「물부추치레나비 유충이 있어요. 엉덩이로 깔아뭉개면 큰일이에요.」"

[[dialogue]]
speaker = "マトイ"
original = "「ヤマトシジミ……？\u3000ひゃっ、あ、青虫！？」"
translation = "「물부추치레나비……? 히익, 아, 애벌레!?」"

[[dialogue]]
speaker = "マトイ"
original = "「危なかったぁ。アナちゃんが止めてくれなかったら、お尻でプチっと押し虫を作っちゃうところだったよ」"
translation = "「위험했다아. 아나짱이 멈춰주지 않았으면 엉덩이로 툭 하고 벌레를 눌러버릴 뻔했어.」"

[[dialogue]]
speaker = "アナ"
original = "「ヤマトシジミは、春先に現れる蝶です。小さくて可愛いです」"
translation = "「물부추치레나비는 초봄에 나타나는 나비예요. 작고 귀여워요.」"

[[dialogue]]
speaker = "マトイ"
original = "「そうなんだ。アナちゃん、虫に詳しいんだね？」"
translation = "「그렇구나. 아나짱, 곤충에 대해 잘 아네?」"

[[dialogue]]
speaker = "アナ"
original = "「そうですね。虫や魚といった生き物は好きです。何を考えているかわからない虚ろな目がラブリーです」"
translation = "「그렇네요. 벌레나 물고기 같은 생물을 좋아해요. 무슨 생각을 하는지 알 수 없는 공허한 눈이 러블리해요.」"

[[dialogue]]
speaker = "マトイ"
original = "「そ、そう、なんだ？」"
translation = "「그, 그으래?」"

[[dialogue]]
speaker = "マトイ"
original = "（『かわいい』のツボは人それぞれだから、異議を唱えるのは野暮だよね）"
translation = "(『귀엽다』는 기준은 사람마다 다르니까, 이의를 제기하는 건 촌스러운 짓이겠지.)"

[[dialogue]]
speaker = "アナ"
original = "「避けて座りましょう」"
translation = "「피해서 앉죠.」"

[[dialogue]]
speaker = "マトイ"
original = "「うん。ここなら大丈夫だね。よいしょっと……」"
translation = "「응. 여기라면 괜찮겠네. 영차…….」"

[[dialogue]]
speaker = "マトイ"
original = "「それじゃ、いただきまーす。あむっ」"
translation = "「그럼, 잘 먹겠습니다. 냠.」"

[[dialogue]]
speaker = "アナ"
original = "「いただきます。あむっ」"
translation = "「잘 먹겠습니다. 냠.」"

[[dialogue]]
speaker = "マトイ＆アナ"
original = "「んーーーっ！\u3000美味しーーっ！！」"
translation = "「으음──! 맛있어──!!」"

[[dialogue]]
speaker = "アナ"
original = "「はぁぁ……デリシャスです……至福の時です……星徒会室で食べるお菓子ともまた違った味わいです」"
translation = "「하아아…… 델리셔스해요…… 지복의 시간이에요…… 성도회실에서 먹는 과자와는 또 다른 맛이네요.」"

[[dialogue]]
speaker = "マトイ"
original = "「こうやって外で食べるから、また美味しかったりするんだよね」"
translation = "「이렇게 밖에서 먹으니까 또 맛있는 거겠지.」"

[[dialogue]]
speaker = "アナ"
original = "「誘ってくださってありがとうございます、マトイ先輩。おかげで新たな発見ができました」"
translation = "「권해주셔서 감사합니다, 마토이 선배. 덕분에 새로운 발견을 할 수 있었어요.」"

[[dialogue]]
speaker = "マトイ"
original = "「どういたしまして。私がアナちゃんとお話したかっただけなんだけどね」"
translation = "「천만에. 내가 아나짱이랑 이야기하고 싶었을 뿐인걸.」"

[[dialogue]]
speaker = "アナ"
original = "「私とですか」"
translation = "「저랑요?」"

[[dialogue]]
speaker = "マトイ"
original = "「うん。アナちゃんと仲良くなりたいと思って」"
translation = "「응. 아나짱이랑 친해지고 싶어서.」"

[[dialogue]]
speaker = "アナ"
original = "「おお……私もマトイ先輩と仲良くなりたいです」"
translation = "「오오…… 저도 마토이 선배와 친해지고 싶어요.」"

[[dialogue]]
speaker = "マトイ"
original = "「アナちゃんはどうして星騎士になったの？」"
translation = "「아나짱은 왜 성기사가 된 거야?」"

[[dialogue]]
speaker = "アナ"
original = "「見聞を広げるためですね。まだ見たことのない世界を知りたいのです」"
translation = "「견문을 넓히기 위해서예요. 아직 보지 못한 세계를 알고 싶거든요.」"

[[dialogue]]
speaker = "マトイ"
original = "「アナちゃん、物知りで頭良いのに……」"
translation = "「아나짱은 아는 것도 많고 똑똑한데…….」"

[[dialogue]]
speaker = "アナ"
original = "「いえ。まだまだ知らないことだらけです。直に見る経験は何物にも代えがたい。こうして、口に入れなければ……」"
translation = "「아니요. 아직 모르는 것투성이예요. 직접 보는 경험은 무엇과도 바꿀 수 없죠. 이렇게 입에 넣지 않으면……」"

[[dialogue]]
speaker = "アナ"
original = "「むぐ、もぐ……和菓子の美味しさを知ることも、気付くこともなかったのですから」"
translation = "「우물, 우물…… 화과자의 맛을 알 수도, 깨달을 수도 없었을 테니까요.」"

[[dialogue]]
speaker = "アナ"
original = "「はあああ……しあわせです……」"
translation = "「하아아아…… 행복해요…….」"

[[dialogue]]
speaker = "アナ"
original = "「逆にお尋ねしますが、マトイ先輩は何故星騎士に？」"
translation = "「반대로 여쭙겠습니다만, 마토이 선배는 왜 성기사가?」"

[[dialogue]]
speaker = "マトイ"
original = "「私？\u3000私は……せっかく星力を持ってるんだったら、何かに活かせないかな、って……」"
translation = "「나? 나는…… 기왕 성력을 가지고 있다면 어디에 활용할 수 없을까 싶어서…….」"

[[dialogue]]
speaker = "マトイ"
original = "「まあでも、それほど強い意思があったわけでもなくて、お父さんとお母さんに勧められるまま附属校に入った感じ」"
translation = "「뭐 그래도 그렇게 강한 의지가 있었던 건 아니고, 엄마 아빠가 권해주시는 대로 부속 학교에 들어온 느낌이야.」"

[[dialogue]]
speaker = "マトイ"
original = "「でも、入ったからには頑張らなきゃ！\u3000って。クラスのみんなに置いて行かれないよう、鍛錬を重ねてきたの」"
translation = "「그래도 들어온 이상 열심히 해야지! 싶어서. 반 친구들에게 뒤처지지 않도록 단련을 거듭해왔어.」"

[[dialogue]]
speaker = "アナ"
original = "「おぉ……そうだったのですね」"
translation = "「오오…… 그랬던 거군요.」"

[[dialogue]]
speaker = "マトイ"
original = "「もちろん私の力で、そんな大層なことが出来るなんて考えたりしてないよ？」"
translation = "「물론 내 힘으로 그렇게 대단한 일을 할 수 있다고 생각하는 건 아니야?」"

[[dialogue]]
speaker = "マトイ"
original = "「誰よりも強くなってやるー！\u3000とか、私が救世主になる！\u3000とか、そういう大それた気持ちは無いんだ」"
translation = "「누구보다 강해지겠어! 라든가, 내가 구세주가 되겠어! 같은 거창한 마음은 없어.」"

[[dialogue]]
speaker = "マトイ"
original = "「ただ、家族とか、友達とか、目の前にいて、手が届く人くらいは守れるようになりたいって……」"
translation = "「그저 가족이나 친구처럼 눈앞에 있고 손이 닿는 사람 정도는 지킬 수 있게 되고 싶어서……」"

[[dialogue]]
speaker = "マトイ"
original = "「そんな感じの誰もが考えるような普通の気持ちで、ここまでやってきただけ。アナちゃんみたいに明確な理由はないんだ」"
translation = "「그런 느낌의 누구나 생각할 법한 평범한 마음으로 여기까지 왔을 뿐이야. 아나짱처럼 명확한 이유는 없어.」"

[[dialogue]]
speaker = "マトイ"
original = "「ごめんね、あまり面白くなくて」"
translation = "「미안해, 별로 재미없는 이야기라.」"

[[dialogue]]
speaker = "アナ"
original = "「とんでもないです。非常に興味深いお話でした」"
translation = "「천만에요. 매우 흥미로운 이야기였어요.」"

[[dialogue]]
speaker = "マトイ"
original = "「そう？」"
translation = "「그래?」"

[[dialogue]]
speaker = "アナ"
original = "「マトイ先輩は、大それた気持ちを抱かぬまま、今に至っている」"
translation = "「마토이 선배는 거창한 마음을 품지 않은 채 지금에 이르렀다.」"

[[dialogue]]
speaker = "マトイ"
original = "「うん。それは今もあんまり変わってないかな。会長たちについていくだけで精一杯で……」"
translation = "「응. 그건 지금도 별로 변하지 않았으려나. 회장님들을 따라가는 것만으로도 벅차서…….」"

[[dialogue]]
speaker = "アナ"
original = "「でしたら、それは偉業です」"
translation = "「그렇다면 그것은 위업이에요.」"

[[dialogue]]
speaker = "マトイ"
original = "「え？」"
translation = "「에?」"

[[dialogue]]
speaker = "アナ"
original = "「マトイ先輩は誰もが抱く普通の想いで、新星学園の生徒なら誰もが憧れる星徒会役員の座に昇り詰めたんです」"
translation = "「마토이 선배는 누구나 품는 평범한 마음으로, 신성학원 학생이라면 누구나 동경하는 성도회 임원 자리에 올라선 거예요.」"

[[dialogue]]
speaker = "アナ"
original = "「それこそがマトイ先輩の凄さです。誰にでもできることではありません」"
translation = "「그것이야말로 마토이 선배의 대단함이에요. 아무나 할 수 있는 일이 아닙니다.」"

[[dialogue]]
speaker = "マトイ"
original = "「たまたまだよ！\u3000たまたま運が良かっただけ！」"
translation = "「어쩌다 보니 그렇게 된 거야! 운이 좋았을 뿐이야!」"

[[dialogue]]
speaker = "アナ"
original = "「『幸運』は、誰もが羨む才能ではないでしょうか」"
translation = "「『행운』은 누구나 부러워할 재능 아닐까요.」"

[[dialogue]]
speaker = "アナ"
original = "「マトイ先輩には大いなる福が宿っているのですね。はむっ」"
translation = "「마토이 선배에게는 커다란 복이 깃들어 있네요. 냠.」"

[[dialogue]]
speaker = "マトイ"
original = "「そうだと嬉しいね。はむっ」"
translation = "「그렇다면 기쁘겠네. 냠.」"

[[dialogue]]
speaker = "アナ"
original = "「んもむ？\u3000なんれひょう？」"
translation = "「음무? 머레효?」"

[[dialogue]]
speaker = "マトイ"
original = "「アステラ発生のアラームらよ！\u3000もぐもぐごくん……場所は――」"
translation = "「아스테라 발생 알람이야! 우물우물 꿀꺽…… 장소는――」"

[[dialogue]]
speaker = "マトイ"
original = "「――すぐそこ！」"
translation = "「――바로 저기!」"

[[dialogue]]
speaker = "アナ"
original = "「行きまひょう、マトイ先輩。もぐもぐごっくん」"
translation = "「가효, 마토이 선배. 우물우물 꿀꺽.」"

[[dialogue]]
speaker = "アナ"
original = "「これが、アステラですか」"
translation = "「이것이 아스테라인가요.」"

[[dialogue]]
speaker = "マトイ"
original = "「アナちゃんは初めてだっけ」"
translation = "「아나짱은 처음이었나?」"

[[dialogue]]
speaker = "アナ"
original = "「はい、こうして実物を目にするのも初めてです。マトイ先輩は──」"
translation = "「네, 이렇게 실물을 눈으로 보는 것도 처음이에요. 마토이 선배는──」"

[[dialogue]]
speaker = "マトイ"
original = "「あはは、実は私もまだ２回目なんだよね。前回はヴィーナス会長とサーシャさんがいてくれたけど、今回は……」"
translation = "「아하하, 사실 나도 아직 두 번째거든. 저번에는 비너스 회장님이랑 사샤 씨가 있어 줬지만, 이번에는……」"

[[dialogue]]
speaker = "サーシャ"
original = "『マトイちゃ～ん、アステラ発生よ～』"
translation = "『마토이짱~ 아스테라 발생이야~』"

[[dialogue]]
speaker = "マトイ"
original = "「サーシャさん！\u3000アナちゃんも一緒です！」"
translation = "「사샤 씨! 아나짱도 같이 있어요!」"

[[dialogue]]
speaker = "サーシャ"
original = "『あらあら、２人は仲良しさんなのね、うふふ』"
translation = "『어머머, 둘은 사이가 좋네~ 우후후.』"

[[dialogue]]
speaker = "マトイ"
original = "「たまたま街中で会いまして……それはともかく」"
translation = "「우연히 거리에서 만나서…… 그건 그렇고.」"

[[dialogue]]
speaker = "マトイ"
original = "「これからアナちゃんと共に、アステラに対応しようとしていたところです」"
translation = "「지금부터 아나짱과 함께 아스테라에 대응하려던 참이었어요.」"

[[dialogue]]
speaker = "サーシャ"
original = "『まあ……！』"
translation = "『어머나……!』"

[[dialogue]]
speaker = "マトイ"
original = "「ですが、私たち２人で対応して、大丈夫でしょうか？\u3000私はまだ経験が浅く、アナちゃんも初めてで……」"
translation = "「하지만 저희 둘이서 대응해도 괜찮을까요? 저는 아직 경험이 부족하고, 아나짱도 처음이라서……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "『何言ってるの！！』"
translation = "『무슨 소리야!!』"

[[dialogue]]
speaker = "ヴィーナス"
original = "『マトイとアナなら――私が見込んだあなたたちなら絶対に大丈夫！\u3000胸を張りなさい！\u3000あなたたちは星騎士、しかも星徒会なのよ！』"
translation = "『마토이랑 아나라면―― 내가 눈여겨본 너희라면 절대 괜찮아! 가슴을 펴! 너희는 성기사, 게다가 성도회라고!』"

[[dialogue]]
speaker = "ヴィーナス"
original = "『今、それを食い止められるのは、あなたたちだけ！\u3000私たちも後から追いつくわ！』"
translation = "『지금 그걸 막을 수 있는 건 너희뿐이야! 우리도 금방 뒤따라갈게!』"

[[dialogue]]
speaker = "サーシャ"
original = "『ふふ、そうね～、２人なら大丈夫よ～』"
translation = "『후후, 그래~ 둘이라면 괜찮을 거야~』"

[[dialogue]]
speaker = "マトイ"
original = "（発生した無数のモンスターたちが、無関係な街の人たちに襲い掛かろうとしている）"
translation = "(발생한 무수한 몬스터들이 상관없는 거리 사람들을 덮치려 하고 있어.)"

[[dialogue]]
speaker = "マトイ"
original = "（恐れちゃだめ、私が戦って助けるしかないんだ）"
translation = "(두려워하면 안 돼, 내가 싸워서 구하는 수밖에 없어.)"

[[dialogue]]
speaker = "マトイ"
original = "（世界丸ごとは救えない私でも、自分の目の前にいる人くらいなら守れる。守ってみせる！）"
translation = "(세계 전체를 구할 수는 없는 나라도, 내 눈앞에 있는 사람 정도라면 지킬 수 있어. 지켜내 보이겠어!)"

[[dialogue]]
speaker = "マトイ"
original = "（私はそのために、星騎士になったんだから！）"
translation = "(나는 그러기 위해 성기사가 된 거니까!)"

[[dialogue]]
speaker = "マトイ"
original = "「ありがとうございます、ヴィーナス会長、サーシャさん。マトイ、アナの両名、対処に当たります！」"
translation = "「감사합니다, 비너스 회장님, 사샤 씨. 마토이, 아나 두 명, 대처에 임하겠습니다!」"

[[dialogue]]
speaker = "マトイ"
original = "「アナちゃん、ヴィーナス先輩とサーシャさんが現着するまでの辛抱。時間を稼ごうね」"
translation = "「아나짱, 비너스 선배랑 사샤 씨가 현장에 도착할 때까지 참아야 해. 시간을 벌자.」"

[[dialogue]]
speaker = "アナ"
original = "「ですが、私たち２人では」"
translation = "「하지만 저희 둘만으로는.」"

[[dialogue]]
speaker = "マトイ"
original = "「ノープロブレムだよ、アナちゃん」"
translation = "「노 프로블럼이야, 아나짱.」"

[[dialogue]]
speaker = "マトイ"
original = "「だって、私たち、大福を食べたばかりなんだから。だから、今の私たちには、大いなる福が宿っている。でしょ？」"
translation = "「왜냐면 우리, 방금 찹쌀떡을 먹었잖아. 그러니까 지금 우리에게는 커다란 복이 깃들어 있어. 그치?」"

[[dialogue]]
speaker = "アナ"
original = "「……！\u3000そうですね」"
translation = "「……! 그렇네요.」"

[[dialogue]]
speaker = "アナ"
original = "「ノープロブレムです。行きましょう、マトイ先輩」"
translation = "「노 프로블럼이에요. 가요, 마토이 선배.」"

