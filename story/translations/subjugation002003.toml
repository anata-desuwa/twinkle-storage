[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「もぐもぐもぐ……」"
translation = "「우물우물우물……」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「ど、どうでしょうか、ウズメイア先輩……」"
translation = "「어, 어떤가요, 우즈메이야 선배님……」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「──かっらぁ！？\u3000た、確かに２人が言ってるとおり……シャルレーヌちゃんのチョコ、めちゃくちゃ激辛だし！？」"
translation = "「──매워어!? 저, 정말 둘이 말한 대로…… 샤를레느짱의 초코, 엄청나게 매운데!?」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「妙ですね……お砂糖や生クリームなど、甘い物しか入れていないはずなのですけれど」"
translation = "「묘하네요…… 설탕이랑 생크림 같은 달콤한 것밖에 안 넣었을 텐데요」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「だよねえ。お酒も入れてたけど、あくまで香りづけくらいの量じゃん？\u3000これ、ハバネロソースを１瓶ぶち込んだみたいな辛さだし！」"
translation = "「그러니까 말이야. 술도 넣었지만 어디까지나 향만 내는 정도였잖아? 이거 하바네로 소스를 한 병 다 쏟아부은 것 같은 매운맛이라구!」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「私たちが目を離した隙に、誰かがイタズラをしたのでしょうか……？」"
translation = "「저희가 눈을 뗀 사이에 누군가 장난을 친 걸까요……?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「いや、それは考えにくくない？\u3000あたしたち、チョコの前に付きっきりだったよね？」"
translation = "「아니, 그건 생각하기 어렵지 않아? 우리 초코 앞에서 계속 붙어있었잖아?」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「ですよね……原因がぜんぜんわからないです」"
translation = "「그렇죠…… 원인을 전혀 모르겠어요」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「んー。あたしもさっぱりだけど、とりあえず作り直してみよ？\u3000工程をチェックしながらやれば、原因がわかるかもだよ」"
translation = "「으음. 나도 전혀 모르겠지만 일단 다시 만들어 볼까? 공정을 체크하면서 하면 원인을 알 수 있을지도 몰라」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「そうですね。何事も検証です。やってみましょう」"
translation = "「그렇네요. 무엇이든 검증입니다. 해보죠」"

[[dialogue]]
speaker = "unk"
original = "そうして、シャルレーヌがチョコレートを作り直したのだが──"
translation = "그렇게 샤를레느가 초콜릿을 다시 만들었지만──"

[[dialogue]]
speaker = "unk"
original = "辛ぁあぁあぁあぁい！？"
translation = "매워어어어어어어어어워!?"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「な、なぜ……！？」"
translation = "「어, 어째서……!?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「世にも奇妙なチョコレート物語だし……！？\u3000え、マジでどこから辛い要素が生まれてるの！？」"
translation = "「기묘한 초콜릿 이야기라구……!? 에, 진짜 어디서 매운 요소가 생겨나는 거야!?」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「くっ……たかがチョコ作りごときで躓くだなんて……」"
translation = "「큭…… 고작 초코 만들기 따위에 발목을 잡히다니……」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「──ウズメイア先輩。このままでは悔しいです。完成するまでお付き合いいただいてもよろしいですか？」"
translation = "「──우즈메이야 선배님. 이대로는 분해요. 완성될 때까지 함께해 주시겠어요?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「ペアだもん、当然だし～！\u3000力を合わせてゴー♪」"
translation = "「페어잖아, 당연하지~! 힘을 합쳐서 고고♪」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「お酒を入れるアレンジをいったんやめてみました。レシピに忠実に作ったので今度こそ……」"
translation = "「술을 넣는 어레인지를 일단 그만둬 봤어요. 레시피에 충실하게 만들었으니 이번에야말로……」"

[[dialogue]]
speaker = "unk"
original = "ハバネローーー！？"
translation = "하바네로어어어어!? "

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「うわお、会長くん、火ぃ噴きそうだし……！」"
translation = "「우와오, 회장군 불을 뿜을 것 같다구……!」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「ど、どうしてっ……？」"
translation = "「어, 어째서……?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「レシピそのものに問題があるのかも！\u3000あたしがさっき作ったブラウニーを、シャルレーヌちゃんが作ってみたよ！」"
translation = "「레시피 자체에 문제가 있는 걸지도! 내가 아까 만든 브라우니를 샤를레느짱이 만들어 봤어!」"

[[dialogue]]
speaker = "unk"
original = "もう舌がひりひりして限界れす……"
translation = "이제 혀가 얼얼해서 한계예여……"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あれあれ？\u3000会長さん、せっかくの試食なのに食べないのです？\u3000じゃあルリエルが貰っちゃうのです！\u3000もぐもぐもぐっ──♪」"
translation = "「어라어라? 회장님, 모처럼의 시식인데 안 드시는 건가욧? 그럼 루리에르가 먹어버릴 거구욧! 우물우물우물──♪」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「あ、それは──」"
translation = "「아, 그건──」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ひょぇーっ！？！？\u3000辛い辛い辛い～っ！\u3000激辛なのです～っ！？」"
translation = "「히에에에!? 매워 매워 매워어~! 엄청 매운 것이에욧~!?」"

[[dialogue]]
speaker = "unk"
original = "そうして何度目かの試行錯誤の末──"
translation = "그렇게 몇 번의 시행착오 끝에──"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「原因がわかったかもしれません。会長さん、このチョコレートを食べてみてください」"
translation = "「원인을 알아냈을지도 몰라요. 회장님, 이 초콜릿을 드셔보세요」"

[[dialogue]]
speaker = "unk"
original = "……あ、これはちゃんと甘い？"
translation = "……아, 이건 제대로 달콤해?"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「……やっぱり、そういうことでしたか」"
translation = "「……역시 그런 거였군요」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「さっき会長くんが食べたチョコは、仕上げの星力チャージをしてないパターンだし……」"
translation = "「방금 회장군이 먹은 초코는 마무리에 성력 차지를 안 한 버전이라구……」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「流星学園のバレンタインは、大聖堂のイベントで配ることは知ってるよね？」"
translation = "「유성학원의 발렌타인은 대성당 이벤트에서 나눠주는 거 알고 있지?」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「星騎士の作るチョコということで、おまじないみたいな意味合いで、星力を込める作業が仕上げにあるんですが……」"
translation = "「성기사가 만드는 초코니까 주문 같은 의미로 성력을 담는 작업이 마무리에 있는데……」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「うん。その最後の工程だけカットしてみた感じ」"
translation = "「응. 그 마지막 공정만 빼 본 느낌」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「バレンタインフォームって人工戦闘服だから、まだ動作が不安定なのかな～って思って試してみたんだけど、正解だったみたい！」"
translation = "「발렌타인 폼은 인공 전투복이니까 아직 동작이 불안정한 걸까~ 싶어서 테스트해 본 건데 정답이었던 것 같아!」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「レシピではなく、問題は私の星力にあったみたいですね……」"
translation = "「레시피가 아니라 문제는 제 성력에 있었던 모양이네요……」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「ウズメイア先輩はちゃんと新衣装をコントロールできているのに、お恥ずかしい限りです」"
translation = "「우즈메이야 선배님은 새 의상을 제대로 컨트롤하고 계시는데, 부끄러울 따름입니다」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「大丈夫！\u3000まだ初日だもん。せっかくのペアなんだし、力を合わせて本番までに激甘チョコ、作れるように特訓だし♪」"
translation = "「괜찮아! 아직 첫날이잖아. 모처럼의 페어니까 힘을 합쳐서 본방까지 아주 달콤한 초코를 만들 수 있게 특훈하자구♪」"

[[dialogue]]
speaker = "unk"
original = "俺も最後まで練習に付き合うよ"
translation = "나도 끝까지 연습을 도와줄게"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「お２人とも……ありがとうございます。私も一刻も早く、バレンタインフォームを手懐けられるよう努力しますね」"
translation = "「두 분 다…… 감사합니다. 저도 하루빨리 발렌타인 폼을 길들일 수 있도록 노력할게요」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「ところで、ひどい味のものを何度も食べさせてしまった無礼をお詫びしなくては、ですよね♪」"
translation = "「그건 그렇고, 지독한 맛을 몇 번이나 먹게 해버린 무례를 사과드려야겠죠?♪」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「会長さん、こちらの甘～いトリュフチョコでお口直ししてください。はい……あ～ん<emoji=heart04>」"
translation = "「회장님, 이 달콤~한 트러플 초코로 입가심하세요. 자…… 아~앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「あっ、何それ面白そ～♪\u3000作り置きはいっぱいあるし！\u3000会長くん、あたしのブラウニーももっと食べて！\u3000あ～ん♪」"
translation = "「앗, 그거 재밌어 보인다구~♪ 만들어 둔 건 잔뜩 있으니까! 회장군, 내 브라우니도 더 먹어! 아~앙♪」"

[[dialogue]]
speaker = "unk"
original = "もがもが……！？"
translation = "우걱우걱……!?"

[[dialogue]]
speaker = "unk"
original = "初日からトラブルが発生してしまった流星学園のバレンタインだったが、シャルレーヌのチョコが激辛になってしまう原因は判明した。"
translation = "첫날부터 트러블이 발생해 버린 유성학원의 발렌타인이었지만, 샤를레느의 초코가 매워지는 원인은 판명되었다."

[[dialogue]]
speaker = "unk"
original = "バレンタインデーまであと数日だけれど、できるかぎり彼女たちのところへ顔を出そうと思うのだった──"
translation = "발렌타인데이까지 며칠 안 남았지만, 가능한 한 그녀들이 있는 곳에 얼굴을 비추기로 했다──"

[[dialogue]]
speaker = "unk"
original = "──それから数時間後。"
translation = "──그로부터 몇 시간 후."

[[dialogue]]
speaker = "unk"
original = "生徒たちが帰宅して静まり返るカフェテリアに、蠢く影がひとつ……"
translation = "학생들이 귀가하고 조용해진 카페테리아에 꿈틀거리는 그림자 하나……"

[[dialogue]]
speaker_original = "フワッチ"
speaker_translation = "후왓치"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "こそこそと忍び込んだフワッチは、流星学園生が作り置きした星力入りのチョコレートの前で目を輝かせた。"
translation = "살금살금 잠입한 후왓치는 유성학원생이 미리 만들어 둔 성력이 담긴 초콜릿 앞에서 눈을 반짝였다."

[[dialogue]]
speaker_original = "フワッチ"
speaker_translation = "후왓치"
original = "「イ～～～～～っ♪」"
translation = "「이~~~~~♪」"

