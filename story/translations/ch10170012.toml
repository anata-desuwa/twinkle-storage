[[dialogue]]
speaker = "unk"
original = "第２話,友達１００人計画・前編,P"
translation = "제2화, 친구 100명 계획·전편, P"

[[dialogue]]
speaker = "unk"
original = "蛍火と友達になった数日後。星徒会室でサーシャ先輩と事務仕事をしていると、蛍火がやって来た。"
translation = "호타루비와 친구가 된 며칠 후. 성도회실에서 사샤 선배와 사무 일을 하고 있자니, 호타루비가 찾아왔다."

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「お忙しいところ、失礼致します」"
translation = "「바쁘신 와중에, 실례하겠습니다.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あら、いらっしゃい、蛍火ちゃん。今日はどうしたの？」"
translation = "「어라, 어서 오렴, 호타루비짱. 오늘은 웬일이니?」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「……東雲蛍火、本日は会長に大事なお願いがあって参りました」"
translation = "「……시노노메 호타루비, 오늘은 회장에게 중요한 부탁이 있어 왔습니다.」"

[[dialogue]]
speaker = "unk"
original = "言うや否や、蛍火はなんとその場で土下座した！"
translation = "말이 끝나기가 무섭게, 호타루비는 무려 그 자리에서 도게자를 했다!"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「蛍火ちゃん！？」"
translation = "「호타루비짱!?」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「どうか私を……会長の弟子にして下さい！」"
translation = "「부디 저를…… 회장의 제자로 삼아주세요!」"

[[dialogue]]
speaker = "unk"
original = "で……弟子ぃぃぃぃぃっ！？！？！？"
translation = "제…… 제자아아아아아앗!?!?!?"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「先日、会長は緊張モードの私を前にしても快く、友達になろうと握手を交わしてくれました。まるで呼吸をするように、ごく自然に」"
translation = "「지난번, 회장은 긴장 모드인 저를 앞두고도 쾌히, 친구가 되자며 악수를 나누어 주었습니다. 마치 숨을 쉬는 것처럼, 아주 자연스럽게.」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「私はそんな会長の姿に、とても感動したのです。これがいわゆる、『陽キャ』というやつなのかと……」"
translation = "「저는 그런 회장의 모습에, 무척 감동했습니다. 이것이 이른바, 『인싸』라는 것인가 하고……」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「私には１つ、叶えたい夢がありまして……」"
translation = "「저에게는 한 가지, 이루고 싶은 꿈이 있어서……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「それってもしかして、私にも相談してくれたアレかしら？」"
translation = "「그거 혹시, 나한테도 상담해줬던 그거니?」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「はい。名付けて『友達１００人計画』。……私は将来、友達を１００人作って自分の店に招き、パーティーを開くのが夢なのです」"
translation = "「네. 이름하여 『친구 100명 계획』. ……저는 장래에, 친구를 100명 만들어서 자신의 가게에 초대해, 파티를 여는 것이 꿈입니다.」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「しかし、恥ずかしながら現状、全く友達が作れていない有様でして。なのでどうか、会長には私の友達作りの師匠となって頂きたく……」"
translation = "「하지만, 부끄럽게도 현재, 전혀 친구를 만들지 못하고 있는 형편이라서요. 그러니 부디, 회장께서는 저의 친구 만들기 스승이 되어주셨으면 합니다……」"

[[dialogue]]
speaker = "unk"
original = "陽キャかどうかは微妙だけど……"
translation = "인싸인지는 미묘하지만……"

[[dialogue]]
speaker = "unk"
original = "そういうことなら協力するよ。"
translation = "그런 일이라면 협력할게."

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「即決！？\u3000し、師匠……っ！」"
translation = "「즉결!? 스, 스승님……!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふふっ、安心してリラックスモードになったわね、蛍火ちゃん。もちろん私も協力するわよ～」"
translation = "「후훗, 안심해서 릴랙스 모드가 되었구나, 호타루비짱. 물론 나도 협력할게~」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「サーシャ先輩も、ありがとうございます……。改めまして、これからよろしくお願いいたしますね、師匠っ」"
translation = "「사샤 선배도, 감사합니다……. 다시 한번, 앞으로 잘 부탁드립니다, 스승님.」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「そうしたらまずは、２人目の友達探しからですね……」"
translation = "「그렇다면 우선은, 두 번째 친구 찾기부터군요……」"

[[dialogue]]
speaker = "unk"
original = "サーシャさんも居るから３人目じゃない？"
translation = "사샤 씨도 있으니까 세 번째 아니야?"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「は？\u3000……何を言っているのですか、師匠」"
translation = "「하? ……무슨 말씀을 하시는 겁니까, 스승님.」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「サーシャ先輩が私と友達なわけないでしょう……。ふざけているのですか？」"
translation = "「사샤 선배가 저와 친구일 리가 없지 않습니까……. 장난치시는 겁니까?」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「──そのような畏れ多いこと、私が考えるとでも？」"
translation = "「──그런 황송한 일을, 제가 생각할 거라고?」"

[[dialogue]]
speaker = "unk"
original = "嘘でしょ！？\u3000そんなことある！？"
translation = "거짓말이지!? 그런 일이 있어!?"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「そ、そんな！\u3000私、蛍火ちゃんにそんな風に思われてたなんて……」"
translation = "「그, 그럴 수가! 나, 호타루비짱에게 그런 식으로 생각되고 있었다니……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「しくしく。私、会長くんに蛍火ちゃんの友達第１号を、ＮＴＲされてしまったのね……しくしくしく」"
translation = "「흑흑. 나, 회장군에게 호타루비짱의 친구 제1호를, NTR 당해버린 거네…… 흑흑흑.」"

[[dialogue]]
speaker = "unk"
original = "サーシャさんはわかってやってますよね！？"
translation = "사샤 씨는 알고 그러시는 거죠!?"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「……てへぺろ♪」"
translation = "「……데헤페로♪」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「──まあ、それは冗談として。……蛍火ちゃんは、私と友達になるのは嫌？」"
translation = "「──뭐, 그건 농담이고. ……호타루비짱은, 나랑 친구가 되는 건 싫으니?」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「断じてそんなことは……。ただ私は、サーシャ先輩が星徒会長であった時から、サーシャ先輩みたいな女性になりたいと、ずっと憧れておりましたので……」"
translation = "「결코 그런 것은……. 다만 저는, 사샤 선배가 성도회장이었을 때부터, 사샤 선배 같은 여성이 되고 싶다고, 계속 동경해 왔기에……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ありがとう。そんな風に思って貰えて、嬉しいわ。……でもね、私は蛍火ちゃんともっと近い関係になれたらなって、ずっと思ってたの」"
translation = "「고마워. 그렇게 생각해주니 기쁘네. ……하지만 말이야, 나는 호타루비짱이랑 좀 더 가까운 관계가 되었으면 좋겠다고, 계속 생각했었어.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「だから、蛍火ちゃんが嫌じゃなければ、今日から私とも、お友達になってくれないかしら。会長くんが蛍火ちゃんの師匠であると同時に、友達であるみたいに」"
translation = "「그러니까, 호타루비짱이 싫지 않다면, 오늘부터 나랑도, 친구가 되어주지 않겠니. 회장군이 호타루비짱의 스승인 동시에, 친구인 것처럼 말이야.」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「尊敬する先輩であると同時に、友達でもある、ということですか……？」"
translation = "「존경하는 선배인 동시에, 친구이기도 하다는, 말씀이십니까……?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「そう。ダメかしら……？」"
translation = "「응. 안 될까……?」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「いいえ……いいえっ。サーシャ先輩がそう言って下さるなら、私もサーシャ先輩と、友達になりたいですっ」"
translation = "「아니요…… 아니요옷. 사샤 선배가 그렇게 말씀해 주신다면, 저도 사샤 선배와, 친구가 되고 싶습니다앗.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ありがとう、蛍火ちゃん。そうしたら……改めてしましょうか、友達の握手♪」"
translation = "「고마워, 호타루비짱. 그렇다면…… 다시 할까, 친구의 악수♪」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「はいっ、サーシャ先輩っ」"
translation = "「네, 사샤 선배님.」"

[[dialogue]]
speaker = "unk"
original = "サーシャが手を差し出し、それを蛍火が握る。２人は照れくさそうに笑った。"
translation = "사샤가 손을 내밀고, 그것을 호타루비가 잡는다. 두 사람은 쑥스러운 듯 웃었다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふふっ。本当は私ね、蛍火ちゃんに友達になろうって言って、断られたらどうしようかなって、ちょっと不安だったの。だから、自分からはなかなか言えなくて……」"
translation = "「후훗. 사실 나 말이야, 호타루비짱에게 친구가 되자고 했다가, 거절당하면 어쩌나 하고, 조금 불안했었어. 그래서, 나로서는 좀처럼 말을 꺼내지 못해서……」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「私も、です。本当は友達になれたらって、ずっと思ってました。……でも、怖かったんです」"
translation = "「저도, 입니다. 사실은 친구가 될 수 있다면 하고, 계속 생각했습니다. ……하지만, 무서웠습니다.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あら、気が合うわね。ふふっ……」"
translation = "「어머, 마음이 통했네. 후훗……」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「ふふふっ」"
translation = "「후후훗.」"

[[dialogue]]
speaker = "unk"
original = "サーシャさんと友達になれて、よかった"
translation = "사샤 씨와 친구가 될 수 있어서 다행이야."

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「はいっ。ありがとうございます、師匠」"
translation = "「네. 감사합니다, 스승님.」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「師匠がきっかけをくれたおかげで、サーシャ先輩と友達になることが出来ました。これからもご指導ご鞭撻のほど、よろしくお願い致します」"
translation = "「스승님이 계기를 마련해 주신 덕분에, 사샤 선배와 친구가 될 수 있었습니다. 앞으로도 지도 편달 부탁드립니다.」"

[[dialogue]]
speaker = "unk"
original = "蛍火は今週末の放課後、予定空けられる？"
translation = "호타루비는 이번 주말 방과 후, 일정 비울 수 있어?"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「放課後、ですか？\u3000ええ、大丈夫だと思いますが……一体？」"
translation = "「방과 후, 말입니까? 네, 괜찮을 것 같습니다만…… 대체?」"

[[dialogue]]
speaker_original = "蛍火"
speaker_translation = "호타루비"
original = "「えっ、師匠と街にお出掛け、ですか……！？」"
translation = "「엣, 스승님과 거리로 외출, 말입니까……!?」"

[[dialogue]]
speaker = "unk"
original = "蛍火の友達１００人計画は、こうして始動するのだった。"
translation = "호타루비의 친구 100명 계획은, 이렇게 시동을 거는 것이었다."

