[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「ウルスラ・バレンタインさまと仰るのですね？\u3000苗字がバレンタインなんて奇遇ですっ！」"
translation = "「우르술라 발렌타인 님이라고 하시는군요? 성이 발렌타인이라니 기막힌 우연이에요!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「いえ、お見かけしたところ天使の方のようですし……<ruby>人間界<rt>こちら</rt></ruby>に来てからバレンタインという姓にされた──のですよね？」"
translation = "「아니, 겉보기엔 천사분이신 것 같고…… 인간계에 오고 나서 발렌타인이라는 성으로 정하신── 거죠?」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「はい、その通りです。バレンタイン好きを拗らせまして」"
translation = "「네, 맞습니다. 발렌타인을 너무 좋아한 나머지 그만」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「己の想いをチョコレートに込め、決意を以て愛を伝えるその尊さ……初めて知った時は、まるで雷に打たれたような衝撃でした」"
translation = "「자신의 마음을 초콜릿에 담아, 결의를 가지고 사랑을 전하는 그 고귀함…… 처음 알았을 때는 마치 번개를 맞은 듯한 충격이었죠」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「私はバレンタインデーを愛しています。バレンタインデーとひとつになりたいと思うほどに。ですので僭越ながら、人間界での名前に使わせていただきました」"
translation = "「저는 발렌타인 데이를 사랑합니다. 발렌타인 데이와 하나가 되고 싶다고 생각할 정도로요. 그래서 주제넘게도 인간계에서의 이름으로 사용하게 되었습니다」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「それで『バレンタイン』を直接自分の名前にするとは……なるほど、筋金入りの拗らせ具合なのですね……」"
translation = "「그래서 『발렌타인』을 직접 자기 이름으로 쓰다니…… 과연, 뼛속까지 중증이시군요……」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「はい、筋金入りです♪」"
translation = "「네, 뼛속까지요♪」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「バレンタインを愛する者として、チョコレートを使ったお菓子には自信があります。よろしければお手伝いさせてください」"
translation = "「발렌타인을 사랑하는 사람으로서, 초콜릿을 사용한 과자에는 자신이 있습니다. 괜찮으시다면 도와드리게 해주세요」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「猫の手も借りたかったところなので、心強いですっ。ウルスラさま、よろしかったらご教授願えますか」"
translation = "「고양이 손이라도 빌리고 싶던 참이라 든든해요. 우르술라 님, 괜찮으시다면 가르침을 주시겠어요?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「正直なところ、私たちは高い製菓技術を持っているわけではありません」"
translation = "「솔직히 말해서, 저희는 높은 제과 기술을 가지고 있는 건 아니에요」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「そんな私たちでも失敗がなく、たくさん数を作れて、そして美味しいお菓子があればよいのですが……」"
translation = "「그런 저희라도 실패가 없고, 많이 만들 수 있으면서 맛있는 과자가 있으면 좋겠는데……」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「ふむふむ……となると……お任せください。でしたら、一緒に作りましょう」"
translation = "「흠흠…… 그렇다면…… 맡겨주세요. 그럼, 함께 만들어요」"

[[dialogue]]
speaker = "unk"
original = "翌日──"
translation = "다음 날──"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「はい、焼きあがりました♪\u3000ハートの模様のアイスボックスクッキーです<emoji=heart04>」"
translation = "「네, 다 구워졌습니다♪ 하트 무늬 아이스박스 쿠키예요<emoji=heart04>」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「ナッツとチョコチップを入れて、見た目と食感にも彩りを加えてみました」"
translation = "「견과류와 초코칩을 넣어서, 겉모양과 식감에도 다채로움을 더해봤어요」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「おお、とても美味しそうですね……！」"
translation = "「오오, 정말 맛있어 보이네요……!」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「皆さんで試食と参りましょう。よろしければ、会長さんもどうぞ」"
translation = "「다 같이 시식해 보죠. 괜찮으시다면 회장님도 드셔보세요」"

[[dialogue]]
speaker = "unk"
original = "いただきます"
translation = "잘 먹겠습니다"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「いただきまーす、あむっ」"
translation = "「잘 먹겠습니다, 냠」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「いただきますね……んむ……んっ……！\u3000これは……！」"
translation = "「잘 먹을게…… 음…… 응……! 이건……!」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「はぁうぅぅ……バターの香ばしさとチョコの風味が合わさって、とても美味しいですっ！」"
translation = "「하아우우…… 버터의 고소함과 초코 풍미가 어우러져서 정말 맛있어요!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ナッツの食感も小気味良いですね。売っているものと比べても遜色ない……いえ、それ以上の味かもしれません」"
translation = "「견과류 식감도 경쾌하고 좋네요. 파는 것과 비교해도 손색없어…… 아니, 그 이상의 맛일지도 몰라요」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「ありがとうございます<emoji=heart04>\u3000実は私のお菓子作りの師は、スイーツ作りで名高いサランさんでして」"
translation = "「감사합니다<emoji=heart04> 사실 제 과자 만들기 스승님은 디저트 만들기로 유명한 사란 씨거든요」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「サランさまのお墨付きですか！\u3000どうりで美味しいわけです！」"
translation = "「사란 님의 보증인가요! 어쩐지 맛있다 했어요!」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「どうです？\u3000会長さんのお口には合いました？」"
translation = "「어때요? 회장님 입맛에는 맞으셨나요?」"

[[dialogue]]
speaker = "unk"
original = "星３つです！"
translation = "별 세 개입니다!"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「お気に召したようで良かったです<emoji=heart04>\u3000よろしければ、たくさん召し上がってくださいね<emoji=heart04>」"
translation = "「마음에 드신 것 같아 다행이에요<emoji=heart04> 괜찮으시다면 많이 드셔주세요<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「む……」"
translation = "「무……」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「アイスボックスクッキーなら、生地を作っておけば後は切って焼くだけです。これなら数を作るのにも向くかと」"
translation = "「아이스박스 쿠키라면 반죽을 만들어 두면 나중엔 잘라서 굽기만 하면 돼요. 이거라면 많이 만드는 데도 적합할 거예요」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「いいアイデアをもらっちゃいましたねっ。ありがとうございます、ウルスラさまっ」"
translation = "「좋은 아이디어를 얻었네요. 감사합니다, 우르술라 님」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「いえいえ、バレンタインの波動の強まりは、私も望むところですので」"
translation = "「아니에요, 발렌타인 파동이 강해지는 건 저도 바라는 바니까요」"

[[dialogue]]
speaker = "unk"
original = "あ、ごめん。星徒会の用事で行かなきゃ"
translation = "아, 미안. 성도회 일 때문에 가봐야겠어"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「はい、行ってらっしゃいませ！」"
translation = "「네, 다녀오세요!」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「行ってしまわれましたね……星徒会長だけあって、お忙しい方です」"
translation = "「가버리셨네요…… 학생회장인 만큼 바쁜 분이시군요」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「ですが、ガールズトークにはちょうどいいですね」"
translation = "「하지만 걸즈 토크를 하기엔 딱 좋네요」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「おふたりは随分と会長さんと親しいように感じられましたが……バレンタインチョコをお渡しになるつもりですか？」"
translation = "「두 분은 상당히 회장님과 친하신 것처럼 느껴졌는데…… 발렌타인 초코를 주실 생각인가요?」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「はい、日頃の感謝と真心を込めて、手作りチョコをお贈りするつもりです」"
translation = "「네, 평소의 감사와 진심을 담아 수제 초코를 드릴 생각이에요」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「まあ<emoji=heart04>\u3000大変素晴らしいことだと思います」"
translation = "「어머나<emoji=heart04> 정말 멋진 일이라고 생각해요」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「義理チョコ、友チョコという文化も、立派なバレンタインの彩りですからね。イレーナさんも？」"
translation = "「의리 초코, 우정 초코라는 문화도 훌륭한 발렌타인의 묘미니까요. 이레이나 씨도요?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「いいえ、私は神に仕える神官ですので。特定の男性に贈り物をすることはありません」"
translation = "「아뇨, 저는 신을 모시는 신관이니까요. 특정 남성에게 선물을 하는 일은 없어요」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「まあまあ、そうですか」"
translation = "「어머 어머, 그런가요」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「では私が会長さんにバレンタインのチョコをお渡ししても、問題ありませんよね？」"
translation = "「그럼 제가 회장님께 발렌타인 초코를 드려도 문제없겠네요?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「──！？」"
translation = "「──!?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「え、ええ、もちろん……問題ありませんよ」"
translation = "「에, 에에, 물론…… 문제없죠」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「そうですかそうですか……ふふふ<emoji=heart04>」"
translation = "「그렇군요 그렇군요…… 후후후<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「何か含みのある笑みに感じられますけど……」"
translation = "「뭔가 의미심장한 미소처럼 느껴지는데……」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「いいえ、なんでもありませんよ」"
translation = "「아니요, 아무것도 아니에요」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「でもそう感じられたなら、それはイレーナさん自身、思い当たる節があるのでは……なーんて<emoji=heart04>」"
translation = "「하지만 그렇게 느껴지셨다면, 그건 이레이나 씨 스스로 짚이는 구석이 있는 게 아닐까요…… 농담이에요<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "（う……こいつ、なんか苦手だわ……）"
translation = "(으…… 이 녀석, 왠지 거북하네……)"

[[dialogue]]
speaker = "unk"
original = "人の心を見透かすようなウルスラの瞳は、イレーナを捉えて離さないのだった。"
translation = "사람의 마음을 꿰뚫어 보는 듯한 우르술라의 눈동자는, 이레이나를 포착해 놓아주지 않았다."

