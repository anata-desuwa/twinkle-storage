[[dialogue]]
speaker = "unk"
original = "ウェディングフォームが発現した２人には、いつも通り（？）俺の家で花嫁修業をしてもらうことになった。"
translation = "웨딩 폼이 발현된 두 사람과는 평소대로(?) 우리 집에서 신부 수업을 하게 되었다."

[[dialogue]]
speaker = "ジュエリー"
original = "「では私から花嫁修業をさせてもらおうかな」"
translation = "「그럼 나부터 신부 수업을 해볼까.」"

[[dialogue]]
speaker = "イレーナ"
original = "「ちなみにジュエリーさんはどのくらい家事の心得があるのですか？」"
translation = "「참고로 주얼리 씨는 어느 정도 가사 지식이 있나요?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ふふ、それはもちろん──」"
translation = "「후후, 그건 물론──」"

[[dialogue]]
speaker = "ジュエリー"
original = "「からきしだ」"
translation = "「전혀 없네.」"

[[dialogue]]
speaker = "イレーナ"
original = "「堂々と言うことではないと思いますが……」"
translation = "「당당하게 말씀하실 일은 아니라고 생각합니다만……」"

[[dialogue]]
speaker = "ジュエリー"
original = "「隠しても仕方がないことだからね。でもだからこそ、花嫁修業のし甲斐がある」"
translation = "「숨겨봤자 소용없는 일이니까. 하지만 그렇기에 신부 수업의 보람이 있지.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「さあ、我が助手よ。私が一人前の花嫁になれるよう導いてくれたまえ」"
translation = "「자, 나의 조수여. 내가 어엿한 신부가 될 수 있도록 인도해주게나.」"

[[dialogue]]
speaker = "unk"
original = "一緒に頑張ろう"
translation = "함께 힘내자."

[[dialogue]]
speaker = "unk"
original = "任せて"
translation = "맡겨줘."

[[dialogue]]
speaker = "ジュエリー"
original = "「それにしても、まさか以前の約束がこんな形で果たされることになるとはね」"
translation = "「그나저나, 설마 이전의 약속이 이런 형태로 이루어지게 될 줄이야.」"

[[dialogue]]
speaker = "イレーナ"
original = "「何か約束をされていたのですか？」"
translation = "「뭔가 약속을 하셨었나요?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ああ。私が料理に挑戦して失敗してしまった時、次は助手がいろいろ教えてくれると約束したのだよ」"
translation = "「아아. 내가 요리에 도전했다가 실패했을 때, 다음에는 조수가 여러 가지 가르쳐주기로 약속했었네.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「旦那様が花嫁に料理を教える、そんな家庭があってもいいだろう？」"
translation = "「남편이 신부에게 요리를 가르친다, 그런 가정이 있어도 좋지 않겠나?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「というわけで、まずお鍋を選ぶとしよう。どのお鍋を使うべきだろうか？\u3000私としてはあの大きな鍋が怪しいと思っているんだが」"
translation = "「그런 고로, 먼저 냄비를 고르기로 하지. 어떤 냄비를 써야 할까? 나로서는 저 큰 냄비가 수상하다고 생각하네만.」"

[[dialogue]]
speaker = "unk"
original = "その前に何を作るのかを決めないと"
translation = "그전에 뭘 만들지부터 정해야지."

[[dialogue]]
speaker = "ジュエリー"
original = "「おっと、そうだったね。ならばトマト料理がいいな。うん、そうしよう」"
translation = "「오옷, 그랬군. 그렇다면 토마토 요리가 좋겠어. 음, 그렇게 하지.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「何を隠そう私はトマト料理が好物だからね。苦手という人もいるが、あの若干の酸味を含んだ独特の味がたまらない」"
translation = "「실은 내가 토마토 요리를 좋아하거든. 서투른 사람도 있겠지만, 그 약간의 산미를 포함한 독특한 맛이 참을 수 없단 말이지.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「パスタのソースにしてもよし、パンに挟んでサンドイッチにしてもよし。もちろん生でがぶりといくのも良いね」"
translation = "「파스타 소스로 만들어도 좋고, 빵 사이에 끼워서 샌드위치를 만들어도 좋지. 물론 생으로 와작 베어 무는 것도 좋고 말이야.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「よし、決めた。イタリア出身のイレーナさんの前で僭越ではあるが、定番のトマトパスタにしよう」"
translation = "「좋아, 정했어. 이탈리아 출신인 이레이나 양 앞에서 외람되지만, 대중적인 토마토 파스타로 하지.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「そうと決まればトマトだ。我が助手よ、トマトを用意してくれたまえ」"
translation = "「그렇게 정했으면 토마토다. 나의 조수여, 토마토를 준비해주게나.」"

[[dialogue]]
speaker = "unk"
original = "冷蔵庫の野菜室からトマトを取り出すと、それをジュエリーに渡す。"
translation = "냉장고 채소 칸에서 토마토를 꺼내 주얼리에게 건넨다."

[[dialogue]]
speaker = "ジュエリー"
original = "「まずは切るところからだね。私の包丁さばきを見ていてくれ」"
translation = "「우선 써는 것부터로군. 나의 칼질을 지켜봐 주게.」"

[[dialogue]]
speaker = "unk"
original = "日傘を差したままで大丈夫？"
translation = "양산 쓴 채로 괜찮겠어?"

[[dialogue]]
speaker = "イレーナ"
original = "「そもそも、どうしてジュエリーさんは屋内なのに日傘を差しているのでしょう……？」"
translation = "「애초에 어째서 주얼리 씨는 실내인데도 양산을 쓰고 계신 거죠……?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ふふ、過去に苦い経験をしたことがあってね。それ以来、屋内であっても常に日傘を差すようにしているんだ」"
translation = "「후후, 과거에 쓴 경험을 한 적이 있어서 말이야. 그 이후로는 실내라 할지라도 항상 양산을 쓰도록 하고 있네.」"

[[dialogue]]
speaker = "unk"
original = "ジュエリーは日傘を差したまま、包丁を握って刃をトマトに押し当てた。"
translation = "주얼리는 양산을 쓴 채, 칼을 쥐고 칼날을 토마토에 갖다 댔다."

[[dialogue]]
speaker = "unk"
original = "ザシュッ！！！！！"
translation = "서걱!!!!!"

[[dialogue]]
speaker = "ジュエリー"
original = "「あ、指を切ってしまった」"
translation = "「아, 손가락을 베어버렸군.」"

[[dialogue]]
speaker = "unk"
original = "ちょっ……！？"
translation = "잠깐……!?"

[[dialogue]]
speaker = "イレーナ"
original = "「見せてください、治療します！」"
translation = "「보여주세요, 치료할게요!」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ありがとう。イレーナさんが居てくれるなら、何度指を切っても大丈夫そうだ」"
translation = "「고맙네. 이레이나 양이 있어 준다면 몇 번이나 손가락을 베어도 괜찮을 것 같군.」"

[[dialogue]]
speaker = "unk"
original = "野菜を切るのは俺がやろうか？"
translation = "채소 써는 건 내가 할까?"

[[dialogue]]
speaker = "ジュエリー"
original = "「しかしそれでは花嫁修業にならないのではないかな？」"
translation = "「하지만 그러면 신부 수업이 되지 않지 않겠나?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ふむ、良いことを思いついたよ。助手、私を後ろから抱きしめてくれ」"
translation = "「흠, 좋은 생각이 났네. 조수, 나를 뒤에서 껴안아주게.」"

[[dialogue]]
speaker = "unk"
original = "え……？"
translation = "에……?"

[[dialogue]]
speaker = "ジュエリー"
original = "「ふふ、何を勘違い……いや、期待したのかな？\u3000違うよ、我が助手」"
translation = "「후후, 뭘 착각…… 아니, 기대한 건가? 아니야, 나의 조수.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「後ろから抱きしめるようにして、一緒に包丁を握るんだ。助手と一緒なら包丁を扱うコツも掴めるというものだろう」"
translation = "「뒤에서 껴안는 식으로 해서, 함께 칼을 쥐는 걸세. 조수와 함께라면 칼을 다루는 요령도 잡을 수 있겠지.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「何を恥ずかしがっているんだい？\u3000私たちは夫婦なのだから、この程度で照れる必要はないだろう」"
translation = "「뭘 부끄러워하나? 우리는 부부니까, 이 정도로 수줍어할 필요는 없지 않나.」"

[[dialogue]]
speaker = "unk"
original = "夫として提案に乗り、ジュエリーの背中に身体を密着させる。"
translation = "남편으로서 제안을 받아들여, 주얼리의 등에 몸을 밀착시킨다."

[[dialogue]]
speaker = "unk"
original = "左手を重ねるようにしてトマトを、右手で包み込むようにして包丁を握る。"
translation = "왼손을 포개듯 토마토를, 오른손으로 감싸듯 칼을 쥔다."

[[dialogue]]
speaker = "unk"
original = "日傘は……ジュエリーとの身体の間に挟み込んで、何とかした。"
translation = "양산은…… 주얼리와의 몸 사이에 끼워 넣어 어떻게든 했다."

[[dialogue]]
speaker = "イレーナ"
original = "（なんか無茶苦茶なことになってるけど……花嫁修業ってこんな感じでいいのかしら？）"
translation = "(왠지 엉망진창인 상황이 됐지만…… 신부 수업이란 게 이런 느낌으로 괜찮은 걸까?)"

[[dialogue]]
speaker = "イレーナ"
original = "（でも……）"
translation = "(그래도……)"

[[dialogue]]
speaker = "ジュエリー"
original = "「だんだん包丁の扱い方が掴めてきたよ。私と助手の愛のパスタの完成はもう間近ということだね」"
translation = "「점점 칼을 다루는 법을 알 것 같군. 나와 조수의 사랑의 파스타 완성은 이제 머지않았다는 뜻이네.」"

[[dialogue]]
speaker = "unk"
original = "まだ野菜を切っただけだから"
translation = "아직 채소만 썰었을 뿐이니까."

[[dialogue]]
speaker = "ジュエリー"
original = "「おっと、そうだった。次はどうすればいいんだい？」"
translation = "「오옷, 그랬지. 다음은 어떻게 하면 되지?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ふむふむ……生トマトをソースに使う場合は、オリーブオイルで炒めてから、ふたをして少し煮込むと。それなら煮込んでいる間にパスタを茹でれば無駄がないね」"
translation = "「흠흠…… 생토마토를 소스에 쓸 경우에는 올리브유로 볶은 다음, 뚜껑을 덮고 조금 졸이면 된다고. 그럼 졸이는 동안 파스타를 삶으면 낭비가 없겠네.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「あっ、くすぐったいよ、助手。密着しているんだから、動いたら当たってしまうじゃないか」"
translation = "「앗, 간지러워, 조수. 밀착해 있으니까 움직이면 닿아버리잖나.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「そういうのは食事の後で……な？」"
translation = "「그런 건 식사 후에…… 응?」"

[[dialogue]]
speaker = "イレーナ"
original = "（いやちょっと、料理作るだけにしてはイチャイチャしすぎじゃない？）"
translation = "(아니 잠깐, 요리 만드는 것치고는 너무 꽁냥거리는 거 아냐?)"

[[dialogue]]
speaker = "ジュエリー"
original = "「あ……ソースができたようだ。味見してみてくれ。あ～ん」"
translation = "「아…… 소스가 다 된 모양이군. 맛 좀 봐주게. 아~앙.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「ふむふむ……もっと煮詰めた方が好み？\u3000ふむ、なるほど。それはいいことを聞いた」"
translation = "「흠흠…… 좀 더 졸인 편이 취향이라고? 흠, 과연. 좋은 정보를 들었군.」"

[[dialogue]]
speaker = "ジュエリー"
original = "「パスタも茹で上がるまでもう少しかな。楽しみに待っていてくれ」"
translation = "「파스타도 다 삶아지려면 조금 더 걸리려나. 즐겁게 기다려주게.」"

[[dialogue]]
speaker = "イレーナ"
original = "（２人、すごく仲がいいじゃない……。失敗しても笑い合って、楽しそうで、夫婦ってこんな感じなの……？）"
translation = "(둘이 정말 사이가 좋잖아……. 실패해도 서로 웃으면서 즐거워 보이고, 부부란 이런 느낌인 걸까……?)"

[[dialogue]]
speaker = "イレーナ"
original = "（あたしには、無理……あんなふうにはできないわ……）"
translation = "(나한테는 무리야…… 저런 식으로 못 해……)"

[[dialogue]]
speaker = "イレーナ"
original = "（だってあたしが素直に振るまっても、全然可愛くないし……好きになってくれるはずないし……）"
translation = "(그치만 내가 솔직하게 행동해도 전혀 안 귀엽고…… 좋아해 줄 리 없으니까……)"

[[dialogue]]
speaker = "イレーナ"
original = "（どうせあたしなんて……）"
translation = "(어차피 나 같은 건……)"

