[[dialogue]]
speaker = "unk"
original = "新たな水着フォームの力を駆使して、俺達は結界内のアステライト攻略に成功。"
translation = "새로운 수영복 폼의 힘을 구사하여 우리들은 결계 내의 아스테라이트 공략에 성공."

[[dialogue]]
speaker = "unk"
original = "結界の歪みは修正され、俺達は無事、現実世界へ帰還した。"
translation = "결계의 뒤틀림은 수정되었고 우리들은 무사히 현실 세계로 귀환했다."

[[dialogue]]
speaker = "unk"
original = "そして、現在――"
translation = "그리고 현재――"

[[dialogue]]
speaker = "マトイ"
original = "「それにしても驚いたよ。一体何者なのかとは思ってたけど……まさか、リップルが古代天使の生き残りだなんて……！」"
translation = "「그나저나 놀랐어. 대체 정체가 뭘까 싶었는데…… 설마 리플이 고대 천사의 생존자라니……!」"

[[dialogue]]
speaker = "アナ"
original = "「学園でリップルさんの体を調べてもらったら、現代の天使にはない特徴が色々と見つかったんだとか。興味深いです」"
translation = "「학원에서 리플 씨의 몸을 조사했더니 현대 천사에게는 없는 특징이 여러 가지 발견되었다더군요. 흥미롭습니다.」"

[[dialogue]]
speaker = "サーシャ"
original = "天使の翼とか、珍しい色をしてるなって思ってたのよね～」"
translation = "「천사의 날개라든가 드문 색을 하고 있다고 생각했거든~」"

[[dialogue]]
speaker = "フィオナ"
original = "「３０００年前、リクリエの力を削ぐ為に自らを犠牲にして封印結界を使ったという、古代天使のことを記した石板があったんです」"
translation = "「3000년 전, 리크리에의 힘을 깎기 위해 자신을 희생하여 봉인 결계를 사용했다는 고대 천사에 대해 기록된 석판이 있었어요.」"

[[dialogue]]
speaker = "フィオナ"
original = "「おそらくそこに書かれた天使というのが……」"
translation = "「아마 거기에 적힌 천사라는 것이……」"

[[dialogue]]
speaker = "リップル"
original = "「ワタシのお母さんですね！\u3000お母さん……リクリエと戦っていたんデスね」"
translation = "「저의 어머니네여! 어머니…… 리크리에와 싸우고 계셨던 거네여.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「さすがリップルのお母さんね！\u3000誰かの幸せの為に、勇敢に戦ったんだわ」"
translation = "「역시 리플의 어머니네! 누군가의 행복을 위해 용감하게 싸우신 거야.」"

[[dialogue]]
speaker = "リップル"
original = "「ハイ……！\u3000そのことをワタシは、誇りにオモいます！」"
translation = "「하이……! 그 사실을 저는 자랑스럽게 생각함다!」"

[[dialogue]]
speaker = "リップル"
original = "「そしてここが……今、リクリエと戦っている、皆の通うガクエンなんですね！」"
translation = "「그리고 여기가…… 지금 리크리에와 싸우고 있는 모두가 다니는 학원이군여!」"

[[dialogue]]
speaker = "フィオナ"
original = "「はい。新星学園です。隣には、私の通う流星学園があって、その２校で協力してリクリエに立ち向かっています」"
translation = "「네. 신성 학원입니다. 옆에는 제가 다니는 유성 학원이 있고, 그 두 학교가 협력해서 리크리에에 맞서고 있어요.」"

[[dialogue]]
speaker = "サーシャ"
original = "「隣接する大聖堂のカフェテリアには、凄い料理人の子がいて、美味しい焼きそばもあるわよ～♪」"
translation = "「인접한 대성당의 카페테리아에는 대단한 요리사 아이가 있어서 맛있는 야키소바도 있단다~♪」"

[[dialogue]]
speaker = "リップル"
original = "「あっ、プールはありマスか！？\u3000ワタシ、プールの部活がやりタイです！」"
translation = "「앗, 수영장은 있슴까!? 저, 수영장 동아리를 하고 싶슴다!」"

[[dialogue]]
speaker = "マトイ"
original = "「それなら水泳部かな？\u3000今度案内するね」"
translation = "「그렇다면 수영부일까? 다음에 안내해 줄게.」"

[[dialogue]]
speaker = "リップル"
original = "「ワタシ、海の近くで過ごして来ましたし、冬でも結界で夏の海を出せるので、実は１度もプールに入ったことがナクて！」"
translation = "「저, 바다 근처에서 지내왔고 겨울에도 결계로 여름 바다를 낼 수 있어서 사실 한 번도 수영장에 들어가 본 적이 없슴다!」"

[[dialogue]]
speaker = "アナ"
original = "「リップルさん、泳ぐのも速かったですもんね。水泳部の人達、喜びそうです」"
translation = "「리플 씨, 수영하는 것도 빠르셨으니까요. 수영부 사람들이 좋아하겠네요.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そっか。リップルがいれば、リゾート結界はいつでも行けるのよね！\u3000学園の皆に声をかけたら、大喜びで遊びに来るんじゃないかしら？」"
translation = "「그렇네. 리플이 있으면 리조트 결계는 언제든 갈 수 있는 거잖아! 학원 모두에게 말하면 엄청 기뻐하며 놀러 오지 않을까?」"

[[dialogue]]
speaker = "マトイ"
original = "「確かに！\u3000というか、あの海が夏以外でも楽しめるとか、普通に考えて最高じゃない？」"
translation = "「확실히! 그보다 그 바다를 여름 이외에도 즐길 수 있다니 보통으로 생각해서 최고 아니야?」"

[[dialogue]]
speaker = "フィオナ"
original = "「今度はぜひ、流星学園星徒会の皆も呼びたいです。リップルさん、いいでしょうか？」"
translation = "「이번에는 꼭 유성 학원 성도회 멤버들도 부르고 싶어요. 리플 씨, 괜찮을까요?」"

[[dialogue]]
speaker = "リップル"
original = "「もちろん！\u3000ワタシは皆にハッピーになって欲しくて、リゾート結界を作ったのですから！\u3000どんどんアソビに来てクダさ～い♪」"
translation = "「물론임다! 저는 모두가 해피해졌으면 해서 리조트 결계를 만든 거니까여! 마음껏 놀러 오심쇼~♪」"

[[dialogue]]
speaker = "フィオナ"
original = "「ありがとうございます。ふふっ、また私もサーフィンがしたいです♪」"
translation = "「감사합니다. 후후, 저도 또 서핑을 하고 싶어요♪」"

[[dialogue]]
speaker = "リップル"
original = "「ハイ♪\u3000これから一緒にたくさんサーフィンしましょう！」"
translation = "「하이♪ 앞으로 같이 잔뜩 서핑해여!」"

[[dialogue]]
speaker = "リップル"
original = "「やっぱり、カイチョー達と来て良かったです。ガクエン通うの、ＢＩＧ楽しみになってキマした！」"
translation = "「역시 회장님 일행과 오길 잘했슴다. 학원 다니는 게 BIG하게 기대되기 시작했슴다!」"

[[dialogue]]
speaker = "unk"
original = "リップルなら、たくさん友達ができるよ"
translation = "「리플이라면 친구를 많이 사귈 수 있을 거야.」"

[[dialogue]]
speaker = "リップル"
original = "「ふふっ。トモダチをリゾート結界にいっぱい呼んで、夏の海をスキになってもらえれば、更に結界を拡大デキます……♪」"
translation = "「후후. 친구를 리조트 결계에 잔뜩 불러서 여름 바다를 좋아하게 만들면 결계를 더 확대할 수 있슴다……♪」"

[[dialogue]]
speaker = "リップル"
original = "「まずはこの流星市国を結界で包んで、トコナツハッピー空間にするコトを目標に……！」"
translation = "「우선은 이 유성시국을 결계로 감싸서 상시 여름 해피 공간으로 만드는 것을 목표로……!」"

[[dialogue]]
speaker = "マトイ"
original = "「だから怖いって！\u3000リップル、そこは１度、私達と相談してよく話し合おうか！？\u3000ねっ！？」"
translation = "「그러니까 무섭다니까! 리플, 그건 일단 우리랑 상담해서 잘 이야기해 볼까!? 응!?」"

[[dialogue]]
speaker = "リップル"
original = "「オウ♪\u3000更に良いリゾート世界にする為の、サクセン会議というコトですね？\u3000わかりマシタで～す♪」"
translation = "「오우♪ 더 좋은 리조트 세계를 만들기 위한 작전 회의라는 거군여? 알겠슴다~♪」"

[[dialogue]]
speaker = "マトイ"
original = "「天真爛漫な笑顔が逆に不安……！」"
translation = "「천진난만한 미소가 오히려 불안해……!」"

[[dialogue]]
speaker = "サーシャ"
original = "「あらあら♪\u3000面白い会議になりそうね～」"
translation = "「어머어머♪ 재밌는 회의가 되겠네~」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「何はともあれ、トラブルはあったけど、リップルのおかげで楽しい強化合宿になったわ！」"
translation = "「어찌 됐든 트러블은 있었지만 리플 덕분에 즐거운 강화 합숙이 되었어!」"

[[dialogue]]
speaker = "アナ"
original = "「新しい水着フォームは、本来の守護星に戻っても使えるようです。気付いていなかった新しい力の使い方がわかった、という感じでしょうか」"
translation = "「새로운 수영복 폼은 본래의 수호성으로 돌아가도 사용할 수 있는 모양입니다. 깨닫지 못했던 새로운 힘의 사용법을 알게 되었다는 느낌일까요.」"

[[dialogue]]
speaker = "フィオナ"
original = "「そういう意味でも、リップルさんが学園に来てくれたことは大きいですね」"
translation = "「그런 의미에서도 리플 씨가 학원에 와준 것은 크네요.」"

[[dialogue]]
speaker = "unk"
original = "改めて、これからよろしく、リップル！"
translation = "「다시 한번, 앞으로 잘 부탁해, 리플!」"

[[dialogue]]
speaker = "リップル"
original = "「ハイ！\u3000カイチョー、こちらこそヨロシクで～す♪」"
translation = "「하이! 회장님, 저야말로 잘 부탁드림다~♪」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「じゃあ皆、打ち合わせ通り、アレをやりましょうか！」"
translation = "「자, 그럼 얘들아, 약속한 대로 그걸 할까!」"

[[dialogue]]
speaker = "リップル"
original = "「ヴィーナス？\u3000何の話デスか？」"
translation = "「비너스? 무슨 이야기임까?」"

[[dialogue]]
speaker = "サーシャ"
original = "「うふふ♪\u3000実はリップルちゃんに秘密で、皆で決めていたことがあるの～」"
translation = "「우후후♪ 실은 리플 짱에게 비밀로 모두가 정해둔 게 있단다~」"

[[dialogue]]
speaker = "リップル"
original = "「ワタシだけナカマ外れデスかー！？」"
translation = "「저만 따돌림임까!?」"

[[dialogue]]
speaker = "マトイ"
original = "「まあまあ、そう言わず。悪いことじゃないから」"
translation = "「자자, 그렇게 말하지 말고. 나쁜 게 아니니까.」"

[[dialogue]]
speaker = "アナ"
original = "「ノープロブレム。私達はもう、リップルさんの仲間です」"
translation = "「노 프로블럼. 저희는 이미 리플 씨의 동료입니다.」"

[[dialogue]]
speaker = "フィオナ"
original = "「リップルさん、私達はあなたを心から歓迎します」"
translation = "「리플 씨, 저희는 당신을 진심으로 환영합니다.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そういうことよ！\u3000せ～のっ！」"
translation = "「그런 거야! 하나, 둘!」"

[[dialogue]]
speaker = "みんな"
original = "「ようこそ、私達の学園へ！」"
translation = "「어서 와, 우리들의 학원에!」"

[[dialogue]]
speaker = "リップル"
original = "「ワオ♪」"
translation = "「와오♪」"

[[dialogue]]
speaker = "リップル"
original = "「アリガトございます！\u3000とってもハッピー♪\u3000ＢＩＧ嬉しいサプライズです！」"
translation = "「감사함다! 정말 해피해여♪ BIG하게 기쁜 서프라이즈임다!」"

[[dialogue]]
speaker = "リップル"
original = "「ワタシ、皆と一緒にリクリエとタタカイます！」"
translation = "「저, 모두와 함께 리크리에와 싸우겠슴다!」"

[[dialogue]]
speaker = "リップル"
original = "「そして、皆と一緒に、もっと素敵なリゾートをツクっていきます♪」"
translation = "「그리고 모두와 함께 더 멋진 리조트를 만들어 가겠슴다♪」"

[[dialogue]]
speaker = "リップル"
original = "「ワタシのエンドレスサマーはまだまだオワリません！\u3000ココからで～す♪」"
translation = "「저의 엔들리스 서머는 아직 끝나지 않았슴다! 여기서부터임다~♪」"

[[dialogue]]
speaker = "unk"
original = "そう言って、夏の海で出会った古代天使は、天真爛漫な笑顔で高々と宣言するのだった。"
translation = "그렇게 말하며 여름 바다에서 만난 고대 천사는 천진난만한 미소로 높이 선언하는 것이었다."

