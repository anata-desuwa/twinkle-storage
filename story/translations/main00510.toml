[[dialogue]]
speaker = "unk"
original = "第１３話,仮面の裏には……,B"
translation = "제13화, 가면의 뒷면에는……, B"

[[dialogue]]
speaker = "unk"
original = "一方その頃……"
translation = "한편 그 무렵……"

[[dialogue]]
speaker = "unk"
original = "アステライトの掃討をあらかた終えたメンバーが空まで浮上してきていた。"
translation = "아스테라이트의 소탕을 거의 마친 멤버들이 하늘까지 부상해 올라와 있었다."

[[dialogue]]
speaker = "unk"
original = "話は無論、今も先行しているフィオナのことに及ぶ。"
translation = "이야기는 물론, 지금도 선행하고 있는 피오나에 관한 것에 미친다."

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「──おいクロト！\u3000ヴィーナス！\u3000塔でフィオナに何があったんだ！？」"
translation = "「──어이 쿠로토! 비너스! 탑에서 피오나에게 무슨 일이 있었던 거야!?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「何にもないわよ！\u3000強いて言うならアレだけど──別状があったわけじゃないし……！」"
translation = "「아무 일도 없었어! 굳이 말하자면 그거지만── 별일이 있었던 건 아니니까……!」"

[[dialogue]]
speaker = "unk"
original = "謎の声がフィオナを『魔王』であると告げた。"
translation = "수수께끼의 목소리가 피오나를 『마왕』이라고 고했다."

[[dialogue]]
speaker = "unk"
original = "しかし、彼女に取り乱す様子がなかったのは事実であり……"
translation = "하지만, 그녀에게 동요하는 모습이 없었던 것은 사실이며……"

[[dialogue]]
speaker = "unk"
original = "スイッチが切り替わったのは、まさに今になってのことだ。"
translation = "스위치가 바뀐 것은, 바로 지금에 와서의 일이다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「あのようなフィオナ会長は……見たことがありません……」"
translation = "「저런 피오나 회장님은…… 본 적이 없습니다……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「とにかく追おう──結果がどうなるにせよ、放っておいたらよくない予感がする」"
translation = "「어쨌든 쫓자── 결과가 어떻게 되든, 내버려 뒀다간 좋지 않은 예감이 들어」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「っ、づうっ……！\u3000な、なんでこのアポロ様が……！」"
translation = "「크, 크으윽……! 어, 어째서 이 아폴로 님이……!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「その体で……勝手なことをされては困る、と申し上げたいのです」"
translation = "「그 몸으로…… 제멋대로 행동하시면 곤란하다고 말씀드리고 싶습니다」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「なんだ……ナニモノだ、オマエ！\u3000オマエも『魔王』なのか！？」"
translation = "「뭐야…… 정체가 뭐야, 너! 너도 『마왕』인 거냐!?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ええ」"
translation = "「네」"

[[dialogue]]
speaker = "unk"
original = "アポロの問いにフィオナは鷹揚と答えた。"
translation = "아폴로의 물음에 피오나는 태연하게 대답했다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「私が、先代魔王ラクシスの血を継ぐ一族であることに、間違いはありませんね」"
translation = "「제가, 선대 마왕 락시스의 피를 잇는 일족이라는 것에, 틀림은 없습니다」"

[[dialogue]]
speaker = "unk"
original = "『月の壁画』が彼女の脳裏によぎる。"
translation = "『달의 벽화』가 그녀의 뇌리를 스친다."

[[dialogue]]
speaker = "unk"
original = "それは、彼女が幼い頃から眺めてきた歴史の１ページ……"
translation = "그것은, 그녀가 어릴 적부터 바라봐 온 역사의 한 페이지……"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「私は流星学園２年、星徒会会長・星見フィオナ──」"
translation = "「저는 유성 학원 2학년, 성도회 회장・호시미 피오나──」"

[[dialogue]]
speaker = "unk"
original = "そして。"
translation = "그리고."

[[dialogue]]
speaker = "unk"
original = "太陽の凝縮された一振りの剣が、アポロの仮面に振り下ろされた。"
translation = "태양이 응축된 한 자루의 검이, 아폴로의 가면 위로 내리쳐졌다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「あなたから<b>その名を受け継いだ</b>者です」"
translation = "「당신에게 <ruby>그 이름을 계승한<rt>・ ・・・ ・・・</rt></ruby> 자입니다」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「っっ────！！」"
translation = "「크으으으────!!」"

[[dialogue]]
speaker = "unk"
original = "アポロをアポロたらしめていたペルソナが砕け散る。"
translation = "아폴로를 아폴로답게 만들었던 페르소나가 산산조각 난다."

[[dialogue]]
speaker = "unk"
original = "未だ消えない太陽の残照は、少女の素顔を露わにし……"
translation = "아직 사라지지 않은 태양의 잔광은, 소녀의 본모습을 드러내고……"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「これ以上……言葉を尽くす必要はありませんね」"
translation = "「더 이상…… 말을 다할 필요는 없겠군요」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「────」"
translation = "「────」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「目を覚ましてください──姉さん」"
translation = "「눈을 뜨세요── 언니」"

[[dialogue]]
speaker = "unk"
original = "時空を隔てたもうひとつの姉妹が、ここに再会を果たしていた。"
translation = "시공을 초월한 또 하나의 자매가, 이곳에서 재회를 이루고 있었다."

