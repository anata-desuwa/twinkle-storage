[[dialogue]]
speaker = "unk"
original = "第３話,世界で１番の幸運（前編）,P"
translation = "제3화, 세계에서 제일가는 행운 (전편), P"

[[dialogue]]
speaker = "unk"
original = "サチとの付き合いも長くなってきて、俺はよく一緒にトレーニングをするようになっていた――"
translation = "사치와 알고 지낸 지도 오래되어, 나는 자주 함께 트레이닝을 하게 되었다――"

[[dialogue]]
speaker = "サチ"
original = "「ふぅ……お兄さん、実践組手ありがとうございました。今日は私の負けですね……」"
translation = "「후우…… 오빠, 실전 대련 감사합니다. 오늘은 제가 졌네요……」"

[[dialogue]]
speaker = "サチ"
original = "「お兄さんは日に日に強くなっていきますね。お兄さんに対しては、私の幸運が相性良くないのもありますけど、格闘戦では敵わなくなってきてます」"
translation = "「오빠는 나날이 강해지시네요. 오빠에 대해서는 제 행운이 상성이 좋지 않은 면도 있지만, 격투전에서는 당해낼 수 없게 되어가고 있어요.」"

[[dialogue]]
speaker = "unk"
original = "星徒会長として強くならないとだし――"
translation = "성도회장으로서 강해져야 하기도 하고――"

[[dialogue]]
speaker = "サチ"
original = "「――私にも先輩らしいところ見せたい？\u3000ふふ、男の意地ってやつですか？\u3000そういうの、私は嫌いじゃないですよ」"
translation = "「――나에게도 선배다운 모습을 보여주고 싶다? 후후, 남자의 오기라는 건가요? 그런 거, 저는 싫지 않아요.」"

[[dialogue]]
speaker = "サチ"
original = "「私もお兄さんに負けて、闘志が燃え上って来てますから。附属校の生徒会長として、もっと頑張らないと」"
translation = "「저도 오빠에게 져서 투지가 불타오르고 있으니까요. 부속 학교의 학생회장으로서 더 열심히 해야겠어요.」"

[[dialogue]]
speaker = "サチ"
original = "「私は、附属最強だけでなく、全ての星騎士の中でも最強を目指していますので」"
translation = "「저는 부속 최강뿐만 아니라, 모든 성기사 중에서도 최강을 목표로 하고 있으니까요.」"

[[dialogue]]
speaker = "サチ"
original = "「だから、ヴィーナスさんや、フィオナさん、お兄さんも、私にとってはライバルなんですからね！」"
translation = "「그러니까 비너스 씨나 피오나 씨, 오빠도 저에게는 라이벌이라니까요!」"

[[dialogue]]
speaker = "unk"
original = "そういうのカッコよくて、俺は好きだな"
translation = "그런 모습이 멋있어서 나는 좋네."

[[dialogue]]
speaker = "サチ"
original = "「えっ……す、好きって……」"
translation = "「엣…… 저, 좋다는 건……」"

[[dialogue]]
speaker = "施設アナウンス"
original = "「施設内を解析開始――」"
translation = "「시설 내 해석 개시――」"

[[dialogue]]
speaker = "サチ"
original = "「ん？\u3000ああ、自動清掃の時間ですかね？\u3000そしたら、一旦外に出て――」"
translation = "「응? 아아, 자동 청소 시간인가 보네요? 그럼 일단 밖으로 나가서――」"

[[dialogue]]
speaker = "施設アナウンス"
original = "「解析終了。施設内に人が残っていないことを確認しました。これよりトレーニング施設内は、自動清掃に入ります。利用可能になるまで、少々外でお待ち下さい。繰り返します――」"
translation = "「해석 종료. 시설 내에 사람이 남아 있지 않음을 확인했습니다. 지금부터 트레이닝 시설 내 자동 청소에 들어갑니다. 이용 가능할 때까지 잠시 밖에서 대기해 주십시오. 반복합니다――」"

[[dialogue]]
speaker = "サチ"
original = "「え！？\u3000いや、中にまだ私達が残ってますよね！？\u3000システムの誤作動じゃ――」"
translation = "「에!? 아니, 안에 아직 저희가 남아 있잖아요!? 시스템 오작동인가――」"

[[dialogue]]
speaker = "unk"
original = "足元の整備用ハッチが突然開いて……！？"
translation = "발밑의 정비용 해치가 갑자기 열리더니……!?Scan"

[[dialogue]]
speaker = "サチ"
original = "「きゃあぁっ！？」"
translation = "「꺄아앗!?」"

[[dialogue]]
speaker = "サチ"
original = "「う、うぅ～ん……な、何とか無事っぽいですけど……何か凄く狭い……って」"
translation = "「으, 으으음…… 어찌저찌 무사한 것 같긴 한데…… 뭔가 굉장히 좁아…… 어라.」"

[[dialogue]]
speaker = "サチ"
original = "「ひゃあっ！？\u3000お兄さん、近い近い近い！\u3000またいつもみたいな、密着状態ですか！？」"
translation = "「히얏!? 오빠, 가까워 가까워 가까워! 또 평소처럼 밀착 상태인가요!?」"

[[dialogue]]
speaker = "サチ"
original = "「ここ、メンテナンス用のハッチですよね！？\u3000１人でもギリギリ入れるくらいのところに落ちちゃうなんて……」"
translation = "「여기 유지보수용 해치죠!? 혼자서도 겨우 들어갈 만한 곳에 떨어져 버리다니……」"

[[dialogue]]
speaker = "サチ"
original = "「もう！\u3000お兄さんと一緒に居ると、どうしてこんなアンラッキーなことばかり起こるんですか……！」"
translation = "「정말! 오빠랑 같이 있으면 어째서 이런 언럭키한 일만 일어나는 거예요……!」"

[[dialogue]]
speaker = "unk"
original = "なんかゴメン……"
translation = "왠지 미안……"

[[dialogue]]
speaker = "サチ"
original = "「あ……ち、違うんです。私はただ、お兄さんともっと普通に……」"
translation = "「아…… 아, 아니에요. 저는 그냥 오빠랑 좀 더 평범하게……」"

[[dialogue]]
speaker = "サチ"
original = "「とりあえず、まずはここから脱出しましょう。私の背じゃ届きませんが、お兄さんなら、ハッチの縁に手が届いたりしませんか？」"
translation = "「일단 여기서 탈출부터 하죠. 제 키로는 닿지 않지만, 오빠라면 해치 가장자리에 손이 닿지 않을까요?」"

[[dialogue]]
speaker = "サチ"
original = "「頑張ればいけそうですか？\u3000では、お願いします……って、んっ……！」"
translation = "「힘내면 될 것 같나요? 그럼 부탁드려요…… 앗, 응……!」"

[[dialogue]]
speaker = "サチ"
original = "「（お、お兄さんが動くと、体が擦れて……お兄さんって一見細く見えますけど、凄く鍛えていて、引き締まった体付きをしているんですよね……）」"
translation = "「(오, 오빠가 움직일 때마다 몸이 스쳐서…… 오빠는 언뜻 마르게 보이지만, 굉장히 단련되어 있어서 탄탄한 몸매를 하고 있네요……)」"

[[dialogue]]
speaker = "サチ"
original = "「（それに近いので、男の人の……お兄さんの匂いがします……体を動かしていたので汗をかいてますけど、嫌じゃなくて……むしろ何か胸がドキドキしてきて……）」"
translation = "「(게다가 가까워서 남자의…… 오빠의 냄새가 나요…… 몸을 움직여서 땀을 흘렸지만 싫지 않고…… 오히려 뭔가 가슴이 두근거려서……)」"

[[dialogue]]
speaker = "サチ"
original = "「（というか、よく考えるとこれって、お兄さんに抱き締められているような体勢ですよね……そう思ったら、体が熱くなってきちゃう……<emoji=heart04>）」"
translation = "「(그보다 잘 생각해보면 이거, 오빠에게 안겨 있는 듯한 자세잖아요…… 그렇게 생각하니 몸이 뜨거워져 버려……<emoji=heart04>)」"

[[dialogue]]
speaker = "サチ"
original = "「あっ、耳にお兄さんの息が当たって……<emoji=heart04>\u3000んっ<emoji=heart04>\u3000耳は敏感な場所で……変な声が出ちゃ――」"
translation = "「앗, 귀에 오빠의 숨결이 닿아서……<emoji=heart04> 응읏<emoji=heart04> 귀는 민감한 곳이라…… 이상한 소리가 나와버――」"

[[dialogue]]
speaker = "サチ"
original = "「ふあぁぁんっ<emoji=heart04>\u3000あ――」"
translation = "「후아아앙<emoji=heart04> 아――」"

[[dialogue]]
speaker = "サチ"
original = "「え、エッチなことは禁止ですっ！」"
translation = "「에, 엣찌한 짓은 금지입니다!」"

[[dialogue]]
speaker = "unk"
original = "ごめん、我慢してくれ"
translation = "미안, 참아줘."

[[dialogue]]
speaker = "サチ"
original = "「えっ、もう少しで手が届きそう？\u3000は、はい！」"
translation = "「엣, 조금만 더 하면 손이 닿을 것 같다고요? 네, 넵!」"

[[dialogue]]
speaker = "サチ"
original = "「（って、ひょっとしてドキドキしてるのって私だけなのでは！？）」"
translation = "「(그나저나 설마 두근거리고 있는 건 나뿐인 건가!?)」"

[[dialogue]]
speaker = "サチ"
original = "「（思えば、お兄さんはいつもこういう状況になると、真面目に何とか状況を脱しようとしてくれていて……私はいつも、叫んでばかりで……）」"
translation = "「(생각해보면 오빠는 항상 이런 상황이 되면 진지하게 어떻게든 상황을 벗어나려 노력해 주는데…… 나는 항상 소리만 지르고……)」"

[[dialogue]]
speaker = "サチ"
original = "「（本当は、エッチで変態で悪い子なのは、私……）」"
translation = "「(사실은 엣찌하고 변태에 나쁜 아이인 건 나……)」"

[[dialogue]]
speaker = "サチ"
original = "「っ……お兄さん……いつもごめんなさい……」"
translation = "「윽…… 오빠…… 항상 죄송해요……」"

[[dialogue]]
speaker = "unk"
original = "サチ？\u3000もしかして、泣いてるのか……？"
translation = "사치? 설마 울고 있는 건가……?"

[[dialogue]]
speaker = "プリムラ"
original = "「なんじゃ、姿が見当たらんから探しに来てみれば、貴様ら２人して何をしておるのじゃ……またハレンチな……」"
translation = "「뭐냐, 모습이 보이지 않아 찾으러 와봤더니 네놈들 둘이서 무엇을 하고 있는 것이냐…… 또 파렴치하게……」"

[[dialogue]]
speaker = "サチ"
original = "「その声……プリムラ？」"
translation = "「그 목소리…… 프리무라?」"

[[dialogue]]
speaker = "プリムラ"
original = "「なに？\u3000我に助けろとな？\u3000後でチョコを献上？\u3000我を馬鹿にしておるのか！\u3000……しかし、眷族の頼みなら仕方あるまい！\u3000感謝するのだぞ！」"
translation = "「뭐냐? 이 몸더러 도와달라고? 나중에 초코를 헌상하겠다고? 이 몸을 바보로 아는 것이냐! ……하지만 권속의 부탁이라면 어쩔 수 없지! 감사하도록 하거라!」"

[[dialogue]]
speaker = "プリムラ"
original = "「ほれ、引っ張り出してやったぞ……って、サチ？\u3000貴様、何を泣いて……」"
translation = "「자, 끌어올려 주었다…… 어라, 사치? 네놈, 왜 울고……」"

[[dialogue]]
speaker = "サチ"
original = "「私のせいです……」"
translation = "「제 탓이에요……」"

[[dialogue]]
speaker = "サチ"
original = "「私がエッチだから、いつもお兄さんに迷惑をかけてたんです。私もう、お兄さんに顔向けできません……！」"
translation = "「제가 엣찌해서 항상 오빠에게 폐를 끼쳤어요. 저 이제 오빠를 볼 면목이 없어요……!」"

[[dialogue]]
speaker = "unk"
original = "サチ！\u3000一体どうしたっていうんだ……"
translation = "사치! 대체 왜 그러는 거야……"

[[dialogue]]
speaker = "プリムラ"
original = "「……我には、男女関係のことはよくわからん。ただ、貴様ら２人のことならよくわかる」"
translation = "「……이 몸은 남녀관계 같은 건 잘 모른다. 다만 네놈들 둘의 일이라면 잘 알지.」"

[[dialogue]]
speaker = "プリムラ"
original = "「眷族よ、サチが泣いているのは、貴様と何かあったからじゃ」"
translation = "「권속이여, 사치가 울고 있는 건 네놈과 무슨 일이 있었기 때문이다.」"

[[dialogue]]
speaker = "プリムラ"
original = "「だから、さっさと追い駆けて、はよ仲直りしてこい！」"
translation = "「그러니까 얼른 쫓아가서 어서 화해하고 오거라!」"

[[dialogue]]
speaker = "unk"
original = "プリムラ……ありがとう！"
translation = "프리무라…… 고마워!"

[[dialogue]]
speaker = "プリムラ"
original = "「フハハハ！\u3000サチ共々、この借りは後でたっぷり返して貰うからな！\u3000覚悟しておくがよい！」"
translation = "「후하하하! 사치와 더불어 이 빚은 나중에 듬뿍 돌려받을 테니까 말이다! 각오해 두거라!」"

[[dialogue]]
speaker = "unk"
original = "プリムラの激励に背中を押されながら、俺はサチの後を追って走り出すのだった。"
translation = "프리무라의 격려에 등을 떠밀리며, 나는 사치의 뒤를 쫓아 달려 나갔다."

