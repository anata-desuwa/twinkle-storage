[[dialogue]]
speaker = "unk"
original = "第１話,ルルカのバレンタイン・前編,P"
translation = "제1화, 루루카의 발렌타인·전편, P"

[[dialogue]]
speaker = "unk"
original = "それは、バレンタインより少し前のこと。恋人であるルルカが、星徒会室へ遊びに来ていた。"
translation = "그것은, 발렌타인보다 조금 전의 일. 연인인 루루카가, 성도회실에 놀러 와 있었다."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「う～ん、今度のルカルカのバレンタイン配信、どうしよっかな～」"
translation = "「으음, 이번 루카루카의 발렌타인 방송, 어떻게 할까나~」"

[[dialogue]]
speaker = "unk"
original = "今さらだが改めて説明しておくと、ルルカの正体は、チャンネル登録者数６０万人を超える人気Ｖチューバー『ルカルカ』の中の人である。"
translation = "이제 와서 다시 설명하자면, 루루카의 정체는 채널 구독자 수 60만 명을 넘는 인기 VTuber 『루카루카』의 안의 사람이다."

[[dialogue]]
speaker = "unk"
original = "サプライズは用意してるんだろう？"
translation = "서프라이즈는 준비해 뒀겠지?"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「うん。事前告知はしてないけど、クリスマス配信の時みたいに、自分で作詞作曲した新曲のバレンタインソングを、ミュージックビデオで流す予定なんだ」"
translation = "「응. 사전 공지는 안 했지만, 크리스마스 방송 때처럼, 직접 작사 작곡한 신곡 발렌타인 송을, 뮤직비디오로 틀 예정이야」"

[[dialogue]]
speaker = "unk"
original = "曲を１から全部自分で作り上げられるようになっただけでもすごいと、俺はルルカを褒める。"
translation = "곡을 1부터 전부 스스로 만들 수 있게 된 것만으로도 대단하다고, 나는 루루카를 칭찬한다."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「――えへへ、ありがとう、お兄ちゃん♪\u3000まあ、ミュージックビデオの制作はお世話になってるクリエイターさんにお願いしたんだけどね」"
translation = "「――에헤헤, 고마워, 오빠♪ 뭐, 뮤직비디오 제작은 신세 지고 있는 크리에이터분께 부탁했지만 말이야」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「でもね、リスナーさんたちはクリスマスに続いてバレンタインでも、新曲は期待してるはずで……」"
translation = "「하지만 말이야, 리스너분들은 크리스마스에 이어서 발렌타인에서도 신곡을 기대하고 있을 텐데……」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「そう考えると、チョコ作りと新曲公開だけだと、ちょっとパンチが足りない気がしてるんだ」"
translation = "「그렇게 생각하면, 초코 만들기와 신곡 공개만으로는, 조금 임팩트가 부족한 기분이 들어」"

[[dialogue]]
speaker = "unk"
original = "出会った頃よりも、ルルカは動画配信者として成長しつつあった。その真剣な姿勢が、俺はカッコいいと感じる。"
translation = "만났을 때보다, 루루카는 동영상 스트리머로서 성장하고 있었다. 그 진지한 자세가, 나는 멋지다고 느낀다."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「――そ、そうかな？\u3000えへへ<emoji=heart04>\u3000可愛いって言われるのも嬉しいけど、カッコいいって言われるのも、ちょっと誇らしい気分になるね♪」"
translation = "「――그, 그럴까? 에헤헤<emoji=heart04> 귀엽다는 말을 듣는 것도 좋지만, 멋지다는 말을 듣는 것도, 조금 자랑스러운 기분이 되네♪」"

[[dialogue]]
speaker = "unk"
original = "と、その時だった。"
translation = "그때였다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「会長、お疲れ様です。――おや、ルルカさん、いらっしゃっていたのですね」"
translation = "「회장님, 수고하십니다. ――어라, 루루카 씨, 와 계셨군요」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「あっ、アナちゃん！\u3000お邪魔してま～す」"
translation = "「앗, 아나짱! 실례하고 있어~」"

[[dialogue]]
speaker = "unk"
original = "そうだ、アナにも相談してみたら？"
translation = "맞다, 아나에게도 상담해보는 건 어때?"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「相談？\u3000なにかお困りごとでしょうか？」"
translation = "「상담인가요? 뭔가 곤란한 일이라도 있으신지?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「えっとね、実は……」"
translation = "「저기 말이야, 사실은……」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「――なるほど！\u3000そういうことなら、お任せマジカル☆\u3000ルカルカ配信を毎回チェックしている私が協力しちゃいますよ～♪」"
translation = "「――과연! 그런 거라면, 맡겨줘 매지컬☆ 루카루카 방송을 매번 체크하고 있는 제가 협력해버릴게요~♪」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「まさか、リーリアちゃんも手伝ってくれるなんて……！」"
translation = "「설마, 리리아짱도 도와주는 거야……!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ルカルカの正体がルルカさんだということは、リーリアさんも既に知っていますから、相談するなら人数が多い方がいいかと思いまして」"
translation = "「루카루카의 정체가 루루카 씨라는 건, 리리아 씨도 이미 알고 있으니까요, 상담한다면 인원이 많은 편이 좋을 것 같아서요」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「お互い秘密を打ち明け合った仲なんだから、困った時は相談してよ♪\u3000私たち、友達でしょ？」"
translation = "「서로 비밀을 털어놓은 사이니까, 곤란할 때는 상담해줘♪ 우리, 친구잖아?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「リーリアちゃん、アナちゃん……２人とも、ありがと～！」"
translation = "「리리아짱, 아나짱…… 둘 다, 고마워~!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ノープロブレムです。私も友達ですから」"
translation = "「노 프라블럼입니다. 저도 친구니까요」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「それで、ルルカちゃんは今のところ、どんな配信プランを考えてるの？」"
translation = "「그래서, 루루카짱은 현재 어떤 방송 플랜을 생각하고 있어?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「えっとね、『チョコ作り』をメインにして、完成したらそれを試食しながらリスナーさんのコメントを読んでトークして――」"
translation = "「저기 말이야, 『초코 만들기』를 메인으로 하고, 완성되면 그걸 시식하면서 리스너분들의 코멘트를 읽으며 토크하고――」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「そのあとにサプライズで新曲を公開して、最後に感想トークをして締める、って流れかな」"
translation = "「그다음에 서프라이즈로 신곡을 공개하고, 마지막에 감상 토크를 하고 마무리하는, 그런 흐름일까」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「王道ですね。ルルカさんらしいサプライズ要素もあるので、構成としてはノープロブレムかと」"
translation = "「왕도네요. 루루카 씨다운 서프라이즈 요소도 있으니, 구성으로서는 노 프라블럼일 듯합니다」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「でも、歌だけじゃなくて、チョコ作りの方にも何か『ルカルカらしい色』が欲しいってことだよね？」"
translation = "「하지만, 노래뿐만 아니라 초코 만들기 쪽에도 뭔가 『루카루카다운 색깔』이 필요하다는 거지?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「うん。チョコ作りは他のＶチューバーの子たちも沢山やるから、『これぞルカルカ』って感じの工夫をしたくて……」"
translation = "「응. 초코 만들기는 다른 VTuber 아이들도 많이 하니까, 『이것이 루카루카』라는 느낌의 궁리를 하고 싶어서……」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「う～ん……フラッシュアイデアだけど、激辛チョコを作って食べるとか？」"
translation = "「으음…… 갑자기 떠오른 생각인데, 아주 매운 초코를 만들어서 먹는다든가?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「まさかのここで激辛チャレンジ！？\u3000うっ……かつての激辛ラーメンチャレンジの<ruby>辛<rt>から</rt></ruby>い記憶が……！」"
translation = "「설마 여기서 매운맛 챌린지!? 윽…… 예전의 매운 라면 챌린지의 매운 기억이……!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「お、面白いとは思うけど、激辛チョコを食べた後で新曲を歌うのはキツいかも……」"
translation = "「재, 재밌을 것 같긴 한데, 매운 초코를 먹은 뒤에 신곡을 부르는 건 힘들지도……」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「あっ、そっか！\u3000それじゃダメか～」"
translation = "「앗, 그렇구나! 그럼 안 되겠네~」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ふむ……ということはバレンタインソングは生で歌うんですか？」"
translation = "「흠…… 그렇다는 건 발렌타인 송은 라이브로 부르시는 건가요?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「え？\u3000あっ……！」"
translation = "「에? 앗……!」"

[[dialogue]]
speaker = "unk"
original = "ルルカがハッとしたように顔を引きつらせる。"
translation = "루루카가 아차 싶은 듯 얼굴을 경련시킨다."

[[dialogue]]
speaker = "unk"
original = "確か、ＭＶを流すって言ってなかった？"
translation = "분명, MV를 튼다고 하지 않았어?"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「そ、そうだった……」"
translation = "「그, 그랬지……」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「え？\u3000ってことは、激辛チャレンジも行けるじゃん！」"
translation = "「에? 그렇다면 매운맛 챌린지도 가능하잖아!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「う、うぅ～！\u3000でも最初から食べきれないってわかってる激辛チョコを残すのは、ちょっと印象悪い気も……」"
translation = "「우, 우으~! 하지만 처음부터 다 못 먹을 걸 알고 있는 매운 초코를 남기는 건, 조금 인상이 안 좋을 것 같은 기분도……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「では、ひと口サイズのチョコを複数作って、その中の１個だけを激辛仕様にするのはどうでしょう？\u3000ひと口だけなら、残さず食べきることも可能かと」"
translation = "「그럼, 한입 사이즈의 초코를 여러 개 만들어서, 그중 딱 하나만 아주 맵게 만드는 건 어떨까요? 한입뿐이라면, 남기지 않고 다 먹는 것도 가능할 듯합니다」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「激辛チョコのロシアンルーレットか！\u3000さすがアナちゃん、頭いい～♪\u3000ナイスマジカル☆」"
translation = "「매운 초코 복불복인가! 역시 아나짱, 머리 좋아~♪ 나이스 매지컬☆」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「くっ……！\u3000面白そうだけど、それを食べるのはあたしっていうジレンマ……！」"
translation = "「큭……! 재밌을 것 같지만, 그걸 먹는 건 나라는 딜레마……!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「チョコは完成後に見ないようにしながらシャッフルし、その後の試食トークの区切りごとに１つずつ食べていく。そんな形式はいかがでしょう？」"
translation = "「초코는 완성 후에 보지 않은 채로 섞고, 그 후 시식 토크의 단락마다 하나씩 먹어가는 거죠. 그런 형식은 어떠신가요?」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「マジカル完璧じゃん☆\u3000ルルカちゃん、どう？\u3000激辛ロシアンチョコ、よくない？」"
translation = "「매지컬 완벽하잖아☆ 루루카짱, 어때? 매운 복불복 초코, 좋지 않아?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ううぅ……わかった！\u3000やるよ！\u3000ルカルカのバレンタイン配信を楽しみにしてくれてる６０万人のお兄ちゃんお姉ちゃんのために！！」"
translation = "「으으으…… 알았어! 할게! 루카루카의 발렌타인 방송을 기대해주는 60만 명의 오빠 언니들을 위해서!!」"

[[dialogue]]
speaker = "unk"
original = "――かくして、バレンタイン当日。ルカルカのバレンタイン配信が行われて。"
translation = "――그리하여, 발렌타인 당일. 루카루카의 발렌타인 방송이 진행되어."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "『う、ウソでしょ……！？\u3000まさか最後の１個まで引かないなんて……！』"
translation = "『거, 거짓말이지……!? 설마 마지막 한 개까지 안 뽑을 줄이야……!』"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "『最後の１個、激辛確定なんですけどぉ～～～っ！？！？』"
translation = "『마지막 한 개, 매운맛 확정인데요오오오~~~앗!?!?』"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "『うぅ……激辛とわかって食べるのはキツいよぉ～！\u3000うっ……あっ、ああもう！\u3000いっただきま～すっ！！』"
translation = "『으으…… 매운 걸 알고 먹는 건 힘들다구우~! 윽…… 아, 아 정말! 잘 먹겠습니다아앗!!』"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "『もぐっ――――ア゛ッ！？！？\u3000エ゛アアアァァァーーーーーーッ！！！？』"
translation = "『우물―― 아아악!?!? 에에에에에에에에에에엑!!!?』"

[[dialogue]]
speaker = "unk"
original = "その夜――汐ルカルカはまたひとつ、ＳＮＳで大バズリする伝説を生み出すのだった。"
translation = "그날 밤―― 시오 루카루카는 또 하나, SNS에서 대박을 터뜨리는 전설을 낳는 것이었다."

