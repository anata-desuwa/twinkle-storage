[[dialogue]]
speaker = "unk"
original = "第４話,浜辺で鍛錬,P"
translation = "제4화, 해변에서 단련, P"

[[dialogue]]
speaker = "unk"
original = "唐突に提案されたラティエさんの外出──俺が彼女に連れてこられたのは、人っ子１人いないビーチだった。"
translation = "갑작스럽게 제안된 라티에 씨의 외출── 내가 그녀에게 이끌려 온 곳은 사람 한 명 없는 해변이었다."

[[dialogue]]
speaker = "unk"
original = "そこで行われるのは楽しい夏のひと時、などではなくて……"
translation = "그곳에서 행해지는 것은 즐거운 여름의 한때 같은 게 아니라……"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「右、左、右っ！\u3000どうした、反応が鈍くなっているぞ！」"
translation = "「오른쪽, 왼쪽, 오른쪽! 왜 그러나, 반응이 둔해지고 있다고!」"

[[dialogue]]
speaker = "unk"
original = "速いっ……速すぎる！？"
translation = "빠르다…… 너무 빨라!?"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「目で追うからだ。私の得物──聖雷剣バラクィエルは鞭と変わらん！\u3000切っ先の目視は不可能だ！」"
translation = "「눈으로 쫓으려 하기 때문이다. 나의 무기── 성뢰검 바락키엘은 채찍과 다름없어! 칼끝을 육안으로 보는 건 불가능하다!」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「術者の手元を見ろ！\u3000視線を読め！\u3000五感を休まず駆動させろ、さぁ──行くぞ！」"
translation = "「술자의 손놀림을 봐라! 시선을 읽어라! 오감을 쉬지 말고 구동시켜라, 자── 간다!」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「ふぅ……いい汗をかいた。少し休憩しようか。きみ、なかなか筋がいいな。流石は新星学園の星徒会長だ」"
translation = "「후우…… 기분 좋은 땀을 흘렸군. 잠시 쉴까. 자네, 제법 소질이 있어. 역시 신성학원의 성도회장답군」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「あぁ、無理に返事をしなくていい。呼吸を整えたまえ」"
translation = "「아아, 억지로 대답하지 않아도 된다. 호흡을 가다듬게나」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「しかし──どうかな、このビーチは。観光客もおらず、しかし自然は実に豊富だ。学園のトレーニング施設とはまた違った趣があるだろう」"
translation = "「그런데── 어떤가, 이 해변은. 관광객도 없고 하지만 자연은 아주 풍부하지. 학원의 트레이닝 시설과는 또 다른 멋이 있지 않은가」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「出会った時こそ魔界にいた私だが、もちろん人間界の各所にも足を運んでいる。ここは穴場の訓練スポットなのさ」"
translation = "「만났을 때야 마계에 있었지만, 물론 인간계 곳곳에도 발걸음을 옮기고 있지. 여기는 숨겨진 훈련 명소란 말이다」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「……む？\u3000どうかしたのか。少し浮かない顔をしているように思うが」"
translation = "「……음? 왜 그러나. 표정이 조금 어두워 보이는데」"

[[dialogue]]
speaker = "unk"
original = "海に行くと聞いたので……"
translation = "바다에 간다고 들어서……"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「なんだ、水着でも着て欲しかったのか？\u3000はっはっ、きみも冗談を言うんだな。私の水着など見てもつまらんだろう」"
translation = "「뭐야, 수영복이라도 입어주길 바랐던 건가? 하하하, 자네도 농담을 다 하는군. 내 수영복 같은 걸 봐도 재미없을 거다」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「──な、なに？\u3000そんなことはない……？」"
translation = "「──무, 뭐라고? 그렇지 않다고……?」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「そ、そうなのか……期待していてくれていたとは知らなかった。まあ、しかし……無理もないのか？」"
translation = "「그, 그런가…… 기대하고 있었을 줄은 몰랐군. 뭐, 하지만…… 무리도 아닌가?」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「女に海に誘われたら、水着の１つや２つ期待するのも当然か。はは、申し訳ない。私はそういう男女の機微に疎くてな……」"
translation = "「여자에게 바다로 권유받았으면 수영복 한두 개쯤 기대하는 것도 당연한가. 하하, 미안하군. 난 그런 남녀의 기미에 어두워서 말이야……」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「あいにく、この歳まで殿方とのご縁には恵まれないままさ」"
translation = "「안타깝게도 이 나이가 되도록 남성과의 인연에는 축복받지 못한 채라서 말이지」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「なんだ、そんなに驚くことか？\u3000まあ、一般的には珍しいかもしれんが、私はこのとおりの根無し草だからな」"
translation = "「뭐야, 그렇게 놀랄 일인가? 뭐, 일반적으론 드물지도 모르겠다만 난 보다시피 떠돌이니까」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「学園長になる前も、なってからも、修行を理由に三界を放浪してばかりの身だ。恋仲になる相手などいるわけもないだろう」"
translation = "「학원장이 되기 전에도, 된 후에도 수행을 이유로 삼계를 방랑하기만 하는 몸이다. 연인이 될 상대 같은 게 있을 리가 없잖나」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「暇さえあれば旅に出て、鍛錬とモンスター討伐の繰り返しが私の青春だったんだ」"
translation = "「틈만 나면 여행을 떠나고 단련과 몬스터 토벌의 반복이 나의 청춘이었으니까 말이야」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「はっはっ、驚くなよ。なんと私は、男と手をつないだこともないぞ！」"
translation = "「하하하, 놀라지 마라. 무려 난 남자와 손을 잡아 본 적도 없단다!」"

[[dialogue]]
speaker = "unk"
original = "笑うところじゃないような……"
translation = "웃을 일이 아닌 것 같은데……"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「だが、あまり気にもしていないからな。興味がないではないが、私にはリクリエを退けるという大義がある」"
translation = "「하지만 별로 신경 쓰지 않으니까 말이야. 흥미가 없는 건 아니다만 내겐 리크리에를 물리친다는 대의가 있지」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「あまり学園長らしいこともできていないんだし、せめて流星最強の星騎士ではあり続けようと思っているんだ」"
translation = "「학원장다운 일도 별로 못 하고 있으니 적어도 유성 최강의 성기사로선 계속 남아있으려 생각하고 있거든」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「まぁ……たまに旅をしている時に、横に誰かがいたらと思わないことも、ないではないが」"
translation = "「뭐…… 가끔 여행을 할 때 옆에 누군가가 있다면 하고 생각하지 않는 것도 아니다만」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「天界で息を呑むような絶景を見た時。魔界の厳かな神殿に参拝する時」"
translation = "「천계에서 숨이 멎을 것 같은 절경을 보았을 때. 마계의 엄숙한 신전에 참배할 때」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「放浪は私の趣味であり、生き甲斐であり、楽しみだ。それを分かち合える相手がいればなと思うこともたまにはあるさ」"
translation = "「방랑은 나의 취미이자 삶의 보람이며 즐거움이다. 그걸 나눌 수 있는 상대가 있다면 하고 생각할 때가 가끔은 있지」"

[[dialogue]]
speaker = "unk"
original = "俺も同じ景色を見てみたいです"
translation = "저도 같은 풍경을 보고 싶어요"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「……質問があるのだが、きみの今の答えは、その……私とそういう仲になりたい、という意味なのかな？」"
translation = "「……질문이 하나 있다만, 자네의 방금 대답은 그…… 나와 그런 사이가 되고 싶다는 뜻인가?」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「いや、すまん。本当に男と付き合ったことがなくてな、頭が硬いんだ。つまり──」"
translation = "「아니, 미안하군. 정말로 남자와 사귀어 본 적이 없어서 머리가 딱딱하거든. 그러니까──」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「私は、きみに女性として好かれているのだろうか？」"
translation = "「나는 자네에게 여성으로서 사랑받고 있는 것인가?」"

[[dialogue]]
speaker = "unk"
original = "そのつもりです"
translation = "그럴 생각입니다"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「……はっはっ！\u3000そうか、そうか！\u3000きみは本当に変わった子だな？」"
translation = "「……하하하! 그런가, 그렇군! 자네는 정말 특이한 아이로군?」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「魔王で、星徒会長で……流星学園の学園長が好きだなどと、とても変わっている。見た目に反して欲の強い子のようだ」"
translation = "「마왕에, 성도회장에…… 유성학원의 학원장을 좋아한다니 정말 특이해. 겉모습과는 다르게 욕심이 많은 아이 같군」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「だが、嫌いではないよ。私は強い相手も好きだが、強くあろうとひたむきな子も好きだ」"
translation = "「하지만 싫지는 않아. 난 강한 상대도 좋아하지만 강해지려 한결같은 아이도 좋아하거든」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「うん。私もきみのことを、好ましく思っているよ。そこに嘘はない」"
translation = "「음. 나도 자네를 호의적으로 생각하고 있어. 거기엔 거짓이 없네」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「いつかきみを連れて、放浪の旅に出たいな。まだ見ぬ世界の美しさを２人で見る。とても面白そうだ」"
translation = "「언젠가 자네를 데리고 방랑 여행을 떠나고 싶군. 아직 보지 못한 세계의 아름다움을 둘이서 본다. 아주 재미있을 것 같아」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「──が。まずは私から１本を取ってもらおうかな？\u3000話しているうちにだいぶ余裕も出てきただろう？」"
translation = "「──지만. 우선은 나로부터 한 판 따내 줘야겠어. 이야기하는 동안 꽤 여유도 생겼지 않나?」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「私の男を名乗るからには、今よりもっとたくましくなってもらわなければね。約束できるかな、きみ？」"
translation = "「나의 남자라고 자처하려면 지금보다 훨씬 늠름해져 줘야겠지. 약속할 수 있겠나, 자네?」"

[[dialogue]]
speaker = "unk"
original = "俺はラティエさんに思いのたけをぶつけるために、再び挑み──ボコボコに負けた。"
translation = "나는 라티에 씨에게 마음을 전하기 위해 다시 도전했지만── 처참하게 졌다."

[[dialogue]]
speaker = "unk"
original = "けれど、その日の夕暮れに見た海の景色はとても綺麗で。"
translation = "하지만 그날 해 질 녘에 보았던 바다 풍경은 정말 아름다웠고."

[[dialogue]]
speaker = "unk"
original = "いつの日か、流星最強の彼女を守れるくらいに強い男になろう──そう思うのだった。"
translation = "언젠가 유성 최강인 그녀를 지킬 수 있을 정도로 강한 남자가 되자── 그렇게 생각했다."

