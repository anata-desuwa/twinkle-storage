[[dialogue]]
speaker = "unk"
original = "戦いを終えた後、俺たちは落ち着いて話す為に、新星学園の会議室へと移動した。"
translation = "싸움을 마친 뒤 우리는 차분히 이야기하기 위해 신성학원의 회의실로 이동했다."

[[dialogue]]
speaker = "トマル"
original = "「――みなさま、遅くなって申し訳ありませんでした。シズハさまが呼ぶ声が頭の中に聞こえてきて、急いで駆け付けたのですが……」"
translation = "「――여러분, 늦어서 죄송했습니다. 시즈하 님이 부르는 목소리가 머릿속에 들려와서 서둘러 달려왔습니다만……」"

[[dialogue]]
speaker = "シズハ"
original = "「ヴィクトリアフォームの願いを叶える力でトマル君に呼びかけて、仮想空間に入って来れるようにゲートを作っておいたのよ♪」"
translation = "「빅토리아 폼의 소원을 이루는 힘으로 토마루 군에게 말을 걸어서 가상 공간에 들어올 수 있도록 게이트를 만들어 뒀어♪」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「それで、トマルさんが駆け付けたことに気づいて、隙ができたところを狙撃してもらうように、気配を潜めて待機してもらっていたんです」"
translation = "「그래서 토마루 씨가 달려온 것을 눈치채고, 빈틈이 생겼을 때 저격하도록 기척을 죽이고 대기해 달라고 부탁했답니다」"

[[dialogue]]
speaker = "サチ"
original = "「そうだったんだね。ありがとう、トマルくん♪\u3000おかげで最後の攻撃に繋げられたよ」"
translation = "「그랬구나. 고마워, 토마루 군♪ 덕분에 마지막 공격으로 이어질 수 있었어」"

[[dialogue]]
speaker = "トマル"
original = "「お役に立てたなら、何よりです♪」"
translation = "「도움이 되었다면 무엇보다 다행입니다♪」"

[[dialogue]]
speaker = "プリムラ"
original = "「シズハもよくやったのじゃ！\u3000ヴィクトリアフォームの覚醒がなければ、我とサチは暴走したままで敗北していたかもしれんからな！」"
translation = "「시즈하도 잘했느니라! 빅토리아 폼의 각성이 없었다면 짐과 사치는 폭주한 채로 패배했을지도 모르니까 말이다!」"

[[dialogue]]
speaker = "シズハ"
original = "「ううん。私よりも、今回はディーちゃんが私の願いに応えてくれたおかげだよ」"
translation = "「아니야. 나보다 이번엔 디짱이 내 소원에 응해준 덕분이야」"

[[dialogue]]
speaker = "ディーラック"
original = "「は？\u3000ボクは別に……」"
translation = "「하? 난 딱히……」"

[[dialogue]]
speaker = "プリムラ"
original = "「そうじゃな。ディーラック――」"
translation = "「그렇구나. 디럭쿠――」"

[[dialogue]]
speaker = "プリムラ"
original = "「今回はお前にも礼を言わねばなるまい。……感謝しとくぞ」"
translation = "「이번엔 너에게도 인사를 해야겠군. ……감사하마」"

[[dialogue]]
speaker = "ディーラック"
original = "「はぁ！？\u3000お前、なに礼なんか言って……」"
translation = "「하아!? 너, 무슨 인사를 하고 그래……」"

[[dialogue]]
speaker = "サチ"
original = "「私からも、ありがとうございます、ディーラックさん。助かりました」"
translation = "「저로서도 고맙습니다, 디럭쿠 씨. 도움이 되었어요」"

[[dialogue]]
speaker = "ディーラック"
original = "「っ……なに調子こいてんだよ、お前ら！\u3000ボクは獅子舞にかけられた『枷の術式』のせいで、シズハちゃんの命令を聞かざるを得ないだけであって――」"
translation = "「윽…… 왜 이리들 들떠 있는 거야, 너희들! 난 사자춤에 걸린 『멍에의 술식』 때문에 시즈하짱의 명령을 들을 수밖에 없는 것뿐이고――」"

[[dialogue]]
speaker = "ディーラック"
original = "「ヒトカス共なんて、別に助けたつもりなんてないっつーの！\u3000なのに勝手に勘違いして礼を言って、バカなんじゃない？」"
translation = "「인간 쓰레기들 따위 딱히 도울 생각 없었다니까! 그런데 멋대로 착각해서 고맙다니, 바보 아니야?」"

[[dialogue]]
speaker = "プリムラ"
original = "「なっ、貴様……！\u3000せっかく我が感謝してやってるというのに、下手に出ればこのっ！」"
translation = "「나닛, 네놈……! 기껏 짐이 감사해하고 있거늘, 저자세로 나가니 이놈이!」"

[[dialogue]]
speaker = "ディーラック"
original = "「ちょっ……お前、いたたたっ！\u3000尻尾をまた引っ張んな！\u3000何してんのサ、コラ！」"
translation = "「잠깐…… 너, 아야야얏! 꼬리 또 잡아당기지 마! 뭐 하는 거야, 이봐!」"

[[dialogue]]
speaker = "プリムラ"
original = "「貴様が素直に、感謝を受け取らんからじゃ！\u3000エントロフィーには、シズハに手を出すな、ぶっ殺すぞとか、言ってた癖に！」"
translation = "「네놈이 솔직하게 감사를 받지 않으니까 그렇지! 엔트로피한테는 시즈하에게 손대지 마라, 죽여버리겠다느니 말해놓고선!」"

[[dialogue]]
speaker = "ディーラック"
original = "「はぁっ！？\u3000うっさいなぁ！\u3000細かいことをいちいちほじくり返すなよ、バーカバーカ！」"
translation = "「하아!? 시끄러워! 세세한 거 일일이 들춰내지 말라고, 바보바보!」"

[[dialogue]]
speaker = "プリムラ"
original = "「バカじゃと！？\u3000なら貴様はアホじゃ！\u3000アーホアーホ！」"
translation = "「바보라고!? 그럼 네놈은 멍청이니라! 멍~청멍~청!」"

[[dialogue]]
speaker = "トマル"
original = "「ふふっ、お２人とも仲がよろしいですね♪」"
translation = "「후후, 두 분 다 사이가 좋으시네요♪」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「さすが親子ですよね～。喧嘩のノリがそっくりです♪」"
translation = "「역시 부모 자식 같네요~. 싸우는 분위기가 판박이에요♪」"

[[dialogue]]
speaker = "プリムラ"
original = "「誰が親子じゃ！？\u3000こいつが生みの親とか認めとらんわ！」"
translation = "「누가 부모 자식이라는 게냐!? 이 녀석이 낳아준 부모라는 거 인정 안 하느니라!」"

[[dialogue]]
speaker = "ディーラック"
original = "「ほら～、ママの言うことはちゃんと聞かないとダメでちゅよ～？\u3000プリムラちゃ～ん」"
translation = "「자~ 엄마 말은 잘 들어야 하는 거란다~? 프리뮬러짱~」"

[[dialogue]]
speaker = "プリムラ"
original = "「赤ちゃん扱いすなぁ！」"
translation = "「아기 취급 하지 마라!」"

[[dialogue]]
speaker = "サチ"
original = "「赤ちゃん……ふっ……ふふっ……♪」"
translation = "「아기…… 훗…… 후훗……♪」"

[[dialogue]]
speaker = "プリムラ"
original = "「なにサチも笑っとんのじゃ！？\u3000我が暴走した時よりも、サチの暴走した時の方が酷かったじゃろうが！？」"
translation = "「사치 너는 왜 웃는 게냐!? 짐이 폭주했을 때보다 사치 네가 폭주했을 때가 훨씬 심했지 않았느냐!?」"

[[dialogue]]
speaker = "プリムラ"
original = "「今回のリバースフォームの訓練中、一体何回暴走して、眷族をハレンチな目に合わせたと思って――」"
translation = "「이번 리버스 폼 훈련 중에 도대체 몇 번이나 폭주해서 <u>권속(眷族)</u>을 파렴치한 꼴로 만들었다고 생각――」"

[[dialogue]]
speaker = "サチ"
original = "「ちょっ……それはぁ～～っ！？\u3000言うの禁止ーーーっ！！」"
translation = "「잠깐…… 그건 말하면 안 돼~~!! 말하기 금지――!!」"

[[dialogue]]
speaker = "unk"
original = "そういえば、反転の力はどうなったんだ？"
translation = "그러고 보니 반전의 힘은 어떻게 됐어?"

[[dialogue]]
speaker = "サチ"
original = "「それについてなんですが……」"
translation = "「그거에 대해서입니다만……」"

[[dialogue]]
speaker = "サチ"
original = "「以前に比べて、かなり戦えるようにはなったんですが、通常フォームにはまだ戻れないみたいで……」"
translation = "「이전에 비해 상당히 싸울 수 있게는 되었습니다만, 통상 폼으로는 아직 돌아갈 수 없는 것 같아서……」"

[[dialogue]]
speaker = "プリムラ"
original = "「我もデストロイフォームになれんし、サチのフォルトゥーナフォームも封印されたままじゃの」"
translation = "「짐도 디스트로이 폼이 될 수 없고, 사치의 포르투나 폼도 봉인된 채로구나」"

[[dialogue]]
speaker = "プリムラ"
original = "「まあ今回、エントロフィーの奴も捕まらんかったし、『反転のロストアイテム』も逃したままじゃからな」"
translation = "「뭐 이번에 엔트로피 녀석도 못 잡았고, 『반전의 로스트 아이템』도 놓친 채니까 말이다」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「全部めでたしハッピーエンド！\u3000ってわけにはいきませんでしたが、リバースフォームにはリバースフォーム独自の強さがあります！」"
translation = "「전부 경사로다 해피 엔딩! 이라는 건 아니었지만, 리버스 폼에는 리버스 폼만의 강함이 있습니다!」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「流石にフォルトゥーナフォームほどではありませんが、新たな可能性の芽吹きということで、良しとしようじゃありませんか！」"
translation = "「과연 포르투나 폼만큼은 아니지만, 새로운 가능성의 싹이 텄다는 것으로 좋게 봐주지 않겠습니까!」"

[[dialogue]]
speaker = "サチ"
original = "「そう、ですね……。そんなわけでお兄さん、しばらくは戦力ダウンってことになっちゃうんですが、すみません……」"
translation = "「그렇, 네요……. 그런 고로 오빠, 당분간은 전력이 떨어지게 되겠지만 죄송해요……」"

[[dialogue]]
speaker = "unk"
original = "その時は遠慮なく俺を呼んでね"
translation = "그럴 때는 사양 말고 나를 불러"

[[dialogue]]
speaker = "unk"
original = "じゃあ次のロストアイテムを見つけたら"
translation = "그럼 다음 로스트 아이템을 찾으면 되겠네"

[[dialogue]]
speaker = "サチ"
original = "「はい！\u3000ありがとうございます、お兄さん♪」"
translation = "「네! 고마워요, 오빠♪」"

[[dialogue]]
speaker = "シズハ"
original = "「ねぇ、ディーちゃん」"
translation = "「있지, 디짱」"

[[dialogue]]
speaker = "ディーラック"
original = "「あん？\u3000なにサ、シズハちゃん」"
translation = "「앙? 뭐야, 시즈하짱」"

[[dialogue]]
speaker = "シズハ"
original = "「改めて、これから私と一緒に戦ってくれる？」"
translation = "「다시 한번, 앞으로 나랑 같이 싸워줄래?」"

[[dialogue]]
speaker = "ディーラック"
original = "「はん、イヤだね……と言いたいところだけど」"
translation = "「흥, 싫어……라고 말하고 싶지만」"

[[dialogue]]
speaker = "ディーラック"
original = "「どっちにしろ、『枷の術式』のせいで、シズハちゃんの言うことは聞かざるを得ないから、仕方ないね」"
translation = "「어차피 『멍에의 술식』 때문에 시즈하짱의 말은 들을 수밖에 없으니까 어쩔 수 없지」"

[[dialogue]]
speaker = "シズハ"
original = "「私は別に、獅子舞さんとかトレジアンナさんに頼んで、術式を解除してもらってもいいよ？」"
translation = "「나는 딱히 사자춤 씨나 트레지안나 씨에게 부탁해서 술식을 해제해 줘도 괜찮은데?」"

[[dialogue]]
speaker = "ディーラック"
original = "「は？\u3000…………そんなの、あの獅子舞が許すわけないのサ！」"
translation = "「하? ………… 그런 거 그 사자춤이 허락할 리 없잖아!」"

[[dialogue]]
speaker = "ディーラック"
original = "「……シズハちゃんってさ」"
translation = "「……시즈하짱 말이야」"

[[dialogue]]
speaker = "シズハ"
original = "「うん？」"
translation = "「응?」"

[[dialogue]]
speaker = "ディーラック"
original = "「本っ当に、心底、愚か者だよね」"
translation = "「정말로 뼛속까지 어리석은 녀석이네」"

[[dialogue]]
speaker = "シズハ"
original = "「ふふっ♪\u3000そうかも」"
translation = "「후훗♪ 그럴지도」"

[[dialogue]]
speaker = "シズハ"
original = "「でも――私はディーちゃんのことを信じるって、もう決めてるから」"
translation = "「하지만―― 나는 디짱을 믿기로 이미 결정했으니까」"

[[dialogue]]
speaker = "ディーラック"
original = "「はん、バカなヒトカス」"
translation = "「흥, 멍청한 인간 쓰레기」"

[[dialogue]]
speaker = "unk"
original = "そっぽを向きながら、悪態をつくディーラックであったが――"
translation = "고개를 돌리며 험담을 내뱉는 디럭쿠였지만――"

[[dialogue]]
speaker = "unk"
original = "その声色はどこか、機嫌よさげに聞こえるのだった。"
translation = "그 음색은 어딘지 기분 좋게 들리는 것이었다."

[[dialogue]]
speaker = "unk"
original = "一方、その頃。"
translation = "한편, 그 무렵."

[[dialogue]]
speaker = "エントロフィー"
original = "「エントロフィー、戻りました～♪」"
translation = "「엔트로피, 돌아왔슴다~♪」"

[[dialogue]]
speaker = "？？？？？"
original = "「――ご苦労様です」"
translation = "「――수고했어요」"

[[dialogue]]
speaker = "unk"
original = "椅子に座って、映写機から投影される魔法少女たちのリアルタイム映像を眺めていた女性は、エントロフィーに視線を移す。"
translation = "의자에 앉아 영사기에서 투영되는 마법 소녀들의 리얼타임 영상을 바라보던 여성은 엔트로피에게 시선을 옮긴다."

[[dialogue]]
speaker = "エントロフィーL"
original = "「いえいえ♪\u3000それで、いかがっすか、『虚構の魔女』様？」"
translation = "「아니에여♪ 그래서 어떠심까, 『허구의 마녀』 님?」"

[[dialogue]]
speaker = "虚構の魔女"
original = "「観察していましたが……魔法少女、素晴らしいですね」"
translation = "「관찰하고 있었습니다만…… 마법 소녀, 훌륭하군요」"

[[dialogue]]
speaker = "エントロフィーL"
original = "「いや～、そうっすよね～♪」"
translation = "「그쳐~ 정말 그렇슴다~♪」"

[[dialogue]]
speaker = "エントロフィーL"
original = "「最初は、反転のロストアイテムなら余裕で勝てそうかと思ってたんですけど～」"
translation = "「처음엔 반전의 로스트 아이템이라면 여유롭게 이길 줄 알았는데~」"

[[dialogue]]
speaker = "エントロフィーL"
original = "「まさか土壇場で、シズハのアネさんが覚醒するとは思わなかったっすよ～♪」"
translation = "「설마 막판에 시즈하 누님이 각성할 줄은 몰랐어여~♪」"

[[dialogue]]
speaker = "虚構の魔女"
original = "「私も、予想していませんでした。ですが……」"
translation = "「저도 예상하지 못했습니다. 하지만……」"

[[dialogue]]
speaker = "虚構の魔女"
original = "「だからこそ、『<ruby>虚構<rt>フィクション</rt></ruby>』の素材として、素晴らしい」"
translation = "「그렇기에 『허구<rt>픽션</rt>』의 소재로서 훌륭하죠」"

[[dialogue]]
speaker = "虚構の魔女"
original = "「これなら下らない<ruby>現実<rt>リアル</rt></ruby>を、<ruby>虚構<rt>フィクション</rt></ruby>で置き換えることができそうです」"
translation = "「이거라면 시시한 현실<rt>리얼</rt>을 허구<rt>픽션</rt>으로 대체할 수 있겠군요」"

[[dialogue]]
speaker = "unk"
original = "自らの力で作り出した虚構の空間から、映像越しに現実の世界を眺める１人の魔女は、そう呟くのだった。"
translation = "스스로의 힘으로 만들어낸 허구의 공간에서 영상을 통해 현실 세계를 바라보는 한 명의 마녀는 그렇게 중얼거리는 것이었다."

