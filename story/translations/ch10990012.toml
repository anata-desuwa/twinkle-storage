[[dialogue]]
speaker = "unk"
original = "第２話,プランこねこねお散歩タイム,P"
translation = "제2화, 플랜 조물조물 산책 타임"

[[dialogue]]
speaker = "unk"
original = "ゴールデングースとの合同任務から数日後──"
translation = "골든 구스와의 합동 임무로부터 며칠 후──"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「あっ、会長さん、こんにちは。会長さんもお散歩ですか？」"
translation = "「앗, 회장님, 안녕하세요. 회장님도 산책 중이신가요?」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「私、お散歩しつつ、考えごとをするのが趣味……というか癖になってまして」"
translation = "「전 산책하면서 생각을 하는 게 취미……라기보다 버릇이 되어서요.」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「歩いている時って、不意にアイデアが湧くんです。まるで、天から降ってくるみたいに」"
translation = "「걷고 있을 때는 문득 아이디어가 샘솟거든요. 마치 하늘에서 내려오는 것처럼.」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「よろしかったら、会長さんも一緒にお散歩してみませんか？」"
translation = "「괜찮으시다면 회장님도 같이 산책해 보지 않으실래요?」"

[[dialogue]]
speaker = "unk"
original = "考え事してるなら、お邪魔じゃない？"
translation = "생각 중이라면 방해되지 않을까?"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「いえいえ、人と話すことでもアイデアが湧くこともありますから。何が閃きの鍵になるかわからない意外性が、すごく面白いんです」"
translation = "「아뇨아뇨, 사람과 대화하면서 아이디어가 떠오를 때도 있으니까요. 무엇이 영감의 열쇠가 될지 모르는 의외성이 아주 재밌거든요.」"

[[dialogue]]
speaker = "unk"
original = "どうやら迷惑ではなさそうなので、ミウの散歩に付き合うことにした。"
translation = "아무래도 민폐는 아닌 듯하여 미우의 산책에 동행하기로 했다."

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「ふう、結構歩きましたね。ちょっと休憩しましょう」"
translation = "「후우, 꽤 걸었네요. 잠깐 쉴까요.」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「そうだ。先日の任務では私のプランに付き合っていただき、ありがとうございます」"
translation = "「그렇지. 지난번 임무에서는 제 플랜에 응해주셔서 감사합니다.」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「会長さんのおかげで、想定以上の結果を残せました。まさか、たったひとりで、引き付けた敵のほとんどを倒してしまうなんて」"
translation = "「회장님 덕분에 상상 이상의 결과를 남길 수 있었어요. 설마 혼자서 유인한 적 대부분을 쓰러뜨려 버릴 줄이야.」"

[[dialogue]]
speaker = "unk"
original = "倒しちゃダメとは言われてなかったからね"
translation = "쓰러뜨리면 안 된다는 말은 없었으니까."

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「頭数を減らしてくれて、本当に助かりました。おかげで私もサポートに専念できましたし、会長さんの戦力値はすごく高めに見積った方が良さそうですね」"
translation = "「머릿수를 줄여주셔서 정말 도움이 됐어요. 덕분에 저도 서포트에 전념할 수 있었고, 회장님의 전력치는 아주 높게 견적을 내는 게 좋을 것 같네요.」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「……え？\u3000私に聞きたいことですか？\u3000別に構いませんけど」"
translation = "「……네? 저에게 묻고 싶은 것이요? 별로 상관없습니다만.」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「そうですね、私ばかり一方的に知っているのもフェアじゃありませんし、改めて、自己紹介させていただきますね」"
translation = "「그렇네요, 저만 일방적으로 알고 있는 것도 페어하지 않으니 다시 한번 자기소개를 할게요.」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「深沢ミウ、附属の２年生で、ゴールデングースの見習い社員です。よろしくお願いします」"
translation = "「후카자와 미우, 부속 2학년이고 골든 구스의 견습 사원입니다. 잘 부탁드립니다.」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「親友はヒマワリちゃん。趣味はスマホゲームとお散歩……あとはゴールデングースでの活動ですかね」"
translation = "「친한 친구는 히마와리짱. 취미는 스마트폰 게임과 산책…… 그리고 골든 구스에서의 활동일까요.」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「家族構成……ですか？\u3000父は銀行員で、母は会社員です。兄弟はいません」"
translation = "「가족 구성……인가요? 아버지는 은행원이시고 어머니는 회사원이세요. 형제는 없습니다.」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「家庭環境は至って良好な部類だと思います。一人っ子なのもあって、両親にはしっかりと愛情を注いでもらったと思ってます……なんでそんなことを聞かれるんです？」"
translation = "「가정 환경은 지극히 양호한 편이라고 생각해요. 외동딸이라 부모님께 사랑을 듬뿍 받고 자랐다고 생각합니다…… 그런데 왜 그런 걸 물으시는 거죠?」"

[[dialogue]]
speaker = "unk"
original = "ミウってプランニングが得意だよね？"
translation = "미우는 플래닝이 특기지?"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「はい、セナリィ社長にもプランニング能力を買ってもらってますね。私の発想が社長のお役に立ててるなら、こんなに嬉しいことはないです」"
translation = "「네, 세나리 사장님도 플래닝 능력을 높게 평가해 주시죠. 제 발상이 사장님께 도움이 된다면 이보다 기쁜 일은 없어요.」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「どうしてそんなに容赦がないのか……？\u3000おっしゃっている意味がよく分かりません」"
translation = "「어째서 그렇게 가차가 없는가……? 하시는 말씀의 의미를 잘 모르겠어요.」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「自分や大切な人に危害を加えようとしてくる敵を確実に倒すのって、当然じゃないですか？」"
translation = "「자신이나 소중한 사람에게 위해를 가하려는 적을 확실히 쓰러뜨리는 건 당연한 거 아닌가요?」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「禍根を残したら、いずれ反撃されるかもしれませんし、やるからには草の根まで潰さないと、ですよね」"
translation = "「화근을 남기면 언젠가 반격당할지도 모르고, 할 거라면 뿌리까지 뽑아야겠죠.」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「特に社長やヒマワリちゃんを傷つけるような悪い人に情けはかけないです。もちろん、会長さんの敵にも」"
translation = "「특히 사장님이나 히마와리짱을 상처입히는 나쁜 사람에게 자비는 없어요. 물론 회장님의 적에게도요.」"

[[dialogue]]
speaker = "unk"
original = "無邪気で可愛い笑顔の裏に、どんな凄惨な過去や闇を抱えているのかと不安になったけれど、彼女のこれは生まれもっての性格らしい。"
translation = "천진하고 귀여운 미소 뒤에 어떤 처참한 과거와 어둠을 안고 있는 걸까 불안해졌지만, 그녀의 이것은 타고난 성격인 모양이다."

[[dialogue]]
speaker = "unk"
original = "（それはそれでちょっと危ない子かも……）"
translation = "(그건 그거대로 좀 위험한 아이일지도……)"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「あとはそうですね……尊敬している人はセナリィ社長、好きなのはヒマワリちゃんとクマのぬいぐるみ……あっ、鯛焼きも大好物です！」"
translation = "「그 외에는 그렇네요…… 존경하는 분은 세나리 사장님, 좋아하는 건 히마와리짱과 곰 인형…… 앗, 붕어빵도 아주 좋아해요!」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「逆に苦手なものといえば、これはあまり言いたくないんですけど──」"
translation = "「반대로 못하는 거라고 하면, 이건 별로 말하고 싶지 않지만──」"

[[dialogue]]
speaker = "unk"
original = "あっ、カエル"
translation = "앗, 개구리다."

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「きっ──きぃやあぁあぁああぁぁぁぁっ！！」"
translation = "「기── 갸아아아아아아아악!!」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「ダ、ダメなんです！\u3000カエルとかヘビとかヌメヌメしてて何考えてるかわかんない顔してる生き物はっ！\u3000生理的に無理なんですぅうぅぅーっ！」"
translation = "「아, 안 돼요! 개구리나 뱀같이 미끈미끈하고 무슨 생각을 하는지 모를 얼굴을 한 생물은! 생리적으로 무리란 말이에요오오!!」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「見えないとこにどけてください、追い払ってください！\u3000お願いしますお願いします！\u3000なんでもっ、なんでもしますからぁぁーっ！」"
translation = "「안 보이는 곳으로 치워주세요, 쫓아내 주세요! 부탁이에요 부탁이에요! 뭐든지, 뭐든지 할 테니까아아!!」"

[[dialogue]]
speaker = "unk"
original = "追い払ったよ"
translation = "쫓아냈어."

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「はーっ、はーっ、はーっ……！\u3000あ、ありがとうございます……助かりました……会長さんは命の恩人です……！」"
translation = "「하아, 하아, 하아……! 가, 감사합니다…… 살았어요…… 회장님은 생명의 은인이에요……!」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「お、大袈裟じゃないんですよぉ……っ！\u3000はーっ、はーっ……ふぅぅぅ……やっと落ち着いてきましたぁ……」"
translation = "「과, 과장이 아니라고요……! 하아, 하아…… 후우…… 겨우 진정됐네요……」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「この付近のカエルを絶滅させるにはどうすればいいでしょうか……」"
translation = "「이 근처의 개구리를 멸종시키려면 어떻게 해야 할까요……」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「繁殖地域一帯を、爆薬で吹き飛ばせば……いえ、現実的ではありませんし、外部からまた入ってきますね。巣の捜索と駆除、天敵の導入に……」"
translation = "「번식 지역 일대를 폭약으로 날려버리면…… 아니, 현실적이지 않고 외부에서 또 들어오겠군요. 둥지 수색과 구제, 천적 도입……」"

[[dialogue]]
speaker = "unk"
original = "ストップ、ストップ、ストーップ！"
translation = "스톱, 스톱, 스토옵!"

[[dialogue]]
speaker = "unk"
original = "まるで、一度火が点いたら消すのが困難な導火線。ミウの取り扱いには気をつけようと思うのだった。"
translation = "마치 한 번 불이 붙으면 끄기 어려운 도화선. 미우를 다룰 때는 조심해야겠다고 생각했다."

