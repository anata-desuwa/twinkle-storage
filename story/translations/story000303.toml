[[dialogue]]
speaker = "？？？"
original = "「対象の消滅を確認」"
translation = "「대상 소멸 확인.」"

[[dialogue]]
speaker = "？？？"
original = "「索敵範囲にモンスターの反応なし。戦闘態勢を解除します」"
translation = "「색적 범위 내에 몬스터 반응 없음. 전투 태세를 해제합니다.」"

[[dialogue]]
speaker = "ウェンディ"
original = "「まさか……どうして彼女がここに……？」"
translation = "「설마…… 어째서 그녀가 여기에……?」"

[[dialogue]]
speaker = "unk"
original = "誰……？"
translation = "누구……?"

[[dialogue]]
speaker = "ウェンディ"
original = "（彼女はイニシュ。私と同じくネビュラ所属の魔女です）"
translation = "(그녀는 이니슈. 저와 같은 네뷸라 소속 마녀예요.)"

[[dialogue]]
speaker = "ウェンディ"
original = "（ですが協力は期待できません。彼女はモンスターを見れば問答無用で抹殺する戦闘マシーン）"
translation = "(하지만 협력은 기대할 수 없습니다. 그녀는 몬스터를 보기만 하면 문답무용으로 말살하는 전투 머신.)"

[[dialogue]]
speaker = "ウェンディ"
original = "（一度ターゲットを認識すると、セドナ長官の命令すら無視して敵を駆逐します。モンスターの捕獲を頼むとか不可能です）"
translation = "(한번 타겟을 인식하면 세드나 장관님의 명령조차 무시하고 적을 구축합니다. 몬스터 포획을 부탁하는 건 불가능해요.)"

[[dialogue]]
speaker = "ウェンディ"
original = "（しかも、単純な戦闘力ならセドナ長官に匹敵すると思われます。暴れ出したら私たちじゃとても止められません）"
translation = "(게다가 단순한 전투력이라면 세드나 장관님께 필적할 것으로 추정됩니다. 날뛰기 시작하면 우리로선 도저히 막을 수 없어요.)"

[[dialogue]]
speaker = "ウェンディ"
original = "「イニシュ、あなたはスリープ中だったのでは？\u3000誰かの命令を受けてここに来たのですか？」"
translation = "「이니슈, 당신은 슬립 중이 아니었나요? 누군가의 명령을 받고 여기에 온 겁니까?」"

[[dialogue]]
speaker = "イニシュ"
original = "「私がエネルギー補給のためにスリープから目覚めた際、ネビュラ基地から遠ざかっていくモンスターの反応を探知。微弱な痕跡を辿ってこちらに到着しました」"
translation = "「제가 에너지 보급을 위해 슬립에서 깨어났을 때, 네뷸라 기지에서 멀어져 가는 몬스터의 반응을 탐지. 미약한 흔적을 따라 이곳에 도착했습니다.」"

[[dialogue]]
speaker = "ウェンディ"
original = "（う……イニシュの活動期間と被るとは運のない……）"
translation = "(으…… 이니슈의 활동 기간과 겹치다니 운도 없지……)"

[[dialogue]]
speaker = "ウェンディ"
original = "「なら命令は受けていないのですね。無断出撃は規則違反です。速やかに帰投しなさい」"
translation = "「그럼 명령은 받지 않은 거군요. 무단 출격은 규칙 위반입니다. 조속히 귀환하세요.」"

[[dialogue]]
speaker = "イニシュ"
original = "「ネビュラはリクリエと戦うための組織です。モンスターを見逃すことはネビュラの存在意義に反します」"
translation = "「네뷸라는 리크리에와 싸우기 위한 조직입니다. 몬스터를 못 본 체하는 것은 네뷸라의 존재 의의에 반합니다.」"

[[dialogue]]
speaker = "ウェンディ"
original = "「それは否定しません。しかし組織の規律を守りなさいと言っているのです」"
translation = "「그건 부정하지 않겠어요. 하지만 조직의 규율을 지키라고 말하는 겁니다.」"

[[dialogue]]
speaker = "イニシュ"
original = "「受諾できません。ネビュラがリクリエより規律を優先するなら、私だけでモンスターを追います」"
translation = "「수락할 수 없습니다. 네뷸라가 리크리에보다 규율을 우선한다면, 저 혼자서 몬스터를 쫓겠습니다.」"

[[dialogue]]
speaker = "ウェンディ"
original = "（ほら、言った通りでしょう。彼女はモンスターを倒すことしか考えていないんですから）"
translation = "(봐요, 말한 대로죠? 그녀는 몬스터를 쓰러뜨리는 것밖에 생각하지 않으니까요.)"

[[dialogue]]
speaker = "イニシュ"
original = "「ウェンディは何をしていたのですか？」"
translation = "「웬디는 무엇을 하고 있었습니까?」"

[[dialogue]]
speaker = "ウェンディ"
original = "「え？\u3000えーと、それは……モンスターを追って……」"
translation = "「네? 에 그러니까, 그건…… 몬스터를 쫓아서……」"

[[dialogue]]
speaker = "イニシュ"
original = "「ならば私も同行します。その方が効率的にモンスターを殲滅できます」"
translation = "「그렇다면 저도 동행하겠습니다. 그편이 효율적으로 몬스터를 섬멸할 수 있습니다.」"

[[dialogue]]
speaker = "ウェンディ"
original = "「ええっ！？」"
translation = "「에엣!?」"

[[dialogue]]
speaker = "ウェンディ"
original = "（だから改造実験のことは知らせなかったのに……ただでさえ大変なのに、余計厄介な……）"
translation = "(그래서 개조 실험 건은 알리지 않았던 건데…… 가뜩이나 힘든데 더 골치 아프게……)"

[[dialogue]]
speaker = "unk"
original = "（これはまずいのでは……？）"
translation = "(이거 큰일 난 거 아니야……?)"

[[dialogue]]
speaker = "ウェンディ"
original = "（ええ、一段と状況が悪化しました。さっきの１体だけならごまかせるかもしれませんが、このままだとイニシュに狩り尽くされてしまいます）"
translation = "(네, 상황이 한층 더 악화됐습니다. 아까 그 한 마리 정도라면 얼버무릴 수 있을지 모르지만, 이대로라면 이니슈에게 사냥당해 사라지고 말 거예요.)"

[[dialogue]]
speaker = "ウェンディ"
original = "（別行動もダメです。私たちがもたついている間に、イニシュがサーチアンドデストロイで全滅させるに違いありません。つまり──）"
translation = "(따로 행동하는 것도 안 됩니다. 우리가 머뭇거리는 사이에 이니슈가 서치 앤 디스트로이로 전멸시킬 게 분명해요. 즉──)"

[[dialogue]]
speaker = "ウェンディ"
original = "（私たちでイニシュを引きつけつつ、こっそりモンスターを捕獲するしかありません……！）"
translation = "(우리가 이니슈를 붙잡아 두면서 몰래 몬스터를 포획하는 수밖에 없습니다……!)"

[[dialogue]]
speaker = "unk"
original = "（そんな無茶な……！？）"
translation = "(그런 말도 안 되는……!?)"

[[dialogue]]
speaker = "イニシュ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "（ち、近い……）"
translation = "(가, 가깝다……)"

[[dialogue]]
speaker = "イニシュ"
original = "「ネビュラのデータベースは確認しました。あなたが魔王ですか」"
translation = "「네뷸라의 데이터베이스는 확인했습니다. 당신이 마왕입니까?」"

[[dialogue]]
speaker = "イニシュ"
original = "「私はイニシュ。魔女にとってもリクリエは看過できないもの。ともに破滅を防ぎましょう。よろしくお願いします」"
translation = "「저는 이니슈. 마녀에게도 리크리에은 간과할 수 없는 것. 함께 파멸을 막읍시다. 잘 부탁드립니다.」"

[[dialogue]]
speaker = "イニシュ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "イニシュ"
original = "「……………………」"
translation = "「……………………」"

[[dialogue]]
speaker = "ウェンディ"
original = "「イニシュが喋らないのはいつものことなので気にしないでください。私も私的なコミュニケーションが多い方ではありませんが、彼女は特に機械的でして……」"
translation = "「이니슈가 말을 안 하는 건 늘 있는 일이니 신경 쓰지 마세요. 저도 사적인 소통이 많은 편은 아니지만 그녀는 특히 기계적이라서요……」"

[[dialogue]]
speaker = "ウェンディ"
original = "「正直、私も彼女のことはよくわかりません。これでも５０年以上の付き合いなのですが、年単位でスリープしていることもありますから」"
translation = "「솔직히 저도 그녀에 대해서는 잘 모릅니다. 이래 봬도 50년 이상 알고 지냈지만, 연 단위로 슬립하고 있을 때도 있으니까요.」"

[[dialogue]]
speaker = "ウェンディ"
original = "「そんなに驚かないでください。魔女は長命な種族ですから、私のように１００歳を超えている者は珍しくありません」"
translation = "「그렇게 놀라지 마세요. 마녀는 장수하는 종족이라 저처럼 100세를 넘긴 자는 드물지 않습니다.」"

[[dialogue]]
speaker = "unk"
original = "１００歳……！？"
translation = "100세……!?"

[[dialogue]]
speaker = "ウェンディ"
original = "「なのに周りは私を若輩扱い……皆さんのお金の管理をしているのは誰だと思っているんですか」"
translation = "「그런데 주변에선 저를 애송이 취급…… 당신들 돈 관리를 누가 하고 있다고 생각하는 건가요.」"

[[dialogue]]
speaker = "ウェンディ"
original = "「……すみません、愚痴でした。ネビュラでもいろいろと気苦労が絶えなくて」"
translation = "「……죄송합니다, 푸념이었어요. 네뷸라에서도 여러모로 고생이 끊이질 않아서.」"

[[dialogue]]
speaker = "環"
original = "「あ、会長じゃーん。何して……ってまた女の子と一緒にいるー。しかも知らない女の子だし」"
translation = "「아, 회장이잖아. 뭐해…… 어라, 또 여자애랑 같이 있네. 게다가 모르는 애고.」"

[[dialogue]]
speaker = "環"
original = "「もしかして浮気？\u3000衝撃の現場目撃しちゃった？」"
translation = "「설마 바람? 충격적인 현장을 목격해 버린 걸까?」"

[[dialogue]]
speaker = "unk"
original = "道案内してあげてるだけだよ"
translation = "길을 안내해 주고 있을 뿐이야."

[[dialogue]]
speaker = "ウェンディ"
original = "「そ、そうなんです。私たち、この辺には不慣れで。困っていたら彼が声をかけてくれたんです」"
translation = "「그, 그렇습니다. 저희가 이 근처 지리에 서툴러서요. 곤란해하던 차에 그가 말을 걸어 주었습니다.」"

[[dialogue]]
speaker = "環"
original = "「いやいや、それナンパだって。優しくするふりして近づくのが手口なんだから。気を付けた方がいいよ？」"
translation = "「에이~ 그거 헌팅이라니까. 친절한 척 접근하는 게 수법이거든. 조심하는 게 좋을걸?」"

[[dialogue]]
speaker = "ウェンディ"
original = "「む。私は立派な大人です。そんなチャラチャラした男には引っかかりません」"
translation = "「무. 저는 훌륭한 성인입니다. 그런 가벼운 남자한테는 안 넘어가요.」"

[[dialogue]]
speaker = "ウェンディ"
original = "「あなたこそ、ただの学生のくせして、知った顔で忠告しないでください」"
translation = "「당신이야말로 일개 학생 주제에 아는 척하며 충고하지 마세요.」"

[[dialogue]]
speaker = "環"
original = "「──」"
translation = "「──」"

[[dialogue]]
speaker = "環"
original = "「あはは、あははははっ！」"
translation = "「아하하, 아하하하하!」"

[[dialogue]]
speaker = "ウェンディ"
original = "「なんでそこで爆笑してるんですか！？」"
translation = "「왜 거기서 폭소하는 건가요!?」"

[[dialogue]]
speaker = "環"
original = "「ごめんごめん、ちょっとふざけすぎたなって。それにしても……」"
translation = "「미안 미안, 조금 너무 장난쳤나 싶어서. 그나저나……」"

[[dialogue]]
speaker = "イニシュ"
original = "「私に何か？」"
translation = "「제게 무슨 볼일이라도?」"

[[dialogue]]
speaker = "環"
original = "「いや、個性的な子だなーって思ってさ。流星市国の周りだと、奇抜なカッコした人はそこまで珍しいわけでもないけど」"
translation = "「아니, 개성적인 애구나 싶어서. 유성시국 주변이라면 독특한 차림을 한 사람이 그렇게 드문 건 아니지만.」"

[[dialogue]]
speaker = "環"
original = "（ま、星徒会のみんなにはナイショにしておいてあげる。でも浮気性はダメなんだからね）"
translation = "(뭐, 성도회 애들한테는 비밀로 해줄게. 그치만 바람기는 안 된다구?)"

[[dialogue]]
speaker = "環"
original = "「じゃーねー♪」"
translation = "「그럼 안녕~♪」"

[[dialogue]]
speaker = "ウェンディ"
original = "「なんなんですか、彼女。風のように去っていきましたね……」"
translation = "「뭐죠, 저 여학생은. 바람처럼 떠나갔네요……」"

[[dialogue]]
speaker = "環"
original = "「んー……なんかおかしなことになってるなー。ボク的には面白い展開じゃないね」"
translation = "「흐음…… 뭔가 이상하게 돌아가네. 내가 보기엔 재미없는 전개인걸.」"

[[dialogue]]
speaker = "環"
original = "「ま、せっかくだから利用させてもらおっかな？」"
translation = "「뭐, 모처럼이니까 이용해 먹어 볼까?」"

