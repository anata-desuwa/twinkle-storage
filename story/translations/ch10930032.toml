[[dialogue]]
speaker = "unk"
original = "第２話,必殺のふともも,P"
translation = "제2화, 필살의 허벅지, P"

[[dialogue]]
speaker = "unk"
original = "ただのクラスメイトから、放課後デートをする関係へと発展し、今では俺とミルフィーは恋人同士になっていた。"
translation = "평범한 반 친구에서, 방과 후 데이트를 하는 관계로 발전해, 지금은 나와 밀피는 연인 사이가 되어 있었다."

[[dialogue]]
speaker = "unk"
original = "そんな恋人のミルフィーを伴い、アリーナを訪れている。"
translation = "그런 연인인 밀피를 동반하고, 아레나를 방문했다."

[[dialogue]]
speaker = "ミルフィー"
original = "「じゃあ、行くよっ。変身！」"
translation = "「자, 간다. 변신!」"

[[dialogue]]
speaker = "ミルフィー"
original = "「はい、これがチーパオフォームだよっ」"
translation = "「자, 이게 치파오 폼이야!」"

[[dialogue]]
speaker = "unk"
original = "すごくかわいい！"
translation = "정말 귀여워!"

[[dialogue]]
speaker = "unk"
original = "おおおおおーーーっ！"
translation = "오오오오오ーー!"

[[dialogue]]
speaker = "ミルフィー"
original = "「もう、大袈裟だよぉ」"
translation = "「정말, 과장이라니까」"

[[dialogue]]
speaker = "ミルフィー"
original = "「でも、今回はかなりのスピード解決だったし、会長くんもゆっくり見る暇なかったよね」"
translation = "「하지만, 이번에는 꽤 스피드하게 해결됐고, 회장군도 느긋하게 볼 틈이 없었지」"

[[dialogue]]
speaker = "ミルフィー"
original = "「だから、改めてじっくり見たいって気持ちはわかるんだけど……」"
translation = "「그러니까, 새삼스럽게 찬찬히 보고 싶다는 기분은 이해하지만……」"

[[dialogue]]
speaker = "ミルフィー"
original = "「でも、どうしてここなの？\u3000会長くんの部屋とか、２人きりになれる場所でよかったのに」"
translation = "「그래도, 왜 여기야? 회장군의 방이라든가, 둘만 있을 수 있는 장소면 좋았을 텐데」"

[[dialogue]]
speaker = "unk"
original = "他のみんなにも見てもらいたくて"
translation = "다른 사람들에게도 보여주고 싶어서"

[[dialogue]]
speaker = "ミルフィー"
original = "「そ、そうなんだ。私は会長くんに見てもらえたら、十分満足なんだけど」"
translation = "「그, 그렇구나. 나는 회장군이 봐준다면, 충분히 만족하지만」"

[[dialogue]]
speaker = "ヒヨ"
original = "「おうおう、いくら恋人同士だからってちぃーっとばかし姐さんにくっつきすぎじゃねえか？」"
translation = "「어이어이, 아무리 연인 사이라지만 누님한테 너무 달라붙어 있는 거 아니냐?」"

[[dialogue]]
speaker = "unk"
original = "俺を押しのけるようにして割り込んできたのは新星１年の天桐ヒヨだ。"
translation = "나를 밀쳐내듯 끼어든 것은 신성 1학년인 아마기리 히요다."

[[dialogue]]
speaker = "unk"
original = "ミルフィーとは同じ陸上部の先輩後輩で、ミルフィーを慕いすぎるあまり、俺が彼女の恋人になったと聞いた時には、かなり不満そうにしていた。"
translation = "밀피와는 같은 육상부 선후배 사이로, 밀피를 너무 따른 나머지, 내가 그녀의 연인이 되었다는 소식을 들었을 때는 꽤 불만스러워 보였다."

[[dialogue]]
speaker = "ミルフィー"
original = "「ヒヨちゃん、落ち着いて……」"
translation = "「히요짱, 진정해……」"

[[dialogue]]
speaker = "ヒヨ"
original = "「おっと姐さん、それ以上は駄目だぜ。いくら惚れたもん同士とはいえ、ちょいと刺激が強すぎだ」"
translation = "「어이 누님, 그 이상은 안 된다고. 아무리 서로 반한 사이라지만, 좀 자극이 너무 강해」"

[[dialogue]]
speaker = "ヒヨ"
original = "「会長サンも男だからよ、姐さんみてぇな別嬪さんにそこまで迫られたら、いやらしい目で見ちまうだろ」"
translation = "「회장 씨도 남자니까 말이야, 누님 같은 미인한테 그렇게까지 다가오면, 음란한 눈으로 보게 될 거 아냐」"

[[dialogue]]
speaker = "ミルフィー"
original = "「そ、そうかな？\u3000会長くんを誘惑するつもりなんてなかったけど……ゆーわく……しちゃってたんだ<emoji=heart04>」"
translation = "「그, 그럴까? 회장군을 유혹할 생각은 없었지만…… 유혹…… 해버렸던 거구나♥」"

[[dialogue]]
speaker = "ヒヨ"
original = "「かーっ！\u3000姐さん姐さん、その目はいけねぇなぁ。もっと会長サンが興奮しちまうぜ」"
translation = "「카앗! 누님 누님, 그 눈은 안 된다고. 회장 씨가 더 흥분해버리잖아」"

[[dialogue]]
speaker = "カティア"
original = "「ちょっと待つです！\u3000魔王様はそんな人じゃないです！\u3000ミルフィー先輩のエッチな格好を見ても絶対興奮なんてしないワン！」"
translation = "「잠깐 기다리는 것입니다! 마왕님은 그런 사람이 아닌 것입니다! 밀피 선배의 야한 차림을 봐도 절대 흥분 따위 안 한다 멍!」"

[[dialogue]]
speaker = "unk"
original = "どこからともなく現れたのは、ミルフィーの後輩で陸上部１年のカティアだ。"
translation = "어디선가 나타난 것은, 밀피의 후배이자 육상부 1학년인 카티아다."

[[dialogue]]
speaker = "unk"
original = "俺を魔王様と慕う彼女は、事あるごとにヒヨとぶつかっているが、今回も俺を擁護しに来たらしい。"
translation = "나를 마왕님이라며 따르는 그녀는, 사사건건 히요와 부딪히고 있지만, 이번에도 나를 옹호하러 온 모양이다."

[[dialogue]]
speaker = "ヒヨ"
original = "「おいおいワン公、急に出てきたと思えば、おかしなこと言いやがって」"
translation = "「어이 어이 멍멍이, 갑자기 튀어나왔다 싶더니 이상한 소릴 지껄이고 있네」"

[[dialogue]]
speaker = "カティア"
original = "「魔王様はエッチじゃないワン！」"
translation = "「마왕님은 안 야하다 멍!」"

[[dialogue]]
speaker = "ヒヨ"
original = "「いやいや、会長サンはどこからどう見てもエッチだろ！\u3000こんなドスケベ他に見たことないぜ」"
translation = "「아니 아니, 회장 씨는 어디로 보나 야하잖아! 이런 변태는 다른 데서 본 적도 없다고」"

[[dialogue]]
speaker = "カティア"
original = "「それはっ……ミルフィー先輩のせいだワン！\u3000先輩がエッチだから、魔王様が見ちゃっても仕方ないのです」"
translation = "「그건…… 밀피 선배 탓이다 멍! 선배가 야하니까, 마왕님이 봐버려도 어쩔 수 없는 것입니다」"

[[dialogue]]
speaker = "ミルフィー"
original = "「ええっ、私のせいなの？」"
translation = "「에엣, 내 탓이야?」"

[[dialogue]]
speaker = "ヒヨ"
original = "「言うに事欠いて姐さんを悪者にしようとはとんでもねぇワン公だな」"
translation = "「할 말이 없어서 누님을 악당으로 만들려 하다니 고약한 멍멍이로구만」"

[[dialogue]]
speaker = "カティア"
original = "「悪者じゃないワン！」"
translation = "「악당 아니다 멍!」"

[[dialogue]]
speaker = "カティア"
original = "「ミルフィー先輩がエッチで……だから魔王様もエッチになっちゃって……でも恋人同士ならそれはいいことなのです！」"
translation = "「밀피 선배가 야해서…… 그래서 마왕님도 야하게 되어버리고…… 하지만 연인 사이라면 그건 좋은 일인 것입니다!」"

[[dialogue]]
speaker = "ヒヨ"
original = "「ダメだダメだ！\u3000いくら恋人同士ってぇ言っても、姐さんと会長サンが……エッチで……そういう風になって……ごにょごにょ……なことしたら……」"
translation = "「안 돼 안 돼! 아무리 연인 사이라 해도, 누님이랑 회장 씨가…… 야하게…… 그런 식으로 돼서…… 어버버…… 한 짓을 하면……」"

[[dialogue]]
speaker = "ヒヨ"
original = "「っっ～～～～～～っ！！」"
translation = "「으으~~~~~~!!」"

[[dialogue]]
speaker = "カティア"
original = "「やったぁ、私の勝利だワン！\u3000魔王様～、褒めて褒めて～」"
translation = "「해냈다, 나의 승리다 멍! 마왕님~, 칭찬해줘 칭찬해줘~」"

[[dialogue]]
speaker = "ヒヨ"
original = "「ちょっと待ったぁ！\u3000誰も負けてねぇだろ！\u3000姐さんも何とか言ってくれよ」"
translation = "「잠깐 기다려! 아무도 안 졌거든! 누님도 뭐라고 좀 해봐요」"

[[dialogue]]
speaker = "ミルフィー"
original = "「ええっ、でも何を言ってもエッチだって言われて終わりそうだし……」"
translation = "「에엣, 하지만 무슨 말을 해도 야하다는 소리만 듣고 끝날 것 같은데……」"

[[dialogue]]
speaker = "ミルフィー"
original = "「ねえねえ、チアの時は確かにちょっぴりエッチだなぁって思ってたけど、今回のチーパオフォームはそこまでエッチじゃないよね？」"
translation = "「저기 저기, 치어 때는 확실히 조금 야하다고 생각했지만, 이번 치파오 폼은 그렇게까지 야하지 않지?」"

[[dialogue]]
speaker = "カティア"
original = "「エッチなのです」"
translation = "「야한 것입니다」"

[[dialogue]]
speaker = "ヒヨ"
original = "「すまねぇ、姐さん。いくらフォローしたくても、自分に嘘はつけねぇ」"
translation = "「미안해, 누님. 아무리 편들어주고 싶어도, 자신을 속일 수는 없어」"

[[dialogue]]
speaker = "ヒヨ"
original = "「姐さんのチーパオフォームは……めちゃくちゃエッチだぜ」"
translation = "「누님의 치파오 폼은…… 엄청나게 야하다고」"

[[dialogue]]
speaker = "ミルフィー"
original = "「ええ～～っ！？\u3000だってだって、チアほど露出度も高くないよ？」"
translation = "「에에~~!? 그치만 그치만, 치어만큼 노출도가 높지도 않잖아?」"

[[dialogue]]
speaker = "ヒヨ"
original = "「世の中にはチラリズムってぇもんがあるんだ。そんで会長サンはそういうのが大好物と来てる」"
translation = "「세상에는 슬쩍 보이는 미학이라는 게 있단 말이야. 그리고 회장 씨는 그런 걸 아주 좋아하게 생겼거든」"

[[dialogue]]
speaker = "カティア"
original = "「ちらちら見えるふとももが、とてもエッチなのです」"
translation = "「슬쩍슬쩍 보이는 허벅지가, 아주 야한 것입니다」"

[[dialogue]]
speaker = "ミルフィー"
original = "「そうだったんだ……確かに会長くんも、太股のあたりを見てた気がするけど……」"
translation = "「그랬구나…… 확실히 회장군도, 허벅지 쪽을 보고 있었던 것 같기도 하지만……」"

[[dialogue]]
speaker = "unk"
original = "スリットからチラ見えするふとももは正義"
translation = "슬릿 사이로 슬쩍 보이는 허벅지는 정의다"

[[dialogue]]
speaker = "unk"
original = "ミルフィーのむちむちなふとももが好き"
translation = "밀피의 탱글탱글한 허벅지가 좋아"

[[dialogue]]
speaker = "ミルフィー"
original = "「そっかぁ……会長くんから見てもエッチだったんだ……」"
translation = "「그렇구나…… 회장군이 보기에도 야했구나……」"

[[dialogue]]
speaker = "ヒヨ"
original = "「だからあんま会長サンの前で激しい動きはしない方がいいぜ。ライオンの檻に餌を投げ入れるようなもんだ」"
translation = "「그러니까 너무 회장 씨 앞에서 격렬하게 움직이지 않는 게 좋아. 사자 우리에 먹이를 던져주는 거나 마찬가지라고」"

[[dialogue]]
speaker = "カティア"
original = "「そんなことないワン！\u3000確かにミルフィー先輩はエッチだけど、魔王様はその程度じゃ動じないのです！」"
translation = "「그렇지 않다 멍! 확실히 밀피 선배는 야하지만, 마왕님은 그 정도로는 동요하지 않는 것입니다!」"

[[dialogue]]
speaker = "ヒヨ"
original = "「ほほう、言うじゃねぇか。よーし、わかった。姐さん、ちょいと試してくれよ。その最高のふとももをちらりとするだけでいいから」"
translation = "「호오, 제법 말하는데. 좋아, 알았어. 형님, 조금만 시험해 봐줘. 그 최고의 허벅지를 살짝 보여주는 것만으로도 충분하니까.」"

[[dialogue]]
speaker = "ミルフィー"
original = "「そ、そんなこと言われても……困ったなぁ……」"
translation = "「그, 그런 말을 들어도…… 곤란한데……」"

[[dialogue]]
speaker = "ミルフィー"
original = "（でもでもっ、会長くんがドキドキしてくれるなら……いいかも<emoji=heart04>）"
translation = "（하지만 하지만, 회장군이 두근거려 준다면…… 좋을지도<emoji=heart04>）"

[[dialogue]]
speaker = "ミルフィー"
original = "「じゃあ、行くよ……」"
translation = "「그럼, 시작할게……」"

[[dialogue]]
speaker = "ミルフィー"
original = "「……………………ちらっ<emoji=heart04>」"
translation = "「……………………살짝<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ありがとうございます！！！"
translation = "감사합니다!!!"

[[dialogue]]
speaker = "unk"
original = "うおおおおおおおーーーーーーっ！！！"
translation = "우오오오오오오오ㅡㅡㅡㅡㅡㅡ옷!!!"

[[dialogue]]
speaker = "ミルフィー"
original = "「……あれ？\u3000もしかしてやり過ぎちゃった？」"
translation = "「……어라? 혹시 너무 과하게 했나?」"

[[dialogue]]
speaker = "ヒヨ"
original = "「姐さん……だから言わんこっちゃない……」"
translation = "「형님…… 그러니까 내가 뭐랬어……」"

[[dialogue]]
speaker = "カティア"
original = "「いくら魔王様でも無理なのです。エッチすぎるのです」"
translation = "「아무리 마왕님이라도 무리인 것입니다. 너무 야한 것입니다.」"

[[dialogue]]
speaker = "ミルフィー"
original = "「さすがにそこまでは……って、会長くん？\u3000ねえちょっと！\u3000もしかして気絶しちゃってる！？」"
translation = "「역시 그 정도까지는…… 어, 회장군? 얘, 잠깐만! 혹시 기절해 버린 거야!?」"

[[dialogue]]
speaker = "ヒヨ"
original = "「さすがは姐さん……必殺のふとももだぜ……」"
translation = "「역시 형님이야…… 필살의 허벅지라구……」"

[[dialogue]]
speaker = "カティア"
original = "「こればっかりは私も同意見なのです……」"
translation = "「이것만큼은 저도 동감인 것입니다……」"

[[dialogue]]
speaker = "unk"
original = "こうして、ミルフィーの必殺のふとももにより、俺はしばらく気を失い続けるのだった。"
translation = "이렇게 밀피의 필살 허벅지에 의해, 나는 한동안 정신을 잃고 말았다."

