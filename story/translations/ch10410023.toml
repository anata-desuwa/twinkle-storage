[[dialogue]]
speaker = "unk"
original = "第３話,好きにすれば？,P"
translation = "제3화, 마음대로 하면 되잖아?, P"

[[dialogue]]
speaker = "unk"
original = "ある日、マインと一緒に昼食をとっていると、彼女と公安委員会でバディを組んでいるセナリィが訪ねてきた。"
translation = "어느 날, 마인과 함께 점심을 먹고 있자 그녀와 공안위원회에서 버디를 맺고 있는 세나리가 찾아왔다."

[[dialogue]]
speaker = "セナリィ"
original = "「ごきげんよう、会長様。それに、マイン。恋人関係を楽しんでいるところ、失礼しますわね」"
translation = "「평안하신가요, 회장님. 그리고 마인. 연인 관계를 즐기고 있는 와중에 실례하겠어요」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「おいっす、セナリィ。今日はどうしたの？\u3000またなんか新しい悪巧みでも思いついた？」"
translation = "「안녕 세나리. 오늘은 웬일이야? 또 무슨 새로운 나쁜 꿍꿍이라도 생각났어?」"

[[dialogue]]
speaker = "セナリィ"
original = "「ふふっ、そのようなものですわ。実は会長様に依頼したいことがあって、参りましたの」"
translation = "「후훗, 그런 셈이죠. 사실 회장님께 의뢰하고 싶은 일이 있어서 왔답니다」"

[[dialogue]]
speaker = "セナリィ"
original = "「単刀直入に申し上げますと……会長様、私の１日レンタル彼氏になって下さらない？」"
translation = "「단도직입적으로 말씀드리자면…… 회장님, 저의 1일 렌탈 남자친구가 되어주시지 않겠어요?」"

[[dialogue]]
speaker = "unk"
original = "ファッ！？"
translation = "홧!?"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「……どういうことか、説明して貰えるかな？\u3000セナリィも知ってるよね？\u3000会長は私の――」"
translation = "「……어떻게 된 건지 설명 좀 들어볼 수 있을까? 세나리도 알고 있지? 회장님은 내――」"

[[dialogue]]
speaker = "セナリィ"
original = "「もちろん存じておりますわ。お２人は、お試しの恋人関係を築いているのでしょう？」"
translation = "「물론 알고 있습니다. 두 분은 시험 삼아 연인 관계를 맺고 계신 것이죠?」"

[[dialogue]]
speaker = "セナリィ"
original = "「だからそれと同じで、私とも１日、お試しの恋人関係になって頂きたいというお話ですわ。私、何か変なことを言ってますかしら？」"
translation = "「그러니까 그것과 마찬가지로 저와도 하루 동안 시험 삼아 연인 관계가 되어주셨으면 하는 이야기입니다. 제가 무슨 이상한 말이라도 했나요?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「……ふ～ん、なるほどね～。――まぁ、別にいいんじゃない？」"
translation = "제3화, 마음대로 하면 되잖아?, P"

[[dialogue]]
speaker = "unk"
original = "えっ！？\u3000マイン！？"
translation = "「……흐~음, 그렇구나~. ――뭐, 별로 상관없지 않아?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「確かにお試し期間中だし、セナリィも試したいって言うなら、独占する権利はないしね。好きにすれば？」"
translation = "「에엣!? 마인!?」"

[[dialogue]]
speaker = "セナリィ"
original = "「ええ、そうさせてもらいますわ。前々からお２人の関係を見て、私も試してみたいと思っておりましたの♪」"
translation = "「확실히 테스트 기간 중이고, 세나리도 시험해보고 싶다고 한다면 독점할 권리는 없으니까 말이야. 마음대로 하면?」"

[[dialogue]]
speaker = "unk"
original = "マインの反応に少し残念な気持ちになりつつも、セナリィに押し切られる形で１日レンタル彼氏を引き受けることになってしまい……約束していた休日の日。"
translation = "「네, 그렇게 하도록 하겠어요. 전부터 두 분의 관계를 보고 저도 시험해보고 싶다고 생각했었거든요♪」"

[[dialogue]]
speaker = "セナリィ"
original = "「会長様、本日はレンタル彼氏を引き受けて下さり、ありがとうございますわ♪\u3000それじゃあ早速、行きたいカフェがあるのですけれど、よろしいかしら？」"
translation = "마인의 반응에 조금 씁쓸한 기분이 들면서도, 세나리에게 떠밀리듯 1일 렌탈 남자친구를 맡게 되어버리고…… 약속했던 휴일 당일."

[[dialogue]]
speaker = "セナリィ"
original = "「実はそこが、カップル専門店という面白い触れ込みでして、一緒に入って下さる男性を探しておりましたの。というわけで――」"
translation = "「회장님, 오늘은 렌탈 남자친구를 맡아주셔서 감사해요♪ 그럼 곧장, 가고 싶은 카페가 있는데 괜찮으실까요?」"

[[dialogue]]
speaker = "セナリィ"
original = "「ドレスコードを守って、入店するとしましょう。――詳しい事情は、終わった後に説明させて頂きますので♪」"
translation = "「사실 그곳이 커플 전문점이라는 재미있는 선전 문구로 유명해서, 같이 들어가 줄 남성을 찾고 있었거든요. 그런 고로――」"

[[dialogue]]
speaker = "セナリィ"
original = "「――ふふっ、これで現場の証拠も押さえて、店も潰しましたし、依頼達成ですわ♪\u3000ご協力ありがとうございました、会長様」"
translation = "「드레스 코드를 지키고 입점하도록 하죠. ――자세한 사정은 끝난 뒤에 설명해 드릴 테니까요♪」"

[[dialogue]]
speaker = "セナリィ"
original = "「実は今回、九浄家の方から傭兵仕事の依頼がありまして、あのカップル専門店で違法な銃器売買が行われているとのことでしたの」"
translation = "「――후훗, 이걸로 현장 증거도 잡았고 가게도 무너뜨렸으니 의뢰 달성이네요♪ 협력해 주셔서 감사합니다, 회장님」"

[[dialogue]]
speaker = "セナリィ"
original = "「さて、ずっと放置してましたけど……隠れて尾行なんてしてないで、さっさと出てきなさいな、マイン？」"
translation = "「사실 이번에 쿠죠 가문 쪽에서 용병 업무 의뢰가 있었는데, 저 커플 전문점에서 불법 총기 매매가 이루어지고 있다는 내용이었거든요」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「……ハロウィンフォームで、影に隠れる能力を使って、星力感知も効かないはずなんだけど」"
translation = "「자, 계속 방치해뒀습니다만…… 숨어서 미행 같은 거 하지 말고 얼른 나오지 그래, 마인?」"

[[dialogue]]
speaker = "セナリィ"
original = "「そこに生きている以上、気配を完全に消すことなど不可能ですわ。数多の戦場でスナイパーから銃口を向けられてきた私が、気付かないとでも思って？」"
translation = "「……할로윈 폼으로 그림자에 숨는 능력을 썼고, 성력 감지도 안 통할 텐데」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「そういうところは敵わないな～、本当……」"
translation = "「그곳에 살아있는 이상 기색을 완전히 지우는 것 따위는 불가능해요. 수많은 전장에서 스나이퍼에게 총구를 겨눠졌던 제가 모를 거라 생각했나요?」"

[[dialogue]]
speaker = "セナリィ"
original = "「それで？\u3000なんで尾行なんてしてましたの？」"
translation = "「그런 부분은 못 당해내겠네~, 정말……」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「それはほら、こっちも公安委員会の仕事だよ。武器の違法売買の情報が下りてきて、その調査で……」"
translation = "「그래서? 왜 미행 같은 걸 한 거죠?」"

[[dialogue]]
speaker = "セナリィ"
original = "「嘘ですわね。今回の件は、公安委員会のバックである九浄家から直接、武器商人の下で傭兵をしていた経験のある私に依頼されたもの。あなたには情報など行かないはずですわ」"
translation = "「그건 봐봐, 이쪽도 공안위원회의 일이야. 무기 불법 매매 정보가 내려와서 그 조사로……」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「いや～……えっと……」"
translation = "「거짓말이네요. 이번 건은 공안위원회의 배후인 쿠죠 가문에서 직접, 무기 상인 밑에서 용병을 했던 경험이 있는 제게 의뢰한 것. 당신에게 정보가 갈 리 없습니다」"

[[dialogue]]
speaker = "セナリィ"
original = "「あのですわね、マイン――いい加減めんどくせぇですわよ？\u3000私と会長様のデートが気になって、付いてきたのでしょう？」"
translation = "「이거 참~…… 에또……」"

[[dialogue]]
speaker = "セナリィ"
original = "「あなたの捻くれた性格はよく知っておりますし、私は愛なんて目に見えないものは信じておりませんけれど……」"
translation = "「저기 말이죠, 마인―― 슬슬 짜증 나거든요? 저와 회장님의 데이트가 신경 쓰여서 따라온 거죠?」"

[[dialogue]]
speaker = "セナリィ"
original = "「気に入っているものなら、ちゃんと自分のものだって主張くらいしとけって話ですわ」"
translation = "「당신의 비뚤어진 성격은 잘 알고 있고, 저는 사랑 같은 눈에 보이지 않는 건 믿지 않습니다만……」"

[[dialogue]]
speaker = "セナリィ"
original = "「平静を装っておきながら嫉妬するだなんて、みっともないですわよ」"
translation = "「마음에 든 거라면 제대로 내 거라고 주장 정도는 하란 말이에요」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「…………」"
translation = "「태연한 척하면서 질투나 하다니, 꼴사납다구요」"

[[dialogue]]
speaker = "セナリィ"
original = "「やれやれ、ご自慢の交渉術はどこへ行ったのやら。ここからは会長様にお任せした方がよろしそうですわね」"
translation = "「…………」"

[[dialogue]]
speaker = "セナリィ"
original = "「そういうことですから、後はよろしくお願いしますわね、会長様。――私はこれにて失礼致しますわ。あしなに♪」"
translation = "「이런 이런, 자랑하던 교섭술은 어디로 갔는지. 여기서부터는 회장님께 맡기는 편이 좋을 것 같네요」"

[[dialogue]]
speaker = "unk"
original = "マイン、変に気を遣わせちゃってごめん"
translation = "「그렇게 됐으니 뒤를 부탁드릴게요, 회장님. ――저는 이만 실례하겠습니다. 내일 봐요♪」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「……なんで、会長が謝るのさ」"
translation = "마인, 괜히 신경 쓰이게 해서 미안."

[[dialogue]]
speaker = "ネーゼマイン"
original = "「――私の性格を知ってるはずなのに、１日彼氏を引き受けちゃったから？\u3000それは別に……私もいいって言ったし……」"
translation = "「……왜 회장이 사과하는 거야」"

[[dialogue]]
speaker = "unk"
original = "改めてちゃんと言うよ。"
translation = "「――내 성격을 알고 있을 텐데도 1일 남자친구를 수락해버려서? 그건 딱히…… 나도 괜찮다고 했고……」"

[[dialogue]]
speaker = "unk"
original = "……俺は、マインのことが好きだ"
translation = "다시 한번 제대로 말할게."

[[dialogue]]
speaker = "ネーゼマイン"
original = "「な、なに？\u3000いきなり……。――会長とこれまで、お試しで付き合ってきてどうだったか？」"
translation = "……나, 마인을 좋아해."

[[dialogue]]
speaker = "ネーゼマイン"
original = "「それは……悪くなかったよ。思っていたよりもずっと……キスとかしても、別に嫌じゃないし……」"
translation = "「머, 뭐야? 갑자기……. ――회장과 지금까지 시험 삼아 사귀어 보면서 어땠냐고?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「でも、会長の方はどうなの？\u3000私のこと嫌だって思ったりすること、ないの？\u3000よくふざけて、背中踏んだりとかしてるし……」"
translation = "「그건…… 나쁘지 않았어. 생각했던 것보다 훨씬…… 키스 같은 걸 해도 딱히 싫지 않고……」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「前も言ったけど、私……性悪だし……今回みたいに、面倒臭いことになったりするじゃん？」"
translation = "「하지만 회장은 어때? 내가 싫다고 생각하거나 하진 않아? 자주 장난치고, 등 밟거나 하기도 하잖아……」"

[[dialogue]]
speaker = "unk"
original = "確かに振り回されることは多い。だけど――"
translation = "「전에도 말했지만 나…… 성격 나쁘고…… 이번처럼 귀찮은 일이 생기기도 하잖아?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「――それがなんか嬉しくて、可愛いと感じちゃうくらい、私のことが好きになっちゃってる？」"
translation = "확실히 휘둘리는 일은 많아. 하지만――"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「っ……バッカじゃないの？\u3000そんなの会長、ドＭじゃん……」"
translation = "「――그게 왠지 기쁘고 귀엽게 느껴질 정도로 나를 좋아하게 돼버렸다구?」"

[[dialogue]]
speaker = "unk"
original = "ドＭでもいい。だから――"
translation = "「윽…… 바보 아냐? 그런 거 회장, 완전 도M이잖아……」"

[[dialogue]]
speaker = "unk"
original = "お試しじゃなく、正式な恋人として付き合って欲しい。俺はマインに、そう告白した。"
translation = "도M이라도 좋아. 그러니까――"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「……私、意地悪だから、後で別れたいってなった時、すっっっごく大変だよ？」"
translation = "시험 삼아서가 아니라, 정식 연인으로서 사귀어 줬으면 해. 나는 마인에게 그렇게 고백했다."

[[dialogue]]
speaker = "ネーゼマイン"
original = "「それでもいいなら…………す、好きにすれば？」"
translation = "「……나, 심술쟁이라서 나중에 헤어지고 싶어지면 저어어어엉말 힘들 거라구?」"

[[dialogue]]
speaker = "unk"
original = "そう言って、マインは赤ずきんのフードで顔を隠しながら、俺の手をそっと握るのだった。"
translation = "「그래도 좋다면………… 마, 마음대로 하면?」"

