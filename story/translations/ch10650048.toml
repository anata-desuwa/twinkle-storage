[[dialogue]]
speaker = "unk"
original = "俺はイレーナと一緒にホテルに来ていた。"
translation = "나는 이레이나와 함께 호텔에 와 있었다."

[[dialogue]]
speaker = "unk"
original = "ここは度々お世話になっている結婚式場と提携しているホテルで、イレーナがよく式に呼ばれていることもあって、無料で泊まらせてもらった。"
translation = "여기는 자주 도움을 받고 있는 결혼식장과 제휴한 호텔로, 이레이나가 자주 식에 불려가는 덕분에 무료로 숙박하게 되었다."

[[dialogue]]
speaker = "イレーナ"
original = "「ここでウェディングドレス着てると気分出るわね」"
translation = "「여기서 웨딩드레스를 입고 있으니 기분 나네」"

[[dialogue]]
speaker = "クロト"
original = "「確かに。今式を終えてきたところみたいだ」"
translation = "「그러게. 방금 식을 마치고 온 것 같아」"

[[dialogue]]
speaker = "unk"
original = "結婚式場で式を挙げたカップルは、このホテルに泊まることも多い。"
translation = "결혼식장에서 식을 올린 커플은 이 호텔에 묵는 일도 많다."

[[dialogue]]
speaker = "unk"
original = "つまりここで初夜を迎えるわけだ。"
translation = "즉 여기서 첫날밤을 맞이하는 셈이다."

[[dialogue]]
speaker = "イレーナ"
original = "「ねぇ、あんた、子どもは何人欲しい？」"
translation = "「저기, 너 아이는 몇 명 갖고 싶어?」"

[[dialogue]]
speaker = "クロト"
original = "「えっ！？\u3000何言って……！？」"
translation = "「엣!? 무슨 소리를……!?」"

[[dialogue]]
speaker = "イレーナ"
original = "「半分冗談で、半分真剣よ。将来のこと考えておくのは大事でしょ」"
translation = "「절반은 농담이고 절반은 진심이야. 미래를 생각해 두는 건 중요하잖아」"

[[dialogue]]
speaker = "クロト"
original = "「それはそうだけど、いきなりで驚いたよ」"
translation = "「그건 그렇지만 갑작스러워서 놀랐어」"

[[dialogue]]
speaker = "クロト"
original = "「でもそうだな……できれば子どもはたくさん欲しいな。その方が賑やかだ」"
translation = "「하지만 그렇네…… 가능하면 아이는 많이 갖고 싶어. 그편이 북적거리고 좋지」"

[[dialogue]]
speaker = "イレーナ"
original = "「気楽に言ってくれるわね。産む方のことも考えなさいよ」"
translation = "「말은 참 쉽게 하네. 낳는 쪽 입장도 좀 생각하라구」"

[[dialogue]]
speaker = "イレーナ"
original = "「でも、あたしも賑やかな方が好きかも。考えておいてあげるわね、<b>旦那さま</b>」"
translation = "「그래도 나도 북적거리는 게 더 좋을지도. 생각해 둘게, <b>남편님</b>」"

[[dialogue]]
speaker = "イレーナ"
original = "「あ……あんたの、おっきくなってる」"
translation = "「아…… 너 거, 커졌네」"

[[dialogue]]
speaker = "unk"
original = "イレーナの視線の先で、屹立し始めた股間がズボンを押し上げていた。"
translation = "이레이나의 시선 끝에서 발기하기 시작한 가랑이가 바지를 밀어 올리고 있었다."

[[dialogue]]
speaker = "クロト"
original = "「イレーナが子どもの話するから……」"
translation = "「이레이나가 아이 이야기를 하니까……」"

[[dialogue]]
speaker = "イレーナ"
original = "「真面目な話してるのに、何おっ立ててるのよスケベ。……でもこんなスケベを好きになったのはあたしなんだから、仕方ないわよね」"
translation = "「진지한 이야기 중인데 뭘 세우고 있는 거야 변태. ……하지만 이런 변태를 좋아하게 된 건 나니까 어쩔 수 없네」"

[[dialogue]]
speaker = "イレーナ"
original = "「それじゃせっかくだし……初夜を楽しみましょ？」"
translation = "「그럼 기왕 이렇게 된 거…… 첫날밤을 즐겨볼까?」"

[[dialogue]]
speaker = "イレーナ"
original = "「はぁ……ウェディングドレスでするのって、変な気分……でも戦闘服だから汚れていいのは便利ね」"
translation = "「하아…… 웨딩드레스를 입고 하는 건 묘한 기분…… 하지만 전투복이라 더러워져도 괜찮은 건 편리하네」"

[[dialogue]]
speaker = "イレーナ"
original = "「今日はあたしが動いてあげる。嬉しいでしょ？」"
translation = "「오늘은 내가 움직여줄게. 기쁘지?」"

[[dialogue]]
speaker = "クロト"
original = "「うん、嬉しい」"
translation = "「응, 기뻐」"

[[dialogue]]
speaker = "unk"
original = "俺がベッドに横たわると、イレーナが上に跨った。"
translation = "내가 침대에 눕자 이레이나가 위로 올라탔다."

[[dialogue]]
speaker = "unk"
original = "いつも大きいと思っている胸だけど、見上げると迫力をさらに感じられる。"
translation = "항상 크다고 생각하는 가슴이지만 올려다보니 박력이 더욱 느껴진다."

[[dialogue]]
speaker = "イレーナ"
original = "「あたしのおっぱいめっちゃ見てるじゃない、スケベ」"
translation = "「내 가슴 엄청 보고 있잖아, 변태」"

[[dialogue]]
speaker = "クロト"
original = "「イレーナのおっぱいがエッチだから仕方ないよ」"
translation = "「이레이나 가슴이 야하니까 어쩔 수 없어」"

[[dialogue]]
speaker = "イレーナ"
original = "「もう、開き直っちゃって。このスケベ。スケベ会長、スケベ魔王、スケベ大王」"
translation = "「정말, 아주 당당하네. 이 변태. 변태 회장, 변태 마왕, 변태 대왕」"

[[dialogue]]
speaker = "unk"
original = "いっぱい見て、揉んで、吸ってきた、大好きなイレーナのおっぱい。"
translation = "잔뜩 보고, 주무르고, 빨아왔던 내가 정말 좋아하는 이레이나의 가슴."

[[dialogue]]
speaker = "unk"
original = "イレーナが少し動くだけでたぷんと揺れて、男の本能を揺さぶる。"
translation = "이레이나가 조금 움직이는 것만으로도 찰랑이며 흔들려, 남자의 본능을 뒤흔든다."

[[dialogue]]
speaker = "イレーナ"
original = "「それじゃいくわよ」"
translation = "「그럼 간다?」"

[[dialogue]]
speaker = "unk"
original = "イレーナが腰を持ち上げ、膣口に亀頭が当たる。"
translation = "이레이나가 허리를 들어 올려, 질구에 귀두가 닿는다."

[[dialogue]]
speaker = "イレーナ"
original = "「んんっ……<emoji=heart04>\u3000このままおま○こに入れてあげる……<emoji=heart04>」"
translation = "「응읏……<emoji=heart04> 이대로 보지에 넣어 줄게……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "蜜で潤った粘膜が、ペニスを呑み込んでいって──"
translation = "애액으로 젖은 점막이 페니스를 집어삼켜 가고──"

[[dialogue]]
speaker = "イレーナ"
original = "「んん～～～っ<emoji=heart04>」"
translation = "「응으으으읏<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
original = "「はぁ、はぁ……あんたの……おっきい……<emoji=heart04>\u3000んんはぁ……今日は、あたしが気持ち良くしてあげる……<emoji=heart04>」"
translation = "「하아, 하아…… 너의…… 커다란……<emoji=heart04> 응하아…… 오늘은 내가 기분 좋게 해 줄게……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "大きな胸を揺らしながら、腰を上下させるイレーナ。"
translation = "풍만한 가슴을 흔들며 허리를 상하로 움직이는 이레이나."

[[dialogue]]
speaker = "unk"
original = "だけどその胸に異変があった。"
translation = "하지만 그 가슴에 이변이 있었다."

[[dialogue]]
speaker = "クロト"
original = "「イレーナ、胸から……」"
translation = "「이레이나, 가슴에서……」"

[[dialogue]]
speaker = "イレーナ"
original = "「え？」"
translation = "「에?」"

[[dialogue]]
speaker = "unk"
original = "イレーナの胸の先端から、白い液体がつうっと垂れている。"
translation = "이레이나의 가슴 끝에서 하얀 액체가 주르륵 흘러내리고 있다."

[[dialogue]]
speaker = "unk"
original = "見間違いでなければこれは──"
translation = "잘못 본 게 아니라면 이것은──"

[[dialogue]]
speaker = "イレーナ"
original = "「あたし、おっぱい出てる……！？」"
translation = "「나, 젖이 나오고 있어……!?」"

[[dialogue]]
speaker = "クロト"
original = "「もしかして妊娠した……？」"
translation = "「혹시 임신했어……?」"

[[dialogue]]
speaker = "イレーナ"
original = "「そ、そんなわけないでしょっ。ていうか、妊娠しただけじゃ母乳は出ないはずだし……」"
translation = "「그, 그럴 리가 없잖아. 그보다 임신한 것만으로는 모유가 나오지 않을 텐데……」"

[[dialogue]]
speaker = "イレーナ"
original = "「はぁはぁ……もしかして、さっき子どもは何人欲しいとか言ってたから、その影響？」"
translation = "「하아 하아…… 혹시 아까 아이는 몇 명 갖고 싶냐고 말해서, 그 영향?」"

[[dialogue]]
speaker = "イレーナ"
original = "「このウェディングフォーム、まだ完全に制御できてないから、こういうことが起こるのかも……」"
translation = "「이 웨딩 폼, 아직 완전히 제어하지 못해서 이런 일이 일어나는 걸지도……」"

[[dialogue]]
speaker = "イレーナ"
original = "「はっ……んっ……本当にじゃじゃ馬ね、このフォームは……んんんっ<emoji=heart04>」"
translation = "「핫…… 응…… 정말 망아지 같네, 이 폼은…… 응응읏<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
original = "「ふっ、はぁんっ……<emoji=heart04>\u3000ほんとに、母乳出てる……はっ……はあぁ……<emoji=heart04>\u3000乳首、熱いぃ……<emoji=heart04>」"
translation = "「훗, 하앙……<emoji=heart04> 정말로 모유가 나오고 있어…… 핫…… 하아아……<emoji=heart04> 젖꼭지, 뜨거워어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "イレーナが腰を動かすと、胸が揺れ、白い母乳が雫となって散る。"
translation = "이레이나가 허리를 움직이자 가슴이 흔들리고, 하얀 모유가 물방울이 되어 흩어진다."

[[dialogue]]
speaker = "unk"
original = "その光景が淫靡で、つい目を奪われてしまう。"
translation = "그 광경이 음비하여 나도 모르게 눈을 빼앗기고 만다."

[[dialogue]]
speaker = "イレーナ"
original = "「はっ、あっ……おっぱい出てるの見られるの、恥ずかしいんだけど……」"
translation = "「핫, 아…… 젖 나오는 거 보이는 거, 창피한데……」"

[[dialogue]]
speaker = "クロト"
original = "「ごめん、どうしても見ちゃうんだ」"
translation = "「미안, 아무래도 보게 돼.」"

[[dialogue]]
speaker = "イレーナ"
original = "「んんっ……<emoji=heart04>\u3000そんなに気になるの？\u3000じゃ、じゃあ、あたしのおっぱい……飲んでみる？」"
translation = "「응읏……<emoji=heart04> 그렇게 신경 쓰여? 그, 그럼 내 젖…… 마셔 볼래?」"

[[dialogue]]
speaker = "クロト"
original = "「いいのか？」"
translation = "「괜찮아?」"

[[dialogue]]
speaker = "イレーナ"
original = "「あたしのおっぱい飲みたいって、顔に書いてあるし……」"
translation = "「내 젖 마시고 싶다고 얼굴에 써 있으니까……」"

[[dialogue]]
speaker = "イレーナ"
original = "「はぁっ、んんっ……<emoji=heart04>\u3000それにあたしも乳首疼いて、吸ってくれないとおかしくなりそうなの……あっ、はあぁ……<emoji=heart04>\u3000だから……ほら」"
translation = "「하앗, 응읏……<emoji=heart04> 게다가 나도 젖꼭지가 욱신거려서, 빨아 주지 않으면 이상해질 것 같아…… 앗, 하아아……<emoji=heart04> 그러니까…… 자」"

[[dialogue]]
speaker = "unk"
original = "吸いやすいように、イレーナが乳首を顔に近づけてくれる。"
translation = "빨기 쉽도록 이레이나가 젖꼭지를 얼굴에 가까이 대 준다."

[[dialogue]]
speaker = "unk"
original = "大きくて柔らかい胸を押し付けられながら、乳首を吸う。"
translation = "크고 부드러운 가슴이 밀착된 채 젖꼭지를 빤다."

[[dialogue]]
speaker = "イレーナ"
original = "「はあああぁっ<emoji=heart04><emoji=heart04>」"
translation = "「하아아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その瞬間、イレーナが震えながら嬌声を上げた。"
translation = "그 순간, 이레이나가 떨며 교성을 질렀다."

[[dialogue]]
speaker = "イレーナ"
original = "「ちゅうちゅうって、吸われて……んんっ<emoji=heart04>\u3000あたしの母乳、飲んじゃってる……<emoji=heart04>」"
translation = "「쪽쪽거리며 빨려서…… 응읏<emoji=heart04> 내 모유, 마셔 버리고 있어……<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
original = "「はぁ、はぁ……ほんとにおっぱいあげちゃった……<emoji=heart04>\u3000あたしのおっぱい、美味しい？」"
translation = "「하아, 하아…… 정말로 젖을 줘 버렸어……<emoji=heart04> 내 젖, 맛있어?」"

[[dialogue]]
speaker = "クロト"
original = "「うん、ほんのり甘くて美味しいよ」"
translation = "「응, 은은하게 달아서 맛있어.」"

[[dialogue]]
speaker = "イレーナ"
original = "「ならよかった……まずいって言ったらお仕置きしてたけど……」"
translation = "「그럼 다행이네…… 맛없다고 했으면 벌줬을 텐데……」"

[[dialogue]]
speaker = "イレーナ"
original = "「もっと吸って、いいわよ……はぁっ、あっ、あっ……んんっ<emoji=heart04>」"
translation = "「더 빨아도 괜찮아…… 하앗, 앗, 앗…… 응읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "乳首を吸うと、ぴゅっと母乳が溢れて口の中に広がる。"
translation = "젖꼭지를 빨자 퓨흣 하고 모유가 넘쳐나 입안에 퍼진다."

[[dialogue]]
speaker = "イレーナ"
original = "「ん～っ<emoji=heart04>\u3000また、母乳出て……<emoji=heart04>\u3000はあぁ……<emoji=heart04>\u3000おっぱい熱いぃ……<emoji=heart04>」"
translation = "「응~읏<emoji=heart04> 또 모유가 나와서……<emoji=heart04> 하아아……<emoji=heart04> 가슴이 뜨거워어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "母乳を吸う度、イレーナの体が小刻みに震え、膣壁もぎゅっと締まった。"
translation = "모유를 빨 때마다 이레이나의 몸이 미세하게 떨리고, 질벽도 꽉 조여졌다."

[[dialogue]]
speaker = "イレーナ"
original = "「はっ、あぁっ……あたしの中で、おち○ぽ、大きくなってる……<emoji=heart04>\u3000おっぱい飲んで、めちゃくちゃ興奮してるじゃない……このヘンタイ……っ<emoji=heart04>」"
translation = "「핫, 아아앗…… 내 안에서 자지가 커지고 있어……<emoji=heart04> 젖 마시고 엄청 흥분했잖아…… 이 변태…… <emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
original = "「それなら──」"
translation = "「그렇다면──」"

[[dialogue]]
speaker = "イレーナ"
original = "「いいですよ……私のおっぱい、好きなだけ飲んでくださいね……<emoji=heart04>」"
translation = "「괜찮아요…… 제 젖, 마음껏 마셔 주세요……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「──！」"
translation = "「──!」"

[[dialogue]]
speaker = "イレーナ"
original = "「あぁんっ<emoji=heart04>\u3000今までこちらの私ではエッチしていませんでしたから……どうなるか気になりましたが……あっ<emoji=heart04>\u3000おち○ぽビクビク跳ねて……いい反応です……<emoji=heart04>」"
translation = "「아앙<emoji=heart04> 지금까지 이쪽의 저는 섹스하지 않았으니까…… 어떻게 될지 궁금했습니다만…… 앗<emoji=heart04> 자지가 움찔움찔 뛰어서…… 좋은 반응입니다……<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
original = "「おち○ぽ気持ち良くしながら、おっぱいあげますから、たくさん癒されてくださいね……<emoji=heart04>」"
translation = "「자지를 기분 좋게 해 주면서 젖을 줄 테니까, 잔뜩 치유받으세요……<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
original = "「はっ、あっ、あぁっ……ふあぁ、んんっ……<emoji=heart04>\u3000ちゅうちゅうって、たくさんおっぱい吸って、赤ちゃんみたいです……<emoji=heart04>」"
translation = "「핫, 앗, 아아앗…… 후아아, 응읏……<emoji=heart04> 쪽쪽거리며 잔뜩 젖을 빨아서, 아기 같아요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "聖母のように優しい声とともに授乳され、どうしようもなく昂ってしまう。"
translation = "성모와 같이 자애로운 목소리와 함께 수유받으며, 어찌할 바 없이 고양되어 간다."

[[dialogue]]
speaker = "イレーナ"
original = "「あんっ<emoji=heart04>\u3000おっぱい強く吸われてます……<emoji=heart04>\u3000ふふ、そんなにミルクが欲しいんですか？」"
translation = "「앙<emoji=heart04> 가슴을 세게 빨리고 있어요……<emoji=heart04> 후후, 그렇게 우유가 갖고 싶나요?」"

[[dialogue]]
speaker = "イレーナ"
original = "「いいんですよ……あなたのおっぱいですから、好きなだけ吸ってください<emoji=heart04>\u3000あなただけのおっぱい、たくさん飲んで……<emoji=heart04>」"
translation = "「괜찮아요…… 당신의 젖이니까, 마음껏 빨아 주세요<emoji=heart04> 당신만의 젖, 잔뜩 마셔요……<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
original = "「んん～っ<emoji=heart04>\u3000はぁ、はぁ……おっぱい飲んでもらえるの、私も嬉しいです……<emoji=heart04>」"
translation = "「응으~읏<emoji=heart04> 하아, 하아…… 가슴 빨아주시는 거, 저도 기뻐요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "甘やかされながら母乳を吸い、射精寸前まで興奮が高まる。"
translation = "응석을 받아주며 모유를 마시고, 사정 직전까지 흥분이 고조된다."

[[dialogue]]
speaker = "unk"
original = "爆発しそうな衝動のまま、イレーナの奥めがけて突き上げて──"
translation = "폭발할 것 같은 충동 그대로, 이레나의 안쪽을 향해 치켜올리며──"

[[dialogue]]
speaker = "イレーナ"
original = "「んん～～っ<emoji=heart04><emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000大きなおち○ぽで、突き上げられて……はぁあっ<emoji=heart04>\u3000ああっ<emoji=heart04>」"
translation = "「응으~~읏<emoji=heart04><emoji=heart04> 하앗<emoji=heart04> 앗<emoji=heart04> 안앗<emoji=heart04> 커다란 자지로, 치켜올려져서…… 하아앗<emoji=heart04> 아앗<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
original = "「あっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000はあぁあっ<emoji=heart04>\u3000おち○ぽ、深いところまで……ひやあぁっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 응읏<emoji=heart04> 하아아앗<emoji=heart04> 자지, 깊은 곳까지…… 히야아앗<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
original = "「子宮に当たって、お腹の奥、疼いちゃいますっ<emoji=heart04>\u3000ふぁあっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ひぃああっ<emoji=heart04>」"
translation = "「자궁에 닿아서, 배 안쪽이 욱신거려요옷<emoji=heart04> 화앗<emoji=heart04> 앗<emoji=heart04> 히이아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "亀頭が奥を叩く度、母乳が溢れてきて、またイレーナの乳首を吸う。"
translation = "귀두가 안쪽을 때릴 때마다 모유가 넘쳐흐르고, 다시 이레나의 젖꼭지를 빤다."

[[dialogue]]
speaker = "イレーナ"
original = "「んん～～～っ<emoji=heart04>\u3000おっぱい吸われて、おま○こ熱くなっちゃいます<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000気持ちいいです<emoji=heart04>」"
translation = "「응으~~~읏<emoji=heart04> 가슴 빨려서, 보지 뜨거워져 버려요<emoji=heart04> 앗<emoji=heart04> 응<emoji=heart04> 기분 좋아요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ほのかに甘い母乳を舐めながら、乳首を舌先でこね回し、イレーナのおっぱいを思う存分味わう。"
translation = "은은하게 단 모유를 핥으면서 젖꼭지를 혀끝으로 굴리며, 이레나의 가슴을 마음껏 맛본다."

[[dialogue]]
speaker = "イレーナ"
original = "「はあぁ<emoji=heart04>\u3000エッチな吸い方されて……んんんっ<emoji=heart04>\u3000ただでさえ、乳首、敏感なのに、こんな……っ<emoji=heart04>」"
translation = "「하아아<emoji=heart04> 야한 방식으로 빨려서…… 응응응읏<emoji=heart04> 가만있어도 젖꼭지 예민한데, 이런……읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "もっとイレーナを味わいたくて、ツンと硬くなった乳首を甘噛みする。"
translation = "더욱 이레나를 맛보고 싶어서, 쫑긋하게 딱딱해진 젖꼭지를 살짝 깨문다."

[[dialogue]]
speaker = "イレーナ"
original = "「ひぃんっ！！？」"
translation = "「히잉!!?」"

[[dialogue]]
speaker = "イレーナ"
original = "「ああっ<emoji=heart04>\u3000おっぱいおもちゃにしちゃ、ダメですっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000もっとミルク出ちゃいますっ<emoji=heart04>\u3000おっぱいおかしくなっちゃいますぅっ<emoji=heart04>」"
translation = "「아앗<emoji=heart04> 가슴 장난감으로 삼으면, 안 돼요옷<emoji=heart04> 앗<emoji=heart04> 우유 더 나와버려요옷<emoji=heart04> 가슴 이상해져 버려요오옷<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000おっぱい吸われて、イッちゃいますっ<emoji=heart04>\u3000母乳飲まれてイキますぅっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 앗<emoji=heart04> 가슴 빨려서, 가버려요옷<emoji=heart04> 모유 마셔지면서 가버려요오옷<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
original = "「ふぁあっ──あ──んぁああっ<emoji=heart04>\u3000あ──あ──あ──んん～～～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「화앗──아──앙아아앗<emoji=heart04> 아──아──아──응으~~~~~읏<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "イレーナが身を震わせながら絶頂に達し、ペニスを締め付けながら、ぴゅるぴゅると母乳を噴かせた。"
translation = "이레나가 몸을 떨며 절정에 달하고, 페니스를 조이면서 퓨룻퓨룻 모유를 뿜어냈다."

[[dialogue]]
speaker = "イレーナ"
original = "「ひぁああっっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んんんっ<emoji=heart04>\u3000ダ、ダメっ<emoji=heart04>\u3000気持ちっ、よすぎちゃうっ<emoji=heart04>\u3000ふぁああっ<emoji=heart04>\u3000あんっ<emoji=heart04>」"
translation = "「히아아앗읏<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 응응응읏<emoji=heart04> 아, 안 돼<emoji=heart04> 기분, 너무 좋아버려엇<emoji=heart04> 화아앗<emoji=heart04> 안앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "絶頂でさらに表情が蕩け、聖女の口調も崩れてきた。"
translation = "절정으로 표정이 더욱 녹아내리고, 성녀의 말투도 흐트러지기 시작했다."

[[dialogue]]
speaker = "unk"
original = "イレーナの膣内は火傷しそうに熱くなり、トロトロの粘膜に包まれてたまらなくなる。"
translation = "이레나의 질 내부는 데일 정도로 뜨거워지고, 걸쭉한 점막에 감싸여 참을 수 없게 된다."

[[dialogue]]
speaker = "イレーナ"
original = "「おっぱい出しながら、エッチするの、気持ちいいっ<emoji=heart04>\u3000ひっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000おかしくなりそうっ<emoji=heart04>」"
translation = "「가슴 내놓고 섹스하는 거, 기분 좋아<emoji=heart04> 히잇<emoji=heart04> 앗<emoji=heart04> 응읏<emoji=heart04> 이상해질 것 같아<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んんぅっ<emoji=heart04>\u3000母乳溢れてきてっ<emoji=heart04>\u3000ひぁああっ<emoji=heart04>\u3000ああぁんっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 응으읏<emoji=heart04> 모유 넘쳐흘러서엇<emoji=heart04> 히아아앗<emoji=heart04> 아아앙읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "喘ぐごとに母乳の量が増していき、衝動的に強く吸う。"
translation = "신음할 때마다 모유의 양이 늘어나고, 충동적으로 강하게 빤다."

[[dialogue]]
speaker = "イレーナ"
original = "「んんぅ～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「응으으~~~읏<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "さっきよりもミルクが濃くなってきて、イレーナの味にますます夢中になる。"
translation = "아까보다 우유가 진해지기 시작해서, 이레나의 맛에 점점 더 꿈중이 된다."

[[dialogue]]
speaker = "イレーナ"
original = "「はああぁ<emoji=heart04>\u3000おっぱい、たくさん吸われてるっ<emoji=heart04>\u3000ちゅうちゅう吸われて、ミルク溢れてきちゃうぅっ<emoji=heart04>」"
translation = "「하아아아<emoji=heart04> 가슴, 잔뜩 빨리고 있어엇<emoji=heart04> 쪽쪽 빨려서, 우유 넘쳐흐르고 말아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
original = "「ふぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あぁあんっ<emoji=heart04>\u3000おっぱい熱いっ<emoji=heart04>\u3000おっぱい疼いちゃうのっ<emoji=heart04>」"
translation = "「화앗<emoji=heart04> 앗<emoji=heart04> 아아앙읏<emoji=heart04> 가슴 뜨거워엇<emoji=heart04> 가슴 욱신거려버리는걸<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "大きな胸を鷲掴みにして力を込めると、ぴゅっとミルクが飛び出た。"
translation = "커다란 가슴을 움켜쥐고 힘을 주자, 퓩 하고 우유가 튀어나왔다."

[[dialogue]]
speaker = "イレーナ"
original = "「ひあああぁっ<emoji=heart04><emoji=heart04>\u3000ミルク搾られてるっ<emoji=heart04>\u3000乳首ジンジンして……はあぁっ<emoji=heart04>\u3000おっぱい出るの、気持ちいい<emoji=heart04>」"
translation = "「히아아아앗<emoji=heart04><emoji=heart04> 우유 짜이고 있어엇<emoji=heart04> 젖꼭지 징징거려서…… 하아앗<emoji=heart04> 가슴 나오는 거, 기분 좋아<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
original = "「ひぁっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000飲んで<emoji=heart04>\u3000飲んで<emoji=heart04>\u3000あたしのミルクもっと飲んで<emoji=heart04>」"
translation = "「히앗<emoji=heart04> 안앗<emoji=heart04> 응읏<emoji=heart04> 마셔줘<emoji=heart04> 마셔줘<emoji=heart04> 내 우유 더 마셔줘<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
original = "「ふぁああっ<emoji=heart04><emoji=heart04>\u3000あたしのミルク、ゴクゴク飲んでるぅ……<emoji=heart04>\u3000はぁあっ、これ、すごいぃ<emoji=heart04>」"
translation = "「화아아앗<emoji=heart04><emoji=heart04> 내 우유, 꿀꺽꿀꺽 마시고 있어……<emoji=heart04> 하아앗, 이거, 굉장해에<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
original = "「あっ<emoji=heart04>\u3000ああっ<emoji=heart04>\u3000あっ、んんん<emoji=heart04>\u3000おち○ぽ、ズンって、子宮に当たってるっ<emoji=heart04>\u3000お腹の奥、キュンってして<emoji=heart04>」"
translation = "「앗<emoji=heart04> 아앗<emoji=heart04> 앗, 응응응<emoji=heart04> 자지, 즈응 하고 자궁에 닿고 있어엇<emoji=heart04> 배 안쪽이 큥 하고 거려서<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
original = "「んん～～っ<emoji=heart04>\u3000ミルク吸われて<emoji=heart04>\u3000おっぱいも、おま○こも、またイッちゃうぅ<emoji=heart04>」"
translation = "「응으~~읏<emoji=heart04> 우유 빨려서<emoji=heart04> 가슴도, 보지도, 또 가버려어엇<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "母乳を吸われながら悶えるイレーナ。"
translation = "모유를 빨려가며 몸부림치는 이레나."

[[dialogue]]
speaker = "unk"
original = "熱く蕩けた膣壁に絞られながら、口の中に溢れるミルクを味わい、下半身の奥から熱がせり上がってくる。"
translation = "뜨겁게 녹아내린 질벽에 조여지면서, 입안에 가득 차는 우유를 맛보고, 하반신 깊은 곳에서 열기가 치밀어 오른다."

[[dialogue]]
speaker = "イレーナ"
original = "「んんっ！？\u3000あっ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000おち○ぽドクドクして<emoji=heart04>\u3000射精しそうっ<emoji=heart04>」"
translation = "「응읏!? 앗<emoji=heart04> 하앗<emoji=heart04> 자지 두근두근거려서<emoji=heart04> 사정할 것 같아앗<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
original = "「出して<emoji=heart04>\u3000いっぱい出して<emoji=heart04>\u3000んぁ、んっ<emoji=heart04>\u3000赤ちゃんできるくらい<emoji=heart04>\u3000ほんとに母乳出るくらい<emoji=heart04>\u3000いっぱい注いでほしいのっ<emoji=heart04>」"
translation = "「내보내 줘<emoji=heart04> 잔뜩 내보내 줘<emoji=heart04> 응아, 응읏<emoji=heart04> 아기 생길 정도로<emoji=heart04> 정말로 모유 나올 정도로<emoji=heart04> 잔뜩 부어줬으면 좋겠어엇<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "爆発寸前の衝動をこらえながら、イレーナの子宮を突く。"
translation = "폭발 직전의 충동을 참으며, 이레나의 자궁을 찌른다."

[[dialogue]]
speaker = "unk"
original = "亀頭が奥を叩く度に膣壁が痛いぐらいに締まり、ミルクもまた出た。"
translation = "귀두가 안쪽을 때릴 때마다 질벽이 아플 정도로 조여지고, 우유도 다시 나왔다."

[[dialogue]]
speaker = "イレーナ"
original = "「ひぁああっ<emoji=heart04>\u3000おち○ぽ、お腹に、響くっ<emoji=heart04>\u3000はぁあっ<emoji=heart04>\u3000せーえき出してほしくて、子宮が、切なくなるのっ<emoji=heart04>」"
translation = "「히아아앗<emoji=heart04> 자지, 배에 울려엇<emoji=heart04> 하아앗<emoji=heart04> 정액 내보내 줬으면 해서, 자궁이 애틋해져버려엇<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
original = "「おっぱい熱いぃ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000おっぱい疼いて<emoji=heart04>\u3000ミルク出しながらイクっ<emoji=heart04>\u3000イッちゃうぅっ<emoji=heart04>」"
translation = "「가슴 뜨거워어<emoji=heart04> 앗<emoji=heart04> 응읏<emoji=heart04> 가슴 욱신거려서<emoji=heart04> 우유 나오면서 가앗<emoji=heart04> 가버려어엇<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
original = "「あ──あ──あ──ああぁあんっ<emoji=heart04>\u3000ひぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000おっぱいとおま○こイクっ<emoji=heart04>\u3000イクイクイクっ<emoji=heart04>」"
translation = "「아──아──아──아아아앙읏<emoji=heart04> 히앗<emoji=heart04> 앗<emoji=heart04> 가슴이랑 보지 가앗<emoji=heart04> 가가갓<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
original = "「はっ──あ──んんあぁっ<emoji=heart04>\u3000おっぱい熱いぃっ<emoji=heart04>\u3000イクっ<emoji=heart04>\u3000イクッ<emoji=heart04>\u3000イッちゃうぅぅっ<emoji=heart04>」"
translation = "「하앗──아──응응아아앗<emoji=heart04> 가슴 뜨거워어엇<emoji=heart04> 가앗<emoji=heart04> 가앗<emoji=heart04> 가버려어어엇<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
original = "「ふぁああっ──あ──ひあぁぁああぁああ～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「화아아앗──아──히아아아아아아아아~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "射精と同時、イレーナの乳首から勢いよく母乳が飛び出す。"
translation = "사정과 동시에 이레나의 젖꼭지에서 기세 좋게 모유가 튀어나온다."

[[dialogue]]
speaker = "イレーナ"
original = "「んんんっ<emoji=heart04>\u3000おっぱい、出て……あぁんっ<emoji=heart04>\u3000ふぁっ……はあぁっ<emoji=heart04>」"
translation = "「응응응읏<emoji=heart04> 가슴, 나와서…… 아앙읏<emoji=heart04> 화앗…… 하아앗<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
original = "「はぁはっ……んんっ<emoji=heart04>\u3000おち○ぽ脈打って……びゅーっ、びゅーって、子宮にせーえき来てるぅっ<emoji=heart04>」"
translation = "「하아하앗…… 응읏<emoji=heart04> 자지 맥박치면서…… 뷰우, 뷰우 하고, 자궁에 정액 오고 있어어엇<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
original = "「お腹も、おっぱいも、熱いぃっ<emoji=heart04>\u3000はぁ、はっ……あっ、ふぁああぁっ……<emoji=heart04>」"
translation = "「배도, 가슴도, 뜨거워어엇<emoji=heart04> 하아, 하앗…… 앗, 화아아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "射精しながら、ミルクを溢れさせる乳首にしゃぶりつく。"
translation = "사정하면서 모유를 뿜어내는 젖꼭지에 매달려 빤다."

[[dialogue]]
speaker = "イレーナ"
original = "「んん～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ミルク吸われながら、せーえき出されてっ……<emoji=heart04>\u3000んんっ、すごいぃっ<emoji=heart04>」"
translation = "「응으~~~읏<emoji=heart04><emoji=heart04><emoji=heart04> 우유 빨려가면서, 정액 내보내져서……<emoji=heart04> 응읏, 굉장해에엣<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
original = "「あっ……はあぁ……<emoji=heart04>\u3000まだミルク、出て……あ……んぅ～～っ<emoji=heart04>」"
translation = "「앗…… 하아아……<emoji=heart04> 아직 우유, 나와서…… 아…… 응우~~읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "イレーナのミルクを飲みながら、たっぷりと奥に精を注ぎ込んだ。"
translation = "이레나의 우유를 마시면서, 듬뿍 안쪽에 정을 쏟아부었다."

[[dialogue]]
speaker = "イレーナ"
original = "「はぁはぁ……はあぁ……<emoji=heart04>\u3000ふぅ……はぁ、はぁ、はあぁ……<emoji=heart04>\u3000せーえきで、お腹、いっぱい……<emoji=heart04>」"
translation = "「하아하아…… 하아아……<emoji=heart04> 후우…… 하아, 하아, 하아아……<emoji=heart04> 정액으로, 배, 가득해……<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
original = "「はあぁ……ようやくおっぱい止まったわね……ウェディングフォームってほんとに厄介なんだから……」"
translation = "「하아아…… 겨우 가슴이 멈췄네…… 웨딩 폼이란 건 정말 성가시다니까……」"

[[dialogue]]
speaker = "unk"
original = "激しい絶頂の後で、肩で息をするイレーナ。"
translation = "격렬한 절정 끝에 어깨로 숨을 몰아쉬는 이레나."

[[dialogue]]
speaker = "unk"
original = "俺はイレーナの母乳を浴びて、ミルクまみれになっていた。"
translation = "나는 이레나의 모유를 뒤집어쓰고, 우유 범벅이 되어 있었다."

[[dialogue]]
speaker = "イレーナ"
original = "「あ<emoji=heart04>\u3000あんたが出したの、おま○こから溢れちゃってる……」"
translation = "「아<emoji=heart04> 네가 내보낸 거, 보지에서 넘쳐흐르고 있어……」"

[[dialogue]]
speaker = "イレーナ"
original = "「あ、あたしのおっぱい、そんなによかったの……？」"
translation = "「저, 저기…… 내 가슴, 그렇게 좋았어……?」"

[[dialogue]]
speaker = "クロト"
original = "「うん……めちゃくちゃ興奮した」"
translation = "「응…… 엄청나게 흥분했어.」"

[[dialogue]]
speaker = "イレーナ"
original = "「清々しいほど正直ね、このヘンタイ。我ながらどうしてこんなヘンタイ好きになっちゃったのかなぁ……」"
translation = "「상쾌할 정도로 솔직하네, 이 변태. 나도 참 왜 이런 변태를 좋아하게 된 걸까……」"

[[dialogue]]
speaker = "イレーナ"
original = "「でも好きになっちゃったんだから仕方ないわね。ヘンタイの面倒はあたしが見てあげなきゃ」"
translation = "「하지만 좋아하게 되어버렸으니 어쩔 수 없네. 변태 수발은 내가 들어줘야지.」"

[[dialogue]]
speaker = "イレーナ"
original = "「ウェディングフォームを使いこなせるようになったら、またおっぱい飲ませてあげるわね<emoji=heart04>」"
translation = "「웨딩 폼을 능숙하게 다룰 수 있게 되면, 또 가슴 마시게 해줄게<emoji=heart04>」"

