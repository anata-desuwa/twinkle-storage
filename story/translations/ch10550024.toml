[[dialogue]]
speaker = "unk"
original = "第４話,あなたのファンになりたい,P"
translation = "제4화, 당신의 팬이 되고 싶어, P"

[[dialogue]]
speaker = "unk"
original = "夜、いつものようにエルゼに付き合って地下アイドルのライブに参加した。"
translation = "밤, 평소처럼 엘제와 함께 지하 아이돌 라이브에 참가했다."

[[dialogue]]
speaker = "unk"
original = "ライブが終わって帰り道、エルゼは興奮冷めやらぬ様子で空を見上げながら熱く語っている。"
translation = "라이브가 끝나고 돌아가는 길, 엘제는 흥분이 가시지 않은 듯 하늘을 올려다보며 뜨겁게 이야기하고 있다."

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「今日は本当に来てよかったですわ！\u3000まさか新メンバーのお披露目があるなんて思いませんでしたわ！」"
translation = "「오늘은 정말 오길 잘했습니다! 설마 신 멤버의 공개가 있을 줄은 생각도 못 했습니다!」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「緊張していたのでしょうか、ダンスはまだまだ固い感じでしたけど、一生懸命踊っていて……」"
translation = "「긴장하고 있었을까요, 춤은 아직 딱딱한 느낌이었지만, 열심히 춤추고 있어서……」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「そんな彼女を先輩たちがフォローしていて、その優しさがもう<ruby>尊<rt>とうと</rt></ruby>過ぎて……」"
translation = "「그런 그녀를 선배들이 도와주고 있었고, 그 다정함이 정말 고귀해서……」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「私、見ていて胸がキューッってなりましたの！\u3000会長様はいかがでしたか？」"
translation = "「저는, 보면서 가슴이 큐욱 하고 죄였습니다! 회장님은 어떠셨습니까?」"

[[dialogue]]
speaker = "unk"
original = "頑張ってる子を見ると応援したくなるね"
translation = "열심히 하는 아이를 보면 응원하고 싶어지지"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「そうなんですの！」"
translation = "「그렇습니다!」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「完成されたパフォーマンスはそれはそれでよいものですわ」"
translation = "「완성된 퍼포먼스는 그것대로 좋은 것입니다.」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「ですが、新人様が頑張って成長していく様子を見られるのもアイドルの魅力なんですの！」"
translation = "「하지만, 신인 분이 열심히 성장해 나가는 모습을 볼 수 있는 것도 아이돌의 매력입니다!」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「特にデビューの瞬間を見守った身としては思い入れも<ruby>一入<rt>ひとしお</rt></ruby>なのですわ！」"
translation = "「특히 데뷔의 순간을 지켜본 입장으로서는 감회가 남다릅니다!」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「会長様、私、決めましたわ！\u3000あの子のファンになります！」"
translation = "「회장님, 저, 결정했습니다! 저 아이의 팬이 되겠습니다!」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「あの子がもっともっと輝けるように、私も頑張ってたくさん応援いたしますわ！！」"
translation = "「저 아이가 더욱더 빛날 수 있도록, 저도 열심히 잔뜩 응원하겠습니다!!」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「ん、どうされましたの？\u3000何かに気が付いたようなお顔をして……」"
translation = "「응, 왜 그러십니까? 무언가를 깨달은 듯한 표정을 지으시고……」"

[[dialogue]]
speaker = "unk"
original = "俺はエルゼのファンなのかも"
translation = "나는 엘제의 팬일지도"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「ふえっ！？\u3000ど、どういうことですの？」"
translation = "「후에엣!? 무, 무슨 말씀이십니까?」"

[[dialogue]]
speaker = "unk"
original = "エルゼを見ていると応援したくなる"
translation = "엘제를 보고 있으면 응원하고 싶어진다"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「ああ、そういうことですのね」"
translation = "「아아, 그런 말씀이시군요.」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「確かに星騎士として私は、まだまだ成長の途中ですわ。つまり新人アイドルのようなものですわ」"
translation = "「확실히 성기사로서 저는, 아직 성장의 도중입니다. 즉 신인 아이돌과 같은 것입니다.」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「でしたら会長様、私のファンになって、私のことを推してくださいます？」"
translation = "「그렇다면 회장님, 저의 팬이 되어서, 저를 응원해 주시겠어요?」"

[[dialogue]]
speaker = "unk"
original = "星騎士として以外にも頑張ってる"
translation = "성기사로서 외에도 열심히 하고 있어"

[[dialogue]]
speaker = "unk"
original = "それだけじゃないよ"
translation = "그것만이 아니야"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「ぁ……そういうことですのね」"
translation = "「아…… 그런 말씀이시군요.」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「会長様と初めてお会いした時は、今思うと恥ずかしくなるほど世間知らずでしたわ」"
translation = "「회장님과 처음 만났을 때는, 지금 생각하면 부끄러워질 정도로 세상 물정을 몰랐습니다.」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「けれど会長様にいろいろな経験をさせてもらって、いろいろなことを教えて頂いて、少しずつ成長しておりますの」"
translation = "「하지만 회장님에게 여러 가지 경험을 하게 해 주시고, 여러 가지를 가르침을 받아서, 조금씩 성장하고 있습니다.」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「そんな私のことを全部、会長様は見守ってくださるということですのね？」"
translation = "「그런 저의 모든 것을, 회장님께서 지켜봐 주신다는 말씀이시군요?」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「会長様、ありがとうございます……」"
translation = "「회장님, 감사합니다……」"

[[dialogue]]
speaker = "unk"
original = "エルゼは俺の腕を取り、そっと頭を預けてくる。"
translation = "엘제는 나의 팔을 잡고, 살짝 머리를 기댄다."

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「会長様が見守ってくださっていると考えると、とても安心できますわ……」"
translation = "「회장님께서 지켜봐 주신다고 생각하니, 매우 안심이 됩니다……」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「これからも私のこと、宜しくお願いいたします」"
translation = "「앞으로도 저를, 잘 부탁드립니다.」"

[[dialogue]]
speaker = "unk"
original = "俺のこともよろしくね"
translation = "나도 잘 부탁해"

[[dialogue]]
speaker = "unk"
original = "恋愛方面では俺も発展途上だから"
translation = "연애 방면으로는 나도 발전 도상이라서"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「まあ……分かりましたわ<emoji=heart04>\u3000会長様のことは私がしっかり応援して、しっかり見守らせて頂きます」"
translation = "「어머…… 알겠습니다<emoji=heart04> 회장님의 일은 제가 확실히 응원하고, 확실히 지켜봐 드리겠습니다.」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「ふふっ♪\u3000実は私、恋人同士といってもどうすれば良いのか、よく分かっていなかったところがありましたの」"
translation = "「후훗♪ 사실 저는, 연인 사이라고 해도 어떻게 해야 할지, 잘 모르고 있는 부분이 있었습니다.」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「ですが今、何だかひとつ、恋の仕方について学んだような気がしますわ……」"
translation = "「하지만 지금, 왠지 하나, 사랑하는 방법에 대해 배운 것 같은 기분이 듭니다……」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「送って頂いてありがとうございます。ここまでで大丈夫です」"
translation = "「데려다주셔서 감사합니다. 여기까지면 괜찮습니다.」"

[[dialogue]]
speaker = "unk"
original = "ちゃんと外泊届を取って"
translation = "제대로 외박계를 내고"

[[dialogue]]
speaker = "unk"
original = "今度は家に泊まりに来ない？"
translation = "이번에는 우리 집에 자러 오지 않을래?"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「お泊り！？\u3000素晴らしいですわ！！」"
translation = "「외박이요!? 멋집니다!!」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「っ！\u3000いけませんわ……静かに静かに……」"
translation = "「윽! 안 됩니다…… 조용히 조용히……」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「会長様の提案があまりに素晴らしくて、思わず声を上げてしまいましたわ」"
translation = "「회장님의 제안이 너무 멋져서, 저도 모르게 소리를 내고 말았습니다.」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「私、今までお友達の家にお泊りなどはしたことありませんの」"
translation = "「저는, 지금까지 친구 집에 외박 같은 건 해 본 적이 없습니다.」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「ですから是非、会長様のお家にご招待して頂きたいですわ」"
translation = "「그러니 부디, 회장님의 댁에 초대해 주셨으면 합니다.」"

[[dialogue]]
speaker = "unk"
original = "ぜひ遊びに来てよ"
translation = "꼭 놀러 와 줘"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「そう致しますわ！」"
translation = "「그렇게 하겠습니다!」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「そうと決まりましたら、さっそくお勉強致しませんと！」"
translation = "「그렇게 결정되었으니, 당장 공부해야겠습니다!」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「お友達のお家にお泊りするときに、どういった準備をしなければならないのか……まったく分かりませんの」"
translation = "「친구 집에 외박할 때, 어떤 준비를 해야 하는지…… 전혀 모르겠습니다.」"

[[dialogue]]
speaker_original = "エルデリーゼ"
speaker_translation = "엘데리제"
original = "「それに外泊のための口実ですわ！\u3000何か自然な理由を考えなければ……うーん……」"
translation = "「게다가 외박을 위한 구실입니다! 뭔가 자연스러운 이유를 생각해야…… 으음……」"

[[dialogue]]
speaker = "unk"
original = "そんなに難しく考えることは無いのに、と思いつつ。"
translation = "그렇게 어렵게 생각할 필요는 없는데, 라고 생각하면서."

[[dialogue]]
speaker = "unk"
original = "目を輝かせながらあれこれ考えているエルゼの姿が楽しそうで、しばらくは見守るだけにしようと考える俺だった。"
translation = "눈을 빛내며 이것저것 생각하는 엘제의 모습이 즐거워 보여서, 당분간은 지켜보기만 하기로 생각하는 나였다."

