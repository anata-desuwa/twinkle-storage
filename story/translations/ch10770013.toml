[[dialogue]]
speaker = "unk"
original = "第３話,蘭美と初デート,P"
translation = "제3화, 라비와 첫 데이트, P"

[[dialogue]]
speaker = "unk"
original = "蘭美と顔を合わせることが多くなってきた、ある休日。俺は彼女に呼び出されて、街へやってきていた。"
translation = "라비와 얼굴을 마주하는 일이 많아진, 어느 휴일. 나는 그녀에게 호출되어, 거리로 나와 있었다."

[[dialogue]]
speaker = "蘭美"
original = "「きたわね。待っていたわよ、会長！」"
translation = "「왔네. 기다리고 있었어, 회장!」"

[[dialogue]]
speaker = "unk"
original = "かなり早く着いたと思ったのに"
translation = "꽤 일찍 도착했다고 생각했는데"

[[dialogue]]
speaker = "蘭美"
original = "「ふふっ。――私が先に待ってて、驚いたって？」"
translation = "「후훗. ――내가 먼저 기다리고 있어서, 놀랐어?」"

[[dialogue]]
speaker = "蘭美"
original = "「私は最速のメイドだもの。身支度を速く整えるのは得意なのよ」"
translation = "「나는 가장 빠른 메이드인 걸. 몸단장을 빠르게 하는 건 특기야」"

[[dialogue]]
speaker = "蘭美"
original = "「さて、それじゃあ早速、事前に言っていた通り、初めてのデートといきましょうか♪」"
translation = "「자, 그럼 바로, 사전에 말했던 대로, 첫 데이트를 시작해 볼까♪」"

[[dialogue]]
speaker = "unk"
original = "数日前――"
translation = "며칠 전――"

[[dialogue]]
speaker = "蘭美"
original = "「会長、突然だけど、私とデートをしない？」"
translation = "「회장, 갑작스럽지만, 나랑 데이트하지 않을래?」"

[[dialogue]]
speaker = "unk"
original = "別にいいけど……って、デート！？"
translation = "「별로 상관없지만…… 랄까, 데이트!?」"

[[dialogue]]
speaker = "蘭美"
original = "「そ。休日に男女２人で出かけましょう、ってお誘いよ。会長、まだ誰かと付き合っているわけじゃなかったわよね？」"
translation = "「응. 휴일에 남자 여자 둘이서 외출하자는, 그런 권유야. 회장, 아직 누구랑 사귀고 있는 건 아니었지?」"

[[dialogue]]
speaker = "蘭美"
original = "「――なんで急にって？\u3000会長とはここ最近、親しくなってる気がしたし、そういうのもいいかなって」"
translation = "「――왜 갑자기냐고? 회장이랑은 최근 들어, 친해진 것 같았고, 그런 것도 괜찮을까 싶어서」"

[[dialogue]]
speaker = "蘭美"
original = "「ていうか、そんなに驚くこと？\u3000男女で出かけるくらい、別に普通でしょ？\u3000大学生がよく男女で合コンしてるじゃない。それと同じようなものよ」"
translation = "「랄까, 그렇게 놀랄 일이야? 남녀가 외출하는 정도, 별로 평범하잖아? 대학생들이 자주 남녀가 미팅하잖아. 그거랑 비슷한 거야」"

[[dialogue]]
speaker = "蘭美"
original = "「まあ、私の場合は実家の事情も入ってるけど……」"
translation = "「뭐, 내 경우에는 집안 사정도 들어가 있지만……」"

[[dialogue]]
speaker = "蘭美"
original = "「――別に隠すことじゃないわ。説明しておくと、私が将来メイドを目指すことを許してもらう代わりに、両親と約束を交わしたのよ」"
translation = "「――별로 숨길 일은 아니야. 설명해 두자면, 내가 장래 메이드를 목표로 하는 것을 허락받는 대신, 부모님과 약속을 했어」"

[[dialogue]]
speaker = "蘭美"
original = "「将来結婚して幸せな家庭を築けるような、婿探しもちゃんとしておくようにって」"
translation = "「장래 결혼해서 행복한 가정을 꾸릴 수 있는, 사위 찾기도 제대로 해 두라고」"

[[dialogue]]
speaker = "蘭美"
original = "「私は貴族の１人娘だしね。いずれ羽宮家に戻って、跡取りは作らないといけないわ。両親の為にもね」"
translation = "「나는 귀족의 외동딸이고. 언젠가 하네미야 가문으로 돌아가서, 후계자는 만들어야 해. 부모님을 위해서도 말이야」"

[[dialogue]]
speaker = "蘭美"
original = "「それでまぁ、会長のことは男性として嫌いじゃないし？\u3000２人で遊びに出かけてみるのもいいかなって思ったのよ」"
translation = "「그래서 뭐, 회장을 남성으로서 싫어하지도 않고? 둘이서 놀러 나가보는 것도 괜찮을까 싶었어」"

[[dialogue]]
speaker = "蘭美"
original = "「それで……会長としては、どうなのかしら……？」"
translation = "「그래서…… 회장으로서는, 어때……?」"

[[dialogue]]
speaker = "蘭美"
original = "「…………いいの？\u3000ふふっ♪」"
translation = "「…………괜찮다고? 후훗♪」"

[[dialogue]]
speaker = "蘭美"
original = "「じゃあ、決まりね♪」"
translation = "「그럼, 결정됐네♪」"

[[dialogue]]
speaker = "unk"
original = "そうして、蘭美から行きたいところがあると言われ、連れてこられたのは、ゲームセンターだった。"
translation = "그렇게, 라비에게 가고 싶은 곳이 있다고 들어, 이끌려 온 곳은, 게임 센터였다."

[[dialogue]]
speaker = "蘭美"
original = "「久しぶりにきたわ。私、実は対戦する系のゲームが好きなのよね♪」"
translation = "「오랜만에 왔네. 나, 사실 대전하는 계열의 게임을 좋아하거든♪」"

[[dialogue]]
speaker = "蘭美"
original = "「というわけで会長、なにか勝負しましょ！\u3000レースゲームとか得意よ私♪」"
translation = "「그런 이유로 회장, 뭔가 승부하자! 레이싱 게임 같은 건 자신 있어, 나♪」"

[[dialogue]]
speaker = "蘭美"
original = "「――このゲームの操作感覚はもうわかってきたわ。見せてあげるわ、この私のドライビングテクニックを！」"
translation = "「――이 게임의 조작 감각은 이미 알았어. 보여줄게, 바로 이 나의 드라이빙 테크닉을!」"

[[dialogue]]
speaker = "蘭美"
original = "「最速でかっ飛ばしていくわよ！\u3000それっ！」"
translation = "「가장 빠르게 쌩쌩 달려 나갈 거야! 자!」"

[[dialogue]]
speaker = "蘭美"
original = "「この速度でコーナーを曲がれるのかって？\u3000むしろ遅くみえるくらいよ！\u3000私、動体視力はすごくいいんだから！」"
translation = "「이 속도로 코너를 돌 수 있냐고? 오히려 느리게 보일 정도야! 나, 동체 시력은 엄청 좋으니까!」"

[[dialogue]]
speaker = "蘭美"
original = "「内側ギリギリのラインでドリフト決めてあげるから、覚悟なさい！\u3000とりゃあっ！」"
translation = "「안쪽 아슬아슬한 라인에서 드리프트 결정해 줄 테니, 각오해! 토랴앗!」"

[[dialogue]]
speaker = "蘭美"
original = "「――ふふふっ！\u3000イェーイ♪\u3000私の勝ちね！」"
translation = "「――후후훗! 예이♪ 내 승리네!」"

[[dialogue]]
speaker = "蘭美"
original = "「最速の景色は、やっぱり気持ちいいものだわ♪」"
translation = "「가장 빠른 경치는, 역시 기분 좋은 법이야♪」"

[[dialogue]]
speaker = "蘭美"
original = "「ふぅ♪\u3000ゲームセンター、楽しかったわ！\u3000やっぱり私は、ゲームは誰かと一緒にするのが好きね」"
translation = "「후우♪ 게임 센터, 즐거웠어! 역시 나는, 게임은 누군가와 함께 하는 게 좋네」"

[[dialogue]]
speaker = "蘭美"
original = "「次は、ウィンドウショッピングでもしましょうか。それで、これはデートなわけだし――」"
translation = "「다음은, 윈도 쇼핑이라도 해 볼까. 그리고, 이건 데이트인 거니까――」"

[[dialogue]]
speaker = "蘭美"
original = "「会長、手を繋いで歩いてみない？」"
translation = "「회장, 손을 잡고 걸어보지 않을래?」"

[[dialogue]]
speaker = "蘭美"
original = "「ふふっ、１度目のデートでは早いかもしれないわね。でも、私は何事も最速を目指す主義なの♪」"
translation = "「후훗, 첫 데이트에서는 빠를지도 모르겠네. 하지만, 나는 무슨 일이든 가장 빠름을 목표로 하는 주의야♪」"

[[dialogue]]
speaker = "蘭美"
original = "「男女のスキンシップってやつを１つくらい試しておきたいと思ってね。……どうかしら？」"
translation = "「남녀의 스킨십이라는 걸 하나 정도 시도해 보고 싶어서 말이야. ……어때?」"

[[dialogue]]
speaker = "蘭美"
original = "「――ＯＫね♪\u3000じゃあ、私が言い出しっぺだし……」"
translation = "「――OK네♪ 그럼, 내가 먼저 말했으니……」"

[[dialogue]]
speaker = "unk"
original = "蘭美が手を差し出す。俺はその手を握ったのだが――"
translation = "라비가 손을 내민다. 나는 그 손을 잡았는데――"

[[dialogue]]
speaker = "蘭美"
original = "「ぴゃっ！？」"
translation = "「퍄앗!?」"

[[dialogue]]
speaker = "蘭美"
original = "「……い、いや、別になんでもないわ！\u3000初めてだから、ちょっと驚いただけで……」"
translation = "「……아, 아니, 별로 아무것도 아니야! 처음이라서, 조금 놀랐을 뿐이고……」"

[[dialogue]]
speaker = "unk"
original = "てっきり経験があるものだと思ってた"
translation = "당연히 경험이 있을 거라고 생각했는데"

[[dialogue]]
speaker = "蘭美"
original = "「あいにく、今日が人生初のデートよ。私、学園に来るまでは、メイドの修行に明け暮れてたし……」"
translation = "「아쉽게도, 오늘이 인생 첫 데이트야. 나, 학원에 오기 전까지는, 메이드 수행에만 몰두했었고……」"

[[dialogue]]
speaker = "蘭美"
original = "「――って、なに笑ってるのよ！\u3000誰にだって、初めてはあるものでしょ！？」"
translation = "「――랄까, 왜 웃는 거야! 누구에게나, 처음은 있는 법이잖아!?」"

[[dialogue]]
speaker = "unk"
original = "いや、光栄だなと思って"
translation = "아니, 영광이라고 생각해서"

[[dialogue]]
speaker = "蘭美"
original = "「え……？\u3000――初めての相手に貴方を選んだから？」"
translation = "「에……? ――처음 상대에 당신을 골랐기 때문에?」"

[[dialogue]]
speaker = "蘭美"
original = "「ふ、ふぅん。そう……」"
translation = "「흐, 흐음. 그래……」"

[[dialogue]]
speaker = "蘭美"
original = "「――初めてなら、焦らずゆっくり慣れていこうって？」"
translation = "「――처음이라면, 조급해하지 않고 천천히 익숙해지자고?」"

[[dialogue]]
speaker = "蘭美"
original = "「て、手を繋ぐくらい、すぐに慣れるから、別にそんな気を遣わなくたって……」"
translation = "「서, 손을 잡는 정도, 금방 익숙해질 테니, 별로 그렇게 신경 쓰지 않아도……」"

[[dialogue]]
speaker = "蘭美"
original = "「――も、もう、わかったわよ。そこまで言うなら……今日は貴方のペースに付き合ってあげるわ」"
translation = "「――모, 몰라, 알았어. 거기까지 말한다면…… 오늘은 당신의 페이스에 맞춰 줄게」"

[[dialogue]]
speaker = "unk"
original = "そう言って照れた顔で視線を逸らす蘭美を見て、可愛いと思ってしまう俺なのだった――"
translation = "그렇게 말하며 부끄러워하는 얼굴로 시선을 피하는 라비를 보고, 귀엽다고 생각하는 나였다――"

