[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「はぁ～……。良いお湯ね～……。やっぱり温泉って最高の贅沢だわ～……」"
translation = "「하아~……. 물 좋네~……. 역시 온천은 최고의 사치야~……」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「体の疲れは取れるし、お肌はツヤツヤになるし、思う存分グータラ浸かっていられるし……♪」"
translation = "「몸의 피로는 풀리고, 피부는 매끈매끈해지고, 마음껏 빈둥거리며 담가져 있을 수 있고……♪」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「ね？\u3000ダーリンもそう思うでしょ？」"
translation = "「그치? 달링도 그렇게 생각하지?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そ、そうだな」"
translation = "「그, 그렇네.」"

[[dialogue]]
speaker = "unk"
original = "できるだけパルミエに視線を向けないようにしながら頷き返す。"
translation = "최대한 파르미에에게 시선을 주지 않으려 노력하며 고개를 끄덕인다."

[[dialogue]]
speaker = "unk"
original = "その日俺はパルミエに連れられて、貸し切り露天風呂付きの温泉旅館へやってきていた。"
translation = "그날 나는 파르미에에게 이끌려, 대절 노천탕이 딸린 온천 여관에 와 있었다."

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「んもう、相変わらず恥ずかしがり屋さんね？\u3000せっかく夫婦水入らずで温泉に入ってるんだから、もっとくっついてきたらいいのに」"
translation = "「정말이지, 여전히 부끄럼쟁이라니까? 어렵게 부부끼리만 온천에 들어왔는데, 좀 더 달라붙어도 괜찮은데.」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「ほーら抱きついてきて？\u3000私のおっぱい温泉もいい感じに温まってきたところよ～？」"
translation = "「자아~ 안겨보라구? 내 가슴 온천도 기분 좋게 데워진 참이니까~?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「お、おっぱい温泉って……！」"
translation = "「가, 가슴 온천이라니……!」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「谷間の中に飛び込んできてって言ってるの♪\u3000温泉のおかげでいつも以上にツヤツヤとろとろになってるし、絶対気持ちいいわよ？」"
translation = "「가슴 골 사이로 뛰어들어 오라는 소리야♪ 온천 덕분에 평소보다 더 매끈매끈 말랑말랑해졌으니까, 분명 기분 좋을걸?」"

[[dialogue]]
speaker = "unk"
original = "大きな乳房をこれ見よがしに水面にプカプカ浮かべながら、パルミエが両手を広げて俺を誘ってくる。"
translation = "커다란 유방을 보란 듯이 수면에 둥둥 띄우며, 파르미에가 양팔을 벌려 나를 유혹해 온다."

[[dialogue]]
speaker = "unk"
original = "その光景を目にしてしまった途端、瞬く間に股間がのぼせ上がってしまって──"
translation = "그 광경을 목격해 버린 순간, 눈 깜짝할 새에 가랑이가 달아올라 버려서──"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「ふふふ、照れ屋なダーリンと違って息子ちゃんの方は本当に素直ね～♪」"
translation = "「후후후, 부끄럼쟁이인 달링과는 다르게 아들내미 쪽은 정말 솔직하네~♪」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っっ。いや、これはその……！」"
translation = "「윽. 아니, 이건 그……!」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「はいはい、ダーリンはそこに座ってなさい♪\u3000私は息子ちゃんをご案内しなくちゃいけないから♪」"
translation = "「네네, 달링은 거기 앉아있어♪ 나는 아들내미를 안내해줘야 하니까♪」"

[[dialogue]]
speaker = "unk"
original = "半ば強引に湯船の縁に座らされる。"
translation = "반강제로 탕 가장자리에 앉혀진다."

[[dialogue]]
speaker = "unk"
original = "そして次の瞬間には──"
translation = "그리고 다음 순간에는──"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「ふふ、どうかしら？\u3000私のおっぱい温泉の浸かり心地は」"
translation = "「후후, 어때? 내 가슴 온천에 몸을 담근 기분은.」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「ただ挟まれてるだけでも、すごく気持ちがいいでしょ？\u3000薬湯効果でいい感じにヌルヌルスベスベになってるだろうし♪」"
translation = "「그냥 끼워져 있는 것만으로도 무척 기분 좋지? 약탕 효과로 기분 좋게 미끌미끌 보들보들해졌을 테고♪」"

[[dialogue]]
speaker = "unk"
original = "おっぱいの感触を味わわせるように、ぎゅ～っと優しくペニスを抱き締めながら、パルミエが微笑みかけてくる。"
translation = "가슴의 감촉을 맛보게 하려는 듯, 꼬옥 부드럽게 자지를 껴안으며 파르미에가 미소 짓는다."

[[dialogue]]
speaker = "unk"
original = "確かに挟まれているだけで気持ちいい……。"
translation = "확실히 끼워져 있는 것만으로도 기분 좋다……."

[[dialogue]]
speaker = "unk"
original = "温泉のお湯でぬくぬくに火照った乳房がペニス全体を包み込んでくれていて、まさにおっぱいの温泉に浸かっているみたいだ。"
translation = "온천물에 따끈따끈하게 달아오른 유방이 자지 전체를 감싸주고 있어서, 그야말로 가슴 온천에 몸을 담그고 있는 것 같다."

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「あらあらダーリンったら、さっきまであんなに恥ずかしがってたのに、だらしなくはぁはぁ言っちゃって」"
translation = "「어라어라 달링두 참, 아까까지 그렇게 부끄러워하더니 추하게 하아하아 소리 내고 있네.」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「やっぱり、私のおっぱい温泉に入りたかったんじゃない♪\u3000最初から照れずに抱きついてくれたら良かったのに♪」"
translation = "「역시, 내 가슴 온천에 들어오고 싶었던 거 아냐♪ 처음부터 부끄러워 말고 안겼으면 좋았을 텐데♪」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「パ、パルミエが温泉を満喫したいって言ってたもんだから……」"
translation = "「파, 파르미에가 온천을 만끽하고 싶다고 말했으니까……」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「うん？\u3000もしかして勃起しちゃったら悪いとか思ってたの？\u3000ふふ、ダーリンは女心がわかってないわね～」"
translation = "「응? 혹시 발기해 버리면 미안하다고 생각했어? 후후, 달링은 여자의 마음을 모르네~」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「好きな人に勃起されて、嬉しくない女なんていないんだから<emoji=heart04>\u3000むしろ勃起されたくて温泉旅行に誘ったのよ？」"
translation = "「좋아하는 사람이 발기해 줘서 기쁘지 않은 여자는 없단 말이야<emoji=heart04> 오히려 발기해 줬으면 해서 온천 여행에 권유한 거라구?」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「ここならいくらイチャついても誰にも邪魔されないし……<emoji=heart04>\u3000恥ずかしがり屋のダーリン相手に裸も見せてあげられるし……<emoji=heart04>」"
translation = "「여기라면 아무리 꽁냥꽁냥 해도 아무도 방해 안 하구……<emoji=heart04> 부끄럼쟁이 달링 상대로 알몸도 보여줄 수 있으니까……<emoji=heart04>」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「夫婦で温泉を満喫するって言うのは、そういうことなんだから……<emoji=heart04>\u3000私の裸を見て、こうしておち○ちんを大きくして欲しかったの……<emoji=heart04>」"
translation = "「부부가 온천을 만끽한다는 건 그런 거란 말이야……<emoji=heart04> 내 알몸을 보고 이렇게 자지를 크게 키워주길 바랐어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "愛しげに谷間の中の勃起ペニスを見つめながら、パルミエがゆっくりと乳房を上下に動かし始めてくれる。"
translation = "사랑스럽다는 듯 가슴 골 사이의 발기한 자지를 바라보며, 파르미에가 천천히 유방을 위아래로 움직이기 시작한다."

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「ほーら……<emoji=heart04>\u3000ん、ふっ……<emoji=heart04>\u3000たくさんたくさん気持ち良くなって……？」"
translation = "「자아……<emoji=heart04> 응, 훗……<emoji=heart04> 많이 많이 기분 좋아져야 해……?」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「私のおっぱい温泉、はぁ……ん……<emoji=heart04>\u3000たっぷり堪能しちゃってね……<emoji=heart04>」"
translation = "「내 가슴 온천, 하아…… 응……<emoji=heart04> 듬뿍 만끽해 줘……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "おっぱいの中にふんわりと絶妙に包み込んだペニスを、パルミエがぬるんぬるんと優しく撫でるように扱いてくれる。"
translation = "가슴 속에 포근하고 절묘하게 감싸인 자지를, 파르미에가 미끈미끈하게 부드럽게 쓰다듬듯 훑어준다."

[[dialogue]]
speaker = "unk"
original = "それだけでも今にも達してしまいそうなほど気持ちいい。だけど同時に、全身が癒やされていく感じがして。"
translation = "그것만으로도 당장이라도 갈 것 같을 정도로 기분 좋다. 하지만 동시에 온몸이 치유되는 느낌이 들어서."

[[dialogue]]
speaker = "unk"
original = "これが本当の極楽かもしれない……。体から力が抜けていく……。"
translation = "이것이 진짜 극락일지도 모르겠다…… 몸에서 힘이 빠져나간다……."

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「ふふふ、もっと力を抜いちゃっていいのよ……<emoji=heart04>\u3000ダーリンはただ気持ち良くなってくれるだけでいいんだから……<emoji=heart04>」"
translation = "「후후후, 좀 더 힘을 빼도 괜찮아……<emoji=heart04> 달링은 그저 기분 좋아지기만 하면 되니까……<emoji=heart04>」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「温泉って、はぁ……ふぅん……そういうものだし<emoji=heart04>\u3000私のおっぱい温泉で、体の疲れも、溜まったものも、ぜーんぶ出しちゃいましょ？」"
translation = "「온천이란 건, 하아…… 후웅…… 그런 거니까<emoji=heart04> 내 가슴 온천에서, 몸의 피로도, 쌓인 것도, 저언부 내보내 버리자?」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「いつでも出しちゃっていいから……<emoji=heart04>\u3000この温泉はダーリンのためのものだもの……<emoji=heart04>\u3000いくらでも汚しちゃってオーケーだからね<emoji=heart04>」"
translation = "「언제든 내보내도 되니까……<emoji=heart04> 이 온천은 달링을 위한 거니까 말이야……<emoji=heart04> 얼마든지 더럽혀도 오케이니까 말이야<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "もう既に精子が先端にのぼっていっているのを察してか、パルミエが冗談めかしに微笑みかけてくれる。"
translation = "이미 정액이 끝부분까지 올라오고 있는 것을 알아챘는지, 파르미에가 농담 섞인 미소를 짓는다."

[[dialogue]]
speaker = "unk"
original = "付き合ってからというものいつもこうだ。いつの間にかパルミエにリードされたり、つい甘えてしまったりしていて……。"
translation = "사귀고 난 뒤로는 언제나 이렇다. 어느새 파르미에에게 리드당하거나, 나도 모르게 어리광을 부리게 되어버려서……."

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「んもうダーリン、何考えてるの？\u3000気持ち良くなってって言ってるのに」"
translation = "「정말이지 달링, 무슨 생각해? 기분 좋아지라고 했더니.」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「いつも俺ばっかり、とか。考えてないでしょうね？\u3000いいのよ、それで……<emoji=heart04>\u3000これは私がしたいことなんだから……<emoji=heart04>」"
translation = "「항상 나만, 이라던가. 그런 생각 하는 거 아니겠지? 괜찮아, 그걸로……<emoji=heart04> 이건 내가 하고 싶은 일이니까……<emoji=heart04>」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「ダーリンに気持ち良くなってもらうのが好きなの……<emoji=heart04>\u3000妻冥利に尽きるじゃない……<emoji=heart04>」"
translation = "「달링이 기분 좋아지는 걸 지켜보는 게 좋아……<emoji=heart04> 아내로서의 보람이 느껴지잖아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「もう何度も裸を見せてるのに、未だにおっぱいをチラ見しちゃっただけでこんなに勃起してくれるし……<emoji=heart04>」"
translation = "「벌써 몇 번이나 알몸을 보여줬는데, 아직도 가슴을 힐끗 본 것만으로 이렇게 발기해 주고……<emoji=heart04>」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「おっぱいで挟んであげたら、エッチなおつゆまで噴き出してくれるもの……<emoji=heart04>\u3000とっても嬉しいわ……<emoji=heart04>」"
translation = "「가슴으로 끼워줬더니 야한 즙까지 뿜어내는걸……<emoji=heart04> 정말 기뻐……<emoji=heart04>」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「だからダーリンは、んっ……はぁ……<emoji=heart04>\u3000大人しく私に気持ち良くされちゃいなさい<emoji=heart04>\u3000私はそれが幸せなんだから……<emoji=heart04>」"
translation = "「그러니까 달링은, 응…… 하아……<emoji=heart04> 얌전히 나한테 기분 좋게 당해버리렴<emoji=heart04> 나는 그게 행복하니까……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ぎゅう……ぎゅう……ぬるん、ぬるん……。と巧みにおっぱいを動かして、愛情たっぷりに俺のモノを愛してくれるパルミエ。"
translation = "꼬옥…… 꼬옥…… 미끈, 미끈……. 능숙하게 가슴을 움직여서 애정 듬뿍 담아 내 것을 사랑해 주는 파르미에."

[[dialogue]]
speaker = "unk"
original = "湯船に入っているより、よっぽどのぼせてしまう。パルミエの大きな愛がパイズリ越しに伝わってきて、幸せで、気持ち良くて……。"
translation = "탕에 들어와 있을 때보다 훨씬 더 정신이 몽롱해진다. 파르미에의 커다란 사랑이 파이즈리를 통해 전해져 와서 행복하고, 기분 좋아서……."

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「ダーリンは、はぁ……んっ……<emoji=heart04>\u3000こうして先っぽをスリスリされるのが好きなのよね……<emoji=heart04>」"
translation = "「달링은, 하아…… 응……<emoji=heart04> 이렇게 끝부분을 문질문질 당하는 걸 좋아하지……<emoji=heart04>」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「根元からぎゅ～……っと持ち上げるように扱いて、んっ……ふっ……<emoji=heart04>\u3000先っぽをおっぱいで呑み込みながら強めにゴシゴシ～ってされるのが好きなんでしょ<emoji=heart04>」"
translation = "「뿌리부터 꼬오옥…… 하고 들어 올리듯 훑고, 응…… 훗……<emoji=heart04> 끝부분을 가슴으로 집어삼키며 강하게 쓱쓱~ 당하는 걸 좋아하잖아<emoji=heart04>」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「ほーら、ビクビクしっぱなし……<emoji=heart04>\u3000ふふ、旦那様のおち○ちんに詳しくなるのって、本当に嬉しいものね……<emoji=heart04>」"
translation = "「자아, 계속 움찔움찔하고 있어……<emoji=heart04> 후후, 남편님의 자지에 대해 잘 알게 된다는 건 정말 기쁜 일이네……<emoji=heart04>」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「喜んでもらえると、んっ……ふぅ、んはぁ、はぁ……<emoji=heart04>\u3000もっとご奉仕したくなっちゃう……<emoji=heart04>」"
translation = "「기뻐해 주면, 응…… 후우, 응하아, 하아……<emoji=heart04> 더 봉사하고 싶어져……<emoji=heart04>」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「私がこんなにも誰かを好きになっちゃうなんて、ふふふ……<emoji=heart04>\u3000ダーリンと出会うまで想像もしてなかったわ……<emoji=heart04>」"
translation = "「내가 이렇게나 누군가를 좋아하게 되다니, 후후후……<emoji=heart04> 달링과 만나기 전엔 상상도 못 했어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「シフォンやモナカと、んっ、はぁ、楽しく過ごしてるだけで十分だったのに……<emoji=heart04>\u3000愛って偉大ね……<emoji=heart04>」"
translation = "「시퐁이나 모나카랑, 응, 하아, 즐겁게 지내는 걸로 충분했는데……<emoji=heart04> 사랑이란 위대하네……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺のペニスが火照りを増すごとに、パルミエの体温もぐんぐん上昇してくる。ただでさえ温かい胸の中がより火照ってきて。"
translation = "내 자지가 열기를 더해갈수록 파르미에의 체온도 쑥쑥 상승한다. 안 그래도 따뜻한 품속이 더욱 뜨겁게 달아올라서."

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「はぁ……はぁ……<emoji=heart04>\u3000ダメね、興奮してきちゃう……<emoji=heart04>」"
translation = "「하아…… 하아……<emoji=heart04> 안 되겠어, 흥분돼버려……<emoji=heart04>」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「ダーリンがおち○ちんビクつかせてくれるたびに、どうしようもないくらい嬉しくなっちゃって……<emoji=heart04>」"
translation = "「달링이 자지를 움찔거릴 때마다, 어쩔 수 없을 정도로 기뻐져서……<emoji=heart04>」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「もっと、んっ、はぁ、んはぁ……<emoji=heart04>\u3000ダーリンのこと気持ち良くしちゃってもいい？\u3000ダーリンに、はぁ、あぁ、イってもらいたいの<emoji=heart04>」"
translation = "「좀 더, 응, 하아, 응하아……<emoji=heart04> 달링을 기분 좋게 해줘도 돼? 달링이, 하아, 아아, 갔으면 좋겠어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "気付けばパルミエも俺と同じくらい息を荒くして、見つめてくれていた。"
translation = "어느덧 파르미에도 나만큼이나 숨을 거칠게 몰아쉬며 바라보고 있었다."

[[dialogue]]
speaker = "unk"
original = "その熱っぽい瞳を受け止めるだけでもペニスが震えてしまう。"
translation = "그 뜨거운 눈동자를 마주하는 것만으로도 자지가 떨려버린다."

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「ふふ……<emoji=heart04>\u3000見つめ合うだけでおち○ちんガチガチにしてくれるなんて……<emoji=heart04>\u3000愛してるって言われるよりも嬉しいかも……<emoji=heart04>」"
translation = "「후후……<emoji=heart04> 서로 바라보는 것만으로 자지를 딱딱하게 세워주다니……<emoji=heart04> 사랑한다는 말을 듣는 것보다 기쁠지도……<emoji=heart04>」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「たくさんドピュドピュさせてあげるわね……<emoji=heart04>\u3000私のおっぱい温泉は、そのためにあるんだから……<emoji=heart04>」"
translation = "「잔뜩 싸게 해줄게……<emoji=heart04> 내 가슴 온천은 그러기 위해 있는 거니까……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "するとパルミエはただでさえグラマラスなおっぱいをより寄せ上げてくれて──"
translation = "그러자 파르미에는 가뜩이나 풍만한 가슴을 더욱 끌어모아 주었고──"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「んっ……はぁっ……<emoji=heart04>\u3000んっ、んっ、んふぅんっ……<emoji=heart04>」"
translation = "「응…… 하앗……<emoji=heart04> 응, 응, 응후웅……<emoji=heart04>」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「ふふふっ、おっぱいの形が変わりそうなほど胸の中でおち○ちんが跳ね回っちゃってる<emoji=heart04>」"
translation = "「후후훗, 가슴 모양이 바뀔 정도로 가슴 속에서 자지가 날뛰고 있어<emoji=heart04>」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「感じてくれて、あっ、んっ、嬉しいわっ……<emoji=heart04>\u3000本当に嬉しいっ……<emoji=heart04>」"
translation = "「느껴줘서, 앗, 응, 기뻐……<emoji=heart04> 정말 기뻐……<emoji=heart04>」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「いつでも射精しちゃっていいからね<emoji=heart04>\u3000私のおっぱい温泉をダーリンの精子で濁り湯にしちゃって<emoji=heart04>」"
translation = "「언제든 사정해도 괜찮으니까<emoji=heart04> 내 가슴 온천을 달링의 정액으로 탁한 탕으로 만들어줘<emoji=heart04>」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「いっぱい汚されちゃいたいの<emoji=heart04>\u3000ダーリンが、んっ、はぁ、私でビュービューしてくれる時が人生で一番幸せな時間だから<emoji=heart04>」"
translation = "「잔뜩 더럽혀지고 싶어<emoji=heart04> 달링이, 응, 하아, 나한테 퓨퓨 해줄 때가 인생에서 가장 행복한 시간이니까<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言ってパルミエが献身的にペニスを扱き続けてくれる。"
translation = "그렇게 말하며 파르미에가 헌신적으로 자지를 계속 훑어준다."

[[dialogue]]
speaker = "unk"
original = "だけど無理やりイかせるような扱き方じゃない。あくまで俺を快感の頂点まで誘おうとしてくれている、愛情のこもった扱き方だ。"
translation = "하지만 억지로 가게 하려는 훑기가 아니다. 어디까지나 나를 쾌감의 정점까지 인도하려 하는, 애정이 담긴 훑기다."

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「私ね、んっ、はぁっ、ダーリンが思っているよりずっとダーリンのこと愛してるんだから……<emoji=heart04>」"
translation = "「나 말이야, 응, 하앗, 달링이 생각하는 것보다 훨씬 달링을 사랑하고 있다구……<emoji=heart04>」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「ダーリンにエッチな目で見られるのが、はぁ、はぁ、嬉しくて仕方ないの……<emoji=heart04>\u3000恋人になる前はからかっちゃってたけどね<emoji=heart04>」"
translation = "「달링에게 야한 눈으로 보이는 게, 하아, 하아, 기뻐서 견딜 수 없어……<emoji=heart04> 연인이 되기 전에는 놀리긴 했지만 말이야<emoji=heart04>」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「でも、あっ、んっ……<emoji=heart04>\u3000今では私の方がダーリンを見るだけでドキドキしちゃってるくらい……<emoji=heart04>\u3000一緒にいるだけで濡れちゃってたりするんだから<emoji=heart04>」"
translation = "「하지만, 앗, 응……<emoji=heart04> 지금은 내 쪽이 달링을 보는 것만으로 두근거릴 정도야……<emoji=heart04> 같이 있는 것만으로 젖어 있기도 한다니까<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "パルミエが囁くたびに乳圧が強くなっていく。"
translation = "파르미에가 속삭일 때마다 가슴의 압박이 강해진다."

[[dialogue]]
speaker = "unk"
original = "その力の入り具合が彼女の言葉を裏付けているようで、体がどんどん熱くなってしまう。"
translation = "그 힘이 들어가는 정도가 그녀의 말을 뒷받침하는 것 같아, 몸이 점점 뜨거워져 버린다."

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「だから、いくらでもエッチなこと頼んでくれていいのよっ……<emoji=heart04>\u3000ダーリンのためなら毎日だっておっぱい温泉営業しちゃうんだから<emoji=heart04>」"
translation = "「그러니까, 얼마든지 야한 부탁 해도 괜찮아……<emoji=heart04> 달링을 위해서라면 매일이라도 가슴 온천 영업할 거니까<emoji=heart04>」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「もちろん、フェラ温泉やおま○こ温泉もね<emoji=heart04>\u3000ダーリンが望むのなら、んっ、ふっ……<emoji=heart04>\u3000アナル温泉だって開発しちゃうんだから……<emoji=heart04>」"
translation = "「물론, 펠라 온천이나 보지 온천도 말이야<emoji=heart04> 달링이 원한다면, 응, 훗……<emoji=heart04> 아날 온천까지 개발해 버릴 테니까……<emoji=heart04>」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「たくさんたくさんイチャイチャしましょ……<emoji=heart04>\u3000ダーリンと、んっ、はぁっ、いっぱいいっぱい愛し合いたいの……<emoji=heart04>」"
translation = "「잔뜩 잔뜩 꽁냥꽁냥 하자……<emoji=heart04> 달링이랑, 응, 하앗, 많이 많이 사랑을 나누고 싶어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「誰でもない、はぁ、んっ、大好きなダーリンと<emoji=heart04>」"
translation = "「누구도 아닌, 하아, 응, 정말 좋아하는 달링이랑<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "パルミエの愛情と興奮がこれ以上ないほど性欲を漲らせてくる。"
translation = "파르미에의 애정과 흥분이 이보다 더할 수 없을 정도로 성욕을 넘치게 한다."

[[dialogue]]
speaker = "unk"
original = "彼女が愛しくてしょうがなくて、俺からも腰を突き上げてしまう。"
translation = "그녀가 너무나 사랑스러워서, 나도 모르게 허리를 치켜올려 버린다."

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「ひぃあっ、あっ、はぁっ、んはぁんっ<emoji=heart04>\u3000おっぱいたくさん突き上げられちゃってっ……<emoji=heart04>\u3000えへへ、愛してるって言ってもらえるみたいで嬉しいわっ……<emoji=heart04>」"
translation = "「히앗, 앗, 하앗, 응하앙<emoji=heart04> 가슴에 잔뜩 쳐박히고 있어……<emoji=heart04> 에헤헤, 사랑한다는 말을 듣는 것 같아서 기뻐……<emoji=heart04>」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「そのまま射精しちゃってっ<emoji=heart04>\u3000私も、んっ、はぁっ<emoji=heart04>\u3000ダーリンのおち○ちん、めいっぱい気持ち良くするからっ<emoji=heart04>」"
translation = "「그대로 사정해줘<emoji=heart04> 나도, 응, 하앗<emoji=heart04> 달링의 자지, 있는 힘껏 기분 좋게 해줄 테니까<emoji=heart04>」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「一緒にイっちゃいましょっ<emoji=heart04>\u3000愛を爆発させちゃいましょっ<emoji=heart04>\u3000そのための、んっ、ふっ、んんっ<emoji=heart04>\u3000エッチなんだから<emoji=heart04>」"
translation = "「같이 가버리자<emoji=heart04> 사랑을 폭발시키자<emoji=heart04> 그러기 위한, 응, 훗, 응응<emoji=heart04> 섹스니까 말이야<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺に乳房を突き上げられて、パルミエがビクビクと震えてくれる。乳首をビンビンに勃起させて悦んでくれる。"
translation = "내게 유방을 찔려 올려지며 파르미에가 움찔움찔 떤다. 유두를 꼿꼿이 세우며 기뻐한다."

[[dialogue]]
speaker = "unk"
original = "それがたまらなく幸せで、熱いものが昂ぶって、ペニスの先端がはちきれんほどに膨らみ上がる。"
translation = "그것이 참을 수 없이 행복해서, 뜨거운 것이 솟구치며 자지의 끝이 터질 듯이 부풀어 오른다."

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「はぁはぁっ、イってっ<emoji=heart04>\u3000イって、ダーリンっ<emoji=heart04>」"
translation = "「하아하앗, 가버려<emoji=heart04> 가버려, 달링<emoji=heart04>」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「私のおっぱい温泉、たくさん汚してっ<emoji=heart04>\u3000ダーリンのラブラブ精子で真っ白にしてっ<emoji=heart04>」"
translation = "「내 가슴 온천, 잔뜩 더럽혀줘<emoji=heart04> 달링의 러브러브 정액으로 새하얗게 만들어줘<emoji=heart04>」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「私のおっぱいでっ、はぁっ、はぁっ<emoji=heart04>\u3000いっぱい気持ち良くなってぇっ～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「내 가슴으로, 하앗, 하앗<emoji=heart04> 잔뜩 기분 좋아져어어엇~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「きゃっ<emoji=heart04>\u3000んひゃっ──あぁあああああんんんっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「꺄앗<emoji=heart04> 응햣──아아아아아앙앙앙읏<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "どびゅるるるるるっっ！！\u3000どびゅどびゅっ、びゅるるるぅっ！！"
translation = "도뷰르르르르르!! 도뷰도뷰, 뷰르르르으!!"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「すごい勢いっ<emoji=heart04>\u3000んんっ、私のおっぱいでも気を抜いたら飛び出しちゃいそうなくらいビックンビクンしてくれてっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「엄청난 기세야<emoji=heart04> 응응, 내 가슴으로도 방심하면 튀어나갈 것 같을 정도로 움찔움찔거려 줘서……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「おっぱい温泉が、あぁんっ、ミルク風呂になっちゃいそっ……<emoji=heart04>\u3000えへへ、こんなに興奮してくれていたなんて……<emoji=heart04>」"
translation = "「가슴 온천이, 아앙, 밀크탕이 되어버릴 것 같아……<emoji=heart04> 에헤헤, 이렇게나 흥분해 줬다니……<emoji=heart04>」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「ああでも最高に幸せ……<emoji=heart04>\u3000んふぅんっ……<emoji=heart04>\u3000ダーリンのエッチなミルク浴びてるだけで、すごくイっちゃう……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아아 하지만 최고로 행복해……<emoji=heart04> 응후웅……<emoji=heart04> 달링의 야한 밀크를 뒤집어쓰는 것만으로도, 엄청 가버려……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "谷間からペニスが飛び出さないようにぎゅっと胸を寄せながら、パルミエがシャワーでも浴びるかのように俺の精子を顔と胸で受け止めてくれる。"
translation = "골 사이에서 자지가 튀어나오지 않게 꼬옥 가슴을 모으면서, 파르미에가 샤워라도 하는 듯 내 정액을 얼굴과 가슴으로 받아낸다."

[[dialogue]]
speaker = "unk"
original = "より射精を促すように、シコシコとペニスを優しく擦ってくれているのも気持ちいい。優しい乳圧で最後の一滴まで搾り出してくれる。"
translation = "더욱 사정을 재촉하듯, 자지를 부드럽게 문질러주고 있는 것도 기분 좋다. 상냥한 가슴 압박으로 마지막 한 방울까지 짜내 준다."

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「はぁ、はぁ、はぁ……<emoji=heart04>\u3000ん、ちゅっ……<emoji=heart04>\u3000ふふ、あなたのミルク、美味し……<emoji=heart04>\u3000いつも以上に濃厚で……<emoji=heart04>」"
translation = "「하아, 하아, 하아……<emoji=heart04> 응, 츄……<emoji=heart04> 후후, 당신의 밀크, 맛있어……<emoji=heart04> 평소보다 더 농후해서……<emoji=heart04>」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「これなら赤ちゃんのお部屋に出してもらった方が良かったかも……<emoji=heart04>\u3000絶対、妊娠しちゃってたわ……<emoji=heart04>」"
translation = "「이럴 거면 아기방에 넣어달라고 하는 게 좋았을지도……<emoji=heart04> 분명, 임신해 버렸을 거야……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "顔に付いた精子を幸せそうに舐め取りながら、パルミエが見つめてきてくれる。"
translation = "얼굴에 묻은 정액을 행복하게 핥아 내며, 파르미에가 바라봐준다."

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「でも良かった。私のおっぱい温泉を満喫してもらえたみたいで。やっぱり旦那様に喜んでもらえるのが妻の本懐よね」"
translation = "「그래도 다행이다. 내 가슴 온천을 만끽해 준 것 같아서. 역시 남편님이 기뻐해 주는 게 아내의 진정한 보람이지.」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「……愛してるわよ、ダーリン。心の底から愛してる」"
translation = "「……사랑해, 달링. 마음속 깊은 곳부터 사랑해.」"

[[dialogue]]
speaker = "unk"
original = "真正面から愛を告げられて、再びペニスが硬くなってしまう。"
translation = "정면으로 사랑 고백을 듣고, 다시금 자지가 딱딱해져 버린다."

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「あん<emoji=heart04>\u3000また大きくしちゃうなんて、ダーリンってばエッチなんだから<emoji=heart04>」"
translation = "「앙<emoji=heart04> 또 크게 만들다니, 달링두 참 야하다니까<emoji=heart04>」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「ふふふ……おち○ちんが満足するまで、おっぱい温泉を楽しんでいってね<emoji=heart04>\u3000愛しのダーリン<emoji=heart04>」"
translation = "「후후후…… 자지가 만족할 때까지 가슴 온천을 즐기다 가렴<emoji=heart04> 사랑하는 달링<emoji=heart04>」"

[[dialogue]]
speaker_original = "パルミエ"
speaker_translation = "팔미에"
original = "「はぁっ、はぁ……ふふふ……ん、はぁ、ふぅ……んん……はぁはぁ、ふふ、んぅん……あふ、はあ、んぁ、あぁ……」"
translation = "「하앗, 하아…… 후후후…… 응, 하아, 후우…… 응응…… 하아하아, 후후, 응웅…… 아후, 하아, 응아, 아아……」"

