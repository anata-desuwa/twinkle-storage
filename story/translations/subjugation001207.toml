[[dialogue]]
speaker = "unk"
original = "あれから数日──やっぱりメルエルの様子がおかしい。"
translation = "그로부터 며칠── 역시 메르엘의 상태가 이상하다."

[[dialogue]]
speaker = "unk"
original = "ダンスも歌声もバッチリだ。けれど、ふとした時に表情が曇る気がする。"
translation = "댄스도 노랫소리도 완벽하다. 하지만 문득문득 표정이 흐려지는 것 같다."

[[dialogue]]
speaker = "unk"
original = "俺が聞いても『何でもないよ』と言うけれど、その表情は明らかに無理をしているようで……"
translation = "내가 물어도 『아무것도 아니야』라고 말하지만, 그 표정은 분명히 무리를 하고 있는 듯해서……"

[[dialogue]]
speaker = "レミカ"
original = "「そっか……会長も気になってたんだ。うん、私もちょっと違和感があったんだ」"
translation = "「그렇구나…… 회장도 신경 쓰고 있었구나. 응, 나도 좀 위화감을 느꼈어」"

[[dialogue]]
speaker = "レミカ"
original = "「歌もダンスもどんどん上手になってるのに、メルエルの気持ちがついていってないみたいで……」"
translation = "「노래도 댄스도 점점 능숙해지는데 메르엘의 마음이 따라가지 못하는 것 같아서……」"

[[dialogue]]
speaker = "レミカ"
original = "「私が学びたかったメルエルの魅力にも、ある時期から陰りを感じてた」"
translation = "「내가 배우고 싶었던 메르엘의 매력도 어느 시점부터 그늘이 느껴졌어」"

[[dialogue]]
speaker = "レミカ"
original = "「オッケー。女の子同士の方が話しやすいこともあるかもだし。２人きりの時に聞いてみるね。今日の放課後の練習は、なしでもいいかな？」"
translation = "「오케이. 여자들끼리 하는 게 더 편한 이야기도 있을지 모르니까. 둘만 있을 때 물어볼게. 오늘 방과 후 연습은 없어도 될까?」"

[[dialogue]]
speaker = "メルエル"
original = "「本当によかったの、練習しなくても？\u3000まだライブまでは時間があるけど……」"
translation = "「정말 괜찮은 거야, 연습 안 해도? 아직 라이브까지는 시간이 있지만……」"

[[dialogue]]
speaker = "レミカ"
original = "「プロデューサーである会長からのご命令だよ。たまには羽を伸ばしてこいって」"
translation = "「프로듀서인 회장의 명령이야. 가끔은 기분 전환도 하고 오라고」"

[[dialogue]]
speaker = "メルエル"
original = "「そうなんだ。会長くんが……」"
translation = "「그렇구나. 회장군이……」"

[[dialogue]]
speaker = "レミカ"
original = "「うん。せっかくだし、前から私が行きたかったスイーツショップに行ってもいい？」"
translation = "「응. 이왕 이렇게 된 거 내가 전부터 가고 싶었던 스위트 숍에 가도 될까?」"

[[dialogue]]
speaker = "レミカ"
original = "「買い食いするとマネージャーに怒られるし、寄り道するのって久しぶりなんだよね。ぁ、メルエルは甘いもの、大丈夫？」"
translation = "「길거리 음식을 사 먹으면 매니저한테 혼나기도 하고, 어딘가 들르는 건 오랜만이거든. 아, 메르엘은 단 거 괜찮아?」"

[[dialogue]]
speaker = "メルエル"
original = "「も、もちろん！\u3000大好きだよ！」"
translation = "「무, 물론이지! 정말 좋아해!」"

[[dialogue]]
speaker = "レミカ"
original = "「うん、それじゃあ行こっか」"
translation = "「응, 그럼 가자」"

[[dialogue]]
speaker = "メルエル"
original = "「は～♪\u3000おいしかったぁ、また行こうね、レミカちゃん！」"
translation = "「하~♪ 맛있었다, 또 가자, 레미카짱!」"

[[dialogue]]
speaker = "レミカ"
original = "「うん。新鮮で楽しかった。メルエルが、ショートケーキの苺は最後に食べる派だってわかったし」"
translation = "「응. 신선하고 즐거웠어. 메르엘이 쇼트케이크의 딸기는 마지막에 먹는 파라는 걸 알게 됐고」"

[[dialogue]]
speaker = "メルエル"
original = "「あはは……楽しみは後に取っておくタイプなんだ、私」"
translation = "「아하하…… 즐거움은 나중에 아껴두는 타입이거든, 나」"

[[dialogue]]
speaker = "メルエル"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "メルエル"
original = "「勘違いだったらごめん、なんだけど……もしかしてレミカちゃん、何かお話したいことがあったりする……？」"
translation = "「착각이라면 미안한데…… 혹시 레미카짱, 무슨 이야기하고 싶은 게 있거나 해……?」"

[[dialogue]]
speaker = "レミカ"
original = "「……うん。そろそろ切り出そうと思ってたんだけど、先に言われちゃったね」"
translation = "「……응. 슬슬 말을 꺼내려던 참이었는데 선수 쳐버렸네」"

[[dialogue]]
speaker = "レミカ"
original = "「メルエル、何か悩んでること、ないかな？\u3000ここで聞いたことは、私の胸の中だけに留めておくから。よかったら相談してほしいかも」"
translation = "「메르엘, 뭔가 고민하는 거 없어? 여기서 들은 건 내 가슴 속에만 담아둘 테니까. 괜찮다면 상담해 줬으면 해」"

[[dialogue]]
speaker = "メルエル"
original = "「……色々気を遣ってくれたみたいで、ありがとう」"
translation = "「……여러모로 신경 써준 것 같아서 고마워」"

[[dialogue]]
speaker = "メルエル"
original = "「うん。せっかくだから、相談に乗ってもらっちゃおう、かな……実はね──」"
translation = "「응. 모처럼이니까 상담 좀 받아볼까…… 사실은 말이야──」"

[[dialogue]]
speaker = "レミカ"
original = "「……そっか。メルエルには片想いしてる人がいるんだね。その人を想って浮かべる笑顔を、ステージで観客に向けていいのかどうか、か」"
translation = "「……그렇구나. 메르엘에게는 짝사랑하는 사람이 있구나. 그 사람을 생각하며 지은 미소를 무대에서 관객에게 향해도 될지 어떨지 고민인 거네」"

[[dialogue]]
speaker = "メルエル"
original = "「うん。よくアイドルのライブで『みんな大好き～！』とか『愛してるよ～っ！』とか、言うでしょ？」"
translation = "「응. 자주 아이돌 라이브에서 『모두 사랑해~!』라든가 『사랑해~요!』 같은 소리 하잖아?」"

[[dialogue]]
speaker = "メルエル"
original = "「コメントで見ちゃったんだ。恋人がいるのに嘘の笑顔を向けやがってー、みたいな……それを読んで、ドキっとしちゃって」"
translation = "「댓글에서 봤거든. 연인이 있는데 가짜 미소를 짓고 말이야─ 같은…… 그걸 읽고 뜨끔해서」"

[[dialogue]]
speaker = "レミカ"
original = "「そっか……ちょっと懐かしいかも。私もファンを騙してるんじゃないかって、悩んだ時期があったから」"
translation = "「그렇구나…… 좀 그립기도 하네. 나도 팬들을 속이고 있는 게 아닐까 고민했던 시기가 있었으니까」"

[[dialogue]]
speaker = "メルエル"
original = "「レミカちゃんが……？」"
translation = "「레미카짱이……?」"

[[dialogue]]
speaker = "レミカ"
original = "「うん。言ったことなかったと思うけど、私がアイドルデビューしたきっかけって、お父さんの会社の経営が悪くなったからなんだよね」"
translation = "「응. 말한 적 없었던 것 같은데, 내가 아이돌로 데뷔한 계기는 아빠 회사 경영이 어려워졌기 때문이었어」"

[[dialogue]]
speaker = "メルエル"
original = "「えっ……！？」"
translation = "「엣……!?」"

[[dialogue]]
speaker = "レミカ"
original = "「共同経営者に騙されたっていう、よくある話。そこに助け船を出して出資してくれたのが、ポラリスプロダクションの社長だったの」"
translation = "「동업자에게 속았다는 흔한 이야기. 거기서 도움의 손길을 내밀어 출자해 준 게 폴라리스 프로덕션의 사장님이었어」"

[[dialogue]]
speaker = "レミカ"
original = "「その社長が出資の条件にしたのが、ポラリスプロダクションからの、私のアイドルデビューだった」"
translation = "「그 사장님이 출자 조건으로 내건 게 폴라리스 프로덕션에서의 내 아이돌 데뷔였지」"

[[dialogue]]
speaker = "レミカ"
original = "「その頃の私は、まだ附属生にもなってない頃だったんだけど……あちこちのカラオケ大会に出場してて、一部ではちょっと有名だった」"
translation = "「그 무렵의 나는 아직 부속생도 되기 전이었지만…… 여기저기 노래방 대회에 출전하고 있어서 일부에서는 좀 유명했어」"

[[dialogue]]
speaker = "レミカ"
original = "「社長はその噂を聞きつけて、私の歌はお金になる、って思ったみたい」"
translation = "「사장님은 그 소문을 듣고 내 노래가 돈이 될 거라고 생각한 모양이야」"

[[dialogue]]
speaker = "メルエル"
original = "「お、お金にって……！」"
translation = "「도, 돈이라니……!」"

[[dialogue]]
speaker = "レミカ"
original = "「あっ、勘違いしないで欲しいんだけど、ポラプロの社長はちゃんとした人だよ。出資もアイドルも、ビジネスだからね」"
translation = "「앗, 오해하지 않았으면 좋겠는데, 폴라프로 사장님은 제대로 된 사람이야. 출자도 아이돌도 비즈니스니까 말이야」"

[[dialogue]]
speaker = "レミカ"
original = "「それで、私も元々アイドルがやりたかったから、そのオファー自体は二つ返事だったよ」"
translation = "「그래서 나도 원래 아이돌을 하고 싶었으니까 그 제안 자체는 두말없이 수락했어」"

[[dialogue]]
speaker = "レミカ"
original = "「デビュー前、最初のプロデューサーとはたくさん作戦会議をした」"
translation = "「데뷔 전, 첫 프로듀서와는 많은 작전 회의를 했지」"

[[dialogue]]
speaker = "レミカ"
original = "「私はもちろん、『みんなに元気をあげられるような、カワイイアイドル』がやりたいって言った」"
translation = "「나는 물론 『모두에게 활기를 줄 수 있는 귀여운 아이돌』을 하고 싶다고 말했어」"

[[dialogue]]
speaker = "レミカ"
original = "「でも、その時のプロデューサーは冷静だったよ」"
translation = "「하지만 그때 프로듀서는 냉정했어」"

[[dialogue]]
speaker = "プロデューサー"
original = "「君には歌唱の才能があるが、『カワイイ』アイドルは決して君の適性ではないよ」"
translation = "「너에게는 가창 재능이 있지만, 『귀여운』 아이돌은 결코 너의 적성이 아니야」"

[[dialogue]]
speaker = "プロデューサー"
original = "「君の持つ才能を活かすのなら、『クール』アイドル……アーティスティックでかっこいい、女性が憧れるようなアイドル像がいいだろう」"
translation = "「네가 가진 재능을 살리려면 『쿨』 아이돌…… 아티스틱하고 멋진, 여성이 동경할 만한 아이돌상이 좋겠지」"

[[dialogue]]
speaker = "レミカ"
original = "「プロデューサーの読みは当たった」"
translation = "「프로듀서의 안목은 적중했어」"

[[dialogue]]
speaker = "レミカ"
original = "「私のデビュー曲はミリオンセラーになって、一気にスターアイドルになった」"
translation = "「내 데뷔곡은 밀리언셀러가 됐고, 단숨에 스타 아이돌이 됐지」"

[[dialogue]]
speaker = "レミカ"
original = "「この売り方に関して、不満はないよ。アイドルもビジネスなんだから、より勝算の高い方を選ぶべきだし、プロデューサーの目利きは実際確かだった」"
translation = "「이 판매 방식에 불만은 없어. 아이돌도 비즈니스니까 더 승산이 높은 쪽을 택해야 하고, 프로듀서의 안목은 실제로 확실했으니까」"

[[dialogue]]
speaker = "レミカ"
original = "「でも、あまりにも爆発的にヒットしちゃったし、『愛戸レミカと言えばクール』みたいなイメージがあっと言う間に定着しちゃったから、焦ったし悩んだ」"
translation = "「하지만 너무 폭발적으로 히트해 버렸고, 『아이도 레미카라고 하면 쿨』 같은 이미지가 순식간에 정착해 버려서 조바심도 나고 고민도 했어」"

[[dialogue]]
speaker = "レミカ"
original = "「私自身は『カワイイ』こそがアイドルの王道だと思ってるのに、それとはまったく違う演出やパフォーマンスを見せてる」"
translation = "「나 자신은 『귀여움』이야말로 아이돌의 왕도라고 생각하는데, 그것과는 전혀 다른 연출과 퍼포먼스를 보여주고 있으니까」"

[[dialogue]]
speaker = "レミカ"
original = "「アイドルをやっていく中で、『クール』こそが自分の道だって信じられたらよかったんだけど、結局『カワイイ』アイドルへの憧れを手放せなかったんだ」"
translation = "「아이돌을 해나가는 과정에서 『쿨』이야말로 나의 길이라고 믿을 수 있었다면 좋았겠지만, 결국 『귀여운』 아이돌에 대한 동경을 놓을 수 없었어」"

[[dialogue]]
speaker = "レミカ"
original = "「そんな半端者だったから……アイドルを始めてしばらくして、自分はファンを騙しているんじゃないかって思うようになってた」"
translation = "「그런 어중간한 사람이었기에…… 아이돌을 시작하고 얼마 지나지 않아 나는 팬들을 속이고 있는 게 아닐까 생각하게 됐어」"

[[dialogue]]
speaker = "メルエル"
original = "「レミカちゃん……」"
translation = "「레미카짱……」"

[[dialogue]]
speaker = "レミカ"
original = "「でもね……初代プロデューサーに言われたんだ。『自分の思い込みに囚われずに、自分を好いてくれている人の声を聴け』って」"
translation = "「하지만 말이야…… 초대 프로듀서가 말해줬어. 『자신의 고정관념에 갇히지 말고 자신을 좋아해 주는 사람들의 목소리를 들어라』라고」"

[[dialogue]]
speaker = "レミカ"
original = "「それから、デビューしてから届いたファンレターを、全部読み返したんだ」"
translation = "「그 후로 데뷔하고 나서 받은 팬레터를 전부 다시 읽었어」"

[[dialogue]]
speaker = "レミカ"
original = "「ファンレターには、私の格好いい姿に勇気をもらえたとか、不登校だけど頑張ってみるとか、そういう女の子からのエールがいっぱい届いてて……」"
translation = "「팬레터에는 내 멋진 모습에 용기를 얻었다거나, 등교 거부 중이지만 힘내보겠다거나, 그런 여자애들의 응원이 가득 도착해 있었고……」"

[[dialogue]]
speaker = "レミカ"
original = "「その時に気づいたんだよね。小さい頃に憧れた、キラキラしたアイドルではないけれど、ステージの上で私は嘘をついていないって」"
translation = "「그때 깨달았어. 어릴 적 동경했던 반짝이는 아이돌은 아니지만, 무대 위에서 나는 거짓말을 하지 않았다는걸」"

[[dialogue]]
speaker = "レミカ"
original = "「最初にやりたかったこととは違ったけれど、適当にやったことなんか１回もなかった。だったらそれは、本物ってことなんじゃないかって」"
translation = "「처음에 하고 싶었던 것과는 달랐지만, 대충 했던 적은 단 한 번도 없었어. 그렇다면 그건 진짜인 게 아닐까 하고」"

[[dialogue]]
speaker = "レミカ"
original = "「少なくとも、常に私はファンのために本気だった。そこに嘘や騙しの気持ちは一切なかったよ」"
translation = "「적어도 항상 나는 팬들을 위해 진심이었어. 거기에 거짓이나 속임수의 마음은 일절 없었어」"

[[dialogue]]
speaker = "メルエル"
original = "「やり方は違っても、届けたい気持ちは同じ……誠意の問題ってこと？」"
translation = "「방식은 달라도 전하고 싶은 마음은 같다…… 성의의 문제라는 거야?」"

[[dialogue]]
speaker = "レミカ"
original = "「簡潔にまとめると、そういうことになるかな」"
translation = "「간결하게 요약하자면 그렇게 되겠네」"

[[dialogue]]
speaker = "メルエル"
original = "「でもそれじゃあ、私は余計にダメなんじゃないかなあ……」"
translation = "「하지만 그렇다면 나는 더더욱 안 되는 거 아닐까……」"

[[dialogue]]
speaker = "メルエル"
original = "「私の笑顔も、私の気持ちも、全部全部、好きな人のためにあるんだよ……？」"
translation = "「내 미소도, 내 마음도, 전부 전부 좋아하는 사람을 위해 있는 건데……?」"

[[dialogue]]
speaker = "メルエル"
original = "「他の人たちがどんなに私を『カワイイ』って思ってくれても、私はその姿を、本当はたった１人のために作ってるの」"
translation = "「다른 사람들이 아무리 나를 『귀엽다』고 생각해 줘도 나는 그 모습을 사실 단 한 사람만을 위해 만들고 있어」"

[[dialogue]]
speaker = "レミカ"
original = "「たぶん、気持ちを『恋愛』に限定するからいけないんだよ」"
translation = "「아마 마음을 『연애』로 한정 지으니까 안 되는 거야」"

[[dialogue]]
speaker = "メルエル"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker = "レミカ"
original = "「メルエルはライブを見に来てくれる人のために、一生懸命練習してるよ。歌を聴いて元気になってほしいと思ってるし、愛情を持ってパフォーマンスをしてる」"
translation = "「메르엘은 라이브를 보러 와주는 사람들을 위해 열심히 연습하고 있어. 노래를 듣고 힘을 얻었으면 좋겠다고 생각하고 애정을 담아 퍼포먼스를 하고 있지」"

[[dialogue]]
speaker = "レミカ"
original = "「その溢れんばかりの『愛』は……横で一緒にレッスンをしていた私が、一番よく分かってる」"
translation = "「그 넘쳐흐르는 『사랑』은…… 옆에서 같이 레슨을 했던 내가 제일 잘 알아」"

[[dialogue]]
speaker = "レミカ"
original = "「そう、『愛』なんだよ……それこそが私がメルエルから学びたかった才能で、魅力で、アイドルとしての素質だから」"
translation = "「그래, 『사랑』이야…… 그것이야말로 내가 메르엘에게 배우고 싶었던 재능이고, 매력이고, 아이돌로서의 소질이니까」"

[[dialogue]]
speaker = "メルエル"
original = "「はうぅぅ……真っすぐに『愛』って言われちゃうと、ちょっと照れちゃうよぉ」"
translation = "「하우으으…… 대놓고 『사랑』이라고 들으니까 좀 부끄러워요오」"

[[dialogue]]
speaker = "レミカ"
original = "「でも、それがメルエルだから」"
translation = "「하지만 그게 메르엘이니까」"

[[dialogue]]
speaker = "レミカ"
original = "「私も理解するまでは、『愛』なんて直球な言葉を使うのは照れ臭かったけど……でも、アイドルの本質は『愛』なんだと思う」"
translation = "「나도 이해하기 전까지는 『사랑』이라는 직설적인 단어를 쓰는 게 쑥스러웠지만…… 그래도 아이돌의 본질은 『사랑』이라고 생각해」"

[[dialogue]]
speaker = "レミカ"
original = "「私はファンを愛してるし、メルエルもちゃんと愛してる。そこに嘘はないって確信してるんだ」"
translation = "「나는 팬들을 사랑하고, 메르엘도 분명히 사랑하고 있어. 거기에 거짓은 없다고 확신해」"

[[dialogue]]
speaker = "レミカ"
original = "「それに……まだデビューしてないメルエルが、ファンとの距離感に悩む必要はないよ」"
translation = "「게다가…… 아직 데뷔하지 않은 메르엘이 팬과의 거리감을 고민할 필요는 없어」"

[[dialogue]]
speaker = "レミカ"
original = "「そういうしがらみに巻き込まないための１日限定ユニット、１日限定デビューだからね」"
translation = "「그런 굴레에 휘말리지 않게 하기 위한 1일 한정 유닛, 1일 한정 데뷔니까」"

[[dialogue]]
speaker = "メルエル"
original = "「た、確かに……！\u3000私、ちょっとおこがましかったかもっ」"
translation = "「과, 과연……! 나, 조금 주제넘었을지도」"

[[dialogue]]
speaker = "メルエル"
original = "「いくらレミカちゃんと一緒にライブするって言っても、私自身はまだアイドルでも何でもなかったのにねっ」"
translation = "「아무리 레미카짱이랑 같이 라이브 한다고 해도 나 자신은 아직 아이돌도 아무것도 아니었는데 말이야」"

[[dialogue]]
speaker = "レミカ"
original = "「あはは、そこは心配しなくていいけどね。メルエルだったら、１日もあれば１００万人はファンが付くだろうから」"
translation = "「아하하, 그건 걱정 안 해도 되지만 말이야. 메르엘이라면 하루만 있어도 100만 명은 팬이 생길 테니까」"

[[dialogue]]
speaker = "レミカ"
original = "「まあでも、ファンに疑似恋愛させるだけがアイドルじゃないから」"
translation = "「뭐 그래도 팬들에게 유사 연애를 시키는 것만이 아이돌은 아니니까」"

[[dialogue]]
speaker = "メルエル"
original = "「ふえ……？」"
translation = "「후에……?」"

[[dialogue]]
speaker = "レミカ"
original = "「『アイドル』って聞くとそういう対象として見てくるお客さんがいるのも事実だし、そういう売り方をするアイドルも否定しないけど……」"
translation = "「『아이돌』이라고 하면 그런 대상으로 보는 관객이 있는 것도 사실이고 그런 판매 방식을 하는 아이돌도 부정하지 않지만……」"

[[dialogue]]
speaker = "レミカ"
original = "「アイドルの『愛』は、そんな小さな器に収まるものじゃないよ……！」"
translation = "「아이돌의 『사랑』은 그런 작은 그릇에 담길 게 아니야……!」"

[[dialogue]]
speaker = "レミカ"
original = "「たった１人の男の子に片想いしてるアイドルがいても、いいんじゃないかな？\u3000むしろ、その人のことを好きだって気持ち、隠さない方がいいよ」"
translation = "「단 한 명의 소년에게 짝사랑 중인 아이돌이 있어도 괜찮지 않을까? 오히려 그 사람을 좋아한다는 마음, 숨기지 않는 편이 좋아」"

[[dialogue]]
speaker = "メルエル"
original = "「い、いいの……！？」"
translation = "「괘, 괜찮아……!?」"

[[dialogue]]
speaker = "レミカ"
original = "「そうだ、せっかくだから、ライブ前のＭＣで堂々と宣言しちゃうのはどう？\u3000『私には片想いしている人がいます！』って」"
translation = "「그래, 이왕 하는 거 라이브 전 MC에서 당당하게 선언해 버리는 건 어때? 『저에게는 짝사랑하는 사람이 있습니다!』라고」"

[[dialogue]]
speaker = "レミカ"
original = "「『片想い系純愛アイドル』……！\u3000うんうん、すごくいいキャッチフレーズなんじゃないかな」"
translation = "「『짝사랑계 순애 아이돌』……! 응응, 아주 좋은 캐치프레이즈가 되지 않을까」"

[[dialogue]]
speaker = "メルエル"
original = "「全然ダメだよ！？\u3000それすっごく恥ずかしいからっ！」"
translation = "「절대 안 돼!? 그거 엄청 부끄러우니까!」"

[[dialogue]]
speaker = "レミカ"
original = "「あはは、まあそれは冗談にしてもさ……さっきも言ったでしょ、アイドルの本質は『愛』だから」"
translation = "「아하하, 뭐 그건 농담이라 쳐도…… 아까도 말했지, 아이돌의 본질은 『사랑』이라고」"

[[dialogue]]
speaker = "レミカ"
original = "「その人と話した時の楽しさとか、親切にしてもらえた時の喜びとか……幸せいっぱいの、偽りない笑顔を観客に届けてくれたら、それでいいんだよ」"
translation = "「그 사람과 대화했을 때의 즐거움이라든가, 친절하게 대해줬을 때의 기쁨이라든가…… 행복이 가득한 꾸밈없는 미소를 관객에게 전해준다면 그걸로 된 거야」"

[[dialogue]]
speaker = "メルエル"
original = "「レミカちゃん……」"
translation = "「레미카짱……」"

[[dialogue]]
speaker = "レミカ"
original = "「メルエルと同じように、片想いしてる女の子を勇気づけて、笑顔にしちゃうようなアイドルになればいいんじゃない？」"
translation = "「메르엘과 마찬가지로 짝사랑하는 여자애들에게 용기를 주고 미소 짓게 만드는 그런 아이돌이 되면 되잖아?」"

[[dialogue]]
speaker = "レミカ"
original = "「──と、まあ。私に言えるのはこれくらいなんだけど……少しは参考になったかな」"
translation = "「──라고, 뭐. 내가 해줄 수 있는 말은 이 정도인데…… 조금은 참고가 됐으려나」"

[[dialogue]]
speaker = "メルエル"
original = "「うん……ありがとう、レミカちゃん！\u3000ちょっとだけだけど、舞台の上で自分がどんな表情をすればいいのか、見えてきた気がする！」"
translation = "「응…… 고마워, 레미카짱! 조금이지만 무대 위에서 내가 어떤 표정을 지어야 할지 보이기 시작한 것 같아!」"

[[dialogue]]
speaker = "レミカ"
original = "「それならよかった。会長も心配してたからさ、明日の放課後はばっちり決まってるダンス、見せてあげようよ」"
translation = "「그렇다면 다행이네. 회장도 걱정하고 있었으니까 내일 방과 후에는 완벽하게 짜인 댄스, 보여주자고」"

[[dialogue]]
speaker = "メルエル"
original = "「──うん！！」"
translation = "「──응!!」"

[[dialogue]]
speaker = "レミカ"
original = "「来たね、会長」"
translation = "「왔구나, 회장」"

[[dialogue]]
speaker = "メルエル"
original = "「会長くん！\u3000昨日はありがとうね！」"
translation = "「회장군! 어제는 고마웠어!」"

[[dialogue]]
speaker = "unk"
original = "俺は何もしてないよ"
translation = "나는 아무것도 안 했어"

[[dialogue]]
speaker = "メルエル"
original = "「ううん。レミカちゃんから、会長くんも心配してるって聞いたから……でもおかげで、もうばっちりだよ！」"
translation = "「아니야. 레미카짱한테 회장군도 걱정하고 있다고 들었으니까…… 그래도 덕분에 이제 완벽해!」"

[[dialogue]]
speaker = "レミカ"
original = "「見せてあげなよ、メルエル」"
translation = "「보여주라구, 메르엘」"

[[dialogue]]
speaker = "メルエル"
original = "「うんっ──変身！」"
translation = "「응── 변신!」"

[[dialogue]]
speaker = "メルエル"
original = "「私も戦闘服を起動できるようになったよ！\u3000これでもっとキミの役に立てそう！」"
translation = "「나도 전투복을 기동할 수 있게 됐어! 이걸로 좀 더 네게 도움이 될 수 있을 것 같아!」"

[[dialogue]]
speaker = "レミカ"
original = "「さ、会長。アーネストの準備はばっちりだよ？」"
translation = "「자, 회장. 어니스트의 준비는 완벽하다구?」"

[[dialogue]]
speaker = "メルエル"
original = "「今日もコーチ、よろしくお願いしますっ！」"
translation = "「오늘도 코치, 부탁드립니다!」"

[[dialogue]]
speaker = "unk"
original = "よし、２人とも練習開始だ！"
translation = "좋아, 둘 다 연습 시작이다!"

[[dialogue]]
speaker = "unk"
original = "メルエルの悩みの内容までは把握できなかったけれど、うまくいったようで何よりだ。"
translation = "메르엘의 고민 내용까지는 파악하지 못했지만 잘 풀린 것 같아 다행이다."

[[dialogue]]
speaker = "unk"
original = "歌とダンスのクオリティもどんどん向上している──アーネストのライブ成功は、もはや疑いなしだ。"
translation = "노래와 댄스의 퀄리티도 점점 향상되고 있다── 어니스트의 라이브 성공은 이제 의심의 여지가 없다."

[[dialogue]]
speaker = "unk"
original = "数日後のオープンキャンパスが終われば俺も楽になる。当日は星徒会のみんなを誘って観に行くことにしよう──"
translation = "며칠 뒤 오픈 캠퍼스가 끝나면 나도 편해진다. 당일은 성도회 모두를 초대해서 보러 가기로 하자──"

[[dialogue]]
speaker = "unk"
original = "その日──愛戸レミカは芸能事務所でのレッスンを終え、帰路についていた。"
translation = "그날── 아이도 레미카는 연예 기획사에서의 레슨을 마치고 귀가하고 있었다."

[[dialogue]]
speaker = "unk"
original = "かつて憧れていた『カワイイ』アイドルのライブまであと少し。もっとよい歌を、もっとよいパフォーマンスを──と考えながら歩いていた。"
translation = "예전부터 동경해 온 『귀여운』 아이돌의 라이브까지 앞으로 조금. 더 좋은 노래를, 더 좋은 퍼포먼스를── 생각하며 걷고 있었다."

[[dialogue]]
speaker = "レミカ"
original = "「楽しみだな……アーネストのライブ。メルエルの上達もすごいし、会長の指示も的確だし」"
translation = "「기대되네…… 어니스트의 라이브. 메르엘의 실력 향상도 엄청나고 회장의 지시도 적절하고」"

[[dialogue]]
speaker = "レミカ"
original = "「私もようやく、『カワイイ』の極意が掴めてきた気がするよ。やっぱり才能のある人に学ぶって大切なことだな」"
translation = "「나도 드디어 『귀여움』의 비결을 파악한 느낌이야. 역시 재능 있는 사람에게 배우는 건 중요한 일이구나」"

[[dialogue]]
speaker = "レミカ"
original = "「ふふっ、父さんも社長も絶対に呼ばないとね。すごいライブ、見せてあげよう……」"
translation = "「후훗, 아빠랑 사장님도 꼭 불러야지. 멋진 라이브를 보여줄 거야……」"

[[dialogue]]
speaker = "レミカ"
original = "「あれ。社長から……？\u3000何だろ」"
translation = "「어라. 사장님한테……? 뭐지」"

[[dialogue]]
speaker = "レミカ"
original = "「もしもし。どうかしました？」"
translation = "「여보세요. 무슨 일이세요?」"

[[dialogue]]
speaker = "レミカ"
original = "「…………えっ？」"
translation = "「…………엣?」"

[[dialogue]]
speaker = "レミカ"
original = "「アーネストのライブを、取りやめる……！？\u3000ど、どういうことですか、それっ……！？」"
translation = "「어니스트의 라이브를 취소한다고……!? 그, 그게 무슨 소리에요, 사장님……!?」"

