[[dialogue]]
speaker = "unk"
original = "第３話,イレーナとチョコ作り,P"
translation = "제3화, 이레이나와 초코 만들기, P"

[[dialogue]]
speaker = "unk"
original = "用事がある、と言われてイレーナにカフェテリアに呼ばれたのだが──"
translation = "용건이 있다고 해서 이레이나에게 카페테리아로 불려 갔는데──"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あ、来たわね。今日はきりきり働いてもらうわよ」"
translation = "「아, 왔네. 오늘은 빠릿빠릿하게 일해줘야겠어」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「会長さま、こんにちは。今日はお願いしたいことがありまして」"
translation = "「회장님, 안녕하세요. 오늘은 부탁드리고 싶은 일이 있어서요」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「この前、教皇庁でバレンタインイベントをやったじゃない？\u3000それが好評だったから、シャロンがいつも手伝ってる子ども会でチョコを配りたいって言い出してね」"
translation = "「얼마 전에 교황청에서 발렌타인 이벤트를 했잖아? 그게 호평이라 샤론이 평소 돕고 있는 어린이 모임에서 초코를 나눠주고 싶다고 말을 꺼내서 말이야」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「人手が欲しいし、旅は道連れってことであんたを呼んだってわけ」"
translation = "「일손이 필요하기도 하고, 가는 길에 동무라고 널 불렀다는 거지」"

[[dialogue]]
speaker = "unk"
original = "また男の子の性癖が壊されてしまう……"
translation = "또 남자아이의 성벽이 파괴되고 말아……"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「まずはあんたのその煩悩から壊してあげましょうか？」"
translation = "「우선 네 그 번뇌부터 파괴해 줄까?」"

[[dialogue]]
speaker = "unk"
original = "俺の性癖はイレーナだから"
translation = "내 성벽은 이레이나니까"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「はぁ？\u3000意味わかんないこと言ってんじゃないわよ」"
translation = "「하아? 뭔 소린지 모를 말 좀 하지 마」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「子どもたちにも、バレンタインのチョコレートを食べて、幸せな気持ちを味わっていただきたいのです」"
translation = "「아이들에게도 발렌타인 초콜릿을 먹고 행복한 기분을 느끼게 해주고 싶답니다」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「会長さま、よろしければお力を貸していただけませんか……？」"
translation = "「회장님, 괜찮으시다면 힘을 보태주시지 않겠어요……?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「別にそんな丁寧に頼まなくてもいいわよ。暇だから来たんだから、『手伝え』の一言で十分よ。やってくれるわよね？」"
translation = "「딱히 그렇게 정중하게 부탁 안 해도 돼. 한가해서 온 거니까 『도와줘』 한마디면 충분해. 해줄 거지?」"

[[dialogue]]
speaker = "unk"
original = "そういうことならもちろんＯＫ"
translation = "그런 거라면 물론 OK"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ほらね」"
translation = "「거봐」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「ふふふ、イレーナさまは会長さまをよく理解されているのですね」"
translation = "「후후후, 이레이나 님은 회장님을 잘 이해하고 계시네요」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「はぁっ！？\u3000そ、そういうのじゃないからっ！\u3000こいつはそれくらいの扱いで十分ってだけよ！」"
translation = "「하앗!? 그, 그런 거 아니니까! 이 녀석은 그 정도 대우면 충분하다는 것뿐이야!」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「ふふっ……そういうことにしておきます」"
translation = "「후훗…… 그런 걸로 해둘게요」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「でもイレーナさまは、教皇庁のイベントではあんなに不満を口にしていたのに、今回は快く引き受けてくださいましたよね。どうしてですか？」"
translation = "「하지만 이레이나 님은 교황청 이벤트에서는 그렇게 불만을 늘어놓으셨으면서, 이번에는 흔쾌히 수락해 주셨네요. 어째서인가요?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「別にあたしだって進んでこういうことしたいわけじゃないわよ」"
translation = "「딱히 나라고 좋아서 이런 걸 하고 싶은 건 아니야」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「でもシャロンの頼みだし、大人にあげて子どもにはあげないってのはどうかと思うし、やってあげてもいいかなって思っただけ」"
translation = "「하지만 샤론의 부탁이기도 하고, 어른은 주고 아이는 안 준다는 건 좀 그런 것 같아서 해줘도 괜찮겠다고 생각했을 뿐이야」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「ありがとうございます、イレーナさま！\u3000さすがイレーナさまはお優しいですね！」"
translation = "「감사합니다, 이레이나 님! 역시 이레이나 님은 상냥하시네요!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「わっ！？\u3000抱きつくなっていつも言ってんでしょ！」"
translation = "「왓!? 매달리지 말라고 항상 말하잖아!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「はいはい、それじゃさっさとやるわよ。……でも、また同じクッキーじゃちょっとつまんないわね」"
translation = "「네네, 그럼 얼른 하자고. ……하지만 또 똑같은 쿠키면 좀 재미없겠네」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「子ども会で出すお菓子ってことは、そこまで数が必要なわけじゃないのよね。その場で食べるなら保存も考えなくていいし、クッキーじゃなくてもいいかもしれないわ」"
translation = "「어린이 모임에서 낼 과자라면 그렇게까지 수가 필요한 건 아니지. 그 자리에서 먹는 거라면 보존도 생각 안 해도 되고, 쿠키가 아니어도 될지도 몰라」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「どんなお菓子がいいか、ウルスラさまに聞いてみましょうか？」"
translation = "「어떤 과자가 좋을지 우르술라 님께 여쭤볼까요?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「イヤよ。あの怪人が出てきたら、何が起こるかわからないわ」"
translation = "「싫어. 그 괴인이 나타나면 무슨 일이 일어날지 모른다고」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「では、イレーナさまの出身であるイタリアらしいお菓子はいかがでしょう？」"
translation = "「그럼 이레이나 님의 출신인 이탈리아다운 과자는 어떨까요?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「イタリアっぽい……チョコ……ジャンドゥーヤとか？」"
translation = "「이탈리아 같은…… 초코…… 잔두야 같은 거?」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「ジャンドゥーヤ……？\u3000聞いたことはある気がしますが……」"
translation = "「잔두야……? 들어본 적은 있는 것 같습니다만……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ジャンドゥーヤってのは、ヘーゼルナッツやアーモンドなんかのナッツのペーストをチョコに加えたものよ」"
translation = "「잔두야라는 건 헤이즐넛이나 아몬드 같은 견과류 페이스트를 초코에 섞은 거야」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「これもバーチ・ディ・ダーマと同じくトリノ発祥らしいわね。トリノってチョコとの関係がけっこう深いみたい」"
translation = "「이것도 바치 디 다마랑 마찬가지로 토리노 발상이라더군. 토리노는 초코랑 관계가 꽤 깊은 것 같아」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「はぁ～、なるほど……チョコレートの種類は本当にたくさんあるんですね！」"
translation = "「하아～ 과연…… 초콜릿 종류는 정말로 많군요!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あとは……チョコっていうか、ティラミスもココアを使うわね」"
translation = "「그리고…… 초코라기보단 티라미수도 코코아를 쓰지」"

[[dialogue]]
speaker = "unk"
original = "イタリアってチョコとコーヒーが好き？"
translation = "이탈리아는 초코랑 커피를 좋아해?"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「……言われてみればそうかもしれないわね」"
translation = "「……듣고 보니 그럴지도 모르겠네」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「チョコとコーヒーのドリンクはあるし、ティラミスはエスプレッソとココアだし、エスプレッソが入ったチョコまであるし、この組み合わせが好きなのかも」"
translation = "「초코랑 커피 드링크도 있고, 티라미수는 에스프레소랑 코코아고, 에스프레소가 들어간 초코까지 있으니까 이 조합을 좋아하는 걸지도」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「でしたら、イレーナさまが好きなティラミスを作るのはどうでしょう？\u3000子ども会では冷蔵庫が使えますしね」"
translation = "「그렇다면 이레이나 님이 좋아하시는 티라미수를 만드는 건 어때요? 어린이 모임에선 냉장고를 쓸 수 있으니까요」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「そうねぇ、ティラミスは意外と簡単って聞くし……でもコーヒーは苦いし、チョコレートを入れたチョコティラミスにしてみましょうか」"
translation = "「글쎄, 티라미수는 의외로 간단하다고 들었고…… 하지만 커피는 쓰니까 초콜릿을 넣은 초코 티라미수로 해볼까」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「よいと思います！」"
translation = "「좋은 것 같아요!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「よし、それじゃ作っていくわよ！」"
translation = "「좋아, 그럼 만들어 보자고!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「試作ができたわね。あんた、味見してみて」"
translation = "「시제품이 완성됐네. 너, 맛 좀 봐봐」"

[[dialogue]]
speaker = "unk"
original = "どうせならイレーナに食べさせてほしいな"
translation = "이왕이면 이레이나가 먹여줬으면 좋겠는데"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「はっ！？\u3000何言ってんの！？\u3000シャロンも見てるし……」"
translation = "「핫!? 무슨 소리야!? 샤론도 보고 있는데……」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「いえいえ、私のことはお気になさらず！」"
translation = "「아뇨 아뇨, 제 걱정은 마세요!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "（むしろシャロンからも期待の眼差しを感じる……！）"
translation = "（오히려 샤론에게서도 기대의 눈빛이 느껴져……!）"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あ～、もう、仕方ないわね。それじゃ……あ、あ～ん」"
translation = "「아─ 정말, 어쩔 수 없네. 그럼…… 아, 아─앙」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「……どう？」"
translation = "「……어때?」"

[[dialogue]]
speaker = "unk"
original = "ちょうどいい甘さで美味しい！"
translation = "딱 적당한 단맛이라 맛있어!"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「そう、それならいいんだけど。恥ずかしいことしてあげたのに、まずいって言ってたらブッ飛ばしてるところだったわ」"
translation = "「그래, 그럼 다행이고. 부끄러운 짓까지 해줬는데 맛없다고 했으면 날려버렸을 거야」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「ふふふっ、イレーナさまと会長さまは本当に仲が良いですね」"
translation = "「후후후, 이레이나 님과 회장님은 정말 사이가 좋으시네요」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「そうですね。おふたりを見ていると、つい頬が緩んでしまいます」"
translation = "「그렇네요. 두 분을 보고 있으면 저도 모르게 입가가 완만해지네요」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「うるさいわよ、こいつとはそういうんじゃ──」"
translation = "「시끄러워, 이 녀석이랑은 그런 게──」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「え──？」"
translation = "「에──?」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「ふふふ……」"
translation = "「후후후……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ウルスラ！？\u3000なんであんたがここにいるのよ！？」"
translation = "「우르술라!? 왜 네가 여기 있는 거야!?」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「バレンタインの波動を感じたもので……恋あるところ、ウルスラありです」"
translation = "「발렌타인의 파동을 느꼈기에…… 사랑이 있는 곳에 우르술라가 있답니다」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「先日は矛を交えることになってしまいましたが、私のおかげでイレーナさんと会長さんの仲が深まったようで何よりです<emoji=heart04>」"
translation = "「지난번엔 칼을 맞대게 되었습니다만, 제 덕분에 이레이나 씨와 회장님의 사이가 깊어진 것 같아 다행입니다<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あんたのおかげじゃないわよ！\u3000ていうか別に仲が深まってなんかないし！」"
translation = "「네 덕분 아니거든! 애초에 딱히 사이가 깊어진 것도 아니고!」"

[[dialogue]]
speaker_original = "ウルスラ"
speaker_translation = "우르슬라"
original = "「あらあら。相変わらず素直でないご様子で……ふふふ<emoji=heart04>」"
translation = "「어머어머. 여전히 솔직하지 못한 모습이시군요…… 후후후<emoji=heart04>」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あんたのその笑顔がムカつくのよ！！」"
translation = "「네 그 미소가 짜증 난다고!!」"

[[dialogue]]
speaker = "unk"
original = "結局ウルスラにも手伝ってもらって、子ども会用のチョコティラミスを完成させたのだった。"
translation = "결국 우르술라에게도 도움을 받아 어린이 모임용 초코 티라미수를 완성시킨 것이었다."

