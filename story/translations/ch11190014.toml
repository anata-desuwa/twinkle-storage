[[dialogue]]
speaker = "unk"
original = "第４話,キミのハートを盗みたい,P"
translation = "제4화, 너의 마음을 훔치고 싶어, P"

[[dialogue]]
speaker = "unk"
original = "ミネコとよく一緒に遊ぶようになった、とある休日。"
translation = "미네코와 자주 어울려 놀게 된 어느 휴일."

[[dialogue]]
speaker = "unk"
original = "その日は彼女が、俺の家へと遊びにやって来ていた――"
translation = "그날은 그녀가 우리 집으로 놀러 왔다──"

[[dialogue]]
speaker = "ミネコ"
original = "「ふふふ、会長。今日こそこの大怪盗フランボウが、会長のハートを盗んじゃうよ♪\u3000バキュ～ン<emoji=heart04>」"
translation = "「후후후, 회장. 오늘이야말로 이 대괴도 플랑보가 회장의 마음을 훔쳐 가겠어♪ 바큐웅<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ここ最近のお決まりの常套句を言いながら、可愛く銃で撃ち抜くポーズを取るミネコ。"
translation = "요즘 들어 정해진 레퍼토리인 상투 문구를 읊으며 귀엽게 총으로 쏘는 포즈를 취하는 미네코."

[[dialogue]]
speaker = "unk"
original = "それで、今日はどうやって？"
translation = "그래서 오늘은 어떻게?"

[[dialogue]]
speaker = "ミネコ"
original = "「ふふっ、知ってる会長？\u3000ヒトとヒトは肌を触れ合わせると、オキシトシンっていう脳内ホルモンが分泌されて、ストレスが軽減されたり、愛を感じたりするらしいよ？」"
translation = "「후후, 알아 회장? 사람이랑 사람은 살을 맞대면 옥시토신이라는 뇌내 호르몬이 분비돼서 스트레스가 경감되거나 사랑을 느끼게 된대.」"

[[dialogue]]
speaker = "ミネコ"
original = "「だ・か・ら～<emoji=heart04>」"
translation = "「그·러·니·까~<emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
original = "「こうやって、頬や頭を優しくいっぱい撫でることで、気づけばいつの間にか私のことを好き<emoji=heart04>\u3000って感じるようにしちゃおうかな～って♪」"
translation = "「이렇게 뺨이나 머리를 상냥하게 잔뜩 쓰다듬어서 어느샌가 나를 좋아해<emoji=heart04>라고 느끼게 만들어볼까~ 싶어서♪」"

[[dialogue]]
speaker = "ミネコ"
original = "「ほ～ら♪\u3000なでなで<emoji=heart04>\u3000すりすり<emoji=heart04>」"
translation = "「자아~ 쓰담쓰담<emoji=heart04> 부비부비<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "いやこれ、直球でスキンシップでは！？"
translation = "아니 이거 직구로 스킨십 아니야!?"

[[dialogue]]
speaker = "ミネコ"
original = "「そうとも言うかな～<emoji=heart04>」"
translation = "「그렇게 말할 수도 있겠네~<emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
original = "「でも、効果はあるんじゃない？\u3000ほらほら～<emoji=heart04>\u3000なでなでぇ<emoji=heart04>\u3000すりすりぃ<emoji=heart04>」"
translation = "「그래도 효과는 있지 않아? 자아 자아~<emoji=heart04> 쓰담쓰담~<emoji=heart04> 부비부비이~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "確かに、ミネコもちょっと赤くなってるし"
translation = "확실히 미네코도 좀 붉어졌고."

[[dialogue]]
speaker = "ミネコ"
original = "「なっ……！？」"
translation = "「낫……!?」"

[[dialogue]]
speaker = "ミネコ"
original = "「いや、私は別に撫でられてないから、影響は受けてないよ！？」"
translation = "「아니, 나는 딱히 쓰다듬어지고 있는 게 아니니까 영향 안 받거든!?」"

[[dialogue]]
speaker = "ミネコ"
original = "「顔が赤くなってるのは……そう！\u3000クソゲーを攻略している時みたいなアドレナリン！\u3000アドレナリンが分泌されているからだよ！」"
translation = "「얼굴이 빨개진 건…… 그래! 쿠소게를 공략하고 있을 때 같은 아드레날린! 아드레날린이 분비되고 있어서 그래!」"

[[dialogue]]
speaker = "unk"
original = "なら、俺からも撫でないとな"
translation = "그럼 나도 쓰다듬어 줘야겠네."

[[dialogue]]
speaker = "ミネコ"
original = "「ひゃっ！？\u3000か、会長っ。撫でていいなんて私、言ってないんだけど！？」"
translation = "「히약!? 회, 회장. 쓰다듬어도 좋다고 말한 적 없는데!?」"

[[dialogue]]
speaker = "unk"
original = "俺も撫でていいなんて言ってなかったけど？"
translation = "나도 쓰다듬어도 좋다고 말한 적 없는데?"

[[dialogue]]
speaker = "ミネコ"
original = "「そ、それは……！」"
translation = "「그, 그건……!」"

[[dialogue]]
speaker = "unk"
original = "俺が手のひらで、ミネコの頬っぺたを優しくすりすりすると──"
translation = "내가 손바닥으로 미네코의 뺨을 부드럽게 부비부비하자──"

[[dialogue]]
speaker = "ミネコ"
original = "「ふあぁっ<emoji=heart04>\u3000はあぁ……ふうぅ……<emoji=heart04>」"
translation = "「후아앗<emoji=heart04> 하아아…… 후우우……<emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
original = "「――い、いや、別に出てないよ！？\u3000そんなすぐに、オキシトシンは出てないから！」"
translation = "「――아, 아니, 딱히 나온 거 아냐!? 그렇게 금방 옥시토신이 나오지는 않으니까!」"

[[dialogue]]
speaker = "ミネコ"
original = "「あっ……<emoji=heart04>\u3000頬と同時に、頭なでなでされて……<emoji=heart04>」"
translation = "「앗……<emoji=heart04> 뺨이랑 동시에 머리를 쓰담쓰담 당해서……<emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
original = "「はあぁ<emoji=heart04>\u3000んうぅ……ふうぅ……<emoji=heart04>」"
translation = "「하아아<emoji=heart04> 응우우…… 후우우……<emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
original = "「えっ！？\u3000――ドキドキしてるかって！？\u3000い、いや？\u3000ドキドキはしてないんじゃないかなっ！？」"
translation = "「엣!? ――두근거리고 있냐고!? 아, 아니? 두근거리지는 않는 것 같은데!?」"

[[dialogue]]
speaker = "ミネコ"
original = "「んっ……<emoji=heart04>\u3000会長の方こそ、本当は私のことを撫でながら……ドキドキしてるんじゃないのっ？」"
translation = "「응……<emoji=heart04> 회장이야말로, 사실은 나를 쓰다듬으면서…… 두근거리고 있는 거 아냐?」"

[[dialogue]]
speaker = "unk"
original = "うん、俺はすごくドキドキしてる"
translation = "응, 나 엄청 두근거리고 있어"

[[dialogue]]
speaker = "ミネコ"
original = "「へぇっ！？\u3000そ、そう、なんだ……」"
translation = "「헤엣!? 그, 그렇구나……」"

[[dialogue]]
speaker = "ミネコ"
original = "「つまり会長は……私に愛を、感じちゃってるって、こと？\u3000ふ、ふ～ん……<emoji=heart04>\u3000へぇ～♪」"
translation = "「그 말은 회장은…… 나한테 사랑을 느껴버리고 있다는 거야? 흐, 흐음……<emoji=heart04> 헤에~♪」"

[[dialogue]]
speaker = "ミネコ"
original = "「ってことは、私の方からも撫でたら……オキシトシンが２倍、分泌されちゃうってことだよね？\u3000ふふふっ♪」"
translation = "「그렇다는 건, 나도 쓰다듬어주면…… 옥시토신이 2배로 분비돼버린다는 거지? 후후후♪」"

[[dialogue]]
speaker = "ミネコ"
original = "「じゃあ……はい<emoji=heart04>\u3000会長、頬っぺたと頭を……なでなでぇ<emoji=heart04>\u3000すりすりぃ<emoji=heart04>」"
translation = "「그럼…… 자<emoji=heart04> 회장, 뺨이랑 머리를…… 쓰담쓰담<emoji=heart04> 부비부비<emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
original = "「どう、かな……？\u3000ドキドキして、私にハート、盗まれちゃいそう？」"
translation = "「어때……? 두근거려서 나한테 하트, 뺏겨버릴 것 같아?」"

[[dialogue]]
speaker = "ミネコ"
original = "「なでなで～<emoji=heart04>\u3000すりすりぃ<emoji=heart04>」"
translation = "「쓰담쓰담~<emoji=heart04> 부비부비<emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
original = "「――ん～？\u3000どうしたの、会長？\u3000もしかして降参したくなっちゃった？\u3000ふふふっ<emoji=heart04>」"
translation = "「――음~? 왜 그래, 회장? 설마 항복하고 싶어진 거야? 후후후<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "盗みたいって言ったら、どうする？"
translation = "뺏고 싶다고 말하면 어떡할 거야?"

[[dialogue]]
speaker = "unk"
original = "俺の方がミネコのハート"
translation = "내 쪽이 미네코의 하트를"

[[dialogue]]
speaker = "ミネコ"
original = "「え？\u3000わ、私から……？」"
translation = "「에? 나, 나한테서……?」"

[[dialogue]]
speaker = "ミネコ"
original = "「――それでもし盗めたら、その時は隣で一緒にリクリエと戦ってほしい？」"
translation = "「――그래서 만약 뺏긴다면, 그때는 곁에서 같이 리크리에랑 싸워주길 바라?」"

[[dialogue]]
speaker = "ミネコ"
original = "「ん～、でも……私に怪盗を止めさせるっていうのは、すごく難易度が高いと思うよ？」"
translation = "「음~ 하지만…… 나한테 괴도를 그만두게 하는 건 난이도가 엄청 높을 텐데?」"

[[dialogue]]
speaker = "ミネコ"
original = "「言ったよね？\u3000私にとって怪盗は『ロマン』だって」"
translation = "「말했지? 나한테 괴도는 『로망』이라고」"

[[dialogue]]
speaker = "ミネコ"
original = "「たとえ悪であっても、怪盗というロマンがある限り、私はそれを追いかけずにはいられない」"
translation = "「설령 악일지라도 괴도라는 로망이 있는 한, 나는 그걸 쫓지 않고는 못 배겨」"

[[dialogue]]
speaker = "unk"
original = "だから、怪盗であることは止めないよ"
translation = "그러니까, 괴도인 건 그만두지 않아"

[[dialogue]]
speaker = "ミネコ"
original = "「どういうこと……？」"
translation = "「무슨 소리야……?」"

[[dialogue]]
speaker = "ミネコ"
original = "「――私が怪盗としていられて、幸せになれる道を考えてみせる？\u3000そんなの、どうやって……」"
translation = "「――내가 괴도로서 남으면서 행복해질 수 있는 길을 생각해 보겠다고? 그런 거, 대체 어떻게……」"

[[dialogue]]
speaker = "unk"
original = "でも――"
translation = "하지만――"

[[dialogue]]
speaker = "unk"
original = "今はまだ上手い考えが思いつかない"
translation = "지금은 아직 좋은 생각이 떠오르지 않아"

[[dialogue]]
speaker = "ミネコ"
original = "「――いつか必ず見つけると、この場で誓うって？」"
translation = "「――언젠가 반드시 찾아내겠다고 이 자리에서 맹세하는 거야?」"

[[dialogue]]
speaker = "ミネコ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "ミネコ"
original = "「ふ、ふふっ……」"
translation = "「후, 후후……」"

[[dialogue]]
speaker = "ミネコ"
original = "「ははっ♪\u3000あははっ♪」"
translation = "「하하♪ 아하하♪」"

[[dialogue]]
speaker = "ミネコ"
original = "「それは――とってもロマンがあるね。難易度高すぎて、本気で言ってるならイカれてるよ。私にはまるで解決法が思いつかない」"
translation = "「그건―― 정말 로망이 있네. 난이도가 너무 높아서 진심으로 하는 말이라면 미친 거야. 나로서는 도저히 해결법이 안 떠올라」"

[[dialogue]]
speaker = "ミネコ"
original = "「でも、今――」"
translation = "「하지만 지금――」"

[[dialogue]]
speaker = "ミネコ"
original = "「私、すごくゾクゾクしてる<emoji=heart04>」"
translation = "「나, 엄청 전율하고 있어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "彼女は俺の頬を撫でながら、とびきりの笑顔を浮かべて――"
translation = "그녀는 내 뺨을 쓰다듬으며 최고의 미소를 짓고는――"

[[dialogue]]
speaker = "ミネコ"
original = "「私のハートを盗めるかどうか、期待してるよ、魔王様<emoji=heart04>」"
translation = "「내 하트를 훔칠 수 있을지 기대할게, 마왕님<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "じゃあ、頑張らないとな"
translation = "그럼, 힘내야겠네"

[[dialogue]]
speaker = "ミネコ"
original = "「って、え？」"
translation = "「그보다, 에?」"

[[dialogue]]
speaker = "ミネコ"
original = "「あっ……！？\u3000ふああっ<emoji=heart04>\u3000ち、ちょっと待って<emoji=heart04>\u3000なんか会長の撫で方、さっきまでと違う感じが……<emoji=heart04>」"
translation = "「앗……!? 후아앗<emoji=heart04> 자, 잠깐 기다려봐<emoji=heart04> 왠지 회장의 쓰다듬는 방식이 아까랑 다른 느낌이……<emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
original = "「――ペットショップのバイトで習った、猫が喜ぶ撫で方！？」"
translation = "「――펫숍 아르바이트에서 배운, 고양이가 기뻐하는 쓰다듬기!?」"

[[dialogue]]
speaker = "ミネコ"
original = "「いや、私は猫じゃないんだけど！？\u3000ちょっ……猫じゃないのに、なんで……！」"
translation = "「아니, 난 고양이가 아닌데!? 저기…… 고양이가 아닌데 왜……!」"

[[dialogue]]
speaker = "ミネコ"
original = "「あっ<emoji=heart04>\u3000ふにゃあああ～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04> 후냐아아아아~~~앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それから彼女が降参するまで、俺は優しく撫で回し続けるのだった――"
translation = "그 후 그녀가 항복할 때까지, 나는 부드럽게 계속 쓰다듬어 주었다――"

