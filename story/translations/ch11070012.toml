[[dialogue]]
speaker = "unk"
original = "第２話,ふたりはルリエル！,P"
translation = "제2화, 두 사람은 루리엘!"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ねえねえクロト、あれ見て」"
translation = "「저기 봐 쿠로토, 저거 봐.」"

[[dialogue]]
speaker = "ロロット"
original = "「おや、こんなところでお会いできるとは、奇遇なのです」"
translation = "「어라, 이런 곳에서 뵙다니 기우인 것이예요.」"

[[dialogue]]
speaker = "ルリエル"
original = "「これはこれは。ごきげんようです」"
translation = "「이런 이런. 평안하신가요.」"

[[dialogue]]
speaker = "unk"
original = "ルリエルが……２人……？"
translation = "루리엘이…… 두 명……?"

[[dialogue]]
speaker = "ヴィーナス"
original = "「いやいや、さすがに並んでたらわかるでしょ。ルリエルとロロットね」"
translation = "「아니 아니, 역시 나란히 있으면 알 수 있잖아. 루리엘이랑 로롯토지.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「似てるなーとは思ったけど、こうして見ると……瓜二つとは言わないけど、かなり似てると言わざるを得ないわ」"
translation = "「닮았다고는 생각했지만 이렇게 보니까…… 판박이라고는 안 하겠지만 꽤 닮았다고 하지 않을 수가 없네.」"

[[dialogue]]
speaker = "ルリエル"
original = "「あれ？\u3000会長さんたちじゃないですか」"
translation = "「어라? 회장님들 아니에요?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「こんにちは。２人はここで何をしてるのかしら？」"
translation = "「안녕. 둘은 여기서 뭘 하고 있는 거니?」"

[[dialogue]]
speaker = "ロロット"
original = "「ルリエルさんとは、たまたまここで出会っただけですよ」"
translation = "「루리엘 씨와는 우연히 여기서 만났을 뿐이에요.」"

[[dialogue]]
speaker = "ルリエル"
original = "「そうですね。ちょっとお話してただけです」"
translation = "「맞아요. 잠깐 이야기하고 있었을 뿐입니다.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「うーん、特別仲良し……って訳でもなさそうね」"
translation = "「으음, 특별히 사이좋은…… 건 아닌 모양이네.」"

[[dialogue]]
speaker = "ロロット"
original = "「まだ、顔見知りという程度でしょうか」"
translation = "「아직 안면이 있는 정도일까요.」"

[[dialogue]]
speaker = "ルリエル"
original = "「仲良しになるには、まだまだ時間がかかりそうです」"
translation = "「친해지려면 아직 시간이 좀 걸릴 것 같습니다.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そう言う割には、息がピッタリな感じするわね」"
translation = "「그렇게 말하는 것치고는 호흡이 딱 맞는 느낌인데.」"

[[dialogue]]
speaker = "ロロット"
original = "「はて、そうでしょうか？\u3000まだじっくりお話ししたこともありませんし、お互いのことなんか全然知りませんけど」"
translation = "「어라, 그런가요? 아직 제대로 이야기해 본 적도 없고 서로에 대해서도 전혀 모르는데요.」"

[[dialogue]]
speaker = "ルリエル"
original = "「そうですね、まだスタートラインに立ったばかりというか……」"
translation = "「맞아요, 아직 출발선에 선 단계라고나 할까……」"

[[dialogue]]
speaker = "unk"
original = "天使同士、仲良くしよう！"
translation = "천사끼리 친하게 지내자!"

[[dialogue]]
speaker = "ロロット"
original = "「て、天使じゃありません！」"
translation = "「처, 천사 아닙니다!」"

[[dialogue]]
speaker = "ルリエル"
original = "「天使……じゃない？\u3000いえ、どこからどう見ても天使でしょう」"
translation = "「천사……가 아니라고요? 아뇨, 어디를 봐도 천사잖아요.」"

[[dialogue]]
speaker = "ルリエル"
original = "「ロロットさん、わたしの天使アイがそう告げています！\u3000あなたは間違いなく天使だと！」"
translation = "「로롯토 씨, 저의 천사 아이가 그렇게 말하고 있어요! 당신은 틀림없는 천사라고!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「天使アイなのに告げちゃうんだ？」"
translation = "「천사 아이인데 말을 해줘?」"

[[dialogue]]
speaker = "ルリエル"
original = "「告げてません！\u3000見抜きました！」"
translation = "「말한 게 아니에요! 꿰뚫어 본 겁니다!」"

[[dialogue]]
speaker = "ロロット"
original = "「やれやれ、都合のいい設定なのです」"
translation = "「이런 이런, 편한 대로 갖다 붙인 설정인 것이예요.」"

[[dialogue]]
speaker = "ルリエル"
original = "「今のはちょっとした言い間違いです！\u3000あなたも天使を名乗るなら正々堂々と認めて……」"
translation = "「방금 건 약간의 말실수예요! 당신도 천사를 자칭한다면 정정당당하게 인정하고……」"

[[dialogue]]
speaker = "ロロット"
original = "「天使を名乗ってなんていません！\u3000まったく、適当なことを言わないで下さい」"
translation = "「천사를 자칭한 적 없습니다! 정말이지, 적당히 좀 하세요.」"

[[dialogue]]
speaker = "ルリエル"
original = "「そ、そうでした。でもでもっ、天使が天使じゃないとアピールするなんておかしすぎます！」"
translation = "「그, 그랬죠. 하지만 하지만, 천사가 천사가 아니라고 어필하는 건 너무 이상해요!」"

[[dialogue]]
speaker = "ロロット"
original = "「おかしくなんてありませ～ん！」"
translation = "「이상하지 않거든~요!」"

[[dialogue]]
speaker = "ルリエル"
original = "「おかしいって認めなさ～～い！！」"
translation = "「이상하다고 인정해~~~!!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そっくりな２人がもみくちゃで言い争ってると、どっちがどっちだかわかんなくなるわね」"
translation = "「똑 닮은 둘이 뒤엉켜서 말싸움하니까 누가 누군지 모르게 되겠네.」"

[[dialogue]]
speaker = "unk"
original = "と、争っていたと思ったら、いつの間にか２人は仲良くなってしまっていた。"
translation = "하고, 다투는가 싶더니 어느새 두 사람은 사이가 좋아져 있었다."

[[dialogue]]
speaker = "unk"
original = "学食であるプリエで、並んで座って楽しそうに話をしている。"
translation = "학식 식당인 프리에에서 나란히 앉아 즐겁게 이야기를 나누고 있다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「仲良くしてても、どっちがどっちかわかんなくなるんだけど……」"
translation = "「친하게 지내도 누가 누군지 헷갈리는데……」"

[[dialogue]]
speaker = "ルリエル"
original = "「え～、そこまでですか～？\u3000見た目の雰囲気がちょこっと似てるだけだと思いますけど」"
translation = "「에~ 그 정도인가요~? 겉모습이 조금 닮았을 뿐이라고 생각하는데요.」"

[[dialogue]]
speaker = "ロロット"
original = "「そうですね、見分けがつかなくなるほどではないと思いますが。お目々が節穴なのでしょうか」"
translation = "「그렇네요, 분간이 안 갈 정도는 아니라고 생각합니다만. 눈이 장식인가요.」"

[[dialogue]]
speaker = "unk"
original = "そこまでではないな"
translation = "그 정도는 아니야"

[[dialogue]]
speaker = "ヴィーナス"
original = "「さっきはルリエルが２人、とか言ってたくせに」"
translation = "「방금 전에는 루리엘이 두 명이라며.」"

[[dialogue]]
speaker = "unk"
original = "さすがに見分けはつく"
translation = "당연히 구분은 가"

[[dialogue]]
speaker = "unk"
original = "あれは冗談だよ"
translation = "방금 건 농담이야"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふふーん、言ったわね？\u3000じゃあ、本当に見分けがつくかどうか試してみましょう」"
translation = "「후훙, 말했네? 그럼 정말 구분이 가는지 시험해 보자.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「２人とも、ちょっとこっちに来て♪\u3000ごにょごにょ……」"
translation = "「둘 다 이쪽으로 좀 와봐♪ 속닥속닥……」"

[[dialogue]]
speaker = "ルリエル"
original = "「ふむふむです……」"
translation = "「흐음흐음이에요……」"

[[dialogue]]
speaker = "ロロット"
original = "「ほえ～、それは面白そうなのです……」"
translation = "「호에~ 그거 재미있을 것 같은 것이예요……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「それじゃ行ってみましょう！\u3000どっちがどっちでしょうクーーーイズ！！！」"
translation = "「그럼 가보자! 누가 누구일까요 퀴이이즈!!!」"

[[dialogue]]
speaker = "ロロット＆ルリエル"
original = "「いえ～い♪」"
translation = "「이예~이♪」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「じゃじゃん、第１問！\u3000どっちがルリエルで、どっちがロロットでしょーか？」"
translation = "「짜잔, 제1문! 어느 쪽이 루리엘이고 어느 쪽이 로롯토일까요?」"

[[dialogue]]
speaker = "ロロット"
original = "「さあさあ、どちらでしょう！」"
translation = "「자자, 어느 쪽일까요!」"

[[dialogue]]
speaker = "ルリエル"
original = "「どっちがわたしか、当ててみてください！」"
translation = "「어느 쪽이 저인지 맞춰보세요!」"

[[dialogue]]
speaker = "unk"
original = "こっちがロロットで、そっちがルリエル"
translation = "이쪽이 로롯토고 그쪽이 루리엘"

[[dialogue]]
speaker = "ロロット"
original = "「おお～、大正解なのです！\u3000なかなかやりますね～」"
translation = "「오오~ 정답인 것이예요! 꽤 하시는걸요.」"

[[dialogue]]
speaker = "ルリエル"
original = "「ま、第一問は小手調べ。ここからが本番ですけどね♪」"
translation = "「뭐, 제1문은 맛보기. 여기서부터가 본편이지만요♪」"

[[dialogue]]
speaker = "unk"
original = "え……？"
translation = "에……?"

[[dialogue]]
speaker = "ヴィーナス"
original = "「目隠ししてるだけだから、暴れないでもう少しだけ大人しくしててね～」"
translation = "「눈만 가리는 거니까 날뛰지 말고 조금만 더 얌전히 있어 줘~」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「はい、準備オッケー♪\u3000それじゃ第２問いってみよー！」"
translation = "「네, 준비 오케이♪ 그럼 제2문 가보자-!」"

[[dialogue]]
speaker = "ロロット＆ルリエル"
original = "「じゃじゃーん♪」"
translation = "「짜자잔~♪」"

[[dialogue]]
speaker = "unk"
original = "……！！！"
translation = "……!!!"

[[dialogue]]
speaker = "ヴィーナス"
original = "「姿を似せたら当てられるのかしら？\u3000さあさあ、どうなの？」"
translation = "「모습을 비슷하게 하면 맞출 수 있을까? 자자, 어때?」"

[[dialogue]]
speaker = "？"
original = "「ふふふ～、一体どちらがルリエルさんなんでしょう？」"
translation = "「후후후~ 도대체 어느 쪽이 루리엘 씨일까요?」"

[[dialogue]]
speaker = "？"
original = "「会長さんに分かりますか？\u3000ぜひ当ててみてください♪」"
translation = "「회장님은 아시겠어요? 부디 맞춰보세요♪」"

[[dialogue]]
speaker = "unk"
original = "うむむむむ……"
translation = "으음음음음……"

[[dialogue]]
speaker = "？"
original = "「悩んでますね～。大ヒントを出しちゃうと、わたしがルリエルですよ、会長さん」"
translation = "「고민하고 있네요~. 큰 힌트를 주자면 제가 루리엘이에요, 회장님.」"

[[dialogue]]
speaker = "？？"
original = "「いえいえ、ルリエルはわたしですから。騙されないで下さいね」"
translation = "「아니 아니, 루리엘은 저라니까요. 속지 마세요.」"

[[dialogue]]
speaker = "？？？"
original = "「いえいえいえいえ、違いますよ！\u3000ルリエルはわたしです！」"
translation = "「아니 아니 아니 아니, 틀려요! 루리엘은 저입니다!」"

[[dialogue]]
speaker = "？？？？"
original = "「なんのなんの！\u3000わたしが天使のルリエルです！」"
translation = "「무슨 소리! 제가 천사 루리엘입니다!」"

[[dialogue]]
speaker = "？？？？？"
original = "「ほえ？\u3000もしかしてわたしがロロットなんでしょうか？」"
translation = "「호에? 혹시 제가 로롯토인가요?」"

[[dialogue]]
speaker = "？？？？？？"
original = "「そうです、あなたがロロットです。……ほええ？\u3000もしかして、ロロットはわたしかも……？」"
translation = "「맞아요, 당신이 로롯토예요. ……호에에? 혹시 로롯토는 저일지도……?」"

[[dialogue]]
speaker = "unk"
original = "全然わからない！！"
translation = "전혀 모르겠어!!"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふっふっふ、ギブアップのようね？\u3000それじゃ正解発表といきましょうか！」"
translation = "「훗훗훗, 기브업인 모양이네? 그럼 정답 발표를 해볼까!」"

[[dialogue]]
speaker = "ルリエル"
original = "「はいっ、わたしがルリエルです♪」"
translation = "「네, 제가 루리엘입니다♪」"

[[dialogue]]
speaker = "ロロット"
original = "「そして、わたしがロロットなのです♪」"
translation = "「그리고 제가 로롯토인 것이예요♪」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ロロットが上手かったわね！\u3000絶妙にルリエルに寄せてきてて」"
translation = "「로롯토가 잘하더라! 절묘하게 루리엘처럼 굴어서.」"

[[dialogue]]
speaker = "ルリエル"
original = "「うますぎです。自分でもどっちが自分かわからなくなるレベルでしたから」"
translation = "「너무 잘해요. 저도 어느 쪽이 나인지 모르게 될 수준이었으니까요.」"

[[dialogue]]
speaker = "ロロット"
original = "「えへへ、とっても面白かったのです！\u3000こういう楽しい遊びなら、またやってみたいですね♪」"
translation = "「에헤헤, 무척 재미있었던 것이예요! 이런 즐거운 놀이라면 또 해보고 싶네요♪」"

[[dialogue]]
speaker = "unk"
original = "ロロットの姿で笑い合う２人。"
translation = "로롯토의 모습으로 서로 웃는 두 사람."

[[dialogue]]
speaker = "unk"
original = "そんな２人を見ていると、さらに頭の中がこんがらがってしまうのだった。"
translation = "그런 두 사람을 보고 있으면 더 머릿속이 꼬여버리는 것이었다."

