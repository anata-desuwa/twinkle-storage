[[dialogue]]
speaker = "unk"
original = "第４話,窮屈なこともあるけれど,P"
translation = "제4화, 답답한 일도 있겠지만"

[[dialogue]]
speaker = "unk"
original = "最近──レミカと２人きりの時間があまり取れていない。彼女は売れっ子のアイドルだからそれは当然なのだけど……"
translation = "요즘── 레미카와 둘만의 시간을 거의 갖지 못하고 있다. 그녀는 잘나가는 아이돌이니까 그건 당연한 거지만……"

[[dialogue]]
speaker = "unk"
original = "事務所の方から『ゴシップ記者がうろついているから気を付けて』という指示が出たこともあって、俺の家へも招けない日々が続いていた。"
translation = "사무소 측에서 『가십 기자가 기웃거리고 있으니 조심하라』는 지시가 내려온 것도 있어서, 우리 집으로도 초대하지 못하는 나날이 이어지고 있었다."

[[dialogue]]
speaker = "unk"
original = "そうなれば当然……"
translation = "그렇게 되면 당연히……"

[[dialogue]]
speaker = "レミカ"
original = "「星徒会室でデートするしかないよね」"
translation = "「성도회실에서 데이트할 수밖에 없네」"

[[dialogue]]
speaker = "unk"
original = "そうなっちゃうね"
translation = "그렇게 돼버리네"

[[dialogue]]
speaker = "レミカ"
original = "「今さらだけど、会長が星徒会長でよかったかも。学園の星徒会室なら、セキュリティもばっちりだし」"
translation = "「이제 와서지만, 회장님이 성도회장이라 다행일지도. 학원의 성도회실이라면 보안도 확실하고」"

[[dialogue]]
speaker = "レミカ"
original = "「流石のゴシップ記者も学園内までは入れないし、星騎士の風紀委員もいるから、天然の要塞って感じかな」"
translation = "「아무리 가십 기자라도 학원 안까지는 못 들어오고, 성기사인 풍기위원도 있으니까, 천연 요새라는 느낌이네」"

[[dialogue]]
speaker = "レミカ"
original = "「で、今日は本当にもう誰も来ないの？\u3000……そっか、会長だけが居残りなんだ」"
translation = "「그래서, 오늘은 정말 이제 아무도 안 와? ……그렇구나, 회장님만 남은 거구나」"

[[dialogue]]
speaker = "レミカ"
original = "「だったら……恋人特権ってことで。お仕事を応援する格好になっちゃおうかな」"
translation = "「그렇다면…… 연인 특권으로. 업무를 응원하는 차림이 되어버릴까나」"

[[dialogue]]
speaker = "レミカ"
original = "「会長のお気に入りのキュートスタイルで応援してあげる。どうかな？」"
translation = "「회장님이 좋아하는 큐트 스타일로 응원해 줄게. 어때?」"

[[dialogue]]
speaker = "unk"
original = "すごく元気が出るよ"
translation = "굉장히 기운이 나"

[[dialogue]]
speaker = "unk"
original = "ありがとう！"
translation = "고마워!"

[[dialogue]]
speaker = "レミカ"
original = "「ふふ、それならよかった。窮屈なお付き合いさせちゃってるお詫びに、書類仕事がはかどる音楽でも弾いてあげるよ」"
translation = "「후후, 그렇다면 다행이야. 답답한 연애를 하게 만든 사죄로, 서류 작업이 잘 되는 음악이라도 연주해 줄게」"

[[dialogue]]
speaker = "レミカ"
original = "「他にも喉が渇いたとか、癒しが欲しい～、とか。リクエストはなんでもどうぞ？\u3000今日は私が会長のマネージャーってことで」"
translation = "「그 외에도 목이 마르다거나, 치유받고 싶어~, 라든가. 요청은 뭐든지 말씀하세요? 오늘은 내가 회장님의 매니저니까」"

[[dialogue]]
speaker = "レミカ"
original = "「パフォーマンスが上がることならなんでもしてあげるから。遠慮はいらないよ？」"
translation = "「퍼포먼스가 올라가는 일이라면 뭐든 해줄 테니까. 사양은 필요 없어?」"

[[dialogue]]
speaker = "unk"
original = "恋人が可愛らしい衣装で応援してくれたおかげか、俺はその日のタスクをあっという間に達成した。"
translation = "연인이 사랑스러운 의상으로 응원해 준 덕분인지, 나는 그날의 할 일을 순식간에 달성했다."

[[dialogue]]
speaker = "unk"
original = "そうなれば後はフリー。学園の門が閉まるまで、レミカと２人きりの時間だ。"
translation = "그렇게 되면 그다음은 자유 시간. 학원 문이 닫힐 때까지, 레미카와 둘만의 시간이다."

[[dialogue]]
speaker = "レミカ"
original = "「んっ……ちゅ、んちゅっ……ちゅっ……ぷぁ<emoji=heart04>」"
translation = "「음…… 츄, 웁…… 츄…… 푸하<emoji=heart04>」"

[[dialogue]]
speaker = "レミカ"
original = "「仕事が終わった途端に、キスして欲しいって……ちゅ、んちゅっ……んん<emoji=heart04>」"
translation = "「일이 끝나자마자 키스해 달라고…… 츄, 웁…… 으응<emoji=heart04>」"

[[dialogue]]
speaker = "レミカ"
original = "「……ちょっとうらやましいかも。私も仕事が終わった後に、キスで癒してくれるマネージャーが欲しいな」"
translation = "「……조금 부러울지도. 나도 일이 끝난 뒤에 키스로 치유해 주는 매니저가 있었으면 좋겠어」"

[[dialogue]]
speaker = "レミカ"
original = "「会長が、星徒会長じゃなかったらな……私の事務所のバイトに応募してもらって、即日で付き人に採用しちゃえるのに」"
translation = "「회장님이 성도회장이 아니었다면…… 우리 사무소 아르바이트에 지원하게 해서, 당일로 수행원에 채용해 버렸을 텐데」"

[[dialogue]]
speaker = "レミカ"
original = "「うん、無理なのはわかってるよ。だからこういう時間は大切にしたいな……もっとキス、してくれる？」"
translation = "「응, 안 되는 건 알고 있어. 그러니까 이런 시간은 소중히 하고 싶어…… 더 키스, 해줄래?」"

[[dialogue]]
speaker = "レミカ"
original = "「ちゅ、んちゅっ……ちゅぅっ……ちゅーっ……<emoji=heart04>」"
translation = "「츄, 웁…… 츄우…… 츄우우……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その後も俺たちは、閉門ぎりぎりまで星徒会室で時間を過ごし……"
translation = "그 후로도 우리들은 폐문 직전까지 성도회실에서 시간을 보냈고……"

[[dialogue]]
speaker = "レミカ"
original = "「──うん。忘れ物もない。パーフェクト」"
translation = "「──응. 잊은 물건도 없어. 퍼펙트」"

[[dialogue]]
speaker = "レミカ"
original = "「それじゃあ帰ろっか、会長。明日からまたしばらく時間取れないけど、電話やチャットはたくさんするから」"
translation = "「그러면 돌아가자, 회장님. 내일부터 또 당분간 시간 못 내겠지만, 전화나 채팅은 많이 할 테니까」"

[[dialogue]]
speaker = "レミカ"
original = "「……今さらだけどごめんね。付き合い始めたばっかりだし、もっと２人の時間が取れたらいいんだけど」"
translation = "「……이제 와서지만 미안해. 사귀기 시작한 지 얼마 안 됐는데, 좀 더 둘만의 시간을 가질 수 있다면 좋았을 텐데」"

[[dialogue]]
speaker = "unk"
original = "気にしないで欲しい"
translation = "신경 쓰지 않았으면 좋겠어"

[[dialogue]]
speaker = "unk"
original = "アイドルを頑張るレミカが好きだから"
translation = "아이돌을 열심히 하는 레미카가 좋으니까"

[[dialogue]]
speaker = "レミカ"
original = "「会長って……そういう嬉しいこと、まっすぐ言ってくれるよね。うん、そのまっすぐさにすごく救われてるよ、私」"
translation = "「회장님은…… 그런 기쁜 말, 똑바로 해주네. 응, 그 올곧음에 무척 구원받고 있어, 나」"

[[dialogue]]
speaker = "レミカ"
original = "「窮屈な思いをさせちゃうこともあるけれど……これからもよろしく」"
translation = "「답답한 마음을 들게 할 때도 있겠지만…… 앞으로도 잘 부탁해」"

[[dialogue]]
speaker = "レミカ"
original = "「あ、そうだ。パーフェクトって言ったけど……忘れ物があったかも」"
translation = "「아, 맞다. 퍼펙트라고 말했지만…… 잊은 게 있을지도」"

[[dialogue]]
speaker = "レミカ"
original = "「はい、じっとして……」"
translation = "「자, 가만히 있어……」"

[[dialogue]]
speaker = "レミカ"
original = "「……ちゅっ<emoji=heart04>\u3000ふふ♪」"
translation = "「……쪽<emoji=heart04> 후후♪」"

[[dialogue]]
speaker = "レミカ"
original = "「それじゃ今度こそ帰ろう、会長？」"
translation = "「그럼 이번에야말로 돌아가자, 회장님?」"

[[dialogue]]
speaker = "unk"
original = "わざわざお別れのキスをするためだけにマスクを下げてくれた恋人の仕草にドキドキした俺は、その日の夜はなかなか寝付けないのだった──"
translation = "일부러 작별 키스를 하기 위해서만 마스크를 내려 준 연인의 몸짓에 두근거린 나는, 그날 밤 좀처럼 잠들지 못했다──"

