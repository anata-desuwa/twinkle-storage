[[dialogue]]
speaker = "unk"
original = "第４話,２人の距離でゆっくりと,P"
translation = "제4화, 두 사람의 거리에서 천천히, P"

[[dialogue]]
speaker = "unk"
original = "会長の家で２人きりのクリスマスパーティーを楽しんでから、週末が明けた翌日。"
translation = "회장의 집에서 둘만의 크리스마스 파티를 즐기고 주말이 지난 다음 날."

[[dialogue]]
speaker = "unk"
original = "アムは附属校３年の教室で、クラスメイトの女子から尋ねられた。"
translation = "아무는 부속교 3학년 교실에서 반 친구인 여학생에게 질문을 받았다."

[[dialogue]]
speaker = "アム"
original = "「――週末に会長とどんなイチャイチャしたのかって？」"
translation = "「──주말에 회장이랑 어떤 꽁냥꽁냥을 했냐고?」"

[[dialogue]]
speaker = "附属生Ａ"
original = "「ほら、改めて２人でクリスマス気分で過ごすっていう感じだったんでしょ？\u3000ってことは、当然甘～い雰囲気になってスキンシップとかしちゃうわけじゃん？」"
translation = "「봐봐, 다시 둘이서 크리스마스 기분으로 보내기로 한 거였지? 그렇다는 건 당연히 달콤~한 분위기가 돼서 스킨십 같은 거 하는 거 아냐?」"

[[dialogue]]
speaker = "附属生Ａ"
original = "「会長は、普段は紳士的で中性的な感じだけど、２人きりになると結構男らしくて、積極的になるってアムから聞いてたし、どうだったのか気になっちゃって～♪」"
translation = "「회장은 평소엔 신사적이고 중성적인 느낌이지만, 둘만 있으면 꽤 남자답고 적극적이게 된다고 아무한테 들었으니까, 어땠는지 궁금해서~♪」"

[[dialogue]]
speaker = "アム"
original = "「……そういえば、スキンシップしてないかも」"
translation = "「……그러고 보니 스킨십 안 했을지도.」"

[[dialogue]]
speaker = "附属生Ａ"
original = "「え？\u3000いやいや、まっさか～！\u3000キスとか、もっとすごいこともしちゃったんじゃないの～？\u3000誤魔化さないで教えてよ～」"
translation = "「에? 아니 아니, 설마~! 키스라든가 더 굉장한 일도 해버린 거 아냐~? 얼버무리지 말고 알려줘~」"

[[dialogue]]
speaker = "アム"
original = "「い、いや……スキンシップは確かにしなかったけど、その日はすごく楽しかったよ？\u3000食事して、いっぱい話して、それから対戦ゲームで夜遅くまで対戦したりして……！」"
translation = "「아, 아니…… 스킨십은 확실히 안 했지만, 그날 정말 즐거웠어! 밥 먹고, 잔뜩 이야기하고, 그러고 나서 대전 게임으로 밤늦게까지 대결하거나 해서……!」"

[[dialogue]]
speaker = "附属生Ａ"
original = "「え……もしかして、マジなの……？」"
translation = "「에…… 설마 진심이야……?」"

[[dialogue]]
speaker = "アム"
original = "「…………うん。そういうことするの、頭から完全に抜けてたっぽい……」"
translation = "「…………응. 그런 거 하는 거 머릿속에서 완전히 빠져 있었나 봐……」"

[[dialogue]]
speaker = "unk"
original = "週明けの放課後、俺は久しぶりにアムと２人で日課の戦闘訓練を再開することになった。"
translation = "주초 방과 후, 나는 오랜만에 아무와 둘이서 일과인 전투 훈련을 재개하게 되었다."

[[dialogue]]
speaker = "アム"
original = "（う～ん……）"
translation = "(으음……)"

[[dialogue]]
speaker = "unk"
original = "だが――なにやらアムの様子がおかしい。いつもなら戦闘訓練の時は張り切って楽しそうにしているのに、今日は他のことに気を取られているような様子だった。"
translation = "하지만── 어쩐지 아무의 상태가 이상하다. 평소라면 전투 훈련 때는 기운차고 즐거워 보이는데, 오늘은 다른 생각에 빠져 있는 듯한 모습이었다."

[[dialogue]]
speaker = "アム"
original = "（自分から、最近スキンシップができてなかったよね～、って言うのは、『いい女』としてカッコよくない気がするし……）"
translation = "(내가 먼저, 요즘 스킨십을 못 했네~ 라고 말하는 건 『멋진 여자』답지 않은 것 같고……)"

[[dialogue]]
speaker = "unk"
original = "アム、提案があるんだけど、いいか？"
translation = "아무, 제안이 하나 있는데 괜찮을까?"

[[dialogue]]
speaker = "アム"
original = "「――え？\u3000模擬戦で勝負して会長が勝ったら、久しぶりに触れあって、イチャイチャしたい……？」"
translation = "「──에? 모의전에서 승부해서 회장이 이기면 오랜만에 스킨십하며 꽁냥거리고 싶다고……?」"

[[dialogue]]
speaker = "unk"
original = "そうして、俺は模擬戦に挑んで、アムに勝利する。"
translation = "그렇게 나는 모의전에 임해 아무에게 승리한다."

[[dialogue]]
speaker = "アム"
original = "「な、なんかあっという間に負けちゃった……！」"
translation = "「왠지 순식간에 져버렸어……!」"

[[dialogue]]
speaker = "unk"
original = "じゃあ……触れてもいい？"
translation = "그럼…… 닿아도 될까?"

[[dialogue]]
speaker = "アム"
original = "「えっと……う、うん。負けちゃったし、約束だから……仕方ないよね？」"
translation = "「저기…… 으, 응. 졌으니까 약속이고…… 어쩔 수 없지?」"

[[dialogue]]
speaker = "unk"
original = "もじもじと照れながらこちらを見てくるアムに、俺はそっと近づき、耳元で囁く。"
translation = "꼼지락거리며 부끄러워하며 이쪽을 바라보는 아무에게 나는 살며시 다가가 귓가에 속삭인다."

[[dialogue]]
speaker = "unk"
original = "アム、久しぶりに、抱き締めるよ"
translation = "아무, 오랜만에 안아줄게."

[[dialogue]]
speaker = "アム"
original = "「あっ……<emoji=heart04>」"
translation = "「앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺がアムの小さな体を抱き寄せると、可愛い声が漏れる。"
translation = "내가 아무의 작은 몸을 끌어안자 귀여운 신음이 샌다."

[[dialogue]]
speaker = "アム"
original = "（会長、中性的な見た目で線が細い感じなのに、抱き締められると思ったより筋肉質でガッシリしてて……<emoji=heart04>\u3000男の人って感じがして、ドキドキしちゃう……<emoji=heart04>）"
translation = "(회장, 중성적인 외모라 선이 가는 느낌인데, 안기니까 생각보다 근육질이고 단단해서……<emoji=heart04> 남자라는 느낌이 들어서 두근거려……<emoji=heart04>)"

[[dialogue]]
speaker = "アム"
original = "「その……さ、会長……？\u3000週末にスキンシップできなくて……もしかして、我慢してたりした……？」"
translation = "「저기…… 있잖아, 회장……? 주말에 스킨십 못 해서…… 혹시 참고 있었어……?」"

[[dialogue]]
speaker = "unk"
original = "やっぱりちょっとは期待してたかな"
translation = "역시 조금은 기대했으려나."

[[dialogue]]
speaker = "unk"
original = "俺はアムのことが好き過ぎるから"
translation = "나는 아무를 너무 좋아하니까."

[[dialogue]]
speaker = "アム"
original = "「そう、だよね……ごめん。あたし、浮かれてて、そこまで考えられてなくて……気づこうともしてなかった……」"
translation = "「그렇구나…… 미안. 나 들떠서 거기까지 생각을 못 했어…… 눈치채지도 못했고……」"

[[dialogue]]
speaker = "unk"
original = "俺は首を横に振って、彼女の頭を撫でながら言う。"
translation = "나는 고개를 가로젓고 그녀의 머리를 쓰다듬으며 말한다."

[[dialogue]]
speaker = "アム"
original = "「――あたしはどちらかというと、そこまで恋人とベタベタしないタイプなんじゃないかって……？」"
translation = "「──나는 어느 쪽인가 하면 그렇게 연인이랑 달라붙어 있지 않는 타입인 것 같다고……?」"

[[dialogue]]
speaker = "アム"
original = "「そう、なのかな……？\u3000あたし、週末は久しぶりに２人で過ごせるだけで楽しくて……スキンシップとか意識せずに、忘れちゃってて……」"
translation = "「그런, 걸까……? 나 주말엔 오랜만에 둘이서 지낼 수 있는 것만으로도 즐거워서…… 스킨십 같은 거 의식도 못 하고 잊고 있었어……」"

[[dialogue]]
speaker = "unk"
original = "アムが楽しかったなら、それでいい"
translation = "아무가 즐거웠다면 그걸로 됐어."

[[dialogue]]
speaker = "unk"
original = "それに、たまにこうしてアムと触れ合うと、その分すごく好きだなぁって再確認できるから問題ない――と、俺は話して伝える。"
translation = "게다가 가끔 이렇게 아무와 스킨십을 하면 그만큼 정말 좋아한다는 걸 재확인할 수 있으니까 문제없어── 라고 나는 말하며 전한다."

[[dialogue]]
speaker = "アム"
original = "「会長……<emoji=heart04>\u3000ねぇ、じゃあ今日は……キスしてもいい？」"
translation = "「회장……<emoji=heart04> 저기, 그럼 오늘은…… 키스해도 돼?」"

[[dialogue]]
speaker = "unk"
original = "俺はもちろんだと頷くと、そっとアムと唇を重ねる。"
translation = "내가 당연하다고 고개를 끄덕이자 살며시 아무와 입술을 겹친다."

[[dialogue]]
speaker = "アム"
original = "「んっ……<emoji=heart04>\u3000んむっ……ちゅっ……<emoji=heart04>」"
translation = "「음……<emoji=heart04> 읍…… 쪽……<emoji=heart04>」"

[[dialogue]]
speaker = "アム"
original = "「――はあぁ<emoji=heart04>\u3000……あたし、確かに四六時中ベタベタしていたいとは思わないタイプなのかも」"
translation = "「──하아아<emoji=heart04> ……나 확실히 24시간 내내 달라붙어 있고 싶어 하는 타입은 아닐지도.」"

[[dialogue]]
speaker = "アム"
original = "「あたしは、会長と一緒に戦闘訓練するのも好きだし……一緒に外に出かけたり、ゲームで勝負するのも好きだし……」"
translation = "「난 회장이랑 같이 전투 훈련 하는 것도 좋고…… 같이 밖에 외출하거나 게임으로 승부하는 것도 좋고……」"

[[dialogue]]
speaker = "アム"
original = "「で、でもね、勘違いしないで欲しいのは、こうしてスキンシップするのも、あたしは好きで、全然嫌じゃないよ？」"
translation = "「그, 그래도 말야, 오해하지 않았으면 좋겠는 게 이렇게 스킨십 하는 것도 나 좋아하고 전혀 싫지 않아!」"

[[dialogue]]
speaker = "アム"
original = "「ただ、普段はなんか恥ずかしくなっちゃうから、そういう雰囲気にならないと、自分からはなかなか言い出せなくて……」"
translation = "「다만 평소엔 왠지 부끄러워지니까 그런 분위기가 되지 않으면 내가 먼저 말하기가 좀처럼 힘들어서……」"

[[dialogue]]
speaker = "unk"
original = "なら、お互いに勝負だな"
translation = "그럼 서로 승부네."

[[dialogue]]
speaker = "アム"
original = "「え？\u3000――相手がスキンシップしたいって思っているタイミングを見極められるかの勝負……？」"
translation = "「에? ──상대가 스킨십 하고 싶어 하는 타이밍을 맞출 수 있는지 승부라고……?」"

[[dialogue]]
speaker = "unk"
original = "俺は頷く。すぐにはアムの望むタイミングがわかるようにはならないだろう。だが、少しずつアムが『心地いいと思える距離感』を見つけていきたい。"
translation = "나는 고개를 끄덕인다. 금방 아무가 원하는 타이밍을 알 수는 없겠지만, 조금씩 아무가 『기분 좋다고 느낄 수 있는 거리감』을 찾아가고 싶다."

[[dialogue]]
speaker = "アム"
original = "「――あたし達は、これから長く付き合っていく恋人だから、時間をかけてゆっくりと……？」"
translation = "「──우리들은 앞으로 오랫동안 사귀어 나갈 연인이니까 시간을 들여 천천히……?」"

[[dialogue]]
speaker = "アム"
original = "（ああ、会長……やっぱりカッコいいな。腕っぷしだけじゃなくて……あたしのことを想ってくれる、優しいところも……）"
translation = "(아아, 회장…… 역시 멋있네. 실력뿐만 아니라…… 나를 생각해 주는 다정한 점도……)"

[[dialogue]]
speaker = "アム"
original = "（だからあたし、会長のことを『好き』になったんだ……<emoji=heart04>）"
translation = "(그래서 나, 회장을 『좋아』하게 된 거야……<emoji=heart04>)"

[[dialogue]]
speaker = "アム"
original = "「……勝負なら、あたしも負けないように頑張っていかないとね<emoji=heart04>」"
translation = "「……승부라면 나도 지지 않도록 열심히 해야겠네<emoji=heart04>」"

[[dialogue]]
speaker = "アム"
original = "「ねぇ、会長……もう１回、キスしてもいい……？」"
translation = "「저기, 회장…… 한 번 더 키스해도 돼……?」"

[[dialogue]]
speaker = "アム"
original = "「んっ……<emoji=heart04>\u3000ちゅっ……<emoji=heart04>\u3000んむっ……ちゅっ……<emoji=heart04>」"
translation = "「음……<emoji=heart04> 쪽……<emoji=heart04> 읍…… 쪽……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それから俺は久しぶりに沢山、アムとの甘いスキンシップの時間を過ごすのだった。"
translation = "그러고 나서 나는 오랜만에 잔뜩 아무와의 달콤한 스킨십 시간을 보냈다."

