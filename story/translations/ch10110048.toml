[[dialogue]]
speaker = "unk"
original = "今日はマトイの巫女フォームの自主練に付き合うため、浅草安倍野神社にやって来ていた。"
translation = "오늘은 마토이의 무녀 폼 자율 연습을 돕기 위해, 아사쿠사 아베노 신사에 와 있었다."

[[dialogue]]
speaker = "unk"
original = "休憩中、ミヤハルが試しに作ったという和菓子の『よもぎ団子』を差し入れに来て、マトイと２人で食べていたのだが――"
translation = "휴식 중, 미야하루가 시험 삼아 만들었다는 화과자인 『쑥떡』을 간식으로 가져와서, 마토이와 둘이서 먹고 있었는데――"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「これ、美味しいね！\u3000ミヤハル、意外とお菓子作り上手だったんだ……。後で一緒に作ったりしないかって誘ってみようかな？」"
translation = "「이거, 맛있다! 미야하루, 의외로 과자 만들기 잘했구나……. 나중에 같이 만들지 않겠냐고 권해볼까?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「うぐっ……！？」"
translation = "「으윽……!?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「会長！？\u3000急にどうしたの！？」"
translation = "「회장!? 갑자기 왜 그래!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「このよもぎ団子……たぶん中に何か……！」"
translation = "「이 쑥떡…… 아마 안에 뭔가……!」"

[[dialogue]]
speaker = "unk"
original = "なんだかすごく体が熱くなって行くのを感じる。"
translation = "왠지 굉장히 몸이 뜨거워져 가는 것이 느껴진다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「えっ！？\u3000あっ、なんかお皿の上に敷いてあった和紙が光って……文字が浮き出てる！？\u3000えっと――」"
translation = "「엣!? 앗, 뭔가 접시 위에 깔려 있던 화지가 빛나면서…… 글자가 떠오르고 있어!? 어디 보자――」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「――陰陽術で試しに作った媚薬を入れてみたので、後でナニをどうしたか感想を聞かせておくれやす<emoji=heart04>\u3000ｂｙミヤハル……」"
translation = "「――음양술로 시험 삼아 만든 미약을 넣어 보았으니, 나중에 거시기를 어떻게 했는지 감상을 들려주시구랴<emoji=heart04> b y 미야하루……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あ、あんのドスケベ陰陽師～～～っ！」"
translation = "「이, 이 망할 변태 음양사 녀석～～～!」"

[[dialogue]]
speaker = "unk"
original = "媚薬は即効性なのか、俺のペニスはみるみる勃起してしまい――"
translation = "미약은 즉효성인지, 내 자지는 눈 깜짝할 사이에 발기해 버렸고――"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「マトイ、こんなところでごめん……」"
translation = "「마토이, 이런 곳에서 미안해……」"

[[dialogue]]
speaker = "unk"
original = "近くの木陰に移動しながら俺がそんなことを言うと、マトイは優しく微笑んだ。"
translation = "근처의 나무 그늘로 이동하며 내가 그런 말을 하자, 마토이는 부드럽게 미소 지었다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ううん、大丈夫<emoji=heart04>\u3000はふぅぅん……<emoji=heart04>\u3000恋人が目の前にいるんだもん、我慢しないで<emoji=heart04>」"
translation = "「으응, 괜찮아<emoji=heart04> 하후우우……<emoji=heart04> 연인이 눈앞에 있는걸, 참지 마<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「それに今回は、普通にミヤハルのせいなんだから、仕方ないよ。あふぅぅ<emoji=heart04>\u3000私もよもぎ団子食べちゃったから、体が熱くなって来ちゃったし……<emoji=heart04>」"
translation = "「게다가 이번에는, 평범하게 미야하루 탓이니까, 어쩔 수 없어. 아후우우<emoji=heart04> 나도 쑥떡 먹어버려서, 몸이 뜨거워져 버렸고……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「はあぁぁ……<emoji=heart04>\u3000それにしても、会長のおち○ちん、もうこんなに大きくガチガチになってて、すぉごい……<emoji=heart04>」"
translation = "「하아아아……<emoji=heart04> 그나저나, 회장의 꼬추, 벌써 이렇게 커지고 딱딱해져서, 대단해……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「これ、会長の汗の匂いかなぁ<emoji=heart04>\u3000はふぅぅ<emoji=heart04>\u3000すごく濃い匂いがして、頭の中クラクラするっていうか、うっとりしちゃうっていうかぁ……<emoji=heart04>」"
translation = "「이거, 회장의 땀 냄새일까<emoji=heart04> 하후우우<emoji=heart04> 굉장히 진한 냄새가 나서, 머릿속이 어질어질하다고 할까, 황홀해져 버린다고 할까아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ごめん。さっきまで実践訓練してたから、汗臭いよな……」"
translation = "「미안. 아까까지 실전 훈련을 했으니까, 땀 냄새나지……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「謝らなくて大丈夫だよ<emoji=heart04>\u3000んんぅ……<emoji=heart04>\u3000いっぱいエッチして、汗だくになった時と同じ匂いで、むしろ興奮しちゃうし……<emoji=heart04>」"
translation = "「사과하지 않아도 괜찮아<emoji=heart04> 응으으……<emoji=heart04> 잔뜩 에치하고, 땀범벅이 됐을 때랑 같은 냄새라서, 오히려 흥분돼 버리고……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「すぅー……はぁー……<emoji=heart04>\u3000はふぅんっ<emoji=heart04>\u3000嗅いでるだけで、おま○こ濡れて来ちゃうかもぉ……<emoji=heart04>」"
translation = "「스으으…… 하아아……<emoji=heart04> 하후운<emoji=heart04> 맡고 있는 것만으로도, 보지 젖어버릴지도 몰라아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「私も我慢できなくなって来ちゃったから、おち○ちん、お口に挿れちゃうね……？」"
translation = "「나도 참을 수 없게 되어버렸으니까, 자지, 입에 넣어버릴게……?」"

[[dialogue]]
speaker = "unk"
original = "マトイはそう言うと、舌をペニスに伸ばして――"
translation = "마토이는 그렇게 말하더니, 혀를 페니스로 뻗어서――"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「んっ……ちゅっ<emoji=heart04>\u3000れろっ……ちゅぱっ<emoji=heart04>\u3000ぺろちゅっ<emoji=heart04>」"
translation = "「응…… 츄<emoji=heart04> 레로…… 츄파<emoji=heart04> 페로츄<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "艶めかしく亀頭を舐める。そして――"
translation = "요염하게 귀두를 핥는다. 그리고――"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「それじゃあ、いただきます……<emoji=heart04>」"
translation = "「그러면, 잘 먹겠습니다……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あ～んっ――<emoji=heart04>」"
translation = "「아~앙――<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスを咥えて、フェラを開始した。"
translation = "페니스를 물고, 펠라를 개시했다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ちゅぷぷっ<emoji=heart04>\u3000んむっ……<emoji=heart04>\u3000ちゅぷっ、れろちゅっ<emoji=heart04>\u3000れるれるっ、ちゅるるっ<emoji=heart04>\u3000ちゅれるっ、ちゅぱっ……<emoji=heart04>」"
translation = "「츄푸푸<emoji=heart04> 응뭇……<emoji=heart04> 츄푸, 레로츄<emoji=heart04> 레를레를, 츄르르<emoji=heart04> 츄레를, 츄파……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「んむっ<emoji=heart04>\u3000ちゅむっ、ちゅぷぷっ……<emoji=heart04>\u3000ちゅっぽ<emoji=heart04>\u3000ちゅっぽ<emoji=heart04>\u3000ちゅるるるっ<emoji=heart04>\u3000ちゅぱっ<emoji=heart04>\u3000ちゅっぽ<emoji=heart04>\u3000ちゅっぽ<emoji=heart04>\u3000れるれるっ<emoji=heart04>\u3000れろちゅっ<emoji=heart04>」"
translation = "「응뭇<emoji=heart04> 츄뭇, 츄푸푸……<emoji=heart04> 츄포<emoji=heart04> 츄포<emoji=heart04> 츄르르르<emoji=heart04> 츄파<emoji=heart04> 츄포<emoji=heart04> 츄포<emoji=heart04> 레를레를<emoji=heart04> 레로츄<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（はあぁぁあっ<emoji=heart04>\u3000会長のおち○ちん、大っきぃ……<emoji=heart04>\u3000逞しくて、おま○こキュンってしちゃうよぉ<emoji=heart04>）"
translation = "(하아아아<emoji=heart04> 회장님의 자지, 커어……<emoji=heart04> 늠름해서, 보지 큥하고 울려버려어<emoji=heart04>)"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ちゅぱっ<emoji=heart04>\u3000ちゅぷぷぷっ<emoji=heart04>\u3000ちゅっぽ<emoji=heart04>\u3000ちゅっぽ<emoji=heart04>\u3000ちゅるるるっ<emoji=heart04>」"
translation = "「츄파<emoji=heart04> 츄푸푸푸<emoji=heart04> 츄포<emoji=heart04> 츄포<emoji=heart04> 츄르르르<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（んふぅ<emoji=heart04>\u3000先っぽからお汁、出て来たぁ……<emoji=heart04>\u3000私だけが知ってる会長の味……<emoji=heart04>\u3000ちょっと苦いけど、これ好きかもぉ<emoji=heart04>）"
translation = "(응후<emoji=heart04> 끝부분에서 즙, 나왔다아……<emoji=heart04> 나만이 알고 있는 회장님의 맛……<emoji=heart04> 조금 쓰지만, 이거 좋을지도오<emoji=heart04>)"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「れるれるっ<emoji=heart04>\u3000ちゅうぅっ<emoji=heart04>\u3000ちゅっぽ<emoji=heart04>\u3000ちゅっぽ<emoji=heart04>\u3000んむぅっ<emoji=heart04>\u3000ちゅぷぷぷっ<emoji=heart04>\u3000ちゅっぽ<emoji=heart04>\u3000ちゅっぽ<emoji=heart04>\u3000ちゅるるるっ<emoji=heart04>\u3000んふぅっ……！」"
translation = "「레를레를<emoji=heart04> 츄우우<emoji=heart04> 츄포<emoji=heart04> 츄포<emoji=heart04> 응무우<emoji=heart04> 츄푸푸푸<emoji=heart04> 츄포<emoji=heart04> 츄포<emoji=heart04> 츄르르르<emoji=heart04> 응후우……!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（大きさと濃いオスのフェロモンの匂いで、お口の中いっぱいに征服されちゃう感じ、興奮しちゃうよぉ……<emoji=heart04>）"
translation = "(크기와 진한 수컷 페로몬 냄새로, 입안 가득 정복당하는 느낌, 흥분돼버려어……<emoji=heart04>)"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ふうぅっ<emoji=heart04>\u3000ちゅっぱ<emoji=heart04>\u3000ちゅっぱ<emoji=heart04>\u3000れるれるっ<emoji=heart04>\u3000ちゅっぽ<emoji=heart04>\u3000ちゅっぽ<emoji=heart04>\u3000んはぁっ<emoji=heart04>」"
translation = "「후우우<emoji=heart04> 츄파<emoji=heart04> 츄파<emoji=heart04> 레를레를<emoji=heart04> 츄포<emoji=heart04> 츄포<emoji=heart04> 응하아<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（あああっ<emoji=heart04>\u3000私も媚薬の効果、出てきちゃってるぅ<emoji=heart04>\u3000発情しながらおち○ちん舐めてたら、おま○こ濡れてきちゃって、我慢できないよぉ……<emoji=heart04>）"
translation = "(아아아<emoji=heart04> 나도 미약 효과, 나타나고 있어어<emoji=heart04> 발정하면서 자지 핥고 있으니까, 보지 젖어버려서, 참을 수 없어어……<emoji=heart04>)"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「んっ<emoji=heart04>\u3000んむっ<emoji=heart04>\u3000ちゅっ<emoji=heart04>\u3000ちゅっぽ<emoji=heart04>\u3000ちゅっぽっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000ちゅっぱ<emoji=heart04>\u3000ちゅっぱ<emoji=heart04>\u3000んふうぅっ……！」"
translation = "「응<emoji=heart04> 응뭇<emoji=heart04> 츄<emoji=heart04> 츄포<emoji=heart04> 츄포<emoji=heart04> 응우우<emoji=heart04> 츄파<emoji=heart04> 츄파<emoji=heart04> 응후우우……!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（フェラしながら指でおま○こ弄るの、気持ちいぃ……<emoji=heart04>）"
translation = "(펠라하면서 손가락으로 보지 만지는 거, 기분 좋아아……<emoji=heart04>)"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「んむっ<emoji=heart04>\u3000んんぅっ<emoji=heart04>\u3000んちゅっ<emoji=heart04>\u3000ちゅぱっ<emoji=heart04>\u3000ちゅぷぷっ<emoji=heart04>\u3000んむぅっ<emoji=heart04>\u3000ちゅっぽ<emoji=heart04>\u3000ちゅっぽ<emoji=heart04>\u3000ちゅるるるっ<emoji=heart04>」"
translation = "「응뭇<emoji=heart04> 응응우<emoji=heart04> 응츄<emoji=heart04> 츄파<emoji=heart04> 츄푸푸<emoji=heart04> 응무우<emoji=heart04> 츄포<emoji=heart04> 츄포<emoji=heart04> 츄르르르<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（クリすごい勃起しちゃってるぅ<emoji=heart04>\u3000つまんでコリコリするの、刺激強くて、腰が抜けちゃいそぅ<emoji=heart04>）"
translation = "(클리 엄청 발기해버렸어어<emoji=heart04> 집어서 꼬물꼬물하는 거, 자극 강해서, 허리에 힘이 빠져버릴 것 같아아<emoji=heart04>)"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……マトイ、もしかしてオナニーしてる？」"
translation = "「윽…… 마토이, 설마 자위하고 있어?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「んむっ！？\u3000ちゅぱっ<emoji=heart04>\u3000そ、それはそのぉ……<emoji=heart04>」"
translation = "「응무읏!? 츄릅<emoji=heart04> 그, 그건 그게……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「い、いや、ダメってことじゃなくて……！\u3000俺だけじゃなくて、マトイもするんだったら、急いで家に帰った方がいいんじゃないかって！」"
translation = "「아, 아니, 안 된다는 게 아니라……! 나뿐만 아니라 마토이도 하는 거라면, 서둘러 집에 돌아가는 게 좋지 않을까 해서!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（えっ！？\u3000ここで切り上げてお預けってこと！？\u3000そんなの無理だよ、会長っ！\u3000私のスイッチ、もう入っちゃったんだから<emoji=heart04><emoji=heart04><emoji=heart04>）"
translation = "（엣!? 여기서 중단하고 참으라는 거야!? 그런 건 무리야, 회장님! 내 스위치, 벌써 켜져 버렸으니까<emoji=heart04><emoji=heart04><emoji=heart04>）"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「か、会長は彼女が、フェラチオしながらオナニーしてるところ見るの、嫌……？」"
translation = "「회, 회장님은 여자친구가 펠라치오하면서 자위하는 거 보는 거, 싫어……?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「はぁんっ<emoji=heart04>\u3000私も媚薬で興奮しちゃってる、からぁ<emoji=heart04>\u3000あぁぁっ<emoji=heart04>\u3000おち○ちんしゃぶりながら、オナニーしてるところ、見てほしいよぉ<emoji=heart04>\u3000んむっ<emoji=heart04>\u3000ちゅぱっ<emoji=heart04>」"
translation = "「하앙<emoji=heart04> 나도 미약 때문에 흥분해 버려서어<emoji=heart04> 아아앗<emoji=heart04> 자지 빨면서 자위하는 거, 봐줬으면 좋겠어어<emoji=heart04> 응무읏<emoji=heart04> 츄릅<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……そんなのもちろん、見たいに決まってる！」"
translation = "「윽…… 그런 거 당연히, 보고 싶은 게 당연하잖아!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「う、うん<emoji=heart04>\u3000わかった<emoji=heart04>\u3000じゃあ――」"
translation = "「우, 응<emoji=heart04> 알았어<emoji=heart04> 그럼――」"

[[dialogue]]
speaker = "unk"
original = "マトイは頷くと、オナニーしている手元が見やすいように、ぐっと腰を突き出す。"
translation = "마토이는 고개를 끄덕이더니, 자위하고 있는 손놀림이 잘 보이도록 훅 허리를 내민다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「はあぁああっ<emoji=heart04>\u3000会長、見ててね……<emoji=heart04>\u3000んんんぅっ――<emoji=heart04>」"
translation = "「하아아앗<emoji=heart04> 회장님, 잘 봐줘……<emoji=heart04> 응응응읏――<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ちゅっ<emoji=heart04>\u3000ちゅぷぷぷっ<emoji=heart04>\u3000んふぅっ<emoji=heart04>\u3000れろちゅっ<emoji=heart04>\u3000ちゅぱっ<emoji=heart04>\u3000ちゅるるるっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000ちゅっぽ<emoji=heart04>\u3000ちゅっぽ<emoji=heart04>\u3000ちゅぱっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はぁんっ……<emoji=heart04>」"
translation = "「쪽<emoji=heart04> 츄릅츄르릅<emoji=heart04> 응후읏<emoji=heart04> 레로쪽<emoji=heart04> 츄릅<emoji=heart04> 츄르르르<emoji=heart04> 응읏<emoji=heart04> 츄웁<emoji=heart04> 츄웁<emoji=heart04> 츄릅<emoji=heart04> 앗<emoji=heart04> 하앙……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……！」"
translation = "「윽……!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ああぁっ<emoji=heart04>\u3000おち○ちんから先走り汁、もっといっぱい出て来たぁ……<emoji=heart04>」"
translation = "「아아앗<emoji=heart04> 자지에서 쿠퍼액, 더 잔뜩 나왔어어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「んふぅっ<emoji=heart04>\u3000ちゅぱっ<emoji=heart04>\u3000ちゅるるっ、れろちゅっ<emoji=heart04>\u3000ちゅぷぷぷっ<emoji=heart04>\u3000ちゅっぽ<emoji=heart04>\u3000ちゅっぽ<emoji=heart04>\u3000んくっ<emoji=heart04>\u3000ちゅるるるっ<emoji=heart04>\u3000れるれるっ<emoji=heart04>\u3000ちゅむむむっ<emoji=heart04>」"
translation = "「응후읏<emoji=heart04> 츄릅<emoji=heart04> 츄르릅, 레로쪽<emoji=heart04> 츄릅츄르릅<emoji=heart04> 츄웁<emoji=heart04> 츄웁<emoji=heart04> 응긋<emoji=heart04> 츄르르르<emoji=heart04> 레를레를<emoji=heart04> 츄무무무<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（はあぁぁぁっ<emoji=heart04>\u3000先走り汁の味、すごくエッチだよぉ……<emoji=heart04>）"
translation = "（하아아아앗<emoji=heart04> 쿠퍼액 맛, 정말 야해……<emoji=heart04>）"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「んっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000ちゅっぽ<emoji=heart04>\u3000ちゅっぽ<emoji=heart04>\u3000れろちゅっ<emoji=heart04>\u3000れるれるっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000ちゅっぱ<emoji=heart04>\u3000ちゅっぱ<emoji=heart04>\u3000んはぁ～っ<emoji=heart04>」"
translation = "「응읏<emoji=heart04> 후우우웃<emoji=heart04> 츕포<emoji=heart04> 츕포<emoji=heart04> 레로츗<emoji=heart04> 레를레를<emoji=heart04> 응응읏<emoji=heart04> 츕파<emoji=heart04> 츕파<emoji=heart04> 응하아~앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（匂いもぉ<emoji=heart04>\u3000良い匂いじゃなくて、むしろちょっとクセのある感じなのに、何度も嗅ぎたくなっちゃう……<emoji=heart04>）"
translation = "（냄새도오<emoji=heart04> 좋은 냄새가 아니라, 오히려 조금 독특한 느낌인데도, 몇 번이고 맡고 싶어져 버려……<emoji=heart04>）"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あっ<emoji=heart04>\u3000んんぅっ<emoji=heart04>\u3000んむっ<emoji=heart04>\u3000ちゅっぽ<emoji=heart04>\u3000ちゅっぽっ<emoji=heart04>\u3000ちゅるるるっ<emoji=heart04>\u3000んふぅ～……！」"
translation = "「앗<emoji=heart04> 응응우읏<emoji=heart04> 응뭇<emoji=heart04> 츕포<emoji=heart04> 츕포<emoji=heart04> 츄르르르읏<emoji=heart04> 응후우~……!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（私だけが味わえる、大好きな人のおち○ちんの味と匂い……<emoji=heart04>\u3000頭の中クラクラしてぇ、どんどん気持ちよくなっちゃうぅ<emoji=heart04>）"
translation = "（나만이 맛볼 수 있는, 좋아하는 사람의 자지 맛과 냄새……<emoji=heart04> 머릿속이 어질어질해서어, 점점 기분 좋아져 버려어<emoji=heart04>）"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ちゅぱぁっ<emoji=heart04>\u3000ふうぅぅっ<emoji=heart04>\u3000会長ぉ……<emoji=heart04>\u3000ちゅっ<emoji=heart04>\u3000ちゅっ<emoji=heart04>」"
translation = "「츄파앗<emoji=heart04> 후우우우웃<emoji=heart04> 회장님……<emoji=heart04> 츄웃<emoji=heart04> 츄웃<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "マトイが愛おしそうにペニスにキスをしながら、潤んだ瞳でこちらを見上げて来る。"
translation = "마토이가 사랑스럽다는 듯 페니스에 키스를 하며, 젖은 눈동자로 이쪽을 올려다본다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「私、もっと欲しいの……<emoji=heart04>\u3000もっと濃い――」"
translation = "「나, 좀 더 원해……<emoji=heart04> 좀 더 진한 거――」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「会長の精液、いっぱい飲ませて<emoji=heart04>」"
translation = "「회장님의 정액, 잔뜩 마시게 해줘<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言うと、マトイは一気に喉奥までペニスを咥えて――"
translation = "그렇게 말하자, 마토이는 단숨에 목구멍 깊숙이까지 페니스를 물고――"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「んむ――っ<emoji=heart04><emoji=heart04>」"
translation = "「응무――읏<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ぢゅっぽぢゅっぽぢゅっぽ<emoji=heart04>\u3000ぢゅるるる――っ<emoji=heart04><emoji=heart04>」"
translation = "「쥬포쥬포쥬포<emoji=heart04> 쥬르르르――읏<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "射精させる為の激しいフェラを開始した。"
translation = "사정시키기 위한 격렬한 펠라를 개시했다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ぢゅっぽぢゅっぽぢゅっぽ<emoji=heart04>\u3000んぶぅっ<emoji=heart04>\u3000ぢゅるるるっ<emoji=heart04>\u3000れるれるっ\u3000ちゅぶぶぶっ<emoji=heart04>\u3000ぢゅっぽぢゅっぽぢゅっぽ<emoji=heart04>\u3000ちゅばっ<emoji=heart04>\u3000れるちゅっ<emoji=heart04>」"
translation = "「쥬포쥬포쥬포<emoji=heart04> 응부웃<emoji=heart04> 쥬르르르읏<emoji=heart04> 레를레를읏 츄부부붓<emoji=heart04> 쥬포쥬포쥬포<emoji=heart04> 츄밧<emoji=heart04> 레로츗<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「うあぁっ、マトイ……！\u3000それ、すごっ！」"
translation = "「우아앗, 마토이……! 그거, 굉장해!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「んむぅっ<emoji=heart04>\u3000ぢゅるるっ<emoji=heart04>\u3000ちゅばっ、ちゅばばっ<emoji=heart04>\u3000んぶぶっ<emoji=heart04>\u3000ぢゅぽっぢゅぽっぢゅぽっ<emoji=heart04>\u3000れるれるっ<emoji=heart04>\u3000ぢゅっぱぢゅっぱぢゅっぱ<emoji=heart04>\u3000ちゅばぁっ<emoji=heart04>」"
translation = "「응무우읏<emoji=heart04> 쥬르르읏<emoji=heart04> 츄밧, 츄바밧<emoji=heart04> 응부붓<emoji=heart04> 쥬포쥬포쥬포<emoji=heart04> 레를레를읏<emoji=heart04> 쥬파쥬파쥬파<emoji=heart04> 츄바앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「んはぁっ<emoji=heart04>\u3000会長、私のお口おま○こ気持ちいい？」"
translation = "「응하앗<emoji=heart04> 회장님, 내 입 보지 기분 좋아?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああっ、すごく気持ちいい……！」"
translation = "「아앗, 정말 기분 좋아……!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「んっ<emoji=heart04>\u3000私も興奮して、オナニーする手が激しくなっちゃう<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んむっ<emoji=heart04>\u3000んぶぶっ<emoji=heart04>\u3000ぢゅっぽぢゅっぽぢゅっぽ<emoji=heart04>\u3000ぢゅるるるっ<emoji=heart04>」"
translation = "「응읏<emoji=heart04> 나도 흥분해서, 자위하는 손이 격렬해져 버려<emoji=heart04> 앗<emoji=heart04> 응뭇<emoji=heart04> 응부붓<emoji=heart04> 쥬포쥬포쥬포<emoji=heart04> 쥬르르르읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（はあぁあっ<emoji=heart04>\u3000お口の中、会長の先走り汁の匂いでいっぱいっ<emoji=heart04>\u3000クセになる匂いで、頭バカになっちゃうぅぅ<emoji=heart04>）"
translation = "（하아아앗<emoji=heart04> 입안이, 회장님의 쿠퍼액 냄새로 가득해앳<emoji=heart04> 중독되는 냄새라서, 머리가 바보가 되어버려어어<emoji=heart04>）"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ちゅぶちゅぶちゅぶっ<emoji=heart04>\u3000ちゅぶぶぶっ<emoji=heart04>\u3000ちゅぼっちゅぼっちゅぼっ<emoji=heart04>\u3000ちゅばぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んふぅっ<emoji=heart04>」"
translation = "「츄부츄부츄붓<emoji=heart04> 츄부부붓<emoji=heart04> 츄보츄보츄보<emoji=heart04> 츄바앗<emoji=heart04> 앗<emoji=heart04> 응후웃<emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（逞しいオスの匂いと味で、頭の中まで支配されちゃってるぅ<emoji=heart04>\u3000あああっ<emoji=heart04>\u3000おち○ちんしゃぶるの気持ちいぃ～<emoji=heart04><emoji=heart04><emoji=heart04>）"
translation = "（늠름한 수컷의 냄새와 맛에 머릿속까지 지배당하고 있어♥ 아아앗♥ 자지 빠는 거 기분 좋아~♥♥♥）"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「んぶぅっ<emoji=heart04>\u3000ぢゅっぽぢゅっぽぢゅっぽ<emoji=heart04>\u3000ちゅぶぶっ<emoji=heart04>\u3000ちゅばっ<emoji=heart04>\u3000ぢゅれるっ<emoji=heart04>\u3000れるれるっ<emoji=heart04>\u3000ぢゅるるるっ<emoji=heart04>」"
translation = "「응붑♥ 쥬웁쥬웁쥬웁♥ 츄부붑♥ 츄밧♥ 쥬르륵♥ 레르레르♥ 쥬르르릇♥」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（口も心も、会長専用の性処理おま○こになっちゃうっ<emoji=heart04>\u3000うぅんっ<emoji=heart04>\u3000もうなってる<emoji=heart04>\u3000私、会長専用のおま○こなのっ<emoji=heart04>）"
translation = "（입도 마음도 회장 전용 성처리 보지가 되어버려♥ 으응♥ 벌써 되어버렸어♥ 나, 회장 전용 보지야♥）"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ぢゅぽっぢゅぽっぢゅぽっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ちゅぼっちゅぼっ<emoji=heart04>\u3000ちゅぶぶぶっ<emoji=heart04>」"
translation = "「쥬폿쥬폿쥬폿♥ 응♥ 츄봇츄봇♥ 츄부부붑♥」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（フェラしてるのにおま○こ喜んで、愛液どぷどぷ溢れちゃってる<emoji=heart04>\u3000私はおま○こだから<emoji=heart04>\u3000使ってもらえて全身が喜んでるっ<emoji=heart04>）"
translation = "（펠라하고 있는데 보지가 기뻐서 애액이 듬뿍 넘쳐흐르고 있어♥ 나는 보지니까♥ 사용해줘서 전신이 기뻐하고 있어♥）"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ぢゅっぱぢゅっぱぢゅっぱっ<emoji=heart04>\u3000ちゅばっちゅばっちゅばっ<emoji=heart04>\u3000ぢゅるるるっ<emoji=heart04>\u3000んぶぅっ<emoji=heart04>\u3000あはぁっ<emoji=heart04>」"
translation = "「쥬빠쥬빠쥬빠♥ 츄바츄바츄바♥ 쥬르르릇♥ 응붑♥ 아하앗♥」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（おま○こもクリも敏感になって、オナニーすっごく気持ちいいっ……<emoji=heart04>）"
translation = "（보지도 클리도 민감해져서 자위 엄청 기분 좋아……♥）"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「はあぁっ<emoji=heart04>\u3000んぶっ<emoji=heart04>\u3000ぢゅぷぷぷっ<emoji=heart04>\u3000ぢゅっぽぢゅっぽぢゅっぽ<emoji=heart04>\u3000ぢゅぽっぢゅぽっぢゅぽっ<emoji=heart04>\u3000ちゅぶぶぶっ<emoji=heart04>」"
translation = "「하아앗♥ 응붑♥ 쥬푸푸풋♥ 쥬웁쥬웁쥬웁♥ 쥬폿쥬폿쥬폿♥ 츄부부붑♥」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（あっ<emoji=heart04>\u3000会長のお汁、味がもっと濃くなって来た<emoji=heart04>\u3000射精が近い合図<emoji=heart04>）"
translation = "（앗♥ 회장의 즙, 맛이 좀 더 진해졌어♥ 사정이 가깝다는 신호♥）"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「んぶぶっ<emoji=heart04>\u3000ぢゅぽぢゅぽぢゅぽっ<emoji=heart04>\u3000ちゅばっ<emoji=heart04>\u3000れるれるっ<emoji=heart04>\u3000れるちゅっ<emoji=heart04>\u3000ちゅぶちゅぶちゅぶっ<emoji=heart04>\u3000ちゅぼっちゅぼっちゅぼっ<emoji=heart04>\u3000ぢゅるるるっ<emoji=heart04>」"
translation = "「응부붑♥ 쥬포쥬포쥬폿♥ 츄밧♥ 레르레르♥ 레르츄♥ 츄부츄부츄붑♥ 츄봇츄봇츄봇♥ 쥬르르릇♥」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ！\u3000うあっ、マトイ、それヤバい……！」"
translation = "「윽! 우앗, 마토이, 그거 위험해……!」"

[[dialogue]]
speaker = "unk"
original = "ペニスを喉奥まで咥えるディープスロートで、亀頭を刺激して来る。"
translation = "페니스를 목구멍 깊숙이 물고 빠는 딥스로트로 귀두를 자극해 온다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（お口の中にいっぱい唾をため込んで、愛液いっぱいのおま○こみたいに<emoji=heart04>）"
translation = "（입안에 침을 잔뜩 머금어서, 애액 가득한 보지처럼♥）"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ぢゅっぽぢゅっぽぢゅっぽ<emoji=heart04>\u3000んぶっ<emoji=heart04>\u3000ぢゅるるるっ<emoji=heart04>\u3000れるれるっ<emoji=heart04>\u3000ちゅぶぶぶっ<emoji=heart04>\u3000ぢゅぽっぢゅぽっぢゅぽっ<emoji=heart04>\u3000んぶぅっ<emoji=heart04>\u3000ちゅぼっちゅぼっちゅぼっ<emoji=heart04>」"
translation = "「쥬웁쥬웁쥬웁♥ 응붑♥ 쥬르르릇♥ 레르레르♥ 츄부부붑♥ 쥬폿쥬폿쥬폿♥ 응붑♥ 츄봇츄봇츄봇♥」"

[[dialogue]]
speaker = "unk"
original = "おま○こに挿入しての感触とは異なる、しかしそれ以上の快感を与えて、射精感がみるみるせり上がって来る。"
translation = "보지에 삽입했을 때의 감촉과는 다른, 하지만 그 이상의 쾌감을 주어 사정감이 순식간에 치밀어 오른다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「マトイ、もう限界だ……！」"
translation = "「마토이, 이제 한계다……!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「うん<emoji=heart04>\u3000出ひて<emoji=heart04>\u3000おち○ちん気持ち良くなって、私のお口おま○こに精液いっぱい出ひてぇ<emoji=heart04><emoji=heart04>」"
translation = "「응♥ 내줘♥ 자지 기분 좋아져서, 내 입 보지에 정액 잔뜩 내줘어♥♥」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「んぶっ――<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응붑――♥♥♥」"

[[dialogue]]
speaker = "unk"
original = "マトイはラストスパートとばかりに、より一層フェラを激しくする。"
translation = "마토이는 라스트 스퍼트라는 듯이 더욱더 펠라를 격렬하게 한다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ぢゅぽっぢゅぽっぢゅぽっ<emoji=heart04>\u3000ちゅぶぶぶっ<emoji=heart04>\u3000ちゅばっちゅばっ<emoji=heart04>\u3000れるれるっ<emoji=heart04>\u3000ちゅぼっちゅぼっちゅぼっ<emoji=heart04>\u3000ぢゅるるるぅっ<emoji=heart04>」"
translation = "「쥬폿쥬폿쥬폿♥ 츄부부붑♥ 츄바츄밧♥ 레르레르♥ 츄봇츄봇츄봇♥ 쥬르르르윽♥」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「んぶぅっ<emoji=heart04>\u3000会長のおち○ちん、膨らんで来てる<emoji=heart04>\u3000ぢゅぽっぢゅぽっぢゅぽっ<emoji=heart04>\u3000ぢゅぱっぢゅぱっぢゅぱっ<emoji=heart04>\u3000ぢゅるるるっ<emoji=heart04>」"
translation = "「응붑♥ 회장의 자지, 부풀어 오르고 있어♥ 쥬폿쥬폿쥬폿♥ 쥬빡쥬빡쥬빡♥ 쥬르르릇♥」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「マトイ、もう出るっ！」"
translation = "「마토이, 이제 나온다!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「んっ<emoji=heart04>\u3000来てぇ<emoji=heart04>\u3000ちゅぼっちゅぼっちゅぼっ<emoji=heart04>\u3000精液、お口にいっぱい<emoji=heart04>\u3000ちゅぶっちゅぶっちゅぶっ<emoji=heart04>」"
translation = "「응♥ 와줘♥ 츄봇츄봇츄봇♥ 정액, 입안 가득히♥ 츄붓츄붓츄붓♥」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「私もおま○こイっちゃうぅ<emoji=heart04>\u3000ぢゅぽっぢゅぽっぢゅぽっ<emoji=heart04><emoji=heart04>\u3000ぢゅるるるっ<emoji=heart04><emoji=heart04>」"
translation = "「나도 보지 가버려어♥ 쥬폿쥬폿쥬폿♥♥ 쥬르르릇♥♥」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……出すぞ！\u3000マトイっ！！」"
translation = "「윽…… 싼다! 마토이!!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「会長<emoji=heart04><emoji=heart04>\u3000いっぱい出ひて<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ぢゅっぱぢゅっぱぢゅっぱ<emoji=heart04><emoji=heart04>\u3000ぢゅっぽぢゅっぽぢゅっぽ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「회장♥♥ 잔뜩 내줘♥♥♥ 쥬빠쥬빠쥬빠♥♥ 쥬웁쥬웁쥬웁♥♥♥」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ぢゅうぅっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ぢゅぽぢゅぽぢゅぽっ<emoji=heart04><emoji=heart04>\u3000ちゅっちゅっちゅぶぶぶっ<emoji=heart04><emoji=heart04>」"
translation = "「쥬우우웃♥♥♥ 쥬포쥬포쥬폿♥♥ 츄츄츄부부붑♥♥」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「じゅっぽじゅっぽっ<emoji=heart04><emoji=heart04>\u3000ぢゅぽっぢゅぽっぢゅぽっ<emoji=heart04><emoji=heart04>\u3000ぢゅるるるぅ――っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「쥬웁쥬웁♥ 쥬폿쥬폿쥬폿♥♥ 쥬르르르으――윽♥♥♥」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「っ……んぶぅっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000んん～～～～～～～～～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「윽…… 응붑♥♥♥ 응으으으으으으으으으으으으으으으윽♥♥♥♥♥」"

[[dialogue]]
speaker = "unk"
original = "限界に達した俺は、マトイの口内に思いっきり精を吐き出した。"
translation = "한계에 도달한 나는 마토이의 구강 내에 힘껏 정을 토해냈다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「んくっ……んくっ……んくっ……ぷはぁっ<emoji=heart04>\u3000んっ……んむぅっ<emoji=heart04>」"
translation = "「응긋…… 응긋…… 응긋…… 푸핫♥ 응…… 응무웃♥」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「……んぶっ<emoji=heart04>\u3000ぷあぁっ<emoji=heart04>\u3000飲み切れなくて、こぼれちゃう……はぁんっ<emoji=heart04>」"
translation = "「……응붑♥ 푸아앗♥ 다 못 마셔서 흘러넘쳐…… 하앙♥」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「んむっ……んくっ……ごっくん<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁ――っ<emoji=heart04><emoji=heart04>」"
translation = "「응뭇…… 응긋…… 꿀꺽♥ 앗♥ 하아아――♥」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ふあぁぁあんっ<emoji=heart04><emoji=heart04>\u3000あああっ<emoji=heart04>\u3000精液の匂いと味で、もう１回イっちゃったぁ……<emoji=heart04>」"
translation = "「후아아아앙♥♥ 아아앗♥ 정액의 냄새와 맛 때문에 한 번 더 가버렸어……♥」"

[[dialogue]]
speaker = "unk"
original = "マトイがイった拍子に口を離して、彼女の顔や体に精液がかかってしまう。"
translation = "마토이가 절정에 달한 순간 입을 떼어, 그녀의 얼굴과 몸에 정액이 튀고 만다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「んっ……<emoji=heart04>\u3000はあぁ<emoji=heart04>\u3000ふうぅ……<emoji=heart04>\u3000会長のオスの匂いがいっぱいで、すごぉい……<emoji=heart04>」"
translation = "「응……♥ 하아아♥ 후우우……♥ 회장의 수컷 냄새가 가득해서 굉장해……♥」"

[[dialogue]]
speaker = "unk"
original = "しかし、その顔は全然嫌そうではなく……むしろ嬉しそうで。"
translation = "하지만 그 얼굴은 전혀 싫어하는 기색이 아니었고…… 오히려 기뻐 보였다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「私、自分で思ってたよりも会長のおち○ちんしゃぶるの、好きかも……<emoji=heart04>\u3000自分が好きな人の匂いで染められてる感じがして……<emoji=heart04>」"
translation = "「나, 생각했던 것보다 회장의 자지 빠는 거 좋아할지도……♥ 내가 좋아하는 사람의 냄새로 물드는 느낌이 들어서……♥」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ね、ねぇ……会長？」"
translation = "「저, 저기…… 회장?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「朝、会長の家まで起こしに行ってさ、モーニングフェラで起こしてみたい……って言ったら、引く？」"
translation = "「아침에 회장 집까지 깨우러 가서, 모닝 펠라로 깨워보고 싶다……고 하면 정떨어져?」"

[[dialogue]]
speaker = "unk"
original = "上目遣いで言われて、俺は思わず想像してしまう。"
translation = "치켜뜬 눈으로 그런 말을 듣자, 나는 나도 모르게 상상하고 만다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あっ<emoji=heart04>\u3000すごい……<emoji=heart04>\u3000会長のおち○ちん、もう復活して<emoji=heart04>」"
translation = "「앗♥ 대단해……♥ 회장의 자지, 벌써 부활해서♥」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「んふふっ<emoji=heart04>\u3000じゃあ今度、実際にやってみるから……楽しみにしててね、会長<emoji=heart04>」"
translation = "「응후훗♥ 그럼 다음에 실제로 해볼 테니까…… 기대하고 있어, 회장♥」"

[[dialogue]]
speaker = "unk"
original = "精液まみれになったマトイはうっとりした顔で笑って、そんなことを言うのだった。"
translation = "정액 범벅이 된 마토이는 황홀한 표정으로 웃으며 그런 말을 하는 것이었다."

