[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「気になる最初の入社試験は──」"
translation = "「궁금해할 첫 번째 입사 시험은──」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「実戦ですわ！」"
translation = "「실전입니다!」"

[[dialogue]]
speaker_original = "ヒマワリ"
speaker_translation = "히마와리"
original = "「いきなりですかー！？」"
translation = "「갑자기 말인가요ー!?」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「依頼は突然やってくるもの。この程度で驚いていては、我が社の社員は務まりませんわよ」"
translation = "「의뢰는 돌연히 찾아오는 법. 이 정도로 놀라서는 저희 회사의 사원은 감당할 수 없답니다.」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "（この子たちの試験を考えてて、うっかり今晩の依頼を忘れるところだったわ……ギリギリ思い出せて良かった）"
translation = "(이 아이들의 시험을 생각하다가 깜빡하고 오늘 밤 의뢰를 잊을 뻔했네…… 아슬아슬하게 기억나서 다행이야.)"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "（その依頼を試験にするというのは、当意即妙な冴えたアイデアね。さすがは私！）"
translation = "(그 의뢰를 시험으로 삼는다는 건 당의즉묘한 멋진 아이디어네. 역시 나야!)"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「依頼は、とある闇グループの尻尾を掴むこと」"
translation = "「의뢰는 어느 어둠의 그룹의 꼬리를 잡는 것.」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「闇グループですか……どのような悪辣な組織なんですか？」"
translation = "「어둠의 그룹인가요…… 어떤 악랄한 조직인가요?」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「なんでも人間界を訪れたばかりで右も左もわからない魔族や天使を騙し、違法な契約書に判を押させ、星騎士を私的に働かせるのだとか」"
translation = "「듣자 하니 인간계에 막 방문해서 아무것도 모르는 마족이나 천사를 속여서 불법 계약서에 도장을 찍게 하고, 성기사를 사적으로 부려 먹는다더군요.」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「犯罪の片棒を担がせたり、借金の連帯保証人にさせたりと……異変を感じた被害者の訴えで、明るみに出たとのことですわ」"
translation = "「범죄에 가담시키거나 빚의 연대 보증인으로 세우는 등…… 이상함을 느낀 피해자의 호소로 밝혀졌다고 합니다.」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「なるほど……被害者に気付かれるなんて随分と甘いんですね。その程度の組織でしたら、きっと尻尾を掴んでみせます」"
translation = "「그렇군요…… 피해자에게 들키다니 상당히 어설프네요. 그 정도 조직이라면 반드시 꼬리를 잡아 보이겠어요.」"

[[dialogue]]
speaker_original = "ヒマワリ"
speaker_translation = "히마와리"
original = "「現場の空気を味わえるなんて感激です！\u3000セナリィ社長の活躍をかぶりつきで見られるなんて！」"
translation = "「현장의 공기를 맛볼 수 있다니 감격이에요! 세나리 사장님의 활약을 코앞에서 볼 수 있다니!」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「悠長にしていられるのも、今だけですわよ」"
translation = "「여유 부릴 수 있는 것도 지금뿐이랍니다.」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「くれぐれも私の仕事の邪魔をしないように。そして、命の危険を感じたらすぐさま撤退なさい」"
translation = "「절대로 제 업무를 방해하지 않도록. 그리고 생명의 위험을 느끼면 즉시 철수하세요.」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「ただし、撤退した時点で不合格とみなします。二度と危険な世界に近づこうだなんて思わないことですわ」"
translation = "「단, 철수한 시점에서 불합격으로 간주합니다. 두 번 다시 위험한 세계에 가까이 오겠다는 생각은 하지 않는 게 좋을 거예요.」"

[[dialogue]]
speaker_original = "ミウ＆ヒマワリ"
speaker_translation = "미우 & 히마와리"
original = "「了解です、社長！」"
translation = "「알겠습니다, 사장님!」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "（いざ現場に立ったら、ビビるに違いないわ。裏の仕事は決して格好いいことばかりではないの。理想と現実は違うのよ）"
translation = "(막상 현장에 서면 분명 겁먹을 게 뻔해. 어둠의 일은 결코 멋진 일만 있는 게 아니야. 이상과 현실은 다르다구.)"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「ここもハズレ。目星はついているんですけど、何処ももぬけの殻。なかなか見つかりませんわね」"
translation = "「여기도 꽝. 짚이는 곳은 있는데 어디든 텅 비어 있군요. 좀처럼 발견되질 않네요.」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「にしても、先行したあの子たちは何処へ……？\u3000怪我していないといいんですけれど──」"
translation = "「그나저나 먼저 간 그 아이들은 어디에……? 다치지 않았으면 좋겠는데──」"

[[dialogue]]
speaker_original = "男"
speaker_translation = "남자"
original = "「うわあああああ！？」"
translation = "「우와아아아악!?」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「今の声は！？」"
translation = "「방금 목소리는!?」"

[[dialogue]]
speaker_original = "ヒマワリ"
speaker_translation = "히마와리"
original = "「たくさんいたお仲間も、残るはあんただけー。早いとこ、口を割った方が幸せだと思うけどー？」"
translation = "「많이 있던 동료들도 남은 건 아저씨뿐이야ー. 빨리 입을 여는 게 편할 거라고 생각하는데ー?」"

[[dialogue]]
speaker_original = "男"
speaker_translation = "남자"
original = "「てめぇらみたいなガキどもにやられちまうとはな……だがよ、んな簡単に口を割るわきゃねーだろーが。オレらはこの道のプロだぜ？」"
translation = "「너희 같은 꼬맹이들한테 당하다니…… 하지만 말이야, 그렇게 쉽게 입을 열 리가 없잖냐. 우린 이 바닥의 프로라고?」"

[[dialogue]]
speaker_original = "ヒマワリ"
speaker_translation = "히마와리"
original = "「ふーん、それなら動けなくしてから問い詰めるからいいけどね。後悔しても知んないよー？」"
translation = "「흐응, 그럼 움직이지 못하게 만든 다음에 추궁하면 되니까 상관없지만. 후회해도 모른다구ー?」"

[[dialogue]]
speaker_original = "男"
speaker_translation = "남자"
original = "「ナメんな、ガキが！」"
translation = "「얕보지 마라, 꼬맹아!」"

[[dialogue]]
speaker_original = "ヒマワリ"
speaker_translation = "히마와리"
original = "「子どもだと思って舐めてかかると痛い目見るんだよー！\u3000オーバースペキュレーション！」"
translation = "「애라고 생각해서 얕봤다간 큰코다친다구ー! 오버 스펙큘레이션!」"

[[dialogue]]
speaker_original = "男"
speaker_translation = "남자"
original = "「な、なんだ！？\u3000体にすげぇ力が溢れて……？」"
translation = "「뭐, 뭐야!? 몸에 엄청난 힘이 넘쳐서……?」"

[[dialogue]]
speaker_original = "ヒマワリ"
speaker_translation = "히마와리"
original = "「それが、あたしの能力だよ。今、あんたにあたしの力を『投資』した」"
translation = "「그게 내 능력이야. 지금 아저씨한테 내 힘을 『투자』했어.」"

[[dialogue]]
speaker_original = "男"
speaker_translation = "남자"
original = "「な、なんだと……？\u3000力を寄こす相手を間違ってんじゃねぇのか、ありがたく使わせてもらうぜ！」"
translation = "「뭐, 뭐라고……? 힘을 줄 상대를 착각한 거 아니냐, 감사히 써주마!」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「強くなったからといって、調子に乗らない方が良いですよ。底上げになったあなたから『投資』を『回収』する。それがヒマワリちゃんの能力です」"
translation = "「강해졌다고 해서 우쭐대지 않는 게 좋아요. 능력치가 상승한 당신으로부터 『투자』를 『회수』한다. 그것이 히마와리짱의 능력입니다.」"

[[dialogue]]
speaker_original = "ヒマワリ"
speaker_translation = "히마와리"
original = "「そ！\u3000資産価値が上がったところで全投資売却！\u3000返してもらうね！\u3000キャピタルドレイン！」"
translation = "「맞아! 자산 가치가 올랐을 때 전액 투자 매각! 돌려받을게! 캐피탈 드레인!」"

[[dialogue]]
speaker_original = "男"
speaker_translation = "남자"
original = "「ぎゃっ！？\u3000力が……オレの力が抜けて……！？\u3000ふにゃふにゃ～……」"
translation = "「갸악!? 힘이…… 내 힘이 빠져나가서……!? 흐물흐물~……」"

[[dialogue]]
speaker_original = "ヒマワリ"
speaker_translation = "히마와리"
original = "「いっちょあがりぃ！\u3000あたしの力、傷つけずに無力化するのに便利なんだよねー」"
translation = "「한 놈 완료! 내 힘은 상처 입히지 않고 무력화하는 데 편리하거든ー」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「あなたたち、大丈夫──あら？\u3000これは……あなたたちがやりましたの？」"
translation = "「당신들, 괜찮── 어라? 이건…… 당신들이 한 건가요?」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「はい、無事に鎮圧しました」"
translation = "「네, 무사히 진압했습니다.」"

[[dialogue]]
speaker_original = "男"
speaker_translation = "남자"
original = "「バンデット・セナリィ……か……？\u3000ちっ、こいつらはお前の部下かよ……」"
translation = "「밴디트 세나리……인가……? 칫, 이 녀석들은 네 부하냐……」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「あなた、所属組織は？\u3000契約している星騎士は何処に閉じ込めてますの？」"
translation = "「당신, 소속 조직은? 계약하고 있는 성기사는 어디에 가두고 있죠?」"

[[dialogue]]
speaker_original = "男"
speaker_translation = "남자"
original = "「ハッ、言うわけねぇだろうが。殺るならとっとと殺れよ」"
translation = "「하, 말할 것 같냐. 죽일 거면 빨리 죽여라.」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「口を割らせるのは少々骨が折れそうですわね」"
translation = "「입을 열게 하는 건 조금 고생할 것 같군요.」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「ちょっとだけ素直になってくれるだけでいいんですけど……セナリィ社長、ペンチってありますか？」"
translation = "「조금만 솔직해지면 될 일인데…… 세나리 사장님, 펜치 있나요?」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「ペンチ？\u3000潜入工作の七つ道具だから持っていますけど……何に使うつもりなのかしら？」"
translation = "「펜치? 잠입 공작의 필수 도구니까 가지고는 있습니다만…… 어디에 쓸 생각이죠?」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「オーソドックスなやり方ですけど、とりあえず生爪を１枚ずつ剥がそうかと思いまして」"
translation = "「오소독스한 방법이긴 하지만, 우선 생손톱을 한 장씩 뽑아볼까 해서요.」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「そう、生爪……なまづめ！？\u3000微笑み浮かべながら吐くセリフじゃありませんわね！？」"
translation = "「그래요, 생손톱…… 생손톱!? 미소를 띠며 뱉을 대사가 아니잖아요!?」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「何枚目で口を割ってくれるかなぁ。強情そうだから、片手くらいじゃ足りませんよね。そうだ、足の指からにしましょうか」"
translation = "「몇 장째에 입을 열어주려나. 고집이 세 보이니까 한쪽 손 정도로는 부족하겠네요. 맞다, 발가락부터 시작할까요.」"

[[dialogue]]
speaker_original = "ヒマワリ"
speaker_translation = "히마와리"
original = "「あーあ。だから、早いとこ、口を割った方が良いって言ったのにー。本気になったミウはヤバいよー？」"
translation = "「아ー아. 그러니까 빨리 입을 여는 게 좋다고 말했는데ー. 본심이 된 미우는 위험하다구ー?」"

[[dialogue]]
speaker_original = "ヒマワリ"
speaker_translation = "히마와리"
original = "「ま、最後まで正気を保っていられるといいねー」"
translation = "「뭐, 마지막까지 제정신을 유지할 수 있으면 좋겠네ー」"

[[dialogue]]
speaker_original = "男"
speaker_translation = "남자"
original = "「ヒッ……！？」"
translation = "「히익……!?」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「他に尋問に使えそうな道具は、っと……そこに水道がありますね。お水は簡単に手に入る上、用途がいろいろあるので便利ですよね」"
translation = "「그 외에 고문에 쓸만한 도구는, 보자…… 저기에 수도가 있네요. 물은 쉽게 구할 수 있는 데다 용도가 다양해서 편리하죠.」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「あっ、あそこにいい感じの麻袋がありますね。ゴムホースもあるじゃないですか。アレも使えそうです」"
translation = "「앗, 저기에 느낌이 좋은 포대가 있네요. 고무호스도 있잖아요. 저것도 쓸 수 있겠어요.」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「水と麻袋とゴムホースをどんな風に使うつもりですの！？\u3000いえ、あんまり聞きたくはないですけど！」"
translation = "「물과 포대와 고무호스를 어떤 식으로 쓸 생각인가요!? 아니, 별로 듣고 싶지는 않지만!」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「またまたぁ、人が悪いです。悪のエリートのセナリィ様なら当然お気づきですよね？\u3000あ、それとも、これも試験の一環なんですか？」"
translation = "「에이 참, 짓궂으시긴. 악의 엘리트인 세나리 님이라면 당연히 눈치채셨겠죠? 아, 아니면 이것도 시험의 일환인가요?」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "（いやいやいや、まさかアレをやるつもり！？\u3000どこの特殊部隊の出身！？）"
translation = "(아니 아니 아니, 설마 그걸 할 생각!? 도대체 어느 특수부대 출신인 거야!?)"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「捕縛した人はたくさんいますし、最初に口を割った方は軽～い尋問で済ませてあげましょう。ふふふ、皆さんの絆を試す楽しい時間になりそうです♪」"
translation = "「포박한 사람은 많으니, 가장 먼저 입을 여는 분은 가벼~운 고문으로 끝내드리죠. 후후후, 여러분의 유대감을 시험하는 즐거운 시간이 될 것 같아요♪」"

[[dialogue]]
speaker_original = "男"
speaker_translation = "남자"
original = "「ヒィィッ！？\u3000わ、わっ、わかった！\u3000話す！\u3000もうなんでも話すから勘弁してくれ！」"
translation = "「히이익!? 아, 알았어! 말할게! 이제 뭐든 말할 테니까 제발 봐줘!」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「えー？\u3000まだ何の準備もしてないのに……どうしましょうか、セナリィ社長」"
translation = "「에ー? 아직 아무런 준비도 안 했는데…… 어떡할까요, 세나리 사장님.」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「ま、まあ、洗いざらい吐くと約束したことですし、今日の所は突き出すだけで勘弁してあげましょうか」"
translation = "「뭐, 뭐어, 전부 털어놓겠다고 약속했으니 오늘의 일은 넘겨주는 것만으로 봐주도록 할까요.」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「わぁ、美しいだけじゃなくて、そんなにお優しいなんて！\u3000皆さん、社長に感謝してくださいね」"
translation = "「와아, 아름다우실 뿐만 아니라 그렇게 상냥하시다니! 여러분, 사장님께 감사하세요.」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "（なんなのこの子！？\u3000かわいい顔してめちゃヤバじゃないの！？）"
translation = "(뭐야 이 아이!? 귀여운 얼굴을 해서 엄청 위험하잖아!?)"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「一網打尽にして、見事解決。いつも以上の完遂でしたわ」"
translation = "「일망타진해서 훌륭히 해결. 평소 이상의 완수였답니다.」"

[[dialogue]]
speaker_original = "ヒマワリ"
speaker_translation = "히마와리"
original = "「セナリィ社長？\u3000あたしたちの試験はどうですか？」"
translation = "「세나리 사장님? 저희 시험은 어떤가요?」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「え？\u3000試験……あ、あー、そうでしたわね。２人ともなかなかの働きぶりを見せてくれましたわね！」"
translation = "「에? 시험…… 아, 아ー, 그랬었죠. 둘 다 꽤 훌륭한 실력을 보여주었군요!」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「よって……第一次試験は合格としますわ」"
translation = "「따라서…… 1차 시험은 합격으로 하겠습니다.」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「やった！\u3000次も頑張りますね♪」"
translation = "「앗싸! 다음도 열심히 할게요♪」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "（先ほどの悪魔と同一人物とは思えない天使の笑顔ね……さて、二次試験はどうしたものでしょう）"
translation = "(방금 전의 악마와 동일 인물이라고는 생각되지 않는 천사의 미소네…… 자, 2차 시험은 어떻게 해야 좋담.)"

