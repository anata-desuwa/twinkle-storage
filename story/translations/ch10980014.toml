[[dialogue]]
speaker = "unk"
original = "第４話,ヒマワリちゃんの投資講座,P"
translation = "제4화, 히마와리짱의 투자 강좌"

[[dialogue]]
speaker = "ミウ"
original = "「はじまりました、ヒマワリちゃんの投資講座です」"
translation = "「시작하겠습니다, 히마와리짱의 투자 강좌입니다.」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「先生のヒマワリです。社長が投資について知りたいというので、素人意見で恐縮ですが、あたしがレクチャーしようと思います」"
translation = "「선생님인 히마와리입니다. 사장님이 투자에 대해 알고 싶어 하셔서 초보자 의견이라 송구스럽지만 제가 강의해볼까 합니다.」"

[[dialogue]]
speaker = "セナリィ"
original = "「はい、先生！\u3000投資って怖くて難しいというイメージがありますわ！」"
translation = "「네, 선생님! 투자는 무섭고 어렵다는 이미지가 있어요!」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「いい質問ですねー。世間のイメージでは、怖い・損しそう・詐欺っぽいとか思われがちですけど」"
translation = "「좋은 질문이네요─ 세상 이미지로는 무섭다, 손해 볼 것 같다, 사기 같다며 오해받기 쉽지만요.」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「株式投資って、そんなに怖くないんですよ。ただし、一攫千金とか一発逆転を狙っている人には、オススメしないです。宝クジじゃないですからね」"
translation = "「주식 투자는 그렇게 무섭지 않답니다. 다만 일확천금이나 한판 뒤집기를 노리는 사람에겐 추천하지 않아요. 복권이 아니니까요.」"

[[dialogue]]
speaker = "セナリィ"
original = "「ギクッ……！\u3000でも、損することだってありますわよね？」"
translation = "「찔려라……! 하지만 손해를 볼 수도 있는 거죠?」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「もちろんですよ。あたしが常勝みたいに思われてるかもですけど、全然そんなことないですからね？\u3000値動きを見切れるのは、神様かインサイダーだけです」"
translation = "「당연하죠. 제가 항상 이기는 것처럼 보일지도 모르겠지만 전혀 그렇지 않거든요. 가격 움직임을 꿰뚫어 보는 건 신이나 내부자뿐이에요.」"

[[dialogue]]
speaker = "セナリィ"
original = "「そうなんですの？\u3000てっきり勝ちまくりなのかと」"
translation = "「그렇습니까? 줄곧 이기고만 있는 줄 알았는데.」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「トータルでは勝ってますけど、勝ち４の負け６くらいですかねー」"
translation = "「합계로는 이기고 있지만 승률은 4할에 패배 6할 정도일까요─」"

[[dialogue]]
speaker = "セナリィ"
original = "「負けが多いのに勝っている……どういうカラクリですの？」"
translation = "「지는 게 더 많은데 이기고 있다니…… 어떤 속임수입니까?」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「負けは少なく、勝ちは大きくです。『ここを割ったらマズい！』と思ったら、マイナスでも売っちゃう。いわゆる損切りってヤツですね」"
translation = "「패배는 적게, 승리는 크게 하는 거죠. 『여기가 뚫리면 위험해!』 싶으면 마이너스라도 팔아버려요. 소위 말하는 손절이라는 녀석이죠.」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「戦いでもなんでも、見切りをつけての引き際って難しいですよね。欲張らずコツコツやるのが何よりですよ」"
translation = "「전투든 뭐든 판단을 내리고 물러날 때를 정하는 건 어렵잖아요. 욕심부리지 않고 차근차근 하는 게 무엇보다 중요해요.」"

[[dialogue]]
speaker = "セナリィ"
original = "「何も難しいことは言ってませんわね……私でもやれそうな気がしてきましたわ！」"
translation = "「전혀 어려운 말씀이 아니군요…… 저도 할 수 있을 것 같은 기분이 듭니다!」"

[[dialogue]]
speaker = "unk"
original = "セナリィは引き際を見誤るから……"
translation = "세나리는 물러날 때를 잘 못 보니까……."

[[dialogue]]
speaker = "ヒマワリ"
original = "「あとはリスク分散ですね。『卵はひとつのカゴに盛るな』です」"
translation = "「다음은 리스크 분산이에요. 『달걀을 한 바구니에 담지 마라』는 거죠.」"

[[dialogue]]
speaker = "セナリィ"
original = "「卵を……どういう意味ですの？」"
translation = "「달걀을…… 무슨 뜻입니까?」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「１０個の卵を１つのカゴに盛っていたら、そのカゴを落とした時に全部割れちゃうじゃないですか」"
translation = "「10개의 달걀을 한 바구니에 담았다가 그 바구니를 떨어뜨리면 전부 깨져버리잖아요.」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「でも、２つでも３つでも……いくつかのカゴに分けておけば、落としてしまっても割れるのはそのカゴの分だけ。ダメージは少なく済みます」"
translation = "「하지만 두 개든 세 개든…… 여러 바구니에 나눠 담아두면 떨어뜨려도 깨지는 건 그 바구니 분량뿐이죠. 데미지를 적게 줄일 수 있어요.」"

[[dialogue]]
speaker = "ミウ"
original = "「部隊が壊滅するよりは、犠牲は１人だけに留めておこうってことですね」"
translation = "「부대가 전멸하기보다는 희생을 한 명으로만 한정하자는 뜻이군요.」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「そう、そう。１人がやられたら、みんなで弔い合戦をして、やり返せばいいんですよ！」"
translation = "「맞아, 맞아. 한 명이 당하면 다 같이 조문 전투를 해서 복수해주면 되는 거예요!」"

[[dialogue]]
speaker = "unk"
original = "そのたとえはどうだろう……"
translation = "그 비유는 어떨까 싶은데……."

[[dialogue]]
speaker = "ヒマワリ"
original = "「というわけで、無茶と深追いと後悔をしない。ちょっと慎重になるだけで、あたしくらいの資産なんて簡単に作れるんで！」"
translation = "「그런 고로 무리하지 않고, 과하게 쫓지 않고, 후회하지 않는다. 조금 신중해지는 것만으로 저 정도 자산은 금방 만들 수 있으니까요!」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「皆さんもちょっぴりだけ頑張ってみてください。はい、ヒマワリの投資講座でした！」"
translation = "「여러분도 조금만 힘내보세요. 이상, 히마와리의 투자 강좌였습니다!」"

[[dialogue]]
speaker = "ミウ"
original = "「はい、拍手～」"
translation = "「네, 박수~」"

[[dialogue]]
speaker = "ミウ"
original = "「──って言ってますけど、ヒマワリちゃんはお金に関しては、天賦の才と経験がありますからね」"
translation = "「──라고 말하고 있지만 히마와리짱은 돈에 관해서는 천부적인 재능과 경험이 있으니까요.」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「えー、そんなことないのにー」"
translation = "「에이, 그렇지 않은데─」"

[[dialogue]]
speaker = "ミウ"
original = "「あるの。会長さんとセナリィ社長はあまり真に受けて、火傷しないように気をつけてください」"
translation = "「있어. 회장님이랑 세나리 사장님은 너무 곧이곧대로 듣다가 데이지 않도록 조심하세요.」"

[[dialogue]]
speaker = "unk"
original = "はい"
translation = "네."

[[dialogue]]
speaker = "セナリィ"
original = "「重々、気をつけますわ」"
translation = "「단단히 조심하겠습니다.」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「どうです、会長さん。参考になりました？」"
translation = "「어떠세요, 회장님. 참고가 되셨나요?」"

[[dialogue]]
speaker = "unk"
original = "俺には難しそうだな"
translation = "나한테는 좀 어려울 것 같네."

[[dialogue]]
speaker = "ヒマワリ"
original = "「そうですかねー。会長さんは勝負勘もいいし、リスク管理も上手ですし、向いてると思うんですけど」"
translation = "「그럴까요─ 회장님은 승부 호흡도 좋고 리스크 관리도 잘하셔서 잘 어울릴 것 같다고 생각하는데.」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「困ったら、なんでも聞いてくださいね。投資に絶対はないですけど、アドバイスくらいならできますんで」"
translation = "「곤란하면 뭐든 물어보세요. 투자에 절대는 없지만 조언 정도라면 해드릴 수 있으니까요.」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「まー、でも、やらなくても大丈夫かな？」"
translation = "「뭐, 그래도 안 해도 괜찮으려나?」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「あたし、未来の旦那様も、まとめて養えるくらいの蓄えはありますし―」"
translation = "「저, 미래의 서방님도 통째로 먹여 살릴 정도의 비축분은 있거든요─」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「いざとなれば、あたしが会長さんのこと、養ってあげちゃいますから、ね♪」"
translation = "「정 안 되면 제가 회장님을 먹여 살려버릴 테니까요, 네♪」"

[[dialogue]]
speaker = "unk"
original = "それってどういう……？"
translation = "그건 무슨 의미야……?"

[[dialogue]]
speaker = "ヒマワリ"
original = "「んー？\u3000言葉以上の意味はないんで、言葉通りに受け止めてください」"
translation = "「응─? 말 이상의 의미는 없으니까 말 그대로 받아들여 주세요.」"

[[dialogue]]
speaker = "セナリィ"
original = "「わっ、わっ！？\u3000これはどうすればいいんですの！？\u3000ヒマワリー！\u3000助けてくださいましー！」"
translation = "「왓, 왓!? 이건 어떻게 하면 되는 겁니까!? 히마와리─! 도와주세요─!」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「はーい、社長、今、行きまーす！」"
translation = "「네에, 사장님 지금 가요─!」"

[[dialogue]]
speaker = "ヒマワリ"
original = "「会長さん、またあたしと遊んでくださいね！」"
translation = "「회장님, 다음에 또 저랑 놀아주세요!」"

