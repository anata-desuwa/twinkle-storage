[[dialogue]]
speaker = "unk"
original = "第４話,プライベート・チア,P"
translation = "제4화, 프라이빗 치어, P"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「失礼しま～す。会長く～ん、一緒に帰ろ」"
translation = "「실례할게요~. 회장군~, 같이 돌아가자」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「あれ？\u3000まだお仕事中？\u3000他の役員さんたちは？\u3000パトロール終わったら直帰？」"
translation = "「어라? 아직 일하는 중이야? 다른 임원들은? 순찰 끝나고 바로 귀가했어?」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「そうなんだ……会長くんのお仕事終わるまで待ってるね。別に急がなくても大丈夫だから」"
translation = "「그렇구나……. 회장군의 일이 끝날 때까지 기다릴게. 딱히 서두르지 않아도 괜찮으니까」"

[[dialogue]]
speaker = "unk"
original = "そういえば、あの時の命令ってまだ有効？"
translation = "그러고 보니, 그때의 명령은 아직 유효한가?"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「命令？\u3000あ……カティアちゃんとヒヨちゃんの勝負の時の？」"
translation = "「명령? 아…… 카티아짱과 히요짱의 승부 때 말이야?」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「会長くん……私にどんな命令しちゃうつもり？」"
translation = "「회장군…… 나한테 어떤 명령을 할 생각이야?」"

[[dialogue]]
speaker = "unk"
original = "チアガール衣装で応援してほしい！"
translation = "치어걸 복장으로 응원해 줬으면 좋겠어!"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「え……？\u3000それが命令？\u3000なんだぁ……もっとすごい命令されちゃうのかと思った……」"
translation = "「에……? 그게 명령이야? 뭐야아…… 더 대단한 명령을 받을 줄 알았는데……」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「うん、いいよ。それじゃ──」"
translation = "「응, 좋아. 그럼──」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「じゃんっ♪\u3000チアミルフィーだよ！」"
translation = "「짠♪ 치어 밀피야!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「ふふ、最初はちょっと抵抗あったけど、もうチアガールの衣装にも慣れてきちゃった」"
translation = "「후후, 처음엔 조금 거부감이 있었지만, 이젠 치어걸 복장에도 익숙해졌어」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「会長くんだけの特別チアリーディング、はじめまーす<emoji=heart04>」"
translation = "「회장군만을 위한 특별 치어리딩, 시작할게요~<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「がんばれ、がんばれ、会長くん♪」"
translation = "「힘내라, 힘내라, 회장군♪」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「ゴー・ゴー・レッツゴー！\u3000ほらほら、こっちばかり見てたら、いつまでも書類片付かないよー？」"
translation = "「고고 레츠고! 자자, 이쪽만 보고 있으면, 언제까지나 서류가 정리되지 않아~?」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「ちゃんと手を動かしてっ！\u3000ふぁいと、ふぁいと、会長くん♪」"
translation = "「제대로 손을 움직여! 파이팅, 파이팅, 회장군♪」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「全部終わらせたら、ご褒美も待ってるよっ」"
translation = "「전부 끝내면, 포상도 기다리고 있어!」"

[[dialogue]]
speaker = "unk"
original = "ミルフィーの応援を受けながら書類に集中する。"
translation = "밀피의 응원을 받으며 서류에 집중한다."

[[dialogue]]
speaker = "unk"
original = "しばらくして、思っていたよりも早く書類が完成した。"
translation = "잠시 후, 생각했던 것보다 빨리 서류가 완성되었다."

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「あんなにあったのに、もう終わったんだ！\u3000お疲れさまでしたー。えらい、えらーい」"
translation = "「그렇게 많았는데, 벌써 끝났네! 수고했어~. 착하다, 착해~」"

[[dialogue]]
speaker = "unk"
original = "ミルフィーのおかげだよ"
translation = "밀피 덕분이야"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「お役に立てたなら何よりだよー」"
translation = "「도움이 되었다니 무엇보다 기뻐~」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「星徒会長は学園のために身を粉にして働くのは当たり前……なんて言ってる人もいるけど」"
translation = "「성도회장은 학원을 위해 몸을 갈아 넣어 일하는 게 당연하다……고 말하는 사람도 있지만」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「会長くんはすっっっごく頑張ってる。頑張ったら頑張った分だけ褒めてほしいよね」"
translation = "「회장군은 너어어무 열심히 하고 있어. 열심히 했으면 열심히 한 만큼 칭찬받고 싶잖아」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「みんなが褒めてくれない分、私がい～～っぱい褒めて、甘やかしてあげる」"
translation = "「모두가 칭찬해 주지 않는 만큼, 내가 이~~~만큼 칭찬해 주고, 응석 부리게 해 줄게」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「よくできました♪\u3000えらいぞー、すごいぞー、格好いいよー♪\u3000なでなでなで<emoji=heart04>」"
translation = "「잘했어요♪ 착하다~, 대단하다~, 멋있어~♪ 쓰담쓰담쓰담<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「みんなのために頑張れるあなたが、だぁい好きっ<emoji=heart04>」"
translation = "「모두를 위해 노력하는 네가, 너어무 좋아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ところで、ご褒美って……？"
translation = "그런데, 포상이란 건……?"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「あんまり期待してたらごめんなんだけど……私からのご褒美は……」"
translation = "「너무 기대했다면 미안한데…… 나한테서 주는 포상은……」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「ほっぺに……ちゅっ<emoji=heart04>」"
translation = "「볼에…… 쪽<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「ふふ、私のキスくらいじゃ、ご褒美にならないかな？」"
translation = "「후후, 나의 키스 정도로는, 포상이 안 될까?」"

[[dialogue]]
speaker = "unk"
original = "もっと、欲しいな"
translation = "더, 원해"

[[dialogue]]
speaker = "unk"
original = "十分、ご褒美だけど"
translation = "충분히, 포상이지만"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「ええっ……もっと……？\u3000ふたりっきりだから、特別だよ……？」"
translation = "「에엣…… 더……? 둘이서만 있으니까, 특별이야……?」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「んぅ、ちゅ、ちゅっ……んぅ、か、会長くん……あんまりイチャイチャしすぎると……」"
translation = "「응, 쪽, 쪽…… 응, 하, 회장군…… 너무 알콩달콩하면……」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「え……？\u3000我慢なんてできないって……？」"
translation = "「에……? 참을 수 없다고……?」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「んもぉ、仕方ないなぁ……会長くん、いつもは紳士なのに……スイッチ入ると止まんなくなっちゃうもんね」"
translation = "「정말, 어쩔 수 없네…… 회장군, 평소에는 신사인데…… 스위치가 켜지면 멈출 수 없게 되잖아」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "（止まれなくなっちゃうのは、私もだけど。ごめんなさい、マグダレナ様）"
translation = "（멈출 수 없게 되는 건, 나도 마찬가지지만. 죄송해요, 막달레나 님）"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "（普段はいい子にしてますので、好きな人の前ではちょっとくらい悪い子になっちゃっても……いいですよね？）"
translation = "（평소에는 착한 아이로 지내고 있으니, 좋아하는 사람 앞에서는 조금 정도 나쁜 아이가 되어도…… 괜찮겠죠?）"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「会長くん……ちゅ、ちゅっ……ぅんっ<emoji=heart04>」"
translation = "「회장군…… 쪽, 쪽…… 읍<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "せっかく早く仕事を終わらせたのに、結局、最終下校時刻を過ぎるまでミルフィーと甘い時間を過ごしたのだった。"
translation = "모처럼 빨리 일을 끝냈는데, 결국 최종 하교 시각을 넘길 때까지 밀피와 달콤한 시간을 보낸 것이었다."

