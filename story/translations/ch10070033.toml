[[dialogue]]
speaker = "unk"
original = "第３話,一人前の法螺吹きに,P"
translation = "제3화, 어엿한 허풍쟁이로, P"

[[dialogue]]
speaker = "ルリエル"
original = "「突然ですがルリエル、一人前の法螺吹きを目指します！」"
translation = "「갑작스럽지만 루리엘, 어엿한 허풍쟁이를 목표로 하겠어요!」"

[[dialogue]]
speaker = "ルリエル"
original = "「演奏のことじゃないですよ？\u3000ウソをつく方の法螺のことなのです！」"
translation = "「연주 말하는 게 아니에요? 거짓말을 하는 쪽의 허풍인 거예요!」"

[[dialogue]]
speaker = "ルリエル"
original = "「この間ソフィアに言われちゃったんです。『ルリってウソが下手過ぎるよね』って」"
translation = "「얼마 전에 소피아가 말했거든요. 『루리는 거짓말을 너무 못해』라고요」"

[[dialogue]]
speaker = "ルリエル"
original = "「先日、星徒会のみんなで納涼人狼大会をしている時でした。わたし、ずーっと楽しみにしていて、個人的に何度も練習していたんです……！」"
translation = "「요전날, 성도회 모두와 납량 인랑 대회를 하고 있을 때였어요. 저, 계속 기대하고 있어서, 개인적으로 몇 번이나 연습했거든요……!」"

[[dialogue]]
speaker = "ルリエル"
original = "「なのにソフィアってば、わたしが人狼になるとバレバレすぎて面白くないって言ってきて……！\u3000他の皆さんも苦笑するばかりで何も反論してくれなくて……！」"
translation = "「그런데 소피아는, 제가 인랑이 되면 너무 티가 나서 재미없다고 말하고……! 다른 분들도 쓴웃음만 지을 뿐 아무런 반론도 안 해줘서……!」"

[[dialogue]]
speaker = "ルリエル"
original = "「あの可哀想な子を見るような皆さんの顔が忘れられません……！\u3000だからルリエル、決めたのです！\u3000一人前の法螺吹きになって、見返してやろうって！」"
translation = "「그 불쌍한 아이를 보는 듯한 여러분의 얼굴을 잊을 수 없어요……! 그래서 루리엘, 결심한 거예요! 어엿한 허풍쟁이가 되어서, 본때를 보여주겠다고!」"

[[dialogue]]
speaker = "ルリエル"
original = "「だから特訓に付き合ってくださいっ。ルリエル、今からウソつきさんになりますから、自然にウソをつけてるか確かめて欲しいんですよっ」"
translation = "「그러니까 특훈을 도와주세요. 루리엘, 지금부터 거짓말쟁이가 될 테니까, 자연스럽게 거짓말을 하고 있는지 확인해 주셨으면 해요」"

[[dialogue]]
speaker = "ルリエル"
original = "「まぁ、そー簡単には見抜けないと思いますけどね？\u3000人狼大会のあと、自然にウソをつけるようにいっぱい練習したので」"
translation = "「뭐, 그렇게 쉽게 간파하지는 못할 거라고 생각하지만요? 인랑 대회 이후로, 자연스럽게 거짓말을 할 수 있도록 잔뜩 연습했으니까」"

[[dialogue]]
speaker = "ルリエル"
original = "「今のわたしは言葉巧みに異性を弄ぶ小悪魔天使と言っても過言じゃありません！\u3000覚悟してくださいよぉ～？」"
translation = "「지금의 저는 말솜씨로 이성을 농락하는 소악마 천사라고 해도 과언이 아니에요! 각오하시라고요~?」"

[[dialogue]]
speaker = "unk"
original = "…………"
translation = "…………"

[[dialogue]]
speaker = "ルリエル"
original = "「あの時のみんなと同じ顔してますぅ！？\u3000まだ何一つウソはついていませんよっ！？」"
translation = "「그때의 모두와 똑같은 얼굴을 하고 있어요!? 아직 아무런 거짓말도 안 했다고요!?」"

[[dialogue]]
speaker = "ルリエル"
original = "「でもでも、そんな風に呆れていられるのも今のうちです！\u3000わたしを守護する１万人のＳＰが黙っちゃいません！」"
translation = "「그치만 그치만, 그렇게 어이없어하는 것도 지금뿐이에요! 저를 수호하는 1만 명의 SP가 가만히 있지 않을 거예요!」"

[[dialogue]]
speaker = "ルリエル"
original = "「今まで隠してましたけど、実はわたし、とある王家の生まれなんです。つまりお姫様なんですよぉ～！\u3000わたしをからかったが最期──」"
translation = "「지금까지 숨겨왔지만, 사실 저, 어느 왕가에서 태어났거든요. 즉 공주님인 거예요~! 저를 놀렸다간 끝장──」"

[[dialogue]]
speaker = "unk"
original = "はいダウトー"
translation = "응 다우트"

[[dialogue]]
speaker = "ルリエル"
original = "「ふぇっ！？\u3000どどど、どうしてわかったんですかぁ～！？\u3000この日のために寝る間も惜しんで練りに練ったウソでしたのに！？」"
translation = "「훼!? 어어어, 어떻게 알았나요~!? 이날을 위해 잠도 아껴가며 공들여 짠 거짓말이었는데!?」"

[[dialogue]]
speaker = "ルリエル"
original = "「うぅ、どうしましょう……。まずこのウソに騙されちゃう想定でプランを組んでいたので、特訓のしようがなくなっちゃいました……」"
translation = "「으으, 어떡하죠…… 우선 이 거짓말에 속아 넘어간다는 가정하에 플랜을 짰기 때문에, 특훈을 할 수가 없게 되어버렸어요……」"

[[dialogue]]
speaker = "ルリエル"
original = "「そうだ！\u3000何かわたしに質問してくれませんかっ？\u3000それにさらっとウソをついて返しますのでっ。ウソって、すらすら言ってなんぼですし！」"
translation = "「맞다! 저에게 뭔가 질문을 해주지 않을래요? 거기에 슥 하고 거짓말을 섞어 대답할 테니까요. 거짓말이란 건 술술 말하는 게 장땡이고요!」"

[[dialogue]]
speaker = "ルリエル"
original = "「……え？\u3000最近ハマってることは、ですか？\u3000えへへ、そんなの決まってますよぉ～。水泳と法螺貝の演奏ですぅ」"
translation = "「……네? 최근 빠져 있는 거요? 에헤헤, 그런 건 정해져 있죠~. 수영과 소라 고둥 연주인 거예요」"

[[dialogue]]
speaker = "ルリエル"
original = "「海の家でたこ焼きを食べてからは、たこ焼き作りにもハマってます。今日も手作りのたこ焼きを──」"
translation = "「바다의 집에서 타코야키를 먹고 나서는, 타코야키 만들기에도 빠져 있어요. 오늘도 수제 타코야키를──」"

[[dialogue]]
speaker = "ルリエル"
original = "「──って、ハっ！\u3000思わず本当のことを話してしまいました！\u3000え、ええと、最近はですね、絵画の鑑賞などをしょーしょー……」"
translation = "「──앗! 저도 모르게 사실을 말해버렸어요! 어, 에 그러니까, 최근에는요, 회화 감상 같은 걸 조금……」"

[[dialogue]]
speaker = "ルリエル"
original = "「あうぅ、そんな顔で見ないでくださいよぉ～！\u3000わたしに絵画鑑賞の趣味があってもいいじゃないですかぁ～……！」"
translation = "「아우우, 그런 눈으로 보지 말아주세요~! 저에게 회화 감상 취미가 있어도 되잖아요~……!」"

[[dialogue]]
speaker = "ルリエル"
original = "「というか質問が悪いです！\u3000最近ハマっていることなんてウソをつきづらいですもん！\u3000もっとウソをつきやすそうな、イエスかノーで答えられる質問にしてください！」"
translation = "「그보다 질문이 나빠요! 최근 빠져 있는 것 같은 건 거짓말을 하기 힘들단 말이에요! 좀 더 거짓말을 하기 쉬운, 예스나 노로 대답할 수 있는 질문으로 해주세요!」"

[[dialogue]]
speaker = "ルリエル"
original = "「え？\u3000学園の宿題は終わらせたか、ですか？\u3000ふふん、もちろんイエスですよぉ～！\u3000わたし、遊びに行く前にぜーんぶ終わらせておくタイプですから！」"
translation = "「네? 학원 숙제는 끝냈냐고요? 후훈, 물론 예스인 거예요~! 저, 놀러 가기 전에 저언부 끝내두는 타입이니까요!」"

[[dialogue]]
speaker = "unk"
original = "じゃあ教えなくても大丈夫だな"
translation = "그럼 가르쳐주지 않아도 괜찮겠네"

[[dialogue]]
speaker = "ルリエル"
original = "「へ……？\u3000ちょっ、待ってくださいっ、ウソです、法螺です！\u3000まだ手も付けてませ～んっ！」"
translation = "「헤……? 자, 잠깐 기다려주세요, 거짓말이에요, 허풍이에요! 아직 손도 안 댔어요~!」"

[[dialogue]]
speaker = "ルリエル"
original = "「む～！\u3000質問が意地悪です！\u3000わたしが不利になる質問はしないでください！\u3000もっと気分良くウソをつかせてくださいってばぁ～！」"
translation = "「무~! 질문이 심술궂어요! 제가 불리해지는 질문은 하지 마세요! 좀 더 기분 좋게 거짓말을 하게 해달라고요~!」"

[[dialogue]]
speaker = "ルリエル"
original = "「たとえば……そうですね。じゃあ左右限定のあっち向いてほいをしましょう！\u3000わたしの巧みなウソで会長さんを騙してみせます！」"
translation = "「예를 들어…… 그렇네요. 그럼 좌우 한정 참참참을 해요! 저의 교묘한 거짓말로 회장님을 속여 보이겠어요!」"

[[dialogue]]
speaker = "ルリエル"
original = "「ふっふ～、絶対に右だけは向いちゃダメですよ～？\u3000わたし、右を指しますから。ホ、ホントですってば。ここまで言って左なんか指しませんっ！」"
translation = "「훗후~, 절대로 오른쪽만은 보면 안 돼요~? 저, 오른쪽을 가리킬 거니까요. 저, 정말이라니까요. 여기까지 말하고 왼쪽 같은 건 안 가리켜요!」"

[[dialogue]]
speaker = "ルリエル"
original = "「くれぐれも右だけは向いちゃダメですからねっ？\u3000それじゃ行きますよ～？\u3000あっち向いて～、ほいっ！」"
translation = "「부디 오른쪽만은 보면 안 되니까요? 그럼 갑니다~? 참참~, 참!」"

[[dialogue]]
speaker = "ルリエル"
original = "「あははっ、やりました！\u3000見事に騙されちゃいましたねっ！\u3000左でドボンですっ！」"
translation = "「아하하, 해냈어요! 훌륭하게 속아 넘어가 버렸네요! 왼쪽으로 꽝이에요!」"

[[dialogue]]
speaker = "unk"
original = "うわー、すっかり騙されちゃったよー"
translation = "우와─, 완전히 속아 넘어가 버렸네─"

[[dialogue]]
speaker = "ルリエル"
original = "「えへへ、でしょうでしょう！\u3000やっぱりわたし、ウソつきの才能があります！\u3000もはや会長さんはわたしの手の平の上です！」"
translation = "「에헤헤, 그렇죠 그렇죠! 역시 저, 거짓말쟁이 소질이 있어요! 이제 회장님은 제 손바닥 안이에요!」"

[[dialogue]]
speaker = "ルリエル"
original = "「そうだ、何かわたしに相談事とかありませんかっ？\u3000さらっと自然にウソをついて、会長さんをもーっと弄んであげちゃいますから！」"
translation = "「맞다, 저에게 뭔가 상담할 거 없나요? 슥 하고 자연스럽게 거짓말을 해서, 회장님을 좀 더 농락해 줄 테니까요!」"

[[dialogue]]
speaker = "ルリエル"
original = "「ふむふむ。新しい服を買おうと思っている、ですか。これとこれ、どっちが会長さんに似合うか選んで欲しいわけですねっ？」"
translation = "「흠흠. 새 옷을 사려고 한다, 인가요. 이것과 이것, 어느 쪽이 회장님에게 어울릴지 골라줬으면 하는 거군요?」"

[[dialogue]]
speaker = "ルリエル"
original = "「でしたら、むふふ、断然こっちですよこっち！\u3000このすごーくおダサな服の方です！」"
translation = "「그렇다면, 무후후, 단연 이쪽이에요 이쪽! 이 어어엄청 촌스러운 옷 쪽이에요!」"

[[dialogue]]
speaker = "ルリエル"
original = "「えへへ、ウソですっ、こっちですっ！\u3000んもー危ないですよぉ？\u3000店員さんとかに勧められるがまま、似合わない服とか買わないでくださいね～？」"
translation = "「에헤헤, 거짓말이에요, 이쪽이에요! 정말 위험하다고요? 점원 같은 사람이 권하는 대로, 어울리지 않는 옷 같은 거 사지 마세요~?」"

[[dialogue]]
speaker = "ルリエル"
original = "「でもでも、ウソつくのって楽しいですね？\u3000特にネタばらしの瞬間が快感ですぅ！」"
translation = "「그치만 그치만, 거짓말하는 거 즐겁네요? 특히 네타바레의 순간이 쾌감인 거예요!」"

[[dialogue]]
speaker = "ルリエル"
original = "「他に何かありませんかっ？\u3000この機に何かルリエルに尋ねたいこととかっ？」"
translation = "「다른 건 없나요? 이 기회에 뭔가 루리엘에게 묻고 싶은 거라든가?」"

[[dialogue]]
speaker = "unk"
original = "じゃあ……俺のこと好き？"
translation = "그럼…… 나 좋아해?"

[[dialogue]]
speaker = "ルリエル"
original = "「ふぇっ！？\u3000え、ええと、それはその……き、嫌いですぅ……」"
translation = "「훼!? 어, 에 그러니까, 그건 그…… 시, 싫어해요……」"

[[dialogue]]
speaker = "ルリエル"
original = "「ああっ！？\u3000ウソですよ、ウソっ！\u3000そんなに悲しそうな顔しないでくださいっ！」"
translation = "「아앗!? 거짓말이에요, 거짓말! 그렇게 슬픈 표정 짓지 말아주세요!」"

[[dialogue]]
speaker = "ルリエル"
original = "「えっ……？\u3000会長さんを格好良いと思うか、ですか？\u3000ぜ、全然格好良くないですっ」"
translation = "「엣……? 회장님을 멋있다고 생각하냐고요? 저, 전혀 안 멋있어요」"

[[dialogue]]
speaker = "ルリエル"
original = "「ああっ！？\u3000ですからウソですよ、ウソぉ！\u3000世界で一番格好良いと思ってますっ！\u3000自慢の彼氏さんなんですからぁ……！」"
translation = "「아앗!? 그러니까 거짓말이에요, 거짓말~! 세상에서 제일 멋있다고 생각해요! 자랑스러운 남자친구님이니까요……!」"

[[dialogue]]
speaker = "ルリエル"
original = "「前言撤回、ウソって気分悪いですぅ……。そもそも天使がウソなんか付いちゃダメですよね。一人前の法螺吹きを目指すの、やっぱりやめます」"
translation = "「방금 한 말 취소, 거짓말은 기분 나빠요……. 애초에 천사가 거짓말 같은 걸 하면 안 되는 거죠. 어엿한 허풍쟁이를 목표로 하는 거, 역시 그만둘래요」"

[[dialogue]]
speaker = "ルリエル"
original = "「ウソを言い合うより、本音を言い合って過ごしたいですもん。大好きって言った時に信じてもらえなかったら嫌ですから」"
translation = "「거짓말을 주고받는 것보다, 본심을 주고받으며 지내고 싶으니까요. 사랑한다고 말했을 때 믿어주지 않으면 싫으니까요」"

[[dialogue]]
speaker = "ルリエル"
original = "「ね、会長さん。わたしのこと……好きですか？」"
translation = "「저기, 회장님. 저…… 좋아하세요?」"

[[dialogue]]
speaker = "unk"
original = "もちろん大好きだよ"
translation = "물론 너무 좋아해"

[[dialogue]]
speaker = "ルリエル"
original = "「えへへっ、ルリエルもだいだいだーい好きですっ～！\u3000世界で一番、いいえっ、宇宙で一番だーい好きなのですぅっ～」"
translation = "「에헤헷, 루리엘도 너무너무너무 좋아해요~! 세상에서 제일, 아니요, 우주에서 제일 너무너무 좋아하는 거예요~」"

[[dialogue]]
speaker = "ルリエル"
original = "「これはぜったいぜ～ったい、ウソじゃない、ですよ？」"
translation = "「이건 절대 저어얼대, 거짓말이 아니, 에요?」"

