[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ハーイ、お集まりの皆サマ～！\u3000いよいよリゾート結界のビッグイベント──水着コンテストを開催シマ～ス！」"
translation = "「하─이, 모여주신 여러분~! 드디어 리조트 결계의 빅 이벤트── 수영복 콘테스트를 개최하겠습니─다!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ついに来たわね、この日が……」"
translation = "「드디어 왔구나, 이 날이……」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ビーチの平和を守るため、悪しき大人には負けません！\u3000頼みましたよ、姉さん！」"
translation = "「비치의 평화를 지키기 위해, 사악한 어른에게는 지지 않겠어요! 부탁해요, 언니!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あらあら。でも……ふふ、ソフィに頼られるのは悪くないわね～♪」"
translation = "「어머어머. 하지만…… 후후, 소피가 의지해주는 건 나쁘지 않네~♪」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「それではプリティーガールの皆サーン、はりきってご登場クダサーイ！\u3000飛び入り参加も大歓迎デース！」"
translation = "「그러면 프리티 걸 여러분─, 기운차게 등장해주세─요! 즉석 참가도 대환영입니─다!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「えーっと……１番マトイ。あんまりこういう目立つ場は慣れてないんだけど……」"
translation = "「에─또…… 1번 마토이. 별로 이런 눈에 띄는 자리는 익숙지 않지만……」"

[[dialogue]]
speaker_original = "観覧の女の子Ａ"
speaker_translation = "관람하는 여자아이 A"
original = "「へえ……可愛いじゃん！\u3000星徒会の子だっけ？」"
translation = "「헤에…… 귀엽잖아! 성도회 애였나?」"

[[dialogue]]
speaker_original = "観覧の女の子Ｂ"
speaker_translation = "관람하는 여자아이 B"
original = "「そうね。等身大の魅力っていうか、私と同じくらいのスタイルだし……水着選びの参考になるかも」"
translation = "「그러게. 있는 그대로의 매력이라 할까, 나랑 비슷한 스타일이고…… 수영복 고를 때 참고가 될지도.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「アポロだ！\u3000あたしに投票、よろしくな！」"
translation = "「아폴로다! 나한테 투표, 잘 부탁한다구!」"

[[dialogue]]
speaker_original = "観覧の女の子Ａ"
speaker_translation = "관람하는 여자아이 A"
original = "「あのちっちゃい子も可愛い！」"
translation = "「저 조그만 애도 귀여워!」"

[[dialogue]]
speaker_original = "観覧の女の子Ｂ"
speaker_translation = "관람하는 여자아이 B"
original = "「ええ。母性本能がくすぐられるわね──」"
translation = "「응. 모성본능이 자극되는걸──」"

[[dialogue]]
speaker = "unk"
original = "コンテストはそのままつつがなく進行してゆき……"
translation = "콘테스트는 그대로 차질 없이 진행되어 가고……"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「エントリーナンバー８番、九浄ヘレナ。特技は──ふむ。お花、とでもしておくか」"
translation = "「엔트리 넘버 8번, 쿠죠 헬레나. 특기는── 흠. 꽃, 이라고 해둘까.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ちょっと──ヘレナちゃんが出場してるじゃない！？」"
translation = "「잠깐── 헬레나짱이 출전하고 있잖아!?」"

[[dialogue]]
speaker = "unk"
original = "出ないって言ってたのに"
translation = "안 나간다고 했으면서"

[[dialogue]]
speaker = "unk"
original = "どうして"
translation = "어째서"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「気が変わった」"
translation = "「마음이 바뀌었다.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「先ほど、裏で魔王と会ってな。私の水着も魅力的だと褒めるものだから……ふふふ。つい、な？」"
translation = "「방금 전, 뒤에서 마왕과 만나서 말이다. 나의 수영복도 매력적이라고 칭찬하기에…… 후후후. 그만, 말이지?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「会長さん……」"
translation = "「회장님……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「誰でも彼でも褒めすぎです」"
translation = "「누구에게나 너무 칭찬을 남발합니다.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ふふふ……見惚れるなら見惚れてもよいぞ？」"
translation = "「후후후…… 넋을 잃고 봐도 좋단다?」"

[[dialogue]]
speaker = "unk"
original = "仲間たちから刺々しい視線を浴びながらも──"
translation = "동료들로부터 가시 돋친 시선을 받으면서도──"

[[dialogue]]
speaker = "unk"
original = "参加者たちが次々とステージへ上がり、その度に歓声が起こっていた。"
translation = "참가자들이 차례차례 스테이지로 올라갔고, 그때마다 환성이 터져 나오고 있었다. ──"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「おーっと、もう次が最後の参加者デース！\u3000ドウゾ～！」"
translation = "「오─옷, 이제 다음이 마지막 참가자입니─다! 들어오세─요!」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「えっと……フフ……エントリーナンバー１２番、トリシャ。占いが……得意……寒いの……平気……」"
translation = "「에또…… 후후…… 엔트리 넘버 12번, 트리샤. 점이…… 특기…… 추운 건…… 괜찮아……」"

[[dialogue]]
speaker_original = "観覧の女の子Ａ"
speaker_translation = "관람하는 여자아이 A"
original = "「な、何あの凶悪なスタイル……！」"
translation = "「뭐, 뭐야 저 흉악한 스타일은……!」"

[[dialogue]]
speaker_original = "観覧の女の子Ｂ"
speaker_translation = "관람하는 여자아이 B"
original = "「いかにも男好きのする──それでいて無駄のないプロポーション──それが、あの大胆かつ洗練された水着のデザインにマッチしている……！」"
translation = "「그야말로 남자가 좋아할 만한── 그러면서도 군더더기 없는 프로포션── 그것이, 저 대담하면서도 세련된 수영복 디자인과 매치되고 있어……!」"

[[dialogue]]
speaker_original = "観覧の女の子Ａ"
speaker_translation = "관람하는 여자아이 A"
original = "「なんか、わたし憧れちゃうかも……」"
translation = "「왠지 나 동경하게 될지도……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「場の空気を掌握されてしまいました……」"
translation = "「현장의 분위기를 장악당해 버렸군요……」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「フッフッフ……計算通り！\u3000トリシャを想定してデザインした水着だ──そこらのモデルでも太刀打ちできぬよ」"
translation = "「훗훗훗…… 계산대로! 트리샤를 상정해서 디자인한 수영복이다── 웬만한 모델이라도 대항할 수 없지.」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「優勝者コメントでは、我がブランドを大いに立ててもらおう！」"
translation = "「우승자 코멘트에서는 우리 브랜드를 한껏 띄워달라고 해야겠군!」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「にへへ……こんなに注目されるのは初めて……恥ずかしいけど、新鮮で嬉しい……」"
translation = "「헤헤…… 이렇게 주목받는 건 처음…… 부끄럽지만, 신선해서 기뻐……」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ハーイ、それでは審査の時間に参りマース。ステージから降りてくだサーイ！」"
translation = "「하─이, 그러면 심사 시간에 들어가겠습니─다. 스테이지에서 내려와 주세─요!」"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「はい──あっ」"
translation = "「네── 앗」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「！」"
translation = "「!」"

[[dialogue]]
speaker = "unk"
original = "──危ない！"
translation = "── 위험해!"

[[dialogue]]
speaker = "unk"
original = "つまずいた！"
translation = "발을 헛디뎠어!"

[[dialogue]]
speaker = "unk"
original = "ステージを降りようとして、トリシャがつまずいた──"
translation = "스테이지를 내려오려다 트리샤가 발을 헛디뎠다──"

[[dialogue]]
speaker = "unk"
original = "気づけば１人でに体が動き出し、よろめく彼女の体を受け止めにいっていた。"
translation = "정신을 차려보니 어느샌가 몸이 움직여, 비틀거리는 그녀의 몸을 받치러 가고 있었다. ──"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「あ……会長さん……」"
translation = "「아…… 회장님……」"

[[dialogue]]
speaker = "unk"
original = "怪我はないか？"
translation = "다치지는 않았어?"

[[dialogue]]
speaker = "unk"
original = "大丈夫か？"
translation = "괜찮아?"

[[dialogue]]
speaker_original = "トリシャ"
speaker_translation = "트리샤"
original = "「ぁっ……はい……大丈夫……です。ただ、その……近い……というか……いえ、これも悪くはないのですが……」"
translation = "「핫…… 네…… 괜찮……아요. 다만, 그…… 가깝……다고 할까…… 아니요, 이것도 나쁘지는 않습니다만……」"

[[dialogue]]
speaker_original = "観覧の女の子Ａ"
speaker_translation = "관람하는 여자아이 A"
original = "「きゃああっ……なに今のシチュエーション！」"
translation = "「꺄아악…… 뭐야 방금 그 시츄에이션!」"

[[dialogue]]
speaker_original = "観覧の女の子Ｂ"
speaker_translation = "관람하는 여자아이 B"
original = "「今のも演出──いえ、本当のアクシデント……？\u3000なら……このキュンッてする気持ちは……！？」"
translation = "「방금 그것도 연출── 아니, 진짜 사고……? 그렇다면…… 이 두근거리는 마음은……!?」"

[[dialogue]]
speaker_original = "観覧の女の子Ａ"
speaker_translation = "관람하는 여자아이 A"
original = "「うんうん、お姫様みたいだった──」"
translation = "「응응, 공주님 같았어──」"

[[dialogue]]
speaker = "unk"
original = "トリシャをお姫様抱っこすることになってしまったことで──余計に注目を浴びてしまっていた。"
translation = "트리샤를 공주님 안기로 안게 되어버린 탓에── 더욱더 주목을 받게 되었다. ──"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……ダメ押しですね」"
translation = "「……쐐기를 박았군요.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「あんなヒロインムーブをされたんじゃ、お手上げです……」"
translation = "「저런 히로인 무브를 해버리면, 두 손 두 발 다 들 수밖에 없어요……」"

[[dialogue]]
speaker = "unk"
original = "どういうことだ？"
translation = "무슨 소리야?"

[[dialogue]]
speaker = "unk"
original = "？"
translation = "?"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「はあ……あなたのナイスアシストってこと」"
translation = "「하아…… 당신이 나이스 어시스트를 했다는 뜻이야.」"

[[dialogue]]
speaker = "unk"
original = "果たして、結果はどうなる──"
translation = "과연, 결과는 어떻게 될 것인가──"

