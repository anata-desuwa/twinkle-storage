[[dialogue]]
speaker = "unk"
original = "第８話,物憂げミッション,B"
translation = "제8화, 침울한 미션, B"

[[dialogue]]
speaker = "クロト"
original = "「ヴィーナスがため息？」"
translation = "「비너스가 한숨?」"

[[dialogue]]
speaker = "みんな"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "クロト"
original = "「別にため息くらいつくだろう。俺も、ピザ屋でバイトしてた頃、台風なのに注文が舞い込んだ日なんかは……」"
translation = "「별로 한숨 정도는 쉬겠지. 나도, 피자 가게에서 알바했을 때, 태풍인데 주문이 쏟아진 날 같은 때는……」"

[[dialogue]]
speaker = "マトイ"
original = "「そうじゃなくて～。もっと深刻な感じのやつだから！」"
translation = "「그게 아니라~. 좀 더 심각한 느낌의 것이니까!」"

[[dialogue]]
speaker = "サーシャ"
original = "「ヴィーナスちゃんが弱気になることなんて、今まで全然なかったのにねぇ」"
translation = "「비너스짱이 약해지는 일 같은 건, 지금까지 전혀 없었는데 말이야」"

[[dialogue]]
speaker = "アナ"
original = "「あの『日誌』が──良くも悪くも心の支えになっていたものかと思われます。その上、仮面の少女との一件が尾を引いているものかと」"
translation = "「저 『일지』가── 좋든 나쁘든 마음의 버팀목이 되었던 것이라고 생각됩니다. 게다가, 가면의 소녀와의 사건이 여파를 남기고 있는 것이라고」"

[[dialogue]]
speaker = "unk"
original = "ここ数日、弱るヴィーナスの姿は何度も見ていた。"
translation = "최근 며칠, 약해진 비너스의 모습은 몇 번이고 보았다."

[[dialogue]]
speaker = "unk"
original = "助けなくちゃいけない相手がいるのに進むべき道がわからない。その焦りは、俺にも理解できるものだった。"
translation = "도와줘야 할 상대가 있는데 나아가야 할 길을 모르겠다. 그 초조함은, 나도 이해할 수 있는 것이었다."

[[dialogue]]
speaker = "サーシャ"
original = "「会長くんはここ最近、図書館によく通ってるわね……？」"
translation = "「회장군은 최근, 도서관에 자주 다니네……?」"

[[dialogue]]
speaker = "クロト"
original = "「ええ──何か、現状を打開するヒントが得られないかと」"
translation = "「네── 뭔가, 현 상황을 타개할 힌트를 얻을 수 없을까 해서요」"

[[dialogue]]
speaker = "unk"
original = "俺もヴィーナスも──そしてみんなも気持ちは同じだ。"
translation = "나도 비너스도── 그리고 모두도 마음은 같다."

[[dialogue]]
speaker = "unk"
original = "『アポロ』の真相を突き止めて、フィオナのお姉さんを解放してやる必要がある。"
translation = "『아폴로』의 진상을 밝혀내서, 피오나의 언니를 해방시켜 줄 필요가 있다."

[[dialogue]]
speaker = "unk"
original = "取り返しのつかない事態となってしまう前に……。"
translation = "되돌릴 수 없는 사태가 되어 버리기 전에…….」"

[[dialogue]]
speaker = "クロト"
original = "「けど……成果は芳しくありません。ヴィーナスが沈み込む気持ちもわからないではないです」"
translation = "「하지만…… 성과는 좋지 않습니다. 비너스가 침울해하는 마음도 모르는 것은 아닙니다」"

[[dialogue]]
speaker = "サーシャ"
original = "「かもしれないわ。私たちも、どうすればいいか途方に暮れてる」"
translation = "「그럴지도. 우리도, 어떻게 해야 할지 망연자실하고 있어」"

[[dialogue]]
speaker = "サーシャ"
original = "「でもね会長くん。今は有事でもないのに、私たちのツートップが意気消沈していたら、学園のみんなはどう思うかしら」"
translation = "「하지만 말이야 회장군. 지금은 유사시도 아닌데, 우리의 투톱이 의기소침해 있다면, 학원 모두는 어떻게 생각할까」"

[[dialogue]]
speaker = "クロト"
original = "「む──確かに。みんなの士気に関わりますね」"
translation = "「음── 확실히. 모두의 사기에 관계되겠군요」"

[[dialogue]]
speaker = "マトイ"
original = "「そうそう。ヴィーナスがあの調子だと、なんかこっちまで滅入るっていうか」"
translation = "「맞아 맞아. 비너스가 저 상태면, 왠지 이쪽까지 풀이 죽는다고 할까」"

[[dialogue]]
speaker = "アナ"
original = "「ここ数日は──アステラの出現もなく安定しています。もちろん仮面の少女も見つかっておりません」"
translation = "「최근 며칠은── 아스테라의 출현도 없이 안정되어 있습니다. 물론 가면의 소녀도 발견되지 않았습니다」"

[[dialogue]]
speaker = "アナ"
original = "「よって、今のうちに英気を養っておくのも必要なのではないかと」"
translation = "「따라서, 지금이라도 원기를 회복해 두는 것도 필요하지 않을까 합니다」"

[[dialogue]]
speaker = "サーシャ"
original = "「そう。なので会長くんに命令です。ヴィーナスちゃんを元気づけてあげること♪」"
translation = "「맞아. 그러니 회장군에게 명령이야. 비너스짱을 기운 나게 해 주는 것♪」"

[[dialogue]]
speaker = "クロト"
original = "「元気づける──ヴィーナスを、ですか」"
translation = "「기운 나게 해 준다── 비너스를, 말입니까」"

[[dialogue]]
speaker = "unk"
original = "考えたこともない行為だった。"
translation = "생각해 본 적도 없는 행위였다."

[[dialogue]]
speaker = "unk"
original = "なぜなら頭に浮かぶ限り、ヴィーナスは常に元気な存在だったからだ。"
translation = "왜냐하면 머리에 떠오르는 한, 비너스는 항상 활기찬 존재였기 때문이다."

[[dialogue]]
speaker = "クロト"
original = "「じゃあ、今度のパトロールにでも誘ってみましょうか」"
translation = "「그럼, 이번 순찰이라도 같이 가자고 해 볼까요」"

[[dialogue]]
speaker = "サーシャ"
original = "「それじゃお仕事になっちゃうわねえ。もっとリラックスできる時間が要ると思うのよ」"
translation = "「그럼 일이 되어 버리네. 좀 더 긴장 풀 수 있는 시간이 필요할 거라고 생각해」"

[[dialogue]]
speaker = "クロト"
original = "「リラックスですか」"
translation = "「긴장 완화 말입니까」"

[[dialogue]]
speaker = "マトイ"
original = "「えっと……ほら、あるじゃない？\u3000女の子を誘って、外に出かけたり、一緒においしいもの食べたり」"
translation = "「음…… 있잖아? 여자아이를 꼬셔서, 밖에 나가거나, 같이 맛있는 거 먹거나」"

[[dialogue]]
speaker = "サーシャ"
original = "「頭にデがつくやつね♪」"
translation = "「머리에 데가 붙는 그거네♪」"

[[dialogue]]
speaker = "アナ"
original = "「ついでに現会長も羽を伸ばせると、なおよいです」"
translation = "「덤으로 현 회장도 긴장을 풀 수 있다면, 더욱 좋습니다」"

[[dialogue]]
speaker = "クロト"
original = "「む……なるほど。確かにそう言われてみると、ヴィーナスと遊んだことはなかったな」"
translation = "「음…… 과연. 확실히 그렇게 말하고 보니, 비너스와 논 적은 없었네」"

[[dialogue]]
speaker = "マトイ"
original = "「遊ぶっていうか、まあ……」"
translation = "「논다기보다는, 뭐……」"

[[dialogue]]
speaker = "unk"
original = "マトイはなぜか俺から目を逸らしていた。"
translation = "마토이는 왠지 모르게 나에게서 시선을 피하고 있었다."

[[dialogue]]
speaker = "unk"
original = "どこか頬が染まっているようにも見えるが、理由はよくわからない。"
translation = "어딘가 뺨이 물들어 있는 것처럼도 보이지만, 이유는 잘 모르겠다."

[[dialogue]]
speaker = "クロト"
original = "「要するに──ヴィーナスを遊びに誘えばいいんだな？」"
translation = "「요컨대── 비너스를 놀러 가자고 하면 되는 거네?」"

[[dialogue]]
speaker = "アナ"
original = "「…………まあ、それでいいです」"
translation = "「…………뭐, 그걸로 됐습니다」"

[[dialogue]]
speaker = "unk"
original = "──そういうわけで、俺はみんなからヴィーナスを元気づける役目を仰せつかった。"
translation = "── 그런 연유로, 나는 모두에게서 비너스를 기운 나게 해 줄 역할을 분부 받았다."

[[dialogue]]
speaker = "unk"
original = "今の俺は星徒会長で──今のヴィーナスはその役員なのだ。"
translation = "지금의 나는 성도 회장이고── 지금의 비너스는 그 임원인 것이다."

[[dialogue]]
speaker = "unk"
original = "そう考えると、会長として果たすべき責務のようにも思えてきた。"
translation = "그렇게 생각하니, 회장으로서 완수해야 할 책무처럼도 느껴졌다."

