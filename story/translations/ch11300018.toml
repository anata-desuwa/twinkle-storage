[[dialogue]]
speaker = "unk"
original = "それは、ミヤハルと恋人関係になってから、少し経ったある日のこと。"
translation = "그것은, 미야하루와 연인 관계가 되고 나서 조금 지난 어느 날의 일."

[[dialogue]]
speaker = "unk"
original = "マトイやルリエルと巫女の力の鍛錬をするとのことで、俺は見学にやって来ていた。"
translation = "마토이나 루리엘과 무녀의 힘을 단련한다고 해서, 나는 구경하러 와 있었다."

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「会長はん、こっちや、こっち<emoji=heart04>」"
translation = "「회장님, 이쪽이야, 이쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その途中で、俺はミヤハルから神社の裏の方に呼び出されて、向かったのだが――"
translation = "그 도중에, 나는 미야하루로부터 신사 뒷마당 쪽으로 호출되어 향했는데――"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「ふふふっ<emoji=heart04>\u3000え～い<emoji=heart04>」"
translation = "「후후후<emoji=heart04> 에잇<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「おわぁっ！？」"
translation = "「으왓!?」"

[[dialogue]]
speaker = "unk"
original = "裏庭のど真ん中で突然、彼女に押し倒されてしまった。"
translation = "뒷마당 한복판에서 갑자기, 그녀에게 눌려 넘어져 버렸다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ミヤハル、いきなりどうしたんだ……！？」"
translation = "「미야하루, 갑자기 왜 그래……!?」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「うち、実はずっと──青姦ってやつ、してみたいなって思っててん～<emoji=heart04>」"
translation = "「나, 사실은 줄곧── 야외 섹스라는 거, 해보고 싶다고 생각했거든~<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ここで！？\u3000ルリエルとマトイが居るんだから、さすがにマズいって！」"
translation = "「여기서!? 루리엘이랑 마토이가 있으니까, 역시 그건 곤란해!」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「大丈夫、大丈夫<emoji=heart04>\u3000２人にはちょ～っと会長はんを借りるって、もう伝えてあるんよ<emoji=heart04>」"
translation = "「괜찮아, 괜찮아<emoji=heart04> 두 사람에게는 자~암깐 회장님을 빌려가겠다고, 이미 말해뒀는걸<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「もちろん『大事な用事をしてるから、絶対にこっち来たらアカンで』ってことも言ってあるから<emoji=heart04>\u3000な？」"
translation = "「물론 『중요한 용무를 보고 있으니까, 절대로 이쪽으로 오면 안 된대이』라고도 말해뒀으니까<emoji=heart04> 그치?」"

[[dialogue]]
speaker = "unk"
original = "ミヤハルは俺の耳元に唇を寄せると、艶やかに囁く。"
translation = "미야하루는 내 귓가에 입술을 갖다 대더니, 요염하게 속삭인다."

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「会長はん、うちと初めての青姦露出えっち、しまひょ<emoji=heart04>」"
translation = "「회장님, 나랑 첫 야외 노출 섹스, 해보입시다<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そうして、ミヤハルに問答無用でズボンをむかれてしまい――"
translation = "그렇게 해서, 미야하루에게 문답무용으로 바지가 벗겨져 버리고――"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「ふうぅ<emoji=heart04>\u3000んふっ……<emoji=heart04>\u3000会長はんのおち○ぽ様、御開帳やぁ<emoji=heart04>」"
translation = "「후우우<emoji=heart04> 응훗……<emoji=heart04> 회장님의 자지님, 어전개방이네<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "白昼の空の下で、俺はペニスを晒すことになってしまった。"
translation = "대낮의 하늘 아래서, 나는 페니스를 노출하게 되어 버렸다."

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「はあぁ<emoji=heart04>\u3000相変わらず、一目見ただけでおま○こキュンってなってまう逞しさやわぁ<emoji=heart04>」"
translation = "「하아아<emoji=heart04> 여전히, 한눈에 보는 것만으로 보지가 큥 하고 울려버리는 늠름함이네<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「ほら、おかげですぐに愛液溢れてきてもうて……<emoji=heart04>\u3000もうこんなに濡れとるんよ？」"
translation = "「봐봐, 덕분에 벌써 애액이 넘쳐흘러 나와서……<emoji=heart04> 벌써 이렇게나 젖어있데이?」"

[[dialogue]]
speaker = "unk"
original = "そう言いながら、ミヤハルはおま○こをペニスに擦り付けて来る。"
translation = "그렇게 말하면서, 미야하루는 보지를 페니스에 문질러 온다."

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「あっ……<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふうぅ……あんっ<emoji=heart04>\u3000ふふっ<emoji=heart04>\u3000おち○ぽ様、なんだかんだすぐ大きく固くなってくれるん、素敵やわぁ<emoji=heart04>\u3000はあぁっ……んんっ<emoji=heart04>」"
translation = "「앗……<emoji=heart04> 응<emoji=heart04> 후우…… 안<emoji=heart04> 후훗<emoji=heart04> 자지님, 이러니저러니 해도 금방 크고 딱딱해져 주는 거, 멋지네<emoji=heart04> 하아앗…… 응응<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それは、ミヤハルが魅力的すぎるから……」"
translation = "「그건, 미야하루가 너무 매력적이라서……」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「んっ<emoji=heart04>\u3000ドスケベな女でごめんやす<emoji=heart04>\u3000うち、会長はん見ると、おち○ぽ様の快楽を思い出してもうて、すぐに発情してまうんよ<emoji=heart04>」"
translation = "「응<emoji=heart04> 도스케베한 여자라 미안합니데이<emoji=heart04> 나, 회장님을 보면 자지님의 쾌락을 떠올려버려서, 금방 발정해버리거든<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「この熱くて固いおち○ぽ様で、うちのこと、また屈服させて欲しいって<emoji=heart04>\u3000んっ<emoji=heart04>\u3000はあぁぁっ<emoji=heart04>」"
translation = "「이 뜨겁고 딱딱한 자지님으로, 나를, 또 굴복시켜 주길 바란다꼬<emoji=heart04> 응<emoji=heart04> 하아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「うちのおま○こ、もうぐしょぐしょに濡れとるし、ええよね？\u3000我慢出来へんから挿れてまうよ？\u3000んんっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>」"
translation = "「내 보지, 벌써 축축하게 젖어있고, 괜찮제? 참을 수 없으니까 삽입해버릴게? 응응<emoji=heart04> 후우웃<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「あぁああぁっ<emoji=heart04>\u3000おち○ぽ様、どうかうちにお情けをおくれやす<emoji=heart04>」"
translation = "「아아아앗<emoji=heart04> 자지님, 부디 나에게 자비를 베풀어주입소<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ミヤハルはペニスの亀頭を膣穴にあてがうと、ぐっと腰を落として――"
translation = "미야하루는 페니스의 귀두를 질 구멍에 갖다 대더니, 훅 허리를 내리고――"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「あっ――<emoji=heart04><emoji=heart04>」"
translation = "「앗――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「はああああああぁ～～～っ<emoji=heart04><emoji=heart04>\u3000おち○ぽ様、中に入って来たあああぁ～～～んっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「하아아아아아아아~~앗<emoji=heart04><emoji=heart04> 자지님, 안에 들어왔다아아아~~앙<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そのまま、ミヤハルは嬉しくて堪らないという貪欲な動きで、腰を振り始める。"
translation = "그대로, 미야하루는 기뻐서 어쩔 줄 모르겠다는 탐욕스러운 움직임으로, 허리를 흔들기 시작한다."

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んああぁっ<emoji=heart04>\u3000んんぅっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 안<emoji=heart04> 하아앗<emoji=heart04> 응아앗<emoji=heart04> 응응으<emoji=heart04> 후우웃<emoji=heart04> 앗<emoji=heart04> 응아앗<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「はああぁ～っ<emoji=heart04>\u3000これぇ<emoji=heart04>\u3000これが欲しかったんよぉっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000気持ちいいっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000おま○こ気持ちいいっ<emoji=heart04>」"
translation = "「하아아~앗<emoji=heart04> 이거<emoji=heart04> 이걸 원했다꼬오<emoji=heart04> 앗<emoji=heart04> 안<emoji=heart04> 기분 좋아<emoji=heart04> 앗<emoji=heart04> 후아앗<emoji=heart04> 보지 기분 좋아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「あっ<emoji=heart04>\u3000あんんっ<emoji=heart04>\u3000最高ぉ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>\u3000セックス堪らへんのぉ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 응응앗<emoji=heart04> 최고야<emoji=heart04> 앗<emoji=heart04> 응으으<emoji=heart04> 후아아앗<emoji=heart04> 섹스 참을 수가 없네<emoji=heart04> 앗<emoji=heart04> 안<emoji=heart04> 하앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「ああもう<emoji=heart04>\u3000なんでぇ<emoji=heart04>\u3000なんでこんなに気持ちええのぉっ？\u3000あっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000あんっ<emoji=heart04>」"
translation = "「아아 정말<emoji=heart04> 왜에<emoji=heart04> 왜 이렇게나 기분 좋은 거야? 앗<emoji=heart04> 하아앗<emoji=heart04> 응아앗<emoji=heart04> 안<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「うち、もうおち○ぽ様なしじゃ生きられへんよぉ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000気持ちいいっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「나, 이제 자지님 없이는 못 살아아<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 응으으<emoji=heart04> 응아앗<emoji=heart04> 기분 좋아<emoji=heart04> 앗<emoji=heart04> 안<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「昨日は会長はん、忙しくて出来んくてぇっ<emoji=heart04>\u3000自分の指で慰めとっても、全然物足りんくてぇっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000だからぁ<emoji=heart04>」"
translation = "「어제는 회장님, 바빠서 못 해서어<emoji=heart04> 자기 손가락으로 달래 봐도, 전혀 모자라서어<emoji=heart04> 앗<emoji=heart04> 하아앗<emoji=heart04> 응으으<emoji=heart04> 그러니까아<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「こんなに大きくて立派なおち○ぽ様に気持ち良くしてもろうてっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000うち、すっごく幸せぇっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「이렇게나 크고 훌륭한 자지님으로 기분 좋게 해줘서어<emoji=heart04> 앗<emoji=heart04> 후아앗<emoji=heart04> 나, 너무 행복해애<emoji=heart04> 앗<emoji=heart04> 안<emoji=heart04> 하아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ミヤハル、ちょっと声抑えて……！\u3000マトイとルリエルに聞こえちゃうから！」"
translation = "「미야하루, 소리 좀 낮춰……! 마토이랑 루리엘에게 들린단 말이야!」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「ああっ<emoji=heart04>\u3000会長はん、アカン<emoji=heart04>\u3000そないなこと言ったら、２人にセックス見られてまうとこ、想像してまうよぉっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>」"
translation = "「아앗<emoji=heart04> 회장님, 안 돼<emoji=heart04> 그런 소리 하면, 두 사람에게 섹스 들키는 거, 상상해버린단 말이야아<emoji=heart04> 앗<emoji=heart04> 하아앗<emoji=heart04> 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「うち、想像しておま○こキュンキュン、なってまうぅっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「나, 상상해서 보지가 큥큥, 울려버려어<emoji=heart04> 앗<emoji=heart04> 응아앗<emoji=heart04> 후아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "膣壁がきゅうきゅうとペニスに絡みついて来て、その気持ち良さに思わず俺も声が出そうになってしまう。"
translation = "질벽이 꽉꽉 페니스를 휘감아 와서, 그 기분 좋음에 나도 모르게 목소리가 새어 나올 뻔한다."

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「はあぁっ<emoji=heart04>\u3000声抑えなアカンのに、愛液溢れるみたいに勝手に漏れてまうっ<emoji=heart04>\u3000セックスしてるのバレて、２人に見られてまうぅっ<emoji=heart04>」"
translation = "「하아앗<emoji=heart04> 소리 참아야 하는데, 애액이 넘치는 것처럼 멋대로 새어 나와버려어<emoji=heart04> 섹스하는 거 들켜서, 두 사람에게 보여버려어<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「あっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000いつも顔合わせとる友達に、快楽に溺れて、はしたなく腰振っとるとこぉ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000はああぁんっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 응으으<emoji=heart04> 후아앗<emoji=heart04> 평소에 얼굴 마주하는 친구들에게, 쾌락에 빠져서, 천박하게 허리를 흔드는 모습이이<emoji=heart04> 앗<emoji=heart04> 안<emoji=heart04> 후아앗<emoji=heart04> 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「今まで外でオナニーするの我慢しとったのにぃ<emoji=heart04>\u3000それ飛び越えて、セックスしてるの見られてまうっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「지금까지 밖에서 자위하는 거 참아왔는데에<emoji=heart04> 그거 건너뛰고, 섹스하는 걸 들켜버려어<emoji=heart04> 앗<emoji=heart04> 하아앗<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「んうぅっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000んふぅっ<emoji=heart04>\u3000外で気持ちええの我慢できずに喘いでる変態女やって、もっとスケベぇな目で見られるようになってまうよぉ<emoji=heart04>」"
translation = "「응으으<emoji=heart04> 후우웃<emoji=heart04> 응후으<emoji=heart04> 밖에서 기분 좋은 거 못 참고 신음하는 변태 여자라고, 더 스케베한 눈으로 보이게 되어버린데이<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「それを想像したらうちぃっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000はああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「그걸 상상했더니 나아<emoji=heart04> 앗<emoji=heart04> 후아앗<emoji=heart04> 하아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ミヤハルがひと際大きく喘ぎ声を上げた、その時だった。"
translation = "미야하루가 한층 더 크게 신음을 내뱉은, 그때였다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「――ん？\u3000なんだか今、ミヤハルさんの大きな声が聞こえたのです！」"
translation = "「――응? 왠지 지금, 미야하루 씨의 커다란 목소리가 들린 것 같습니다!」"

[[dialogue]]
speaker = "unk"
original = "離れた場所――神社の建物を挟んだ反対側の方から、ルリエルの元気な声が聞こえて来た。"
translation = "떨어진 장소――신사 건물을 사이에 둔 반대편에서, 루리엘의 활기찬 목소리가 들려왔다."

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「～～っ！」"
translation = "「~~윽!」"

[[dialogue]]
speaker = "unk"
original = "ミヤハルのおま○こが驚いたように反応して、きゅうぅっと締まる。"
translation = "미야하루의 보지가 놀란 듯 반응하며, 꽈아악 조여진다."

[[dialogue]]
speaker = "unk"
original = "俺も心臓が、ドキッと跳ねる。しかし、彼女は――"
translation = "내 심장도 두근하고 튀어 오른다. 하지만, 그녀는――"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「あっ<emoji=heart04>\u3000アカンっ<emoji=heart04><emoji=heart04>\u3000本当にバレてまうっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04> 안 돼<emoji=heart04><emoji=heart04> 정말 들키겠어<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "腰を止めるどころか、むしろ更にピストンを大きくする。"
translation = "허리를 멈추기는커녕, 오히려 피스톤질을 더욱 크게 한다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ちょっ、ミヤハルっ！？」"
translation = "「잠깐, 미야하루!?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ミヤハルさ～ん！\u3000何かあったのですか～？」"
translation = "「미야하루 씨~! 무슨 일 있었나요~?」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「んっ<emoji=heart04>\u3000んんぅっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000んうぅっ<emoji=heart04><emoji=heart04>」"
translation = "「응읏<emoji=heart04> 으응으읏<emoji=heart04> 후우우읏<emoji=heart04> 응으읏<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「こっちの方から声が聞こえて来ますね！\u3000――ミヤハルさ～ん？」"
translation = "「이쪽에서 목소리가 들려오네요! ――미야하루 씨~?」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「あっ、ダメっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04><emoji=heart04>」"
translation = "「앗, 안 돼<emoji=heart04> 하아아앗<emoji=heart04> 응으읏<emoji=heart04> 후우우읏<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "段々とルリエルの声がこちらに近付いて来る。そして――"
translation = "점점 루리에루의 목소리가 이쪽으로 가까워진다. 그리고――"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ミヤハルさん？\u3000って――」"
translation = "「미야하루 씨? 어라――」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「～～～읏<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ルリちゃんっ！\u3000ストォーーップ！！」"
translation = "「루리 쨩! 스토오오옵!!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「マトイさん？\u3000そんなに慌てて、一体どうしたのですか？」"
translation = "「마토이 씨? 그렇게 서둘러서, 대체 무슨 일인가요?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「そっちには行っちゃダメって言われてたから、あっちに戻って待ってよっか！？\u3000ミヤハルはちょっと今、取り込み中みたいだから！！」"
translation = "「그쪽에는 가면 안 된다고 했으니까, 저쪽으로 돌아가서 기다릴까!? 미야하루는 지금 좀 바쁜 모양이니까!!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「そうなのですか？\u3000――でも、どうして走って離れるんですか～？」"
translation = "「그런가요? ――그치만, 왜 뛰어서 멀어지는 거예요~?」"

[[dialogue]]
speaker = "unk"
original = "その後、ドタドタドタという足音と共に、ルリエルとマトイの声が遠ざかって行く。"
translation = "그 후, 우당탕거리는 발소리와 함께, 루리에루와 마토이의 목소리가 멀어져 간다."

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「んっ――はあぁ～っ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000本当にバレるかと思って、おま○こえろうキュンってしてもうたぁ<emoji=heart04>\u3000はぁぁんっ<emoji=heart04>」"
translation = "「응――하아아~앗<emoji=heart04> 앙<emoji=heart04> 정말 들키는 줄 알고, 보지 아주 큥하고 울려버렸어<emoji=heart04> 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……これ、マトイにはバレてるよな……」"
translation = "「윽…… 이거, 마토이한테는 들켰겠네……」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「んふうぅっ<emoji=heart04>\u3000んんんっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000見られるかもってすごく興奮したせいで、うち、もうイってしまいそうや<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んうぅっ……！」"
translation = "「응후우읏<emoji=heart04> 응응응<emoji=heart04><emoji=heart04><emoji=heart04> 들킬지도 모른다는 생각에 너무 흥분해서, 나, 벌써 가버릴 것 같아<emoji=heart04> 앗<emoji=heart04> 하아앗<emoji=heart04> 응으읏……!」"

[[dialogue]]
speaker = "unk"
original = "ミヤハルのおま○こがきゅうきゅうと収縮を繰り返し、絶えず背徳感と快楽を煽り続けて来る。"
translation = "미야하루의 보지가 꽉꽉 수축을 반복하며, 끊임없이 배덕감과 쾌락을 부추겨 온다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「くっ……ミヤハル、これ以上されたら、俺ももう……！」"
translation = "「큭…… 미야하루, 이 이상 하면, 나도 이제……!」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「んっ<emoji=heart04>\u3000来てぇ<emoji=heart04>\u3000うちも本気で腰振るからっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ……！」"
translation = "「응<emoji=heart04> 와줘<emoji=heart04> 나도 진심으로 허리 흔들 테니까<emoji=heart04> 앗<emoji=heart04> 앙……!」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「会長はんのおち○ぽ様で、うちのドスケベおま○こ、いっぱいお仕置きしておくれやす<emoji=heart04>」"
translation = "「회장님의 자지님으로, 내 도스케베 보지, 잔뜩 벌주세요<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「どうなっても知らないからなっ……！」"
translation = "「어떻게 돼도 모른다……!」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「あっ――<emoji=heart04><emoji=heart04>」"
translation = "「앗――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「ふああああああぁぁぁ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후아아아아아아아아아아~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "我慢できなくなった俺は、自ら腰を動かし始める。"
translation = "참을 수 없게 된 나는, 스스로 허리를 움직이기 시작한다."

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「おち○ぽ様、下から突き上げて来てはるぅっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000んふぅっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んああぁんっ<emoji=heart04>」"
translation = "「자지님이 밑에서부터 치고 올라오고 있어어어앗<emoji=heart04><emoji=heart04><emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04> 하앙<emoji=heart04> 응<emoji=heart04> 후우읏<emoji=heart04> 응후읏<emoji=heart04> 앗<emoji=heart04> 하아앗<emoji=heart04> 응아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>\u3000奥っ<emoji=heart04>\u3000おま○この奥に当たってキクぅ～～っ<emoji=heart04><emoji=heart04>\u3000あっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04> 앗<emoji=heart04> 후아아앗<emoji=heart04> 안쪽<emoji=heart04> 보지 안쪽에 닿아서 자극이 와아아~~앗<emoji=heart04><emoji=heart04> 앗<emoji=heart04> 하앙<emoji=heart04> 응으읏<emoji=heart04> 하아앗<emoji=heart04> 후아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「気持ちいいっ<emoji=heart04>\u3000おち○ぽ様で突かれて、気持ちいいのぉ～～～っ<emoji=heart04><emoji=heart04>\u3000あっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000んんぅっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んああぁんっ<emoji=heart04>」"
translation = "「기분 좋아<emoji=heart04> 자지님한테 찔려서, 기분 좋아아아~~~앗<emoji=heart04><emoji=heart04> 앗<emoji=heart04> 하앙<emoji=heart04> 응아앗<emoji=heart04> 응응으읏<emoji=heart04> 하아앗<emoji=heart04> 응아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「会長はん、もっとぉ<emoji=heart04>\u3000もっとおち○ぽ様、いっぱい突いてぇ<emoji=heart04><emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000んんぅっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000はああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「회장님, 더<emoji=heart04> 더 자지님으로 잔뜩 찔러줘어<emoji=heart04><emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04> 응응으읏<emoji=heart04> 후아앗<emoji=heart04> 하아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "悦楽に夢中になって腰のピストンを激しくする、ミヤハル。"
translation = "열락에 빠져 허리의 피스톤질을 격렬하게 하는 미야하루."

[[dialogue]]
speaker = "unk"
original = "俺も昂る興奮のまま、更なる快楽を求めて腰を更に突き上げる。"
translation = "나도 고조되는 흥분 그대로, 더욱 큰 쾌락을 갈구하며 허리를 더욱 치켜올린다."

[[dialogue]]
speaker = "unk"
original = "だから、気付くのが遅れてしまった――"
translation = "그래서, 알아채는 것이 늦어버렸다――"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「は、はぇ～……！」"
translation = "「하, 하아~……!」"

[[dialogue]]
speaker = "unk"
original = "いつの間にかルリエルが戻って来て、建物の影から俺たちの様子を食い入るように見つめていることに。"
translation = "어느샌가 루리에루가 돌아와서, 건물 그림자 사이로 우리들의 모습을 뚫어지게 쳐다보고 있다는 것을."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「えっ！？」"
translation = "「엣!?」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「あっ！？\u3000ああああああぁっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000そんなっ、アカンっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000本当に見られてもうたぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗!? 아아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 그런, 안 돼<emoji=heart04><emoji=heart04><emoji=heart04> 정말로 보여버렸어어어~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ミヤハルもルリエルの視線に気づくが、更に興奮したのか、腰のピストンがより激しくなる。"
translation = "미야하루도 루리에루의 시선을 눈치채지만, 더욱 흥분했는지 허리의 피스톤질이 보다 격렬해진다."

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「あああぁっ<emoji=heart04>\u3000恥ずかしいっ<emoji=heart04>\u3000おま○こジュプジュプしてるとこ、全部見られるの恥ずかしい<emoji=heart04><emoji=heart04>\u3000はぁぁん<emoji=heart04>\u3000恥ずかしいのっ、気持ちええよぉぉぉ～～<emoji=heart04><emoji=heart04>」"
translation = "「아아아앗<emoji=heart04> 부끄러워<emoji=heart04> 보지 쥬프쥬프하는 거 전부 보이는 거 부끄러워<emoji=heart04><emoji=heart04> 하아아앙<emoji=heart04> 부끄러운 거 기분 좋아아아아아아~~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「アカンっ<emoji=heart04>\u3000恥ずかしいの気持ちいいっ<emoji=heart04>\u3000もっと見てぇ<emoji=heart04>\u3000あぁあんっ<emoji=heart04>\u3000うちの恥ずかしいおま○こ<emoji=heart04>\u3000おま○こ気持ちよくなってるとこ、もっと見てぇ<emoji=heart04><emoji=heart04>」"
translation = "「안 돼<emoji=heart04> 부끄러운 거 기분 좋아<emoji=heart04> 더 봐줘<emoji=heart04> 아아앙<emoji=heart04> 내 부끄러운 보지<emoji=heart04> 보지 기분 좋아지는 거 더 봐줘어<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はああぁんっ<emoji=heart04><emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04><emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000んあああぁ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「앙<emoji=heart04> 앙<emoji=heart04> 하아아앙<emoji=heart04><emoji=heart04> 응으읏<emoji=heart04> 앗<emoji=heart04> 하아앗<emoji=heart04> 후아아앙<emoji=heart04><emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 후아앗<emoji=heart04> 응아아아~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ……ミヤハル！\u3000腰をそれ以上激しくされたらっ！」"
translation = "「윽…… 미야하루! 허리를 그 이상 격렬하게 하면!」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000興奮してイクっ<emoji=heart04><emoji=heart04>\u3000イってまうっ<emoji=heart04><emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「앙<emoji=heart04> 앙<emoji=heart04> 앙<emoji=heart04> 흥분해서 가버려어<emoji=heart04><emoji=heart04> 가버려어엇<emoji=heart04><emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 하아앗<emoji=heart04> 후아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000来る<emoji=heart04>\u3000来るくるくるぅ<emoji=heart04><emoji=heart04>\u3000アクメ登って来てるぅっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04> 앗<emoji=heart04> 앗<emoji=heart04> 온다<emoji=heart04> 온다온다온다아<emoji=heart04><emoji=heart04> 아크메 올라오고 있어어어엇<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「あああっ<emoji=heart04>\u3000はああぁっ<emoji=heart04><emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>\u3000はああああぁ～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아아앗<emoji=heart04> 하아아앗<emoji=heart04><emoji=heart04> 응으읏<emoji=heart04> 응아앗<emoji=heart04> 후아아앗<emoji=heart04> 하아아아아~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「友達に見られながら、イってまうぅっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「친구한테 보여지면서 가버려어어엇<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「っ――もう出るっ！！！」"
translation = "「윽―― 이제 나온다!!!」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「あっ、イクっ<emoji=heart04><emoji=heart04>\u3000イクイクイクイクイクっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000見られながらイっクうううぅっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗, 가버려어<emoji=heart04><emoji=heart04> 가가버려가버려가버려어엇<emoji=heart04><emoji=heart04><emoji=heart04> 보여지면서 가아아아버려어어어어읏<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「ああああああぁっ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>\u3000イっ――――<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04> 가버리잇――――<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「イックうううぅ～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>\u3000ふああああああぁぁぁ～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가아아아아버려어어어어어어어어어어읏<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04> 후아아아아아아아아아아아아아아아아아~~앗<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺も限界まで高まった快感が爆発し、子宮口にペニスの先を押し付けて、大量の精を吐き出す。"
translation = "나도 한계까지 고조된 쾌감이 폭발하여, 자궁구에 페니스의 끝을 밀어붙이고 대량의 정액을 토해낸다."

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「はあぁっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000んああああああぁぁぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000おち○ぽ様にキスされて、子宮にいっぱい、熱い精液来てはるぅ～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「하아앗<emoji=heart04><emoji=heart04><emoji=heart04> 응아아아아아아아아~~앗<emoji=heart04><emoji=heart04><emoji=heart04> 자지님한테 키스받아서, 자궁에 잔뜩 뜨거운 정액 오고 있어어어어~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「あっ<emoji=heart04><emoji=heart04>\u3000ふあああぁぁんっ<emoji=heart04><emoji=heart04>\u3000中出し射精<emoji=heart04>\u3000見られながらまた絶頂してまうぅ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04><emoji=heart04> 후아아아아앙<emoji=heart04><emoji=heart04> 질내사정<emoji=heart04> 보여지면서 또 절정해버려어어~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ほわぁぁ……す、すごい<emoji=heart04>\u3000お２人共、とっても気持ち良さそうな顔してるのです！！」"
translation = "「호와아…… 저, 정말 대단해요<emoji=heart04> 두 분 다 정말 기분 좋아 보이는 얼굴을 하고 계세요!!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「――ルリちゃんっ！！」"
translation = "「――루리 쨩!!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「あっ……！\u3000マトイさん？\u3000――きゃっ！？」"
translation = "「앗……! 마토이 씨? ――꺄앗!?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「お、お邪魔しました～～～っ！！！」"
translation = "「시, 실례했습니다아아아~~~!!!」"

[[dialogue]]
speaker = "unk"
original = "こちらを覗いていたルリエルを、マトイが抱きかかえて退散して行くのが視界の端に見えた。"
translation = "이쪽을 엿보던 루리에루를 마토이가 껴안고 퇴장해 가는 것이 시야 끝에 보였다."

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「んっ……ふうぅ……<emoji=heart04>\u3000あんっ<emoji=heart04>」"
translation = "「응…… 후우……<emoji=heart04> 앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ミヤハルがゆっくりと腰を上げ、ペニスを引き抜く。"
translation = "미야하루가 천천히 허리를 들어 올리고 페니스를 뽑아낸다."

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「はあぁぁっ……<emoji=heart04>\u3000見られながらのセックス、気持ちよかったわぁ～……<emoji=heart04>」"
translation = "「하아아아앗……<emoji=heart04> 보여지면서 하는 섹스, 기분 좋았어어~……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「んっ……<emoji=heart04>\u3000会長はんの精液、入りきらなくて、おま○こから溢れて来てもうた……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 회장님의 정액, 다 안 들어가서 보지에서 흘러넘쳐 나와버렸어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「ふふふっ<emoji=heart04>\u3000さすがはうちの惚れたおち○ぽ様やね<emoji=heart04>\u3000いっぱい出してもろうて、女の幸せ感じてまうわぁ……<emoji=heart04>」"
translation = "「후후훗<emoji=heart04> 역시 내가 반한 자지님다워<emoji=heart04> 잔뜩 내주셔서 여자의 행복을 느껴버려……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「うぅぅ……この後、あの２人にどういう顔して会えば……？」"
translation = "「으으으…… 이 다음에 저 두 사람을 무슨 낯으로 봐야……?」"

[[dialogue]]
speaker = "unk"
original = "射精を終えて冷静さが戻って来た俺は、ルリエルとマトイに見られてしまったことを思い返し、頭を抱える。"
translation = "사정을 마치고 냉정함이 돌아온 나는 루리에루와 마토이에게 보여버린 것을 다시 떠올리며 머리를 감싸 쥔다."

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「でも、本当に人に見られながらの青姦セックス、堪らんかったわぁ<emoji=heart04>」"
translation = "「그치만, 정말 남들에게 보여지면서 하는 야외 섹스, 참을 수 없었어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「アカンのにうち、またしたくなってまうかも……<emoji=heart04>」"
translation = "「안 되는데 나, 또 하고 싶어질지도 몰라……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「定期的にセックスを鑑賞してもらえないか、２人に相談してもええやろか……？」"
translation = "「정기적으로 섹스를 감상해 주지 않을지, 두 사람에게 상담해도 괜찮을까……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「セクハラなんて次元じゃないから、絶対にやめてくれ……！」"
translation = "「성희롱 같은 차원이 아니니까, 절대로 하지 말아줘……!」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「ふふっ<emoji=heart04>\u3000冗談やよ<emoji=heart04>\u3000……２人には後でちゃんと謝っておくさかい、堪忍な？」"
translation = "「후훗<emoji=heart04> 농담이야<emoji=heart04> ……두 사람에게는 나중에 제대로 사과해 둘 테니까, 용서해 줄래?」"

[[dialogue]]
speaker_original = "ミヤハル"
speaker_translation = "미야하루"
original = "「んっ<emoji=heart04>\u3000ちゅっ……<emoji=heart04>」"
translation = "「응읏<emoji=heart04> 츄……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "悪戯っぽく舌を出して笑ってから、俺の唇に小さくキスをするミヤハルなのだった――"
translation = "장난스럽게 혀를 내밀고 웃고 나서, 내 입술에 살짝 키스를 하는 미야하르였다――"

