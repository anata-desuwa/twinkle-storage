[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「イレーナさま……！\u3000お気を確かに、イレーナさま……！\u3000どうか目をっ、目を開けてくださいっっ……！！」"
translation = "「이레이나 님……! 정신 차리세요, 이레이나 님……! 제발 눈을, 눈을 떠 주세요……!!」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「どうしてこんなっ！！\u3000イレーナさま、イレーナさま、イレーナさまぁああああっっ～～！！！」"
translation = "「어째서 이런 일이!! 이레이나 님, 이레이나 님, 이레이나 님아아아아아앗~~!!!」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「うっさいわね！！\u3000聞こえてるわよ！！」"
translation = "「시끄럽다니까!! 들린다고!!」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「ひゃふっ！！？」"
translation = "「햐훗!!?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ったくもう……。目を閉じて星力を集中してただけよ……。痛いから揺らさないでもらえるかしら」"
translation = "「나 원 참……. 눈을 감고 성력을 집중하고 있었을 뿐이야……. 아프니까 흔들지 좀 말아줄래.」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「ご、ご無事なのですかっ？\u3000お身体は大丈夫なんですかっ！？」"
translation = "「무, 무사하신 건가요? 몸은 괜찮으신 거예요!?」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「痛い痛い痛いっ！\u3000だから揺らさないでってば！\u3000ご無事じゃないから治療してるんでしょうに！？」"
translation = "「아파 아파 아파! 그러니까 흔들지 말라니까! 안 무사하니까 치료하고 있는 거 아니야!?」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「そ、そうですよね！\u3000申し訳ございません！！」"
translation = "「그, 그렇군요! 죄송합니다!!」"

[[dialogue]]
speaker = "unk"
original = "おかげで子どもも無事だ"
translation = "덕분에 아이도 무사해"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「それはいいけど、あんたは何してたのよ。本当なら会長のあんたがバシッとモンスターを倒すところでしょうが。どうしてあたしがシャロンを庇うハメになってんの？」"
translation = "「그건 다행이지만, 당신은 뭐 하고 있었던 거야. 원래라면 회장인 당신이 몬스터를 팍 쓰러뜨릴 차례잖아. 왜 내가 샤론을 감싸는 꼴이 되어야 하는데?」"

[[dialogue]]
speaker = "unk"
original = "う……ごめん……"
translation = "으…… 미안……"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「か、会長さまには子どもたちを守っていただいていたので……」"
translation = "「회, 회장님은 아이들을 지켜주고 계셨으니까요……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「もう、まったく……あんたには１つ貸しだからね」"
translation = "「정말이지, 진짜…… 당신한테는 빚 하나 지운 거니까.」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「それよりも、どうしてここへ……。あんなにも普通の女の子に戻りたいと仰っていたのに……」"
translation = "「그보다, 어째서 여기에…… 그토록 평범한 여자아이로 돌아가고 싶다고 말씀하셨으면서……」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あたしがどこに来ようがあたしの勝手でしょ」"
translation = "「내가 어디를 가든 내 마음이잖아.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ていうか、あんたたちに何かあったら誰がクリスマスパーティーの準備するのよ」"
translation = "「그보다, 너희한테 무슨 일이라도 생기면 누가 크리스마스 파티 준비를 하겠어.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「あんたたちがボロボロになって、パーティーの準備全部押し付けられるくらいなら、自分で戦って怪我人減らした方がマシだわ」"
translation = "「너희가 너덜너덜해져서 파티 준비를 전부 나한테 떠넘길 바에는, 직접 싸워서 부상자를 줄이는 게 낫지.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「助けてあげた分キリキリ働いてあたしに楽させなさい。いいわね」"
translation = "「구해준 만큼 뼈 빠지게 일해서 나를 편하게 해줘. 알겠지?」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「……ふふっ。くすくすっ」"
translation = "「……후훗. 킥킥.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「な、なに笑ってるのよ！」"
translation = "「뭐, 뭐야, 왜 웃어!」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「くすくす、失礼しました。こんなにも愛らしいイレーナさまを拝見したのは初めてだったもので」"
translation = "「킥킥, 실례했습니다. 이렇게나 사랑스러운 이레이나 님을 뵙는 건 처음이라서요.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「は？」"
translation = "「하?」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「やはりイレーナさまはイレーナさまでした。お言葉遣いこそいささか乱暴ですが、私のよく知る、高潔で崇高な魂をお持ちの聖女様です」"
translation = "「역시 이레이나 님은 이레이나 님이셨어요. 말투는 비록 조금 거칠지만, 제가 잘 아는 고결하고 숭고한 영혼을 가진 성녀님이세요.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「はぁ～？\u3000あんた人の話聞いてたの？\u3000あたしは聖女じゃないってさんざん言ってんでしょうが」"
translation = "「하아~? 너 내 말 듣고 있었어? 난 성녀가 아니라고 입이 닳도록 말했잖아.」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「ええ。ですがそれでも、イレーナさまは聖女なのです」"
translation = "「네. 하지만 그래도 이레이나 님은 성녀이십니다.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「はぁ～っ？\u3000聖女じゃないって何度言えばわかるのよ。話通じないわね……」"
translation = "「하아~? 성녀가 아니라고 몇 번을 말해야 알아듣겠어. 말이 안 통하네……」"

[[dialogue]]
speaker = "unk"
original = "俺もイレーナは聖女だと思う"
translation = "나도 이레이나가 성녀라고 생각해"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「うるさいわねっ。あんたも笑ってんじゃないわよ、エロ会長」"
translation = "「시끄러워. 당신도 웃지 마, 에로 회장.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「ともかく、さっさと行くわよ！\u3000せっかくパーティーの準備してたってのに、これ以上ぶち壊しにされたら堪ったもんじゃないわ！」"
translation = "「어쨌든 빨리 가자! 애써 파티 준비를 하고 있었는데, 여기서 더 망쳐지면 못 참으니까!」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「ええ、参りましょう。子どもたちを泣かせた罪を<ruby>贖<rt>あがな</rt></ruby>っていただかなくてはいけませんから」"
translation = "「네, 가시죠. 아이들을 울린 죄를 속죄하게 만들어야 하니까요.」"

[[dialogue]]
speaker = "unk"
original = "行くってまさか"
translation = "간다는 게 설마"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「もちろん、あのモンスターにトドメを刺しによ」"
translation = "「물론, 그 몬스터에게 숨통을 끊으러지.」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「アステラの中へ逃げ込んだのはしかと見ていましたから」"
translation = "「아스텔라 속으로 도망친 건 확실히 봤으니까요.」"

[[dialogue]]
speaker_original = "イレーナ"
speaker_translation = "이레이나"
original = "「まさか援軍を待とうだなんて悠長なこと言わないわよね？」"
translation = "「설마 지원군을 기다리겠다는 태평한 소리는 안 하겠지?」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「ご安心を。女神様のご加護を受けた今、二度と遅れは取りません。イレーナさまと会長さまが共に戦ってくださるのであれば尚更です」"
translation = "「안심하세요. 여신님의 가호를 받은 지금, 두 번 다시 뒤처지지 않습니다. 이레이나 님과 회장님이 함께 싸워주신다면 더더욱 말이죠.」"

[[dialogue]]
speaker = "unk"
original = "よし──行こう！"
translation = "좋아── 가자!"

