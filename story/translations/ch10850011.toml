[[dialogue]]
speaker = "unk"
original = "第１話,甘々な守護天使,P"
translation = "제1화, 달콤달콤한 수호천사, P"

[[dialogue]]
speaker = "unk"
original = "ある日の夜、俺は星徒会で残業を終えたところだったのだが――"
translation = "어느 날 밤, 나는 성도회에서 잔업을 마친 참이었는데──"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「会長、今日も１日、お仕事お疲れ様でした♪」"
translation = "「회장님, 오늘도 하루, 일하시느라 수고 많으셨어요♪」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「というわけで～、ママダレナが膝枕で癒しちゃいますね～♪\u3000よしよし♪」"
translation = "「그런 고로~, 마마다레나가 무릎베개로 치유해 드릴게요~♪ 착하다 착해♪」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「って、会長、どうしました？\u3000恥ずかしそうに顔を背けたりして」"
translation = "「어라, 회장님, 왜 그러세요? 부끄러운 듯 고개를 돌리시고」"

[[dialogue]]
speaker = "unk"
original = "膝枕は嬉しいんだけど、その……"
translation = "무릎베개는 기쁘지만, 그게……"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「――私の体が小さいから、仰向けになると顔にお胸が当たっちゃう？」"
translation = "「──제 몸이 작아서, 위를 보고 누우면 얼굴에 가슴이 닿아버리나요?」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「あ～、そういうことですか。うふふ♪\u3000会長ったら耳まで赤くしちゃって、可愛い<emoji=heart04>」"
translation = "「아~, 그런 거였군요. 우후후♪ 회장님도 참 귀까지 빨개지셔선, 귀여워<emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「恋人なんですから、そんなこと気にせず、ママダレナに甘えてもいいんですよ？\u3000柔らかいクッションだと思って♪」"
translation = "「연인이니까요, 그런 거 신경 쓰지 말고, 마마다레나에게 어리광 부려도 된다고요? 부드러운 쿠션이라고 생각하고♪」"

[[dialogue]]
speaker = "unk"
original = "しばらく前、俺はマグダレナに好意を伝えて、恋人関係になっていた。"
translation = "얼마 전, 나는 막달레나에게 호감을 전하고, 연인 관계가 되어 있었다."

[[dialogue]]
speaker = "unk"
original = "ただその後、本体アバターが一時使用不能になる事件があって、彼女はその時に代わりのスペアボディ『幼アバター』を使うようになった。"
translation = "다만 그 후, 본체 아바타를 일시적으로 사용할 수 없게 된 사건이 있어서, 그녀는 그때 대신 스페어 바디인 『어린 아바타』를 사용하게 되었다."

[[dialogue]]
speaker = "unk"
original = "本体アバターに戻れるようになった今も、附属校に通う学生生活を気に入っているようで、最近はこちらの姿でいることが多い。ただ――"
translation = "본체 아바타로 돌아갈 수 있게 된 지금도, 부속 학교에 다니는 학생 생활이 마음에 드는지, 최근에는 이 모습으로 있을 때가 많다. 하지만──"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「む～っ、会長は、なかなか私のことをママダレナって呼んでくれませんね～。えいっ、頬っぺたつんつん」"
translation = "「무~, 회장님은 좀처럼 저를 마마다레나라고 불러주지 않으시네요~. 에잇, 볼 콕콕」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「もっと子供みたいに甘えて欲しいのに～」"
translation = "「좀 더 아이처럼 어리광 부려줬으면 좋겠는데~」"

[[dialogue]]
speaker = "unk"
original = "マグダレナが小さな体でいる時は、どうやら『みんなのママになりたい』という欲求が強くなっているらしく、周りに『ママダレナ』と呼んで欲しいと、よく口にする。"
translation = "막달레나가 작은 몸으로 있을 때는, 아무래도 『모두의 엄마가 되고 싶다』는 욕구가 강해지는 모양인지, 주변에 『마마다레나』라고 불러달라는 말을 자주 한다."

[[dialogue]]
speaker = "unk"
original = "恋人としては、なるべく彼女のお願いに応えてあげたいとも思うが、その一方で――"
translation = "연인으로서는 가급적 그녀의 부탁에 응해주고 싶다고 생각하지만, 한편으로는──"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「……え？\u3000――恋人だからこそ、普通に下の名前で呼びたい、ですか？」"
translation = "「……에? ──연인이니까 오히려, 평범하게 이름으로 부르고 싶다, 고요?」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「なるほど。甘えるなら、ママとしての私ではなく、恋人としての方がいいということですね……」"
translation = "「그렇군요. 어리광을 부린다면, 엄마로서의 제가 아니라, 연인으로서 부리는 게 좋다는 뜻이군요……」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「ごめんなさい、会長。私、そこまで気が回らなくて」"
translation = "「죄송해요, 회장님. 제가 거기까지 생각이 미치지 못해서」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「守護天使として生まれてから、長いこと存在してきましたが、男女のお付き合いをするのは会長が初めてなので……私もまだまだ、恋愛初心者ですね」"
translation = "「수호천사로 태어난 이후로, 오랫동안 존재해 왔지만, 남녀 간의 교제를 하는 건 회장님이 처음이라서…… 저도 아직, 연애 초보네요」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「でも、それはそれとして、２人きりの時はママダレナになって、会長に甘えて欲しいな～とも思ってしまいます」"
translation = "「하지만, 그건 그것대로, 둘만 있을 때는 마마다레나가 되어서, 회장님이 어리광 부려줬으면 좋겠다~ 하는 생각도 들어버려요」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「恋人だからこそ、甘々な関係を楽しみたいと言いますか……」"
translation = "「연인이니까 오히려, 달콤달콤한 관계를 즐기고 싶달까……」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「お互いに甘やかして、甘やかされる関係って、なんだかよくないですか？」"
translation = "「서로 보살펴주고, 보살핌 받는 관계라는 거, 왠지 좋지 않나요?」"

[[dialogue]]
speaker = "unk"
original = "マグダレナも甘えたいんだ？"
translation = "막달레나도 어리광 부리고 싶어?"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「ダメ……ですか？」"
translation = "「안…… 될까요?」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「――ママというより、むしろ子供っぽい？」"
translation = "「──엄마라기보다, 오히려 어린애 같다고?」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「え～、そんな～！」"
translation = "「에~, 너무해요~!」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「――って、笑わないで下さいよ、会長～」"
translation = "「──정말, 웃지 마세요, 회장님~」"

[[dialogue]]
speaker = "unk"
original = "このまま少し休んでもいい？"
translation = "이대로 조금 쉬어도 될까?"

[[dialogue]]
speaker = "unk"
original = "じゃあ、ママダレナ"
translation = "그럼, 마마다레나."

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「……あ！\u3000えへへ♪\u3000もちろんですよ～」"
translation = "「……아! 에헤헤♪ 물론이죠~」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「ママダレナの膝枕で、ゆっくり休んで下さいね♪」"
translation = "「마마다레나의 무릎베개에서, 천천히 쉬세요♪」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「今日１日、よく頑張りました。えらいえらい♪」"
translation = "「오늘 하루, 정말 고생 많았어요. 장하다 장해♪」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「ふふっ……♪」"
translation = "「후훗……♪」"

[[dialogue]]
speaker = "unk"
original = "――恋人っぽいかはわからないけど、彼女が幸せそうなら、今はそれでいいか。"
translation = "──연인 같은지는 모르겠지만, 그녀가 행복해 보인다면 지금은 그걸로 됐나."

[[dialogue]]
speaker = "unk"
original = "そう思って、心地良い微睡みに身を委ねる俺なのだった。"
translation = "그렇게 생각하며, 기분 좋은 비몽사몽함에 몸을 맡기는 나였다."

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "（会長、寝ちゃったみたいですね）"
translation = "（회장님, 잠드신 모양이네요）"

[[dialogue]]
speaker = "unk"
original = "マグダレナは、目を瞑る恋人の頭を優しく撫でる。"
translation = "막달레나는 눈을 감은 연인의 머리를 상냥하게 쓰다듬는다."

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "（本当は面と向かって、素直に伝えられたらいいのですが……）"
translation = "（사실은 마주 보고, 솔직하게 전할 수 있으면 좋겠지만……）"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "（恋人同士でも、いざ面と向かってだと、恥ずかしくなってしまって、なかなか言えないんですよね）"
translation = "（연인 사이라도, 막상 마주 보고 있으면 부끄러워져서, 좀처럼 말이 나오지 않네요）"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「――いつも私を甘えさせてくれて、ありがとうございます。会長……」"
translation = "「──항상 저를 어리광 부리게 해주셔서, 고맙습니다. 회장님……」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「愛しています……<emoji=heart04>」"
translation = "「사랑해요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「ちゅっ……<emoji=heart04>」"
translation = "「쪽……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "マグダレナは恋人の頬っぺたに、そっとキスを落とす――"
translation = "막달레나는 연인의 볼에 살며시 키스를 남긴다──"

[[dialogue]]
speaker = "unk"
original = "……俺も、愛してる"
translation = "……나도, 사랑해."

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「ひゃっ！？\u3000か、会長、まさか起きて……！？」"
translation = "「히얏!? 회, 회장님, 설마 깨어 계셨……!?」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「あ、あわわわ……」"
translation = "「아, 아와와와……」"

[[dialogue]]
speaker = "unk"
original = "わざとじゃないんだけど、ごめん"
translation = "일부러 그런 건 아냐, 미안."

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「は、恥ずかしいです……」"
translation = "「부, 부끄러워요……」"

[[dialogue]]
speaker_original = "マグダレナ（幼少）"
speaker_translation = "막달레나(어린 시절)"
original = "「はうぅ……」"
translation = "「하우우……」"

[[dialogue]]
speaker = "unk"
original = "顔を赤くして照れるマグダレナ。俺は起き上がると、今度は彼女の頭を優しく撫でるのだった――"
translation = "얼굴을 붉히며 수줍어하는 막달레나. 나는 일어나서, 이번에는 그녀의 머리를 상냥하게 쓰다듬어 주었다──"

