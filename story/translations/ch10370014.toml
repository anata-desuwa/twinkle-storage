[[dialogue]]
speaker = "unk"
original = "第４話,ふわふわどきどきモーメント,P"
translation = "제4화, 폭신폭신 두근두근 모먼트, P"

[[dialogue]]
speaker = "unk"
original = "サランとの付き合いも長くなり始めた、とある休日のこと――"
translation = "사란과 사귀기 시작한 지도 꽤 되었을 무렵, 어느 휴일의 일――"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「サランと、１日兄妹ごっこして欲しいの～♪」"
translation = "「사란이랑, 하루 동안 남매 놀이 해줬으면 좋겠어~♪」"

[[dialogue]]
speaker = "unk"
original = "いきなりどういうこと！？"
translation = "갑자기 그게 무슨 소리야!?"

[[dialogue]]
speaker = "unk"
original = "家に遊びに来る否や彼女が言い出した内容に、俺は理解が追い付かない。"
translation = "집에 놀러 오자마자 그녀가 꺼낸 말에, 나는 이해가 따라가지 못한다."

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ほら、この前、星騎士として活躍したご褒美に～、サランのお願いを１つ叶えてくれるって言ってたじゃない？」"
translation = "「봐봐, 저번에 별의 기사로서 활약한 보상으로~, 사란의 소원을 하나 들어준다고 했었잖아?」"

[[dialogue]]
speaker = "unk"
original = "だからって、何故に兄妹ごっこ！？"
translation = "그렇다고 해서, 왜 남매 놀이인데!?"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「えっと実はね～、サラン、童話の絵本が好きなんだ～。特に、お菓子の家が出て来る『ヘンゼルとグレーテル』が昔から好きで～」"
translation = "「그게 사실은 말야~, 사란, 동화 그림책을 좋아하거든~. 특히 과자의 집이 나오는 『헨젤과 그레텔』을 옛날부터 좋아해서~」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「それでヘンゼルみたいな頼れるお兄ちゃんに、ちょっと憧れがあるんだぁ♪」"
translation = "「그래서 헨젤 같은 의지할 수 있는 오빠에 대해, 조금 동경이 있단 말야♪」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ほら、会長ちゃん、最初に会った時もそうだし、それからもサランのこと、色々と助けてくれるでしょ～？」"
translation = "「봐봐, 회장짱, 처음에 만났을 때도 그랬고, 그 뒤로도 사란을 여러 가지로 도와줬잖아~?」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「何だかヘンゼルお兄ちゃんみたいだな～って、ずっと思ってたの～」"
translation = "「왠지 헨젤 오빠 같네~ 하고, 계속 생각했었어~」"

[[dialogue]]
speaker = "unk"
original = "同級生だから、ちょっと照れくさいけど……"
translation = "동급생이라서, 조금 쑥스럽지만……"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「わぁ～、呼んでもいいの～？\u3000やった～♪\u3000ありがとう、会長ちゃん～♪」"
translation = "「와아~, 불러도 돼~? 만세~♪ 고마워, 회장짱~♪」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「じゃあじゃあ、会長ちゃんとサランは今から１日兄妹ってことで～」"
translation = "「그럼 그럼, 회장짱이랑 사란은 지금부터 하루 동안 남매인 걸로~」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「よろしくね～、<b>お兄ちゃん</b>♪」"
translation = "「잘 부탁해~, <b>오빠</b>♪」"

[[dialogue]]
speaker = "unk"
original = "（サーシャさんの気持ちがわかった気がする！）"
translation = "(사샤 씨의 기분을 알 것 같은 기분이 들어!)"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ぽよ？\u3000どうしたの、お兄ちゃん？」"
translation = "「뽀요? 왜 그래, 오빠?」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「……兄からして欲しいこと、どんどん言って欲しい？\u3000うん、色々あるんだ～♪」"
translation = "「……오빠가 해줬으면 하는 거, 잔뜩 말해줬으면 좋겠어? 응, 여러 가지 있어~♪」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「えっとね～、まずは優しく頭撫でて欲しいなって……」"
translation = "「음~, 우선은 상냥하게 머리 쓰다듬어 줬으면 좋겠어……」"

[[dialogue]]
speaker = "unk"
original = "言われるがまま、サランの頭を撫でる。"
translation = "말하는 대로, 사란의 머리를 쓰다듬는다."

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「あ……ふわぁ～……♪\u3000これ何か、気持ち良くてふわふわする～♪」"
translation = "「아…… 후와아~……♪ 이거 왠지, 기분 좋아서 폭신폭신해~♪」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「えへへ～♪\u3000お兄ちゃんの手、大きくて温かくて気持ちいい～♪」"
translation = "「에헤헤~♪ 오빠 손, 크고 따뜻해서 기분 좋아~♪」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「それからね～、お兄ちゃんにあ～んってお菓子を食べさせて欲しい～♪」"
translation = "「그리고 말야~, 오빠가 아~ 하고 과자를 먹여줬으면 좋겠어~♪」"

[[dialogue]]
speaker = "unk"
original = "来客用のクッキーを手に取った。"
translation = "손님용 쿠키를 집어 들었다."

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「えへへ～♪\u3000食べさせて、お兄ちゃん♪」"
translation = "「에헤헤~♪ 먹여줘, 오빠♪」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「は～い、あ～ん♪\u3000……もぐもぐ、ん～、美味しい～♪」"
translation = "「하~이, 아~♪ ……우물우물, 음~, 맛있어~♪」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「普通のクッキーなのに、お兄ちゃんに食べさせて貰うだけで、何か甘くてふわふわする～♪\u3000ふわぁ～、幸せ～♪」"
translation = "「평범한 쿠키인데, 오빠가 먹여주는 것만으로도 왠지 달콤하고 폭신폭신해~♪ 후와아~, 행복해~♪」"

[[dialogue]]
speaker = "unk"
original = "俺も何か今、凄く幸せな気分だ"
translation = "나도 왠지 지금, 굉장히 행복한 기분이다"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「本当～？\u3000そっか、サランと一緒なんだ～♪\u3000なんかそれって嬉しいかも～♪」"
translation = "「정말~? 그렇구나, 사란이랑 똑같네~♪ 왠지 그거 기쁠지도~♪」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ねぇ～、次は～、お兄ちゃんに膝枕をして欲しいな～♪」"
translation = "「있지~, 다음은~, 오빠한테 무릎베개를 받고 싶어~♪」"

[[dialogue]]
speaker = "unk"
original = "ソファーに座って、自分の太ももをぽんぽんと叩いた。"
translation = "소파에 앉아서, 자신의 허벅지를 톡톡 두드렸다."

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「わ～い、サラン、膝枕して貰うの好きなんだ～♪」"
translation = "「와~이, 사란, 무릎베개 받는 거 좋아해~♪」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「でも、よく考えたら、家族以外にして貰うのは初めてかも～♪」"
translation = "「하지만 잘 생각해보니, 가족 말고 다른 사람한테 받는 건 처음일지도~♪」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「それじゃあ、お膝借りるね～♪」"
translation = "「그럼, 무릎 좀 빌릴게~♪」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ふわぁ～、これ何か、凄くいいかも～♪\u3000心ぽかぽかだけど、落ち着いて安心もする～♪」"
translation = "「후와아~, 이거 왠지, 굉장히 좋을지도~♪ 마음이 포근포근하지만, 차분해지고 안심도 돼~♪」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「んっ……頭も撫でてくれるの～？\u3000ふわぁ～、サラン、ずっとこうしてたいかもぉ～……♪」"
translation = "「응…… 머리도 쓰다듬어 주는 거야~? 후와아~, 사란, 계속 이러고 싶을지도~……♪」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ねぇ～、<b>会長ちゃん</b>。いま気付いたことがあって～」"
translation = "「있지~, <b>회장짱</b>. 방금 깨달은 게 있어서~」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「サラン、会長ちゃんとこうして一緒に居ると、それだけで気持ちがふわふわするんだ～。何だかそれって――」"
translation = "「사란, 회장짱이랑 이렇게 같이 있으면, 그것만으로도 기분이 폭신폭신해져~. 왠지 그건――」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「本当の家族みたいだよね～♪」"
translation = "「진짜 가족 같네~♪」"

[[dialogue]]
speaker = "unk"
original = "サランの何気ない言葉に、ドキッとしてしまう。"
translation = "사란의 무심한 말에, 두근거리고 만다."

[[dialogue]]
speaker = "unk"
original = "（お兄ちゃんと呼ばれた時と違って……）"
translation = "(오빠라고 불렸을 때와는 다르게……)"

[[dialogue]]
speaker = "unk"
original = "（何だこれ……）"
translation = "(뭐지 이건……)"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ぽよ？\u3000会長ちゃん、どうしたの～？」"
translation = "「뽀요? 회장짱, 왜 그래~?」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「手で目隠ししたら、何も見えないよ～？\u3000これって何かの遊び～？」"
translation = "「손으로 눈을 가리면, 아무것도 안 보여~? 이거 무슨 놀이야~?」"

[[dialogue]]
speaker = "unk"
original = "い、いや、何でもない……"
translation = "아, 아니, 아무것도 아니야……"

[[dialogue]]
speaker = "unk"
original = "そう言って俺は、熱くなった顔を彼女から見られないように誤魔化すのだった。"
translation = "그렇게 말하며 나는, 달아오른 얼굴을 그녀에게 들키지 않도록 얼버무리는 것이었다."

