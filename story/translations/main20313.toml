[[dialogue]]
speaker = "unk"
original = "第１４話,ディザスターハンド,B"
translation = "제14화, 디자스터 핸드, B"

[[dialogue]]
speaker = "クロト"
original = "「はぁ、はぁ……みんな、無事か……？」"
translation = "「하아, 하아…… 모두, 무사해……?」"

[[dialogue]]
speaker = "マトイ"
original = "「うん、生きてる……。死ぬかと思ったけど……」"
translation = "「응, 살아있어……. 죽는 줄 알았지만……」"

[[dialogue]]
speaker = "アナ"
original = "「同じく」"
translation = "「동감」"

[[dialogue]]
speaker = "サーシャ"
original = "「私も無事だわ～」"
translation = "「나도 무사하다와~」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「何だったのよ、あれは……」"
translation = "「뭐였던 거야, 방금 그건……」"

[[dialogue]]
speaker = "unk"
original = "命からがら頂上を脱出した俺たちは、フィーニスの塔を降り、大聖堂まで来ていた。"
translation = "목숨만 건져 정상을 탈출한 우리들은, 피니스의 탑을 내려와 대성당까지 와 있었다."

[[dialogue]]
speaker = "unk"
original = "全員の健在を確認し、ほっと一息つく。"
translation = "전원의 안부를 확인하고, 후우 하고 한숨 돌린다."

[[dialogue]]
speaker = "unk"
original = "緊張が解けたことで力が抜け、その場から動くことができない。"
translation = "긴장이 풀리자 힘이 빠져, 그 자리에서 움직일 수가 없다."

[[dialogue]]
speaker = "クロト"
original = "「ありがとう、梨緒のおかげで助かった」"
translation = "「고마워, 리오 덕분에 살았어」"

[[dialogue]]
speaker = "梨緒"
original = "「構わない。魔王が敵の手に堕ちることは、避けなければいけないからな」"
translation = "「상관없어. 마왕이 적의 손에 떨어지는 것은, 피해야만 하니까」"

[[dialogue]]
speaker = "梨緒"
original = "「……っ」"
translation = "「……윽」"

[[dialogue]]
speaker = "クロト"
original = "「大丈夫か！？\u3000どこかやられたのか！？」"
translation = "「괜찮아!? 어디 당한 거야!?」"

[[dialogue]]
speaker = "梨緒"
original = "「いや、これは元々だ。時折頭が痛むだけ……気にしないでくれ」"
translation = "「아니, 이건 원래부터다. 가끔 머리가 아플 뿐…… 신경 쓰지 마」"

[[dialogue]]
speaker = "サーシャ"
original = "「本調子じゃないのに助けに来てくれたのね。……ありがとう、本当に」"
translation = "「정상이 아닌데도 구하러 와 주었구나. ……고마워, 정말로」"

[[dialogue]]
speaker = "梨緒"
original = "「監視すると言っても、選管は星徒会の敵ではない。協力は惜しまない……」"
translation = "「감시한다고는 해도, 선관은 성도회의 적이 아니야. 협력은 아끼지 않겠다……」"

[[dialogue]]
speaker = "アナ"
original = "「あの<b>手</b>が追ってくる気配はなさそうですね」"
translation = "「그 <b>손</b>이 쫓아오는 기척은 없는 것 같네요」"

[[dialogue]]
speaker = "梨緒"
original = "「今のところフィーニスの塔から出る気はないらしい。不幸中の幸いだ」"
translation = "「지금으로선 피니스의 탑에서 나갈 생각은 없는 모양이야. 불행 중 다행이지」"

[[dialogue]]
speaker = "マトイ"
original = "「でもどうして梨緒さんがフィーニスの塔に？」"
translation = "「그치만 어째서 리오 씨가 피니스의 탑에?」"

[[dialogue]]
speaker = "梨緒"
original = "「私の中で声がしたんだ。……塔の中で何かが起きている、と」"
translation = "「내 안에서 목소리가 들렸어. ……탑 안에서 무슨 일이 일어나고 있다, 고」"

[[dialogue]]
speaker = "クロト"
original = "「声……？」"
translation = "「목소리……?」"

[[dialogue]]
speaker = "梨緒"
original = "「ああ、声だ。私にも、誰のものかはわからなかった……」"
translation = "「아아, 목소리다. 나에게도, 누구의 것인지는 알 수 없었지만……」"

[[dialogue]]
speaker = "unk"
original = "フィーニスの塔を登っている時、ヴィーナスはしばしば声が聞こえると言っていたが、それと似たようなものだろうか……？"
translation = "피니스의 탑을 오르고 있을 때, 비너스는 종종 목소리가 들린다고 말했었는데, 그것과 비슷한 것일까……?"

[[dialogue]]
speaker = "ヴィーナス"
original = "「よく私たちの後を追ってこれたわね」"
translation = "「우리 뒤를 잘도 쫓아왔네」"

[[dialogue]]
speaker = "梨緒"
original = "「まぁ、天井に大穴が空いていたからな。それを辿っていったんだ」"
translation = "「뭐, 천장에 커다란 구멍이 뚫려 있었으니까. 그걸 따라간 거야」"

[[dialogue]]
speaker = "梨緒"
original = "「それに塔の中が懐かしい気もして……まるで以前から知っているような……」"
translation = "「게다가 탑 안이 그리운 기분도 들어서…… 마치 이전부터 알고 있었던 것 같은……」"

[[dialogue]]
speaker = "クロト"
original = "「懐かしい？」"
translation = "「그립다고?」"

[[dialogue]]
speaker = "梨緒"
original = "「フィーニスの塔に入ったのは、初めてのはずなんだが……」"
translation = "「피니스의 탑에 들어온 건, 처음일 텐데 말이지……」"

[[dialogue]]
speaker = "unk"
original = "答えながら自分で首を傾げる梨緒。"
translation = "대답하며 스스로 고개를 갸웃거리는 리오."

[[dialogue]]
speaker = "unk"
original = "どうやら彼女自身も釈然としないらしい。"
translation = "아무래도 그녀 자신도 석연치 않은 모양이다."

[[dialogue]]
speaker = "サーシャ"
original = "「結局、あの<b>手</b>はなんだったのかしら？」"
translation = "「결국, 그 <b>손</b>은 뭐였던 걸까~?」"

[[dialogue]]
speaker = "unk"
original = "リクリエの使徒であったアポロを守った手。リクリエの側の存在で、敵であることは間違いないようだ。"
translation = "리크리에의 사도였던 아폴로를 지킨 손. 리크리에 측의 존재이며, 적임에는 틀림없는 모양이다."

[[dialogue]]
speaker = "unk"
original = "間近で相対して感じたのは、圧倒的な力。"
translation = "가까이서 상대하며 느낀 것은, 압도적인 힘."

[[dialogue]]
speaker = "unk"
original = "あれは今まで戦ってきた誰よりも、何よりも、強い。"
translation = "저것은 지금까지 싸워온 누구보다도, 무엇보다도, 강하다."

[[dialogue]]
speaker = "unk"
original = "当然、あのギエルよりも。"
translation = "당연히, 그 기엘보다도."

[[dialogue]]
speaker = "unk"
original = "そして梨緒は最初からあの<b>手</b>を知っているような口ぶりだった。"
translation = "그리고 리오는 처음부터 그 <b>손</b>을 알고 있는 듯한 말투였다."

[[dialogue]]
speaker = "unk"
original = "<b>手</b>がアポロを助けた時、あの場にいなかったにも拘わらず。"
translation = "<b>손</b>이 아폴로를 구했을 때, 그 자리에 없었음에도 불구하고."

[[dialogue]]
speaker = "クロト"
original = "「梨緒はあの<b>手</b>を知っているのか？」"
translation = "「리오는 그 <b>손</b>을 알고 있는 거야?」"

[[dialogue]]
speaker = "梨緒"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "梨緒は目をつむって一瞬逡巡し、小さく頷く。"
translation = "리오는 눈을 감고 잠시 머뭇거리더니, 작게 고개를 끄덕인다."

[[dialogue]]
speaker = "unk"
original = "そして──"
translation = "그리고──"

[[dialogue]]
speaker = "梨緒"
original = "「ああ、知っている」"
translation = "「그래, 알고 있어」"

[[dialogue]]
speaker = "梨緒"
original = "「あれはディザスターハンド。世界を破滅させる厄災の化身だ」"
translation = "「그건 디재스터 핸드. 세계를 파멸시키는 액운의 화신이야」"

