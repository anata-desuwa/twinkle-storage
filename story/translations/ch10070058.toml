[[dialogue]]
speaker = "ルリエル"
original = "「んぅ……ちゅ<emoji=heart04>\u3000んちゅ、ちゅぅっ……ちゅぱ……<emoji=heart04>」"
translation = "「응으……츄<emoji=heart04> 응츄, 츄우…… 츄파……<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「会長さん、お部屋に入ってからいきなり情熱的なのですっ……<emoji=heart04>」"
translation = "「회장님, 방에 들어오자마자 갑자기 정열적이신 거예요……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「……ルリエルがあんまり可愛いから」"
translation = "「……루리엘이 너무 귀여우니까」"

[[dialogue]]
speaker = "ルリエル"
original = "「そう言ってもらえると、とっても嬉しいのです～<emoji=heart04>\u3000仲良しになれたステラさんの服、ルリエルも気に入っちゃってますから<emoji=heart04>」"
translation = "「그렇게 말씀해 주시니 정말 기뻐요~<emoji=heart04> 친해진 스텔라 씨의 옷, 루리엘도 무척 마음에 들거든요<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「えへへへへへぇ<emoji=heart04>\u3000こうやってぎゅーって抱き着いて、ちゅーしたら……お花の香り、い～っぱいすると思いますよ～<emoji=heart04>」"
translation = "「에헤헤헤헤헤<emoji=heart04> 이렇게 꽉 껴안고, 츄~ 하면…… 꽃향기가 가~득 날 거예요~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "少し前に気づいたことなのだが、ルリエルはこの装いになると、ふわふわと甘くてやわらかい花の香りを纏うようになる。"
translation = "조금 전에 깨달은 사실인데, 루리엘은 이 복장을 하면 폭신하고 달콤하며 부드러운 꽃향기를 풍기게 된다."

[[dialogue]]
speaker = "unk"
original = "天真爛漫、笑顔の似合うルリエルにその香りはとてもマッチしていて……２人きりの空間でイチャイチャしていると、ものすごくドキドキしてしまう。"
translation = "천진난만하고 미소가 잘 어울리는 루리엘에게 그 향기는 너무나도 잘 어울려서…… 둘만의 공간에서 꽁냥거리고 있으면 엄청나게 두근거린다."

[[dialogue]]
speaker = "ルリエル"
original = "「んぅちゅる、んぅれぇ、れりゅ、んちゅ～……ぷぁあ<emoji=heart04>\u3000ルリエル、何回もエッチしてきたから……わかっちゃいます<emoji=heart04>」"
translation = "「응으 츄릅, 응으레, 레류, 응츄~…… 푸아아<emoji=heart04> 루리엘, 몇 번이나 엣찌해 봐서…… 알 것 같아요<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「会長さん、ルリエルの香りでドキドキ、しちゃってますよね……？」"
translation = "「회장님, 루리엘의 향기 때문에 두근, 거리시는 거죠……?」"

[[dialogue]]
speaker = "ルリエル"
original = "「恥ずかしいですけれど……会長さんなら大丈夫なのです<emoji=heart04>\u3000いっぱいくんくん、してくれていいですよ……？」"
translation = "「부끄럽지만…… 회장님이라면 괜찮아요<emoji=heart04> 마음껏 킁킁, 해주셔도 돼요……?」"

[[dialogue]]
speaker = "ルリエル"
original = "「今日もたくさん、ルリエルにえっちなこと、して欲しいのです……っ<emoji=heart04>」"
translation = "「오늘도 잔뜩, 루리엘에게 야한 짓, 해주셨으면 좋겠어요…… 읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ルリエルの可愛い衣装を少しだけはだけさせながら、ベッドに押し倒す。"
translation = "루리엘의 귀여운 의상을 살짝 들추며 침대로 밀어 넘어뜨린다."

[[dialogue]]
speaker = "ルリエル"
original = "「あっ<emoji=heart04>\u3000ふぁあっ<emoji=heart04>\u3000会長さん、そんなところまでくんくんしちゃ、だめぇ<emoji=heart04>\u3000だめなのですぅ……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 흣아앗<emoji=heart04> 회장님, 그런 곳까지 킁킁거리시면 안 돼요오<emoji=heart04> 안 되는 거예요오……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "偶然、甘い香りが強くなるポイントを見つけてしまった俺は、夢中でそこへ愛撫を続けてしまい──"
translation = "우연히 달콤한 향기가 강해지는 포인트를 찾아버린 나는, 정신없이 그곳을 애무하기 시작해──"

[[dialogue]]
speaker = "ルリエル"
original = "「ひぁっ……<emoji=heart04>\u3000はぁ、あぁぁっ……ふぅうっ……<emoji=heart04>」"
translation = "「히앗……<emoji=heart04> 하아, 아아앗…… 흐으읏……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ルリエルの体の中でも一際、花の香りが強い場所──それは<ruby>腋<rt>わき</rt></ruby>だった。"
translation = "루리엘의 몸 중에서도 유독 꽃향기가 강한 곳── 그곳은 겨드랑이였다."

[[dialogue]]
speaker = "ルリエル"
original = "「今日の会長さんっ……ちょ、ちょっぴりヘンタイさんっぽいのですぅ<emoji=heart04>\u3000ルリエルの恥ずかしい所、そんなに舐めちゃ……ふぁあっ<emoji=heart04>」"
translation = "「오늘의 회장님…… 조, 조금 변태 같으셔요오<emoji=heart04> 루리엘의 부끄러운 곳을 그렇게 핥으시면…… 흣아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ルリエルのすべすべの腋は舌触りがとてもよくて──花の蜜に吸い寄せられる蜂みたいに、歯止めが利かなくなってしまった。"
translation = "루리엘의 매끄러운 겨드랑이는 혀의 감촉이 너무 좋아서── 꽃꿀에 이끌린 벌처럼, 브레이크가 걸리지 않게 되어버렸다."

[[dialogue]]
speaker = "ルリエル"
original = "「あ、あぁあっ<emoji=heart04>\u3000ひぅ、んんぅ<emoji=heart04>\u3000おくちや、ほっぺのチューは経験してました、けどぉっ……<emoji=heart04>」"
translation = "「아, 아아앗<emoji=heart04> 히우, 응으으<emoji=heart04> 입이나 볼에 츄 하는 건 경험해 봤, 지만요오……<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「ふうぅ、あっ、ぁああっ……<emoji=heart04>\u3000腋なんて舐めて、楽しいのです、かぁっ……？」"
translation = "「후우으, 앗, 아아앗……<emoji=heart04> 겨드랑이 같은 걸 핥아서, 즐거우신, 건가요오……?」"

[[dialogue]]
speaker = "unk"
original = "ルリエルが興奮して汗をかけばかくほど、花の香りが強くなる。くらくらして、ムラムラがどんどん高まっていく──"
translation = "루리엘이 흥분해서 땀을 흘리면 흘릴수록 꽃향기가 강해진다. 어질어질하고, 욕정이 점점 고조되어 간다──"

[[dialogue]]
speaker = "unk"
original = "もちろんルリエルが本当に嫌そうだったら、こんなことはしないのだけれど……"
translation = "물론 루리엘이 정말로 싫어했다면 이런 짓은 하지 않았겠지만……"

[[dialogue]]
speaker = "ルリエル"
original = "「ふわぁぁ<emoji=heart04>\u3000もちろん、嫌じゃないですぅ……<emoji=heart04>\u3000ルリエルも、初めての経験なのでっ──えへへっ<emoji=heart04>\u3000ドキドキ、しちゃってますっ<emoji=heart04>」"
translation = "「후와아아<emoji=heart04> 물론, 싫지 않아요……<emoji=heart04> 루리엘도, 첫 경험이라서── 에헤헤<emoji=heart04> 두근, 거리고 있어요<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「恋人同士、ですからぁ……<emoji=heart04>\u3000はぁあぁんっ<emoji=heart04>\u3000他の人には言えないような、えっちなことも、どんとこい、なのです～<emoji=heart04>\u3000ふわぁっ<emoji=heart04>」"
translation = "「연인 사이니까요……<emoji=heart04> 하아아앙앗<emoji=heart04> 다른 사람에게는 말 못 할 야한 짓도, 얼마든지 환영이에요~<emoji=heart04> 후와앗<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「ひぁあ、んんぅ<emoji=heart04>\u3000くすぐったさと、恥ずかしさとっ……あ、あぁあっ<emoji=heart04>\u3000気持ちいいのが、ぞわぞわぁって<emoji=heart04>\u3000きちゃいますぅっ……<emoji=heart04>」"
translation = "「히아아, 응으으<emoji=heart04> 간지러움과, 부끄러움이…… 아, 아아앗<emoji=heart04> 기분 좋은 게, 조와조와하고<emoji=heart04> 느껴져요오……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺が腋舐めをしやすいように、ルリエルはしっかりと腕を持ち上げてくれている。"
translation = "내가 겨드랑이를 핥기 편하도록, 루리엘은 팔을 확실하게 들어 올려주고 있다."

[[dialogue]]
speaker = "ルリエル"
original = "「うううぅ、はぁ、はぁあ、あぁあっ<emoji=heart04>\u3000おち○ちん、すごいのですっ<emoji=heart04>\u3000見たことないくらい、ばっきばき……<emoji=heart04>」"
translation = "「우우우으, 하아, 하아아, 아아앗<emoji=heart04> 자지, 엄청나요오……<emoji=heart04> 본 적 없을 정도로, 빳빳하게……<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「か、会長さんっ……ルリエル、もう我慢できないのです<emoji=heart04>\u3000会長さんのおち○ちん……ルリエルのおま○こにぃ<emoji=heart04>」"
translation = "「회, 회장님…… 루리엘, 이제 참을 수 없어요<emoji=heart04> 회장님의 자지를…… 루리엘의 보지에에<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ヘコヘコと空腰を振りながら、可愛いおねだりをするルリエル。"
translation = "허리를 덜컹거리며 흔들면서 귀엽게 조르는 루리엘."

[[dialogue]]
speaker = "unk"
original = "その様子に俺の興奮も最高潮に達してしまい、ルリエルの女性器に、勃起したペニスをあてがうと──"
translation = "그 모습에 나의 흥분도 최고조에 달해, 루리엘의 여성기(보지)에 발기한 페니스를 갖다 대자──"

[[dialogue]]
speaker = "ルリエル"
original = "「ふわぁ、あぁあっ<emoji=heart04>\u3000あ、あぁあ～～～っ<emoji=heart04>」"
translation = "「후와아, 아아앗<emoji=heart04> 아, 아아아~~~앗<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「あ、はぁああ～っ……<emoji=heart04>\u3000ずぷぅ～って一気に、入れてもらっちゃいましたぁっ<emoji=heart04>\u3000えへへへへへぇ<emoji=heart04>」"
translation = "「아, 하아아아~앗……<emoji=heart04> 즈푸우~ 하고 한 번에, 넣어주셨어요오오앗<emoji=heart04> 에헤헤헤헤헤<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ルリエルも腋舐め愛撫の気持ちよさで昂っていたのだろうか。ほとんど触っていないにも関わらず、膣内はとろとろに濡れそぼっていた。"
translation = "루리엘도 겨드랑이 애무의 쾌감으로 달아올랐던 걸까. 거의 건드리지 않았음에도 질 안은 끈적하게 젖어 있었다."

[[dialogue]]
speaker = "ルリエル"
original = "「あぁぁんっ<emoji=heart04>\u3000会長さん、う、動いてくださいっ<emoji=heart04>\u3000はぁぁっ<emoji=heart04>\u3000おち○ちんで、いっぱいパンパン、して欲しいのですぅっ<emoji=heart04>」"
translation = "「아아앙앗<emoji=heart04> 회장님, 우, 움직여주세요오앗<emoji=heart04> 하아앗<emoji=heart04> 자지로, 잔뜩 빵빵하게, 해줬으면 좋겠어요오읏<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「あぁあんっ<emoji=heart04>\u3000ふわあぁぁっ<emoji=heart04>\u3000あ、ぁああっ……んんぅっ<emoji=heart04>\u3000ふぅっ、ふぁああっ……はぁっ、あぅうっ<emoji=heart04>」"
translation = "「아아앙앗<emoji=heart04> 후와아아앗<emoji=heart04> 아, 아아앗…… 응으읏<emoji=heart04> 흐읏, 흣아앗…… 하앗, 아우으읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "側位のまま密着して、ペニスをじっくりとストロークしていく──もちろん、ルリエルの甘い腋を舐めながら。"
translation = "측위 상태로 밀착해 페니스를 차분히 스트로크해 나간다── 물론, 루리엘의 달콤한 겨드랑이를 핥으면서."

[[dialogue]]
speaker = "ルリエル"
original = "「ふわぁあっ……<emoji=heart04>\u3000はぁあ、あっ……ふぅ、んん～っ<emoji=heart04>\u3000こ、これぇっ……すごい、のですっ<emoji=heart04>」"
translation = "「후와아앗……<emoji=heart04> 하아아, 앗…… 흐으, 응으~읏<emoji=heart04> 이, 이거어…… 엄청나요, 읏<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「おま○こ、優しくトントンされてぇ<emoji=heart04>\u3000あぁあっ、気持ちいいのとっ<emoji=heart04>\u3000えっちな腋舐めで、くすぐったのが、同時にぃっ<emoji=heart04>\u3000ひぅう<emoji=heart04>」"
translation = "「보지, 부드럽게 툭툭 건드려져서어<emoji=heart04> 아아앗, 기분 좋은 거랑<emoji=heart04> 야한 겨드랑이 핥기가, 동시에에읏<emoji=heart04> 히우우<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「全身、ゾクゾクしちゃうのですぅ<emoji=heart04>\u3000あぁあっ<emoji=heart04>\u3000うぅう、んんんっ……<emoji=heart04>\u3000ひあぁあっ<emoji=heart04>\u3000会長さん、ぺろぺろ、もっとしてぇっ<emoji=heart04>」"
translation = "「전신이, 짜릿짜릿해요오<emoji=heart04> 아아앗<emoji=heart04> 우으으, 응응응읏……<emoji=heart04> 히아아앗<emoji=heart04> 회장님, 페로페로, 더 해주세요오읏<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「あぁああっ<emoji=heart04>\u3000ルリエルの腋、いっぱい楽しんで、欲しいのですぅ<emoji=heart04>\u3000ひぁあぁあっ……あっ、あぁあっ……<emoji=heart04>」"
translation = "「아아아앗<emoji=heart04> 루리엘의 겨드랑이, 잔뜩 즐겨주셨으면 좋겠어요오<emoji=heart04> 히아아아앗…… 앗, 아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ルリエルの真っ白でつやつやの腋を舐めるたびに、ぎゅっ、ぎゅっ、と膣内の締まりが強くなる。"
translation = "루리엘의 새하얗고 매끄러운 겨드랑이를 핥을 때마다, 꽉, 꽉, 하고 질 안의 조임이 강해진다."

[[dialogue]]
speaker = "unk"
original = "くすぐったい気持ちが、少しずつ快感に変わり始めているのか──舐めるだけでなく、キスをしたり、吸い付いたり。思いつく限りの腋舐め愛撫を行う。"
translation = "간지러운 기분이 조금씩 쾌감으로 바뀌기 시작한 건지── 핥는 것뿐만 아니라 키스를 하거나, 빨아들이기도 한다. 생각나는 대로 겨드랑이 애무를 수행한다."

[[dialogue]]
speaker = "ルリエル"
original = "「あぁあんっ<emoji=heart04>\u3000そ、それぇっ<emoji=heart04>\u3000だめっ<emoji=heart04>\u3000だめなのですぅっ<emoji=heart04>\u3000ちゅーって吸ったら、らめぇ<emoji=heart04>\u3000ひぁあ、ぁああっ……<emoji=heart04>」"
translation = "「아아앙앗<emoji=heart04> 그, 그거어읏<emoji=heart04> 안돼<emoji=heart04> 안 되는 거예요오읏<emoji=heart04> 츄~ 하고 빨면, 안 돼애<emoji=heart04> 히아아, 아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「気持ちいいっ<emoji=heart04>\u3000あぁあっ、えっちなペロペロっ<emoji=heart04>\u3000おち○ちん、ずぷずぷっ<emoji=heart04>\u3000両方、気持ちいいのですぅっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>」"
translation = "「기분 좋아아<emoji=heart04> 아아앗, 야한 페로페로읏<emoji=heart04> 자지, 즈푸즈푸읏<emoji=heart04> 둘 다, 기분 좋아요오읏<emoji=heart04> 흐으읏<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「あ、あぁっ<emoji=heart04>\u3000ルリエルも、わかって、きましたぁっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000ふわふわって<emoji=heart04>\u3000ルリエルからお花の、香りっ<emoji=heart04>\u3000ひぁああっ<emoji=heart04>」"
translation = "「아, 아아앗<emoji=heart04> 루리엘도, 알게, 되었어요오읏<emoji=heart04> 앙앗<emoji=heart04> 폭신폭신하게<emoji=heart04> 루리엘한테서 꽃향기가아읏<emoji=heart04> 히아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「あまい香りっ<emoji=heart04>\u3000いっぱいしてるの、ですぅっ<emoji=heart04>\u3000あぁんっ<emoji=heart04>\u3000はぁあ、うぅんっ<emoji=heart04>\u3000おへその奥、キュンキュン<emoji=heart04>\u3000しちゃいますぅっ<emoji=heart04>」"
translation = "「달콤한 향기가아읏<emoji=heart04> 잔뜩 나고, 있어요오읏<emoji=heart04> 아아앙앗<emoji=heart04> 하아아, 우으응읏<emoji=heart04> 배꼽 안쪽이, 큥큥<emoji=heart04> 해버려요오읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺を惑わせるルリエルの花の香りの濃さが、凄いことになっている。とうとうルリエル自身にもその香りがわかるほど、濃くなってしまっていたようだった。"
translation = "나를 현혹하는 루리엘의 꽃향기 농도가 엄청나게 진해졌다. 결국 루리엘 자신도 그 향기를 알 수 있을 정도로 진해진 모양이었다."

[[dialogue]]
speaker = "unk"
original = "途端に、じゅわぁぁっ──とペニスへ絡む愛液の量が増して、俺も背筋が震えてしまう。"
translation = "순간, 쥬와아앗── 하고 페니스에 얽히는 애액의 양이 늘어나 나도 등골이 떨려온다."

[[dialogue]]
speaker = "ルリエル"
original = "「はぇえぇっ<emoji=heart04>\u3000ふわあぁんっ<emoji=heart04>\u3000会長さんっ……ちょ、ちょっとだけ、こっちもぉ<emoji=heart04>\u3000おくちもぉっ……<emoji=heart04>」"
translation = "「하에에읏<emoji=heart04> 후와아앙앗<emoji=heart04> 회장님…… 조, 조금만, 여기도오<emoji=heart04> 입도오읏……<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「あぁあっ<emoji=heart04>\u3000腋も気持ちいい、ですけどぉ……<emoji=heart04>\u3000おくち同士のチューも、したいの、ですぅ～っ<emoji=heart04>」"
translation = "「아아앗<emoji=heart04> 겨드랑이도 기분 좋지만요……<emoji=heart04> 입과 입의 츄도, 하고 싶어요오~읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "れぇ～っ、と舌を出してキスハメをおねだりしてくるルリエル。こんなの、我慢できるわけもなく──"
translation = "레에~ 하며 혀를 내밀고 키스 함을 조르는 루리엘. 이런 걸 참을 수 있을 리가 없고──"

[[dialogue]]
speaker = "ルリエル"
original = "「んぅちゅるぅ<emoji=heart04>\u3000ふぅむむぅ<emoji=heart04>\u3000れぇ、りゅぅ<emoji=heart04>\u3000会長さんっ、んちゅぅ<emoji=heart04>\u3000おくち<emoji=heart04>\u3000とっても、あまい、のれすぅっ……んぅう<emoji=heart04>」"
translation = "「응으츄르우<emoji=heart04> 흐으무무으<emoji=heart04> 레에, 리우우<emoji=heart04> 회장님, 응츄우<emoji=heart04> 입<emoji=heart04> 너무, 달콤, 해요오읏…… 응으으<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺の方へ顔を反らせるルリエルと、深いキスを交わす。"
translation = "나를 향해 얼굴을 돌리는 루리엘과 깊은 키스를 나눈다."

[[dialogue]]
speaker = "ルリエル"
original = "「んぅちゅる<emoji=heart04>\u3000しゅき、れす<emoji=heart04>\u3000会長しゃぁん<emoji=heart04>\u3000んちゅれりゅ、んむちゅるれりゅっ<emoji=heart04>\u3000しゅきぃ<emoji=heart04>\u3000んちゅぅる<emoji=heart04>\u3000れられられらぁ<emoji=heart04>」"
translation = "「응으츄르<emoji=heart04> 죠아, 해요<emoji=heart04> 회장니임<emoji=heart04> 응츄레류, 응무츄르레류읏<emoji=heart04> 죠아아<emoji=heart04> 응츄우르<emoji=heart04> 레라레라레라아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "上も下もどろどろになって繋がって、もうお互いの体の境目もわからない。"
translation = "위도 아래도 질척하게 연결되어, 이제 서로의 몸의 경계조차 알 수 없다."

[[dialogue]]
speaker = "ルリエル"
original = "「あまい香り、ふわふわしましゅっ……<emoji=heart04>\u3000んぅうぅ<emoji=heart04>\u3000れりゅれりゅ、ちゅるちゅぱ<emoji=heart04>\u3000頭の中、からっぽに、なっちゃいましゅ<emoji=heart04>\u3000はむぅ<emoji=heart04>」"
translation = "「달콤한 향기, 폭신폭신해요오……<emoji=heart04> 응으으으<emoji=heart04> 레류레류, 츄르츄파<emoji=heart04> 머릿속이, 텅 비어, 버려요오<emoji=heart04> 하무우<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "びっしょりと汗に濡れたルリエルのおっぱいを、ぎゅうとわし掴む。ペニスを出し入れしやすいよう、彼女の脚もさらにがっちりと捕まえる。"
translation = "땀에 흠뻑 젖은 루리엘의 가슴을 꽉 움켜쥔다. 페니스를 출입하기 쉽게 그녀의 다리도 더욱 단단히 붙잡는다."

[[dialogue]]
speaker = "ルリエル"
original = "「ふぅうっ<emoji=heart04>\u3000んぅむむぅっ<emoji=heart04>\u3000ちゅるうぅ、んちゅれぇ、れりゅじゅるっ<emoji=heart04>\u3000会長しゃん、んちゅんちゅれりゅっ──ぷぁあっ<emoji=heart04>」"
translation = "「흐으읏<emoji=heart04> 응으무무읏<emoji=heart04> 츄르우우, 응츄레에, 레류쥬르읏<emoji=heart04> 회장님, 응츄응츄레류읏── 푸아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「はーっ<emoji=heart04>\u3000はぁあっ<emoji=heart04>\u3000ふぅぅうっ<emoji=heart04>\u3000あぁあぁっ！\u3000もっと強いの、欲しいのですっ<emoji=heart04>\u3000おま○こ、幸せになっちゃうくらいっ<emoji=heart04>\u3000パンパン、欲しいのですぅっ<emoji=heart04>」"
translation = "「하아앗<emoji=heart04> 하아앗<emoji=heart04> 흐으으읏<emoji=heart04> 아아아앗! 더 강한 거, 원해요오읏<emoji=heart04> 보지, 행복해질 정도로읏<emoji=heart04> 빵빵하게, 원해요오읏<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「腋もぉ<emoji=heart04>\u3000あぁあんっ<emoji=heart04>\u3000ルリエルの腋も、さっきみたいにぺろぺろしてくださぁいっ<emoji=heart04>\u3000ルリエルの腋、おま○こみたいに、敏感になっちゃったのですぅ<emoji=heart04>」"
translation = "「겨드랑이도오<emoji=heart04> 아아앙앗<emoji=heart04> 루리엘의 겨드랑이도, 아까처럼 페로페로 해주세요오읏<emoji=heart04> 루리엘의 겨드랑이, 보지처럼, 민감해져 버렸어요오<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「はふぅぅん<emoji=heart04>\u3000だから……いっぱい舐めて、愛してほしいのですぅっ<emoji=heart04>」"
translation = "「하푸우응<emoji=heart04> 그러니까…… 잔뜩 핥아서, 사랑해 줬으면 좋겠어요오읏<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「んぁあぁぁあっ！？\u3000あっあっあっあっあっ<emoji=heart04>\u3000はぁ、んぅぅっ<emoji=heart04>\u3000あっあっあっ<emoji=heart04>\u3000あっあっあっあっ、あぁぁぁあ～っ<emoji=heart04>」"
translation = "「응아아아앗!? 앗앗앗앗앗<emoji=heart04> 하아, 응으읏<emoji=heart04> 앗앗앗<emoji=heart04> 앗앗앗앗, 아아아아~앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ピストンを激しいものに変えて、喉の渇きを癒すようにルリエルの腋に夢中で吸い付く。"
translation = "피스톤을 격렬하게 바꾸고, 목마름을 달래듯 루리엘의 겨드랑이를 정신없이 빨아들인다."

[[dialogue]]
speaker = "ルリエル"
original = "「おち○ちん、激しっ<emoji=heart04>\u3000激しいのですぅっ<emoji=heart04>\u3000あぁああっ、嬉しいっ<emoji=heart04>\u3000おま○こ幸せになっちゃいます～っ<emoji=heart04>」"
translation = "「자지, 격렬해읏<emoji=heart04> 격렬해요오읏<emoji=heart04> 아아아앗, 기뻐요읏<emoji=heart04> 보지 행복해져 버려요~읏<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「んぁああっ<emoji=heart04>\u3000腋もぉっ<emoji=heart04>\u3000あ、ああぁぁっ<emoji=heart04>\u3000もぉくすぐったく、ないですっ<emoji=heart04>」"
translation = "「응아아앗<emoji=heart04> 겨드랑이도오읏<emoji=heart04> 아, 아아아앗<emoji=heart04> 더는 간지럽지, 않아요오읏<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
original = "「気持ちいいっ<emoji=heart04>\u3000あっあっあっ<emoji=heart04>\u3000気持ちよすぎるのですぅっ<emoji=heart04>\u3000頭ばちばち、すりゅぅっ<emoji=heart04>\u3000ふぁあ、あっあっあっあっ──あぁあ～っ<emoji=heart04>」"
translation = "「기분 좋아읏<emoji=heart04> 앗앗앗<emoji=heart04> 너무 기분 좋아요오읏<emoji=heart04> 머리 찌릿찌릿, 해여어읏<emoji=heart04> 후와아, 앗앗앗앗── 아아아~앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスを打ち込むたび、引き抜くたび、そして腋を舐めるたびに、ルリエルの全身がびくびくと小刻みな震えを繰り返す。"
translation = "페니스를 박아 넣을 때마다, 뽑아낼 때마다, 그리고 겨드랑이를 핥을 때마다 루리에르의 전신이 움찔거리며 잘게 떨림을 반복한다."

[[dialogue]]
speaker = "unk"
original = "おっぱいも汗だくで、俺の手の平に吸い付いて離れない。乳房を揉みながら、乳首を摘まんで、ルリエルに快感を送り続ける。"
translation = "가슴도 땀범벅이 되어 내 손바닥에 달라붙어 떨어지지 않는다. 유방을 주무르며 유두를 꼬집어 루리에르에게 쾌감을 계속해서 보낸다."

[[dialogue]]
speaker = "ルリエル"
original = "「あひぃ<emoji=heart04>\u3000あっあっあっ<emoji=heart04>\u3000はぁあ、んぅっ<emoji=heart04>\u3000ひぁああ、あぁ、ああぁあっ<emoji=heart04>\u3000おかしく、おかしくなっちゃいますぅ<emoji=heart04>」"
translation = "「아히이♥ 앗앗앗♥ 하아, 응읏♥ 히아아아, 아아, 아아앗♥ 이상해, 이상해져 버려요오♥」"

[[dialogue]]
speaker = "ルリエル"
original = "「あぁぁっ<emoji=heart04>\u3000どこに集中したら、いいのかっ<emoji=heart04>\u3000わからな──あひぃっ<emoji=heart04>\u3000ぁあっ<emoji=heart04>\u3000腋っ<emoji=heart04>\u3000ちゅうちゅうらめぇえっ<emoji=heart04>」"
translation = "「아아앗♥ 어디에 집중해야, 좋은 건지♥ 모르겠──아히이잇♥ 아앗♥ 겨드랑이♥ 츄우츄우 안 돼애애엣♥」"

[[dialogue]]
speaker = "unk"
original = "──ダメならやめようか？\u3000なんて、意地悪なことも問いかけられない。"
translation = "──안 되면 그만둘까? 라고, 심술궂은 질문조차 할 수 없었다."

[[dialogue]]
speaker = "unk"
original = "俺自身、恋人の可愛らしい痴態に興奮が止められなかった。"
translation = "나 자신도 연인의 사랑스러운 치태에 흥분을 멈출 수 없었다."

[[dialogue]]
speaker = "ルリエル"
original = "「ふぅんんんっ<emoji=heart04>\u3000ひぁああっ<emoji=heart04>\u3000あぁっ<emoji=heart04>\u3000ふぁあ、あぁあっ<emoji=heart04>\u3000腋舐めえっち<emoji=heart04>\u3000しゅごっ<emoji=heart04>\u3000しゅごいのれしゅっ<emoji=heart04>\u3000んんぅっ<emoji=heart04>」"
translation = "「후응응응♥ 히아아앗♥ 아아앗♥ 후아, 아아앗♥ 겨드랑이 핥기 야해♥ 츄고옷♥ 츄고이(대단해)요오♥ 응응읏♥」"

[[dialogue]]
speaker = "ルリエル"
original = "「もっとペロペロ、激しくしてぇっ<emoji=heart04>\u3000会長さんっ<emoji=heart04>\u3000あ、ぅっ<emoji=heart04>\u3000あっあっあっあっ、はぁあ、ぁ、あぁ、あぁはぁっ<emoji=heart04>」"
translation = "「더 페로페로, 격렬하게 해줘어♥ 회장님♥ 아, 읏♥ 앗앗앗앗, 하아아, 아, 아아, 아아하아앗♥」"

[[dialogue]]
speaker = "ルリエル"
original = "「ぢゅーって吸って──ひぁああああっ<emoji=heart04>\u3000ペロペロしてぇっ──んんぅぅうう～っ<emoji=heart04>\u3000ふわあぁあっ<emoji=heart04>\u3000はへぇえっ<emoji=heart04>\u3000はへぇええっ<emoji=heart04>」"
translation = "「츄우 하고 빨아서──히아아아앗♥ 페로페로 해줘어──응응우우우~♥ 후아아앗♥ 하헤에엣♥ 하헤에에엣♥」"

[[dialogue]]
speaker = "unk"
original = "発情期の花のアロマに包まれて、ルリエルの可愛い喘ぎ声と女性器の反応を全身で感じて、俺も限界が近くなってきた。"
translation = "발정기 꽃의 아로마에 감싸여, 루리에르의 귀여운 교성과 여성기의 반응을 온몸으로 느끼며 나도 한계가 가까워져 왔다."

[[dialogue]]
speaker = "ルリエル"
original = "「んんぅうっ？\u3000ぁ、あ、あぁ～っ<emoji=heart04>\u3000おち○ちん、イキたがって、ましゅ<emoji=heart04>\u3000わかりましゅっ<emoji=heart04>\u3000きてぇ、あついせーえきっ<emoji=heart04>\u3000いっぱいぃ<emoji=heart04>」"
translation = "「응응우웃? 아, 아, 아아~♥ 자지, 가고 싶어, 해요♥ 알겠어요오♥ 와줘요, 뜨거운 정액♥ 잔뜩이요♥」"

[[dialogue]]
speaker = "ルリエル"
original = "「あんっあんっあんっあんっ<emoji=heart04>\u3000はぁぁあっ<emoji=heart04>\u3000すごいの来ちゃう、おま○こイっちゃいますぅっ<emoji=heart04>\u3000んぁあっ、ぁああぁっ<emoji=heart04>」"
translation = "「앙 앙 앙 앙♥ 하아아앗♥ 굉장한 게 나와버려, 보지 가버릴 것 같아요오옷♥ 응아앗, 아아아앗♥」"

[[dialogue]]
speaker = "ルリエル"
original = "「びゅうぅぅってぇ<emoji=heart04>\u3000赤ちゃんのお部屋にせーえきっ<emoji=heart04>\u3000あっ、ああ、あ、あああっ<emoji=heart04>\u3000びゅうぅってきてぇ！\u3000きてっきてっきてっ、きてぇっ<emoji=heart04><emoji=heart04>」"
translation = "「뷰우우 하고♥ 아기 방에 정액♥ 앗, 아아, 아, 아아앗♥ 뷰우우 하고 와줘요! 와줘 와줘 와줘, 와줘어♥」"

[[dialogue]]
speaker = "ルリエル"
original = "「あっあっあっあっあっ──イクっイクっ<emoji=heart04>\u3000イクイクイクイク──イっクぅぅううう～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗앗앗앗앗──가! 가!♥ 가 가 가 가──가아아아아아아~♥」"

[[dialogue]]
speaker = "ルリエル"
original = "「ふぇぁああぁああぁあぁあああああ～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「페아아아아아아아아아아아아~~♥」"

[[dialogue]]
speaker = "ルリエル"
original = "「あぁああぁあっ<emoji=heart04>\u3000ふわあぁっ<emoji=heart04>\u3000あぁあっ<emoji=heart04>\u3000あひぃっ──んん、んぁああああああ～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아아아아앗♥ 후아아앗♥ 아아앗♥ 아히잇──응응, 응아아아아아아아아~~♥」"

[[dialogue]]
speaker = "unk"
original = "どくん、どくん、どくん──と何度も何度もペニスが脈打つ。"
translation = "두근, 두근, 두근──하고 몇 번이고 페니스가 맥동한다."

[[dialogue]]
speaker = "ルリエル"
original = "「あったかい、のぉっ<emoji=heart04>\u3000会長さんのせーえきっ<emoji=heart04>\u3000びゅうびゅうっ<emoji=heart04>\u3000とまらない、のですぅ～～っ<emoji=heart04>」"
translation = "「따뜻해, 요오♥ 회장님의 정액♥ 뷰우뷰우♥ 멈추지, 않는 거예요오~~♥」"

[[dialogue]]
speaker = "unk"
original = "ルリエルの小さな女性器はなおも収縮を繰り返し、迸っている最中のペニスを揉みしだいていく。視界がチカチカするほどの快感に、俺も食いしばって射精を続けた。"
translation = "루리에르의 작은 여성기는 여전히 수축을 반복하며 사정 중인 페니스를 꽉 조여 온다. 시야가 번쩍거릴 정도의 쾌감에 나도 이를 악물고 사정을 계속했다."

[[dialogue]]
speaker = "unk"
original = "そうして──"
translation = "그리고──"

[[dialogue]]
speaker = "ルリエル"
original = "「ぁあっ……ぁあっ<emoji=heart04>\u3000はぁあっ<emoji=heart04>\u3000あ、ひぅぅ……<emoji=heart04>」"
translation = "「아앗……아앗♥ 하아앗♥ 아, 히우우……♥」"

[[dialogue]]
speaker = "ルリエル"
original = "「今日のえっち……す、すごかったのです～<emoji=heart04>\u3000あはぁあっ<emoji=heart04>\u3000なんだか、新しい扉が……開いちゃった感じなのです<emoji=heart04>」"
translation = "「오늘의 야한 짓……정, 정말 대단했어요~♥ 아하아앗♥ 왠지, 새로운 문이……열려버린 기분이에요♥」"

[[dialogue]]
speaker = "ルリエル"
original = "「会長さんも、すごい量のぴゅっぴゅ<emoji=heart04>\u3000してくれましたぁ……<emoji=heart04>\u3000気持ち、よかったですかぁ<emoji=heart04><emoji=heart04>」"
translation = "「회장님도, 엄청난 양을 퓨우퓨우♥ 해줬어요……♥ 기분, 좋았나요오♥」"

[[dialogue]]
speaker = "unk"
original = "完全に息が切れていた俺は、深く頷いて返事をした。"
translation = "완전히 숨이 찼던 나는 깊게 고개를 끄덕여 대답했다."

[[dialogue]]
speaker = "unk"
original = "ルリエルの香りにあてられて、夢中になって腋舐めセックス……色々経験してきた俺たちだけど、今回は少しヘンタイすぎたかも？"
translation = "루리에르의 향기에 취해 정신없이 겨드랑이 핥기 섹스…… 여러 가지를 경험해 온 우리지만, 이번엔 조금 변태가 너무 심했을지도?"

[[dialogue]]
speaker = "ルリエル"
original = "「えへへへへへへぇ<emoji=heart04>\u3000最初はちょっと恥ずかしかった、ですけど<emoji=heart04>\u3000それ以上に、とっても気持ちよかったのですぅ<emoji=heart04>」"
translation = "「에헤헤헤헤헤헤♥ 처음엔 조금 부끄러웠, 지만♥ 그 이상으로, 정말 기분 좋았어요오♥」"

[[dialogue]]
speaker = "ルリエル"
original = "「会長さん、だいすきなのです<emoji=heart04>\u3000これからも、いろんなえっち……ルリエルと経験しちゃいましょう<emoji=heart04>」"
translation = "「회장님, 정말 좋아해요♥ 앞으로도, 여러 가지 야한 짓……루리에르랑 경험해 봐요♥」"

[[dialogue]]
speaker = "ルリエル"
original = "「会長さんとなら、どんなエッチでも……ぜったいに、幸せいっぱいなのです<emoji=heart04>」"
translation = "「회장님과 함께라면, 어떤 야한 짓이라도……절대로, 행복 가득이에요♥」"

[[dialogue]]
speaker = "unk"
original = "絶頂後のとろけ顔のまま、いじらしいことを言ってくれるルリエルに、優しくキスをする。"
translation = "절정 후의 녹아내린 얼굴인 채로, 사랑스러운 말을 해주는 루리에르에게 다정하게 키스한다."

[[dialogue]]
speaker = "ルリエル"
original = "「んぅ……ちゅ<emoji=heart04>\u3000ちゅぅ……んちゅぅ……<emoji=heart04>」"
translation = "「응우……츄♥ 츄우……응츄우……♥」"

[[dialogue]]
speaker = "ルリエル"
original = "「えへへっ<emoji=heart04>\u3000ルリエル、会長さんとのキスも大好きなのです<emoji=heart04>\u3000んぅ～……ちゅぷっ<emoji=heart04>」"
translation = "「에헤헤♥ 루리에르, 회장님과의 키스도 정말 좋아요♥ 응우~……츄풋♥」"

[[dialogue]]
speaker = "unk"
original = "むせかえるほどに甘ったるい、花の香りに包まれながら。"
translation = "숨이 막힐 정도로 달콤한 꽃향기에 감싸이면서."

[[dialogue]]
speaker = "unk"
original = "俺たちは日が暮れるまで、甘いキスとセックスを続けてしまうのだった──"
translation = "우리는 해가 질 때까지 달콤한 키스와 섹스를 계속하고 말았다──"

