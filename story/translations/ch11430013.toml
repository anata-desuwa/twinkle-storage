[[dialogue]]
speaker = "unk"
original = "第３話,パン大好きな藝術家,P"
translation = "제3화, 빵을 아주 좋아하는 예술가"

[[dialogue]]
speaker = "ラファエロ"
original = "「ん～～♪\u3000ここのパンも絶品だね。焼き加減も抜群。香りも最高だ」"
translation = "「음~~♪ 여기 빵도 일품이네. 굽기 정도도 발군. 향기도 최고야」"

[[dialogue]]
speaker = "蛍火"
original = "「気に入っていただけて良かったです。パン、お好きなんですね」"
translation = "「마음에 드셨다니 다행입니다. 빵을 좋아하시는군요」"

[[dialogue]]
speaker = "ラファエロ"
original = "「ああ、ぼくはパンには目がなくてね」"
translation = "「아아, 나는 빵이라면 사족을 못 쓰거든」"

[[dialogue]]
speaker = "ラファエロ"
original = "「自分でも焼くこともあるし、人に振る舞えば、涙を流して喜んでもらえる程度には腕に自信があるよ」"
translation = "「직접 굽기도 하고, 남에게 대접하면 눈물을 흘리며 기뻐할 정도로 실력에는 자신이 있어」"

[[dialogue]]
speaker = "サラン"
original = "「ラファエロちゃん、絵だけじゃなくてパン作りも上手なんだ～」"
translation = "「라파엘로 짱, 그림뿐만 아니라 빵 굽기도 잘하는구나~」"

[[dialogue]]
speaker = "ラファエロ"
original = "「ふふ、それほどでもあるけどね」"
translation = "「후후, 그 정도까지는 아니지만 말이야」"

[[dialogue]]
speaker = "ラファエロ"
original = "「こっちに来てからもパンを食べ歩いているけれど、どこのお店も美味しいね」"
translation = "「이곳에 오고 나서도 빵을 먹으러 다니고 있지만 어느 가게든 맛있네」"

[[dialogue]]
speaker = "ラファエロ"
original = "「２枚の丸いパンに肉の塊が挟まっているかと思えば、甘い豆が入っていたりと、面白いものばかりだ」"
translation = "「동그란 빵 두 개 사이에 고기 덩어리가 끼워져 있는가 하면, 달콤한 콩이 들어있기도 하고, 재미있는 것들뿐이야」"

[[dialogue]]
speaker = "unk"
original = "甘い豆が入ってるのは、あんパンだね"
translation = "달콤한 콩이 들어있는 건 단팥빵이야"

[[dialogue]]
speaker = "unk"
original = "肉が挟まっているのは、ハンバーガーだね"
translation = "고기가 끼워져 있는 건 햄버거네"

[[dialogue]]
speaker = "ラファエロ"
original = "「そうそう、そんな名前だったよ。また食べたいな」"
translation = "「그래그래, 그런 이름이었지. 또 먹고 싶네」"

[[dialogue]]
speaker = "ラファエロ"
original = "「しかも、どのお店もバラエティに富んでいて独自性があるね。食感も変わったものが多い」"
translation = "「게다가 어느 가게든 버라이어티가 풍부하고 독자성이 있어. 식감도 특이한 게 많고」"

[[dialogue]]
speaker = "サラン"
original = "「ふわふわ～だったり、もちもち～だったりするよね～」"
translation = "「폭신폭신~ 하거나 쫀득쫀득~ 하기도 하죠~」"

[[dialogue]]
speaker = "ラファエロ"
original = "「うん、あのモチッとした食感は楽しいね。アテネスのパンにはないものだよ」"
translation = "「응, 그 쫀득한 식감은 즐거워. 아테네스의 빵에는 없는 거야」"

[[dialogue]]
speaker = "ラファエロ"
original = "「あれはどうやって作るんだい？\u3000そもそも粉が違うのかな」"
translation = "「저건 어떻게 만드는 거니? 애초에 가루가 다른 걸까」"

[[dialogue]]
speaker = "サラン"
original = "「小麦粉だけじゃなくって～、米粉とかタピオカ粉も使ってるから～？」"
translation = "「밀가루뿐만 아니라~ 쌀가루나 타피오카 가루도 쓰니까~?」"

[[dialogue]]
speaker = "ラファエロ"
original = "「米粉に、タピオカ粉……？\u3000なるほど、麦だけにこだわらずとも、こんなに美味しいパンが作れるのか……」"
translation = "「쌀가루에 타피오카 가루……? 과연, 밀에만 집착하지 않아도 이렇게 맛있는 빵을 만들 수 있는 건가……」"

[[dialogue]]
speaker = "蛍火"
original = "「それと湯種製法でしょうか」"
translation = "「그리고 탕종법일까요」"

[[dialogue]]
speaker = "ラファエロ"
original = "「ゆだね……？\u3000湯種とは一体、何を指す言葉なんだい？」"
translation = "「유다네……? 탕종이란 대체 무엇을 가리키는 말이니?」"

[[dialogue]]
speaker = "蛍火"
original = "「熱湯でこねて、一晩寝かせておいたパン生地のことです」"
translation = "「끓는 물로 반죽해서 하룻밤 재워둔 빵 반죽을 말합니다」"

[[dialogue]]
speaker = "ラファエロ"
original = "「そんなやり方があるのか！\u3000素材だけではなく、手法にも違いがあったとは」"
translation = "「그런 방법이 있다니! 소재뿐만 아니라 수법에도 차이가 있었군」"

[[dialogue]]
speaker = "蛍火"
original = "「はい。パンをこねる際に、何割か湯種を混ぜこむことで、もちっとした食感が生まれるんです」"
translation = "「네. 빵을 반죽할 때 몇 할 정도 탕종을 섞음으로써 쫀득한 식감이 생기는 거예요」"

[[dialogue]]
speaker = "ラファエロ"
original = "「小麦粉以外の粉に湯種か……その発想はなかったな。ぼくともあろうものが、固定観念に囚われていたようだ」"
translation = "「밀가루 이외의 가루에 탕종이라…… 그 발상은 없었네. 나 정도 되는 자가 고정관념에 사로잡혀 있었던 모양이야」"

[[dialogue]]
speaker = "ラファエロ"
original = "「パンはもっと自由な発想で作っていいんだね！\u3000異邦の地は学びが多い！」"
translation = "「빵은 좀 더 자유로운 발상으로 만들어도 되는 거구나! 이방의 땅은 배울 게 많아!」"

[[dialogue]]
speaker = "ラファエロ"
original = "「ありがとう。アテネスに帰ってからの楽しみが増えたよ」"
translation = "「고마워. 아테네스로 돌아가서의 즐거움이 늘었어」"

[[dialogue]]
speaker = "蛍火"
original = "「礼には及びません。せっかくなら、こちらでも腕をふるってみてはいかがですか？」"
translation = "「인사하실 것까지는 없습니다. 이왕이면 여기서도 솜씨를 발휘해 보시는 건 어떠세요?」"

[[dialogue]]
speaker = "サラン"
original = "「ラファエロちゃんの作るパン、食べてみたいな～。異世界の人が作るパン、美味しそう～」"
translation = "「라파엘로 짱이 만드는 빵, 먹어보고 싶어~. 이세계 사람이 만드는 빵, 맛있을 것 같아~」"

[[dialogue]]
speaker = "unk"
original = "アテネス仕込みのパン、食べてみたい！"
translation = "아테네스 정통 빵, 먹어보고 싶어!"

[[dialogue]]
speaker = "ラファエロ"
original = "「もちろんいいとも！\u3000いろいろ教えてくれたたお礼に、筆だけでなく、パン作りの腕もふるうとしよう」"
translation = "「물론 좋고말고! 여러 가지 가르쳐 준 보답으로 붓뿐만 아니라 빵 굽는 실력도 발휘해 보도록 하지」"

[[dialogue]]
speaker = "ラファエロ"
original = "「ぼくのパンが異世界でどんな進化を遂げるか、見せてあげようじゃないか！」"
translation = "「나의 빵이 이세계에서 어떤 진화를 이룰지 보여주지 않겠어!」"

[[dialogue]]
speaker = "ラファエロ"
original = "「さぁ、焼けたよ！\u3000こっちに来てからぼくが初めて焼いたパンだ！\u3000ご賞味あれ！」"
translation = "「자, 다 구워졌어! 이쪽에 오고 나서 내가 처음으로 구운 빵이야! 맛보도록 해!」"

[[dialogue]]
speaker = "サラン"
original = "「はむっ……わぁ、周りはサクッとしてて、中はもちもちふわふわ～……！」"
translation = "「함냐…… 와아, 겉은 바삭하고 속은 쫀득폭신해~!」"

[[dialogue]]
speaker = "ラファエロ"
original = "「どうかな、会長。きみの舌には合ったかい？」"
translation = "「어떠니, 회장. 네 입맛에는 맞니?」"

[[dialogue]]
speaker = "unk"
original = "すごく美味しいよ！"
translation = "정말 맛있어!"

[[dialogue]]
speaker = "蛍火"
original = "「小麦本来の味や香りを豊かに感じられます……見事な腕前ですね」"
translation = "「밀 본연의 맛과 향을 풍부하게 느낄 수 있네요…… 훌륭한 솜씨입니다」"

[[dialogue]]
speaker = "サラン"
original = "「ラファエロちゃんのパン、とっても美味し～♪」"
translation = "「라파엘로 짱의 빵, 정말 맛있어~♪」"

[[dialogue]]
speaker = "ラファエロ"
original = "「ふふ、ぼくはパンを焼くのも天才だからね！」"
translation = "「후후, 나는 빵을 굽는 것도 천재니까!」"

[[dialogue]]
speaker = "サラン"
original = "「あ、でも～、このままでもとっても美味しいけど、もっと美味しくする方法がありそう～」"
translation = "「아, 그래도~ 이대로도 정말 맛있지만 더 맛있게 만드는 방법이 있을 것 같아~」"

[[dialogue]]
speaker = "ラファエロ"
original = "「本当かい？\u3000それは是非とも聞かせてほしいな」"
translation = "「정말이니? 그건 꼭 좀 들려줬으면 좋겠네」"

[[dialogue]]
speaker = "蛍火"
original = "「ラファエロ様さえよろしければ、またカフェテリアのパン窯をお使いください」"
translation = "「라파엘로 님만 괜찮으시다면 또 카페테리아의 빵 가마를 사용해 주세요」"

[[dialogue]]
speaker = "ラファエロ"
original = "「ありがとう。こっちにいる間の楽しみがまた増えたよ。退屈知らずな人生は、実に最高だね！」"
translation = "「고마워. 이쪽에 있는 동안의 즐거움이 또 늘었네. 지루할 틈 없는 인생은 정말 최고야!」"

