[[dialogue]]
speaker = "unk"
original = "第１５話,極星学園来襲,B"
translation = "제15화, 극성학원 내습, B"

[[dialogue]]
speaker = "unk"
original = "俺がアリーナで全校生徒に話をして一週間後。"
translation = "내가 아레나에서 전교생에게 이야기를 한 지 일주일 후."

[[dialogue]]
speaker = "unk"
original = "宣言通りに信任選挙が行われ、開票結果が伝えられた。"
translation = "선언대로 신임 선거가 치러졌고, 개표 결과가 전달되었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「結果は信任……か」"
translation = "「결과는 신임……인가.」"

[[dialogue]]
speaker = "unk"
original = "信任の票は９割に近く、反対に投じた人はわずか。"
translation = "신임 표는 9할에 가까웠고, 반대에 던진 사람은 극소수."

[[dialogue]]
speaker = "unk"
original = "だが、反対の票よりも未投票の人数が上回った。"
translation = "하지만 반대 표보다 미투표 인원수가 더 많았다."

[[dialogue]]
speaker = "unk"
original = "未投票の人はまだ迷っているのかもしれない。"
translation = "미투표인 사람들은 아직 망설이고 있는지도 모른다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（信任してくれた生徒を裏切らないように、反対の人たちの信頼を勝ち取れるように……それにまだ迷っている人たちにも信じてもらえるように、頑張らないとな）"
translation = "(신임해 준 학생들을 배신하지 않도록, 반대하는 사람들의 신뢰를 얻을 수 있도록…… 그리고 아직 망설이는 사람들도 믿어줄 수 있도록 노력해야겠어.)"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「学園長もシノに決まったし、ま、ひとまずイッケンラクチャクね」"
translation = "「학원장도 시노로 결정됐고, 뭐, 일단 일단락됐네.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「天才学生社長と呼ばれた<ruby>辣腕<rt>らつわん</rt></ruby>に期待ですね」"
translation = "「천재 학생 사장이라 불린 수완에 기대가 되네요.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「どこかの独裁者さんが学園長にならなくてホッとしたわ～。シルヴィも頑張ってくれたのよね」"
translation = "「어디의 독재자 씨가 학원장이 되지 않아서 다행이야~. 실비도 힘내줬지.」"

[[dialogue]]
speaker = "unk"
original = "シルヴィ先輩が煌嶺の相手をしたというのは、後から聞いた。"
translation = "실비 선배가 코레이의 상대가 되었다는 것은 나중에 들었다."

[[dialogue]]
speaker = "unk"
original = "学園上空でアステラが発生したのもそれが関係していたらしく、アステラすら武器にする煌嶺の力には驚いた。"
translation = "학원 상공에서 아스테라가 발생한 것도 그것과 관계가 있었던 모양이라, 아스테라조차 무기로 삼는 코레이의 힘에는 놀랐다."

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「シルヴィさん、すごいよね。私も星徒会の盾としてもっと精進しないと──」"
translation = "「실비 씨, 대단하네. 나도 성도회의 방패로서 더 정진해야겠어──」"

[[dialogue]]
speaker = "unk"
original = "束の間の平和を切り裂くように、ＤＩＳＣからアラームが鳴り響く。"
translation = "잠깐의 평화를 가르듯, DISC에서 알람이 울려 퍼진다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「モンスターの出現……？\u3000いや、ガーディアンか……！」"
translation = "「몬스터의 출현……? 아니, 가디언인가……!」"

[[dialogue]]
speaker = "unk"
original = "ガーディアンが街を暴れ回る光景がＤＩＳＣに映し出される。"
translation = "가디언이 거리를 난폭하게 휘젓는 광경이 DISC에 비춰진다."

[[dialogue]]
speaker = "unk"
original = "間違いない。以前チナが率いていた、極星従騎と呼ばれるものだ。"
translation = "틀림없다. 이전에 치나가 이끌던, 극성종기라고 불리는 것들이다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「新星星徒会、出動だ！\u3000チナを止めて──そしてデネブに渡る手段を聞き出そう！」"
translation = "「신성성도회, 출동이다! 치나를 막고── 그리고 데네브로 건너갈 수단을 알아내자!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ええ、今度はあのちみっ子をふん捕まえてやるわ！」"
translation = "「그래, 이번에야말로 그 꼬맹이를 붙잡아 주겠어!」"

