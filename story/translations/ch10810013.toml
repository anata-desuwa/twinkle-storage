[[dialogue]]
speaker = "unk"
original = "第３話,グロリア、パンツを買いに行く,P"
translation = "제3화, 글로리아, 팬티를 사러 가다, P"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「はい、そうなんです。先日のボランティアの時にも子どもたちが――んっ……！」"
translation = "「네, 맞아요. 지난번 봉사활동 때도 아이들이―― 응……!」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「すみません、また下着がお尻に食い込んでしまって……あの、直しても……？」"
translation = "「죄송해요, 또 속옷이 엉덩이에 끼어버려서…… 저기, 정리해도……?」"

[[dialogue]]
speaker = "unk"
original = "どうぞ、どうぞ"
translation = "그러세요, 그러세요"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「んぅ……んっ、んっしょ……あら……？」"
translation = "「응으…… 응, 으랏차…… 어라……?」"

[[dialogue]]
speaker = "unk"
original = "場所を移すことなく、後ろ手にもぞもぞとお尻の辺りを弄り始めるので、ドキドキしてしまう。"
translation = "자리를 옮기지도 않고 뒤쪽으로 손을 뻗어 엉덩이 부근을 꼼지락거리며 만지기 시작해 두근거리게 만든다."

[[dialogue]]
speaker = "unk"
original = "ちなみに、会話中に食い込みを直すのも、これで３回目だ。"
translation = "참고로 대화 중에 끼인 것을 정리하는 것도 이번이 세 번째다."

[[dialogue]]
speaker = "unk"
original = "下着のサイズ、合ってないんじゃないですか？"
translation = "속옷 사이즈, 안 맞는 거 아닌가요?"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「うーん……そうかもしれません。最近はちょっと歩いただけでも、お尻の割れ目に挟まってしまって……」"
translation = "「으음…… 그럴지도 몰라요. 요즘은 조금만 걸어도 엉덩이 골 사이에 끼어버려서……」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「子どもの頃から同じパンツをはいていますけど、そろそろ限界なのかもしれませんね」"
translation = "「어릴 때부터 같은 팬티를 입고 있는데, 슬슬 한계인 걸지도 모르겠네요」"

[[dialogue]]
speaker = "unk"
original = "……子どもの頃から？"
translation = "……어릴 때부터요?"

[[dialogue]]
speaker = "unk"
original = "物持ちがいいとかいうレベルじゃない。グロリアさんが子どもの頃は、今みたいなメリハリ体型じゃなかったはずだ。"
translation = "물건을 아껴 쓰는 차원을 넘어섰다. 글로리아 씨가 어릴 때는 지금 같은 굴곡진 몸매가 아니었을 텐데."

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「母のお下がりをはいたりもしていたのですけど、母は私より細身だったので、やはりサイズが合ってないのでしょうね」"
translation = "「어머니가 물려주신 걸 입기도 했지만, 어머니는 저보다 훨씬 마르셔서 역시 사이즈가 안 맞는 거겠죠」"

[[dialogue]]
speaker = "unk"
original = "下着を買いに行ったりは？"
translation = "속옷을 사러 가거나 하지는?"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「パンツが破れた時に、慌てて購買で買ったことはありますけど、あえて買いに行ったりとかは……」"
translation = "「팬티가 찢어졌을 때 급하게 매점에서 산 적은 있지만, 일부러 사러 가거나 한 적은……」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「どういった下着が自分の年齢や体格に合っているかわからないんです。\u3000皆さんはどのような下着を着けているのでしょう……？」"
translation = "「어떤 속옷이 제 나이나 체격에 맞는지 잘 모르겠어요. 다들 어떤 속옷을 입으시는 걸까요……?」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「お着替えの際、皆さん、カラフルな下着を身に着けていらっしゃいますけど……じっくり見せてくださいというのも、少々はばかられますし」"
translation = "「옷을 갈아입을 때 다들 화려한 속옷을 입고 계시던데…… 자세히 보여달라고 하기도 조금 조심스럽고」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「あ、でしたら──」"
translation = "「아, 그렇다면──」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「会長さんが私の下着を選んでいただけませんか？」"
translation = "「회장님이 제 속옷을 골라주시지 않겠나요?」"

[[dialogue]]
speaker = "unk"
original = "俺が下着を……？"
translation = "내가 속옷을……?"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「はい。普段多くの女性に接しておられる方なら、私に似合うものを選んでくれるでしょうし、会長さんに選んでほしいんです」"
translation = "「네. 평소에 많은 여성분들을 대하시는 분이라면 제게 어울리는 걸 골라주실 테고, 회장님이 골라주셨으면 해요」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「ダメですか？」"
translation = "「안 될까요?」"

[[dialogue]]
speaker = "unk"
original = "こうして、グロリアにジャストフィットする下着を買うため、街へと出向くことになったのだった──"
translation = "이렇게 해서 글로리아에게 딱 맞는 속옷을 사기 위해 거리로 나서게 되었다──"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「うーん……待ち合わせより、随分と早く着きすぎてしまいました。でも遅刻するよりはいいですよね」"
translation = "「으음…… 약속 시간보다 너무 일찍 도착해버렸네요. 그래도 늦는 것보다는 낫겠죠」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「お買い物はフランさんには秘密と言われましたが、どうしてなのでしょうか……？\u3000不思議ですね」"
translation = "「쇼핑은 프랑 씨에게 비밀이라고 하셨는데, 왜 그러시는 걸까요……? 신기하네요」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「しかし会長さんとふたりきりでお出かけだなんて……少し前までの私では考えられませんでした……」"
translation = "「그나저나 회장님과 둘이서 외출이라니…… 조금 전의 저로서는 생각도 못 할 일이었어요……」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「……あら？\u3000これはもしかして、デートと呼ぶものなのでしょうか？」"
translation = "「……어라? 이건 혹시 데이트라고 부르는 걸까요?」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「違いますよね。デートというのは、好意を寄せている男女同士が行うもの……会長さんは親切心で、私の買い物に付き合ってくださるだけですものね」"
translation = "「아니겠죠. 데이트라는 건 호감을 느끼는 남녀끼리 하는 것…… 회장님은 친절한 마음으로 제 쇼핑을 도와주시는 것뿐이니까요」"

[[dialogue]]
speaker_original = "ナンパ男"
speaker_translation = "헌팅남"
original = "「ウェーイ！\u3000そこのドチャクソキレイなお姉さん、俺ッチとお茶でもどう～？」"
translation = "「웨에이! 거기 겁나 예쁜 누님, 나랑 차라도 한잔 어때~?」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「……え？\u3000キレイなお姉さん……？\u3000どこにいらっしゃるのでしょうか……」"
translation = "「……네? 예쁜 누님…… 어디 계시는 걸까요……」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「ハッ──！？\u3000もしかして私のことでしょうか？」"
translation = "「헉──!? 혹시 저를 말씀하시는 건가요?」"

[[dialogue]]
speaker_original = "ナンパ男"
speaker_translation = "헌팅남"
original = "「モチのロ～ン！\u3000キレイなお姉さんっつったら、お姉さんの他にいないっしょ～、キョロキョロしないでよ～」"
translation = "「당근빠따지! 예쁜 누님이라 하면 누님 말고 누가 있겠어~, 두리번거리지 말라고~」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「ごめんなさい。人と待ち合わせをしているところでして……」"
translation = "「죄송해요. 일행을 기다리는 중이라서요……」"

[[dialogue]]
speaker_original = "ナンパ男"
speaker_translation = "헌팅남"
original = "「またまた～。うっとりした顔で俺ッチの方見てたじゃん。そりゃもう脈アリってことでしょ～」"
translation = "「에이 또 왜 이래~. 황홀한 표정으로 나를 보고 있었잖아. 그건 이미 마음이 있다는 뜻이지~」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「いいえ、あなたとは初対面ですし、全然そのようなことは……あの、手を離してはいただけないでしょうか？」"
translation = "「아니요, 당신과는 초면이고 전혀 그런 게…… 저기, 손을 놓아주시지 않겠어요?」"

[[dialogue]]
speaker_original = "ナンパ男"
speaker_translation = "헌팅남"
original = "「ま、ま、ま。なんならお茶なんてメンドいのはすっ飛ばして、もっと良いことしようぜ～？」"
translation = "「자자자. 이왕이면 차 같은 귀찮은 건 건너뛰고, 더 좋은 거 하자고~?」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「良いこと……？\u3000それは私と一緒に死んでいただけるということでしょうか……？」"
translation = "「좋은 거……? 그건 저와 함께 죽어주신다는 말씀인가요……?」"

[[dialogue]]
speaker_original = "ナンパ男"
speaker_translation = "헌팅남"
original = "「……は？\u3000死？」"
translation = "「……하? 죽어?」"

[[dialogue]]
speaker = "unk"
original = "俺の連れに何の用です？"
translation = "내 일행에게 무슨 용건이죠?"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「会長さんっ……！」"
translation = "「회장님……!」"

[[dialogue]]
speaker = "unk"
original = "グロリアさんの手を掴んでいた男の手を引き剥がし、代わりに彼女の手を取ってこの場を後にした。"
translation = "글로리아 씨의 손을 잡고 있던 남자의 손을 떼어내고, 대신 그녀의 손을 잡고 그 자리를 떠났다."

[[dialogue]]
speaker = "unk"
original = "男はなんだか面食らっていたけど、２人の間でどんな会話がされていたのかは想像に難くない。"
translation = "남자는 멍한 표정이었지만, 두 사람 사이에 어떤 대화가 오갔을지는 상상하기 어렵지 않다."

[[dialogue]]
speaker = "unk"
original = "ああいう輩は放っておいて、さっさと目的地に向かうとしよう。"
translation = "그런 부류는 내버려 두고 어서 목적지로 향하기로 하자."

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "（会長さんの手、温かい……あの男の人の手と全然違います……）"
translation = "（회장님의 손, 따뜻해…… 아까 그 남자의 손이랑 전혀 달라요……）"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "（なんででしょう……会長さんに触れられていると、すごくドキドキしてしまいます。心臓が口から飛び出てしまいそう……）"
translation = "（왜일까요…… 회장님이 만져주시면 무척 두근거려요. 심장이 입 밖으로 튀어나올 것만 같아……）"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "（こんな気持ちは、初めてです……この感情は、一体……？）"
translation = "（이런 기분은 처음이에요…… 이 감정은 도대체……?）"

