[[dialogue]]
speaker = "unk"
original = "第3話,メイド体験,B"
translation = "제3화, 메이드 체험, B"

[[dialogue]]
speaker = "unk"
original = "キリカ師匠から修行の一環と言われ、マリオンさんの作ったメイド服を着せられた俺は、何故か星見家メイド隊のメイドとして、体験入隊することになった。"
translation = "키리카 스승님으로부터 수행의 일환이라는 말을 듣고 마리온 씨가 만든 메이드복을 입게 된 나는 왠지 호시미 가문 메이드대의 메이드로서 체험 입대를 하게 되었다."

[[dialogue]]
speaker = "マリオン"
original = "「あぁんっ<emoji=heart04>\u3000会長様、なんてお可愛らしい<emoji=heart04>\u3000やはり思った通り、メイクしたら、どこからどう見ても美少女にしか見えません！」"
translation = "「아앙<emoji=heart04> 회장님 어쩜 이렇게 사랑스러울 수가<emoji=heart04> 역시 생각한 대로 메이크업을 하니까 어디서 봐도 미소녀로밖에 안 보여요!」"

[[dialogue]]
speaker = "unk"
original = "いやこれ、執事服じゃダメだったんでしょうか！？"
translation = "아니 이거 집사복이면 안 됐던 건가요!?"

[[dialogue]]
speaker = "マリオン"
original = "「え？\u3000だって、メイド服の方が可愛いですよね、キリカさん？」"
translation = "「에? 그치만 메이드복 쪽이 귀엽잖아요, 키리카 씨?」"

[[dialogue]]
speaker = "キリカ"
original = "「……メイド隊なので、メイドであるに越したことはないかと」"
translation = "「……메이드대니까 메이드인 편이 더 낫지 않을까 해서」"

[[dialogue]]
speaker = "unk"
original = "師匠！？"
translation = "스승님!?"

[[dialogue]]
speaker = "マリオン"
original = "「うふふっ<emoji=heart04>\u3000真面目なキリカさんが頷く程、会長様のメイド服姿がよく似合っているということですよ♪」"
translation = "「우후훗<emoji=heart04> 성실한 키리카 씨가 고개를 끄덕일 정도로 회장님의 메이드복 차림이 잘 어울린다는 뜻이에요♪」"

[[dialogue]]
speaker = "キリカ"
original = "「着替えも済んだところで、緋宮会長。改めて、基本的なところから説明していきます」"
translation = "「환복도 끝났으니 히노미야 회장님. 다시금 기본적인 것부터 설명해 나가겠습니다」"

[[dialogue]]
speaker = "キリカ"
original = "「星見家メイド隊。それは――」"
translation = "「호시미 가문 메이드대. 그것은──」"

[[dialogue]]
speaker = "キリカ"
original = "「――続いて、『流星教皇』様のことについて改めて説明しておきましょうか」"
translation = "「──이어서 『유성 교황』님에 대해 다시 한번 설명해 두도록 할까요」"

[[dialogue]]
speaker = "キリカ"
original = "「流星市国に住んでいる者なら誰もが知っていることかとは思いますが、この国を統治する機関が『流星教皇庁』です」"
translation = "「유성시국에 사는 사람이라면 누구나 알고 있을 거라 생각합니다만 이 나라를 통치하는 기관이 『유성 교황청』입니다」"

[[dialogue]]
speaker = "キリカ"
original = "「国教である『流星教』の総本山であり、下部組織として三界の各地に教会が存在しています」"
translation = "「국교인 『유성교』의 총본산이며 하부 조직으로서 삼계 각지에 교회가 존재하고 있습니다」"

[[dialogue]]
speaker = "キリカ"
original = "「そのトップに立っているのが、流星教皇様です」"
translation = "「그 정점에 서 계신 분이 유성 교황님입니다」"

[[dialogue]]
speaker = "キリカ"
original = "「そして、それを代々襲名してきたのが私たちメイド隊が仕える星見家であり、現在の教皇様はフィオナお嬢様の父君にあらせられます」"
translation = "「그리고 그것을 대대로 습명해 온 것이 우리 메이드대가 모시는 호시미 가문이며 현재의 교황님은 피오나 아가씨의 부친이 되십니다」"

[[dialogue]]
speaker = "マリオン"
original = "「ちなみに教皇様は、セイファート様と共に新星学園を開設した創設者であり、流星学園の理事長も務めていらっしゃいます」"
translation = "「참고로 교황님은 세이파트 님과 함께 신성학원을 개설한 창설자이시며 유성학원의 이사장도 맡고 계신답니다」"

[[dialogue]]
speaker = "unk"
original = "なるほど。だから、星見家メイド隊が――"
translation = "과연. 그래서 호시미 가문 메이드대가──"

[[dialogue]]
speaker = "マリオン"
original = "「ええ。星見家メイド隊が流星学園の運営管理を行っているのは、星見家のご当主である教皇様が学園の理事長だから、ということになりますね」"
translation = "「네. 호시미 가문 메이드대가 유성학원의 운영 관리를 수행하고 있는 것은 호시미 가문의 당주이신 교황님이 학원의 이사장이라서 그렇다는 게 되죠」"

[[dialogue]]
speaker = "キリカ"
original = "「その他に質問はありませんか？\u3000――よろしいでしょう。ならば、次は緋宮会長がメイドとして、どのくらい仕事ができるのか見せてもらいます」"
translation = "「그 외에 질문은 없습니까? ──좋습니다. 그럼 다음은 히노미야 회장님이 메이드로서 어느 정도 일을 할 수 있는지 보여주시죠」"

[[dialogue]]
speaker = "unk"
original = "それから俺は、これまで上月神闘流の修行の一環で磨いてきたメイドスキルで、１日仕事をこなしていった。"
translation = "그러고 나서 나는 지금까지 코즈키 신투류 수행의 일환으로 갈고닦아 온 메이드 스킬로 하루 업무를 소화해 나갔다."

[[dialogue]]
speaker = "マリオン"
original = "「まあまあ、うふふっ♪\u3000これは想像以上ではないですか、キリカさん？」"
translation = "「자자, 우후훗♪ 이거 상상 이상 아닌가요 키리카 씨?」"

[[dialogue]]
speaker = "キリカ"
original = "「ええ。正直、驚いています。これまでの訓練でも物覚えが早いとは思っていましたが……緋宮会長、率直に申し上げます」"
translation = "「네. 솔직히 놀랐습니다. 지금까지의 훈련에서도 습득이 빠르다고 생각은 했습니다만…… 히노미야 회장님 솔직히 말씀드리겠습니다」"

[[dialogue]]
speaker = "キリカ"
original = "「真面目な話、あなたにはメイド――いえ、執事としての才能があると思います。現時点十分に使用人として仕事を任せられる程に、手際が良い」"
translation = "「진지하게 당신에게는 메이드── 아니 집사로서의 재능이 있다고 봅니다. 현시점에서도 충분히 고용인으로서 일을 맡길 수 있을 만큼 솜씨가 좋습니다」"

[[dialogue]]
speaker = "キリカ"
original = "「あなたさえよければ、私の方からフィオナお嬢様にお伝えして、本気で執事候補に迎えたいと私は考えていますが……いかがでしょうか？」"
translation = "「당신만 괜찮다면 제가 피오나 아가씨께 말씀드려서 진심으로 집사 후보로 맞이하고 싶다고 생각합니다만…… 어떠십니까?」"

[[dialogue]]
speaker = "unk"
original = "ありがたい申し出ですが――"
translation = "감사한 제안입니다만──"

[[dialogue]]
speaker = "キリカ"
original = "「――今は、星徒会長として皆をリクリエから救える星騎士を目指したい、ですか……」"
translation = "「──지금은 성도회장으로서 모두를 리크리에로부터 구할 수 있는 성기사를 목표로 하고 싶다, 인가요……」"

[[dialogue]]
speaker = "キリカ"
original = "「そうですか……ダメですか……」"
translation = "「그렇습니까…… 안 되는 건가요……」"

[[dialogue]]
speaker = "マリオン"
original = "「残念ですが、その真っ直ぐに理想を追う姿が会長様の魅力でもありますから、致し方ないですね。でも、まだ諦めるには早いかもですよ？\u3000キリカさん」"
translation = "「아쉽지만 그 곧게 이상을 쫓는 모습이 회장님의 매력이기도 하니까 어쩔 수 없겠네요. 하지만 아직 포기하기엔 빠를지도 몰라요? 키리카 씨」"

[[dialogue]]
speaker = "マリオン"
original = "「執事として迎えるのは難しくても、将来的に会長様を上月家の婿に迎えて、生まれた子供を次の執事かメイド長として育てるという手もあります♪」"
translation = "「집사로 맞이하는 건 어려워도 장래적으로 회장님을 코즈키 가문의 사위로 맞이해서 태어난 아이를 다음 집사나 메이드장으로 키우는 방법도 있답니다♪」"

[[dialogue]]
speaker = "unk"
original = "いやいやいや、なに言ってるんですか！？"
translation = "아니 아니 아니, 무슨 소릴 하는 거예요!?"

[[dialogue]]
speaker = "キリカ"
original = "「……それはつまり、私が緋宮会長と結婚するということですか？」"
translation = "「……그건 즉 제가 히노미야 회장님과 결혼한다는 뜻입니까?」"

[[dialogue]]
speaker = "マリオン"
original = "「うふふ<emoji=heart04>\u3000キリカさんも、いずれは上月家の娘として跡継ぎを作る必要があるでしょうし、会長様のことを現に高く評価しているわけですよね？」"
translation = "「우후후<emoji=heart04> 키리카 씨도 언젠가는 코즈키 가문의 딸로서 후계자를 만들 필요가 있을 테고, 회장님을 실제로 높게 평가하고 있잖아요?」"

[[dialogue]]
speaker = "マリオン"
original = "「あ、でも私が会長様と子供を作って、育てるというパターンもありますね♪」"
translation = "「아, 그치만 제가 회장님과 아이를 만들어서 키우는 패턴도 있겠네요♪」"

[[dialogue]]
speaker = "キリカ"
original = "「……ふむ」"
translation = "「……흠」"

[[dialogue]]
speaker = "キリカ"
original = "「……どうやら１度、上月家の両親に相談する必要がありそうですね」"
translation = "「……아무래도 한번 코즈키 가문의 부모님과 상의해 볼 필요가 있을 것 같군요」"

[[dialogue]]
speaker = "unk"
original = "師匠！？"
translation = "스승님!?"

[[dialogue]]
speaker = "キリカ"
original = "「どうしました？\u3000――子供を育てるのは色々時間がかかるから要検討、ですか？」"
translation = "「왜 그러시죠? ──아이를 키우는 건 여러모로 시간이 걸리니까 요검토, 인가요?」"

[[dialogue]]
speaker = "キリカ"
original = "「ですが、確かに私は、いずれ上月家の跡取りを生まなければなりませんし、それならば現状、弟子である緋宮会長を婿に迎えるのは合理的だと思ったのですが……」"
translation = "「하지만 확실히 저는 언젠가 코즈키 가문의 후계자를 낳아야만 하고 그렇다면 현 상황에서 제자인 히노미야 회장님을 사위로 맞이하는 건 합리적이라고 생각했습니다만……」"

[[dialogue]]
speaker = "キリカ"
original = "「ああ、でも、会長の気持ちの問題もありますね。私はメイドですので、正妻であることに特にこだわりはありませんが……」"
translation = "「아아, 하지만 회장님의 마음 문제도 있겠군요. 전 메이드이므로 정처인 것에 딱히 고집은 없습니다만……」"

[[dialogue]]
speaker = "キリカ"
original = "「いずれにせよ、両親には一応、報告しておくとしましょう」"
translation = "「어찌 됐든 부모님께는 일단 보고해 두도록 하죠」"

[[dialogue]]
speaker = "unk"
original = "師匠！？"
translation = "스승님!?"

[[dialogue]]
speaker = "マリオン"
original = "「うふふっ、会長様<emoji=heart04>\u3000私は３人仲良く一緒に、というのもウェルカムですよ♪」"
translation = "「우후훗 회장님<emoji=heart04> 저는 셋이서 사이좋게 함께하는 것도 웰컴이라구요♪」"

[[dialogue]]
speaker = "unk"
original = "ちょっと想像して、俺は顔が熱くなってしまうのであった。"
translation = "잠깐 상상해 버려 나는 얼굴이 화끈거리고 마는 것이었다."

