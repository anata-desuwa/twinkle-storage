[[dialogue]]
speaker = "unk"
original = "第３話,デネブのレジスタンス,B"
translation = "제3화, 데네브의 레지스탕스, B"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「ではあたしたちから、デネブで何が起きたかと、レジスタンスの状況について説明しよう」"
translation = "「그럼 우리 쪽에서 데네브에서 무슨 일이 있었는지와 레지스탕스의 상황에 대해 설명하지」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「誤解のないよう改めて言っておくが、ここは森羅歴３０１２年のデネブだ」"
translation = "「오해가 없도록 다시 한번 말해두지만, 여기는 삼라력 3012년의 데네브다」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「あたしと魔王たちがアルタイルで戦ったのが森羅暦３００２年だから、１０年先の未来になる」"
translation = "「나와 마왕 일행이 알타이르에서 싸웠던 게 삼라력 3002년이니까, 10년 뒤의 미래가 되지」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「つまり俺たちは未来の平行世界にいるってことだな」"
translation = "「즉 우리는 미래의 평행세계에 있다는 거군」"

[[dialogue]]
speaker = "unk"
original = "あのビル群も、俺たちの世界より未来ということなら頷ける。"
translation = "저 빌딩 숲도 우리 세계보다 미래라면 납득이 간다."

[[dialogue]]
speaker = "unk"
original = "そしてアポロが成長しているのも、１０年後なら当然のことだ。"
translation = "그리고 아폴로가 성장한 것도 10년 뒤라면 당연한 일이다."

[[dialogue]]
speaker = "unk"
original = "平行世界間には時間のズレがあるとは言われていたが、今のアポロの姿を見て、改めて実感する。"
translation = "평행세계 간에는 시간의 차이가 있다고는 들었지만, 지금의 아폴로 모습을 보니 새삼 실감이 난다."

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「あたしも改めて名乗ろう。あたしはアポロ。かつてリクリエの使徒としてアルタイルに渡り、そしてデネブに帰ってきた」"
translation = "「나도 다시 한번 통성명을 하지. 나는 아폴로. 과거 리크리에의 사도로서 알타이르로 건너갔다가 데네브로 돌아왔다」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「！\u3000やはりそうか……」"
translation = "「! 역시 그런가……」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「やはり？」"
translation = "「역시?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「私はベガの出身だ。だからベガの君も知っている」"
translation = "「나는 베가 출신이다. 그래서 베가의 너도 알고 있지」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「なら３つの平行世界全てのあたしを知っているのか。なおさらややこしいな」"
translation = "「그럼 세 평행세계의 나를 전부 알고 있는 건가. 한층 더 복잡하군」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「……そうだな」"
translation = "「……그렇군」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「私は緋宮リノ。元ネビュラの魔女で、デネブのクロトの母親よ。アポロちゃんと２人でレジスタンスの実働部隊をやっているわ」"
translation = "「나는 히노미야 리노. 전 네뷸라의 마녀이자 데네브 쿠로토의 어머니야. 아폴로 짱이랑 둘이서 레지스탕스의 실동 부대를 맡고 있어」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「守護天使ラクシャが語った通り、１０年前、この世界の魔王クロトはリクリエに敗北した。もう少しで勝てるというところまでいったけど、残念ながら届かなかった」"
translation = "「수호천사 락샤가 말한 대로, 10년 전 이 세계의 마왕 쿠로토는 리크리에에 패배했어. 조금만 더 하면 이길 수 있는 곳까지 갔었지만, 안타깝게도 닿지 못했지」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「クロトがヴィーナスちゃんを送り出した後の話をするわね」"
translation = "「쿠로토가 비너스 짱을 보낸 뒤의 이야기를 할게」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「多くの星騎士が<ruby>斃<rt>たお</rt></ruby>れ、無数のアステラが渦巻き、モンスターが街を埋め尽くし、あと一歩で世界が滅びるというところで──」"
translation = "「많은 성기사가 쓰러지고, 무수한 아스테라가 소용돌이치며 몬스터가 거리를 가득 메워, 한 걸음만 더 가면 세계가 멸망하려던 찰나──」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「１人の幼い天使が現れた」"
translation = "「한 명의 어린 천사가 나타났어」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「彼女の名はルヴィネ。『女神の遣い』を名乗る女の子だった」"
translation = "「그녀의 이름은 루비네. 『여신의 사자』를 자처하는 소녀였지」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「彼女が出現するやいなや、モンスターは消え、アステラも消滅した。世界の危機は去り、デネブは救われた」"
translation = "「그녀가 출현하자마자 몬스터는 사라지고 아스테라도 소멸했어. 세계의 위기는 물러갔고 데네브는 구원받았지」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「その時のことは私も観測していたけど、何が起こったのかはわからなかった。データも残っていない」"
translation = "「그때의 일은 나도 관측하고 있었지만, 무슨 일이 일어났는지는 알 수 없었어. 데이터도 남아있지 않아」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「だけど結果だけ見れば、ルヴィネが世界を救ったとしか思えない。人々は彼女を英雄とか救世主とか呼んでいるわ」"
translation = "「하지만 결과만 놓고 보면 루비네가 세계를 구했다고밖에 생각할 수 없어. 사람들은 그녀를 영웅이나 구세주라고 부르고 있지」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「それからデネブは平和を取り戻し、復興の道を歩んでいる。分野によっては、リクリエ以前より発展を遂げていると言っても過言じゃないわ」"
translation = "「그 후 데네브는 평화를 되찾고 부흥의 길을 걷고 있어. 분야에 따라서는 리크리에 이전보다 발전했다고 해도 과언이 아니야」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「流星学園と新星学園の星騎士はほとんど命を落としたけど、わずかな生き残りが集まり、極星学園の前身を作った」"
translation = "「유성학원과 신성학원의 성기사는 대부분 목숨을 잃었지만, 얼마 안 되는 생존자들이 모여 극성학원의 전신을 만들었어」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「そして極星学園が正式に設立されると同時に、ルヴィネが星徒会長となり、彼女がデネブの星騎士を率いているわ」"
translation = "「그리고 극성학원이 정식으로 설립됨과 동시에 루비네가 성도회장이 되었고, 그녀가 데네브의 성기사들을 이끌고 있어」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「あたしがデネブに帰ってきたのは、ルヴィネがリクリエを退けてからだ。元の世界に戻ってきたら全部終わってるもんだからビックリしたな」"
translation = "「내가 데네브로 돌아온 건 루비네가 리크리에를 물리친 뒤다. 원래 세계로 돌아왔더니 전부 끝나 있어서 깜짝 놀랐지」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「デネブでもリクリエは完全に収まったわけじゃない。モンスターは散発的に発生している」"
translation = "「데네브에서도 리크리에가 완전히 가라앉은 건 아니야. 몬스터는 산발적으로 발생하고 있지」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「だがルヴィネたち極星学園の星騎士によって、この世界は守られている。そこだけ見ればルヴィネはこのデネブの守護者だ」"
translation = "「하지만 루비네 일행, 극성학원의 성기사들에 의해 이 세계는 지켜지고 있어. 그것만 보면 루비네는 이 데네브의 수호자야」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「──だが」"
translation = "「──하지만」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「だが？\u3000それだけではないんですか？」"
translation = "「하지만? 그게 전부가 아닌가요?」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「ルヴィネはこの世界のクロトを『悪しき魔王』と呼び、『平行世界アルタイルと手を結んで、デネブの滅亡を目論んだ』と言い出した」"
translation = "「루비네는 이 세계의 쿠로토를 『악한 마왕』이라 부르며, 『평행세계 알타이르와 손을 잡고 데네브의 멸망을 꾀했다』고 말하기 시작했다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「そんな馬鹿な……！？\u3000ラクシャさんが言った通り、この世界の緋宮会長は世界を守るためにリクリエと戦っていたはず……」"
translation = "「그런 말도 안 되는……!? 락샤 씨가 말한 대로, 이 세계의 히노미야 회장님은 세계를 지키기 위해 리크리에와 싸우고 있었을 텐데……」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「ああ、あたしたちはそれを知っている。だがそれは緋宮クロトに近い者だけだ」"
translation = "「아아, 우리는 그걸 알고 있지. 하지만 그건 히노미야 쿠로토와 가까운 자들뿐이다」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「魔王といえば悪というのが一般常識だし、一緒に戦っていたやつらもほとんどが先の戦いで倒れた」"
translation = "「마왕이라고 하면 악이라는 게 일반 상식이고, 함께 싸웠던 녀석들도 대부분 지난 전투에서 쓰러졌어」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「何より世界を救ったルヴィネの言葉だ。信じないやつはまずいなかった」"
translation = "「무엇보다 세계를 구한 루비네의 말이다. 믿지 않는 녀석은 거의 없었지」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「なるほど……俺の顔を見て怯える人がいるのも納得だ」"
translation = "「과연…… 내 얼굴을 보고 겁먹는 사람이 있는 것도 납득이 가네」"

[[dialogue]]
speaker = "unk"
original = "極星星徒会のチナや、デネブの街で出会った人々の反応を思い出す。"
translation = "극성성도회의 치나나 데네브 거리에서 만난 사람들의 반응을 떠올린다."

[[dialogue]]
speaker = "unk"
original = "そもそも太陽の壁画では悪として描かれていたし、救世の英雄に名指しされれば、ああなるのも自然か。"
translation = "애초에 태양의 벽화에서는 악으로 묘사되어 있었고, 구세의 영웅에게 지목당했으니 그렇게 되는 것도 자연스러운 건가."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "俺とヴィーナスはデネブの人に聞いていたから、アポロの話に驚きはないが、やはり父を悪の魔王と呼ばれることに憤りを覚えるのだろう。"
translation = "나와 비너스는 데네브 사람들에게 들어서 알고 있었기에 아폴로의 이야기에 놀라지는 않았지만, 역시 아버지를 악의 마왕이라 부르는 것에 분노를 느끼는 것이리라."

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「そしてルヴィネは、緋宮クロトに味方していた者を、魔王の一派として排除しようとした」"
translation = "「그리고 루비네는 히노미야 쿠로토의 편을 들었던 자들을 마왕의 일파로 간주해 배제하려 했어」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「私も狙われたんだけど……危なかったところをアポロちゃんに助けてもらったの。それがレジスタンスの始まりね」"
translation = "「저도 표적이 되었지만…… 위험했던 순간에 아폴로짱이 도와주었죠. 그것이 레지스탕스의 시작이에요」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「それからは、同じようにルヴィネに狙われているやつを魔界に逃がしたり、リクリエについて調査したりしていた」"
translation = "「그 후로는 똑같이 루비네에게 노려지는 녀석들을 마계로 도망치게 하거나, 리크리에에 대해 조사하고 있었지」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「そんなわけで、あたしたちレジスタンスはルヴィネと対立している」"
translation = "「그런 연유로 우리 레지스탕스는 루비네와 대립하고 있어」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「ルヴィネの存在は余りに不自然だ。魔王クロトを敵視していることもそうだが、ルヴィネはデネブにとって都合が良すぎる」"
translation = "「루비네의 존재는 너무나 부자연스러워. 마왕 쿠로토를 적대하는 것도 그렇지만, 루비네는 데네브에게 있어 상황이 너무 좋게만 돌아가거든」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「だからあたしたちは、ルヴィネはリクリエの側で、何かしらの意図があって極星の星徒会長をしているのではないかと疑っている」"
translation = "「그래서 우리는 루비네가 리크리에 측이며, 어떠한 의도를 가지고 극성의 성도회장을 맡고 있는 게 아닌가 의심하고 있어」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「そういう意味では、ラクシャと考えてることは同じだな」"
translation = "「그런 의미에서는 락샤가 생각하는 것과 같군」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「説明ありがとうございます、姉さん。おかげでデネブの状況が理解できてきました」"
translation = "「설명 감사합니다, 언니. 덕분에 데네브의 상황을 이해할 수 있게 되었어요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ところで、ネビュラのみなさんはどうされたのでしょう？\u3000星騎士の状況は聞きましたが、もしかして魔女も……」"
translation = "「그런데 네뷸라 여러분은 어떻게 되셨나요? 성기사의 상황은 들었습니다만, 혹시 마녀들도……」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「いいえ、ネビュラは星騎士ほど壊滅的な被害を受けたわけじゃないわ」"
translation = "「아니, 네뷸라는 성기사만큼 괴멸적인 피해를 본 건 아니야」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「だけど１０年前のリクリエとの戦いで世界樹の根を絶たれていて、『魔女の森』と行き来できなくなっているのよ。だから今人間界にいるのは私だけね」"
translation = "「하지만 10년 전 리크리에와의 싸움에서 세계수의 뿌리가 끊겨버려서, 『마녀의 숲』과 왕래할 수 없게 되었단다. 그래서 지금 인간계에 있는 건 나뿐이야」"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「この秘密基地も、ネビュラ基地が留守の間に、設備を拝借して作ったものなの」"
translation = "「이 비밀기지도 네뷸라 기지가 비어있는 동안 설비를 빌려서 만든 것이고」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「まぁ、魔女を頼れないことには変わりないな」"
translation = "「뭐, 마녀를 의지할 수 없다는 점은 변함없군」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「なるほど……」"
translation = "「그렇군요……」"

[[dialogue]]
speaker = "unk"
original = "レジスタンス以外に頼れる相手がいないかと考えたが、俺たちが知っている星騎士は、戦いで倒れているか、生き残っていても星力を失って引退しているだろう。"
translation = "레지스탕스 외에 의지할 상대가 없을까 생각했지만, 우리가 아는 성기사들은 전투에서 쓰러졌거나, 살아남았더라도 성력을 잃고 은퇴했을 것이다."

[[dialogue]]
speaker = "unk"
original = "今ここにいる他に味方はいないと考えてよさそうだ。"
translation = "지금 여기 있는 이들 외에 아군은 없다고 생각하는 게 좋을 듯하다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「デネブの状況はわかった」"
translation = "「데네브의 상황은 알았어」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「じゃあ俺たちも説明するよ。アポロと別れてから何があったか、そして俺たちが何をしようとしているのかを」"
translation = "「그럼 우리도 설명할게. 아폴로와 헤어진 뒤에 무슨 일이 있었는지, 그리고 우리가 무엇을 하려 하는지를」"

