[[dialogue]]
speaker = "unk"
original = "蘭美と恋人として付き合い始めてからしばらく経った、ある日の放課後。"
translation = "라비와 연인으로서 사귀기 시작하고 한동안 지난, 어느 날 방과 후."

[[dialogue]]
speaker = "unk"
original = "新星学園の屋外を歩いていると、蘭美から声をかけられた。"
translation = "신성 학원 야외를 걷고 있는데, 라비에게서 말을 걸어왔다."

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「会長、ちょっといいかしら？\u3000こっちこっち」"
translation = "「회장, 잠깐 괜찮을까? 이쪽 이쪽」"

[[dialogue]]
speaker = "unk"
original = "手招きされて、人通りの少ない校舎裏へと移動する。"
translation = "손짓에 따라, 인적이 드문 교사 뒤편으로 이동한다."

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「よし、この辺りでいいわね。じゃあ――」"
translation = "「좋아, 이쯤이면 되겠네. 그럼――」"

[[dialogue]]
speaker = "unk"
original = "そう言うと、彼女はいきなりスカートの下に履いているショーツを脱ぎ出した。"
translation = "그렇게 말하더니, 그녀는 갑자기 스커트 아래에 입고 있는 쇼츠를 벗기 시작했다."

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「よいしょっと……<emoji=heart04>」"
translation = "「영차……<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「――ごめんなさい、会長。悪いんだけど……いつものアレが我慢できなくなっちゃったの<emoji=heart04>」"
translation = "「――미안해, 회장. 미안하지만……평소의 그것을 참을 수 없게 되어 버렸어<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「そう、発情期<emoji=heart04>\u3000ふうぅ……<emoji=heart04>」"
translation = "「그래, 발정기<emoji=heart04> 후우……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "蘭美の種族は繁殖能力が高く、『万年発情期』体質だという。"
translation = "라비의 종족은 번식 능력이 뛰어나, '만년 발정기' 체질이라고 한다."

[[dialogue]]
speaker = "unk"
original = "薬である程度、症状を抑えることは可能だが、好きな相手ができると時折、発情を抑え切れなくなってしまうらしい。"
translation = "약으로 어느 정도 증상을 억제하는 것은 가능하지만, 좋아하는 상대가 생기면 때때로 발정을 억누르지 못하게 되는 것 같다."

[[dialogue]]
speaker = "unk"
original = "なので、彼女がそうなってしまった際は、俺が恋人として性欲処理を手伝ってあげていた。"
translation = "그래서, 그녀가 그렇게 되어 버렸을 때는, 내가 연인으로서 성욕 처리를 도와주고 있었다."

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「――でも、青姦はマズいって？\u3000ふふっ♪\u3000そんなに慌てなくても大丈夫よ、会長」"
translation = "「――하지만, 야외 섹스는 안 된다고? 후훗♪ 그렇게 당황하지 않아도 괜찮아, 회장」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「羽宮一族には代々、発情期対策で、こういう時の為の『隠蔽星術』が受け継がれているの」"
translation = "「하네미야 일족에게는 대대로, 발정기 대책으로, 이럴 때를 위한 『은폐 성술』이 계승되고 있어」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「それを既に発動しているから、私たちの姿は周囲に見えないようになっているわ♪」"
translation = "「그것을 이미 발동했으니까, 우리의 모습은 주위에 보이지 않게 되어 있어♪」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「だから、安心して。それに……ふふっ<emoji=heart04>\u3000貴方だって<b>期待してる</b>みたいだけど？」"
translation = "「그러니까, 안심해. 게다가……후훗<emoji=heart04> 너도 <b>기대하는</b> 것 같지만?」"

[[dialogue]]
speaker = "unk"
original = "彼女は俺の股間を擦りながら、囁く。"
translation = "그녀는 나의 사타구니를 비비면서, 속삭인다."

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ほら、ここ。固くなってる……<emoji=heart04>」"
translation = "「봐, 여기. 단단해지고 있어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「――このところ、お互い忙しくてできてなかったからって？」"
translation = "「――요즘, 서로 바빠서 못 했으니까?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「なら、ちゃんとしないとダメじゃない♪」"
translation = "「그렇다면, 제대로 해야지 안 되겠네♪」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「自分の体調管理も仕事のうちよ？\u3000ほら、早く<emoji=heart04>」"
translation = "「자신의 컨디션 관리도 일 중 하나야? 자, 빨리<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "甘い誘いに、俺は抗うことができず――"
translation = "달콤한 유혹에, 나는 저항할 수 없었고――"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「んっ……会長……<emoji=heart04>\u3000ちゅっ……<emoji=heart04>」"
translation = "「응읏……회장……<emoji=heart04> 츄릅……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "彼女は恍惚とした表情で、キスをねだってくる。"
translation = "그녀는 황홀한 표정으로, 키스를 조른다."

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ちゅっ……ちゅぱっ<emoji=heart04>\u3000んっ……ちゅぷっ……<emoji=heart04>\u3000れろちゅっ……<emoji=heart04>」"
translation = "「츄릅……츄팟<emoji=heart04> 응읏……츄풉……<emoji=heart04> 렐로츄릅……<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「はあぁっ……<emoji=heart04>\u3000舌を絡めるエッチなキス、好き……<emoji=heart04>\u3000んむっ……<emoji=heart04>\u3000ちゅぷぷっ……れろちゅっ<emoji=heart04>\u3000れるれるっ……ちゅぱっ……ちゅるるっ<emoji=heart04>」"
translation = "「하아앗……<emoji=heart04> 혀를 얽는 야한 키스, 좋아……<emoji=heart04> 음믓……<emoji=heart04> 츄풉풉……렐로츄릅<emoji=heart04> 렐루렐루읏……츄팟……츄르릅<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「んっ……れろちゅっ……<emoji=heart04>\u3000もっと……<emoji=heart04>\u3000ちゅっ……ちゅぱっ……<emoji=heart04>\u3000ちゅぷぷっ……ちゅれるっ……ちゅるるっ……<emoji=heart04>\u3000ちゅっちゅっ……れろちゅっ……<emoji=heart04>」"
translation = "「응읏……렐로츄릅……<emoji=heart04> 더……<emoji=heart04> 츄릅……츄팟……<emoji=heart04> 츄풉풉……츄르르읏……츄르릅……<emoji=heart04> 츄츄읏……렐로츄릅……<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「んむっ……ちゅぱっ……ぷはぁっ……<emoji=heart04>\u3000んっ……<emoji=heart04>\u3000――ふふっ、濃厚なキスで唾液がエッチな糸引いちゃってる……<emoji=heart04>」"
translation = "「음믓……츄팟……푸하앗……<emoji=heart04> 응읏……<emoji=heart04> ――후훗, 농후한 키스로 타액이 야한 실을 만들고 있네……<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「おま○この方も濡れてきちゃった……<emoji=heart04>」"
translation = "「보지 쪽도 젖어 버렸어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ね、触って……？」"
translation = "「자, 만져 봐……?」"

[[dialogue]]
speaker = "unk"
original = "彼女が俺の右手に触れて、そっと下の方に誘導する。指で彼女の小さな割れ目に触れると――"
translation = "그녀가 나의 오른손에 닿아, 살짝 아래쪽으로 유도한다. 손가락으로 그녀의 작은 갈라진 틈에 닿자――"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「あっ<emoji=heart04>\u3000あんっ……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 앙읏……<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「はあぁっ……ふうぅっ……<emoji=heart04>\u3000んっ……<emoji=heart04>\u3000貴方の指、おま○こに入ってくるわ<emoji=heart04>」"
translation = "「하아앗……후우읏……<emoji=heart04> 응읏……<emoji=heart04> 네 손가락, 보지에 들어오네<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「あっ、あんっ<emoji=heart04>\u3000はあぁっ……ふあぁっ……<emoji=heart04>\u3000んっ……あっ<emoji=heart04>\u3000はあぁっ……ふうぅっ……<emoji=heart04>\u3000んっ……んうぅっ……<emoji=heart04>」"
translation = "「앗, 앙읏<emoji=heart04> 하아앗……후아앗……<emoji=heart04> 응읏……앗<emoji=heart04> 하아앗……후우읏……<emoji=heart04> 응읏……응우읏……<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「はあぁっ……<emoji=heart04>\u3000くちゅくちゅってエッチな音が聞こえてきてる<emoji=heart04>\u3000あっ、あんっ<emoji=heart04>\u3000ふうぅっ……んんっ……<emoji=heart04>」"
translation = "「하아앗……<emoji=heart04> 쿠츄쿠츄 하는 야한 소리가 들려오고 있어<emoji=heart04> 앗, 앙읏<emoji=heart04> 후우읏……응응읏……<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「あっ<emoji=heart04>\u3000そこ弱いの<emoji=heart04>\u3000あっ、あっ<emoji=heart04>\u3000ダメ<emoji=heart04>\u3000感じて、愛液いっぱい出てきちゃうっ……<emoji=heart04>\u3000あっ、はあぁっ……<emoji=heart04>\u3000んあぁっ……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 거기 약해<emoji=heart04> 앗, 앗<emoji=heart04> 안 돼<emoji=heart04> 느껴서, 애액 잔뜩 나와 버려읏……<emoji=heart04> 앗, 하아앗……<emoji=heart04> 응아앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「んっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000もうおま○この方もぐちょぐちょで、エッチな糸引いちゃってるぅ……<emoji=heart04>\u3000はあぁっ……<emoji=heart04>\u3000ふあぁっ……<emoji=heart04>」"
translation = "「응읏<emoji=heart04> 앗<emoji=heart04> 이제 보지 쪽도 질척질척해서, 야한 실을 만들고 있어읏……<emoji=heart04> 하아앗……<emoji=heart04> 후아앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「あっ、あんっ<emoji=heart04>\u3000会長の勃起おち○ぽ、当たってる<emoji=heart04>\u3000んっ……<emoji=heart04>\u3000はあぁっ……<emoji=heart04>\u3000んあぁっ……<emoji=heart04>」"
translation = "「앗, 앙읏<emoji=heart04> 회장의 발기 자지, 닿고 있어<emoji=heart04> 응읏……<emoji=heart04> 하아앗……<emoji=heart04> 응아앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「熱くて大きいので、おま○この穴に、ちゅっちゅって<emoji=heart04>\u3000あっ<emoji=heart04>\u3000キスされちゃってるっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000はあぁっ……<emoji=heart04>\u3000ふうぅっ……<emoji=heart04>」"
translation = "「뜨겁고 큰 것으로, 보지 구멍에, 츄츄읏 하고<emoji=heart04> 앗<emoji=heart04> 키스당하고 있어읏<emoji=heart04> 응읏<emoji=heart04> 하아앗……<emoji=heart04> 후우읏……<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ふあぁっ<emoji=heart04>\u3000ダメ<emoji=heart04>\u3000クリ擦るの感じちゃう<emoji=heart04>\u3000あっ、あっ<emoji=heart04>\u3000はぁっ……ふああぁんっ……<emoji=heart04>」"
translation = "「후아앗<emoji=heart04> 안 돼<emoji=heart04> 클리를 문지르는 게 느껴져<emoji=heart04> 앗, 앗<emoji=heart04> 하앗……후아아앙읏……<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「んっ……<emoji=heart04>\u3000ね、ねぇ<emoji=heart04>\u3000もう会長のも愛液でぬちょぬちょになってるから……もういいでしょ？」"
translation = "「응읏……<emoji=heart04> 저, 저기<emoji=heart04> 이제 회장 것도 애액으로 끈적끈적해졌으니까……이제 됐지?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「おま○こ……入れてぇ<emoji=heart04>」"
translation = "「보지……넣어줘<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「あんっ<emoji=heart04>\u3000焦らさないで、おち○ぽ早くぅ～<emoji=heart04>」"
translation = "「앙읏<emoji=heart04> 애태우지 말고, 자지 빨리이～<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ふあぁっ……<emoji=heart04>\u3000おち○ぽ、私の穴にグリグリされてるぅ……<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁっ……んんっ……<emoji=heart04>」"
translation = "「후아앗……<emoji=heart04> 자지, 내 구멍에 부비부비 당하고 있어읏……<emoji=heart04> 앗<emoji=heart04> 하아앗……응응읏……<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「はあぁっ<emoji=heart04>\u3000先っぽで押し広げられてぇ……<emoji=heart04>\u3000んっ、んんっ<emoji=heart04>」"
translation = "「하아앗<emoji=heart04> 끝으로 밀어 넓혀지고……<emoji=heart04> 응읏, 응응읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「あっ――<emoji=heart04><emoji=heart04>」"
translation = "「앗――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ふああぁ～～～っ<emoji=heart04><emoji=heart04>\u3000おち○ぽ、中にきたぁ～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「후아아아～～～읏<emoji=heart04><emoji=heart04> 자지, 안에 들어왔다아～～～읏<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「あっ、あっ、あんっ<emoji=heart04>\u3000はあぁっ、んんっ……<emoji=heart04>\u3000あっ、はぁっ、ふあぁっ<emoji=heart04>\u3000んっ、あっ……はあぁっ、んあぁんっ……<emoji=heart04>\u3000あっ、あっ、ふあぁっ<emoji=heart04>\u3000はあぁんっ……<emoji=heart04>」"
translation = "「앗, 앗, 앙읏<emoji=heart04> 하아앗, 응응읏……<emoji=heart04> 앗, 하앗, 후아앗<emoji=heart04> 응읏, 앗……하아앗, 응아앙읏……<emoji=heart04> 앗, 앗, 후아앗<emoji=heart04> 하아앙읏……<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「待ち侘びてた発情期おま○こが絡みついちゃう<emoji=heart04>\u3000あっ、あっ、あんっ……<emoji=heart04>\u3000はぁっ、はぁっ、ふぅっ<emoji=heart04>\u3000んっ、あっ、あっ……ふあぁんっ<emoji=heart04>」"
translation = "「기다리고 기다리던 발정기 보지가 휘감겨 버려<emoji=heart04> 앗, 앗, 앙읏……<emoji=heart04> 하앗, 하앗, 후읏<emoji=heart04> 응읏, 앗, 앗……후아앙읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「あっ、あっ、んあぁっ<emoji=heart04>\u3000効くぅ<emoji=heart04>\u3000んっ、んっ、ふああぁっ……<emoji=heart04>\u3000おま○こ気持ちいぃ<emoji=heart04>\u3000あっ、あっ、はあぁっ<emoji=heart04>\u3000んあぁんっ……<emoji=heart04>」"
translation = "「앗, 앗, 응아앗<emoji=heart04> 효과 있어읏<emoji=heart04> 응읏, 응읏, 후아아앗……<emoji=heart04> 보지 기분 좋아아<emoji=heart04> 앗, 앗, 하아앗<emoji=heart04> 응아앙읏……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "快楽のままに甘い嬌声をあげる蘭美。"
translation = "쾌락 그대로 달콤한 교성을 지르는 라비."

[[dialogue]]
speaker = "unk"
original = "声が大きいから抑えてと、俺が慌てていると――"
translation = "소리가 크니까 자제하라고, 내가 당황하고 있자――"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「大丈夫よっ<emoji=heart04>\u3000あっ、あっ、あんっ<emoji=heart04>\u3000さっき言った隠蔽星術で、声も周りに聞こえないようになってるからぁっ<emoji=heart04>\u3000あっ、あっ、はあぁんっ<emoji=heart04>」"
translation = "「괜찮아읏<emoji=heart04> 앗, 앗, 앙읏<emoji=heart04> 아까 말한 은폐 성술로, 소리도 주위에 들리지 않게 되어 있으니까아읏<emoji=heart04> 앗, 앗, 하아앙읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「貴方も興奮したら、遠慮せずに声出していいのよっ<emoji=heart04>\u3000んっ、あっ、あっ<emoji=heart04>\u3000はぁっ、ふぅっ……ふあぁっ<emoji=heart04>」"
translation = "「너도 흥분하면, 사양하지 말고 소리 내도 돼읏<emoji=heart04> 응읏, 앗, 앗<emoji=heart04> 하앗, 후읏……후아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「はあぁっ<emoji=heart04>\u3000んっ、ふぅっ、んうぅっ……<emoji=heart04>\u3000はぁっ、あっ、ふうぅっ……<emoji=heart04>\u3000はぁっ、はぁっ、んあぁっ……<emoji=heart04>\u3000ふぅっ、ふぅっ、んうぅっ<emoji=heart04>\u3000あっ、あっ、ふあぁんっ……<emoji=heart04>」"
translation = "「하아앗<emoji=heart04> 응읏, 후읏, 응우읏……<emoji=heart04> 하앗, 앗, 후우읏……<emoji=heart04> 하앗, 하앗, 응아앗……<emoji=heart04> 후읏, 후읏, 응우읏<emoji=heart04> 앗, 앗, 후아앙읏……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……もしかして、初めての青姦で興奮してる？」"
translation = "「……혹시, 첫 야외 섹스에 흥분했어?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「んっ<emoji=heart04>\u3000そんなわけないじゃないっ<emoji=heart04>\u3000はぁっ、はぁっ、ふうぅっ……<emoji=heart04>」"
translation = "「응읏<emoji=heart04> 그럴 리 없잖아읏<emoji=heart04> 하앗, 하앗, 후우읏……<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「これは発情期で感度が上がっちゃってるせいよっ<emoji=heart04>\u3000あっ、あっ、あんっ<emoji=heart04>\u3000はぁっ、はぁっ、んあぁんっ……<emoji=heart04>」"
translation = "「이건 발정기로 감도가 높아져 버린 탓이야읏<emoji=heart04> 앗, 앗, 앙읏<emoji=heart04> 하앗, 하앗, 응아앙읏……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "と、その時だった。"
translation = "그때였다."

[[dialogue]]
speaker_original = "女子生徒Ａ"
speaker_translation = "여학생 A"
original = "「――ねぇ、教室まで行くなら、ここ通った方が早くない？」"
translation = "「――저기, 교실까지 갈 거면, 여기로 가는 게 빠르지 않아?」"

[[dialogue]]
speaker_original = "女子生徒Ｂ"
speaker_translation = "여학생 B"
original = "「確かに、近道かも！\u3000そうしよっか」"
translation = "「확실히, 지름길일지도! 그렇게 할까」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "unk"
original = "なんと、女子生徒２人が近くを通りかかる。"
translation = "놀랍게도, 여학생 두 명이 근처를 지나간다."

[[dialogue]]
speaker = "unk"
original = "俺は思わずドキッとするが、"
translation = "나는 무심코 깜짝 놀라지만,"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「っ……<emoji=heart04>\u3000んっ……！\u3000ふうぅっ……<emoji=heart04>」"
translation = "「읏……<emoji=heart04> 응읏……! 후우읏……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "蘭美のおま○こが、きゅうきゅう反応してペニスを締め付けてくる。"
translation = "라비의 보지가 꽉꽉 반응하며 페니스를 조여 온다."

[[dialogue]]
speaker_original = "女子生徒Ａ"
speaker_translation = "여학생 A"
original = "「部活終わったし、この後どこかに寄ってく？」"
translation = "「동아리 끝났으니까, 이 다음에 어디 들를까?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「あっ、あっ、あんっ<emoji=heart04>」"
translation = "「앗, 앗, 앙읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "女子生徒Ｂ"
speaker_translation = "여학생 B"
original = "「お腹減ったし、カフェテリアで何か食べたいかも～」"
translation = "「배고프니까, 카페테리아에서 뭐 좀 먹고 싶을지도～」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「はあぁっ、ふあぁっ……<emoji=heart04>\u3000んっ、あっ、あっ、はあぁんっ……<emoji=heart04>」"
translation = "「하아앗, 후아앗……<emoji=heart04> 응읏, 앗, 앗, 하아앙읏……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "女子生徒たちは蘭美の大きな喘ぎ声に気づくことなく、通り過ぎて行った。"
translation = "여학생들은 라비의 큰 신음 소리를 눈치채지 못하고, 지나쳐 갔다."

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「はぁっ、はぁっ<emoji=heart04>\u3000んっ……ふうぅっ……<emoji=heart04>」"
translation = "「하앗, 하앗<emoji=heart04> 응읏……후우읏……<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「――ね？\u3000大丈夫だったでしょっ……<emoji=heart04>」"
translation = "「――봐? 괜찮았잖아읏……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「蘭美、意外とＭっ気があるよね」"
translation = "「라비, 의외로 M 기질이 있네」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「んっ<emoji=heart04>\u3000なにを言ってるのっ……<emoji=heart04>\u3000あっ、あっ<emoji=heart04>\u3000違うからっ……<emoji=heart04>\u3000はぁっ、はぁっ、ふうぅっ……<emoji=heart04>\u3000あっ、あっ、んあぁっ……<emoji=heart04>」"
translation = "「응읏<emoji=heart04> 무슨 말을 하는 거야읏……<emoji=heart04> 앗, 앗<emoji=heart04> 아니거든읏……<emoji=heart04> 하앗, 하앗, 후우읏……<emoji=heart04> 앗, 앗, 응아앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「――生徒が近くを通ったのに興奮してたって？\u3000んっ、あっ、あっ<emoji=heart04>\u3000ふあぁっ……<emoji=heart04>」"
translation = "「――학생이 근처를 지나가는데 흥분했다고? 응읏, 앗, 앗<emoji=heart04> 후아앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「違うわよっ……<emoji=heart04>\u3000私は自分の星術でバレないってわかってたものっ。あっ、あっ、あんっ<emoji=heart04>\u3000はぁっ、はぁっ、ふうぅっ……<emoji=heart04>」"
translation = "「아니거든읏……<emoji=heart04> 나는 내 성술로 들키지 않는다는 걸 알고 있었단 말이야읏. 앗, 앗, 앙읏<emoji=heart04> 하앗, 하앗, 후우읏……<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「そういう会長こそ、腰を振るの止めなかったじゃないっ<emoji=heart04>\u3000あっ、あっ、あんっ……<emoji=heart04>\u3000興奮してたんじゃないの？\u3000んっ、あっ、あっ……<emoji=heart04>」"
translation = "「그런 회장이야말로, 허리 흔드는 걸 멈추지 않았잖아읏<emoji=heart04> 앗, 앗, 앙읏……<emoji=heart04> 흥분했던 거 아니야? 응읏, 앗, 앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「んっ<emoji=heart04>\u3000なに？\u3000――素直じゃないメイドにはお仕置きだって？\u3000あっ、あっ、ふあぁっ……<emoji=heart04>」"
translation = "「응읏<emoji=heart04> 뭐야? ――솔직하지 못한 메이드에게는 벌을 줘야 한다고? 앗, 앗, 후아앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「それでっ、一体どうする気なのかしらっ<emoji=heart04>\u3000はぁっ、はぁっ、ふうぅっ……<emoji=heart04>」"
translation = "「그래서읏, 대체 어떻게 할 생각인 건데읏<emoji=heart04> 하앗, 하앗, 후우읏……<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「――激しくしちゃうの？\u3000んっ……<emoji=heart04>\u3000ふふっ、別にいいわよ<emoji=heart04>」"
translation = "「――격렬하게 할 거야? 응읏……<emoji=heart04> 후훗, 상관없어<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「この私をわからせてみなさいっ<emoji=heart04>」"
translation = "「이 나를 깨닫게 해 보시지읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「あっ―――<emoji=heart04><emoji=heart04>\u3000ふあああぁぁ～～～っ<emoji=heart04><emoji=heart04>\u3000激しいピストンきたぁっ<emoji=heart04>」"
translation = "「앗―――<emoji=heart04><emoji=heart04> 후아아아아～～～읏<emoji=heart04><emoji=heart04> 격렬한 피스톤 왔다아읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「あっ、あっ、あっ、あんっ<emoji=heart04>\u3000あっ、あっ、あっ、ふああぁっ<emoji=heart04>\u3000んっ、んっ、んっ、はあぁっ<emoji=heart04>\u3000はぁっ、はぁっ、はぁ、んああぁっ<emoji=heart04>\u3000あっ、あっ、あっ、ふああぁんっ<emoji=heart04>」"
translation = "「앗, 앗, 앗, 앙읏<emoji=heart04> 앗, 앗, 앗, 후아아앗<emoji=heart04> 응읏, 응읏, 응읏, 하아앗<emoji=heart04> 하앗, 하앗, 하앗, 응아아앗<emoji=heart04> 앗, 앗, 앗, 후아아앙읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ふぅっ、ふぅっ、んあぁっ<emoji=heart04>\u3000おま○この奥に当たってるぅっ<emoji=heart04>\u3000んっ、あっ、あっ、すごっ<emoji=heart04>\u3000あっ、あっ、あっ、ふああぁっ<emoji=heart04>」"
translation = "「후읏, 후읏, 응아앗<emoji=heart04> 보지 깊숙한 곳에 닿고 있어읏<emoji=heart04> 응읏, 앗, 앗, 굉장해읏<emoji=heart04> 앗, 앗, 앗, 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「おち○ぽ気持ちいい<emoji=heart04>\u3000んっ、あっ、あっ、んああぁっ<emoji=heart04>\u3000あっ、あっ、あっ、奥、いいのぉっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000はぁっ、はぁっ、あっ、ふああぁんっ<emoji=heart04>」"
translation = "「자지 기분 좋아<emoji=heart04> 응읏, 앗, 앗, 응아아앗<emoji=heart04> 앗, 앗, 앗, 안쪽, 좋아아읏<emoji=heart04> 하아앗<emoji=heart04> 하앗, 하앗, 앗, 후아아앙읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「激しいセックス好きぃ<emoji=heart04>\u3000あっ、あっ、あっ、んああぁっ<emoji=heart04>\u3000んっ、んっ、んうぅっ<emoji=heart04>\u3000あっ、あっ、あっ、ふああぁんっ<emoji=heart04>」"
translation = "「격렬한 섹스 좋아아<emoji=heart04> 앗, 앗, 앗, 응아아앗<emoji=heart04> 응읏, 응읏, 응우읏<emoji=heart04> 앗, 앗, 앗, 후아아앙읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「んっ、もっとぉ<emoji=heart04>\u3000あっ、そこそこ、んっ<emoji=heart04>\u3000あっ、あっ、はあぁっ、いいっ<emoji=heart04>\u3000あっ、あっ、あっ、んああぁっ<emoji=heart04>」"
translation = "「응읏, 더어<emoji=heart04> 앗, 거기 거기, 응읏<emoji=heart04> 앗, 앗, 하아앗, 좋아읏<emoji=heart04> 앗, 앗, 앗, 응아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「奥っ<emoji=heart04>\u3000もっとおち○ぽで突いてぇ<emoji=heart04>\u3000あっ、あっ、あんっ<emoji=heart04>\u3000はあぁっ、あっ、あっ、気持ちいいっ<emoji=heart04>\u3000んっ、あっ、あっ、ふあぁっ<emoji=heart04>\u3000あっ、あっ、あっ、はああぁんっ<emoji=heart04>」"
translation = "「안쪽읏<emoji=heart04> 더 자지로 찔러줘어<emoji=heart04> 앗, 앗, 앙읏<emoji=heart04> 하아앗, 앗, 앗, 기분 좋아읏<emoji=heart04> 응읏, 앗, 앗, 후아앗<emoji=heart04> 앗, 앗, 앗, 하아아앙읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺がもうイキそうだ、と口にすると――"
translation = "내가 이제 곧 절정할 것 같다고 말하자――"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「んっ、私も気持ちいいの登ってきてるから、一緒にぃ<emoji=heart04>\u3000あっ、あっ、あっ、ふああぁっ<emoji=heart04>」"
translation = "「응읏, 나도 기분 좋은 게 올라오고 있으니까, 같이이<emoji=heart04> 앗, 앗, 앗, 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「射精前の種付けピストン、すごいぃ<emoji=heart04>\u3000あっ、あっ、あっ、んああぁっ<emoji=heart04>\u3000あっ、あっ、あっ、ふああぁっ<emoji=heart04>」"
translation = "「사정 전의 씨앗 뿌리기 피스톤, 굉장해애<emoji=heart04> 앗, 앗, 앗, 응아아앗<emoji=heart04> 앗, 앗, 앗, 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「あっ、あっ、あっ、私ももうイク<emoji=heart04>\u3000イっちゃう<emoji=heart04>」"
translation = "「앗, 앗, 앗, 나도 이제 절정<emoji=heart04> 가 버려<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「あっ、あっ、あっ、はああぁっ<emoji=heart04>\u3000おち○ぽ膨らんできた<emoji=heart04>\u3000きて、きてきてっ<emoji=heart04>」"
translation = "「앗, 앗, 앗, 하아아앗<emoji=heart04> 자지 부풀어 올랐다<emoji=heart04> 와, 와, 와줘읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「あっあっあっあっ<emoji=heart04><emoji=heart04>\u3000私もイク、イクイクイク――」"
translation = "「앗앗앗앗<emoji=heart04><emoji=heart04> 나도 가, 가가가가――」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「イックぅぅぅーーーーーーーーーっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ふあああぁぁぁ～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가아아아아아아아아아아읏<emoji=heart04><emoji=heart04><emoji=heart04> 후아아아아아아아아아아아아아아읏<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「精液、中にいっぱいきてるぅっ………<emoji=heart04>\u3000はあぁっ……<emoji=heart04>\u3000熱いぃ……<emoji=heart04>」"
translation = "「정액, 안에 잔뜩 오고 있어읏………<emoji=heart04> 하아앗……<emoji=heart04> 뜨거워어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「腰がガクガク震えちゃうっ……<emoji=heart04>\u3000んっ……ふうぅっ……<emoji=heart04>」"
translation = "「허리가 후들후들 떨려 버려읏……<emoji=heart04> 응읏……후우읏……<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「あんっ……<emoji=heart04>\u3000おち○ぽ抜けちゃう……<emoji=heart04>」"
translation = "「앙읏……<emoji=heart04> 자지 빠져 버려……<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「はあぁっ……<emoji=heart04>\u3000ふうぅっ……<emoji=heart04>」"
translation = "「하아앗……<emoji=heart04> 후우읏……<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ん……ふふっ……いつもよりいっぱい出したわね<emoji=heart04>\u3000青姦エッチ、そんなに興奮したの……？」"
translation = "「응……후훗……평소보다 잔뜩 쌌네<emoji=heart04> 야외 섹스, 그렇게 흥분했어……?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「私……？\u3000私は別に普通よ。発情期の症状が出ちゃっただけだもの……」"
translation = "「나……? 나는 별로 평소와 같아. 발정기 증상이 나와 버린 것뿐인걸……」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「でも――」"
translation = "「하지만――」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「また外で症状が出ちゃうことは、あるかもしれないし……」"
translation = "「또 밖에서 증상이 나와 버릴 수도 있고……」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「その時は仕方ないわよね……？」"
translation = "「그럴 때는 어쩔 수 없겠지……?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「体調を整えるのも、仕事のうちだもの<emoji=heart04>」"
translation = "「컨디션을 조절하는 것도, 일 중 하나인걸<emoji=heart04>」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「――さて、スッキリしたことだし、後片付けしたら、お互い仕事に戻りましょうか」"
translation = "「――자, 개운해졌으니, 뒷정리하고 나면, 서로 일로 돌아갈까」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「だけど、その前に……」"
translation = "「하지만, 그 전에……」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「会長。いつも付き合ってくれて、ありがとう」"
translation = "「회장. 항상 함께 해줘서, 고마워」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「好きよ……ちゅっ<emoji=heart04>」"
translation = "「좋아해……츄릅<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言って、キスしてくる彼女に、俺もキスで返して応えるのだった――"
translation = "그렇게 말하며 키스해 오는 그녀에게, 나도 키스로 돌려주며 응하는 것이었다――"

