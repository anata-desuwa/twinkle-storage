[[dialogue]]
speaker = "unk"
original = "天気雨の中、俺とウズメはサーシャさんに追いつく。"
translation = "여우비 속에서 나와 우즈메는 사샤 씨를 따라잡는다."

[[dialogue]]
speaker = "unk"
original = "すると、そこにはソフィアとヴィーナスの姿があった――"
translation = "그러자 그곳에는 소피아와 비너스의 모습이 있었다――"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「姉さん、私を探しにきたんですか……？」"
translation = "「언니, 저를 찾으러 오신 건가요……?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ええ。今度はちゃんと、気持ちが伝わるように行動しなきゃって思ったから……」"
translation = "「응. 이번엔 제대로 마음이 전해지도록 행동해야겠다고 생각했으니까……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ねぇ、ソフィ」"
translation = "「있지, 소피.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「今度から私と――交換日記をしてみない？」"
translation = "「앞으로 나랑―― 교환 일기를 해보지 않을래?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「は……？\u3000えっ？\u3000こ、交換日記、ですか？」"
translation = "「하……? 엣? 교, 교환 일기 말인가요?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「私はソフィのこと、大切な妹だって思ってるわ」"
translation = "「나는 소피를 소중한 동생이라고 생각하고 있어.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「私自身は、その確信があるからこそ、遠く離れていても大丈夫だったし、近くにいても会えた時に話せれば満足だった」"
translation = "「나 자신은 그 확신이 있기에 멀리 떨어져 있어도 괜찮았고, 가까이 있어도 만났을 때 이야기할 수 있으면 만족했어.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「だけど、それはあくまで私個人の満足で、ソフィのことをちゃんと深く考えられてはいなかったわ。だから――」"
translation = "「하지만 그건 어디까지나 내 개인적인 만족이었고, 소피를 제대로 깊이 생각해주지 못했어. 그러니까――」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「交換日記を通じて、自分の気持ちや考えをもっともっと、ソフィに伝えられたらと思うの」"
translation = "「교환 일기를 통해 내 마음이나 생각을 좀 더, 좀 더 소피에게 전하고 싶어.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「そして、ソフィの気持ちも……もっともっと、お姉ちゃんに教えてくれたら嬉しいわ」"
translation = "「그리고 소피의 마음도…… 좀 더, 좀 더 언니에게 알려주면 기쁘겠어.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "ソフィアはしばし、目線を落として――"
translation = "소피아는 잠시 시선을 떨구더니――"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「といっても、姉さんは連絡や約束の内容が、ひどく大雑把な人ですから……」"
translation = "「그렇다고는 해도 언니는 연락이나 약속 내용이 몹시 덜렁거리는 사람이니까요……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「うっ……」"
translation = "「윽……」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「でも……１度決めたのなら、約束を破らないことも、知っています」"
translation = "「하지만…… 한 번 결정하면 약속을 어기지 않는다는 것도 알고 있어요.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「だから、日記の締め切りや、交換の為に会う時間も、しっかりと決める必要があります」"
translation = "「그러니까 일기 마감일이나 교환을 위해 만나는 시간도 확실히 정할 필요가 있습니다.」"

[[dialogue]]
speaker = "unk"
original = "ソフィアは顔をあげて、サーシャさんの目を見て言った。"
translation = "소피아는 고개를 들고 사샤 씨의 눈을 보며 말했다."

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「言い出しっぺなんですから、忘れずにちゃんと書いて下さいね？\u3000姉さん」"
translation = "「먼저 제안하신 거니까 잊지 말고 꼭 쓰셔야 해요? 언니.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ソフィ……！」"
translation = "「소피……!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ええ！\u3000約束するわ。ソフィと毎日会えるなんて、お姉ちゃん嬉しいっ」"
translation = "「응! 약속할게. 소피와 매일 만날 수 있다니 언니는 정말 기뻐.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ね、姉さん……そんな胸を顔に押し付けられたら、息ができないですから……！」"
translation = "「어, 언니…… 그렇게 가슴을 얼굴에 밀어붙이면 숨을 쉴 수 없다니까요……!」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「と言いつつ、ソフィア、めっちゃ嬉しそうな顔してるし♪」"
translation = "「그러면서 소피아, 엄청 기쁜 표정 짓고 있다구♪」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ふふっ♪\u3000雨降ってジ・エンドというやつね！」"
translation = "「후훗♪ 비 온 뒤 지 엔드라는 거네!」"

[[dialogue]]
speaker = "unk"
original = "ことわざは間違ってるけど、意味はわかる"
translation = "속담은 틀렸지만 의미는 알겠다."

[[dialogue]]
speaker = "unk"
original = "姉妹仲良しな光景を目にして、俺たちも笑い合っていると――"
translation = "자매의 화목한 광경을 지켜보며 우리들도 함께 웃고 있자――"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「……！\u3000アステラの発見アラートだわ！」"
translation = "「……! 아스텔라 발견 알람이야!」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「マジ！？\u3000いいところだったのに～！」"
translation = "「진짜!? 좋은 분위기였는데~!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "『会長、任務管轄係より通達します！\u3000浅草地域にて、新たなアステライトの出現を確認しました！』"
translation = "『회장, 임무 관할계로부터 통달합니다! 아사쿠사 지역에서 새로운 아스텔라이트의 출현을 확인했습니다!』"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ヨミヨミ！」"
translation = "「요미요미!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "『現在、会長やお嬢様を含むプリマステラが該当地域に複数確認できますが、対処可能でしょうか？』"
translation = "『현재 회장님과 아가씨를 포함한 프리마스텔라가 해당 지역에 복수 확인됩니다만, 대처 가능할까요?』"

[[dialogue]]
speaker = "unk"
original = "大丈夫だ。すぐに出撃する！"
translation = "괜찮다. 바로 출격하겠어!"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "『ありがとうございます。元旦から申し訳ありませんが、よろしくお願いします！』"
translation = "『감사합니다. 설날부터 죄송합니다만, 잘 부탁드립니다!』"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「会長さん」"
translation = "「회장님.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「私も手伝います。早く片づけて、初詣を再開しましょう」"
translation = "「저도 돕겠습니다. 얼른 처리하고 하츠모데를 재개하죠.」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「おっ、ソフィア。いい顔つきになったじゃん♪」"
translation = "「오, 소피아. 표정 좋아졌잖아♪」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ええ、おかげさまで」"
translation = "「네, 덕분에요.」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「なら――心機一転、大掃除と行っちゃうし！」"
translation = "「그럼―― 심기일전해서 대청소하러 가보자구!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「もちろん、姉妹一緒にね♪」"
translation = "「물론 자매가 함께 말이야♪」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「はい、姉さん――」"
translation = "「네, 언니――」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「やりましょう！」"
translation = "「가죠!」"

[[dialogue]]
speaker = "unk"
original = "と、その時だった。"
translation = "그때였다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ソフィア、なんかあなたの晴れ着が光ってるわよ！」"
translation = "「소피아, 네 설빔이 빛나고 있어!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「え、これは……？」"
translation = "「에, 이건……?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「私たちの晴れ着も、ソフィアに合わせて、光り始めたわ！」"
translation = "「우리 설빔도 소피아에 맞춰서 빛나기 시작했어!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「それになんだか、お寺の神聖な気が集まってきているような――」"
translation = "「게다가 어쩐지 절의 신성한 기운이 모여들고 있는 것 같은――」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「はい。このホットな感じ、今なら……！」"
translation = "「네. 이 핫한 느낌, 지금이라면……!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「変身！」"
translation = "「변신!」"

[[dialogue]]
speaker = "unk"
original = "掛け声と共に、空まで届く光の柱が立ち昇って――"
translation = "구호와 함께 하늘까지 닿는 빛의 기둥이 솟구치고――"

[[dialogue]]
speaker = "unk"
original = "輝きが収まった後には、天気雨も止み、晴れ間がさしていた。"
translation = "광채가 가라앉은 뒤에는 여우비도 그치고 맑은 하늘이 드러나 있었다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「やったわ！\u3000星力が溢れてくるのを感じる……晴れ着フォーム、起動成功よ！」"
translation = "「해냈어! 성력이 넘쳐흐르는 게 느껴져…… 설빔 폼, 기동 성공이야!」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「すっご～い！\u3000空の雨雲まで薙ぎ払っちゃったし！\u3000これぞまさに、雨のち晴れって感じ♪」"
translation = "「대~박! 하늘의 비구름까지 날려버렸다구! 그야말로 비 온 뒤 맑음이라는 느낌♪」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ソフィの強い気持ちに、きっと晴れ着フォームが応えてくれたのね」"
translation = "「소피의 강한 마음에 분명 설빔 폼이 응답해 준 거네.」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「よっ、今日１番の晴れ女♪」"
translation = "「올, 오늘 최고의 날씨 요정♪」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「なんなんですか、その煽りは……」"
translation = "「뭐예요, 그 놀리는 말투는……」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ですが今なら、どんなアステライトでも、攻略できそうな気がします」"
translation = "「하지만 지금이라면 어떤 아스텔라이트라도 공략할 수 있을 것 같은 기분이 듭니다.」"

[[dialogue]]
speaker = "unk"
original = "よし、みんな行くぞ！"
translation = "좋아, 모두 가자!"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「はい、会長さん！」"
translation = "「네, 회장님!」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「晴れ晴れしく、薙ぎ払っちゃうし！」"
translation = "「상쾌하게 날려버리자구!」"

[[dialogue]]
speaker = "unk"
original = "新たな晴れ着フォームの力を得て、俺たちはアステライト攻略へと乗り出すのだった――"
translation = "새로운 설빔 폼의 힘을 얻어 우리들은 아스텔라이트 공략에 나서는 것이었다――"

