[[dialogue]]
speaker = "unk"
original = "キュリオスの欲深き女帝・煌嶺。"
translation = "큐리오스의 탐욕스러운 여제 코우레이."

[[dialogue]]
speaker = "unk"
original = "彼女に出会う前から、その名は度々聞いていた。"
translation = "그녀를 만나기 전부터, 그 이름은 종종 듣고 있었다."

[[dialogue]]
speaker_original = "テルル"
speaker_translation = "테루루"
original = "『魔界の皇妃──煌嶺。彼女は頽廃都市キュリオスを統べ、人のみならずアステラ由来のモンスターをも従えています』"
translation = "『마계의 황비── 코우레이. 그녀는 퇴폐도시 큐리오스를 통치하며, 인간뿐만 아니라 아스테라 유래의 몬스터들까지 거느리고 있습니다』"

[[dialogue]]
speaker_original = "リノ"
speaker_translation = "리노"
original = "「これは<ruby>頽廃都市<rt>キュリオス</rt></ruby>の皇妃、煌嶺様から賜ったもの。星骸布は──広げた一帯に、異界の夜空を映すことができる」"
translation = "「이것은 <ruby>퇴폐도시<rt>큐리오스</rt></ruby>의 황비, 코우레이 님으로부터 하사받은 것. 성해포는── 펼친 일대에, 이계의 밤하늘을 투영할 수 있다」"

[[dialogue]]
speaker_original = "メイプル"
speaker_translation = "메이플"
original = "「自分の領地さえ守れればそれでよくて、リクリエの最前線である人間界に来ようとか、微塵も思っていないんだよ、煌嶺は」"
translation = "「자기 영지만 지킬 수 있다면 그걸로 족해서, 리크리에의 최전선인 인간계에 오겠다거나 하는 생각은 미진도 안 하고 있어, 코우레이는」"

[[dialogue]]
speaker = "unk"
original = "煌嶺について事前に得ていた情報は断片的なものだ。"
translation = "코우레이에 대해 사전에 얻었던 정보는 단편적인 것이었다."

[[dialogue]]
speaker = "unk"
original = "星骸布を授けて間接的に援助してくれたものの、謎の多い存在だった。"
translation = "성해포를 내려주어 간접적으로 원조해 주었지만, 수수께끼가 많은 존재였다."

[[dialogue]]
speaker = "unk"
original = "だが──"
translation = "하지만──"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「妾の名は煌嶺。人間界では知らぬ者もいるか？」"
translation = "「소첩의 이름은 코우레이. 인간계에서는 모르는 자도 있는가?」"

[[dialogue]]
speaker = "unk"
original = "彼女は突然、新星学園の理事会に現れた。"
translation = "그녀는 갑자기 신성학원의 이사회에 나타났다."

[[dialogue]]
speaker = "unk"
original = "星骸布の対価として、新星学園理事の座を手に入れていたのだ。"
translation = "성해포의 대가로서, 신성학원 이사의 자리를 손에 넣었던 것이다."

[[dialogue]]
speaker = "unk"
original = "そしてあろうことか……"
translation = "그리고 가당치 않게도……"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「ところで、今日の理事会では新星学園の学園長を決めるのであったな。では──」"
translation = "「그런데, 오늘 이사회에서는 신성학원의 학원장을 정하기로 했었지. 그럼──」"

[[dialogue]]
speaker_original = "煌嶺"
speaker_translation = "코레이"
original = "「妾が学園長を務めようではないか！」"
translation = "「소첩이 학원장을 맡도록 하지 않겠는가!」"

[[dialogue]]
speaker = "unk"
original = "当時空席だった、新星学園の学園長になると言い出したのだった。"
translation = "당시 공석이었던 신성학원의 학원장이 되겠다고 나선 것이었다."

