[[dialogue]]
speaker = "unk"
original = "………………"
translation = "………………"

[[dialogue]]
speaker = "unk"
original = "…………"
translation = "…………"

[[dialogue]]
speaker = "unk"
original = "……"
translation = "……"

[[dialogue]]
speaker = "？？？"
original = "「――ついに、この時がやってきたわね」"
translation = "「――드디어 이때가 왔구나」"

[[dialogue]]
speaker = "？？？"
original = "「<b>女神</b>たるわたしが登場する、『ティンクル☆くるせいだーすコラボ２．５』開催の時が！」"
translation = "「<b>여신</b>인 내가 등장하는 『트윙클☆크루세이더스 콜라보 2.5』 개최의 때가!」"

[[dialogue]]
speaker = "？？？"
original = "「エグザエル、あなたの新しい依り代の準備はもうできたのかしら？」"
translation = "「에그자엘, 너의 새로운 매개체 준비는 벌써 끝났겠지?」"

[[dialogue]]
speaker_original = "エグザエル"
speaker_translation = "에그자엘"
original = "「はっ！\u3000ド派手に『キャリーケース』を連結させて、憑依できておりますぞ！」"
translation = "「핫! 화려하게 『캐리 케이스』를 연결해서 빙의해 두었나이다!」"

[[dialogue]]
speaker_original = "エグザエル"
speaker_translation = "에그자엘"
original = "「崇高なる我が創造神、ルネア様！」"
translation = "「숭고한 우리 창조신, 루네아 님!」"

[[dialogue]]
speaker_original = "ルネア"
speaker_translation = "루네아"
original = "「ふふっ、以前の棺桶もよかったけど、今回新調したキャリーケースも実にいい形状ね♪」"
translation = "「후훗, 이전의 관도 좋았지만 이번에 새로 장만한 캐리 케이스도 참 좋은 형상이네♪」"

[[dialogue]]
speaker_original = "エグザエル"
speaker_translation = "에그자엘"
original = "「ふっふっふ……この大きさならば、旅先の異世界で生意気な小娘共を中に閉じ込め、様々な衣装に着せ替えるのも自由自在……！」"
translation = "「훗훗훗…… 이 정도 크기라면 여행지인 이세계에서 건방진 꼬맹이들을 안에 가두고 다양한 의상으로 갈아입히는 것도 자유자재……!」"

[[dialogue]]
speaker_original = "エグザエル"
speaker_translation = "에그자엘"
original = "「ルネア様！\u3000向かわれる前に１度、御身が我が輩の中へと入り、着せ替えるのに問題がないか、ぜひ試して頂きたく――」"
translation = "「루네아 님! 가시기 전에 한 번, 옥체를 소생의 안에 넣어 갈아입히는 데 문제가 없는지 꼭 시험해 보시기를――」"

[[dialogue]]
speaker_original = "ルネア"
speaker_translation = "루네아"
original = "「着替え、ないっ！」"
translation = "「안 갈아입어!」"

[[dialogue]]
speaker_original = "エグザエル"
speaker_translation = "에그자엘"
original = "「ぬあはぁーーっ！？」"
translation = "「누아하아ーー앗!?」"

[[dialogue]]
speaker_original = "エグザエル"
speaker_translation = "에그자엘"
original = "「せ、せっかく中も派手にミラーコーティングして、全身鏡仕様にしておいたというのに……！」"
translation = "「개, 개인적으로 안쪽도 화려하게 미러 코팅을 해서 전신 거울 사양으로 해두었거늘……!」"

[[dialogue]]
speaker_original = "ルネア"
speaker_translation = "루네아"
original = "「当日までに直しておきなさい！」"
translation = "「당일까지 고쳐놓으렴!」"

[[dialogue]]
speaker_original = "ルネア"
speaker_translation = "루네아"
original = "「い・い・わ・ね？」"
translation = "「알·겠·지?」"

[[dialogue]]
speaker_original = "エグザエル"
speaker_translation = "에그자엘"
original = "「アッ、ハイ……」"
translation = "「앗, 넵……」"

[[dialogue]]
speaker_original = "ルネア"
speaker_translation = "루네아"
original = "「全く、この天使長は相変わらず変態なんだから……」"
translation = "「정말이지, 이 천사장은 여전히 변태라니까……」"

[[dialogue]]
speaker_original = "ルネア"
speaker_translation = "루네아"
original = "「というわけで、出発は<b>３日後</b>よ」"
translation = "「어쨌든 출발은 <b>사흘</b> <b>뒤</b>야」"

[[dialogue]]
speaker_original = "エグザエル"
speaker_translation = "에그자엘"
original = "「御意！」"
translation = "「명령대로!」"

[[dialogue]]
speaker_original = "ルネア"
speaker_translation = "루네아"
original = "「異世界の魔王……女神の降臨を楽しみに待ってなさい」"
translation = "「이세계의 마왕…… 여신의 강림을 기대하며 기다리렴」"

[[dialogue]]
speaker_original = "エグザエル"
speaker_translation = "에그자엘"
original = "「ふはははは！\u3000人間界の諸君、我が輩もこうしてリニューアルした姿で登場するが故、全裸で待機しているがいい！」"
translation = "「푸하하하하! 인간계 제군들, 소생도 이렇게 리뉴얼된 모습으로 등장할 터이니 전라로 대기하고 있거라!」"

[[dialogue]]
speaker_original = "エグザエル"
speaker_translation = "에그자엘"
original = "「ということで、ルネア様も当日に履いていく勝負下着などを我が輩の中へ――」"
translation = "「그런 의미에서 루네아 님도 당일에 입으실 승부 속옷 등을 소생의 안에――」"

[[dialogue]]
speaker_original = "ルネア"
speaker_translation = "루네아"
original = "「履かんわ！」"
translation = "「안 입어!」"

[[dialogue]]
speaker_original = "エグザエル"
speaker_translation = "에그자엘"
original = "「ノォォォーーパンッ！？」"
translation = "「노오오오ーー팬티!?」"

[[dialogue]]
speaker_original = "ルネア"
speaker_translation = "루네아"
original = "「いや、普通の下着を履くから！\u3000勝負下着はシンの前だけなんだからっ」"
translation = "「아니, 평범한 속옷은 입거든! 승부 속옷은 신의 앞에서만 입을 거니까」"

[[dialogue]]
speaker_original = "ルネア"
speaker_translation = "루네아"
original = "「とにかく、３日後のコラボイベント開始をお楽しみにね」"
translation = "「어쨌든 사흘 뒤의 콜라보 이벤트 시작을 기대해 줘」"

[[dialogue]]
speaker_original = "エグザエル"
speaker_translation = "에그자엘"
original = "「ルネア様の麗しき姿を、パンツを脱いで待っているがいい！」"
translation = "「루네아 님의 아름다운 모습을 팬티를 벗고 기다리고 있거라!」"

