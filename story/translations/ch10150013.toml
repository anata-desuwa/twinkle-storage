[[dialogue]]
speaker = "unk"
original = "第３話,炎の天使ＶＳ炎の料理人,P"
translation = "제3화, 화염의 천사 VS 화염의 요리사"

[[dialogue]]
speaker = "unk"
original = "アルモと街へ観光に行ってからしばらく経ったある日。食欲に目覚めた彼女を、学園のカフェテリアへ案内することになった。"
translation = "알모와 거리로 관광을 다녀온 뒤 한참이 지난 어느 날. 식욕에 눈을 뜬 그녀를 학원의 카페테리아로 안내하게 되었다."

[[dialogue]]
speaker = "アルモタヘル"
original = "「ふむ、ここが生徒達が利用する食事処か。良き雰囲気の場所だ」"
translation = "「흠, 이곳이 학생들이 이용하는 식당인가. 분위기가 좋은 곳이군」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「然れど、ここの料理が美味だというのは本当か？」"
translation = "「허나, 이곳의 요리가 별미라는 것이 정말이더냐?」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「あれから我は、いくつもの名店を食べ歩いている。ここの料理が美味だといっても、それはあくまで生徒たちに合わせた値段設定の範囲内であろう？」"
translation = "「그 후로 짐은 여러 유명한 가게를 찾아다니며 먹어보았다. 이곳의 요리가 맛있다고는 해도, 그것은 어디까지나 학생들의 수준에 맞춘 가격대 내에서의 이야기겠지?」"

[[dialogue]]
speaker = "unk"
original = "蛍火の作る料理は高級店にも負けないよ"
translation = "「호타루비가 만드는 요리는 고급 음식점에도 뒤지지 않아」"

[[dialogue]]
speaker = "unk"
original = "そんなことはない。"
translation = "「그렇지 않아.」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「東雲蛍火、といったか。その者も学園の生徒なのだろう？\u3000プロの料理人に匹敵する腕前とは、にわかには信じ難いが……」"
translation = "「시노노메 호타루비, 라고 했던가. 그자도 학원의 학생일 터? 프로 요리사에 필적하는 솜씨라니, 선뜻 믿기 어렵다만……」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「……む？\u3000この、背中に感じる鋭い視線は？\u3000何奴！\u3000隠れてなどおらず、堂々と姿を現すがよい！」"
translation = "「……음? 이 등에 느껴지는 날카로운 시선은? 네 이놈! 숨어 있지 말고 당당히 모습을 드러내거라!」"

[[dialogue]]
speaker = "蛍火"
original = "「……はい」"
translation = "「……네」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「さては、お前が件の料理人か。……我は守護天使《命脈》のアルモタヘル。親しみを込めて、アルモたんと呼ぶがよい」"
translation = "「과연, 네놈이 소문의 그 요리사인가. ……짐은 수호천사 《명맥》의 아르모타헬. 친근함을 담아 알모땅이라 불러도 좋다」"

[[dialogue]]
speaker = "蛍火"
original = "「新星学園２年生、東雲蛍火……。本日、アルモタヘル様が私の料理を食べに来ることは、師匠から事前に連絡を頂いていました」"
translation = "「신성 학원 2학년, 시노노메 호타루비……. 오늘 아르모타헬 님께서 제 요리를 드시러 온다는 것은 스승님께 미리 연락받았습니다」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「ほう、それ故に闘志溢れた鋭い視線を我に向けていたというわけか。料理人と審査人、その両名が出会えば戦いは必定だからな」"
translation = "「호오, 그렇기에 투지 넘치는 날카로운 시선을 짐에게 보내고 있었다는 뜻인가. 요리사와 심사위원, 그 양자가 만나면 싸움은 필정인 법이지」"

[[dialogue]]
speaker = "unk"
original = "戦い？\u3000いや待って、何の話？"
translation = "「싸움? 아니 잠깐, 무슨 소리야?」"

[[dialogue]]
speaker = "蛍火"
original = "「……なるほど、アルモタヘル様は既に審査人の領域へ達しておりましたか。準備しておいて正解でした」"
translation = "「……과연, 아르모타헬 님께서는 이미 심사위원의 영역에 도달해 계셨군요. 준비해 두길 잘했습니다」"

[[dialogue]]
speaker = "蛍火"
original = "「私も真の料理人である父の背中を見て育った身。その挑戦、受けて立ちましょう」"
translation = "「저 또한 진정한 요리사인 아버지의 뒷모습을 보고 자란 몸. 그 도전, 받아들이겠습니다」"

[[dialogue]]
speaker = "unk"
original = "俺だけ流れに付いて行けてないんだけど！？"
translation = "「나만 흐름을 못 따라가고 있는데!?」"

[[dialogue]]
speaker = "unk"
original = "待って待って！！"
translation = "「잠깐 잠깐!!」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「ふっ、その意気や良し。鬼の子よ、せいぜい我の舌を楽しませるがよい！」"
translation = "「훗, 그 기개는 가상하구나. 오니의 자식이여, 기껏해야 짐의 혀를 즐겁게 해 보거라!」"

[[dialogue]]
speaker = "蛍火"
original = "「それでは、こちらをどうぞ。カフェテリアで扱っている牛肩ロース肉を使ったステーキです」"
translation = "「그럼, 이것을 드셔 보세요. 카페테리아에서 취급하는 소 어깨로스 부위를 사용한 스테이크입니다」"

[[dialogue]]
speaker = "unk"
original = "──実食！！！"
translation = "──실식!!!"

[[dialogue]]
speaker = "アルモタヘル"
original = "「……ふむ、悪いが今の我なら見るだけで肉の品質がわかる。これは安い肉だな」"
translation = "「……흠, 미안하지만 지금의 나라면 보는 것만으로 고기의 품질을 알 수 있다. 이건 저렴한 고기로군」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「鬼の子よ。我を舐めているな？\u3000既にいくつもの有名な高級店を渡り歩いた身。学園の食堂レベルでは、我の舌を唸らせるのは困難と心得よ。……もぐもぐ」"
translation = "「오니의 아이여. 나를 얕보고 있느냐? 이미 수많은 유명 고급점을 섭렵한 몸. 학원의 식당 수준으로는, 나의 혀를 감탄시키기 어려울 것이라 명심하거라. ……우물우물」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「ふっ……やはりな。肉の品質は普通と言わざるを得な──」"
translation = "「훗…… 역시나군. 고기의 품질은 보통이라고 말하지 않을 수 없──」"

[[dialogue]]
speaker = "unk"
original = "アルモたぁぁぁ────んッ！！？"
translation = "알모타하아아아────알!!? 코오오오오오오오!!?"

[[dialogue]]
speaker = "蛍火"
original = "「な、何かのドッキリですか、これ？」"
translation = "「머, 무슨 몰래카메라 같은 건가요, 이거?」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「ドッキリではない」"
translation = "「몰래카메라는 아니다」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「ビックリだ、もぐもぐ」"
translation = "「깜짝 놀랐다, 우물우물」"

[[dialogue]]
speaker = "unk"
original = "いや、こっちがビックリなんだが！？"
translation = "아니, 이쪽이 더 깜짝 놀랐거든!? "

[[dialogue]]
speaker = "蛍火"
original = "「お皿を持ったまま、肉もソースすらもこぼさずに、着地した……！？」"
translation = "「접시를 든 채로, 고기도 소스조차도 흘리지 않고, 착지했어……!?」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「もぐもぐ……ごっくん。我が浅はかであった……高級な肉をいくつも口にしたというだけで、さも食を知り尽くしたかのような言動……」"
translation = "「우물우물…… 꿀꺽. 내가 어리석었구나…… 고급 고기를 몇 번 입에 담았다는 것만으로, 마치 음식을 다 아는 듯한 언동……」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「食材の品質が美食のすべてを支配するわけではないのだと、このステーキで思い知らされた。高級な肉ではないからこそ、調理の工夫により生まれる美味……」"
translation = "「식재료의 품질이 미식의 모든 것을 지배하는 것이 아님을, 이 스테이크로 뼈저리게 깨달았다. 고급 고기가 아니기에, 조리의 궁리로 태어나는 풍미……」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「そう、実に美味であった……む？\u3000なんだこれは？」"
translation = "「그래, 실로 맛있었도다…… 음? 이건 뭐지?」"

[[dialogue]]
speaker = "unk"
original = "アルモ、涙が……！"
translation = "알모, 눈물이……!"

[[dialogue]]
speaker = "アルモタヘル"
original = "「涙……？\u3000我は泣いているのか？\u3000これは一体どういうことだ……？」"
translation = "「눈물……? 내가 울고 있는 건가? 이건 대체 어찌 된 일이지……?」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「そうか。美味であることに、我は『感動』したのか……」"
translation = "「그런가. 맛있는 것에, 나는 『감동』한 것인가……」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「……認めよう、東雲蛍火よ。我の完敗だ。お前は、間違いなく……我の知るプロの者たちに匹敵──いや、それを上回る実力の料理人だ」"
translation = "「……인정하마, 시노노메 호타루비여. 나의 완패다. 너는, 틀림없이…… 내가 아는 프로들에게 필적── 아니, 그것을 상회하는 실력의 요리사다」"

[[dialogue]]
speaker = "蛍火"
original = "「……ありがとうございます、アルモタヘル様」"
translation = "「……감사합니다, 아르모타헬 님」"

[[dialogue]]
speaker = "unk"
original = "なら、勝者の願いを聞いてあげてくれないかな"
translation = "그럼, 승자의 소원을 들어주지 않을래?"

[[dialogue]]
speaker = "アルモタヘル"
original = "「願いを？\u3000よかろう。我に出来ることならば、申してみるがよい」"
translation = "「소원을? 좋다. 내가 할 수 있는 일이라면, 말해 보거라」"

[[dialogue]]
speaker = "unk"
original = "──蛍火が極度の緊張しいであること、それ故に友達が少なくて増やしたいと思っていることを、アルモに話して聞かせた。"
translation = "──호타루비가 극도로 긴장을 잘하는 성격이라는 것, 그 때문에 친구가 적어서 늘리고 싶어 한다는 것을, 알모에게 이야기해 주었다."

[[dialogue]]
speaker = "アルモタヘル"
original = "「それで、我とも友達になりたい、と……？」"
translation = "「그래서, 나와도 친구가 되고 싶다, 고……?」"

[[dialogue]]
speaker = "蛍火"
original = "「嫌でしたら、別に無理にとは……」"
translation = "「싫으시다면, 딱히 억지로라고는……」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「ふっ……そんな簡単なことか。優れた料理人と友になれるなど、むしろ光栄だ」"
translation = "「훗…… 그런 간단한 일인가. 뛰어난 요리사와 벗이 될 수 있다니, 오히려 영광이다」"

[[dialogue]]
speaker = "蛍火"
original = "「……！\u3000それでは……」"
translation = "「……! 그렇다면……」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「然り。我が友、蛍火よ。我にもっと、お前の作る美味な肉料理を食べさせてくれまいか」"
translation = "「그러하다. 나의 벗, 호타루비여. 나에게 좀 더, 네가 만드는 감미로운 고기 요리를 먹게 해주지 않겠나」"

[[dialogue]]
speaker = "蛍火"
original = "「は、はい！\u3000喜んで……！\u3000アルモ様」"
translation = "「네, 네! 기꺼이……! 아루모 님」"

[[dialogue]]
speaker = "unk"
original = "蛍火は緊張が解けて、アルモと握手を交わすと、リラックスモードの笑顔を見せる。"
translation = "호타루비는 긴장이 풀려서, 아루모와 악수를 나누고는, 릴랙스 모드의 미소를 보여준다."

[[dialogue]]
speaker = "unk"
original = "これで、めでたしめでたしかと思われたが──"
translation = "이것으로, 경사로세 경사로세라고 생각되었지만──"

[[dialogue]]
speaker = "アルモタヘル"
original = "「蛍火よ、次はこの肉料理を注文する」"
translation = "「호타루비여, 다음은 이 고기 요리를 주문하겠다」"

[[dialogue]]
speaker = "蛍火"
original = "「ふふっ。はい、アルモ様！\u3000喜んで」"
translation = "「후훗. 네, 아루모 님! 기꺼이」"

[[dialogue]]
speaker = "unk"
original = "延々と食べ続けるアルモと、幸せそうに料理を提供し続ける蛍火を、慌てて止めることになるのだった。"
translation = "끊임없이 계속 먹어대는 아루모와, 행복한 듯이 요리를 계속 제공하는 호타루비를, 황급히 말리게 되는 것이었다."

