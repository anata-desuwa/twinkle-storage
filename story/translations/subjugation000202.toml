[[dialogue]]
speaker = "unk"
original = "星徒会室で合宿の開催が決定した翌日の朝。"
translation = "성도회실에서 합숙 개최가 결정된 다음 날 아침."

[[dialogue]]
speaker = "unk"
original = "俺達はリゾート結界のビーチに集合していた――"
translation = "우리들은 리조트 결계의 해변에 모여 있었다──"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「リップルさん、今回はリゾート結界を貸して頂き、ありがとうございます」"
translation = "「리플 씨, 이번에 리조트 결계를 빌려주셔서 감사합니다.」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「アハハ～、お礼なんていいデスよ～。むしろこれは、前の合宿でワタシが皆に助けて貰ったことへのお礼デスから！」"
translation = "「아하하~, 감사 인사는 됐어용~. 오히려 이건 저번 합숙 때 제가 모두에게 도움받은 것에 대한 보답이니까용!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「でも、まさか星徒会用のプライベートビーチを作ってくれるなんて、思わなかったわ～。まさに無人島で、お姉ちゃんウキウキしちゃう♪」"
translation = "「하지만 설마 성도회용 프라이빗 비치를 만들어 줄 줄은 몰랐어~. 그야말로 무인도라 언니는 두근두근해♪」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「この結界は、ワタシが学園の皆さんに開放している『パブリックビーチ』をコピーしてツクった、もう１つのリゾート結界で～す」"
translation = "「이 결계는 제가 학원 여러분께 개방하고 있는 『퍼블릭 비치』를 복사해서 만든 또 하나의 리조트 결계입니당~」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「そんなことも出来ちゃうのね～」"
translation = "「그런 것도 가능하구나~」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「まさに万能。リップルさん、もはや出来ないことはないのでは？」"
translation = "「그야말로 만능. 리플 씨, 이제 못 하시는 게 없는 것 아닌가요?」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「残念ながら、そこまで万能ではナイです。リゾート結界を召喚することは、いつでもデキますが――」"
translation = "「아쉽게도 그 정도로 만능은 아니랍니당. 리조트 결계를 소환하는 건 언제든 가능하지만──」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「結界の中で何かを新しくツクったり、イジったり出来るのは夏の期間だけ。夏パワーが最大出力の時じゃないと、デキないです」"
translation = "「결계 안에서 뭔가를 새로 만들거나 손보는 건 여름 기간뿐. 여름 파워가 최대 출력일 때가 아니면 못 해용.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「夏パワー？」"
translation = "「여름 파워?」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ハイ。ワタシの力には周期があって、夏の時期が１番強くなるんです。それでワタシは夏パワーって呼んでます」"
translation = "「넹. 제 힘에는 주기가 있어서 여름 시기에 가장 강해지거든용. 그래서 전 여름 파워라고 불러용.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「なるほど、人狼系の魔族は月の満ち欠けによって、星力が変化すると聞いたことがあります。おそらくリップルさんのは、それに近い特性なのでしょう」"
translation = "「과연, 인랑계 마족은 달의 차오름에 따라 성력이 변화한다고 들은 적이 있습니다. 아마 리플 씨의 것도 그것과 비슷한 특성이겠죠.」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「なので、今の内に皆さんへお礼をしたかったんです♪\u3000せっかくのサバイバル合宿なら、他に人が居ない方が雰囲気も出るかとオモいますし！」"
translation = "「그래서 지금 기회에 여러분께 보답하고 싶었어용♪ 기왕 하는 서바이벌 합숙이라면 다른 사람이 없는 게 분위기도 날 것 같구용!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ちなみに海の家に設置した扉と、新星学園の星徒会室を繋げてあるので、そこから出入り自由になってま～す♪」"
translation = "「참고로 바다의 집에 설치한 문이랑 신성학원의 성도회실을 연결해 뒀으니까, 거기서 출입 자유입니당♪」"

[[dialogue]]
speaker = "unk"
original = "凄い便利……！"
translation = "엄청 편리하다……!"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「１つ残念なのは、ワタシも出来ればサバイバル合宿に参加したかったのデスが、今はパブリックビーチの方で海の家が忙しくて、なかなか手が離せないことデスね……」"
translation = "「한 가지 아쉬운 건 저도 가급적 서바이벌 합숙에 참여하고 싶었지만, 지금은 퍼블릭 비치 쪽 바다의 집이 바빠서 좀처럼 자리를 비울 수 없다는 점이네용……」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「あ、でも、言ってくれれば、結界をチョチョイと弄ってサポートするくらいは全然デキますので、何かあれば呼んでクダさい！」"
translation = "「아, 그래도 말씀만 하시면 결계를 슥슥 만져서 서포트하는 정도는 언제든 가능하니까 무슨 일 있으면 불러주세용!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ありがとうございます。リップルさんも、もし時間が空きましたら遊びに来て下さい」"
translation = "「감사합니다. 리플 씨도 혹시 시간이 나시면 놀러 오세요.」"

[[dialogue]]
speaker = "unk"
original = "途中参加も待ってるよ"
translation = "중간 참여도 기다릴게."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「喜んで歓迎するわ～♪」"
translation = "「기쁘게 환영할게~♪」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「ハイ♪\u3000また様子を見に来ますね！」"
translation = "「넹♪ 또 상황 보러 올게용!」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「それじゃあ、ワタシはそろそろ海の家を開店するジカンなので、パブリックビーチの方へ行ってキマ～す！」"
translation = "「그럼 전 슬슬 바다의 집을 개점할 시간이라 퍼블릭 비치 쪽으로 가볼게용!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「は～い、行ってらっしゃい♪\u3000リップルちゃん、海の家頑張って～」"
translation = "「네~, 잘 다녀와♪ 리플 쨩, 바다의 집 힘내~」"

[[dialogue]]
speaker_original = "リップル"
speaker_translation = "리플"
original = "「サーシャ達も合宿、頑張ってクダさい♪」"
translation = "「사샤네도 합숙 힘내세용♪」"

[[dialogue]]
speaker = "unk"
original = "そうしてリップルを見送った後、アナの号令でサバイバル合宿はスタートした。"
translation = "그렇게 리플을 배웅한 뒤, 아나의 호령으로 서바이벌 합숙은 시작되었다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「――それでは、まずはサバイバル合宿を開始するに当たって、昨日決めておいたルールを再確認しましょう」"
translation = "「──그러면 우선 서바이벌 합숙을 시작하기에 앞서 어제 정해둔 규칙을 재확인하죠.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「は～い♪」"
translation = "「네~♪」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「合宿の期間は、今日から週末にかけての３泊４日です」"
translation = "「합숙 기간은 오늘부터 주말에 걸친 3박 4일입니다.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「緊急時以外は結界の外へ出たり、海の家を使うことは禁止となります」"
translation = "「긴급 상황 이외에는 결계 밖으로 나가거나 바다의 집을 이용하는 것은 금지입니다.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ただし、身だしなみはやはり気になるので、温泉に入って体を洗うのは可とします」"
translation = "「다만 외모 관리는 역시 신경 쓰이니까 온천에 들어가서 씻는 건 허용합니다.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「寝泊まりについては、これからビーチにテントを設営して、そこでするんだったわよね？」"
translation = "「숙식은 이제부터 해변에 텐트를 설치해서 거기서 하는 거였지?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「食料は無人島内で調達して、飲み水は海の家を使わずに、無人島の湧き水を汲んで来る」"
translation = "「식료품은 무인도 안에서 조달하고, 마실 물은 바다의 집을 쓰지 않고 무인도의 샘물을 길어온다.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「つまりは、ビーチでのサマーキャンプということね～」"
translation = "「즉, 해변에서의 서머 캠프라는 거네~」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「その通りです。厳密にはサバイバル風合宿といった感じになりますが、あくまで楽しむことが第一目的ですし」"
translation = "「맞습니다. 엄격하게는 서바이벌 '풍' 합숙 같은 느낌이 되겠지만, 어디까지나 즐기는 것이 제일 목적이니까요.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「会長はともかく、私とサーシャ先輩にはサバイバル経験がありませんので、今回はこれくらいのレベルから始めるのがいいのではないかと」"
translation = "「회장님은 둘째치고 저와 사샤 선배는 서바이벌 경험이 없으니 이번에는 이 정도 레벨부터 시작하는 게 좋지 않을까 싶습니다.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ただ、この前の前会長は、最初から本気サバイバルをやる予定だった気がしますが……」"
translation = "「다만, 저번의 전 회장님은 처음부터 본격 서바이벌을 할 예정이었던 기분이 듭니다만……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふふっ♪\u3000ヴィーナスちゃんは初めてのサバイバルでも、私達なら何とかなるって、信じてた感じよね～」"
translation = "「후훗♪ 비너스 짱은 첫 서바이벌이라도, 우리라면 어떻게든 될 거라고 믿고 있었던 느낌이었지~」"

[[dialogue]]
speaker = "unk"
original = "相変わらず無茶振りですね……"
translation = "여전히 막무가내시네요……"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「でも、そのおかげでリップルちゃんと出会えたから、結果オーライだったのがヴィーナスちゃんらしいところよね～♪」"
translation = "「하지만 그 덕분에 리플 짱과 만날 수 있었으니까, 결과 오라이였던 게 비너스 짱다운 점이지~♪」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「そこが前会長のカリスマ性というか、真似できないところですね」"
translation = "「그 점이 전 회장님의 카리스마랄까, 흉내 낼 수 없는 부분이네요」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「そんなわけで、無茶振りはあくまで前会長の特権です。私達は今回、サバイバルの雰囲気を楽しむ感じで行きたいと思います」"
translation = "「그런 이유로, 막무가내는 어디까지나 전 회장님의 특권입니다. 저희는 이번에 서바이벌의 분위기를 즐기는 느낌으로 가고 싶습니다」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「お２人はそれでよろしいでしょうか？」"
translation = "「두 분은 그걸로 괜찮으신가요?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ええ。アナちゃんの考えてくれたルールで問題ないと思うわ～」"
translation = "「으응. 아나 짱이 생각해 준 규칙이라면 문제없다고 봐~」"

[[dialogue]]
speaker = "unk"
original = "俺も大丈夫"
translation = "나도 괜찮아"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「それじゃあ早速、テントの設営から始めて行きましょう」"
translation = "「그럼 곧바로 텐트 설치부터 시작해 보죠」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「会長、ご指導よろしくお願いします」"
translation = "「회장님, 지도 부탁드립니다」"

[[dialogue]]
speaker = "unk"
original = "任せてくれ！"
translation = "맡겨 줘!"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「頼りにしてるわ、会長くん♪」"
translation = "「의지하고 있을게, 회장군♪」"

[[dialogue]]
speaker = "unk"
original = "俺はそれから２人に、テントの設置のやり方を教えて行くのだった――"
translation = "나는 그 뒤 두 사람에게 텐트를 설치하는 방법을 가르쳐 주는 것이었다――"

