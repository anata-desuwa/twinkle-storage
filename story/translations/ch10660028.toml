[[dialogue]]
speaker = "unk"
original = "今、俺とラティエさんは豪華客船『チェリークルーズ号』に乗っていた。"
translation = "지금 나와 라티에 씨는 호화 여객선 『체리 크루즈 호』에 타고 있었다."

[[dialogue]]
speaker = "unk"
original = "この船の甲板には巨大なプールが設置されていて、乗客なら誰でも利用できるようになっている。"
translation = "이 배의 갑판에는 거대한 수영장이 설치되어 있어 승객이라면 누구든 이용할 수 있게 되어 있다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それで、プールに連れて来て、一体どうしようって言うんですか？」"
translation = "「그래서 수영장에 데리고 와서 대체 뭘 하려는 거예요?」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「たかだかギャンブルに負けたくらいで自暴自棄になるんじゃない」"
translation = "「고작 도박에서 좀 졌다고 자포자기하지 말게」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ラティエさんに『ギャンブルに負けた方が１ついう事を聞く』なんて約束を無理やりさせられたからですよ！」"
translation = "「라티에 씨가 『도박에서 진 사람이 한 가지 소원을 들어준다』 같은 약속을 억지로 시켰으니까 그렇죠!」"

[[dialogue]]
speaker = "unk"
original = "客船ではカジノも楽しめるようになっていた。"
translation = "여객선에서는 카지노도 즐길 수 있게 되어 있었다."

[[dialogue]]
speaker = "unk"
original = "軽い気持ちで遊びにいったのだが、そこでラティエさんと賭けをすることになってしまい……。"
translation = "가벼운 마음으로 놀러 갔지만 거기서 라티에 씨와 내기를 하게 되었고……."

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「事実として、きみは私と勝負して負けた、そうだな？」"
translation = "「사실로서 자네는 나와 승부해서 졌다, 그렇지?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そう、です……分かりましたよ。何をすればいいんですか？」"
translation = "「그렇, 긴 하죠…… 알았어요. 뭘 하면 되나요?」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「私からの要求は……これだ」"
translation = "「나의 요구는…… 이것이다」"

[[dialogue]]
speaker = "unk"
original = "ラティエさんが俺の手を引っ張って、一緒にプールサイドに倒れ込む。"
translation = "라티에 씨가 내 손을 끌어당겨 함께 풀사이드로 쓰러진다."

[[dialogue]]
speaker = "unk"
original = "奇しくも俺がラティエさんを押し倒し、組み敷いたような状態で。"
translation = "묘하게도 내가 라티에 씨를 밀어 넘어뜨려 깔고 앉은 듯한 상태가 되어."

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「ここで、私のことを抱いてもらおう」"
translation = "「여기서 나를 안아주게」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「心配しなくても誰も来ないように、裏で手を打っておいた。だから心置きなく、私を求めてくれ」"
translation = "「걱정하지 않아도 아무도 오지 않도록 뒤에서 손을 써두었네. 그러니 마음 놓고 나를 원해 주게」"

[[dialogue]]
speaker = "unk"
original = "ラティエさんの大胆な誘いに、俺もその気になってきてしまう。"
translation = "라티에 씨의 대담한 유혹에 나도 그럴 마음이 생겨버리고 만다."

[[dialogue]]
speaker = "unk"
original = "両腿を掴んで大きく拡げさせ、上半身に折り返すようにして、恥ずかしいところが学園長にもよく見えるようにした。"
translation = "양 허벅지를 붙잡아 크게 벌리게 하고 상체 쪽으로 꺾어 접어 수치스러운 곳이 학원장에게도 잘 보이도록 했다."

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「ふふ……すごい格好をさせられてしまったな」"
translation = "「후후…… 대단한 자세를 하게 되었군」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「私にこんな格好をさせて興奮しているのか？\u3000きみの下半身のものはもうガチガチになってしまっているようだが」"
translation = "「나에게 이런 자세를 시키고 흥분했나? 자네의 하반신에 있는 건 벌써 빳빳하게 굳어버린 모양이다만」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「それを私に突っ込むのだな？\u3000こんな体勢で動けない私の膣に、上から叩きつけるようにして」"
translation = "「그걸 나에게 찌르는 것이냐? 이런 태세로 움직이지 못하는 나의 질에 위에서 내리찍듯이 말이다」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「チ○ポが膣内をぐちゃぐちゃにかき回して、最後は私ごと潰さんとばかりに圧迫して──」"
translation = "「자지가 질 안을 질척질척하게 헤집고, 마지막에는 나 자신을 부숴버릴 듯이 압박해서──」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「そして確実に孕ませようと、大量の精液をお腹の中に流し込むんだろう？」"
translation = "「그리고 확실하게 임신시키려고 대량의 정액을 배 속에 쏟아붓겠지?」"

[[dialogue]]
speaker = "unk"
original = "熱っぽい視線を向けながら、ラティエさんはこれから起こるであろう情事を、その唇から紡ぎ出す。"
translation = "열띤 시선을 보내며, 라티에 씨는 이제부터 일어날 정사를 입술로 자아낸다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「分かりました。お望み通り、むちゃくちゃにしてあげます」"
translation = "「알겠습니다. 원하시는 대로 엉망진창으로 만들어 드리죠」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「逃げられないように強く上から押さえ込んで、子宮口までこれを突っ込んで、濃厚な精液を注ぎ込んであげます」"
translation = "「도망치지 못하게 위에서 강하게 짓누르고, 자궁구까지 이걸 찔러 넣어 농후한 정액을 부어 드릴게요」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「絶対にラティエさんのこと妊娠させますから……覚悟してください」"
translation = "「절대로 라티에 씨를 임신시킬 테니까…… 각오하세요」"

[[dialogue]]
speaker = "unk"
original = "俺はそう宣言すると、勃起したペニスの先端を入り口に押し当てた。"
translation = "나는 그렇게 선언하고는 발기한 페니스의 끝부분을 입구에 밀어붙였다."

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「んぅうううううっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응으으으으읏……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "苦しそうなうめき声が漏れる。"
translation = "괴로운 듯한 신음이 새어 나온다."

[[dialogue]]
speaker = "unk"
original = "ラティエさん自身がそう言った通り、この体勢では何をされても抵抗できないだろう。"
translation = "라티에 씨 본인이 말한 대로, 이 자세로는 무엇을 당해도 저항할 수 없을 것이다."

[[dialogue]]
speaker = "unk"
original = "そんな状態で、俺のペニスが今まで届いたことのない深い場所まで、ズブズブと入っていく。"
translation = "그런 상태로 나의 페니스가 지금까지 닿은 적 없는 깊은 곳까지 즈브즈브하며 들어간다."

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「あぁあ……まだ、入ってくる……本当に、奥の奥まで……チ○ポが来てるの、わかるぞ……んんぅううっ……<emoji=heart04>」"
translation = "「아아…… 아직, 들어와…… 정말로, 깊숙한 곳까지…… 자지가 오는 거, 느껴져…… 응응으윽……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「はぁ、あ……<emoji=heart04>\u3000今、届いた……子宮口の入り口……本当に一番深い所まで……ぁ……んんんっ……<emoji=heart04>」"
translation = "「하아, 아……<emoji=heart04> 지금, 닿았어…… 자궁구 입구…… 정말로 가장 깊은 곳까지…… 아…… 응응읏……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "先端が最深部に届いたことは、俺も感じ取っていた。"
translation = "끝부분이 최심부에 닿은 것을 나도 느낄 수 있었다."

[[dialogue]]
speaker = "unk"
original = "そのまま体重をかけて子宮口を圧迫すると、ゆっくりと弧を描くように深部を刺激した。"
translation = "그대로 체중을 실어 자궁구를 압박하며, 천천히 호를 그리듯 심부를 자극했다."

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「あっ、んっ……んくぅ、んんんっ……はぁ、あ、ああっ……ん、あ、あああ……<emoji=heart04>」"
translation = "「앗, 응…… 응구, 응응읏…… 하아, 아, 아앗…… 응, 아, 아아아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「はぁ、んぅん、ん……かき回されてる……きみのチ○ポで……んっ、ぅ……いいように、されてる……んんぅ……<emoji=heart04>」"
translation = "「하아, 응응, 응…… 헤집어지고 있어…… 자네의 자지로…… 응, 윽…… 좋을 대로, 당하고 있어…… 응응으……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「いいぞ……気持ちいい……もっと、してくれ……私を求めて、もっと……んぁあんんっ……<emoji=heart04>」"
translation = "「좋군…… 기분 좋아…… 더, 해다오…… 나를 원해줘, 더…… 응아앙응읏……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "普段のラティエさんからは想像もつかないほど、だらしない表情を浮かべて俺を求めてくる。"
translation = "평소의 라티에 씨에게서는 상상도 할 수 없을 정도로 흐트러진 표정을 지으며 나를 원해 온다."

[[dialogue]]
speaker = "unk"
original = "あんなにも凛々しいラティエさんを組み敷いて、性欲露わなメスにさせて、欲望のままに蹂躙している。"
translation = "그토록 늠름한 라티에 씨를 깔고 앉아 성욕을 드러낸 암컷으로 만들어 욕망대로 유린하고 있다."

[[dialogue]]
speaker = "unk"
original = "それを思うと、言いようのない征服感が湧き上がってきて、自然とピストンが速まってしまう。"
translation = "그것을 생각하자 말로 다 할 수 없는 정복감이 솟구쳐 올라, 자연스레 피스톤질이 빨라진다."

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「あっ、あっ、ああ……んんっ、あっ、あ、あぁあ……んんっ、あっ、あ……あ、ああんっ……<emoji=heart04>」"
translation = "「앗, 앗, 아아…… 응응, 앗, 아, 아아아…… 응응, 앗, 아…… 아, 아앙앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「はぁ、んんっ、んぅ……きみが、身体を引くと……内側から引きずられるような感覚になるな……」"
translation = "「하아, 응응, 응으…… 자네가 몸을 빼면…… 안쪽에서 끌려 나가는 듯한 감각이 되는군……」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「張り出したカリの部分が、私の気持ちいいところ……んんうっ……じっくりなぞっていって……」"
translation = "「부풀어 오른 귀두 부분이 나의 기분 좋은 곳을…… 응응윽…… 끈질기게 훑고 지나가서……」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「そうしたら今度は、私の身体を割って押し寄せるみたいに……太くて、硬くて、熱いのが……ズブズブと入ってきて……」"
translation = "「그러면 이번에는 나의 몸을 가르고 밀려 들어오는 것처럼…… 굵고, 딱딱하고, 뜨거운 것이…… 즈브즈브하며 들어와서……」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「はぁ、う……ぁ、ああっ……んんっ……すごい……快感……たまらない……こんなの、夢中になってしまう……あ、ああっ……<emoji=heart04>」"
translation = "「하아, 우…… 아, 아앗…… 응응읏…… 굉장해…… 쾌감…… 참을 수 없어…… 이런 거, 빠져버려…… 아, 아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "快感に瞳を蕩けさせながら、ラティエさんは快感を訴えてくる。"
translation = "쾌감에 눈동자가 풀린 채로 라티에 씨는 쾌감을 호소해 온다."

[[dialogue]]
speaker = "unk"
original = "それに応えるように、ラティエさんの好きな場所を重点的に擦り立てる。"
translation = "그에 응하듯 라티에 씨가 좋아하는 곳을 중점적으로 문질러 댄다."

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「ああっ、あっ、あ、んんっ……んぅ……小刻みなのも、いい……んんぅ、あ、ああっ……どんどん気持ちよくされてしまう……」"
translation = "「아앗, 앗, 아, 응응읏…… 응으…… 잘게 떠는 것도 좋아…… 응응으, 아, 아앗…… 점점 기분 좋아져 버려……」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「あ、んんっ……んぅ……<emoji=heart04>\u3000ジンジンするような痺れが……温かさに代わって……宙に漂っているような……不思議な気持ちになってしまう……んんんっ……<emoji=heart04>」"
translation = "「아, 응응읏…… 응으……<emoji=heart04> 징징 울리는 듯한 저림이…… 따뜻함으로 바뀌어서…… 허공을 떠다니는 듯한…… 신비한 기분이 되어버려…… 응응응읏……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「初めてきみと交わった日から……あっ、ああっ……<emoji=heart04>\u3000これに、夢中だ……いやらしいこと、したくて……女の悦びを感じたくて……<emoji=heart04>」"
translation = "「처음 자네와 맺어진 날부터…… 앗, 아앗……<emoji=heart04> 여기에 빠졌어…… 야한 짓 하고 싶어서…… 여자의 기쁨을 느끼고 싶어서……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「もっと、教えてくれ……んんんっ……イかされたいんだ……きみのチ○ポで、絶頂させられたいんだ……んぅううっっ……<emoji=heart04>」"
translation = "「더 가르쳐주게…… 응응응읏…… 가버리고 싶어…… 자네의 자지로 절정당하고 싶어…… 응으으윽……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "せがむような声色が混じる。"
translation = "조르는 듯한 목소리가 섞인다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「分かりました。俺、ラティエさんに、もっとすごい悦び……教えますから……」"
translation = "「알겠습니다. 저, 라티에 씨에게 더 대단한 기쁨…… 가르쳐 드릴 테니까……」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「ああ、来てくれ……んっ、あああああっ……！！！」"
translation = "「아아, 와주게…… 응, 아아아아앗……!!!」"

[[dialogue]]
speaker = "unk"
original = "更にストロークを深く、そして音が響くほど激しく、下半身を打ち付ける。"
translation = "더욱 스트로크를 깊게, 그리고 소리가 울릴 정도로 격렬하게 하반신을 부딪친다."

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「あっ、あっ、あっ、ん、あっ、ああっ……<emoji=heart04>\u3000あ、ああっ、んっ、あ、あ、あああっ……<emoji=heart04>\u3000あっ、あああっ……<emoji=heart04>」"
translation = "「앗, 앗, 앗, 응, 앗, 아앗……<emoji=heart04> 아, 아앗, 응, 아, 아, 아아앗……<emoji=heart04> 앗, 아아앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「はぁ、んんっ……すご、いっ……激しい、ピストンっ……私を、壊そうとしてるみたいに……あっ、あ、ああ、あああっんっ<emoji=heart04>」"
translation = "「하아, 응응읏…… 굉장, 해…… 격렬한 피스톤…… 나를 부수려는 것처럼…… 앗, 아, 아아, 아아앗응읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「なんて、逞しい……んんぅ、んっ……今のきみには……勝てない……抗えない……あ、ああっ……私の方が、圧倒的に弱いっ……んんんっ……<emoji=heart04>」"
translation = "「어쩜 이렇게 늠름할까…… 응응으, 응…… 지금의 자네에게는…… 이길 수 없어…… 거역할 수 없어…… 아, 아앗…… 나 쪽이 압도적으로 약해…… 응응응읏……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「あぁ、あ、んんっ……はぁ、ぅ……強さが全てなのに……弱いなど許されないのに……きみのチ○ポには絶対に勝てないっ……<emoji=heart04>」"
translation = "「아아, 아, 응응읏…… 하아, 윽…… 강함이 전부인데…… 약한 건 용납되지 않는데…… 자네의 자지에는 절대로 이길 수 없어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「なのに、それがこんなに……ああっ、あ、ああっ……んっ、んっ、んっ、んぅぅっ……嬉しいと、感じるなんてっ……<emoji=heart04>」"
translation = "「그런데 그게 이렇게나…… 아앗, 아, 아앗…… 응, 응, 응, 응으으읏…… 기쁘다고 느끼다니……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺のピストンが加速するのに応じて、ラティエさんの締め付けも強くなっていく。"
translation = "나의 피스톤이 가속하는 것에 응하여 라티에 씨의 조임도 강해져 간다."

[[dialogue]]
speaker = "unk"
original = "痺れるような快感がこみ上げてくるが、俺はそれを懸命に押し殺した。"
translation = "저릿한 쾌감이 북받쳐 오르지만, 나는 그것을 필사적으로 억눌렀다."

[[dialogue]]
speaker = "unk"
original = "ラティエさんをもっと負けさせたい……負け顔をもっと見たい……そのためにも、もっともっとラティエさんを気持ち良くして──"
translation = "라티에 씨를 더 패배시키고 싶다…… 패배한 얼굴을 더 보고 싶다…… 그러기 위해서라도 더욱더 라티에 씨를 기분 좋게 해서──"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「はぁうううっ！！\u3000んんっ、あっ、あああ……や、んんんっ、あっ、あっ、あっ、あ、あああっ……！！」"
translation = "「하아우우윽!! 응응읏, 앗, 아아아…… 야, 응응응읏, 앗, 앗, 앗, 아, 아아앗……!!」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「奥っ、そこ、いいっ……<emoji=heart04>\u3000気持ちいいっ……んんっ、あっ、ああ、あ、あああっ……んっ、はっ、あああっ……<emoji=heart04>」"
translation = "「깊은 곳, 거기, 좋아……<emoji=heart04> 기분 좋아…… 응응읏, 앗, 아아, 아, 아아앗…… 응, 하, 아아앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「ああっ、あっ、あ、あああっ……<emoji=heart04>\u3000んっ、は、あああっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아앗, 앗, 아, 아아앗……<emoji=heart04> 응, 하, 아아앗……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ラティエ……さんっ……！！」"
translation = "「라티에…… 씨……!!」"

[[dialogue]]
speaker = "unk"
original = "そして……ラティエさんを気持ち良くして、俺も──"
translation = "그리고…… 라티에 씨를 기분 좋게 하고 나도──"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「んぅ……きみも、気持ちいいんだな……んんっ……チ○ポが、ビクビクしているのを感じる……あっ、んぅ、ああっ……<emoji=heart04>」"
translation = "「응으…… 자네도 기분 좋구나…… 응응읏…… 자지가 파르르 떨리는 게 느껴져…… 앗, 응으, 아앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「はぁ、あっ、あっ、あ……<emoji=heart04>\u3000そのまま、っ……私と一緒にっ……<emoji=heart04>\u3000あっ、あ、んんっ……あぁあ……気持ちよく、なってくれっ……<emoji=heart04>」"
translation = "「하아, 앗, 앗, 아……<emoji=heart04> 그대로…… 나와 함께……<emoji=heart04> 앗, 아, 응응읏…… 아아아…… 기분 좋아져 주게……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「そして最後は……んんっ、あ、ああっ……きみが宣言した通りに……ん、ぁ、あああっ……<emoji=heart04>\u3000中出ししてくれっ……あっ、あ、あああっ<emoji=heart04>」"
translation = "「그리고 마지막은…… 응응읏, 아, 아앗…… 자네가 선언한 대로…… 응, 아, 아아앗……<emoji=heart04> 질내사정 해다오…… 앗, 아, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「んんぅっ、んっ、あっ、あっ……ん、んぅ……濃厚な、ザーメンっ……あっ、ああっ……ドロドロなやつを……んんっ……私の卵子に、ぶっかけてくれっ……<emoji=heart04>」"
translation = "「응응윽, 응, 앗, 앗…… 응, 응으…… 농후한 정액…… 앗, 아아앗…… 걸쭉한 것을…… 응응읏…… 나의 난자에 뿌려다오……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「あの瞬間が……んんっ、あっ……女として最高に幸せな瞬間なんだ……あぁあっ、あ……だから……だからっ……ん、あ、あああっ……<emoji=heart04>」"
translation = "「그 순간이…… 응응읏, 앗…… 여자로서 최고로 행복한 순간이란다…… 아아앗, 아…… 그러니까…… 그러니까…… 응, 아, 아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "射精を促すように、膣壁がペニスに吸着してくる。"
translation = "사정을 재촉하듯 질벽이 페니스에 달라붙는다."

[[dialogue]]
speaker = "unk"
original = "俺は１回１回のピストンを深く、確実に子宮口を突くように強く叩きつける。"
translation = "나는 한 번 한 번의 피스톤을 깊게, 확실하게 자궁구를 찌르도록 강하게 내리친다."

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「ああっ！\u3000んっ、チ○ポの震え……さっきより、はっきり感じ取れるっ……<emoji=heart04>\u3000んんっ、んっ、あっ、あああっ<emoji=heart04>」"
translation = "「아앗! 응, 자지의 떨림…… 아까보다 확실히 느껴져……<emoji=heart04> 응응읏, 응, 앗, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「今にも爆発寸前という感じで……震えてる……んんっ、あっ、あぁあっ、あ、あ、あ、あああっ……<emoji=heart04>」"
translation = "「금방이라도 폭발하기 직전이라는 느낌으로…… 떨리고 있어…… 응응읏, 앗, 아아앗, 아, 아, 아, 아아앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「出るんだな……精子が……あああっ……待ちきれないっ、私も、イクっ、んんっ……イキそうっ……だっ……あっ、あああっ……！！」"
translation = "「나오는구나…… 정자가…… 아아앗…… 기다릴 수 없어, 나도 가, 응응읏…… 갈 것 같아…… 다…… 앗, 아아앗……!!」"

[[dialogue]]
speaker = "unk"
original = "ラティエさんの声が切迫した。"
translation = "라티에 씨의 목소리가 절박해졌다."

[[dialogue]]
speaker = "unk"
original = "膣の騒がしい様子からも、ラティエさんの絶頂が近いことが伝わってくる。"
translation = "질 내부의 요동치는 모습에서도 라티에 씨의 절정이 가깝다는 것이 전해져 온다."

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「ああっ、あっ、あっ、あ、あ、ああっ、んっ、あ、ああっ<emoji=heart04>\u3000ああ、あっ、あっ、あ、ん、あ、ああっ、あっ、あ、あああっ<emoji=heart04>」"
translation = "「아앗, 앗, 앗, 아, 아, 아앗, 응, 아, 아앗<emoji=heart04> 아아, 앗, 앗, 아, 응, 아, 아앗, 앗, 아, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「くるっ、んんっ、んっ、あっ、あああっ<emoji=heart04>\u3000すごいの、くるぅっ<emoji=heart04>\u3000あっ、あ。あああっ、あ、や、んんっ<emoji=heart04>\u3000あっ、あ、ああっ、は、あぁ、あああんっ<emoji=heart04>」"
translation = "「온다, 응응읏, 응, 앗, 아아앗<emoji=heart04> 굉장한 거 와앗<emoji=heart04> 앗, 아. 아아앗, 아, 야, 응응읏<emoji=heart04> 앗, 아, 아앗, 하, 아아, 아아앙앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "熱い欲望のうねりがせり上がってくる。"
translation = "뜨거운 욕망의 소용돌이가 치밀어 오른다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ラティエさんっ……！\u3000俺も、イクっ……！」"
translation = "「라티에 씨……! 저도 가요……!」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「きて、くれっ！\u3000んんっ、あっ、あ、あああっ、んっ、あっ、あ、あ、あああっ、あ、んっ、んぅっ、あっ、あ、あああっ！！」"
translation = "「와다오! 응응읏, 앗, 아, 아아앗, 응, 앗, 아, 아, 아아앗, 아, 응, 응윽, 앗, 아, 아아앗!!」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「はぁっ、あ……んっ……私も、もう……あっ、あっ……あぁあ、あっ、あっ、あ……んんんっ……あっ、ぁ……ふぁ……んんん……んっ、あぁぁああ……」"
translation = "「하앗, 아…… 응…… 나도 벌써…… 앗, 앗…… 아아아, 앗, 앗, 아…… 응응응읏…… 앗, 아…… 하아…… 응응응…… 응, 아아아아아……」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「あっ……ぁあああああああああああああああああああ～～～～～～っっっっ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗…… 아아아아아아아아아아아아아아아아아아아～～～～～～읏읏읏읏<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "絶頂の声が響くと同時に、俺もラティエさんの中でペニスを脈打たせた。"
translation = "절정의 목소리가 울림과 동시에 나도 라티에 씨의 안에서 페니스를 맥동시켰다."

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「ああああああああっ！！！\u3000あっ……ぁ……んんんんんっ……！！！\u3000あっ、あぁああ……あ、ああああっ……！！！」"
translation = "「아아아아아아앗!!! 앗…… 아…… 응응응응응읏……!!! 앗, 아아아아…… 아, 아아아앗……!!!」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「脈打つの、感じるっ……んんっ……！！！\u3000あぁああ、ああっ、欲しいっ、きみの精液っ、残さずっ、私の中にっ……あっ、ああああっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「맥동하는 거 느껴져…… 응응읏……!!! 아아아아, 아앗, 갖고 싶어, 자네의 정액, 남김없이, 내 안에…… 앗, 아아아앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "求められるまでもなく、俺は全てをラティエさんの中に出し尽くすつもりだった。"
translation = "요구받을 것도 없이 나는 모든 것을 라티에 씨의 안에 쏟아낼 생각이었다."

[[dialogue]]
speaker = "unk"
original = "ペニスの先端を子宮口にねじ当て、その内側に吐き出すように何度も何度も脈動させる。"
translation = "페니스의 끝을 자궁구에 비집어 넣고, 그 내부에 토해내듯이 몇 번이고 몇 번이고 맥동시킨다."

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「はぁっ、あっ、んんっ……<emoji=heart04>\u3000んんぅ、あぁ、ああっ……はぁ、んんっ、はぁぁ、あ、ああっ……<emoji=heart04>」"
translation = "「하앗, 앗, 응응읏……<emoji=heart04> 응응으, 아아, 아앗…… 하아, 응응읏, 하아아, 아, 아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "切れ切れの呼吸を繰り返していたラティエさんだったが、少しずつ乱れが収まりつつある。"
translation = "거친 숨을 몰아쉬던 라티에 씨였지만, 조금씩 가빠졌던 숨이 가라앉기 시작한다."

[[dialogue]]
speaker = "unk"
original = "膣内は俺の出し尽くした熱いもので満たされ、結合部からもあふれ出してきていた。"
translation = "질 안은 내가 쏟아낸 뜨거운 것으로 가득 차고, 결합부에서도 흘러넘치고 있었다."

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「んぁんっ……<emoji=heart04>\u3000んふぅ……んん……<emoji=heart04>」"
translation = "「응앙앗……<emoji=heart04> 응후…… 응응……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ゆっくりとペニスを引き抜くと、白濁液が内側よりあふれ出した。"
translation = "천천히 페니스를 뽑아내자, 백탁액이 안쪽에서부터 울컥 쏟아져 나왔다."

[[dialogue]]
speaker = "unk"
original = "それで俺が、どれだけ興奮させられていたのかが分かる。"
translation = "그것으로 내가 얼마나 흥분했었는지 알 수 있었다."

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「気持ち、良かったな……んんっ……ふふふ……<emoji=heart04>」"
translation = "「기분 좋았구나…… 응응읏…… 후후후……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「こんなにいっぱい<ruby>射精<rt>だ</rt></ruby>してしまって……これは宣言通り、きみに妊娠させられてしまったかな？」"
translation = "「이렇게나 가득 사정해버리다니…… 이건 선언대로 자네에게 임신당해 버린 걸까?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……恥ずかしいですが……してる途中なんて、もう……ラティエさんを孕ませることしか考えていませんでした……」"
translation = "「……창피하지만…… 하는 도중에는 정말…… 라티에 씨를 임신시킬 생각밖에 없었습니다……」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「嬉しいね……それだけ強い欲望を込めたのなら……きっと孕まされてしまったのだろうな……」"
translation = "「기쁘구나…… 그만큼 강한 욕망을 담았다면…… 분명히 배어버렸겠지……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「すみませんでした、自分を抑えきれなくて……」"
translation = "「죄송합니다, 제 자신을 억제하지 못해서……」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「なに……そういう情熱を向けて貰えるのは女冥利に尽きるというものだ……」"
translation = "「무슨…… 그런 정열을 받는 것은 여자로서 더할 나위 없는 행복이란다……」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「そうだな、いっそ本格的に孕ませてみるか……？\u3000その為には一度だけでは心もとないだろう……？」"
translation = "「그렇지, 차라리 본격적으로 임신시켜 보겠나……? 그러기 위해서는 한 번만으로는 부족할 테지……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……次は、客室に戻って……お願いしてもいいですか？」"
translation = "「……다음은 객실로 돌아가서…… 부탁드려도 될까요?」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「ふふ……もちろんだとも……<emoji=heart04>」"
translation = "「후후…… 물론이고말고……<emoji=heart04>」"

