[[dialogue]]
speaker = "モネ"
original = "「あれ？\u3000……ここは、学園の図書館？\u3000そうか、ウィステリアさんが脱出させてくれたんだ……」"
translation = "「어라? ……여기는 학원 도서관? 그렇구나, 위스테리아 씨께서 탈출시켜 주셨구나……」"

[[dialogue]]
speaker = "モネ"
original = "「あの翼を持った女の子は誰なんだろう……？\u3000ウィステリアさん、大丈夫かな……」"
translation = "「그 날개 달린 여자아이는 누구였을까……? 위스테리아 씨, 괜찮으시려나……」"

[[dialogue]]
speaker = "モネ"
original = "「ううん、心配してるだけじゃダメ、ウィステリアさんを助けないと。私に何ができるかわからないけど、地下図書館に戻らなくちゃ……！」"
translation = "「아니, 걱정만 하고 있어선 안 돼. 위스테리아 씨를 도와야 해. 내가 뭘 할 수 있을진 모르겠지만 지하 도서관으로 돌아가야 해……!」"

[[dialogue]]
speaker = "モネ"
original = "「あ、でも入口のロックはウィステリアさんじゃないと外せないし、どうしたら……」"
translation = "「아, 하지만 입구 잠금은 위스테리아 씨가 아니면 풀 수 없는데 어떡하지……」"

[[dialogue]]
speaker = "モネ"
original = "「あ、熱っ！？」"
translation = "「앗, 뜨거!?」"

[[dialogue]]
speaker = "unk"
original = "本が熱を発し、火傷しそうな痛みが走るが、それでもモネは手にした本を離さない。"
translation = "책이 열기를 내뿜으며 화상을 입을 듯한 통증이 달렸지만, 그런데도 모네는 손에 든 책을 놓지 않았다."

[[dialogue]]
speaker = "unk"
original = "しかしその本はモネにとっても見覚えがない一冊だった。"
translation = "하지만 그 책은 모네에게 있어서도 낯선 한 권이었다."

[[dialogue]]
speaker = "モネ"
original = "「この本、いつの間に……もしかして地下図書館から持ってきちゃったのかな。勝手に本を持ち出すなんて、図書委員としてあるまじき失態だよ……」"
translation = "「이 책, 언제 사이에…… 설마 지하 도서관에서 가져와 버린 걸까. 마음대로 책을 반출하다니 도서위원으로서 있을 수 없는 실태야……」"

[[dialogue]]
speaker = "モネ"
original = "「でも今は、手掛かりはこの本だけ。ごめんね、ちょっと読ませて……大丈夫、怖くないからね～」"
translation = "「하지만 지금은 단서가 이 책뿐이야. 미안해, 조금만 읽게 해줘…… 괜찮아, 무섭지 않단다～」"

[[dialogue]]
speaker = "モネ"
original = "「そ～っと優しく……あつ～～～っ！？」"
translation = "「살며시 다정하게…… 아뜨거～～～엇!?」"

[[dialogue]]
speaker = "モネ"
original = "「どんどん熱くなってる。熱い本なんて初めて……ふふ、やんちゃな子」"
translation = "「점점 뜨거워지고 있어. 뜨거운 책은 처음이야…… 후후, 개구쟁이네」"

[[dialogue]]
speaker = "モネ"
original = "「読めるものなら読んでみろって？\u3000いいよ、なら遠慮はしないからね」"
translation = "「읽을 수 있으면 읽어보라는 거야? 좋아, 그럼 사양하지 않을게」"

[[dialogue]]
speaker = "モネ"
original = "「あなたのこと、私に教えて」"
translation = "「너에 대해 나에게 가르쳐줘」"

[[dialogue]]
speaker = "unk"
original = "指先が焦げるのも厭わず──否、全く気付かずに、モネは<ruby>頁<rt>ページ</rt></ruby>をめくっていく。"
translation = "손가락 끝이 타는 것도 개의치 않고── 아니, 전혀 알아차리지 못한 채 모네는 페이지를 넘겨간다."

[[dialogue]]
speaker = "unk"
original = "呪いの炎によって身が焼かれようと、その痛みすら彼女には心地よい。"
translation = "저주의 불꽃에 몸이 타더라도 그 고통조차 그녀에게는 기분 좋았다."

[[dialogue]]
speaker = "モネ"
original = "「──魔族が、いた」"
translation = "「──마족이, 있었다」"

[[dialogue]]
speaker = "モネ"
original = "「その魔族は、魔界の片隅で生まれた。身分は低く、野蛮で、けれど強かった。戦いは得意だった」"
translation = "「그 마족은 마계의 한구석에서 태어났다. 신분은 낮고 야만적이었으며, 하지만 강했다. 싸움은 자신 있었다」"

[[dialogue]]
speaker = "モネ"
original = "「魔界に覇を唱えんと、戦って、戦って、戦い続けた」"
translation = "「마계에 패권을 외치며 싸우고, 싸우고, 계속해서 싸워나갔다」"

[[dialogue]]
speaker = "モネ"
original = "「やがて友も得た。愛する者にも出会えた」"
translation = "「이윽고 친구도 얻었다. 사랑하는 사람과도 만났다」"

[[dialogue]]
speaker = "モネ"
original = "「魔界の一角を支配し、領主として地位を築き上げた」"
translation = "「마계의 일각을 지배하고 영주로서 지위를 쌓아 올렸다」"

[[dialogue]]
speaker = "モネ"
original = "「彼には力があった。それしかなかった。己の力だけを信じて生きてきた」"
translation = "「그에게는 힘이 있었다. 그것뿐이었다. 자신의 힘만을 믿고 살아왔다」"

[[dialogue]]
speaker = "モネ"
original = "「栄華は長続きしなかった」"
translation = "「영화는 오래가지 않았다」"

[[dialogue]]
speaker = "モネ"
original = "「友は離反し、愛する者には裏切られた」"
translation = "「친구는 이반하고 사랑하는 사람에게는 배신당했다」"

[[dialogue]]
speaker = "モネ"
original = "「それでもよかった。彼には力があったから。欲しいものはまた手に入れればいいと思っていた」"
translation = "「그래도 괜찮았다. 그에게는 힘이 있었으니까. 원하는 것은 다시 손에 넣으면 된다고 생각했다」"

[[dialogue]]
speaker = "モネ"
original = "「そして、滅びの竜が現れた」"
translation = "「그리고 멸망의 용이 나타났다」"

[[dialogue]]
speaker = "モネ"
original = "「彼は己の力を信じて、竜に挑んだ」"
translation = "「그는 자신의 힘을 믿고 용에게 도전했다」"

[[dialogue]]
speaker = "モネ"
original = "「力は彼の全てだった。だというのに、竜には敵わなかった」"
translation = "「힘은 그의 전부였다. 그런데도 용에게는 당해낼 수 없었다」"

[[dialogue]]
speaker = "モネ"
original = "「この竜を倒せば、失ったもの全てを取り戻せると、そう信じていたのに」"
translation = "「이 용을 쓰러뜨리면 잃었던 모든 것을 되찾을 수 있을 거라고 그렇게 믿었는데」"

[[dialogue]]
speaker = "モネ"
original = "「魔炎に包まれながら、彼は思った」"
translation = "「마염에 휩싸인 채 그는 생각했다」"

[[dialogue]]
speaker = "モネ"
original = "「もしも、もしも──友と道を違えていなかったら、愛する者がそばにいたなら、こんなことにはならなかったかもしれない」"
translation = "「만약, 만약── 친구와 길을 달리하지 않았더라면, 사랑하는 사람이 곁에 있었더라면 이런 일은 일어나지 않았을지도 모른다」"

[[dialogue]]
speaker = "モネ"
original = "「でも、どうすればよかったのかなんてわからない」"
translation = "「하지만 어떻게 해야 했을지는 알 수 없었다」"

[[dialogue]]
speaker = "モネ"
original = "「魔族は、後悔と<ruby>懊悩<rt>おうのう</rt></ruby>のうちに生涯を閉じた」"
translation = "「마족은 후회와 오뇌 속에 생애를 마감했다」"

[[dialogue]]
speaker = "モネ"
original = "「大丈夫、大丈夫……もう寂しくないよ」"
translation = "「괜찮아, 괜찮아…… 이제 외롭지 않아」"

[[dialogue]]
speaker = "unk"
original = "呪いが身を焼くのも構わず、モネは本を抱き締める。"
translation = "저주가 몸을 태우는 것도 아랑곳하지 않고 모네는 책을 껴안았다."

[[dialogue]]
speaker = "モネ"
original = "「この本は……リクリエで滅びた魔族の一生を記したもの」"
translation = "「이 책은…… 리크리에로 멸망한 마족의 일생을 기록한 것」"

[[dialogue]]
speaker = "モネ"
original = "「どこかで会った気がしたのは、ウィステリアさんの魔導書と雰囲気が似ていたから」"
translation = "「어디선가 만난 기분이 들었던 건 위스테리아 씨의 마도서와 분위기가 비슷했기 때문이었어」"

[[dialogue]]
speaker = "モネ"
original = "「きっと、地下図書館にあった他の本も、魔族たちの無念を記した本なんだ」"
translation = "「분명 지하 도서관에 있던 다른 책들도 마족들의 원념을 기록한 책일 거야」"

[[dialogue]]
speaker = "モネ"
original = "「そんな子たちがあんなにたくさん、誰にも読まれないまま……」"
translation = "「그런 아이들이 그렇게나 많이 아무에게도 읽히지 못한 채……」"

[[dialogue]]
speaker = "モネ"
original = "「リクリエを何度も乗り越えているなら、何千年、何万年、いや一億年だって過ぎているかもしれない。そんな長い時間、ずっと……」"
translation = "「리크리에를 몇 번이나 넘겨왔다면 수천 년, 수만 년, 아니 1억 년이라도 지났을지도 몰라. 그런 긴 시간 동안 줄곧……」"

[[dialogue]]
speaker = "モネ"
original = "「私、行かなくちゃ。ウィステリアさんと、あの子たちが待ってる」"
translation = "「나, 가야 해. 위스테리아 씨와 그 아이들이 기다리고 있어」"

[[dialogue]]
speaker = "モネ"
original = "「ううん、待ってなくても、あの子たちを放っておけないよ」"
translation = "「아니, 기다리고 있지 않더라도 그 아이들을 내버려 둘 순 없어」"

[[dialogue]]
speaker = "モネ"
original = "「本は私の、友達だから」"
translation = "「책은 나의 친구니까」"

[[dialogue]]
speaker = "モネ"
original = "「お願い、力を貸して。あなたがいた書庫へ行きたいの」"
translation = "「부탁이야, 힘을 빌려줘. 네가 있던 서고로 가고 싶어」"

[[dialogue]]
speaker = "モネ"
original = "「入口が開いた……。ありがとう、私を信じてくれて」"
translation = "「입구가 열렸어……. 고마워, 나를 믿어줘서」"

[[dialogue]]
speaker = "モネ"
original = "「紙屋敷モネ、今行きます！」"
translation = "「카미야시키 모네, 지금 갑니다!」"

