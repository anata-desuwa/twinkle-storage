[[dialogue]]
speaker = "unk"
original = "フェリシーと恋人として付き合うようになってから、しばらく経ったある日。"
translation = "펠리시와 연인으로서 사귀게 된 지 어느 정도 시간이 흐른 어느 날."

[[dialogue]]
speaker = "unk"
original = "俺は流星寮にある彼女の部屋へと遊びに来ていた。"
translation = "나는 유성 기숙사에 있는 그녀의 방에 놀러 와 있었다."

[[dialogue]]
speaker = "unk"
original = "しかし、恋愛関係になってからのフェリシーは、２人きりになると以前よりもスキンシップが激しくて――"
translation = "하지만 연애 관계가 된 후의 펠리시는 둘만 있게 되면 이전보다 스킨십이 격해져서――"

[[dialogue]]
speaker = "フェリシー"
original = "「あっ……<emoji=heart04>」"
translation = "「앗……<emoji=heart04>」"

[[dialogue]]
speaker = "フェリシー"
original = "「会長くんの、大きくなってる……<emoji=heart04>」"
translation = "「회장군 거 커졌어……<emoji=heart04>」"

[[dialogue]]
speaker = "フェリシー"
original = "「ごめんね……会長くんの体温が心地いいから、ついくっ付きたくなっちゃって……」"
translation = "「미안해…… 회장군 체온이 기분 좋아서 나도 모르게 달라붙고 싶어져서……」"

[[dialogue]]
speaker = "フェリシー"
original = "「でも、会長くん……そのままじゃ辛いよね？」"
translation = "「하지만 회장군…… 그대로는 힘들지?」"

[[dialogue]]
speaker = "フェリシー"
original = "「私、ムラムラさせちゃった責任……ちゃんと取るね<emoji=heart04>」"
translation = "「나 무라마라하게 만든 책임…… 제대로 질게<emoji=heart04>」"

[[dialogue]]
speaker = "フェリシー"
original = "「え？\u3000会長くん……ふ、太ももでするって……！？」"
translation = "「에? 회장군…… 허, 허벅지로 한다고……!?」"

[[dialogue]]
speaker = "unk"
original = "ベッドの上でお尻を向けた彼女は、恥ずかしそうに顔を赤くする。"
translation = "침대 위에서 엉덩이를 향한 그녀는 부끄러운 듯 얼굴을 붉힌다."

[[dialogue]]
speaker = "フェリシー"
original = "「うぅ……まさか、<b>太ももで挟んでしたい</b>だなんて……」"
translation = "「으으…… 설마 **허벅지로 끼워서 하고 싶다**니……」"

[[dialogue]]
speaker = "フェリシー"
original = "「あっ……<emoji=heart04>\u3000会長くんのおち○ちん、ズリズリって……<emoji=heart04>」"
translation = "「앗……<emoji=heart04> 회장군 자지 주리주리하고……<emoji=heart04>」"

[[dialogue]]
speaker = "フェリシー"
original = "「んっ……<emoji=heart04>\u3000ふうぅ……<emoji=heart04>\u3000はあぁ……<emoji=heart04>\u3000んんっ……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 후우……<emoji=heart04> 하아……<emoji=heart04> 응응……<emoji=heart04>」"

[[dialogue]]
speaker = "フェリシー"
original = "「はあぁ……<emoji=heart04>\u3000すごく熱くて、固い……んっ<emoji=heart04>\u3000ふうぅ……はあぁ……<emoji=heart04>\u3000あっ……んんっ……<emoji=heart04>」"
translation = "「하아……<emoji=heart04> 무척 뜨겁고 딱딱해…… 응<emoji=heart04> 후우…… 하아……<emoji=heart04> 앗…… 응응……<emoji=heart04>」"

[[dialogue]]
speaker = "フェリシー"
original = "「私の太もも、そんなに気持ち、いいの……？\u3000んっ……ふうぅ<emoji=heart04>」"
translation = "「내 허벅지 그렇게 기분 좋아……? 응…… 후우<emoji=heart04>」"

[[dialogue]]
speaker = "フェリシー"
original = "「会長くんの、もっと大きくなってる……あっ<emoji=heart04>\u3000はあぁ……んふぅ……<emoji=heart04>」"
translation = "「회장군 거 더 커졌어…… 앗<emoji=heart04> 하아…… 응후……<emoji=heart04>」"

[[dialogue]]
speaker = "フェリシー"
original = "「えっ？\u3000む、ムチムチしてるって……やだ、そんなこと言わないで<emoji=heart04>\u3000恥ずかしいからぁ……<emoji=heart04>\u3000んっ……<emoji=heart04>」"
translation = "「에? 무, 무치무치하다니…… 싫어 그런 말 하지 마<emoji=heart04> 부끄러우니까아……<emoji=heart04> 응……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "でも、おま○こはもう濡れてるよ？\u3000と俺は指で触る。"
translation = "하지만 보지는 벌써 젖어있는데? 라며 나는 손가락으로 만진다."

[[dialogue]]
speaker = "フェリシー"
original = "「あんっ<emoji=heart04>\u3000そ、そんな……なんで――」"
translation = "「안앗<emoji=heart04> 그, 그럴 수가…… 어째서――」"

[[dialogue]]
speaker = "フェリシー"
original = "「あっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000会長くんの指が、おま○こ中に……あっ、あんっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 후아앗<emoji=heart04> 회장군 손가락이 보지 속에…… 앗 안앗<emoji=heart04>」"

[[dialogue]]
speaker = "フェリシー"
original = "「くちゅくちゅって、音立てちゃダメぇ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁっ……ふあぁっ……<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふうぅっ……はぁんっ……<emoji=heart04>」"
translation = "「쿠츄쿠츄하고 소리 내면 안 돼에<emoji=heart04> 앗<emoji=heart04> 하아앗…… 후아앗……<emoji=heart04> 응<emoji=heart04> 후우웃…… 하앙……<emoji=heart04>」"

[[dialogue]]
speaker = "フェリシー"
original = "「あっ、ダメ<emoji=heart04>\u3000愛液いっぱい溢れてきて……ふあぁっ<emoji=heart04>\u3000おま○こ、ぐちょぐちょになっちゃうぅ……<emoji=heart04>\u3000はあぁっ<emoji=heart04>」"
translation = "「앗 안 돼<emoji=heart04> 애액 잔뜩 넘쳐흘러서…… 후아앗<emoji=heart04> 보지 구쵸구쵸하게 되어버려어……<emoji=heart04> 하아앗<emoji=heart04>」"

[[dialogue]]
speaker = "フェリシー"
original = "「――ふあっ！？\u3000会長くんの先っぽ、おま○こに当たってるぅ……<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁっ……んっ<emoji=heart04>」"
translation = "「――후앗!? 회장군 끝부분 보지에 닿고 있어어……<emoji=heart04> 앗<emoji=heart04> 하아앗…… 응<emoji=heart04>」"

[[dialogue]]
speaker = "フェリシー"
original = "「あんっ<emoji=heart04>\u3000おち○ちん、クリに擦れて……はあぁっ……んうぅっ……<emoji=heart04>」"
translation = "「안앗<emoji=heart04> 자지 클리에 문질러져서…… 하아앗…… 응우웃……<emoji=heart04>」"

[[dialogue]]
speaker = "フェリシー"
original = "「んっ……<emoji=heart04>\u3000中、挿れちゃうの？\u3000ふうぅ……はあぁっ……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 안 삽입할 거야? 후우…… 하아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "このまま太ももでする方がよかった？\u3000と聞くと──"
translation = "이대로 허벅지로 하는 게 좋았어? 하고 물으니──"

[[dialogue]]
speaker = "フェリシー"
original = "「そ、それは恥ずかしいから……その……」"
translation = "「그, 그건 부끄러우니까…… 그게……」"

[[dialogue]]
speaker = "フェリシー"
original = "「会長くんのおち○ちん、中に入れて欲しい……かも<emoji=heart04>」"
translation = "「회장군 자지 안에 넣어줬으면 좋겠어……지도<emoji=heart04>」"

[[dialogue]]
speaker = "フェリシー"
original = "「――あっ<emoji=heart04>\u3000先っぽに押し広げられてっ……<emoji=heart04>\u3000はあぁっ――――<emoji=heart04><emoji=heart04>」"
translation = "「――앗<emoji=heart04> 끝부분에 밀려 퍼져서……<emoji=heart04> 하아앗――――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "フェリシー"
original = "「ふあああぁっ――――<emoji=heart04><emoji=heart04><emoji=heart04>\u3000おち○ちん、入ってきたああぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후아아아앗――――<emoji=heart04><emoji=heart04><emoji=heart04> 자지 들어왔어어어어어~~~엇<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "フェリシー"
original = "「あっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000あんっ……んっ……ふあぁっ<emoji=heart04>\u3000んっ……んうぅっ<emoji=heart04>\u3000はあぁっ……ふうぅっ……んあぁんっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 하아앗<emoji=heart04> 안앗…… 응…… 후아앗<emoji=heart04> 응…… 응우웃<emoji=heart04> 하아앗…… 후우웃…… 응아앙앗<emoji=heart04>」"

[[dialogue]]
speaker = "フェリシー"
original = "「んっ<emoji=heart04>\u3000会長くんの、すごいっ……<emoji=heart04>\u3000あっ……はぁんっ<emoji=heart04>\u3000大きくて、気持ちいいところ、擦れてるぅ……<emoji=heart04>」"
translation = "「응<emoji=heart04> 회장군 거 대단해……<emoji=heart04> 앗…… 하앙앗<emoji=heart04> 커서 기분 좋은 곳 문질러지고 있어어……<emoji=heart04>」"

[[dialogue]]
speaker = "フェリシー"
original = "「んあぁっ<emoji=heart04>\u3000あっ、あんっ……<emoji=heart04>\u3000はあぁっ、ふうぅっ……んああぁんっ……<emoji=heart04>」"
translation = "「응아앗<emoji=heart04> 앗 안앗……<emoji=heart04> 하아앗 후우웃…… 응아아앙앗……<emoji=heart04>」"

[[dialogue]]
speaker = "フェリシー"
original = "「えっ？\u3000――私の体、太もももいいけど、お尻も大きいよねって？\u3000んっ……<emoji=heart04>」"
translation = "「에? ――내 몸 허벅지도 좋지만 엉덩이도 크네라고? 응……<emoji=heart04>」"

[[dialogue]]
speaker = "フェリシー"
original = "「あんっ……<emoji=heart04>\u3000そ、それも恥ずかしいから、言わないでぇ……<emoji=heart04>\u3000はあぁっ……んんっ<emoji=heart04>」"
translation = "「안앗……<emoji=heart04> 그, 그것도 부끄러우니까 말하지 마아……<emoji=heart04> 하아앗…… 응응<emoji=heart04>」"

[[dialogue]]
speaker = "フェリシー"
original = "「やぁっ<emoji=heart04>\u3000そんな、いやらしくお尻揉んじゃ……あんっ<emoji=heart04>」"
translation = "「야앗<emoji=heart04> 그렇게 야하게 엉덩이 주무르면…… 안앗<emoji=heart04>」"

[[dialogue]]
speaker = "フェリシー"
original = "「はあぁっ……ふうぅっ……んうぅっ……<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んっ……はあぁっんあぁっ<emoji=heart04>\u3000はああぁんっ……<emoji=heart04>」"
translation = "「하아앗…… 후우웃…… 응우웃……<emoji=heart04> 앗<emoji=heart04> 응…… 하아앗응아앗<emoji=heart04> 하아아앙앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "彼女が恥ずかしがりつつも、感じているのを見て、俺は――"
translation = "그녀가 부끄러워하면서도 느끼는 것을 보고 나는――"

[[dialogue]]
speaker = "フェリシー"
original = "「ひゃんっ！？\u3000か、会長くん、なんで急にお尻を叩いて――」"
translation = "「향!? 회, 회장군 왜 갑자기 엉덩이를 때리――」"

[[dialogue]]
speaker = "フェリシー"
original = "「はぁんっ<emoji=heart04>」"
translation = "「하앙앗<emoji=heart04>」"

[[dialogue]]
speaker = "フェリシー"
original = "「――か、軽く叩かれてるだけだから、痛くないけど……あんっ<emoji=heart04>\u3000会長くん、ちょっと待ってぇ……<emoji=heart04>」"
translation = "「――가, 가볍게 맞는 것뿐이라 아프진 않지만…… 안앗<emoji=heart04> 회장군 잠깐만 기다려어……<emoji=heart04>」"

[[dialogue]]
speaker = "フェリシー"
original = "「ふあぁんっ<emoji=heart04>\u3000はあぁっ……んうぅ……<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁっ……ふうぅ……<emoji=heart04>\u3000んあぁっ……<emoji=heart04>」"
translation = "「후아앙앗<emoji=heart04> 하아앗…… 응우……<emoji=heart04> 앗<emoji=heart04> 하아앗…… 후우……<emoji=heart04> 응아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「やっぱり。フェリシーって恥ずかしがると、ちょっと気持ち良くなってるよな」"
translation = "「역시. 펠리시는 부끄러워하면 좀 기분 좋아지는구나」"

[[dialogue]]
speaker = "フェリシー"
original = "「えっ？\u3000そ、そんなこと……！」"
translation = "「에? 그, 그런 건……!」"

[[dialogue]]
speaker = "クロト"
original = "「いわゆるＭってやつなんじゃないか？\u3000太もも擦られたり、お尻叩かれたりするだけで、おま○こヒクヒクしてるよ」"
translation = "「소위 말하는 M이라는 거 아니야? 허벅지 문질러지거나 엉덩이 맞는 것만으로 보지 히쿠히쿠하고 있어」"

[[dialogue]]
speaker = "フェリシー"
original = "「やぁんっ<emoji=heart04>\u3000こ、これは違うのっ……<emoji=heart04>」"
translation = "「야앙앗<emoji=heart04> 이, 이건 아니야앗……<emoji=heart04>」"

[[dialogue]]
speaker = "フェリシー"
original = "「あぁんっ<emoji=heart04>\u3000お尻を叩かれて、興奮してなんて……」"
translation = "「아앙앗<emoji=heart04> 엉덩이 맞아서 흥분하다니……」"

[[dialogue]]
speaker = "フェリシー"
original = "「ふああぁっ<emoji=heart04>\u3000ダメ<emoji=heart04>\u3000会長くん、叩くの待ってぇ……<emoji=heart04>」"
translation = "「후아아앗<emoji=heart04> 안 돼<emoji=heart04> 회장군 때리는 거 기다려어……<emoji=heart04>」"

[[dialogue]]
speaker = "フェリシー"
original = "「はあぁっ……<emoji=heart04>\u3000ふうぅっ……<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁっ……んうぅっ……ふああぁっ<emoji=heart04>」"
translation = "「하아앗……<emoji=heart04> 후우웃……<emoji=heart04> 앗<emoji=heart04> 하아앗…… 응우웃…… 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「やっぱり興奮してる」"
translation = "「역시 흥분하고 있네」"

[[dialogue]]
speaker = "フェリシー"
original = "「やぁ……<emoji=heart04>\u3000会長くん、あんまり意地悪しないでぇっ……<emoji=heart04>\u3000あっ……はあぁっ……んあぁっ……<emoji=heart04>」"
translation = "「야아……<emoji=heart04> 회장군 너무 심술궂게 굴지 마아앗……<emoji=heart04> 앗…… 하아앗…… 응아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "なら――と俺は、彼女の耳元に顔を寄せて……"
translation = "그러면―― 하고 나는, 그녀의 귓가에 얼굴을 가까이 대고……"

[[dialogue]]
speaker = "クロト"
original = "「もっと試してみようか」"
translation = "「좀 더 시험해 볼까」"

[[dialogue]]
speaker = "フェリシー"
original = "「えっ？\u3000た、試してみるって……あっ、はあぁっ……っ<emoji=heart04>」"
translation = "「엣? 시, 시험해 본다니…… 앗, 하아앗……!<emoji=heart04>」"

[[dialogue]]
speaker = "フェリシー"
original = "「――おち○ちん激しく？\u3000あんっ<emoji=heart04>\u3000ま、待って、会長くん！\u3000今そんなことされたら……あっ――――<emoji=heart04><emoji=heart04>」"
translation = "「――자지 격렬하게? 앙!<emoji=heart04> 기, 기다려, 회장군! 지금 그런 짓 당하면…… 앗――――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "フェリシー"
original = "「ふああああああぁぁぁっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ダメえええぇぇぇっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000あっ、あっ、あっ<emoji=heart04>\u3000はあぁっ、んああぁぁっ<emoji=heart04><emoji=heart04>」"
translation = "「후아아아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 안 돼애애애애액<emoji=heart04><emoji=heart04><emoji=heart04> 앗, 앗, 앗<emoji=heart04> 하아앗, 응아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "フェリシー"
original = "「やあぁっ<emoji=heart04>\u3000激しいぃっ<emoji=heart04><emoji=heart04>\u3000あっ、あっ、あっ、あんっ<emoji=heart04>\u3000はあぁっ、あっ、あっ、あっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>」"
translation = "「야아앗<emoji=heart04> 격렬해앳<emoji=heart04><emoji=heart04> 앗, 앗, 앗, 앙<emoji=heart04> 하아앗, 앗, 앗, 앗<emoji=heart04> 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "フェリシー"
original = "「おま○この奥に、どちゅどちゅ当たってるのぉっ<emoji=heart04><emoji=heart04>\u3000んあぁっ、あっ、あっ、あっ<emoji=heart04>\u3000はああぁんっ<emoji=heart04>\u3000んっ、あっ、あっ<emoji=heart04>\u3000はあぁっ、んああぁっ<emoji=heart04>」"
translation = "「보지 안쪽에, 푸슉푸슉 닿고 있어엇<emoji=heart04><emoji=heart04> 응아앗, 앗, 앗, 앗<emoji=heart04> 하아아앙<emoji=heart04> 응, 앗, 앗<emoji=heart04> 하아앗, 응아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "フェリシー"
original = "「おち○ちん凄いぃっ<emoji=heart04><emoji=heart04>\u3000あっ、あっ、あっ、はああぁっ<emoji=heart04>\u3000んっ、あっ、あっ、あっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04><emoji=heart04>」"
translation = "「자지 대단해앳<emoji=heart04><emoji=heart04> 앗, 앗, 앗, 하아아앗<emoji=heart04> 응, 앗, 앗, 앗<emoji=heart04> 후아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "フェリシー"
original = "「んああぁっ<emoji=heart04><emoji=heart04>\u3000全力ピストンしながら、お尻叩くのダメぇぇっ<emoji=heart04><emoji=heart04>\u3000あっ、あっ、あっ<emoji=heart04>\u3000叩かれると、おま○こキュンキュンしちゃうぅっ<emoji=heart04><emoji=heart04>」"
translation = "「응아아앗<emoji=heart04><emoji=heart04> 전력 피스톤 하면서, 엉덩이 때리는 건 안 돼애앳<emoji=heart04><emoji=heart04> 앗, 앗, 앗<emoji=heart04> 맞으면, 보지 큥큥해버려엇<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "フェリシー"
original = "「やあぁっ<emoji=heart04>\u3000おかしくなっちゃうっ<emoji=heart04>\u3000お尻ぱんぱんされながらのおち○ちんピストン、気持ちよくなっちゃうのぉっ<emoji=heart04>\u3000あっ、あっ、あっ、あっ<emoji=heart04>\u3000あぁんっ<emoji=heart04>」"
translation = "「야아앗<emoji=heart04> 이상해져버려어<emoji=heart04> 엉덩이 팡팡 당하면서 자지 피스톤, 기분 좋아져버려엇<emoji=heart04> 앗, 앗, 앗, 앗<emoji=heart04> 아앙<emoji=heart04>」"

[[dialogue]]
speaker = "フェリシー"
original = "「ふあああぁっ<emoji=heart04><emoji=heart04>\u3000気持ちいぃっ<emoji=heart04>\u3000あっ、あっ、あっ<emoji=heart04>\u3000おま○こ気持ちいぃっ<emoji=heart04>\u3000あっ、あっ、あっ、はあぁっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「후아아아앗<emoji=heart04><emoji=heart04> 기분 좋아앗<emoji=heart04> 앗, 앗, 앗<emoji=heart04> 보지 기분 좋아앗<emoji=heart04> 앗, 앗, 앗, 하아앗<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "フェリシー"
original = "「あっ、あっ、あっ、くるっ<emoji=heart04><emoji=heart04>\u3000気持ちいいの奥から登ってきちゃうっ<emoji=heart04><emoji=heart04>」"
translation = "「앗, 앗, 앗, 온다앗<emoji=heart04><emoji=heart04> 기분 좋은 게 깊은 곳에서 올라와버려어<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "フェリシー"
original = "「うん！\u3000会長くんも一緒にきてぇっ<emoji=heart04>\u3000あっ、あっ、あっ、あっ<emoji=heart04>\u3000はあぁんっ<emoji=heart04>\u3000２人で、一緒にぃ<emoji=heart04>」"
translation = "「응! 회장군도 같이 가아앗<emoji=heart04> 앗, 앗, 앗, 앗<emoji=heart04> 하아아앙<emoji=heart04> 둘이서, 같이이<emoji=heart04>」"

[[dialogue]]
speaker = "フェリシー"
original = "「あっ、あっ、あっ、あっ<emoji=heart04>\u3000ふあああぁっ<emoji=heart04><emoji=heart04>\u3000もうイクっ<emoji=heart04>」"
translation = "「앗, 앗, 앗, 앗<emoji=heart04> 후아아아앗<emoji=heart04><emoji=heart04> 이제 가버려어<emoji=heart04>」"

[[dialogue]]
speaker = "フェリシー"
original = "「はあああぁっ<emoji=heart04><emoji=heart04>\u3000イク、イクイク<emoji=heart04>\u3000イっちゃうっ<emoji=heart04><emoji=heart04>」"
translation = "「하아아아앗<emoji=heart04><emoji=heart04> 가, 가 가버려<emoji=heart04> 가버려엇<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "フェリシー"
original = "「あっあっあっあっあっ<emoji=heart04><emoji=heart04>\u3000んああああぁっ<emoji=heart04><emoji=heart04>\u3000イっっっ――――<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗앗앗앗앗<emoji=heart04><emoji=heart04> 응아아아아앗<emoji=heart04><emoji=heart04> 가버어어엇――――<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "フェリシー"
original = "「イっくうううぅぅぅーーーーーーーーーっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ふああああああぁぁぁ～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가버려어어어어어어억―――――――――앗<emoji=heart04><emoji=heart04><emoji=heart04> 후아아아아아아아앗～～～～～～～～～앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "フェリシー"
original = "「はああああああぁぁぁ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000奥、熱いぃっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「하아아아아아아아앗～～～～～～앗<emoji=heart04><emoji=heart04><emoji=heart04> 안쪽, 뜨거워엇……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "フェリシー"
original = "「ふああぁっ……<emoji=heart04><emoji=heart04>\u3000会長くんの精液、すごいぃっ……<emoji=heart04>\u3000まだどぴゅどぴゅって、射精続いてる……<emoji=heart04>」"
translation = "「후아아앗……<emoji=heart04><emoji=heart04> 회장군의 정액, 대단해……<emoji=heart04> 아직 울컥울컥하고, 사정 계속되고 있어……<emoji=heart04>」"

[[dialogue]]
speaker = "フェリシー"
original = "「はあぁっ……止まった……<emoji=heart04>\u3000子宮の中にいっぱい……あんっ……<emoji=heart04>」"
translation = "「하아앗…… 멈췄다……<emoji=heart04> 자궁 안에 가득…… 앙……<emoji=heart04>」"

[[dialogue]]
speaker = "フェリシー"
original = "「んっ……入り切らなくて、おま○こから溢れて……んふぅ……<emoji=heart04>」"
translation = "「응…… 다 안 들어가서, 보지에서 넘쳐흘러서…… 응후……<emoji=heart04>」"

[[dialogue]]
speaker = "フェリシー"
original = "「はぁ、はぁ……うぅ……」"
translation = "「하아, 하아…… 으으……」"

[[dialogue]]
speaker = "フェリシー"
original = "「お尻叩かれて、気持ちよくなっちゃった……恥ずかしい……」"
translation = "「엉덩이 맞아서, 기분 좋아져버렸어…… 부끄러워……」"

[[dialogue]]
speaker = "unk"
original = "恥ずかしがるフェリシーが可愛くて、つい調子に乗り過ぎた。ごめん、と俺は謝罪する。"
translation = "부끄러워하는 펠리시가 귀여워서, 그만 너무 분위기를 타버렸다. 미안, 하고 나는 사과한다."

[[dialogue]]
speaker = "フェリシー"
original = "「う、ううん……大丈夫……恥ずかしかったけど……」"
translation = "「으, 응…… 괜찮아…… 부끄러웠지만……」"

[[dialogue]]
speaker = "フェリシー"
original = "「その……私も、すごく気持ちよく、なっちゃってたし……」"
translation = "「그게…… 나도, 엄청 기분 좋게, 되어버렸으니까……」"

[[dialogue]]
speaker = "フェリシー"
original = "「だから会長くんが、エッチの時にそういうプレイをしたいなら……」"
translation = "「그러니까 회장군이, 섹스할 때 그런 플레이를 하고 싶다면……」"

[[dialogue]]
speaker = "フェリシー"
original = "「わ、私は……またしても、いいよ？」"
translation = "「나, 나는…… 다시 해도, 괜찮아?」"

[[dialogue]]
speaker = "unk"
original = "彼女は顔を赤くしながら、言う。"
translation = "그녀는 얼굴을 붉히며 말한다."

[[dialogue]]
speaker = "unk"
original = "俺は彼女の耳元にそっと顔を寄せると――"
translation = "나는 그녀의 귓가에 살며시 얼굴을 대고서――"

[[dialogue]]
speaker = "クロト"
original = "「じゃあ、次もまた同じ感じでしちゃうからな」"
translation = "「그럼, 다음에도 또 같은 느낌으로 해버릴 거니까」"

[[dialogue]]
speaker = "フェリシー"
original = "「う、うん……<emoji=heart04>」"
translation = "「으, 응……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "期待するようにもじもじと太ももを擦り合わせながら、頷くフェリシーなのだった――"
translation = "기대하듯 주뼛주뼛 허벅지를 부비면서, 고개를 끄덕이는 펠리시였다――"

