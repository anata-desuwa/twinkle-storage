[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「んじゃ、この前の事件のおさらいしていこっか」"
translation = "「그럼, 요전번 사건을 복습해 볼까나」"

[[dialogue]]
speaker = "unk"
original = "マインが取り出したのは、以前発生した『コラプサー事件』の資料。"
translation = "마인이 꺼낸 것은 이전에 발생했던 『콜랩서 사건』의 자료였다."

[[dialogue]]
speaker = "unk"
original = "彼女は学園の秘密組織『公安委員会』に所属するエージェントだ。"
translation = "그녀는 학원의 비밀 조직 『공안위원회』에 소속된 에이전트다."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「って言っても、会長は当事者だったから振り返るまでもないだろうけど。ま、一応ね♪」"
translation = "「그렇다고 해도, 회장은 당사자였으니까 굳이 돌아볼 필요도 없겠지만. 뭐, 일단은 말이야♪」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「アタシらはコラプサー。星の光を喰らう者だ」"
translation = "「우리는 콜랩서. 별의 빛을 삼키는 자다」"

[[dialogue]]
speaker = "unk"
original = "キサナという魔族の少女は、『コラプサー』を名乗り、流星学園・新星学園両校の星騎士を襲撃した。"
translation = "키사나라는 마족 소녀는, 『콜랩서』를 자처하며 유성 학원·신성 학원 양교의 성기사를 습격했다."

[[dialogue]]
speaker = "unk"
original = "キサナの戦闘能力は非常に高く、何より星力を打ち消す未知の力を持っていた。"
translation = "키사나의 전투 능력은 매우 높았으며, 무엇보다 성력을 무효화하는 미지의 힘을 가지고 있었다."

[[dialogue]]
speaker = "unk"
original = "何とか撃退には成功したものの、キサナの身柄の確保には至っていない。"
translation = "어찌저찌 격퇴에는 성공했지만, 키사나의 신변 확보에는 이르지 못했다."

[[dialogue]]
speaker = "unk"
original = "今のところ新たな動きはないが、油断はできないだろう。"
translation = "현재로서는 새로운 움직임은 없으나, 방심할 수는 없을 것이다."

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「『コラプサー事件』はちょっと衝撃だったね～。星騎士が犯罪の標的になることは今までもなくはなかったけど、直接襲われることはまずなかったから」"
translation = "「『콜랩서 사건』은 좀 충격적이었지~. 성기사가 범죄의 표적이 되는 일은 지금까지 없지는 않았지만, 직접 습격당하는 일은 거의 없었으니까」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「だって星騎士って強いし。何かの恨みで襲撃したって、普通返り討ちに遭うのがオチだもんね」"
translation = "「그야 성기사는 강하잖아. 무슨 원한으로 습격했다고 해도, 보통은 역공당하는 게 뻔한 결말이니까」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「だけどこの前は星徒会長と風紀委員を同時に相手しての大立ち回り。今までにない敵──ってやつだ」"
translation = "「하지만 요전번에는 성도회장과 선도위원을 동시에 상대하며 한바탕 난리를 피웠지. 지금까지 없었던 적──이라는 녀석이야」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「あの時は犯人がわからなくて、学内の人物の可能性があった。だから風紀委員が動いたけど、今回は公安委員会が調査するよ」"
translation = "「그때는 범인을 몰라서 학내 인물일 가능성이 있었어. 그래서 선도위원이 움직였지만, 이번에는 공안위원회가 조사할 거야」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「風紀委員は学園生徒による星力の不正行使を取り締まる。でも犯罪者が星力を使う場合は、公安委員会の出番だから」"
translation = "「선도위원은 학원 학생에 의한 성력의 부정 행사를 단속해. 하지만 범죄자가 성력을 사용하는 경우는 공안위원회의 차례니까」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「ま、コラプサーが星力を使ってるとは限らないけど。もし全然関係ない力を使ってるとしたら、どこの管轄になるんだろうね？」"
translation = "「뭐, 콜랩서가 성력을 쓰고 있다고 단정할 순 없지만. 만약 전혀 상관없는 힘을 쓰고 있다면 어느 관할이 되려나?」"

[[dialogue]]
speaker = "unk"
original = "今日はセナリィやせつなはいないのか？"
translation = "오늘은 세나리나 세츠나는 없는 거야?"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「うん、今日は別件があってね。だ～か～ら～……新しいお友達を紹介しまーす♪」"
translation = "「응, 오늘은 다른 건이 있어서 말이야. 그~래~서~…… 새로운 친구를 소개할게~♪」"

[[dialogue]]
speaker = "？？？"
original = "「誰が友達だ」"
translation = "「누가 친구라는 거냐」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「にひひ♪\u3000仲良くしましょうよ、セ～ンパイ♪」"
translation = "「니히히♪ 사이좋게 지내자구요, 선~배♪」"

[[dialogue]]
speaker = "？？？"
original = "「馴れ馴れしいんだよ。余計仲良くしたくなくなるっての」"
translation = "「싹싹하게 굴지 마. 더더욱 친하게 지내기 싫어지니까」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「ま、会長さんには名乗っておくか。あたしはシアン・ユーゼリア。新星学園・公安委員会所属の３年生だ」"
translation = "「뭐, 회장님한테는 통성명을 해둘까. 나는 시안 유제리아. 신성 학원 공안위원회 소속 3학년이다」"

[[dialogue]]
speaker = "unk"
original = "（こんな先輩いたっけ……？）"
translation = "(이런 선배가 있었나……?)"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「おい、思ってることが顔に出てるぞ。そこは知ってるふりしとけ」"
translation = "「야, 생각하는 게 얼굴에 다 드러난다고. 그럴 땐 아는 척이라도 해둬」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「まぁ見覚えがないのは当然だが。あたしは最近まで任務で海外にいたんだ」"
translation = "「뭐, 낯이 익지 않은 건 당연하겠지만. 나는 최근까지 임무 때문에 해외에 있었거든」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「外国で追ってる事件があったんだが……その関係で今回コラプサー関連の担当になってな。最近流星市国に戻ってきたんだよ」"
translation = "「외국에서 쫓고 있던 사건이 있었는데…… 그 관계로 이번에 콜랩서 관련 담당이 돼서 말이야. 최근에 유성 시국으로 돌아왔어」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「それにしても……ふーん、これが今の新星の会長か。見た目は割と普通そうだな」"
translation = "「그나저나…… 흠, 이게 지금 신성의 회장인가. 겉보기엔 꽤 평범해 보이네」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「御前試合じゃ大暴れだったんだから。地を割り、天を裂き、天変地異レベルのパワーだったよ♪」"
translation = "「어전 시합에선 엄청나게 날뛰었으니까. 땅을 가르고, 하늘을 찢고, 천변지구급 파워였다구♪」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「んなわけあるか。ていうかそこまでいったらリクリエ起こしてるのコイツだろ」"
translation = "「그럴 리가 있겠냐. 그보다 그 정도면 리크리에를 일으키고 있는 건 이 녀석이겠지」"

[[dialogue]]
speaker = "unk"
original = "（なんだか違和感があるような……）"
translation = "(왠지 위화감이 느껴지는데……)"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「ん？\u3000あたしの顔をまじまじ見てどうした？\u3000気に入らないことでもあるのか？」"
translation = "「음? 내 얼굴을 빤히 쳐다보고 왜 그래? 마음에 안 드는 거라도 있나?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「あれ～？\u3000会長、もしかして気付いたんじゃない？\u3000シアン先輩のヒ・ミ・ツ♪」"
translation = "「어라~? 회장, 혹시 눈치챈 거 아냐? 시안 선배의 비·밀♪」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「なっ！？」"
translation = "「뭣!?」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「別に言っちゃっていいんじゃない？\u3000会長なら言いふらしたりしないし……ていうか公安委員会の存在の方がよっぽどヤバい秘密だし」"
translation = "「별로 말해버려도 상관없지 않아? 회장이라면 여기저기 떠벌리고 다니지도 않을 거고…… 애초에 공안위원회의 존재 자체가 훨씬 위험한 비밀이니까」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「任務上秘匿事項にされてんだ。そういうわけにはいかねえ」"
translation = "「임무상 비닉 사항으로 되어 있다. 그럴 수는 없어」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「会長なら教えちゃっていいと思うけどな～。まいっか」"
translation = "「회장이라면 알려줘도 좋다고 생각하는데 말이야~. 뭐 됐어」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「そーいうわけで、会長にはシアン先輩と一緒にコラプサーの調査をお願いするよ」"
translation = "「그런 이유로, 회장은 시안 선배랑 같이 콜랩서 조사를 부탁할게」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「シアン先輩は、その執念深さと追跡能力から<ruby>猟犬<rt>ハウンドドッグ</rt></ruby>って異名で知られる人なんだ。大先輩だから頼りにするといいよ♪」"
translation = "「시안 선배는 그 집요함과 추적 능력 때문에 <ruby>사냥개<rt>하운드 도그</rt></ruby>라는 이명으로 알려진 분이야. 대선배니까 의지하면 좋을 거야♪」"

[[dialogue]]
speaker = "unk"
original = "大先輩……？"
translation = "대선배……?"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「じゃあ私はセナリィたちと合流しなきゃだから、じゃあね～♪」"
translation = "「그럼 난 세나리 일행이랑 합류해야 하니까, 안녕~♪」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「あっ、おい、ネーゼマイン……！\u3000チッ、余計なことばかり言いやがって……」"
translation = "「앗, 이봐, 네제마인……! 칫, 쓸데없는 소리만 해대기는……」"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「まぁいい。星徒会長なら実力は確かだし、あんたは前の事件でもキサナと戦っている。頼りにさせてもらうぞ、会長さん」"
translation = "「뭐 됐다. 성도회장이라면 실력은 확실할 거고, 너는 지난 사건에서도 키사나와 싸웠지. 의지하도록 하마, 회장님」"

[[dialogue]]
speaker = "unk"
original = "はい。よろしくお願いします"
translation = "네. 잘 부탁드립니다"

[[dialogue]]
speaker_original = "シアン"
speaker_translation = "시안"
original = "「ああ。とりあえずキサナの足取りを追うぞ。目撃情報を集めてある」"
translation = "「그래. 일단 키사나의 행방을 쫓자. 목격 정보를 모아뒀어」"

[[dialogue]]
speaker = "？？？"
original = "「ここが流星市国……星騎士たちの総本山」"
translation = "「이곳이 유성 시국…… 성기사들의 총본산」"

[[dialogue]]
speaker = "？？？"
original = "「世界を守るために戦う、麗しく、そして気高き戦士たち。流星・新星両校の星騎士と会うのが楽しみです」"
translation = "「세계를 지키기 위해 싸우는, 아름답고, 그리고 고결한 전사들. 유성·신성 양교의 성기사들을 만나는 것이 기대되네요」"

[[dialogue]]
speaker = "？？？"
original = "「ああ……本当に楽しみだ」"
translation = "「아아…… 정말로 기대되는구나」"

