[[dialogue]]
speaker = "unk"
original = "第３話,クレーンゲーム一本釣り！,P"
translation = "제3화, 크레인 게임 일확천금!"

[[dialogue]]
speaker = "unk"
original = "今日はプトラ、フィオナと一緒に渋谷へ買い物にやってきた。"
translation = "오늘은 푸트라, 피오나와 함께 시부야로 쇼핑하러 왔다."

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「みんなへのお土産、何買おっかな～♪」"
translation = "「모두에게 줄 선물, 뭘 살까나~♪」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「特鉄隊のみなさんは、どんなものがお好きなんですか？」"
translation = "「특철대 여러분은 어떤 걸 좋아하시나요?」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「ヴィヴィアンはやっぱりおしゃれ！\u3000香水とか化粧品がよさそうだね」"
translation = "「비비안은 역시 세련된 거! 향수나 화장품이 좋을 것 같네.」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「ヨシノには工具とか……あ、お裁縫の道具もいいかも！」"
translation = "「요시노에게는 공구라든가…… 아, 바느질 도구도 좋을지도!」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「ヤクーツクは……鞭……はやめとこ。けっこう読書してるから、本にしようっと」"
translation = "「야쿠츠크는…… 채찍……은 관두자. 꽤 독서를 하니까 책으로 해야지.」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「クインズウェイには何がいいかな。勉強してる時につまめるお菓子とか喜ぶかも！」"
translation = "「퀸즈웨이에게는 뭐가 좋을까. 공부할 때 집어 먹을 수 있는 과자 같은 걸 좋아할지도!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ふふふ。仲間のことが大好きなんですね」"
translation = "「후후후. 동료들을 정말 사랑하시는군요.」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「うん、大好き！\u3000ん？\u3000あれは……」"
translation = "「응, 정말 좋아해! 응? 저건……」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「ねえねえ、中に人形がいっぱい詰まったおっきなケースが並んでるけど、あれは何なの？」"
translation = "「저기 저기, 안에 인형이 가득 찬 커다란 케이스가 늘어서 있는데 저건 뭐야?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ああ、あれはクレーンゲームですよ」"
translation = "「아아, 저건 크레인 게임이에요.」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「クレーンゲーム？」"
translation = "「크레인 게임?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ケースの上のところに何かぶら下がってるでしょ？」"
translation = "「케이스 윗부분에 뭔가 매달려 있죠?」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「うん」"
translation = "「응.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「あれを操作して下に積まれている人形を持ち上げるんです」"
translation = "「저걸 조작해서 아래에 쌓여 있는 인형을 들어 올리는 거예요.」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「へ～、面白そー！」"
translation = "「헤~ 재밌겠다!」"

[[dialogue]]
speaker = "unk"
original = "折角だから遊んでみる？"
translation = "기왕 왔으니 한번 해볼래?"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「いいの？\u3000やりたいやりたい！」"
translation = "「정말? 하고 싶어 하고 싶어!」"

[[dialogue]]
speaker = "unk"
original = "プトラが選んだのは、ゲームセンター前のクレーンゲーム。ケースの中には──"
translation = "푸트라가 고른 것은 게임 센터 앞의 크레인 게임. 케이스 안에는──"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「見て見て！\u3000お魚さんのぬいぐるみがあるよ！\u3000よーし、あの子を狙っちゃおうかなー♪」"
translation = "「봐봐 봐봐! 물고기 인형이 있어! 좋아, 저 아이를 노려볼까나~♪」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「ふむふむ、このボタンを押してクレーンを操作するんだね」"
translation = "「흠흠, 이 버튼을 눌러서 크레인을 조작하는 거구나.」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「まず右ボタンでこの辺まで移動するでしょ？\u3000それからこの辺まで奥に移動させるでしょ？」"
translation = "「우선 오른쪽 버튼으로 이쯤까지 이동하겠지? 그다음 이쯤까지 안쪽으로 이동시키고?」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「戻ってきたら穴に落っこちてー……ゲット！\u3000うん、だいたい分かった！」"
translation = "「돌아오면 구멍에 떨어져서── 겟! 응, 대충 알겠어!」"

[[dialogue]]
speaker = "unk"
original = "（しっかり位置を確認してる）"
translation = "(제대로 위치를 확인하고 있어)"

[[dialogue]]
speaker = "unk"
original = "（考え無しに操作するんじゃなくて）"
translation = "(아무 생각 없이 조작하는 게 아니라)"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「よし、行けそうだよ！\u3000レッツゴー！\u3000一本釣りだー！」"
translation = "「좋아, 할 수 있을 것 같아! 렛츠 고! 한 방에 낚아주마!」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「オーライ、オーライ……ストップ！\u3000次は奥だよ、オーライ、オーライ……ここっ！」"
translation = "「오라이, 오라이…… 스톱! 다음은 안쪽이야, 오라이, 오라이…… 여기!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「すごいです、狙い通りの位置にクレーンを下ろしました！」"
translation = "「대단해요, 노린 대로의 위치에 크레인을 내렸어요!」"

[[dialogue]]
speaker = "unk"
original = "操作は完璧だ。けど……"
translation = "조작은 완벽하다. 하지만……"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「あれっ、掴めなかったよ？\u3000うーん、狙う位置が悪かったのかな……」"
translation = "「어라, 못 잡았네? 으음, 노린 위치가 나빴나……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「大丈夫ですよ。まだクレジットは残ってますから」"
translation = "「괜찮아요. 아직 코인이 남아있으니까요.」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「そうだね！\u3000うーん……あ、ここ、クレーンが引っ掛かりそう！\u3000次はここを狙ってみよう！」"
translation = "「그렇네! 으음…… 아, 여기 크레인이 걸릴 것 같아! 다음엔 여기를 노려보자!」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「今度こそ逃がさないよ～……ってあーっ！\u3000ちょっとだけ持ち上がったのに落ちちゃったぁ……」"
translation = "「이번에야말로 놓치지 않아~…… 어라아! 조금 들렸는데 떨어져 버렸어……」"

[[dialogue]]
speaker = "unk"
original = "目のつけどころはいいんだけど"
translation = "짚어내는 곳은 좋은데"

[[dialogue]]
speaker = "unk"
original = "うーん、惜しい……"
translation = "으음, 아깝네……"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「えっ、どういうこと？」"
translation = "「엣, 그게 무슨 소리야?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「クレーンゲームのアームは力があまり強くないんです」"
translation = "「크레인 게임의 암은 힘이 그리 세지 않거든요.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「だから、普通に持ち上げて取ろうとしても、なかなか上手くいかないんですよ」"
translation = "「그래서 평범하게 들어 올려서 잡으려고 해도 좀처럼 잘 안 돼요.」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「そうなんだ……じゃあ、どうすればいいんだろ」"
translation = "「그렇구나…… 그럼 어떻게 해야 하지.」"

[[dialogue]]
speaker = "unk"
original = "１回で取ろうと思わくていい"
translation = "한 번에 잡으려고 생각하지 않아도 돼"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「あ……！\u3000そういうことなんだ！\u3000ありがとう、分かっちゃったかも！\u3000ちょっとやってみるね！」"
translation = "「아……! 그런 거였구나! 고마워, 알 것 같아! 좀 더 해볼게!」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「わっ！\u3000取れた！\u3000やったー、取れたよー♪」"
translation = "「앗! 잡았다! 됐다, 잡았어~!♪」"

[[dialogue]]
speaker = "unk"
original = "お見事！"
translation = "훌륭해!"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「残りクレジットをしっかり使い切っての成功ですね」"
translation = "「남은 코인을 잘 써서 성공했네요.」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「一回で釣ろうとせずに、何回かで釣ることを考えればよかったんだね！\u3000クレーンゲーム、面白いよ！」"
translation = "「한 번에 낚으려 하지 말고 몇 번에 걸쳐서 낚을 생각을 하면 됐던 거네! 크레인 게임 재미있어!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ふふ……プトラさんはクレーンゲームの才能があると思います」"
translation = "「후후…… 푸트라 씨는 크레인 게임에 재능이 있는 것 같아요.」"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「えへへ、そうかな～。もしかしたらあたしに流れる漁師の血が目覚めたのかもだよ」"
translation = "「에헤헤, 그럴까나~. 어쩌면 나한테 흐르는 어부의 피가 깨어난 걸지도 몰라.」"

[[dialogue]]
speaker = "unk"
original = "慣れてきたらもっと大きいのも取れるよ"
translation = "익숙해지면 더 큰 것도 잡을 수 있어"

[[dialogue]]
speaker_original = "プトラ"
speaker_translation = "푸트라"
original = "「ホント？\u3000よーし、頑張るぞ～！」"
translation = "「정말? 좋아, 열심히 해볼게~!」"

[[dialogue]]
speaker = "unk"
original = "プトラは手に入れたサバのぬいぐるみを抱きしめながら、『次は大物を獲るぞ！』と笑顔で意気込むのだった。"
translation = "푸트라는 손에 넣은 고등어 인형을 껴안으며, 『다음엔 대물을 낚겠어!』라고 미소 지으며 의욕을 다지는 것이었다."

