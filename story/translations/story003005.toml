[[dialogue]]
speaker = "舞亜"
original = "「ごめんね～、付き合って貰っちゃって」"
translation = "「미안해~, 같이 있어 주게 해서.」"

[[dialogue]]
speaker = "舞亜"
original = "「頭の中を整理するのに、誰かにお話、聞いて欲しいな～って思って」"
translation = "「머릿속을 정리하는 데 누군가에게 이야기를 들려주고 싶어서 말이야~」"

[[dialogue]]
speaker = "unk"
original = "ローラースケート？"
translation = "롤러스케이트?"

[[dialogue]]
speaker = "舞亜"
original = "「車輪が一列だからインラインスケート。滑りながらの方が考えがまとまりそうだから」"
translation = "「바퀴가 일렬이니까 인라인스케이트. 미끄러지면서 생각하는 게 더 정리가 잘 될 것 같아서.」"

[[dialogue]]
speaker = "unk"
original = "スケート靴に履きかえた舞亜は、さっそく軽やかな動きで路上を滑っていく。"
translation = "스케이트 구두로 갈아 신은 마이아는 바로 가벼운 움직임으로 노면을 미끄러져 나간다."

[[dialogue]]
speaker = "unk"
original = "滑るものなら何でもいけるんだ"
translation = "미끄러지는 거라면 뭐든 잘 타는구나"

[[dialogue]]
speaker = "unk"
original = "さすが……"
translation = "과연……"

[[dialogue]]
speaker = "舞亜"
original = "「あはは、その言い方よくなーい」"
translation = "「아하하, 그 말투 별로야~」"

[[dialogue]]
speaker = "unk"
original = "笑いながら綺麗なターンを決めて見せる舞亜。"
translation = "웃으면서 아름다운 턴을 결정해 보이는 마이아."

[[dialogue]]
speaker = "unk"
original = "その流麗さはさすがというほか無く、思わず見入ってしまうほどだった。"
translation = "그 유려함은 과연이라고 할 수밖에 없어, 나도 모르게 넋을 잃고 보게 될 정도였다."

[[dialogue]]
speaker = "舞亜"
original = "「──でね、考えごとっていうのはクリスマスパーティーの事なんだけどね」"
translation = "「──그래서 말이지, 생각할 거리라는 건 크리스마스 파티에 대한 건데.」"

[[dialogue]]
speaker = "舞亜"
original = "「アポロちゃんのアイデアは突拍子もないものばかりで驚かされちゃったけど、どれも楽しそうなものばかりだった」"
translation = "「아폴로 짱의 아이디어는 엉뚱한 것들뿐이라 놀랐지만, 하나같이 즐거워 보이는 것들뿐이었어.」"

[[dialogue]]
speaker = "舞亜"
original = "「小さくまとまってなくて、自由奔放で……何より心からパーティーを楽しもうとしてる、それってすっごく大切な事なんだよね」"
translation = "「작게 웅크려 있지 않고, 자유분방하고…… 무엇보다 진심으로 파티를 즐기려 하고 있어. 그건 정말 중요한 거거든.」"

[[dialogue]]
speaker = "舞亜"
original = "「でも、きっとアポロちゃんのイメージに乗っかって進めていったら、寮長さんが思い描いていたものとは違う形になっちゃう」"
translation = "「하지만 분명 아폴로 짱의 이미지에 올라타서 진행하다 보면, 기숙사장님이 그렸던 것과는 다른 형태가 되어버릴 거야.」"

[[dialogue]]
speaker = "舞亜"
original = "「だったらアニュラスの提案したアイデアの方が、そのイメージに近い……騎士っぽい思考をしてるから、オーダーにはしっかり応えたいって気持ちが強いのかな？」"
translation = "「그렇다면 아뉴라스가 제안한 아이디어가 그 이미지에 더 가깝겠지…… 기사 같은 사고방식을 하고 있으니까, 오더에는 확실히 보답하고 싶다는 마음이 강한 걸까?」"

[[dialogue]]
speaker = "舞亜"
original = "「アポロちゃんにはあんまり刺さってなかったみたいだけど、実はアニュラスの提案も私は素敵だと思うの」"
translation = "「아폴로 짱에게는 별로 와닿지 않았던 것 같지만, 사실 아뉴라스의 제안도 나는 멋지다고 생각해.」"

[[dialogue]]
speaker = "舞亜"
original = "「それに流星寮のクリスマスパーティーでしか味わえない上品な空気感も、大切にしなきゃいけないものだと思うんだよね」"
translation = "「게다가 유성 기숙사의 크리스마스 파티에서만 맛볼 수 있는 품위 있는 공기도 소중히 여겨야 할 부분이라고 생각하거든.」"

[[dialogue]]
speaker = "舞亜"
original = "「どっちの意見もわかる、ちょーど中間……」"
translation = "「양쪽 의견 다 알겠어, 딱 중간……」"

[[dialogue]]
speaker = "舞亜"
original = "「だから２人の話を聞きながら、どうやったら両方とも納得できるパーティーになるんだろうって、ずーっと考えてたの」"
translation = "「그래서 두 사람의 이야기를 들으면서, 어떻게 하면 둘 다 납득할 수 있는 파티가 될지 계속 생각했어.」"

[[dialogue]]
speaker = "舞亜"
original = "「でも真逆の意見だから、いい塩梅のトコを取るって難しいんだよね……」"
translation = "「하지만 정반대의 의견이라, 적당한 지점을 찾는 게 어렵단 말이지……」"

[[dialogue]]
speaker = "unk"
original = "どうしたものやら"
translation = "어떻게 해야 하려나"

[[dialogue]]
speaker = "unk"
original = "そうだな……"
translation = "그러게……"

[[dialogue]]
speaker = "舞亜"
original = "「そうそう、どーしたものやらだよ……」"
translation = "「그래그래, 어떻게 해야 하려나야……」"

[[dialogue]]
speaker = "舞亜"
original = "「多分、あのまま考え続けても、いい感じにはならないだろうなーって思って」"
translation = "「아마 이대로 계속 생각해도 좋은 느낌으로는 안 되겠구나~ 싶어서.」"

[[dialogue]]
speaker = "unk"
original = "それで会議を終わりにしたわけか"
translation = "그래서 회의를 끝낸 건가"

[[dialogue]]
speaker = "舞亜"
original = "「考えがまとまらない時は、とりあえず身体を動かしてみるのが１番かなって」"
translation = "「생각이 정리되지 않을 때는 일단 몸을 움직여 보는 게 제일이라고 생각하거든.」"

[[dialogue]]
speaker = "舞亜"
original = "「演目のこととか演技のこととかも、滑ってるときに思いつくことが多いんだよね」"
translation = "「종목에 대한 거나 연기에 대한 것도 스케이트를 탈 때 떠오르는 경우가 많거든.」"

[[dialogue]]
speaker = "舞亜"
original = "「でも、今回はダメそうかも。考えても考えても何にも浮かんでこないみたい」"
translation = "「하지만 이번에는 안 될지도. 생각하고 생각해도 아무것도 안 떠오르는 모양이야.」"

[[dialogue]]
speaker = "舞亜"
original = "「だって正反対の意見だもんね……それを融合しようなんて難しいに決まってる……よっ、と」"
translation = "「그야 정반대의 의견인걸…… 그걸 융합하려고 하다니 어려운 게 당연하지…… 읏차.」"

[[dialogue]]
speaker = "unk"
original = "舞亜は呟きながら、再び綺麗なターンを決める。"
translation = "마이아는 중얼거리며 다시 한번 아름다운 턴을 결정한다."

[[dialogue]]
speaker = "unk"
original = "その姿は美しく上品で、それでいて見ている者を自然に楽しい気持ちにさせてくれる──"
translation = "그 모습은 아름답고 품위 있으며, 그러면서도 보는 이를 자연스럽게 즐거운 기분으로 만들어 준다──"

[[dialogue]]
speaker = "舞亜"
original = "「ん、どうしたの？」"
translation = "「응, 왜 그래?」"

[[dialogue]]
speaker = "unk"
original = "……今、演技してる？"
translation = "……지금, 연기하고 있어?"

[[dialogue]]
speaker = "舞亜"
original = "「え？\u3000してないけど……でも、まあいつもの感じで。慣れ、みたいな？」"
translation = "「에? 안 하고 있는데…… 하지만 뭐, 평소 느낌대로? 습관 같은 거려나?」"

[[dialogue]]
speaker = "舞亜"
original = "「滑ってるときはいつもお客さんの目を意識してるから、ついついそういう滑り方になっちゃってたかもしれない」"
translation = "「탈 때는 항상 관객들의 시선을 의식하니까, 나도 모르게 그런 식으로 타게 됐을지도 몰라.」"

[[dialogue]]
speaker = "unk"
original = "すごく上品だし"
translation = "굉장히 품위 있고"

[[dialogue]]
speaker = "unk"
original = "すごく楽しそうだし"
translation = "굉장히 즐거워 보여서"

[[dialogue]]
speaker = "舞亜"
original = "「う、うん……ありがとう……」"
translation = "「으, 응…… 고마워……」"

[[dialogue]]
speaker = "舞亜"
original = "「でもそっか、もしかしたら同じなのかもしれないね」"
translation = "「하지만 그렇구나, 어쩌면 같은 걸지도 모르겠네.」"

[[dialogue]]
speaker = "舞亜"
original = "「フィギュアスケートは競技だから、その表現の正確さや上品さが求められる。でも同時に見ている人たちには、私の演技で思いっきり楽しくなって欲しいって思ってる」"
translation = "「피겨 스케이팅은 경기니까 표현의 정확함이나 품위가 요구돼. 하지만 동시에 보는 사람들에게는 내 연기로 마음껏 즐거워졌으면 좋겠다고 생각하거든.」"

[[dialogue]]
speaker = "舞亜"
original = "「つまり私がいつもやってることなんだ…………うん、そう考えたら、全然イケそうな気がしてきた！」"
translation = "「즉 내가 항상 하고 있는 일이야………… 응, 그렇게 생각하니까 전혀 할 수 있을 것 같은 기분이 들었어!」"

[[dialogue]]
speaker = "舞亜"
original = "「私、やってみるね。アポロちゃんとアニュラス、２人ともが納得できるようなクリスマスパーティーを実現してみせる」"
translation = "「나, 해볼게. 아폴로 짱이랑 아뉴라스, 두 사람 모두가 납득할 수 있는 크리스마스 파티를 실현해 보이겠어.」"

[[dialogue]]
speaker = "舞亜"
original = "「意見は正反対かもしれないけど、最高にワクワクするクリスマスにしたいって気持ちは同じなんだから！\u3000絶対に大丈夫だよ！」"
translation = "「의견은 정반대일지 몰라도, 최고로 두근거리는 크리스마스로 만들고 싶다는 마음은 같으니까! 절대 괜찮을 거야!」"

[[dialogue]]
speaker = "unk"
original = "その意気だ！"
translation = "그 기세다!"

[[dialogue]]
speaker = "舞亜"
original = "「よーし、それじゃあ会長さんにも１つお願いしちゃおうかな」"
translation = "「좋아, 그럼 회장님한테도 한 가지 부탁 좀 할까나.」"

[[dialogue]]
speaker = "舞亜"
original = "「寮長さんの件。私たちがやろうとしてるプランを知ったら、途中で止められちゃうかもしれないでしょ？」"
translation = "「기숙사장님 건이야. 우리가 하려는 플랜을 알면 도중에 멈추게 할지도 모르잖아?」"

[[dialogue]]
speaker = "舞亜"
original = "「ワクワクなクリスマスパーティーを実際に見たら、あの人も納得すると思うけど、事前に理解してもらうのは難しいと思うから」"
translation = "「두근두근한 크리스마스 파티를 실제로 보면 그 사람도 납득하겠지만, 사전에 이해받는 건 어려울 것 같으니까.」"

[[dialogue]]
speaker = "舞亜"
original = "「だから、上手くごまかしといて欲しいの。会長さんの言葉なら、あの人も聞いてくれるんじゃないかって」"
translation = "「그러니까 잘 좀 얼버무려 줬으면 해. 회장님의 말이라면 그 사람도 들어주지 않을까 해서.」"

[[dialogue]]
speaker = "unk"
original = "やってみるよ"
translation = "해볼게"

[[dialogue]]
speaker = "unk"
original = "わかった"
translation = "알았어"

[[dialogue]]
speaker = "舞亜"
original = "「ありがと。これで１つハードルがなくなった」"
translation = "「고마워. 이걸로 허들이 하나 없어졌네.」"

[[dialogue]]
speaker = "舞亜"
original = "「でも、まだ何か足りない気がするんだよね……うーん、もう１つ足さなきゃ」"
translation = "「하지만 아직 뭔가 부족한 느낌이 들어…… 음, 하나 더 보태야겠어.」"

[[dialogue]]
speaker = "舞亜"
original = "「ま、それは追々考える。相談出来る仲間もいるし、会長さんのアイデアにも期待させてもらうからね」"
translation = "「뭐, 그건 차차 생각할게. 상담할 수 있는 동료도 있고, 회장님의 아이디어도 기대하고 있을 테니까.」"

[[dialogue]]
speaker = "舞亜"
original = "「全部集まったら、まとめてくっつけるのは私に任せて。キュピーンって見える瞬間があるんだよ。こういうのは感性の成せる技だね」"
translation = "「전부 모이면 정리해서 합치는 건 나한테 맡겨줘. 큐피잉 하고 보이는 순간이 있거든. 이런 건 감성이 빚어내는 기술이지.」"

[[dialogue]]
speaker = "unk"
original = "舞亜の気持ちが固まり、こうしてクリスマスパーティーに向けてそれぞれが進み始めるのだった。"
translation = "마이아의 결심이 서고, 이렇게 크리스마스 파티를 향해 각자 나아가기 시작하는 것이었다."

