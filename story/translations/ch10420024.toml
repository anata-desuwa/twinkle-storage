[[dialogue]]
speaker = "unk"
original = "第４話,フニからのスキンシップ,P"
translation = "제4화, 후니의 스킨십, P"

[[dialogue]]
speaker = "unk"
original = "野菜のお裾分けをしに来てくれたフニを、自宅に招いていた。"
translation = "채소를 나눠주러 온 후니를 집으로 초대했다."

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「手紙の返事と一緒に、北海道から沢山届いたんですよ」"
translation = "「편지 답장과 함께, 홋카이도에서 잔뜩 도착했거든요.」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「新鮮なうちに会長さんに差し上げたいと思いまして……」"
translation = "「신선할 때 회장님께 드리고 싶어서……」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ところで、本日お母様は……？」"
translation = "「그런데, 오늘 어머님은……?」"

[[dialogue]]
speaker = "unk"
original = "今日も帰りは遅くなるって"
translation = "오늘도 귀가가 늦으신대"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「そう、なんですね。……それなら今日は、チャ、チャンスかもしれませんっ」"
translation = "「그렇, 군요. ……그렇다면 오늘은, 차, 찬스일지도 모르겠어요.」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「あのっ、会長さん。お野菜を仕舞ったら、ちょっとだけいいでしょうか？\u3000最近なかなか２人きりになれませんでしたし……」"
translation = "「저기, 회장님. 채소를 정리하면, 아주 잠깐만 괜찮을까요? 최근 좀처럼 둘만 있을 시간이 없었으니까……」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ありがとうございます<emoji=heart04>\u3000お隣、失礼しますね」"
translation = "「감사합니다<emoji=heart04> 옆자리, 실례할게요.」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「えへへ。会長さんがすぐ隣にいます……ちょっと手を伸ばしたら、いつでも触れちゃう距離、です」"
translation = "「에헤헤. 회장님이 바로 옆에 계세요…… 조금만 손을 뻗으면, 언제든 닿을 수 있는 거리, 예요.」"

[[dialogue]]
speaker = "unk"
original = "フニに触ってもらえたら嬉しいな"
translation = "후니가 만져준다면 기쁠 거야"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「会長さんにそう言ってもらえるなら、いくらでも……<emoji=heart04>」"
translation = "「회장님이 그렇게 말씀해 주신다면, 얼마든지……<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「あ……でも、改めて私から触れさせてもらおうとすると、どこに触れていいのか……」"
translation = "「아…… 하지만, 막상 제가 먼저 만지려고 하니, 어디를 만져야 할지……」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「おかしいですね。会長さんとは沢山触れ合ってきたつもりだったのに、それは全部、会長さんから私に触れてくれていたんです」"
translation = "「이상하네요. 회장님과는 많이 접촉해 왔다고 생각했는데, 그건 전부 회장님이 저를 만져주셨던 거였어요.」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「頭を撫でて欲しい……ですか？\u3000は、はいっ。喜んで<emoji=heart04>」"
translation = "「머리를 쓰다듬어 줬으면 좋겠다…… 고요? 네, 네엣. 기꺼이<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「なでり、なでり……♪\u3000会長さんの髪の毛、サラサラで……撫でている私の方が、気持ち良くなっちゃいます」"
translation = "「쓰담쓰담……♪ 회장님 머리카락, 보들보들해서…… 쓰다듬고 있는 제가 더 기분이 좋아져 버려요.」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「会長さんも気持ちいい、ですか？\u3000それなら、良かったです<emoji=heart04>」"
translation = "「회장님도 기분 좋으신가요? 그렇다면 다행이에요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "頭以外も、フニの好きにしてみて"
translation = "머리 말고도, 후니가 하고 싶은 대로 해봐"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ほ、本当ですか……？\u3000それなら、お顔の方も、失礼して……」"
translation = "「정, 정말인가요……? 그렇다면, 얼굴 쪽도 실례해서……」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「あっ……会長さんの頬、温かいです。えへへ……唇にも、少し触っちゃいました」"
translation = "「앗…… 회장님 뺨, 따뜻해요. 에헤헤…… 입술에도 살짝 닿아버렸어요.」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「この唇で……いつも私にキス、してくれるんですよね……」"
translation = "「이 입술로…… 항상 저에게 키스, 해주시곤 하죠……」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「……………………」"
translation = "「……………………」"

[[dialogue]]
speaker = "unk"
original = "フニ、今日はどうかした？"
translation = "후니, 오늘 무슨 일 있어?"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ふぇぇっ！？\u3000あ、あのっ、私、今日はどこか変、だったでしょうか……？」"
translation = "「후에엣!? 저, 저기, 제가 오늘 어디 이상한가요……?」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「変じゃないけど、いつもとちょっと違う……ですか？\u3000はぅぅ、会長さんには、全部お見通しなんですね……」"
translation = "「이상하진 않지만 평소랑 좀 다르다…… 고요? 하으으, 회장님께는 전부 들통나 버리네요……」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「あの……ですね？\u3000会長さんと、その……恋人同士になって、しばらく経ちましたよね」"
translation = "「저기…… 말이죠? 회장님과 그…… 연인 사이가 되고 나서 꽤 시간이 흘렀잖아요.」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「その間に、恋人らしいスキンシップも沢山してきた……と思うんです」"
translation = "「그동안 연인다운 스킨십도 많이 해왔다고…… 생각해요.」"

[[dialogue]]
speaker = "unk"
original = "キスもいっぱいしたよね"
translation = "키스도 많이 했었지"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「は、はいっ。いっぱいキス、していただきました……」"
translation = "「네, 네엣. 키스 많이 해주셨죠……」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ただ、私……気づいたんです」"
translation = "「하지만 저…… 깨달았어요.」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「会長さんにキス……いっぱいしていただきましたが、私の方からはキス、できていなかったんじゃないかって……」"
translation = "「회장님께 키스…… 많이 받았지만, 제 쪽에서는 키스를 해드리지 못했던 게 아닐까 하고……」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「私はいつも、頂いてばかりです。いっぱいお返ししたいと思っているのに、なかなか返しきれません」"
translation = "「저는 항상 받기만 해요. 잔뜩 보답하고 싶다고 생각하는데도, 좀처럼 다 갚지 못하겠어요.」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「キスだけじゃない……『大好き』って言葉も『可愛い』って言葉も、沢山いただきました。そのうちの少しでも、会長さんに返せたらって思ってるんです」"
translation = "「키스뿐만이 아니라…… 『정말 좋아해』라는 말도 『귀여워』라는 말도 잔뜩 받았어요. 그중 조금이라도 회장님께 돌려드리고 싶다고 생각해요.」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「だから今日は……私の方から、会長さんにキスをしてみたいって、そう思ってるんです」"
translation = "「그래서 오늘은…… 제 쪽에서 회장님께 키스를 해보고 싶다, 그렇게 생각하고 있어요.」"

[[dialogue]]
speaker = "unk"
original = "その気持ち、凄く嬉しい"
translation = "그 마음, 정말 기뻐"

[[dialogue]]
speaker = "unk"
original = "ありがとう、フニ。"
translation = "고마워, 후니."

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「はいっ。だから今日は、頑張ります」"
translation = "「네. 그래서 오늘은 힘낼게요.」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「って、思ってたんですが……」"
translation = "「라고, 생각했는데요……」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「うぅぅ、会長さんのお顔、近くでみたら、なまら恥ずかしいです……っ」"
translation = "「으으으, 회장님 얼굴을 가까이서 보니까 너무너무 부끄러워요……!」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「好き合っている同士だって……会長さんなら絶対許してくれるって、わかってるのに……それでも恥ずかしくて、体が動かなくなっちゃいますっ」"
translation = "「서로 좋아하는 사이니까…… 회장님이라면 분명 허락해 주실 거라는 걸 아는데도…… 그런데도 부끄러워서 몸이 움직이질 않아요!」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「会長さんはこの緊張と羞恥を乗り越えて、いつも私にキスをしてくれているのに……情けないですっ」"
translation = "「회장님은 이 긴장과 수치심을 이겨내고 항상 저에게 키스를 해주시는 건데…… 한심해요!」"

[[dialogue]]
speaker = "unk"
original = "自分のペースでいい、とは思うものの、せっかくなら勇気を出してくれたフニの背中を押したい。そして俺自身も、フニからキスをして欲しい。"
translation = "자신의 페이스대로 하면 된다고 생각하면서도, 모처럼 용기를 내준 후니의 등을 밀어주고 싶다. 그리고 나 자신도 후니가 키스해 주길 바란다."

[[dialogue]]
speaker = "unk"
original = "勇気の出るおまじないをかけるよ"
translation = "용기가 나는 주문을 걸어줄게"

[[dialogue]]
speaker = "unk"
original = "そう言って、俺はフニのおでこに触れるだけのキスをした。"
translation = "그렇게 말하며 나는 후니의 이마에 살짝 닿는 키스를 했다."

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「あ…………会長、さん」"
translation = "「아………… 회장, 님.」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ありがとう、ございます。不思議です……会長さんの言う通り、勇気、とっても湧いてきました」"
translation = "「고맙습니다. 신기해요…… 회장님 말씀대로 용기가 듬뿍 솟아났어요.」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「だから、最後までさせてください。大好きな会長さんに、大好きを伝えたい、ですっ」"
translation = "「그러니까 끝까지 하게 해주세요. 정말 좋아하는 회장님께, 제 마음을 전하고 싶어요!」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「会長さん……大好きです<emoji=heart04>」"
translation = "「회장님…… 정말 좋아해요<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「――――――――ちゅ<emoji=heart04>」"
translation = "「――――――――쪽<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「えへへ……やりました。ついに会長さんにキス、しちゃいましたっ」"
translation = "「에헤헤…… 해냈어요. 드디어 회장님께 키스, 해버렸어요!」"

[[dialogue]]
speaker = "unk"
original = "俺も大好きだ"
translation = "나도 정말 좋아해"

[[dialogue]]
speaker = "unk"
original = "ありがとう、フニ。"
translation = "고마워, 후니."

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「なでなで嬉しいです……えへへ。会長さんの手、気持ちいい<emoji=heart04>」"
translation = "「쓰담쓰담해주시니 기뻐요…… 에헤헤. 회장님 손, 기분 좋아<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「もっと……私の大好きって気持ち、会長さんに届けたいです……<emoji=heart04>」"
translation = "「좀 더…… 제 사랑한다는 마음, 회장님께 전하고 싶어요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「顔は火が出るくらい熱くて、頭の中クラクラしちゃってますけど……今だったら、届けられます<emoji=heart04>」"
translation = "「얼굴은 불이 날 정도로 뜨겁고 머릿속은 어질어질하지만…… 지금이라면 전할 수 있어요<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「私が普段、どれだけ会長さんのことが好きで……会長さんに届け切れていない『好き』が、どれほどあるのか……」"
translation = "「제가 평소에 얼마나 회장님을 좋아하는지…… 회장님께 다 전하지 못한 『좋아함』이 얼마나 많은지……」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「会長さんには、もっともっと、身をもって知ってもらいたい、ですっ<emoji=heart04>」"
translation = "「회장님께는 좀 더, 좀 더 몸소 깨닫게 해드리고 싶어요!<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「はぁぁ……ちゅっ<emoji=heart04>\u3000ちゅ<emoji=heart04>\u3000会長さん、好きです<emoji=heart04>\u3000ちゅっ、ちゅっ<emoji=heart04>\u3000ちゅっ<emoji=heart04>」"
translation = "「하아아…… 쪽<emoji=heart04> 쪽<emoji=heart04> 회장님, 좋아해요<emoji=heart04> 쪽, 쪽<emoji=heart04> 쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それから、熱に浮かされたように情熱的なキスをしてくれるフニと、たっぷりイチャイチャを堪能するのだった。"
translation = "그 후, 열기에 휩싸인 듯 정열적인 키스를 퍼붓는 후니와 듬뿍 꽁냥거림을 만끽했다."

[[dialogue]]
speaker = "unk"
original = "……興奮が引いてからのフニはまた恥じらいモードに入ってしまったが、そういうしおらしいところもフニの魅力だ。自覚はないだろうけれども。"
translation = "……흥분이 가라앉은 뒤의 후니는 다시 부끄럼 모드로 돌아가 버렸지만, 그런 조신한 점도 후니의 매력이다. 자각은 없겠지만."

