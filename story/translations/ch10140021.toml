[[dialogue]]
speaker = "unk"
original = "第１話,敵前逃亡,P"
translation = "제1화, 적전도망, P"

[[dialogue]]
speaker = "unk"
original = "恋人でもないのに、教え子の胸の中で泣きじゃくる失態を見せてから、早２週間。"
translation = "연인도 아닌데, 제자의 품 안에서 엉엉 울어버리는 실태를 보인 지 벌써 2주."

[[dialogue]]
speaker = "トワ先生"
original = "「はぅぅ～～、あの時の会長くん、かっこよかったなぁ……」"
translation = "「하우우~~, 그때의 회장군, 멋있었지……」"

[[dialogue]]
speaker = "unk"
original = "……そうしたら、先生は安心してくれますか？"
translation = "……그러면, 선생님은 안심해 줄까요?"

[[dialogue]]
speaker = "unk"
original = "リクリエは俺が止めます。"
translation = "리크리에는 제가 막겠습니다."

[[dialogue]]
speaker = "トワ先生"
original = "「って、ダメダメ！\u3000いつまで妄想に浸ってるんだ、わたし！」"
translation = "「아니, 안 돼 안 돼! 언제까지 망상에 빠져 있는 거야, 나!」"

[[dialogue]]
speaker = "トワ先生"
original = "「あの時は『会長くん、かっこいいな～。こんな人が彼氏だったら最高だなぁ～』とかイタい妄想しちゃったけど！」"
translation = "「그때는 『회장군, 멋있네~. 이런 사람이 남자친구라면 최고겠지~』라며 한심한 망상을 해버렸지만!」"

[[dialogue]]
speaker = "トワ先生"
original = "「そもそも会長くんは教え子！\u3000わたし教師！\u3000年下の男の子相手に『かっこいいなぁ～』じゃないよ、まったく！\u3000立場を弁えなさい！」"
translation = "「애초에 회장군은 제자! 나는 교사! 연하의 남자애 상대로 『멋있네~』가 아니라고, 정말! 입장을 생각해야지!」"

[[dialogue]]
speaker = "unk"
original = "あ、こんなところにいた、トワ先生！"
translation = "아, 이런 곳에 계셨네요, 토와 선생님!"

[[dialogue]]
speaker = "トワ先生"
original = "「って、ひゃいっ……！？」"
translation = "「아니, 히얏……!?」"

[[dialogue]]
speaker = "トワ先生"
original = "「か、会長くん！？\u3000ど、どうしたの？\u3000先生に何か用かな？」"
translation = "「회, 회장군!? 어, 어떻게 된 거야? 선생님한테 무슨 용건이라도 있니?」"

[[dialogue]]
speaker = "トワ先生"
original = "「え？\u3000この間から、ちょっと避けられてる気がする……？」"
translation = "「에? 요전부터 좀 피해 다니는 것 같은 기분이 든다고……?」"

[[dialogue]]
speaker = "unk"
original = "だから先生ともう１回、話がしたくて……"
translation = "그래서 선생님과 한 번 더 이야기를 하고 싶어서……"

[[dialogue]]
speaker = "unk"
original = "俺、何か変なこと言っちゃったかもしれない"
translation = "저, 뭔가 이상한 말을 해버렸을지도 몰라요"

[[dialogue]]
speaker = "トワ先生"
original = "「う、ううんっ！\u3000これはキミのせいじゃないの。全面的に先生が悪いっていうか、先生が不甲斐ないから……」"
translation = "「으, 으응! 이건 네 잘못이 아니야. 전적으로 선생님이 나쁘달까, 선생님이 한심해서……」"

[[dialogue]]
speaker = "トワ先生"
original = "「う、うん……。もちろん、ね？\u3000いい大人が泣いてる姿を見せちゃって、恥ずかしいっていうのはあるんだけど、嫌だったわけじゃないよっ」"
translation = "「으, 응……. 물론, 알지? 다 큰 어른이 우는 모습을 보여줘서 부끄럽다는 건 있지만, 싫었던 건 아니야」"

[[dialogue]]
speaker = "トワ先生"
original = "「むしろ、嫌じゃなかったことの方が問題……っていうかぁ……」"
translation = "「오히려, 싫지 않았던 게 문제……랄까아……」"

[[dialogue]]
speaker = "トワ先生"
original = "（あぁあああぁぁぁっ！\u3000どうしよう、どうしようっ！\u3000会長くんからしてみたら、こんなこと言われても意味不明だよね！？）"
translation = "（아아아아아앗! 어쩌지, 어쩌지! 회장군 입장에서 보면 이런 말을 들어도 의미불명이겠지!?）"

[[dialogue]]
speaker = "トワ先生"
original = "（先生としてちゃんとしなきゃいけないのに、会長くんと話してるって思うだけで、どんどん緊張してきちゃうし……）"
translation = "（선생님으로서 똑바로 해야 하는데, 회장군이랑 대화하고 있다는 생각만으로 점점 긴장돼서……）"

[[dialogue]]
speaker = "トワ先生"
original = "（顔もどんどん熱くなってきちゃうよぉぉぉ！？\u3000はぅぅ、わたし今、変な顔してない！？\u3000ブサイクになってないよね！？）"
translation = "（얼굴도 점점 뜨거워져 버려어어!? 하우우, 나 지금 이상한 표정 짓고 있지 않아!? 못생겨진 거 아니지!?）"

[[dialogue]]
speaker = "unk"
original = "俺、実は先生に言いたいことがあって……"
translation = "저, 사실 선생님께 드리고 싶은 말씀이 있어서……"

[[dialogue]]
speaker = "unk"
original = "それなら良かったです"
translation = "그렇다면 다행이에요"

[[dialogue]]
speaker = "トワ先生"
original = "「えっ？\u3000相談事……？\u3000会長くんがわたしに？」"
translation = "「엣? 상담할 일……? 회장군이 나한테?」"

[[dialogue]]
speaker = "トワ先生"
original = "「うんっ！\u3000もちろん聞くよ。なんでも話してほしいな！」"
translation = "「응! 물론 들어줄게. 뭐든지 말해줬으면 좋겠어!」"

[[dialogue]]
speaker = "トワ先生"
original = "「わたしのことは気にしないで！\u3000教え子から相談があるなんて聞いたら、下らない自分事でウジウジなんてしてられないもん！」"
translation = "「내 일은 신경 쓰지 마! 제자한테 상담이 있다는 말을 들으면, 하찮은 개인 사정으로 우물쭈물하고 있을 순 없으니까!」"

[[dialogue]]
speaker = "トワ先生"
original = "「うん？\u3000先生に聞いてもらいたい話だけど、相談事ではない……？\u3000それはつまり、どういう？」"
translation = "「응? 선생님이 들어줬으면 하는 이야기지만, 상담은 아니다……? 그건 즉, 무슨 뜻이니?」"

[[dialogue]]
speaker = "unk"
original = "もしよかったら、付き合ってもらえませんか"
translation = "혹시 괜찮으시다면, 사귀어 주시지 않겠습니까"

[[dialogue]]
speaker = "unk"
original = "俺、先生のことが好きだっ！"
translation = "저, 선생님이 좋아요!"

[[dialogue]]
speaker = "トワ先生"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker = "トワ先生"
original = "「それはつまり……会長くんも？\u3000先生のことを、好き……ってこと？」"
translation = "「그건 즉…… 회장군도? 선생님을 좋아한다……는 뜻이니?」"

[[dialogue]]
speaker = "unk"
original = "ふ、復唱されると恥ずかしいです……"
translation = "다, 다시 말씀하시니 부끄럽네요……"

[[dialogue]]
speaker = "トワ先生"
original = "「って、えぇええええぇぇぇぇええええぇぇぇぇ～～～～～～～～！？」"
translation = "「아니, 에에에에에에에에에에에에에에에에에에~~~~~~~~~~~~!?」"

[[dialogue]]
speaker = "トワ先生"
original = "「嬉しいけど！！\u3000それはちょっと、まずいんじゃないのかなぁぁぁぁぁ～～～～！？」"
translation = "「기쁘지만!! 그건 좀, 곤란한 거 아닐까아아아아아아~~~~~~~~!?」"

[[dialogue]]
speaker = "トワ先生"
original = "「いやいやいやいや！\u3000嬉しがっちゃダメでしょ、有明トワ！\u3000そこは教師として！\u3000先生として！？」"
translation = "「아니 아니 아니 아니! 기뻐하면 안 되잖아, 아리아케 토와! 거기는 교사로서! 선생님으로서!?」"

[[dialogue]]
speaker = "unk"
original = "えっと……それで、トワ先生？"
translation = "저기…… 그래서, 토와 선생님?"

[[dialogue]]
speaker = "トワ先生"
original = "「あっ………………うぅぅぅ～～～～」"
translation = "「앗……………… 우우우우~~~~」"

[[dialogue]]
speaker = "トワ先生"
original = "「ご、ごめんなさぁ～～～～いっ！！」"
translation = "「미, 미안해애~~~~~~~~!!」"

[[dialogue]]
speaker = "unk"
original = "あろうことかわたしは、告白してきてくれた会長くんにまともな返事もできず、その場から逃げ出してしまうのだった。"
translation = "아니나 다를까 나는 고백해온 회장군에게 제대로 된 대답도 못 하고, 그 자리에서 도망쳐 버리는 것이었다."

