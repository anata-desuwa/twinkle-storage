[[dialogue]]
speaker = "unk"
original = "第４話,甘々スパイラル,P"
translation = "제4화, 달콤한 나선, P"

[[dialogue]]
speaker = "unk"
original = "前回、ヒルディー先輩が『絆』について打ち明けて以来、俺たちの間には少し変化があった。"
translation = "지난번, 힐디 선배가 『인연』에 대해 털어놓은 이후, 우리 사이에는 약간의 변화가 있었다."

[[dialogue]]
speaker_original = "ヒルディオーネ（覚醒）"
speaker_translation = "힐디오네(각성)"
original = "「せっかく２人きりで過ごせる休日なのですから、今日もミーティアフォームでお互いの絆を深める訓練を致しますわよ♪」"
translation = "「모처럼 둘이서 보낼 수 있는 휴일이니까, 오늘도 미티어 폼으로 서로의 인연을 깊게 하는 훈련을 하겠습니다요♪」"

[[dialogue]]
speaker = "unk"
original = "絆の訓練という体裁で、先輩が以前より積極的に、<b>イチャイチャ</b>を提案して来るようになったのだ。"
translation = "인연 훈련이라는 명목으로, 선배가 이전보다 적극적으로, <ruby>애정 행각<rt>・・ ・・</rt></ruby>을 제안해 오게 된 것이다."

[[dialogue]]
speaker_original = "ヒルディオーネ（覚醒）"
speaker_translation = "힐디오네(각성)"
original = "「会長<emoji=heart04>\u3000私のこと……抱き締めて下さいまし<emoji=heart04>」"
translation = "「회장<emoji>heart04</emoji> 저를…… 안아주세요<emoji>heart04</emoji>」"

[[dialogue]]
speaker_original = "ヒルディオーネ（覚醒）"
speaker_translation = "힐디오네(각성)"
original = "「あっ<emoji=heart04>\u3000んっ……<emoji=heart04>」"
translation = "「앗<emoji>heart04</emoji> 읏……<emoji>heart04</emoji>」"

[[dialogue]]
speaker = "unk"
original = "俺は彼女の体をそっと抱き寄せる。"
translation = "나는 그녀의 몸을 살짝 끌어안는다."

[[dialogue]]
speaker_original = "ヒルディオーネ（覚醒）"
speaker_translation = "힐디오네(각성)"
original = "「はあぁ……<emoji=heart04>\u3000こうして会長に抱き締められると、どれだけ強くなっても自分が女であると自覚させられますわ……<emoji=heart04>」"
translation = "「하아아……<emoji>heart04</emoji> 이렇게 회장에게 안기면, 아무리 강해져도 자신이 여자라는 것을 자각하게 됩니다요……<emoji>heart04</emoji>」"

[[dialogue]]
speaker = "unk"
original = "先輩、抱き締められるの、好きですよね"
translation = "선배, 안기는 거 좋아하시죠"

[[dialogue]]
speaker_original = "ヒルディオーネ（覚醒）"
speaker_translation = "힐디오네(각성)"
original = "「ですわ<emoji=heart04>\u3000会長の細マッチョな筋肉の力強さを感じて、男らしさにトキめいて、ウットリしてしまいますの……<emoji=heart04>」"
translation = "「입니다요<emoji>heart04</emoji> 회장의 잔근육의 강인함을 느끼고, 남자다움에 설레고, 황홀해지고 맙니다요……<emoji>heart04</emoji>」"

[[dialogue]]
speaker = "unk"
original = "それからしばらく、抱き合ったままお互いの体の温もりを確かめ合った後、俺は彼女に言う。"
translation = "그 후 잠시, 서로 안은 채 몸의 온기를 확인한 후, 나는 그녀에게 말한다."

[[dialogue]]
speaker_original = "ヒルディオーネ（覚醒）"
speaker_translation = "힐디오네(각성)"
original = "「え？\u3000――私の『羽』を撫でてみたい……ですの？」"
translation = "「에? ――저의 『날개』를 쓰다듬어 보고 싶다……는 건가요?」"

[[dialogue]]
speaker_original = "ヒルディオーネ（覚醒）"
speaker_translation = "힐디오네(각성)"
original = "「恋人なのですし、構いませんけれど……撫でるのは別に初めてはありませんわよね？」"
translation = "「연인이니까, 상관없습니다만…… 쓰다듬는 건 딱히 처음은 아닙니다요?」"

[[dialogue]]
speaker = "unk"
original = "実は、ネットで調べて知ったんですけど――"
translation = "실은, 인터넷으로 찾아보고 알았는데요――"

[[dialogue]]
speaker_original = "ヒルディオーネ（覚醒）"
speaker_translation = "힐디오네(각성)"
original = "「――天使の羽は、気持ちを込めながら触れると、その人の感情が流れ込むらしい……？」"
translation = "「――천사의 날개는, 마음을 담아 만지면, 그 사람의 감정이 흘러들어오는 것 같다……?」"

[[dialogue]]
speaker_original = "ヒルディオーネ（覚醒）"
speaker_translation = "힐디오네(각성)"
original = "「えっ、そんなことができますの！？\u3000初めて知りましたけれど……どんな感じか、ちょっと興味が湧いてきますわ」"
translation = "「엣, 그런 것도 할 수 있나요!? 처음 알았습니다만…… 어떤 느낌일지, 조금 흥미가 생깁니다요」"

[[dialogue]]
speaker = "unk"
original = "俺は彼女の羽に触れて、そっと撫でる。すると――"
translation = "나는 그녀의 날개에 손을 대고, 살짝 쓰다듬는다. 그러자――"

[[dialogue]]
speaker_original = "ヒルディオーネ（覚醒）"
speaker_translation = "힐디오네(각성)"
original = "「ふあっ……！？\u3000ほ、本当ですわ<emoji=heart04>\u3000なんだか触れてる感覚だけじゃなくて……んんっ<emoji=heart04>」"
translation = "「후앗……!? 호, 정말입니다요<emoji>heart04</emoji> 뭔가 만지는 감각뿐만이 아니라…… 응읏<emoji>heart04</emoji>」"

[[dialogue]]
speaker_original = "ヒルディオーネ（覚醒）"
speaker_translation = "힐디오네(각성)"
original = "「不思議と、会長が考えていることが伝わってくる感じがしますの<emoji=heart04>\u3000耳元よりももっと近くで愛を囁かれているような……<emoji=heart04>」"
translation = "「신기하게도, 회장이 생각하고 있는 것이 전해져 오는 느낌이 듭니다요<emoji>heart04</emoji> 귓가보다도 훨씬 가까이에서 사랑을 속삭이는 듯한……<emoji>heart04</emoji>」"

[[dialogue]]
speaker = "unk"
original = "伝わりますか？"
translation = "전해지나요?"

[[dialogue]]
speaker = "unk"
original = "俺がどれくらい先輩のことが好きなのか"
translation = "내가 얼마나 선배를 좋아하는지"

[[dialogue]]
speaker_original = "ヒルディオーネ（覚醒）"
speaker_translation = "힐디오네(각성)"
original = "「え、ええ<emoji=heart04>\u3000まるで心が優しく抱き締められているみたいで……はあぁっ<emoji=heart04>\u3000とっても幸せな気持ちになってしまいますの……<emoji=heart04>」"
translation = "「네, 네에<emoji>heart04</emoji> 마치 마음이 부드럽게 안기는 것 같아서…… 하아앗<emoji>heart04</emoji> 너무나도 행복한 기분이 되고 맙니다요……<emoji>heart04</emoji>」"

[[dialogue]]
speaker_original = "ヒルディオーネ（覚醒）"
speaker_translation = "힐디오네(각성)"
original = "「――あっ<emoji=heart04>\u3000会長、羽を撫でながら耳元で名前を呼ぶのは反則ですわ<emoji=heart04>\u3000しゅ、淑女としての理性が甘くとろけてしまいそうですの……<emoji=heart04>」"
translation = "「――앗<emoji>heart04</emoji> 회장, 날개를 쓰다듬으면서 귓가에 이름을 부르는 건 반칙입니다요<emoji>heart04</emoji> 수, 숙녀로서의 이성이 달콤하게 녹아버릴 것 같습니다요……<emoji>heart04</emoji>」"

[[dialogue]]
speaker = "unk"
original = "ヒルディーも、『旦那様』って呼んで欲しいな"
translation = "힐디도, 『남편님』이라고 불러줬으면 좋겠어"

[[dialogue]]
speaker = "unk"
original = "これまでも今のようにすごく甘いムードになった時は、そう呼び合ってイチャイチャすることがあった。"
translation = "지금까지도 지금처럼 아주 달콤한 분위기가 되었을 때는, 그렇게 서로 부르며 애정 행각을 벌이곤 했다."

[[dialogue]]
speaker_original = "ヒルディオーネ（覚醒）"
speaker_translation = "힐디오네(각성)"
original = "「ん……わかりましたわ<emoji=heart04>\u3000――旦那様<emoji=heart04>」"
translation = "「응…… 알겠습니다요<emoji>heart04</emoji> ――남편님<emoji>heart04</emoji>」"

[[dialogue]]
speaker = "unk"
original = "それから俺はソファーに座り、彼女を後ろから抱き締めるような形で、イチャイチャしながら過ごす。"
translation = "그리고 나서 나는 소파에 앉아, 그녀를 뒤에서 안아주는 형태로, 애정 행각을 벌이며 시간을 보낸다."

[[dialogue]]
speaker_original = "ヒルディオーネ（覚醒）"
speaker_translation = "힐디오네(각성)"
original = "「あっ、思いつきましたわ<emoji=heart04>\u3000見て下さいまし、旦那様の親指と人差し指で、こうして輪っかを作って……」"
translation = "「앗, 생각났습니다요<emoji>heart04</emoji> 봐주세요, 남편님의 엄지손가락과 검지손가락으로, 이렇게 고리를 만들어서……」"

[[dialogue]]
speaker_original = "ヒルディオーネ（覚醒）"
speaker_translation = "힐디오네(각성)"
original = "「そこに私の薬指を通すと……ほら♪\u3000結婚指輪みたいですわ<emoji=heart04>\u3000ふふっ……<emoji=heart04>」"
translation = "「거기에 저의 약지손가락을 끼우면…… 짜잔♪ 결혼반지 같습니다요<emoji>heart04</emoji> 후훗……<emoji>heart04</emoji>」"

[[dialogue]]
speaker = "unk"
original = "ならばと、俺は彼女のよく手入れされた綺麗な縦ロールの髪先を、自分の左手薬指に軽く巻いてみせる。"
translation = "그렇다면 하고, 나는 그녀의 잘 관리된 예쁜 세로 말음 머리끝을, 자신의 왼손 약지손가락에 가볍게 감아 보인다."

[[dialogue]]
speaker = "unk"
original = "これでお揃いだね"
translation = "이걸로 커플이네"

[[dialogue]]
speaker_original = "ヒルディオーネ（覚醒）"
speaker_translation = "힐디오네(각성)"
original = "「……！\u3000そんなお返しをされたら……私、愛おしい気持ちが溢れてきて、我慢できなくなってしまいますわ<emoji=heart04>」"
translation = "「……! 그런 답례를 받으면…… 저, 사랑스러운 마음이 넘쳐흘러서, 참을 수 없게 됩니다요<emoji>heart04</emoji>」"

[[dialogue]]
speaker_original = "ヒルディオーネ（覚醒）"
speaker_translation = "힐디오네(각성)"
original = "「旦那様とキス……したくなってしまいますの<emoji=heart04>」"
translation = "「남편님과 키스…… 하고 싶어지고 맙니다요<emoji>heart04</emoji>」"

[[dialogue]]
speaker_original = "ヒルディオーネ（覚醒）"
speaker_translation = "힐디오네(각성)"
original = "「ん……<emoji=heart04>」"
translation = "「응……<emoji>heart04</emoji>」"

[[dialogue]]
speaker_original = "ヒルディオーネ（覚醒）"
speaker_translation = "힐디오네(각성)"
original = "「旦那様……<emoji=heart04>\u3000ちゅっ……<emoji=heart04>」"
translation = "「남편님……<emoji>heart04</emoji> 츄읏……<emoji>heart04</emoji>」"

[[dialogue]]
speaker = "unk"
original = "ヒルディー、好きだよ"
translation = "힐디, 좋아해"

[[dialogue]]
speaker_original = "ヒルディオーネ（覚醒）"
speaker_translation = "힐디오네(각성)"
original = "「私もですわ、旦那様<emoji=heart04>\u3000んむっ……<emoji=heart04>\u3000ちゅっ……<emoji=heart04>」"
translation = "「저도입니다요, 남편님<emoji>heart04</emoji> 음믓……<emoji>heart04</emoji> 츄읏……<emoji>heart04</emoji>」"

[[dialogue]]
speaker_original = "ヒルディオーネ（覚醒）"
speaker_translation = "힐디오네(각성)"
original = "「心からお慕いしておりますの<emoji=heart04>\u3000誰よりも愛しておりますわ……<emoji=heart04>」"
translation = "「진심으로 사모하고 있습니다요<emoji>heart04</emoji> 누구보다도 사랑하고 있습니다요……<emoji>heart04</emoji>」"

[[dialogue]]
speaker_original = "ヒルディオーネ（覚醒）"
speaker_translation = "힐디오네(각성)"
original = "「これからもどうか……私と一緒に居て下さいましね<emoji=heart04>」"
translation = "「앞으로도 부디…… 저와 함께 있어 주세요<emoji>heart04</emoji>」"

[[dialogue]]
speaker = "unk"
original = "ああ、ずっとそばにいるよ"
translation = "아아, 계속 곁에 있을게"

[[dialogue]]
speaker_original = "ヒルディオーネ（覚醒）"
speaker_translation = "힐디오네(각성)"
original = "「約束ですわよ？\u3000んっ……<emoji=heart04>」"
translation = "「약속입니다요? 응읏……<emoji>heart04</emoji>」"

[[dialogue]]
speaker_original = "ヒルディオーネ（覚醒）"
speaker_translation = "힐디오네(각성)"
original = "「ちゅっ……<emoji=heart04>」"
translation = "「츄읏……<emoji>heart04</emoji>」"

[[dialogue]]
speaker = "unk"
original = "俺たちはそれからも、天使の羽やキスを通して、繰り返し気持ちを伝え合うのだった――"
translation = "우리는 그 후로도, 천사의 날개나 키스를 통해, 반복해서 마음을 전하는 것이었다――"

