[[dialogue]]
speaker = "unk"
original = "第１話,ケンカするほどなんとやら,P"
translation = "제1화, 싸우면서 정든다더니, P"

[[dialogue]]
speaker = "イレーナ"
original = "「あちゃー……。また焦げちゃったわ。どうしてこうなっちゃうのかしら」"
translation = "「아차……. 또 타버렸네. 어째서 이렇게 되는 걸까」"

[[dialogue]]
speaker = "シャロン"
original = "「ですがだんだんといい焼き色になっておりますよ。この調子で参りましょう！」"
translation = "「하지만 점점 좋은 색으로 구워지고 있어요. 이 기세로 계속 가요!」"

[[dialogue]]
speaker = "unk"
original = "クリスマス会は終わったんじゃ？"
translation = "크리스마스 파티는 끝난 거 아냐?"

[[dialogue]]
speaker = "イレーナ"
original = "「ひゃっ、ご機嫌よう──って、エロ会長じゃない。驚かせないでよ」"
translation = "「히익, 안녕── 이 아니라 변태 회장이잖아. 놀라게 하지 마」"

[[dialogue]]
speaker = "シャロン"
original = "「明日また別のクリスマス会が他の教会で開かれるんです。そこで出すケーキやお菓子を私どもで用意しようとイレーナさまと計画しておりまして」"
translation = "「내일 또 다른 크리스마스 파티가 다른 교회에서 열려요. 거기서 낼 케이크나 과자를 저희가 준비하려고 이레나 님과 계획하고 있었거든요」"

[[dialogue]]
speaker = "イレーナ"
original = "「さもあたしも乗り気で参加してるみたいに言わないでよ。あたしはシャロンに無理やり付き合わされてるだけなんだから」"
translation = "「마치 나도 의욕적으로 참여하는 것처럼 말하지 마. 난 샤론에게 억지로 끌려온 것뿐이니까」"

[[dialogue]]
speaker = "シャロン"
original = "「そうなのですか？\u3000お話をした際は乗り気だったような。仕方ないわねーと仰ってましたし」"
translation = "「그랬나요? 이야기했을 때는 의욕이 넘치셨던 것 같은데. 어쩔 수 없네~ 라고 말씀하셨고요」"

[[dialogue]]
speaker = "イレーナ"
original = "「それのどこが乗り気なのよ」"
translation = "「그게 어디가 의욕적인 거야」"

[[dialogue]]
speaker = "シャロン"
original = "「イレーナさまの場合は乗り気の時のお答えでは？」"
translation = "「이레나 님의 경우에는 의욕이 있을 때의 대답 아닌가요?」"

[[dialogue]]
speaker = "unk"
original = "だいだい合ってる"
translation = "대체로 맞아"

[[dialogue]]
speaker = "イレーナ"
original = "「んな──！？\u3000違うわよ、神官の仕事を合法的にサボる言い訳になるからよっ。シスターとクリスマス会に備えて準備をしているってことなら誰も文句言えないからっ」"
translation = "「뭐──!? 아니야, 신관 업무를 합법적으로 땡땡이칠 핑계가 되니까 그런 거야! 시스터와 크리스마스 파티를 준비하고 있다고 하면 아무도 뭐라 못 하니까!」"

[[dialogue]]
speaker = "シャロン"
original = "「そうだったのですか……。てっきり、私の前であれば無理に聖女を演じる必要もないからなのかと思って。そんな信頼と友情の深まりを喜んでおりましたのに……」"
translation = "「그랬던 건가요……. 전 당연히 제 앞이라면 억지로 성녀를 연기할 필요가 없어서 그런 줄 알고, 그런 신뢰와 우정의 깊어짐을 기뻐하고 있었는데……」"

[[dialogue]]
speaker = "イレーナ"
original = "「んぬぬぬ……何よ、しおらしい顔しちゃって。これで否定したらあたしが悪者みたいじゃない。好きに取りなさいよ」"
translation = "「으으으으…… 뭐야, 가련한 척하는 얼굴이나 하고. 여기서 부정하면 내가 나쁜 사람 같잖아. 마음대로 생각하라고」"

[[dialogue]]
speaker = "シャロン"
original = "「では好きに解釈させていただきます。ふふふ」"
translation = "「그럼 마음대로 해석하겠습니다. 후후후」"

[[dialogue]]
speaker = "unk"
original = "ほんとイレーナは素直じゃない……"
translation = "정말 이레나는 솔직하지 못하다니까……"

[[dialogue]]
speaker = "イレーナ"
original = "「う、うっさいわね。わかったような顔して眺めてんじゃないわよ！\u3000あんたはクッキーの味見でもしてなさい！」"
translation = "「시, 시끄러워. 다 안다는 표정으로 쳐다보지 마! 당신은 쿠키 맛이나 보고 있어!」"

[[dialogue]]
speaker = "シャロン"
original = "「それなら私の作ったクッキーも是非お願いいたします！\u3000たっぷりと愛を込めて作りましたから！」"
translation = "「그렇다면 제가 만든 쿠키도 부디 부탁드립니다! 사랑을 듬뿍 담아 만들었으니까요!」"

[[dialogue]]
speaker = "unk"
original = "しょっぱっ！？"
translation = "짜앗!?"

[[dialogue]]
speaker = "unk"
original = "めちゃ甘っ！？"
translation = "엄청 달아!?"

[[dialogue]]
speaker = "イレーナ"
original = "「む、人が丹精込めて作ったお菓子だってのにご挨拶ね」"
translation = "「무, 사람이 정성껏 만든 과자인데 반응이 그게 뭐야」"

[[dialogue]]
speaker = "シャロン"
original = "「ですからお塩を利かせすぎとご忠告したではありませんか」"
translation = "「그러니까 소금을 너무 많이 넣으셨다고 충고드리지 않았습니까」"

[[dialogue]]
speaker = "イレーナ"
original = "「それを言うならあんたも砂糖の量が多すぎるでしょ。『愛を込めてるんです』の一点張りでドバドバ投入しちゃってさ」"
translation = "「그걸 따지자면 너도 설탕 양이 너무 많잖아. 『사랑을 담고 있어요』라는 말만 하면서 팍팍 쏟아부어 버리고 말이야」"

[[dialogue]]
speaker = "シャロン"
original = "「元よりお菓子作りは砂糖を使うものなのです。クリスマスですから一層甘くしてみました！」"
translation = "「원래 과자 만들기는 설탕을 쓰는 법이에요. 크리스마스니까 한층 더 달게 해봤습니다!」"

[[dialogue]]
speaker = "イレーナ"
original = "「こんなの食べさせたら虫歯になっちゃうでしょ。今の流行りは塩バタークッキーよ！」"
translation = "「이런 걸 먹이면 충치 생기잖아. 요즘 유행은 소금 버터 쿠키라고!」"

[[dialogue]]
speaker = "シャロン"
original = "「いいえ、子どもはやはり甘いものが好きなもの。私のホワイトチョコクッキーの方が好まれるに決まっています」"
translation = "「아니요, 아이들은 역시 단것을 좋아하는 법. 제 화이트 초코 쿠키가 더 인기가 많을 게 뻔해요」"

[[dialogue]]
speaker = "イレーナ"
original = "「は～？\u3000大体あんたは生地ひとつ作るのに時間をかけすぎなのよ。何時間もコネコネ、コネコネ──出来上がる前にクリスマス会が終わっちゃうじゃない」"
translation = "「하아~? 애초에 넌 반죽 하나 만드는 데 시간을 너무 많이 써. 몇 시간이나 조물조물, 조물조물── 완성되기도 전에 크리스마스 파티가 끝나버리겠어」"

[[dialogue]]
speaker = "シャロン"
original = "「だとしてもイレーナさまは乱雑すぎますよ。計量は正確でなければなりません。そこに愛は在るのですかっ？」"
translation = "「그렇다 해도 이레나 님은 너무 난잡해요. 계량은 정확해야 합니다. 거기에 사랑은 있나요?」"

[[dialogue]]
speaker = "イレーナ"
original = "「食えりゃいいのよ、食えりゃっ。イチイチ愛を感じながらお菓子を食う子どもなんていやしないんだから──」"
translation = "「먹을 수만 있으면 돼, 먹을 수만 있으면! 일일이 사랑을 느끼면서 과자를 먹는 아이 같은 건 없으니까──」"

[[dialogue]]
speaker = "イレーナ"
original = "「って……あんたは何にやついてるのよ？\u3000気色悪いわね……」"
translation = "「근데…… 당신은 왜 실실 웃고 있는 거야? 기분 나쁘게……」"

[[dialogue]]
speaker = "unk"
original = "イレーナが楽しそうにしてるなと思って"
translation = "이레나가 즐거워 보여서"

[[dialogue]]
speaker = "イレーナ"
original = "「なっ。どこをどう見ればそうなるのよっ。絶賛ケンカ中だってばっ」"
translation = "「뭐. 어딜 봐서 그렇게 되는 거야! 절찬리에 싸우는 중이라니까!」"

[[dialogue]]
speaker = "シャロン"
original = "「ふふ、私はなんだかんだ楽しいですよ。以前はこのようにイレーナさまと言い争うこともありませんでしたし」"
translation = "「후후, 저는 나름대로 즐거워요. 이전에는 이렇게 이레나 님과 말다툼을 하는 일도 없었으니까요」"

[[dialogue]]
speaker = "シャロン"
original = "「イレーナさまが本音でぶつかってきてくださっているとわかって嬉しいくらいです！\u3000これもまた友情の形ですよね！\u3000ケンカするほどなんとやら！」"
translation = "「이레나 님이 본심으로 부딪쳐 오고 계신다는 걸 알게 되어 기쁠 정도예요! 이것도 또한 우정의 형태겠죠! 싸우면서 정든다더니!」"

[[dialogue]]
speaker = "イレーナ"
original = "「～～っっ！\u3000だからあんたは照れもせずによくそんな恥ずかしいことを……！\u3000あたしは普通に接してるだけよ、普通に！」"
translation = "「~~~~!! 그러니까 넌 부끄러워하지도 않고 잘도 그런 창피한 소리를……! 난 평범하게 대하고 있을 뿐이야, 평범하게!」"

[[dialogue]]
speaker = "シャロン"
original = "「その『普通』を私に見せてくださることが嬉しいのではありませんかっ！」"
translation = "「그 『평범함』을 저에게 보여주시는 것이 기쁜 것 아니겠습니까!」"

[[dialogue]]
speaker = "シャロン"
original = "「そうだ、よいことを思いつきました！\u3000今まで各々でお菓子を作っていましたが今度は２人で一緒に作ってみませんかっ？」"
translation = "「맞다, 좋은 생각이 났어요! 지금까지 각자 과자를 만들었지만 이번에는 둘이서 같이 만들어보지 않을래요?」"

[[dialogue]]
speaker = "イレーナ"
original = "「２人で？\u3000まぁ計量とかめんどくさい部分はあんたにやってもらえれば助かるけど……」"
translation = "「둘이서? 뭐 계량 같은 귀찮은 부분은 네가 해준다면 도움이 되겠지만……」"

[[dialogue]]
speaker = "シャロン"
original = "「私たちの友情を以てすれば必ずや美味しいお菓子ができあがりますよ！\u3000私、追加の材料を持ってきますねっ！」"
translation = "「우리의 우정만 있다면 반드시 맛있는 과자가 완성될 거예요! 저, 재료를 더 가져올게요!」"

[[dialogue]]
speaker = "イレーナ"
original = "「あっ、ちょっ──……まったくもう。ウザったいくらい友情友情、連呼しちゃって……。あたしなんか別に進んで友達になりたいようなやつじゃないでしょうに」"
translation = "「앗, 잠깐──…… 정말이지. 지겨울 정도로 우정 우정, 연발하고는……. 나 같은 거랑 딱히 친구가 되고 싶어 할 녀석도 아닐 텐데」"

[[dialogue]]
speaker = "unk"
original = "気にしすぎだよ"
translation = "너무 신경 쓰는 거야"

[[dialogue]]
speaker = "イレーナ"
original = "「そう……かもしれないわね」"
translation = "「그럴……지도 모르겠네」"

[[dialogue]]
speaker = "イレーナ"
original = "「あの子を見てるとね？\u3000もうちょっとあたしも素を出してもいいのかなって思わなくはないの。意外とその、受け入れてもらえるのかなって……」"
translation = "「저 아이를 보고 있으면 말이야? 나도 조금은 본모습을 드러내도 괜찮지 않을까 하는 생각이 들기도 해. 의외로 그, 받아들여질 수 있을까 하고……」"

[[dialogue]]
speaker = "イレーナ"
original = "「あたしが思っているよりこの世界は愛で満ちてるのかなって。ただあたしが怖がりすぎてるだけなのかなって。そう思ったりもして──」"
translation = "「내가 생각하는 것보다 이 세계는 사랑으로 가득 차 있는 걸까 하고. 단지 내가 너무 겁을 내고 있는 것뿐일까 하고. 그렇게 생각하기도 해서──」"

[[dialogue]]
speaker = "シャロン"
original = "「その通りですよ！！」"
translation = "「그 말대로예요!!」"

[[dialogue]]
speaker = "イレーナ"
original = "「ひゃっ！？\u3000あ、あんた、もう戻ってきて──」"
translation = "「히익!? 너, 벌써 돌아와──」"

[[dialogue]]
speaker = "シャロン"
original = "「その通りですよ、イレーナさま！\u3000ああ、ようやく私の愛が届いてくださいましたかっ！」"
translation = "「그 말대로예요, 이레나 님! 아아, 드디어 제 사랑이 닿은 건가요!」"

[[dialogue]]
speaker = "シャロン"
original = "「ならば恐れずに本来のイレーナさまを出していきましょう！\u3000私もお手伝いしますよ！\u3000イレーナさまの無二の親友として！」"
translation = "「그렇다면 두려워하지 말고 본래의 이레나 님을 드러내 가요! 저도 도와드릴게요! 이레나 님의 둘도 없는 절친으로서!」"

[[dialogue]]
speaker = "イレーナ"
original = "「あ～もう、うざいっ！\u3000暑苦しいっ！\u3000あんたみたいなのが増えるってんなら、逆に素を出したくなくなってくるっての！」"
translation = "「아~ 정말, 짜증 나! 부담스러워! 너 같은 게 늘어난다면 오히려 본모습을 보이기 싫어진다니까!」"

[[dialogue]]
speaker = "シャロン"
original = "「そんなぁ～！？\u3000一体私の何がいけないと仰るのですか～！」"
translation = "「너무해요~!? 도대체 제 어디가 문제라는 건가요~!」"

