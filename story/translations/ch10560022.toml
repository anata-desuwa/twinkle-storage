[[dialogue]]
speaker = "unk"
original = "第２話,アムと仲良し海デート,P"
translation = "제2화, 아무와 다정한 바다 데이트, P"

[[dialogue]]
speaker = "unk"
original = "俺はアムを誘って、リップルのリゾート結界までやってきていた。"
translation = "나는 아무를 데리고, 리플의 리조트 결계까지 왔다."

[[dialogue]]
speaker = "unk"
original = "今日は学園生以外の人達も入場できる一般開放日だ。やっぱりアムと遊ぶなら、周りも賑やかな方がテンションが上がるというもの。"
translation = "오늘은 학원생 이외의 사람들도 입장할 수 있는 일반 개방일이다. 역시 아무와 놀려면, 주변도 북적거리는 편이 기운이 나는 법."

[[dialogue]]
speaker = "アム"
original = "「海だーっ！\u3000よぉし、今日は遊ぶぞ～っ！」"
translation = "「바다다─! 좋아, 오늘은 노는 거야~!」"

[[dialogue]]
speaker = "アム"
original = "「最近、出動ばっかりだったもんね。会長と久しぶりのデートだし、思いっきり楽しんでこ！」"
translation = "「최근, 출동뿐이었으니까. 회장이랑 오랜만의 데이트고, 마음껏 즐기자고!」"

[[dialogue]]
speaker = "アム"
original = "「──って、どうかしたの会長。さっきから黙って、じーっとあたしのこと見てるけど……」"
translation = "「──라니, 왜 그래 회장. 아까부터 말없이, 빤히 나를 보고 있는데……」"

[[dialogue]]
speaker = "unk"
original = "ついつい見惚れちゃった"
translation = "나도 모르게 넋을 잃고 봤어."

[[dialogue]]
speaker = "unk"
original = "恋人のアムの水着姿だから"
translation = "연인인 아무의 수영복 차림이니까."

[[dialogue]]
speaker = "アム"
original = "「っ<emoji=heart04>\u3000そ、そーゆうこと、ストレートに言われるとあたしも照れるんだけど……！」"
translation = "「윽<emoji=heart04> 그, 그런 거, 스트레이트로 들으면 나도 부끄럽다고……!」"

[[dialogue]]
speaker = "アム"
original = "「えへ、でもありがと！\u3000カッコいいって言われるのもいいけど、恋人の会長から『可愛い』って言われるのも嬉しい！」"
translation = "「에헤, 그래도 고마워! 멋지다는 말을 듣는 것도 좋지만, 연인인 회장한테 『귀엽다』는 말을 듣는 것도 기뻐!」"

[[dialogue]]
speaker = "アム"
original = "「それじゃーさっそくだけど、遠泳で勝負しない？\u3000あっちの島まで先についた方が勝ち！」"
translation = "「그럼 바로인데, 원영으로 승부하지 않을래? 저쪽 섬까지 먼저 도착하는 쪽이 승리!」"

[[dialogue]]
speaker = "アム"
original = "「負けた方はー……お昼ご飯をご馳走するってのはどう？\u3000あたし、泳ぎには自信があるから勝っちゃうと思うけどね！」"
translation = "「진 쪽은─…… 점심밥을 대접하는 건 어때? 나, 수영에는 자신 있으니까 이겨버릴 것 같지만 말이야!」"

[[dialogue]]
speaker = "unk"
original = "俺だって元ライフセーバーだ！"
translation = "나도 전직 라이프세이버라고!"

[[dialogue]]
speaker = "アム"
original = "「会長って本当にいろんなアルバイトやってるよね……なんだか強敵の予感！\u3000いいね、燃えてきた！\u3000よーし……勝負スタート！」"
translation = "「회장은 정말 여러 가지 아르바이트를 하는구나…… 왠지 강적의 예감! 좋아, 불타오르네! 좋아…… 승부 시작!」"

[[dialogue]]
speaker = "unk"
original = "アムは元気いっぱいな見た目どおり、運動神経も抜群だ。けれど俺も泳ぎには自信がある。"
translation = "아무는 활기찬 외모대로, 운동신경도 발군이다. 하지만 나도 수영에는 자신 있다."

[[dialogue]]
speaker = "unk"
original = "彼氏として良いところを見せたい、そんな思いで必死に泳いで──"
translation = "남자친구로서 좋은 모습을 보여주고 싶다, 그런 생각으로 필사적으로 헤엄쳐서──"

[[dialogue]]
speaker = "アム"
original = "「ふっふーん♪\u3000焼きそば、ごちそうさま～♪」"
translation = "「후후─ㄴ♪ 야키소바, 잘 먹을게~♪」"

[[dialogue]]
speaker = "unk"
original = "アム、泳ぐの速すぎない！？"
translation = "아무, 수영 너무 빠르지 않아!?"

[[dialogue]]
speaker = "アム"
original = "「だから言ったじゃん、泳ぎは自信あるって。いやー、やっぱり勝負に勝つのって気持ちいいな～♪」"
translation = "「그러니까 말했잖아, 수영은 자신 있다고. 이야~ 역시 승부에서 이기는 건 기분 좋네~♪」"

[[dialogue]]
speaker = "アム"
original = "「にひ、でも会長もなかなかだったよ？\u3000男の子だから体力もあるし、もうちょっと長い距離だったら負けてたんじゃないかなー、あたし」"
translation = "「니히, 그래도 회장도 꽤 했어? 남자애라 체력도 있고, 조금만 더 긴 거리였다면 내가 졌을지도 모르겠네」"

[[dialogue]]
speaker = "unk"
original = "またリベンジしてもいい？"
translation = "다시 리벤지해도 돼?"

[[dialogue]]
speaker = "アム"
original = "「もっちろん！\u3000勝者はいつだって挑戦を受けなきゃね！」"
translation = "「무우울론이지! 승자는 언제나 도전을 받아야 하는 법이니까!」"

[[dialogue]]
speaker = "アム"
original = "「ふふ～、でも本当に楽しいなあ。男の子と付き合うなら、今みたいな関係がいいな～って思ってたんだ～」"
translation = "「후후~ 하지만 정말 즐겁다. 남자애랑 사귄다면, 지금 같은 관계가 좋겠다고 생각했었거든~」"

[[dialogue]]
speaker = "アム"
original = "「競い合ったり、勝負したりできるのって仲良し同士の特権じゃん？」"
translation = "「서로 경쟁하거나, 승부하거나 할 수 있는 건 친한 사이끼리의 특권이잖아?」"

[[dialogue]]
speaker = "アム"
original = "「仲が悪かったら、勝ち負けを決めてもギスギスするだけだし。『バトルできるのは仲良しの証拠よ！』ってヴィーナス前会長も言ってたもん」"
translation = "「사이가 나빴으면, 승패를 정해도 험악해질 뿐이고. 『배틀할 수 있는 건 친하다는 증거야!』라고 비너스 전 회장님도 말했었고.」"

[[dialogue]]
speaker = "アム"
original = "「ま、まあそのせいで友達から『本当に会長と付き合ってるの？』って聞かれることも多いんだけど……」"
translation = "「뭐, 뭐어 그 탓에 친구들한테 『정말 회장이랑 사귀는 거야?』라는 질문을 받는 일도 많지만……」"

[[dialogue]]
speaker = "アム"
original = "「ほら、あたしたちってあんまり人前でいちゃいちゃとかしないじゃん？」"
translation = "「보라고, 우리 별로 사람들 앞에서 꽁냥거리거나 하지 않잖아?」"

[[dialogue]]
speaker = "unk"
original = "カッコ悪いから、って言ってたよね"
translation = "멋없으니까, 라고 말했었지."

[[dialogue]]
speaker = "unk"
original = "そういうのを誰かに見られるのは"
translation = "그런 걸 누군가에게 보여지는 건."

[[dialogue]]
speaker = "アム"
original = "「そう！\u3000あたしの目標は『常に凛々しく、カッコいい星騎士になること』だからね！」"
translation = "「응! 내 목표는 『항상 늠름하고, 멋진 성기사가 되는 것』이니까!」"

[[dialogue]]
speaker = "アム"
original = "「今も浜辺で腕を組んだり、キスしたりしてるカップルもたくさんいるけど……ああいうのはちょっとね～……」"
translation = "「지금도 해변에서 팔짱을 끼거나, 키스하거나 하는 커플도 많지만…… 저런 건 좀 그렇지~……」"

[[dialogue]]
speaker = "アム"
original = "「はー、美味しかった♪\u3000ねぇ、この後なんだけど、あたしの<ruby>ホバークラフト<rt>盾</rt></ruby>に乗って沖まで出てみない？」"
translation = "「하아- 맛있었다♪ 있지, 이 다음 말인데, 내 호버크래프트<rt>방패</rt></ruby>에 타고 바다 멀리까지 나가보지 않을래?」"

[[dialogue]]
speaker = "アム"
original = "「マムとの訓練中はあんまり乗せてあげられなかったでしょ。かなりスピード出るから楽しいと思うよ！」"
translation = "「맘이랑 훈련 중에는 별로 태워주지 못했잖아. 꽤 속도 나니까 재미있을 거야!」"

[[dialogue]]
speaker = "アム"
original = "「……ＯＫ？\u3000よーしっ、それじゃあ、行こ行こ、会長っ！」"
translation = "「……OK? 좋아, 그럼 가자 가자, 회장!」"

[[dialogue]]
speaker = "unk"
original = "そうしてアムの操縦するホバークラフトで、浜辺からずっと離れた沖のところまでやってきた。"
translation = "그렇게 아무가 조종하는 호버크래프트로, 해변에서 멀리 떨어진 앞바다까지 왔다."

[[dialogue]]
speaker = "unk"
original = "２人で寝転んで空を見上げながら、まったり食休み。"
translation = "둘이서 누워 하늘을 올려다보며, 느긋하게 식후 휴식."

[[dialogue]]
speaker = "アム"
original = "「んー……絶好の海水浴日和って感じだねー……波の音も、潮風も気持ちいい～♪」"
translation = "「음-…… 절호의 해수욕 날씨라는 느낌이네-…… 파도 소리도, 바닷바람도 기분 좋아~♪」"

[[dialogue]]
speaker = "unk"
original = "静かでいい気分だ"
translation = "조용해서 기분 좋네."

[[dialogue]]
speaker = "アム"
original = "「ね～、浜辺は賑やかだったけど、ちょっと離れれば何だか２人きりの世界って感じだし……」"
translation = "「그치~ 해변은 시끌벅적했지만, 조금 떨어지니 왠지 둘만의 세계라는 느낌이고……」"

[[dialogue]]
speaker = "アム"
original = "「それにここなら誰も見てないから……よいしょっ──と♪」"
translation = "「게다가 여기라면 아무도 안 보니까…… 영차──하고♪」"

[[dialogue]]
speaker = "アム"
original = "「──ばあっ♪」"
translation = "「──바앗♪」"

[[dialogue]]
speaker = "アム"
original = "「ふふっ<emoji=heart04>\u3000会長、驚いた～？\u3000あんまり動いたら、盾から落ちちゃうよー？」"
translation = "「후훗<emoji=heart04> 회장, 놀랐어~? 너무 움직이면, 방패에서 떨어져 버린다고?」"

[[dialogue]]
speaker = "アム"
original = "「何で覆いかぶさってきたのかって……そ、そりゃあ、そのー……<emoji=heart04>」"
translation = "「왜 덮쳐왔냐니…… 그, 그건, 그-……<emoji=heart04>」"

[[dialogue]]
speaker = "アム"
original = "「んー……ちゅっ<emoji=heart04>」"
translation = "「음-…… 쪽<emoji=heart04>」"

[[dialogue]]
speaker = "アム"
original = "「へへー、今日の初チューゲット♪\u3000不意打ち成功っ」"
translation = "「헤헤- 오늘의 첫 키스 겟♪ 기습 성공!」"

[[dialogue]]
speaker = "アム"
original = "「久しぶりのデートだし、勝負ばっかりだと、会長もがっかりしちゃうかなって思って……」"
translation = "「오랜만의 데이트고, 승부만 하면 회장도 실망해버릴까 싶어서……」"

[[dialogue]]
speaker = "アム"
original = "「ねぇ会長？\u3000あたし、いちゃいちゃするのはカッコ悪いから嫌だって言ったけどさ。あれ、人目がある時だけだからね？」"
translation = "「있지 회장? 나, 꽁냥거리는 건 멋없어서 싫다고 말했지만 말이야. 그거, 남의 눈이 있을 때뿐이니까?」"

[[dialogue]]
speaker = "アム"
original = "「誰にも見られてない時なら、恋人同士がすること……チューとかいっぱいしたいって思ってるから。そこは誤解しないでね」"
translation = "「아무도 안 볼 때라면, 연인끼리 하는 거…… 키스라든가 잔뜩 하고 싶다고 생각하니까. 그 점은 오해하지 마.」"

[[dialogue]]
speaker = "unk"
original = "大丈夫、誤解してないよ"
translation = "괜찮아, 오해 안 했어."

[[dialogue]]
speaker = "アム"
original = "「えへへ<emoji=heart04>\u3000それならよかった♪」"
translation = "「에헤헤<emoji=heart04> 그렇다면 다행이야♪」"

[[dialogue]]
speaker = "アム"
original = "「うん、いいよ。ここならバレないから。大好きな会長と、いっぱいチューしたい……<emoji=heart04>」"
translation = "「응, 좋아. 여기라면 안 들키니까. 사랑하는 회장이랑, 잔뜩 키스하고 싶어……<emoji=heart04>」"

[[dialogue]]
speaker = "アム"
original = "「ん……ちゅ、ちゅぅ<emoji=heart04>\u3000好きだよ、会長っ……んちゅっ<emoji=heart04>」"
translation = "「음…… 쪽, 쪼옥<emoji=heart04> 좋아해, 회장…… 음쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "アムは、今みたいに<ruby>人気<rt>ひとけ</rt></ruby>がなければたくさんのキスをしてくれる。"
translation = "아무는, 지금처럼 인기가 없으면 많은 키스를 해준다."

[[dialogue]]
speaker = "unk"
original = "子供っぽいところもあれど、たまに見せる恋人の仕草に俺はいつもドキドキさせられてしまうのだった──"
translation = "어린애 같은 면도 있지만, 가끔 보여주는 연인의 몸짓에 나는 항상 두근거리게 되어버리는 것이었다──"

