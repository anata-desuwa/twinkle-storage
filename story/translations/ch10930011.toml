[[dialogue]]
speaker = "unk"
original = "第１話,クラス委員登場！,P"
translation = "제1화, 반장 등장!, P"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「会長、昨日はありがとね。おかげで大量の書類を片付けられたよ」"
translation = "「회장, 어제는 고마웠어. 덕분에 대량의 서류를 정리할 수 있었어」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「アナもすっごく助かったって言ってたよ。ほんとヴィーナスが会長だった頃とは大違いだって」"
translation = "「아나도 정말 큰 도움이 됐다고 말했어. 정말 비너스가 회장일 때랑은 딴판이라니까」"

[[dialogue]]
speaker = "？？？"
original = "「流石会長くん、星徒会でも大活躍みたいだね」"
translation = "「역시 회장군, 성도회에서도 대활약 중인가 보네」"

[[dialogue]]
speaker = "unk"
original = "えっと、どちら様でしょうか……？"
translation = "저기, 누구신가요……?"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「ひどい！\u3000私だよ私！\u3000クラス委員長のミルフィーだよ！」"
translation = "「너무해! 나야 나! 학급위원장인 밀피라고!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「もう会長くんってば、いじわるなんだから～」"
translation = "「정말 회장군도 참, 심술궂다니까~」"

[[dialogue]]
speaker = "unk"
original = "ミルフィーはからかいがいがあるからね"
translation = "밀피는 놀리는 보람이 있으니까"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「もうもうっ、女の子には優しくしないとダメなんだからっ」"
translation = "「정말 정말, 여자애한테는 상냥하게 대하지 않으면 안 된다구」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ポカポカ会長の肩叩いてる……２人とも仲いいんだねぇ」"
translation = "「투닥투닥 회장의 어깨를 두드리고…… 둘 다 사이가 좋네에」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「会長くんとはそこそこ長い付き合いだからねぇ。会長職で忙しい時とかに、日直を手伝ったりしてたし」"
translation = "「회장군과는 나름 긴 사이니까 말이야. 회장직으로 바쁠 때 같은 때에, 주번 일을 돕기도 했고」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「懐かしいなぁ……星徒会長になりたての頃とか、よく頼ってくれてたよね。最近は私がいなくても大丈夫なくらい、余裕が出てきたみたいだけど……」"
translation = "「그립네…… 성도회장이 된 지 얼마 안 됐을 때라든가, 자주 의지해 줬었지. 요즘은 내가 없어도 괜찮을 정도로 여유가 생긴 것 같지만……」"

[[dialogue]]
speaker = "unk"
original = "それもミルフィーが世話を焼いてくれたおかげだ"
translation = "그것도 밀피가 보살펴 준 덕분이야"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「そうかなぁ～……そうだったらいいんだけど」"
translation = "「그럴까나~…… 그렇다면 다행이지만」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「まあでも、会長くんとは軽い冗談を言い合えるくらい仲良くなれたし、それだけでも充分なんだけどね」"
translation = "「뭐 그래도, 회장군과는 가벼운 농담을 주고받을 정도로 사이가 좋아졌고, 그것만으로도 충분하지만 말이야」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「へぇ～、２人はそんな関係だったんだ。でも会長は女の子と仲良くなるの得意だし、不思議でもないか」"
translation = "「헤에~, 둘은 그런 관계였구나. 하지만 회장은 여자애랑 친해지는 게 특기니까, 이상할 것도 없나」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「だよねぇ～。会長くんは周りの人をちゃんと見て、細かいところまで気配りができる人だし」"
translation = "「그렇지~. 회장군은 주변 사람들을 잘 보고, 세세한 부분까지 배려할 줄 아는 사람이니까」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「それに星徒会の会長として、いつもみんなを助けてくれるヒーローみたいな存在だもん」"
translation = "「게다가 성도회의 회장으로서, 항상 모두를 도와주는 히어로 같은 존재인걸」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「うん、確かに会長は男の子としても、会長としても優秀だよね」"
translation = "「응, 확실히 회장은 남자애로서도, 회장으로서도 우수하지」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「そうそう、会長くんは本当に偉いよっ」"
translation = "「맞아 맞아, 회장군은 정말 대단해!」"

[[dialogue]]
speaker = "unk"
original = "いや、そういうミルフィーだって偉いよ"
translation = "아니, 그렇게 말하는 밀피야말로 대단해"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「確かに委員長もクラス委員として、いつも頑張ってるよね。毎日１番早く教室に来て掃除したり、教室の花瓶のお水を替えたりとか」"
translation = "「확실히 위원장도 학급위원으로서 항상 열심히 하고 있지. 매일 제일 먼저 교실에 와서 청소하거나, 교실 꽃병의 물을 갈거나 말이야」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「そんなのクラス委員として当然のことだよ。私なんて会長くんたちと比べたら、全然普通だから」"
translation = "「그런 건 학급위원으로서 당연한 일이야. 나 같은 건 회장군들에 비하면 전혀 평범하니까」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「それを普通って言えるのが偉いよ……私より全然偉い……」"
translation = "「그걸 평범하다고 말할 수 있는 게 대단한 거야…… 나보다 훨씬 훌륭해……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ハッ……！\u3000普通な私はこのままじゃ、いらない子扱いされて星徒会から追い出されるんじゃ！？」"
translation = "「핫……! 평범한 나는 이대로라면, 필요 없는 아이 취급받아서 성도회에서 쫓겨나는 거 아냐!?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「委員長は成績も優秀だし、プリマステラとしても大活躍してるし……！」"
translation = "「위원장은 성적도 우수하고, 프리마스텔라로서도 대활약하고 있고……!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「いやいやいや、マトイさんが追い出されるわけないよ」"
translation = "「아니 아니 아니, 마토이 씨가 쫓겨날 리 없잖아요」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「だって私なんて、これといった個性も無いＴＨＥ・普通人間だし……」"
translation = "「그치만 나 같은 건 딱히 개성도 없는 THE 평범 인간이고……」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「そんなことないよ！\u3000マトイさんは普通じゃないよ！」"
translation = "「그렇지 않아! 마토이 씨는 평범하지 않아!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「普通……じゃない？」"
translation = "「평범……하지 않아?」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「そもそも星徒会に選ばれてるだけで普通じゃないし、会長くんだってマトイさんのこと頼りにしてるって言ってたよ！」"
translation = "「애초에 성도회에 뽑힌 것만으로도 평범하지 않고, 회장군도 마토이 씨를 의지하고 있다고 말했어!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「ね、会長くん！」"
translation = "「그치, 회장군!」"

[[dialogue]]
speaker = "unk"
original = "ああ、マトイは頼りになる仲間だよ"
translation = "아아, 마토이는 의지가 되는 동료야"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「２人がそこまで言うなら……うん、信じるよ」"
translation = "「둘이 그렇게까지 말한다면…… 응, 믿을게」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "（よかった……なんとかネガティブモードから復活してくれた……。会長くんもフォローありがとうね）"
translation = "(다행이다…… 어떻게든 네거티브 모드에서 부활해 줬어. 회장군도 도와줘서 고마워)"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ねぇ２人とも、何をこそこそ話してるの？」"
translation = "「저기 둘 다, 무슨 소곤소곤 이야기를 하는 거야?」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「えへへ……マトイさんには秘密かな」"
translation = "「에헤헤…… 마토이 씨에게는 비밀일까나」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「えー、なんか怪しい……」"
translation = "「에이, 왠지 수상해……」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「別に怪しくなんかないって……！」"
translation = "「딱히 수상한 거 아니라니까……!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「そんなこと言って息ぴったりだし、もしかして陰で付き合ったりしてるの？」"
translation = "「그렇게 말하면서 호흡이 척척 맞고, 혹시 뒤에서 사귀거나 하는 거야?」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「そ、そそそんなことないよ！\u3000会長くんとだなんて、畏れ多い！」"
translation = "「그, 그그그그런 거 아냐! 회장군과라니, 황송해!」"

[[dialogue]]
speaker = "unk"
original = "俺だって、ミルフィーとは畏れ多いよ"
translation = "나야말로, 밀피와는 황송하지"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「いやいや、私の方が畏れ多いよ！」"
translation = "「아니 아니, 내 쪽이 더 황송해!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ほら、やっぱり息ぴったりじゃん。素直になって付き合っちゃえばいいのに」"
translation = "「봐, 역시 호흡이 딱 맞잖아. 솔직해져서 사귀어버리면 좋을 텐데」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「す、素直になってって……」"
translation = "「소, 솔직해지라니……」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「私と、会長くんが付き合ったりしたら……」"
translation = "「나랑, 회장군이 사귀거나 하면……」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「…………………～～～～～～～～～ッ！！」"
translation = "「…………………～～～～～～～～～윽!!」"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「ふ、ふふ不純異性交遊はダメなんだからー！」"
translation = "「부, 부부불순이성교제는 안 된다구!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「行っちゃったね……どんな妄想をしてたんだろう……。でもちょっとからかいすぎたかな。委員長に悪いことしちゃったかも」"
translation = "「가버렸네…… 무슨 망상을 했던 걸까……. 하지만 좀 너무 놀렸나. 위원장에게 미안한 짓을 했을지도」"

[[dialogue]]
speaker = "unk"
original = "その後、次の授業のチャイムが鳴ると同時に、ミルフィーは帰ってきたのだが……"
translation = "그 후, 다음 수업 종이 울림과 동시에 밀피는 돌아왔지만……"

[[dialogue]]
speaker_original = "ミルフィー"
speaker_translation = "밀피"
original = "「ちらちら……」"
translation = "「힐끔힐끔……」"

[[dialogue]]
speaker = "unk"
original = "ミルフィーの視線が気になり、授業にあまり集中出来なかった。"
translation = "밀피의 시선이 신경 쓰여서, 수업에 별로 집중할 수 없었다."

