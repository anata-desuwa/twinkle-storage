[[dialogue]]
speaker = "unk"
original = "第０話,１，０００，０００,B"
translation = "제0화, 1,000,000, B"

[[dialogue]]
speaker = "unk"
original = "平行世界デネブの地で行われた『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』との決戦は、緋宮クロト率いる星騎士たちの勝利に終わった。"
translation = "평행세계 데네브의 땅에서 벌어진 『<ruby>XELOS<rt>제로스</rt></ruby>』와의 결전은 히노미야 쿠로토가 이끄는 성기사들의 승리로 끝났다."

[[dialogue]]
speaker = "unk"
original = "しかし──創造神との決着は未だついていない。束の間の安息に胸を撫でおろす猶予は、緋宮クロトたちにはなかった。"
translation = "하지만── 창조신과의 결판은 아직 나지 않았다. 찰나의 안식에 가슴을 쓸어내릴 여유는 히노미야 쿠로토 일행에게 없었다."

[[dialogue]]
speaker = "unk"
original = "創造神との雌雄を決する戦い。"
translation = "창조신과의 자웅을 겨루는 싸움."

[[dialogue]]
speaker = "unk"
original = "その火蓋は、終焉世界ベガにて幕を開ける──"
translation = "그 서막은 종언세계 베가에서 막을 올린다──"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「不届き者。次元を渡りやってきた」"
translation = "「불청객. 차원을 건너왔어」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「お父様の傷。回復の邪魔、させない──」"
translation = "「아버님의 상처. 회복 방해, 못 하게 해──」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「おぉぉぉおぉおっ──！！」"
translation = "「오오오오오오오옷──!!」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「おお、さすがあたしたち守護天使を封印しただけはあるね。それやったのアルタイルの方だけど」"
translation = "「오오, 역시 우리 수호천사들을 봉인한 보람은 있네. 그거 한 건 알타이르 쪽이지만」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「お喋りをしている暇はないぞ、守護天使よ！」"
translation = "「잡담을 떨 여유는 없다, 수호천사여!」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「代わり。いくらでもいる──」"
translation = "「대역. 얼마든지 있어──」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「悪しき星の騎士。お父様を守る──」"
translation = "「사악한 별의 기사. 아버님을 지킨다──」"

[[dialogue]]
speaker_original = "モネ（覚醒）"
speaker_translation = "모네(각성)"
original = "「キリがありませんね……どれだけ焼き払っても、次から次へと湧き出てきます──！」"
translation = "「끝이 없네요…… 아무리 태워버려도 계속해서 솟아나옵니다──!」"

[[dialogue]]
speaker_original = "ウィステリア（覚醒）"
speaker_translation = "위스테리아(각성)"
original = "「いくら先遣隊とはいえ、この軍勢はシャレになってないわよ！？\u3000間違いなく一番の激戦区じゃない……！」"
translation = "「아무리 선발대라지만 이 군세는 장난이 아니라고!? 틀림없이 최고의 격전지잖아……!」"

[[dialogue]]
speaker_original = "ウィステリア（覚醒）"
speaker_translation = "위스테리아(각성)"
original = "「もしかして私の不運のせい！？\u3000だったらごめんなさい……！」"
translation = "「혹시 나의 불운 때문!? 그렇다면 미안해……!」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「謝る必要はないわ。むしろ幸運よ。リクリエへの恨みを存分に晴らすことができるのだから」"
translation = "「사과할 필요는 없어. 오히려 행운이야. 리크리에에 대한 원한을 마음껏 풀 수 있을 테니까」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「端から全て消し飛ばすわ。６６６番書架、開錠──ネイムレス・グリモワール！」"
translation = "「끝에서부터 전부 날려버리겠어. 666번 서가, 해제── 네임리스 그리모어!」"

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「お姉様たちの戦いの邪魔をさせるわけにはいきません！\u3000せつなさん、援護をお願いします！」"
translation = "「언니들의 싸움을 방해하게 둘 수는 없습니다! 세츠나 씨, 원호를 부탁드려요!」"

[[dialogue]]
speaker_original = "せつな（覚醒）"
speaker_translation = "세츠나(각성)"
original = "「お任せでござる！\u3000甲賀流忍者せつな──今日は忍ばず奮戦するでござるっ！！」"
translation = "「맡겨주시구려! 코가류 닌자 세츠나── 오늘은 숨지 않고 분전하겠소!!」"

[[dialogue]]
speaker = "unk"
original = "流星の騎士セイファートが指揮する星騎士たちの猛攻に、次々になぎ倒されていくホロウ・ルヴィネのシャドウ。"
translation = "유성의 기사 세이파트가 지휘하는 성기사들의 맹공에 차례차례 쓰러져 가는 홀로우 루비네의 섀도."

[[dialogue]]
speaker = "unk"
original = "しかし空いた穴はすぐに埋められる──"
translation = "하지만 뚫린 구멍은 즉시 메워진다──"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「無駄。無駄。無駄──ベガの地球が残っている限り。お父様から無限の霊力が届く──」"
translation = "「무다. 무다. 무다── 베가의 지구가 남아있는 한. 아버님으로부터 무한한 영력이 도착해──」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「『在庫』は尽きない。抵抗を続ける限り、１００万の大群で迎え撃つ」"
translation = "「『재고』는 마르지 않아. 저항을 계속하는 한 100만의 대군으로 맞이해 주지」"

[[dialogue]]
speaker_original = "リィベル"
speaker_translation = "리벨"
original = "「いくらでも来なさい。リクリエに滅ぼされた者の怨念も、尽きることはないわ！」"
translation = "「얼마든지 오너라. 리크리에에 멸망한 자들의 원념도 다할 일은 없을 테니까!」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「停止、無抵抗を推奨。抵抗は合理的な行いとは程遠い──」"
translation = "「정지, 무저항을 권장. 저항은 합리적인 행위와는 거리가 멂──」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「どんな計画も無駄。リクリエを受け入れるべき──」"
translation = "「어떤 계획도 무의미. 리크리에를 받아들여야 함──」"

[[dialogue]]
speaker_original = "せつな（覚醒）"
speaker_translation = "세츠나(각성)"
original = "「そうは問屋がおろさないでござる！\u3000主様の命ゆえに！」"
translation = "「그렇게는 안 될 것이오! 주군 일편단심이기에!」"

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「お姉様たちと約束をしました！\u3000必ず、勝って再会するって……約束を違えるわけにはいきませんっ！」"
translation = "「언니들과 약속했습니다! 반드시 이겨서 재회하겠다고…… 약속을 어길 수는 없어요!」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「提案。魔王・緋宮クロトが天寿を全うするまで、リクリエを停止──」"
translation = "「제안. 마왕 히노미야 쿠로토가 천수를 누릴 때까지 리크리에를 정지──」"

[[dialogue]]
speaker_original = "ホロウ・ルヴィネ"
speaker_translation = "할로우・루비네"
original = "「あなたたちの親、友人が死ぬまでは──今のアルタイルを保存。お父様の慈悲」"
translation = "「당신들의 부모, 친구가 죽을 때까지는── 지금의 알타이르를 보존. 아버님의 자비」"

[[dialogue]]
speaker_original = "モネ（覚醒）"
speaker_translation = "모네(각성)"
original = "「そんなこと……聞けません！\u3000いずれ再創生の本波が来ることは確実じゃないですか！」"
translation = "「그런 말…… 들을 수 없어요! 언젠가 재창생의 본파가 오는 것은 확실하지 않나요!」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「おやおや、往生際が悪いんじゃない、創造神様？\u3000あなたが淘汰される番が来たってことだよ」"
translation = "「이런 이런, 미련이 너무한 거 아냐, 창조신님? 당신이 도태될 차례가 왔다는 거야」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「テルルが消えた以上、『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』が生き残れば、あたしたち守護天使も粛清だしね」"
translation = "「테루루가 사라진 이상, 『<ruby>XELOS<rt>제로스</rt></ruby>』가 살아남으면 우리 수호천사도 숙청이니까 말이지」"

[[dialogue]]
speaker_original = "パテル"
speaker_translation = "파텔"
original = "「生き残るのはあたしたちか、それとも創造神か……さぁ、試練の時だ！」"
translation = "「살아남는 건 우리일까, 아니면 창조신일까…… 자, 시련의 시간이다!」"

[[dialogue]]
speaker_original = "ウィステリア（覚醒）"
speaker_translation = "위스테리아(각성)"
original = "「『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』に伝えなさい！\u3000世界のためにも、後輩たちの未来のためにも……私たちが抵抗をやめることはあり得ないわ！」"
translation = "「『<ruby>XELOS<rt>제로스</rt></ruby>』에게 전해라! 세계를 위해서도, 후배들의 미래를 위해서도…… 우리가 저항을 멈추는 일은 있을 수 없어!」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「その通りだ、悪神の遣いよ。勝つか負けるか……滅ぼすか、滅びるか！\u3000我らの決着はそれ以外にない！！」"
translation = "「그 말대로다, 악신의 사자여. 이기느냐 지느냐…… 멸망시키느냐, 멸망하느냐! 우리의 결판은 그것 이외엔 없다!!」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「総員──我々の役目は、５人の『<b>星喰らい</b>』たちの元へ、この大群を応援に向かわせぬこと！！」"
translation = "「총원── 우리의 역할은 다섯 명의 『<b>호시쿠라이</b>』들에게 이 대군이 응원하러 가게 하지 않는 것!!」"

[[dialogue]]
speaker_original = "セイファート"
speaker_translation = "세이파트"
original = "「死力を尽くし──奮え！！！」"
translation = "「사력을 다해── 떨쳐라!!!」"

