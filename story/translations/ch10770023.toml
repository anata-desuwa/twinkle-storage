[[dialogue]]
speaker = "unk"
original = "第３話,クリスマスフォーム,P"
translation = "제3화, 크리스마스 폼, P"

[[dialogue]]
speaker = "unk"
original = "九浄家の屋敷に呼ばれて行ってみると、中庭で蘭美と紅明が何やら真剣な表情で話をしている。"
translation = "쿠죠 가문의 저택에 불려가 보니, 안뜰에서 라비와 홍명이 무언가 진지한 표정으로 이야기를 나누고 있다."

[[dialogue]]
speaker = "unk"
original = "紅明の格好には見覚えがあったが、蘭美は見慣れない衣装を身に着けていた。"
translation = "홍명의 복장은 본 적이 있었지만, 라비는 낯선 의상을 입고 있었다."

[[dialogue]]
speaker = "unk"
original = "あの格好は一体……？"
translation = "저 복장은 대체……?"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「よく来た魔王よ。蘭美の着ているアレは、新たに開発した人工戦闘服、蘭美専用の『クリスマスフォーム』だ」"
translation = "「잘 왔다 마왕아. 라비가 입고 있는 저것은, 새로 개발한 인공 전투복, 라비 전용의 『크리스마스 폼』이다」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「つい先日に完成し蘭美にプレゼントしたばかりなのだが、まだその力を引き出すに至っていない状態なのだ」"
translation = "「바로 며칠 전에 완성해서 라비에게 선물한 참이지만, 아직 그 힘을 끌어낼 정도에는 이르지 못한 상태인 것이다」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「それでクリスマスフォームの元になった戦闘服を持つ紅明を招いて、その力を引き出すべく試行錯誤しているというわけだ」"
translation = "「그래서 크리스마스 폼의 바탕이 된 전투복을 가진 홍명을 불러서, 그 힘을 끌어내기 위해 시행착오를 겪고 있다는 것이다」"

[[dialogue]]
speaker = "unk"
original = "目のやり場に困るんですけど"
translation = "시선을 둘 곳이 곤란한데요"

[[dialogue]]
speaker = "unk"
original = "大胆なデザインですね"
translation = "대담한 디자인이네요"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「そうだろう？\u3000蘭美の色気を最大限引き出せるように、全身全霊を注ぎ込んだのだ」"
translation = "「그렇겠지? 라비의 색기를 최대한 끌어낼 수 있도록, 전신전령을 쏟아부은 것이다」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「蘭美は胸がぺったんこで色気なしに思われがちだが、実は脇と腰のくびれが絶品だからな」"
translation = "「라비는 가슴이 납작해서 색기가 없다고 생각하기 쉽지만, 실은 겨드랑이와 허리 라인이 일품이기 때문이다」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「まあ彼氏である魔王には、語るまでもないことかもしれないが。ふふふ……」"
translation = "「뭐 남자친구인 마왕에게는, 말할 필요도 없는 일일지도 모르겠지만. 후후후……」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「ん？\u3000何かな、その顔は。貴殿と交際を始めたことは、蘭美からしっかりと報告を受けているぞ？」"
translation = "「응? 뭔가, 그 얼굴은. 그대와 교제를 시작한 것은, 라비에게서 확실히 보고받고 있다」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「仲睦まじいようで大いに結構。蘭美のこと、私からも頼むぞ。大切にしてやってくれ」"
translation = "「사이좋은 것 같으니 아주 좋다. 라비를, 나도 부탁한다. 소중히 대해주렴」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「おっと……そんな話をしていたら２人が戻ってきたようだ」"
translation = "「이런……그런 이야기를 하고 있으니 두 사람이 돌아온 것 같군」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「当主様……会長と何をお話しされていたのですか？」"
translation = "「당주님……회장과 무슨 이야기를 하고 계셨나요?」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「うむ、お前のクリスマスフォームのデザインコンセプトについて熱く語っていたのだ」"
translation = "「음, 네 크리스마스 폼의 디자인 콘셉트에 대해 열렬히 이야기하고 있었다」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ヘレナちゃんが作ったラビラビのクリスマスフォーム、去年のヨミヨミのやつよりだいぶ刺激的っしょ～！」"
translation = "「헬레나짱이 만든 라비라비의 크리스마스 폼, 작년 요미요미 거보다 훨씬 자극적이잖아~!」"

[[dialogue]]
speaker = "unk"
original = "紅明が九浄家の面子と顔見知りなのは知らなかったが、すでにだいぶ打ち解けているらしい。"
translation = "홍명이 쿠죠 가문의 사람들과 안면이 있다는 것은 몰랐지만, 이미 상당히 친해진 듯하다."

[[dialogue]]
speaker = "unk"
original = "ちなみにヘレナちゃんは初対面の相手に「私のことはヘレナちゃんと呼ぶがいい！」と言って回る癖がある。……かなり偉い人なので、その通りに呼ぶヒトは割と少ない。"
translation = "참고로 헬레나짱은 초면인 상대에게 「나를 헬레나짱이라고 부르는 게 좋을 것이다!」라고 말하고 다니는 버릇이 있다. ……상당히 높은 사람이라서, 그대로 부르는 사람은 비교적 적다."

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「うむ！\u3000紅明にもわかるか！\u3000今回はまさに、まさに蘭美の隠れた色気を引き出すことが狙いだったからな」"
translation = "「음! 홍명도 아는가! 이번에는 그야말로, 그야말로 라비의 숨겨진 색기를 끌어내는 것이 목표였기 때문이다」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「狙い通りという意味では大成功だけど……ラビラビ的には露出の多い服装はＯＫなん？」"
translation = "「목표대로라는 의미에서는 대성공이지만……라비라비 입장에서는 노출이 많은 복장은 괜찮은 거야?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「平気よ。私は自分のプロポーションに自信を持ってるから」"
translation = "「괜찮아. 나는 내 몸매에 자신 있으니까」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「むしろこんな可愛い服を着ているんだから、もっとしっかり見て欲しいくらいね！」"
translation = "「오히려 이렇게 귀여운 옷을 입고 있으니, 더 확실하게 봐줬으면 할 정도야!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「おぉ～！\u3000タレント向きのメンタル☆\u3000それじゃあお言葉に甘えて、たっぷり見させてもらうっしょ！」"
translation = "「오~! 탤런트급 멘탈☆ 그럼 그 말에 기대서, 실컷 보겠어!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「今日は大サービスよ。しっかり目に焼き付けていきなさい！」"
translation = "「오늘은 대 서비스야. 확실하게 눈에 새겨두도록 해!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ほらほら～、ダーリンもしっかり見なくちゃダメだぜ！？\u3000彼女がここまで奮発してくれてるんだから！」"
translation = "「자 자~, 달링도 확실하게 봐야지 안 돼!? 그녀가 이렇게까지 분발해 주고 있으니까!」"

[[dialogue]]
speaker = "unk"
original = "男の俺がジロジロ見るわけには……"
translation = "남자로서 내가 빤히 쳐다볼 수는……"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「もぅ～♪\u3000ダーリンってば、シャイボーイ☆」"
translation = "「모~오♪ 달링은 정말, 샤이 보이☆」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「いやいや、そんな事はないぞ……むしろさっきは食い入るように見ていたが？」"
translation = "「아니 아니, 그럴 리는 없다……오히려 방금 전에는 뚫어지게 보고 있었는데?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ぴゃっ……！！！」"
translation = "「뺫……!!!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「あ、固まっちった」"
translation = "「아, 굳어버렸네」"

[[dialogue]]
speaker = "unk"
original = "そ、そんなに見てないよ！"
translation = "스, 그렇게 안 봤어!"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「私の目を誤魔化せると思うな？\u3000主にむっちりとした肉付きのいい太ももの辺りを、舐めるように……」"
translation = "「내 눈을 속일 수 있다고 생각하지 마라? 주로 통통하고 살집 좋은 허벅지 주변을, 핥듯이……」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ぅぅぅぅぅ～～～～！！！！」"
translation = "「으으으으으~~~~!!!!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「アタシたちの視線は平気だったけど、ダーリンの視線はダメだったってこと？」"
translation = "「우리들의 시선은 괜찮았지만, 달링의 시선은 안 됐다는 거야?」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「好きな相手に見られていたことに動揺して動けなくなる……うむ♪\u3000意外に可愛いところがあるではないか」"
translation = "「좋아하는 상대에게 보이고 있었다는 것에 동요하여 움직일 수 없게 되다니……음♪ 의외로 귀여운 면이 있지 않은가」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「へ──」"
translation = "「히──」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「平気だぴょん！\u3000恥ずかしいとか無いぴょん！\u3000相手が会長だって平気だぴょん！」"
translation = "「괜찮다뿅! 부끄럽다거나 없다뿅! 상대가 회장이라도 괜찮다뿅!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「むしろ会長こそしっかり見るべきだぴょん！\u3000恋人のエロ可愛い格好を見て、興奮しない方がおかしいぴょん！」"
translation = "「오히려 회장이야말로 확실하게 봐야 한다뿅! 연인의 야하고 귀여운 모습을 보고, 흥분하지 않는 쪽이 이상하다뿅!」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「それとも会長は私の身体が、夢中になるほど大したものではないと言いたいぴょん！！？」"
translation = "「아니면 회장은 내 몸이, 정신을 못 차릴 만큼 대단한 것이 아니라고 말하고 싶은 거냐뿅!!?」"

[[dialogue]]
speaker = "unk"
original = "ずっと見てたいくらい可愛いよ！"
translation = "계속 보고 싶을 정도로 귀여워!"

[[dialogue]]
speaker = "unk"
original = "そ、そんなことない！"
translation = "그, 그럴 리 없어!"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ぴゃっ！？\u3000ず、ずっと……ずっと見るぴょん？\u3000会長に、見られちゃうぴょん……？」"
translation = "「뺫!? 즈, 계속……계속 보는 거냐뿅? 회장에게, 보여지는 거냐뿅……?」"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「だったら見るぴょん！\u3000思う存分、好きなだけ見ればいいぴょん！\u3000もうどうにでもなればいいぴょん！！！！」"
translation = "「그렇다면 보는 거다뿅! 마음껏, 좋을 대로 보면 된다뿅! 이제 될 대로 되라지뿅!!!!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ラビラビ、ほら深呼吸、深呼吸。混乱しすぎで方言出まくっちゃってるから！」"
translation = "「라비라비, 자 심호흡, 심호흡. 너무 혼란스러워서 사투리 막 튀어나오고 있잖아!」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「うむ。大変なことになってしまったな！」"
translation = "「음. 큰일이 되어버렸군!」"

[[dialogue]]
speaker = "unk"
original = "落ち着いてないで助けてください！"
translation = "진정하지 말고 도와주세요!"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「好きな人に可愛い衣装を見てもらいたいが、どこか気恥ずかしさも覚える──実によき青春のひとコマである」"
translation = "「좋아하는 사람에게 귀여운 의상을 보여주고 싶지만, 어딘가 쑥스러움도 느끼는──실로 좋은 청춘의 한 장면이다」"

[[dialogue]]
speaker_original = "ヘレナ"
speaker_translation = "헬레나"
original = "「それを私が止めると言うのも、野暮な話だ。というわけで魔王よ、後は若い者に任せるぞ」"
translation = "「그것을 내가 막는다는 것도, 고리타분한 이야기다. 그런 고로 마왕아, 나머지는 젊은이들에게 맡기겠다」"

[[dialogue]]
speaker = "unk"
original = "ぶん投げた……！？"
translation = "내던졌다……!?"

[[dialogue]]
speaker_original = "蘭美"
speaker_translation = "라미"
original = "「ぴゃぁ～～～～～～～っ！！！」"
translation = "「뺘아~~~~~~~~~~~!!!」"

[[dialogue]]
speaker = "unk"
original = "その後パニックになった蘭美を落ち着かせ、なんとか立ち直らせるために１時間以上の時間を要するのだった。"
translation = "그 후 패닉에 빠진 라비를 진정시키고, 어떻게든 회복시키기 위해 1시간 이상의 시간을 필요로 했다."

