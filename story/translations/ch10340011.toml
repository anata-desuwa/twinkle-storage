[[dialogue]]
speaker = "unk"
original = "第１話,魔王様のしもべです！,P"
translation = "제1화,마왕님의 하인입니다!,P"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスに御前試合で勝利し、星徒会長になって数日──"
translation = "비너스에게 어전 시합에서 승리하고, 성도회 회장이 된 지 며칠 후──"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「魔王様～～～～～～っ！！」"
translation = "「마왕님~~~~~~~!!」"

[[dialogue]]
speaker = "unk"
original = "！？"
translation = "！？"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「初めまして、魔王様！\u3000私は１年のカティア・セルベラスです！」"
translation = "「처음 뵙겠습니다, 마왕님! 저는 1학년 카티아 세르베루스입니다!」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「御前試合の逆転勝利お見事でした！\u3000ヴィーナス前会長に勝つなんて絶対ムリだと思ったのに、さすが魔王様です！」"
translation = "「어전 시합의 역전 승리 정말 멋졌습니다! 비너스 전 회장에게 이기는 건 절대 무리라고 생각했는데, 역시 마왕님이십니다!」"

[[dialogue]]
speaker = "unk"
original = "魔王様って……？"
translation = "마왕님이라고……?"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「ほら、前会長が魔王だって言ってましたよね？」"
translation = "「호라, 전 회장님이 마왕이라고 말했잖아요?」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「実は私のご先祖は魔王の配下として大暴れしたという言い伝えがあってですね。私もご先祖様のように魔王様のお役に立ちたいと思ったんです」"
translation = "「실은 제 선조는 마왕의 수하로서 크게 날뛰었다는 전설이 있어서요. 저도 선조님처럼 마왕님께 도움이 되고 싶다고 생각했어요」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「私を魔王様のしもべにしてください！\u3000一緒に世界征服しましょう！」"
translation = "「저를 마왕님의 하인으로 삼아주세요! 함께 세계 정복을 합시다!」"

[[dialogue]]
speaker = "unk"
original = "世界征服！？"
translation = "세계 정복!?"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「またまた～、魔王といえば世界征服に決まってるじゃないですかー。計画はすでに練っているんでしょう？」"
translation = "「또 또~, 마왕이라면 세계 정복으로 정해져 있잖아요. 계획은 이미 짜고 계시겠죠?」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「……計画なんてない？\u3000おお、なるほど！\u3000魔王様が泰然自若に振る舞っていれば世界の方が勝手にかしずくということですね。さすが魔王様です！」"
translation = "「……계획 같은 건 없다고요? 오오, 과연! 마왕님께서 태연자약하게 행동하시면 세상이 저절로 받들어 모신다는 뜻이군요. 역시 마왕님이십니다!」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「しかし必ず障害は現れるもの。万難を排するために、ぜひとも私を部下にしてください」"
translation = "「하지만 반드시 장애물은 나타나는 법. 온갖 어려움을 제거하기 위해, 부디 저를 부하로 삼아주세요」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「私の忠誠を疑うのなら命令してみてください。魔王様のご命令とあらば、購買のパンの買い占めでも何でもやってみせます！」"
translation = "「저의 충성을 의심하신다면 명령해 보세요. 마왕님의 명령이라면, 매점 빵을 사재기하는 것이든 뭐든지 해 보이겠습니다!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「会長、何してるの……って、その子は？」"
translation = "「회장, 뭐 하는 거야…… 랄까, 그 아이는?」"

[[dialogue]]
speaker = "unk"
original = "俺の配下……らしい"
translation = "나의 수하…… 인 것 같다"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「おお、魔王様のしもべと認めてくださったのですね！\u3000嬉しいです！\u3000このカティア、誠心誠意魔王様にお仕えします！」"
translation = "「오오, 마왕님의 하인으로 인정해 주신 거군요! 기쁩니다! 이 카티아, 성심성의껏 마왕님을 모시겠습니다!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「配下？\u3000しもべ？\u3000どうなってるの……？」"
translation = "「수하? 하인? 어떻게 된 거야……?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「カティア・セルベラス。新星学園一年生。成績・素行ともに特筆すべき点はないはず。会長との接点はないと思いますが……」"
translation = "「카티아 세르베루스. 신성 학원 1학년. 성적, 품행 모두 특기할 만한 점은 없을 터. 회장과의 접점은 없다고 생각합니다만……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「会長の配下なら、すでに星徒会役員の我々がいます」"
translation = "「회장의 수하라면, 이미 성도회 임원인 저희들이 있습니다」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「ウ～……ガルルル！\u3000私こそが魔王様の一番のしもべガオ！\u3000星徒会には負けないガオ～！」"
translation = "「우~…… 으르르르! 저야말로 마왕님의 최고의 하인 갸오! 성도회에게는 지지 않아 갸오~!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ふぅん、あなたもクロトの真価を理解できるのね。やるじゃない」"
translation = "「흐음, 당신도 쿠로토의 진가를 이해할 수 있구나. 제법인데」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「でもあなたがクロトの一番というのは認められないわ。クロトを一番近くで支えるのは私、そして新星星徒会よ！」"
translation = "「하지만 당신이 쿠로토의 최고라는 건 인정할 수 없어. 쿠로토를 가장 가까이서 지탱하는 건 나, 그리고 신성 성도회야!」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「なら勝負だワン！\u3000勝った方が魔王様の一番のしもべワン！」"
translation = "「그럼 승부다 멍! 이긴 쪽이 마왕님의 최고의 하인 멍!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「せめてワンかガオかどっちかにしなさいよ」"
translation = "「적어도 '멍'이나 '갸오' 중 하나로 통일해」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「でも勝負するのはいいわね。実力で白黒付けてあげる！」"
translation = "「하지만 승부하는 건 좋네. 실력으로 흑백을 가려주지!」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「きゅぅ」"
translation = "「큐우」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「犬キャラだけにワンパンでしたね」"
translation = "「개 캐릭터답게 원펀치였네요」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「前会長と、プリマステラでもない一生徒ではこうなるのも必然です。無常」"
translation = "「전 회장과, 프리마스텔라도 아닌 일개 학생으로는 이렇게 되는 것도 필연입니다. 무상하네요」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「前星徒会とガチンコバトルで勝てるわけありませんよぉ！\u3000もし勝ったら私が星徒会長ですよ！」"
translation = "「전 성도회와 정면 대결로 이길 리가 없잖아요! 만약 이긴다면 제가 성도회 회장이라고요!」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「気づいたら目の前が真っ白になって、ビームで蒸発するかと思いました……。ちょっとぐらい手加減してくれたっていいじゃないですかぁ～」"
translation = "「정신 차려보니 눈앞이 새하얘져서, 빔에 증발하는 줄 알았어요……. 조금 정도는 봐줄 수도 있는 거잖아요~」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あれでも一応威力は抑えたわよ。本気でぶっ飛ばすのも大人げないし」"
translation = "「저것도 일단 위력은 억제한 거야. 진심으로 날려버리는 것도 어른스럽지 못하고」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「うぐっ……あれでも手加減してたんだ……前会長怖い……」"
translation = "「우윽…… 저것도 봐준 거였구나…… 전 회장 무서워……」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「魔王様～！」"
translation = "「마왕님~!」"

[[dialogue]]
speaker = "unk"
original = "おー……ヨシヨシ"
translation = "오~…… 쓰담쓰담"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「うぅ……お気遣いありがとうございます……」"
translation = "「으윽…… 신경 써주셔서 감사합니다……」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「さすが魔王様はお優しいガオ。一生ついていきます……ワン」"
translation = "「역시 마왕님은 상냥하신 갸오. 평생 따라가겠습니다…… 멍」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（うーん、キャラが立つなら私も語尾に何かつけようかな……？）"
translation = "「(음, 캐릭터가 산다면 나도 어미에 뭔가 붙여볼까……?)」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「まぁ、クロトの配下が増えるのはいいことだわ。星徒会より下っぱで良ければ認めてあげなくもないわよ」"
translation = "「뭐, 쿠로토의 수하가 늘어나는 건 좋은 일이야. 성도회보다 아랫사람으로 괜찮다면 인정해주지 못할 것도 없지」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「な、情けなんていらないぞ！\u3000いつか必ず魔王様の一番のしもべの座を勝ち取ってやるからな！」"
translation = "「나, 나는 동정 같은 건 필요 없다! 언젠가 반드시 마왕님의 최고의 하인 자리를 쟁취하고 말 테니까!」"

[[dialogue]]
speaker_original = "カティア"
speaker_translation = "카티아"
original = "「覚えてろよ～っ！」"
translation = "「두고 보자고~!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あ……行っちゃった……」"
translation = "「아…… 가버렸네……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「会長を慕ってくれる子ができて良かった……ね？」"
translation = "「회장을 따르는 아이가 생겨서 다행이네…… 그치?」"

