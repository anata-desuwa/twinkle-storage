[[dialogue]]
speaker = "unk"
original = "第５話,神殿の奥にあるもの,B"
translation = "제5화, 신전 깊은 곳에 있는 것, B"

[[dialogue]]
speaker = "unk"
original = "極星従騎に乗って女神の神殿に再突入したのは、梨緒・Ａ・クリステレス、ベアトリス・シェイド、散乃ナターシャの３名。"
translation = "극성종기를 타고 여신의 신전에 재돌입한 것은 리오·A·크리스테레스, 베아트리스 셰이드, 치루노 나타샤 세 명."

[[dialogue]]
speaker = "unk"
original = "名目上監査であるアポロを除いた選挙管理委員会のメンバーが、神殿を奪還すべく、深部への到達を試みる。"
translation = "명목상 감사인 아폴로를 제외한 선거관리위원회 멤버들이 신전을 탈환하기 위해 심부 도달을 시도한다."

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「ところでベアトって、いつの間に極星従騎を操れるようになったの？」"
translation = "「그런데 베아토는 언제부터 극성종기를 다룰 수 있게 된 거야?」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「いつからって言うか……実は最初から？\u3000チナちゃんに教えてもらったんだけど、この子たちって極星星徒会役員の命令を聞くようになってるみたい」"
translation = "「언제부터랄까…… 사실 처음부터? 치나 짱에게 배웠는데, 이 아이들은 극성성도회 임원의 명령을 듣게 되어 있는 것 같아.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「ああ、そういえば極星従騎がベアトの前で止まったこともあったね」"
translation = "「아아, 그러고 보니 극성종기가 베아토 앞에서 멈췄던 적도 있었지.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「……ナターシャは大丈夫なのか？」"
translation = "「……나타샤는 괜찮은 건가?」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「大丈夫って……？\u3000あぁ、メルエルのこと？」"
translation = "「괜찮냐니……? 아아, 메르엘 일?」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「私は全然平気だよ。さっきは頭に血が上っていろいろ言っちゃったけど、おかげでスッキリもしたし。今は落ち着いたよ」"
translation = "「나는 전혀 아무렇지도 않아. 아까는 머리에 피가 솟아서 이것저것 말해버렸지만, 덕분에 속이 시원해지기도 했고. 지금은 진정됐어.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「ていうか、大丈夫って聞きたいのはこっちの方なんだけど。梨緒の方こそ戦えるの？」"
translation = "「그보다 괜찮냐고 묻고 싶은 건 이쪽인데. 리오야말로 싸울 수 있겠어?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「戦えるか戦えないかじゃない。戦わないとダメなんだ」"
translation = "「싸울 수 있느냐 없느냐가 아니야. 싸워야만 하는 거다.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「うーん……本当に大丈夫かな？」"
translation = "「으음…… 정말 괜찮으려나?」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「梨緒ちゃん、何かあったの？」"
translation = "「리오 짱, 무슨 일 있었어?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ああ、欠けていた記憶が何なのか、思い出したんだ」"
translation = "「아아, 빠져있던 기억이 무엇인지 떠올랐다.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ベガの滅びの時、ジグは『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』によってリクリエの使徒にされた」"
translation = "「베가가 멸망할 때, 지그는 『<ruby>제로스<rt>XELOS</rt></ruby>』에 의해 리크리에의 사도가 되었지.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「その瞬間、私は何もできなかった」"
translation = "「그 순간, 나는 아무것도 할 수 없었다.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「……いや、何もしなかった。『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』を前に心折れ、抵抗することすら諦めた」"
translation = "「……아니, 아무것도 하지 않았어. 『<ruby>제로스<rt>XELOS</rt></ruby>』 앞에서 마음이 꺾여 저항하는 것조차 포기했지.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「私は……ジグを見捨てたんだ」"
translation = "「나는…… 지그를 저버린 거다.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「だから私は今度こそ、ジグを救わなければいけないんだ……」"
translation = "「그러니까 나는 이번에야말로 지그를 구해야만 해……」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「梨緒ちゃん……」"
translation = "「리오 짱……」"

[[dialogue]]
speaker_original = "ドラケルス"
speaker_translation = "드라켈스"
original = "「グルルゥ……！」"
translation = "「구르르……!」"

[[dialogue]]
speaker_original = "エレマル"
speaker_translation = "엘레말"
original = "「ビビビビ！」"
translation = "「비비비비!」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「機械型モンスター……ジグのやつ、やっぱり神殿にも連れてきてたんだ」"
translation = "「기계형 몬스터…… 지그 녀석, 역시 신전에도 데려왔었구나.」"

[[dialogue]]
speaker = "unk"
original = "神殿の奥に向かう梨緒たちの行く手に、機械型モンスターが立ちはだかる。"
translation = "신전 깊은 곳으로 향하는 리오 일행의 앞길에 기계형 몬스터가 가로막는다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「神殿が聖庭園にぶつかるまで時間がない。ベアト、ナターシャ、ここは任せていいか？」"
translation = "「신전이 성정원에 부딪힐 때까지 시간이 없어. 베아토, 나타샤, 여기는 맡겨도 되겠나?」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「戦力の分散はいい手じゃないし、やりたくないんだけどね。今の梨緒がどこまで戦えるか不安だし」"
translation = "「전력 분산은 좋은 수법이 아니고 하고 싶지도 않지만 말이야. 지금의 리오가 어디까지 싸울 수 있을지 불안하기도 하고.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「それでも……モンスターがどれだけいるかわからない以上、そうするしかないか」"
translation = "「그래도…… 몬스터가 얼마나 있을지 모르는 이상 그렇게 할 수밖에 없나.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「極星従騎がいるから、こっちは何とかなると思う！」"
translation = "「극성종기가 있으니까 이쪽은 어떻게든 될 거라고 생각해!」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「まぁ、持たせるしかないよね。わかった。行ってきて、梨緒」"
translation = "「뭐, 버텨낼 수밖에 없겠네. 알았어. 다녀와, 리오.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「すまない。任せた」"
translation = "「미안하다. 맡기마.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ジグは必ず私が止める。では行ってくる」"
translation = "「지그는 반드시 내가 막겠다. 그럼 다녀오지.」"

[[dialogue]]
speaker = "unk"
original = "梨緒は極星従騎の背を降り、神殿の深部に向かって加速する。"
translation = "리오는 극성종기의 등에서 내려 신전 심부를 향해 가속한다."

[[dialogue]]
speaker_original = "エレマル"
speaker_translation = "엘레말"
original = "「ビビビ！」"
translation = "「비비비!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「梨緒ちゃんの邪魔はさせないよ！\u3000極星従騎！」"
translation = "「리오 짱을 방해하게 두지 않아! 극성종기!」"

[[dialogue]]
speaker_original = "スレイプニル"
speaker_translation = "슬레이프니르"
original = "「ブルルル！」"
translation = "「부르르르!」"

[[dialogue]]
speaker = "unk"
original = "行く手を阻むモンスターを、極星従騎が二振りの刃で蹴散らす。"
translation = "앞길을 가로막는 몬스터를 극성종기가 두 자루의 칼날로 걷어찬다."

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「おお、極星従騎にはさんざん苦戦させられたけど、味方になるとけっこう頼りになるじゃん」"
translation = "「오오, 극성종기 때문에 한참 고생했지만, 아군이 되니까 꽤 든든하잖아.」"

[[dialogue]]
speaker = "unk"
original = "梨緒は最高速でモンスターの間を駆け抜け、先ほどは辿り着けなかった神殿の最奥に向かった。"
translation = "리오는 최고속도로 몬스터 사이를 빠져나가, 아까는 도달하지 못했던 신전의 최심부로 향했다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ここが神殿の奥……？\u3000何だ、この空間は……？」"
translation = "「여기가 신전의 안쪽……? 뭐지, 이 공간은……?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「今まで見ていた神殿とはまるで違う……これが本当に女神の神殿なのか……？」"
translation = "「지금까지 보던 신전과는 전혀 달라…… 이게 정말 여신의 신전인가……?」"

[[dialogue]]
speaker = "unk"
original = "神殿の深部には広大な空間が広がっていた。"
translation = "신전 심부에는 광대한 공간이 펼쳐져 있었다."

[[dialogue]]
speaker = "unk"
original = "だがその景色は神殿の外部とも、これまで通ってきた内部とも違う。"
translation = "하지만 그 경치는 신전 외부와도, 지금까지 지나온 내부와도 다르다."

[[dialogue]]
speaker = "unk"
original = "足元は石造りの神殿だが、周囲には暗い闇が広がり、無数の光が浮かんでは消える。"
translation = "발밑은 석조 신전이지만, 주변에는 어두운 어둠이 깔려 있고 무수한 빛이 떠올랐다 사라진다."

[[dialogue]]
speaker = "unk"
original = "頭上には巨大な球体が浮かび、無機質な光のラインが瞬いていた。"
translation = "머리 위에는 거대한 구체가 떠 있고, 무기질적인 빛의 라인이 깜빡이고 있었다."

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「言っただろう、神殿の奥はコントロールルームになっていると。その球体はメインコンピューターといったところかな」"
translation = "「말했지, 신전 안쪽은 컨트롤 룸으로 되어 있다고. 그 구체는 메인 컴퓨터 같은 곳이려나.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ジグ……！」"
translation = "「지그……!」"

[[dialogue]]
speaker = "unk"
original = "闇の向こうから、ジグが余裕のある足取りでやってくる。"
translation = "어둠 너머에서 지그가 여유로운 발걸음으로 다가온다."

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「なんだ、アガサじゃないか。私は魔王を待っていたのにがっかりだよ」"
translation = "「뭐야, 아가사잖아. 나는 마왕을 기다리고 있었는데 실망인걸.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「魔王は来ない。私が相手だ」"
translation = "「마왕은 오지 않아. 내가 상대다.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「私が君を倒して、神殿を止める……！」"
translation = "「내가 너를 쓰러뜨리고 신전을 멈추겠다……!」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「君が私に勝てるとでも？\u3000私が“真なる神”の加護を与えられる前から、君が勝てた試しがないのに？」"
translation = "「네가 나를 이길 수 있을 거라고? 내가 “진정한 신”의 가호를 받기 전부터 네가 이겨본 적이 없는데?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「それでも私は勝つ。勝たなければならない」"
translation = "「그래도 나는 이긴다. 이겨야만 해.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「そして君をリクリエの呪縛から解放する！\u3000私が君を救うんだ！」"
translation = "「그리고 너를 리크리에의 주박에서 해방하겠어! 내가 너를 구하는 거다!」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「ふぅん……威勢のいいことだね。『弱い犬ほどよく咆える』──なんて言葉が浮かんだよ」"
translation = "「흐응…… 기세는 좋네. 『겁 많은 개가 더 크게 짖는다』── 같은 말이 떠올랐어.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「まぁいいや。君を血祭に上げれば、魔王もこちらに来る気になるだろう」"
translation = "「뭐 좋아. 너를 피의 제물로 바치면 마왕도 이쪽으로 올 마음이 생기겠지.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「いいや、魔王をディザスターハンドにはさせない。今度こそ……私が勝つ！」"
translation = "「아니, 마왕을 디재스터 핸드로 만들게 두지 않겠다. 이번에야말로…… 내가 이긴다!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（守護天使ノルン……どうして私に力を貸してくれたのかはわからないが、今となっては君も私の一部だ）"
translation = "(수호천사 노른…… 어째서 나에게 힘을 빌려주었는지는 모르겠지만, 이제 와서는 너도 나의 일부다.)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（どうか私にジグを救う力をくれ……！）"
translation = "(부디 나에게 지그를 구할 힘을 줘……!)"

[[dialogue]]
speaker = "unk"
original = "自分の中の守護天使に呼びかけ、梨緒の背に翼が顕現する。"
translation = "자신 안의 수호천사에게 말을 걸자 리오의 등에 날개가 현현한다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（守護天使《運命》のノルンは『因果』の摂理を司る）"
translation = "(수호천사 《운명》의 노른은 『인과』의 섭리를 관장한다.)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（つまり『原因』と『結果』を結び付ける力。ノルンの力を使えば、リクリエの使徒であろうと動きを予測することができるはずだ）"
translation = "(즉 『원인』과 『결과』를 연결하는 힘. 노른의 힘을 쓰면 리크리에의 사도라 할지라도 움직임을 예측할 수 있을 터다.)"

[[dialogue]]
speaker = "unk"
original = "ノルンの力をまとった梨緒は、速度や星術の威力の向上のみならず、未来予知に等しい予測が可能となる。"
translation = "노른의 힘을 두른 리오는 속도나 성술 위력의 향상뿐만 아니라, 미래 예지에 가까운 예측이 가능해진다."

[[dialogue]]
speaker = "unk"
original = "純粋な攻撃力やスピードでは勝てずとも、ノルンの力があれば優位に立てると梨緒は計算していた。"
translation = "순수한 공격력이나 스피드로는 이길 수 없어도 노른의 힘이 있다면 우위에 설 수 있다고 리오는 계산하고 있었다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（見通せ……ジグの動きを……未来を……！）"
translation = "(꿰뚫어 봐라…… 지그의 움직임을…… 미래를……!)"

[[dialogue]]
speaker = "unk"
original = "梨緒が予測した未来の中で、ジグが動き出す。"
translation = "리오가 예측한 미래 속에서 지그가 움직이기 시작한다."

[[dialogue]]
speaker = "unk"
original = "星力を後方に放出して加速し、劫火を帯びた一閃を見舞う、単純明快にして必殺の動作。"
translation = "성력을 후방으로 방출해 가속하고, 겁화를 머금은 일격을 가하는, 단순명쾌하면서도 필살의 동작."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（見えた……！）"
translation = "(보였다……!)"

[[dialogue]]
speaker = "unk"
original = "魔剣の斬撃と吹き荒れる炎の嵐──その暴威の中にわずかな<ruby>間隙<rt>かんげき</rt></ruby>を見つけ、背後を取って雷の矢を放つ……！"
translation = "마검의 참격과 휘몰아치는 화염의 폭풍── 그 폭위 속에서 미세한 틈새를 찾아내 등 뒤를 잡고 번개의 화살을 쏜다……!"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「──」"
translation = "「──」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（──！？\u3000この動きではジグに斬られる……！？）"
translation = "(──!? 이 움직임으로는 지그에게 베인다……!?)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（ジグがノルンの予測を上回った……？\u3000ならば今度は私から──）"
translation = "(지그가 노른의 예측을 상회했다고……? 그렇다면 이번엔 내가──)"

[[dialogue]]
speaker = "unk"
original = "距離を保ちながら矢の雨を放つと、ジグは剣で矢を軽々と切り払う。"
translation = "거리를 유지하며 화살비를 퍼붓자 지그는 검으로 화살을 가볍게 쳐낸다."

[[dialogue]]
speaker = "unk"
original = "しかしそれは牽制。瞬時に頭上を取り、クロスボウを撃つ。"
translation = "하지만 그것은 견제. 순식간에 머리 위를 점하고 크로스보우를 쏜다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（この矢を受け止めようとして、ジグの姿勢が崩れたところをさらに追撃する……）"
translation = "(이 화살을 받아내려다 지그의 자세가 무너진 틈을 타 더욱 추격한다……)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（ここだ……！）"
translation = "(여기다……!)"

[[dialogue]]
speaker = "unk"
original = "矢が旋風を巻き起こしながらジグに迫る。だが──"
translation = "화살이 선풍을 일으키며 지그에게 육박한다. 하지만──"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「──」"
translation = "「──」"

[[dialogue]]
speaker = "unk"
original = "しかしジグは剣から炎を迸らせ、矢ごと斬って捨てた。"
translation = "하지만 지그는 검에서 불꽃을 뿜어내며 화살째로 베어 넘겼다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（く──！？\u3000また斬られた……！？）"
translation = "(큭──!? 또 베였다고……!?)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（それなら次は──）"
translation = "(그렇다면 다음은──)"

[[dialogue]]
speaker = "unk"
original = "右から、左から、あるいは下から。攻め方を変えて、一瞬の間に何通りもの未来を予測する。"
translation = "오른쪽에서, 왼쪽에서, 혹은 아래에서. 공격 방식을 바꿔가며 찰나의 순간에 수많은 미래를 예측한다."

[[dialogue]]
speaker = "unk"
original = "しかし届かない。何度動きを読もうとも、その度にジグが梨緒の予測を上回る。"
translation = "하지만 닿지 않는다. 몇 번이고 움직임을 읽으려 해도 그때마다 지그가 리오의 예측을 앞지른다."

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「フフ……」"
translation = "「후후……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（何だ、この違和感は……？）"
translation = "(뭐지, 이 위화감은……?)"

[[dialogue]]
speaker = "unk"
original = "梨緒が何をしても、予測の中のジグは、梨緒の動きを見透かしたように反応してくる。"
translation = "리오가 무엇을 하든 예측 속의 지그는 리오의 움직임을 꿰뚫어 본 것처럼 반응해 온다."

[[dialogue]]
speaker = "unk"
original = "まるで鏡を見ているような奇妙な感覚が、梨緒を戸惑わせていた。"
translation = "마치 거울을 보고 있는 듯한 기묘한 감각이 리오를 당혹스럽게 했다."

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「おや、驚いたな」"
translation = "「어라, 놀라운걸.」"

[[dialogue]]
speaker = "unk"
original = "しかし、驚嘆の声を漏らしたのはジグの方だった。"
translation = "하지만 경탄의 목소리를 흘린 것은 지그 쪽이었다."

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「私が見た可能性に干渉してくるなんてね。なかなか心地が悪い」"
translation = "「내가 본 가능성에 간섭해 오다니 말이야. 꽤 기분이 나빠.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「可能性……？」"
translation = "「가능성……?」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「ああ、私には見えるんだよ。可能性がね」"
translation = "「아아, 나에게는 보이거든. 가능성이 말이야.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「せっかくだし、そろそろ種明かしをしてもいいかな」"
translation = "「이왕 이렇게 된 거 슬슬 정체를 밝혀도 되려나.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「私の……いや、レナーテ・Ｚ・サイフリートの祖先は竜殺しの英雄ジークフリート──あるいはシグルドだそうだ」"
translation = "「나의…… 아니, 레나테 Z 자이프리트의 조상은 용을 잡은 영웅 지크프리트── 혹은 시구르드라고 하더군.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「そしてサイフリートの一族は、ある能力を発現することがある」"
translation = "「그리고 자이프리트 일족은 어떤 능력을 발현할 때가 있어.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「それはものに秘められた才能や潜在能力を見通すというもの」"
translation = "「그건 사물에 비겨진 재능이나 잠재 능력을 꿰뚫어 본다는 것.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「私は一族の中でも特に強い力を持って生まれ、事象に紐づく可能性すら見ることができた」"
translation = "「나는 일족 중에서도 특히 강한 힘을 타고나, 사상에 얽힌 가능성조차 볼 수 있었다」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「私はこれを『<ruby>天機<rt>てんき</rt></ruby>の星眼』と呼んでいる」"
translation = "「나는 이것을 『천기의 성안』이라 부르고 있지」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「どちらかといえば、ジークフリートというより、レギンの裏切りを知ったシグルドの方に近いけど……まぁ些細なことだ」"
translation = "「어느 쪽인가 하면, 지크프리트라기보다 레긴의 배신을 알게 된 시구르드 쪽에 가깝지만…… 뭐, 사소한 일이다」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「君にも言ったことがあっただろう。『不可能が可能になるような大層な力じゃない』と」"
translation = "「너에게도 말한 적이 있었지. 『불가능이 가능해질 정도의 거창한 힘은 아니다』라고」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「だけど君の『可能性』を見通せば、どう動くか手に取るようにわかる」"
translation = "「하지만 너의 『가능성』을 꿰뚫어 보면, 어떻게 움직일지 손바닥 들여다보듯 알 수 있어」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「私が感じた違和感はそのせいか……！」"
translation = "「내가 느꼈던 위화감은 그 때문인가……!」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「そうだ。原理は違うものの、私もアガサも同種の力を持ったせいで、お互い妙な感覚を覚えていたようだね」"
translation = "「그렇다. 원리는 다르지만, 나도 아가사도 동종의 힘을 가진 탓에 서로 묘한 감각을 느끼고 있었던 모양이네」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「本来、私が一度見た可能性は変わらないものだ」"
translation = "「본래, 내가 한 번 본 가능성은 변하지 않는 법이다」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「私がその可能性を確定させる選択をすれば、未来もそうなる。だけど今の君は例外らしい」"
translation = "「내가 그 가능성을 확정시키는 선택을 하면 미래도 그렇게 되지. 하지만 지금의 너는 예외인 모양이야」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「君の方は……ふむ。『因果』を司る守護天使、《運命》のノルンの力か」"
translation = "「너 쪽은…… 흠. 『인과』를 관장하는 수호천사, 《운명》의 노른의 힘인가」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「彼女は遥か昔に消滅したはずだけど、よくそんなものを引っ張り出してきたものだ。リクリエに敗北した者同士お似合いだよ」"
translation = "「그녀는 아주 오래전에 소멸했을 터인데, 잘도 그런 것을 끌어냈구나. 리크리에에 패배한 자들끼리 잘 어울려」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ジグ……！」"
translation = "「지그……!」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「だけど因果の糸を辿って理解したんじゃないかい？\u3000ノルンの力では、私に勝つことはできないと」"
translation = "「하지만 인과의 실을 따라가며 이해하지 않았니? 노른의 힘으로는 나에게 이길 수 없다는 것을」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「……ッ！」"
translation = "「……윽!」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「では君に、可能性ではなく現実の敗北を与えよう」"
translation = "「그럼 너에게 가능성이 아닌 현실의 패배를 안겨주지」"

[[dialogue]]
speaker = "unk"
original = "ジグが剣を構え、星力を爆発させて一直線に迫る。それは梨緒が予測で見た光景だ。"
translation = "지그가 검을 겨누고 성력을 폭발시켜 일직선으로 육박한다. 그것은 리오가 예측으로 보았던 광경이다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（紙一重でかいくぐり、背後から狙い撃つ──いや、それはすでに破られた）"
translation = "（종이 한 장 차이로 빠져나가 배후에서 저격한다── 아니, 그것은 이미 파훼당했어）"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（それなら距離を取って──）"
translation = "（그렇다면 거리를 두고──）"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「無駄だよ」"
translation = "「무의미해」"

[[dialogue]]
speaker = "unk"
original = "ジグは梨緒の動きがわかっていたかのように……いや、わかっていて、さらに加速する。"
translation = "지그는 리오의 움직임을 알고 있었다는 듯이…… 아니, 알고서 더욱 가속한다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「──ッ」"
translation = "「──윽」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「くああああぁっ！！」"
translation = "「크아아아아악!!」"

