[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「はあ～、食った食った。どんなもんかと思ったが、ウミノサチとやらもなかなか美味えな」"
translation = "「하아~ 잘 먹었다. 어떤가 싶었는데, 우미노사치(해산물)라는 것도 꽤 맛있네.」"

[[dialogue]]
speaker = "unk"
original = "キサナの皿には空になった貝殻や魚の骨が積まれている。海鮮バーベキューを楽しんだ証だ。"
translation = "키사나의 접시에는 비워진 조개껍데기와 생선뼈가 쌓여 있다. 해산물 바비큐를 즐겼다는 증거다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ。この辺りで獲れる珍しい貝や魚みたいだ。初めて見たけど美味しかった」"
translation = "「응. 이 근처에서 잡히는 희귀한 조개나 생선 같아. 처음 봤지만 맛있었어.」"

[[dialogue]]
speaker = "unk"
original = "俺とキサナは宿泊券を使い、流星市国を離れて沿岸のリゾート地を訪れていた。"
translation = "나와 키사나는 숙박권을 사용해 유성시국을 떠나 해안가 리조트를 방문했다."

[[dialogue]]
speaker = "unk"
original = "ここは小さなプライベートビーチと食事つきで至れり尽くせりだ。"
translation = "이곳은 작은 프라이빗 비치와 식사가 포함된, 아주 극진한 곳이다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「景色も綺麗だし、キサナのおかげだな」"
translation = "「경치도 예쁘고, 키사나 덕분이야.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ああ、アタシに感謝しな。ひれ伏したっていいんだぜ？」"
translation = "「아아, 나한테 감사하라고. 엎드려 절이라도 해도 된다고?」"

[[dialogue]]
speaker = "unk"
original = "宿泊券を当てたのはキサナだ。食材の買い出しに出たと思ったら、宿泊券を持って帰ってきて驚いた。"
translation = "숙박권을 뽑은 건 키사나다. 식재료를 사러 간 줄 알았더니 숙박권을 가지고 돌아와서 깜짝 놀랐다."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「アタシには幸運なんてないと思ったが、そうでもないらしい。──いや」"
translation = "「나에겐 행운 따위 없다고 생각했는데, 그렇지도 않은 모양이네. ──아니.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「コラプサーになって命拾いしたし、オマエにも出会えた。生まれたところがクソだったってだけか」"
translation = "「콜랩서가 되어 목숨을 건졌고, 너와도 만났지. 태어난 곳이 거지 같았을 뿐인가.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「まっ、悪くはねえな」"
translation = "「뭐, 나쁘지 않네.」"

[[dialogue]]
speaker = "unk"
original = "キサナの瞳が遠くを見つめる。"
translation = "키사나의 눈동자가 먼 곳을 바라본다."

[[dialogue]]
speaker = "unk"
original = "俺はキサナの過去全ては知らないし、知る必要があるとも思わない。今、そして、これから一緒にいてくれればいい。"
translation = "난 키사나의 과거를 전부 알지 못하고, 알 필요가 있다고도 생각하지 않는다. 지금, 그리고 앞으로 함께 있어 주면 그걸로 족하다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「これからどうする？\u3000また泳ぐか……カードでもする？」"
translation = "「이제 뭐 할까? 다시 수영할까…… 아니면 카드라도 할래?」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ああ？\u3000やることつったら、そりゃあ……コレだろ」"
translation = "「아앙? 할 거라면 당연히…… 이거지.」"

[[dialogue]]
speaker = "unk"
original = "キサナが俺の顔に手を添えて──"
translation = "키사나가 내 얼굴에 손을 얹고──"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ちゅっ<emoji=heart04>」"
translation = "「쪽<emoji=heart04>」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ははっ、醤油味かよオマエ」"
translation = "「하핫, 너 간장 맛 나는데.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「キサナこそ」"
translation = "「키사나야말로.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「んんっ……んちゅっ、れぇろ……ちゅるんじゅる……ちゅぅ……じゅる、じゅるるるん<emoji=heart04>」"
translation = "「으음…… 응츄, 레로…… 츄릅쥬릅…… 츄…… 쥬릅, 쥬르르릅<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "キスは戯れるようなものから激しいものに変わっていって──"
translation = "키스는 장난스러운 것에서 격렬한 것으로 변해갔고──"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ああもう我慢できねえ、ヤるぞっ！」"
translation = "「아아 진짜 못 참겠어, 하자!」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「オラ、腹が膨れたら次はセックスだ」"
translation = "「오라, 배가 불렀으면 다음은 섹스다.」"

[[dialogue]]
speaker = "unk"
original = "キサナがぐりぐりとお尻を俺に押し付けてくる。これはキサナがセックスしたいときのポーズだ。"
translation = "키사나가 그리그리 엉덩이를 나에게 밀어붙여 온다. 이건 키사나가 섹스하고 싶을 때의 포즈다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……ここでするのか？」"
translation = "「……여기서 하는 거야?」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「あ？\u3000今更だろ。初めてだって公園だったろうが」"
translation = "「앙? 새삼스럽게. 처음 할 때도 공원이었잖아.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「あれはキサナがいきなり巻き込んできたから……」"
translation = "「그건 키사나가 갑자기 끌어들여서 그런 거고……」"

[[dialogue]]
speaker = "unk"
original = "俺とキサナが初めてセックスしたのは、深夜の公園で、噴水で水浴びしていたキサナを目撃したのがきっかけだった。めちゃくちゃな初体験だったと今でも思う。"
translation = "나와 키사나가 처음 섹스한 것은 심야의 공원에서 분수에서 물놀이를 하던 키사나를 목격한 것이 계기였다. 엉망진창인 첫 경험이었다고 지금도 생각한다."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ごちゃごちゃうるせえ。アタシとヤりたいのかヤりたくないのか、どっちなんだよ？」"
translation = "「투덜투덜 시끄러워. 나랑 하고 싶은 거야, 하기 싫은 거야, 어느 쪽이야?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それはヤりたいに決まってる」"
translation = "「그거야 하고 싶은 게 당연하지.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「じゃあ自分に正直になれや。アタシはもう準備できてんぞ」"
translation = "「그럼 자기 자신에게 솔직해지라고. 난 이미 준비됐으니까.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「というか、オマエがアタシの身体ジロジロ見てんの分かってんだからな。おかげでアタシも火照ってきやがった」"
translation = "「그보다, 네가 내 몸 빤히 쳐다보고 있는 거 다 아니까 말이야. 덕분에 나도 달아올라 버렸다고.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ごめん……」"
translation = "「미안……」"

[[dialogue]]
speaker = "unk"
original = "歩けば揺れる大きなおっぱい、形のいいお尻、きゅっとくびれた腰……普段は露出の少ない恰好で分かりづらいが、キサナはスタイルがとてもいい。"
translation = "걸을 때마다 흔들리는 커다란 가슴, 모양 예쁜 엉덩이, 잘록한 허리…… 평소엔 노출이 적은 복장이라 알기 어렵지만, 키사나는 스타일이 매우 좋다."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「謝んなって。アタシも……イヤじゃねえからよ。だからとっととよこせ。それともアタシの口から言って欲しいのか？」"
translation = "「사과하지 마. 나도…… 싫지 않으니까. 그러니까 얼른 내놔. 아니면 내 입으로 말해주길 바라는 거야?」"

[[dialogue]]
speaker = "unk"
original = "四つん這いの状態で、キサナは見せつけるようにお尻を振る。"
translation = "네 발로 엎드린 상태에서, 키사나는 과시하듯 엉덩이를 흔든다."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「……オマエのでっけえチ○ポ、早くアタシのま○こにぶち込んでくれ。アタシのま○こもウズウズしてんだ」"
translation = "「……네 커다란 자지, 빨리 내 보지에 박아줘. 내 보지도 근질근질하다고.」"

[[dialogue]]
speaker = "unk"
original = "秘所を広げて見せると、確かに期待で濡れていた。先端をあてがうだけでも気持ちいい。"
translation = "비소를 벌려 보여주자, 과연 기대감에 젖어 있었다. 끝부분을 갖다 대는 것만으로도 기분이 좋다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「じゃあ、挿れるよ」"
translation = "「그럼, 삽입할게.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ああ、来い……んっ<emoji=heart04>」"
translation = "「아아, 와라…… 응<emoji=heart04>」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「んあああぁっ～～～～～<emoji=heart04>\u3000チ○ポ入ってきたっ<emoji=heart04>」"
translation = "「응아아아악~~~~~<emoji=heart04> 자지 들어왔다아<emoji=heart04>」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「あっ、んんっ……ふあ……はぁ……<emoji=heart04>\u3000相変わらずデケぇんだよ……オマエの……<emoji=heart04>」"
translation = "「앗, 응…… 후아…… 하아……<emoji=heart04> 여전히 더럽게 크네…… 네 건……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "奥まで進むと、きゅっと締まる。愛液でとろとろなのに、きつく締め付けられて気持ちいい。"
translation = "안쪽까지 들어가자 꽉 조여온다. 애액으로 걸쭉한데도 타이트하게 조여와서 기분 좋다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「あ、ゴム着けてない……」"
translation = "「아, 고무 안 꼈어……」"

[[dialogue]]
speaker = "unk"
original = "一緒に暮らしてセックスの頻度が増えてから、妊娠の可能性が高い日──いわゆる『危ない日』には避妊具を使うようにしていた。"
translation = "같이 살며 섹스 빈도가 늘어난 뒤로, 임신 가능성이 높은 날── 소위 말하는 '위험한 날'에는 피임구를 사용하기로 했었다."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「んんっ……冷めること言うんじゃねえ。要らねえって」"
translation = "「으응…… 흥 깨지는 소리 하지 마. 필요 없으니까.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「大丈夫な日ってこと？」"
translation = "「괜찮은 날이라는 거야?」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ち、違えよ。……デキたら産んでやるって言ってんだ」"
translation = "「아, 아냐. ……생기면 낳아주겠다고 말하는 거야.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「…………っ！」"
translation = "「…………!」"

[[dialogue]]
speaker = "unk"
original = "キサナの膣からいつも以上に蜜が溢れていることに気付く。このセックスは、愛情を確かめて気持ちよくなる、それだけじゃなくて──"
translation = "키사나의 질에서 평소보다 더 많은 꿀이 넘쳐나고 있다는 것을 깨닫는다. 이 섹스는 사랑을 확인하고 기분 좋아지는 것, 그뿐만이 아니라──"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「んん、あ、あはぁっ<emoji=heart04>\u3000は、ふぁ、ああっ……ああ、ひ、んあぁっ<emoji=heart04>」"
translation = "「으음, 아, 아하아<emoji=heart04> 하, 후아, 아앗…… 아아, 히, 응아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「はぁ、はぁ……あ、んっ<emoji=heart04>\u3000どうした？\u3000息が、荒いぜ……あっ<emoji=heart04>\u3000そんなにアタシを孕ませたかった、のかよっ」"
translation = "「하아, 하아…… 아, 응<emoji=heart04> 왜 그래? 숨이, 거칠잖아…… 앗<emoji=heart04> 그렇게나 나를 임신시키고 싶었던, 거냐고.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「当たり前だろ。好きな人に子どもを産んで欲しいって思うのは」"
translation = "「당연하잖아. 좋아하는 사람의 아이를 낳아줬으면 좋겠다고 생각하는 건.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「はっ、んっ……当たり前、か……。じゃあアタシが、サカってんのも、当たり前、だよな？\u3000あ、あふっ<emoji=heart04>」"
translation = "「핫, 응…… 당연, 한가……. 그럼 내가, 발정 난 것도, 당연, 한 거겠지? 아, 아후<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「だったら、俺も嬉しいっ！」"
translation = "「그렇다면 나도 기뻐!」"

[[dialogue]]
speaker = "unk"
original = "キサナが俺を想って感じてくれているんだと思うと興奮も高まる。夏の浜辺は暑くて、でもそれ以上に体の内側から昂ってくる。"
translation = "키사나가 나를 생각하며 느껴주고 있다고 생각하니 흥분도 고조된다. 여름 해변은 덥고, 하지만 그 이상으로 몸 안쪽에서부터 달아오른다."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「はっ、ああぁっ<emoji=heart04>\u3000いいぜ、ぶつけてこい。オマエの生チ○ポ、受け止めてやるよ」"
translation = "「핫, 아아아아<emoji=heart04> 좋아, 부딪쳐 와라. 네 생자지, 받아내 주마.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「んはああっ<emoji=heart04>\u3000ハハッ、いい子だ……もっと、もっと……たらふく喰わせてくれっ」"
translation = "「응하아아<emoji=heart04> 하핫, 착한 아이네…… 더, 더 많이…… 배부르게 먹여달라고.」"

[[dialogue]]
speaker = "unk"
original = "キサナの膣内は熱くて、ペニスを逃がすまいと握り締めてくる。突く度に愛液が溢れてきて、感じてくれていると分かる。"
translation = "키사나의 질 내부는 뜨거워서, 페니스를 놓치지 않으려는 듯 꽉 쥐어온다. 찌를 때마다 애액이 흘러나와, 느껴주고 있다는 걸 알 수 있다."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「んっ、はああっ<emoji=heart04>\u3000こうしてると、獣の交尾みたいだ……<emoji=heart04>\u3000ああぁっ<emoji=heart04>」"
translation = "「응, 하아아<emoji=heart04> 이러고 있으니 짐승의 교미 같아……<emoji=heart04> 아아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「いや、ちがわねえかっ……<emoji=heart04>\u3000あっ、んんっ、はあぁっ<emoji=heart04>\u3000アタシら、動物みたいに交尾してんだもんなっ<emoji=heart04>」"
translation = "「아니, 다를 거 없나……<emoji=heart04> 앗, 응, 하아아<emoji=heart04> 우리, 동물처럼 교미하고 있는 거니까 말이야<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "キサナが四つん這いになり、俺が後ろから突く。まさしく獣の交尾だ。"
translation = "키사나가 네 발로 엎드리고, 내가 뒤에서 찌른다. 그야말로 짐승의 교미다."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「はあぁっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000オマエも、腰ふんの、上手くなったよなっ……ああっ<emoji=heart04>」"
translation = "「하아아<emoji=heart04> 앗<emoji=heart04> 너도, 허리 돌리는 거, 제법 능숙해졌잖아…… 아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「あっ<emoji=heart04>\u3000ああ<emoji=heart04>\u3000マジでこんな、ヤリまくる関係になるとは、思わなかった、ぜ……んあっ……はあぁっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 아아<emoji=heart04> 진짜 이런, 미친 듯이 하는 관계가 될 줄은, 몰랐다고…… 응앗…… 하아아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "最初は敵として出会い、偶然から体を重ね、今は恋人として睦みあっている。"
translation = "처음엔 적으로서 만났고, 우연히 몸을 섞었으며, 지금은 연인으로서 사랑을 나누고 있다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「俺もだ。だけど、キサナとあの夜に会えてよかった」"
translation = "「나도 마찬가지야. 하지만 키사나와 그날 밤에 만나서 다행이야.」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ハッ、襲われた、のが、そんなによかったのかよ……この変態魔王……んんはぁっ<emoji=heart04>」"
translation = "「핫, 덮쳐진, 게, 그렇게 좋았던 거냐…… 이 변태 마왕…… 응으응하아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "初めてのときは襲われる形だったけど、今はこうして背中を預けてくれる。それも嬉しい。"
translation = "첫 경험 때는 덮쳐지는 형태였지만, 지금은 이렇게 등을 맡겨준다. 그것도 기쁘다."

[[dialogue]]
speaker = "unk"
original = "……ふと、無防備な背中が気になって、つぅっとなぞってみる。"
translation = "……문득, 무방비한 등이 신경 쓰여서, 스윽 하고 훑어본다."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ひゃあ！？\u3000な、なんだよいきなり！？」"
translation = "「히야앗!? 뭐, 뭐야 갑자기!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ごめん、なんとなく気になって……」"
translation = "「미안, 왠지 모르게 신경 쓰여서……」"

[[dialogue]]
speaker = "unk"
original = "背中に触れた瞬間、びくんとキサナの身体が反応した。"
translation = "등에 닿는 순간, 비쿤 하고 키사나의 몸이 반응했다."

[[dialogue]]
speaker = "unk"
original = "その仕草にイタズラ心が疼いて──"
translation = "그 몸짓에 장난기가 동해서──"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「んひゃあっ<emoji=heart04>\u3000今度は、わき腹かよっ……あっ、んあっ、あんっ<emoji=heart04>\u3000それ、やめろっ<emoji=heart04>\u3000優しく撫でられたら、くすぐったくて、感じちまうっ<emoji=heart04>」"
translation = "「응히야아<emoji=heart04> 이번엔, 옆구리냐…… 앗, 응앗, 아앙<emoji=heart04> 그거, 하지 마<emoji=heart04> 상냥하게 어루만져지면, 간지러워서, 느껴버린다고<emoji=heart04>」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ひゃあっ<emoji=heart04>\u3000ああ、ん、ふっ<emoji=heart04>\u3000ああっ<emoji=heart04>\u3000やめろつってんだろ、この、バカぁっ<emoji=heart04>\u3000あふっ<emoji=heart04>\u3000あっ<emoji=heart04>」"
translation = "「히야아<emoji=heart04> 아아, 응, 후<emoji=heart04> 아앗<emoji=heart04> 하지 말라니까, 이 바보야아<emoji=heart04> 아후<emoji=heart04> 앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "口ではそう言いつつも声と喘ぎは甘さを増し、それに伴って締め付けも強くなっていった。"
translation = "입으로는 그렇게 말하면서도 목소리와 신음은 달콤함을 더해갔고, 그에 따라 조임도 강해져 갔다."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ああっ<emoji=heart04>\u3000は、はぁ、あんっ<emoji=heart04>\u3000オマ、それ、やめ、本当にやめ──」"
translation = "「아앗<emoji=heart04> 하, 하아, 아앙<emoji=heart04> 너, 그거, 그마, 진짜 그만──」"

[[dialogue]]
speaker = "unk"
original = "背中、わき腹、腰へと順に触っていき、最後には……"
translation = "등, 옆구리, 허리로 순서대로 만져가다 마지막에는……"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「んにゃあああああっ<emoji=heart04>\u3000あ、ああっ<emoji=heart04>\u3000しっぽは、勝手に触んなって、いつも……あっ、ふ、ふぅぅ、んなああぁっ<emoji=heart04>」"
translation = "「으냐아아아아아<emoji=heart04> 아, 아앗<emoji=heart04> 꼬리는, 마음대로 만지지 말라고, 맨날…… 앗, 후, 후우우, 응나아아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺がしっぽに触れるたび、キサナの身体がビクビク震える。しっぽを撫でたり、握ったり、緩急をつけながら弄ぶ。"
translation = "내가 꼬리를 만질 때마다 키사나의 몸이 부들부들 떨린다. 꼬리를 쓰다듬거나, 쥐거나, 완급을 조절하며 농락한다."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「んんっ<emoji=heart04>\u3000こんの、バカっ<emoji=heart04>\u3000あ、ん、にゃっ<emoji=heart04>\u3000あとで絶対、ボコボコにしてやるぅっ<emoji=heart04>\u3000にゃあああっ<emoji=heart04>」"
translation = "「으응<emoji=heart04> 이, 바보가<emoji=heart04> 아, 응, 냐앗<emoji=heart04> 나중에 절대, 가만 안 둘 거야아<emoji=heart04> 냐아아아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "感じながらも強がるキサナが可愛くて、俺もヒートアップしてしまう。"
translation = "느끼면서도 강한 척하는 키사나가 귀여워서 나도 히트 업 해버린다."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「んな、あああぁっ<emoji=heart04>\u3000ふにゃあああ～～～～～っ<emoji=heart04>」"
translation = "「으냐, 아아아아<emoji=heart04> 후냐아아아~~~~~<emoji=heart04>」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「んんっ<emoji=heart04>\u3000オマ、調子に、のん、にゃぁっ……んあっ<emoji=heart04>\u3000ん、ん、んんっ、あ、ああんっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>」"
translation = "「으응<emoji=heart04> 너, 적당히, 까, 냐아…… 응앗<emoji=heart04> 응, 응, 으응, 아, 아아앙<emoji=heart04> 응아아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "しっぽを握りながら、腰を叩きつける。キサナの入り口はビショビショで、突くたびに水音が鳴る。"
translation = "꼬리를 쥐면서 허리를 처박는다. 키사나의 입구는 흥건해서 찌를 때마다 물소리가 울린다."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「あ、あ、あああぁ～～～っ<emoji=heart04>\u3000ふにゃ、あ、あ、んっ<emoji=heart04>\u3000はあ、ん、あああぁっ<emoji=heart04><emoji=heart04>」"
translation = "「아, 아, 아아아아~~~<emoji=heart04> 후냐, 아, 아, 응<emoji=heart04> 하아, 응, 아아아아<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "感じてくれるのが嬉しくて、感じさせるのが楽しくて、つい激しくしてしまう。"
translation = "느껴주는 게 기뻐서, 느끼게 하는 게 즐거워서, 그만 격렬하게 하고 만다."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「クソ、あっ<emoji=heart04>\u3000好き、放題、されてるのにっ、ふあっ<emoji=heart04>\u3000気持ち、よすぎて、逆らえ、ねえっ<emoji=heart04>」"
translation = "「젠장, 앗<emoji=heart04> 마음, 대로, 당하고 있는데, 후아<emoji=heart04> 기분, 너무 좋아서, 거역을, 못 하겠어<emoji=heart04>」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「あ、ああっ<emoji=heart04>\u3000ん、んにゃぁっ<emoji=heart04>\u3000ダメだ、何も考えられ、ねえっ<emoji=heart04>\u3000しっぽ、触られながら、チ○ポ、ぶち込まれたら、頭バカになっちまうぅっ<emoji=heart04>」"
translation = "「아, 아앗<emoji=heart04> 응, 응냐아<emoji=heart04> 안 돼, 아무 생각도, 안 나<emoji=heart04> 꼬리, 만져지면서, 자지, 박히면, 머리 바보가 돼버려어<emoji=heart04>」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「しっぽで、からだ、ゾクゾクしてっ<emoji=heart04>\u3000チ○ポで、ま○こ、かきまわされてっ<emoji=heart04>\u3000んにゃああぁっ<emoji=heart04>\u3000はぁ、はぁ、はうっ<emoji=heart04>」"
translation = "「꼬리 때문에, 몸이, 찌릿찌릿해서<emoji=heart04> 자지 때문에, 보지, 휘저어져서<emoji=heart04> 으냐아아아<emoji=heart04> 하아, 하아, 하우<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "キサナも限界が近いらしく、膣肉がきゅうきゅう締め付けてくる。しっぽを触るのがお気に召したのか、これまでにない乱れようだ。"
translation = "키사나도 한계가 가까운지 질 근육이 꽉꽉 조여온다. 꼬리를 만지는 게 마음에 들었는지 이전까지 없던 흐트러진 모습이다."

[[dialogue]]
speaker = "unk"
original = "だけどしっぽの触り方を変えるうちに、根元の方に手が当たって──"
translation = "하지만 꼬리를 만지는 방식을 바꾸는 동안, 뿌리 쪽에 손이 닿아서──"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ふにゃ～～っ！？」"
translation = "「후냐아~~!?」"

[[dialogue]]
speaker = "unk"
original = "その瞬間、キサナの腰が大きく跳ね、膣内もぎゅっと強く締まった。"
translation = "그 순간 키사나의 허리가 크게 튀어 올랐고, 질 내부도 꽉 강하게 조여졌다."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「なんだ、今の……しっぽの付け根、触られたら、腹ん中、きゅんきゅんするっ<emoji=heart04>\u3000んん、ふああぁっ<emoji=heart04>」"
translation = "「뭐야, 방금 거…… 꼬리 뿌리, 만져지니까, 배 속이, 큥큥거려<emoji=heart04> 으응, 후아아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ああっ<emoji=heart04>\u3000んにゃあぁっ<emoji=heart04>\u3000だから、触んなつってんだろ、こんのバカぁっ<emoji=heart04>\u3000はうぅ～～～<emoji=heart04>」"
translation = "「아앗<emoji=heart04> 응냐아아<emoji=heart04> 그러니까, 만지지 말라니까, 이 바보야아<emoji=heart04> 하우우우~~~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "しっぽの付け根を指先で、円を描くように撫でる。"
translation = "꼬리 뿌리를 손가락 끝으로 원을 그리듯 어루만진다."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ふざ、けんなっ<emoji=heart04>\u3000ん、んあ、んんっ<emoji=heart04>\u3000はあぁ……はあぁ～～っ<emoji=heart04>\u3000なんなんだよ、これっ<emoji=heart04>」"
translation = "「웃기, 지 마<emoji=heart04> 응, 응아, 으응<emoji=heart04> 하아아…… 하아아~~<emoji=heart04> 뭐야, 이거어<emoji=heart04>」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「んああっ<emoji=heart04>\u3000腹ん中、熱くてっ<emoji=heart04>\u3000ま○こ切なくて疼いちまうっ<emoji=heart04>\u3000んん～～っ<emoji=heart04>」"
translation = "「응아아<emoji=heart04> 배 안이, 뜨거워서<emoji=heart04> 보지가 애달파서 욱신거려버려<emoji=heart04> 으으~~<emoji=heart04>」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「はあぁ～っ<emoji=heart04>\u3000欲しいっ、オマエのせーし、欲しいっ<emoji=heart04>\u3000アタシの腹ん中に注いでほしいっ<emoji=heart04>\u3000あぁっ<emoji=heart04>」"
translation = "「하아아~<emoji=heart04> 원해, 네 정자, 원해<emoji=heart04> 내 배 안에 부어줬으면 좋겠어<emoji=heart04> 아아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "キサナの膣がぎりぎりと俺のペニスを締め付ける。彼女の身体が俺の子供を欲しているんだと、本能で感じる。"
translation = "키사나의 질이 바짝바짝 내 페니스를 조여온다. 그녀의 몸이 내 아이를 원하고 있다는 것을 본능으로 느낀다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「本当に、このまま中に出していいんだな？」"
translation = "「정말로, 이대로 안에 내보내도 괜찮은 거지?」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「あぁっ<emoji=heart04>\u3000出せ、出してくれっ<emoji=heart04>\u3000オマエのせーし、欲しくて、おかしくなっちまうぅ～<emoji=heart04>\u3000んなああぁあ～～っ<emoji=heart04>」"
translation = "「아아<emoji=heart04> 내보내, 내보내 줘<emoji=heart04> 네 정자, 원해서, 이상해져 버려어~<emoji=heart04> 으나아아아~~<emoji=heart04>」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「せーし、せーし、せーしっ<emoji=heart04>\u3000アタシの、腹ん中に、いっぱいくれっ<emoji=heart04>\u3000交尾、だから<emoji=heart04>\u3000子ども、できてもいいからぁっ<emoji=heart04>」"
translation = "「정자, 정자, 정자<emoji=heart04> 내, 배 안에, 잔뜩 줘<emoji=heart04> 교미, 니까<emoji=heart04> 아이, 생겨도 좋으니까아<emoji=heart04>」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ちがう、子ども欲しいっ<emoji=heart04>\u3000んにゃっ<emoji=heart04>\u3000オマエの子ども、産みたいっ<emoji=heart04>\u3000ふああぁ～っ<emoji=heart04>」"
translation = "「아냐, 아이 원해<emoji=heart04> 으냐아<emoji=heart04> 네 아이, 낳고 싶어<emoji=heart04> 후아아~<emoji=heart04>」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「んにゃああああ～～っ<emoji=heart04>\u3000オマエの、せーしで、孕みたいぃっ<emoji=heart04>\u3000孕ませて、くれっ<emoji=heart04>」"
translation = "「으냐아아아아~~<emoji=heart04> 네, 정자로, 임신하고 싶어어<emoji=heart04> 임신시켜, 줘<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "逃がさないとばかりに、キサナが足を絡めてきた。キサナ自身も俺に向かってお尻を叩きつけてくる。"
translation = "놓치지 않겠다는 듯이, 키사나가 다리를 얽어왔다. 키사나 자신도 나를 향해 엉덩이를 두드려온다."

[[dialogue]]
speaker = "unk"
original = "キサナが全力で俺を求めてくれている。喜びが胸を満たすと同時に、俺もキサナを満たしたいと思う。"
translation = "키사나가 전력으로 나를 원해주고 있다. 기쁨이 가슴을 채움과 동시에, 나도 키사나를 채워주고 싶다고 생각한다."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「はぁ、あ、あああ～っ<emoji=heart04>\u3000チ○ポ奥まできてるっ<emoji=heart04>\u3000アタシの腹ん中で、オマエのチ○ポ暴れてるっ<emoji=heart04>\u3000ん、ん、ふああぁっ<emoji=heart04>」"
translation = "「하아, 아, 아아아~<emoji=heart04> 자지 끝까지 오고 있어<emoji=heart04> 내 배 안에서, 네 자지가 날뛰고 있어<emoji=heart04> 응, 응, 후아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「アタシの、ん、子宮っ<emoji=heart04>\u3000子ども、作る、とこっ<emoji=heart04>\u3000オマエのチ○ポでぶっ叩かれてるっ<emoji=heart04>」"
translation = "「내, 응, 자궁<emoji=heart04> 아이, 만드는, 곳<emoji=heart04> 네 자지로 얻어맞고 있어<emoji=heart04>」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ふあ、あ、あ、ああっ<emoji=heart04>\u3000子ども作る交尾、いいっ<emoji=heart04>\u3000気持ちいい<emoji=heart04>\u3000んにゃぁっ<emoji=heart04>\u3000ああ、あ、あんっ<emoji=heart04>\u3000なあぁっ、あっ、あっ、あああっ～～～<emoji=heart04>」"
translation = "「후아, 아, 아, 아아<emoji=heart04> 아이 만드는 교미, 좋아<emoji=heart04> 기분 좋아<emoji=heart04> 으냐아<emoji=heart04> 아아, 아, 앙<emoji=heart04> 나아, 아, 아, 아아아~~~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "オスがメスを孕ませるための、命の交わり。"
translation = "수컷이 암컷을 임신시키기 위한, 생명의 어울림."

[[dialogue]]
speaker = "unk"
original = "キサナを孕ませたい。その一心で俺もまたがむしゃらに腰を振る。"
translation = "키사나를 임신시키고 싶다. 그 일념으로 나 또한 무아몽착으로 허리를 흔든다."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「は、は、はぁっ<emoji=heart04>\u3000ふにゃっ<emoji=heart04>\u3000あ～～、あ、ああああ～～～っ<emoji=heart04>\u3000んなああああぁぁっ<emoji=heart04>」"
translation = "「하, 하, 하아<emoji=heart04> 흐냐앗<emoji=heart04> 아~~, 아, 아아아아~~앗<emoji=heart04> 응나아아아아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「アタシの中でチ○ポ、ビクビクしてるっ<emoji=heart04>\u3000出る、せーしもうすぐ出るっ<emoji=heart04>\u3000ああっ<emoji=heart04>」"
translation = "「내 안에서 자지, 파르르 떨고 있어<emoji=heart04> 나온다, 정자 이제 곧 나온다앗<emoji=heart04> 아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「出せ、出せ、せーし出せっ<emoji=heart04>\u3000オマエのせーし、腹ん中、いっぱいにしてくれっ<emoji=heart04>\u3000オマエのせーしで孕ませろっ<emoji=heart04>」"
translation = "「내보내, 내보내, 정자 내보내줘<emoji=heart04> 너의 정자, 배 속, 가득 채워줘<emoji=heart04> 너의 정자로 임신시켜줘엇<emoji=heart04>」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「あ、あ、あ、ああああぁぁぁ～～～～～っ<emoji=heart04>\u3000孕む、孕む、孕むっ<emoji=heart04><emoji=heart04>\u3000オマエのせーしで孕むぅ～～～～～<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아, 아, 아, 아아아아아아~~~~~앗<emoji=heart04> 임신한다, 임신한다, 임신해애앗<emoji=heart04><emoji=heart04> 너의 정자로 임신해애~~~~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「んんんにゃああああああぁぁぁ～～～～～～～～っっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응으으냐아아아아아아아아~~~~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "しっぽを掴みながら、キサナの奥に射精する。"
translation = "꼬리를 잡으면서 키사나의 안쪽에 사정한다."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ああっ<emoji=heart04>\u3000せーし出てるぅ……ドクドクって、オマエのチ○ポがアタシん腹ん中でせーし吐き出してるぅ……<emoji=heart04>」"
translation = "「아앗<emoji=heart04> 정자 나오고 있어…… 울컥울컥하고, 네 자지가 내 배 속에서 정자 쏟아내고 있어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「あ、んんっ<emoji=heart04>\u3000オマエの子ども、孕ませろ……一滴残らず出せっ<emoji=heart04>\u3000せーし出せっ<emoji=heart04>\u3000んっ<emoji=heart04>」"
translation = "「아, 응읏<emoji=heart04> 네 아이, 임신시켜줘…… 한 방울도 남김없이 내보내줘엇<emoji=heart04> 정자 내보내줘엇<emoji=heart04> 응<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "精子を迎えに行くかのように、キサナがお尻を俺に押し付ける。"
translation = "정액을 맞이하러 가는 것처럼, 키사나가 엉덩이를 나에게 밀어붙인다."

[[dialogue]]
speaker = "unk"
original = "俺もまた、下半身に力を込めて精を放つ。ただただ、キサナの子宮に届けと念じて。"
translation = "나 또한 하반신에 힘을 주어 정액을 방출한다. 그저, 키사나의 자궁에 닿기를 염원하며."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「はぁ、はぁ……また、ビクって……あっ<emoji=heart04>\u3000腹ん中、せーし溜まってるぅ<emoji=heart04>\u3000あついぃぃ<emoji=heart04>」"
translation = "「하아, 하아…… 또, 울컥하고…… 앗<emoji=heart04> 배 속, 정자 쌓여 있어어<emoji=heart04> 뜨거워어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「あぁ……っ<emoji=heart04>\u3000腹いっぱいだぁ……<emoji=heart04>」"
translation = "「아아……앗<emoji=heart04> 배 가득하다아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "亀頭を子宮口に密着させたまま、俺とキサナはひとつの生き物のように全身を振るわせていた。"
translation = "귀두를 자궁구에 밀착시킨 채, 나와 키사나는 하나의 생물처럼 전신을 떨고 있었다."

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ん……んあ……んにゅ、ああ……ん、にゃ……んっ<emoji=heart04>\u3000あ……ん、抜けちま……」"
translation = "「음…… 응아…… 응뉴, 아아…… 응, 냐…… 응<emoji=heart04> 아…… 응, 빠져버려……」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ふぅー……ふぅー……ふぅー…………<emoji=heart04>」"
translation = "「후우─…… 후우─…… 후우─…………<emoji=heart04>」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ま○こからお前のせーえき溢れてきやがる……どんだけ出したんだよ」"
translation = "「보지에서 네 정액 흘러넘쳐 오잖아…… 얼마나 싼 거야」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「キサナを孕ませたくて、つい……」"
translation = "「키사나를 임신시키고 싶어서 그만……」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「うるせえ。いやまあ、それはいいんだけどよ……しっぽ勝手に触ってんじゃ、ねぇ」"
translation = "「시끄러워. 아니 뭐, 그건 상관없는데 말야…… 꼬리 마음대로 만지지 마, 정말」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「あいたぁっ！」"
translation = "「아야야!」"

[[dialogue]]
speaker = "unk"
original = "しっぽではたかれてしまった。当然と言えば当然だけど。むしろ殺されなかっただけ感謝だ。"
translation = "꼬리에 얻어맞고 말았다. 당연하다면 당연하지만. 오히려 살해당하지 않은 것만으로도 감사하다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「でも、キサナも気持ちよさそうだったし……」"
translation = "「하지만 키사나도 기분 좋은 것 같았고……」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「ああ？」"
translation = "「아앙?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ごめん。次からはセックスのときはしっぽ触らないようにするよ」"
translation = "「미안. 다음부터는 섹스할 때 꼬리 만지지 않도록 할게」"

[[dialogue]]
speaker_original = "キサナ"
speaker_translation = "키사나"
original = "「……そ、そうは言ってねえだろ。アタシが許したら、しっぽ触りながらヤっても…………ああもう、なんでもねえ、忘れろ！」"
translation = "「……그, 그렇게 말하진 않았잖아. 내가 허락하면, 꼬리 만지면서 해도………… 아아 정말, 아무것도 아냐, 잊어!」"

[[dialogue]]
speaker = "unk"
original = "それから、セックスする時はしっぽですりすり触れてくるのが癖になったキサナだった。"
translation = "그 후로 섹스할 때 꼬리로 부비부비하며 건드리는 것이 버릇이 된 키사나였다."

