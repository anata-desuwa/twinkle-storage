[[dialogue]]
speaker = "アポロ"
original = "「よっしゃーいくぞ魔王！\u3000スペシャル流星スパーイクッ！」"
translation = "「조아쓰 가자 마왕! 스페셜 유성 스파이크으!」"

[[dialogue]]
speaker = "マトイ"
original = "「ひゃあっ！？」"
translation = "「히앗!?」"

[[dialogue]]
speaker = "アナ"
original = "「なんて鋭いスパイク──さすが、あの大剣を振り回していただけはありますね」"
translation = "「정말 날카로운 스파이크── 과연, 그 대검을 휘두르던 실력답네요」"

[[dialogue]]
speaker = "アポロ"
original = "「わっはっは！\u3000これで我がアポロ様軍のリードだな！」"
translation = "「와하하! 이걸로 이 아폴로 님 군의 리드다!」"

[[dialogue]]
speaker = "ルリエル"
original = "「アポロ様軍ではなく、流星学園チームですから！」"
translation = "「아폴로 님 군이 아니라, 유성학원 팀이니까요!」"

[[dialogue]]
speaker = "ユウリ"
original = "「そーだぞ。チーム一丸となってだな……」"
translation = "「그렇다구. 팀이 하나가 되어서 말이지……」"

[[dialogue]]
speaker = "ユウリ"
original = "「ってあれ？\u3000うちらのリーダーのはずのフィオナがいねえな」"
translation = "「어라? 우리 팀 리더여야 할 피오나가 없네」"

[[dialogue]]
speaker = "アポロ"
original = "「問題ない！\u3000フィオナの分まであたしが大活躍すればいいのだ！\u3000魔王には負けんぞ！」"
translation = "「문제없어! 피오나 몫까지 내가 대활약하면 된다! 마왕에겐 지지 않는다고!」"

[[dialogue]]
speaker = "マトイ"
original = "「まずいよ会長……このままじゃ私たちの負けになっちゃう」"
translation = "「큰일이야 회장…… 이대로라면 우리가 지게 생겼어」"

[[dialogue]]
speaker = "unk"
original = "まだ追いつける"
translation = "아직 따라잡을 수 있어"

[[dialogue]]
speaker = "unk"
original = "新星は負けない"
translation = "신성은 지지 않아"

[[dialogue]]
speaker = "ヴィーナス"
original = "「──その意気よ！\u3000ビーチバレーだってなんだって、負けるわけにはいかないんだから！」"
translation = "「──그 기세야아! 비치발리볼이든 뭐든, 질 수는 없으니까!」"

[[dialogue]]
speaker = "セーラ"
original = "「あんなこと言ってるよ、ソフィアちゃん～？」"
translation = "「저런 소릴 하고 있어, 소피아 짱~?」"

[[dialogue]]
speaker = "ソフィア"
original = "「フフ……私のブリザードサーブで、息の根を止めて差し上げましょう」"
translation = "「후후…… 저의 블리자드 서브로, 숨통을 끊어드리지요」"

[[dialogue]]
speaker = "unk"
original = "と、その時……"
translation = "그때……"

[[dialogue]]
speaker = "ソフィア"
original = "「──ひゃああああああああああああああっっ！！！」"
translation = "「──히야아아아아아아아아아아아아앗!!!」"

[[dialogue]]
speaker = "unk"
original = "この冷風は……！"
translation = "이 냉풍은……!"

[[dialogue]]
speaker = "unk"
original = "冬のイタズラだ"
translation = "겨울의 장난이다"

[[dialogue]]
speaker = "マトイ"
original = "「寒かったぁ……！\u3000もう、ホントいきなり吹くんだから」"
translation = "「추웠어……! 정말, 갑자기 불어오니까」"

[[dialogue]]
speaker = "アナ"
original = "「例の隙間風というやつですね。またしても『冬』が入り込んできてしまいましたか──」"
translation = "「그 외풍이라는 녀석이군요. 또다시 『겨울』이 끼어들어 버린 것입니까──」"

[[dialogue]]
speaker = "ソフィア"
original = "「うぅぅ許せません……！\u3000こんな悪がはびこっていては、ろくにリゾートライフを満喫できません……！」"
translation = "「우으으 용서할 수 없어요……! 이런 악이 판치고 있어서는, 제대로 리조트 라이프를 만끽할 수 없잖아요……!」"

[[dialogue]]
speaker = "ルリエル"
original = "「着替え早すぎ！？\u3000いつの間に！？」"
translation = "「환복 너무 빨라!? 어느 사이에!?」"

[[dialogue]]
speaker = "リップル"
original = "「──タ、タイヘンで～す！\u3000ドナタか～！」"
translation = "「──크, 큰일입니더~! 아무나아~!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あら、リップルの声ね。行ってみましょう」"
translation = "「어머, 리플의 목소리네. 가보자」"

[[dialogue]]
speaker = "アポロ"
original = "「あ！\u3000待てオマエ達、勝負はまだついてないぞ～！」"
translation = "「아! 기다려 너희들, 승부는 아직 안 났다고~!」"

[[dialogue]]
speaker = "ユウリ"
original = "「──どうした、またかき氷が増えたか！？」"
translation = "「──무슨 일이야, 또 빙수가 늘어났나!?」"

[[dialogue]]
speaker = "フィオナ"
original = "「いえ、今度は鏡餅がなぜか突然降ってきて……」"
translation = "「아니요, 이번엔 카가미모치가 왠지 갑자기 떨어져 내려서……」"

[[dialogue]]
speaker = "ユウリ"
original = "「冬のモンならなんでもアリなのか……？」"
translation = "「겨울 물건이라면 뭐든지 다 되는 거냐……?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ていうかここにいたのね、フィオナ」"
translation = "「그나저나 여기 있었네, 피오나」"

[[dialogue]]
speaker = "ニャリオン"
original = "「鏡餅だけじゃニャいニャン。海の家のメニューに、いつの間にかカニ鍋やおでんが書き加えられていたニャン！」"
translation = "「카가미모치뿐만이 아니라냥. 바다의 집 메뉴에 어느샌가 게 전골이랑 오뎅이 추가되어 있었다냥!」"

[[dialogue]]
speaker = "リップル"
original = "「シカシ、参りましたネ～。今年のフユは厳しいと聞きましたが、これほどトハ……」"
translation = "「하지만 난처하게 됐네용~. 올해 겨울은 엄하다고 들었습니다만, 이 정도일 줄은……」"

[[dialogue]]
speaker = "マトイ"
original = "「これ、冬とかいう問題なの……？」"
translation = "「이게 겨울이라든가 하는 문제인 거야……?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「けど、前までこんなことなかったのは確かね」"
translation = "「그렇지만, 전까지 이런 일이 없었던 건 확실해」"

[[dialogue]]
speaker = "セーラ"
original = "「うーん……だとしたら、リゾートの中に原因があったりしないかな？」"
translation = "「으음…… 그렇다면, 리조트 안에 원인이 있거나 하진 않을까?」"

[[dialogue]]
speaker = "unk"
original = "同感だ"
translation = "동감이다"

[[dialogue]]
speaker = "unk"
original = "結界内は外の影響を受けない"
translation = "결계 안은 외부의 영향을 받지 않아"

[[dialogue]]
speaker = "リップル"
original = "「確かにデース！\u3000リゾート結界もずいぶん広くナッテきましたから……チェックを怠っていたかもしれまセーン！」"
translation = "「확실히 그래용! 리조트 결계도 꽤 넓어졌으니까…… 체크를 소홀히 했을지도 모르겠네용!」"

[[dialogue]]
speaker = "アナ"
original = "「確かに一理ありそうです」"
translation = "「확실히 일리가 있군요」"

[[dialogue]]
speaker = "ソフィア"
original = "「く……許せません！\u3000なんとしても原因を突き止めるのです！」"
translation = "「큭…… 용서할 수 없어요! 어떻게 해서든 원인을 찾아내는 겁니다!」"

[[dialogue]]
speaker = "ルリエル"
original = "「おおっ、ソフィアが燃えています！」"
translation = "「오옷, 소피아가 불타고 있어요!」"

[[dialogue]]
speaker = "unk"
original = "皆でビーチ内に散らばった怪しい異変がないかどうか探す。"
translation = "다들 해변 내에 흩어져 수상한 이변이 없는지 찾아본다."

[[dialogue]]
speaker = "ソフィア"
original = "「！\u3000皆さん──こちらです！\u3000こちらに来てください！」"
translation = "「! 여러분── 여기입니다! 이쪽으로 와주세요!」"

[[dialogue]]
speaker = "ソフィア"
original = "「ここです──ここに結界の『隙間』が生じています！」"
translation = "「여기예요── 여기에 결계의 『틈새』가 생겼어요!」"

[[dialogue]]
speaker = "サーシャ"
original = "「あら、ほんと。エアコンみたいに、冷たい風が入ってくるのを感じるわ」"
translation = "「어머, 정말이네. 에어컨처럼 찬 바람이 들어오는 게 느껴져.」"

[[dialogue]]
speaker = "unk"
original = "目には見えないが……"
translation = "눈에는 보이지 않지만……"

[[dialogue]]
speaker = "unk"
original = "確かに異質さを感じる"
translation = "확실히 이질감이 느껴진다."

[[dialogue]]
speaker = "リップル"
original = "「ムム！\u3000確かに結界にホコロビが生じてイマース」"
translation = "「음음! 확실히 결계에 해어짐이 생겼네-요!」"

[[dialogue]]
speaker = "リップル"
original = "「これもワタシのメンテ不足デース。ナルホド、隙間風はコレが原因でしタカ……」"
translation = "「이것도 제 정비 부족이에-요. 과연, 외풍은 이게 원인이었군-요……」"

[[dialogue]]
speaker = "ルリエル"
original = "「とすると、他の『冬のイタズラ』も……？」"
translation = "「그렇다면, 다른 『겨울의 장난』도……?」"

[[dialogue]]
speaker = "アナ"
original = "「いえ。これだけではかき氷が増えたりする説明はつきません」"
translation = "「아니요. 이것만으로는 빙수가 늘어나거나 하는 점을 설명할 수 없습니다.」"

[[dialogue]]
speaker = "アナ"
original = "「それに、海の家のメニューを書き換えるなんて、何者かが動いていなければ難しいでしょう」"
translation = "「게다가 바다의 집 메뉴를 고쳐 쓰다니, 누군가가 움직이지 않았다면 어려웠겠죠.」"

[[dialogue]]
speaker = "マトイ"
original = "「確かに……隙間風ならまだしも……」"
translation = "「확실히…… 외풍이라면 몰라도……」"

[[dialogue]]
speaker = "ソフィア"
original = "「！\u3000待ってください──今、そこで何かが動いたような」"
translation = "「! 기다려 주세요── 지금, 거기서 무언가가 움직인 것 같은.」"

[[dialogue]]
speaker = "アポロ"
original = "「ム……そこか！？」"
translation = "「음…… 거기냐!?」"

[[dialogue]]
speaker = "？？？"
original = "「くっくっく……バレてはシカタないナ」"
translation = "「큭큭큭…… 들켜버렸으니 어쩔 수 없군-요.」"

[[dialogue]]
speaker = "？？？"
original = "「シカシ無駄なことデース。冬の訪れは止められナイのです」"
translation = "「하지-만 소용없는 짓이에-요. 겨울이 찾아오는 건 멈출 수 없답니-다.」"

[[dialogue]]
speaker = "アポロ"
original = "「そ……その声は！？」"
translation = "「그…… 그 목소리는!?」"

