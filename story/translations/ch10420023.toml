[[dialogue]]
speaker = "unk"
original = "第３話,ご命令ください、ご主人様,P"
translation = "제3화, 명령해 주십시오, 주인님, P"

[[dialogue]]
speaker = "unk"
original = "フニにとある頼み事をするために、俺は流星学園を訪れていた。"
translation = "후니에게 어떤 부탁을 하기 위해, 나는 유성학원을 방문했다."

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「会長さんの頼み事なら、もちろん何でもさせていただきますっ」"
translation = "「회장님의 부탁이라면, 물론 무엇이든 하겠습니다!」"

[[dialogue]]
speaker = "unk"
original = "内容を聞かなくていいの！？"
translation = "내용을 듣지 않아도 괜찮아!?"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「はい。会長さんが私の嫌がることをするわけない……ですからっ」"
translation = "「네. 회장님이 제가 싫어하는 일을 하실 리 없으니까요……!」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「そこまで全面的に信頼されると困っちゃう……ですか？\u3000ふふっ、そういうところですよ、会長さん♪」"
translation = "「그렇게 전적으로 신뢰받으면 곤란해……인가요? 후훗, 그런 점이에요, 회장님♪」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「そんな会長さんだからこそ大好きで……何でも、したくなっちゃうんです<emoji=heart04>」"
translation = "「그런 회장님이라서 정말 좋아하고…… 무엇이든, 하고 싶어져 버려요♥」"

[[dialogue]]
speaker = "unk"
original = "フニはいつか騙されそうで心配だなぁ"
translation = "후니는 언젠가 속을 것 같아서 걱정이네"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「会長さんになら、騙されたって構いませんっ」"
translation = "「회장님에게라면 속아도 상관없어요!」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「あ、でも……もしかしてお断りした方が、よかったでしょうか？\u3000なんとなく会長さんから、そういう空気を感じたのですが……」"
translation = "「아, 하지만…… 혹시 거절하는 편이 좋았을까요? 왠지 회장님에게서 그런 분위기가 느껴졌습니다만……」"

[[dialogue]]
speaker = "unk"
original = "鋭い。ただここで誤魔化して、後で俺がいないところでややこしい話になるのも困る。俺は深呼吸して、覚悟を決めるのだった。"
translation = "예리하다. 다만 여기서 얼버무렸다가 나중에 내가 없는 곳에서 복잡한 이야기가 되는 것도 곤란하다. 나는 심호흡을 하고 각오를 다졌다."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「フニちゃん！\u3000来てくれたんだっ、ありがとう～！！」"
translation = "「후니짱! 와줬구나, 고마워~!!」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ルルカちゃん？\u3000私に協力して欲しいのって、ルルカちゃんだったんですか？」"
translation = "「루루카짱? 저에게 협력을 바란 게 루루카짱이었나요?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「そうだけど……もしかしてお兄ちゃんから説明聞いてない？」"
translation = "「그렇긴 한데…… 혹시 오빠한테 설명 못 들었어?」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「はい。会長さんのお願いだったので」"
translation = "「네. 회장님의 부탁이었으니까요」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「お、お兄ちゃんの頼み事だったら、内容聞かないでＯＫしちゃうんだ……」"
translation = "「오, 오빠의 부탁이라면 내용도 안 듣고 OK 해버리는구나……」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「……？\u3000はい。もちろんです」"
translation = "「……? 네. 물론이죠」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ちょっとお兄ちゃん！\u3000頼み事してるあたしが言うのもなんだけど、こういうのはあんまり良くないと思うな！」"
translation = "「잠깐 오빠! 부탁하는 입장인 내가 말하긴 좀 그렇지만, 이런 건 별로 좋지 않다고 봐!」"

[[dialogue]]
speaker = "unk"
original = "ルルカからも、もっと言ってやってくれ"
translation = "루루카도 좀 더 따끔하게 말해줘"

[[dialogue]]
speaker = "unk"
original = "俺もそう思う。"
translation = "나도 그렇게 생각해."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「今時亭主関白なんて流行らないんだよ！\u3000いいかな、お兄ちゃん？\u3000年下の彼女っていうのはね……って、なんでお兄ちゃんが同意してるのぉ！？」"
translation = "「요즘 시대에 가부장적인 건 유행 안 한다고! 알겠어, 오빠? 연하의 여자친구라는 건 말이야…… 어라, 왜 오빠가 동의하고 있는 거야!?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「自分を慕ってくれる恋人に、恋人であっても男の言葉はもっと疑ってかかれとは説教できない……ううっ、それは、確かに」"
translation = "「자신을 사모해 주는 연인에게, 연인이라 할지라도 남자의 말은 좀 더 의심하고 보라고 설교할 수는 없다…… 으으, 그건 확실히」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「私は会長さんやルルカちゃんにだったら、騙されてもいいと思っているので、大丈夫ですよっ！」"
translation = "「저는 회장님이나 루루카짱에게라면 속아도 괜찮다고 생각하니까, 괜찮아요!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「全然大丈夫じゃないし、言いたいことはまったく伝わってないんだけど、お兄ちゃんが苦労してるポイントは理解できたよ！」"
translation = "「전혀 안 괜찮고, 하고 싶은 말은 하나도 안 전해졌지만, 오빠가 고생하는 포인트는 이해했어!」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「大掃除から荷物運びまで、雑用であればメイド隊でひと通り仕込まれてますっ。なんなりとご命令ください♪」"
translation = "「대청소부터 짐 나르기까지, 잡일이라면 메이드대에서 골고루 배웠습니다. 무엇이든 명령해 주세요♪」"

[[dialogue]]
speaker = "unk"
original = "やる気になったフニがぐいぐいとトレーニング施設の掃除を始めてしまいそうだったのを何とか押しとどめて、ルルカは説明を続行した。"
translation = "의욕이 넘친 후니가 덥석 트레이닝 시설 청소를 시작하려던 것을 어떻게든 만류하고, 루루카는 설명을 계속했다."

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「前置きが長くなっちゃったけど、本題に入るよ、フニちゃん！」"
translation = "「서론이 길어졌는데, 본론으로 들어갈게, 후니짱!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「変・身！\u3000クリスマスフォーム！！」"
translation = "「변·신! 크리스마스 폼!!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「はい、次はフニちゃんの番だよ」"
translation = "「자, 다음은 후니짱 차례야」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ええっ！？\u3000ど、どうして突然……？」"
translation = "「에엣!? 어, 어째서 갑자기……?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「いいから、いいからっ。さあ、早く変身だよ♪」"
translation = "「됐으니까, 됐으니까. 자, 어서 변신이야♪」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「わ、わかりました……。クリスマスフォーームっ！！」"
translation = "「아, 알겠습니다……. 크리스마스 포오옴!!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「おお～、これこれ！\u3000フニちゃんのクリスマスフォーム、改めてじっくり見てみたかったんだよね～」"
translation = "「오오~, 이거지 이거! 후니짱의 크리스마스 폼, 다시 한번 차분히 보고 싶었단 말이지~」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「……それはいいんですが、どうしてＤＩＳＣをこっちに向けているんでしょうか？」"
translation = "「……그건 좋습니다만, 어째서 DISC를 이쪽으로 향하고 있는 건가요?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「もちろん撮影するためだよ♪」"
translation = "「당연히 촬영하기 위해서지♪」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「さ、撮影、ですかぁ！？」"
translation = "「촬, 촬영인가요!?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「そう！\u3000今日はあたしとフニちゃんのクリスマスフォームの撮影をするの！」"
translation = "「응! 오늘은 나랑 후니짱의 크리스마스 폼 촬영을 할 거야!」"

[[dialogue]]
speaker = "unk"
original = "Ｖチューバーなのにリアルで撮影するんだ？"
translation = "VTuber인데 리얼로 촬영하는 거야?"

[[dialogue]]
speaker = "unk"
original = "今更なんだけど……"
translation = "이제 와서 하는 말이지만……"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ふぇぇっ！？\u3000わ、私、ルルカちゃんみたいなＶチューバーなんて、できないですよっ」"
translation = "「후에엣!? 저, 저 루루카짱 같은 VTuber 같은 거 못 해요!」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ああ、いえ、何でもやらせていただくと言った手前ではあるんですが！\u3000ご迷惑をかけてしまうといいますかっ」"
translation = "「아, 아니, 뭐든 하겠다고 말씀드린 입장이긴 합니다만! 폐를 끼쳐버린다고 할까요!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「違う違う！\u3000フニちゃんをＶチューバーデビューさせたいとか、そういう話じゃなくってね」"
translation = "「아니 아니! 후니짱을 VTuber 데뷔시키고 싶다거나 그런 얘기가 아니라」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「この間、コスプレイヤーさんがやる『あわせ』っていう撮影会があるのを知ってね。あたしとフニちゃんで一緒にやったら、楽しいんじゃないかな～って思ったの！」"
translation = "「얼마 전에 코스플레이어분들이 하는 『트윈 촬영』이라는 촬영회가 있다는 걸 알았거든. 나랑 후니짱이 같이 하면 즐겁지 않을까~ 싶어서!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「写真自体はＶチューバー活動では使えないけど、何事も経験が大事って言うでしょ！\u3000配信の企画は、こういう日々の活動から生まれるんだよ！」"
translation = "「사진 자체는 VTuber 활동에는 못 쓰지만, 뭐든 경험이 중요하다고 하잖아! 방송 기획은 이런 일상 활동에서 태어나는 법이야!」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「な、なるほどです……そういうことなら、ご協力させていただきますっ」"
translation = "「그, 그렇군요…… 그런 거라면 협력하겠습니다!」"

[[dialogue]]
speaker = "unk"
original = "恥ずかしいなら、無理しなくても……"
translation = "부끄럽다면 무리하지 않아도……"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「いえ、ルルカちゃんが私と楽しいことをしたいって言ってくれてるんです。確かにちょっと、恥ずかしいですが……。が、頑張りますっ」"
translation = "「아니요, 루루카짱이 저와 즐거운 일을 하고 싶다고 말해줬는걸요. 확실히 조금 부끄럽긴 하지만…… 가, 열심히 하겠습니다!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「フニちゃん、ありがとう～！\u3000さて、許可も取れたことだし、どんどん撮っていくよ～！」"
translation = "「후니짱, 고마워~! 자, 허락도 받았으니 팍팍 찍을게~!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「いいね、いいね！\u3000可愛い写真がたくさん撮れたよ！」"
translation = "「좋아, 좋아! 귀여운 사진이 잔뜩 찍혔어!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「そうだ！\u3000次は歌も入れて動画撮っちゃおうか！」"
translation = "「맞다! 다음은 노래도 넣어서 동영상 찍어볼까!」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「歌！？\u3000む、無理です無理ですっ。ルルカちゃんは上手ですけど、私なんて民謡くらいしか歌ったことないですからっ」"
translation = "「노래!? 무, 무리예요 무리! 루루카짱은 잘하시지만, 전 민요 정도밖에 불러본 적 없단 말이에요!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「民謡！？\u3000な、なるほど……そういうジャンルもあるのかぁ。もしかして、歌ってみたとかで使えるかも？」"
translation = "「민요!? 그, 그렇구나…… 그런 장르도 있나. 혹시 '불러보았다' 같은 데서 쓸 수 있을지도?」"

[[dialogue]]
speaker = "unk"
original = "ルルカ、話脱線してるぞ"
translation = "루루카, 이야기가 옆길로 새고 있어"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「はっ！？\u3000そうだった！」"
translation = "「핫!? 그랬지!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ふっふっふっ。だけどフニちゃん、この攻撃から逃れることはできるかな……？」"
translation = "「훗훗훗. 하지만 후니짱, 이 공격에서 도망칠 수 있을까……?」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「攻撃……ですか？」"
translation = "「공격……인가요?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「お兄ちゃん！\u3000可愛い彼女の歌声を、聞いてみたいと思わない！？」"
translation = "「오빠! 귀여운 여자친구의 노랫소리, 들어보고 싶지 않아!?」"

[[dialogue]]
speaker = "unk"
original = "うっ。ちょっと、聞いてみたい……"
translation = "윽. 조금, 들어보고 싶어……"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ほらほら～？\u3000愛しの会長さんもこう言ってるよ～」"
translation = "「봐봐~? 사랑하는 회장님도 이렇게 말하고 있어~」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「か、会長さんが聞きたいって言うなら……うううっ。でもでもっ、歌うのはさすがに……でも会長さんの希望だし……」"
translation = "「회, 회장님이 듣고 싶다고 하신다면…… 으으으. 하지만 하지만, 노래하는 건 역시…… 하지만 회장님의 희망이고……」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「わ、わかりました！\u3000ただ、お願いがありますっ」"
translation = "「아, 알겠습니다! 다만, 부탁이 있어요!」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「会長さん……いいえっ、ご主人様！\u3000私に『どんなに恥ずかしくても、人前で歌い切ってみせろ』と、厳しくご命令くださいっ」"
translation = "「회장님…… 아니요, 서방님! 제게 『아무리 부끄러워도 사람들 앞에서 끝까지 노래해라』라고 엄하게 명령해 주세요!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ご、ご主人様ぁ！？」"
translation = "「서, 서방님아!?」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「お願いや希望ではなく、ご命令をください、ご主人様っ。そうすれば私は、例えどんな恥辱であろうとも、耐えられるはずです！」"
translation = "「부탁이나 희망이 아니라, 명령을 내려주세요, 서방님! 그러면 저는 설령 어떤 치욕일지라도 견뎌낼 수 있을 거예요!」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「ど、どどど、どういうことかな、お兄ちゃんっ！？」"
translation = "「어, 어어어, 어떻게 된 거야, 오빠!?」"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「まさかとは思うけど、フニちゃんと２人きりの時は、日常的にそんな風に呼ばせてるの！？」"
translation = "「설마 싶지만, 후니짱이랑 둘만 있을 때는 일상적으로 그렇게 부르게 하는 거야!?」"

[[dialogue]]
speaker = "unk"
original = "（完全には否定しづらい！）"
translation = "(완전히 부정하기는 힘들다!)"

[[dialogue]]
speaker_original = "ルルカ"
speaker_translation = "루루카"
original = "「い、言いよどんだぁ！？\u3000クロだよ、クロ！\u3000その反応は絶対やってるもん！\u3000これは問題だよ、お兄ちゃん！」"
translation = "「마, 말을 더듬었어!? 유죄야, 유죄! 그 반응은 백 퍼센트 하고 있는 거라고! 이건 문제야, 오빠!」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ご命令ください、ご主人様<emoji=heart04>」"
translation = "「명령해 주세요, 서방님♥」"

[[dialogue]]
speaker = "unk"
original = "──それから、場の混乱を鎮めるのには１時間以上の時間を要した。"
translation = "──그 후, 현장의 혼란을 가라앉히는 데는 1시간 이상의 시간이 소요되었다."

[[dialogue]]
speaker = "unk"
original = "ちなみに、ルルカとデュエットしたフニの歌は結構上手く、日々練習を欠かさないルルカの方が若干悔しがっているのだった。"
translation = "참고로, 루루카와 듀엣을 한 후니의 노래는 꽤 훌륭해서, 매일 연습을 거르지 않는 루루카 쪽이 약간 분해하고 있었다."

