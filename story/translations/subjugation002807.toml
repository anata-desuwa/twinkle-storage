[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ど、どういうことだゆ？」"
translation = "「어, 어떻게 된 거냐유?」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「これはジャクリーヌちゃんのせいじゃありません。ジャックさんがやったことみたいです……っ！」"
translation = "「이건 자클린 짱 탓이 아니에요. 잭 씨가 한 일인 것 같아요……!」"

[[dialogue]]
speaker_original = "ジャック"
speaker_translation = "잭"
original = "「ケラケラケラ♪」"
translation = "「케라케라케라♪」"

[[dialogue]]
speaker_original = "ゆーちゃん"
speaker_translation = "유짱"
original = "「ゆーゆー！」"
translation = "「유-유-!」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「ハロウィンはまだまだ始まったばかりだから、２人にはもうしばらくそのままで居てもらう、だそうです」"
translation = "「할로윈은 이제 막 시작된 참이니까, 두 사람은 한동안 그대로 있어 달라는 모양이에요.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「つまり今度はジャックさんを楽しませないと元に戻れない、ということですか？」"
translation = "「즉 이번에는 잭 씨를 즐겁게 해주지 않으면 원래대로 돌아갈 수 없다는 뜻인가요?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「ま、そういうことじゃん？」"
translation = "「뭐, 그렇게 된 거 아니겠어?」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「パパ、いい加減にするゆ！\u3000早く２人を元に戻すゆ！」"
translation = "「아빠, 적당히 해라유! 빨리 두 사람을 원래대로 되돌려라유!」"

[[dialogue]]
speaker_original = "ジャック"
speaker_translation = "잭"
original = "「ケラケラケラ♪」"
translation = "「케라케라케라♪」"

[[dialogue]]
speaker_original = "キャナンシー"
speaker_translation = "캐넌시"
original = "「きゃっふ～ん<emoji=heart04>\u3000ジャック様ぁ<emoji=heart04>\u3000今回も来てくださったのねぇ～<emoji=heart04>\u3000お待ちしてましたわぁん<emoji=heart04>」"
translation = "「꺄후웅❤ 잭 님아❤ 이번에도 와주셨네에~❤ 기다리고 있었다구우웅❤」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「げ……！\u3000出ましたわね……」"
translation = "「게……! 나타났군요……」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「セナリィ、何かやらかしたの？」"
translation = "「세나리, 뭔가 저질렀어?」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「まあ、ちょっといろいろあったんですの……」"
translation = "「뭐, 좀 여러 가지 일이 있었답니다……」"

[[dialogue]]
speaker_original = "キャナンシー"
speaker_translation = "캐넌시"
original = "「あぁん♪\u3000ジャクリーヌ様も一緒にいらっしゃるじゃないのぉ♪\u3000なんて素敵なツーショットなんでしょう<emoji=heart04>」"
translation = "「아앙♪ 자클린 님도 같이 계시잖아아♪ 어쩜 이렇게 멋진 투샷일까아❤」"

[[dialogue]]
speaker_original = "キャナンシー"
speaker_translation = "캐넌시"
original = "「さあさあ、お２人とも、どうぞこちらへお越しくださぁい<emoji=heart04>」"
translation = "「자자, 두 분 모두 이쪽으로 오세요오❤」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「ま、待つゆ！\u3000余は……」"
translation = "「기, 기다리라유! 여는……」"

[[dialogue]]
speaker_original = "ジャック"
speaker_translation = "잭"
original = "「ケラケラケラ♪」"
translation = "「케라케라케라♪」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「……ジャックさんとジャクリーヌさん、連れていかれてしまいましたね」"
translation = "「……잭 씨랑 자클린 씨, 끌려가 버렸네요.」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「あたしらも行こう！」"
translation = "「우리도 가자!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「見つけました、あそこはサラン先輩のブースです！」"
translation = "「찾았어요, 저기는 사란 선배의 부스예요!」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「人だかりが出来てるけど、あれは何をやってんのかな？」"
translation = "「사람들이 몰려 있는데, 저기선 뭘 하고 있는 거지?」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「あ、ソフィアちゃんにウズメイアちゃん。今ね～、ジャックちゃんがお菓子をもらったお返しにダンスを披露してるの～」"
translation = "「아, 소피아 짱이랑 우즈메이야 짱. 지금 말이야~, 잭 짱이 과자를 받은 답례로 댄스를 선보이고 있어~」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「一番にサランのお菓子を食べたくて、来てくれたんだって～。ふわふわ嬉しい～♪」"
translation = "「제일 먼저 사란의 과자를 먹고 싶어서 와줬대~. 둥실둥실 기뻐~♪」"

[[dialogue]]
speaker_original = "ジャック"
speaker_translation = "잭"
original = "「ケラケラケラ♪」"
translation = "「케라케라케라♪」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「トリックオアトリート～♪\u3000ジャックちゃんにお菓子をあげたら、ハロウィンダンスを踊ってくれるんだよ～」"
translation = "「트릭 오어 트릿~♪ 잭 짱에게 과자를 주면 할로윈 댄스를 춰준단다~」"

[[dialogue]]
speaker_original = "キャナンシー"
speaker_translation = "캐넌시"
original = "「ジャック様ぁ<emoji=heart04>\u3000私のために踊ってくださいますかぁ？」"
translation = "「잭 님아❤ 절 위해서 춰주시겠어요어?」"

[[dialogue]]
speaker_original = "ジャック"
speaker_translation = "잭"
original = "「ケラケラケラ♪」"
translation = "「케라케라케라♪」"

[[dialogue]]
speaker_original = "キャナンシー"
speaker_translation = "캐넌시"
original = "「あぁん、光栄ですぅ<emoji=heart04>」"
translation = "「아앙, 영광이에요오❤」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ジャクリーヌさんの姿が見当たりませんがどこに行ったんでしょう？」"
translation = "「자클린 씨의 모습이 보이지 않는데 어디로 간 걸까요?」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ジャクリーヌちゃんなら、ジャックちゃんの隣で踊ってますよ～」"
translation = "「자클린 짱이라면, 잭 짱 옆에서 춤추고 있어요~」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「あ～。あれってゆゆ姫ちゃんなんだ」"
translation = "「아~. 저게 유유히메 짱이구나.」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「一緒にダンスを披露して、お菓子を貰ってますね～」"
translation = "「같이 댄스를 선보이고 과자를 받고 있네요~」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「なーんだ、めちゃ平和的じゃん？\u3000お菓子をもらってダンスを見せるだけなら問題ないし」"
translation = "「뭐야, 엄청 평화적이잖아? 과자를 받고 댄스를 보여주는 거라면 문제없다구.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「あれ？\u3000ですが聞いた話だと、以前のハロウィンで同じようなことがあって……」"
translation = "「어레? 하지만 들은 바에 의하면 이전 할로윈 때 비슷한 일이 있어서……」"

[[dialogue]]
speaker = "unk"
original = "大変なことになったんだよ"
translation = "큰일이 벌어졌었지."

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「ジャック様が暴走して、次々に星騎士に勝負を仕掛け始めたんですの」"
translation = "「잭 님이 폭주해서 차례차례 성기사에게 승부를 걸기 시작했답니다.」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「そうそう、負けた相手をどんどんカボチャにしていっちゃったんだよね～」"
translation = "「맞아 맞아, 패배한 상대를 계속 호박으로 만들어버렸지 뭐야~」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「呑気に言ってますけど、それって大変なことじゃ……」"
translation = "「태평하게 말씀하시지만 그거 큰일인 거 아니에요……?」"

[[dialogue]]
speaker_original = "キャナンシー"
speaker_translation = "캐넌시"
original = "「いやぁ～～～ん<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「이야아~~앙❤❤❤」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「キャナンシーさん！？」"
translation = "「캐넌시 씨!?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「頭がかぼちゃに！」"
translation = "「머리가 호박으로!」"

[[dialogue]]
speaker_original = "ネーゼマイン"
speaker_translation = "네제마인"
original = "「あちゃー、始まっちゃったか～。どう責任取るつもりなの、セナリィ」"
translation = "「아차, 시작돼버렸나~. 어떻게 책임질 거야, 세나리.」"

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「なんで私の責任なんですの！\u3000今回は私、何にもしてませんわよ！」"
translation = "「왜 그게 제 책임인 건데요! 이번엔 저, 아무것도 안 했다구요!」"

[[dialogue]]
speaker_original = "ジャック"
speaker_translation = "잭"
original = "「ケラケラケラ♪」"
translation = "「케라케라케라♪」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「パパが星騎士とバトルをしたいと言ってるゆ！」"
translation = "「아빠가 성기사랑 배틀을 하고 싶어 한다유!」"

[[dialogue]]
speaker_original = "ヒトリ"
speaker_translation = "히토리"
original = "「や、やっぱりこのパターンなんですね……っ！」"
translation = "「여, 역시 이 패턴이군요……!」"

[[dialogue]]
speaker_original = "ジャクリーヌ"
speaker_translation = "자클린"
original = "「パパはウズメイアとソフィアの２人を指名してるの」"
translation = "「아빠는 우즈메이야랑 소피아 두 사람을 지명했다유.」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「へ～、そうなんだ。面白そうかも」"
translation = "「헤~ 그렇구나. 재밌을지도.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ご所望とあらば、応えないわけにはいきませんね」"
translation = "「원하신다면 응하지 않을 수 없겠네요.」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「よーし、それじゃいくよ～！\u3000お菓子でもなくイタズラでもなくバトルでしょ！！」"
translation = "「좋아, 그럼 간다~! 과자도 장난도 아니고 배틀이라구!!」"

