[[dialogue]]
speaker = "unk"
original = "第３話,現代技術はすごいのですね,P"
translation = "제3화, 현대 기술은 대단하군요"

[[dialogue]]
speaker = "unk"
original = "トリュファイナさん専用の義体は未だ完成を見ず、かといって出来上がるまで学園に閉じ込めるのも酷だ。"
translation = "트리파이나 씨 전용 의체는 아직 완성되지 않았고, 그렇다고 다 만들어질 때까지 학원에 가두어 두는 것도 가혹하다."

[[dialogue]]
speaker = "unk"
original = "そのため流星市国を案内することにした。現代の知識を知ってもらわなければトリュファイナさんも生きづらいだろうから──"
translation = "그 때문에 유성시국을 안내하기로 했다. 현대의 지식을 알아두지 않으면 트리파이나 씨도 살아가기 힘들 테니까──"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「魔王様。今、私たちが歩いているのが歩道というのですね？\u3000通行人はここを歩かねばならない決まり」"
translation = "「마왕님. 지금 우리가 걷고 있는 것이 보도라는 것이군요? 보행자는 여기를 걸어야 하는 규칙.」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「そして車道の方は、人をのせた大きな鉄の籠が……なるほど。これが現代の移動魔法ということですね！」"
translation = "「그리고 차도 쪽은 사람을 태운 커다란 철제 바구니가…… 과연. 이것이 현대의 이동 마법이라는 것이군요!」"

[[dialogue]]
speaker = "unk"
original = "あれは自動車といって……"
translation = "저건 자동차라고 해서……"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「ふん、ふんふん……がそりん？\u3000を、爆発？\u3000させたエネルギー？\u3000で進む……？」"
translation = "「흠, 흠흠…… 가솔린? 을 폭발? 시킨 에너지? 로 나아간다……?」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「ほぇ～……すごい理屈なのですね。魔力も霊力も用いないのですか」"
translation = "「호에~…… 굉장한 이치군요. 마력도 영력도 사용하지 않는 건가요.」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「あっ──あちらの御方。何やら小さな箱に向かってお喋りをしていますね」"
translation = "「앗── 저기 계신 분. 웬 작은 상자를 향해 이야기를 나누고 계시네요.」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「遠く離れた御方と会話をされているご様子……あれは現代の交信魔法でしょうか！」"
translation = "「멀리 떨어진 분과 대화를 하시는 모양…… 저것은 현대의 교신 마법일까요!」"

[[dialogue]]
speaker = "unk"
original = "あれはＤＩＳＣといって……"
translation = "저건 DISC라고 해서……"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「ふん、ふんふん……ねっと？\u3000電波？\u3000通信局？\u3000を経由して……？」"
translation = "「흠, 흠흠…… 네트워크? 전파? 통신국? 을 경유해서……?」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「ほぇえ～……またまた魔力を使わないのですか。本当に、遥か未来に来たことを実感いたします」"
translation = "「호에에~…… 또 마력을 쓰지 않는 건가요. 정말로 머나먼 미래에 온 것을 실감합니다.」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「これからもたくさん、現代のことを教えていただけるのですか？\u3000ありがとうございます」"
translation = "「앞으로도 많이 현대에 대해 가르쳐 주실 건가요? 감사합니다.」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「しかし魔王様。本当によろしいのですか、私と２人で外出をして」"
translation = "「하지만 마왕님. 정말 괜찮으신가요, 저와 둘이서 외출하셔서.」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「いえ……少しだけ、周りを気になさった方が良いのではと思いまして」"
translation = "「아니…… 조금만 주변을 신경 쓰시는 게 좋지 않을까 해서요.」"

[[dialogue]]
speaker = "unk"
original = "どういうことですか？"
translation = "무슨 뜻인가요?"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「それはですね──あ、あちらのお２人、魔王様のお知り合いでは……？」"
translation = "「그게 말이죠── 아, 저기 두 분, 마왕님이 아시는 분이 아닌지……?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「会長さん、さっきから何をお１人で虚空に向かってぶつぶつ喋ってるんです？」"
translation = "「회장님, 아까부터 뭘 혼자서 허공에 대고 중얼중얼거리는 거예요?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「何か悩んでいることでもあるのですか、緋宮会長？\u3000私たちでよければ相談に乗りますが」"
translation = "「무슨 고민이라도 있는 건가요, 히미야 회장? 저희라도 괜찮다면 상담해 드릴게요.」"

[[dialogue]]
speaker = "unk"
original = "ちょうど良かった、紹介するよ"
translation = "마침 잘 됐어, 소개해 줄게."

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "（霊体の私と一緒で変な目で見られているというのに。相変わらずお優しい御方ですね、あなた様は……）"
translation = "(영체인 저와 함께 있어서 이상한 눈으로 보이고 있는데도. 여전히 다정한 분이시네요, 당신은……)"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「なるほど……緋宮会長に紹介され、強く意識すると見えるようになる……その通りのようですね」"
translation = "「과연…… 히미야 회장에게 소개받고 강하게 의식하면 보이게 된다…… 그대로인 모양이네요.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「初めまして、トリュファイナ様。流星学園星徒会長の、星見フィオナです」"
translation = "「처음 뵙겠습니다, 트리파이나 님. 유성학원 성도회장인 호시미 피오나입니다.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「同じく流星星徒会の奏ソフィアです。こんにちは」"
translation = "「마찬가지로 유성성도회의 카나데 소피아입니다. 안녕하세요.」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「はい。初めまして。フィオナ様に、ソフィア様」"
translation = "「네. 처음 뵙겠습니다. 피오나 님, 소피아 님.」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「ここは皆様の通われている学園の、憩いの場なのですね。とても賑やかで素晴らしいです」"
translation = "「여기는 여러분이 다니시는 학원의 휴식처로군요. 매우 북적거리고 멋집니다.」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「私、現代の社会や風俗を勉強しているのです。よろしければあなた方のお話も聞かせてください！」"
translation = "「저, 현대 사회나 풍습을 공부하고 있어요. 괜찮으시다면 여러분의 이야기도 들려주세요!」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「まあ……あいすすけえと……氷の上を細い刃のついた靴で滑るのですか。きっと魔法の力が必要ですね、それは」"
translation = "「세상에…… 아이스 스케이트…… 얼음 위를 얇은 칼날이 달린 신발로 미끄러지는 건가요. 분명 마법의 힘이 필요하겠네요, 그건.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「あ、いえ……スケートは技術で滑るんですよ」"
translation = "「아, 아뇨…… 스케이트는 기술로 타는 거예요.」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「魔法の力は使わないのですか？」"
translation = "「마법의 힘은 쓰지 않나요?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「はい、自転車と同じようなものです。コツさえ使めばすぐに上達します」"
translation = "「네, 자전거와 비슷한 거예요. 요령만 익히면 금방 늘어요.」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「じてんしゃ？\u3000ああ、似た言葉を先ほど聞きました。あれでしょう、ガソリン？\u3000で爆発？\u3000して進むのでしょう、ふふふ♪」"
translation = "「자전거? 아아, 비슷한 단어를 아까 들었어요. 그거죠, 가솔린? 으로 폭발? 해서 나아가는 거죠, 후후후♪」"

[[dialogue]]
speaker = "unk"
original = "それは自動車です、トリュファイナさん"
translation = "그건 자동차예요, 트리파이나 씨."

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「ほぇ～……現代は似た言葉で、異なるものがたくさんあるのですね。勉強になります」"
translation = "「호에~…… 현대는 비슷한 단어로 다른 것이 참 많군요. 공부가 됩니다.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「何なのでしょう。天然な御方なのでしょうか……」"
translation = "「도대체 뭘까요. 천연이신 분일까요……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「こ、こらソフィア。失礼ですよ……？」"
translation = "「이, 이봐 소피아. 무례해요……?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「それでは失礼します。とても楽しい時間でした。次はぜひ、流星星徒会室へお越しください」"
translation = "「그럼 이만 실례하겠습니다. 무척 즐거운 시간이었어요. 다음엔 꼭 유성성도회실로 와주세요.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「またお喋りしましょう、トリュファイナさん」"
translation = "「다음에 또 얘기해요, 트리파이나 씨.」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「はい。ぜひ」"
translation = "「네. 꼭요.」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「──いい時代ですね、ここは」"
translation = "「──좋은 시대네요, 이곳은.」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「街ゆく人々はとても楽しそう。人間も天使も魔族もとても楽しく語らって……」"
translation = "「거리의 사람들은 무척 즐거워 보여요. 인간도 천사도 마족도 무척 즐겁게 담소를 나누고……」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「親しい人とおいしいお茶とお菓子を食べ、嬉しかったことを語り合う……」"
translation = "「가까운 사람과 맛있는 차와 과자를 먹으며, 기뻤던 일을 이야기하고……」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「ここが現代。ラクシス様が守り、今も変わらずあなた様に守られている世界……とても嬉しいです、私」"
translation = "「이곳이 현대. 라크시스 님이 지키고, 지금도 변함없이 당신이 지키고 있는 세계…… 무척 기뻐요, 저.」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「でも、贅沢だとは思いますが……私もこの世界の住人になりたいな、と。身の程知らずの願いを抱いてしまいそうになります」"
translation = "「하지만 사치라고는 생각하지만…… 저도 이 세계의 주민이 되고 싶다거나. 분수에 넘치는 소원을 품게 될 것 같아요.」"

[[dialogue]]
speaker = "unk"
original = "あなたももうこの世界の一員です"
translation = "당신도 이미 이 세계의 일원이에요."

[[dialogue]]
speaker = "unk"
original = "他人事じゃないですよ"
translation = "남 일이 아니라고요."

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「えっ──」"
translation = "「엣──」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「……ふふ♪\u3000そうですか。そうですよね。うん……」"
translation = "「……후후♪ 그런가요. 그렇군요. 응……」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「やっぱりあなた様は英雄でいらっしゃいますね。お強いだけではない。とても優しい御方……」"
translation = "「역시 당신은 영웅이시네요. 강하실 뿐만이 아니야. 무척 다정한 분……」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「義体が完成した時に備えて、もっと現代を学ばねばなりませんね。これからもお付き合いください、魔王様♪」"
translation = "「의체가 완성될 때를 대비해 더 현대에 대해 배워야겠군요. 앞으로도 잘 부탁드려요, 마왕님♪」"

