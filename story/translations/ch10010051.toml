[[dialogue]]
speaker = "unk"
original = "第１話,会長たちのウワサ,P"
translation = "제1화, 회장들의 소문, P"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ふう……ひと仕事終えた後のティータイムは格別ですね。緋宮会長」"
translation = "「후우…… 한바탕 일 끝낸 후의 티타임은 각별하네요. 히노미야 회장군」"

[[dialogue]]
speaker = "unk"
original = "もっと格別だよ"
translation = "더 각별해"

[[dialogue]]
speaker = "unk"
original = "フィオナと一緒だから"
translation = "피오나와 함께라서"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「あら。ふふ、お上手ですね。全くもう」"
translation = "「어머. 후후, 말씀도 잘하시네요. 정말이지」"

[[dialogue]]
speaker = "unk"
original = "俺はフィオナとの定例会議を終え、いつものように和やかな放課後のひとときを過ごしていた。"
translation = "나는 피오나와의 정례 회의를 마치고, 평소처럼 화기애애한 방과 후의 한때를 보내고 있었다."

[[dialogue]]
speaker = "unk"
original = "だが……最近、困ったことがある。"
translation = "하지만…… 최근, 곤란한 일이 있다."

[[dialogue]]
speaker_original = "噂する生徒"
speaker_translation = "소문내는 학생"
original = "（ねえねえ……見て、あそこ）"
translation = "（저기 저기…… 봐봐, 저기）"

[[dialogue]]
speaker_original = "噂する生徒"
speaker_translation = "소문내는 학생"
original = "（……やっぱり！\u3000それならさ……）"
translation = "（……역시! 그렇다면 말이야……）"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "（やはり……感じますね。視線を）"
translation = "（역시…… 느껴지네요. 시선이）"

[[dialogue]]
speaker = "unk"
original = "２人でいると妙に視線を感じたり、ひそひそ話を囁かれたりすることが増えているのだった。"
translation = "둘이서 있으면 묘하게 시선을 느끼거나, 소곤소곤 이야기를 속삭여지는 일이 늘고 있는 것이었다."

[[dialogue]]
speaker = "unk"
original = "俺たちが注目の的なのは以前からもそうだったが、ここ最近の視線はなんだか今までと毛色が違って……。"
translation = "우리가 주목의 대상인 것은 이전부터 그랬지만, 최근의 시선은 왠지 모르게 지금까지와는 결이 달라서……."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "（私たちが交際していることは、一部じゃ伝わっているとはいえ……最近は特に好奇の目線を感じます）"
translation = "（저희가 교제하고 있다는 것은, 일부에게는 전해지고 있다고는 해도…… 최근에는 특히 호기심 어린 시선을 느껴요）"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "（堂々とイチャイチャしすぎたのでしょうか？\u3000いえ、ですが恋人としてあれくらいは当然と考えます）"
translation = "（당당하게 너무 염장질을 한 걸까요? 아니요, 하지만 연인으로서 그 정도는 당연하다고 생각해요）"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "（うまく言えませんが……妙な温度の視線、なんですよね……）"
translation = "（잘 말은 못 하겠지만…… 묘한 온도의 시선, 이란 말이죠……）"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "（ルリエルにからかわれたりする分には、何も思わなかったのですが。陰ながら噂されるというのは、なんだかモヤモヤしますね）"
translation = "（루리엘에게 놀림을 당하는 정도로는, 아무렇지도 않았지만요. 뒤에서 소문이 돈다는 것은, 왠지 모르게 답답하네요）"

[[dialogue]]
speaker = "unk"
original = "注意してこようか"
translation = "주의를 주고 올까"

[[dialogue]]
speaker = "unk"
original = "有名税ってやつか"
translation = "유명세라는 건가"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「あ、それほどでは──あくまで少々気になる程度のことですので」"
translation = "「아, 그 정도까지는── 어디까지나 조금 신경 쓰이는 정도의 일이어서요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「むしろ、私たちのほうこそ節度を守るべきなのかもしれません。会長同士として、生徒たちの模範になるような」"
translation = "「오히려, 저희 쪽이야말로 절도를 지켜야 할지도 몰라요. 회장끼리로서, 학생들의 모범이 될 수 있도록」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「……ですが、元々そのようにしていましたよね？\u3000不思議です」"
translation = "「……하지만, 원래부터 그렇게 하고 있었잖아요? 이상하네요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ちょっとドレスを着たり、プロポーズをしたり、旦那さんって呼んだり、期間限定で同居していただけなのに……こんな悪目立ちしてしまうなんて」"
translation = "「잠깐 드레스를 입거나, 프로포즈를 하거나, 남편이라고 부르거나, 기간 한정으로 동거했을 뿐인데…… 이렇게 눈에 띄게 되어버리다니」"

[[dialogue]]
speaker = "unk"
original = "俺が守るよ"
translation = "내가 지켜줄게"

[[dialogue]]
speaker = "unk"
original = "気にしなくていい"
translation = "신경 쓰지 않아도 돼"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「緋宮会長……ふふ。ありがとうございます。そうですよね。大切な方が隣にいてくれるのなら、何も怖いものはありません」"
translation = "「히노미야 회장군…… 후후. 고맙습니다. 그렇죠. 소중한 분이 옆에 있어 주신다면, 아무것도 무서울 게 없어요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「むしろ腕を組んで見せつけてやる？\u3000そ、そこまでは──と言いつつ……アリなのかも、なんて……」"
translation = "「오히려 팔짱을 끼고 과시해 버릴까요? 스, 거기까지는── 이라고 말하면서도…… 괜찮을지도, 라니……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「──はっ！\u3000だ、だめですだめです。節度ある行動を心がけると誓ったばかりですのに」"
translation = "「──핫! 아, 안 돼요 안 돼요. 절도 있는 행동을 명심하겠다고 맹세한 지 얼마 안 됐는데요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「男女交際かくあるべしと──学生らしく、清らかな関係をアピールしましょう。ね、緋宮会長」"
translation = "「남녀 교제는 이래야 한다고── 학생답게, 청렴한 관계를 어필합시다. 그렇죠, 히노미야 회장군」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「──ふふ、久しぶりにこちらへやって来ましたね」"
translation = "「──후후, 오랜만에 이쪽으로 왔네요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「お目当て？\u3000ふふ、バレましたか。今日は例の漫画から、新作アクリルキーホルダーが発売されるみたいなんです」"
translation = "「목표? 후후, 들켰나요. 오늘은 그 만화에서, 신작 아크릴 키홀더가 발매되는 것 같아요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「私もお気に入りのキャラクターですので、これはぜひゲットせねばと思いまして♪」"
translation = "「저도 좋아하는 캐릭터라서, 이건 꼭 손에 넣어야겠다고 생각했어요♪」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「──はっ」"
translation = "「──핫」"

[[dialogue]]
speaker = "unk"
original = "何かあった？"
translation = "무슨 일 있었어?"

[[dialogue]]
speaker = "unk"
original = "どうした？"
translation = "왜 그래?"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「いえ……またなんだか、視線を感じたような気がしてしまって」"
translation = "「아뇨…… 또 왠지 모르게, 시선을 느낀 것 같은 기분이 들어서요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「よく考えれば──放課後に男子生徒とデートをして、というのも、悪目立ちする行為ではないでしょうか」"
translation = "「곰곰이 생각해보면── 방과 후에 남학생과 데이트를 한다는 것도, 눈에 띄는 행위가 아닐까요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「このままだとまた、良からぬ噂が立ってしまうのでは……と考えてしまって……」"
translation = "「이대로라면 또, 좋지 않은 소문이 나버리는 건 아닐까…… 하고 생각하게 되어서……」"

[[dialogue]]
speaker = "unk"
original = "変装でもする？"
translation = "변장이라도 할까?"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「……変装？\u3000ふふっ、それも面白いですね！」"
translation = "「……변장? 후훗, 그것도 재미있겠네요!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「緋宮会長といると、小さな悩みはいつも吹き飛んでしまう気がします。さすがですね」"
translation = "「히노미야 회장군과 있으면, 작은 고민은 언제나 날아가 버리는 기분이에요. 역시 대단하시네요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「さ……気にせず私たちらしく参りましょうか」"
translation = "「자…… 신경 쓰지 말고 우리답게 가볼까요」"

