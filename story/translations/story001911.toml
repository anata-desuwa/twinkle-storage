[[dialogue]]
speaker = "unk"
original = "フィオナに呼び出され、俺は正月早々、流星の星徒会にお邪魔することになった。"
translation = "피오나의 부름을 받고, 나는 정초부터 유성학원 성도회에 신세를 지게 되었다."

[[dialogue]]
speaker = "unk"
original = "なんでも俺に顔を会わせたい人がいるとのことだが──"
translation = "뭐든 나를 만나고 싶어 하는 사람이 있다고는 하지만──"

[[dialogue]]
speaker = "フィオナ"
original = "「さ、オオヒメ様」"
translation = "「자, 오오히메 님.」"

[[dialogue]]
speaker = "オオヒメ"
original = "「う、うむ……どうしてもこの服でなくてはいけないのだろうか。私にこのようなハイカラな服は……」"
translation = "「으, 으음…… 꼭 이 옷이어야만 하는 것인가. 나에게 이런 하이칼라한 옷은……」"

[[dialogue]]
speaker = "フィオナ"
original = "「どこもおかしくなんてありませんよ。よくお似合いです」"
translation = "「전혀 이상하지 않아요. 아주 잘 어울리십니다.」"

[[dialogue]]
speaker = "オオヒメ"
original = "「本当か？\u3000本当であろうな？\u3000嘘だったら、また引きこもりかねない──ま、待て、引っ張らないでくれ……！」"
translation = "「정말인가? 정말이겠지? 거짓말이라면 다시 틀어박힐지도 모른다── 기, 기다려라, 잡아당기지 마라……!」"

[[dialogue]]
speaker = "オオヒメ"
original = "「ひぁ……！\u3000あまりまじまじと見ないでくれ、魔王……」"
translation = "「히아……! 너무 빤히 보지 말아다오, 마왕……」"

[[dialogue]]
speaker = "フィオナ"
original = "「ふふ、驚かれたようですね。当学園の制服を支給したんです。あの服のままでは『圧』が強すぎましたから」"
translation = "「후후, 놀라신 모양이네요. 당 학원의 교복을 지급해 드렸답니다. 그 옷 그대로는 『압박감』이 너무 강했으니까요.」"

[[dialogue]]
speaker = "unk"
original = "よく似合ってて、可愛いらしいですよ"
translation = "잘 어울려서 귀여워요."

[[dialogue]]
speaker = "オオヒメ"
original = "「似合っ……か、可愛い……！？\u3000魔王よ、そういう発言は<ruby>軽々<rt>けいけい</rt></ruby>にしないでくれ……」"
translation = "「어울린…… 기, 귀엽다……!? 마왕이여, 그런 발언은 경솔 하지 말아다오……」"

[[dialogue]]
speaker = "unk"
original = "（ちょっと顔が赤いような……？）"
translation = "(조금 얼굴이 붉은 것 같은데……?)"

[[dialogue]]
speaker = "フィオナ"
original = "「緋宮会長には、オオヒメ様の制服のお披露目のためだけに来てもらったわけではありません」"
translation = "「히노미야 회장님께는 오오히메 님의 교복을 보여드리기 위해서만 오시라고 한 게 아닙니다.」"

[[dialogue]]
speaker = "フィオナ"
original = "「両校の代表として、やはりキチンと聞き出さねばならないと思いまして。オオヒメ様、デリケートな話でしたら大変申し訳ないのですが……」"
translation = "「양교의 대표로서 역시 제대로 물어봐야 한다고 생각해서요. 오오히메 님, 민감한 이야기라면 정말 죄송합니다만……」"

[[dialogue]]
speaker = "オオヒメ"
original = "「私がどうして神殿の奥にこもっていたか……か。やはり話さねばなるまいな……」"
translation = "「내가 어째서 신전 깊숙이 틀어박혀 있었는가…… 인가. 역시 말해야겠구나……」"

[[dialogue]]
speaker = "オオヒメ"
original = "「あなたたちがフィーニスの塔の頂上に登った時があっただろう。以前の決戦の時だ」"
translation = "「그대들이 피니스의 탑 정상에 올랐을 때가 있었지. 이전 결전 때 말이다.」"

[[dialogue]]
speaker = "フィオナ"
original = "「はい、姉さんとギエルとの戦いの時に。ですがオオヒメ様の姿は見えなかったはずですが……」"
translation = "「네, 언니와 기엘의 싸움 때였죠. 하지만 오오히메 님의 모습은 보이지 않았을 텐데요……」"

[[dialogue]]
speaker = "オオヒメ"
original = "「あ、ああ……それなんだが……」"
translation = "「아, 아아…… 그건 말이다……」"

[[dialogue]]
speaker = "フィオナ"
original = "「？\u3000実はあの時フィーニスの塔のどこかにいらしたんですか？」"
translation = "「? 사실 그때 피니스의 탑 어딘가에 계셨나요?」"

[[dialogue]]
speaker = "オオヒメ"
original = "「ああ……ええと……あなたたちはフィーニスの塔をどのようにして昇った？」"
translation = "「아아…… 에또…… 그대들은 피니스의 탑을 어떻게 올랐지?」"

[[dialogue]]
speaker = "unk"
original = "あの時は確か……魔王ビームで……\n階層を思いっきりぶち抜きながら……"
translation = "그때는 확실히…… 마왕 빔으로……\\n계층을 힘껏 꿰뚫으면서……"

[[dialogue]]
speaker = "フィオナ"
original = "「そうでしたね。切羽詰まっていたとはいえ、無茶な方法を取ったものです。光の柱がフィーニスの塔を貫いて……」"
translation = "「그랬었죠. 다급했다고는 해도 무모한 방법을 썼었네요. 빛의 기둥이 피니스의 탑을 관통해서……」"

[[dialogue]]
speaker = "オオヒメ"
original = "「それ！\u3000私はその魔王ビームの一撃に巻き込まれたのだ！」"
translation = "「그거다! 나는 그 마왕 빔의 일격에 휘말린 것이다!」"

[[dialogue]]
speaker = "フィオナ"
original = "「ええーっ！？」"
translation = "「에에─엣!?」"

[[dialogue]]
speaker = "リノ"
original = "「──ぶち抜きなさい、クロト。今なら女神さまも許してくれるわ」"
translation = "「──꿰뚫어 버리렴, 쿠로토. 지금이라면 여신님도 용서해 주실 거야.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「なるほど──さすがクロトのママ！\u3000いちいち階段なんて昇ってられないものね！」"
translation = "「과연── 역시 쿠로토의 엄마! 일일이 계단 같은 걸 오를 수는 없지!」"

[[dialogue]]
speaker = "オオヒメ"
original = "「む……？\u3000下で何か──」"
translation = "「음……? 밑에서 뭔가──」"

[[dialogue]]
speaker = "オオヒメ"
original = "「うあああああああっ！！？」"
translation = "「우아아아아아아악!!?」"

[[dialogue]]
speaker = "オオヒメ"
original = "「いきなり真下からズドーンと！\u3000見事なまでの不意打ちだった！」"
translation = "「갑자기 바로 밑에서 콰쾅 하고! 훌륭할 정도의 기습이었다!」"

[[dialogue]]
speaker = "オオヒメ"
original = "「まさか神域たるフィーニスの塔を、あのような無茶苦茶な力技で登る者が現れるとは思わないだろう！？」"
translation = "「설마 신역인 피니스의 탑을 그런 엉망진창인 힘으로 오르는 자가 나타날 줄은 몰랐겠지!?」"

[[dialogue]]
speaker = "オオヒメ"
original = "「分身たる堕天使とはいえ、守護天使である私が、たった一発の不意打ちで消し飛ばされたのだ！\u3000情けなくもなる！\u3000引きこもりもしよう！」"
translation = "「분신인 타천사라 해도, 수호천사인 내가 단 한 발의 기습으로 날아가 버린 것이다! 한심해지기도 하지! 틀어박힐 만도 해!」"

[[dialogue]]
speaker = "フィオナ"
original = "「あの時は私も霊力の経路を繋げたりと、緋宮会長の支援をしていましたし……関係がないとは言えませんね」"
translation = "「그때는 저도 영력 경로를 연결하는 등 히노미야 회장님을 지원하고 있었으니…… 관계가 없다고는 할 수 없겠네요.」"

[[dialogue]]
speaker = "unk"
original = "まさか、そんな事故があったとは……\nなんか、すみません……"
translation = "설마 그런 사고가 있었을 줄이야……\\n어쩐지, 죄송합니다……"

[[dialogue]]
speaker = "オオヒメ"
original = "「い、いや、謝罪の必要はない。そもそもセイファートに敗れ、堕天した私が悪いのだから」"
translation = "「아, 아니, 사과할 필요는 없다. 애당초 세이파트에게 패해 타천한 내가 나쁜 것이니까.」"

[[dialogue]]
speaker = "オオヒメ"
original = "「堕天使である私が倒されるのは世界のためにもよいことだ。しかし守護天使として自信を失うには十分な出来事だった……」"
translation = "「타천사인 내가 쓰러지는 것은 세계를 위해서도 좋은 일이다. 하지만 수호천사로서 자신감을 잃기에는 충분한 사건이었지……」"

[[dialogue]]
speaker = "unk"
original = "大丈夫、オオヒメ様は立派な守護天使ですよ"
translation = "괜찮아요, 오오히메 님은 훌륭한 수호천사예요."

[[dialogue]]
speaker = "オオヒメ"
original = "「！\u3000そ、そうか……あなたはそう言ってくれるのか」"
translation = "「! 그, 그런가…… 그대는 그렇게 말해주는 것인가.」"

[[dialogue]]
speaker = "フィオナ"
original = "「守護天使様は幾千幾万年の間世界を守ってきたんですから、一度や二度の失敗くらいありますよ。気にしなくていいと思います」"
translation = "「수호천사님은 수천 수만 년 동안 세계를 지켜오셨으니, 한두 번의 실수 정도는 있을 수 있어요. 신경 쓰지 않으셔도 된다고 생각합니다.」"

[[dialogue]]
speaker = "オオヒメ"
original = "「そう言ってくれるとありがたい……あなたたちは優しいのだな」"
translation = "「그렇게 말해주니 고맙구나…… 그대들은 상냥하군.」"

[[dialogue]]
speaker = "unk"
original = "望むところです\n今後は手を取り合い、リクリエを防ぎましょう！"
translation = "바라던 바입니다.\\n앞으로는 힘을 합쳐 리크리에를 막아내죠!"

[[dialogue]]
speaker = "オオヒメ"
original = "「う、うむ……そうだな」"
translation = "「으, 으음…… 그렇구나.」"

[[dialogue]]
speaker = "フィオナ"
original = "「オオヒメ様、まだ何かしがらみが……？」"
translation = "「오오히메 님, 아직 뭔가 걸리는 게……?」"

[[dialogue]]
speaker = "オオヒメ"
original = "「いや、そうではない、そうではないぞ。いわゆる握手……握手をすればいいのだな？\u3000よ、よろしく頼む」"
translation = "「아니, 그렇지 않다, 그렇지 않다구. 소위 악수…… 악수를 하면 되는 것이지? 자, 잘 부탁한다.」"

[[dialogue]]
speaker = "unk"
original = "ようやく握り返してきたオオヒメ様の手をギュッと握る。"
translation = "겨우 마주 잡아 온 오오히메 님의 손을 꽉 쥔다."

[[dialogue]]
speaker = "オオヒメ"
original = "「ひゃんっ！？」"
translation = "「햔!?」"

[[dialogue]]
speaker = "フィオナ"
original = "「え、今の可愛らしい声……オオヒメ様ですか？」"
translation = "「에, 지금의 귀여운 목소리는…… 오오히메 님인가요?」"

[[dialogue]]
speaker = "オオヒメ"
original = "「驚いてしまって、な……その、なんだ……魔王の手は、とても大きく……温かいのだな……？」"
translation = "「놀라서 말이지, 나…… 그, 뭐냐…… 마왕의 손은 무척 크고…… 따뜻하구나……?」"

[[dialogue]]
speaker = "unk"
original = "普通だと思いますけど"
translation = "보통이라고 생각합니다만."

[[dialogue]]
speaker = "オオヒメ"
original = "「そ、そうなのか……これが男性の普通なのか……」"
translation = "「그, 그런가…… 이것이 남성의 보통인 것인가……」"

[[dialogue]]
speaker = "フィオナ"
original = "「オオヒメ様？\u3000なんだか様子が……」"
translation = "「오오히메 님? 왠지 상태가……」"

[[dialogue]]
speaker = "オオヒメ"
original = "「私は、その……引きこもってばかりだったし……存じている通り、守護天使には女しかいないものでな……？」"
translation = "「나는 그…… 틀어박혀만 있었고…… 알다시피 수호천사에는 여자밖에 없는 법이라서 말이지……?」"

[[dialogue]]
speaker = "オオヒメ"
original = "「永きに渡って生きてきたが、異性と肉体的接触をしたのは、この握手が初めて……あなたが私の初めての男だ」"
translation = "「오랜 세월을 살아왔지만, 이성과 육체적 접촉을 한 것은 이 악수가 처음…… 그대가 나의 첫 남자다.」"

[[dialogue]]
speaker = "フィオナ"
original = "「そ、その言い回しは……なんだか……」"
translation = "「그, 그 말투는…… 왠지……」"

[[dialogue]]
speaker = "オオヒメ"
original = "「固い握手により盟約は交わされた。魔王よ……末永く頼むぞ」"
translation = "「굳건한 악수로 맹약은 맺어졌다. 마왕이여…… 오래도록 부탁하마.」"

