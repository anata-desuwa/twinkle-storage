[[dialogue]]
speaker = "unk"
original = "第３話,人気者はつらいよ,P"
translation = "제3화, 인기인은 괴로워, P"

[[dialogue]]
speaker = "unk"
original = "流星寮のクリスマスパーティーは夜の部に突入する。"
translation = "유성 기숙사 크리스마스 파티는 밤 부문으로 돌입한다."

[[dialogue]]
speaker = "unk"
original = "みんなの大騒ぎは更にエスカレートしていた。"
translation = "모두의 소동은 더욱 에스컬레이트하고 있었다."

[[dialogue]]
speaker = "アポロ"
original = "「ヒルディオーネ！\u3000ちょっとかくまってくれ！」"
translation = "「힐디오네! 좀 숨겨줘!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「アポロさん、いったいどうしましたの？」"
translation = "「아폴로 씨, 대체 무슨 일이신가요?」"

[[dialogue]]
speaker = "アポロ"
original = "「どこに行っても抱きつかれたり、撫でられたりして困ってるんだ」"
translation = "「어딜 가도 껴안거나 쓰다듬어 대서 곤란하다구.」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「あー……心中お察ししますわ」"
translation = "「아아…… 심정을 이해하겠어요.」"

[[dialogue]]
speaker = "アポロ"
original = "「みんな楽しそうだから、ちょっとくらいならいいけどな！\u3000パーティーの実行委員としては、楽しんでくれるのが一番だ！」"
translation = "「모두 즐거워 보이니까 조금 정도는 괜찮지만 말이야! 파티 실행위원으로서는 즐겨주는 게 제일이니까!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「あら、意外とご立派なことを仰いますのね。アポロさんは楽しんでいる側だと思っていましたが」"
translation = "「어머, 의외로 훌륭한 말씀을 하시네요. 아폴로 씨는 즐기는 쪽이라고만 생각했습니다만.」"

[[dialogue]]
speaker = "アポロ"
original = "「もちろんあたしも楽しんでるぞ。でも、実行委員なんだから、自分だけ楽しければいいってわけにはいかないんだ」"
translation = "「물론 나도 즐기고 있어. 하지만 실행위원이니까, 나만 즐거우면 장땡이라는 건 안 되지.」"

[[dialogue]]
speaker = "アポロ"
original = "「ああ、ただ、ちょっぴり気に食わないこともあるな」"
translation = "「아아, 다만 조금 마음에 안 드는 점도 있네.」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「あら、なんですの？」"
translation = "「어머, 뭔가요?」"

[[dialogue]]
speaker = "アポロ"
original = "「魔王がなかなか捕まらないんだ。恋人を放っておくなんて許せないぞ！」"
translation = "「마왕이 좀처럼 잡히질 않아. 연인을 방치하다니 용서 못 한다구!」"

[[dialogue]]
speaker = "ヒルディオーネ"
original = "「それは許せませんわね。緋宮会長ならば……ほら、あちらにいらっしゃるようですわよ？」"
translation = "「그건 용서할 수 없겠네요. 히노미야 회장님이라면…… 보셔요, 저쪽에 계신 것 같은데요?」"

[[dialogue]]
speaker = "アポロ"
original = "「おっ、そうか！\u3000ありがとう、行ってくるぞ！」"
translation = "「오, 그렇네! 고마워, 다녀올게!」"

[[dialogue]]
speaker = "アポロ"
original = "「見つけたぞ、魔王！」"
translation = "「찾았다, 마왕!」"

[[dialogue]]
speaker = "unk"
original = "パーティー楽しんでる？"
translation = "파티 즐기고 있어?"

[[dialogue]]
speaker = "unk"
original = "アポロ"
translation = "아폴로"

[[dialogue]]
speaker = "アポロ"
original = "「すっごく楽しんでる！\u3000でも、あたしはおまえとも一緒に楽しみたいぞ！」"
translation = "「무척 즐기고 있어! 하지만 난 너와도 함께 즐기고 싶다구!」"

[[dialogue]]
speaker = "アポロ"
original = "「新星の星徒会長だから、いろんな人から引っ張りだこなのはわかるけどな」"
translation = "「신성의 성도회장이니까 여러 사람에게 불려 다니는 건 알지만 말이야.」"

[[dialogue]]
speaker = "unk"
original = "じゃあこっちにおいで"
translation = "그럼 이쪽으로 와"

[[dialogue]]
speaker = "アポロ"
original = "「わわっ、ちょっ、いきなり何を──！」"
translation = "「와왓, 잠깐, 갑자기 뭘──!」"

[[dialogue]]
speaker = "アポロ"
original = "「いきなり抱っこしてきて……こういうのは好きじゃない、困ってるって言っただろ！」"
translation = "「갑자기 안아 올리다니…… 이런 건 안 좋아한다고, 곤란하다고 말했잖아!」"

[[dialogue]]
speaker = "unk"
original = "……釈放"
translation = "……석방"

[[dialogue]]
speaker = "アポロ"
original = "「あーーーーっ！！\u3000ダメだ！\u3000おまえは特別だから、ずっと抱っこしてていい！」"
translation = "「아ーーーー앗!! 안 돼! 너는 특별하니까 계속 안고 있어도 좋아!」"

[[dialogue]]
speaker = "アポロ"
original = "「その代わり恋人なんだから、ちゃんと隠して放さないでくれよ？」"
translation = "「그 대신 연인이니까, 제대로 숨겨서 놓지 말라구?」"

[[dialogue]]
speaker = "unk"
original = "わかった、抱き締めてあげる"
translation = "알았어, 껴안아 줄게"

[[dialogue]]
speaker = "アポロ"
original = "「えへへへ～、あたしはちっちゃいから簡単に隠れちゃうな」"
translation = "「에헤헤헤~, 난 조그마하니까 금방 숨겨지네.」"

[[dialogue]]
speaker = "アポロ"
original = "「ふわふわもこもこで、抱き心地いいってみんな言ってるけど魔王はどうだ？」"
translation = "「폭신폭신 보들보들해서 안는 느낌이 좋다고 다들 그러는데 마왕 넌 어때?」"

[[dialogue]]
speaker = "アポロ"
original = "「こら、むぎゅ～～ってするな。返事はちゃんと口で言え」"
translation = "「이봐, 으규~~ 하고 누르지 마. 대답은 제대로 입으로 해.」"

[[dialogue]]
speaker = "アポロ"
original = "「でも、おまえの気持ちは伝わったぞ。おまえもクリスマスフォームを気に入ってくれてるんだな？」"
translation = "「하지만 네 마음은 전해졌어. 너도 크리스마스 폼이 마음에 든 거구나?」"

[[dialogue]]
speaker = "アポロ"
original = "「おまえが好きって思ってくれるなら……たまにはこういう可愛い格好も悪くないかもな」"
translation = "「네가 좋다고 생각한다면…… 가끔은 이런 귀여운 차림도 나쁘지 않을지도 모르겠네.」"

[[dialogue]]
speaker = "アポロ"
original = "「ふふふ、最高の隠れ場所だな、ここは<emoji=heart04>」"
translation = "「후후후, 최고의 은신처구나, 여기는<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
original = "「もうちょっとだけ……あたしを隠しててくれるか？」"
translation = "「조금만 더…… 나를 숨겨주겠어?」"

[[dialogue]]
speaker = "unk"
original = "見つかるまで抱っこするよ"
translation = "들킬 때까지 안아줄게"

[[dialogue]]
speaker = "unk"
original = "ずっとこうしててあげる"
translation = "계속 이렇게 해줄게"

[[dialogue]]
speaker = "アポロ"
original = "「えへへ、うれしいぞ……<emoji=heart04>\u3000今日はもう無理かもって思ってたから」"
translation = "「에헤헤, 기뻐……<emoji=heart04> 오늘은 이제 무리일지도 모른다고 생각했으니까.」"

[[dialogue]]
speaker = "アポロ"
original = "「こんな風に恋人同士っぽくいちゃいちゃしてるのもいいけど、普通におまえとクリスマスを楽しみたい気もするな」"
translation = "「이런 식으로 연인끼리 꽁냥거리는 것도 좋지만, 평범하게 너와 크리스마스를 즐기고 싶은 기분도 드네.」"

[[dialogue]]
speaker = "アポロ"
original = "「隠れるのをやめて、思いっきり突撃してみるか？\u3000こそこそするのはあたしの性に合わないしな！\u3000魔王もそうだろ！？」"
translation = "「숨어있는 걸 그만두고 마음껏 돌격해 볼까? 꼼지락거리는 건 내 성미에 안 맞으니까 말이야! 마왕 너도 그렇지!?」"

[[dialogue]]
speaker = "unk"
original = "一緒にパーティーを楽しもう！"
translation = "함께 파티를 즐기자!"

[[dialogue]]
speaker = "unk"
original = "俺も同じだ！"
translation = "나도 마찬가지야!"

[[dialogue]]
speaker = "アポロ"
original = "「行くぞ！\u3000魔王と一緒にやりたいこともあるんだ、ついてこい！」"
translation = "「간다! 마왕이랑 같이 하고 싶은 일도 있으니까 따라와!」"

[[dialogue]]
speaker = "アポロ"
original = "「捕まったら、その時はその時だ！\u3000あたしのこと、ちゃんと守ってくれよ！」"
translation = "「붙잡히면 그때는 그때다! 나를 제대로 지켜달라구!」"

[[dialogue]]
speaker = "unk"
original = "アポロと手を繋ぎ、クリスマスパーティーの会場に突撃する。"
translation = "아폴로와 손을 잡고 크리스마스 파티장으로 돌격한다."

[[dialogue]]
speaker = "unk"
original = "当然、アポロを狙って大勢が押し寄せてきたが、体を張ってそれを守った。"
translation = "당연히 아폴로를 노리고 많은 인파가 몰려왔지만, 몸을 던져 그것을 지켜냈다."

[[dialogue]]
speaker = "unk"
original = "腕の中で守られているアポロは、終始幸せそうな笑顔を浮かべていたのだった。"
translation = "품 안에서 보호받는 아폴로는 내내 행복한 미소를 짓고 있었다."

