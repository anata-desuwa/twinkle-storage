[[dialogue]]
speaker = "unk"
original = "第１１話,ジグの帰還,B"
translation = "제11화, 지그의 귀환, B"

[[dialogue]]
speaker = "unk"
original = "梨緒の──ベガの星騎士たちの星力を結集した一撃で、ジグの中に巣食っていたリクリエは一片も残らず消滅した。"
translation = "리오의── 베가의 성기사들의 성력을 결집한 일격으로, 지그의 안에 둥지를 틀고 있던 리크리에는 한 조각도 남지 않고 소멸했다."

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ジグ！」"
translation = "「지그!」"

[[dialogue]]
speaker = "unk"
original = "落下するジグを、梨緒が素早く滑り込んで受け止める。"
translation = "추락하는 지그를 리오가 재빨리 미끄러져 들어가 받아낸다."

[[dialogue]]
speaker = "unk"
original = "だが……"
translation = "하지만……"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「アガ、サ……」"
translation = "「아가, 사……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ジグ！\u3000今は喋るな！」"
translation = "「지그! 지금은 말하지 마!」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「私を止めて、くれたんだね……君を、副会長にして、よかった……」"
translation = "「나를 멈춰, 주었구나…… 너를, 부회장으로 삼길, 잘했어……」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「でもまだリクリエは、終わっていない……後は任せる、よ……」"
translation = "「하지만 아직 리크리에는 끝나지 않았어…… 뒷일은 맡길게……」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「今まで……ありが、とう……」"
translation = "「지금까지…… 고마, 워……」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「アガ──サ──」"
translation = "「아가──사──」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ジグッ！！」"
translation = "「지그!!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「そんな……ジグを救えると思ったのに……」"
translation = "「말도 안 돼…… 지그를 구할 수 있을 줄 알았는데……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ジグ……！\u3000起きろジグ……！\u3000ジグーーーッ！！」"
translation = "「지그……! 일어나 지그……! 지그으으으!!」"

[[dialogue]]
speaker = "unk"
original = "力の抜けたジグの体を強く抱き締める梨緒。"
translation = "힘이 빠진 지그의 몸을 강하게 껴안는 리오."

[[dialogue]]
speaker = "unk"
original = "こぼれる涙がジグの銀髪を濡らしていた。"
translation = "넘쳐흐르는 눈물이 지그의 은발을 적시고 있었다."

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「梨緒、そいつ生きてるよ」"
translation = "「리오, 그 녀석 살아있어」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「え？」"
translation = "「에?」"

[[dialogue]]
speaker = "unk"
original = "腕の中のジグの顔をちらりと見ると……"
translation = "품 안의 지그의 얼굴을 슬쩍 보자……"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「ははは」"
translation = "「하하하」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ジグーーーーーーッ！！！」"
translation = "「지그으으으으으으!!!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「だから君のことは嫌いなんだ……いつも適当で、君の悪ふざけの始末をさせられて……」"
translation = "「이래서 네가 싫은 거야…… 언제나 적당히 얼버무리고, 네 장난의 뒷수습이나 시키고……」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「いやぁ、こんな簡単に引っかかるとは。やっぱりアガサで遊ぶのは楽しいね」"
translation = "「이야, 이렇게 쉽게 속을 줄이야. 역시 아가사를 데리고 노는 건 즐겁네」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「ジグ──さんってこんな人なんだ……」"
translation = "「지그── 씨는 이런 사람이었군요……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「そうだ、こういうやつだ。だけど外面は良くて、肝心なところはちゃんと締めるから、余計に腹が立つ」"
translation = "「그래, 이런 녀석이다. 하지만 겉모습은 번지르르하고, 중요한 대목은 확실히 챙기니까 더 화가 나」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「久しぶりに仮面が外れたからね。少々遊びたくなったのさ」"
translation = "「오랜만에 가면이 벗겨졌으니까 말이야. 조금 장난치고 싶어졌어.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「だけど感謝しているのは本当だ。ありがとう、アガサ。君のおかげで帰ってこれた。アガサの声、ちゃんと届いていたよ」"
translation = "「하지만 감사하고 있는 건 진심이야. 고마워, 아가사. 네 덕분에 돌아올 수 있었어. 아가사의 목소리, 제대로 닿았다고.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「アガサは本当に強くなったんだね。アルタイルで新しい仲間と出会って」"
translation = "「아가사는 정말 강해졌구나. 알타이르에서 새로운 동료들과 만나서.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「私もアガサと……みんなと一緒に絶望して、それから立ち上がればよかったのかもしれない」"
translation = "「나도 아가사와…… 모두와 함께 절망하고, 그러고 나서 일어섰더라면 좋았을지도 모르겠네.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ジグ……」"
translation = "「지그……」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「だが感傷に浸っている暇はない。正気に戻ったからには女神の神殿を止めないと」"
translation = "「하지만 감상에 젖어 있을 틈은 없어. 정신을 차린 이상 여신의 신전을 멈춰야 해.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「そうそう。神殿を動かしたからには止められるんじゃないの？」"
translation = "「그래그래. 신전을 움직였으니 멈출 수도 있는 거 아냐?」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「神殿をコントロールするやり方は覚えたけど、ちゃんとできるかな？\u3000ここをこうして……」"
translation = "「신전을 컨트롤하는 방법은 익혔는데, 잘 될까? 여기를 이렇게 해서……」"

[[dialogue]]
speaker = "unk"
original = "ジグが球体のコンピューターに手をかざし、神殿のシステムを操作する。"
translation = "지그가 구체 형태의 컴퓨터에 손을 얹고, 신전의 시스템을 조작한다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「止まったか！？」"
translation = "「멈췄어!?」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「……いや、ダメだ」"
translation = "「……아니, 안 돼.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「神殿の推力は停止させたが、これだけの質量だ。すぐには止まらない」"
translation = "「신전의 추진력은 정지시켰지만, 이 정도의 질량이야. 금방은 멈추지 않아.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「女神の神殿はこのまま──聖庭園に激突する」"
translation = "「여신의 신전은 이대로── 성정원에 격돌한다.」"

