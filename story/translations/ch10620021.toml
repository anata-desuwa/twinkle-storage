[[dialogue]]
speaker = "unk"
original = "第１話,愛は理屈じゃ測れない,P"
translation = "제1화, 사랑은 이치로 잴 수 없는 법, P"

[[dialogue]]
speaker = "unk"
original = "ジュエリーと恋人になり、怪盗事件があってからしばらく経った、ある日のこと。"
translation = "쥬얼리와 연인이 되고, 괴도 사건이 있고 나서 한참이 지난 어느 날의 일."

[[dialogue]]
speaker = "unk"
original = "俺は彼女と大聖堂カフェテリアで、いつも通りの昼食の時間を過ごしていた。"
translation = "나는 그녀와 대성당 카페테리아에서, 평소와 다름없는 점심시간을 보내고 있었다."

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「助手、トマトスープをふーふーして、食べさせてくれるかい？」"
translation = "「조수, 토마토 수프를 호호 불어서, 먹여주지 않겠나?」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「――ふふっ、大丈夫だ。日傘で周りの視界を遮るから、その間にこっそりとお願いするよ♪」"
translation = "「――후후, 괜찮다네. 양산으로 주변 시야를 차단할 테니, 그사이에 살짝 부탁하네♪」"

[[dialogue]]
speaker = "unk"
original = "ふー、ふー"
translation = "호―, 호―"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「ん♪\u3000あ～ん<emoji=heart04>」"
translation = "「음♪ 아~앙<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「――あむっ♪\u3000んむんむ……♪」"
translation = "「――오물♪ 우물우물……♪」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「はあぁ……<emoji=heart04>\u3000やはり、助手にふーふーして食べさせてもらうのは格別だね。愛の味がするよ<emoji=heart04>\u3000ふふっ♪」"
translation = "「하아아……<emoji=heart04> 역시, 조수가 호호 불어서 먹여주는 건 각별하군. 사랑의 맛이 난다네<emoji=heart04> 후후♪」"

[[dialogue]]
speaker = "ミネコ"
original = "「……ちょっと名探偵？\u3000一応、私も同席してるんだけど？」"
translation = "「……잠깐 명탐정? 일단 나도 합석하고 있거든?」"

[[dialogue]]
speaker = "unk"
original = "彼女は、ジュエリーのクラスメイトである『ミネコ・フランボワーズ』。"
translation = "그녀는 쥬얼리의 클래스메이트인 『미네코 프랑보아즈』."

[[dialogue]]
speaker = "unk"
original = "詳しい説明はまたの機会にするが、その正体はジュエリーと同じ選星者の１人――『大怪盗』だったりする。"
translation = "자세한 설명은 다음 기회에 하겠지만, 그 정체는 쥬얼리와 같은 선성자 중 한 명―― 『대괴도』이기도 하다."

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「なんだミネコ、見ていたのかい？」"
translation = "「뭐냐 미네코, 보고 있었나?」"

[[dialogue]]
speaker = "ミネコ"
original = "「いや、日傘の角度的に、私から丸見えなのわかってやってるでしょ！？」"
translation = "「아니, 양산 각도상 나한테는 훤히 다 보이는 거 알면서 그러는 거지!?」"

[[dialogue]]
speaker = "ミネコ"
original = "「というか、会長にあ～んしてもらうだけじゃなくて、ふーふーしてもらうとか、見ているこっちまで恥ずかしくなってくるんだけど！？」"
translation = "「그보다, 회장님한테 아앙 받는 것뿐만 아니라, 호호 불어달라고까지 하다니, 보고 있는 이쪽이 다 부끄러워질 지경인데!?」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「実は、私は猫舌でね。いつも助手にはふーふーしてから食べさせてもらっているんだ」"
translation = "「실은, 나는 뜨거운 걸 잘 못 먹어서 말이지. 언제나 조수에게는 호호 불고 나서 먹여달라고 하고 있다네」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「以前は面倒な欠点だと思っていたが、そのおかげで助手の愛ある一手間を味わえると考えると、今は悪くないと思っているよ。ふふっ♪」"
translation = "「이전에는 번거로운 단점이라고 생각했지만, 그 덕분에 조수의 사랑이 담긴 정성을 맛볼 수 있다고 생각하니, 지금은 나쁘지 않다고 여기고 있어. 후후♪」"

[[dialogue]]
speaker = "ミネコ"
original = "「あー、はいはい、ご馳走様です。ていうか、前から思ってたけど、よくもまぁ恥ずかしげもなく、『愛』とか口に出せるね」"
translation = "「아―, 예예, 잘 먹었습니다. 그건 그렇고 전부터 생각했는데, 참 용케도 부끄러운 기색도 없이 『사랑』이라느니 하는 말을 잘도 내뱉네」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「論理的に考えて、好きな相手には好きだと、素直に好意を伝えた方がいい」"
translation = "「논리적으로 생각해서, 좋아하는 상대에게는 좋아한다고 솔직하게 호의를 전하는 편이 좋아」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「そうすれば相手も嬉しいし、好きな人を喜ばせれば、もっと自分のことを好きになってくれるだろう」"
translation = "「그러면 상대도 기뻐하고, 좋아하는 사람을 기쁘게 하면 자신을 더 좋아해 주게 되겠지」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「つまりは理屈上、『やり得』ということだ」"
translation = "「즉 이치상, 『이득』이라는 것이지」"

[[dialogue]]
speaker = "unk"
original = "結構恥じらってるのが可愛いんだ"
translation = "제법 부끄러워하는 게 귀엽거든"

[[dialogue]]
speaker = "unk"
original = "と口では言いつつも内心では……"
translation = "라고 말은 하면서도 내심으로는……"

[[dialogue]]
speaker = "ミネコ"
original = "「ほうほう？」"
translation = "「호오호오?」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「助手！？\u3000ミネコに何を耳打ちしているんだい……！？」"
translation = "「조수!? 미네코에게 뭘 귓속말하고 있는 건가……!?」"

[[dialogue]]
speaker = "ミネコ"
original = "「――なになに？\u3000理屈上『やり得』であることと、恥ずかしさや照れ臭さという感情は別物……？」"
translation = "「――뭐라고? 이치상 『이득』인 것과, 부끄러움이나 쑥스러움이라는 감정은 별개……?」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「なっ……！？」"
translation = "「나앗……!?」"

[[dialogue]]
speaker = "ミネコ"
original = "「ジュエリーは性格上、理屈を重視するので『やり得』な行動をよく取ろうとするけど、それはそれとして、内心ではめちゃくちゃドキドキしていたりする……か」"
translation = "「쥬얼리는 성격상 이치를 중시하니까 『이득』인 행동을 자주 하려고 하지만, 그건 그거대로 내심으로는 엄청 두근거리고 있다……라」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「っ……！\u3000じょ、助手ぅ～」"
translation = "「읏……! 조, 조수우~」"

[[dialogue]]
speaker = "ミネコ"
original = "「ふふふ♪\u3000そっか～、なるほどね♪\u3000さすが会長、ジュエリーの彼氏をしているだけはあるね～」"
translation = "「후후후♪ 그렇구나~ 과연 그렇네♪ 역시 회장님, 쥬얼리의 남친 노릇 할 만하네~」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「うぅぅ。まさか助手に裏切られるとは……」"
translation = "「으으으. 설마 조수에게 배신당할 줄이야……」"

[[dialogue]]
speaker = "unk"
original = "ごめんごめん、素の反応が見たくてつい"
translation = "미안 미안, 본연의 반응이 보고 싶어서 그만"

[[dialogue]]
speaker = "unk"
original = "俺が頭を撫でてると、彼女はむぅ～っと頬を膨らませながら──"
translation = "내가 머리를 쓰다듬어 주자, 그녀는 웅― 하고 볼을 부풀리며──"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「そういうのは、２人きりの時にたっぷり見ればいいだろう？\u3000まったく……」"
translation = "「그런 건 둘만 있을 때 듬뿍 보면 되지 않나! 정말이지……」"

[[dialogue]]
speaker = "ミネコ"
original = "「確かに、ジュエリーが素で恥ずかしがってるの、めちゃくちゃ可愛いかも♪\u3000うふふっ♪」"
translation = "「확실히 쥬얼리가 진심으로 부끄러워하는 거, 엄청나게 귀여울지도♪ 우후후♪」"

[[dialogue]]
speaker = "unk"
original = "でしょ？"
translation = "그치?"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「ふ、２人してからかうんじゃない……」"
translation = "「두, 둘이서 같이 놀리지 말게……」"

[[dialogue]]
speaker = "unk"
original = "赤くなった顔を日傘で隠そうとするジュエリーに、俺とミネコは顔を見合わせて、つい笑ってしまう。"
translation = "붉어진 얼굴을 양산으로 숨기려 하는 쥬얼리를 보며, 나와 미네코는 서로 얼굴을 마주 보고 그만 웃음을 터뜨렸다."

[[dialogue]]
speaker = "ミネコ"
original = "「そういえば気になってたんだけど、２人ってどういう感じで付き合い始めたの？」"
translation = "「그러고 보니 궁금했는데, 둘은 어떤 느낌으로 사귀기 시작한 거야?」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「それは……２人だけの秘密だ」"
translation = "「그건…… 둘만의 비밀이라네」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「助手も、これ以上は言ってはダメだからな……！」"
translation = "「조수도 더 이상은 말하면 안 된다네……!」"

[[dialogue]]
speaker = "unk"
original = "その言葉に、俺は彼女と付き合い始めた日のことを思い出す。"
translation = "그 말에, 나는 그녀와 사귀기 시작한 날의 일을 떠올린다."

[[dialogue]]
speaker = "ジュエリー"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "ジュエリー"
original = "「助手……その、私は……」"
translation = "「조수…… 그, 나는……」"

[[dialogue]]
speaker = "unk"
original = "俺はジュエリーが好きだ"
translation = "나는 쥬얼리를 좋아해"

[[dialogue]]
speaker = "ジュエリー"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "unk"
original = "心の準備が出来るまでそばにいるよ"
translation = "마음의 준비가 될 때까지 곁에 있을게"

[[dialogue]]
speaker = "unk"
original = "だから、慌てなくていい。"
translation = "그러니까, 서두르지 않아도 돼."

[[dialogue]]
speaker = "ジュエリー"
original = "「…………私は、情けないな。これまでずっと、わたしの方からキミに愛していると言い続けていたのに」"
translation = "「…………나는 참 한심하군. 지금까지 줄곧 내 쪽에서 너에게 사랑한다고 계속 말해왔는데」"

[[dialogue]]
speaker = "ジュエリー"
original = "「いざ恋愛感情を自覚すると、逆に全然言えなくなってしまうだなんて……」"
translation = "「막상 연애 감정을 자각하니, 반대로 전혀 말할 수 없게 되어버리다니……」"

[[dialogue]]
speaker = "ジュエリー"
original = "「だけど……その代わりに今度はキミが、『好きだ』『愛してる』と何度も伝えてくれるようになって──」"
translation = "「하지만…… 그 대신 이번에는 네가 『좋아해』 『사랑해』라고 몇 번이고 전해주게 되어서──」"

[[dialogue]]
speaker = "ジュエリー"
original = "「そんなキミだから、私も……ちゃんと勇気を出そうと思ったんだ」"
translation = "「그런 너이기에, 나도…… 제대로 용기를 내야겠다고 생각했어」"

[[dialogue]]
speaker = "ジュエリー"
original = "「助手……今日、この場で伝えるよ」"
translation = "「조수…… 오늘, 이 자리에서 전하겠네」"

[[dialogue]]
speaker = "ジュエリー"
original = "「私も、キミのことが好きだ」"
translation = "「나도 너를 좋아한다네」"

[[dialogue]]
speaker = "ジュエリー"
original = "「私を――キミの恋人にして欲しい」"
translation = "「나를―― 너의 연인으로 만들어 주게」"

[[dialogue]]
speaker = "ミネコ"
original = "「え～？\u3000いいじゃん、教えてよ～。さっきはふーふーからのあ～んを見せつけてたじゃ～ん♪」"
translation = "「에~? 좋잖아, 알려줘~. 아까는 호호 불어서 아앙까지 해주는 거 자랑했으면서~♪」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「さて？\u3000なんのことだか分からないな」"
translation = "「글쎄? 무슨 소린지 모르겠군」"

[[dialogue]]
speaker = "unk"
original = "彼女はぷいっとそっぽを向きながら、何事もなかったかのように自分でトマトスープを食べ始めようとする。"
translation = "그녀는 홱 고개를 돌리며, 아무 일도 없었다는 듯이 스스로 토마토 수프를 먹기 시작하려 했다."

[[dialogue]]
speaker = "unk"
original = "待って、ジュエリー"
translation = "기다려, 쥬얼리"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「助手？」"
translation = "「조수?」"

[[dialogue]]
speaker = "unk"
original = "俺はトマトスープをスプーンですくって、ふーふーしてから彼女の口元に差し出す。"
translation = "나는 토마토 수프를 숟가락으로 떠서, 후후 불고 나서 그녀의 입가에 내밀었다."

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「あっ……」"
translation = "「앗……」"

[[dialogue]]
speaker = "ジュエリー（究明）"
original = "「ふふっ♪\u3000あ～ん<emoji=heart04>」"
translation = "「후훗♪ 아~앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ジュエリーはそれを、嬉しそうに笑って食べてくれるのだった。"
translation = "쥬얼리는 그것을 기쁜 듯이 웃으며 먹어 주었다."

