[[dialogue]]
speaker = "unk"
original = "第３話,最高のペアリング（前編）,P"
translation = "제3화, 최고의 페어링 (전편), P"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「会長さまとデートっ、デートっ♪\u3000大好きな人と、大好きなお菓子屋さん巡りだなんて、最高に幸せです」"
translation = "「회장님과 데이트, 데이트♪ 좋아하는 사람과 좋아하는 과자 가게 순례라니, 최고로 행복해요.」"

[[dialogue]]
speaker = "unk"
original = "今日はいっぱい楽しもう"
translation = "오늘은 마음껏 즐기자."

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「はいっ<emoji=heart04>\u3000私、もう喜びで胸がはち切れてしまいそうですっ<emoji=heart04>」"
translation = "「네っ<emoji=heart04> 저, 벌써 기쁨으로 가슴이 터져버릴 것 같아요っ<emoji=heart04>」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「わぁ、試食やってますよ。美味しそうですねっ」"
translation = "「와아, 시식하고 있어요. 맛있겠네요!」"

[[dialogue]]
speaker = "unk"
original = "お酒が入ってるのは控えた方がいいかもね"
translation = "술이 들어간 건 삼가는 게 좋을지도 몰라."

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「あっ、そうですね……街中で酔っぱらっちゃったら、大変なことになっちゃいますもんね」"
translation = "「앗, 그렇네요…… 길거리에서 취해버리면 큰일 날 테니까요.」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「あまあまふわふわスイーツ限定販売中で～す。見てってくださ～い」"
translation = "「달콤달콤 폭신폭신 스위츠 한정 판매 중이에용~. 구경하고 가세용~.」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「サランさま、どうしてここにっ！？」"
translation = "「사란 님, 어째서 여기에!?」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「あ～、会長ちゃんにシャロンちゃんだ～。このお店にね、サランが監修したスイーツを置かせてもらってるの～。お味見、ひとつどうぞ♪」"
translation = "「아~, 회장짱이랑 샤론짱이다~. 이 가게에 말이야, 사란이 감수한 스위츠를 두게 됐거든~. 맛보기로 하나 드셔보세용♪」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「では、失礼して……あむっ、甘くて香ばしくて、とっても美味しいですっ！」"
translation = "「그럼, 실례해서…… 냠, 달콤하고 고소해서 정말 맛있어요!」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「これはピスタチオのマカロンですか？\u3000試食くらいじゃ物足りないですっ！」"
translation = "「이건 피스타치오 마카롱인가요? 시식 정도로는 부족해요!」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「あっ、こっちのも美味しいです。会長さま、いっぱい買っちゃいましょう！\u3000イレーナさまにもおすそ分けしたいですっ」"
translation = "「앗, 이것도 맛있어요. 회장님, 잔뜩 사버려요! 이레나 님께도 나눠드리고 싶어요.」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「まとめ買いすると、イベントに参加できるそうですよっ！\u3000それなら、たくさん買わなきゃ損ですねっ！」"
translation = "「대량 구매하면 이벤트에 참가할 수 있다고 해요! 그렇다면 많이 사지 않으면 손해네요!」"

[[dialogue]]
speaker = "unk"
original = "イベント？"
translation = "이벤트?"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「そうなの～。いくつか買ってくれたお客様には、オリジナルブレンドティーの茶葉をプレゼント～」"
translation = "「맞아용~. 몇 개 사주신 손님께는 오리지널 블렌드 티 찻잎을 선물해드려용~.」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「好きなように調合していいから、自分だけの最高のフードペアリングを見つけてね～」"
translation = "「원하는 대로 조합해도 좋으니까, 자신만의 최고의 푸드 페어링을 찾아봐용~.」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「ペアリング……ですか？\u3000２人でお揃いの指輪を……？」"
translation = "「페어링…… 인가요? 둘이서 커플링을……?」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ふふふ、そっちのペアリングじゃなくって～。フードとドリンクを組み合わせて～、お互いの味をもっとも～っと美味しくする相性のことだよ～」"
translation = "「후후후, 그쪽 페어링이 아니라~. 푸드와 드링크를 조합해서~ 서로의 맛을 훨씬 더~ 맛있게 만드는 궁합을 말하는 거야~.」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「そういう呼び方があるんですね。てっきり婚約指輪みたいなものかと……」"
translation = "「그런 명칭이 있군요. 틀림없이 약혼반지 같은 건 줄 알고……」"

[[dialogue]]
speaker = "unk"
original = "お酒におつまみとか？"
translation = "술에 안주 같은 거?"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「そうそう、そういうのもフードペアリング～。上手に組み合わせると、１＋１が１０にも１００にもなるの～」"
translation = "「맞아 맞아, 그런 것도 푸드 페어링~. 잘 조합하면 1+1이 10도 되고 100도 된단다~.」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「面白そうですねっ！\u3000せっかくですし、参加しますっ」"
translation = "「재밌겠네요! 기왕 이렇게 된 거 참가할게요!」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「……え？\u3000会長さまから私にご提案を？」"
translation = "「……에? 회장님이 저에게 제안을?」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「ふむふむ……私と会長さまで、別々にブレンドティーを作る……と」"
translation = "「흠흠…… 저와 회장님이 따로따로 블렌드 티를 만든다…… 고요.」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「ふふ、どっちのブレンドティーがより相性のいい組み合わせなのか、会長さまと勝負ですねっ。負けませんよっ」"
translation = "「후후, 어느 쪽 블렌드 티가 더 궁합이 좋은 조합인지 회장님과 승부네요. 지지 않겠어요.」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「うーん……今日買ったお菓子と合わせるのでしたら……サランさま、どのお紅茶と相性がよろしいですか？」"
translation = "「으음…… 오늘 산 과자와 맞춘다면…… 사란 님, 어떤 홍차와 궁합이 좋을까요?」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「えっとね～、サランのマカロンなら～……好みもあるけど、キャンディとかディンブラがオススメかな～。果物系ならニルギリもいいよね～」"
translation = "「음 그러니까~, 사란의 마카롱이라면~…… 취향도 있겠지만 캔디나 딤불라를 추천하려나~. 과일 계열이라면 닐기리도 좋지~.」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ところでシャロンちゃん、会長ちゃんとデート中なの？」"
translation = "「그나저나 샤론짱, 회장짱이랑 데이트 중이야?」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「はいっ……デ、デートです、えへへ……<emoji=heart04>」"
translation = "「네…… 데, 데이트예요, 에헤헤……<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「それならシャロンちゃんと会長ちゃんみたいな相性バッチリの組み合わせを探さないとね～、ふふ♪」"
translation = "「그럼 샤론짱이랑 회장짱처럼 찰떡궁합인 조합을 찾아야겠네~, 후후♪」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「私と会長さまみたいな……えへ……<emoji=heart04>\u3000恐縮です……<emoji=heart04>」"
translation = "「저와 회장님 같은…… 에헤……<emoji=heart04> 황송합니다……<emoji=heart04>」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「会長ちゃんはどういう組み合わせがいいの～？\u3000すっきり系～？\u3000まったり系～？」"
translation = "「회장짱은 어떤 조합이 좋아~? 깔끔한 계열~? 묵직한 계열~?」"

[[dialogue]]
speaker = "unk"
original = "質問なんだけど──"
translation = "질문이 있는데──"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「な～に？\u3000えっ？\u3000カヌレは置いてなかったと思うけど──」"
translation = "「뭐~야? 엣? 까눌레는 없었던 것 같은데──」"

[[dialogue]]
speaker = "unk"
original = "かくかくしかじかと、俺の意図を耳打ちでサランに伝える。"
translation = "이러쿵저러쿵 내 의도를 귓속말로 사란에게 전한다."

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「ふ～ん……なるほどなるほど～。会長ちゃんってばステキ～♪\u3000それならね～、こしょこしょこしょ」"
translation = "「흐음…… 과연 과연~. 회장짱도 참 멋져~♪ 그렇다면 말이야~, 소곤소곤소곤.」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「サランさま、ありがとうございました」"
translation = "「사란 님, 감사합니다.」"

[[dialogue]]
speaker_original = "サラン"
speaker_translation = "사란"
original = "「こちらこそありがとう～♪\u3000ステキなティータイムを楽しんでね～♪」"
translation = "「나야말로 고마워~♪ 멋진 티타임 즐기렴~♪」"

[[dialogue]]
speaker = "unk"
original = "笑顔のサランに見送られつつ、焼き菓子とそれぞれが選んだブレンドティーの茶葉を手に、俺たちは店を後にした。"
translation = "웃는 얼굴의 사란의 배웅을 받으며, 구운 과자와 각자 고른 블렌드 티 찻잎을 손에 들고 우리는 가게를 나섰다."

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「会長さまがどんなお紅茶にされたのか楽しみです」"
translation = "「회장님이 어떤 홍차로 하셨을지 기대돼요.」"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「それにしてもお菓子を買いすぎてしまいましたね。せっかくですし、お紅茶と一緒にゆっくり落ち着けるところで食べたいです……あの、会長さま──」"
translation = "「그나저나 과자를 너무 많이 사버렸네요. 기왕이면 홍차와 함께 느긋하게 쉴 수 있는 곳에서 먹고 싶어요…… 저기, 회장님──」"

[[dialogue]]
speaker = "unk"
original = "じゃあウチに来る？"
translation = "그럼 우리 집으로 올래?"

[[dialogue]]
speaker_original = "シャロン"
speaker_translation = "샤론"
original = "「っ！\u3000はいっ<emoji=heart04>」"
translation = "「! 네っ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "待ち望んでいたようにシャロンが頷く。"
translation = "기다렸다는 듯이 샤론이 고개를 끄덕인다."

[[dialogue]]
speaker = "unk"
original = "シャロンとふたりきりのティータイムを楽しむため、俺たちは我が家へと足を向けたのだった。"
translation = "샤론과 둘만의 티타임을 즐기기 위해, 우리는 우리 집으로 발걸음을 옮겼다."

