[[dialogue]]
speaker = "ヴィーナス"
original = "「ヘレナちゃんじゃない！\u3000こんなところで何してるのよ！」"
translation = "「헬레나 짱이잖아! 이런 데서 뭐 하고 있는 거야!」"

[[dialogue]]
speaker = "ヘレナ"
original = "「フフ……決まっているだろう、リゾートを満喫しているのだ」"
translation = "「후후…… 뻔하지 않은가, 리조트를 만끽하고 있는 것이다.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「しかし、学園から常夏の楽園へひとっ飛びとは……フ。夏への扉、というわけか」"
translation = "「그나저나 학원에서 상하의 낙원으로 한달음에 오다니…… 후. 여름으로 가는 문, 이라는 건가.」"

[[dialogue]]
speaker = "ルリエル"
original = "「おお……なんとなく風流です！」"
translation = "「오오…… 왠지 풍류가 있어욧!」"

[[dialogue]]
speaker = "ヘレナ"
original = "「それで、どうした？\u3000貴殿ら、だんまりと私を見つめて」"
translation = "「그래서 왜 그러지? 귀공들, 멍하니 나를 바라보고만 있고.」"

[[dialogue]]
speaker = "アナ"
original = "「スイカだ……スイカがある……」"
translation = "「수박이다…… 수박이 있어……」"

[[dialogue]]
speaker = "マトイ"
original = "「ごくっ……いいなあ……私もあんなふうに……」"
translation = "「꿀꺽…… 좋겠다…… 나도 저런 식으로……」"

[[dialogue]]
speaker = "アポロ"
original = "「なるほどな──これがナイスバディってやつか！」"
translation = "「과연── 이게 나이스 바디라는 건가!」"

[[dialogue]]
speaker = "ヘレナ"
original = "「ふふふ。九浄家当主たるもの、スタイルの維持は怠っていない。どうだ魔王、私の水着姿は？」"
translation = "「후후후. 쿠죠 가문의 당주로서 스타일 유지는 게을리하지 않는다. 어떠냐 마왕, 나의 수영복 모습은?」"

[[dialogue]]
speaker = "unk"
original = "おみそれしました"
translation = "제가 졌습니다."

[[dialogue]]
speaker = "unk"
original = "すごい"
translation = "대단해요."

[[dialogue]]
speaker = "ヘレナ"
original = "「はっはっはっ！\u3000そうであろうそうであろう」"
translation = "「핫핫핫! 그렇겠지 그렇겠지.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「もう！\u3000あなたも調子のいいこと言ってないで」"
translation = "「정말! 당신도 비위 좋은 소리만 하지 말고.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「それより──ヘレナちゃんがここにいるってのは、もしかして……」"
translation = "「그보다── 헬레나 짱이 여기 있다는 건 설마……」"

[[dialogue]]
speaker = "リップル"
original = "「そうデース！\u3000何を隠そう、ヘレナちゃんこそ今回の特別イベントのスポンサーサンなのデース！」"
translation = "「그렇데-스! 사실을 말하자면 헬레나 짱이야말로 이번 특별 이벤트의 스폰서 상인 것이데-스!」"

[[dialogue]]
speaker = "マトイ"
original = "「えええええ！？」"
translation = "「에에에에에!?」"

[[dialogue]]
speaker = "ルリエル"
original = "「驚きです！」"
translation = "「놀랍습니다!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「どういうことなのよ！？」"
translation = "「어떻게 된 거야!?」"

[[dialogue]]
speaker = "ヘレナ"
original = "「聞いての通りだ。今度の水着コンテストは、我が九浄家が全面的にバックアップさせていただく」"
translation = "「들은 대로다. 이번 수영복 콘테스트는 우리 쿠죠 가문이 전면적으로 백업하겠다.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「今はその準備段階。というわけで調査隊の諸君、リサーチをよろしく頼んだぞ」"
translation = "「지금은 그 준비 단계. 그런 고로 조사대 제군들, 리서치를 잘 부탁한다.」"

[[dialogue]]
speaker = "せつな"
original = "「はい！\u3000でござる！」"
translation = "「예! 알겠소!」"

[[dialogue]]
speaker = "閃"
original = "「承知しました、当主様」"
translation = "「알겠습니다, 당주님.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「せつな、センちゃんまで！？」"
translation = "「세츠나, 센 짱까지!?」"

[[dialogue]]
speaker = "ヘレナ"
original = "「水着コンテストの本番へ向けて、ここのビーチの実地リサーチを行ってもらう」"
translation = "「수영복 콘테스트 본선을 향해 이곳 비치의 실지 리서치를 수행하게 할 것이다.」"

[[dialogue]]
speaker = "ソフィア"
original = "「せっかくのリゾートなのに……」"
translation = "「모처럼 리조트에 왔는데……」"

[[dialogue]]
speaker = "せつな"
original = "「これも任務でござる！\u3000当主様のご命令とあらば、海の果てまでもでござる！」"
translation = "「이것도 임무이오! 당주님의 명령이라 하시면 바다 끝까지라도 가겠소!」"

[[dialogue]]
speaker = "閃"
original = "（お嬢様の水着をまじまじと拝める格好のチャンスを逃すことだけは、少々もったいないところではありますが……）"
translation = "(아가씨의 수영복을 빤히 뵐 수 있는 절호의 기회를 놓치는 것만은 조금 아까운 노릇입니다만……)"

[[dialogue]]
speaker = "unk"
original = "メイド隊の子たちは砂浜を駆けていってしまった。"
translation = "메이드대 아이들은 모래사장을 달려가 버렸다."

[[dialogue]]
speaker = "ソフィア"
original = "「なんだか可哀想な気もしてきました……」"
translation = "「왠지 가엽다는 생각도 드네요……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「何を企んでるの？\u3000ヘレナちゃん」"
translation = "「뭘 꾸미고 있는 거야? 헬레나 짱.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「企んでなどいない。先日、偶然このビーチをうかがった時に、水着コンテストを行うか行わぬかという話が聞こえてきたのだ」"
translation = "「꾸미긴 뭘. 요전 날 우연히 이 비치를 살펴보던 중에 수영복 콘테스트를 열지 말지 하는 이야기가 들려왔을 뿐이다.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「一流のイベンターである私としては、協力せざるをえまい？」"
translation = "「일류 이벤터인 나로서는 협력하지 않을 수 없지 않겠나?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そういう嗅覚だけは鋭いんだから……」"
translation = "「그런 후각 하나는 날카롭다니까……」"

[[dialogue]]
speaker = "ヘレナ"
original = "「知っているか？\u3000このリップルは海の家を経営する夫婦に拾われ、以来、人々のハッピーな顔を見たくてこのリゾート結界を作ったのだ」"
translation = "「알고 있나? 이 리플은 바다의 집을 경영하는 부부에게 거두어져, 그 뒤로 사람들의 행복한 얼굴을 보고 싶어 이 리조트 결계를 만든 것이다.」"

[[dialogue]]
speaker = "ソフィア"
original = "「はい。心打たれる想いです」"
translation = "「네. 가슴 뭉클해지는 이야기입니다.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「くっ……泣かせるではないか。この九浄ヘレナ、リップルの心意気にいたく感動した！\u3000雲の上のご夫婦も、このリゾートの発展を見守ってくれているであろう──」"
translation = "「큭…… 울리지 않는가. 이 쿠죠 헬레나, 리플의 기개에 몹시 감동했다! 구름 위의 부부께서도 이 리조트의 발전을 지켜봐 주시고 계시겠지──」"

[[dialogue]]
speaker = "リップル"
original = "「Ｏｈ、シショーはまだ生きてマース」"
translation = "「Oh, 스승님은 아직 살아있어마-스.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「なんか、全体的にすっごくうさんくさいんですけど……」"
translation = "「왠지 전체적으로 엄청나게 수상쩍은데……」"

[[dialogue]]
speaker = "ヘレナ"
original = "「人聞きの悪い。ただ、私の海よりも深い厚意によるものだ」"
translation = "「듣기 거북하군. 그저 바다보다 깊은 나의 호의에 의한 것이다.」"

[[dialogue]]
speaker = "ヘレナ"
original = "「ただの催し物ではなく、より大々的な水着コンテストを！\u3000我が九浄家のサポートがあれば、このリゾートをより盛況にするお手伝いができるだろう……と」"
translation = "「단순한 행사가 아니라 더욱 대대적인 수영복 콘테스트를! 우리 쿠죠 가문의 서포트가 있다면 이 리조트를 더욱 성황리에 이끄는 데 도움을 줄 수 있을 거라 생각해서 말이지……」"

[[dialogue]]
speaker = "リップル"
original = "「ヘレナちゃんはたいへん心優しいお方デース！」"
translation = "「헬레나 짱은 정말 마음씨 착한 분이데-스!」"

[[dialogue]]
speaker = "ヘレナ"
original = "「さ、リップル。この不肖の娘は放っておいて、イベントのミーティングといこうではないか」"
translation = "「자, 리플. 이 불효막심한 딸내미는 내버려 두고 이벤트 미팅을 하러 가보지 않겠나.」"

[[dialogue]]
speaker = "リップル"
original = "「ハーイ、デース！」"
translation = "「하-이, 데-스!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「嫌な予感しかしないわ……」"
translation = "「안 좋은 예감밖에 안 들어……」"

[[dialogue]]
speaker = "unk"
original = "何やら引っかかりを覚えつつも、その日はビーチを満喫するのだった……。"
translation = "무언가 걸리는 구석이 있으면서도, 그날은 비치를 만끽하는 것이었다……."

