[[dialogue]]
speaker = "unk"
original = "初詣の後日、俺はサーシャさんと一緒に星徒会室で仕事をしていた――"
translation = "하츠모데 며칠 후, 나는 사샤 씨와 함께 성도회실에서 일을 하고 있었다――"

[[dialogue]]
speaker = "サーシャ"
original = "「会長くん、この書類のチェックをお願いしてもいいかしら？」"
translation = "「회장군, 이 서류 체크를 부탁해도 될까?」"

[[dialogue]]
speaker = "unk"
original = "正月休みに手伝って貰って、申し訳ないです"
translation = "신정 휴일에 도와달라고 해서 죄송합니다."

[[dialogue]]
speaker = "サーシャ"
original = "「うふふ♪\u3000気にしなくていいのよ」"
translation = "「우후후♪ 신경 쓰지 않아도 된단다.」"

[[dialogue]]
speaker = "サーシャ"
original = "「初詣の件、会長くんも協力してくれてたんでしょう？」"
translation = "「하츠모데 일, 회장군도 협력해 줬잖아?」"

[[dialogue]]
speaker = "サーシャ"
original = "「そのお返しってわけじゃないけど、私は星徒会のお姉ちゃんなんだから、いくらでも手伝うわ♪」"
translation = "「그 보답이라는 건 아니지만, 나는 성도회의 누나니까 얼마든지 도와줄게♪」"

[[dialogue]]
speaker = "unk"
original = "その時、ふと手に持っていたボールペンを落としてしまう。"
translation = "그때 문득 손에 들고 있던 볼펜을 떨어뜨리고 만다."

[[dialogue]]
speaker = "unk"
original = "それを拾おうと、机の下にしゃがみ込んでいた――その時だった。"
translation = "그걸 주우려고 책상 아래로 몸을 숙였던―― 그때였다."

[[dialogue]]
speaker = "ソフィア"
original = "「失礼します」"
translation = "「실례합니다.」"

[[dialogue]]
speaker = "サーシャ"
original = "「あら、ソフィ♪\u3000いらっしゃ～い」"
translation = "「어머, 소피♪ 어서 오렴~」"

[[dialogue]]
speaker = "ソフィア"
original = "「あ……♪」"
translation = "「아……♪」"

[[dialogue]]
speaker = "ソフィア"
original = "「おはようございます。姉さん<emoji=heart04>」"
translation = "「좋은 아침이에요, 언니<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺もソフィアに挨拶しようとして、思いとどまる。"
translation = "나도 소피아에게 인사하려다가 그만두었다."

[[dialogue]]
speaker = "unk"
original = "サーシャさんと話すソフィアの声色が、聞いたこともないほどデレデレだったからだ……"
translation = "사샤 씨와 대화하는 소피아의 목소리가 들어본 적도 없을 정도로 데레데레했기 때문이다……"

[[dialogue]]
speaker = "ソフィア"
original = "「今日の交換日記を渡しにきました」"
translation = "「오늘 교환 일기를 전하러 왔어요.」"

[[dialogue]]
speaker = "サーシャ"
original = "「ありがと～♪」"
translation = "「고마워~♪」"

[[dialogue]]
speaker = "サーシャ"
original = "「お姉ちゃん、交換日記のおかげでソフィと毎日会えて、本当に嬉しいわ～」"
translation = "「언니는 교환 일기 덕분에 소피와 매일 만날 수 있어서 정말 기쁘단다~」"

[[dialogue]]
speaker = "ソフィア"
original = "「ま、まあ……そういう約束なので」"
translation = "「뭐, 뭐어…… 그런 약속이니까요.」"

[[dialogue]]
speaker = "ソフィア"
original = "「それで、姉さん。えっと……またいつもの、お願いしてもいいですか？」"
translation = "「그래서, 언니. 저기…… 다시 평소의 그것, 부탁해도 될까요?」"

[[dialogue]]
speaker = "サーシャ"
original = "「あらあらうふふ♪\u3000ソフィ、こっちにいらっしゃい」"
translation = "「어머어머 우후후♪ 소피, 이쪽으로 오렴.」"

[[dialogue]]
speaker = "ソフィア"
original = "「はい……♪」"
translation = "「네……♪」"

[[dialogue]]
speaker = "サーシャ"
original = "「それじゃあ――」"
translation = "「그럼──」"

[[dialogue]]
speaker = "サーシャ"
original = "「はい♪\u3000お姉ちゃんハグで、今日１日分のパワー注入～♪」"
translation = "「자♪ 언니 허그로 오늘 하루치 파워 주입~♪」"

[[dialogue]]
speaker = "ソフィア"
original = "「ん……♪\u3000はぁぁ<emoji=heart04>\u3000あっ、頭も撫でて、欲しいです……<emoji=heart04>」"
translation = "「응……♪ 하아아<emoji=heart04> 앗, 머리도 쓰다듬어 주었으면, 좋겠어요……<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
original = "「ふふっ、甘えん坊さんね～♪\u3000もちろんいいわよ。ほら、なでなで～♪」"
translation = "「후훗, 어리광쟁이네~♪ 물론 괜찮고말고. 자, 쓰담쓰담~♪」"

[[dialogue]]
speaker = "ソフィア"
original = "「はふぅ……<emoji=heart04>\u3000姉さんのハグ、温かくて心もホットです……♪」"
translation = "「하후우……<emoji=heart04> 언니의 허그, 따뜻해서 마음도 핫해요……♪」"

[[dialogue]]
speaker = "unk"
original = "（み、見たことないくらいデレデレしてる……！）"
translation = "(버, 본 적 없을 정도로 데레데레하고 있어……!)"

[[dialogue]]
speaker = "unk"
original = "机の影から様子を伺っていて、驚いてまたポロッとペンを落としてしまう。"
translation = "책상 그림자에서 상황을 살피다가, 놀라서 다시 톡 하고 펜을 떨어뜨리고 만다."

[[dialogue]]
speaker = "ソフィア"
original = "「え……！？」"
translation = "「에……!?」"

[[dialogue]]
speaker = "unk"
original = "しまったと思った時にはもう遅く、物音で振り向いたソフィアと、目が合ってしまい――"
translation = "차마 어쩔 도리도 없이, 소리에 뒤를 돌아본 소피아와 눈이 마주치고 말았고──"

[[dialogue]]
speaker = "ソフィア"
original = "「か、会長さん！？\u3000いたんですか！？」"
translation = "「회, 회장님!? 있었던 건가요!?」"

[[dialogue]]
speaker = "ソフィア"
original = "「い、今のまさか、全部見られて……！？」"
translation = "「지, 지금 설마, 전부 본 건가요……!?」"

[[dialogue]]
speaker = "ソフィア"
original = "「あ、あああ～……！」"
translation = "「아, 아아아~……!」"

[[dialogue]]
speaker = "サーシャ"
original = "「あらあら♪\u3000ソフィ、顔が真っ赤になってるわよ？」"
translation = "「어머어머♪ 소피, 얼굴이 새빨개졌구나?」"

[[dialogue]]
speaker = "ソフィア"
original = "「ね、姉さん！\u3000会長さんがいるの、わかってましたよね！？\u3000なんで言ってくれなかったんですかっ！」"
translation = "「어, 언니! 회장님이 있는 거 알고 계셨죠!? 왜 말 안 해주신 거예요!」"

[[dialogue]]
speaker = "サーシャ"
original = "「え？\u3000でも――」"
translation = "「에? 하지만──」"

[[dialogue]]
speaker = "サーシャ"
original = "「昔のソフィはずっと今みたいな感じだったし、見られても別にいいんじゃないかしら？」"
translation = "「옛날의 소피는 계속 지금 같은 느낌이었고, 들켜도 딱히 상관없지 않을까 싶어서.」"

[[dialogue]]
speaker = "ソフィア"
original = "「な……！」"
translation = "「그……!」"

[[dialogue]]
speaker = "ソフィア"
original = "「なんでそういうこと言っちゃうんですか、姉さんのバカバカバカ～～～っ！！」"
translation = "「왜 그런 말을 하시는 거예요, 언니 바보바보바보───앗!!」"

[[dialogue]]
speaker = "サーシャ"
original = "「あら～♪\u3000昔と違って、見られて恥ずかしがるソフィも可愛いわ～♪」"
translation = "「어머나~♪ 옛날과 다르게 들키고 부끄러워하는 소피도 귀여워~♪」"

[[dialogue]]
speaker = "ソフィア"
original = "「か、会長さん！\u3000さっきのはその、今まで姉さんとは距離を置いていた分、反動がきてるというか……！」"
translation = "「회, 회장님! 방금 그건 그게, 지금까지 언니와는 거리를 두었던 만큼 반동이 왔달까……!」"

[[dialogue]]
speaker = "ソフィア"
original = "「と、とにかく全部忘れて下さい！\u3000失礼します～～～っ！」"
translation = "「어, 어쨌든 전부 잊어 주세요! 실례하겠습니다───앗!」"

[[dialogue]]
speaker = "サーシャ"
original = "「あらあらうふふ♪\u3000ソフィったら、行っちゃったわ～」"
translation = "「어머어머 우후후♪ 소피도 참, 가버렸네~」"

[[dialogue]]
speaker = "unk"
original = "あれから仲良さそうですね"
translation = "그 뒤로 사이가 좋아 보이네요."

[[dialogue]]
speaker = "サーシャ"
original = "「ええ、みんなのおかげよ」"
translation = "「응, 모두 덕분이야.」"

[[dialogue]]
speaker = "サーシャ"
original = "「昔みたいに……ううん。昔より、もっと仲良くなれそうだわ♪」"
translation = "「옛날처럼…… 아니. 옛날보다 훨씬 더 사이가 좋아질 수 있을 것 같아♪」"

[[dialogue]]
speaker = "unk"
original = "そう言って、サーシャさんは大切そうに、交換日記を胸に抱えるのだった――"
translation = "그렇게 말하며 사샤 씨는 소중한 듯이 교환 일기를 가슴에 품는 것이었다──"

