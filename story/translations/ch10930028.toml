[[dialogue]]
speaker = "クロト"
original = "「はぁ……疲れた……」"
translation = "「하아…… 지쳤다……」"

[[dialogue]]
speaker = "unk"
original = "『星霊祭』の最中にモンスターが発生。すぐに迎撃にあたり、被害は出なかった。"
translation = "『성령제』 도중에 몬스터가 발생했다. 즉시 요격에 나섰고, 피해는 없었다."

[[dialogue]]
speaker = "unk"
original = "だが星徒会としての星霊祭の運営、競技への参加、さらにモンスターの討伐が重なると、疲労は大きい。"
translation = "하지만 성도회로서의 성령제 운영, 경기에 참가, 게다가 몬스터 토벌까지 겹치니 피로가 막심했다."

[[dialogue]]
speaker = "ミルフィー"
original = "「あ、会長くん。モンスター退治は無事に終わったみたいだね。お疲れさま」"
translation = "「아, 회장군. 몬스터 퇴치는 무사히 끝난 것 같네. 수고했어」"

[[dialogue]]
speaker = "クロト"
original = "「あれ？\u3000ミルフィー、その格好は？」"
translation = "「어라? 밀피, 그 복장은?」"

[[dialogue]]
speaker = "ミルフィー"
original = "「星霊祭の途中だからってチアの練習しないわけにはいかないからね。軽めに合わせてきたところ」"
translation = "「성령제 도중이라고 해서 치어 연습을 안 할 수는 없으니까. 가볍게 맞추고 온 참이야」"

[[dialogue]]
speaker = "ミルフィー"
original = "「あ、ちょっと顔見せて」"
translation = "「아, 잠깐 얼굴 좀 보여줘」"

[[dialogue]]
speaker = "ミルフィー"
original = "「顔色、あまり良くないみたいだけど……疲れが溜まってるのかな？\u3000いつも私たちのために頑張ってくれてるもんね」"
translation = "「안색이, 별로 좋지 않은 것 같은데…… 피로가 쌓인 걸까? 항상 우리를 위해 열심히 해주고 있잖아」"

[[dialogue]]
speaker = "クロト"
original = "「体の疲労はそこまででもないけど……心の癒しが足りてない感じかな」"
translation = "「몸의 피로는 그렇게까지는 아니지만…… 마음의 치유가 부족한 느낌이랄까」"

[[dialogue]]
speaker = "ミルフィー"
original = "「心の癒し……？\u3000──ね、会長くん。私でよければ癒してあげよっか」"
translation = "「마음의 치유……? ──저기, 회장군. 나라도 괜찮다면 치유해 줄까」"

[[dialogue]]
speaker = "クロト"
original = "「嬉しいけど、何をしてくれるのかな？」"
translation = "「기쁘지만, 뭘 해줄 생각이야?」"

[[dialogue]]
speaker = "ミルフィー"
original = "「それはもちろん……」"
translation = "「그건 물론……」"

[[dialogue]]
speaker = "ミルフィー"
original = "「会長くんのためだけのチアリーディング──だよ<emoji=heart04>」"
translation = "「회장군만을 위한 치어리딩──이야<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "手を引かれ連れていかれた先は、ミルフィーの所属する陸上部の部室だ。"
translation = "손에 이끌려 도착한 곳은 밀피가 소속된 육상부의 부실이다."

[[dialogue]]
speaker = "unk"
original = "内側から施錠してしまえば、俺たちだけの空間ができあがる。"
translation = "안쪽에서 문을 잠가버리자, 우리 둘만의 공간이 만들어진다."

[[dialogue]]
speaker = "ミルフィー"
original = "「えへへ……２人きりになっちゃった」"
translation = "「에헤헤…… 둘이서만 있게 됐네」"

[[dialogue]]
speaker = "クロト"
original = "「本当にここでするつもり？」"
translation = "「정말로 여기서 할 생각이야?」"

[[dialogue]]
speaker = "ミルフィー"
original = "「そんなこと言って、会長くんのおち○ちんもやる気満々だよ。もうこんなにおっきく……あれれ？」"
translation = "「그런 말 하면서, 회장군의 거시기도 할 의욕이 넘치는데. 벌써 이렇게 커져서…… 어라라?」"

[[dialogue]]
speaker = "ミルフィー"
original = "「わ……会長くんのおち○ちんって、こんなにおっきかった……？\u3000エッチするの、久しぶりだから？」"
translation = "「와…… 회장군의 거시기가, 이렇게 컸었나……? 섹스하는 거, 오랜만이라서?」"

[[dialogue]]
speaker = "クロト"
original = "「ああ、星霊祭の準備が忙しくて、する暇もなくて……自分でも抜いてないし……」"
translation = "「아아, 성령제 준비가 바빠서, 할 틈도 없었고…… 혼자서도 안 뺐으니까……」"

[[dialogue]]
speaker = "ミルフィー"
original = "「１人でシコシコもしてなかったんだ……エッチ我慢すると、おち○ちんって、ずっしり重たくなるんだね……初めて知っちゃった<emoji=heart04>」"
translation = "「혼자서 딸딸이도 안 쳤구나…… 섹스를 참으면, 거시기가, 묵직하게 무거워지는구나…… 처음 알았어<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「タマタマも、膨らんでパンッパン……この中にぷりっぷりのせーしが、い～っぱい詰まってるんだよねー……？」"
translation = "「불알도, 부풀어서 빵빵…… 이 안에 탱글탱글한 정액이, 가~득 차 있는 거겠지~……?」"

[[dialogue]]
speaker = "ミルフィー"
original = "「おち○ちんくん、ずーっと、ぴゅっぴゅできなくて、ツラかったでしょー？\u3000ごめんね、よしよし<emoji=heart04>」"
translation = "「거시기 군, 계속, 찍찍 못 해서, 힘들었지~? 미안해, 착하다 착하다<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ふにふにと柔らかな媚肉による素股で、ペニスを撫でられる。"
translation = "부드럽고 말랑한 음육에 의한 보지 비비기로, 페니스를 쓰다듬는다."

[[dialogue]]
speaker = "unk"
original = "ちょっと角度をズラしただけで、おもらしみたいに愛液を滴らせているミルフィーの膣口に咥えこまれそうだ。"
translation = "조금 각도를 틀었을 뿐인데, 오줌 싼 것처럼 애액을 뚝뚝 흘리는 밀피의 질 입구에 물릴 듯하다."

[[dialogue]]
speaker = "ミルフィー"
original = "「私の中でいっぱいぴゅっぴゅして、すっきりしちゃお？\u3000その方が明日からもがんばれるもんねー」"
translation = "「내 안에서 잔뜩 찍찍하고, 시원하게 풀자? 그게 내일부터도 힘낼 수 있잖아~」"

[[dialogue]]
speaker = "クロト"
original = "「癒してくれるのは嬉しいけど……ミルフィーだってエッチしたかったんじゃない？」"
translation = "「치유해 주는 건 기쁘지만…… 밀피도 섹스하고 싶었던 거 아니야?」"

[[dialogue]]
speaker = "ミルフィー"
original = "「えへへ……バレちゃった？」"
translation = "「에헤헤…… 들켰네?」"

[[dialogue]]
speaker = "unk"
original = "ペロリと舌を出し、イタズラの見つかった子供のように笑う。"
translation = "낼름 혀를 내밀며, 장난이 들킨 아이처럼 웃는다."

[[dialogue]]
speaker = "unk"
original = "おっぱいもおま○こも丸出しのいやらしい格好と、その表情のギャップがまたペニスに響く。"
translation = "가슴도 보지도 다 드러낸 야한 복장과, 그 표정의 갭이 또 페니스에 울린다."

[[dialogue]]
speaker = "ミルフィー"
original = "「チアって大胆な格好で、大胆なポーズするでしょ……？」"
translation = "「치어는 대담한 복장으로, 대담한 포즈를 취하잖아……?」"

[[dialogue]]
speaker = "ミルフィー"
original = "「他の子は慣れてるかもしれないけど、初心者の私には刺激が強くって……ムラムラが抑えきれなくなっちゃった……<emoji=heart04>」"
translation = "「다른 애들은 익숙할지 몰라도, 초심자인 나한테는 자극이 강해서…… 울컥거림을 참을 수 없게 됐어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺がミルフィーのチアガール姿にペニスをイラつかせていたのと同じように、ミルフィーもまた体を持て余していたようだ。"
translation = "내가 밀피의 치어걸 모습에 페니스가 초조해했던 것처럼, 밀피 역시 몸을 주체하지 못했던 모양이다."

[[dialogue]]
speaker = "ミルフィー"
original = "「練習終わったばっかりでシャワーも浴びてないから、汗で蒸れちゃってるけど……いい？」"
translation = "「연습 끝난 직후라 샤워도 못 했으니까, 땀으로 축축하지만…… 괜찮아?」"

[[dialogue]]
speaker = "unk"
original = "チアの練習直後というのもあって、ミルフィーの全身は汗でしっとりと湿っている。漂うミルフィーの匂いにはほんのりと甘さを感じた。"
translation = "치어 연습 직후라서 그런지, 밀피의 전신은 땀으로 촉촉하게 젖어 있다. 풍기는 밀피의 냄새에서는 은은한 달콤함이 느껴졌다."

[[dialogue]]
speaker = "ミルフィー"
original = "「あはっ、おち○ちんぴくぴくしてる……おま○こに入りたいっておねだりかな？\u3000仕方ない子<emoji=heart04>」"
translation = "「아핫, 거시기 움찔움찔하고 있어…… 보지에 들어오고 싶다고 조르는 걸까? 어쩔 수 없는 아이네<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「いいよ、イライラしてるおち○ちんはぁ……あったかおま○こにしまっちゃおうね……<emoji=heart04>」"
translation = "「좋아, 초조해하는 거시기는…… 따뜻한 보지에 넣어버리자꾸나……<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「ぅんくぅうぅぅぅぅっ……<emoji=heart04>\u3000おち○ちん、入って、んっ……ふぅ、んぅ、ううぅううぅぅんっ<emoji=heart04>」"
translation = "「응크으으으으으윽……<emoji=heart04> 거시기, 들어와서, 응…… 후우, 응, 으으으으으으응윽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "練習後で火照っているミルフィーの膣内は熱くてトロトロ。限界まで張りつめているペニスをゆっくりと飲み込んでいく。"
translation = "연습 후 달아오른 밀피의 질 내는 뜨겁고 질척거린다. 한계까지 팽팽해진 페니스를 천천히 삼켜간다."

[[dialogue]]
speaker = "ミルフィー"
original = "「はっ……んぁ、ふぁはっ……<emoji=heart04>\u3000んぅうぅぅ……おち○ちん、いつもよりおっきいぃぃ……<emoji=heart04>\u3000おま○こ広がっちゃうよぉっ……<emoji=heart04>」"
translation = "「핫…… 응아, 파핫……<emoji=heart04> 응으으으…… 거시기, 평소보다 커어어어……<emoji=heart04> 보지 넓어지잖아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「はぁ、あっ……ふぁぁ……でも、ゆっくり、ゆっくり、膣奥、まで──んぅうぅんっ<emoji=heart04>」"
translation = "「하아, 앗…… 파아아…… 하지만, 천천히, 천천히, 질 안쪽, 까지──응으으으응윽<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「はっ、はぁ、はっ……ふふ、わかる……？\u3000おち○ちん、根本までぜぇんぶ……私の膣内に挿入っちゃったの……」"
translation = "「핫, 하아, 핫…… 후후, 알겠어……? 거시기, 뿌리까지 전~부…… 내 질 안에 삽입된 거……」"

[[dialogue]]
speaker = "クロト"
original = "「ああ……ミルフィーに全部包まれてるっ……」"
translation = "「아아…… 밀피에게 전부 감싸였어……」"

[[dialogue]]
speaker = "ミルフィー"
original = "「あなたのおち○ちんも、アツアツのカチカチできもちいいよっ……<emoji=heart04>\u3000これだけでイッちゃいそっ……<emoji=heart04>」"
translation = "「당신의 거시기도, 뜨끈뜨끈하고 딱딱해서 기분 좋아앗……<emoji=heart04> 이것만으로 가버릴 것 같아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「あっ、はぁ、おま○こっ……おち○ちんでみっちりになってぇ……一番奥にね、先っぽが、こんこんって当たってるのっ……<emoji=heart04>」"
translation = "「앗, 하아, 보지잇…… 거시기로 꽉 차서어…… 가장 안쪽에 말이야, 끝이, 톡톡하고 닿고 있어엇……<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「これって私のおま○この深さと、あなたのおち○ちんの長さがおんなじってこと、だよね……？\u3000ふふ、私たちの体の相性、抜群だぁ……嬉しい<emoji=heart04>」"
translation = "「이건 내 보지의 깊이와, 당신 거시기의 길이가 똑같다는 거, 맞지……? 후후, 우리 몸의 궁합, 최고다아…… 기뻐<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「ちょっと揺らしただけで……ぅうぅうぅぅんっ<emoji=heart04>\u3000子宮口がね、こりこり、されてっ……あっ、んぅん<emoji=heart04>\u3000きもち、いっ……<emoji=heart04>」"
translation = "「조금 흔들었을 뿐인데…… 으으으으으응윽<emoji=heart04> 자궁구가 말이야, 꼬들꼬들, 해져서엇…… 앗, 응<emoji=heart04> 기분, 좋아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ミルフィーの膣ひだはペニスを隙間なく包み込み、精液を搾り出そうと敏感な部分を刺激してくる。"
translation = "밀피의 질 주름은 페니스를 빈틈없이 감싸 안으며, 정액을 짜내려고 민감한 부분을 자극해 온다."

[[dialogue]]
speaker = "ミルフィー"
original = "「あ、疲れてる、でしょ……？\u3000寝っ転がったまま、動かなくて、いいよっ……ぜ～んぶ、私が、してあげるからね……<emoji=heart04>」"
translation = "「아, 피곤하잖아, 그치……? 누워 있는 채로, 움직이지 않아도, 괜찮아앗…… 전~부, 내가, 해줄 테니까아……<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「はぁっ、はっ<emoji=heart04>\u3000あなたはおち○ちんが気持ちよ～くなることだけ、考えて……おま○こに集中して、いっぱい癒されて……おま○こヒーリングだよ<emoji=heart04>」"
translation = "「하앗, 핫<emoji=heart04> 당신은 거시기가 기분~좋아지는 것만, 생각하고…… 보지에 집중해서, 잔뜩 치유받아…… 보지 힐링이야<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「ちょっと恥ずかしいけど、私がおち○ちんで感じちゃってるとこ……見ててね<emoji=heart04>\u3000出したくなっちゃったら、いつでも好きな時に射精していいからねっ<emoji=heart04>」"
translation = "「조금 부끄럽지만, 내가 거시기로 느끼고 있는 모습…… 봐줘<emoji=heart04> 싸고 싶어지면, 언제든 좋을 때 사정해도 괜찮으니까앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ミルフィーはペニスを咥えこんでいるおま○こを見せつけるように足を開き、腰を上下に浮かしては沈める。"
translation = "밀피는 페니스를 물고 있는 보지를 보여주듯이 다리를 벌리고, 허리를 위아래로 띄웠다가 가라앉힌다."

[[dialogue]]
speaker = "ミルフィー"
original = "「はぁ、はっ、はぁっ……あんっ、はっ、んんんっ<emoji=heart04>\u3000おいっちに、おいっちにっ……エッチなとこ、丸見えの、おま○こスクワットっ<emoji=heart04>」"
translation = "「하아, 핫, 하앗…… 앙, 핫, 응응응윽<emoji=heart04> 하나 둘, 하나 둘잇…… 야한 곳, 훤히 보이는, 보지 스쿼트으<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「んっ──おち○ちん、膣内で、もっと、おっきくなってる……エッチな応援で興奮しちゃった？」"
translation = "「응── 거시기, 질 안에서, 더, 커지고 있어…… 야한 응원에 흥분했어?」"

[[dialogue]]
speaker = "ミルフィー"
original = "「ふふ、私が応援してる時、いっぱい見てたもんね<emoji=heart04>\u3000会長くんのアッツ～い視線、すっごく感じてた……この服でエッチしたいって思ってたでしょー……？」"
translation = "「후후, 내가 응원할 때, 잔뜩 보고 있었잖아<emoji=heart04> 회장군의 뜨~거운 시선, 엄청 느끼고 있었어…… 이 옷 입고 섹스하고 싶다고 생각했지~……?」"

[[dialogue]]
speaker = "クロト"
original = "「……めちゃくちゃ思ってた」"
translation = "「……엄청 생각했어」"

[[dialogue]]
speaker = "ミルフィー"
original = "「だよね<emoji=heart04>\u3000私も<emoji=heart04>」"
translation = "「그렇지<emoji=heart04> 나도<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「いつもは真面目なクラス委員なのに、ミルフィーってエッチだな」"
translation = "「평소에는 성실한 반장이면서, 밀피는 야하네」"

[[dialogue]]
speaker = "ミルフィー"
original = "「あなただって真面目な会長くんなのに、こんなイケナイおち○ちんしてるでしょ？」"
translation = "「당신도 성실한 회장군이면서, 이런 나쁜 거시기 하고 있잖아?」"

[[dialogue]]
speaker = "ミルフィー"
original = "「こんなおち○ちん知っちゃったら……どんな女の子だって、虜になっちゃうよぉ……」"
translation = "「이런 거시기 알아버리면…… 어떤 여자애라도, 포로가 되어버릴 거야아……」"

[[dialogue]]
speaker = "ミルフィー"
original = "「もう１人寂しくオナニーなんてできない……気持ちよくなる時はあなたのおち○ちんがいいの……<emoji=heart04>」"
translation = "「더 이상 혼자 외롭게 자위 같은 건 못 해…… 기분 좋아질 때는 당신 거시기가 좋아……<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「んぅうぅっ<emoji=heart04>\u3000はっ……ふぁ、あはぁんっ……<emoji=heart04>\u3000あっ、きもちい、膣奥っ、きもちいぃよぉっ……<emoji=heart04>\u3000んっ、んぅふぅぅっ……<emoji=heart04>」"
translation = "「응으으으윽<emoji=heart04> 핫…… 파, 아항<emoji=heart04> 앗, 기분 좋아, 질 안쪽, 기분 좋아아앗……<emoji=heart04> 응, 응으으흐윽<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「私だけの気持ちいいおち○ちん、誰にもあげなぁい……<emoji=heart04>\u3000独り占めにしちゃうんだぁ<emoji=heart04>」"
translation = "「나만의 기분 좋은 거시기, 아무에게도 안 줄 거야아……<emoji=heart04> 독차지해 버릴 거야아<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「あんっ、あぁん<emoji=heart04>\u3000部室で、エッチな腰振りチアガール……<emoji=heart04>\u3000こんなカッコ、あなたにしか見せてあげないんだからっ……<emoji=heart04>」"
translation = "「앙, 아앙<emoji=heart04> 부실에서, 야한 허리 흔들기 치어걸……<emoji=heart04> 이런 모습, 당신에게밖에 안 보여줄 거니까앗……<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「あ、あっ、あっ、もっと硬くしてっ、気持ちよくなってっ……<emoji=heart04>\u3000がんばれ、おち○ちん、がーんばれっ<emoji=heart04>」"
translation = "「아, 앗, 앗, 더 단단하게 해줘엇, 기분 좋아져줘엇……<emoji=heart04> 힘내, 거시기, 힘~내애<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「いっぱい、いっぱい、ぴゅっぴゅしよーねっ<emoji=heart04>\u3000ぴゅっぴゅっぴゅっ<emoji=heart04>\u3000おせーし、おせーし、ぴゅっぴゅっぴゅっ<emoji=heart04>」"
translation = "「잔뜩, 잔뜩, 찍찍하자아앗<emoji=heart04> 찍찍찍<emoji=heart04> 정액, 정액, 찍찍찍<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ミルフィーが腰を揺らす度、爆乳がダイナミックに揺れる。"
translation = "밀피가 허리를 흔들 때마다, 폭유가 역동적으로 흔들린다."

[[dialogue]]
speaker = "unk"
original = "ミルフィーの体に浮かぶ珠のような汗の雫が飛び散り、寝そべる俺の体に雨のように降り注いだ。"
translation = "밀피의 몸에 맺힌 구슬 같은 땀방울이 튀어, 누워 있는 내 몸에 비처럼 쏟아졌다."

[[dialogue]]
speaker = "ミルフィー"
original = "「フレーッフレーッ、おち○ちんっ<emoji=heart04>\u3000がんばれがんばれ、おち○ちんっ<emoji=heart04>」"
translation = "「프레~이 프레~이, 거시기잇<emoji=heart04> 힘내라 힘내라, 거시기잇<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "両手でポンポンを振りながら、俺のペニスにエールを送る。"
translation = "양손으로 폼폼을 흔들며, 내 페니스에 응원을 보낸다."

[[dialogue]]
speaker = "unk"
original = "応援しているミルフィー自身も感度が増しているのだろう。ペニスを包む膣肉はより熱くなり、愛液でぬめりが増す。"
translation = "응원하고 있는 밀피 자신도 감도가 높아지고 있는 것이리라. 페니스를 감싸는 질 근육은 더욱 뜨거워지고, 애액으로 미끄러움이 더해진다."

[[dialogue]]
speaker = "ミルフィー"
original = "「はぁ、はっ、あんっ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000あんっ！？\u3000あれあれ？\u3000あなたも動きたくなっちゃったの？」"
translation = "「하아, 핫, 앙<emoji=heart04> 하앗<emoji=heart04> 앙!? 어라 어라? 당신도 움직이고 싶어졌어?」"

[[dialogue]]
speaker = "ミルフィー"
original = "「私が動くから、別にいいのに……<emoji=heart04>\u3000おま○こでおち○ちんシコシコしたくなっちゃったんだー？\u3000もっと気持ちよくなりたいの？」"
translation = "「내가 움직이니까, 딱히 괜찮은데……<emoji=heart04> 보지로 거시기 딸딸이 치고 싶어졌구나~? 더 기분 좋아지고 싶어?」"

[[dialogue]]
speaker = "クロト"
original = "「あ、ああ……もっと激しくしてほしい……っ」"
translation = "「아, 아아…… 더 격렬하게 해줬으면 좋겠어……!」"

[[dialogue]]
speaker = "ミルフィー"
original = "「ふふっ……<emoji=heart04>\u3000もう少し焦らそうと思ってたのになー<emoji=heart04>\u3000射精、我慢できなくなっちゃったんだー<emoji=heart04>」"
translation = "「후훗……<emoji=heart04> 조금 더 애태우려고 했는데~<emoji=heart04> 사정, 참을 수 없게 됐구나~<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「イキたくてイキたくて切ない顔してるの、かぁわいい<emoji=heart04>\u3000おま○こキュゥゥンってしちゃう<emoji=heart04>」"
translation = "「가고 싶어서 가고 싶어서 애절한 표정 짓는 거, 너~무 귀여워<emoji=heart04> 보지가 큐우웅하고 울어<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「じゃ、本気で搾り取っちゃお<emoji=heart04>\u3000気持ちよすぎて、おち○ちんがおバカになっちゃったらごめんねー<emoji=heart04>」"
translation = "「자, 그럼, 진심으로 짜내버리자<emoji=heart04> 너무 기분 좋아서, 거시기가 바보가 되어버려도 미안해~<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「え……！？」"
translation = "「에……!?」"

[[dialogue]]
speaker = "ミルフィー"
original = "「ふぅんっ、はっ、んぁ、あぁんっ<emoji=heart04>\u3000はぅうぅんっ<emoji=heart04>\u3000どうかなっ？\u3000おま○こでシコシコー、おち○ちんパコパコパンパンパンっ<emoji=heart04>」"
translation = "「흐응, 핫, 응아, 아앙<emoji=heart04> 하우으응윽<emoji=heart04> 어때애? 보지로 딸딸이이~, 거시기 박고 박고 팡팡팡<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「くぅぅっ！？\u3000ミルフィー、激しいっ……！？」"
translation = "「크으윽!? 밀피, 격렬해……!?」"

[[dialogue]]
speaker = "ミルフィー"
original = "「おち○ちんイカせようとすると、私も気持ちよくなりすぎちゃうんだよねー……<emoji=heart04>」"
translation = "「거시기 가게 하려고 하면, 나도 너무 기분 좋아져버린다니까아~……<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「ふぁあぁぁんっ<emoji=heart04>\u3000あ、あっ、はぅんっ、声っ、エッチな声出ちゃうっ……外に漏れちゃうよぉっ<emoji=heart04>」"
translation = "「파아아앙윽<emoji=heart04> 아, 앗, 하응, 목소리잇, 야한 목소리 나와앗…… 밖에 새어나가겠어어<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「んぁっ<emoji=heart04>\u3000あっ、あんっ<emoji=heart04>\u3000おま○この壁、擦れて、ぞくぞくしちゃぁう<emoji=heart04>」"
translation = "「응앗<emoji=heart04> 앗, 앙<emoji=heart04> 보지 벽, 쓸려서, 짜릿해져어<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「おっきなおち○ちん素敵<emoji=heart04>\u3000いいよぉっ<emoji=heart04>\u3000はっ、あんっ<emoji=heart04>\u3000おち○ちんがーんばれっ、がーんばれっ<emoji=heart04>」"
translation = "「커다란 거시기 멋져<emoji=heart04> 좋아아앗<emoji=heart04> 핫, 앙<emoji=heart04> 거시기 힘~내애, 힘~내애<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ぶるんぶるんと巨乳が激しく揺れ動く。"
translation = "부르릉 부르릉 거유가 격렬하게 흔들린다."

[[dialogue]]
speaker = "unk"
original = "互いの体が上下し、性器がピストンする毎に卑猥な水音を部室内に響かせた。"
translation = "서로의 몸이 상하로 움직이고, 성기가 피스톤질할 때마다 음란한 물소리가 부실 안에 울려 퍼졌다."

[[dialogue]]
speaker = "ミルフィー"
original = "「はぁ、んぁっ<emoji=heart04>\u3000はぅうぅぅんっ<emoji=heart04>\u3000がんばれがんばれ、おち○ちんっ<emoji=heart04>\u3000ファイトファイトおち○ちんっ<emoji=heart04>」"
translation = "「하아, 응앗<emoji=heart04> 하우으으응윽<emoji=heart04> 힘내라 힘내라, 거시기잇<emoji=heart04> 파이팅 파이팅 거시기잇<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「おま○こから頭のてっぺんまでっ、あんっ<emoji=heart04>\u3000おち○ちんで、貫かれてるみたぁいっ<emoji=heart04>\u3000おっきいおち○ちんだぁい好きっ<emoji=heart04>」"
translation = "「보지부터 정수리까지잇, 앙<emoji=heart04> 거시기로, 꿰뚫리는 것 같아앗<emoji=heart04> 커다란 거시기 너~무 좋아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「えへへ、チアダンスのおかげで、腰振りが上手になっちゃった<emoji=heart04>\u3000ほら、ほらっ、おち○ちんに媚び媚びなお尻フリフリダンスだよーっ<emoji=heart04>」"
translation = "「에헤헤, 치어 댄스 덕분에, 허리 흔들기가 능숙해졌어<emoji=heart04> 자, 자앗, 거시기에 아양 떠는 엉덩이 흔들흔들 댄스야아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスを咥えこんで、淫らな腰振りチアダンスを踊るミルフィーがエロくて、可愛くて、愛おしい。"
translation = "페니스를 물고, 음란한 허리 흔들기 치어 댄스를 추는 밀피가 야하고, 귀엽고, 사랑스럽다."

[[dialogue]]
speaker = "ミルフィー"
original = "「はぁんっ<emoji=heart04>\u3000はぁっ、ぁあぁんっ<emoji=heart04>\u3000おち○ちんきもちいい？\u3000きもちい？\u3000イキたくなったらいつでも出していいからねっ<emoji=heart04>」"
translation = "「하앙윽<emoji=heart04> 하앗, 아아앙윽<emoji=heart04> 거시기 기분 좋아? 기분 좋아? 가고 싶어지면 언제든 싸도 괜찮으니까앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "半開きになったミルフィーの口からは、粘度の高い唾液が糸を引いて垂れ落ちる。"
translation = "반쯤 벌어진 밀피의 입에서는, 점도 높은 타액이 실처럼 늘어져 떨어진다."

[[dialogue]]
speaker = "ミルフィー"
original = "「私の中に、た～っぷりぴゅっぴゅしよーねっ<emoji=heart04>\u3000会長くんのつよつよせーし、ぴゅっぴゅっぴゅっ<emoji=heart04>」"
translation = "「내 안에, 잔~뜩 찍찍하자아앗<emoji=heart04> 회장군의 강한 정액, 찍찍찍<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「おま○この一番奥で、ぴゅっぴゅって<emoji=heart04>\u3000子宮にいっぱいぶっかけよーねっ<emoji=heart04>」"
translation = "「보지의 가장 안쪽에서, 찍찍하고<emoji=heart04> 자궁에 잔뜩 뿌리자아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「もちろん、このまま中出しだからね～？\u3000アツアツの会長くんせーしっ、外に出すなんてもったいないもんっ<emoji=heart04>」"
translation = "「물론, 이대로 질싸니까아~? 뜨끈뜨끈한 회장군 정액, 밖에 내보내는 건 아깝잖아앗<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「中出しされて、あったかぁいの感じたら、私も絶対にイッちゃうっ<emoji=heart04>\u3000会長くんの赤ちゃん汁、おま○こにいっぱい注いで欲しいなぁ<emoji=heart04>」"
translation = "「질싸 당해서, 따뜻~한 거 느끼면, 나도 절대로 가버릴 거야앗<emoji=heart04> 회장군의 아기즙, 보지에 잔뜩 부어줬으면 좋겠네에<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "中出しをねだるミルフィーの腰振りピストンが更に加速する。体温が混ざりあい、俺と彼女との境目が分からなくなる。"
translation = "질싸를 조르는 밀피의 허리 흔들기 피스톤이 더욱 가속한다. 체온이 뒤섞여, 나와 그녀와의 경계가 알 수 없게 된다."

[[dialogue]]
speaker = "ミルフィー"
original = "「ふぁあぁっ<emoji=heart04>\u3000んぅ、んっ、ふぅうんっ<emoji=heart04>\u3000おち○ちんっ、どくんどくん脈打ってるっ<emoji=heart04>」"
translation = "「파아아앗<emoji=heart04> 응, 응, 흐으응윽<emoji=heart04> 거시기잇, 두근두근 맥동하고 있어엇<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「いいよー、いいよー<emoji=heart04>\u3000おち○ちん爆発しちゃいそうだねっ<emoji=heart04>\u3000タマタマに詰まってるせーし、めいっぱい搾り出そうねーっ<emoji=heart04>」"
translation = "「좋아아~, 좋아아~<emoji=heart04> 거시기 폭발할 것 같네엣<emoji=heart04> 불알에 차 있는 정액, 힘껏 짜내자아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "限界まで張りつめたペニスで子宮を激しくノックする内に、睾丸から数日ぶりの熱い塊がこみ上げてくる。"
translation = "한계까지 팽팽해진 페니스로 자궁을 격렬하게 노크하는 동안, 고환에서 며칠 만의 뜨거운 덩어리가 치밀어 오른다."

[[dialogue]]
speaker = "unk"
original = "生挿入、生中出し──もちろんそのリスクを知ってはいるけれど、今更止められやしない。"
translation = "질내 사정, 질내 분출──물론 그 위험을 알고는 있지만, 이제 와서 멈출 수는 없다."

[[dialogue]]
speaker = "unk"
original = "猛烈な快感で理性が蕩け、最高の射精をミルフィーの子宮に解き放つ以外のことを考えられなかった。"
translation = "맹렬한 쾌감에 이성이 녹아내려, 최고의 사정을 밀피의 자궁에 풀어놓는 것 외에는 아무것도 생각할 수 없었다."

[[dialogue]]
speaker = "ミルフィー"
original = "「いつでも、いつでもいいよっ<emoji=heart04>\u3000せーし出されたら、イッちゃうからっ……<emoji=heart04>\u3000アッツいの感じたら、ぜったいぜったいイッちゃうからぁっ……<emoji=heart04>」"
translation = "「언제든지, 언제든지 좋아<emoji=heart04> 정액 나오면, 가버릴 거니까……<emoji=heart04> 뜨거운 거 느끼면, 절대로 절대로 가버릴 거니까아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「出ーせっ、せーしっ、出ーせっ<emoji=heart04>\u3000おちー○ちんぴゅっぴゅっ、ぴゅっぴゅっぴゅーっ<emoji=heart04>」"
translation = "「내보내, 정액, 내보내<emoji=heart04> 자지 퓨슛퓨슛, 퓨슛퓨슛퓨웃<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「遠慮なんてしなくていいからねっ<emoji=heart04>\u3000私、あなたの彼女だもんっ<emoji=heart04>\u3000大好きなあなたのせーしっ、子宮が欲しがっちゃってるんだもんっ<emoji=heart04>」"
translation = "「사양 같은 거 할 필요 없어<emoji=heart04> 나, 당신의 여자친구인걸<emoji=heart04> 너무 좋아하는 당신의 정액, 자궁이 원하고 있는걸<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「あっ、んぁっ<emoji=heart04>\u3000あなたのきもちよぉくなってるイキ顔、かわいいっ<emoji=heart04>\u3000我慢できないよねー？\u3000たっぷり射精したいよねー？」"
translation = "「앗, 응앗<emoji=heart04> 당신이 기분 좋아져서 가는 얼굴, 귀여워<emoji=heart04> 참을 수 없지ー? 잔뜩 사정하고 싶지ー?」"

[[dialogue]]
speaker = "ミルフィー"
original = "「ほらっ、ほらっ<emoji=heart04>\u3000もう少しだよー、おち○ちんとタマタマに力入れてっ、ぎゅっぎゅって搾り出して<emoji=heart04>」"
translation = "「자, 자<emoji=heart04> 이제 조금이야ー, 자지랑 불알에 힘주고, 꽉꽉 짜내<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「がんばれがんばれおちー○ちんっ<emoji=heart04>\u3000負けるな負けるなおちー○ちんっ<emoji=heart04>\u3000ほら、ぴゅっぴゅっぴゅっ<emoji=heart04>\u3000ぴゅっぴゅっぴゅっ<emoji=heart04>」"
translation = "「힘내라 힘내라 자지<emoji=heart04> 지지 마라 지지 마라 자지<emoji=heart04> 자, 퓨슛퓨슛퓨슛<emoji=heart04> 퓨슛퓨슛퓨슛<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「んっ<emoji=heart04>\u3000おち○ちんの中、ぎゅーんって昇ってきてるっ、このままっ<emoji=heart04>\u3000中出ししちゃおーねっ<emoji=heart04>」"
translation = "「응<emoji=heart04> 자지 안이, 퓌이잉 하고 올라오고 있어, 이대로<emoji=heart04> 질내 사정 해버리자<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「イッちゃえ、イッちゃえ、おち○ちんっ<emoji=heart04>\u3000強いぞ、強いぞ、おち○ちんっ<emoji=heart04>」"
translation = "「가버려, 가버려, 자지<emoji=heart04> 강하다, 강하다, 자지<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「グツグツせーし、おま○こに上手に射精できるかなーっ？\u3000ほら、びゅーっびゅーっ<emoji=heart04>\u3000びゅーっびゅーーっ<emoji=heart04>」"
translation = "「부글부글 정액, 보지에 능숙하게 사정할 수 있을까ー? 자, 뷰웃뷰웃<emoji=heart04> 뷰웃뷰우웃<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「んんっ<emoji=heart04>\u3000私もイッちゃうっ<emoji=heart04>\u3000おま○こ、おま○こイクッ、イクイクイクイッぢゃうぅぅぅぅっ<emoji=heart04><emoji=heart04>」"
translation = "「응응<emoji=heart04> 나도 가버릴 거야<emoji=heart04> 보지, 보지 가앗, 가앗가앗가앗 버릴 거어어어엇<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「んくふぅううぅうぅぅっ！？！！？\u3000あっ<emoji=heart04>\u3000ああっ<emoji=heart04>\u3000んぁあぁああぁ～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「히규우우우우우웃?!?!? 앗<emoji=heart04> 아앗<emoji=heart04> 응아아아아아아~~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「ひぎゅっ<emoji=heart04>\u3000あっ、出てるっ出てるっ<emoji=heart04>\u3000びゅっ、びゅっ<emoji=heart04>\u3000びゅーっ、びゅーっ、びゅーっ<emoji=heart04>」"
translation = "「히귯<emoji=heart04> 앗, 나오고 있어 나오고 있어<emoji=heart04> 뷰슛, 뷰슛<emoji=heart04> 뷰웃, 뷰웃, 뷰웃<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「せーし、どぷどぷどぷって……<emoji=heart04>\u3000んんっ、すごぉい……子宮、たぷたぷになっちゃうよぉ……<emoji=heart04>」"
translation = "「정액, 철퍽철퍽철퍽 하고……<emoji=heart04> 응응, 굉장해애…… 자궁, 출렁출렁해지겠어어……<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「んんぅっ<emoji=heart04>\u3000まだせーし出せるよねー？\u3000もーっともーっと……ほらほら、おち○ちんがーんばれっ<emoji=heart04>\u3000がーんばれっ<emoji=heart04>」"
translation = "「응응으윽<emoji=heart04> 아직 정액 더 나올 수 있지ー? 더더더더…… 자자, 자지 힘내<emoji=heart04> 힘내애<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "自身も達しているミルフィーに煽られながら、ペニスに力を込めて、尿道に残る精液を送り出す。"
translation = "자신도 절정에 달한 밀피에게 부추겨지면서, 페니스에 힘을 주어 요도에 남은 정액을 내보낸다."

[[dialogue]]
speaker = "ミルフィー"
original = "「ひゃんっ<emoji=heart04>\u3000ホントにまだ出てくるんだぁっ<emoji=heart04>\u3000えらいぞ、すごいぞ、おち○ちんっ<emoji=heart04>\u3000カッコいいぞーっ<emoji=heart04>」"
translation = "「햣<emoji=heart04> 정말로 아직도 나오는구나앗<emoji=heart04> 장하다, 대단하다, 자지<emoji=heart04> 멋있다아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "大量の中出しを女の子の一番深いところで受け止めながら、ミルフィーは最後の最後までエッチなチアダンスを続けてくれた。"
translation = "대량의 질내 사정을 여자아이의 가장 깊은 곳에서 받아내면서, 밀피는 마지막까지 야릇한 치어 댄스를 계속해주었다."

[[dialogue]]
speaker = "ミルフィー"
original = "「はぁ、はふっ……<emoji=heart04>\u3000えへへ、まだ、おち○ちん、ぴくぴく動いてる……元気いっぱーい<emoji=heart04>」"
translation = "「하아, 하훗……<emoji=heart04> 에헤헤, 아직, 자지, 씰룩씰룩 움직이고 있어…… 기운이 넘쳐흘러<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「一滴残らず、私の膣内に出しちゃおうね<emoji=heart04>\u3000お射精上手でえらい、えらーい、だーい好き<emoji=heart04>」"
translation = "「한 방울도 남김없이, 내 질 안에 내보내자<emoji=heart04> 사정 잘해서 장하다, 장해애, 정말 좋아해<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "溜まっていた数日分の欲望を全て出し切り、名残惜しくもミルフィーの膣内からペニスが抜ける。"
translation = "쌓여 있던 며칠 치의 욕망을 모두 쏟아내고, 아쉽지만 밀피의 질 안에서 페니스가 빠져나온다."

[[dialogue]]
speaker = "ミルフィー"
original = "「ふぁんっ……<emoji=heart04>\u3000膣内から溢れてきちゃう……せっかくいっぱい出してもらったのに、もったいなーい」"
translation = "「퐝……<emoji=heart04> 질 안에서 흘러넘치잖아…… 모처럼 잔뜩 내보내줬는데, 아까워어」"

[[dialogue]]
speaker = "ミルフィー"
original = "「ふふ、私のおま○こ、そんなに気持ちよかったんだ……応援エッチ、満足してもらえたかな？」"
translation = "「후후, 내 보지, 그렇게 기분 좋았구나…… 응원 에로, 만족했으려나?」"

[[dialogue]]
speaker = "クロト"
original = "「最高だったよ、これなら明日からも頑張れそう……」"
translation = "「최고였어, 이 정도면 내일부터도 힘낼 수 있을 것 같아……」"

[[dialogue]]
speaker = "ミルフィー"
original = "「良かった……実は私もね、ちょっと不安だったんだ」"
translation = "「다행이다…… 실은 나도 말이야, 조금 불안했어」"

[[dialogue]]
speaker = "クロト"
original = "「ミルフィーも……？」"
translation = "「밀피도……?」"

[[dialogue]]
speaker = "ミルフィー"
original = "「突然だったから応援団のみんなの足を引っ張ってないか……最後までちゃんとやれるのかなって」"
translation = "「갑작스러웠으니까 응원단 모두에게 폐를 끼치지 않았을까…… 끝까지 제대로 할 수 있을까 하고」"

[[dialogue]]
speaker = "ミルフィー"
original = "「だけど会長くんを元気づけられたなら、きっと大丈夫だね。私の方こそ自信をもらえたよ」"
translation = "「하지만 회장군에게 기운을 북돋아 줄 수 있었다면, 분명 괜찮을 거야. 나야말로 자신감을 얻었어」"

[[dialogue]]
speaker = "ミルフィー"
original = "「いつも私に元気をくれるのは会長くんなの。ありがとね。だぁい好き<emoji=heart04>\u3000ちゅっ<emoji=heart04>」"
translation = "「언제나 나에게 기운을 주는 건 회장군인걸. 고마워. 정말 좋아해<emoji=heart04> 쪽<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
original = "「でも、こういうエッチな応援は、あなただけの特別……他の人になんてしてあげないんだよ……？」"
translation = "「하지만, 이런 야한 응원은, 당신만의 특별이야…… 다른 사람한테는 안 해줄 거거든……?」"

[[dialogue]]
speaker = "ミルフィー"
original = "「体も心も疲れちゃったら、いつでも言って。私が全力で癒してあげるから……ね<emoji=heart04>」"
translation = "「몸도 마음도 지치면, 언제든지 말해. 내가 전력으로 치유해 줄 테니까…… 응<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ミルフィーの温もりを感じながら、彼女の愛を独り占めにしている幸せを噛みしめるのだった。"
translation = "밀피의 온기를 느끼면서, 그녀의 사랑을 독차지하고 있는 행복을 곱씹는 것이었다."

