[[dialogue]]
speaker = "モネ"
original = "「平和ですねー」"
translation = "「평화롭네요―」"

[[dialogue]]
speaker = "ウィステリア"
original = "「平和ねー」"
translation = "「평화롭네―」"

[[dialogue]]
speaker = "モネ"
original = "「まぁ、いろいろ事件が起きていて、本当は平和じゃないのはわかってるんですけど。でも図書館はいつも通りですね」"
translation = "「뭐, 이런저런 사건이 일어나서 사실은 평화롭지 않다는 건 알고 있지만요. 그래도 도서관은 평소 그대로네요.」"

[[dialogue]]
speaker = "ウィステリア"
original = "「そうね。仕事も変わりなく──」"
translation = "「그렇네. 업무도 변함없이──」"

[[dialogue]]
speaker = "ウィステリア"
original = "「きゃっ！？」"
translation = "「꺄악!?」"

[[dialogue]]
speaker = "ウィステリア"
original = "「うぅ、またつまずいちゃったわ……。これで連続何日目かしら」"
translation = "「으으, 또 걸려 넘어졌네……. 이걸로 며칠 연속이더라.」"

[[dialogue]]
speaker = "モネ"
original = "（ウィステリアさんの運が悪いのもいつも通り……）"
translation = "(위스테리아 씨의 운이 나쁜 것도 평소 그대로……)"

[[dialogue]]
speaker = "モネ"
original = "「でも私、残念です。こんなに本がたくさんあるのに、テスト前以外はそんなに利用者が多くないんですから」"
translation = "「그래도 저는 아쉬워요. 이렇게 책이 잔뜩 있는데, 시험 기간 말고는 이용자가 그렇게 많지 않으니까요.」"

[[dialogue]]
speaker = "モネ"
original = "「本は素晴らしいです。歴史の本を読むことで、過去を知ることができます。科学の本を読めば、世界の仕組みを理解することができます」"
translation = "「책은 훌륭해요. 역사책을 읽음으로써 과거를 알 수 있어요. 과학책을 읽으면 세계의 구조를 이해할 수 있죠.」"

[[dialogue]]
speaker = "モネ"
original = "「物語は現実ではできないことを体験できます。詩は人の心を感じることができます」"
translation = "「이야기는 현실에선 할 수 없는 일을 체험하게 해줘요. 시는 사람의 마음을 느끼게 해주고요.」"

[[dialogue]]
speaker = "モネ"
original = "「本を通していろんな世界に触れることができます。だからみんなにもっと本を読んでほしいです」"
translation = "「책을 통해서 여러 세계를 접할 수 있어요. 그러니까 모두가 더 책을 읽었으면 좋겠어요.」"

[[dialogue]]
speaker = "モネ"
original = "「あと、人が来ないなら受付するより本を読んでいたいです……」"
translation = "「그리고 사람이 안 온다면 접수하는 것보다 책을 읽고 싶어요……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ダ～メ。これも立派な仕事なんだから。借りたい本があるのに受付がいなかったら困るでしょ」"
translation = "「안~ 돼. 이것도 훌륭한 업무니까. 빌리고 싶은 책이 있는데 접수처에 사람이 없으면 곤란하잖아.」"

[[dialogue]]
speaker = "モネ"
original = "「はーい」"
translation = "「네에―」"

[[dialogue]]
speaker = "モネ"
original = "「ちなみにウィステリアさんは、学生時代、図書館はよく利用されてましたか？」"
translation = "「그나저나 위스테리아 씨는 학생 시절에 도서관을 자주 이용하셨나요?」"

[[dialogue]]
speaker = "ウィステリア"
original = "「正直言うとあんまり……友達と過ごしたり、アルバイトしてる方が多かったわね」"
translation = "「솔직히 말하면 별로……. 친구들과 어울리거나 아르바이트하는 쪽이 더 많았지.」"

[[dialogue]]
speaker = "ウィステリア"
original = "（青春がしたくて人間界に来たとは言えない……しかも全然出会いがなかったし……）"
translation = "(청춘을 즐기고 싶어서 인간계에 왔다고는 말 못 해…… 게다가 만남이 전혀 없었다고는 더더욱……)"

[[dialogue]]
speaker = "モネ"
original = "「ウィステリアさん、アルバイトされてたんですね」"
translation = "「위스테리아 씨, 아르바이트를 하셨었군요.」"

[[dialogue]]
speaker = "モネ"
original = "「そういえば、ウィステリアさんの学生時代の話ってあまり聞いたことがない気がします。昔のウィステリアさんってどんな──」"
translation = "「그러고 보니 위스테리아 씨의 학생 시절 이야기는 별로 들어본 적이 없는 것 같아요. 옛날의 위스테리아 씨는 어떤──」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ああっと、いけないいけないっ。仕事しないとよね」"
translation = "「아앗, 안 되지 안 돼. 일해야지.」"

[[dialogue]]
speaker = "モネ"
original = "「今、急に話を逸らされたような……？」"
translation = "「지금 갑자기 화제를 돌리신 것 같은데……?」"

[[dialogue]]
speaker = "モネ"
original = "「でもどうにかして、図書館を利用する人を増やせないでしょうか」"
translation = "「그래도 어떻게든 도서관을 이용하는 사람을 늘릴 수는 없을까요.」"

[[dialogue]]
speaker = "モネ"
original = "「触ったり匂いを嗅いだりするのもいいですが、やはり本は読むためにあるもの。偏屈な子は別ですけど、本たちだって読まれたがっています」"
translation = "「만지거나 냄새를 맡는 것도 좋지만, 역시 책은 읽기 위해 있는 법. 편협한 아이는 별개지만, 책들도 읽히고 싶어 할 거예요.」"

[[dialogue]]
speaker = "ウィステリア"
original = "「前半は置いておくとして……そうね、せっかく本があるんだから読まないともったいないわ」"
translation = "「전반부는 일단 제쳐두고…… 그렇네, 기껏 책이 있는데 안 읽으면 아깝지.」"

[[dialogue]]
speaker = "ウィステリア"
original = "「だけど今までも取り組みはしてきたのよ。定期的な図書便りの更新はもちろん、季節のイベントを催したりとか」"
translation = "「하지만 지금까지도 노력은 해왔단다. 정기적인 도서 소식지 업데이트는 물론이고 계절 이벤트를 열기도 하고.」"

[[dialogue]]
speaker = "ウィステリア"
original = "「だけど反応してくれるのは、もともと図書館を利用していた子の方が多いわね」"
translation = "「하지만 반응해 주는 건 원래 도서관을 이용하던 아이들이 더 많아.」"

[[dialogue]]
speaker = "ウィステリア"
original = "「コハルコさんのデータだと、図書館の利用者は微減傾向。最近起きてる事件のせいもあるのかしら」"
translation = "「코하루코 씨의 데이터에 따르면 도서관 이용자는 서서히 줄어드는 추세. 최근 일어나는 사건들 때문일까.」"

[[dialogue]]
speaker = "モネ"
original = "「やっぱり減っているんですね。薄々そんな気はしてましたけど……」"
translation = "「역시 줄어들고 있군요. 어렴풋이 그런 기분은 들었습니다만……」"

[[dialogue]]
speaker = "ウィステリア"
original = "「ハッ──！\u3000このままだと──」"
translation = "「핫──! 이대로라면──」"

[[dialogue]]
speaker = "セイファート"
original = "「図書館の利用者数だが、ここのところ低迷しているようだな」"
translation = "「도서관 이용자 수가 요즘 들어 저조한 모양이군.」"

[[dialogue]]
speaker = "ウィステリア"
original = "「えっと、それは……ほら、学生って遊びたい年頃ですし、星騎士の活動がありますから、読書する時間がとれないのかも……」"
translation = "「저기, 그건…… 보시다시피 학생들은 한창 놀고 싶을 나이이기도 하고, 성기사 활동이 있으니까 독서할 시간을 내지 못하는 걸지도……」"

[[dialogue]]
speaker = "セイファート"
original = "「原因はいい。問題は需要に対してこの図書館の人員が過剰であるということだ」"
translation = "「원인은 됐다. 문제는 수요에 비해 이 도서관의 인원이 과잉이라는 것이다.」"

[[dialogue]]
speaker = "ウィステリア"
original = "「えっ？」"
translation = "「엣?」"

[[dialogue]]
speaker = "セイファート"
original = "「リクリエの激化に伴い、我々は体制を最適化し、リソースを集中させねばならない」"
translation = "「리크리에의 격화에 따라 우리는 체제를 최적화하고 리소스를 집중시켜야만 한다.」"

[[dialogue]]
speaker = "ウィステリア"
original = "「つまり……？」"
translation = "「즉……?」"

[[dialogue]]
speaker = "セイファート"
original = "「君はクビだ」"
translation = "「자네는 해고다.」"

[[dialogue]]
speaker = "ウィステリア"
original = "「えええ～～～～～っ！？」"
translation = "「에에에~~~~~엑!?」"

[[dialogue]]
speaker = "ウィステリア"
original = "（もし人を減らすことになれば、真っ先に切られるのは絶対運の悪い私だわ。最近は<b>あっち</b>の調査も捗ってないし……）"
translation = "(만약 인원을 줄이게 된다면 제일 먼저 잘리는 건 절대 운이 나쁜 나일 거야. 최근에는 <b>그쪽</b> 조사도 진척이 없고……)"

[[dialogue]]
speaker = "ウィステリア"
original = "（この歳で２度目の失業なんてゴメンよ。それだけは回避しないと……！）"
translation = "(이 나이에 두 번째 실업이라니 사양이야. 그것만은 회피해야 해……!)"

[[dialogue]]
speaker = "モネ"
original = "「ウィステリアさん？」"
translation = "「위스테리아 씨?」"

[[dialogue]]
speaker = "ウィステリア"
original = "「あっ、ううん、なんでもないわ」"
translation = "「앗, 아니, 아무것도 아니야.」"

[[dialogue]]
speaker = "ウィステリア"
original = "「そうね、利用者が少なくなるなんて司書として見過ごせないわ。私もできる範囲で手伝うわよ」"
translation = "「그래, 이용자가 적어지는 건 사서로서 묵과할 수 없지. 나도 가능한 범위에서 도울게.」"

[[dialogue]]
speaker = "モネ"
original = "「はい、よろしくお願いします！」"
translation = "「네, 잘 부탁드립니다!」"

