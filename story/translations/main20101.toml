[[dialogue]]
speaker = "unk"
original = "第１話,穏やかな日々,B"
translation = "제1화, 평온한 나날"

[[dialogue]]
speaker = "マトイ"
original = "「マドレーヌ焼いてきたんだ～♪\u3000焼き色もすごくいい感じで、今日のは自信作♪」"
translation = "「마들렌 구워 왔어~♪ 구워진 색깔도 엄청 잘 나왔고, 오늘 건 자신작이야~♪」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「やった！\u3000マトイのマドレーヌ好き～♪」"
translation = "「앗싸! 마토이의 마들렌 좋아~♪」"

[[dialogue]]
speaker = "アナ"
original = "「頭脳労働に糖分は不可欠。いただきます」"
translation = "「두뇌 노동에 당분은 불가결. 잘 먹겠습니다.」"

[[dialogue]]
speaker = "サーシャ"
original = "「うふふ。じゃあ紅茶淹れるわね～」"
translation = "「우후후. 그럼 홍차를 우릴게~」"

[[dialogue]]
speaker = "unk"
original = "星徒会業務の傍ら、ヴィーナスやマトイが持ってきてくれたお菓子でティータイム。"
translation = "성도회 업무 틈틈이, 비너스와 마토이가 가져온 과자로 티타임."

[[dialogue]]
speaker = "unk"
original = "この新星学園に転入して、そして星徒会長になって数ヶ月。すっかり見慣れた風景だ。"
translation = "이 신성학원에 전학 오고, 그리고 성도회장이 된 지 수개월. 완전히 익숙해진 풍경이다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「どうしたのよ、クロト。そんな孫を見守るおじいちゃんみたいな顔しちゃって」"
translation = "「왜 그래, 쿠로토. 그렇게 손주를 지켜보는 할아버지 같은 얼굴을 하고서.」"

[[dialogue]]
speaker = "クロト"
original = "「平和だなって」"
translation = "「평화롭구나 싶어서.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そうね。今日は名前を二度見するような部活の突撃もなかったし」"
translation = "「그렇네. 오늘은 이름을 두 번 보게 만드는 동아리의 돌격도 없었고.」"

[[dialogue]]
speaker = "クロト"
original = "「いや、そっちじゃなくて。それも星徒会の大事な仕事だけどさ」"
translation = "「아니, 그쪽이 아니라. 그것도 성도회의 중요한 일이지만 말이야.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「わかってるわよ」"
translation = "「알고 있어.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「アポロやギエルとの戦いがずいぶん昔のことに感じるわ。そんなに時間が経ったわけじゃないのにね」"
translation = "「아폴로나 기엘과의 싸움이 꽤 옛날 일처럼 느껴지네. 그렇게 시간이 흐른 것도 아닌데 말이야.」"

[[dialogue]]
speaker = "unk"
original = "フィーニスの塔の頂上で繰り広げられたギエルとの決戦。"
translation = "피니스의 탑 꼭대기에서 펼쳐졌던 기엘과의 결전."

[[dialogue]]
speaker = "unk"
original = "全ての力を結集した死闘でリクリエを封印し、流星市国は平和を取り戻していた。"
translation = "모든 힘을 결집한 사투 끝에 리크리에를 봉인하고, 유성시국은 평화를 되찾고 있었다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「ところで、ちゃんと検診は受けてるわよね」"
translation = "「그건 그렇고, 제대로 검진은 받고 있는 거지?」"

[[dialogue]]
speaker = "クロト"
original = "「もちろん。今のところ何の異常もなし。自分でも意外なくらい健康そのものだ」"
translation = "「물론이지. 지금으로선 아무런 이상도 없어. 스스로도 의외일 정도로 건강 그 자체야.」"

[[dialogue]]
speaker = "unk"
original = "ギエルを倒してなお消えなかったリクリエの力を、強引に俺の中に封じた。"
translation = "기엘을 쓰러뜨리고도 사라지지 않은 리크리에의 힘을, 억지로 내 안에 봉인했다."

[[dialogue]]
speaker = "unk"
original = "その力が俺に悪影響を与えていないか、定期的に診てもらっているのだけど……"
translation = "그 힘이 나에게 악영향을 주고 있지 않은지 정기적으로 진찰받고 있지만……"

[[dialogue]]
speaker = "クロト"
original = "（あれ、いろんなデータを取られるからな……）"
translation = "(그거, 이런저런 데이터를 가져가니까 말이지……)"

[[dialogue]]
speaker = "unk"
original = "アニマ先輩に、保健委員の子に、流星学園のエスメラルダ先生、それに母さんまで。"
translation = "아니마 선배에, 보건 위원 아이, 유성학원의 에스메랄다 선생님, 거기다 어머니까지."

[[dialogue]]
speaker = "unk"
original = "いろんな人に隅々まで計測されるが、ついでに必要ないデータも取られているんじゃないだろうか。"
translation = "여러 사람에게 구석구석 측정당하지만, 덤으로 필요 없는 데이터도 수집당하고 있는 게 아닐까."

[[dialogue]]
speaker = "クロト"
original = "「それにしても……戦いがなくても仕事はけっこうあるんだな」"
translation = "「그나저나…… 싸움이 없어도 일은 꽤 많구나.」"

[[dialogue]]
speaker = "アナ"
original = "「新星学園は生徒数が多いですし、星徒会の権限も大きいので、他の学校の生徒会と比べて業務が多いのは当然です」"
translation = "「신성학원은 학생 수가 많고, 성도회의 권한도 크기 때문에, 다른 학교의 학생회와 비교해서 업무가 많은 건 당연합니다.」"

[[dialogue]]
speaker = "クロト"
original = "「確かに……。いつもありがとう。助かってるよ、アナ」"
translation = "「확실히……. 항상 고마워. 도움이 되고 있어, 아나.」"

[[dialogue]]
speaker = "アナ"
original = "「それが副会長の仕事ですから。でも和菓子は感謝の気持ちとしていただきます」"
translation = "「그게 부회장의 일이니까요. 하지만 화과자는 감사의 표시로서 맛있게 먹겠습니다.」"

[[dialogue]]
speaker = "クロト"
original = "「ああ。今度お薦めを持ってくる」"
translation = "「그래. 다음에 추천하는 걸로 가져올게.」"

[[dialogue]]
speaker = "unk"
original = "戦いが大きかった分、後処理の書類仕事もたくさんあって、最近ようやく落ち着いた。"
translation = "싸움이 컸던 만큼, 사후 처리 서류 작업도 산더미처럼 쌓여 있었고, 최근 들어 겨우 진정되었다."

[[dialogue]]
speaker = "unk"
original = "みんな頑張ってくれたけど、特にアナは和菓子ブーストで獅子奮迅の活躍だった。"
translation = "모두 열심히 해주었지만, 특히 아나는 화과자 부스트로 사자분신의 활약을 보여주었다."

[[dialogue]]
speaker = "クロト"
original = "「でも一区切りついたし、俺も休憩にしようかな。マドレーヌもらうよ。……うん、美味しい。紅茶ともよく合う」"
translation = "「그래도 한 고비 넘겼으니, 나도 좀 쉴까. 마들렌 좀 먹을게. ……음, 맛있다. 홍차랑도 잘 어울려.」"

[[dialogue]]
speaker = "マトイ"
original = "「えへへ♪\u3000そう言ってくれると嬉しいな」"
translation = "「에헤헤♪ 그렇게 말해주니 기쁘네.」"

[[dialogue]]
speaker = "アポロ"
original = "「魔王～～！\u3000遊びに来たぞー！」"
translation = "「마왕~~! 놀러 왔다구!」"

[[dialogue]]
speaker = "フィオナ"
original = "「お邪魔しますね。合同学園祭の提案書をお持ちしました」"
translation = "「실례하겠습니다. 합동 학원제 제안서를 가져왔어요.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「いらっしゃい。ちょうど休憩してたところなのよ」"
translation = "「어서 와. 마침 쉬고 있던 참이야.」"

[[dialogue]]
speaker = "アポロ"
original = "「お、いいもの食べてるじゃないか。うまそうだな」"
translation = "「오, 좋은 거 먹고 있잖아. 맛있겠는데.」"

[[dialogue]]
speaker = "マトイ"
original = "「よかったらアポロちゃんも食べて。フィオナさんもどうぞ」"
translation = "「괜찮다면 아폴로짱도 먹어. 피오나 씨도 드세요.」"

[[dialogue]]
speaker = "フィオナ"
original = "「私もいいんですか？\u3000ありがとうございます」"
translation = "「저도 괜찮나요? 감사합니다.」"

[[dialogue]]
speaker = "マトイ"
original = "「どうぞどうぞー……はっ！？\u3000２人とも星見家のお嬢様なんだし、私が作ったお菓子じゃ口に合わないかも……」"
translation = "「얼마든지요~…… 핫!? 두 분 다 호시미 가문의 아가씨인데, 내가 만든 과자는 입에 안 맞을지도……」"

[[dialogue]]
speaker = "フィオナ"
original = "「ふふ、そんなことないです、とっても美味しいですよ♪」"
translation = "「후후, 그렇지 않아요, 정말 맛있답니다♪」"

[[dialogue]]
speaker = "アポロ"
original = "「あたしも気に入ったぞ！\u3000マトイがこれ作ったんだな、やるじゃないか！」"
translation = "「나도 맘에 들었어! 마토이가 이걸 만든 거구나, 제법인데!」"

[[dialogue]]
speaker = "マトイ"
original = "「そ、それほどでも……えへへ」"
translation = "「그, 그 정도까지는…… 에헤헤.」"

[[dialogue]]
speaker = "unk"
original = "星見姉妹の反応を見て、照れ笑いを浮かべるマトイ。"
translation = "호시미 자매의 반응을 보며 수줍게 웃는 마토이."

[[dialogue]]
speaker = "ヴィーナス"
original = "「マトイの手作りお菓子は私の心を掴んだんだもの。当然よ」"
translation = "「마토이의 수제 과자는 내 마음을 사로잡았는걸. 당연한 결과야.」"

[[dialogue]]
speaker = "アポロ"
original = "「そこはおまえが胸を張るところなのか……？」"
translation = "「거기서 네가 왜 가슴을 펴는 건데……?」"

[[dialogue]]
speaker = "unk"
original = "あの戦いの後、<ruby>あちら<rt>デネブ</rt></ruby>のアポロは元の世界に帰った。"
translation = "그 싸움 이후, 저쪽의 아폴로는 원래 세계로 돌아갔다."

[[dialogue]]
speaker = "unk"
original = "そして意識を失っていた<ruby>俺たちの世界<rt>アルタイル</rt></ruby>の彼女が目を覚まして──"
translation = "그리고 의식을 잃고 있던 우리 세계의 그녀가 눈을 뜨고──"

[[dialogue]]
speaker = "unk"
original = "<ruby>俺たちの世界<rt>アルタイル</rt></ruby>のアポロは、眠りながらも彼女と精神が同調しており、戦いの一部始終を知っていた。"
translation = "우리 세계의 아폴로는 잠들어 있으면서도 그녀와 정신이 동조되어 있었고, 싸움의 전말을 모두 알고 있었다."

[[dialogue]]
speaker = "アポロ"
original = "「あたしは……今度こそ本当の流星ライダーになりたい。だから引き続き、あたしのことは『アポロ』と呼んでくれ。『フィオナ』の名前はエリシアに譲ったからな」"
translation = "「나는…… 이번에야말로 진짜 유성 라이더가 되고 싶어. 그러니까 계속해서 나를 『아폴로』라고 불러줘. 『피오나』라는 이름은 엘리시아에게 양보했으니까.」"

[[dialogue]]
speaker = "unk"
original = "アポロは表向き星見家の養子ということになり、俺たちは彼女を仲間として迎えたのだった。"
translation = "아폴로는 대외적으로 호시미 가문의 양자가 되었고, 우리들은 그녀를 동료로서 맞이한 것이었다."

[[dialogue]]
speaker = "サーシャ"
original = "「あら～、そろそろ下校時刻だわ～。時間が経つのは早いわね～」"
translation = "「어머나~, 벌써 하교 시간이네~. 시간 참 빠르기도 해라~」"

[[dialogue]]
speaker = "unk"
original = "楽しい時間はあっという間に過ぎるもので、気付けば日も暮れなずんでいた。"
translation = "즐거운 시간은 순식간에 지나가는 법이라, 어느덧 해도 뉘엿뉘엿 저물고 있었다."

[[dialogue]]
speaker = "フィオナ"
original = "「あ、本当ですね。そろそろお暇しなければ」"
translation = "「아, 정말이네요. 슬슬 실례해야겠어요.」"

[[dialogue]]
speaker = "フィオナ"
original = "「今日は美味しいお茶とお菓子をご馳走になりました。流星の星徒会にも遊びに来てくださいね」"
translation = "「오늘은 맛있는 차와 과자 잘 대접받았습니다. 유성의 성도회에도 놀러 오세요.」"

[[dialogue]]
speaker = "アポロ"
original = "「またな！\u3000魔王と新星星徒会のみんな！」"
translation = "「나중에 봐! 마왕이랑 신성 성도회 녀석들!」"

[[dialogue]]
speaker = "unk"
original = "揃って帰っていくフィオナとアポロを見送る。"
translation = "나란히 돌아가는 피오나와 아폴로를 배웅한다."

[[dialogue]]
speaker = "unk"
original = "姉妹２人が一緒にいられるという当たり前のことが、本当に嬉しい。"
translation = "자매 둘이 함께 있을 수 있다는 당연한 사실이 정말로 기쁘다."

[[dialogue]]
speaker = "クロト"
original = "「残りの仕事は明日にして、俺たちも片付けて帰ろうか」"
translation = "「남은 일은 내일로 미루고, 우리도 정리하고 돌아가자.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「待ちなさい、クロト。活動日誌、忘れてるわよ」"
translation = "「기다려, 쿠로토. 활동 일지, 잊고 있잖아.」"

[[dialogue]]
speaker = "クロト"
original = "「そうだった。悪い悪い」"
translation = "「그랬지. 미안 미안.」"

[[dialogue]]
speaker = "unk"
original = "星徒会の活動日誌は、俺が会長になる前から、前会長であるヴィーナスが書き続けてきたものだ。"
translation = "성도회 활동 일지는 내가 회장이 되기 전부터, 전 회장인 비너스가 계속 써온 것이다."

[[dialogue]]
speaker = "クロト"
original = "「……よし、書けた。でも書いてあることだけ見ると、半分遊んでるみたいだな……」"
translation = "「……좋아, 다 썼다. 하지만 적힌 내용만 보면 절반은 놀고 있는 것 같네……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「それでもいいのよ。どんなことでも記録を残しておけば、星徒会が終わった時、きっとアルバム代わりになるわ」"
translation = "「그래도 괜찮아. 어떤 것이든 기록을 남겨두면, 성도회가 끝날 때 분명 앨범 대신이 될 테니까.」"

[[dialogue]]
speaker = "unk"
original = "それからみんなで寄り道したりしながら帰って、取り戻した平和を存分に謳歌したのだった──"
translation = "그러고 나서 다 함께 군것질도 하며 돌아가, 되찾은 평화를 마음껏 구가했다──"

