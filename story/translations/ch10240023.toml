[[dialogue]]
speaker = "unk"
original = "第３話,ヨミとブラッシング,P"
translation = "제3화, 요미와 브러싱, P"

[[dialogue]]
speaker = "unk"
original = "ぶっちゃけた話、俺はヨミの尻尾をモフモフするのが大好きである。"
translation = "솔직히 말해서 나는 요미의 꼬리를 복슬복슬 만지는 것을 정말 좋아한다."

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「会長、仕事お疲れ様です。少し休憩にしますか？」"
translation = "「회장님, 업무 수고 많으셨어요. 잠시 쉴까요?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「それなら私、緑茶を入れてきますね――って、尻尾をモフりたい気分……ですか？」"
translation = "「그럼 제가 녹차를 타 올게요── 어라, 꼬리를 만지고 싶은 기분……인가요?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「も、もう！\u3000会長ってば、まだ昼間なのに……い、いえ、夜だからいいってわけじゃないですけど……！」"
translation = "「정말! 회장님도 참, 아직 대낮인데…… 아, 아니, 밤이라고 괜찮다는 건 아니지만요……!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「星徒会メンバーの方がきて見られたりしたら、変な目で見られちゃいますよ……？\u3000その……エッチなことしてた、って……」"
translation = "「성도회 멤버분이 오셔서 보시기라도 하면 이상한 눈으로 보일 거예요……? 그…… 야한 짓 하고 있었다고……」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「――他の人には触らせてるのに、恋人の自分はダメなのか、って……そ、それは女性の友達相手なので、会長に触られるのとは違うっていうか……」"
translation = "「──다른 사람에게는 만지게 하면서 연인인 자신은 안 되는 거냐니…… 그, 그건 여자 친구들 상대니까 회장님이 만지는 것과는 다르다고 할까……」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「どう違うのかって聞かれると、その……好きな人に触られると、ドキドキしちゃうというか……」"
translation = "「어떻게 다르냐고 물으시면 그…… 좋아하는 사람이 만지면 두근거려버린다고나 할까……」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「あっ、会長……<emoji=heart04>\u3000尻尾モフっていいって、まだ言ってないのに……んっ……<emoji=heart04>」"
translation = "「앗, 회장님……<emoji=heart04> 꼬리 만져도 된다고 아직 안 했는데…… 응……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "恋人のスキンシップ……ダメか？"
translation = "연인의 스킨십…… 안 될까?"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「こやん<emoji=heart04>\u3000尻尾撫でながら、耳元で囁くのはずるいですよぉ……<emoji=heart04>」"
translation = "「코양<emoji=heart04> 꼬리 쓰다듬으면서 귓가에 속삭이는 건 반칙이에요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「私、せっかく自重してたのに……流されちゃいます……<emoji=heart04>」"
translation = "「저, 겨우 자제하고 있었는데…… 휩쓸려버려요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "尻尾は嬉しそうに左右に揺れている。そのモフモフとした感触を楽しんでいると――不意に、くしゃみが出てしまった。"
translation = "꼬리는 기쁜 듯 좌우로 흔들리고 있다. 그 복슬복슬한 감촉을 즐기고 있는데── 갑자기 재채기가 나왔다."

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「会長、どうしました？\u3000――え？\u3000鼻がなんだかムズムズする……？」"
translation = "「회장님, 왜 그러세요? ──에? 코가 왠지 근질근질하다고요……?」"

[[dialogue]]
speaker = "unk"
original = "それから数日経った、放課後。俺はヨミから空き教室に呼び出された――"
translation = "그로부터 며칠 뒤, 방과 후. 나는 요미에게 빈 교실로 호출당했다──"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「会長……お伝えしなければならないことがあります。申し訳ないんですけど――」"
translation = "「회장님…… 말씀드려야 할 게 있어요. 죄송하지만──」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「今日から尻尾モフモフは禁止になります」"
translation = "「오늘부터 꼬리 만지기는 금지입니다.」"

[[dialogue]]
speaker = "unk"
original = "終わりだ……"
translation = "끝이다……."

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「ちょっ、世界が終わったみたいな絶望的な顔に！？\u3000そんなショック受けます！？」"
translation = "「잠깐, 세상이 끝난 것 같은 절망적인 얼굴을!? 그렇게 충격받으시는 거예요!?」"

[[dialogue]]
speaker = "unk"
original = "俺の心の癒しが……（涙）"
translation = "내 마음의 치유가…… (눈물)"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「泣くほど！？\u3000お、落ち着いてください、会長！\u3000だ、ダメというのはその、理由があって……！」"
translation = "「울 정도로!? 저, 진정하세요 회장님! 아, 안 된다는 건 그게 이유가 있어서……!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「先日、会長がモフモフしてた時に、くしゃみをしてたじゃないですか。それで確認してみたんですけど――」"
translation = "「얼마 전에 회장님이 만지실 때 재채기를 하셨잖아요. 그래서 확인해 봤는데──」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「どうやら私、換毛期に入ったみたいで、恥ずかしながら、抜け毛が多くなってるようなんです……」"
translation = "「아무래도 저, 털갈이 시기에 들어간 것 같아서 부끄럽게도 털이 많이 빠지는 모양이에요……」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「なので、換毛期が終わるまでは、控えていただけると……」"
translation = "「그러니까 털갈이가 끝날 때까지는 삼가 주셨으면 해서……」"

[[dialogue]]
speaker = "unk"
original = "なら、ブラッシングをしよう！"
translation = "그럼 브러싱을 해주자!"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「え？\u3000――会長がブラシでしてくれるんですか？\u3000それならモフれるから一石二鳥……？」"
translation = "「에? ──회장님이 빗으로 해주신다고요? 그러면 만질 수 있으니 일석이조……?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「下心丸出しじゃないですかっ！\u3000ま、まぁ……会長がそこまで私の尻尾を気に入ってくれてるのは、悪い気はしないですけど……」"
translation = "「흑심이 뻔히 보이잖아요! 뭐, 뭐어…… 회장님이 그렇게까지 제 꼬리를 마음에 들어 해주시는 건 나쁘지 않지만요……」"

[[dialogue]]
speaker = "unk"
original = "そんなわけで、俺はヘアブラシを用意し、ヨミの尻尾をブラッシングすることになった――"
translation = "그리하여 나는 헤어브러시를 준비해 요미의 꼬리를 빗겨주게 되었다──"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「は、恥ずかしいですけど……よろしくお願いします……」"
translation = "「부, 부끄럽지만…… 잘 부탁드려요……」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「って、んっ……<emoji=heart04>\u3000こ、こやぁ……<emoji=heart04>\u3000会長のブラッシング……な、なんかいやらしいですぅ……！」"
translation = "「랄까, 응……<emoji=heart04> 코, 코야아……<emoji=heart04> 회장님의 브러싱…… 왠지 야해요……!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「ど、どんな風にって……なんか自分でブラッシングするのと全然違って……マッサージされてるみたいに……<emoji=heart04>\u3000こやんっ……<emoji=heart04>」"
translation = "「어, 어떤 식이냐니…… 왠지 직접 빗질하는 거랑 전혀 달라서…… 마사지 받는 것 같아서……<emoji=heart04> 코양……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「き、気持ちいいのは、だって……会長が変に上手いからで……<emoji=heart04>\u3000ふあぁっ……<emoji=heart04>\u3000なんでそんな手馴れてるんですかぁ……！？」"
translation = "「기, 기분 좋은 건 그게…… 회장님이 이상하게 잘하셔서……<emoji=heart04> 후아앗……<emoji=heart04> 왜 그렇게 능숙하신 거예요!?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「――ブラッシングのバイトをしたことがある？\u3000いや、どんなバイトなんですか、それぇ……<emoji=heart04>\u3000はあぁ……<emoji=heart04>」"
translation = "「──브러싱 아르바이트를 한 적이 있다고요? 아니, 대체 어떤 알바인가요 그건……<emoji=heart04> 하아아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「こやんっ<emoji=heart04>\u3000か、会長ぉ<emoji=heart04>\u3000そ、そこはぁ……<emoji=heart04>\u3000尻尾の付け根は弱いから、ブラッシングされるとぉ……だ、ダメですぅ……<emoji=heart04>\u3000ふうぅ……<emoji=heart04>」"
translation = "「코양<emoji=heart04> 회, 회장님<emoji=heart04> 거, 거기는……<emoji=heart04> 꼬리 뿌리는 약하니까 브러싱당하면…… 아, 안 돼요……<emoji=heart04> 후우우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「あっ<emoji=heart04>\u3000会長、どさくさに紛れて手で変なところ触っちゃ……<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ど、同時責めなんてされたら、声が我慢できな――」"
translation = "「앗<emoji=heart04> 회장님, 틈을 타서 손으로 이상한 곳을 만지면…… 응<emoji=heart04> 도, 동시 공격 같은 걸 당하면 목소리를 참을 수 없──」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「こやあぁぁんっ……<emoji=heart04>」"
translation = "「코야아아앙……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ブラッシングが終わった後、ヨミは脱力して俺の胸にもたれかかっていた。"
translation = "브러싱이 끝난 뒤 요미는 힘이 빠져 내 가슴에 기대어 있었다."

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「はぁ……はぁ……<emoji=heart04>\u3000も、もう……会長、爆裂スケベなんですから……<emoji=heart04>\u3000ダメって言ったのに、意地悪したりして……<emoji=heart04>」"
translation = "「하아…… 하아……<emoji=heart04> 정, 정말…… 회장님은 폭렬 변태라니까요……<emoji=heart04> 안 된다고 했는데 짓궂게 굴고……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ヨミが可愛くて、つい……"
translation = "요미가 귀여워서 그만……."

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「またそんなこと言って……何度も誤魔化されませんからね……っ」"
translation = "「또 그런 소리를…… 몇 번이나 속지 않을 거니까요……!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「――その割に喜んでたって？\u3000そ、そんなことありませんからっ」"
translation = "「──그거치곤 좋아했다고요? 그, 그런 적 없거든요!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「え？\u3000ならブラッシングはこれっきりにする？\u3000そ、その言い方はずるいです……」"
translation = "「에? 그럼 브러싱은 이번 한 번으로 끝낼까? 그, 그런 말투는 반칙이에요……」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「ん……<emoji=heart04>\u3000し、仕方ないですね……その代わり、次は優しくしてくださいね……？」"
translation = "「응……<emoji=heart04> 어, 어쩔 수 없네요…… 대신 다음엔 살살 해주셔야 해요……?」"

[[dialogue]]
speaker = "unk"
original = "そういえば、換毛期ってことは――"
translation = "그러고 보니 털갈이 시기라는 건──"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「え？\u3000は、はい。確かに、耳も同じように毛が生え変わりますけど……」"
translation = "「에? 네, 네. 확실히 귀도 똑같이 털이 새로 나긴 하지만……」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「――耳もブラッシングしたい！？\u3000い、いや、そこは尻尾の付け根と同じくらい敏感なので、自分で……あっ<emoji=heart04>」"
translation = "「──귀도 브러싱하고 싶다고요!? 아, 아니 거기는 꼬리 뿌리만큼이나 민감하니까 스스로…… 앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「か、会長……ダメですぅ……<emoji=heart04>\u3000ふあぁんっ……<emoji=heart04>」"
translation = "「회, 회장님…… 안 돼요……<emoji=heart04> 후아앙……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ヨミの可愛い反応を見たくて、俺はまた、ついブラッシングに熱が入ってしまうのだった――"
translation = "요미의 귀여운 반응을 보고 싶어서 나는 또 그만 브러싱에 열을 올리고 말았다──"

