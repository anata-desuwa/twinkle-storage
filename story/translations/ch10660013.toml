[[dialogue]]
speaker = "unk"
original = "第３話,ラティエの苦手なもの,P"
translation = "제3화, 라티에가 잘 못하는 것, P"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスと２人、新星学園の星徒会室で仕事をする──珍しいこともあるものだ。"
translation = "비너스와 둘이서 신성학원의 성도회실에서 일을 한다── 드문 일도 다 있는 법이다."

[[dialogue]]
speaker = "unk"
original = "そして珍しいことは、立て続けに起こるものであるらしい。"
translation = "그리고 드문 일은 연달아 일어나는 모양이다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「クロトー、ちょっといいかしら。ここの書類って──」"
translation = "「쿠로토~ 잠깐 괜찮을까. 여기 서류 말인데──」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「きゃーっ！？\u3000なになに、なんなのっ！」"
translation = "「꺄악!? 뭐야 뭐야, 뭔데!」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「夜分失礼、少し邪魔をするぞ──むっ、九浄の娘もいたのか。息災だったか？」"
translation = "「밤늦게 실례, 조금 실례하마── 흠, 쿠죠의 딸도 있었나. 평안했느냐?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そりゃ元気よ、元気だけど！\u3000ノックもなしに隣の学園の学園長が飛び込んでくるって……！」"
translation = "「당연히 건강하지, 건강한데! 노크도 없이 옆 학교 학원장님이 뛰어들어오다니……!」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「すまない。少々、困ったことになっている。説明する時間が惜しい」"
translation = "「미안하다. 조금 곤란한 상황이 되어서 말이야. 설명할 시간이 아깝군」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「きみ、すまんが私はここには来ていない。何も見なかったと言ってくれ。いいね？」"
translation = "「자네, 미안하지만 나는 여기 오지 않은 걸세. 아무것도 보지 못했다고 말해주게. 알겠지?」"

[[dialogue]]
speaker = "unk"
original = "え、ちょっと……ラティエさん！？"
translation = "어, 잠깐만요…… 라티에 씨!?"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「隠れるのはここでいいか。よし……では後は頼んだぞ」"
translation = "「숨을 곳은 여기가 좋겠군. 좋았어…… 그럼 나머지는 부탁하마」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「なっ、何なのよ、いったい……！？」"
translation = "「뭐, 뭐야 대체……!?」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「失礼しま～す。夜遅くにごめんなさいね、会長さんにヴィーナスさん」"
translation = "「실례합니다~ 늦은 밤에 미안해요, 회장님이랑 비너스 씨」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あら。確か流星学園の……」"
translation = "「어라. 확실히 유성학원의……」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「分析官のエスメラルダよ。ところでなんだけど、ラティエ学園長を見なかったかしら？」"
translation = "「분석관인 에스메랄다예요. 그런데 혹시 라티에 학원장님 못 보셨나요?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「えっと……み、見ていないけれど。どうかしたの？」"
translation = "「그게…… 보, 못 봤는데. 무슨 일이야?」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「困ってるのよ～。星力のデータ分析、まだ終わっていないのに逃げ出されちゃったの……！」"
translation = "「곤란하다구요~ 성력 데이터 분석, 아직 안 끝났는데 도망쳐 버리셔서……!」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「学園長って放浪癖があるでしょう？\u3000前もこうやって実験の途中に逃げ出されちゃって……」"
translation = "「학원장님은 방랑벽이 있으시잖아요? 전에도 이렇게 실험 도중에 도망치셔서……」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「今日は朝まで付き合ってもらおうと思ってたのに。どこ行っちゃったのかしら」"
translation = "「오늘은 아침까지 같이 있어 달라고 하려 했는데. 어디로 가신 걸까」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「こっそり付けてた発信機も外されちゃうし。新星学園の廊下に落ちてたから、とりあえず色々見て回っているのだけど」"
translation = "「몰래 붙여둔 발신기까지 떼어버리시고. 신성학원 복도에 떨어져 있길래 일단 여기저기 둘러보는 중이었는데」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "（な、なるほど。この人から逃げていたのね。だったら……）"
translation = "(나, 과연. 이 사람한테서 도망치고 있었구나. 그렇다면……)"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あ──窓の外に、怪しい人影がー！」"
translation = "「아── 창밖에 수상한 인영이!」"

[[dialogue]]
speaker_original = "エスメラルダ"
speaker_translation = "에스메랄다"
original = "「本当に！？\u3000どのあたりかしら、ヴィーナスさんっ」"
translation = "「정말요!? 어느 쪽인가요, 비너스 씨!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あっちに向かっていったわ！\u3000ついてきなさい！」"
translation = "「저쪽으로 향했어! 따라오렴!」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「ふぅ……いや、きみ。世話をかけたね。九浄の娘にも借りを作ってしまった。礼を言っておかないといけないな、これは」"
translation = "「후우…… 아니 자네, 신세를 졌군. 쿠죠의 딸에게도 빚을 졌어. 고맙다고 인사해야겠군, 이건」"

[[dialogue]]
speaker = "unk"
original = "どうして追われていたんですか？"
translation = "어째서 쫓기고 계셨던 거예요?"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「なに、簡単なことだよ。エスメラルダ女史はとても仕事熱心な分析官というだけの話さ」"
translation = "「뭐, 간단한 일이지. 에스메랄다 여사는 아주 일 욕심이 많은 분석관이라는 이야기일 뿐이야」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「きみも星騎士ならば知っているだろう？\u3000星力は、きみたちのような若い年頃の者がピークだ」"
translation = "「자네도 성기사라면 알고 있겠지? 성력은 자네들 같은 젊은 나이대가 피크다」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「加齢と共に星力は次第に衰えていく。それがこの世の決まり事。どの教科書にだってそう書いてある──が」"
translation = "「노화와 함께 성력은 점차 쇠퇴하기 마련이지. 그것이 이 세상의 섭리. 어느 교과서에나 그렇게 적혀 있다만──」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「私の星力はなぜかその決まりから外れていてね。この歳になっても未だ、出力は増大の傾向を保っている」"
translation = "「나의 성력은 왠지 그 섭리에서 벗어나 있어서 말이야. 이 나이가 되어서도 여전히 출력은 증대하는 경향을 유지하고 있지」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「まぁ、修行の成果だという以外に私には説明できんのだが。エスメラルダ女史はそれを科学で証明しようとしているんだよ」"
translation = "「뭐, 수행의 성과라는 것 말고는 나도 설명할 길이 없다만. 에스메랄다 여사는 그걸 과학으로 증명하려 하고 있거든」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「もしも皆が私のように、星力を伸ばし続けることができれば。これ以上ないリクリエ対策と言えるじゃないか」"
translation = "「만약 모든 이들이 나처럼 성력을 계속 늘릴 수 있게 된다면, 그보다 더 좋은 리크리에 대책은 없지 않겠나」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「それに生徒たちを矢面に立たせる必要もなくなるからね。彼女の気持ちは痛いほどわかる」"
translation = "「게다가 학생들을 방패막이로 세울 필요도 없어지니까 말이지. 그녀의 마음은 아플 정도로 이해한다」"

[[dialogue]]
speaker = "unk"
original = "じゃあ、なんで逃げるんです？"
translation = "그럼 왜 도망치시는 거예요?"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「それもまた簡単な話……終わらないんだよ、女史の分析は」"
translation = "「그것 또한 간단한 이야기지…… 끝나지 않거든, 그 여사의 분석은」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「きみ、想像してみるといい。１０時間も２０時間もトレーニングルームで星力測定を行うさまを」"
translation = "「자네, 상상해 보게나. 10시간이고 20시간이고 트레이닝 룸에서 성력 측정을 하는 모습을」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「コードのつながったヘルメットを始終かぶせられ、ひたすら湧き出てくるモンスターを星力でなぎ倒すんだ……」"
translation = "「코드가 연결된 헬멧을 내내 뒤집어쓴 채, 오로지 솟구쳐 나오는 몬스터를 성력으로 베어 넘기는 거다……」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「トレーニング室のモンスターは私にとって雑魚に等しい。延々と虚空に向かって素振りしているようなものだ……あれは疲れる。とても」"
translation = "「트레이닝 룸의 몬스터는 내게 잡초나 다름없어. 끝없이 허공을 향해 휘두르고 있는 셈이지…… 그건 지친다. 아주 많이」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「で、私の顔に疲れが見えたら女史は何を言うと思う？\u3000休憩しよう、ではない。『眠くなってきました？\u3000ぁ、コーヒーいります？』だ」"
translation = "「그런데 내 얼굴에 피곤함이 서리면 그 여사가 뭐라고 할 것 같나? 쉬자고 할까? 아니. 『졸려지셨나요? 아, 커피 드릴까요?』다」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「一杯のコーヒーを飲んだのち、また１０時間の計測が始まる。あれは地獄だ。魔界の『魔獣大行進』に巻き込まれた方が気が楽だよ、私は」"
translation = "「커피 한 잔을 마신 뒤 다시 10시간의 계측이 시작되지. 그건 지옥이야. 마계의 『마수 대행진』에 휘말리는 편이 마음 편할 거다, 나는」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「女史は優しく真面目な教師なのだがね、ちょっとこう、視野が狭くなる時があるんだ。興味深い実験対象がいる時などは特にね」"
translation = "「여사는 상냥하고 성실한 교사다만, 조금 이렇게 시야가 좁아질 때가 있거든. 흥미로운 실험 대상이 있을 때라면 특히 더 그렇지」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「そもそも私自身、己の体質をセルフチェックしたレポートは上げているんだぞ？\u3000体質の特異さは理解しているからね」"
translation = "「애초에 나 스스로 내 체질을 셀프 체크한 리포트는 올리고 있단 말이다. 체질의 특이함은 이해하고 있으니까」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「だが女史には関係ないんだ。彼女なりに取りたいデータがたくさんあるのだろう……」"
translation = "「하지만 여사에겐 상관없는 모양이야. 그녀 나름대로 얻고 싶은 데이터가 많은 거겠지……」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「はぁ……帰国していたことは内緒にしていたのだが。どこで漏れてしまった？\u3000もはや流星市国は安寧の地ではなくなってしまった」"
translation = "「하아…… 귀국했다는 건 비밀로 하고 있었는데 말이야. 어디서 샌 거지? 이제 유성시국은 안식의 땅이 아니게 되어버렸군」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「……仕方ない。ちょっとした旅に出るか」"
translation = "「……어쩔 수 없지. 잠깐 여행이라도 떠나볼까」"

[[dialogue]]
speaker = "unk"
original = "唐突ですね！？"
translation = "갑작스럽네요!?"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「エスメラルダ女史から逃げるには、彼女以上の奔放さを発揮するより他にない。現に、私の自宅も学園長室もすでに見張られている」"
translation = "「에스메랄다 여사에게서 도망치려면 그녀 이상의 분방함을 발휘하는 수밖에 없어. 당장 내 집도 학원장실도 이미 감시당하고 있으니 말이야」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「……うむ、どこに行くか。歯ごたえのない敵ばかりで退屈していたからな、思いきり体を動かせるところがいいな」"
translation = "「……음, 어디로 갈까. 시시한 적들뿐이라 지루하던 참이었으니 마음껏 몸을 움직일 수 있는 곳이 좋겠군」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「そうだ。レゾフできみと会った時、修行をしようとしていたね。今日の礼と言っては何だが、私が稽古をつけてやろうか？」"
translation = "「그래. 레조프에서 자네와 만났을 때 수행을 하려 했었지. 오늘의 답례라기엔 뭣하지만 내가 대련 상대를 해줄까?」"

[[dialogue]]
speaker = "unk"
original = "……と、そんなことがあり。"
translation = "……그리하여 그런 일이 있어."

[[dialogue]]
speaker = "unk"
original = "仕事終わりの俺は、そのままラティエさんに連れられ、流星市国から出かけることになるのだった。"
translation = "일이 끝난 나는 그대로 라티에 씨에게 이끌려 유성시국에서 떠나게 된 것이었다."

