[[dialogue]]
speaker = "unk"
original = "恋人として１歩前進し、以前のような『じゃれ合い』がまたできるようになった俺とリーリア。"
translation = "연인으로서 한 걸음 전진하여 이전과 같은 『장난』을 다시 칠 수 있게 된 나와 리리아."

[[dialogue]]
speaker = "unk"
original = "前回のリベンジで、海デートをしようと、休日に再びリゾート結界へやって来ていた。"
translation = "지난번의 리벤지로 바다 데이트를 하자며 휴일에 다시 리조트 결계로 찾아왔다."

[[dialogue]]
speaker = "リーリア"
original = "「センパイ……１週間、待ち遠しかったです<emoji=heart04>」"
translation = "「선배…… 일주일 동안 기다리기 힘들었어요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "先週は星徒会が忙しく、俺とリーリアは恋人の時間を過ごす暇がなかった。"
translation = "지난주는 성도회가 바빠서 나와 리리아는 연인만의 시간을 보낼 틈이 없었다."

[[dialogue]]
speaker = "unk"
original = "それならばと、彼女からある提案を受けていたのだ。"
translation = "그렇다면 하고 그녀로부터 어떤 제안을 받았었다."

[[dialogue]]
speaker = "リーリア"
original = "「この１週間、魔法でスキンシップしないように誓約をかけてましたけど、センパイはどうでしたか？」"
translation = "「이 일주일 동안 마법으로 스킨십하지 않도록 서약을 걸어뒀었는데 선배는 어떠셨나요?」"

[[dialogue]]
speaker = "クロト"
original = "「おかげで、仕事には集中できたけど……」"
translation = "「덕분에 일에는 집중할 수 있었지만……」"

[[dialogue]]
speaker = "リーリア"
original = "「ふふっ、それならよかったです♪\u3000でも、気づきましたか、センパイ？」"
translation = "「후훗, 그렇다면 다행이네요♪ 하지만 눈치채셨나요, 선배?」"

[[dialogue]]
speaker = "リーリア"
original = "「実は魔法の効果で……ムラムラしないように性欲が抑えられてたんですよ☆」"
translation = "「사실 마법의 효과로…… 근질근질하지 않도록 성욕이 억제되어 있었거든요☆」"

[[dialogue]]
speaker = "クロト"
original = "「え？\u3000それって……」"
translation = "「에? 그건……」"

[[dialogue]]
speaker = "リーリア"
original = "「ふふ、つまりは無自覚に、オナニー禁止状態だったというわけです♪」"
translation = "「후후, 즉 무자각하게 자위 금지 상태였다는 뜻이에요♪」"

[[dialogue]]
speaker = "リーリア"
original = "「それで、今からその魔法を解いちゃおうと思います。その解除条件は……キスです<emoji=heart04>」"
translation = "「그래서 지금부터 그 마법을 풀어버리려고 생각해요. 그 해제 조건은…… 키스예요<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「で、でも……いいのか？\u3000そんな状態で魔法が解けたら俺、多分……」"
translation = "「하, 하지만…… 괜찮겠어? 그런 상태에서 마법이 풀리면 나, 아마……」"

[[dialogue]]
speaker = "リーリア"
original = "「大丈夫ですよ。もちろん、ちゃんと責任持ってセンパイのこと、受け止めますから<emoji=heart04>」"
translation = "「괜찮아요. 물론 제대로 책임지고 선배를 받아낼 테니까요<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「それに魔法をかけていたのは、私も同じなので……これからすごくエッチな後輩になっちゃうと思います」"
translation = "「게다가 마법을 걸고 있었던 건 저도 마찬가지라서…… 이제부터 엄청 야한 후배가 되어버릴 것 같아요.」"

[[dialogue]]
speaker = "リーリア"
original = "「なので、今日はいっぱい甘えるのを許してくれると嬉しいです<emoji=heart04>」"
translation = "「그러니까 오늘은 잔뜩 어리광 부리는 걸 허락해 주시면 기쁠 것 같아요<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言うと、リーリアはそっと唇を寄せて来て――"
translation = "그렇게 말하자 리리아는 살며시 입술을 다가와서――"

[[dialogue]]
speaker = "リーリア"
original = "「センパイ……<emoji=heart04>\u3000ん……<emoji=heart04>」"
translation = "「선배……<emoji=heart04> 응……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は彼女と、１週間ぶりのキスを交わす。"
translation = "나는 그녀와 일주일 만에 키스를 나눈다."

[[dialogue]]
speaker = "リーリア"
original = "「ちゅっ……<emoji=heart04>」"
translation = "「츄……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "と、その瞬間、スイッチが入るように体が熱くなった。"
translation = "그 순간, 스위치가 켜지듯 몸이 뜨거워졌다."

[[dialogue]]
speaker = "unk"
original = "俺は彼女を抱き寄せて、舌を絡めて、貪るようにキスをする。"
translation = "나는 그녀를 끌어당겨 혀를 섞으며 탐하듯 키스를 한다."

[[dialogue]]
speaker = "リーリア"
original = "「あっ<emoji=heart04>\u3000センパイ……！\u3000んむっ<emoji=heart04>\u3000ちゅっ……ちゅぱっ……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 선배……! 음뭇<emoji=heart04> 츄…… 츄파……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「んっ……ちゅっ<emoji=heart04>\u3000んむっ……れろちゅっ<emoji=heart04>\u3000ちゅぷぷっ……ちゅるるっ<emoji=heart04>\u3000ちゅぱっ……んちゅっ<emoji=heart04>\u3000れるれるっ……れろちゅっ<emoji=heart04>」"
translation = "「응…… 츄<emoji=heart04> 음뭇…… 레로츄<emoji=heart04> 츄푸푸…… 츄루루…… 츄파…… 응츄…… 레루레루…… 레로츄……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「はあぁっ……<emoji=heart04>\u3000センパイ、キス激しっ……ふぅっ<emoji=heart04>\u3000んむぅっ……ちゅっ<emoji=heart04>\u3000ちゅぷぷっ……ちゅぱっ<emoji=heart04>\u3000れろちゅっ……<emoji=heart04>」"
translation = "「하아앗……<emoji=heart04> 선배 키스 격렬해…… 후우<emoji=heart04> 음무웃…… 츄<emoji=heart04> 츄푸푸…… 츄파…… 레로츄……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「んんっ<emoji=heart04>\u3000久しぶりのキス、気持ちいいれす……<emoji=heart04>\u3000んっ……ちゅっ<emoji=heart04>\u3000ちゅるるっ……ちゅぱっ<emoji=heart04>」"
translation = "「응응<emoji=heart04> 오랜만의 키스, 기분 좋아아욧……<emoji=heart04> 응…… 츄<emoji=heart04> 츄루루…… 츄파……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「んふぅっ……<emoji=heart04>\u3000舌絡めてると、甘くて幸せな気分になりましゅ……<emoji=heart04>\u3000ちゅっ……んちゅっ……<emoji=heart04>\u3000ちゅぷぷっ……ちゅるるっ……<emoji=heart04>」"
translation = "「응후웃……<emoji=heart04> 혀 섞고 있으면 달콤해서 행복한 기분이 되어어욧……<emoji=heart04> 츄…… 응츄…… 츄푸푸…… 츄루루……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「頭の中とろけちゃいそう……<emoji=heart04>\u3000んむっ……れろちゅっ……<emoji=heart04>」"
translation = "「머릿속이 녹아버릴 것 같아……<emoji=heart04> 음뭇…… 레로츄……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そうして彼女との甘いキスを堪能する内に、俺はどんどん興奮してきてしまい――"
translation = "그렇게 그녀와의 달콤한 키스를 만끽하는 동안 나는 점점 흥분해버리고 말아――"

[[dialogue]]
speaker = "リーリア"
original = "「んっ<emoji=heart04>\u3000センパイ、お腹に固いのが当たってますよ……<emoji=heart04>\u3000ふうぅ……<emoji=heart04>」"
translation = "「응<emoji=heart04> 선배, 배에 딱딱한 게 닿고 있어요……<emoji=heart04> 후우……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「あんっ<emoji=heart04>\u3000お尻を触る手、いやらしいです……<emoji=heart04>」"
translation = "「앙<emoji=heart04> 엉덩이를 만지는 손, 야해요……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「――ビーチチェアーに座りながら、ですか？\u3000わかりました……<emoji=heart04>」"
translation = "「――비치 체어에 앉으면서요? 알겠습니다……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「やぁっ……<emoji=heart04>\u3000センパイ、おっぱい触られるの恥ずかしいです……<emoji=heart04>\u3000あっ、あんっ……<emoji=heart04>」"
translation = "「야앗……<emoji=heart04> 선배, 가슴 만져지는 거 부끄러워요……<emoji=heart04> 앗, 앙……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「リーリアのおっぱい、可愛くて好きだよ」"
translation = "「리리아의 가슴, 귀여워서 좋아해.」"

[[dialogue]]
speaker = "リーリア"
original = "「はあぁっ……<emoji=heart04>\u3000んっ……乳首ダメです……感じちゃう……あっ、はぁんっ……<emoji=heart04>」"
translation = "「하아앗……<emoji=heart04> 응…… 유두 안 돼요…… 느껴버려…… 앗, 하앙……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「それに敏感で感じやすくて、エッチだ」"
translation = "「게다가 민감해서 느끼기 쉽고, 야해.」"

[[dialogue]]
speaker = "リーリア"
original = "「そ、それはセンパイがいつも弄るから……<emoji=heart04>\u3000んっ……あんっ<emoji=heart04>」"
translation = "「그, 그건 선배가 맨날 만지작거리니까……<emoji=heart04> 응…… 앙<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「じゃあ、おっぱいはもう触るの止めにしちゃう？」"
translation = "「그럼 가슴은 이제 그만 만질까?」"

[[dialogue]]
speaker = "unk"
original = "俺がぱっと手を離すと――"
translation = "내가 팟 하고 손을 떼자――"

[[dialogue]]
speaker = "リーリア"
original = "「やん……<emoji=heart04>\u3000い、意地悪しないで下さい……」"
translation = "「양……<emoji=heart04> 괴, 괴롭히지 마세요……」"

[[dialogue]]
speaker = "クロト"
original = "「本当は？」"
translation = "「사실은?」"

[[dialogue]]
speaker = "リーリア"
original = "「本当は……センパイにおっぱい触られるの、気持ちよくて、好きです……<emoji=heart04>」"
translation = "「사실은…… 선배가 가슴 만져주는 거 기분 좋아서 좋아해요……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「よく言えました」"
translation = "「잘 말했어.」"

[[dialogue]]
speaker = "リーリア"
original = "「あっ、あんっ……<emoji=heart04>」"
translation = "「앗, 앙……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「はあぁっ……ふうぅっ……<emoji=heart04>\u3000おっぱい気持ちいい<emoji=heart04>\u3000んっ……ふああっ……<emoji=heart04>」"
translation = "「하아앗…… 후우우읏……<emoji=heart04> 가슴 기분 좋아아<emoji=heart04> 응…… 후아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「乳首コリコリされて、感じちゃいますぅ<emoji=heart04>\u3000あっ、あんっ<emoji=heart04>\u3000はあぁっ……ふあぁっ……<emoji=heart04>」"
translation = "「유두 굴려져서 느껴버려어욧<emoji=heart04> 앗, 앙<emoji=heart04> 하아앗…… 후아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「あっ、センパイのおち○ちん、すごい……<emoji=heart04>\u3000ふうぅ……<emoji=heart04>\u3000もうギンギンに大きくなって……」"
translation = "「앗, 선배 자지 굉장해……<emoji=heart04> 후우……<emoji=heart04> 벌써 빳빳하게 커져서……」"

[[dialogue]]
speaker = "リーリア"
original = "「ふあぁっ<emoji=heart04>\u3000おま○こに当たって……<emoji=heart04>\u3000んっ……はあぁっ……<emoji=heart04>\u3000あっ……んうぅっ……<emoji=heart04>」"
translation = "「후아앗<emoji=heart04> 보지에 닿아서……<emoji=heart04> 응…… 하아앗……<emoji=heart04> 앗…… 응우읏……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「固くて逞しいカリで、ズリズリされて……ふあぁっ<emoji=heart04>\u3000感じちゃいます<emoji=heart04>\u3000はあぁっ……<emoji=heart04>\u3000すごっ……んんっ……<emoji=heart04>」"
translation = "「딱딱하고 늠름한 귀두로 문질문질 당해서…… 후아앗<emoji=heart04> 느껴버려요<emoji=heart04> 하아앗……<emoji=heart04> 굉장해…… 응응……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「あっ<emoji=heart04>\u3000クリに当たって、んあぁっ<emoji=heart04>\u3000ダメぇ……あんっ<emoji=heart04>\u3000んうぅっ……あっ……はぁんっ……<emoji=heart04>\u3000感じるのぉ<emoji=heart04>\u3000あっ、ふあぁっ……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 클리에 닿아서, 응아앗<emoji=heart04> 안 돼애…… 앙<emoji=heart04> 응우읏…… 앗…… 하앙……<emoji=heart04> 느껴져어어<emoji=heart04> 앗, 후아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「んっ……はあぁ……<emoji=heart04>\u3000せ、センパイ……<emoji=heart04>\u3000私もう、欲しいです……<emoji=heart04>」"
translation = "「응…… 하아……<emoji=heart04> 서, 선배……<emoji=heart04> 저 이제 갖고 싶어요……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「おま○こ待ちきれなくて、もうぐちょぐちょに、なっちゃってます<emoji=heart04>\u3000ふうぅ……<emoji=heart04>」"
translation = "「보지가 못 기다려서 벌써 질척질척하게 되어버렸어요<emoji=heart04> 후우……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ああ、俺も、もう我慢できない」"
translation = "「아아, 나도 이제 못 참겠어.」"

[[dialogue]]
speaker = "クロト"
original = "「中に入れちゃうからな？」"
translation = "「안에 넣어버릴 거니까?」"

[[dialogue]]
speaker = "リーリア"
original = "「は、はい……来て下さい、センパイっ……<emoji=heart04>」"
translation = "「네, 네…… 와주세요, 선배……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「あっ、あんっ<emoji=heart04>\u3000おち○ちんの先っぽ、当たって……ふうぅ……<emoji=heart04>」"
translation = "「앗, 앙<emoji=heart04> 자지 끝부분 닿아서…… 후우……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「んっ<emoji=heart04>\u3000入って来るっ……<emoji=heart04>\u3000はあぁっ……ふあぁっ……<emoji=heart04>\u3000あっ――<emoji=heart04><emoji=heart04>」"
translation = "「응<emoji=heart04> 들어온다……<emoji=heart04> 하아앗…… 후아앗……<emoji=heart04> 앗――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「んあああぁっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000おち○ちん、入ったぁっ……<emoji=heart04><emoji=heart04>\u3000はあぁっ…………ふうぅっ……<emoji=heart04>」"
translation = "「응아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 자지 들어왔다아앗……<emoji=heart04><emoji=heart04> 하아앗………… 후우우읏……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「センパイのおち○ちん、やっぱりすごい……<emoji=heart04>\u3000はあぁっ……んんっ……<emoji=heart04>\u3000大きくて逞しいです……<emoji=heart04>\u3000ふうぅっ……<emoji=heart04>」"
translation = "「선배 자지 역시 굉장해……<emoji=heart04> 하아앗…… 응응……<emoji=heart04> 크고 늠름해요……<emoji=heart04> 후우우읏……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「くっ……１週間ぶりのリーリアの中、気持ちよくて……ヤバい……！\u3000しゃぶるように、きゅうきゅう吸いついて来るっ……！」"
translation = "「큭…… 일주일 만의 리리아 안, 기분 좋아서…… 위험해……! 빨아들이듯이 꽉꽉 조여와……!」"

[[dialogue]]
speaker = "リーリア"
original = "「んうぅっ、はあぁっ……<emoji=heart04>\u3000１週間ぶりのセンパイおち○ちん、おま○こ喜んで、勝手に抱き着いちゃってます<emoji=heart04>\u3000ふうぅっ……んんっ……<emoji=heart04>」"
translation = "「응우읏, 하아앗……<emoji=heart04> 일주일 만의 선배 자지, 보지가 기뻐서 멋대로 매달려버리고 있어요<emoji=heart04> 후우우읏…… 응응……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ダメだ……我慢できない……！\u3000リーリア、動くぞ……！」"
translation = "「안 되겠다…… 못 참겠어……! 리리아, 움직인다……!」"

[[dialogue]]
speaker = "リーリア"
original = "「は、はいっ……センパイ……あっ――<emoji=heart04><emoji=heart04>」"
translation = "「네, 네…… 선배…… 앗――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「ふああああああぁっ<emoji=heart04>\u3000１週間ぶりのおち○ちん、来たあぁっ<emoji=heart04>\u3000あっ、あんっ<emoji=heart04>\u3000はあぁっ……んあぁっ<emoji=heart04>\u3000んうぅっ……ふあぁっ<emoji=heart04>」"
translation = "「후아아아아아아앗<emoji=heart04> 일주일 만의 자지, 왔다아앗<emoji=heart04> 앗, 앙<emoji=heart04> 하아앗…… 응아앗<emoji=heart04> 응우읏…… 후아앗<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「あっ、はあぁっ……んあぁっ<emoji=heart04>\u3000奥まで当たってぇっ<emoji=heart04>\u3000あっ、あんっ<emoji=heart04>\u3000気持ちいいっ<emoji=heart04>\u3000あっ……んっ……ふうぅっ……<emoji=heart04>\u3000ふああぁっ<emoji=heart04>」"
translation = "「앗, 하아앗…… 응아앗<emoji=heart04> 안쪽까지 닿아줘어엇<emoji=heart04> 앗, 앙<emoji=heart04> 기분 좋아앗<emoji=heart04> 앗…… 응…… 후우우읏……<emoji=heart04> 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「あっ……すごいっ……<emoji=heart04>\u3000そこっ……いいですっ……<emoji=heart04>\u3000あんっ……好きっ<emoji=heart04>\u3000そこズリズリされるの好きぃ<emoji=heart04>\u3000あっ、あんっ<emoji=heart04>\u3000はあぁっ……ふああぁんっ……<emoji=heart04>」"
translation = "「앗…… 굉장해……<emoji=heart04> 거기…… 좋아요……<emoji=heart04> 앙…… 좋아앗<emoji=heart04> 거기 문질문질 당하는 거 좋아아<emoji=heart04> 앗, 앙<emoji=heart04> 하아앗…… 후아아아앙……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「リーリアのおま○こ、気持ちよくて、腰が止まらないっ……」"
translation = "「리리아의 보지, 기분 좋아서 허리가 멈추질 않아.」"

[[dialogue]]
speaker = "リーリア"
original = "「ふああっ、センパイ、突き上げすごいですっ<emoji=heart04>\u3000おち○ちん一番奥まで来て、ディープキスされちゃってますぅ<emoji=heart04>\u3000んっ、あっ……はあぁっ……ふあぁっ……<emoji=heart04>」"
translation = "「후아앗, 선배 쳐올리는 거 굉장해요옷<emoji=heart04> 자지 제일 안쪽까지 와서 딥 키스 당해버리고 있어요오<emoji=heart04> 응, 앗…… 하아앗…… 후아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「センパイ、もっと<emoji=heart04>\u3000もっとぉっ<emoji=heart04>\u3000あっ……はあぁっ……ふあぁっ<emoji=heart04>\u3000んうぅっ……はあぁっ……んああぁっ……<emoji=heart04>」"
translation = "「선배, 좀 더<emoji=heart04> 좀 더어엇<emoji=heart04> 앗…… 하아앗…… 후아앗<emoji=heart04> 응우읏…… 하아앗…… 응아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は後ろから、リーリアの首筋にキスをする。"
translation = "나는 뒤에서 리리아의 목덜미에 키스를 한다."

[[dialogue]]
speaker = "リーリア"
original = "「やんっ<emoji=heart04>\u3000センパイ、首は弱いのっ……<emoji=heart04>\u3000あっ……ふうぅっ……んうぅっ……<emoji=heart04>\u3000やっ……んんっ<emoji=heart04>\u3000はぁんっ……<emoji=heart04>」"
translation = "「양앗<emoji=heart04> 선배, 목은 약해애……<emoji=heart04> 앗…… 후우우읏…… 응우읏……<emoji=heart04> 야앗…… 응응<emoji=heart04> 하앙앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "続けて、耳を唇でついばむ。"
translation = "이어서 귀를 입술로 쪼아댄다."

[[dialogue]]
speaker = "リーリア"
original = "「んあぁっ<emoji=heart04>\u3000耳をはむはむするのもダメぇっ<emoji=heart04>\u3000あっ、んっ……<emoji=heart04>\u3000はあぁっ……んぅっ……<emoji=heart04>\u3000ふあぁっ……<emoji=heart04>」"
translation = "「응아앗<emoji=heart04> 귀를 할짝거리는 것도 안 돼애앗<emoji=heart04> 앗, 응……<emoji=heart04> 하아앗…… 응으읏……<emoji=heart04> 후아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「あっ、あんっ<emoji=heart04>\u3000舐めちゃ……あっ……ふうぅっ……<emoji=heart04>\u3000んあぁんっ<emoji=heart04>」"
translation = "「앗, 앙<emoji=heart04> 핥으면…… 앗…… 후우우읏……<emoji=heart04> 응아아앙앗<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「リーリアは全身敏感だよな。おっぱいを優しく撫でるだけでもほら、おま○こが締め付けて来る」"
translation = "「리리아는 전신이 민감하구나. 가슴을 다정하게 쓰다듬기만 해도 봐, 보지가 조여와.」"

[[dialogue]]
speaker = "リーリア"
original = "「そ、それは……あんっ<emoji=heart04>\u3000センパイに弄られてるからですもん……<emoji=heart04>\u3000んっ……ふうぅっ……<emoji=heart04>」"
translation = "「그, 그건…… 앙앗<emoji=heart04> 선배가 만지작거리니까 그런 거잖아요……<emoji=heart04> 응…… 후우우읏……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「センパイに愛撫されると、体のどこでもエッチに感じて、性感帯になっちゃうんです<emoji=heart04>\u3000あっ、んっ……んあぁっ……<emoji=heart04>\u3000はあぁっ……んうぅっ……ふあぁんっ……<emoji=heart04>」"
translation = "「선배한테 애무당하면 몸 어디든 야하게 느껴져서 성감대가 되어버려요오<emoji=heart04> 앗, 응…… 응아앗……<emoji=heart04> 하아앗…… 응우읏…… 후아아앙앗……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「俺のせい？」"
translation = "「내 탓이야?」"

[[dialogue]]
speaker = "リーリア"
original = "「は、はい<emoji=heart04>\u3000んっ……だって……大好きなセンパイに触られてるんですもん<emoji=heart04>\u3000あっ、はあぁっ……ふあぁんっ……<emoji=heart04>」"
translation = "「네, 네에<emoji=heart04> 응…… 그야…… 정말 좋아하는 선배가 만지고 있으니까요오<emoji=heart04> 앗, 하아앗…… 후아아앙앗……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「っ……そういうこと言われると、中にいっぱい出したくなる……！」"
translation = "「윽…… 그런 말을 들으면 안에 잔뜩 내보내고 싶어져……!」"

[[dialogue]]
speaker = "リーリア"
original = "「んっ<emoji=heart04>\u3000センパイの１週間ぶりの精液、いっぱい欲しいですっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000中に出されるの想像したら、おま○こキュンキュンしちゃいます<emoji=heart04>\u3000ふうぅっ……<emoji=heart04>」"
translation = "「응<emoji=heart04> 선배의 일주일 만의 정액, 잔뜩 갖고 싶어요옷<emoji=heart04> 하아앗<emoji=heart04> 안에 내보내지는 거 상상하면 보지가 큥큥거려 버려요오<emoji=heart04> 후우우읏……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「ねぇ、センパイ？\u3000あんっ……<emoji=heart04>\u3000今まで魔女だって正体隠してたから言ってませんでしたけど、魔女が世界樹から生まれるって話は、聞いていますか……？」"
translation = "「저기, 선배? 앙……<emoji=heart04> 지금까지 마녀라고 정체를 숨기고 있어서 말 안 했지만 마녀가 세계수에서 태어난다는 이야기는 들으셨나요……?」"

[[dialogue]]
speaker = "リーリア"
original = "「そのおかげで魔女は交配しなくても、種族として維持されているんですけど、んっ……<emoji=heart04>\u3000こうして女性機能は備わっているじゃ、ないですか……<emoji=heart04>」"
translation = "「그 덕분에 마녀는 교배하지 않아도 종족으로서 유지되고 있지만, 응……<emoji=heart04> 이렇게 여성 기능은 갖추어져 있잖아요……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「だから……魔女って、他の種族の男性と交わっても、ちゃんと子供が作れるんですよ？」"
translation = "「그러니까…… 마녀는 다른 종족의 남성과 교미해도 제대로 아이를 만들 수 있거든요?」"

[[dialogue]]
speaker = "unk"
original = "それを聞いて俺は、興奮を覚える。"
translation = "그 말을 듣고 나는 흥분을 느낀다."

[[dialogue]]
speaker = "unk"
original = "将来、リーリアとの子供は望めないことも覚悟していたが……"
translation = "장래에 리리아와의 아이는 바랄 수 없을지도 모른다고 각오하고 있었지만……"

[[dialogue]]
speaker = "リーリア"
original = "「私、センパイとの子供……ちゃんと考えてますから、安心して下さいね<emoji=heart04>」"
translation = "「저, 선배와의 아이…… 제대로 생각하고 있으니까 안심하세요<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「っ……そ、そんなこと言われたら……！」"
translation = "「윽…… 그, 그런 말을 들으면……!」"

[[dialogue]]
speaker = "リーリア"
original = "「あっ、あんっ<emoji=heart04>\u3000おち○ちんがぐぐぐって、中でまた大きくなって……はあぁっ、んんっ<emoji=heart04>\u3000あっ、ふあぁっ……！\u3000はあぁっ……んああぁっ……<emoji=heart04>」"
translation = "「앗, 앙<emoji=heart04> 자지가 꾸욱꾸욱 하고 안에서 다시 커져서…… 하아앗, 응응<emoji=heart04> 앗, 후아앗……! 하아앗…… 응아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「さ、さすが魔王様ですぅ<emoji=heart04>\u3000あっ、んっ……はあぁっ、ふうぅっ<emoji=heart04>\u3000あっ、はあぁっ……<emoji=heart04>\u3000んっ……あっ<emoji=heart04>\u3000ふああぁんっ……<emoji=heart04>」"
translation = "「역시 마왕님이에요오<emoji=heart04> 앗, 응…… 하아앗, 후우우읏<emoji=heart04> 앗, 하아앗……<emoji=heart04> 응…… 앗<emoji=heart04> 후아아아앙앗……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「魔王おち○ちん、すごいぃ<emoji=heart04>\u3000あっ、あんっ……んああぁっ<emoji=heart04>\u3000気持ちいいっ……<emoji=heart04>\u3000はあぁっ……ふうぅっ……んうぅっ<emoji=heart04>\u3000あっ、はぁっ……ふあぁんっ<emoji=heart04>」"
translation = "「마왕 자지, 굉장해애<emoji=heart04> 앗, 앙…… 응아아앗<emoji=heart04> 기분 좋아앗……<emoji=heart04> 하아앗…… 후우우읏…… 응우읏<emoji=heart04> 앗, 하앗…… 후아아아앙앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はリーリアの耳元で囁く。"
translation = "나는 리리아의 귓가에 속삭인다."

[[dialogue]]
speaker = "クロト"
original = "「リーリア……俺、今日は中にいっぱい出して、リーリアのことを孕ませたい」"
translation = "「리리아…… 나 오늘 안에 잔뜩 내보내서 리리아를 임신시키고 싶어.」"

[[dialogue]]
speaker = "リーリア"
original = "「っ……！\u3000あっ<emoji=heart04>\u3000はあぁっ、ふあぁっ……！」"
translation = "「윽……! 앗<emoji=heart04> 하아앗, 후아앗……!」"

[[dialogue]]
speaker = "クロト"
original = "「ダメか？」"
translation = "「안 돼?」"

[[dialogue]]
speaker = "リーリア"
original = "「んっ……<emoji=heart04>\u3000ダメじゃないです……<emoji=heart04>\u3000私も本当は、期待しちゃってましたから……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 안 되지 않아요……<emoji=heart04> 저도 사실은 기대하고 있었으니까요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "興奮して、胸を強く鷲掴みにする。"
translation = "흥분해서 가슴을 강하게 움켜쥔다."

[[dialogue]]
speaker = "リーリア"
original = "「あんっ<emoji=heart04>\u3000おっぱい、強く揉まれて、んんっ……<emoji=heart04>\u3000はあぁっ……あんっ<emoji=heart04>\u3000ふああぁっ……<emoji=heart04>」"
translation = "「앙앗<emoji=heart04> 가슴, 강하게 주물러져서, 응응……<emoji=heart04> 하아앗…… 앙앗<emoji=heart04> 후아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「ああっ<emoji=heart04>\u3000おち○ちんピストンしながら、乳首コリコリ、ダメぇっ<emoji=heart04>\u3000刺激強くて頭の中、バチバチしちゃいますぅっ<emoji=heart04>\u3000あっ、はぁんっ<emoji=heart04>\u3000んうぅっ……ふああぁっ……<emoji=heart04>」"
translation = "「아앗<emoji=heart04> 자지 피스톤 하면서 유두 굴리는 거, 안 돼애앗<emoji=heart04> 자극이 강해서 머릿속이 바치바치해져 버려요오옷<emoji=heart04> 앗, 하앙앗<emoji=heart04> 응우읏…… 후아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「おっぱい気持ちいいっ<emoji=heart04>\u3000あっ、んっ……<emoji=heart04>\u3000はあぁっ、ふあぁっ……<emoji=heart04>\u3000ふうぅっ……あっ、あんっ……<emoji=heart04>\u3000はあぁっ……ふああぁんっ<emoji=heart04>」"
translation = "「가슴 기분 좋아앗<emoji=heart04> 앗, 응……<emoji=heart04> 하아앗, 후아앗……<emoji=heart04> 후우우읏…… 앗, 앙……<emoji=heart04> 하아앗…… 후아아아앙앗<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「もし孕んだら、このおっぱいも大きくなっちゃうな」"
translation = "「만약 임신하면 이 가슴도 커지겠네.」"

[[dialogue]]
speaker = "リーリア"
original = "「っ……！\u3000はあぁっ……ふうぅっ……<emoji=heart04>」"
translation = "「윽……! 하아아…… 후우우……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「もちろん、お腹も」"
translation = "「물론, 배도 말이야.」"

[[dialogue]]
speaker = "リーリア"
original = "「あっ、あんっ<emoji=heart04>\u3000センパイ、お腹撫でながら言うのダメぇ<emoji=heart04>\u3000想像して、興奮して来ちゃいます……<emoji=heart04>\u3000んっ……あっ<emoji=heart04>\u3000はあぁっ……ふうぅっ<emoji=heart04>」"
translation = "「앗, 앙<emoji=heart04> 선배, 배 쓰다듬으면서 그런 말 하면 안 돼애<emoji=heart04> 상상해서, 흥분해 버린단 말이에요……<emoji=heart04> 응…… 앗<emoji=heart04> 하아아…… 후우우<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「リーリア、激しくするぞ……！」"
translation = "「리리아, 격렬하게 할게……!」"

[[dialogue]]
speaker = "リーリア"
original = "「は、はい……<emoji=heart04>\u3000センパイ……<emoji=heart04>\u3000あっ――<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「네, 네……<emoji=heart04> 선배……<emoji=heart04> 앗――<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「ふああああああっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000全力ピストン来たぁぁぁ～～～っ<emoji=heart04><emoji=heart04>\u3000あっ、あっ、あっ、あんっ<emoji=heart04>\u3000あっ、あっ、あっ、はあぁっ<emoji=heart04>\u3000んっ、んっ、んっ、ふああぁっ<emoji=heart04>」"
translation = "「후아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 전력 피스톤 왔다아아아~~~앗<emoji=heart04><emoji=heart04> 앗, 앗, 앗, 앙<emoji=heart04> 앗, 앗, 앗, 하아아<emoji=heart04> 응, 응, 응, 후아아아<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「すごいっ<emoji=heart04>\u3000あっ、あっ、あっ、んああぁっ<emoji=heart04>\u3000あっ、あっ、どちゅどちゅピストンしゅごいぃ<emoji=heart04>\u3000あっ、あっ、あっ、あんっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「굉장해<emoji=heart04> 앗, 앗, 앗, 응아아아<emoji=heart04> 앗, 앗, 찌릿찌릿 피스톤 굉장해애<emoji=heart04> 앗, 앗, 앗, 앙<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「気持ちいいっ<emoji=heart04>\u3000あっ、あっ、あっ、はぁんっ<emoji=heart04>\u3000あっ、あっ、あっ、んああぁっ<emoji=heart04>\u3000おち○ちん気持ちいいのぉ<emoji=heart04>\u3000はぁっ、はぁっ、んっ、んうぅっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>」"
translation = "「기분 좋아<emoji=heart04> 앗, 앗, 앗, 하앙<emoji=heart04> 앗, 앗, 앗, 응아아아<emoji=heart04> 자지 기분 좋아아<emoji=heart04> 하아, 하아, 응, 응으으<emoji=heart04> 후아아아<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「おま○この中、おかしくなっちゃいますぅ<emoji=heart04>\u3000センパイッ<emoji=heart04>\u3000あっ、はあぁんっ<emoji=heart04>\u3000センパイぃ<emoji=heart04>」"
translation = "「보지 안쪽, 이상해져 버려요오<emoji=heart04> 선배!<emoji=heart04> 앗, 하아앙<emoji=heart04> 선배에<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「リーリア、俺の子供を生んでくれ！」"
translation = "「리리아, 내 아이를 낳아줘!」"

[[dialogue]]
speaker = "リーリア"
original = "「あっ、あっ、あっ、んああぁんっ<emoji=heart04>\u3000は、はいっ<emoji=heart04>\u3000生みますっ<emoji=heart04>」"
translation = "「앗, 앗, 앗, 응아아앙<emoji=heart04> 네, 네에!<emoji=heart04> 낳을게요!」"

[[dialogue]]
speaker = "リーリア"
original = "「あんっ、あんっ、あんっ、私を、センパイのお嫁さんにして下さいっ<emoji=heart04>\u3000んっ、あっ、あっ、あっ、ふああぁんっ<emoji=heart04>」"
translation = "「앙, 앙, 앙, 저를, 선배의 신부로 삼아주세요<emoji=heart04> 응, 앗, 앗, 앗, 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「好きだ、リーリア！」"
translation = "「사랑해, 리리아!」"

[[dialogue]]
speaker = "リーリア"
original = "「あぁぁんっ<emoji=heart04>\u3000私もぉ<emoji=heart04>\u3000あっ、あっ、あっ、あっ<emoji=heart04>\u3000センパイ、大好きぃっ<emoji=heart04>」"
translation = "「아아앙<emoji=heart04> 저도요오<emoji=heart04> 앗, 앗, 앗, 앗<emoji=heart04> 선배, 너무 좋아아!」"

[[dialogue]]
speaker = "クロト"
original = "「中に出すぞ、リーリア！」"
translation = "「안에 내보낼게, 리리아!」"

[[dialogue]]
speaker = "リーリア"
original = "「はいっ<emoji=heart04>\u3000妊娠しちゃうくらい、いっぱい種付け射精して下さいっ<emoji=heart04>\u3000あっ、あっ、あっ、あっ、はぁんっ<emoji=heart04>\u3000あっ、あっ、あっ、あっ、ふああぁんっ<emoji=heart04>」"
translation = "「네!<emoji=heart04> 임신해 버릴 정도로, 잔뜩 씨뿌리기 사정해 주세요<emoji=heart04> 앗, 앗, 앗, 앗, 하앙<emoji=heart04> 앗, 앗, 앗, 앗, 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「くっ……リーリア！\u3000もうイキそうだ！」"
translation = "「큭…… 리리아! 이제 갈 것 같아!」"

[[dialogue]]
speaker = "リーリア"
original = "「私もイキそうです<emoji=heart04>\u3000センパイ、一緒にぃ<emoji=heart04>\u3000あっ、あっ、あっ、あっ、んあああぁっ<emoji=heart04><emoji=heart04>」"
translation = "「저도 갈 것 같아요<emoji=heart04> 선배, 같이이<emoji=heart04> 앗, 앗, 앗, 앗, 응아아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「あ、あ、あ、ふああああああぁっ<emoji=heart04><emoji=heart04>\u3000あっ、イク<emoji=heart04><emoji=heart04>\u3000イクイクイクイク<emoji=heart04>」"
translation = "「아, 아, 아, 후아아아아아아아<emoji=heart04><emoji=heart04> 앗, 가<emoji=heart04><emoji=heart04> 가버려 가버려 가버려 가버려<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「ふあああああああああっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000イックうううぅぅぅーーーーーーーーーっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후아아아아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 가버려어어어어어어어어어어어어어어어어엇<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「はああああああ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000中にセンパイの精子、いっぱい出てますぅ～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「하아아아아아아아~~~앗<emoji=heart04><emoji=heart04><emoji=heart04> 안에 선배의 정자, 잔뜩 나오고 있어요오~~~옷<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「んんっ<emoji=heart04>\u3000射精量、すごいぃっ……<emoji=heart04>\u3000はあぁっ……！\u3000男らしくて、好きぃ……<emoji=heart04>」"
translation = "「응응<emoji=heart04> 사정량, 굉장해……<emoji=heart04> 하아아……! 남자다워서, 좋아아……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「あっ……はあぁっ……<emoji=heart04>\u3000んっ……ふうぅ……<emoji=heart04>\u3000やっと……射精止まりました……<emoji=heart04>\u3000はあぁ……<emoji=heart04>」"
translation = "「앗…… 하아아……<emoji=heart04> 응…… 후우……<emoji=heart04> 드디어…… 사정이 멈췄어요……<emoji=heart04> 하아아……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「あんっ……おち○ちん、抜けちゃう……<emoji=heart04>」"
translation = "「앙…… 자지, 빠져버려……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「んっ……<emoji=heart04>\u3000はぁ……はぁ……<emoji=heart04>\u3000ふうぅ……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 하아…… 하아……<emoji=heart04> 후우……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「すごく気持ちよくイっちゃいました……<emoji=heart04>」"
translation = "「정말 기분 좋게 가버렸어요……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「俺もだ……」"
translation = "「나도야……」"

[[dialogue]]
speaker = "リーリア"
original = "「お腹の中、センパイの子種でいっぱいになっちゃってます……<emoji=heart04>」"
translation = "「배 속, 선배의 씨물로 가득 차 버렸어요……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「本当に妊娠しちゃうかも……<emoji=heart04>」"
translation = "「정말로 임신해 버릴지도……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「……なんて<emoji=heart04>\u3000えへへ……嘘です。今日はちゃんと避妊魔法使ってるから、大丈夫なんですけど……」"
translation = "「……라니<emoji=heart04> 에헤헤…… 거짓말이에요. 오늘은 제대로 피임 마법을 쓰고 있으니까, 괜찮지만요……」"

[[dialogue]]
speaker = "クロト"
original = "「そりゃそうだよな……」"
translation = "「그야 그렇겠지……」"

[[dialogue]]
speaker = "リーリア"
original = "「でも……」"
translation = "「하지만……」"

[[dialogue]]
speaker = "リーリア"
original = "「センパイとの子供が欲しいのは嘘じゃないですよ？\u3000学園を卒業したら……その時は、ね？\u3000ふふっ<emoji=heart04>」"
translation = "「선배와의 아이를 갖고 싶은 건 거짓말이 아니에요? 학원을 졸업하면…… 그때는, 알죠? 후훗<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「って、あんっ<emoji=heart04>\u3000センパイ、おち○ちんがまた大きくなって……<emoji=heart04>」"
translation = "「앗, 앙<emoji=heart04> 선배, 자지가 다시 커져서……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「すごい回復力……出したばかりなのに……<emoji=heart04>」"
translation = "「대단한 회복력…… 방금 냈는데도……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「１週間ぶりなのに、リーリアがエッチなことばかり言うから」"
translation = "「일주일 만인데, 리리아가 야한 말만 하니까 그렇지.」"

[[dialogue]]
speaker = "unk"
original = "俺はまた、首筋にキスする。"
translation = "나는 다시, 목덜미에 키스한다."

[[dialogue]]
speaker = "リーリア"
original = "「あっ……<emoji=heart04>\u3000じゃあセンパイが満足するまで……責任取らないとですね……<emoji=heart04>」"
translation = "「앗……<emoji=heart04> 그럼 선배가 만족할 때까지…… 책임져야겠네요……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「あんっ<emoji=heart04>\u3000センパイ<emoji=heart04>」"
translation = "「앙<emoji=heart04> 선배<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「んっ……ちゅっ……ちゅっ……<emoji=heart04>」"
translation = "「응…… 츄…… 츄……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「センパイ、愛してます……<emoji=heart04>」"
translation = "「선배, 사랑해요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "今度は俺が上になって彼女を押し倒すと、ビーチチェアーを激しく揺らして軋ませるのだった――"
translation = "이번에는 내가 위가 되어 그녀를 밀어젖히자, 비치 체어를 격렬하게 흔들며 삐걱거리는 소리를 냈다――"

