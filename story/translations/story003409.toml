[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「この変な生き物がクマロボたちを、赤ちゃんクマロボに変身させていた原因くまね」"
translation = "「이 이상한 생물이 곰 로봇들을 아기 곰 로봇으로 변신시키고 있던 원인이다곰」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「ああ、やっぱりそうなんだね」"
translation = "「아아, 역시 그랬구나」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「何なんですか、これ？」"
translation = "「이게 대체 뭔가요?」"

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「正体はよくわからないくま。謎の宇宙生命体くま。わかってるのはクマロボに寄生することで、赤ちゃん化させてしまうことくらいくま」"
translation = "「정체는 잘 모르겠다곰. 수수께끼의 우주 생명체다곰. 알고 있는 건 곰 로봇에 기생해서 아기화시켜 버린다는 것 정도다곰」"

[[dialogue]]
speaker = "unk"
original = "結局、黒ベア子にも何も分からない、ということらしかった。"
translation = "결국 흑베아코도 아무것도 모르는 모양이었다."

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「ひとまずこの世界はもう安全だけど、他の世界では事件が続いてるくま」"
translation = "「일단 이 세계는 이제 안전하지만, 다른 세계에서는 사건이 계속되고 있다곰」"

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「これからわたしは、それを解決しに行かなくちゃいけないくま」"
translation = "「이제부터 나는 그걸 해결하러 가야만 한다곰」"

[[dialogue]]
speaker = "unk"
original = "た、大変だな……"
translation = "고, 고생이 많네……"

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「まったくその通りくま！\u3000少しは人の迷惑というものを考えて欲しいくま！」"
translation = "「정말 그렇다곰! 조금은 남에게 폐를 끼친다는 걸 생각 좀 해줬으면 좋겠다곰!」"

[[dialogue]]
speaker = "unk"
original = "…………"
translation = "…………"

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「ん、何で黙るくま？」"
translation = "「응, 왜 입을 다무냐곰?」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「あ、あの……ボクたちはどうなるんですか？」"
translation = "「저, 저기…… 저희는 어떻게 되는 건가요?」"

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「さっきも言った通り、まだ他の世界では事件が解決していないくま」"
translation = "「방금 말한 대로, 아직 다른 세계에서는 사건이 해결되지 않았다곰」"

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「だから２人は、すべての事件が解決するまで、この世界でゆっくりしてて欲しいくま」"
translation = "「그러니까 두 사람은 모든 사건이 해결될 때까지 이 세계에서 푹 쉬고 있어 줬으면 한다곰」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「おっと、どうやらすぐには帰れないみたいだね」"
translation = "「이런, 아무래도 금방은 돌아가지 못하는 모양이네」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「まあ、そういうことなら仕方がない。もうしばらく、この世界を堪能させてもらうとしようか」"
translation = "「뭐, 그렇게 된 거라면 어쩔 수 없지. 좀 더 이 세계를 만끽하도록 할까」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「ごめんなさい、会長さん、ルリエルさん……もう少しだけお世話になります……」"
translation = "「죄송해요, 회장님, 루리엘 씨…… 조금만 더 신세를 질게요……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「全然構わないのです！\u3000ゆっくり楽しんでいってください♪」"
translation = "「전혀 상관없답니다! 느긋하게 즐겨 주세요♪」"

[[dialogue]]
speaker = "unk"
original = "それからしばらくして──"
translation = "그로부터 얼마 뒤──"

[[dialogue]]
speaker = "unk"
original = "どうやら他の世界のトラブルもすべて解決したらしく、ステラとラファエロも元の世界に帰れることになった。"
translation = "아무래도 다른 세계의 트러블도 전부 해결된 모양이라, 스텔라와 라파엘로도 원래 세계로 돌아갈 수 있게 되었다."

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「いろいろお世話になりました……ありがとうございます、会長さん」"
translation = "「여러모로 신세 많이 졌습니다…… 감사합니다, 회장님」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ステラさんはずっと新星学園の星徒会室で過ごしてましたからね。すっかり会長さんとも仲良しになれたようで何よりです」"
translation = "「스텔라 씨는 계속 신성학원 성도회실에서 지냈으니까요. 완전히 회장님과도 사이가 좋아진 것 같아 다행이에요」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「というか、ステラが星徒会室以外の場所にいる姿がほとんど記憶にないんだが……もしかして本当にずっと引きこもっていたのかい？」"
translation = "「그나저나 스텔라가 성도회실 이외의 장소에 있는 모습이 거의 기억에 없는데…… 혹시 정말로 계속 틀어박혀 있었던 거니?」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「そ、そんなことありませんよ！\u3000会長さんやルリエルさんともお出かけしましたし……」"
translation = "「그, 그렇지 않아요! 회장님이나 루리엘 씨와도 외출했었고……」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「そう言うラファエロさんは、大いに満喫してたみたいですね」"
translation = "「그렇게 말하는 라파엘로 씨야말로 아주 만끽하신 것 같네요」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「ふふ、こちらの世界にも大勢のファンを作ってしまったよ……これも天才藝術家の宿命かな」"
translation = "「후후, 이쪽 세계에도 수많은 팬을 만들어 버렸어…… 이것도 천재 예술가의 숙명일까」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「名残惜しい気持ちもあるが、ぼくには帰らなければならない場所があるからね」"
translation = "「아쉬운 마음도 들지만, 나에게는 돌아가야 할 곳이 있으니까」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「ボクもです。早く戻って家族のみんなや仲間……それから団長さんに無事を伝えてあげなくちゃ」"
translation = "「나도예요. 빨리 돌아가서 가족들이나 동료들…… 그리고 단장님께 무사하다는 걸 전해드려야 해요」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「そうだね……館長も心配していると思うから、戻ったら彼にもちゃんと伝えに行くとしよう」"
translation = "「그렇네…… 관장님도 걱정하고 계실 테니, 돌아가면 그분께도 제대로 전하러 가도록 하지」"

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「それでは準備はいいくまか？\u3000よければ２人を元の世界に戻すくま」"
translation = "「그러면 준비는 됐냐곰? 괜찮다면 두 사람을 원래 세계로 돌려보내겠다곰」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「ボクは大丈夫です。ラファエロさんは大丈夫ですか？」"
translation = "「나는 괜찮아요. 라파엘로 씨는 괜찮으신가요?」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「ああ、大丈夫だ」"
translation = "「아아, 괜찮아」"

[[dialogue]]
speaker_original = "黒ベア子"
speaker_translation = "흑베아코"
original = "「では、行くくま！」"
translation = "「그럼, 간다곰!」"

[[dialogue]]
speaker_original = "ステラ"
speaker_translation = "스텔라"
original = "「ありがとうございます、本当にお世話になりました！」"
translation = "「감사합니다, 정말로 신세 많이 졌습니다!」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「こちらの世界か、それともぼくたちの世界か、また会うことがあったらよろしく頼むよ」"
translation = "「이쪽 세계든, 아니면 우리들의 세계든, 다시 만날 일이 있다면 잘 부탁해」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「はいっ！\u3000その時はお願いします！」"
translation = "「네! 그때는 잘 부탁드려요!」"

[[dialogue]]
speaker = "unk"
original = "──こうしてラファエロとステラは、彼女たちそれぞれの世界へと帰って行った。"
translation = "──이렇게 라파엘로와 스텔라는 그녀들 각자의 세계로 돌아갔다."

[[dialogue]]
speaker = "unk"
original = "それと入れ替わるようにして、フィオナもこちらの世界へ戻ってきた。"
translation = "그것과 교대하듯이 피오나도 이쪽 세계로 돌아왔다."

[[dialogue]]
speaker = "unk"
original = "実はフィオナだけではなく、ヴィーナスとメルエルもそれぞれ黒ベア子が行き来していた世界でお世話になっていたことがわかり、俺は彼女たちから色々な土産話を聞くのだった。"
translation = "사실 피오나뿐만 아니라 비너스와 메르엘도 각각 흑베아코가 오가던 세계에서 신세를 지고 있었다는 사실을 알게 되어, 나는 그녀들로부터 여러 가지 여행담을 듣게 되었다."

