[[dialogue]]
speaker = "unk"
original = "第３話,お姉ちゃんとオイル塗り,P"
translation = "제3화, 누나와 오일 바르기, P"

[[dialogue]]
speaker = "unk"
original = "とある休日。俺はサーシャさんとデートで、リゾート結界にやって来ていた――"
translation = "어느 휴일. 나는 사샤 씨와 데이트로 리조트 결계에 와 있었다――"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「それじゃあ、海で水遊びする前に～」"
translation = "「그럼 바다에서 물놀이하기 전에~」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「お姉ちゃんに……日焼け止めオイル、塗って欲しいわ<emoji=heart04>」"
translation = "「누나한테…… 선탠 오일, 발라줬으면 좋겠어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ちょっ！？\u3000いきなり脱ぐなんて……！？"
translation = "잠깐!? 갑자기 벗다니……!?"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「うふふっ、水着の紐をちょっと緩めるだけだから、大丈夫よ～」"
translation = "「우후훗, 수영복 끈을 조금 늦출 뿐이니까 괜찮아~」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「それに、脱がないとオイル、ちゃんと塗れないでしょう……？」"
translation = "「게다가 벗지 않으면 오일, 제대로 바를 수 없잖아……?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「リップルちゃんの海の家が繁盛しているって聞いたから、人で賑わっている方のビーチに来たけど――」"
translation = "「리플짱의 바다의 집이 번창하고 있다고 들어서, 사람들로 붐비는 쪽 비치에 왔지만――」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「この辺りは、探検してて見つけた人気のない場所で、周りに人も居ないし……恋人なんだから、別に恥ずかしくないでしょう？」"
translation = "「이 근처는 탐험하다가 찾아낸 인적 없는 곳이라 주변에 사람도 없고…… 연인이니까 딱히 부끄럽지 않지?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「それに……初めて見るわけじゃないんだし……<emoji=heart04>\u3000ふふっ<emoji=heart04>」"
translation = "「게다가…… 처음 보는 것도 아니잖아……<emoji=heart04> 후훗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "わざとからかってません！？"
translation = "일부러 놀리는 거 아니에요!?"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「だって～、会長くんってば、恋人になってから結構経つのに、未だに顔を赤くしちゃって可愛いんだもの♪」"
translation = "「그치만~ 회장군은 연인이 되고 나서 꽤 지났는데도 아직까지 얼굴을 붉히고 귀여운걸♪」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「――私のスタイルが良いから、いつもドキドキしちゃう？\u3000うふふっ、褒めてくれてありがと～♪」"
translation = "「――내 몸매가 좋아서 항상 두근거려? 우후훗, 칭찬해 줘서 고마워~♪」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「会長くんはいつも変わらず、そういう反応をしてくれるから、お姉ちゃん嬉しくなっちゃうわ♪」"
translation = "「회장군은 언제나 변함없이 그런 반응을 해주니까, 누나는 기뻐져 버려♪」"

[[dialogue]]
speaker = "unk"
original = "慣れ過ぎないよう、戒めているというか……"
translation = "익숙해지지 않도록, 스스로를 다스리고 있다고나 할까……"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あら、そうなの？\u3000どうして？」"
translation = "「어머, 그래? 어째서?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「――会長として、節度を持つように？\u3000ふふっ、真面目な会長くんらしいわね～♪」"
translation = "「――회장으로서, 절도를 지키기 위해? 후훗, 성실한 회장군답네~♪」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「そういう健気なところも、お姉ちゃんは好きなんだけど……<emoji=heart04>」"
translation = "「그런 기특한 점도, 누나는 좋아하지만……<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「でも、恋人の会長くん以外に頼めないし、オイルは塗ってくれるでしょう？\u3000お姉ちゃんからの、お願い<emoji=heart04>」"
translation = "「하지만, 연인인 회장군 말고는 부탁할 사람도 없고, 오일은 발라줄 거지? 누나가 하는, 부탁이야<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「――ふふっ、ありがと～。じゃあ、よろしくね♪」"
translation = "「――후훗, 고마워~. 그럼, 잘 부탁해♪」"

[[dialogue]]
speaker = "unk"
original = "そうして、サーシャさんはビーチマットの上で、うつ伏せになった――"
translation = "그렇게, 사샤 씨는 비치 매트 위에서 엎드렸다――"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あんっ<emoji=heart04>\u3000会長くんにヌルヌルのをいっぱい、かけられちゃってるぅ……<emoji=heart04>」"
translation = "「앙<emoji=heart04> 회장군한테 미끈미끈한 걸 잔뜩, 뿌려지고 있어어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「――出し過ぎちゃった……？\u3000ふふっ、謝らなくて大丈夫よ」"
translation = "「――너무 많이 짜버렸어……? 후훗, 사과하지 않아도 괜찮아」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「お姉ちゃんがちゃんと、受け止めてあげるから<emoji=heart04>\u3000焦らずに……ゆっくり、ね？」"
translation = "「누나가 제대로, 받아줄 테니까<emoji=heart04> 서두르지 말고…… 천천히, 알았지?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「んっ<emoji=heart04>\u3000そう、イイ感じ……はぁんっ<emoji=heart04>\u3000ヌルヌルで敏感になって……会長くんの、いつもより感じちゃう……ふあぁっ……<emoji=heart04>」"
translation = "「응<emoji=heart04> 그래, 좋은 느낌…… 하앙<emoji=heart04> 미끈미끈해서 민감해져서…… 회장군 거, 평소보다 더 느껴버려…… 후아아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そ、そんな色っぽい声を出されると……"
translation = "그, 그렇게 요염한 목소리를 내시면……"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「だって……好きな男の子に触れられてるんだもの……<emoji=heart04>」"
translation = "「그치만…… 좋아하는 남자애가 만져주고 있는걸……<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「お姉ちゃんだって、女の子だから意識しちゃうわ……あんっ<emoji=heart04>\u3000それに今は、２人きりだし……んっ……<emoji=heart04>」"
translation = "「누나도, 여자니까 의식하게 돼…… 앙<emoji=heart04> 게다가 지금은, 둘뿐이고…… 응……<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「だから会長くん、続き……して？」"
translation = "「그러니까 회장군, 계속…… 해줄래?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あっ<emoji=heart04>\u3000そこ、撫でられたら、背筋ゾクゾクしちゃう……<emoji=heart04>\u3000はあぁ……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 거기, 쓰다듬어지면, 등줄기가 오싹오싹해져……<emoji=heart04> 하아아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「会長くん、可愛い顔して、ちゃんと男の子の逞しい手をしてるから……んっ<emoji=heart04>\u3000お姉ちゃん、ドキッてしちゃう……<emoji=heart04>」"
translation = "「회장군, 귀여운 얼굴을 하고선, 제대로 남자애다운 늠름한 손을 하고 있으니까…… 응<emoji=heart04> 누나, 두근거려 버려……<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「はぁ……ふぅ……<emoji=heart04>\u3000背中終わったの？\u3000じゃあ次は、他の場所も塗って欲しいわ<emoji=heart04>」"
translation = "「하아…… 후우……<emoji=heart04> 등은 끝났어? 그럼 다음은, 다른 곳도 발라줬으면 좋겠어<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「――背中以外は自分でも塗れる場所？\u3000そうだけど、せっかくだし……」"
translation = "「――등 말고는 스스로도 바를 수 있는 곳? 그렇긴 하지만, 모처럼이니까……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「会長くんは……するの嫌？」"
translation = "「회장군은…… 하는 거 싫어?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「――嫌じゃないけど、抑えが利かなくなるかも？\u3000ふふっ<emoji=heart04>」"
translation = "「――싫지는 않지만, 자제심이 바닥날지도 모른다고? 후훗<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「その時は、お姉ちゃんが責任もって受け止めてあげるから、大丈夫<emoji=heart04>」"
translation = "「그때는, 누나가 책임지고 받아줄 테니까, 괜찮아<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ほら、周りに誰も居ないし……来て<emoji=heart04>」"
translation = "「자, 주변에 아무도 없고…… 이리 와<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「――あっ<emoji=heart04>\u3000やんっ……脇はくすぐったいわ<emoji=heart04>\u3000もっと優しく……<emoji=heart04>」"
translation = "「――앗<emoji=heart04> 앙…… 겨드랑이는 간지러워<emoji=heart04> 좀 더 부드럽게……<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「もっと下の、お腹の方も……大丈夫だから……そう、そこ……っ<emoji=heart04>」"
translation = "「좀 더 아래인, 배 쪽도…… 괜찮으니까…… 그래, 거기……읏<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふあぁっ<emoji=heart04>\u3000会長くぅん……<emoji=heart04>」"
translation = "「후아아<emoji=heart04> 회장구운……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "な、何とか終わった……"
translation = "겨, 겨우 끝났다……"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふふっ、ありがと～♪\u3000全身ちゃんと塗ってくれて<emoji=heart04>」"
translation = "「후훗, 고마워~♪ 전신을 제대로 발라줘서<emoji=heart04>」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「それじゃあ今度は――」"
translation = "「그러면 이번에는――」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「私が会長くんにオイルを塗る番ね<emoji=heart04>」"
translation = "「내가 회장군에게 오일을 발라줄 차례네<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "えっ！？"
translation = "엣!? "

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「だって、会長くんもちゃんとオイル塗っておかないと、後で日焼けして痛くなっちゃうわよ？」"
translation = "「그치만, 회장군도 제대로 오일을 발라두지 않으면, 나중에 햇볕에 타서 따가워질걸?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふふっ♪\u3000遠慮なんてしなくていいのよ？」"
translation = "「후훗♪ 사양 같은 건 하지 않아도 된다구?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「お姉ちゃんが全部、してあげるから……<emoji=heart04>」"
translation = "「누나가 전부, 해줄 테니까……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "や、優しく、お願いします……"
translation = "부, 부드럽게, 부탁드립니다……"

[[dialogue]]
speaker = "unk"
original = "その後、俺はサーシャさんの手で、全身余すとこなくお世話されてしまうのだった――"
translation = "그 후, 나는 사샤 씨의 손에 의해, 전신을 남김없이 보살핌 받게 되는 것이었다――"

