[[dialogue]]
speaker = "unk"
original = "第３話,ママダレナ禁止デート,P"
translation = "제3화, 마마다레나 금지 데이트, P"

[[dialogue]]
speaker = "unk"
original = "とある週末、俺はマグダレナと東京へデートに出かけることになった。"
translation = "어느 주말, 나는 막달레나와 도쿄로 데이트를 나가게 되었다."

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「――会長、お待たせしました～♪」"
translation = "「──회장님, 기다리셨죠~♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「あっ、気づいていただけましたか？\u3000えへへ、今日はオシャレとして、ヒールローファーを履いてみたんです♪」"
translation = "「앗, 알아봐 주셨나요? 에헤헤, 오늘은 멋 좀 부리려고 힐 로퍼를 신어봤어요♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「ちょっとヒールが高めなんですが、こうするとよりスタイルがよく見えるそうです。……どうでしょう？\u3000似合ってますか？」"
translation = "「굽이 좀 높긴 한데, 이렇게 하면 스타일이 더 좋아 보인대요. ……어때요? 잘 어울리나요?」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「――えへへ、ありがとうございます♪\u3000じゃあ、今日は１日、ママダレナとのデートを楽しんじゃいましょうね♪」"
translation = "「──에헤헤, 고마워요♪ 그럼 오늘은 하루 종일 마마다레나와의 데이트를 즐겨봐요♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「って、どうしましたか、会長？\u3000――今日のデートについて、提案がある……ですか？\u3000はい、なんでしょうか？」"
translation = "「어라, 왜 그러세요, 회장님? ──오늘 데이트에 대해 제안이 있다고요? 네, 뭔가요?」"

[[dialogue]]
speaker = "unk"
original = "今日は１日、ママダレナは禁止にしよう"
translation = "오늘은 하루 종일, 마마다레나는 금지하자."

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「え！？\u3000会長、そ、それはどういうことですか……？」"
translation = "「에!? 회장님, 그, 그게 무슨 말씀이세요……?」"

[[dialogue]]
speaker = "unk"
original = "今日１日、いつも以上に恋人としてのマグダレナとデートがしたい――俺はそう考えを伝える。"
translation = "오늘 하루는 평소보다 더 연인으로서의 막달레나와 데이트를 하고 싶다── 나는 그렇게 생각을 전한다."

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「そんな……！\u3000美味しいスイーツのお店で、会長にあ～んって食べさせたりとか、定番のイチャイチャを楽しみにしてたのに……！」"
translation = "「세상에……! 맛있는 디저트 가게에서 회장님께 '아~' 하고 먹여주거나 하는 전형적인 꽁냥거림을 기대하고 있었는데……!」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「それに、私が会長を甘やかしているのは、そうすることで私が会長に甘えさせてもらっていると言いますか……」"
translation = "「게다가 제가 회장님을 예뻐해 드리는 건, 그렇게 함으로써 제가 회장님께 어리광을 부리고 있달까……」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「だから、甘やかすのを禁止されてしまったら、逆にどう会長に接したらいいか、迷ってしまいます……」"
translation = "「그래서 예뻐해 주는 걸 금지당해 버리면, 반대로 어떻게 회장님을 대해야 할지 망설여져요……」"

[[dialogue]]
speaker = "unk"
original = "大丈夫、俺がエスコートするから"
translation = "괜찮아, 내가 에스코트할 테니까."

[[dialogue]]
speaker = "unk"
original = "そう言って、マグダレナに手を差し伸べると――"
translation = "그렇게 말하며 막달레나에게 손을 내밀자──"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「わ、わかりました……」"
translation = "「아, 알겠습니다……」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「その……お手柔らかにお願いします……」"
translation = "「저기…… 살살 부탁드려요……」"

[[dialogue]]
speaker = "unk"
original = "そうして、東京に着いた俺たちは、ウィンドウショッピングをすることになり、手を繋いで街中を歩いていた。"
translation = "그렇게 도쿄에 도착한 우리는 윈도쇼핑을 하기로 했고, 손을 잡고 거리를 걸었다."

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「か、会長と手を繋ぐのは、普段から結構しているはずなのに、いざ恋人として接しようと意識すると、やっぱりドキドキしてしまいます……」"
translation = "「회, 회장님과 손을 잡는 건 평소에도 꽤 했을 텐데, 막상 연인으로서 대하려고 의식하니까 역시 두근거려 버려요……」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「そ、その……手を繋ぐの、一旦止めちゃダメですか？」"
translation = "「저, 저기…… 손잡는 거 일단 그만하면 안 될까요?」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「緊張して、手汗がすごく出ている気がして……は、恥ずかしくて……」"
translation = "「긴장해서 손에 땀이 엄청 나고 있는 것 같아서…… 부, 부끄러워서……」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「――か、可愛いって……！\u3000そんなこと言われたら、ますます顔が熱くなってしまいます……！」"
translation = "「──귀, 귀엽다니……! 그런 소릴 들으면 점점 더 얼굴이 뜨거워져 버린다고요……!」"

[[dialogue]]
speaker = "unk"
original = "恋人にも慣れてもらわないとね"
translation = "연인 관계에도 익숙해져야지."

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「うぅ……会長にこれまで、ママダレナとして甘えていたツケが来てしまっています……」"
translation = "「으으…… 회장님께 지금까지 마마다레나로서 어리광 부렸던 대가가 오고 있어요……」"

[[dialogue]]
speaker = "unk"
original = "俺たちは抹茶スイーツが人気の店に入ると、抹茶ケーキを注文して、席に座る。そして――"
translation = "우리는 말차 디저트가 인기인 가게에 들어가 말차 케이크를 주문하고 자리에 앉았다. 그리고──"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「って、私があ～んをされる立場に！？\u3000ち、ちょっと待って下さい！」"
translation = "「어라, 제가 '아~'를 받는 입장이!? 자, 잠깐만요!」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「――い、いえ、抹茶スイーツは好きですが！\u3000会長からあ～んをされるのは初めてなので、まだ心の準備が……！」"
translation = "「──아, 아니, 말차 디저트는 좋아하지만! 회장님께 '아~'를 받는 건 처음이라 아직 마음의 준비가……!」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「周りからの視線も気になりますし……た、タイミングを伺ってから……」"
translation = "「주변 시선도 신경 쓰이고…… 타, 타이밍을 좀 보고 나서……」"

[[dialogue]]
speaker = "unk"
original = "遠慮せずに甘えていいんだぞ"
translation = "부담 갖지 말고 어리광 부려도 된다고."

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「う……いつも私が同じことを言っているので、逃げ道が……！」"
translation = "「으…… 항상 제가 하던 말이라 도망칠 구멍이……!」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「わ、わかりました……す～……は～……す～……は～……」"
translation = "「아, 알겠습니다…… 후~…… 하~…… 후~…… 하~……」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「ど、どうぞ。あ～ん……！」"
translation = "「자, 자요. 아~……!」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「あむっ♪\u3000もぐもぐ……んっ……！」"
translation = "「아암♪ 우물우물…… 응……!」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「お、美味しいです……抹茶ケーキ自体もそうですけど、それだけじゃなくて……何だかすごく……<emoji=heart04>」"
translation = "「마, 맛있어요…… 말차 케이크 자체도 그렇지만, 그것뿐만이 아니라…… 왠지 굉장히……<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「あ～んされるのって、こんな感じなんですね……はふぅ……<emoji=heart04>」"
translation = "「'아~' 받는 건 이런 느낌이군요…… 하아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "もっと食べる？"
translation = "더 먹을래?"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「は、はい……お願いします。――あ～ん<emoji=heart04>」"
translation = "「네, 네…… 부탁드려요. ──아~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そんな風にして、今日は俺が行く場所を提案して、マグダレナをリードし続けた。やがて、帰る時間になったのだが――"
translation = "그런 식으로 오늘은 내가 갈 곳을 제안하며 막달레나를 계속 리드했다. 어느덧 돌아갈 시간이 되었는데──"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「きゃっ……！？」"
translation = "「꺄악……!?」"

[[dialogue]]
speaker = "unk"
original = "おっと！\u3000大丈夫か？"
translation = "어이쿠! 괜찮아?"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「ありがとうございます。今日１日、緊張してドキドキし続けていたせいか、急に力が抜けて、足元がふらついてしまって……」"
translation = "「고맙습니다. 오늘 하루 종일 긴장해서 계속 두근거렸던 탓인지, 갑자기 힘이 빠져서 발이 비틀거려 버려서……」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「って、あぁっ……！\u3000やってしまいました……今ので靴のヒールが壊れて……」"
translation = "「어라, 아앗……! 사고 쳤네요…… 방금 일로 구두 굽이 부러져서……」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「せっかくのデートだったのに、これは変身して、飛んで帰るしかなさそうですね……って」"
translation = "「모처럼의 데이트였는데, 이건 변신해서 날아서 돌아가는 수밖에 없겠네요…… 어라」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「か、会長、何を……きゃっ！？」"
translation = "「회, 회장님, 뭘…… 꺄악!?」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「こ、これって……お姫様抱っこ……！？」"
translation = "「이, 이건…… 공주님 안기……!?」"

[[dialogue]]
speaker = "unk"
original = "恋人として、ちゃんと家まで送らないとな"
translation = "연인으로서 제대로 집까지 데려다줘야지."

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「そ、そんなことしなくても、１人で飛べるのに……」"
translation = "「그, 그렇게 안 해도 혼자 날 수 있는데……」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「――い、嫌ではないです。むしろ嬉しいですが……！」"
translation = "「──시, 싫은 건 아니에요. 오히려 기쁘지만요……!」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
original = "「お姫様抱っこは初めてなので、胸が破裂しそうなくらい、ドキドキしちゃいます……<emoji=heart04>」"
translation = "「공주님 안기는 처음이라, 가슴이 터질 것처럼 두근거려 버려요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その後、俺たちは人目も憚らずに、お姫様抱っこのままデートの帰路に着くのだった――"
translation = "그 후, 우리들은 남의 눈도 아랑곳하지 않고 공주님 안기 상태 그대로 데이트 귀로에 오르는 것이었다――"

