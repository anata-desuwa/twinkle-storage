[[dialogue]]
speaker = "unk"
original = "第３話,１００年目の変化,P"
translation = "제3화, 100년째의 변화"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「スヤスヤ……♪」"
translation = "「쿨쿨……♪」"

[[dialogue]]
speaker = "unk"
original = "最近、ソフレはよく星徒会室をお昼寝スポットにしている。静かに眠っているだけなので、仕事に支障はなく別にいいのだが――"
translation = "요즘 소프레는 자주 성도회실을 낮잠 장소로 삼고 있다. 조용히 자고 있을 뿐이라 업무에 지장은 없으니 별 상관은 없지만――"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「ん……ふわぁ～。よく寝たのだわ」"
translation = "「음…… 후아아~. 잘 잤던 거예요」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「会長、仕事はどんな感じなのだわ？」"
translation = "「회장, 일은 어떤 느낌인 거예요?」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「――もうすぐ終わりそう？\u3000ふ～ん、なら、ＤＩＳＣを弄って待っているのだわ」"
translation = "「――거의 다 끝날 것 같아? 흐음, 그럼 DISC를 만지작거리며 기다리는 거예요」"

[[dialogue]]
speaker = "unk"
original = "最近、よく星徒会室で寝てるよね"
translation = "최근 자주 성도회실에서 자네."

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「ふふ……ここはなかなか良いお昼寝スポットなのだわ♪\u3000日当たりもいいし、エアコンもあるしね」"
translation = "「후후…… 여기는 꽤 좋은 낮잠 스폿인 거예요♪ 햇볕도 잘 들고 에어컨도 있으니까요」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「あと会長はフェリシーと違って、意外とソフレに甘いのだわ。ソフレがお昼寝してても、怒ったりしないし」"
translation = "「그리고 회장은 펠리시와 다르게 의외로 소프레에게 무른 거예요. 소프레가 낮잠을 자고 있어도 화내지 않고」"

[[dialogue]]
speaker = "unk"
original = "ぐうたらしてたら怒るかもだけど……"
translation = "게으름 피우면 화낼지도 모르지만……"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「ん？\u3000――授業はちゃんと出てるし、星騎士としても出撃しているから、別に怒ったりしない？」"
translation = "「응? ――수업은 꼬박꼬박 나오고 있고 성기사로서도 출격하고 있으니까 딱히 화내지 않는다고?」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「それは……授業をサボるとフェリシーがうるさいし……」"
translation = "「그건…… 수업을 빼먹으면 펠리시가 시끄러우니까요……」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「戦うようになったのは……安眠の為よ。会長が出撃しているのに、ソフレだけ留守番して寝ていたら、寝覚めがよくないのだわ」"
translation = "「싸우게 된 건…… 숙면을 위해서예요. 회장이 출격하고 있는데 소프레만 남아서 자고 있으면 잠자리가 뒤숭숭한 거예요」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「会長が近くにいると、なんだか不思議と安心して、よく眠れるのよね」"
translation = "「회장이 근처에 있으면 왠지 모르게 안심이 돼서 잘 자게 된단 말이죠」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「会長はそういう、癒しオーラを持っているのかもしれないわ。一種の安眠グッズみたいなものね♪」"
translation = "「회장은 그런 치유 오라를 가지고 있는 걸지도 몰라요. 일종의 숙면 굿즈 같은 것이네요♪」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「ついでに戦えば、封印の刑期も短くなるしね。一石二鳥なのだわ」"
translation = "「덤으로 싸우면 봉인 형기도 짧아지니까요. 일석이조인 거예요」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「――って、ソフレが話している間に、書類仕事が終わったみたいね」"
translation = "「――그나저나 소프레가 이야기하는 사이에 서류 작업이 끝난 모양이네요」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「なら、ソフレがこうしてせっかく起きているのだし、放課後の雑談に付き合ってあげるのだわ♪」"
translation = "「그럼 소프레가 이렇게 모처럼 깨어 있으니, 방과 후 수다에 동참해 주는 거예요♪」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「会長も『ネムリスト』の仲間入りをしたわけだしね」"
translation = "「회장도 『네무리스트』의 일원이 된 셈이니까요」"

[[dialogue]]
speaker = "unk"
original = "『ネムリスト』とは、ソフレの造語で、快適な睡眠を目指す者のこと――らしい。"
translation = "『네무리스트』란 소프레의 조어로, 쾌적한 수면을 지향하는 자――라는 모양이다."

[[dialogue]]
speaker = "unk"
original = "ソフレとよく話すようになって、安眠グッズに興味を持つうちに、いつの間にか俺も仲間入りを認められていたのだった。"
translation = "소프레와 자주 이야기하게 되면서 숙면 굿즈에 관심을 갖게 된 사이, 어느덧 나도 동료로 인정받게 된 것이었다."

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「――この前、ソフレがあげた枕は使ってみた？\u3000それで、どうだったのかしら？」"
translation = "「――지난번에 소프레가 준 베개는 써봤나요? 그래서 어땠을까나?」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「ぐっすり寝られるようになった？\u3000ふふっ、そうでしょう♪\u3000ソフレが１番よく使っているのと同じものなのよ」"
translation = "「푹 잘 수 있게 됐다고? 후훗, 그럴 줄 알았어요♪ 소프레가 가장 즐겨 쓰는 것과 같은 것이거든요」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「また別の安眠グッズも教えてあげるのだわ。といっても、いちいち持ってくるのも面倒だし――」"
translation = "「또 다른 숙면 굿즈도 가르쳐 주는 거예요. 그렇다고 일일이 가져오는 것도 귀찮으니――」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「今度、ソフレの部屋に招待してあげる。今週末とか予定は空いているのかしら？」"
translation = "「이번에 소프레의 방으로 초대해 주겠어요. 이번 주말이라든가 예정은 비어 있을까나?」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「――ふふっ、じゃあ決まりね。休日なら、まったりできるし……」"
translation = "「――후훗, 그럼 결정이네요. 휴일이라면 느긋하게 있을 수 있고……」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「一緒にお昼寝会をするのも悪くないのだわ♪」"
translation = "「함께 낮잠 모임을 하는 것도 나쁘지 않은 거예요♪」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「――ということが昨日あって、会長が部屋に遊びに来ることになったのだわ」"
translation = "「――라는 일이 어제 있어서 회장이 방에 놀러 오기로 한 거예요」"

[[dialogue]]
speaker = "unk"
original = "ソフレがフェリシーと２人で昼食をしながら、そんなことを話すと……"
translation = "소프레가 펠리시와 둘이서 점심을 먹으며 그런 이야기를 하자……"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「……あのさ、ソフレ」"
translation = "「……있잖아, 소프레」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「最近思ってたんだけど、ソフレって実は……」"
translation = "「최근 생각했던 건데, 소프레 사실은……」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「会長くんのこと、好きだったりする？」"
translation = "「회장군을 좋아하는 거 아니야?」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「は……はあぁっ！？\u3000なんでそうなるのだわ！」"
translation = "「하…… 하아앗!? 왜 그렇게 되는 거예요!」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「だって、聞いている限り、２人ですごいイチャイチャしてるし」"
translation = "「그야 듣기로는 둘이서 엄청 꽁냥대고 있는 것 같고」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「イチャイチャ！？」"
translation = "「꽁냥꽁냥!?」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「というか、私より会長くんの方がソフレと親密になってる気がするし！」"
translation = "「그보다 나보다 회장군이 소프레랑 더 친밀해진 기분이 든다구!」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「ずるい！\u3000私だってまだソフレから遊びに誘われたことないのに！」"
translation = "「치사해! 나도 아직 소프레한테 놀러 오라는 권유 못 받았는데!」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「い、いや、ソフレは別にそんな……」"
translation = "「아, 아니, 소프레는 딱히 그런 게……」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「でも、ソフレが会長くんのことを話す時って、睡眠について語っている時みたいに楽しそうだよ？」"
translation = "「하지만 소프레가 회장군 이야기를 할 때면 수면에 대해 이야기할 때처럼 즐거워 보여」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「えっ……！？」"
translation = "「엣……!?」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "（そ、ソフレが会長を好きとか、あり得ないのだわ……！）"
translation = " (소, 소프레가 회장을 좋아하다니 그럴 리 없는 거예요……!)"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "（だって、生まれてこの方、恋愛のことなんか興味を持ってこなかったのに……今更そんな……！）"
translation = " (그야 태어나서 지금까지 연애 같은 건 관심도 없었는데…… 이제 와서 그런……!)"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「……で、実際のところは、どうなの？」"
translation = "「……그래서 실제로는 어때?」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「そ、そんなわけないのだわ！\u3000絶対に違うのよ！」"
translation = "「그, 그럴 리 없는 거예요! 절대로 아닌걸요!」"

[[dialogue]]
speaker_original = "ソフレ"
speaker_translation = "소프레"
original = "「ソフレは恋愛よりも、睡眠の方が好きなのだわ～～～っ！」"
translation = "「소프레는 연애보다 수면을 더 좋아하는 거예요～～～앗!」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「って、ソフレったら逃げちゃった。でも、そっかぁ――」"
translation = "「어라, 소프레 도망가 버렸네. 하지만 그렇구나――」"

[[dialogue]]
speaker_original = "フェリシー"
speaker_translation = "펠리시"
original = "「伝説の吸血鬼にも、ついに恋がやってきたか～。ふふっ♪」"
translation = "「전설의 흡혈귀에게도 드디어 사랑이 찾아온 건가~. 후훗♪」"

[[dialogue]]
speaker = "unk"
original = "１００年目にして迎えた友達の変化を、嬉しく思うフェリシーなのだった。"
translation = "100년 만에 맞이한 친구의 변화를 기쁘게 생각하는 펠리시였다."

