[[dialogue]]
speaker = "unk"
original = "第１２話,あなたのことを教えて,B"
translation = "제12화, 당신에 대해 알려줘, B"

[[dialogue]]
speaker = "unk"
original = "クロトたちが天界へ出発した後、新星学園では──"
translation = "쿠로토 일행이 천계로 출발한 후, 신성학원에서는──"

[[dialogue]]
speaker = "チナ"
original = "「これで……よかったのか……？」"
translation = "「이걸로…… 된 건가……?」"

[[dialogue]]
speaker = "チナ"
original = "「もし作戦が失敗したらアタシのせいだ……でもリクリエに利用されるわけには……」"
translation = "「만약 작전이 실패하면 내 탓이야…… 하지만 리크리에에게 이용당할 수는……」"

[[dialogue]]
speaker = "シノ"
original = "「やはり気になりますか？」"
translation = "「역시 신경 쓰이시나요?」"

[[dialogue]]
speaker = "チナ"
original = "「！\u3000何しに来た？」"
translation = "「! 뭐 하러 왔어?」"

[[dialogue]]
speaker = "シノ"
original = "「きっと悩んでおられるだろうなと思いまして。お菓子もありますし、少しお茶しませんか？」"
translation = "「분명 고민하고 계실 거라 생각해서요. 과자도 있으니, 잠시 차라도 마시지 않겠어요?」"

[[dialogue]]
speaker = "チナ"
original = "「……お前は何がしたいんだ？\u3000アタシがアルタイルに味方するよう誘導してるのか？」"
translation = "「……너는 뭘 하고 싶은 거야? 내가 알타이르 편을 들도록 유도하는 건가?」"

[[dialogue]]
speaker = "シノ"
original = "「いいえ。意に沿わない決定はいずれ撤回される可能性が高いので、あまり意味がありません」"
translation = "「아니요. 뜻에 맞지 않는 결정은 머지않아 철회될 가능성이 높기에, 그리 의미가 없습니다」"

[[dialogue]]
speaker = "シノ"
original = "「私はあなたを応援したいんです。あなたがやりたいことを成し遂げてほしいと思っているんですよ」"
translation = "「저는 당신을 응원하고 싶을 뿐이에요. 당신이 하고 싶은 일을 성취하길 바라고 있답니다」"

[[dialogue]]
speaker = "チナ"
original = "「はぁ？\u3000アタシはお前の世界を滅ぼそうとしたんだぞ？」"
translation = "「하아? 나는 네 세계를 멸망시키려 했다고?」"

[[dialogue]]
speaker = "シノ"
original = "「ええ、わかっていますよ。しかしあなたが本当に成し遂げたいのは、デネブを守ることでしょう？」"
translation = "「네, 알고 있어요. 하지만 당신이 정말로 이루고 싶은 건 데네브를 지키는 것이죠?」"

[[dialogue]]
speaker = "チナ"
original = "「ぅ……」"
translation = "「으……」"

[[dialogue]]
speaker = "シノ"
original = "「実は私、自分の夢がないんですよ。今のところは、ですが」"
translation = "「사실 저, 제 꿈이 없거든요. 지금으로서는, 말이죠」"

[[dialogue]]
speaker = "チナ"
original = "「……は？」"
translation = "「……뭐?」"

[[dialogue]]
speaker = "シノ"
original = "「私の実家は小さな会社を営んでいたんですが、父が亡くなって、急遽私が跡を継ぐことになりまして」"
translation = "「제 본가는 작은 회사를 경영하고 있었습니다만, 아버지가 돌아가시고 갑작스럽게 제가 뒤를 잇게 되어서요」"

[[dialogue]]
speaker = "チナ"
original = "「……それは災難だったな」"
translation = "「……그건 안됐군」"

[[dialogue]]
speaker = "シノ"
original = "「ええ。まだ学生なのに経営を勉強して、必死に会社を立て直して……本当に大変でした」"
translation = "「네. 아직 학생인데 경영을 공부하고, 필사적으로 회사를 다시 세우느라…… 정말 힘들었습니다」"

[[dialogue]]
speaker = "シノ"
original = "「それから実家の事業を離れたんですけど、その経験からいくつかの会社で雇われ社長になって……」"
translation = "「그 후 가업을 떠났습니다만, 그 경험 덕분에 몇몇 회사에서 고용 사장이 되었고……」"

[[dialogue]]
speaker = "シノ"
original = "「その手腕を買われたみたいで、新星学園の学園長にスカウトされて今に至ります」"
translation = "「그 수완을 인정받은 건지, 신성학원의 학원장으로 스카우트되어 지금에 이르렀습니다」"

[[dialogue]]
speaker = "チナ"
original = "「なんかめちゃくちゃな人生だな……」"
translation = "「뭔가 엉망진창인 인생이네……」"

[[dialogue]]
speaker = "シノ"
original = "「はは。そうですね。少なくとも普通とはかけ離れた人生です」"
translation = "「하하. 그렇네요. 적어도 평범함과는 거리가 먼 인생입니다」"

[[dialogue]]
speaker = "シノ"
original = "「だけど今の学園長の仕事も、割と気に入ってるんです。誰かの夢を応援できる仕事ですから」"
translation = "「하지만 지금 학원장 일도 꽤 마음에 들어요. 누군가의 꿈을 응원할 수 있는 일이니까요」"

[[dialogue]]
speaker = "シノ"
original = "「先ほども言いましたが、私には自分の夢がありません。だからこそ、人の夢を応援したいと思うんです」"
translation = "「아까도 말씀드렸지만, 제게는 제 꿈이 없습니다. 그렇기에 타인의 꿈을 응원하고 싶다고 생각하는 거예요」"

[[dialogue]]
speaker = "シノ"
original = "「チナさんにも、自分の夢を叶えてほしいって思っていますよ」"
translation = "「치나 씨도 자신의 꿈을 이루길 바라고 있답니다」"

[[dialogue]]
speaker = "チナ"
original = "「アタシは敵だってわかっててもか？」"
translation = "「내가 적이라는 걸 알면서도 말이냐?」"

[[dialogue]]
speaker = "シノ"
original = "「はい。アルタイルを襲撃したのは、デネブを守るためですから。その選択を否定はしません」"
translation = "「네. 알타이르를 습격한 것은 데네브를 지키기 위해서였으니까요. 그 선택을 부정하지는 않습니다」"

[[dialogue]]
speaker = "シノ"
original = "「『平行世界は滅ぼし合わないといけない』と言われたら、そうするのも自然なことだと思います」"
translation = "「『평행세계는 서로 멸망시켜야만 한다』는 말을 듣는다면, 그렇게 행동하는 것도 자연스러운 일이라 생각합니다」"

[[dialogue]]
speaker = "シノ"
original = "「私だって、緋宮会長がデネブと戦うことを選んでいれば、背中を押していたかもしれませんから」"
translation = "「저라도 히노미야 회장이 데네브와 싸우는 것을 택했다면, 등을 밀어주었을지도 모르니까요」"

[[dialogue]]
speaker = "unk"
original = "シノはあくまでチナを責めることはしない。"
translation = "시노는 결코 치나를 탓하지 않는다."

[[dialogue]]
speaker = "unk"
original = "アルタイルを守るために戦いはするが、その選択を間違いだと<ruby>糺<rt>ただ</rt></ruby>す立場でもなければ、糾弾する資格があるわけでもない。"
translation = "알타이르를 지키기 위해 싸우기는 하겠지만, 그 선택을 틀렸다고 바로잡을 입장도 아니거니와, 규탄할 자격이 있는 것도 아니다."

[[dialogue]]
speaker = "シノ"
original = "「私のことをお話したんですし、チナさんのことも教えていただけませんか？」"
translation = "「제 이야기를 했으니, 치나 씨의 이야기도 들려주지 않겠어요?」"

[[dialogue]]
speaker = "チナ"
original = "「は？」"
translation = "「뭐?」"

[[dialogue]]
speaker = "シノ"
original = "「私たちは、自分たちで思っている以上に、お互いの世界のことを知らない。ですからそのギャップを埋めるために情報交換をしませんか？」"
translation = "「우리는 스스로 생각하는 것 이상으로 서로의 세계를 모릅니다. 그러니 그 격차를 메우기 위해 정보 교환을 하지 않겠어요?」"

[[dialogue]]
speaker = "シノ"
original = "「もちろん私もアルタイルのことをお話します。それならチナさんも情報を得られてウィンウィンでしょう？」"
translation = "「물론 저도 알타이르에 대해 이야기하겠습니다. 그러면 치나 씨도 정보를 얻을 수 있으니 윈윈이겠죠?」"

[[dialogue]]
speaker = "シノ"
original = "「ですが──」"
translation = "「하지만──」"

[[dialogue]]
speaker = "シノ"
original = "「私はあなたのことを知りたいんです。今私の目の前にいる、デネブの香堂チナさんのことを」"
translation = "「저는 당신에 대해 알고 싶습니다. 지금 제 눈앞에 있는, 데네브의 코도 치나 씨에 대해서요」"

[[dialogue]]
speaker = "unk"
original = "シノが微笑みながら、チナを真っ直ぐ見つめる。"
translation = "시노가 미소 지으며 치나를 똑바로 바라본다."

[[dialogue]]
speaker = "unk"
original = "その視線に、チナは居心地悪そうに眉をひそめて……"
translation = "그 시선에 치나는 거북한 듯 미간을 찌푸리더니……"

[[dialogue]]
speaker = "チナ"
original = "「……何度も言うが、デネブを売るつもりはない」"
translation = "「……몇 번이나 말하지만, 데네브를 팔 생각은 없어」"

[[dialogue]]
speaker = "チナ"
original = "「でもアタシのことなら……少しくらい話してもいい」"
translation = "「하지만 내 이야기라면…… 조금 정도는 해줄 수 있어」"

[[dialogue]]
speaker = "unk"
original = "そしてチナは、亡くした家族の思い出や、昔よく食べた好物など、自分のことを少しずつ語り出したのだった。"
translation = "그리고 치나는 잃어버린 가족의 추억이나, 옛날에 자주 먹었던 좋아하는 음식 등, 자신에 대해 조금씩 이야기하기 시작했다."

