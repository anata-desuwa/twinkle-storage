[[dialogue]]
speaker = "unk"
original = "第２話,新たな使徒,B"
translation = "제2화, 새로운 사도, B"

[[dialogue]]
speaker = "梨緒"
original = "「ぐっ……」"
translation = "「윽……」"

[[dialogue]]
speaker = "unk"
original = "仮面の女性の姿を見た途端、梨緒の顔が苦痛に歪む。"
translation = "가면을 쓴 여성의 모습을 본 순간, 리오의 얼굴이 고통으로 일그러진다."

[[dialogue]]
speaker = "梨緒"
original = "（頭が……痛い……っ）"
translation = "(머리가…… 아파……윽)"

[[dialogue]]
speaker = "梨緒"
original = "（寒気がして……体が震えている？\u3000私は恐れているのか……？\u3000ジグを？）"
translation = "(한기가 들고…… 몸이 떨리고 있어? 내가 겁을 먹고 있는 건가……? 지그를?)"

[[dialogue]]
speaker = "unk"
original = "ここ数ヶ月、ジグを探し続けていた。"
translation = "지난 몇 개월간, 지그를 계속해서 찾아 헤맸다."

[[dialogue]]
speaker = "unk"
original = "だというのに、梨緒の胸に再会の喜びはない。"
translation = "그럼에도 불구하고 리오의 가슴에 재회의 기쁨은 없었다."

[[dialogue]]
speaker = "unk"
original = "むしろ得体の知れない恐怖が心を支配しようとしていた。"
translation = "오히려 정체 모를 공포가 마음을 지배하려 하고 있었다."

[[dialogue]]
speaker = "ジグ"
original = "「おやおや、そんなに怯えた目をしてどうしたんだい？\u3000私が君に何かしてしまったかな？」"
translation = "「이런 이런, 그렇게 겁에 질린 눈으로 왜 그러지? 내가 너에게 무슨 짓이라도 했나?」"

[[dialogue]]
speaker = "梨緒"
original = "「うる……さい……」"
translation = "「시끄러……워……」"

[[dialogue]]
speaker = "梨緒"
original = "「君こそ、私のことを忘れたのか……？\u3000どうして今になって現れた……！」"
translation = "「너야말로, 나를 잊은 거냐……? 어째서 이제야 나타난 거야……!」"

[[dialogue]]
speaker = "ナターシャ"
original = "「ていうか、“真なる神”って何？\u3000女神様に対して不敬じゃない？」"
translation = "「그보다, “진정한 신”이란 게 뭐야? 여신님에 대해 불경하지 않아?」"

[[dialogue]]
speaker = "ジグ"
original = "「言葉通りの意味さ。私が仕えるのは、世界を創り<ruby>給<rt>たも</rt></ruby>うた真なる神。女神なんて所詮お飾りだよ」"
translation = "「말 그대로의 의미야. 내가 섬기는 분은 세계를 창조하신 진정한 신. 여신 따위는 결국 장식일 뿐이지」"

[[dialogue]]
speaker = "ナターシャ"
original = "「ふぅん。テルル様をお飾り呼ばわりとは、不信心だね」"
translation = "「흐음. 테루루 님을 장식 취급하다니, 신앙심이 없네」"

[[dialogue]]
speaker = "アポロ"
original = "「言っても無駄だ！\u3000こいつは『リクリエの使徒』だ」"
translation = "「말해도 소용없어! 이 녀석은 『리크리에의 사도』다」"

[[dialogue]]
speaker = "アポロ"
original = "「かつてのあたしと同じように、リクリエに目をつけられ、世界を破滅に導くためのしもべにされた者──それが『リクリエの使徒』だ」"
translation = "「과거의 나처럼, 리크리에의 눈에 띄어 세계를 파멸로 이끌기 위한 종복이 된 자── 그것이 『리크리에의 사도』다」"

[[dialogue]]
speaker = "アポロ"
original = "「あいつのヘンテコな言動と、あの仮面がその証だ！！」"
translation = "「저 녀석의 이상한 언동과 저 가면이 그 증거야!!」"

[[dialogue]]
speaker = "梨緒"
original = "（あの仮面を見ていると、震えが止まらない……）"
translation = "(저 가면을 보고 있으면 떨림이 멈추지 않아……)"

[[dialogue]]
speaker = "梨緒"
original = "（あんな<ruby>仮面<rt>もの</rt></ruby>、私は知らない……知らないはず……なのに、どうして……）"
translation = "(저런 가면, 나는 몰라…… 모를 텐데…… 그런데 어째서……)"

[[dialogue]]
speaker = "梨緒"
original = "（私はあの仮面を……見たことがある……？）"
translation = "(나는 저 가면을…… 본 적이 있는 건가……?)"

[[dialogue]]
speaker = "unk"
original = "梨緒が記憶を思い出そうとした瞬間、頭の中で傷が疼くように痛みが走る。"
translation = "리오가 기억을 떠올리려 한 순간, 머릿속에서 상처가 욱신거리듯 통증이 달린다."

[[dialogue]]
speaker = "梨緒"
original = "「っ……」"
translation = "「윽……」"

[[dialogue]]
speaker = "ベアトリス"
original = "「大丈夫、梨緒ちゃんっ？」"
translation = "「괜찮아요, 리오짱?」"

[[dialogue]]
speaker = "梨緒"
original = "「あ、ああ……私なら戦える」"
translation = "「아, 아아…… 나라면 싸울 수 있어」"

[[dialogue]]
speaker = "unk"
original = "痛む頭を押さえながら、クロスボウを握り直す梨緒。"
translation = "아픈 머리를 짓누르며 크로스보우를 다시 고쳐 쥐는 리오."

[[dialogue]]
speaker = "unk"
original = "その視線の先で、ジグがやれやれと小さく肩を竦めた。"
translation = "그 시선 끝에서 지그가 어쩔 수 없다는 듯 작게 어깨를 으쓱였다."

[[dialogue]]
speaker = "ジグ"
original = "「不信心なのは君たちの方だよ。<b>神</b>は世界の刷新を望んでいる」"
translation = "「신앙심이 없는 건 너희 쪽이야. <b>신</b>은 세계의 쇄신을 바라고 계신다」"

[[dialogue]]
speaker = "ジグ"
original = "「世界の進歩は限界を迎えつつある。より良い未来のために、世界は生まれ変わらなければいけないんだ」"
translation = "「세계의 진보는 한계에 다다르고 있어. 더 나은 미래를 위해 세계는 다시 태어나야만 해」"

[[dialogue]]
speaker = "アポロ"
original = "「いかにもリクリエの使徒が言いそうなセリフだな！\u3000だがあたしの眼が<ruby>緋<rt>あか</rt></ruby>いうちはそうはさせないぞ。元使徒として、オマエを止めてやる！」"
translation = "「딱 리크리에의 사도가 할 법한 대사로군! 하지만 내 눈이 붉은 동안은 그렇게 두지 않겠다. 전직 사도로서 너를 막아주마!」"

[[dialogue]]
speaker = "ジグ"
original = "「へぇ、じゃあ君は私の先輩なんだ。よろしく、小さな先輩」"
translation = "「헤에, 그럼 네가 내 선배구나. 잘 부탁해, 작은 선배」"

[[dialogue]]
speaker = "ジグ"
original = "「しかし残念だ。君はせっかく授けられた<b>神</b>の祝福を捨て、<b>神</b>意に背く存在になってしまった」"
translation = "「하지만 유감이군. 너는 모처럼 부여받은 <b>신</b>의 축복을 버리고 <b>신</b>의 뜻에 거스르는 존재가 되어버렸어」"

[[dialogue]]
speaker = "アポロ"
original = "「うるさい！\u3000あたしはフィオナたちのおかげであたしを取り戻したんだ！」"
translation = "「시끄러워! 나는 피오나 일행 덕분에 나 자신을 되찾았단 말이다!」"

[[dialogue]]
speaker = "ジグ"
original = "「<b>神</b>に身を委ねていれば、今頃世界は生まれ変わっていたというのに……ああ、本当に残念だよ」"
translation = "「<b>신</b>에게 몸을 맡기고 있었다면 지금쯤 세계는 다시 태어났을 텐데…… 아아, 정말 유감이야」"

[[dialogue]]
speaker = "ジグ"
original = "「仕方ない。“神の騎士”として、君たちに裁きを下すとしよう」"
translation = "「어쩔 수 없지. “신의 기사”로서 너희에게 심판을 내리도록 하마」"

[[dialogue]]
speaker = "unk"
original = "そう言ってジグが指を鳴らすと──"
translation = "그렇게 말하며 지그가 손가락을 튕기자──"

[[dialogue]]
speaker = "ドラケルス"
original = "「グルゥ……！」"
translation = "「그루우……!」"

[[dialogue]]
speaker = "梨緒"
original = "「このモンスターは……！」"
translation = "「이 몬스터는……!」"

[[dialogue]]
speaker = "ナターシャ"
original = "「なるほど。メカのモンスターをけしかけてたのはあなただったんだ」"
translation = "「과연. 기계 몬스터를 내보냈던 건 당신이었구나」"

[[dialogue]]
speaker = "ジグ"
original = "「同じのばっかりじゃ芸がないからね。楽しんでもらえたかい？」"
translation = "「똑같은 것만 있으면 재미없으니까. 즐거웠니?」"

[[dialogue]]
speaker = "アポロ"
original = "「見た目がカッコイイのだけは認めてやるが、楽しめるわけないだろ！\u3000みんな行くぞ！」"
translation = "「겉모습이 멋진 것만은 인정해주마만, 즐거울 리가 없잖아! 모두 가자!」"

