[[dialogue]]
speaker = "unk"
original = "新星学園のアリーナを貸し切って行われたアーネストのライブ──あの日からしばらくの月日が流れた。"
translation = "신성학원의 아레나를 대관하여 진행된 어니스트의 라이브── 그날로부터 꽤 시간이 흘렀다."

[[dialogue]]
speaker = "unk"
original = "それなのに、いまだにメルエルの元へ『再デビューはしないのか』と訊ねてくる者は後を絶たないそうだ。"
translation = "그런데도 여전히 멜레르에게 『재데뷔는 안 하느냐』고 묻는 자들이 끊이지 않는다고 한다."

[[dialogue]]
speaker = "unk"
original = "レミカや、クラスメイトの友人だけでなく、あのポラリスプロダクションからも直々にオファーが来たというのだから驚きだ。"
translation = "레미카나 반 친구들뿐만 아니라, 그 폴라리스 프로덕션에서도 직접 오퍼가 왔다고 하니 놀라울 따름이다."

[[dialogue]]
speaker = "unk"
original = "だけどメルエルは全ての依頼を断っていた──俺との時間が減るのが嫌だから、と。"
translation = "하지만 멜레르는 모든 의뢰를 거절하고 있었다── 나와 보내는 시간이 줄어드는 게 싫다면서."

[[dialogue]]
speaker = "unk"
original = "どれだけお金を積まれても、輝かしい未来を説かれても。メルエルはモンスターとの戦闘時以外、決してアイドル衣装を着ることはなかったのだが──"
translation = "아무리 많은 돈을 준대도, 찬란한 미래를 설파해도. 멜레르는 몬스터와의 전투 때 이외에는 결코 아이돌 의상을 입지 않았지만──"

[[dialogue]]
speaker = "メルエル"
original = "「じゃ、じゃーん……<emoji=heart04>\u3000キミのリクエストどおり、変身してみたけど……ど、どうかなっ？\u3000似合ってる……？\u3000良かったあ<emoji=heart04>」"
translation = "「짜, 짠……<emoji=heart04> 네 리퀘스트대로 변신해봤는데…… 어, 어때? 잘 어울려……? 다행이다<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
original = "「ライブでも戦闘でもないのに、この格好になるのって……ちょっと恥ずかしいけど、キミが喜んでくれるなら嬉しいな<emoji=heart04>」"
translation = "「라이브도 전투도 아닌데 이 차림이 되는 건…… 조금 부끄럽지만 네가 기뻐해 준다면 기뻐<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
original = "「それにコスプレエッチって、仲良しのカップルさんみたいでドキドキしちゃうかも……<emoji=heart04>」"
translation = "「게다가 코스프레 섹스라니, 사이좋은 커플 같아서 두근거릴지도……<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
original = "「──うん♪\u3000引退しても、私はず～っとキミだけのアイドルだから。今日もいっぱい、いちゃいちゃしようね？<emoji=heart04>」"
translation = "「──응♪ 은퇴해도 난 어~언제나 너만의 아이돌이니까. 오늘도 잔뜩 꽁냥꽁냥하자?<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
original = "「はぁっ……はぁあっ……<emoji=heart04>\u3000キミのおち○ちん、もうすっごく大きくなってる……<emoji=heart04>」"
translation = "「하아…… 하아아……<emoji=heart04> 네 자지, 벌써 정말 커졌어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ステージで可憐な歌声とダンスを披露していたメルエルが、アイドルの衣装をはだけて仰向けになっている。"
translation = "무대에서 가련한 노랫소리와 춤을 선보이던 멜레르가 아이돌 의상을 헤치고 누워 있다."

[[dialogue]]
speaker = "unk"
original = "大きくて形のいいおっぱいも、大切な女性器も……惜しげもなく俺に見せてくれる格好に、ぞくりと背筋が震えてしまう。"
translation = "크고 모양 예쁜 가슴도, 소중한 보지도…… 아낌없이 나에게 보여주는 모습에 등줄기가 오싹 떨린다."

[[dialogue]]
speaker = "メルエル"
original = "「いつもは、キスしてるうちにちょっとずつ大きくなったり……私がお口でしてあげたりするけど……」"
translation = "「평소에는 키스하는 동안 조금씩 커지거나…… 내가 입으로 해주거나 하지만……」"

[[dialogue]]
speaker = "メルエル"
original = "「きょ、今日はすごいかも……何もしてないのに、がっちがち……<emoji=heart04>」"
translation = "「오, 오늘은 대단할지도…… 아무것도 안 했는데 빳빳해……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「無理もないよ、だって……」"
translation = "「그럴 만도 해, 그야……」"

[[dialogue]]
speaker = "unk"
original = "誰に言われても、プライベートで着替えることのなかったメルエルが、俺のお願いにはあっさりと応えてくれたんだ。"
translation = "누가 말해도 사적으로 갈아입는 법이 없던 멜레르가 내 부탁에는 선뜻 응해주었다."

[[dialogue]]
speaker = "unk"
original = "『コスプレエッチしてみたい』なんていう、彼氏のお願いひとつで。笑顔で頷いて、変身して──あられもない姿まで見せてくれて。"
translation = "『코스프레 섹스 해보고 싶어』라는 남자친구의 부탁 하나에. 미소 지으며 고개를 끄덕이고 변신해서── 부끄러운 모습까지 보여주며."

[[dialogue]]
speaker = "メルエル"
original = "「だって将来の旦那様のお願いだもん……何でも聞いてあげたいって思うの、当たり前じゃないかな<emoji=heart04>」"
translation = "「그야 미래의 남편님 부탁인걸…… 뭐든 들어주고 싶다고 생각하는 거, 당연하지 않겠어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "あんまり可愛いことを言われて我慢ができなくなった俺は、メルエルに覆いかぶさってキスをする。"
translation = "너무나 귀여운 소리를 들어 참을 수 없게 된 나는 멜레르를 덮치며 키스한다."

[[dialogue]]
speaker = "メルエル"
original = "「あっ、会長くんっ……んん、ちゅぅっ<emoji=heart04>\u3000んんちゅ、ちゅぅっ……ぷぁっ……んんっ<emoji=heart04>\u3000ちゅぅ、ちゅるっ<emoji=heart04>」"
translation = "「앗, 회장군…… 으응, 츄우<emoji=heart04> 으음 츄, 츄우…… 푸하…… 으음<emoji=heart04> 츄우, 츄릅<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
original = "「キス、気持ちいいっ……んちゅる<emoji=heart04>\u3000エッチする前のチュー、好きっ……んぅ、ちゅぱ、んちゅるっ……ちゅぅっ……<emoji=heart04>」"
translation = "「키스, 기분 좋아…… 으음 츄릅<emoji=heart04> 섹스하기 전의 츄, 좋아…… 응, 츄파, 츄릅…… 츄우……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "舌を絡ませるたび、びくびくと震えるメルエルが愛おしい。寄せられたおっぱいがゆさゆさと揺れて、女性器がどんどん熱を持っていくのが分かる。"
translation = "혀를 섞을 때마다 파르르 떨리는 멜레르가 사랑스럽다. 맞닿은 가슴이 출렁출렁 흔들리고, 보지가 점점 열을 띠는 것이 느껴진다."

[[dialogue]]
speaker = "メルエル"
original = "「ちゅっ──ぱぁっ♪\u3000はぁっ……はぁあっ……ふぅっ……<emoji=heart04>\u3000会長くん、好き……大好き<emoji=heart04>」"
translation = "「츄── 파♪ 하아…… 하아아…… 후우……<emoji=heart04> 회장군, 좋아해…… 정말 좋아해<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
original = "「はぁっ……はぁあっ……キスしただけで私、いっぱい……濡れてきちゃった……<emoji=heart04>」"
translation = "「하아…… 하아아…… 키스한 것만으로 나, 잔뜩…… 젖어버렸어……<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
original = "「うん……会長くんとキスすると、体が勝手に準備、始めちゃうの……この人と赤ちゃん作りたいよ～って<emoji=heart04>\u3000……えへへっ<emoji=heart04>」"
translation = "「응…… 회장군이랑 키스하면 몸이 멋대로 준비를 시작해버려…… 이 사람이랑 아기 만들고 싶어~ 하고<emoji=heart04> 에헤헤<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
original = "「今日もいっぱい、愛してくれる……？\u3000旦那様のおっきな、おち○ちん……い、入れて……欲しいな……<emoji=heart04>」"
translation = "「오늘도 잔뜩 사랑해줄 거야……? 남편님의 커다란 자지…… 너, 넣어…… 줬으면 좋겠어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "頷いて、俺は熱くなったペニスをあてがって──"
translation = "고개를 끄덕이고 나는 뜨거워진 페니스를 갖다 대고──"

[[dialogue]]
speaker = "メルエル"
original = "「ふぅっ──んん、んんっ……おち○ちん、入って、くるぅっ──ぁ、あ、あっ……！<emoji=heart04>」"
translation = "「후우── 으음, 으음…… 자지, 들어, 와아── 아, 아, 앗……!<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
original = "「んんっ、ぁ、あ、ぁっ──ふぁあぁ、あぁぁあっ……！！<emoji=heart04>」"
translation = "「으음, 아, 아, 아아── 하아아, 아아아앗……!!<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "挿入の為にこじ開けた膣内が、メルエルの喘ぎ声と一緒にきつく締めあげられる。"
translation = "삽입을 위해 비집고 들어간 질 내부가 멜레르의 신음과 함께 꽉 조여진다."

[[dialogue]]
speaker = "メルエル"
original = "「はぁあっ……はーっ……はーっ<emoji=heart04>\u3000また、おち○ちん、入ってきただけで、イっちゃった、よぉっ……<emoji=heart04>」"
translation = "「하아아…… 하아…… 하아<emoji=heart04> 또 자지 들어온 것만으로 가버렸어어……<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
original = "「大好きなキミと１つになれちゃう……おへその裏の、赤ちゃんのお部屋まで、おち○ちん来ちゃうって思ったら……ん、んんっ……<emoji=heart04>」"
translation = "「정말 좋아하는 너와 하나가 될 수 있어…… 배꼽 뒤에 있는 아기방까지 자지가 올 거라고 생각하니까…… 으, 으음……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "メルエルは初めてした時からこうだった。"
translation = "멜레르는 처음 했을 때부터 이랬다."

[[dialogue]]
speaker = "unk"
original = "キスをしただけで、好きだと囁いただけで、子宮口にこつんとペニスが当たっただけで──すぐに絶頂してしまう。"
translation = "키스만 해도, 좋아한다고 속삭이기만 해도, 자궁구에 툭 하고 페니스가 닿기만 해도── 금방 절정에 달해버린다."

[[dialogue]]
speaker = "unk"
original = "感じやすくてイキやすい可愛いアイドルを、もっと気持ちよくしてあげたい──"
translation = "느끼기 쉽고 가기 쉬운 귀여운 아이돌을 더 기분 좋게 해주고 싶다──"

[[dialogue]]
speaker = "メルエル"
original = "「んんぁ<emoji=heart04>\u3000は、ぁ、あぁあっ<emoji=heart04>\u3000んんんっ、ふぁあ、あ、ぁあ、あっ、はぁっ<emoji=heart04>\u3000ん、んんぅ、あ、ぁあっ……<emoji=heart04>」"
translation = "「으음아<emoji=heart04> 하, 아, 아아앗<emoji=heart04> 으으음, 하아, 아, 아아, 앗, 하아<emoji=heart04> 으, 으음으, 아, 아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
original = "「気持ち、いいよぉっ……んんっ<emoji=heart04>\u3000ふぅっ、んん、んぁっ<emoji=heart04>\u3000おま○こ、きゅんきゅん、しちゃってるぅっ<emoji=heart04>\u3000はぁぁん<emoji=heart04>」"
translation = "「기분, 좋아아…… 으음<emoji=heart04> 후우, 으음, 으응아<emoji=heart04> 보지, 큥큥거리고 있어어<emoji=heart04> 하아앙<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
original = "「はぁ、ああ、んん、んぁっ……はぁ、はーっ<emoji=heart04>\u3000おち○ちん、いっぱい、擦って……気持ちよく、なってねっ……<emoji=heart04>」"
translation = "「하아, 아아, 으음, 으응아…… 하아, 하아<emoji=heart04> 자지, 잔뜩 문질러서…… 기분 좋게 되어줘……<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
original = "「あなただけの、おま○こ、いっぱい、ぎゅーって……して、あげる、からぁっ……<emoji=heart04>\u3000あんっ<emoji=heart04>」"
translation = "「너만의 보지, 잔뜩 꽉…… 해줄 테니까아……<emoji=heart04> 아앙<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
original = "「はぁ、はぁ、はぁあっ<emoji=heart04>\u3000ああっ<emoji=heart04>\u3000嬉しい、キミが、興奮してくれてるの……分かるよっ<emoji=heart04>\u3000もっと見て、アイドルの、えっちなところ……<emoji=heart04>」"
translation = "「하아, 하아, 하아아<emoji=heart04> 아앗<emoji=heart04> 기뻐, 네가 흥분해주는 거…… 느껴져! 더 봐줘, 아이돌의 야한 모습……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ステージで踊っていた時の姿がフラッシュバックして、ぞくぞくとペニスがうずく。"
translation = "무대에서 춤추던 때의 모습이 플래시백 되어 페니스가 욱신욱신 쑤신다."

[[dialogue]]
speaker = "unk"
original = "メルエルの可愛い顔が見たい。挿入して、繋がっている所も見たい。たぷん、たぷんと揺れるおっぱいも見たい──"
translation = "멜레르의 귀여운 얼굴을 보고 싶다. 삽입해서 연결된 곳도 보고 싶다. 출렁출렁 흔들리는 가슴도 보고 싶다──"

[[dialogue]]
speaker = "メルエル"
original = "「ぁっ……その目、好きっ……かっこいいキミの、えっちな、視線っ……<emoji=heart04>\u3000あ、あ、ぁっ<emoji=heart04>\u3000あぁん<emoji=heart04>」"
translation = "「앗…… 그 눈빛, 좋아…… 멋있는 너의 야한 시선……<emoji=heart04> 아, 아, 앗<emoji=heart04> 아앙<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
original = "「見られてるところ、感じちゃう、よぉっ……<emoji=heart04>\u3000はぁ、ふぅ、んんっ、あああっ<emoji=heart04>\u3000はぁあっ、んんーっ……！<emoji=heart04>」"
translation = "「보고 있는 곳, 느껴버려어……<emoji=heart04> 하아, 후우, 으음, 아아앗<emoji=heart04> 하아아, 으음──! <emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
original = "「遠慮しなくて、いいからっ……<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000アイドルだもん、見られるのが、お仕事だもんっ<emoji=heart04>\u3000……じいって、見て<emoji=heart04>\u3000あ、ぁ、あああっ<emoji=heart04>」"
translation = "「사양하지 않아도 되니까……<emoji=heart04> 아앙<emoji=heart04> 아이돌인걸, 보여주는 게 일인걸<emoji=heart04> ……뚫어지게 봐줘<emoji=heart04> 아, 아, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
original = "「あ、ぁ、あっ<emoji=heart04>\u3000おち○ちん、強いっ……んんっ、赤ちゃんのお部屋、こんこんって<emoji=heart04>\u3000そんな、したらっ……ふぁあ、あ、あぁあっ<emoji=heart04>」"
translation = "「아, 아, 앗<emoji=heart04> 자지, 강해…… 으음, 아기방 똑똑 하고<emoji=heart04> 그렇게 하면…… 하아아, 아, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
original = "「おっぱい、揺れちゃうっ……<emoji=heart04>\u3000はぁ、ふぅ、んん、んっ<emoji=heart04>\u3000キミとえっちして、おっきくなっちゃったおっぱい<emoji=heart04>\u3000揺れちゃうよぉっ<emoji=heart04>」"
translation = "「가슴, 흔들려버려……<emoji=heart04> 하아, 후우, 으음, 응<emoji=heart04> 너랑 섹스해서 커져 버린 가슴<emoji=heart04> 흔들려버려어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ちょっと前からうっすら感じていたけれど、男から指摘するのもデリカシーがないかと思っていたが──"
translation = "조금 전부터 어렴풋이 느끼고 있었지만, 남자가 지적하는 것도 데리카시가 없는 게 아닐까 생각했는데──"

[[dialogue]]
speaker = "メルエル"
original = "「うんっ<emoji=heart04>\u3000キミとお付き合いして、えっち、いっぱいするようになって……<emoji=heart04>\u3000お、おっきく、なっちゃったの<emoji=heart04>」"
translation = "「응<emoji=heart04> 너랑 사귀고 섹스 잔뜩 하게 되면서……<emoji=heart04> 커, 커져 버렸어<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
original = "「はぁ、はあぁっ、ふぅ、んん、んっ<emoji=heart04>\u3000えへっ……おっきいと、おっぱいたくさん、出るのかなぁ……？<emoji=heart04>」"
translation = "「하아, 하아아, 후우, 으음, 응<emoji=heart04> 에헷…… 크면 젖 많이 나오려나……?<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
original = "「将来、キミとの赤ちゃんできた時っ……おっぱい、たくさん、あげたいなぁっ<emoji=heart04><emoji=heart04>\u3000はぁぁん<emoji=heart04>」"
translation = "「나중에 너랑 아기 생겼을 때…… 젖 잔뜩 주고 싶어어<emoji=heart04><emoji=heart04> 하아앙<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「──っ！」"
translation = "「──!」"

[[dialogue]]
speaker = "メルエル"
original = "「ぁ、あ、あっ──<emoji=heart04>\u3000おち○ちん、また硬くなった……な、なんでっ？<emoji=heart04>」"
translation = "「아, 아, 앗──<emoji=heart04> 자지 또 딱딱해졌어…… 왜, 왜애?<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "──この子はどれだけ、天然で俺を煽るんだろうか。"
translation = "──이 아이는 얼마나 천연덕스럽게 나를 부추기는 걸까."

[[dialogue]]
speaker = "メルエル"
original = "「あっ……おっぱい見て、勃起してくれたのっ？<emoji=heart04>\u3000あふぅ<emoji=heart04>\u3000じゃ、じゃあ、もっとギューって、寄せて上げちゃうねっ<emoji=heart04>\u3000あっ、はぁんっ<emoji=heart04>」"
translation = "「앗…… 가슴 보고 발기해준 거야?<emoji=heart04> 아후우<emoji=heart04> 그, 그럼 더 꽉 모아줄게<emoji=heart04> 앗, 하앙<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
original = "「ん、んん、んぅっ<emoji=heart04>\u3000いっぱい見てっ<emoji=heart04>\u3000キミだけのおっぱい<emoji=heart04>\u3000いっぱい見て、おち○ちん、気持ちよーく、なってねっ……<emoji=heart04>」"
translation = "「으, 으음, 으음<emoji=heart04> 잔뜩 봐줘<emoji=heart04> 너만의 가슴<emoji=heart04> 잔뜩 보고 자지 기분 좋게 되어줘……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "勃起の手伝いをするみたいに、メルエルが自分の巨乳をわざを脇を締めることで、寄せ上げる。そんなことをされたら──"
translation = "발기를 돕는 것처럼 멜레르가 자신의 거유를 일부러 겨드랑이를 조여 모아 올린다. 그런 짓을 당하면──"

[[dialogue]]
speaker = "メルエル"
original = "「あ、ぁ、あっ！？<emoji=heart04>\u3000ふあ、ぁ、あ、あぁ、ああっ<emoji=heart04>\u3000おち○ちん、激しっ<emoji=heart04>\u3000ん、んんぅ、ぁ、あ、あぁああっ<emoji=heart04>」"
translation = "「아, 아, 앗!? <emoji=heart04> 하아, 아, 아, 아아, 아앗<emoji=heart04> 자지, 격해<emoji=heart04> 으, 으음으, 아, 아, 아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
original = "「奥っ、そんな奥ばっかり、気持ちいいところ、ゴシゴシしちゃだめぇ<emoji=heart04>\u3000ぁ、あ、ぁ、あ、あっ……！<emoji=heart04>」"
translation = "「안쪽, 그런 안쪽만, 기분 좋은 곳 슥슥 하면 안 돼애<emoji=heart04> 아, 아, 아, 아, 앗……!<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
original = "「あ、ぁ、ぁ──イ、イっちゃう、あ、ぁっ──イ、ク、ぅうーっ……！<emoji=heart04>」"
translation = "「아, 아, 아── 가, 가버려, 아, 앗── 가, 간, 다아──!<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
original = "「んんんぅっ<emoji=heart04>\u3000ふう、ふううぅーっ……あ、あぁあ～～～っ……！<emoji=heart04><emoji=heart04>」"
translation = "「으으음으<emoji=heart04> 후우, 후우우── 아, 아아아~~~앗……!<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "メルエルの体がまた快感に震えるが、こちらも火が点いて止まらない。"
translation = "멜레르의 몸이 다시 쾌감에 떨리지만, 이쪽도 불이 붙어 멈추지 않는다."

[[dialogue]]
speaker = "メルエル"
original = "「ひぅ<emoji=heart04>\u3000ひぁ、ぁ、ああっ<emoji=heart04>\u3000イってる時のおち〇ちんっ、あ、あぁ、ふぅ、んんーっ……！<emoji=heart04>\u3000好き、好きぃ、好きっ……！<emoji=heart04>」"
translation = "「히우<emoji=heart04> 히아, 아, 아앗<emoji=heart04> 가고 있을 때의 자지, 아, 아아, 후우, 으음──! <emoji=heart04> 좋아, 좋아해, 좋아해……! <emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
original = "「大好きっ<emoji=heart04>\u3000あぁぁん<emoji=heart04>\u3000好きぃっ……<emoji=heart04>\u3000ああぁ、んん、はぁ、あ、ああっ<emoji=heart04>\u3000んんんん～っ！<emoji=heart04>」"
translation = "「정말 좋아해<emoji=heart04> 아아앙<emoji=heart04> 좋아해……<emoji=heart04> 아아아, 으음, 하아, 아, 아앗<emoji=heart04> 으으으으음~! <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "絶頂の余韻で足のつま先までピンと伸びているのに、メルエルはおっぱいをホールドする自身の両腕を緩めない──それがあまりにいじらくして。"
translation = "절정의 여운으로 발끝까지 꼿꼿이 펴졌는데도 멜레르는 가슴을 홀드한 양팔을 늦추지 않는다── 그게 너무나 기특해서."

[[dialogue]]
speaker = "クロト"
original = "「もっと胸、寄せてみて……！」"
translation = "「가슴 더 모아봐……!」"

[[dialogue]]
speaker = "メルエル"
original = "「は、はいっ<emoji=heart04>\u3000ぎゅーっ……<emoji=heart04>\u3000ぎゅーっ<emoji=heart04>\u3000こんな、感じっ？\u3000あ、あっ<emoji=heart04>\u3000いっぱい見てくれて、嬉しいよぉっ<emoji=heart04>\u3000……あ、あっ<emoji=heart04>」"
translation = "「네, 네에<emoji=heart04> 꽉……<emoji=heart04> 꽉<emoji=heart04> 이런 느낌? 아, 앗<emoji=heart04> 잔뜩 봐줘서 기뻐어<emoji=heart04> ……아, 앗<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
original = "「おち〇ちん、熱い<emoji=heart04>\u3000硬いぃっ<emoji=heart04>\u3000はあぁあっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000赤ちゃんのお部屋、もっと、もっと<emoji=heart04>\u3000トントン、してぇっ<emoji=heart04>」"
translation = "「자지 뜨거워<emoji=heart04> 딱딱해에<emoji=heart04> 하아아앗<emoji=heart04> 으음<emoji=heart04> 아기방 더, 더<emoji=heart04> 똑똑 해줘어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "たわわなおっぱいがあまりに魅力的すぎる。俺は吸い寄せられるみたいに、ピンク色の乳首に吸い付いて腰を振った。"
translation = "탐스러운 가슴이 너무나 매력적이다. 나는 이끌리듯 분홍색 유두를 빨며 허리를 흔들었다."

[[dialogue]]
speaker = "メルエル"
original = "「ひあぁぁああっ！？<emoji=heart04>\u3000おっぱい、チュウチュウっ、あ、あ、あっ<emoji=heart04>\u3000んんんっ<emoji=heart04>\u3000気持ちいいの、いっぱいきてるっ、ふぁあ、ああぁ！<emoji=heart04>」"
translation = "「히아아아아앗!? <emoji=heart04> 가슴 쪽쪽, 아, 아, 앗<emoji=heart04> 으으음<emoji=heart04> 기분 좋은 거 잔뜩 오고 있어, 하아, 아아아! <emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
original = "「おっぱい、好きぃっ<emoji=heart04>\u3000おま○こ、トントン好きぃっ<emoji=heart04>\u3000会長くん、好き、好きぃ、あ、あああ、あぁああっ……！<emoji=heart04>」"
translation = "「가슴 좋아아<emoji=heart04> 보지 똑똑 좋아아<emoji=heart04> 회장군, 좋아, 좋아해, 아, 아아아, 아아아앗……!<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "メルエルの大きなおっぱいを味わい尽くし、息継ぎがてら口を離すと──"
translation = "멜레르의 큰 가슴을 맛본 뒤 숨을 고르기 위해 입을 떼자──"

[[dialogue]]
speaker = "メルエル"
original = "「こ、こっち<emoji=heart04>\u3000反対側も、チュウチュウ、し、してぇっ……？<emoji=heart04>」"
translation = "「이, 이쪽<emoji=heart04> 반대쪽도 쪽쪽 해, 해줘……?<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "吸ってもらえなかったおっぱいを俺の口元へ寄せてこられて、わずかに残っていた理性さえも消し飛んだ。"
translation = "빨아주지 않은 가슴을 내 입가로 가져다 대는 바람에 얼마 남지 않았던 이성마저 날아가 버렸다."

[[dialogue]]
speaker = "メルエル"
original = "「んんんぅうっ<emoji=heart04><emoji=heart04>\u3000あ、あ、あぁああっ<emoji=heart04>\u3000嬉しいっ<emoji=heart04>\u3000おっぱい、たくさん、チュッチュ、して、くれてる──<emoji=heart04>\u3000あ、あ、あぁあ<emoji=heart04>」"
translation = "「으으음으으으<emoji=heart04><emoji=heart04> 아, 아, 아아아앗<emoji=heart04> 기뻐어<emoji=heart04> 가슴 잔뜩 쪽쪽 해주고 있어──<emoji=heart04> 아, 아, 아아아<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
original = "「おっきいおっぱい、好き……？<emoji=heart04>\u3000あは、ならっ……もっと大きく、なりたい、なぁっ<emoji=heart04>\u3000はぁぁぁん<emoji=heart04>」"
translation = "「큰 가슴 좋아해……?<emoji=heart04> 아하, 그럼…… 더 커지고 싶다아<emoji=heart04> 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
original = "「キミの好みの女の子に、なりたいっ<emoji=heart04>\u3000あ、ぁ、あっ！<emoji=heart04>\u3000お嫁さん、だもんっ<emoji=heart04>\u3000奥さんだもんっ……！<emoji=heart04>」"
translation = "「네 취향의 여자가 되고 싶어<emoji=heart04> 아, 아, 앗! <emoji=heart04> 부인인걸<emoji=heart04> 아내인걸……! <emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「──メルエルっ！」"
translation = "「──멜레르!」"

[[dialogue]]
speaker = "unk"
original = "激しくうがちながら、また唇を奪う。"
translation = "격렬하게 파고들며 다시 입술을 빼앗는다."

[[dialogue]]
speaker = "メルエル"
original = "「んぅちゅるうぅっ<emoji=heart04>\u3000れぇっ<emoji=heart04>\u3000んちゅる、ちゅるぅ、んちゅ、ちゅぱ<emoji=heart04>\u3000んれるっ、ちゅる、んちゅぅ、ちゅぅ、ちゅぱっ……！<emoji=heart04>」"
translation = "「음츄릅으으<emoji=heart04> 레에<emoji=heart04> 츄릅, 츄릅, 읍, 츄파<emoji=heart04> 응레에, 츄릅, 읍, 츄우, 츄파……! <emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
original = "「深いキスっ……れぇ、れろ、んちゅる、れちゅるっ<emoji=heart04>\u3000しゅき、んちゅ、しゅきっ……んんぅっ<emoji=heart04>」"
translation = "「깊은 키스…… 레에, 레로, 츄릅, 레츄릅<emoji=heart04> 조아, 읍, 조아해…… 으으음<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスの限界が近い。もうすぐ我慢が切れてしまうから、メルエルの大好きな密着してのディープキスを続けた。"
translation = "페니스의 한계가 가깝다. 곧 참을성이 바닥날 것 같아 멜레르가 좋아하는 밀착 딥 키스를 계속했다."

[[dialogue]]
speaker = "メルエル"
original = "「ふぅう、んんんっ<emoji=heart04>\u3000好き、好きぃっ……ん、んんっ！？<emoji=heart04>\u3000んんぅうーっ……！！\u3000んんぅーっ……ちゅぅ、れぇえ、ちゅる、んちゅっ<emoji=heart04>」"
translation = "「후우우, 으으음<emoji=heart04> 좋아, 좋아해…… 으, 으음!? <emoji=heart04> 으으음으으──!! 으으음── 츄우, 레에에, 츄릅, 읍<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "また軽く絶頂している、俺の恋人。イキやすいえっちな体のアイドルを独占している、そんな状況にピストンが止まらない。"
translation = "다시 가볍게 절정하고 있는 내 연인. 가기 쉬운 야한 몸의 아이돌을 독점하고 있는 상황에 피스톤이 멈추지 않는다."

[[dialogue]]
speaker = "メルエル"
original = "「んれるれるれるっ……れるれるれるれるっ……んちゅぅ、ちゅるっ……んぅ、れろ、んれぇ、れろれろ<emoji=heart04>」"
translation = "「음레로레로레로…… 레로레로레로레로…… 읍, 츄릅…… 응, 레로, 응레에, 레로레로<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
original = "「今日も、んちゅ、最後はっ……れろっ<emoji=heart04>\u3000中に出して、ちゅぅ、くれるっ……？<emoji=heart04>」"
translation = "「오늘도, 읍, 마지막은…… 레로<emoji=heart04> 안에 싸, 츄우, 줄 거야……?<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
original = "「えっちなアイドルの、お嫁さんにっ……んちゅる、ちゅぅ、んちゅんちゅ──びゅーーって、してくれるっ？<emoji=heart04>」"
translation = "「야한 아이돌 부인한테…… 츄릅, 츄우, 읍읍── 뷰우 하고 해줄 거야?<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "外に出したら赤ちゃん、できないだろ──キスの合間に何とかそれだけねじ込んで、口付けを続ける。"
translation = "밖에 싸면 아기 못 만들잖아── 키스 틈틈이 어떻게든 그 말만 끼워 넣고 입맞춤을 계속한다."

[[dialogue]]
speaker = "メルエル"
original = "「ふぅうっ～っ<emoji=heart04>\u3000んちゅぅ、れえぇえ～っ……ちゅるう<emoji=heart04>\u3000うんっ、嬉しいっ<emoji=heart04>\u3000いっぱい、出してっ……んちゅんちゅっ──ぷぁあっ<emoji=heart04>」"
translation = "「후우우~~<emoji=heart04> 읍, 레에에~~ 츄릅<emoji=heart04> 응, 기뻐어<emoji=heart04> 잔뜩 싸줘…… 읍읍── 푸하<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
original = "「あ、あ、あ、あぁ<emoji=heart04>\u3000あっあ、あ、あぁあっ<emoji=heart04>\u3000激しっ、強いっ<emoji=heart04>\u3000あ、っぅ、んん、んんぅーっ！<emoji=heart04>」"
translation = "「아, 아, 아, 아아<emoji=heart04> 앗아, 아, 아아앗<emoji=heart04> 격해, 강해<emoji=heart04> 아, 윽, 으음, 으음으──! <emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
original = "「これ、あん<emoji=heart04>\u3000あん<emoji=heart04>\u3000あぁんっ<emoji=heart04>\u3000キミがイっちゃう、前のやつっ<emoji=heart04>\u3000あ、ぁああ、あ、あ<emoji=heart04>\u3000ふぁああ、あぁあああっ！<emoji=heart04>」"
translation = "「이거, 앙<emoji=heart04> 앙<emoji=heart04> 아앙<emoji=heart04> 네가 가기 전의 그거어<emoji=heart04> 아, 아아아, 아, 아<emoji=heart04> 하아아아, 아아아아앗! <emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
original = "「う、うんっ──出してっ<emoji=heart04>\u3000赤ちゃん欲しいっ、大好きなキミの赤ちゃん、欲しいよおっ<emoji=heart04>\u3000ああぁ、あ、あ、あああっ！<emoji=heart04>」"
translation = "「으, 응── 싸줘<emoji=heart04> 아기 갖고 싶어, 정말 좋아하는 너의 아기 갖고 싶어어<emoji=heart04> 아아아, 아, 아, 아아앗! <emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
original = "「もっと私を、お嫁さんにしてっ、してぇっ<emoji=heart04>\u3000あ、あ、あ、あ、あぁあっ──！<emoji=heart04>\u3000も、もうダメ、イク、イク、イクっ……<emoji=heart04>」"
translation = "「더 나를 부인으로 만들어줘, 해줘어<emoji=heart04> 아, 아, 아, 아, 아아앗──! <emoji=heart04> 이, 이제 안 돼, 가, 간다, 가, 간다……<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
original = "「一緒にイク<emoji=heart04>\u3000イこうっ<emoji=heart04>\u3000一緒にイクっ<emoji=heart04>\u3000あ、あああぁ──イクっ、イクイクイクイクっ……イ──ク──！！<emoji=heart04>」"
translation = "「같이 가<emoji=heart04> 가자<emoji=heart04> 같이 가자<emoji=heart04> 아, 아아아아── 간다, 간다간다간다간다…… 가──안──다──!! <emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
original = "「ぁああっ──あぁあぁああぁぁぁあああ～～～～～～～っ……！！<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>\u3000ぁあああっ、んんんぅう～っ……<emoji=heart04>」"
translation = "「아아앗── 아아아아아아아아아아아아아~~~~~~~~앗……!! <emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04> 아아아앗, 으으음으으~~……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "メルエルが全身を震わせて絶頂し、膣内のペニスがこれでもかと揉みしだかれる。"
translation = "멜레르가 전신을 떨며 절정하고 질 내부의 페니스가 이보다 더할 수 없을 정도로 조여진다."

[[dialogue]]
speaker = "メルエル"
original = "「んんぅうっ！<emoji=heart04>\u3000ふぇあぁああっ！？<emoji=heart04>\u3000すっごい、出てるっ……まだ出てる、ぅうう～っ……！<emoji=heart04>\u3000んん、んん、んんーっ<emoji=heart04>」"
translation = "「으으음으으! <emoji=heart04> 훼아아아앗!? <emoji=heart04> 엄청 나오고 있어…… 아직 나오고 있어어어~~……! <emoji=heart04> 으음, 으음, 으음──<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "最奥で精液を撃ち放つたび、メルエルは本当に幸せそうに、嬉しそうに、体を何度も何度も痙攣させて……"
translation = "가장 깊은 곳에서 정액을 쏘아낼 때마다 멜레르는 정말 행복한 듯이, 기쁜 듯이 몸을 몇 번이고 경련시키며……"

[[dialogue]]
speaker = "メルエル"
original = "「はあぁーっ……はぁあぁあーっ……ふぅうーっ<emoji=heart04>\u3000えへ、いっぱい、注いでもらっちゃったぁ<emoji=heart04>\u3000はあぁっ……んんんっ<emoji=heart04>」"
translation = "「하아아── 하아아아── 후우우──<emoji=heart04> 에헤, 잔뜩 부어 받았어어<emoji=heart04> 하아아…… 으으음<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "精魂尽き果てるような射精を終えたペニスを引き抜くと、入りきらなかった白濁が次から次へと漏れ出てきた。"
translation = "정혼이 다할 듯한 사정을 마치고 페니스를 뽑아내자 다 들어가지 못한 백탁액이 줄줄 새어 나왔다."

[[dialogue]]
speaker = "メルエル"
original = "「赤ちゃん……できた、かなぁ？<emoji=heart04>」"
translation = "「아기…… 생겼으려나?<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「できてたら……嬉しいな」"
translation = "「생겼으면…… 좋겠네.」"

[[dialogue]]
speaker = "メルエル"
original = "「うんっ……私も<emoji=heart04>\u3000えへへっ<emoji=heart04>」"
translation = "「응…… 나도<emoji=heart04> 에헤헤<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "激しいセックスで火照ったまま、メルエルは微笑んで。"
translation = "격렬한 섹스로 달아오른 채 멜레르는 미소 지으며."

[[dialogue]]
speaker = "メルエル"
original = "「あ、そうだっ。またアイドルエッチしたくなったら……遠慮なく言ってね？」"
translation = "「아, 맞다. 또 아이돌 섹스하고 싶어지면…… 사양 말고 말해줘?」"

[[dialogue]]
speaker = "メルエル"
original = "「私はこれまでも、これからも……ず～～っと、キミだけのガチ恋アイドルだもん<emoji=heart04>」"
translation = "「난 지금까지도, 앞으로도…… 어~~언제나 너만의 찐팬 아이돌인걸<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
original = "「──うん<emoji=heart04>\u3000大好きだよ……旦那様<emoji=heart04>」"
translation = "「──응<emoji=heart04> 사랑해…… 남편님<emoji=heart04>」"

