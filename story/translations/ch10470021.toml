[[dialogue]]
speaker = "unk"
original = "第１話,隠しきれない恋心,P"
translation = "제1화, 숨길 수 없는 연심"

[[dialogue]]
speaker = "unk"
original = "幼なじみであるメルエルと再会し、恋人となり──指輪を贈ったあの日からしばらくの月日が流れた。"
translation = "소꿉친구인 메르엘과 재회하여 연인이 되고── 반지를 선물했던 그날로부터 얼마간의 세월이 흘렀다."

[[dialogue]]
speaker = "unk"
original = "彼女との交際は順調そのものだ。今日は日曜日だが、わざわざ俺の家まで昼食を作りにやって来てくれる約束になっている。"
translation = "그녀와의 교제는 순조롭기 그지없다. 오늘은 일요일이지만, 일부러 내 집까지 점심을 만들러 와주기로 약속되어 있다."

[[dialogue]]
speaker = "unk"
original = "出迎えなきゃと思うのだけど、日付けが変わるまで星徒会の仕事を片付けていた手前……非常に眠い。"
translation = "마중 나가야 한다고 생각하지만, 날짜가 바뀔 때까지 성도회 업무를 처리하느라…… 몹시 졸리다."

[[dialogue]]
speaker = "unk"
original = "ちょっと昼寝してもいいかな？\u3000メルエルには合鍵を渡しているし、困らせることはないだろう──"
translation = "잠깐 낮잠 자도 될까? 메르엘에게는 여분의 열쇠를 줬으니 곤란하게 하지는 않겠지──"

[[dialogue]]
speaker = "メルエル"
original = "「会長くん、お待たせ！\u3000えへへ、キミの好きなもの、いっぱい買ってきたよ～♪」"
translation = "「회장군, 기다렸지! 에헤헤, 네가 좋아하는 거 잔뜩 사 왔어~♪」"

[[dialogue]]
speaker = "メルエル"
original = "「今日も腕によりをかけてお料理を──って。あれれ？\u3000ソファに寝転んで……お昼寝しちゃってる？」"
translation = "「오늘도 솜씨를 발휘해서 요리를── 어라라? 소파에 누워서…… 낮잠 자고 있어?」"

[[dialogue]]
speaker = "メルエル"
original = "「またお仕事で夜更かししてたのかなぁ。あんまり無理してほしくないけど、星徒会長だもん。大変だよね……」"
translation = "「또 일하느라 밤샜나 보네. 너무 무리하지 않았으면 좋겠지만 성도회장이니까. 힘들겠지……」"

[[dialogue]]
speaker = "メルエル"
original = "「よしっ。それじゃあ私はとびっきり美味しいご飯を作ってあげないとだよね！」"
translation = "「좋아. 그럼 나는 아주 맛있는 밥을 만들어 줘야겠네!」"

[[dialogue]]
speaker = "メルエル"
original = "「でも、その前に……えへへ<emoji=heart04>\u3000ちょっとだけ寝顔、近くで見ちゃおっと……<emoji=heart04>」"
translation = "「하지만 그전에…… 에헤헤<emoji=heart04> 조금만 자는 얼굴, 가까이서 봐야지……<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
original = "「じ～～～っ……<emoji=heart04>」"
translation = "「지~~~~익……<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
original = "「うぅーっ、やっぱり格好いいよぉ……！\u3000会長くんとお付き合いできてるなんて、本当に夢みたい♪\u3000今でも信じられないよ～<emoji=heart04>」"
translation = "「으으윽, 역시 잘생겼어……! 회장군이랑 사귀고 있다니 정말 꿈만 같아♪ 지금도 믿기지 않아~<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
original = "「ちょっとイタズラ、しちゃったりして……んふふ♪」"
translation = "「살짝 장난 좀 쳐볼까나…… 음후후♪」"

[[dialogue]]
speaker = "メルエル"
original = "「つーん、つんっ。わ、ほっぺ柔らか～い<emoji=heart04>\u3000えへへー……つんつん、つーんっ♪」"
translation = "「콕, 콕. 와, 볼 말랑말랑해~<emoji=heart04> 에헤헤~…… 콕콕, 코옥♪」"

[[dialogue]]
speaker = "unk"
original = "すや……すや……"
translation = "쿨…… 쿨……"

[[dialogue]]
speaker = "メルエル"
original = "「あ、もぞもぞしてる……可愛い♪\u3000猫ちゃんみたい……」"
translation = "「아, 꿈틀거리고 있어…… 귀여워♪ 고양이 같아……」"

[[dialogue]]
speaker = "メルエル"
original = "「わぁ、髪の毛もさらさらー。ふふ～<emoji=heart04>\u3000ナデナデしてると幸せな気分になっちゃうよぅ」"
translation = "「와아, 머리카락도 보들보들. 후후~<emoji=heart04> 쓰다듬고 있으면 행복한 기분이 들어버려어.」"

[[dialogue]]
speaker = "メルエル"
original = "「キミもよく私の髪、撫でてくれるよね。私もお返しだよー、なでなで、なでなで～<emoji=heart04>」"
translation = "「너도 자주 내 머리 쓰다듬어 주지. 나도 보답이야~, 쓰담쓰담, 쓰담쓰담~<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
original = "「──あ、おでこ出すと、雰囲気がかなり変わるかも……新発見……！」"
translation = "「──아, 이마를 드러내니까 분위기가 꽤 변할지도…… 새로운 발견……!」"

[[dialogue]]
speaker = "unk"
original = "すや……"
translation = "쿨……"

[[dialogue]]
speaker = "メルエル"
original = "「ヘアピンでこーやって、前髪を分けて、まとめて……わぁ！\u3000ちょっと可愛い感じの会長くんになっちゃった……！」"
translation = "「머리핀으로 이렇게 앞머리를 나누어서 묶으면…… 와아! 조금 귀여운 느낌의 회장군이 되어버렸어……!」"

[[dialogue]]
speaker = "メルエル"
original = "「写真、撮っちゃおっかな……！？\u3000うん、今がチャンス……！」"
translation = "「사진 찍어버릴까나……!? 응, 지금이 기회야……!」"

[[dialogue]]
speaker = "メルエル"
original = "「猫ちゃん撮影用の、音のしないアプリで……起こさないようにー……ぱしゃり♪」"
translation = "「고양이 촬영용 소리 안 나는 앱으로…… 안 깨게── 찰칵♪」"

[[dialogue]]
speaker = "unk"
original = "…………"
translation = "…………"

[[dialogue]]
speaker = "メルエル"
original = "「わ～～～～<emoji=heart04>\u3000会長くんコレクションが増えちゃった。えへへ、嬉しいな～っ……<emoji=heart04>」"
translation = "「와~~~~<emoji=heart04> 회장군 컬렉션이 늘어버렸어. 에헤헤, 기쁘다~……<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
original = "「これだけぐっすり寝てるなら……こっそりチューしても……バレないよね？\u3000えへへ、ほっぺにー……」"
translation = "「이렇게 푹 자고 있다면…… 몰래 뽀뽀해도…… 안 들키겠지? 에헤헤, 볼에──……」"

[[dialogue]]
speaker = "メルエル"
original = "「んーっ……ちゅ<emoji=heart04>\u3000ちゅっ<emoji=heart04>\u3000んちゅ、ちゅぅっ<emoji=heart04>\u3000えへへ、好き<emoji=heart04>\u3000会長くん……ちゅっ<emoji=heart04>\u3000好きぃっ<emoji=heart04>」"
translation = "「음~…… 쪽<emoji=heart04> 쪽<emoji=heart04> 음쪽, 쪼옥<emoji=heart04> 에헤헤, 좋아해<emoji=heart04> 회장군…… 쪽<emoji=heart04> 좋아해애<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "（起きるタイミングを逃した！！）"
translation = "(일어날 타이밍을 놓쳤다!!)"

[[dialogue]]
speaker = "unk"
original = "（……どうしよう）"
translation = "(……어떡하지)"

[[dialogue]]
speaker = "メルエル"
original = "「お昼ご飯、早く作ってあげたいけど……んちゅ<emoji=heart04>\u3000キミのこんなに可愛い寝顔見ちゃったら、無理だよ～……ちゅっ<emoji=heart04>」"
translation = "「점심밥 빨리 만들어 주고 싶지만…… 음쪽<emoji=heart04> 네 이런 귀여운 자는 얼굴을 봐버리면 무리야아~…… 쪽<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
original = "「えへへ～……キミからされるキスも好きだけど。ちゅ、ちゅっ<emoji=heart04>\u3000こうやって眠ってるキミに、ちゅーするのも幸せ<emoji=heart04>」"
translation = "「에헤헤~…… 너한테 받는 키스도 좋지만. 쪽, 쪽<emoji=heart04> 이렇게 잠든 너에게 뽀뽀하는 것도 행복해<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
original = "「朝起こしに来る時にいつもしてる『こっそりチュー』、お昼もできるなんて思わなかったな～<emoji=heart04>」"
translation = "「아침에 깨우러 올 때 항상 하는 『몰래 뽀뽀』를 점심에도 할 수 있을 줄은 몰랐네~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "（ぜんぜん知らなかった！！）"
translation = "(전혀 몰랐어!!)"

[[dialogue]]
speaker = "unk"
original = "（……毎朝してたの！？）"
translation = "(……매일 아침 했다고!?)"

[[dialogue]]
speaker = "メルエル"
original = "「えへーっ……お耳の近くで囁きー……<emoji=heart04>\u3000好～き～……<emoji=heart04>\u3000キミのことー、だ～い好きー<emoji=heart04>\u3000好き～っ<emoji=heart04>」"
translation = "「에헤~…… 귀 근처에서 속삭이기──<emoji=heart04> 조~아~해~……<emoji=heart04> 너를~ 정~말 좋아해~<emoji=heart04> 좋아해~<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
original = "「キミが起きてる時は流石に恥ずかしくてできないから楽しいな～♪\u3000あ、そうだっ……将来の練習、こっそりしておこうかな？」"
translation = "「네가 깨어있을 때는 역시 부끄러워서 못 하니까 즐겁네~♪ 아, 맞다…… 미래 연습, 몰래 해둘까?」"

[[dialogue]]
speaker = "メルエル"
original = "「いざって時に恥ずかしくなっちゃいそうだし……うん。やっちゃおう……<emoji=heart04>」"
translation = "「정작 그때가 되면 부끄러워질 것 같고…… 응. 해버리자……<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
original = "「大好きだよー……あ・な・たー……<emoji=heart04>」"
translation = "「사랑해~…… 여·보·야~……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "～～～～～～っ！？"
translation = "~~~~~~~~윽!?"

[[dialogue]]
speaker = "メルエル"
original = "「あ、あれっ？\u3000会長くんのお耳、どんどん赤く……」"
translation = "「아, 어라? 회장군 귀가 점점 빨갛게……」"

[[dialogue]]
speaker = "メルエル"
original = "「もっ──もしかして、会長くん起きてるのー！？」"
translation = "「서── 설마, 회장군 깨어있는 거야!?」"

[[dialogue]]
speaker = "メルエル"
original = "「会長くんっ、そのー……どこから、起きてました……？」"
translation = "「회장군, 그── 어디서부터 깨어있었어……?」"

[[dialogue]]
speaker = "unk"
original = "頬をつつかれてるあたりから……"
translation = "볼 찔리고 있을 때부터……"

[[dialogue]]
speaker = "メルエル"
original = "「それ最初からだよ！？\u3000あううぅっ……恥ずかしいよぉっ……！」"
translation = "「그거 처음부터였다고!? 아우우으…… 부끄러워어……!」"

[[dialogue]]
speaker = "メルエル"
original = "「ご、ごめんね？\u3000会長くんが寝てる時、私いっつもああいうこと、してるの……」"
translation = "「미, 미안해? 회장군이 자고 있을 때, 나 언제나 그런 짓, 하고 있어……」"

[[dialogue]]
speaker = "メルエル"
original = "「『会長くんタイム』って名前を付けて……お写真もいっぱい……」"
translation = "「『회장군 타임』이라고 이름을 붙여서…… 사진도 잔뜩……」"

[[dialogue]]
speaker = "メルエル"
original = "「やっぱり写真、消した方がいい？\u3000無断でコレクションしちゃってたし……」"
translation = "「역시 사진, 지우는 게 좋을까? 무단으로 컬렉션 해버렸고……」"

[[dialogue]]
speaker = "メルエル"
original = "「──全然かまわない？\u3000よ、よかったぁ～……<emoji=heart04>\u3000恥ずかしいからダメって言われたら、どうしようかと思ったよ～」"
translation = "「──전혀 상관없어? 다, 다행이다~……<emoji=heart04> 부끄러우니까 안 된다고 하면 어쩌나 했어~」"

[[dialogue]]
speaker = "メルエル"
original = "「……え？\u3000今だから報告したいことがあるの？\u3000う、うん、なあに？」"
translation = "「……에? 지금이니까 보고하고 싶은 게 있다고? 으, 응, 뭔데?」"

[[dialogue]]
speaker = "unk"
original = "メルエルの寝顔の写真"
translation = "멜레르의 자는 얼굴 사진"

[[dialogue]]
speaker = "unk"
original = "実は俺も持ってるんだよね……"
translation = "사실 나도 가지고 있거든……"

[[dialogue]]
speaker = "メルエル"
original = "「あ、そうなんだ。お互い様だったんだね！」"
translation = "「아, 그렇구나. 피차일반이었네!」"

[[dialogue]]
speaker = "メルエル"
original = "「──って！？\u3000い、いつ撮ったのっ？\u3000公園のベンチで、猫ちゃん抱っこして眠ってるところ……！？」"
translation = "「──랄까!? 어, 언제 찍은 거야? 공원 벤치에서 고양이 안고 잠들었을 때……!?」"

[[dialogue]]
speaker = "メルエル"
original = "「わわ、私っ、変な顔してなかった！？\u3000おかしな寝言とか……！」"
translation = "「와와, 나, 이상한 표정 짓고 있지 않았어!? 이상한 잠꼬대라든가……!」"

[[dialogue]]
speaker = "メルエル"
original = "「あうぅっ……消してってお願い、流石にできない……！\u3000私もキミに同じことしてるし……！」"
translation = "「아우으…… 지워달라고 부탁하는 건 역시 못 하겠어……! 나도 너한테 똑같은 짓을 하고 있고……!」"

[[dialogue]]
speaker = "メルエル"
original = "「ね、念のため写真だけでも、見せてもらえる……？」"
translation = "「마, 만약을 위해 사진만이라도 보여줄 수 있을까……?」"

[[dialogue]]
speaker = "メルエル"
original = "「──って、ふぇえ！？\u3000私、おくちからよだれ垂れてる！\u3000ダメなやつだよ、これぇっ！？」"
translation = "「──랄까, 훼에!? 나, 입에서 침 흘리고 있어! 이건 안 되는 거야아!?」"

[[dialogue]]
speaker = "メルエル"
original = "「可愛いから消さない……？\u3000そ、そんなぁ～っ！？」"
translation = "「귀여우니까 안 지울 거야……? 그, 그럴 수가아~!?」"

[[dialogue]]
speaker = "unk"
original = "お互いこっそりと相手の寝顔をコレクションしていたことがわかった休日の午後。"
translation = "서로 몰래 상대의 자는 얼굴을 컬렉션하고 있었다는 것을 알게 된 휴일 오후."

[[dialogue]]
speaker = "unk"
original = "俺とメルエルの交際は、こんな風にとても順調なのだった──"
translation = "나와 멜레르의 교제는 이런 식으로 매우 순조로웠다──"

