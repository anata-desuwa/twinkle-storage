[[dialogue]]
speaker = "unk"
original = "第４話,恋か、仕事か,P"
translation = "제4화, 사랑인가, 일인가, P"

[[dialogue]]
speaker = "女生徒Ａ"
original = "「ねぇ、聞いた？\u3000紅明ちゃんが今度、ドラマの主演やるかもって噂！」"
translation = "「저기, 들었어? 코우메이짱이 이번에 드라마 주연을 맡을지도 모른다는 소문!」"

[[dialogue]]
speaker = "女生徒Ｂ"
original = "「聞いた聞いた！\u3000漫画原作のでしょ？\u3000人気作だし、本当だったらすごいよね！\u3000でも、作中１番のキスシーンどうするんだろ～？\u3000本当にしちゃうのかな～！？」"
translation = "「들었어, 들었어! 만화 원작이라며? 인기작이고, 진짜라면 대단하겠지! 하지만 작중 최고의 키스신은 어떻게 하려나~? 진짜로 하려나~!?」"

[[dialogue]]
speaker = "unk"
original = "最近、ＳＮＳでリークがあったとかで、学園内でそんな噂が話題となっていた。男性役は人気のイケメン俳優らしく、俺は正直、噂を耳にする度に複雑な気持ちになる。"
translation = "최근 SNS에서 유출이 있었다며 학원 내에서 그런 소문이 화제가 되고 있었다. 남자 주인공 역은 인기 꽃미남 배우라기에, 나는 솔직히 소문을 들을 때마다 복잡한 기분이 든다."

[[dialogue]]
speaker = "紅明"
original = "「ダーリン、おっす～☆」"
translation = "「달링, 안녕~☆」"

[[dialogue]]
speaker = "unk"
original = "と、廊下を歩いていると、当の本人と鉢合わせる。"
translation = "그때 복도를 걷다가 당사자와 딱 마주쳤다."

[[dialogue]]
speaker = "紅明"
original = "「あのさ、ダーリン、今日の放課後は暇？」"
translation = "「저기 말야, 달링, 오늘 방과 후에 한가해?」"

[[dialogue]]
speaker = "紅明"
original = "「よかったら、アタシと気晴らしに――遊園地デートでもしない？」"
translation = "「괜찮다면 나랑 기분 전환 삼아── 유원지 데이트라도 하지 않을래?」"

[[dialogue]]
speaker = "紅明"
original = "「ダーリン、一番最初に観覧車乗ろっか♪」"
translation = "「달링, 제일 먼저 관람차 타자♪」"

[[dialogue]]
speaker = "unk"
original = "紅明からそう提案されて、俺たちは２人で<b>向き合うように</b>、観覧車の席に座ることになった――"
translation = "코우메이에게 그런 제안을 받아, 우리 둘은 <b>마주</b> <b>보는</b> <b>식으로</b> 관람차 좌석에 앉게 되었다──"

[[dialogue]]
speaker = "紅明"
original = "「……ダーリン、ドラマの噂、聞いた？」"
translation = "「……달링, 드라마 소문 들었어?」"

[[dialogue]]
speaker = "unk"
original = "俺が頷いてみせると──"
translation = "내가 고개를 끄덕이자──"

[[dialogue]]
speaker = "紅明"
original = "「そっか……。その噂、実は本当なんだよね」"
translation = "「그렇구나……. 그 소문, 사실은 진짜야」"

[[dialogue]]
speaker = "紅明"
original = "「アタシ……タレントとして、テレビを観てくれるヒトたちに自分の元気を分けて、笑顔にできたらっていつも思ってるんだ」"
translation = "「나…… 탤런트로서 TV를 봐주는 사람들에게 내 활기를 나눠주고, 웃게 만들 수 있으면 좋겠다고 항상 생각하거든」"

[[dialogue]]
speaker = "紅明"
original = "「だからアタシ……ドラマの主演は、断るつもりなんだよね」"
translation = "「그래서 나…… 드라마 주연은 거절할 생각이야」"

[[dialogue]]
speaker = "unk"
original = "え……？"
translation = "에……?"

[[dialogue]]
speaker = "紅明"
original = "「今のアタシじゃ、本気で演じられないから」"
translation = "「지금의 나로서는 진심으로 연기할 수 없으니까」"

[[dialogue]]
speaker = "紅明"
original = "「だって、それが大きな仕事だとしても、アタシ、ダーリン以外とはキスしたくないもん」"
translation = "「그게 아무리 큰 일이라고 해도, 나, 달링 말고 다른 사람이랑은 키스하고 싶지 않은걸」"

[[dialogue]]
speaker = "紅明"
original = "「だからダーリン、そんな不安そうな顔しなくていいっしょ♪\u3000アタシが何よりも一番見たいのは、ダーリンの笑顔なんだからさ☆」"
translation = "「그러니까 달링, 그렇게 불안한 표정 짓지 않아도 된다구♪ 내가 무엇보다 가장 보고 싶은 건 달링의 미소니까☆」"

[[dialogue]]
speaker = "unk"
original = "そう言いながら、俺の大好きな元気な笑顔で、ウィンクしてみせる紅明。"
translation = "그렇게 말하며 내가 제일 좋아하는 활기찬 미소로 윙크해 보이는 코우메이."

[[dialogue]]
speaker = "unk"
original = "先程まで曇っていた心があっという間に、すっと晴れて行く。"
translation = "방금 전까지 흐렸던 마음이 순식간에 맑게 갠다."

[[dialogue]]
speaker = "紅明"
original = "「あ～あ、ダーリンが相手役ならアタシ、めっちゃすごいヒロイン演じてみせちゃうんだけどね～☆」"
translation = "「아~아, 달링이 상대역이라면 나, 정말 대단한 히로인을 연기해 보일 텐데 말야~☆」"

[[dialogue]]
speaker = "紅明"
original = "「こうなったら、監督に頼んでみよっか！\u3000配役を変更してくれるなら、元気に全力ＯＫしちゃうぜって！\u3000うしし♪」"
translation = "「이렇게 된 이상 감독님한테 부탁해 볼까! 배역을 바꿔준다면 기운차게 전력으로 OK 하겠다고! 우시시♪」"

[[dialogue]]
speaker = "unk"
original = "もしもの時は――"
translation = "만약의 상황에는──"

[[dialogue]]
speaker = "紅明"
original = "「ん？\u3000――アタシの為にどんな役でもやってみせるって？」"
translation = "「응? ──나를 위해서라면 어떤 역이라도 해 보이겠다고?」"

[[dialogue]]
speaker = "紅明"
original = "「んモー<emoji=heart04>\u3000ダーリンってば、冗談だって、冗談☆」"
translation = "「음모~<emoji=heart04> 달링도 참, 농담이라니까, 농담☆」"

[[dialogue]]
speaker = "紅明"
original = "「でも……ふふっ♪\u3000ダーリンが本気で言ってくれたっていうのは、顔を見ればわかるよ」"
translation = "「하지만…… 후훗♪ 달링이 진심으로 말해줬다는 건 얼굴을 보면 알 수 있어」"

[[dialogue]]
speaker = "紅明"
original = "「アタシのことを想ってくれて……すごく嬉しい<emoji=heart04>」"
translation = "「나를 생각해 줘서…… 정말 기뻐<emoji=heart04>」"

[[dialogue]]
speaker = "紅明"
original = "「ねぇ、ダーリン……そっちに行ってもいい？」"
translation = "「저기, 달링…… 그쪽으로 가도 돼?」"

[[dialogue]]
speaker = "unk"
original = "俺が頷くと、彼女は向かいの席から、隣へと移動してくる。"
translation = "내가 끄덕이자 그녀는 맞은편 좌석에서 옆자리로 이동해 온다."

[[dialogue]]
speaker = "紅明"
original = "「……キス、してもいい？」"
translation = "「……키스, 해도 돼?」"

[[dialogue]]
speaker = "紅明"
original = "「あっ……<emoji=heart04>\u3000んっ……ちゅっ<emoji=heart04>」"
translation = "「앗……<emoji=heart04> 응…… 쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "紅明がいつもより可愛くて、俺はつい気持ちがはやって、唇を奪うようにキスしてしまう。"
translation = "코우메이가 평소보다 귀여워서 나는 그만 마음이 앞서 입술을 빼앗듯 키스해 버린다."

[[dialogue]]
speaker = "紅明"
original = "「んちゅっ……<emoji=heart04>\u3000ちゅっ、ちゅっ<emoji=heart04>」"
translation = "「응츄……<emoji=heart04> 쪽, 쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はキスだけでは足りなくて、彼女の柔らかな体を抱き締める。"
translation = "나는 키스만으로는 부족해서 그녀의 부드러운 몸을 꽉 껴안는다."

[[dialogue]]
speaker = "紅明"
original = "「んっ……<emoji=heart04>\u3000はあぁっ……ダーリン<emoji=heart04>\u3000ちゅっ……んちゅっ<emoji=heart04>」"
translation = "「응……<emoji=heart04> 하아아…… 달링<emoji=heart04> 쪽…… 응츄……<emoji=heart04>」"

[[dialogue]]
speaker = "紅明"
original = "「んふぅ<emoji=heart04>\u3000そういえば、ダーリン……ドラマの原作漫画、読んだことある……？\u3000そのキスシーンも、実は場所が遊園地の観覧車なんだ」"
translation = "「응후<emoji=heart04> 그러고 보니 달링…… 드라마 원작 만화 읽어본 적 있어……? 그 키스신도 사실 장소가 유원지 관람차야」"

[[dialogue]]
speaker = "紅明"
original = "「ただ原作より、アタシたちの方がいっぱい、しちゃってるけど……<emoji=heart04>\u3000ちゅっ、ちゅっ……<emoji=heart04>」"
translation = "「다만 원작보다 우리 쪽이 훨씬 많이 해버리고 있지만……<emoji=heart04> 쪽, 쪽……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それから熱くなってしまった体を冷ましながら、俺たちは観覧車から降りる。"
translation = "그 후 뜨거워진 몸을 식히며 우리는 관람차에서 내린다."

[[dialogue]]
speaker = "unk"
original = "紅明はすっきりと元気な笑顔を浮かべながら……"
translation = "코우메이는 개운하고 활기찬 미소를 지으며……"

[[dialogue]]
speaker = "紅明"
original = "「ん～☆\u3000ダーリンといっぱいラブラブちゅっちゅして、元気出た～～！！」"
translation = "「음~☆ 달링이랑 잔뜩 러브러브 쪽쪽 해서 기운 났다~~!!」"

[[dialogue]]
speaker = "unk"
original = "ちょっ、紅明！\u3000しーっ！\u3000しーっ！"
translation = "잠깐, 코우메이! 쉿! 쉿!"

[[dialogue]]
speaker = "紅明"
original = "「おっといけない☆」"
translation = "「앗, 이런☆」"

[[dialogue]]
speaker = "紅明"
original = "「でも、気持ちも元気に晴れたし、せっかく遊園地に来たんだから、この後は思いっきりデートを楽しむっしょ、ダーリン♪」"
translation = "「하지만 기분도 상쾌하게 풀렸고, 기왕 유원지에 왔으니까 이다음엔 마음껏 데이트를 즐기자구, 달링♪」"

[[dialogue]]
speaker = "unk"
original = "そう言って、紅明が俺の腕に抱き着いてきて、手を恋人繋ぎにする。"
translation = "그렇게 말하며 코우메이가 내 팔에 매달려 손을 연인끼리 잡는 방식으로 깍지 낀다."

[[dialogue]]
speaker = "紅明"
original = "「あっ……そうだ。キスに夢中になって、言い忘れてた♪」"
translation = "「앗…… 맞다. 키스에 열중하느라 말하는 걸 잊었네♪」"

[[dialogue]]
speaker = "unk"
original = "彼女は耳元で、こっそり囁く。"
translation = "그녀는 귓가에 살며시 속삭인다."

[[dialogue]]
speaker = "紅明"
original = "「ダーリン――好きだよ<emoji=heart04>」"
translation = "「달링── 좋아해<emoji=heart04>」"

[[dialogue]]
speaker = "紅明"
original = "「アタシ、いつもお茶らけながら言っちゃうけど……本当に本当に、ダーリンのこと大好きだから<emoji=heart04>」"
translation = "「나, 항상 장난치듯 말해버리지만…… 정말 정말로 달링을 너무 좋아하니까<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺も、大好きだ"
translation = "나도, 정말 좋아해"

[[dialogue]]
speaker = "紅明"
original = "「ふふっ……ちゅっ<emoji=heart04>」"
translation = "「후훗…… 쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "もう１度、唇にキスをされる。"
translation = "다시 한번 입술에 키스를 받는다."

[[dialogue]]
speaker = "unk"
original = "一瞬のことだったので、特に周りから注目されずに済んだが――"
translation = "순식간에 일어난 일이라 딱히 주변의 주목을 받지는 않았지만──"

[[dialogue]]
speaker = "紅明"
original = "「……えへへへへぇ<emoji=heart04>\u3000我慢できずに、しちゃったっしょ<emoji=heart04>」"
translation = "「……에헤헤헤헤<emoji=heart04> 참지 못하고 해버렸다구<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "後日、紅明は断り文句として監督に相手役の男性キャスト交代を突き付けたらしい。"
translation = "며칠 후, 코우메이는 거절의 조건으로 감독에게 상대역 남자 배우 교체를 요구했다고 한다."

[[dialogue]]
speaker = "unk"
original = "……が、それがなんと受け入れられてしまい、俺が地上波のテレビドラマに出演することになってしまうのは、また別の話。"
translation = "……그런데 그것이 어찌 된 일인지 받아들여져서, 내가 지상파 TV 드라마에 출연하게 되는 것은 또 다른 이야기."

