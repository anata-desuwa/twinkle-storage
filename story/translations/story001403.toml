[[dialogue]]
speaker = "unk"
original = "リップルが管理するリゾート結界、そのプライベートビーチへの入り口は星徒会室にある。"
translation = "리플이 관리하는 리조트 결계, 그 프라이빗 비치로 향하는 입구는 성도회실에 있다."

[[dialogue]]
speaker = "unk"
original = "よって、ゲートをくぐったその先にはもう、青い海と白い砂浜が広がっていた。"
translation = "그리하여 게이트를 지나친 그 앞에는 이미 푸른 바다와 하얀 모래사장이 펼쳐져 있었다."

[[dialogue]]
speaker = "セドナ"
original = "「古代天使の生き残りであるリップル……話には聞いていたが、とんでもない力の持ち主だな」"
translation = "「고대 천사의 생존자인 리플…… 이야기는 들었다만 대단한 힘의 소유자로군.」"

[[dialogue]]
speaker = "アイリーン"
original = "「こんなすごい結界を作り出せるヒトが、魔女以外に存在するんですね。驚きです……」"
translation = "「이렇게 멋진 결계를 만들어낼 수 있는 분이 마녀 말고도 존재하다니 놀랍네요……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふっふっふ♪\u3000どう、すごいでしょう？」"
translation = "「훗훗훗♪ 어때, 대단하지?」"

[[dialogue]]
speaker = "アナ"
original = "「この砂浜は、実際の場所をそのままコピーして具現化させているそうです」"
translation = "「이 모래사장은 실제 장소를 그대로 복제해 구현화시킨 것이라고 합니다.」"

[[dialogue]]
speaker = "セドナ"
original = "「興味は尽きないが……今日の本題はそれではない」"
translation = "「흥미는 끝이 없다만…… 오늘 본론은 그것이 아니다.」"

[[dialogue]]
speaker = "リーリア"
original = "「そうですよ、そういう話は一旦置いておきましょう」"
translation = "「맞아요, 그런 이야기는 일단 접어두자고요.」"

[[dialogue]]
speaker = "セドナ"
original = "「では早速、我々の開発した水着形体の戦闘服をご覧いただこう」"
translation = "「그럼 당장 우리가 개발한 수영복 형태의 전투복을 보여주도록 하지.」"

[[dialogue]]
speaker = "リーリア"
original = "「はーい♪\u3000それじゃ、まずは私からいきますね<emoji=heart04>」"
translation = "「네~♪ 그럼 우선 저부터 갈게요<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
original = "「どうですかセンパイ、マジカル可愛くないですかぁ～？<emoji=heart04>」"
translation = "「어떠신가요 선배, 매지컬하게 귀엽지 않나요~?<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "マ、マジカル可愛い……"
translation = "매, 매지컬하게 귀여워……"

[[dialogue]]
speaker = "リーリア"
original = "「もー、ガチの反応じゃないですか～<emoji=heart04>\u3000そんなのされたら、私だって恥ずかしくなっちゃいますよぉ」"
translation = "「정말, 찐 반응이잖아요~<emoji=heart04> 그렇게 나오시면 저까지 부끄러워져 버린다고요.」"

[[dialogue]]
speaker = "unk"
original = "いや、でも本当に可愛いよ"
translation = "아니, 하지만 정말 귀여워"

[[dialogue]]
speaker = "リーリア"
original = "「あ、えへへぇ。……ありがとう、ございます」"
translation = "「아, 에헤헤. ……고맙습니다.」"

[[dialogue]]
speaker = "アイリーン"
original = "「ん～、いいなぁ～。私も早く水着フォームが欲しいよ……」"
translation = "「음~ 좋겠다~. 저도 빨리 수영복 폼이 갖고 싶어요……」"

[[dialogue]]
speaker = "マトイ"
original = "「アイリーンさんはまだなの？」"
translation = "「아이린 씨는 아직이야?」"

[[dialogue]]
speaker = "アイリーン"
original = "「はい、長官とリーリアさんの水着だけが完成している状態ですね」"
translation = "「네, 장관님이랑 리리아 씨 수영복만 완성된 상태예요.」"

[[dialogue]]
speaker = "アイリーン"
original = "「それで今回は水着を持っている２人と、比較的手すきだった私が参加することになったんです」"
translation = "「그래서 이번엔 수영복을 가진 두 분이랑 비교적 한가했던 제가 참가하게 됐어요.」"

[[dialogue]]
speaker = "マトイ"
original = "「そっか～。でもリーリアさんの水着を見てると完成が楽しみだね～」"
translation = "「그렇구나~ 하지만 리리아 씨 수영복을 보고 있으니 완성이 기대되네~」"

[[dialogue]]
speaker = "アイリーン"
original = "「はいっ♪」"
translation = "「네!♪」"

[[dialogue]]
speaker = "セドナ"
original = "「ん……待て、リーリア。こちらを向け」"
translation = "「음…… 기다려라, 리리아. 이쪽을 봐.」"

[[dialogue]]
speaker = "リーリア"
original = "「ぎくっ……」"
translation = "「지익……」"

[[dialogue]]
speaker = "セドナ"
original = "「どうした、早くしろ」"
translation = "「왜 그러나, 어서 해라.」"

[[dialogue]]
speaker = "リーリア"
original = "「な、なんでしょうかね～」"
translation = "「어, 어째서일까요~」"

[[dialogue]]
speaker = "セドナ"
original = "「……なぜ幻影魔法で胸の大きさを変えて見せている」"
translation = "「……어째서 환영 마법으로 가슴 크기를 바꿔서 보여주고 있는 거지.」"

[[dialogue]]
speaker = "リーリア"
original = "「ちょ！！\u3000しーっ、しーっ！！」"
translation = "「잠깐!! 쉿, 쉿!!」"

[[dialogue]]
speaker = "unk"
original = "いや、いつも以上に増量されているような？"
translation = "아니, 평소보다 더 증량된 것 같은데?"

[[dialogue]]
speaker = "unk"
original = "確かにいつもより少し……"
translation = "확실히 평소보다 조금……"

[[dialogue]]
speaker = "リーリア"
original = "「いつも以上って何ですか！\u3000そこまで増量はしてないんですけど！？」"
translation = "「평소보다 더라니 무슨 소리예요! 그 정도로 증량하진 않았거든요!?」"

[[dialogue]]
speaker = "リーリア"
original = "「ちょっとだけ盛ったことは認めますけど……でもほんのちょっとだけです！」"
translation = "「조금 뽕 넣은 건 인정하지만…… 하지만 정말 조금이라고요!」"

[[dialogue]]
speaker = "アナ"
original = "「リーリアさんのちょっとの基準が狂ってますから」"
translation = "「리리아 씨의 조금의 기준은 미쳐있으니까요.」"

[[dialogue]]
speaker = "リーリア"
original = "「そんなことないもん！！」"
translation = "「그렇지 않단 말이야!!」"

[[dialogue]]
speaker = "unk"
original = "もうバレてるのに水着まで盛る必要とは……"
translation = "이미 들켰는데 수영복까지 뽕을 넣을 필요가……"

[[dialogue]]
speaker = "リーリア"
original = "「アナちゃんはともかく、他の女の子には私がパッド入れてるってバレてなかったんです！」"
translation = "「아나짱은 몰라도 다른 여자애들한테는 제가 패드 넣었다는 거 안 들켰었다고요!」"

[[dialogue]]
speaker = "リーリア"
original = "「センパイは私に、海に来たら突然おっぱいが萎む女になれっていうんですか！」"
translation = "「선배는 저보고 바다에 왔더니 갑자기 가슴이 쪼그라드는 여자가 되라는 건가요!」"

[[dialogue]]
speaker = "リーリア"
original = "「それにセンパイ、偽物だって分かっててもさっきから私の胸、チラチラ見てますよね！」"
translation = "「게다가 선배, 가짜라는 거 알면서도 아까부터 제 가슴 힐끔힐끔 보고 계시잖아요!」"

[[dialogue]]
speaker = "unk"
original = "そ、そんなことは……"
translation = "그, 그런 적은……"

[[dialogue]]
speaker = "セドナ"
original = "「……どうでもいいだろう。無駄なことに魔力を割く意味はない。速やかに本来の姿に……」"
translation = "「……아무래도 좋다. 쓸데없는 일에 마력을 쏟을 의미는 없다. 신속하게 본래의 모습으로……」"

[[dialogue]]
speaker = "リーリア"
original = "「無駄とか言わないでください。私にとっては切実なんです！」"
translation = "「쓸데없다니 하지 마세요. 저한테는 절실하단 말이에요!」"

[[dialogue]]
speaker = "アイリーン"
original = "「ああああ～、セドナ長官！\u3000今日は実戦ではありませんから！\u3000これくらいは見逃してあげてもいいんじゃないでしょうか」"
translation = "「아아아아~ 세드나 장관님! 오늘은 실전이 아니니까요! 이 정도는 눈감아 주셔도 되지 않을까요.」"

[[dialogue]]
speaker = "リーリア"
original = "「アイリーン……！」"
translation = "「아이린……!」"

[[dialogue]]
speaker = "セドナ"
original = "「ふむ……まあ、そうだな。あまり堅苦しくてもいけない。今回は許可しよう」"
translation = "「흠…… 뭐, 그렇군. 너무 딱딱해도 좋지 않지. 이번엔 허가하마.」"

[[dialogue]]
speaker = "リーリア"
original = "「えぇ、えぇ……ありがとうございました、セドナ長官……プン」"
translation = "「에헤, 에헤헤…… 감사합니다, 세드나 장관님…… 흥.」"

[[dialogue]]
speaker = "マトイ"
original = "「そ、それで、セドナさんの水着はどんな感じですか？」"
translation = "「그, 그래서 세드나 씨의 수영복은 어떤 느낌인가요?」"

[[dialogue]]
speaker = "セドナ"
original = "「ああすまない、お披露目の途中だったな。これが私の戦闘服だ」"
translation = "「아아 미안하군, 선을 보이는 도중이었지. 이것이 나의 전투복이다.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「おおお～～～！！」"
translation = "「오오오~~~!!」"

[[dialogue]]
speaker = "マトイ"
original = "「か、可愛い……ですね……」"
translation = "「귀, 귀엽……네요……」"

[[dialogue]]
speaker = "アナ"
original = "「大胆セクシーでありながら、キュートさも含んでいます」"
translation = "「대담하고 섹시하면서도 큐트함도 포함되어 있습니다.」"

[[dialogue]]
speaker = "サーシャ"
original = "「ふふっ、ギャップにやられちゃいそうね～♪」"
translation = "「후후, 갭 모에에 당해버릴 것 같네~♪」"

[[dialogue]]
speaker = "セドナ"
original = "「む……あ、ありがとう……と言っておけばよいのか？」"
translation = "「음…… 고, 고마워……라고 말하면 되는 건가?」"

[[dialogue]]
speaker = "リーリア"
original = "「なんか私よりウケてるし……」"
translation = "「왠지 나보다 반응이 좋고……」"

[[dialogue]]
speaker = "リーリア"
original = "「ちょっとセンパイ！\u3000私の時より食い入るように見てませんか？」"
translation = "「잠깐 선배! 제 때보다 더 뚫어지게 보고 계시지 않나요?」"

[[dialogue]]
speaker = "リーリア"
original = "「ああああぁっ……やっぱりセンパイは、胸の大きな女の子が好きなんだ～。ふえええ～ん！」"
translation = "「아아아아악…… 역시 선배는 가슴 큰 여자애를 좋아하는구나~. 으아아앙!」"

[[dialogue]]
speaker = "unk"
original = "（つもりだけど目が谷間に吸い寄せられる）"
translation = "(그럴 생각은 없지만 눈이 골짜기로 빨려 들어간다)"

[[dialogue]]
speaker = "unk"
original = "見てない見てない見てない！"
translation = "안 봤어 안 봤어 안 봤어!"

[[dialogue]]
speaker = "セドナ"
original = "「いや、よく見てもらわなければ困る」"
translation = "「아니, 잘 봐주지 않으면 곤란하다.」"

[[dialogue]]
speaker = "リーリア"
original = "「ふえぇえっ！？」"
translation = "「후에에엑!?」"

[[dialogue]]
speaker = "アナ"
original = "「……フォームチェンジの技術を利用して、星力ではない別のものを戦闘服に変化させているのですね」"
translation = "「……폼 체인지 기술을 이용해서 성력이 아닌 다른 것을 전투복으로 변화시키고 있는 것이군요.」"

[[dialogue]]
speaker = "セドナ"
original = "「ああ、その通り。流石はアナ副会長、慧眼だな」"
translation = "「그래, 맞다. 역시 아나 부회장, 혜안이군.」"

[[dialogue]]
speaker = "アナ"
original = "「えっへん」"
translation = "「에헴.」"

[[dialogue]]
speaker = "セドナ"
original = "「この力の正体は光の魔法……クラウディア様の力だ」"
translation = "「이 힘의 정체는 빛의 마법…… 클라우디아 님의 힘이다.」"

[[dialogue]]
speaker = "セドナ"
original = "「魔女たる我々が扱うことができる力は魔力。光の魔女たるクラウディア様の力を借りなければ、様々な状況において『光の魔法』を使うことができなかった」"
translation = "「마녀인 우리가 다룰 수 있는 힘은 마력. 빛의 마녀인 클라우디아 님의 힘을 빌리지 않으면 다양한 상황에서 『빛의 마법』을 사용할 수 없었지.」"

[[dialogue]]
speaker = "セドナ"
original = "「しかし、フォームチェンジの技術を取り入れることによって、姫の力を疑似的に再現できるようになったのだ」"
translation = "「하지만 폼 체인지 기술을 도입함으로써 공주의 힘을 유사하게 재현할 수 있게 된 거다.」"

[[dialogue]]
speaker = "セドナ"
original = "「これも学園側からの技術提供のおかげだ。あとは……その性能がどこまでオリジナルに迫れるか、だが」"
translation = "「이것도 학원 측의 기술 제공 덕분이지. 남은 건…… 그 성능이 어디까지 오리지널에 근접할 수 있느냐다만.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふふふ、つまりその水着で私たちに挑戦したいってことね？」"
translation = "「후후후, 즉 그 수영복으로 우리에게 도전하고 싶다는 거네?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「いいわ！\u3000その挑戦、私の新しい水着フォームで、受けて立ちましょう！」"
translation = "「좋아! 그 도전, 내 새로운 수영복 폼으로 받아주지!」"

[[dialogue]]
speaker = "リーリア"
original = "（あ……これは……）"
translation = "(아…… 이건……)"

[[dialogue]]
speaker = "マトイ"
original = "（マズい流れかもしれない……）"
translation = "(안 좋은 흐름일지도……)"

[[dialogue]]
speaker = "リーリア"
original = "「あはは……それじゃセンパイ、私たちはあっちで仲良く観戦しましょう。頑張ってくださいね、長官――」"
translation = "「아하하…… 그럼 선배, 우리들은 저쪽에서 사이좋게 관전해요. 힘내세요, 장관님──」"

[[dialogue]]
speaker = "セドナ"
original = "「配置につけ、リーリア」"
translation = "「배치에 붙어라, 리리아.」"

[[dialogue]]
speaker = "リーリア"
original = "「あぁ、やっぱり！\u3000そうなっちゃいますよねー！」"
translation = "「아아, 역시! 그렇게 되어버리는군요!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「２対２で勝負ってことね？\u3000絶対に勝つわよ、マトイ！」"
translation = "「2 대 2 승부라는 거네? 절대로 이기자, 마토이!」"

[[dialogue]]
speaker = "マトイ"
original = "「何となく分かってたけど言わせてっ！！\u3000どーして私なのっ！？」"
translation = "「어렴풋이 알고는 있었지만 말하게 해줘!! 어째서 나인 거야!?」"

