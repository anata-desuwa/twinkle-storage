[[dialogue]]
speaker = "unk"
original = "第２話,突撃マムハート,P"
translation = "제2화, 돌격 마무 하트"

[[dialogue]]
speaker = "unk"
original = "バトルフェスタ・ペンタグラムで実装された仮想結界システム――それを使って仮想空間に再現された魔界。"
translation = "배틀 페스타 펜타그램에서 구현된 가상 결계 시스템―― 그것을 사용해 가상 공간에 재현된 마계."

[[dialogue]]
speaker = "unk"
original = "俺はそこで大出力のノヴァフォームに変身したマムと、全力の戦闘訓練を行っていた。"
translation = "나는 거기서 대출력 노바 폼으로 변신한 마무와 전력 전투 훈련을 하고 있었다."

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "「会長、魔王の力が上手く引き出せないからって甘えは許さないわよ。星騎士として、星力だけで戦い抜く気概を見せなさい！」"
translation = "「회장, 마왕의 힘을 잘 끌어내지 못한다고 해서 어리광은 용납 못 해. 성기사로서 성력만으로 싸워나가는 기개를 보여주렴!」"

[[dialogue]]
speaker = "unk"
original = "イエス・マム！"
translation = "예스 마무!"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "「行くわよ――引力球！」"
translation = "「간다―― 인력구!」"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "（ノヴァフォームになって更に進化した私の『引力操作』は、星術や相手の能力すらも引き寄せる。そして――）"
translation = "(노바 폼이 되어 더욱 진화한 나의 『인력 조작』은 성술이나 상대의 능력조차 끌어당기지. 그리고――)"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "「反転！\u3000ブラックホールリフレクション！」"
translation = "「반전! 블랙홀 리플렉션!」"

[[dialogue]]
speaker = "unk"
original = "俺の全力で放った攻撃がそのまま跳ね返され、吹き飛ばされる。"
translation = "내가 전력으로 날린 공격이 그대로 되받아쳐져, 멀리 날아간다."

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "「竜の<ruby>膂力<rt>りょりょく</rt></ruby>、<ruby>捌<rt>さば</rt></ruby>いてみせなさい！」"
translation = "「용의 여력, 버텨내 보렴!」"

[[dialogue]]
speaker = "unk"
original = "そのまま追撃してきたマムの拳を避けるが、拳圧で地面が大きく陥没し、そこに大きなクレーターを作り上げる。"
translation = "그대로 추격해 온 마무의 주먹을 피했지만, 권압만으로 지면이 크게 함몰되며 그곳에 거대한 크레이터를 만들어낸다."

[[dialogue]]
speaker = "unk"
original = "普段は愛らしい小さな体躯だが、ノヴァフォームに変身した際の膂力は竜化した時と変わらぬものになるという。"
translation = "평소에는 사랑스럽고 작은 체구지만, 노바 폼으로 변신했을 때의 여력은 용으로 변했을 때와 다를 바 없다고 한다."

[[dialogue]]
speaker = "unk"
original = "まさに、今のマムは小さく凝縮された竜そのもの。"
translation = "그야말로 지금의 마무는 작게 응축된 용 그 자체."

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "（そう、私は竜の全力を出して戦っている。だけど――）"
translation = "(그래, 나는 용의 전력을 다해 싸우고 있어. 하지만――)"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "（会長は何度攻撃を受けても、必ず立ち上がって来る）"
translation = "(회장은 몇 번이나 공격을 받아도 반드시 다시 일어서지)"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "（幼い頃から何度もリクリエと対峙してきた経験による『死や痛みに対する精神耐性』。それと『危機的状況から立ち上がる度に星力が上昇する』という固有の能力）"
translation = "(어릴 적부터 몇 번이나 리크리에와 대치해 온 경험에 의한 『죽음이나 고통에 대한 정신 내성』. 그리고 『위기 상황에서 일어설 때마다 성력이 상승한다』는 고유 능력)"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "（その２つから生み出される『不死身のごとき<ruby>耐久性<rt>タフさ</rt></ruby>』こそが、会長の星騎士として抜きん出た才能）"
translation = "(그 두 가지에서 생겨나는 『불사신 같은 <ruby>내구성<rt>터프함</rt></ruby>』이야말로 회장이 성기사로서 빼어난 재능)"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "（学園に来てからリクリエの最前線で戦い続けて来たことで、今や魔王の力を抜きにしても、竜の全力でも簡単には倒し切れない）"
translation = "(학원에 온 뒤로 리크리에의 최전선에서 계속 싸워온 덕분에, 이제는 마왕의 힘을 제외하더라도 용의 전력으로조차 쉽게 쓰러뜨릴 수 없어)"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "（おまけに、どこぞのツインドリルに似た不屈の努力家で、恋人になってからも腑抜けることなく、会長として日々勤勉に己を高め続けている）"
translation = "(게다가 어디의 트윈 테일을 닮은 불굴의 노력가라, 연인이 된 후에도 나태해지지 않고 회장으로서 매일 근면하게 자신을 높이고 있지)"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "（全く……おかげで、たまにはご褒美のスキンシップくらい許してあげないと、私の方が恋人としてダメみたいになるじゃない）"
translation = "(정말이지…… 덕분에 가끔은 포상으로 스킨십 정도는 허락해 주지 않으면, 나 쪽이 연인으로서 실격인 것 같잖아)"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "（それで、いざスキンシップが始まると、生意気に強いオスの一面を出して来たりするし……）"
translation = "(게다가 막상 스킨십이 시작되면 건방지게 강한 수컷의 일면을 드러내기도 하고……)"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "（私が力の強さを認めちゃってる異性だから、触れ合うと竜の本能で、仕方なくドキドキしちゃって……）"
translation = "(내가 힘의 강함을 인정한 이성이라서, 살이 맞닿으면 용의 본능 때문에 어쩔 수 없이 두근거려 버려서……)"

[[dialogue]]
speaker = "unk"
original = "マム、ちょっと失礼します"
translation = "마무, 잠시 실례할게요."

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "「えっ！？」"
translation = "「엣!?」"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "（余計なことを考えている隙を突かれたとはいえ、この私が反応できない程の速さで肉薄された！？）"
translation = "(쓸데없는 생각을 하던 틈을 찔렸다고는 해도, 이 내가 반응하지 못할 정도의 속도로 육박했다고!?)"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "（完全に１本取られた……！\u3000竜たるこの私が！？）"
translation = "(완전히 한 방 먹었어……! 용인 이 내가!?)"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "「って、会長？\u3000おでこに手を当てて、一体何を……！？」"
translation = "「아니, 회장? 이마에 손을 대고 대체 뭘……!?」"

[[dialogue]]
speaker = "unk"
original = "どこか様子が変だなと思って……"
translation = "어쩐지 상태가 이상한 것 같아서……."

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "「は！？\u3000――この私が、集中できてなくて、顔が赤くなっているように見えた！？」"
translation = "「하!? ――이 내가 집중을 못 해서 얼굴이 붉어진 것처럼 보였다고!?」"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "「～～～っ！」"
translation = "「～～～윽!」"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "「何を言っているのかしら！？\u3000竜たるこの私が、体調が悪くなるなんてこと早々あるわけないでしょう！？」"
translation = "「무슨 말을 하는 걸까!? 용인 이 내가 몸 상태가 나빠지는 일 따위 좀처럼 있을 리 없잖아!?」"

[[dialogue]]
speaker = "unk"
original = "問題ないなら、別にいいんだけど――"
translation = "문제없다면 다행이지만――"

[[dialogue]]
speaker = "unk"
original = "本当に何かある時は、素直に言って欲しい。俺はマムの恋人なのだから、と伝えた。"
translation = "정말로 무슨 일이 있을 때는 솔직하게 말해줬으면 좋겠어. 나는 마무의 연인이니까, 라고 전했다."

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "「っ……恋人だからこそ、素直に言えないこともあるのよ」"
translation = "「윽…… 연인이기에 솔직하게 말할 수 없는 것도 있는 법이야.」"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "「ばか……」"
translation = "「바보……」"

[[dialogue]]
speaker = "unk"
original = "顔を赤くして呟くマムに、俺は思わずドキッとしてしまう。"
translation = "얼굴을 붉히며 중얼거리는 마무에게 나는 나도 모르게 가슴이 두근거리고 만다."

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "（言えるわけないじゃない……！）"
translation = "(말할 수 있을 리 없잖아……!)"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "（この私が、訓練中に貴方を異性として意識して、ドキドキしてるなんて……）"
translation = "(이 내가 훈련 중에 당신을 이성으로 의식해서 두근거리고 있다니……)"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "「っ……生意気よ！\u3000どれだけ貴方が強くなったとしても、畏怖をもって跪かせてあげるんだから！」"
translation = "「윽…… 건방져! 당신이 아무리 강해졌다고 해도, 경외심을 갖고 무릎 꿇게 만들어 줄 테니까!」"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "「引力球で百叩きにしてあげるから、そこに直りなさい！」"
translation = "「인력구로 곤장을 백 대는 쳐줄 테니 거기 가만히 있으렴!」"

[[dialogue]]
speaker = "unk"
original = "あれ！？\u3000なんか怒ってます！？"
translation = "어라!? 왠지 화나셨는데요!?"

[[dialogue]]
speaker = "マハムート（覚醒）"
original = "「貴方のせいよっ！\u3000ノヴァメテオインパクトォーーーッ！！！」"
translation = "「당신 때문이야! 노바 메테오 임팩트으으으으으!!!」"

[[dialogue]]
speaker = "unk"
original = "ちょっ、待っ……アッーーーーーー！！？"
translation = "잠깐, 기다…… 아아아아아아아!!?"

[[dialogue]]
speaker = "unk"
original = "突然始まったアルマゲドンのごとき指導を、俺はそこから受ける羽目になるのだった――"
translation = "갑자기 시작된 아마겟돈 같은 지도를 나는 그 후로 받게 되는 처지가 되었다――"

