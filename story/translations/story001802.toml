[[dialogue]]
speaker = "unk"
original = "セシアと話していたところにやって来た、クリスマス衣装のフ二とルルカ。"
translation = "세시아와 이야기하던 중에 찾아온 크리스마스 의상의 후니와 루루카."

[[dialogue]]
speaker = "ルルカ"
original = "「ねぇねぇ、どうかな、お兄ちゃん？\u3000クリスマスフォーム、似合ってる～？」"
translation = "「저기 저기, 어때 오빠? 크리스마스 폼, 잘 어울려~?」"

[[dialogue]]
speaker = "フェニエル"
original = "「セシアちゃんのプレゼント配りをお手伝いするということで、ヘレナ様が私たちの衣装も作って下さったんです」"
translation = "「세시아 짱의 선물 배달을 돕는다고 해서, 헬레나 님께서 저희 의상도 만들어 주셨어요.」"

[[dialogue]]
speaker = "unk"
original = "２人ともすごくかわいい！\u3000似合ってるよ！"
translation = "둘 다 너무 귀여워! 잘 어울려!"

[[dialogue]]
speaker = "ルルカ"
original = "「えへへ～♪\u3000ありがとう、お兄ちゃん♪」"
translation = "「에헤헤~♪ 고마워, 오빠♪」"

[[dialogue]]
speaker = "unk"
original = "彼女は新星学園１年生『<ruby>海野辺<rt>うみのべ</rt></ruby>ルルカ』。"
translation = "그녀는 신성학원 1학년 『우미노베 루루카』."

[[dialogue]]
speaker = "unk"
original = "プリマステラではないため、星騎士としては目立った活躍はないルルカだが、彼女には大きな秘密があり……"
translation = "프리마스텔라가 아니기 때문에 성기사로서 눈에 띄는 활약은 없지만, 그녀에게는 큰 비밀이 있어……"

[[dialogue]]
speaker = "unk"
original = "実は周りには秘密で、人気Ｖチューバー『<ruby>汐<rt>うしお</rt></ruby>ルカルカ』として活動している。最近は調子が良く、チャンネル登録者数も１００万人を超えそうな勢いだ。"
translation = "사실 주변에는 비밀로 하고 인기 VTuber 『시오 루카루카』로 활동하고 있다. 최근에는 상태가 좋아 채널 구독자 수도 100만 명을 넘을 기세다."

[[dialogue]]
speaker = "フェニエル"
original = "「あ、ありがとうございます、会長さん……♪\u3000えへへ♪」"
translation = "「고, 고맙습니다, 회장님……♪ 에헤헤♪」"

[[dialogue]]
speaker = "フェニエル"
original = "「会長さんに褒められると、なまら照れちゃいます……」"
translation = "「회장님께 칭찬받으니 억수로 쑥스럽네요……」"

[[dialogue]]
speaker = "unk"
original = "彼女は流星学園１年生の『フェニエル』。周りからは『フニ』という愛称で親しまれている。"
translation = "그녀는 유성학원 1학년 『페니엘』. 주변에서는 『후니』라는 애칭으로 친숙하다."

[[dialogue]]
speaker = "unk"
original = "後天的に星力を獲得したという珍しい体質で、出会った当時はまだ星術の扱いもつたなく、ルルカと同じ非プリマステラだ。"
translation = "후천적으로 성력을 획득했다는 희귀한 체질로, 만났을 당시에는 아직 성술 다루는 법도 서툴러서 루루카와 같은 비프리마스텔라였다."

[[dialogue]]
speaker = "unk"
original = "しかし、あれから時間も経ち、今では流星寮の寮長『千園寺ヒルディオーネ』先輩の下でその実力をメキメキと伸ばしている。"
translation = "하지만 그로부터 시간이 흘러, 지금은 유성 기숙사 사감인 『센온지 힐디오네』 선배 밑에서 실력을 쑥쑥 키우고 있다."

[[dialogue]]
speaker = "unk"
original = "成長率も含めての評価だが、『次期寮長候補』なんて言われることもあるくらいになっていた。"
translation = "성장률을 포함한 평가지만, 『차기 사감 후보』라고 불릴 정도가 되어 있었다."

[[dialogue]]
speaker = "フェニエル"
original = "「でも、このクリスマスフォーム、本当にかわいい衣装ですっ。私のは『マッチ売りの女の子』がモチーフみたいで」"
translation = "「그렇지만 이 크리스마스 폼, 정말 귀여운 의상이에요. 제 건 『성냥팔이 소녀』가 모티브인 것 같고요.」"

[[dialogue]]
speaker = "ルルカ"
original = "「あたしのは『クリスマスツリー』がモチーフなんだって！\u3000ほら、頭に星が付いてるでしょ？」"
translation = "「내 건 『크리스마스 트리』가 모티브래! 봐봐, 머리에 별이 달려 있지?」"

[[dialogue]]
speaker = "フェニエル"
original = "「ルルカちゃんの衣装、なまらかわいいです！」"
translation = "「루루카 짱 의상, 억수로 귀여워요!」"

[[dialogue]]
speaker = "ルルカ"
original = "「いやいや、フニちゃんの方がもっとかわいいよ～♪」"
translation = "「아냐 아냐, 후니 짱이 훨씬 더 귀엽다구~♪」"

[[dialogue]]
speaker = "ルルカ"
original = "「こう、フニちゃんが本来持っている健気さとマッチして、庇護欲を掻き立てられる感じがするんだよね～！\u3000マッチだけに！」"
translation = "「뭐랄까, 후니 짱이 본래 가진 기특함이랑 매치돼서 보호 본능을 자극하는 느낌이 든달까! 성냥(매치)인 만큼!」"

[[dialogue]]
speaker = "フェニエル"
original = "「あぅ……な、なしてそんなこと言うんしょや、ルルカちゃんっ。\u3000なまら恥ずかしいべさ……！」"
translation = "「아우…… 우째 그런 소리를 하는 거야요, 루루카 짱. 억수로 부끄럽구마……!」"

[[dialogue]]
speaker = "ルルカ"
original = "「あぁ～<emoji=heart04>\u3000時々出る方言＋その頭の羽で顔を隠しちゃう仕草がまた、すごく可愛いんだよね～♪」"
translation = "「아아~ <emoji=heart04> 가끔 나오는 방언에 그 머리 깃털로 얼굴을 가리는 제스처가 또 무척 귀엽다니까~♪」"

[[dialogue]]
speaker = "ルルカ"
original = "「フニちゃんもＶチューバーやれば、絶対にバズって売れるよ！\u3000その一芸だけでやっていけるね！」"
translation = "「후니 짱도 VTuber 하면 분명히 버즈 터지고 인기 폭발할 거야! 그 개인기 하나만으로도 충분히 먹고살겠네!」"

[[dialogue]]
speaker = "ルルカ"
original = "「って……ハッ！？\u3000違うよ！？\u3000『フニちゃんも』って言ったけど、別にあたしがＶチューバーやってるって意味ではなくてね！？」"
translation = "「엇…… 핫!? 아니야!? 『후니 짱도』라고 했지만, 딱히 내가 VTuber를 하고 있다는 뜻은 아니고!?」"

[[dialogue]]
speaker = "セシア"
original = "「他意はないのだけれど……」"
translation = "「다른 뜻은 없지만……」"

[[dialogue]]
speaker = "セシア"
original = "「最近人気急上昇中の『汐ルカルカ』、ルルカにお声がそっくりね？」"
translation = "「요즘 인기 급상승 중인 『시오 루카루카』, 루루카랑 목소리가 똑 닮았네?」"

[[dialogue]]
speaker = "unk"
original = "他意がない、ってなんだっけ！？"
translation = "다른 뜻이 없다니 그게 무슨 소리야!?"

[[dialogue]]
speaker = "セシア"
original = "「冗談よ、会長。わたくしたちは大丈夫だから」"
translation = "「농담이에요, 회장. 저희는 괜찮으니까요.」"

[[dialogue]]
speaker = "セシア"
original = "「わたくしもフニも、ルルカがＶチューバーをやっていることは、もうすでに知っているわ」"
translation = "「저도 후니도, 루루카가 VTuber를 하고 있다는 건 이미 알고 있어요.」"

[[dialogue]]
speaker = "unk"
original = "えっ！？\u3000そうなの？"
translation = "엣!? 그래?"

[[dialogue]]
speaker = "フェニエル"
original = "「はい。１週間前にセシアちゃんに誘われて、プレゼント配りをお手伝いすることが決まって。それから仲良くなろうと、３人で集まって話している内に……」"
translation = "「네. 일주일 전에 세시아 짱의 권유로 선물 배달을 돕기로 결정됐고, 그 뒤로 친해지려고 셋이 모여 이야기하던 중에……」"

[[dialogue]]
speaker = "ルルカ"
original = "「そうだった！\u3000あたしがうっかり口走っちゃって、２人にはもうバレちゃってるんだった。危ない、セーフ……！」"
translation = "「맞다 그랬지! 내가 무심코 입을 놀려서 두 사람에겐 벌써 들켜버린 거였어. 위험해, 세이프……!」"

[[dialogue]]
speaker = "unk"
original = "何もセーフじゃないが……？"
translation = "전혀 세이프가 아니거든……?"

[[dialogue]]
speaker = "ルルカ"
original = "「……てへっ☆」"
translation = "「……데헷☆」"

[[dialogue]]
speaker = "unk"
original = "それから俺たちは、クリスマスに向けての相談を始めることになった。"
translation = "그 뒤로 우리는 크리스마스를 향한 상담을 시작하게 되었다."

[[dialogue]]
speaker = "unk"
original = "聞けば今回のクリスマスは、ヒルディオーネ先輩と新星寮の寮長――『マム』こと『妃竜院マハムート』先輩から、寮への立ち入り許可を既に貰っているとのこと。"
translation = "듣자 하니 이번 크리스마스는 힐디오네 선배와 신성료 사감── 『마무』라 불리는 『키류인 마하무트』 선배로부터 기숙사 출입 허가를 이미 받아두었다고 한다."

[[dialogue]]
speaker = "unk"
original = "クリスマス当日にはそれぞれの寮へ出向いて、プレゼントを配る手はずになっているらしい。"
translation = "크리스마스 당일에는 각각의 기숙사로 가서 선물을 나누어 줄 절차를 밟아둔 모양이다."

[[dialogue]]
speaker = "セシア"
original = "「――それで会長。今回のクリスマスプレゼントは、手作りアクセサリーを配ろうと思っているの」"
translation = "「──그래서 회장님. 이번 크리스마스 선물은 수제 액세서리를 나누어 주려고 해요.」"

[[dialogue]]
speaker = "セシア"
original = "「わたくしのクリスマスフォームには、紅明ママと同じ『イメージしたプレゼントをサンタの袋から取り出す』能力があるわ」"
translation = "「제 크리스마스 폼에는 코우메이 마마와 똑같이 『이미지한 선물을 산타 자루에서 꺼내는』 능력이 있어요.」"

[[dialogue]]
speaker = "セシア"
original = "「だから最初は、前回と同じように『その人が欲しいもの』をその場で作って回ろうと考えていたのだけれど……」"
translation = "「그래서 처음에는 지난번처럼 『그 사람이 원하는 것』을 그 자리에서 만들어 돌 생각이었지만……」"

[[dialogue]]
speaker = "フェニエル"
original = "「ヒルディーお姉様から、『理由なく高価なプレゼントを、一方的に配るのはよくない』という意見を頂いたんです」"
translation = "「힐디 언니분께서 『이유 없이 고가인 선물을 일방적으로 나누어 주는 건 좋지 않다』는 의견을 주셨거든요.」"

[[dialogue]]
speaker = "unk"
original = "さすがヒルディオーネ先輩だ。一理ある"
translation = "역시 힐디오네 선배다. 일리가 있어."

[[dialogue]]
speaker = "unk"
original = "セシアをよく知らない人からしたら、貰う側としても理由のよく分からない高価なプレゼントは喜びよりも困惑が勝つだろう。"
translation = "세시아를 잘 모르는 사람 입장에서 보면, 받는 쪽으로서도 이유를 알 수 없는 고가의 선물은 기쁨보다 당혹감이 앞설 것이다."

[[dialogue]]
speaker = "unk"
original = "逆に、今後セシアに頼めば何でもタダで貰えると思われても困る。何にせよあまりいいことではない。"
translation = "반대로 앞으로 세시아에게 부탁하면 뭐든 공짜로 얻을 수 있다고 생각해도 곤란하다. 무엇보다 별로 좋은 일은 아니다."

[[dialogue]]
speaker = "ルルカ"
original = "「だから、あたしたち３人で相談して、今回のプレゼントは手作りすることに決めたんだ。フニちゃんの提案で――」"
translation = "「그래서 우리 셋이 상의해서 이번 선물은 직접 만들기로 정했어. 후니 짱의 제안으로──」"

[[dialogue]]
speaker = "フェニエル"
original = "「ビーズを使った、クリスマスらしい色合いの手作りブレスレットとか、どうかなって……」"
translation = "「비즈를 사용한 크리스마스다운 색감의 수제 팔찌 같은 건 어떨까 해서요……」"

[[dialogue]]
speaker = "フェニエル"
original = "「昔、私が北海道にいた時……村のみんなに作って渡したら、すごく喜んでくれたんです」"
translation = "「예전에 제가 홋카이도에 있었을 때…… 마을 분들에게 만들어 드렸더니 무척 기뻐해 주셨거든요.」"

[[dialogue]]
speaker = "フェニエル"
original = "「素材としても安物ですし、全然、大したものじゃないんですけど……その分、受け取るのも困らないんじゃないかなって」"
translation = "「소재로서도 저렴한 것이고 전혀 대단한 건 아니지만…… 그만큼 받는 사람도 부담스럽지 않을 것 같아서요.」"

[[dialogue]]
speaker = "フェニエル"
original = "「流星と新星の生徒は、クリスマスでも任務や仕事に忙しい方が、沢山います。そういう方々にも、ちょっとでもクリスマスを感じてもらえたらなって……」"
translation = "「유성과 신성의 학생은 크리스마스라도 임무나 일로 바쁜 분들이 많아요. 그런 분들에게도 조금이나마 크리스마스를 느끼게 해드리고 싶어서……」"

[[dialogue]]
speaker = "unk"
original = "フニのもてなしの心、きっと伝わると思う"
translation = "후니의 대접하는 마음, 분명 전달될 거야."

[[dialogue]]
speaker = "セシア"
original = "「ふふっ♪\u3000『メリークリスマス』の気持ちを込めてプレゼントを用意することが、一番大事なんだってわたくしも思うの」"
translation = "「후훗♪ 『메리 크리스마스』의 마음을 담아 선물을 준비하는 게 가장 중요하다는 걸 저도 느껴요.」"

[[dialogue]]
speaker = "セシア"
original = "「前回のクリスマスのように、沢山のヒトに笑顔になってもらえるように頑張るわ」"
translation = "「지난 크리스마스처럼 많은 분이 미소 지을 수 있도록 열심히 할게요.」"

[[dialogue]]
speaker = "ルルカ"
original = "「あたしは正直、クリスマスプレゼントを配る経験とか初めてだから、不安もあるんだけど……」"
translation = "「나는 솔직히 크리스마스 선물을 배달하는 경험 같은 건 처음이라 불안하기도 하지만……」"

[[dialogue]]
speaker = "ルルカ"
original = "「でも、前回セッシーちゃん達からプレゼント貰った時、すごく嬉しかったんだ！」"
translation = "「하지만 지난번에 세시 짱 일행에게 선물을 받았을 때 정말 기뻤거든!」"

[[dialogue]]
speaker = "ルルカ"
original = "「だから、クリスマスプレゼントを配るからには、あたしも紅明先輩やセッシーちゃんをリスペクトして、みんなを喜ばせたいって思う！」"
translation = "「그러니까 크리스마스 선물을 배달하는 이상, 나도 코우메이 선배나 세시 짱을 리스펙트해서 모두를 기쁘게 해주고 싶어!」"

[[dialogue]]
speaker = "unk"
original = "俺ももちろん、手伝うぞ"
translation = "나도 물론 도울게."

[[dialogue]]
speaker = "ルルカ"
original = "「ありがとう、お兄ちゃん♪」"
translation = "「고마워, 오빠♪」"

[[dialogue]]
speaker = "セシア"
original = "「じゃあ、会長への説明も終わったところで改めて――」"
translation = "「자, 회장님께 설명도 끝났으니 다시 한번――」"

[[dialogue]]
speaker = "セシア"
original = "「わたくしたち４人で、クリスマスプレゼント配りを頑張りましょう♪\u3000せ～のっ」"
translation = "「우리 네 명 모두, 크리스마스 선물 배달을 위해 힘내봐요♪ 하나, 둘!」"

[[dialogue]]
speaker = "全員"
original = "「おー！」"
translation = "「오ー!」"

[[dialogue]]
speaker = "unk"
original = "俺たちはぐっと握った拳を上げて、かけ声と共にクリスマスの準備を開始する――"
translation = "우리들은 꽉 쥔 주먹을 치켜올리며, 구호와 함께 크리스마스 준비를 개시했다――"

[[dialogue]]
speaker = "unk"
original = "ふと、その時。"
translation = "문득, 그때였다."

[[dialogue]]
speaker = "セシア"
original = "「――あら？\u3000フニ、ちょっといいかしら？」"
translation = "「――어라? 후니, 잠시 괜찮을까?」"

[[dialogue]]
speaker = "フェニエル"
original = "「はい？\u3000セシアちゃん、どうかしましたか？」"
translation = "「네? 세시아 씨, 왜 그러시나요?」"

[[dialogue]]
speaker = "セシア"
original = "「ちょっと、おでこを借りるわね。んっ……」"
translation = "「잠시, 이마 좀 빌릴게. 응……」"

[[dialogue]]
speaker = "フェニエル"
original = "「ひゃっ！？\u3000セシアちゃん、いきなりそんな、おでこをくっ付けて……！？」"
translation = "「히얏!? 세시아 씨, 갑자기 그렇게 이마를 맞대고……!?」"

[[dialogue]]
speaker = "セシア"
original = "「……フニ、あなた、ひょっとして熱があるんじゃないかしら？」"
translation = "「……후니, 너 혹시 열이 있는 거 아니니?」"

[[dialogue]]
speaker = "フェニエル"
original = "「……！\u3000はい、そうかもしれません。実はちょっとだけ……」"
translation = "「……! 네, 그럴지도 몰라요. 실은 조금……」"

[[dialogue]]
speaker = "ルルカ"
original = "「えっ、そうなの！？\u3000フニちゃん、大丈夫！？」"
translation = "「엣, 정말이야!? 후니 짱, 괜찮아!?」"

[[dialogue]]
speaker = "フェニエル"
original = "「あっ、いえいえ。体調が悪いとか、そんなんじゃないんです。確かにここ数日、自分でも体温が普段より高い気がしてますけど――」"
translation = "「앗, 아뇨 아뇨. 몸 상태가 나쁘다거나 그런 건 아니에요. 확실히 요 며칠, 제 스스로도 체온이 평소보다 높다는 느낌은 들었지만――」"

[[dialogue]]
speaker = "フェニエル"
original = "「だからこそ、むしろ普段よりも体の調子が良いというか……」"
translation = "「그렇기에 오히려 평소보다 몸 상태가 좋다고 해야 할까……」"

[[dialogue]]
speaker = "ルルカ"
original = "「体温が高いのに、調子が良い？\u3000それってどういう……？」"
translation = "「체온이 높은데 상태가 좋다고? 그게 무슨……?」"

[[dialogue]]
speaker = "フェニエル"
original = "「時々体温が高くなるのは――私の中にいるホウちゃんの影響なんです」"
translation = "「가끔 체온이 높아지는 건―― 제 안에 있는 호우 짱의 영향이에요.」"

[[dialogue]]
speaker = "セシア"
original = "「ホウちゃん？」"
translation = "「호우 짱?」"

[[dialogue]]
speaker = "フェニエル"
original = "「あっ、ホウちゃんっていうのは、あくまで私が呼んでるだけの愛称、なんですけど……」"
translation = "「앗, 호우 짱이라는 건 어디까지나 제가 부르는 애칭일 뿐이지만요……」"

[[dialogue]]
speaker = "フェニエル"
original = "「私が星力を使えているのは、私の中に宿っている不死鳥――魔獣『フェニックス』が、力を貸してくれているからなんです」"
translation = "「제가 성력을 쓸 수 있는 건, 제 안에 깃든 불사조―― 마수 『페닉스』가 힘을 빌려주고 있기 때문이에요.」"

[[dialogue]]
speaker = "unk"
original = "そう言ってフニは、俺も今まで知らなかった秘密を明かすのだった――"
translation = "그렇게 말하며 후니는 나조차 지금까지 몰랐던 비밀을 밝히는 것이었다――"

