[[dialogue]]
speaker = "unk"
original = "第６話,秘策と秘策,B"
translation = "제6화, 비책과 비책, B"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「……っりえねぇ……」"
translation = "「……말도 안 돼……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……想像以上の遠大さ──だな」"
translation = "「……상상 이상의 원대함──이군.」"

[[dialogue]]
speaker = "unk"
original = "セドナさんの口から語られた『計画』の全貌を聞いて、俺たちは全員が言葉をなくした。"
translation = "세드나 씨의 입에서 이야기된 『계획』의 전모를 듣고, 우리들은 모두 말을 잃었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「リクリエの被害を人間界だけに抑え込む──だって……？\u3000そんなの、俺たちに認められるはずがない」"
translation = "「리크리에의 피해를 인간계에만 억제한다──니……? 그런 걸, 우리들이 인정할 리가 없다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それに第一──そんなことが本当に可能なのか……？」"
translation = "「게다가 첫째── 그런 일이 정말로 가능한 건가……?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ええ。リクリエが強大であるというならなおさら、抑えるのだって簡単じゃないはず」"
translation = "「예. 리크리에가 강대하다고 한다면 더욱이, 억제하는 것 또한 쉽지 않을 겁니다.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「魔女という種族は代々、結界術に長けていてな。この日のために『守り』の術は絶えず研鑽を続けてきた」"
translation = "「마녀라는 종족은 대대로, 결계술에 능숙해서 말이다. 이 날을 위해 『수호』의 술법은 끊임없이 연구를 계속해 왔다.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「もっとも──尋常ならざる規模というのは確かだ。私が全力を出したとしても、精々この街一帯しか覆えまい」"
translation = "「가장 중요한 것은── 심상치 않은 규모라는 것은 확실하다. 내가 전력을 다한다고 해도, 기껏해야 이 도시 일대밖에 덮지 못할 것이다.」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「はい。森の魔女たち総出でもっても、人間界全域というのは不可能でしょう」"
translation = "「네. 숲의 마녀들이 총출동한다고 해도, 인간계 전역은 불가능할 겁니다.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「なら──」"
translation = "「그렇다면──」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「そこで、余の出番というわけだ」"
translation = "「거기서, 여의 차례라는 것이다.」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「魔界と天界に挟まれた人間界。その上下を挟み込むように張る超世界規模の大結界──グレート・ウォールは余の魔力によって生成する」"
translation = "「마계와 천계에 끼인 인간계. 그 상하를 끼워 넣듯이 펼치는 초세계 규모의 대결계── 그레이트 월은 여의 마력에 의해 생성된다.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「人間界ごと覆う……って……」"
translation = "「인간계째로 덮는다……니…….」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「途方もねぇな……んなことを、何千年も前から考えてやがったのかよ……」"
translation = "「터무니없군…… 그런 걸, 몇천 년 전부터 생각해 왔던 거냐…….」"

[[dialogue]]
speaker = "unk"
original = "ネビュラの語るビジョンもクラウディアの自信も、現実味が薄れるほどに壮大なスケールの話だった。"
translation = "네뷸라가 말하는 비전도 클라우디아의 자신감도, 현실감이 희미해질 정도로 장대한 스케일의 이야기였다."

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「安心しろ。これは何も、このまま滅べという通達ではない」"
translation = "「안심해라. 이것은 결코, 이대로 멸망하라는 통지가 아니다.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「星騎士──貴様らは救う。また『うろ』を開いてやってもいい。『湖』の占拠はあくまでも予期せぬ被害が及ぶのを防ぐためでしかない」"
translation = "「성기사── 귀관들은 구한다. 다시 『우로』를 열어 주어도 좋다. 『호수』의 점거는 어디까지나 예기치 않은 피해가 미치는 것을 막기 위함일 뿐이다.」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「うむ。余らとしても、無駄な犠牲は出したくないのだ。わかってくれ」"
translation = "「음. 우리들로서도, 헛된 희생은 만들고 싶지 않다. 알아주었으면 한다.」"

[[dialogue]]
speaker_original = "カヤ"
speaker_translation = "카야"
original = "「無駄死に、よくない。戦士なら」"
translation = "「헛된 죽음, 좋지 않다. 전사라면.」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「その優しさには感謝するけどー……」"
translation = "「그 상냥함에는 감사하지만ー…….」"

[[dialogue]]
speaker = "unk"
original = "俺たちの魔界送りを『隔離』と呼んでいた意味も知れた。だけど……"
translation = "우리들의 마계행을 『격리』라고 불렀던 의미도 알게 되었다. 하지만…….」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……あなた達の考えはわかった。三界全部をいかれるくらいならせめて魔界と天界は守るって発想も」"
translation = "「……당신들의 생각은 알았다. 삼계 전부를 잃을 바에는 적어도 마계와 천계는 지킨다는 발상도.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「だけど、俺たちにも──決して譲れない一線がある。終焉に抗う<ruby>星騎士<rt>スターナイト</rt></ruby>として」"
translation = "「하지만, 우리들에게도── 결코 양보할 수 없는 선이 있다. 종언에 맞서는 <ruby>성기사<rt>스타 나이트</rt></ruby>로서.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「うん……！\u3000私もそう思う……！」"
translation = "「응……! 나도 그렇게 생각해……!」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「ふむ。吠えるだけなら<ruby>狗<rt>いぬ</rt></ruby>でもできる」"
translation = "「흠. 짖기만 하는 것은 개도 할 수 있다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「そもそも、『うろ』で隔離できるのは何人だ？\u3000星騎士じゃない人たちはどうなる？\u3000……グレート・ウォール計画が発動すれば、人間界にある他の命は見殺しか？」"
translation = "「애초에, 『우로』로 격리할 수 있는 건 몇 명이지? 성기사가 아닌 사람들은 어떻게 되지? ……그레이트 월 계획이 발동되면, 인간계에 있는 다른 생명은 모른 척 죽게 내버려 두는 건가?」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「やむなくな」"
translation = "「어쩔 수 없지.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「だから認められないと言ってるんだ。たとえ魔界や天界を守るためだったとしても、人間界を見捨てていいはずがない」"
translation = "「그러니까 인정할 수 없다고 말하는 거다. 설령 마계나 천계를 지키기 위해서였다고 해도, 인간계를 내버려 둬도 될 리가 없다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「だって俺たちは──戦えない人たちを守るために、星騎士になったんだから……！」"
translation = "「왜냐하면 우리들은── 싸울 수 없는 사람들을 지키기 위해서, 성기사가 된 거니까……!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「クロト……」"
translation = "「쿠로토…….」"

[[dialogue]]
speaker = "unk"
original = "俺だって昔は力がなかった。モンスターに襲われてばかりだった。"
translation = "나도 옛날에는 힘이 없었다. 몬스터에게 습격당하기만 했다."

[[dialogue]]
speaker = "unk"
original = "でも、そんな俺だからこそ、同じような人々を救いたいと願った──そう思えるようになったんだ。"
translation = "하지만, 그런 나였기에, 똑같은 사람들을 구하고 싶다고 바랐다── 그렇게 생각할 수 있게 되었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「だから……俺たちの住むこの街を、世界を──他の何かの犠牲になんて、差し出せるわけないだろう！」"
translation = "「그러니까…… 우리들이 사는 이 도시를, 세계를── 다른 무언가의 희생으로, 내줄 리가 없잖아!」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "？？？"
original = "『強くあれ。世界を取り込まんとする力に、決して飲まれることなきように』"
translation = "『강해져라. 세계를 집어삼키려는 힘에, 결코 휩쓸리지 않도록.』"

[[dialogue]]
speaker = "？？？"
original = "『君の両手には……他者を救う温かさが宿っている』"
translation = "『너의 양손에는…… 타인을 구하는 따뜻함이 깃들어 있다.』"

[[dialogue]]
speaker = "unk"
original = "いつか、俺が初めて出会った星の輝き。"
translation = "언젠가, 내가 처음 만났던 별의 반짝임."

[[dialogue]]
speaker = "unk"
original = "その道しるべは不幸な形で途絶えてしまったけれど──かつて感じた光の尊さだけは、真実だったと信じている。"
translation = "그 이정표는 불행한 형태로 끊어져 버렸지만── 예전에 느꼈던 빛의 고귀함만은, 진실이었다고 믿고 있다."

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「あたしは……リクリエに抗う星騎士たちに憧れて学園に入った。ま、新星は落ちちまったんだけど」"
translation = "「나는…… 리크리에에 맞서는 성기사들을 동경해서 학원에 들어왔다. 뭐, 신성은 떨어져 버렸지만.」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「うちも、世界の終わりなんて無視できなかった。星徒会に入ったのは、当時の会長に根負けして……かな」"
translation = "「나도, 세상의 종말 같은 건 무시할 수 없었다. 성도회에 들어간 건, 당시 회장에게 끈질김에 져서……일까.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「私は──大学への推薦を蹴って、新星学園への留学を決めました。自分の知らない世界がどこまで広がっているか知りたくて」"
translation = "「저는── 대학 추천을 거절하고, 신성 학원으로 유학을 결정했습니다. 제가 모르는 세계가 어디까지 펼쳐져 있는지 알고 싶어서요.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「私も近いかしら。魔界で出会った一冊の本が、私をここまで導いてくれたわ」"
translation = "「저도 비슷할까요. 마계에서 만난 한 권의 책이, 저를 여기까지 이끌어 주었어요.」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「初めて見る人間界は、もうびっくりの連続で……！\u3000ですがここで過ごすうちに、どんどん大切な場所になっていきました」"
translation = "「처음 보는 인간계는, 정말 깜짝 놀랄 일의 연속으로……! 하지만 여기서 지내는 동안, 점점 소중한 장소가 되어갔습니다.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「同感です。温暖な気候──最初はそれが好ましいだけの異界の地でしたが、ここを守りたいと願うのにそう時間は要りませんでした」"
translation = "「동감입니다. 온난한 기후── 처음에는 그것이 좋을 뿐인 이계의 땅이었지만, 이곳을 지키고 싶다고 바라는데 그리 오랜 시간이 걸리지 않았습니다.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「私はー……えっと、附属からのエスカレーターで。星術が使えるなら、世界を守れるならそれがいいよねって。弟はどうだか知らないけど……」"
translation = "「나는ー…… 으음, 부속학교에서 에스컬레이터로. 성술을 쓸 수 있다면, 세계를 지킬 수 있다면 그게 좋겠지 하고. 동생은 어떤지 모르겠지만…….」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「私はもちろん──クロトって魔王を目覚めさせるために。そして、絶対にリクリエを止めるために」"
translation = "「나는 물론── 쿠로토라는 마왕을 깨우기 위해서. 그리고, 절대로 리크리에를 막기 위해서.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "出身も性格もバラバラな俺たちだけど、たったひとつの願いを抱いてここまできた。"
translation = "출신도 성격도 제각각인 우리들이지만, 단 하나의 소원을 품고 여기까지 왔다."

[[dialogue]]
speaker = "unk"
original = "そして──"
translation = "그리고──"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「私は──姉の意志を継ぎ、魔王として世界を救うために」"
translation = "「저는── 언니의 의지를 잇고, 마왕으로서 세계를 구하기 위해서.」"

[[dialogue]]
speaker = "unk"
original = "誰よりも強い覚悟を抱いた彼女もまた、同じ地平を目指して。"
translation = "누구보다 강한 각오를 품은 그녀 역시, 같은 지평을 향해서."

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「──貴様たちの誇りはわかった。それを踏みにじるつもりはない。だが、現実は動かしようもあるまい」"
translation = "「──귀관들의 긍지는 알겠다. 그것을 짓밟을 생각은 없다. 하지만, 현실은 움직일 수 없을 것이다.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「この状況下では貴様以外、まともに星術すらも使えない──」"
translation = "「이 상황에서는 귀관 외에는, 제대로 성술조차도 쓸 수 없다──」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「いや──まだ手はある。アナ、フィオナ」"
translation = "「아니── 아직 방법은 있다. 아나, 피오나.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ええ。つい今しがた、準備は整ったようです」"
translation = "「예. 방금 막, 준비는 끝난 것 같습니다.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「すぅ──参りましょうか」"
translation = "「후우── 가볼까요.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker = "unk"
original = "アナからＧＯのサインを受けて、俺は全霊を全身に込める。"
translation = "아나에게서 GO 사인을 받고, 나는 전력을 전신에 담는다."

[[dialogue]]
speaker = "unk"
original = "そして俺は──<b>地に手をつけた</b>。"
translation = "그리고 나는── <ruby>땅에 손을 짚었다<rt>・・ ・・ ・・・</rt></ruby>."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「スターライン構築──地脈、解放」"
translation = "「스타 라인 구축── 지맥, 해방.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「何……？」"
translation = "「뭐……?」"

[[dialogue]]
speaker = "unk"
original = "俺が手のひらをつけた地点から──ぶわりと、広がっていく切なる光。"
translation = "내가 손바닥을 짚은 지점에서── 확 하고, 퍼져나가는 간절한 빛."

[[dialogue]]
speaker = "unk"
original = "そして……"
translation = "그리고…….」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「──あ、あれっ？\u3000星術が……使えるようになってるかも！」"
translation = "「──아, 어라? 성술이…… 쓸 수 있게 된 것 같아!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ええ。ですが、いつもと感覚が違うような……」"
translation = "「예. 하지만, 평소와 감각이 다른 듯한…….」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「星力の復活……？\u3000何をした……？」"
translation = "「성력의 부활……? 무슨 짓을 한 거지……?」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「天蓋は元のまま、ですが──」"
translation = "「천개는 원래 그대로입니다만──」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「繋げたんだ。他の領域と」"
translation = "「연결했다. 다른 영역과.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「繋げた──だと？」"
translation = "「연결했다──고?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ。天蓋が覆っているのは流星市国一帯。けど、それにしたって人間界の一部にすぎない」"
translation = "「아아. 천개가 덮고 있는 건 유성 시국 일대. 하지만, 그렇다고 해도 인간계의 일부에 지나지 않는다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「地球は丸い。だからこうして──天蓋の影響を受けていない地域から、星の力を<b>汲み上げる</b>」"
translation = "「지구는 둥글다. 그래서 이렇게── 천개의 영향을 받지 않는 지역에서, 별의 힘을 <b>끌어올린다</b>.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "unk"
original = "今まさに両足をつけている地上から、星々の波動が噴き上がってくる。"
translation = "지금 막 양발을 딛고 있는 지상에서, 별들의 파동이 솟아오른다."

[[dialogue]]
speaker = "unk"
original = "天蓋の範囲外にある国々と地脈を繋げることで──間接的に星との交信を可能にする荒業だった。"
translation = "천개의 범위 밖에 있는 나라들과 지맥을 연결함으로써── 간접적으로 별과의 교신을 가능하게 하는 묘책이었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「流星市国も、他の外国も、地球の裏側だって──みんな同じ空を見上げてる。この地脈は、それを共有するものだ」"
translation = "「유성 시국도, 다른 외국도, 지구 반대편도── 모두 같은 하늘을 올려다보고 있다. 이 지맥은, 그것을 공유하는 것이다.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「各国の支部に連絡し──アンテナを設けてもらいました。天蓋への対策は、全星騎士にとっての急務でしたので」"
translation = "「각국의 지부에 연락하여── 안테나를 설치하도록 했습니다. 천개에 대한 대책은, 모든 성기사에게 있어서 급선무였으니까요.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「私たち星騎士の思いはひとつです。この世界を救うために、戦っている」"
translation = "「우리 성기사들의 마음은 하나입니다. 이 세계를 구하기 위해, 싸우고 있습니다.」"

[[dialogue]]
speaker = "unk"
original = "天でダメなら、地を伝う。"
translation = "하늘이 안 된다면, 땅을 타고 전한다."

[[dialogue]]
speaker = "unk"
original = "地球そのものの地脈を通じて、俺たちだけじゃない他の星騎士たちもある程度の力を取り戻せたはず。"
translation = "지구 그 자체의 지맥을 통해서, 우리들뿐만이 아닌 다른 성기사들도 어느 정도의 힘을 되찾았을 것이다."

[[dialogue]]
speaker = "unk"
original = "フィオナには霊力と魔力を使って、俺という支柱を強化してもらっていた。"
translation = "피오나에게는 영력과 마력을 사용하여, 나라는 지주를 강화하도록 하고 있었다."

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「いつもの星の力が……下から湧き上がってくる、って感じかな」"
translation = "「평소의 별의 힘이…… 아래에서 솟아오르는, 그런 느낌일까.」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ふえぇ、なんか不思議な感じです！」"
translation = "「후에에, 뭔가 신기한 느낌이에요!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「でも……これなら戦えるよ！」"
translation = "「하지만…… 이거라면 싸울 수 있어!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「はい。普段の感覚と違うので、やりづらいとは思いますが──なんとか対応してください」"
translation = "「네. 평소의 감각과 다르므로, 다루기 어렵다고는 생각하지만── 어떻게든 대응해 주세요.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「さらに言えば、今──アポロはフィーニスの塔のてっぺんにいる。でもって、フィーニスの塔ってやつは、この地球上と<b>地続き</b>だ」"
translation = "「게다가 말하자면, 지금── 아폴로는 피니스의 탑 꼭대기에 있다. 그리고, 피니스의 탑이라는 건, 이 지구상과 <ruby>땅이 이어져 있다<rt>・・ ・・・ ・・</rt></ruby>.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「希望はある。セドナさん。俺たちはまだ折れちゃいない」"
translation = "「희망은 있다. 세드나 씨. 우리들은 아직 꺾이지 않았다.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「……フ。なるほど。確かに、従来の８割程度の出力には迫れているようだ」"
translation = "「……흥. 과연. 확실히, 종래의 8할 정도의 출력에는 근접한 것 같군.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「だが──それしきで万事解決とはいくまい。そもそも十全を尽くしてなお、ここに墜ちてきたのだろう？」"
translation = "「하지만── 그 정도로는 만사 해결은 되지 않을 것이다. 애초에 전력을 다하고도, 여기에 추락했던 것이 아닌가?」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「ッ……そいつは……」"
translation = "「읏…… 그건…….」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「喜ばしいことではあろう。せっかく幾ばくかの力を復旧させたなら、精々残った人命救助に使うといい」"
translation = "「기쁜 일이기는 하겠지. 모처럼 얼마간의 힘을 복구시켰다면, 기껏해야 남은 인명 구조에 쓰는 것이 좋을 것이다.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「だが──『使徒』の始末は我々が請け負う。これは最も公算の高い決定事項だ」"
translation = "「하지만── 『사도』의 처리는 우리들이 맡는다. 이것은 가장 공산이 높은 결정 사항이다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──アポロをどうするつもりだ」"
translation = "「──아폴로를 어떻게 할 생각이지?」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「愚問。この機に封殺する。我々全員の命に代えても」"
translation = "「어리석은 질문. 이 기회에 봉살한다. 우리들 전원의 목숨을 걸고서라도.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「……っ……！」"
translation = "「……읏……!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「目的がリクリエのやり過ごしなら──当然、そうなりますよね」"
translation = "「목적이 리크리에를 넘기는 것이라면── 당연히, 그렇게 되겠죠.」"

[[dialogue]]
speaker = "unk"
original = "リクリエの使徒──アポロは厄災の力が結集されている存在。今も進行形で増幅し続けている。"
translation = "리크리에의 사도── 아폴로는 재앙의 힘이 결집되어 있는 존재. 지금도 진행형으로 증폭을 계속하고 있다."

[[dialogue]]
speaker = "unk"
original = "よって、彼女さえこの人間界に封じ込めてしまえば……魔界と天界にとっては防衛を果たしたことになる。そんな公算だという。"
translation = "따라서, 그녀만 이 인간계에 봉인해 버린다면…… 마계와 천계에게는 방위를 달성한 것이 된다. 그런 공산이라고 한다."

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「──『リクリエの使徒』について報告します」"
translation = "「──『리크리에의 사도』에 대해 보고하겠습니다.」"

[[dialogue]]
speaker = "unk"
original = "その時、アイリーンさんが歩み出て手元のレポートを読み上げた。"
translation = "그때, 아이린 씨가 걸어 나와 손에 든 보고서를 읽어 내렸다."

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「『使徒』の本質はいわば『代行者』。本来、意思を持たないはずのリクリエ現象に、一定の指向性を持たせるためのシステムです」"
translation = "「『사도』의 본질은 말하자면 『대행자』. 본래, 의사를 가지지 않아야 할 리크리에 현상에, 일정한 지향성을 부여하기 위한 시스템입니다.」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「これは──あのアポロと名乗る少女が自らをヒーローと称していたことからも明らかです」"
translation = "「이것은── 그 아폴로라고 자칭하는 소녀가 스스로를 히어로라고 칭했던 것에서도 명확합니다.」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「リクリエによる世界の再創生を使命と<ruby>肯<rt>がえ</rt></ruby>んずること。これは、通常のヒトではありえない思考ですから」"
translation = "「리크리에에 의한 세계의 재창생을 사명으로 여기는 것. 이것은, 통상의 인간으로서는 있을 수 없는 사고방식이니까요.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「待て──それはアポロの本当の思考じゃない」"
translation = "「기다려── 그건 아폴로의 진짜 생각이 아니다.」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「ええ。それもわかっています。力の根源はあの仮面……仮面の発する瘴気によって、精神まで操られているのでしょう」"
translation = "「예. 그것도 알고 있습니다. 힘의 근원은 저 가면…… 가면이 내뿜는 장기에 의해, 정신까지 조종당하고 있는 것이겠지요.」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「そして少女の肉体には、ここならぬ平行世界からの干渉の痕跡が見られます。もっとも、その出自については不透明な部分が多いですが」"
translation = "「그리고 소녀의 육체에는, 이곳이 아닌 평행 세계로부터의 간섭 흔적이 보입니다. 가장 중요한 것은, 그 출신에 대해서는 불투명한 부분이 많습니다만.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（ネビュラはそこまで掴んでいたのか……）"
translation = "（네뷸라는 거기까지 파악하고 있었던 건가……）"

[[dialogue]]
speaker = "unk"
original = "アポロの肉体は本来デネブにいた星見姉のものだ。"
translation = "아폴로의 육체는 본래 데네브에 있던 호시미 언니의 것이다."

[[dialogue]]
speaker = "unk"
original = "だが、平行世界の存在をさらって使徒化させるという仕組みまでは、さすがのネビュラも解明しきれていないようだ。"
translation = "하지만, 평행 세계의 존재를 납치하여 사도화시킨다는 구조까지는, 역시 네뷸라도 완전히 해명하지 못한 것 같다."

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「そして、先ほど……あなた方が『使徒』と対峙した後。『使徒』の出力がさらに強まったのを確認しました」"
translation = "「그리고, 방금 전…… 당신들이 『사도』와 대치한 후. 『사도』의 출력이 더욱 강해진 것을 확인했습니다.」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「この、偶発的に生じた『代行者』という機構は──私たちにとって悪くない展開です」"
translation = "「이, 우발적으로 발생한 『대행자』라는 기구는── 우리들에게 있어서 나쁘지 않은 전개입니다.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……なるほど。おおよそ考えは読めました。厄災の出力が『使徒』に集中するのなら、むしろ好都合と捉えているのですね」"
translation = "「……과연. 대략적인 생각은 읽었습니다. 재앙의 출력이 『사도』에게 집중된다면, 오히려 호재로 여기고 있는 것이군요.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「いかにも──全世界で未曾有の怪異が多発するよりは与し易いだろう」"
translation = "「당연하지── 전 세계에서 미증유의 괴이가 다발하는 것보다는 상대하기 쉬울 것이다.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「拡散の心配はなくとも、集約されたからこそのリスクは存在するはずですが──？」"
translation = "「확산의 걱정은 없다고 해도, 집약되었기에 발생하는 리스크는 존재할 텐데요──?」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「うむ。ゆえに、ぶつかり合いだな。これは死闘となろう」"
translation = "「음. 그러므로, 충돌이다. 이것은 사투가 될 것이다.」"

[[dialogue]]
speaker = "unk"
original = "本来、とらえどころがないはずのリクリエそのものと一騎打ちを果たせる──"
translation = "본래, 종잡을 수 없어야 할 리크리에 그 자체와 일기토를 벌일 수 있다──"

[[dialogue]]
speaker = "unk"
original = "代行者アポロの登場は、ネビュラにとって千載一遇の好機になったということらしい。"
translation = "대행자 아폴로의 등장은, 네뷸라에게 있어서 천재일우의 호기가 되었다는 것 같다."

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「──<b>もし</b>我々がかの使徒に、一方的に打ち克つようなことがあれば、人間界の被害は奇跡的に抑えられるかもしれない。それでも不服か？」"
translation = "「── <b>만약</b> 우리들이 저 사도에게, 일방적으로 이겨낼 수 있는 일이 있다면, 인간계의 피해는 기적적으로 억제될지도 모른다. 그래도 불만인가?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「そ、そんなもしもがあるの……？」"
translation = "「서, 설마 그런 가정이 있는 거야……?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "（奇跡、か──）"
translation = "（기적, 인가──）"

[[dialogue]]
speaker = "unk"
original = "ネビュラ全員の命に代えても始末するとセドナさんは言っていた。そちらのほうが真実であり、彼女らの覚悟だろう。"
translation = "네뷸라 전원의 목숨을 걸고서라도 처리한다고 세드나 씨는 말했다. 그쪽이 진실이며, 그녀들의 각오일 것이다."

[[dialogue]]
speaker = "unk"
original = "あくまで俺たちを収めるために、そう言っているのだとわかってしまったから……"
translation = "어디까지나 우리들을 잠재우기 위해서, 그렇게 말하고 있다는 것을 알아버렸기에…….」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ええ──不服です」"
translation = "「예── 불만입니다.」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「星見の……」"
translation = "「호시미의…….」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「あなた達のビジョンを否定はしません。ただ、それなら私たちのほうから<b>試す</b>べきです」"
translation = "「당신들의 비전을 부정하지는 않겠습니다. 다만, 그렇다면 우리들 쪽에서 <b>시험해야</b> 합니다.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「星騎士としてだけじゃなく。私は流星教皇庁に属する、星見の娘として──より多くの人々を救える可能性があるのなら、それに賭けなくてはなりません」"
translation = "「성기사로서뿐만이 아니라. 저는 유성 교황청에 소속된, 호시미의 딸로서── 더 많은 사람들을 구할 수 있는 가능성이 있다면, 그것에 걸어야만 합니다.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「より多くを救える可能性……？\u3000そんなものがどこにあるという」"
translation = "「더 많이 구할 수 있는 가능성……? 그런 것이 어디에 있다는 거지?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「あります。それは──姉さんに目を覚ましてもらうこと」"
translation = "「있습니다. 그것은── 언니에게 정신을 차리게 하는 것.」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「強大な使徒を<ruby>斃<rt>たお</rt></ruby>すより──使徒に、自分から剣を捨ててもらうほうが、いくぶんラクだと思いませんか？」"
translation = "「강대한 사도를 쓰러뜨리는 것보다── 사도에게, 스스로 검을 버리게 하는 편이, 훨씬 쉽다고 생각하지 않으세요?」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「ふぅ……まだ、そんな夢想を抱いているのか」"
translation = "「후우…… 아직, 그런 몽상을 품고 있는 건가.」"

[[dialogue]]
speaker_original = "カヤ"
speaker_translation = "카야"
original = "「姉さん……？\u3000ん……？」"
translation = "「언니……? 응……?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「リクリエの使徒──アポロの<ruby>魂魄<rt>こんぱく</rt></ruby>は私の姉のものです。私は、姉さんを取り戻すために戦っています」"
translation = "「리크리에의 사도── 아폴로의 혼백은 제 언니의 것입니다. 저는, 언니를 되찾기 위해 싸우고 있습니다.」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「お姉さんの……それは……」"
translation = "「언니의…… 그것은…….」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「よい。我々が心を砕くところではない、アイリーン」"
translation = "「됐다. 우리들이 신경 쓸 부분이 아니다, 아이린.」"

[[dialogue]]
speaker = "unk"
original = "目を伏せたアイリーンさんを、セドナさんが<ruby>庇<rt>かば</rt></ruby>うように立った。"
translation = "눈을 내리깐 아이린 씨를, 세드나 씨가 감싸듯이 섰다."

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「アレの正体については把握している──が。我々のなすべきは変わらない」"
translation = "「그것의 정체에 대해서는 파악하고 있다──만. 우리들이 해야 할 일은 변하지 않는다.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「使徒を救う。聞こえはよいが……それができなかったから、ここにいるのだろう？」"
translation = "「사도를 구한다. 듣기에는 좋지만…… 그것이 불가능했기에, 여기에 있는 것이 아닌가?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「っ……！」"
translation = "「읏……!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「フィオナ会長──」"
translation = "「피오나 회장──」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「青い。青すぎるな、星見の娘。姉も救う。世界も救う。そんな都合のいい理想が実現できると思っているのか！？」"
translation = "「어리석군. 너무나 어리석다, 호시미의 딸. 언니도 구한다. 세계도 구한다. 그런 형편 좋은 이상이 실현될 수 있다고 생각하는 건가!?」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「い、言わせておけばニャン……！\u3000フィオナ嬢がどんな気持ちかも知らニャいで……！」"
translation = "「마, 말하게 놔두면 냥……! 피오나 아가씨가 어떤 마음인지도 모르냥……!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ふふ……いいんですよ、ニャリオン。だって私も最初は、できっこないと思っていましたから」"
translation = "「후후…… 괜찮아요, 냐리온. 저도 처음에는, 불가능할 거라고 생각했으니까요.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ですが、それでも……みんなが背中を押してくれるから。意固地だった私も、少しは変われたんです」"
translation = "「하지만, 그럼에도…… 모두가 등을 밀어주니까. 고집불통이었던 저도, 조금은 변할 수 있었어요.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ねえ、ヴィーナスさん？」"
translation = "「있죠, 비너스 씨?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ふふっ──そうね。私たちの前で、あんな選択は許さないわ」"
translation = "「후훗── 그렇네. 우리들 앞에서, 그런 선택은 용서하지 않아.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「大人ぶって、自分に嘘ついて、何もかも受け入れようなんて……そんなのただの、テイのいいおサボりでしかないんだから！」"
translation = "「어른인 척하며, 자신에게 거짓말하고, 모든 것을 받아들이려 하다니…… 그런 건 그저, 그럴싸한 핑계일 뿐이니까!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「仮面の少女アポロを抹殺します──願わくは、私自ら、この手で」"
translation = "「가면의 소녀 아폴로를 말살하겠습니다── 바라건대, 저 스스로, 이 손으로.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「星騎士として。星徒会として。リクリエから世界を守るために、その使徒を排除しないなんてありえません」"
translation = "「성기사로서. 성도회로서. 리크리에로부터 세계를 지키기 위해, 그 사도를 배제하지 않는다는 것은 있을 수 없습니다.」"

[[dialogue]]
speaker = "unk"
original = "星見フィオナという運命を受け入れた少女がかつて下した決断。"
translation = "호시미 피오나라는 운명을 받아들인 소녀가 예전에 내렸던 결단."

[[dialogue]]
speaker = "unk"
original = "それは、本来なら、利口な振る舞いだったのかもしれないけど。"
translation = "그것은, 본래라면, 현명한 행동이었을지도 모르지만."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「姉も、世界も、救いたい。本当に……どうしようもないほど、甘ったれた考えです。姉さんについては一度、諦めたはずなのに」"
translation = "「언니도, 세계도, 구하고 싶다. 정말로…… 어찌할 도리 없을 정도로, 나약한 생각입니다. 언니에 대해서는 한 번, 포기했을 터인데.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「でも──信じた仲間が言うんです。素直な私でいいんだって。我がままでも、迷惑かけてもいいんだって」"
translation = "「하지만── 믿는 동료가 말해줍니다. 솔직한 나여도 괜찮다고. 제멋대로여도, 폐를 끼쳐도 괜찮다고.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「なら私は……どれだけ恥知らずになったって構わない。それが、今の私の覚悟だから」"
translation = "「그렇다면 저는…… 아무리 뻔뻔스러워진다고 해도 상관없습니다. 그것이, 지금의 제 각오이니까요.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "これまで辿ってきた後悔を滲ませながらも、フィオナは凛と胸を張る。"
translation = "지금까지 걸어왔던 후회를 내비치면서도, 피오나는 당당하게 가슴을 편다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「セドナさん。こういうのはどうでしょうか」"
translation = "「세드나 씨. 이런 건 어떻습니까?」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「何？」"
translation = "「뭐지?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「たとえ魔王が１人いても──とあなたは仰りました。ですが、２人なら？」"
translation = "「설령 마왕이 한 명 있다고 해도──라고 당신은 말씀하셨습니다. 하지만, 두 명이라면요?」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「自分を頭数に入れるつもりか？\u3000だが……見たところ、貴様の『器』としての完成度は緋宮クロトには遠く及んでいない」"
translation = "「자신을 인원수에 넣을 생각인가? 하지만…… 보아하니, 귀관의 『그릇』으로서의 완성도는 히노미야 쿠로토에게는 한참 미치지 못한다.」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ふむ。そうだな、まだまだ発展途上とみえる」"
translation = "「흠. 그렇군, 아직 발전 도상으로 보이는군.」"

[[dialogue]]
speaker = "unk"
original = "魔女である彼女たちには俺たちの有する魔力量も恐らく見切られている。"
translation = "마녀인 그녀들에게는 우리들이 가진 마력량도 아마 간파당하고 있을 것이다."

[[dialogue]]
speaker = "unk"
original = "学園長との戦いを通じて、最終的な覚醒へ至った俺とフィオナとでは明確な差があった。"
translation = "학원장과의 싸움을 통해, 최종적인 각성에 이른 나와 피오나와는 명확한 차이가 있었다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ええ。確かに……今の私ではまだ未熟。姉さんの仮面を砕くには、とても足りませんでした」"
translation = "「예. 확실히…… 지금의 저로서는 아직 미숙합니다. 언니의 가면을 부수기에는, 턱없이 부족했습니다.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「でも──だからこそ、姉さんに会う必要があるのです」"
translation = "「하지만── 그렇기에, 언니를 만날 필요가 있는 것입니다.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「何……？\u3000どういうことだ」"
translation = "「뭐……? 무슨 뜻이지?」"

[[dialogue]]
speaker = "unk"
original = "未熟だからこそ、強大な敵と相まみえたい。"
translation = "미숙하기에, 강대한 적과 마주하고 싶다."

[[dialogue]]
speaker = "unk"
original = "一見矛盾して聞こえるその言説──だけど俺には、その真意もわかった。"
translation = "언뜻 모순되게 들리는 그 언설── 하지만 나는, 그 진의도 알았다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「緋宮会長は──かけがえのない家族のために、<ruby>裡<rt>うち</rt></ruby>に眠る魔王の器を覚醒させました」"
translation = "「히노미야 회장님은── 둘도 없는 가족을 위해서, 속에 잠든 마왕의 그릇을 각성시켰습니다.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「もし、私にも、魔王としての血が流れているのなら」"
translation = "「만약, 저에게도, 마왕으로서의 피가 흐르고 있다면.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「私にとっての最後の鍵はきっと──姉さん。アポロが握っているはずだからです」"
translation = "「저에게 있어서 마지막 열쇠는 분명── 언니. 아폴로가 쥐고 있을 것이기 때문입니다.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「……！！」"
translation = "「……!!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「フィオナ……そっか……私にとってのクロトは、アポロにとっての……」"
translation = "「피오나…… 그렇구나…… 나에게 있어서의 쿠로토는, 아폴로에게 있어서의……」"

[[dialogue]]
speaker = "unk"
original = "それは──アポロがアポロである限り、決して果たされぬ願い。"
translation = "그것은── 아폴로가 아폴로인 한, 결코 이루어질 수 없는 소원."

[[dialogue]]
speaker = "unk"
original = "あの仮面を乗り越えて姉を取り戻し、そしてフィオナ本人までもが覚醒へ至る。"
translation = "저 가면을 극복하고 언니를 되찾고, 그리고 피오나 본인까지도 각성에 이른다."

[[dialogue]]
speaker = "unk"
original = "かつてない未知の可能性への賭けだった。"
translation = "전례 없는 미지의 가능성에 대한 도박이었다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「束の間でも──仮面を割って、姉さんの正気を取り戻す」"
translation = "「잠깐이라도── 가면을 깨고, 언니의 제정신을 되찾는다.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「そして、わずかでも声を届かせたなら。わずかでも姉さんの本心を聴けたなら。私はきっと、眠れる血を引き出せる気がするんです」"
translation = "「그리고, 아주 조금이라도 목소리를 닿게 할 수 있다면. 아주 조금이라도 언니의 본심을 들을 수 있다면. 저는 분명, 잠든 피를 끌어낼 수 있을 것 같은 기분이 듭니다.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「そして私と緋宮会長──２人の完全な魔王で使徒の仮面を破壊する。それが、私の描くリクリエの終わりです」"
translation = "「그리고 저와 히노미야 회장님── 두 명의 완전한 마왕으로 사도의 가면을 파괴한다. 그것이, 제가 그리는 리크리에의 끝입니다.」"

[[dialogue]]
speaker_original = "カヤ"
speaker_translation = "카야"
original = "「……そっちの方が、よほど無茶」"
translation = "「……그쪽이, 훨씬 무리.」"

[[dialogue]]
speaker_original = "アイリーン"
speaker_translation = "아이린"
original = "「過程も、結果も……何もかも希望的観測にすぎません。不確定要素が多すぎます……！」"
translation = "「과정도, 결과도…… 모든 것이 희망적 관측에 불과합니다. 불확정 요소가 너무 많습니다……!」"

[[dialogue]]
speaker_original = "クラウディア"
speaker_translation = "클라우디아"
original = "「ふうむ……」"
translation = "「흐음……」"

[[dialogue]]
speaker = "unk"
original = "彼女たちの言う通り──フィオナのプランは不確かな青写真にすぎない。"
translation = "그녀들이 말하는 대로── 피오나의 계획은 불확실한 청사진에 불과하다."

[[dialogue]]
speaker = "unk"
original = "それでも、クラウディアさえも鼻白んだことが、フィオナの発する気迫が本物だったことを示している。"
translation = "그럼에도, 클라우디아조차도 어이없어했다는 것이, 피오나가 내뿜는 기백이 진짜였음을 보여주고 있다."

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「姉妹の絆を通じて、己の覚醒と使徒の無力化を同時に行う──か。なんとも都合のよいことだ」"
translation = "「자매의 인연을 통해, 자신의 각성과 사도의 무력화를 동시에 행한다──라. 참으로 형편 좋은 일이군.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「──話にならない。聡い娘だと思っていたが……そのような荒唐無稽に傾倒するのは賭けとすら呼べん。根拠なき願望だ」"
translation = "「──말도 안 돼. 영리한 딸이라 생각했는데…… 그러한 황당무계에 경도되는 것은 도박이라고조차 부를 수 없다. 근거 없는 희망이다.」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「かもしれませんね。ですが、奇跡とはそういうものでしょう？」"
translation = "「그럴지도 모르겠네요. 하지만, 기적이란 그런 것이지 않습니까?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「姉さんを解放できるとすれば、それは地上にたった１人……私にしか背負えない役目なのですから！」"
translation = "「언니를 해방시킬 수 있다고 한다면, 그것은 지상에 단 한 명…… 저만이 짊어질 수 있는 역할이니까요!」"

[[dialogue]]
speaker = "unk"
original = "一触即発──そんな空気の中で。"
translation = "일촉즉발── 그런 분위기 속에서."

