[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「はじめましての人はこんにちは。お久しぶりの人もいるかも？\u3000流星学園生徒会の九浄リアですっ」"
translation = "「처음 뵙는 분들은 안녕하세요. 오랜만인 분들도 있을까요? 유성 학원 성도회의 쿠죠 리아입니다!」"

[[dialogue]]
speaker_original = "聖沙"
speaker_translation = "미사"
original = "「流星生徒会（ふく）会長の聖沙・Ｂ・クリステレスよ。そして私たちは──」"
translation = "「유성 성도회 부회장인 미사 B 크리스테레스야. 그리고 우리는──」"

[[dialogue]]
speaker_original = "聖沙"
speaker_translation = "미사"
original = "「流星町の平和を守る『流星クルセイダース』の一員なのよ！」"
translation = "「유성 마을의 평화를 지키는 『유성 크루세이더스』의 일원이지!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「３０００年前、私たちの世界を救った戦士たちと同じ名前を持っているんですね」"
translation = "「3000년 전, 우리 세계를 구한 전사들과 같은 이름을 가지고 있군요」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「え～と、みんなは<ruby>星騎士<rt>スターナイト</rt></ruby>っていうんだっけ。星の力で戦うって、なんだかかっこいいな」"
translation = "「에~ 그러니까, 너희는 성기사라고 했던가. 별의 힘으로 싸운다니 왠지 멋지네」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「ちなみに私たちクルセイダースは、ロザリオに宿った守護天使の力を借りてるんだよ」"
translation = "「참고로 우리 크루세이더스는 로자리오에 깃든 수호 천사의 힘을 빌리고 있어」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「へぇ～、こっちの世界の守護天使は、私たちの世界のとは違うのね。さすがリアさん、物知りだわ」"
translation = "「헤에~ 이쪽 세계의 수호 천사는 우리 세계와는 다르네. 역시 리아 씨, 아는 게 많아」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「えっへん。元生徒会長ですから」"
translation = "「에헴. 전 학생회장이니까요」"

[[dialogue]]
speaker_original = "聖沙"
speaker_translation = "미사"
original = "「私たち流星クルセイダースと、あなたたち星騎士が顔を合わせたなら道はひとつ──どちらが強いか、勝負よ！」"
translation = "「우리 유성 크루세이더스와 당신들 성기사가 마주했다면 길은 하나── 어느 쪽이 강한지 승부야!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ふっふっふ、受けて立つわ！\u3000星騎士の代表として逃げるわけにはいかないわ！」"
translation = "「훗훗훗, 받아주지! 성기사의 대표로서 도망칠 수는 없으니까!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ヴィーナスさんまで！？」"
translation = "「비너스 씨까지!?」"

[[dialogue]]
speaker_original = "パッキー"
speaker_translation = "팟키"
original = "「おうおう、ヒスは相変わらず血の気が多いな～。バーサーカーかよ」"
translation = "「오오, 히스는 여전히 혈기가 넘치네~. 버서커냐」"

[[dialogue]]
speaker_original = "聖沙"
speaker_translation = "미사"
original = "「パッキーさん！\u3000でも私はバーサーカーじゃないわ！」"
translation = "「팟키 씨! 하지만 난 버서커가 아니야!」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「怪我するといけないし、わんこそばとかで勝負すればいいんじゃないかな」"
translation = "「다치면 안 되니까 완코소바 같은 걸로 승부하면 되지 않을까」"

[[dialogue]]
speaker_original = "聖沙"
speaker_translation = "미사"
original = "「さすがお姉さま！\u3000じゃあ尋常に……わんこそば勝負よ！」"
translation = "「역시 언니! 그럼 정정당당하게…… 완코소바 승부야!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ええ、負けないわよ！\u3000フィーニスの塔のようにお椀を積み上げてやるわ！」"
translation = "「그래, 지지 않아! 피니스 탑처럼 그릇을 쌓아 올려주지!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「うーん……わんこそばだとクルセイダースも星騎士も関係ないような……でも平和なのが一番ですね」"
translation = "「으음…… 완코소바라면 크루세이더스도 성기사도 상관없는 것 같은데…… 그래도 평화로운 게 제일이죠」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ですですっ。わたしたち流星クルセイダースと仲良くしてくださいね、星騎士のみなさん♪」"
translation = "「맞아요 맞아요. 저희 유성 크루세이더스와 사이좋게 지내주세요, 성기사 여러분♪」"

[[dialogue]]
speaker_original = "聖沙"
speaker_translation = "미사"
original = "「えっ、あなたは星騎士よね？\u3000クルセイダースじゃないんじゃ……？」"
translation = "「엣, 넌 성기사잖아? 크루세이더스가 아니라……?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ええっ、副会長さん、ルリエル・ローゼンクロイツのことを忘れたのですか！？\u3000ひどいですよ～！？」"
translation = "「에엣, 부회장님, 루리엘 로젠크로이츠를 잊은 거예요!? 너무해요~!?」"

[[dialogue]]
speaker_original = "聖沙"
speaker_translation = "미사"
original = "「いや、ローゼンクロイツはロロットさんの名字で……いったいどういうこと……？」"
translation = "「아니, 로젠크로이츠는 로롯토 씨의 성씨인데…… 대체 어떻게 된 일이지……?」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「どうやらただ事じゃないことが起きる予感……！」"
translation = "「아무래도 예사롭지 않은 일이 일어날 예감……!」"

[[dialogue]]
speaker_original = "リア"
speaker_translation = "리아"
original = "「１１月１４日をお楽しみに～♪」"
translation = "「11월 14일을 기대해 주세요~♪」"

