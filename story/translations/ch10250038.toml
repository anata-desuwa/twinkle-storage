[[dialogue]]
speaker = "unk"
original = "流星寮のクリスマスパーティーは無事終了した。"
translation = "유성 기숙사의 크리스마스 파티는 무사히 종료되었다."

[[dialogue]]
speaker = "unk"
original = "恋人の舞亜と一緒に後片付けをしていたら、かなり遅い時間になってしまった。"
translation = "연인인 마아와 함께 뒷정리를 하다 보니 꽤 늦은 시간이 되어버렸다."

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「クリスマスパーティー、楽しかったな～。実行委員として頑張った甲斐があったよ」"
translation = "「크리스마스 파티, 즐거웠어~. 실행 위원으로서 열심히 한 보람이 있었네」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「会長さんはどうだった？\u3000楽しかった？\u3000なーんて聞くまでもないか」"
translation = "「회장님은 어땠어? 즐거웠어? 나 참, 물어볼 필요도 없나」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「私もちょっとはしゃぎすぎちゃったかな。スケートでピザを配りまくってたから、さすがに疲れたかも」"
translation = "「나도 좀 너무 들떴나 봐. 스케이트를 타고 피자를 계속 돌렸으니까 역시 좀 피곤할지도」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「お疲れさま。大活躍だったね」"
translation = "「수고했어. 대활약이었지」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「うん……私もアニュラスもアポロちゃんも。みんなみんな頑張った」"
translation = "「응…… 나도 아뉴라스도 아폴로 짱도. 모두 모두 열심히 했어」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ということで、ささやかな打ち上げを、会長さんに提案したいと思います」"
translation = "「그런 의미에서 소박한 뒤풀이를 회장님께 제안하고 싶습니다」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「このまま解散したくないなって思うし……どう？\u3000私の部屋、来ない？」"
translation = "「이대로 헤어지고 싶지 않기도 하고…… 어때? 내 방에 오지 않을래?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「じゃあ、せっかくだしお邪魔しようかな」"
translation = "「그럼 기왕 이렇게 된 거 실례 좀 할까」"

[[dialogue]]
speaker = "unk"
original = "舞亜の誘いに胸が高鳴る。"
translation = "마아의 유혹에 가슴이 고동친다."

[[dialogue]]
speaker = "unk"
original = "甘い期待に胸を膨らませながら、俺は流星寮の舞亜の部屋へ招かれた。"
translation = "달콤한 기대에 가슴을 부풀리며 나는 유성 기숙사의 마아 방으로 초대받았다."

[[dialogue]]
speaker = "unk"
original = "そして──"
translation = "그리고──"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「柊舞亜のクリスマスフォーム……の、エッチバージョンだよ<emoji=heart04>」"
translation = "「히이라기 마아의 크리스마스 폼…… 의, 섹스 버전이야♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「クリスマスフォームでしたいのかなって思って期待に応えてみたんだけど、大股開きにされちゃって……ちょっと恥ずかしいかな<emoji=heart04>」"
translation = "「크리스마스 폼으로 하고 싶은 걸까 싶어서 기대에 부응해 봤는데, 다리가 쩍 벌려져 버려서…… 조금 부끄러울지도♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「初めてじゃないけどね。舐めてもらう時とか……でもこんなにガバッと脚開いておま○こ見せるのは恥ずかしすぎだよ<emoji=heart04>」"
translation = "「처음은 아니지만 말이야. 핥아줄 때라든가…… 하지만 이렇게 홱 다리를 벌리고 보지를 보여주는 건 너무 부끄러워♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「もう濡れちゃってるし……でも、部屋に入る前から、ちょっと濡れてたんだよ？」"
translation = "「벌써 젖어버렸고…… 그치만, 방에 들어오기 전부터 조금 젖어 있었어?」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「エッチな彼女でごめんね。でも、２人きりになったらエッチすることになるって考えたら……自然と濡れちゃった<emoji=heart04>」"
translation = "「야한 여자친구라서 미안해. 하지만, 둘만 있게 되면 야한 짓을 하게 될 거라고 생각하니까…… 자연스럽게 젖어버렸어♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「もう開き直ってるんだから。ここまで連れ込んじゃったし、今更隠してもしょうがないよね」"
translation = "「이제 될 대로 되라는 식이니까. 여기까지 끌어들였고, 이제 와서 숨겨도 소용없겠지」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「今日は会長さんとたくさんエッチしたい<emoji=heart04>\u3000普段あんまり出来ない分もまとめて……私のこと、愛してくれる？」"
translation = "「오늘은 회장님이랑 잔뜩 야한 짓 하고 싶어♥ 평소에 별로 못한 만큼 몰아서…… 나를 사랑해 줄래?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「いいよ。いっぱいエッチしようか」"
translation = "「좋아. 잔뜩 야한 짓 할까」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「えへへ……やったぁ。言葉だけじゃなく、こっちの方もすっかりその気になってるね<emoji=heart04>」"
translation = "「에헤헤…… 만세. 말뿐만 아니라, 이쪽도 완전히 그럴 기분이 됐네♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「会長さんのおち○ちん……すごくおっきい<emoji=heart04>\u3000エッチな私を見て、興奮しちゃった？」"
translation = "「회장님의 자지…… 엄청 커♥ 야한 나를 보고 흥분해 버렸어?」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ふふっ、早く入りたいよ～ってビクンビクンしてる<emoji=heart04>\u3000こんなにおっきいと、私のおま○こに入るかなぁ？」"
translation = "「후훗, 빨리 들어가고 싶어~ 라며 움찔움찔거리고 있어♥ 이렇게 크면, 내 보지에 들어갈까?」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「わかってるって。一番おっきくなってるのを、もう何度も入れられちゃってるもんね<emoji=heart04>\u3000最初は壊れちゃうかと思ったけど、今はもうすっかり慣れちゃった<emoji=heart04>」"
translation = "「알고 있다니까. 제일 커진 걸 벌써 몇 번이나 넣어버렸는걸♥ 처음엔 망가지는 줄 알았지만, 지금은 이제 완전히 익숙해져 버렸어♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「私のここ……会長さんの大きさに広がるんだよ<emoji=heart04>\u3000一番太いとこも、ずるんって簡単に飲み込んじゃうの<emoji=heart04>」"
translation = "「내 여기…… 회장님의 크기에 맞춰서 벌어진단 말이야♥ 제일 굵은 부분도 주르륵하고 간단히 삼켜버려♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「もう中はじゅくじゅくになってるから……きっと入れたら気持ちいいよね～<emoji=heart04>」"
translation = "「벌써 안은 질척질척해졌으니까…… 분명 넣으면 기분 좋겠지~♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ほら、思い出して<emoji=heart04>\u3000私の濡れ濡れおま○こに、おち○ちんズブズブ～って押し込んじゃって<emoji=heart04>\u3000そのまま覆い被さって、何度も何度も、ぬぷ<emoji=heart04>\u3000ぬぷ<emoji=heart04>\u3000って<emoji=heart04>」"
translation = "「자, 떠올려 봐♥ 내 젖어버린 보지에, 자지를 즈븝즈븝~ 하고 밀어 넣어줘♥ 그대로 덮쳐서, 몇 번이고 몇 번이고, 늅♥ 늅♥ 하고♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「会長さん、毎回気持ちいいって言ってくれるよね。何度も出し入れして、プリプリのおま○こほじって……最後に、びゅる～って……精液出しちゃって<emoji=heart04>」"
translation = "「회장님, 매번 기분 좋다고 말해주잖아. 몇 번이고 넣었다 뺐다 하며, 탱글탱글한 보지를 파헤치고…… 마지막에, 뷰루~ 하고…… 정액 내보내 줘♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「でも、たぶんだけど……会長さんより私の方が、ずっと気持ちよくなってたかも<emoji=heart04>」"
translation = "「하지만, 아마도 말인데…… 회장님보다 내가 훨씬 더 기분 좋아졌을지도♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「えへへ～、会長さんの彼女にしてもらってから、すっかりエッチな子になっちゃったね<emoji=heart04>」"
translation = "「에헤헤~, 회장님의 여자친구가 되고 나서, 완전히 야한 아이가 되어버렸네♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「もう、エッチってだけじゃ済まないかも。ドスケベ……の方が合ってる？\u3000ふふっ、ドスケベな彼女がエッチされたくてうずうずしてるんだけど……どうするの？」"
translation = "「정말, 야하다는 말만으로는 부족할지도. 초변태…… 쪽이 더 어울리나? 후훗, 초변태 같은 여자친구가 섹스하고 싶어서 몸이 근질근질한데…… 어떻게 할 거야?」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「わぁ、おち○ちんの方が素直だ……もう、今すぐ私に入りたくて、先っちょからエッチなぬるぬる垂らしちゃってるよ<emoji=heart04>\u3000まるでよだれみたい<emoji=heart04>」"
translation = "「와아, 자지 쪽이 더 솔직해…… 벌써, 지금 당장 내 안에 들어오고 싶어서, 끝부분에서 야한 미끌미끌한 걸 흘리고 있어♥ 마치 침 흘리는 것 같아♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「いいよ、いつでも……会長さんなら、いつでもエッチしていいから。私のおま○こは、会長さんのおち○ちんをずっと待ってるんだからね<emoji=heart04>」"
translation = "「좋아, 언제든지…… 회장님이라면, 언제든지 섹스해도 되니까. 내 보지는, 회장님의 자지를 계속 기다리고 있었으니까♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「うん、来て……早くおち○ちん入れて欲しい……<emoji=heart04>」"
translation = "「응, 와줘…… 빨리 자지 넣어줬으면 좋겠어……♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「んふぅ～～～～～っっ<emoji=heart04>\u3000くふっ<emoji=heart04>\u3000ふあっっ<emoji=heart04>\u3000あぁっ<emoji=heart04>\u3000は、入ってきたぁ<emoji=heart04>\u3000やっぱりおち○ちんすごい<emoji=heart04>\u3000内側から押し広げられちゃったぁ<emoji=heart04>」"
translation = "「응후으으으으으윽♥ 쿠훗♥ 후앗♥ 아앗♥ 드, 들어왔다아♥ 역시 자지 대단해♥ 안쪽에서부터 억지로 벌려지고 있어♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「いいよ……奥まで全部<emoji=heart04>\u3000遠慮しないで入れて<emoji=heart04>\u3000んうっ<emoji=heart04>\u3000会長さんのおち○ちん長いから、グッて押し込まないと全部入らないけど……」"
translation = "「좋아…… 안쪽 끝까지 전부♥ 사양 말고 넣어줘♥ 응윽♥ 회장님 자지는 기니까, 꾹 하고 밀어 넣지 않으면 전부 안 들어가지만……」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「これ、根元まで入れた方が気持ちいいんだよね？\u3000大丈夫、別に苦しくないし……その、先っぽの膨らんだところでぐう～って押し上げられるの、好きだから<emoji=heart04>」"
translation = "「이거, 뿌리까지 넣는 게 더 기분 좋은 거지? 괜찮아, 딱히 괴롭지 않고…… 그, 끝부분의 부푼 곳으로 꾸우~ 하고 밀어 올려지는 거, 좋아하니까♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「子宮の入り口のとこ……会長さんのおち○ちんでズリズリ～ってしてもらうの好きなんだ<emoji=heart04>\u3000それされるとすぐ気持ちよくなっちゃう<emoji=heart04>」"
translation = "「자궁 입구 쪽…… 회장님 자지로 문질문질~ 당하는 거 좋아해♥ 그거 당하면 금방 기분 좋아져 버려♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「敏感だからゆっくりね……激しくするのは後で……最初はゆっくりと……出し入れしてね……<emoji=heart04>」"
translation = "「민감하니까 천천히 해줘…… 격하게 하는 건 나중에…… 처음에는 천천히…… 넣었다 뺐다 해줘……♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ふあぁっ<emoji=heart04>\u3000あぁっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000声出ちゃう<emoji=heart04>\u3000それされたらエッチな声出ちゃうっ<emoji=heart04>」"
translation = "「후아앗♥ 아앗♥ 안♥ 목소리 나와버려♥ 그거 당하면 야한 목소리 나와버렷♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「クリスマスパーティーのことで忙しかったし、その前は遠征とか続いてたし……会長さんとエッチするの久し振りだからな～<emoji=heart04>」"
translation = "「크리스마스 파티 때문에 바빴고, 그 전에는 원정 같은 게 계속됐으니까…… 회장님이랑 섹스하는 거 오랜만이라서 말이야~♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「なんか……んんっ……いつもより気持ちいい気がするよぉぉ<emoji=heart04>\u3000ねぇ<emoji=heart04>\u3000会長さんも、おま○こエッチは久し振りだから、気持ちいいんじゃない？」"
translation = "「왠지…… 응으윽…… 평소보다 기분 좋은 느낌이 들어어어♥ 있잖아♥ 회장님도, 보지 섹스는 오랜만이라서, 기분 좋지 않아?」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「さすがにずっと出してないってことはないから……１人でシコシコして、性欲処理してると思うけど……」"
translation = "「설마 계속 안 뺐을 리는 없으니까…… 혼자서 딸딸이 치면서, 성욕 처리하고 있을 거라 생각하지만……」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「どうなの？\u3000ちゃんとオナニーしてる？\u3000私に遠慮して出すの我慢しなくていいんだからね？」"
translation = "「어때? 제대로 자위하고 있어? 나한테 사양해서 싸는 거 참지 않아도 되니까 말이야?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……舞亜はどうなの？」"
translation = "「……마아는 어떤데?」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「私？\u3000私はっ、その……女の子だし、男の子ほどそういうのは大丈夫だから……」"
translation = "「나? 나는, 그…… 여자애고, 남자애만큼 그런 건 괜찮으니까……」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ごめんなさい、会長さんとエッチできなくて、ムラムラして何度かオナニーしちゃいました<emoji=heart04>」"
translation = "「죄송해요, 회장님이랑 섹스 못 해서, 안달 나서 몇 번인가 자위해 버렸어요♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「だって、会長さんのおち○ちんですっかりエッチに躾けられちゃったからっ<emoji=heart04>\u3000定期的にエッチしないと、すごくムラムラしちゃって……ダメなの<emoji=heart04>」"
translation = "「그치만, 회장님의 자지 때문에 완전히 야하게 길들여져 버렸는걸♥ 정기적으로 섹스하지 않으면, 엄청 몸이 달아올라서…… 안 된단 말이야♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「寝る前にはオナニーしないと寝付けなくて……ほとんど毎晩イクまでオナってるかも<emoji=heart04>」"
translation = "「자기 전에는 자위하지 않으면 잠이 안 와서…… 거의 매일 밤 갈 때까지 자위하고 있을지도♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「それもこれもっ、会長さんが悪いんだよ？\u3000彼氏として、可愛い彼女の性欲を解消してあげて<emoji=heart04>\u3000そう……このかっこいいおち○ちんを使ってね<emoji=heart04>」"
translation = "「이것도 저것도 다, 회장님 때문이라구? 남자친구로서, 귀여운 여자친구의 성욕을 해소해 줘♥ 그래…… 이 멋진 자지를 사용해서 말이야♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「んあっ<emoji=heart04>\u3000ふぁぁっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000ゆっくりヌプヌプされながらだと……すごく興奮しちゃう<emoji=heart04>\u3000おち○ちん気持ちいいよ<emoji=heart04>\u3000もっとスケベになりそう<emoji=heart04>」"
translation = "「응앗♥ 화아♥ 하앙♥ 천천히 질퍽질퍽 삽입당하고 있으면…… 너무 흥분돼♥ 자지 기분 좋아♥ 더 음란해질 것 같아♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「会長さん～～っっ<emoji=heart04>\u3000あぁっ<emoji=heart04>\u3000好き<emoji=heart04>\u3000好きだよ、すっごく<emoji=heart04>\u3000今日は中出し大丈夫だから、いっぱい注いでね<emoji=heart04>」"
translation = "「회장님~~♥ 아앗♥ 좋아해♥ 좋아해, 정말로♥ 오늘은 질내사정 괜찮으니까, 가득 쏟아줘♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「私のおなかがぽっこりしちゃうくらい……子宮を会長さんのせーえきでパンパンにして……<emoji=heart04>」"
translation = "「내 배가 볼록해질 정도로…… 자궁을 회장님의 정액으로 빵빵하게 채워줘……♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「気兼ねなくおま○こに出してね、会長さん<emoji=heart04>\u3000会長さんに中出ししてもらうの、好きになっちゃったみたいだから<emoji=heart04>」"
translation = "「부담 갖지 말고 보지에 싸줘, 회장님♥ 회장님이 안에 싸주는 거, 좋아하게 된 모양이니까♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「はぁっ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000んふうっ<emoji=heart04>\u3000ゆっくり動くのもじれったくなって来ちゃった？\u3000ふふっ、わかるよ<emoji=heart04>\u3000もう何度もエッチしたもん、全部お見通しなんだから<emoji=heart04>」"
translation = "「하앗♥ 하앗♥ 응후♥ 천천히 움직이는 것도 감질나게 됐어? 후훗, 알고 있어♥ 벌써 몇 번이나 섹스했는걸, 전부 꿰뚫어 보고 있으니까♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「私も……うん、そろそろ激しくして欲しいかもって<emoji=heart04>\u3000だからね、会長さん……<emoji=heart04>」"
translation = "「나도…… 응, 슬슬 격하게 해줬으면 좋겠을지도♥ 그러니까 말이야, 회장님……♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ズボズボするの遠慮しなくていいよ<emoji=heart04>\u3000一番気持ちよくなる腰振りしよ？\u3000たっぷり使い込んだドスケベ彼女の気持ちい～いエッチ穴で、最高の中出し射精しちゃお<emoji=heart04>」"
translation = "「푹푹 박는 거 사양하지 않아도 돼♥ 제일 기분 좋아지는 허리 놀림을 하자? 듬뿍 길들여진 초음란 여자친구의 기분 조~은 섹스 구멍으로, 최고의 질내사정 사정 해버리자♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「んくううぅ～～～～っっ<emoji=heart04>\u3000んあっ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000あぁんっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000すごっ<emoji=heart04>\u3000会長さんの本気エッチ<emoji=heart04>\u3000気持ちいいっ<emoji=heart04>」"
translation = "「응쿠우우~~~~♥ 응앗♥ 하앗♥ 아앙♥ 앗♥ 앗♥ 후아아♥ 굉장해♥ 회장님의 진심 섹스♥ 기분 좋아♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「パンパンに膨らんだカチカチおち○ちんっ<emoji=heart04>\u3000ズボズボ出し入れされてっ<emoji=heart04>\u3000んうふっ<emoji=heart04>\u3000私の気持ちいいとこ激しく擦られちゃってるっっ<emoji=heart04>」"
translation = "「빵빵하게 부풀어 오른 딱딱한 자지♥ 푹푹 넣었다 빼졌다 하면서♥ 응우훗♥ 내 기분 좋은 곳이 격하게 비벼지고 있어♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「会長さんっ<emoji=heart04>\u3000会長さんっ<emoji=heart04>\u3000久し振りのエッチ気持ちいいよぉ<emoji=heart04>\u3000ダメっ<emoji=heart04>\u3000おかしくなるっ<emoji=heart04>\u3000おかしくなっちゃうっっ<emoji=heart04>」"
translation = "「회장님♥ 회장님♥ 오랜만의 섹스 기분 좋아아♥ 안 돼♥ 이상해져♥ 이상해져 버려어♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ひあっ<emoji=heart04>\u3000んあぁぁ～～っ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000やっ<emoji=heart04>\u3000声出ちゃうっ<emoji=heart04>\u3000ダメっ<emoji=heart04>\u3000ダメぇぇ～～～っ<emoji=heart04>」"
translation = "「히앗♥ 응아아아~~♥ 하앙♥ 싫어♥ 목소리 나와버려♥ 안 돼♥ 안 돼에에~~~♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「クリスマスだから素敵なエッチ、なんて思ってたけど、こんな動物の交尾みたいなエッチしてっ<emoji=heart04>\u3000恥ずかしいっ<emoji=heart04>\u3000恥ずかしいのに気持ちいいっ<emoji=heart04>」"
translation = "「크리스마스니까 근사한 섹스, 라고 생각했지만, 이런 짐승의 교미 같은 섹스를 하다니♥ 부끄러워♥ 부끄러운데 기분 좋아♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「全身揺さぶられてっ、おっぱいもブルンブルンしちゃってるしっ<emoji=heart04>\u3000こんなの激しすぎる、からぁっ<emoji=heart04>\u3000ふぁっ<emoji=heart04>\u3000あぁぁっ<emoji=heart04>\u3000あぁああぁぁ～～っ<emoji=heart04>」"
translation = "「온몸이 흔들려서, 가슴도 출렁출렁 거리고 있고♥ 이런 거 너무 격하, 니까아♥ 화앗♥ 아아앗♥ 아아아아아~~♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「もう無理っ<emoji=heart04>\u3000会長さん<emoji=heart04>\u3000私っ<emoji=heart04>\u3000私ぃっ<emoji=heart04>\u3000すぐイキそうっ<emoji=heart04>\u3000おっきいの来ちゃう<emoji=heart04>\u3000ふあぁぁっ<emoji=heart04>\u3000ダメダメダメぇぇ～～～っ<emoji=heart04>」"
translation = "「이제 무리♥ 회장님♥ 나♥ 나아♥ 금방 가버릴 것 같아♥ 큰 거 와버려♥ 후아아아♥ 안 돼 안 돼 안 돼에에~~~♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「また会長さんのおち○ちんでイカされちゃうっ<emoji=heart04>\u3000んううっ<emoji=heart04>\u3000くふっ<emoji=heart04>\u3000うあぁっ<emoji=heart04>\u3000こんな気持ちよくされたらっ、もっとエッチ大好きになっちゃうっ<emoji=heart04>」"
translation = "「또 회장님의 자지로 가버려어♥ 응우우♥ 쿠훗♥ 우아아♥ 이런 기분 좋게 해주면, 에로한 거 더 좋아하게 돼버려어♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「会長さんっ<emoji=heart04>\u3000まだぁ？\u3000中出しっ<emoji=heart04>\u3000射精して欲しいのっ<emoji=heart04>\u3000もうあんまり待てないからっ<emoji=heart04>\u3000一緒にっ<emoji=heart04>\u3000私と一緒にイってぇぇ～～～～っ<emoji=heart04>」"
translation = "「회장님♥ 아직이야? 질내사정♥ 사정해주길 원해♥ 이제 더는 못 기다리니까♥ 같이♥ 나랑 같이 가버려어어～～～～♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「んおっ<emoji=heart04>\u3000す、すごっ<emoji=heart04>\u3000本気の腰振り来たぁっ<emoji=heart04>\u3000会長さんっ<emoji=heart04>\u3000これ射精する時の動きっ<emoji=heart04>\u3000出るの？\u3000出ちゃうの？\u3000私にたっぷり中出ししてくれるのっ？」"
translation = "「응오♥ 거, 굉장해♥ 본격적인 허리 흔들기 왔다아♥ 회장님♥ 이거 사정할 때의 움직임♥ 나오는 거야? 나와버려? 나한테 듬뿍 질내사정 해주는 거야?」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「いいよ<emoji=heart04>\u3000いつでも来て<emoji=heart04>\u3000私待ってるから<emoji=heart04>\u3000会長さんの射精でイクからっ<emoji=heart04>\u3000どろどろせーえき注がれてイキたいっっ<emoji=heart04>」"
translation = "「좋아♥ 언제든 와♥ 나 기다리고 있으니까♥ 회장님의 사정으로 갈 거니까♥ 걸쭉한 정액 부어지면서 가고 싶어어어♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「んうううっ<emoji=heart04>\u3000んおっ<emoji=heart04>\u3000おっ<emoji=heart04>\u3000ふおおおおっ<emoji=heart04>\u3000やだぁ<emoji=heart04>\u3000変な声出ちゃう<emoji=heart04>\u3000おなかの奥っ、押されてっ<emoji=heart04>\u3000エッチなけものになっちゃううぅっっ<emoji=heart04>」"
translation = "「응우우우♥ 응오♥ 오♥ 후오오오오♥ 싫어♥ 이상한 목소리 나와♥ 배 안쪽, 눌려서♥ 에로한 짐승이 되어버려어어어♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「会長さんっ<emoji=heart04>\u3000好きっ<emoji=heart04>\u3000大好きっ<emoji=heart04>\u3000好き好き好きっ<emoji=heart04>\u3000もっとずっとこうして欲しいっ<emoji=heart04>\u3000エッチなことも全部っ、会長さんを丸ごと欲しいのっっ<emoji=heart04>」"
translation = "「회장님♥ 좋아해♥ 정말 좋아해♥ 좋아좋아좋아♥ 좀 더 계속 이렇게 해줬으면 좋겠어♥ 에로한 것도 전부♥ 회장님을 통째로 갖고 싶어어어♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「んあっ<emoji=heart04>\u3000はぁぁんっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000すごいっ<emoji=heart04>\u3000ズポズポすごいぃっ<emoji=heart04>\u3000内側グリグリされてっ<emoji=heart04>\u3000おかしくなるっ<emoji=heart04>\u3000おかしくなっちゃうぅっっ<emoji=heart04>」"
translation = "「응아♥ 하아아앙♥ 아♥ 아♥ 굉장해♥ 즈포즈포 굉장해♥ 안쪽이 구리구리 휘저어져서♥ 이상해져♥ 이상해져 버려어어♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「会長さんっっ<emoji=heart04>\u3000来てっ<emoji=heart04>\u3000来て来て来てぇぇ～～っ<emoji=heart04>\u3000私イクからっ<emoji=heart04>\u3000もうイク<emoji=heart04>\u3000イっちゃうっ<emoji=heart04>\u3000ごめんもう待てないっ<emoji=heart04>」"
translation = "「회장님♥ 와줘♥ 와줘 와줘 와줘어어～～♥ 나 갈 거니까♥ 이제 가♥ 가버려♥ 미안 이제 못 기다려♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「イク<emoji=heart04>\u3000イクイクイクっっ<emoji=heart04>\u3000イっくぅううぅ～～～～～～～っっっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가♥ 가버려 가버려 가버려어어♥ 가아아아아～～～～～～～앗♥♥♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「んあぁっ<emoji=heart04>\u3000はぁぁっ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000はぁっ<emoji=heart04>\u3000んううぅ～～っ……<emoji=heart04>」"
translation = "「응아아♥ 하아아♥ 하아♥ 하아♥ 응우우우～～……♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「すごいぃ<emoji=heart04>\u3000びゅるびゅるってしてる……<emoji=heart04>\u3000会長さんの……エッチな精液……いっぱい出てるね……<emoji=heart04>」"
translation = "「굉장해♥ 뷰루뷰루하고 있어……♥ 회장님의…… 에로한 정액…… 잔뜩 나오고 있네……♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「こっちが先にイっちゃったけど、ほとんど同時だったね<emoji=heart04>\u3000んふっ<emoji=heart04>\u3000ううっ<emoji=heart04>\u3000すっごい元気<emoji=heart04>\u3000もう、どんだけ出すの？」"
translation = "「이쪽이 먼저 가버렸지만, 거의 동시였네♥ 응후♥ 우우♥ 엄청 기운차♥ 정말, 얼마나 내보내는 거야?」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ほんと……一番奥で、びゅーっ<emoji=heart04>\u3000びゅーっ<emoji=heart04>\u3000て……気持ちよさそうに排泄して……<emoji=heart04>\u3000私がドスケベな彼女でよかったね<emoji=heart04>」"
translation = "「정말…… 가장 깊은 곳에서, 뷰웃♥ 뷰웃♥ 하고…… 기분 좋은 듯이 배설해서……♥ 내가 도스케베한 여자친구라 다행이네♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「こんなすごい射精、私じゃなかったら受け止めてあげられないんだから<emoji=heart04>\u3000んふっ<emoji=heart04>\u3000まだ出してる……<emoji=heart04>\u3000繁殖力、すごいよぉ……<emoji=heart04>」"
translation = "「이런 대단한 사정, 내가 아니면 받아줄 수 없으니까♥ 응후♥ 아직 내보내고 있어……♥ 번식력, 굉장해에……♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ここまで情熱的な中出しされちゃうと……赤ちゃん妊娠してあげられないのが可哀想になっちゃう<emoji=heart04>」"
translation = "「이렇게 정열적으로 질내사정 당해버리면…… 아기 임신해줄 수 없는 게 불쌍해질 정도야♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ふふっ、絶対受精させてやるんだ～って……伝わってくるみたい<emoji=heart04>」"
translation = "「후후, 반드시 수정시켜주겠어~ 라고…… 전해져 오는 것 같아♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「んんっ<emoji=heart04>\u3000今はまだ……フィギュアスケートに専念したいから……ごめんね<emoji=heart04>\u3000でも、予約だったら……うん……受け付けてるから<emoji=heart04>」"
translation = "「응응♥ 지금은 아직…… 피겨 스케이팅에 전념하고 싶으니까…… 미안해♥ 하지만, 예약이라면…… 응…… 받고 있으니까♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「その時のために……いっぱい練習しよ？\u3000うん、私を孕ませる練習<emoji=heart04>\u3000何度も何度も、中出しエッチしようね<emoji=heart04>」"
translation = "「그때를 위해서…… 잔뜩 연습하자? 응, 나를 임신시키는 연습♥ 몇 번이고 몇 번이고, 질내사정 섹스하자♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「んふぁ～～っ<emoji=heart04>\u3000はぁぁ～っ<emoji=heart04>\u3000おなか熱い<emoji=heart04>\u3000でも、さすがにそろそろおしまいみたい<emoji=heart04>」"
translation = "「응화아～～♥ 하아아～♥ 배 안이 뜨거워♥ 하지만, 역시 슬슬 끝인 것 같네♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「おち○ちんもお疲れさま<emoji=heart04>\u3000いっぱい射精頑張ってくれてありがとね<emoji=heart04>」"
translation = "「자지도 수고했어♥ 잔뜩 사정하려고 노력해줘서 고마워♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ひゃんっ<emoji=heart04>\u3000あふっ……んんんっ……<emoji=heart04>\u3000おち○ちん抜けちゃう<emoji=heart04>\u3000もっと入ってて欲しかったのに……<emoji=heart04>」"
translation = "「히양♥ 아후…… 응응응……♥ 자지 빠져버려♥ 좀 더 들어있어 줬으면 했는데……♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「あぁっ、やっ、見ないで……中出し射精後のおま○こ<emoji=heart04>\u3000使用後感すごすぎてヤバいからぁ<emoji=heart04>」"
translation = "「아아, 싫어, 보지 마…… 질내사정 후의 보지♥ 사용감 너무 대단해서 위험하니까아♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「うわぁ……どろって出てる……精液っていうけど、こんなのほとんど固体だよ……<emoji=heart04>」"
translation = "「우와아…… 걸쭉하게 나오고 있어…… 정액이라고 하지만, 이런 건 거의 고체야……♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「どろどろで……すごく濃いね<emoji=heart04>\u3000精子の数も多そう。魔王だから、やっぱり孕ませ力もとんでもないのかなぁ<emoji=heart04>」"
translation = "「걸쭉하고…… 엄청 진하네♥ 정자 수도 많을 것 같아. 마왕이니까, 역시 임신시키는 힘도 엄청난 걸까나♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「……大丈夫な日だけど……妊娠しちゃえばいいのに<emoji=heart04>」"
translation = "「……괜찮은 날이지만…… 임신해버리면 좋을 텐데♥」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「でも、それは困るんだろ？」"
translation = "「하지만, 그건 곤란하잖아?」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「うん……ごめんね、変なこと言って。ちょっとした気の迷いだから。安心して、ちゃんと管理してるから」"
translation = "「응…… 미안해, 이상한 말 해서. 조금 정신이 팔렸나 봐. 안심해, 제대로 관리하고 있으니까.」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「ふふっ、でもほんとーに気持ちいいエッチだったね<emoji=heart04>\u3000私と会長さん、相性抜群みたい<emoji=heart04>」"
translation = "「후후, 하지만 정말로 기분 좋은 섹스였네♥ 나랑 회장님, 궁합 발군인 것 같아♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「恋人としての相性だけじゃなくて……こういうとこも相性いいと、ほんと嬉しいな<emoji=heart04>」"
translation = "「연인으로서의 궁합뿐만 아니라…… 이런 쪽도 궁합이 좋으면, 정말 기쁘네♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「会長さん……さっきはすごく気持ちよくしてもらって、その、結構はしたないこと言ったり、喘ぎ声もえぐかったと思うけど……がっかりしないでね<emoji=heart04>」"
translation = "「회장님…… 아까는 정말 기분 좋게 해줘서, 그, 꽤 천박한 말을 하거나 신음소리도 심했다고 생각하지만…… 실망하지 마♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「たぶん、今日はもっとはしたない反応しちゃうと思うけど……会長さんも全力でエッチを楽しんでね<emoji=heart04>」"
translation = "「아마 오늘은 더 천박한 반응을 해버릴 거라 생각하지만…… 회장님도 전력으로 섹스를 즐겨줘♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「えっと、次はどうする？\u3000一緒にシャワー浴びてもいいし……少し休憩する？」"
translation = "「엣토, 다음은 어떻게 할까? 같이 샤워해도 좋고…… 조금 쉴까?」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「そ・れ・と・も……もっとエッチしちゃう？\u3000せっかくのクリスマスだもん、これで終わりなんてやだな<emoji=heart04>」"
translation = "「아·니·면…… 더 섹스할래? 어렵게 맞이한 크리스마스인걸, 이걸로 끝이라니 싫어♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「特別な１日に相応しい、特別な濃厚エッチ……いっぱい楽しもうね<emoji=heart04>」"
translation = "「특별한 날에 어울리는, 특별하고 농후한 섹스…… 잔뜩 즐기자♥」"

[[dialogue]]
speaker_original = "舞亜"
speaker_translation = "마이아"
original = "「会長さん……だぁいすき<emoji=heart04>\u3000ちゅっ<emoji=heart04>」"
translation = "「회장님…… 정말 좋아해♥ 쪽♥」"

[[dialogue]]
speaker = "unk"
original = "こうして俺と舞亜は、朝までたっぷり愛し合うのだった。"
translation = "이렇게 나와 마아는, 아침까지 듬뿍 서로 사랑을 나누는 것이었다."

