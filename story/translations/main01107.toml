[[dialogue]]
speaker = "unk"
original = "第９話,漆黒の野望,B"
translation = "제9화, 칠흑의 야망, B"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ぁ──ぅ……っ──く……っ──」"
translation = "「아── 으……윽── 크……윽──」"

[[dialogue]]
speaker_original = "黒騎士"
speaker_translation = "흑기사"
original = "『フン──よくもその死に体でいつまでも粘るものだ』"
translation = "『흥── 잘도 그 죽어가는 몸으로 언제까지나 버티는군.』"

[[dialogue]]
speaker = "unk"
original = "地に伏したヴィーナスは息も絶え絶えに黒騎士を見上げる。"
translation = "땅에 엎드린 비너스는 숨이 끊어질 듯이 검은 기사를 올려다본다."

[[dialogue]]
speaker = "unk"
original = "すべての星力を使い果たし、また『冬』による大寒波を浴びたことで、彼女の命は風前の灯火となっていた。"
translation = "모든 성력을 다 소진했고, 또한 『겨울』에 의한 대 한파를 맞았기에, 그녀의 목숨은 풍전등화였다."

[[dialogue]]
speaker_original = "黒騎士"
speaker_translation = "흑기사"
original = "『思い出せ。貴様がこの世界へ到来する以前──果たしてどこにいたのかを』"
translation = "『기억해 내라. 네가 이 세계에 도래하기 이전── 과연 어디에 있었는지를.』"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「知ら──ない、わよ……っ！\u3000昔のことは覚えてないって、言ってんでしょ……っ！」"
translation = "「모르──는, 걸요……윽! 옛날 일은 기억 안 난다고, 말하고 있잖아……윽!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「気づいたらヘレナちゃんのお屋敷にいて……<ruby>簪<rt>かんざし</rt></ruby>を掲げて……そんで今の私になって……」"
translation = "「정신 차려 보니 헬레나짱의 저택에 있었고…… 비녀를 내걸고…… 그래서 지금의 내가 되었고……」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスの言葉に嘘はなかった。"
translation = "비너스의 말에는 거짓이 없었다."

[[dialogue]]
speaker = "unk"
original = "ただこの世界に飛来した時から彼女は、正体の知れない使命感に突き動かされてきたのだから。"
translation = "단지 이 세계에 날아왔을 때부터 그녀는, 정체를 알 수 없는 사명감에 이끌려 왔을 뿐이니까."

[[dialogue]]
speaker = "unk"
original = "自分が<b>元いた世界</b>──それに思いを巡らせる機会も、これまでにありはしなかった。"
translation = "자신이 <ruby>원래 있던 세계<rt>・・ ・・ ・・</rt></ruby>── 그것에 대해 생각할 기회도, 지금까지는 없었다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「大体──それを知って何しようってのよ、あんたは──！」"
translation = "「대체── 그걸 알고 뭘 하려는 건데, 너는──!」"

[[dialogue]]
speaker_original = "黒騎士"
speaker_translation = "흑기사"
original = "『……再創生だ』"
translation = "『……재창조다.』"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker_original = "黒騎士"
speaker_translation = "흑기사"
original = "『新世界の再創生──それにより、今一度こちらの世界とあちらの世界を繋げる必要がある』"
translation = "『신세계의 재창조── 그것으로 인해, 다시 한번 이쪽 세계와 저쪽 세계를 연결할 필요가 있다.』"

[[dialogue]]
speaker_original = "黒騎士"
speaker_translation = "흑기사"
original = "『貴様の元いたデネブと──こちら、アルタイルの世界を、何もかもかき混ぜることによって』"
translation = "『네가 원래 있던 데네브와── 이쪽, 알타일의 세계를, 모든 것을 뒤섞음으로써.』"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「世界の再創生──って……それ、リクリエ……」"
translation = "「세계의 재창조──라니…… 그거, 리크리에……」"

[[dialogue]]
speaker_original = "黒騎士"
speaker_translation = "흑기사"
original = "『そうだ。今代のリクリエには、平行するすべての世界をゼロから創り直してもらう必要がある』"
translation = "『그렇다. 이번 대의 리크리에는, 평행하는 모든 세계를 제로에서부터 다시 만들 필요가 있다.』"

[[dialogue]]
speaker_original = "黒騎士"
speaker_translation = "흑기사"
original = "『この森──ネメシスのように。すべてを無に帰し、それらを組み替えることでしか新世界は生まれ得ない』"
translation = "『이 숲── 네메시스처럼. 모든 것을 무로 돌리고, 그것들을 재조합함으로써만 신세계는 태어날 수 있다.』"

[[dialogue]]
speaker_original = "黒騎士"
speaker_translation = "흑기사"
original = "『そのためにも──デネブの娘。貴様の記憶にこそ、全ての鍵があるのだ』"
translation = "『그러기 위해서도── 데네브의 딸. 네 기억에야말로, 모든 열쇠가 있는 것이다.』"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「──」"
translation = "「──」"

[[dialogue]]
speaker = "unk"
original = "昔の記憶がない。"
translation = "옛 기억이 없다."

[[dialogue]]
speaker = "unk"
original = "そのことを、ヴィーナスはさほど不都合に感じたことはなかった。クロトだって似たような事情があると聞いたこともある。"
translation = "그것을, 비너스는 그다지 불편하게 느끼지 않았다. 쿠로토도 비슷한 사정이 있다고 들은 적도 있다."

[[dialogue]]
speaker = "unk"
original = "しかし目の前の黒騎士は──その一点にただ執着していた。"
translation = "하지만 눈앞의 검은 기사는── 그 한 가지에만 집착하고 있었다."

[[dialogue]]
speaker_original = "黒騎士"
speaker_translation = "흑기사"
original = "『仕方ない──ここまで弱らせても吐かぬのなら、本当に記憶にないのだろう』"
translation = "『어쩔 수 없군── 이 정도로 약해졌는데도 토해내지 않는다면, 정말로 기억에 없는 것이겠지.』"

[[dialogue]]
speaker_original = "黒騎士"
speaker_translation = "흑기사"
original = "『なれば貴様を分解し──記憶を直接覗く他あるまい』"
translation = "『그렇다면 너를 분해하여── 기억을 직접 들여다볼 수밖에 없겠군.』"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「っ……！？\u3000あっ──くぅっ！？」"
translation = "「윽……!? 앗── 크윽!?」"

[[dialogue]]
speaker_original = "黒騎士"
speaker_translation = "흑기사"
original = "『エーテルバニッシュメント』"
translation = "『에테르 배니시먼트』"

[[dialogue]]
speaker = "unk"
original = "暗黒のエネルギーが檻となって、ヴィーナスの全身を幽閉する。"
translation = "암흑의 에너지가 감옥이 되어, 비너스의 전신을 유폐한다."

[[dialogue]]
speaker = "unk"
original = "そして精気から星力までを、彼女から根こそぎ吸い上げていった。"
translation = "그리고 정기부터 성력까지를, 그녀에게서 뿌리째 빨아들여 갔다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「なっ──くっ、あっ……！\u3000何、してんのよ──っっ……！」"
translation = "「뭣── 크윽, 앗……! 뭐, 하는 거야──읏……!」"

[[dialogue]]
speaker_original = "黒騎士"
speaker_translation = "흑기사"
original = "『九浄ヴィーナスという存在を霊体にまで分解させ──消散する前に、この大寒波を利用して凍結させる』"
translation = "『쿠죠 비너스라는 존재를 영체로까지 분해시키고── 소산하기 전에, 이 대 한파를 이용하여 동결시킨다.』"

[[dialogue]]
speaker_original = "黒騎士"
speaker_translation = "흑기사"
original = "『貴様の霊体そのものを読み解くことで……デネブへの道が見通せるやもしれん』"
translation = "『네 영체 그 자체를 읽어냄으로써…… 데네브로의 길이 보일지도 모른다.』"

[[dialogue]]
speaker_original = "黒騎士"
speaker_translation = "흑기사"
original = "『もっとも……この手段を取ったが最後、元に戻せぬのが難点だがな』"
translation = "『물론…… 이 수단을 쓴 이상, 원래대로 되돌릴 수 없다는 것이 난점이지만 말이다.』"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「──ッ！」"
translation = "「──ッ!」"

[[dialogue]]
speaker = "unk"
original = "つまりは、死──"
translation = "즉, 죽음──"

[[dialogue]]
speaker = "unk"
original = "無き記憶を呼び覚ませないというヴィーナスに代わって、黒騎士は自ら彼女を検分しようとしていた。"
translation = "없는 기억을 불러일으키지 못하는 비너스를 대신하여, 검은 기사는 스스로 그녀를 검토하려 하고 있었다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「い──やっ……！\u3000助けて、みんな──っ……！」"
translation = "「시── 싫어……! 도와줘, 모두──윽……!」"

[[dialogue]]
speaker_original = "黒騎士"
speaker_translation = "흑기사"
original = "『無駄な足掻きと知っていよう。外は今も大いなる冬に見舞われている──魔獣の遠吠えすら、ここには届かない』"
translation = "『헛된 발버둥임을 알고 있을 터. 밖은 지금도 대자연의 겨울에 휩싸여 있다── 마수의 울음소리조차, 이곳에는 닿지 않는다.』"

[[dialogue]]
speaker_original = "黒騎士"
speaker_translation = "흑기사"
original = "『首を断つ。苦しみは一瞬だ。その存在がかき消えぬうちに……全身を凍てつかせてやる』"
translation = "『목을 단절하겠다. 고통은 한순간이다. 그 존재가 사라지기 전에…… 전신을 얼어붙게 해 주지.』"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「────っ！」"
translation = "「────윽!」"

[[dialogue]]
speaker_original = "黒騎士"
speaker_translation = "흑기사"
original = "『果てよ──』"
translation = "『끝내라──』"

[[dialogue]]
speaker = "unk"
original = "黒騎士が剣を振り上げる。"
translation = "검은 기사가 검을 들어 올린다."

[[dialogue]]
speaker = "unk"
original = "躊躇なき烈断の一閃──だが、その寸前。"
translation = "주저 없는 맹렬한 단절의 일섬── 하지만, 그 직전."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「！？」"
translation = "「!?」"

[[dialogue]]
speaker_original = "黒騎士"
speaker_translation = "흑기사"
original = "『……何』"
translation = "『……뭐지.』"

[[dialogue]]
speaker = "unk"
original = "冥府の森を縫って飛来した拳撃の真空波が──２人の間を割って、剣を弾き飛ばしていた。"
translation = "명부의 숲을 꿰뚫고 날아온 권격의 진공파가── 두 사람 사이를 갈라, 검을 튕겨내고 있었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「うちのメンバーに──手出しはしないでもらおうか」"
translation = "「우리 멤버에게── 손대지 말아줬으면 좋겠군.」"

