[[dialogue]]
speaker = "unk"
original = "第１話,二刀流の友,P"
translation = "제1화, 이도류의 친구, P"

[[dialogue]]
speaker = "unk"
original = "巫女修行の後、<ruby>巫術<rt>ふじゅつ</rt></ruby>が使えるようになったマトイ。"
translation = "무녀 수행 후, 무술을 사용할 수 있게 된 마토이."

[[dialogue]]
speaker = "unk"
original = "彼女は二刀流の訓練がしたいと思い、ある星騎士に声をかけていた――"
translation = "그녀는 이도류 훈련을 하고 싶어 어느 성기사에게 말을 걸고 있었다――"

[[dialogue]]
speaker = "マトイ"
original = "「セナリィさん、今日は来てくれてありがとう！」"
translation = "「세나리 씨, 오늘 와줘서 고마워요!」"

[[dialogue]]
speaker = "セナリィ"
original = "「いえいえ。お世話になっている新星星徒会からのご指名ですから、喜んで引き受けさせて頂きますわ♪」"
translation = "「아니요 아니요. 신세를 지고 있는 신성성도회로부터의 지명이니까, 기쁘게 맡도록 하겠어요♪」"

[[dialogue]]
speaker = "セナリィ"
original = "（少々面倒な頼みごとではありますけれど、社長としてお得様の接待も大事にしないといけませんわ！）"
translation = "（조금 번거로운 부탁이긴 합니다만, 사장으로서 단골손님 접대도 소중히 해야 하니까요!）"

[[dialogue]]
speaker = "セナリィ"
original = "「それでマトイ様、二刀流の指南をご希望ということでお間違いありませんわよね？\u3000私、どちらかというと銃撃戦の方が得意なのですけれど……」"
translation = "「그래서 마토이 님, 이도류 지도를 희망하신다는 게 맞으시죠? 저, 어느 쪽인가 하면 총격전이 더 특기입니다만……」"

[[dialogue]]
speaker = "マトイ"
original = "「うん。だけど、セナリィさんは銃に付いている剣も使って戦ったりもするでしょ？\u3000それを見ていて、教えてもらいたいって思ったんだ」"
translation = "「응. 하지만 세나리 씨는 총에 달린 칼도 써서 싸우기도 하잖아? 그걸 보고 가르침을 받고 싶다고 생각했어」"

[[dialogue]]
speaker = "マトイ"
original = "「セナリィさんって多分――両利きだよね？」"
translation = "「세나리 씨는 아마―― 양손잡이지?」"

[[dialogue]]
speaker = "セナリィ"
original = "「……！\u3000何故そう思いますの？」"
translation = "「……! 어째서 그렇게 생각하시나요?」"

[[dialogue]]
speaker = "マトイ"
original = "「実は私も両利きなんだ。だからなのかは分からないんだけど、その人を見れば、利き手がどっちなのか、なんとなく分かるんだよね」"
translation = "「사실 저도 양손잡이거든. 그래서인지는 모르겠지만, 그 사람을 보면 어느 쪽이 주로 쓰는 손인지 왠지 알 수 있어」"

[[dialogue]]
speaker = "セナリィ"
original = "（へぇ……意外ですわ。マトイ様、星徒会の中では目立たない、普通の方だと思っていましたけれど……）"
translation = "（헤에…… 의외네요. 마토이 님, 성도회 안에서는 눈에 띄지 않는 평범한 분이라고 생각했습니다만……）"

[[dialogue]]
speaker = "セナリィ"
original = "「――私の場合は昔、傭兵時代に武器商人から矯正されたんですわ。両手どちらでも武器を自在に使えるようになれと、スパルタで」"
translation = "「――제 경우는 예전에 용병 시절에 무기 상인으로부터 교정받았답니다. 양손 어느 쪽이든 무기를 자유자재로 사용할 수 있게 되라고 스파르타식으로요」"

[[dialogue]]
speaker = "マトイ"
original = "「そっか……。普通じゃない経験をしてきたってことなんだね」"
translation = "「그렇구나……. 평범하지 않은 경험을 해왔다는 거네」"

[[dialogue]]
speaker = "マトイ"
original = "「今まで見てきた両利きの星騎士の中でも、セナリィさんがいちばん武器の扱いがうまいと思う。だから、それを学んで自分の二刀流に活かしたいんだ」"
translation = "「지금까지 봐온 양손잡이 성기사 중에서도 세나리 씨가 가장 무기를 잘 다루는 것 같아. 그래서 그걸 배워서 내 이도류에 활용하고 싶어」"

[[dialogue]]
speaker = "セナリィ"
original = "「なるほど……マトイ様の考えは分かりましたわ。では１度、模擬戦をして今の技量を拝見させて頂きましょうか」"
translation = "「과연…… 마토이 님의 생각은 알겠습니다. 그럼 한 번 모의전을 해서 지금의 기량을 봐 드릴까요?」"

[[dialogue]]
speaker = "マトイ"
original = "「うん。よろしくお願いします！」"
translation = "「응. 잘 부탁해!」"

[[dialogue]]
speaker = "セナリィ"
original = "「――とまあ、そんな経緯があったのですわ！\u3000その後、激闘の末に私、マトイ様の力に感服いたしました！ ほんとにもう、すっげーですわね！」"
translation = "「――뭐 그런 경위가 있었답니다! 그 후 격투 끝에 저, 마토이 님의 실력에 감복했어요! 정말이지 이제, 쩔어버리네요!」"

[[dialogue]]
speaker = "unk"
original = "数日後。訓練の時の様子を、俺はセナリィに聞かされていた。"
translation = "며칠 후. 훈련 때의 모습을 나는 세나리에게 듣고 있었다."

[[dialogue]]
speaker = "unk"
original = "さすがはマトイだな（後方腕組み）"
translation = "과연 마토이로군 (뒷짐 지고 흐뭇)"

[[dialogue]]
speaker = "マトイ"
original = "「いや、大げさだよ。普通に何度も負けて、セナリィさんには結局１回しか勝てなかったし」"
translation = "「아니, 과장이야. 평범하게 몇 번이나 지고, 세나리 씨에게는 결국 한 번밖에 못 이겼는걸」"

[[dialogue]]
speaker = "セナリィ"
original = "「その１回がすごかったのですわ！\u3000だからこそ依頼料を頂戴するのではなく、代わりにこうしてゴールデングースの業務を手伝って欲しいとお願いしましたのよ」"
translation = "「그 한 번이 대단했다고요! 그렇기에 의뢰료를 받는 대신 이렇게 골든 구스의 업무를 도와달라고 부탁드린 거예요」"

[[dialogue]]
speaker = "マトイ"
original = "「最近は色々なスキルを学んで行きたいと思ってるから、会社で働く経験をさせてもらえるのはありがたいよ」"
translation = "「요즘은 여러 가지 기술을 배워가고 싶다고 생각하니까, 회사에서 일하는 경험을 할 수 있는 건 고마운 일이야」"

[[dialogue]]
speaker = "セナリィ"
original = "「というかやはり、マトイ様は『マルチタスク』――同時並行で複数のことをする能力がヤベェですわ！」"
translation = "「그보다 역시 마토이 님은 『멀티태스킹』―― 동시 병행으로 여러 일을 하는 능력이 대박이에요!」"

[[dialogue]]
speaker = "マトイ"
original = "「そう？\u3000これくらいは別に普通じゃない？」"
translation = "「그래? 이 정도는 별로 평범하지 않아?」"

[[dialogue]]
speaker = "セナリィ"
original = "「いやいや、左右の手それぞれで違う作業をしているのは、全然普通じゃありませんわよ！？」"
translation = "「아니 아니, 양손 각각 다른 작업을 하고 있는 건 전혀 평범하지 않다고요!?」"

[[dialogue]]
speaker = "unk"
original = "マトイは右手にペンを持って書類仕事をしながら、左手でパソコンのテンキーで数字の入力作業を行い、視線を交互に動かし続けている。"
translation = "마토이는 오른손에 펜을 들고 서류 일을 하면서, 왼손으로 컴퓨터 키패드로 숫자 입력 작업을 하며 시선을 교대로 계속 움직이고 있다."

[[dialogue]]
speaker = "マトイ"
original = "「そりゃあ私、両利きだし……」"
translation = "「그야 나, 양손잡이니까……」"

[[dialogue]]
speaker = "セナリィ"
original = "「私はそんなことできませんわ！\u3000一体頭の中はどういう風になってますの？」"
translation = "「저는 그런 거 못 해요! 도대체 머릿속은 어떻게 되어 있는 건가요?」"

[[dialogue]]
speaker = "マトイ"
original = "「どうって……頭の中で右手を動かす自分がいて、慣れてくると、それとは別に左手を動かす自分が用意できて……みたいな？」"
translation = "「어떻게라니…… 머릿속에서 오른손을 움직이는 내가 있고, 익숙해지면 그것과는 별개로 왼손을 움직이는 내가 준비되어서…… 같은 느낌?」"

[[dialogue]]
speaker = "セナリィ"
original = "「なんで疑問形ですの……？」"
translation = "「왜 의문문인가요……?」"

[[dialogue]]
speaker = "マトイ"
original = "「いや、左手でコーヒー飲みながら、右手でパソコンのマウス操作をしているのと同じようなものだし……それって別に普通のことじゃないかな？」"
translation = "「아니, 왼손으로 커피 마시면서 오른손으로 컴퓨터 마우스 조작을 하는 거랑 비슷한 거고…… 그건 별로 평범한 일 아닐까?」"

[[dialogue]]
speaker = "マトイ"
original = "「利き手の違いはあっても、みんな両手は同時に使ったりするでしょ？\u3000私は両利きな分、左右均等の配分で作業できるってだけで……」"
translation = "「주로 쓰는 손의 차이는 있어도 다들 양손은 동시에 쓰기도 하잖아? 나는 양손잡이인 만큼 좌우 균등한 배분으로 작업할 수 있을 뿐이고……」"

[[dialogue]]
speaker = "セナリィ"
original = "「その二刀流は普通ではありませんわ！」"
translation = "「그 이도류는 평범하지 않아요!」"

[[dialogue]]
speaker = "マトイ"
original = "「えっ。でも、それならセナリィさんは、一体どうやって二丁拳銃を……」"
translation = "「엣. 하지만 그렇다면 세나리 씨는 도대체 어떻게 쌍권총을……」"

[[dialogue]]
speaker = "セナリィ"
original = "「私の場合、左右どちらの手でも武器を持てるように、反復訓練しただけですわ……」"
translation = "「제 경우 좌우 어느 손으로도 무기를 들 수 있도록 반복 훈련했을 뿐이에요……」"

[[dialogue]]
speaker = "マトイ"
original = "「なるほど！\u3000セナリィさんは私と違って、無意識に二刀流を使いこなしてるんだね！\u3000やっぱり天才傭兵は、センスが普通じゃないなぁ」"
translation = "「과연! 세나리 씨는 나랑 다르게 무의식적으로 이도류를 다루고 있는 거네! 역시 천재 용병은 센스가 평범하지 않구나」"

[[dialogue]]
speaker = "マトイ"
original = "「私も自分なりに、セナリィさんの域まで近づけるように頑張らないと！」"
translation = "「나도 나름대로 세나리 씨의 영역까지 가까워질 수 있도록 노력해야지!」"

[[dialogue]]
speaker = "セナリィ"
original = "「えっと……会長様？\u3000マトイ様ってこれ、本気でおっしゃってますの？」"
translation = "「저기…… 회장님? 마토이 님 이거 진심으로 말씀하시는 건가요?」"

[[dialogue]]
speaker = "unk"
original = "地味に色々普通じゃないんだ"
translation = "은근히 여러 가지로 평범하지 않지"

[[dialogue]]
speaker = "セナリィ"
original = "「つまりこれは……青田買い物件ということですわね！」"
translation = "「즉 이건…… 떡잎부터 다른 매물이라는 거군요!」"

[[dialogue]]
speaker = "セナリィ"
original = "「マトイ様！\u3000このままゴールデングースでバイトを続けてみませんかしら？」"
translation = "「마토이 님! 이대로 골든 구스에서 아르바이트를 계속해보지 않으시겠어요?」"

[[dialogue]]
speaker = "セナリィ"
original = "「星徒会業務との兼ね合いはもちろん考慮しますし、時給も良い値段でご相談させて頂きますわよ？」"
translation = "「성도회 업무와의 조율은 물론 고려할 것이고, 시급도 좋은 가격으로 상담해 드릴게요?」"

[[dialogue]]
speaker = "マトイ"
original = "「え、いいの？\u3000それなら時給をもらう代わりに、また二刀流の訓練を見てくれたら嬉しいな！」"
translation = "「에, 좋아? 그렇다면 시급을 받는 대신에 다시 이도류 훈련을 봐주면 좋겠어!」"

[[dialogue]]
speaker = "セナリィ"
original = "「ええ、ええ♪\u3000そんなことでよろしければ、時給にプラスした福利厚生としてサービスしますわよ♪\u3000ふふふっ♪」"
translation = "「네, 네♪ 그런 거라면 시급에 플러스한 복리후생으로서 서비스해 드릴게요♪ 후후후♪」"

[[dialogue]]
speaker = "unk"
original = "そうして２人は、継続的に合同訓練を行うことになったのだが――"
translation = "그렇게 두 사람은 지속적으로 합동 훈련을 하게 되었는데――"

[[dialogue]]
speaker = "セナリィ"
original = "「えっと……マトイ様？\u3000確かに私、マトイ様が簡単な星術なら、両手で別々に扱えると聞いて……それは私でも出来るのか、とお聞きしましたわ……」"
translation = "「저기…… 마토이 님? 확실히 저, 마토이 님이 간단한 성술이라면 양손으로 별개로 다룰 수 있다고 들어서…… 그건 저도 할 수 있는 건지 물어봤습니다만……」"

[[dialogue]]
speaker = "マトイ"
original = "「うん！\u3000セナリィさんなら絶対にできるよ！」"
translation = "「응! 세나리 씨라면 반드시 할 수 있어!」"

[[dialogue]]
speaker = "セナリィ"
original = "「もう１ヶ月続けてますけど、全っ然、出来ねぇですわ！？」"
translation = "「벌써 한 달째 계속하고 있습니다만, 저어언혀 안 된다고요!?」"

[[dialogue]]
speaker = "セナリィ"
original = "「仮に成功したとして、実戦レベルになるとは思えねぇですわよ！？\u3000やっぱり普通の技能ではねぇですわ、これ！？」"
translation = "「설령 성공한다고 해도 실전 레벨이 될 것 같지는 않다고요!? 역시 평범한 기능은 아니에요, 이거!?」"

[[dialogue]]
speaker = "unk"
original = "セナリィの右手にはライターを点けたような小さな火と、左手には豆粒のような水球が浮いていた。"
translation = "세나리의 오른손에는 라이터를 켠 듯한 작은 불꽃과, 왼손에는 콩알 같은 수구가 떠 있었다."

[[dialogue]]
speaker = "unk"
original = "火も水もそれぞれ不安定に揺らいでおり、気を抜けば今にも消えてしまいそうになっている。"
translation = "불도 물도 각각 불안정하게 흔들리고 있어, 방심하면 금방이라도 꺼져버릴 것 같았다."

[[dialogue]]
speaker = "マトイ"
original = "「――大事なのは諦めずに、『普通』を積み重ねること」"
translation = "「――중요한 건 포기하지 않고 『평범함』을 쌓아가는 것」"

[[dialogue]]
speaker = "マトイ"
original = "「だから私、できるようになるまで何日でも付き合うから！！」"
translation = "「그러니까 나, 할 수 있게 될 때까지 며칠이고 함께할 테니까!!」"

[[dialogue]]
speaker = "セナリィ"
original = "「え！？\u3000もしかしてこんなヤベェこと、できるようになるまで終わらないんですの！？」"
translation = "「에!? 설마 이런 말도 안 되는 거, 할 수 있게 될 때까지 안 끝나는 건가요!?」"

[[dialogue]]
speaker = "マトイ"
original = "「大丈夫！\u3000普通の私でも使えるんだから、セナリィさんなら絶対に習得できるよ！」"
translation = "「괜찮아! 평범한 나도 쓸 수 있으니까, 세나리 씨라면 반드시 습득할 수 있어!」"

[[dialogue]]
speaker = "セナリィ"
original = "「わ、私が教える側のはずでしたのに、どうしてこうなりましたのぉ～～～っ！？」"
translation = "「제, 제가 가르치는 쪽이었을 텐데 어째서 이렇게 된 건가요오～～～!」"

[[dialogue]]
speaker = "unk"
original = "こうして訓練仲間として、親しくなる２人なのであった――"
translation = "이렇게 훈련 동료로서 친해지는 두 사람이었다――"

