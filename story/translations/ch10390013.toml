[[dialogue]]
speaker = "unk"
original = "第３話,魔女の苦手,P"
translation = "제3화, 마녀가 서툰 것, P"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「濃厚魚介つけ麺、ごちそうさまでした。ポタージュのようなスープに負けない太麺の小麦の風味。主張と主張がぶつかり合いながらも見事に調和していました」"
translation = "「농후 어패류 츠케멘, 잘 먹었습니다. 포타주 같은 수프에 지지 않는 굵은 면의 밀 풍미. 주장과 주장이 부딪히면서도 훌륭하게 조화를 이루고 있었습니다」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「今日もお付き合いいただいてありがとうございます、魔王」"
translation = "「오늘도 함께해주셔서 감사합니다, 마왕」"

[[dialogue]]
speaker = "unk"
original = "何か思い出せた？"
translation = "뭐 좀 기억났어?"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「最近、魔王と行動を共にしていて感じたのですが……」"
translation = "「최근 마왕과 행동을 함께하며 느낀 것입니다만……」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「昔の私はいつも誰かと一緒にいた気がします。誰か大切な人と」"
translation = "「예전의 저는 항상 누군가와 함께 있었던 기분이 듭니다. 누군가 소중한 사람과」"

[[dialogue]]
speaker = "unk"
original = "大切な人……家族？\u3000恋人？"
translation = "소중한 사람…… 가족? 연인?"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「いえ……違う気がします」"
translation = "「아뇨…… 다른 기분이 듭니다」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「誰かはわかりませんが……私は１人ではなかった。今の私からすると、自分でもいささか意外ではありますが」"
translation = "「누구인지는 모르겠지만…… 저는 혼자가 아니었습니다. 지금의 저로서는 스스로도 다소 의외이긴 합니다만」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「！\u3000モンスターの出現を感知」"
translation = "「! 몬스터의 출현을 감지」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「モンスターを駆逐します」"
translation = "「몬스터를 구축하겠습니다」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「殲滅完了」"
translation = "「섬멸 완료」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "失った記憶はモンスター嫌いと関係している？"
translation = "잃어버린 기억은 몬스터를 싫어하는 것과 관계있어?"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「認識の訂正を求めます」"
translation = "「인식의 정정을 요청합니다」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「モンスターが嫌いなのではありません。私が許せないのはリクリエです」"
translation = "「몬스터가 싫은 것이 아닙니다. 제가 용서할 수 없는 것은 리크리에입니다」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「モンスターはリクリエの末端。ゆえに駆除する。それだけです」"
translation = "「몬스터는 리크리에의 말단. 그러므로 구제한다. 그뿐입니다」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「ニャニャ？\u3000さっきの警報は誤報ニャン？\u3000全然モンスターがいないニャ」"
translation = "「냐냐? 방금 경보는 오보냥? 몬스터가 전혀 없다냥」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「──！？」"
translation = "「──!?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「こんにちは、緋宮会長。どうやら私たちは一足遅かったみたいですね」"
translation = "「안녕하세요, <u>히노미야</u> 회장님. 아무래도 저희는 한발 늦은 모양이네요」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「なんだ、あたしたちは用無しか。ま、平和なのが一番だけどな」"
translation = "「뭐야, 우린 볼일 없는 건가. 뭐, 평화로운 게 제일이지만 말이야」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「んん？\u3000そっちのは見ない顔だニャン」"
translation = "「응? 저쪽은 못 보던 얼굴이다냥」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「ひんっ！？」"
translation = "「히익!?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「あ、緋宮会長の後ろに隠れましたね」"
translation = "「아, <u>히노미야</u> 회장님 뒤로 숨었네요」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「アホ猫がまたなんかしやがったんじゃねーだろーな？」"
translation = "「바보 고양이가 또 뭔 짓 저지른 거 아냐?」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「ワガハイは悲鳴を上げられるようなことはしてないニャン！」"
translation = "「와가하이는 비명을 지르게 할 만한 짓은 안 했다냥!」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「なぜかあの生き物──猫を見ると体が勝手に……」"
translation = "「왠지 저 생물── 고양이를 보면 몸이 멋대로……」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「自分でも理由はわかりませんが、畏怖の感情を覚えます。記憶を失う前に何かあったのかもしれません……」"
translation = "「저도 이유는 모르겠지만, 외포의 감정을 느낍니다. 기억을 잃기 전에 무슨 일이 있었을지도 모르겠네요……」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「失礼しました。流星学園星徒会の方ですね。私はイニシュ。ネビュラの魔女です」"
translation = "「실례했습니다. 유성학원 성도회 분들이시군요. 저는 이니슈. 네뷸라의 마녀입니다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ネビュラの……」"
translation = "「네뷸라의……」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「ってーと、もしかしてこないだアステラをまとめて蹴散らしたやつか？」"
translation = "「그렇다는 건, 혹시 요전에 아스텔라를 한꺼번에 해치웠다는 녀석인가?」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「今ここであなた方と敵対するつもりはありません。警戒は不要です」"
translation = "「지금 여기서 당신들과 적대할 생각은 없습니다. 경계는 불필요합니다」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「ニャハハ！\u3000いざとなったらさっきみたいにワガハイがやっつけてやるニャン！」"
translation = "「냐하하! 유사시엔 아까처럼 와가하이가 해치워 주겠다냥!」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「ひゃぅっ！？」"
translation = "「햣!?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ニャーリーオーン」"
translation = "「냐~리~온~」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「ニャ！？\u3000わわ、悪気はなかったのニャン！」"
translation = "「냐!? 와, 와악, 악의는 없었다냥!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「しかし、魔女なのに猫が苦手なんですね。どちらかというと雰囲気に合っているような気がしましたが」"
translation = "「하지만 마녀인데 고양이가 서투르시네요. 어느 쪽인가 하면 분위기에 어울리는 느낌이 들었습니다만」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「ワガハイの強大さに恐れおののいているのニャン」"
translation = "「와가하이의 강대함에 공포에 떨고 있는 거다냥」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「単に猫にビビっただけだろ。んなこともわかんねーのかアホ猫」"
translation = "「그냥 고양이에 쫄은 거잖아. 그런 것도 모르냐 바보 고양이」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「アホ猫と言いますが、あなたも猫系の魔族では……？」"
translation = "「바보 고양이라고 하십니다만, 당신도 고양이계 마족이……?」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「あんだと？」"
translation = "「뭐라고?」"

[[dialogue]]
speaker_original = "ニャリオン"
speaker_translation = "냐리온"
original = "「脳筋のユウリと一緒にするニャ！」"
translation = "「근육뇌 유우리랑 같이 취급하지 마라냥!」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「失礼しましたっ」"
translation = "「실례했습니다」"

[[dialogue]]
speaker = "unk"
original = "イニシュもかわいいところがあるんだな"
translation = "이니슈도 귀여운 구석이 있구나"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「かわいい……ですか？\u3000私が……？」"
translation = "「귀여운…… 가요? 제가……?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ふふ。お知り合いのようですし、彼女のことは緋宮会長にお任せしますね」"
translation = "「후후. 아시는 사이인 듯하니, 그녀의 일은 <u>히노미야</u> 회장님께 맡길게요」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「んじゃ、あたしらはこの辺で。久々に友達同士で遊びに来たんだから、ちっとは楽しまないとな」"
translation = "「그럼 우린 이쯤에서. 오랜만에 친구들끼리 놀러 온 거니까 좀 즐겨야지」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「そうだ、クレープ食おうぜー、クレープ」"
translation = "「맞다, 크레이프 먹자고, 크레이프」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ふふ、ユウリは好きだね」"
translation = "「후후, 유우리는 참 좋아하네」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「とも……だち……」"
translation = "「친…… 구……」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「ともだち……友達……」"
translation = "「친구…… 친구……」"

[[dialogue]]
speaker = "unk"
original = "イニシュ……？"
translation = "이니슈……?"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「すみません、魔王……今日は失礼します」"
translation = "「죄송합니다, 마왕…… 오늘은 이만 실례하겠습니다」"

