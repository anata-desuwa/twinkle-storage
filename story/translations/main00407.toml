[[dialogue]]
speaker = "unk"
original = "第８話,炎星,B"
translation = "제8화, 염성, B"

[[dialogue]]
speaker = "unk"
original = "一方、こちらは──"
translation = "한편, 이쪽은──"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「イ～ッ！」"
translation = "「이ー잇!」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「ち──おらよっ！\u3000これでも、食らっとけ──！」"
translation = "「칫── 오라! 이것도, 먹어라──!」"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「イイイイイッ……！！」"
translation = "「이이이이잇……!!」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「あーもーったく！\u3000キリがねえなあこいつら。しぶとすぎんだろ」"
translation = "「아ー 정말! 끝이 없네 이놈들. 너무 질기잖아」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ひええ……倒しても倒しても起き上がってきます。だんだん数も増えてきましたし……」"
translation = "「히에에…… 쓰러뜨려도 쓰러뜨려도 일어납니다. 점점 수도 늘어나고 있고요……」"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「イイイイイイ！！」"
translation = "「이이이이이이!!」"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「イ～ッ！」"
translation = "「이ー잇!」"

[[dialogue]]
speaker = "unk"
original = "繁華街──"
translation = "번화가──"

[[dialogue]]
speaker = "unk"
original = "人口の密集するこの地において、特殊モンスターの出現もまた増大していた。"
translation = "인구가 밀집된 이곳에서, 특수 몬스터의 출현 또한 증대하고 있었다."

[[dialogue]]
speaker = "unk"
original = "彼らは星騎士を見るや誘引される性質のようで、飢えた獣のごとき凶暴性で何度でもよみがえっている。"
translation = "그들은 성기사를 보자마자 유인되는 성질인 듯, 굶주린 짐승과 같은 흉포성으로 몇 번이고 되살아나고 있다."

[[dialogue]]
speaker = "unk"
original = "変化することのない状況を見て、アナは小さく手を挙げた。"
translation = "변화하지 않는 상황을 보고, 아나는 작게 손을 들었다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「あの」"
translation = "「저기」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「丸焼きにしてもいいでしょうか」"
translation = "「통째로 구워도 괜찮을까요」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「丸焼き……って炎の星術ってことか？」"
translation = "「통째로 굽는 거……라는 건 불꽃의 성술 말하는 거냐?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「はい」"
translation = "「네」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「構わねえけど……さっきあたしの炎を食らわせた感じ、効いてる素振りもなかったぞ」"
translation = "「상관은 없지만…… 아까 내 불꽃을 먹인 느낌으론, 효과가 있는 기색도 없었다고」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「火力の問題と思われます。この個体たちは高い再生能力を有しているようですので、根こそぎ焼き尽くすのが有効かと」"
translation = "「화력의 문제라고 생각됩니다. 이 개체들은 높은 재생 능력을 가지고 있는 듯하니, 모조리 태워버리는 것이 유효할까 합니다」"

[[dialogue]]
speaker = "unk"
original = "淡々と語るアナ。"
translation = "담담하게 말하는 아나."

[[dialogue]]
speaker = "unk"
original = "他校の先輩であっても、彼女に怖気づく様子はなかった。"
translation = "타교의 선배일지라도, 그녀에게 겁먹는 기색은 없었다."

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「ＯＫ。任せる。んで、あたしはどうすりゃいい？」"
translation = "「OK. 맡기지. 그래서, 나는 어떻게 하면 되지?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「はい。これから私は発射まで約一分ほど無防備になります。その間のカバーをお願いしたいのですが」"
translation = "「네. 지금부터 저는 발사까지 약 1분 정도 무방비 상태가 됩니다. 그동안의 커버를 부탁드리고 싶은데요」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「護んのか。大丈夫だ、それなら得意分野だからな──指一本触れさせやしねえよ」"
translation = "「지키라는 거냐. 괜찮다, 그거라면 특기 분야니까── 손가락 하나 건드리게 하지 않을 거야」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ユウリ先輩、あのモンスターに指はないのでは！？」"
translation = "「유우리 선배, 저 몬스터에게 손가락은 없지 않나요!?」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「細けぇことはいいんだよ、ノリだノリ！」"
translation = "「자잘한 건 됐어, 분위기다 분위기!」"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「ウィイイイイイ！！」"
translation = "「위이이이이이!!」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「はっ──甘ぇっての！」"
translation = "「핫── 무르다는 거다!」"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「イイイイ──ッ！？」"
translation = "「이이이이──잇!?」"

[[dialogue]]
speaker = "unk"
original = "しかし、ユウリの鉄壁を前にその牙はまるで通らない。"
translation = "하지만, 유우리의 철벽 앞에서 그 송곳니는 전혀 통하지 않는다."

[[dialogue]]
speaker = "unk"
original = "彼女の頑強さは学園最硬──"
translation = "그녀의 완강함은 학원 최고 경도──"

[[dialogue]]
speaker = "unk"
original = "半魔族としての<ruby>身体能力<rt>フィジカル</rt></ruby>と、守護星カペラによる炎の庇護がその堅牢さを実現していた。"
translation = "반마족으로서의 신체 능력과, 수호성 카펠라에 의한 불꽃의 비호가 그 견고함을 실현하고 있었다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「おおっ……さすがはユウリ先輩。どんな攻撃もへっちゃらですね」"
translation = "「오옷…… 역시 유우리 선배. 어떤 공격도 아무렇지 않네요」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「ま、多少痛ぇことは痛ぇんだが……これくらいならどうってことねえな」"
translation = "「뭐, 어느 정도 아프긴 아프지만…… 이 정도라면 아무렇지도 않지」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「よーし……わたしもいっちょ頑張っちゃいますよ！\u3000エネルギー全開です！」"
translation = "「좋ー아…… 저도 한번 힘내볼게요! 에너지 전개입니다!」"

[[dialogue]]
speaker = "unk"
original = "ルリエルは生まれながらにして、絶大な星力を持っていた。"
translation = "루리엘는 태어날 때부터, 막대한 성력을 가지고 있었다."

[[dialogue]]
speaker = "unk"
original = "それでも攻撃や防御、回復にあたってのコントロールを苦手としていた彼女は、その力を丸ごと他者へ贈る術を身に着けた。"
translation = "그럼에도 공격이나 방어, 회복에 있어서 컨트롤을 어려워했던 그녀는, 그 힘을 통째로 타인에게 주는 기술을 익혔다."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「２人に届け──エールホルン！」"
translation = "「두 사람에게 닿아라── 에일 호른!」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「おおお……！\u3000ハッ、さすがルリ──これなら一分と言わず、一時間でも保ちそうだ」"
translation = "「오오오……! 핫, 역시 루리── 이거라면 1분이라고 하지 않고, 1시간이라도 버틸 것 같다」"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「ィィィ！」"
translation = "「이이이!」"

[[dialogue]]
speaker = "unk"
original = "ルリエルの星力──守護星リゲルの加護を受けたその音色は、アナの攻撃力とユウリの防御力を爆発的に向上させた。"
translation = "루리엘의 성력── 수호성 리겔의 가호를 받은 그 음색은, 아나의 공격력과 유우리의 방어력을 폭발적으로 향상시켰다."

[[dialogue]]
speaker = "unk"
original = "そして……"
translation = "그리고……"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「どうですか、アナちゃん！？」"
translation = "「어떠세요, 아나짱!?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「──」"
translation = "「──」"

[[dialogue]]
speaker = "unk"
original = "返事はない。"
translation = "대답은 없다."

[[dialogue]]
speaker = "unk"
original = "極限まで<ruby>集中力<rt>コンセントレーション</rt></ruby>を高めている今の彼女には、外野の声すら届いていなかった。"
translation = "극한까지 집중력을 높이고 있는 지금의 그녀에게는, 외야의 목소리조차 닿지 않았다."

[[dialogue]]
speaker = "unk"
original = "軌道の計算。星力の制御。市街地への影響。"
translation = "궤도의 계산. 성력의 제어. 시가지에의 영향."

[[dialogue]]
speaker = "unk"
original = "アナの頭脳では星術式が恐ろしい速度で組み合わされてゆき、その結晶が灼熱の焔となって矢先に宿る。"
translation = "아나의 두뇌에서는 성술식이 무서운 속도로 조합되어 가고, 그 결정이 작열하는 불꽃이 되어 화살 끝에 깃든다."

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「──そろそろか！？」"
translation = "「──슬슬인가!?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「みたいです！」"
translation = "「그런 것 같아요!」"

[[dialogue]]
speaker = "unk"
original = "アナが弓を構えてからちょうど６０秒が経過した。"
translation = "아나가 활을 겨눈 지 정확히 60초가 경과했다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「──解析完了」"
translation = "「──해석 완료」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「カーディナルエプシロン」"
translation = "「카디널 엡실론」"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「イイイイ──ッ！」"
translation = "「이이이이──잇!」"

[[dialogue]]
speaker = "unk"
original = "放たれたのは弓矢というより砲撃だった。"
translation = "발사된 것은 활이라기보다는 포격이었다."

[[dialogue]]
speaker = "unk"
original = "絶大な火力と範囲を伴って直進する炎の波は、群がっていた相手どころか遥か彼方を周遊していたモンスターまでもを根こそぎ焼き尽くす。"
translation = "막대한 화력과 범위를 수반하여 직진하는 불꽃의 파도는, 몰려 있던 상대는 물론이거니와 아득히 먼 곳을 돌아다니던 몬스터까지 모조리 태워버린다."

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "５秒、１０秒と経過する。"
translation = "5초, 10초가 경과한다."

[[dialogue]]
speaker = "unk"
original = "起き上がってくる様子のない──というより跡形もない──特殊モンスターの末路を見て、アナは冷静に呟いた。"
translation = "일어날 기미가 없는── 아니, 흔적조차 없는── 특수 몬스터의 말로를 보고, 아나는 냉정하게 중얼거렸다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「<ruby>任務完了<rt>ミッションコンプリート</rt></ruby>。ご協力ありがとうございました」"
translation = "「임무 완료. 협력해 주셔서 감사합니다」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「お、おう……ドン引きしちまったよ。すげえな」"
translation = "「어, 어어…… 기가 막혀 버렸다고. 대단하네」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「しかもあれだけの大火力なのに街が一切焼けていません……！\u3000これはどういう技術なのですか……！？」"
translation = "「게다가 저 정도의 대화력인데 마을이 전혀 타지 않았어요……! 이건 어떤 기술인 것인가요……!?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「敵性のみを対象にするよう星力をコントロールしました。それと、軌道上にも複数体のモンスターがいたのを先ほど上空から確認しましたので」"
translation = "「적성만을 대상으로 하도록 성력을 컨트롤했습니다. 그리고, 궤도상에도 복수 개체의 몬스터가 있었던 것을 방금 상공에서 확인했으므로」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「サラッと言ってっけどとんでもねえ神業だぞ」"
translation = "「덤덤하게 말하고 있지만 터무니없는 신의 기술이라고」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「こ、これが新星副会長でありますか……！\u3000同じ一年生なのに少々凹むであります……！」"
translation = "「이, 이것이 신성 부회장이란 말입니까……! 같은 1학년인데 조금 풀이 죽는단 말입니다……!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「２人のサポートあってのこと。凹む必要はない」"
translation = "「두 사람의 서포트가 있었기에 된 일. 풀 죽을 필요는 없다」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「落ち着きが年下とは思えねえ……」"
translation = "「침착함이 연하라고는 생각되지 않네……」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ですが、私は空気が読めないとたまに言われます。どうでしょう？」"
translation = "「하지만, 저는 분위기를 읽지 못한다고 가끔 듣습니다. 어떠신가요?」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「どうでしょうと言われてもな……」"
translation = "「어떠냐고 물어봐도 말이지……」"

[[dialogue]]
speaker = "unk"
original = "ひと段落した一行。"
translation = "일단락된 일행."

[[dialogue]]
speaker = "unk"
original = "人払いをしていた繁華街にも、次第に人が戻り始めていった。"
translation = "사람들을 쫓아냈던 번화가에도, 점차 사람들이 돌아오기 시작했다."

