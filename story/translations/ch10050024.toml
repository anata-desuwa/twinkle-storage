[[dialogue]]
speaker = "unk"
original = "第４話,新春ジェラシー,P"
translation = "제4화 신춘 젤러시"

[[dialogue]]
speaker = "unk"
original = "冬期休暇中であっても、多忙な星徒会に休みはない──唯一の救いは、事務仕事で首の回らない俺を手伝ってくれる人がいることだ。"
translation = "겨울 방학 중이라도 바쁜 성도회에 휴일은 없다── 유일한 구원은 사무 업무로 정신없는 나를 도와주는 사람이 있다는 것이다."

[[dialogue]]
speaker = "unk"
original = "今日はソフィとサーシャさん。奏姉妹が応援に来てくれている──"
translation = "오늘은 소피와 사샤 씨. 카나데 자매가 응원을 와 주었다──"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「うーん。やっぱりお休みしている間に報告書が溜まってるわね。こっちの書類は片付いたわよー、会長くん」"
translation = "「으음. 역시 쉬는 동안 보고서가 많이 쌓였네. 이쪽 서류는 다 끝났어, 회장군」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「こちらも終わりました。アナさんがまとめておいてくださった資料、とても分かりやすいです」"
translation = "「이쪽도 끝났습니다. 아나 씨가 정리해 두신 자료, 정말 이해하기 쉬워요」"

[[dialogue]]
speaker = "unk"
original = "２人ともありがとう"
translation = "둘 다 고마워"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「いいのよ～♪\u3000ふふ、こんな時くらいお手伝いしないとね。それにちょうど用事もあったし」"
translation = "「천만에요~♪ 후후, 이럴 때라도 도와야지. 마침 볼일도 있었고」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「そういえば姉さん、私と会長さんに聞きたいことがあると言っていましたね。お仕事しながらでいいなら、お聞きします」"
translation = "「그러고 보니 언니, 저와 회장님께 묻고 싶은 게 있다고 했었죠. 일하면서라도 괜찮다면 듣겠습니다」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ええ♪\u3000お姉ちゃんが聞きたいことは～……ずばり！\u3000２人の馴れ初めよ～っ！」"
translation = "「응♪ 언니가 궁금한 건~…… 바로! 두 사람의 첫 만남 이야기야~!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「──仕事中です、却下です」"
translation = "「──업무 중입니다, 기각이에요」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「え～っ、いいじゃない。もうずいぶん長いこと作業してるし、休憩がてらお喋りしましょ？」"
translation = "「에~ 좋잖아. 벌써 꽤 오랫동안 작업했으니까 휴식 겸 수다 떨자?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「だからって何ですか、その話題。からかわれそうなので普通に嫌です」"
translation = "「그렇다고 해서 뭡니까, 그 화제는. 놀림당할 것 같아서 평범하게 싫습니다」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ひど～い……可愛い妹のソフィのことが気になるから聞いてるだけなのに～」"
translation = "「너무해~…… 귀여운 동생인 소피가 신경 쓰여서 물어보는 것뿐인데~」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「う……またそんな恥ずかしいことをストレートに……」"
translation = "「으…… 또 그런 부끄러운 소리를 대놓고……」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「わ、私、お茶を入れてきます。会長さんはその間にお話を済ませておいてください」"
translation = "「저, 저는 차를 타 올게요. 회장님은 그동안 이야기를 끝내 두세요」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「え～。一緒にお喋りしてくれないの？」"
translation = "「에~ 같이 수다 떨어주지 않는 거야?」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「恥ずかしいんですっ。会長さんもあまり詳しく話さないでいいですからねっ？\u3000それではっ！」"
translation = "「부끄럽단 말이에요. 회장님도 너무 자세히 이야기하지 마세요? 그럼!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふふっ♪\u3000ソフィったら相変わらずか～わいい<emoji=heart04>\u3000それじゃあ会長くん、聞かせてもらえる～？\u3000２人の馴れ初め<emoji=heart04>」"
translation = "「후후♪ 소피는 여전히 귀여워<emoji=heart04> 그럼 회장군, 들려줄래~? 두 사람의 첫 만남 이야기<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "通う学園も、年齢も違うソフィアとどのような経緯で恋人になったのかを、俺は端的に語った──"
translation = "다니는 학원도, 나이도 다른 소피아와 어떤 경위로 연인이 되었는지를 나는 단적으로 이야기했다──"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふむふむ……なるほど。あの子がパトロールをしていて、それに同行するうちに仲良くなっていったのね～」"
translation = "「흠흠…… 과연. 그 아이가 순찰을 돌고, 거기에 동행하면서 사이가 좋아진 거구나~」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「お仕事をこなして、一緒にパンケーキを食べたりして、たまにモンスターとも戦って……やぁん♪\u3000いいわねー、青春って感じ」"
translation = "「업무를 처리하고, 같이 팬케이크를 먹기도 하고, 가끔 몬스터와도 싸우고…… 어머♪ 좋네~ 청춘이라는 느낌이야」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「何より会長くん。モンスターからソフィを守ってくれてありがとう♪\u3000お礼にぎゅ～ってハグしてあげる～♪」"
translation = "「무엇보다 회장군. 몬스터로부터 소피를 지켜줘서 고마워♪ 답례로 꼬옥~ 하고 허그해 줄게~♪」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ぎゅぅ～っ<emoji=heart04>\u3000ふふふっ、逃がさないわよ～<emoji=heart04>」"
translation = "「꼬옥~<emoji=heart04> 후후후, 놓치지 않을 거야~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "む、むぎゅぅ……！？"
translation = "으, 으규우……!?"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「お待たせしました……って！？\u3000何してるんですか姉さんっ！\u3000会長さんから離れてくださいっ！」"
translation = "「오래 기다리셨습…… 어!? 뭐 하시는 거예요 언니! 회장님한테서 떨어지세요!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「まったく油断も隙もありませんっ。姉さんのお茶菓子は抜きですっ！」"
translation = "「정말 방심할 틈이 없다니까요. 언니 몫의 다과 사탕은 압수예요!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「そんなに怒らないでもいいじゃな～い。会長くんがとっても優しい彼氏さんだったから、お姉ちゃんとしてお礼をしてただけなのに～」"
translation = "「그렇게 화내지 않아도 되잖아~. 회장군이 아주 다정한 남자친구라서 언니로서 고마움을 표시한 것뿐인데~」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「いくら姉さんでもやって良いことと悪いことがあります！\u3000どこの世界に、妹の彼氏にハグする姉がいるんですかっ！」"
translation = "「아무리 언니라도 해도 되는 일과 안 되는 일이 있어요! 세상 어느 언니가 여동생 남자친구를 허그하나요!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「そ、それにそんな、お、おお、おっきな胸でパフパフとっ……会長さんを誘惑するのは禁止です！」"
translation = "「그, 게다가 그런, 크, 크크, 큰 가슴으로 파후파후하며…… 회장님을 유혹하는 건 금지입니다!」"

[[dialogue]]
speaker = "unk"
original = "誘惑なんてされないぞ！？"
translation = "유혹당하지 않는다고!?"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「それじゃあ、そのゆるみ切ったお顔は何ですかっ。ふにゃふにゃとふやけて実に幸せそうな顔をしています！」"
translation = "「그럼 그 풀어진 얼굴은 뭔가요. 흐물흐물하게 풀려서 아주 행복해 보이는 얼굴을 하고 있습니다!」"

[[dialogue]]
speaker = "unk"
original = "そ、そんな……"
translation = "그, 그럴 리가……"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「でも私はお姉ちゃんだし……義弟くんにハグするのが禁止なのは辛いわ～……」"
translation = "「하지만 난 언니고…… 제부군을 허그하는 게 금지라니 슬퍼라~……」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「姉さんもしっかり反省して……って、え？\u3000お、義弟っ！？」"
translation = "「언니도 제대로 반성하…… 네, 에? 제, 제부!?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ええ、だってソフィの恋人でしょ？\u3000そういう未来だってお姉ちゃん、あると思うの～♪」"
translation = "「응, 그야 소피의 연인이잖아? 그런 미래도 언니는 있을 수 있다고 생각해~♪」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「そ、そそそ、そんなことはっ……な、無きにしも非ずというか、何と言うかっ……！」"
translation = "「그, 그그그, 그런 일은…… 어, 없으리란 법도 없다고 할까, 뭐라고 할까……!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あ、そうだ。会長くんも今から慣れておく？\u3000私のこと、お義姉ちゃんって呼ぶ練習～<emoji=heart04>」"
translation = "「아, 맞다. 회장군도 지금부터 익숙해져 볼래? 나를 처형이라고 부르는 연습~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "お……お義姉ちゃ──"
translation = "처…… 처형──"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「言わなくていいですっ！\u3000そういうのはまだ早いですからっ！」"
translation = "「말하지 마세요! 그런 건 아직 일러요!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「まだ早い～ってことは……フフフ<emoji=heart04>\u3000その気なんじゃない、お姉ちゃん嬉しい♪\u3000ソフィも会長くんも大好きだから～<emoji=heart04>」"
translation = "「아직 이르다는 건…… 후후후<emoji=heart04> 그럴 마음이 있다는 거네, 언니는 기뻐♪ 소피도 회장군도 정말 좋아하니까~<emoji=heart04>」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「あー、もーっ！\u3000そういうからかいは駄目です、禁止ですっ！\u3000お仕事しますよ、ほらほらっ！」"
translation = "「아 정말! 그런 놀림은 안 돼요, 금지예요! 일할 거예요, 자자!」"

[[dialogue]]
speaker = "unk"
original = "妹の彼氏なのだから、将来的に私は『お義姉ちゃん』──そんな主張の元、その後もサーシャさんの姉ハグ攻撃は続いた。"
translation = "여동생의 남자친구니까 장래적으로 자신은 『처형』── 그런 주장 아래, 그 후로도 사샤 씨의 언니 허그 공격은 계속되었다."

[[dialogue]]
speaker = "unk"
original = "恋人の姉を邪険にするだなんてできるわけもなく、ハグのたびにほっぺに押し付けられるたわわな感触に俺の顔は無条件に緩んでしまって……"
translation = "연인의 언니를 매정하게 대할 수도 없었고, 허그할 때마다 뺨에 눌리는 풍만한 감촉에 내 얼굴은 무조건적으로 풀어져 버려서……"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「か・い・ちょ・う・さ～ん？\u3000そんなに姉さんのお胸がお好きなんですか、そぉですかっ！」"
translation = "「회·장·님~? 그렇게 언니 가슴이 좋으신가요, 그러시냐고요!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「姉さんほどじゃなくても私だって……ない……薄焼きパンケーキとふっくらパンケーキ以上に差が……」"
translation = "「언니만큼은 아니더라도 저도…… 없어…… 얇게 구운 팬케이크와 폭신한 팬케이크 이상의 차이가……」"

[[dialogue]]
speaker = "unk"
original = "俺が好きなのはソフィのおっ──"
translation = "내가 좋아하는 건 소피의 가──"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「それはそれで問題発言ですっ！」"
translation = "「그건 그것대로 문제 발언이에요!」"

[[dialogue]]
speaker = "unk"
original = "ぷりぷり怒るソフィアの機嫌を取るために、鏡餅みたいなスペシャルパンケーキ三段重ねをご馳走する羽目になるのだった──"
translation = "심통이 나서 화를 내는 소피아의 기분을 풀어주기 위해, 카가미모치 같은 스페셜 팬케이크 3단 중첩을 대접하는 처지가 되는 것이었다──"

