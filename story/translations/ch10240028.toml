[[dialogue]]
speaker = "unk"
original = "その日、ヨミはヴィーナスからの指示で、大聖堂の日曜ミサにきた子供たちと遊ぶ役を任されていた――"
translation = "그날 요미는 비너스의 지시로 대성당 일요 미사에 온 아이들과 놀아주는 역할을 맡고 있었다──"

[[dialogue]]
speaker = "ヨミ"
original = "「ふぅ……ようやく一息つけます」"
translation = "「후우…… 겨우 한숨 돌리겠네요.」"

[[dialogue]]
speaker = "unk"
original = "お昼の休憩時間になり、ヨミは一旦、大聖堂の中に戻ってきたところだった。"
translation = "점심 휴식 시간이 되어 요미는 일단 대성당 안으로 돌아온 참이었다."

[[dialogue]]
speaker = "ヨミ"
original = "（実家の天ヶ崎神宮で巫女をしていた時も、行事とかで、子供たちと遊ぶのは慣れていたつもりでしたけど……。それとは比べ物にならないくらい、爆裂大変です……）"
translation = "(본가인 아마가사키 신궁에서 무녀를 했을 때도 행사 같은 데서 아이들과 놀아주는 건 익숙하다고 생각했는데……. 그것과는 비교도 안 될 정도로 폭렬 힘들어요……)"

[[dialogue]]
speaker = "ヨミ"
original = "（流星市国だから、人間の子だけじゃなく、魔族、天使の子も混じっていて……しかも何故か、星力持ちの子ばっかりっていう……！）"
translation = "(유성시국이라 인간 아이뿐만 아니라 마족, 천사 아이도 섞여 있고…… 게다가 왜인지 성력을 가진 아이들뿐이라는 거……!)"

[[dialogue]]
speaker = "ヨミ"
original = "（トナカイの格好だとウケるからって、お嬢様からクリスマスフォームを着るように言われてましたけど……これが戦闘服で助かったかもしれません……）"
translation = "(순록 차림이면 인기가 많을 거라며 아가씨가 크리스마스 폼을 입으라고 하셨는데…… 이게 전투복이라 다행이었을지도 모르겠네요……)"

[[dialogue]]
speaker = "ヨミ"
original = "「とりあえず、忙しさで忘れないうちに、ちゃんと<b>アレ</b>を飲んでおかないと――」"
translation = "「일단 바빠서 잊어버리기 전에 제대로 <b>그것</b>을 마셔둬야──」"

[[dialogue]]
speaker = "ヨミ"
original = "「って、あれ……？」"
translation = "「어라……?」"

[[dialogue]]
speaker = "ヨミ"
original = "「いつも肌身離さず、ポケットに入れていたのに……ケースがない……？」"
translation = "「항상 몸에 지니고 주머니에 넣어뒀는데…… 케이스가 없어……?」"

[[dialogue]]
speaker = "ヨミ"
original = "「も、もしかして……子供たちと遊んでいる時に、どこかに落としちゃったとか……？」"
translation = "「호, 혹시…… 아이들과 놀 때 어딘가에 떨어뜨렸다거나……?」"

[[dialogue]]
speaker = "ヨミ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "ヨミ"
original = "「ない物は仕方ないですよね……。まぁ、１回くらい飲まなくても大丈夫のはずです……多分……」"
translation = "「없는 건 어쩔 수 없죠……. 뭐, 한 번 정도 안 마셔도 괜찮을 거예요…… 아마……」"

[[dialogue]]
speaker = "unk"
original = "ヨミは自分に言い聞かせるように頷いて、昼食をとる為、カフェテリアに向かうのだった――"
translation = "요미는 스스로를 다독이듯 고개를 끄덕이고 점심을 먹으러 카페테리아로 향했다──"

[[dialogue]]
speaker = "unk"
original = "場所は変わって、新星学園の星徒会室。"
translation = "장소는 바뀌어 신성 학원의 성도회실."

[[dialogue]]
speaker = "unk"
original = "俺は別の仕事を終えて、戻ってきたところだった。まだ残っている書類のチェックをしようと、会長席に着くと――"
translation = "나는 다른 업무를 마치고 돌아온 참이었다. 아직 남아있는 서류 체크를 하려고 회장석에 앉자──"

[[dialogue]]
speaker = "unk"
original = "――うおわっ！？\u3000ちょっ！？\u3000なんでそんなところに隠れてるの！？"
translation = "──우와앗!? 잠깐!? 왜 그런 곳에 숨어있는 거야!?"

[[dialogue]]
speaker = "unk"
original = "待って待って、ズボンいきなり脱がすってどういう――"
translation = "잠깐 잠깐, 바지 갑자기 벗긴다니 그게 무슨──"

[[dialogue]]
speaker = "unk"
original = "アッ――――！？"
translation = "앗───!?"

[[dialogue]]
speaker = "ヨミ"
original = "「はあぁっ……<emoji=heart04>\u3000会長のおち○ぽ様……<emoji=heart04>\u3000くんくん……<emoji=heart04>\u3000恋しかったです……<emoji=heart04>」"
translation = "「하아앗……<emoji=heart04> 회장님의 자지님……<emoji=heart04> 킁킁……<emoji=heart04> 그리웠어요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "会長席の机の下に隠れていたのは、なんと恋人のヨミであった。確か今日は、日曜ミサで子供たちの遊び役を引き受けたと聞いていたが……。"
translation = "회장석 책상 밑에 숨어있던 것은 무려 연인인 요미였다. 분명 오늘 일요 미사에서 아이들 놀이 상대를 맡았다고 들었는데……."

[[dialogue]]
speaker = "unk"
original = "既に顔が赤く、息も荒くて、様子がおかしい。一体どうしたのかと尋ねると――"
translation = "이미 얼굴이 붉고 숨도 거칠어서 상태가 이상하다. 대체 어찌 된 일이냐고 묻자──"

[[dialogue]]
speaker = "ヨミ"
original = "「すみません。恥ずかしいので言ってなかったんですけど、実は私……今、発情期で……<emoji=heart04>」"
translation = "「죄송해요. 부끄러워서 말씀 안 드렸는데 사실 저…… 지금 발정기라……<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「普段は毎日決まった時間に、薬を飲んで症状を抑えているんです。でも、今日……どこかに錠剤の入ったケースを落としてしまったみたいで……」"
translation = "「평소에는 매일 정해진 시간에 약을 먹어서 증상을 억제하고 있어요. 그런데 오늘…… 어딘가에 알약이 든 케이스를 떨어뜨린 모양이라……」"

[[dialogue]]
speaker = "ヨミ"
original = "「１回くらい飲まなくても我慢できるだろうって思ってたんですけど……ダメでした……<emoji=heart04>」"
translation = "「한 번 정도 안 먹어도 참을 수 있을 거라 생각했는데…… 안 됐어요……<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「だから、会長……ごめんなさい。ちょっとだけでいいので、協力して欲しいです……<emoji=heart04>」"
translation = "「그러니까 회장님…… 죄송해요. 조금만 좋으니까 협력해 주셨으면 해요……<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「くんくんっ……<emoji=heart04>\u3000はあぁっ……ふうぅっ……<emoji=heart04>\u3000おち○ぽ様の匂い、やっぱり堪らないです……<emoji=heart04>\u3000好き……<emoji=heart04>\u3000すうぅ……はあぁっ……<emoji=heart04>\u3000んふぅっ……<emoji=heart04>」"
translation = "「킁킁……<emoji=heart04> 하아앗…… 후우우……<emoji=heart04> 자지님 냄새, 역시 참을 수 없어요……<emoji=heart04> 좋아……<emoji=heart04> 스으…… 하아앗……<emoji=heart04> 응후……<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「嗅いでるだけで……くんくんっ……<emoji=heart04>\u3000おま○こから愛液溢れてきて……ふうぅっ……<emoji=heart04>\u3000ぐちゅぐちゅになっちゃってます……<emoji=heart04>\u3000はあぁっ……<emoji=heart04>」"
translation = "「맡고 있는 것만으로…… 킁킁……<emoji=heart04> 보지에서 애액이 흘러나와서…… 후우우……<emoji=heart04> 질척질척해져 버렸어요……<emoji=heart04> 하아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「あんっ<emoji=heart04>\u3000おま○こ疼いて……指が勝手に動いちゃいます……<emoji=heart04>\u3000んっ<emoji=heart04>\u3000あっ……<emoji=heart04>\u3000ふあぁっ……<emoji=heart04>\u3000気持ちいい……<emoji=heart04>」"
translation = "「앙<emoji=heart04> 보지가 욱신거려서…… 손가락이 멋대로 움직여버려요……<emoji=heart04> 응<emoji=heart04> 앗……<emoji=heart04> 후아앗……<emoji=heart04> 기분 좋아……<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「あっ<emoji=heart04>\u3000クリ、もう勃起しちゃってます……<emoji=heart04>\u3000はぁっ……はぁっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふあぁっ……<emoji=heart04>\u3000あっ<emoji=heart04>\u3000いいっ……<emoji=heart04>\u3000はあぁっ……<emoji=heart04>\u3000あっ、あんっ……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 클리, 벌써 발기해버렸어요……<emoji=heart04> 하앗…… 하앗<emoji=heart04> 응<emoji=heart04> 후아앗……<emoji=heart04> 앗<emoji=heart04> 좋아……<emoji=heart04> 하아앗……<emoji=heart04> 앗, 앙……<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「んっ……<emoji=heart04>\u3000――入り口の鍵をかけてないから、誰か入ってくるとマズい、ですか？」"
translation = "「응……<emoji=heart04> ──입구 문을 잠그지 않아서 누가 들어오면 곤란하다고요?」"

[[dialogue]]
speaker = "ヨミ"
original = "「大丈夫です……<emoji=heart04>\u3000机の下なら、入り口からは見えませんから……<emoji=heart04>\u3000くんくんっ……<emoji=heart04>\u3000んふぅっ……<emoji=heart04>」"
translation = "「괜찮아요……<emoji=heart04> 책상 밑이라면 입구에서는 보이지 않으니까……<emoji=heart04> 킁킁……<emoji=heart04> 응후……<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「だから、会長は安心して気持ちよくなって下さい……<emoji=heart04>\u3000おち○ぽ様、舐めますね……<emoji=heart04>\u3000ん……ちゅっ……<emoji=heart04>\u3000れろっ……<emoji=heart04>」"
translation = "「그러니까 회장님은 안심하고 기분 좋아지세요……<emoji=heart04> 자지님, 핥을게요……<emoji=heart04> 응…… 쪽……<emoji=heart04> 레로……<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「はあぁっ……<emoji=heart04>\u3000会長のおち○ぽ様、立派で大きくて、いつ見ても素敵です……<emoji=heart04>\u3000んむっ……<emoji=heart04>\u3000れろちゅっ……<emoji=heart04>」"
translation = "「하아앗……<emoji=heart04> 회장님의 자지님, 늠름하고 커서 언제 봐도 멋져요……<emoji=heart04> 응무……<emoji=heart04> 레로쫍……<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「んふぅっ……<emoji=heart04>\u3000どんどん固く、反り返っていきます……<emoji=heart04>\u3000すごい……<emoji=heart04>\u3000ちゅぱっ……<emoji=heart04>\u3000ぺろっ……<emoji=heart04>」"
translation = "「응후……<emoji=heart04> 점점 딱딱하게, 뒤로 휘어져 가요……<emoji=heart04> 대단해……<emoji=heart04> 츄파……<emoji=heart04> 페로……<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「ちゅっ……<emoji=heart04>\u3000れろちゅっ……<emoji=heart04>\u3000んむっ……<emoji=heart04>\u3000ちゅぱっ……<emoji=heart04>\u3000んはぁっ……<emoji=heart04>\u3000おち○ぽ様、ビンビンになりました……<emoji=heart04>」"
translation = "「쪽……<emoji=heart04> 레로쫍……<emoji=heart04> 응무……<emoji=heart04> 츄파……<emoji=heart04> 응하아……<emoji=heart04> 자지님, 빈빈해졌어요……<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「ふうぅっ……<emoji=heart04>\u3000それじゃあ、ご奉仕フェラしちゃいますね……<emoji=heart04>」"
translation = "「후우우……<emoji=heart04> 그럼, 봉사 펠라 해버릴게요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "これ以上はダメだと制止しようとするが、夢中になっている彼女には、ペニス以外見えていないようで――"
translation = "이 이상은 안 된다고 제지하려 하지만, 몰두하고 있는 그녀에게는 페니스 이외에는 보이지 않는 듯해서――"

[[dialogue]]
speaker = "ヨミ"
original = "「いきます<emoji=heart04>\u3000あむっ――<emoji=heart04><emoji=heart04>」"
translation = "「갑니다<emoji=heart04> 아암――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「ちゅぷぷっ<emoji=heart04>\u3000んむっ……<emoji=heart04>\u3000ちゅぱっ<emoji=heart04>\u3000ちゅぷっ……<emoji=heart04>\u3000れろちゅっ<emoji=heart04>\u3000ちゅぷっ……れるれるっ<emoji=heart04>\u3000ちゅるるっ……ちゅぱっ<emoji=heart04>\u3000ちゅれろっ<emoji=heart04>\u3000ちゅぷぷっ……<emoji=heart04>」"
translation = "「츄푸푸<emoji=heart04> 응무……<emoji=heart04> 츄파<emoji=heart04> 츄푸……<emoji=heart04> 레로쫍<emoji=heart04> 츄푸……렐렐레<emoji=heart04> 츄르르……츄파<emoji=heart04> 츄레로<emoji=heart04> 츄푸푸……<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「ちゅぱっ<emoji=heart04>\u3000はあぁっ……<emoji=heart04>\u3000おち○ぽ様、逞しくてすごいです……<emoji=heart04>\u3000んむっ<emoji=heart04>\u3000ちゅぷぷっ<emoji=heart04>\u3000ちゅるるっ……れろちゅっ<emoji=heart04>\u3000ちゅぽっ<emoji=heart04>\u3000ちゅれるっ……<emoji=heart04>」"
translation = "「츄파<emoji=heart04> 하아앗……<emoji=heart04> 자지님, 늠름해서 대단해요……<emoji=heart04> 응무<emoji=heart04> 츄푸푸<emoji=heart04> 츄르르……레로쫍<emoji=heart04> 츄폿<emoji=heart04> 츄렐레……<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「んふぅっ……<emoji=heart04>\u3000先っぽからお汁が出てきました……<emoji=heart04>\u3000気持ちよくなってくれて、嬉しいです……<emoji=heart04>\u3000ちゅぱっ……<emoji=heart04>\u3000ちゅるるっ<emoji=heart04>\u3000れろちゅっ……<emoji=heart04>」"
translation = "「응후……<emoji=heart04> 끝에서 즙이 나왔어요……<emoji=heart04> 기분 좋아해 줘서 기뻐요……<emoji=heart04> 츄파……<emoji=heart04> 츄르르<emoji=heart04> 레로쫍……<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「はあぁっ……<emoji=heart04>\u3000口の中いっぱいに濃い雄フェロモンが広がって、メロメロになっちゃいます……<emoji=heart04>\u3000あむっ……<emoji=heart04>\u3000ちゅっちゅ……<emoji=heart04>\u3000ちゅるるっ<emoji=heart04>\u3000んふぅっ……<emoji=heart04>」"
translation = "「하아앗……<emoji=heart04> 입안 가득 진한 수컷 페로몬이 퍼져서, 헤롱헤롱해져 버려요……<emoji=heart04> 아암……<emoji=heart04> 츄릅츄릅……<emoji=heart04> 츄르르<emoji=heart04> 응후……<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「バキュームフェラしちゃいますね<emoji=heart04>\u3000会長の気持ちいいお汁、もっと飲ませて下さい……<emoji=heart04>\u3000んむっ……<emoji=heart04>\u3000ちゅぶぶぶっ<emoji=heart04>\u3000じゅぽっ<emoji=heart04>\u3000じゅるるるっ<emoji=heart04>\u3000ちゅばっ……<emoji=heart04>」"
translation = "「진공 펠라 해버릴게요<emoji=heart04> 회장님의 기분 좋은 즙, 더 마시게 해주세요……<emoji=heart04> 응무……<emoji=heart04> 츄부부부<emoji=heart04> 쥬폿<emoji=heart04> 쥬르르르<emoji=heart04> 츄바……<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「んんっ<emoji=heart04>\u3000会長の味、美味しいです……<emoji=heart04>\u3000じゅぷぷぷっ<emoji=heart04>\u3000じゅるっぽ<emoji=heart04>\u3000れるれるっ<emoji=heart04>\u3000れろちゅっ<emoji=heart04>\u3000じゅっぽじゅっぽ<emoji=heart04>\u3000んむっ<emoji=heart04>\u3000じゅるるるっ……<emoji=heart04>」"
translation = "「응응<emoji=heart04> 회장님의 맛, 맛있어요……<emoji=heart04> 쥬푸푸푸<emoji=heart04> 쥬르릅<emoji=heart04> 렐렐레<emoji=heart04> 레로쫍<emoji=heart04> 쥬뽓쥬뽓<emoji=heart04> 응무<emoji=heart04> 쥬르르르……<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「好きぃ……<emoji=heart04>\u3000もっとぉ……<emoji=heart04>\u3000ちゅぼちゅぼっ<emoji=heart04>\u3000じゅっぽじゅっぽ<emoji=heart04>\u3000んふぅっ<emoji=heart04>\u3000ちゅぶぶぶっ<emoji=heart04>\u3000ちゅばっ<emoji=heart04>\u3000じゅるるるっ……<emoji=heart04>\u3000じゅっぱじゅっぱじゅっぱ<emoji=heart04>」"
translation = "「좋아해애……<emoji=heart04> 더어……<emoji=heart04> 츄보츄보<emoji=heart04> 쥬뽓쥬뽓<emoji=heart04> 응후<emoji=heart04> 츄부부부<emoji=heart04> 츄바<emoji=heart04> 쥬르르르……<emoji=heart04> 쥬빠쥬빠쥬빠<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ヨミのバキュームフェラが気持ちよくて、俺も興奮してきてしまう――"
translation = "요미의 진공 펠라가 기분 좋아서, 나도 흥분해버리고 만다――"

[[dialogue]]
speaker = "unk"
original = "と、その時だった。"
translation = "그때였다."

[[dialogue]]
speaker = "女子生徒"
original = "「失礼します、吹奏楽部の者ですが……。あっ、会長さん♪」"
translation = "「실례합니다, 취주악부원인데요……. 앗, 회장님♪」"

[[dialogue]]
speaker = "ヨミ"
original = "「っ……！」"
translation = "「윽……!」"

[[dialogue]]
speaker = "女子生徒"
original = "「前のクラブ委員会でもらった書類を記入したので、届けにきたんですけど、今よろしかったでしょうか？」"
translation = "「지난번 클럽 위원회에서 받은 서류를 작성해서 가져왔는데, 지금 괜찮으실까요?」"

[[dialogue]]
speaker = "unk"
original = "何も知らないその子が、会長席の前に近付いてくる。"
translation = "아무것도 모르는 그 아이가 회장석 앞으로 다가온다."

[[dialogue]]
speaker = "unk"
original = "俺は咄嗟に、机の下でフェラしているヨミを止めようと、頭を押さえるが――"
translation = "나는 황급히 책상 밑에서 펠라를 하고 있는 요미를 멈추려고 머리를 억누르지만――"

[[dialogue]]
speaker = "ヨミ"
original = "「んむっ……！？\u3000んんっ……<emoji=heart04>」"
translation = "「응무……!? 응응……<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「ちゅぷぷっ……<emoji=heart04>\u3000ちゅぱっ……<emoji=heart04>\u3000れろちゅっ……<emoji=heart04>」"
translation = "「츄푸푸……<emoji=heart04> 츄파……<emoji=heart04> 레로쫍……<emoji=heart04>」"

[[dialogue]]
speaker = "女子生徒"
original = "「あれ？\u3000会長さん……なんか顔が赤いですけど、大丈夫ですか？\u3000もしかして――」"
translation = "「어라? 회장님…… 왠지 얼굴이 붉은데 괜찮으세요? 설마――」"

[[dialogue]]
speaker = "ヨミ"
original = "「っ……！\u3000ちゅぴっ……<emoji=heart04>\u3000ちゅぱっ……<emoji=heart04>\u3000ちゅぷっ、ちゅぷっ……<emoji=heart04>\u3000」"
translation = "「윽……! 츄핏……<emoji=heart04> 츄파……<emoji=heart04> 츄푸, 츄푸……<emoji=heart04>」"

[[dialogue]]
speaker = "女子生徒"
original = "「体調が悪かったりしますか？\u3000もしよかったら私、保健室まで付き添いますけど……」"
translation = "「몸 상태가 안 좋으신가요? 괜찮으시면 제가 보건실까지 같이 가드릴까요……」"

[[dialogue]]
speaker = "ヨミ"
original = "「ふうぅっ……<emoji=heart04>\u3000ぴちゃっ……<emoji=heart04>\u3000れろっ……<emoji=heart04>\u3000ちゅぽっ、ちゅぽっ……<emoji=heart04>\u3000ちゅるるるっ……<emoji=heart04>」"
translation = "「후우우……<emoji=heart04> 피챠……<emoji=heart04> 레로……<emoji=heart04> 츄뽀, 츄뽀……<emoji=heart04> 츄르르르……<emoji=heart04>」"

[[dialogue]]
speaker = "女子生徒"
original = "「――仕事で疲れたから休憩してたところ？\u3000そうでしたか。無理はしないで下さいね」"
translation = "「――일 때문에 지쳐서 휴식하던 중? 그러셨군요. 무리는 하지 마세요」"

[[dialogue]]
speaker = "女子生徒"
original = "「――書類は机の上に置いておけば大丈夫ですか？\u3000わかりました。それじゃ、後で確認をよろしくお願いします」"
translation = "「――서류는 책상 위에 두면 되나요? 알겠습니다. 그럼 나중에 확인 부탁드릴게요」"

[[dialogue]]
speaker = "ヨミ"
original = "「はあぁっ……<emoji=heart04>\u3000ちゅぷぷぷっ<emoji=heart04>\u3000ちゅっぱちゅっぱ<emoji=heart04>\u3000ちゅれるっ<emoji=heart04>\u3000ちゅるるるっ……<emoji=heart04>」"
translation = "「하아앗……<emoji=heart04> 츄푸푸푸<emoji=heart04> 츄빠츄빠<emoji=heart04> 츄렐레<emoji=heart04> 츄르르르……<emoji=heart04>」"

[[dialogue]]
speaker = "女子生徒"
original = "「あれ？\u3000なんだか、どこからか水音が聞こえるような……？」"
translation = "「어라? 왠지 어디선가 물소리가 들리는 것 같은데……?」"

[[dialogue]]
speaker = "ヨミ"
original = "「ちゅっぽちゅっぽ<emoji=heart04>\u3000ちゅっぷちゅっぷ<emoji=heart04>\u3000れろちゅっ<emoji=heart04>\u3000ちゅむちゅむちゅむっ<emoji=heart04>\u3000んふぅっ……<emoji=heart04>」"
translation = "「츄뽓츄뽓<emoji=heart04> 츄뿌츄뿌<emoji=heart04> 레로쫍<emoji=heart04> 츄무츄무츄무<emoji=heart04> 응후……<emoji=heart04>」"

[[dialogue]]
speaker = "女子生徒"
original = "「――最近、天井の配管から水漏れがあって、修理待ち？\u3000そうだったんですね」"
translation = "「――최근에 천장 배관에서 물이 새서 수리 대기 중? 그랬었군요」"

[[dialogue]]
speaker = "女子生徒"
original = "「それじゃあ、休憩のお邪魔をするのも悪いですし、私そろそろ行きますね！」"
translation = "「그럼 휴식을 방해하는 것도 미안하니 전 이만 가볼게요!」"

[[dialogue]]
speaker = "女子生徒"
original = "「失礼しました～。会長さん、お仕事、無理しないように頑張って下さい♪」"
translation = "「실례했습니다~. 회장님, 업무 무리하지 말고 힘내세요♪」"

[[dialogue]]
speaker = "ヨミ"
original = "「んっ……<emoji=heart04>\u3000じゅるるるるっ<emoji=heart04>\u3000ちゅぶっちゅぶっちゅぶっ<emoji=heart04>\u3000じゅっぽじゅっぽじゅっぽ<emoji=heart04>\u3000じゅっぱじゅっぱじゅっぱ<emoji=heart04>\u3000れろちゅっ<emoji=heart04>\u3000ちゅばっ……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 쥬르르르르<emoji=heart04> 츄붓츄붓츄붓<emoji=heart04> 쥬뽓쥬뽓쥬뽓<emoji=heart04> 쥬빠쥬빠쥬빠<emoji=heart04> 레로쫍<emoji=heart04> 츄바……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "行為バレの危機が去ったと分かった瞬間に、バキュームフェラを再開するヨミ。"
translation = "들킬 위기가 사라졌다는 걸 안 순간, 진공 펠라를 재개하는 요미."

[[dialogue]]
speaker = "クロト"
original = "「実はヨミ、匂いフェチなだけじゃなくて、誰かにバレるかもと思って興奮しちゃう変態だったんだな」"
translation = "「사실 요미는 냄새 페티시일 뿐만 아니라, 누군가에게 들킬지도 모른다는 생각에 흥분해버리는 변태였구나」"

[[dialogue]]
speaker = "ヨミ"
original = "「こやんっ<emoji=heart04>\u3000ち、違うんです……<emoji=heart04>」"
translation = "「코양<emoji=heart04> 아, 아니에요……<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「ちゅぱっ<emoji=heart04>\u3000あれはその……メイドとしてご奉仕を中断するわけにはいきませんし……！」"
translation = "「츄파<emoji=heart04> 그건 그…… 메이드로서 봉사를 중단할 수는 없으니까요……!」"

[[dialogue]]
speaker = "ヨミ"
original = "「そ、それに……私は匂いフェチなので、あの子にはバレなそうな匂いを感じ取ったと言いますか……」"
translation = "「그, 그리고…… 저는 냄새 페티시라, 그 아이에게는 들키지 않을 것 같은 냄새를 감지했다고나 할까……」"

[[dialogue]]
speaker = "unk"
original = "誤魔化して、なかなか認めようとしないヨミ。"
translation = "얼버무리며 좀처럼 인정하려 하지 않는 요미."

[[dialogue]]
speaker = "クロト"
original = "「なら、仕方ない……ヨミ、待て！\u3000フェラ、ストップ」"
translation = "「그럼 어쩔 수 없지…… 요미, 기다려! 펠라, 스톱」"

[[dialogue]]
speaker = "ヨミ"
original = "「こやっ……！？」"
translation = "「코얏……!?」"

[[dialogue]]
speaker = "ヨミ"
original = "「か、会長、どうしましたか……？」"
translation = "「회, 회장님, 왜 그러세요……?」"

[[dialogue]]
speaker = "ヨミ"
original = "「――す、素直に言わないなら、フェラはお預け？\u3000本当はどうなのかって……そ、それは……！」"
translation = "「――소, 솔직하게 말하지 않으면 펠라는 금지? 정말로 어떤지라니…… 그, 그건……!」"

[[dialogue]]
speaker = "ヨミ"
original = "「……う、うぅ～っ！\u3000い、言います<emoji=heart04>\u3000言いますから、お預けは許して下さいぃ～<emoji=heart04>」"
translation = "「……으, 으으~! 마, 말할게요<emoji=heart04> 말할 테니까 금지만은 봐주세요오~<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「ほ、本当は……さっきバレそうになって、すごく興奮しちゃってましたぁ……<emoji=heart04>」"
translation = "「사, 사실은…… 아까 들킬 뻔해서 엄청 흥분해버렸어요……<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「あ、あと……頭ぐいって抑え込まれて、ご、強引にその、い、イラマチオされてる感じがして……<emoji=heart04>」"
translation = "「그, 그리고…… 머리를 꾹 억눌려서, 가, 강제로 그, 이, 이라마치오 당하는 느낌이 들어서……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その、強引にされるのが嫌じゃないという態度に、俺は興奮を覚えてしまい――"
translation = "그 강제로 당하는 것이 싫지 않다는 태도에 나는 흥분을 느끼고――"

[[dialogue]]
speaker = "ヨミ"
original = "「――そんな変態のメイドにはお仕置き？\u3000こやんっ<emoji=heart04>\u3000へ、変態だなんて……<emoji=heart04>」"
translation = "「――그런 변태 메이드에게는 벌을? 코양<emoji=heart04> 배, 변태라니……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は彼女に、わざと強い口調で命令した。"
translation = "나는 그녀에게 일부러 강한 어조로 명령했다."

[[dialogue]]
speaker = "unk"
original = "――罰として、最後まで責任を持って性処理しろ、と。"
translation = "――벌로서 끝까지 책임지고 성처리를 하라고."

[[dialogue]]
speaker = "ヨミ"
original = "「っ……！\u3000は、はい……<emoji=heart04>\u3000ご主人様……<emoji=heart04>」"
translation = "「윽……! 네……<emoji=heart04> 주인님……<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「天ヶ崎ヨミ、誠心誠意、おち○ぽ様にご奉仕させていただきます……<emoji=heart04>」"
translation = "「아마가사키 요미, 성심성의껏 자지님께 봉사하겠습니다……<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「それでは、いきますね<emoji=heart04>\u3000んっ……あむっ<emoji=heart04>\u3000ちゅぶぶぶっ――<emoji=heart04><emoji=heart04>」"
translation = "「그럼, 갈게요<emoji=heart04> 응…… 아암<emoji=heart04> 츄부부부――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「じゅっぽじゅっぽじゅっぽ<emoji=heart04>\u3000じゅるるるっ<emoji=heart04>\u3000んぶっ<emoji=heart04>\u3000じゅぷぷっ<emoji=heart04>\u3000じゅっぽれるれるっ<emoji=heart04>\u3000じゅっぷじゅっぷじゅっぷ<emoji=heart04>\u3000ちゅぶぅぅっ<emoji=heart04>\u3000れるちゅっ<emoji=heart04>」"
translation = "「쥬뽓쥬뽓쥬뽓<emoji=heart04> 쥬르르르<emoji=heart04> 응부<emoji=heart04> 쥬푸푸<emoji=heart04> 쥬뽓렐렐레<emoji=heart04> 쥬뿌쥬뿌쥬뿌<emoji=heart04> 츄부우우<emoji=heart04> 렐레쫍<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「ちゅぼちゅぼちゅぼっ<emoji=heart04>\u3000どうでしゅか、ご主人様<emoji=heart04>\u3000んぶっ<emoji=heart04>\u3000じゅるるるっ<emoji=heart04>\u3000じゅっぽじゅっぽじゅっぽ<emoji=heart04>\u3000ぢゅっぱぢゅっぱぢゅっぱ<emoji=heart04>」"
translation = "「츄보츄보츄보<emoji=heart04> 어떠셰요, 주인님<emoji=heart04> 응부<emoji=heart04> 쥬르르르<emoji=heart04> 쥬뽓쥬뽓쥬뽓<emoji=heart04> 쥬빠쥬빠쥬빠<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「じゅるるっ、ぢゅぱっ<emoji=heart04>\u3000んぶぁっ<emoji=heart04>\u3000\u3000私のお口ま○こ、気持ちよくできてましゅか？\u3000んぶぶっ、じゅぽじゅぽじゅぽ<emoji=heart04>\u3000ちゅばっ、じゅれるっ、んぶぶっ<emoji=heart04>」"
translation = "「쥬르르, 쥬빠<emoji=heart04> 응부아<emoji=heart04> 제 입보지, 기분 좋게 해드리고 있나효? 응부부, 쥬뽀쥬뽀쥬뽀<emoji=heart04> 츄바, 쥬렐레, 응부부<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「――もっと奥に？\u3000は、はい<emoji=heart04>\u3000わかりました<emoji=heart04>\u3000ご主人様の好きな、ディープスロートでご奉仕しましゅね<emoji=heart04>\u3000はあぁっ……<emoji=heart04>」"
translation = "「――더 깊숙이? 네, 네<emoji=heart04> 알겠습니댜<emoji=heart04> 주인님이 좋아하시는 딥스로트로 봉사할게효<emoji=heart04> 하아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「せーのっ……ちゅぶぶぶっ<emoji=heart04>」"
translation = "「하나 둘…… 츄부부부<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「ちゅぶっちゅぶっちゅぶっちゅぶっ<emoji=heart04>\u3000じゅぽっじゅぽっじゅぽっじゅぽっ<emoji=heart04>\u3000ぢゅるるるるっ！\u3000んぶぶぶっ<emoji=heart04>」"
translation = "「츄붓츄붓츄붓츄붓<emoji=heart04> 쥬뽓쥬뽓쥬뽓쥬뽓<emoji=heart04> 쥬르르르르! 응부부부<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「ちゅぼっちゅぼっちゅぼっちゅぼっ<emoji=heart04>\u3000ぢゅぱっぢゅぱっぢゅぱっぢゅぱっ<emoji=heart04>\u3000れるれるれるれるっ<emoji=heart04>\u3000ぢゅるるるるるっ<emoji=heart04><emoji=heart04>」"
translation = "「츄보츄보츄보츄보<emoji=heart04> 쥬빠쥬빠쥬빠쥬빠<emoji=heart04> 렐렐렐렐레<emoji=heart04> 쥬르르르르르<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「はああぁっ<emoji=heart04>\u3000おち○ぽ様、お汁いっぱい出てまひゅ<emoji=heart04>\u3000じゅぽっじゅぽっじゅぽっじゅぽっ<emoji=heart04>」"
translation = "「하아아앗<emoji=heart04> 자지님, 즙이 잔뜩 나오고 이쎠효<emoji=heart04> 쥬뽓쥬뽓쥬뽓쥬뽓<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「私も興奮しすぎて、愛液びちゃびちゃ溢れちゃってまひゅ<emoji=heart04>\u3000んふぅっ<emoji=heart04>\u3000ちゅぶっちゅぶっちゅぶっちゅぶっ<emoji=heart04>」"
translation = "「저도 너무 흥분해서 애액이 비차비차 넘쳐흐르고 이쎠효<emoji=heart04> 응후<emoji=heart04> 츄붓츄붓츄붓츄붓<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「おま○こキュンキュンして、指ではしたなくオナニーしちゃってまひゅ<emoji=heart04>\u3000ちゅぼっちゅぼっちゅぼっちゅぼっ<emoji=heart04>\u3000ぢゅるるるるるっ<emoji=heart04><emoji=heart04>」"
translation = "「보지가 큥큥거려서 손가락으로 천박하게 자위해버리고 이쎠효<emoji=heart04> 츄보츄보츄보츄보<emoji=heart04> 쥬르르르르르<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「んぶっ……<emoji=heart04>\u3000――ご主人様、もうイキそうなんでひゅか？」"
translation = "「응부……<emoji=heart04> ――주인님, 벌써 가버릴 것 같나효?」"

[[dialogue]]
speaker = "ヨミ"
original = "「ふうぅっ……<emoji=heart04>\u3000お射精っ……<emoji=heart04>\u3000ご主人様の精液っ……<emoji=heart04>\u3000ぢゅぱっぢゅぱっぢゅぱっぢゅぱっ<emoji=heart04>」"
translation = "「후우우……<emoji=heart04> 사정……<emoji=heart04> 주인님의 정액……<emoji=heart04> 쥬빠쥬빠쥬빠쥬빠<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「くだしゃい<emoji=heart04>\u3000ご主人様の濃厚フェロモンいっぱいの精液、欲しいれす<emoji=heart04>\u3000ぢゅぶぶぶっ――っ<emoji=heart04><emoji=heart04>」"
translation = "「쥬셰요<emoji=heart04> 주인님의 농후한 페로몬 가득한 정액, 갖고 시퍼요<emoji=heart04> 쥬부부부――윽<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「じゅぽっじゅぽっじゅぽっじゅぽっ<emoji=heart04>\u3000ちゅぶっちゅぶっちゅぶっちゅぶっ<emoji=heart04>\u3000ぢゅぱっぢゅぱっぢゅぱっぢゅぱっ<emoji=heart04>\u3000ぢゅるるるるるっ<emoji=heart04><emoji=heart04>」"
translation = "「쥬뽓쥬뽓쥬뽓쥬뽓<emoji=heart04> 츄붓츄붓츄붓츄붓<emoji=heart04> 쥬빠쥬빠쥬빠쥬빠<emoji=heart04> 쥬르르르르르<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「んんっ<emoji=heart04>\u3000私もおま○こイキそうでしゅっ<emoji=heart04>\u3000ぢゅぷっぢゅぷっぢゅぷっぢゅぷっ<emoji=heart04>」"
translation = "「응응<emoji=heart04> 저도 보지 가버릴 것 가타효<emoji=heart04> 쥬뿌쥬뿌쥬뿌쥬뿌<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「ご奉仕しながらはしたなくイっちゃいましゅ<emoji=heart04>\u3000ぢゅぽっぢゅぽっぢゅぽっぢゅぽっ<emoji=heart04>」"
translation = "「봉사하면서 천박하게 가버릴게효<emoji=heart04> 쥬뽓쥬뽓쥬뽓쥬뽓<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「ヨミ、出すぞ！\u3000全部飲め！」"
translation = "「요미, 싼다! 전부 마셔!」"

[[dialogue]]
speaker = "ヨミ"
original = "「はいっ<emoji=heart04>\u3000来てくらしゃいっ<emoji=heart04>\u3000私もイキましゅっ<emoji=heart04>」"
translation = "「네에<emoji=heart04> 싸쥬셰요<emoji=heart04> 저도 가효<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「んあああぁぁぁっ<emoji=heart04><emoji=heart04>\u3000イク、イクイクイク――」"
translation = "「응아아아아앗<emoji=heart04><emoji=heart04> 가, 가가각――」"

[[dialogue]]
speaker = "ヨミ"
original = "「イっ――んむうううぅぅぅ～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가버렷――응무우우우우우우~~~~~~~~~~~~~~~~~윽<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「んぶぅっ<emoji=heart04>\u3000んくっ……んくっ……<emoji=heart04>\u3000ごくっ<emoji=heart04>」"
translation = "「응부으<emoji=heart04> 응윽…… 응윽……<emoji=heart04> 꿀꺽<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「んあぁっ<emoji=heart04>\u3000お口の中、ご主人様の匂いでいっぱいに……<emoji=heart04>\u3000んむっ……んくっ<emoji=heart04>\u3000じゅるるるっ……<emoji=heart04>」"
translation = "「응아아<emoji=heart04> 입안이 주인님의 냄새로 가득……<emoji=heart04> 응무…… 응윽<emoji=heart04> 쥬르르르……<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「――んぷぁっ<emoji=heart04>\u3000はぁんっ……<emoji=heart04>\u3000はぁ……<emoji=heart04>\u3000はぁ……<emoji=heart04>\u3000ご主人様のお射精、すごいです……<emoji=heart04>」"
translation = "「――응푸아<emoji=heart04> 하앙……<emoji=heart04> 하아……<emoji=heart04> 하아……<emoji=heart04> 주인님의 사정, 대단해요……<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「んむっ……ごくんっ<emoji=heart04>\u3000んはぁ……<emoji=heart04>\u3000ご主人様の精液、美味しかったです……<emoji=heart04>\u3000ありがとうございます……<emoji=heart04>」"
translation = "「응무…… 꿀꺽<emoji=heart04> 응하아……<emoji=heart04> 주인님의 정액, 맛있었어요……<emoji=heart04> 감사합니다……<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「――んっ……<emoji=heart04>\u3000えへへ……<emoji=heart04>\u3000頭撫でてくれるの、嬉しいです……<emoji=heart04>」"
translation = "「――응……<emoji=heart04> 에헤헤……<emoji=heart04> 머리 쓰다듬어 주시는 거, 기뻐요……<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「気持ちよかったですか？\u3000私もご主人様の匂いをくんくんしながら、イっちゃいました……<emoji=heart04>」"
translation = "「기분 좋으셨나요? 저도 주인님의 냄새를 킁킁거리면서 가버렸어요……<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「私、ご主人様の精液の匂い、やっぱり好きです……<emoji=heart04>\u3000気持ちよくしていっぱい出してもらうと、幸せな気分になっちゃいます……<emoji=heart04>」"
translation = "「저, 주인님의 정액 냄새, 역시 좋아해요……<emoji=heart04> 기분 좋게 잔뜩 내보내 주시면 행복한 기분이 되어버려요……<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
original = "「でも、ごめんなさい……。ご主人様の精液、量がすごくてこぼしちゃいました……。なので――」"
translation = "「하지만 죄송해요……. 주인님의 정액, 양이 너무 많아서 흘려버렸어요……. 그러니까――」"

[[dialogue]]
speaker = "ヨミ"
original = "「誰かにバレるかもと思って興奮しちゃう変態メイドに、どうか罰をお命じ下さいませ……<emoji=heart04>」"
translation = "「누군가에게 들킬지도 모른다는 생각에 흥분해버리는 변태 메이드에게 부디 벌을 내려주시옵소서……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その言葉を聞いて、俺のペニスは再び勃起してしまう。"
translation = "그 말을 듣고 내 페니스는 다시 발기하고 만다."

[[dialogue]]
speaker = "クロト"
original = "「どうなっても知らないからな」"
translation = "「어떻게 돼도 난 모른다」"

[[dialogue]]
speaker = "ヨミ"
original = "「はい<emoji=heart04>\u3000ご主人様……<emoji=heart04>」"
translation = "「네<emoji=heart04> 주인님……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "嬉しそうに尻尾を振る恋人メイドに、俺は再びお掃除フェラをするように命じるのだった――"
translation = "기쁜 듯이 꼬리를 흔드는 연인 메이드에게 나는 다시 청소 펠라를 하라고 명령하는 것이었다――"

