[[dialogue]]
speaker = "unk"
original = "第３話,心の最も敏感で弱い部分,P"
translation = "제3화, 마음의 가장 민감하고 약한 부분, P"

[[dialogue]]
speaker = "せつな"
original = "「お嬢様、せつなに御用とは一体何でございましょう？」"
translation = "「아가씨, 세츠나에게 용건이란 대체 무엇이오?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ヨミヨミから聞いたわよ。せつな、あなた『恋愛』が苦手だそうじゃない！」"
translation = "「요미요미한테 들었어. 세츠나, 너 『연애』가 서툴다며!」"

[[dialogue]]
speaker = "せつな"
original = "「う……そ、それは……！」"
translation = "「우…… 그, 그건……!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「クロトは将来、世界を救う魔王になるわ。その下に仕える忍者が、恋人のフリの１つも出来ないというのは問題よ！」"
translation = "「쿠로토는 장차 세계를 구할 마왕이 될 거야. 그 밑에서 일하는 닌자가 연인 흉내 하나 못 낸다는 건 문제라고!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「だから、もう１人の主人として命じるわ。せつな……次の休日、クロトとデートに行きなさい！」"
translation = "「그러니까 또 한 명의 주인으로서 명할게. 세츠나…… 다음 휴일, 쿠로토와 데이트하러 가!」"

[[dialogue]]
speaker = "せつな"
original = "「え……えぇぇぇえええ～～～～～～っ！！？」"
translation = "「에…… 에에에에에에~~~~~~~~윽!!?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「くノ一として、いいえ、１人の女として、恋愛の経験を積むのよっ！」"
translation = "「쿠노이치로서, 아니 한 명의 여자로서 연애 경험을 쌓으란 말이야!」"

[[dialogue]]
speaker = "せつな"
original = "「――ということで本日、主様をデ、デートにお誘いしたというわけでござりまする」"
translation = "「──그리하여 오늘 주군을 데, 데이트에 초대했다는 것이오.」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスらしい提案だな"
translation = "비너스다운 제안이네."

[[dialogue]]
speaker = "せつな"
original = "「笑いごとではございませぬ！\u3000こ、こんな人の往来が多いところでデートするなど、エッチ過ぎまする！」"
translation = "「웃을 일이 아니오! 이, 이렇게 사람 왕래가 많은 곳에서 데이트를 하다니 너무 야하오!」"

[[dialogue]]
speaker = "せつな"
original = "「で、デートは別に普通って……外でデートするということは、公衆の面前で恋愛している姿を晒すということでござるよ！？」"
translation = "「데, 데이트는 딱히 보통이라고…… 밖에서 데이트한다는 건 공공연하게 연애하는 모습을 노출한다는 것이오!?」"

[[dialogue]]
speaker = "せつな"
original = "「他のカップルも沢山歩いているでござるが、何故皆、普通に手を繋いだり出来るのでござるか！？\u3000せつなには刺激が強過ぎて、直視出来ませぬ！」"
translation = "「다른 커플들도 잔뜩 걷고 있소만 어찌 다들 평범하게 손을 잡거나 할 수 있는 것이오!? 세츠나에겐 자극이 너무 강해 직시할 수 없소!」"

[[dialogue]]
speaker = "unk"
original = "全然恥ずかしくないと思うんだけどなぁ……"
translation = "전혀 부끄럽지 않다고 생각하는데 말이지……"

[[dialogue]]
speaker = "unk"
original = "エッチな性癖の話に比べれば"
translation = "야한 성벽 이야기에 비하면."

[[dialogue]]
speaker = "せつな"
original = "「性への興味など当たり前のことでありまする！\u3000しかし、恋愛は……す、好きという感情を人前に見せるのは、裸を見せるよりも恥ずかしいでござる！」"
translation = "「성에 대한 흥미 따위 당연한 것이오! 하지만 연애는…… 조, 좋아한다는 감정을 남 앞에 보이는 건 알몸을 보이는 것보다 부끄럽소!」"

[[dialogue]]
speaker = "せつな"
original = "「だって、恋心は……心の奥底に忍ばせている、最も敏感で弱い部分ではござりませぬか……！」"
translation = "「그야 연심은…… 마음 깊은 곳에 숨겨둔 가장 민감하고 약한 부분이 아니오……!」"

[[dialogue]]
speaker = "unk"
original = "せつなのこと少しだけ分かってきた気がする"
translation = "세츠나에 대해 조금은 알 것 같은 기분이 들어."

[[dialogue]]
speaker = "せつな"
original = "「そ、そうでござるか……？\u3000ならばせめて、主様のお家など、誰にも見られないところで慣れることから……」"
translation = "「그, 그러하오? 그렇다면 적어도 주군의 집 등 아무도 보지 않는 곳에서 익숙해지는 것부터……」"

[[dialogue]]
speaker = "せつな"
original = "「え！？\u3000このままデート続行するのでござるか！？\u3000そ、そんな主様……せつな、恥ずかし過ぎて倒れてしまうでござる！」"
translation = "「에!? 이대로 데이트 속행이오!? 그, 그런 주군…… 세츠나 부끄러워서 쓰러져버릴 것이오!」"

[[dialogue]]
speaker = "せつな"
original = "「その時はお姫様抱っこする？\u3000おおお、お姫様抱っことは、それはむしろ逆効果でござる！」"
translation = "「그때는 공주님 안기 해줄까? 오오오, 공주님 안기라니 그건 오히려 역효과요!」"

[[dialogue]]
speaker = "せつな"
original = "「このまま帰るのはもったいないというのはわかるでござるが、しかし……あ、主様どこへ！？」"
translation = "「이대로 돌아가는 건 아깝다는 건 알겠소만 하지만…… 주, 주군 어디 가시오!?」"

[[dialogue]]
speaker = "unk"
original = "忍として護衛を頼む"
translation = "닌자로서 호위를 부탁할게."

[[dialogue]]
speaker = "unk"
original = "街の散策に繰り出すんだよ"
translation = "거리 산책하러 나가는 거야."

[[dialogue]]
speaker = "せつな"
original = "「そ、そんなぁ……お待ち下さい、主様！\u3000その言い回しは卑怯でござるよぉ……！」"
translation = "「그, 그럴 수가…… 기다려 주시오, 주군! 그 말투는 비겁하오……!」"

[[dialogue]]
speaker = "せつな"
original = "「ちょっ、主様、人ごみの中をそんなズンズン進んでは……にゃんと！？\u3000人ごみに流されてるですと！？」"
translation = "「잠깐, 주군 인파 속을 그렇게 즈음즈음 나아가서는…… 냐닛!? 인파에 휩쓸리고 있다고요!?」"

[[dialogue]]
speaker = "せつな"
original = "「分かりました！\u3000せつながすぐに助けます故……！\u3000ん～、もう少しで手が届くでござる……！」"
translation = "「알겠소! 세츠나가 금방 도울 터이니……! 음~ 조금만 더 하면 손이 닿소……!」"

[[dialogue]]
speaker = "せつな"
original = "「よし、主様の服を掴みました！\u3000後はこのまま人の流れに逆らわず、広いところまで行けば……って」"
translation = "「좋소, 주군의 옷을 잡았소! 나머지는 이대로 사람 흐름을 거스르지 않고 넓은 곳까지 가면…… 어라」"

[[dialogue]]
speaker = "せつな"
original = "「あ、主様、なぜ手を繋いで……！？\u3000はぐれないように……？\u3000た、確かにそうでござるが……その……！」"
translation = "「주, 주군 어찌하여 손을 잡고……!? 놓치지 않으려고……? 하, 확실히 그러하오만…… 그……!」"

[[dialogue]]
speaker = "せつな"
original = "「は、恥ずかしいので、出来れば手首とか、服の袖とかして頂けると……」"
translation = "「부, 부끄러우니 가능하다면 손목이라거나 옷소매라거나 해주시면……」"

[[dialogue]]
speaker = "unk"
original = "いいと言うまで、手を離すのは禁止ね"
translation = "좋다고 할 때까지 손 놓는 건 금지야."

[[dialogue]]
speaker = "せつな"
original = "「まさか主様、謀ったでござるか！？」"
translation = "「설마 주군, 꾀었소!?」"

[[dialogue]]
speaker = "せつな"
original = "「に、にゃあぁぁぁ……！\u3000主様、ダメでござるよぉ……そんな強くしては……！」"
translation = "「냐, 냐아아……! 주군 안 되오…… 그렇게 강하게 해서는……!」"

[[dialogue]]
speaker = "せつな"
original = "「沢山の人に主様との結合部を見られて、せつな恥ずかしいでござるぅ……！」"
translation = "「수많은 사람에게 주군과의 결합부를 보여지다니 세츠나 부끄럽소……!」"

[[dialogue]]
speaker = "unk"
original = "誤解される言い方は止めてくれる！？"
translation = "「오해 살 만한 말은 그만둬 줄래!?」"

[[dialogue]]
speaker = "unk"
original = "その後、何だかんだ手を繋いでデートすることになり――"
translation = "그 후, 이러니저러니 해도 손을 잡고 데이트를 하게 되어――"

[[dialogue]]
speaker = "せつな"
original = "「はっ……！\u3000こ、ここは……！？\u3000主様、ここに入ってみたいでござる！」"
translation = "「핫……! 이, 이곳은……!? 주군, 여기 들어가 보고 싶소!」"

[[dialogue]]
speaker = "せつな"
original = "「にゃっほーっ♪\u3000『ピンク色の怪しいお店』でござる～～～っ♪」"
translation = "「냐호~♪ 『분홍색의 수상한 가게』이오~~~♪」"

[[dialogue]]
speaker = "せつな"
original = "「ほらほら、主様もそんな恥ずかしがらず、こっちで一緒に見るでござるよ！」"
translation = "「자자, 주군도 그렇게 부끄러워하지 말고, 이쪽에서 같이 보는 것이오!」"

[[dialogue]]
speaker = "unk"
original = "さっきまでの羞恥心はどこに行った！？"
translation = "방금 전까지의 수치심은 어디로 간 거야!?"

[[dialogue]]
speaker = "せつな"
original = "「主様、この『ハリガタ』やばいでござるっ。なるほど……ほほぅ♪\u3000これはこれは……<emoji=heart04>」"
translation = "「주군, 이 『하리가타(딜도)』 장난 아니오. 과연…… 호오♪ 이것 참……<emoji=heart04>」"

[[dialogue]]
speaker = "せつな"
original = "「……主様、相談なのでござるが――」"
translation = "「……주군, 상의할 것이 있소만――」"

[[dialogue]]
speaker = "unk"
original = "買っちゃダメだよ！？"
translation = "사면 안 돼!?"

[[dialogue]]
speaker = "せつな"
original = "「にゃんと殺生なっ！？\u3000主様の許可がなければ、さすがにこれは買えないでござる！\u3000……あっ、そうでござる！\u3000主様、そちらに飾ってある衣装を御覧下され！」"
translation = "「냐닛, 너무하오!? 주군의 허가가 없으면 역시 이건 살 수 없소! ……앗, 그렇소! 주군, 저쪽에 장식되어 있는 의상을 보아 주시오!」"

[[dialogue]]
speaker = "せつな"
original = "「もしご許可頂けたら、せつながそのデンジャラスでビーストな布面積のコスプレを着て、ご奉仕致しますよ？\u3000お店の１番人気と書いてありまする。どうでござるか？」"
translation = "「혹시 허락해 주신다면, 세츠나가 그 덴저러스하고 비스트한 천 면적의 코스프레를 입고 봉사하겠소? 가게의 인기 1위라고 적혀 있소이다. 어떻소?」"

[[dialogue]]
speaker = "せつな"
original = "「あっ！\u3000今一瞬、考える間があったでござるな？\u3000ふふっ……これはどちらにせよ、買ってお見せしなければ……♪」"
translation = "「앗! 지금 일순간, 고민하는 기색이 있었소! 후훗…… 이건 어느 쪽이든 사서 보여드려야……♪」"

[[dialogue]]
speaker = "せつな"
original = "「おおっ、あちらにも面白そうな物が並んでいるでござる！\u3000主様、参りましょう♪」"
translation = "「오오, 저쪽에도 재밌어 보이는 물건들이 늘어서 있소! 주군, 가시지요♪」"

[[dialogue]]
speaker = "unk"
original = "意気揚々と引っ張られる手に、やっぱり基準は変だなと思いつつも。せつなが楽しんでるならそれでいっか、と思うのであった。"
translation = "의기양양하게 끌려가는 손에, 역시 기준이 이상하네 싶으면서도. 세츠나가 즐거워 보인다면 그걸로 됐나, 하고 생각하는 것이었다."

