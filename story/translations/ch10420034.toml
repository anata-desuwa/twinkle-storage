[[dialogue]]
speaker = "unk"
original = "第４話,愛する彼女へご奉仕を,P"
translation = "제4화. 사랑하는 그녀에게 봉사를. P"

[[dialogue]]
speaker = "unk"
original = "ある週末の休日。俺はフニと一緒に、彼女の故郷である北海道にやって来ていた。"
translation = "어느 주말 휴일. 나는 후니와 함께, 그녀의 고향인 홋카이도에 와 있었다."

[[dialogue]]
speaker = "unk"
original = "そして、村近くの森で彼女とピクニックに出かけることになった――"
translation = "그리고, 마을 근처 숲으로 그녀와 피크닉을 나가게 되었다――"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「今日は晴れて暖かくなりましたし、ピクニック日和ですね♪」"
translation = "「오늘은 날이 개고 따뜻해져서, 피크닉하기 좋은 날이네요♪」"

[[dialogue]]
speaker = "unk"
original = "合宿の時よりもゆっくり過ごせるな"
translation = "합숙 때보다 느긋하게 보낼 수 있겠군"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「はい♪\u3000昨日も村の人たちとゆっくりお話ができて、よかったです」"
translation = "「네♪ 어제도 마을 사람들과 느긋하게 이야기를 나눌 수 있어서, 좋았어요」"

[[dialogue]]
speaker = "unk"
original = "星霊祭の前に合宿でやって来た時は合宿で忙しかったので、今回改めて帰省しにきたのだ。"
translation = "성령제 전에 합숙으로 왔을 때는 합숙 때문에 바빴으므로, 이번에 다시 귀성하러 온 것이다."

[[dialogue]]
speaker = "unk"
original = "村の人たち、みんないい人だったな"
translation = "마을 사람들, 모두 좋은 사람이었지"

[[dialogue]]
speaker = "unk"
original = "昨日はフニが育った孤児院に泊まらせてもらったのだが、そこに村の人たちが集まり、わざわざ俺の歓迎会を開いてくれて。"
translation = "어제는 후니가 자란 고아원에서 묵게 되었는데, 그곳에 마을 사람들이 모여, 일부러 나를 위한 환영회를 열어 주었다."

[[dialogue]]
speaker = "unk"
original = "それはもう楽しいどんちゃん騒ぎで、俺はすっかり村の人たちのことを好きになってしまっていた。"
translation = "그야말로 즐거운 잔치였고, 나는 완전히 마을 사람들을 좋아하게 되어 버렸다."

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「はい♪\u3000血は繋がってなくても、昔から私のことを気にかけてお世話してくれて……私はみんなを本当の家族のように思ってます」"
translation = "「네♪ 피가 이어지지 않았어도, 예전부터 저를 신경 써주고 돌봐줘서…… 저는 모두를 진짜 가족처럼 생각하고 있어요」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「だから、大切な故郷のみんなが平和に生活を送れるようにする為にも、私は星騎士として、もっと強くなりたいんです」"
translation = "「그러니, 소중한 고향의 모두가 평화롭게 생활을 보낼 수 있도록 하기 위해서라도, 저는 성기사로서, 더욱 강해지고 싶어요」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「今回帰郷して、改めてそう感じました。――リクリエの危機がまたやって来ても、会長さんと一緒に打ち勝てるように」"
translation = "「이번에 귀향해서, 다시 한번 그렇게 느꼈어요. ――리크리에의 위기가 다시 찾아와도, 회장군과 함께 이겨낼 수 있도록」"

[[dialogue]]
speaker = "unk"
original = "ああ、俺もフニのこと守るって約束したしな"
translation = "아아, 나도 후니를 지키겠다고 약속했었지"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「あ……えへへ<emoji=heart04>\u3000今回、村の人たちに彼氏として紹介しちゃいましたもんね<emoji=heart04>」"
translation = "「아…… 에헤헤<emoji=heart04> 이번에, 마을 사람들에게 남자친구로서 소개했었죠<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そこで俺は、村の人たちから「フニのことを頼む」と任されていた。"
translation = "그곳에서 나는, 마을 사람들로부터 「후니를 부탁한다」는 임무를 맡았다."

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「え？\u3000――お互い強くなる為にも、絆の力をあげないと……ですか？」"
translation = "「에? ――서로 강해지기 위해서라도, 인연의 힘을 줘야 한다……고요?」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「じゃ、じゃあ……<emoji=heart04>」"
translation = "「자, 그럼……<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「今日もノヴァフォームで、何かご奉仕を――」"
translation = "「오늘도 노바 폼으로, 뭔가 봉사를――」"

[[dialogue]]
speaker = "unk"
original = "いや、今日は俺の番だ"
translation = "아니, 오늘은 내 차례다"

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「え……？\u3000――き、今日は会長さんが私にご奉仕をする、ですか……！？」"
translation = "「에……? ――키, 오늘은 회장군이 저에게 봉사를 하는, 건가요……!?」"

[[dialogue]]
speaker = "unk"
original = "俺は頷き、北海道へ来る前に用意しておいた物を取り出す。"
translation = "나는 고개를 끄덕이고, 홋카이도에 오기 전에 준비해 둔 물건을 꺼낸다."

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「――天使の羽用のお手入れセット一式……？\u3000それで、私の羽のブラッシングを……！？」"
translation = "「――천사의 날개용 손질 세트 일체……? 그걸로, 제 날개를 브러싱……!?」"

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「か、会長さんからのブラッシング……<emoji=heart04>\u3000そ、その……じゃあ、今日は甘えさせて頂いてもいいですか……？」"
translation = "「회, 회장군이 해주는 브러싱……<emoji=heart04> 그, 그럼…… 오늘은 응석 부려도 괜찮을까요……?」"

[[dialogue]]
speaker = "unk"
original = "俺はそれから、ブラシで彼女の天使の羽を撫でて、手入れをしていく。"
translation = "나는 그때부터, 브러시로 그녀의 천사의 날개를 쓰다듬고, 손질해 나간다."

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「はぅ……<emoji=heart04>\u3000会長さんの、上手くて……あっ<emoji=heart04>\u3000んん……<emoji=heart04>」"
translation = "「하우……<emoji=heart04> 회장군의, 능숙해서…… 앗<emoji=heart04> 음음……<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「声、出ちゃいます……<emoji=heart04>\u3000はあぁっ……んふぅ……<emoji=heart04>」"
translation = "「소리, 나와 버려요……<emoji=heart04> 하아아앗…… 응후우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「こ、これ、普通に撫でられるのと違う気持ち良さがあって……んっ<emoji=heart04>\u3000ふうぅ……<emoji=heart04>」"
translation = "「이, 이거, 평범하게 쓰다듬어지는 것과는 다른 기분 좋음이 있어서…… 응<emoji=heart04> 후우우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「ドキドキしてきちゃいます……<emoji=heart04>\u3000あっ……<emoji=heart04>\u3000はふぅ……<emoji=heart04>」"
translation = "「두근거리기 시작해요……<emoji=heart04> 앗……<emoji=heart04> 하후우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「え？\u3000次は頭の羽……ですか？」"
translation = "「에? 다음은 머리의 날개……인가요?」"

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「は、はい<emoji=heart04>\u3000でも、頭の羽の方が背中よりも敏感なので、優しくして頂けると……<emoji=heart04>」"
translation = "「하, 네<emoji=heart04> 하지만, 머리의 날개가 등보다 민감하니까, 상냥하게 해 주시면……<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「あっ――ぴゃうっ<emoji=heart04><emoji=heart04>\u3000会長さんの手つき、優しいのにゾクゾクしちゃいますぅ……<emoji=heart04>」"
translation = "「앗―― 퍄웃<emoji=heart04><emoji=heart04> 회장군의 손길, 상냥한데도 짜릿해져요오……<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「んっ<emoji=heart04>\u3000ぴぃっ<emoji=heart04><emoji=heart04>\u3000へ、変な声が漏れちゃいますぅ……<emoji=heart04>\u3000はうぅ……<emoji=heart04>」"
translation = "「응<emoji=heart04> 삐잇<emoji=heart04><emoji=heart04> 혀, 이상한 소리가 새어 나와요오……<emoji=heart04> 하우우……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "恥ずかしがって、羽で顔を隠す仕草をしてしまうフニ。"
translation = "부끄러워하며, 날개로 얼굴을 가리는 시늉을 해 버리는 후니."

[[dialogue]]
speaker = "unk"
original = "俺はそんな彼女の羽をどけて、正面から見つめ合う形になる。"
translation = "나는 그런 그녀의 날개를 치우고, 정면으로 마주 보는 형태가 된다."

[[dialogue]]
speaker = "unk"
original = "フニ、恥ずかしがらないで、顔を見せて"
translation = "후니, 부끄러워하지 말고, 얼굴을 보여줘"

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「あ……会長さん……<emoji=heart04>」"
translation = "「아…… 회장군……<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「んっ……<emoji=heart04>」"
translation = "「응……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "恥ずかしさで赤くなった照れ顔が可愛くて、俺は思わずキスをしてしまう。"
translation = "부끄러움에 빨개진 수줍은 얼굴이 귀여워서, 나는 무심코 키스를 해 버린다."

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「んむっ……<emoji=heart04>\u3000ちゅっ……<emoji=heart04>」"
translation = "「음뭇……<emoji=heart04> 쪽……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "……俺が奉仕するはずだったのに、ごめん"
translation = "……내가 봉사할 차례였는데, 미안"

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「んっ――はあぁ……<emoji=heart04>\u3000気にしないで下さい……<emoji=heart04>」"
translation = "「응―― 하아아……<emoji=heart04> 신경 쓰지 마세요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「私も……ドキドキして、して欲しいって思っちゃってましたから、両想いです……<emoji=heart04>」"
translation = "「저도…… 두근거려서, 해 줬으면 좋겠다고 생각하고 있었으니까, 서로 마음이 통한 거예요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "フ二、好きだ"
translation = "후니, 좋아해"

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「はい、私もです。会長さん……愛してます<emoji=heart04>」"
translation = "「네, 저도요. 회장군…… 사랑해요<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「ん……<emoji=heart04>\u3000ちゅっ……<emoji=heart04>」"
translation = "「응……<emoji=heart04> 쪽……<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「好き……<emoji=heart04>\u3000好きです……<emoji=heart04>\u3000ずっとおそばに居させて下さい、会長さん……<emoji=heart04>」"
translation = "「좋아해……<emoji=heart04> 좋아해요……<emoji=heart04> 계속 곁에 있게 해 주세요, 회장군……<emoji=heart04>」"

[[dialogue]]
speaker_original = "フェニエル（覚醒）"
speaker_translation = "페니엘(각성)"
original = "「ちゅっ……<emoji=heart04>\u3000ちゅっ……<emoji=heart04>」"
translation = "「쪽……<emoji=heart04> 쪽……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それからはお互いにそっと背中に手を回して、キスに夢中になってしまうのだった――"
translation = "그 후로는 서로 살짝 등에 손을 두르고, 키스에 열중하게 되는 것이었다――"

