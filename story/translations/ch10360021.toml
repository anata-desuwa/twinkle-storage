[[dialogue]]
speaker = "unk"
original = "第１話,お付き合いしましょう、先輩,P"
translation = "제1화, 사귀도록 하죠, 선배, P"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「私、緋宮会長のことを、本当に好きになってしまいましたわぁぁぁ～～～～～～～～～っ！！！」"
translation = "「저, 히노미야 회장님을 정말로 좋아하게 되어버렸답니다아아아아~~~~~~~~~~~~~~~~~앗!!!」"

[[dialogue]]
speaker = "unk"
original = "昨日の早朝訓練中、いきなりとんでもない告白をした先輩は、ダッシュで俺の前から消えてしまった。"
translation = "어제 새벽 훈련 중 갑자기 엄청난 고백을 한 선배는 대시로 내 앞에서 사라져 버렸다."

[[dialogue]]
speaker = "unk"
original = "その後も学園ですれ違うたびに『ですわー！？』と叫んでまた逃走……昨日からずっと避けられているのだった──"
translation = "그 뒤로도 학원에서 마주칠 때마다 『인가요─!?』라고 외치며 다시 도주…… 어제부터 계속 피해 다니고 있는 것이었다──"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「あっ、会長さん。もしかしてお姉様に会いに来られたんですか？」"
translation = "「앗, 회장님. 혹시 언니분을 만나러 오신 건가요?」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「お姉様、何かあったんでしょうか？\u3000昨日も寮に帰られてから、ずっと様子がおかしくて……」"
translation = "「언니분, 무슨 일 있었던 걸까요? 어제도 기숙사에 돌아오신 뒤로 계속 상태가 이상해서……」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "（あぁ、どうしましょうどうしましょう……！？）"
translation = "(아아, 어쩌면 좋죠 어쩌면 좋죠……!?)"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「お姉様？\u3000あの、私の淹れた紅茶……お口に合いませんでしたか？」"
translation = "「언니분? 저기, 제가 탄 홍차…… 입에 안 맞으셨나요?」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「へっ！？\u3000い、いいえ！\u3000フニの淹れるお紅茶はいつも最高に美味でしてよ！」"
translation = "「헤!? 아, 아니요! 후니가 타주는 홍차는 언제나 최고로 맛있답니다!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「ぐびぐびっ──あっつぅ！？」"
translation = "「벌컥벌컥── 앗 뜨거워!?」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ぴゃっ！？\u3000お姉様、淹れたてなのにそんな勢いよく飲まれたら……！」"
translation = "「퍄앗!? 언니분, 갓 우려낸 건데 그렇게 기세 좋게 마시면……!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「お、おほほ。お恥ずかしいところを見せてしまいましたわ……そ、そうですフニ。シュガーポットを取っていただけまして？」"
translation = "「오, 오호호. 부끄러운 모습을 보여버렸네요…… 그, 그래요 후니. 설탕 그릇 좀 집어주시겠어요?」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「は、はいっ。どうぞっ」"
translation = "「네, 넷. 여기요.」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "（あぁ……あんなにもいきなり胸の内を伝えてしまうだなんて。絶対にドン引きされておりますわよね……！？）"
translation = "(아아…… 그렇게 갑작스럽게 속마음을 전해버리다니. 분명 정떨어졌겠죠……!? )"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "（しかも言うに事欠いて『好きになってしまいましたわ～……！』だなんて。愛の告白ですらない！\u3000何たる無様……！！）"
translation = "(게다가 할 말이 없어서 『좋아하게 되어버렸답니다~……!』라니. 사랑 고백조차 아니야! 이 무슨 꼴사나운……!! )"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ぴゃああ──！？\u3000お姉様、砂糖を乗せすぎです！\u3000カップの上！\u3000角砂糖が山盛りに！」"
translation = "「퍄아아──!? 언니분, 설탕을 너무 많이 넣으셨어요! 컵 위로! 각설탕이 산더미처럼!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「──ですわっ！？\u3000ご、ごめんなさい、せっかくフニが淹れてくれた紅茶が……！」"
translation = "「──인가요!? 미, 미안해요, 어렵게 후니가 타준 홍차가……!」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「だ、大丈夫ですお姉様。まだポットにお代わりはありますから……新しいカップに注ぎますね？」"
translation = "「괘, 괜찮아요 언니분. 아직 포트에 리필이 남아있으니까…… 새 컵에 따라드릴게요?」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「い、いえ。私がします。ポットだけお借りしますわ」"
translation = "「아, 아니요. 제가 하겠어요. 포트만 빌릴게요.」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「ぼーっとしていてはいけませんわね……集中して注がねば……！」"
translation = "「멍하니 있어서는 안 되겠군요…… 집중해서 따라야지……!」"

[[dialogue]]
speaker_original = "流星寮の女子"
speaker_translation = "유성 기숙사 여학생"
original = "「お姉様？\u3000緋宮会長が訪ねてきております。何でも２人きりで話がしたいと──」"
translation = "「언니분? 히노미야 회장이 찾아왔습니다. 아무래도 단둘이서 이야기하고 싶다고──」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「ですわぁ──！？\u3000お、おりません！\u3000私はおりませんわ！\u3000緋宮会長には留守とお伝えなさい！！」"
translation = "「인가요오──!? 어, 없습니다! 저는 없어요! 히노미야 회장에게는 부재중이라고 전하세요!!」"

[[dialogue]]
speaker = "unk"
original = "──バチャバチャバチャバチャッ！"
translation = "──촤아아아악!"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「ぴゃあああっ！？\u3000お姉様、テーブルが紅茶まみれに！？」"
translation = "「퍄아아앗!? 언니분, 테이블이 홍차 범벅이!?」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「……と、こんな感じなんです。流星寮のみなさん、すごくすごく心配していて……」"
translation = "「……라고, 이런 느낌이에요. 유성 기숙사 여러분도 아주아주 걱정하고 있어서……」"

[[dialogue]]
speaker_original = "フェニエル"
speaker_translation = "페니엘"
original = "「会長さん、お話を聞いてあげてもらえませんか？\u3000お姉様なら今、学園の中庭あたりにいらっしゃるかと……！」"
translation = "「회장님, 이야기를 좀 들어주지 않으실래요? 언니분이라면 지금 학원 중정 근처에 계실 것 같아서……!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「毎日トレーニングをする約束でしたのに、今朝はすっぽかしてしまいましたわ……」"
translation = "「매일 트레이닝을 하기로 약속했는데, 오늘 아침은 쏙 빼먹고 말았군요……」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「緋宮会長、約束を違えた私に怒っているでしょうか……？」"
translation = "「히노미야 회장, 약속을 어긴 저에게 화가 났을까요……?」"

[[dialogue]]
speaker = "unk"
original = "（あ、花占いを始めた）"
translation = "(아, 꽃점 치기를 시작했다)"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「会長は怒っている……怒っていない……怒っている……怒って──いない！\u3000よ、よかったですわ……！」"
translation = "「회장은 화났다…… 화나지 않았다…… 화났다…… 화나──지 않았다! 다, 다행이에요……!」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「で、では……本題を。緋宮会長は私とお付き合いをしてくれる……してくれない……してくれる……」"
translation = "「그, 그럼…… 본론을. 히노미야 회장은 나와 사귀어 준다…… 주지 않는다…… 준다……」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「してくれ──ない！？\u3000あ、あぁあああ！？\u3000お、おしまいですわぁ～～っ！？」"
translation = "「주지── 않는다!? 아, 아아아아!? 끄, 끝장이에요～～!!?」"

[[dialogue]]
speaker = "unk"
original = "（……俺が勇気を出そう！）"
translation = "(……내가 용기를 내자!)"

[[dialogue]]
speaker = "unk"
original = "俺もヒルディー先輩が好きです！！"
translation = "나도 힐디 선배가 좋아요!!"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「──ですわっ！？\u3000あ、ひ、緋宮会長っ！？\u3000いつの間に！？」"
translation = "「──인가요!? 아, 히, 히노미야 회장!? 어느 사이에!?」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「というか今、ななな、何と仰って！？\u3000わ、私のことが好き……！？」"
translation = "「그보다 방금, 뭐, 뭐, 뭐라고 하셨나요!? 저, 저를 좋아한다니……!?」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「ほ、本当に？\u3000本当によろしいんですの？\u3000私、昨日からずっと、優雅とは程遠い失態を晒しておりますわ……」"
translation = "「정, 정말인가요? 정말로 괜찮으신 건가요? 저, 어제부터 계속 우아함과는 거리가 먼 실태를 보이고 있는데……」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「そんなに取り乱すくらい、想ってくれて嬉しい……？\u3000あ、あぁ……緋宮会長は本当に紳士ですのね……？」"
translation = "「그렇게 당황할 정도로 생각해주니 기쁘다니……? 아, 아아…… 히노미야 회장은 정말 신사적이시군요……?」"

[[dialogue]]
speaker = "unk"
original = "お付き合いしましょう、先輩！"
translation = "사귀기로 해요, 선배!"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「あっ……ち、近いですわ……<emoji=heart04>\u3000緋宮会長……そんなぎゅっと手を握って……」"
translation = "「앗…… 가, 가까워요……<emoji=heart04> 히노미야 회장…… 그렇게 꽉 손을 잡고……」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「は……はい<emoji=heart04>\u3000ごらんのとおり、その……恋愛事に疎い私ではありますが……」"
translation = "「네…… 네<emoji=heart04> 보시는 바와 같이, 그…… 연애에는 서툰 저입니다만……」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「お、お付き合い……よろしくお願い、いたしますわ……<emoji=heart04>」"
translation = "「사, 사귀는 것…… 잘 부탁, 드립니다……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "こうして俺とヒルディー先輩は、トレーニングパートナーから一歩先に進んで、相思相愛の恋人同士になったのだった──"
translation = "이렇게 나와 힐디 선배는 트레이닝 파트너에서 한 걸음 더 나아가, 서로 사랑하는 연인 사이가 된 것이었다──"

