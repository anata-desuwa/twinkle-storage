[[dialogue]]
speaker = "unk"
original = "第３話,ご対面！\u3000守護天使さま！,P"
translation = "제3화, 대면! 수호천사 님!, P"

[[dialogue]]
speaker = "リア"
original = "「えへへ、楽しかった～。付き合ってくれてありがとう、会長さん♪\u3000実はこっちの世界に来てからずっと気になってたの」"
translation = "「에헤헤, 즐거웠어~. 같이 있어 줘서 고마워, 회장님♪ 사실 이쪽 세계에 온 뒤로 줄곧 궁금했었거든」"

[[dialogue]]
speaker = "リア"
original = "「ぶいあーるだっけ？\u3000すごいね、未来の世界は。あの機器を身につけるだけで、深海を自由に歩き回ったり、宇宙を飛び回ったりできるんだもん」"
translation = "「VR이라고 했나? 대단하네, 미래 세계는. 그 기기를 쓰는 것만으로 심해를 마음껏 걸어 다니거나, 우주를 날아다닐 수 있다니 말이야」"

[[dialogue]]
speaker = "unk"
original = "ご一緒できて俺も楽しかったです"
translation = "함께 할 수 있어서 저도 즐거웠어요"

[[dialogue]]
speaker = "リア"
original = "「あ、もう！\u3000なにニヤニヤしてるの？\u3000もしかしなくても、あのこと思い出しちゃってるよねっ？」"
translation = "「아, 정말! 왜 히죽히죽 웃는 거야? 혹시 아니더라도, 그 일 생각하고 있는 거지?」"

[[dialogue]]
speaker = "リア"
original = "「きゃああっ～！？\u3000オ、オバケっ！！\u3000オバケが追いかけてくるっ！！\u3000どこにいるの会長さん！？\u3000一人じゃこんなの無理～！！」"
translation = "「꺄아아악~!? 귀, 귀신!! 귀신이 쫓아와!! 어디 있어 회장님!? 혼자서는 이런 거 무리야~!!」"

[[dialogue]]
speaker = "リア"
original = "「む～。私、忘れないからね？\u3000会長さんにいじわるされたこと。先輩を騙して真夜中の廃病院に一人きりにするなんてぜーったいにいけないんだからー！」"
translation = "「무~. 나, 잊지 않을 거니까 말이야? 회장님이 심술부린 거. 선배를 속여서 한밤중의 폐병원에 홀로 남겨두다니 저어~얼대로 안 되는 거라구!」"

[[dialogue]]
speaker = "unk"
original = "リア先輩が一人でも怖くないって言ったから……"
translation = "리아 선배가 혼자서도 안 무섭다고 하셔서……"

[[dialogue]]
speaker = "リア"
original = "「べ、別に怖くはなかったよっ？\u3000ちょっぴりビックリしちゃっただけで。私は肝試しで怖がるようなヤワな先輩ではありませんから。えっへん！」"
translation = "「딱, 딱히 무섭지는 않았어! 조금 깜짝 놀랐을 뿐이지. 나는 담력 시험에서 무서워할 정도로 나약한 선배가 아니니까 말이야. 엣헴!」"

[[dialogue]]
speaker = "unk"
original = "あ、野生のオバケが"
translation = "아, 야생 귀신이"

[[dialogue]]
speaker = "リア"
original = "「きゃああーっ！？\u3000どこどこ！？\u3000どこにいるの！？\u3000捕まったら今度こそ呪われちゃう！！」"
translation = "「꺄아아악!? 어디 어디!? 어디에 있는데!? 잡히면 이번에야말로 저주받을 거야!!」"

[[dialogue]]
speaker = "リア"
original = "「って、もおーーっ！\u3000会長さんのバカバカバカ！\u3000また先輩のことからかって！\u3000そーいうことしちゃダメだゾ！\u3000いじわるが過ぎると女の子に嫌われちゃうんだから！」"
translation = "「아니, 정말──! 회장님 바보 바보 바보! 또 선배를 놀리고! 그런 짓 하면 안 된다구! 심술이 지나치면 여자애한테 미움받을 거니까!」"

[[dialogue]]
speaker = "unk"
original = "あはは、すみません"
translation = "아하하, 죄송합니다"

[[dialogue]]
speaker = "リア"
original = "「む～、全然反省しているように見えない。これは元の世界に戻る前に、ちゃんと指導をしておかないと──」"
translation = "「무~, 전혀 반성하는 것처럼 안 보여. 이건 원래 세계로 돌아가기 전에, 제대로 지도를 해두지 않으면──」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「そこの少女よ。このティッシュを受け取れ。ひとつと言わず箱ごと持っていくのだ」"
translation = "「거기 소녀여. 이 티슈를 받아라. 하나라 하지 말고 통째로 가져가는 거다」"

[[dialogue]]
speaker = "リア"
original = "「えっ？\u3000ティッシュ？\u3000箱ごと？」"
translation = "「엣? 티슈? 통째로요?」"

[[dialogue]]
speaker = "マグダレナ"
original = "「ですからアルモタヘル。そのように強引に迫っては誰にも受け取っては──って、あら？\u3000リアさまと会長さまではありませんか」"
translation = "「그러니까 아르모타헬. 그렇게 강압적으로 다가가서는 아무도 받아주지── 어라? 리아 님과 회장님 아니십니까」"

[[dialogue]]
speaker = "リア"
original = "「マグダレナさま？\u3000ええと守護天使さまがこんな街中で一体何を……？」"
translation = "「막달레나 님? 에또 수호천사 님께서 이런 길거리에서 대체 무엇을……?」"

[[dialogue]]
speaker = "マグダレナ"
original = "「アルバイトです。といっても私はアルモタヘルのお手伝いをしているだけですが」"
translation = "「아르바이트입니다. 그렇다 해도 저는 아르모타헬을 도와주고 있을 뿐이지만요」"

[[dialogue]]
speaker = "リア"
original = "「バ、バイト！？\u3000守護天使さまが！？\u3000それにこの気配……。もしかして、そちらの方も……」"
translation = "「아, 알바!? 수호천사 님께서!? 게다가 이 기운……. 혹시 그쪽 분도……」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「む……そのロザリオから気配を感じる。我らとは似て非なるもののようだが」"
translation = "「음…… 그 로자리오에서 기운이 느껴지는군. 우리와는 비슷하면서도 다른 존재인 듯하다만」"

[[dialogue]]
speaker = "マグダレナ"
original = "「紹介しますね。この方は──」"
translation = "「소개할게요. 이분은──」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「なるほど。そういえば数日前にもマグダレナが話していたな。守護天使の力を頼りに戦うクルセイダースなる者が平行世界から訪れていると」"
translation = "「과연. 그러고 보니 며칠 전에도 막달레나가 이야기했었지. 수호천사의 힘을 빌려 싸우는 크루세이더스라는 자들이 평행세계에서 방문해 있다고」"

[[dialogue]]
speaker = "マグダレナ"
original = "「元の世界にお送りするのが遅くなってしまい申し訳ありません。中々あちらの世界とのリンクが重ならないものでして」"
translation = "「원래 세계로 보내드리는 게 늦어져서 죄송합니다. 좀처럼 저쪽 세계와의 링크가 겹쳐지질 않아서요」"

[[dialogue]]
speaker = "リア"
original = "「い、いえ。みんなと遊んだり、観光をしたり色々と楽しんでいますから。それよりも守護天使さまがアルバイトなんて……」"
translation = "「아, 아니에요. 모두와 놀거나, 관광을 하거나 여러모로 즐기고 있으니까요. 그것보다 수호천사 님께서 아르바이트라니……」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「何かおかしいか？\u3000労働を対価に金銭を得るというのがこの世界の決まりだろう？\u3000それともお前の世界では労せずともケバブが出てくるのか？」"
translation = "「뭔가 이상한가? 노동의 대가로 금전을 얻는 것이 이 세계의 규칙이 아닌가? 아니면 그대의 세계에서는 수고하지 않아도 케밥이 나오는가?」"

[[dialogue]]
speaker = "リア"
original = "「そ、そんなことは。みんな働いてお金を稼いでいますけど……」"
translation = "「그, 그런 건 아니지만요. 다들 일해서 돈을 벌고 있지만……」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「であれば何も不思議なことはないはずだ。さて、次はこのオーバーイーツとやらに応募してみるか。歩合制の出前配達らしいが……」"
translation = "「그렇다면 아무 이상할 것 없지 않은가. 자, 다음은 이 오버이츠라는 것에 응모해 볼까. 성과제 배달이라던데……」"

[[dialogue]]
speaker = "マグダレナ"
original = "「出前の配達はやめておいた方がいいのでは？\u3000いつかのように空腹を刺激されて倒れてしまいそうですし。この引っ越しバイトはどうでしょう？\u3000バイト代も高くて──」"
translation = "「배달은 그만두시는 게 좋지 않을까요? 지난번처럼 공복이 자극되어 쓰러져버릴 것 같습니다. 이 이사 알바는 어떠신가요? 급여도 높고──」"

[[dialogue]]
speaker = "リア"
original = "「しゅ、守護天使さまがまるで金欠続きで困窮しきっている学生のような会話を……」"
translation = "「수, 수호천사 님께서 마치 돈이 궁해서 곤란해하는 학생 같은 대화를……」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「ぬ！\u3000あれを見ろ、マグダレナ！\u3000ケバブ屋が割り引きクーポンを配っているぞ！\u3000皆でもらいにいけば都合４枚手に入れることができる！」"
translation = "「누! 저것을 보아라, 막달레나! 케밥집에서 할인 쿠폰을 나눠주고 있다! 다 같이 받으러 가면 도합 4장을 얻을 수 있다!」"

[[dialogue]]
speaker = "リア"
original = "「ああっ、そんなセコイことまで……！！\u3000守護天使さまのイメージが崩れちゃうぅ……！！」"
translation = "「아앗, 그런 좀스러운 짓까지……!! 수호천사 님의 이미지가 무너져버려어……!!」"

[[dialogue]]
speaker = "リア"
original = "「て、手伝います。私にもティッシュを配らせてください……！」"
translation = "「도, 도와드릴게요. 저도 티슈를 돌리게 해주세요……!」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「ふむ？\u3000手伝いたいというのなら我は大歓迎だが。何故お前はそんなにも悲しいものを見る目をしている？」"
translation = "「음? 돕고 싶다면 나는 대환영이다만. 어찌하여 그대는 그렇게나 가엾은 것을 보는 눈을 하고 있는 것이냐?」"

[[dialogue]]
speaker = "マグダレナ"
original = "「はて……何か心苦しいものでも目撃してしまったのでしょうか……？」"
translation = "「어라…… 뭔가 마음 아픈 것이라도 목격하신 것일까요……?」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「うむ、今日は大量にティッシュをさばけたな。箱のおかわりまでしたのは初めてだったぞ。お前のおかげだ」"
translation = "「음, 오늘은 대량으로 티슈를 해치웠군. 박스를 리필까지 한 건 처음이었다. 그대 덕분이다」"

[[dialogue]]
speaker = "マグダレナ"
original = "「ええ、本当に。アルモタヘルもリアさまのように、笑顔で優しくティッシュを差し出すことを覚えないとですね」"
translation = "「네, 정말로요. 아르모타헬도 리아 님처럼, 웃으며 상냥하게 티슈를 건네는 법을 배워야겠어요」"

[[dialogue]]
speaker = "リア"
original = "「あ、あはは……。お役に立てたのであれば良かったです……」"
translation = "「아, 아하하…… 도움이 되었다면 다행이네요……」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「クルセイダース、か。お前のような者が戦っているのであれば平行世界は安心だろう」"
translation = "「크루세이더스, 인가. 그대 같은 자가 싸우고 있다면 평행세계는 안심이겠군」"

[[dialogue]]
speaker = "リア"
original = "「え？\u3000どういうことですか？」"
translation = "「에? 무슨 말씀이세요?」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「お前からは清き心と揺るがぬ信念を感じる。強大なリクリエの力に負けず、乗り越えていける強い心の持ち主だ」"
translation = "「그대에게서는 맑은 마음과 흔들림 없는 신념이 느껴진다. 강대한 리크리에의 힘에 굴하지 않고 뛰어넘어 갈 수 있는 강한 마음의 소유자다」"

[[dialogue]]
speaker = "マグダレナ"
original = "「ふふ、私も同感です。平行世界の守護天使も、きっとリアさまに力を貸せることを誇らしく思っていることでしょう」"
translation = "「후후, 저도 동감입니다. 평행세계의 수호천사도, 분명 리아 님께 힘을 빌려드릴 수 있는 것을 자랑스럽게 여기고 있을 거예요」"

[[dialogue]]
speaker = "リア"
original = "「アルモタヘルさま……。マグダレナさま……」"
translation = "「아르모타헬 님…… 막달레나 님……」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「自信を持って己が世界を救済するといい。お前になら必ずできる。これは我からの餞別と激励だ」"
translation = "「자신을 갖고 자신의 세계를 구제하도록 해라. 그대라면 반드시 할 수 있다. 이것은 내가 주는 작별 선물과 격려다」"

[[dialogue]]
speaker = "リア"
original = "「あんなに大切にされていたケバブ屋さんのクーポン……」"
translation = "「그렇게나 소중히 여기시던 케밥집 쿠폰……」"

[[dialogue]]
speaker = "マグダレナ"
original = "「リアさま方の未来に大いなる幸のあらんことを。たとえ異なる世界に属していても、守護天使としてクルセイダースの無事と勝利を心から願っていますよ」"
translation = "「리아 님들의 미래에 커다란 행복이 깃들기를. 비록 다른 세계에 속해 있어도, 수호천사로서 크루세이더스의 무사함과 승리를 진심으로 기원할게요」"

[[dialogue]]
speaker = "アルモタヘル"
original = "「ケバブ屋では我の名を出すといい。ケバブの肉の量くらいはサービスしてもらえるはずだ」"
translation = "「케밥집에서는 내 이름을 대도록 해라. 케밥의 고기 양 정도는 서비스해 줄 것이다」"

[[dialogue]]
speaker = "unk"
original = "行っちゃいましたね"
translation = "가버리셨네요"

[[dialogue]]
speaker = "リア"
original = "「ふふ。やっぱり守護天使さまは守護天使さまだったよ。思った通りの方々だった」"
translation = "「후후. 역시 수호천사 님은 수호천사 님이셨어. 생각했던 대로인 분들이었어」"

[[dialogue]]
speaker = "リア"
original = "「私も気を引き締め直さなくっちゃ！\u3000２人の守護天使さまに恥じないように、流星クルセイダースとして私たちの世界を必ず守ってみせるよ！」"
translation = "「나도 마음을 가다듬어야겠어! 두 수호천사 님께 부끄럽지 않도록, 유성 크루세이더즈로서 우리 세계를 반드시 지켜낼 거야!」"

[[dialogue]]
speaker = "リア"
original = "「さぁケバブ屋さんに行こう、会長さん！\u3000お肉のたっぷり入ったケバブを食べて、精進しなくちゃね！」"
translation = "「자, 케밥집으로 가자, 회장님! 고기가 듬뿍 든 케밥을 먹고 정진해야지!」"

