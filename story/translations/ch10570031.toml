[[dialogue]]
speaker = "unk"
original = "第１話,初めての海,P"
translation = "제1화, 첫 바다, P"

[[dialogue]]
speaker = "トリシャ"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "トリシャ"
original = "「あ……すみません。つい、圧倒されてしまっておりました。海というのは……こんなにも広大なものなのですね」"
translation = "「아…… 죄송합니다. 그만 압도당해 버리고 말았습니다. 바다라는 건…… 이렇게나 광대한 것이군요.」"

[[dialogue]]
speaker = "unk"
original = "海は初めて？"
translation = "「바다는 처음이야?」"

[[dialogue]]
speaker = "トリシャ"
original = "「はい……今までも、絵や写真を見たりすることはあったのですが……」"
translation = "「네…… 지금까지도 그림이나 사진을 본 적은 있었습니다만……」"

[[dialogue]]
speaker = "トリシャ"
original = "「自分の目で見るのは、今回が初めてでした。海というものが、こんなに綺麗なものだったなんて……」"
translation = "「제 눈으로 직접 보는 건 이번이 처음입니다. 바다라는 것이 이렇게나 아름다운 것이었다니……」"

[[dialogue]]
speaker = "トリシャ"
original = "「魔界では色々な場所を巡り歩いてきました……ですが私が歩いてきた中には、これほどの絶景はありませんでした」"
translation = "「마계에서는 여러 장소를 돌아다녔습니다…… 하지만 제가 걸어온 곳 중에는 이 정도의 절경은 없었습니다.」"

[[dialogue]]
speaker = "トリシャ"
original = "「この温暖な気候……爽やかな風……すべてが新鮮です……」"
translation = "「이 온난한 기후…… 상쾌한 바람…… 모든 것이 신선합니다……」"

[[dialogue]]
speaker = "トリシャ"
original = "「連れてきてくれたヘレナさんには感謝ですね……これで私の世界が、またひとつ広がったような気がします……」"
translation = "「데려와 주신 헬레나 씨께 감사해야겠네요…… 이것으로 제 세계가 또 하나 넓어진 것 같은 기분이 듭니다……」"

[[dialogue]]
speaker = "unk"
original = "トリシャさんは魔界と大きく異なるリゾート結界の光景にカルチャーショックを受けていた。"
translation = "트리샤 씨는 마계와 크게 다른 리조트 결계의 광경에 문화 충격을 받고 있었다."

[[dialogue]]
speaker = "トリシャ"
original = "「素足で歩くというのも……最初は、慣れないものでしたが……」"
translation = "「맨발로 걷는다는 것도…… 처음에는 익숙해지지 않았습니다만……」"

[[dialogue]]
speaker = "トリシャ"
original = "「慣れてみると……ふふ。開放感があって、悪くありません。熱いけど……サラサラしていて……変な感覚……」"
translation = "「익숙해지고 보니…… 후후. 개방감이 있어서 나쁘지 않네요. 뜨겁지만…… 보슬보슬해서…… 이상한 감각……」"

[[dialogue]]
speaker = "トリシャ"
original = "「……にへへ……」"
translation = "「……니헤헤……」"

[[dialogue]]
speaker = "トリシャ"
original = "「砂浜を歩く……楽しいものですね……レゾフでこんなことをしていては、すぐに凍ってしまいそうですが」"
translation = "「모래사장을 걷는 것…… 즐거운 일이군요…… 레조프에서 이런 짓을 했다간 금방 얼어붙어 버리겠지만요.」"

[[dialogue]]
speaker = "unk"
original = "格好は平気？"
translation = "「차림새는 괜찮아?」"

[[dialogue]]
speaker = "unk"
original = "水着は慣れた？"
translation = "「수영복은 익숙해졌어?」"

[[dialogue]]
speaker = "トリシャ"
original = "「はい。このような姿は初めてでしたが、着てみると、とてもすんなりフィットしました」"
translation = "「네. 이런 모습은 처음이었습니다만, 입어 보니 아주 부드럽게 피트되었습니다.」"

[[dialogue]]
speaker = "トリシャ"
original = "「さすがはヘレナさん……ですね……」"
translation = "「역시 헬레나 씨……네요……」"

[[dialogue]]
speaker = "トリシャ"
original = "「あと……普段の私の格好からして、抵抗なく馴染むだろうと言われました……その通りだったかもしれません……」"
translation = "「그리고…… 평소 제 차림새로 보아 저항 없이 익숙해질 거라고 말씀하셨습니다…… 그 말대로였을지도 모르겠네요……」"

[[dialogue]]
speaker = "unk"
original = "よくよく考えると、トリシャさんの格好はレゾフの頃からかなり露出多めだった。"
translation = "곰곰이 생각해보면 트리샤 씨의 차림새는 레조프 시절부터 꽤 노출이 많았다."

[[dialogue]]
speaker = "unk"
original = "むしろ、あちらの格好の方がビーチに適応しているというか……。"
translation = "오히려 그쪽 차림새가 비치에 더 적응되어 있다고나 할까……."

[[dialogue]]
speaker = "トリシャ"
original = "「……そういえば、あちらにある施設は……？」"
translation = "「……그러고 보니 저쪽에 있는 시설은……?」"

[[dialogue]]
speaker = "unk"
original = "海の家ですよ"
translation = "「바다의 집이에요.」"

[[dialogue]]
speaker = "unk"
original = "あれは──"
translation = "「저건──」"

[[dialogue]]
speaker = "トリシャ"
original = "「海の家……そのままのネーミングですね。リップルさんがいらっしゃるところ……」"
translation = "「바다의 집…… 이름 그대로의 네이밍이군요. 리플 씨가 계시는 곳……」"

[[dialogue]]
speaker = "トリシャ"
original = "「あちらに置かれているのは……スイカ、でしょうか？\u3000なぜ野ざらしにされているのか、わかりませんが……」"
translation = "「저쪽에 놓여 있는 건…… 수박, 일까요? 어째서 노출된 채 방치되어 있는지 모르겠습니다만……」"

[[dialogue]]
speaker = "unk"
original = "スイカ割りに使う"
translation = "「수박 깨기에 사용해.」"

[[dialogue]]
speaker = "トリシャ"
original = "「スイカ割り……とは？」"
translation = "「수박 깨기……란?」"

[[dialogue]]
speaker = "トリシャ"
original = "「なんと……その棒きれを使って、スイカを真っ二つに？\u3000なるほど……なかなかワイルドな催しがあるのですね……」"
translation = "「세상에…… 그 막대기를 사용해서 수박을 두 동강으로? 과연…… 꽤 와일드한 행사가 있군요……」"

[[dialogue]]
speaker = "トリシャ"
original = "「なぜそんなことを──あ」"
translation = "「어째서 그런 짓을── 아.」"

[[dialogue]]
speaker = "トリシャ"
original = "「お待ちください……わかりました。みなまで言う必要はありません」"
translation = "「기다려 주세요…… 알겠습니다. 다 말씀하실 필요 없습니다.」"

[[dialogue]]
speaker = "トリシャ"
original = "「ずばり、スイカを叩き割り、その断面で運勢を占うというものですね……わかります。似たような占術を聞いたことがありますので」"
translation = "「단도직입적으로, 수박을 때려 부수고 그 단면으로 운세를 점치는 것이군요…… 알겠습니다. 비슷한 점술을 들어본 적이 있으니까요.」"

[[dialogue]]
speaker = "トリシャ"
original = "「え？\u3000違う……？」"
translation = "「에? 아니라고요……?」"

[[dialogue]]
speaker = "unk"
original = "食べるため"
translation = "「먹기 위해서야.」"

[[dialogue]]
speaker = "unk"
original = "割るだけだ"
translation = "「그냥 깨는 것뿐이야.」"

[[dialogue]]
speaker = "トリシャ"
original = "「なるほど……ですが、それなら刃物で切ればよいような気もします。食べづらいだけだと思われますが……」"
translation = "「과연…… 하지만, 그렇다면 칼로 자르면 좋을 것 같다는 생각도 드네요. 먹기 불편할 뿐이라고 생각됩니다만……」"

[[dialogue]]
speaker = "トリシャ"
original = "「そういうものだから……と。ふむ、魔界にも独特な風習は多くあります。それもまた文化なのでしょう……」"
translation = "「그런 법이니까…… 라고요. 흠, 마계에도 독특한 풍습은 많이 있습니다. 그것 또한 문화겠지요……」"

[[dialogue]]
speaker = "トリシャ"
original = "「む？\u3000ちょうどいいからスイカ割りをしないか、と……？」"
translation = "「무? 마침 잘 됐으니 수박 깨기를 하지 않겠느냐고……?」"

[[dialogue]]
speaker = "トリシャ"
original = "「私は剣の心得がないものですから……綺麗に割ろうにも、ご期待に添えないかと存じますが……」"
translation = "「저는 검술 소양이 없어서…… 예쁘게 깨고 싶어도, 기대에 부응하지 못할 것 같습니다만……」"

[[dialogue]]
speaker = "トリシャ"
original = "「ふむ……割れればなんでもよい、と。それくらいなら……私にもできるかもしれません」"
translation = "「흠…… 깨지기만 하면 무엇이든 좋다, 고요. 그 정도라면…… 저도 할 수 있을지도 모릅니다」"

[[dialogue]]
speaker = "トリシャ"
original = "「フフ、少し興味が湧いてきましたね……挑戦してみましょうか」"
translation = "「후후, 조금 흥미가 생기네요…… 도전해 볼까요」"

[[dialogue]]
speaker = "トリシャ"
original = "「フフフ……ごめんなさい。結局、あなたに割ってもらうことになるなんて」"
translation = "「후후후…… 죄송해요. 결국, 당신이 깨게 만들다니」"

[[dialogue]]
speaker = "トリシャ"
original = "「非力も考えものですね……あんなに力を込めましたのに、スイカがびくともしませんでした……」"
translation = "「연약함도 문제군요…… 그렇게나 힘을 주었습니다만, 수박이 꿈쩍도 하지 않았어요……」"

[[dialogue]]
speaker = "unk"
original = "トリシャさんはスイカに棒きれを振り下ろしたものの、力がなくてうまいこと割れなかった。"
translation = "트리샤 씨는 수박에 막대기를 휘둘렀지만, 힘이 없어서 제대로 깨지 못했다."

[[dialogue]]
speaker = "トリシャ"
original = "「えいっ。えいっ」"
translation = "「에잇. 에잇」"

[[dialogue]]
speaker = "unk"
original = "本人はその失敗を反省してか、なぜかスイカ割りの素振りをしていた。"
translation = "본인은 그 실패를 반성해서인지, 왜인지 수박 깨기 연습을 하고 있었다."

[[dialogue]]
speaker = "トリシャ"
original = "「ふう……ですが、あなたに割ってもらったスイカの味は、格段に甘い気がします。不思議なものですね」"
translation = "「후우…… 하지만, 당신이 깨 준 수박 맛은, 훨씬 더 달콤한 기분이 들어요. 희한한 일이네요」"

[[dialogue]]
speaker = "トリシャ"
original = "「ラムネ、というのも初めて飲みましたが……ひんやりしゅわしゅわで、火照った体に染みました」"
translation = "「라무네라는 것도 처음 마셔봤습니다만…… 시원하고 톡 쏘는 게, 달아오른 몸에 스며들었어요」"

[[dialogue]]
speaker = "トリシャ"
original = "「海の家が皆さんに愛される理由が……なんとなくわかった気がします」"
translation = "「바다의 집이 여러분에게 사랑받는 이유를…… 왠지 알 것 같은 기분이 듭니다」"

[[dialogue]]
speaker = "トリシャ"
original = "「ありがとうございます。あなたのおかげで……海と夏を満喫することができました……大変満足です」"
translation = "「감사합니다. 당신 덕분에…… 바다와 여름을 만끽할 수 있었습니다…… 매우 만족스러워요」"

[[dialogue]]
speaker = "トリシャ"
original = "「この感動を、これからの人生にも活かしたいものです──」"
translation = "「이 감동을, 앞으로의 인생에도 활용하고 싶네요──」"

[[dialogue]]
speaker = "unk"
original = "そうして、満足げに締めようとするトリシャさんだったが──"
translation = "그렇게, 만족스러운 듯 마무리하려던 트리샤 씨였지만──"

[[dialogue]]
speaker = "unk"
original = "泳いでみません？"
translation = "헤엄쳐 보지 않을래요?"

[[dialogue]]
speaker = "unk"
original = "海に入ってみません？"
translation = "바다에 들어가 보지 않을래요?"

[[dialogue]]
speaker = "トリシャ"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "トリシャ"
original = "「えぇぇっ……？」"
translation = "「에에에……?」"

