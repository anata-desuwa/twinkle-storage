[[dialogue]]
speaker = "ナナカ"
original = "「あーーーっ！\u3000こんなところにいたっ！」"
translation = "「아ーーー앗! 이런 곳에 있었잖아!」"

[[dialogue]]
speaker = "unk"
original = "ん……？"
translation = "응……?"

[[dialogue]]
speaker = "ナナカ"
original = "「や～っと見つけたよ、ロロちゃん！」"
translation = "「겨ー우 찾았다, 로로짱!」"

[[dialogue]]
speaker = "ルリエル？"
original = "「はて……？」"
translation = "「하테……?」"

[[dialogue]]
speaker = "フィオナ"
original = "「誰でしょう、見慣れない人ですけど……」"
translation = "「누구시죠, 낯선 분이신데……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あれは……！」"
translation = "「저건……!」"

[[dialogue]]
speaker = "ナナカ"
original = "「ったくも～、勝手にフラフラいなくなるんじゃないよ！」"
translation = "「정말이지~, 멋대로 휘청휘청 사라지지 마!」"

[[dialogue]]
speaker = "ナナカ"
original = "「ただでさえ、気づけば全然知らない場所で、まわりは知らない人ばっかで、めちゃくちゃ困ってるってのにさ！」"
translation = "「가뜩이나, 정신 차려 보니 전혀 모르는 장소에, 주변은 모르는 사람뿐이라, 엄청 곤란하다고!」"

[[dialogue]]
speaker = "ルリエル？"
original = "「ひええっ、なんなんですかっ、急に怒鳴らないで下さいよ～！」"
translation = "「히에에엣, 뭐예요, 갑자기 소리 지르지 마세요~!」"

[[dialogue]]
speaker = "ナナカ"
original = "「あたふたしたいのはこっちだってんでい！\u3000一体ここはどこなのさ～！」"
translation = "「허둥지둥하고 싶은 건 이쪽이라고! 대체 여기는 어디야~!」"

[[dialogue]]
speaker = "フィオナ"
original = "「あ、ちょっと待って下さい。あの制服は……！」"
translation = "「아, 잠깐 기다려 주세요. 저 교복은……!」"

[[dialogue]]
speaker = "unk"
original = "もしかして！"
translation = "혹시!"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ね、やっぱり、そう思うわよねっ」"
translation = "「그치, 역시, 그렇게 생각하지」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あなた、もしかして……ううん、絶対そうだわ！\u3000私の勘がそう告げてるもの！」"
translation = "「당신, 혹시…… 아니, 절대 그래! 내 직감이 그렇게 말하고 있어!」"

[[dialogue]]
speaker = "ナナカ"
original = "「えっ！？\u3000ななな、なにさいきなり……あんたたち、どちらさん？」"
translation = "「엣!? 무무무, 뭐야 갑자기…… 너희들, 누구야?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「私は九浄ヴィーナス。新星学園所属の星騎士なの。で、こっちが星徒会長の──」"
translation = "「나는 쿠죠 비너스. 신성 학원 소속의 성기사야. 그리고 이쪽이 성도회장인──」"

[[dialogue]]
speaker = "unk"
original = "緋宮クロトです"
translation = "히노미야 쿠로토다"

[[dialogue]]
speaker = "フィオナ"
original = "「私は、この流星学園で星徒会長を務めている、星見フィオナと申します」"
translation = "「저는, 이 유성 학원에서 성도회장을 맡고 있는, 호시미 피오나라고 합니다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「いきなりでびっくりするかもしれないけど、私たち多分、あなたの事情をわかってあげられると思うわ」"
translation = "「갑작스러워서 놀랄지도 모르겠지만, 우리 아마, 당신의 사정을 이해해 줄 수 있을 거라고 생각해」"

[[dialogue]]
speaker = "ナナカ"
original = "「え、待って待って、どういうこと……？\u3000流星学園？\u3000てか、九浄！？\u3000もしかして、リア先輩の親戚とか？」"
translation = "「에, 잠깐 잠깐, 무슨 말이야……? 유성 학원? 그보다, 쿠죠!? 혹시, 리아 선배 친척이야?」"

[[dialogue]]
speaker = "フィオナ"
original = "「その反応、やはり……！」"
translation = "「그 반응, 역시……!」"

[[dialogue]]
speaker = "ナナカ"
original = "「アタシのことも、知ってるわけ？\u3000ごめん、どっかで会ったことあったっけ……？」"
translation = "「나도, 알고 있는 거야? 미안, 어디서 만난 적 있었나……?」"

[[dialogue]]
speaker = "フィオナ"
original = "「いえ、そういうわけではないのですが……きっと、見知らぬ場所に飛ばされて、お困りなのではないか、と」"
translation = "「아뇨, 그런 건 아니지만…… 분명, 낯선 장소로 날아와서, 곤란하신 게 아닐까, 하고」"

[[dialogue]]
speaker = "ナナカ"
original = "「おっ、察しがよくて助かる～！\u3000ってか、アタシらも名乗らないとね」"
translation = "「오, 눈치가 빨라서 살았어~! 그보다, 우리도 이름을 밝혀야지」"

[[dialogue]]
speaker = "ナナカ"
original = "「アタシは夕霧ナナカ。で、そっちがロロット」"
translation = "「나는 유우기리 나나카. 그리고 저쪽이 로롯토」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「えっと……ルリエルのこと？」"
translation = "「음…… 루리엘 말이야?」"

[[dialogue]]
speaker = "ナナカ"
original = "「ルリエルぅ？\u3000どっからどう見ても、ロロット・ローゼンクロイツでしょ。あたしたちの仲間で、生徒会の書記のさ」"
translation = "「루리엘? 어디서 어떻게 봐도, 로롯토 로젠크로이츠잖아. 우리 동료이자, 학생회 서기 말이야」"

[[dialogue]]
speaker = "ルリエル？"
original = "「え？」"
translation = "「에?」"

[[dialogue]]
speaker = "ナナカ"
original = "「へ？」"
translation = "「헤?」"

[[dialogue]]
speaker = "ルリエル？"
original = "「あのっ、人違いですっ。ロロットさんなんて知りませんっ。わたしは、ルリエルですっ！」"
translation = "「저, 저기! 사람 잘못 봤습니다! 로롯토 씨 같은 사람은 모릅니다! 저는, 루리엘입니다!」"

[[dialogue]]
speaker = "ナナカ"
original = "「えーっ！？\u3000どうしちゃったのさ、なんか変だよロロちゃん。いや、確かに、いつもちょっと変なところはあったけどさっ」"
translation = "「에ー엣!? 왜 그래, 뭔가 이상해 로로짱. 아니, 확실히, 평소에도 좀 이상한 부분은 있었지만」"

[[dialogue]]
speaker = "ルリエル？"
original = "「むむっ、あなたも失礼ですねっ」"
translation = "「무뭇, 당신도 실례군요!」"

[[dialogue]]
speaker = "ナナカ"
original = "「だけどほら、その豚の貯金箱、トントロを持ってるのが証拠だよ！」"
translation = "「하지만 봐, 그 돼지 저금통, 톤토로를 가지고 있는 게 증거잖아!」"

[[dialogue]]
speaker = "ルリエル？"
original = "「もももっ、持ってませ～ん！」"
translation = "「모모모옷, 안 가지고 있어~요!」"

[[dialogue]]
speaker = "ルリエル？"
original = "「ひえええっ！？」"
translation = "「히에에에엣!?」"

[[dialogue]]
speaker = "ナナカ"
original = "「ほらぁ、ドジだし」"
translation = "「봐, 덜렁대고」"

[[dialogue]]
speaker = "ルリエル？"
original = "「ドジじゃありませ～ん！」"
translation = "「덜렁대는 거 아니에요~!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「んん～……？\u3000この感じ……やっぱり、なんだか以前にも、似たようなことがあったような……」"
translation = "「음음~……? 이 느낌…… 역시, 왠지 이전에도, 비슷한 일이 있었던 것 같은데……」"

[[dialogue]]
speaker = "ナナカ"
original = "「えっ、もしかして、ロロちゃんがこうなっちゃった心当たり、なんかあるの？」"
translation = "「엣, 혹시, 로로짱이 이렇게 된 단서, 뭐 아는 거 있어?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「……はっ！\u3000そうよ、前にもリクリエの影響で、ルリエルがこんなふうになってたじゃない！」"
translation = "「……핫! 그렇지, 전에도 리크리에의 영향으로, 루리엘이 이렇게 됐었잖아!」"

[[dialogue]]
speaker = "フィオナ"
original = "「あ……そうでした！\u3000私たちはまた、認識改変の影響を受けていた、ということですか……！？\u3000不覚ですっ」"
translation = "「아…… 그랬습니다! 저희는 또, 인식 개변의 영향을 받고 있었다는 건가요……!? 불찰입니다!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「でも、ナナカと話してる内に、思い出せるようになったわよね？\u3000なんで？」"
translation = "「근데, 나나카와 이야기하는 동안, 기억해 낼 수 있게 됐네? 왜지?」"

[[dialogue]]
speaker = "フィオナ"
original = "「影響を受けていないナナカさんの干渉で、認識改変が綻びた、という感じでしょうか」"
translation = "「영향을 받지 않은 나나카 씨의 간섭으로, 인식 개변이 풀린, 그런 느낌일까요」"

[[dialogue]]
speaker = "ナナカ"
original = "「え、アタシ、なんかやっちゃいました……？」"
translation = "「에, 나, 뭐 잘못했어……?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「前にもね、私たちの仲間の様子がおかしくなったことがあったの。もう大変だったんだから」"
translation = "「전에도 말이야, 우리 동료의 상태가 이상해진 적이 있었어. 정말 큰일이었다니까」"

[[dialogue]]
speaker = "ルリエル？"
original = "「認識改変……？\u3000何を言っているんですか！\u3000わたしは変でもおかしくもありませ～ん！」"
translation = "「인식 개변……? 무슨 말씀을 하시는 겁니까! 저는 이상하지도 않고 괜찮아요~!」"

[[dialogue]]
speaker = "ナナカ"
original = "「じゃあ、元に戻す方法、知ってるの？」"
translation = "「그럼, 원래대로 되돌리는 방법, 알고 있어?」"

[[dialogue]]
speaker = "フィオナ"
original = "「そのためにもまずは、彼女に少し落ち着いてもらう必要があるかと……」"
translation = "「그러기 위해서라도 우선은, 그녀를 조금 진정시킬 필요가 있을 것 같습니다만……」"

[[dialogue]]
speaker = "ルリエル？"
original = "「むむむ～っ、落ち着くのは皆さんの方ですよ！」"
translation = "「무무무~웃, 진정해야 할 건 여러분 쪽이에요!」"

[[dialogue]]
speaker = "ルリエル？"
original = "「原因はよくわかりませんが、どうやら皆さん、正気ではないご様子……」"
translation = "「원인은 잘 모르겠지만, 아무래도 여러분, 제정신이 아닌 것 같으니……」"

[[dialogue]]
speaker = "ルリエル？"
original = "「仕方ありません。ここはわたしが、皆さんの目を覚まさせてあげましょう！」"
translation = "「어쩔 수 없습니다. 여기는 제가, 여러분의 눈을 뜨게 해 드리죠!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふ～ん、意外と手強そうね……！」"
translation = "「흐음, 의외로 만만치 않겠네……!」"

[[dialogue]]
speaker = "ナナカ"
original = "「てやんでい！」"
translation = "「테얀데이!」"

[[dialogue]]
speaker = "フィオナ"
original = "「て、てやんでい……？」"
translation = "「테, 테얀데이……?」"

[[dialogue]]
speaker = "ナナカ"
original = "「ったく、しゃーないね！\u3000なんだかよくわかんないけど、そういうことなら任せときな！」"
translation = "「정말, 어쩔 수 없네! 뭔가 잘 모르겠지만, 그런 거라면 맡겨 둬!」"

[[dialogue]]
speaker = "ナナカ"
original = "「ちょ～っと手荒だけど、力ずくでもおとなしくしてもらうよ！」"
translation = "「조ー금 거칠지만, 힘으로라도 얌전하게 만들어 줄게!」"

[[dialogue]]
speaker = "ルリエル？"
original = "「いいでしょう、身の程をわきまえて下さ～い！」"
translation = "「좋습니다, 분수를 아세요~!」"

