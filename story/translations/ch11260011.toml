[[dialogue]]
speaker = "unk"
original = "第１話,天才魔女と天才錬金術師,P"
translation = "제1화, 천재 마녀와 천재 연금술사, P"

[[dialogue]]
speaker = "unk"
original = "トレジアンナさんが復活を果たしてから、１週間ほど経ったある日のこと。"
translation = "트레지안나 씨가 부활을 완수한 지 일주일 정도 지났을 무렵의 어느 날."

[[dialogue]]
speaker = "unk"
original = "俺は彼女に頼まれて、運勢不調のサチに代わり、ロストアイテムの回収を手伝うことになったのだが――"
translation = "나는 그녀의 부탁을 받아, 운세 부진에 빠진 사치 대신 로스트 아이템의 회수를 돕게 되었는데──"

[[dialogue]]
speaker = "トレジアンナ"
original = "「――ふぅ～。お疲れ様でした～♪」"
translation = "「──후우~. 수고하셨습니다~♪」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「『箱庭』のロストアイテム、なんとか無事に回収成功です☆\u3000いや～、会長さんがいてくれて助かりました～」"
translation = "「『모형 정원』의 로스트 아이템, 어떻게든 무사히 회수 성공이에요☆ 이야~, 회장님이 있어 주셔서 살았어요~」"

[[dialogue]]
speaker = "unk"
original = "この小柄な少女こそが、サチの髪飾りや武器に憑依していたトレジアンナさんの真の姿である。"
translation = "이 아담한 소녀야말로 사치의 머리 장식이나 무기에 빙의해 있던 트레지안나 씨의 진정한 모습이다."

[[dialogue]]
speaker = "unk"
original = "元々はロストアイテム『精神の水晶』に封印されており、最近復活を果たしたトレジアンナさん。"
translation = "본래는 로스트 아이템 『정신의 수정』에 봉인되어 있다가, 최근 부활을 완수한 트레지안나 씨."

[[dialogue]]
speaker = "unk"
original = "その正体は、リクリエでリセットされる１つ前の時代を生きていた、古代の『魔女』である。"
translation = "그 정체는 리크리에로 리셋되기 이전 시대를 살아가던 고대의 『마녀』이다."

[[dialogue]]
speaker = "トレジアンナ"
original = "「それにしても、まさかドールハウス型のロストアイテムとは……。私１人だったら、脱出できなかったかもしれません」"
translation = "「그나저나 설마 돌 하우스형 로스트 아이템이라니……. 저 혼자였다면 탈출하지 못했을지도 몰라요」"

[[dialogue]]
speaker = "？？？"
original = "「なるほど、アレはロストアイテムというのか。実に興味深いネ」"
translation = "「과연, 저것을 로스트 아이템이라 부르는 건가. 실로 흥미롭군」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「えっ！？\u3000あなたは……！」"
translation = "「엣!? 당신은……!」"

[[dialogue]]
speaker = "アニマ"
original = "「腑に落ちたヨ。これまでも学園に不可解な現象が起きていたことには気づいてイタが、会長はキミたちと共に、そのロストアイテムを密かに回収していたというわけだナ」"
translation = "「납득했어. 지금까지도 학원에 불가해한 현상이 일어나고 있다는 건 눈치채고 있었지만, 회장은 너희와 함께 그 로스트 아이템을 남몰래 회수하고 있었다는 소리로군」"

[[dialogue]]
speaker = "unk"
original = "アニマ先輩……！"
translation = "아니마 선배……!"

[[dialogue]]
speaker = "トレジアンナ"
original = "「人払いの魔法を使っているのに、アニマさん、どうやってここに！？」"
translation = "「사람들의 눈을 피하는 마법을 쓰고 있는데, 아니마 씨, 어떻게 여기에!?」"

[[dialogue]]
speaker = "アニマ"
original = "「フヒ♪\u3000ネビュラという組織、そして魔女という存在を知ってから、魔法への対抗策は既に十分に用意済みだトモ」"
translation = "「후히♪ 네뷸라라는 조직, 그리고 마녀라는 존재를 알게 된 이후로 마법에 대한 대항책은 이미 충분히 마련해 두었지」"

[[dialogue]]
speaker = "アニマ"
original = "「例えば、新星学園内で魔力の反応があれば場所を知らせてくれる道具だったり、魔力を無効化する星術だったりネ♪」"
translation = "「예를 들면 신성 학원 내에서 마력 반응이 있으면 장소를 알려주는 도구라거나, 마력을 무효화하는 성술이라거나 말이야♪」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「人払いの魔法は、何度も改修して隠蔽性を高めた自信作だったのですが……それを見破るとは、さすが学園が誇る天才錬金術師ですね」"
translation = "「사람들의 눈을 피하는 마법은 몇 번이나 개수해서 은폐성을 높인 자신작이었는데…… 그걸 간파하시다니 역시 학원이 자랑하는 천재 연금술사시네요」"

[[dialogue]]
speaker = "アニマ"
original = "「十分に対策したにも関わらず、攻略するまでに長らく時間がかかってしまったヨ。そちらこそ大した天才魔法使いダ♪」"
translation = "「충분히 대책을 세웠음에도 불구하고 공략하는 데 꽤 긴 시간이 걸려 버렸어. 그쪽이야말로 대단한 천재 마법사다♪」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「……看破されてしまった以上、ちゃんと説明しておくべきですね」"
translation = "「……간파당한 이상 제대로 설명해 둬야겠네요」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「私はトレジアンナと申します。種族はもうお分かりかと思いますが、魔女で――」"
translation = "「저는 트레지안나라고 합니다. 종족은 이미 아시겠지만 마녀이고──」"

[[dialogue]]
speaker = "アニマ"
original = "「ああ、そこはみなまで言わずとも、ちゃんと理解しているから大丈夫だヨ、トレジアンナ。キミの正体が何にせよ――その心は『魔法少女』なのダロウ？」"
translation = "「아아, 거기는 끝까지 말하지 않아도 충분히 이해하고 있으니까 괜찮아, 트레지안나. 네 정체가 무엇이든── 그 마음은 『마법소녀』인 거잖아?」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「！\u3000アニマさん、あなたは……」"
translation = "「! 아니마 씨, 당신은……」"

[[dialogue]]
speaker = "アニマ"
original = "「それよりも、キミのロマンある自己紹介を聞かせてくれたマエ。アニマが聞きたいのは、そっちの方だからネ」"
translation = "「그것보다 네 로망이 담긴 자기소개를 들려주게나. 아니마가 듣고 싶은 건 그쪽이니까 말이야」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「わかりました。なら、その期待に応えて――変身！」"
translation = "「알겠습니다. 그럼 그 기대에 부응해서── 변신!」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「改めまして！\u3000マジにマジカル☆\u3000凛とリリカル！\u3000華麗にカレイド♪」"
translation = "「다시 한번! 진심으로 매지컬☆ 늠름하게 리리컬! 화려하게 카레이도♪」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「蒐集の魔法少女トレジャー☆アンナ、可愛く参上♪\u3000素敵にステッキ、決めちゃいますよ～！」"
translation = "「수집의 마법소녀 트레저☆안나, 귀엽게 등장♪ 멋지게 스틱, 결정해 버릴게요~!」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「キラッ☆」"
translation = "「반짝☆」"

[[dialogue]]
speaker = "アニマ"
original = "「フヒッ♪\u3000アハハハハ！\u3000素晴らしイ♪\u3000今の名乗りだけで伝わってきたトモ。キミが本気で魔法少女をやってイルということが」"
translation = "「후히♪ 아하하하하! 훌륭해♪ 방금 그 등장 대사만으로도 전해져 왔어. 네가 진심으로 마법소녀를 하고 있다는 사실이」"

[[dialogue]]
speaker = "アニマ"
original = "「ならば、アニマもその本気に応えヨウ。錬金術師の名に誓って、ここに宣言スル。アニマはキミたちの活動や、ロストアイテムのことを決して口外したりしナイと」"
translation = "「그렇다면 아니마도 그 진심에 응해주지. 연금술사의 이름을 걸고 여기 선언한다. 아니마는 너희의 활동이나 로스트 아이템에 대해 결코 발설하지 않겠어」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「アニマさん、ありがとうございます！\u3000これから是非、仲良くして頂けると嬉しいです♪」"
translation = "「아니마 씨, 감사합니다! 앞으로 부디 사이좋게 지내 주시면 기쁠 것 같아요♪」"

[[dialogue]]
speaker = "アニマ"
original = "「ああ、こちらこそダ、トレジアンナ。アニマに協力できることがあれば、なんでも相談してくれたマエ♪」"
translation = "「아아, 나야말로다, 트레지안나. 아니마가 협력할 수 있는 일이 있다면 뭐든 상담해주게나♪」"

[[dialogue]]
speaker = "unk"
original = "そうして、嬉しそうに握手を交わす２人。"
translation = "그렇게 기쁜 듯이 악수를 나누는 두 사람."

[[dialogue]]
speaker = "アニマ"
original = "「そうダ。お近づきの印に、アニマが発明した薬をお１ついかがカナ？」"
translation = "「맞아. 친해진 기념으로 아니마가 발명한 약을 하나 받아보겠나?」"

[[dialogue]]
speaker = "unk"
original = "ふと、コートの内側から怪しい色の液体が入った試験管を取り出すアニマ先輩。"
translation = "문득 코트 안쪽에서 수상한 색의 액체가 든 시험관을 꺼내는 아니마 선배."

[[dialogue]]
speaker = "unk"
original = "ちょっ、なに渡してるんですか！？"
translation = "잠깐, 뭘 건네주는 거예요!?"

[[dialogue]]
speaker = "トレジアンナ"
original = "「ふふふっ、これはまた素敵なコレクションになりそうですね～♪」"
translation = "「후후후, 이건 또 멋진 컬렉션이 될 것 같네요~♪」"

[[dialogue]]
speaker = "unk"
original = "効果がわからないのに嬉しそう！？"
translation = "효과도 모르는데 기뻐 보여!?"

[[dialogue]]
speaker = "トレジアンナ"
original = "「私、実は昔から、三界の不思議な薬をコレクションしてるんですよ～。ほら、アニマさんが作ったものなら、文句なくコレクション級ですし☆」"
translation = "「저, 사실 예전부터 삼계의 신비한 약을 수집하고 있거든요~. 보세요, 아니마 씨가 만든 거라면 두말할 것 없이 컬렉션급이니까요☆」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「あっ、ちなみにいつでも飲めるように、決して中身が劣化しない魔法のケースに保管しておきますから、大丈夫ですよ♪」"
translation = "「아, 참고로 언제든 마실 수 있게 내용물이 절대 열화되지 않는 마법 케이스에 보관해 둘 테니까 괜찮아요♪」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「というわけで、アニマさん、薬の効果は後でじっくり魔法で分析しておきますね～☆」"
translation = "「그런 고로 아니마 씨, 약의 효과는 나중에 느긋하게 마법으로 분석해 둘게요~☆」"

[[dialogue]]
speaker = "アニマ"
original = "「フッ……フフッ♪\u3000フヒヒッ♪\u3000面白イ！\u3000まさか、アニマの薬を拒否するのではなく保存するとは……！」"
translation = "「훗…… 후후♪ 후히히♪ 재밌어! 설마 아니마의 약을 거부하는 게 아니라 보존하다니……!」"

[[dialogue]]
speaker = "アニマ"
original = "「そんなことを言ったのは、トレジアンナ、キミが初めてだヨ♪」"
translation = "「그런 말을 한 건 트레지안나, 네가 처음이야♪」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「いや～、実は私、『蒐集癖』があるんですよ～」"
translation = "「이래 봬도 사실 제가 『수집벽』이 좀 있거든요~」"

[[dialogue]]
speaker = "トレジアンナ"
original = "「あっ。よかったら、他にもどんな薬があるか、コレクション見てみますか？」"
translation = "「앗. 괜찮으시면 다른 약들은 또 어떤 게 있는지 컬렉션 보실래요?」"

[[dialogue]]
speaker = "unk"
original = "それから、今日話したのが初めてとは思えない程、和気あいあいと盛り上がる２人なのであった――"
translation = "그 뒤로 오늘 처음 대화했다는 사실이 믿기지 않을 정도로 화기애애하게 달아오르는 두 사람이었다──"

