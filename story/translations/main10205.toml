[[dialogue]]
speaker = "unk"
original = "第５話,湖を護る魔女,B"
translation = "제5화, 호수를 지키는 마녀"

[[dialogue]]
speaker = "せつな"
original = "「しかし、先ほどは手裏剣を反射してきたでござる。せつなたちの攻撃が、まるっと返ってきたりはしないでござろうか？」"
translation = "「하지만 아까는 수리검을 반사했소. 소인들의 공격이 통째로 되돌아오지는 않겠소?」"

[[dialogue]]
speaker = "ヨミ"
original = "「イの一番に手裏剣を投げた人とは思えない慎重さですね」"
translation = "「가장 먼저 수리검을 던진 사람이라고는 믿기지 않는 신중함이네요.」"

[[dialogue]]
speaker = "美鶴"
original = "「手裏剣１個じゃ軽すぎたんでしょ。３人がかりの一斉攻撃なら絶対に割れるって」"
translation = "「수리검 한 개로는 너무 가벼웠던 거겠지. 셋이서 일제 공격하면 분명 깨질 거야.」"

[[dialogue]]
speaker = "せつな"
original = "「ええ～……本当でござるか～？」"
translation = "「에에~…… 정말이오~?」"

[[dialogue]]
speaker = "美鶴"
original = "「まあ、反射されたらその時はその時で。うっかり全滅しちゃったらごめんねー」"
translation = "「뭐, 반사되면 그때 가서 생각하고. 실수로 전멸해 버리면 미안해─.」"

[[dialogue]]
speaker = "ヨミ"
original = "「いきあたりばったりな上に軽いですね！？」"
translation = "「무계획인 데다 너무 가볍잖아요!?」"

[[dialogue]]
speaker = "美鶴"
original = "「それじゃ、行くよ。揃えて。ごー・よーん・さーん」"
translation = "「그럼 간다. 맞춰서. 다섯, 넷, 셋.」"

[[dialogue]]
speaker = "ヨミ"
original = "「こやぁっ！？\u3000せめてテンカウントでお願いしますよぉ！\u3000にー！」"
translation = "「코얏!? 적어도 열까지는 세주세요! 둘!」"

[[dialogue]]
speaker = "せつな"
original = "「１個で足りぬなら１００個放つまで！\u3000いーち！」"
translation = "「한 개로 부족하다면 백 개를 날릴 뿐! 하나!」"

[[dialogue]]
speaker = "美鶴"
original = "「ぜーろっ」"
translation = "「제로.」"

[[dialogue]]
speaker = "せつな"
original = "「紫電旋風！」"
translation = "「자전선풍!」"

[[dialogue]]
speaker = "ヨミ"
original = "「爆烈鈴音！」"
translation = "「폭렬영음!」"

[[dialogue]]
speaker = "美鶴"
original = "「<ruby>鶴の一貫<rt>つるのつらぬき</rt></ruby>」"
translation = "「학의 일관」"

[[dialogue]]
speaker = "美鶴"
original = "「よーし、手応えあり。２人の攻撃、つよつよだね」"
translation = "「좋아, 손맛 있네. 둘의 공격, 엄청 강하네.」"

[[dialogue]]
speaker = "せつな"
original = "「ふふん、こう見えて、これまで無数の修羅場を潜ってるでござる」"
translation = "「후훈, 이래 보여도 지금까지 수많은 사선을 넘었소.」"

[[dialogue]]
speaker = "ヨミ"
original = "「入学した頃と比べたら、随分と強くなってますから」"
translation = "「입학했을 때와 비교하면 상당히 강해졌으니까요.」"

[[dialogue]]
speaker = "ヨミ"
original = "「見た目は特に変わってなさそうですけど、鏡が割れたような音がしましたね」"
translation = "「겉모습은 딱히 변한 게 없어 보이지만 거울이 깨지는 듯한 소리가 났네요.」"

[[dialogue]]
speaker = "せつな"
original = "「おおっ、無限ループがなくなってるでござる！\u3000これで迷子の心配はなくなりそうですな！」"
translation = "「오오, 무한 루프가 사라졌소! 이제 길을 잃을 걱정은 없겠구려!」"

[[dialogue]]
speaker = "ヨミ"
original = "「安心するのは早いですよ。<ruby>鏡界の湖<rt>ラーゴ・シエロ</rt></ruby>にはまだ辿り着けていないんですから」"
translation = "「안심하긴 일러요. <ruby>경계의 호수<rt>라고 시에로</rt></ruby>에는 아직 도착하지 못했으니까요.」"

[[dialogue]]
speaker = "美鶴"
original = "「そゆことよね。結界を張っていたのが何者かも突き止めないといけないだろうし……」"
translation = "「그 말대로야. 결계를 치고 있었던 게 누구인지도 알아내야 할 테고……」"

[[dialogue]]
speaker = "せつな"
original = "「承知したでござる！\u3000気を引き締めて、先へ進むでござるよ！」"
translation = "「알겠소! 마음을 다잡고 앞으로 나아갑시다!」"

[[dialogue]]
speaker = "せつな"
original = "「なんとも煌びやかな湖が見えてきたでござる。ひとっ走り、様子を見て──にゃん？」"
translation = "「참으로 휘황찬란한 호수가 보이기 시작했소. 한달음에 가서 상황을── 냥?」"

[[dialogue]]
speaker = "美鶴"
original = "「せつな、ちょい待ち。２人とも警戒態勢」"
translation = "「세츠나, 잠깐 기다려. 둘 다 경계 태세.」"

[[dialogue]]
speaker = "美鶴"
original = "「そこにいるの、誰。出てきなよ」"
translation = "「거기 있는 거 누구야. 나오라고.」"

[[dialogue]]
speaker = "ヨミ"
original = "「え……人の気配なんて──」"
translation = "「에…… 사람 기척 같은 건──」"

[[dialogue]]
speaker = "？？？"
original = "「よく気づきましたね」"
translation = "「잘 알아챘군요.」"

[[dialogue]]
speaker = "せつな"
original = "「ひゃ！？\u3000幽霊かと思ったでござる！」"
translation = "「히약!? 유령인 줄 알았소!」"

[[dialogue]]
speaker = "？？？"
original = "「随分なご挨拶ですね。せっかく張った結界を壊してしまうなんて……並々ならぬコストがかかっているんですよ？」"
translation = "「참 심한 인사군요. 애써 친 결계를 부숴버리다니…… 상당한 비용이 들었다고요?」"

[[dialogue]]
speaker = "ヨミ"
original = "「あなたが結界を張った術士……どうしてこんなことをしたんです？」"
translation = "「당신이 결계를 친 술사…… 어째서 이런 짓을 한 거죠?」"

[[dialogue]]
speaker = "？？？"
original = "「わざわざご丁寧に、お話する必要がありますか？」"
translation = "「일일이 친절하게 이야기할 필요가 있을까요?」"

[[dialogue]]
speaker = "美鶴"
original = "「冥途の土産に話してくれてもいいじゃん。メイドはうちらの方だけど」"
translation = "「저승길 선물로 이야기해 줘도 되잖아. 메이드는 우리 쪽이지만.」"

[[dialogue]]
speaker = "？？？"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "せつな"
original = "「おや？\u3000もしや先方には伝わっていないでござるか？」"
translation = "「어라? 혹시 상대방에게는 전달되지 않은 것이오?」"

[[dialogue]]
speaker = "美鶴"
original = "「いや、ふつーにスルーされただけでしょ。そもそも話してくれるとも思ってないし」"
translation = "「아니, 그냥 씹힌 거겠지. 애초에 말해줄 거라고 생각지도 않았고.」"

[[dialogue]]
speaker = "美鶴"
original = "「第一、こんなトコに結界張って陣取ってるヤツが、うちらと仲良くするつもりなんてないだろーしね」"
translation = "「무엇보다 이런 곳에 결계 치고 자리 잡고 있는 녀석이 우리랑 사이좋게 지낼 생각 따위 없을 테니까 말이야.」"

[[dialogue]]
speaker = "美鶴"
original = "「うちらをオジャマするってコトは……あんたが<ruby>鏡界の湖<rt>ラーゴ・シエロ</rt></ruby>を守ってるボスキャラでいいのかな？」"
translation = "「우리를 방해한다는 건…… 당신이 <ruby>경계의 호수<rt>라고 시에로</rt></ruby>를 지키는 보스 캐릭터라고 봐도 될까?」"

[[dialogue]]
speaker = "？？？"
original = "「ボスキャラ……まぁそれでいいでしょう」"
translation = "「보스 캐릭터…… 뭐, 그렇게 부르셔도 좋겠죠.」"

[[dialogue]]
speaker = "湖の魔女"
original = "「私は<ruby>鏡界の湖<rt>ラーゴ・シエロ</rt></ruby>を守護する魔女。この先に進みたければ、私を倒すしかありません」"
translation = "「나는 <ruby>경계의 호수<rt>라고 시에로</rt></ruby>를 수호하는 마녀. 이 앞으로 나아가고 싶다면 나를 쓰러뜨리는 수밖에 없습니다.」"

[[dialogue]]
speaker = "湖の魔女"
original = "「ボスらしく、取り巻きも呼んでおきましょうか──出なさい」"
translation = "「보스답게 부하들도 불러둘까요── 나오렴.」"

[[dialogue]]
speaker = "鏡像"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "せつな"
original = "「なんと！？\u3000いったいどこに潜んでたでござるか！？\u3000さては隠れ蓑の術でござるな！？」"
translation = "「이럴 수가!? 대체 어디에 숨어 있었소!? 필시 은신술이구려!?」"

[[dialogue]]
speaker = "美鶴"
original = "「この子たち、血が通った人間じゃないね。魔女さんお得意の鏡を利用した……鏡像ってトコ？」"
translation = "「이 아이들, 피가 흐르는 인간이 아니네. 마녀 씨 전매특허인 거울을 이용한…… 경상이라는 건가?」"

[[dialogue]]
speaker = "湖の魔女"
original = "「ご名答です。聡明ですね」"
translation = "「정답입니다. 총명하시군요.」"

[[dialogue]]
speaker = "湖の魔女"
original = "「私の同僚を写した鏡像です。複製品とはいえ、戦闘力は本人にも負けず劣らず。侮ったら痛い目を見ますよ」"
translation = "「제 동료들을 비춘 경상입니다. 복제품이라고는 해도 전투력은 본인에게도 뒤지지 않죠. 얕봤다간 큰코다칠 거예요.」"

[[dialogue]]
speaker = "湖の魔女"
original = "「こちらも３人、あなたたちも３人。戦うならちょうどいいでしょう」"
translation = "「이쪽도 세 명, 당신들도 세 명. 싸우기엔 딱 좋겠죠.」"

[[dialogue]]
speaker = "せつな"
original = "「やるしかないでござるっ！」"
translation = "「할 수밖에 없소!」"

[[dialogue]]
speaker = "ヨミ"
original = "「やりましょう、美鶴さん！」"
translation = "「해봐요, 미츠루 씨!」"

[[dialogue]]
speaker = "美鶴"
original = "「真っ向から出会っちゃったからには、しゃーない。やったりますか」"
translation = "「정면으로 마주쳐버린 이상 어쩔 수 없지. 한판 붙어볼까.」"

