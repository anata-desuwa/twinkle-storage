[[dialogue]]
speaker = "unk"
original = "第２話,思わぬ再会,P"
translation = "제2화, 뜻밖의 재회, P"

[[dialogue]]
speaker = "unk"
original = "今日は魔法の指導のために、ネビュラの魔女に来てもらっている。"
translation = "오늘은 마법 지도를 위해, 네뷸라의 마녀를 모셨다."

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「では教えたように、目をつぶってみてください」"
translation = "「그럼 가르쳐 준 대로, 눈을 감아 보세요」"

[[dialogue]]
speaker_original = "コハルコ（覚醒）"
speaker_translation = "쿠하루코(각성)"
original = "「……なるほど。魔法なら直接、ドローンと視界を共有できるんですね。今までモニター越しだったから新鮮な感じです」"
translation = "「……과연. 마법이라면 직접 드론과 시야를 공유할 수 있군요. 지금까지는 모니터 너머였으니까 신선한 느낌이에요」"

[[dialogue]]
speaker = "unk"
original = "俺の周りを球体の小型ドローン──通称アイドローンが旋回する。これを通して俺を見ているようだ。"
translation = "내 주위를 구체형 소형 드론── 통칭 아이드론이 선회한다. 이것을 통해 나를 보고 있는 모양이다."

[[dialogue]]
speaker = "unk"
original = "コハルコさんの覚醒によって、ドローンは魔法にも対応した<ruby>ファミリア<rt>使い魔</rt></ruby>・ドローンとなっていた。"
translation = "쿠하루코 씨의 각성에 의해, 드론은 마법에도 대응하는 <ruby>사역마<rt>파밀리어</rt></ruby> 드론이 되어 있었다."

[[dialogue]]
speaker_original = "コハルコ（覚醒）"
speaker_translation = "쿠하루코(각성)"
original = "「ふふっ。会長さん、また寝ぐせがついてる。あとで直そうね」"
translation = "「후후. 회장님, 또 머리가 까치집이 됐어. 나중에 정리해 줄게」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「魔法は応用によって様々なことができます。あなたなら上手く使いこなせるでしょう」"
translation = "「마법은 응용에 따라 다양한 일을 할 수 있습니다. 당신이라면 잘 다룰 수 있겠죠」"

[[dialogue]]
speaker_original = "コハルコ（覚醒）"
speaker_translation = "쿠하루코(각성)"
original = "「ありがとうございます。イニシュさんにそう言ってもらえると嬉しいですね」"
translation = "「감사합니다. 이니슈 씨에게 그런 말을 들으니 기쁘네요」"

[[dialogue]]
speaker = "unk"
original = "ふたりは知り合い？"
translation = "두 분은 아는 사이인가요?"

[[dialogue]]
speaker_original = "コハルコ（覚醒）"
speaker_translation = "쿠하루코(각성)"
original = "「知り合い、というか常連さんかな。うちのパーツショップのお客さんなんだ」"
translation = "「아는 사이라기보다, 단골손님이랄까. 우리 부품 샵의 손님이야」"

[[dialogue]]
speaker_original = "コハルコ（覚醒）"
speaker_translation = "쿠하루코(각성)"
original = "「イニシュさんが魔女だって知ったのはけっこう後だったかな。よく来てくれるからプロゲーマーさんかと思った」"
translation = "「이니슈 씨가 마녀라는 걸 안 건 꽤 나중이었나. 자주 오시니까 프로게이머인 줄 알았어」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「私のゲーミングＰＣは彼女が<ruby>組立<rt>アセン</rt></ruby>したものです。いつも頼りにしています」"
translation = "「제 게이밍 PC는 그녀가 조립한 것입니다. 항상 의지하고 있습니다」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「初代光の魔女であるディアナには助けられました。特殊な形とはいえ、あなたもその系譜に連なる者であるならば、ここでその恩を返しましょう」"
translation = "「초대 빛의 마녀인 디아나에게 도움을 받았습니다. 특수한 형태라고는 해도, 당신도 그 계보를 잇는 자라면, 여기서 그 은혜를 갚도록 하죠」"

[[dialogue]]
speaker_original = "イニシュ"
speaker_translation = "이니슈"
original = "「なので訓練は厳しくします。それがあなたのためになりますから」"
translation = "「그러니 훈련은 엄격하게 하겠습니다. 그것이 당신을 위한 길이니까요」"

[[dialogue]]
speaker_original = "コハルコ（覚醒）"
speaker_translation = "쿠하루코(각성)"
original = "「はい！\u3000胸を借りるつもりで──行きます！」"
translation = "「네! 한 수 배운다는 마음으로── 갑니다!」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「疲れた～。会長さん、また訓練に付き合わせちゃってごめんね」"
translation = "「지쳤다~. 회장님, 또 훈련에 어울리게 해서 미안해」"

[[dialogue]]
speaker = "unk"
original = "いえ、俺が一緒にいたいだけなので"
translation = "아뇨, 제가 같이 있고 싶을 뿐이니까요"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「ふふ、ありがとう。会長さんのそういうところ、好きだな」"
translation = "「후후, 고마워. 회장님의 그런 점, 좋아해」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「お腹も空いたし、何か軽く食べようか。すみませーん」"
translation = "「배도 고픈데, 뭐 가볍게 먹을까. 저기요─」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「はい、いらっしゃいませ」"
translation = "「네, 어서 오세요」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「フライドチキンふたつくださ……あぁーーーーーーーっ！」"
translation = "「프라이드치킨 두 개 주세…… 아아ㅡㅡㅡㅡㅡㅡㅡㅡ앗!」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「ト、トリュファイナさん！？\u3000どうしてこんなところに！？」"
translation = "「트, 트류파이나 씨!? 어떻게 이런 곳에!?」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「ふふふ。実は私、ここで働いているのです。フライドチキンもうまく揚げられるようになったのですよ！」"
translation = "「후후후. 사실 저, 여기서 일하고 있답니다. 프라이드치킨도 맛있게 튀길 수 있게 되었어요!」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「いえ、チキンのことは聞いてないんですが……ちょっと、アニマさーん！」"
translation = "「아니, 치킨 얘기는 묻지 않았는데요…… 저기, 아니마 씨ㅡ!」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「おや、コハルコと会長ではないカ。新人店員が何か失礼したなら申し訳ナイ」"
translation = "「오야, 쿠하루코와 회장 아닌가. 신입 점원이 뭔가 실례했다면 미안하군」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「いや、そうじゃなくて……トリュファイナさん……魔女の偉い人がどうしてここに？」"
translation = "「아니, 그게 아니라…… 트류파이나 씨…… 마녀의 높은 분이 어째서 여기에?」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「彼女は肉体の死後、魂が現世にとどまっていたらしい。アニマは彼女に義体を提供しただけダ。その恩返しとして購買を手伝ってもらっている」"
translation = "「그녀는 육체가 죽은 뒤, 영혼이 현세에 머물고 있었던 모양이다. 아니마는 그녀에게 의체를 제공했을 뿐이다. 그 보답으로 매점 일을 도와주고 있지」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「えぇ……魔女の人たちには知られないように気を付けなきゃ」"
translation = "「에에…… 마녀 사람들에게는 들키지 않도록 조심해야겠네」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「アニマ様、少し休憩をいただいてもよろしいでしょうか？」"
translation = "「아니마 님, 잠시 휴식을 가져도 괜찮을까요?」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「構わないトモ。行ってきたまえ」"
translation = "「상관없다네. 다녀오게나」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「はい、ありがとうございます。ではコハルコさん、少しお話ししましょうか。魔王様もどうかご一緒に」"
translation = "「네, 감사합니다. 그럼 쿠하루코 씨, 잠시 이야기 좀 할까요. 마왕님도 부디 함께」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「コハルコさんはあれからお元気でしたか？」"
translation = "「쿠하루코 씨는 그동안 잘 지내셨나요?」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「はい。トリュファイナさんも……あなたは、私が会ったトリュファイナさんでいいんですよね？」"
translation = "「네. 트류파이나 씨도…… 당신은, 제가 만났던 트류파이나 씨가 맞는 거죠?」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「ええ。あなたのことはちゃんと覚えていますよ」"
translation = "「네. 당신에 대해서는 잘 기억하고 있어요」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「いくつか聞きたいことがあって……魔力に目覚めてから変わったことがあるんです」"
translation = "「몇 가지 묻고 싶은 게 있어서…… 마력에 눈을 뜨고 나서 변한 게 있어요」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「お母さんの体調が急に良くなって、たまたまかと思ったんですけど、お父さんも肩こりしなくなったらしくて」"
translation = "「엄마의 컨디션이 갑자기 좋아져서, 우연인가 싶었는데, 아빠도 어깨 결림이 없어졌다고 하더라고요」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「私の力だと思います。今のあなたからは微弱な回復の魔力が常に出ているのです」"
translation = "「제 힘이라고 생각해요. 지금의 당신에게서는 미약한 회복 마력이 항상 나오고 있거든요」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「私も睡眠時間が短くても平気になったんです。この前なんか徹夜でエ……ゲームしてもへっちゃらで」"
translation = "「저도 수면 시간이 짧아도 멀쩡해졌어요. 요전번에는 밤새도록 에…… 게임을 해도 끄떡없어서」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「それも私の力ですが、ちゃんと寝てください！\u3000お体に障りますっ！」"
translation = "「그것도 제 힘이지만, 잠은 제대로 자야 해요! 몸 상한다고요!」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「じゃあ、私のみんなを加速させる術も……」"
translation = "「그럼, 제 모두를 가속시키는 술법도……」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「……何ですか、それ……加速なんて知りません、よ？」"
translation = "「……그게 뭔가요…… 가속 같은 건 모릅니다, 만?」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「え」"
translation = "「에」"

[[dialogue]]
speaker = "unk"
original = "コハルコさんの星術は味方に最適化を促し、行動速度を上昇させる……のだが、その万能さはもはや最適化の域を遥かに超えている。"
translation = "쿠하루코 씨의 성술은 아군에게 최적화를 촉구하여, 행동 속도를 상승시킨다…… 하지만, 그 만능함은 이제 최적화의 영역을 훨씬 초월해 있다."

[[dialogue]]
speaker = "unk"
original = "もしかすると、無意識のうちに何か魔法を使っていたのではとも思っていたが、そうでもないらしい。"
translation = "혹시 무의식중에 무언가 마법을 쓰고 있었던 건 아닐까 생각하기도 했지만, 그렇지도 않은 모양이다."

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「コハルコさん。人と違う生まれでも、誰かと同じ力を与えられようとも……あなたはあなたなのです。気にすることはありません」"
translation = "「쿠하루코 씨. 남과 다른 태생이라도, 누군가와 같은 힘을 부여받았더라도…… 당신은 당신입니다. 신경 쓸 것 없어요」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「トリュファイナさん……」"
translation = "「트류파이나 씨……」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「歓談中失礼。少しいいカナ？\u3000コハルコ、ちょうどいい機会だからトリュファイナにＤＩＳＣの使い方を教えてやってくれ。アニマは人に教えるのは苦手でナ」"
translation = "「담소 중에 실례. 잠시 괜찮을까? 쿠하루코, 마침 좋은 기회니까 트류파이나에게 DISC 사용법을 가르쳐 주게나. 아니마는 남을 가르치는 건 서툴러서 말이지」"

[[dialogue]]
speaker_original = "アニマ"
speaker_translation = "아니마"
original = "「サーシャやシルヴィを始め、多くの天使や魔族にＤＩＳＣの使い方を叩き込んできたキミならできるサ。では頼んだゾ」"
translation = "「사샤나 실비를 비롯해, 많은 천사와 마족에게 DISC 사용법을 주입해 온 자네라면 할 수 있을 거다. 그럼 부탁하네」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「え、そんな急に言われても……」"
translation = "「에, 그렇게 갑자기 말씀하셔도……」"

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「コハルコさんが教えてくださるなら百人力です！\u3000どうかご指導お願いします！」"
translation = "「쿠하루코 씨가 가르쳐 주신다면 백인대장입니다! 부디 지도 부탁드립니다!」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「……はい。私でよければ」"
translation = "「……네. 저라도 괜찮다면」"

[[dialogue]]
speaker = "unk"
original = "眼をキラキラさせるトリュファイナさんに抗えるはずもなく、つきっきりでＤＩＳＣの使い方を教えるコハルコさんだった。"
translation = "눈을 반짝이는 트류파이나 씨를 거절할 수 있을 리도 없어, 꼭 붙어서 DISC 사용법을 가르치는 쿠하루코 씨였다."

[[dialogue]]
speaker_original = "トリュファイナ"
speaker_translation = "트류파이나"
original = "「コハルコさん、どうしましょう！\u3000画面いっぱいに女の子が……」"
translation = "「쿠하루코 씨, 어쩌죠! 화면 가득 여자아이가……」"

[[dialogue]]
speaker_original = "コハルコ"
speaker_translation = "쿠하루코"
original = "「それはエッチな広告だから踏んじゃダメ～！」"
translation = "「그건 야한 광고니까 밟으면 안 돼~!」"

