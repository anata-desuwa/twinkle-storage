[[dialogue]]
speaker = "unk"
original = "第４話,ファンシー・メルトダウン・後編,P"
translation = "제4화, 팬시 멜트다운 후편"

[[dialogue]]
speaker = "unk"
original = "メルエルへのお礼ということで始まった、『放課後デート』の中で──"
translation = "메르엘에 대한 보답으로 시작된 『방과 후 데이트』 도중──"

[[dialogue]]
speaker = "unk"
original = "俺たちは不意に握りあった手を、いつまでも繋ぎ合ったまま……何かを誤魔化すかのように、他愛のない話に花を咲かせて続けていた。"
translation = "우리는 뜻밖에 맞잡은 손을 언제까지고 놓지 않은 채…… 무언가를 얼버무리듯 시시콜콜한 이야기꽃을 계속 피웠다."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「さっきのカフェのケーキ、美味しかったね。あんなに美味しいと、何度でも食べたくなっちゃうよ～」"
translation = "「아까 카페 케이크 맛있었지. 그렇게 맛있으면 몇 번이라도 먹고 싶어져~」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「──え、また一緒に？\u3000……うんっ、約束だよ♪\u3000会長くんっ」"
translation = "「──어, 또 같이? ……응, 약속이야♪ 회장군.」"

[[dialogue]]
speaker = "unk"
original = "（そうだ、メルエルとの約束が、俺にはまだ……）"
translation = "(맞다, 메르엘과의 약속이 나에게는 아직……)"

[[dialogue]]
speaker = "unk"
original = "（約束……）"
translation = "(약속……)"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「──あのね、もう１つヤクソクしたいことがあって。キミもわたしのこと、スキだっていってくれたでしょ？」"
translation = "「──저기, 또 하나 약속하고 싶은 게 있어. 너도 나 좋아한다고 해줬지?」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「だから、もしわたしたちがおおきくなって、それでもまだスキだったときは──」"
translation = "「그러니까 만약 우리가 어른이 되어서도 여전히 좋아할 때는──」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「わ、わたしと……ケッコンしてほしいの！」"
translation = "「나, 나랑…… 결혼해줬으면 좋겠어!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「会長くん、急に立ち止まって、どうかしたの？」"
translation = "「회장군, 갑자기 멈춰 서서 왜 그래?」"

[[dialogue]]
speaker = "unk"
original = "うん。やらなきゃいけないことを、思い出したんだ"
translation = "응. 해야 할 일이 생각났어."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「──これから大聖堂に行く？\u3000うん、それはもちろんいいけど……」"
translation = "「──지금부터 대성당에 가자고? 응, 그건 물론 좋지만……」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「ここに２人で来るのは１０年ぶりだね～。私は今でもミサには参加するけど、キミと一緒だと急に懐かしい感じがするよ。ふふっ、ちょっと不思議♪」"
translation = "「여기에 둘이서 오는 건 10년 만이네~. 나는 지금도 미사에 참가하지만, 너와 함께니까 갑자기 그리운 느낌이 들어. 후훗, 조금 신기해♪」"

[[dialogue]]
speaker = "unk"
original = "ここで、新星学園で再会する約束をしたんだよな"
translation = "여기서 신성학원에서 다시 만나기로 약속했었지."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「うん。天界に帰る日に、キミとここで話をしたんだよ。キミと初めて出会ったのもこの場所で……私にとっては大切な場所なんだ」"
translation = "「응. 천계로 돌아가는 날, 너와 여기서 이야기를 나눴어. 너와 처음 만난 것도 이 장소고…… 나에게는 소중한 장소야.」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「そうだ、会長くんもまた今度、ミサに参加してみる？\u3000それで、また昔のことを思い出せたら──」"
translation = "「맞다, 회장군도 다음에 또 미사에 참가해 볼래? 그래서 다시 옛날 일을 떠올릴 수 있다면──」"

[[dialogue]]
speaker = "unk"
original = "思い出したんだ"
translation = "떠올렸어."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「ふぇ？」"
translation = "「헤?」"

[[dialogue]]
speaker = "unk"
original = "メルエルと交わした、もう１つの約束のこと"
translation = "메르엘과 나누었던 또 하나의 약속 말이야."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「……！\u3000あ、そか。だから、ここに……」"
translation = "「……! 아, 그렇구나. 그래서 여기에……」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「えっ。でも待って、待ってっ！\u3000まだ私、心の準備が──」"
translation = "「엣. 하지만 잠깐만, 잠깐만! 아직 나, 마음의 준비가──」"

[[dialogue]]
speaker = "unk"
original = "メルエル、聞いて欲しい"
translation = "메르엘, 들어줬으면 좋겠어."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「ひ、ひゃい……！\u3000あぅぅ、か、噛んじゃった……」"
translation = "「히, 히익……! 아으으, 혀, 혀 깨물었다……」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あ、でもひょっとして、約束を勘違いしてたりとか……」"
translation = "「아, 하지만 혹시 약속을 착각하고 있다거나……」"

[[dialogue]]
speaker = "unk"
original = "結婚の約束、だよな……？"
translation = "결혼 약속, 맞지……?"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「勘違いじゃなかった……！」"
translation = "「착각이 아니었어……!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「い、いやでも、大きくなっても、まだ好きだったらって条件が……」"
translation = "「아, 아니 하지만 어른이 되어서도 여전히 좋아한다면이라는 조건이……」"

[[dialogue]]
speaker = "unk"
original = "……俺は、メルエルのことが好きだ"
translation = "……나는 메르엘이 좋아."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「っ……！」"
translation = "「윽……!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あ、えっと……その……」"
translation = "「아, 저기…… 그……」"

[[dialogue]]
speaker = "unk"
original = "メルエルの答え、聞いてもいい？"
translation = "메르엘의 대답, 들어도 될까?"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「は、はい……私も、好きです。……大好き」"
translation = "「네…… 저도 좋아해요. ……정말 좋아해.」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「１０年前、初めて会った時からずっと……。再会してからはもっと──キミのことが、大好きでしたっ」"
translation = "「10년 전 처음 만났을 때부터 계속……. 재회하고 나서는 더── 네가 정말 좋았어.」"

[[dialogue]]
speaker = "unk"
original = "俺と付き合って欲しい"
translation = "나와 사귀어 줬으면 좋겠어."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「う、うん……っ。こちらこそ、よろしくお願いします！」"
translation = "「으, 응……! 저야말로 잘 부탁드립니다!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「私を、キミの彼女にして下さい……！」"
translation = "「저를 네 여자친구로 삼아주세요……!」"

[[dialogue]]
speaker = "unk"
original = "こうして、俺とメルエルは付き合うことになった。"
translation = "그렇게 나와 메르엘은 사귀게 되었다."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「えへへ<emoji=heart04>\u3000ぎゅ～♪\u3000すりすり～♪」"
translation = "「에헤헤<emoji=heart04> 꼬옥~♪ 부비부비~♪」"

[[dialogue]]
speaker = "unk"
original = "そ、そこまでくっ付かれると、照れるんだけど……"
translation = "그, 그렇게까지 달라붙으면 부끄러운데……"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「だってだって！\u3000キミと念願の恋人になったんだもん♪\u3000これまで我慢してた分、いっぱいくっ付いて、いっぱいイチャイチャしちゃうんだから<emoji=heart04>」"
translation = "「그치만 그치만! 너와 염원하던 연인이 된걸♪ 그동안 참았던 만큼 잔뜩 달라붙고 잔뜩 꽁냥거릴 거니까<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「それともキミは、暑苦しいのは嫌だったりする？\u3000それだったら、恋人の私もちゃんと自重する……」"
translation = "「아니면 너는 숨 막히는 건 싫어? 그렇다면 연인인 나도 제대로 자제할게……」"

[[dialogue]]
speaker = "unk"
original = "……俺もくっ付きたい"
translation = "……나도 달라붙고 싶어."

[[dialogue]]
speaker = "unk"
original = "ごめん。慣れなくて照れ臭かっただけ。"
translation = "미안. 익숙하지 않아서 쑥스러웠을 뿐이야."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「えへへ、良かった。好き……♪」"
translation = "「에헤헤, 다행이다. 좋아해……♪」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あ……会長くん……」"
translation = "「아…… 회장군……」"

[[dialogue]]
speaker = "unk"
original = "（メルエルにキスをする）"
translation = "(메르엘에게 키스한다)"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「ん……大好き<emoji=heart04>」"
translation = "「음…… 정말 좋아해<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は溢れるような愛おしい気持ちを胸に、メルエルと初めてのキスを交わすのだった。"
translation = "나는 넘쳐흐르는 듯한 사랑스러운 마음을 가슴에 품고 메르엘과 첫 키스를 나누었다."

