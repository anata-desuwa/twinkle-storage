[[dialogue]]
speaker = "unk"
original = "第３話,不知火ヒトリは百合オタクである,P"
translation = "제3화, 시라누이 히토리는 백합 오타쿠다, P"

[[dialogue]]
speaker = "unk"
original = "──星徒会の用事が片付き、手持ち無沙汰になったので街をパトロールしていた。"
translation = "──성도회 업무가 마무리되어, 한가해진 참에 마을을 순찰하고 있었다."

[[dialogue]]
speaker = "アナ"
original = "「……こんな暇ができるとは思ってもみませんでした。前会長の時には、仕事が終わって暇になるなんて瞬間はありえませんでしたから」"
translation = "「……이런 여유가 생길 줄은 몰랐네요. 전 회장님 때는 일이 끝나서 한가해지는 순간 따위 있을 수 없었으니까요.」"

[[dialogue]]
speaker = "アナ"
original = "「ん……あそこにいるのは、不知火さんじゃないですか」"
translation = "「음…… 저기 있는 건 시라누이 씨 아닌가요.」"

[[dialogue]]
speaker = "ヒトリ"
original = "「か、買っちゃった……ゆーちゃん、買っちゃったよ、わたしっ……！」"
translation = "「사, 사버렸어…… 유ー짱, 사버렸어, 내가……!」"

[[dialogue]]
speaker = "ヒトリ"
original = "「こ、これ、話題になってたちょっと過激なやつだよね……！\u3000どどど、どうしよう、読む前から緊張してきたよ……っ」"
translation = "「이, 이거 화제가 됐던 조금 과격한 녀석이지……! 어어어, 어쩌지, 읽기 전부터 긴장되기 시작했어……!」"

[[dialogue]]
speaker = "アナ"
original = "「……確かに、ゆーちゃんが見えていないと、独り言を言っているようにしか見えないですね」"
translation = "「……확실히, 유ー짱이 보이지 않으면 혼잣말을 하는 것처럼밖에 안 보이네요.」"

[[dialogue]]
speaker = "unk"
original = "言わないであげて"
translation = "말하지 말아 줘."

[[dialogue]]
speaker = "アナ"
original = "「お疲れ様です、不知火さん。本屋から出てきたようですが、参考書か何かを？」"
translation = "「수고 많으십니다, 시라누이 씨. 서점에서 나온 모양인데, 참고서나 뭔가인가요?」"

[[dialogue]]
speaker = "ヒトリ"
original = "「ひ、ひぁっ！？！？\u3000あ、あああ、アナさんっ！？\u3000ど、どうしてここに！？」"
translation = "「히익!?!? 아, 아아아, 아나 씨!? 어, 어째서 여기에!?」"

[[dialogue]]
speaker = "アナ"
original = "「星徒会の仕事がひと段落したのでパトロール中です。会長もいます」"
translation = "「성도회 업무가 일단락되어 순찰 중입니다. 회장도 있어요.」"

[[dialogue]]
speaker = "ヒトリ"
original = "「か、会長さんも……っ、えっと、えっと、こ、これは、違くて、ふ、不純な気持ちで買ったわけじゃなくて、本当にっ」"
translation = "「회, 회장님도……! 에또, 에또, 이, 이건 그게 아니라, 부, 불순한 기분으로 산 게 아니라, 정말로!」"

[[dialogue]]
speaker = "アナ"
original = "「なるほど、漫画ですか」"
translation = "「과연, 만화입니까.」"

[[dialogue]]
speaker = "ヒトリ"
original = "「うっ……そ、そうです……ど、どうしてバレたんですか」"
translation = "「윽…… 마, 맞아요…… 어, 어째서 들킨 거죠.」"

[[dialogue]]
speaker = "アナ"
original = "「特に理由は。不知火さんが美術部であることや、漫画を描いていることは活動報告書にも書かれていたので。単純な推理」"
translation = "「딱히 이유는. 시라누이 씨가 미술부라는 점이나 만화를 그린다는 점은 활동 보고서에도 적혀 있었으니까요. 단순한 추리.」"

[[dialogue]]
speaker = "unk"
original = "あっ、もしかして『百合』の漫画？"
translation = "앗, 혹시 『백합』 만화야?"

[[dialogue]]
speaker = "ヒトリ"
original = "「ううっ……！\u3000そ、そうでした、会長さんにはこの前、話してしまったんでした……」"
translation = "「우우윽……! 마, 맞아요, 회장님한테는 지난번에 말해버렸었죠……」"

[[dialogue]]
speaker = "アナ"
original = "「……百合漫画、とは？」"
translation = "「……백합 만화, 라는 건?」"

[[dialogue]]
speaker = "ヒトリ"
original = "「あ、う……そ、その、お、女の子同士が恋愛したりする、そういうジャンルの漫画のことです……」"
translation = "「아, 우…… 그, 그게, 여, 여자아이들끼리 연애를 하거나 하는, 그런 장르의 만화를 말해요……」"

[[dialogue]]
speaker = "アナ"
original = "「なるほど、興味深い。具体的に、どんな内容なのでしょうか？」"
translation = "「과연, 흥미롭군. 구체적으로 어떤 내용인가요?」"

[[dialogue]]
speaker = "ヒトリ"
original = "「へっ！？\u3000ぐ、具体的に、ですか！？」"
translation = "「헤엑!? 구, 구체적으로, 말인가요!?」"

[[dialogue]]
speaker = "ヒトリ"
original = "「た、例えばですけど……仲の良い友達がいて、その友達にとっての１番でありたい……そんな想いが発展して恋心になってしまったりするんです」"
translation = "「예, 예를 들면 말이죠…… 사이좋은 친구가 있는데, 그 친구에게 있어 1순위이고 싶다…… 그런 마음이 발전해서 사랑이 되어버리기도 해요」"

[[dialogue]]
speaker = "ヒトリ"
original = "「自分にないものを持っている人に対して、羨ましいのに凄く惹かれたりして、その鬱屈した気持ちが恋愛に発展したり……」"
translation = "「자신에게 없는 것을 가진 사람에 대해, 부러우면서도 굉장히 끌리게 되어서, 그 울적한 기분이 연애로 발전하거나……」"

[[dialogue]]
speaker = "ヒトリ"
original = "「異性には見せられないような、女の子たちのちょっとしたエゴみたいなのを……ぶつけ合ったりもするんです」"
translation = "「이성에게는 보여줄 수 없는, 여자아이들의 사소한 에고 같은 것을…… 서로 부딪치기도 한답니다」"

[[dialogue]]
speaker = "ヒトリ"
original = "「それって、とっても特別な関係だなと思って……そ、そう思いませんか？」"
translation = "「그건 정말 특별한 관계라고 생각해서…… 그, 그렇게 생각하지 않으세요?」"

[[dialogue]]
speaker = "アナ"
original = "「ふむ……私は恋愛事については、正直疎い自覚があります。でも、不知火さんがその関係を特別だと思う理由はわかる」"
translation = "「흠…… 나는 연애사에 대해서는 솔직히 무지하다는 자각이 있습니다. 하지만 시라누이 씨가 그 관계를 특별하다고 생각하는 이유는 알겠군요」"

[[dialogue]]
speaker = "アナ"
original = "「ヒトは通常、エゴを他人に見せることは少ない。もしその関係がエゴで成り立っているのなら、間違いなく特別」"
translation = "「인간은 보통 에고를 타인에게 보여주는 일이 드뭅니다. 만약 그 관계가 에고로 이루어져 있다면, 틀림없이 특별하겠죠」"

[[dialogue]]
speaker = "ヒトリ"
original = "「そ、そういうこと……なのかは微妙ですけど、た、多分解釈は間違ってないと思います……」"
translation = "「그, 그런 의미……인지는 미묘하지만, 아, 아마 해석은 틀리지 않았다고 생각해요……」"

[[dialogue]]
speaker = "アナ"
original = "「つまり不知火さんは、女の子と恋愛したい？」"
translation = "「즉 시라누이 씨는 여자아이와 연애하고 싶다?」"

[[dialogue]]
speaker = "ヒトリ"
original = "「ふぇっ！？\u3000ど、どうしてそんな解釈に！？」"
translation = "「후에!? 어, 어째서 그런 해석이 되는 건가요!?」"

[[dialogue]]
speaker = "unk"
original = "え！？\u3000そういうことだったの！？"
translation = "에!? 그런 거였어!?"

[[dialogue]]
speaker = "ヒトリ"
original = "「ちちち、違いますよっ！？\u3000お、女の子はすっごく可愛いと思いますし大好きですけど！\u3000恋愛したいとか、そういうことじゃないですっ！」"
translation = "「치치치, 아니에요!? 여, 여자아이는 정말 귀엽다고 생각하고 아주 좋아하지만! 연애하고 싶다거나 그런 게 아니라고요!」"

[[dialogue]]
speaker = "ヒトリ"
original = "「む、むしろわたしがそういう関係性の中にいるなんて、あまりにおこがましいことですっ……百合に失礼ですっ」"
translation = "「오, 오히려 제가 그런 관계 속에 있다니, 너무나도 황송한 일이에요…… 백합에 실례라고요」"

[[dialogue]]
speaker = "アナ"
original = "「でも、不知火さんは男性が苦手」"
translation = "「하지만 시라누이 씨는 남성을 대하기 어려워하죠」"

[[dialogue]]
speaker = "ヒトリ"
original = "「そ、それはそうですけど……でも、最近は会長さんとよくお話させてもらっているので、前よりは大分ましになりました」"
translation = "「그, 그건 그렇지만…… 하지만 요즘은 회장님과 자주 대화하고 있어서, 전보다는 훨씬 나아졌어요」"

[[dialogue]]
speaker = "ヒトリ"
original = "「……まだ、会長さんとしか話せないですけど」"
translation = "「……아직 회장님하고밖에 대화하지 못하지만요」"

[[dialogue]]
speaker = "ゆーちゃん"
original = "「てーてー！」"
translation = "「테에테에!」"

[[dialogue]]
speaker = "ヒトリ"
original = "「なっ、何言ってるのゆーちゃん！？\u3000てぇてぇじゃないよっ！\u3000会長さんに失礼だからっ、やめてっ！」"
translation = "「무, 무슨 소릴 하는 거야 유짱!? 테에테에가 아니야! 회장님께 실례니까, 그만둬!」"

[[dialogue]]
speaker = "アナ"
original = "「てーてーとは？」"
translation = "「테에테에란?」"

[[dialogue]]
speaker = "unk"
original = "尊い、って意味らしい"
translation = "고귀하다, 라는 뜻인 것 같아"

[[dialogue]]
speaker = "ヒトリ"
original = "「ご、ごめんなさい会長さん……ゆーちゃんが変なこと言って……」"
translation = "「죄, 죄송해요 회장님…… 유짱이 이상한 소리를 해서……」"

[[dialogue]]
speaker = "ヒトリ"
original = "「わたしがまともに話せる初めての男の人だから、なんか勘違いしちゃってて……す、すみません」"
translation = "「제가 제대로 대화할 수 있는 첫 번째 남자분이라서, 뭔가 착각해버린 모양이라…… 죄, 죄송합니다」"

[[dialogue]]
speaker = "ヒトリ"
original = "「ゆーちゃんっ、会長さんとはそういう仲じゃないんだからね！？\u3000確かに百合に興味持ってくれて、また語りたいとは思ってるけど……（チラッ）」"
translation = "「유짱, 회장님하고는 그런 사이가 아니니까!? 확실히 백합에 관심을 가져주셔서 또 이야기하고 싶다고는 생각하지만…… (힐끗)」"

[[dialogue]]
speaker = "アナ"
original = "「ほほう。会長、不知火さんといつの間に……」"
translation = "「호오. 회장, 시라누이 씨와 어느 사이에……」"

[[dialogue]]
speaker = "unk"
original = "俺にも後でその漫画、読ませてくれる？"
translation = "나한테도 나중에 그 만화, 읽게 해줄래?"

[[dialogue]]
speaker = "ヒトリ"
original = "「えっ、か、会長さんも読みたいんですか？\u3000は、はい……！\u3000わかりましたっ」"
translation = "「엣, 회, 회장님도 읽고 싶으신가요? 네, 네……! 알겠습니다!」"

[[dialogue]]
speaker = "ヒトリ"
original = "「それで、その……もしよかったら、後で感想を語ったりとか……どうでしょう？\u3000会長さんが百合をどう感じるか、気になるな……なんて」"
translation = "「그래서, 그…… 혹시 괜찮으시다면 나중에 감상을 나누거나…… 어떨까요? 회장님이 백합을 어떻게 느끼실지 궁금하달까…… 해서요」"

[[dialogue]]
speaker = "ヒトリ"
original = "「い、いいんですか？\u3000は、はいっ。じゃあ、すぐ読んで、明日にでもお貸ししますねっ……！」"
translation = "「괘, 괜찮으시겠어요? 네, 넷. 그럼 바로 읽고 내일이라도 빌려드릴게요……!」"

[[dialogue]]
speaker = "アナ"
original = "「……ふむ、なるほど。これが、てーてー」"
translation = "「……흠, 과연. 이것이 테에테에」"

[[dialogue]]
speaker = "ゆーちゃん"
original = "「てーてー！」"
translation = "「테에테에!」"

[[dialogue]]
speaker = "unk"
original = "何故か納得したように、ゆーちゃんと顔を見合せて、頷くアナなのだった。"
translation = "왠지 납득했다는 듯이 유짱과 얼굴을 마주 보며 고개를 끄덕이는 아나였다."

