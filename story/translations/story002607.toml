[[dialogue]]
speaker = "unk"
original = "リゾート結界に集結した公安委員会のメンバーたち。"
translation = "리조트 결계에 집결한 공안위원회의 멤버들."

[[dialogue]]
speaker = "unk"
original = "その光景を目の前にして、異東ヤハトは動揺を隠しきれていなかった。"
translation = "그 광경을 목전에 두고 이토 야하토는 동요를 감추지 못하고 있었다."

[[dialogue]]
speaker = "ヤハト"
original = "「馬鹿な……！\u3000あり得ない！\u3000リゾート結界に突入する前に、学園の星騎士がどれくらい入り込んでいるかの事前偵察は行っていた！」"
translation = "「바보 같은……! 그럴 리가 없다! 리조트 결계에 돌입하기 전에 학원의 성기사가 얼마나 들어와 있는지 사전 정찰은 마쳤었다!」"

[[dialogue]]
speaker = "ヤハト"
original = "「なのに何故、公安委員会の星騎士がこんなにも紛れ込んでいる！？」"
translation = "「그런데 어째서 공안위원회의 성기사가 이렇게나 많이 섞여 있는 거냐!?」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「言っただろう。それはここが、プライベートビーチの方だからだ」"
translation = "「말했잖나. 그건 여기가 프라이빗 비치 쪽이기 때문이다.」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「お前が何故それに気づかず、侵入してしまったのか。そう難しい話じゃない――」"
translation = "「네가 왜 그것도 모르고 침입해 버렸는가. 그리 어려운 이야기가 아니지──」"

[[dialogue]]
speaker = "リノ"
original = "「あなたたちがパブリックビーチに転移しようとした瞬間、空間魔法で私たちごと、このプライベートビーチの方へ飛ばしたのよ」"
translation = "「너희가 퍼블릭 비치로 전이하려던 순간, 공간 마법으로 우리와 함께 이 프라이빗 비치 쪽으로 날려 보낸 거야.」"

[[dialogue]]
speaker = "ヤハト"
original = "「そんな離れ技が……！？」"
translation = "「그런 신기에 가까운 기술이……!?」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「同じ空間操作の能力を持つお前すら気づかない程の技量。『空間の魔女』の二つ名は、伊達じゃないってことだ」"
translation = "「같은 공간 조작 능력을 가진 너조차 눈치채지 못할 정도의 기량. 『공간의 마녀』라는 이명은 허명이 아니라는 소리다.」"

[[dialogue]]
speaker = "リノ"
original = "「私……今回の件は、怒っているのよ」"
translation = "「나…… 이번 일은 화가 나 있단다.」"

[[dialogue]]
speaker = "リノ"
original = "「あなたたちは、私の世界一可愛い息子に手を出そうとした――」"
translation = "「너희는 내 세계에서 제일 귀여운 아들에게 손을 대려 했어──」"

[[dialogue]]
speaker = "リノ"
original = "「母親として絶対に許せない」"
translation = "「엄마로서 절대로 용서할 수 없어.」"

[[dialogue]]
speaker = "リノ"
original = "「だから、空間の魔女の名にかけて、あなたたちは１人たりともここから逃がさない……！」"
translation = "「그러니까 공간의 마녀의 이름을 걸고, 너희는 단 한 명도 여기서 보내주지 않겠어……!」"

[[dialogue]]
speaker = "ヤハト"
original = "「っ……！\u3000だとしても！\u3000俺たちの襲撃のタイミングが何故分かった！？」"
translation = "「큭……! 그렇다고 해도! 우리 습격 타이밍은 어떻게 안 거냐!?」"

[[dialogue]]
speaker = "ヤハト"
original = "「でなければ、公安委員会の連中をこんなに大勢、都合良く揃えられるはずがない！\u3000この１週間ずっと、全員をここに待機させていたとでも！？」"
translation = "「그러지 않고서야 공안위원회 녀석들을 이렇게나 많이 운 좋게 모을 수 있을 리가 없다! 이 1주일 내내 전원을 여기에 대기시키고 있었다는 거냐!?」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「まさか。ただ、お前たちが襲撃する時間を知らせてもらっていただけだ」"
translation = "「설마. 그저 너희가 습격할 시간을 알려줬을 뿐이다.」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「公安委員会らしく、お前たちの組織に潜入調査をしてな」"
translation = "「공안위원회답게 네놈들의 조직에 잠입 조사를 해서 말이지.」"

[[dialogue]]
speaker = "ヤハト"
original = "「あり得ない！！\u3000俺の部下たちは全員、ヴェノマイザーを注入しミュータントになった時点で、眷族として絶対服従するように思考操作が施されている！」"
translation = "「있을 수 없다!! 내 부하들은 전원 베노마이저를 주입해 뮤턴트가 된 시점에서 권속으로서 절대 복종하도록 사고 조작이 가해져 있다!」"

[[dialogue]]
speaker = "ヤハト"
original = "「仮に万が一裏切ろうとしても、眷族の思考は俺に伝わるようになっている！\u3000潜入員が入り込む余地など、どこにも――」"
translation = "「설령 만에 하나 배신하려 해도 권속의 사고는 나에게 전달되게 되어 있다! 잠입 요원이 파고들 틈 따위 어디에도──」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「そう。潜入を得意とするシアンでさえ、非人道的な手段を<ruby>厭<rt>いと</rt></ruby>わぬお前の用意周到さにはお手上げだった。だが――」"
translation = "「그래. 잠입이 특기인 시안조차 비인도적인 수단을 가리지 않는 너의 용의주도함에는 두 손 두 발 다 들었지. 하지만──」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「世界最強レベルの星術使いであれば、話は別だ」"
translation = "「세계 최강 레벨의 성술사라면 이야기가 달라진다.」"

[[dialogue]]
speaker = "ヤハト"
original = "「最強……！？」"
translation = "「최강……!?」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「それがお前の気づかなかったことの２つ目だ」"
translation = "「그것이 네가 눈치채지 못한 두 번째다.」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「――協力に心から感謝する。もう姿を現してもいいぞ」"
translation = "「──협력에 진심으로 감사한다. 이제 모습을 드러내도 좋다.」"

[[dialogue]]
speaker = "？？？"
original = "「レディース＆ジェントルメン――」"
translation = "「레이디스 앤 젠틀맨──」"

[[dialogue]]
speaker = "ミネコ"
original = "「イッツ・イリュージョン☆\u3000大怪盗フランボウ、華麗に参上♪」"
translation = "「잇츠 일루전☆ 대괴도 플랑보, 화려하게 등장♪」"

[[dialogue]]
speaker = "ヤハト"
original = "「は……！？\u3000何故ここで大怪盗！？！？」"
translation = "「하……!? 왜 여기서 대괴도가!?!?」"

[[dialogue]]
speaker = "ヤハト"
original = "「馬鹿な……！\u3000本物なのか！？」"
translation = "「바보 같은……! 진짜인 거냐!?」"

[[dialogue]]
speaker = "ミネコ"
original = "「星術犯罪組織『ユゴス』の諸君、日本ではお初にお目にかかる。信じるか信じないかはキミたちに任せるが、お宝はちゃんと盗ませてもらったよ」"
translation = "「성술 범죄 조직 『유고스』 제군들, 일본에서는 처음 뵙겠군. 믿든 안 믿든 자네들 마음이지만, 보물은 제대로 훔쳐 왔다고.」"

[[dialogue]]
speaker = "ヤハト"
original = "「お宝だと……？\u3000はっ……まさか！？」"
translation = "「보물이라고……? 하…… 설마!?」"

[[dialogue]]
speaker = "ミネコ"
original = "「そう、渋谷の拠点の地下金庫に保管されてた、これだよ♪」"
translation = "「그래, 시부야 거점 지하 금고에 보관되어 있던 이거야♪」"

[[dialogue]]
speaker = "unk"
original = "そう言って、大怪盗フランボウ――ミネコが懐から取り出したのは、美しい紫色をしたクリスタル。"
translation = "그렇게 말하며 대괴도 플랑보── 미네코가 품에서 꺼낸 것은 아름다운 보라색을 띤 크리스털."

[[dialogue]]
speaker = "ヤハト"
original = "「それは……『ポイズナイト結晶』！\u3000大怪盗、貴様ッ！！」"
translation = "「그것은…… 『포이즈나이트 결정』! 대괴도, 네놈!!」"

[[dialogue]]
speaker = "unk"
original = "それは先日リコさんが言っていた、怪人の変身薬『ヴェノマイザー』を作り出す元となる毒を生成する、マンティコアの体内器官だ。"
translation = "그것은 요전날 리코 씨가 말했던 괴인의 변신약 『베노마이저』를 만들어내는 근원이 되는 독을 생성하는 만티코어의 체내 기관이다."

[[dialogue]]
speaker = "ヤハト"
original = "「貴様が我々の情報を、公安委員会に伝えていたというのか……！？\u3000大怪盗が潜入員の真似事を……！」"
translation = "「네놈이 우리 정보를 공안위원회에 전하고 있었다는 거냐……!? 대괴도가 잠입 요원 흉내를……!」"

[[dialogue]]
speaker = "ミネコ"
original = "「私も気は進まなかったのだが、今回はどこぞの<ruby>交渉人<rt>ネゴシエイター</rt></ruby>に、不覚にも交渉負けしてしまったものでね」"
translation = "「나도 내키지는 않았지만, 이번에는 어느 교섭인에게 불운하게도 교섭에서 져버리는 바람에 말이야.」"

[[dialogue]]
speaker = "ミネコ"
original = "「怪盗たるもの、予告状の時刻と同じように、交わした約束は守らねばならない」"
translation = "「괴도인 이상 예고장의 시각과 마찬가지로 주고받은 약속은 지켜야 하지 않겠나.」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「にひひ♪\u3000大怪盗さん、お仕事お疲れさまで～す☆」"
translation = "「니히히♪ 대괴도 씨, 수고하셨어요~☆」"

[[dialogue]]
speaker = "unk"
original = "そう言って、公安委員会の交渉人は悪戯な笑みを浮かべてみせる。"
translation = "그렇게 말하며 공안위원회의 교섭인은 장난스러운 미소를 지어 보인다."

[[dialogue]]
speaker = "リコリンフィア"
original = "「――毒を以て毒を制す」"
translation = "「──독을 가지고 독을 제압한다.」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「お前たちのような猛毒を制する為には、私たち公安委員会は、毒を使うことを厭わない」"
translation = "「너희 같은 맹독을 제압하기 위해 우리 공안위원회는 독을 사용하는 것을 마다하지 않는다.」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「そして、毒は使い方によっては薬にもなる」"
translation = "「그리고 독은 쓰기에 따라 약도 되지.」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「お前らのような外道に付ける劇薬としては、ぴったりの采配だろう？」"
translation = "「너희 같은 외도들에게 처방할 극약으로서는 딱 맞는 배합이겠지?」"

[[dialogue]]
speaker = "ヤハト"
original = "「リコリンフィア、貴様ァ……！」"
translation = "「리코린피아, 네놈이……!」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「あともう１つ……異東、お前には言っておきたいことがある」"
translation = "「그리고 하나 더…… 이토, 너에게는 해두고 싶은 말이 있다.」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「別に私は、お前たちをここに誘き出した時点で――」"
translation = "「딱히 나는 너희를 여기로 유인해낸 시점에서──」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「<b>１人で</b>難なく全員を制圧することができた」"
translation = "「<b>혼자서</b> 아무런 문제 없이 전원을 제압할 수 있었다.」"

[[dialogue]]
speaker = "ヤハト"
original = "「なんだと……！？」"
translation = "「뭐라고……!?」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「そうしなかったのは、私個人の<b>私情</b>というやつだ」"
translation = "「그렇게 하지 않은 것은 내 개인적인 <b>사정</b>이라는 거다.」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「なにせ、お前は余りにも、私の部下たちの実力を甘くみているようだったからな」"
translation = "「아무래도 너는 너무나도 내 부하들의 실력을 얕보고 있는 것 같았거든.」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「なぁ、異東……お前、そんな雑兵１００人ごときで、本気で私の部下を倒せるとでも思っていたのか？」"
translation = "「야, 이토…… 너, 그런 졸개 100명 따위로 진심으로 내 부하를 이길 수 있을 거라 생각했냐?」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「――舐めるなよ。そんなわけないだろうが」"
translation = "「──얕보지 마라. 그럴 리가 없잖아.」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「私の部下はな、全員１人残らず、お前ら程度じゃ足元にも及ばないくらい強いんだよ」"
translation = "「내 부하는 말이야, 전원 한 명도 빠짐없이 너희 따위는 발끝에도 못 미칠 정도로 강하다고.」"

[[dialogue]]
speaker = "ヤハト"
original = "「ミュータントが雑兵だと……！？\u3000魔力の底上げで、１体１体が並みの星騎士を遥かに上回る力を持つ、この軍勢を……！？」"
translation = "「뮤턴트가 졸개라고……!? 마력 증폭으로 개개인이 평범한 성기사를 훨씬 상회하는 힘을 가진 이 군세를……!?」"

[[dialogue]]
speaker = "ヤハト"
original = "「……く、ククッ」"
translation = "「……크, 크크.」"

[[dialogue]]
speaker = "ヤハト"
original = "「ふざけるなぁぁぁ！！！\u3000舐めているのは貴様の方だリコリンフィアァッ！！！\u3000我々を貴様１人で制圧できたなどとおぉぉぉっ！！！」"
translation = "「웃기지 마아아아!!! 얕보고 있는 건 네놈 쪽이다 리코린피아아앗!!! 우리를 너 혼자서 제압할 수 있었다고오오오옷!!!」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「……あれから１４年。私も随分と毒の扱いが上手くなってな」"
translation = "「……그로부터 14년. 나도 제법 독 다루는 솜씨가 좋아져서 말이지.」"

[[dialogue]]
speaker = "ヤハト"
original = "「あ……？\u3000ぐっ……！？」"
translation = "「아……? 큭……!?」"

[[dialogue]]
speaker = "unk"
original = "異東が突然、苦しそうなうめき声を上げて、その場に片膝を着く。"
translation = "이토가 갑자기 괴로운 신음 소리를 내며 그 자리에 한쪽 무릎을 꿇는다."

[[dialogue]]
speaker = "ヤハト"
original = "「な、なんだ……！？\u3000体が痺れて、上手く動かない……！？」"
translation = "「뭐, 뭐냐……!? 몸이 저려서 제대로 움직이지 않아……!?」"

[[dialogue]]
speaker = "unk"
original = "リコさんは至って冷静な目で、ヤハトを見下ろしながら告げる。"
translation = "리코 씨는 지극히 냉정한 눈으로 야하토를 내려다보며 고한다."

[[dialogue]]
speaker = "リコリンフィア"
original = "「私の星騎士としての能力は知ってるだろう？」"
translation = "「나의 성기사로서의 능력은 알고 있겠지?」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「『毒生成』――それを使って、お前だけに効く毒を作らせてもらった」"
translation = "「『독 생성』── 그걸 사용해서 너에게만 듣는 독을 만들었다.」"

[[dialogue]]
speaker = "ヤハト"
original = "「毒だと……！？\u3000馬鹿な……そんなものいつの間に……！？」"
translation = "「독이라고……!? 바보 같은…… 그런 걸 언제……!?」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「気化毒だよ」"
translation = "「기화독이다.」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「簡単に言えば、『毒ガス』だ。私は先程から、毒星術を使って無味無臭の毒ガスを少しずつお前の周りにだけピンポイントで生成し、散布し続けていた」"
translation = "「간단히 말하면 『독가스』지. 나는 아까부터 독성술을 사용해 무색무취의 독가스를 조금씩 너의 주변에만 핀포인트로 생성해서 계속 살포하고 있었다.」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「ミュータントだけに効く麻痺毒をな」"
translation = "「뮤턴트에게만 듣는 마비독을 말이야.」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「分かるか？\u3000本当ならこれをプライベートビーチに充満させとくだけで、やろうと思えば、私１人でとっくにお前たち全員を制圧できてたってことだ」"
translation = "「알겠냐? 사실이라면 이걸 프라이빗 비치에 가득 채워두는 것만으로 마음만 먹으면 나 혼자서 진작에 네놈들 전원을 제압할 수 있었다는 소리다.」"

[[dialogue]]
speaker = "ヤハト"
original = "「っ……！」"
translation = "「윽……!」"

[[dialogue]]
speaker = "ヤハト"
original = "「おのれ……おのれおのれおのれおのれおのれぇぇぇ！！！\u3000リコリンフィアァァァッ！！！」"
translation = "「이놈이…… 이놈이이놈이이놈이이놈이이놈이이이이!!! 리코린피아아아앗!!!」"

[[dialogue]]
speaker = "unk"
original = "怒りが頂点に達したのか、魔力の高まりと共に獣のような雄叫びを上げながら、異東は無理矢理立ち上がって来る。"
translation = "분노가 정점에 달했는지 마력의 고조와 함께 짐승 같은 포효를 내지르며 이토는 억지로 일어선다."

[[dialogue]]
speaker = "リコリンフィア"
original = "「腐ってもユゴスの幹部か。大した根性だ」"
translation = "「썩어도 유고스의 간부인가. 대단한 근성이군.」"

[[dialogue]]
speaker = "ヤハト"
original = "「殺せぇぇぇーーーッ！！！\u3000貴様ら、公安委員会の畜生共を１匹残らず八つ裂きにしろぉぉぉーーーッ！！！」"
translation = "「죽여라아아아───앗!!! 네놈들, 공안위원회의 축생 놈들을 단 한 마리도 남기지 말고 갈기갈기 찢어버려라아아아───앗!!!」"

[[dialogue]]
speaker = "部下の怪人たち"
original = "「おおおぉぉぉーーーッ！！！」"
translation = "「오오오오오───앗!!!」"

[[dialogue]]
speaker = "unk"
original = "ミュータントたちがヤハトの号令を受け、動き出す。"
translation = "뮤턴트들이 야하토의 호령을 받고 움직이기 시작한다."

[[dialogue]]
speaker = "unk"
original = "対するリコさんは、武器を砂浜に突き刺しながら冷静に、しかし辺りにはっきりと透る声音で告げる。"
translation = "그에 맞서 리코 씨는 무기를 모래사장에 꽂으며 냉정하게, 하지만 주변에 또렷하게 울리는 목소리로 선언한다."

[[dialogue]]
speaker = "リコリンフィア"
original = "「１４年前の因縁に、ここで決着をつけるとしよう」"
translation = "「14년 전의 악연에 여기서 결판을 내도록 하지.」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「――公安委員会のエージェント総員に告げる」"
translation = "「──공안위원회의 에이전트 총원에게 고한다.」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「これよりミュータントの制圧を開始する。１匹も逃さず、確保しろ！」"
translation = "「지금부터 뮤턴트의 제압을 개시한다. 한 마리도 놓치지 말고 확보해라!」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「総員――状況開始！！！」"
translation = "「총원── 상황 개시!!!」"

[[dialogue]]
speaker = "全員"
original = "「了解！！！」"
translation = "「라져!!!」"

[[dialogue]]
speaker = "unk"
original = "公安委員会と俺たちは、ミュータントの軍勢との戦闘を開始するのだった――"
translation = "공안위원회와 우리들은 뮤턴트 군세와의 전투를 개시하는 것이었다──"

