[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「キャハハっ<emoji=heart04>\u3000今日も楽しい時間が過ごせましたね、会長さん？」"
translation = "「캬하하<emoji=heart04> 오늘도 즐거운 시간을 보냈네요, 회장님?」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「私の所有物になっていただけるなら、もっと素敵なことをして差し上げますけど～？」"
translation = "「제 소유물이 되어 주신다면 좀 더 멋진 일을 해드릴 텐데요~?」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「…………ふぅん。やっぱり簡単には懐いてくれないんですねぇ。まあいいです、どうせ最後は私のものになるんだし？」"
translation = "「…………후웅. 역시 쉽게 길들여지진 않으시네요. 뭐 됐어요, 어차피 마지막엔 제 것이 될 거니까요?」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「結末は決まってるので、道中を楽しむことにしましょうか。くふふ、今日も会長さんの色んなことが知れて楽しかった～<emoji=heart04>」"
translation = "「결론은 정해져 있으니 과정을 즐기기로 할까요. 쿠후후, 오늘도 회장님의 이런저런 면을 알게 돼서 즐거웠어~<emoji=heart04>」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「んー？\u3000どうしました。何か聞きたいことでも？」"
translation = "「음~? 왜 그러세요. 뭐 물어보고 싶은 거라도?」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「くすくす、いいですよ。会長さんからの質問は新鮮です。何でも答えてあげますよ～？」"
translation = "「쿠스쿠스, 좋아요. 회장님의 질문은 신선하네요. 무엇이든 대답해 드릴게요~?」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「…………素の性格を出して話せる人は、会長さん以外にいるのか、ですか？」"
translation = "「…………본래 성격을 드러내고 말할 수 있는 사람이 회장님 말고 또 있느냐, 인가요?」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「くすくすっ♪\u3000そんなの、いるわけないじゃないですか。会長さん以外には、貴族令嬢として慎ましく接してますよ？」"
translation = "「쿠스쿠스♪ 그럴 리가 없잖아요. 회장님 말고는 귀족 영애로서 조신하게 대하고 있다구요?」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「まあシャリオンの──同郷の方が相手の場合は、繕わない時もありますけれど。星騎士の方々には折り目正しく接しています」"
translation = "「뭐 샤리온의── 고향 사람을 상대할 때는 꾸미지 않을 때도 있지만요. 성기사분들에게는 깍듯이 대하고 있어요」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「貴族の娘なんですから、人当たりよく自分を偽るのは当然でしょう？\u3000今さら本当の顔を見せるメリットも感じません」"
translation = "「귀족의 딸이니까 붙임성 있게 자신을 속이는 건 당연하잖아요? 이제 와서 진짜 얼굴을 보여줄 메리트도 못 느끼겠고요」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「だって、誰だって嫌でしょう？\u3000仲良くなってから、本当はすっごく性格の悪い女の子だった～、なんてカミングアウトされるのは♪」"
translation = "「그야 누구든 싫어하겠죠? 친해지고 나서 사실은 엄청 성격 나쁜 여자애였다~ 같은 커밍아웃을 듣는 건♪」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「シャルレーヌちゃん……なんかさっきから、人が違うってゆーか……『ざ～こ』とか言ってたけど、そんなまさか……」"
translation = "「샤를레느짱…… 왠지 아까부터 딴사람 같다고나 할까…… 『허접~』이라느니 말하던데, 설마……」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「あっ、えっと……それは──」"
translation = "「앗, 에또…… 그건──」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「まさかの──『メスガキ』ってやつだし！？」"
translation = "「설마했던── 『메스가키』라는 거라구!?」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「……………………は？」"
translation = "「……………………하?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「すごい！\u3000すごいすごい！\u3000『ざ～こ<emoji=heart04>』ってリアルで初めて聞いたし！」"
translation = "「대단해! 대박 대박! 『허접~<emoji=heart04>』이라는 거 실제로 처음 들었다구!」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「えっ……あ、あの……？」"
translation = "「엣…… 저, 저기……?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「ヤッバ、ニンジャに続いてメスガキまで見つけちゃった……ジャパンすごい！\u3000流星市国、ヤバイ！\u3000テンション上がってきたし～！」"
translation = "「대박, 닌자에 이어서 메스가키까지 찾아버렸어…… 재팬 대단해! 유성시국, 대박! 텐션 올라온다구~!」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「か、会長さん……あの、ウズメイア先輩は一体何を言ってるのかしら……？」"
translation = "「회, 회장님…… 저기, 우즈메이야 선배님은 대체 무슨 소릴 하시는 걸까요……?」"

[[dialogue]]
speaker = "unk"
original = "彼女、日本文化のフリークなんだ"
translation = "그녀, 일본 문화 광팬이거든"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「それは何となく知ってます！\u3000だからって、何でこんなテンションを上げて喜んでるのかって聞いてるんです！」"
translation = "「그건 대충 알아요! 그렇다고 왜 이렇게 텐션을 올리며 기뻐하는 거냐고 묻는 거예요!」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「そんなのトーゼン！\u3000漫画やアニメにしかいないと思ってたメスガキが現実にあったわけで！\u3000もう青天霹靂～って感じ！」"
translation = "「그야 당연하지! 만화나 애니메이션에만 있는 줄 알았던 메스가키가 현실에 있었던 거니까! 이건 그야말로 청천벽력 같은 느낌!」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「そもそも、何なの？\u3000さっきから散々言われてるけど、メスガキって……！？」"
translation = "「애초에 그게 뭔데? 아까부터 자꾸 그러는데, 메스가키라는 게……!?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「ご存じない！？\u3000え、てことは天然ってコト！？\u3000養殖じゃなく天然のメスガキ！？」"
translation = "「모르시는 거야!? 에, 그럼 천연이라는 거!? 양식이 아니라 천연 메스가키!?」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「だからメスガキって何なんですか……！？」"
translation = "「그러니까 메스가키라는 게 대체 뭔가요……!?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「よーし、オタク文化布教のために、一席ぶっちゃうし！」"
translation = "「좋아, 오타쿠 문화 포교를 위해 한바탕 썰을 풀어 주지!」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「……まあ、何となくわかりました。サブカルチャーの中に、そのような用語があるんですね」"
translation = "「……뭐, 대충 알겠어요. 서브컬처 중에 그런 용어가 있는 거군요」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「そーそー。いや～、でも本当にすごい変貌ぶりだったね～。シャルレーヌちゃんって普段はあれなの。猫かぶり、みたいな？」"
translation = "「마자마자. 아니~ 근데 정말 대단한 변신이었어~. 샤를레느짱은 평소에 그거지. 내숭 떠는 거 같은?」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「ま、まあ…………そうね。がっかりしたでしょ？」"
translation = "「뭐, 뭐어………… 그렇지. 실망했지?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「え、何で？」"
translation = "「에, 왜?」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「それは、だって……隠し事をしたまま接せられていたわけだから。不愉快でしょう？」"
translation = "「그건, 그게…… 숨기는 게 있는 채로 대해온 거니까. 불쾌하잖아?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「え～、そんなことないよ？\u3000てゆーか、シャルレーヌちゃんってガチの貴族じゃん？\u3000色々事情があるのはトーゼンっしょ！」"
translation = "「에~ 그렇지 않다구? 그보다 샤를레느짱은 찐 귀족이잖아? 여러 가지 사정이 있는 건 당연하잖아!」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「あたしみたいな庶民と違って、キャラ付け？\u3000みたいなのが大事ってゆーのも、全然想像つくし～」"
translation = "「나 같은 서민이랑 다르게 캐릭터 만들기? 같은 게 중요하다는 거, 충분히 상상이 가고~」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「ウズメイア先輩……」"
translation = "「우즈메이야 선배……」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「てゆーかあたし、清楚お嬢様が実は腹黒！\u3000みたいなやつ、大好物♪\u3000漫画で予習済みだし！」"
translation = "「그보다 나, 청초한 아가씨가 사실은 하라구로! 같은 거 완전 좋아해♪ 만화로 예습 끝냈다구!」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「その、何かにつけて『漫画で見た』と言われるのは、ちょっぴり複雑ですけれど……」"
translation = "「그, 뭐만 하면 『만화에서 봤다』고 하는 건 조금 복잡한 기분입니다만……」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「不愉快に思っていないのなら、良かったわ」"
translation = "「불쾌하게 생각하지 않는다면 다행이야」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「マジで安心してね。あたし、ギャルだけど口は堅いし♪\u3000誰にも言わないから！」"
translation = "「정말로 안심하라구. 나, 갸루지만 입은 무겁거든♪ 아무한테도 안 말할 테니까!」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「……ウズメイア先輩って、よくお人好しって言われません？」"
translation = "「……우즈메이야 선배는 자주 사람 좋다는 소리 듣지 않아요?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「言われる♪\u3000めっちゃ言われる～♪」"
translation = "「들어♪ 엄청 듣는다구~♪」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「でしょうね。まあ、そう言ってもらえるならありがたいわ……良かった」"
translation = "「그렇겠네요. 뭐, 그렇게 말해준다면 고마워…… 다행이야」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「そんな不安にならなくても～♪\u3000あたしの薙刀に誓って、シャルレーヌちゃんの秘密は墓まで持って行くし！」"
translation = "「그렇게 불안해하지 않아도 돼~♪ 나의 치도에 맹세코, 샤를레느짱의 비밀은 무덤까지 가져갈 테니까!」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「いえ、それもですが……せっかくペアになった先輩なので、嫌われなくて良かったってことです」"
translation = "「아니, 그것도 그렇지만…… 어렵게 페어가 된 선배니까, 미움받지 않아서 다행이라는 뜻이에요」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「……お～。たまにこうやってデレるから、会長くんも絆されちゃった感じ……？」"
translation = "「……오~. 가끔 이렇게 데레데레하니까 회장군도 홀려버린 느낌……?」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「くふっ<emoji=heart04>\u3000まぁバレちゃったものは仕方ないですね～。それに物は考えようです」"
translation = "「쿠후읏<emoji=heart04> 뭐 들켜버린 건 어쩔 수 없네요~. 게다가 생각하기 나름이죠」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「これからはウズメイア先輩が見てる前でも、会長さんとワンちゃんごっこができるってことですし～<emoji=heart04>」"
translation = "「이제부터는 우즈메이야 선배가 보는 앞에서도 회장님이랑 강아지 놀이를 할 수 있다는 뜻이니까요~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "それは２人の時でも遠慮して！？"
translation = "그건 둘이 있을 때도 자제해 줘!?"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「う～ん。下級生が実はドＳのメスガキとか、これもう漫画の世界を超えちゃったりしてない？\u3000事実は小説よりもってやつだし……」"
translation = "「으음~. 후배가 사실은 도S 메스가키라니, 이거 이제 만화의 세계를 뛰어넘어 버린 거 아냐? 사실은 소설보다 더하다는 그거고……」"

[[dialogue]]
speaker = "unk"
original = "バレた時はどうなることかと思ったけれど、明るいウズメが相手で良かった。"
translation = "들켰을 때는 어떻게 될까 싶었지만, 밝은 우즈메가 상대라서 다행이다."

[[dialogue]]
speaker = "unk"
original = "こうしてシャルレーヌは、俺以外にも素の自分を見せられる相手が増えたのだけれど──"
translation = "이렇게 샤를레느는 나 이외에도 본모습을 보여줄 수 있는 상대가 늘어난 것이었지만──"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「ちょい思ったんだけどさ。チョコの味が変になっちゃう原因って、シャルレーヌちゃんが素の状態を隠してたからじゃない？」"
translation = "「잠깐 생각한 건데 말야. 초코 맛이 이상해진 원인 말야, 샤를레느짱이 본모습을 숨기고 있었기 때문 아냐?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「チョコに星力を込める時、いつもペアのあたしの前でやってたでしょ？\u3000優等生なお嬢様～なシャルレーヌちゃんを演じてたわけで」"
translation = "「초코에 성력을 담을 때, 항상 페어인 내 앞에서 했었지? 우등생 아가씨인 샤를레느짱을 연기하고 있었던 거잖아」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「……本当の自分を隠しているから、星力にも影響が出て、味がおかしくなってしまったってことかしら？」"
translation = "「……진정한 자신을 숨기고 있어서 성력에도 영향을 주어 맛이 이상해져 버렸다는 걸까?」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「そう！\u3000あたしの親友のソフィも、胸にわだかまりがあるうちは晴れ着フォームをうまく使えてなかったし……」"
translation = "「응! 내 절친인 소피도 마음에 응어리가 있을 동안에는 설빔 폼을 잘 사용하지 못했거든……」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「星力ってメンタルにすごく影響を受けるってトワ先生も言ってたし！」"
translation = "「성력은 멘탈에 굉장히 영향을 받는다고 토와 선생님도 말했고!」"

[[dialogue]]
speaker = "unk"
original = "試してみる価値はありそうだね"
translation = "시도해 볼 가치는 있겠네."

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「そうですね。会長さんのお夜食にと思って、ちょうど星力を込めていないトリュフチョコは持ってきています」"
translation = "「그렇네요. 회장님 야식으로 주려고 마침 성력을 담지 않은 트러플 초코는 가져왔어요」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「本当は後で、ワンちゃんごっこのご褒美にしようと思ってたんですけど♪」"
translation = "「사실은 나중에 강아지 놀이의 포상으로 주려고 했었지만요♪」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「あははっ、シャルレーヌちゃん、その調子だし♪\u3000メスガキのまま星力チャージだよ！」"
translation = "「아하핫, 샤를레느짱, 그 기세라구♪ 메스가키 상태 그대로 성력 차지야!」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「は～い……美味しくなあれ、キャハっ<emoji=heart04>」"
translation = "「네~에…… 맛있어져라, 캬핫<emoji=heart04>」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「お試しいただけますか、魔王様♪」"
translation = "「시식해 보시겠어요, 마왕님♪」"

[[dialogue]]
speaker = "unk"
original = "これは──ものすごく甘いっ！"
translation = "이건── 엄청나게 달아!"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「大成功じゃん！\u3000やったし～♪」"
translation = "「대성공이잖아! 해냈다구~♪」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「……そうね。ウズメイア先輩のおかげだわ。ありがとうございます♪」"
translation = "「……그렇네. 우즈메이야 선배 덕분이야. 고마워요♪」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「ふふ～ん♪\u3000先輩だからね、後輩の面倒を見るのもお役目だし！」"
translation = "「후훙~♪ 선배니까 말야, 후배를 돌보는 것도 역할이라구!」"

[[dialogue]]
speaker_original = "ウズメイア"
speaker_translation = "우즈메"
original = "「ようしっ、それじゃあチョコ作りの憂いもなくなったし……明日はたくさんチョコを作るぞ～！」"
translation = "「좋아, 그럼 초코 만들기의 걱정도 사라졌고…… 내일은 초코를 잔뜩 만들자~!」"

[[dialogue]]
speaker_original = "シャルレーヌ"
speaker_translation = "샤를렌"
original = "「はい、先輩っ♪」"
translation = "「네, 선배님♪」"

[[dialogue]]
speaker = "unk"
original = "今まではきちんとしたチョコレートを用意できないことを気にしていたのだろうか。問題が解決したシャルレーヌは、とても晴れやかな笑顔を浮かべるのだった──"
translation = "지금까지는 제대로 된 초콜릿을 준비하지 못하는 것을 신경 쓰고 있었던 것일까. 문제가 해결된 샤를레느는 무척 밝은 미소를 짓고 있었다──"

[[dialogue]]
speaker = "unk"
original = "数時間後──深夜の消灯したカフェテリア。"
translation = "수 시간 후── 심야의 소등된 카페테리아."

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「よ～し、このまましっかり朝まで警備しちゃうのです！\u3000打倒、チョコレート泥棒っ！」"
translation = "「좋아욧, 이대로 확실히 아침까지 경비하는 것이에욧! 타도, 초콜릿 도둑!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「でも……はぅう。ずっと張り込みを続けて、お腹が空いてきちゃいました。カフェの中はチョコの香りでいっぱいで、誘惑が多いのです……」"
translation = "「하지만…… 하우우. 계속 잠복을 계속했더니 배가 고파져 버린 거예요. 카페 안은 초코 향기로 가득해서 유혹이 많은 거예요……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ううっ、いけません。とりあえず学園の購買で、何か買ってきましょう！\u3000腹が減っては何とやら、なのです！」"
translation = "「우우, 안 되겠어요. 일단 학원 매점에서 무언가 사 오겠어욧! 금강산도 식후경인 거예요!」"

[[dialogue]]
speaker = "unk"
original = "ルリエルがいなくなってから──カフェテリアの隅で、ずっと息を殺していた影が動き出す。"
translation = "루리에르가 사라지고 나서── 카페테리아 구석에서 계속 숨을 죽이고 있던 그림자가 움직이기 시작한다."

[[dialogue]]
speaker_original = "フワッチ"
speaker_translation = "후왓치"
original = "「イ～～～～っ♪」"
translation = "「이~~~~♪」"

