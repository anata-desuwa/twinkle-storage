[[dialogue]]
speaker = "unk"
original = "合宿最終日の夜。"
translation = "합숙 마지막 날 밤."

[[dialogue]]
speaker = "unk"
original = "俺達が準備して待っていると、賑やかな声が聞こえてきた――"
translation = "우리들이 준비하며 기다리고 있자, 북적거리는 목소리가 들려왔다――"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あっ、いたいた！\u3000お～い、クロト～、アナ～、サーシャさ～ん！」"
translation = "「앗, 찾았다 찾았다! 어~이, 쿠로토~, 아나~, 사샤 씨~!」"

[[dialogue]]
speaker = "サーシャ"
original = "「ヴィーナスちゃん、マトイちゃん、おかえりなさ～い♪\u3000お姉ちゃん会いたかったわ～♪」"
translation = "「비너스짱, 마토이짱, 어서 와~♪ 언니는 보고 싶었단다~♪」"

[[dialogue]]
speaker = "マトイ"
original = "「あはは、ただいまです～。すみません、少し集合時間に遅れちゃいました」"
translation = "「아하하, 다녀왔습니다~. 죄송해요, 집합 시간보다 조금 늦어버렸네요.」"

[[dialogue]]
speaker = "マトイ"
original = "「皆で集まって花火やるって知ったら、ヴィーナスが差し入れ花火買うって言い出して聞かなくて……」"
translation = "「다 같이 모여서 불꽃놀이를 한다고 하니까, 비너스가 찬조용 불꽃을 사겠다고 고집을 부려서……」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「じゃ～ん！\u3000やるなら派手にやりたいと思って、沢山買い込んできたわよ！」"
translation = "「쨔잔! 할 거면 화려하게 하고 싶어서 잔뜩 사 왔어!」"

[[dialogue]]
speaker = "アナ"
original = "「おかえりなさい、お２人共。それにフィオナ先輩も、お忙しい中、参加して頂きありがとうございます」"
translation = "「어서 오세요, 두 분 다. 그리고 피오나 선배도 바쁘신 와중에 참가해 주셔서 감사합니다.」"

[[dialogue]]
speaker = "フィオナ"
original = "「いえいえ、こちらこそお招き頂きありがとうございます、アナさん」"
translation = "「아니에요, 오히려 초대해 주셔서 감사합니다, 아나 씨.」"

[[dialogue]]
speaker = "フィオナ"
original = "「サバイバル合宿にも参加したかったんですが、スケジュールが合わなくて……」"
translation = "「서바이벌 합숙에도 참가하고 싶었습니다만, 일정이 맞지 않아서……」"

[[dialogue]]
speaker = "アナ"
original = "「急に決まった合宿でしたから、こちらこそすみませんでした。でも、花火だけでも来て頂けて嬉しいです」"
translation = "「갑작스럽게 결정된 합숙이었으니까 저희야말로 죄송했습니다. 그래도 불꽃놀이만이라도 와주셔서 기뻐요.」"

[[dialogue]]
speaker = "フィオナ"
original = "「ふふっ、仕事を頑張って、何とかスケジュール空けちゃいました。ちょっとだけでも参加したかったので」"
translation = "「후훗, 일을 열심히 해서 어떻게든 일정을 비워버렸어요. 조금이라도 참가하고 싶었거든요.」"

[[dialogue]]
speaker = "リップル"
original = "「イェ～イ！\u3000もちろんワタシも参加しますよ～♪」"
translation = "「예~이! 물론 나리도 참가하겠마시타~♪」"

[[dialogue]]
speaker = "リップル"
original = "「友達と一緒に花火スルのは、ワタシもやりたかったことデスから♪」"
translation = "「친구와 함께 불꽃놀이 하기는 나리도 해보고 싶었던 것이었나리♪」"

[[dialogue]]
speaker = "unk"
original = "これで合宿メンバー、全員集合だな"
translation = "이걸로 합숙 멤버 전원 집합이군."

[[dialogue]]
speaker = "アナ"
original = "「それじゃあ、夏の締め括りとして、花火大会を開催しましょう」"
translation = "「그럼 여름의 마무리로서 불꽃놀이 대회를 개최하죠.」"

[[dialogue]]
speaker = "サーシャ"
original = "「お～♪」"
translation = "「오~♪」"

[[dialogue]]
speaker = "unk"
original = "アナが事前に用意していた物に加え、ヴィーナスが大量に手持ち花火を買って来たので、豪勢な花火大会になった――"
translation = "아나가 미리 준비해둔 것에 더해 비너스가 대량의 수동 불꽃을 사 온 덕분에 호화로운 불꽃놀이 대회가 되었다――"

[[dialogue]]
speaker = "アナ"
original = "「ふおぉ……！\u3000これが花火ですか。綺麗なのもありますが、何やら気分が高揚しますね」"
translation = "「후오오……! 이것이 불꽃놀이인가요. 예쁘기도 하지만 왠지 기분이 고양되는군요.」"

[[dialogue]]
speaker = "マトイ"
original = "「えっ、アナは花火やるの初めて！？」"
translation = "「엣, 아나는 불꽃놀이 하는 거 처음이야!?」"

[[dialogue]]
speaker = "アナ"
original = "「ええ、実は。前から興味があったので、夏になったら是非やりたいと思っていたんです」"
translation = "「네, 사실은요. 전부터 흥미가 있어서 여름이 되면 꼭 해보고 싶다고 생각했어요.」"

[[dialogue]]
speaker = "フィオナ"
original = "「アナさんはそういえば、１年生でしたね」"
translation = "「아나 씨는 그러고 보니 1학년이었죠.」"

[[dialogue]]
speaker = "マトイ"
original = "「そっか、考えてみれば去年まで天界にいたんだもんね。花火をやったことがなくても不思議はないのか……」"
translation = "「그렇네, 생각해보면 작년까지 천계에 있었으니까. 불꽃놀이를 해본 적이 없어도 이상할 건 없나……」"

[[dialogue]]
speaker = "サーシャ"
original = "「ふふっ、私も１年生の夏に花火を初めてやったのよね～。当時を思い出すわ～」"
translation = "「후훗, 나도 1학년 여름에 불꽃놀이를 처음 해봤었지~. 그때가 생각나네~」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ならアナ、もっとガンガン花火を使っていいわよ！\u3000私みたいに、両手の指の間に８本持ちで！」"
translation = "「그럼 아나, 더 팍팍 불꽃을 써도 돼! 나처럼 양손 손가락 사이에 8개씩 끼워서!」"

[[dialogue]]
speaker = "マトイ"
original = "「いや点け過ぎでしょ！\u3000煙が凄いことになってるから！」"
translation = "「아니, 너무 많이 붙였잖아! 연기가 엄청나다고!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「見て見て！\u3000炎の翼みたいでしょ！」"
translation = "「봐봐! 화염의 날개 같지!」"

[[dialogue]]
speaker = "リップル"
original = "「ワオ♪\u3000ヴィーナス、カッコイイ！\u3000ワタシもやりたいで～す♪」"
translation = "「와오♪ 비너스, 멋지나리! 나리도 하고 싶마시타~♪」"

[[dialogue]]
speaker = "フィオナ"
original = "「ふふっ、リップルさん、真似したがるんじゃないかと思ってました」"
translation = "「후훗, 리플 씨는 따라 하고 싶어 할 줄 알았어요.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「それにしても、花火だけじゃなくて、私もサバイバル合宿に参加したかったわ！\u3000仲間外れにしてずるいわよ！」"
translation = "「그나저나 불꽃놀이뿐만 아니라 나도 서바이벌 합숙에 참가하고 싶었어! 따돌리다니 치사해!」"

[[dialogue]]
speaker = "アナ"
original = "「すみません。３人で話してた際に、唐突に思い付いて始めたので……」"
translation = "「죄송합니다. 셋이서 이야기하다가 돌발적으로 떠올라 시작한 거라……」"

[[dialogue]]
speaker = "サーシャ"
original = "「私も最初は、本当にやるの？\u3000ってビックリしたわ～」"
translation = "「나도 처음에는 정말 하는 거야? 하고 깜짝 놀랐어~」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「事情は聞いてるけど……それでもやっぱり羨ましい！\u3000だから、今度の長い休みの時は、みんな揃ってやりましょう！」"
translation = "「사정은 들었지만…… 그래도 역시 부러워! 그러니까 다음 긴 휴일 때는 다 같이 모여서 하자!」"

[[dialogue]]
speaker = "マトイ"
original = "「確かに、サバイバル風の合宿なら、私もやりたかったかも」"
translation = "「확실히 서바이벌풍 합숙이라면 나도 해보고 싶었을지도.」"

[[dialogue]]
speaker = "リップル"
original = "「私も今度は、最初から参加したいで～す！」"
translation = "「나리도 다음엔 처음부터 참가하고 싶마시타~!」"

[[dialogue]]
speaker = "unk"
original = "やるとしたら、冬休みとか？"
translation = "한다면 겨울방학 같은 때인가?"

[[dialogue]]
speaker = "フィオナ"
original = "「なるほど。リゾート結界は常夏ですから、冬でも今回みたいな合宿が出来ますしね」"
translation = "「과연. 리조트 결계는 상하니까 겨울이라도 이번 같은 합숙을 할 수 있겠네요.」"

[[dialogue]]
speaker = "フィオナ"
original = "「今度は是非、流星学園の星徒会も参加させて下さい。前回の合宿の話をしたら皆、凄く羨ましいって食いついてましたから」"
translation = "「다음엔 꼭 유성학원의 성도회도 참가시켜 주세요. 지난 합숙 이야기를 했더니 다들 엄청 부러워하며 달려들었거든요.」"

[[dialogue]]
speaker = "リップル"
original = "「フィオナの友達ともワタシ、仲良くなりたいで～す♪」"
translation = "「피오나의 친구들과도 나리, 친해지고 싶마시타~♪」"

[[dialogue]]
speaker = "リップル"
original = "「このリゾート結界のプライベートビーチは、今後も両校の星徒会室に空間を繋げておきますので、自由に使ってクダさい！」"
translation = "「이 리조트 결계의 프라이빗 비치는 앞으로도 양쪽 학교 성도회실에 공간을 연결해둘 테니 자유롭게 사용해 구다사이!」"

[[dialogue]]
speaker = "マトイ"
original = "「えっ、本当に！？\u3000それって凄くない！？」"
translation = "「엣, 정말!? 그거 대단하지 않아!?」"

[[dialogue]]
speaker = "リップル"
original = "「ハイ♪\u3000夏の海はフメツで～す♪」"
translation = "「하이♪ 여름 바다는 불멸이나리~♪」"

[[dialogue]]
speaker = "サーシャ"
original = "「あらあら、うふふ♪\u3000今後は水着でいる機会も多くなりそうね～」"
translation = "「어머어머, 우후후♪ 앞으로는 수영복 차림으로 있을 기회가 많아지겠네~」"

[[dialogue]]
speaker = "リップル"
original = "「それと、花火大会でもワタシ、とっておきを用意してきてるんデスよ～♪」"
translation = "「그리고 불꽃놀이 대회에서도 나리, 야심 차게 준비해온 게 있마시타~♪」"

[[dialogue]]
speaker = "リップル"
original = "「海の方を御覧アレで～す！\u3000そぉいっ♪」"
translation = "「바다 쪽을 보시라나리~! 소잇♪」"

[[dialogue]]
speaker = "サーシャ"
original = "「きゃ～♪\u3000凄いスゴ～い！\u3000打ち上げ花火ね～♪」"
translation = "「꺄~♪ 대단해 대단해~! 쏘아 올리는 불꽃놀이네~♪」"

[[dialogue]]
speaker = "リップル"
original = "「ハイ♪\u3000頑張ってツクリました！」"
translation = "「하이♪ 열심히 만들었마시타!」"

[[dialogue]]
speaker = "リップル"
original = "「まだまだ沢山ありますよ～！\u3000じゃんじゃん連発しま～す♪」"
translation = "「아직 잔뜩 있마시타~! 펑펑 연발하겠나리~♪」"

[[dialogue]]
speaker = "アナ"
original = "「おぉ～……！\u3000これが打ち上げ花火……！」"
translation = "「오오~……! 이것이 쏘아 올리는 불꽃놀이……!」"

[[dialogue]]
speaker = "アナ"
original = "「動画で見るのとは全然迫力が違います……！\u3000体に響いて……綺麗で、感動します」"
translation = "「영상으로 보는 것과는 전혀 박력이 달라요……! 몸에 울리고…… 예뻐서 감동적입니다.」"

[[dialogue]]
speaker = "unk"
original = "た～まや～！"
translation = "타~마야~!"

[[dialogue]]
speaker = "アナ"
original = "「あっ、会長。それは花火伝統の掛け声ですね。今なら何となく、言いたくなる気持ちが分かります」"
translation = "「앗, 회장. 그것은 불꽃놀이의 전통적인 구호군요. 지금이라면 왠지 말하고 싶은 기분을 알 것 같습니다.」"

[[dialogue]]
speaker = "サーシャ"
original = "「か～ぎや～♪\u3000うふふ、花火大会とは言ってたけど、まさかこんな大きな打ち上げ花火まで見られるとは思わなかったわ～♪」"
translation = "「카~기야~♪ 우후후, 불꽃놀이 대회라고는 했지만 설마 이렇게 큰 불꽃까지 볼 수 있을 줄은 몰랐어~♪」"

[[dialogue]]
speaker = "サーシャ"
original = "「――アナちゃん、ありがとうね」"
translation = "「――아나짱, 고마워.」"

[[dialogue]]
speaker = "アナ"
original = "「いえ、打ち上げ花火はリップルさんのサプライズですから、私も計算外のことで……」"
translation = "「아니요, 쏘아 올리는 불꽃은 리플 씨의 서프라이즈라서 저도 계산 밖의 일이라……」"

[[dialogue]]
speaker = "サーシャ"
original = "「ううん。そうじゃなくて、私の為に合宿をしてくれたこと♪」"
translation = "「으응. 그게 아니라 나를 위해 합숙을 해준 것 말이야♪」"

[[dialogue]]
speaker = "サーシャ"
original = "「私は、今年が学園で過ごす最後の夏でしょう？\u3000だからアナちゃんは、サバイバル合宿をしようって言ってくれたのよね？」"
translation = "「나는 올해가 학원에서 보내는 마지막 여름이지? 그래서 아나짱은 서바이벌 합숙을 하자고 말해준 거지?」"

[[dialogue]]
speaker = "アナ"
original = "「……はて、何のことでしょう？」"
translation = "「……글쎄요, 무슨 말씀이신지?」"

[[dialogue]]
speaker = "サーシャ"
original = "「誤魔化しても分かっちゃうわよ～。こう見えてもお姉ちゃん、元星徒会長なんだから」"
translation = "「얼버무려도 다 안단다~. 이래 봬도 언니, 전임 성도회장이니까.」"

[[dialogue]]
speaker = "サーシャ"
original = "「アナちゃんがヴィーナスちゃんみたいに積極的なことを言い出せば、おや？\u3000って思うくらいには、ちゃんと見てるのよ？」"
translation = "「아나짱이 비너스짱처럼 적극적인 말을 꺼내면 어라? 싶을 정도로 제대로 보고 있단다?」"

[[dialogue]]
speaker = "アナ"
original = "「……まあ、サーシャ先輩にはお世話になってますし、私は一応、星徒会の副会長ですから」"
translation = "「……뭐, 사샤 선배께는 신세를 지고 있고, 저는 일단 성도회의 부회장이니까요.」"

[[dialogue]]
speaker = "アナ"
original = "「星徒会の後輩として、役目を果たしたまでです」"
translation = "「성도회 후배로서 소임을 다했을 뿐입니다.」"

[[dialogue]]
speaker = "サーシャ"
original = "「ん～！\u3000アナちゃ～ん♪」"
translation = "「음~! 아나짱~♪」"

[[dialogue]]
speaker = "アナ"
original = "「おうっ……サーシャ先輩、おっぱいで息ができないです」"
translation = "「윽…… 사샤 선배, 가슴 때문에 숨을 쉴 수 없어요.」"

[[dialogue]]
speaker = "サーシャ"
original = "「だって、アナちゃんが抱き締めたくなるようなことを言うんだもの♪」"
translation = "「그치만 아나짱이 껴안아 주고 싶어질 만한 소릴 하는걸♪」"

[[dialogue]]
speaker = "サーシャ"
original = "「私ね、魔界を出て、新星学園に来て本当に良かったわ」"
translation = "「나 말이야, 마계를 나와서 신성학원에 오길 정말 잘했다고 생각해.」"

[[dialogue]]
speaker = "サーシャ"
original = "「こうして、皆に出会えたから」"
translation = "「이렇게 모두를 만날 수 있었으니까.」"

[[dialogue]]
speaker = "サーシャ"
original = "「家族みたいに大切に思える皆と出会えて、私とっても幸せよ」"
translation = "「가족처럼 소중하게 느껴지는 모두와 만날 수 있어서 나 정말 행복해.」"

[[dialogue]]
speaker = "unk"
original = "そう言われたら、来年も夏合宿しないとですね"
translation = "그렇게 말씀하신다면 내년에도 여름 합숙을 해야겠네요."

[[dialogue]]
speaker = "アナ"
original = "「確かに。家族なら、卒業しても関係ないですから」"
translation = "「확실히. 가족이라면 졸업해도 상관없으니까요.」"

[[dialogue]]
speaker = "サーシャ"
original = "「あ～ん<emoji=heart04>\u3000会長くんもありがと～♪\u3000ぎゅ～っ<emoji=heart04>」"
translation = "「아앙<emoji=heart04> 회장군도 고마워~♪ 꼬옥~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "サーシャさん、息が苦しいです"
translation = "사샤 씨, 숨이 막혀요."

[[dialogue]]
speaker = "サーシャ"
original = "「あらあら、うふふ♪\u3000ごめんなさい、嬉しくなっちゃって♪」"
translation = "「어머어머, 우후후♪ 미안해, 기뻐져서 그만♪」"

[[dialogue]]
speaker = "サーシャ"
original = "「――お姉ちゃん、今からとっても、来年が楽しみだわ♪」"
translation = "「――언니는 지금부터 정말로 내년이 기대된단다♪」"

[[dialogue]]
speaker = "unk"
original = "そう言って皆と一緒に花火を見上げながら、サーシャさんは嬉しそうな笑顔を浮かべるのだった。"
translation = "그렇게 말하며 모두와 함께 불꽃을 올려다보며, 사샤 씨는 기쁜 듯한 미소를 짓는 것이었다."

