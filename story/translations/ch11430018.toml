[[dialogue]]
speaker = "unk"
original = "ラファエロがアテネスへと帰還したその晩のこと。"
translation = "라파엘로가 아테네스로 귀환한 그날 밤의 일."

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「改めて……ただいま、館長」"
translation = "「다시 한번…… 다녀왔어요, 관장님.」"

[[dialogue]]
speaker_original = "館長"
speaker_translation = "관장"
original = "「おかえり、ラファエロ。向こうの世界はどうだった？」"
translation = "「어서 와, 라파엘로. 저쪽 세계는 어땠어?」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「凄いの一言では説明できないね。見るもの触れるもの、全てが初めてで、とても刺激的だったよ」"
translation = "「대단하다는 한마디로는 설명할 수 없지. 보는 것 만지는 것, 모든 것이 처음이라, 매우 자극적이었어.」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「とてつもないインスピレーションを受けた。まだまだ、ぼくは素晴らしい作品を生み出せるよ。期待しててね、館長」"
translation = "「엄청난 영감을 받았어. 아직, 나는 훌륭한 작품을 만들어낼 수 있어. 기대하고 있어, 관장님.」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「ちなみにこの衣装も、向こうの世界で得たものなんだ」"
translation = "「참고로 이 의상도, 저쪽 세계에서 얻은 거야.」"

[[dialogue]]
speaker_original = "館長"
speaker_translation = "관장"
original = "「これは……なかなか大胆だな……」"
translation = "「이건…… 상당히 대담하군……」"

[[dialogue]]
speaker = "unk"
original = "まるで踊り子のような、露出が多めの衣装を身にまとうラファエロの姿に思わず息を呑む。"
translation = "마치 무희 같은, 노출이 많은 의상을 입은 라파엘로의 모습에 무심코 숨을 삼킨다."

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「ふふ、向こうも良い人が多くて、とても楽しくて素晴らしい世界だった……けどね」"
translation = "「후후, 저쪽도 좋은 사람이 많아서, 매우 즐겁고 훌륭한 세계였어…… 하지만 말이야.」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「向こうには、きみがいない」"
translation = "「저쪽에는, 네가 없어.」"

[[dialogue]]
speaker = "unk"
original = "寂しそうに呟きながら距離を詰めてきたラファエロは、しなやかな指を俺の頬にあてがい、顎までなぞる。"
translation = "외로운 듯 중얼거리며 거리를 좁혀온 라파엘로는, 유연한 손가락을 내 뺨에 대고, 턱까지 훑는다."

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「こうして、きみに触れたかった。肌の温もりを感じたかった。きみに愛されたかった。だから……」"
translation = "「이렇게, 너를 만지고 싶었어. 살결의 온기를 느끼고 싶었어. 너에게 사랑받고 싶었어. 그래서……」"

[[dialogue]]
speaker = "unk"
original = "そしてラファエロは、蠱惑的な笑みを浮かべて──"
translation = "그리고 라파엘로는, 고혹적인 미소를 지으며──"

[[dialogue]]
speaker = "unk"
original = "俺を仰向けに押し倒すと、慣れた手つきで俺の衣服をはぎ取り、股間を跨いで腰を下ろした。"
translation = "나를 똑바로 눕혀 덮치자, 익숙한 손길로 내 옷을 벗겨내고, 사타구니를 타고 앉았다."

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「きみのここ、はぁぁ<emoji=heart04>\u3000もうこんなに硬くなって、先っぽから蜜を垂らしてる……いやらしいおち○ちんだ、ふふふ<emoji=heart04>」"
translation = "「너의 여기, 하아아❤️ 벌써 이렇게 딱딱해져서, 끝에서 꿀을 흘리고 있어…… 야한 자지야, 후후후❤️」"

[[dialogue]]
speaker = "unk"
original = "ラファエロが体を前後に揺すり、いきり立ったペニスに愛液を絡ませると、くちゅくちゅと悩ましい水音が鳴る。"
translation = "라파엘로가 몸을 앞뒤로 흔들며, 발기한 페니스에 애액을 휘감자, 츗츗 하고 고민스러운 물소리가 울린다."

[[dialogue]]
speaker_original = "館長"
speaker_translation = "관장"
original = "「くっ……今日は随分と積極的じゃないか……？」"
translation = "「큭…… 오늘은 꽤나 적극적이군……?」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「そういうきみだって、あぁっ<emoji=heart04>\u3000ぼくが欲しくて、仕方ないくせに<emoji=heart04>\u3000早く入れたくて……仕方がないんだろう？\u3000んんぅ<emoji=heart04>」"
translation = "「그런 너야말로, 아앗❤️ 내가 원해서, 어쩔 수 없잖아❤️ 빨리 넣고 싶어서…… 어쩔 수 없지? 응으❤️」"

[[dialogue]]
speaker = "unk"
original = "図星を突かれたら、口を<ruby>噤<rt>つぐ</rt></ruby>むしかない。"
translation = "정곡을 찔리면, 입을 다물 수밖에 없다."

[[dialogue]]
speaker = "unk"
original = "ラファエロ不在の間、自慰すらしていなかったペニスは、彼女の煽情的な姿を見ただけで反応してしまっていたくらいだ。"
translation = "라파엘로 부재중, 자위조차 하지 않았던 페니스는, 그녀의 선정적인 모습을 본 것만으로 반응하고 있었을 정도다."

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「はぁ……<emoji=heart04>\u3000向こう、ではね……赤ちゃんの父親捜しを、手伝ったりしたんだ<emoji=heart04>」"
translation = "「하아……❤️ 저쪽, 에서는 말이야…… 아기의 아버지 찾기를, 돕거나 했어❤️」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「父親は誰だなんて話を、していたものだからね……はふぅ<emoji=heart04>\u3000その時にふと、きみの顔が思い浮かんでしまって……<emoji=heart04>」"
translation = "「아버지는 누구냐는 이야기를, 하고 있었으니까 말이야…… 하푸우❤️ 그때 문득, 네 얼굴이 떠올라 버려서……❤️」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「きみとぼくが結ばれることまで、想像して……<emoji=heart04>\u3000はぁあっ<emoji=heart04>\u3000愛の結晶が、欲しくなってしまったよ<emoji=heart04>」"
translation = "「너와 내가 맺어지는 것까지, 상상해서……❤️ 하아앗❤️ 사랑의 결정이, 갖고 싶어졌어❤️」"

[[dialogue]]
speaker_original = "館長"
speaker_translation = "관장"
original = "「ま、待て、ラファエロ……このまま、するのか……？」"
translation = "「기, 기다려, 라파엘로…… 이대로, 할 건가……?」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「ふふ、おかしなことを言うね<emoji=heart04>\u3000きみは、ぼくのおま○こに……おち○ちんを入れて射精する<emoji=heart04>」"
translation = "「후후, 이상한 소리를 하네❤️ 너는, 내 보지에…… 자지를 넣고 사정해❤️」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「お腹の中で、はぁぁ<emoji=heart04>\u3000ぼくの卵子ときみの精子が結びつき、愛の結晶が誕生する……<emoji=heart04>\u3000もう何度も愛し合ってるというのに、今更、性教育が必要かな？」"
translation = "「뱃속에서, 하아아❤️ 나의 난자와 너의 정자가 결합해, 사랑의 결정이 탄생해……❤️ 벌써 몇 번이나 사랑을 나누고 있는데, 이제 와서, 성교육이 필요할까?」"

[[dialogue]]
speaker_original = "館長"
speaker_translation = "관장"
original = "「そういう意味じゃなくって──んんぅ！？」"
translation = "「그런 의미가 아니라── 응으!?」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「ちゅ、んぅ、んっ、ちゅ<emoji=heart04>\u3000んふぅ、ちゅ、ちゅっ、ちゅぷ、ちゅっ<emoji=heart04>\u3000んぅぢゅ、ちゅばっ……<emoji=heart04>」"
translation = "「츄, 응우, 읏, 츄❤️ 응후우, 츄, 츄, 츄프, 츄❤️ 응우쥬, 츄밧……❤️」"

[[dialogue]]
speaker = "unk"
original = "舌と舌が触れ合い、唾液をかき回す。"
translation = "혀와 혀가 맞닿아, 타액을 휘젓는다."

[[dialogue]]
speaker = "unk"
original = "口内で鳴る粘ついた音が鼓膜に直接響いて、脳を揺らした。"
translation = "구강 내에서 울리는 끈적한 소리가 고막에 직접 울려, 뇌를 흔들었다."

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「ぷはぁ……きみはめいっぱい、気持ちよくなるだけでいいのさ<emoji=heart04>\u3000最後の最後まで、ぼくの膣内でね<emoji=heart04>」"
translation = "「푸하…… 너는 잔뜩, 기분 좋아지기만 하면 돼❤️ 마지막까지 마지막까지, 내 질내에서 말이야❤️」"

[[dialogue]]
speaker = "unk"
original = "激しく俺を求めるラファエロの囁きに、ペニスははち切れんばかりに張り詰める。"
translation = "격렬하게 나를 원하는 라파엘로의 속삭임에, 페니스는 터질 듯이 팽팽해진다."

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「ぼくがいない間も、出したくて仕方なかったんだろう……？\u3000はぁぁんっ<emoji=heart04>\u3000たっぷりと溜め込んでる、濃厚な精子……」"
translation = "「내가 없는 동안에도, 싸고 싶어서 어쩔 수 없었겠지……? 하아앙❤️ 잔뜩 쌓아두고 있는, 농후한 정자……」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「ぼくの膣内に、ぜぇんぶ吐き出して……<emoji=heart04>\u3000あぁぁっ<emoji=heart04>\u3000受精させて……ぼくを、ママにしてくれ<emoji=heart04>\u3000んんぅっ<emoji=heart04>」"
translation = "「내 질내에, 전ー부 뱉어내서……❤️ 아아앗❤️ 수정시켜줘…… 나를, 엄마로 만들어줘❤️ 응으❤️」"

[[dialogue]]
speaker = "unk"
original = "ペニスの先端が、ラファエロの膣口にあてがわれた──そう思った次の瞬間。"
translation = "페니스의 선단이, 라파엘로의 질구에 대어졌다── 그렇게 생각한 다음 순간."

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「んぅうぅうぅぅぅぅっ<emoji=heart04>」"
translation = "「응우우우우우우❤️」"

[[dialogue]]
speaker = "unk"
original = "ペニスは一気に根元までラファエロの膣内へと飲み込まれ、亀頭が膣奥を叩いた。"
translation = "페니스는 단숨에 뿌리까지 라파엘로의 질내로 집어삼켜져, 귀두가 질 안쪽을 때렸다."

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「んぁ、はっ、はぁっ<emoji=heart04>\u3000たっ、体重をかけすぎて、しまったかなっ<emoji=heart04><emoji=heart04>\u3000ズンッて……おち○ちんで、お腹を貫かれたみたいな衝撃だっ<emoji=heart04><emoji=heart04>」"
translation = "「응아, 하, 하앗❤️ 체, 체중을 너무 실어버렸나❤️❤️ 즌 하고…… 자지로, 배를 꿰뚫린 것 같은 충격이야❤️❤️」"

[[dialogue]]
speaker = "unk"
original = "じゅくじゅくにぬかるんだ膣肉の内側は、火傷しそうなほどに熱く、キツいほどに狭い。"
translation = "질척질척하게 진흙탕이 된 질육의 안쪽은, 화상을 입을 정도로 뜨겁고, 아플 정도로 좁다."

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「くぁ、はっ、はぁ、あぁぁ<emoji=heart04>\u3000ふ、といっ……？\u3000きみのって、こんなに大きかったかいっ<emoji=heart04><emoji=heart04>」"
translation = "「쿠아, 하, 하아, 아아아❤️ 두, 꺼워……? 너의 건, 이렇게나 컸었나❤️❤️」"

[[dialogue]]
speaker_original = "館長"
speaker_translation = "관장"
original = "「ラファエロの中が狭すぎて……こんなに強く締めつけられたら、すぐにでもっ……！」"
translation = "「라파엘로의 안이 너무 좁아서…… 이렇게 강하게 조여지면, 당장이라도……!」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「──出しちゃって、いいんだよ？<emoji=heart04><emoji=heart04>」"
translation = "「──내도, 괜찮아?💕💕」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「ふぅうっ<emoji=heart04>\u3000んっ……ふぅっ、んんぅっ<emoji=heart04>\u3000はあぁああっ<emoji=heart04>」"
translation = "「후우웃💕 응……후우웃, 응응우웃💕 하아아앗💕」"

[[dialogue]]
speaker = "unk"
original = "俺の下腹部に乗ったまま、ラファエロは腰を浮かしては揺らし、舐めあげるような緩やかなピストンでペニスに摩擦を与えてくる。"
translation = "내 하복부 위에 올라탄 채, 라파에로는 허리를 띄웠다 내리며 흔들고, 핥아 올리는 듯한 완만한 피스톤으로 자지에 마찰을 가해온다."

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「はぁぁぁ<emoji=heart04>\u3000ぼくの体を好きにできるのは、きみだけの特権なんだから……<emoji=heart04>\u3000あぁっ、好きなタイミングで、好きなだけ出してくれて構わないよ……っ<emoji=heart04>」"
translation = "「하아아앙💕 내 몸을 마음대로 할 수 있는 건, 너만의 특권이니까……💕 아앗, 원하는 타이밍에, 원하는 만큼 싸도 괜찮아……💕」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「はぁ、あっ……はぁんっ<emoji=heart04>\u3000パンパンに膨れ上がって、カチカチだ……<emoji=heart04>\u3000雄々しくて、大きくて、ぼくを気持ちよくしてくれるおち○ちん……<emoji=heart04>」"
translation = "「하아, 앗……하앙💕 빵빵하게 부풀어 올라서, 딱딱해……💕 늠름하고, 크고, 나를 기분 좋게 해주는 자지……💕」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「ぼくがいない間も……ぁんんっ<emoji=heart04>\u3000１人で慰めたりせずに、ぼくと交わる時のためにっ<emoji=heart04>\u3000あぁんっ<emoji=heart04>\u3000溜めておいてくれたのかな？」"
translation = "「내가 없는 동안에도……앙읏💕 혼자서 위로하거나 하지 않고, 나와 교미할 때를 위해서💕 아앙💕 모아두고 있었던 거야?」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「はぁぁ<emoji=heart04>\u3000んんぅ<emoji=heart04>\u3000ぼくだって、そうさ……<emoji=heart04>\u3000きみと交わる時のために、ずーっと、我慢してたんだ……<emoji=heart04>」"
translation = "「하아앙💕 응응우💕 나도, 그래……💕 너와 교미할 때를 위해서, 계속, 참고 있었던 거야……💕」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「ぼくのおま○こ……きみのが欲しくて、欲しくって<emoji=heart04>\u3000疼いちゃって……はぁぁんっ<emoji=heart04>\u3000もう限界だったんだぞ？」"
translation = "「내 보지……네 것이 갖고 싶어서, 너무 갖고 싶어서💕 쑤셔와서……하아앙💕 이제 한계였다고?」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「こっちに帰ってきて、あぁあっ<emoji=heart04>\u3000きみと目を会わせた瞬間に……襲い掛からなかったのを、褒めてほしいくらいだよ<emoji=heart04>\u3000はぁぁんっ<emoji=heart04>」"
translation = "「여기로 돌아와서, 아아앗💕 너와 눈을 마주친 순간에……덮치지 않은 걸, 칭찬해줬으면 할 정도야💕 하아앙💕」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「はぁあ、あぁっ、ぅんぅっ<emoji=heart04>\u3000禁欲、してたからかな……<emoji=heart04>\u3000あぁあっ<emoji=heart04>\u3000いつもよりおま○こが敏感でっ……<emoji=heart04>」"
translation = "「하아아, 아앗, 우응우💕 금욕, 하고 있어서일까……💕 아아앗💕 평소보다 보지가 민감해서……💕」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「きみのおち○ちんの形、硬さ、熱っ<emoji=heart04>\u3000はっきりわかる、んだっ……<emoji=heart04>\u3000ああぁんっ<emoji=heart04>」"
translation = "「네 자지의 모양, 딱딱함, 뜨거움💕 확실히 느껴져, ……💕 아아앙💕」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「はぁあ、あぁあっ……あんっ<emoji=heart04>\u3000ね、館長<emoji=heart04><emoji=heart04>\u3000ぼくの胸が高鳴っているの、んんぅ<emoji=heart04>\u3000直接伝わるだろう？」"
translation = "「하아아, 아아앗……앙💕 저기, 관장님💕💕 내 심장이 고동치는 거, 응응우💕 직접 전해지겠지?」"

[[dialogue]]
speaker = "unk"
original = "たわわなラファエロの乳房が俺の胸板と擦れ合う。肌と肌で鼓動が伝わり、熱い体温を感じる。"
translation = "탐스러운 라파에로의 유방이 내 가슴팍과 비벼진다. 살과 살이 맞닿아 고동이 전해지고, 뜨거운 체온을 느낀다."

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「きみとの交わりが、気持ちよすぎて……<emoji=heart04>\u3000あぁんっ<emoji=heart04>\u3000乳首も、こんなに勃ってしまっているんだ……<emoji=heart04>\u3000擦れるだけで、んっ、んぅ、ふぅぅ……きもちいいっ<emoji=heart04>」"
translation = "「너와의 교미가, 너무 기분 좋아서……💕 아앙💕 유두도, 이렇게나 서 버렸어……💕 스치는 것만으로도, 읏, 응우, 후우우……기분 좋아💕」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「んぁ、はっ、ああぁん<emoji=heart04>\u3000まずい、ねっ……ずっと、我慢してたからかなっ<emoji=heart04>\u3000ぼくもすぐに果てて、しまいそうだよっ……<emoji=heart04>」"
translation = "「응아, 핫, 아아앙💕 큰일이네……계속, 참고 있었으니까일까💕 나도 금방 가버릴 것 같앗……💕」"

[[dialogue]]
speaker = "unk"
original = "彼女の声から、次第に余裕の色が失われていくのが分かった。"
translation = "그녀의 목소리에서, 점차 여유가 사라져 가는 것을 알 수 있었다."

[[dialogue]]
speaker_original = "館長"
speaker_translation = "관장"
original = "「ラファエロ……」"
translation = "「라파에로……」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「んんんぅ<emoji=heart04>\u3000きみの、その声が聞きたかったんだっ<emoji=heart04>\u3000あぁぁ、ぼくを求めるその声がっ<emoji=heart04>\u3000あぁあんっ、あぁあっ<emoji=heart04>\u3000んあぁっ……はぁあんっ、あああっ<emoji=heart04>」"
translation = "「응응우💕 네가, 그 목소리로 불러주길 바랐어💕 아아아, 나를 원하는 그 목소리가💕 아아앙, 아아앗💕 응아앗……하아앙, 아아앗💕」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「館長のおち○ちんっ、ぼくの、いいとこに当たってるぅ<emoji=heart04>\u3000あぁあんっ<emoji=heart04>\u3000ふぁああっ……だめっ、全身が敏感になりすぎてっ<emoji=heart04>」"
translation = "「관장님의 자지, 내, 좋은 곳에 닿고 있어💕 아아앙💕 후아앗……안 돼, 온몸이 너무 민감해져서💕」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「んぅ、ごめんね、館長っ<emoji=heart04><emoji=heart04>\u3000１回、達してしまっても、いい、かなっ……<emoji=heart04>\u3000ちょっとだけっ、あんっ、んぅう<emoji=heart04>\u3000イッ、イク、イク、イッくぅっ<emoji=heart04>」"
translation = "「응우, 미안해, 관장님💕💕 한 번, 가버려도, 괜찮을까……💕 조금만, 앙, 응우우💕 가, 가, 가, 가버려어💕」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「んぅ……んんんぅ、イっくぅううぅぅぅぅっ<emoji=heart04>」"
translation = "「응우……응응응우, 가버려어어어어어어💕」"

[[dialogue]]
speaker = "unk"
original = "ただでさえ狭かったラファエロの膣内が、キュッと締めつけてくる。"
translation = "가뜩이나 좁았던 라파에로의 질 내부가, 꽉 조여온다."

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「はっ、はぁっ、あんっ<emoji=heart04>\u3000んんぅっ……んはぁあっ<emoji=heart04>\u3000あ、あああっ……感極まって、しまったよ……<emoji=heart04>」"
translation = "「핫, 하앗, 앙💕 응응우……응하앗💕 아, 아아앗……감정이 북받쳐서, 버렸어……💕」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「あんっ<emoji=heart04>\u3000久しぶりだから、いつもより感じやすくて……はぁああっ<emoji=heart04>\u3000からだが、ずっと……きもちいいままで<emoji=heart04>\u3000だけど、まだまだ、全然物足りないんだ……<emoji=heart04><emoji=heart04>」"
translation = "「앙💕 오랜만이라서, 평소보다 느끼기 쉬워서……하아아앗💕 몸이, 계속……기분 좋은 채로💕 하지만, 아직, 전혀 부족해……💕💕」"

[[dialogue]]
speaker_original = "館長"
speaker_translation = "관장"
original = "「俺だってまだまだだ。ラファエロと愛し合えてるのが、この上なく嬉しいよ」"
translation = "「나도 아직이야. 라파에로와 사랑을 나눌 수 있어서, 더할 나위 없이 기뻐.」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「んぁああっ<emoji=heart04>\u3000すぐそばで、囁かれたらっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000ふぁああっ……ぞくぞく、しちゃうじゃないかぁ……<emoji=heart04>」"
translation = "「응아아앗💕 바로 곁에서, 속삭여지면💕 앙💕 후아앗……찌릿찌릿, 해버리잖아……💕」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「ふぅ……んあぁっ、ひぁああっ<emoji=heart04>\u3000かたぁいおち○ちんっ<emoji=heart04>\u3000ぼくのおま○この形、確かめるみたいにぃっ……<emoji=heart04>」"
translation = "「후우……응아앗, 히아아앗<emoji=heart04> 딱딱한 자지……<emoji=heart04> 내 보지의 모양을, 확인하려는 것처럼……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「はぁあ<emoji=heart04>\u3000はぁぁっ、ふふふっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000ぼくだけの館長、ひとりじめだぁっ……<emoji=heart04>」"
translation = "「하아아<emoji=heart04> 하아앗, 후후훗<emoji=heart04> 앙<emoji=heart04> 나만의 관장님, 독차지야……<emoji=heart04>」"

[[dialogue]]
speaker_original = "館長"
speaker_translation = "관장"
original = "「ああ、もう離れるな……ずっとそばにいるんだぞ」"
translation = "「아아, 이제 떨어지지 마…… 계속 곁에 있는 거야.」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「ふわぁあぁんっ<emoji=heart04>\u3000ああぁっ……嬉しいっ、館長ぉ<emoji=heart04>\u3000ぼく、本当はね……ちょっとだけ不安で、寂しかったんだっ<emoji=heart04>」"
translation = "「후와아앙앗<emoji=heart04> 아아앗…… 기뻐, 관장님<emoji=heart04> 나, 사실은 말이야…… 조금 불안하고, 외로웠어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「だから……あんっ<emoji=heart04>\u3000もっと、もっと……きみを感じさせてっ<emoji=heart04>」"
translation = "「그러니까…… 앙<emoji=heart04> 더, 더…… 너를 느끼게 해줘……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「んぁあぁぅっ<emoji=heart04>\u3000ふわぁ、あっ、あぁああっ<emoji=heart04>\u3000すごっ、おま○こびりびり、するぅっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응아아우앗<emoji=heart04> 후와, 앗, 아아아앗<emoji=heart04> 굉장해, 보지가 부들부들, 떨려……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「あぁあんっ<emoji=heart04>\u3000あっ、あっ、あああっ<emoji=heart04>\u3000好きっ<emoji=heart04>\u3000好き、好きぃ<emoji=heart04>\u3000館長のこと、大好きぃ<emoji=heart04>」"
translation = "「아아앙앗<emoji=heart04> 앗, 앗, 아아앗<emoji=heart04> 좋아<emoji=heart04> 좋아, 좋아……<emoji=heart04> 관장님, 정말 좋아해……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「はぁああぁんっ<emoji=heart04>\u3000お腹の奥熱くなって、きみがますます好きになっちゃうっ<emoji=heart04>\u3000ぜったい、離れられなくなっちゃうじゃないかぁっ<emoji=heart04><emoji=heart04>」"
translation = "「하아아앙앗<emoji=heart04> 뱃속 깊은 곳이 뜨거워져서, 네가 점점 더 좋아져……<emoji=heart04> 절대, 떨어질 수 없게 되어버리잖아……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「あっ、あっ、あぁあんっ<emoji=heart04>\u3000んぅくっ、ふぅ、ふぅっ<emoji=heart04>\u3000あっ、あっ、あっ<emoji=heart04>\u3000腰っ、腰っ、止まんないっ<emoji=heart04>\u3000勝手に動いちゃうっ<emoji=heart04><emoji=heart04>」"
translation = "「앗, 앗, 아아앙앗<emoji=heart04> 응윽, 후우, 후우앗<emoji=heart04> 앗, 앗, 앗<emoji=heart04> 허리가, 허리가, 멈추질 않아……<emoji=heart04> 멋대로 움직여버려……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「館長のおち○ちんっ、おま○こにずぷずぷ擦ってっ<emoji=heart04>\u3000んぁあっ、あっ、またイッちゃう<emoji=heart04>\u3000イッちゃう、イッちゃうよぅっ……<emoji=heart04>」"
translation = "「관장님의 자지, 보지에 즈푸즈푸 비벼서……<emoji=heart04> 응아앗, 앗, 또 가버려……<emoji=heart04> 가버려, 가버린다고……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「んぃいっ<emoji=heart04>\u3000ふあっ、んぅ、ふっ、んぅ、んきゅうぅぅうぅぅんっ<emoji=heart04>\u3000ふぁ、あっ、あっ<emoji=heart04>\u3000またイッちゃったぁ……<emoji=heart04>」"
translation = "「응이잇<emoji=heart04> 후앗, 응우, 훗, 응우, 응큐우우우우웅앗<emoji=heart04> 후아, 앗, 앗<emoji=heart04> 또 가버렸어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「あんっ<emoji=heart04>\u3000あぁあんっ<emoji=heart04>\u3000何回イッても、足りないんだっ<emoji=heart04>\u3000はぁぁんっ<emoji=heart04>\u3000ぼくばっかりイッても、ダメなんだっ<emoji=heart04>」"
translation = "「앙앗<emoji=heart04> 아아앙앗<emoji=heart04> 몇 번을 가도, 부족해……<emoji=heart04> 하아앙앗<emoji=heart04> 나만 가버리면, 안 되는 거야……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「きみとの赤ちゃん、欲しいんだっ<emoji=heart04>\u3000きみの精子っ、アッツぅい子種っ<emoji=heart04>\u3000おま○こっ<emoji=heart04>\u3000おま○こに出してくれなきゃ、幸せになれないんだからぁっ……<emoji=heart04>」"
translation = "「너와의 아기가 갖고 싶어……<emoji=heart04> 네 정자, 뜨으거운 씨앗……<emoji=heart04> 보지에……<emoji=heart04> 보지에 싸주지 않으면, 행복해질 수 없단 말이야……<emoji=heart04>」"

[[dialogue]]
speaker_original = "館長"
speaker_translation = "관장"
original = "「本気なんだなっ……！」"
translation = "「진심이구나……!」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「当たり前だろぉっ<emoji=heart04><emoji=heart04>\u3000あぁあんっ<emoji=heart04>\u3000ぼくのおま○こ、堪能していいのはきみだけっ<emoji=heart04>\u3000一生きみだけなんだぞっ<emoji=heart04>」"
translation = "「당연하잖아……<emoji=heart04><emoji=heart04> 아아앙앗<emoji=heart04> 내 보지를, 마음껏 즐겨도 되는 건 너뿐이야……<emoji=heart04> 평생 너뿐이라고……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「たっぷり溜め込んでいる全部っ、ぼくの膣内に、出して、出してぇっ<emoji=heart04>\u3000ふわぁあぁんっ<emoji=heart04>\u3000……射精してぇっ<emoji=heart04>」"
translation = "「듬뿍 쌓아둔 거 전부, 내 질 안에, 싸줘, 싸줘……<emoji=heart04> 후와아앙앗<emoji=heart04> ……사정해줘……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「膣内っ……膣内に出してっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000きみの子種で、ぼくを孕ませてっ<emoji=heart04>\u3000あぁあんっ<emoji=heart04>\u3000ママにしてくれよぉ……<emoji=heart04>」"
translation = "「질 안에…… 질 안에 싸줘……<emoji=heart04> 앙<emoji=heart04> 네 씨앗으로, 나를 임신시켜줘……<emoji=heart04> 아아앙앗<emoji=heart04> 엄마로 만들어줘……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「あんっ<emoji=heart04>\u3000おち○ちん、ドクンって脈打ってっ<emoji=heart04>\u3000それいいっ<emoji=heart04>\u3000あっ、んんーっ<emoji=heart04>\u3000ふぁ、あっ、それ好きっ、好きっ、好きぃっ<emoji=heart04><emoji=heart04>」"
translation = "「앙앗<emoji=heart04> 자지가, 두근하고 맥박쳐……<emoji=heart04> 그거 좋아……<emoji=heart04> 앗, 응응……<emoji=heart04> 후아, 앗, 그거 좋아, 좋아, 좋아……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「館長のっ、すごぉっ<emoji=heart04>\u3000んっ、んんんっ、おち○ちんっ、膨れ上がってっ<emoji=heart04>\u3000あぁあん<emoji=heart04>\u3000膣奥っ、こつんこつんってぇ<emoji=heart04>」"
translation = "「관장님의, 굉장해……<emoji=heart04> 응, 응응응, 자지가, 부풀어 올라서……<emoji=heart04> 아아앙<emoji=heart04> 질 안쪽을, 콩콩 들이받아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「頭痺れちゃうっ<emoji=heart04>\u3000あぁあん<emoji=heart04>\u3000はっ、あっ、んぅふぅぅ<emoji=heart04>\u3000館長っ、館長も、イキそう、なんだよねっ<emoji=heart04>」"
translation = "「머리가 멍해져……<emoji=heart04> 아아앙<emoji=heart04> 핫, 앗, 응우후우우……<emoji=heart04> 관장님, 관장님도, 갈 것 같지……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「あっ、あ、んんっ、あぁあ、んんぅっ<emoji=heart04>\u3000このままイッてっ、膣内っ、膣内に、せぇしっ<emoji=heart04>\u3000ちょうだい、ちょぉだぁいっ<emoji=heart04>」"
translation = "「앗, 아, 응응, 아아아, 응응우앗<emoji=heart04> 이대로 가버려, 질 안에, 질 안에, 정액을……<emoji=heart04> 줘, 줘……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「きみの子種っ、溜め込んでたの全部っ<emoji=heart04>\u3000たっぷり注いで、ぼくを孕ませてっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000赤ちゃん作ろぉ<emoji=heart04>」"
translation = "「네 씨앗, 쌓아뒀던 거 전부……<emoji=heart04> 듬뿍 쏟아부어서, 나를 임신시켜줘……<emoji=heart04> 앙<emoji=heart04> 아기 만들자……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ラファエロの女性器は激しく収縮し、生物の本能のままに子種を搾り取ろうとしてくる。"
translation = "라파에로의 여성기는 격렬하게 수축하며, 생물의 본능 그대로 씨앗을 짜내려 하고 있다."

[[dialogue]]
speaker = "unk"
original = "俺もまた、愛する女性に遺伝子を植え付けたい生命の本能で、興奮が限界まで高まっていって──"
translation = "나 또한, 사랑하는 여성에게 유전자를 심어주고 싶은 생명의 본능으로, 흥분이 한계까지 치솟아──"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「あっ、あっ、あぁっ<emoji=heart04>\u3000膣奥っ、ごんごん当たってぇっ<emoji=heart04>\u3000ふぁ、あ、あっ、あっ<emoji=heart04>」"
translation = "「앗, 앗, 아아앗<emoji=heart04> 질 안쪽을, 쾅쾅 들이받아……<emoji=heart04> 후아, 아, 앗, 앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「これ好きっ、あっ、好き<emoji=heart04>\u3000館長っ、好き好き好き好きぃ<emoji=heart04>\u3000だい好きなのぉ<emoji=heart04>\u3000あぁあぁああぁっ、もっと愛してぇ<emoji=heart04><emoji=heart04>」"
translation = "「이거 좋아, 앗, 좋아<emoji=heart04> 관장님, 좋아 좋아 좋아 좋아……<emoji=heart04> 정말 좋아해……<emoji=heart04> 아아아아아앗, 더 사랑해줘……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「ひぅ、すごいっ、きもちいいっ<emoji=heart04>\u3000まだくるっ、ぎゅぅんって、昇って、くりゅぅうぅぅぅっ……<emoji=heart04>」"
translation = "「히우, 굉장해, 기분 좋아……<emoji=heart04> 아직 와, 꽉 하고, 올라와서, 가버려어어어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「あっ！\u3000あ、あああっ！\u3000んんっ、イクっ<emoji=heart04>\u3000もうイっちゃうぅ<emoji=heart04>\u3000んぁ、はんんぅ、あっ、あっ、あぁあぁぁっ<emoji=heart04>」"
translation = "「앗! 아, 아아앗! 응응, 가……<emoji=heart04> 이제 가버려……<emoji=heart04> 응아, 하응우, 앗, 앗, 아아아앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「はぁぅ、あぁあっ<emoji=heart04>\u3000いっしょ、いっしょにイこ？\u3000せぇし出してっ、どくどくあついの、ちょうだい、ちょぉだぁいっ<emoji=heart04>」"
translation = "「하우, 아아앗<emoji=heart04> 같이, 같이 가자? 정액 싸줘, 두근두근 뜨거운 거, 줘, 줘……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「あっあっあっあっあっ<emoji=heart04>\u3000イクイクっ<emoji=heart04>\u3000ああ、あぁ、ああ、あぁ、あぁあっ<emoji=heart04>\u3000イクイクイク、イっクぅぅうううっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗앗앗앗앗<emoji=heart04> 가 가 가……<emoji=heart04> 아아, 아아, 아아, 아아, 아아앗……<emoji=heart04> 가 가 가, 가버려어어어어……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「ふぁああっ<emoji=heart04>\u3000あああぁああぁあああぁぁああぁぁぁ～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후아아앗<emoji=heart04> 아아아아아아아아아아아아아아아아～～～～～앗……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ラファエロが絶頂に至ると同時、屹立したペニスから打ち上げ花火のように精が放たれた。"
translation = "라파에로가 절정에 다다름과 동시에, 발기한 페니스에서 불꽃놀이처럼 정액이 뿜어져 나왔다."

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「んぃっ！？\u3000んっ、んぅう、せぇしが、子宮叩いてるぅ<emoji=heart04>\u3000んぅふっ、ふああっ、あああああぁっ<emoji=heart04>」"
translation = "「응이잇!? 응, 응우우, 정액이, 자궁을 때리고 있어……<emoji=heart04> 응우훗, 후아앗, 아아아아앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「あああっ<emoji=heart04>\u3000んんん～～～っ<emoji=heart04><emoji=heart04>\u3000どくんどくんって精子、いっぱい、いっぱい出てるっ<emoji=heart04>\u3000ぼくのなか、満たされてるっ<emoji=heart04>」"
translation = "「아아앗<emoji=heart04> 응응～～～앗……<emoji=heart04><emoji=heart04> 두근두근하고 정액이, 잔뜩, 잔뜩 나오고 있어……<emoji=heart04> 내 안이, 채워지고 있어……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "精が吐き出される度、ラファエロの体がが小刻みに身震いし、膣肉も更なる子種をねだってペニスを締めつけてくる。"
translation = "정액이 토해질 때마다, 라파에로의 몸이 잘게 떨리고, 질육도 더 많은 씨앗을 원하며 페니스를 조여온다."

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「はぁっ！\u3000はっ、はぁ、はぅ……！\u3000んぁ、あっ、んんっ<emoji=heart04>\u3000はーっ、はーっ、はぅ、んんんっ<emoji=heart04>」"
translation = "「하앗! 핫, 하아, 하우……! 응아, 앗, 응응앗……<emoji=heart04> 하아, 하아, 하우, 응응응앗……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「まだ、ドクドクしてる……<emoji=heart04>\u3000こんなに出されたら、絶対、孕んじゃうぅ<emoji=heart04>\u3000はぁ、はぁあっ……ふふふ、館長、ぼくのこと、好きすぎだよっ<emoji=heart04><emoji=heart04>」"
translation = "「아직, 두근거리고 있어……<emoji=heart04> 이렇게나 싸버리면, 분명, 임신해버릴 거야……<emoji=heart04> 하아, 하아앗…… 후후후, 관장님, 나를 너무 좋아하는 거 아냐……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "お互いの体を駆け巡る絶頂の大波が収まるまで、俺たちは繋がったままでいた。"
translation = "서로의 몸을 휘감는 절정의 대파도가 가라앉을 때까지, 우리는 연결된 채로 있었다."

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「はーっ……はーっ……はーっ……<emoji=heart04>」"
translation = "「하아…… 하아…… 하아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "萎えたペニスが名残惜しそうにラファエロの膣口から抜け落ちる。"
translation = "죽은 페니스가 아쉬운 듯 라파에로의 질구에서 빠져나온다."

[[dialogue]]
speaker = "unk"
original = "ペニスを受け入れていた膣穴はまだ甘く開いたままで、吐き出したばかりの精液とラファエロの愛液が混じり合ったものが、どろりと垂れ落ちるように逆流した。"
translation = "페니스를 받아들이고 있던 질구는 아직도 달콤하게 열린 채였고, 막 토해낸 정액과 라파에로의 애액이 섞인 것이, 끈적하게 흘러내리듯 역류했다."

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「はぁ……ふぅ……んん……んぅ……<emoji=heart04>\u3000出しすぎたから、あふれちゃってるよ<emoji=heart04>\u3000もったいないなぁ<emoji=heart04>」"
translation = "「하아…… 후우…… 응응…… 응우……<emoji=heart04> 너무 많이 싸서, 넘쳐버리고 있어……<emoji=heart04> 아깝네……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「はぁ、はぁぁっ<emoji=heart04>\u3000すごい量、だね<emoji=heart04>\u3000男性は一度に、こんなに出せるものなのかと……感心しているよ<emoji=heart04>」"
translation = "「하아, 하아앗……<emoji=heart04> 굉장한 양, 이네……<emoji=heart04> 남자는 한 번에, 이렇게나 쏟아낼 수 있는 건가 하고…… 감탄하고 있어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "館長"
speaker_translation = "관장"
original = "「俺も驚いてる……気持ち良すぎて、頭がおかしくなるかと思った……」"
translation = "「나도 놀랐어…… 너무 기분 좋아서, 머리가 어떻게 되는 줄 알았어……」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「ふふふっ、それは何より<emoji=heart04>\u3000射精している時のきみの顔、とても可愛かったよ<emoji=heart04>」"
translation = "「후후훗, 그거 다행이네……<emoji=heart04> 사정할 때의 네 얼굴, 정말 귀여웠어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「ぼく自身も、ここまで乱れてしまうのは……想定外だったな<emoji=heart04>」"
translation = "「나 자신도, 여기까지 흐트러져 버리는 건…… 예상 밖이었어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「お互いの意外な一面が見られるのも、悪くはないね……<emoji=heart04>\u3000たまには禁欲するというのも、ありなのかな<emoji=heart04>」"
translation = "「서로의 의외의 일면을 볼 수 있는 것도, 나쁘지는 않네……<emoji=heart04> 가끔은 금욕이라는 것도, 괜찮을지도……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「さて……<emoji=heart04>\u3000きみとぼくとの、愛の結晶の名前を考えなくてはね<emoji=heart04>\u3000藝術家として、センスの発揮しどころだ<emoji=heart04>」"
translation = "「자……<emoji=heart04> 너와 나의, 사랑의 결정의 이름을 생각해야겠네……<emoji=heart04> 예술가로서, 센스를 발휘할 때야……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "下腹部を慈しむように撫でながらラファエロが呟く。その声色には既に母性が宿っているようにすら感じた。"
translation = "하복부를 소중히 쓰다듬으며 라파에로가 중얼거린다. 그 목소리에는 이미 모성이 깃들어 있는 것처럼조차 느껴졌다."

[[dialogue]]
speaker_original = "館長"
speaker_translation = "관장"
original = "「まだできると決まったわけじゃないだろう。気が早すぎないか？」"
translation = "「아직 생긴다고 결정된 것도 아닐 텐데. 너무 성급하지 않아?」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「ふふっ<emoji=heart04>\u3000物事は何事も迅速に、だよ<emoji=heart04>」"
translation = "「후훗……<emoji=heart04> 모든 일은 신속하게, 라구……<emoji=heart04>」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「それに遅かれ早かれだ<emoji=heart04>\u3000いつかぼくに宿るまで、何度でも愛し合うだけさ……<emoji=heart04>\u3000やはり、禁欲なんてしてる暇はなさそうだね<emoji=heart04>」"
translation = "「게다가 늦든 빠르든이야……<emoji=heart04> 언젠가 내게 깃들 때까지, 몇 번이고 사랑을 나누는 것뿐이야……<emoji=heart04> 역시, 금욕 같은 걸 할 틈은 없을 것 같네……<emoji=heart04>」"

[[dialogue]]
speaker_original = "館長"
speaker_translation = "관장"
original = "「……お手柔らかに頼む」"
translation = "「……살살 부탁한다.」"

[[dialogue]]
speaker_original = "ラファエロ"
speaker_translation = "라파엘로"
original = "「んふふっ<emoji=heart04>\u3000天才のぼくに目を付けられたのが、運のツキだ<emoji=heart04>\u3000観念したまえ、館長<emoji=heart04>」"
translation = "「응후훗……<emoji=heart04> 천재인 나에게 찍힌 게, 운이 없는 줄 알아야지……<emoji=heart04> 체념해, 관장님……<emoji=heart04>」"

