[[dialogue]]
speaker = "unk"
original = "第１話,出会いはショッキングピンク,P"
translation = "제1화, 만남은 쇼킹 핑크, P"

[[dialogue]]
speaker = "unk"
original = "新星学園１学年、アナの在籍するクラスにて──"
translation = "신성 학원 1학년, 아나가 재학 중인 반에서──"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「凄～い♪\u3000さすが男の子だね！\u3000キミのおかげでマジカル助かっちゃった☆」"
translation = "「굉장해~♪ 역시 남자애네! 너 덕분에 매지컬하게 살았어☆」"

[[dialogue]]
speaker_original = "男子生徒"
speaker_translation = "남학생"
original = "「い、いや、これくらい大したことないよ。また困ったことがあったら、遠慮せずに言ってね！\u3000じゃあ、オレはこれで」"
translation = "「아, 아니, 이 정도는 별거 아냐. 또 곤란한 일 있으면 사양 말고 말해줘! 그럼 난 이만」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「ありがと～♪\u3000その時はまたお願いするね☆」"
translation = "「고마워~♪ 그때 또 부탁할게☆」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「全く、ペットボトルの蓋くらい、自分で開けたらどうですか？\u3000リーリアさん」"
translation = "「정말이지, 페트병 뚜껑 정도는 스스로 열면 어때요? 리리아 씨」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「あっ、アナちゃん見てたの？\u3000だって～、蓋が固いやつだったし～」"
translation = "「앗, 아나짱 보고 있었어? 그치만~ 뚜껑이 꽉 닫혀 있었는걸~」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「いや、星騎士なんですから、握力に関してはノープロブレムでしょう」"
translation = "「아니, 성기사니까 악력에 관해서는 노 프라블럼이잖아요」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「う～ん……でも、可愛い美少女であるところの私に甘えられたり、頼られたりすることは、全生命体にとってウィンウィン☆\u3000幸せ、ってことでしょ？」"
translation = "「으음…… 하지만, 귀여운 미소녀인 나에게 어리광을 받아주거나 의지하게 되는 건, 전 생명체에게 있어서 윈윈☆ 행복하다는 거잖아?」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「だからちゃんと、人に甘えられる場面では、モテ系甘えムーヴを実践しないとね☆\u3000ラブ＆ピースだよ♪」"
translation = "「그러니까 제대로, 남에게 어리광 부릴 수 있는 상황에서는 인기 많은 어리광 무브를 실천해야지☆ 러브 & 피스야♪」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「異常思想」"
translation = "「이성 사상」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「てへぺろ☆」"
translation = "「데헤페로☆」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「それはそうとアナちゃん。今日の放課後、星徒会長さんを紹介して貰う約束、お願いね♪」"
translation = "「그건 그렇고 아나짱. 오늘 방과 후에 성도회장님 소개해주기로 한 약속, 부탁해♪」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ノープロブレム。既に会長にはアポを取ってあります」"
translation = "「노 프라블럼. 이미 회장님께는 약속을 잡아뒀어요」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「口では注意しつつも、可愛い私の為にお願い聞いてくれるなんて♪\u3000もう、ツンデレさんなんだから☆\u3000ハグしちゃうぞ～？」"
translation = "「입으로는 주의를 주면서도 귀여운 나를 위해 부탁을 들어주다니♪ 정말, 츤데레라니까☆ 허그해버릴까~?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「断固否定。あなたが余りにも毎日しつこいので、面倒を会長に押し付けただけ」"
translation = "「단호히 부정. 당신이 너무 매일 끈질기게 굴어서, 귀찮은 일을 회장님께 떠넘겼을 뿐」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「というわけで会長、前に言っていた同じクラスの子を連れて来ました」"
translation = "「그런 이유로 회장님, 전에 말했던 같은 반 아이를 데려왔습니다」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「はじめまして、センパイ♪\u3000紹介にあずかりました、新星学園１年生──」"
translation = "「처음 뵙겠습니다, 선배♪ 소개받은 신성 학원 1학년──」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「渋谷リーリアです☆\u3000どうぞ下の名前で、リーリアって呼んで下さい♪」"
translation = "「시부야 리리아입니다☆ 부디 이름으로 리리아라고 불러주세요♪」"

[[dialogue]]
speaker = "unk"
original = "わかった。よろしくな、リーリア"
translation = "알았어. 잘 부탁해, 리리아"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「……！\u3000へぇ～☆\u3000センパイって意外と、女の子の扱いに慣れてるんですね♪」"
translation = "「……! 헤에~☆ 선배는 의외로 여자 다루는 데 익숙하시네요♪」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「でも、名前で呼んでくれてマジカル嬉しい～♪\u3000なにせ『一目惚れ』の相手ですもん☆」"
translation = "「하지만 이름으로 불러줘서 매지컬하게 기뻐~♪ 무려 『첫눈에 반한』 상대니까요☆」"

[[dialogue]]
speaker = "unk"
original = "ひ、一目惚れ……！？"
translation = "처, 첫눈에 반해……!?"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「…………（リーリアにジト目）"
translation = "「………… (리리아를 곁눈질로 봄)」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「はい<emoji=heart04>\u3000実は私、この前の御前試合でセンパイのこと見てて……あの雄姿が本当に格好良くって、好きになっちゃったんです～♪」"
translation = "「네<emoji=heart04> 사실 저, 지난번 어전 시합에서 선배를 보고…… 그 늠름한 모습이 정말 멋있어서 좋아하게 돼버렸거든요~♪」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「それで是非、お近付きになりたいってアナちゃんに相談してて～。今日こうして、ようやくお会い出来たんですっ」"
translation = "「그래서 꼭 가까워지고 싶다고 아나짱한테 상담해서~. 오늘 이렇게 드디어 만나게 된 거예요」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「でも、センパイを前にしたら私……もう自分の気持ち抑えられそうにありませんっ。出来ればセンパイと、もっと親密な関係になりたいって思ってるんですけど──」"
translation = "「하지만 선배를 앞에 두니 저…… 이제 제 마음을 억누를 수 없을 것 같아요. 가능하다면 선배와 좀 더 친밀한 관계가 되고 싶다고 생각하는데──」"

[[dialogue]]
speaker = "unk"
original = "そう言って近付いてきた彼女は、俺の手を両手で取って、上目遣いで──"
translation = "그렇게 말하며 다가온 그녀는 내 손을 양손으로 잡고, 위를 올려다보며──"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「もし嫌じゃなければ、私と付き合って、もらえませんか……？」"
translation = "「혹시 싫지 않다면, 저와 사귀어 주시지 않을래요……?」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "（完っっ璧に決まった……！\u3000一目惚れ発言でドキッとさせてからの、私の可愛い上目遣いと、ボディータッチという流れるような３連コンボ！）"
translation = "(완벽하게 결정됐어……! 첫눈에 반했다는 발언으로 두근거리게 한 다음, 나의 귀여운 치켜뜬 눈과 바디 터치라는 흐르는 듯한 3단 콤보!)"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "（そして、女子慣れしているといっても、可愛い私から告白されて、明らかに照れて喜んでいる！\u3000勝った……！）"
translation = "(그리고 여자에 익숙하다고 해도, 귀여운 나한테 고백받아서 분명히 쑥스러워하며 기뻐하고 있어! 이겼다……!)"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……どういう意図か知りませんが、考えが和菓子のように甘いですよ。リーリアさん」"
translation = "「……무슨 의도인지는 모르겠지만, 생각이 화과자처럼 달콤하네요. 리리아 씨」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker = "unk"
original = "一目惚れと言ってくれるのは嬉しいけど──"
translation = "첫눈에 반했다고 말해주는 건 기쁘지만──"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "（私の手を片方だけ解いて、握手の形に直した……？）"
translation = "(내 손을 한쪽만 풀어서 악수하는 형태로 고쳐 잡았어……?)"

[[dialogue]]
speaker = "unk"
original = "何事も、段階を踏むのは大事だと思う。俺は何より、リーリアのことをまだよく知らない。彼女にそう伝える。"
translation = "무슨 일이든 단계를 밟는 게 중요하다고 생각해. 나는 무엇보다 리리아에 대해 아직 잘 몰라. 그녀에게 그렇게 전한다."

[[dialogue]]
speaker = "unk"
original = "──だから、これからキミを知っていけたら嬉しい"
translation = "──그러니까, 앞으로 너를 알아갈 수 있다면 기쁘겠어"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「な……！」"
translation = "「나……!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ふっ……まあ、会長はこういう人なんで。リーリアさんも変に猫被らなくていいと思いますよ？」"
translation = "「훗…… 뭐, 회장님은 이런 분이라서요. 리리아 씨도 괜히 내숭 떨지 않아도 된다고 생각해요?」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「な、なんでそこで、アナちゃんが勝ち誇ったような顔をするのかな……？」"
translation = "「왜, 왜 거기서 아나짱이 승리했다는 듯한 얼굴을 하는 걸까……?」"

[[dialogue]]
speaker = "unk"
original = "そうして１人、星徒会室から退散したリーリアだったが──"
translation = "그렇게 혼자 성도회실에서 퇴장한 리리아였지만──"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「ま、まさか任務に失敗するなんて……！」"
translation = "「서, 설마 임무에 실패하다니……!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「私の可愛さは通用していたし、好きな人がいないこともリサーチ済みだったのに。……どうして！？」"
translation = "「내 귀여움은 통하고 있었고, 좋아하는 사람이 없다는 것도 조사 끝냈는데. ……어째서!?」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「利害一致しているはずなのに……！\u3000全然分からない！\u3000う～、悔しい～！！！」"
translation = "「이해관계가 일치할 텐데……! 전혀 모르겠어! 으~ 분해~!!!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「おのれパイセン……！\u3000このまま、あの紳士面で居させてなるものか！」"
translation = "「이놈의 파이센……! 이대로 그 신사 같은 얼굴로 있게 둘 줄 알고!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「私のプライドに賭けて必ず、私にデレデレにさせてみせるんだから！」"
translation = "「내 자존심을 걸고 반드시 나한테 헤벌레하게 만들 테니까!」"

