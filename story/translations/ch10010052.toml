[[dialogue]]
speaker = "unk"
original = "第２話,星ミミ,P"
translation = "제2화, 호시미미, P"

[[dialogue]]
speaker = "unk"
original = "──ああは言ったものの、フィオナはやはり周囲の視線が気になって仕方ないようだった。"
translation = "──그렇게 말은 했지만, 피오나는 역시 주변의 시선이 신경 쓰여 어쩔 수 없는 듯했다."

[[dialogue]]
speaker = "unk"
original = "そんなある日のこと……"
translation = "그러던 어느 날의 일……."

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「──突き止めました」"
translation = "「──밝혀냈어요」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「ええ、例の噂話の件です。私もあれから１人で街に出たり、学園を歩いたりしてみたのですが……やはり違和感は感じられず」"
translation = "「네, 그 소문의 건이에요. 저도 그 후 혼자서 거리에 나가거나, 학원을 걷거나 해봤지만…… 역시 위화감은 느껴지지 않고」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「どうも、私と緋宮会長が一緒にいるとき、特に強い視線を感じることが判明したのです！」"
translation = "「아무래도, 저와 히노미야 회장군이 함께 있을 때, 특히 강한 시선을 느낀다는 것이 판명된 거예요!」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「ごめんなさい。注意する必要はない、なんて言っておきながら……どうしても私が気になってしまって」"
translation = "「죄송해요. 주의할 필요는 없다고, 말해놓고서도…… 아무래도 제가 신경 쓰여서」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「この間のデート中に感じた視線も、気のせいではなさそうでしたし……」"
translation = "「지난번 데이트 중에 느꼈던 시선도, 기분 탓은 아닌 것 같았고요……」"

[[dialogue]]
speaker = "unk"
original = "それにその格好は？"
translation = "게다가 그 복장은?"

[[dialogue]]
speaker = "unk"
original = "突き止めたっていうのは？"
translation = "밝혀냈다는 건?"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「はい。今まではスルーしてきたのですが、視線の主を突き止めようと思いまして」"
translation = "「네. 지금까지는 스루해 왔지만, 시선의 주인을 밝혀내려고 생각해서요」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「私はあえてこの目立つ格好でおびき寄せることにしました」"
translation = "「저는 일부러 이 눈에 띄는 복장으로 유인하기로 했어요」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「その作戦が功を奏しました。今日、ここへ来る直前、視線を感じるほうへ近づいてみたのです」"
translation = "「그 작전이 성공했어요. 오늘, 이곳에 오기 직전, 시선을 느끼는 쪽으로 다가가 봤어요」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「もちろん、向こうは陰ながら私たちを見張っている方ですから、私と面と向かうのは不都合でしょう」"
translation = "「물론, 상대는 뒤에서 저희를 지켜보고 있는 분이니까, 저와 마주하는 것은 불편할 거예요」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「ですが私は思い切って──声をかけてみたのです」"
translation = "「하지만 저는 과감하게── 말을 걸어봤어요」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「──あの！」"
translation = "「──저기요!」"

[[dialogue]]
speaker_original = "噂する生徒"
speaker_translation = "소문내는 학생"
original = "「あっ！？」"
translation = "「앗!?」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「すみません。先ほどから、私の後をつけられていましたよね。どうしてかお聞かせいただけますか？」"
translation = "「죄송합니다. 아까부터, 제 뒤를 쫓고 계셨죠. 이유를 알려주시겠어요?」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「確かに私は星徒会長という立場。ですが……あくまでも男女の学生として、節度を守った交際を心がけているつもりです」"
translation = "「확실히 저는 성도 회장이라는 입장. 하지만…… 어디까지나 남녀 학생으로서, 절도를 지킨 교제를 명심하고 있을 생각이에요」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「もし、言いたいことがあるのでしたら、私に直接──」"
translation = "「혹시, 하고 싶은 말이 있다면, 저에게 직접──」"

[[dialogue]]
speaker = "unk"
original = "誠実な態度で注意することにしたフィオナ──だが、彼女たちの反応は想定と違っていたという。"
translation = "성실한 태도로 주의를 주기로 한 피오나── 하지만, 그녀들의 반응은 예상과 달랐다고 한다."

[[dialogue]]
speaker_original = "噂する生徒"
speaker_translation = "소문내는 학생"
original = "「……ほ」"
translation = "「……보」"

[[dialogue]]
speaker_original = "噂する生徒"
speaker_translation = "소문내는 학생"
original = "「……本物！？」"
translation = "「……본물!?」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker_original = "ファンの女子Ａ"
speaker_translation = "팬 여학생 A"
original = "「きゃ、きゃあ──っ！\u3000本物の星見会長よ──！」"
translation = "「꺄, 꺄아──앗! 진짜 호시미 회장이야──!」"

[[dialogue]]
speaker_original = "ファンの女子Ｂ"
speaker_translation = "팬 여학생 B"
original = "「私たちに突然のファンサ！\u3000まじ！？」"
translation = "「우리에게 갑작스러운 팬 서비스! 레알!?」"

[[dialogue]]
speaker_original = "ファンの女子Ａ"
speaker_translation = "팬 여학생 A"
original = "「きょ、今日は緋宮会長とご一緒じゃないんですか！？」"
translation = "「오, 오늘은 히노미야 회장군과 함께가 아니신가요!?」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「は、はい？\u3000本物？\u3000ふぁんさ……？」"
translation = "「네, 네? 본물? 팬 서비스……?」"

[[dialogue]]
speaker_original = "ファンの女子Ａ"
speaker_translation = "팬 여학생 A"
original = "「この後、緋宮会長とのミーティングですよね！？\u3000しゃ、写真撮らせてもらってもいいですか！？」"
translation = "「저…… 이따가, 히노미야 회장군과의 미팅이죠!? 사, 사진 찍게 해 주셔도 괜찮을까요!?」"

[[dialogue]]
speaker_original = "ファンの女子Ｂ"
speaker_translation = "팬 여학생 B"
original = "「ちょ……あんた、それはやりすぎっしょ！\u3000あくまで陰ながら見守るってのが、うちら『星ミミ』のマナーなんじゃないの！」"
translation = "「야…… 너, 그건 너무하잖아! 어디까지나 뒤에서 지켜보는 게, 우리 『호시미미』의 매너 아니었냐고!」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「……？\u3000……？？」"
translation = "「……? ……??」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「──と、いうわけなんです」"
translation = "「──라는 이야기예요」"

[[dialogue]]
speaker = "unk"
original = "嫌な奴じゃなかった？"
translation = "싫은 녀석은 아니었어?"

[[dialogue]]
speaker = "unk"
original = "陰口じゃなかったのか？"
translation = "뒷담화가 아니었어?"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「ええ。不都合どころか、ずっとこちらに興味津々な様子で」"
translation = "「네. 불편하기는커녕, 계속 이쪽에 흥미진진한 모습으로」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「今日もここで定例の会議があるのを聞きつけ、私と緋宮会長が出会うところが見たかったと言っていました」"
translation = "「오늘도 여기서 정례 회의가 있다는 것을 듣고, 저와 히노미야 회장군이 만나는 장면을 보고 싶었다고 말했어요」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「そう、つまり……」"
translation = "「그래요, 즉……」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「どうやら私たちは……<b>推されていた</b>ようなのですっ！！」"
translation = "「아무래도 저희는…… <b>응원받고</b> 있었던 것 같아요!!」"

[[dialogue]]
speaker = "unk"
original = "だからどういうこと！？"
translation = "그래서 무슨 말이야!?"

[[dialogue]]
speaker = "unk"
original = "なんだって！？"
translation = "뭐라고!?"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「ええ。実は、その後もこんなやり取りがありまして……」"
translation = "「네. 실은, 그 후에도 이런 대화가 있었어요……」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「その……なんなのですか？\u3000推し、とかいうのは」"
translation = "「그…… 무엇인가요? 최애, 라는 것은」"

[[dialogue]]
speaker_original = "ファンの女子Ａ"
speaker_translation = "팬 여학생 A"
original = "「会長さん同士のカップリングのことですよう！\u3000お２人の関係性がいと尊いって、界隈でもっぱら話題なんですから！」"
translation = "「회장님들끼리의 커플링 말이에요! 두 분의 관계성이 너무나 고귀하다고, 이쪽 세계에서 온통 화제라니까요!」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「界隈……」"
translation = "「이쪽 세계……」"

[[dialogue]]
speaker_original = "ファンの女子Ｂ"
speaker_translation = "팬 여학생 B"
original = "「そうそう！\u3000流星×新星の最強カップル！\u3000今の学園じゃこのカップル推し以外ありえないっ！」"
translation = "「맞아 맞아! 유성×신성의 최강 커플! 지금 학원에선 이 커플 지지 외에는 있을 수 없다고!」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「か、カップル推し……？？？」"
translation = "「커, 커플 지지……???」"

[[dialogue]]
speaker_original = "ファンの女子Ａ"
speaker_translation = "팬 여학생 A"
original = "「はい！\u3000つまり、緋宮会長と星見会長の男女関係を、あくまで遠くから見つめて幸せを補給したいな～ってことです」"
translation = "「네! 즉, 히노미야 회장군과 호시미 회장군의 남녀 관계를, 어디까지나 멀리서 바라보며 행복을 보충하고 싶다는 거예요」"

[[dialogue]]
speaker_original = "ファンの女子Ｂ"
speaker_translation = "팬 여학생 B"
original = "「そしてこのＷ会長カップルを推す我々は、星ミミと呼ばれております」"
translation = "「그리고 이 W 회장 커플을 지지하는 저희는, 호시미미라고 불리고 있습니다」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「星ミミ……」"
translation = "「호시미미……」"

[[dialogue]]
speaker_original = "ファンの女子Ａ"
speaker_translation = "팬 여학생 A"
original = "「星見会長と接触できたのはありがたき幸せ。ですが私たちは、あくまでも見守り隊ですので……」"
translation = "「호시미 회장군과 접촉할 수 있었던 건 감사한 행복. 하지만 저희는 어디까지나 지켜보는 부대이므로……」"

[[dialogue]]
speaker_original = "ファンの女子Ｂ"
speaker_translation = "팬 여학생 B"
original = "「はい。ありがとうございます、さようなら星見会長……最後にパシャパシャ、と」"
translation = "「네. 감사합니다, 안녕히 계세요 호시미 회장군…… 마지막으로 찰칵찰칵, 하고」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「あああっ！？\u3000撮られてる～～！？」"
translation = "「아아앗!? 찍히고 있어～～!?」"

[[dialogue]]
speaker = "unk"
original = "なんで星ミミ？"
translation = "왜 호시미미야?"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「星見をさらに見るものだから……だそうです」"
translation = "「호시미를 더욱 보는 자들이라서……라고 합니다」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「それと、私たちをウォッチする行為は『天体観測』と呼ばれているみたいです」"
translation = "「그리고, 저희를 관찰하는 행위는 『천체 관측』이라고 불리고 있는 것 같아요」"

[[dialogue]]
speaker = "unk"
original = "しゃらくさいな……"
translation = "건방지군……"

[[dialogue]]
speaker = "unk"
original = "素敵な呼び名だね"
translation = "멋진 이름이네"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「ともあれ、陰口なんかの類ではなかったようです。後ろ指をさされていたわけじゃなかったのは、ひと安心といったところですが」"
translation = "「어쨌든, 뒷담화 같은 종류는 아니었던 것 같아요. 뒤에서 손가락질당하고 있던 건 아니었다는 점은, 한시름 놓았다고 할 수 있지만」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「困ったことに……また別の問題も生じておりまして」"
translation = "「곤란하게도…… 또 다른 문제도 생기고 있어서요」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「それが、こちらです」"
translation = "「그것이, 이겁니다」"

[[dialogue]]
speaker = "unk"
original = "これは！？"
translation = "이건!?"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「私と緋宮会長のマスコットキーホルダー──もちろん無許可──つまりこれは、私たちの闇グッズです！」"
translation = "「저와 히노미야 회장군의 마스코트 키홀더──물론 무허가──즉 이것은, 저희의 어둠 굿즈예요!」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「誰が製造しているのか不明ですが、どうもこの手のグッズが密やかに出回っているようなのです」"
translation = "「누가 제조하고 있는지는 불명이지만, 아무래도 이런 류의 굿즈가 은밀하게 나돌고 있는 것 같아요」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「彼女たち星ミミは裏でひっそり愛でるのがオツで、推ししか勝たんのだと言っていました」"
translation = "「그녀들 호시미미는 뒤에서 조용히 아끼는 것이 멋지고, 최애만이 최고라고 말했습니다」"

[[dialogue]]
speaker = "unk"
original = "売り物はよくないな"
translation = "판매하는 건 좋지 않아"

[[dialogue]]
speaker = "unk"
original = "よくわからないが……"
translation = "잘 모르겠지만……"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「ええ。これは星徒会としても調査すべき案件ですし、何よりグッズ化されているのは私たち本人……取り締まる必要があるのではないかと」"
translation = "「네. 이것은 성도회로서도 조사해야 할 안건이고, 무엇보다 굿즈화되어 있는 것은 저희 본인…… 단속할 필요가 있는 것이 아닐까 하고」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「一応、私たちを応援してくれている方々らしいので、複雑な気分ではありますが……」"
translation = "「일단, 저희를 응원해 주고 있는 분들인 것 같아서, 복잡한 기분이 들기는 하지만……」"

[[dialogue]]
speaker = "unk"
original = "２人でいれば大丈夫"
translation = "둘이 함께라면 괜찮아"

[[dialogue]]
speaker = "unk"
original = "俺がついてる"
translation = "내가 옆에 있어"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「ふふ……それもそうですね。私の旦那さんは頼もしくて何よりです」"
translation = "「후후…… 그것도 그렇네요. 저의 남편은 든든해서 무엇보다 좋아요」"

[[dialogue]]
speaker_original = "フィオナ（魔王）"
speaker_translation = "피오나(마왕)"
original = "「星徒会長の目の黒いうちは──勝手なことはさせないと、お灸を据えてやりましょう」"
translation = "「성도회장의 눈이 시퍼렇게 살아있는 한── 제멋대로인 짓은 못 하게, 따끔하게 혼내줍시다」"

