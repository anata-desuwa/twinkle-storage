[[dialogue]]
speaker = "unk"
original = "第１話,女神の幼体の目覚め,B"
translation = "제1화, 여신의 유체의 각성"

[[dialogue]]
speaker = "unk"
original = "その日、創造神『ＸＥＬＯＳ』は、新たな命を創り出した。"
translation = "그날, 창조신 『XELOS』는 새로운 생명을 창조해 냈다."

[[dialogue]]
speaker = "unk"
original = "今は亡きベガと同じ末路に、デネブとアルタイルを導くために。"
translation = "이미 멸망한 베가와 같은 말로로, 데네브와 알타이르를 인도하기 위해."

[[dialogue]]
speaker = "？？？"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "──目が覚めたか、<b>ルヴィネ</b>。"
translation = "──눈을 떴느냐, **루비네**."

[[dialogue]]
speaker = "ルヴィネ"
original = "「……ルヴィネ。それが、私という個体の名称なのですね。お父様」"
translation = "「……루비네. 그것이 저라는 개체의 명칭이군요. 아버님」"

[[dialogue]]
speaker = "unk"
original = "──お前が製造された目的は、なんだ？"
translation = "──네가 제조된 목적은 무엇이냐?"

[[dialogue]]
speaker = "ルヴィネ"
original = "「……リクリエを遂行すること。それ以外にありません」"
translation = "「……리크리에를 수행하는 것. 그 이외에는 없습니다」"

[[dialogue]]
speaker = "unk"
original = "──女神テルルを、どう思うか？"
translation = "──여신 테루루를 어떻게 생각하느냐?"

[[dialogue]]
speaker = "ルヴィネ"
original = "「旧時代の、壊れた女神。お父様のご意思に背く、愚か者です」"
translation = "「구시대의 망가진 여신. 아버님의 의지에 등지는 어리석은 자입니다」"

[[dialogue]]
speaker = "unk"
original = "──地上にはびこる人類をどう思うか？"
translation = "──지상에 만연한 인류를 어떻게 생각하느냐?"

[[dialogue]]
speaker = "ルヴィネ"
original = "「虫と変わりません。邪魔をするなら、踏みつぶすだけです」"
translation = "「벌레와 다름없습니다. 방해한다면 짓밟을 뿐입니다」"

[[dialogue]]
speaker = "unk"
original = "──よろしい。人の身では決して敵わぬ霊力を授けた。上手く使え。"
translation = "──좋다. 인간의 몸으로는 결코 대적할 수 없는 영력을 내렸노라. 잘 사용하거라."

[[dialogue]]
speaker = "ルヴィネ"
original = "「はい。ありがとうございます」"
translation = "「네. 감사합니다」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「私はルヴィネ……テルルに代わる、新たな女神の幼体……」"
translation = "「나는 루비네…… 테루루를 대신할 새로운 여신의 유체……」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「出来損ないの姉を排除し、お父様の望みを実現してみせます」"
translation = "「모자란 언니를 배제하고 아버님의 소망을 실현해 보이겠어요」"

[[dialogue]]
speaker = "ルヴィネ"
original = "「見ていてください、お父様。必ずや、世界の刷新を──」"
translation = "「지켜봐 주세요, 아버님. 반드시 세계의 쇄신을──」"

