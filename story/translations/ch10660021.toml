[[dialogue]]
speaker = "unk"
original = "第１話,並び立つ強さを,P"
translation = "제1화, 나란히 서는 강함을, P"

[[dialogue]]
speaker = "unk"
original = "流星学園の学園長にして、最強クラスの力を誇る白夜院ラティエ。"
translation = "유성학원의 학원장이자 최강급의 힘을 자랑하는 뱌쿠야인 라티에."

[[dialogue]]
speaker = "unk"
original = "その人に俺は、今日も稽古を付けてもらっていた。"
translation = "그녀에게 나는 오늘도 수련을 받고 있었다."

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「──フフ、迂闊な攻めが減って、随分と動きが良くなったな」"
translation = "「──후후, 어설픈 공격이 줄어들고 움직임이 제법 좋아졌군」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「慎重なのは結構。だが、仕掛けて来なければ勝利することもできないぞ」"
translation = "「신중한 건 좋네. 하지만 걸어오지 않으면 승리할 수도 없어」"

[[dialogue]]
speaker = "unk"
original = "学園長の繰り出す変幻自在の攻撃をどうにか受け流す。"
translation = "학원장이 펼치는 변환자재의 공격을 어떻게든 받아낸다."

[[dialogue]]
speaker = "unk"
original = "チャンスは少ない。その少ないチャンスを見極めなくては、攻撃に転じることは出来ない──"
translation = "기회는 적다. 그 적은 기회를 간파하지 못하면 공격으로 전환할 수 없다──"

[[dialogue]]
speaker = "unk"
original = "（教えられたことを思い出せ……！）"
translation = "(가르쳐 준 것을 떠올려라……!)"

[[dialogue]]
speaker = "unk"
original = "目で追おうとするから捉えられない。"
translation = "눈으로 쫓으려 하니까 포착하지 못하는 거다."

[[dialogue]]
speaker = "unk"
original = "視線を読み、感覚を研ぎ澄まして──"
translation = "시선을 읽고 감각을 곤두세워──"

[[dialogue]]
speaker = "unk"
original = "ここだ！！！"
translation = "여기다!!!"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「よしよし、今のはいい一撃だった。もう少し踏み込みが深ければ完璧だ」"
translation = "「좋아 좋아, 방금 건 좋은 일격이었다. 조금만 더 깊이 파고들었다면 완벽했겠군」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「もっともこの砂地の上では厳しかっただろうがな……だが、今の１歩を踏み込めたのは大きな成長だ」"
translation = "「물론 이 모래사장 위에서는 힘들었겠지만 말이야…… 하지만 방금 그 한 걸음을 내디딘 것은 큰 성장이다」"

[[dialogue]]
speaker = "unk"
original = "そう言って学園長は距離を取り、攻撃の構えを解いた。"
translation = "그렇게 말하며 학원장은 거리를 벌리고 공격 자세를 풀었다."

[[dialogue]]
speaker = "unk"
original = "それが訓練終了の合図で、次の瞬間には砂浜の上にがっくり膝を突いていた。"
translation = "그것이 훈련 종료의 신호였고, 다음 순간에는 백사장 위에 털썩 무릎을 꿇고 말았다."

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「どうだ、足に来ているだろう。砂地での模擬戦は下半身を鍛えるいい訓練になる」"
translation = "「어떤가, 다리에 무리가 왔지? 모래 위에서의 모의전은 하반신을 단련하는 좋은 훈련이 되지」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「それにしても膝が笑って立てなくなるほど、やわな鍛え方はしていなかったはずだと思っているな？」"
translation = "「그건 그렇고 무릎이 떨려 서지 못할 정도로 연약하게 단련하진 않았을 텐데 하고 생각하고 있군?」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「フフ、気付いていなかったか。私が意図的に、足腰に負担がかかるような攻撃を仕掛け続けていたこと……」"
translation = "「후후, 눈치채지 못했나. 내가 의도적으로 하체에 부담이 가는 공격을 계속 퍼부었다는 걸……」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「飛んだり走ったりせず、ただ攻撃を受け続けているだけでも筋肉は疲労していくものだ」"
translation = "「날거나 뛰지 않고 그저 공격을 계속 받아내는 것만으로도 근육은 피로해지기 마련이다」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「逆に言うならば、きみは私の攻撃を正しく受け続けた。だから、こんなに消耗させられてしまったのだ」"
translation = "「반대로 말하자면 자네는 내 공격을 올바르게 계속 받아냈어. 그래서 이렇게 소모된 거다」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「基礎は確実に積み上がっている。これは素晴らしいことだぞ？」"
translation = "「기초는 확실히 쌓이고 있어. 이건 아주 훌륭한 일이라고?」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「ともあれ楽な姿勢で休むといい。脚の張った筋肉をほぐしてやろう」"
translation = "「어쨌든 편안한 자세로 쉬게나. 다리의 뭉친 근육을 풀어주지」"

[[dialogue]]
speaker = "unk"
original = "学園長の言葉に、俺は両足を伸ばして砂の上に投げ出した。"
translation = "학원장의 말에 나는 두 다리를 뻗어 모래 위에 내던졌다."

[[dialogue]]
speaker = "unk"
original = "学園長は何ともないのに"
translation = "학원장은 아무렇지도 않은데."

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「はっはっは、私は普段から鍛えているからな」"
translation = "「하하하, 나는 평소부터 단련하고 있으니까 말이야」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「この辺りは積み重ねた訓練の時間の差だ。だからそんなに落ち込んだ顔をしなくてもいい」"
translation = "「이런 건 쌓아온 훈련 시간의 차이다. 그러니 그렇게 풀 죽은 표정 짓지 않아도 좋아」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「強い男になって私の旅に同行する。その望みはまだ捨てていないのだろう？」"
translation = "「강한 남자가 되어 내 여행에 동행한다. 그 소망은 아직 버리지 않았겠지?」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「おい……何を黙っているんだ？\u3000まさか諦める、なんて言い出すんじゃないだろうな……」"
translation = "「어이…… 왜 말이 없나? 설마 포기한다느니 하는 소릴 하진 않겠지……」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「先ほども話したが、きみは順当に成長し続けている。その成長ぶりは目を見張るものだ」"
translation = "「아까도 말했지만 자네는 순조롭게 계속 성장하고 있어. 그 성장세는 눈여겨볼 만한 것이지」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「なんならもう、私の旅に同行しても問題ないほどの実力は備えつつあるのだから、もっと自信を持って──」"
translation = "「뭐라면 벌써 내 여행에 동행해도 문제없을 정도의 실력은 갖춰가고 있으니 좀 더 자신감을 갖고──」"

[[dialogue]]
speaker = "unk"
original = "……今の言葉、本当ですか？"
translation = "……방금 그 말, 정말인가요?"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「っ！？\u3000私から発言を引き出すために、わざと黙っていたのか……なかなかいい性格をしているな、きみは」"
translation = "「!? 나에게서 답변을 끌어내려고 일부러 침묵한 건가…… 꽤 좋은 성격을 하고 있군, 자네는」"

[[dialogue]]
speaker = "unk"
original = "わざと自信を失ったように見せかけて反応を窺うと、それに気付いた学園長は珍しく非難するような目を向けてくる。"
translation = "일부러 자신감을 잃은 척 반응을 살피자, 그걸 깨달은 학원장은 드물게 나무라는 듯한 눈길을 보낸다."

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「……まあ、きみの成長ぶりが素晴らしいというのはその通りだよ。旅に同行しても問題ないほど力を付けてきているというのも本当だ」"
translation = "「……뭐, 자네의 성장세가 훌륭하다는 건 사실이야. 여행에 동행해도 문제없을 정도로 힘을 키워가고 있다는 것도 정말이고」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「だから、きみはこのまま真っ直ぐに努力を続けたまえ。ただし……」"
translation = "「그러니 자네는 이대로 곧게 노력을 계속하게나. 다만……」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「私の隣に立つ男になりたいというなら、もっともっと強くなる必要があるという事も忘れるなよ」"
translation = "「내 곁에 서는 남자가 되고 싶다면 훨씬 더 강해질 필요가 있다는 점도 잊지 말게나」"

[[dialogue]]
speaker = "unk"
original = "学園長に見合うにはまだまだです"
translation = "학원장님께 어울리려면 아직 멀었네요."

[[dialogue]]
speaker = "unk"
original = "もちろんわかっています"
translation = "물론 알고 있습니다."

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "けれど、必ずなってみせますから"
translation = "하지만 반드시 되어 보일 테니까요."

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「む……ぅ……きみは、なかなかに……ずるいな……」"
translation = "「으…… 음…… 자네는 제법…… 치사하군……」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「正直、その可能性を十分に感じさせてくるところが何よりずるい」"
translation = "「솔직히 그 가능성을 충분히 느끼게 한다는 점이 무엇보다 치사해」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「だが私も、いつまでも待っていられないぞ？\u3000きみが成長しきる前に、どこかへ旅立ってしまうかもしれないからな」"
translation = "「하지만 나도 언제까지나 기다려 줄 순 없다고? 자네가 다 성장하기 전에 어딘가로 떠나버릴지도 모르니까 말이야」"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「その前に強くなって私を認めさせてくれ。──少なからず期待しているから」"
translation = "「그전에 강해져서 나를 인정하게 해 주게. ──나름대로 기대하고 있으니까」"

[[dialogue]]
speaker = "unk"
original = "…………、はいっ！"
translation = "…………, 네!"

[[dialogue]]
speaker_original = "ラティエ"
speaker_translation = "라티에"
original = "「満面な笑みが小憎らしい……そんなきみには、こうしてやる！！」"
translation = "「만면에 가득한 미소가 얄밉군…… 그런 자네에겐 이렇게 해주지!!」"

[[dialogue]]
speaker = "unk"
original = "首根っこを捕まえられると、思いっきり頬を抓られてしまった。"
translation = "뒷덜미를 잡히더니 힘껏 뺨을 꼬집히고 말았다."

[[dialogue]]
speaker = "unk"
original = "──学園長の特訓のおかげで確実に実力は備わりつつある。"
translation = "──학원장의 특훈 덕분에 확실히 실력이 갖춰지고 있다."

[[dialogue]]
speaker = "unk"
original = "だがそれを通じて学園長との自然なやり取りも出来るようになってきていて、距離が縮まっていることを感じさせてくれるのだった。"
translation = "하지만 그것을 통해 학원장과 자연스러운 대화도 나눌 수 있게 되어 거리가 좁혀지고 있음을 실감하게 해주었다."

