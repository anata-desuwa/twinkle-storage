[[dialogue]]
speaker = "unk"
original = "第３話,破滅の記憶,B"
translation = "제3화, 파멸의 기억, B"

[[dialogue]]
speaker = "梨緒"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "その頃、梨緒・Ａ・クリステレスは、流星市国の中心──流星教皇庁に来ていた。"
translation = "그 무렵, 리오·A·크리스테레스는 유성시국의 중심── 유성교황청에 와 있었다."

[[dialogue]]
speaker = "梨緒"
original = "「エリシアによれば、私はここで倒れていたそうだが……」"
translation = "「엘리시아에 따르면, 나는 여기서 쓰러져 있었다고 하는데……」"

[[dialogue]]
speaker = "梨緒"
original = "「……何度足を運んでも、ジグの姿も手掛かりもなし、か」"
translation = "「……몇 번을 발걸음 해도 지그의 모습도 단서도 없나」"

[[dialogue]]
speaker = "梨緒"
original = "（この異常な状況が発生する直前、私はジグと一緒にいた……いた、はずだ……）"
translation = "(이 이상 상황이 발생하기 직전, 나는 지그와 함께 있었다…… 있었을, 터다……)"

[[dialogue]]
speaker = "梨緒"
original = "（もし私がリクリエにまつわる何らかの事象に巻き込まれたのなら、あの時一緒にいたジグも同じ状況にあると思ったのだが……）"
translation = "(만약 내가 리크리에와 관련된 어떤 현상에 휘말린 거라면, 그때 함께 있던 지그도 같은 상황에 처해 있을 거라 생각했는데……)"

[[dialogue]]
speaker = "梨緒"
original = "「っ……な、なんだ。頭が、痛い……」"
translation = "「윽…… 뭐, 뭐야. 머리가, 아파……」"

[[dialogue]]
speaker = "unk"
original = "『ジグを探さなければならない』。"
translation = "『지그를 찾아야만 한다』."

[[dialogue]]
speaker = "unk"
original = "仲間と状況を共有しなければならない以上、梨緒にとっては自明のことではあるのだが……"
translation = "동료와 상황을 공유해야 하는 이상, 리오에게 있어서는 자명한 일이었지만……"

[[dialogue]]
speaker = "unk"
original = "なぜかそれだけではない、どうしてもジグに再会しなければならない、という焦燥感のような想いが沸きあがって来て、心臓が痛いほどに胸の内を叩いていた。"
translation = "왠지 그뿐만이 아닌, 어떻게 해서든 지그와 재회해야만 한다는 초조함 같은 마음이 솟구쳐 올라, 심장이 아플 정도로 가슴 속을 두드리고 있었다."

[[dialogue]]
speaker = "梨緒"
original = "（ここに来て、もう数ヶ月……。情報を収集すれば、生きて仲間からの連絡を待てば、自ずと何かがわかるだろうと思っていた）"
translation = "(여기 온 지도 벌써 몇 달……. 정보를 수집하고, 살아남아 동료의 연락을 기다리면 자연히 무언가 알게 될 거라 생각했다)"

[[dialogue]]
speaker = "梨緒"
original = "（だが、数ヶ月の時間を過ごしてなお、わかったことは何一つない。……いや、<b>説明は受けた</b>。だが、彼らの言葉をただ鵜呑みにすることなど、私には到底……）"
translation = "(하지만 몇 달의 시간을 보내고도 알게 된 것은 하나도 없다. ……아니, <b>설명은</b> <b>들었다</b>. 하지만 그들의 말을 그대로 믿는 것 따위, 나로서는 도저히……)"

[[dialogue]]
speaker = "unk"
original = "梨緒が置かれている状況について、彼女に説明をしたのは３人。"
translation = "리오가 처한 상황에 대해 그녀에게 설명해 준 것은 세 명."

[[dialogue]]
speaker = "unk"
original = "そのうちの１人は、守護天使・ラクシャと名乗った。"
translation = "그중 한 명은 수호천사 락샤라고 자칭했다."

[[dialogue]]
speaker = "梨緒"
original = "（守護天使とは、女神が創造した六柱の高位存在であり、三界の摂理の守護者だ）"
translation = "(수호천사란 여신이 창조한 여섯 기둥의 고위 존재이며, 삼계 섭리의 수호자다)"

[[dialogue]]
speaker = "梨緒"
original = "（本来、私たちのような<ruby>定命<rt>じょうみょう</rt></ruby>の者と直接関わるような存在ではないのだが……）"
translation = "(본래 우리 같은 정명의 자와 직접 관여할 존재가 아닐 텐데……)"

[[dialogue]]
speaker = "梨緒"
original = "（しかし、そんな高位存在が、新星学園の制服を着て私の前に現れた──）"
translation = "(하지만 그런 고위 존재가 신성학원 교복을 입고 내 앞에 나타났다──)"

[[dialogue]]
speaker = "梨緒"
original = "（あれはそう、緋宮クロトに御前試合で敗れた直後の出来事だった……）"
translation = "(그것은 그래, 히노미야 쿠로토에게 어전시합에서 패배한 직후의 일이었다……)"

[[dialogue]]
speaker = "ラクシャ"
original = "「ボクは守護天使《円環》のラクシャ。わけあって新星学園の制服を着てるけど、コスプレみたいなものだから」"
translation = "「나는 수호천사 《원환》의 락샤. 사정이 있어서 신성학원 교복을 입고 있지만, 코스프레 같은 거니까」"

[[dialogue]]
speaker = "梨緒"
original = "「守護天使がいったいどうして……？\u3000私に用なのか？」"
translation = "「수호천사가 대체 어째서……? 나에게 용건인가?」"

[[dialogue]]
speaker = "unk"
original = "通常であれば、自身のことを『守護天使』だなどと名乗る者の言葉を信用することはできないはずなのだが……"
translation = "보통이라면 자신을 『수호천사』라고 자칭하는 자의 말을 신용할 수 없어야 하겠지만……"

[[dialogue]]
speaker = "unk"
original = "お気楽な口調に反して、その者──ラクシャが放つただならぬ存在感が、彼女の言葉に妙な説得力を持たせていた。"
translation = "가벼운 말투와는 반대로, 그자── 락샤가 뿜어내는 예사롭지 않은 존재감이 그녀의 말에 묘한 설득력을 갖게 했다."

[[dialogue]]
speaker = "ラクシャ"
original = "「うん、キミに興味があってね。みんなが知らないこといろいろ知ってそうだし……ちょ～っとお話聞かせてもらえるかな？」"
translation = "「응, 너에게 흥미가 있어서 말이야. 남들이 모르는 걸 이것저것 알고 있을 것 같기도 하고…… 조~금 이야기를 들려줄 수 있을까?」"

[[dialogue]]
speaker = "梨緒"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "ラクシャ"
original = "「おっとっと、ボクが怪しいからって、そんなにあからさまに警戒しないでってばーっ。キミが何か知ってそうだから、ちょっと情報交換しようと思っただけ」"
translation = "「오옷, 내가 수상하다고 해서 그렇게 노골적으로 경계하지 말아줘. 네가 뭔가 알고 있을 것 같아서 잠깐 정보 교환이나 할까 했을 뿐이야」"

[[dialogue]]
speaker = "ラクシャ"
original = "「知ってるんでしょ？\u3000緋宮クロトが<b>アレ</b>になるってこと」"
translation = "「알고 있지? 히노미야 쿠로토가 <b>그것</b>이 된다는 거」"

[[dialogue]]
speaker = "梨緒"
original = "「！\u3000君も見たのか？」"
translation = "「! 너도 본 건가?」"

[[dialogue]]
speaker = "ラクシャ"
original = "「ああいや、ボクは人伝に聞いた感じなんだけどさ」"
translation = "「아아 아니, 나는 전해 들은 느낌이지만 말이야」"

[[dialogue]]
speaker = "ラクシャ"
original = "「アレは世界を滅ぼすに足る脅威だ。……なんて、キミには言うまでもないか」"
translation = "「그것은 세계를 멸망시키기에 충분한 위협이야. ……뭐, 너에게는 말할 필요도 없으려나」"

[[dialogue]]
speaker = "梨緒"
original = "「ああ、知っているとも。この目で見たからな」"
translation = "「아아, 알고 말고. 이 눈으로 봤으니까」"

[[dialogue]]
speaker = "ラクシャ"
original = "「そう、<b>キミは見たはずだ</b>。この世の終わり、リクリエが遂行される、まさにその瞬間を」"
translation = "「그래, <b>너는</b> <b>봤을</b> <b>거야</b>. 이 세상의 끝, 리크리에가 수행되는 바로 그 순간을」"

[[dialogue]]
speaker = "ラクシャ"
original = "「だからボクに……いや、この世界の緋宮クロトに、伝えて欲しいんだ」"
translation = "「그러니까 나에게…… 아니, 이 세계의 히노미야 쿠로토에게 전해줬으면 해」"

[[dialogue]]
speaker = "ラクシャ"
original = "「世界が滅び、すべてが無に帰す時、<b>そこに現れたモノ</b>がなんだったのかを」"
translation = "「세계가 멸망하고 모든 것이 무로 돌아갈 때, <b>거기에</b> <b>나타난</b> <b>것</b>이 무엇이었는지를」"

[[dialogue]]
speaker = "梨緒"
original = "「ま、待て！\u3000何の話だ！？」"
translation = "「기, 기다려! 무슨 소리지!?」"

[[dialogue]]
speaker = "梨緒"
original = "「私が最後に見たのは、緋宮クロトだったモノが大地を壊し、空を壊し、あらゆる物質を無に帰す終焉世界を作り上げた光景だった」"
translation = "「내가 마지막으로 본 것은 히노미야 쿠로토였던 것이 대지를 부수고, 하늘을 부수고, 모든 물질을 무로 돌리는 종언 세계를 만들어낸 광경이었다」"

[[dialogue]]
speaker = "ラクシャ"
original = "「それだけ？\u3000本当に？」"
translation = "「그것뿐이야? 정말로?」"

[[dialogue]]
speaker = "ラクシャ"
original = "「いいや、違うね。キミは<b>その後</b>を見ているはずだ。リクリエは単純な世界の破滅じゃない。あれは世界の再創生が行われる前兆なんだ」"
translation = "「아니, 틀려. 너는 <b>그다음</b>을 보고 있을 거야. 리크리에는 단순한 세계의 파멸이 아니야. 그건 세계의 재창생이 이루어지는 전조거든」"

[[dialogue]]
speaker = "ラクシャ"
original = "「だからこそ、その『終わりであり、始まりの時』には、必ず何かが起こる。守護天使でさえも知覚できないその地点に、摂理さえも超越した、宇宙の理が現れるはずなんだ」"
translation = "「그렇기에 그 『끝이자 시작의 때』에는 반드시 무언가가 일어나. 수호천사조차 지각할 수 없는 그 지점에, 섭리조차 초월한 우주의 이치가 나타날 거야」"

[[dialogue]]
speaker = "梨緒"
original = "「い、いったい、何の話をしている……私は、そんなものは見ていない！」"
translation = "「도, 대체 무슨 소리를 하는 거냐…… 나는 그런 건 보지 못했다!」"

[[dialogue]]
speaker = "ラクシャ"
original = "「いーや、絶対に見てる。そうじゃなければ、キミはこっちの世界に存在しているはずがないんだ。それが何であったのかは、ボクにもまだハッキリとはわからないけれど……」"
translation = "「아니, 절대로 봤어. 그렇지 않다면 네가 이쪽 세계에 존재하고 있을 리가 없거든. 그것이 무엇이었는지는 나도 아직 확실히는 모르겠지만……」"

[[dialogue]]
speaker = "ラクシャ"
original = "「もしキミが<b>それ</b>を覚えていないというのなら、きっとキミ自身が記憶に蓋をしてしまっているんだろうね」"
translation = "「만약 네가 <b>그것</b>을 기억하지 못한다면, 분명 너 스스로가 기억에 뚜껑을 덮어버린 거겠지」"

[[dialogue]]
speaker = "梨緒"
original = "「いい加減にしろ！\u3000私は何も見ていないと言っている！！」"
translation = "「적당히 해라! 나는 아무것도 보지 못했다고 말하고 있다!!」"

[[dialogue]]
speaker = "ラクシャ"
original = "「ごめんごめん、怒らせる気はなかったんだ」"
translation = "「미안 미안, 화나게 할 생각은 없었어」"

[[dialogue]]
speaker = "ラクシャ"
original = "「ただ──そうだね。キミにも自分と向き合う時間が必要なんだろう」"
translation = "「다만── 그렇네. 너에게도 자신과 마주할 시간이 필요하겠지」"

[[dialogue]]
speaker = "ラクシャ"
original = "「時間の猶予がどれほどあるのかはわからないけれど、今すぐ思い出す必要はないよ。それでも、いつかは向かい合ってほしい」"
translation = "「시간적 여유가 얼마나 있는지는 모르겠지만, 지금 당장 떠올릴 필요는 없어. 그래도 언젠가는 마주해 줬으면 좋겠어」"

[[dialogue]]
speaker = "ラクシャ"
original = "「ボクの言っていることは、半分以上が推論に推論を重ねただけのものだ。だから証拠はないし、ボク自身もキミが『何を見た』のかを知らない」"
translation = "「나가 말하는 건 절반 이상이 추론에 추론을 거듭한 것뿐이야. 그래서 증거는 없고, 나 자신도 네가 『무엇을 봤는지』 몰라」"

[[dialogue]]
speaker = "ラクシャ"
original = "「ただ恐らく、それは本来、ヒトの身で相対するような存在じゃないんだ。怖かっただろうし、今こうしてキミが廃人にならずに活動できていること自体、奇跡みたいなものだ」"
translation = "「그저 아마도, 그건 본래 인간의 몸으로 상대할 만한 존재가 아닐 거야. 무서웠을 테고, 지금 이렇게 네가 폐인이 되지 않고 활동하고 있는 것 자체가 기적 같은 일이지」"

[[dialogue]]
speaker = "ラクシャ"
original = "「それでも……ボクたちが勝利するには、キミが記憶の底に沈めてしまったものが、どうしても必要なんだ」"
translation = "「그래도…… 나들이 승리하려면 네가 기억 밑바닥에 가라앉혀 버린 것이 꼭 필요해」"

[[dialogue]]
speaker = "梨緒"
original = "「くっ……だから、何を言って……っ、頭が、痛い……」"
translation = "「큭…… 그러니까 무슨 소리를…… 윽, 머리가 아파……」"

[[dialogue]]
speaker = "ラクシャ"
original = "「本当にごめんね。優しくしてあげられたら良かったんだけど、ボクの方にもあんまり余裕がなくてさ」"
translation = "「정말 미안해. 상냥하게 대해줬으면 좋았을 텐데, 나 쪽도 별로 여유가 없어서 말이야」"

[[dialogue]]
speaker = "梨緒"
original = "「…………っ」"
translation = "「…………윽」"

[[dialogue]]
speaker = "ラクシャ"
original = "「そう睨まないでよ。これでも一応、ボクもキミたちの味方のつもりなんだ」"
translation = "「그렇게 노려보지 마. 이래 봬도 일단 나도 너희 편일 생각이니까」"

[[dialogue]]
speaker = "ラクシャ"
original = "「ただそうだね……キミが現状、最も重要なことを思い出せない、というのなら──」"
translation = "「다만 그렇네…… 네가 현시점에서 가장 중요한 걸 떠올리지 못한다면──」"

[[dialogue]]
speaker = "ラクシャ"
original = "「最初のお願いと真逆で申し訳ないんだけど、『緋宮クロトの末路』については、一旦彼には秘密にしておいてもらえるかな？」"
translation = "「첫 번째 부탁과는 정반대라 미안하지만, 『히노미야 쿠로토의 말로』에 대해서는 일단 그에게 비밀로 해줄 수 있을까?」"

[[dialogue]]
speaker = "梨緒"
original = "「それは……くっ、いいのか？\u3000危機を告げることで、回避できる未来もあるんじゃないか？」"
translation = "「그건…… 큭, 괜찮은 건가? 위기를 알림으로써 회피할 수 있는 미래도 있지 않나?」"

[[dialogue]]
speaker = "ラクシャ"
original = "「彼には最終的に、知った上で乗り越えてもらう必要があるのは間違いないよ」"
translation = "「그가 최종적으로는 알고 나서 넘어서야 할 필요가 있는 건 틀림없어」"

[[dialogue]]
speaker = "ラクシャ"
original = "「それでも、タイミングは結構重要だ……」"
translation = "「그래도 타이밍은 꽤 중요하거든……」"

[[dialogue]]
speaker = "ラクシャ"
original = "「アルタイルのクロトは、ヴィーナスによって自身が魔王に至ることを知った。その後、ヴィーナスとの御前試合で限定的に魔王として覚醒している」"
translation = "「알타이르의 쿠로토는 비너스에 의해 자신이 마왕에 이른다는 걸 알았어. 그 후 비너스와의 어전시합에서 한정적으로 마왕으로서 각성했지」"

[[dialogue]]
speaker = "ラクシャ"
original = "「可能性を知ることで、その未来を招き寄せる──って場合もある」"
translation = "「가능성을 앎으로써 그 미래를 불러들인다──는 경우도 있어」"

[[dialogue]]
speaker = "ラクシャ"
original = "「ていうか、ボクはそれで一度失敗してるんだよねー。ああいや、失敗っていうかどうかは微妙だけど、知ってるからこそ起きることもある」"
translation = "「랄까, 나는 그걸로 한 번 실패했었거든~. 아아 아니, 실패라고 할지는 미묘하지만, 알고 있기에 일어나는 일도 있어」"

[[dialogue]]
speaker = "ラクシャ"
original = "「ボクの知ってる緋宮クロトは──」"
translation = "「나가 아는 히노미야 쿠로토는──」"

[[dialogue]]
speaker = "梨緒"
original = "「──ッ！？」"
translation = "「──윽!?」"

[[dialogue]]
speaker = "ラクシャ"
original = "「って感じで、知ったら知ったでまた問題があるんだよね。それに今の魔王はリクリエの力をその身に封じ込めている。ちょっとした爆弾だね」"
translation = "「라는 느낌으로, 알면 아는 대로 또 문제가 있단 말이지. 게다가 지금의 마왕은 리크리에의 힘을 그 몸에 봉인하고 있어. 조그만 폭탄이지」"

[[dialogue]]
speaker = "ラクシャ"
original = "「そんな状態で自身の末路を知れば彼は……って可能性もあるから、今のところ秘密でお願い」"
translation = "「그런 상태에서 자신의 말로를 알면 그가…… 할 가능성도 있으니까, 당분간은 비밀로 부탁해」"

[[dialogue]]
speaker = "梨緒"
original = "「……わかった。ひとまずはな」"
translation = "「……알았다. 우선은 말이지」"

[[dialogue]]
speaker = "ラクシャ"
original = "「でもまぁ、キミが具体的なところまで、全部言わなくて助かったかもしれない。魔王の末路を知ったら、緋宮クロトを排除しようとする勢力が出てきてもおかしくないから」"
translation = "「그래도 뭐, 네가 구체적인 부분까지 전부 말하지 않아서 다행일지도 몰라. 마왕의 말로를 알면 히노미야 쿠로토를 배제하려는 세력이 나와도 이상하지 않으니까」"

[[dialogue]]
speaker = "ラクシャ"
original = "「悪しき魔王になって世界を滅ぼす──までは言ったけど。太陽の壁画絡みで耳馴染みのあるフレーズだったし、周囲もキミの言葉を真に受けなかった」"
translation = "「사악한 마왕이 되어 세계를 멸망시킨다──까지는 말했지만. 태양의 벽화와 관련해서 귀에 익은 문구였고, 주변도 네 말을 진지하게 받아들이지 않았어」"

[[dialogue]]
speaker = "ラクシャ"
original = "「良くも悪くも、現状キミの言葉で状況が変化した様子は見受けられない」"
translation = "「좋든 싫든 현재 네 말로 상황이 변화한 모습은 보이지 않아」"

[[dialogue]]
speaker = "梨緒"
original = "「……すまない。改めて考えれば、軽率な行動だった」"
translation = "「……미안하다. 다시 생각해보니 경솔한 행동이었다」"

[[dialogue]]
speaker = "ラクシャ"
original = "「キミの立場を考えれば、致し方ないところはあったと思うよ。最善を尽くそうとした結果だったってことは、わかってる」"
translation = "「네 입장을 생각하면 어쩔 수 없는 면이 있었다고 생각해. 최선을 다하려던 결과였다는 건 알고 있어」"

[[dialogue]]
speaker = "ラクシャ"
original = "「ただ今後は、魔王の動向を見守るにしても、やり方は考えて欲しいかな」"
translation = "「다만 앞으로는 마왕의 동향을 지켜보더라도 방식은 생각해주길 바라」"

[[dialogue]]
speaker = "梨緒"
original = "「その点は承知した。……緋宮クロトの動向を監視するという方針に変更はないが、今後は下手に騒ぎ立てたりせず、自分のやり方で監視を続けることにする」"
translation = "「그 점은 승낙했다. ……히노미야 쿠로토의 동향을 감시한다는 방침에 변경은 없지만, 앞으로는 서투르게 소란을 피우지 않고 내 방식대로 감시를 계속하겠다」"

[[dialogue]]
speaker = "ラクシャ"
original = "「うん。その言葉が聞けて、ボクも安心したよ」"
translation = "「응. 그 말을 들으니 나도 안심이야」"

[[dialogue]]
speaker = "ラクシャ"
original = "「あ、そうそう。彼に１つ、伝言を頼めるかな？」"
translation = "「아, 맞다. 그에게 하나만 전언을 부탁해도 될까?」"

[[dialogue]]
speaker = "ラクシャ"
original = "「『魔王は他の世界で敗北しているから、その可能性を収束させれば、同じ末路を辿ることが確定してしまう』」"
translation = "「『마왕은 다른 세계에서 패배했기에, 그 가능성을 수렴시키면 같은 말로를 걷는 것이 확정되어 버린다』」"

[[dialogue]]
speaker = "ラクシャ"
original = "「要するに、今はまだ魔王の力を全力で使うなって意味なんだけど、まあそこまでは言わなくても、彼ならわかってくれるから」"
translation = "「요컨대 지금은 아직 마왕의 힘을 전력으로 쓰지 말라는 뜻인데, 뭐 거기까지는 말 안 해도 그라면 알아줄 테니까」"

[[dialogue]]
speaker = "梨緒"
original = "「伝言は構わないが、同じ学園だろう。自分で言ったらどうなんだ」"
translation = "「전언은 상관없다만, 같은 학원이잖나. 직접 말하는 게 어떤가」"

[[dialogue]]
speaker = "ラクシャ"
original = "「あっはは～。制服こそ着てるけど、ボクはもう学園に通ってないからね～」"
translation = "「앗하하~. 교복은 입고 있지만 나는 이제 학원에 다니지 않으니까 말이야~」"

[[dialogue]]
speaker = "ラクシャ"
original = "「守護天使も結構しがらみが多くてさ？\u3000今はまだ自由に動けないんだよ。というわけで、伝言は頼めるかな？」"
translation = "「수호천사도 꽤 얽매인 게 많아서 말이지? 지금은 아직 자유롭게 움직일 수 없어. 그런 의미에서 전언은 부탁해도 될까?」"

[[dialogue]]
speaker = "梨緒"
original = "「大事なことなんだな？\u3000言葉の意味はよくわからないから、そのまま伝えるぞ」"
translation = "「중요한 일인 건가? 말의 의미는 잘 모르겠으니 그대로 전하겠다」"

[[dialogue]]
speaker = "ラクシャ"
original = "「ありがとう～。助かるよ！」"
translation = "「고마워~. 도움이 됐어!」"

[[dialogue]]
speaker = "ラクシャ"
original = "「それで……彼にはどうにかして、魔王の力のコントロールを取り戻してもらわなきゃなんだけど……」"
translation = "「그리고…… 그가 어떻게든 마왕의 힘의 컨트롤을 되찾게 해줘야 하는데……」"

[[dialogue]]
speaker = "unk"
original = "ラクシャはそこで考え込むように顎に手を当てて、数秒間沈黙した。"
translation = "락샤는 거기서 생각에 잠긴 듯 턱에 손을 얹고 수초간 침묵했다."

[[dialogue]]
speaker = "ラクシャ"
original = "「……話は少し変わるんだけど、キミ出身は？」"
translation = "「……이야기는 조금 바뀌는데, 너 출신은?」"

[[dialogue]]
speaker = "梨緒"
original = "「？\u3000イングランドだが」"
translation = "「? 잉글랜드다만」"

[[dialogue]]
speaker = "ラクシャ"
original = "「種族は？」"
translation = "「종족은?」"

[[dialogue]]
speaker = "梨緒"
original = "「見ての通り、人間だ」"
translation = "「보는 바와 같이 인간이다」"

[[dialogue]]
speaker = "ラクシャ"
original = "「う～ん……だよねー」"
translation = "「으음…… 그렇겠지~」"

[[dialogue]]
speaker = "梨緒"
original = "「私の生まれがどうかしたのか？」"
translation = "「내 태생이 어쨌다는 건가?」"

[[dialogue]]
speaker = "ラクシャ"
original = "「ああいや、生まれがどうこうっていうより、近しいものを感じるっていうか……」"
translation = "「아아 아니, 태생이 어떻다기보다 친숙한 느낌이 든다고 해야 하나……」"

[[dialogue]]
speaker = "梨緒"
original = "「近しいもの……？\u3000守護天使と私が？\u3000そもそも、君たち六柱以外に守護天使が存在するのか？」"
translation = "「친숙한 느낌……? 수호천사와 내가? 애초에 너희 여섯 기둥 말고 수호천사가 존재하는 건가?」"

[[dialogue]]
speaker = "ラクシャ"
original = "「いるよ。いや、<b>いた</b>って言った方が正確かな」"
translation = "「있어. 아니, <b>있었다</b>고 하는 게 정확하려나」"

[[dialogue]]
speaker = "ラクシャ"
original = "「うーん、これはもしかして……まぁいいや。よくないけど」"
translation = "「으음, 이거 혹시…… 뭐 됐어. 안 되지만」"

[[dialogue]]
speaker = "梨緒"
original = "「？」"
translation = "「?」"

[[dialogue]]
speaker = "ラクシャ"
original = "「じゃあボクから最後のお願い。彼から目を離さないであげて。ヤバくなったら止めてあげて」"
translation = "「그럼 나의 마지막 부탁. 그에게서 눈을 떼지 말아줘. 위험해지면 멈춰줘」"

[[dialogue]]
speaker = "ラクシャ"
original = "「ついでに彼の力を伸ばしてあげて。彼が運命に立ち向かうには、まだまだ彼自身が強くならないといけない」"
translation = "「덤으로 그의 힘을 키워줘. 그가 운명에 맞서려면 아직 그 자신이 더 강해져야 하거든」"

[[dialogue]]
speaker = "梨緒"
original = "「彼と競う形でもいいなら、構わないが」"
translation = "「그와 경쟁하는 형태라도 좋다면 상관없다만」"

[[dialogue]]
speaker = "ラクシャ"
original = "「それはちょうどいいんじゃない？\u3000キミ自身ももっと強くなる必要があるだろうしね」"
translation = "「그거 딱 좋지 않아? 너 자신도 더 강해질 필요가 있을 테니까 말이야」"

[[dialogue]]
speaker = "ラクシャ"
original = "「じゃあボクはこれで──」"
translation = "「그럼 나는 이만──」"

[[dialogue]]
speaker = "梨緒"
original = "「待ってくれ。君は私が何者か知っているのか？」"
translation = "「기다려줘. 너는 내가 누구인지 알고 있는 건가?」"

[[dialogue]]
speaker = "ラクシャ"
original = "「ぜんぜん」"
translation = "「전혀.」"

[[dialogue]]
speaker = "梨緒"
original = "「は？」"
translation = "「하?」"

[[dialogue]]
speaker = "ラクシャ"
original = "「キミは色んな例外、偶然、奇跡の結晶──その正体は誰にもわからないのさ」"
translation = "「너는 여러 예외, 우연, 기적의 결정체── 그 정체는 아무도 모르는 법이지.」"

[[dialogue]]
speaker = "梨緒"
original = "「どういう意味だ……！」"
translation = "「그게 무슨 의미지……!」"

[[dialogue]]
speaker = "ラクシャ"
original = "「その答えはむしろ、キミ自身が持っているはずなんだけど……まあいいさ。さっきも話した通り、キミにも時間が必要だろうからね」"
translation = "「그 답은 오히려 너 자신이 가지고 있을 텐데…… 뭐 됐어. 아까도 말했듯이, 너에게도 시간이 필요할 테니까.」"

[[dialogue]]
speaker = "ラクシャ"
original = "「もちろん推測で良ければ、キミの辿った結末を語ることはできるよ」"
translation = "「물론 추측이라도 괜찮다면, 네가 걸어온 결말을 이야기해 줄 수는 있어.」"

[[dialogue]]
speaker = "梨緒"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "ラクシャ"
original = "「聞きたいなら聞かせてあげるけど、あまりお勧めはしないかな。……特に今はまだ、ね」"
translation = "「듣고 싶다면 들려주겠지만, 별로 추천하지는 않으려나. ……특히 지금은 아직, 말이야.」"

[[dialogue]]
speaker = "ラクシャ"
original = "「覚悟ができたら聞いて欲しいな。──じゃ、今度こそボクは行くよ。また会おうね」"
translation = "「각오가 서면 들어줬으면 좋겠네. ──그럼, 이번에야말로 나는 갈게. 또 보자.」"

[[dialogue]]
speaker = "梨緒"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "ラクシャが去っていく背中を、梨緒は無言で見送った。"
translation = "락샤가 떠나가는 뒷모습을, 리오는 무언으로 배웅했다."

[[dialogue]]
speaker = "unk"
original = "何かをはぐらかすような喋りは気に食わなかったが……同時に、彼女がはぐらかした『結末』とやらを聞くのが怖かったのだ。だから、それ以上踏み込むことができなかった。"
translation = "무언가를 얼버무리는 듯한 말투는 마음에 들지 않았지만…… 동시에, 그녀가 얼버무린 『결말』이라는 것을 듣는 것이 무서웠던 것이다. 그래서, 그 이상 파고들 수 없었다."

[[dialogue]]
speaker = "梨緒"
original = "「っと、誰からだ……？」"
translation = "「앗, 누구지……?」"

[[dialogue]]
speaker = "unk"
original = "エリシアから与えられていたＤＩＳＣの通知には、あらかじめ登録されていた連絡先が表示されていた。"
translation = "엘리시아에게 받았던 DISC의 알림에는, 미리 등록되어 있던 연락처가 표시되어 있었다."

[[dialogue]]
speaker = "unk"
original = "『緋宮クロト』。"
translation = "『히노미야 쿠로토』."

[[dialogue]]
speaker = "unk"
original = "『改めて、大事な話がある。新星の星徒会室まで来てもらえないだろうか？』。"
translation = "『다시 한번, 중요한 이야기가 있어. 신성의 성도회실까지 와 줄 수 없을까?』."

[[dialogue]]
speaker = "unk"
original = "ＤＩＳＣの画面には、飾り気のない文章でそう書かれていた。"
translation = "DISC의 화면에는, 꾸밈없는 문장으로 그렇게 적혀 있었다."

