[[dialogue]]
speaker = "unk"
original = "第７話,ＶＳ星喰らいシャドウ・アポロ戦闘前,B"
translation = "제7화, VS 별을 먹는 자 섀도 아폴로 전투 전, B"

[[dialogue]]
speaker = "unk"
original = "星喰らいの拠点、その３つ目は聖庭園。"
translation = "별을 먹는 자의 거점, 그 세 번째는 성정원."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「世界は間違っている……全部、やり直さなくちゃいけないんだ……」"
translation = "「세계는 잘못되어 있어…… 전부, 다시 시작해야만 해……」"

[[dialogue]]
speaker = "unk"
original = "全て壊れてしまえばいい。こんな歪な世界はやり直すしかない。"
translation = "전부 부서져 버리면 돼. 이런 뒤틀린 세계는 다시 시작할 수밖에 없어."

[[dialogue]]
speaker = "unk"
original = "だから、この世界を存続させようとする輩は皆、敵だ──"
translation = "그러니, 이 세계를 존속시키려 하는 무리는 모두 적이다──"

[[dialogue]]
speaker_original = "ＸＥＬＯＳ"
speaker_translation = "제로스"
original = "「──────ッ！？！？」"
translation = "「──────윽!?!?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「どうしたんだ、真なる神……アルタイルの奴らが来たのか？」"
translation = "「왜 그러지, 진정한 신…… 알타이르 녀석들이 온 건가?」"

[[dialogue]]
speaker_original = "ＸＥＬＯＳ"
speaker_translation = "제로스"
original = "「ギ──ィ────ィィィ！！！」"
translation = "「기──이────이이이!!!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「…………？」"
translation = "「…………?」"

[[dialogue]]
speaker = "unk"
original = "自らを創造した主の、尋常ではない怯えぶりに眉をしかめるアポロの影。意識を集中して、神の声を言語化すると──"
translation = "자신을 창조한 주인의 심상치 않은 겁먹은 모습에 눈살을 찌푸리는 아폴로의 그림자. 의식을 집중하여, 신의 목소리를 언어화하자──"

[[dialogue]]
speaker = "unk"
original = "──奴ラガ来ル。ココニ向カッテイル！！"
translation = "──놈들이 온다. 이곳으로 향하고 있다!!"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「問題ない。あたしが全員、消せばいいだけだろ……敵は誰だ？」"
translation = "「문제없어. 내가 전부 지워버리면 그만이잖아……. 적은 누구지?」"

[[dialogue]]
speaker = "unk"
original = "──ウサギ。"
translation = "──토끼."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「…………は？」"
translation = "「…………하?」"

[[dialogue]]
speaker = "unk"
original = "──ミコ。"
translation = "──무녀."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「……おい？」"
translation = "「……야?」"

[[dialogue]]
speaker = "unk"
original = "──ミズギ。チャイナ。"
translation = "──수영복. 차이나."

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「…………何を言ってるんだ？」"
translation = "「…………무슨 소릴 하는 거야?」"

[[dialogue]]
speaker = "unk"
original = "アルタイルから逐次投入されている戦力に手を焼いているのか。各地で混戦していて、だからおかしな情報が届いているのか？"
translation = "알타이르에서 순차적으로 투입되는 전력에 애를 먹고 있는 것일까. 각지에서 혼전이 벌어지고 있어서, 그래서 이상한 정보가 도착하는 것일까?"

[[dialogue]]
speaker = "unk"
original = "──ソシテ、オ前！！！"
translation = "──그리고, 너!!!"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「うぉぉおぉぉぉおおっ──！！！」"
translation = "「우오오오오오오옷──!!!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「────ッ！？」"
translation = "「────윽!?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「ちぃっ……お前は！\u3000わざわざデネブから呼んできたのか……！」"
translation = "「칫…… 너는! 일부러 데네브에서 불러온 거냐……!」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「全力で斬りかかったんだがな……なかなか反応がいいじゃないか！」"
translation = "「전력으로 베어버리려 했다만…… 제법 반응이 좋은걸!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「同一存在は、同じ世界で意識を保てないはず……」"
translation = "「동일 존재는 같은 세계에서 의식을 유지할 수 없을 텐데……」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「アルタイルのあたしは持久戦が苦手だからな。交代でベガに入れば何も問題ないってことだ！」"
translation = "「알타이르의 나는 지구전이 서투르거든. 교대로 베가에 들어오면 아무 문제 없다는 뜻이다!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「はっ……だからって、もうあがりも近い方のあたしが来るだなんてな……随分と舐められたもんだ」"
translation = "「핫…… 그렇다고 해서, 이제 은퇴가 가까운 쪽의 내가 오다니 말이야…… 상당히 얕보인 모양이군.」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「それはどうかな？\u3000あたしは１人じゃない……頼りになる仲間がいる！！」"
translation = "「그건 어떨까? 나는 혼자가 아니야…… 의지가 되는 동료가 있다!!」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「──流星星徒会、出番だッ！！！」"
translation = "「──유성 학생회, 차례다!!!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「おっまかせー！\u3000アポロちゃんの背中は、ウチが守るよん♪」"
translation = "「맡겨줘! 아폴로짱의 등은 내가 지킨다구♪」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「はい！\u3000行きましょう、アポロさん！！」"
translation = "「네! 가요, 아폴로 씨!!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「早速手に入れた戦闘服！\u3000ルリエルも思いっきりいっちゃうのです！\u3000でんでん♪」"
translation = "「냉큼 손에 넣은 전투복! 루리엘도 마음껏 해버리는 거예요! 뎬뎬♪」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「…………いっそ殺してくれ」"
translation = "「…………차라리 죽여줘.」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「………………は？」"
translation = "「………………하?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「な、何なんだオマエたち……頭が沸いてるのか！？」"
translation = "「뭐, 뭐야 너희들…… 머리가 어떻게 된 거냐!?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「おっ。奇襲の効果アリかな？\u3000敵さん、混乱してるみたいだね～♪」"
translation = "「오. 기습 효과가 좀 있나 본데? 적이 혼란스러워하는 것 같네~♪」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「見た目こそ統一感はありませんが、今はこれが一番強いので仕方がありません」"
translation = "「겉모습은 통일감이 없지만, 지금은 이게 가장 강하니 어쩔 수 없습니다.」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「ちくしょうっ……何が幹内世界だ！！\u3000向こうのあたしは何でこんな衣装を──イカれてんのか！？！？」"
translation = "「젠장…… 뭐가 간내 세계야!! 저쪽의 나는 왜 이런 의상을── 미친 거 아니야!?!?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「……………………」"
translation = "「……………………」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「めちゃくちゃドン引きされてるじゃねえか！？\u3000敵からこんな目で見られたの初めてだぞ！？」"
translation = "「엄청나게 질려 하고 있잖아!? 적한테 이런 눈초리를 받은 건 처음이라고!?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「まぁまぁ。ウチも同じ格好じゃん♪\u3000ユウリちゃんも腹くくっちゃいなよー♪」"
translation = "「에이 에이. 나도 같은 꼴이잖아♪ 유우리짱도 각오를 다지라구~♪」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「できたら苦労しませんって！！\u3000他の戦闘服に変更もできないし……最悪だ！！！」"
translation = "「그게 됐으면 고생 안 한다고요!! 다른 전투복으로 변경도 안 되고…… 최악이야!!!」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「だけど普段の時よりずっと星力は高くなってるはずだ。魔王の力で今だけ使える戦闘服……期待してるぞ！\u3000背中は任せた！！」"
translation = "「하지만 평소보다 훨씬 성력이 높아졌을 터다. 마왕의 힘으로 지금만 사용할 수 있는 전투복…… 기대하고 있으마! 등은 맡기지!!」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「まともな格好の時に聞きたかった、その言葉……！！」"
translation = "「멀쩡한 모습일 때 듣고 싶었어요, 그 말……!!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「大丈夫なのです、ユウリ先輩！\u3000バニーのお仲間はまだまだたくさんいるのですっ！\u3000ほら、あちらにも！」"
translation = "「괜찮은 거예요, 유우리 선배! 바니 동료는 아직도 잔뜩 있는 거예요! 봐요, 저쪽에도!」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「──ホワイ！？\u3000どうして<ruby>女帝<rt>エンプレス</rt></ruby>フォームが起動しませんの！？\u3000何度試しても、バニーガールになってしまいますわぁ！？」"
translation = ""

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「たゆまぬ努力で身に着けた覚醒衣装より……なぜかこちらの方が優先されて……発現できる星力も多くて──納得いきませんわ！！」"
translation = "「끊임없는 노력으로 몸에 익힌 각성 의상보다…… 왠지 이쪽이 우선되어서…… 발현할 수 있는 성력도 많고── 납득할 수 없어요!!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「こっちにも！？\u3000神が言ってた『ウサギ』って、このことなのか……！？\u3000馬鹿にしやがって！！」"
translation = "「이쪽에도!? 신이 말했던 『토끼』라는 게 이걸 말하는 거였나……!? 사람 우습게 보기는!!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「どんな経緯があったら、そんなもん着るハメになるんだ！！」"
translation = "「도대체 어떤 경위가 있으면 그런 걸 입게 되는 거냐!!」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「どんな経緯と言われても──」"
translation = "「어떤 경위냐고 물으셔도──」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「この衣装を手に入れたのは、幹内世界の私……実際にその場に居合わせたわけではないのに──」"
translation = "「이 의상을 손에 넣은 것은 간내 세계의 저…… 실제로 그 자리에 있었던 것은 아닌데──」"

[[dialogue]]
speaker = "unk"
original = "セナリィとヒルディオーネの記憶に鮮烈に噴き上がる、どこかの枝葉の世界の、流星市国のカジノ──"
translation = "세나리와 힐디요네의 기억 속에 강렬하게 솟구치는, 어딘가의 가지 세계인 유성 시국의 카지노──"

[[dialogue]]
speaker = "unk"
original = "そして────１人の怪人の姿。"
translation = "그리고──── 한 괴인의 모습."

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「うぅっ！\u3000頭がっ……！！」"
translation = "「으윽! 머리가……!!」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「存在しない記憶が確かに今、私の中にっ──おぇ！\u3000すげぇ嫌な気分ですわ……！！」"
translation = "「존재하지 않는 기억이 분명히 지금, 내 안에── 우웩! 정말 기분 나빠요……!!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「勝手にダメージ受けてるし……何なんだオマエら……」"
translation = "「지 혼자 대미지 입고 있고…… 뭐야 너희들……」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「背を曲げてだらしないわね、２人とも。もっと胸を張りなさい。これは世界を守る戦いなのよ！」"
translation = "「등을 굽히고 꼴사납구나, 둘 다. 좀 더 가슴을 펴렴. 이건 세계를 지키는 싸움이야!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「いや、水着のオマエも大概だぞ！？」"
translation = "「아니, 수영복인 너도 만만치 않거든!?」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「マムはあのヘンタイをご存じないからそんな呑気なことが言えるんですわ！\u3000大変だったんですのよ！？」"
translation = "「맘은 그 변태를 모르시니까 그런 느긋한 소리를 하시는 거예요! 정말 힘들었다고요!?」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「ぴょんぴょん言いながら給仕をさせられた記憶が止まりませんっ……最悪ですわ！！」"
translation = "「뿅뿅거리며 서빙을 하게 된 기억이 멈추지 않아요…… 최악이에요!!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「フロンティアドライブ・オーバーロード……場合によっては副作用もありそうね。主にメンタル面で」"
translation = "「프론티어 드라이브 오버로드…… 경우에 따라서는 부작용도 있을 것 같네. 주로 멘탈 면에서.」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「──じゃあどうするの、２人とも？\u3000後ろに下がって見学でもしておく？」"
translation = "「──그럼 어떻게 할래, 둘 다? 뒤로 물러나서 구경이나 하고 있을래?」"

[[dialogue]]
speaker_original = "ヒルディオーネ"
speaker_translation = "힐디오네"
original = "「まさか！\u3000敵を前に下がるだなんて、千園寺家の名折れ！\u3000誰よりも果敢に前へ出て、あの使徒を粉砕いたしましてよ！？」"
translation = "「설마요! 적을 앞에 두고 물러나다니, 센온지가의 수치! 누구보다 용감하게 앞으로 나서서 저 사도를 분쇄해 보이겠어요!?」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「会長様に報酬をたんまり貰う約束をしておりますっ……あのヘンタイへの恨み、気の毒ですが全て眼前の敵にぶつけてやりますわ！」"
translation = "「회장님께 보수를 듬뿍 받기로 약속했답니다…… 그 변태에 대한 원한, 안됐지만 전부 눈앞의 적에게 쏟아부어 주겠어요!」"

[[dialogue]]
speaker_original = "マハムート"
speaker_translation = "마하무트"
original = "「その意気よ。私と肩を並べる以上、不甲斐ない戦いは許されないわ」"
translation = "「그 기세야. 나와 어깨를 나란히 하는 이상, 한심한 싸움은 허용되지 않아.」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「……あたしは煌嶺陛下から２つの命を受けている」"
translation = "「……나는 코우레이 폐하로부터 두 가지 명을 받았다.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あら～、そうなの？」"
translation = "「어머~, 그렇니?」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「１つは、キュリオスの兵として誰よりも戦果をあげてくること」"
translation = "「하나는 큐리오스의 병사로서 누구보다 전과를 올리고 올 것.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「うんうん♪」"
translation = "「응응♪」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「そしてもう１つは……アルタイルの星騎士たちが、どのような可能性を掴んだのかを見極め、報告しろと」"
translation = "「그리고 또 하나는…… 알타이르의 성기사들이 어떤 가능성을 거머쥐었는지 지켜보고 보고하라고.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あらあら、うふふ～♪」"
translation = "「어머 어머, 우후후~♪」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「こんなの、どう伝えろというんだ！\u3000バニーガールに水着にハロウィンに変身ヒーロー……魔界の原生生物だってもう少し秩序があるぞ！？」"
translation = "「이런 걸, 어떻게 전하라는 거냐! 바니걸에 수영복에 할로윈에 변신 히어로…… 마계의 원생생물도 이보다는 질서가 있겠어!?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「私は晴れ着だから、それもちゃーんと伝えてあげてね～<emoji=heart04>」"
translation = "「나는 나들이옷이니까, 그것도 자~알 전해주렴~<emoji=heart04>」"

[[dialogue]]
speaker_original = "リーエン"
speaker_translation = "리엔"
original = "「──陛下。あたしは未熟者です……戦場とは常に予想の上を行くものとわかっていながら──今、非常に取り乱してしまっています！！」"
translation = "「──폐하. 저는 미숙한 놈입니다…… 전장이란 항상 예상을 뛰어넘는 법이란 걸 알면서도── 지금, 몹시 당황해 버렸습니다!!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「こんな奴らに、すでに２拠点で敗北を喫している、だって……？」"
translation = "「이런 녀석들에게 벌써 두 거점에서 패배를 맛봤다고……?」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「……やっぱりだ。この世界は間違ってる──こんなめちゃくちゃな世界は、滅びなくちゃいけないんだ！」"
translation = "「……역시나다. 이 세계는 잘못됐어── 이런 엉망진창인 세계는 멸망해야만 해!」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「──ここに派遣されて、あたしは嬉しいぞ」"
translation = "「──이곳으로 파견되어서 나는 기쁘다고.」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「使徒だった頃の自分に、直接引導を渡せるんだからな！！」"
translation = "「사도였던 시절의 자신에게 직접 작별을 고할 수 있으니까 말이야!!」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「滅びていい世界なんて存在しない！\u3000いつだってヒトは、成長と進化を続けていけるんだ！！」"
translation = "「멸망해도 좋은 세계 따윈 존재하지 않아! 언제라도 인간은 성장과 진화를 계속해 나갈 수 있는 거다!!」"

[[dialogue]]
speaker_original = "アポロ（大人）"
speaker_translation = "아폴로(성인)"
original = "「そのことを──今からあたしたちが教えてやる！！」"
translation = "「그 사실을── 지금부터 우리가 가르쳐주마!!」"

[[dialogue]]
speaker_original = "アポロ"
speaker_translation = "아폴로"
original = "「かかって来い、アルタイルの星騎士たち……ベガの地球を喰い潰す前に、オマエたちから消してやる──！！」"
translation = "「덤벼라, 알타이르의 성기사들…… 베가의 지구를 집어삼키기 전에 너희들부터 지워주마──!!」"

