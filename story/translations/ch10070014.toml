[[dialogue]]
speaker = "unk"
original = "第４話,やる時はやる子,P"
translation = "제4화, 할 때는 하는 아이"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「うーん……柱……柱……全然思いつかないのですぅ……天界と人間界を繋ぐ存在って何なのですか？」"
translation = "「으음…… 기둥…… 기둥…… 전혀 떠오르지 않아요…… 천계와 인간계를 잇는 존재란 무엇인가요?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「……観光大使？\u3000へぇ～、そういうのもあるのですねぇ。でもフィリスティアに観光するところなんてありませんよぉ～？」"
translation = "「……관광 대사? 헤에~ 그런 것도 있군요. 하지만 필리스티아에 관광할 곳 같은 건 없다고요?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「わたしはどうすれば、じっちゃんばっちゃんの期待に応えられるのでしょうか……？」"
translation = "「저는 어떻게 해야 할배 할매들의 기대에 부응할 수 있을까요……?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ハッ、もしかしてルリエルはダメな天使なんじゃないでしょうか……！？」"
translation = "「핫, 혹시 루리엘은 안 좋은 천사인 게 아닐까요……!?」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「ん？\u3000ルリと新星の会長さんって、珍しい組み合わせだな」"
translation = "「음? 루리랑 신성의 회장이라니, 드문 조합이네」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「聞いてくださいよぉ、ユウリ先輩。かくかしかじかで」"
translation = "「들어보세요, 유우리 선배. 이러쿵저러쿵해서요」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「ふーん」"
translation = "「흐응」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「つれない反応！？\u3000かわいい後輩の悩みですよ～」"
translation = "「무심한 반응!? 귀여운 후배의 고민이라고요~」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「自分でかわいいって言うな。つーか、そんなの今さらっていうか……別に悩むことじゃなくね？」"
translation = "「자기 입으로 귀엽다고 하지 마. 그보다 그런 건 이제 와서랄까…… 별로 고민할 일도 아니잖아?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「うぅ、冷たい……意外と親切で優しいと評判のユウリ先輩らしくないですよぉ」"
translation = "「우으, 차가워…… 의외로 친절하고 상냥하다고 평판이 자자한 유우리 선배답지 않아요」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「どこで評判になってるんだよ。つか意外は余計だ。……あんたはどう思う？」"
translation = "「어디서 그런 평판이 난 거야. 그리고 의외라는 말은 빼. ……너는 어떻게 생각해?」"

[[dialogue]]
speaker = "unk"
original = "ルリエルはダメな天使じゃない"
translation = "루리엘은 안 좋은 천사가 아니야"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ホントですか！？\u3000ありがとうございますぅ～！」"
translation = "「정말인가요!? 감사합니다~!」"

[[dialogue]]
speaker = "unk"
original = "……と思う"
translation = "……라고 생각해"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「そこは断言してくださいよ～！？」"
translation = "「거기선 단정해 주세요~!」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「新星の会長もなんか変なヤツだな……。でもな、ルリ――」"
translation = "「신성의 회장도 참 이상한 녀석이네……. 하지만 말이야, 루리――」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「！\u3000アステラ……しかも近いな。この話は後だ、行くぞ！」"
translation = "「! 아스테라…… 게다가 가깝군. 이 이야기는 나중이다, 가자!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「いっきますよぉ……エールホルン！」"
translation = "「가압니다…… 에일 호른!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「えへへっ、今度はちゃんとサポートするって言いましたからっ」"
translation = "「에헤헤, 이번엔 제대로 서포트한다고 했으니까요!」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「チッ……そんなに強くはねえが、モンスターの数が多いな。キリがねえ」"
translation = "「칫…… 그렇게 강하진 않지만, 몬스터 수가 많군. 끝이 없어」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ではユウリ先輩は外のモンスターの掃討をお願いしますっ。わたしと会長さんでアステラを叩きます。行きましょう！」"
translation = "「그럼 유우리 선배는 밖의 몬스터 소탕을 부탁드려요. 저와 회장님이 아스테라를 치겠습니다. 가요!」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「あっ、おい！\u3000……ま、ルリと新星の会長さんなら何とかなるか」"
translation = "「앗, 어이! ……뭐, 루리랑 신성의 회장이라면 어떻게든 되겠지」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「ま、後輩に任されたからには手は抜けねえな。いっちょ暴れてやるか！」"
translation = "「뭐, 후배에게 맡겨진 이상 대충 할 순 없지. 한바탕 날뛰어 볼까!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「アステラの中もモンスターがたくさんなのです。もう一度会長さんに加護を……」"
translation = "「아스테라 안에도 몬스터가 가득해요. 다시 한번 회장님께 가호를……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ふぇ……ふぇ……」"
translation = "「에…… 에……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「セーフッ！\u3000ギリギリでくしゃみしなかったのですよっ。それでは……エールホルン！」"
translation = "「세이프! 간신히 재채기를 안 했답니다. 그럼…… 에일 호른!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「わたしもバシバシ攻撃しますっ。故郷で鍛えた肺活量と星力を見せる時なのですよっ」"
translation = "「저도 팍팍 공격할게요. 고향에서 단련한 폐활량과 성력을 보여줄 때라고요!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「でもやっぱり敵が多いですね……ルリエルと会長さんだけだと大変です……」"
translation = "「하지만 역시 적이 많네요…… 루리엘과 회장님뿐이면 힘들어요……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「わわっ！？」"
translation = "「와왓!?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「会長さんっ！？\u3000わたしをかばってくれたのですか！？」"
translation = "「회장님!? 저를 감싸주신 건가요!?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「くっ……まだモンスターが残ってます……これはゼッタイゼツメイというやつなのでは！？」"
translation = "「큭…… 아직 몬스터가 남아있어요…… 이건 절체절명이라는 상황 아닌가요!?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「こうなったら――」"
translation = "「이렇게 되면――」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「シンフォニックブラスター！」"
translation = "「심포닉 블래스터!」"

[[dialogue]]
speaker = "unk"
original = "角笛からビーム出た！？"
translation = "뿔나팔에서 빔이 나갔어!?"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ふぅ～、みっともないから使うなとじっちゃんばっちゃんに言われてたのですが、ピンチなので使っちゃいました」"
translation = "「후우~ 꼴사나우니까 쓰지 말라고 할배 할매들이 말씀하셨지만, 위기라서 써버렸어요」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「狙いを付けるのが難しいので、外したらどうしようかと思いましたが……今のでだいぶ倒せたみたいですね。このまま押し切っちゃいましょお～！」"
translation = "「조준하는 게 어려워서 빗나가면 어쩌나 했지만…… 방금 걸로 꽤 쓰러뜨린 모양이네요. 이대로 밀어붙여요!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ふぅ～、終わりました……。あっ、会長さん、さっきの大丈夫ですか？\u3000……平気？\u3000それなら良かったですぅ～」"
translation = "「후우~ 끝났습니다……. 앗, 회장님, 아까 그거 괜찮으세요? ……멀쩡하다고요? 그렇다면 다행이에요~」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「いえ～い、ルリエル大活躍でした！\u3000これでじっちゃんばっちゃんに顔向けできますねっ」"
translation = "「이예이, 루리엘 대활약이었습니다! 이걸로 할배 할매들을 떳떳하게 뵐 수 있겠네요!」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「よっ、そっちも終わったみたいだな」"
translation = "「여어, 그쪽도 끝난 모양이네」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「あっれ～、援軍に来たんだけどもう終わった感じ？」"
translation = "「어라라~ 원군으로 왔는데 이미 끝난 느낌?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「セーラ先輩、ユウリ先輩！」"
translation = "「세라 선배, 유우리 선배!」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「新星の会長さんよ。うちのルリはどうだった？」"
translation = "「신성의 회장. 우리 루리는 어땠어?」"

[[dialogue]]
speaker = "unk"
original = "立派な星騎士だった"
translation = "훌륭한 성기사였어"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「会長さん……！」"
translation = "「회장님……!」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「だろ？\u3000うちの星徒会に役立たずはいねーんだ」"
translation = "「그렇지? 우리 성도회에 쓸모없는 녀석은 없다고」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「ユウリ先輩～っ！」"
translation = "「유우리 선배~!」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「星力が強いのに制御に難があったり……」"
translation = "「성력은 강한데 제어가 좀 힘들기도 하고……」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「時々どころかけっこうドジもしたりするが……」"
translation = "「때때로가 아니라 꽤 덜렁대기도 하지만……」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「立派な流星星徒会の一員だよっ♪」"
translation = "「훌륭한 유성 성도회의 일원이야♪」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「嬉しいですけど、ほめる時はもっと全力ほめてくださいよぉ～」"
translation = "「기쁘긴 하지만, 칭찬할 때는 좀 더 온 힘을 다해 칭찬해 주세요~」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「はははっ。ま、それはもっと立派になった時にね。……今日はお疲れさま、ルリちー」"
translation = "「하하하. 뭐, 그건 좀 더 훌륭해졌을 때 해줄게. ……오늘 수고했어, 루리치」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「はいっ、みなさんもお疲れ様でしたっ♪」"
translation = "「네! 여러분도 수고하셨습니다♪」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「それと……さっきはかばってくれてありがとうございました、会長さん。あの時の会長さん、とってもかっこよかったのです！」"
translation = "「그리고…… 아까는 감싸주셔서 감사했어요, 회장님. 그때의 회장님, 정말 멋있었답니다!」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「会長さんには、これまでも助けてもらったり、一緒にお出かけしたりしました。だから……」"
translation = "「회장님께는 지금까지 도움도 받고, 같이 외출도 했었죠. 그러니까……」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「会長さん、大好きなのですっ♪」"
translation = "「회장님, 정말 좋아해요!♪」"

