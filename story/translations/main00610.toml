[[dialogue]]
speaker = "unk"
original = "第１２話,姫,B"
translation = "제12화, 공주, B"

[[dialogue]]
speaker = "アイリーン"
original = "「──っ！」"
translation = "「──읏!」"

[[dialogue]]
speaker = "クロト"
original = "「これで文句ないな──撤退だ！」"
translation = "「이걸로 불만 없겠지── 철수다!」"

[[dialogue]]
speaker = "ルリエル"
original = "「あいあいさー！」"
translation = "「아이아이사!」"

[[dialogue]]
speaker = "unk"
original = "アイリーンさん達を退けて基地を脱する──"
translation = "아이린 씨 일행을 물리치고 기지를 탈출한다──"

[[dialogue]]
speaker = "unk"
original = "全員で夜空へと飛び立った先では、基地の全容が見渡せた。"
translation = "전원이 밤하늘로 날아오른 곳에서는, 기지의 전모가 내려다보였다."

[[dialogue]]
speaker = "マトイ"
original = "「わっ！？\u3000海風がすごい──！」"
translation = "「왓!? 바닷바람이 굉장해──!」"

[[dialogue]]
speaker = "クロト"
original = "「こんなところに基地を構えてたなんてな──」"
translation = "「이런 곳에 기지를 세우고 있었다니──」"

[[dialogue]]
speaker = "サーシャ"
original = "「見つからないうちに、さっさと飛んで逃げちゃいましょ♪」"
translation = "「들키지 않게, 얼른 날아서 도망쳐 버리자♪」"

[[dialogue]]
speaker = "セーラ"
original = "「んじゃ、うちはこのへんで～」"
translation = "「그럼, 나는 이쯤에서」"

[[dialogue]]
speaker = "ソフィア"
original = "「だーめーでーす。学園長に報告へ行きますよ」"
translation = "「안 돼~요. 학원장에게 보고하러 가야죠」"

[[dialogue]]
speaker = "ユウリ"
original = "「はあ、長ぇ一日だ……」"
translation = "「하아, 긴 하루다……」"

[[dialogue]]
speaker = "unk"
original = "そんなこんなで──"
translation = "이러쿵저러쿵해서──"

[[dialogue]]
speaker = "unk"
original = "『ネビュラ』から逃れた俺たちは、報告のため学園へと戻っていった。"
translation = "『네뷸라』에게서 도망친 우리는, 보고를 위해 학원으로 돌아갔다."

[[dialogue]]
speaker = "ネビュラ隊員Ａ"
original = "「──対象ロスト。行き先は恐らく流星学園」"
translation = "「──대상 로스트. 행선지는 아마도 유성 학원」"

[[dialogue]]
speaker = "ネビュラ隊員Ｂ"
original = "「アイリーン様……追わなくてもよろしかったのですか？」"
translation = "「아이린 님…… 쫓지 않으셔도 괜찮으셨습니까?」"

[[dialogue]]
speaker = "アイリーン"
original = "「ええ──十分です。いずれまた会う機会もあるでしょう」"
translation = "「네── 충분합니다. 언젠가 다시 만날 기회도 있겠지요」"

[[dialogue]]
speaker = "unk"
original = "クロトら去りし後。"
translation = "쿠로토 일행이 떠난 후."

[[dialogue]]
speaker = "unk"
original = "アイリーンは、魔法を通して彼らの星力──その痕跡を解析していた。"
translation = "아이린은, 마법을 통해 그들의 성력── 그 흔적을 분석하고 있었다."

[[dialogue]]
speaker = "アイリーン"
original = "（太陽の星力……やはり星見の娘の血は、本物でしたか）"
translation = "（태양의 성력…… 역시 호시미 가문 딸의 피는, 진짜였습니까）"

[[dialogue]]
speaker = "unk"
original = "いずれまた会う。"
translation = "언젠가 다시 만난다."

[[dialogue]]
speaker = "unk"
original = "その言葉は、紛れもない運命なのかもしれなかった……。"
translation = "그 말은, 틀림없는 운명이었을지도 모른다……. "

[[dialogue]]
speaker = "セドナ"
original = "「と、いうわけで──彼らとの初接触を果たしました」"
translation = "「자, 그런 이유로── 그들과의 첫 접촉을 완수했다」"

[[dialogue]]
speaker = "？？？"
original = "「な～んだ、もう行ってしもうたのか。せっかくの客人であったというに」"
translation = "「뭐야, 벌써 가 버린 건가. 모처럼의 손님이었는데」"

[[dialogue]]
speaker = "セドナ"
original = "「十分な情報は与えました。いずれ、向こうから接触を図ってくるでしょう」"
translation = "「충분한 정보는 주었다. 언젠가, 저쪽에서 접촉을 시도해 올 것이다」"

[[dialogue]]
speaker = "？？？"
original = "「余は張り切って準備をしておったのだぞ。こういうのは第一いんしょーが肝心と言うからのう」"
translation = "「여는 잔뜩 힘내서 준비하고 있었단 말이다. 이런 건 첫인상이 중요하다고 하니」"

[[dialogue]]
speaker = "セドナ"
original = "「僭越ながら。その前に先日の課題をご提出いただかないことには……」"
translation = "「주제넘지만. 그전에 지난번 과제를 제출해 주셔야만……」"

[[dialogue]]
speaker = "？？？"
original = "「わかっておる、わかっておる。全く、その眼で睨まれてはあやつらが帰るのも無理はない」"
translation = "「알고 있다, 알고 있어. 정말이지, 그 눈으로 노려보면 그 녀석들이 돌아가는 것도 무리는 아니지」"

[[dialogue]]
speaker = "？？？"
original = "「とはいえ、ま……それなら再会を心待ちにするとしようかのう」"
translation = "「그렇다고 해도, 뭐…… 그렇다면 재회를 고대하기로 할까」"

[[dialogue]]
speaker = "？？？"
original = "「あのクロトという<ruby>童<rt>わっぱ</rt></ruby>──それから、ヴィーナスとかいう娘。あの２人……何やらただならぬ繋がりに見えたがのう」"
translation = "「그 쿠로토라는 애송이── 그리고, 비너스라고 하는 아가씨. 그 두 사람…… 뭔가 예사롭지 않은 연결고리로 보였는데」"

[[dialogue]]
speaker = "unk"
original = "笑う少女。"
translation = "웃는 소녀."

[[dialogue]]
speaker = "unk"
original = "果たして、彼らが再びここを訪れる日は来るのだろうか……。"
translation = "과연, 그들이 다시 이곳을 방문할 날이 올 것인가……. "

