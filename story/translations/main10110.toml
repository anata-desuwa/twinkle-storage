[[dialogue]]
speaker = "unk"
original = "第１０話,私が誰かの一番に,B"
translation = "제10화, 내가 누군가의 1순위로"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「お疲れさまでーす」"
translation = "「수고하셨습니다─」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「マトイちゃん、昨日はお疲れさま～」"
translation = "「마토이짱, 어제는 수고했어~」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「くんくん……なんだかマトイから香ばしい匂いがするわ！」"
translation = "「킁킁…… 왠지 마토이한테서 고소한 냄새가 나!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「さすが会長、目聡い……じゃなくて、鼻聡いですね」"
translation = "「역시 회장님, 눈치가 빠르…… 가 아니라 코가 밝으시네요」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「今日はお菓子を焼いてきたんです」"
translation = "「오늘은 과자를 구워 왔어요」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「マトイ先輩、お菓子を作れるのですか？」"
translation = "「마토이 선배, 과자를 만들 줄 아시나요?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「誰でも作れるような簡単なヤツだけね」"
translation = "「누구나 만들 수 있는 간단한 것뿐이야」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「この匂いは……待って！\u3000言わないで！\u3000当ててみせるわ」"
translation = "「이 냄새는…… 잠깐! 말하지 마! 내가 맞춰보겠어」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「小麦、そして、バターの香り……わかったわ、マフィンね！\u3000それとも、スコーンかしら！」"
translation = "「밀가루, 그리고 버터 향기…… 알았어, 머핀이지! 아니면 스콘인가!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「……クッキーです。普通ですみません」"
translation = "「……쿠키예요. 평범해서 죄송해요」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「くうっ！\u3000惜しかったわね！」"
translation = "「크윽! 아까웠네!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ニアピンです」"
translation = "「근접했습니다」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「でも、普通のクッキーじゃない……でしょ？」"
translation = "「하지만 평범한 쿠키가 아니…… 지?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「そうですね、ほんのちょっとだけ普通じゃないかもしれません」"
translation = "「그렇네요, 아주 조금은 평범하지 않을지도 몰라요」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「アナが和菓子好きなので、きなこクッキーを作ってきました」"
translation = "「아나가 화과자를 좋아해서 인절미 쿠키를 만들어 왔어요」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「きなこクッキー！？\u3000そんなのあるのね！」"
translation = "「인절미 쿠키!? 그런 것도 있구나!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「大したものじゃないですよ。薄力粉ときな粉を３：１の割合で混ぜて、普通に焼くだけですし」"
translation = "「대단한 건 아니에요. 박력분이랑 인절미 가루를 3:1 비율로 섞어서 평범하게 굽기만 하면 되니까요」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「せっかくだし、お紅茶いれるわね～。和菓子なら、緑茶の方が良いかしら？」"
translation = "「기왕 이렇게 된 거 홍차를 내올게~. 화과자라면 녹차가 더 좋으려나~?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「はいどうぞ、召し上がれ」"
translation = "「자 여기요, 드셔보세요」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「いっただっきまーす！」"
translation = "「잘 먹겠습니다!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「さくっ……おお、これは紛れもなく和菓子の味わい」"
translation = "「바삭…… 오오, 이것은 틀림없는 화과자의 맛」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「まあ！\u3000香ばしくって美味しいわね～」"
translation = "「어머! 고소하고 맛있네~」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「とっても美味しいわ！\u3000これは食べる手が止まらないわ！\u3000さくさく、もぐもぐ」"
translation = "「정말 맛있어! 이건 손이 멈추질 않네! 바삭바삭, 우물우물」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「みんなの口に合ったなら嬉しいです。また作ってきますね」"
translation = "「모두의 입맛에 맞았다면 기뻐요. 다음에 또 만들어 올게요」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「むぐむぐ……ああ、そうそう、マトイ」"
translation = "「우물우물…… 아, 맞다 마토이」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「なんでしょう？\u3000ヴィーナス会長」"
translation = "「왜 그러시죠? 비너스 회장님」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「それ、やめない？」"
translation = "「그거, 그만두지 않을래?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「やめる……？\u3000どれのことですか？」"
translation = "「그만두다니……? 어떤 거 말인가요?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「敬語よ、敬語。あと、ヴィーナス会長って呼ぶのもね」"
translation = "「경어 말이야, 경어. 그리고 비너스 회장이라고 부르는 것도」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「私とマトイは同じ学年なんだし、同じ星徒会の役員でしょう？」"
translation = "「나랑 마토이는 같은 학년이고, 같은 성도회 임원이잖아?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「え、でも……会長は会長ですし」"
translation = "「에, 하지만…… 회장님은 회장님이고」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「デモもデーモンもなし！\u3000いいから呼び捨てにするの！\u3000敬語も禁止！\u3000それまで、マトイはおやつ抜き！」"
translation = "「하지만도 다이아몬드도 없어! 됐으니까 이름으로 부르는 거야! 경어도 금지! 그때까지 마토이는 간식 금지!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「そんな！\u3000私が作ってきたクッキーなのに！\u3000ひどいですよ、ヴィーナス会――」"
translation = "「너무해요! 제가 만들어 온 쿠키인데! 너무해요, 비너스 회─」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ん～～～？」"
translation = "「으음~~~?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ヴィ、ヴィ―ナス……？」"
translation = "「비, 비너스……?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「『？』もなーし」"
translation = "「『?』도 없어」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ひ、ひどいよー、ヴィーナスー」"
translation = "「너, 너무해, 비너스─」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「よろしい！\u3000はい、ご褒美のクッキー♪」"
translation = "「좋아! 자, 상으로 주는 쿠키♪」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「むぐっ……！\u3000ヴィーナスはわがままなんだから……もぐもぐ。ん、今日のは格別に美味しくできてる」"
translation = "「우구……! 비너스는 제멋대로라니까…… 우물우물. 음, 오늘 건 유독 맛있게 됐네」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「そうね～。わがまま会長さんにはプレゼントするの、やめちゃおうかな～？」"
translation = "「그렇네~. 제멋대로인 회장님한테는 선물 주는 거 관둘까나~?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「えっ、プレゼント？\u3000何かしら？」"
translation = "「엣, 선물? 뭔데?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「前に流星の会長さんみたいなマント欲しいって、言ってたじゃない？」"
translation = "「전에 유성의 회장님 같은 망토가 갖고 싶다고 했었지?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「確かに言ったわ。えっ、もしかして！」"
translation = "「분명 말했지. 설마!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「そう。作ってきたのよ～」"
translation = "「응. 만들어 왔어~」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「わぉ！\u3000格好いいじゃなーい！」"
translation = "「와오! 멋지잖아!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「サーシャ先輩が作ったんですか？」"
translation = "「사샤 선배가 만든 건가요?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「うふふ。夜なべして、つい張り切っちゃった」"
translation = "「우후후. 밤을 새워서 그만 기운을 좀 냈어」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「こんな素敵なマントを手作りだなんて……私のクッキーが霞んじゃいますね、あはは」"
translation = "「이런 멋진 망토를 수제라니…… 내 쿠키가 빛이 바래네요, 아하하」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「何言ってるの！\u3000マトイのクッキーだって、すごいじゃない！」"
translation = "「무슨 소리야! 마토이의 쿠키도 대단하잖아!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「そ、そう……？」"
translation = "「그, 그래……?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「私、マトイの作ったクッキー、今まで食べてきたお菓子で一番好きよ！」"
translation = "「나, 마토이가 만든 쿠키, 지금까지 먹어본 과자 중에서 제일 좋아!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ふえ」"
translation = "「후에」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（ヴィーナスはいいとこの生まれだ。これまで美味しいお菓子だって、数えきれないくらい食べてきただろう）"
translation = "(비너스는 좋은 집안 출신이다. 지금까지 맛있는 과자 같은 건 셀 수 없을 정도로 먹어왔겠지)"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（そんな並みいるお菓子を押しのけて、私の焼いたクッキーが一番なんて）"
translation = "(그런 쟁쟁한 과자들을 제치고 내가 구운 쿠키가 제일이라니)"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（そんなのあまりに見え透いたお世辞に決まってるのに……）"
translation = "(그런 건 너무 뻔한 빈말이 분명한데……)"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "（私が誰かの一番になんて、なれると思っていなかったから……）"
translation = "(내가 누군가의 1순위 같은 게 될 수 있을 거라곤 생각하지 못했으니까……)"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「うぇ、えっ、んぇ……うぇぇぇっ……！\u3000ぇ、ふぇえぇぇぇんっ……！」"
translation = "「우에, 엣, 응에…… 우에에에……! 에, 후에에에엔……!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「マトイ！？\u3000なんで泣きだしちゃったの！？」"
translation = "「마토이!? 왜 울기 시작하는 거야!?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ヴィーナズがぞんなごど言うがらぁ！」"
translation = "「비너즈가 그런 마를 하니까아!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「泣かせるようなこと言ったかしら！？」"
translation = "「울릴 만한 말을 했나!?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「私もマトイ先輩のクッキー、大好きです。ベストです」"
translation = "「저도 마토이 선배의 쿠키, 정말 좋아해요. 베스트예요」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「うんうん、とっても美味しいから、また作ってきてほしいな～」"
translation = "「응응, 정말 맛있으니까 또 만들어 와줬으면 좋겠네~」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「うぇぇぇん、みんな、優じい～～っ！」"
translation = "「우에에엔, 다들 너무 자상해에~~!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「もう、みんな揃ってなんなんですか！\u3000こんなのって、居心地良すぎですよ～っ！！」"
translation = "「정말, 다들 단체로 왜 이러는 거예요! 이런 거, 너무 편안하잖아요~~!!」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「よしよし。涙止まったかな～？\u3000ごめんね～、泣かせるつもりはなかったのよ～？」"
translation = "「착하지 착해. 눈물 그쳤으려나~? 미안해~, 울릴 생각은 없었단다~?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ずびまぜん……お見苦しいところを……ずびー」"
translation = "「죄송함미다…… 꼴불견인 모습을…… 즈비─」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「さてと、マトイも泣き止んだことだし……サーシャさん、マントつけてくれる？」"
translation = "「자 그럼, 마토이도 울음을 그쳤으니…… 사샤 씨, 망토 달아줄래?」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「うん、前会長から現会長にね～。……はい、ついたわよ～」"
translation = "「응, 전 회장에서 현 회장에게로 말이지~. ……자, 달았어~」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「確かに賜ったわ。思っていた通り！\u3000素敵よ！」"
translation = "「확실히 받았어. 생각했던 대로야! 멋져!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「よく似合ってるよ、ヴィーナス」"
translation = "「잘 어울려, 비너스」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「シンデレラフィットですね」"
translation = "「신데렐라 피트네요」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「うんうん。頑張って作った甲斐があったわ～」"
translation = "「응응. 열심히 만든 보람이 있네~」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ありがとう、みんな！」"
translation = "「고마워, 모두!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「この世界の平和を守るため！」"
translation = "「이 세계의 평화를 지키기 위해!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「新星学園星徒会、気張っていくわよーーっ！」"
translation = "「신성학원 성도회, 기운 내서 가보자고──!」"

[[dialogue]]
