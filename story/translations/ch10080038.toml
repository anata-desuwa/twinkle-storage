[[dialogue]]
speaker = "unk"
original = "今日は休日──アナと久しぶりのデートだ。"
translation = "오늘은 휴일── 아나와 오랜만의 데이트다."

[[dialogue]]
speaker = "unk"
original = "ここのところ星徒会の仕事が忙しくて、なかなか２人きりの時間が取れていなかった反動だろうか？"
translation = "요즘 성도회 일이 바빠서, 좀처럼 둘만의 시간을 갖지 못했던 반동일까?"

[[dialogue]]
speaker = "unk"
original = "俺たちは朝から『そういう目的』で落ち合っていた──"
translation = "우리들은 아침부터 『그런 목적』으로 만났다──"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……以前、せつなさんからお聞きしていた大人のお店。大変興味深かったです。収穫もばっちり」"
translation = "「……이전에, 세츠나 씨에게 들었던 성인용품점. 매우 흥미로웠어요. 수확도 확실해요」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「それじゃあ会長、ホテルまで行きましょう<emoji=heart04>\u3000幸い周囲に知り合いもなし。今が好機です」"
translation = "「그러면 회장님, 호텔까지 가요<emoji=heart04> 다행히 주변에 아는 사람도 없으니. 지금이 기회예요」"

[[dialogue]]
speaker = "unk"
original = "ちょっとした買い物を終えた後、俺たちはそのまま、そそくさとラブホテルまで移動して……"
translation = "간단한 쇼핑을 마친 뒤, 우리들은 그대로 서둘러 러브호텔까지 이동해서……"

[[dialogue]]
speaker = "unk"
original = "久しぶりのエッチだから何でもリクエストを聞いてくれるというので、アナにノヴァフォームに変身してもらうよう、おねだりまでしてしまった。"
translation = "오랜만의 섹스니까 뭐든 리퀘스트를 들어주겠다고 하기에, 아나에게 노바 폼으로 변신해 달라고 조르기까지 해버렸다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「……何だかドキドキしてきました。では、調達したアイテムも装着しちゃいますね……<emoji=heart04>」"
translation = "「……왠지 두근거리기 시작했어요. 그럼, 조달한 아이템도 장착해 버릴게요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「んぅぅっ……お、ぉおぉぉっ……<emoji=heart04>」"
translation = "「응으으읏…… 오, 오오오옷……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「あぁっ……はあ、ぁ、あぁあっ……<emoji=heart04>\u3000ど、どうですか、会長<emoji=heart04>\u3000私の格好……興奮、してくれていますか……<emoji=heart04>」"
translation = "「아앗…… 하아, 아, 아아앗……<emoji=heart04> 어, 어떤가요, 회장님<emoji=heart04> 제 모습…… 흥분, 해주고 계신가요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「買ったばっかりの猫尻尾……ア、アナルプラグをお尻に入れて……<emoji=heart04>\u3000え、エッチなメス猫に、なっちゃいました……にゃん<emoji=heart04>」"
translation = "「방금 산 고양이 꼬리…… 애, 애널 플러그를 엉덩이에 넣고……<emoji=heart04> 에, 에로틱한 암고양이가, 되어버렸어요…… 냥<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ノヴァフォームをはだけて、猫の尻尾を模したアナルプラグまで入れて、アナがフリフリとお尻を振ってくれている。"
translation = "노바 폼을 헤치고, 고양이 꼬리를 본뜬 애널 플러그까지 넣은 채, 아나가 살랑살랑 엉덩이를 흔들어 주고 있다."

[[dialogue]]
speaker = "unk"
original = "こんなシチュエーション、興奮しないわけがなかった。"
translation = "이런 시추에이션, 흥분하지 않을 리가 없었다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「はぁっ……はぁあっ<emoji=heart04>\u3000会長のチ○ポ、まだ触ってもいないのに、ものすごい反りかえりです……<emoji=heart04>」"
translation = "「하아…… 하아앗<emoji=heart04> 회장님의 자지, 아직 만지지도 않았는데, 엄청나게 휘어 있어요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「興奮、してくれてるんですね。私も同じです……<emoji=heart04>\u3000オモチャを使うの、初めてでドキドキしますし……<emoji=heart04>」"
translation = "「흥분, 해주시고 계시네요. 저도 마찬가지예요……<emoji=heart04> 장난감을 쓰는 거, 처음이라 두근거리고……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "尻尾プラグを飲み込んでいるお尻の穴が、きゅっ、きゅっ、とひくついている。"
translation = "꼬리 플러그를 삼키고 있는 엉덩이 구멍이, 뀨욱, 뀨욱, 하고 움찔거리고 있다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ふぅぅっ……<emoji=heart04>\u3000やっぱりお尻に、何かを入れてると……はぁぁ<emoji=heart04>\u3000感度がすぐに上がっちゃう、みたいです……<emoji=heart04>」"
translation = "「후우우……<emoji=heart04> 역시 엉덩이에, 무언가를 넣고 있으면…… 하아아<emoji=heart04> 감도가 금방 올라가 버리는, 모양이에요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺のペニスで何度もほじくって開発したアナのお尻の穴は、とびきり敏感な性器になってしまっていた。"
translation = "내 자지로 몇 번이나 헤집어서 개발한 아나의 똥구멍은, 유달리 민감한 성기가 되어 버려 있었다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ただ惜しむらくは……んぅ<emoji=heart04>\u3000会長のチ○ポに比べると、アナルプラグ……冷たくて細いから……ちょっぴり物足りないかも、です……<emoji=heart04>」"
translation = "「다만 아쉬운 건…… 응으<emoji=heart04> 회장님의 자지에 비하면, 아날 플러그…… 차갑고 가느다랗다 보니까…… 조금 부족할지도, 몰라요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "だがその物足りなさも、アナの興奮を煽るスパイスになっているようだった。"
translation = "하지만 그 부족함도, 아나의 흥분을 부추기는 스파이스가 되고 있는 듯했다."

[[dialogue]]
speaker = "unk"
original = "ペニスを挿入したい気持ちを抑えながら、尻尾の根元を掴む。"
translation = "자지를 삽입하고 싶은 기분을 억누르며, 꼬리의 뿌리 부분을 움켜쥔다."

[[dialogue]]
speaker = "unk"
original = "プラグの先端を右に左に回転させて、アナのアナルをほじって焦らす。"
translation = "플러그의 끝부분을 오른쪽 왼쪽으로 회전시켜서, 아나의 애널을 헤집으며 애태운다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「んんぅっ──お、おぉっ……！？\u3000はぁっ、ぁ、あっ──<emoji=heart04>\u3000お、ぉおお～っ……<emoji=heart04><emoji=heart04>」"
translation = "「응응으── 오, 오오옷……!? 하앗, 아, 앗──<emoji=heart04> 오, 오오오~……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ぅ、お、ぉっ……ぉっ<emoji=heart04>\u3000そんな、鍵でドアを開ける、みたいな動きっ──お、ぉおっ<emoji=heart04>\u3000おっぉっ……し、新鮮な感じ、ですっ……<emoji=heart04>」"
translation = "「으, 오, 오옷…… 오옷<emoji=heart04> 그런, 열쇠로 문을 여는 것 같은 움직임── 오, 오오옷<emoji=heart04> 오옷오옷…… 시, 신선한 느낌, 이에요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ケツアナ、気持ちいい？」"
translation = "「똥구멍, 기분 좋아?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「は、はいっ……<emoji=heart04>\u3000会長に、ぐ、ぐりぐりって、ケツアナ<emoji=heart04>\u3000い、いじられるのっ、好きっ……大好き、です……ぉ、おぉ、お、ぉおっ<emoji=heart04>」"
translation = "「네, 네엣……<emoji=heart04> 회장님이, 구, 구리구리하게, 똥구멍<emoji=heart04> 괴, 괴롭혀지는 거, 좋아해요…… 정말 좋아, 해요…… 오, 오오, 오, 오오옷<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "右にぐりん、左にぐりん。何度もねじって、たまに奥へ押し込んでアナをよがらせる。"
translation = "오른쪽으로 꾸욱, 왼쪽으로 꾸욱. 몇 번이나 비틀고, 가끔 안쪽으로 밀어 넣어 아나를 가게 만든다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「あぁぁあっ……は、はぁっ……はぁーっ<emoji=heart04>\u3000か、会長ょっ……んうっ<emoji=heart04>\u3000あ、ぁ、ぁあっ……そ、それも、い、いいん、ですけどっ……<emoji=heart04>」"
translation = "「아아아앗…… 하, 하앗…… 하아─앗<emoji=heart04> 회, 회장님…… 응읏<emoji=heart04> 아, 아, 아앗…… 그, 그것도, 조, 좋긴, 한데요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「できれば、はぁっ……ま、前の方にもっ……刺激、欲しいですっ……うぅっ、んんっ……ふぅ、はぁっ……<emoji=heart04>」"
translation = "「가급적이면, 하앗…… 아, 앞쪽에도…… 자극, 원해요…… 으윽, 응응…… 후우, 하앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "アナが太ももをすり合わせて、もどかしそうに喘ぐ。"
translation = "아나가 허벅지를 비비면서, 안달 난 듯이 헐떡인다."

[[dialogue]]
speaker = "unk"
original = "尻穴に埋まったアナルプラグをぐりぐりと弄るたび、女性器から愛液が溢れて止まらない。"
translation = "똥구멍에 박힌 아날 플러그를 구리구리 휘저을 때마다, 여성기에서 애액이 넘쳐흘러 멈추지 않는다."

[[dialogue]]
speaker = "unk"
original = "振りむいたアナの表情はとろんと蕩けていて、切なそうな眼差しが勃起したペニスに注がれる。"
translation = "뒤돌아본 아나의 표정은 황홀하게 풀려 있었고, 애절한 눈빛이 발기한 자지로 향한다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「は、はぁっ──はぁああっ……<emoji=heart04>\u3000繋がりたいっ、繋がりたいです、大好きな会長とっ……<emoji=heart04>」"
translation = "「하, 하앗── 하아아앗……<emoji=heart04> 이어지고 싶어, 이어지고 싶어요, 정말 좋아하는 회장님이랑……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「が、ガマンできないですっ……チ○ポ、おま○こに入れてくださいっ……ふぅっ、ふぅうっ、ふぅうっ……<emoji=heart04>」"
translation = "「차, 참을 수 없어요…… 자지, 보지에 넣어주세요…… 후우, 후우우, 후우우…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「今日までずっとお仕事ばかりで、デートもオアズケでっ……やっとエッチできるって思ったら……が、我慢できません……<emoji=heart04>」"
translation = "「오늘까지 계속 일만 하고, 데이트도 미뤄져서…… 겨우 섹스할 수 있다고 생각하니까…… 차, 참을 수 없어요…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「お願いです、会長のおっきなチ○ポ、私のおま○こに、ず、ずぷぅぅって……入れて、入れてくださいっ<emoji=heart04>」"
translation = "「부탁이에요, 회장님의 커다란 자지, 제 보지에, 푸, 푹 하고…… 넣어줘요, 넣어주세요 <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "──後ろだけでも気持ちよさそうだけど？\u3000とイジワルに問いかけてみる。"
translation = "──뒤쪽만으로도 기분 좋을 것 같은데? 라고 짖궂게 물어본다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「そ、そんなっ……た、足りない、ですっ……りょ、両方っ……前も後ろもっ、愛してください、会長、お願いですからっ……<emoji=heart04>」"
translation = "「그, 그런…… 부, 부족해요…… 야, 양쪽 다…… 앞도 뒤도, 사랑해 주세요, 회장님, 부탁이니까요…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "エッチなメス猫らしい、悩ましい尻振りでペニスをおねだりしてくるアナ。"
translation = "야한 암고양이 같은, 요염한 엉덩이 흔들기로 페니스를 조르는 아나."

[[dialogue]]
speaker = "unk"
original = "俺は頷くと、いきり立ったペニスを女性器にあてがって──"
translation = "나는 고개를 끄덕이고는, 발기한 페니스를 성기에 갖다 대고──"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「んんんうううぅ～っ──<emoji=heart04><emoji=heart04>\u3000お、ぉおお、おぉおぉおお～っ……！」"
translation = "「으으으으으으으으~── <emoji=heart04><emoji=heart04> 오, 오오오, 오오오오오~……!」"

[[dialogue]]
speaker = "unk"
original = "まるでアナルに挿入したみたいな、可愛いお下品声がホテルの部屋に響き渡った。"
translation = "마치 애널에 삽입한 것 같은, 귀엽고 저질스러운 목소리가 호텔 방에 울려 퍼졌다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ぅうっ──ぅぉっ、お、ほぉおぉっ……<emoji=heart04><emoji=heart04>\u3000あ、あぅうっ……き、きたぁっ<emoji=heart04>\u3000久しぶりの、会長のチ○ポ、ぉっ……<emoji=heart04>」"
translation = "「으윽── 으오, 오, 호오오…… <emoji=heart04><emoji=heart04> 아, 아우우…… 와, 왔다 <emoji=heart04> 오랜만의, 회장님의 자지, 잇…… <emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「あ、ぁ、あぁっ……勝手におま○こ、し、締まっちゃい、ますぅっ……うぁっ<emoji=heart04>\u3000ぁ、ぁっ、はぁ、ぁぁ、ぁっ……<emoji=heart04>」"
translation = "「아, 아, 아아…… 멋대로 보지가, 조, 조여져 버려요…… 우아 <emoji=heart04> 아, 아, 하아, 아아, 아…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "久しぶりのデート、そして尻穴を浅くほじって焦らされたせいもあってか、アナの感度は普段よりもずっと敏感になっている様子。"
translation = "오랜만의 데이트, 그리고 항문을 얕게 파헤쳐지며 애태워진 탓인지, 아나의 감도는 평소보다 훨씬 민감해져 있는 모양이다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ア、アナルプラグ、物足りない、とかぁ……間違い、でしたぁっ<emoji=heart04>\u3000両方いっぺん<emoji=heart04>\u3000す、すご──ぉ、いっ……<emoji=heart04>」"
translation = "「애, 애널 플러그, 감질난다든가…… 착각이었어요 <emoji=heart04> 양쪽 한꺼번에 <emoji=heart04> 어, 엄청나──아, 아아…… <emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスに比べて細かろうが、二本差しには変わりない。"
translation = "페니스에 비해 가늘겠지만, 두 개가 꽂힌 것에는 변함이 없다."

[[dialogue]]
speaker = "unk"
original = "アナルへの異物挿入で強張った体に、フル勃起状態のペニスの挿入はすさまじい快感のようだ。"
translation = "애널로의 이물질 삽입으로 팽팽해진 몸에, 풀 발기 상태인 페니스의 삽입은 무시무시한 쾌감인 듯하다."

[[dialogue]]
speaker = "unk"
original = "可愛いお尻や背中をぴくぴくと震わせるアナをさらに追い込むべく、俺はピストンを開始した。"
translation = "귀여운 엉덩이와 등을 파르르 떨고 있는 아나를 더욱 몰아붙이기 위해, 나는 피스톤질을 시작했다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「んんぅ、お、ぉおっ！\u3000おぉ、おっ……おぉぉっ……ふぅ、ふうぅ、んんぅ、おぉっ、おぉおっ、おぉおっ……<emoji=heart04>」"
translation = "「으으음, 오, 오오옷! 오오, 옷…… 오오오옷…… 후우, 후우우, 으으음, 오옷, 오오옷, 오오오옷……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「あ、あぅっ……ぉ、ぉっ……ぁ、ぁぁっ──おおぉおっ<emoji=heart04><emoji=heart04>\u3000すっご、ぉっ……ぅ、ぁ！」"
translation = "「아, 아으윽…… 오, 오옷…… 아, 아아앗── 오오오오옷<emoji=heart04><emoji=heart04> 굉장해, 에…… 으, 아!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「会長のチ○ポ、い、いつもよりっ、ぶっとく、か、感じますっ……お、ぉうっ<emoji=heart04>\u3000おぉ、ふぅっ……ぉ、ぉおぉっ……！」"
translation = "「회장님의 자지, 이, 평소보다, 더 굵게, 느, 느껴져요…… 오, 오우웃<emoji=heart04> 오오, 후우…… 오, 오오오옷……!」"

[[dialogue]]
speaker = "unk"
original = "本当にお尻に入れてる時みたいな、エッチな声が出ている。"
translation = "정말로 똥구멍에 넣고 있을 때 같은, 야한 목소리가 나오고 있다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「アナ。今、入ってるのはおま○この方だろ？\u3000ケツアナじゃないぞ？」"
translation = "「아나. 지금, 들어가 있는 건 보지 쪽이잖아? 똥구멍이 아니라고?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「わ、わかって──ますっ<emoji=heart04>\u3000でもぉっ──お、ぉぉおっ<emoji=heart04><emoji=heart04>\u3000はぁ、あぁっ<emoji=heart04>\u3000お尻にも、オモチャ、入ってるからぁっ……<emoji=heart04>」"
translation = "「아, 알고── 있어요옷<emoji=heart04> 하지만── 오, 오오오옷<emoji=heart04><emoji=heart04> 하아, 아앗<emoji=heart04> 엉덩이에도, 장난감, 들어있으니까아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「パンパン、されるたびっ──お、ぉっ<emoji=heart04>\u3000け、ケツアナまで、ひ、響いて──うぅ、お、おっ<emoji=heart04>\u3000おぉぉーっ……<emoji=heart04>\u3000うぅ、ぁああっ<emoji=heart04>」"
translation = "「팡팡, 당할 때마다── 오, 오옷<emoji=heart04> 또, 똥구멍까지, 히, 히비키고── 으으, 오, 오옷<emoji=heart04> 오오오오─옷……<emoji=heart04> 으으, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ペニスに絡むアナの愛液は凄まじい量で、油断したらぬるんと抜けてしまいそうだ。"
translation = "페니스에 얽히는 아나의 애액은 엄청난 양이라서, 방심하면 미끄러지듯 빠져버릴 것만 같다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「あ、ぁ、ああっ<emoji=heart04>\u3000会長に、お尻、ぎゅうって、掴まれて<emoji=heart04>\u3000パンパン、されてますっ──ん、んんぅっ<emoji=heart04>\u3000ふぁ、ぁ、あぁああ<emoji=heart04>」"
translation = "「아, 아, 아앗<emoji=heart04> 회장님한테, 엉덩이, 꽉, 잡혀서<emoji=heart04> 팡팡, 당하고 있어요── 응, 으으음<emoji=heart04> 화, 아, 아아아아<emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ふぅ、ふぅうっ<emoji=heart04>\u3000気持ち良すぎて、足っ、が、ガクガクしちゃいますっ……ふぅ、んん、んぁ、ぁ、ぁあああっ<emoji=heart04>」"
translation = "「후우, 후우우옷<emoji=heart04> 너무 기분 좋아서, 다리, 가, 후들거려요…… 후우, 으응, 으아, 아, 아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "もっとよがらせてあげたい。俺はピストンをしながら、アナルプラグを掴んで奥まで押し込む不意打ちをしてみた。"
translation = "더욱 가버리게 해주고 싶다. 나는 피스톤질을 하면서, 애널 플러그를 잡고 안쪽까지 밀어 넣는 기습을 해보았다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「──ぉほぉおっ！？\u3000ぉ、ぉおおぉぉおっ！\u3000あ、ぁぅ、ぁぁぁっ……かいちょっ、そ、それ、らめっ……<emoji=heart04>」"
translation = "「──오호옷!? 오, 오오오오오옷! 아, 아으, 아아앗…… 회장님, 그, 그거 안 돼에……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "──何がダメなの？\u3000そう問いかけながらペニスをねじこみ、アナルプラグもこねくり回す。"
translation = "──뭐가 안 된다는 거야? 그렇게 되물으며 페니스를 비틀어 넣고, 애널 플러그도 휘저어 돌린다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「お、ぉおおっ……あ、あにゃっ、あにゃるぷらぐっ、そんなぐりぐり、押し込んだらっ……ううう、ぅ、うぅ～っ、おおぉ<emoji=heart04>」"
translation = "「오, 오오오…… 아, 아냐, 애널 플러그, 그렇게 비비면서 밀어 넣으면…… 으으으, 윽, 으으~, 오오오<emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「か、感じすぎちゃい、ますからっ……お、ぉっ、おぉおっ<emoji=heart04>\u3000ら、らめっ<emoji=heart04>\u3000らめですっ<emoji=heart04>\u3000ケツアナ、いじいじ、ら、らめぇっ<emoji=heart04><emoji=heart04>」"
translation = "「너, 너무 느껴버리니까요…… 오, 오, 오오오<emoji=heart04> 안, 안 돼<emoji=heart04> 안 돼요<emoji=heart04> 똥구멍, 만지작거리는 거, 아, 안 돼애<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "感じすぎるからダメという割に、アナルプラグを飲み込むお尻の穴はとても貪欲だ。"
translation = "너무 느껴서 안 된다는 말과는 달리, 애널 플러그를 삼키는 엉덩이 구멍은 매우 탐욕스럽다."

[[dialogue]]
speaker = "unk"
original = "試しに猫の尻尾を掴んで、ぐいと引っ張ってみると──"
translation = "시험 삼아 고양이 꼬리를 잡고, 쭈욱 잡아당겨 보자──"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「あ、あぁ──！？\u3000ぬ、抜かないで、くださっ……んんぅう！」"
translation = "「아, 아아──!? 빼, 빼지 말아, 주세요…… 응으으!」"

[[dialogue]]
speaker = "unk"
original = "ぎゅう～っ！\u3000とアナのケツアナが強く締まる。プラグを抜いて焦らしてあげようとしたのに、防がれてしまった。"
translation = "꽈아아악! 하고 아나의 똥구멍이 강하게 조여진다. 플러그를 빼서 애를 태워주려 했는데, 막혀버리고 말았다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「あ、あ、あぅうっ……か、感じすぎちゃう、のにっ……ぬ、抜かれるのも、い、いやぁっ……<emoji=heart04>\u3000猫の尻尾、抜かないでくださいっ……<emoji=heart04>」"
translation = "「아, 아, 아으윽…… 너, 너무 느껴버리는데…… 빼, 빼는 것도, 시, 싫어어……<emoji=heart04> 고양이 꼬리, 빼지 말아 주세요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "どうやらエッチなメス猫のアナは、尻尾のオモチャをいたく気に入っているらしい。"
translation = "아무래도 야한 암고양이 아나는, 꼬리 장난감이 무척 마음에 든 모양이다."

[[dialogue]]
speaker = "unk"
original = "構わず、ぐいぐいと引っ張ってプラグを抜こうとしてみる。"
translation = "개의치 않고, 꾹꾹 잡아당기며 플러그를 빼내 보려 한다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「んんぅっ<emoji=heart04>\u3000にゃっ<emoji=heart04>\u3000にゃぁっ<emoji=heart04>\u3000会長っ、イジワル、しないで、くだ、くださいっ<emoji=heart04>\u3000にゃぁ、ぁ、ぁぁっ<emoji=heart04><emoji=heart04>」"
translation = "「응으윽<emoji=heart04> 냐앗<emoji=heart04> 냐아앗<emoji=heart04> 회장님, 심술부리지 말아, 주, 주세요<emoji=heart04> 냐아, 아, 아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ペットからっ、オモチャ、取り上げるの、や、やめっ<emoji=heart04>\u3000んん、んんぅっ<emoji=heart04><emoji=heart04>\u3000おぉぉおっ<emoji=heart04><emoji=heart04>\u3000あ、あ、あ、ケツアナ、気持ちいい<emoji=heart04><emoji=heart04>」"
translation = "「펫한테서, 장난감, 뺏는 거, 그, 그만<emoji=heart04> 응응, 응응으윽<emoji=heart04><emoji=heart04> 오오오오옷<emoji=heart04><emoji=heart04> 아, 아, 아, 똥구멍, 기분 좋아<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "子犬とオモチャの引っ張りっこをして遊ぶみたいな塩梅で、アナのアナルプラグをぐいぐい引っ張る。"
translation = "강아지와 장난감을 가지고 줄다리기를 하며 노는 듯한 느낌으로, 아나의 애널 플러그를 꾹꾹 잡아당긴다."

[[dialogue]]
speaker = "unk"
original = "少し動かすだけで大きくよがるアナの姿を見ているだけで、いつも以上に興奮する。ペニスのピストンにも力が入る。"
translation = "조금 움직이는 것만으로도 크게 느끼는 아나의 모습을 보는 것만으로도, 평소보다 더 흥분된다. 페니스의 피스톤질에도 힘이 들어간다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「おっ、おっおっ──おぉっ<emoji=heart04>\u3000チ○ポのパンパンも、す、すす、すごい、ですっ──おぉ、ぉぉおお～っ<emoji=heart04><emoji=heart04>」"
translation = "「오, 오오오──오옷<emoji=heart04> 자지의 퍽퍽함도, 거, 거거, 굉장해, 요──오오, 오오오오오~옷<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ケツアナっ<emoji=heart04>\u3000ぉっ<emoji=heart04>\u3000ケツアナいじられながらっ、チ○ポすごい、すごい、すごいですっ……んおっ……おぉっ……ぅっ、ぉお～っ<emoji=heart04>」"
translation = "「똥구멍<emoji=heart04> 오옷<emoji=heart04> 똥구멍 만져지면서, 자지 굉장해, 굉장해, 굉장해요……응옷……오옷……으윽, 오오~옷<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "どうやってもアナルプラグを離さないつもりらしい。"
translation = "어떻게 해도 애널 플러그를 놓지 않을 생각인 모양이다."

[[dialogue]]
speaker = "unk"
original = "そういうことなら、別の方向から責めてみることにする。"
translation = "그렇다면, 다른 방향에서 괴롭혀 보기로 한다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「アナルプラグの電源、入れていい？」"
translation = "「애널 플러그 전원, 켜도 돼?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「電源……？\u3000ぇ──こ、これ、動くんですかっ？」"
translation = "「전원……? 에──이, 이거, 움직이는 건가요?」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「そ、そそっ……そんなの、されたらっ<emoji=heart04>\u3000私っ、本当に、本当に感じすぎちゃいます、イ、イキまくっちゃいますからっ……<emoji=heart04><emoji=heart04>」"
translation = "「그, 그그…… 그런 거, 당하면<emoji=heart04> 저, 정말로, 정말로 너무 느껴버려요, 가, 가버려요오오……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "イキまくるアナ、ぜひ見てみたい。俺は猫の尻尾の根元にある、振動スイッチをオンにする。"
translation = "계속 가버리는 아나, 꼭 보고 싶다. 나는 고양이 꼬리 뿌리에 있는 진동 스위치를 온으로 한다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「んんぉぉおぉぉぉぉおお～～～っ！？\u3000ぉ、ぉお、おぉお、おぉぉお～っ！！」"
translation = "「으으오오오오오오오오오~~~옷!? 오, 오오, 오오오, 오오오오~옷!!」"

[[dialogue]]
speaker = "unk"
original = "ヴヴヴヴヴッ──！\u3000アナルの方から響く振動にゾクゾクしながら、俺もピストンを苛烈にしてアナを追い込んでいく。"
translation = "부부부부붓──! 애널 쪽에서 울려 퍼지는 진동에 전율하면서, 나도 피스톤을 격렬하게 하여 아나를 몰아붙인다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「お、おぉおっ、お尻のあにゃっ<emoji=heart04>\u3000ぶるぶる震えてっ<emoji=heart04>\u3000お、ぉお、おぉおおっ！」"
translation = "「오, 오오옷, 엉덩이의 구멍이<emoji=heart04> 부르르 떨려서<emoji=heart04> 오, 오오, 오오오옷!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「チ○ポ、チ○ポもそんな、乱暴したら、だ、ダメぇっ<emoji=heart04>\u3000あ、あぁ、ぁぁああっ<emoji=heart04><emoji=heart04>\u3000イグ、イっぢゃいますっ<emoji=heart04><emoji=heart04>」"
translation = "「자지, 자지도 그렇게, 난폭하게 하면, 안, 안돼요옷<emoji=heart04> 아, 아아, 아아아앗<emoji=heart04><emoji=heart04> 가버, 가버려요옷<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「イグイグっ、イグゥウウウウっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가, 가버렷, 가버려어어어어엇……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ぎゅぎゅぅ、と女性器が締まる。きっとアナルプラグも同じような力で締め付けをされているはずだ。"
translation = "뀨우우, 하고 여성기가 조여진다. 분명 아날 플러그도 비슷한 힘으로 압박받고 있을 것이다."

[[dialogue]]
speaker = "unk"
original = "でも俺は、ペニスで突き込むのをやめない。イったばかりのアナをさらに追い詰めていく。"
translation = "하지만 나는, 페니스로 찔러넣는 것을 멈추지 않는다. 방금 가버린 아나를 더욱 몰아붙여 간다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「おぉっ<emoji=heart04>\u3000ほぉっ<emoji=heart04>\u3000ぉ、おぉおっ、おぉおっ<emoji=heart04><emoji=heart04>\u3000イ、イって、る、のに<emoji=heart04>\u3000お、ぉお、おおぉおっ！」"
translation = "「오옷<emoji=heart04> 호옷<emoji=heart04> 오, 오오옷, 오오옷<emoji=heart04><emoji=heart04> 가, 가고, 있는, 데도<emoji=heart04> 오, 오오, 오오오옷!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「チ○ポ、チ○ポ手加減してっ、くださっ──おぉぉお！？\u3000うう、ふうぅ、うぉっ<emoji=heart04>\u3000やばっ、チ○ポとオモチャ、やばい、れす、うぉおっ<emoji=heart04>」"
translation = "「자지, 자지 살살해, 주세요──오오오옷!? 으으, 후우, 우옷<emoji=heart04> 위험해, 자지랑 장난감, 위험, 해여, 우오옷<emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「変なっ、変な声──ぉおぉおっ<emoji=heart04>\u3000ケツアナでアクメする時の声っ<emoji=heart04>\u3000止まらな──おっおっ、おっ<emoji=heart04>\u3000おおぉっ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「이상한, 이상한 목소리──오오오옷<emoji=heart04> 똥구멍으로 아크메할 때의 목소리<emoji=heart04> 안 멈춰──오옷오옷, 오옷<emoji=heart04> 오오옷<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "可愛いアナのお下品あえぎがもっと聞きたくて、ピンと立った彼女の乳首も摘まみ上げる。"
translation = "귀여운 아나의 저질스러운 신음 소리를 더 듣고 싶어서, 빳빳하게 선 그녀의 젖꼭지도 집어 올린다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「んん～～～っ<emoji=heart04><emoji=heart04>\u3000お、ぉー……<emoji=heart04>\u3000おーっ<emoji=heart04>\u3000はぁぁあ～っ<emoji=heart04>\u3000乳首っ、コリコリ、気持ちいぃ──ぅうっ、うぉっ、お、ぉお、おっ<emoji=heart04>」"
translation = "「으으~~~음<emoji=heart04><emoji=heart04> 오, 오오……<emoji=heart04> 오옷<emoji=heart04> 하아아아~앗<emoji=heart04> 젖꼭지, 꼬집꼬집, 기분 좋아──으윽, 우옷, 오, 오오, 오옷<emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「おま○こパンパンしながら<emoji=heart04>\u3000ほぉっ<emoji=heart04>\u3000ケツアナぶるぶるしてっ<emoji=heart04>\u3000あひぃっ<emoji=heart04><emoji=heart04>\u3000乳首もコネコネ、ぅ、ぅぁ、ぁ、ぁ、ぁおおっ<emoji=heart04><emoji=heart04>」"
translation = "「보지 팡팡하면서<emoji=heart04> 호옷<emoji=heart04> 똥구멍 부르르 떨려서<emoji=heart04> 아히잇<emoji=heart04><emoji=heart04> 젖꼭지도 조물조물, 으, 으아, 아, 아, 아오옷<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「気持ちいいところっ、そんないっぱい、同時に、さ、され、されたらっ……あ、あぁ、あぁ──！？\u3000あう、うぅ、んんんぅ～っ<emoji=heart04><emoji=heart04>」"
translation = "「기분 좋은 곳, 그렇게 잔뜩, 동시에, 하, 하아, 당하면……아, 아아, 아아──!? 아우, 우으, 으으으음~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ぁ、あ、あぁああぁっ<emoji=heart04><emoji=heart04>\u3000イったおま○こ、パンパン、すごいぃいっ<emoji=heart04>\u3000こ、こんなエッチ、されたら──ぉ、ぉ、ぉおおっ<emoji=heart04>」"
translation = "「아, 아, 아아아아앗<emoji=heart04><emoji=heart04> 가버린 보지, 팡팡, 굉장해애앳<emoji=heart04> 이, 이런 에로한 짓, 당하면──오, 오, 오오옷<emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「会長からっ、離れられなくなっちゃいますっ<emoji=heart04>\u3000うぁっ<emoji=heart04>\u3000あ、ぁ、あぁっ、ぁぁあっ<emoji=heart04>」"
translation = "「회장님한테서, 헤어날 수 없게 되어버려요옷<emoji=heart04> 우앗<emoji=heart04> 아, 아, 아앗, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「責任取ってっ<emoji=heart04>\u3000おま○こも、ケツアナも、いっぱいイケるようになっちゃった、私のことっ……離さないでぇっ……<emoji=heart04>」"
translation = "「책임져줘<emoji=heart04> 보지랑, 똥구멍도, 잔뜩 갈 수 있게 되어버린, 나를…… 놓지 말아줘어……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「……当たり前だ！！」"
translation = "「……당연하지!!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「あ、あ、あぁあっ……嬉しっ<emoji=heart04>\u3000会長、好きっ<emoji=heart04>\u3000大好きっ<emoji=heart04>\u3000あ、お尻、そんなぎゅって掴んでっ……！？」"
translation = "「아, 아, 아아앗…… 기뻐<emoji=heart04> 회장님, 좋아해<emoji=heart04> 정말 좋아해<emoji=heart04> 아, 엉덩이, 그렇게 꽉 잡고……!?」"

[[dialogue]]
speaker = "unk"
original = "可愛くてエッチな俺の恋人──汗ばんだお尻を掴み直し、ラストスパート。"
translation = "귀엽고 야한 내 연인── 땀에 젖은 엉덩이를 다시 고쳐 잡고, 라스트 스퍼트."

[[dialogue]]
speaker = "unk"
original = "アナのまるいお尻が波打つくらいの激しいピストンを行う。"
translation = "아나의 둥근 엉덩이가 물결칠 정도의 격렬한 피스톤을 행한다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「──うぅうぅおおおぉおっ<emoji=heart04><emoji=heart04>\u3000ぉ、ぉ、お、ぉ、ぉ、おっ<emoji=heart04>\u3000こ、これ、知って、ますっ<emoji=heart04>」"
translation = "「──으으으오오오오옷<emoji=heart04><emoji=heart04> 오, 오, 오, 오, 오, 옷<emoji=heart04> 이, 이거, 알고, 있어요<emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「かいちょ、がっ<emoji=heart04>\u3000しゃ、射精、する前の、パンパンっ<emoji=heart04>\u3000んぉっ<emoji=heart04>\u3000乱暴なパンパン、き、きちゃい、ました、ぁ、あ、あぁあっ<emoji=heart04>」"
translation = "「회장니, 미<emoji=heart04> 사, 사정, 하기 전의, 팡팡<emoji=heart04> 응오옷<emoji=heart04> 난폭한 팡팡, 와, 와버렸, 어요, 아, 아, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「んぉっ、ほぉ、おおぉ、おっおっおっおっ<emoji=heart04><emoji=heart04>\u3000全力ピストン、き、気持ちいいっ<emoji=heart04>\u3000気持ちいいれすっ<emoji=heart04>\u3000ぁう、ん、んんぉおぉっ<emoji=heart04>」"
translation = "「응오옷, 호오, 오오오, 옷옷옷옷<emoji=heart04><emoji=heart04> 전력 피스톤, 기, 기분 좋아<emoji=heart04> 기분 좋아여어<emoji=heart04> 아우, 응, 응응오오오옷<emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「出してぇっ<emoji=heart04>\u3000出して、くださいぃっ<emoji=heart04>\u3000アナのお腹っ、お腹の奥で、恋人せーしっ、びゅぅってして、して、してぇっ<emoji=heart04>」"
translation = "「내보내줘어<emoji=heart04> 내보내, 주세요오<emoji=heart04> 아나의 배 속, 배 속 깊은 곳에, 연인 정애액, 뷰우우하고 해줘, 해줘, 해줘어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「う、うぁ、ぁ、あ、あぁああっ……イクイクっ<emoji=heart04>\u3000イキますっ<emoji=heart04><emoji=heart04>\u3000おま○ことケツアナっ<emoji=heart04>\u3000また両方いっぺんに、イクイクイクぅっ<emoji=heart04>」"
translation = "「으, 으아, 아, 아, 아아아앗…… 가버려 가버려<emoji=heart04> 가버려요옷<emoji=heart04><emoji=heart04> 보지랑 똥구멍<emoji=heart04> 다시 양쪽 한꺼번에, 가버려 가버려 가버려어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「やばっ、やばいですっ、すごいの来ますっ<emoji=heart04>\u3000かいちょっ<emoji=heart04>\u3000好きっ<emoji=heart04>\u3000おぉおぉっ<emoji=heart04><emoji=heart04>\u3000だいしゅきぃっ<emoji=heart04>\u3000んんぉっ、ぉ、ぉ、ぉおっ<emoji=heart04><emoji=heart04>」"
translation = "「위험해, 위험해요, 굉장한 게 와요<emoji=heart04> 회장니임<emoji=heart04> 좋아해<emoji=heart04> 오오오오옷<emoji=heart04><emoji=heart04> 정말 좋아해애애<emoji=heart04> 응응오옷, 오, 오, 오오옷<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ろれつが回らないくらい感じているのに、好意を伝えてくれるアナが愛おしい。"
translation = "말이 제대로 안 나올 정도로 느끼고 있는데도, 호의를 전해주는 아나가 사랑스럽다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ぁ、ぁ、ぁぁぁあっ──イク、イクイクっ、イクイクイクイク、イクイクイクぅっ──<emoji=heart04><emoji=heart04>」"
translation = "「아, 아, 아아아앗── 가, 가버려, 가버려엇, 가버려가버려가버려, 가버려가버려어엇──<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「んんんんっ──お、ぉぉぉ、ぉぉおぉぉおお～～～っ<emoji=heart04><emoji=heart04>」"
translation = "「응으으으읏── 오, 오오오, 오오오오오오～～～옷<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「うぁあああっ……お、ぉぉお～っ……ぅおっ……<emoji=heart04>\u3000お、ぉおっ……おぉおぉお～～～っ……<emoji=heart04>」"
translation = "「우아아아앗…… 오, 오오오～옷…… 우옷……<emoji=heart04> 오, 오옷…… 오오오오오～～～옷……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「うぅぅうっ……ぁあぁっ<emoji=heart04><emoji=heart04>\u3000お尻も、アクメ、し、しちゃって、ますっ──お、ぉおーっ……ほぉお、おぉ、おぉぉ～っ……<emoji=heart04>」"
translation = "「우으으읏…… 아아앗<emoji=heart04><emoji=heart04> 엉덩이도, 아쿠메, 해, 해버리고, 있어요── 오, 오오옷…… 호오오, 오오, 오오오～옷……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「精液、いっぱいっ……お腹の奥に、びゅう、びゅうって……お、ぉっ……<emoji=heart04>\u3000ふぅう、うう、ぅうっ……<emoji=heart04>」"
translation = "「정액, 가득…… 배 안쪽에, 뷰릇, 뷰릇하고…… 오, 옷……<emoji=heart04> 후우우, 우우, 우웃……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "大好きなアナに中出し──膝から力が抜けそうになるほどに心地がいい。"
translation = "정말 좋아하는 아나에게 질내사정── 무릎에서 힘이 빠질 정도로 기분이 좋다."

[[dialogue]]
speaker = "unk"
original = "ペニスから精液を吐き出すたびに、彼女は……"
translation = "페니스에서 정액을 뿜어낼 때마다, 그녀는……"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「──ぉっ<emoji=heart04>\u3000ぅっ……おっ<emoji=heart04>\u3000──あっ<emoji=heart04>\u3000……んぉっ<emoji=heart04>」"
translation = "「──옷<emoji=heart04> 윽…… 옷<emoji=heart04> ──앗<emoji=heart04> ……응옷<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "身体を敏感に震わせて、快感を俺に伝えてくれる。"
translation = "몸을 민감하게 떨며, 쾌감을 나에게 전해준다."

[[dialogue]]
speaker = "unk"
original = "長い長い射精がようやく終わり、俺はアナルプラグの振動も止める──"
translation = "길고 긴 사정이 겨우 끝나고, 나는 아날 플러그의 진동도 멈춘다──"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「はぁああっ……ふぅうっ……はぁああーっ……ふぅうぅ～……<emoji=heart04><emoji=heart04>」"
translation = "「하아아앗…… 후우웃…… 하아아아──앗…… 후우우우～……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「ものすごい、か、快感……<emoji=heart04>\u3000頭の中がバチバチってして……お、おかしく、なっちゃいそう、でした……<emoji=heart04>」"
translation = "「엄청난, 쾌, 쾌감……<emoji=heart04> 머릿속이 파지직거려서…… 이, 이상해져, 버릴 것, 같았어요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「はぁっ……ふぅう……会長は、満足、できましたか……？」"
translation = "「하아…… 후우…… 회장님은, 만족, 하셨나요……?」"

[[dialogue]]
speaker = "unk"
original = "俺は深く頷く。凄まじい快感のセックスだった。"
translation = "나는 깊게 고개를 끄덕인다. 엄청난 쾌감의 섹스였다."

[[dialogue]]
speaker = "unk"
original = "だけど……"
translation = "하지만……"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「つ、次は……お尻で……？\u3000はい……大丈夫、です<emoji=heart04>」"
translation = "「다, 다음은…… 엉덩이로……? 네…… 괜찮아요<emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「むしろ私も、お尻、オモチャでたくさんいじられて……う、うずうず、してたところです……<emoji=heart04>」"
translation = "「오히려 저도, 엉덩이, 장난감으로 잔뜩 괴롭혀져서…… 근, 근질근질하던 참이었어요……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「あ、でも……次はアナルセックスしながら……おま○こ、同時にいじって、もらえますか……？\u3000指とかで、ぐりぐり～って……<emoji=heart04>」"
translation = "「아, 하지만…… 다음은 아날 섹스하면서…… 보지, 동시에 만져, 주시겠어요……? 손가락 같은 걸로, 구리구리～하게……<emoji=heart04>」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「はい……<emoji=heart04>\u3000前と後ろ……二穴セックス……はまっちゃったかも、しれません……<emoji=heart04>」"
translation = "「네……<emoji=heart04> 앞이랑 뒤…… 두 구멍 섹스…… 빠져버렸을지도, 모르겠어요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "中出しでどろどろに汚れた女性器を俺に向けたまま微笑むアナ。"
translation = "질내사정으로 걸쭉하게 더러워진 성기를 나에게 향한 채 미소 짓는 아나."

[[dialogue]]
speaker = "unk"
original = "俺は彼女のリクエストに応えて、その後も何度も何度も中出しを決行した。"
translation = "나는 그녀의 요청에 응해, 그 후로도 몇 번이고 몇 번이고 질내사정을 감행했다."

[[dialogue]]
speaker = "unk"
original = "お尻と女性器を代わりばんこに犯して、空いた穴を指やアナルプラグでいじくりまわす──その日アナは、数えきれないほどの絶頂を味わうのだった。"
translation = "엉덩이와 성기를 번갈아 가며 범하고, 빈 구멍을 손가락이나 아날 플러그로 휘저어댄다── 그날 아나는 셀 수 없을 정도의 절정을 맛보았다."

