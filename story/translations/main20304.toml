[[dialogue]]
speaker = "unk"
original = "第４話,宣戦布告,B"
translation = "제4화, 선전포고, B"

[[dialogue]]
speaker_original = "サーシャ（覚醒）"
speaker_translation = "사샤(각성)"
original = "「斬り刻んじゃうわよ～」"
translation = "「잘게 썰어버릴 거야~」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「また会長の極星従騎が……この……！」"
translation = "「또 회장님의 극성종기가…… 이익……!」"

[[dialogue]]
speaker_original = "マトイ（覚醒）"
speaker_translation = "마토이(각성)"
original = "「新星星徒会の盾として、もう攻撃は通さない！」"
translation = "「신성성도회의 방패로서 더 이상 공격은 통하게 두지 않아!」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「ッ……！」"
translation = "「윽……!」"

[[dialogue]]
speaker = "unk"
original = "大槍を真正面から受け止められ、動揺を見せた。"
translation = "거대한 창을 정면에서 받아내자 동요를 보였다."

[[dialogue]]
speaker = "unk"
original = "その瞬間──"
translation = "그 순간──"

[[dialogue]]
speaker_original = "アナ（覚醒）"
speaker_translation = "아나(각성)"
original = "「撃ち抜きます……！」"
translation = "「꿰뚫겠습니다……!」"

[[dialogue]]
speaker = "unk"
original = "そして大弓に炎の矢を番え、過たず射貫く──！"
translation = "그리고 거궁에 화염의 화살을 먹여 어김없이 꿰뚫는다──!"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「うあああぁああーーーーーーーっ！！？」"
translation = "「우아아아아아아────────윽!!?」"

[[dialogue]]
speaker_original = "マトイ（覚醒）"
speaker_translation = "마토이(각성)"
original = "「はぁ、はぁ……何とかなった……のかな？」"
translation = "「하아, 하아…… 어떻게든 된…… 걸까?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あっ……ノヴァフォームが……」"
translation = "「앗…… 노바 폼이……」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふぅ。元の姿に戻っちゃったわね～」"
translation = "「후우. 원래 모습으로 돌아와 버렸네~」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「やはりまだ短時間しか維持できません。研究、運用、そして私たち自身の成長と……いずれの面でも課題があります」"
translation = "「역시 아직 단시간밖에 유지할 수 없습니다. 연구, 운용, 그리고 우리 자신의 성장까지…… 어느 면에서나 과제가 남아 있네요」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「うん。もっと長く戦えるようにならないと……」"
translation = "「응. 좀 더 오래 싸울 수 있게 되지 않으면……」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「あれ……セレスティア？\u3000でも私たちのと違うような……」"
translation = "「어라…… 셀레스티아? 하지만 우리 거랑은 다른 것 같은데……」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「か、返せ！」"
translation = "「돌, 돌려줘!」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「それはアタシの……会長にもらったセレスティアだ！」"
translation = "「그건 내…… 회장님께 받은 셀레스티아란 말이야!」"

[[dialogue]]
speaker = "unk"
original = "セレスティアを失った彼女は変身が解け、ガーディアンに受け止められていた。"
translation = "셀레스티아를 잃은 그녀는 변신이 풀려, 가디언에게 받아내어지고 있었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「何度でも聞くぞ！\u3000君はいったい何者なんだ！？」"
translation = "「몇 번이고 묻겠다! 너는 도대체 정체가 뭐지!?」"

[[dialogue]]
speaker = "unk"
original = "さっきは一蹴された疑問をもう一度ぶつける。"
translation = "조금 전 일축당했던 의문을 다시 한번 부딪친다."

[[dialogue]]
speaker = "unk"
original = "するとチナは、有り余る憤怒をにじませ、俺をにらみつけながら──"
translation = "그러자 치나는 넘쳐흐르는 분노를 내비치며, 나를 노려보면서──"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「アタシは……星騎士だ」"
translation = "「아타시는…… 성기사다.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「星騎士だって……！？\u3000だが新星にも流星学園にも、君みたいな星騎士はいないはずだ！」"
translation = "「성기사라고……!? 하지만 신성에도 유성학원에도 너 같은 성기사는 없을 텐데!」"

[[dialogue]]
speaker = "unk"
original = "現に、まとっている制服は新星、流星どちらのものとも違う。"
translation = "실제로 입고 있는 교복은 신성, 유성 어느 쪽의 것과도 다르다."

[[dialogue]]
speaker = "unk"
original = "彼女が星力を使っているのは確かに感じていたが……"
translation = "그녀가 성력을 사용하고 있는 것은 확실히 느껴졌지만……"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「当たり前だ！\u3000アタシはお前らとは違う。<ruby>極星<rt>きょくせい</rt></ruby>学園の星騎士だ！」"
translation = "「당연하지! 아타시는 너희와는 달라. 극성학원의 성기사다!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「極星……？\u3000聞いたことない学園だけど」"
translation = "「극성……? 들어본 적 없는 학원인데.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「デネブの流星と新星は、リクリエに敗北した……」"
translation = "「데네브의 유성과 신성은 리크리에에 패배했다……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「──！」"
translation = "「──!」"

[[dialogue]]
speaker = "unk"
original = "３つあるとされる平行世界のうちのひとつで、俺たちが今いるアルタイルとは別の軸にある。"
translation = "세 개가 있다고 여겨지는 평행세계 중 하나로, 우리가 지금 있는 알타이르와는 다른 축에 있다."

[[dialogue]]
speaker = "unk"
original = "そしてヴィーナスが生まれた世界だ。"
translation = "그리고 비너스가 태어난 세계다."

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「だが、<ruby>デネブ<rt>アタシたち</rt></ruby>は屈しなかった！\u3000それが極星学園だ！」"
translation = "「하지만 데네브은 굴복하지 않았어! 그것이 극성학원이다!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あなたがデネブから来たって、本当なの！？」"
translation = "「당신이 데네브에서 왔다는 게 정말이야!?」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「本当だとも！\u3000そしてアタシは、お前たちに宣戦布告しに来たんだ！」"
translation = "「정말이고말고! 그리고 아타시는 너희에게 선전포고하러 온 거다!」"

[[dialogue]]
speaker = "unk"
original = "宣戦布告──剣呑な言葉に緊張がさらに高まる。"
translation = "선전포고── 험악한 단어에 긴장이 더욱 고조된다."

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「アタシは極星学園星徒会・庶務、<ruby>香堂<rt>こうどう</rt></ruby>チナ」"
translation = "「아타시는 극성학원 성도회 서무, 코도 치나.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「平行世界アルタイルとデネブは敵対関係にある」"
translation = "「평행세계 알타이르와 데네브는 적대 관계에 있다.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「アルタイルのリクリエを止めれば、デネブのリクリエが加速する。デネブのリクリエを止めれば、アルタイルのリクリエが激化する」"
translation = "「알타이르의 리크리에를 멈추면 데네브의 리크리에가 가속된다. 데네브의 리크리에를 멈추면 알타이르의 리크리에가 격화된다.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「いいか、これは生存競争だ。生き残るのはデネブかアルタイル、２つに１つ」"
translation = "「잘 들어라, 이건 생존 경쟁이다. 살아남는 건 데네브냐 알타이르냐, 둘 중 하나.」"

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「生き残るのはアタシらだ……！」"
translation = "「살아남는 건 아타시들이다……!」"

[[dialogue]]
speaker = "unk"
original = "彼女の表情が、怒りと憎悪で歪み、槍よりも鋭い殺意が俺を貫こうとしていた。"
translation = "그녀의 표정이 분노와 증오로 일그러지고, 창보다 날카로운 살의가 나를 꿰뚫으려 하고 있었다."

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「極星従騎！」"
translation = "「극성종기!」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「きゃっ！？」"
translation = "「꺄악!?」"

[[dialogue]]
speaker = "unk"
original = "極星従騎の突進で、マトイの手からセレスティアが落ちる。"
translation = "극성종기의 돌진으로 마토이의 손에서 셀레스티아가 떨어진다."

[[dialogue]]
speaker_original = "チナ"
speaker_translation = "치나"
original = "「次こそはアルタイルを滅ぼす！」"
translation = "「다음번에야말로 알타이르를 멸망시키겠다!」"

[[dialogue]]
speaker = "unk"
original = "チナは自身のセレスティアを極星従騎から受け取ると、その背に乗って戦場を後にした。"
translation = "치나는 자신의 셀레스티아를 극성종기에게서 받아들자, 그 등에 올라타 전장을 뒤로했다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「追うのは……難しいか」"
translation = "「쫓는 건…… 어렵겠군.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ありがとう、みんなのおかげで助かったよ」"
translation = "「고마워, 모두 덕분에 살았어.」"

[[dialogue]]
speaker = "unk"
original = "今回はマトイたちのノヴァフォームに助けられた。"
translation = "이번에는 마토이 일행의 노바 폼 덕분에 도움을 받았다."

[[dialogue]]
speaker = "unk"
original = "星徒会長としてふがいなく思う反面、みんなの新しい力はとても頼もしく思えた。"
translation = "성도회장으로서 한심하게 생각하는 반면, 모두의 새로운 힘은 매우 든든하게 느껴졌다."

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「元はといえば、ノヴァフォームは魔王の力ですから」"
translation = "「원래 따지고 보면 노바 폼은 마왕의 힘이니까요.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「そうそう。それに今までいっぱい助けてもらったしね」"
translation = "「맞아 맞아. 게다가 지금까지 잔뜩 도움받기도 했고 말이야.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あとは、ノヴァフォームを使えるようにしてくれたメイプルちゃんにも感謝ね～」"
translation = "「나머지는 노바 폼을 쓸 수 있게 해준 메이플짱에게도 감사해야겠네~」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「私もノヴァフォームになれたら良かったのに……」"
translation = "「나도 노바 폼이 될 수 있었다면 좋았을 텐데……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ヴィーナス？」"
translation = "「비너스?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ううん、何でもないわ！\u3000それよりあの子よ、あの子！\u3000デネブから来たっていう」"
translation = "「으응, 아무것도 아니야! 그보다 그 애야, 그 애! 데네브에서 왔다는.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「チナって言ってたかしら～？\u3000強敵だったわね～」"
translation = "「치나라고 했던가요~? 강적이었네요~」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「でも多分、あの子は普通の星騎士……だよね？」"
translation = "「하지만 아마 그 애는 평범한 성기사……지?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「リクリエの力は感じなかったし、リクリエに対して否定的だったのを見ると……使徒ではなさそうだ」"
translation = "「리크리에의 힘은 느껴지지 않았고, 리크리에에 대해 부정적이었던 걸 보면…… 사도는 아닌 것 같아.」"

[[dialogue]]
speaker = "unk"
original = "彼女が使っていたのは、俺たちと同じ星の力だった。"
translation = "그녀가 사용하고 있던 것은 우리와 같은 별의 힘이었다."

[[dialogue]]
speaker = "unk"
original = "ただ、鍛錬の度合いで言えば新星星徒会だって生半可なものではない。"
translation = "다만 단련의 정도로 따지자면 신성 성도회도 어설픈 수준은 아니다."

[[dialogue]]
speaker = "unk"
original = "リクリエの力も、魔王の力もなしに、普通の星騎士があれほどまでに強くなれるものなのだろうか？"
translation = "리크리에의 힘도, 마왕의 힘도 없이 평범한 성기사가 저 정도로 강해질 수 있는 것일까?"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「それにデネブが敵ってどういうこと？\u3000極星学園とか、アルタイルを守るとデネブのリクリエが進むとか、わけわかんないことばっかりよ」"
translation = "「게다가 데네브가 적이라니 그게 무슨 소리야? 극성학원이라느니, 알타이르를 지키면 데네브의 리크리에가 진행된다느니, 온통 알 수 없는 소리뿐이야.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それは……また後で整理しよう」"
translation = "「그건…… 나중에 다시 정리하자.」"

[[dialogue]]
speaker = "unk"
original = "それに以前の話では、デネブはすでにリクリエに敗北したとも聞いていた。"
translation = "게다가 이전 이야기로는 데네브는 이미 리크리에에 패배했다고 듣기도 했다."

[[dialogue]]
speaker = "unk"
original = "そこから刺客──しかも星騎士の──が現れるなんて、予想もしていなかった。"
translation = "그곳에서 자객── 그것도 성기사가── 나타날 줄은 예상치 못했다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ひとまず学園に戻ろう。流星市国全体の被害状況を確認しないと──」"
translation = "「일단 학원으로 돌아가자. 유성시국 전체의 피해 상황을 확인해야 해──」"

[[dialogue]]
speaker = "？？？"
original = "「しまった、パーティーに遅れてしまったね」"
translation = "「이런, 파티에 늦어버렸네.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──！？」"
translation = "「──!?」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「そんな……！？」"
translation = "「말도 안 돼……!?」"

[[dialogue]]
speaker = "unk"
original = "彼女が俺たちの前に現れた瞬間、理解する。"
translation = "그녀가 우리 앞에 나타난 순간 이해한다."

[[dialogue]]
speaker = "unk"
original = "仮面に宿る禍々しい破滅の力は、幾度も相対したアポロと同じ。"
translation = "가면에 깃든 불길한 파멸의 힘은 몇 번이나 상대했던 아폴로와 같다."

[[dialogue]]
speaker = "unk"
original = "すなわち──彼女こそ新たなリクリエの使徒。"
translation = "즉── 그녀야말로 새로운 리크리에의 사도."

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「お初にお目にかかるよ、魔王様。私はジグ。“真なる神の騎士”だ」"
translation = "「처음 뵙겠어, 마왕님. 나는 지그. “진정한 신의 기사”야.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「真なる神……？」"
translation = "「진정한 신……?」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「君たちが信仰する女神のような紛い物とは違う、世界を創造せし真なる神だ」"
translation = "「너희가 신봉하는 여신 같은 가짜와는 다른, 세계를 창조하신 진정한 신이지.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「紛い物ですって！？」"
translation = "「가짜라고!?」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「うん、紛い物。そう言っただろう？」"
translation = "「응, 가짜. 그렇게 말했잖아?」"

[[dialogue]]
speaker = "unk"
original = "怒りをにじませるヴィーナスにも動じず、ジグと名乗った使徒は仮面の下でにこりと微笑む。"
translation = "분노를 내비치는 비너스에게도 동요하지 않고, 지그라고 자처한 사도는 가면 아래에서 생긋 미소 짓는다."

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「まぁ、そんなわけで短い間になるかもしれないけどよろしくね、魔王様」"
translation = "「뭐, 그런 연유로 짧은 기간이 될지도 모르겠지만 잘 부탁해, 마왕님.」"

[[dialogue]]
speaker = "unk"
original = "恭しくお辞儀をし、鷹揚に挨拶してみせるリクリエの使徒。"
translation = "정중히 허리를 굽혀 인사하며 대범하게 인사해 보이는 리크리에의 사도."

[[dialogue]]
speaker = "unk"
original = "今のところ攻撃の意思は見えないが、対応を誤れば即座にこちらが壊滅してしまうだろう。"
translation = "지금으로선 공격 의사는 보이지 않지만, 대응을 그르치면 즉시 이쪽이 궤멸당하고 말 것이다."

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「いや、しかし失態だ。記念すべきアルタイルとデネブの星騎士の初邂逅を見届けに来たのだけど、遅くなってしまった」"
translation = "「아니, 하지만 실책이네. 기념비적인 알타이르와 데네브의 성기사의 첫 해후를 지켜보러 왔는데 늦어버렸어.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「まあ終わってしまったものは仕方がない。挨拶も済んだことだし、出直すとしよう」"
translation = "「뭐, 끝난 일은 어쩔 수 없지. 인사도 나눴으니 이만 물러가도록 할까.」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ちょっと……！\u3000リクリエの使徒なのに、ホントに見に来ただけなの！？」"
translation = "「잠깐만……! 리크리에의 사도면서 정말 구경만 하러 온 거야!?」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「うん、<b>あの子</b>にはあの子なりの思惑があるようだからね。お手並み拝見しようと思って」"
translation = "「응, **그 애**에게는 그 애 나름의 속셈이 있는 모양이니까. 솜씨 좀 구경해 볼까 해서.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「でもお土産くらいは──」"
translation = "「하지만 선물 정도는──」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「置いていこうかな」"
translation = "「두고 갈까 하는데.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「！？」"
translation = "「!?」"

[[dialogue]]
speaker = "unk"
original = "リクリエの使徒が瞬時に距離を詰めてきた。"
translation = "리크리에의 사도가 순식간에 거리를 좁혀왔다."

[[dialogue]]
speaker = "unk"
original = "反応が間に合わない。"
translation = "반응이 늦었다."

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「えい♪」"
translation = "「에잇♪」"

[[dialogue]]
speaker = "unk"
original = "剣先がツン、と胸に触れた。"
translation = "칼끝이 툭, 하고 가슴에 닿았다."

[[dialogue]]
speaker = "unk"
original = "痛みはない。出血もない。"
translation = "통증은 없다. 출혈도 없다."

[[dialogue]]
speaker = "unk"
original = "ただ切っ先が届いただけ──"
translation = "그저 칼끝이 닿았을 뿐──"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「！！？？」"
translation = "「!!??」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「フフフ……」"
translation = "「후후후……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「インパルスストリーム！」"
translation = "「임펄스 스트림!」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「！！」"
translation = "「!!」"

[[dialogue]]
speaker = "unk"
original = "轟く雷光を避け、リクリエの使徒が距離を取る。"
translation = "포효하는 뇌광을 피하며 리크리에의 사도가 거리를 벌린다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「はぁ、はぁ……魔王から離れろ、ジグ……！」"
translation = "「하아, 하아…… 마왕에게서 떨어져라, 지그……!」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「おや。残してきたモンスター、ちゃんと倒してきたんだ。偉いね」"
translation = "「어라. 남겨두고 온 몬스터, 제대로 쓰러뜨리고 왔구나. 장하네.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「あれくらいで、私たちを止められると思うな……！」"
translation = "「그 정도로 우리를 막을 수 있을 거라 생각하지 마……!」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「それは失礼。もてなし足りなかったのは謝るよ」"
translation = "「그것참 실례. 대접이 부족했던 건 사과할게.」"

[[dialogue]]
speaker_original = "ジグ"
speaker_translation = "지그"
original = "「では今度こそさよならだ。また会えるといいね」"
translation = "「그럼 이번에야말로 작별이야. 다시 만날 수 있으면 좋겠네.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「待て、ジグ……！」"
translation = "「기다려, 지그……!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ぅ……」"
translation = "「으……」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「梨緒！？」"
translation = "「리오!?」"

[[dialogue]]
speaker = "unk"
original = "ジグを追いかけようとした梨緒が、顔を歪めながらその場に倒れる。"
translation = "지그를 쫓아가려던 리오가 얼굴을 일그러뜨리며 그 자리에 쓰러진다."

[[dialogue]]
speaker = "unk"
original = "梨緒は気を失いながらも苦悶に満ちた表情を浮かべ、もがくようにジグが去った方向に手を伸ばしていた。"
translation = "리오는 정신을 잃으면서도 고뇌에 찬 표정을 지으며, 발버둥 치듯 지그가 떠난 방향으로 손을 뻗고 있었다."

