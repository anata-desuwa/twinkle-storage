[[dialogue]]
speaker = "クラウディア（黄昏）"
original = "「ようこそ魔王。我が玉座の間へ……歓迎するぞ♪」"
translation = "「어서 오너라 마왕. 나의 옥좌의 방에…… 환영하느니라♪」"

[[dialogue]]
speaker = "クラウディア（黄昏）"
original = "「ふふ、安心せい。魔法で誰にもバレんようにしておる。ここに来るまでも、だーれもお前に気づかなかったであろう？」"
translation = "「후후, 안심하거라. 마법으로 아무에게도 들키지 않게 해 두었느니라. 여기에 오기 전까지도, 아무도 너를 눈치채지 못했지 않느냐?」"

[[dialogue]]
speaker = "クラウディア（黄昏）"
original = "「<ruby>伽<rt>とぎ</rt></ruby>の<ruby>最中<rt>さなか</rt></ruby>に邪魔が入るなど、それこそ無粋だからの。さぁ……恋人同士、まぐわおうではないか♪」"
translation = "「수발의 한창에 방해가 들어오는 것만큼 풍류 없는 일도 없으니 말이다. 자…… 연인끼리, 정을 나누지 않겠느냐♪」"

[[dialogue]]
speaker = "クラウディア（黄昏）"
original = "「──ん？\u3000余の格好がいつもと違うのが気になるか？」"
translation = "「──응? 여의 차림새가 평소와 다른 것이 신경 쓰이느냐?」"

[[dialogue]]
speaker = "クラウディア（黄昏）"
original = "「前にも言ったであろう。これは余の魔力を最大限に発揮できる装いなのだ。魔王の力を持つ相手を御すには、こちらも全力でなくてはな♪」"
translation = "「전에도 말하지 않았느냐. 이것은 여의 마력을 최대한으로 발휘할 수 있는 복장이니라. 마왕의 힘을 가진 상대를 제어하려면, 이쪽도 전력을 다해야 하지 않겠느냐♪」"

[[dialogue]]
speaker = "クラウディア（黄昏）"
original = "「ふふん。いつもいつも夜はお前に好き勝手されておるからなぁ……覚悟せいよ？\u3000今日の余は本気モード、というやつなのだ<emoji=heart04>」"
translation = "「후훈. 언제나 밤에는 네가 마음대로 하고 있으니 말이다…… 각오하거라? 오늘의 여는 진심 모드, 라는 것이니라<emoji=heart04>」"

[[dialogue]]
speaker = "クラウディア（黄昏）"
original = "「これでお前はもう余に逆らえん。さぁ、服を脱いで床に寝転ぶがよい。光の魔女が直々に、お前を犯し抜いてやる<emoji=heart04>」"
translation = "「이것으로 너는 이제 여에게 거스를 수 없느니라. 자, 옷을 벗고 바닥에 눕거라. 빛의 마녀가 직접, 너를 범해 주마<emoji=heart04>」"

[[dialogue]]
speaker = "クラウディア"
original = "「くふふっ……よい眺めだ<emoji=heart04>\u3000余のおま○こをいつも雑魚呼ばわりする不埒者を組み伏せてやったぞ♪」"
translation = "「쿠후후…… 좋은 광경이구나<emoji=heart04> 여의 보지를 언제나 잡어 취급하던 불한당을 굴복시켜 주었느니라♪」"

[[dialogue]]
speaker = "unk"
original = "魔力のすべてを開放したクラウディアに逆らうことができず、俺は床に縫い付けられてしまった。"
translation = "마력의 모든 것을 개방한 클라우디아에게 거역하지 못하고, 나는 바닥에 박혀버렸다."

[[dialogue]]
speaker = "unk"
original = "ムクムクと勃起したペニスの近くへ腰を下ろしたクラウディアはとても楽しそうだ。"
translation = "불끈불끈 발기한 자지 근처에 허리를 내린 클라우디아는 매우 즐거워 보인다."

[[dialogue]]
speaker = "クラウディア"
original = "「さぁ、感想はどうだ？\u3000聞かせてみぃ、お前が今思っていることをな<emoji=heart04>」"
translation = "「자, 감상은 어떠냐? 들려주어라, 네가 지금 생각하고 있는 것을 말이다<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「は……恥ずかしい……」"
translation = "「부…… 부끄러워……」"

[[dialogue]]
speaker = "クラウディア"
original = "「そうだのう。とても恥ずかしい格好だな<emoji=heart04>\u3000歳下の女子の前で素っ裸になって、ち○ぽをこんなに勃起させおって……<emoji=heart04>」"
translation = "「그렇겠지. 아주 부끄러운 꼴이구나<emoji=heart04> 연하의 여자 앞에서 알몸이 되어, 자지를 이렇게나 발기시키고는……<emoji=heart04>」"

[[dialogue]]
speaker = "クラウディア"
original = "「ほれ、余のおま○こでナデナデしてやろう<emoji=heart04>\u3000ぷにぷにで、や～らかいぞ、まおー？<emoji=heart04>」"
translation = "「보아라, 여의 보지로 쓰담쓰담 해주마<emoji=heart04> 말랑말랑하고 부드럽느니라, 마왕?<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "反りかえったペニスに、クラウディアの女性器が押し当てられて軽く往復する──それだけで。"
translation = "휘어진 자지에 클라우디아의 성기가 밀착되어 가볍게 왕복한다── 그것만으로."

[[dialogue]]
speaker = "クロト"
original = "「あっ……ぐ、ぅっ……！？」"
translation = "「앗…… 윽, 우윽……!?」"

[[dialogue]]
speaker = "unk"
original = "堪えがたい快感がペニスに迸って、腰が大げさなくらいに跳ねてしまう。"
translation = "견디기 힘든 쾌감이 자지에 번져서, 허리가 과장될 정도로 튀어 오르고 만다."

[[dialogue]]
speaker = "クラウディア"
original = "「おお、感度も良好だのう♪\u3000ふふ、光の魔女は再生を司る……故に生命エネルギーの操作などお手の物なのだ<emoji=heart04>」"
translation = "「오호, 감도도 양호하구나♪ 후후, 빛의 마녀는 재생을 관장하느니라…… 고로 생명 에너지 조작 따위는 식은 죽 먹기지<emoji=heart04>」"

[[dialogue]]
speaker = "クラウディア"
original = "「代謝を引き上げ、細胞の活性化を……ま、細かいことはよいか。要するにだ、お前の性感を高めるも鎮めるも、余の思いのままというわけだ」"
translation = "「대사를 끌어올리고, 세포의 활성화를…… 뭐, 자세한 건 상관없나. 요컨대 말이다, 네 성감을 높이는 것도 가라앉히는 것도 여의 마음대로라는 뜻이니라」"

[[dialogue]]
speaker = "クラウディア"
original = "「ほぉれ、ほれ<emoji=heart04>\u3000おま○こすりすり、どうかのう？\u3000んっ<emoji=heart04>\u3000んっ……んっ……んぅ～……<emoji=heart04>」"
translation = "「보아라, 보아라<emoji=heart04> 보지 비비기, 어떠냐? 응<emoji=heart04> 응…… 응…… 응으~……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「～～～～～っ！？」"
translation = "「~~~~~~~~~!?」"

[[dialogue]]
speaker = "unk"
original = "たった数回撫でつけられただけで、まるで挿入しているかのような昂りが沸き起こる。"
translation = "겨우 몇 번 문질러진 것만으로, 마치 삽입하고 있는 것 같은 고양감이 치솟는다."

[[dialogue]]
speaker = "クラウディア"
original = "「くふふふっ<emoji=heart04>\u3000心地よすぎて声も出んようだなぁ？\u3000ほれ、もっといぢめてやろうぞー？」"
translation = "「쿠후후후<emoji=heart04> 너무 기분 좋아서 목소리도 안 나오는 모양이구나? 자, 더 괴롭혀 주마?」"

[[dialogue]]
speaker = "クラウディア"
original = "「光の魔女のおま○こを、すりすりすりー……ふははっ♪\u3000ち○ぽが跳ね回っておる♪\u3000そんなに気持ちがいいのかー、雑魚ち○ぽめ<emoji=heart04>」"
translation = "「빛의 마녀의 보지를, 비비적 비비적…… 후하하♪ 자지가 날뛰고 있구나♪ 그렇게나 기분이 좋은 게냐, 잡어 자지 녀석<emoji=heart04>」"

[[dialogue]]
speaker = "クラウディア"
original = "「今日はいつもと立場が逆だぞ？\u3000お前をひぃひぃ言わせて、雑魚ち○ぽ呼ばわりをた～っぷりとしてやる♪」"
translation = "「오늘은 평소와 입장이 반대이니라? 너를 히이히이 거리게 만들고, 잡어 자지라고 듬~뿍 불러 주마♪」"

[[dialogue]]
speaker = "クラウディア"
original = "「──さ。おねだりをせんか。雑魚ち○ぽ入れさせてくださいと、哀れに許しを乞え、まおー？<emoji=heart04>」"
translation = "「──자. 조르지 않겠느냐. 잡어 자지 넣게 해달라고, 애처롭게 용서를 빌거라, 마왕?<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は今まで、高貴な彼女の屈服する姿が興奮するからと、いつもイジワルをするようなセックスをしていた。"
translation = "나는 지금까지, 고귀한 그녀가 굴복하는 모습이 흥분된다는 이유로, 언제나 짓궂게 구는 섹스를 해왔다."

[[dialogue]]
speaker = "unk"
original = "どうやら今夜は、そのツケが回ってきたようだ……今日ばかりは彼女の言いなりになる他ない。"
translation = "아무래도 오늘 밤은 그 대가를 치를 때가 온 모양이다…… 오늘만큼은 그녀가 시키는 대로 할 수밖에 없다."

[[dialogue]]
speaker = "クロト"
original = "「い、入れさせてください……」"
translation = "「넣, 넣게 해주세요……」"

[[dialogue]]
speaker = "クラウディア"
original = "「言葉が足りんな？\u3000雑魚なだけでなく、おバカち○ぽなのかのう？\u3000このまま手でシゴいてイカせてやってもよいのだぞ？」"
translation = "「말이 부족하구나? 잡어일 뿐만 아니라 바보 자지인 게냐? 이대로 손으로 흔들어서 싸게 해버려도 좋느니라?」"

[[dialogue]]
speaker = "クロト"
original = "「お、俺の雑魚チ○ポを……クラウディアのおま○こに入れさせてくださいっ……！！」"
translation = "「제, 제 잡어 자지를…… 클라우디아의 보지에 넣게 해주세요……!!」"

[[dialogue]]
speaker = "クラウディア"
original = "「くふふふふっ<emoji=heart04>\u3000んー、実に心地よい悲鳴だのう。仕方ない……動くなよー……？」"
translation = "「쿠후후후후<emoji=heart04> 음, 참으로 기분 좋은 비명이구나. 어쩔 수 없지…… 움직이지 마라?」"

[[dialogue]]
speaker = "クラウディア"
original = "「んっはぁぁあぁ～っ<emoji=heart04>\u3000んうー……お望みどおり呑み込んでやったぞ、お前の雑魚ち○ぽ……<emoji=heart04>」"
translation = "「응하아아아~<emoji=heart04> 응우…… 원하는 대로 삼켜 주었느니라, 네 잡어 자지……<emoji=heart04>」"

[[dialogue]]
speaker = "クラウディア"
original = "「はぁあっ……大きさと硬さだけは立派だな、まおー？<emoji=heart04>\u3000余の中をぐいぐいかき分けて、熱さを主張しおって……<emoji=heart04>」"
translation = "「하아앗…… 크기와 단단함만큼은 훌륭하구나, 마왕?<emoji=heart04> 여의 안을 꾹꾹 헤집으며 뜨거움을 주장하고는……<emoji=heart04>」"

[[dialogue]]
speaker = "クラウディア"
original = "「すでに心地よいかもしれんがな、本番はここからだぞっ……んぅっ！<emoji=heart04>」"
translation = "「이미 기분 좋을지도 모르겠다만, 본방은 이제부터이니라…… 응윽!<emoji=heart04>」"

[[dialogue]]
speaker = "クラウディア"
original = "「んぅっ<emoji=heart04>\u3000ふぅっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000はぁあっ、んんんっ<emoji=heart04>」"
translation = "「응윽<emoji=heart04> 후우<emoji=heart04> 앗<emoji=heart04> 응응<emoji=heart04> 하아앗, 응응응<emoji=heart04>」"

[[dialogue]]
speaker = "クラウディア"
original = "「どうだー？\u3000魔法で感度をバチバチに高めたち○ぽを、狭い肉穴でシゴかれる感触、はっ……<emoji=heart04>」"
translation = "「어떠냐? 마법으로 감도를 바짝 높인 자지를, 좁은 고기 구멍으로 조여지는 감촉, 핫……<emoji=heart04>」"

[[dialogue]]
speaker = "クラウディア"
original = "「んふっ<emoji=heart04>\u3000ふははっ<emoji=heart04>\u3000よい顔だなー、ふふふ♪\u3000魔王がそんなに、あっ、余裕のない、んんっ<emoji=heart04>\u3000顔をしているのは、初めて見るぞっ<emoji=heart04>」"
translation = "「응훗<emoji=heart04> 후하하<emoji=heart04> 좋은 표정이구나, 후후후♪ 마왕이 그렇게나, 앗, 여유 없는, 응응<emoji=heart04> 얼굴을 하고 있는 건 처음 보느니라<emoji=heart04>」"

[[dialogue]]
speaker = "クラウディア"
original = "「だが容赦はせんからなっ……はあ、んんっ、ふぅ、んっ<emoji=heart04>\u3000これまで散々、余を辱めてきたのだからっ……あ、んんっ<emoji=heart04>」"
translation = "「하지만 봐주지 않을 것이니라…… 하아, 응응, 후우, 응<emoji=heart04> 지금까지 실컷 여를 능욕해 왔으니까 말이다…… 아, 응응<emoji=heart04>」"

[[dialogue]]
speaker = "クラウディア"
original = "「今夜はてってーてきに、んんっ<emoji=heart04>\u3000灸をすえてやろう、ぞっ……あ、はぁ、んんっ<emoji=heart04>」"
translation = "「오늘 밤은 철저하게, 응응<emoji=heart04> 따끔한 맛을 보여주마…… 아, 하아, 응응<emoji=heart04>」"

[[dialogue]]
speaker = "クラウディア"
original = "「ほれ、顔をそむけるで、ないっ<emoji=heart04>\u3000余の顔を見るのだ<emoji=heart04>\u3000お前が大好きだとほざく、恋人の顔を、よーく見るのだっ<emoji=heart04>」"
translation = "「자, 고개를 돌리지 마라! 여의 얼굴을 보거라<emoji=heart04> 네가 아주 좋아한다고 지껄이는 연인의 얼굴을 똑똑히 보란 말이다!」"

[[dialogue]]
speaker = "クラウディア"
original = "「──おっ♪\u3000ち○ぽが硬くなりおった<emoji=heart04>\u3000ふふ、余の顔が好きか？\u3000お前はいつも、キレイだ可愛いだとぬかしおる、からなっ<emoji=heart04>」"
translation = "「──오♪ 자지가 단단해졌구나<emoji=heart04> 후후, 여의 얼굴이 좋으냐? 너는 언제나 예쁘다 귀엽다 떠들어 대니까 말이다!」"

[[dialogue]]
speaker = "クラウディア"
original = "「ほれ、せっかく装いを、ずり下げておるのだからっ……はぁ、んんんっ<emoji=heart04>\u3000おっぱいもじっくり見ろ<emoji=heart04>」"
translation = "「자, 어렵게 옷을 흘러내리게 했으니…… 하아, 응응응<emoji=heart04> 가슴도 차분히 보거라<emoji=heart04>」"

[[dialogue]]
speaker = "クラウディア"
original = "「小さくても、はぁ、んっ<emoji=heart04>\u3000形は綺麗であろう？\u3000いっぱい腰を振って、ゆ、揺らして、やるっ<emoji=heart04>」"
translation = "「작아도, 하아, 응<emoji=heart04> 모양은 예쁘지 않느냐? 허리를 잔뜩 흔들어서, 흔, 흔들어 주마!」"

[[dialogue]]
speaker = "クラウディア"
original = "「んんんぁあっ♪\u3000またまた、雑魚ち○ぽが硬くっ<emoji=heart04>\u3000くふ、余のおっぱいが、そんなに好きか？<emoji=heart04>\u3000このスケベめっ<emoji=heart04>」"
translation = "「응응응아앗♪ 또다시 잡어 자지가 단단하게<emoji=heart04> 쿠후, 여의 가슴이 그렇게나 좋으냐? 이 변태 녀석!」"

[[dialogue]]
speaker = "クラウディア"
original = "「くふぅっ<emoji=heart04>\u3000あっ、んんっ<emoji=heart04>\u3000この体勢は、よいっ<emoji=heart04>\u3000気持ちよいところに当てながら、お前を責められるっ……はぁんっ<emoji=heart04>」"
translation = "「쿠후우<emoji=heart04> 앗, 응응<emoji=heart04> 이 자세는 좋구나! 기분 좋은 곳에 닿으면서 너를 몰아붙일 수 있느니라…… 하앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "大きく股を開いてピストンを続けるクラウディア。ひと擦りされるたびに極上の快感がペニスに伝わり、俺はされるがままに貪られるしかない。"
translation = "다리를 크게 벌리고 피스톤을 계속하는 클라우디아. 한 번 문질러질 때마다 극상의 쾌감이 자지에 전달되어, 나는 당하는 대로 탐닉당할 수밖에 없다."

[[dialogue]]
speaker = "クラウディア"
original = "「んん、ふぅ、んんっ<emoji=heart04>\u3000必死で射精を我慢しておるのう……<emoji=heart04>\u3000無駄なあがきであること、教えてやろうっ<emoji=heart04>」"
translation = "「응응, 후우, 응응<emoji=heart04> 필사적으로 사정을 참고 있구나…… 무의미한 발버둥이라는 걸 가르쳐 주마!」"

[[dialogue]]
speaker = "クラウディア"
original = "「ち○ぽがも～っと気持ちよくなる魔法っ……かけてやろうかのっ……そぉれ♪」"
translation = "「자지가 더~욱 기분 좋아지는 마법…… 걸어줄까나…… 자아♪」"

[[dialogue]]
speaker = "クロト"
original = "「──ッ！？」"
translation = "「──윽!?」"

[[dialogue]]
speaker = "unk"
original = "目の前が一瞬、輝いたと思った瞬間──ペニスの先端から精液が少量、漏れ出ていた。"
translation = "눈앞이 순식간에 빛났다고 생각한 순간── 자지 끝에서 정액이 소량 새어 나오고 있었다."

[[dialogue]]
speaker = "クラウディア"
original = "「んぁあっ<emoji=heart04>\u3000出よったっ<emoji=heart04>\u3000爪の先ほどの量だけ、精液が出るのを許可してやったのだっ<emoji=heart04>\u3000んはぁ、熱いのぅっ……♪」"
translation = "「응아앗<emoji=heart04> 나왔구나! 손톱 끝만큼의 양만 정액이 나오는 걸 허락해 준 것이니라! 응하아, 뜨겁구나……♪」"

[[dialogue]]
speaker = "クラウディア"
original = "「余のおま○こでギューっと絞っておるから、漏れ出てはこんが～……どうだ、ほんの少しでも射精をすると、より敏感になるであろ？」"
translation = "「여의 보지로 꽉 짜내고 있으니 새어 나오지는 않겠다만~…… 어떠냐, 아주 조금이라도 사정을 하면 훨씬 더 민감해지지 않느냐?」"

[[dialogue]]
speaker = "クラウディア"
original = "「んんぅ、ふぅ、はあ、んんっ<emoji=heart04>\u3000ビクビク震えておる<emoji=heart04>\u3000敏感雑魚ち○ぽめっ……ほれ、もっと昂れっ<emoji=heart04>」"
translation = "「응, 으으, 후우, 하아, 응읏<emoji=heart04> 파르르 떨고 있느니라<emoji=heart04> 민감한 잡코 자지 녀석…… 자, 좀 더 달아오르거라<emoji=heart04>」"

[[dialogue]]
speaker = "クラウディア"
original = "「まだ射精は許さんっ<emoji=heart04>\u3000だが感度はどんどん、引き上げてやるぞっ<emoji=heart04>\u3000ほぉれ、ほれっ<emoji=heart04>」"
translation = "「아직 사정은 허락하지 않느니라<emoji=heart04> 하지만 감도는 계속해서 끌어올려 주마<emoji=heart04> 자아, 자아<emoji=heart04>」"

[[dialogue]]
speaker = "クラウディア"
original = "「んぅ、ふふっ<emoji=heart04>\u3000気持ちよいか？\u3000んっ、んんぅ、んうっ<emoji=heart04>\u3000余の魔法は、すごいだろうっ♪」"
translation = "「응, 후훗<emoji=heart04> 기분 좋으냐? 응, 응으, 응읏<emoji=heart04> 여의 마법은 대단하지 않느냐♪」"

[[dialogue]]
speaker = "クラウディア"
original = "「もっと余裕をなくしてやるっ……余は完璧なのだ、せっくすだって上手いのだからなっ……んぅ！<emoji=heart04>」"
translation = "「좀 더 여유를 없애 주마…… 여는 완벽하느니라, 섹스도 능숙하니까 말이다…… 응!<emoji=heart04>」"

[[dialogue]]
speaker = "クラウディア"
original = "「あっあっ、あっあっあっ<emoji=heart04>\u3000んんぅ、ふぅ、んんっ、んぁああっ<emoji=heart04>」"
translation = "「앗앗, 앗앗앗<emoji=heart04> 응으, 후우, 응읏, 응아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "クラウディア"
original = "「尻を打ち付けるように、してっ<emoji=heart04>\u3000雑魚ち○ぽをゴシゴシして、やるっ……んぅ、ふぅうっ<emoji=heart04>\u3000あっ、はぁ、んんぅ、んっ<emoji=heart04>」"
translation = "「엉덩이를 내리치듯이 해서<emoji=heart04> 잡코 자지를 비벼 주마…… 응, 후우우<emoji=heart04> 앗, 하아, 응으, 응<emoji=heart04>」"

[[dialogue]]
speaker = "クラウディア"
original = "「余の、すごさっ……思い知ったか、まおーっ<emoji=heart04>\u3000んん、んんぅ、ふぅ、んんっ<emoji=heart04>」"
translation = "「여의 대단함…… 뼈저리게 느꼈느냐, 마왕<emoji=heart04> 응응, 응으, 후우, 응읏<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "速いペースのピストンでさらに俺の性感が跳ね上がる。ぎちぎちに狭くて柔らかい、そんな相反する感触の膣穴は眩暈がするほどに気持ちがいい。"
translation = "빠른 페이스의 피스톤으로 나의 성감이 더욱 튀어 오른다. 꽉 조이면서도 좁고 부드러운, 그런 상반된 감촉의 질 구멍은 현기증이 날 정도로 기분이 좋다."

[[dialogue]]
speaker = "unk"
original = "すでに射精感は限界を超えているのに、漏れ出ないのはクラウディアが魔法でせき止めているからだ。"
translation = "이미 사정감은 한계를 넘었는데도 새어 나오지 않는 것은 클라우디아가 마법으로 막고 있기 때문이다."

[[dialogue]]
speaker = "unk"
original = "俺はすでに限界──でも、よく見てみると……"
translation = "나는 이미 한계── 하지만, 자세히 살펴보니……"

[[dialogue]]
speaker = "クラウディア"
original = "「んんんっ<emoji=heart04>\u3000あっ、はあ、んんっ、んぅ、んっ<emoji=heart04>\u3000す、ごいっ……お前のち○ぽっ……いつも以上に、熱くて、硬いっ……ああぁあっ<emoji=heart04>」"
translation = "「응응응<emoji=heart04> 앗, 하아, 응읏, 응, 응<emoji=heart04> 대, 대단하구나…… 네 자지…… 평소보다 더 뜨겁고 딱딱하구나…… 아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺のペニスの熱と硬さは、普段からは考えられないほどのモノになっている。それをシゴき続けるクラウディアも、余裕をなくし始めている──？"
translation = "내 페니스의 열기와 강도는 평소라면 생각할 수 없는 수준이 되어 있다. 그것을 계속해서 비벼대는 클라우디아도 여유를 잃기 시작한 건가──?"

[[dialogue]]
speaker = "クラウディア"
original = "「な、なんだ、その目はっ……<emoji=heart04>\u3000今宵の余は、攻める側だぞっ<emoji=heart04>\u3000ん、んぅ、ふぅ、んんっ<emoji=heart04>」"
translation = "「뭐, 뭐냐 그 눈은……<emoji=heart04> 오늘 밤의 여는 공격하는 쪽이란 말이다<emoji=heart04> 응, 응으, 후우, 응읏<emoji=heart04>」"

[[dialogue]]
speaker = "クラウディア"
original = "「お前の雑魚ち○ぽに当てられて、余まで感じておるなどとっ……んんぅっ<emoji=heart04>\u3000は、あぁ、あぁっ<emoji=heart04>\u3000んぉ、んんう、んっ<emoji=heart04>」"
translation = "「네 잡코 자지에 당해서 여까지 느끼고 있다니…… 응응읏<emoji=heart04> 하, 아아, 아아앗<emoji=heart04> 응오, 응으, 응<emoji=heart04>」"

[[dialogue]]
speaker = "クラウディア"
original = "「生意気を言う口は、こうだっ……舌を、出せっ<emoji=heart04>」"
translation = "「건방진 말을 하는 입은 이렇게 해주마…… 혀를 내밀거라<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "騎乗位でのピストンを続けながら、クラウディアが俺に覆いかぶさってきて──"
translation = "기승위 피스톤을 계속하며 클라우디아가 나를 덮쳐오듯 몸을 숙여──"

[[dialogue]]
speaker = "クラウディア"
original = "「んぅちゅるっ<emoji=heart04>\u3000ちゅるじゅるっ<emoji=heart04>\u3000んれぇ、れる、んれろっ<emoji=heart04>\u3000れりゅれりゅ、んちゅるっ、ちゅる、ちゅるちゅぱっ<emoji=heart04>」"
translation = "「응으츄릅<emoji=heart04> 츄르쥬릅<emoji=heart04> 응레에, 레루, 응레로<emoji=heart04> 레류레류, 응츄릅, 츄릅, 츄릅츄파<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "深くまで舌を挿し入れるディープキス──甘い味が口内に広がって、ペニスがさらにうずく。"
translation = "깊숙이 혀를 집어넣는 딥 키스── 달콤한 맛이 입안에 퍼지며 페니스가 더욱 욱신거린다."

[[dialogue]]
speaker = "クラウディア"
original = "「んぅちゅるっ<emoji=heart04>\u3000んんぅむぅっ──ちゅぱっ<emoji=heart04>\u3000また硬く、んぅ──ぉっ<emoji=heart04>\u3000しおってぇっ……ちゅるちゅ、んちゅるれる<emoji=heart04>」"
translation = "「응으츄릅<emoji=heart04> 응응으무웃──츄파<emoji=heart04> 또 딱딱해져서는, 응으──옷<emoji=heart04> 츄르츄, 응츄르레루<emoji=heart04>」"

[[dialogue]]
speaker = "クラウディア"
original = "「ぢゅるちゅるっ<emoji=heart04>\u3000んれぇ、れりゅっ、ちゅぱっ、んちゅぅっ……れぅ、れぅれぅ、れぅっ……ちゅぱっ<emoji=heart04>」"
translation = "「쥬르츄르<emoji=heart04> 응레에, 레류, 츄파, 응츄우…… 레우, 레우레우, 레우…… 츄파<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "魔法による快楽増幅は、クラウディアの方にも伝播していっているのかもしれない。"
translation = "마법에 의한 쾌락 증폭은 클라우디아 쪽으로도 전파되고 있는 것일지도 모른다."

[[dialogue]]
speaker = "unk"
original = "夢中で舌を絡めるにつれて、クラウディアの喘ぎに余裕がなくなり始めていた。"
translation = "정신없이 혀를 섞을수록 클라우디아의 신음에서 여유가 사라지기 시작했다."

[[dialogue]]
speaker = "クラウディア"
original = "「んぅちゅるる、れぇ、んちゅるっ……ちゅぱっ<emoji=heart04>\u3000はぁ、はぁっ、はっ、はぁあっ、はぁああっ……<emoji=heart04>」"
translation = "「응으츄르르, 레에, 응츄릅…… 츄파<emoji=heart04> 하아, 하앗, 핫, 하아앗, 하아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "クラウディア"
original = "「くぅうっ……今日は、余がずうっと攻めるつもり、だったのにっ……ちゅぅ、ちゅるっ、んぅちゅるっ……<emoji=heart04>\u3000ぷぁあ！」"
translation = "「쿠우우…… 오늘은 여가 계속 공격할 생각이었는데…… 츄우, 츄릅, 응으츄릅……<emoji=heart04> 푸하아!」"

[[dialogue]]
speaker = "unk"
original = "糸を引くほどに激しいキスの後、クラウディアは身体を起こし──しぶきが飛ぶほどの激しいピストンを始めた。"
translation = "실을 끌 정도로 격렬한 키스 후, 클라우디아는 몸을 일으켜── 물보라가 튈 정도의 격렬한 피스톤을 시작했다."

[[dialogue]]
speaker = "クラウディア"
original = "「んんんうっ<emoji=heart04>\u3000ふぅっ<emoji=heart04>\u3000んぁっ<emoji=heart04>\u3000あっあっ、ああぁあっ！<emoji=heart04>」"
translation = "「응응응우<emoji=heart04> 후우<emoji=heart04> 응아<emoji=heart04> 앗앗, 아아아앗!<emoji=heart04>」"

[[dialogue]]
speaker = "クラウディア"
original = "「魔法を強く、かけ、すぎたっ……お前のち○ぽに当てられて、余にまで影響が──ん、んぉ、おっ<emoji=heart04>\u3000おぉ、ぉっ<emoji=heart04>」"
translation = "「마법을 너무 강하게 걸었느니라…… 네 자지에 당해서 여에게까지 영향이── 응, 응오, 오<emoji=heart04> 오오, 오<emoji=heart04>」"

[[dialogue]]
speaker = "クラウディア"
original = "「ふぅ、ふぅうっ<emoji=heart04>\u3000んんぅ、ぉ、ぉ、ぉっ<emoji=heart04>\u3000く、くそぉっ……これではいつもと、同じでは、ないかぁっ<emoji=heart04>」"
translation = "「후우, 후우우<emoji=heart04> 응응으, 오, 오, 오<emoji=heart04> 제, 젠장…… 이래서는 평소와 똑같지 않느냐<emoji=heart04>」"

[[dialogue]]
speaker = "クラウディア"
original = "「あ、ぁ、あぁぁ、あっ<emoji=heart04>\u3000おま○この、ここに、ち○ぽ当てるの、気持ちいいっ……んん、んぅ、んぁ、あ、あぁああっ<emoji=heart04>」"
translation = "「아, 아, 아아아, 앗<emoji=heart04> 보지의 여기에 자지 닿는 거 기분 좋느니라…… 응응, 응으, 응아, 아, 아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "クラウディア"
original = "「お、ぉ、おぉ、ぉおっ<emoji=heart04>\u3000ち○ぽが、ち○ぽがっ、イイっ……お前の、ち○ぽっ……奥まで──ん、んぉっ<emoji=heart04>」"
translation = "「오, 오, 오오, 오오<emoji=heart04> 자지가, 자지가 좋아…… 네 자지…… 안쪽까지── 응, 응오앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "夜光にクラウディアの汗がきらめく。繋がった性器は火傷しそうなほどに熱く、魔法の影響でお互い、しとどに愛液を溢れさせていて。"
translation = "밤빛에 클라우디아의 땀방울이 반짝인다. 연결된 성기는 데일 정도로 뜨겁고, 마법의 영향으로 서로 흠뻑 애액을 흘리고 있었다."

[[dialogue]]
speaker = "クラウディア"
original = "「お、お前もっ<emoji=heart04>\u3000限界なのかっ？<emoji=heart04>\u3000んん、んぅっ<emoji=heart04>\u3000ふう、ふふふぅっ……そう、かっ……なら、魔法の縛を、解くっ……<emoji=heart04>」"
translation = "「너, 너도<emoji=heart04> 한계인 것이냐?<emoji=heart04> 응응, 응으<emoji=heart04> 후우, 후후후우…… 그런가…… 그렇다면 마법의 구속을 풀겠느니라……<emoji=heart04>」"

[[dialogue]]
speaker = "クラウディア"
original = "「余もっ──イ、イクっ<emoji=heart04>\u3000い、いいかっ、一緒だぞっ、一緒にイクのだぞっ……！<emoji=heart04>」"
translation = "「여도── 가, 가느니라<emoji=heart04> 아, 알겠느냐, 함께다, 함께 가는 것이니라……!<emoji=heart04>」"

[[dialogue]]
speaker = "クラウディア"
original = "「あ──ち、違う、余より、ちょっとだけ先にイケっ<emoji=heart04>\u3000今日の雑魚はお前なのだからっ……ん、んんぅ、んんんっ！<emoji=heart04>」"
translation = "「아── 아니, 여보다 조금만 먼저 가거라<emoji=heart04> 오늘의 잡코는 너니까 말이다…… 응, 응응으, 응응응!<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ようやく自由になったので俺も腰を突き上げながら──"
translation = "드디어 자유로워졌기에 나도 허리를 쳐올리며──"

[[dialogue]]
speaker = "クロト"
original = "「好きだ、クラウディア……！」"
translation = "「사랑해, 클라우디아……!」"

[[dialogue]]
speaker = "クラウディア"
original = "「なぁッ──！？\u3000そ、それは反則ではないかっ！？<emoji=heart04>\u3000ぁ、ぁ、ぁ、ぁ、ぁッ──イ、イク<emoji=heart04>\u3000イクイクイクッ<emoji=heart04>\u3000あ、ぁぁぁぁ──！<emoji=heart04>」"
translation = "「나앗──!? 그, 그것은 반칙이 아니냐!?<emoji=heart04> 아, 아, 아, 아, 아앗── 가, 가느니라<emoji=heart04> 가버려 가버려 가버려어<emoji=heart04> 아, 아아아아──!<emoji=heart04>」"

[[dialogue]]
speaker = "クラウディア"
original = "「イっ……クぅぅぅううぅぅぅううううぅぅぅぅ～～～～～～～……っ！！」"
translation = "「가아아아아아아아아아아아아아아아아아아아아아아아아아아아아아아아아악──!!」"

[[dialogue]]
speaker = "クラウディア"
original = "「んんぁぁぁああっ<emoji=heart04>\u3000あああっ<emoji=heart04>\u3000出てるっ、まおーの精液っ、あ、ぁぁ、ぁぁあぁあ～っ……！<emoji=heart04>」"
translation = "「응응아아아앗<emoji=heart04> 아아앗<emoji=heart04> 나오고 있느니라, 마왕의 정액이, 아, 아아, 아아아아아~……!<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "クラウディアの絶頂が先。その際の締まりで俺も限界を超えて、白濁を撃ち放った。"
translation = "클라우디아의 절정이 먼저. 그때의 조임 때문에 나도 한계를 넘어 백탁액을 쏘아냈다."

[[dialogue]]
speaker = "クラウディア"
original = "「んん、んんぁあっ！？<emoji=heart04>\u3000お前っ、だ、出しすぎだっ……んぅっ！？<emoji=heart04>\u3000勢いが、んん、んんぅう～っ……！<emoji=heart04>」"
translation = "「응응, 응응아앗!?<emoji=heart04> 너, 너, 너무 많이 내보내느니라…… 응으!?<emoji=heart04> 기세가, 응응, 응응우우~……!<emoji=heart04>」"

[[dialogue]]
speaker = "クラウディア"
original = "「あ、ぁ、ぁ──気持ちよすぎ、るっ……と、止めんかっ、気持ちよすぎるのだ、止めんかぁっ！<emoji=heart04>\u3000あぁぁああ～っ……！<emoji=heart04>」"
translation = "「아, 아, 아── 너무 기분 좋느니라…… 거, 멈추지 못할까, 너무 기분 좋단 말이다, 멈추거라아!<emoji=heart04> 아아아아아~……!<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "子宮口にびゅうびゅうと精液を撃ちこむたび、クラウディアはがくがくと膝まで振るわせてイキまくっている。"
translation = "자궁구에 뷰뷰하고 정액을 쏘아 넣을 때마다 클라우디아는 가쿠가쿠하고 무릎까지 떨며 계속해서 가버리고 있다."

[[dialogue]]
speaker = "unk"
original = "今まで散々堰き止められていた精液の発射は、それから十数秒も続いて……"
translation = "지금까지 계속 억눌려 있던 정액의 발사는 그로부터 십수 초 동안이나 이어졌고……"

[[dialogue]]
speaker = "クラウディア"
original = "「ふうぅあ、ああっ……ぁあぁあーっ……<emoji=heart04>\u3000はああーっ……はぁああーっ……<emoji=heart04>」"
translation = "「후우우아, 아앗…… 아아아아──……<emoji=heart04> 하아아──…… 하아아아──……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "注ぎこんだ精液に押し出されるようにしてペニスがこぼれ出た。"
translation = "쏟아부은 정액에 밀려 나오듯 페니스가 빠져나왔다."

[[dialogue]]
speaker = "クラウディア"
original = "「はぁぁぁっ……はーっ……ふぅー……腹が、熱い……魔女でなくば、絶対に孕んでいたぞ……？」"
translation = "「하아아아…… 하아…… 후우…… 배가 뜨겁구나…… 마녀가 아니었다면 분명 임신했을 것이니라……?」"

[[dialogue]]
speaker = "クラウディア"
original = "「へその下を押さえたら、精液がびゅうっと、出てきそうではないかぁ……うぅっ……んんっ……<emoji=heart04>」"
translation = "「배꼽 아래를 누르면 정액이 뷰 하고 나올 것 같지 않느냐…… 으으…… 응응……<emoji=heart04>」"

[[dialogue]]
speaker = "クラウディア"
original = "「ぅう……悔しい……今日こそお前を無様にイカせるつもりだったのに……結局最後は、余のおま○こが先に音を上げるとは……」"
translation = "「으으…… 분하구나…… 오늘이야말로 너를 꼴사납게 가게 만들 생각이었는데…… 결국 마지막엔 여의 보지가 먼저 항복하다니……」"

[[dialogue]]
speaker = "クラウディア"
original = "「というかお前、卑怯ではないかぁ……イク時に好きだなどと抜かしおって……」"
translation = "「그보다 너, 비겁하지 않느냐…… 갈 때 사랑한다느니 지껄이고……」"

[[dialogue]]
speaker = "クロト"
original = "「だって本当のことだし。クラウディアのこと、大好きだから」"
translation = "「그치만 사실인걸. 클라우디아를 정말 좋아하니까.」"

[[dialogue]]
speaker = "クラウディア"
original = "「そんなの余だってそうだ！\u3000だが余は言わなかった！\u3000言葉での不意打ちなぞ卑怯！\u3000よって今の勝負は無効だ、無効！」"
translation = "「그런 건 여도 마찬가지니라! 하지만 여는 말하지 않았느니라! 말로 하는 기습 따위 비겁하느니라! 고로 지금 승부는 무효다, 무효!」"

[[dialogue]]
speaker = "unk"
original = "勝ち負けをつける必要があるのかな、と思うのだけど。クラウディアはこうやって張り合い始めると結構しつこい。……もちろんそういうところも可愛くて好きだけど。"
translation = "승패를 가릴 필요가 있을까 싶지만. 클라우디아는 이렇게 경쟁하기 시작하면 꽤 끈질기다. ……물론 그런 점도 귀여워서 좋지만."

[[dialogue]]
speaker = "クラウディア"
original = "「よし、２回戦だ、魔王！\u3000今度は余が好き好き言いまくって、お前を昇天させてくれる！\u3000ゆくぞ～っ……！」"
translation = "「좋아, 2회전이다, 마왕! 이번엔 여가 좋아한다고 계속 말해서 너를 승천시켜 주마! 간다아……!」"

[[dialogue]]
speaker = "unk"
original = "可愛らしいことを言ってくれるお姫様に、俺は夜が明けるまで付き合い続けるのだった──"
translation = "귀여운 소리를 해주는 공주님과 나는 밤이 샐 때까지 계속 함께했다──"

