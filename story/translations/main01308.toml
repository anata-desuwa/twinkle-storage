[[dialogue]]
speaker = "unk"
original = "第９話,先代魔王、その追想,B"
translation = "제9화, 선대 마왕, 그 추상, B"

[[dialogue]]
speaker = "unk"
original = "その後も俺たちは湧き続けるガーディアンを倒しながら塔を登っていった……。"
translation = "그 후로도 우리들은 계속 솟아나는 가디언을 쓰러뜨리며 탑을 올라갔다…….」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふぅ……けっこう昇ってきたかしら。みんな疲れてない？」"
translation = "「후우…… 꽤 올라왔으려나. 모두 지치지 않았어?」"

[[dialogue]]
speaker = "マトイ"
original = "「ちょっとは。でもでも、ヴィーナスがいるだけでなんか元気出ちゃうよ」"
translation = "「조금은. 하지만 말이야, 비너스가 있는 것만으로도 왠지 기운이 나.」"

[[dialogue]]
speaker = "ユウリ"
original = "「だな。さらわれて生死不明、なんて状態は正直、精神的にキツかったからな」"
translation = "「그렇지. 납치당해서 생사불명, 같은 상태는 솔직히, 정신적으로 힘들었으니까.」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「みんな心配してくれてありがと！\u3000復帰したからには、バリバリ期待に応えなくっちゃね」"
translation = "「모두 걱정해 줘서 고마워! 복귀했으니, 팍팍 기대에 부응해야지.」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスは力こぶを作りそれを叩いてみせた。"
translation = "비너스는 알통을 만들고 그것을 두드려 보였다."

[[dialogue]]
speaker = "クロト"
original = "「ちなみに──ヴィーナス。いつかみたいに、『声』が聞こえたりはしないか？」"
translation = "「참고로── 비너스. 언젠가처럼, 『목소리』가 들리거나 하지는 않아?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「んー……何も聞こえないわね。入った時から」"
translation = "「음ー…… 아무것도 안 들리네. 들어왔을 때부터.」"

[[dialogue]]
speaker = "クロト"
original = "「じゃあ、あれは最初だけだったのかな」"
translation = "「그럼, 저건 처음뿐이었던 걸까.」"

[[dialogue]]
speaker = "unk"
original = "俺たちがフィーニスの塔に入った１回目と２回目の時──"
translation = "우리들이 피니스의 탑에 들어갔던 1회째와 2회째 때──"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスは謎の『声』に導かれて上層へと昇り、その先で俺たちは壁画やリクリエについてなど、数多の真実を知った。"
translation = "비너스는 의문의 『목소리』에 이끌려 상층으로 올라갔고, 그곳에서 우리들은 벽화나 리크리에 등에 대해, 수많은 진실을 알았다."

[[dialogue]]
speaker = "unk"
original = "だから今回も、なにか新たな知識が授けられることも……と思っていたのだが。"
translation = "그래서 이번에도, 뭔가 새로운 지식이 전해질 수도……라고 생각했었는데."

[[dialogue]]
speaker = "ヴィーナス"
original = "「もう伝えたいこともないんじゃない？\u3000リクリエについてはもう大体わかってるし」"
translation = "「더 이상 전하고 싶은 것도 없지 않아? 리크리에에 대해서는 이제 거의 다 알고 있고.」"

[[dialogue]]
speaker = "フィオナ"
original = "「異なる暦に、平行世界……既に相当な深みにまで踏み入ったのは間違いありませんね」"
translation = "「다른 역법에, 평행 세계…… 이미 상당한 깊이까지 발을 들여놓은 것은 틀림없습니다.」"

[[dialogue]]
speaker = "クロト"
original = "「……それもそうか」"
translation = "「……그것도 그렇군.」"

[[dialogue]]
speaker = "クロト"
original = "（ヴィーナスを呼んでいた『声』……あれは、学園長の記憶で聴いた<b>彼女</b>のそれと同じだった）"
translation = "（비너스를 부르던 『목소리』…… 저것은, 학원장의 기억에서 들었던 <b>그녀</b>의 그것과 같았다）"

[[dialogue]]
speaker = "クロト"
original = "（そして、マグダレナさんはヴィーナスのことを『御子』と呼んでいた。もし、だとするなら……）"
translation = "（그리고, 막달레나 씨는 비너스를 『미코』라고 불렀다. 만약, 그렇다고 한다면……）"

[[dialogue]]
speaker = "unk"
original = "想像が膨らんでいく。"
translation = "상상이 부풀어 오른다."

[[dialogue]]
speaker = "unk"
original = "けれど……今はここに心を砕いている場合ではないかもしれない。"
translation = "하지만…… 지금은 여기에 마음을 쏟을 때가 아닐지도 모른다."

[[dialogue]]
speaker = "ユウリ"
original = "「これ以上詰め込まれたら、頭がパンクしちまうよ。とりあえず人間界まで帰ろうぜ」"
translation = "「이 이상 채워 넣으면, 머리가 터져버릴 거야. 일단 인간계까지 돌아가자고.」"

[[dialogue]]
speaker = "クロト"
original = "「だな。今は考えることよりも、人間界に到着することを優先しよう」"
translation = "「그렇지. 지금은 생각하는 것보다도, 인간계에 도착하는 것을 우선하자.」"

[[dialogue]]
speaker = "サーシャ"
original = "「全速前進よ～♪」"
translation = "「전속 전진이야~♪」"

[[dialogue]]
speaker = "unk"
original = "と、全員で突き進んでいると……"
translation = "라고, 전원이 돌진하고 있는데……"

[[dialogue]]
speaker = "クロト"
original = "「──っ……？」"
translation = "「──윽……?」"

[[dialogue]]
speaker = "unk"
original = "一瞬──なにかの幻影が頭をよぎった。"
translation = "한순간── 무언가의 환영이 머리를 스쳤다."

[[dialogue]]
speaker = "クロト"
original = "（なんだ……気のせい……か？）"
translation = "（뭐지…… 기분 탓……인가?）"

[[dialogue]]
speaker = "unk"
original = "思わず立ち止まる。"
translation = "무심코 멈춰 선다."

[[dialogue]]
speaker = "unk"
original = "周囲に変わった様子はなく、みんなが前進していく背中をじっと見つめていた。"
translation = "주위에 달라진 모습은 없었고, 모두가 전진해 가는 뒷모습을 가만히 바라보고 있었다."

[[dialogue]]
speaker = "サーシャ"
original = "「会長くんー？\u3000疲れちゃったー？」"
translation = "「회장 군ー? 지쳤어ー?」"

[[dialogue]]
speaker = "クロト"
original = "「いえ──大丈夫です。すぐ行きます！」"
translation = "「아뇨── 괜찮습니다. 바로 갈게요!」"

[[dialogue]]
speaker = "unk"
original = "それからも着々と塔を昇っていく俺たち。"
translation = "그 후로도 착실하게 탑을 올라가는 우리들."

[[dialogue]]
speaker = "unk"
original = "その過程で俺は、先の幻影が錯覚でなかったことを知る。"
translation = "그 과정에서 나는, 앞서의 환영이 착각이 아니었음을 알게 된다."

[[dialogue]]
speaker = "unk"
original = "今から約三千年前──"
translation = "지금으로부터 약 3천 년 전──"

[[dialogue]]
speaker = "unk"
original = "森羅暦──現在では<b>旧</b>森羅暦──の世界は、存亡の危機を迎えていた。"
translation = "신라력── 현재는 <b>구</b>신라력──의 세계는, 존망의 위기를 맞이하고 있었다."

[[dialogue]]
speaker = "unk"
original = "いや……本来であれば、滅亡しかありえないはずだった。"
translation = "아니…… 본래라면, 멸망밖에 있을 수 없었을 것이다."

[[dialogue]]
speaker = "unk"
original = "これまでにも幾度となく繰り返されてきた<ruby>再創生<rt>リクリエ</rt></ruby>の時期が、すぐそこにも迫っていたからである。"
translation = "지금까지도 몇 번이고 반복되어 온 재창생의 시기가, 바로 코앞까지 다가와 있었기 때문이다."

[[dialogue]]
speaker = "unk"
original = "しかし今代の人類は違った。"
translation = "그러나 이번 세대의 인류는 달랐다."

[[dialogue]]
speaker = "unk"
original = "この宇宙の摂理を乗り切るべく、クルセイダースと呼ばれる戦士たちが<ruby>鬨<rt>かちどき</rt></ruby>を上げた。"
translation = "이 우주의 섭리를 극복하기 위해, 크루세이더스라고 불리는 전사들이 승전고를 울렸다."

[[dialogue]]
speaker = "unk"
original = "そして彼らを、三種族すべての戦士を率いる一人の男がいた。"
translation = "그리고 그들을, 삼종족 모든 전사들을 이끄는 한 남자가 있었다."

[[dialogue]]
speaker = "unk"
original = "男は大賢者と呼ばれる使い魔を従え、厄災の最前線へ立ち向かった。"
translation = "남자는 대현자라고 불리는 사역마를 거느리고, 재앙의 최전선으로 맞섰다."

[[dialogue]]
speaker = "unk"
original = "魔王ラクシス──"
translation = "마왕 락시스──"

[[dialogue]]
speaker = "unk"
original = "後に人類史上初めて、<ruby>再創生<rt>リクリエ</rt></ruby>を退けた影なる英雄である。"
translation = "후에 인류 역사상 최초로, 재창생을 물리친 그림자 영웅이다."

[[dialogue]]
speaker = "クロト"
original = "「──っ！？」"
translation = "「──윽!?」"

[[dialogue]]
speaker = "unk"
original = "──再び意識が浮上する。"
translation = "──다시 의식이 떠오른다."

[[dialogue]]
speaker = "unk"
original = "今度こそ間違いない。今のは、ただの幻覚などではなかった。"
translation = "이번에야말로 틀림없다. 방금 것은, 단순한 환각 따위가 아니었다."

[[dialogue]]
speaker = "クロト"
original = "「い……今のは？」"
translation = "「이…… 방금 건?」"

[[dialogue]]
speaker = "マトイ"
original = "「？\u3000何が？」"
translation = "「? 뭐가?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「どうしたのよ、クロト。鱧が金平糖食べたみたいな顔して」"
translation = "「왜 그래, 쿠로토. 갯장어가 킨페이토 먹은 것 같은 얼굴을 하고서.」"

[[dialogue]]
speaker = "ソフィア"
original = "「鳩が豆鉄砲です」"
translation = "「비둘기가 콩알탄 맞은 것 같아요.」"

[[dialogue]]
speaker = "ユウリ"
original = "「わざと言ってんだろ、もはや」"
translation = "「일부러 그러는 거지, 이제 와서는.」"

[[dialogue]]
speaker = "クロト"
original = "（みんなには……見えていなかったのか？\u3000ヴィーナスにさえ──）"
translation = "（모두에게는…… 보이지 않았던 건가? 비너스에게조차──）"

[[dialogue]]
speaker = "unk"
original = "今、脳裏によぎった『彼』の姿は──俺にしか見えていないようだった。"
translation = "지금, 뇌리를 스친 『그』의 모습은── 나에게만 보이고 있는 듯했다."

[[dialogue]]
speaker = "フィオナ"
original = "「緋宮会長……？\u3000調子がすぐれませんか？」"
translation = "「히노미야 회장……? 컨디션이 좋지 않으신가요?」"

[[dialogue]]
speaker = "サーシャ"
original = "「仕方ないわよ～。あれだけの激戦を制した後に、この強行軍だもの」"
translation = "「어쩔 수 없지~. 그 정도의 격전을 제압한 후에, 이 강행군이니까.」"

[[dialogue]]
speaker = "ソフィア"
original = "「確かにです。強力な力なわけですから、魔王覚醒の反動だってありそうですし……」"
translation = "「확실히 그래요. 강력한 힘이니까, 마왕 각성의 반동도 있을 것 같고……」"

[[dialogue]]
speaker = "クロト"
original = "「……いや。大丈夫だ。進もう」"
translation = "「……아니. 괜찮다. 나아가자.」"

[[dialogue]]
speaker = "unk"
original = "気を取り直すも、俺の意識は先の回想に引っ張られていた。"
translation = "정신을 차리려 했지만, 나의 의식은 앞선 회상에 이끌리고 있었다."

[[dialogue]]
speaker = "クロト"
original = "（間違いない。あれは──月の壁画に描かれていた……先代の魔王）"
translation = "（틀림없다. 저것은── 달의 벽화에 그려져 있던…… 선대의 마왕）"

[[dialogue]]
speaker = "unk"
original = "かつてリクリエを撃退した人物。"
translation = "이전에 리크리에를 격퇴했던 인물."

[[dialogue]]
speaker = "unk"
original = "いつかニャリオンが仕えたと語る人物。"
translation = "언젠가 냐리온이 모셨다고 말했던 인물."

[[dialogue]]
speaker = "unk"
original = "そしてヴィーナスが、俺にそっくりだと主張し続けてきた人物──ラクシス。"
translation = "그리고 비너스가, 나와 똑 닮았다고 계속 주장해 온 인물── 라크시스."

[[dialogue]]
speaker = "クロト"
original = "（気になる。もっと進めば──あれ以上のことも見えてくるのだろうか）"
translation = "（신경 쓰인다. 더 나아가면── 저것 이상의 것도 보이게 되는 걸까）"

[[dialogue]]
speaker = "unk"
original = "これまでも、世界の裏側を教えてくれたフィーニスの塔。"
translation = "지금까지도, 세계의 이면을 알려주었던 피니스의 탑."

[[dialogue]]
speaker = "unk"
original = "第零層──ここはもしかしたら、すべての始点になりうる場所なのかもしれない。"
translation = "제영층── 이곳은 어쩌면, 모든 것의 시발점이 될 수 있는 장소일지도 모른다."

