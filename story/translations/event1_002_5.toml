[[dialogue]]
speaker = "unk"
original = "合宿は５日目。"
translation = "합숙 5일째."

[[dialogue]]
speaker = "unk"
original = "今日は午前中から、水着フォームを使いこなす為の訓練を続けていた。"
translation = "오늘은 오전부터 수영복 폼을 능숙하게 다루기 위한 훈련을 계속하고 있었다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「よし、今日は水着フォームの機動力アップの訓練も兼ねて、遠泳をやるわよ！」"
translation = "「좋아, 오늘은 수영복 폼의 기동력 향상 훈련도 겸해서 장거리 수영을 하겠어!」"

[[dialogue]]
speaker = "マトイ"
original = "「遠泳って言ったって、どこまで泳ぐ気なの？\u3000そもそもリゾート結界って、どれくらいの広さなのか分からないし……」"
translation = "「장거리 수영이라니 어디까지 헤엄칠 생각이야? 애초에 리조트 결계가 어느 정도 넓이인지도 모르겠고……」"

[[dialogue]]
speaker = "サーシャ"
original = "「ふふっ、実はこの結界の端っこまで行くと、島の反対側にループするようになっているのよ～」"
translation = "「후훗, 사실 이 결계의 끝까지 가면 섬 반대편으로 루프하게 되어 있단다~」"

[[dialogue]]
speaker = "マトイ"
original = "「まさかのゲームのワールドマップみたいな！？\u3000というか、サーシャさん調べたんですか！？」"
translation = "「설마 했던 게임 월드맵 같은!? 그보다 사샤 씨, 조사해본 거예요!?」"

[[dialogue]]
speaker = "サーシャ"
original = "「だって端っこがどうなってるかとか、気になるじゃない？\u3000ちなみに空は限界高度まで行くと、強制的に押し戻される感じね～」"
translation = "「그야 끝부분이 어떻게 되어 있는지 궁금하잖아? 참고로 하늘은 한계 고도까지 가면 강제로 밀려 내려오는 느낌이네~」"

[[dialogue]]
speaker = "アナ"
original = "「なるほど。ということは前会長、遠泳は結界の端っこまで行ってループし、島の反対側まで泳いで戻るといった感じでしょうか？」"
translation = "「과연. 그렇다면 전 회장님, 장거리 수영은 결계 끝까지 가서 루프한 뒤 섬 반대편까지 헤엄쳐 돌아오는 식일까요?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そういうことよ！\u3000じゃあ、早速全員でスタート……って、あら？」"
translation = "「바로 그거야! 그럼 당장 전원 스타트…… 어라?」"

[[dialogue]]
speaker = "アナ"
original = "「どうしました？」"
translation = "「왜 그러시죠?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そういえばさっきから、フィオナの姿が見当たらないような……」"
translation = "「그러고 보니 아까부터 피오나의 모습이 안 보이는 것 같은데……」"

[[dialogue]]
speaker = "マトイ"
original = "「ちょっと前に、１人で海の家の方へ向かっていったような……？」"
translation = "「조금 전에 혼자 바다의 집 쪽으로 향했던 것 같은데……?」"

[[dialogue]]
speaker = "unk"
original = "俺、ちょっと様子を見て来るよ"
translation = "나, 잠깐 상태 좀 보고 올게"

[[dialogue]]
speaker = "リップル"
original = "「ふんふん、ふふ～ん♪\u3000……うん、今日も凄く調子がイイで～す♪\u3000海の家の外装も素敵にナッテきました～」"
translation = "「흠흠, 흐흐~음♪ ……응, 오늘도 정말 컨디션 좋슴다~♪ 바다의 집 외장도 멋지게 되어가네여~」"

[[dialogue]]
speaker = "フィオナ"
original = "「リップルさん、結界作りご苦労様です」"
translation = "「리플 씨, 결계 만드시느라 수고가 많으세요」"

[[dialogue]]
speaker = "リップル"
original = "「あれ？\u3000フィオナ、１人でドウしました？\u3000今日は皆、水着フォームの訓練するって言ってマセンでしたか？」"
translation = "「어라? 피오나, 혼자서 무슨 일임까? 오늘은 다들 수영복 폼 훈련한다고 하지 않았나여?」"

[[dialogue]]
speaker = "フィオナ"
original = "「ええ。ただ、今日はちょっと気分的に、リップルさんの仕事のお手伝いが出来たらなと思いまして」"
translation = "「네. 다만 오늘은 좀 기분상 리플 씨의 일을 도와드리면 어떨까 싶어서요」"

[[dialogue]]
speaker = "リップル"
original = "「アハハ、仕事なんてオオゲサで～す！\u3000ワタシの結界作りはスキでやってることデスから。仕事というより、趣味デスね！」"
translation = "「아하하, 일이라니 거창함다! 와타시의 결계 만들기는 좋아서 하는 거니까여. 일이라기보다 취미임다!」"

[[dialogue]]
speaker = "フィオナ"
original = "「趣味……」"
translation = "「취미……」"

[[dialogue]]
speaker = "リップル"
original = "「それにワタシのせいで皆を巻き込んじゃったワケですし、今は順調なので、手伝いとか気にしなくてもダイジョウブです！」"
translation = "「게다가 와타시 때문에 모두를 휘말리게 한 거니까여, 지금은 순조로우니 도움 같은 건 신경 안 써도 괜찮슴다!」"

[[dialogue]]
speaker = "リップル"
original = "「せっかくの夏なのデスから、皆と思う存分、海を楽しんでクダさい！」"
translation = "「기껏해야 여름이니까여, 모두와 마음껏 바다를 즐겨주세여!」"

[[dialogue]]
speaker = "フィオナ"
original = "「……そうですか。分かりました」"
translation = "「……그렇군요. 알겠습니다」"

[[dialogue]]
speaker = "リップル"
original = "「じゃあワタシは、温泉の方も作り直して来ま～す！\u3000後で入るのを楽しみにしててクダさい♪」"
translation = "「그럼 와타시는 온천 쪽도 다시 만들고 오게씀다! 나중에 들어가는 걸 기대해주세여♪」"

[[dialogue]]
speaker = "フィオナ"
original = "「はぁ……」"
translation = "「하아……」"

[[dialogue]]
speaker = "unk"
original = "フィオナ、何か悩み事？"
translation = "피오나, 무슨 고민 있어?"

[[dialogue]]
speaker = "フィオナ"
original = "「あ……！\u3000緋宮会長……？」"
translation = "「아……! 히노미야 회장님……?」"

[[dialogue]]
speaker = "フィオナ"
original = "「――私の様子を見に？\u3000すみません、気を遣わせてしまって……」"
translation = "「――제 상태를 보러? 죄송해요, 신경 쓰이게 해버려서……」"

[[dialogue]]
speaker = "フィオナ"
original = "「悩みなら相談に乗る？\u3000その……悩みと言っても、リップルさんの壮大な野望に比べれば、とても些細なものなのですが――」"
translation = "「고민이라면 상담해준다고요? 그…… 고민이라고 해도 리플 씨의 장대한 야망에 비하면 아주 사소한 것입니다만――」"

[[dialogue]]
speaker = "unk"
original = "フィオナと海に戻ると、皆が離れたところで泳いでいるのが見えた。"
translation = "피오나와 바다로 돌아오니 모두가 떨어진 곳에서 헤엄치고 있는 것이 보였다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「あはは！\u3000皆、私に付いて来なさい！」"
translation = "「아하하! 다들 나를 따라와!」"

[[dialogue]]
speaker = "マトイ"
original = "「ちょっ、ヴィーナス泳ぐの速過ぎ！\u3000というか、バタフライで軽く宙に浮いてない！？」"
translation = "「잠깐, 비너스 수영 너무 빨라! 그보다 접영으로 가볍게 공중에 떠 있지 않아!?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「私は海でも自由に飛んでみせるわ！」"
translation = "「난 바다에서도 자유롭게 날아 보이겠어!」"

[[dialogue]]
speaker = "サーシャ"
original = "「あ～ん♪\u3000マトイちゃん助けて～！\u3000タコと遊んでたら、触手が絡みついちゃったの～」"
translation = "「아앙♪ 마토이짱 도와줘~! 문어랑 놀고 있었더니 촉수가 엉겨 붙어버렸어~」"

[[dialogue]]
speaker = "マトイ"
original = "「何かエッチなことになってる！？\u3000ああもう、サーシャさんがタコに触ったりしたら、そうなるに決まってるじゃないですか！」"
translation = "「뭔가 야한 상황이 되어 있잖아!? 아 정말, 사샤 씨가 문어를 만지거나 하니까 그렇게 되는 게 당연하잖아요!」"

[[dialogue]]
speaker = "サーシャ"
original = "「酷いわ～」"
translation = "「너무해~」"

[[dialogue]]
speaker = "アナ"
original = "「取ったど～」"
translation = "「잡았다 요놈~」"

[[dialogue]]
speaker = "マトイ"
original = "「アナに至っては魚取ってるし！」"
translation = "「아나는 심지어 물고기를 잡고 있고!」"

[[dialogue]]
speaker = "フィオナ"
original = "「皆さん、楽しそうに訓練をしてらっしゃいますね」"
translation = "「여러분, 즐겁게 훈련을 하고 계시네요」"

[[dialogue]]
speaker = "unk"
original = "半分水遊びみたいな感じだけどね"
translation = "절반은 물놀이 같은 느낌이지만 말이야"

[[dialogue]]
speaker = "フィオナ"
original = "「私も、皆さんのように楽しめたらと思うのですが……」"
translation = "「저도 여러분처럼 즐길 수 있다면 좋겠다고 생각합니다만……」"

[[dialogue]]
speaker = "フィオナ"
original = "「私はいざ遊ぼうと考えると、何をどうするのが正しいのか、よく分からなくて……」"
translation = "「저는 막상 놀려고 생각하면 무엇을 어떻게 하는 게 정답인지 잘 모르겠어서……」"

[[dialogue]]
speaker = "フィオナ"
original = "「緋宮会長は、私が今回の合宿に参加した理由って、ヴィーナスさんから詳しく聞いてますか？」"
translation = "「히노미야 회장님은 제가 이번 합숙에 참가한 이유에 대해 비너스 씨에게 자세히 들으셨나요?」"

[[dialogue]]
speaker = "unk"
original = "いや、特別参加することになったってだけ"
translation = "아니, 특별히 참가하게 됐다는 것만"

[[dialogue]]
speaker = "フィオナ"
original = "「私、実は流星学園の星徒会の皆から、仕事禁止を言い渡されてしまったんです」"
translation = "「저, 사실 유성 학원의 성도회 분들에게 업무 금지령을 받아버렸어요」"

[[dialogue]]
speaker = "フィオナ"
original = "「先日、学園の近くに巨大なアステライトが発生したことはご存知ですよね？」"
translation = "「얼마 전 학원 근처에 거대한 아스테라이트가 발생한 건 알고 계시죠?」"

[[dialogue]]
speaker = "フィオナ"
original = "「――そう、流星学園の星徒会の方で対処させて頂いた案件です。その巨大さ故に、攻略が難航してしまって……」"
translation = "「――네, 유성 학원 성도회 측에서 대처했던 안건입니다. 그 거대함 때문에 공략이 난항을 겪어서……」"

[[dialogue]]
speaker = "フィオナ"
original = "「早急な排除を優先する為、星徒会の皆にモンスターの大軍を抑えてもらっている間に、私が単独でボスモンスターに挑むことになりました」"
translation = "「조속한 배제를 우선하기 위해 성도회 분들이 몬스터 대군을 막아주는 동안 제가 단독으로 보스 몬스터에게 도전하게 되었습니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「苦戦を強いられましたが、全力で戦い、アステラの攻略には何とか成功しました。ですが……」"
translation = "「고전을 면치 못했지만 전력으로 싸워 아스테라 공략에는 어떻게든 성공했습니다. 하지만……」"

[[dialogue]]
speaker = "フィオナ"
original = "「そのせいで、ニャリオンをかなり疲弊させてしまって。回復の為に、しばらく休眠状態に入ることになってしまったんです」"
translation = "「그 때문에 냐리온을 상당히 피폐하게 만들어서, 회복을 위해 당분간 휴면 상태에 들어가게 되었어요」"

[[dialogue]]
speaker = "unk"
original = "合宿中に見かけなかったのはそういう理由か"
translation = "합숙 중에 안 보였던 건 그런 이유였구나"

[[dialogue]]
speaker = "フィオナ"
original = "「はい、今も眠っています。ですので、全力で戦うことは出来ませんから、しばらく戦闘は任せろと皆から言われてしまって……」"
translation = "「네, 지금도 잠들어 있습니다. 그래서 전력으로 싸울 수 없으니 당분간 전투는 맡겨두라고 모두에게 들어버려서……」"

[[dialogue]]
speaker = "フィオナ"
original = "「ならばその代わりに星徒会の事務作業は私がしようと、率先して引き受けていたんですが……」"
translation = "「그렇다면 그 대신 성도회 사무 작업은 제가 하겠다고 솔선수범해서 맡았습니다만……」"

[[dialogue]]
speaker = "フィオナ"
original = "「そうしたら今度は、ちゃんと休めと仕事を取り上げられてしまいまして……」"
translation = "「그랬더니 이번에는 푹 쉬라며 일을 뺏겨버려서……」"

[[dialogue]]
speaker = "フィオナ"
original = "「ニャリオンに相談することもできず困っていたら、セーラさんからこの合宿へ参加するようにと言われたんです」"
translation = "「냐리온에게 상담할 수도 없어 곤란해하고 있었더니, 세라 씨가 이 합숙에 참가하라고 하셨어요」"

[[dialogue]]
speaker = "フィオナ"
original = "「休暇をちゃんと楽しんで来い、と。どこからかこの合宿の話を聞きつけて、ヴィーナスさんに私を参加させて欲しいとお願いしたみたいです」"
translation = "「휴가를 제대로 즐기고 오라고요. 어디선가 이 합숙 이야기를 듣고 비너스 씨에게 저를 참가시켜 달라고 부탁한 모양입니다」"

[[dialogue]]
speaker = "フィオナ"
original = "「ただ、私は休暇と言われても……お恥ずかしい話ですが、どう楽しんだらいいのかも悩んでしまうくらい、遊ぶことに関して疎いというか……」"
translation = "「다만 저는 휴가라고 해도…… 부끄러운 이야기지만 어떻게 즐겨야 할지 고민할 정도로 노는 것에 서툴달까……」"

[[dialogue]]
speaker = "フィオナ"
original = "「何をどうするのが正しい休み方なのか、分からなくて考えてしまうんです……」"
translation = "「무엇을 어떻게 하는 게 올바른 휴식 방법인지 몰라서 생각하게 돼요……」"

[[dialogue]]
speaker = "フィオナ"
original = "「――真面目？\u3000そうですね……悪い意味で真面目なんだと思います。仕事を取られてもなお、何かするべきことを探さないと、落ち着かなくって……」"
translation = "「――성실하다고요? 그렇네요…… 나쁜 의미로 성실한 거라고 생각합니다. 일을 뺏겨도 여전히 뭔가 해야 할 일을 찾지 않으면 진정이 안 돼서……」"

[[dialogue]]
speaker = "unk"
original = "それなら何か、新しいことを始めてみたら？"
translation = "「그러면 뭔가, 새로운 걸 시작해 보는 건 어때?」"

[[dialogue]]
speaker = "フィオナ"
original = "「新しいこと……ですか？」"
translation = "「새로운 것…… 말인가요?」"

[[dialogue]]
speaker = "unk"
original = "休むといっても、考え方は人それぞれ。水遊びも捉え方次第だ。"
translation = "「쉰다고 해도 생각하기 나름이야. 물놀이도 받아들이기에 달렸지.」"

[[dialogue]]
speaker = "unk"
original = "遊びとしてじゃなく人生勉強だと捉えて、これまでして来なかった新しいことを試してみるのはどうかな、とフィオナに提案した。"
translation = "놀이가 아니라 인생 공부라고 생각하고, 지금까지 해보지 않은 새로운 것을 시도해 보는 건 어떨까 하고 피오나에게 제안했다."

[[dialogue]]
speaker = "フィオナ"
original = "「でも、一体何をすれば……」"
translation = "「하지만, 대체 무엇을 하면……」"

[[dialogue]]
speaker = "リップル"
original = "「フィオナ！\u3000でしたら、サーフィンをやってみまセンか！？」"
translation = "「피오나! 그렇다면, 서핑을 해보지 않겠슴까!?」"

[[dialogue]]
speaker = "フィオナ"
original = "「リップルさん？\u3000いつの間に――」"
translation = "「리플 씨? 어느 사이에――」"

[[dialogue]]
speaker = "リップル"
original = "「フィオナの様子が何かヘンだなと感じて、追いかけてキテしまいました！」"
translation = "「피오나의 상태가 뭔가 이상하다고 느껴서, 뒤쫓아와 버렸슴다!」"

[[dialogue]]
speaker = "リップル"
original = "「新しいことをしたいなら、ワタシはサーフィンをオススメです！\u3000サーフィンの趣味ナカマを見つけるのは、ワタシのやりたいことでもアリます！」"
translation = "「새로운 걸 하고 싶다면, 저는 서핑을 추천함다! 서핑 취미 동료를 찾는 건, 제가 하고 싶은 일이기도 함다!」"

[[dialogue]]
speaker = "リップル"
original = "「だから、フィオナさえ嫌じゃなければ、是非ワタシと一緒にサーフィンをやりませんか！？」"
translation = "「그러니 피오나만 싫지 않다면, 부디 저와 함께 서핑을 하지 않겠슴까!?」"

[[dialogue]]
speaker = "unk"
original = "試してみてもいいんじゃないかな？"
translation = "「시도해 봐도 괜찮지 않을까?」"

[[dialogue]]
speaker = "フィオナ"
original = "「サーフィン……でも、それだと訓練関係なく、ただの遊びに……」"
translation = "「서핑…… 하지만, 그러면 훈련과 상관없이 그냥 놀이가……」"

[[dialogue]]
speaker = "リップル"
original = "「時には気分転換も必要、デスよ！\u3000フィオナ！」"
translation = "「때로는 기분 전환도 필요함다! 피오나!」"

[[dialogue]]
speaker = "フィオナ"
original = "「……！\u3000それは緋宮会長が言っていた……」"
translation = "「……! 그건 히노미야 회장님이 말씀하셨던……」"

[[dialogue]]
speaker = "フィオナ"
original = "「――分かりました。リップルさん、お願いしてもいいですか？」"
translation = "「――알겠습니다. 리플 씨, 부탁해도 될까요?」"

[[dialogue]]
speaker = "リップル"
original = "「ハイ♪\u3000新しい趣味、タメしてみましょう！」"
translation = "「하이♪ 새로운 취미, 시도해 보겠슴다!」"

[[dialogue]]
speaker = "unk"
original = "そうして、フィオナはサーフィン体験をしてみることになったのだった。"
translation = "그렇게 해서 피오나는 서핑 체험을 해보게 된 것이었다."

