[[dialogue]]
speaker = "unk"
original = "第７話,聖庭園の刺客,B"
translation = "제7화, 성정원의 자객, B"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「選挙管理委員会に入る者は……いないか」"
translation = "「선거관리위원회에 들어올 자는…… 없는 건가.」"

[[dialogue]]
speaker = "unk"
original = "選挙管理委員会の新たな仲間を探し、カフェテリアの片隅に佇む梨緒。"
translation = "선거관리위원회의 새로운 동료를 찾아 카페테리아 구석에 서 있는 리오."

[[dialogue]]
speaker = "unk"
original = "だが彼女の表情は険しかった。"
translation = "하지만 그녀의 표정은 험악했다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（緋宮クロトは星徒会長として支持されている。全幅の信頼を受けていると言っても過言ではないだろう）"
translation = "(히노미야 쿠로토는 성도회장으로서 지지받고 있다. 전폭적인 신뢰를 받고 있다고 해도 과언이 아니겠지.)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（そんな彼を監視するといっても、誰もやりたがらないに決まっている。これでは善政を敷く王に反逆を呼びかけるようなものだ）"
translation = "(그런 그를 감시한다고 해도 아무도 하고 싶어 하지 않을 게 뻔하다. 이건 선정을 베푸는 왕에게 반역을 호소하는 것이나 다름없어.)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（それとも私が不甲斐ないから誰もついてこないのか？\u3000御前試合で負けたから……私が弱いから……）"
translation = "(아니면 내가 한심해서 아무도 따라오지 않는 건가? 어전시합에서 졌으니까…… 내가 약하니까……)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "（いや、弱気になるな。彼が間違った道に進みかけた時、止める者は必要だ。この世界を守るために……！）"
translation = "(아니, 약해지지 마라. 그가 잘못된 길로 나아가려 할 때 멈출 자는 필요하다. 이 세계를 지키기 위해서……!)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「私は諦めない……絶対に……！」"
translation = "「나는 포기하지 않아…… 절대로……!」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「だ、大丈夫ですか？」"
translation = "「개, 괜찮으세요?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ひあっ！？\u3000き、君は……？」"
translation = "「히앗!? 너, 너는……?」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「あ、驚かせてごめんなさい！\u3000私、この前の大交流で来た留学生で、ベアトリスといいます……」"
translation = "「아, 놀라게 해서 죄송해요! 저, 저번 대교류 때 온 유학생인데, 베아트리스라고 합니다……」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「顔色が優れなかったので、声をかけさせていただいたんですが……」"
translation = "「안색이 안 좋아 보이셔서 말을 걸어본 건데……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「すまない、ベアトリス。心配させてしまった」"
translation = "「미안하다, 베아트리스. 걱정하게 만들었군.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「私は梨緒・Ａ・クリステレス。選挙管理委員会だ」"
translation = "「나는 리오 A 크리스테레스. 선거관리위원회다.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「選挙管理委員会？\u3000でもこの学園に選挙はないんじゃ……」"
translation = "「선거관리위원회? 하지만 이 학원에는 선거가 없지 않나요……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ああ、その通りだ。だが──」"
translation = "「아아, 그렇다. 하지만──」"

[[dialogue]]
speaker = "unk"
original = "梨緒は選挙管理委員会の設立理由を説明した。"
translation = "리오는 선거관리위원회의 설립 이유를 설명했다."

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「な、なるほど……。でもおひとりなんですか？」"
translation = "「그, 그렇군요……. 하지만 혼자이신 건가요?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「まぁ、な」"
translation = "「뭐, 그렇지.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「星徒会長──緋宮クロトはこの学園の生徒から信任を得ている。私は後から聞いたが、以前の戦いでの活躍からすれば当然だ」"
translation = "「성도회장── 히노미야 쿠로토는 이 학원의 학생들에게 신임을 얻고 있다. 나는 나중에 들었지만, 이전 전투에서의 활약을 생각하면 당연한 일이지.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「他の生徒からすれば、そんな彼を監視しようなんて言う私がおかしいんだろう」"
translation = "「다른 학생들 입장에선 그런 그를 감시하겠다는 내가 이상해 보이겠지.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "（選挙管理委員会……星徒会と魔王クロトの監視。目立つのは良くないけど、私の目的とは一致してる……）"
translation = "(선거관리위원회…… 성도회와 마왕 쿠로토의 감시. 눈에 띄는 건 좋지 않지만, 내 목적과는 일치해……)"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「いや、誰も集まらないのは、私が無能だからなのかもしれないが」"
translation = "「아니, 아무도 모이지 않는 건 내가 무능해서일지도 모르지만.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「私は弱くて使えない、何も守れない星騎士だから……」"
translation = "「나는 약하고 쓸모없는, 아무것도 지킬 수 없는 성기사니까……」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「あわわっ！？\u3000お気を確かにっ」"
translation = "「아와왓!? 정신 차리세요!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「すまない……また弱気になってしまった」"
translation = "「미안하다…… 또 약해지고 말았군.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「だが私は、緋宮会長を監視することは必要だと思っている。彼が強いからこそ、目を離すわけにはいかない」"
translation = "「하지만 나는 히노미야 회장을 감시하는 것이 필요하다고 생각한다. 그가 강하기에 더더욱 눈을 뗄 수 없어.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「最も強い者が、常に正しい道を往くとは限らない。誤った道を往くなら止める必要がある」"
translation = "「가장 강한 자가 항상 옳은 길을 가는 법은 없다. 잘못된 길을 간다면 멈춰 세울 필요가 있지.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「最も強い者が、常に正しいとは限らない……」"
translation = "「가장 강한 자가 항상 옳은 것은 아니다……」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「あ、あのっ！\u3000私、選挙管理委員会に入ってもいいですか？」"
translation = "「저, 저기! 저, 선거관리위원회에 들어가도 될까요?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「いいのか？\u3000ありがたい申し出だが、率直に言って肩身が狭いぞ？」"
translation = "「괜찮겠나? 고마운 제안이지만, 솔직히 말해서 입지가 좁을 거다.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「いいんです。梨緒さんが言ってること……私にも、わかりますから」"
translation = "「괜찮아요. 리오 씨가 하시는 말씀…… 저도 이해하니까요.」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「わかった。では選挙管理委員会は君を歓迎しよう。……よろしく、ベアトリス」"
translation = "「알았다. 그럼 선거관리위원회는 너를 환영하마. ……잘 부탁한다, 베아트리스.」"

[[dialogue]]
speaker_original = "ベアトリス"
speaker_translation = "베아트리스"
original = "「よろしくお願いしますっ」"
translation = "「잘 부탁드립니다!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「今日はクイズオリエンテーションの準備で遅くなっちゃたな……」"
translation = "「오늘은 퀴즈 오리엔테이션 준비 때문에 늦어버렸네……」"

[[dialogue]]
speaker = "unk"
original = "星徒会の仕事を終えての帰り道。"
translation = "성도회 일을 마치고 돌아가는 길."

[[dialogue]]
speaker = "unk"
original = "１人で帰路を歩いていると──"
translation = "혼자서 귀갓길을 걷고 있자──"

[[dialogue]]
speaker = "？？？"
original = "「や。魔王さん。初めまして」"
translation = "「안녕. 마왕 씨. 처음 뵙겠어.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「──！？」"
translation = "「──!?」"

[[dialogue]]
speaker = "unk"
original = "冷たく鋭い殺気にゾクリと背筋が震える。"
translation = "차갑고 날카로운 살기에 등줄기가 오싹하게 떨린다."

[[dialogue]]
speaker = "unk"
original = "さっきまで気配はなかったはずなのに、背後に誰かいる。"
translation = "방금 전까지 기척이 없었을 텐데 등 뒤에 누군가 있다."

[[dialogue]]
speaker = "unk"
original = "迂闊に動くのは危険だ。首に刃を突き付けられるような、ひりついた感覚を覚えながら、出方を伺う。"
translation = "어설프게 움직이는 건 위험하다. 목에 칼날이 닿은 듯한 서늘한 감각을 느끼며 상대의 움직임을 살핀다."

[[dialogue]]
speaker = "？？？"
original = "「大丈夫。刺さないからこっち見ていいよ。ゆっくり振り返ってね」"
translation = "「괜찮아. 찌르지 않을 테니까 이쪽 봐도 돼. 천천히 돌아봐.」"

[[dialogue]]
speaker = "unk"
original = "言われた通り振り向くと──"
translation = "말한 대로 뒤를 돌아보자──"

[[dialogue]]
speaker = "？？？"
original = "「こんばんは」"
translation = "「안녕.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「君は……？」"
translation = "「너는……?」"

[[dialogue]]
speaker = "unk"
original = "歳はおそらく俺と同じくらい。制服を着ているから、彼女も大交流でやってきた留学生だろうか。"
translation = "나이는 아마 나랑 비슷할 정도. 교복을 입고 있으니 그녀도 대교류로 찾아온 유학생일까."

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「初めまして、魔王さん。私はナターシャ。天界の特務エージェントだよ」"
translation = "「처음 뵙겠습니다, 마왕 씨. 나는 나타샤. 천계의 특무 에이전트야.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「エージェント……？」"
translation = "「에이전트……?」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「そ、エージェント。要するに暗殺者。魔王がヤバくなったら消せって命令されてるんだ」"
translation = "「응, 에이전트. 요컨대 암살자. 마왕이 위험해지면 제거하라는 명령을 받았거든.」"

[[dialogue]]
speaker = "unk"
original = "剣呑な言葉にますます緊張が強くなる。"
translation = "살벌한 말에 더욱 긴장이 고조된다."

[[dialogue]]
speaker = "unk"
original = "裏の仕事をする公安委員会も学園には存在するが、堂々と暗殺者を名乗ることはない。"
translation = "뒷일을 처리하는 공안위원회도 학원에 존재하긴 하지만, 당당하게 암살자라고 자처하는 일은 없다."

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「おや。あんまり驚かないね？」"
translation = "「어라. 별로 안 놀라네?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「似たようなことを言われたことがあるからな」"
translation = "「비슷한 말을 들어본 적이 있어서 말이야.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「さすが魔王だ。人気者だね」"
translation = "「역시 마왕이네. 인기쟁이야.」"

[[dialogue]]
speaker = "unk"
original = "梨緒は消すとまでは言わなかったけど、前例がなければもっと衝撃だったかもしれない。"
translation = "리오는 제거한다는 말까지는 하지 않았지만, 전례가 없었다면 더 충격적이었을지도 모른다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「その暗殺者がわざわざ姿を現してどうしたんだ？\u3000暗殺者って隠れてるものじゃないのか？」"
translation = "「그 암살자가 왜 굳이 모습을 드러낸 거지? 암살자는 숨어 있는 거 아니었나?」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「暗殺者は背後から忍び寄るものでしょ？\u3000様式美に従ってみようと思って」"
translation = "「암살자는 등 뒤에서 소리 없이 다가가는 법이잖아? 양식미를 한번 따라 해보고 싶어서.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それだけ？」"
translation = "「그것뿐이야?」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「うん、それだけ♪」"
translation = "「응, 그것뿐♪」"

[[dialogue]]
speaker = "unk"
original = "ナターシャと名乗った暗殺者がご機嫌そうに笑う。"
translation = "나타샤라고 자처한 암살자가 기분 좋은 듯 웃는다."

[[dialogue]]
speaker = "unk"
original = "研ぎ澄まされた殺気はそのままに。"
translation = "날카롭게 벼려진 살기는 그대로인 채로."

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「私の飼い主は<ruby>聖庭園<rt>せいていえん</rt></ruby>でね。前の戦いで活躍した魔王を恐れてるんだよ」"
translation = "「내 주인님은 성정원이라서 말이야. 지난 전투에서 활약한 마왕을 두려워하고 있어.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「聖庭園っていうと確か……」"
translation = "「성정원이라면 분명……」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「聖庭園は天界の中枢。国の首都みたいなもの。アメリカのワシントン？\u3000みたいなものかな」"
translation = "「성정원은 천계의 중추. 국가의 수도 같은 곳이야. 미국의 워싱턴? 같은 느낌이려나.」"

[[dialogue]]
speaker = "unk"
original = "アナから聞いたことがある。聖庭園には長老格の天使が集まり、天界全体の意志決定をしているとか。"
translation = "아나에게 들은 적이 있다. 성정원에는 장로격 천사들이 모여 천계 전체의 의사 결정을 내린다고."

[[dialogue]]
speaker = "unk"
original = "人間界や魔界と違って天界は規模が小さく、まとまったひとつの国のようになっているとも。"
translation = "인간계나 마계와 달리 천계는 규모가 작아 하나의 통합된 국가처럼 되어 있다는 말도."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「魔王を警戒するのはわからなくはないけど、それは本人に言ってよかったのか……？」"
translation = "「마왕을 경계하는 건 이해 못 할 일도 아니지만, 그걸 본인에게 말해도 괜찮은 건가……?」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「手をかけさせないでってことだよ。杞憂で済めば一番いいからね」"
translation = "「손대게 만들지 말라는 뜻이야. 기우로 끝나면 제일 좋으니까.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「多分大丈夫じゃないかなーと思ってるけど……いざという時はバッサリやるから気を付けてね」"
translation = "「아마 괜찮지 않을까~ 싶긴 하지만…… 만약의 사태에는 가차 없이 해치울 테니까 조심해줘.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ああ。ご忠告感謝するよ」"
translation = "「그래. 충고 고맙군.」"

[[dialogue]]
speaker_original = "ナターシャ"
speaker_translation = "나타샤"
original = "「じゃあね～」"
translation = "「그럼 안녕~」"

[[dialogue]]
speaker = "unk"
original = "ナターシャが手をひらひら振りながら去っていく。"
translation = "나타샤가 손을 흔들며 떠나간다."

[[dialogue]]
speaker = "unk"
original = "最初からそこにいなかったみたいに、刃を突き付けられるような感覚は消え失せていた。"
translation = "처음부터 그곳에 없었던 것처럼, 칼날이 겨눠진 듯한 감각은 사라져 있었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「今度は聖庭園か……」"
translation = "「이번엔 성정원인가……」"

[[dialogue]]
speaker = "unk"
original = "聖庭園のリガルタ老は、前の戦いの際、『シエルの<ruby>筐<rt>はこ</rt></ruby>』という宝物を貸し与えてくれた。"
translation = "성정원의 리갈타 노사는 지난 전투 때 『시엘의 상자』라는 보물을 빌려주었다."

[[dialogue]]
speaker = "unk"
original = "リクリエとの戦いにおいて、聖庭園は敵ではない。"
translation = "리크리에와의 싸움에 있어서 성정원은 적이 아니다."

[[dialogue]]
speaker = "unk"
original = "だけど魔王に対する警戒は確かなようだ。"
translation = "하지만 마왕에 대한 경계는 확실한 모양이다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「しっかりしなきゃいけない理由がまた増えたな」"
translation = "「정신 똑바로 차려야 할 이유가 또 늘었네.」"

[[dialogue]]
speaker = "unk"
original = "魔王である俺が道を誤れば世界が滅ぶ。"
translation = "마왕인 내가 길을 잘못 들면 세계가 멸망한다."

[[dialogue]]
speaker = "unk"
original = "一応背後に警戒しつつ、その責任を噛みしめながら帰るのだった。"
translation = "일단 등 뒤를 경계하며 그 책임감을 되새기며 돌아가는 길이었다."

