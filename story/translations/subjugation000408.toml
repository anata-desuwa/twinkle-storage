[[dialogue]]
speaker = "unk"
original = "後日。平日のお昼休み。"
translation = "며칠 뒤. 평일 점심시간."

[[dialogue]]
speaker = "unk"
original = "カフェテリアに向かうと、ネーゼマインとサランが一緒に食事しているところを見かけた。"
translation = "카페테리아로 향하자 네제마인과 사란이 함께 식사하는 모습을 발견했다."

[[dialogue]]
speaker = "サラン"
original = "「あっ、会長ちゃんだ～♪\u3000お昼食べにきたの～？」"
translation = "「앗, 회장짱이다~♪ 점심 먹으러 온 거야~?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「やっほ～、会長♪\u3000一緒に食べる～？」"
translation = "「얏호~, 회장♪ 같이 먹을래?」"

[[dialogue]]
speaker = "unk"
original = "２人とも、仲良くなったんだな"
translation = "둘 다 사이가 좋아졌구나."

[[dialogue]]
speaker = "サラン"
original = "「うんっ♪\u3000そうなの～♪」"
translation = "「응!♪ 그렇다구~♪」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「いや、仲良くなったっていうか……」"
translation = "「아니, 사이가 좋아졌다기보다……」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「<b>サラン</b>先輩のふわふわした態度見てたら、なんか変に気を遣うのも馬鹿らしくなってきてさ～、もっと気楽にすればいいかな～って」"
translation = "「사란 선배의 둥실둥실한 태도를 보고 있으니까 왠지 이상하게 신경 쓰는 것도 바보 같아져서 말이야~, 좀 더 편하게 대하면 되겠다 싶어서」"

[[dialogue]]
speaker = "サラン"
original = "「えへへ～♪\u3000照れるな～」"
translation = "「에헤헤~♪ 쑥스럽네~」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「ほらほら。なに言っても、こうやってポジティブに捉えるんだもん。厄介な相手だよ、全く」"
translation = "「봐봐. 무슨 말을 해도 이렇게 긍정적으로 받아들인다니까. 성가신 상대야 정말」"

[[dialogue]]
speaker = "サラン"
original = "「それで今度ね、マインちゃんとどこか一緒に遊びに行こうって話してたんだ～」"
translation = "「그래서 이번에 마인짱이랑 어딘가 같이 놀러 가자고 이야기하고 있었어~」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「いやいや、それはまだ未確定ですから。大体、先輩は私とどこに遊びに行く気なの？」"
translation = "「아니 아니, 그건 아직 미확정이라니까요. 대체 선배는 저랑 어디로 놀러 갈 생각인데요?」"

[[dialogue]]
speaker = "サラン"
original = "「激辛料理専門店とか？\u3000サラン、美味しいお店ならいっぱい知ってるよ～？」"
translation = "「아주 매운 요리 전문점이라든가? 사란, 맛있는 가게라면 잔뜩 알고 있어~?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「……それはちょっと、興味あるけど」"
translation = "「……그건 조금 흥미 있지만」"

[[dialogue]]
speaker = "unk"
original = "と、その時。"
translation = "그때였다."

[[dialogue]]
speaker = "セナリィ"
original = "「じ～っ……」"
translation = "「지이익……」"

[[dialogue]]
speaker = "unk"
original = "セナリィが少し離れたところから、物陰に隠れてこちらの様子を見ていることに気づく。"
translation = "세나리가 조금 떨어진 곳에서 물체 뒤에 숨어 이쪽을 지켜보고 있다는 것을 깨달았다."

[[dialogue]]
speaker = "unk"
original = "セナリィ、そんなところでどうしたんだ？"
translation = "세나리, 그런 데서 뭐 하는 거야?"

[[dialogue]]
speaker = "セナリィ"
original = "「えっ！？\u3000会長様、そ、それは……」"
translation = "「엣!? 회장님, 그, 그건……」"

[[dialogue]]
speaker = "サラン"
original = "「セナリィちゃんだ～♪\u3000こんにちは～♪」"
translation = "「세나리짱이다~♪ 안녕~♪」"

[[dialogue]]
speaker = "セナリィ"
original = "「お、おほほ♪\u3000サラン様、先日はどうもですわ」"
translation = "「오, 오호호♪ 사란 님, 지난번엔 감사했어요」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「セナリィ、どうしたの～？\u3000なんか隠れてこっち見てたみたいだけど……また悪巧み～？」"
translation = "「세나리, 왜 그래~? 왠지 숨어서 이쪽을 보고 있었던 것 같은데…… 또 나쁜 짓 꾸미는 거야~?」"

[[dialogue]]
speaker = "セナリィ"
original = "「え、ええ、まあ。そのようなものですわ」"
translation = "「에, 에에, 뭐. 그런 셈이죠」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「それとも～、ひょっとして……自分だけ友人の輪に上手く入れなくて、嫉妬とかしちゃってた感じかな～？\u3000にひひ♪」"
translation = "「아니면~ 설마…… 자기만 친구들 사이에 잘 못 끼어서 질투 같은 거 하고 있었던 느낌일까나~? 니히히♪」"

[[dialogue]]
speaker = "セナリィ"
original = "「ホワイ！？\u3000ち、ちげぇですわよっ！\u3000そんなんじゃないですわっ！」"
translation = "「와이!? 아, 아니거든요! 그런 거 아니거든요!」"

[[dialogue]]
speaker = "サラン"
original = "「なんだ～、それなら言ってくれればいいのに～！\u3000サランは、セナリィちゃんとも仲良くしたいよ～？」"
translation = "「뭐야~ 그러면 말해주면 좋을 텐데~! 사란은 세나리짱이랑도 친하게 지내고 싶어~?」"

[[dialogue]]
speaker = "サラン"
original = "「せっかくだし、一緒にお昼ご飯食べよ～♪」"
translation = "「기왕 이렇게 된 거 같이 점심 먹자~♪」"

[[dialogue]]
speaker = "セナリィ"
original = "「い、いえ、違いますの！\u3000<ruby>私<rt>わたくし</rt></ruby>はそんな友情とか、目に見えないものは信じない主義で――」"
translation = "「아, 아니요, 아닙니다! 저는 그런 우정 같은 눈에 보이지 않는 건 믿지 않는 주의라서──」"

[[dialogue]]
speaker = "サラン"
original = "「え～？\u3000セナリィちゃん、サランと一緒にお昼食べるのは、嫌～？」"
translation = "「에~? 세나리짱, 사란이랑 같이 점심 먹는 거 싫어~?」"

[[dialogue]]
speaker = "セナリィ"
original = "「う……！\u3000無邪気に訴えかけてくる眼差しが、悪の心にも刺さりますわ……！」"
translation = "「우……! 천진난만하게 호소해 오는 눈빛이 악의 마음에도 꽂히네요……!」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「サラン先輩のこういう無邪気に圧をかけてくるところ、ある意味凶悪だよね～♪」"
translation = "「사란 선배의 이런 천진난만하게 압박해 오는 점, 어떤 의미로는 흉악하다니까~♪」"

[[dialogue]]
speaker = "セナリィ"
original = "「で、でも……そうですわね！\u3000改めて考えれば、一緒に食事するのは、悪くない提案ですわ」"
translation = "「하, 하지만…… 그렇네요! 다시 생각해보니 같이 식사하는 건 나쁘지 않은 제안이에요」"

[[dialogue]]
speaker = "セナリィ"
original = "「ビジネスには接待が必要ですもの！\u3000サラン様とは、これからもビジネスパートナーとして、仲良くさせて頂きたいですし！\u3000ええ！」"
translation = "「비즈니스에는 접대가 필요한 법이니까요! 사란 님과는 앞으로도 비즈니스 파트너로서 친하게 지내고 싶기도 하고요! 네!」"

[[dialogue]]
speaker = "サラン"
original = "「やった～♪\u3000それじゃあ今日は、ハロウィンの仲良しメンバーみんなで、ふわふわランチしよ～♪」"
translation = "「앗싸~♪ 그럼 오늘은 할로윈 단짝 멤버 모두 함께 둥실둥실 런치 하자~♪」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「にひひ♪\u3000上手く輪に入れて、よかったね～、セナリィ♪」"
translation = "「니히히♪ 잘 끼어들어서 다행이네, 세나리♪」"

[[dialogue]]
speaker = "セナリィ"
original = "「な、なにをニヤニヤ笑ってるんですの、マイン！？」"
translation = "「무, 뭘 실실 웃고 있는 건가요, 마인!?」"

[[dialogue]]
speaker = "ネーゼマイン"
original = "「別に～？」"
translation = "「딱히~?」"

[[dialogue]]
speaker = "サラン"
original = "「マインちゃん、楽しそうな顔してる～♪」"
translation = "「마인짱 즐거워 보여~♪」"

[[dialogue]]
speaker = "unk"
original = "３人はその後もわいわいと、仲の良い友達同士のように昼休みを過ごすのだった。"
translation = "세 사람은 그 후로도 왁자지껄하게 사이좋은 친구들처럼 점심시간을 보냈다."

