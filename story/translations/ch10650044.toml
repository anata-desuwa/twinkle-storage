[[dialogue]]
speaker = "unk"
original = "第４話,イレーナの表と裏,P"
translation = "제4화, 이레이나의 겉과 속, P"

[[dialogue]]
speaker = "unk"
original = "教皇庁の神官であり、聖女と謳われるイレーナは、ジューンブライドの結婚式シーズンで引っ張りだこになっていた。"
translation = "교황청의 신관이자 성녀로 칭송받는 이레이나는 6월의 신부 결혼식 시즌으로 눈코 뜰 새 없이 바빠져 있었다."

[[dialogue]]
speaker = "unk"
original = "今日は裏からその仕事を見学させてもらっている。"
translation = "오늘은 뒤편에서 그 업무를 견학하기로 했다."

[[dialogue]]
speaker = "イレーナ"
original = "「あなた方は今日、夫婦となる誓いを立てようとしています。希望に満ち溢れたおふたりの顔を見ることができて、私も嬉しく思います」"
translation = "「당신들은 오늘 부부가 될 서약을 세우려 하고 있습니다. 희망에 가득 찬 두 분의 얼굴을 볼 수 있어 저 또한 기쁘게 생각합니다」"

[[dialogue]]
speaker = "unk"
original = "結婚式を挙げるカップルと参列者の前で、神官として説教をするイレーナ。"
translation = "결혼식을 올리는 커플과 하객들 앞에서 신관으로서 설교를 하는 이레이나."

[[dialogue]]
speaker = "イレーナ"
original = "「ですがこれは終わりではありません。新たな生活、新たな人生の始まりなのです」"
translation = "「하지만 이것은 끝이 아닙니다. 새로운 생활, 새로운 인생의 시작입니다」"

[[dialogue]]
speaker = "イレーナ"
original = "「この道行きの先には、様々な苦労や困難が待ち受けています。もちろん覚悟の上だとお思いでしょう」"
translation = "「이 길 앞에는 여러 고난과 어려움이 기다리고 있습니다. 물론 각오하고 계시리라 생각합니다」"

[[dialogue]]
speaker = "イレーナ"
original = "「しかし困難というものは、想像を上回ってくるもの」"
translation = "「하지만 고난이라는 것은 상상을 뛰어넘어 닥쳐오는 법」"

[[dialogue]]
speaker = "イレーナ"
original = "「そんな時は誰が隣にいるのかを見てください。あなたは決して１人ではありません」"
translation = "「그럴 때는 누가 곁에 있는지 봐주세요. 당신은 결코 혼자가 아닙니다」"

[[dialogue]]
speaker = "イレーナ"
original = "「共にいることでより強く、より優しくなれると思ったからこそ、今隣にいる人を選んだはずです」"
translation = "「함께함으로써 더 강해지고 더 상냥해질 수 있다고 생각했기에 지금 곁에 있는 사람을 선택했을 것입니다」"

[[dialogue]]
speaker = "イレーナ"
original = "「自分と伴侶を信じて険しい道を歩み、幸福を掴み取っていただきたいと思います」"
translation = "「자신과 반려를 믿고 험난한 길을 걸어 행복을 쟁취하시길 바랍니다」"

[[dialogue]]
speaker = "イレーナ"
original = "「では誓いの言葉を」"
translation = "「그럼 서약의 말을」"

[[dialogue]]
speaker = "イレーナ"
original = "「病める時も健やかなる時も、富める時も貧しき時も、新郎は新婦を愛し、慈しむことを誓いますか？」"
translation = "「아플 때나 건강할 때나, 부유할 때나 가난할 때나 신랑은 신부를 사랑하고 아낄 것을 서약합니까?」"

[[dialogue]]
speaker = "イレーナ"
original = "「病める時も健やかなる時も、富める時も貧しき時も、新婦は新郎を愛し、慈しむことを誓いますか？」"
translation = "「아플 때나 건강할 때나, 부유할 때나 가난할 때나 신부는 신랑을 사랑하고 아낄 것을 서약합니까?」"

[[dialogue]]
speaker = "イレーナ"
original = "「……よろしい。では神官イレーナが、女神テルル様の下、２人が夫婦であることを認めます」"
translation = "「……좋습니다. 그럼 신관 이레이나가 여신 테루루 님의 아래 두 사람이 부부임을 인정합니다」"

[[dialogue]]
speaker = "unk"
original = "静粛な雰囲気の中、イレーナが新郎新婦の宣誓を見届けた。"
translation = "정숙한 분위기 속에서 이레이나가 신랑 신부의 선서를 지켜보았다."

[[dialogue]]
speaker = "イレーナ"
original = "「はぁ～……疲れた……」"
translation = "「하아~…… 힘들다……」"

[[dialogue]]
speaker = "unk"
original = "お疲れ様。大変だったね"
translation = "고생했어. 힘들었지?"

[[dialogue]]
speaker = "イレーナ"
original = "「ホントよ……今日だけで何組結婚式やったか数えきれないわ……」"
translation = "「진짜라니까…… 오늘만 몇 쌍이나 결혼식을 했는지 셀 수도 없어……」"

[[dialogue]]
speaker = "イレーナ"
original = "「聖女で有名だからって、あたしを名指ししてくるカップルだっているし、手当たくさんもらわないとやってられないわ」"
translation = "「성녀로 유명하다고 나를 지명하는 커플도 있고, 수당 잔뜩 안 받으면 못 해 먹겠다구」"

[[dialogue]]
speaker = "イレーナ"
original = "「ま、説教の時はちょっとすかっとするけどね。偉そうなこと言えるいい機会だし」"
translation = "「뭐, 설교할 때는 좀 속이 시원하지만 말이야. 거드름 피우며 말할 수 있는 좋은 기회니까」"

[[dialogue]]
speaker = "イレーナ"
original = "「……カップルごとに説教が違うって？\u3000そりゃあ使い回しってわけにはいかないでしょ。事前に新郎新婦のことを聞いたり、当日の顔色を見たりして内容を変えてるの」"
translation = "「……커플마다 설교가 다르다구? 그야 재탕할 수는 없잖아. 미리 신랑 신부에 대해 듣거나 당일 안색을 보며 내용을 바꾸고 있어」"

[[dialogue]]
speaker = "イレーナ"
original = "「不安そうだったら勇気づけたり、浮かれてたらちょっと気を引き締めたり、アドリブ利かせてんのよ。あたしが結婚式やった以上、別れられたらちょっと気分悪いし」"
translation = "「불안해 보이면 용기를 북돋아 주고, 들떠 있으면 좀 긴장하게 만들고, 애드리브를 부리는 거야. 내가 결혼식을 올린 이상 헤어지면 기분 좀 나쁘니까」"

[[dialogue]]
speaker = "unk"
original = "立派な聖女様だ"
translation = "훌륭한 성녀님이시네"

[[dialogue]]
speaker = "イレーナ"
original = "「聖女……ねぇ」"
translation = "「성녀…… 참 나」"

[[dialogue]]
speaker = "イレーナ"
original = "「前から気になってたんだけどさ……」"
translation = "「전부터 궁금했던 건데……」"

[[dialogue]]
speaker = "イレーナ"
original = "「あんた、素のあたしが好きだって、こっちが恥ずかしくなるくらい言ってくれるじゃない？」"
translation = "「너, 본모습의 내가 좋다고 이쪽이 다 부끄러워질 정도로 말해주잖아?」"

[[dialogue]]
speaker = "unk"
original = "ああ、大好きだ"
translation = "아아, 정말 좋아해"

[[dialogue]]
speaker = "イレーナ"
original = "「そ、そこまで言わなくてもいいわよ……」"
translation = "「그, 그렇게까지 말 안 해도 돼……」"

[[dialogue]]
speaker = "イレーナ"
original = "「それはいいとして、猫被って聖女やってるあたしのことはどう思ってるの？」"
translation = "「그건 그렇다 치고 내숭 떨며 성녀 노릇 하는 내 모습은 어떻게 생각해?」"

[[dialogue]]
speaker = "イレーナ"
original = "「あたしは口も性格も悪くて、そんな女が外面を取り繕って、優しい聖女様を演じてる」"
translation = "「난 입도 성격도 나쁜데 그런 여자가 겉모습을 꾸며서 상냥한 성녀님을 연기하고 있어」"

[[dialogue]]
speaker = "イレーナ"
original = "「本当のあたしが好きだっていうなら、聖女の方のあたしは嫌いなんじゃないの？」"
translation = "「진짜 내가 좋다고 한다면 성녀 쪽의 나는 싫어하는 거 아냐?」"

[[dialogue]]
speaker = "unk"
original = "聖女のイレーナも好きだ"
translation = "성녀인 이레이나도 좋아해"

[[dialogue]]
speaker = "イレーナ"
original = "「そうなの？\u3000どうして？」"
translation = "「그래? 어째서?」"

[[dialogue]]
speaker = "イレーナ"
original = "「優しい聖女を演じられるのは、イレーナが優しいから……？\u3000聖女のイレーナもあたしの一部……？」"
translation = "「상냥한 성녀를 연기할 수 있는 건 이레이나가 상냥하기 때문이라구……? 성녀인 이레이나도 내 일부……?」"

[[dialogue]]
speaker = "イレーナ"
original = "「そう言ってくれるのは嬉しいけど、優しいふりだけ得意なやつもいるわよ？」"
translation = "「그렇게 말해주니 기쁘지만 상냥한 척만 잘하는 녀석도 있다구?」"

[[dialogue]]
speaker = "イレーナ"
original = "「……ううん、あんたの言ってること、ちょっとは素直に受け止めるべきね」"
translation = "「……아니, 네가 하는 말 조금은 솔직하게 받아들여야겠네」"

[[dialogue]]
speaker = "イレーナ"
original = "「聖女ってほどじゃなくても、あたしはちゃんと優しくなれる。好きになってもらえる。そういう人間なんだって」"
translation = "「성녀 정도는 아니더라도 난 충분히 상냥해질 수 있어. 사랑받을 수 있어. 그런 인간이라고」"

[[dialogue]]
speaker = "イレーナ"
original = "「少し前のあたしなら、『やっぱり聖女の方が好きなんじゃない』って言ってたかもしれないけど、今なら受け入れられる気がするわ」"
translation = "「얼마 전의 나라면 『역시 성녀 쪽이 더 좋은 거 아냐』라고 말했을지도 모르지만 지금이라면 받아들일 수 있을 것 같아」"

[[dialogue]]
speaker = "イレーナ"
original = "「でもよかったわ。あっちのあたしは好きじゃないって言われてたら、それはそれでモヤモヤしてたし」"
translation = "「그래도 다행이야. 저쪽의 나는 좋지 않다는 말을 들었으면 그것대로 찜찜했을 테니까」"

[[dialogue]]
speaker = "unk"
original = "俺はイレーナの全部が好きだよ"
translation = "난 이레이나의 모든 점이 좋아"

[[dialogue]]
speaker = "イレーナ"
original = "「あんた……」"
translation = "「너……」"

[[dialogue]]
speaker = "イレーナ"
original = "「あ、でも、あんたが他の女の子と結婚式挙げるの見てて、内心けっこうムカついてたんだからね」"
translation = "「아, 근데 네가 다른 여자애랑 결혼식 올리는 거 보면서 속으로는 꽤 열받았었으니까 말이야」"

[[dialogue]]
speaker = "unk"
original = "それはごめん！"
translation = "그건 미안해!"

[[dialogue]]
speaker = "イレーナ"
original = "「だから今から埋め合わせしなさい。ウェディングフォームを解除するためじゃなくて、ちゃんと誓うの」"
translation = "「그러니까 지금부터 보답해. 웨딩 폼을 해제하기 위해서가 아니라 제대로 서약하는 거야」"

[[dialogue]]
speaker = "イレーナ"
original = "「ほら、あたしの手を取って」"
translation = "「자, 내 손을 잡아」"

[[dialogue]]
speaker = "unk"
original = "イレーナがウェディングフォームに変身し、まるで式を挙げる新郎新婦のように、２人で大聖堂の真ん中を歩む。"
translation = "이레이나가 웨딩 폼으로 변신하고 마치 식을 올리는 신랑 신부처럼 둘이서 대성당 한가운데를 걷는다."

[[dialogue]]
speaker = "イレーナ"
original = "「本当なら神官がやるんだけど、あたしも神官だから、自分でやっちゃうわ」"
translation = "「원래는 신관이 하는 거지만 나도 신관이니까 내가 직접 할게」"

[[dialogue]]
speaker = "イレーナ"
original = "「病める時も健やかなる時も、富める時も貧しき時も、あたしを愛し、慈しむことを誓いますか？」"
translation = "「아플 때나 건강할 때나, 부유할 때나 가난할 때나 나를 사랑하고 아낄 것을 서약합니까?」"

[[dialogue]]
speaker = "unk"
original = "誓います"
translation = "서약합니다"

[[dialogue]]
speaker = "イレーナ"
original = "「あたしも誓うわ。病める時も健やかなる時も、富める時も貧しき時も、どんな時でもあんたを愛するって」"
translation = "「나도 서약할게. 아플 때나 건강할 때나, 부유할 때나 가난할 때나 어떤 때라도 너를 사랑하겠다고」"

[[dialogue]]
speaker = "イレーナ"
original = "「それじゃ、誓いの口付けを」"
translation = "「그럼 서약의 입맞춤을」"

[[dialogue]]
speaker = "イレーナ"
original = "「ん……ちゅ<emoji=heart04>」"
translation = "「응…… 쪽<emoji=heart04>」"

