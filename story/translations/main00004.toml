[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「これでひと段落かしら？\u3000ふふっ、あっさりだったわね」"
translation = "「이걸로 한숨 돌렸으려나? 후훗, 싱거웠네.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「もうっ。どうしてモンスターを連れてきちゃうんですか、サーシャさん」"
translation = "「정말. 왜 몬스터를 데리고 오시는 거예요, 사샤 씨.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「固いこと言わないの～。マトイちゃんのおかげで助かったんだから」"
translation = "「딱딱하게 굴지 마~. 마토이짱 덕분에 살았으니까.」"

[[dialogue]]
speaker = "unk"
original = "幾度かの交戦を経て付近のモンスターは無事一掃されたようだった。"
translation = "몇 차례 교전을 거쳐 근처의 몬스터는 무사히 일소된 듯했다."

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「それと……クロトくん、だったかしら？\u3000一緒に戦ってくれてありがとねぇ」"
translation = "「그리고…… 쿠로토 군, 이었으려나? 함께 싸워줘서 고마워~」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「あ……はい」"
translation = "「아…… 네.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「（あれ……俺、自分の名前なんて名乗ったっけ？）」"
translation = "「(어라…… 나, 내 이름 말했던가?)」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「それにしても……こんな町中でいきなり湧いてくるなんて。油断も隙もありませんね」"
translation = "「그나저나…… 이런 시내 한복판에서 갑자기 솟아나다니. 방심할 틈도 없네요.」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「近辺にアステラはなし。ただのはぐれモンスターですね」"
translation = "「근처에 아스테라는 없음. 단순한 길 잃은 몬스터네요.」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「ふふ。いつもこれくらい可愛い相手なら助かるのだけど」"
translation = "「후후. 항상 이 정도 귀여운 상대라면 살겠는데.」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「（彼女たちは……）」"
translation = "「(그녀들은……)」"

[[dialogue]]
speaker = "unk"
original = "特徴的な戦闘服──"
translation = "특징적인 전투복──"

[[dialogue]]
speaker = "unk"
original = "間違いない。新星学園の<ruby>星騎士<rt>スターナイト</rt></ruby>たちだ。"
translation = "틀림없다. 신성 학원의 성기사들이다."

[[dialogue]]
speaker = "unk"
original = "そして、この手渡された変身アイテム……"
translation = "그리고, 이 건네받은 변신 아이템……"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「あのっ──」"
translation = "「저기──」"

[[dialogue]]
speaker_original = "サーシャ"
speaker_translation = "사샤"
original = "「あら。もうそろそろ始業の時間だわ、急いで戻らないと」"
translation = "「어머. 이제 곧 시업 시간이야, 서둘러 돌아가야지.」"

[[dialogue]]
speaker_original = "マトイ"
speaker_translation = "마토이"
original = "「ですねっ。協力してくれてありがと、でも遅刻しないように！」"
translation = "「그렇네요. 협력해줘서 고마워, 하지만 지각하지 않도록!」"

[[dialogue]]
speaker_original = "アナ"
speaker_translation = "아나"
original = "「とんぼがえり～」"
translation = "「바로 돌아가기~」"

[[dialogue]]
speaker = "unk"
original = "言うが早いか、彼女たちはそのまま飛翔して学園のほうへ去っていってしまった。"
translation = "말이 끝나기가 무섭게, 그녀들은 그대로 비상하여 학원 쪽으로 떠나가 버렸다."

[[dialogue]]
speaker = "unk"
original = "俺も飛──べない。"
translation = "나도 날── 수 없다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「やばい、時間が」"
translation = "「위험해, 시간이.」"

[[dialogue]]
speaker = "unk"
original = "今度は景色に浸る余裕もなく、俺は自分の脚で残る通学路を駆けていった。"
translation = "이번에는 경치에 잠길 여유도 없이, 나는 내 발로 남은 통학로를 달려 나갔다."

