[[dialogue]]
speaker = "unk"
original = "次の課題は船に乗って標的を水鉄砲で撃つアトラクション。"
translation = "다음 과제는 배를 타고 표적을 물총으로 쏘는 놀이기구."

[[dialogue]]
speaker = "unk"
original = "ある程度得点を稼げばいいだけなので、同じグループで競争する必要はないのだが、フランとプルちゃんが張り合い出して──"
translation = "어느 정도 점수만 따면 되는 거라 같은 그룹끼리 경쟁할 필요는 없었지만, 프랑과 플짱이 맞붙기 시작해서──"

[[dialogue]]
speaker_original = "プルちゃん"
speaker_translation = "푸루짱"
original = "「わーい、勝った勝ったー♪\u3000フランおねーさん、射撃もできるって言ってたくせにカッコ悪いんじゃな～い？」"
translation = "「와아, 이겼다 이겼다─♪ 프랑 언니, 사격도 할 수 있다더니 꼴사나운 거 아냐~?」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「オレが撃とうとする度に『わっ』とか声上げて邪魔してきやがったくせに！\u3000そのせいでスタンプ押せる得点ギリギリだっただろ！！」"
translation = "「내가 쏘려고 할 때마다 『왓』 하고 소리 지르면서 방해했으면서! 그 바람에 스탬프 찍을 점수도 간당간당했잖아!!」"

[[dialogue]]
speaker_original = "プルちゃん"
speaker_translation = "푸루짱"
original = "「ハーッハッハッハ！\u3000勝てばいいのだよ！」"
translation = "「하─하하하! 이기면 장땡이지!」"

[[dialogue]]
speaker_original = "プルちゃん"
speaker_translation = "푸루짱"
original = "「ていうかあたしだって、おねーさん邪魔するのに神経使ったから、邪魔してなかったらもっとポイント稼げてたよ！」"
translation = "「그보다 나도 언니 방해하느라 신경 썼으니까, 방해 안 했으면 점수 더 땄을 거라고!」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「なら最初からそうしろ！」"
translation = "「그럼 처음부터 그렇게 하라고!」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「ふふ、まるで姉妹ゲンカのようですね」"
translation = "「후후, 마치 자매 싸움 같네요.」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「こんな妹いらねー！」"
translation = "「이런 여동생 필요 없어!」"

[[dialogue]]
speaker_original = "プルちゃん"
speaker_translation = "푸루짱"
original = "「あたしだって、こんなおっかないお姉ちゃんいらないもん！\u3000お姉ちゃんにするなら～……」"
translation = "「나도 이런 무서운 언니 필요 없거든! 언니로 삼는다면~……」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「きゃっ」"
translation = "「꺄악.」"

[[dialogue]]
speaker_original = "プルちゃん"
speaker_translation = "푸루짱"
original = "「こっちのおねーさんの方がいいもんっ」"
translation = "「이쪽 언니가 더 좋단 말이야.」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「あん、くすぐったいです」"
translation = "「안돼요, 간지러워요.」"

[[dialogue]]
speaker_original = "プルちゃん"
speaker_translation = "푸루짱"
original = "「うお……でっか……やわらか……」"
translation = "「우와…… 크다…… 말랑해……」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「おい離れやがれ！\u3000なんか言い方がいやらしいぞ！」"
translation = "「어이 떨어져! 왠지 말투가 야하다고!」"

[[dialogue]]
speaker_original = "プルちゃん"
speaker_translation = "푸루짱"
original = "「わー！\u3000おねーさんがいじめるよー！」"
translation = "「와─! 언니가 괴롭혀요─!」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「待てー！」"
translation = "「기다려─!」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「ふふふ……おふたりとも楽しそうですね」"
translation = "「후후후…… 두 분 다 즐거워 보이시네요.」"

[[dialogue]]
speaker = "unk"
original = "グロリアさんも楽しんでるみたいで良かった"
translation = "글로리아 씨도 즐거워 보여서 다행이에요"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「私が？\u3000そうなのでしょうか……？\u3000いつもは大聖堂で祈ってばかりですから、楽しいことというのはよくわからなくて……」"
translation = "「제가요? 그런 걸까요……? 평소에는 대성당에서 기도만 하니까, 즐겁다는 건 잘 모르겠어서……」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「でも少し……普段より心が軽い気がします」"
translation = "「하지만 조금…… 평소보다 마음이 가벼운 기분이 들어요.」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「遊園地の存在は知っていたものの、来たのは今日が初めてでして……何もかもが新鮮な体験です」"
translation = "「유원지의 존재는 알고 있었지만, 온 것은 오늘이 처음이라서요…… 모든 것이 신선한 체험이에요.」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「とても賑やかで、人々の笑い声が聞こえて、アトラクションも驚きの連続で……」"
translation = "「무척 북적거리고, 사람들의 웃음소리가 들리고, 놀이기구도 놀라움의 연속이고……」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「……アトラクションで事故が起きたら死ねるでしょうか？」"
translation = "「……놀이기구에서 사고가 나면 죽을 수 있을까요?」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「縁起でもねえからマジでやめろ」"
translation = "「재수 없는 소리니까 진짜 관둬.」"

[[dialogue]]
speaker_original = "プルちゃん"
speaker_translation = "푸루짱"
original = "「ねーねー、グロリアおねーさんって死にたいの？」"
translation = "「저기 저기, 글로리아 언니는 죽고 싶어?」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「だって、善い人から天に召されるのでしょう？」"
translation = "「그야, 착한 사람부터 하늘에서 부르신다고 하잖아요?」"

[[dialogue]]
speaker_original = "プルちゃん"
speaker_translation = "푸루짱"
original = "「ほえ？」"
translation = "「호에?」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「両親が死んだ時、そう言っていた方がいました」"
translation = "「부모님이 돌아가셨을 때 그렇게 말하던 분이 있었어요.」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「ですが私がまだ生きているということは、きっと私はまだ善い人ではないのでしょうね……」"
translation = "「하지만 제가 아직 살아있다는 건, 분명 저는 아직 착한 사람이 아니기 때문이겠죠……」"

[[dialogue]]
speaker_original = "プルちゃん"
speaker_translation = "푸루짱"
original = "「ふーん、なるほどー」"
translation = "「흐음, 과연─」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「よし、次はジェットコースター行くぞ！\u3000ここの遊園地で一番人気なんだってよ！」"
translation = "「좋아, 다음은 제트코스터 가자! 이 유원지에서 제일 인기 있는 거래!」"

[[dialogue]]
speaker_original = "プルちゃん"
speaker_translation = "푸루짱"
original = "「あのたっかいジェットコースター乗るの？\u3000わー、天界に帰れちゃいそー、天使だけに」"
translation = "「저 높은 제트코스터 타는 거야? 와─, 천계로 돌아가 버릴지도─, 천사니까.」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「そんな簡単に帰れてたまるか。てかお前身長足りてるか？」"
translation = "「그렇게 쉽게 돌아갈 수 있겠냐. 그보다 너 키는 되냐?」"

[[dialogue]]
speaker_original = "プルちゃん"
speaker_translation = "푸루짱"
original = "「そんなにちっちゃくないもん！\u3000レモン１５個分だもん！」"
translation = "「그렇게 작지 않거든! 레몬 15개분이라고!」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「ビタミンＣか」"
translation = "「비타민 C냐.」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「ふふっ」"
translation = "「후후.」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「もちろんグロリアと会長も一緒な！」"
translation = "「물론 글로리아랑 회장도 같이 타는 거다!」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「ええ！？」"
translation = "「에에!?」"

[[dialogue]]
speaker = "unk"
original = "俺はいいけど、グロリアさんは大丈夫？"
translation = "나는 괜찮지만, 글로리아 씨는 괜찮겠어요?"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「コーヒーカップでもフラフラしていたのに、あんな速くて高いアトラクションなんて……」"
translation = "「커피잔에서도 비틀거렸는데, 저렇게 빠르고 높은 놀이기구라니……」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「んなもん星騎士だから平気だろ。戦闘訓練の方がキツいっての」"
translation = "「그런 건 성기사니까 괜찮잖아. 전투 훈련이 훨씬 빡세다고.」"

[[dialogue]]
speaker_original = "プルちゃん"
speaker_translation = "푸루짱"
original = "「観念しなって。旅は道連れ世は情け、毒食らわばサラマンダーってね♪」"
translation = "「체념하라고. 여행은 길동무 세상은 인정, 독을 먹으려면 살라만더라고 하잖아♪」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「フ、フランさんもプルちゃんも、ちょっと待ってくださいっ、心の準備が──」"
translation = "「프, 프랑 씨도 플짱도, 잠깐만요, 마음의 준비가──」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「きゃぁ～～～～～～～っ！！？」"
translation = "「꺄아아아아아아악!!?」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「はぁ、はぁ……これが、ジェットコースター……」"
translation = "「하아, 하아…… 이것이 제트코스터……」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「確かに訓練も厳しいですが、また違う激しさがありました……。しかしこれで両親に近づけると思えば……」"
translation = "「확실히 훈련도 엄격하지만, 또 다른 격렬함이 있었네요……. 하지만 이걸로 부모님께 가까워질 수 있다고 생각하면……」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「いや死なねーよ」"
translation = "「아니 안 죽는다고.」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「これでスタンプも最後……じゃねえ。ジェットコースターはスタンプラリー関係なかったわ」"
translation = "「이걸로 스탬프도 마지막……이 아니네. 제트코스터는 스탬프 랠리랑 상관없었어.」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「う～っ……」"
translation = "「으으……」"

[[dialogue]]
speaker_original = "フラン"
speaker_translation = "프랑"
original = "「はっはっは、わりぃわりぃ。今度なんか埋め合わせするって」"
translation = "「하하하, 미안 미안. 다음에 뭐라도 보답할게.」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「む～……」"
translation = "「무우……」"

[[dialogue]]
speaker_original = "プルちゃん"
speaker_translation = "푸루짱"
original = "「ハハッ、拗ねてるグロリアおねーさんかわい～♪」"
translation = "「하핫, 삐쳐있는 글로리아 언니 귀여워~♪」"

[[dialogue]]
speaker_original = "グロリア"
speaker_translation = "글로리아"
original = "「えっ、私は拗ねているわけでは……違いますぅ……」"
translation = "「엣, 저는 삐친 게 아니라…… 아니거든요오……」"

[[dialogue]]
speaker = "unk"
original = "スタンプラリーで集めるスタンプはあと１つ。"
translation = "스탬프 랠리로 모을 스탬프는 이제 하나 남았다."

[[dialogue]]
speaker = "unk"
original = "しかし『死神』が現れる気配はないのだった……"
translation = "하지만 『사신』이 나타날 기미는 보이지 않았는데……"

