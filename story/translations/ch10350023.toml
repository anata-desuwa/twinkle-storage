[[dialogue]]
speaker = "unk"
original = "第３話,因果応報,P"
translation = "제3화, 인과응보, P"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「投資は決して怖いものではない……ヒマワリから投資の極意を習った私は無敵ですわ」"
translation = "「투자는 결코 무서운 것이 아니다…… 히마와리에게 투자의 극의를 배운 저는 무적이에요」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「慎重に慎重を重ね、見守り続けてきた暗号資産は１週間連続の続伸……よもや、ここから下がるはずがありませんわよね」"
translation = "「신중에 신중을 기해 지켜봐 온 암호 자산은 1주일 연속 상승 중…… 설마 여기서 떨어질 리가 없겠죠」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「ふふ、私の目に狂いはありませんわ。ビッグマニー・カム・ヒアーッ！\u3000ポチッとな」"
translation = "「후후, 제 눈은 틀리지 않아요. 빅 머니 컴 히어! 클릭」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「どうして下がってますのぉおぉぉっ！」"
translation = "「어째서 떨어지는 건가요오오오옷!」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「私が買った瞬間が最高値……？\u3000寝ている間に怒涛のナイアガラフォールですわ」"
translation = "「제가 산 순간이 최고점……? 자는 사이에 노도와 같은 나이아가라 폭포예요」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「……さぁて、と。溶けてしまった活動資金、どうしたものでしょう……」"
translation = "「……자아, 그럼. 녹아버린 활동 자금, 어쩌면 좋을까요……」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「社長、おはようございます」"
translation = "「사장님, 안녕하세요」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「──！！？」"
translation = "「──!!?」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「？\u3000なんだか汗だくですけど……今日、そんなに暑いですか？\u3000どうかしました？」"
translation = "「? 왠지 땀범벅이신데…… 오늘 그렇게 덥나요? 무슨 일 있었어요?」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「そうですわね、暑いですわね。でも、私の懐は大寒波が押し寄せてますわね」"
translation = "「그렇네요, 덥네요. 하지만 제 지갑 사정은 대한파가 몰아치고 있네요」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "（どうしましょうどうしましょうどうしましょう）"
translation = "（어쩌지 어쩌지 어쩌지）"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "（ミウやヒマワリが運営資金が目減りしてることに気づいたら、大変なことに……）"
translation = "（미우나 히마와리가 운영 자금이 줄어든 걸 눈치채면, 큰일이 날 텐데……）"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "（その前になんとかして資金繰りをしないと……そう、星徒会に掛け合って──）"
translation = "（그전에 어떻게든 자금 융통을 해야 해…… 그래, 성도회에 교섭해서──）"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "（『投資でお金を溶かしちゃったから貸してほしいですわ、てへ☆』そんな無様な理由で貸してくれるわけがないわよね……）"
translation = "（『투자로 돈을 다 날려버렸으니까 빌려주셨으면 해요, 테헤☆』 그런 한심한 이유로 빌려줄 리가 없잖아……）"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "（だからといって、ここに座っていても埒があかないわ……公安の突発案件でも日雇いのバイトでもいいから、少しでもお金を稼がないと……）"
translation = "（그렇다고 해서 여기 앉아 있어 봤자 해결되지 않아…… 공안의 돌발 안건이든 일용직 아르바이트든 좋으니까, 조금이라도 돈을 벌어야……）"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「私、用事を思い出しましたわー……ちょっと外に──」"
translation = "「저, 볼일이 생각났어요ー…… 잠시 밖에──」"

[[dialogue]]
speaker_original = "ヒマワリ"
speaker_translation = "히마와리"
original = "「た、た、大変です、社長ー！\u3000会社の運営資金がごっそり減ってるんです！」"
translation = "「크, 크, 큰일이에요, 사장님ー! 회사의 운영 자금이 뭉텅이로 줄어들어 있어요!」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「ギクッ！！？」"
translation = "「뜨끔!!?」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「ええっ！\u3000本当なの、ヒマワリちゃん！」"
translation = "「에엣! 정말이야, 히마와리 짱!」"

[[dialogue]]
speaker_original = "ヒマワリ"
speaker_translation = "히마와리"
original = "「ほら見て、ミウ。昨晩、大きな出金履歴があるじゃない？」"
translation = "「이것 봐, 미우. 어젯밤에 커다란 출금 이력이 있잖아?」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「本当だね……かなりの大金。最近、ゴールデングースの知名度は鰻登りだから、私たちの活動を妬んだサイバー攻撃の線もあるんじゃないかな」"
translation = "「정말이네…… 상당한 거금. 최근 골든 구스의 지명도가 급상승 중이니까, 우리 활동을 시기한 사이버 공격의 가능성도 있지 않을까」"

[[dialogue]]
speaker_original = "ヒマワリ"
speaker_translation = "히마와리"
original = "「あり得るー！\u3000でも、このセキュリティを突破するなんてめちゃ凄腕のハッカーだよ。もちろん社長の持ってるカードなら簡単に引き出せるけど」"
translation = "「있을 수 있어ー! 하지만 이 보안을 돌파하다니 엄청난 실력의 해커야. 물론 사장님이 가진 카드라면 간단히 인출할 수 있겠지만」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「秘密結社ゴールデングースのお金を盗むだなんて不届きにも程があるよ。犯人を捕まえたら、ゴールデングースの流儀をその身に教えてあげなきゃ！\u3000ね！」"
translation = "「비밀결사 골든 구스의 돈을 훔치다니 무례하기 짝이 없어. 범인을 잡으면 골든 구스의 방식을 몸소 가르쳐줘야겠어! 그치!」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「ひぃっ！？\u3000な、何もそこまでしなくてもよろしいのではなくて？」"
translation = "「히익!? 그, 그렇게까지 하지 않아도 괜찮지 않을까 해서요?」"

[[dialogue]]
speaker_original = "ヒマワリ"
speaker_translation = "히마와리"
original = "「いいえ、社長は優しすぎます！\u3000徹底的にやっちゃいましょう！」"
translation = "「아니요, 사장님은 너무 상냥하세요! 철저하게 해버리자고요!」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「時代が時代なら、窃盗は二度と悪さができないよう、指を切断されても当然なくらいの重罪ですよ？」"
translation = "「시대가 시대라면, 절도는 두 번 다시 나쁜 짓을 못 하도록 손가락이 절단되어도 당연할 정도의 중죄라고요?」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「ひぃいぃぃっ！？」"
translation = "「히이이이익!?」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「それとも、社長、犯人に心当たりがあるんですか？」"
translation = "「그보다 사장님, 범인에게 짚이는 구석이라도 있나요?」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「心当たり、心当たり……あ、ああー！\u3000昨晩でしたわね？\u3000それなら、私が投資につぎ込んだのですわ」"
translation = "「짚이는 구석, 짚이는 구석…… 아, 아아ー! 어젯밤이었죠? 그거라면 제가 투자에 쏟아부은 거예요」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「ごめんなさい、はした金だったから、うっかり忘れてましたわ、ほほほ」"
translation = "「미안해요, 푼돈이라서 깜빡 잊고 있었답니다, 호호호」"

[[dialogue]]
speaker_original = "ヒマワリ"
speaker_translation = "히마와리"
original = "「なんだー、人騒がせですよ、社長。それでどちらに投資されたんですか？」"
translation = "「뭐야ー, 사람 놀라게 하지 마세요, 사장님. 그래서 어디에 투자하신 건가요?」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「……言わなきゃダメですの？」"
translation = "「……말해야 하나요?」"

[[dialogue]]
speaker_original = "ヒマワリ"
speaker_translation = "히마와리"
original = "「もちろんですよ。まさか大暴落するのが見え見えだったリューセーコインじゃないでしょうし」"
translation = "「물론이죠. 설마 폭락할 게 뻔히 보였던 류세이 코인은 아니겠죠?」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「そ、そのリューセーコインですわ！」"
translation = "「그, 그 류세이 코인이에요!」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「投資は慎重にやればそんなに危なくないってヒマワリが言いましたのよ！？\u3000数時間で価値が半分以下になるだなんて想像できて！？」"
translation = "「투자는 신중하게 하면 그렇게 위험하지 않다고 히마와리가 말했잖아요!? 몇 시간 만에 가치가 반 토막 이하가 될 줄 상상이나 했겠느냐고요!?」"

[[dialogue]]
speaker_original = "ヒマワリ"
speaker_translation = "히마와리"
original = "「えっ、慎重にやったのにどうして……あんなに仕込まれてるのが見え見えだったのに……そんなのわざと溶かすくらいのつもりじゃないと──はっ！」"
translation = "「엣, 신중하게 했는데 어째서…… 그렇게 작전주인 게 뻔히 보였는데…… 그런 건 일부러 날려버릴 작정이 아니면── 핫!」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「そうだよ、ヒマワリちゃん。これはわざと……社長から私たちへのメッセージ……教訓なんだよ！」"
translation = "「그래, 히마와리 짱. 이건 일부러…… 사장님이 우리에게 주는 메시지…… 교훈인 거야!」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「そうじゃなきゃ、こんなお金をドブに捨てるようなことするわけないもんね！」"
translation = "「안 그러면 이런 돈을 길바닥에 버리는 짓을 할 리가 없잖아!」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「ふぐっ！？」"
translation = "「커흑!?」"

[[dialogue]]
speaker_original = "ヒマワリ"
speaker_translation = "히마와리"
original = "「なるほどぉ……見習いのあたしたちに、わざわざ会社の資産を減らしてまで、逆境から立ち上がるメンタルについて教えてくれたんだ……そうですよね、社長！」"
translation = "「과연…… 견습인 저희에게 일부러 회사의 자산을 줄여가면서까지, 역경에서 일어서는 멘탈에 대해 가르쳐 주신 거군요…… 그렇죠, 사장님!」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「そ、そうですわ！\u3000私はそれを言いたかったのです！\u3000おほ、ほーっほっほっ！」"
translation = "「그, 그래요! 저는 그걸 말하고 싶었던 거예요! 오호, 호ー홋홋호!」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「溶けてしまったお金は戻ってきません！\u3000失った過去のはした金より、未来に稼ぐ大金に目を向けるのですわ！」"
translation = "「날아가 버린 돈은 돌아오지 않아요! 잃어버린 과거의 푼돈보다, 미래에 벌어들일 거금에 눈을 돌리는 거예요!」"

[[dialogue]]
speaker_original = "ヒマワリ"
speaker_translation = "히마와리"
original = "「おおー、さすが社長！\u3000その瞳は遥か未来を見通しているんですね！\u3000そんな社長にピッタリの案件が届いてますよ！」"
translation = "「오오ー, 역시 사장님! 그 눈동자는 먼 미래를 내다보고 있군요! 그런 사장님께 딱 맞는 안건이 도착해 있어요!」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「あら、どんなかしら？」"
translation = "「어머, 어떤 건가요?」"

[[dialogue]]
speaker_original = "ヒマワリ"
speaker_translation = "히마와리"
original = "「公安委員会から、社長の<ruby>女帝<rt>エンプレス</rt></ruby>フォームがどうしても必要な超大口案件です！\u3000奇遇にも、ちょうど昨晩の損失とほぼ同額の報酬ですね！」"
translation = "「공안위원회로부터 사장님의 <ruby>여제<rt>엠프레스</rt></ruby> 폼이 꼭 필요한 초대형 안건이에요! 기묘하게도 딱 어젯밤의 손실과 거의 동액의 보수네요!」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「い゛ぃっ！？\u3000またヒマワリと『アレ』をやれというんですの！？\u3000イーヤーでーすーわーっ！\u3000一週間はポンコツになってしまいますのよー！」"
translation = "「이이익!? 또 히마와리랑 『그거』를 하라는 건가요!? 시ー러ー요ー! 일주일은 폐인이 되어버린단 말이에요ー!」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「え、断っちゃうんですか……？\u3000社長の格好いいところが見られると思ったのに……」"
translation = "「에, 거절하시는 건가요……? 사장님의 멋진 모습을 볼 수 있을 거라 생각했는데……」"

[[dialogue]]
speaker_original = "セナリィ"
speaker_translation = "세나리"
original = "「ぐぬぬぬぬぅ……！\u3000わっ、わかりましたわ、やってやります！\u3000やってやればいいのでしょうっ！？」"
translation = "「구누누누누……! 아, 알겠어요, 하면 되잖아요! 하면 되는 거겠죠!?」"

[[dialogue]]
speaker_original = "ミウ"
speaker_translation = "미우"
original = "「それでこそ、私たちのセナリィ社長ですっ♪」"
translation = "「그래야 우리 세나리 사장님이죠♪」"

[[dialogue]]
speaker = "unk"
original = "こうして、ゴールデングースの面々は勇ましく任務へと出撃し。"
translation = "이렇게 해서 골든 구스의 멤버들은 용맹하게 임무로 출격하고."

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「きぃいぃぃやぁあぁぁぁぁぁっっっ！！？！？」"
translation = "「키이이이이이익!!?!?!?」"

[[dialogue]]
speaker = "unk"
original = "<ruby>女帝<rt>エンプレス</rt></ruby>フォームの長時間着用を強いられたセナリィは、運営資金を溶かしたお仕置きとばかりに限界まで酷使されたのであった。"
translation = "<ruby>여제<rt>엠프레스</rt></ruby> 폼의 장시간 착용을 강요받은 세나리는, 운영 자금을 날려버린 벌이라도 받는 듯 한계까지 혹사당한 것이었다."

[[dialogue]]
speaker_original = "セナリィ（覚醒）"
speaker_translation = "세나리(각성)"
original = "「もう投資はコリゴリですわ～～～っ！！」"
translation = "「이제 투자는 지긋지긋해요～～～!!」"

