[[dialogue]]
speaker = "unk"
original = "第３話,出動、プリマステラ,B"
translation = "제3화, 출동, 프리마 스텔라, B"

[[dialogue]]
speaker = "unk"
original = "そうして、アステラの出現地へ降り立った俺たちだが……"
translation = "그렇게, 아스테라의 출현지로 내려선 우리였지만……"

[[dialogue]]
speaker = "モンスター"
original = "「イイイーッ！」"
translation = "「이이잇!」"

[[dialogue]]
speaker = "市民Ａ"
original = "「きゃああ！」"
translation = "「꺄아아!」"

[[dialogue]]
speaker = "クロト"
original = "「街中にもモンスターが溢れてしまっているな……」"
translation = "「시내에도 몬스터가 넘쳐나고 있군……」"

[[dialogue]]
speaker = "マトイ"
original = "「流星の人たちもまだ来てないみたい。早く片付けないと危険かも」"
translation = "「유성의 사람들도 아직 안 온 것 같아. 빨리 처리하지 않으면 위험할지도」"

[[dialogue]]
speaker = "unk"
original = "アステラという巣からぼろぼろと零れるモンスターたちが、次々に周囲の建物を襲っていた。"
translation = "아스테라라는 둥지에서 후두둑 떨어져 나온 몬스터들이, 연달아 주변 건물을 습격하고 있었다."

[[dialogue]]
speaker = "unk"
original = "早く食い止めなければ被害が甚大になる。"
translation = "빨리 막지 않으면 피해가 막대해진다."

[[dialogue]]
speaker = "クロト"
original = "「しょうがない、まずは先にこれらを──」"
translation = "「어쩔 수 없지, 일단 먼저 이것들을──」"

[[dialogue]]
speaker = "unk"
original = "掃除してからアステラ内部へ向かおう。"
translation = "청소하고 나서 아스테라 내부로 향하자."

[[dialogue]]
speaker = "unk"
original = "そう言うより早く、どこからか差し込んだ閃光がモンスターを灰にした。"
translation = "그렇게 말하기가 무섭게, 어디선가 꽂힌 섬광이 몬스터를 재로 만들었다."

[[dialogue]]
speaker = "紅明"
original = "「こっちはアタシたちにお任せでいいぞ☆\u3000ダーリン♪」"
translation = "「이쪽은 우리한테 맡겨도 괜찮아☆ 달링♪」"

[[dialogue]]
speaker = "メルエル"
original = "「会長くん！\u3000お待たせ！」"
translation = "「회장군! 기다렸지!」"

[[dialogue]]
speaker = "クロト"
original = "「紅明、メルエル……プリマステラか！」"
translation = "「홍명, 메르엘…… 프리마 스텔라인가!」"

[[dialogue]]
speaker = "紅明"
original = "「うっしっし♪\u3000街のピンチに出動する<ruby>星騎士<rt>スターナイト</rt></ruby>は星徒会だけじゃねーってことよ！」"
translation = "「우히힛♪ 마을의 위기에 출동하는 성기사는 성도회뿐만이 아니라는 거지!」"

[[dialogue]]
speaker = "unk"
original = "変身を終え、臨戦態勢で駆けつけてきた彼女たちは出動を許可されたプリマステラ。"
translation = "변신을 마치고, 임전 태세로 달려온 그녀들은 출동이 허가된 프리마 스텔라."

[[dialogue]]
speaker = "unk"
original = "彼女たちはその星力をもって、周囲のモンスターたちを撃滅し始めた。"
translation = "그녀들은 그 성력을 가지고, 주변의 몬스터들을 격멸하기 시작했다."

[[dialogue]]
speaker = "メルエル"
original = "「紅明ちゃん！\u3000ペアは初めてだけど、一緒に頑張ろうねっ」"
translation = "「홍명짱! 페어는 처음이지만, 함께 힘내자」"

[[dialogue]]
speaker = "紅明"
original = "「任せろってんだい☆\u3000アタシとメルちーでバッキバキに活躍してやんぜ！」"
translation = "「맡겨 달라고☆ 나랑 메루치랑 박살 나게 활약해 줄 테니까!」"

[[dialogue]]
speaker = "マトイ"
original = "「ペアが初めてとは思えないほどのコンビネーション……。うん、ここは２人に任せちゃって大丈夫そう」"
translation = "「페어가 처음이라고는 생각되지 않을 정도의 콤비네이션……. 응, 여기는 두 사람에게 맡겨도 괜찮을 것 같아」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「クロト。大事なことよ。リクリエの対処は、何も私たち星徒会だけの仕事じゃない──」"
translation = "「쿠로토. 중요한 거야. 리크리에의 대처는, 결코 우리 성도회만의 일이 아니야──」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「新星学園、ううん流星学園も含めて。全星騎士が当たるべき責務なの」"
translation = "「신성 학원, 아니 유성 학원을 포함해서. 모든 성기사가 맡아야 할 책무인 거지」"

[[dialogue]]
speaker = "クロト"
original = "「……なるほどな。任せるのも仕事ってことか」"
translation = "「……과연. 맡기는 것도 일이라는 건가」"

[[dialogue]]
speaker = "unk"
original = "アステラ本拠地の攻略を俺たち星徒会の職務だとすれば──"
translation = "아스테라 본거지의 공략을 우리 성도회의 직무라고 한다면──"

[[dialogue]]
speaker = "unk"
original = "周囲に漏れ出たモンスターの処理は、駆けつけた彼女たちが担ってくれるということらしい。"
translation = "주변으로 새어 나온 몬스터 처리는, 달려온 그녀들이 담당해 줄 것이라는 듯하다."

[[dialogue]]
speaker = "サーシャ"
original = "「と言っても、プリマステラに選ばれるのも簡単じゃないからね～」"
translation = "「그렇다고 해도, 프리마 스텔라로 선택되는 것도 쉽지 않으니까~」"

[[dialogue]]
speaker = "サーシャ"
original = "「そういう意味じゃ、紅明ちゃんもメルエルちゃんもエリートよ♪」"
translation = "「그런 의미에서는, 홍명짱도 메르엘짱도 엘리트야♪」"

[[dialogue]]
speaker = "メルエル"
original = "「あ、ありがとうございますっ。サーシャ先輩」"
translation = "「아, 감사합니다. 사샤 선배」"

[[dialogue]]
speaker = "アナ"
original = "「成績優秀者には褒賞もある。無理せず頑張るのが一番」"
translation = "「성적 우수자에게는 포상도 있다. 무리하지 않고 노력하는 것이 최고」"

[[dialogue]]
speaker = "unk"
original = "なんでも、３年間修行をしても出動許可が得られないなんて話も珍しくないそうで。"
translation = "뭐든지, 3년간 수행을 해도 출동 허가를 받지 못하는 일도 드물지 않다고 한다."

[[dialogue]]
speaker = "unk"
original = "そう考えると、アナの優秀さがより際立った気もする。"
translation = "그렇게 생각하니, 아나의 우수함이 더욱 두드러지는 것 같기도 하다."

[[dialogue]]
speaker = "マトイ"
original = "「ありがとう、紅明さん。私たちは中に入ってくるから──こっちをよろしくね」"
translation = "「고마워, 홍명 씨. 우리는 안으로 들어갈 테니까── 이쪽을 부탁해」"

[[dialogue]]
speaker = "紅明"
original = "「がってんでい！\u3000ま、ちゃちゃっと終わらせちゃってくれよな～☆」"
translation = "「알았어! 뭐, 후딱 끝내 버리고 와 줘~☆」"

[[dialogue]]
speaker = "クロト"
original = "「よし。それじゃ俺たちは根を絶ちに向かおう」"
translation = "「좋아. 그럼 우리는 뿌리를 끊으러 가자」"

[[dialogue]]
speaker = "unk"
original = "<size=40>アステライト【ガニメデ】</size>"
translation = "<size=40>아스테라이트【가니메데】</size>"

[[dialogue]]
speaker = "unk"
original = "そうして俺たちはアステラの内部へと突入する──"
translation = "그렇게 우리는 아스테라 내부로 돌입한다──"

[[dialogue]]
speaker = "unk"
original = "俺が星徒会長に就任して以来、こうして乗り込むのも既に何度目かを迎えつつあった（流星に先を越されることも多々あったが）。"
translation = "내가 성도 회장으로 취임한 이래, 이렇게 진입하는 것도 벌써 몇 번째를 맞이하고 있었다(유성에게 선수를 빼앗기는 일도 많았지만)."

[[dialogue]]
speaker = "unk"
original = "けれど、それでも……この場に来ると昔のトラウマがわずかにぶり返す。"
translation = "하지만, 그럼에도…… 이 장소에 오면 옛 트라우마가 희미하게 되살아난다."

[[dialogue]]
speaker = "クロト"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "マトイ"
original = "「緋宮くん……大丈夫？」"
translation = "「히노미야 군…… 괜찮아?」"

[[dialogue]]
speaker = "クロト"
original = "「……ああ、大丈夫だ。今の俺はみんなを率いる立場なんだから──びびってる場合じゃないさ」"
translation = "「……아아, 괜찮아. 지금의 나는 모두를 이끌 위치니까── 쫄고 있을 때가 아니지」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふふふ、その意気ね！」"
translation = "「후후후, 그 기세야!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「それに日誌に言わせれば、むしろ世界がクロトにびびってるんだから。怖気づく必要はないわ！」"
translation = "「게다가 일지에 따르면, 오히려 세계가 쿠로토에게 쫄고 있는 거니까. 겁먹을 필요는 없어!」"

[[dialogue]]
speaker = "クロト"
original = "「モンスターを掃討しつつ、最深部へ向かう。何が待ち受けるかわからないから用心するように」"
translation = "「몬스터를 소탕하면서, 최심부로 향한다. 무엇이 기다리고 있을지 모르니 조심하도록」"

[[dialogue]]
speaker = "マトイ"
original = "「そっか……流星の人たちが会った……堕天使、だっけ？」"
translation = "「그랬지…… 유성의 사람들이 만났던…… 타락천사, 맞나?」"

[[dialogue]]
speaker = "アナ"
original = "「それはそれで拝んでみたい気持ちもありますが」"
translation = "「그건 그거대로 한번 뵙고 싶은 마음도 있습니다만」"

[[dialogue]]
speaker = "サーシャ"
original = "「天使さんなのに黒いなんて、変よね～」"
translation = "「천사인데 검다니, 이상하지~」"

[[dialogue]]
speaker = "unk"
original = "フィーニスの塔で出会った“守護天使”マグダレナさん──"
translation = "피니스의 탑에서 만났던 “수호 천사” 막달레나 씨──"

[[dialogue]]
speaker = "unk"
original = "フィオナたちが出会った時の彼女は、瘴気に冒されていたという。"
translation = "피오나 일행이 만났을 때의 그녀는, 장기에 휩싸여 있었다고 한다."

[[dialogue]]
speaker = "クロト"
original = "「もし見かけたら俺たちが解放するしかない。慎重に進もう」"
translation = "「만약 보게 된다면 우리가 해방시킬 수밖에 없어. 신중하게 나아가자」"

