[[dialogue]]
speaker = "unk"
original = "第４話,仲良くぴょんぴょん,P"
translation = "제4화, 사이좋게 폴짝폴짝, P"

[[dialogue]]
speaker = "トリシャ"
original = "「ぴょーん、ぴょーん、ぴょーん……」"
translation = "「폴짝, 폴짝, 폴짝……」"

[[dialogue]]
speaker = "蘭美"
original = "「……で？\u3000これはいったいどういうことかしら？」"
translation = "「……그래서? 이건 도대체 어떻게 된 일일까?」"

[[dialogue]]
speaker = "unk"
original = "ただの布教活動です"
translation = "그저 포교 활동입니다"

[[dialogue]]
speaker = "unk"
original = "ぴょんぴょんしてます"
translation = "폴짝폴짝 뛰고 있어요"

[[dialogue]]
speaker = "蘭美"
original = "「何を言っているのか、まるで理解できないわね……」"
translation = "「무슨 말을 하는 건지 전혀 이해할 수가 없네……」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「理解力が足りないやつゆ♪」"
translation = "「이해력이 부족한 녀석이유♪」"

[[dialogue]]
speaker = "蘭美"
original = "「足りないのは理解力ではなく説明力よ」"
translation = "「부족한 건 이해력이 아니라 설명력이야」"

[[dialogue]]
speaker = "ヨミ"
original = "「こやぁ……さすがメイド長、うまいこと言いますね」"
translation = "「코야아…… 역시 메이드장, 말 잘하시네요」"

[[dialogue]]
speaker = "蘭美"
original = "「私がさすがなのは当然なのだけど、今はそんなことはどうでもいいわ。誰でもいいから速やかに説明を──」"
translation = "「내가 대단한 건 당연하지만, 지금은 그런 건 아무래도 좋아. 누구든 좋으니까 신속하게 설명을──」"

[[dialogue]]
speaker = "美鶴"
original = "「ぴょーん、ぴょーん、ぴょーん……」"
translation = "「폴짝, 폴짝, 폴짝……」"

[[dialogue]]
speaker = "閃"
original = "「み、美鶴さん！？\u3000いきなりどうしたんですか？」"
translation = "「미, 미츠루 씨!? 갑자기 왜 그러세요?」"

[[dialogue]]
speaker = "美鶴"
original = "「ミルフィーパイセンに教えてもらって、そのゾンビ型幽霊が出てくる映画を見たんすけどね。ぴょんぴょんしてるのが可愛くて」"
translation = "「밀피 선배한테 배워서 그 좀비형 유령이 나오는 영화를 봤는데요. 폴짝폴짝 뛰는 게 귀여워서요」"

[[dialogue]]
speaker = "トリシャ"
original = "「さすがミルフィーさんです、いつの間にか布教していたのですね」"
translation = "「역시 밀피 씨입니다, 어느새 포교하고 계셨군요」"

[[dialogue]]
speaker = "蘭美"
original = "「勝手にうちのメイドに布教しないで欲しいわね」"
translation = "「마음대로 우리 메이드한테 포교하지 않았으면 좋겠는데」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「許可取ればいいゆ？」"
translation = "「허락받으면 된다유?」"

[[dialogue]]
speaker = "蘭美"
original = "「そういう問題ではないわ。まったく……」"
translation = "「그런 문제가 아니야. 정말이지……」"

[[dialogue]]
speaker = "ヨミ"
original = "「ええと、こんな感じですか？\u3000ぴょーん、ぴょーん、ぴょーん♪\u3000わわっ、確かに楽しくなってきたかも？」"
translation = "「에또, 이런 느낌인가요? 폴짝, 폴짝, 폴짝♪ 와왓, 확실히 즐거워진 걸지도?」"

[[dialogue]]
speaker = "美鶴"
original = "「おー、ヨミー。いい感じじゃん」"
translation = "「오ー, 요미. 느낌 좋은데」"

[[dialogue]]
speaker = "蘭美"
original = "「私が見ている前でぴょんぴょんするなんていい度胸だわ。これを止めるにはどうしたらいいのかしら？」"
translation = "「내가 보는 앞에서 폴짝폴짝 뛰다니 배짱 한번 좋네. 이걸 멈추려면 어떻게 해야 하는 걸까?」"

[[dialogue]]
speaker = "トリシャ"
original = "「額に貼ったお札を剥がせば、動きを止めることができます……」"
translation = "「이마에 붙인 부적을 떼면 움직임을 멈출 수 있습니다……」"

[[dialogue]]
speaker = "unk"
original = "という設定なんです"
translation = "라는 설정입니다"

[[dialogue]]
speaker = "蘭美"
original = "「ふふっ、それなら簡単ね！\u3000この私が最速で収めて見せるわ！」"
translation = "「후훗, 그렇다면 간단하네! 이 내가 최속으로 수습해 보이겠어!」"

[[dialogue]]
speaker = "トリシャ"
original = "「ぴょーん、ぴょーん、ぴょーん！」"
translation = "「폴짝, 폴짝, 폴짝!」"

[[dialogue]]
speaker = "蘭美"
original = "「あっ！\u3000待ちなさいっ！」"
translation = "「앗! 기다려!」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「お札はいっぱいあるゆ♪\u3000みんなもこれで幽霊ゾンビになるゆ～♪」"
translation = "「부적은 잔뜩 있다유♪ 모두들 이걸로 유령 좀비가 되자유~♪」"

[[dialogue]]
speaker = "美鶴"
original = "「えっと……ほいっ」"
translation = "「에또…… 홋」"

[[dialogue]]
speaker = "閃"
original = "「ちょっ、私にも貼るんですか！？」"
translation = "「잠깐, 저한테도 붙이는 건가요!?」"

[[dialogue]]
speaker = "美鶴"
original = "「一番近くにいたから」"
translation = "「가장 가까이 있었으니까」"

[[dialogue]]
speaker = "ヨミ"
original = "「えっと、これを剥がされたら動いちゃダメってことですよね？」"
translation = "「에또, 이걸 떼이면 움직이면 안 된다는 거죠?」"

[[dialogue]]
speaker = "美鶴"
original = "「そゆこと、だから剥がされないように気をつけてね」"
translation = "「그렇지, 그러니까 안 떼이게 조심해」"

[[dialogue]]
speaker = "せつな"
original = "「そいやっ！」"
translation = "「소이야!」"

[[dialogue]]
speaker = "美鶴"
original = "「あ……せつなにお札取られた」"
translation = "「아…… 세츠나한테 부적 뺏겼다」"

[[dialogue]]
speaker = "せつな"
original = "「油断大敵でござるよ、美鶴殿」"
translation = "「방심은 금물이오, 미츠루 공」"

[[dialogue]]
speaker = "美鶴"
original = "「……………………」"
translation = "「……………………」"

[[dialogue]]
speaker = "せつな"
original = "「お札を剥がされたら、話すのもダメなのでござるか？」"
translation = "「부적을 떼이면 말하는 것도 안 되는 것이오?」"

[[dialogue]]
speaker = "トリシャ"
original = "「そんな設定はないはずです。そもそも幽霊ゾンビは話せませんし」"
translation = "「그런 설정은 없을 겁니다. 애초에 유령 좀비는 말을 못 하니까요」"

[[dialogue]]
speaker = "せつな"
original = "「なるほどなるほど。ひとまずお札は返すでござるよ、美鶴殿」"
translation = "「과연 과연. 일단 부적은 돌려주겠소, 미츠루 공」"

[[dialogue]]
speaker = "美鶴"
original = "「長篠美鶴……ふっか～つ」"
translation = "「나가시노 미츠루…… 부~활」"

[[dialogue]]
speaker = "せつな"
original = "「しかしこれはよい修行になるでござるな～……ほいっと！」"
translation = "「하지만 이건 좋은 수행이 되겠구려~…… 영차!」"

[[dialogue]]
speaker = "閃"
original = "「ハッ！\u3000お札は取らせませんよ！」"
translation = "「하앗! 부적은 넘겨주지 않겠어요!」"

[[dialogue]]
speaker = "せつな"
original = "「おお、さすが閃殿、いい動きでござる」"
translation = "「오오, 역시 센 공, 좋은 움직임이구려」"

[[dialogue]]
speaker = "トリシャ"
original = "「ぴょんぴょんするのを忘れないでください。普通に動くのは反則ですから……」"
translation = "「깡충깡충 뛰는 걸 잊지 마세요. 평범하게 움직이는 건 반칙이니까요……」"

[[dialogue]]
speaker = "せつな"
original = "「了解でござる。こうでござるか？\u3000ぴょーんっ、ぴょーんっ、ぴょーんっ！」"
translation = "「알겠소이다. 이렇게 말이오? 깡충~, 깡충~, 깡충~!」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「こいつすごいゆ！\u3000１人だけジャンプの高さがおかしいゆ～♪」"
translation = "「이 녀석 대단하다유! 혼자서만 점프 높이가 이상하다유~♪」"

[[dialogue]]
speaker = "せつな"
original = "「はっはっは！\u3000忍者でござるからな～♪」"
translation = "「핫핫하! 닌자니까 말이오~♪」"

[[dialogue]]
speaker = "ヨミ"
original = "「こうなるとお札を守るのも難しそうですね……」"
translation = "「이렇게 되면 부적을 지키는 것도 어려워 보이네요……」"

[[dialogue]]
speaker = "トリシャ"
original = "「フフフ……そんな時は隊列を組むのです。単独では攻撃に弱くとも、一列に連なれば互いを守りやすくなります……」"
translation = "「후후후…… 그럴 때는 대열을 짜는 거예요. 단독으로는 공격에 취약해도, 일렬로 늘어서면 서로를 지키기 쉬워집니다……」"

[[dialogue]]
speaker = "トリシャ"
original = "「皆さん、私についてきてください……ぴょーん、ぴょーん……」"
translation = "「여러분, 저를 따라오세요…… 깡충, 깡충……」"

[[dialogue]]
speaker = "閃"
original = "「失礼します。ぴょーん、ぴょーん……」"
translation = "「실례하겠습니다. 깡충, 깡충……」"

[[dialogue]]
speaker = "美鶴"
original = "「ぴょーん、ぴょーん……」"
translation = "「깡충, 깡충……」"

[[dialogue]]
speaker = "ヨミ"
original = "「こやぁぁっ、出遅れましたっ。私もぴょんぴょんしますよ～！\u3000ぴょーん、ぴょーん♪」"
translation = "「코야아앗, 늦어버렸어요. 저도 깡충깡충 뛸게요~! 깡충, 깡충♪」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「余もぴょんぴょんするゆ♪」"
translation = "「짐도 깡충깡충 뛸 거다유♪」"

[[dialogue]]
speaker = "unk"
original = "収拾がつかなくなってるぞ"
translation = "수습이 안 되고 있군"

[[dialogue]]
speaker = "unk"
original = "おーい、そろそろやめないか？"
translation = "어이, 슬슬 그만두지 않을래?"

[[dialogue]]
speaker = "蘭美"
original = "「ふふ、さすがは会長。締めるべきところはきちんと締めてくれるのね！」"
translation = "「후후, 역시 회장님. 조여야 할 곳은 확실히 조여주는구나!」"

[[dialogue]]
speaker = "蘭美"
original = "「さあ、そろそろそのぴょんぴょんをやめて仕事に戻りなさい！」"
translation = "「자, 슬슬 그 깡충깡충은 그만두고 일로 돌아가렴!」"

[[dialogue]]
speaker = "ヨミ"
original = "「こやっ！\u3000そうです、今はお仕事中でした……」"
translation = "「코얏! 맞아요, 지금은 업무 중이었죠……」"

[[dialogue]]
speaker = "閃"
original = "「そ、そうですよ！\u3000お札を剥がして、お仕事に戻りましょう」"
translation = "「그, 그래요! 부적을 떼고, 업무로 돌아가죠」"

[[dialogue]]
speaker = "美鶴"
original = "「ま、仕方なしだね」"
translation = "「뭐, 어쩔 수 없네」"

[[dialogue]]
speaker = "トリシャ"
original = "「もうおしまいですか……残念です。仲間が沢山増えましたのに……」"
translation = "「벌써 끝인가요…… 아쉽네요. 동료가 잔뜩 늘었는데……」"

[[dialogue]]
speaker = "ジャクリーヌ"
original = "「余は止められないゆ♪\u3000誰に言われても続けるゆ～♪」"
translation = "「짐은 멈출 수 없다유♪ 누가 뭐래도 계속할 거다유~♪」"

[[dialogue]]
speaker = "蘭美"
original = "「はぁ……まあ好きになさい。貴方たちも、休憩時間なら許可するわ！\u3000ただし！\u3000それ以外の時間はきちんと仕事に集中しなさい！」"
translation = "「하아…… 뭐 마음대로 하렴. 너희도, 휴식 시간이라면 허가할게! 단! 그 이외의 시간은 제대로 업무에 집중해!」"

[[dialogue]]
speaker = "蘭美"
original = "「もし無断でぴょんぴょんしている者を見つけたら、私が容赦なくお札をビリビリに破いてあげるわ！」"
translation = "「만약 무단으로 깡충깡충 뛰는 자를 발견하면, 내가 가차 없이 부적을 갈기갈기 찢어버릴 테니까!」"

[[dialogue]]
speaker = "トリシャ"
original = "「はぅ……残念です……」"
translation = "「하으…… 유감입니다……」"

[[dialogue]]
speaker = "unk"
original = "こうして、成功しかけた俺とトリシャさんの布教活動は、蘭美によって中断させられるのだった。"
translation = "이렇게, 성공할 뻔했던 나와 트리샤 씨의 포교 활동은, 라미에 의해 중단되는 것이었다."

[[dialogue]]
speaker = "蘭美"
original = "「………………ぴょん」"
translation = "「………………깡충」"

[[dialogue]]
speaker = "蘭美"
original = "「ふふふふふっ、ぴょん♪\u3000ぴょん♪\u3000あそーれ、ぴょんぴょんっ♪」"
translation = "「후후후후훗, 깡충♪ 깡충♪ 얼쑤, 깡충깡충♪」"

[[dialogue]]
speaker = "トリシャ"
original = "「……蘭美さん、よいジャンプです」"
translation = "「……라미 씨, 좋은 점프예요」"

[[dialogue]]
speaker = "蘭美"
original = "「ひゃわぁぁぁっ！！？\u3000あ、あ、貴方っ、い、いつの間にそこに！？」"
translation = "「히야와아아앗!!? 너, 너, 당신, 어, 어느 틈에 거기에!?」"

[[dialogue]]
speaker = "unk"
original = "可愛くぴょんぴょんしてた"
translation = "귀엽게 깡충깡충 뛰고 있었어"

[[dialogue]]
speaker = "unk"
original = "さっきからいたよ"
translation = "아까부터 있었어"

[[dialogue]]
speaker = "蘭美"
original = "「わわ、忘れなさい！\u3000今すぐ！」"
translation = "「이, 잊어버려! 지금 당장!」"

[[dialogue]]
speaker = "トリシャ"
original = "「画竜点睛を欠く……蘭美さんには大事なものが不足しています」"
translation = "「화룡점정을 찍지 못했군요…… 라미 씨에게는 중요한 것이 부족합니다」"

[[dialogue]]
speaker = "トリシャ"
original = "「どうぞ、お札です。額に貼ってください」"
translation = "「여기요, 부적입니다. 이마에 붙여주세요」"

[[dialogue]]
speaker = "蘭美"
original = "「だからこれはっ、そういうことではなくて！」"
translation = "「그러니까 이건, 그런 게 아니라니까!」"

[[dialogue]]
speaker = "蘭美"
original = "「ぴょんぴょんしちゃうのは、ウサギ系魔族の本能なんだぴょん～～～！！」"
translation = "「깡충깡충 뛰어버리는 건, 토끼계 마족의 본능이라깡충~~!!」"

[[dialogue]]
speaker = "unk"
original = "結局、本能には逆らえない蘭美も参加して、みんなで仲良くぴょんぴょんするのだった。"
translation = "결국, 본능에는 거스를 수 없는 라미도 참가해서, 다 함께 사이좋게 깡충깡충 뛰는 것이었다."

