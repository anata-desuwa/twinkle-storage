[[dialogue]]
speaker = "unk"
original = "第４話,いつまでもはんぶんこ,P"
translation = "제4화, 언제까지나 반씩 나누기, P"

[[dialogue]]
speaker = "unk"
original = "ヨミにプロポーズした夜から、数日が経った。"
translation = "요미에게 프로포즈한 밤으로부터 며칠이 지났다."

[[dialogue]]
speaker = "unk"
original = "元々恋人同士だったこともあって、表面上は特に大きな変化もない。"
translation = "원래 연인 사이였던 점도 있어서 겉으로는 딱히 큰 변화도 없다."

[[dialogue]]
speaker = "unk"
original = "ただ、２人の意識は明らかに変わった。結婚について、より深く考えるようになっていたんだ。"
translation = "다만 두 사람의 의식은 분명히 바뀌었다. 결혼에 대해 좀 더 깊이 생각하게 된 것이다."

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「お、お邪魔しまぁーす……」"
translation = "「시, 실례하겠습니이당……」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「えへへ、会長の家、来ちゃった……何度か来てますけど、今回は特別な感じがします」"
translation = "「에헤헤, 회장님 댁에 와버렸어요…… 몇 번 왔었지만 이번에는 특별한 느낌이 들어요」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「だって今日はいつもと違う、特別な理由でお邪魔したんですから」"
translation = "「왜냐면 오늘은 평소와 다른 특별한 이유로 방문했으니까요」"

[[dialogue]]
speaker = "unk"
original = "そうだね。いつもと違う理由だ"
translation = "그렇네. 평소와 다른 이유지"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「そう……」"
translation = "「그래요……」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「ズバリ、花嫁修業のやり直し、です！」"
translation = "「바로 신부 수업 다시 하기, 입니다!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「この前はメイド長とトワ先生もいて、わちゃわちゃしちゃいましたからね。あれで花嫁修業をしたとは、とても言えません」"
translation = "「지난번에는 메이드장님과 토와 선생님도 계셔서 왁자지껄해져 버렸으니까요. 그걸로 신부 수업을 했다고는 도저히 말할 수 없어요」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「もちろん、普段からメイドとして家事の腕は磨いてますけど、お嫁さんのスキルはまたちょっと異なりますし」"
translation = "「물론 평소에 메이드로서 가사 실력은 닦고 있지만 아내의 스킬은 또 조금 다르니까요」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「あの夜、情熱的なプロポーズをして頂きましたから……私も、会長のお嫁さんになるつもりで、もっと勉強したいんです」"
translation = "「그날 밤 정열적인 프로포즈를 받았으니까…… 저도 회장님의 아내가 될 생각으로 좀 더 공부하고 싶어요」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「特に私はお料理があまり得意ではないので、料理上手な会長に、是非教えて頂けたらな～、と」"
translation = "「특히 저는 요리를 잘 못해서 요리를 잘하시는 회장님이 꼭 가르쳐 주셨으면~ 해서요」"

[[dialogue]]
speaker = "unk"
original = "じゃあ、一緒に料理しよう"
translation = "그럼 같이 요리하자"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「はいっ、よろしくお願いしますね、会長！」"
translation = "「네, 잘 부탁드려요, 회장님!」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「あ、そうです。いいことを思いつきました。雰囲気を出すためにこういうのはどうでしょう？」"
translation = "「아, 맞다. 좋은 게 생각났어요. 분위기를 내기 위해 이런 건 어떨까요?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「お料理、いっぱい教えて下さいね……あ・な・た<emoji=heart04>」"
translation = "「요리 잔뜩 가르쳐 주세요…… 여·보<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "かわいすぎて抱き締めたい！"
translation = "너무 귀여워서 껴안고 싶어!"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「きゃん<emoji=heart04>\u3000もう、急に抱き締めないで下さいよぉ。ちゃんと最初に言ってくれたら、好きなだけぎゅうってさせてあげるので……」"
translation = "「꺄앙<emoji=heart04> 정말, 갑자기 껴안지 마세요오. 제대로 처음에 말해주면 원하는 만큼 꽉 안게 해드릴 테니까……」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「って、何言ってんだろ、私。えへへ～、少し調子に乗りすぎちゃいましたね」"
translation = "「라니, 나 무슨 소릴 하는 거지. 에헤헤~ 조금 너무 들떴나 보네요」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「今はお料理の修業です♪\u3000未来の花嫁さんとして、精いっぱいあなた好みの料理が作れるよう、頑張りますね<emoji=heart04>」"
translation = "「지금은 요리 수행 중이에요♪ 미래의 신부로서 정성껏 당신 취향의 요리를 만들 수 있도록 노력할게요<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「で、できましたぁ～♪」"
translation = "「다, 다 됐어요~♪」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「一緒に作ったのに、かなり時間かかっちゃいましたね」"
translation = "「같이 만들었는데 꽤 시간이 걸려 버렸네요」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「でも、どうしておいなりさん？\u3000私はあなたの好物を作りたかったのに」"
translation = "「그런데 왜 유부초밥이에요? 저는 당신이 좋아하는 걸 만들고 싶었는데」"

[[dialogue]]
speaker = "unk"
original = "俺はヨミの好物を作りたかったから"
translation = "나는 요미가 좋아하는 걸 만들고 싶었으니까"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「もぉ……結婚する前からお嫁さんを甘やかしすぎですよ<emoji=heart04>」"
translation = "「정말…… 결혼하기 전부터 신부를 너무 응석받이로 만드시는 거 아니에요?<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「でも、一緒においなりさん作るの楽しかったです。作ったり、作ってもらったりじゃなくて、こういう共同作業も仲良し夫婦って感じがしていいですね」"
translation = "「하지만 같이 유부초밥 만드는 거 즐거웠어요. 만들어 주거나 받는 게 아니라 이런 공동 작업도 사이좋은 부부 같은 느낌이 들어서 좋네요」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「次は……あなたが好きなものを一緒に作りましょう<emoji=heart04>\u3000ハンバーグ？\u3000それとも餃子がいいかな？\u3000ふふっ、一緒に作れたら、楽しい花嫁修業になりそうです♪」"
translation = "「다음은…… 당신이 좋아하는 걸 같이 만들어요<emoji=heart04> 함바그? 아니면 만두가 좋을까요? 후훗, 같이 만들 수 있다면 즐거운 신부 수업이 될 것 같아요♪」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「ということで、次の約束も決めたところで、おいなりさんを食べましょう♪」"
translation = "「그럼 다음 약속도 정했으니 유부초밥을 먹어요♪」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「もう、さっきからいい匂いがして、おなかぐーぐー言ってたんですよ～」"
translation = "「정말, 아까부터 좋은 냄새가 나서 배에서 꼬르륵 소리가 났단 말이에요~」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「じゃあ、まずはお１つどうぞ……はい、あーん<emoji=heart04>」"
translation = "「자, 그럼 먼저 하나 드세요…… 자, 아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「えへへ～、あーんって食べさせてもらうの恥ずかしいですか？\u3000でも、私こういうのしたかったんです。だから、お願いします、あ・な・た<emoji=heart04>」"
translation = "「에헤헤~, 아앙 하고 받아먹는 거 부끄러우세요? 하지만 저 이런 거 하고 싶었어요. 그러니까 부탁드려요, 여·보<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "じゃあ、食べさせてもらっちゃおうかな"
translation = "그럼 받아먹어 볼까나"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「どうぞどうぞ♪\u3000では改めて……はい、あーん<emoji=heart04>」"
translation = "「드세요 드세요♪ 그럼 다시 한번…… 자, 아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「あっ、無理に１口で食べなくていいですよ。はむっと半分にかじるくらいがちょうどいいサイズです」"
translation = "「앗, 무리하게 한입에 안 드셔도 돼요. 냠 하고 반으로 베어 물 정도가 딱 좋은 사이즈예요」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「そうそう、半分で。どうですか？\u3000おいしくできてますか？」"
translation = "「그래요 그래요, 반으로. 어때요? 맛있게 됐나요?」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「えへへ～、爆裂おいしいって、顔を見ればわかります♪\u3000そんなにおいしいなら、私も……」"
translation = "「에헤헤~, 폭발적으로 맛있다는 건 얼굴을 보면 알 수 있어요♪ 그렇게 맛있다면 저도……」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「はむっ、もぐもぐもぐ……」"
translation = "「하암, 우물우물우물……」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「うんっ、おいし～い♪\u3000半分こにしたから、余計おいしく感じちゃいますね」"
translation = "「응, 맛있어~요♪ 반으로 나눴으니까 훨씬 더 맛있게 느껴지네요」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「こんな風に何でも分け合える夫婦になりたいですね、私達<emoji=heart04>」"
translation = "「이런 식으로 무엇이든 서로 나눌 수 있는 부부가 되고 싶네요, 저희들<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「そしたらきっと、いつまでも仲良し夫婦です♪\u3000何年も経って、おじいちゃんとおばあちゃんになっても……」"
translation = "「그러면 분명 언제까지나 사이좋은 부부일 거예요♪ 몇 년이 지나서 할아버지와 할머니가 되어도……」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「こんな風に互いの好物を作って、おいしいねって一緒に笑い合うんです」"
translation = "「이런 식으로 서로의 좋아하는 음식을 만들고, 맛있네라며 함께 웃는 거예요」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「それが……私の理想の夫婦かな～って。今ふとそう思っちゃいました」"
translation = "「그게…… 제 이상적인 부부일까~ 하고 지금 문득 생각했어요」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「どうですか？\u3000あなたもそういうのがいいなって思ってくれると嬉しいんですけど……」"
translation = "「어떠세요? 당신도 그런 게 좋겠다고 생각해 주시면 기쁘겠는데……」"

[[dialogue]]
speaker = "unk"
original = "いつまでも半分こにしようね"
translation = "언제까지나 반으로 나누자"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「こやんっ<emoji=heart04>\u3000もちろんです。ずっとずっと……２人は一緒ですから」"
translation = "「코양<emoji=heart04> 물론이죠. 계속 계속…… 둘은 함께니까요」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「嬉しいことも、悲しいことも……楽しいことも、つらいことも……２人で分け合ったら、きっと全部楽しくなっちゃうはずです」"
translation = "「기쁜 일도, 슬픈 일도…… 즐거운 일도, 괴로운 일도…… 둘이서 나누면 분명 전부 즐거워질 거예요」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「そんな夫婦になりましょうね。なれたらいいなぁ～」"
translation = "「그런 부부가 되기로 해요. 될 수 있으면 좋겠다~」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「そのためには、もっともっと花嫁修業を頑張らなきゃ」"
translation = "「그러기 위해서는 좀 더 좀 더 신부 수업을 열심히 해야겠어요」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「１人でやったら大変だけど、でも大丈夫。一緒に分け合うあなたがいれば、きっと笑顔でいっぱいですから<emoji=heart04>」"
translation = "「혼자서 하면 힘들겠지만, 그래도 괜찮아요. 함께 나누는 당신이 있다면 분명 웃음으로 가득할 테니까요<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヨミ"
speaker_translation = "요미"
original = "「そういう家庭を、２人で築いていきましょうね<emoji=heart04>」"
translation = "「그런 가정을 둘이서 일구어 나가요<emoji=heart04>」"

