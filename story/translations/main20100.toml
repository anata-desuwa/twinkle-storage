[[dialogue]]
speaker = "unk"
original = "第０話,破滅の連鎖,B"
translation = "제0화, 파멸의 연쇄"

[[dialogue]]
speaker = "unk"
original = "滅亡が具現していた。"
translation = "멸망이 구현되어 있었다."

[[dialogue]]
speaker = "unk"
original = "“<ruby>世界の再創生<rt>リ・クリエイション</rt></ruby>”を命じられた<emoji=abb><emoji=abb>は既に魔王の器さえ取り込み、退廃した荒野をなお終わらぬ暴虐に巻き込んでゆく。"
translation = "“<ruby>세계의 재창생<rt>리크리에</rt></ruby>”을 명받은 <emoji=abb><emoji=abb>은 이미 마왕의 그릇마저 집어삼키고, 황폐해진 황야를 여전히 끝나지 않는 폭거 속으로 휘말리게 한다."

[[dialogue]]
speaker = "unk"
original = "創るなら、まず壊す。"
translation = "창조하려면, 우선 부순다."

[[dialogue]]
speaker = "unk"
original = "単純な道理であっても、それが億万の力で実行されれば世界はひとたまりもない。"
translation = "단순한 도리일지라도, 그것이 억만의 힘으로 실행되면 세계는 버텨낼 재간이 없다."

[[dialogue]]
speaker = "？？？"
original = "「グ……オ……ギ……ギギ……ガ……ゴ……ググ……」"
translation = "「그…… 오…… 기…… 기기…… 가…… 고…… 구구……」"

[[dialogue]]
speaker = "unk"
original = "破壊の化身が唸りを上げる。"
translation = "파괴의 화신이 신음 소리를 내뱉는다."

[[dialogue]]
speaker = "？？？"
original = "「立て、フィオナ！\u3000動け！\u3000逃げろっ！！」"
translation = "「일어나, 피오나! 움직여! 도망쳐!!」"

[[dialogue]]
speaker = "unk"
original = "残された最後の芽を摘むべく、絶望の黒き<ruby>腕<rt>かいな</rt></ruby>が<ruby>颶風<rt>ぐふう</rt></ruby>とともに迸った。"
translation = "남겨진 마지막 싹을 틔우기 위해, 절망의 검은 팔이 구풍과 함께 번뜩였다."

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "（ごめん、エリシア──私のせいで）"
translation = "(미안해, 엘리시아── 나 때문에)"

[[dialogue]]
speaker = "？？？"
original = "「フィオナ！\u3000フィオナーーーーーッ！！！」"
translation = "「피오나! 피오나아아아아아아!!」"

[[dialogue]]
speaker = "unk"
original = "世界が１つ滅んだ。"
translation = "세계가 하나 멸망했다."

[[dialogue]]
speaker = "unk"
original = "それもまた、神すら超える秩序によって定められた運命──"
translation = "그것 또한, 신조차 초월하는 질서에 의해 정해진 운명──"

