[[dialogue]]
speaker = "unk"
original = "第２話,ドレスの着こなし？,P"
translation = "제2화, 드레스 소화하기?, P"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「行きますよ──サンバーストセレモニー！」"
translation = "「갑니다── 선버스트 세레모니!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「モンスター撃破。さすがにもう緋宮会長の敵ではありませんね」"
translation = "「몬스터 격파. 역시 이제 히노미야 회장의 적은 아니네요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「訓練にお付き合いいただいてありがとうございました」"
translation = "「훈련에 함께해 주셔서 고마웠습니다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「事故とはいえ、せっかく手に入れたウェディングドレスの戦闘服ですから。もっと上手く使いこなしたいと思いまして」"
translation = "「사고였다고는 해도, 모처럼 손에 넣은 웨딩드레스 전투복이니까요. 더 능숙하게 다루고 싶어서요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「でもトレーニング用のシミュレーターでは限界を感じますね。もっと上を目指せると思うんですけど……」"
translation = "「하지만 트레이닝용 시뮬레이터로는 한계를 느껴요. 더 위를 목표로 할 수 있을 것 같은데……」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「あ、いたいたー。フィオナちゃん、新しい戦闘服でトレーニングしてたんだ？\u3000真面目だねー」"
translation = "「아, 여기 있었네ー. 피오나짱, 새 전투복으로 트레이닝하고 있었어? 성실하네ー」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「いえいえ。星徒会長なんですから、これくらいは当然です」"
translation = "「아뇨 아뇨. 성도회장이니까, 이 정도는 당연해요」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「さっすがフィオナちゃん。でも──」"
translation = "「역시 피오나짱. 하지만──」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「でも？」"
translation = "「하지만요?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「ウェディングドレス着てるから、２人でイチャイチャしてるのかと思っちゃった♪」"
translation = "「웨딩드레스 입고 있으니까, 둘이서 알콩달콩하고 있는 줄 알았어♪」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ひゃいっ！？」"
translation = "「햐앗!?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「会長さんも、こ～んな綺麗なドレスのフィオナちゃんと２人きりだったら、ついつい見惚れちゃうよね～？」"
translation = "「회장님도, 이~렇게 예쁜 드레스의 피오나짱과 둘이서만 있다면, 무심코 넋을 잃게 되지~?」"

[[dialogue]]
speaker = "unk"
original = "それはもちろん"
translation = "그건 물론이지"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「緋宮会長！？」"
translation = "「히노미야 회장!?」"

[[dialogue]]
speaker = "unk"
original = "本当はずっとイチャイチャしてたいです"
translation = "사실은 계속 알콩달콩하고 싶어"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ひのみやかいちょ～～～っ！！？」"
translation = "「히노미야 회자아아앙~~~읏!!!?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「あはは、はははっ！\u3000会長さん正直すぎ！」"
translation = "「아하하, 하하핫! 회장님 너무 솔직해!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「もう、セーラさんも緋宮会長もからかわないでください……」"
translation = "「정말, 세라 씨도 히노미야 회장도 놀리지 마세요……」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「からかってなんかないって。好きな人とは一緒にいたいもんね～」"
translation = "「놀리는 거 아니거든. 좋아하는 사람이랑은 같이 있고 싶잖아~」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「でもさ、使いこなすならやっぱり実戦が一番じゃない？\u3000そのドレス、人前だと恥ずかしくなって、ぎこちなくなったりしちゃわない？」"
translation = "「근데 말야, 능숙하게 다루려면 역시 실전이 최고 아니야? 그 드레스, 사람들 앞에서는 부끄러워져서, 어색해지거나 그러지 않아?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「そ、そんなことはないと思いますけど……」"
translation = "「그, 그럴 리는 없다고 생각하지만요……」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「おっと！\u3000丁度いいところにモンスター！\u3000うちらでやっちゃおっか♪」"
translation = "「엇! 마침 좋은 곳에 몬스터! 우리끼리 해치워 버릴까♪」"

[[dialogue]]
speaker_original = "モンスター"
speaker_translation = "몬스터"
original = "「イ～～～～～ッ！」"
translation = "「이~~~~~~~읏!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「こ、こんな人の多いところでウェディングドレスなんて……」"
translation = "「이, 이렇게 사람이 많은 곳에서 웨딩드레스라니……」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「フィオナちゃん、やっぱり照れてる？」"
translation = "「피오나짱, 역시 부끄러워하고 있어?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「て、照れてませんよ？\u3000まだ慣れないだけで……」"
translation = "「부, 부끄러워하고 있지 않아요? 아직 익숙하지 않을 뿐……」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「じゃあうちは～──」"
translation = "「그럼 나는~──」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「バニーだぴょん♪」"
translation = "「바니야 뿅♪」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「セーラさん！？」"
translation = "「세라 씨!?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「うちもバニーなんだから、フィオナちゃんもウェディングドレスぐらいで恥ずかしがっちゃダメっしょ～。ね、会長さん？」"
translation = "「나도 바니인데, 피오나짱도 웨딩드레스 정도 가지고 부끄러워하면 안 되지~. 안 그래, 회장님?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「あ、緋宮会長、セーラさんのバニーが魅力的なのはわかりますけど、そっちばっかり見ちゃダメですっ」"
translation = "「아, 히노미야 회장, 세라 씨의 바니가 매력적인 건 알겠지만, 그쪽만 보지 마세요읏」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「このドレスを着ている私は、あなたのものですから。あなたのためのドレスなんですから……」"
translation = "「이 드레스를 입고 있는 저는, 당신의 것이니까요. 당신을 위한 드레스니까요……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ちゃんとドレスの私を見てください……ね？」"
translation = "「제대로 드레스를 입은 저를 봐주세요…… 네?」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「きゃ～、フィオナちゃん大胆っ。うちまでちょっと顔熱くなっちゃった」"
translation = "「꺄~, 피오나짱 대담해읏. 나까지 조금 얼굴이 뜨거워졌어」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「～～～～っ！？\u3000こ、これはセーラさんがバニースーツを着るから……」"
translation = "「~~~~읏!? 이, 이것은 세라 씨가 바니 수트를 입으니까……」"

[[dialogue]]
speaker = "unk"
original = "俺が見てるのはずっとフィオナだけだよ"
translation = "내가 보는 건 계속 피오나뿐이야"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「──！？」"
translation = "「──!?」"

[[dialogue]]
speaker = "unk"
original = "フィオナのウェディングドレス、とっても綺麗だ"
translation = "피오나의 웨딩드레스, 정말 예쁘다"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「緋宮会長……」"
translation = "「히노미야 회장……」"

[[dialogue]]
speaker_original = "セーラ"
speaker_translation = "세라"
original = "「おやおや、お熱いことで。お邪魔虫のうちは大人しくモンスターを撃ち落とすとしますかね～」"
translation = "「이런 이런, 뜨겁구만. 방해꾼인 나는 얌전히 몬스터를 쏴 떨어뜨려야겠네~」"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「モンスターが出たって聞いてきたはいいが……フィオナと新星の会長さん、見つめ合って何やってんだ？」"
translation = "「몬스터가 나왔다는 말을 듣고 오긴 했는데…… 피오나랑 신성 학원 회장님, 서로 마주 보면서 뭐 하는 거야?」"

[[dialogue]]
speaker_original = "ルリエル"
speaker_translation = "루리엘"
original = "「つまりアレですね、バカップルってやつです！」"
translation = "「즉 그거네요, 바보 커플이라는 거예요!」"

[[dialogue]]
speaker_original = "ソフィア"
speaker_translation = "소피아"
original = "「ルリ、ストレートに言い過ぎ。まぁフィオナ会長が幸せならＯＫですけど」"
translation = "「루리, 너무 직설적으로 말하네. 뭐 피오나 회장이 행복하다면 OK지만」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「みんな！？\u3000えっと、これはその……これからモンスターを殲滅するところだったの！\u3000ですよね、緋宮会長？」"
translation = "「모두!? 에잇, 이건 그…… 이제부터 몬스터를 섬멸할 참이었어요! 그렇죠, 히노미야 회장?」"

[[dialogue]]
speaker = "unk"
original = "そうそう、これから戦うところ"
translation = "맞아 맞아, 이제부터 싸울 참이었지"

[[dialogue]]
speaker_original = "ユウリ"
speaker_translation = "유우리"
original = "「ホントか～？\u3000いかにも抱き合ったりキスとかしそうな雰囲気だったぞ」"
translation = "「진짜야~? 아무리 봐도 껴안거나 키스라도 할 것 같은 분위기였는데」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ううん、本当に今戦うところだったから！\u3000今全力出すところだったから！\u3000行きますよ、緋宮会長！」"
translation = "「아뇨 아뇨, 정말로 지금 싸울 참이었으니까! 지금 전력을 낼 참이었으니까! 갑니다, 히노미야 회장!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「サニティウィンド！！」"
translation = "「새니티 윈드!!」"

[[dialogue]]
speaker = "unk"
original = "そしてフィオナはモンスター相手に大暴れし、新たな戦闘服を見事にものにしたのであった──"
translation = "그리고 피오나는 몬스터를 상대로 크게 날뛰며, 새로운 전투복을 훌륭하게 자기 것으로 만들었다──"

