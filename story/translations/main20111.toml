[[dialogue]]
speaker = "unk"
original = "第１４話,新たな決着,B"
translation = "제14화, 새로운 결말, B"

[[dialogue]]
speaker = "梨緒"
original = "「ふぅ……はぁ……はぁ……」"
translation = "「후우…… 하아…… 하아……」"

[[dialogue]]
speaker = "クロト"
original = "「はぁ、はぁ……」"
translation = "「하아, 하아……」"

[[dialogue]]
speaker = "unk"
original = "技と技の激突を重ね、お互いに息を切らせる。"
translation = "기술과 기술의 격돌을 거듭하며 서로 숨을 몰아쉰다."

[[dialogue]]
speaker = "unk"
original = "ボロボロになった拳から血がにじむ。力が抜けた足がガクガクと震える。"
translation = "너덜너덜해진 주먹에서 피가 배어 나온다. 힘이 빠진 다리가 후들후들 떨린다."

[[dialogue]]
speaker = "unk"
original = "ここから覚醒して逆転──なんてことはない。"
translation = "여기서 각성해서 역전── 같은 일은 일어나지 않는다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "アリーナ席を振り返る余裕はない。だけど見守ってくれているみんなの気配を感じる。俺の勝利を信じてくれる仲間たちがいる。"
translation = "아레나 석을 돌아볼 여유는 없다. 하지만 지켜봐 주는 모두의 기척이 느껴진다. 나의 승리를 믿어주는 동료들이 있다."

[[dialogue]]
speaker = "unk"
original = "ヴィーナスの時みたいな華々しい戦いを期待している生徒には、地味で泥臭い試合に見えるかもしれない。"
translation = "비너스 때 같은 화려한 싸움을 기대하는 학생에게는 수수하고 진흙탕 싸움처럼 보일지도 모른다."

[[dialogue]]
speaker = "unk"
original = "だけど俺にとっては、今の全力をぶつけた戦いなんだ。"
translation = "하지만 나에게 있어서는 지금의 전력을 다한 싸움이다."

[[dialogue]]
speaker = "梨緒"
original = "「吹きすさべ嵐よ──！」"
translation = "「휘몰아쳐라, 폭풍이여──!」"

[[dialogue]]
speaker = "クロト"
original = "「俺はこの道を進む──！」"
translation = "「나는 이 길을 나아가겠어──!」"

[[dialogue]]
speaker = "unk"
original = "おそらくお互い繰り出せるのはあと一発。"
translation = "아마 서로 내지를 수 있는 건 앞으로 한 발."

[[dialogue]]
speaker = "unk"
original = "すでに全力を振り絞った己に鞭打ち、ありったけの気力を拳に乗せる──！"
translation = "이미 전력을 다한 몸에 채찍질을 하며, 있는 힘껏 기력을 주먹에 싣는다──!"

[[dialogue]]
speaker = "梨緒"
original = "「ライトニングテンペスト！！」"
translation = "「라이트닝 템페스트!!」"

[[dialogue]]
speaker = "クロト"
original = "「ディマイズブレイカー！！」"
translation = "「디마이즈 브레이커!!」"

[[dialogue]]
speaker = "梨緒"
original = "「うおおおおっ！！」"
translation = "「우오오오오!!」"

[[dialogue]]
speaker = "クロト"
original = "「おおおおおおおっ！！」"
translation = "「오오오오오오!!」"

[[dialogue]]
speaker = "梨緒"
original = "「くっ……」"
translation = "「큭……」"

[[dialogue]]
speaker = "unk"
original = "眼が眩む閃光が晴れ、梨緒がとうとう膝を折る。"
translation = "눈이 부신 섬광이 걷히고, 리오가 드디어 무릎을 꿇는다."

[[dialogue]]
speaker = "unk"
original = "アリーナの全員が彼女に注目し、沈黙が広がる。"
translation = "아레나의 모두가 그녀에게 주목하고 침묵이 흐른다."

[[dialogue]]
speaker = "unk"
original = "しかし彼女は地に伏したまま立ち上がれなくて──"
translation = "하지만 그녀는 땅에 엎드린 채 일어서지 못하고──"

[[dialogue]]
speaker = "ラティエ"
original = "「勝者──緋宮クロト！」"
translation = "「승자── 히노미야 쿠로토!」"

[[dialogue]]
speaker = "ラティエ"
original = "「よい戦いだった。おめでとう、君は星徒会長に値するとここに証明された」"
translation = "「좋은 싸움이었다. 축하하네, 자네가 성도회장에 걸맞다는 것이 여기서 증명되었네.」"

[[dialogue]]
speaker = "クロト"
original = "「ありがとう……ございます」"
translation = "「감사……합니다.」"

[[dialogue]]
speaker = "unk"
original = "ラティエ総合学園長が勝ち名乗りを上げた瞬間、緊張の糸が切れてその場に<ruby>頽<rt>くずお</rt></ruby>れた。"
translation = "라티에 종합학원장이 승자 선언을 한 순간, 긴장의 끈이 풀려 그 자리에 주저앉았다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「クロト～～～！！」"
translation = "「쿠로토~~~!!」"

[[dialogue]]
speaker = "クロト"
original = "「わっ」"
translation = "「왓.」"

[[dialogue]]
speaker = "unk"
original = "アリーナ席から飛び出したヴィーナスが俺を抱き締める。"
translation = "아레나 석에서 뛰어내린 비너스가 나를 껴안는다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「もうっ、思ったよりギリギリじゃない。ハラハラさせるんじゃないわよっ」"
translation = "「정말, 생각보다 아슬아슬하잖아. 조마조마하게 만들지 말란 말이야.」"

[[dialogue]]
speaker = "クロト"
original = "「はは……それだけ彼女が強かったんだよ。でも勝ったから」"
translation = "「하하…… 그만큼 그녀가 강했어. 하지만 이겼으니까.」"

[[dialogue]]
speaker = "マトイ"
original = "「前の御前試合の時よりボロボロね……でもかっこよかった」"
translation = "「지난번 어전시합 때보다 너덜너덜하네…… 하지만 멋있었어.」"

[[dialogue]]
speaker = "サーシャ"
original = "「祝勝会でもする～？\u3000紅茶と緑茶ならどっちがいいかしら～？」"
translation = "「축하 파티라도 할까요~? 홍차랑 녹차 중에 어느 게 좋을까요~?」"

[[dialogue]]
speaker = "アナ"
original = "「今日は私がお薦めの和菓子を持ってきました。とっておきです」"
translation = "「오늘은 제가 추천하는 화과자를 가져왔어요. 아껴둔 거예요.」"

[[dialogue]]
speaker = "unk"
original = "星徒会のみんながいつの間にか近くに来ていて、俺を囲んでいる。"
translation = "성도회 모두가 어느새 가까이 와서 나를 에워싸고 있다."

[[dialogue]]
speaker = "unk"
original = "みんなが俺の勝利を喜んでくれているのが嬉しい。"
translation = "모두가 나의 승리를 기뻐해 주는 것이 기쁘다."

[[dialogue]]
speaker = "クロト"
original = "「……ありがとう、みんな」"
translation = "「……고마워, 얘들아.」"

[[dialogue]]
speaker = "unk"
original = "俺はヴィーナスに求められて星徒会長になった。そこに後悔はないし、むしろ誇らしく思っている。"
translation = "나는 비너스의 요구로 성도회장이 됐다. 거기에 후회는 없고, 오히려 자랑스럽게 생각한다."

[[dialogue]]
speaker = "unk"
original = "でもそれはヴィーナスに応えたかっただけで、星徒会長になったのはただの結果だと思っていた。"
translation = "하지만 그건 비너스에게 응하고 싶었을 뿐이지, 성도회장이 된 건 그저 결과라고 생각했었다."

[[dialogue]]
speaker = "unk"
original = "それが今では、俺自身が星徒会長でありたいと望むようになっていた。"
translation = "그것이 지금은 나 자신이 성도회장이고 싶다고 바라게 되었다."

[[dialogue]]
speaker = "unk"
original = "そして今日もう一度、星徒会長になった。他の誰でもない自分の意志で。"
translation = "그리고 오늘 다시 한번 성도회장이 됐다. 다른 누구도 아닌 자신의 의지로."

[[dialogue]]
speaker = "unk"
original = "御前試合の後、梨緒は保健委員の救護を受けずにアリーナを去った。"
translation = "어전시합 후, 리오는 보건위원의 구호를 받지 않고 아레나를 떠났다."

[[dialogue]]
speaker = "unk"
original = "１人になりたかったのもそうだし、惨めな敗者である自分が施しを受けたら、精神に多大なダメージを受けそうだったからだ。"
translation = "혼자 있고 싶었던 것도 있고, 비참한 패자인 자신이 도움을 받으면 정신적으로 큰 타격을 입을 것 같았기 때문이다."

[[dialogue]]
speaker = "梨緒"
original = "「負けた……か……」"
translation = "「졌다니…… 내가……」"

[[dialogue]]
speaker = "梨緒"
original = "「だが私は諦めない。魔王は私が必ず止める……！」"
translation = "「하지만 나는 포기하지 않아. 마왕은 내가 반드시 막는다……!」"

[[dialogue]]
speaker = "？？？"
original = "「魔王は２つの平行世界で決定的な敗北を喫している。その可能性を収束させれば、同じ末路を辿るのはまぁ必然だよね」"
translation = "「마왕은 두 평행세계에서 결정적인 패배를 겪었어. 그 가능성을 수렴시키면 같은 말로를 걷는 건 뭐 필연이겠지.」"

[[dialogue]]
speaker = "梨緒"
original = "「君は……？」"
translation = "「너는……?」"

[[dialogue]]
speaker = "ラクシャ"
original = "「ああごめん独り言。さっきはお疲れ、いい勝負だったね」"
translation = "「아, 미안 혼잣말이야. 방금 전엔 수고했어, 좋은 승부였어.」"

[[dialogue]]
speaker = "ラクシャ"
original = "「ボクは守護天使《円環》のラクシャ。わけあって新星学園の制服を着てるけど、コスプレみたいなものだから」"
translation = "「난 수호천사 《원환》의 락샤. 사정이 있어서 신성학원의 교복을 입고 있지만 코스프레 같은 거니까.」"

[[dialogue]]
speaker = "ラクシャ"
original = "「あ、いや、コスプレで制服着てるのってなんだかいかがわしいな。ははっ、まぁなんでもいっか」"
translation = "「아, 아니, 코스프레로 교복을 입고 있다는 건 왠지 야릇하네. 하핫, 뭐 아무렴 어때.」"

[[dialogue]]
speaker = "梨緒"
original = "「守護天使がいったいどうして……？\u3000私に用なのか？」"
translation = "「수호천사가 도대체 왜……? 나에게 용건인가?」"

[[dialogue]]
speaker = "ラクシャ"
original = "「うん、キミに興味があってね。みんなが知らないこといろいろ知ってそうだし……ちょ～っとお話聞かせてもらえるかな？」"
translation = "「응, 너에게 흥미가 있어서 말이야. 남들이 모르는 걸 이것저것 알고 있을 것 같기도 하고…… 조~금 이야기를 들려줄 수 있을까?」"

