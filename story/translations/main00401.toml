[[dialogue]]
speaker = "unk"
original = "第１話,ヴィーナスの使命,B"
translation = "제1화, 비너스의 사명, B"

[[dialogue]]
speaker = "アポロ"
original = "「ふっふっふっふ！\u3000<b>どこ</b>から持ってきたのか知らないけど、そんなアイテムこのアポロ様の前では無力！」"
translation = "「훗훗훗훗! <b>어디</b>서 가져왔는지 모르겠지만, 그런 아이템은 이 아폴로 님 앞에서는 무력!」"

[[dialogue]]
speaker = "アポロ"
original = "「なぜなら正義のヒーローとは！\u3000どんな悲惨な運命でもひっくり返すからヒーローなのだ！」"
translation = "「왜냐하면 정의의 히어로란! 어떤 비참한 운명이라도 뒤집으니까 히어로인 것이다!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「……ふぅ」"
translation = "「……후우」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "クロト"
original = "「ヴィーナス──ここにいたか。探したよ」"
translation = "「비너스──여기 있었군. 찾았다」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あ……クロト。よくわかったわね」"
translation = "「아…… 쿠로토. 어떻게 알았어」"

[[dialogue]]
speaker = "unk"
original = "トレーニングホールの中でヴィーナスを見つける。"
translation = "트레이닝 홀 안에서 비너스를 발견한다."

[[dialogue]]
speaker = "unk"
original = "先ほどまで星術の音が響いていたから、一人で訓練をしていたようだ。"
translation = "방금 전까지 성술 소리가 울려 퍼졌으니, 혼자 훈련을 하고 있었던 모양이다."

[[dialogue]]
speaker = "クロト"
original = "「みんな星徒会室に集まってるけど……まだ、気になってるのか？」"
translation = "「모두 성도회실에 모여 있는데…… 아직, 신경 쓰고 있는 거야?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「うん──まあね」"
translation = "「응── 뭐 그렇지」"

[[dialogue]]
speaker = "unk"
original = "彼女が開いたのは例の……未来の日誌だ。"
translation = "그녀가 펼친 것은 그…… 미래의 일지다."

[[dialogue]]
speaker = "ヴィーナス"
original = "『<ruby>荒鷹<rt>あらたか</rt></ruby>ノ月十六日。“魔王”は着実に力を取り戻していき、かつての片鱗を見せ始める』"
translation = "『황응의 달 16일. “마왕”은 착실하게 힘을 되찾아가, 예전의 편린을 보이기 시작한다』"

[[dialogue]]
speaker = "ヴィーナス"
original = "『人間界にさしたる異変はなし。星雲巣の脅威もなき今のうちに、対リクリエの準備を進めるとしよう……』"
translation = "『인간계에 별다른 이변은 없음. 성운 소굴의 위협도 없는 지금, 대 리크리에 준비를 진행하도록 하자……』"

[[dialogue]]
speaker = "ヴィーナス"
original = "「……って書いてあるけど。アテになるかはわからないわね」"
translation = "「……라고 쓰여 있지만. 믿을 만한지는 모르겠네」"

[[dialogue]]
speaker = "クロト"
original = "「ヴィーナス……」"
translation = "「비너스……」"

[[dialogue]]
speaker = "unk"
original = "物憂げに笑うヴィーナス。"
translation = "걱정스러운 듯 웃는 비너스."

[[dialogue]]
speaker = "unk"
original = "彼女のこんな面持ちは初めて見た。"
translation = "그녀의 이런 표정은 처음 봤다."

[[dialogue]]
speaker = "unk"
original = "敗戦──というわけでもなかったが、絶対と信じていた未来の日誌を裏切られた衝撃が大きいのだろう。"
translation = "패전──이라고 할 정도는 아니었지만, 절대라고 믿었던 미래의 일지를 배신당한 충격이 큰 것이리라."

[[dialogue]]
speaker = "クロト"
original = "「……ちょっと来てくれないか？」"
translation = "「……잠깐 와주지 않을래?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「？\u3000いいけど」"
translation = "「? 괜찮지만」"

[[dialogue]]
speaker = "unk"
original = "俺は、沈み気味なヴィーナスを連れてトレーニングホールを出た。"
translation = "나는, 침울해진 비너스를 데리고 트레이닝 홀을 나섰다."

[[dialogue]]
speaker = "unk"
original = "大聖堂を訪れた俺たち。"
translation = "대성당을 찾은 우리들."

[[dialogue]]
speaker = "unk"
original = "今はちょうど人もほとんどおらず、異端な話をするにはうってつけだった。"
translation = "지금은 마침 사람도 거의 없어서, 이단적인 이야기를 하기에는 안성맞춤이었다."

[[dialogue]]
speaker = "クロト"
original = "「ヴィーナスは前に……言ってたよな。魔王は英雄なんだって」"
translation = "「비너스는 전에…… 말했었지. 마왕은 영웅이라고」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ええ」"
translation = "「네」"

[[dialogue]]
speaker = "クロト"
original = "「あの子──アポロも、俺のことを“魔王”と呼んだ」"
translation = "「그 아이── 아폴로도, 나를 “마왕”이라고 불렀다」"

[[dialogue]]
speaker = "クロト"
original = "「これは偶然か？」"
translation = "「이건 우연일까?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「偶然……では、ないでしょうね。恐らくだけどあの子も──何らかの経緯でクロトこそ魔王だと確信してる」"
translation = "「우연……은 아니겠죠. 아마도 그 아이도── 어떤 경위로 쿠로토야말로 마왕이라고 확신하고 있을 거예요」"

[[dialogue]]
speaker = "クロト"
original = "「何らかの経緯か……ヴィーナスにとっては、それが」"
translation = "「어떤 경위라…… 비너스에게는, 그게」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ええ。例の日誌だった」"
translation = "「네. 그 일지였어요」"

[[dialogue]]
speaker = "unk"
original = "緋宮クロトこそが魔王である。"
translation = "히노미야 쿠로토야말로 마왕이다."

[[dialogue]]
speaker = "unk"
original = "他の情報を一切捨て置いたとしても、かの日誌にはそう記されていたという。"
translation = "다른 정보를 일절 버려두더라도, 그 일지에는 그렇게 기록되어 있었다고 한다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「<b>魔王</b>は──前回のリクリエを食い止め、世界を救った英雄のこと」"
translation = "「<b>마왕</b>은── 지난번 리크리에를 막고, 세계를 구한 영웅」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「だから私には使命があったの。緋宮クロトを鍛え直すっていう」"
translation = "「그래서 나에게는 사명이 있었어. 히노미야 쿠로토를 다시 단련시킨다는」"

[[dialogue]]
speaker = "クロト"
original = "「使命……」"
translation = "「사명……」"

[[dialogue]]
speaker = "unk"
original = "それについては前回、聞きそびれてしまった内容だった。"
translation = "그것에 대해서는 지난번에, 미처 듣지 못했던 내용이었다."

[[dialogue]]
speaker = "ヴィーナス"
original = "『黄雀ノ月三日。緋宮クロトが新星学園へ入学する』"
translation = "『황작의 달 3일. 히노미야 쿠로토가 신성 학원에 입학한다』"

[[dialogue]]
speaker = "ヴィーナス"
original = "『黄雀ノ月四日。私は彼に眠る“魔王”の素質を引き出すべく、退学を懸けた御前試合を突きつける』"
translation = "『황작의 달 4일. 나는 그에게 잠든 “마왕”의 소질을 이끌어내기 위해, 퇴학을 건 어전 시합을 들이민다』"

[[dialogue]]
speaker = "ヴィーナス"
original = "『今の彼ではリクリエに抗し得ない。世界を救うためにも、試練を与えなくてはならない』"
translation = "『지금의 그로서는 리크리에에 맞설 수 없다. 세계를 구하기 위해서라도, 시련을 주어야만 한다』"

[[dialogue]]
speaker = "クロト"
original = "「！」"
translation = "「!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "『黄雀ノ月十一日。彼と一対一の勝負を執り行い、私は全力を尽くすも敗れる。彼は自身に眠る“魔王”としての力の一部を開花させる』"
translation = "『황작의 달 11일. 그와 일대일 승부를 벌여, 나는 전력을 다했지만 패배한다. 그는 자신에게 잠든 “마왕”으로서의 힘의 일부를 개화시킨다』"

[[dialogue]]
speaker = "ヴィーナス"
original = "『その後、新星学園星徒会は彼を中心とした新たな組織に生まれ変わる。リクリエを阻止すべく、魔王を育む揺籃として……』"
translation = "『그 후, 신성 학원 성도회는 그를 중심으로 한 새로운 조직으로 다시 태어난다. 리크리에를 저지하기 위해, 마왕을 키우는 요람으로서……』"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスが読み上げた内容。"
translation = "비너스가 읽어 내려간 내용."

[[dialogue]]
speaker = "unk"
original = "それは、俺が入学してから今の体制に至るまでの記述だった。"
translation = "그것은, 내가 입학하고 나서 지금의 체제에 이르기까지의 기술이었다."

[[dialogue]]
speaker = "クロト"
original = "「それも……俺が来る前から書かれていた、ってことなのか」"
translation = "「그것도…… 내가 오기 전부터 쓰여 있었다, 는 건가」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ええ。私は、あなたを覚醒させるための存在だった。ううん今もそう」"
translation = "「네. 저는, 당신을 각성시키기 위한 존재였어요. 아니, 지금도 그래요」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「魔王として。英雄として。クロトを今より、もっともっと強くしなくちゃって思ってる」"
translation = "「마왕으로서. 영웅으로서. 쿠로토를 지금보다, 더욱더 강하게 만들어야 한다고 생각하고 있어요」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスは真剣にそう語った。"
translation = "비너스는 진심으로 그렇게 말했다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「私は……この日誌に従っていれば、全部うまくいくと思っていたの」"
translation = "「저는…… 이 일지를 따르면, 전부 잘 될 거라고 생각했어요」"

[[dialogue]]
speaker = "unk"
original = "全てが日誌の通りに行けば、俺が《魔王》の力に目覚めてリクリエを打破する──そんな未来が待っているはずだった。"
translation = "모든 것이 일지대로 진행되면, 내가 《마왕》의 힘에 눈을 떠 리크리에를 타파한다── 그런 미래가 기다리고 있을 터였다."

[[dialogue]]
speaker = "unk"
original = "そんな、いわばハッピーエンドまでの台本を改ざんされてしまったからこそ、ヴィーナスの自信は揺らいでいる。"
translation = "그런, 말하자면 해피 엔딩까지의 대본을 위조당했기 때문에, 비너스의 자신감은 흔들리고 있다."

[[dialogue]]
speaker = "クロト"
original = "「……なるほどな」"
translation = "「……과연」"

[[dialogue]]
speaker = "クロト"
original = "「あの仕合の時、必死に俺に呼びかけていた理由は……よくわかった」"
translation = "「그 시합 때, 필사적으로 나에게 외쳤던 이유는…… 잘 알았다」"

[[dialogue]]
speaker = "クロト"
original = "「だけど」"
translation = "「하지만」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「……！」"
translation = "「……!」"

[[dialogue]]
speaker = "unk"
original = "肝心なことが聞けていない。"
translation = "가장 중요한 것을 듣지 못했다."

[[dialogue]]
speaker = "unk"
original = "俺は、距離を詰めて改めて問う。"
translation = "나는, 거리를 좁혀 다시 묻는다."

[[dialogue]]
speaker = "クロト"
original = "「……ヴィーナスは」"
translation = "「……비너스는」"

[[dialogue]]
speaker = "クロト"
original = "「ヴィーナスは、どうして俺の近くにいてくれる？」"
translation = "「비너스는, 왜 내 곁에 있어 주는 거지?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「へ、へ……？\u3000だから、日誌に……」"
translation = "「헤, 헤……? 그러니까, 일지에……」"

[[dialogue]]
speaker = "クロト"
original = "「──日誌じゃなくて。いくら台本が決められてたって、ヴィーナスは素直に従うような子でもないだろ」"
translation = "「──일지가 아니라. 아무리 대본이 정해져 있었다고 해도, 비너스는 순순히 따를 만한 아이도 아니잖아」"

[[dialogue]]
speaker = "unk"
original = "日誌に記されていたから。"
translation = "일지에 기록되어 있었기 때문에."

[[dialogue]]
speaker = "unk"
original = "待ち受ける者として定められていたから。"
translation = "기다리는 자로서 정해져 있었기 때문에."

[[dialogue]]
speaker = "unk"
original = "それらはたとえ理由にはなっていたとしても、どれにも彼女本人の意志が介在していない。"
translation = "그것들은 비록 이유가 될 수는 있었을지언정, 어느 것에도 그녀 본인의 의지가 개입되어 있지 않다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「…………世界を……世界を救ってほしい、から？」"
translation = "「…………세계를…… 세계를 구해줬으면, 해서?」"

[[dialogue]]
speaker = "クロト"
original = "「それは──<b>俺に</b>じゃなきゃダメなのか？\u3000それとも、力を持つ者なら誰でもよかったのか？」"
translation = "「그건── <b>나</b>여야만 하는 건가? 아니면, 힘을 가진 자라면 누구라도 괜찮았던 건가?」"

[[dialogue]]
speaker = "unk"
original = "この学園にいる星騎士たちは皆リクリエから世界を救うために活動している。"
translation = "이 학원에 있는 성기사들은 모두 리크리에로부터 세계를 구하기 위해 활동하고 있다."

[[dialogue]]
speaker = "unk"
original = "大目標であり大前提だ。"
translation = "대목표이자 대전제다."

[[dialogue]]
speaker = "unk"
original = "でも彼女は違う。彼女だけは……<b>俺に</b>救ってほしいと頼んでいる。"
translation = "하지만 그녀는 다르다. 그녀만이…… <b>나</b>에게 구해달라고 부탁하고 있다."

[[dialogue]]
speaker = "unk"
original = "星徒会長として、学園で最強の座に立っていた者のセリフとは思えない他力本願さだ。"
translation = "성도 회장으로서, 학원에서 최강의 자리에 서 있던 자의 대사라고는 생각되지 않는 타력 본원이다."

[[dialogue]]
speaker = "クロト"
original = "「……もし、俺がその魔王だったとしても」"
translation = "「……만약, 내가 그 마왕이었다고 해도」"

[[dialogue]]
speaker = "クロト"
original = "「リクリエってやつは……“魔王”じゃなきゃ止められないのか？\u3000他のみんなを鍛えようとはならないのか？」"
translation = "「리크리에라는 건…… “마왕”이 아니면 막을 수 없는 건가? 다른 모두를 단련시키려고는 하지 않는 건가?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「それ、は……」"
translation = "「그, 건……」"

[[dialogue]]
speaker = "unk"
original = "もし自分じゃ無理だと思ってるなら弱気だし、彼女らしくない。"
translation = "만약 자신은 무리라고 생각한다면 나약한 것이고, 그녀답지 않다."

[[dialogue]]
speaker = "unk"
original = "それに……いくら日誌に記されていたからって俺とヴィーナスはあの時が初対面だった。"
translation = "게다가…… 아무리 일지에 기록되어 있었다고 해도 나와 비너스는 그때가 첫 만남이었다."

[[dialogue]]
speaker = "unk"
original = "だけどもし、それ以上の何かがあるのなら。"
translation = "하지만 만약, 그 이상의 무언가가 있다면."

[[dialogue]]
speaker = "ヴィーナス"
original = "「別にその、嫌々でやってるわけじゃないの……ホントよ！\u3000自分だって頑張るつもりだし。みんなもだし。だから……その……うー……！」"
translation = "「딱히 그, 억지로 하고 있는 건 아니야…… 정말이야! 나 자신도 노력할 생각이고. 모두도 그렇고. 그러니까…… 그…… 우ー……!」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスの顔がみるみる俯いていく。"
translation = "비너스의 얼굴이 점점 숙여진다."

[[dialogue]]
speaker = "unk"
original = "うまく言えなくてもどかしいのか、ようやく顔を上げた頃には吹っ切れていた。"
translation = "말을 제대로 못 해서 답답한 건지, 겨우 얼굴을 들었을 때는 후련해져 있었다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「んんんん…………わかんない！\u3000けど私はそういうものなんだって思って、ずっとクロトのことを待ってた」"
translation = "「으으으으으음………… 모르겠어! 하지만 나는 그런 거라고 생각하고, 계속 쿠로토를 기다렸어」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「だからさっきの質問に答えるなら──そう！\u3000私はクロトがいいの！\u3000クロトじゃなきゃダメなの！\u3000それが本音！」"
translation = "「그러니까 방금 질문에 대답하자면── 그래! 나는 쿠로토가 좋아! 쿠로토가 아니면 안 돼! 그게 본심!」"

[[dialogue]]
speaker = "クロト"
original = "「そ──そうか……なら、いいんだけど」"
translation = "「그── 그런가…… 그럼, 괜찮지만」"

[[dialogue]]
speaker = "unk"
original = "今度は逆に距離を詰められてしまった。"
translation = "이번에는 반대로 거리를 좁혀지고 말았다."

[[dialogue]]
speaker = "unk"
original = "顔と顔の距離が近くて、ヘンにどぎまぎしてしまう。"
translation = "얼굴과 얼굴의 거리가 가까워서, 이상하게 두근거린다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「リクリエが魔王じゃなきゃ止められないのかどうかは……わかんない。でも、前回からしてもその線が濃厚で」"
translation = "「리크리에를 마왕이 아니면 막을 수 있는지 없는지는…… 모르겠어. 하지만, 지난번부터 봐도 그럴 가능성이 농후하고」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「日誌に書かれてたのも……これは私の使命なんだって。言われてる気がして」"
translation = "「일지에 쓰여 있던 것도…… 이건 나의 사명이라고. 듣고 있는 기분이라서」"

[[dialogue]]
speaker = "クロト"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "マグダレナ"
original = "「御子よ。あなたはあなたの使命を果たすのです。あなたは、既にそれを授かっているはず」"
translation = "「미코여. 당신은 당신의 사명을 완수해야 합니다. 당신은, 이미 그것을 부여받았을 터」"

[[dialogue]]
speaker = "unk"
original = "あれはかつて──"
translation = "그것은 예전에──"

[[dialogue]]
speaker = "unk"
original = "フィーニス第一層の最奥で、守護天使さんに言われた言葉だったか。"
translation = "피니스 제1층의 가장 안쪽에서, 수호 천사에게 들었던 말이었던가."

[[dialogue]]
speaker = "クロト"
original = "（まだ、俺も彼女も知らない謎が俺たちにはある。恐らく）"
translation = "（아직, 나와 그녀 모두 모르는 수수께끼가 우리에게는 있다. 아마도）"

[[dialogue]]
speaker = "クロト"
original = "（その謎こそが、ヴィーナスが俺にこだわる理由で、本当の因果。でも今の彼女には言語化ができない）"
translation = "（그 수수께끼야말로, 비너스가 나에게 집착하는 이유이자, 진정한 인과. 하지만 지금의 그녀는 언어화할 수 없다）"

[[dialogue]]
speaker = "クロト"
original = "（そしてヴィーナスの記憶には鍵がかかっている。それを外すには……）"
translation = "（그리고 비너스의 기억에는 자물쇠가 걸려 있다. 그것을 풀려면……）"

