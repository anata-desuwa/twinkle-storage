[[dialogue]]
speaker = "unk"
original = "第２話,梨緒とランチ,P"
translation = "제2화, 리오와 런치 P"

[[dialogue]]
speaker = "unk"
original = "梨緒が選挙管理委員会を立ち上げてからというもの、彼女の視線が気になるようになった。"
translation = "리오가 선거관리위원회를 세우고 나서부터, 그녀의 시선이 신경 쓰이게 되었다."

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「じ～……」"
translation = "「빤히~……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「じぃ～……」"
translation = "「빤히이~……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「じぃ～～～……」"
translation = "「빤히이이~~……」"

[[dialogue]]
speaker = "unk"
original = "近い近い近い！？"
translation = "가까워 가까워 가까워!?"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「君のことを見すぎだと？\u3000いいや、君は御前試合に勝ったとはいえ、世界を破滅させる可能性は残ったままだ。選管として監視する責務がある」"
translation = "「너를 너무 많이 본다고? 아니, 너는 어전시합에서 이겼다고는 하나, 세계를 파멸시킬 가능성은 남은 채다. 선관으로서 감시할 책무가 있지」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「それに守護天使から──いや、これは言うなと止められているんだった」"
translation = "「게다가 수호천사로부터── 아니, 이건 말하지 말라고 제지당했었지」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「問われても秘密だから話せない。とはいえ、ある程度は察せるだろう」"
translation = "「물어도 비밀이라 말할 수 없다. 그렇다고는 해도, 어느 정도는 짐작할 수 있겠지」"

[[dialogue]]
speaker = "unk"
original = "気まぐれなパテルや、まだ見ぬ守護天使の可能性もあるが、俺から距離を置いている守護天使といえばやはりラクシャだろうか。"
translation = "변덕스러운 파텔이나, 아직 보지 못한 수호천사의 가능성도 있지만, 나로부터 거리를 두고 있는 수호천사라고 하면 역시 락샤일까."

[[dialogue]]
speaker = "unk"
original = "でも梨緒とラクシャに何の関係が？"
translation = "하지만 리오와 락샤에게 무슨 관계가?"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ついでだ。私も昼食をとるとしよう。前の席、いいか？」"
translation = "「겸사겸사다. 나도 점심을 먹도록 하지. 앞자리, 괜찮나?」"

[[dialogue]]
speaker = "unk"
original = "もちろん"
translation = "물론"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ありがとう。では失礼する。君は……そばを頼んだのか。私は鯖の味噌煮定食だ」"
translation = "「고맙다. 그럼 실례하지. 너는…… 소바를 주문했나. 나는 고등어 된장 조림 정식이다」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「意外か？\u3000時々聞かれるが、私は父がイギリス人で、母はこちらの出身だ。和食にも親しんでいるよ」"
translation = "「의외인가? 가끔 듣는 질문이다만, 나는 아버지가 영국인이고 어머니가 이곳 출신이다. 일식에도 친숙해」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あ～っ！！」"
translation = "「아~앗!!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あなた、梨緒・<ruby>Ａ<rt>アネット</rt></ruby>・クリスタルね！\u3000どうしてあなたがクロトと一緒にいるのよ！」"
translation = "「당신, 리오 A 크리스탈이지! 왜 당신이 쿠로토랑 같이 있는 거야!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「もちろん監視のためだ。緋宮会長が悪の魔王に堕ちないようにな」"
translation = "「물론 감시를 위해서다. 히노미야 회장이 악의 마왕으로 타락하지 않도록 말이지」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「あと私の名は梨緒・<ruby>Ａ<rt>アガサ</rt></ruby>・クリステレスだ。私が名前など覚えるに値しない、無価値な存在なのは理解しているが、一応訂正しておく……」"
translation = "「그리고 내 이름은 리오 A 크리스텔레스다. 내가 이름 따위 기억할 가치도 없는 무가치한 존재라는 건 이해하고 있지만, 일단 정정해두지……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あ、ごめんなさい。名前を間違えたことは謝るわ」"
translation = "「아, 미안해. 이름을 틀린 건 사과할게」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「それより監視ってどういうことよ？\u3000私が見込んだクロトが悪の魔王になるわけないでしょ。太陽の壁画はウソっぱちなんだから！」"
translation = "「그보다 감시라니 무슨 소리야? 내가 눈여겨본 쿠로토가 악의 마왕이 될 리 없잖아. 태양의 벽화는 가짜라니까!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「どうしたの、じっとこっち見て何か言ったらどうなのよ？」"
translation = "「왜 그래, 빤히 쳐다보지만 말고 뭐라고 말 좀 해봐!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「不躾ですまないが……君は誰なんだ？」"
translation = "「무례해서 미안하다만…… 너는 누구지?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「は？」"
translation = "「하?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「一方的ではあるが、新星学園の生徒のことは概ね知っている。だが君のことは、寡聞にして知らない」"
translation = "「일방적이긴 하지만, 신성학원의 학생들은 대체로 알고 있다. 하지만 너에 대해서는 들어본 적이 없군」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「失礼だけど、ウソを言ってるようには見えないわね……」"
translation = "「실례지만, 거짓말을 하는 것 같지는 않네……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「いい、よく聞きなさい。私は九浄ヴィーナス。九浄家当主ヘレナの娘にして、新星星徒会のスーパーフィクサーよ！」"
translation = "「잘 들어. 나는 쿠죠 비너스. 쿠죠가 당주 헬레나의 딸이자, 신성 성도회의 슈퍼 픽서야!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「スーパーフィクサー？\u3000こちらの星徒会にはそんな役職もあるのか」"
translation = "「슈퍼 픽서? 이쪽 성도회에는 그런 직책도 있는 건가」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスも一緒にお昼食べる？"
translation = "비너스도 같이 점심 먹을래?"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そうね。けどあなたたち、どうして普通に一緒にご飯食べてるのよ？\u3000いつの間に仲良くなったの？」"
translation = "「그러네. 근데 당신들, 어째서 평범하게 같이 밥 먹고 있는 거야? 언제 사이에 친해진 거야?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「最初は誤解していたが、私は彼を嫌っているわけではない。むしろ彼の星騎士としての姿勢は好ましいものだと思っている」"
translation = "「처음에는 오해했지만, 나는 그를 싫어하는 게 아니다. 오히려 그의 성기사로서의 자세는 바람직한 것이라 생각하고 있어」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「理不尽を打ち破り、罪無き人々を守る──それは私も理想とするところだ」"
translation = "「부조리를 타파하고 죄 없는 사람들을 지킨다── 그것은 나 또한 이상으로 삼는 바다」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「だが仲良くなったわけではない。私たちは監視する者とされる者。適切な距離を維持しなくてはならない」"
translation = "「하지만 친해진 것은 아니다. 우리는 감시하는 자와 감시받는 자. 적절한 거리를 유지해야만 해」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「よって早食いで勝負だ！」"
translation = "「따라서 빨리 먹기 승부다!」"

[[dialogue]]
speaker = "unk"
original = "なんで早食い！？"
translation = "왜 빨리 먹기야!?"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「星徒会長たる者、度重なる出撃や、星徒会業務で多忙な中でも栄養補給は忘れてはならない。どちらが迅速に食事をとれるか勝負だ」"
translation = "「성도회장인 자, 거듭되는 출격이나 성도회 업무로 바쁜 와중에도 영양 보급은 잊어서는 안 된다. 누가 신속하게 식사를 마칠 수 있는지 승부다」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ではいくぞ！」"
translation = "「그럼 간다!」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「くっ……負けた……」"
translation = "「큭…… 졌다……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「おそばと鯖の味噌煮じゃ当たり前でしょ」"
translation = "「소바랑 고등어 된장 조림이면 당연하잖아」"

[[dialogue]]
speaker = "unk"
original = "せっかくなんだから味わって食べようよ"
translation = "기왕 먹는 거 맛을 음미하면서 먹자"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「……そうだな。カフェテリアのスタッフが作ってくれた食事だ、勝負の種にするべきではなかった。反省する」"
translation = "「……그렇군. 카페테리아 스태프가 만들어 준 식사다, 승부의 제물로 삼아서는 안 됐어. 반성하지」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「う～ん……」"
translation = "「으음……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「どうかしたか、ヴィーナス？」"
translation = "「왜 그래, 비너스?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「クロトと梨緒、やっぱり仲良くなってない？」"
translation = "「쿠로토랑 리오, 역시 친해진 거 아냐?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「なっ──！？\u3000そそ、そんなことはないっ！\u3000君も何か言ってくれ！」"
translation = "「나앗──!? 그, 그럴 리가 없다! 너도 뭐라고 말 좀 해줘!」"

[[dialogue]]
speaker = "unk"
original = "俺も梨緒のこと好ましいと思ってるよ"
translation = "나도 리오를 좋게 생각하고 있어"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「ひあっ！？」"
translation = "「히앗!?」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「こ、好ましいとはどういう意味だ？\u3000……星騎士として？\u3000そ、そうか、ではお互い近い認識のようだな……」"
translation = "「조, 좋게 생각한다니 무슨 의미지? ……성기사로서? 그, 그런가, 그럼 서로 비슷한 인식인 모양이군……」"

[[dialogue]]
speaker_original = "梨緒"
speaker_translation = "리오"
original = "「今日のところは潔く負けを認めよう。ではなっ」"
translation = "「오늘은 깨끗하게 패배를 인정하지. 그럼!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あ、行っちゃった」"
translation = "「아, 가버렸다」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「あなたたち、なんだかんだで上手くやってるみたいじゃない。あんな出会い方をしたとは思えないけど……ま、クロトらしいわね」"
translation = "「당신들, 이러니저러니 해도 잘 지내는 것 같네. 그런 식으로 만났다고는 생각되지 않지만…… 뭐, 쿠로토답네」"

