[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「健勝そうですね、アルモタヘル」"
translation = "「건강해 보이네요, 아르모타헬」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「ああ、お前もな」"
translation = "「아아, 너도 말이다」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「まさかこんな形でお前と見えることになるとは思わなかったがな。不思議なものだ」"
translation = "「설마 이런 형태로 너와 보게 될 줄은 몰랐군. 신기한 일이로다」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「私たちが人間界にいること、そして肉体を持っていることがそもそもありえない事態ですからね」"
translation = "「우리가 인간계에 있다는 것, 그리고 육체를 가지고 있다는 것 자체가 원래 있을 수 없는 일이니까요」"

[[dialogue]]
speaker = "unk"
original = "守護天使とは本来世界の摂理を司る者であり、フィーニスの塔の守護者でもある。"
translation = "수호천사란 본래 세계의 섭리를 다스리는 자이며, 피니스의 탑의 수호자이기도 하다."

[[dialogue]]
speaker = "unk"
original = "しかし本体は魔界のどこかに封印され、リクリエの浸食によって堕天使となっていた。"
translation = "하지만 본체는 마계 어딘가에 봉인되어 리크리에의 침식에 의해 타락천사가 되어 있었다."

[[dialogue]]
speaker = "unk"
original = "敵となった守護天使は流星・新星の星徒会によって倒されたが──"
translation = "적이 된 수호천사는 유성·신성의 성도회에 의해 쓰러졌으나 ──"

[[dialogue]]
speaker = "unk"
original = "魂の一端をサルベージし、新星学園の錬金術師・アニマが作った義体に宿すことによって受肉。"
translation = "영혼의 일단을 샐비지하여 신성학원의 연금술사 아니마가 만든 의체에 깃들게 함으로써 수육."

[[dialogue]]
speaker = "unk"
original = "まだ守護天使の本体を解放することは叶わないものの、仮初の肉体で活動することが可能になったのだった。"
translation = "아직 수호천사의 본체를 해방하는 것은 이루지 못했으나, 임시 육체로 활동하는 것이 가능해진 것이었다."

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「これもアニマさまのおかげですね。あの方の錬金術は驚嘆に値します」"
translation = "「이것도 아니마 님 덕분이네요. 그분의 연금술은 경탄할 만합니다」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「それに教皇庁の方々にもよくしていただいています。この前は──」"
translation = "「게다가 교황청 분들도 잘 대해주시고 계십니다. 저번에는 ──」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「シャロンさまとイレーナさまに付き添いいただきまして、映画というものを見て参りました」"
translation = "「샤론 님과 이레이나 님과 동행하여 영화라는 것을 보고 왔습니다」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「大きなスクリーンで見る映像は本当に美麗で、音も前後左右から聞こえてきて臨場感がありました」"
translation = "「커다란 스크린으로 보는 영상은 정말로 미려하고, 소리도 전후좌우에서 들려와서 임장감이 있었습니다」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「しかも！\u3000映画の中の衝撃を再現するように座席が揺れるのです！」"
translation = "「게다가! 영화 속 충격을 재현하듯이 좌석이 흔들리는 것입니다!」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「恥ずかしながら最初は驚いてしまいましたが、まるで映画の世界に入ったようでした」"
translation = "「부끄럽게도 처음에는 깜짝 놀라고 말았습니다만, 마치 영화 세계에 들어온 것 같았습니다」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「シャロンさまも同様に驚いておられましたね。ふふふ」"
translation = "「샤론 님도 똑같이 놀라시더군요. 후후후」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「それにですね、最近はドラマというものもよく見ていまして」"
translation = "「그리고 말이죠, 최근에는 드라마라는 것도 자주 보고 있습니다」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「愛憎渦巻く複雑な人間模様が見事に描写されていて、道徳に反するとわかっていても目が離せなくなるのです」"
translation = "「애증이 소용돌이치는 복잡한 인간관계가 훌륭하게 묘사되어 있어, 도덕에 어긋난다는 것을 알면서도 눈을 뗄 수 없게 됩니다」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「異国のドラマも大変興味深く、いろんな作品が気になってしまって……」"
translation = "「이국의 드라마도 매우 흥미로워 여러 작품이 궁금해져서……」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「ふ、なるほど。この世界の娯楽にうつつを抜かしているというわけか」"
translation = "「후, 과연. 이 세계의 오락에 푹 빠져 있다는 소리군」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「む。そう言うアルモタヘルはどうなのですか？」"
translation = "「무. 그렇게 말하는 아르모타헬은 어떻습니까?」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「我か？\u3000そうだな……」"
translation = "「나 말인가? 그렇군……」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「せっかく肉体を得たのだから、肉体がなければできない経験をせねばな」"
translation = "「기왕 육체를 얻었으니 육체가 없으면 할 수 없는 경험을 해야 하지 않겠나」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「故に我はこの世界の食を探求している。ヒトが発展させた世界には美味な食物が溢れているからな」"
translation = "「고로 나는 이 세계의 음식을 탐구하고 있다. 인간이 발전시킨 세계에는 별미가 넘쳐나니까 말이다」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「ハンバーグ、すき焼き、小籠包……美味い料理は枚挙に暇がない」"
translation = "「함바그, 스키야키, 샤오롱바오…… 맛있는 요리는 매거할 틈이 없다」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「蛍火には世話になっている。やつの肉料理は最高だ」"
translation = "「케이카에게 신세를 지고 있다. 녀석의 고기 요리는 최고다」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「もぐもぐ……特にケバブは良い。肉と野菜、ピタのバランスは筆舌に尽くしがたい……もぐもぐ、もぐもぐ……」"
translation = "「우물우물…… 특히 케밥은 좋다. 고기와 채소, 피타의 밸런스는 필설로 다하기 어렵군…… 우물우물, 우물우물……」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「食べながら話すのはやめなさい、アルモタヘル。ここは女神様の聖堂ですよ」"
translation = "「먹으면서 말하지 마세요, 아르모타헬. 여기는 여신님의 성당이라구요」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「もう。アルモタヘルもこの世界の文化に骨抜きではないですか」"
translation = "「정말이지. 아르모타헬도 이 세계의 문화에 푹 빠진 것 아닙니까」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「他の守護天使たちはどうしているのでしょうか。リクリエを阻止するためにいずれ力を合わせたいのですが」"
translation = "「다른 수호천사들은 어떻게 지내고 있을까요. 리크리에를 저지하기 위해 언젠가 힘을 합치고 싶습니다만」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「我々と同じように囚われていると見るのが妥当だろう。力ずくでも目を覚まさせてやらねばな」"
translation = "「우리와 마찬가지로 갇혀 있다고 보는 것이 타당하겠지. 힘으로라도 정신을 차리게 해줘야겠어」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「さて、我はこれから流星市国周辺のケバブ店を回るつもりだ。店によって肉の種類や味付けも違うからな。至高の一品を見つけるとしよう。お前は？」"
translation = "「자, 나는 이제부터 유성시국 주변의 케밥 집을 돌 생각이다. 가게마다 고기 종류나 양념도 다르니까 말이다. 지고의 일품을 찾아보기로 하지. 너는?」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「私はドラマの新しいシリーズを見始めようかと」"
translation = "「저는 드라마의 새로운 시리즈를 보기 시작할까 합니다」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「リアルタイムで事件が進行するという作品で、一度見たら止まらないと聞いて少し恐れていたのですが、そろそろ挑戦してみようと思っています」"
translation = "「실시간으로 사건이 진행된다는 작품으로, 한번 보면 멈출 수 없다고 들어서 조금 두려워하고 있었습니다만, 이제 도전해 보려 합니다」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「ふむ。まるでケバブだな」"
translation = "「흠. 마치 케밥 같군」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「いい加減ケバブから離れなさい」"
translation = "「적당히 케밥에서 좀 벗어나세요」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「面白ければあなたにも感想を伝えましょう。きっとアルモタヘルも楽しめる──」"
translation = "「재미있으면 당신에게도 감상을 전해드리죠. 분명 아르모타헬도 즐길 수 있──」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「ハッ！？」"
translation = "「핫!?」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「どうした？\u3000お前もケバブ巡りに参加したいのか？」"
translation = "「왜 그러나? 너도 케밥 투어에 참가하고 싶은 건가?」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「いいですか。今の我々の生活は、教皇庁の方々の援助によって成り立っています」"
translation = "「잘 들으세요. 지금 우리의 생활은 교황청 분들의 원조에 의해 성립되고 있습니다」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「しかし我々は日々ドラマを視聴したり、食べ歩きをしたり、ただただ享楽に耽るばかり」"
translation = "「하지만 우리는 나날이 드라마를 시청하거나, 맛집 탐방을 하거나, 그저 향락에 빠져 있을 뿐」"

[[dialogue]]
speaker_original = "マグダレナ"
speaker_translation = "막달레나"
original = "「つまり我々のような者を──穀潰しというのでは？」"
translation = "「즉 우리 같은 자들을 ── 식충이라고 부르는 것 아닙니까?」"

[[dialogue]]
speaker_original = "アルモタヘル"
speaker_translation = "아르모타헬"
original = "「──」"
translation = "「──」"

