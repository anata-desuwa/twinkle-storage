[[dialogue]]
speaker = "unk"
original = "第３話,花嫁家政婦は見た,P"
translation = "제3화, 신부 가사도우미는 보았다, P"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「素晴らしい。清掃に関してだけ言えば、他のメイドたちと遜色ありませんね。よくぞここまで腕を磨きました」"
translation = "「훌륭하군요. 청소에 관해서만 말하자면 다른 메이드들과 손색이 없습니다. 참으로 여기까지 실력을 닦으셨네요」"

[[dialogue]]
speaker = "unk"
original = "キリカとの未来がかかってるから"
translation = "키리카와의 미래가 걸려 있으니까"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「っっ──！？\u3000その軟派な口先だけは矯正する必要がございますね。そのような巧言で採点が甘くなると思ったら大間違いですよ？」"
translation = "「윽──!? 그 경박한 입놀림만큼은 교정할 필요가 있겠군요. 그런 감언이설로 채점이 너그러워질 거라 생각하면 큰 오산이에요?」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「とはいえ以前にも増して懸命に努力されているのもわかっているつもりです。これは何かご褒美をあげなくてはいけませんね」"
translation = "「그렇다고는 해도 이전보다 더 열심히 노력하고 계신 것도 알고 있습니다. 이건 뭔가 포상을 드려야겠군요」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「……少し待っていてください。準備してきますので」"
translation = "「……잠시 기다려 주세요. 준비해 올 테니까요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「──ふふ、キリカと仲良く過ごされているようですね」"
translation = "「──후후, 키리카와 사이좋게 지내고 계신 모양이네요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「こんにちは。キリカが上機嫌で廊下を歩いて行くものですから、気になってしまって」"
translation = "「안녕하세요. 키리카가 기분 좋게 복도를 걸어가기에 궁금해져서요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ああ、ドレス姿ですみません。せっかく身についた力ですから、より使いこなせるよう訓練していたところで」"
translation = "「아아, 드레스 차림이라 죄송해요. 모처럼 몸에 익힌 힘이니까, 더 잘 다룰 수 있도록 훈련하던 참이라서」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「それよりこのお部屋の清掃は緋宮会長が？\u3000キリカが喜ぶわけですね。とても綺麗にお掃除されてます」"
translation = "「그보다 이 방 청소는 히노미야 회장님이? 키리카가 기뻐할 만하네요. 아주 깨끗하게 청소되어 있어요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「同棲生活も上手くいっているようですし、本当にゴールインする日もそう遠くなさそうですね？」"
translation = "「동거 생활도 잘 풀리는 것 같고, 정말 골인하는 날도 그리 멀지 않은 것 같죠?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「……訓練でウェディングドレスを着てる自分が恥ずかしくなってきました。相手もいませんし、やはり私にはまだ早いような……」"
translation = "「……훈련으로 웨딩드레스를 입고 있는 제 자신이 부끄러워지기 시작했어요. 상대도 없는데, 역시 저에게는 아직 이른 것 같은……」"

[[dialogue]]
speaker = "unk"
original = "フィオナもよく似合ってるよ"
translation = "피오나도 아주 잘 어울려"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ふふふ。私『も』ですか。褒めているようで他にもっと似合っている人がいるとでも言いたげですね。アツアツで羨ましいです」"
translation = "「후후후. 저'도'인가요. 칭찬하는 것 같으면서도 다른 더 잘 어울리는 사람이 있다고 말하고 싶은 것 같네요. 뜨거워서 부럽네요」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「さて私は訓練に戻りますね。あまり長居をしてノロケ話に付き合わされるのも困っちゃいますから♪」"
translation = "「그럼 저는 훈련으로 돌아갈게요. 너무 오래 머물러서 닭살 돋는 이야기에 어울려 드리는 것도 곤란하니까요♪」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「あ──きゃっ！」"
translation = "「아── 꺄악!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「す、すみません。裾を踏んでしまって……。抱き止めてくださって、ありがとうございます」"
translation = "「죄, 죄송해요. 밑단을 밟아버려서……. 붙잡아 주셔서 감사합니다」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ですが、こんなところキリカに見られたら──」"
translation = "「하지만 이런 곳을 키리카에게 들키기라도 하면──」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「コ、コホン。これがご褒美になるかはわかりませんが、久しぶりにウェディングドレスを着て参りまし──……」"
translation = "「코, 코흡. 이게 포상이 될지는 모르겠습니다만, 오랜만에 웨딩드레스를 입고 왔습니──……」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「………………」"
translation = "「………………」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「……た……？」"
translation = "「……다……?」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「～～っっ！！\u3000ちちち、違うのキリカ！\u3000これは、裾を踏んで転びそうになったところを緋宮会長に受け止めてもらっただけでっ……！」"
translation = "「～～윽!! 아아아, 아니야 키리카! 이건 밑단을 밟아서 넘어질 뻔한 걸 히노미야 회장님이 받아준 것뿐이라서……!」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「……ふふ。慌てて弁明しなくとも私は何も気にしておりませんよ」"
translation = "「……후후. 서둘러 변명하지 않으셔도 저는 아무것도 신경 쓰지 않는답니다」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「急用を思い出しましたので私はこれで失礼します。おふたりのお邪魔をするのも忍びないですしね。どうか、おふたりで仲睦まじくごゆるりと」"
translation = "「급한 용무가 생각났으므로 저는 이만 실례하겠습니다. 두 분을 방해하는 것도 송구스러우니까요. 부디 두 분이서 화목하게 편히 쉬시길」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「な、何をボーッとしているのですか緋宮会長！\u3000早くキリカを追いかけて誤解を解いてください！」"
translation = "「무, 뭘 멍하니 계시는 건가요 히노미야 회장님! 빨리 키리카를 쫓아가서 오해를 풀어주세요!」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「あれは怒ってます！\u3000とんでもないほど怒ってますよ！\u3000キリカのあんな怖い笑顔、小さい頃におねしょを隠そうとしてシーツをこっそり処分しようとした時以来──」"
translation = "「저건 화난 거예요! 엄청나게 화난 거라고요! 키리카의 저런 무서운 미소, 어릴 적에 오줌싼 걸 숨기려고 시트를 몰래 처분하려고 했을 때 이후로──」"

[[dialogue]]
speaker_original = "フィオナ"
speaker_translation = "피오나"
original = "「ではなくて！\u3000とにかくものすごく怒ってますから！\u3000急いで追いかけてください！\u3000これがきっかけで別れ話につながるなんて、絶対に嫌ですからね！？」"
translation = "「그게 아니라! 아무튼 엄청나게 화났으니까! 빨리 쫓아가세요! 이걸 계기로 이별 이야기로 이어지는 건 절대 싫으니까요!?」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「……これはこれは緋宮様。どうなさいましたか、そんなに息を切らせて駆け込んでこられて」"
translation = "「……이것 참 히노미야 님. 어찌 된 일이신가요, 그렇게 숨을 헐떡이며 달려오시고」"

[[dialogue]]
speaker = "unk"
original = "俺が好きなのはキリカだから！"
translation = "내가 좋아하는 건 키리카니까!"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「そうですかそうですか。そうは見えませんでしたけれどね？\u3000大層力強くお嬢様を抱擁なさっていたではありませんか」"
translation = "「그렇습니까 그렇습니까. 그렇게는 보이지 않았습니다만 말이죠? 아주 힘차게 아가씨를 포옹하고 계시지 않았습니까」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「っっ……い、今更白々しく抱き締められても私は誤魔化されません」"
translation = "「윽…… 이, 이제 와서 뻔뻔하게 껴안아도 저는 속지 않습니다」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「あれが事故だったことは理解しております。ですが緋宮様の鼻の下は確かに伸びておりましたからね」"
translation = "「그게 사고였다는 건 이해하고 있습니다. 하지만 히노미야 님의 콧구멍이 확실히 벌렁거리고 있었으니까요」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「お嬢様の花嫁姿に見とれていたのでしょう？\u3000良かったではありませんか。私のドレス姿より、さぞご褒美になったことでしょうね」"
translation = "「아가씨의 신부 모습에 넋을 잃고 있었던 거겠죠? 잘됐지 않습니까. 제 드레스 차림보다 훨씬 포상이 되었겠군요」"

[[dialogue]]
speaker = "unk"
original = "キリカの花嫁姿が一番だよ"
translation = "키리카의 신부 모습이 제일이야"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「でしたら……証明してください。お嬢様を抱き締めていた時より……もっと強く抱き締めてください」"
translation = "「그러시다면…… 증명해 주세요. 아가씨를 껴안고 있었을 때보다…… 더 강하게 껴안아 주세요」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「んんっ……。も、もっとです……。私を愛していると、一番だと仰るなら、その愛の分だけ抱き締めてください……」"
translation = "「응윽……. 저, 좀 더요……. 저를 사랑한다고, 제일이라고 하신다면, 그 사랑만큼 껴안아 주세요……」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「ふぁ──……んふっ<emoji=heart04>\u3000ん、ちゅっ……<emoji=heart04>\u3000んんっ……<emoji=heart04>」"
translation = "「하아──…… 응훗<emoji=heart04> 응, 츄……<emoji=heart04> 응윽……<emoji=heart04>」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「はぁはぁ、キ、キスまでしろとは申しておりません。勝手なことをしないでくださいませ……」"
translation = "「하아 하아, 키, 키스까지 하라고는 하지 않았습니다. 멋대로 굴지 말아 주십시오……」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「あ──……んふぅんっ<emoji=heart04>\u3000ちゅぁ、んちゅっ、ちゅちゅっ……<emoji=heart04>\u3000はぁー、はぁー……ちゅあぁむぅんっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아──…… 응후웅윽<emoji=heart04> 츄아, 응츄, 츄츄……<emoji=heart04> 하아─, 하아─…… 츄아아무웅윽……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「も、もう。浮気者なのに強引なお方です……<emoji=heart04>」"
translation = "「정, 정말이지. 바람둥이면서 강압적인 분이시군요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "愛してるよ、キリカ"
translation = "사랑해, 키리카"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「～～っっ。し、知っておりますよ。毎晩ベッドで囁いていただいておりますから」"
translation = "「～～윽. 아, 알고 있다고요. 매일 밤 침대에서 속삭여 주고 계시니까요」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「私も……ん、ちゅっ。愛しています。些細なことで拗ねてしまって、申し訳ありませんでした」"
translation = "「저도…… 응, 츄. 사랑합니다. 사소한 일로 토라져 버려서 죄송했습니다」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「けれど……ふふ。なるほどなるほど、私は拗ねてしまっていたのですね」"
translation = "「하지만…… 후후. 과연 과연, 저는 토라져 있었던 거군요」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「お嬢様にヤキモチを焼いてしまう日が来るなんて思ってもいませんでした。よっぽど私は……あなたに首ったけのようです」"
translation = "「아가씨에게 질투를 느끼는 날이 올 줄은 생각도 못 했습니다. 그만큼 저는…… 당신에게 푹 빠져 있는 모양이네요」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「遅くなりましたが……じっくり見てくださいますか？\u3000あなたのために、ウェディングドレスへ着替え直したんです」"
translation = "「늦어졌습니다만…… 찬찬히 봐주시겠습니까? 당신을 위해서 웨딩드레스로 다시 갈아입었답니다」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「これがご褒美になるかどうかわかりませんが……。いえ、最上級のご褒美になると確信しております」"
translation = "「이게 포상이 될지는 모르겠습니다만…… 아니요, 최상급의 포상이 될 거라 확신합니다」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「私のことが好きで好きで仕方のないお方ですから。私のドレス姿がご褒美にならないわけがありません」"
translation = "「저를 좋아해서 어쩔 줄 모르는 분이니까요. 제 드레스 차림이 포상이 되지 않을 리가 없죠」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「しかと目に焼きつけて、弛まぬ努力を続けてくださいね？」"
translation = "「똑똑히 눈에 새겨두고, 끊임없는 노력을 계속해 주세요?」"

[[dialogue]]
speaker_original = "キリカ"
speaker_translation = "키리카"
original = "「私も……あなたの花嫁に相応しい女性になれるよう、ん、ちゅっ……<emoji=heart04>\u3000努力を続けて参りますから……<emoji=heart04>」"
translation = "「저도…… 당신의 신부에 어울리는 여성이 될 수 있도록, 응, 츄……<emoji=heart04> 노력을 계속해 나갈 테니까요……<emoji=heart04>」"

