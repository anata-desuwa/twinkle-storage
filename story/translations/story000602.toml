[[dialogue]]
speaker = "unk"
original = "クリスマスも近づいてきた、ある日のこと――"
translation = "크리스마스도 다가온 어느 날의 일――"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ダーリン、おはよ～っ！」"
translation = "「달링, 안녕~!」"

[[dialogue]]
speaker = "unk"
original = "やあ、紅明。今日も元気だね"
translation = "「여어, 코우메이. 오늘도 활기차네」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「おうともさ☆\u3000アタシは元気と笑顔が取り柄だからね♪」"
translation = "「당연하지☆ 난 활기차고 웃는 얼굴이 장점이니까 말이야♪」"

[[dialogue]]
speaker = "unk"
original = "彼女は、<ruby>牛紅明<rt>ぎゅうこうめい</rt></ruby>。乳性エナジードリンク『ホルスタミン』をはじめ、乳製品を販売する有名メーカー『善哉乳業』を営む牛一族の社長令嬢だ。"
translation = "그녀는 규우 코우메이. 유성 유제품 음료 『홀스타민』을 비롯해 유제품을 판매하는 유명 메이커 『젠자이 유업』을 경영하는 규우 일족의 사장 영애다."

[[dialogue]]
speaker = "unk"
original = "彼女自身も、流星市国と日本において高い知名度を誇る有名タレントで、『見るエナジードリンク』『ホルスタミンの擬人化』と言われる、元気が魅力的な女の子である。"
translation = "그녀 자신도 유성시국과 일본에서 높은 지명도를 자랑하는 유명 탤런트로, 『보는 에너지 드링크』 『홀스타민의 의인화』라고 불리는 활기가 매력적인 여자아이다."

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ん～？\u3000今日はどうしたのかって？\u3000実は、ダーリンにお願いがあってさ……」"
translation = "「음~? 오늘은 웬일이냐구? 실은 달링한테 부탁이 있어서 말이야……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ク～ロ～ト～！」"
translation = "「크~로~토~!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「報告があるの！\u3000あっ、紅明！\u3000来てたのね♪」"
translation = "「보고가 있어! 앗, 코우메이! 와 있었네♪」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ヴィナちー、おいっす☆\u3000って、おや？\u3000そちらの可愛い天使ちゃんは？」"
translation = "「비나치, 안녕☆ 어라? 그쪽의 귀여운 천사 짱은?」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「じ～っ……」"
translation = "「지~익……」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「初めて見る子だけど……」"
translation = "「처음 보는 아이인데……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そう、ちょうどこの子のことで、クロトに報告しにきたところなのよ！\u3000実は私、先週末に街で――」"
translation = "「그래, 마침 이 아이 일로 쿠로토에게 보고하러 온 참이었어! 실은 나, 지난 주말에 거리에서――」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「この迷子の天使を拾ったの！」"
translation = "「이 미아 천사를 주웠어!」"

[[dialogue]]
speaker = "unk"
original = "いや、拾ったって！？"
translation = "아니, 주웠다니!?"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「初めまして。あなたがこの学園の星徒会長ね？」"
translation = "「처음 뵙겠어요. 당신이 이 학원의 성도회장이지?」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「わたくしの名前は、セシアよ。どうやら、天使らしいわ」"
translation = "「내 이름은 세시아야. 아무래도 천사인 것 같아」"

[[dialogue]]
speaker = "unk"
original = "どうやら……？"
translation = "아무래도……?"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「わたくしは、気がついたら流星市国にいて、ヴィーナスに拾われるより以前の記憶がないの。どうも、記憶喪失というやつみたいで……」"
translation = "「나는 정신을 차려보니 유성시국에 있었고, 비너스에게 주워지기 이전의 기억이 없어. 아무래도 기억상실이라는 것 같아서……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「１人でふらふらと夜の街中を歩いていたから、心配になって、声をかけたのよ」"
translation = "「혼자서 비틀거리며 밤거리를 걷고 있길래 걱정돼서 말을 건 거야」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「原因はわからないけど、名前以外は思い出せないみたいでね。とりあえず連れ帰って、九浄家の伝手を使って、素性を調べたんだけど……」"
translation = "「원인은 모르겠지만 이름 말고는 기억나지 않는 것 같더라고. 일단 데려와서 쿠죠 가문의 인맥을 써서 신원을 조사해 봤는데……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「不思議なことに、セシアの情報は流星市国や日本のどこにも存在しないのよ。ＤＮＡ情報から追っても、何者かわからない――」"
translation = "「신기하게도 세시아의 정보는 유성시국이나 일본 어디에도 존재하지 않아. DNA 정보로 쫓아봐도 정체를 알 수 없어――」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「まさに、謎の天使ね！」"
translation = "「그야말로 수수께끼의 천사지!」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「わたくし、最初は羽やヘイローもなかったの。途中から現れて、その時になって、わたくしは天使だったんだと思い出したのよ」"
translation = "「나는 처음에는 날개나 헤일로도 없었어. 도중에 나타났고, 그때가 되어서야 나는 천사였다는 걸 기억해 낸 거야」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「え？\u3000なんかそれって、生まれたばかりの天使の赤ちゃんみたいな……」"
translation = "「에? 왠지 그거, 막 태어난 천사 아기 같은……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そう！\u3000セシアは記憶だけじゃなくて、元々持っていた星力も失ってるみたいなの！\u3000それでね――」"
translation = "「맞아! 세시아는 기억뿐만 아니라 원래 가지고 있던 성력도 잃어버린 것 같아! 그래서 말인데――」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「どうやら、人が喜ぶ姿を見ると、星力が少しずつ戻っていくみたいだってわかったの！」"
translation = "「아무래도 사람들이 기뻐하는 모습을 보면 성력이 조금씩 돌아오는 것 같다는 걸 알게 됐어!」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「誰かが喜ぶ時に、その感情の一部が溢れて、わたくしの中に吸収されて、蓄積されていくのを感じるの。そうすると、わたくしの中に、前よりも強い力が湧いてくるのよ」"
translation = "「누군가 기뻐할 때 그 감정의 일부가 넘쳐흘러 내 안에 흡수되고 축적되어 가는 게 느껴져. 그러면 내 안에서 이전보다 강한 힘이 솟아나거든」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「で、私は思いついたの！\u3000これを繰り返していけば、セシアはそのうち星力と一緒に、記憶も取り戻せるんじゃないかって！」"
translation = "「그래서 내가 생각해 냈지! 이걸 반복하다 보면 세시아는 머지않아 성력과 함께 기억도 되찾을 수 있지 않을까 하고!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そして、もうすぐクリスマスじゃない？\u3000沢山の人に喜んでもらえる、一石七面鳥なアイデアがあるわ！」"
translation = "「그리고 곧 크리스마스잖아? 많은 사람들을 기쁘게 할 수 있는 일석칠면조 같은 아이디어가 있어!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ズバリ、セシアがサンタになって、みんなにクリスマスプレゼントを配ればいいのよ！」"
translation = "「단도직입적으로, 세시아가 산타가 되어 모두에게 크리스마스 선물을 나눠주면 돼!」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「おお～っ！\u3000なるほど！\u3000ヴィナちー、天才じゃん☆」"
translation = "「오오~! 과연! 비나치, 천재잖아☆」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「でしょ～♪\u3000更にこれなら、セシアのことをみんなに紹介もできるしね！」"
translation = "「그렇지~♪ 게다가 이거라면 세시아를 모두에게 소개할 수도 있고 말이야!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「というわけで、まずはクロトに紹介しないと、と思って連れてきたのよ」"
translation = "「그런 고로, 우선은 쿠로토에게 소개해야겠다 싶어서 데려온 거야」"

[[dialogue]]
speaker = "unk"
original = "そういうことなら、俺も手伝うよ"
translation = "「그런 일이라면 나도 도울게」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「クロトなら必ず、そう言ってくれるだろうって信じてたわ♪\u3000ね、セシア。クロトなら快く力を貸してくれるって言ったでしょう？」"
translation = "「쿠로토라면 반드시 그렇게 말해줄 거라고 믿었어♪ 그치, 세시아. 쿠로토라면 기꺼이 힘을 빌려줄 거라고 했지?」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「じ～っ……確かに、今のはプラス１ポイントね」"
translation = "「지~익…… 확실히 지금 건 플러스 1포인트네」"

[[dialogue]]
speaker = "unk"
original = "セシア、改めてよろしくね"
translation = "「세시아, 다시 한번 잘 부탁해」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「ええ。これからよろしくお願いするわ、会長」"
translation = "「응. 앞으로 잘 부탁할게, 회장」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「２人が仲良く握手を交わしたところで、フィクサーとして改めて指令を出すわ！」"
translation = "「두 사람이 좋게 악수를 나눈 참에 픽서로서 다시금 지령을 내리겠어!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「クロトにはセシアと一緒にプレゼント配りをして、記憶を取り戻す手伝いをしてあげて欲しいの！\u3000名づけて――」"
translation = "「쿠로토는 세시아와 함께 선물 배달을 하며 기억을 되찾는 걸 도와줬으면 해! 이름하여――」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「サンタ大作戦よ！」"
translation = "「산타 대작전이야!」"

[[dialogue]]
speaker = "unk"
original = "そうして、俺はセシアの手伝いをすることになった――――のだが。"
translation = "그리하여 나는 세시아를 돕게 되었다――――만."

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「待ちな！\u3000その計画、誰か１人、忘れちゃあ……いないかい？」"
translation = "「기다리라구! 그 계획, 누군가 한 명 잊은 거…… 아니냐구?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「紅明？」"
translation = "「코우메이?」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「ヴィナちー、ダーリン、そして……セッシー！」"
translation = "「비나치, 달링, 그리고…… 세시!」"

[[dialogue]]
speaker_original = "セシア"
speaker_translation = "세시아"
original = "「セッシーって、わたくしのこと？」"
translation = "「세시라니, 나를 말하는 거야?」"

[[dialogue]]
speaker_original = "紅明"
speaker_translation = "코메이"
original = "「アタシもそのサンタ大作戦、１枚噛ませてもらうぜ！」"
translation = "「나도 그 산타 대작전, 한 번 끼워달라구!」"

[[dialogue]]
speaker = "unk"
original = "紅明はグッと親指をサムズアップしながら、宣言するのだった――"
translation = "코우메이는 엄지를 척 들어 올리며 선언하는 것이었다――"

