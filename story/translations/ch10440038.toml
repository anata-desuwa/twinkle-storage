[[dialogue]]
speaker = "unk"
original = "その日、俺は星徒会の仕事を終えたあと、どっと疲れが押し寄せ、星徒会室のソファーで休憩していた。"
translation = "그날, 나는 성도회의 일을 마친 뒤, 갑자기 피로가 몰려와 성도회실 소파에서 휴식을 취하고 있었다."

[[dialogue]]
speaker = "unk"
original = "すると、そこへ恋人のプリムラが様子を見にやって来て。"
translation = "그러자, 그곳에 연인인 프리뮬라가 상태를 보러 찾아와."

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「眷族よ！\u3000今日の仕事は終わったのか？」"
translation = "「권속이여! 오늘의 업무는 끝난 것이냐?」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「……って、なんだかグッタリしておるが、大丈夫か？」"
translation = "「……그보다, 왠지 축 처져 있는데, 괜찮은 것이냐?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「今日は書類が一気に押し寄せた上に、アステラ出現まで重なって……」"
translation = "「오늘은 서류가 한꺼번에 몰려온 데다, 아스텔라 출현까지 겹쳐서……」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「書類など、１日くらい理由をつけて後回しにすればよいものを。相変わらず真面目な奴じゃな」"
translation = "「서류 같은 건, 하루 정도 핑계를 대고 미루면 될 것을. 여전히 성실한 녀석이군」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「やれやれ、仕方あるまい。ここは――」"
translation = "「이런 이런, 어쩔 수 없군. 여기서는――」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「我の『リバースフォーム』の出番じゃな♪」"
translation = "「나의 『리버스 폼』이 나설 차례로구나♪」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「特別に『放出供給』の能力で、眷族にエネルギーを注ぎ込んでやろう。恋人であることを感謝するがよいぞ♪」"
translation = "「특별히 『방출 공급』의 능력으로, 권속에게 에너지를 부어주마. 연인인 것에 감사하도록 하거라♪」"

[[dialogue]]
speaker = "unk"
original = "変身したプリムラは、俺の身体に触れながら回復エネルギーを送り込んでくれる。"
translation = "변신한 프리뮬라는, 나의 몸에 접촉하며 회복 에너지를 보내준다."

[[dialogue]]
speaker = "unk"
original = "しかし――"
translation = "하지만――"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「って、き、貴様……！\u3000ナニをそんなに元気にさせておるのじゃ！？」"
translation = "「그보다, 네, 네놈……! 거기를 왜 그렇게 팔팔하게 만드는 것이냐!?」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ごめん……なんか、勝手に反応しちゃって……」"
translation = "「미안…… 왠지, 멋대로 반응해 버려서……」"

[[dialogue]]
speaker = "unk"
original = "回復しすぎたのか、俺のペニスまでムクムクと元気になってしまっていた。"
translation = "회복이 지나쳤는지, 나의 자지까지 빳빳하게 기운을 차려 버리고 말았다."

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「ぐぬぬ……反転の力の制御が甘くて、回復させすぎたのか……！？」"
translation = "「으누누…… 반전의 힘의 제어가 미숙해서, 너무 회복시켜 버린 것인가……!?」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "プリムラは少し考えるような顔をした後、頬を赤く染めながら口を開く。"
translation = "프리뮬라는 잠시 생각하는 듯한 표정을 지은 뒤, 뺨을 붉게 물들이며 입을 연다."

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「こ、こうなっては……我のせいでもあるし……仕方ないのじゃ<emoji=heart04>」"
translation = "「이, 이렇게 된 이상…… 나의 탓이기도 하고…… 어쩔 수 없느니라<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "こうして、プリムラが恋人として、ひと肌脱いでくれることになって――"
translation = "이렇게 해서, 프리뮬라가 연인으로서 직접 나서 주기로 하고――"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「――って、これはどういうことなのじゃ～～っ！？」"
translation = "「――랄까, 이게 대체 어찌 된 일이냐~~!?」"

[[dialogue]]
speaker = "unk"
original = "ソファーに仰向けになったプリムラの上に、俺は馬乗りで失礼して、露わになったペニスを見せつけていた。"
translation = "소파에 천장을 보고 누운 프리뮬라의 위에, 나는 올라타서 실례하며 노출된 자지를 과시하고 있었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「このところ仕事が忙しくて、プリムラと全然イチャイチャできてなかったから……」"
translation = "「요즘 일이 바빠서, 프리뮬라와 전혀 꽁냥대지 못했으니까……」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「だ、だからといって……！\u3000『我のおっぱいで抜いて欲しい』などと……正気かっ！」"
translation = "「그, 그렇다고 해서……! 『나의 가슴으로 빼주길 원한다』라니…… 제정신이냐!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「どう考えても――貴様のデカち○ぽが、我の小さな胸に収まるわけなかろうがっ！」"
translation = "「아무리 생각해도―― 네놈의 거대한 자지가, 나의 작은 가슴에 들어갈 리가 없지 않느냐!」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「いや、むしろそれがいい」"
translation = "「아니, 오히려 그게 좋아.」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「本当にハレンチじゃな、貴様！？」"
translation = "「정말로 파렴치하구나, 네놈!?」"

[[dialogue]]
speaker = "unk"
original = "呆れ半分、羞恥半分。だが逃げる様子はない。"
translation = "어이없음 반, 수치심 반. 하지만 도망칠 기색은 없다."

[[dialogue]]
speaker = "unk"
original = "俺はゆっくりと、褐色の小さな谷間へとペニスを押し当てた。ぷにぷにと弾力のある柔らかな肌の感触が伝わってくる。"
translation = "나는 천천히, 갈색의 작은 골짜기에 자지를 밀어붙였다. 말랑말랑하고 탄력 있는 부드러운 피부의 감촉이 전해져 온다."

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「んっ<emoji=heart04>\u3000はあぁっ……<emoji=heart04>\u3000眷族の熱くて固いのが、我の胸に擦れてるのじゃ……んぅっ<emoji=heart04>\u3000ふうぅ……<emoji=heart04>」"
translation = "「응읏<emoji=heart04> 하아아……<emoji=heart04> <u>권속(眷族)</u>의 뜨겁고 단단한 것이, 나의 가슴에 스치고 있느니라…… 응으읏<emoji=heart04> 후우우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ほら、プリムラの乳首も、ぷっくりと可愛く勃起してきてるよ」"
translation = "「봐, 프리뮬라의 유두도 통통하고 귀엽게 발기했어.」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「ば、バカモノ！\u3000わざわざ言わんでよい！\u3000ハレンチなことをしておるのじゃから、体が反応するのは当然じゃろう<emoji=heart04>」"
translation = "「바, 바보 녀석! 굳이 말하지 않아도 된다! 파렴치한 짓을 하고 있으니, 몸이 반응하는 것은 당연하지 않겠느냐<emoji=heart04>」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「そ、そういう貴様こそ……おち○ぽの先から我慢汁が溢れてきておるではないか<emoji=heart04>\u3000濃いオスの臭いがして、は、ハレンチなのじゃ……<emoji=heart04>」"
translation = "「그, 그런 네놈이야말로…… 자지 끝에서 쿠퍼액이 넘쳐흐르고 있지 않으냐<emoji=heart04> 진한 수컷의 냄새가 나서, 파, 파렴치하구나……<emoji=heart04>」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「あっ……<emoji=heart04>\u3000んっ……んふうぅ……<emoji=heart04>」"
translation = "「앗……<emoji=heart04> 응…… 으응후우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「このまま、腰を動かしてもいい？」"
translation = "「이대로 허리를 움직여도 돼?」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「っ<emoji=heart04>\u3000し、仕方ないのじゃ……<emoji=heart04>\u3000ここまで来たら、どうせ出すまで収まりはせんじゃろう？」"
translation = "「읏<emoji=heart04> 어, 어쩔 수 없느니라……<emoji=heart04> 여기까지 왔으면, 어차피 싸기 전까진 가라앉지 않겠지?」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「じゃから――今回だけじゃからな<emoji=heart04>」"
translation = "「그러니―― 이번뿐이니라<emoji=heart04>」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「あっ<emoji=heart04>\u3000んんぅっ……<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000んふぅっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000んふぅっ……<emoji=heart04>」"
translation = "「앗<emoji=heart04> 으응으읏……<emoji=heart04> 후우우읏<emoji=heart04> 하아아앗<emoji=heart04> 응읏<emoji=heart04> 응후읏<emoji=heart04> 앗<emoji=heart04> 으응읏<emoji=heart04> 응후읏……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はゆっくりと腰を動かし始めた。"
translation = "나는 천천히 허리를 움직이기 시작했다."

[[dialogue]]
speaker = "unk"
original = "柔らかな谷間へと先端を押し当て、滑らせるように擦り付ける。しっとりとした褐色の柔肌が、甘く吸いついてくる。"
translation = "부드러운 골짜기에 끝부분을 밀어붙이고, 미끄러지듯 문지른다. 촉촉한 갈색 살결이 달콤하게 달라붙는다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「プリムラ、おっぱい感じる？」"
translation = "「프리뮬라, 가슴으로 느껴져?」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「んっ<emoji=heart04>\u3000我の肌がヒトよりも敏感なこと、散々エッチして知っておるじゃろうが<emoji=heart04>\u3000あっ……んっ<emoji=heart04>\u3000はあぁっ……んうぅっ……<emoji=heart04>」"
translation = "「응읏<emoji=heart04> 나의 피부가 인간보다 민감하다는 것, 실컷 섹스해서 알고 있지 않느냐<emoji=heart04> 앗…… 응읏<emoji=heart04> 하아아…… 응우읏……<emoji=heart04>」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「我は本来、賢者の石から作られた『スライム』のような体じゃ。ゆえに、どこを触れられても同じように感じとれるのじゃ<emoji=heart04>」"
translation = "「나는 본래 현자의 돌로 만들어진 『슬라임』 같은 몸이니라. 고로, 어디를 만져져도 똑같이 느낄 수 있느니라<emoji=heart04>」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「じゃから……魔王おち○ぽの凶悪な極太カリで体を擦られれば、反射的にこれまでのセックスの感覚を思い出してしまっても仕方ないのじゃ<emoji=heart04>」"
translation = "「그러니…… 마왕 자지의 흉악한 굵은 귀두로 몸을 문지르면, 반사적으로 지금까지의 섹스 감각을 떠올려 버려도 어쩔 수 없느니라<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「それって、おっぱいがおま○こみたいに感じちゃうってこと？」"
translation = "「그거, 가슴이 보지처럼 느껴진다는 거야?」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「ば、バカモノ！\u3000言い方がハレンチじゃぞっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000んふぅ……<emoji=heart04>」"
translation = "「바, 바보 녀석! 말투가 파렴치하도다!<emoji=heart04> 응읏<emoji=heart04> 후우우읏<emoji=heart04> 응우읏<emoji=heart04> 응후우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「なら――」"
translation = "「그럼――」"

[[dialogue]]
speaker = "unk"
original = "俺はそこで、プリムラにあるお願いを口にする。"
translation = "나는 거기서 프리뮬라에게 어떤 부탁을 입에 담는다."

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「――は？\u3000おっぱいで挟んで欲しいじゃと？\u3000いや、貴様のデカいおち○ぽは、我のではどうやっても無理じゃろ！」"
translation = "「――하? 가슴으로 끼워줬으면 한다고? 아니, 네놈의 거대한 자지는 나의 가슴으론 아무리 해도 무리니라!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「――収まらなくてよい？\u3000寄せて挟むだけで？\u3000そ、それに意味はあるのか……？」"
translation = "「――다 안 들어가도 된다고? 모아서 끼우는 것만으로? 그, 그거에 의미가 있는 것이냐……?」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「ふうぅっ<emoji=heart04>\u3000仕方あるまい。……んしょ<emoji=heart04>\u3000こ、こうでいいのか……？」"
translation = "「후우우읏<emoji=heart04> 어쩔 수 없군. ……영차<emoji=heart04> 이, 이렇게 하면 되는 것이냐……?」"

[[dialogue]]
speaker = "unk"
original = "小さくため息をつきながらも、プリムラは胸を両側からぎゅっと寄せる。"
translation = "작게 한숨을 쉬면서도, 프리뮬라는 가슴을 양옆에서 꽉 모은다."

[[dialogue]]
speaker = "unk"
original = "ぷにもちとした柔肌が先端を包み、上下から甘く押しつぶす。"
translation = "말랑하고 찰진 살결이 끝부분을 감싸고, 위아래에서 달콤하게 짓누른다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「プリムラの『おっぱいおま○こ』、気持ちいい……」"
translation = "「프리뮬라의 『가슴 보지』, 기분 좋아……」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「は、ハレンチな言い方をするでないっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000あっ……はあぁっ……んんぅ……<emoji=heart04>」"
translation = "「파, 파렴치한 말을 하지 말거라!<emoji=heart04> 응읏<emoji=heart04> 앗…… 하아아…… 으응우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「んんっ<emoji=heart04>\u3000け、眷族のおち○ぽが更に大きくなったのじゃ<emoji=heart04>\u3000それに我慢汁も溢れ出して、止まらなくなって……<emoji=heart04>」"
translation = "「으응읏<emoji=heart04> <u>권속(眷族)</u>의 자지가 더욱 커졌느니라<emoji=heart04> 게다가 쿠퍼액도 흘러넘쳐서 멈추지 않게 되고……<emoji=heart04>」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「おっぱいがぬるぬるになって、もっと敏感に感じてしまうのじゃ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んんぅっ……<emoji=heart04>」"
translation = "「가슴이 미끈미끈해져서 더욱 민감하게 느껴져 버리느니라<emoji=heart04> 응읏<emoji=heart04> 하아아앗<emoji=heart04> 후우우읏<emoji=heart04> 앗<emoji=heart04> 하아아앗<emoji=heart04> 으응우읏……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「このまま、亀頭もフェラして欲しい」"
translation = "「이대로 귀두도 펠라해 줬으면 좋겠어.」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「はぁっ！？\u3000貴様……我が何でもしてやると思ったら大間違いじゃぞ、全く……<emoji=heart04>」"
translation = "「하아!? 네놈…… 내가 무엇이든 해 줄 거라 생각하면 큰 착각이니라, 정말이지……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言いつつも、プリムラはそっと唇を寄せる。"
translation = "그렇게 말하면서도, 프리뮬라는 살며시 입술을 가져다 댄다."

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「んっ……ちゅっ<emoji=heart04>\u3000あむっ……<emoji=heart04>」"
translation = "「응읏…… 츄릅<emoji=heart04> 아암……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "舌先が先端を撫でるたび、背筋に電流が走る。"
translation = "혀끝이 끝부분을 핥을 때마다 등줄기에 전류가 흐른다."

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「んむっ<emoji=heart04>\u3000ちゅっ……んちゅっ<emoji=heart04>\u3000ちゅぱっ……ちゅるっ<emoji=heart04>\u3000ちゅれるっ……ちゅむっ<emoji=heart04>\u3000れるっ……ちゅっ<emoji=heart04>\u3000ちゅぱっ……れろちゅっ<emoji=heart04>」"
translation = "「응믓<emoji=heart04> 츄릅…… 응츄<emoji=heart04> 츄파…… 츄르릅<emoji=heart04> 츄릅…… 츄믓<emoji=heart04> 르릅…… 츄릅<emoji=heart04> 츄파…… 레로츄<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺の腰の動きに合わせて、ペニスの先っぽを舌で愛撫してくれるプリムラ。"
translation = "나의 허리 움직임에 맞춰서, 자지의 끝부분을 혀로 애무해 주는 프리뮬라."

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「んふうぅっ<emoji=heart04>\u3000強いオスの臭いと味、すごいのじゃ<emoji=heart04>\u3000頭が熱くなって、クラクラしてしまう……<emoji=heart04>\u3000ちゅっ<emoji=heart04>\u3000んちゅっ<emoji=heart04>\u3000ちゅぱっ……<emoji=heart04>」"
translation = "「응후우우읏<emoji=heart04> 강한 수컷의 냄새와 맛, 대단하구나<emoji=heart04> 머리가 뜨거워져서 어질어질해 버리느니라……<emoji=heart04> 츄릅<emoji=heart04> 응츄<emoji=heart04> 츄파……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺も気持ち良くて興奮し、もっと強く擦り付けるように腰を振る。"
translation = "나도 기분이 좋아서 흥분해, 더 강하게 문지르듯 허리를 흔든다."

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「あっ<emoji=heart04>\u3000おち○ぽ強く擦れてっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁっ……！」"
translation = "「앗<emoji=heart04> 자지가 강하게 문질러져서! 응읏<emoji=heart04> 앗<emoji=heart04> 하아아앗……!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「おっぱいで感じるっ<emoji=heart04>\u3000おち○ぽ挟んで、気持ちよくなってしまうのじゃっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んふぅっ<emoji=heart04>\u3000ふああぁっ……<emoji=heart04>」"
translation = "「가슴으로 느껴지느니라! 자지를 끼우고 기분 좋아져 버리느니라! 앗<emoji=heart04> 하아아앗<emoji=heart04> 응후읏<emoji=heart04> 후아아아……<emoji=heart04>」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「あっ<emoji=heart04>\u3000これっ<emoji=heart04>\u3000きてしまうのじゃっ<emoji=heart04>\u3000おっぱいから気持ちいいのが、全身に広がってぇっ<emoji=heart04>」"
translation = "「앗<emoji=heart04> 이거! 와 버리느니라! 가슴에서 기분 좋은 것이 전신으로 퍼져서어! <emoji=heart04>」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「んっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んああぁっ<emoji=heart04><emoji=heart04>\u3000ダメじゃっ<emoji=heart04><emoji=heart04>」"
translation = "「응읏<emoji=heart04> 앗<emoji=heart04> 응아아아<emoji=heart04><emoji=heart04> 안 되느니라!<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「あっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04><emoji=heart04>\u3000イっ――<emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04> 앗<emoji=heart04> 하아아앗<emoji=heart04> 후아아아<emoji=heart04><emoji=heart04> 간다――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「イックぅうううぅぅ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가버리느니라아아아아아아아아~~~!<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "大きな声を上げ、プリムラは体を仰け反らせる。震えが止まらない。"
translation = "커다란 소리를 내며 프리뮬라는 몸을 뒤로 젖힌다. 떨림이 멈추지 않는다."

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「はああぁっ……<emoji=heart04>\u3000おっぱいでイってしまったのじゃあぁ～……っ<emoji=heart04>」"
translation = "「하아아아……<emoji=heart04> 가슴으로 가버렸느니라아아아~……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「プリムラ、大丈夫か？」"
translation = "「프리뮬라, 괜찮아?」"

[[dialogue]]
speaker = "unk"
original = "俺が腰の動きを止めかけると、プリムラは首を横に振る。"
translation = "내가 허리 움직임을 멈추려 하자, 프리뮬라는 고개를 가로저었다."

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「だ、大丈夫じゃ<emoji=heart04>\u3000そのままでよい<emoji=heart04>\u3000むしろ――あっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふうぅっ……！」"
translation = "「개, 괜찮느니라<emoji=heart04> 그대로 있어도 된다<emoji=heart04> 오히려―― 앗<emoji=heart04> 응읏<emoji=heart04> 후우우읏……!」"

[[dialogue]]
speaker = "unk"
original = "プリムラは潤んだ瞳で俺の顔を見上げてくる。"
translation = "프리뮬라는 젖은 눈동자로 나의 얼굴을 올려다본다."

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「我のおっぱいを、眷族のおち○ぽでもっと――気持ちよく感じさせて欲しいのじゃ<emoji=heart04>」"
translation = "「나의 가슴을, <u>권속(眷族)</u>의 자지로 좀 더―― 기분 좋게 느끼게 해줬으면 하느니라<emoji=heart04>」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「んっ<emoji=heart04>\u3000おっぱいを屈服させるように、オスらしくもっと力強く<emoji=heart04>\u3000んっ……あっ<emoji=heart04>\u3000はあぁっ……！」"
translation = "「응읏<emoji=heart04> 가슴을 굴복시키듯이, 수컷답게 좀 더 힘차게<emoji=heart04> 응읏…… 앗<emoji=heart04> 하아아앗……!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「乱暴なくらいでよい<emoji=heart04>\u3000我のおっぱいで、本物のおま○こにセックスする時みたいに――」"
translation = "「난폭할 정도로 괜찮느니라<emoji=heart04> 나의 가슴에, 진짜 보지에 섹스할 때처럼――」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「本気で種付けピストンをして欲しいのじゃ<emoji=heart04>」"
translation = "「본격적으로 씨내리기 피스톤을 해줬으면 하느니라<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「わかった。じゃあ――」"
translation = "「알았어. 그럼――」"

[[dialogue]]
speaker = "unk"
original = "俺はプリムラの胸に手を伸ばして、乳輪を人差し指でなぞり、乳首に指をかける。"
translation = "나는 프리뮬라의 가슴에 손을 뻗어, 유륜을 검지로 덧그리고 유두에 손가락을 걸었다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「ここまで触ってなかったけど……興奮して勃起してる乳首も、ちゃんと可愛がってやるからな」"
translation = "「지금까지 안 만졌었는데…… 흥분해서 발기한 유두도 제대로 귀여워해 줄 테니까.」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「あっ<emoji=heart04>\u3000う、うむっ<emoji=heart04>\u3000イジって欲しいのじゃっ<emoji=heart04>\u3000乳首も強くっ……！\u3000あっ――<emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04> 으, 으음!<emoji=heart04> 만져주길 원하느니라! 유두도 강하게……! 앗――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「んあぁっ<emoji=heart04><emoji=heart04>\u3000あっ<emoji=heart04>\u3000んああああぁぁぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응아아앗<emoji=heart04><emoji=heart04> 앗<emoji=heart04> 응아아아아아아아아~~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は遠慮を捨て、腰を激しく動かし始めた。"
translation = "나는 사양을 버리고 허리를 격렬하게 움직이기 시작했다."

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「あっ、あんっ、はあぁっ、ふああぁっ<emoji=heart04>\u3000んんぁっ、あっあっ、あぁっ、んんんっ、はああぁ～っ<emoji=heart04><emoji=heart04>」"
translation = "「앗, 안, 하아아앗, 후아아아앗<emoji=heart04> 응응아아, 앗앗, 아아앗, 응응응읏, 하아아아~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「眷族の激しいピストン、すごいっ<emoji=heart04>\u3000おっぱい感じるっ<emoji=heart04>\u3000あっ、んっ、はあぁっ、ふうぅっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>」"
translation = "「<u>권속(眷族)</u>의 격렬한 피스톤, 대단해!<emoji=heart04> 가슴으로 느껴지느니라! 앗, 응읏, 하아아앗, 후우우읏<emoji=heart04> 후아아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「おま○この中、擦られてるみたいに気持ちいいのじゃあっ<emoji=heart04><emoji=heart04>\u3000あっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000あっ、あんっ、あっ、あっ、んああぁっ<emoji=heart04><emoji=heart04>」"
translation = "「보지 안쪽을 문지르는 것처럼 기분 좋느니라앗<emoji=heart04><emoji=heart04> 앗<emoji=heart04> 응우읏<emoji=heart04> 앗, 안, 앗, 앗, 응아아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "プリムラは快楽に身を震わせながら、胸を寄せて押し付けるようにしてくる。"
translation = "프리뮬라는 쾌락에 몸을 떨며 가슴을 모아 밀어붙이듯 해온다."

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「気持ちいいっ<emoji=heart04>\u3000眷族、おっぱいもっとズリズリして欲しいのじゃっ<emoji=heart04>\u3000あっ、あっ、あっ、んううぅっ<emoji=heart04>\u3000はあぁっ、あっ、あっ、あっ<emoji=heart04>\u3000んああぁ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「기분 좋아!<emoji=heart04> <u>권속(眷族)</u>, 가슴 좀 더 문질문질해 줬으면 하느니라! 앗, 앗, 앗, 응우우우읏<emoji=heart04> 하아아앗, 앗, 앗, 앗<emoji=heart04> 응아아아아~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はそこで、彼女の乳首に指を伸ばす。"
translation = "나는 거기서 그녀의 유두에 손가락을 뻗었다."

[[dialogue]]
speaker = "unk"
original = "親指と人差し指で摘み、転がす。"
translation = "엄지와 검지로 집어서 굴린다."

[[dialogue]]
speaker = "unk"
original = "――その瞬間。"
translation = "――그 순간."

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「おっ！？\u3000んおおぉ～～っ<emoji=heart04><emoji=heart04>\u3000乳首コリコリ、きたのじゃあぁっ<emoji=heart04><emoji=heart04>\u3000乳首から脳に、電流走るみたいにビリビリ感じるっ<emoji=heart04>」"
translation = "「옷!? 응오오오~~읏<emoji=heart04><emoji=heart04> 유두 꼬집꼬집, 왔느니라앗<emoji=heart04><emoji=heart04> 유두에서 뇌로 전류가 흐르는 것처럼 찌릿찌릿 느껴지느니라!」"

[[dialogue]]
speaker = "unk"
original = "身体を反らせ、喉の奥から甘く濁った声を漏らす。"
translation = "몸을 뒤로 젖히며 목 안쪽에서 달콤하게 탁한 소리를 흘린다."

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「おっ、おっ、おっ、おっ、んおおぉ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「옷, 옷, 옷, 옷, 응오오오~~읏<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "快楽の針が振り切れたのか、声は下品に乱れ、抑えが効かなくなっていく。"
translation = "쾌락의 바늘이 끝까지 돌아갔는지, 목소리는 저속하게 흐트러지며 억제가 되지 않게 되어간다."

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「乳首気持ちいいっ<emoji=heart04>\u3000おち○ぽピストンと同時にされるの、刺激強くてすごいのじゃあぁ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「유두 기분 좋아!<emoji=heart04> 자지 피스톤과 동시에 당하는 거, 자극이 너무 강해서 대단하느니라아아~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「おっ、おっ、おっ、ほおぉっ<emoji=heart04>\u3000んうぅっ、おっ、おっ、ふおおぉんっ<emoji=heart04><emoji=heart04>」"
translation = "「옷, 옷, 옷, 호오오앗<emoji=heart04> 응우읏, 옷, 옷, 후오오오옹<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「これ、おかしくなるっ<emoji=heart04>\u3000気持ち良すぎて、変な声が出てしまうのじゃあぁ～っ<emoji=heart04>\u3000おっ、ほおぉっ、んっ、おっ<emoji=heart04>\u3000んおおぉんっ<emoji=heart04>」"
translation = "「이거, 이상해져버려!<emoji=heart04> 너무 기분 좋아서 이상한 소리가 나와버리느니라아아~앗<emoji=heart04> 옷, 호오오앗, 응읏, 옷<emoji=heart04> 응오오오옹<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そして、再び潤んだ瞳でこちらを見上げる。"
translation = "그리고 다시 젖은 눈동자로 이쪽을 올려다본다."

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「おおぉっ<emoji=heart04>\u3000眷族ぅ<emoji=heart04>\u3000ダメじゃっ<emoji=heart04>\u3000精液もっ<emoji=heart04>\u3000精液も早く出して欲しいのじゃっ<emoji=heart04>\u3000んむっ<emoji=heart04>\u3000ちゅっ――<emoji=heart04>」"
translation = "「오오오앗<emoji=heart04> <u>권속(眷族)</u>아<emoji=heart04> 안 되느니라!<emoji=heart04> 정액도! 정액도 빨리 내보내 줬으면 하느니라! 응믓<emoji=heart04> 츄릅――<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "プリムラは物欲しそうに身を乗り出し、再びペニスにキスをする。舌を絡め、熱を吸い取るように。"
translation = "프리뮬라는 간절하다는 듯 몸을 내밀어 다시 자지에 키스를 한다. 혀를 섞으며 열기를 빨아들이듯."

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「ちゅむっ<emoji=heart04>\u3000れろっ<emoji=heart04>\u3000んちゅっ<emoji=heart04>\u3000ちゅぱっ<emoji=heart04>\u3000れろちゅっ<emoji=heart04>\u3000ちゅれるっ<emoji=heart04>」"
translation = "「츄믓<emoji=heart04> 레로<emoji=heart04> 응츄<emoji=heart04> 츄파<emoji=heart04> 레로츄<emoji=heart04> 츄릅<emoji=heart04>」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「おっ<emoji=heart04>\u3000オスの味と臭い、好きぃ<emoji=heart04>\u3000おち○ぽの味、もっと全身に味わわせて欲しいのじゃあ<emoji=heart04>\u3000ちゅっ<emoji=heart04>\u3000れろちゅっ<emoji=heart04>\u3000ちゅぱぁっ<emoji=heart04>」"
translation = "「옷<emoji=heart04> 수컷의 맛과 냄새, 좋아아<emoji=heart04> 자지의 맛, 좀 더 온몸으로 맛보고 싶느니라아<emoji=heart04> 츄릅<emoji=heart04> 레로츄<emoji=heart04> 츄파앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「くっ……！\u3000プリムラ、もう少しでイきそうだ……！\u3000ラストスパート行くぞっ！」"
translation = "「큭……! 프리뮬라, 이제 곧 갈 것 같아……! 라스트 스퍼트 간다!」"

[[dialogue]]
speaker = "unk"
original = "込み上げてくる射精感を抑えきれず、腰の動きを更に激しくしていく。"
translation = "치밀어 오르는 사정감을 억제하지 못하고 허리의 움직임을 더욱 격렬하게 한다."

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「おっ<emoji=heart04><emoji=heart04>\u3000眷族の激しいおち○ぽピストンきたのじゃあぁ～～っ<emoji=heart04><emoji=heart04>\u3000おっおっおっおっ、んおおぉ～～っ<emoji=heart04><emoji=heart04>\u3000おっおっおっおっ、ふおぉ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「옷<emoji=heart04><emoji=heart04> <u>권속(眷族)</u>의 격렬한 자지 피스톤 왔느니라아아~~앗<emoji=heart04><emoji=heart04> 옷옷옷옷, 응오오오~~읏<emoji=heart04><emoji=heart04> 옷옷옷옷, 후오오~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「んおぉっ！？\u3000乳首もコリコリ強いぃっ<emoji=heart04><emoji=heart04>\u3000おっおっおっおんっ、おほおおぉ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「응오오앗!? 유두도 꼬집꼬집 강해애!<emoji=heart04><emoji=heart04> 옷옷옷옷옹, 오호오오오~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「おっおっおっおっ<emoji=heart04>\u3000気持ちいいっ<emoji=heart04>\u3000おっおっおっおんっ<emoji=heart04>\u3000おっぱいから脳にすさまじく気持ちいいのがビリビリ流れてくるのじゃあ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「옷옷옷옷<emoji=heart04> 기분 좋아!<emoji=heart04> 옷옷옷옷옹<emoji=heart04> 가슴에서 뇌로 엄청나게 기분 좋은 게 찌릿찌릿 흘러들어오느니라아아~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「おっおっおっおっ、ほおおぉっ<emoji=heart04>\u3000くるっ<emoji=heart04>\u3000くるくるっ<emoji=heart04>\u3000おっぱい刺激されて、おま○こも気持ちいいのせり上がってくるっ<emoji=heart04>」"
translation = "「옷옷옷옷, 호오오오앗<emoji=heart04> 온다! 오고 있느니라! 가슴이 자극받아서 보지도 기분 좋은 게 치밀어 올라앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「おっおっおっおっ、ふおおおぉっ<emoji=heart04>\u3000イクっ<emoji=heart04>\u3000もうイクのじゃっ<emoji=heart04>\u3000おっおっおっおんっ<emoji=heart04>\u3000んおおぉんっ<emoji=heart04>」"
translation = "「옷옷옷옷, 후오오오오앗<emoji=heart04> 간다! 이제 가느니라! 옷옷옷옷옹<emoji=heart04> 응오오오옹<emoji=heart04>」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「おっおっおっおっおっ、イクっ<emoji=heart04><emoji=heart04>\u3000イクイクっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000おっぱいで全身気持ちよくなってイクううぅ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「옷옷옷옷옷, 간다아!<emoji=heart04><emoji=heart04> 가버려어어!<emoji=heart04><emoji=heart04><emoji=heart04> 가슴으로 온몸이 기분 좋아져서 가버리느니라아아아~~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「プリムラ、もう出るっ……！\u3000精液出すぞっ！！！」"
translation = "「프리뮬라, 이제 나온다……! 정액 싼다!!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「んおおおぉっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000我もイクイクイクっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ほおおおおおおぉ――――<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「응오오오오앗<emoji=heart04><emoji=heart04><emoji=heart04> 나도 가버려 가버려 가버리느니라!<emoji=heart04><emoji=heart04><emoji=heart04> 호오오오오오오오오――――<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「おっ――んおおおおおおぉぉぉ～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「옷―― 응오오오오오오오오오오오~~~~~~~~~~~~~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "限界に達した俺は、プリムラの顔や胸に勢いよく大量の精液を吐き出した。"
translation = "한계에 달한 나는 프리뮬라의 얼굴과 가슴에 기세 좋게 대량의 정액을 쏟아냈다."

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「ほおぉっ<emoji=heart04><emoji=heart04>\u3000ふおおおぉぉ～～っ<emoji=heart04><emoji=heart04>\u3000眷族の熱い精子がいっぱいぶっかけられてるのじゃあぁ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「호오오앗<emoji=heart04><emoji=heart04> 후오오오오오오~~앗<emoji=heart04><emoji=heart04> <u>권속(眷族)</u>의 뜨거운 정자가 잔뜩 뿌려지고 있느니라아아~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「んっ<emoji=heart04>\u3000はああぁ～っ<emoji=heart04><emoji=heart04>\u3000強いオスの臭いで溺れてしまいそうなのじゃあ<emoji=heart04>\u3000んんっ<emoji=heart04>\u3000ふうぅっ……<emoji=heart04>」"
translation = "「응읏<emoji=heart04> 하아아아~앗<emoji=heart04><emoji=heart04> 강한 수컷의 냄새에 익사해 버릴 것 같느니라아<emoji=heart04> 으응읏<emoji=heart04> 후우우읏……<emoji=heart04>」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「んむっ……ごくん<emoji=heart04>\u3000味もすごく濃くて、苦いのじゃあ……<emoji=heart04>\u3000はあぁ……<emoji=heart04>」"
translation = "「응믓…… 꿀꺽<emoji=heart04> 맛도 엄청 진하고 쓰느니라아……<emoji=heart04> 하아아……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言って、口元にかけられた精液を飲み込んでくれるプリムラ。"
translation = "그렇게 말하며 입가에 묻은 정액을 삼켜주는 프리뮬라."

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「んっ……<emoji=heart04>\u3000はあぁ……ふうぅ……<emoji=heart04>\u3000やっと射精、止まったのじゃ……<emoji=heart04>\u3000相変わらず、すごい量じゃ……<emoji=heart04>」"
translation = "「응읏……<emoji=heart04> 하아아…… 후우우……<emoji=heart04> 겨우 사정이 멈췄느니라……<emoji=heart04> 여전히 엄청난 양이로구나……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "白濁に濡れた褐色の肌。その光景に、俺はオスとしての征服感を覚えながら息を吐く。"
translation = "백탁액에 젖은 갈색 피부. 그 광경에 나는 수컷으로서의 정복감을 느끼며 숨을 내뱉는다."

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「プリムラのパイズリ、すごく気持ちよかったよ」"
translation = "「프리뮬라의 파이즈리, 정말 기분 좋았어.」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「んっ……<emoji=heart04>\u3000バカモノ<emoji=heart04>\u3000このハレンチ魔王め……<emoji=heart04>」"
translation = "「응읏……<emoji=heart04> 바보 녀석<emoji=heart04> 이 파렴치 마왕 같으니……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「今度から、またパイズリをして欲しくなったら、お願いしてもいい？」"
translation = "「다음부터 다시 파이즈리 받고 싶어지면 부탁해도 돼?」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「し、仕方ないのじゃ。眷族の性欲処理をしてやるのは、主としての役目じゃからな……<emoji=heart04>」"
translation = "「어, 어쩔 수 없느니라. <u>권속(眷族)</u>의 성욕 처리를 해주는 것은 주인으로서의 책무니까 말이다……<emoji=heart04>」"

[[dialogue]]
speaker_original = "クロト"
speaker_translation = "쿠로토"
original = "「じゃあ……このまま『放出供給』しながらのパイズリで、また元気にしてくれる？」"
translation = "「그럼…… 이대로 『방출 공급』하면서 파이즈리로 다시 팔팔하게 해줄래?」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「はぁ！？\u3000それは別にパイズリは必要ないじゃろうが！」"
translation = "「하아!? 그건 딱히 파이즈리가 필요 없지 않느냐!」"

[[dialogue]]
speaker_original = "プリムラ"
speaker_translation = "프리뮬러"
original = "「全く……この、ハレンチ魔王め<emoji=heart04>」"
translation = "「정말이지…… 이 파렴치 마왕 같으니<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "口では呆れつつも、その後。"
translation = "입으로는 어이없어하면서도 그 뒤."

[[dialogue]]
speaker = "unk"
original = "なんだかんだまたパイズリで元気にしてくれる、可愛い恋人のプリムラなのだった。"
translation = "이러니저러니 해도 다시 파이즈리로 기운을 북돋워 주는, 귀여운 연인 프리뮬라였다."

