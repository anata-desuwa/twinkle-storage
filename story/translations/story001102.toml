[[dialogue]]
speaker = "シアン"
original = "「数日前、赤髪の獣人系魔族が目撃されたのがここだ。ま、その特徴だけじゃキサナだとは断定できないけどな」"
translation = "「며칠 전, 붉은 머리의 수인계 마족이 목격된 게 여기야. 뭐, 그 특징만으로는 키사나라고 단정할 순 없지만」"

[[dialogue]]
speaker = "シアン"
original = "「同じ特徴は渋谷や浅草でも目撃されている。全く影も形もないってわけじゃないようだ」"
translation = "「같은 특징이 시부야나 아사쿠사에서도 목격되었어. 완전히 그림자도 형체도 없는 건 아닌 모양이군」"

[[dialogue]]
speaker = "シアン"
original = "「目撃地点やキサナの情報を繋ぎ合わせれば、やつの目的や、今どこにいるかがわかるかもしれねえ」"
translation = "「목격 지점이나 키사나의 정보를 연결해 보면, 녀석의 목적이나 지금 어디에 있는지를 알 수 있을지도 몰라」"

[[dialogue]]
speaker = "シアン"
original = "「キサナについてわかっていることは……獣人系の魔族、若い女、荒い言動……」"
translation = "「키사나에 대해 알고 있는 건…… 수인계 마족, 젊은 여자, 거친 언동……」"

[[dialogue]]
speaker = "シアン"
original = "「あと、食い物を粗末にするやつが嫌いってところか。キサナ自身が食い物に困った経験があると考えるのが普通だろうな」"
translation = "「그리고 음식을 함부로 다루는 녀석을 싫어한다는 점인가. 키사나 자신이 먹을거리로 고생한 경험이 있다고 생각하는 게 일반적이겠지」"

[[dialogue]]
speaker = "シアン"
original = "「それにあの耳としっぽは、あたしの知る限り魔界のセントリア地方に多い。チンピラっぽさを見るに、西セントリアのマフィアの崩れか？」"
translation = "「게다가 저 귀와 꼬리는 내가 아는 한 마계의 센트리아 지방에 많아. 양아치 같은 점을 보니, 서센트리아 마피아의 잔당인가?」"

[[dialogue]]
speaker = "シアン"
original = "「キサナが自分で人間界に来たとは思えない。やはりコラプサーが組織的に密航を手引きしたと考えるのが妥当だろう」"
translation = "「키사나가 스스로 인간계에 왔다고는 생각되지 않아. 역시 콜랩서가 조직적으로 밀항을 도왔다고 생각하는 게 타당하겠지」"

[[dialogue]]
speaker = "unk"
original = "警察みたいですね"
translation = "경찰 같네요"

[[dialogue]]
speaker = "シアン"
original = "「それが公安委員会の本分だからな。あんたはネーゼマインやセナリィを先に知っちまったから、トンチキなイメージがついちまったみたいだが」"
translation = "「그게 공안위원회의 본분이니까. 너는 네제마인이나 세나리를 먼저 알아버려서, 엉뚱한 이미지가 박혀버린 모양이다만」"

[[dialogue]]
speaker = "シアン"
original = "「ま、今回はあたしだけで調べたわけじゃねえけどな」"
translation = "「뭐, 이번엔 나 혼자서 조사한 건 아니지만 말이야」"

[[dialogue]]
speaker = "コハルコ"
original = "『もしもし。こちら放送委員会・委員長のコハルコです。秋葉原でも赤髪の魔族の目撃情報がありました。連れもいたらしいのでコラプサーではないかもですが』"
translation = "『여보세요. 여기는 방송위원회 위원장 쿠하루코입니다. 아키하바라에서도 붉은 머리 마족의 목격 정보가 있었어요. 일행도 있었던 모양이라 콜랩서가 아닐지도 모르지만요』"

[[dialogue]]
speaker = "シアン"
original = "「いや、助かる。もしかしたらその連れも、他のコラプサー構成員かもしれないしな」"
translation = "「아니, 도움이 된다. 어쩌면 그 일행도 다른 콜랩서 구성원일지도 모르니까」"

[[dialogue]]
speaker = "コハルコ"
original = "『あ、こんにちは、会長さん。私は公安委員会じゃないんだけど、コラプサー関係は特別に協力することになってるの』"
translation = "『아, 안녕하세요, 회장님. 저는 공안위원회는 아니지만, 콜랩서 관련은 특별히 협력하기로 했거든요』"

[[dialogue]]
speaker = "コハルコ"
original = "『公安の存在自体は、隠していてもどうせバレるからってことでヘレナさんに教えてもらってたけどね』"
translation = "『공안의 존재 자체는 숨기고 있어도 어차피 들통날 거라면서 헬레나 씨가 알려주셨지만요』"

[[dialogue]]
speaker = "シアン"
original = "「朝比奈コハルコ──裏社会でジャスティスウィザードと呼ばれたあんたの腕があれば、すぐに居場所も掴めると思ったんだが……難しいか？」"
translation = "「아사히나 쿠하루코── 어둠의 세계에서 저스티스 위저드라 불린 네 실력이라면 바로 거처를 알아낼 수 있을 거라 생각했는데…… 어렵나?」"

[[dialogue]]
speaker = "コハルコ"
original = "『その名前は出さない約束ですよ。……難しいのは確かですが』"
translation = "『그 이름은 꺼내지 않기로 약속했잖아요. ……어려운 건 사실이지만요』"

[[dialogue]]
speaker = "コハルコ"
original = "『ＤＩＳＣから居場所の特定を試みましたが、うまくいきませんでした。少なくとも私と同等レベルのハッカーがコラプサーにはいるようです』"
translation = "『DISC를 통해 위치 특정을 시도해 봤지만 잘 안 됐어요. 적어도 저와 동등한 수준의 해커가 콜랩서에 있는 것 같아요』"

[[dialogue]]
speaker = "シアン"
original = "「ジャスティスウィザードと同レベルのハッカーか……嬉しくない情報だな。まぁ、そうでもなければ逃げられないか」"
translation = "「저스티스 위저드와 동급의 해커인가…… 기쁘지 않은 정보군. 뭐, 그렇지 않으면 도망칠 수 없겠지」"

[[dialogue]]
speaker = "シアン"
original = "「話を聞く限り、キサナにハッキング技術があるとは思えない。やはりキサナが言った通り、コラプサーはちゃんとバックがある組織ってことだ」"
translation = "「얘기를 들어보니 키사나에게 해킹 기술이 있다고는 생각되지 않아. 역시 키사나가 말한 대로 콜랩서는 제대로 된 배후가 있는 조직이라는 거군」"

[[dialogue]]
speaker = "シアン"
original = "「ところでコハルコ、会長さん相手にはタメ口なんだし、あたしに敬語はやめてくれないか？\u3000同じ３年生だろ？」"
translation = "「그건 그렇고 쿠하루코, 회장님 상대론 말을 놓으면서 나한테 경어는 그만해주지 않을래? 같은 3학년이잖아?」"

[[dialogue]]
speaker = "コハルコ"
original = "『別に構いませんが……私はオペレーターとして公私を分けているだけですよ。任務中であれば、誰が相手でも丁寧な言葉遣いを心掛けています』"
translation = "『별로 상관은 없습니다만…… 저는 오퍼레이터로서 공사를 구분하고 있을 뿐이에요. 임무 중이라면 누구를 상대하든 정중한 말투를 유념하고 있습니다』"

[[dialogue]]
speaker = "シアン"
original = "「あ……そうなのか。あたしの気にしすぎだ。悪い、忘れてくれ」"
translation = "「아…… 그랬나. 내가 너무 신경 썼군. 미안, 잊어줘」"

[[dialogue]]
speaker = "コハルコ"
original = "『はぁ……わかりました』"
translation = "『하아…… 알겠습니다』"

[[dialogue]]
speaker = "シアン"
original = "「ったく、あたしの完全な空回りじゃねえか……」"
translation = "「참 나, 나 혼자 완전히 헛발질한 거잖아……」"

[[dialogue]]
speaker = "シアン"
original = "「いや、何でもない。この辺で目撃情報があったってことは、駅員や周囲の会社の人間も見ているかもしれない。聞き込みを──」"
translation = "「아니, 아무것도 아냐. 이 근처에서 목격 정보가 있었다는 건, 역무원이나 주변 회사 사람들도 봤을지 몰라. 탐문을──」"

[[dialogue]]
speaker = "コハルコ"
original = "『！\u3000東京駅周辺にモンスター反応！\u3000一番近いのは会長さんたちです！』"
translation = "『! 도쿄역 주변에 몬스터 반응! 가장 가까운 건 회장님 일행입니다!』"

[[dialogue]]
speaker = "シアン"
original = "「ついてねぇな……。ま、荒事の前に肩慣らしと行くか」"
translation = "「운도 없네……. 뭐, 거친 일을 치르기 전에 몸풀기나 좀 해볼까」"

[[dialogue]]
speaker = "シアン"
original = "「そらっ！」"
translation = "「이랴앗!」"

[[dialogue]]
speaker = "シアン"
original = "「最近の任務は犯罪組織への潜入とかだったから、流星市国のモンスターと戦うのは久しぶりだ」"
translation = "「최근 임무는 범죄 조직 잠입 같은 것뿐이었으니까, 유성시국의 몬스터와 싸우는 건 오랜만이네」"

[[dialogue]]
speaker = "シアン"
original = "「神経使う捜査に比べりゃ、戦うだけの方が気が楽だが……久々に戦うとやっぱり強いな。余所のモンスターとはパワーも耐久力も段違いだ」"
translation = "「신경 쓰는 수사에 비하면 싸우는 것뿐인 게 마음은 편하다만…… 오랜만에 싸우니 역시 강하군. 다른 곳의 몬스터와는 파워도 내구력도 차원이 달라」"

[[dialogue]]
speaker = "シアン"
original = "「ん？\u3000どうした会長さん？\u3000……ユウリに戦い方が似てる？\u3000ああ、うちの後輩に同じ得物のやつがいるんだったな。ついでに獣人系の魔族だったっけ」"
translation = "「응? 왜 그래 회장님? ……유우리랑 싸우는 방식이 닮았다고? 아아, 우리 후배 중에 같은 무기를 쓰는 녀석이 있었지. 거기다 수인계 마족이었던가」"

[[dialogue]]
speaker = "unk"
original = "うちの後輩？"
translation = "우리 후배?"

[[dialogue]]
speaker = "シアン"
original = "「っ！？\u3000いや、海外にいると流星とか新星とかどっちでもよくなるからな。つい間違えちまった」"
translation = "「윽!? 아니, 해외에 있으면 유성이라든가 신성이라든가 어느 쪽이든 상관없게 되거든. 나도 모르게 실수했네」"

[[dialogue]]
speaker = "コハルコ"
original = "『会長さん、４時の方角からモンスター急接近！\u3000民間人が危険です！』"
translation = "『회장님, 4시 방향에서 몬스터 급접근! 민간인이 위험합니다!』"

[[dialogue]]
speaker = "イグニック"
original = "「イイィィイイイッ！」"
translation = "「이이이이이익!」"

[[dialogue]]
speaker = "unk"
original = "危ない！"
translation = "위험해!"

[[dialogue]]
speaker = "？？？"
original = "「ほえ？」"
translation = "「호에?」"

[[dialogue]]
speaker = "イグニック"
original = "「イイィィ……」"
translation = "「이이이……」"

[[dialogue]]
speaker = "？？？"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "？？？"
original = "「かっこい～っ！」"
translation = "「멋있어~!」"

[[dialogue]]
speaker = "シアン"
original = "「これで終わりだ！」"
translation = "「이걸로 끝이다!」"

[[dialogue]]
speaker = "コハルコ"
original = "『モンスターの消滅を確認。掃討完了です。お疲れ様でした』"
translation = "『몬스터의 소멸을 확인. 소탕 완료입니다. 수고하셨습니다』"

[[dialogue]]
speaker = "シアン"
original = "「ま、こんなもんだな。あたしの星術が鈍ってなくてよかったよ」"
translation = "「뭐, 이 정도지. 내 성술이 녹슬지 않아서 다행이야」"

[[dialogue]]
speaker = "unk"
original = "ベテランの貫禄がありました"
translation = "베테랑의 관록이 느껴졌어요"

[[dialogue]]
speaker = "シアン"
original = "「……うるせえ、余計なこと言うんじゃねえ」"
translation = "「……시끄러워, 쓸데없는 소리 하지 마」"

[[dialogue]]
speaker = "？？？"
original = "「さっきのすごくかっこよかった！\u3000助けてくれてありがとう！」"
translation = "「방금 그거 정말 멋있었어! 구해줘서 고마워!」"

[[dialogue]]
speaker = "シアン"
original = "「ん？\u3000さっき会長さんが助けた子か。怪我がないようで何よりだが──」"
translation = "「응? 아까 회장님이 구한 아이인가. 다친 데가 없는 것 같아 다행이다만──」"

[[dialogue]]
speaker = "？？？"
original = "「リーナのお兄ちゃん、やっと会えた！」"
translation = "「리나의 오빠, 드디어 만났다!」"

[[dialogue]]
speaker = "unk"
original = "お兄ちゃん！？"
translation = "오빠!?"

[[dialogue]]
speaker = "シアン"
original = "「……あんた、妹いたのか？」"
translation = "「……너, 여동생이 있었어?」"

