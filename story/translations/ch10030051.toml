[[dialogue]]
speaker = "unk"
original = "第１話,ヴィーナスは考えたい,P"
translation = "제1화, 비너스는 생각하고 싶다"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスと恋人になった後で、俺たちは親子であることが判明するなど、常識では考えられない紆余曲折はあったものの──"
translation = "비너스와 연인이 된 후에 우리들이 부녀 사이라는 사실이 판명되는 등, 상식적으로는 생각할 수 없는 우여곡절은 있었지만──"

[[dialogue]]
speaker = "unk"
original = "俺たちはお互いの意思を確認した上で、親子兼恋人という立場をすべて受け入れることとなった。"
translation = "우리들은 서로의 의사를 확인한 뒤, 부녀 겸 연인이라는 입장을 모두 받아들이기로 했다."

[[dialogue]]
speaker = "unk"
original = "そして、そんな特別でこそばゆい関係性にも、徐々に慣れ始めてきた、ある休日のこと。"
translation = "그리고 그런 특별하고 간지러운 관계성에도 서서히 익숙해지기 시작한 어느 휴일의 일."

[[dialogue]]
speaker = "ヴィーナス"
original = "「パパ！\u3000今日はズバリ、私たちの子供の名前を考えるわよ！」"
translation = "「아빠! 오늘은 딱 정해서, 우리 아이들의 이름을 생각할 거야!」"

[[dialogue]]
speaker = "unk"
original = "俺は思わず、飲んでいた緑茶を噴き出してしまった。"
translation = "나는 나도 모르게 마시고 있던 녹차를 뿜어버리고 말았다."

[[dialogue]]
speaker = "unk"
original = "早い早い早い！！"
translation = "빨라 빨라 빨라!!"

[[dialogue]]
speaker = "ヴィーナス"
original = "「そう？\u3000ほら、『善は急がば３回転』って言うじゃない？\u3000私たち、もう結婚を誓い合った仲なわけだし！」"
translation = "「그래? 봐봐, 『쇠뿔도 단김에 3회전』이라는 말도 있잖아? 우리, 이미 결혼을 맹세한 사이이기도 하고!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「それに、いざ子作りし始めたら、あっという間に赤ちゃんができちゃいそうな予感がするのよね、私♪」"
translation = "「게다가 본격적으로 아이 만들기 시작하면, 순식간에 아기가 생겨버릴 것 같은 예감이 든단 말이지, 난♪」"

[[dialogue]]
speaker = "unk"
original = "本当に実現しちゃいそうなんだけど！？"
translation = "정말로 실현될 것 같은데!?"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスが言うと"
translation = "비너스가 말하자"

[[dialogue]]
speaker = "ヴィーナス"
original = "「え？\u3000――学園を卒業するまでは待って欲しい？」"
translation = "「에? ──학원을 졸업할 때까지는 기다려 달라고?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「大丈夫よ♪\u3000そこはちゃんとわかってるから！」"
translation = "「괜찮아♪ 그건 나도 제대로 알고 있으니까!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「私、卒業と同時に赤ちゃんができるように頑張るわ！」"
translation = "「나, 졸업과 동시에 아기가 생길 수 있도록 힘낼게!」"

[[dialogue]]
speaker = "unk"
original = "後でちゃんと１回話し合おうか！"
translation = "나중에 제대로 한번 이야기 좀 하자!"

[[dialogue]]
speaker = "ヴィーナス"
original = "「？\u3000よくわからないけど、わかったわ！」"
translation = "「? 잘 모르겠지만, 알겠어!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「とりあえず、『案じるとより産みやすし』ってことね♪」"
translation = "「일단, 『걱정하면 낳기 더 쉽다』라는 거지♪」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「それでね、私、子供の名前を考えて来たの！」"
translation = "「그래서 말인데, 나, 아이들 이름을 생각해 왔어!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「はい、ど～ん♪」"
translation = "「자, 쨔잔♪」"

[[dialogue]]
speaker = "unk"
original = "そう言いながら、大きな文字が書かれたスケッチブックを取り出して見せて来る。"
translation = "그렇게 말하며 커다란 글씨가 적힌 스케치북을 꺼내 보여준다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「もし男の子だったら、ヴィート！\u3000女の子だったら、ゴッデスなんてどうかしら！」"
translation = "「만약 남자애라면 비트! 여자애라면 고데스는 어떨까!」"

[[dialogue]]
speaker = "unk"
original = "女の子の名前だよね！？！？"
translation = "여자애 이름이 고데스라고!?!?"

[[dialogue]]
speaker = "ヴィーナス"
original = "「――名づけの由来？\u3000ゴッデスは女神って意味よ！\u3000由来はもちろん、ゴッデスビームからね！」"
translation = "「──이름의 유래? 고데스는 여신이라는 뜻이야! 유래는 당연히 고데스 빔에서 따온 거지!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ヴィートは、ヴィーナスとクロトの名前を合体させてみたの！\u3000カッコいいでしょ？」"
translation = "「비트는 비너스와 쿠로토의 이름을 합쳐본 거야! 멋지지?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「え？\u3000男の子の名前はいいけど、女の子の方は却下？」"
translation = "「에? 남자애 이름은 괜찮지만, 여자애 쪽은 기각?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「意外だわ。ゴッデスの方が自信あったんだけど……」"
translation = "「의외네. 고데스 쪽이 더 자신 있었는데……」"

[[dialogue]]
speaker = "unk"
original = "それから、俺はヴィーナスの勢いに押されるまま、女の子の名前を考えて……"
translation = "그 뒤로 나는 비너스의 기세에 밀린 채 여자애 이름을 생각했고……"

[[dialogue]]
speaker = "ヴィーナス"
original = "「――じゃあひとまず、男の子はヴィート、女の子はアイネってことで決まりね♪」"
translation = "「──그럼 일단 남자애는 비트, 여자애는 아이네로 결정된 거네♪」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふふっ♪\u3000名前を考えると将来のイメージがますます浮かんで来て、ワクワクするわ！」"
translation = "「후훗♪ 이름을 생각하니까 미래의 이미지가 점점 떠올라서 설레!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「というわけで――」"
translation = "「그런 의미에서──」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「この調子で、次の子供が生まれた時の名前も考えて行きましょう！」"
translation = "「이 기세로 다음 아이가 태어났을 때의 이름도 생각하러 가자!」"

[[dialogue]]
speaker = "unk"
original = "まさかの２人目！？"
translation = "설마 했던 둘째!?"

[[dialogue]]
speaker = "ヴィーナス"
original = "「？\u3000なに言ってるの？\u3000３人目と４人目の名前よ！！」"
translation = "「? 무슨 소리야? 셋째랑 넷째 이름이야!!」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「だって１人目と２人目は、ヴィートとアイネだもの♪\u3000どっちが先に生まれて来るかは、その時のお楽しみね！」"
translation = "「그야 첫째랑 둘째는 비트랑 아이네인걸♪ 어느 쪽이 먼저 태어날지는 그때의 즐거움으로 남겨두자!」"

[[dialogue]]
speaker = "unk"
original = "４人以上確定！？"
translation = "4명 이상 확정!?"

[[dialogue]]
speaker = "ヴィーナス"
original = "「当たり前よ！\u3000私、クロトとの子供だったら、何人でも欲しいもの♪」"
translation = "「당연하지! 나, 쿠로토와의 아이라면 몇 명이라도 갖고 싶은걸♪」"

[[dialogue]]
speaker = "unk"
original = "な、何人でも……"
translation = "며, 몇 명이라도……"

[[dialogue]]
speaker = "unk"
original = "俺は思わず色々想像して、顔が熱くなってしまう。"
translation = "나는 나도 모르게 여러 가지 상상을 하며 얼굴이 뜨거워지고 만다."

[[dialogue]]
speaker = "ヴィーナス"
original = "「あっ、クロト、顔が赤くなってるわよ～？\u3000もしかして、照れちゃった？」"
translation = "「앗, 쿠로토, 얼굴이 빨개졌어~? 혹시 쑥스러워진 거야?」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ふふっ♪\u3000私はそれくらいクロトのことが好きってことよ♪」"
translation = "「후훗♪ 나는 그만큼 쿠로토를 좋아한다는 뜻이야♪」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「だ～か～ら～」"
translation = "「그~러~니~까~」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスは俺の近くに来ると、甘えるような上目遣いで抱き着いて来て――"
translation = "비너스는 내 근처로 다가와 어리광 부리는 듯한 치켜뜬 눈으로 매달려 오며──"

[[dialogue]]
speaker = "ヴィーナス"
original = "「卒業したら、いっぱいよろしくね、パパ<emoji=heart04>」"
translation = "「졸업하면 잔뜩 잘 부탁해, 아빠<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ん……<emoji=heart04>」"
translation = "「응……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そう言って、唇をそっと差し出して来る彼女のおねだりに抗えるはずもなく――"
translation = "그렇게 말하며 입술을 살며시 내미는 그녀의 조름에 저항할 수 있을 리 없었고──"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ちゅっ<emoji=heart04>」"
translation = "「쪽<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「あ……<emoji=heart04>\u3000えへへへへへぇ<emoji=heart04>」"
translation = "「아……<emoji=heart04> 에헤헤헤헤헤헤<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「頭撫でられながらキスするの、好き……<emoji=heart04>」"
translation = "「머리 쓰다듬어지면서 키스하는 거 좋아……<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
original = "「ちゅっ……ちゅっ<emoji=heart04>」"
translation = "「쪽…… 쪽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "果たして学園を卒業するまで自制できるかどうか。"
translation = "과연 학원을 졸업할 때까지 자제할 수 있을 것인가."

[[dialogue]]
speaker = "unk"
original = "その日も俺は無邪気な恋人を相手に、理性の戦いを強いられることになるのだった――"
translation = "그날도 나는 천진난만한 연인을 상대로 이성과의 싸움을 강요받게 되는 것이었다──"

