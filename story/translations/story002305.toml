[[dialogue]]
speaker = "レイラ"
original = "（あれが魔王……新星学園で最強の星騎士にして、救世の英雄）"
translation = "（저게 마왕…… 신성학원 최강의 성기사이자 구세의 영웅.）"

[[dialogue]]
speaker = "レイラ"
original = "（だけど私は負けられない。星騎士にも、魔王にも）"
translation = "（하지만 난 질 수 없어. 성기사에게도, 마왕에게도.）"

[[dialogue]]
speaker = "レイラ"
original = "（私は……私は……──）"
translation = "（나는…… 나는……──）"

[[dialogue]]
speaker = "unk"
original = "小さいころは、両親とよく礼拝に通っていた。"
translation = "어릴 적엔 부모님과 자주 예배를 드리러 다녔다."

[[dialogue]]
speaker = "幼いレイラ"
original = "「世界がよりよくなりますように」"
translation = "「세계가 더 좋아지게 해주세요.」"

[[dialogue]]
speaker = "unk"
original = "両親とひざまずいて祈りを捧げる。言葉の意味は分からないが、いいことだって信じていた。だってお父さまとお母さまが喜んでくれるから。"
translation = "부모님과 무릎을 꿇고 기도를 드린다. 말의 의미는 모르지만 좋은 일이라고 믿었다. 왜냐하면 아버님과 어머님이 기뻐해 주시니까."

[[dialogue]]
speaker = "幼いレイラ"
original = "「お母さま、あの絵なぁに？」"
translation = "「어머님, 저 그림은 뭐야?」"

[[dialogue]]
speaker = "レイラ母"
original = "「あれは太陽の壁画っていうの。魔王っていう悪い人をやっつけたときの絵で、３つの種族が手を取り合って魔王を倒したことで、世界に平和が訪れたの」"
translation = "「저건 태양의 벽화라고 한단다. 마왕이라는 나쁜 사람을 물리쳤을 때의 그림인데, 세 종족이 손을 잡고 마왕을 쓰러뜨림으로써 세계에 평화가 찾아왔지.」"

[[dialogue]]
speaker = "幼いレイラ"
original = "「じゃあ、わたしもまおうさん？\u3000をやっつける！\u3000あの絵みたいにたくさんお友だちつくるの！」"
translation = "「그럼 나도 마왕님? 을 물리칠래! 저 그림처럼 친구들도 많이 만들 거야!」"

[[dialogue]]
speaker = "レイラ父"
original = "「ははは。レイラ、魔王はもういないんだよ」"
translation = "「하하하. 레이라, 마왕은 이제 없단다.」"

[[dialogue]]
speaker = "レイラ母"
original = "「でも、モンスターは出るわ。レイラなら立派な星騎士になれる。世界をよりよくできるわ」"
translation = "「하지만 몬스터는 나와. 레이라라면 훌륭한 성기사가 될 수 있을 거야. 세계를 더 좋게 만들 수 있단다.」"

[[dialogue]]
speaker = "unk"
original = "母は若い頃、星騎士だったそうだ。百目騎は星騎士の家系でもあり、その活躍から百目鬼の「鬼」を星騎士の「騎」に改めたと聞いている。"
translation = "어머니는 젊은 시절 성기사였다고 한다. 도메키는 성기사 가문이기도 하며, 그 활약 덕분에 도메키의 '귀신'을 성기사의 '기사'로 고쳤다고 들었다."

[[dialogue]]
speaker = "unk"
original = "世界をよりよくする。それが両親の口癖だった。"
translation = "세계를 더 좋게 만든다. 그것이 부모님의 입버릇이었다."

[[dialogue]]
speaker = "unk"
original = "百目騎の家訓でもあり、家業である半導体産業もその延長で始まったそうだ。新しい技術が世界を豊かにすると信じていたのだ。"
translation = "도메키의 가훈이기도 했으며, 가업인 반도체 산업도 그 연장선에서 시작되었다고 한다. 새로운 기술이 세계를 풍요롭게 할 것이라 믿었던 것이다."

[[dialogue]]
speaker = "unk"
original = "けれど、それだけでやっていけるほど世間は甘くない。日進月歩の技術開発に追いつき、リードしていかなければ、競争の波に呑み込まれる。"
translation = "하지만 그것만으로 살아남을 수 있을 만큼 세상은 만만치 않다. 나날이 발전하는 기술 개발을 따라잡고 리드하지 못하면 경쟁의 파도에 휩쓸리고 만다."

[[dialogue]]
speaker = "数年前のレイラ"
original = "「お父様、お休みになってください。働きすぎは体に毒ですよ」"
translation = "「아버님, 좀 쉬세요. 과로는 몸에 독이에요.」"

[[dialogue]]
speaker = "レイラ父"
original = "「これくらい大丈夫だよ、レイラ。それに、従業員だけ働かせて、社長の私が怠けているわけにはいかないからね」"
translation = "「이 정도는 괜찮단다, 레이라. 게다가 직원들만 일하게 하고 사장인 내가 게으름을 피울 수는 없으니까.」"

[[dialogue]]
speaker = "unk"
original = "そう言って、隈の浮いた顔で笑っていた。事業が傾くとともに、お父様は家に帰らなくなってしまった。"
translation = "그렇게 말하며 초췌한 얼굴로 웃으셨다. 사업이 기울어감과 동시에 아버님은 집에 돌아오지 않게 되셨다."

[[dialogue]]
speaker = "レイラ母"
original = "「大丈夫よ、レイラ。あなたは私が守るからね」"
translation = "「괜찮아, 레이라. 너는 내가 지켜줄 테니까.」"

[[dialogue]]
speaker = "unk"
original = "お父様が過労で亡くなってすぐ、お母様も後を追うように──"
translation = "아버님이 과로로 돌아가시고 얼마 지나지 않아 어머님도 뒤를 쫓듯──"

[[dialogue]]
speaker = "unk"
original = "そして両親を喪ってすぐ、心を整理する間もなく、あるものを奪われた。"
translation = "그리고 부모님을 잃고 얼마 되지 않아 마음을 추스를 새도 없이 어떤 것을 빼앗겼다."

[[dialogue]]
speaker = "unk"
original = "多額の資金を投じてようやく実用化が見えてきた先進技術を、お父様とお母様が亡くなった混乱に乗じて、会社幹部が持ち出したのだ。"
translation = "거액의 자금을 투자해 겨우 실용화가 보이기 시작한 첨단 기술을, 아버님과 어머님이 돌아가신 혼란을 틈타 회사 간부들이 들고 나간 것이다."

[[dialogue]]
speaker = "unk"
original = "技術革新に社運を懸けていた会社は抜け殻となり、残された事業も足元を見た価格で買い取られた。"
translation = "기술 혁신에 사운을 걸었던 회사는 껍데기만 남았고, 남겨진 사업도 헐값에 팔려 나갔다."

[[dialogue]]
speaker = "unk"
original = "当然、百目騎の名は残らなかった。"
translation = "당연히 도메키의 이름은 남지 않았다."

[[dialogue]]
speaker = "数年前のレイラ"
original = "「守護星よ、どうか私に力をお与えください…………どうして、どうして私には星力が目覚めないの……？」"
translation = "「수호성이여, 부디 제게 힘을 주소서………… 어째서, 어째서 제게는 성력이 깨어나지 않는 거죠……?」"

[[dialogue]]
speaker = "unk"
original = "せめて星騎士として名前を残そうとも思ったが、私に星力は発現しなかった。"
translation = "적어도 성기사로서 이름을 남기려 했지만 내게 성력은 발현되지 않았다."

[[dialogue]]
speaker = "unk"
original = "夜空にはあんなに星が輝いて綺麗なのに、ひとつも私に応えてはくれなかった。"
translation = "밤하늘에 저렇게나 별이 빛나고 아름다운데, 단 하나도 내게 응답해 주지 않았다."

[[dialogue]]
speaker = "unk"
original = "気が付いたら、私は海の中だった。"
translation = "정신을 차려보니 나는 바다 한가운데였다."

[[dialogue]]
speaker = "数年前のレイラ"
original = "「はぁ、はぁ、はぁ、はぁ…………私、生きて……浮いてる！？」"
translation = "「하아, 하아, 하아, 하아………… 나, 살아서…… 떠 있어!?」"

[[dialogue]]
speaker = "イザベラ"
original = "「あなた、こんなところで何してるの？」"
translation = "「당신, 이런 데서 뭐 하는 거야?」"

[[dialogue]]
speaker = "数年前のレイラ"
original = "「あなたはどなたですか？\u3000この状況はいったいどうなっているのですか？\u3000え、星空が私の足元に……違う、私が逆さまに浮いて……？」"
translation = "「당신은 누구신가요? 이 상황은 도대체 어떻게 된 거죠? 에, 밤하늘이 내 발밑에…… 아니야, 내가 거꾸로 떠서……?」"

[[dialogue]]
speaker = "unk"
original = "魔法で夜空に吊り上げられて、ふよふよ浮いて。それがイザベラさんとの出会いだった。満天の星を見下ろしながら、私は彼女に出会った。"
translation = "마법으로 밤하늘에 매달려 둥실둥실 떠서. 그것이 이자벨라 씨와의 만남이었다. 만천의 별을 내려다보며 나는 그녀를 만났다."

[[dialogue]]
speaker = "イザベラ"
original = "「私は魔女のイザベラ」"
translation = "「나는 마녀 이자벨라.」"

[[dialogue]]
speaker = "イザベラ"
original = "「詳しいことは後で話すとして、あなたはもう力に目覚めているはず。ほら、魔法を解除するから飛んでみなさい」"
translation = "「자세한 건 나중에 얘기하기로 하고, 당신은 이미 힘에 깨어났을 거야. 자, 마법을 해제할 테니 날아보렴.」"

[[dialogue]]
speaker = "数年前のレイラ"
original = "「え、あ、うわあっぁああああっ！？」"
translation = "「에, 아, 우와아아아아악!?」"

[[dialogue]]
speaker = "数年前のレイラ"
original = "「ほ、ほんとだ。私、飛んでる……ということは、星騎士になれたってコト！？」"
translation = "「정, 정말이다. 나, 날고 있어…… 그렇다는 건 성기사가 됐다는 거!?」"

[[dialogue]]
speaker = "イザベラ"
original = "「そう、あなたは正真正銘の星騎士よ。ただし……守護星はブラックホールだけど」"
translation = "「그래, 당신은 틀림없는 성기사야. 다만…… 수호성은 블랙홀이지만.」"

[[dialogue]]
speaker = "イザベラ"
original = "「こんなところで水遊びしているくらいなら、私の研究を手伝いなさい。世界を救う大仕事よ」"
translation = "「이런 데서 물놀이나 하고 있을 거라면 내 연구를 돕도록 해. 세계를 구하는 큰일이란다.」"

[[dialogue]]
speaker = "数年前のレイラ"
original = "「世界を、救う……？」"
translation = "「세계를, 구한다……?」"

[[dialogue]]
speaker = "unk"
original = "それからイザベラさんの魔法でコラプサーの覚醒を予知し、三界を駆け回った。"
translation = "그 후 이자벨라 씨의 마법으로 콜랩서의 각성을 예지하고 삼계를 누볐다."

[[dialogue]]
speaker = "unk"
original = "そうして出会ったのが──"
translation = "그렇게 해서 만난 것이──"

[[dialogue]]
speaker = "unk"
original = "キサナ。リーナ。ヴァレリー。"
translation = "키사나. 리나. 발레리."

[[dialogue]]
speaker = "unk"
original = "イングリット。ジュリエッテ。"
translation = "잉그리트. 줄리에트."

[[dialogue]]
speaker = "unk"
original = "メテオラ。エンジュ。"
translation = "메테오라. 엔쥬."

[[dialogue]]
speaker = "unk"
original = "みんなひと筋縄ではいかなかったし（特にイングリット）、移動するだけでひと苦労だった（主にイングリット）。"
translation = "다들 하나같이 녹록지 않았고(특히 잉그리트), 이동하는 것만으로도 고생이었다(주로 잉그리트)."

[[dialogue]]
speaker = "unk"
original = "イザベラさんのことはみんなに秘密だったから、もう気分は中間管理職だ。"
translation = "이자벨라 씨의 존재는 모두에게 비밀이었기에 기분은 이미 중간 관리직이었다."

[[dialogue]]
speaker = "unk"
original = "みんなと過ごすうちに分かったことがある。"
translation = "모두와 지내며 알게 된 것이 있다."

[[dialogue]]
speaker = "レイラ"
original = "「私たちの存在は、この世界と相容れない……」"
translation = "「우리의 존재는 이 세계와 용납될 수 없어……」"

[[dialogue]]
speaker = "unk"
original = "星騎士は世界を守る正義の味方で、私たちはその天敵だ。"
translation = "성기사는 세계를 지키는 정의의 편이고, 우리는 그 천적이다."

[[dialogue]]
speaker = "unk"
original = "存在するだけで、世界を危うくする。それ以前にみんな社会不適合者すぎるけど、それはそれとして。"
translation = "존재하는 것만으로 세계를 위태롭게 한다. 그 이전에 다들 너무 사회 부적격자이긴 하지만, 그건 그거대로."

[[dialogue]]
speaker = "レイラ"
original = "「なら、世界を変えればいい。私たちコラプサーが正義の味方になればいいんだ」"
translation = "「그렇다면 세계를 바꾸면 돼. 우리 콜랩서가 정의의 편이 되면 되는 거야.」"

[[dialogue]]
speaker = "レイラ"
original = "「私は３つの種族を率いて、世界を救う『英雄』になってみせる。あの壁画みたいに」"
translation = "「나는 세 종족을 이끌고 세계를 구하는 『영웅』이 되어 보이겠어. 저 벽화처럼.」"

[[dialogue]]
speaker = "レイラ"
original = "「そして、百目騎の名を歴史に残してみせます。どうか見ていてください、お父様、お母様」"
translation = "「그리고 도메키의 이름을 역사에 남기겠습니다. 부디 지켜봐 주세요, 아버님, 어머님.」"

[[dialogue]]
speaker = "unk"
original = "朝比奈コハルコを生贄にする。そんな話を聞いたのは学園襲撃失敗後だった。"
translation = "아사히나 코하루코를 제물로 바친다. 그런 이야기를 들은 건 학원 습격 실패 후였다."

[[dialogue]]
speaker = "レイラ"
original = "「早くみんなを助けないと……っ！」"
translation = "「빨리 모두를 구해야 하는데……!」"

[[dialogue]]
speaker = "イザベラ"
original = "「放っておきなさい。命を取るつもりなら最初から捕らえていないわ。無事は確認できているんでしょう？」"
translation = "「그냥 내버려 두렴. 목숨을 뺏을 생각이었다면 처음부터 붙잡지도 않았어. 무사한 건 확인했잖니?」"

[[dialogue]]
speaker = "レイラ"
original = "「ええ、まあ……ネビュラ基地はハッキング済みですので、みんなの様子は把握しています。魔女がパソコン音痴で助かりました」"
translation = "「네, 뭐…… 네뷸라 기지는 해킹 완료했으니 모두의 상태는 파악하고 있습니다. 마녀가 PC치라서 다행이었어요.」"

[[dialogue]]
speaker = "イザベラ"
original = "「私たちが世界を救えば、あとはどうとでもなるわ。今は計画の成就を考えなさい」"
translation = "「우리가 세계를 구하면 나머지는 어떻게든 될 거야. 지금은 계획의 성취만을 생각하렴.」"

[[dialogue]]
speaker = "レイラ"
original = "「……はい。でも、本当に必要なんですか？\u3000生贄なんて……」"
translation = "「……네. 하지만 정말 필요한 건가요? 제물 같은 게……」"

[[dialogue]]
speaker = "イザベラ"
original = "「いい加減、選びなさい。コラプサーたちを見捨て、ただの人間として生きていくのか。それとも朝比奈コハルコを犠牲にして、コラプサーたちと英雄になるか」"
translation = "「슬슬 선택하렴. 콜랩서들을 저버리고 평범한 인간으로 살아갈 것인지. 아니면 아사히나 코하루코를 희생시켜 콜랩서들과 함께 영웅이 될 것인지.」"

[[dialogue]]
speaker = "レイラ"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "レイラ"
original = "（私はもう立ち止まれない）"
translation = "（나는 이제 멈춰설 수 없어.）"

[[dialogue]]
speaker = "レイラ"
original = "（魔王に勝利し、百目騎の名を再び歴史に刻む……！）"
translation = "（마왕에게 승리하고 도메키의 이름을 다시 역사에 새기겠어……!）"

