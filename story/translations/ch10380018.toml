[[dialogue]]
speaker = "unk"
original = "真面目だけれどむっつりスケベな天使・イクシー。"
translation = "성실하지만 음란한 천사 익시."

[[dialogue]]
speaker = "unk"
original = "エッチな妄想をせずにはいられない彼女を受け入れ、恋人関係になってからというもの……彼女の要求はどんどん過激さを増していった。"
translation = "야한 망상을 하지 않고는 못 배기는 그녀를 받아들이고, 연인 관계가 된 이후로…… 그녀의 요구는 점점 과격함을 더해갔다."

[[dialogue]]
speaker = "unk"
original = "エッチな命令をして欲しい。漫画にあったプレイを真似してみたい。大人のオモチャでいじめて欲しい──"
translation = "야한 명령을 해줬으면 좋겠다. 만화에 나왔던 플레이를 흉내 내보고 싶다. 성인용 장난감으로 괴롭혀줬으면 좋겠다──"

[[dialogue]]
speaker = "unk"
original = "それら全てを叶えても、イクシーの性欲はエスカレートするばかりだった。もはや普通の場所で繋がるだけでは満足できなくなってしまって……"
translation = "그 모든 것을 이루어 주어도, 익시의 성욕은 에스컬레이트될 뿐이었다. 이제 평범한 장소에서 이어지는 것만으로는 만족할 수 없게 되어 버려서……"

[[dialogue]]
speaker = "イクシリオン"
original = "「はぁ、ああぁあっ……<emoji=heart04>\u3000入って、きましたぁっ……会長のおち○ちんっ……！」"
translation = "「하아, 아아아앗……<emoji=heart04> 들어, 왔어요오…… 회장님의 자지잇……!」"

[[dialogue]]
speaker = "イクシリオン"
original = "「はーっ<emoji=heart04>\u3000ふーっ<emoji=heart04>\u3000夢みたいです、大好きな会長とお外でこんな……<emoji=heart04>」"
translation = "「하아<emoji=heart04> 후우<emoji=heart04> 꿈만 같아요, 너무 좋아하는 회장님과 밖에서 이런……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ひっそり静まり返った夜の新星学園。それもあろうことか、校門の目の前で俺たちは繋がっていた。"
translation = "호젓하게 정적에 휩싸인 밤의 신성학원. 그것도 하필이면, 교문 바로 앞에서 우리들은 이어져 있었다."

[[dialogue]]
speaker = "イクシリオン"
original = "「心臓のドキドキ、凄いです、はっ、ふぅっ、はぁっ、ふぅっ<emoji=heart04>\u3000こんなところ見られたら……見られたらぁ、大変なことに……<emoji=heart04>」"
translation = "「심장 두근거림이, 엄청나요, 하앗, 후우, 하아, 후우<emoji=heart04> 이런 곳 들키면…… 들키면아, 큰일이 나버려요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺はまだ服を着ているが、イクシーは一糸まとわぬ全裸だ。"
translation = "나는 아직 옷을 입고 있지만, 익시는 실오라기 하나 걸치지 않은 전라다."

[[dialogue]]
speaker = "イクシリオン"
original = "「や、やぁん……<emoji=heart04>\u3000想像したら、どんどん濡れてきちゃいますっ……会長<emoji=heart04>\u3000会長っ……<emoji=heart04>」"
translation = "「야, 야앙……<emoji=heart04> 상상하니까, 점점 젖어버려요…… 회장님<emoji=heart04> 회장님……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "放課後の空き教室や、校舎外れのトイレで繋がった時の比ではないくらい、どろどろに濡れそぼったイクシーのあそこ。"
translation = "방과 후의 빈 교실이나, 교사 외곽의 화장실에서 이어졌을 때와는 비교도 안 될 정도로, 걸쭉하게 젖어버린 익시의 그곳."

[[dialogue]]
speaker = "イクシリオン"
original = "「は、はぁあっ<emoji=heart04>\u3000ふはぁあっ<emoji=heart04>\u3000おち○ちん、すっごく太いですっ<emoji=heart04>\u3000んんぅっ……何もしてないのにおつゆ、垂れちゃいますぅ<emoji=heart04>」"
translation = "「하, 하아앗<emoji=heart04> 후하아앗<emoji=heart04> 자지, 엄청 굵어요옷<emoji=heart04> 응으읏…… 아무것도 안 했는데 애액이, 흘러나와요오<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「制服濡れちゃうのに、おつゆ止まりませんっ<emoji=heart04>\u3000ど、どうしましょう、帰りに着る服、なくなっちゃいます……<emoji=heart04>」"
translation = "「교복 젖어버리는데, 애액이 멈추지 않아요옷<emoji=heart04> 어, 어떡하죠, 돌아갈 때 입을 옷이, 없어져 버려요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "足元には、ついさっきまで彼女が着ていた制服にスカート、靴にソックスまで転がっている。"
translation = "발치에는, 조금 전까지 그녀가 입고 있던 교복과 스커트, 구두에 양말까지 굴러다니고 있다."

[[dialogue]]
speaker = "unk"
original = "彼女が望み、俺が命じてここで脱がせたのだ。"
translation = "그녀가 바라고, 내가 명령해서 여기서 벗게 한 것이다."

[[dialogue]]
speaker = "クロト"
original = "「裸で帰る？」"
translation = "「벌거숭이로 돌아갈래?」"

[[dialogue]]
speaker = "イクシリオン"
original = "「ふぅ、うぅっ──<emoji=heart04>\u3000そ、そんなふしだらなことぉ……<emoji=heart04>」"
translation = "「후우, 우읏──<emoji=heart04> 그, 그런 파렴치한 짓으으을……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "いやいやと緩く首を振るも、まんざらでもなさそうな様子。"
translation = "아니라며 느릿하게 고개를 저으면서도, 싫지만은 않은 듯한 모습."

[[dialogue]]
speaker = "unk"
original = "性器でしか繋がっていないのに、彼女の鼓動まで感じ取れてしまうほどだ。"
translation = "성기로밖에 이어져 있지 않은데도, 그녀의 고동까지 느껴져 버릴 정도다."

[[dialogue]]
speaker = "unk"
original = "本当に、心の底からイクシーはこの野外露出プレイを愉しんでいた。"
translation = "정말로, 마음속 깊은 곳부터 익시는 이 야외 노출 플레이를 즐기고 있었다."

[[dialogue]]
speaker = "イクシリオン"
original = "「か、会長ぉ……動いて欲しいです……お願い、しますぅ<emoji=heart04>」"
translation = "「회, 회장님…… 움직여 주셨으면 해요…… 부탁, 드려요오<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「動く？」"
translation = "「움직여?」"

[[dialogue]]
speaker = "イクシリオン"
original = "「い、いじわる、ヤですぅ<emoji=heart04>\u3000おち○ちんっ<emoji=heart04>\u3000大好きな、会長の勃起おち○ちんで、おま○こ<emoji=heart04>\u3000ぱんぱん<emoji=heart04>\u3000してぇっ<emoji=heart04>」"
translation = "「구, 궂은일은, 싫어요오<emoji=heart04> 자지잇<emoji=heart04> 너무 좋아하는, 회장님의 발기 자지로, 보지<emoji=heart04> 팡팡<emoji=heart04> 해줘어엇<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "まるく真っ白なお尻をフリフリと揺らしておねだりしてくる全裸天使に、俺はゆるいピストンで応えた。"
translation = "동그랗고 새하얀 엉덩이를 살랑살랑 흔들며 조르는 전라 천사에게, 나는 느릿한 피스톤으로 응했다."

[[dialogue]]
speaker = "イクシリオン"
original = "「んっ──はぁあっ<emoji=heart04>\u3000ふぅ、んんぁ、ぉっ<emoji=heart04>」"
translation = "「응──하아앗<emoji=heart04> 후우, 으응, 오옷<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「ふぅっ、はぁあっ<emoji=heart04>\u3000ぇえあぁあ～っ<emoji=heart04>\u3000んんぅ、うぅう～っ<emoji=heart04>\u3000こ、これぇえっ……すごいぃ……気持ちいいですっ<emoji=heart04>」"
translation = "「후우, 하아앗<emoji=heart04> 에에아아~앗<emoji=heart04> 응으, 으으으~앗<emoji=heart04> 이, 이거어엇…… 굉장해여…… 기분 좋아여<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「ぶっといおち○ちん、ずりずり入ってきて──ぁひっ<emoji=heart04>\u3000ひぅ<emoji=heart04>\u3000ふひぅ<emoji=heart04>\u3000あぁ、ぁあっ……<emoji=heart04>」"
translation = "「굵다란 자지, 즈릿즈릿 들어와서──아힉<emoji=heart04> 히우<emoji=heart04> 후히우<emoji=heart04> 아아, 아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "奥まで挿入する時は甘く絡みつく感じなのに、引き抜く時は苛烈に締め上げてくる天使のおま○こ。"
translation = "안쪽까지 삽입할 때는 달콤하게 휘감기는 느낌인데, 뽑아낼 때는 가차 없이 조여오는 천사의 보지."

[[dialogue]]
speaker = "unk"
original = "男性器をしゃぶり尽くすみたいな刺激は、俺の方も油断するとすぐに果ててしまいそうだ。"
translation = "남성기를 남김없이 빨아올리는 듯한 자극은, 나조차 방심하면 금방 가버릴 것만 같았다."

[[dialogue]]
speaker = "イクシリオン"
original = "「ほんの数時間前まで、はぁ、たくさんの生徒さんがいた場所なのに……<emoji=heart04>」"
translation = "「불과 몇 시간 전까지, 하아, 많은 학생분들이 있던 장소인데……<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「裸になって、後ろから動物さんみたいなえっち……ふはぁああ、そこ、そこ好きぃっ<emoji=heart04>\u3000もっとぐりぐり、してくださいぃ<emoji=heart04>」"
translation = "「알몸이 되어서, 뒤에서 동물님 같은 에치…… 후하아아아, 거기, 거기 좋아여<emoji=heart04> 좀 더 구릿구릿, 해주세여<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "まだ明るい時間帯の校舎の様子をイメージしたのか、おま○このとろ肉でぎゅちぎゅちとペニスが揉みシゴかれる。"
translation = "아직 밝은 시간대의 교사 풍경을 상상한 건지, 보지의 야들야들한 살결이 규칫규칫 페니스를 비벼댄다."

[[dialogue]]
speaker = "unk"
original = "倒錯的なえっちを楽しむイクシーが喜ぶような言葉はすでにわかっている。"
translation = "도착적인 에치를 즐기는 익시가 기뻐할 만한 말은 이미 알고 있다."

[[dialogue]]
speaker = "unk"
original = "俺はわざと低く冷たい声で、彼女にだけ聞こえるようにささやく。"
translation = "나는 일부러 낮고 차가운 목소리로, 그녀에게만 들리도록 속삭인다."

[[dialogue]]
speaker = "クロト"
original = "「──イクシーのド変態。スケベ天使」"
translation = "「──익시 이 변태. 음란 천사.」"

[[dialogue]]
speaker = "イクシリオン"
original = "「ひぅッ<emoji=heart04>\u3000ひぅう～っ<emoji=heart04>\u3000ふぅう～っ<emoji=heart04>」"
translation = "「히우윽<emoji=heart04> 히우우~웃<emoji=heart04> 후우우~웃<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「そんなに気持ちいいの？\u3000外でするエッチ」"
translation = "「그렇게 기분 좋아? 밖에서 하는 에치.」"

[[dialogue]]
speaker = "イクシリオン"
original = "「は、はいぃっ<emoji=heart04>\u3000好きですっ、んぁ、うぅっ、ふぅっ、お外ではだかエッチ、す、好きぃっ<emoji=heart04>」"
translation = "「네, 네에엣<emoji=heart04> 좋아해여, 응아, 으윽, 후우, 밖에서 알몸 에치, 조, 좋아해여어<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「どうせイクのことだから、昼間から想像してたんじゃない？」"
translation = "「어차피 익 너라면, 낮부터 상상하고 있었던 거 아냐?」"

[[dialogue]]
speaker = "イクシリオン"
original = "「し、してましたぁっ<emoji=heart04>\u3000今夜、会長とここでできるんだって思いながらっ、パンツぐしょぐしょにしてました、あ、ぁぁっ<emoji=heart04>」"
translation = "「하, 하고 있었어여어<emoji=heart04> 오늘 밤, 회장님과 여기서 할 수 있다고 생각하면서, 팬티 축축하게 적시고 있었어여, 아, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「おっぱいっ、ち、乳首もずうっと勃っちゃってっ。早く裸になりたい、お外でしたいって、待ってたんです、ぅう<emoji=heart04>」"
translation = "「가슴도, 저, 젖꼭지도 계속 서버려서. 빨리 알몸이 되고 싶어, 밖에서 하고 싶어 하면서, 기다렸어여, 으으<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「外でやるにしたって、もっと人目に付かない場所もあるよね？\u3000なんでこんな目立つところでしたかったの？」"
translation = "「밖에서 한다고 해도, 좀 더 눈에 띄지 않는 장소도 있잖아? 왜 이런 눈에 띄는 곳에서 하고 싶어 했어?」"

[[dialogue]]
speaker = "イクシリオン"
original = "「そ、それは<emoji=heart04>\u3000イクシーがふしだらな天使、だからですっ<emoji=heart04>\u3000会長にして欲しくてっ、ここでおち○ちん入れて欲しくてぇっ<emoji=heart04>」"
translation = "「그, 그건<emoji=heart04> 익시가 부도덕한 천사, 이기 때문이에여어<emoji=heart04> 회장님이 해주셨으면 해서, 여기서 자지 넣어주셨으면 해서어어<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「みんなが使ってる場所で、神聖な学園でっ、ふしだらな交尾、したかったんですぅ、ぅあ、ふぅ、うぅうっ<emoji=heart04>」"
translation = "「모두가 사용하는 장소에서, 신성한 학원엣, 파렴치한 교미, 하고 싶었어요오, 으아, 후우, 우으윽<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "イクシーのアブノーマルな性欲を指摘するたび、ペニスに新たな愛液がぬるぬるとまぶされていく。"
translation = "익시의 비정상적인 성욕을 지적할 때마다, 페니스에 새로운 애액이 미끈미끈하게 칠해져 간다."

[[dialogue]]
speaker = "クロト"
original = "「ちょっとはリスクも考えたら？\u3000誰かが忘れ物でも取りに来るかも」"
translation = "「리스크도 좀 생각하는 게 어때? 누군가 잊은 물건이라도 찾으러 올지도 몰라」"

[[dialogue]]
speaker = "イクシリオン"
original = "「あ、あぁあっ……そうですよねっ……だ、誰かが忘れ物でも取りに来たらっ……<emoji=heart04>」"
translation = "「아, 아아앗…… 그렇죠오…… 누, 누군가 잊은 물건이라도 찾으러 오면으윽……<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「制服、脱ぎ散らかしてっ、おっぱいとおま○こ丸出しにして、後ろからぱんぱんされてる私、見られてっ……あ、ぁああっ……<emoji=heart04>」"
translation = "「교복, 여기저기 벗어 던지고서, 가슴이랑 보지 통째로 드러내고, 뒤에서 팡팡 당하고 있는 나를, 들켜서…… 아, 아아앗……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「──もし見つかったら、どう言い訳するの？」"
translation = "「──만약 들키면, 뭐라고 변명할 거야?」"

[[dialogue]]
speaker = "イクシリオン"
original = "「ふぇあ、あぁあんっ<emoji=heart04>\u3000もし……見つかったら………ふあぁ、そんなのぉっ<emoji=heart04>」"
translation = "「훼아, 아아앙<emoji=heart04> 만약…… 들키면……… 후아아, 그런 거어어<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「言い訳、できないですぅっ……<emoji=heart04>」"
translation = "「변명, 못 해요오옷……<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「お、お顔隠して『見ないでください<emoji=heart04>』ってお願いするしか……<emoji=heart04>」"
translation = "「어, 얼굴 가리고 『보지 말아 주세요<emoji=heart04>』라고 부탁하는 수밖에……<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「でも、だけど、きっと写真とか撮られちゃって……<emoji=heart04>\u3000ネットにアップされちゃったりしてっ……あ、あぁあ<emoji=heart04>\u3000やだあ<emoji=heart04>\u3000やだぁ<emoji=heart04>」"
translation = "「하지만, 그렇지만, 분명 사진 같은 거 찍혀버려서……<emoji=heart04> 인터넷에 업로드되어 버리거나 해서…… 아, 아아아<emoji=heart04> 싫어어<emoji=heart04> 싫어어어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "止まらない妄想に愛液がさらに増していく。"
translation = "멈추지 않는 망상에 애액이 더욱 늘어만 간다."

[[dialogue]]
speaker = "unk"
original = "ペニスに絡みつくぬるぬるがすさまじく、俺の腰の動きも自然と強くなって──"
translation = "페니스에 휘감기는 미끈거림이 엄청나서, 내 허리 움직임도 자연스럽게 강해지고──"

[[dialogue]]
speaker = "イクシリオン"
original = "「んんぁっ<emoji=heart04>\u3000ぅあっあっあっ<emoji=heart04>\u3000おち○ちん、ひぅあ、速くなって、んんああ<emoji=heart04>\u3000うぅっ、ふぅっ、ふぅう～っ<emoji=heart04>」"
translation = "「응으아<emoji=heart04> 으앗앗앗<emoji=heart04> 자지, 히우아, 빨라져서, 응응아아<emoji=heart04> 으으윽, 후으, 후우우~<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「イクシー。お尻、もっと上げて。大好きなおち○ちんでいっぱい突いてあげるから」"
translation = "「익시. 엉덩이, 좀 더 들어봐. 네가 좋아하는 자지로 가득 찔러줄 테니까」"

[[dialogue]]
speaker = "イクシリオン"
original = "「は、はいぃっ<emoji=heart04>\u3000こ、こぉですか？\u3000イクシーのおま○こ、ぱんぱん、しやすいですかっ？<emoji=heart04>」"
translation = "「하, 하이잇<emoji=heart04> 이, 이렇게요? 익시의 보지, 팡팡, 하기 쉬워요오?<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「いい感じ──だっ！」"
translation = "「좋은 느낌──이다!」"

[[dialogue]]
speaker = "イクシリオン"
original = "「きゅふぅううっ<emoji=heart04>\u3000お、おぐぅっ<emoji=heart04>\u3000すごいぃい<emoji=heart04>\u3000ごりごり、当たりますぅ<emoji=heart04>\u3000ぇえあぁあっ<emoji=heart04>」"
translation = "「큐후우우욱<emoji=heart04> 어, 어구욱<emoji=heart04> 굉장해애애<emoji=heart04> 고리고리, 닿아요오<emoji=heart04> 에에아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ぷしゃぷしゃっ──！\u3000とイクシーのおま○こから潮が噴き出る。彼女の制服、本当にずぶ濡れになってしまうかも。"
translation = "푸샤푸샤──! 하고 익시의 보지에서 애액이 뿜어져 나온다. 그녀의 교복, 정말로 흠뻑 젖어버릴지도 모른다."

[[dialogue]]
speaker = "イクシリオン"
original = "「おっぱい触ってください、お尻もいっぱい叩いてくださいぃっ<emoji=heart04>\u3000会長っ<emoji=heart04>\u3000かいちょぉ<emoji=heart04>\u3000んぁ、あっ、ふぁあ、あぁ、ぁあ<emoji=heart04>」"
translation = "「가슴 만져주세요, 엉덩이도 잔뜩 때려주세요오옷<emoji=heart04> 회장님<emoji=heart04> 회장니이임<emoji=heart04> 응아, 앗, 화아, 아아, 아아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "野外だというのに、イクシーのおねだりは止まらない。声も止まらない。いくら周りに誰もいないとは言え……"
translation = "야외인데도 불구하고, 익시의 조르기는 멈추지 않는다. 목소리도 멈추지 않는다. 아무리 주변에 아무도 없다고는 해도……"

[[dialogue]]
speaker = "イクシリオン"
original = "「もっとしてください、もっと、もっとっ<emoji=heart04>」"
translation = "「더 해주세요, 좀 더, 좀 더어<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "あまりに淫乱なところを見せられると、恋人としては少し心配にもなってしまう。だから──"
translation = "너무나 음란한 모습을 보게 되니, 연인으로서는 조금 걱정도 되어버린다. 그러니까──"

[[dialogue]]
speaker = "クロト"
original = "「もし男に見つかったらどうする？」"
translation = "「만약 남자한테 들키면 어떡할 거야?」"

[[dialogue]]
speaker = "イクシリオン"
original = "「──ぇ、お、男の、人……？」"
translation = "「──에, 나, 남자가, 사람……?」"

[[dialogue]]
speaker = "クロト"
original = "「そう。イクシーが読んでる漫画にもあるだろ？\u3000大勢の男子が、エッチな女の子を順番に……ってやつ」"
translation = "「그래. 익시가 읽는 만화에도 나오잖아? 수많은 남자가, 야한 여자애를 순서대로…… 하는 그거」"

[[dialogue]]
speaker = "イクシリオン"
original = "「そ、それは……ヤですっ……」"
translation = "「그, 그건…… 싫어요오……」"

[[dialogue]]
speaker = "イクシリオン"
original = "「会長じゃないとヤです、私がえっちしたいのは……会長だけ、やらしいことしたいのは、会長だけぇっ……<emoji=heart04>」"
translation = "「회장님이 아니면 싫어요, 내가 섹스하고 싶은 건…… 회장님뿐, 야한 짓 하고 싶은 건, 회장님뿐이에요오……<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「会長にしか、いやらしいところ、見せたくないんですっ<emoji=heart04>」"
translation = "「회장님한테만, 야한 모습, 보여주고 싶지 않단 말이에요옷<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "本当に彼女は、可愛くって一途な淫乱天使で──たまらなくなった俺は、後ろから犯しながら彼女の唇にキスをする。"
translation = "정말로 그녀는, 귀엽고 일편단심인 음란 천사라서── 견딜 수 없어진 나는, 뒤에서 범하며 그녀의 입술에 키스를 한다."

[[dialogue]]
speaker = "イクシリオン"
original = "「んんぅうっ<emoji=heart04>\u3000ふぁむ、んむちゅる、れぇえ、れぇ～、れろ、れられら<emoji=heart04>\u3000れりゅ、れちゅるぅ、れちゃれちゃぁ<emoji=heart04>」"
translation = "「응응으읏<emoji=heart04> 화무, 응무츄르, 레에에, 레에~, 레로, 레라레라<emoji=heart04> 레류, 레츄르으, 레챠레챠아<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「ふぁああ、会長……お外で裸でチューするの、気持ちいぃですぅっ<emoji=heart04>\u3000好きぃ、会長──んんちゅぅ<emoji=heart04>」"
translation = "「화아아아, 회장님…… 밖에서 알몸으로 츄 하는 거, 기분 좋아아아요오옷<emoji=heart04> 좋아해, 회장님── 응응츄우<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "立ちバックで貫かれながら、太ももまで伝うほどに愛液を垂れ流すイクシー。"
translation = "뒤로 선 채로 꿰뚫리면서, 허벅지까지 타고 흐를 정도로 애액을 쏟아내는 익시."

[[dialogue]]
speaker = "unk"
original = "よだれを交換するたびに可愛くこくこくと喉を鳴らしてくれる。"
translation = "타액을 교환할 때마다 귀엽게 꿀꺽꿀꺽 목을 울려준다."

[[dialogue]]
speaker = "イクシリオン"
original = "「だいしゅき……<emoji=heart04>\u3000会長、しゅき<emoji=heart04>\u3000んちゅ、れぇ、んちゅる、れろれろ、んれろっ<emoji=heart04>」"
translation = "「너무 조아……<emoji=heart04> 회장님, 조아<emoji=heart04> 응츄, 레에, 응츄르, 레로레로, 응레로옷<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「んちゅ、ちゅるぅ、んんむぅ、ちゅるぅっ、ちゅう、ちゅぱ、れぇ、ちゅぱちゅぱっ、んちゅぅっ、ちゅるぅっ<emoji=heart04>」"
translation = "「응츄, 츄루우, 응응무우, 츄루웃, 츄우, 츄파, 레에, 츄파츄팟, 응츄웃, 츄루웃<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「んんぅ、おっぱいも、もっと触ってください<emoji=heart04>\u3000会長……<emoji=heart04>」"
translation = "「응응으, 가슴도, 좀 더 만져주세요<emoji=heart04> 회장님……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "形の良いおっぱいを揉みしだき、ピストンを続けたまま深くキスを続ける俺たち。"
translation = "모양 좋은 가슴을 주물러 터뜨리며, 피스톤을 계속한 채 깊은 키스를 이어가는 우리들."

[[dialogue]]
speaker = "unk"
original = "もう幾度も交わってきたから、俺の絶頂が近いことをイクシーはすぐに察した。"
translation = "이미 몇 번이나 섞여왔기에, 나의 절정이 가깝다는 것을 익시는 금방 알아차렸다."

[[dialogue]]
speaker = "イクシリオン"
original = "「ふぁむ、んちゅる、れちゅ、んちゅるぅ……会長の、んぅ、おち○ちん、んちゅ、そろそろぉ……<emoji=heart04>」"
translation = "「화무, 응츄르, 레츄, 응츄루우…… 회장님의, 응으, 자지, 응츄, 슬슬……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "言葉の合間にキスをしながらの、中出しのおねだり……"
translation = "말 사이사이에 키스를 하며, 질내사정을 조르는 모습……"

[[dialogue]]
speaker = "イクシリオン"
original = "「欲しいです、んちゅ、んんちゅ、中に、出してぇっ……ちゅる、んちゅ、ちゅぅ、ちゅぱ、ちゅるぅ、んちゅるぅっ<emoji=heart04>」"
translation = "「원해요, 응츄, 응응츄, 안에, 내줘요옷…… 츄르, 응츄, 츄우, 츄파, 츄루우, 응츄루웃<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「かいちょうの、せーし<emoji=heart04>\u3000んちゅ、ちゅる<emoji=heart04>\u3000イクシーの子宮にくださいっ<emoji=heart04>\u3000んむ、んっちゅる、んっふぅっ<emoji=heart04>」"
translation = "「회장님의, 정액<emoji=heart04> 응츄, 츄르<emoji=heart04> 익시의 자궁에 주세요옷<emoji=heart04> 응무, 응으츄르, 응으후웃<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "こんなにいやらしく求められて盛り上がらないわけがなく、子宮めがけてペニスを突き立てる。"
translation = "이렇게나 음란하게 원하는데 달아오르지 않을 리가 없고, 자궁을 향해 페니스를 치켜세운다."

[[dialogue]]
speaker = "イクシリオン"
original = "「──はぁっ！\u3000ふうう、んんぅ、んぁ、あぁ、あぁあっ<emoji=heart04>\u3000はっ、げっ、しっ──んんぅ、ふぅ、あぁ、ぅ、んんぅ<emoji=heart04>」"
translation = "「──하앗! 후우우, 응응으, 응아, 아아, 아아앗<emoji=heart04> 하앗, 겍, 식──응응으, 후우, 아아, 으, 응응으<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「深い、すっごく深いぃ<emoji=heart04>\u3000ぅああ<emoji=heart04>\u3000あーっ<emoji=heart04>\u3000ひう、あっ、あっあっあっあっ<emoji=heart04>」"
translation = "「깊어, 엄청 깊어어어<emoji=heart04> 으아아<emoji=heart04> 아아앗<emoji=heart04> 히우, 앗, 앗앗앗앗<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「す、好きぃ、会長好きぃっ、おち○ちんください、もっと突いてくださっ、ぃいっ<emoji=heart04>」"
translation = "「조, 좋아해요, 회장님 좋아해요옷, 자지 주세요, 좀 더 찔러주세, 요옷<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「イクシー、ちょっと声を……！」"
translation = "「익시, 목소리를 조금만……!」"

[[dialogue]]
speaker = "イクシリオン"
original = "「む、無理ですっ<emoji=heart04>\u3000ふぇあああぁっ<emoji=heart04>\u3000気持ち良すぎてっ、ひぅ、ひうぅうっ<emoji=heart04>\u3000あ、あっあっあっ、ぅああぁ<emoji=heart04>」"
translation = "「무, 무리에요옷<emoji=heart04> 페아아아앗<emoji=heart04> 기분 너무 좋아서어, 히으, 히으으으읏<emoji=heart04> 아, 앗앗앗, 으아아아<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「気持ちいいです、おち○ちん気持ちいいですぅうっ<emoji=heart04>」"
translation = "「기분 좋아요, 자지 기분 좋아아아요오옷<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「ぱんぱん好き<emoji=heart04>\u3000会長のぱんぱん好きっ<emoji=heart04>\u3000大好き、大好き大好きっ、あぁぁっ<emoji=heart04>\u3000会長好き、好き好きっ<emoji=heart04>\u3000あああぁぁああっ<emoji=heart04>」"
translation = "「팡팡 좋아<emoji=heart04> 회장님의 팡팡 좋아앗<emoji=heart04> 너무 좋아, 너무 좋아 너무 좋아앗, 아아아앗<emoji=heart04> 회장님 좋아, 좋아 좋아앗<emoji=heart04> 아아아아아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "誰かが遠くから聞きつけてもおかしくないほどの声量──乱暴に突くほど大きな喘ぎ声を上げることはわかっているのに。"
translation = "누군가 멀리서 듣더라도 이상하지 않을 정도의 성량── 난폭하게 찌를수록 큰 신음소리를 낼 거라는 걸 알고 있는데도."

[[dialogue]]
speaker = "unk"
original = "射精が近づくにつれて、次第にスイッチが入っていく。ペニスの動きを止められなくなっていく──"
translation = "사정이 다가올수록, 서서히 스위치가 들어간다. 페니스의 움직임을 멈출 수 없게 되어간다──"

[[dialogue]]
speaker = "unk"
original = "誰かに見つかることよりも、今はただ、目の前のエッチでふしだらで可愛い天使におぼれたくて。"
translation = "누군가에게 들키는 것보다, 지금은 그저 눈앞의 야하고 천박하고 귀여운 천사에게 빠져들고 싶어서."

[[dialogue]]
speaker = "クロト"
original = "「どこに出して欲しい？」"
translation = "「어디에 내주길 원해?」"

[[dialogue]]
speaker = "イクシリオン"
original = "「中っ<emoji=heart04>\u3000中にください、お願いしますっ、外はだめ、中にっ<emoji=heart04>\u3000あぁ、あぁあっ<emoji=heart04>」"
translation = "「안에욧<emoji=heart04> 안에 주세요, 부탁드려요옷, 밖은 안 돼, 안에엣<emoji=heart04> 아아, 아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「あ──ぁ──ぁぁああ<emoji=heart04>\u3000き、来ますっ、すごいの、来ちゃいますぅっ<emoji=heart04>」"
translation = "「아──아──아아아아아<emoji=heart04> 와, 와요, 엄청난 게, 와버려요오옷<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「イク、もうイきますっ<emoji=heart04>\u3000イっちゃいますっ<emoji=heart04>\u3000イっていいですか、会長、中出しされながら、イっていいですか、いいですかっ<emoji=heart04>」"
translation = "「가요, 이제 가버려요옷<emoji=heart04> 가버려요옷<emoji=heart04> 가도 되나요, 회장님, 질내사정 당하면서, 가도 되나요, 되나요옷<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「いいぞ……思いっきりイけ！」"
translation = "「좋아…… 마음껏 가버려!」"

[[dialogue]]
speaker = "イクシリオン"
original = "「あ、ぁっ、ぅうああっ<emoji=heart04>\u3000イクっ<emoji=heart04>\u3000イクイクイクっ<emoji=heart04>\u3000イきますっ<emoji=heart04>\u3000イきます、イクイク、イクぅぅうーっ……！！」"
translation = "「아, 아앗, 으으아앗<emoji=heart04> 가요옷<emoji=heart04> 가가각가앗<emoji=heart04> 가버려요옷<emoji=heart04> 가버려요, 가요 가요, 가요오오오옷……!!」"

[[dialogue]]
speaker = "イクシリオン"
original = "「んんぁあ、ぁあああぁあぁぁ～っ<emoji=heart04><emoji=heart04>」"
translation = "「응응아아, 아아아아아아아아~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "種付けするみたいに全力で撃ち込んで、最奥で精液を解き放つ。"
translation = "씨를 뿌리듯이 전력으로 때려 박고, 가장 깊은 곳에서 정액을 해방한다."

[[dialogue]]
speaker = "unk"
original = "宣言通り、俺に中出しされた瞬間、イクシーのお尻はひときわ大きくぶるんと震えた。"
translation = "선언대로, 나에게 질내사정 당한 순간, 익시의 엉덩이는 유난히 크게 부르르 떨렸다."

[[dialogue]]
speaker = "イクシリオン"
original = "「ぁああっ<emoji=heart04>\u3000ぇえあっ<emoji=heart04>\u3000あっあっあっ<emoji=heart04>\u3000ふぇああぁああ～っ<emoji=heart04>」"
translation = "「아아앗<emoji=heart04> 에에앗<emoji=heart04> 앗앗앗<emoji=heart04> 페아아아아아~앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "一滴も離さないとばかりに吸い付いて、俺が精液を吹き散らすたびにびくんびくんと反応するイクシー。"
translation = "한 방울도 놓치지 않겠다는 듯이 달라붙어, 내가 정액을 흩뿌릴 때마다 파르르 파르르 반응하는 익시."

[[dialogue]]
speaker = "unk"
original = "こんな華奢な体のどこにこんな力が──と聞きたいくらいの苛烈な締め付け。ペニスの根元からしぼり抜かれているみたいだ。"
translation = "이런 가녀린 몸 어디에 이런 힘이──라고 묻고 싶을 정도의 가혹한 조임. 페니스의 뿌리부터 짜내 지는 것 같다."

[[dialogue]]
speaker = "イクシリオン"
original = "「ま、まだっ……びゅるっ……びゅるるっ……出て……<emoji=heart04>」"
translation = "「아, 아직…… 뷰릇…… 뷰르르윽…… 나와요……<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「射精、な、長いですぅっ……ぁ、あぁあああーっ……あったかぁい<emoji=heart04>\u3000気持ちぃい……<emoji=heart04>」"
translation = "「사정, 기, 길어요오옷…… 아, 아아아아아앗…… 따뜻해애<emoji=heart04> 기분 좋아아……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「イクシー……まだ出るから……」"
translation = "「익시…… 아직 더 나오니까……」"

[[dialogue]]
speaker = "イクシリオン"
original = "「はいぃっ<emoji=heart04>\u3000お尻、すりすり、くっつけますぅ……<emoji=heart04>\u3000好き、会長好き……ぁっ<emoji=heart04>\u3000ふぁっ<emoji=heart04>\u3000あ～っ……<emoji=heart04>」"
translation = "「네에엣<emoji=heart04> 엉덩이, 비비적비비적, 밀착할게요오……<emoji=heart04> 좋아해, 회장님 좋아해…… 앗<emoji=heart04> 화앗<emoji=heart04> 아~앗……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "結合部から噴きこぼしながらも、ごくりごくりと、イクシーの女性器は俺の精液を飲み下していく。"
translation = "결합부에서 뿜어져 나오면서도, 꿀꺽꿀꺽, 익시의 보지는 나의 정액을 삼켜 내려간다."

[[dialogue]]
speaker = "イクシリオン"
original = "「んんぅっ、ふぅうーっ、んんん～っ……あぁあ……<emoji=heart04>」"
translation = "「응응으읏, 후우우웃, 응응응~으…… 아아아……<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「お、お腹ぁ……ぽかぽか、ですぅ……<emoji=heart04>」"
translation = "「배, 배가…… 뜨끈뜨끈, 해요오……<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「ふはぁああっ……ふぅううっ……今までで一番、す、すごかったです……会長……<emoji=heart04>」"
translation = "「후하아아앗…… 후우우읏…… 지금까지 중에 제일, 거, 엄청났어요…… 회장님……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「俺も、すごく……気持ち良かった、イクシー……」"
translation = "「나도, 정말…… 기분 좋았어, 익시……」"

[[dialogue]]
speaker = "イクシリオン"
original = "「嬉しいです……<emoji=heart04>\u3000あ、やぁんっ……まだ、抜かないでください……」"
translation = "「기뻐요……<emoji=heart04> 아, 야앙…… 아직, 빼지 말아 주세요……」"

[[dialogue]]
speaker = "イクシリオン"
original = "「おち○ちん好き……会長のおち○ちん好きなんです……私のおま○この中に、もうちょっとだけ、いてください……<emoji=heart04>」"
translation = "「자지 좋아…… 회장님의 자지 좋아한단 말이에요…… 제 보지 안에, 조금만 더, 있어 주세요……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "そうは言うけれど、イクシーの女性器はとにかく柔らかくてキツくて気持ちが良くて……このままだとまた復活してしまいそうだ。"
translation = "그렇게 말하지만, 익시의 보지는 어쨌든 부드럽고 꽉 조여서 기분이 좋아서…… 이대로라면 다시 부활해버릴 것 같다."

[[dialogue]]
speaker = "イクシリオン"
original = "「また出したくなったら、そのままぱんぱん、再開しちゃって……いいですからぁ……<emoji=heart04>」"
translation = "「다시 내고 싶어지면, 그대로 팡팡, 재개해버려도…… 좋으니까요오……<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
original = "「もっとしたいです、会長とここで、お外えっち……<emoji=heart04>\u3000ダメ、ですか？」"
translation = "「더 하고 싶어요, 회장님이랑 여기서, 야외 섹스……<emoji=heart04> 안, 되나요?」"

[[dialogue]]
speaker = "unk"
original = "たっぷり深く絶頂したのに、もうおねだりを始めるイクシー。"
translation = "듬뿍 깊게 절정했는데도, 벌써 조르기 시작하는 익시."

[[dialogue]]
speaker = "unk"
original = "お尻をまたゆるくフリフリしながら、俺のペニスを刺激してくる。"
translation = "엉덩이를 다시 살랑살랑 흔들며, 나의 페니스를 자극해온다."

[[dialogue]]
speaker = "イクシリオン"
original = "「会長……もう１回だけ……もう１回だけぇ……<emoji=heart04>」"
translation = "「회장님…… 한 번만 더…… 한 번만 더어어……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
original = "「……あと１回だけだからな」"
translation = "「……딱 한 번뿐이다」"

[[dialogue]]
speaker = "イクシリオン"
original = "「……えへ<emoji=heart04>\u3000はぁい、会長……<emoji=heart04>」"
translation = "「……에헤<emoji=heart04> 네에, 회장님……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "……と、そんな風にして始まった２回戦の後も、イクシーの性欲はおとろえず。"
translation = "……그렇게 해서 시작된 2회전 후에도, 익시의 성욕은 수그러들지 않고."

[[dialogue]]
speaker = "unk"
original = "むしろ火がついてしまったかのように、３回、４回、５回と中出しを続けることになるのだった。"
translation = "오히려 불이 붙어버린 것처럼, 3회, 4회, 5회 계속해서 질내사정을 이어가게 되는 것이었다."

[[dialogue]]
speaker = "unk"
original = "……誰にも見つからなくて、本当に良かった。"
translation = "……누구에게도 들키지 않아서, 정말 다행이었다."

