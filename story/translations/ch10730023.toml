[[dialogue]]
speaker = "unk"
original = "第３話,リノとリコリンフィア,P"
translation = "제3화, 리노와 리코린피아, P"

[[dialogue]]
speaker = "unk"
original = "ある休日、リコから話があると言われ、私はリゾート結界のプライベートビーチへと足を運んでいた。"
translation = "어느 휴일, 리코로부터 할 말이 있다는 소리를 듣고 나는 리조트 결계의 프라이빗 비치로 발걸음을 옮기고 있었다."

[[dialogue]]
speaker = "リコリンフィア"
original = "「わざわざ呼び出してすまないな、リノ」"
translation = "「일부러 불러내서 미안하군, 리노.」"

[[dialogue]]
speaker = "リノ"
original = "「それは構わないけど……リコ、２人きりで話って何かしら？\u3000また公安委員会の仕事？」"
translation = "「그건 상관없지만…… 리코, 둘이서만 할 이야기라는 게 뭐야? 또 공안위원회 일?」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「いいや。今日は私情だ」"
translation = "「아니. 오늘은 사적인 일이다.」"

[[dialogue]]
speaker = "リノ"
original = "「私情……？」"
translation = "「사적인 일……?」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「まあ、海の家で落ち着いて、話そうじゃないか」"
translation = "「뭐, 바다의 집에서 진정하고 이야기하자고.」"

[[dialogue]]
speaker = "unk"
original = "そうしてリコに促され、海の家に入り、席に着く。"
translation = "그렇게 리코의 권유로 바다의 집에 들어가 자리에 앉는다."

[[dialogue]]
speaker = "リノ"
original = "「まさか、昼間からお酒を飲んで話だなんて……」"
translation = "「설마 낮부터 술을 마시며 이야기할 줄이야……」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「リップルに頼んで、ビールサーバーを付けといて貰ったんだ。大人同士の話し合いには、少しは毒も必要だろう？」"
translation = "「리플에게 부탁해서 맥주 서버를 설치해 달라고 했지. 어른끼리의 대화에는 약간의 독도 필요하지 않겠어?」"

[[dialogue]]
speaker = "リノ"
original = "「毒って……」"
translation = "「독이라니……」"

[[dialogue]]
speaker = "unk"
original = "リコが運んで来たビールジョッキに、私は口を付ける。"
translation = "리코가 가져온 맥주잔에 나는 입을 댄다."

[[dialogue]]
speaker = "リコリンフィア"
original = "「感情の紐を緩めてくれる毒だ。さて、今日呼び出した本題だが――」"
translation = "「감정의 끈을 늦춰주는 독이다. 자, 오늘 불러낸 본론이다만──」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「リノ、お前ぶっちゃけ、少年を異性として見ているだろう？」"
translation = "「리노, 너 솔직히 소년을 이성으로 보고 있지?」"

[[dialogue]]
speaker = "リノ"
original = "「ぶほっ！？\u3000ごほっ！\u3000ごほっ……！！」"
translation = "「푸훕!? 쿨럭! 쿨럭……!!」"

[[dialogue]]
speaker = "unk"
original = "ビールを飲んでいた私はむせてしまう。"
translation = "맥주를 마시던 나는 사레가 들리고 만다."

[[dialogue]]
speaker = "リノ"
original = "「な、なんで……！？」"
translation = "「어, 어떻게……!?」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「お前は動揺すると分かりやすいからな。この前、街で会った時なんて、明らかに挙動不審だったぞ」"
translation = "「너는 동요하면 알기 쉬우니까. 저번 시내에서 만났을 때만 해도 명백히 거동이 수상했다고.」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「で、最近は少年のことで悩んでしまっている。違うか？」"
translation = "「그래서 최근에는 소년 문제로 고민하고 있지. 아니냐?」"

[[dialogue]]
speaker = "リノ"
original = "「……さすがは公安委員会の本部長ね」"
translation = "「……역시 공안위원회의 본부장이네.」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「ああ、私に下手な隠し事はできない。だから正直に自白してしまった方が楽になれるぞ」"
translation = "「그래, 나에게 어설픈 숨김질은 통하지 않아. 그러니 솔직히 자백해 버리는 게 편해질 거다.」"

[[dialogue]]
speaker = "リノ"
original = "「……そうね。わかったわ」"
translation = "「……그렇네. 알았어.」"

[[dialogue]]
speaker = "unk"
original = "私はそれから、他の誰にも打ち明けられなかった『夢』のことを、彼女に話した。"
translation = "나는 그 뒤로 다른 누구에게도 털어놓지 못했던 『꿈』 이야기를 그녀에게 했다."

[[dialogue]]
speaker = "リコリンフィア"
original = "「なるほど……平行世界では少年と恋人関係になっていて、お互いにその記憶を体験してしまった……か」"
translation = "「과연…… 평행 세계에서는 소년과 연인 관계였고 서로 그 기억을 체험해 버렸다……라」"

[[dialogue]]
speaker = "リノ"
original = "「ええ。それ以来、私はクロトのことを前みたいに見られなくなってしまって……」"
translation = "「응. 그 이후로 나는 쿠로토를 전처럼 볼 수 없게 되어버려서……」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「ふむ……」"
translation = "「흠……」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「リノ。私は男性経験も、恋愛経験もない」"
translation = "「리노. 나는 남성 경험도, 연애 경험도 없다.」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「当然、子育てをしたことはないし、魔女であるリノとは年も離れている」"
translation = "「당연히 육아를 해본 적도 없고 마녀인 리노와는 나이 차이도 나지.」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「それでも、１人の友人として意見を述べさせてもらうなら――」"
translation = "「그래도 한 명의 친구로서 의견을 말해보자면──」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「少年のあの様子は、脈アリだと思うぞ」"
translation = "「소년의 저 모습은 승산이 있다고 생각한다.」"

[[dialogue]]
speaker = "リノ"
original = "「そ、そうなの！？」"
translation = "「그, 그래!?」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「ああ。情報収集が趣味の、私の直感だがな」"
translation = "「그래. 정보 수집이 취미인 나의 직감이다만.」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「その上で、血が繋がっていないのなら、あとはお前たちの気持ちの問題だ」"
translation = "「거기에 피가 섞이지 않았다면 남은 건 너희 마음 문제야.」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「前提として、リノと少年が、血が繋がった親子だというなら頭を抱えるところだが、幸いなことにそうじゃない」"
translation = "「전제로 리노와 소년이 혈연관계인 부모 자식이라면 머리를 싸매겠지만 다행히 그렇지 않지.」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「だから、後は倫理観を取るか、幸福度を取るかの話だ」"
translation = "「그러니 나머지는 윤리관을 택할지 행복도를 택할지의 문제다.」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「端から見て気持ち悪いと感じる者は当然いるだろう。周りからそう思われたくないなら、倫理観を取ればいい」"
translation = "「옆에서 보고 기분 나쁘다고 느끼는 자는 당연히 있겠지. 주변에서 그렇게 보이고 싶지 않다면 윤리관을 택하면 된다.」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「だが、それはお前たちにとって本当に幸福なことか？\u3000リノが幸福を選ぶことで、周りの誰かに迷惑をかけるわけでもない」"
translation = "「하지만 그게 너희에게 정말 행복한 일인가? 리노가 행복을 선택한다고 해서 주변 누군가에게 폐를 끼치는 것도 아니지.」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「それに、寿命が長い魔族が人間界に入り混じるようになって久しい昨今、人間の親子くらい年が離れた男女が結ばれるのは、そう珍しいことでもない」"
translation = "「게다가 수명이 긴 마족이 인간계에 섞여 살게 된 지 오래인 요즘, 인간 부모 자식만큼 나이 차이가 나는 남녀가 맺어지는 건 그렇게 드문 일도 아니다.」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「だから――最も大事なのは、リノがどうしたいかだ」"
translation = "「그러니── 가장 중요한 건 리노가 어떻게 하고 싶냐는 거다.」"

[[dialogue]]
speaker = "リノ"
original = "「私が、どうしたいか……」"
translation = "「내가 어떻게 하고 싶은지……」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「少年と親子のままでいたいのか。それとも、少年と恋人になりたいのか」"
translation = "「소년과 부모 자식으로 남고 싶은 건지, 아니면 소년과 연인이 되고 싶은 건지.」"

[[dialogue]]
speaker = "unk"
original = "リコはそこで、おどけたようにふっと笑ってみせて。"
translation = "리코는 거기서 장난스럽게 훗 웃어 보이며."

[[dialogue]]
speaker = "リコリンフィア"
original = "「まぁ、もし恋人になったら、人前では親子として振舞わないように心がけた方がいいとは思うがな」"
translation = "「뭐, 만약 연인이 된다면 사람들 앞에서는 부모 자식처럼 행동하도록 유의하는 게 좋다고 생각한다만.」"

[[dialogue]]
speaker = "リノ"
original = "「……ふふっ、そうね。私なら、ついやっちゃいそう」"
translation = "「……후후, 그렇네. 나라면 무심코 해버릴지도.」"

[[dialogue]]
speaker = "リノ"
original = "「――リコ、ありがとう。私、クロトとちゃんと話してみるわ」"
translation = "「──리코, 고마워. 나 쿠로토와 제대로 이야기해 볼게.」"

[[dialogue]]
speaker = "リノ"
original = "「私の気持ちだけじゃなくて、クロトの気持ちもちゃんと聞いてみないと」"
translation = "「내 마음뿐만 아니라 쿠로토의 마음도 제대로 들어보지 않으면 안 되니까.」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「そうだな。……まぁ、今日は休日だ。ゆっくり酒を飲みながら、もう少し話して行こうじゃないか」"
translation = "「그렇군. ……뭐, 오늘은 휴일이다. 느긋하게 술 마시면서 좀 더 이야기하다 가자고.」"

[[dialogue]]
speaker = "リノ"
original = "「そういえば、リコと飲むのは随分久しぶりね」"
translation = "「그러고 보니 리코와 마시는 건 상당히 오랜만이네.」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「私は外だと一応、附属生の肩書きがあるのでな。普段は家飲みだ」"
translation = "「나는 밖에서는 일단 부속생이라는 직함이 있어서 말이지. 평소에는 집에서 마신다.」"

[[dialogue]]
speaker = "リノ"
original = "「なら今度、私たちの家に飲みに来る？」"
translation = "「그럼 다음에 우리 집에 마시러 올래?」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「ふっ、いいのか？\u3000少年との愛の巣にお邪魔しても」"
translation = "「훗, 괜찮나? 소년과의 사랑의 보금자리에 방해해도.」"

[[dialogue]]
speaker = "リノ"
original = "「あ、愛の巣だなんてそんな……えへへ<emoji=heart04>」"
translation = "「사, 사랑의 보금자리라니 무슨…… 에헤헤<emoji=heart04>」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「その反応がもう、答えになっているじゃないか。ちなみに、リノは少年のどんなところが好きなんだ？」"
translation = "「그 반응이 이미 답이 되어 있지 않나. 참고로 리노는 소년의 어떤 점을 좋아하지?」"

[[dialogue]]
speaker = "リノ"
original = "「え～？\u3000それはもう、全部よ～、全部♪\u3000欠点も含めてね<emoji=heart04>」"
translation = "「에~? 그건 뭐, 전부야~, 전부♪ 단점까지 포함해서 말이지<emoji=heart04>」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「親バカが色恋に転じるとこうなるわけか。興味深い」"
translation = "「팔불출 엄마가 연심으로 바뀌면 이렇게 되는 건가. 흥미롭군.」"

[[dialogue]]
speaker = "リノ"
original = "「リコ、毒舌～」"
translation = "「리코, 독설이야~」"

[[dialogue]]
speaker = "リコリンフィア"
original = "「私は毒使いの星騎士なのでな」"
translation = "「나는 독을 사용하는 성기사니까 말이지.」"

[[dialogue]]
speaker = "unk"
original = "それからも私たちは、ビールを飲みながら久しぶりにゆっくりと語らうのだった――"
translation = "그 뒤로도 우리는 맥주를 마시며 오랜만에 느긋하게 이야기를 나누는 것이었다──"

