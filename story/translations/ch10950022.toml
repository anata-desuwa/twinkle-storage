[[dialogue]]
speaker = "unk"
original = "第２話,新年から初々しく,P"
translation = "제2화, 신년부터 풋풋하게"

[[dialogue]]
speaker = "unk"
original = "シズハと恋人として付き合い始めた新年。お正月が明けた昼休みに、俺は彼女と学園で顔を合わせる。"
translation = "시즈하와 연인으로서 사귀기 시작한 신년. 정월이 지난 점심시간에 나는 그녀와 학원에서 얼굴을 마주한다."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「あ、あの……会長、ごきげんよう。えへへっ……」"
translation = "「저, 저기…… 회장님, 평안하신가요. 에헤헤……」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「そ、それじゃあ、お昼食べに行こっか……」"
translation = "「그, 그럼 점심 먹으러 갈까……」"

[[dialogue]]
speaker = "unk"
original = "おそらく、シズハは照れくさくて緊張しているのだろう。そんな彼女を和ませようと、俺は冗談混じりに提案する。"
translation = "아마도 시즈하는 쑥스러워서 긴장하고 있는 것이리라. 그런 그녀를 달래기 위해 나는 농담 섞인 제안을 한다."

[[dialogue]]
speaker = "unk"
original = "なんか今日、ちょっと元気ない？\u3000なら――"
translation = "왠지 오늘 좀 기운이 없나? 그럼――"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「へ！？\u3000恋人になったわけだし、会長のお尻だったら好きなだけ揉んでいい！？」"
translation = "「헤!? 연인이 됐으니까 회장님 엉덩이라면 마음껏 주물러도 된다고!?」"

[[dialogue]]
speaker = "unk"
original = "『お尻を触るのはコミュニケーション』と豪語するシズハならば、これでいつもみたいに元気に食いついてくるはず――と思っていたのだが。"
translation = "『엉덩이를 만지는 건 커뮤니케이션』이라고 호언장담하는 시즈하라면 이걸로 평소처럼 활기차게 달려들 것이라 생각했었는데."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「ななな、何言ってるの会長！？\u3000バカバカ！\u3000そんな破廉恥なこと、するわけないじゃない……！」"
translation = "「나나나, 무슨 소리 하는 거야 회장님!? 바보바보! 그런 파렴치한 짓을 할 리가 없잖아……!」"

[[dialogue]]
speaker = "unk"
original = "あれ！？！？"
translation = "어라!?!?"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「恋人になったんだから、そういうのはもっと関係が深まってからじゃないと……！」"
translation = "「연인이 됐으니까 그런 건 좀 더 관계가 깊어진 뒤가 아니면……!」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「か、会長も、私のお尻を勝手に触ったりしたらセクハラだからね！？」"
translation = "「회, 회장님도 내 엉덩이를 마음대로 만지거나 하면 성희롱이니까!?」"

[[dialogue]]
speaker = "unk"
original = "その瞬間、俺の脳内に溢れ出した、確かに<b>存在する</b>記憶。"
translation = "그 순간 내 뇌리에 흘러넘친, 분명히 **존재하는** 기억."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「あっ！\u3000会長～！\u3000ごきげんよう♪」"
translation = "「앗! 회장님~! 평안하신가요♪」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「ヘイ、尻っ♪」"
translation = "「헤이, 엉덩이♪」"

[[dialogue]]
speaker = "unk"
original = "ひゃんっ！？"
translation = "히양!? "

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「うん！\u3000今日も中性的で素敵なハイブリッドプリケツね♪\u3000えへへっ、会長のお尻を触ると元気が出てくるわ♪」"
translation = "「응! 오늘도 중성적이고 멋진 하이브리드 탱탱 엉덩이네♪ 에헤헤, 회장님 엉덩이를 만지면 기운이 난다니까♪」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「――セクハラ？\u3000なに言ってるの、私と会長との仲じゃない♪\u3000だから、会長も私のお尻を触ってもいいわよ。ほらほら♪」"
translation = "「――성희롱? 무슨 소리야, 나랑 회장님 사이잖아♪ 그러니까 회장님도 내 엉덩이 만져도 돼. 자 자♪」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「な、なに？\u3000会長、私の顔をじっと見たりして……」"
translation = "「무, 뭐야? 회장님, 내 얼굴을 빤히 쳐다보고……」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「ど、どれだけ見つめても、お尻を触るのはダメだからね！？」"
translation = "「아, 아무리 쳐다봐도 엉덩이 만지는 건 안 된다고!?」"

[[dialogue]]
speaker = "unk"
original = "あ、うん……そうだね……"
translation = "아, 응…… 그렇네……"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「変なこと言ってないで、お昼を食べに行くわよ！\u3000もうっ……！」"
translation = "「이상한 소리 하지 말고 점심 먹으러 가자! 정말……!」"

[[dialogue]]
speaker = "unk"
original = "それから大聖堂カフェテリアへ向かおうとしたシズハだったが、俺は呼び止めて、中庭のベンチの方へ誘った。"
translation = "그 후 대성당 카페테리아로 향하려던 시즈하였지만, 나는 불러세워 중정의 벤치 쪽으로 유혹했다."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「これ……会長が作ったの！？\u3000お弁当……！」"
translation = "「이거…… 회장님이 만든 거야!? 도시락……!」"

[[dialogue]]
speaker = "unk"
original = "俺は頷いて、シズハにどうぞ食べて欲しいとすすめる。"
translation = "나는 고개를 끄덕이고 시즈하에게 부디 먹어보라고 권한다."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「う、うん。じゃあ……いただきます」"
translation = "「으, 응. 그럼…… 잘 먹겠습니다」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「あむっ、もぐもぐ…………す、すごく美味しいっ！」"
translation = "「아암, 우물우물………… 저, 정말 맛있어!」"

[[dialogue]]
speaker = "unk"
original = "俺は、母さんが忙しいときに代わりに作れるよう練習していたことや、学園に転入する前に飲食店のバイトで色々覚えたことを話す。"
translation = "나는 어머니가 바쁘실 때 대신 만들 수 있도록 연습했던 일이나 학원에 편입하기 전에 음식점 아르바이트로 여러 가지 배웠던 것을 이야기한다."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「会長って、そんなに料理できるんだ……」"
translation = "「회장님은 그렇게 요리를 잘하는구나……」"

[[dialogue]]
speaker = "unk"
original = "なんだか浮かない顔をしているシズハに気づいて、俺はどうしたのかと尋ねる。"
translation = "왠지 어두운 표정을 짓고 있는 시즈하를 깨닫고 나는 무슨 일이냐고 묻는다."

[[dialogue]]
speaker = "unk"
original = "すると、シズハは慌てたように首を横に振った。"
translation = "그러자 시즈하는 당황한 듯 고개를 가로저었다."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「あ、えっと……会長は何も悪くないの！\u3000お弁当を作ってくれたことは嬉しくてね！\u3000でも……」"
translation = "「아, 저기…… 회장님은 아무 잘못 없어! 도시락을 만들어 준 건 기쁘고! 하지만……」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「私さ、ずっと入院生活だったから……自分が会長よりも料理ができないんだってことに気づいて、ちょっとショックを受けて……あはは」"
translation = "「나 말이야, 계속 입원 생활을 했으니까…… 내가 회장님보다 요리를 못 한다는 사실을 깨닫고 조금 충격을 받아서…… 아하하」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「これまであまり気にしてなかったんだけど……一応会長と付き合うことになったわけだし、そうすると自分の女子力低いのが気になってくるというか……」"
translation = "「지금까지는 별로 신경 쓰지 않았는데…… 일단 회장님과 사귀게 되었으니까 그렇게 되면 내 여자력이 낮은 게 신경 쓰인달까……」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「え？\u3000――これからは会長が私に、料理を教えてくれる……？」"
translation = "「어? ――앞으로는 회장님이 나한테 요리를 가르쳐준다고……?」"

[[dialogue]]
speaker = "unk"
original = "その週の休日。俺はシズハと並んでキッチンに立ち、彼女に定番料理のカレーを教えていた。"
translation = "그 주의 휴일. 나는 시즈하와 나란히 주방에 서서 그녀에게 기본 요리인 카레를 가르쳐주고 있었다."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「じゃがいもを切るのって、こんな感じ……？」"
translation = "「감자를 써는 건 이런 느낌인가……?」"

[[dialogue]]
speaker = "unk"
original = "そうそう。上手い上手い"
translation = "그래그래. 잘하네 잘해"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「えへへっ♪\u3000じゃあ次は、ニンジンの切り方も教えて♪」"
translation = "「에헤헤♪ 그럼 다음은 당근 써는 법도 가르쳐줘♪」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「──ふんふん。わかったわ。私もやってみるから、会長、見ててね♪」"
translation = "「──흐음흐음. 알았어. 나도 해볼 테니까 회장님, 지켜봐 줘♪」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "（なんかこうして、一緒に並んで料理してると、新婚さんみたいかも……♪）"
translation = "(왠지 이렇게 같이 나란히 요리하고 있으니까 신혼부부 같을지도……♪)"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "（えへへ<emoji=heart04>\u3000頬が緩んで、顔がニヨニヨしちゃう……<emoji=heart04>）"
translation = "(에헤헤<emoji=heart04> 입가가 풀려서 얼굴이 히죽히죽해져……<emoji=heart04>)"

[[dialogue]]
speaker = "unk"
original = "それから、出来上がったカレーを２人で食べることになった。"
translation = "그리고 완성된 카레를 둘이서 먹게 되었다."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「ん～っ、美味しい～♪\u3000初めての手作りなのに、こんなに美味しくなるなんて、カレーってすごい！」"
translation = "「음~, 맛있어♪ 첫 수제 요리인데 이렇게 맛있어지다니, 카레는 대단해!」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「あっ、もちろん、会長が教えてくれたからだっていうのは、ちゃんとわかってるのよ？\u3000ありがとう♪」"
translation = "「앗, 물론 회장님이 가르쳐줬기 때문이라는 건 잘 알고 있어? 고마워♪」"

[[dialogue]]
speaker = "unk"
original = "シズハが笑顔になってよかった"
translation = "시즈하가 웃게 되어서 다행이야"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「……！\u3000んっ<emoji=heart04>\u3000会長、他の料理も、また一緒に教えてくれる……？」"
translation = "「……! 응<emoji=heart04> 회장님, 다른 요리도 또 같이 가르쳐줄래……?」"

[[dialogue]]
speaker = "unk"
original = "俺がもちろんだと頷くと、彼女は嬉しそうな笑顔を浮かべて、スプーンでカレーを差し出す。"
translation = "내가 물론이라고 고개를 끄덕이자 그녀는 기쁜 듯한 미소를 띠며 스푼으로 카레를 내민다."

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「じゃあ、お礼に……あ、あ～ん……<emoji=heart04>」"
translation = "「그럼 보답으로…… 아, 아~앙……<emoji=heart04>」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「え？\u3000――私の方からあ～んしてくれるなんて、意外……？」"
translation = "「어? ――나부터 아~앙을 해주다니 의외라고……?」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「ば、バカバカ！\u3000そういうのは言わなくていいから、素直に受け取ってよ……！」"
translation = "「바, 바보바보! 그런 건 말 안 해도 되니까 솔직하게 받아먹어……!」"

[[dialogue]]
speaker_original = "シズハ"
speaker_translation = "시즈하"
original = "「ほ、ほら……あ～ん……<emoji=heart04>」"
translation = "「자, 자아…… 아~앙……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "その後、俺はシズハからカレーを食べさせてもらいながら、幸せなひと時を過ごすのだった。"
translation = "그 후 나는 시즈하가 먹여주는 카레를 받아먹으며 행복한 한때를 보내는 것이었다."

