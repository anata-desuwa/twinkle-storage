[[dialogue]]
speaker = "unk"
original = "第４話,セドナの柱に,P"
translation = "제4화, 세드나의 기둥에, P"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "調子が優れないんですか"
translation = "컨디션이 좋지 않으신가요"

[[dialogue]]
speaker = "unk"
original = "セドナさん"
translation = "세드나 씨"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「……貴様か。本当によく会うな。いや……最近の私がよく外に出ているだけか」"
translation = "「……네놈인가. 정말 자주 마주치는군. 아니…… 최근의 내가 자주 밖으로 나오고 있을 뿐인가」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「浮かない顔をしていた？\u3000ふう──貴様に指摘されるようではおしまいだ。ま、ちょっとした悩みの種があってな」"
translation = "「안색이 안 좋아 보였다고? 후우── 네놈에게 지적당할 정도라니 끝장이군. 뭐, 약간의 고민거리가 있어서 말이다」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「……聞いても面白い話ではないぞ。まったく……随分な物好きだな、貴様も」"
translation = "「……들어도 재미있는 이야기는 아니라고. 정말이지…… 상당한 별종이군, 네놈도」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「先ごろ──少々、部下と衝突してな。それ自体はさほど珍しい話でもないのだが……最近は、私の指導法で揉めることが多くなった」"
translation = "「얼마 전에── 조금, 부하와 충돌해서 말이지. 그 자체는 그리 드문 일도 아니다만…… 최근에는 내 지도 방식 때문에 마찰이 잦아졌다」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「リクリエの打破──それこそが一族の宿願であり、そのためには手段も選ばない。それが私のポリシーだ」"
translation = "「리크리에의 타파── 그것이야말로 일족의 숙원이며, 그러기 위해서는 수단도 가리지 않는다. 그것이 내 방침이다」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「だが、それにしても私のやり方は厳格すぎる。時には柔軟に道を選ぶことも必要だ──と、言われてしまってな」"
translation = "「하지만, 그렇다 하더라도 내 방식은 너무 엄격하다. 때로는 유연하게 길을 선택하는 것도 필요하다──라는 말을 들어버려서 말이야」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「そしてその原因は恐らく……私たち魔女の中にも、徐々に人間界の文化が流入しつつあるからだろう」"
translation = "「그리고 그 원인은 아마도…… 우리 마녀들 사이에서도 서서히 인간계의 문화가 유입되고 있기 때문이겠지」"

[[dialogue]]
speaker = "unk"
original = "人間界の影響？"
translation = "인간계의 영향?"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「ああ。と言っても──悪い意味ではないぞ。単に、見える世界がこれまでより広がったというだけだ」"
translation = "「아아. 그렇다고 해서── 나쁜 의미는 아니다. 단순히, 보이는 세계가 지금까지보다 넓어졌다는 것뿐이다」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「私たち魔女は全員、世界樹にて生を受ける。大半はそのまま、森で一生を過ごす」"
translation = "「우리 마녀는 전원, 세계수에서 생명을 부여받는다. 태반은 그대로 숲에서 일생을 보내지」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「だが、一部の魔女はこうして人間界のネビュラへ配属される。結果……外界の文化にも触れる機会が多くなった」"
translation = "「하지만 일부 마녀는 이렇게 인간계의 네뷸라로 배속된다. 결과…… 바깥세상의 문화와 접할 기회도 많아졌지」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「その影響は──少なからず組織にも表れているというところだ。無論、私も含めてな」"
translation = "「그 영향은── 적지 않게 조직에도 나타나고 있다는 소리다. 물론, 나를 포함해서 말이지」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「魔女は長命だ。ゆえに祖の願いを受け継いで、自らその務めを果たすことも……自然な成り行きと考える者は多い」"
translation = "「마녀는 장수한다. 그렇기에 조상의 염원을 이어받아, 스스로 그 임무를 완수하는 것도…… 자연스러운 수순이라 생각하는 자가 많다」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「しかし、今。実際に外界を目の当たりにして──別の道を模索する者が増えてきたというのも、また事実」"
translation = "「하지만 지금. 실제로 바깥세상을 목격하고서── 다른 길을 모색하는 자가 늘어났다는 것도 또한 사실」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「ゆえに思ったわけだ。見ようによっては、今の私のやり方は、少しばかり意固地なのかもしれないと」"
translation = "「그래서 생각한 거다. 보는 관점에 따라서는, 지금의 내 방식은 조금 고집스러운 것일지도 모르겠다고」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「ま……そうは言っても、私とてネビュラという組織、魔女という一族の歯車にすぎない」"
translation = "「뭐…… 그렇게 말해도 나 또한 네뷸라라는 조직, 마녀라는 일족의 톱니바퀴에 불과하다」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「結局のところ、やり方を変える気はないんだがな。ただ、こんな姿を部下に見せるわけにはいかないから、ふらついていただけだ」"
translation = "「결국에는 방식을 바꿀 생각은 없다만. 다만, 이런 모습을 부하에게 보여줄 수는 없으니 서성거리고 있었을 뿐이다」"

[[dialogue]]
speaker = "unk"
original = "ご立派な上官だと思う"
translation = "훌륭한 상관이라고 생각해요"

[[dialogue]]
speaker = "unk"
original = "セドナさんはセドナさん"
translation = "세드나 씨는 세드나 씨"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「……ふっ。やれやれ。貴様に慰められる日が来ようとはな」"
translation = "「……훗. 이런이런. 네놈에게 위로받는 날이 올 줄이야」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「貴様には関係ない──どころか、不利益さえある話だというのに。世話焼きなやつだ」"
translation = "「네놈과는 상관없는── 아니, 오히려 불이익마저 있는 이야기인데도. 참견하기 좋아하는 녀석이군」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「なぜか私に構うところもなんだか……よく似ている。繋がりはないはずなのにな」"
translation = "「왠지 나를 챙겨주는 점도 어딘가…… 많이 닮았어. 접점은 없을 텐데 말이지」"

[[dialogue]]
speaker = "unk"
original = "誰に？"
translation = "누구랑요?"

[[dialogue]]
speaker = "unk"
original = "似てる？"
translation = "닮았다고요?"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「フ──なんでもないさ。おかげでいくらか気は紛れたよ」"
translation = "「후── 아무것도 아니다. 덕분에 어느 정도 기분 전환은 되었군」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「ん？\u3000今後だと？\u3000知らん──似たような衝突は起こりうるだろうが、やり方は変えん」"
translation = "「응? 향후 말이냐? 모른다── 비슷한 충돌은 일어날 수 있겠지만, 방식은 바꾸지 않아」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「意見を真っ向から交えることも──時には必要だ。そのために、私も心持ちを確かにしておかねばならん」"
translation = "「의견을 정면으로 나누는 것도── 때로는 필요하다. 그러기 위해 나도 마음가짐을 단단히 해두어야겠지」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「それじゃ私が潰れる……？\u3000あのな。以前も言ったが、私はあくまでも一族の使命を遂行するためにある」"
translation = "「그러면 내가 무너진다……? 이봐라. 이전에도 말했지만, 나는 어디까지나 일족의 사명을 수행하기 위해 존재한다」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「いくら疲れようと潰れようと、何も問題はない。『ネビュラ』がそれで立ち行くのならばな」"
translation = "「아무리 지치든 무너지든, 아무런 문제도 없다. 『네뷸라』가 그것으로 유지될 수 있다면 말이지」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「お節介は結構だが、それ以上の干渉は貴様の立ち場としても……」"
translation = "「참견은 사양하겠다만, 그 이상의 간섭은 네놈의 입장으로서도……」"

[[dialogue]]
speaker = "unk"
original = "俺がセドナさんを支える"
translation = "내가 세드나 씨를 지탱할게"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「！？」"
translation = "「!?」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「な、何を抜かしているんだ急に。よもやネビュラに入るとでもいうつもりか。そんな冗談は認めんぞ！」"
translation = "「무, 무슨 소리를 하는 거냐 갑자기. 설마 네뷸라에 들어오기라도 하겠다는 속셈인가. 그런 농담은 인정 못 한다!」"

[[dialogue]]
speaker = "unk"
original = "個人的に"
translation = "개인적으로"

[[dialogue]]
speaker = "unk"
original = "そうじゃなくて"
translation = "그게 아니라"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「個人的に──って……それはもう、なおさら……ああもう……！\u3000貴様というやつは何を考えているのかわからん！」"
translation = "「개인적으로──라니…… 그건 이제, 더더욱…… 아아 정말……! 네놈이라는 녀석은 무슨 생각을 하는 건지 모르겠군!」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「はぐらかすな……だと？\u3000く……ああもう、わかった。そんな真っ直ぐな目で見るな。一応──考えてはおく」"
translation = "「얼버무리지 마라……라고? 큭…… 아아 정말, 알았다. 그런 똑바른 눈으로 보지 마라. 일단── 생각은 해 두지」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「まったく──貴様は……相手が誰だかわかっているのか。ネビュラの長官、泣く子も黙る焔の魔女なのだぞ」"
translation = "「정말이지── 네놈은…… 상대가 누구인지 알고 있는 거냐. 네뷸라의 장관, 우는 아이도 그친다는 불꽃의 마녀란 말이다」"

[[dialogue]]
speaker = "unk"
original = "セドナさんだから"
translation = "세드나 씨니까"

[[dialogue]]
speaker = "unk"
original = "同志なんでしょ"
translation = "동지잖아"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「～～～っ……！\u3000ああ言えばこう言う……！\u3000そういう問題ではないというのに──！」"
translation = "「~~~~윽……! 말하면 말대꾸……! 그런 문제가 아니라고 하는데──!」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「はあ……もう。まったく、貴様のせいで先の悩みなど消し飛んでしまった。また別の懊悩を抱えることになったではないか！」"
translation = "「하아…… 정말이지. 참나, 네놈 때문에 아까 전의 고민 따위 날아가 버렸다. 또 다른 고뇌를 떠안게 되지 않았느냐!」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「また今度──火鍋に付き合わせてやるから覚悟しておけよ。ハハッ、敵前逃亡など認めん！」"
translation = "「다음에 다시── 훠궈를 같이 먹게 해 줄 테니 각오하고 있어라. 하하, 적전도망 따위 인정 못 한다!」"

