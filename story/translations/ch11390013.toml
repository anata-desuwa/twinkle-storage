[[dialogue]]
speaker = "unk"
original = "第３話,催眠ゴッデスビーム,P"
translation = "제3화, 최면 가디스 빔, P"

[[dialogue]]
speaker = "unk"
original = "この日、俺たち新星星徒会のメンバーで、仮想結界内での戦闘訓練を行っていた。"
translation = "이날, 우리 신성 성도회 멤버들은 가상 결계 내에서 전투 훈련을 하고 있었다."

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「よ～し、それじゃあ行くわよ、パパ！」"
translation = "「조~아, 그럼 간다, 아빠!」"

[[dialogue]]
speaker = "unk"
original = "よし、バッチコイ！"
translation = "「좋아, 와라!」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「１０連ゴッデスビーム！」"
translation = "「10연 가디스 빔!」"

[[dialogue]]
speaker = "unk"
original = "リトルフォームのヴィーナスが放つ連射ビームを、俺は最小限の動きを心がけながら体を横に逸らし、受け流すように回避する。"
translation = "리틀 폼의 비너스가 쏘는 연사 빔을, 나는 최소한의 움직임을 유념하며 몸을 옆으로 비껴 흘리듯이 회피한다."

[[dialogue]]
speaker = "マトイ"
original = "「ひゃ～っ、すごい連射速度……！\u3000しかも１発１発が直撃したら戦闘不能になりそうな威力！」"
translation = "「히야~ 대단한 연사 속도……! 게다가 한 발 한 발이 직격하면 전투 불능이 될 것 같은 위력이야!」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「えへへっ♪\u3000リトルフォームで武器が『ビーム銃』になったから、前より色んな種類のビームが撃てるようになったのよ♪」"
translation = "「에헤헤♪ 리틀 폼에서 무기가 『빔 건』이 됐으니까, 전보다 더 다양한 종류의 빔을 쏠 수 있게 됐어♪」"

[[dialogue]]
speaker = "アナ"
original = "「ふむ……それって、攻撃技ではないビームもあったりするのでしょうか？」"
translation = "「흠…… 그건 공격 기술이 아닌 빔도 있는 걸까요?」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「あるわ！\u3000ただ、私にも効果がよくわからない、変なビームもあったりするのよね」"
translation = "「있어! 다만 나도 효과를 잘 모르는 이상한 빔도 섞여 있단 말이지.」"

[[dialogue]]
speaker = "マトイ"
original = "「変なビーム？」"
translation = "「이상한 빔?」"

[[dialogue]]
speaker = "サーシャ"
original = "「あら～、それは面白そうね～♪」"
translation = "「어머나~ 그거 재밌어 보이네~♪」"

[[dialogue]]
speaker = "アナ"
original = "「戦闘訓練ですし、私も興味があります。せっかくですからこの場で試してみましょう」"
translation = "「전투 훈련이기도 하고 저도 흥미가 있습니다. 이왕 이렇게 된 거 이 자리에서 시험해 보죠.」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「そうね！\u3000アナに見てもらったら、どういう効果かわかるかも♪」"
translation = "「그렇네! 아나가 봐주면 어떤 효과인지 알 수 있을지도♪」"

[[dialogue]]
speaker = "unk"
original = "そうして、俺が相手になって、ヴィーナスの言う『変なビーム』を試してみることになったのだが……"
translation = "그렇게 내가 상대가 되어 비너스가 말하는 『이상한 빔』을 시험해 보게 되었는데……"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「あれ？\u3000パパ、大丈夫？」"
translation = "「어라? 아빠, 괜찮아?」"

[[dialogue]]
speaker = "サーシャ"
original = "「防御した会長くん、なんだか寝ぼけちゃってるような顔をしてるわね～？」"
translation = "「방어한 회장군, 왠지 잠이 덜 깬 것 같은 얼굴을 하고 있네~?」"

[[dialogue]]
speaker = "アナ"
original = "「ふむ、この状態は……」"
translation = "「흠, 이 상태는……」"

[[dialogue]]
speaker = "unk"
original = "お姉ちゃんたち、誰……？"
translation = "「누나들, 누구야……?」"

[[dialogue]]
speaker = "マトイ"
original = "「えぇええぇ……！？」"
translation = "「에에에에……!?」"

[[dialogue]]
speaker = "unk"
original = "それから、星徒会メンバーがクロトの様子を調べた結果。"
translation = "그 후, 성도회 멤버들이 쿠로토의 상태를 조사한 결과."

[[dialogue]]
speaker = "マトイ"
original = "「もしかして会長、精神が幼くなっちゃってるーーーっ！？」"
translation = "「설마 회장, 정신이 어려져 버렸어―――!?」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「それって、前に私がなった時と同じような状態ってこと？」"
translation = "「그건 전에 내가 됐을 때랑 비슷한 상태라는 거야?」"

[[dialogue]]
speaker = "アナ"
original = "「会長は先程ビームを防御しましたが、その効果は防げなかった。……精神に作用するこれは、いわゆる相手を『催眠』状態にするビームだと考えられます」"
translation = "「회장은 조금 전 빔을 방어했지만, 그 효과는 막지 못했습니다. ……정신에 작용하는 이것은 이른바 상대를 『최면』 상태로 만드는 빔이라고 생각됩니다.」"

[[dialogue]]
speaker = "マトイ"
original = "「それが本当なら、普通じゃないよ！？」"
translation = "「그게 정말이라면 평범한 게 아니라고!?」"

[[dialogue]]
speaker = "サーシャ"
original = "「そ、そんな……会長くんが……！」"
translation = "「그, 그럴 수가…… 회장군이……!」"

[[dialogue]]
speaker = "サーシャ"
original = "「精神状態が『弟くん』になっちゃってるなんて、お姉ちゃん、すごくキュンキュンしちゃうわ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「정신 상태가 『남동생』이 되어버리다니, 이 누나, 너무 두근두근거려버려～～<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「いやサーシャさん、『弟』になってるわけじゃないですからね！？」"
translation = "「아니 사샤 씨, 『남동생』이 된 게 아니라니까요!?」"

[[dialogue]]
speaker = "アナ"
original = "「多分、興奮して聞こえてないと思われます……」"
translation = "「아마, 흥분해서 안 들리는 모양이네요……」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「とりあえずわかったわ！\u3000ビームの効果が切れてパパが元に戻るまで、安心させてあげないといけないってことね！」"
translation = "「일단 알겠어! 빔의 효과가 끊겨서 아빠가 원래대로 돌아올 때까지, 안심시켜 줘야 한다는 거지!」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「パパ、何も心配しなくて大丈夫よ！\u3000私は九浄ヴィーナス！\u3000パパの娘で、恋人よ♪」"
translation = "「아빠, 아무 걱정 안 해도 괜찮아! 나는 쿠죠 비너스! 아빠의 딸이자, 연인이야♪」"

[[dialogue]]
speaker = "unk"
original = "パパで？\u3000娘で？\u3000恋人？？？"
translation = "아빠이면서? 딸이면서? 연인???다."

[[dialogue]]
speaker = "マトイ"
original = "「うん、普通は意味わからなくて混乱するよね！」"
translation = "「응, 보통은 의미를 몰라서 혼란스럽겠지!」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「それなら、こうすればいいわ！\u3000パパがいつもやってくれてるみたいに、こうして――」"
translation = "「그렇다면, 이렇게 하면 되겠어! 아빠가 항상 해주는 것처럼, 이렇게――」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスはクロトの頭を優しく撫でる。"
translation = "비너스는 쿠로토의 머리를 상냥하게 쓰다듬는다."

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「なで、なで♪\u3000……どう？\u3000安心するかしら？」"
translation = "「쓰담, 쓰담♪ ……어때? 안심이 되니?」"

[[dialogue]]
speaker = "unk"
original = "クロトは頷いてから、微笑んで言う。"
translation = "쿠로토는 고개를 끄덕이고 나서, 미소 지으며 말한다."

[[dialogue]]
speaker = "unk"
original = "うん。ありがとう、ヴィーナスお姉ちゃん♪"
translation = "응. 고마워, 비너스 누나♪"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「っ！？\u3000な、なんか今、胸がビームに撃ち抜かれたみたいに、すごくズキュ～ンってなったわ！」"
translation = "「윽!? 머, 뭔가 지금, 가슴이 빔에 꿰뚫린 것처럼, 엄청 즈큥~ 하고 울렸어!」"

[[dialogue]]
speaker = "サーシャ"
original = "「ヴィーナスちゃん……それが『弟萌え』よ！」"
translation = "「비너스짱…… 그것이 『남동생 모에』야!」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「弟萌え……！？」"
translation = "「남동생 모에……!?」"

[[dialogue]]
speaker = "サーシャ"
original = "「さあ、今の可愛すぎる会長くんを一緒に甘やかしてあげましょう♪\u3000会長くん、サーシャお姉ちゃんよ～♪\u3000ぎゅ～っ<emoji=heart04>」"
translation = "「자, 지금의 너무나도 귀여운 회장군을 함께 응석 받아주자구요♪ 회장군, 사샤 누나예요~♪ 꼬옥~<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「あっ、サーシャさん、ずるいわよ！\u3000パパは私の彼氏なんだから！\u3000ぎゅ～っ<emoji=heart04>」"
translation = "「앗, 사샤 씨, 치사해요! 아빠는 내 남자친구니까! 꼬옥~<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "お、お姉ちゃんたち、恥ずかしいよ……"
translation = "누, 누나들, 부끄러워……"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「～～っ<emoji=heart04>\u3000パパ、可愛いわっ<emoji=heart04>\u3000ん～っ、頭なでなで～<emoji=heart04>」"
translation = "「～～윽<emoji=heart04> 아빠, 귀여워어<emoji=heart04> 응~, 머리 쓰담쓰담~<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
original = "「ご、ごくり……わ、私もちょっと、試しに会長を撫でてみようかな……？\u3000そ、その方が会長も安心すると思うし……<emoji=heart04>」"
translation = "「꿀, 꺽…… 저, 저도 조금, 시험 삼아 회장을 쓰다듬어 볼까요……? 그, 그편이 회장도 안심할 것 같고……<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
original = "「そ、そうですね……私たちが会長の味方であるということを伝えておくのは大事。なので、私も……<emoji=heart04>」"
translation = "「그, 그러게요…… 저희가 회장의 편이라는 걸 전해두는 건 중요하니까. 그러니, 저도……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "星徒会の面々はそれからも、みんなでクロトのことを撫でて、可愛がり続けるのだった。"
translation = "성도회 면면은 그 후로도, 다 함께 쿠로토를 쓰다듬으며, 계속 귀여워해 주는 것이었다."

[[dialogue]]
speaker = "unk"
original = "――気づくと、俺は星徒会のみんなの腕の中にいた。"
translation = "――정신을 차려보니, 나는 성도회 모두의 품속에 있었다."

[[dialogue]]
speaker = "unk"
original = "はっ！？\u3000俺は一体……！？"
translation = "핫!? 나는 대체……!?"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「あっ！\u3000パパ、元に戻ったのね♪」"
translation = "「앗! 아빠, 원래대로 돌아왔구나♪」"

[[dialogue]]
speaker = "アナ"
original = "「コホン……とりあえず、さっきのビームはむやみに使わないよう気を付けましょう……」"
translation = "「코흠…… 우선, 아까 그 빔은 함부로 쓰지 않도록 주의하죠……」"

[[dialogue]]
speaker = "マトイ"
original = "「そ、そうだね……あははは……」"
translation = "「그, 그러게…… 아하하하……」"

[[dialogue]]
speaker = "サーシャ"
original = "「あら～、私はまた会長くんの可愛い姿が見てみたいけど～<emoji=heart04>」"
translation = "「어머~, 나는 다시 회장군의 귀여운 모습을 보고 싶은데~<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「名づけて、『催眠ゴッデスビーム』ね！」"
translation = "「이름하여, 『최면 고데스 빔』이야!」"

[[dialogue]]
speaker = "unk"
original = "ん？\u3000待って！\u3000催眠ってどういうこと！？"
translation = "응? 잠깐! 최면이라니 그게 무슨 소리야!?"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
original = "「これからはたまに、私のことを『お姉ちゃん』って呼んでくれてもいいわよ、パ～パ<emoji=heart04>\u3000ふふふっ♪」"
translation = "「앞으로는 가끔, 나를 『누나』라고 불러줘도 괜찮아, 아~빠<emoji=heart04> 후후훗♪」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスはそう言って、満足げに笑ってみせるのであった。"
translation = "비너스는 그렇게 말하며, 만족스러운 듯 웃어 보이는 것이었다."

