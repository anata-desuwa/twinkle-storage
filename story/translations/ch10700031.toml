[[dialogue]]
speaker = "unk"
original = "第１話,メスガキへの道は１日にして成らず,P"
translation = "제1화,암컷 꼬맹이가 되는 길은 하루아침에 이루어지지 않는다,P"

[[dialogue]]
speaker = "unk"
original = "ハロウィン当日、俺はウズメと一緒にハロウィンパーティーを楽しんでいた。"
translation = "할로윈 당일, 나는 우즈메와 함께 할로윈 파티를 즐기고 있었다."

[[dialogue]]
speaker = "ウズメイア"
original = "「会長くんっ、今度はあのお店に行ってみるし！」"
translation = "「회장군, 이번에는 저 가게에 가보는 시!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「見て見て！\u3000侍パンプキン人形とかウケる！\u3000着物姿で刀を下げてるとかマジでカッコイイ～っ♪」"
translation = "「봐 봐! 사무라이 호박 인형이라니 웃긴다! 기모노 차림에 칼을 차고 있다니 정말 멋있어~♪」"

[[dialogue]]
speaker = "ウズメイア"
original = "「わっ！\u3000ぱっと見、普通の提灯かと思ったらジャックオーランタンのデザインだし！」"
translation = "「앗! 언뜻 보기엔 평범한 초롱인 줄 알았더니 잭 오 랜턴 디자인이잖아!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「なるほど、このお店はそういうテーマなんだね～。まさに和洋折衷、西洋文化と日本文化の見事な融合っしょ！」"
translation = "「과연, 이 가게는 그런 테마구나~. 그야말로 화양절충, 서양 문화와 일본 문화의 멋진 융합이잖아!」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「あら、誰かと思えばウズメイア先輩と会長さんじゃありませんか」"
translation = "「어머, 누구인가 했더니 우즈메이아 선배와 회장군이 아니십니까」"

[[dialogue]]
speaker = "ウズメイア"
original = "「あ、シャルレーヌちゃん。ガオガオ、トリックオアトリート♪」"
translation = "「아, 샤를렌짱. 가오가오, 트릭 오어 트릿♪」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「ハッピーハロウィンです。イタズラされるのは勘弁して欲しいのでお菓子の方をどうぞ」"
translation = "「해피 할로윈입니다. 장난치는 건 봐줬으면 하니 과자 쪽을 받으세요」"

[[dialogue]]
speaker = "ウズメイア"
original = "「あんがとー！\u3000あたしからもお菓子をどうぞ～。ハロウィンデザインのお饅頭だし」"
translation = "「고마워~! 나도 과자를 줄게~. 할로윈 디자인의 만두야」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「こんなの売ってたんですか。ウズメイア先輩はハロウィンでもやっぱり和テイストを求めちゃうんですね」"
translation = "「이런 것도 팔았나요. 우즈메이아 선배는 할로윈에도 역시 일본풍을 찾으시는군요」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「ところで会長さんと一緒ということは、仲良くハロウィンデートですか？」"
translation = "「그런데 회장군과 함께 있다는 것은, 사이좋게 할로윈 데이트인가요?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「えへへ、そーだよ。会長くんが誘ってくれたんだよね」"
translation = "「에헤헤, 그래. 회장군이 권유해 줬어」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「それはそれは良かったですね、なんともお熱いことで……」"
translation = "「그거 참 잘됐네요, 정말 뜨거운 사이시군요……」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「普段から真面目ぶってる癖に、しっかりウズメイア先輩に手をだしちゃってるんですから……会長さんって本当に油断のならないワンちゃんですね♪」"
translation = "「평소에는 진지한 척하는 주제에, 제대로 우즈메이아 선배에게 손을 대고 계시니…… 회장군은 정말 방심할 수 없는 강아지네요♪」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「むっつりな会長さんのことですから、紳士づらしながらウズメイア先輩のことを下心いっぱいの目で見ているんでしょう？」"
translation = "「음흉한 회장군이니, 신사처럼 굴면서도 우즈메이아 선배를 속셈 가득한 눈으로 보고 있겠죠?」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「そんな年中発情状態の会長さんは、優しいウズメイア先輩に代わって私が躾けてあげましょうか？」"
translation = "「그런 연중 발정 상태인 회장군은, 상냥한 우즈메이아 선배를 대신해서 제가 교육시켜 드릴까요?」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「あら？\u3000何をまんざらでもないような反応してるんです？\u3000もしかしてウズメイア先輩という彼女がいながら私にも躾けられたいと？」"
translation = "「어머? 뭘 싫지 않은 듯한 반응을 하고 계신가요? 혹시 우즈메이아 선배라는 여자친구가 있으면서 저에게도 교육받고 싶다고요?」"

[[dialogue]]
speaker = "unk"
original = "そ、そんなことは断じて！"
translation = "그, 그런 일은 단연코!"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「ムキになって否定するところが怪しくありませんか？」"
translation = "「발끈하며 부정하는 점이 수상하지 않습니까?」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「ほらほら、自分が簡単に性欲に負けちゃうざこざこ会長さんじゃないって言うなら、もっとちゃんと言い返してみればいいじゃないですか」"
translation = "「자, 자, 자신이 쉽게 성욕에 져버리는 허접 허접 회장군이 아니라고 말하고 싶다면, 좀 더 제대로 반박해 보면 되잖아요」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「キャハハ、いい反応♪\u3000やっぱりストレス解消には会長さんをいじめるのが一番です。いい音で鳴いてくれますからね～♪」"
translation = "「캬하하, 좋은 반응♪ 역시 스트레스 해소에는 회장군을 괴롭히는 게 최고예요. 좋은 소리로 울어주니까요~♪」"

[[dialogue]]
speaker = "ウズメイア"
original = "「んっと、えっと……」"
translation = "「음, 으음……」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「ん？\u3000ウズメイア先輩、どうかしましたか？」"
translation = "「응? 우즈메이아 선배, 무슨 일 있으세요?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「え、えへへ……会長くんのざーこ！」"
translation = "「에, 에헤헤…… 회장군의 허접!」"

[[dialogue]]
speaker = "unk"
original = "ウズメイア！？"
translation = "우즈메이아?!"

[[dialogue]]
speaker = "ウズメイア"
original = "「いっつもエッチなことばっかり考えてる会長くんはざこざこだし……ええと、つまり──」"
translation = "「맨날 야한 생각만 하는 회장군은 허접 허접이고…… 음, 그러니까──」"

[[dialogue]]
speaker = "ウズメイア"
original = "「つまりっ、据え膳食わぬは男の恥ってこと？\u3000ざこざこな会長くんには天網恢恢疎にして漏らさずって言葉がお似合いだし！」"
translation = "「그러니까, 차려진 밥상 안 먹는 건 사내의 수치라는 거? 허접 허접한 회장군에게는 하늘의 그물은 넓고 성기어 새지 않는다는 말이 어울리는 시!」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「突然どうしちゃったんですか、ウズメイア先輩？」"
translation = "「갑자기 왜 그러시는 거예요, 우즈메이아 선배?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「えっ？\u3000えっと、えへへ……」"
translation = "「엣? 으음, 에헤헤……」"

[[dialogue]]
speaker = "ウズメイア"
original = "「シャルレーヌちゃんとお話してる会長くんが楽しそうに見えたから。それにシャルレーヌちゃんも楽しそうで……」"
translation = "「샤를렌짱과 이야기하는 회장군이 즐거워 보여서. 게다가 샤를렌짱도 즐거워 보였고……」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「会長さんはどうか分かりませんが、私は別に楽しんではいませんでしたよ？」"
translation = "「회장군은 어떨지 모르겠지만, 저는 딱히 즐겁지는 않았어요?」"

[[dialogue]]
speaker = "unk"
original = "俺だってそうだよ！"
translation = "나도 그래!"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「……なるほど、それで急に意味のわからないことを言い始めたんですね？」"
translation = "「……과연, 그래서 갑자기 의미를 알 수 없는 말을 하기 시작한 거군요?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「会長くん、シャルレーヌちゃんみたいに接するのが嬉しいのかなって……だからあたしもやってみたの」"
translation = "「회장군이 샤를렌짱처럼 대하는 게 기쁜가 싶어서…… 그래서 나도 해봤어」"

[[dialogue]]
speaker = "ウズメイア"
original = "「でもあたしには『メスガキ』は無理っぽいかも。なんか全然上手くいかなかったし……」"
translation = "「하지만 나한테는 '암컷 꼬맹이'는 무리일지도. 뭔가 전혀 잘 안됐고……」"

[[dialogue]]
speaker = "unk"
original = "今のウズメで大丈夫！"
translation = "지금의 우즈메로 괜찮아!"

[[dialogue]]
speaker = "unk"
original = "それは大いに誤解がある！"
translation = "그건 엄청난 오해야!"

[[dialogue]]
speaker = "ウズメイア"
original = "「ほ、本当？\u3000いつものあたしでいいの？」"
translation = "「호, 정말? 평소의 나로 괜찮은 거야?」"

[[dialogue]]
speaker = "unk"
original = "不安にさせちゃってごめん"
translation = "불안하게 만들어서 미안해"

[[dialogue]]
speaker = "ウズメイア"
original = "「あ……えへへ、ギュッてしてくれて……会長くん、ありがと……」"
translation = "「아…… 에헤헤, 꼬옥 안아줘서…… 회장군, 고마워……」"

[[dialogue]]
speaker = "ウズメイア"
original = "「もひとつ聞いてもいい？\u3000会長くんはシャルレーヌちゃんに躾けられて、その……興奮しちゃった……？」"
translation = "「하나 더 물어봐도 돼? 회장군은 샤를렌짱에게 교육받고, 그…… 흥분했어……?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「あたしと付き合ってても、シャルレーヌちゃんに躾けられたい……？」"
translation = "「나랑 사귀고 있는데도, 샤를렌짱에게 교육받고 싶어……?」"

[[dialogue]]
speaker = "unk"
original = "断じてそんなことはないよ"
translation = "단연코 그런 일은 없어"

[[dialogue]]
speaker = "ウズメイア"
original = "「えへへ、よかった……うん、これで全部安心できたし……もう大丈夫……」"
translation = "「에헤헤, 다행이다…… 응, 이걸로 전부 안심됐고…… 이제 괜찮아……」"

[[dialogue]]
speaker = "ウズメイア"
original = "「ありがとう、会長くん……<emoji=heart04>」"
translation = "「고마워, 회장군……<emoji=heart04>」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「コホン……あの、私は何を見せられているんでしょうね？\u3000惚気るなら目につかないところでやってもらえます？」"
translation = "「커흠…… 저기, 저는 뭘 보고 있는 걸까요? 염장 지를 거면 눈에 띄지 않는 곳에서 해주시겠어요?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「はっ！？\u3000ご、ごめんなさいだし！」"
translation = "「핫!? 죄, 죄송한 시!」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「ま、今回はやきもちをやくウズメイア先輩というレアなものが見られたので良しとしますか……」"
translation = "「뭐, 이번에는 질투하는 우즈메이아 선배라는 희귀한 것을 볼 수 있었으니 좋다고 할까요……」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「とにかくウズメイア先輩のことを大事にしてあげてください。先輩を泣かせるようなことをしたら、本気で躾に行きますからね」"
translation = "「어쨌든 우즈메이아 선배를 소중히 대해 주세요. 선배를 울리는 짓을 한다면, 진심으로 교육하러 갈 테니까요」"

[[dialogue]]
speaker = "unk"
original = "張本人がそれを言うか、と口から出かかったが何とかそれを抑え込んだ。"
translation = "장본인이 그 말을 하냐, 하고 입 밖으로 나오려던 것을 간신히 억눌렀다."

[[dialogue]]
speaker = "unk"
original = "シャルレーヌのメスガキ煽りに付き合っていると、ウズメがまた不安がってしまうかもしれないから。"
translation = "샤를렌의 암컷 꼬맹이 도발에 어울려주다가는, 우즈메가 또 불안해할지도 모르니까."

[[dialogue]]
speaker = "unk"
original = "ぐっと我慢して何も言い返さず、シャルレーヌと別れて、引き続きウズメとハロウィンデートを楽しんだのだった。"
translation = "꾹 참고 아무 말도 반박하지 않고, 샤를렌과 헤어져서, 계속 우즈메와 할로윈 데이트를 즐겼던 것이다."

