[[dialogue]]
speaker = "unk"
original = "――これは、『オムニス』ではなく『<ruby>量<rt>はかり</rt></ruby>とびお』が流星市国へやって来た結果、悪魔に寄生された<ruby>陽彩<rt>あきさ</rt></ruby>に勝つことができなかった『可能性』の世界。"
translation = "――이것은, 『옴니스』가 아니라 『하카리 토비오』가 유성시국으로 찾아온 결과, 악마에게 기생당한 아키사에게 이길 수 없었던 『가능성』의 세계."

[[dialogue]]
speaker = "unk"
original = "俺――<ruby>量<rt>はかり</rt></ruby>とびおは、気づけば元の世界へと戻って来ていた。"
translation = "나――하카리 토비오는 정신을 차려보니 원래 세계로 돌아와 있었다."

[[dialogue]]
speaker = "unk"
original = "だが、陽彩に敗北した後の記憶が定かではなく、先程まで一緒にいたはずの花織の姿もない。"
translation = "하지만 아키사에게 패배한 뒤의 기억이 확실치 않고, 방금 전까지 함께 있었을 카오리의 모습도 없다."

[[dialogue]]
speaker = "unk"
original = "『<b>恋人である</b>』花織の安否を確かめる為、周辺を探していると、彼女からスマホに「助けて」というメッセージが入った。"
translation = "『<b>연인인</b>』 카오리의 안부를 확인하기 위해, 주변을 찾고 있자 그녀에게서 스마트폰으로 「도와줘」라는 메시지가 들어왔다."

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「あっ、よかった……！\u3000とびおくん、来てくれた……<emoji=heart04>\u3000あぁぁっ<emoji=heart04>」"
translation = "「앗, 다행이다……! 토비오 군, 와줬구나……<emoji=heart04> 아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "急いで言われた場所――近くの公園の公衆トイレに向かうと、そこで花織は待っていたのだが……"
translation = "서둘러 말한 장소――근처 공원의 공중화장실로 향하자, 그곳에서 카오리는 기다리고 있었는데……"

[[dialogue]]
speaker_original = "とびお"
speaker_translation = "토비오"
original = "「な、何をしてるんだ、花織！？\u3000そんな格好で……！」"
translation = "「무, 뭘 하고 있는 거야, 카오리!? 그런 차림으로……!」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「ゴ、ゴメンなさいっ<emoji=heart04>\u3000はぁあぁっ<emoji=heart04>\u3000でも、もう我慢できないの……っ<emoji=heart04>」"
translation = "「미, 미안해요<emoji=heart04> 하아아앗<emoji=heart04> 하지만, 이제 참을 수 없는걸……<emoji=heart04>」"

[[dialogue]]
speaker_original = "とびお"
speaker_translation = "토비오"
original = "「っ……！？\u3000なんだ、体が勝手に！？」"
translation = "「윽……!? 뭐야, 몸이 멋대로!?」"

[[dialogue]]
speaker = "unk"
original = "花織はなんと男子トイレの中、床の上に仰向けで寝転がり『まんぐり返し』の状態で俺を待っていた。"
translation = "카오리는 놀랍게도 남자 화장실 안, 바닥 위에 뒤로 누워 『가랑이 벌리기』 상태로 나를 기다리고 있었다."

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「はあぁ<emoji=heart04>\u3000はぁぁ<emoji=heart04>\u3000あぁあぁっ<emoji=heart04>\u3000とびおくんのおち○ちん……！\u3000んんぅっ……ふうぅっ<emoji=heart04>」"
translation = "「하아아<emoji=heart04> 하아아<emoji=heart04> 아아아앗<emoji=heart04> 토비오 군의 자지……! 응응윽…… 후우웃<emoji=heart04>」"

[[dialogue]]
speaker_original = "とびお"
speaker_translation = "토비오"
original = "「っ……急に体が熱くなってきて！\u3000これ、花織の力なのか！？」"
translation = "「윽…… 갑자기 몸이 뜨거워져서! 이거, 카오리의 능력인가!?」"

[[dialogue]]
speaker = "unk"
original = "彼女のあられもない姿を見た途端、俺は衝動を我慢できずに、気づけばペニスを取り出してしまっていた。"
translation = "그녀의 파렴치한 모습을 본 순간, 나는 충동을 참지 못하고 어느새 페니스를 꺼내버리고 말았다."

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「んんぅんぅぅ～～ん<emoji=heart04>\u3000ウチも自分で衝動が抑えられないのぉ……<emoji=heart04>\u3000多分、陽彩ちゃんの能力を受けた影響でっ<emoji=heart04>」"
translation = "「응으으으~~응<emoji=heart04> 나도 스스로 충동을 억제할 수 없어어……<emoji=heart04> 아마, 아키사 짱의 능력을 받은 영향으로<emoji=heart04>」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「はあぁっ、はあぁっ、はあぁあっ……<emoji=heart04>\u3000だから、とびおくん、お願い<emoji=heart04>\u3000ウチのこと――」"
translation = "「하아앗, 하아앗, 하아아앗……<emoji=heart04> 그러니까, 토비오 군, 부탁해<emoji=heart04> 나를――」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「早く<b>乱暴</b>に犯して<emoji=heart04>」"
translation = "「빨리 <b>난폭하게</b> 범해줘<emoji=heart04>」"

[[dialogue]]
speaker_original = "とびお"
speaker_translation = "토비오"
original = "「っ……！！」"
translation = "「윽……!!」"

[[dialogue]]
speaker = "unk"
original = "花織の言葉を耳にした途端、頭の中まで沸騰するように熱くなって、視界が灼熱ににじんだ。"
translation = "카오리의 말을 귀에 담은 순간, 머릿속까지 비등하듯 뜨거워져 시야가 작열로 번졌다."

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「あああっ<emoji=heart04>\u3000おち○ちん、アソコに当たってる<emoji=heart04>\u3000はあぁあっ……<emoji=heart04>\u3000んんぅっ<emoji=heart04>」"
translation = "「아아앗<emoji=heart04> 자지, 그곳에 닿고 있어<emoji=heart04> 하아아앗……<emoji=heart04> 응응윽<emoji=heart04>」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「ふあぁっ<emoji=heart04>\u3000あぁああ<emoji=heart04>\u3000クリに擦れて、気持ちっ、いいぃっ<emoji=heart04>\u3000あぁあんっ<emoji=heart04>\u3000んんぅっ<emoji=heart04>\u3000ふうぅっ……<emoji=heart04>」"
translation = "「후아앗<emoji=heart04> 아아아아<emoji=heart04> 클리에 스쳐서, 기분, 좋아아<emoji=heart04> 아아앙<emoji=heart04> 응응윽<emoji=heart04> 후우웃……<emoji=heart04>」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「恋人おち○ちん目の前にして、はぁあぁっ<emoji=heart04>\u3000おま○こ喜んじゃってる<emoji=heart04>\u3000ああっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んふぅっ……<emoji=heart04>\u3000早く挿れて欲しくて、おま○こ汁溢れて来ちゃう<emoji=heart04>」"
translation = "「연인 자지를 눈앞에 두고, 하아아앗<emoji=heart04> 보지 기뻐하고 있어<emoji=heart04> 아앗<emoji=heart04> 하아앗<emoji=heart04> 응후윽……<emoji=heart04> 빨리 삽입해 줬으면 해서, 보지물 넘쳐 흘러나와 버려<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "花織の愛液の量はすごくて、少しペニスを擦り付けただけで、あっという間にグチュグチュになっていく。"
translation = "카오리의 애액의 양은 대단해서, 살짝 페니스를 문지른 것만으로 순식간에 질척질척해져 간다."

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「とびおくん……お願い<emoji=heart04>\u3000あぁああっ<emoji=heart04>\u3000ウチを助けてっ<emoji=heart04>\u3000はぁあぁっ、おち○ちんでおま○こ助けてほしいのぉ<emoji=heart04>」"
translation = "「토비오 군…… 부탁해<emoji=heart04> 아아아앗<emoji=heart04> 나를 도와줘<emoji=heart04> 하아아앗, 자지로 보지 도와줬으면 좋겠어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「ウチのおま○こ、早く犯してぇ<emoji=heart04>」"
translation = "「내 보지, 빨리 범해줘<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "言葉に操られるように──なんて欺瞞はもう不要だった。"
translation = "말에 조종당하는 듯한── 그런 기만은 이제 불필요했다."

[[dialogue]]
speaker = "unk"
original = "俺は今すぐに淫乱な恋人を躾け直したくて、見たこともないほど大きくなったペニスでペチペチとおま○この入り口を叩いた。"
translation = "나는 지금 당장 음란한 연인을 다시 길들이고 싶어서, 본 적도 없을 정도로 거대해진 자지로 찰싹찰싹 보지 입구를 때렸다."

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「あんっ<emoji=heart04>\u3000ダメぇ、焦らさないでぇ<emoji=heart04>\u3000この格好じゃ、自分でおち○ちん、上手く挿れられないよぉ<emoji=heart04>\u3000早く、早く来てぇ<emoji=heart04>\u3000あああっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000ふうぅっ……！」"
translation = "「안<emoji=heart04> 안 돼, 애태우지 마<emoji=heart04> 이 자세로는 혼자서 자지, 제대로 못 넣는단 말이야<emoji=heart04> 빨리, 빨리 와줘<emoji=heart04> 아아앗<emoji=heart04> 응우으<emoji=heart04> 후우우……!」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「あっ<emoji=heart04>\u3000そこ<emoji=heart04>\u3000そこそこ<emoji=heart04>\u3000はあぁあぁっ――<emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04> 거기<emoji=heart04> 거기 거기<emoji=heart04> 하아아아앗――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「あっ<emoji=heart04><emoji=heart04>\u3000んあああぁ～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000おち○ちん、ズッポリきたぁああ～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04><emoji=heart04> 응아아아아~~앗<emoji=heart04><emoji=heart04><emoji=heart04> 자지, 쑤욱 들어왔어어어~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「あぁあっ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふあぁっ、んうぅっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はあぁっ、んあぁっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「아아앗<emoji=heart04> 응<emoji=heart04> 하아앗<emoji=heart04> 후아앗, 응우으<emoji=heart04> 앗<emoji=heart04> 안<emoji=heart04> 하아앗, 응아앗<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「おま○こ喜んでるっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000これっ<emoji=heart04>\u3000これが欲しかったのぉっ<emoji=heart04><emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふあぁっ<emoji=heart04>\u3000んああぁんっ<emoji=heart04>」"
translation = "「보지가 기뻐하고 있어<emoji=heart04> 안<emoji=heart04> 안<emoji=heart04> 이거<emoji=heart04> 이걸 원했어어<emoji=heart04><emoji=heart04> 하앙<emoji=heart04> 하아앗<emoji=heart04> 후아앗<emoji=heart04> 응아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「はあぁあっ<emoji=heart04>\u3000おち○ちん、気持ちいいよぉっ<emoji=heart04>\u3000あっ、んんぅっ<emoji=heart04>\u3000おま○こ中ズリズリズリ～って、気持ちいいぃ～っ<emoji=heart04>\u3000あっんあぁっ<emoji=heart04>\u3000ふあぁあっ<emoji=heart04>」"
translation = "「하아아앗<emoji=heart04> 자지, 기분 좋아아<emoji=heart04> 앗, 응으으<emoji=heart04> 보지 안쪽이 질퍽질퍽~ 해서, 기분 좋아아~앗<emoji=heart04> 앗응아앗<emoji=heart04> 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「とびおくん、ゴメンなさいっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000性欲、我慢できなくてぇ<emoji=heart04>\u3000ゴメンなさぁあぃ<emoji=heart04>\u3000んっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000んふぅっ<emoji=heart04>」"
translation = "「토비오 군, 미안해<emoji=heart04> 앗<emoji=heart04> 안<emoji=heart04> 성욕, 참을 수가 없어서어<emoji=heart04> 미안해애<emoji=heart04> 응<emoji=heart04> 응우으<emoji=heart04> 응후으<emoji=heart04>」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「あぁあっ<emoji=heart04>\u3000こっちに戻って来て、気づいたらねっ、はぁあぁん<emoji=heart04>\u3000すっごく、すっごぉく、おま○こが疼いちゃってたのぉ<emoji=heart04>」"
translation = "「아아앗<emoji=heart04> 이쪽으로 돌아오고 나서, 정신을 차려보니 말이야, 하아아앙<emoji=heart04> 엄청, 어엄처어엉, 보지가 쑤셔버렸어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「が、我慢……しようと思ったんだよぉ？\u3000はぁぁっ<emoji=heart04>\u3000でも無理でぇ<emoji=heart04>\u3000気づいたらお外なのに、おま○こに指、入れちゃってのぉっ<emoji=heart04>\u3000あぁああっ<emoji=heart04>」"
translation = "「차, 참으려고…… 생각했단 말이야? 하아아<emoji=heart04> 하지만 무리라서어<emoji=heart04> 정신을 차려보니 밖인데도, 보지에 손가락, 넣어버려서어<emoji=heart04> 아아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「はぁあぁっ<emoji=heart04>\u3000それですぐに、セックスしてほしいって<emoji=heart04>\u3000セックスしないと無理だってぇ<emoji=heart04>\u3000頭の中、それだけになっちゃったぁ<emoji=heart04>\u3000えへへへへへへぇ<emoji=heart04>」"
translation = "「하아아앗<emoji=heart04> 그래서 당장, 섹스하고 싶다고<emoji=heart04> 섹스 안 하면 무리라고오<emoji=heart04> 머릿속이, 그것뿐이게 되어버렸어어<emoji=heart04> 에헤헤헤헤헤헤<emoji=heart04>」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「でもね、でもねっ<emoji=heart04>\u3000<b>できれば</b>とびおくんにセックスしてほしかったからぁ、はぁあぁっ<emoji=heart04>\u3000男子トイレに隠れたのぉ<emoji=heart04>\u3000それで『助けて』ってメッセージ、送ったんだぁ<emoji=heart04>」"
translation = "「그치만 말이야, 그치만 말이야<emoji=heart04> <b>되도록이면</b> 토비오 군이랑 섹스하고 싶었으니까아, 하아아앗<emoji=heart04> 남자 화장실에 숨었어어<emoji=heart04> 그래서 『살려줘』라고 메시지, 보낸 거야아<emoji=heart04>」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「トイレに隠れたあともねっ、あぁあんっ<emoji=heart04>\u3000脳みそが『早くセックスしろ』って命令してくるのぉ<emoji=heart04>\u3000だから指でかき回して、誤魔化してたんだよぉ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「화장실에 숨은 뒤에도 말이야, 아아앙<emoji=heart04> 뇌가 『빨리 섹스해』라고 명령해와아<emoji=heart04> 그래서 손가락으로 휘저으면서, 얼버무리고 있었어어<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「あっ、あんっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000おち○ちん乱暴に突っ込んで、中をじゅぼじゅぼして欲しくて、気が狂いそうだったんだよぉ<emoji=heart04>\u3000えへへへへへへぇ<emoji=heart04>\u3000あぁあんっ<emoji=heart04>」"
translation = "「앗, 안<emoji=heart04> 응우으<emoji=heart04> 자지 난폭하게 쑤셔넣어서, 안을 쥬뵤쥬뵤하고 싶어서, 미칠 것 같았단 말이야아<emoji=heart04> 에헤헤헤헤헤헤<emoji=heart04> 아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "とびお"
speaker_translation = "토비오"
original = "「花織っ！！」"
translation = "「카오리!!」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「とびおくん<emoji=heart04>\u3000えへへぇ、来てくれたのが、とびおくんでよかったぁ<emoji=heart04>\u3000んんっ、あはぁんっ<emoji=heart04>\u3000他の人が来たらどうしようって、ドキドキしてたのぉ<emoji=heart04>」"
translation = "「토비오 군<emoji=heart04> 에헤헤, 와준 게 토비오 군이라 다행이야아<emoji=heart04> 응응, 아하앙<emoji=heart04> 다른 사람이 오면 어쩌나 하고, 두근두근했어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「えへへへへへぇ、あぁあんっ<emoji=heart04>\u3000とびおくんにおち○ちん突っ込んでもらえて、脳みそが喜んでるよぉ<emoji=heart04>\u3000ふわぁあぁぁぁ～～っ<emoji=heart04>\u3000幸せ溢れてきちゃう～～っ<emoji=heart04>」"
translation = "「에헤헤헤헤헤, 아아앙<emoji=heart04> 토비오 군이 자지 쑤셔넣어줘서, 뇌가 기뻐하고 있어어<emoji=heart04> 후와아아아아아~~앗<emoji=heart04> 행복이 넘쳐흘러버려어~~앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「ねぇ、とびおくん<emoji=heart04>\u3000はぁあんっ<emoji=heart04>\u3000知ってたぁ……？\u3000ウチね、悪魔のせいとかじゃなくて、普段からねぇ……あぁぁああっ<emoji=heart04>」"
translation = "「저기, 토비오 군<emoji=heart04> 하아앙<emoji=heart04> 알고 있었어……? 나 말이야, 악마 때문 같은 게 아니라, 평소에도오…… 아아아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「とびおくんの優しいエッチじゃなくて……ああぁんっ<emoji=heart04>\u3000乱暴で、強引で、痛いくらいのセックス<emoji=heart04>\u3000されたかったのぉ……<emoji=heart04>\u3000はあぁんっ<emoji=heart04>\u3000それって要するにね──」"
translation = "「토비오 군의 상냥한 엣지가 아니라…… 아아앙<emoji=heart04> 난폭하고, 강압적이고, 아플 정도의 섹스<emoji=heart04> 당하고 싶었어……<emoji=heart04> 하아앙<emoji=heart04> 그건 요컨대 말이지──」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「レイプっ<emoji=heart04>\u3000本当は前から、こうしてレイプされたかったのぉ<emoji=heart04>\u3000あああっ、ふあぁっ<emoji=heart04>\u3000はああぁんっ<emoji=heart04>」"
translation = "「강간<emoji=heart04> 사실은 전부터, 이렇게 강간당하고 싶었어<emoji=heart04> 아아앗, 후아앗<emoji=heart04> 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "とびお"
speaker_translation = "토비오"
original = "「レイプされたかったって……花織お前なっ！！」"
translation = "「강간당하고 싶었다니…… 카오리 너 말이야!!」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「んんんぅ<emoji=heart04>\u3000ゴメンなさぁいっ<emoji=heart04>\u3000あぁああっ<emoji=heart04>\u3000本当はウチ、前からそういう妄想でオナニーしてたのぉ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はあぁあっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>」"
translation = "「응응으<emoji=heart04> 미안해애<emoji=heart04> 아아아앗<emoji=heart04> 사실은 나, 전부터 그런 망상으로 자위했었어<emoji=heart04> 앗<emoji=heart04> 하아아앗<emoji=heart04> 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「とびおくんにレイプされたいっ<emoji=heart04>\u3000強引にっ、めちゃくちゃにぃ<emoji=heart04>\u3000一方的に屈服させられたいのぉ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000んああぁんっ<emoji=heart04>」"
translation = "「토비오 군에게 강간당하고 싶어<emoji=heart04> 강제로, 엉망진창으로<emoji=heart04> 일방적으로 굴복당하고 싶어어<emoji=heart04> 하아앗<emoji=heart04> 응우웃<emoji=heart04> 응아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「ウチのこと気遣ったりせずにっ<emoji=heart04>\u3000んうぅっ<emoji=heart04>\u3000んふぅっ<emoji=heart04>\u3000ウチのおま○こ、オナホにしてほしいっ<emoji=heart04>\u3000性欲発散レイプしてぇぇ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「나를 배려하거나 하지 말고<emoji=heart04> 응우웃<emoji=heart04> 응후웃<emoji=heart04> 내 보지, 오나홀로 삼아줬으면 좋겠어<emoji=heart04> 성욕 발산 강간해줘어어<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「あはぁあっ<emoji=heart04>\u3000ウチのおま○こ穴で、とびおくんに思いっきり性欲処理して欲しいってぇ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000んふぅっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>」"
translation = "「아하아앗<emoji=heart04> 내 보지 구멍으로, 토비오 군이 마음껏 성욕 처리해 줬으면 좋겠어어<emoji=heart04> 앗<emoji=heart04> 응후으<emoji=heart04> 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「とびおくんの性奴隷っ<emoji=heart04>\u3000肉便器になりたいっ<emoji=heart04>\u3000おま○こ使ってもらう妄想で、たくさんオナニーしてたのぉ<emoji=heart04>\u3000あぁあんっ<emoji=heart04>\u3000はあぁあぁっ<emoji=heart04>」"
translation = "「토비오 군의 성노예엣<emoji=heart04> 육변기가 되고 싶어엇<emoji=heart04> 보지 써주는 망상으로, 잔뜩 자위했었는걸<emoji=heart04> 아아앙<emoji=heart04> 하아아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「だから、だからぁ……っ<emoji=heart04>\u3000あぁあぁ<emoji=heart04>\u3000とびおくんのおち○ちんで、悪い子の花織にいっぱいお仕置きしてくださぁぁいっ<emoji=heart04><emoji=heart04>」"
translation = "「그러니까, 그러니까아……앗<emoji=heart04> 아아아아<emoji=heart04> 토비오 군의 자지로, 나쁜 아이인 카오리에게 잔뜩 벌을 내려주세에에엣<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "とびお"
speaker_translation = "토비오"
original = "「ああ、いいぞっ。そこまで言うなら、遠慮なくレイプしてやる！」"
translation = "「아아, 좋다고. 그렇게까지 말한다면, 사양 말고 강간해 주지!」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「うん<emoji=heart04>\u3000うん<emoji=heart04>\u3000うんっ<emoji=heart04><emoji=heart04>\u3000あはぁぁん<emoji=heart04>\u3000ウチのとびおくん専用肉便器おま○こ、いっぱいレイプしてえぇ<emoji=heart04><emoji=heart04>\u3000あああっ――<emoji=heart04><emoji=heart04>」"
translation = "「응<emoji=heart04> 응<emoji=heart04> 응으<emoji=heart04><emoji=heart04> 아하아앙<emoji=heart04> 내 토비오 군 전용 육변기 보지, 잔뜩 강간해줘어어<emoji=heart04><emoji=heart04> 아아앗――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "花織が正気だったら、一生こんな気持ちいいセックスはできなかっただろう。俺は元凶である陽彩に感謝すら覚えながら、強引にペニスを突き刺した。"
translation = "카오리가 제정신이었다면, 평생 이런 기분 좋은 섹스는 할 수 없었을 것이다. 나는 원흉인 히요리에게 감사함마저 느끼며, 강제로 페니스를 찔러 넣었다."

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「んあああぁ～っ<emoji=heart04><emoji=heart04>\u3000おち○ちん、中にゴリゴリって来てるぅっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000はぁんっ<emoji=heart04>\u3000ふあああぁ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「응아아아~앗<emoji=heart04><emoji=heart04> 자지, 안에서 고리고리하게 오고 있어엇<emoji=heart04> 앗<emoji=heart04> 하앙<emoji=heart04> 후아아아~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「んんぅっ、ふあぁあっ<emoji=heart04>\u3000あぁあっ<emoji=heart04>\u3000これっ<emoji=heart04>\u3000これ好きぃっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000強引なピストンっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あはぁあっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「응응으, 후아앗<emoji=heart04> 아아앗<emoji=heart04> 이거<emoji=heart04> 이거 좋아앗<emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04> 강압적인 피스톤<emoji=heart04> 앗<emoji=heart04> 아하앗<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「膣壁ひっかかれて気持ちいいっ<emoji=heart04>\u3000あんっ、ふあぁっ<emoji=heart04>\u3000んああぁっ<emoji=heart04>\u3000おち○ちん好きっ<emoji=heart04>\u3000強くされるの気持ちいいのぉっ<emoji=heart04>\u3000んあぁっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「질벽 긁혀서 기분 좋아앗<emoji=heart04> 앙, 후아앗<emoji=heart04> 응아아앗<emoji=heart04> 자지 좋아앗<emoji=heart04> 격하게 해주는 거 기분 좋아아앗<emoji=heart04> 응아앗<emoji=heart04> 후아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「とびおくん、もっとぉ<emoji=heart04>\u3000もっとウチのこと、乱暴に犯してぇっ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はあぁんっ<emoji=heart04>\u3000んああぁ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「토비오 군, 더어<emoji=heart04> 더 나를, 난폭하게 범해줘엇<emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04> 하아앙<emoji=heart04> 응아아아~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「肉便器に、遠慮なく中出ししてくださいっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>」"
translation = "「육변기에게, 사양 말고 질내사정 해주세요엇<emoji=heart04> 앙<emoji=heart04> 앙<emoji=heart04> 하아앗<emoji=heart04> 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「あぁああっ<emoji=heart04>\u3000ウチ、今日は<b>危険日</b>だからぁ<emoji=heart04>\u3000たくさん中出し射精して、孕ませて欲しいのぉ<emoji=heart04>」"
translation = "「아아아앗<emoji=heart04> 나, 오늘은 <b>위험일</b>이니까아<emoji=heart04> 잔뜩 질내사정해서, 임신시켜 줬으면 좋겠어어<emoji=heart04>」"

[[dialogue]]
speaker_original = "とびお"
speaker_translation = "토비오"
original = "「孕ませてほしいだって……？\u3000肉便器のくせに？」"
translation = "「임신시켜 달라고……? 육변기 주제에?」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「うんっ<emoji=heart04>\u3000もちろん――責任なんて取らなくていいからぁ<emoji=heart04>\u3000あっ<emoji=heart04>\u3000あんっ<emoji=heart04>\u3000はぁあんっ<emoji=heart04><emoji=heart04>」"
translation = "「응으<emoji=heart04> 물론――책임 같은 건 안 져도 되니까아<emoji=heart04> 앗<emoji=heart04> 앙<emoji=heart04> 하아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「むしろウチみたいな都合のいい淫乱おま○こは、ヤリ捨てられるべきなの<emoji=heart04>\u3000んっ<emoji=heart04>\u3000ふうぅっ<emoji=heart04>\u3000ふああぁっ<emoji=heart04>」"
translation = "「오히려 나 같은 형편 좋은 음란 보지는, 먹버당해야 마땅한걸<emoji=heart04> 응<emoji=heart04> 후우우<emoji=heart04> 후아아앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「あぁあぁっ<emoji=heart04>\u3000今この瞬間の快楽のために、本能のまま獣みたいに犯されちゃうのが最高に興奮して、気持ちいいのっ<emoji=heart04>\u3000だから――」"
translation = "「아아아앗<emoji=heart04> 지금 이 순간의 쾌락을 위해서, 본능대로 짐승처럼 범해져 버리는 게 최고로 흥분돼서, 기분 좋아앗<emoji=heart04> 그러니까――」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「ウチのこと、無責任種付けで孕ませて、受精イキさせてぇっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ああぁあっ――<emoji=heart04><emoji=heart04>」"
translation = "「나를, 무책임 씨뿌리기로 임신시켜서, 수정 가버리게 해줘어엇<emoji=heart04><emoji=heart04><emoji=heart04> 아아아앗――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「ふあぁぁあああぁぁぁ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「후아아아아아아아아~~~~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「おち○ちんレイプ来たあぁぁあんっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000あんっ、あんっ、はぁあんっ<emoji=heart04>\u3000んんんぅ<emoji=heart04>\u3000ふああぁあぁっ<emoji=heart04><emoji=heart04>」"
translation = "「자지 강간 왔다아아아앙<emoji=heart04><emoji=heart04><emoji=heart04> 앙, 앙, 하아앙<emoji=heart04> 응응응으<emoji=heart04> 후아아아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は欲望のまま腰を振りたて、花織が望んだ通りに彼女をレイプする。"
translation = "나는 욕망대로 허리를 흔들어대며, 카오리가 원한 대로 그녀를 강간한다."

[[dialogue]]
speaker = "unk"
original = "この快感で脳を焼かれて、もう二度と肉便器ではない花織には戻れなくなればいいと思いながら。"
translation = "이 쾌감으로 뇌가 구워져서, 이제 두 번 다시 육변기가 아닌 카오리로는 돌아갈 수 없게 되면 좋겠다고 생각하면서."

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「あっあっあっ<emoji=heart04>\u3000ピストン強いっ<emoji=heart04><emoji=heart04>\u3000おち○ちん奥にどちゅどちゅ当たってるぅっ<emoji=heart04>\u3000あんっ、あんっ<emoji=heart04>\u3000んうぅっ、はあぁっ、んああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「앗, 앗, 앗<emoji=heart04> 피스톤 강해<emoji=heart04><emoji=heart04> 자지가 안쪽에 퍽퍽 닿고 있어어<emoji=heart04> 앙, 앙<emoji=heart04> 응으읏, 하아아, 응아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「すごっ、すごいぃっ<emoji=heart04>\u3000はぁあん、気持ちいいっ<emoji=heart04>\u3000おち○ちん、今までで１番気持ちいいぃ～っ<emoji=heart04><emoji=heart04>\u3000あっ、はぁんっ、んあぁっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04>」"
translation = "「대단, 대단해<emoji=heart04> 하아앙, 기분 좋아<emoji=heart04> 자지, 지금까지 중에서 제일 기분 좋아아~<emoji=heart04><emoji=heart04> 앗, 하앙, 응아아<emoji=heart04> 후아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「乱暴に奥まで、ゴリゴリ犯されてるっ<emoji=heart04>\u3000あっあっあっ<emoji=heart04>\u3000脳みそ喜んでるぅ～<emoji=heart04>\u3000幸せどぷどぷ溢れてきてぇっ<emoji=heart04>\u3000はぁあぁんっ<emoji=heart04>\u3000気持ちいいぃ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「난폭하게 안쪽까지, 고리고리 범해지고 있어<emoji=heart04> 앗, 앗, 앗<emoji=heart04> 뇌세포가 기뻐하고 있어~<emoji=heart04> 행복이 출렁출렁 넘쳐흘러서어<emoji=heart04> 하아아앙<emoji=heart04> 기분 좋아아~~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「もっと、もっと激しく突いてぇ<emoji=heart04>\u3000んっ、ふうぅっ、あはぁあっ<emoji=heart04>\u3000ウチのこと壊してっ<emoji=heart04>\u3000脳みそ、おま○こにしてほしいのぉ<emoji=heart04>\u3000あはぁあっ<emoji=heart04>\u3000ふああぁ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「좀 더, 좀 더 격렬하게 찔러줘<emoji=heart04> 응, 후우우, 아하아앗<emoji=heart04> 나를 망가뜨려줘<emoji=heart04> 뇌세포를, 보지로 만들어줬으면 좋겠어어<emoji=heart04> 아하아앗<emoji=heart04> 후아아아~~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「それ、それぇっ<emoji=heart04>\u3000あああぁあっ<emoji=heart04>\u3000はぁんっ、気持ちいいっ<emoji=heart04>\u3000ウチ、おま○こになるぅ<emoji=heart04>\u3000おま○こにさせてくださぁいっ<emoji=heart04>\u3000ああぁっ、んああぁっ<emoji=heart04><emoji=heart04>」"
translation = "「그거, 그거어<emoji=heart04> 아아아아앗<emoji=heart04> 하앙, 기분 좋아<emoji=heart04> 나, 보지가 될래<emoji=heart04> 보지로 만들어 주세에요<emoji=heart04> 아아앗, 응아아앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「おち○ちんでレイプっ<emoji=heart04>\u3000はぁあぁんっ、ありがとうございますっ<emoji=heart04>\u3000レイプ気持ちいいっ<emoji=heart04>\u3000レイプされて幸せぇ～～っ<emoji=heart04>\u3000あんっ、はあぁあっ、んああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「자지로 레이프<emoji=heart04> 하아아앙, 감사합니다<emoji=heart04> 레이프 기분 좋아<emoji=heart04> 레이프당해서 행복해~~<emoji=heart04> 앙, 하아아앗, 응아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「しあわせ、しゃ～わせぇっ<emoji=heart04>\u3000はああぁっ、子宮口激しいの幸せだよぉ<emoji=heart04>\u3000あぁああっ<emoji=heart04>\u3000それ大好きぃ<emoji=heart04>\u3000ふああぁ～っ、気持ちいい～～っ<emoji=heart04><emoji=heart04>」"
translation = "「행복해, 해앵복해<emoji=heart04> 하아아앗, 자궁구 격렬한 거 행복해에<emoji=heart04> 아아아앗<emoji=heart04> 그거 너무 좋아<emoji=heart04> 후아아아~, 기분 좋아~~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「あんっ、あんっ、あんっ<emoji=heart04>\u3000レイプセックス、人生で１番幸せぇぇ～～<emoji=heart04>\u3000ああぁあぁぁっ<emoji=heart04>\u3000興奮しすぎて、脳みそしびれちゃってるぅぅっ<emoji=heart04>\u3000ふああぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「앙, 앙, 앙<emoji=heart04> 레이프 섹스, 인생에서 제일 행복해에에~~<emoji=heart04> 아아아아아아앗<emoji=heart04> 흥분해서, 뇌세포가 저릿저릿해버려어어<emoji=heart04> 후아아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「あっ、はぁあんっ、ふああぁあっ<emoji=heart04>\u3000おま○こ準備してるぅ<emoji=heart04>\u3000子宮降りてきて、おち○ちんの先っぽ、吸い付いちゃうぅ<emoji=heart04>\u3000あはぁあっん<emoji=heart04>」"
translation = "「앗, 하아앙, 후아아아앗<emoji=heart04> 보지가 준비하고 있어어<emoji=heart04> 자궁이 내려와서, 자지 끝부분을, 빨아들여버려어<emoji=heart04> 아하아앗응<emoji=heart04>」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「あっあっあっ<emoji=heart04>\u3000卵子を排卵して、受精の準備しちゃってるよぉ<emoji=heart04>\u3000あっ、あんっ、はあぁんっ<emoji=heart04><emoji=heart04>」"
translation = "「앗, 앗, 앗<emoji=heart04> 난자를 배란해서, 수정 준비를 해버리고 있어어<emoji=heart04> 앗, 앙, 하아앙<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "ヘコヘコと不格好に腰をゆする花織に、暴力的な支配欲が赴くまま、言葉が口をつく。"
translation = "허덕허덕하며 꼴사납게 허리를 흔드는 카오리에게, 폭력적인 지배욕이 가는 대로, 말이 입 밖으로 튀어나왔다."

[[dialogue]]
speaker_original = "とびお"
speaker_translation = "토비오"
original = "「おいっ！\u3000中に出して欲しかったら、ちゃんとおねだりしてみろ！」"
translation = "「어이! 안에 싸달라고 하고 싶으면, 제대로 졸라봐!」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「あぁああぁあっ<emoji=heart04>\u3000お願いしますっ<emoji=heart04>\u3000とびおくんの精子で、ウチのこと、孕ませてくださいっ<emoji=heart04><emoji=heart04>」"
translation = "「아아아아앗<emoji=heart04> 부탁드립니다<emoji=heart04> 토비오 군의 정자로, 나를, 임신시켜주세요오<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「無責任種付けで、ウチの卵子を輪姦レイプして、受精イキさせて下さいぃっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000ああぁあっ<emoji=heart04>\u3000ふわぁあぁぁん<emoji=heart04>」"
translation = "「무책임 질내사정으로, 나의 난자를 윤간 레이프해서, 수정 가버리게 해주세에요오<emoji=heart04><emoji=heart04><emoji=heart04> 아아아앗<emoji=heart04> 후와아아아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "とびお"
speaker_translation = "토비오"
original = "「いいだろう。出してやるから、ちゃんと孕めよ……！」"
translation = "「좋아. 싸줄 테니까, 제대로 임신하라고……!」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「あっ、ふあああぁっ、あぁああっ<emoji=heart04>\u3000ありがとうございますっ、ありがとうございますぅ<emoji=heart04>\u3000あっすご、激しぃっ<emoji=heart04>\u3000あぁああっ<emoji=heart04>\u3000んああぁんっ<emoji=heart04>」"
translation = "「앗, 후아아아앗, 아아아앗<emoji=heart04> 감사합니다, 감사해요오<emoji=heart04> 앗 대단해, 격렬해<emoji=heart04> 아아아앗<emoji=heart04> 응아아앙<emoji=heart04>」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「まだ激しくなるぅ<emoji=heart04>\u3000あっ、あんっ、んあぁっ<emoji=heart04>\u3000おち○ちん気持ちいいっ<emoji=heart04>\u3000あ、あ、あ、あ、あっ<emoji=heart04>\u3000あぁああっ<emoji=heart04>\u3000おち○ちん気持ちいい～～っ<emoji=heart04><emoji=heart04>」"
translation = "「더 격렬해져어<emoji=heart04> 앗, 앙, 응아아<emoji=heart04> 자지 기분 좋아<emoji=heart04> 아, 아, 아, 아, 앗<emoji=heart04> 아아아앗<emoji=heart04> 자지 기분 좋아~~<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「んぅううっ<emoji=heart04>\u3000卵子でるぅ、あぁあ、排卵してるっ<emoji=heart04><emoji=heart04>\u3000おま○こ受精準備完了してるぅ<emoji=heart04>\u3000あぁあああっ、これ絶対孕むっ<emoji=heart04>」"
translation = "「응으으읏<emoji=heart04> 난자 나와, 아아아, 배란하고 있어<emoji=heart04><emoji=heart04> 보지 수정 준비 완료됐어어<emoji=heart04> 아아아아앗, 이거 절대 임신해<emoji=heart04>」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「あっあっあっあっあっ<emoji=heart04>\u3000孕むっ、孕むっ、孕む～っ<emoji=heart04>\u3000んああぁっ<emoji=heart04><emoji=heart04>\u3000来てっ、来て来てっ<emoji=heart04><emoji=heart04>\u3000孕ませてぇ～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「앗, 앗, 앗, 앗, 앗<emoji=heart04> 임신해, 임신해, 임신해애~<emoji=heart04> 응아아앗<emoji=heart04><emoji=heart04> 와줘, 와줘 와줘어<emoji=heart04><emoji=heart04> 임신시켜줘어어~~<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「あぁああぁぁあああっ<emoji=heart04><emoji=heart04>\u3000イクイクっ<emoji=heart04><emoji=heart04>イクイクイクイクイクぅ～<emoji=heart04>\u3000ああ、あぁ、ああ、あぁ、あぁあっ<emoji=heart04>\u3000ふあぁああぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아으아아아아아앗<emoji=heart04><emoji=heart04> 이쿠이쿠<emoji=heart04><emoji=heart04> 가버려가버려가버려가버려가버려어~<emoji=heart04> 아아, 아아, 아아, 아아, 아아앗<emoji=heart04> 후아아아아아~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "とびお"
speaker_translation = "토비오"
original = "「花織、孕めっ！！！」"
translation = "「카오리, 임신해랏!!!」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「あああああああああっ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000イっ――<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「아아아아아아아아앗<emoji=heart04><emoji=heart04><emoji=heart04> 가버렷――<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「イックうぅぅぅーーーーーーーーーっ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>\u3000んあぁあああぁぁ～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「가버려어어어어ーーーーーーーーー앗<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04> 응아아아아아아～～～～～～～～～앗<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「はあああぁぁぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000危険日おま○こに、中出し射精されちゃってるうぅぅぅ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"
translation = "「하아아아아아~~~앗<emoji=heart04><emoji=heart04><emoji=heart04> 위험일 보지에, 질내사정 당하고 있어어어어어~~~앗<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺は花織の子宮口に強くペニスを押し付けながら、限界まで高まった快楽を全て解放する。"
translation = "나는 카오리의 자궁구에 강하게 페니스를 밀어붙이며, 한계까지 고조된 쾌락을 전부 해방한다."

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「あっ<emoji=heart04><emoji=heart04>\u3000はあぁあっ<emoji=heart04><emoji=heart04>\u3000んあああぁ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>\u3000どくどくって、子宮の中にいっぱい精子注がれて、卵子犯されてるぅ～～っ<emoji=heart04><emoji=heart04>」"
translation = "「앗<emoji=heart04><emoji=heart04> 하아앗<emoji=heart04><emoji=heart04> 응아아아아~~앗<emoji=heart04><emoji=heart04><emoji=heart04> 울컥울컥하고, 자궁 안에 정자 잔뜩 쏟아져서, 난자 범해지고 있어어~~앗<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「ふああぁっ<emoji=heart04><emoji=heart04>\u3000イっ――クううぅ～～っ<emoji=heart04><emoji=heart04>\u3000はああぁっ<emoji=heart04>\u3000あぁああっ<emoji=heart04>\u3000卵子受精して、連続イキしちゃう～っ<emoji=heart04>」"
translation = "「후아아앗<emoji=heart04><emoji=heart04> 가버렷――어어어~~앗<emoji=heart04><emoji=heart04> 하아아앗<emoji=heart04> 아아앗<emoji=heart04> 난자 수정돼서, 연속으로 가버려어~앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「んっ<emoji=heart04>\u3000はあぁっ<emoji=heart04>\u3000ふうぅ……っ<emoji=heart04>\u3000あぁあぁぁっ<emoji=heart04>\u3000卵子までレイプされて、受精イキするの気持ちいぃっ<emoji=heart04>\u3000はぁあぁんっ<emoji=heart04>」"
translation = "「응<emoji=heart04> 하아앗<emoji=heart04> 후우……앗<emoji=heart04> 아아아앗<emoji=heart04> 난자까지 레이프당해서, 수정하며 가는 거 기분 좋아아<emoji=heart04> 하아아앙<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "やがて、射精が止まり、俺はペニスを引き抜く。"
translation = "이윽고, 사정이 멈추고, 나는 페니스를 뽑아낸다."

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「あっ……<emoji=heart04>\u3000んっ……ふうぅ……<emoji=heart04>」"
translation = "「앗……<emoji=heart04> 응……후우……<emoji=heart04>」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「はぁあ……はぁあん……<emoji=heart04>\u3000あふぅぅん<emoji=heart04>\u3000あはぁあっ<emoji=heart04>」"
translation = "「하아아……하아앙……<emoji=heart04> 아후으응<emoji=heart04> 아하앗<emoji=heart04>」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「あぁああ<emoji=heart04>\u3000とびおくんの種付けレイプ、気持ち良かったぁ<emoji=heart04>\u3000はあぁあ……<emoji=heart04>\u3000あぁあぁぁっ<emoji=heart04>」"
translation = "「아아아아<emoji=heart04> 토비오 군의 씨내리 레이프, 기분 좋았어어<emoji=heart04> 하아아아……<emoji=heart04> 아아아아앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "秘部から白濁を溢れさせながら、事後の余韻にふけっている花織。俺はそんな彼女を見て……"
translation = "비부에서 백탁을 흘러넘치게 하며, 사후의 여운에 잠겨 있는 카오리. 나는 그런 그녀를 보고……"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「――あひゃんっ！？\u3000あぁあぁっ<emoji=heart04>\u3000おち○ちん、クリに当たって……！？」"
translation = "「――아히양!? 아아아앗<emoji=heart04> 자지, 클리에 닿아서……!?」"

[[dialogue]]
speaker = "unk"
original = "ペニスを再び、秘部へと擦り付けていく。"
translation = "페니스를 다시, 비부에 문질러 나간다."

[[dialogue]]
speaker_original = "とびお"
speaker_translation = "토비오"
original = "「……花織、肉便器の分際で、勝手に休むのか？」"
translation = "「……카오리, 육변기 주제에, 마음대로 쉬는 거냐?」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「あぁああっ<emoji=heart04>\u3000ゴ、ゴメンなさぁいっ<emoji=heart04>\u3000ふわぁあっ<emoji=heart04>\u3000す、すごいよぉ……<emoji=heart04>\u3000とびおくんのおち○ちん、射精したばかりなのに、またすぐに大きくなって……<emoji=heart04>」"
translation = "「아아아앗<emoji=heart04> 죄, 죄송해여어앗<emoji=heart04> 후와아앗<emoji=heart04> 거, 엄청나아……<emoji=heart04> 토비오 군의 자지, 사정한 직후인데 벌써 다시 커져서……<emoji=heart04>」"

[[dialogue]]
speaker_original = "とびお"
speaker_translation = "토비오"
original = "「俺の性奴隷になりたかったんだろ？\u3000いいぞ、これから一生、お前は俺の生オナホだ」"
translation = "「내 성노예가 되고 싶었던 거잖아? 좋다, 이제부터 평생, 너는 내 생 오나홀이다」"

[[dialogue]]
speaker_original = "とびお"
speaker_translation = "토비오"
original = "「その淫乱ま○こ、もう１回使ってやるから、今度はお前が上で腰振って見せろよ」"
translation = "「그 음란 보지, 한 번 더 써줄 테니까, 이번엔 네가 위에서 허리 흔들어 봐」"

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「～～～っ<emoji=heart04>\u3000は、はい<emoji=heart04>\u3000かしこまりました、ご主人様ぁ<emoji=heart04>」"
translation = "「~~~앗<emoji=heart04> 네, 넷<emoji=heart04> 알겠습니다, 주인님아아<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "俺の命令に花織はぶるりと背筋を震わせながら、悦びの笑みを浮かべて。"
translation = "나의 명령에 카오리는 부르르 등줄기를 떨며, 희열의 미소를 띄운다."

[[dialogue]]
speaker_original = "花織"
speaker_translation = "카오리"
original = "「淫乱ではしたないおま○こですが、誠心誠意、ご奉仕させていただきますねっ<emoji=heart04>」"
translation = "「음란하고 천박한 보지지만, 성심성의껏 봉사하겠습니다앗<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
original = "花織は卑屈な笑みを浮かべながらも、嬉々として公共の場でのセックスを続けるのだった――"
translation = "카오리는 비굴한 미소를 지으면서도, 희희낙락하며 공공장소에서의 섹스를 계속하는 것이었다――"

