[[dialogue]]
speaker = "unk"
original = "第３話,メルエルは変態さん？,P"
translation = "제3화, 메르엘은 변태? P"

[[dialogue]]
speaker = "unk"
original = "体育終わりの昼休み。俺とメルエルは毎日、昼休みは一緒にお弁当を食べる約束をしているのだが──"
translation = "체육이 끝난 점심시간. 나와 메르엘은 매일 점심시간에는 같이 도시락을 먹기로 약속했는데──"

[[dialogue]]
speaker = "unk"
original = "制服に着替えたらすぐに出て来る！！"
translation = "「교복으로 갈아입으면 바로 나올게!!」"

[[dialogue]]
speaker = "unk"
original = "ごめん、メルエル！\u3000ちょっと野暮用が！"
translation = "「미안, 메르엘! 좀 급한 일이 생겼어!」"

[[dialogue]]
speaker = "unk"
original = "汗ばんだ体操着を星徒会室で着替えると、俺は薙刀部が起こしたトラブルを解決するべく、学園内を走りだした。"
translation = "땀에 젖은 체육복을 성도회실에서 갈아입자마자, 나는 치도부가 일으킨 트러블을 해결하기 위해 학원 안을 달려 나갔다."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「会長くん、いってらっしゃ～い！」"
translation = "「회장 군, 다녀오세요~!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「って、あっという間に行っちゃった……今日はお昼、一緒に食べられなさそうだなぁ」"
translation = "「어라, 순식간에 가버렸네…… 오늘은 점심 같이 못 먹겠네.」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "（あっ、会長くんの席のところ……脱ぎたての体操着）"
translation = "(앗, 회장 군 자리에…… 방금 벗어놓은 체육복)"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "（ぬ、脱ぎっぱなしなのは、よくないよね！\u3000お片付けの手伝い、するだけだから……）"
translation = "(버, 벗어던져 놓는 건 안 좋지! 정리하는 걸 도와주는 것뿐이니까……)"

[[dialogue]]
speaker = "unk"
original = "自分にそう言い聞かせながら、メルエルは汗でしっとりと濡れた体操着を拾い上げる。"
translation = "스스로에게 그렇게 되뇌며 메르엘은 땀으로 촉촉하게 젖은 체육복을 집어 든다."

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "恋人の脱ぎたての体操着を手に持つ。ただそれだけなのに、なぜかメルエルはあたりをキョロキョロと見回してしまう。"
translation = "연인이 방금 벗은 체육복을 손에 든다. 단지 그뿐인데 왠지 메르엘은 주위를 두리번두리번 살피게 된다."

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「メルエル！\u3000あなた、コソコソしていてかなり挙動不審よ！」"
translation = "「메르엘! 너, 소곤소곤거리는 게 꽤 거동이 수상해!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「ふわぁああぁあぁっ！？」"
translation = "「후와아아아앗!?」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「び、びびび、ヴィーナスちゃんっ！？」"
translation = "「비, 비비비, 비너스 짱!?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「何も言わなくても、全部わかっているわ！」"
translation = "「아무 말 안 해도 전부 알고 있어!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ズバリ、メルエル――あなたは今、クロトの汗がしみ込んだ体操着を思い切りクンクンしたいと思っているわねっ！！」"
translation = "「정곡을 찌르자면, 메르엘── 너는 지금 쿠로토의 땀이 스며든 체육복을 마음껏 킁킁거리고 싶다고 생각하고 있지!!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「思ってないよ、そんなこと！？」"
translation = "「생각 안 했어, 그런 거!?」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「やだな、ヴィーナスちゃん！！\u3000いくら会長くんのことが大好きだからって……」"
translation = "「정말이지, 비너스 짱!! 아무리 회장 군을 정말 좋아한다고 해도……」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「汗をかいた体操着をクンクンしたいだなんて、そんな変態さんみたいなこと、ちょっとも考えたことないよ！？」"
translation = "「땀 흘린 체육복을 킁킁거리고 싶다니, 그런 변태 같은 건 조금도 생각해 본 적 없어!?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「嘘ね！\u3000私には通用しないわ！！」"
translation = "「거짓말이네! 나한테는 안 통해!!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「…………はいぃ。私は今、嘘をつきましたぁ」"
translation = "「…………네에. 저 지금 거짓말했어요오.」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「本当は会長くんの体操着をクンクンしてみたいと思っていた変態さんです……」"
translation = "「사실은 회장 군의 체육복을 킁킁거려보고 싶다고 생각한 변태입니다……」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「で、でも待って！\u3000これはちょっと、魔が差しただけっていうか……！」"
translation = "「하, 하지만 잠깐만! 이건 그냥 잠깐 마가 낀 거라고나 할까……!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「未遂なのっ。思っちゃっただけで、実行には移したりしてないよっ！」"
translation = "「미수라고. 생각만 했을 뿐이지 실행에 옮기거나 하진 않았어!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「そうなの？\u3000したいならしちゃえばいいのに」"
translation = "「그래? 하고 싶으면 해버리면 좋을 텐데.」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「ふぇええ……？」"
translation = "「후에에……?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「クロトの匂いって、なんだかすっごく安心するわよね♪」"
translation = "「쿠로토의 냄새는 왠지 무척 안심되잖아♪」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「そ、そうなの！\u3000ヴィーナスちゃんもわかる！？」"
translation = "「그, 그렇지! 비너스 짱도 알아!?」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「安心するっていうのもあるし、会長くんに抱きしめられてるみたいでドキドキするっていうか！！」"
translation = "「안심된다는 점도 있고, 회장 군에게 안겨 있는 것 같아서 두근거린다고나 할까!!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「ヴィーナスちゃんも、そういう気持ちになっちゃうことあるんだっ！？」"
translation = "「비너스 짱도 그런 기분이 들 때가 있구나!?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ドキドキはしないし、さすがに体操着の匂いまで嗅ぎたいとは思わないわね！！」"
translation = "「두근거리지는 않고, 역시 체육복 냄새까지 맡고 싶지는 않네!!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「はぇえええぇ～～～～！？」"
translation = "「하에에에에~~~~!?」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「今、何だかすっごく『わかる！』みたいなノリだったのに……！？」"
translation = "「방금 왠지 엄청 『알아!』 하는 분위기였으면서……!?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「近くにいて安心するのは本当よ。あと、メルエルが完全にヨミヨミと同じ目をしてたから、すぐにわかったわ！」"
translation = "「곁에 있으면 안심되는 건 사실이야. 그리고 메르엘이 완전히 요미요미랑 똑같은 눈을 하고 있었으니까 바로 알았지!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「でもそれって、それだけクロトのことが大好きってことでしょ？」"
translation = "「하지만 그건 그만큼 쿠로토를 정말 좋아한다는 거잖아?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「全然悪いことではないと思うのだけれど、メルエルはどうして隠すのかしら？」"
translation = "「전혀 나쁜 일은 아니라고 생각하는데, 메르엘은 왜 숨기는 거야?」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「だって、恋人の匂いが好きな女の子なんて……ちょっと、はしたないんじゃないかなぁ？」"
translation = "「그치만 연인의 냄새를 좋아하는 여자애라니…… 좀 조신하지 못한 거 아닐까 해서.」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「会長くんの前では、ちゃんと可愛い女の子でいたいというか、なんというか……」"
translation = "「회장 군 앞에서는 제대로 귀여운 여자애로 있고 싶다고나 할까, 뭐라 할까……」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「なるほどね！\u3000恋人のメルエルにそこまで思ってもらえるなんて、クロトは果報者だわ！」"
translation = "「과연 그렇네! 연인인 메르엘에게 그 정도로 사랑받다니 쿠로토는 행운아네!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「……ヴィーナスちゃん！！」"
translation = "「……비너스 짱!!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「でもメルエルはあれね！\u3000むっつりドスケベってやつね！！」"
translation = "「그래도 메르엘은 그거네! 겉으론 얌전해도 속은 도스케베인 녀석이네!!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「ヴィーナスちゃん！？」"
translation = "「비너스 짱!?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ちなみにクロトもむっつりよ！\u3000似た者カップルね♪」"
translation = "「참고로 쿠로토도 겉만 번지르르한 녀석이야! 끼리끼리 커플이네♪」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「そ、そうなの！？」"
translation = "「그, 그래!?」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「星徒会の仕事中もメルエルの写真をこっそり見て、１人でニヤニヤしてるんだもの！\u3000あれはかなりのむっつりよ！」"
translation = "「성도회 업무 중에도 메르엘 사진을 몰래 보면서 혼자 실실 웃는다니까! 저건 상당한 음란마귀야!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「そ、そうなんだ。えへ、えへへへへへぇ<emoji=heart04>」"
translation = "「그, 그렇구나. 에헤, 에헤헤헤헤헤에<emoji=heart04>」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "（会長くん、私がいないところでも、私のことを想ってくれてるなんて……！\u3000ふわぁ～っ<emoji=heart04>\u3000嬉しすぎて、メルトしちゃうよぉ～っ<emoji=heart04><emoji=heart04>）"
translation = "(회장 군, 내가 없는 곳에서도 나를 생각해 주고 있다니……! 후와아~<emoji=heart04> 너무 기뻐서 멜트 해버려요오~<emoji=heart04><emoji=heart04>)"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「でも、むっつりとむっつりでは話が進まないわ！」"
translation = "「하지만 쑥맥들끼리 있으면 진도가 안 나가잖아!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「メルエル！\u3000たまには強引に行く積極性も重要よ！！」"
translation = "「메르엘! 가끔은 억지로라도 밀어붙이는 적극성도 중요해!!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「ご、強引に……」"
translation = "「어, 억지로……」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「でも私、むしろ会長くんには……強引にされちゃいたいっていうか、なんていうかぁ……」"
translation = "「하지만 난 오히려 회장 군에게…… 억지로 당하고 싶다고나 할까, 뭐라 할까아……」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「あのね、ヴィーナスちゃんだから言うんだけど……たぶん私――Ｍだと思うんだ……！」"
translation = "「저기 있잖아, 비너스 짱이라서 말하는 건데…… 아마 나── M인 것 같아……!」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「ふむふむ。それで言うなら、むっつりなだけで、クロトはＳな気がするわね」"
translation = "「흐음흐음. 그렇게 따지면 쿠로토는 겉으론 몰라도 S인 느낌이네.」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「やっぱりそうだよねっ！\u3000２人きりの時の会長くん、時々すっごく強引で……ぐいってされると、キュンキュンしちゃうのっ<emoji=heart04>」"
translation = "「역시 그렇지! 둘만 있을 때의 회장 군, 가끔 무척 강압적이라서…… 확 끌어당겨지면 가슴이 큥큥거려<emoji=heart04>」"

[[dialogue]]
speaker_original = "ヴィーナス"
speaker_translation = "비너스"
original = "「でもそれならそれで、『サソイウケ』？\u3000っていう必殺技があるらしいわ！」"
translation = "「그렇다면 그것대로 『유혹수』? 라는 필살기가 있는 것 같아!」"

[[dialogue]]
speaker_original = "メルエル"
speaker_translation = "메르엘"
original = "「さそいうけ……？\u3000それってどういう必殺技なのっ？\u3000私、すっごく気になるよ！！」"
translation = "「유혹수……? 그건 어떤 필살기야? 나, 무척 궁금해!!」"

[[dialogue]]
speaker = "unk"
original = "それからも――クロト不在の星徒会室で、メルエルとヴィーナスの不穏（？）なガールズトークは、どこまでも続くのだった。"
translation = "그 후로도── 쿠로토가 부재중인 성도회실에서 메르엘과 비너스의 불온(?)한 걸즈 토크는 끝없이 이어졌다."

