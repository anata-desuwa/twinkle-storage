[[dialogue]]
speaker = "unk"
original = "第８話,ディザスター・ハンド,B"
translation = "제8화, 디재스터 핸드, B"

[[dialogue]]
speaker = "アポロ"
original = "「っっっ──！！」"
translation = "「크으으윽──!!」"

[[dialogue]]
speaker = "クロト"
original = "（星術じゃない──別種の力──）"
translation = "（성술이 아니야── 다른 종류의 힘──）"

[[dialogue]]
speaker = "アナ"
original = "（──まさか）"
translation = "（──설마）"

[[dialogue]]
speaker = "アイリーン"
original = "「はあ、はあ……今度こそ！」"
translation = "「하아, 하아…… 이번에야말로!」"

[[dialogue]]
speaker = "セドナ"
original = "「ご苦労」"
translation = "「수고했다」"

[[dialogue]]
speaker = "unk"
original = "謎の新勢力の力も借りて、ついにアポロを追い詰めた俺たち。"
translation = "수수께끼의 신흥 세력의 힘까지 빌려, 마침내 아폴로를 궁지로 몰아넣은 우리들."

[[dialogue]]
speaker = "unk"
original = "何度も邪魔をしてきたギエルも今度ばかりは伸びており、もはや邪魔は入らない。"
translation = "몇 번이나 방해했던 기엘도 이번만큼은 쓰러져 있어, 더 이상 방해는 들어오지 않는다."

[[dialogue]]
speaker = "ネビュラ隊員Ａ"
original = "「射撃用意──！」"
translation = "「사격 준비──!」"

[[dialogue]]
speaker = "unk"
original = "彼女たちは一糸乱れぬ隊列で、それぞれが独特な銃を構えた。"
translation = "그녀들은 일사불란한 대열로, 각자 독특한 총을 겨누었다."

[[dialogue]]
speaker = "unk"
original = "完膚なきまでに無力化する気だ。"
translation = "완전히 무력화시킬 생각이다."

[[dialogue]]
speaker = "エリシア"
original = "「──姉さん……！」"
translation = "「──언니……!」"

[[dialogue]]
speaker = "クロト"
original = "「っ……待ってください！\u3000あれは、彼女の姉の姿をしていて──！」"
translation = "「윽…… 기다려 주세요! 저건, 그녀의 언니 모습을 하고 있어서──!」"

[[dialogue]]
speaker = "セドナ"
original = "「悪いがかける情けはない。やれ」"
translation = "「미안하지만 베풀 정은 없다. 해라」"

[[dialogue]]
speaker = "ネビュラ隊員Ｂ"
original = "「は──！！」"
translation = "「핫──!!」"

[[dialogue]]
speaker = "エリシア"
original = "「っ……！」"
translation = "「윽……!」"

[[dialogue]]
speaker = "unk"
original = "エリシアは彼女たちを止めることなく、ただ黙して目をつむった。"
translation = "엘리시아는 그녀들을 막지 않고, 그저 침묵하며 눈을 감았다."

[[dialogue]]
speaker = "unk"
original = "たとえ姉の姿かたちをしているとしても、世界の脅威として打倒されるのは仕方ないと……"
translation = "설령 언니의 모습을 하고 있을지라도, 세계의 위협으로서 타도되는 것은 어쩔 수 없다고……"

[[dialogue]]
speaker = "unk"
original = "──だが。"
translation = "──하지만."

[[dialogue]]
speaker = "ネビュラ隊員Ａ"
original = "「え……？」"
translation = "「에……?」"

[[dialogue]]
speaker = "ネビュラ隊員Ｂ"
original = "「も……目標、増加……？」"
translation = "「모…… 목표, 증가……?」"

[[dialogue]]
speaker = "unk"
original = "彼女らの一斉掃射は阻まれていた。"
translation = "그녀들의 일제 사격은 가로막혔다."

[[dialogue]]
speaker = "unk"
original = "現れた謎の存在が、気を失ったアポロに屋根を作っている。"
translation = "나타난 수수께끼의 존재가, 정신을 잃은 아폴로에게 지붕을 만들어 주고 있다."

[[dialogue]]
speaker = "ネビュラ隊員Ａ"
original = "「な……なんでしょう、アレは……」"
translation = "「무…… 무엇일까요, 저건……」"

[[dialogue]]
speaker = "アイリーン"
original = "「手……？\u3000のように、見えますが……？」"
translation = "「손……? 처럼, 보입니다만……?」"

[[dialogue]]
speaker = "セドナ"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "そう。それは<b>手</b>だった。"
translation = "그렇다. 그것은 <b>손</b>이었다."

[[dialogue]]
speaker = "unk"
original = "他に表現のしようもない、ただ途方もない大きさをしているだけの、手。"
translation = "달리 표현할 방법이 없는, 그저 터무니없이 크기만 한, 손."

[[dialogue]]
speaker = "unk"
original = "それが、ゆっくりと、アポロを守るように包んでいる。"
translation = "그것이, 천천히, 아폴로를 지키듯이 감싸고 있다."

[[dialogue]]
speaker = "アポロ"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "当のアポロはまるで揺り籠にでも揺られているかのようだ。"
translation = "당사자인 아폴로는 마치 요람에라도 흔들리는 듯하다."

[[dialogue]]
speaker = "unk"
original = "意識を失った彼女の寝顔は、年相応の無垢な少女にしか見えない。"
translation = "의식을 잃은 그녀의 잠든 얼굴은, 나이 또래의 순수한 소녀로밖에 보이지 않는다."

[[dialogue]]
speaker = "エリシア"
original = "「姉、さん……？」"
translation = "「언, 니……?」"

[[dialogue]]
speaker = "unk"
original = "ふらりとエリシアが彼女を呼ぶ。"
translation = "비틀거리며 엘리시아가 그녀를 부른다."

[[dialogue]]
speaker = "unk"
original = "すると手が中指を弾いた。"
translation = "그러자 손이 중지를 튕겼다."

[[dialogue]]
speaker = "unk"
original = "いわゆる、デコピンだ。"
translation = "이른바, 데코핀이다."

[[dialogue]]
speaker = "unk"
original = "すると──"
translation = "그러자──"

[[dialogue]]
speaker = "セドナ"
original = "「っ──」"
translation = "「윽──」"

[[dialogue]]
speaker = "アイリーン"
original = "「なっ──くあっ！？」"
translation = "「뭣──크악!?」"

[[dialogue]]
speaker = "エリシア"
original = "「っっっ────！！」"
translation = "「크으으으────!!」"

[[dialogue]]
speaker = "ニャリオン"
original = "「エリシア嬢っ──！！」"
translation = "「엘리시아 아가씨──!!」"

[[dialogue]]
speaker = "unk"
original = "直撃を受けたエリシアは、その颶風により遥か彼方まで吹き飛ばされる。"
translation = "직격을 맞은 엘리시아는, 그 회오리바람에 의해 아득히 먼 곳까지 날아간다."

[[dialogue]]
speaker = "unk"
original = "余波を受けた俺たちや新手の彼女たちさえ、あわや地割れに飲まれかねなかった。"
translation = "여파를 맞은 우리들이나 새로운 적들조차, 하마터면 땅이 갈라지는 곳에 삼켜질 뻔했다."

[[dialogue]]
speaker = "ユウリ"
original = "「フィオナばっかり、狙われすぎだろ──！！」"
translation = "「피오나만, 너무 노려지는 거 아니냐──!!」"

[[dialogue]]
speaker = "エリシア"
original = "「ユウリッ──」"
translation = "「유우리──」"

[[dialogue]]
speaker = "unk"
original = "飛び出したユウリがエリシアをかばうように盾を展開する。"
translation = "뛰쳐나간 유우리가 엘리시아를 감싸듯이 방패를 전개한다."

[[dialogue]]
speaker = "unk"
original = "だが……手はそれ以上の追撃をしてこなかった。"
translation = "하지만…… 손은 그 이상의 추격을 해오지 않았다."

[[dialogue]]
speaker = "unk"
original = "ただ、気絶したアポロを優しく乗せて……"
translation = "그저, 기절한 아폴로를 상냥하게 태우고……"

[[dialogue]]
speaker = "ギエル"
original = "「ぐ……ふっ。さあ……一度、引きましょうか……アポロ、様」"
translation = "「크…… 큭. 자아…… 일단, 물러나시죠…… 아폴로, 님」"

[[dialogue]]
speaker = "アポロ"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "起き上がったギエルもそれに乗り、手は夜空へと上昇していった。"
translation = "일어난 기엘도 그것에 올라타고, 손은 밤하늘로 상승해 갔다."

[[dialogue]]
speaker = "ネビュラ隊員Ｂ"
original = "「逃げます！」"
translation = "「도망칩니다!」"

[[dialogue]]
speaker = "セドナ"
original = "「狙え」"
translation = "「겨눠라」"

[[dialogue]]
speaker = "アイリーン"
original = "「掃射──！」"
translation = "「소사──!」"

[[dialogue]]
speaker = "unk"
original = "黒色の弾幕が謎の手に吸い込まれていくも止まらない。"
translation = "검은색 탄막이 수수께끼의 손에 빨려 들어가듯 멈추지 않는다."

[[dialogue]]
speaker = "unk"
original = "眠りについたアポロと共に、星空の彼方へと消え去っていって……"
translation = "잠이 든 아폴로와 함께, 별이 빛나는 하늘 저편으로 사라져 가고……"

[[dialogue]]
speaker = "エリシア"
original = "「フィオナ──姉さああああああんっっ！！！」"
translation = "「피오나── 언니이이이이이이잇!!」"

[[dialogue]]
speaker = "unk"
original = "決死のその叫びだけが、いつまでも夜空に木霊していた。"
translation = "결사의 그 외침만이, 언제까지나 밤하늘에 메아리치고 있었다."

[[dialogue]]
speaker = "クロト"
original = "「……」"
translation = "「……」"

[[dialogue]]
speaker = "unk"
original = "だが……なぜなのだろう。"
translation = "하지만…… 왜일까."

[[dialogue]]
speaker = "unk"
original = "エリシアがフィオナと呼んだ彼女と。"
translation = "엘리시아가 피오나라고 불렀던 그녀와."

[[dialogue]]
speaker = "unk"
original = "あの、恐ろしくも巨大な掌を見ていると……"
translation = "그, 무섭도록 거대한 손바닥을 보고 있자니……"

[[dialogue]]
speaker = "unk"
original = "言いようのない寂しさが、胸の奥深くまで去来していた。"
translation = "형언할 수 없는 쓸쓸함이, 가슴 깊은 곳까지 밀려오고 있었다."

