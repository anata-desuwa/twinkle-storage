[[dialogue]]
speaker = "unk"
original = "第２話,ネビュラ崩壊？,B"
translation = "제2화, 네뷸라 붕괴?"

[[dialogue]]
speaker = "unk"
original = "クラウディア・イルゼ・フォン・ゴットフリート。"
translation = "클라우디아 일제 폰 고트프리트."

[[dialogue]]
speaker = "unk"
original = "全ての魔女の上に君臨する『光の魔女』であり、ネビュラの一大プロジェクト『グレートウォール計画』の中心人物である。"
translation = "모든 마녀 위에 군림하는 『빛의 마녀』이자, 네뷸라의 거대 프로젝트 『그레이트 월 계획』의 중심인물이다."

[[dialogue]]
speaker = "unk"
original = "結果、グレートウォール計画自体は実行に移されなかった。"
translation = "결과적으로 그레이트 월 계획 자체는 실행에 옮겨지지 않았다."

[[dialogue]]
speaker = "unk"
original = "しかし、光の巨大結界を張ることで星騎士たちを助け、世界を救う偉業の一端を担った。"
translation = "하지만 빛의 거대 결계를 펼침으로써 성기사들을 도와 세계를 구하는 위업의 한 축을 담당했다."

[[dialogue]]
speaker = "unk"
original = "そしてリクリエを凌いだ後、束の間の平和が訪れると──厄介化した。"
translation = "그리고 리크리에를 넘긴 후, 잠시 평화가 찾아오자──골칫덩이가 되었다."

[[dialogue]]
speaker = "unk"
original = "ネビュラの財政問題。収まらないモンスターの出現。組織の解体を迫る元老会──"
translation = "네뷸라의 재정 문제. 멈추지 않는 몬스터의 출현. 조직 해체를 압박하는 원로회──"

[[dialogue]]
speaker = "unk"
original = "他にもセドナを悩ませる問題は山積みだった。"
translation = "그 외에도 세드나를 고민하게 만드는 문제는 산더미였다."

[[dialogue]]
speaker = "unk"
original = "それに加えてリクリエ以後、クラウディアが幾度となく抗議活動を起こすようになったのだった。"
translation = "거기에 더해 리크리에 이후, 클라우디아가 몇 번이고 항의 활동을 일으키게 된 것이었다."

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「ふぅ……今回は手こずったが、何とか鎮圧は完了したな」"
translation = "「후우…… 이번에는 애 좀 먹었지만, 어떻게든 진압은 완료했군.」"

[[dialogue]]
speaker_original = "カヤ"
speaker_translation = "카야"
original = "「ありがとうございます。クラウディア様が相手となると、私たちでは抑えきれませんから」"
translation = "「감사합니다. 클라우디아 님이 상대라면 저희로서는 감당할 수 없으니까요.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「基地への被害も軽微で済んだ。よく持ち堪えてくれたな」"
translation = "「기지 피해도 경미한 수준에서 끝났다. 잘 버텨주었군.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「それで、姫様はいまどうしている？」"
translation = "「그래서, 공주님은 지금 어찌하고 있지?」"

[[dialogue]]
speaker_original = "カヤ"
speaker_translation = "카야"
original = "「反省室に入って頂いています。今回は前回のものより数倍は強固な防壁の部屋です」"
translation = "「반성실에 모셔두었습니다. 이번에는 지난번보다 몇 배는 더 강고한 방벽을 갖춘 방입니다.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「そうか。だが、まあ……もって数日だろうな」"
translation = "「그래. 하지만, 뭐…… 길어야 며칠이겠지.」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「監視には誰がついているのですか？」"
translation = "「감시는 누가 맡고 있나요?」"

[[dialogue]]
speaker_original = "カヤ"
speaker_translation = "카야"
original = "「リーリアがその任に」"
translation = "「리리아가 그 임무를.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「リーリアか……」"
translation = "「리리아인가……」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「あの～、そのリーリアなんですが……」"
translation = "「저기~, 그 리리아인데요……」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「な！？\u3000リーリア、クラウディア様の監視はどうしたのですか！」"
translation = "「뭐!? 리리아, 클라우디아 님의 감시는 어쩌고 여기 있는 거죠!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「ええと、逃げたり暴れたりしないから余の要求を伝えて来いと仰っておりまして……」"
translation = "「그게, 도망치거나 날뛰지 않을 테니 짐의 요구를 전하고 오라고 말씀하셔서……」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「ほう……」"
translation = "「호오……」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「う……！\u3000そんな怖い顔しないでくださいってばぁ～」"
translation = "「우……! 그렇게 무서운 얼굴 하지 마세요오~」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「聞こう。姫様は何と言っている」"
translation = "「듣지. 공주님이 뭐라고 하시더냐.」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「え～、コホン……」"
translation = "「에~, 흠흠……」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「開国ぞ！！！！！」"
translation = "「개국하라!!!!!」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「……（イラッ）」"
translation = "「……(울컥)」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「……（イラッ）」"
translation = "「……(울컥)」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「グレートウォール計画も終了し、魔界と人間界、魔女とヒトとを隔てる理由も無くなった！」"
translation = "「그레이트 월 계획도 종료되었고, 마계와 인간계, 마녀와 인간을 가로막을 이유도 사라졌도다!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「魔女が魔女だけの世界に閉じこもる、そんな時代はもう終わったのだ！」"
translation = "「마녀가 마녀들만의 세계에 틀어박히는, 그런 시대는 이제 끝났느니라!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「今こそ広い世界に目を向け、人間たちとの交流を深め、手と手を取り合って共に歩むべきであるっ！」"
translation = "「지금이야말로 넓은 세계로 눈을 돌려, 인간들과의 교류를 깊게 하고 손에 손을 맞잡고 함께 걸어가야 하도다!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「まずは余、光の魔女たるクラウディアが導き手となろう！」"
translation = "「우선 짐, 빛의 마녀인 클라우디아가 인도자가 되겠노라!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「そのために余に、人間たちと自由に交流する権利を与えよ！」"
translation = "「그러니 짐에게 인간들과 자유롭게 교류할 권리를 부여하라!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「余自らが人間たちと仲良くすることで、森に住む魔女たちの良き手本となるのだ！」"
translation = "「짐 스스로가 인간들과 사이좋게 지냄으로써, 숲에 사는 마녀들의 좋은 본보기가 될 것이니라!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「それからもうひとつ！\u3000ウェンディ、以前に比べておやつの量が減っている！」"
translation = "「그리고 또 하나! 웨디, 이전보다 간식의 양이 줄었도다!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「どれほど財政が厳しかろうと、余のおやつを減らすことはまかりならぬ！\u3000何よりも最優先させよ！」"
translation = "「재정이 아무리 엄혹할지언정, 짐의 간식을 줄이는 것은 용납지 않느니라! 무엇보다 최우선으로 삼도록 하라!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「……だそうです」"
translation = "「……라고 하십니다.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「はぁ……本当に困ったお人だ」"
translation = "「하아…… 정말 곤란한 분이군.」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「まあ、おやつのことはともかくとして、主張としては一理あるのかな～って思いますけどね」"
translation = "「뭐, 간식 이야기는 차치하고서라도, 주장 자체는 일리가 있지 않나~ 싶기도 하지만요.」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「ともに苦楽を乗り越えた仲じゃないですか。魔女とヒトは分かり合えるのかな～って……」"
translation = "「함께 고락을 함께한 사이잖아요. 마녀와 인간은 서로 이해할 수 있지 않을까~ 해서……」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「何をやってるんですか！\u3000監視役であるあなたがほだされてどうするんです！」"
translation = "「무슨 소리를 하는 거예요! 감시역인 당신이 넘어가 버리면 어떡해요!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「ふえっ、だ、だって……」"
translation = "「후에엣, 그, 그치만……」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「リーリア……今、最も優先すべきことが何なのか、あなたにだって判断はつくでしょう」"
translation = "「리리아…… 지금 가장 우선해야 할 것이 무엇인지, 당신이라도 판단이 서겠죠.」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「その主張自体は私だって、長官だって理解しています。けれど、そのためにもネビュラという組織を存続させなくてはならないんです」"
translation = "「그 주장 자체는 저도, 장관님도 이해하고 있어요. 하지만 그러기 위해서라도 네뷸라라는 조직을 존속시켜야만 한다고요.」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「長官が何のために、元老会の分からず屋どもを説得しに出向いていると思うんですか？」"
translation = "「장관님이 무엇을 위해 원로회의 벽창호 녀석들을 설득하러 다니시는 거라고 생각하는 건가요?」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「ネビュラが解体してしまったら、そもそも人間界との交流が途絶えてしまうんです」"
translation = "「네뷸라가 해체되어 버리면, 애초에 인간계와의 교류 자체가 끊겨버린단 말이에요.」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「その為にも、一刻も早く問題を解決して、ネビュラの財政を立て直さなければならない……そうでしょう？」"
translation = "「그러기 위해서라도 하루빨리 문제를 해결해서 네뷸라의 재정을 재건해야 한다…… 아시겠어요?」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「なのに、こうも度々問題を起こして長官の手を煩わせてどうするんですか！」"
translation = "「그런데 이렇게 매번 문제를 일으켜서 장관님을 번거롭게 하면 어쩌자는 거예요!」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「それにクラウディア様が暴れる度に大切なお金が浪費されていくんですよ！\u3000建物の修繕費とか、鎮圧部隊を動かすための費用とかっ！！」"
translation = "「게다가 클라우디아 님이 날뛰실 때마다 소중한 돈이 낭비되고 있다고요! 건물의 수리비라든가, 진압 부대를 움직이기 위한 비용이라든가!!」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「クラウディア様に言ってくださいよ～！\u3000私が問題を起こしてるわけじゃないんですから～」"
translation = "「클라우디아 님한테 말해달라고요~! 제가 문제를 일으키는 게 아니니까요~」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「はっ！？\u3000す、すみません……つい興奮して我を忘れてしまいました」"
translation = "「핫!? 죄, 죄송합니다…… 그만 흥분해서 정신을 잃었네요.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「ともかく今はウェンディの言ったような理由で姫様の要求を呑むことができない。そう伝えろ」"
translation = "「어쨌든 지금은 웨디가 말한 이유로 공주님의 요구를 들어줄 수 없다. 그렇게 전해라.」"

[[dialogue]]
speaker_original = "リーリア"
speaker_translation = "릴리아"
original = "「わ、わかりました」"
translation = "「아, 알겠습니다.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「姫様には何度も事情を説明しているのだがな……まあ理解はしてもらえないようだ」"
translation = "「공주님께는 몇 번이고 사정을 설명했습니다만…… 뭐, 이해를 못 하시는 모양이군.」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「また数日としないうちに暴れ始めますよね？」"
translation = "「또 며칠 안 가서 날뛰기 시작하시겠죠?」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「ああ。カヤ、お前も警戒しておくように」"
translation = "「그래. 카야, 너도 경계를 늦추지 않도록.」"

[[dialogue]]
speaker_original = "カヤ"
speaker_translation = "카야"
original = "「了解です、長官」"
translation = "「알겠습니다, 장관님.」"

[[dialogue]]
speaker_original = "セドナ"
speaker_translation = "세드나"
original = "「すまない、私は少し休ませてもらう。ウェンディ、後のことは任せるぞ」"
translation = "「미안하군, 나는 잠시 쉬도록 하겠다. 웨디, 뒷일은 맡기마.」"

[[dialogue]]
speaker_original = "ウェンディ"
speaker_translation = "웬디"
original = "「わかりました、ゆっくりと身体をお休めください！」"
translation = "「알겠습니다, 푹 쉬어주세요!」"

