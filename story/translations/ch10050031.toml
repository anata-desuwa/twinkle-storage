[[dialogue]]
speaker = "unk"
original = "第１話,オトナの夏？,P"
translation = "제1화, 어른의 여름?, P"

[[dialogue]]
speaker = "ソフィア"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "ソフィア"
original = "「…………ふぅ…………」"
translation = "「…………후우…………」"

[[dialogue]]
speaker = "unk"
original = "白い砂浜の上、パラソルを立てかけてはいくつも並ぶビーチチェア。"
translation = "하얀 백사장 위, 파라솔을 세워두고 몇 개나 늘어선 비치 체어."

[[dialogue]]
speaker = "unk"
original = "そんなビーチチェアの上で、でっかいサングラスをかけて仰向けになる──"
translation = "그런 비치 체어 위에서, 커다란 선글라스를 쓰고서 천장을 보며 누워 있는──"

[[dialogue]]
speaker = "unk"
original = "なんというか、非常に嫌～……な感じのくつろぎ方をしている少女がいた。"
translation = "뭐랄까, 굉장히 기분 나~쁜…… 느낌으로 휴식을 취하고 있는 소녀가 있었다."

[[dialogue]]
speaker = "unk"
original = "それはソフィアだった。"
translation = "그것은 소피아였다."

[[dialogue]]
speaker = "unk"
original = "なんでそんな格好を？"
translation = "왜 그런 차림을?"

[[dialogue]]
speaker = "unk"
original = "ソフィア……？"
translation = "소피아……?"

[[dialogue]]
speaker = "ソフィア"
original = "「ん……？」"
translation = "「응……?」"

[[dialogue]]
speaker = "ソフィア"
original = "「夏を満喫するためですよ。大人のサマースタイルを味わいたいならこれだと、リップルさんから教わりました」"
translation = "「여름을 만끽하기 위해서예요. 어른스러운 서머 스타일을 맛보고 싶다면 이거라고, 리플 씨에게 배웠답니다.」"

[[dialogue]]
speaker = "unk"
original = "ソフィアはどでかサングラスをスッと外し、近くに置いていた巨大なグラスをすくい上げるように持った。"
translation = "소피아는 큼지막한 선글라스를 슥 벗고, 근처에 두었던 거대한 잔을 떠올리듯이 들었다."

[[dialogue]]
speaker = "unk"
original = "無理しなくても……"
translation = "무리하지 않아도……"

[[dialogue]]
speaker = "ソフィア"
original = "「む、無理などしていません。私もそろそろいい歳ですから──大人な夏の楽しみ方をするべきなのです」"
translation = "「무, 무리 같은 건 하지 않았어요. 저도 슬슬 적당한 나이니까요── 어른스러운 여름을 즐기는 법을 터득해야만 하는 거예요.」"

[[dialogue]]
speaker = "ソフィア"
original = "「降り注ぐ日差しをパラソルで避けながら、優雅にトロピカルジュースを嗜む……」"
translation = "「내리쬐는 햇살을 파라솔로 피하면서, 우아하게 트로피컬 주스를 음미한다……」"

[[dialogue]]
speaker = "ソフィア"
original = "「──っとと……グ、グラスが大きすぎて、私の片手じゃ支えきれない……むぅ……なんとか両手で持って──」"
translation = "「──앗, 차차…… 자, 잔이 너무 커서, 제 한 손으로는 다 지탱할 수가…… 으으…… 어떻게든 양손으로 들고──」"

[[dialogue]]
speaker = "ソフィア"
original = "「ちゅうちゅうちゅう……ん～、これですよこれ！\u3000これこそ大人の女の夏の過ごし方です」"
translation = "「쪽쪽쪽…… 음~, 이거예요 이거! 이것이야말로 어른스러운 여자의 여름을 보내는 방법이죠.」"

[[dialogue]]
speaker = "ソフィア"
original = "「……何をまじまじと見ているんですか。その、そんなに見られているとさすがに照れるんですけど……」"
translation = "「……뭘 그렇게 빤히 쳐다보시는 건가요. 그, 그렇게 쳐다보시면 역시 부끄러운데요……」"

[[dialogue]]
speaker = "ソフィア"
original = "「なぜ大人っぽくなりたいのか？\u3000それは──だって……私が目指しているのは、フィオナ会長のような、頼れる立派な女性ですから」"
translation = "「왜 어른스러워지고 싶냐고요? 그건── 그게…… 제가 목표로 하는 건, 피오나 회장님 같은, 의지할 수 있는 훌륭한 여성이니까요.」"

[[dialogue]]
speaker = "ソフィア"
original = "「ですから、サマーリゾートに来たとて子どものようにはしゃいでいる場合ではないのです。落ち着きをもって、ゆったりとラグジュアリーな時間を……」"
translation = "「그러니까, 서머 리조트에 왔다고 해서 아이처럼 들떠 있을 때가 아닌 거예요. 침착함을 유지하며, 느긋하고 럭셔리한 시간을……」"

[[dialogue]]
speaker = "アポロ"
original = "「おーい！\u3000ソフィア～！」"
translation = "「어ー이! 소피아~!」"

[[dialogue]]
speaker = "ソフィア"
original = "「ん……この声は……？」"
translation = "「응…… 이 목소리는……?」"

[[dialogue]]
speaker = "アポロ"
original = "「──いたいた。魔王も一緒か。こっち来いよ、向こう岸まで競争しよーぜ！」"
translation = "「──찾았다 찾았어. 마왕도 함께냐. 이쪽으로 와라구, 저쪽 건너편까지 경주하자구!」"

[[dialogue]]
speaker = "ルリエル"
original = "「泳ぎっこ対決です！\u3000向こうにちょうどいい小岩が浮かんでいるので、あそこまでタッチして帰ってくるんですよ！」"
translation = "「수영 대결임다! 저쪽에 적당한 바위가 떠 있으니까, 저기까지 터치하고 돌아오는 거임다!」"

[[dialogue]]
speaker = "ソフィア"
original = "「競争……ですか」"
translation = "「경주…… 말인가요.」"

[[dialogue]]
speaker = "ソフィア"
original = "「……いえ。私はこちらでゆっくりしています」"
translation = "「……아뇨. 저는 여기서 느긋하게 있겠어요.」"

[[dialogue]]
speaker = "アポロ"
original = "「そーなのか？\u3000せっかくの海なのに寝そべってるだけって、退屈じゃねーか？」"
translation = "「그런 거냐? 기껏 바다에 왔는데 누워만 있는 건, 지루하지 않아?」"

[[dialogue]]
speaker = "ソフィア"
original = "「いいえ、まったく。何しろ私は大人の女性ですから……」"
translation = "「아니요, 전혀요. 무엇보다 저는 어른스러운 여성이니까요……」"

[[dialogue]]
speaker = "ソフィア"
original = "「むしろこうして緩やかに流れていく時間さえも、優雅に愉しめてしまうのですよ……ふふふ」"
translation = "「오히려 이렇게 완만하게 흘러가는 시간조차도, 우아하게 즐길 수 있는 법이랍니다…… 후후후.」"

[[dialogue]]
speaker = "ルリエル"
original = "「そうなんですか……？\u3000ま～、気が向いたらいつでも来てください」"
translation = "「그런 검까……? 뭐~, 마음 내키면 언제든 오세욤.」"

[[dialogue]]
speaker = "ルリエル"
original = "「泳ぎ対決が終わったら、一緒にバナナボートに乗るのです！\u3000でもって帰ってきたらスイカ割りですよ～！」"
translation = "「수영 대결이 끝나면, 같이 바나나 보트를 타는 검다! 그러고 나서 돌아오면 수박 깨기예요~!」"

[[dialogue]]
speaker = "ソフィア"
original = "「…………」"
translation = "「…………」"

[[dialogue]]
speaker = "unk"
original = "気になる？"
translation = "신경 쓰여?"

[[dialogue]]
speaker = "unk"
original = "行ったら？"
translation = "가보는 게 어때?"

[[dialogue]]
speaker = "ソフィア"
original = "「い、いえ！\u3000行きたいなどこれっぽっちも思っておりません。大人女子は泳ぎっこ勝負などしないのです」"
translation = "「아, 아니요! 가고 싶다니 요만큼도 생각하지 않고 있어요. 어른 여자는 수영 시합 같은 건 하지 않는 법이에요.」"

[[dialogue]]
speaker = "ソフィア"
original = "「スイカ割りやバナナボートではしゃぐなど、お子ちゃまです。大人女子はここで綺麗に肌を焼いたりするもので……」"
translation = "「수박 깨기나 바나나 보트로 들뜨는 건, 어린애들이나 하는 짓이죠. 어른 여자는 여기서 예쁘게 피부를 태우거나 하는 법이라……」"

[[dialogue]]
speaker = "ソフィア"
original = "「……スイカ割りしたくないのか、と？\u3000……それは……したくないと言えば、嘘になりますが……」"
translation = "「……수박 깨기 하고 싶지 않냐고요? ……그건…… 하고 싶지 않다고 하면, 거짓말이 되겠지만……」"

[[dialogue]]
speaker = "ソフィア"
original = "「それは──その……子どもっぽい、というか……」"
translation = "「그건── 그…… 아이 같다고나 할까……」"

[[dialogue]]
speaker = "unk"
original = "無理しなくていいよ"
translation = "무리하지 않아도 돼"

[[dialogue]]
speaker = "unk"
original = "だからってグラサンは"
translation = "그렇다고 선글라스는 좀"

[[dialogue]]
speaker = "ソフィア"
original = "「あぅ……そ、そうですか。無理していたこと──やはりあなたにはお見通しですよね。少し背伸びしすぎていたかもしれません……」"
translation = "「아으…… 그, 그런가요. 무리하고 있었다는 거── 역시 당신에게는 다 들통나 버렸네요. 조금 너무 무리해서 어른인 척했을지도 모르겠어요……」"

[[dialogue]]
speaker = "ソフィア"
original = "「せっかく寒さを逃れてリゾートに来たんですから、めいっぱい楽しまないと損ですよね。リップルさんもそう言う気がします」"
translation = "「기껏 추위를 피해 리조트에 왔으니까, 마음껏 즐기지 않으면 손해겠죠. 리플 씨도 그렇게 말할 것 같은 기분이 들어요.」"

[[dialogue]]
speaker = "ソフィア"
original = "「泳がずビーチでゆったり……も、悪くはありませんでしたが。今の私にはまだ早すぎるようです」"
translation = "「수영하지 않고 해변에서 느긋하게…… 도, 나쁘지는 않았지만. 지금의 저에게는 아직 너무 이른 것 같네요.」"

[[dialogue]]
speaker = "ソフィア"
original = "「……ん？\u3000いつも仕事にスケートに一生懸命で、大人っぽい一面も知ってる？」"
translation = "「……응? 평소에 일이나 스케이트에 열심이라서, 어른스러운 일면도 알고 있다고요?」"

[[dialogue]]
speaker = "ソフィア"
original = "「……も、もうっ。そういうところですよ。そんなことを真顔で言われるから──私もつい甘えてしまうんですから……」"
translation = "「……정, 정말이지. 그런 점이라니까요. 그런 말을 진지한 얼굴로 하시니까── 저도 그만 어리광을 부리게 되는 거잖아요……」"

[[dialogue]]
speaker = "ソフィア"
original = "「ふぅ……わかりました。無理をしていてもよくないですね。やっぱり、夏は楽しくありませんと♪」"
translation = "「후우…… 알겠어요. 무리하는 건 좋지 않네요. 역시, 여름은 즐거워야죠♪」"

[[dialogue]]
speaker = "ソフィア"
original = "「──よし。まだ２人とも浜辺にいますし──私も、あのお子ちゃま達に付き合ってあげるとしましょうか！」"
translation = "「──좋아. 아직 두 사람 다 해변에 있고── 저도, 저 어린애들 장단에 맞춰주기로 할까요!」"

[[dialogue]]
speaker = "unk"
original = "ソフィアはやる気になってパラソルの日陰から飛び出した。"
translation = "소피아는 의욕이 생겨 파라솔 그늘에서 뛰어 나갔다."

[[dialogue]]
speaker = "unk"
original = "どうやらバルーン持参のようだ。"
translation = "아무래도 튜브를 지참한 모양이다."

[[dialogue]]
speaker = "ソフィア"
original = "「あ、会長さんも泳ぎっこに参加ですからね。さあ、一緒に大海原へ漕ぎ出しましょう！」"
translation = "「아, 회장님도 수영 시합에 참가하는 거예요. 자, 함께 대양으로 저어 나가요!」"

