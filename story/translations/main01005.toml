[[dialogue]]
speaker = "unk"
original = "第７話,レゾフの冬,B"
translation = "제7화, 레조프의 겨울, B"

[[dialogue]]
speaker = "unk"
original = "南口の魔獣を討伐し、朝の鍛錬も終えた俺は──"
translation = "남쪽 출구의 마수를 토벌하고, 아침 단련도 마친 나는──"

[[dialogue]]
speaker = "unk"
original = "起きてきたみんなとも合流して、行動指針を決めることにした。"
translation = "일어난 모두와도 합류해서, 행동 지침을 정하기로 했다."

[[dialogue]]
speaker = "クロト"
original = "「──さて。改めておはよう、みんな」"
translation = "「──자. 다시 한번 안녕, 모두」"

[[dialogue]]
speaker = "フィオナ"
original = "「おはようございます。私たち……魔界で一晩を過ごしたのですね」"
translation = "「안녕하세요. 저희…… 마계에서 하룻밤을 보냈군요」"

[[dialogue]]
speaker = "ユウリ"
original = "「ま、なんか実感湧かないよな」"
translation = "「뭐, 뭔가 실감이 안 나네」"

[[dialogue]]
speaker = "マトイ"
original = "「うう……それにしても、朝は一段と冷え込むね」"
translation = "「으으…… 그나저나, 아침은 유난히 더 춥네」"

[[dialogue]]
speaker = "ソフィア"
original = "「うぐ……人間界ではありえなかったコールド具合……ぶるぶる……」"
translation = "「으윽…… 인간계에서는 있을 수 없었던 콜드함…… 부들부들……」"

[[dialogue]]
speaker = "ユウリ"
original = "「あたしが適当に火の玉でも召喚しといてやるよ。フィオナみたいに上手くコントロールはできねえけどな」"
translation = "「내가 적당히 불덩이라도 소환해 줄게. 피오나처럼 능숙하게 컨트롤은 못 하지만」"

[[dialogue]]
speaker = "サーシャ"
original = "「あら～助かるわね～」"
translation = "「어머～ 고맙네～」"

[[dialogue]]
speaker = "クロト"
original = "「確かに。これなら制服でも大丈夫そうだ」"
translation = "「확실히. 이 정도면 교복으로도 괜찮을 것 같다」"

[[dialogue]]
speaker = "unk"
original = "ユウリの生んでくれた火の玉は自在に周囲を泳ぎ、俺たちに適度な熱をもたらしてくれていた。星術のストーブだ。"
translation = "유우리가 만들어 준 불덩이는 자유자재로 주위를 헤엄치며, 우리에게 적당한 열을 가져다주고 있었다. 성술의 난로다."

[[dialogue]]
speaker = "ソフィア"
original = "「私と違って──フィオナ会長は変身すれば太陽の暑さを得られますから、大丈夫ですよね！」"
translation = "「저와 달리── 피오나 회장님은 변신하면 태양의 더위를 얻을 수 있으니, 괜찮으시겠죠!」"

[[dialogue]]
speaker = "フィオナ"
original = "「……そ、そうね……」"
translation = "「……그, 그렇겠지……」"

[[dialogue]]
speaker = "フィオナ"
original = "（でも……ここであの姿に変身するのは……さすがに目立ちすぎるというか……）"
translation = "（하지만…… 여기서 그 모습으로 변신하는 건…… 아무래도 너무 눈에 띈다고 할까……）"

[[dialogue]]
speaker = "ニャリオン"
original = "「──よくやったニャ、ユウリ！\u3000これでワガハイも外を覗けるというものだニャン！」"
translation = "「──잘했다 냥, 유우리! 이걸로 나도 밖을 엿볼 수 있다는 거다 냥!」"

[[dialogue]]
speaker = "ユウリ"
original = "「うお、アホ猫！？\u3000いたのかよ」"
translation = "「우왓, 바보 고양이!? 있었냐」"

[[dialogue]]
speaker = "ニャリオン"
original = "「いたに決まってるニャン！\u3000ワガハイは寒いのが苦手ニャンから、顔も出せなかっただけニャンよ！」"
translation = "「있었음에 틀림없다 냥! 나 님은 추위가 싫다 냥이니까, 얼굴도 못 내밀었을 뿐이다 냥!」"

[[dialogue]]
speaker = "フィオナ"
original = "「猫はこたつで丸くなると言いますからね」"
translation = "「고양이는 화로에서 웅크린다고 하니까요」"

[[dialogue]]
speaker = "ソフィア"
original = "「別に丸まってくれたままでもよかったですが」"
translation = "「딱히 웅크리고 있어도 괜찮았지만요」"

[[dialogue]]
speaker = "ニャリオン"
original = "「こ、心のほうも寒すぎるニャン……！？」"
translation = "「흐, 마음 쪽도 너무 춥다 냥……!?」"

[[dialogue]]
speaker = "クロト"
original = "「俺は待ってたよ、ニャリオン」"
translation = "「나는 기다리고 있었어, 냐리온」"

[[dialogue]]
speaker = "unk"
original = "ともかくも──これで６人＋１匹の体制となった。ところで。"
translation = "어쨌든── 이걸로 6명 + 1마리의 체제가 되었다. 그런데."

[[dialogue]]
speaker = "フィオナ"
original = "「──こほん。それでは、今日の行動指針を立てましょうか」"
translation = "「──크흠. 그러면, 오늘의 행동 지침을 세우도록 하죠」"

[[dialogue]]
speaker = "ユウリ"
original = "「だな。ヴィーナス捜索──のんびりしてる暇はねえ」"
translation = "「그렇지. 비너스 수색── 느긋하게 있을 틈은 없어」"

[[dialogue]]
speaker = "マトイ"
original = "「アニマ先輩のアンテナはどうだったの？\u3000緋宮くん」"
translation = "「아니마 선배의 안테나는 어땠어? 히노미야 군」"

[[dialogue]]
speaker = "クロト"
original = "「ダメだった。やっぱり──そう簡単には辿らせてくれない」"
translation = "「안 됐어. 역시── 그렇게 쉽게는 따라잡게 해 주지 않아」"

[[dialogue]]
speaker = "フィオナ"
original = "「敵は霊力の使い手……何かしらのバリアが施されているのか。それとも……」"
translation = "「적은 영력의 사용자…… 뭔가 배리어가 설치되어 있는 건가. 아니면……」"

[[dialogue]]
speaker = "unk"
original = "広大な魔界には対応しきれていないのかもしれない。"
translation = "광대한 마계에는 대응하지 못하고 있을지도 모른다."

[[dialogue]]
speaker = "unk"
original = "いずれにせよ、イージーな手段はなくなった。"
translation = "어쨌든, 쉬운 수단은 사라졌다."

[[dialogue]]
speaker = "フィオナ"
original = "「私も──ソフィア、サーシャさんの力を借りて、改めて周囲の方に説明はしておきました。私たちは人探しのために滞留していると」"
translation = "「저도── 소피아, 사샤 씨의 힘을 빌려, 다시 한번 주변 분들에게 설명은 해 두었습니다. 저희는 사람을 찾기 위해 머물고 있다고」"

[[dialogue]]
speaker = "サーシャ"
original = "「ええ。それとヴィーナスちゃんや、黒い騎士さんについても、それとなく探ってみたのだけど……」"
translation = "「응. 그리고 비너스짱이나, 검은 기사 씨에 대해서도, 은근슬쩍 찾아봤는데……」"

[[dialogue]]
speaker = "フィオナ"
original = "「……有力な情報は得られませんでしたね」"
translation = "「……유력한 정보는 얻지 못했네요」"

[[dialogue]]
speaker = "クロト"
original = "「……仕方ないか」"
translation = "「……어쩔 수 없나」"

[[dialogue]]
speaker = "unk"
original = "魔界にいる──と判明したのが昨日。"
translation = "마계에 있다는 것이 어제 판명되었다."

[[dialogue]]
speaker = "unk"
original = "さすがに、こちらへ着いて最初の都市で手がかりが掴めるほど甘くはないか。"
translation = "역시, 여기에 도착해서 첫 도시에서 단서를 잡을 만큼 만만하지는 않은가."

[[dialogue]]
speaker = "unk"
original = "と、そこへ……"
translation = "그때, 그곳에……"

[[dialogue]]
speaker = "レゾフの住人"
original = "「──おぉい。ちょっとあんたら、どいてくれ」"
translation = "「──어이. 잠깐 당신들, 비켜줘」"

[[dialogue]]
speaker = "クロト"
original = "「おっと──すみません。こちらでいいですか」"
translation = "「이런── 죄송합니다. 여기로 괜찮습니까」"

[[dialogue]]
speaker = "レゾフの住人"
original = "「んにゃ、もうちょっと向こうで頼む。そこは防風網を設置する予定なんだ」"
translation = "「아니, 좀 더 저쪽으로 부탁해. 거기는 방풍망을 설치할 예정이야」"

[[dialogue]]
speaker = "レゾフの住人"
original = "「それから街の外周はどこも雪囲いが配備されるからな──もっと中心に行っといてくれ」"
translation = "「그리고 마을 외곽은 어디든 눈 가림막이 배치될 테니── 더 중심부로 가 있어 줘」"

[[dialogue]]
speaker = "unk"
original = "通行人の方に促され、俺たちは街路の外れから中央の広場へと移動する。"
translation = "통행인의 재촉을 받아, 우리들은 가로변에서 중앙 광장으로 이동한다."

[[dialogue]]
speaker = "マトイ"
original = "「すみっこのほうが邪魔にならないかと思ったんだけど……違ったのかな？」"
translation = "「구석이 방해되지 않을까 했는데…… 달랐나?」"

[[dialogue]]
speaker = "ユウリ"
original = "「つうか、防風網ってなんだ？\u3000さっきからネットを持った連中を見かけるけど……」"
translation = "「랄까, 방풍망이 뭐야? 아까부터 그물망을 든 사람들을 보는데……」"

[[dialogue]]
speaker = "クロト"
original = "「確かに──なんだか慌ただしいな」"
translation = "「확실히── 뭔가 분주하군」"

[[dialogue]]
speaker = "unk"
original = "起床してきて行き交う人々も、何やら忙しく動き回っている様子だった。"
translation = "기상해서 오가는 사람들도, 뭔가 바쁘게 움직이고 있는 모습이었다."

[[dialogue]]
speaker = "ソフィア"
original = "「……そっか。今の時期は……」"
translation = "「……그렇구나. 지금 시기는……」"

[[dialogue]]
speaker = "サーシャ"
original = "「ええ。ちょうど──大いなる冬が近づいているから」"
translation = "「네. 마침── 대자연의 겨울이 다가오고 있으니까요」"

[[dialogue]]
speaker = "フィオナ"
original = "「……？\u3000大いなる冬……？」"
translation = "「……? 대자연의 겨울……?」"

[[dialogue]]
speaker = "クロト"
original = "「そういえばその単語──さっき、旅人を名乗る人からも聞いたな」"
translation = "「그러고 보니 그 단어── 아까, 여행자라고 자칭하는 사람에게서도 들었지」"

[[dialogue]]
speaker = "？？？"
original = "「もうじき、大いなる冬も訪れる──ここは嵐の渦中になるだろうからね」"
translation = "「이제 곧, 대자연의 겨울도 찾아올 테니── 이곳은 폭풍의 소용돌이가 될 테니까」"

[[dialogue]]
speaker = "unk"
original = "あの人特有の言い回しかと思っていたが、どうやらレゾフの地に根付いた単語らしかった。"
translation = "그 사람 특유의 말투인가 했더니, 아무래도 레조프 땅에 뿌리내린 단어인 듯했다."

[[dialogue]]
speaker = "ユウリ"
original = "「要するに、このクソ寒い気候のことか？」"
translation = "「요컨대, 이 빌어먹을 추운 기후를 말하는 건가?」"

[[dialogue]]
speaker = "ソフィア"
original = "「いいえ、違います。この寒さは至って通常の気温です。憎らしいことに」"
translation = "「아뇨, 다릅니다. 이 추위는 지극히 통상적인 기온입니다. 얄밉게도」"

[[dialogue]]
speaker = "ソフィア"
original = "「『大いなる冬』が来たら──レゾフはこの何倍、何十倍という冷気に覆われることになります」"
translation = "「『대자연의 겨울』이 오면── 레조프는 이 몇 배, 몇십 배의 냉기에 뒤덮이게 됩니다」"

[[dialogue]]
speaker = "マトイ"
original = "「……！？」"
translation = "「……!?」"

[[dialogue]]
speaker = "ニャリオン"
original = "「そ、想像しただけで身震いするニャン……！」"
translation = "「서, 상상만 해도 몸서리가 쳐진다 냥……!」"

[[dialogue]]
speaker = "クロト"
original = "「つまり街の人たちがバタバタしているのも……そのせいだと？」"
translation = "「즉 마을 사람들이 분주하게 움직이는 것도…… 그 때문이라고?」"

[[dialogue]]
speaker = "ソフィア"
original = "「はい。少々、時期が悪かったかもしれません」"
translation = "「네. 조금, 시기가 안 좋았을지도 모릅니다」"

[[dialogue]]
speaker = "ユウリ"
original = "「ツイてねえな。色々聞きたいことはあるってのに……」"
translation = "「운이 없네. 여러 가지 묻고 싶은 게 있는데도……」"

[[dialogue]]
speaker = "unk"
original = "リタおばさんも去り際、俺に対して『こんな時期に災難』と発していた。"
translation = "리타 아줌마도 떠날 때, 나에게 『이런 시기에 재난』이라고 말했었다."

[[dialogue]]
speaker = "unk"
original = "恐らくレゾフの人々にとっての常識なのだろう。"
translation = "아마 레조프 사람들에게는 상식일 것이다."

[[dialogue]]
speaker = "クロト"
original = "「……サーシャ先輩。もう少し詳しく聞かせてもらってもいいですか？」"
translation = "「……사샤 선배. 좀 더 자세히 들려주실 수 있습니까?」"

[[dialogue]]
speaker = "サーシャ"
original = "「ええ。これは、そうね……人間界でいうと梅雨や台風みたいな、季節柄の災害ってことになるかしら」"
translation = "「응. 이건, 그렇네…… 인간계로 치면 장마나 태풍 같은, 계절적인 재해라고 할 수 있을까」"

[[dialogue]]
speaker = "unk"
original = "サーシャ先輩はそう前置きして、語り始めた。"
translation = "사샤 선배는 그렇게 전제하고, 이야기를 시작했다."

[[dialogue]]
speaker = "サーシャ"
original = "「大いなる冬──それは、一年に一度、魔界全体を巻き込んで訪れる大寒波のこと」"
translation = "「대자연의 겨울── 그것은, 일 년에 한 번, 마계 전체를 휘감으며 찾아오는 대형 한파를 말해」"

[[dialogue]]
speaker = "サーシャ"
original = "「そして……レゾフは魔界の中でも元々極寒の地域。大いなる冬は、毎年、都市の存続を脅かすほどの災害になるわ」"
translation = "「그리고…… 레조프는 마계 중에서도 원래 극도의 한랭 지역. 대자연의 겨울은, 매년, 도시의 존속을 위협할 정도의 재해가 돼」"

[[dialogue]]
speaker = "サーシャ"
original = "「これは、ただ寒いとか乾燥するとかとは、訳が違うの。その日に訪れる猛吹雪は──文字通り何もかもを凍りつかせる」"
translation = "「이것은, 단순히 춥다거나 건조하다거나 하는 것과는, 차원이 달라. 그날 찾아오는 맹렬한 눈보라는── 문자 그대로 모든 것을 얼어붙게 해」"

[[dialogue]]
speaker = "サーシャ"
original = "「それこそ魔獣も、モンスターも、アステライトだって。あらゆる自然が完全に凍結して……活動を停止しちゃうくらい」"
translation = "「그야말로 마수도, 몬스터도, 아스테라이트까지도. 모든 자연이 완전히 동결해서…… 활동을 멈춰버릴 정도」"

[[dialogue]]
speaker = "フィオナ"
original = "「アステラが──凍りつく……？」"
translation = "「아스테라가── 얼어붙는다고……?」"

[[dialogue]]
speaker = "クロト"
original = "「信じられないな──どんな氷の星術でも、そこまでの所業はできないはずだ」"
translation = "「믿을 수 없군── 어떤 얼음 성술로도, 그 정도의 소행은 할 수 없을 텐데」"

[[dialogue]]
speaker = "ユウリ"
original = "「けど、それが魔界の天災ってことか……」"
translation = "「하지만, 그게 마계의 천재라는 건가……」"

[[dialogue]]
speaker = "unk"
original = "人間界では起こり得ないほどの、滅亡級の大寒波──"
translation = "인간계에서는 일어날 수 없을 정도의, 멸망급의 대형 한파──"

[[dialogue]]
speaker = "unk"
original = "それが魔界における『大いなる冬』ということだった。"
translation = "그것이 마계에서의 『대자연의 겨울』이라는 것이었다."

[[dialogue]]
speaker = "マトイ"
original = "「あ！\u3000それってもしかして──去年にサーシャさんが話してくれたやつ？」"
translation = "「아! 그거 혹시── 작년에 사샤 씨가 이야기해 줬던 거?」"

[[dialogue]]
speaker = "サーシャ"
original = "「そうそう～♪\u3000よく覚えててくれたわねー、マトイちゃん」"
translation = "「맞아 맞아～♪ 잘 기억해 줬네～, 마토이짱」"

[[dialogue]]
speaker = "ソフィア"
original = "「レゾフに住んでいたなら──この時期は死活問題ですから」"
translation = "「레조프에 살았다면── 이 시기는 사활이 걸린 문제니까요」"

[[dialogue]]
speaker = "ソフィア"
original = "「事前に地下に避難したり、屋根を特殊な革で覆ったり……あらゆる手立てを講じておくのが風習となっています」"
translation = "「사전에 지하로 피난하거나, 지붕을 특수한 가죽으로 덮거나…… 모든 수단을 강구해 두는 것이 풍습이 되어 있습니다」"

[[dialogue]]
speaker = "ニャリオン"
original = "「リクリエ以外にも、けったいな災厄があったものニャンねえ」"
translation = "「리크리에 말고도, 괴상한 재앙이 있었던 거다 냥」"

[[dialogue]]
speaker = "マトイ"
original = "「私たちもここにいたら、対応しなくちゃいけない……？」"
translation = "「우리도 여기에 있으면, 대응해야 하는 거야……?」"

[[dialogue]]
speaker = "ユウリ"
original = "「話を聞く限り、あたしなら力になれそうだが──」"
translation = "「이야기를 듣는 한, 나라면 힘이 될 수 있겠지만──」"

[[dialogue]]
speaker = "unk"
original = "皆が天災に思いを巡らせる──その時だ。"
translation = "모두가 천재에 대해 생각할 때── 그때다."

[[dialogue]]
speaker = "クロト"
original = "「──『冬』だ」"
translation = "「──『겨울』이다」"

[[dialogue]]
speaker = "ユウリ"
original = "「？\u3000ああ、大いなる冬……」"
translation = "「? 아아, 대자연의 겨울……」"

[[dialogue]]
speaker = "クロト"
original = "「違う。ヴィーナスのメッセージにあった『冬』──あれも、同じものを指してると考えられないか？」"
translation = "「아니. 비너스의 메시지에 있던 『겨울』── 그것도, 같은 것을 가리키고 있다고 생각할 수 있지 않을까?」"

[[dialogue]]
speaker = "マトイ"
original = "「！」"
translation = "「!」"

[[dialogue]]
speaker = "フィオナ"
original = "「……今の気候はあくまで平常。ですが、数日後には明確な『冬』が訪れる。そういうことですね」"
translation = "「……지금의 기후는 어디까지나 평상. 하지만, 며칠 후에는 명확한 『겨울』이 찾아온다. 그런 것이군요」"

[[dialogue]]
speaker = "unk"
original = "『冬』『森』『来て』──"
translation = "『겨울』 『숲』 『와』──"

[[dialogue]]
speaker = "unk"
original = "魔界を降りた俺たちに与えられた『いつ』『どこで』『何を』のメッセージ。"
translation = "마계에 내려온 우리에게 주어진 『언제』 『어디서』 『무엇을』의 메시지."

[[dialogue]]
speaker = "unk"
original = "中でも『冬』という時機に関しては、あまりに大ざっぱすぎる指定なのが疑問だったが……"
translation = "그중에서도 『겨울』이라는 시기에 관해서는, 너무나 대략적인 지정이라 의문이었지만……"

[[dialogue]]
speaker = "サーシャ"
original = "「自然な解釈ね。魔界における『冬』は特別な言葉──ヴィーナスちゃんがそう言っていてもおかしくないわ」"
translation = "「자연스러운 해석이네. 마계에서 『겨울』은 특별한 말── 비너스짱이 그렇게 말했어도 이상하지 않아」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスが魔界の風土に詳しいとは思えないが──"
translation = "비너스가 마계의 풍토에 자세하다고는 생각되지 않지만──"

[[dialogue]]
speaker = "unk"
original = "マトイと同様にサーシャ先輩の話を覚えていたなら、短いワードで『いつ』を伝える言葉に選んだ可能性はある。"
translation = "마토이와 마찬가지로 사샤 선배의 이야기를 기억하고 있었다면, 짧은 단어로 『언제』를 전하는 말로 선택했을 가능성은 있다."

[[dialogue]]
speaker = "ニャリオン"
original = "「ってことは──何ニャン？\u3000あの娘はその大変な『冬』に来いと言ってるのかニャン？」"
translation = "「그렇다면── 뭐다 냥? 그 아가씨는 그 힘든 『겨울』에 오라고 말하는 거다 냥?」"

[[dialogue]]
speaker = "クロト"
original = "「そうなるな」"
translation = "「그렇게 되겠지」"

[[dialogue]]
speaker = "マトイ"
original = "「で、でも……何もかも凍りついちゃうくらいの、すごい吹雪になるんでしょ？」"
translation = "「그, 그렇지만…… 모든 것이 얼어붙을 정도의, 엄청난 눈보라가 오는 거잖아?」"

[[dialogue]]
speaker = "サーシャ"
original = "「ええ。出歩くなんて考えられない──人どころか魔獣も凍っちゃうくらいの、とんでもない災いよ」"
translation = "「응. 돌아다니는 건 생각할 수 없어── 사람뿐만 아니라 마수도 얼어버릴 정도의, 엄청난 재앙이야」"

[[dialogue]]
speaker = "ニャリオン"
original = "「や、やばすぎるニャン……！？」"
translation = "「위, 위험하다 냥……!?」"

[[dialogue]]
speaker = "フィオナ"
original = "「ですが、あのヴィーナスさんがそれを望んだ──」"
translation = "「하지만, 그 비너스 씨가 그것을 바랐다면──」"

[[dialogue]]
speaker = "サーシャ"
original = "「ええ。もしかしたら、何か狙いがあるのかも。ふふ……ヴィーナスちゃんらしいじゃない」"
translation = "「응. 어쩌면, 뭔가 노림수가 있을지도. 후후…… 비너스짱답잖아」"

[[dialogue]]
speaker = "ユウリ"
original = "「はっ。確かにな」"
translation = "「핫. 확실히 그렇군」"

[[dialogue]]
speaker = "unk"
original = "ヴィーナスからのメッセージは──つまり言ってしまえば<b>無茶振り</b>だ。"
translation = "비너스에게서 온 메시지는── 즉, 말하자면 <b>억지</b>다."

[[dialogue]]
speaker = "unk"
original = "だが、彼女からの強引な指示はむしろ<b>らしい</b>と思えて、俺たちはニヤリとほくそ笑むのだった。"
translation = "하지만, 그녀의 강압적인 지시는 오히려 <b>그녀답다</b>고 느껴져, 우리는 씨익 웃는 것이었다."

[[dialogue]]
speaker = "クロト"
original = "「そして『大いなる冬』が訪れるのは……」"
translation = "「그리고 『대자연의 겨울』이 찾아오는 것은……」"

[[dialogue]]
speaker = "ソフィア"
original = "「恐らく数日後になるだろうと、リタおばさんは言っていました」"
translation = "「아마도 며칠 후가 될 거라고, 리타 아줌마는 말했어요」"

[[dialogue]]
speaker = "unk"
original = "それまではヴィーナスに耐えてもらうしかない──"
translation = "그때까지는 비너스가 버텨줘야만 한다──"

[[dialogue]]
speaker = "unk"
original = "が、彼女が打ち立てた目標日だ。恐らく勝算があるのだろう。"
translation = "하지만, 그녀가 세운 목표일이다. 아마도 승산이 있을 것이다."

[[dialogue]]
speaker = "クロト"
original = "「これに気づけただけでも大きな進歩だ──後はその当日にも、動ける状態にしておくこと」"
translation = "「이것을 알아낸 것만으로도 큰 진전이다── 나머지는 그 당일에도, 움직일 수 있는 상태로 만들어 두는 것」"

[[dialogue]]
speaker = "フィオナ"
original = "「準備が必要ですね。それほどの天災なら」"
translation = "「준비가 필요하겠네요. 그 정도의 천재지변이라면」"

[[dialogue]]
speaker = "ユウリ"
original = "「んで、ヴィーナスがどこにいるか──か。いいぜ、近づいてきたじゃねえか」"
translation = "「그래서, 비너스가 어디에 있는지──인가. 좋아, 가까워졌잖아」"

[[dialogue]]
speaker = "マトイ"
original = "「よ、よし……私もできること頑張るよ！」"
translation = "「조, 좋아…… 나도 할 수 있는 거 열심히 할게!」"

