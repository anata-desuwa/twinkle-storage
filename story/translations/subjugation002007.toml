[[dialogue]]
speaker = "チョコッチ"
original = "「イ～～～ト～～～ッ！！」"
translation = "「이~~~토~~~!!」"

[[dialogue]]
speaker = "女子生徒"
original = "「みんな、変身よ！\u3000チョコを守らないと……！」"
translation = "「모두 변신이야! 초코를 지켜야 해……!」"

[[dialogue]]
speaker = "チョコッチ"
original = "「イ～～～～トォオォ！！」"
translation = "「이~~~~토오오!!」"

[[dialogue]]
speaker = "女子生徒"
original = "「きゃあぁっ！？\u3000こいつ……すごく強いわ！\u3000気を付けて！」"
translation = "「꺄악!? 이 녀석…… 굉장히 강해! 조심해!」"

[[dialogue]]
speaker = "ルリエル"
original = "「バレンタインイベントを台無しにはさせません！\u3000エールホルンッ──今です、セーラ先輩！」"
translation = "「밸런타인 이벤트를 망치게 두지 않겠어욧! 에일 호른── 지금이에욧, 세라 선배!」"

[[dialogue]]
speaker = "セーラ"
original = "「オッケー、ルリちー！\u3000クライマックスボルト！！」"
translation = "「오케이, 루리치! 클라이맥스 볼트!!」"

[[dialogue]]
speaker = "チョコッチ"
original = "「イ～～～ト～～～ッ！！」"
translation = "「이~~~토~~~!!」"

[[dialogue]]
speaker = "unk"
original = "むしゃむしゃむしゃ……！！"
translation = "우걱우걱우걱……!!"

[[dialogue]]
speaker = "ルリエル"
original = "「感電してるのにチョコ食べるのやめないんですけどー！？\u3000化け物すぎます～！！」"
translation = "「감전되고 있는데 초코 먹는 걸 멈추지 않는데욧!? 너무 괴물 같아욧!!」"

[[dialogue]]
speaker = "セーラ"
original = "「食い意地、張りすぎでしょ！？\u3000ルリちー以上じゃん……！」"
translation = "「식탐이 너무 과한 거 아냐!? 루리치 이상이잖아……!」"

[[dialogue]]
speaker = "ルリエル"
original = "「流れ弾はやめてください！！」"
translation = "「심부름센터 같은 소리는 하지 마세욧!!」"

[[dialogue]]
speaker = "チョコッチ"
original = "「イ～～～ト～～～ッ！！」"
translation = "「이~~~토~~~!!」"

[[dialogue]]
speaker = "unk"
original = "手下を呼び出した！？"
translation = "부하를 불러냈다!?"

[[dialogue]]
speaker = "フワッチ"
original = "「イ～っ！！」"
translation = "「이~!!」"

[[dialogue]]
speaker = "フワッチ"
original = "「イ～～～っ！！」"
translation = "「이~~~!!」"

[[dialogue]]
speaker = "ルリエル"
original = "「わーん！\u3000カフェ中のチョコが盗られていってます～！？」"
translation = "「와앙! 카페 안의 초코가 다 도둑맞고 있어욧~!?」"

[[dialogue]]
speaker = "ジュエリー"
original = "「数が多い……あっ！\u3000ま、待ちたまえ！\u3000それは助手に渡す予定のチョコで……！」"
translation = "「수가 많아…… 앗! 기, 기다려! 그건 조수에게 줄 예정인 초코라서……!」"

[[dialogue]]
speaker = "フワッチ"
original = "「イ～～～～っ♪」"
translation = "「이~~~~♪」"

[[dialogue]]
speaker = "ジュエリー"
original = "「カフェテリア中のチョコレートを、あの親玉のところへ運んでいる……！？\u3000ということは、奴はまだパワーアップを！？」"
translation = "「카페테리아 안의 초콜릿을 저 우두머리에게 운반하고 있어……!? 그렇다는 건 놈은 아직 파워 업을!?」"

[[dialogue]]
speaker = "チョコッチ"
original = "「イ～～～ト～～～♪」"
translation = "「이~~~토~~~♪」"

[[dialogue]]
speaker = "unk"
original = "むしゃむしゃむしゃ……！！"
translation = "우걱우걱우걱……!!"

[[dialogue]]
speaker = "unk"
original = "なんてひどいやつだ……！！"
translation = "정말 너무한 녀석이다……!!"

[[dialogue]]
speaker = "ウズメイア"
original = "「行こう、シャルレーヌちゃん！\u3000乙女の敵、許しておけないしっ！」"
translation = "「가자, 샤를레느짱! 소녀의 적, 용서할 수 없다구!」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「ええ、行儀作法を教えてあげましょう！」"
translation = "「네, 예절 교육을 시켜주죠!」"

[[dialogue]]
speaker = "ウズメイア"
original = "「手加減しないしっ──愛の<ruby>薙<rt>な</rt></ruby>ぎ<ruby>傘<rt>がさ</rt></ruby>っ！」"
translation = "「봐주지 않겠다구── 사랑의 치도산!」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「痛くないと覚えないわよね──グルマンホイッパー！」"
translation = "「아프지 않으면 배우질 못하겠지── 구르망 휘퍼!」"

[[dialogue]]
speaker = "チョコッチ"
original = "「イ～～～ト～～～～♪」"
translation = "「이~~~토~~~~♪」"

[[dialogue]]
speaker = "unk"
original = "もしゃもしゃもしゃ……！！"
translation = "쩝쩝쩝쩝……!!"

[[dialogue]]
speaker = "ウズメイア"
original = "「なにこの防御力……コイツ、頑丈すぎ！！」"
translation = "「뭐야 이 방어력…… 이 녀석, 너무 튼튼해!!」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「このっ！\u3000泥棒してた時から私のことを無視ばかり……！\u3000どこまで舐めれば気がすむのかしら！？」"
translation = "「이게! 도둑질하던 때부터 나를 무시하기만 하고……! 어디까지 얕봐야 속이 풀리겠어!?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「どうしよう、会長くん！？\u3000ジュエリーさんの推測どおり、チョコを食べるたびにどんどん強くなってるし……！？」"
translation = "「어떡하지, 회장군!? 주얼리 씨의 추측대로, 초코를 먹을 때마다 점점 강해지고 있어……!?」"

[[dialogue]]
speaker = "unk"
original = "奴の弱点は──そうか！"
translation = "놈의 약점은── 그렇군!"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「何か名案を閃いたみたいね。聞かせなさい！」"
translation = "「뭔가 명안이 떠오른 모양이네. 들려주렴!」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「あのチョコを使う？\u3000──ああ、そういうこと♪\u3000くふっ、面白いこと考えるじゃない」"
translation = "「그 초코를 쓴다고? ──아아, 그런 거구나♪ 크훕, 재미있는 생각을 하잖아」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「甘党な敵をお仕置きするには、ちょうどいいサプライズね。乗ってあげるわ！」"
translation = "「단것을 밝히는 적을 벌하기에는, 딱 좋은 서프라이즈네. 동참해 주겠어!」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「きゃ～、許して～♪\u3000シャルレーヌの大切なチョコ、取られちゃう～♪」"
translation = "「꺄~, 살려줘~♪ 샤를레느의 소중한 초코, 빼앗겨버려~♪」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「これだけはダメなの～、大好きな会長さんへの本命チョコなの～っ♪\u3000やめてー、取らないで～っ♪」"
translation = "「이것만은 안 돼~, 정말 좋아하는 회장님을 향한 진심 초코란 말야~♪ 하지 마, 가져가지 마~♪」"

[[dialogue]]
speaker = "フワッチ"
original = "「イーーーッ！！」"
translation = "「이이이잇!!」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「くふふっ<emoji=heart04>\u3000ひったくるみたいにして持って行って……落とさずに、しっかりと主人のところまで運びなさい？」"
translation = "「크후훗<emoji=heart04> 낚아채듯 가져가서는…… 떨어뜨리지 말고, 확실하게 주인에게까지 운반하도록 해?」"

[[dialogue]]
speaker = "チョコッチ"
original = "「イ～～～～ト～～～～～♪」"
translation = "「이~~~~토~~~~♪」"

[[dialogue]]
speaker = "ウズメイア"
original = "「ああっ……シャルレーヌちゃんのチョコも食べられちゃってる……渡しちゃって良かったの！？」"
translation = "「아앗…… 샤를레느짱의 초코도 먹혀버리고 있어…… 건네줘도 괜찮았던 거야!?」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「ええ。作戦は成功です。あのチョコは昨日作っていたやつです」"
translation = "「네. 작전은 성공이에요. 저 초코는 어제 만들었던 거예요.」"

[[dialogue]]
speaker = "ウズメイア"
original = "「……ってことは？」"
translation = "「……그렇다는 건?」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「くふふっ<emoji=heart04>\u3000そのおっきなお口なら、１口かじってポイはできないでしょう？」"
translation = "「크후훗<emoji=heart04> 그 커다란 입이라면, 한 입 베어 물고 버리지는 못하겠지?」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「しっかり最後までゴックンしなさい──シャルレーヌ様特製の激辛チョコをねっ！」"
translation = "「확실하게 마지막까지 꿀꺽하렴── 샤를레느 님 특제의 초강력 매운맛 초코를 말이야!」"

[[dialogue]]
speaker = "チョコッチ"
original = "「イ～～～……トォォォオッ！？」"
translation = "「이~~~…… 토오오오옷!?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「わ、わ～お……びったんびったん悶えまくってる！\u3000甘党のモンスターに激辛チョコ……効果抜群だし！！」"
translation = "「와, 와~우…… 파닥파닥대며 엄청 괴로워하고 있어! 단걸 좋아하는 몬스터에게 매운 초코…… 효과 직빵인데!!」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「キャハハハっ<emoji=heart04>\u3000ちょっと食べただけでもんどりうつなんて～……よっわぁ～いっ<emoji=heart04>\u3000恥ずかしくないんですかぁ～？」"
translation = "「캬하하하<emoji=heart04> 조금 먹었다고 몸부림치다니~…… 허~접~해~<emoji=heart04> 부끄럽지도 않나요~?」"

[[dialogue]]
speaker = "ウズメイア"
original = "「今がチャンスってことだね！\u3000畳みかけるし、シャルレーヌちゃん！」"
translation = "「지금이 기회라는 거네! 몰아붙이자구, 샤를레느짱!」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「ええ、ウズメイア先輩！\u3000会長さんもついて来なさいっ！」"
translation = "「네, 우즈메이야 선배! 회장님도 따라오세요!」"

[[dialogue]]
speaker = "unk"
original = "バレンタインの平和は俺たちが守る！！"
translation = "발렌타인의 평화는 우리가 지킨다!!"

[[dialogue]]
speaker = "ウズメイア"
original = "「全力で薙ぎ払っちゃうし──愛菓繚乱っ！」"
translation = "「전력으로 쓸어버리겠다구── 애과요란!」"

[[dialogue]]
speaker = "シャルレーヌ"
original = "「辛～いチョコのおかわりよ──スパイスアップ・オペラ！」"
translation = "「매~운 초코 리필이야── 스파이스 업 오페라!」"

