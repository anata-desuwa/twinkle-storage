[[dialogue]]
speaker = "unk"
# 第２話,深淵より来たる炎,P
line = "第２話,深淵より来たる炎,P"

[[dialogue]]
speaker = "unk"
# リィベルと共に戦った翌日、彼女を訪ねに図書館へ向かった。
line = "リィベルと共に戦った翌日、彼女を訪ねに図書館へ向かった。"

[[dialogue]]
speaker = "リィベル"
# 「あら、魔王じゃない。何か用？　本の貸出？　それとも返却かしら」
line = "「あら、魔王じゃない。何か用？　本の貸出？　それとも返却かしら」"

[[dialogue]]
speaker = "unk"
# 昨日はありがとう
line = "昨日はありがとう"

[[dialogue]]
speaker = "リィベル"
# 「は？　礼を言われるようなことはしていないはずだけど」
line = "「は？　礼を言われるようなことはしていないはずだけど」"

[[dialogue]]
speaker = "リィベル"
# 「……誰より早く駆け付けてモンスターを倒した？　それはそうだけど……はぁ」
line = "「……誰より早く駆け付けてモンスターを倒した？　それはそうだけど……はぁ」"

[[dialogue]]
speaker = "リィベル"
# 「ちょっと来なさい」
line = "「ちょっと来なさい」"

[[dialogue]]
speaker = "リィベル"
# 「ここは『深淵書庫』。あなたもここに来たことはあったわよね」
line = "「ここは『深淵書庫』。あなたもここに来たことはあったわよね」"

[[dialogue]]
speaker = "リィベル"
# 「書架に並ぶ本たちは、幾度も繰り返されてきたリクリエで滅ぼされた魔族たちの怨念と無念を宿したもの」
line = "「書架に並ぶ本たちは、幾度も繰り返されてきたリクリエで滅ぼされた魔族たちの怨念と無念を宿したもの」"

[[dialogue]]
speaker = "unk"
# 怨念と無念……
line = "怨念と無念……"

[[dialogue]]
speaker = "リィベル"
# 「そうよ。リクリエによって世界が滅びる瞬間を、想像したことはあるかしら？」
line = "「そうよ。リクリエによって世界が滅びる瞬間を、想像したことはあるかしら？」"

[[dialogue]]
speaker = "リィベル"
# 「友と笑い合う者がいた。家族と穏やかな時を過ごす者もいた。熟達した技を使って生計を立てる者もいた」
line = "「友と笑い合う者がいた。家族と穏やかな時を過ごす者もいた。熟達した技を使って生計を立てる者もいた」"

[[dialogue]]
speaker = "リィベル"
# 「そんな営みが、<ruby=リクリエ>厄災</ruby>によって無に帰す。その恨みを理解できる？　まぁ、理解する必要はないし、理解してほしいわけでもないけれど」
line = "「そんな営みが、<ruby>厄災<rt>リクリエ</rt></ruby>によって無に帰す。その恨みを理解できる？　まぁ、理解する必要はないし、理解してほしいわけでもないけれど」"

[[dialogue]]
speaker = "リィベル"
# 「ここの本たちはそんなリクリエへの怒りと憎しみで満ちている。そしてその怨嗟は呪いとなる」
line = "「ここの本たちはそんなリクリエへの怒りと憎しみで満ちている。そしてその怨嗟は呪いとなる」"

[[dialogue]]
speaker = "リィベル"
# 「つまり、この書庫は呪いでできているのよ。そして、私自身も」
line = "「つまり、この書庫は呪いでできているのよ。そして、私自身も」"

[[dialogue]]
speaker = "リィベル"
# 「魔本たちがリクリエと戦うのは、魔族たちの無念を晴らすため」
line = "「魔本たちがリクリエと戦うのは、魔族たちの無念を晴らすため」"

[[dialogue]]
speaker = "リィベル"
# 「復讐は自分の手で遂げてこそ意味がある」
line = "「復讐は自分の手で遂げてこそ意味がある」"

[[dialogue]]
speaker = "リィベル"
# 「だから、あなたと慣れ合うつもりはない」
line = "「だから、あなたと慣れ合うつもりはない」"

[[dialogue]]
speaker = "リィベル"
# 「これは警告よ。私はあなたと協力するつもりはない。……もし私の邪魔をするなら容赦なく呪うわ」
line = "「これは警告よ。私はあなたと協力するつもりはない。……もし私の邪魔をするなら容赦なく呪うわ」"

[[dialogue]]
speaker = "unk"
# リィベルの警告から数日後。また現場で一緒になった。
line = "リィベルの警告から数日後。また現場で一緒になった。"

[[dialogue]]
speaker = "リィベル"
# 「……はぁ。また魔王……できれば魔族と一緒に戦いたいのだけど」
line = "「……はぁ。また魔王……できれば魔族と一緒に戦いたいのだけど」"

[[dialogue]]
speaker = "リィベル"
# 「まぁいいわ。やることは変わらないのだし」
line = "「まぁいいわ。やることは変わらないのだし」"

[[dialogue]]
speaker = "リィベル"
# 「カースドパブリケーション」
line = "「カースドパブリケーション」"

[[dialogue]]
speaker = "モンスター"
# 「ガガピー」
line = "「ガガピー」"

[[dialogue]]
speaker = "unk"
# 新たに出現した機械型モンスターはそれまでのモンスターに比べて頑丈だ。生半可な攻撃は通用しない。
line = "新たに出現した機械型モンスターはそれまでのモンスターに比べて頑丈だ。生半可な攻撃は通用しない。"

[[dialogue]]
speaker = "リィベル"
# 「固いわね……厄介な」
line = "「固いわね……厄介な」"

[[dialogue]]
speaker = "unk"
# ヴィライアに変身できるって聞いたけど
line = "ヴィライアに変身できるって聞いたけど"

[[dialogue]]
speaker = "リィベル"
# 「それが可能なのは深淵書庫の中だけよ。ヴィライアの因子を持っているといっても、通常空間ではあの姿にはなれないわ」
line = "「それが可能なのは深淵書庫の中だけよ。ヴィライアの因子を持っているといっても、通常空間ではあの姿にはなれないわ」"

[[dialogue]]
speaker = "リィベル"
# 「だいたい、こんなところでヴィライアが暴れたら大変なことに──いえ、何でもないわ」
line = "「だいたい、こんなところでヴィライアが暴れたら大変なことに──いえ、何でもないわ」"

[[dialogue]]
speaker = "リィベル"
# 「……それならここは協力すべき？　必要ないわ。言ったでしょう、リクリエを打倒するのは私たちだと。むしろ手出ししないで欲しいくらいよ」
line = "「……それならここは協力すべき？　必要ないわ。言ったでしょう、リクリエを打倒するのは私たちだと。むしろ手出ししないで欲しいくらいよ」"

[[dialogue]]
speaker = "女の子"
# 「お母さん、どこー？　……わっ、モンスター！？」
line = "「お母さん、どこー？　……わっ、モンスター！？」"

[[dialogue]]
speaker = "リィベル"
# 「なんで、こんなところに子どもがいるのよ……親は何をしているのかしら」
line = "「なんで、こんなところに子どもがいるのよ……親は何をしているのかしら」"

[[dialogue]]
speaker = "モンスター"
# 「ガガガッ！」
line = "「ガガガッ！」"

[[dialogue]]
speaker = "リィベル"
# 「やらせないっ……！」
line = "「やらせないっ……！」"

[[dialogue]]
speaker = "リィベル"
# 「く、うぅ……」
line = "「く、うぅ……」"

[[dialogue]]
speaker = "女の子"
# 「お姉ちゃん！？　大丈夫！？」
line = "「お姉ちゃん！？　大丈夫！？」"

[[dialogue]]
speaker = "リィベル"
# 「ふん、このくらいなんてことないわ」
line = "「ふん、このくらいなんてことないわ」"

[[dialogue]]
speaker = "リィベル"
# 「前言撤回よ。魔王、手を貸しなさい」
line = "「前言撤回よ。魔王、手を貸しなさい」"

[[dialogue]]
speaker = "unk"
# ああ、もちろん！
line = "ああ、もちろん！"

[[dialogue]]
speaker = "モンスター"
# 「ピガガッ！？」
line = "「ピガガッ！？」"

[[dialogue]]
speaker = "リィベル"
# 「呪いの炎に焼かれなさい……ダークブレイズブレス！」
line = "「呪いの炎に焼かれなさい……ダークブレイズブレス！」"

[[dialogue]]
speaker = "モンスター"
# 「ピガーーッ！？」
line = "「ピガーーッ！？」"

[[dialogue]]
speaker = "unk"
# リィベルが口から火を吐いたー！？
line = "リィベルが口から火を吐いたー！？"

[[dialogue]]
speaker = "リィベル"
# 「忘れたの？　煌竜ヴィライアの因子を持っていると言ったでしょう。このくらいわけないわ」
line = "「忘れたの？　煌竜ヴィライアの因子を持っていると言ったでしょう。このくらいわけないわ」"

[[dialogue]]
speaker = "リィベル"
# 「モンスターはさっきので片付いたみたいね。……そこの娘、怪我はない？」
line = "「モンスターはさっきので片付いたみたいね。……そこの娘、怪我はない？」"

[[dialogue]]
speaker = "女の子"
# 「う、うん……ありがとう」
line = "「う、うん……ありがとう」"

[[dialogue]]
speaker = "リィベル"
# 「……何よ、魔王。私が人間の子どもを助けたのが意外だった？」
line = "「……何よ、魔王。私が人間の子どもを助けたのが意外だった？」"

[[dialogue]]
speaker = "リィベル"
# 「……そうね、私も想定外よ。咄嗟に体が動いたわ」
line = "「……そうね、私も想定外よ。咄嗟に体が動いたわ」"

[[dialogue]]
speaker = "リィベル"
# 「私は知っているわ。数えきれない魔族たちが、家族の名を呼びながら死んでいったことを」
line = "「私は知っているわ。数えきれない魔族たちが、家族の名を呼びながら死んでいったことを」"

[[dialogue]]
speaker = "リィベル"
# 「だから、あの子を見過ごせなかったのかもしれないわね」
line = "「だから、あの子を見過ごせなかったのかもしれないわね」"

[[dialogue]]
speaker = "女の子"
# 「あ、お母さん！」
line = "「あ、お母さん！」"

[[dialogue]]
speaker = "母親"
# 「こんなところにいたのね……無事でよかった……！」
line = "「こんなところにいたのね……無事でよかった……！」"

[[dialogue]]
speaker = "母親"
# 「星騎士の皆さんが娘を助けてくださったんですね、本当にありがとうございます！」
line = "「星騎士の皆さんが娘を助けてくださったんですね、本当にありがとうございます！」"

[[dialogue]]
speaker = "リィベル"
# （私は星騎士ではないのだけど）
line = "（私は星騎士ではないのだけど）"

[[dialogue]]
speaker = "unk"
# （まぁまぁ……）
line = "（まぁまぁ……）"

[[dialogue]]
speaker = "女の子"
# 「じゃあね、かえんほうしゃのお姉ちゃん！」
line = "「じゃあね、かえんほうしゃのお姉ちゃん！」"

[[dialogue]]
speaker = "unk"
# 母親に手を引かれ、女の子が遠ざかっていく。
line = "母親に手を引かれ、女の子が遠ざかっていく。"

[[dialogue]]
speaker = "リィベル"
# 「ふふっ……何よ、火炎放射って」
line = "「ふふっ……何よ、火炎放射って」"

[[dialogue]]
speaker = "unk"
# 親子を見送るリィベルの表情は、小さく微笑んでいた。
line = "親子を見送るリィベルの表情は、小さく微笑んでいた。"
