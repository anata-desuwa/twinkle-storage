[[dialogue]]
speaker = "unk"
# 第３話,グレイス、動く,B
line = "第３話,グレイス、動く,B"

[[dialogue]]
speaker = "アナ"
# 「おはようございます。極星学園のみなさん」
line = "「おはようございます。極星学園のみなさん」"

[[dialogue]]
speaker = "グレイス"
# 「おはようございます！」
line = "「おはようございます！」"

[[dialogue]]
speaker = "マトイ"
# 「元気そうだね。朝ごはんはちゃんと届いてた？」
line = "「元気そうだね。朝ごはんはちゃんと届いてた？」"

[[dialogue]]
speaker = "グレイス"
# 「はい！　給食委員会さんお手製のお弁当、堪能しました！　とってもおいしかったです！」
line = "「はい！　給食委員会さんお手製のお弁当、堪能しました！　とってもおいしかったです！」"

[[dialogue]]
speaker = "サーシャ"
# 「うふふ。それならよかったわ～♪」
line = "「うふふ。それならよかったわ～♪」"

[[dialogue]]
speaker = "グレイス"
# 「でもでも、量がもう少しあるともっと嬉しいかなって……！　あとデザートも欲しいです！！」
line = "「でもでも、量がもう少しあるともっと嬉しいかなって……！　あとデザートも欲しいです！！」"

[[dialogue]]
speaker = "チナ"
# 「グレイス。お前マジで、遠慮って言葉を知らねーのか？」
line = "「グレイス。お前マジで、遠慮って言葉を知らねーのか？」"

[[dialogue]]
speaker = "レティシア"
# 「ふふ、グレイス。足りないなら言ってくれればいいのに。お昼は、私のぶんをわけてあげるわね？」
line = "「ふふ、グレイス。足りないなら言ってくれればいいのに。お昼は、私のぶんをわけてあげるわね？」"

[[dialogue]]
speaker = "グレイス"
# 「本当ですか！？　嬉しいです～！！」
line = "「本当ですか！？　嬉しいです～！！」"

[[dialogue]]
speaker = "unk"
# 三者三様、いつも通りの極星星徒会のみんなだった。
line = "三者三様、いつも通りの極星星徒会のみんなだった。"

[[dialogue]]
speaker = "クロト"
# 「今日は君たちに話を持ってきた。アナ、例のものを」
line = "「今日は君たちに話を持ってきた。アナ、例のものを」"

[[dialogue]]
speaker = "アナ"
# 「はい。みなさん、こちらをどうぞ」
line = "「はい。みなさん、こちらをどうぞ」"

[[dialogue]]
speaker = "チナ"
# 「……これ、ＤＩＳＣか？」
line = "「……これ、ＤＩＳＣか？」"

[[dialogue]]
speaker = "アナ"
# 「はい。貴女たちが所有していたものではなく、学園側で用意した端末です」
line = "「はい。貴女たちが所有していたものではなく、学園側で用意した端末です」"

[[dialogue]]
speaker = "アナ"
# 「位置情報を伝えるＧＰＳや、会長権限で内部データを閲覧できるよう改造してはいますが……アルタイルにいる間はこの端末をご使用ください」
line = "「位置情報を伝えるＧＰＳや、会長権限で内部データを閲覧できるよう改造してはいますが……アルタイルにいる間はこの端末をご使用ください」"

[[dialogue]]
speaker = "チナ"
# 「…………なんだって？」
line = "「…………なんだって？」"

[[dialogue]]
speaker = "アナ"
# 「セレスティアと転送装置。この２つの脅威を取り上げているため、貴女たちの脱走は困難です」
line = "「セレスティアと転送装置。この２つの脅威を取り上げているため、貴女たちの脱走は困難です」"

[[dialogue]]
speaker = "アナ"
# 「そのため、今後の共闘路線のためにも、本日付けで極星学園のみなさんの軟禁を緩和するという方針でまとまりました」
line = "「そのため、今後の共闘路線のためにも、本日付けで極星学園のみなさんの軟禁を緩和するという方針でまとまりました」"

[[dialogue]]
speaker = "グレイス"
# 「本当ですかっ！？」
line = "「本当ですかっ！？」"

[[dialogue]]
speaker = "アナ"
# 「はい。外出したい時は星徒会にご連絡ください」
line = "「はい。外出したい時は星徒会にご連絡ください」"

[[dialogue]]
speaker = "アナ"
# 「私たちの監視下でなら、学園内の散策や街への買い物など、ご自由にどうぞ」
line = "「私たちの監視下でなら、学園内の散策や街への買い物など、ご自由にどうぞ」"

[[dialogue]]
speaker = "グレイス"
# 「おぉおおっ……！　やりました、これでお外に行けます！！」
line = "「おぉおおっ……！　やりました、これでお外に行けます！！」"

[[dialogue]]
speaker = "チナ"
# 「そう──か」
line = "「そう──か」"

[[dialogue]]
speaker = "レティシア"
# 「親切にして、寝返るのを期待しているのかしら？　だったら的外れもいいところだわ」
line = "「親切にして、寝返るのを期待しているのかしら？　だったら的外れもいいところだわ」"

[[dialogue]]
speaker = "クロト"
# 「どう取るかは君たちの自由だ。ともかく、俺たちの考えは伝えてるとおりだよ」
line = "「どう取るかは君たちの自由だ。ともかく、俺たちの考えは伝えてるとおりだよ」"

[[dialogue]]
speaker = "チナ"
# 「デネブとアルタイルの、共存の道……」
line = "「デネブとアルタイルの、共存の道……」"

[[dialogue]]
speaker = "クロト"
# 「ああ。デネブ世界のここ１０年のことは、チナにたくさん教えてもらった」
line = "「ああ。デネブ世界のここ１０年のことは、チナにたくさん教えてもらった」"

[[dialogue]]
speaker = "ヴィーナス"
# 「今度は私たちの番ってこと！　アルタイル世界のこと、たくさん見て、知ってほしいってわけね！」
line = "「今度は私たちの番ってこと！　アルタイル世界のこと、たくさん見て、知ってほしいってわけね！」"

[[dialogue]]
speaker = "アナ"
# 「いずれ私たちは、グレイスさんが使用していた転送装置を使ってデネブへ──ルヴィネさんに会いに行きます」
line = "「いずれ私たちは、グレイスさんが使用していた転送装置を使ってデネブへ──ルヴィネさんに会いに行きます」"

[[dialogue]]
speaker = "アナ"
# 「その際、貴女方も連れていくつもりです。天界での傷はまだ癒えていないはず……その治療期間を、アルタイルの理解のために使ってください」
line = "「その際、貴女方も連れていくつもりです。天界での傷はまだ癒えていないはず……その治療期間を、アルタイルの理解のために使ってください」"

[[dialogue]]
speaker = "レティシア"
# 「口では何とでも言えるわね。そんなこと言って、油断をさせようとしてもそうはいかないわ」
line = "「口では何とでも言えるわね。そんなこと言って、油断をさせようとしてもそうはいかないわ」"

[[dialogue]]
speaker = "クロト"
# 「どこまで信用してもらえるかわからないけど……気が向いたら連絡をくれ」
line = "「どこまで信用してもらえるかわからないけど……気が向いたら連絡をくれ」"

[[dialogue]]
speaker = "クロト"
# 「俺たちの世界、アルタイルを。君たちの目で見て、肌で感じて……理解してくれると嬉しい」
line = "「俺たちの世界、アルタイルを。君たちの目で見て、肌で感じて……理解してくれると嬉しい」"

[[dialogue]]
speaker = "unk"
# いきなり自由になったところで、彼女たちも動きづらいだろうか。ある程度の説得が出来たとはいえ、デネブにおいて緋宮クロトは『裏切り者』だ。
line = "いきなり自由になったところで、彼女たちも動きづらいだろうか。ある程度の説得が出来たとはいえ、デネブにおいて緋宮クロトは『裏切り者』だ。"

[[dialogue]]
speaker = "unk"
# 善意の裏に何かがあると疑いを向けられても仕方がない──
line = "善意の裏に何かがあると疑いを向けられても仕方がない──"

[[dialogue]]
speaker = "クロト"
# 「……そう、思ってたんだけどな」
line = "「……そう、思ってたんだけどな」"

[[dialogue]]
speaker = "マトイ"
# 「また来たぁ！？」
line = "「また来たぁ！？」"

[[dialogue]]
speaker = "グレイス"
# 『マトイさん！　私、流星学園の星徒会室に遊びに行きたいです！！』
line = "『マトイさん！　私、流星学園の星徒会室に遊びに行きたいです！！』"

[[dialogue]]
speaker = "マトイ"
# 「あ、う、うんっ。ちょっと待ってね……？」
line = "「あ、う、うんっ。ちょっと待ってね……？」"

[[dialogue]]
speaker = "マトイ"
# 「会長。グレイスちゃんが──」
line = "「会長。グレイスちゃんが──」"

[[dialogue]]
speaker = "クロト"
# 「……ここまで聞こえた。フィオナへの連絡もあるし、俺も同行するよ」
line = "「……ここまで聞こえた。フィオナへの連絡もあるし、俺も同行するよ」"

[[dialogue]]
speaker = "ルリエル"
# 「流星星徒会へようこそなのです、デネブの星騎士さん！　４っ！」
line = "「流星星徒会へようこそなのです、デネブの星騎士さん！　４っ！」"

[[dialogue]]
speaker = "グレイス"
# 「はい！　いきなり訪ねたのに、まさかＵＭＯにまで誘っていただけるだなんて光栄です！　８！」
line = "「はい！　いきなり訪ねたのに、まさかＵＭＯにまで誘っていただけるだなんて光栄です！　８！」"

[[dialogue]]
speaker = "セーラ"
# 「我が星徒会では、ゲームでお客さんを歓迎するのが習わしだからね～。よーし、お姉さんは３を２枚出しちゃうぞー♪」
line = "「我が星徒会では、ゲームでお客さんを歓迎するのが習わしだからね～。よーし、お姉さんは３を２枚出しちゃうぞー♪」"

[[dialogue]]
speaker = "ユウリ"
# 「平行世界でもＵＭＯってあるんだなあ。まあゆっくりしていけよ。スキップ！」
line = "「平行世界でもＵＭＯってあるんだなあ。まあゆっくりしていけよ。スキップ！」"

[[dialogue]]
speaker = "ルリエル"
# 「ああっ、飛ばされちゃいました～っ！？」
line = "「ああっ、飛ばされちゃいました～っ！？」"

[[dialogue]]
speaker = "ソフィア"
# 「まさか平行世界の方にまで恥をさらすことになるだなんて……」
line = "「まさか平行世界の方にまで恥をさらすことになるだなんて……」"

[[dialogue]]
speaker = "マトイ"
# 「お、お騒がせしちゃってごめんなさい……！」
line = "「お、お騒がせしちゃってごめんなさい……！」"

[[dialogue]]
speaker = "フィオナ"
# 「構いませんよ。極星学園の方とは、以前から交流してみたいと思っていましたから」
line = "「構いませんよ。極星学園の方とは、以前から交流してみたいと思っていましたから」"

[[dialogue]]
speaker = "ソフィア"
# 「名誉のために言っておきますが、ゲームで歓迎する習わしなんてありません。流星星徒会は、フィオナ会長率いるとても真面目な組織で──」
line = "「名誉のために言っておきますが、ゲームで歓迎する習わしなんてありません。流星星徒会は、フィオナ会長率いるとても真面目な組織で──」"

[[dialogue]]
speaker = "セーラ"
# 「ソフィアちゃんもＵＭＯ混ざらない？　大勢の方が楽しいよ～♪」
line = "「ソフィアちゃんもＵＭＯ混ざらない？　大勢の方が楽しいよ～♪」"

[[dialogue]]
speaker = "ソフィア"
# 「やりません！　まったくもう……！！」
line = "「やりません！　まったくもう……！！」"

[[dialogue]]
speaker = "unk"
# 和気あいあいとした雰囲気に似合わないけれど、用件をすまさなくてはならない。
line = "和気あいあいとした雰囲気に似合わないけれど、用件をすまさなくてはならない。"

[[dialogue]]
speaker = "unk"
# 俺はジグの星眼による未来の情報と、今後の方針についてをフィオナに伝えた──
line = "俺はジグの星眼による未来の情報と、今後の方針についてをフィオナに伝えた──"

[[dialogue]]
speaker = "クロト"
# 「……というわけだ。ごめん、フィオナにも事前に話を通しておくべきだった」
line = "「……というわけだ。ごめん、フィオナにも事前に話を通しておくべきだった」"

[[dialogue]]
speaker = "フィオナ"
# 「大丈夫ですよ。方々に確認を取っていては、どうしても初動が遅くなります。それに私も同じ気持ちですから」
line = "「大丈夫ですよ。方々に確認を取っていては、どうしても初動が遅くなります。それに私も同じ気持ちですから」"

[[dialogue]]
speaker = "フィオナ"
# 「前回のフィヴォス流星群の折……新星学園のみなさんにはたくさん助けていただきました」
line = "「前回のフィヴォス流星群の折……新星学園のみなさんにはたくさん助けていただきました」"

[[dialogue]]
speaker = "フィオナ"
# 「使徒となった姉さんの命を、一時は諦めていた私を説得してくださったのも、みなさんです」
line = "「使徒となった姉さんの命を、一時は諦めていた私を説得してくださったのも、みなさんです」"

[[dialogue]]
speaker = "フィオナ"
# 「──ルヴィネさんを救いましょう。そのためなら、流星学園も協力は惜しみません」
line = "「──ルヴィネさんを救いましょう。そのためなら、流星学園も協力は惜しみません」"

[[dialogue]]
speaker = "クロト"
# 「……ありがとう、フィオナ」
line = "「……ありがとう、フィオナ」"

[[dialogue]]
speaker = "フィオナ"
# 「──それにしても」
line = "「──それにしても」"

[[dialogue]]
speaker = "グレイス"
# 「あの、こっちの世界でドロー２の重ね出しはできますか！？」
line = "「あの、こっちの世界でドロー２の重ね出しはできますか！？」"

[[dialogue]]
speaker = "セーラ"
# 「ローカルルールだけど、うちのシマではあり！」
line = "「ローカルルールだけど、うちのシマではあり！」"

[[dialogue]]
speaker = "グレイス"
# 「いいことを聞きました！　貯めに貯めたヤツを今ここで解放します！　てぇい！！」
line = "「いいことを聞きました！　貯めに貯めたヤツを今ここで解放します！　てぇい！！」"

[[dialogue]]
speaker = "セーラ"
# 「始まっちゃったね～♪　うちも乗るよ～。ドロー２追加っ♪」
line = "「始まっちゃったね～♪　うちも乗るよ～。ドロー２追加っ♪」"

[[dialogue]]
speaker = "ユウリ"
# 「冷静に考えると普通にクソゲーだよな。最初にドロー２尽きたやつが負けだし……まあ、乗るけどな！」
line = "「冷静に考えると普通にクソゲーだよな。最初にドロー２尽きたやつが負けだし……まあ、乗るけどな！」"

[[dialogue]]
speaker = "ルリエル"
# 「ふっふっふ～！　これまでの敗北でルリエルも学んでいるのですよ～！　ドロー２、ゴー！」
line = "「ふっふっふ～！　これまでの敗北でルリエルも学んでいるのですよ～！　ドロー２、ゴー！」"

[[dialogue]]
speaker = "フィオナ"
# 「グレイスさん。とても賑やかで、楽しい方ですね」
line = "「グレイスさん。とても賑やかで、楽しい方ですね」"

[[dialogue]]
speaker = "フィオナ"
# 「彼女を見ていると、ルヴィネさんを何としても助けなくては……と。改めて思ってしまいますね」
line = "「彼女を見ていると、ルヴィネさんを何としても助けなくては……と。改めて思ってしまいますね」"

[[dialogue]]
speaker = "フィオナ"
# 「あんなに優しい女の子の笑顔を、曇らせたくありませんから」
line = "「あんなに優しい女の子の笑顔を、曇らせたくありませんから」"

[[dialogue]]
speaker = "ルリエル"
# 「ひえ～っ！？　もうスキップはやめて欲しいのです！　散々カードを引いて、手札がうちわみたいになってるのに～！？」
line = "「ひえ～っ！？　もうスキップはやめて欲しいのです！　散々カードを引いて、手札がうちわみたいになってるのに～！？」"

[[dialogue]]
speaker = "グレイス"
# 「ふふふ、まだまだ！　ルリエルさんにはこのまま沈んでもらいます！　スキップ２枚目！！」
line = "「ふふふ、まだまだ！　ルリエルさんにはこのまま沈んでもらいます！　スキップ２枚目！！」"

[[dialogue]]
speaker = "ルリエル"
# 「うわ～ん！　血も涙もないのです～っ！？」
line = "「うわ～ん！　血も涙もないのです～っ！？」"

[[dialogue]]
speaker = "マトイ"
# 「優しい……かな？」
line = "「優しい……かな？」"

[[dialogue]]
speaker = "フィオナ"
# 「げ、ゲームですので……」
line = "「げ、ゲームですので……」"

[[dialogue]]
speaker = "unk"
# その後もグレイスは、カフェテリアや図書館、街の散策などをリクエストし、マトイを振り回し続けるのだった──
line = "その後もグレイスは、カフェテリアや図書館、街の散策などをリクエストし、マトイを振り回し続けるのだった──"
