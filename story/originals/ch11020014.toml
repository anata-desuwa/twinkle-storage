[[dialogue]]
speaker = "unk"
# 第４話,笑顔の練習です,P
line = "第４話,笑顔の練習です,P"

[[dialogue]]
speaker = "アナ"
# 「何と。まさかシュティレさんが、会長のことを好き……？」
line = "「何と。まさかシュティレさんが、会長のことを好き……？」"

[[dialogue]]
speaker = "シュティレ"
# 「はい。先日のお出かけのラストにて、ズッキュンと……乙女心がときめいちゃいました、アナお姉ちゃん」
line = "「はい。先日のお出かけのラストにて、ズッキュンと……乙女心がときめいちゃいました、アナお姉ちゃん」"

[[dialogue]]
speaker = "アニマ"
# 「フヒッ♪　それは面白イ！　では可愛い弟子ヨ、どんな薬が欲しいのカナ？」
line = "「フヒッ♪　それは面白イ！　では可愛い弟子ヨ、どんな薬が欲しいのカナ？」"

[[dialogue]]
speaker = "アニマ"
# 「手っ取り早く会長に惚れ薬を盛るカ……あるいはシュティレをボンッキュッボンッのナイスバディに変身させるドリンクを使う手もあるナ～？」
line = "「手っ取り早く会長に惚れ薬を盛るカ……あるいはシュティレをボンッキュッボンッのナイスバディに変身させるドリンクを使う手もあるナ～？」"

[[dialogue]]
speaker = "アナ"
# 「真面目な話ですよ、アニマ先輩」
line = "「真面目な話ですよ、アニマ先輩」"

[[dialogue]]
speaker = "シュティレ"
# 「体型変化が可能ならば、シュティレはボンッボンッボンッがいいです」
line = "「体型変化が可能ならば、シュティレはボンッボンッボンッがいいです」"

[[dialogue]]
speaker = "アナ"
# 「シュティレさん。それはドラム缶です」
line = "「シュティレさん。それはドラム缶です」"

[[dialogue]]
speaker = "シュティレ"
# 「憧れの装甲砲兵ドラムンに、一度でいいからなってみたいと昔から思っておりました──と、冗談はさておき」
line = "「憧れの装甲砲兵ドラムンに、一度でいいからなってみたいと昔から思っておりました──と、冗談はさておき」"

[[dialogue]]
speaker = "シュティレ"
# 「マスター。もし錬金術のお薬をいただけるなら、シュティレは笑顔になれる薬が欲しいです」
line = "「マスター。もし錬金術のお薬をいただけるなら、シュティレは笑顔になれる薬が欲しいです」"

[[dialogue]]
speaker = "アニマ"
# 「笑顔？　そんなものなら朝飯前だガ……なんでまた？」
line = "「笑顔？　そんなものなら朝飯前だガ……なんでまた？」"

[[dialogue]]
speaker = "シュティレ"
# 「昨日、ネットの叡智が集う場所、<ruby=リューセイ>Ｒｙｕｓｅｉ</ruby>知恵袋で投稿をしました。男子に好かれる女子の特徴は何か、と」
line = "「昨日、ネットの叡智が集う場所、<ruby>Ｒｙｕｓｅｉ<rt>リューセイ</rt></ruby>知恵袋で投稿をしました。男子に好かれる女子の特徴は何か、と」"

[[dialogue]]
speaker = "シュティレ"
# 「結果、笑顔がプリティーキュートな女子が好かれるとの結論に至ったのです」
line = "「結果、笑顔がプリティーキュートな女子が好かれるとの結論に至ったのです」"

[[dialogue]]
speaker = "アナ"
# 「エビデンスに不安が残る……でも、なるほど。会長に好かれるために、可愛い笑顔を浮かべたいんですね」
line = "「エビデンスに不安が残る……でも、なるほど。会長に好かれるために、可愛い笑顔を浮かべたいんですね」"

[[dialogue]]
speaker = "シュティレ"
# 「イエス。昨日もさっそく鏡の前で練習したのですが、結果はひどいものでした」
line = "「イエス。昨日もさっそく鏡の前で練習したのですが、結果はひどいものでした」"

[[dialogue]]
speaker = "シュティレ"
# 「『無表情で何時間も鏡を見つめている』と両親からいたく心配されてしまいました。流石に落ち込みます」
line = "「『無表情で何時間も鏡を見つめている』と両親からいたく心配されてしまいました。流石に落ち込みます」"

[[dialogue]]
speaker = "アニマ"
# 「なるほど。それならばやはり、アニマの出番だナ！　可愛い弟子の頼みダ。プリティーキュートな笑顔、薬でばっちり作ってやろウ！」
line = "「なるほど。それならばやはり、アニマの出番だナ！　可愛い弟子の頼みダ。プリティーキュートな笑顔、薬でばっちり作ってやろウ！」"

[[dialogue]]
speaker = "アナ"
# 「へいストップ。お薬を前提に話を進めるのはいけません。一旦落ち着きましょう」
line = "「へいストップ。お薬を前提に話を進めるのはいけません。一旦落ち着きましょう」"

[[dialogue]]
speaker = "アナ"
# 「もしも会長が交際をＯＫしてくれた時に、どうするんです？　毎日、笑顔になれる薬を飲むつもりですか」
line = "「もしも会長が交際をＯＫしてくれた時に、どうするんです？　毎日、笑顔になれる薬を飲むつもりですか」"

[[dialogue]]
speaker = "シュティレ"
# 「……それはそうなのですが。想いを伝える時くらい、素敵な笑顔を浮かべる女の子だと……思ってもらいたいのです」
line = "「……それはそうなのですが。想いを伝える時くらい、素敵な笑顔を浮かべる女の子だと……思ってもらいたいのです」"

[[dialogue]]
speaker = "アナ"
# 「なら、なおさら練習です。昨日始めたばかりなんでしょう？　今日も、明日も、明後日も、鏡の前で練習すればいいだけ」
line = "「なら、なおさら練習です。昨日始めたばかりなんでしょう？　今日も、明日も、明後日も、鏡の前で練習すればいいだけ」"

[[dialogue]]
speaker = "アニマ"
# 「フム……しかし、シュティレは苦手だから相談してるのダロウ？　時間は有限だゾ？」
line = "「フム……しかし、シュティレは苦手だから相談してるのダロウ？　時間は有限だゾ？」"

[[dialogue]]
speaker = "アナ"
# 「笑顔は身に着ければ一生ものです、時間はたっぷりかけてもお釣りがくるでしょう」
line = "「笑顔は身に着ければ一生ものです、時間はたっぷりかけてもお釣りがくるでしょう」"

[[dialogue]]
speaker = "アナ"
# 「それにシュティレさん、アニメとロマンを愛する貴女が、修行パートをサボるのはいただけません」
line = "「それにシュティレさん、アニメとロマンを愛する貴女が、修行パートをサボるのはいただけません」"

[[dialogue]]
speaker = "シュティレ"
# 「……っ！　アナお姉ちゃんの言う通りです。猛省します」
line = "「……っ！　アナお姉ちゃんの言う通りです。猛省します」"

[[dialogue]]
speaker = "アナ"
# 「はい。素敵な笑顔を会得して、想いを伝えてください。応援していますよ」
line = "「はい。素敵な笑顔を会得して、想いを伝えてください。応援していますよ」"

[[dialogue]]
speaker = "アニマ"
# 「フヒ♪　錬金術がフられたのは残念だガ、弟子が頑張るというならアニマも応援しなくてはナ！」
line = "「フヒ♪　錬金術がフられたのは残念だガ、弟子が頑張るというならアニマも応援しなくてはナ！」"

[[dialogue]]
speaker = "シュティレ"
# 「頑張ります。素敵な笑顔を体得したその時は、会長へ告ります。ぶい」
line = "「頑張ります。素敵な笑顔を体得したその時は、会長へ告ります。ぶい」"

[[dialogue]]
speaker = "アナ"
# （……別に練習なんてしなくても、そのままで十分愛らしい顔だとは思いますけどね）
line = "（……別に練習なんてしなくても、そのままで十分愛らしい顔だとは思いますけどね）"

[[dialogue]]
speaker = "unk"
# アニマ先輩やシュティレと仲良くなったおかげで、俺は購買部にいつ彼女たちがいるのか、大体わかるようになっていた。
line = "アニマ先輩やシュティレと仲良くなったおかげで、俺は購買部にいつ彼女たちがいるのか、大体わかるようになっていた。"

[[dialogue]]
speaker = "unk"
# 小腹が空いているというのに、俺はあえて数時間待ち、シュティレに会えるタイミングで顔を出したのだが──
line = "小腹が空いているというのに、俺はあえて数時間待ち、シュティレに会えるタイミングで顔を出したのだが──"

[[dialogue]]
speaker = "シュティレ"
# 「ハッピー、ウレピー、ウイスキー……ハッピー、ウレピー、ウイスキー……」
line = "「ハッピー、ウレピー、ウイスキー……ハッピー、ウレピー、ウイスキー……」"

[[dialogue]]
speaker = "unk"
# 錬金術の儀式かな……？
line = "錬金術の儀式かな……？"

[[dialogue]]
speaker = "unk"
# 鏡に向かって謎の呪文を……！
line = "鏡に向かって謎の呪文を……！"

[[dialogue]]
speaker = "シュティレ"
# 「あ……会長。いらっしゃいませ。修行パートを見られてしまいました」
line = "「あ……会長。いらっしゃいませ。修行パートを見られてしまいました」"

[[dialogue]]
speaker = "シュティレ"
# 「実は今、シュティレは笑顔の練習中なのです。先ほどのはすべて、笑顔を作る上で必要な、表情筋を鍛えることができる単語です」
line = "「実は今、シュティレは笑顔の練習中なのです。先ほどのはすべて、笑顔を作る上で必要な、表情筋を鍛えることができる単語です」"

[[dialogue]]
speaker = "unk"
# 笑顔の練習……何でまた急に？
line = "笑顔の練習……何でまた急に？"

[[dialogue]]
speaker = "シュティレ"
# 「それは……その……えーっと……」
line = "「それは……その……えーっと……」"

[[dialogue]]
speaker = "シュティレ"
# 「看板娘として、ですね。お客様に素敵なスマイルを届けようと思ったのです。私は表情が硬いので」
line = "「看板娘として、ですね。お客様に素敵なスマイルを届けようと思ったのです。私は表情が硬いので」"

[[dialogue]]
speaker = "unk"
# シュティレの笑顔は、もう十分素敵だよ
line = "シュティレの笑顔は、もう十分素敵だよ"

[[dialogue]]
speaker = "unk"
# 確かにちょっと硬いかもしれないけど
line = "確かにちょっと硬いかもしれないけど"

[[dialogue]]
speaker = "シュティレ"
# 「え──」
line = "「え──」"

[[dialogue]]
speaker = "unk"
# ほら、これを見て
line = "ほら、これを見て"

[[dialogue]]
speaker = "シュティレ"
# 「会長のＤＩＳＣ……あ、これは私と会長が、一緒に撮った自撮り……」
line = "「会長のＤＩＳＣ……あ、これは私と会長が、一緒に撮った自撮り……」"

[[dialogue]]
speaker = "シュティレ"
# 「数はたくさんありますが、やっぱり笑っていませんよ、これ……」
line = "「数はたくさんありますが、やっぱり笑っていませんよ、これ……」"

[[dialogue]]
speaker = "unk"
# 俺にはどれも違った笑顔に見えるけど
line = "俺にはどれも違った笑顔に見えるけど"

[[dialogue]]
speaker = "unk"
# そうかな？
line = "そうかな？"

[[dialogue]]
speaker = "unk"
# この写真は目のあたりが柔らかい。この写真は口角が少しだけど上がっている。この写真は──
line = "この写真は目のあたりが柔らかい。この写真は口角が少しだけど上がっている。この写真は──"

[[dialogue]]
speaker = "unk"
# 俺は１枚ずつ、シュティレがきちんと笑顔を浮かべられていることを説明した。
line = "俺は１枚ずつ、シュティレがきちんと笑顔を浮かべられていることを説明した。"

[[dialogue]]
speaker = "シュティレ"
# 「……会長は、私よりも私のことを、よく見てくれているんですね」
line = "「……会長は、私よりも私のことを、よく見てくれているんですね」"

[[dialogue]]
speaker = "シュティレ"
# 「これまで私は……会長の前で、ちゃんと笑えていたでしょうか？」
line = "「これまで私は……会長の前で、ちゃんと笑えていたでしょうか？」"

[[dialogue]]
speaker = "unk"
# 今もそうだよ。素敵な笑顔だ
line = "今もそうだよ。素敵な笑顔だ"

[[dialogue]]
speaker = "シュティレ"
# 「……ありがとうございます。実はさっき、ちょっとだけ嘘をつきました」
line = "「……ありがとうございます。実はさっき、ちょっとだけ嘘をつきました」"

[[dialogue]]
speaker = "シュティレ"
# 「笑顔を練習していた本当の理由は、素敵な笑顔を体得し、片想いしている男性へ告白をしたかったからなのです」
line = "「笑顔を練習していた本当の理由は、素敵な笑顔を体得し、片想いしている男性へ告白をしたかったからなのです」"

[[dialogue]]
speaker = "シュティレ"
# 「ですが、こうして何度も会長に『素敵だ』と評価されたため、すでに条件はクリアされていると判断します。よって……」
line = "「ですが、こうして何度も会長に『素敵だ』と評価されたため、すでに条件はクリアされていると判断します。よって……」"

[[dialogue]]
speaker = "シュティレ"
# 「会長──あなたのことが大好きです。私を恋人にしていただけないでしょうか？」
line = "「会長──あなたのことが大好きです。私を恋人にしていただけないでしょうか？」"

[[dialogue]]
speaker = "unk"
# 突然の出来事に驚きながらも、俺は強く頷くのだった──
line = "突然の出来事に驚きながらも、俺は強く頷くのだった──"

[[dialogue]]
speaker = "アナ"
# 「シュティレさん……上手くいけばいいのですが。でも笑顔は本当に苦手のようですし、時間がかかるかも……おや？」
line = "「シュティレさん……上手くいけばいいのですが。でも笑顔は本当に苦手のようですし、時間がかかるかも……おや？」"

[[dialogue]]
speaker = "アナ"
# 「ＤＩＳＣにシュティレさんからメッセージが……なになに。『告りました。ターゲット撃破。ぶい』……は！？」
line = "「ＤＩＳＣにシュティレさんからメッセージが……なになに。『告りました。ターゲット撃破。ぶい』……は！？」"

[[dialogue]]
speaker = "アナ"
# 「まだ２時間しか経ってないんですけど！？」
line = "「まだ２時間しか経ってないんですけど！？」"
