[[dialogue]]
speaker = "unk"
# 第３話,ＶＳ星喰らいホロウ・ルヴィネ戦闘前,B
line = "第３話,ＶＳ星喰らいホロウ・ルヴィネ戦闘前,B"

[[dialogue]]
speaker = "unk"
# 緋宮クロトたちの作戦会議から数時間後……
line = "緋宮クロトたちの作戦会議から数時間後……"

[[dialogue]]
speaker = "unk"
# 終焉世界──ベガ。
line = "終焉世界──ベガ。"

[[dialogue]]
speaker = "unk"
# アルタイルの星騎士たちが攻略すべき最重要拠点『星喰らい』の活動ポイント。
line = "アルタイルの星騎士たちが攻略すべき最重要拠点『星喰らい』の活動ポイント。"

[[dialogue]]
speaker = "unk"
# その１つを任されているのは、真なる神の忠実なる<ruby=しもべ>僕</ruby>──ホロウ・ルヴィネだった。
line = "その１つを任されているのは、真なる神の忠実なる<ruby>僕<rt>しもべ</rt></ruby>──ホロウ・ルヴィネだった。"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「……始まったわね」
line = "「……始まったわね」"

[[dialogue]]
speaker = "unk"
# ベガ世界の各地に配置した、自身のシャドウたちからリアルタイムで情報が送られてくる。
line = "ベガ世界の各地に配置した、自身のシャドウたちからリアルタイムで情報が送られてくる。"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「ふふふ……やはり緋宮クロトは参戦していない。ならば私たちが負ける道理はないわ」
line = "「ふふふ……やはり緋宮クロトは参戦していない。ならば私たちが負ける道理はないわ」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
# 「厄災の右腕の力を振るう、緋宮クロトさえいなければ……お前たちの相手などどうにでもなるのよ！」
line = "「厄災の右腕の力を振るう、緋宮クロトさえいなければ……お前たちの相手などどうにでもなるのよ！」"

[[dialogue]]
speaker = "フィオナ"
# 「見つけました！　ホロウ・ルヴィネ──覚悟っ！！」
line = "「見つけました！　ホロウ・ルヴィネ──覚悟っ！！」"

[[dialogue]]
speaker = "unk"
# ホロウ・ルヴィネの背中に声が投げかけられる。
line = "ホロウ・ルヴィネの背中に声が投げかけられる。"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「……愚かね。魔王の血統ならばどうにかできると思ったのかしら？　今の私は、以前とは違うわ」
line = "「……愚かね。魔王の血統ならばどうにかできると思ったのかしら？　今の私は、以前とは違うわ」"

[[dialogue]]
speaker = "unk"
# このホロウは『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』によって特別に手を加えられた個体。
line = "このホロウは『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』によって特別に手を加えられた個体。"

[[dialogue]]
speaker = "unk"
# 故にその出力は、大量生産された<ruby=シャドウ>影</ruby>たちとも、以前デネブを襲ったホロウ・ルヴィネとも、比較にならない。
line = "故にその出力は、大量生産された<ruby>影<rt>シャドウ</rt></ruby>たちとも、以前デネブを襲ったホロウ・ルヴィネとも、比較にならない。"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
# 「今から始まるのは戦いではないわ。一方的な──」
line = "「今から始まるのは戦いではないわ。一方的な──」"

[[dialogue]]
speaker = "unk"
# そしてホロウ・ルヴィネは振り向き、フィオナたちの姿を捕らえた──
line = "そしてホロウ・ルヴィネは振り向き、フィオナたちの姿を捕らえた──"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「一方的な……じゅう…………りん…………」
line = "「一方的な……じゅう…………りん…………」"

[[dialogue]]
speaker = "ジュエリー"
# 「やあ、神の従僕──デネブでの戦い以来だね。助手の力によってパワーアップした私たちの力。とくと見せてあげようじゃないか」
line = "「やあ、神の従僕──デネブでの戦い以来だね。助手の力によってパワーアップした私たちの力。とくと見せてあげようじゃないか」"

[[dialogue]]
speaker = "フィオナ"
# 「こ、ここで会ったが１００年目！　ホロウ・ルヴィネ──容赦はしませんっ！！」
line = "「こ、ここで会ったが１００年目！　ホロウ・ルヴィネ──容赦はしませんっ！！」"

[[dialogue]]
speaker = "イレーナ"
# 「せ、世界の安寧のため……女神様の遺志を未来へ繋ぐため！　今日こそ貴女を滅します！」
line = "「せ、世界の安寧のため……女神様の遺志を未来へ繋ぐため！　今日こそ貴女を滅します！」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
# 「視覚情報にエラーが……？　そんな…………いったい、何が…………？」
line = "「視覚情報にエラーが……？　そんな…………いったい、何が…………？」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
# 「？？？？　……？？　？？？」
line = "「？？？？　……？？　？？？」"

[[dialogue]]
speaker = "イレーナ"
# （やっぱり！　ドン引きしてるじゃないの！？　何なのよこの衣装は～っ！？）
line = "（やっぱり！　ドン引きしてるじゃないの！？　何なのよこの衣装は～っ！？）"

[[dialogue]]
speaker = "イレーナ"
# （幹内世界のあたしから力を受け取れたのはいいんだけど！　どうして衣装を選べないのよ！？）
line = "（幹内世界のあたしから力を受け取れたのはいいんだけど！　どうして衣装を選べないのよ！？）"

[[dialogue]]
speaker = "ジュエリー"
# 「おやおや。神の従僕ともあろう者が情けない。戦場で随分と気の抜けた顔をするじゃないか」
line = "「おやおや。神の従僕ともあろう者が情けない。戦場で随分と気の抜けた顔をするじゃないか」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「な──何なのその格好は！？　ふざけているの！？」
line = "「な──何なのその格好は！？　ふざけているの！？」"

[[dialogue]]
speaker = "ジュエリー"
# 「まさか、真面目も真面目、大真面目さ。疑うのならば、私たちの星力を感知してみるといい」
line = "「まさか、真面目も真面目、大真面目さ。疑うのならば、私たちの星力を感知してみるといい」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
# 「──っ！？　な、なぜっ……デネブで戦った時の、数倍の星力を宿している……そんなバカなっ！？」
line = "「──っ！？　な、なぜっ……デネブで戦った時の、数倍の星力を宿している……そんなバカなっ！？」"

[[dialogue]]
speaker = "フィオナ"
# 「この衣装が発現した時は少々二の足を踏みましたが……世界を救うために必要であるのなら！　格好にこだわっている場合ではありません！」
line = "「この衣装が発現した時は少々二の足を踏みましたが……世界を救うために必要であるのなら！　格好にこだわっている場合ではありません！」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「くっ……異常事態だわ！　お、お父様……！！」
line = "「くっ……異常事態だわ！　お、お父様……！！」"

[[dialogue]]
speaker = "ＸＥＬＯＳ"
# 「ギ────ギ、ギギ────ギ────！？！？」
line = "「ギ────ギ、ギギ────ギ────！？！？」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「そ、そんな……！　お父様ですら、起こっている事態を把握できていないっ！？」
line = "「そ、そんな……！　お父様ですら、起こっている事態を把握できていないっ！？」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「お、恐れている……怯えている……！？　お、お父様！　気を確かに……！！」
line = "「お、恐れている……怯えている……！？　お、お父様！　気を確かに……！！」"

[[dialogue]]
speaker = "ジュエリー"
# 「ふふ……怖いかい？　それもそうだろう、今の私たちは無敵だ。助手との間に紡いだ、無限の宇宙の愛を纏っているのだからね」
line = "「ふふ……怖いかい？　それもそうだろう、今の私たちは無敵だ。助手との間に紡いだ、無限の宇宙の愛を纏っているのだからね」"

[[dialogue]]
speaker = "イレーナ"
# 「呆れてるだけでしょ……敵ながら同情するわ、ほんとに」
line = "「呆れてるだけでしょ……敵ながら同情するわ、ほんとに」"

[[dialogue]]
speaker = "フィオナ"
# 「緋宮会長をベガ世界に呼ぶためにも──ホロウ・ルヴィネ！　そして『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』！　このポイントを解放させていただきます！」
line = "「緋宮会長をベガ世界に呼ぶためにも──ホロウ・ルヴィネ！　そして『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』！　このポイントを解放させていただきます！」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
# 「くっ！　ふざけた格好でふざけたことを……！　どこまで私をコケにするつもり！？　せめてノヴァフォームで来なさい！！」
line = "「くっ！　ふざけた格好でふざけたことを……！　どこまで私をコケにするつもり！？　せめてノヴァフォームで来なさい！！」"

[[dialogue]]
speaker = "ミヤハル"
# 「うふふ。もっともなつっこみやねぇ♪」
line = "「うふふ。もっともなつっこみやねぇ♪」"

[[dialogue]]
speaker = "ジュエリー"
# 「生憎、戦闘服の選択はできないようでね。全力を出すと、どうしてもこの衣装になってしまうんだよ」
line = "「生憎、戦闘服の選択はできないようでね。全力を出すと、どうしてもこの衣装になってしまうんだよ」"

[[dialogue]]
speaker = "ミヤハル"
# 「ええやん、ええやん。なーんも問題あらへんよ♪　ジュエリーはん、最後に世界を救うのは、いつだって愛と煩悩やからねぇ♪」
line = "「ええやん、ええやん。なーんも問題あらへんよ♪　ジュエリーはん、最後に世界を救うのは、いつだって愛と煩悩やからねぇ♪」"

[[dialogue]]
speaker = "ジュエリー"
# 「む？　何か余計な単語がくっついていた気が……？」
line = "「む？　何か余計な単語がくっついていた気が……？」"

[[dialogue]]
speaker = "ミヤハル"
# 「フィオナ会長にイレーナはんも、えろう似合うてて……花嫁はんの戦いぶり、この目に焼き付けさせてもらうわぁ♪」
line = "「フィオナ会長にイレーナはんも、えろう似合うてて……花嫁はんの戦いぶり、この目に焼き付けさせてもらうわぁ♪」"

[[dialogue]]
speaker = "フィオナ"
# 「そ、そんなにジロジロと見られると、少し居心地が……」
line = "「そ、そんなにジロジロと見られると、少し居心地が……」"

[[dialogue]]
speaker = "ミヤハル"
# 「何を言うてはるの♪　花嫁はんは、見られるんがお仕事やろ？」
line = "「何を言うてはるの♪　花嫁はんは、見られるんがお仕事やろ？」"

[[dialogue]]
speaker = "イレーナ"
# （どんな羞恥プレイよ！？　さっさとホロウたちを倒して、すぐにこの衣装、脱がなきゃ……！！）
line = "（どんな羞恥プレイよ！？　さっさとホロウたちを倒して、すぐにこの衣装、脱がなきゃ……！！）"

[[dialogue]]
speaker = "ルルカ"
# 「よーっし！　お兄ちゃんのためにも、絶対に『星喰らい』を倒さなきゃ！」
line = "「よーっし！　お兄ちゃんのためにも、絶対に『星喰らい』を倒さなきゃ！」"

[[dialogue]]
speaker = "シャロン"
# 「会長さまから授かった新たな力……バレンタインフォーム。使いこなしてみせます！」
line = "「会長さまから授かった新たな力……バレンタインフォーム。使いこなしてみせます！」"

[[dialogue]]
speaker = "イクシリオン"
# 「花嫁……煩悩……はぅあっ！？　あ、危ないっ……また妄想の世界に旅立ってしまうところでしたっ！」
line = "「花嫁……煩悩……はぅあっ！？　あ、危ないっ……また妄想の世界に旅立ってしまうところでしたっ！」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
# 「──！？　何なのよお前たちは！？　普通の星騎士はいないの！？」
line = "「──！？　何なのよお前たちは！？　普通の星騎士はいないの！？」"

[[dialogue]]
speaker = "ウルスラ"
# 「ふふふ♪　チョコの甘い香りが満ち満ちて……バレンタインフォームですか。嗚呼──素晴らしいです<emoji=heart04>」
line = "「ふふふ♪　チョコの甘い香りが満ち満ちて……バレンタインフォームですか。嗚呼──素晴らしいです<emoji=heart04>」"

[[dialogue]]
speaker = "ウルスラ"
# 「麗しい見た目のバレンタインフォームの方々を見ていると、私もどんどん星力が湧き出てきちゃいます～っ<emoji=heart04>」
line = "「麗しい見た目のバレンタインフォームの方々を見ていると、私もどんどん星力が湧き出てきちゃいます～っ<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
# 「わわっ！？　ウルスラさんの星力が急にぐーんって伸びた！？　なんでぇっ！？」
line = "「わわっ！？　ウルスラさんの星力が急にぐーんって伸びた！？　なんでぇっ！？」"

[[dialogue]]
speaker = "ウルスラ"
# 「私はバレンタイン当日に爆発的に星力が伸びる星騎士……もちろん今日はバレンタインではありません」
line = "「私はバレンタイン当日に爆発的に星力が伸びる星騎士……もちろん今日はバレンタインではありません」"

[[dialogue]]
speaker = "ウルスラ"
# 「ですが、こんなにも素敵な愛とチョコの波動があれば──バレンタイン当日と言っても差し支えないでしょう♪」
line = "「ですが、こんなにも素敵な愛とチョコの波動があれば──バレンタイン当日と言っても差し支えないでしょう♪」"

[[dialogue]]
speaker = "ルルカ"
# 「そういう問題なんですか！？　自由過ぎない～っ！？」
line = "「そういう問題なんですか！？　自由過ぎない～っ！？」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「な、なぜっ……味方のバレンタインフォームを見ているだけなのに、この女は戦闘力が引き上げられているの！？」
line = "「な、なぜっ……味方のバレンタインフォームを見ているだけなのに、この女は戦闘力が引き上げられているの！？」"

[[dialogue]]
speaker = "エステル"
# 「す、すごい光景ですねケイティさん。皆様の星力が溢れ続け、眩しいほどです……！」
line = "「す、すごい光景ですねケイティさん。皆様の星力が溢れ続け、眩しいほどです……！」"

[[dialogue]]
speaker = "ケイティ"
# 「そうですね……ウェディングフォームにバレンタインフォーム。異なる世界の、魔王さんとの絆が形になる……このような奇蹟に出会えるとは」
line = "「そうですね……ウェディングフォームにバレンタインフォーム。異なる世界の、魔王さんとの絆が形になる……このような奇蹟に出会えるとは」"

[[dialogue]]
speaker = "エステル"
# 「私たちには、新たな戦闘服こそございませんが──」
line = "「私たちには、新たな戦闘服こそございませんが──」"

[[dialogue]]
speaker = "ケイティ"
# 「それでも、幹内世界から星力を借り受けることはできるようです。魔王さんの御力に感謝ですね」
line = "「それでも、幹内世界から星力を借り受けることはできるようです。魔王さんの御力に感謝ですね」"

[[dialogue]]
speaker = "エステル"
# 「はい！　エステル・ミルフォード……全力で参ります！」
line = "「はい！　エステル・ミルフォード……全力で参ります！」"

[[dialogue]]
speaker = "ケイティ"
# 「世界を乱す輩に鉄槌を……『制圧』させていただきましょう！」
line = "「世界を乱す輩に鉄槌を……『制圧』させていただきましょう！」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「こ、この２人だけはまとものようね……」
line = "「こ、この２人だけはまとものようね……」"

[[dialogue]]
speaker = "マトイ"
# 「二刀流の巫女……こういう力を身に着ける可能性も、私にはあるんだね！　会長から貰った力で、世界を救わなきゃ！」
line = "「二刀流の巫女……こういう力を身に着ける可能性も、私にはあるんだね！　会長から貰った力で、世界を救わなきゃ！」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
# 「って言ったそばから！　普通じゃないやつが来たわ！？」
line = "「って言ったそばから！　普通じゃないやつが来たわ！？」"

[[dialogue]]
speaker = "マトイ"
# 「私が────普通じゃない！？　本当に！？」
line = "「私が────普通じゃない！？　本当に！？」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「世界の命運をかけた戦いに、巫女服で来る輩が普通なわけがないでしょう！？　ノヴァフォームはどうしたの！？」
line = "「世界の命運をかけた戦いに、巫女服で来る輩が普通なわけがないでしょう！？　ノヴァフォームはどうしたの！？」"

[[dialogue]]
speaker = "マトイ"
# 「普通じゃないっ……普通じゃないんだ、今の私！！！」
line = "「普通じゃないっ……普通じゃないんだ、今の私！！！」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
# 「どうして喜んでいるの！？　お、恐ろしい……こいつら、頭がどうかしているんだわ！！」
line = "「どうして喜んでいるの！？　お、恐ろしい……こいつら、頭がどうかしているんだわ！！」"

[[dialogue]]
speaker = "ＸＥＬＯＳ"
# 「ギ────ガ、ガガ────！！」
line = "「ギ────ガ、ガガ────！！」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「……っ！　緋宮クロトの権能？　無数の可能性の宇宙に、働きかけを行っていると……！？」
line = "「……っ！　緋宮クロトの権能？　無数の可能性の宇宙に、働きかけを行っていると……！？」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「異なる世界に干渉する力……フロンティアドライブ？　そ、そんな……！！」
line = "「異なる世界に干渉する力……フロンティアドライブ？　そ、そんな……！！」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「緋宮クロト……やはりあの男は、存在してはならない！！」
line = "「緋宮クロト……やはりあの男は、存在してはならない！！」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
# 「……いいでしょう。ふざけた格好で死にたいのなら、お望みどおりにしてあげるわ……！！」
line = "「……いいでしょう。ふざけた格好で死にたいのなら、お望みどおりにしてあげるわ……！！」"

[[dialogue]]
speaker = "フィオナ"
# 「皆さん、戦闘準備を──来ますっ！！」
line = "「皆さん、戦闘準備を──来ますっ！！」"
