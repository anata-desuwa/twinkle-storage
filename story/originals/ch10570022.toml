[[dialogue]]
speaker = "unk"
# 第２話,魔界の正月異文化,P
line = "第２話,魔界の正月異文化,P"

[[dialogue]]
speaker = "unk"
# 俺とトリシャさん、ヴィーナスとフィオナの百人一首対決の結果は──
line = "俺とトリシャさん、ヴィーナスとフィオナの百人一首対決の結果は──"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふふん、私たちの勝ちね！　思ってた以上に白熱したわ！」
line = "「ふふん、私たちの勝ちね！　思ってた以上に白熱したわ！」"

[[dialogue]]
speaker = "トリシャ"
# 「残念です……それなりの枚数が取れたと思ったのですが……」
line = "「残念です……それなりの枚数が取れたと思ったのですが……」"

[[dialogue]]
speaker = "フィオナ"
# 「ええ、とても手強かったですよ。初めてとは思えないくらいでした」
line = "「ええ、とても手強かったですよ。初めてとは思えないくらいでした」"

[[dialogue]]
speaker = "unk"
# トリシャさんは楽しかった？
line = "トリシャさんは楽しかった？"

[[dialogue]]
speaker = "トリシャ"
# 「は、はい……楽しかったです……とても……」
line = "「は、はい……楽しかったです……とても……」"

[[dialogue]]
speaker = "トリシャ"
# 「また、やりたいです……その時までに、ちゃんと覚えておきます……」
line = "「また、やりたいです……その時までに、ちゃんと覚えておきます……」"

[[dialogue]]
speaker = "unk"
# 次は勝ちましょう！
line = "次は勝ちましょう！"

[[dialogue]]
speaker = "トリシャ"
# 「はい……必ず……！」
line = "「はい……必ず……！」"

[[dialogue]]
speaker = "フィオナ"
# 「ところでトリシャさん。さっきはカルタをしましたけど、魔界にも正月ならではの遊びや文化はあるのですか？」
line = "「ところでトリシャさん。さっきはカルタをしましたけど、魔界にも正月ならではの遊びや文化はあるのですか？」"

[[dialogue]]
speaker = "トリシャ"
# 「そうですね……日本ほど華々しくはありませんが……新年を迎える準備や宴は、魔界にも……あります」
line = "「そうですね……日本ほど華々しくはありませんが……新年を迎える準備や宴は、魔界にも……あります」"

[[dialogue]]
speaker = "unk"
# 魔界の正月文化、興味深いです
line = "魔界の正月文化、興味深いです"

[[dialogue]]
speaker = "トリシャ"
# 「そうでしょうか……？　さして面白くもないかと思いますが……私が知っているものでよければ、ご紹介します……」
line = "「そうでしょうか……？　さして面白くもないかと思いますが……私が知っているものでよければ、ご紹介します……」"

[[dialogue]]
speaker = "トリシャ"
# 「物心つく前に両親と離れ離れになってしまいましたし……あまり他人と接していなかったので、定かではない部分もありますが……」
line = "「物心つく前に両親と離れ離れになってしまいましたし……あまり他人と接していなかったので、定かではない部分もありますが……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ちょっと重めのスタートだわ！」
line = "「ちょっと重めのスタートだわ！」"

[[dialogue]]
speaker = "トリシャ"
# 「それに……いくつかの地方を転々としてたので……全ての地域で共通とも限りません……」
line = "「それに……いくつかの地方を転々としてたので……全ての地域で共通とも限りません……」"

[[dialogue]]
speaker = "フィオナ"
# 「なるほど。お雑煮ひとつ取っても、地方によって味が全然違ったりしますしね」
line = "「なるほど。お雑煮ひとつ取っても、地方によって味が全然違ったりしますしね」"

[[dialogue]]
speaker = "トリシャ"
# 「ああ……お雑煮やお節料理のように、特定の物……パンやお菓子を食す文化はありますね……」
line = "「ああ……お雑煮やお節料理のように、特定の物……パンやお菓子を食す文化はありますね……」"

[[dialogue]]
speaker = "トリシャ"
# 「ナッツのクリームをたっぷり使ったパンを……食べます……。歯が浮きそうなほどに甘く……それでいて香ばしく……とても美味です」
line = "「ナッツのクリームをたっぷり使ったパンを……食べます……。歯が浮きそうなほどに甘く……それでいて香ばしく……とても美味です」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ケーキみたいで美味しそうね！　お取り寄せはできないのかしら？」
line = "「ケーキみたいで美味しそうね！　お取り寄せはできないのかしら？」"

[[dialogue]]
speaker = "トリシャ"
# 「できれば私もお願いしたいところですが……難しいですね……残念です」
line = "「できれば私もお願いしたいところですが……難しいですね……残念です」"

[[dialogue]]
speaker = "トリシャ"
# 「他には……大きなお家では針葉樹を１本買ってきて……デコレーションをしていました……門松に近いかもしれません……」
line = "「他には……大きなお家では針葉樹を１本買ってきて……デコレーションをしていました……門松に近いかもしれません……」"

[[dialogue]]
speaker = "フィオナ"
# 「スケールが大きいですね。ちなみに、それはクリスマスツリーではないのですよね？」
line = "「スケールが大きいですね。ちなみに、それはクリスマスツリーではないのですよね？」"

[[dialogue]]
speaker = "トリシャ"
# 「はい……あくまでクリスマスではなく、新年にです……約１か月ほど……飾っておきます」
line = "「はい……あくまでクリスマスではなく、新年にです……約１か月ほど……飾っておきます」"

[[dialogue]]
speaker = "トリシャ"
# 「他には、そうですね……魔獣の毛皮をかぶって……街を練り歩いたり……」
line = "「他には、そうですね……魔獣の毛皮をかぶって……街を練り歩いたり……」"

[[dialogue]]
speaker = "フィオナ"
# 「日本でいうところの獅子舞みたいですね」
line = "「日本でいうところの獅子舞みたいですね」"

[[dialogue]]
speaker = "トリシャ"
# 「シシマイと違うのは、狩られた本物の魔獣の毛皮を用いてることですね……他にも……元日の１日だけで、ご飯を７回食べたり……」
line = "「シシマイと違うのは、狩られた本物の魔獣の毛皮を用いてることですね……他にも……元日の１日だけで、ご飯を７回食べたり……」"

[[dialogue]]
speaker = "トリシャ"
# 「年明けに、熟した果実を他人の家のドアに叩きつけて、真っ赤に染め上げるという風習も……」
line = "「年明けに、熟した果実を他人の家のドアに叩きつけて、真っ赤に染め上げるという風習も……」"

[[dialogue]]
speaker = "unk"
# ケンカになりそう！
line = "ケンカになりそう！"

[[dialogue]]
speaker = "unk"
# ちょっとスプラッタ！
line = "ちょっとスプラッタ！"

[[dialogue]]
speaker = "トリシャ"
# 「いえ、仲の良い家に当てるのです……紅く染まれば染まるほど、友人が多いという証明に……故に……私の家が赤に染まったことはありませんでした……フフフ……」
line = "「いえ、仲の良い家に当てるのです……紅く染まれば染まるほど、友人が多いという証明に……故に……私の家が赤に染まったことはありませんでした……フフフ……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「大丈夫、来年は私がトリシャを真っ赤に染めてあげるわ！」
line = "「大丈夫、来年は私がトリシャを真っ赤に染めてあげるわ！」"

[[dialogue]]
speaker = "トリシャ"
# 「それは……嬉しいです……友達……にへへ」
line = "「それは……嬉しいです……友達……にへへ」"

[[dialogue]]
speaker = "フィオナ"
# 「いえ、真っ赤に染めるのは家の方では……」
line = "「いえ、真っ赤に染めるのは家の方では……」"

[[dialogue]]
speaker = "unk"
# でもトリシャさんは嬉しそう
line = "でもトリシャさんは嬉しそう"

[[dialogue]]
speaker = "フィオナ"
# 「……そうですね。多少風習と違っても、きっといい思い出になります」
line = "「……そうですね。多少風習と違っても、きっといい思い出になります」"

[[dialogue]]
speaker = "トリシャ"
# 「他には……玄関のドアの上に、ニンニクを飾り……幸福を招く妖精をお出迎えします……」
line = "「他には……玄関のドアの上に、ニンニクを飾り……幸福を招く妖精をお出迎えします……」"

[[dialogue]]
speaker = "フィオナ"
# 「吸血鬼除けのような感じですが、日本でいうところのしめ縄飾りでしょうか？　幸福の妖精というのも、まるで座敷童みたいですね」
line = "「吸血鬼除けのような感じですが、日本でいうところのしめ縄飾りでしょうか？　幸福の妖精というのも、まるで座敷童みたいですね」"

[[dialogue]]
speaker = "unk"
# ──などなど、トリシャの口から様々な魔界の異文化風習が伝えられた。
line = "──などなど、トリシャの口から様々な魔界の異文化風習が伝えられた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「とっても面白かったわ！　世の中にはまだまだ知らないことがいっぱいね！」
line = "「とっても面白かったわ！　世の中にはまだまだ知らないことがいっぱいね！」"

[[dialogue]]
speaker = "フィオナ"
# 「魔界の風習であっても、どこか人間界と遠からずな部分があるのですね。世界の繋がりを感じられて、とても興味深かったです」
line = "「魔界の風習であっても、どこか人間界と遠からずな部分があるのですね。世界の繋がりを感じられて、とても興味深かったです」"

[[dialogue]]
speaker = "トリシャ"
# 「はい……私がこの国に親しみを感じるのも……そういった繋がりによるものなのでしょう……フフフ」
line = "「はい……私がこの国に親しみを感じるのも……そういった繋がりによるものなのでしょう……フフフ」"

[[dialogue]]
speaker = "トリシャ"
# 「こちらの振袖も……着てる内にすっかり馴染みました……和装の文化、とても素晴らしいですね……」
line = "「こちらの振袖も……着てる内にすっかり馴染みました……和装の文化、とても素晴らしいですね……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふふふ、でもね、トリシャ。和装には思わぬ落とし穴があるのよ！」
line = "「ふふふ、でもね、トリシャ。和装には思わぬ落とし穴があるのよ！」"

[[dialogue]]
speaker = "トリシャ"
# 「落とし穴ですか……？　なんでしょう……何か間違っていたでしょうか……」
line = "「落とし穴ですか……？　なんでしょう……何か間違っていたでしょうか……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「和服はね、下着を着けないものなの！」
line = "「和服はね、下着を着けないものなの！」"

[[dialogue]]
speaker = "トリシャ"
# 「そ……そうなのですか……？　上は着けていませんが、下は履いてしまっていますね……」
line = "「そ……そうなのですか……？　上は着けていませんが、下は履いてしまっていますね……」"

[[dialogue]]
speaker = "unk"
# 上、つけてないの！？
line = "上、つけてないの！？"

[[dialogue]]
speaker = "トリシャ"
# 「はい……羽根つきの時も、百人一首の時も……下手に動くと、ずり落ちてしまいそうでした……」
line = "「はい……羽根つきの時も、百人一首の時も……下手に動くと、ずり落ちてしまいそうでした……」"

[[dialogue]]
speaker = "フィオナ"
# 「トリシャさんの胸元に、下着の紐が見えないとは思っていましたが、まさかつけていなかったとは……！　いえ、肝心な箇所はまだ見えていませんが！」
line = "「トリシャさんの胸元に、下着の紐が見えないとは思っていましたが、まさかつけていなかったとは……！　いえ、肝心な箇所はまだ見えていませんが！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「鉄壁のブロックね！」
line = "「鉄壁のブロックね！」"

[[dialogue]]
speaker = "unk"
# ごくり……！
line = "ごくり……！"

[[dialogue]]
speaker = "フィオナ"
# 「緋宮会長、鼻の下が伸びてますよ。ちなみに和装で下着を着用しなかったのは昔の話ですからね」
line = "「緋宮会長、鼻の下が伸びてますよ。ちなみに和装で下着を着用しなかったのは昔の話ですからね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうね、クロトみたいにえっちな目で見る男の子もいるから、ニプレスくらいはつけた方が良いかもだわ」
line = "「そうね、クロトみたいにえっちな目で見る男の子もいるから、ニプレスくらいはつけた方が良いかもだわ」"

[[dialogue]]
speaker = "トリシャ"
# 「はぁ……ですが、乳房くらい……見られても構わないのでは……？」
line = "「はぁ……ですが、乳房くらい……見られても構わないのでは……？」"

[[dialogue]]
speaker = "フィオナ"
# 「トリシャさん！？」
line = "「トリシャさん！？」"

[[dialogue]]
speaker = "トリシャ"
# 「そんなに驚くことでしょうか……？　友達同士ならば、一緒にお風呂に入ったり……裸体を見せ合うのも……普通では……？　減る物でもありませんし……」
line = "「そんなに驚くことでしょうか……？　友達同士ならば、一緒にお風呂に入ったり……裸体を見せ合うのも……普通では……？　減る物でもありませんし……」"

[[dialogue]]
speaker = "フィオナ"
# 「絶対に普通ではありませんよ！？　まさかトリシャさん自身が、一番の異文化の持ち主とは思いませんでした……」
line = "「絶対に普通ではありませんよ！？　まさかトリシャさん自身が、一番の異文化の持ち主とは思いませんでした……」"

[[dialogue]]
speaker = "unk"
# 最後の最後でトリシャさんの過激な異文化感が炸裂したけれど、これは人間界・魔界には関係なく。
line = "最後の最後でトリシャさんの過激な異文化感が炸裂したけれど、これは人間界・魔界には関係なく。"

[[dialogue]]
speaker = "unk"
# ただ単にトリシャさんの人づきあいの距離感がズレてるだけなのかもしれない。
line = "ただ単にトリシャさんの人づきあいの距離感がズレてるだけなのかもしれない。"
