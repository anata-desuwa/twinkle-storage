[[dialogue]]
speaker = "unk"
# 第３話,ウェディングモデル？,P
line = "第３話,ウェディングモデル？,P"

[[dialogue]]
speaker = "フィオナ"
# 「実は、先日お世話になった結婚式場の方に、広告のモデルになってくれないかとお願いされまして……」
line = "「実は、先日お世話になった結婚式場の方に、広告のモデルになってくれないかとお願いされまして……」"

[[dialogue]]
speaker = "フィオナ"
# 「いろいろとご迷惑をおかけしましたから、私としてはやぶさかではないのですが……緋宮会長がお嫌ならもちろん断っていただいてかまいません。いかがでしょう？」
line = "「いろいろとご迷惑をおかけしましたから、私としてはやぶさかではないのですが……緋宮会長がお嫌ならもちろん断っていただいてかまいません。いかがでしょう？」"

[[dialogue]]
speaker = "unk"
# やりたい！
line = "やりたい！"

[[dialogue]]
speaker = "フィオナ"
# 「即決！？」
line = "「即決！？」"

[[dialogue]]
speaker = "フィオナ"
# 「そんなに前のめりになっていただけるとは予想外でしたが、緋宮会長がそう仰るなら、承諾の返事をしておきますね」
line = "「そんなに前のめりになっていただけるとは予想外でしたが、緋宮会長がそう仰るなら、承諾の返事をしておきますね」"

[[dialogue]]
speaker = "unk"
# 数日後、準備が整ったと連絡があり、以前使わせてもらった結婚式場へ向かった。
line = "数日後、準備が整ったと連絡があり、以前使わせてもらった結婚式場へ向かった。"

[[dialogue]]
speaker = "フィオナ"
# 「これから私たちは、結婚式を挙げる新郎新婦になって、写真を撮ってもらいます」
line = "「これから私たちは、結婚式を挙げる新郎新婦になって、写真を撮ってもらいます」"

[[dialogue]]
speaker = "フィオナ"
# 「結婚式のふりは前もしましたけど、やっぱり照れますね……」
line = "「結婚式のふりは前もしましたけど、やっぱり照れますね……」"

[[dialogue]]
speaker = "unk"
# ウェディングドレス、何度見ても似合ってるよ
line = "ウェディングドレス、何度見ても似合ってるよ"

[[dialogue]]
speaker = "フィオナ"
# 「──！　うぅ、ずるいです……あなたはいつもいつも、私が嬉しくなるようなことばかり言って……」
line = "「──！　うぅ、ずるいです……あなたはいつもいつも、私が嬉しくなるようなことばかり言って……」"

[[dialogue]]
speaker = "フィオナ"
# 「大人っぽくて綺麗？　白が清楚なフィオナに合っている？　もう、褒め殺しですね……」
line = "「大人っぽくて綺麗？　白が清楚なフィオナに合っている？　もう、褒め殺しですね……」"

[[dialogue]]
speaker = "フィオナ"
# 「でもあなただって、タキシード、似合っていますよ。引き締まった色があなたらしくてかっこいいです」
line = "「でもあなただって、タキシード、似合っていますよ。引き締まった色があなたらしくてかっこいいです」"

[[dialogue]]
speaker = "ナミエル"
# 「コホン」
line = "「コホン」"

[[dialogue]]
speaker = "フィオナ"
# 「ひやっ──！？　ナミエル、どうしてここに！？」
line = "「ひやっ──！？　ナミエル、どうしてここに！？」"

[[dialogue]]
speaker = "ナミエル"
# 「緋宮会長が不埒なことをされないよう、監視のために参りました。フィオナお嬢様とおふたりだからって、いかがわしいことをされないようご注意ください」
line = "「緋宮会長が不埒なことをされないよう、監視のために参りました。フィオナお嬢様とおふたりだからって、いかがわしいことをされないようご注意ください」"

[[dialogue]]
speaker = "ナミエル"
# 「まずは並んだ写真を撮るそうです。今日はあくまでモデルとしての撮影ですから、あまり近づきすぎないでくださいね、緋宮会長」
line = "「まずは並んだ写真を撮るそうです。今日はあくまでモデルとしての撮影ですから、あまり近づきすぎないでくださいね、緋宮会長」"

[[dialogue]]
speaker = "フィオナ"
# 「もう、ナミエルってば心配し過ぎなんだから……」
line = "「もう、ナミエルってば心配し過ぎなんだから……」"

[[dialogue]]
speaker = "フィオナ"
# 「このくらいの距離ですかね。ちょっと緊張します」
line = "「このくらいの距離ですかね。ちょっと緊張します」"

[[dialogue]]
speaker = "ナミエル"
# 「フィオナお嬢様、表情が硬いとカメラマンの方が仰っています。もう少し自然な笑顔が欲しいそうです」
line = "「フィオナお嬢様、表情が硬いとカメラマンの方が仰っています。もう少し自然な笑顔が欲しいそうです」"

[[dialogue]]
speaker = "フィオナ"
# 「えっ？　そう言われてもどうしたら……」
line = "「えっ？　そう言われてもどうしたら……」"

[[dialogue]]
speaker = "unk"
# （肩をそっと抱き寄せる）
line = "（肩をそっと抱き寄せる）"

[[dialogue]]
speaker = "フィオナ"
# 「あ……」
line = "「あ……」"

[[dialogue]]
speaker = "フィオナ"
# 「ふふ……こうでしょうか」
line = "「ふふ……こうでしょうか」"

[[dialogue]]
speaker = "ナミエル"
# （むぅ……幸せそうな笑顔……本当に緋宮会長のお嫁さんみたいです）
line = "（むぅ……幸せそうな笑顔……本当に緋宮会長のお嫁さんみたいです）"

[[dialogue]]
speaker = "ナミエル"
# 「フィオナお嬢様。次は腕を組んで、もう１枚お願いします」
line = "「フィオナお嬢様。次は腕を組んで、もう１枚お願いします」"

[[dialogue]]
speaker = "フィオナ"
# 「うん、わかった。緋宮会長、失礼しますね」
line = "「うん、わかった。緋宮会長、失礼しますね」"

[[dialogue]]
speaker = "フィオナ"
# 「んしょ。これでいい？」
line = "「んしょ。これでいい？」"

[[dialogue]]
speaker = "ナミエル"
# 「はい、少しじっとしていてください。……撮れました」
line = "「はい、少しじっとしていてください。……撮れました」"

[[dialogue]]
speaker = "ナミエル"
# 「次は誓いのキスのシーンです。ですが本当にキスをする必要はありません。向き合って顔を近づけるだけでいいですから」
line = "「次は誓いのキスのシーンです。ですが本当にキスをする必要はありません。向き合って顔を近づけるだけでいいですから」"

[[dialogue]]
speaker = "フィオナ"
# 「わかってるって。緋宮会長、お願いします」
line = "「わかってるって。緋宮会長、お願いします」"

[[dialogue]]
speaker = "フィオナ"
# 「あ──」
line = "「あ──」"

[[dialogue]]
speaker = "フィオナ"
# 「顔が近くて……こうしてると、つい唇が触れてしまいそうです……」
line = "「顔が近くて……こうしてると、つい唇が触れてしまいそうです……」"

[[dialogue]]
speaker = "フィオナ"
# 「緋宮会長……」
line = "「緋宮会長……」"

[[dialogue]]
speaker = "ナミエル"
# 「ひ、緋宮会長、本当にキスしてはいけませんからねっ！　それに見つめすぎですっ、もう写真は撮れましたからっ」
line = "「ひ、緋宮会長、本当にキスしてはいけませんからねっ！　それに見つめすぎですっ、もう写真は撮れましたからっ」"

[[dialogue]]
speaker = "フィオナ"
# 「あ、あはは……ちょっと雰囲気に呑まれちゃったかな……」
line = "「あ、あはは……ちょっと雰囲気に呑まれちゃったかな……」"

[[dialogue]]
speaker = "ナミエル"
# 「お気を付けください。最後は自由に、おふたりの好きなシチュエーションで写真を撮りたいそうです」
line = "「お気を付けください。最後は自由に、おふたりの好きなシチュエーションで写真を撮りたいそうです」"

[[dialogue]]
speaker = "unk"
# それなら──
line = "それなら──"

[[dialogue]]
speaker = "フィオナ"
# 「ひゃっ！？　お姫様抱っこ……！？」
line = "「ひゃっ！？　お姫様抱っこ……！？」"

[[dialogue]]
speaker = "フィオナ"
# （さっきよりも顔が近くて、ドキドキしちゃう……心臓の音、緋宮会長に聞こえてないかな……？）
line = "（さっきよりも顔が近くて、ドキドキしちゃう……心臓の音、緋宮会長に聞こえてないかな……？）"

[[dialogue]]
speaker = "フィオナ"
# （でも嫌なドキドキじゃなくて、むしろ気持ち良くて……ずっとこのままでいたいと思っちゃう……）
line = "（でも嫌なドキドキじゃなくて、むしろ気持ち良くて……ずっとこのままでいたいと思っちゃう……）"

[[dialogue]]
speaker = "フィオナ"
# 「重いかもしれませんけど、もう少しだけ抱っこしててくださいね。……ちゅっ<emoji=heart04>」
line = "「重いかもしれませんけど、もう少しだけ抱っこしててくださいね。……ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ！？
line = "！？"

[[dialogue]]
speaker = "フィオナ"
# 「えへへ……ほっぺにキスしちゃいました<emoji=heart04>　でも結婚式でお姫様抱っこなんですから、これくらいするのは普通ですよね？」
line = "「えへへ……ほっぺにキスしちゃいました<emoji=heart04>　でも結婚式でお姫様抱っこなんですから、これくらいするのは普通ですよね？」"

[[dialogue]]
speaker = "ナミエル"
# 「ハ──ハ──ハレンチです～～～～～っ！！？」
line = "「ハ──ハ──ハレンチです～～～～～っ！！？」"

[[dialogue]]
speaker = "unk"
# それから数日後──
line = "それから数日後──"

[[dialogue]]
speaker = "フィオナ"
# 「すみません。この前撮った写真ですが、ナミエルからお父様に伝わって、お蔵入りになってしまいました……」
line = "「すみません。この前撮った写真ですが、ナミエルからお父様に伝わって、お蔵入りになってしまいました……」"

[[dialogue]]
speaker = "フィオナ"
# 「でも写真は頂けました。ほら、よく撮れてますよね」
line = "「でも写真は頂けました。ほら、よく撮れてますよね」"

[[dialogue]]
speaker = "フィオナ"
# 「いい思い出になりました。ふふふ♪」
line = "「いい思い出になりました。ふふふ♪」"
