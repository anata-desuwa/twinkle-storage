[[dialogue]]
speaker = "unk"
# 第２話,挑戦と新たな誓い,P
line = "第２話,挑戦と新たな誓い,P"

[[dialogue]]
speaker = "unk"
# お正月を迎え、俺はサーシャさんと２人で初詣に訪れていた。
line = "お正月を迎え、俺はサーシャさんと２人で初詣に訪れていた。"

[[dialogue]]
speaker = "サーシャ"
# 「――うん？　『スーパー晴れ着フォーム』の調子？　ええ、あれからも獅子舞さんやリーリアちゃんに力の使い方を教わりながら、訓練も続けていて順調よ♪」
line = "「――うん？　『スーパー晴れ着フォーム』の調子？　ええ、あれからも獅子舞さんやリーリアちゃんに力の使い方を教わりながら、訓練も続けていて順調よ♪」"

[[dialogue]]
speaker = "サーシャ"
# 「私、晴れ着フォームとの相性がいいらしくて、どうやらノヴァフォームと同じくらい高出力の星力が引き出せるみたいなの」
line = "「私、晴れ着フォームとの相性がいいらしくて、どうやらノヴァフォームと同じくらい高出力の星力が引き出せるみたいなの」"

[[dialogue]]
speaker = "サーシャ"
# 「でもその分、力のコントロールは難しくて、この前みたいにうっかり狙いを外しちゃったりとか、まだまだ粗は多いのよ～」
line = "「でもその分、力のコントロールは難しくて、この前みたいにうっかり狙いを外しちゃったりとか、まだまだ粗は多いのよ～」"

[[dialogue]]
speaker = "unk"
# 参拝を終えた後、このまま浅草でデートをしようという流れになり、並んで歩きながら話をしていると――俺はふと、以前の話を思い出した。
line = "参拝を終えた後、このまま浅草でデートをしようという流れになり、並んで歩きながら話をしていると――俺はふと、以前の話を思い出した。"

[[dialogue]]
speaker = "unk"
# そういえば、小説の方はどうですか？
line = "そういえば、小説の方はどうですか？"

[[dialogue]]
speaker = "サーシャ"
# 「それね～。そっちは想像以上に難しいわ～」
line = "「それね～。そっちは想像以上に難しいわ～」"

[[dialogue]]
speaker = "サーシャ"
# 「いざ小説を書こうとしてみて、改めてわかったわ。私はこれまで、あまり自分の気持ちに向き合ってこなかった」
line = "「いざ小説を書こうとしてみて、改めてわかったわ。私はこれまで、あまり自分の気持ちに向き合ってこなかった」"

[[dialogue]]
speaker = "サーシャ"
# 「ううん、自分の気持ちだけじゃないわ。私はなまじ感覚だけである程度のことはできてしまうから、どんなことでも『なんとなく』で済ませちゃう、悪い癖があるみたい」
line = "「ううん、自分の気持ちだけじゃないわ。私はなまじ感覚だけである程度のことはできてしまうから、どんなことでも『なんとなく』で済ませちゃう、悪い癖があるみたい」"

[[dialogue]]
speaker = "サーシャ"
# 「よく言えば『要領がいい』ってことなのかしら。勉強とか、星術とか、思い返すとあんまり苦労した覚えがないの」
line = "「よく言えば『要領がいい』ってことなのかしら。勉強とか、星術とか、思い返すとあんまり苦労した覚えがないの」"

[[dialogue]]
speaker = "サーシャ"
# 「でもね、同時に極めたと言えるほど深く知っていることは何もない。全部『なんとなく』のまま」
line = "「でもね、同時に極めたと言えるほど深く知っていることは何もない。全部『なんとなく』のまま」"

[[dialogue]]
speaker = "サーシャ"
# 「わりとまんべんなくこなせるせいで、苦手と向き合う機会がなかったから──」
line = "「わりとまんべんなくこなせるせいで、苦手と向き合う機会がなかったから──」"

[[dialogue]]
speaker = "サーシャ"
# 「そのせいで、自分の苦手なことを見て見ぬフリというか、スルーしちゃう逃げ癖が付いちゃってたみたい」
line = "「そのせいで、自分の苦手なことを見て見ぬフリというか、スルーしちゃう逃げ癖が付いちゃってたみたい」"

[[dialogue]]
speaker = "unk"
# そう言って、サーシャさんは少し照れ臭そうに微笑んだ。
line = "そう言って、サーシャさんは少し照れ臭そうに微笑んだ。"

[[dialogue]]
speaker = "サーシャ"
# 「そういう自分がいることにも、小説を書き始めて気づけたの」
line = "「そういう自分がいることにも、小説を書き始めて気づけたの」"

[[dialogue]]
speaker = "サーシャ"
# 「『あっ、私、小説を書くのがすごく苦手なんだ』って壁にぶつかって、ようやく自分の一部分に意識が行くようになったわ」
line = "「『あっ、私、小説を書くのがすごく苦手なんだ』って壁にぶつかって、ようやく自分の一部分に意識が行くようになったわ」"

[[dialogue]]
speaker = "サーシャ"
# 「でもね、不思議なんだけど……その『全然上手く行かない』って感覚が、今とっても『楽しく』感じるのよ」
line = "「でもね、不思議なんだけど……その『全然上手く行かない』って感覚が、今とっても『楽しく』感じるのよ」"

[[dialogue]]
speaker = "サーシャ"
# 「きっと、小説を読むのも、書くのも、私には生まれ持った才能がまったくなくて、無意識に避けてきた分野なんだと思うわ」
line = "「きっと、小説を読むのも、書くのも、私には生まれ持った才能がまったくなくて、無意識に避けてきた分野なんだと思うわ」"

[[dialogue]]
speaker = "サーシャ"
# 「だから私は、生まれて初めて、なんとなくでは『思い通りにならないもの』にチャレンジしてる」
line = "「だから私は、生まれて初めて、なんとなくでは『思い通りにならないもの』にチャレンジしてる」"

[[dialogue]]
speaker = "サーシャ"
# 「その試行錯誤が今、とっても新鮮で、楽しく感じるのよ」
line = "「その試行錯誤が今、とっても新鮮で、楽しく感じるのよ」"

[[dialogue]]
speaker = "unk"
# 新しいことに挑戦して、それを楽しめるなんて、すごいと思う。俺は学園に転入する前のバイト時代、仕事を楽しめていただろうかと、今更ながら思い返す。
line = "新しいことに挑戦して、それを楽しめるなんて、すごいと思う。俺は学園に転入する前のバイト時代、仕事を楽しめていただろうかと、今更ながら思い返す。"

[[dialogue]]
speaker = "unk"
# 俺も何か新しい事に挑戦してみようかな……
line = "俺も何か新しい事に挑戦してみようかな……"

[[dialogue]]
speaker = "サーシャ"
# 「ふふふっ。いいと思うわ～」
line = "「ふふふっ。いいと思うわ～」"

[[dialogue]]
speaker = "サーシャ"
# 「『できないこと』が少しずつ『できるようになる』のって、凄く楽しいわよね♪」
line = "「『できないこと』が少しずつ『できるようになる』のって、凄く楽しいわよね♪」"

[[dialogue]]
speaker = "サーシャ"
# 「……昔の私だったら、好きな人のお世話はなんでもしてあげたいって思ってたわ。ううん、実を言うと、今も思ってる」
line = "「……昔の私だったら、好きな人のお世話はなんでもしてあげたいって思ってたわ。ううん、実を言うと、今も思ってる」"

[[dialogue]]
speaker = "サーシャ"
# 「でも、この『楽しさ』を好きな人から安易に奪うのは良くないんじゃないかって、そういうことは少しわかるようになってきたの」
line = "「でも、この『楽しさ』を好きな人から安易に奪うのは良くないんじゃないかって、そういうことは少しわかるようになってきたの」"

[[dialogue]]
speaker = "サーシャ"
# 「全部私１人でやってしまうよりも、好きな人と一緒に、上手く行ったり、失敗したりしながら、一緒に楽しんでいく方が、きっと幸せなのよね」
line = "「全部私１人でやってしまうよりも、好きな人と一緒に、上手く行ったり、失敗したりしながら、一緒に楽しんでいく方が、きっと幸せなのよね」"

[[dialogue]]
speaker = "unk"
# ふと俺は、サーシャさんがいつか、魔界や天界を旅したいと言ってたことを思い出して、改めて聞いてみる。
line = "ふと俺は、サーシャさんがいつか、魔界や天界を旅したいと言ってたことを思い出して、改めて聞いてみる。"

[[dialogue]]
speaker = "サーシャ"
# 「――ええ。できれば前人未踏の、誰も行ったことのない場所に行ってみたいって思うわ」
line = "「――ええ。できれば前人未踏の、誰も行ったことのない場所に行ってみたいって思うわ」"

[[dialogue]]
speaker = "unk"
# その時に役立つスキルを勉強してみようかな
line = "その時に役立つスキルを勉強してみようかな"

[[dialogue]]
speaker = "unk"
# バイトで経験できた範囲のサバイバル術は心得があるが、毒キノコの見分け方とか、魔界の原生生物の狩猟法や調理法とか、そういう『冒険家スキル』があればもっと便利だろう。
line = "バイトで経験できた範囲のサバイバル術は心得があるが、毒キノコの見分け方とか、魔界の原生生物の狩猟法や調理法とか、そういう『冒険家スキル』があればもっと便利だろう。"

[[dialogue]]
speaker = "サーシャ"
# 「それって……そういうスキルがあれば、前に私と約束した、将来の旅の計画が立てやすくなるからってこと？」
line = "「それって……そういうスキルがあれば、前に私と約束した、将来の旅の計画が立てやすくなるからってこと？」"

[[dialogue]]
speaker = "unk"
# 俺が頷くと、サーシャさんは感激したように顔を輝かせ、そのまま勢いよく抱きついてきた。
line = "俺が頷くと、サーシャさんは感激したように顔を輝かせ、そのまま勢いよく抱きついてきた。"

[[dialogue]]
speaker = "サーシャ"
# 「会長くんっ♪　ぎゅ～っ<emoji=heart04>」
line = "「会長くんっ♪　ぎゅ～っ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# わぷっ、サーシャさん、おっぱいが……！？
line = "わぷっ、サーシャさん、おっぱいが……！？"

[[dialogue]]
speaker = "unk"
# 晴れ着でもこぼれんばかりの胸が俺の顔に押し付けられ、柔らか天国と息のできない地獄にむにゅっと挟まれる。
line = "晴れ着でもこぼれんばかりの胸が俺の顔に押し付けられ、柔らか天国と息のできない地獄にむにゅっと挟まれる。"

[[dialogue]]
speaker = "サーシャ"
# 「すっごく嬉しいわ、会長くん……！」
line = "「すっごく嬉しいわ、会長くん……！」"

[[dialogue]]
speaker = "サーシャ"
# 「今まで他の人には、秘境を旅したいという夢を語っても、そこまで真面目に受け止めてもらえたことってなかったの」
line = "「今まで他の人には、秘境を旅したいという夢を語っても、そこまで真面目に受け止めてもらえたことってなかったの」"

[[dialogue]]
speaker = "サーシャ"
# 「前人未踏の地を旅するだなんて、私自身もどんな風になるのかまだ想像が付いていないんだから、仕方のないことだけれど……」
line = "「前人未踏の地を旅するだなんて、私自身もどんな風になるのかまだ想像が付いていないんだから、仕方のないことだけれど……」"

[[dialogue]]
speaker = "サーシャ"
# 「でも、会長くんだけが、そこを一緒に旅をすることを想像して、ちゃんと考えてくれた……！」
line = "「でも、会長くんだけが、そこを一緒に旅をすることを想像して、ちゃんと考えてくれた……！」"

[[dialogue]]
speaker = "サーシャ"
# 「『心が繋がる』って、こういうことを言うのかしら？　だとしたら、本当に素晴らしいことね」
line = "「『心が繋がる』って、こういうことを言うのかしら？　だとしたら、本当に素晴らしいことね」"

[[dialogue]]
speaker = "サーシャ"
# 「なんだかお姉ちゃん、おかげですっごくやる気が出てきちゃったわ～♪」
line = "「なんだかお姉ちゃん、おかげですっごくやる気が出てきちゃったわ～♪」"

[[dialogue]]
speaker = "サーシャ"
# 「会長くん、リクリエなんてさっさとやっつけて、絶対に平和な世界を作りましょう。そして、私と一緒に旅をして欲しいわ」
line = "「会長くん、リクリエなんてさっさとやっつけて、絶対に平和な世界を作りましょう。そして、私と一緒に旅をして欲しいわ」"

[[dialogue]]
speaker = "サーシャ"
# 「その為に、私も一緒にサバイバル術の勉強をするし、会長くんを守れるくらい星騎士としても強くなってみせるから♪」
line = "「その為に、私も一緒にサバイバル術の勉強をするし、会長くんを守れるくらい星騎士としても強くなってみせるから♪」"

[[dialogue]]
speaker = "サーシャ"
# 「この世界にはまだまだ、見たこともない『楽しいこと』が眠っているんだもの。勝手に最初からやり直しにだなんて、させないわ」
line = "「この世界にはまだまだ、見たこともない『楽しいこと』が眠っているんだもの。勝手に最初からやり直しにだなんて、させないわ」"

[[dialogue]]
speaker = "サーシャ"
# 「うふふっ♪」
line = "「うふふっ♪」"

[[dialogue]]
speaker = "unk"
# そうしてサーシャさんは俺に、頼もしい笑顔を浮かべてみせるのだった。
line = "そうしてサーシャさんは俺に、頼もしい笑顔を浮かべてみせるのだった。"
