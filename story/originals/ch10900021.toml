[[dialogue]]
speaker = "unk"
# 第１話,メイプルとロロット,P
line = "第１話,メイプルとロロット,P"

[[dialogue]]
speaker = "unk"
# 異世界の流星クルセイダースの一員であるロロット・ローゼンクロイツ。
line = "異世界の流星クルセイダースの一員であるロロット・ローゼンクロイツ。"

[[dialogue]]
speaker = "unk"
# 世界の境界の乱れが落ち着くまで時間がかかる為、俺はメイプルと共に、彼女から流星町を案内してもらっていた――
line = "世界の境界の乱れが落ち着くまで時間がかかる為、俺はメイプルと共に、彼女から流星町を案内してもらっていた――"

[[dialogue]]
speaker = "メイプル"
# 「ここが流星町の<ruby=つきのお>月ノ尾</ruby>公園か～♪」
line = "「ここが流星町の<ruby>月ノ尾<rt>つきのお</rt></ruby>公園か～♪」"

[[dialogue]]
speaker = "ロロット"
# 「じ～っ……」
line = "「じ～っ……」"

[[dialogue]]
speaker = "メイプル"
# 「ん？　ロロット？　あたしの顔をじっと見たりして、どうしたの？」
line = "「ん？　ロロット？　あたしの顔をじっと見たりして、どうしたの？」"

[[dialogue]]
speaker = "ロロット"
# 「――やっぱり、雰囲気が似ているのです」
line = "「――やっぱり、雰囲気が似ているのです」"

[[dialogue]]
speaker = "メイプル"
# 「それって、この戦闘服の元になった『マカロン』って子のこと？」
line = "「それって、この戦闘服の元になった『マカロン』って子のこと？」"

[[dialogue]]
speaker = "ロロット"
# 「はい。わたしとルリエルさんがそうであるように、あなたはわたしたちが知っているその人と――」
line = "「はい。わたしとルリエルさんがそうであるように、あなたはわたしたちが知っているその人と――」"

[[dialogue]]
speaker = "ロロット"
# 「ズバリ、『キャラ被り』をしているのです！」
line = "「ズバリ、『キャラ被り』をしているのです！」"

[[dialogue]]
speaker = "メイプル"
# 「その言い方はどうなのかな！？」
line = "「その言い方はどうなのかな！？」"

[[dialogue]]
speaker = "ロロット"
# 「ところで、お名前はなんでしたっけ？」
line = "「ところで、お名前はなんでしたっけ？」"

[[dialogue]]
speaker = "メイプル"
# 「しかもまだちゃんと名前を覚えられてない！」
line = "「しかもまだちゃんと名前を覚えられてない！」"

[[dialogue]]
speaker = "メイプル"
# 「もう！　１回自己紹介したでしょ！　メイプルだよ、メイプル！」
line = "「もう！　１回自己紹介したでしょ！　メイプルだよ、メイプル！」"

[[dialogue]]
speaker = "ロロット"
# 「おお！　そうでした。舐めたら甘そうなお名前というのは覚えていたのですが、失礼しました、２号さん」
line = "「おお！　そうでした。舐めたら甘そうなお名前というのは覚えていたのですが、失礼しました、２号さん」"

[[dialogue]]
speaker = "メイプル"
# 「似てるからって２号呼びは酷くないかな！？」
line = "「似てるからって２号呼びは酷くないかな！？」"

[[dialogue]]
speaker = "ロロット"
# 「ところで、気になっていたのですが――」
line = "「ところで、気になっていたのですが――」"

[[dialogue]]
speaker = "メイプル"
# 「な、何……？」
line = "「な、何……？」"

[[dialogue]]
speaker = "ロロット"
# 「２号さんがずっと連れている、クマのぬいぐるみ……お名前はあるのでしょうか？」
line = "「２号さんがずっと連れている、クマのぬいぐるみ……お名前はあるのでしょうか？」"

[[dialogue]]
speaker = "メイプル"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "メイプル"
# 「そういえば、ロロットも豚の貯金箱を抱っこしてるよね？　もしかして……」
line = "「そういえば、ロロットも豚の貯金箱を抱っこしてるよね？　もしかして……」"

[[dialogue]]
speaker = "メイプル"
# 「それにもちゃんと名前がある感じ？」
line = "「それにもちゃんと名前がある感じ？」"

[[dialogue]]
speaker = "ロロット"
# 「はい♪　この貯金箱は『トントロ』というのです！」
line = "「はい♪　この貯金箱は『トントロ』というのです！」"

[[dialogue]]
speaker = "メイプル"
# 「そうなんだ♪　あたしのはね、本当はモノクロベアーっていう白黒のパペットで――それっ♪」
line = "「そうなんだ♪　あたしのはね、本当はモノクロベアーっていう白黒のパペットで――それっ♪」"

[[dialogue]]
speaker = "メイプル"
# 「じゃ～ん♪　名前は白い方がベッキーで、黒い方がアルザードって言うんだよ♪」
line = "「じゃ～ん♪　名前は白い方がベッキーで、黒い方がアルザードって言うんだよ♪」"

[[dialogue]]
speaker = "ロロット"
# 「わぁ～♪　可愛いのです♪」
line = "「わぁ～♪　可愛いのです♪」"

[[dialogue]]
speaker = "unk"
# と、その時だった。
line = "と、その時だった。"

[[dialogue]]
speaker = "unk"
# ロロットがはしゃいで身を乗り出した拍子に、トントロが腕からポロッと滑り落ちて――
line = "ロロットがはしゃいで身を乗り出した拍子に、トントロが腕からポロッと滑り落ちて――"

[[dialogue]]
speaker = "メイプル"
# 「ちょっ……ロロット！？」
line = "「ちょっ……ロロット！？」"

[[dialogue]]
speaker = "ロロット"
# 「え？　あっ！」
line = "「え？　あっ！」"

[[dialogue]]
speaker = "ロロット"
# 「ああぁ～っ！？　トントロぉぉぉ～～～ッ！！！」
line = "「ああぁ～っ！？　トントロぉぉぉ～～～ッ！！！」"

[[dialogue]]
speaker = "unk"
# トントロは地面に落ちて、無残にも砕け散ってしまった。
line = "トントロは地面に落ちて、無残にも砕け散ってしまった。"

[[dialogue]]
speaker = "メイプル"
# 「わあああぁ～～～っ！？　は、破片を拾い集めないと！」
line = "「わあああぁ～～～っ！？　は、破片を拾い集めないと！」"

[[dialogue]]
speaker = "ロロット"
# 「ふぅ。なんとか元に戻ったのです……！」
line = "「ふぅ。なんとか元に戻ったのです……！」"

[[dialogue]]
speaker = "メイプル"
# 「まさか瞬間接着剤を常時持ち歩いているとは……しかも、器用に直しちゃうし」
line = "「まさか瞬間接着剤を常時持ち歩いているとは……しかも、器用に直しちゃうし」"

[[dialogue]]
speaker = "ロロット"
# 「ふふふ、不思議とよく割れてしまうので、直し慣れているのです♪」
line = "「ふふふ、不思議とよく割れてしまうので、直し慣れているのです♪」"

[[dialogue]]
speaker = "メイプル"
# 「自慢げに言うことじゃないよ！？」
line = "「自慢げに言うことじゃないよ！？」"

[[dialogue]]
speaker = "unk"
# ロロット、思ったんだけどさ……
line = "ロロット、思ったんだけどさ……"

[[dialogue]]
speaker = "ロロット"
# 「え？　それなら、持ち歩かずに家に置いておいた方がいいんじゃないか……ですか？」
line = "「え？　それなら、持ち歩かずに家に置いておいた方がいいんじゃないか……ですか？」"

[[dialogue]]
speaker = "ロロット"
# 「――いいえ。新星会長さん、逆なのです」
line = "「――いいえ。新星会長さん、逆なのです」"

[[dialogue]]
speaker = "ロロット"
# 「大切だからこそ、肌身離さず持っておくのです！」
line = "「大切だからこそ、肌身離さず持っておくのです！」"

[[dialogue]]
speaker = "メイプル"
# 「……！　その気持ち、わかる！」
line = "「……！　その気持ち、わかる！」"

[[dialogue]]
speaker = "メイプル"
# 「あたしもアルザードとベッキー、いつも持ち歩いてるし！」
line = "「あたしもアルザードとベッキー、いつも持ち歩いてるし！」"

[[dialogue]]
speaker = "メイプル"
# 「あっ、そうだ！　持ち歩きたいけど、落とさないようにするなら――」
line = "「あっ、そうだ！　持ち歩きたいけど、落とさないようにするなら――」"

[[dialogue]]
speaker = "メイプル"
# 「『クリアバッグ』とかどうかな？」
line = "「『クリアバッグ』とかどうかな？」"

[[dialogue]]
speaker = "ロロット"
# 「くりあばっぐ……？　それは一体、どういうバッグなのでしょうか？」
line = "「くりあばっぐ……？　それは一体、どういうバッグなのでしょうか？」"

[[dialogue]]
speaker = "メイプル"
# 「あれ？　知らない？　えっとね～」
line = "「あれ？　知らない？　えっとね～」"

[[dialogue]]
speaker = "メイプル"
# 「ほら、こういう透明で、入れてる中身が見えるやつ♪」
line = "「ほら、こういう透明で、入れてる中身が見えるやつ♪」"

[[dialogue]]
speaker = "unk"
# そう言って変身を解いたメイプルは、肩から下げているバッグを見せる。
line = "そう言って変身を解いたメイプルは、肩から下げているバッグを見せる。"

[[dialogue]]
speaker = "メイプル"
# 「あたしはいつも、こうやって中にベッキーとアルザードを入れて、持ち歩いてるんだよ♪」
line = "「あたしはいつも、こうやって中にベッキーとアルザードを入れて、持ち歩いてるんだよ♪」"

[[dialogue]]
speaker = "ロロット"
# 「異世界には、そんな便利なものが……！？　カルチャーショックなのです！」
line = "「異世界には、そんな便利なものが……！？　カルチャーショックなのです！」"

[[dialogue]]
speaker = "メイプル"
# 「う～ん、そっか……こっちの世界にはクリアバッグが売ってないかもしれないのかぁ」
line = "「う～ん、そっか……こっちの世界にはクリアバッグが売ってないかもしれないのかぁ」"

[[dialogue]]
speaker = "unk"
# （ここは一旦メイプルに任せよう）
line = "（ここは一旦メイプルに任せよう）"

[[dialogue]]
speaker = "unk"
# （ロロットが知らないだけな気もするけど）
line = "（ロロットが知らないだけな気もするけど）"

[[dialogue]]
speaker = "メイプル"
# 「だったら――」
line = "「だったら――」"

[[dialogue]]
speaker = "メイプル"
# 「元の世界に帰る前の置き土産に、このクリアバッグ、ロロットにあげるよ♪」
line = "「元の世界に帰る前の置き土産に、このクリアバッグ、ロロットにあげるよ♪」"

[[dialogue]]
speaker = "ロロット"
# 「え？　いいのですか？」
line = "「え？　いいのですか？」"

[[dialogue]]
speaker = "メイプル"
# 「うん！　クリアバッグは元の世界に帰ったら、また同じのを買えばいいし♪」
line = "「うん！　クリアバッグは元の世界に帰ったら、また同じのを買えばいいし♪」"

[[dialogue]]
speaker = "ロロット"
# 「わぁ～っ♪　ありがとうございます！」
line = "「わぁ～っ♪　ありがとうございます！」"

[[dialogue]]
speaker = "メイプル"
# 「ふふっ。いいのいいの♪　大切なものを持ち歩く者同士、絆の証に、ね♪」
line = "「ふふっ。いいのいいの♪　大切なものを持ち歩く者同士、絆の証に、ね♪」"

[[dialogue]]
speaker = "unk"
# 翌日――
line = "翌日――"

[[dialogue]]
speaker = "メイプル"
# 「えっと……ロロット？」
line = "「えっと……ロロット？」"

[[dialogue]]
speaker = "ロロット"
# 「はい、なんでしょう？」
line = "「はい、なんでしょう？」"

[[dialogue]]
speaker = "メイプル"
# 「昨日、あたしがあげたクリアバッグは？」
line = "「昨日、あたしがあげたクリアバッグは？」"

[[dialogue]]
speaker = "ロロット"
# 「それでしたら、ちゃ～んと、家に置いてきたのです♪」
line = "「それでしたら、ちゃ～んと、家に置いてきたのです♪」"

[[dialogue]]
speaker = "メイプル"
# 「なんで！？　昨日いい感じで終わって、使ってくれる流れだったよね！？」
line = "「なんで！？　昨日いい感じで終わって、使ってくれる流れだったよね！？」"

[[dialogue]]
speaker = "ロロット"
# 「わたしもそのつもりだったのですが――」
line = "「わたしもそのつもりだったのですが――」"

[[dialogue]]
speaker = "ロロット"
# 「やはり、友達がくれたプレゼントですので、傷が付かないように飾っておこうと思いまして！」
line = "「やはり、友達がくれたプレゼントですので、傷が付かないように飾っておこうと思いまして！」"

[[dialogue]]
speaker = "メイプル"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "ロロット"
# 「大切にしますね、<b>メイプル</b>さん♪」
line = "「大切にしますね、<b>メイプル</b>さん♪」"

[[dialogue]]
speaker = "メイプル"
# 「ロロット……！」
line = "「ロロット……！」"

[[dialogue]]
speaker = "メイプル"
# 「にへへ♪」
line = "「にへへ♪」"

[[dialogue]]
speaker = "unk"
# まさに天使のような笑顔を浮かべるロロットに、照れ臭そうな笑みを返すメイプルなのだった――
line = "まさに天使のような笑顔を浮かべるロロットに、照れ臭そうな笑みを返すメイプルなのだった――"
