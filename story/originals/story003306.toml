[[dialogue]]
speaker = "サメ"
# 「シャーーーッ！！！」
line = "「シャーーーッ！！！」"

[[dialogue]]
speaker = "２人"
# 「キャーーーッ！！？」
line = "「キャーーーッ！！？」"

[[dialogue]]
speaker = "サメ"
# 「シャ～～ッ……」
line = "「シャ～～ッ……」"

[[dialogue]]
speaker = "unk"
# ２人とも大丈夫！？
line = "２人とも大丈夫！？"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「会長！」
line = "「会長！」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「ありがとうなのだ！」
line = "「ありがとうなのだ！」"

[[dialogue]]
speaker = "unk"
# マグダレナたちを助けた後、パテルやリップルとも合流し、あのサメについて話し合った。
line = "マグダレナたちを助けた後、パテルやリップルとも合流し、あのサメについて話し合った。"

[[dialogue]]
speaker = "リップル"
# 「サメ……？　ワタシじゃないですね……サメはサーファーの天敵ですから」
line = "「サメ……？　ワタシじゃないですね……サメはサーファーの天敵ですから」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「やっぱりリップルさまじゃなかったんですね……。じゃあ、あのサメはいったい……？」
line = "「やっぱりリップルさまじゃなかったんですね……。じゃあ、あのサメはいったい……？」"

[[dialogue]]
speaker = "unk"
# パテルが関わってる？
line = "パテルが関わってる？"

[[dialogue]]
speaker = "パテル"
# 「まぁ、そう思うのが自然だよね。明らかにパテルストーンが関係してそうだし」
line = "「まぁ、そう思うのが自然だよね。明らかにパテルストーンが関係してそうだし」"

[[dialogue]]
speaker = "パテル"
# 「そうだよ。確かに今回のサメはあたし──守護天使パテルが関わってる。あたしも何が起こってるのか理解したのは、さっきのことだけどね」
line = "「そうだよ。確かに今回のサメはあたし──守護天使パテルが関わってる。あたしも何が起こってるのか理解したのは、さっきのことだけどね」"

[[dialogue]]
speaker = "パテル"
# 「じゃ、答え合わせといこっか。あのサメが何か、アルモタヘルならわかるよね？」
line = "「じゃ、答え合わせといこっか。あのサメが何か、アルモタヘルならわかるよね？」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「あのサメはギガロドン、遥か古代に絶滅した魔界のサメなのだ」
line = "「あのサメはギガロドン、遥か古代に絶滅した魔界のサメなのだ」"

[[dialogue]]
speaker = "パテル"
# 「そう。『淘汰』の摂理を司るあたしと、『種族』を司るアルモタヘルなら当然知ってる」
line = "「そう。『淘汰』の摂理を司るあたしと、『種族』を司るアルモタヘルなら当然知ってる」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「そうだったんですか……！？　てっきりリゾート結界にしかいないものかと……」
line = "「そうだったんですか……！？　てっきりリゾート結界にしかいないものかと……」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「ここはリゾート結界だから、たまたま似ているサメをリップルが作ったのかと思ったのだ」
line = "「ここはリゾート結界だから、たまたま似ているサメをリップルが作ったのかと思ったのだ」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「だけどさっき見たら、体型や体の大きさ、歯の並びまで本物と同じだったのだ」
line = "「だけどさっき見たら、体型や体の大きさ、歯の並びまで本物と同じだったのだ」"

[[dialogue]]
speaker = "パテル"
# 「堕天使パテルはリゾート結界に侵入し、霊力を宿した欠片になった。だけどその欠片は、再びパテルの姿を取り戻した」
line = "「堕天使パテルはリゾート結界に侵入し、霊力を宿した欠片になった。だけどその欠片は、再びパテルの姿を取り戻した」"

[[dialogue]]
speaker = "パテル"
# 「そして『淘汰』を司る守護天使パテルが、淘汰された種を眷属として使役していたんだ」
line = "「そして『淘汰』を司る守護天使パテルが、淘汰された種を眷属として使役していたんだ」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「でもどうしてなのだ？　パテルはまた堕天しちゃったのか？」
line = "「でもどうしてなのだ？　パテルはまた堕天しちゃったのか？」"

[[dialogue]]
speaker = "パテル"
# 「ううん、堕天なんかしてないよ。本来の仕事……というか本来の機能を果たしているだけ」
line = "「ううん、堕天なんかしてないよ。本来の仕事……というか本来の機能を果たしているだけ」"

[[dialogue]]
speaker = "unk"
# 本来の機能？
line = "本来の機能？"

[[dialogue]]
speaker = "パテル"
# 「あたしの機能は『淘汰』。環境に適応できなくなった生命を滅ぼすこと」
line = "「あたしの機能は『淘汰』。環境に適応できなくなった生命を滅ぼすこと」"

[[dialogue]]
speaker = "パテル"
# 「そしてその摂理に反し、命ならざる命になったものを抹殺すること」
line = "「そしてその摂理に反し、命ならざる命になったものを抹殺すること」"

[[dialogue]]
speaker = "パテル"
# 「パテルストーン──もう１人のあたしは、あなたたちを警戒している。摂理に反する存在になるんじゃないかとね」
line = "「パテルストーン──もう１人のあたしは、あなたたちを警戒している。摂理に反する存在になるんじゃないかとね」"

[[dialogue]]
speaker = "パテル"
# 「そしてそれを警戒しているのは、あたしも同じ」
line = "「そしてそれを警戒しているのは、あたしも同じ」"

[[dialogue]]
speaker = "unk"
# 同じ……？
line = "同じ……？"

[[dialogue]]
speaker = "パテル"
# 「そう、あたしは死神として、あなたたちを監視していたんだよ。魔王、マグダレナ、アルモタヘル」
line = "「そう、あたしは死神として、あなたたちを監視していたんだよ。魔王、マグダレナ、アルモタヘル」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「アルモたんたちを監視していた……！？」
line = "「アルモたんたちを監視していた……！？」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「待ってください、私たちは同じ守護天使ですよ！？」
line = "「待ってください、私たちは同じ守護天使ですよ！？」"

[[dialogue]]
speaker = "パテル"
# 「守護天使ならわかるでしょ。今の自分たちが本来ありえない存在だって」
line = "「守護天使ならわかるでしょ。今の自分たちが本来ありえない存在だって」"

[[dialogue]]
speaker = "パテル"
# 「マグダレナとアルモタヘルは、義体に守護天使の魂の一部を宿したもの。守護天使が持ちえない肉の体がある」
line = "「マグダレナとアルモタヘルは、義体に守護天使の魂の一部を宿したもの。守護天使が持ちえない肉の体がある」"

[[dialogue]]
speaker = "パテル"
# 「そして魔王。あなたは、先代の魔王ラクシスが魔女の『<ruby=レナトゥス>封理再誕</ruby>』によって、生まれ変わった存在」
line = "「そして魔王。あなたは、先代の魔王ラクシスが魔女の『<ruby>封理再誕<rt>レナトゥス</rt></ruby>』によって、生まれ変わった存在」"

[[dialogue]]
speaker = "パテル"
# 「あなたたちは普通の命じゃない。例外的な存在だ。魂や肉体に異変が起きて、不死の怪物になる──なんてことが起こる可能性がある」
line = "「あなたたちは普通の命じゃない。例外的な存在だ。魂や肉体に異変が起きて、不死の怪物になる──なんてことが起こる可能性がある」"

[[dialogue]]
speaker = "パテル"
# 「いつぞやのコラプサーのような、生きても死んでもいないような、歪んだ存在になるかもしれない」
line = "「いつぞやのコラプサーのような、生きても死んでもいないような、歪んだ存在になるかもしれない」"

[[dialogue]]
speaker = "unk"
# パテルが言っているのは、コラプサーの黒幕だったイザベラのことだろう。
line = "パテルが言っているのは、コラプサーの黒幕だったイザベラのことだろう。"

[[dialogue]]
speaker = "unk"
# 彼女はブラックホールの力によって不死となったが、その果てに自我が崩壊した怪物に成り果てた。
line = "彼女はブラックホールの力によって不死となったが、その果てに自我が崩壊した怪物に成り果てた。"

[[dialogue]]
speaker = "パテル"
# 「今回あたしがリゾート結界に来たのは、あなたたちの状態を確認するためでもあったんだ」
line = "「今回あたしがリゾート結界に来たのは、あなたたちの状態を確認するためでもあったんだ」"

[[dialogue]]
speaker = "unk"
# なんとなくそんな気がしてた
line = "なんとなくそんな気がしてた"

[[dialogue]]
speaker = "パテル"
# 「あ、あたしが隠し事してるの気付いてた？」
line = "「あ、あたしが隠し事してるの気付いてた？」"

[[dialogue]]
speaker = "unk"
# 最初に俺をおにーさんって呼んだから
line = "最初に俺をおにーさんって呼んだから"

[[dialogue]]
speaker = "パテル"
# 「アハッ、鋭いね～。そういえばあたし、最初は守護天使ってこと隠してたもんね」
line = "「アハッ、鋭いね～。そういえばあたし、最初は守護天使ってこと隠してたもんね」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「《試練》のパテルは、同じ守護天使も試していた……ということなんですね」
line = "「《試練》のパテルは、同じ守護天使も試していた……ということなんですね」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「そういえばパテルはこういうやつだったのだ」
line = "「そういえばパテルはこういうやつだったのだ」"

[[dialogue]]
speaker = "サメ"
# 「シャーーーッ！！！」
line = "「シャーーーッ！！！」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「きゃぁっ！？　ビーチにサメが押し寄せてきましたーっ！？」
line = "「きゃぁっ！？　ビーチにサメが押し寄せてきましたーっ！？」"
