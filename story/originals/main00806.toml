line = "「そういや──これで、ボスを倒したっつーことになんのか？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「！　そのはずよ──第三層の攻略は完了したわ」
line = "「！　そのはずよ──第三層の攻略は完了したわ」"

[[dialogue]]
speaker = "unk"
# これまでの例からしてこいつがこの階層の主であったのは間違いないだろう。
line = "これまでの例からしてこいつがこの階層の主であったのは間違いないだろう。"

[[dialogue]]
speaker = "unk"
# そうなると、次は何かしらのメッセンジャーが現れる……というのがこれまでの通例だ。
