speaker = "ヴィーナス"
# 「──え、ええ……びっくりしちゃったけど……あ、ありがとう」
line = "「──え、ええ……びっくりしちゃったけど……あ、ありがとう」"

[[dialogue]]
speaker = "ヴィーナス"
