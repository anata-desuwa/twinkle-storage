[[dialogue]]
speaker = "unk"
# ──彼女を。
line = "──彼女を。"

[[dialogue]]
speaker = "unk"
# ──助けるためなら。
line = "──助けるためなら。"

[[dialogue]]
speaker = "フィオナ"
# 「緋宮、会長……！？」
