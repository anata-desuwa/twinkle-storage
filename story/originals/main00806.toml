[[dialogue]]
speaker = "アナ"
# 「っ──その姿は、もしかして……」
line = "「っ──その姿は、もしかして……」"

[[dialogue]]
speaker = "クロト"
# 「話は後だ──竜を無力化する。巻き込まない保証はないから、下がっててくれ」
