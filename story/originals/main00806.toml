line = "「見る限り──<ruby>逆鱗<rt>げきりん</rt></ruby>らしき部位は、存在すらしていないようです……！　逆さまの鱗なんて一枚もありません！」"

[[dialogue]]
speaker = "サーシャ"
# 「！　最悪ね──弱点なんて話からしてウソなんて……！」
