[[dialogue]]
speaker = "ヴィーナス"
# 「緋宮クロト──あなたは魔王となって、この世界を救うのよ！」
line = "「緋宮クロト──あなたは魔王となって、この世界を救うのよ！」"

[[dialogue]]
speaker = "unk"
# 魔王。そして世界。
line = "魔王。そして世界。"

[[dialogue]]
speaker = "unk"
# あの時の言葉が、今の俺にはより鮮明にのしかかる。
line = "あの時の言葉が、今の俺にはより鮮明にのしかかる。"

[[dialogue]]
speaker = "unk"
# なら、俺にはどうしようもないのか？　違う。
line = "なら、俺にはどうしようもないのか？　違う。"

[[dialogue]]
speaker = "セイファート"
