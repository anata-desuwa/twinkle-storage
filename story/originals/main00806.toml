[[dialogue]]
speaker = "unk"
# めくるめく閃撃が竜を打ちのめす。
line = "めくるめく閃撃が竜を打ちのめす。"

[[dialogue]]
speaker = "unk"
# 俺が拳を振り抜くごとに、多重の追撃が影のように発生していた。
