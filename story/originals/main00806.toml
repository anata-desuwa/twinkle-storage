line = "『強くあれ。世界を取り込まんとする力に、決して飲まれることなきように』"

[[dialogue]]
speaker = "unk"
# そうだ──
line = "そうだ──"

[[dialogue]]
speaker = "unk"
# 緋宮クロトの生き方は、誰に従うでもなく最初から決まっていた。
line = "緋宮クロトの生き方は、誰に従うでもなく最初から決まっていた。"

[[dialogue]]
speaker = "unk"
# 世界を滅ぼした存在が相手だというのなら──世界を救う存在になればいい。
line = "世界を滅ぼした存在が相手だというのなら──世界を救う存在になればいい。"

[[dialogue]]
speaker = "unk"
# 俺にはそれができる。
