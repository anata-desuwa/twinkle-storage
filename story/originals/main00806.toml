[[dialogue]]
speaker = "ソフィア"
# （魔王の血──ってことは、フィオナ会長にも同じ資質があるのかな……？　会長の進化モード、見てみたいかも……）
line = "（魔王の血──ってことは、フィオナ会長にも同じ資質があるのかな……？　会長の進化モード、見てみたいかも……）"

[[dialogue]]
speaker = "unk"
# 身に余る力の反動がぶり返していた。
