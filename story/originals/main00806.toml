[[dialogue]]
speaker = "煌竜ヴィライア"
# 「ウウウ──ウオオオォォォォォン──！！！」
line = "「ウウウ──ウオオオォォォォォン──！！！」"

[[dialogue]]
speaker = "クロト"
# 「そこを退け──ヴィーナスに指一本触れさせやしない！」
