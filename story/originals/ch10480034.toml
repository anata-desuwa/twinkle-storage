[[dialogue]]
speaker = "unk"
# 第４話,小さな竜へ愛を込めて,P
line = "第４話,小さな竜へ愛を込めて,P"

[[dialogue]]
speaker = "サーシャ"
# 「あら～、会長くん♪　どうかしたの？」
line = "「あら～、会長くん♪　どうかしたの？」"

[[dialogue]]
speaker = "unk"
# ある日、３年生の教室へ向かっていると、サーシャさんと出会った。
line = "ある日、３年生の教室へ向かっていると、サーシャさんと出会った。"

[[dialogue]]
speaker = "unk"
# 俺はマムに書類を渡しにきたことを伝え、しばし談笑していたのだが――
line = "俺はマムに書類を渡しにきたことを伝え、しばし談笑していたのだが――"

[[dialogue]]
speaker = "サーシャ"
# 「ん？　――きゃあぁっ！？」
line = "「ん？　――きゃあぁっ！？」"

[[dialogue]]
speaker = "unk"
# わっぷ……！？
line = "わっぷ……！？"

[[dialogue]]
speaker = "unk"
# 突然、俺はサーシャさんに抱き着かれ、その大きな胸に顔が埋もれてしまう。
line = "突然、俺はサーシャさんに抱き着かれ、その大きな胸に顔が埋もれてしまう。"

[[dialogue]]
speaker = "サーシャ"
# 「か、会長くん、蜂よ～！　校内に蜂が飛んでるわ！」
line = "「か、会長くん、蜂よ～！　校内に蜂が飛んでるわ！」"

[[dialogue]]
speaker = "サーシャ"
# 「いやあぁ～～～っ！　こっちに来ないで！　会長くん、蜂を早く捕まえてぇ～～～っ！」
line = "「いやあぁ～～～っ！　こっちに来ないで！　会長くん、蜂を早く捕まえてぇ～～～っ！」"

[[dialogue]]
speaker = "unk"
# さ、サーシャさん、腕を離して……！
line = "さ、サーシャさん、腕を離して……！"

[[dialogue]]
speaker = "unk"
# 胸に埋もれて息が出来なくて、蜂よりも先に窒息の危機である。
line = "胸に埋もれて息が出来なくて、蜂よりも先に窒息の危機である。"

[[dialogue]]
speaker = "マハムート"
# 「やれやれ……騒がしいと思って来てみれば、何をやっているのかしら？　貴方達」
line = "「やれやれ……騒がしいと思って来てみれば、何をやっているのかしら？　貴方達」"

[[dialogue]]
speaker = "サーシャ"
# 「マム～！　蜂が！　蜂が入って来てるの！　助けて～～～っ！」
line = "「マム～！　蜂が！　蜂が入って来てるの！　助けて～～～っ！」"

[[dialogue]]
speaker = "マハムート"
# 「全く、サーシャの虫嫌いにも困ったものね。いつまで経っても慣れやしないんだから……」
line = "「全く、サーシャの虫嫌いにも困ったものね。いつまで経っても慣れやしないんだから……」"

[[dialogue]]
speaker = "マハムート"
# 「引力操作――ほら、迷子を捕まえてあげたわよ」
line = "「引力操作――ほら、迷子を捕まえてあげたわよ」"

[[dialogue]]
speaker = "unk"
# それから廊下の窓を開ける音がして……
line = "それから廊下の窓を開ける音がして……"

[[dialogue]]
speaker = "マハムート"
# 「今回は逃がしてあげるから、もう迷い込むんじゃないわよ」
line = "「今回は逃がしてあげるから、もう迷い込むんじゃないわよ」"

[[dialogue]]
speaker = "unk"
# マムのそう言う声が聞こえたところで、俺の意識は途絶えたのだった――
line = "マムのそう言う声が聞こえたところで、俺の意識は途絶えたのだった――"

[[dialogue]]
speaker = "unk"
# 次に起きた時には、保健室のベッドの上だった。
line = "次に起きた時には、保健室のベッドの上だった。"

[[dialogue]]
speaker = "マハムート"
# 「目が覚めた？　会長」
line = "「目が覚めた？　会長」"

[[dialogue]]
speaker = "マハムート"
# 「やれやれ、仮にも学園最強の星徒会長が、女性の胸で息できなくて失神とか、恋人の私まで恥ずかしくなるじゃない」
line = "「やれやれ、仮にも学園最強の星徒会長が、女性の胸で息できなくて失神とか、恋人の私まで恥ずかしくなるじゃない」"

[[dialogue]]
speaker = "マハムート"
# 「ふん……まあ、サーシャの大きな胸に埋もれて、嫌な気分じゃなかったでしょうけど？」
line = "「ふん……まあ、サーシャの大きな胸に埋もれて、嫌な気分じゃなかったでしょうけど？」"

[[dialogue]]
speaker = "unk"
# ご、ごめん！　決してわざとじゃ――
line = "ご、ごめん！　決してわざとじゃ――"

[[dialogue]]
speaker = "マハムート"
# 「冗談よ。サーシャの方から抱き着いて来たんでしょう？　恐れ知らずにも、私へ抱き着いてきたこともあったし」
line = "「冗談よ。サーシャの方から抱き着いて来たんでしょう？　恐れ知らずにも、私へ抱き着いてきたこともあったし」"

[[dialogue]]
speaker = "マハムート"
# 「って、会長？　な、何……？」
line = "「って、会長？　な、何……？」"

[[dialogue]]
speaker = "unk"
# 俺はマムの両手を取って握りながら、目を見て言う。
line = "俺はマムの両手を取って握りながら、目を見て言う。"

[[dialogue]]
speaker = "unk"
# 俺、小さくて可愛いマムが好きです！
line = "俺、小さくて可愛いマムが好きです！"

[[dialogue]]
speaker = "マハムート"
# 「へ？　ま、まぁ、恋人として付き合っているんだから、それはそうでしょうけれど……」
line = "「へ？　ま、まぁ、恋人として付き合っているんだから、それはそうでしょうけれど……」"

[[dialogue]]
speaker = "マハムート"
# 「もしかして、私がサーシャの大きな胸に嫉妬してるとか思ったわけ？」
line = "「もしかして、私がサーシャの大きな胸に嫉妬してるとか思ったわけ？」"

[[dialogue]]
speaker = "マハムート"
# 「別に、私はそんなの気にしないわよ」
line = "「別に、私はそんなの気にしないわよ」"

[[dialogue]]
speaker = "マハムート"
# 「確かに、昔は小さいと戦いに不利だと思って、大きくなりたいと思っていた時期もあったわ」
line = "「確かに、昔は小さいと戦いに不利だと思って、大きくなりたいと思っていた時期もあったわ」"

[[dialogue]]
speaker = "マハムート"
# 「妃竜院家では、散々皮肉を言われもした。当主の座が欲しい連中から、小さい癖に態度がデカいとか、そんなことを遠回しに何度もね」
line = "「妃竜院家では、散々皮肉を言われもした。当主の座が欲しい連中から、小さい癖に態度がデカいとか、そんなことを遠回しに何度もね」"

[[dialogue]]
speaker = "マハムート"
# 「でも、小さくても勝つ方法はいくらでもあるわ。小柄な身体を活かして相手の懐に飛び込む武術だったり、手足の延長のように使えるくらい引力操作の技術を磨いたりね」
line = "「でも、小さくても勝つ方法はいくらでもあるわ。小柄な身体を活かして相手の懐に飛び込む武術だったり、手足の延長のように使えるくらい引力操作の技術を磨いたりね」"

[[dialogue]]
speaker = "マハムート"
# 「むしろ堂々と胸を張って、言ってやったわ――」
line = "「むしろ堂々と胸を張って、言ってやったわ――」"

[[dialogue]]
speaker = "マハムート"
# 「こそこそと陰口ばかり叩いてる奴の方が、図体の割に器が小さいってね」
line = "「こそこそと陰口ばかり叩いてる奴の方が、図体の割に器が小さいってね」"

[[dialogue]]
speaker = "マハムート"
# 「あとは、まぁ……女として、一族の跡取りを作る為に、体が小さいと目ぼしい男を見つけるのが大変、という懸念があったけれど――」
line = "「あとは、まぁ……女として、一族の跡取りを作る為に、体が小さいと目ぼしい男を見つけるのが大変、という懸念があったけれど――」"

[[dialogue]]
speaker = "unk"
# マムは俺の目を見ながら、ふっと笑って……
line = "マムは俺の目を見ながら、ふっと笑って……"

[[dialogue]]
speaker = "マハムート"
# 「幸い、それも<b>誰かさん</b>のおかげで目途が立ったしね。……ふふっ」
line = "「幸い、それも<b>誰かさん</b>のおかげで目途が立ったしね。……ふふっ」"

[[dialogue]]
speaker = "unk"
# マムはすごく可愛くて、魅力的ですよ
line = "マムはすごく可愛くて、魅力的ですよ"

[[dialogue]]
speaker = "マハムート"
# 「そこまで言うなら、今すぐ証明してみせなさい」
line = "「そこまで言うなら、今すぐ証明してみせなさい」"

[[dialogue]]
speaker = "unk"
# イエス・マム
line = "イエス・マム"

[[dialogue]]
speaker = "unk"
# 俺はマムの背中に手を回して、そっと抱き寄せる。
line = "俺はマムの背中に手を回して、そっと抱き寄せる。"

[[dialogue]]
speaker = "マハムート"
# 「ん……<emoji=heart04>」
line = "「ん……<emoji=heart04>」"

[[dialogue]]
speaker = "マハムート"
# 「それで終わり？　私は竜なんだから、こんな弱い力じゃ気持ちが伝わらないわよ？　だから――」
line = "「それで終わり？　私は竜なんだから、こんな弱い力じゃ気持ちが伝わらないわよ？　だから――」"

[[dialogue]]
speaker = "マハムート"
# 「もっと強く抱き締めなさい」
line = "「もっと強く抱き締めなさい」"

[[dialogue]]
speaker = "マハムート"
# 「んんっ<emoji=heart04>　そうよ、それくらいでいいわ。次は、頭も撫でなさい……<emoji=heart04>」
line = "「んんっ<emoji=heart04>　そうよ、それくらいでいいわ。次は、頭も撫でなさい……<emoji=heart04>」"

[[dialogue]]
speaker = "マハムート"
# 「んっ……ふぅ<emoji=heart04>　そう、そっちは優しくよ。それから……」
line = "「んっ……ふぅ<emoji=heart04>　そう、そっちは優しくよ。それから……」"

[[dialogue]]
speaker = "マハムート"
# 「言葉でも、何度も伝えなさい」
line = "「言葉でも、何度も伝えなさい」"

[[dialogue]]
speaker = "unk"
# マム、愛してる
line = "マム、愛してる"

[[dialogue]]
speaker = "マハムート"
# 「んんっ<emoji=heart04>」
line = "「んんっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 彼女の耳元で愛を囁くと、小さな体が震えるのがわかった。
line = "彼女の耳元で愛を囁くと、小さな体が震えるのがわかった。"

[[dialogue]]
speaker = "マハムート"
# 「もっと……<emoji=heart04>」
line = "「もっと……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 好きだよ。誰よりも
line = "好きだよ。誰よりも"

[[dialogue]]
speaker = "マハムート"
# 「じゃあ……命令よ」
line = "「じゃあ……命令よ」"

[[dialogue]]
speaker = "マハムート"
# 「畏怖をもって、私にキスしなさい<emoji=heart04>」
line = "「畏怖をもって、私にキスしなさい<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺は１度、抱き締めていた体を離すと――
line = "俺は１度、抱き締めていた体を離すと――"

[[dialogue]]
speaker = "マハムート"
# 「んっ……<emoji=heart04>」
line = "「んっ……<emoji=heart04>」"

[[dialogue]]
speaker = "マハムート"
# 「ちゅっ<emoji=heart04>」
line = "「ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 彼女の小さな唇にキスをする。
line = "彼女の小さな唇にキスをする。"

[[dialogue]]
speaker = "マハムート"
# 「もっとよ……<emoji=heart04>　んんっ……<emoji=heart04>」
line = "「もっとよ……<emoji=heart04>　んんっ……<emoji=heart04>」"

[[dialogue]]
speaker = "マハムート"
# 「ちゅっ……ちゅっ<emoji=heart04>」
line = "「ちゅっ……ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 珍しく甘えてくれるマムが本当に愛おしくて。
line = "珍しく甘えてくれるマムが本当に愛おしくて。"

[[dialogue]]
speaker = "unk"
# その後、学園のチャイムが鳴るまで、熱を帯びた触れ合いを続けてしまうのであった――
line = "その後、学園のチャイムが鳴るまで、熱を帯びた触れ合いを続けてしまうのであった――"
