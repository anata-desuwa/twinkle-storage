[[dialogue]]
speaker = "イクシリオン"
# 「わ、私も保健委員をしていると肩こりがすごいんです！　あ～、もー、イヤになっちゃいますね～」
line = "「わ、私も保健委員をしていると肩こりがすごいんです！　あ～、もー、イヤになっちゃいますね～」"

[[dialogue]]
speaker = "せつな"
# 「せつなは忍者でありメイドでありたわわでござるが、肩こりとは無縁でござる。ですが何やら気持ちよくなれる器具があると聞いて──」
line = "「せつなは忍者でありメイドでありたわわでござるが、肩こりとは無縁でござる。ですが何やら気持ちよくなれる器具があると聞いて──」"

[[dialogue]]
speaker = "イクシリオン"
