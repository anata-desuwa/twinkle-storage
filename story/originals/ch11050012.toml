[[dialogue]]
speaker = "unk"
# 第２話,危険すぎる会議,P
line = "第２話,危険すぎる会議,P"

[[dialogue]]
speaker = "せつな"
# 「お初にお目に掛かりまする。新星学園１年、甲賀流くノ一兼メイドのせつなでござる」
line = "「お初にお目に掛かりまする。新星学園１年、甲賀流くノ一兼メイドのせつなでござる」"

[[dialogue]]
speaker = "イクシリオン"
# 「新星学園１年、保健委員をしていますイクシリオン・グレゴールです。イクシーと呼んでください」
line = "「新星学園１年、保健委員をしていますイクシリオン・グレゴールです。イクシーと呼んでください」"

[[dialogue]]
speaker = "レミカ"
# 「芸能事務所『ポラリスプロダクション』のレミカです。こういう場に招かれることってなかなか無いから嬉しいよ」
line = "「芸能事務所『ポラリスプロダクション』のレミカです。こういう場に招かれることってなかなか無いから嬉しいよ」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「アタシも嬉しいよ～♪　魔王ちゃん、みんなのこと紹介してくれてありがとー♪」
line = "「アタシも嬉しいよ～♪　魔王ちゃん、みんなのこと紹介してくれてありがとー♪」"

[[dialogue]]
speaker = "unk"
# 人選を間違ったかもしれない……
line = "人選を間違ったかもしれない……"

[[dialogue]]
speaker = "せつな"
# 「それで今日は、ツェツィーリエ殿が自作されたデンマを試して欲しいとか？」
line = "「それで今日は、ツェツィーリエ殿が自作されたデンマを試して欲しいとか？」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「そーなんだよ～。忌憚のない意見をもらおうと思って魔王ちゃんにみんなを集めてもらったんだ」
line = "「そーなんだよ～。忌憚のない意見をもらおうと思って魔王ちゃんにみんなを集めてもらったんだ」"

[[dialogue]]
speaker = "せつな"
# 「さすがは主様、お目が高いでござる！」
line = "「さすがは主様、お目が高いでござる！」"

[[dialogue]]
speaker = "レミカ"
# 「現場から現場に移動する時、車の中とかで使えるマッサージ器があると助かると思ってたんだ」
