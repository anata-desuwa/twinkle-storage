[[dialogue]]
speaker = "unk"
# 恋人関係になった俺とレミカ。
line = "恋人関係になった俺とレミカ。"

[[dialogue]]
speaker = "unk"
# しかし、そのすぐ後にレミカのデビュー周年ライブが控えており、忙しない日々が続いていたが――
line = "しかし、そのすぐ後にレミカのデビュー周年ライブが控えており、忙しない日々が続いていたが――"

[[dialogue]]
speaker = "レミカ"
# 「会長、ライブ大成功だったよ……！」
line = "「会長、ライブ大成功だったよ……！」"

[[dialogue]]
speaker = "クロト"
# 「ネット配信で見てた！　まさに、パーフェクトなライブだったぞ！　……って、衣装のままで来たのか！？」
line = "「ネット配信で見てた！　まさに、パーフェクトなライブだったぞ！　……って、衣装のままで来たのか！？」"

[[dialogue]]
speaker = "レミカ"
# 「会場からそのまま全速力で飛んできた。会長に１番に報告したかったから……」
line = "「会場からそのまま全速力で飛んできた。会長に１番に報告したかったから……」"

[[dialogue]]
speaker = "レミカ"
# 「――私、頑張ったよ。でも、頑張れたのは、会長がいつも私の相談に乗ってくれて、心を支えてくれたおかげ」
line = "「――私、頑張ったよ。でも、頑張れたのは、会長がいつも私の相談に乗ってくれて、心を支えてくれたおかげ」"

[[dialogue]]
speaker = "レミカ"
# 「だから、ありがと。会長……んっ<emoji=heart04>」
line = "「だから、ありがと。会長……んっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# レミカを抱き寄せて、キスをする。彼女も俺の背中にそっと手を回してくる。頑張ったねという気持ちで、頭を撫でて――
line = "レミカを抱き寄せて、キスをする。彼女も俺の背中にそっと手を回してくる。頑張ったねという気持ちで、頭を撫でて――"

[[dialogue]]
speaker = "レミカ"
# 「え？　――頑張ったから、何でもしてあげる？　ご褒美をくれるの……？　じ、じゃあ、その――」
line = "「え？　――頑張ったから、何でもしてあげる？　ご褒美をくれるの……？　じ、じゃあ、その――」"

[[dialogue]]
speaker = "レミカ"
# 「私を貰って欲しいって言ったら……ダメ、かな？」
line = "「私を貰って欲しいって言ったら……ダメ、かな？」"

[[dialogue]]
speaker = "クロト"
# 「本当にしちゃって、いいのか……？」
line = "「本当にしちゃって、いいのか……？」"

[[dialogue]]
speaker = "レミカ"
# 「う、うん……今回のライブが成功したら、会長とも恋人としてステップアップしたいって、思ってたから……」
line = "「う、うん……今回のライブが成功したら、会長とも恋人としてステップアップしたいって、思ってたから……」"

[[dialogue]]
speaker = "レミカ"
# 「それに今の盛り上がった雰囲気じゃないと……普段じゃ、なかなか言い出せないし……」
line = "「それに今の盛り上がった雰囲気じゃないと……普段じゃ、なかなか言い出せないし……」"

[[dialogue]]
speaker = "レミカ"
