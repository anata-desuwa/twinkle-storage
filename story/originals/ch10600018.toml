[[dialogue]]
speaker = "レミカ"
# 「凄い……熱くて、ドクンドクンって言ってる……あ、ムクムクって大きくなって……<emoji=heart04>　こ、これ、勃起……だよね？」
line = "「凄い……熱くて、ドクンドクンって言ってる……あ、ムクムクって大きくなって……<emoji=heart04>　こ、これ、勃起……だよね？」"

[[dialogue]]
speaker = "レミカ"
# 「――私に触られて、興奮するから？　そ、そうなんだ……」
line = "「――私に触られて、興奮するから？　そ、そうなんだ……」"

[[dialogue]]
speaker = "レミカ"
# 「わ、私で勃起してくれてるんだって思ったら……嬉しい、かも……<emoji=heart04>」
line = "「わ、私で勃起してくれてるんだって思ったら……嬉しい、かも……<emoji=heart04>」"

[[dialogue]]
speaker = "レミカ"
