[[dialogue]]
speaker = "レミカ"
# 「はあぁ……<emoji=heart04>　ちゅっ……ちゅぷぷっ……ちゅれるっ……いつもよりキス、激し……<emoji=heart04>　んむっ……ちゅぱっ……ちゅむむっ……んっ……ちゅぶっ……れろちゅっ<emoji=heart04>」
line = "「はあぁ……<emoji=heart04>　ちゅっ……ちゅぷぷっ……ちゅれるっ……いつもよりキス、激し……<emoji=heart04>　んむっ……ちゅぱっ……ちゅむむっ……んっ……ちゅぶっ……れろちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "レミカ"
# 「ちゅっ……ちゅむっ……ちゅぱっ……ぷはぁ<emoji=heart04>　んっ……はあぁ……会長ぉ……<emoji=heart04>　キスに夢中に過ぎて、もう頭の中、わけわかんなくなっちゃってる……<emoji=heart04>」
