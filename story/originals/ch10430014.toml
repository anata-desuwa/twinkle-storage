[[dialogue]]
speaker = "unk"
# 第４話,世界で１番の幸運（後編）,P
line = "第４話,世界で１番の幸運（後編）,P"

[[dialogue]]
speaker = "unk"
# トレーニング施設で起きたトラブルで、自己嫌悪し、その場から逃げ出してしまったサチ――
line = "トレーニング施設で起きたトラブルで、自己嫌悪し、その場から逃げ出してしまったサチ――"

[[dialogue]]
speaker = "サチ"
# （本当は……薄々気付いていました。お兄さんと一緒に居ると、どうしてエッチなトラブルが起きるのか……）
line = "（本当は……薄々気付いていました。お兄さんと一緒に居ると、どうしてエッチなトラブルが起きるのか……）"

[[dialogue]]
speaker = "サチ"
# （それに、お兄さんに対する自分の気持ちも……）
line = "（それに、お兄さんに対する自分の気持ちも……）"

[[dialogue]]
speaker = "サチ"
# （本当は自分が心のどこかで望んでいたことなのに、お兄さんに甘えて、都合の悪い部分は見て見ぬフリをして……）
line = "（本当は自分が心のどこかで望んでいたことなのに、お兄さんに甘えて、都合の悪い部分は見て見ぬフリをして……）"

[[dialogue]]
speaker = "サチ"
# （エッチで、はしたないのは私の方で……恥ずかしくて、消えてしまいたい……）
line = "（エッチで、はしたないのは私の方で……恥ずかしくて、消えてしまいたい……）"

[[dialogue]]
speaker = "unk"
# サチ！　追いついた！
line = "サチ！　追いついた！"

[[dialogue]]
speaker = "サチ"
# 「お、お兄さん……」
line = "「お、お兄さん……」"

[[dialogue]]
speaker = "サチ"
# 「ごめんなさい。いきなり逃げ出したりして……私……」
line = "「ごめんなさい。いきなり逃げ出したりして……私……」"

[[dialogue]]
speaker = "unk"
# 言いたくないなら、無理して言わなくていい
line = "言いたくないなら、無理して言わなくていい"

[[dialogue]]
speaker = "サチ"
# 「お兄さんは何も悪くないんです。今までもずっと……」
line = "「お兄さんは何も悪くないんです。今までもずっと……」"

[[dialogue]]
speaker = "サチ"
# 「お兄さんがわざとあんなことするような人でないことは、わかっています。悪いのは私で、私の幸運体質が原因だったんです」
line = "「お兄さんがわざとあんなことするような人でないことは、わかっています。悪いのは私で、私の幸運体質が原因だったんです」"

[[dialogue]]
speaker = "サチ"
# 「私とお兄さんが見舞われるエッチなトラブルは、いわゆる『<b>ラッキースケベ</b>』だったんです」
line = "「私とお兄さんが見舞われるエッチなトラブルは、いわゆる『<b>ラッキースケベ</b>』だったんです」"

[[dialogue]]
speaker = "サチ"
# 「私は……最初に星徒会室で挨拶をした時から、お兄さんのことをその……好意的に感じていたんだと思います」
line = "「私は……最初に星徒会室で挨拶をした時から、お兄さんのことをその……好意的に感じていたんだと思います」"

[[dialogue]]
speaker = "サチ"
# 「私、昔から『兄』という存在に淡い憧れがあって……会長さんと会ってから、こういう兄が欲しかったな、とか思ってたりして……なので、さり気なく呼び方を変えてみたりして」
line = "「私、昔から『兄』という存在に淡い憧れがあって……会長さんと会ってから、こういう兄が欲しかったな、とか思ってたりして……なので、さり気なく呼び方を変えてみたりして」"

[[dialogue]]
speaker = "サチ"
# 「そしたら何も言わずに受け入れて貰えて、だから調子に乗って、甘えてしまうようになっていました。ラッキースケベに巻き込んでも、許してくれるって……」
line = "「そしたら何も言わずに受け入れて貰えて、だから調子に乗って、甘えてしまうようになっていました。ラッキースケベに巻き込んでも、許してくれるって……」"

[[dialogue]]
speaker = "サチ"
# 「でも本当は、私の方が心の奥でお兄さんと仲良くなりたいと望んでいたから、ラッキースケベという幸運が起こっていたんです」
line = "「でも本当は、私の方が心の奥でお兄さんと仲良くなりたいと望んでいたから、ラッキースケベという幸運が起こっていたんです」"

[[dialogue]]
speaker = "サチ"
# 「今回のことで、はっきりと気付いてしまったんです。自分の気持ちに――」
line = "「今回のことで、はっきりと気付いてしまったんです。自分の気持ちに――」"

[[dialogue]]
speaker = "サチ"
# 「私はいつの間にかお兄さんのことを、男の人として好きになっていたんです」
line = "「私はいつの間にかお兄さんのことを、男の人として好きになっていたんです」"

[[dialogue]]
speaker = "サチ"
# 「ずっと、エッチなのは私の方でした……」
line = "「ずっと、エッチなのは私の方でした……」"

[[dialogue]]
speaker = "サチ"
# 「ごめんなさい、お兄さん……」
line = "「ごめんなさい、お兄さん……」"

[[dialogue]]
speaker = "unk"
# そんなことはない。俺も本当は――
line = "そんなことはない。俺も本当は――"

[[dialogue]]
speaker = "サチ"
# 「お兄さん……？」
line = "「お兄さん……？」"

[[dialogue]]
speaker = "unk"
# 俺は、嫌われたくないから、ずっと紳士なフリをしていただけだ。内心はずっとドキドキして、下心を持っていた。正直にそう伝える。
line = "俺は、嫌われたくないから、ずっと紳士なフリをしていただけだ。内心はずっとドキドキして、下心を持っていた。正直にそう伝える。"

[[dialogue]]
speaker = "サチ"
# 「下心って、私に……？　――えっ、私が可愛いから……？」
line = "「下心って、私に……？　――えっ、私が可愛いから……？」"

[[dialogue]]
speaker = "unk"
# だから、俺にとってもラッキースケベだったよ
line = "だから、俺にとってもラッキースケベだったよ"

[[dialogue]]
speaker = "サチ"
# 「そ、それってつまり……きゃっ！？」
line = "「そ、それってつまり……きゃっ！？」"

[[dialogue]]
speaker = "サチ"
# 「いきなり後ろから強い風が吹いて……！　わ、わわっ……バランスが……！」
line = "「いきなり後ろから強い風が吹いて……！　わ、わわっ……バランスが……！」"

[[dialogue]]
speaker = "サチ"
# 「あ、ありがとうございます、お兄さん。受け止めてくれて……」
line = "「あ、ありがとうございます、お兄さん。受け止めてくれて……」"

[[dialogue]]
speaker = "サチ"
# 「これも……ラッキースケベに入るんでしょうかね……？」
line = "「これも……ラッキースケベに入るんでしょうかね……？」"

[[dialogue]]
speaker = "unk"
# サチ、好きだ。付き合って欲しい
line = "サチ、好きだ。付き合って欲しい"

[[dialogue]]
speaker = "サチ"
# 「あ……！」
line = "「あ……！」"

[[dialogue]]
speaker = "サチ"
# 「わ、私も……好きです。私を、お兄さんの恋人にして下さい……」
line = "「わ、私も……好きです。私を、お兄さんの恋人にして下さい……」"

[[dialogue]]
speaker = "サチ"
# 「えへへ……♪　人事を尽くして天命を待つ主義な私ですが、今この瞬間だけは自信を持って言えます」
line = "「えへへ……♪　人事を尽くして天命を待つ主義な私ですが、今この瞬間だけは自信を持って言えます」"

[[dialogue]]
speaker = "サチ"
# 「私は今、世界で１番ラッキーです」
line = "「私は今、世界で１番ラッキーです」"

[[dialogue]]
speaker = "サチ"
# 「だって、初恋の人と、こうして両想いになれたんですから……♪」
line = "「だって、初恋の人と、こうして両想いになれたんですから……♪」"

[[dialogue]]
speaker = "サチ"
# 「それで……お兄さん、秘密のお話があるので……少しだけ、顔を近付けてもらってもいいですか……？」
line = "「それで……お兄さん、秘密のお話があるので……少しだけ、顔を近付けてもらってもいいですか……？」"

[[dialogue]]
speaker = "サチ"
# 「お互い会長としての立場もありますから、普段はエッチなことは禁止ですけど……今はラッキースケベ発生中なので……」
line = "「お互い会長としての立場もありますから、普段はエッチなことは禁止ですけど……今はラッキースケベ発生中なので……」"

[[dialogue]]
speaker = "サチ"
# 「ん……ちゅっ……<emoji=heart04>」
line = "「ん……ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
# 「これは、特別です……<emoji=heart04>」
line = "「これは、特別です……<emoji=heart04>」"

[[dialogue]]
speaker = "トレジアンナ"
# 「ふあぁ……よく寝ました……昨夜のロストアイテム回収で力を使いまくったせいか、久しぶりに爆睡してしまいましたよ～」
line = "「ふあぁ……よく寝ました……昨夜のロストアイテム回収で力を使いまくったせいか、久しぶりに爆睡してしまいましたよ～」"

[[dialogue]]
speaker = "サチ"
# 「あっ、トレジアンナさん。起きたんですね」
line = "「あっ、トレジアンナさん。起きたんですね」"

[[dialogue]]
speaker = "トレジアンナ"
# 「ああ、サチさん、おはようございます～。会長さんもご一緒でしたか。っていうか、もう夜ですね。丸１日寝てたってやつですねこれ」
line = "「ああ、サチさん、おはようございます～。会長さんもご一緒でしたか。っていうか、もう夜ですね。丸１日寝てたってやつですねこれ」"

[[dialogue]]
speaker = "トレジアンナ"
# 「お２人は学園から帰宅途中ですか？　あれ？　何か、お２人の距離近くありません？　というか、手を繋いで……しかも恋人繋ぎじゃないですか、それ！？」
line = "「お２人は学園から帰宅途中ですか？　あれ？　何か、お２人の距離近くありません？　というか、手を繋いで……しかも恋人繋ぎじゃないですか、それ！？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「えっ、私が寝てる間に何かあったんです！？　これ、ひょっとして私、重要な場面見逃してません！？　サチさん、会長さん、状況説明プリーズ！」
line = "「えっ、私が寝てる間に何かあったんです！？　これ、ひょっとして私、重要な場面見逃してません！？　サチさん、会長さん、状況説明プリーズ！」"

[[dialogue]]
speaker = "サチ"
# 「ふふっ……♪　秘密です♪」
line = "「ふふっ……♪　秘密です♪」"

[[dialogue]]
speaker = "トレジアンナ"
# 「えええぇぇぇっ！？　ちょっ……タイムマシン的なロストアイテム、今すぐきてぇぇぇ！」
line = "「えええぇぇぇっ！？　ちょっ……タイムマシン的なロストアイテム、今すぐきてぇぇぇ！」"

[[dialogue]]
speaker = "unk"
# トレジアンナさんをからかいながら、俺の手を握り、幸せそうに笑うサチなのだった。
line = "トレジアンナさんをからかいながら、俺の手を握り、幸せそうに笑うサチなのだった。"
