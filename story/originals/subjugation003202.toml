[[dialogue]]
speaker = "unk"
# 新たなフォームに変身したイクシリオンは、驚くトワに事情を説明する。
line = "新たなフォームに変身したイクシリオンは、驚くトワに事情を説明する。"

[[dialogue]]
speaker = "イクシリオン"
# 「――昨晩、寮のキッチンでチョコ作りをしていたところ、突然このバレンタインフォームに変身してしまったんです……」
line = "「――昨晩、寮のキッチンでチョコ作りをしていたところ、突然このバレンタインフォームに変身してしまったんです……」"

[[dialogue]]
speaker = "イクシリオン"
# 「喜ばしい覚醒ではあるのですが、問題は――変身すると必ずこのフォームになってしまう、という点でして……」
line = "「喜ばしい覚醒ではあるのですが、問題は――変身すると必ずこのフォームになってしまう、という点でして……」"

[[dialogue]]
speaker = "トワ先生"
# 「！　それって、他のフォームに変身できなくなっちゃった、ってこと……？」
line = "「！　それって、他のフォームに変身できなくなっちゃった、ってこと……？」"

[[dialogue]]
speaker = "イクシリオン"
# 「はい。トワ先生も以前、同じような状況になったことがあるとお聞きしたことがあって……」
line = "「はい。トワ先生も以前、同じような状況になったことがあるとお聞きしたことがあって……」"

[[dialogue]]
speaker = "トワ先生"
# 「なるほど。それで私に相談しに来たんだね」
line = "「なるほど。それで私に相談しに来たんだね」"

[[dialogue]]
speaker = "unk"
# かつてトワは、ジューンブライドの時期に突然『ウェディングフォーム』へ変身してしまうという経験をしたことがあった。
line = "かつてトワは、ジューンブライドの時期に突然『ウェディングフォーム』へ変身してしまうという経験をしたことがあった。"

[[dialogue]]
speaker = "unk"
# その時は、変身するとフォームが強制固定され、通常の戦闘服やノヴァフォームに戻れなくなってしまったのだ。
line = "その時は、変身するとフォームが強制固定され、通常の戦闘服やノヴァフォームに戻れなくなってしまったのだ。"

[[dialogue]]
speaker = "トワ先生"
# 「ちなみに、イクシリオンちゃんがバレンタインチョコを渡そうと思っている相手って……？」
line = "「ちなみに、イクシリオンちゃんがバレンタインチョコを渡そうと思っている相手って……？」"

[[dialogue]]
speaker = "イクシリオン"
# 「え！？　そ、それはそのぉ……<emoji=heart04>」
line = "「え！？　そ、それはそのぉ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# イクシリオンは顔を赤くして、もじもじと答える。
line = "イクシリオンは顔を赤くして、もじもじと答える。"

[[dialogue]]
speaker = "イクシリオン"
# 「お、お世話になっている、緋宮会長に……お渡ししたいと……<emoji=heart04>」
line = "「お、お世話になっている、緋宮会長に……お渡ししたいと……<emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
# 「あ～、やっぱり会長くんかぁ……。だとすると――」
line = "「あ～、やっぱり会長くんかぁ……。だとすると――」"

[[dialogue]]
speaker = "トワ先生"
# 「私の経験を踏まえると、会長くんにチョコを渡せば、バレンタインフォームの固定も解除できるかもしれないね」
line = "「私の経験を踏まえると、会長くんにチョコを渡せば、バレンタインフォームの固定も解除できるかもしれないね」"

[[dialogue]]
speaker = "トワ先生"
# （恥ずかしいけど……私も、会長くんと疑似的な結婚式をしたことで、ウェディングフォームを解除できたから……）
line = "（恥ずかしいけど……私も、会長くんと疑似的な結婚式をしたことで、ウェディングフォームを解除できたから……）"

[[dialogue]]
speaker = "イクシリオン"
# 「チョコを渡す……うぅ、ますます困りました……」
line = "「チョコを渡す……うぅ、ますます困りました……」"

[[dialogue]]
speaker = "トワ先生"
# 「あれ？　でも、会長くんに渡すんだよね？」
line = "「あれ？　でも、会長くんに渡すんだよね？」"

[[dialogue]]
speaker = "イクシリオン"
# 「はい……ですが、肝心のチョコ作りに大問題がありまして……。昨晩、バレンタインフォームに覚醒した後、落ち着いてから作ろうとしたんですが――」
line = "「はい……ですが、肝心のチョコ作りに大問題がありまして……。昨晩、バレンタインフォームに覚醒した後、落ち着いてから作ろうとしたんですが――」"

[[dialogue]]
speaker = "イクシリオン"
# 「途中でまた勝手にバレンタインフォームに変身して、『妄想トリップ』してしまうようになったんです」
line = "「途中でまた勝手にバレンタインフォームに変身して、『妄想トリップ』してしまうようになったんです」"

[[dialogue]]
speaker = "トワ先生"
# 「も、妄想トリップ……？」
line = "「も、妄想トリップ……？」"

[[dialogue]]
speaker = "イクシリオン"
# 「はい。お恥ずかしながら、私……昔から少し妄想癖がありまして……」
line = "「はい。お恥ずかしながら、私……昔から少し妄想癖がありまして……」"

[[dialogue]]
speaker = "イクシリオン"
# 「そのせいか、バレンタインフォームだとその妄想癖が強くなってしまって、チョコ作りが全然うまくいかなくて……」
line = "「そのせいか、バレンタインフォームだとその妄想癖が強くなってしまって、チョコ作りが全然うまくいかなくて……」"

[[dialogue]]
speaker = "トワ先生"
# 「ちなみに、変身解除は試したの？」
line = "「ちなみに、変身解除は試したの？」"

[[dialogue]]
speaker = "イクシリオン"
# 「もちろんです。ですが、作り始めるとすぐにまたバレンタインフォームに強制変身してしまって……」
line = "「もちろんです。ですが、作り始めるとすぐにまたバレンタインフォームに強制変身してしまって……」"

[[dialogue]]
speaker = "トワ先生"
# 「なるほど、そのまま妄想トリップに突入しちゃうループってわけだね……」
line = "「なるほど、そのまま妄想トリップに突入しちゃうループってわけだね……」"

[[dialogue]]
speaker = "イクシリオン"
# 「はい。ですので、どうやってチョコを作ったものかと……」
line = "「はい。ですので、どうやってチョコを作ったものかと……」"

[[dialogue]]
speaker = "トワ先生"
# 「わかった――そういうことなら、先生が手伝うよ！」
line = "「わかった――そういうことなら、先生が手伝うよ！」"

[[dialogue]]
speaker = "イクシリオン"
# 「えっ、先生が私のチョコ作りを……！？　よろしいんですか……？」
line = "「えっ、先生が私のチョコ作りを……！？　よろしいんですか……？」"

[[dialogue]]
speaker = "トワ先生"
# 「うん！　困っている生徒を放っておけないからね。先生の仕事は導くこと！　だから、任せて♪」
line = "「うん！　困っている生徒を放っておけないからね。先生の仕事は導くこと！　だから、任せて♪」"

[[dialogue]]
speaker = "イクシリオン"
# 「トワ先生……！　ありがとうございます！」
line = "「トワ先生……！　ありがとうございます！」"

[[dialogue]]
speaker = "unk"
# こうして、イクシリオンはトワの協力を得て、一緒にバレンタインチョコ作りをすることになるのだった。
line = "こうして、イクシリオンはトワの協力を得て、一緒にバレンタインチョコ作りをすることになるのだった。"
