[[dialogue]]
speaker = "unk"
# 第１２話,漆黒の騎士,B
line = "第１２話,漆黒の騎士,B"

[[dialogue]]
speaker = "？？？"
# 『無駄だ』
line = "『無駄だ』"

[[dialogue]]
speaker = "マトイ"
# 「っ……喋っ……」
line = "「っ……喋っ……」"

[[dialogue]]
speaker = "unk"
# ようやく──異形の影が言葉を発した。
line = "ようやく──異形の影が言葉を発した。"

[[dialogue]]
speaker = "unk"
# 甲冑越しにくぐもって聞こえたその声は、機械の駆動を思わせる鈍い重低音だった。
line = "甲冑越しにくぐもって聞こえたその声は、機械の駆動を思わせる鈍い重低音だった。"

[[dialogue]]
speaker = "？？？"
# 『魔王の力は既に尽きている。呼び覚まそうとしても無駄なこと』
line = "『魔王の力は既に尽きている。呼び覚まそうとしても無駄なこと』"

[[dialogue]]
speaker = "？？？"
# 『破滅の竜を討った程度で枯れ果てる──己が器としての未熟さを悔いよ』
line = "『破滅の竜を討った程度で枯れ果てる──己が器としての未熟さを悔いよ』"

[[dialogue]]
speaker = "クロト"
# 「なん──だって……！？」
line = "「なん──だって……！？」"

[[dialogue]]
speaker = "クロト"
# 「おまえは……何者だ。俺を、どこまで知っている──！？」
line = "「おまえは……何者だ。俺を、どこまで知っている──！？」"

[[dialogue]]
speaker = "？？？"
# 『答える義理はない』
line = "『答える義理はない』"

[[dialogue]]
speaker = "unk"
# あまりにも意味深な騎士の言葉──
line = "あまりにも意味深な騎士の言葉──"

[[dialogue]]
speaker = "unk"
# しかし、俺の問いに対する返答は禍々しい攻撃の前動作だった。
line = "しかし、俺の問いに対する返答は禍々しい攻撃の前動作だった。"

[[dialogue]]
speaker = "？？？"
# 『世界を救う──などと、よくもその程度で吠えたものだ』
line = "『世界を救う──などと、よくもその程度で吠えたものだ』"

[[dialogue]]
speaker = "？？？"
# 『残滓に用はない。ここで散れ』
line = "『残滓に用はない。ここで散れ』"

[[dialogue]]
speaker = "unk"
# 影の握る大剣へ──暗黒のエネルギーが収束していく。
line = "影の握る大剣へ──暗黒のエネルギーが収束していく。"

[[dialogue]]
speaker = "クロト"
# 「なんらかのチャージだ──かき消すぞ！」
line = "「なんらかのチャージだ──かき消すぞ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「え、ええっ──光で対抗するわ──！」
line = "「え、ええっ──光で対抗するわ──！」"

[[dialogue]]
speaker = "unk"
# 闇の星術をかき消すように──ヴィーナスが光でもって応戦する。
line = "闇の星術をかき消すように──ヴィーナスが光でもって応戦する。"

[[dialogue]]
speaker = "unk"
# だが、その一切が相殺できない。
line = "だが、その一切が相殺できない。"

[[dialogue]]
speaker = "unk"
# 水が油と交わらないように、こちらの攻撃が何もかもすり抜けていく！
line = "水が油と交わらないように、こちらの攻撃が何もかもすり抜けていく！"

[[dialogue]]
speaker = "アナ"
# 「っ、これは──！？」
line = "「っ、これは──！？」"

[[dialogue]]
speaker = "unk"
# 闇と光がかち合わない──
line = "闇と光がかち合わない──"

[[dialogue]]
speaker = "unk"
# そして何より、影の操る闇は、俺たちの使っている星術とも、あの魔女たちが見せた魔法とも異なるオーラ。
line = "そして何より、影の操る闇は、俺たちの使っている星術とも、あの魔女たちが見せた魔法とも異なるオーラ。"

[[dialogue]]
speaker = "ソフィア"
# （星力でも──）
line = "（星力でも──）"

[[dialogue]]
speaker = "フィオナ"
# （魔力でも──）
line = "（魔力でも──）"

[[dialogue]]
speaker = "クロト"
# （ない──！）
line = "（ない──！）"

[[dialogue]]
speaker = "unk"
# 気づいたひとつの可能性。
line = "気づいたひとつの可能性。"

[[dialogue]]
speaker = "unk"
# しかし、そこに思いを巡らせている時間はカケラもなかった。
line = "しかし、そこに思いを巡らせている時間はカケラもなかった。"

[[dialogue]]
speaker = "黒騎士"
# 『天壌無窮……<ruby=くら>昏</ruby>き断罪をここに下す』
line = "『天壌無窮……<ruby>昏<rt>くら</rt></ruby>き断罪をここに下す』"

[[dialogue]]
speaker = "黒騎士"
# 『最終審判の時・闇の制裁』
line = "『最終審判の時・闇の制裁』"

[[dialogue]]
speaker = "ユウリ"
# 「っっっっっっっっっ────！！」
line = "「っっっっっっっっっ────！！」"

[[dialogue]]
speaker = "unk"
# とてつもない衝撃が──滅んだ朱雀暦の世界そのものを揺らした。
line = "とてつもない衝撃が──滅んだ朱雀暦の世界そのものを揺らした。"

[[dialogue]]
speaker = "unk"
# そして……
line = "そして……"

[[dialogue]]
speaker = "ヴィーナス"
# 「ぐ──ぅっ……はっ……は、放しなさいッ──！　ッ、何っ──つああぁっ！？」
line = "「ぐ──ぅっ……はっ……は、放しなさいッ──！　ッ、何っ──つああぁっ！？」"

[[dialogue]]
speaker = "サーシャ"
# 「ヴィーナスちゃん──！？」
line = "「ヴィーナスちゃん──！？」"

[[dialogue]]
speaker = "クロト"
# 「いつの間に──ヴィーナスを放せ、影！」
line = "「いつの間に──ヴィーナスを放せ、影！」"

[[dialogue]]
speaker = "unk"
# ヴィーナスの身柄が──異形の影、その甲冑に抱き抱えられていた。
line = "ヴィーナスの身柄が──異形の影、その甲冑に抱き抱えられていた。"

[[dialogue]]
speaker = "unk"
# 今の一瞬で、<ruby=さら>拐</ruby>ったというのか……！
line = "今の一瞬で、<ruby>拐<rt>さら</rt></ruby>ったというのか……！"

[[dialogue]]
speaker = "黒騎士"
# 『九浄の娘──予言の書──壁画の真実を知る者──』
line = "『九浄の娘──予言の書──壁画の真実を知る者──』"

[[dialogue]]
speaker = "黒騎士"
# 『不穏である。デネブか、ベガか……あるべきでない世界線から混入した異分子。排除せねばならない』
line = "『不穏である。デネブか、ベガか……あるべきでない世界線から混入した異分子。排除せねばならない』"

[[dialogue]]
speaker = "クロト"
# 「っ──！？」
line = "「っ──！？」"

[[dialogue]]
speaker = "アナ"
# 「──何の話を、しているのですか……！？」
line = "「──何の話を、しているのですか……！？」"

[[dialogue]]
speaker = "unk"
# 甲冑の奥底から響く胡乱な言葉の数々。
line = "甲冑の奥底から響く胡乱な言葉の数々。"

[[dialogue]]
speaker = "unk"
# だが何よりも、俺にはヴィーナスがその腕に抱かれているのが許せない──！
line = "だが何よりも、俺にはヴィーナスがその腕に抱かれているのが許せない──！"

[[dialogue]]
speaker = "クロト"
# 「こちらを見ろ、影野郎──ッ！」
line = "「こちらを見ろ、影野郎──ッ！」"

[[dialogue]]
speaker = "黒騎士"
# 『────』
line = "『────』"

[[dialogue]]
speaker = "unk"
# 傷を押して立ち上がり──怒涛のラッシュを影に浴びせる。
line = "傷を押して立ち上がり──怒涛のラッシュを影に浴びせる。"

[[dialogue]]
speaker = "unk"
# しかし──
line = "しかし──"

[[dialogue]]
speaker = "黒騎士"
# 『薄い。脆すぎる』
line = "『薄い。脆すぎる』"

[[dialogue]]
speaker = "クロト"
# 「が──っ！！」
line = "「が──っ！！」"

[[dialogue]]
speaker = "アナ"
# 「会長──！」
line = "「会長──！」"

[[dialogue]]
speaker = "黒騎士"
# 『さらばだ。いずれ、新たなる地平で<ruby=まみ>見</ruby>える時も来よう』
line = "『さらばだ。いずれ、新たなる地平で<ruby>見<rt>まみ</rt></ruby>える時も来よう』"

[[dialogue]]
speaker = "unk"
# 無情にも──
line = "無情にも──"

[[dialogue]]
speaker = "unk"
# 圧倒的な膂力で放たれた斬撃が、俺たちの攻撃をまとめて無に帰す。
line = "圧倒的な膂力で放たれた斬撃が、俺たちの攻撃をまとめて無に帰す。"

[[dialogue]]
speaker = "unk"
# 異形の影はヴィーナスを抱きかかえたまま、塔に穿たれた異次元の大穴へと去ってゆき──
line = "異形の影はヴィーナスを抱きかかえたまま、塔に穿たれた異次元の大穴へと去ってゆき──"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロト──────ッッッ！！！」
line = "「クロト──────ッッッ！！！」"

[[dialogue]]
speaker = "クロト"
# 「ヴィーナス──────ッッッ！！！」
line = "「ヴィーナス──────ッッッ！！！」"

[[dialogue]]
speaker = "unk"
# 眼前を漂白していく光。
line = "眼前を漂白していく光。"

[[dialogue]]
speaker = "unk"
# 塔から追放されるこの感覚。
line = "塔から追放されるこの感覚。"

[[dialogue]]
speaker = "unk"
# 無に帰していく、かつての世界こそが……俺が第三階層で最後に見た光景だった。
line = "無に帰していく、かつての世界こそが……俺が第三階層で最後に見た光景だった。"
