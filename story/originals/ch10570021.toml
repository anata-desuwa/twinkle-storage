[[dialogue]]
speaker = "unk"
# 第１話,謎の正月遊戯,P
line = "第１話,謎の正月遊戯,P"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふー、凧あげに、コマ回し、羽根つき……正月遊びも順調にノルマクリアね！」
line = "「ふー、凧あげに、コマ回し、羽根つき……正月遊びも順調にノルマクリアね！」"

[[dialogue]]
speaker = "トリシャ"
# 「ふぅ……すでに１年分……遊んだ気分です……」
line = "「ふぅ……すでに１年分……遊んだ気分です……」"

[[dialogue]]
speaker = "unk"
# 正月早々、俺とトリシャさんとフィオナは、ヴィーナスの正月ミッションコンプリートを手伝わされていた。
line = "正月早々、俺とトリシャさんとフィオナは、ヴィーナスの正月ミッションコンプリートを手伝わされていた。"

[[dialogue]]
speaker = "フィオナ"
# 「さすがヴィーナスさん、新年から元気全開ですね。トリシャさんは楽しめてますか？」
line = "「さすがヴィーナスさん、新年から元気全開ですね。トリシャさんは楽しめてますか？」"

[[dialogue]]
speaker = "トリシャ"
# 「はい……とても……。人間界の正月遊戯……噂には聞いていましたが、体験するとまた格別です……フフフ」
line = "「はい……とても……。人間界の正月遊戯……噂には聞いていましたが、体験するとまた格別です……フフフ」"

[[dialogue]]
speaker = "トリシャ"
# 「ああ、そういえば……まだやっていない正月遊戯がありますね……一度やってみたいと思っていたのですが……皆さんはご存じでしょうか……？」
line = "「ああ、そういえば……まだやっていない正月遊戯がありますね……一度やってみたいと思っていたのですが……皆さんはご存じでしょうか……？」"

[[dialogue]]
speaker = "unk"
# なんて遊び？
line = "なんて遊び？"

[[dialogue]]
speaker = "トリシャ"
# 「なんという名前だったでしょうか……人間界のコミックで読んだのですが……記憶が定かではなく……屋内で行う遊戯で……」
line = "「なんという名前だったでしょうか……人間界のコミックで読んだのですが……記憶が定かではなく……屋内で行う遊戯で……」"

[[dialogue]]
speaker = "unk"
# 福笑い？
line = "福笑い？"

[[dialogue]]
speaker = "unk"
# 双六？
line = "双六？"

[[dialogue]]
speaker = "トリシャ"
# 「いえ……違いますね……無数の首を捧げる……」
line = "「いえ……違いますね……無数の首を捧げる……」"

[[dialogue]]
speaker = "フィオナ"
# 「怖い怖い怖いです！　なんですかそれ！？」
line = "「怖い怖い怖いです！　なんですかそれ！？」"

[[dialogue]]
speaker = "トリシャ"
# 「いえ……怖くはありません。極めて安全かつ健全な遊戯です……詠唱者がいまして……」
line = "「いえ……怖くはありません。極めて安全かつ健全な遊戯です……詠唱者がいまして……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「星術の詠唱かしら？」
line = "「星術の詠唱かしら？」"

[[dialogue]]
speaker = "トリシャ"
# 「不可思議かつ独特なテンポで、呪言が読み上げられます……」
line = "「不可思議かつ独特なテンポで、呪言が読み上げられます……」"

[[dialogue]]
speaker = "フィオナ"
# 「今のところ、不穏な要素しか出てきてませんね……」
line = "「今のところ、不穏な要素しか出てきてませんね……」"

[[dialogue]]
speaker = "トリシャ"
# 「対峙する敵よりも、いち早く呪符を奪い取り……」
line = "「対峙する敵よりも、いち早く呪符を奪い取り……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「呪符……？」
line = "「呪符……？」"

[[dialogue]]
speaker = "トリシャ"
# 「敵陣へと切り込むこともあり……」
line = "「敵陣へと切り込むこともあり……」"

[[dialogue]]
speaker = "フィオナ"
# 「戦争でしょうか？　雪合戦……いえ、屋内の遊戯でしたね」
line = "「戦争でしょうか？　雪合戦……いえ、屋内の遊戯でしたね」"

[[dialogue]]
speaker = "トリシャ"
# 「刹那の激しい戦いが繰り広げられる……そのようなゲームです……」
line = "「刹那の激しい戦いが繰り広げられる……そのようなゲームです……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「どんなゲームよ！？」
line = "「どんなゲームよ！？」"

[[dialogue]]
speaker = "トリシャ"
# 「そのような遊戯なのです……情報に誤りはないかと……」
line = "「そのような遊戯なのです……情報に誤りはないかと……」"

[[dialogue]]
speaker = "フィオナ"
# 「重要そうなキーワードを並べてみましょう。詠唱……呪符……対戦……刹那……」
line = "「重要そうなキーワードを並べてみましょう。詠唱……呪符……対戦……刹那……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「星術の模擬戦かしら。それはそれで面白そうだけど、無数の首っていうのが穏やかじゃないわね」
line = "「星術の模擬戦かしら。それはそれで面白そうだけど、無数の首っていうのが穏やかじゃないわね」"

[[dialogue]]
speaker = "unk"
# あっ、もしかして！？
line = "あっ、もしかして！？"

[[dialogue]]
speaker = "フィオナ"
# 「緋宮会長、わかったのですか？」
line = "「緋宮会長、わかったのですか？」"

[[dialogue]]
speaker = "unk"
# 百人一首！？
line = "百人一首！？"

[[dialogue]]
speaker = "トリシャ"
# 「ああ……それです。そのような名前でしたね……胸のつかえが取れました……ふう」
line = "「ああ……それです。そのような名前でしたね……胸のつかえが取れました……ふう」"

[[dialogue]]
speaker = "フィオナ"
# 「確かに百人の首でしたね。それに短歌を詠むリズムって独特ですし、取り札に書かれている下の句も意味が分からなければ呪文のようなものですし」
line = "「確かに百人の首でしたね。それに短歌を詠むリズムって独特ですし、取り札に書かれている下の句も意味が分からなければ呪文のようなものですし」"

[[dialogue]]
speaker = "ヴィーナス"
# 「確かにカルタなら正月の遊びね。百人一首なら、屋敷のどこかにあったはず……えーと、どこに置いてたかしら？」
line = "「確かにカルタなら正月の遊びね。百人一首なら、屋敷のどこかにあったはず……えーと、どこに置いてたかしら？」"

[[dialogue]]
speaker = "ヘレナ"
# 「探し物は、この小倉百人一首かな？」
line = "「探し物は、この小倉百人一首かな？」"

[[dialogue]]
speaker = "フィオナ"
# 「ヘレナさん、ありがとうございます」
line = "「ヘレナさん、ありがとうございます」"

[[dialogue]]
speaker = "ヘレナ"
# 「せっかくだし、２チームに分かれてやってみてはどうだ？　魔王とトリシャ、ヴィーナスとフィオナのチームで源平合戦だ。勝った方には私から特別お年玉を進呈しよう」
line = "「せっかくだし、２チームに分かれてやってみてはどうだ？　魔王とトリシャ、ヴィーナスとフィオナのチームで源平合戦だ。勝った方には私から特別お年玉を進呈しよう」"

[[dialogue]]
speaker = "フィオナ"
# 「望むところではありますが、トリシャさんは初心者なのでは？　百人一首でしたら、坊主めくりで遊ぶというのも」
line = "「望むところではありますが、トリシャさんは初心者なのでは？　百人一首でしたら、坊主めくりで遊ぶというのも」"

[[dialogue]]
speaker = "トリシャ"
# 「コミックを読んでいましたので……札に書かれているいくつかのワードは記憶しています……」
line = "「コミックを読んでいましたので……札に書かれているいくつかのワードは記憶しています……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それなら全力でいかせてもらうわ！　やるからには負けないわよ！　ヘレナちゃん、詠み手をお願いね」
line = "「それなら全力でいかせてもらうわ！　やるからには負けないわよ！　ヘレナちゃん、詠み手をお願いね」"

[[dialogue]]
speaker = "ヘレナ"
# 「うむ、任された。では、往くぞ。千早ぶる～神代もきかず竜田──」
line = "「うむ、任された。では、往くぞ。千早ぶる～神代もきかず竜田──」"

[[dialogue]]
speaker = "トリシャ"
# 「はいっ……！」
line = "「はいっ……！」"

[[dialogue]]
speaker = "unk"
# トリシャさん、ナイス！
line = "トリシャさん、ナイス！"

[[dialogue]]
speaker = "トリシャ"
# 「ありがとうございます……初めて取れました……にへへ……」
line = "「ありがとうございます……初めて取れました……にへへ……」"

[[dialogue]]
speaker = "トリシャ"
# 「千早ぶる……神代も聞かず……竜田川……からくれなゐに……水くくるとは……でした。しかしどういった意味なのでしょう？」
line = "「千早ぶる……神代も聞かず……竜田川……からくれなゐに……水くくるとは……でした。しかしどういった意味なのでしょう？」"

[[dialogue]]
speaker = "フィオナ"
# 「神代の時代でも、竜田川が紅に染まったことはない……紅葉の葉で赤く染まった川に感動した歌とされていますね」
line = "「神代の時代でも、竜田川が紅に染まったことはない……紅葉の葉で赤く染まった川に感動した歌とされていますね」"

[[dialogue]]
speaker = "トリシャ"
# 「なるほど……風景に感嘆した心境を詠ったものなのですね……風情があります」
line = "「なるほど……風景に感嘆した心境を詠ったものなのですね……風情があります」"

[[dialogue]]
speaker = "ヴィーナス"
# 「まだ下の句を詠んでいないのに、トリシャやるわね！　相手にとって不足なしよ。さっきはちょっと油断しちゃったけど、次から全力で行くわ！」
line = "「まだ下の句を詠んでいないのに、トリシャやるわね！　相手にとって不足なしよ。さっきはちょっと油断しちゃったけど、次から全力で行くわ！」"

[[dialogue]]
speaker = "トリシャ"
# 「望むところ……です……」
line = "「望むところ……です……」"

[[dialogue]]
speaker = "unk"
# ２人で勝ちましょう、トリシャさん！
line = "２人で勝ちましょう、トリシャさん！"

[[dialogue]]
speaker = "トリシャ"
# 「はい……あなたと勝ちたいです……。それに……みんなと遊ぶゲーム……楽しい……にへ、にへへ……♪」
line = "「はい……あなたと勝ちたいです……。それに……みんなと遊ぶゲーム……楽しい……にへ、にへへ……♪」"

[[dialogue]]
speaker = "ヘレナ"
# 「続いていくぞ。これやこの～」
line = "「続いていくぞ。これやこの～」"

[[dialogue]]
speaker = "unk"
# こうして俺たちは、ヘレナちゃんの呪文詠唱による百人一首に興じたのであった。
line = "こうして俺たちは、ヘレナちゃんの呪文詠唱による百人一首に興じたのであった。"
