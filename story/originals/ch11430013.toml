[[dialogue]]
speaker = "unk"
# 第３話,パン大好きな藝術家,P
line = "第３話,パン大好きな藝術家,P"

[[dialogue]]
speaker = "ラファエロ"
# 「ん～～♪　ここのパンも絶品だね。焼き加減も抜群。香りも最高だ」
line = "「ん～～♪　ここのパンも絶品だね。焼き加減も抜群。香りも最高だ」"

[[dialogue]]
speaker = "蛍火"
# 「気に入っていただけて良かったです。パン、お好きなんですね」
line = "「気に入っていただけて良かったです。パン、お好きなんですね」"

[[dialogue]]
speaker = "ラファエロ"
# 「ああ、ぼくはパンには目がなくてね」
line = "「ああ、ぼくはパンには目がなくてね」"

[[dialogue]]
speaker = "ラファエロ"
# 「自分でも焼くこともあるし、人に振る舞えば、涙を流して喜んでもらえる程度には腕に自信があるよ」
line = "「自分でも焼くこともあるし、人に振る舞えば、涙を流して喜んでもらえる程度には腕に自信があるよ」"

[[dialogue]]
speaker = "サラン"
# 「ラファエロちゃん、絵だけじゃなくてパン作りも上手なんだ～」
line = "「ラファエロちゃん、絵だけじゃなくてパン作りも上手なんだ～」"

[[dialogue]]
speaker = "ラファエロ"
# 「ふふ、それほどでもあるけどね」
line = "「ふふ、それほどでもあるけどね」"

[[dialogue]]
speaker = "ラファエロ"
# 「こっちに来てからもパンを食べ歩いているけれど、どこのお店も美味しいね」
line = "「こっちに来てからもパンを食べ歩いているけれど、どこのお店も美味しいね」"

[[dialogue]]
speaker = "ラファエロ"
# 「２枚の丸いパンに肉の塊が挟まっているかと思えば、甘い豆が入っていたりと、面白いものばかりだ」
line = "「２枚の丸いパンに肉の塊が挟まっているかと思えば、甘い豆が入っていたりと、面白いものばかりだ」"

[[dialogue]]
speaker = "unk"
# 甘い豆が入ってるのは、あんパンだね
line = "甘い豆が入ってるのは、あんパンだね"

[[dialogue]]
speaker = "unk"
# 肉が挟まっているのは、ハンバーガーだね
line = "肉が挟まっているのは、ハンバーガーだね"

[[dialogue]]
speaker = "ラファエロ"
# 「そうそう、そんな名前だったよ。また食べたいな」
line = "「そうそう、そんな名前だったよ。また食べたいな」"

[[dialogue]]
speaker = "ラファエロ"
# 「しかも、どのお店もバラエティに富んでいて独自性があるね。食感も変わったものが多い」
line = "「しかも、どのお店もバラエティに富んでいて独自性があるね。食感も変わったものが多い」"

[[dialogue]]
speaker = "サラン"
# 「ふわふわ～だったり、もちもち～だったりするよね～」
line = "「ふわふわ～だったり、もちもち～だったりするよね～」"

[[dialogue]]
speaker = "ラファエロ"
# 「うん、あのモチッとした食感は楽しいね。アテネスのパンにはないものだよ」
line = "「うん、あのモチッとした食感は楽しいね。アテネスのパンにはないものだよ」"

[[dialogue]]
speaker = "ラファエロ"
# 「あれはどうやって作るんだい？　そもそも粉が違うのかな」
line = "「あれはどうやって作るんだい？　そもそも粉が違うのかな」"

[[dialogue]]
speaker = "サラン"
# 「小麦粉だけじゃなくって～、米粉とかタピオカ粉も使ってるから～？」
line = "「小麦粉だけじゃなくって～、米粉とかタピオカ粉も使ってるから～？」"

[[dialogue]]
speaker = "ラファエロ"
# 「米粉に、タピオカ粉……？　なるほど、麦だけにこだわらずとも、こんなに美味しいパンが作れるのか……」
line = "「米粉に、タピオカ粉……？　なるほど、麦だけにこだわらずとも、こんなに美味しいパンが作れるのか……」"

[[dialogue]]
speaker = "蛍火"
# 「それと湯種製法でしょうか」
line = "「それと湯種製法でしょうか」"

[[dialogue]]
speaker = "ラファエロ"
# 「ゆだね……？　湯種とは一体、何を指す言葉なんだい？」
line = "「ゆだね……？　湯種とは一体、何を指す言葉なんだい？」"

[[dialogue]]
speaker = "蛍火"
# 「熱湯でこねて、一晩寝かせておいたパン生地のことです」
line = "「熱湯でこねて、一晩寝かせておいたパン生地のことです」"

[[dialogue]]
speaker = "ラファエロ"
# 「そんなやり方があるのか！　素材だけではなく、手法にも違いがあったとは」
line = "「そんなやり方があるのか！　素材だけではなく、手法にも違いがあったとは」"

[[dialogue]]
speaker = "蛍火"
# 「はい。パンをこねる際に、何割か湯種を混ぜこむことで、もちっとした食感が生まれるんです」
line = "「はい。パンをこねる際に、何割か湯種を混ぜこむことで、もちっとした食感が生まれるんです」"

[[dialogue]]
speaker = "ラファエロ"
# 「小麦粉以外の粉に湯種か……その発想はなかったな。ぼくともあろうものが、固定観念に囚われていたようだ」
line = "「小麦粉以外の粉に湯種か……その発想はなかったな。ぼくともあろうものが、固定観念に囚われていたようだ」"

[[dialogue]]
speaker = "ラファエロ"
# 「パンはもっと自由な発想で作っていいんだね！　異邦の地は学びが多い！」
line = "「パンはもっと自由な発想で作っていいんだね！　異邦の地は学びが多い！」"

[[dialogue]]
speaker = "ラファエロ"
# 「ありがとう。アテネスに帰ってからの楽しみが増えたよ」
line = "「ありがとう。アテネスに帰ってからの楽しみが増えたよ」"

[[dialogue]]
speaker = "蛍火"
# 「礼には及びません。せっかくなら、こちらでも腕をふるってみてはいかがですか？」
line = "「礼には及びません。せっかくなら、こちらでも腕をふるってみてはいかがですか？」"

[[dialogue]]
speaker = "サラン"
# 「ラファエロちゃんの作るパン、食べてみたいな～。異世界の人が作るパン、美味しそう～」
line = "「ラファエロちゃんの作るパン、食べてみたいな～。異世界の人が作るパン、美味しそう～」"

[[dialogue]]
speaker = "unk"
# アテネス仕込みのパン、食べてみたい！
line = "アテネス仕込みのパン、食べてみたい！"

[[dialogue]]
speaker = "ラファエロ"
# 「もちろんいいとも！　いろいろ教えてくれたたお礼に、筆だけでなく、パン作りの腕もふるうとしよう」
line = "「もちろんいいとも！　いろいろ教えてくれたたお礼に、筆だけでなく、パン作りの腕もふるうとしよう」"

[[dialogue]]
speaker = "ラファエロ"
# 「ぼくのパンが異世界でどんな進化を遂げるか、見せてあげようじゃないか！」
line = "「ぼくのパンが異世界でどんな進化を遂げるか、見せてあげようじゃないか！」"

[[dialogue]]
speaker = "ラファエロ"
# 「さぁ、焼けたよ！　こっちに来てからぼくが初めて焼いたパンだ！　ご賞味あれ！」
line = "「さぁ、焼けたよ！　こっちに来てからぼくが初めて焼いたパンだ！　ご賞味あれ！」"

[[dialogue]]
speaker = "サラン"
# 「はむっ……わぁ、周りはサクッとしてて、中はもちもちふわふわ～……！」
line = "「はむっ……わぁ、周りはサクッとしてて、中はもちもちふわふわ～……！」"

[[dialogue]]
speaker = "ラファエロ"
# 「どうかな、会長。きみの舌には合ったかい？」
line = "「どうかな、会長。きみの舌には合ったかい？」"

[[dialogue]]
speaker = "unk"
# すごく美味しいよ！
line = "すごく美味しいよ！"

[[dialogue]]
speaker = "蛍火"
# 「小麦本来の味や香りを豊かに感じられます……見事な腕前ですね」
line = "「小麦本来の味や香りを豊かに感じられます……見事な腕前ですね」"

[[dialogue]]
speaker = "サラン"
# 「ラファエロちゃんのパン、とっても美味し～♪」
line = "「ラファエロちゃんのパン、とっても美味し～♪」"

[[dialogue]]
speaker = "ラファエロ"
# 「ふふ、ぼくはパンを焼くのも天才だからね！」
line = "「ふふ、ぼくはパンを焼くのも天才だからね！」"

[[dialogue]]
speaker = "サラン"
# 「あ、でも～、このままでもとっても美味しいけど、もっと美味しくする方法がありそう～」
line = "「あ、でも～、このままでもとっても美味しいけど、もっと美味しくする方法がありそう～」"

[[dialogue]]
speaker = "ラファエロ"
# 「本当かい？　それは是非とも聞かせてほしいな」
line = "「本当かい？　それは是非とも聞かせてほしいな」"

[[dialogue]]
speaker = "蛍火"
# 「ラファエロ様さえよろしければ、またカフェテリアのパン窯をお使いください」
line = "「ラファエロ様さえよろしければ、またカフェテリアのパン窯をお使いください」"

[[dialogue]]
speaker = "ラファエロ"
# 「ありがとう。こっちにいる間の楽しみがまた増えたよ。退屈知らずな人生は、実に最高だね！」
line = "「ありがとう。こっちにいる間の楽しみがまた増えたよ。退屈知らずな人生は、実に最高だね！」"
