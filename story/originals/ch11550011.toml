[[dialogue]]
speaker = "unk"
# 第１話,魔法少女（アニメ）談議,P
line = "第１話,魔法少女（アニメ）談議,P"

[[dialogue]]
speaker = "unk"
# 『悪魔のロストアイテム』を寄生型悪魔から引きはがすため、オムニスと陽彩は元の世界へ転移した。
line = "『悪魔のロストアイテム』を寄生型悪魔から引きはがすため、オムニスと陽彩は元の世界へ転移した。"

[[dialogue]]
speaker = "unk"
# その２人の帰りを待つまでの間、異世界からやってきた魔法少女たちは、こちらの世界で数日を過ごすことになった。
line = "その２人の帰りを待つまでの間、異世界からやってきた魔法少女たちは、こちらの世界で数日を過ごすことになった。"

[[dialogue]]
speaker = "いろは"
# 「めっっっっっっちゃ良かったぁ！！！！」
line = "「めっっっっっっちゃ良かったぁ！！！！」"

[[dialogue]]
speaker = "いろは"
# 「キャラよし、ストーリーよし、主題歌よし！　さすがアンナちゃんが激オシするだけのことはあったよ～！」
line = "「キャラよし、ストーリーよし、主題歌よし！　さすがアンナちゃんが激オシするだけのことはあったよ～！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「他にも見て欲しいアニメはありますが、時間には限りがありますからね～」
line = "「他にも見て欲しいアニメはありますが、時間には限りがありますからね～」"

[[dialogue]]
speaker = "トレジアンナ"
# 「となれば、押さえておかなければならないのはやはり『トレジャーキャプター☆ちえり』でしょう☆」
line = "「となれば、押さえておかなければならないのはやはり『トレジャーキャプター☆ちえり』でしょう☆」"

[[dialogue]]
speaker = "いろは"
# 「『ちぇりちぇりキュートな魔法少女ちえり参上っ☆　悪いマジックアイテムさん、ごめんなさいの時間だよっ♪』」
line = "「『ちぇりちぇりキュートな魔法少女ちえり参上っ☆　悪いマジックアイテムさん、ごめんなさいの時間だよっ♪』」"

[[dialogue]]
speaker = "トレジアンナ"
# 「おお～、決め台詞まで完璧じゃないですか！」
line = "「おお～、決め台詞まで完璧じゃないですか！」"

[[dialogue]]
speaker = "いろは"
# 「あの決めポーズが可愛すぎて……やっぱ魔法少女はああじゃないとね！」
line = "「あの決めポーズが可愛すぎて……やっぱ魔法少女はああじゃないとね！」"

[[dialogue]]
speaker = "いろは"
# 「ああいうポージングや名乗り、あたしたちでもやりたいんだよね～」
line = "「ああいうポージングや名乗り、あたしたちでもやりたいんだよね～」"

[[dialogue]]
speaker = "いろは"
# 「あたしはやる気満々なんだけど、カオリンが恥ずかしがって全然やってくれないんだー」
line = "「あたしはやる気満々なんだけど、カオリンが恥ずかしがって全然やってくれないんだー」"

[[dialogue]]
speaker = "トレジアンナ"
# 「それを言うならうちのサチさんも同じですよ。決め台詞が一番似合うビジュアルしてるのに……」
line = "「それを言うならうちのサチさんも同じですよ。決め台詞が一番似合うビジュアルしてるのに……」"

[[dialogue]]
speaker = "いろは"
# 「わかるーっ！　サチちゃん、一番魔法少女っぽいよね！」
line = "「わかるーっ！　サチちゃん、一番魔法少女っぽいよね！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「でしょう！？　さすがいろはさん、お目が高い☆」
line = "「でしょう！？　さすがいろはさん、お目が高い☆」"

[[dialogue]]
speaker = "いろは"
# 「やっぱりそうだよね！　仲間がいてよかった～」
line = "「やっぱりそうだよね！　仲間がいてよかった～」"

[[dialogue]]
speaker = "いろは"
# 「１回でいいから決め台詞をポーズ付きでやって欲しいけど、無理なのかな～」
line = "「１回でいいから決め台詞をポーズ付きでやって欲しいけど、無理なのかな～」"

[[dialogue]]
speaker = "トレジアンナ"
# 「まあ、ノリと雰囲気次第ではやってくれないこともないんですが……結構ハードルは高いみたいですね～」
line = "「まあ、ノリと雰囲気次第ではやってくれないこともないんですが……結構ハードルは高いみたいですね～」"

[[dialogue]]
speaker = "いろは"
# 「えー！ カラオケで主題歌熱唱してほしいのに～！」
line = "「えー！ カラオケで主題歌熱唱してほしいのに～！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「それにはまず、サチさんに『トレちぇり』を履修させるところからですね。めっちゃ薦めてるのですが、頑として見てくれないんです」
line = "「それにはまず、サチさんに『トレちぇり』を履修させるところからですね。めっちゃ薦めてるのですが、頑として見てくれないんです」"

[[dialogue]]
speaker = "いろは"
# 「わかった！　じゃああたしからもお願いしてみる！」
line = "「わかった！　じゃああたしからもお願いしてみる！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「是非、お願いします～♪」
line = "「是非、お願いします～♪」"

[[dialogue]]
speaker = "いろは"
# 「まあサチちゃんだけじゃなくて、アンナちゃんも十分に魔法少女って感じだけどね。えっと、先代の魔法少女なんだっけ？」
line = "「まあサチちゃんだけじゃなくて、アンナちゃんも十分に魔法少女って感じだけどね。えっと、先代の魔法少女なんだっけ？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「そうなんです！　ロストアイテムの回収中にドジってしまいまして、ずっと長い間封印されてしまっていたんですが……」
line = "「そうなんです！　ロストアイテムの回収中にドジってしまいまして、ずっと長い間封印されてしまっていたんですが……」"

[[dialogue]]
speaker = "トレジアンナ"
# 「封印を解いてこの姿を取り戻したのも最近のことで、それまではサチさんのお助け妖精としてロストアイテムの回収に協力していたんです」
line = "「封印を解いてこの姿を取り戻したのも最近のことで、それまではサチさんのお助け妖精としてロストアイテムの回収に協力していたんです」"

[[dialogue]]
speaker = "いろは"
# 「ちょっと思ったんだけど、ロストアイテムを集めるってなんかトレちぇりっぽくない？」
line = "「ちょっと思ったんだけど、ロストアイテムを集めるってなんかトレちぇりっぽくない？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「……お気づきになられましたか」
line = "「……お気づきになられましたか」"

[[dialogue]]
speaker = "いろは"
# 「あっ、やっぱり元ネタだったりするカンジ！？」
line = "「あっ、やっぱり元ネタだったりするカンジ！？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「魔法少女の王道と言えば『失せモノ探し』の物語ですよ。最近はバトルものも流行りですが、エブリデイマジックにこそ、魔法少女の源流があると考えています！」
line = "「魔法少女の王道と言えば『失せモノ探し』の物語ですよ。最近はバトルものも流行りですが、エブリデイマジックにこそ、魔法少女の源流があると考えています！」"

[[dialogue]]
speaker = "いろは"
# 「『オラ魔女ドドミちゃん』みたいなやつってことかな？　日常の中に、ちょっとした不思議なことが起こる～みたいな？」
line = "「『オラ魔女ドドミちゃん』みたいなやつってことかな？　日常の中に、ちょっとした不思議なことが起こる～みたいな？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「その通りです！　魔法少女がドンパチするのもギャップがあっていいですが、それはあくまでもキュートでワクワクな王道魔法少女の概念があってこそなんです！」
line = "「その通りです！　魔法少女がドンパチするのもギャップがあっていいですが、それはあくまでもキュートでワクワクな王道魔法少女の概念があってこそなんです！」"

[[dialogue]]
speaker = "いろは"
# 「いいね、熱いねっ！　そんな風にアンナちゃんを魔法少女の道に引きずり込んだ、最初の作品も気になってきたな～」
line = "「いいね、熱いねっ！　そんな風にアンナちゃんを魔法少女の道に引きずり込んだ、最初の作品も気になってきたな～」"

[[dialogue]]
speaker = "トレジアンナ"
# 「あ～、それはですね～。実は元々、私の地元にも古くから伝わる『魔女っ娘』の伝説が存在してたんですよ」
line = "「あ～、それはですね～。実は元々、私の地元にも古くから伝わる『魔女っ娘』の伝説が存在してたんですよ」"

[[dialogue]]
speaker = "トレジアンナ"
# 「だから逆に、現代で目を覚ました時に驚いてしまったわけです。これこそが、私の憧れた英雄の姿なのかっ！　って感じで」
line = "「だから逆に、現代で目を覚ました時に驚いてしまったわけです。これこそが、私の憧れた英雄の姿なのかっ！　って感じで」"

[[dialogue]]
speaker = "いろは"
# 「え～～！！　なにそれ、気になる！　アンナちゃん、その話も詳しく聞かせてよっ」
line = "「え～～！！　なにそれ、気になる！　アンナちゃん、その話も詳しく聞かせてよっ」"

[[dialogue]]
speaker = "トレジアンナ"
# 「後はやはり、トレちぇりの醍醐味は恋愛要素だと思うんですよ～。女の子の恋する姿は、可愛いですからねっ☆」
line = "「後はやはり、トレちぇりの醍醐味は恋愛要素だと思うんですよ～。女の子の恋する姿は、可愛いですからねっ☆」"

[[dialogue]]
speaker = "いろは"
# 「うんうん、憧れの先輩か、同級生のケンカ友達か、それともお兄ちゃんとの禁断の恋か！　ちえりちゃんが最後に選ぶのは誰か、だよね～」
line = "「うんうん、憧れの先輩か、同級生のケンカ友達か、それともお兄ちゃんとの禁断の恋か！　ちえりちゃんが最後に選ぶのは誰か、だよね～」"

[[dialogue]]
speaker = "トレジアンナ"
# 「結局それは明かされませんでしたが、いろはさん的にはどうです？　誰とくっついて欲しかったですか？」
line = "「結局それは明かされませんでしたが、いろはさん的にはどうです？　誰とくっついて欲しかったですか？」"

[[dialogue]]
speaker = "いろは"
# 「うーん、あたしはそうだな～。同級生のケンカ友達かな、王道だけど！」
line = "「うーん、あたしはそうだな～。同級生のケンカ友達かな、王道だけど！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「私はお兄ちゃん派でしたね～。ちえりちゃんをいじめながらも、好きなことが隠せてない感じがもうたまらないです♪」
line = "「私はお兄ちゃん派でしたね～。ちえりちゃんをいじめながらも、好きなことが隠せてない感じがもうたまらないです♪」"

[[dialogue]]
speaker = "いろは"
# 「同級生の子も転校して行っちゃうし、先輩も正体が実はアレだったりで……ちょっと切ない感じなのもいいよね～」
line = "「同級生の子も転校して行っちゃうし、先輩も正体が実はアレだったりで……ちょっと切ない感じなのもいいよね～」"

[[dialogue]]
speaker = "トレジアンナ"
# 「……恋愛要素でふと思ったんですが、いろはさんにはそういったお相手は？」
line = "「……恋愛要素でふと思ったんですが、いろはさんにはそういったお相手は？」"

[[dialogue]]
speaker = "いろは"
# 「あはは、いないよ～」
line = "「あはは、いないよ～」"

[[dialogue]]
speaker = "トレジアンナ"
# 「そうなんですか？　いろはさん可愛いですし、明るくていい子ですからモテそうですけど」
line = "「そうなんですか？　いろはさん可愛いですし、明るくていい子ですからモテそうですけど」"

[[dialogue]]
speaker = "いろは"
# 「いざ自分でってなるとよくわかんないし、それ以前になーんか出会いがないんだよね」
line = "「いざ自分でってなるとよくわかんないし、それ以前になーんか出会いがないんだよね」"

[[dialogue]]
speaker = "いろは"
# 「男の子と顔を合わせるって言ったら、ここにゃんの弟くんたちか、お兄ちゃんくらい？　まあ、異性って感じじゃないよね～」
line = "「男の子と顔を合わせるって言ったら、ここにゃんの弟くんたちか、お兄ちゃんくらい？　まあ、異性って感じじゃないよね～」"

[[dialogue]]
speaker = "いろは"
# 「そう考えると、あたしの周りのちゃんとした異性って……オムオムくらい？」
line = "「そう考えると、あたしの周りのちゃんとした異性って……オムオムくらい？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「そのオムニスさんはどうなんです？」
line = "「そのオムニスさんはどうなんです？」"

[[dialogue]]
speaker = "いろは"
# 「それはないよ～、だってオムオムだもん」
line = "「それはないよ～、だってオムオムだもん」"

[[dialogue]]
speaker = "いろは"
# 「トレちぇりで言うなら、オムオムは『ケモちゃん』だよ？　マスコットみたいなものだから」
line = "「トレちぇりで言うなら、オムオムは『ケモちゃん』だよ？　マスコットみたいなものだから」"

[[dialogue]]
speaker = "トレジアンナ"
# 「ふむふむ。ではもし、オムニスさんが人の姿をしていたら……？」
line = "「ふむふむ。ではもし、オムニスさんが人の姿をしていたら……？」"

[[dialogue]]
speaker = "いろは"
# 「えっ？　そ、それは……え～っとぉ……」
line = "「えっ？　そ、それは……え～っとぉ……」"

[[dialogue]]
speaker = "いろは"
# 「う～～ん、わかんないや。えへへ」
line = "「う～～ん、わかんないや。えへへ」"

[[dialogue]]
speaker = "いろは"
# 「ていうか、そんなことを言うアンナちゃんの方はどうなの？」
line = "「ていうか、そんなことを言うアンナちゃんの方はどうなの？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「私？」
line = "「私？」"

[[dialogue]]
speaker = "いろは"
# 「好きな人とか……恋人とか！？」
line = "「好きな人とか……恋人とか！？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「さっきもお話した通り、私はみなさんとは寿命が違いますからね～。魔女という種族も、本来はツガイを作らないですし☆」
line = "「さっきもお話した通り、私はみなさんとは寿命が違いますからね～。魔女という種族も、本来はツガイを作らないですし☆」"

[[dialogue]]
speaker = "トレジアンナ"
# 「正直に言って、恋愛感情ってよくわからないんですよ～」
line = "「正直に言って、恋愛感情ってよくわからないんですよ～」"

[[dialogue]]
speaker = "いろは"
# 「え～！　さっきはちえりちゃんの恋愛が面白いって言ってたのに！」
line = "「え～！　さっきはちえりちゃんの恋愛が面白いって言ってたのに！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「恋する男の子と女の子は可愛いですから☆　私はそういうのを摂取するのが好きなんです」
line = "「恋する男の子と女の子は可愛いですから☆　私はそういうのを摂取するのが好きなんです」"

[[dialogue]]
speaker = "トレジアンナ"
# 「まあまあ、私はあくまで先代の魔法少女ですから。そういったラブロマンスはサチさんたちヒロインに任せておきましょう♪」
line = "「まあまあ、私はあくまで先代の魔法少女ですから。そういったラブロマンスはサチさんたちヒロインに任せておきましょう♪」"

[[dialogue]]
speaker = "いろは"
# 「え～！　ちょっと誤魔化した気がするなぁ」
line = "「え～！　ちょっと誤魔化した気がするなぁ」"

[[dialogue]]
speaker = "unk"
# ──２人の魔法少女好きの魔法少女による魔法少女談義は、こうして尽きることなく延々と続いた。
line = "──２人の魔法少女好きの魔法少女による魔法少女談義は、こうして尽きることなく延々と続いた。"

[[dialogue]]
speaker = "unk"
# それこそ……日が暮れてカフェテリアの閉店時間が過ぎても。
line = "それこそ……日が暮れてカフェテリアの閉店時間が過ぎても。"

[[dialogue]]
speaker = "ヨミ"
# 「あ、あの～、すみません……そろそろお時間なので、速やかに退店をお願いします～～～っ」
line = "「あ、あの～、すみません……そろそろお時間なので、速やかに退店をお願いします～～～っ」"
