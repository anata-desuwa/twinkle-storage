# 「一滴残らず、私の膣内に出しちゃおうね<emoji=heart04>　お射精上手でえらい、えらーい、だーい好き<emoji=heart04>」
line = "「一滴残らず、私の膣内に出しちゃおうね<emoji=heart04>　お射精上手でえらい、えらーい、だーい好き<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 溜まっていた数日分の欲望を全て出し切り、名残惜しくもミルフィーの膣内からペニスが抜ける。
line = "溜まっていた数日分の欲望を全て出し切り、名残惜しくもミルフィーの膣内からペニスが抜ける。"

[[dialogue]]
speaker = "ミルフィー"
# 「ふぁんっ……<emoji=heart04>　膣内から溢れてきちゃう……せっかくいっぱい出してもらったのに、もったいなーい」
line = "「ふぁんっ……<emoji=heart04>　膣内から溢れてきちゃう……せっかくいっぱい出してもらったのに、もったいなーい」"

[[dialogue]]
speaker = "ミルフィー"
# 「ふふ、私のおま○こ、そんなに気持ちよかったんだ……応援エッチ、満足してもらえたかな？」
line = "「ふふ、私のおま○こ、そんなに気持ちよかったんだ……応援エッチ、満足してもらえたかな？」"

[[dialogue]]
speaker = "クロト"
# 「最高だったよ、これなら明日からも頑張れそう……」
line = "「最高だったよ、これなら明日からも頑張れそう……」"

[[dialogue]]
speaker = "ミルフィー"
# 「良かった……実は私もね、ちょっと不安だったんだ」
line = "「良かった……実は私もね、ちょっと不安だったんだ」"

[[dialogue]]
speaker = "クロト"
# 「ミルフィーも……？」
line = "「ミルフィーも……？」"

[[dialogue]]
speaker = "ミルフィー"
# 「突然だったから応援団のみんなの足を引っ張ってないか……最後までちゃんとやれるのかなって」
line = "「突然だったから応援団のみんなの足を引っ張ってないか……最後までちゃんとやれるのかなって」"

[[dialogue]]
speaker = "ミルフィー"
# 「だけど会長くんを元気づけられたなら、きっと大丈夫だね。私の方こそ自信をもらえたよ」
line = "「だけど会長くんを元気づけられたなら、きっと大丈夫だね。私の方こそ自信をもらえたよ」"

[[dialogue]]
speaker = "ミルフィー"
# 「いつも私に元気をくれるのは会長くんなの。ありがとね。だぁい好き<emoji=heart04>　ちゅっ<emoji=heart04>」
line = "「いつも私に元気をくれるのは会長くんなの。ありがとね。だぁい好き<emoji=heart04>　ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
# 「でも、こういうエッチな応援は、あなただけの特別……他の人になんてしてあげないんだよ……？」
line = "「でも、こういうエッチな応援は、あなただけの特別……他の人になんてしてあげないんだよ……？」"

[[dialogue]]
speaker = "ミルフィー"
# 「体も心も疲れちゃったら、いつでも言って。私が全力で癒してあげるから……ね<emoji=heart04>」
line = "「体も心も疲れちゃったら、いつでも言って。私が全力で癒してあげるから……ね<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ミルフィーの温もりを感じながら、彼女の愛を独り占めにしている幸せを噛みしめるのだった。
line = "ミルフィーの温もりを感じながら、彼女の愛を独り占めにしている幸せを噛みしめるのだった。"
