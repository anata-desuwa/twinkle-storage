[[dialogue]]
speaker = "unk"
# しばらく羽根突きの練習を続けて、組み合わせを再びシャッフルすることになった。
line = "しばらく羽根突きの練習を続けて、組み合わせを再びシャッフルすることになった。"

[[dialogue]]
speaker = "ソフィア"
# 「シズハさん、よろしくお願いしますね」
line = "「シズハさん、よろしくお願いしますね」"

[[dialogue]]
speaker = "シズハ"
# 「は、はい。こちらこそよろしくお願いしますっ、ソフィア先輩……！」
line = "「は、はい。こちらこそよろしくお願いしますっ、ソフィア先輩……！」"

[[dialogue]]
speaker = "unk"
# そうして、シズハと組むことになった相手がソフィアになった回。
line = "そうして、シズハと組むことになった相手がソフィアになった回。"

[[dialogue]]
speaker = "ソフィア"
# 「せっかく一緒になったので、改めて挨拶の続きからにしましょうか」
line = "「せっかく一緒になったので、改めて挨拶の続きからにしましょうか」"

[[dialogue]]
speaker = "ソフィア"
# 「――シズハさんのことは、姉さんに聞かされて、前から知っていました」
line = "「――シズハさんのことは、姉さんに聞かされて、前から知っていました」"

[[dialogue]]
speaker = "ソフィア"
# 「なんでも、周囲の認識が歪んでしまう不可解な事件が起きて、その時に出会ったとか」
line = "「なんでも、周囲の認識が歪んでしまう不可解な事件が起きて、その時に出会ったとか」"

[[dialogue]]
speaker = "シズハ"
# 「は、はい。それで、サーシャさんや会長たちに助けてもらって、一緒に事件を解決したんです」
line = "「は、はい。それで、サーシャさんや会長たちに助けてもらって、一緒に事件を解決したんです」"

[[dialogue]]
speaker = "unk"
# 実際には、魔法少女としてロストアイテムを回収していた折に出会ったのだが──
line = "実際には、魔法少女としてロストアイテムを回収していた折に出会ったのだが──"

[[dialogue]]
speaker = "unk"
# サーシャとシズハは口裏を合わせ、ロストアイテムのことは一旦隠してソフィアに話をしていた。
line = "サーシャとシズハは口裏を合わせ、ロストアイテムのことは一旦隠してソフィアに話をしていた。"

[[dialogue]]
speaker = "シズハ"
# （私が使っているのも本当は星力じゃなくて、体内のロストアイテム『聖杯』ちゃんが与えてくれている魔力だし……）
line = "（私が使っているのも本当は星力じゃなくて、体内のロストアイテム『聖杯』ちゃんが与えてくれている魔力だし……）"

[[dialogue]]
speaker = "ソフィア"
# 「シズハさん、そんなに緊張しなくても大丈夫ですよ」
line = "「シズハさん、そんなに緊張しなくても大丈夫ですよ」"

[[dialogue]]
speaker = "シズハ"
# 「え？」
line = "「え？」"

[[dialogue]]
speaker = "ソフィア"
# 「姉さんが言いづらそうに、ですが真剣に言葉を選びながら、私に伝えようとしていました。何が言いたいのか、噛み砕いて理解するのは大変でしたが……」
line = "「姉さんが言いづらそうに、ですが真剣に言葉を選びながら、私に伝えようとしていました。何が言いたいのか、噛み砕いて理解するのは大変でしたが……」"

[[dialogue]]
speaker = "ソフィア"
# 「要するにシズハさんは、私が姉さんの妹だから、話すのに緊張しているんですよね？」
line = "「要するにシズハさんは、私が姉さんの妹だから、話すのに緊張しているんですよね？」"

[[dialogue]]
speaker = "シズハ"
# 「はい……なんというか、サーシャさんに、その……昔亡くなった自分のお姉ちゃんを重ねてしまって。それで……」
line = "「はい……なんというか、サーシャさんに、その……昔亡くなった自分のお姉ちゃんを重ねてしまって。それで……」"

[[dialogue]]
speaker = "ソフィア"
# 「その話を聞いて、正直、シズハさんに複雑な気持ちを抱いたのは事実です。でも……」
line = "「その話を聞いて、正直、シズハさんに複雑な気持ちを抱いたのは事実です。でも……」"

[[dialogue]]
speaker = "ソフィア"
# 「同時に、姉さんが大切にしたいと思った相手なら、私も仲良くなってみたいって思いました」
line = "「同時に、姉さんが大切にしたいと思った相手なら、私も仲良くなってみたいって思いました」"

[[dialogue]]
speaker = "ソフィア"
# 「シズハさんも多分、そう思ってくれているからこそ、緊張しているんですよね？」
line = "「シズハさんも多分、そう思ってくれているからこそ、緊張しているんですよね？」"

[[dialogue]]
speaker = "シズハ"
# 「はい……私は、ソフィア先輩とも仲良くなりたいって思ってます」
line = "「はい……私は、ソフィア先輩とも仲良くなりたいって思ってます」"

[[dialogue]]
speaker = "シズハ"
# 「今までは後ろめたさみたいなものがあって、会うのを避けちゃってましたけど……」
line = "「今までは後ろめたさみたいなものがあって、会うのを避けちゃってましたけど……」"

[[dialogue]]
speaker = "シズハ"
# 「今年は、勇気を出して向き合いたいって思ったんです！　だって――」
line = "「今年は、勇気を出して向き合いたいって思ったんです！　だって――」"

[[dialogue]]
speaker = "シズハ"
# 「ソフィア先輩は、大好きな先輩であるサーシャさんの妹さんですから！　仲良くなれたら、きっと素敵で、楽しいだろうなって思って！」
line = "「ソフィア先輩は、大好きな先輩であるサーシャさんの妹さんですから！　仲良くなれたら、きっと素敵で、楽しいだろうなって思って！」"

[[dialogue]]
speaker = "ソフィア"
# 「私もです。やっぱり会う前から思っていた通り――」
line = "「私もです。やっぱり会う前から思っていた通り――」"

[[dialogue]]
speaker = "ソフィア"
# 「私たち、気が合いそうですね、シズハさん」
line = "「私たち、気が合いそうですね、シズハさん」"

[[dialogue]]
speaker = "シズハ"
# 「はい。私もこうして話していると、ソフィア先輩はサーシャさんと似ている雰囲気があって……すごく温かい気持ちになって、落ち着きます♪」
line = "「はい。私もこうして話していると、ソフィア先輩はサーシャさんと似ている雰囲気があって……すごく温かい気持ちになって、落ち着きます♪」"

[[dialogue]]
speaker = "ソフィア"
# 「ふふっ、私はホットな先輩ですから。だから、これからは『さん付け』ではなく、シズハって呼んでもいいですか？」
line = "「ふふっ、私はホットな先輩ですから。だから、これからは『さん付け』ではなく、シズハって呼んでもいいですか？」"

[[dialogue]]
speaker = "シズハ"
# 「はい！　でしたら私も、ソフィアさんって呼んでもいいでしょうか？」
line = "「はい！　でしたら私も、ソフィアさんって呼んでもいいでしょうか？」"

[[dialogue]]
speaker = "ソフィア"
# 「もちろんです。改めて――今年から、どうぞよろしくお願いしますね、シズハ」
line = "「もちろんです。改めて――今年から、どうぞよろしくお願いしますね、シズハ」"

[[dialogue]]
speaker = "シズハ"
# 「はいっ、ソフィアさん♪　えへへっ♪」
line = "「はいっ、ソフィアさん♪　えへへっ♪」"

[[dialogue]]
speaker = "ソフィア"
# 「ふふっ、可愛い後輩が増えて、私もホットな気持ちです♪」
line = "「ふふっ、可愛い後輩が増えて、私もホットな気持ちです♪」"

[[dialogue]]
speaker = "unk"
# そんな２人の様子をうかがいながら、少し離れた場所で羽根突きを行っているのは、サーシャとディーラックだった。
line = "そんな２人の様子をうかがいながら、少し離れた場所で羽根突きを行っているのは、サーシャとディーラックだった。"

[[dialogue]]
speaker = "サーシャ"
# 「あらあら、うふふっ♪　シズハちゃんが困っていたら、助けなきゃって思っていたのだけれど、余計な心配だったみたいね」
line = "「あらあら、うふふっ♪　シズハちゃんが困っていたら、助けなきゃって思っていたのだけれど、余計な心配だったみたいね」"

[[dialogue]]
speaker = "サーシャ"
# 「ソフィも、シズハちゃんも、前よりずっと心が強くなっているみたいだわ」
line = "「ソフィも、シズハちゃんも、前よりずっと心が強くなっているみたいだわ」"

[[dialogue]]
speaker = "サーシャ"
# 「だから私も、今年は２人を見習って、もっと先輩らしくなれるように頑張らなくちゃいけないわね～♪」
line = "「だから私も、今年は２人を見習って、もっと先輩らしくなれるように頑張らなくちゃいけないわね～♪」"

[[dialogue]]
speaker = "ディーラック"
# 「先輩らしく、ねぇ。具体的には、どうする気なのサ？」
line = "「先輩らしく、ねぇ。具体的には、どうする気なのサ？」"

[[dialogue]]
speaker = "サーシャ"
# 「う～ん、すぐにはパッと思いつかないけれど、でも――」
line = "「う～ん、すぐにはパッと思いつかないけれど、でも――」"

[[dialogue]]
speaker = "サーシャ"
# 「シズハちゃんが言ったように、自分が今までなんとなく避けてきたことに、向き合ってみようと思うわ」
line = "「シズハちゃんが言ったように、自分が今までなんとなく避けてきたことに、向き合ってみようと思うわ」"

[[dialogue]]
speaker = "ディーラック"
# 「ふぅん。今まで自分が避けてきたこと、ねぇ……」
line = "「ふぅん。今まで自分が避けてきたこと、ねぇ……」"

[[dialogue]]
speaker = "サーシャ"
# 「そういえばディーラックちゃん、檻から出られてよかったわね～」
line = "「そういえばディーラックちゃん、檻から出られてよかったわね～」"

[[dialogue]]
speaker = "ディーラック"
# 「全然良くないのサ！　練習をサボったら罰ゲームだとか、あの獅子舞に言われるし……」
line = "「全然良くないのサ！　練習をサボったら罰ゲームだとか、あの獅子舞に言われるし……」"

[[dialogue]]
speaker = "ディーラック"
# 「あいつもロストアイテムだから、そんなのの罰ゲームなんて、どんな目に遭うのかわかったもんじゃないのサ！」
line = "「あいつもロストアイテムだから、そんなのの罰ゲームなんて、どんな目に遭うのかわかったもんじゃないのサ！」"

[[dialogue]]
speaker = "サーシャ"
# 「ふふふっ。でもさっき、シズハちゃんと羽根突きしていた時は、結構楽しそうだったわよ～？」
line = "「ふふふっ。でもさっき、シズハちゃんと羽根突きしていた時は、結構楽しそうだったわよ～？」"

[[dialogue]]
speaker = "ディーラック"
# 「はぁ！？　何を勘違いしてるのサ！　というか、サーシャちゃん、どこから見てたの！？」
line = "「はぁ！？　何を勘違いしてるのサ！　というか、サーシャちゃん、どこから見てたの！？」"

[[dialogue]]
speaker = "unk"
# 一方、羽根突きの練習を始めていた、シズハとソフィアの２人は──
line = "一方、羽根突きの練習を始めていた、シズハとソフィアの２人は──"

[[dialogue]]
speaker = "シズハ"
# 「あ、そうだ！　ソフィアさん――」
line = "「あ、そうだ！　ソフィアさん――」"

[[dialogue]]
speaker = "unk"
# シズハは思い出したというように、何気ない様子でソフィアに尋ねる。
line = "シズハは思い出したというように、何気ない様子でソフィアに尋ねる。"

[[dialogue]]
speaker = "シズハ"
# 「お近づきの印に、ソフィアさんのお尻も触っていいですか！？」
line = "「お近づきの印に、ソフィアさんのお尻も触っていいですか！？」"

[[dialogue]]
speaker = "ソフィア"
# 「はっ、お尻！？　どういうこと！？」
line = "「はっ、お尻！？　どういうこと！？」"

[[dialogue]]
speaker = "unk"
# 思わず羽根を落としてしまうソフィア。
line = "思わず羽根を落としてしまうソフィア。"

[[dialogue]]
speaker = "シズハ"
# 「ソフィアさんともっと仲良くなる為に、触っておきたいと思って♪」
line = "「ソフィアさんともっと仲良くなる為に、触っておきたいと思って♪」"

[[dialogue]]
speaker = "ソフィア"
# 「えっと、なんでお尻の必要が……？」
line = "「えっと、なんでお尻の必要が……？」"

[[dialogue]]
speaker = "シズハ"
# 「ほら、ラテンアメリカでは挨拶をする時、心を込めたハグの後、頬に１回キスをするじゃないですか。あれと同じです！」
line = "「ほら、ラテンアメリカでは挨拶をする時、心を込めたハグの後、頬に１回キスをするじゃないですか。あれと同じです！」"

[[dialogue]]
speaker = "ソフィア"
# 「え？　お尻を触る挨拶って、人間界の文化であったりするんですか……？」
line = "「え？　お尻を触る挨拶って、人間界の文化であったりするんですか……？」"

[[dialogue]]
speaker = "シズハ"
# 「私発祥でこれから広まります！　必ず！！」
line = "「私発祥でこれから広まります！　必ず！！」"

[[dialogue]]
speaker = "ソフィア"
# （なんでそんなに自信満々なのかが全然わからない……！）
line = "（なんでそんなに自信満々なのかが全然わからない……！）"

[[dialogue]]
speaker = "ソフィア"
# 「え、えっと……シズハ。ちょっとクールになって、１度考えさせてもらいたいというか……」
line = "「え、えっと……シズハ。ちょっとクールになって、１度考えさせてもらいたいというか……」"

[[dialogue]]
speaker = "サーシャ"
# 「シズハちゃ～ん♪　それなら、私のお尻を触ってもいいわよ～？」
line = "「シズハちゃ～ん♪　それなら、私のお尻を触ってもいいわよ～？」"

[[dialogue]]
speaker = "ソフィア"
# 「って、姉さん！？」
line = "「って、姉さん！？」"

[[dialogue]]
speaker = "シズハ"
# 「サーシャさん、いつもありがとう！！　えいっ♪」
line = "「サーシャさん、いつもありがとう！！　えいっ♪」"

[[dialogue]]
speaker = "unk"
# シズハがサーシャの後ろに回り込んで、お尻を触る。
line = "シズハがサーシャの後ろに回り込んで、お尻を触る。"

[[dialogue]]
speaker = "サーシャ"
# 「あんっ<emoji=heart04>」
line = "「あんっ<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
# 「ふふっ、サーシャさんのお尻、いつ触っても極上の柔らかさと弾力で、手が幸せ～♪」
line = "「ふふっ、サーシャさんのお尻、いつ触っても極上の柔らかさと弾力で、手が幸せ～♪」"

[[dialogue]]
speaker = "サーシャ"
# 「あらあら、うふふっ♪　シズハちゃんったら、くすぐったいわ～♪」
line = "「あらあら、うふふっ♪　シズハちゃんったら、くすぐったいわ～♪」"

[[dialogue]]
speaker = "ソフィア"
# 「ちょっ、２人共！？」
line = "「ちょっ、２人共！？」"

[[dialogue]]
speaker = "ソフィア"
# （な、なんか、２人だけですごく楽しそうにして……むうぅ）
line = "（な、なんか、２人だけですごく楽しそうにして……むうぅ）"

[[dialogue]]
speaker = "ソフィア"
# 「し、シズハ！　私のも……やっぱり触っていいです！」
line = "「し、シズハ！　私のも……やっぱり触っていいです！」"

[[dialogue]]
speaker = "シズハ"
# 「いいんですか！？　じゃあ、失礼して……えいっ♪」
line = "「いいんですか！？　じゃあ、失礼して……えいっ♪」"

[[dialogue]]
speaker = "ソフィア"
# 「ひゃあぁっ！？」
line = "「ひゃあぁっ！？」"

[[dialogue]]
speaker = "unk"
# シズハがソフィアのお尻を両手で触りながら、ぱあぁっと瞳を輝かせる。
line = "シズハがソフィアのお尻を両手で触りながら、ぱあぁっと瞳を輝かせる。"

[[dialogue]]
speaker = "シズハ"
# 「ふわぁ～♪　ソフィアさんのお尻、小ぶりだけど濃密なむちむち感があってすごく素敵……！」
line = "「ふわぁ～♪　ソフィアさんのお尻、小ぶりだけど濃密なむちむち感があってすごく素敵……！」"

[[dialogue]]
speaker = "ソフィア"
# 「ち、ちょっとシズハ、あんまり揉まないで下さい……！　は、恥ずかしいですからっ」
line = "「ち、ちょっとシズハ、あんまり揉まないで下さい……！　は、恥ずかしいですからっ」"

[[dialogue]]
speaker = "シズハ"
# 「あっ、この後はソフィアさんも、私のお尻を触って下さいね♪」
line = "「あっ、この後はソフィアさんも、私のお尻を触って下さいね♪」"

[[dialogue]]
speaker = "ソフィア"
# 「えぇっ！？　私もですかぁ！？」
line = "「えぇっ！？　私もですかぁ！？」"

[[dialogue]]
speaker = "シズハ"
# 「はいっ♪　これは仲良くなる為のコミュニケーションなので♪」
line = "「はいっ♪　これは仲良くなる為のコミュニケーションなので♪」"

[[dialogue]]
speaker = "unk"
# 心から嬉しそうな笑顔でソフィアと触れ合うシズハ。そんな彼女を見て、サーシャも笑顔を浮かべる。
line = "心から嬉しそうな笑顔でソフィアと触れ合うシズハ。そんな彼女を見て、サーシャも笑顔を浮かべる。"

[[dialogue]]
speaker = "サーシャ"
# 「うふふっ。先輩の先輩らしく、フォロー成功ね～」
line = "「うふふっ。先輩の先輩らしく、フォロー成功ね～」"

[[dialogue]]
speaker = "ディーラック"
# 「いや、なんかちょっとズレてない……？」
line = "「いや、なんかちょっとズレてない……？」"

[[dialogue]]
speaker = "unk"
# 呆れ顔でシズハたちを眺めながら、サーシャへツッコミを入れるディーラックなのだった。
line = "呆れ顔でシズハたちを眺めながら、サーシャへツッコミを入れるディーラックなのだった。"
