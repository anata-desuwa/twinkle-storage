line = "「あ、ソフィアちゃんにウズメイアちゃん。今ね～、ジャックちゃんがお菓子をもらったお返しにダンスを披露してるの～」"

[[dialogue]]
speaker = "サラン"
# 「一番にサランのお菓子を食べたくて、来てくれたんだって～。ふわふわ嬉しい～♪」
