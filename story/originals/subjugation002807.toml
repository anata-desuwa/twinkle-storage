line = "「あぁん♪　ジャクリーヌ様も一緒にいらっしゃるじゃないのぉ♪　なんて素敵なツーショットなんでしょう<emoji=heart04>」"

[[dialogue]]
speaker = "キャナンシー"
# 「さあさあ、お２人とも、どうぞこちらへお越しくださぁい<emoji=heart04>」
