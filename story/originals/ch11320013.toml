[[dialogue]]
speaker = "unk"
# 第３話,制圧天使,P
line = "第３話,制圧天使,P"

[[dialogue]]
speaker = "unk"
# 街中を歩いていると、ケイティさんの姿を見つけた。
line = "街中を歩いていると、ケイティさんの姿を見つけた。"

[[dialogue]]
speaker = "unk"
# 小さな雑貨屋の店先で、そこの店員らしき女性と話をしている。
line = "小さな雑貨屋の店先で、そこの店員らしき女性と話をしている。"

[[dialogue]]
speaker = "ケイティ"
# 「あらあら、こちらのティーセットもすごく可愛いですね～」
line = "「あらあら、こちらのティーセットもすごく可愛いですね～」"

[[dialogue]]
speaker = "女性店員"
# 「いいわよね～。今人気だから品薄なの。上品な雰囲気がケイティさんにピッタリだと思うし、オススメよ～」
line = "「いいわよね～。今人気だから品薄なの。上品な雰囲気がケイティさんにピッタリだと思うし、オススメよ～」"

[[dialogue]]
speaker = "ケイティ"
# 「うふふ、そうですか～？　ありがとうございます。それじゃこちらを頂いていいですか～？」
line = "「うふふ、そうですか～？　ありがとうございます。それじゃこちらを頂いていいですか～？」"

[[dialogue]]
speaker = "女性店員"
# 「ありがとう。それじゃすぐに包んでくるわね」
line = "「ありがとう。それじゃすぐに包んでくるわね」"

[[dialogue]]
speaker = "unk"
# 今日はお休みですか？
line = "今日はお休みですか？"

[[dialogue]]
speaker = "unk"
# こんにちは
line = "こんにちは"

[[dialogue]]
speaker = "ケイティ"
# 「あら、魔王さん。こんにちは」
line = "「あら、魔王さん。こんにちは」"

[[dialogue]]
speaker = "ケイティ"
# 「ええ、今日は非番の日なんです。だから、せっかく人間界に来ているのですし、以前からやってみたかった雑貨屋巡りを満喫しているんですよ～」
line = "「ええ、今日は非番の日なんです。だから、せっかく人間界に来ているのですし、以前からやってみたかった雑貨屋巡りを満喫しているんですよ～」"

[[dialogue]]
speaker = "ケイティ"
# 「人間界の雑貨は種類も豊富だし、可愛いものが多いからいいですね～。眺めているだけでも楽しい気分になれます」
line = "「人間界の雑貨は種類も豊富だし、可愛いものが多いからいいですね～。眺めているだけでも楽しい気分になれます」"

[[dialogue]]
speaker = "ケイティ"
# 「天界にもこういったお店はあるのですが、やはりこういったものは人間界が一番充実しているのだとはっきり分かりました～」
line = "「天界にもこういったお店はあるのですが、やはりこういったものは人間界が一番充実しているのだとはっきり分かりました～」"

[[dialogue]]
speaker = "unk"
# お茶会の道具狙いですか？
line = "お茶会の道具狙いですか？"

[[dialogue]]
speaker = "ケイティ"
# 「そうですね。でも私、それ以外でも可愛い小物なら何でも好きなので……」
line = "「そうですね。でも私、それ以外でも可愛い小物なら何でも好きなので……」"

[[dialogue]]
speaker = "ケイティ"
# 「あっ、このコースターも可愛いです♪　あっちの写真立ても……どれもこれも欲しくなっちゃいます～♪」
line = "「あっ、このコースターも可愛いです♪　あっちの写真立ても……どれもこれも欲しくなっちゃいます～♪」"

[[dialogue]]
