# けど、おそらく……店員さんが怯えていたのはモンスターじゃなくてケイティさんではないかと思う。
line = "けど、おそらく……店員さんが怯えていたのはモンスターじゃなくてケイティさんではないかと思う。"

[[dialogue]]
