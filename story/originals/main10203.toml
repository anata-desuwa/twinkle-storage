[[dialogue]]
speaker = "unk"
# 第３話,当主様の命令は絶対です,B
line = "第３話,当主様の命令は絶対です,B"

[[dialogue]]
speaker = "蘭美"
# 「ご当主様、美鶴を連れてまいりました」
line = "「ご当主様、美鶴を連れてまいりました」"

[[dialogue]]
speaker = "ヘレナ"
# 「ご苦労、蘭美。よく来てくれたな、美鶴」
line = "「ご苦労、蘭美。よく来てくれたな、美鶴」"

[[dialogue]]
speaker = "美鶴"
# 「当主様のご指名とのことですけど、わざわざ呼びつけたということは、ヒミツのお仕事、です？」
line = "「当主様のご指名とのことですけど、わざわざ呼びつけたということは、ヒミツのお仕事、です？」"

[[dialogue]]
speaker = "ヘレナ"
# 「そうだ。皆にはくれぐれも内密に、だ」
line = "「そうだ。皆にはくれぐれも内密に、だ」"

[[dialogue]]
speaker = "美鶴"
# （うへ、メイド長、大当たり。さすが）
line = "（うへ、メイド長、大当たり。さすが）"

[[dialogue]]
speaker = "ヘレナ"
# 「事は一刻を争うのでな、率直に話すとしよう」
line = "「事は一刻を争うのでな、率直に話すとしよう」"

[[dialogue]]
speaker = "ヘレナ"
# 「メイド隊のせつな、ヨミらとともに、『<ruby=ラーゴ・シエロ>鏡界の湖</ruby>』の調査に当たってほしい」
line = "「メイド隊のせつな、ヨミらとともに、『<ruby>鏡界の湖<rt>ラーゴ・シエロ</rt></ruby>』の調査に当たってほしい」"

[[dialogue]]
speaker = "ヘレナ"
# 「この人選、どう思うか、蘭美」
line = "「この人選、どう思うか、蘭美」"

[[dialogue]]
speaker = "蘭美"
# 「素晴らしいですね。せつなもヨミも個々のスペックは非常に高いのですが、如何せん注意力に乏しく、危なっかしいところがあります」
line = "「素晴らしいですね。せつなもヨミも個々のスペックは非常に高いのですが、如何せん注意力に乏しく、危なっかしいところがあります」"

[[dialogue]]
speaker = "蘭美"
# 「そこを冷静沈着な美鶴が制してくれるならば心配は無用です。危機管理・危険回避能力に長けており、ここぞという時の集中力もメイド隊の中でも随一」
line = "「そこを冷静沈着な美鶴が制してくれるならば心配は無用です。危機管理・危険回避能力に長けており、ここぞという時の集中力もメイド隊の中でも随一」"

[[dialogue]]
speaker = "蘭美"
# 「彼女ならではの着眼点で、必ずや成功をもたらしてくれますよ。私は常にできるメイド長ですが、美鶴はやればできるメイドです」
line = "「彼女ならではの着眼点で、必ずや成功をもたらしてくれますよ。私は常にできるメイド長ですが、美鶴はやればできるメイドです」"

[[dialogue]]
speaker = "ヘレナ"
# 「うむ。貴殿らも知っての通り、<ruby=ラーゴ・シエロ>鏡界の湖</ruby>は唯一、人間界・魔界・天界を行き来できる場所だ」
line = "「うむ。貴殿らも知っての通り、<ruby>鏡界の湖<rt>ラーゴ・シエロ</rt></ruby>は唯一、人間界・魔界・天界を行き来できる場所だ」"

[[dialogue]]
speaker = "ヘレナ"
# 「ヴィーナスは魔界にいると目されている。ならば、三界を渡れるあそこならば、何かしらの手がかりを掴めると踏んでいるのだ」
line = "「ヴィーナスは魔界にいると目されている。ならば、三界を渡れるあそこならば、何かしらの手がかりを掴めると踏んでいるのだ」"

[[dialogue]]
speaker = "美鶴"
# 「そんな大事な場所なら、とっくに調査してるのでは？」
line = "「そんな大事な場所なら、とっくに調査してるのでは？」"

[[dialogue]]
speaker = "ヘレナ"
# 「うむ、イの一番に調査隊が向かっている。結果、特筆すべき点は何もなかったと報告を受けた」
line = "「うむ、イの一番に調査隊が向かっている。結果、特筆すべき点は何もなかったと報告を受けた」"

[[dialogue]]
speaker = "美鶴"
# 「え。それなら改めて、うちらが行かなくても」
line = "「え。それなら改めて、うちらが行かなくても」"

[[dialogue]]
speaker = "ヘレナ"
# 「最初の報告から既に時間が経過している。変化が生じることもあるだろう。念には念を入れてな」
line = "「最初の報告から既に時間が経過している。変化が生じることもあるだろう。念には念を入れてな」"

[[dialogue]]
speaker = "美鶴"
# 「用心深いんですね」
line = "「用心深いんですね」"

[[dialogue]]
speaker = "ヘレナ"
# 「それに私の直感が告げている。あそこで何か起きるとな」
line = "「それに私の直感が告げている。あそこで何か起きるとな」"

[[dialogue]]
speaker = "美鶴"
# （当主様の直感がそういってるなら仕方ない。そこいらの占い師の１００倍は信用に値するからね）
line = "（当主様の直感がそういってるなら仕方ない。そこいらの占い師の１００倍は信用に値するからね）"

[[dialogue]]
speaker = "美鶴"
# 「でもうちメイドですし、頂いたお賃金の分以上は働けないっていうか──」
line = "「でもうちメイドですし、頂いたお賃金の分以上は働けないっていうか──」"

[[dialogue]]
speaker = "ヘレナ"
# 「ちなみに……特別手当も出すぞ？」
line = "「ちなみに……特別手当も出すぞ？」"

[[dialogue]]
speaker = "美鶴"
# 「むぅ」
line = "「むぅ」"

[[dialogue]]
speaker = "美鶴"
# （そういう風に言われちゃったら、うちはぐうの音も出ない。効果的すぎ）
line = "（そういう風に言われちゃったら、うちはぐうの音も出ない。効果的すぎ）"

[[dialogue]]
speaker = "美鶴"
# 「ご期待に応えられるかはわからないですけど……うちは雇われの身ですからね。当主様のお願いは断りませんし、うちに出来る限りのことはいたしますよ」
line = "「ご期待に応えられるかはわからないですけど……うちは雇われの身ですからね。当主様のお願いは断りませんし、うちに出来る限りのことはいたしますよ」"

[[dialogue]]
speaker = "蘭美"
# 「美鶴、あなたね──」
line = "「美鶴、あなたね──」"

[[dialogue]]
speaker = "ヘレナ"
# 「それでよい。十分だ。貴殿の働き、期待しているぞ」
line = "「それでよい。十分だ。貴殿の働き、期待しているぞ」"

[[dialogue]]
speaker = "ヨミ"
# 「美鶴さん、今回の任務、よろしくお願いします！」
line = "「美鶴さん、今回の任務、よろしくお願いします！」"

[[dialogue]]
speaker = "美鶴"
# 「よろしく、ヨミー。んで、もう１人のニンニンは？」
line = "「よろしく、ヨミー。んで、もう１人のニンニンは？」"

[[dialogue]]
speaker = "ヨミ"
# 「せつなさんは偵察のため、先行して<ruby=ラーゴ・シエロ>鏡界の湖</ruby>周辺に向かっています」
line = "「せつなさんは偵察のため、先行して<ruby>鏡界の湖<rt>ラーゴ・シエロ</rt></ruby>周辺に向かっています」"

[[dialogue]]
speaker = "美鶴"
# 「偉いねー。じゃ、うちらもとっとと追いつこ」
line = "「偉いねー。じゃ、うちらもとっとと追いつこ」"

[[dialogue]]
speaker = "美鶴"
# 「それにしても……星読事変だっけ。空にこのヘンテコなおもちゃが浮いてたのって」
line = "「それにしても……星読事変だっけ。空にこのヘンテコなおもちゃが浮いてたのって」"

[[dialogue]]
speaker = "美鶴"
# 「なんか起きてるのは間違いなさそうだ。さっさと調査に行って、ちゃちゃっと帰ってきた方が良さそうね」
line = "「なんか起きてるのは間違いなさそうだ。さっさと調査に行って、ちゃちゃっと帰ってきた方が良さそうね」"

[[dialogue]]
speaker = "ヨミ"
# 「はい。せつなさんも心配ですし、急ぎましょう！」
line = "「はい。せつなさんも心配ですし、急ぎましょう！」"
