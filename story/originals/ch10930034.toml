[[dialogue]]
speaker = "unk"
# 第４話,恋に夢中,P
line = "第４話,恋に夢中,P"

[[dialogue]]
speaker = "unk"
# とある休日のこと、俺とミルフィーは渋谷に来ていた。
line = "とある休日のこと、俺とミルフィーは渋谷に来ていた。"

[[dialogue]]
speaker = "unk"
# 今回の騒動の発端になったゾンビ映画を、２人で見てみることにしたのだ。
line = "今回の騒動の発端になったゾンビ映画を、２人で見てみることにしたのだ。"

[[dialogue]]
speaker = "ミルフィー"
# 「うっ……ちょっと気分悪いかも……」
line = "「うっ……ちょっと気分悪いかも……」"

[[dialogue]]
speaker = "unk"
# かなりリアルだったもんね
line = "かなりリアルだったもんね"

[[dialogue]]
speaker = "unk"
# 大丈夫？
line = "大丈夫？"

[[dialogue]]
speaker = "ミルフィー"
# 「ジャクリーヌさんが召喚したゾンビ型幽霊は、あれでもかなりマイルドだったんだね」
line = "「ジャクリーヌさんが召喚したゾンビ型幽霊は、あれでもかなりマイルドだったんだね」"

[[dialogue]]
speaker = "ミルフィー"
# 「本気のホラー映画を舐めてたよ。ああいうのあんまり見たことなかったから、ビックリしちゃった」
line = "「本気のホラー映画を舐めてたよ。ああいうのあんまり見たことなかったから、ビックリしちゃった」"

[[dialogue]]
speaker = "unk"
# でも頑張って最後まで見たね
line = "でも頑張って最後まで見たね"

[[dialogue]]
speaker = "ミルフィー"
# 「うん、１人で見たら、たぶん途中で逃げ出しちゃっただろうね」
line = "「うん、１人で見たら、たぶん途中で逃げ出しちゃっただろうね」"

[[dialogue]]
speaker = "ミルフィー"
# 「でも、隣に会長くんがいてくれたから……何が起きても大丈夫って、我慢できたんだよ」
line = "「でも、隣に会長くんがいてくれたから……何が起きても大丈夫って、我慢できたんだよ」"

[[dialogue]]
speaker = "ミルフィー"
# 「ずっと手を握っててくれたし……ごめんね、強く握り過ぎちゃったよね？　痛くなかった？」
line = "「ずっと手を握っててくれたし……ごめんね、強く握り過ぎちゃったよね？　痛くなかった？」"

[[dialogue]]
speaker = "ミルフィー"
# 「うわ、赤くなってる……私そんなに握り締めてたんだ……」
line = "「うわ、赤くなってる……私そんなに握り締めてたんだ……」"

[[dialogue]]
speaker = "ミルフィー"
# 「もしかしてそれだけじゃなかったりする？　ぶるぶる震えながら耐えてたから、どうなってたかよく覚えてなくって」
line = "「もしかしてそれだけじゃなかったりする？　ぶるぶる震えながら耐えてたから、どうなってたかよく覚えてなくって」"

[[dialogue]]
speaker = "unk"
# 背中をさすってあげた
line = "背中をさすってあげた"

[[dialogue]]
speaker = "unk"
# 抱き締めてあげた
line = "抱き締めてあげた"

[[dialogue]]
speaker = "ミルフィー"
# 「そんなことしてくれてたんだ？　ありがとう～。それと気付いてなくてごめんね。せっかく会長くんが守ってくれたのに」
line = "「そんなことしてくれてたんだ？　ありがとう～。それと気付いてなくてごめんね。せっかく会長くんが守ってくれたのに」"

[[dialogue]]
speaker = "ミルフィー"
# 「もったいないなぁ。会長くんが私に優しくしてるとこ、彼女としてちゃんと受け止めたかったなぁ」
line = "「もったいないなぁ。会長くんが私に優しくしてるとこ、彼女としてちゃんと受け止めたかったなぁ」"

[[dialogue]]
speaker = "ミルフィー"
# 「えへへ……今してくれようとしたでしょ？　いいよ、わざわざしなくても。もちろん再現してくれたら嬉しいけど、そういうのは別の場所でね<emoji=heart04>」
line = "「えへへ……今してくれようとしたでしょ？　いいよ、わざわざしなくても。もちろん再現してくれたら嬉しいけど、そういうのは別の場所でね<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
# 「それより映画の内容について話そうよ。ゾンビ型幽霊のデザインはだいぶ違ったけど、私とトリシャさんのコンビは、かなり似てなかった？」
line = "「それより映画の内容について話そうよ。ゾンビ型幽霊のデザインはだいぶ違ったけど、私とトリシャさんのコンビは、かなり似てなかった？」"

[[dialogue]]
speaker = "ミルフィー"
# 「チーパオも似てたし、それに道士とオトモが協力して敵と戦うところとか……」
line = "「チーパオも似てたし、それに道士とオトモが協力して敵と戦うところとか……」"

[[dialogue]]
speaker = "ミルフィー"
# 「映画のオトモの子は、かなり人間らしさが少なかったと思う。でも、だからこそ２人がそっと気持ちを通わせるシーンが感動したよね」
line = "「映画のオトモの子は、かなり人間らしさが少なかったと思う。でも、だからこそ２人がそっと気持ちを通わせるシーンが感動したよね」"

[[dialogue]]
speaker = "ミルフィー"
# 「トリシャさんも……私をオトモダチって言ってくれて……映画見てたら思い出して泣けちゃった」
line = "「トリシャさんも……私をオトモダチって言ってくれて……映画見てたら思い出して泣けちゃった」"

[[dialogue]]
speaker = "ミルフィー"
# 「似たようなことを経験したから、余計にリアルに感じちゃったのかも」
line = "「似たようなことを経験したから、余計にリアルに感じちゃったのかも」"

[[dialogue]]
speaker = "ミルフィー"
# 「もし、私がチーパオフォームじゃなくて……例えばただのクラスメイトだったとしたら……どうする？」
line = "「もし、私がチーパオフォームじゃなくて……例えばただのクラスメイトだったとしたら……どうする？」"

[[dialogue]]
speaker = "ミルフィー"
# 「普通にゾンビ型幽霊に襲われちゃうの。そういう可能性も……あったのかな、って……」
line = "「普通にゾンビ型幽霊に襲われちゃうの。そういう可能性も……あったのかな、って……」"

[[dialogue]]
speaker = "unk"
# ミルフィーは俺が守るよ
line = "ミルフィーは俺が守るよ"

[[dialogue]]
speaker = "unk"
# ただのクラスメイトじゃなくて恋人だから
line = "ただのクラスメイトじゃなくて恋人だから"

[[dialogue]]
speaker = "ミルフィー"
# 「えへへ……かっこいいなぁ<emoji=heart04>」
line = "「えへへ……かっこいいなぁ<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
# 「でもでも、相手は幽霊なんだよ？　いくら会長くんが強くても勝てないかも」
line = "「でもでも、相手は幽霊なんだよ？　いくら会長くんが強くても勝てないかも」"

[[dialogue]]
speaker = "unk"
# 俺は魔王だから勝つ
line = "俺は魔王だから勝つ"

[[dialogue]]
speaker = "unk"
# それでもミルフィーを守る
line = "それでもミルフィーを守る"

[[dialogue]]
speaker = "ミルフィー"
# 「それは最強の彼氏だね。こわいものなんて１つもないよ」
line = "「それは最強の彼氏だね。こわいものなんて１つもないよ」"

[[dialogue]]
speaker = "ミルフィー"
# 「ほんと、私にはもったいないくらい、最強で最高の彼氏だね」
line = "「ほんと、私にはもったいないくらい、最強で最高の彼氏だね」"

[[dialogue]]
speaker = "ミルフィー"
# 「ねえ、覚えてる？　会長くんと初めてデートした時のこと」
line = "「ねえ、覚えてる？　会長くんと初めてデートした時のこと」"

[[dialogue]]
speaker = "ミルフィー"
# 「あの時はまだ恋人でもなんでもなくて、自分の気持ちがわからなくてずっとぐるぐるしてた」
line = "「あの時はまだ恋人でもなんでもなくて、自分の気持ちがわからなくてずっとぐるぐるしてた」"

[[dialogue]]
speaker = "ミルフィー"
# 「自分ではどうにもできなくて……マグダレナ様に相談することもできなくて……でもそんな時イクシーちゃんが私に教えてくれたの」
line = "「自分ではどうにもできなくて……マグダレナ様に相談することもできなくて……でもそんな時イクシーちゃんが私に教えてくれたの」"

[[dialogue]]
speaker = "ミルフィー"
# 「それは恋の病だよって」
line = "「それは恋の病だよって」"

[[dialogue]]
speaker = "ミルフィー"
# 「私は……ミルフィー・インセントは、緋宮クロトくんに、恋をしてるんだよって」
line = "「私は……ミルフィー・インセントは、緋宮クロトくんに、恋をしてるんだよって」"

[[dialogue]]
speaker = "ミルフィー"
# 「そこから、ぱあっと先が開けたの。恋してる自分に振り回されて、でも会長くんとデートして、それが楽しくて嬉しくって、もう全部が夢中で！」
line = "「そこから、ぱあっと先が開けたの。恋してる自分に振り回されて、でも会長くんとデートして、それが楽しくて嬉しくって、もう全部が夢中で！」"

[[dialogue]]
speaker = "ミルフィー"
# 「恋愛が楽しかった。デートを重ねるたび、ドキドキが増えていって、もっとずっと好きって気持ちが大きくなって」
line = "「恋愛が楽しかった。デートを重ねるたび、ドキドキが増えていって、もっとずっと好きって気持ちが大きくなって」"

[[dialogue]]
speaker = "ミルフィー"
# 「そして……私とあなたは今こうしてここにいる。一対の彼氏彼女として」
line = "「そして……私とあなたは今こうしてここにいる。一対の彼氏彼女として」"

[[dialogue]]
speaker = "ミルフィー"
# 「大好きだよ、すごくすごく<emoji=heart04>　もう、私がどのくらい好きか、どうやって伝えたらいいかわかんないくらい」
line = "「大好きだよ、すごくすごく<emoji=heart04>　もう、私がどのくらい好きか、どうやって伝えたらいいかわかんないくらい」"

[[dialogue]]
speaker = "ミルフィー"
# 「今も……現在進行形で、好きになってるよ<emoji=heart04>」
line = "「今も……現在進行形で、好きになってるよ<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
# 「会長くんはどうかなぁ？　私とデートしてドキドキしてる？　私みたいに、恋に夢中になってる？」
line = "「会長くんはどうかなぁ？　私とデートしてドキドキしてる？　私みたいに、恋に夢中になってる？」"

[[dialogue]]
speaker = "unk"
# ミルフィーに負けないくらい大好き
line = "ミルフィーに負けないくらい大好き"

[[dialogue]]
speaker = "unk"
# ドキドキしてるよ
line = "ドキドキしてるよ"

[[dialogue]]
speaker = "ミルフィー"
# 「そっかぁ、よかった……うん、ちゃんと好き同士だね」
line = "「そっかぁ、よかった……うん、ちゃんと好き同士だね」"

[[dialogue]]
speaker = "ミルフィー"
# 「だからデートがこんなに楽しいんだ。絶対そう。お互いが同じくらい好きじゃないと、きっとこんなに楽しくないもん」
line = "「だからデートがこんなに楽しいんだ。絶対そう。お互いが同じくらい好きじゃないと、きっとこんなに楽しくないもん」"

[[dialogue]]
speaker = "ミルフィー"
# 「だからね、会長くん。私はきっと、これからもどんどん好きになっていくと思うから」
line = "「だからね、会長くん。私はきっと、これからもどんどん好きになっていくと思うから」"

[[dialogue]]
speaker = "ミルフィー"
# 「会長くんも、私にもっともっと夢中になってね<emoji=heart04>」
line = "「会長くんも、私にもっともっと夢中になってね<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
# 「大好きだよっ<emoji=heart04>」
line = "「大好きだよっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# こうして俺とミルフィーは、デートするたびにお互いをもっと好きになっていくのだった。
line = "こうして俺とミルフィーは、デートするたびにお互いをもっと好きになっていくのだった。"
