[[dialogue]]
speaker = "unk"
# 御前試合でクーシェンと戦い始めた俺だったが――
line = "御前試合でクーシェンと戦い始めた俺だったが――"

[[dialogue]]
speaker = "クーシェン"
# 「伸びろ！　<ruby=にょいぼう>如意棒</ruby>っ！」
line = "「伸びろ！　<ruby>如意棒<rt>にょいぼう</rt></ruby>っ！」"

[[dialogue]]
speaker = "unk"
# 西遊記でも有名な、変幻自在に長さや大きさを変える孫悟空の武器『如意棒』。それを自身の手足のように、これまた自在に使いこなすクーシェンに、圧倒されていた。
line = "西遊記でも有名な、変幻自在に長さや大きさを変える孫悟空の武器『如意棒』。それを自身の手足のように、これまた自在に使いこなすクーシェンに、圧倒されていた。"

[[dialogue]]
speaker = "unk"
# 本当に強い……！
line = "本当に強い……！"

[[dialogue]]
speaker = "クーシェン"
# 「ふっふ～ん♪　でしょしょ～？」
line = "「ふっふ～ん♪　でしょしょ～？」"

[[dialogue]]
speaker = "クーシェン"
# 「魔王もなかなかやるじゃん！　ただ、今のところの手応えだと、マリオンの方が強かったかな～？」
line = "「魔王もなかなかやるじゃん！　ただ、今のところの手応えだと、マリオンの方が強かったかな～？」"

[[dialogue]]
speaker = "クーシェン"
# 「そろそろ次の手を出してくれてもいいんだよ？　そっちが出さないなら――」
line = "「そろそろ次の手を出してくれてもいいんだよ？　そっちが出さないなら――」"

[[dialogue]]
speaker = "クーシェン"
# 「来い！　<ruby=きんとうん>金斗雲</ruby>！！」
line = "「来い！　<ruby>金斗雲<rt>きんとうん</rt></ruby>！！」"

[[dialogue]]
speaker = "unk"
# 次の瞬間、俺の視界からクーシェンの姿が消えていた。
line = "次の瞬間、俺の視界からクーシェンの姿が消えていた。"

[[dialogue]]
speaker = "unk"
# そして一瞬で――
line = "そして一瞬で――"

[[dialogue]]
speaker = "クーシェン"
# 「残念、目が追いつかなかったみたいだね」
line = "「残念、目が追いつかなかったみたいだね」"

[[dialogue]]
speaker = "クーシェン"
# 「大きくなれ！　如意棒っ！！」
line = "「大きくなれ！　如意棒っ！！」"

[[dialogue]]
speaker = "unk"
# ぐあっ！？
line = "ぐあっ！？"

[[dialogue]]
speaker = "unk"
# 背後から太い石柱のような大きさになった如意棒を叩き込まれて、俺の体は吹き飛ばされていた。
line = "背後から太い石柱のような大きさになった如意棒を叩き込まれて、俺の体は吹き飛ばされていた。"

[[dialogue]]
speaker = "クーシェン"
# 「ウキキ♪　今のは結構、効いたんじゃない？」
line = "「ウキキ♪　今のは結構、効いたんじゃない？」"

[[dialogue]]
speaker = "unk"
# 彼女の足元には、ふわふわと大きな『白い雲』が浮いていた。
line = "彼女の足元には、ふわふわと大きな『白い雲』が浮いていた。"

[[dialogue]]
speaker = "unk"
# それが金斗雲……！
line = "それが金斗雲……！"

[[dialogue]]
speaker = "クーシェン"
# 「へぇ～、これも如意棒と同じで有名なんだね～。でも、速さは想像以上だったでしょ？」
line = "「へぇ～、これも如意棒と同じで有名なんだね～。でも、速さは想像以上だったでしょ？」"

[[dialogue]]
speaker = "クーシェン"
# 「ボクの星術『金斗雲』は、乗っている者の<b>存在</b>を無視する。だから、重さや、移動する時の風の影響も無視される」
line = "「ボクの星術『金斗雲』は、乗っている者の<b>存在</b>を無視する。だから、重さや、移動する時の風の影響も無視される」"

[[dialogue]]
speaker = "クーシェン"
# 「星術使いはみんな飛べるけど、この金斗雲に乗った時の速さとは比べ物にならないよ～？　まあ、その分、操縦がすごく難しいんだけどね♪」
line = "「星術使いはみんな飛べるけど、この金斗雲に乗った時の速さとは比べ物にならないよ～？　まあ、その分、操縦がすごく難しいんだけどね♪」"

[[dialogue]]
speaker = "クーシェン"
# 「さて、どうする魔王？　最初の加速を見切れてなかったみたいだけど……そろそろ本気を出さないとボク――勝っちゃうよ？」
line = "「さて、どうする魔王？　最初の加速を見切れてなかったみたいだけど……そろそろ本気を出さないとボク――勝っちゃうよ？」"

[[dialogue]]
speaker = "クーシェン"
# 「――うん？　力を出したくても、今は事情があって使えない？　そうなの？」
line = "「――うん？　力を出したくても、今は事情があって使えない？　そうなの？」"

[[dialogue]]
speaker = "クーシェン"
# 「ふ～ん、そっか～。世界を救ったっていう凄い力が見られないのは残念……。期待してたんだけどな～」
line = "「ふ～ん、そっか～。世界を救ったっていう凄い力が見られないのは残念……。期待してたんだけどな～」"

[[dialogue]]
speaker = "unk"
# だけど……
line = "だけど……"

[[dialogue]]
speaker = "クーシェン"
# 「ん？」
line = "「ん？」"

[[dialogue]]
speaker = "unk"
# 絶対に負けないという気持ちだけは、本物だ
line = "絶対に負けないという気持ちだけは、本物だ"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロトーッ！！！」
line = "「クロトーッ！！！」"

[[dialogue]]
speaker = "unk"
# とその時、聞き慣れた彼女の声が、俺の耳に届く。
line = "とその時、聞き慣れた彼女の声が、俺の耳に届く。"

[[dialogue]]
speaker = "ヴィーナス"
# 「相手がどんなに強かろうと――」
line = "「相手がどんなに強かろうと――」"

[[dialogue]]
speaker = "ヴィーナス"
# 「魔王なら、気合いで勝ってみせなさいっ！！！」
line = "「魔王なら、気合いで勝ってみせなさいっ！！！」"

[[dialogue]]
speaker = "クーシェン"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "クーシェン"
# 「ウキキ♪　いいね、目を見たら伝わってきたよ。魔王――キミの本当の<b>強さ</b>ってやつが」
line = "「ウキキ♪　いいね、目を見たら伝わってきたよ。魔王――キミの本当の<b>強さ</b>ってやつが」"

[[dialogue]]
speaker = "クーシェン"
# 「ならボクも、本気の本気を見せちゃおうかな。よっと――」
line = "「ならボクも、本気の本気を見せちゃおうかな。よっと――」"

[[dialogue]]
speaker = "unk"
# そう言って、クーシェンは綺麗な髪を１本引き抜く。
line = "そう言って、クーシェンは綺麗な髪を１本引き抜く。"

[[dialogue]]
speaker = "unk"
# それに、ふっと息を吹きかけて、彼女は告げる。
line = "それに、ふっと息を吹きかけて、彼女は告げる。"

[[dialogue]]
speaker = "クーシェン"
# 「星術――『<ruby=しんがいしん>身外身</ruby>』」
line = "「星術――『<ruby>身外身<rt>しんがいしん</rt></ruby>』」"

[[dialogue]]
speaker = "unk"
# 次の瞬間、吹きかけた髪の毛が光となって消えたかと思うと――
line = "次の瞬間、吹きかけた髪の毛が光となって消えたかと思うと――"

[[dialogue]]
speaker = "クーシェン"
# 「さあさあ、ここからは正真正銘、隠し球なし、全力勝負だよ！」
line = "「さあさあ、ここからは正真正銘、隠し球なし、全力勝負だよ！」"

[[dialogue]]
speaker = "unk"
# ゆらりと幻が現れるように、クーシェンの分身が次々と現れていく。その数は１０を超え――１６体にまで増える。
line = "ゆらりと幻が現れるように、クーシェンの分身が次々と現れていく。その数は１０を超え――１６体にまで増える。"

[[dialogue]]
speaker = "unk"
# 孫悟空の、分身の術……！
line = "孫悟空の、分身の術……！"

[[dialogue]]
speaker = "クーシェン"
# 「数ではマリオンに負けるけど、全員如意棒も金斗雲も使えるから、１体１体の強さなら負けないよ？」
line = "「数ではマリオンに負けるけど、全員如意棒も金斗雲も使えるから、１体１体の強さなら負けないよ？」"

[[dialogue]]
speaker = "クーシェン"
# 「さあ、魔王――本気で勝負だ！！！」
line = "「さあ、魔王――本気で勝負だ！！！」"

[[dialogue]]
speaker = "unk"
# 俺は再び立ち上がり、彼女の動きを見逃さぬように集中して、拳を構えるのだった――
line = "俺は再び立ち上がり、彼女の動きを見逃さぬように集中して、拳を構えるのだった――"
