[[dialogue]]
speaker = "unk"
# 何の事前準備もないまま『ロミオとジュリエット』の稽古が始まった。
line = "何の事前準備もないまま『ロミオとジュリエット』の稽古が始まった。"

[[dialogue]]
speaker = "メイプル"
# 「花の都ヴェローナにて、いずれも劣らぬ名門のモンタギュー家とキャピュレット家！　蔦のように絡む両家の宿怨は、愛し合う男女の命運を狂わせるのであったー！」
line = "「花の都ヴェローナにて、いずれも劣らぬ名門のモンタギュー家とキャピュレット家！　蔦のように絡む両家の宿怨は、愛し合う男女の命運を狂わせるのであったー！」"

[[dialogue]]
speaker = "ロクサーナ"
# 「よし、ロミオの出番だ」
line = "「よし、ロミオの出番だ」"

[[dialogue]]
speaker = "ベンヴォーリオ"
# 「やあ、おはよう、ロミオくん」
line = "「やあ、おはよう、ロミオくん」"

[[dialogue]]
speaker = "unk"
# そんなに早いか？
line = "そんなに早いか？"

[[dialogue]]
speaker = "ベンヴォーリオ"
# 「まだ９時になったばかりだよ」
line = "「まだ９時になったばかりだよ」"

[[dialogue]]
speaker = "unk"
# 気持ちが重い時は、時間が経つのが遅く感じるな
line = "気持ちが重い時は、時間が経つのが遅く感じるな"

[[dialogue]]
speaker = "ロクサーナ"
# 「む……？　ちょっと待て。会長、演劇の経験があるのか？」
line = "「む……？　ちょっと待て。会長、演劇の経験があるのか？」"

[[dialogue]]
speaker = "unk"
# 前にアルバイトで少し
line = "前にアルバイトで少し"

[[dialogue]]
speaker = "ロクサーナ"
# 「道理でな、思っていたより悪くない。絶望的な演技力を想像し、怒鳴りつける言葉を用意していたが、どうやら必要なくなった」
line = "「道理でな、思っていたより悪くない。絶望的な演技力を想像し、怒鳴りつける言葉を用意していたが、どうやら必要なくなった」"

[[dialogue]]
speaker = "unk"
# 二言しか喋ってないのに……
line = "二言しか喋ってないのに……"

[[dialogue]]
speaker = "ロクサーナ"
# 「私を舐めているのか？　経験者かどうか察するのにだらだらと聞く必要はない。第一声で即わかる」
line = "「私を舐めているのか？　経験者かどうか察するのにだらだらと聞く必要はない。第一声で即わかる」"

[[dialogue]]
speaker = "メイプル"
# 「初めてなのに部長にそこまで言わせるなんて、さっすが、お兄ちゃん！」
line = "「初めてなのに部長にそこまで言わせるなんて、さっすが、お兄ちゃん！」"

[[dialogue]]
speaker = "ロクサーナ"
# 「まだド素人に毛と手足が生えた程度だが……できる奴と分かったからには厳しくいく」
line = "「まだド素人に毛と手足が生えた程度だが……できる奴と分かったからには厳しくいく」"

[[dialogue]]
speaker = "ロクサーナ"
# 「いちいち止めていたら、一幕だけで稽古の時間が終わってしまうからな。このままジュリエット登場の三場まで続ける」
line = "「いちいち止めていたら、一幕だけで稽古の時間が終わってしまうからな。このままジュリエット登場の三場まで続ける」"

[[dialogue]]
speaker = "unk"
# そして、第三場。藍の扮するジュリエットの出番だ。
line = "そして、第三場。藍の扮するジュリエットの出番だ。"

[[dialogue]]
speaker = "乳母"
# 「お嬢様ったら、どこに行かれたんでしょう？　お嬢様ー？　ジュリエット様ーっ！」
line = "「お嬢様ったら、どこに行かれたんでしょう？　お嬢様ー？　ジュリエット様ーっ！」"

[[dialogue]]
speaker = "ジュリエット"
# 「まあ、どうしたの？　誰がお呼び？」
line = "「まあ、どうしたの？　誰がお呼び？」"

[[dialogue]]
speaker = "ジュリエット"
# 「──結婚だなんて！　そんな身に過ぎたこと、考えるどころか、夢に見たことすらありませんわ」
line = "「──結婚だなんて！　そんな身に過ぎたこと、考えるどころか、夢に見たことすらありませんわ」"

[[dialogue]]
speaker = "ジュリエット"
# 「──そうね、好きになれるように、お目にかかってみるわ。それで好きになれるものならね」
line = "「──そうね、好きになれるように、お目にかかってみるわ。それで好きになれるものならね」"

[[dialogue]]
speaker = "ロクサーナ"
# 「どうだ、会長。藍のヤツ、さっきまでとは、まるで別人だろう？」
line = "「どうだ、会長。藍のヤツ、さっきまでとは、まるで別人だろう？」"

[[dialogue]]
speaker = "unk"
# 同一人物とは思えない……！
line = "同一人物とは思えない……！"

[[dialogue]]
speaker = "ロクサーナ"
# 「くっくっく、いい反応だ。その驚く顔が見たかった！」
line = "「くっくっく、いい反応だ。その驚く顔が見たかった！」"

[[dialogue]]
speaker = "ロクサーナ"
# 「藍は役の深層まで入り込む憑依型の役者だ。演じているその間、藍は藍でなくなる。名前を呼んでも、振り向かないくらいだ」
line = "「藍は役の深層まで入り込む憑依型の役者だ。演じているその間、藍は藍でなくなる。名前を呼んでも、振り向かないくらいだ」"

[[dialogue]]
speaker = "ロクサーナ"
# 「藍をヒロインに抜擢するなど配役ミスだと思っただろうが、あれほどの類稀な演技力を、たかが男性恐怖症ごときで眠らせておくのは、あまりにも惜しい」
line = "「藍をヒロインに抜擢するなど配役ミスだと思っただろうが、あれほどの類稀な演技力を、たかが男性恐怖症ごときで眠らせておくのは、あまりにも惜しい」"

[[dialogue]]
speaker = "ロクサーナ"
# 「なんとしてでも、藍を使えるようにしたい私の意図が理解できただろう？」
line = "「なんとしてでも、藍を使えるようにしたい私の意図が理解できただろう？」"

[[dialogue]]
speaker = "ロクサーナ"
# 「──よし、第三場、終了。一旦、休憩にする」
line = "「──よし、第三場、終了。一旦、休憩にする」"

[[dialogue]]
speaker = "メイプル"
# 「ふぁ～、やっと休憩～。どう、お兄ちゃん？　あたし、なかなかやるでしょ～！」
line = "「ふぁ～、やっと休憩～。どう、お兄ちゃん？　あたし、なかなかやるでしょ～！」"

[[dialogue]]
speaker = "unk"
# 変幻自在だね
line = "変幻自在だね"

[[dialogue]]
speaker = "メイプル"
# 「にへへ♪　お兄ちゃんに褒められた～♪　でも、藍はあたしよりもっとスッゴいんだよ！」
line = "「にへへ♪　お兄ちゃんに褒められた～♪　でも、藍はあたしよりもっとスッゴいんだよ！」"

[[dialogue]]
speaker = "藍"
# 「あ、ありがとうございます……ジュリエット役は、前にもやったことがあるので……」
line = "「あ、ありがとうございます……ジュリエット役は、前にもやったことがあるので……」"

[[dialogue]]
speaker = "メイプル"
# 「そうだったんだ！　悲劇のヒロインのジュリエットは、藍にベストマッチだよね！」
line = "「そうだったんだ！　悲劇のヒロインのジュリエットは、藍にベストマッチだよね！」"

[[dialogue]]
speaker = "ロクサーナ"
# 「合っているに決まっているだろう。誰がキャスティングしたと思っている。特に今回の脚本は、当て書きだからな」
line = "「合っているに決まっているだろう。誰がキャスティングしたと思っている。特に今回の脚本は、当て書きだからな」"

[[dialogue]]
speaker = "unk"
# 当て書き？
line = "当て書き？"

[[dialogue]]
speaker = "藍"
# 「その役を演じる俳優を、あらかじめ決めておいてから脚本を書くことです」
line = "「その役を演じる俳優を、あらかじめ決めておいてから脚本を書くことです」"

[[dialogue]]
speaker = "メイプル"
# 「部長、例えばあたしがジュリエットをやることになったら、また別の脚本になるんですよね？」
line = "「部長、例えばあたしがジュリエットをやることになったら、また別の脚本になるんですよね？」"

[[dialogue]]
speaker = "ロクサーナ"
# 「当然だが、そもそもお前はジュリエットってタマじゃない。お前を主役に宛がったら、どんな舞台だろうが喜劇になってしまうからな」
line = "「当然だが、そもそもお前はジュリエットってタマじゃない。お前を主役に宛がったら、どんな舞台だろうが喜劇になってしまうからな」"

[[dialogue]]
speaker = "ロクサーナ"
# 「その分、端役を大量に宛がってやっているというわけだ。台詞数だけなら、ジュリエットとロミオをも凌ぐぞ」
line = "「その分、端役を大量に宛がってやっているというわけだ。台詞数だけなら、ジュリエットとロミオをも凌ぐぞ」"

[[dialogue]]
speaker = "メイプル"
# 「演者が少ないから、兼ね役でフォローしてるだけじゃないですか～！」
line = "「演者が少ないから、兼ね役でフォローしてるだけじゃないですか～！」"

[[dialogue]]
speaker = "unk"
# 第五場。
line = "第五場。"

[[dialogue]]
speaker = "unk"
# あのご婦人は誰なんだ？
今宵、俺は初めて本当に美しい女性を見た！
line = "あのご婦人は誰なんだ？\n今宵、俺は初めて本当に美しい女性を見た！"

[[dialogue]]
speaker = "ロクサーナ"
# 「ロミオとジュリエットの出会いのシーン。キャピュレット家での仮面舞踏会だ」
line = "「ロミオとジュリエットの出会いのシーン。キャピュレット家での仮面舞踏会だ」"

[[dialogue]]
speaker = "unk"
# もし私の手がこの清き御堂を穢したならば
その罪をどうにか大目に見ていただきたい
line = "もし私の手がこの清き御堂を穢したならば\nその罪をどうにか大目に見ていただきたい"

[[dialogue]]
speaker = "unk"
# 如何にも深窓の令嬢なジュリエットを演じる藍と向き合い、手を差し出す。
line = "如何にも深窓の令嬢なジュリエットを演じる藍と向き合い、手を差し出す。"

[[dialogue]]
speaker = "ジュリエット"
# 「巡礼様に申します。こうして私の手を握──ぴゃっ！？」
line = "「巡礼様に申します。こうして私の手を握──ぴゃっ！？」"

[[dialogue]]
speaker = "unk"
# 俺に触れた途端、藍はウサギのように飛びのき、その手を払った。
line = "俺に触れた途端、藍はウサギのように飛びのき、その手を払った。"

[[dialogue]]
speaker = "ロクサーナ"
# 「カットだ、カット。ロミオの手を払い除けるジュリエットが何処にいる」
line = "「カットだ、カット。ロミオの手を払い除けるジュリエットが何処にいる」"

[[dialogue]]
speaker = "藍"
# 「ご、ごめんなさいっ……！」
line = "「ご、ごめんなさいっ……！」"

[[dialogue]]
speaker = "メイプル"
# 「お兄ちゃんの手に触った瞬間に、魔法が解けたみたいに素に戻っちゃったね」
line = "「お兄ちゃんの手に触った瞬間に、魔法が解けたみたいに素に戻っちゃったね」"

[[dialogue]]
speaker = "ロクサーナ"
# 「やはりどれほど役に没頭していても、肉体同士の接触でスイッチが切れるようだな」
line = "「やはりどれほど役に没頭していても、肉体同士の接触でスイッチが切れるようだな」"

[[dialogue]]
speaker = "ロクサーナ"
# 「まあ、いい。続けるぞ。出会いの挨拶とばかりにロミオはすかさず、ジュリエットにキスをする」
line = "「まあ、いい。続けるぞ。出会いの挨拶とばかりにロミオはすかさず、ジュリエットにキスをする」"

[[dialogue]]
speaker = "藍"
# 「ぴゃあぁあああぁぁぁぁっ！！？」
line = "「ぴゃあぁあああぁぁぁぁっ！！？」"

[[dialogue]]
speaker = "unk"
# ジュリエットが絶対にあげそうにない甲高い悲鳴が響き渡った。
line = "ジュリエットが絶対にあげそうにない甲高い悲鳴が響き渡った。"

[[dialogue]]
speaker = "unk"
# 手も繋げないのに、キスは無理でしょ！？
line = "手も繋げないのに、キスは無理でしょ！？"

[[dialogue]]
speaker = "ロクサーナ"
# 「減るモノでもあるまいに。キスぐらい、海外じゃ挨拶代わりだろう」
line = "「減るモノでもあるまいに。キスぐらい、海外じゃ挨拶代わりだろう」"

[[dialogue]]
speaker = "藍"
# 「減ります！　大切な何かが減っちゃいますよぅ！」
line = "「減ります！　大切な何かが減っちゃいますよぅ！」"

[[dialogue]]
speaker = "ロクサーナ"
# 「やれやれ。このロミオとジュリエットには家同士のしがらみ以上の障害が待ち受けているようだな」
line = "「やれやれ。このロミオとジュリエットには家同士のしがらみ以上の障害が待ち受けているようだな」"

[[dialogue]]
speaker = "unk"
# なかなか先は長そうだ。
line = "なかなか先は長そうだ。"
