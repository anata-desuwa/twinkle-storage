[[dialogue]]
speaker = "unk"
# 第１０話,梨緒の素顔？,B
line = "第１０話,梨緒の素顔？,B"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロトー！　結局、御前試合の返事したのー？」
line = "「クロトー！　結局、御前試合の返事したのー？」"

[[dialogue]]
speaker = "クロト"
# 「いや、まだだ。本人からもせっつかれたんだけど」
line = "「いや、まだだ。本人からもせっつかれたんだけど」"

[[dialogue]]
speaker = "ヴィーナス"
# 「もう、何迷ってるの？　そんなのキッパリ断っちゃえばいいのよ。『星徒会長はこの俺だ！』ってね」
line = "「もう、何迷ってるの？　そんなのキッパリ断っちゃえばいいのよ。『星徒会長はこの俺だ！』ってね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「なんなら梨緒を退学させることだってできるんだから。星徒会長ってそれだけ偉いのよ」
line = "「なんなら梨緒を退学させることだってできるんだから。星徒会長ってそれだけ偉いのよ」"

[[dialogue]]
speaker = "クロト"
# 「さすがに退学は強権すぎるだろ……」
line = "「さすがに退学は強権すぎるだろ……」"

[[dialogue]]
speaker = "unk"
# 逆らう者は皆追放では独裁者にもほどがある。
line = "逆らう者は皆追放では独裁者にもほどがある。"

[[dialogue]]
speaker = "unk"
# いや、実際退学を迫られたことはあるけども。
line = "いや、実際退学を迫られたことはあるけども。"

[[dialogue]]
speaker = "クロト"
# 「俺は御前試合で星徒会長になった身だからな。断っていいのか……」
line = "「俺は御前試合で星徒会長になった身だからな。断っていいのか……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「じゃあ受ければいいじゃない。クロトなら勝てるでしょ」
line = "「じゃあ受ければいいじゃない。クロトなら勝てるでしょ」"

[[dialogue]]
speaker = "マトイ"
# 「それはそれで問題あるんじゃない？　自信ある人がこぞって御前試合を挑むようになっても大変だし」
line = "「それはそれで問題あるんじゃない？　自信ある人がこぞって御前試合を挑むようになっても大変だし」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そんなのクロトがまとめてぶっ飛ばせばいいのよ！」
line = "「そんなのクロトがまとめてぶっ飛ばせばいいのよ！」"

[[dialogue]]
speaker = "マトイ"
# 「え～～っ！？」
line = "「え～～っ！？」"

[[dialogue]]
speaker = "サーシャ"
# 「戦国時代の幕開けね～」
line = "「戦国時代の幕開けね～」"

[[dialogue]]
speaker = "アナ"
# 「群雄割拠の始まり」
line = "「群雄割拠の始まり」"

[[dialogue]]
speaker = "クロト"
# 「戦乱の世にはならないでほしいんだけど……」
line = "「戦乱の世にはならないでほしいんだけど……」"

[[dialogue]]
speaker = "unk"
# マトイの言った通り、軽々しく受けると『新星学園の星徒会長は御前試合を受けるもの』という風潮ができかねない。
line = "マトイの言った通り、軽々しく受けると『新星学園の星徒会長は御前試合を受けるもの』という風潮ができかねない。"

[[dialogue]]
speaker = "unk"
# だけど、迷っている理由が別にあることは、自分でも薄々理解していた。
line = "だけど、迷っている理由が別にあることは、自分でも薄々理解していた。"

[[dialogue]]
speaker = "アナ"
# 「確かに、御前試合を受ける理由も、受けない理由も両方あります」
line = "「確かに、御前試合を受ける理由も、受けない理由も両方あります」"

[[dialogue]]
speaker = "アナ"
# 「とはいえ、気にする必要はないと思います。今の会長にはリクリエを退けた実績がありますから、断っても逃げたと言われることはないでしょう」
line = "「とはいえ、気にする必要はないと思います。今の会長にはリクリエを退けた実績がありますから、断っても逃げたと言われることはないでしょう」"

[[dialogue]]
speaker = "アナ"
# 「もし挑戦者が続出しても、その時断ればいいだけのことですし」
line = "「もし挑戦者が続出しても、その時断ればいいだけのことですし」"

[[dialogue]]
speaker = "マトイ"
# 「ただ試合を見たいだけの人たちもいるみたいだけどね……」
line = "「ただ試合を見たいだけの人たちもいるみたいだけどね……」"

[[dialogue]]
speaker = "サーシャ"
# 「会長くんとヴィーナスちゃんの御前試合、盛り上がったものね～」
line = "「会長くんとヴィーナスちゃんの御前試合、盛り上がったものね～」"

[[dialogue]]
speaker = "ヴィーナス"
# 「結局、クロトの好きにすればいいってことよ。どっちでもいいからちゃっちゃと決めなさい！」
line = "「結局、クロトの好きにすればいいってことよ。どっちでもいいからちゃっちゃと決めなさい！」"

[[dialogue]]
speaker = "クロト"
# 「……ああ、明日には返事をするよ」
line = "「……ああ、明日には返事をするよ」"

[[dialogue]]
speaker = "マトイ"
# 「でも大丈夫？　最近授業中とかもぼんやりしてるみたいだけど……」
line = "「でも大丈夫？　最近授業中とかもぼんやりしてるみたいだけど……」"

[[dialogue]]
speaker = "クロト"
# 「そうか？　……そうかも。疲れが遅れてやってきたのかもしれない」
line = "「そうか？　……そうかも。疲れが遅れてやってきたのかもしれない」"

[[dialogue]]
speaker = "クロト"
# 「今日は、星徒会が終わったら寄り道せずに帰るよ」
line = "「今日は、星徒会が終わったら寄り道せずに帰るよ」"

[[dialogue]]
speaker = "アナ"
# 「ふむ……」
line = "「ふむ……」"

[[dialogue]]
speaker = "サーシャ"
# 「うーん……」
line = "「うーん……」"

[[dialogue]]
speaker = "unk"
# 星徒会の後、結局真っ直ぐ帰らずに大聖堂へと足を運んだ。
line = "星徒会の後、結局真っ直ぐ帰らずに大聖堂へと足を運んだ。"

[[dialogue]]
speaker = "unk"
# 祈りたかったわけではない。懺悔に来たわけでもない。ただ静かな場所が欲しかったのかもしれない。
line = "祈りたかったわけではない。懺悔に来たわけでもない。ただ静かな場所が欲しかったのかもしれない。"

[[dialogue]]
speaker = "unk"
# 御前試合を迷っているのは……今の俺が星徒会長にふさわしいか疑問だったからだ。
line = "御前試合を迷っているのは……今の俺が星徒会長にふさわしいか疑問だったからだ。"

[[dialogue]]
speaker = "unk"
# 俺は魔王の力を見込まれて、新星学園の星徒会長になった。
line = "俺は魔王の力を見込まれて、新星学園の星徒会長になった。"

[[dialogue]]
speaker = "unk"
# だが魔王の力を引き出せない俺が、星徒会長の座にいていいのか？
line = "だが魔王の力を引き出せない俺が、星徒会長の座にいていいのか？"

[[dialogue]]
speaker = "unk"
# みんなを傷つけるかもしれない……世界を滅ぼすかもしれない俺が、みんなの側にいてもいいのか？
line = "みんなを傷つけるかもしれない……世界を滅ぼすかもしれない俺が、みんなの側にいてもいいのか？"

[[dialogue]]
speaker = "？？？"
# 「うぅ……ぐす……」
line = "「うぅ……ぐす……」"

[[dialogue]]
speaker = "クロト"
# 「……？」
line = "「……？」"

[[dialogue]]
speaker = "unk"
# 聞こえた声の方に視線を向けると──
line = "聞こえた声の方に視線を向けると──"

[[dialogue]]
speaker = "梨緒"
# 「御前試合……本当に勝てるのか？　相手は星徒会長だぞ？　最強なんだぞ？」
line = "「御前試合……本当に勝てるのか？　相手は星徒会長だぞ？　最強なんだぞ？」"

[[dialogue]]
speaker = "unk"
# 大聖堂の片隅、小さくうずくまりながら呟く梨緒。
line = "大聖堂の片隅、小さくうずくまりながら呟く梨緒。"

[[dialogue]]
speaker = "unk"
# 声は弱々しく震え、先日相対した時の凛々しさが嘘のようだ。
line = "声は弱々しく震え、先日相対した時の凛々しさが嘘のようだ。"

[[dialogue]]
speaker = "梨緒"
# 「私は何をやっても、よくて二番手止まりで……ジグにも勝てなくて……今まで何もできなかった……」
line = "「私は何をやっても、よくて二番手止まりで……ジグにも勝てなくて……今まで何もできなかった……」"

[[dialogue]]
speaker = "梨緒"
# 「私にできるのか……？　仲間も、親友も、学園も、全て失っておきながら、おめおめと生き残った私に……」
line = "「私にできるのか……？　仲間も、親友も、学園も、全て失っておきながら、おめおめと生き残った私に……」"

[[dialogue]]
speaker = "梨緒"
# 「いや弱気になるな。今度こそ世界を救うんだろう」
line = "「いや弱気になるな。今度こそ世界を救うんだろう」"

[[dialogue]]
speaker = "梨緒"
# 「誰も私を知らない。私の味方なんていない。私がやらなくて誰がやるんだ」
line = "「誰も私を知らない。私の味方なんていない。私がやらなくて誰がやるんだ」"

[[dialogue]]
speaker = "梨緒"
# 「私は強い……私はすごい……私ならできる……」
line = "「私は強い……私はすごい……私ならできる……」"

[[dialogue]]
speaker = "梨緒"
# 「私は──」
line = "「私は──」"

[[dialogue]]
speaker = "梨緒"
# 「勝つ！！」
line = "「勝つ！！」"

[[dialogue]]
speaker = "クロト"
# 「──」
line = "「──」"

[[dialogue]]
speaker = "梨緒"
# 「──」
line = "「──」"

[[dialogue]]
speaker = "unk"
# 梨緒が勢いよく立ち上がると、視線がぶつかった。
line = "梨緒が勢いよく立ち上がると、視線がぶつかった。"

[[dialogue]]
speaker = "unk"
# 割と最悪のタイミングだった。
line = "割と最悪のタイミングだった。"

[[dialogue]]
speaker = "梨緒"
# 「き、聞いていたのか！？」
line = "「き、聞いていたのか！？」"

[[dialogue]]
speaker = "クロト"
# 「あー、いや、何のことやら……」
line = "「あー、いや、何のことやら……」"

[[dialogue]]
speaker = "梨緒"
# 「聞いていた反応だろうそれは！」
line = "「聞いていた反応だろうそれは！」"

[[dialogue]]
speaker = "クロト"
# 「ごめん、本当は泣きそうになったところから聞いてた」
line = "「ごめん、本当は泣きそうになったところから聞いてた」"

[[dialogue]]
speaker = "梨緒"
# 「それはわざわざ言わなくていい！！」
line = "「それはわざわざ言わなくていい！！」"

[[dialogue]]
speaker = "梨緒"
# 「少し心細くなっていただけだ。忘れてくれ」
line = "「少し心細くなっていただけだ。忘れてくれ」"

[[dialogue]]
speaker = "unk"
# 梨緒が立ち去ろうとすると、向こうから神官のイレーナとシスターのシャロンが困った顔で歩いきて……
line = "梨緒が立ち去ろうとすると、向こうから神官のイレーナとシスターのシャロンが困った顔で歩いきて……"

[[dialogue]]
speaker = "イレーナ"
# 「弱りましたね……」
line = "「弱りましたね……」"

[[dialogue]]
speaker = "梨緒"
# 「弱い！？」
line = "「弱い！？」"

[[dialogue]]
speaker = "シャロン"
# 「あれは使えないんでしょうか？」
line = "「あれは使えないんでしょうか？」"

[[dialogue]]
speaker = "梨緒"
# 「使えない！？」
line = "「使えない！？」"

[[dialogue]]
speaker = "梨緒"
# 「どうせ私は弱くて使えない、役立たずな星騎士なんだ……」
line = "「どうせ私は弱くて使えない、役立たずな星騎士なんだ……」"

[[dialogue]]
speaker = "クロト"
# 「誰も君のことだとは言ってないと思うよ……」
line = "「誰も君のことだとは言ってないと思うよ……」"

[[dialogue]]
speaker = "unk"
# 俺に御前試合を挑んだ時の凛々しい表情はどこへ行ったのか、目に涙を浮かべて項垂れる梨緒。
line = "俺に御前試合を挑んだ時の凛々しい表情はどこへ行ったのか、目に涙を浮かべて項垂れる梨緒。"

[[dialogue]]
speaker = "unk"
# もしかするとこちらが彼女の素顔なんだろうか……？
line = "もしかするとこちらが彼女の素顔なんだろうか……？"

[[dialogue]]
speaker = "イレーナ"
# 「おや？　会長さんとそちらは……」
line = "「おや？　会長さんとそちらは……」"

[[dialogue]]
speaker = "シャロン"
# 「転入生の梨緒さまですね。私はシスターのシャロンです。よろしくお願いいたします」
line = "「転入生の梨緒さまですね。私はシスターのシャロンです。よろしくお願いいたします」"

[[dialogue]]
speaker = "梨緒"
# 「ああ、うん、よろしく、シスターシャロン……」
line = "「ああ、うん、よろしく、シスターシャロン……」"

[[dialogue]]
speaker = "イレーナ"
# 「ご気分が優れないようですが、お加減はいかがでしょうか？」
line = "「ご気分が優れないようですが、お加減はいかがでしょうか？」"

[[dialogue]]
speaker = "梨緒"
# 「自分の身の程を改めて思い知らされただけだ……気にしないでくれ、イレーナ神官」
line = "「自分の身の程を改めて思い知らされただけだ……気にしないでくれ、イレーナ神官」"

[[dialogue]]
speaker = "イレーナ"
# 「は、はぁ……」
line = "「は、はぁ……」"

[[dialogue]]
speaker = "unk"
# イレーナがちらりと俺を見やるが、残念ながら梨緒のことは俺にもわからない。
line = "イレーナがちらりと俺を見やるが、残念ながら梨緒のことは俺にもわからない。"

[[dialogue]]
speaker = "クロト"
# 「イレーナこそ、さっきは何の話をしていたんだ？」
line = "「イレーナこそ、さっきは何の話をしていたんだ？」"

[[dialogue]]
speaker = "イレーナ"
# 「教皇庁所有の建造物が、先の戦いで少なからず損害を受けてしまいまして……。修繕したくとも予算が足りないのです」
line = "「教皇庁所有の建造物が、先の戦いで少なからず損害を受けてしまいまして……。修繕したくとも予算が足りないのです」"

[[dialogue]]
speaker = "シャロン"
# 「修道院で積み立てているお金を使ってはと申し上げたのですが……」
line = "「修道院で積み立てているお金を使ってはと申し上げたのですが……」"

[[dialogue]]
speaker = "イレーナ"
# 「それは修道院のお金ですから使えませんよ。お気持ちだけ受け取っておきます」
line = "「それは修道院のお金ですから使えませんよ。お気持ちだけ受け取っておきます」"

[[dialogue]]
speaker = "クロト"
# 「……だそうだ。梨緒のことじゃなかったぞ」
line = "「……だそうだ。梨緒のことじゃなかったぞ」"

[[dialogue]]
speaker = "梨緒"
# 「うぅ……やっぱり私なんかが生き残るべきじゃなかったんだ……」
line = "「うぅ……やっぱり私なんかが生き残るべきじゃなかったんだ……」"

[[dialogue]]
speaker = "クロト"
# 「聞いてない……」
line = "「聞いてない……」"

[[dialogue]]
speaker = "unk"
# しかも言葉が地味に重い……
line = "しかも言葉が地味に重い……"

[[dialogue]]
speaker = "梨緒"
# 「いや！　私は今度こそ世界を守る！　そのために私はここにいるんだ！」
line = "「いや！　私は今度こそ世界を守る！　そのために私はここにいるんだ！」"

[[dialogue]]
speaker = "梨緒"
# 「緋宮クロト。御前試合を受けるのか、受けないのか。今度こそ答えを聞かせてもらおうか」
line = "「緋宮クロト。御前試合を受けるのか、受けないのか。今度こそ答えを聞かせてもらおうか」"

[[dialogue]]
speaker = "クロト"
# 「……ああ、俺もそのつもりだった」
line = "「……ああ、俺もそのつもりだった」"

[[dialogue]]
speaker = "unk"
# 俺は梨緒のことを知らない。きっと誰も彼女を知らない。
line = "俺は梨緒のことを知らない。きっと誰も彼女を知らない。"

[[dialogue]]
speaker = "unk"
# それでも俺を映す瞳には、世界を守るという揺るぎない意志が宿っている。
line = "それでも俺を映す瞳には、世界を守るという揺るぎない意志が宿っている。"

[[dialogue]]
speaker = "unk"
# なのに固く握った拳は小さく震えていて──
line = "なのに固く握った拳は小さく震えていて──"

[[dialogue]]
speaker = "クロト"
# 「受けるよ」
line = "「受けるよ」"

[[dialogue]]
speaker = "梨緒"
# 「！」
line = "「！」"

[[dialogue]]
speaker = "クロト"
# 「御前試合、受けて立つ。星徒会長の座を懸けて勝負だ」
line = "「御前試合、受けて立つ。星徒会長の座を懸けて勝負だ」"

[[dialogue]]
speaker = "unk"
# 御前試合を受けることが、彼女の想いに応える一番の方法だと思った。
line = "御前試合を受けることが、彼女の想いに応える一番の方法だと思った。"
