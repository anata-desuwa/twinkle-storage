[[dialogue]]
speaker = "unk"
# 第２話,脱出,B
line = "第２話,脱出,B"

[[dialogue]]
speaker = "チナ"
# 「中に入ったやつらが全然出てこないと思って来てみたら、怪しい仮面したやつがいるじゃないか」
line = "「中に入ったやつらが全然出てこないと思って来てみたら、怪しい仮面したやつがいるじゃないか」"

[[dialogue]]
speaker = "チナ"
# 「新星の学園長から聞いてるぞ。お前がジグだな！」
line = "「新星の学園長から聞いてるぞ。お前がジグだな！」"

[[dialogue]]
speaker = "ジグ"
# 「新しいお客さんかな。君は新星学園に捕まっていたはずだけど、もしかしてデネブを裏切ったのかい？」
line = "「新しいお客さんかな。君は新星学園に捕まっていたはずだけど、もしかしてデネブを裏切ったのかい？」"

[[dialogue]]
speaker = "チナ"
# 「あたしがデネブを裏切るわけないだろ！」
line = "「あたしがデネブを裏切るわけないだろ！」"

[[dialogue]]
speaker = "ベアトリス"
# 「私もいるよ！」
line = "「私もいるよ！」"

[[dialogue]]
speaker = "グレイス"
# 「ベアトまで！？」
line = "「ベアトまで！？」"

[[dialogue]]
speaker = "unk"
# チナが乗ってきたスレイプニルの他にもう一体、同型のガーディアンが到着し、その背にはベアトリスが乗っていた。
line = "チナが乗ってきたスレイプニルの他にもう一体、同型のガーディアンが到着し、その背にはベアトリスが乗っていた。"

[[dialogue]]
speaker = "unk"
# レティシアは気を失っているのか、ベアトリスの腕に抱えられている。
line = "レティシアは気を失っているのか、ベアトリスの腕に抱えられている。"

[[dialogue]]
speaker = "クロト"
# （チナが極星従騎に乗ってきたのは驚いたが──これは好機かもしれない）
line = "（チナが極星従騎に乗ってきたのは驚いたが──これは好機かもしれない）"

[[dialogue]]
speaker = "クロト"
# （神殿が聖庭園にぶつかるまでがタイムリミット……逆にそれまでは猶予がある）
line = "（神殿が聖庭園にぶつかるまでがタイムリミット……逆にそれまでは猶予がある）"

[[dialogue]]
speaker = "クロト"
# 「今ジグの相手をするのはまずい。一旦離脱しよう！」
line = "「今ジグの相手をするのはまずい。一旦離脱しよう！」"

[[dialogue]]
speaker = "ベアトリス"
# 「わかりました！　みんな、極星従騎に乗って！」
line = "「わかりました！　みんな、極星従騎に乗って！」"

[[dialogue]]
speaker = "チナ"
# 「そういうことなら──行け、極星従騎ホルン！」
line = "「そういうことなら──行け、極星従騎ホルン！」"

[[dialogue]]
speaker = "ホルン"
# 「クルルーッ！」
line = "「クルルーッ！」"

[[dialogue]]
speaker = "unk"
# 極星従騎スレイプニルに追従していた小型のガーディアンの群れが、ジグに殺到する。
line = "極星従騎スレイプニルに追従していた小型のガーディアンの群れが、ジグに殺到する。"

[[dialogue]]
speaker = "ジグ"
# 「おやおや、かわいい小鳥だね」
line = "「おやおや、かわいい小鳥だね」"

[[dialogue]]
speaker = "unk"
# しかしジグは涼しい顔で大剣を振るい、極星従騎を次々と蹴散らしていく。
line = "しかしジグは涼しい顔で大剣を振るい、極星従騎を次々と蹴散らしていく。"

[[dialogue]]
speaker = "チナ"
# 「お前らこっちに乗れ！」
line = "「お前らこっちに乗れ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ありがとう、チナ！　助かるわ！！」
line = "「ありがとう、チナ！　助かるわ！！」"

[[dialogue]]
speaker = "unk"
# ヴィーナスが動けない俺とアポロを鎖で絡め取り、チナの極星従騎に乗る。
line = "ヴィーナスが動けない俺とアポロを鎖で絡め取り、チナの極星従騎に乗る。"

[[dialogue]]
speaker = "ナターシャ"
# 「いくよ、メルエル」
line = "「いくよ、メルエル」"

[[dialogue]]
speaker = "メルエル"
# 「う、うん……」
line = "「う、うん……」"

[[dialogue]]
speaker = "ベアトリス"
# 「梨緒ちゃんも！　こっち！」
line = "「梨緒ちゃんも！　こっち！」"

[[dialogue]]
speaker = "梨緒"
# 「あ、ああ……！」
line = "「あ、ああ……！」"

[[dialogue]]
speaker = "unk"
# ナターシャがメルエルを抱えて、梨緒とともにベアトリスの極星従騎の背に乗る。
line = "ナターシャがメルエルを抱えて、梨緒とともにベアトリスの極星従騎の背に乗る。"

[[dialogue]]
speaker = "unk"
# そして２騎の極星従騎で、神殿内を後にした。
line = "そして２騎の極星従騎で、神殿内を後にした。"

[[dialogue]]
speaker = "チナ"
# 「ひとまずは何とかなったか？」
line = "「ひとまずは何とかなったか？」"

[[dialogue]]
speaker = "クロト"
# 「ああ、助けてくれてありがとう」
line = "「ああ、助けてくれてありがとう」"

[[dialogue]]
speaker = "チナ"
# 「別にお前らのためじゃないっての。アタシはデネブを守るために戦ってるだけだ」
line = "「別にお前らのためじゃないっての。アタシはデネブを守るために戦ってるだけだ」"

[[dialogue]]
speaker = "クロト"
# 「わかってる。だけどどうしてチナが極星従騎を連れているんだ？」
line = "「わかってる。だけどどうしてチナが極星従騎を連れているんだ？」"

[[dialogue]]
speaker = "クロト"
# 「チナが連れていた極星従騎はすべて、流星市国での戦いで倒したと思っていたんだが……」
line = "「チナが連れていた極星従騎はすべて、流星市国での戦いで倒したと思っていたんだが……」"

[[dialogue]]
speaker = "チナ"
# 「新星学園からセレスティアを借りる時、煌嶺ってやつがおまけにつけてくれたんだよ」
line = "「新星学園からセレスティアを借りる時、煌嶺ってやつがおまけにつけてくれたんだよ」"

[[dialogue]]
speaker = "クロト"
# 「あぁ、なるほど……」
line = "「あぁ、なるほど……」"

[[dialogue]]
speaker = "unk"
# 流星市国で煌嶺と別れた時、『ガーディアンを捕まえる』と言っていたが、本当に自分のものにしたらしい。
line = "流星市国で煌嶺と別れた時、『ガーディアンを捕まえる』と言っていたが、本当に自分のものにしたらしい。"

[[dialogue]]
speaker = "unk"
# 支配下に置いた極星従騎を気前よく貸してくれたことについては、また会った時に感謝しておこう。
line = "支配下に置いた極星従騎を気前よく貸してくれたことについては、また会った時に感謝しておこう。"

[[dialogue]]
speaker = "グレイス"
# 「チナ！　大丈夫ですかチナ！」
line = "「チナ！　大丈夫ですかチナ！」"

[[dialogue]]
speaker = "チナ"
# 「この通りピンピンしてるよ。久しぶり……ってほどでもないか、そっちこそ元気そうで何よりだよ、グレイス」
line = "「この通りピンピンしてるよ。久しぶり……ってほどでもないか、そっちこそ元気そうで何よりだよ、グレイス」"

[[dialogue]]
speaker = "グレイス"
# 「ほっ……よかった……」
line = "「ほっ……よかった……」"

[[dialogue]]
speaker = "チナ"
# 「まぁ……心配かけて悪かったな」
line = "「まぁ……心配かけて悪かったな」"

[[dialogue]]
speaker = "グレイス"
# 「ホントですよ！？　アルタイルに特攻を仕掛けるなんて、みんなどれだけ心配したと思ってるんですか！！」
line = "「ホントですよ！？　アルタイルに特攻を仕掛けるなんて、みんなどれだけ心配したと思ってるんですか！！」"

[[dialogue]]
speaker = "unk"
# 元気なチナの様子を見て、小言を言いつつもグレイスは安堵の表情を浮かべていた。
line = "元気なチナの様子を見て、小言を言いつつもグレイスは安堵の表情を浮かべていた。"

[[dialogue]]
speaker = "チナ"
# 「あとレティシアの方だけど、こっちは気絶してるだけだから。そのうち目を覚ますだろ」
line = "「あとレティシアの方だけど、こっちは気絶してるだけだから。そのうち目を覚ますだろ」"

[[dialogue]]
speaker = "グレイス"
# 「わかってますよ！　それにしても、あのレティシアによく勝てましたね！」
line = "「わかってますよ！　それにしても、あのレティシアによく勝てましたね！」"

[[dialogue]]
speaker = "unk"
# 奇遇にもルヴィネ以外の極星星徒会４人が、アルタイルの天界に揃った。
line = "奇遇にもルヴィネ以外の極星星徒会４人が、アルタイルの天界に揃った。"

[[dialogue]]
speaker = "unk"
# しかしながら、再会を喜び合っている時間はなさそうだった。
line = "しかしながら、再会を喜び合っている時間はなさそうだった。"

[[dialogue]]
speaker = "チナ"
# 「で、今何が起こってるんだ？　目の前で神殿が動いてるのはわかるんだが」
line = "「で、今何が起こってるんだ？　目の前で神殿が動いてるのはわかるんだが」"

[[dialogue]]
speaker = "ナターシャ"
# 「ジグは女神の神殿のコントロールを乗っ取って、聖庭園にぶつけようとしてるんだ」
line = "「ジグは女神の神殿のコントロールを乗っ取って、聖庭園にぶつけようとしてるんだ」"

[[dialogue]]
speaker = "ナターシャ"
# 「このままだと神殿が聖庭園に激突して、両方おじゃんになるってわけ」
line = "「このままだと神殿が聖庭園に激突して、両方おじゃんになるってわけ」"

[[dialogue]]
speaker = "チナ"
# 「なんだそりゃ！？　そんなのアリかよ！！」
line = "「なんだそりゃ！？　そんなのアリかよ！！」"

[[dialogue]]
speaker = "unk"
# ジグの言葉が嘘でないことを証明するように、今も女神の神殿は聖庭園の方角に向かって移動していた。
line = "ジグの言葉が嘘でないことを証明するように、今も女神の神殿は聖庭園の方角に向かって移動していた。"

[[dialogue]]
speaker = "unk"
# こちらも引き離されないように、極星従騎で神殿に並行して飛んでいる。
line = "こちらも引き離されないように、極星従騎で神殿に並行して飛んでいる。"

[[dialogue]]
speaker = "ナターシャ"
# 「ここから聖庭園までの距離を考えると……神殿がぶつかるまでざっと３時間ってところじゃないかな」
line = "「ここから聖庭園までの距離を考えると……神殿がぶつかるまでざっと３時間ってところじゃないかな」"

[[dialogue]]
speaker = "ベアトリス"
# 「じゃあ、急いで神殿を止めないと！」
line = "「じゃあ、急いで神殿を止めないと！」"

[[dialogue]]
speaker = "クロト"
# 「ああ、その通りだ。このままじゃアルタイルの天使はみんな消滅する」
line = "「ああ、その通りだ。このままじゃアルタイルの天使はみんな消滅する」"

[[dialogue]]
speaker = "クロト"
# 「だけど神殿を止めるには、再び中に突入してジグを倒す必要がある」
line = "「だけど神殿を止めるには、再び中に突入してジグを倒す必要がある」"

[[dialogue]]
speaker = "unk"
# 天使と天界を救うには、リクリエの使徒との決着をつけなければならない。
line = "天使と天界を救うには、リクリエの使徒との決着をつけなければならない。"

[[dialogue]]
speaker = "unk"
# リクリエの使徒の強さをよく知っているからこそ、この事実が心に重くのしかかる。
line = "リクリエの使徒の強さをよく知っているからこそ、この事実が心に重くのしかかる。"

[[dialogue]]
speaker = "ベアトリス"
# 「みんなで戦えば、なんとかならないですか……？」
line = "「みんなで戦えば、なんとかならないですか……？」"

[[dialogue]]
speaker = "クロト"
# 「神殿の中だと魔王の力が封じられているせいで、戦えるメンバーが限られているんだ」
line = "「神殿の中だと魔王の力が封じられているせいで、戦えるメンバーが限られているんだ」"

[[dialogue]]
speaker = "クロト"
# 「俺とヴィーナス、アポロの３人は神殿の中で戦うのは無理そうだ。恐らくアルケインコードやノヴァフォームも使えない」
line = "「俺とヴィーナス、アポロの３人は神殿の中で戦うのは無理そうだ。恐らくアルケインコードやノヴァフォームも使えない」"

[[dialogue]]
speaker = "アポロ"
# 「すまん……あたしもジグと戦いたいんだが……」
line = "「すまん……あたしもジグと戦いたいんだが……」"

[[dialogue]]
speaker = "unk"
# おそらく間に合わないだろうが、たとえフィオナを呼んできたとしても、神殿に陣取ったジグに対抗することはできないだろう。
line = "おそらく間に合わないだろうが、たとえフィオナを呼んできたとしても、神殿に陣取ったジグに対抗することはできないだろう。"

[[dialogue]]
speaker = "unk"
# 天界を守るために神殿に仕掛けられた魔王対策の罠が、今は裏目に出てしまった。
line = "天界を守るために神殿に仕掛けられた魔王対策の罠が、今は裏目に出てしまった。"

[[dialogue]]
speaker = "梨緒"
# 「なら私が行こう。ベガから来た使徒を止めるのは、ベガの星騎士である私の役目だ」
line = "「なら私が行こう。ベガから来た使徒を止めるのは、ベガの星騎士である私の役目だ」"

[[dialogue]]
speaker = "梨緒"
# 「ジグが使徒になってしまったのは私のせいだ。だから、私が止めなければいけない」
line = "「ジグが使徒になってしまったのは私のせいだ。だから、私が止めなければいけない」"

[[dialogue]]
speaker = "ナターシャ"
# 「待った。そういうのはなしって何回言わせるのさ」
line = "「待った。そういうのはなしって何回言わせるのさ」"

[[dialogue]]
speaker = "ナターシャ"
# 「天界と天使の命が懸かってるんだから、役目とか責任じゃなくて、勝てるかどうかでメンバーを決めるべきだよ」
line = "「天界と天使の命が懸かってるんだから、役目とか責任じゃなくて、勝てるかどうかでメンバーを決めるべきだよ」"

[[dialogue]]
speaker = "ベアトリス"
# 「ナターシャちゃんの言う通りだよ。今はどうやって勝つかを考えなきゃ」
line = "「ナターシャちゃんの言う通りだよ。今はどうやって勝つかを考えなきゃ」"

[[dialogue]]
speaker = "梨緒"
# 「ぅ……すまない……」
line = "「ぅ……すまない……」"

[[dialogue]]
speaker = "unk"
# ナターシャとベアトリスに反論され、項垂れる梨緒。
line = "ナターシャとベアトリスに反論され、項垂れる梨緒。"

[[dialogue]]
speaker = "unk"
# 結果的に梨緒がジグと戦うかもしれないが、それはあくまで勝算があると判断した場合だ。
line = "結果的に梨緒がジグと戦うかもしれないが、それはあくまで勝算があると判断した場合だ。"

[[dialogue]]
speaker = "メルエル"
# 「あの……」
line = "「あの……」"

[[dialogue]]
speaker = "unk"
# 神殿内で戦えるメンバーをどう決めるか思案しようとした時、メルエルが不安そうな表情で口を開いた。
line = "神殿内で戦えるメンバーをどう決めるか思案しようとした時、メルエルが不安そうな表情で口を開いた。"

[[dialogue]]
speaker = "メルエル"
# 「神殿で戦う人を決めるために聞いておきたいんだけど……」
line = "「神殿で戦う人を決めるために聞いておきたいんだけど……」"

[[dialogue]]
speaker = "メルエル"
# 「さっき神殿で会長くんたちが戦えなくなった時、私も星力を使えなくなったんだ。それって、私も魔王ってことなの？」
line = "「さっき神殿で会長くんたちが戦えなくなった時、私も星力を使えなくなったんだ。それって、私も魔王ってことなの？」"

[[dialogue]]
speaker = "メルエル"
# 「……ナターシャちゃん、何か知ってる？」
line = "「……ナターシャちゃん、何か知ってる？」"

[[dialogue]]
speaker = "unk"
# メルエルがナターシャに視線を向ける。
line = "メルエルがナターシャに視線を向ける。"

[[dialogue]]
speaker = "unk"
# その目は、自分すら知らない秘密に怯えるようでもあった。
line = "その目は、自分すら知らない秘密に怯えるようでもあった。"

[[dialogue]]
speaker = "ナターシャ"
# 「んー……」
line = "「んー……」"

[[dialogue]]
speaker = "ナターシャ"
# 「そう、リガルタは２０００年前に世界を破壊しようとした魔王の血族だよ」
line = "「そう、リガルタは２０００年前に世界を破壊しようとした魔王の血族だよ」"

[[dialogue]]
speaker = "ナターシャ"
# 「どうして『太陽の壁画』と『月の壁画』の真実が明かされないか。それは現存する魔王の血族の迫害に繋がる可能性があるから」
line = "「どうして『太陽の壁画』と『月の壁画』の真実が明かされないか。それは現存する魔王の血族の迫害に繋がる可能性があるから」"

[[dialogue]]
speaker = "ナターシャ"
# 「結局のところ、魔王の系譜にある者が一度悪に堕ちた事実は変わらないからね」
line = "「結局のところ、魔王の系譜にある者が一度悪に堕ちた事実は変わらないからね」"

[[dialogue]]
speaker = "unk"
# ナターシャは、俺たちが知らない太陽の壁画の由来や、リガルタの秘密まで知っていて、天界にいる魔王について詳しかった。
line = "ナターシャは、俺たちが知らない太陽の壁画の由来や、リガルタの秘密まで知っていて、天界にいる魔王について詳しかった。"

[[dialogue]]
speaker = "unk"
# メルエルの事情を知っているとすれば、きっとナターシャだろうと思われたが……
line = "メルエルの事情を知っているとすれば、きっとナターシャだろうと思われたが……"

[[dialogue]]
speaker = "ナターシャ"
# 「はぁ……これ以上隠すのはもう無理か。やっぱりメルエルは女神の神殿に来てほしくなかったなぁ」
line = "「はぁ……これ以上隠すのはもう無理か。やっぱりメルエルは女神の神殿に来てほしくなかったなぁ」"

[[dialogue]]
speaker = "ナターシャ"
# 「そうだよ……メルエルは、魔王の血族だ」
line = "「そうだよ……メルエルは、魔王の血族だ」"

[[dialogue]]
speaker = "メルエル"
# 「！！」
line = "「！！」"
