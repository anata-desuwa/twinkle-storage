[[dialogue]]
speaker = "unk"
# 第１話,流星市国のトップアイドル,P
line = "第１話,流星市国のトップアイドル,P"

[[dialogue]]
speaker = "？？？"
# 「ク～ロ～ト～！」
line = "「ク～ロ～ト～！」"

[[dialogue]]
speaker = "unk"
# ある日の放課後。星徒会室で書類仕事をしていると、元気に呼ぶ声が聞こえてきて――
line = "ある日の放課後。星徒会室で書類仕事をしていると、元気に呼ぶ声が聞こえてきて――"

[[dialogue]]
speaker = "ヴィーナス"
# 「あっ、いたいた♪　ねぇ、聞いて！　星徒会でレミカの仲間探しに協力しようと思うの！」
line = "「あっ、いたいた♪　ねぇ、聞いて！　星徒会でレミカの仲間探しに協力しようと思うの！」"

[[dialogue]]
speaker = "レミカ"
# 「ちょっと、ヴィーナス。自分で探すつもりだから、そんな事を大袈裟にしなくていいんだって……」
line = "「ちょっと、ヴィーナス。自分で探すつもりだから、そんな事を大袈裟にしなくていいんだって……」"

[[dialogue]]
speaker = "unk"
# あっ！　キミは人気アイドルの……！
line = "あっ！　キミは人気アイドルの……！"

[[dialogue]]
speaker = "レミカ"
# 「ん……初めまして、会長。新星学園２年の<ruby=あいど>愛戸</ruby>レミカです」
line = "「ん……初めまして、会長。新星学園２年の<ruby>愛戸<rt>あいど</rt></ruby>レミカです」"

[[dialogue]]
speaker = "レミカ"
# 「芸能事務所『ポラリスプロダクション』所属で、アイドルの仕事をやっています」
line = "「芸能事務所『ポラリスプロダクション』所属で、アイドルの仕事をやっています」"

[[dialogue]]
speaker = "ヴィーナス"
# 「学園どころか、流星市国でも知らない人はいないくらいの有名人だから、クロトも当然知っているわよね！　レミカは現役のトッププロアイドルだもの！」
line = "「学園どころか、流星市国でも知らない人はいないくらいの有名人だから、クロトも当然知っているわよね！　レミカは現役のトッププロアイドルだもの！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「天性の心痺れる歌声で、新曲が出ればヒットチャートで１位連発！　レミカが着たファッションは、若い女の子達の間ですぐブームになる程の影響力！」
line = "「天性の心痺れる歌声で、新曲が出ればヒットチャートで１位連発！　レミカが着たファッションは、若い女の子達の間ですぐブームになる程の影響力！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そのクールな立ち振る舞いで『自立したカッコいい女子の理想』として君臨し、今や活躍の範囲は国内にとどまらず、海外まで知れ渡る世界的アーティストなのよ！」
line = "「そのクールな立ち振る舞いで『自立したカッコいい女子の理想』として君臨し、今や活躍の範囲は国内にとどまらず、海外まで知れ渡る世界的アーティストなのよ！」"

[[dialogue]]
speaker = "レミカ"
# 「いや、熱弁過ぎるでしょ。確かに私は完全無欠のトップアイドルを目指しているけど……恥ずかしいから、それくらいにして」
line = "「いや、熱弁過ぎるでしょ。確かに私は完全無欠のトップアイドルを目指しているけど……恥ずかしいから、それくらいにして」"

[[dialogue]]
speaker = "ヴィーナス"
# 「だって私、レミカのファンだもの！　ＣＤだって持っているんだから♪」
line = "「だって私、レミカのファンだもの！　ＣＤだって持っているんだから♪」"

[[dialogue]]
speaker = "unk"
# ヴィーナスは愛戸さんと親しいのか？
line = "ヴィーナスは愛戸さんと親しいのか？"

[[dialogue]]
speaker = "レミカ"
# 「ヴィーナスとはクラスメイトなんです。この子、誰にでも人見知りせずグイグイ行くんで、それで自然と話すようになったというか……」
line = "「ヴィーナスとはクラスメイトなんです。この子、誰にでも人見知りせずグイグイ行くんで、それで自然と話すようになったというか……」"

[[dialogue]]
speaker = "レミカ"
# 「あ、それと会長。そこまで私相手にかしこまらなくていいですよ。同級生ですし、愛戸でもレミカでも、普通に呼んでくれれば」
line = "「あ、それと会長。そこまで私相手にかしこまらなくていいですよ。同級生ですし、愛戸でもレミカでも、普通に呼んでくれれば」"

[[dialogue]]
speaker = "unk"
# じゃあ、俺もレミカって呼ぶよ
line = "じゃあ、俺もレミカって呼ぶよ"

[[dialogue]]
speaker = "レミカ"
# 「はい。それでパーフェクトです」
line = "「はい。それでパーフェクトです」"

[[dialogue]]
speaker = "レミカ"
# 「――会長に対しても、同級生だから敬語はいらない……ヴィーナスに話してるのと同じみたいに、ですか？」
line = "「――会長に対しても、同級生だから敬語はいらない……ヴィーナスに話してるのと同じみたいに、ですか？」"

[[dialogue]]
speaker = "レミカ"
# 「……ん、分かった。ありがと」
line = "「……ん、分かった。ありがと」"

[[dialogue]]
speaker = "レミカ"
# 「じゃあ、アイドルの時みたいにじゃなくて、普段の自分らしく喋らせてもらうね。会長」
line = "「じゃあ、アイドルの時みたいにじゃなくて、普段の自分らしく喋らせてもらうね。会長」"

[[dialogue]]
speaker = "unk"
# それで、さっきの仲間探しっていうのは？
line = "それで、さっきの仲間探しっていうのは？"

[[dialogue]]
speaker = "ヴィーナス"
# 「実は、レミカがユニットを組みたくて、自分と一緒にアイドルをやってくれる子を探しているらしいのよ」
line = "「実は、レミカがユニットを組みたくて、自分と一緒にアイドルをやってくれる子を探しているらしいのよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「だったら星徒会で協力して、そのことを広く告知すれば、立候補してくれる子がいるかもしれないでしょう？」
line = "「だったら星徒会で協力して、そのことを広く告知すれば、立候補してくれる子がいるかもしれないでしょう？」"

[[dialogue]]
speaker = "レミカ"
# 「ありがたいけど、そこまでしなくてもいいんだって。歌とか、人を惹きつけるような才能があるかどうか、自分の目で見極めたいし」
line = "「ありがたいけど、そこまでしなくてもいいんだって。歌とか、人を惹きつけるような才能があるかどうか、自分の目で見極めたいし」"

[[dialogue]]
speaker = "ヴィーナス"
# 「立候補してくれた子達を、オーディションでも何でもすればよくない？」
line = "「立候補してくれた子達を、オーディションでも何でもすればよくない？」"

[[dialogue]]
speaker = "レミカ"
# 「ヴィーナスと違って、私はそういうタイプじゃないの。協力したいって言ってくれるのはありがたいけど……今はまだ、じっくり探させて欲しい」
line = "「ヴィーナスと違って、私はそういうタイプじゃないの。協力したいって言ってくれるのはありがたいけど……今はまだ、じっくり探させて欲しい」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうなの？　残念だわ……いちファンとして、力になりたかったのに」
line = "「そうなの？　残念だわ……いちファンとして、力になりたかったのに」"

[[dialogue]]
speaker = "レミカ"
# 「ありがと。その代わり、私が本当に困った時は相談するから。友達として話を聞いてくれると嬉しい、かな」
line = "「ありがと。その代わり、私が本当に困った時は相談するから。友達として話を聞いてくれると嬉しい、かな」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええ、もちろんよ！　つまりは――」
line = "「ええ、もちろんよ！　つまりは――」"

[[dialogue]]
speaker = "ヴィーナス"
# 「困った時のファンこそ、真のファンってことよね！」
line = "「困った時のファンこそ、真のファンってことよね！」"

[[dialogue]]
speaker = "unk"
# そこは友って言うところじゃないのか……
line = "そこは友って言うところじゃないのか……"

[[dialogue]]
speaker = "レミカ"
# 「ヴィーナス、あんた……」
line = "「ヴィーナス、あんた……」"

[[dialogue]]
speaker = "レミカ"
# 「ぷっ……ふ……ふふ……、くっ……ふっ……ふふ……！」
line = "「ぷっ……ふ……ふふ……、くっ……ふっ……ふふ……！」"

[[dialogue]]
speaker = "unk"
# ど、どうした？　お腹を押さえたりして……
line = "ど、どうした？　お腹を押さえたりして……"

[[dialogue]]
speaker = "ヴィーナス"
# 「大丈夫よ。何かツボに入って、笑いのスイッチが入っちゃっただけだから」
line = "「大丈夫よ。何かツボに入って、笑いのスイッチが入っちゃっただけだから」"

[[dialogue]]
speaker = "ヴィーナス"
# 「レミカはいつも変なところでツボるのよ。笑いのツボが浅いのね！」
line = "「レミカはいつも変なところでツボるのよ。笑いのツボが浅いのね！」"

[[dialogue]]
speaker = "レミカ"
# 「っ……すぅ～……ふぅ。……いや、笑ってないし。アイドルはそんなことで笑ったりしないから」
line = "「っ……すぅ～……ふぅ。……いや、笑ってないし。アイドルはそんなことで笑ったりしないから」"

[[dialogue]]
speaker = "ヴィーナス"
# 「アイドルだってバカ笑いくらいするわよ。ゲラゲラ系アイドルとか、意外とウケるんじゃないかしら！」
line = "「アイドルだってバカ笑いくらいするわよ。ゲラゲラ系アイドルとか、意外とウケるんじゃないかしら！」"

[[dialogue]]
speaker = "レミカ"
# 「ふ～ん。まあ、そういうのがいてもいいかもね。私は違うけど」
line = "「ふ～ん。まあ、そういうのがいてもいいかもね。私は違うけど」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ね？　本物はテレビで見るより面白いでしょ」
line = "「ね？　本物はテレビで見るより面白いでしょ」"

[[dialogue]]
speaker = "レミカ"
# 「会長、違うから。私はヴィーナスの天然発言でウケたりしないから」
line = "「会長、違うから。私はヴィーナスの天然発言でウケたりしないから」"

[[dialogue]]
speaker = "ヴィーナス"
# 「天然発言！？　えっ、私のどこが天然なの……！？」
line = "「天然発言！？　えっ、私のどこが天然なの……！？」"

[[dialogue]]
speaker = "レミカ"
# 「そういうところが……ぷっ……ふ、ふふふ……」
line = "「そういうところが……ぷっ……ふ、ふふふ……」"

[[dialogue]]
speaker = "unk"
# （いや、本当に浅いな。どうなってんだ）
line = "（いや、本当に浅いな。どうなってんだ）"

[[dialogue]]
speaker = "レミカ"
# 「……と、とにかく。会長、これからよろしく」
line = "「……と、とにかく。会長、これからよろしく」"

[[dialogue]]
speaker = "unk"
# その沸点の低さでクール系アイドルは無理があるでしょ……と思わなくもなかったが、ともかくそうして愛戸レミカと知り合いになったのだった。
line = "その沸点の低さでクール系アイドルは無理があるでしょ……と思わなくもなかったが、ともかくそうして愛戸レミカと知り合いになったのだった。"
