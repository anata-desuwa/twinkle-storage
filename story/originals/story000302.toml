line = "「どこからお話しましょうか。本当は言っちゃいけないんですけど……説明する義務がありますよね……」"

[[dialogue]]
speaker = "ウェンディ"
# 「まず、私はウェンディ。ネビュラ所属の魔女で、組織の資金運用と、セドナ長官の補佐を担当しています」
line = "「まず、私はウェンディ。ネビュラ所属の魔女で、組織の資金運用と、セドナ長官の補佐を担当しています」"

[[dialogue]]
speaker = "ウェンディ"
# 「どうして私がモンスターを捕獲していたのかと言いますとですね……」
line = "「どうして私がモンスターを捕獲していたのかと言いますとですね……」"

[[dialogue]]
speaker = "ウェンディ"
# 「実際に戦ったのですから、リクリエの使徒アポロは当然ご存じでしょう」
line = "「実際に戦ったのですから、リクリエの使徒アポロは当然ご存じでしょう」"

[[dialogue]]
speaker = "ウェンディ"
# 「そして、彼女が使役する特殊なモンスターのことも」
line = "「そして、彼女が使役する特殊なモンスターのことも」"

[[dialogue]]
speaker = "ウェンディ"
# 「あなた方がモンスターと戦っている間、我々は秘密裏にこれを捕獲。改造してネビュラの戦力とする実験を行っていました」
line = "「あなた方がモンスターと戦っている間、我々は秘密裏にこれを捕獲。改造してネビュラの戦力とする実験を行っていました」"

[[dialogue]]
speaker = "ウェンディ"
# 「誤解はしないでください。これもリクリエに対抗するためです」
line = "「誤解はしないでください。これもリクリエに対抗するためです」"

[[dialogue]]
speaker = "ウェンディ"
# 「ネビュラは目的のためなら手段を選ばない。それだけのことです」
line = "「ネビュラは目的のためなら手段を選ばない。それだけのことです」"

[[dialogue]]
speaker = "unk"
# で、どうしてそのモンスターが街に？
line = "で、どうしてそのモンスターが街に？"

[[dialogue]]
speaker = "ウェンディ"
# 「うっ……！？　そ、それはですね……」
line = "「うっ……！？　そ、それはですね……」"

[[dialogue]]
speaker = "アイリーン"
# 「ねぇねぇ、ウェンディさん、今ヒマ？　チェスやろうよー」
line = "「ねぇねぇ、ウェンディさん、今ヒマ？　チェスやろうよー」"

[[dialogue]]
speaker = "ウェンディ"
# 「見ての通り仕事中です。関係会社の業績予測修正を出さないといけないので放っておいてください」
line = "「見ての通り仕事中です。関係会社の業績予測修正を出さないといけないので放っておいてください」"

[[dialogue]]
speaker = "アイリーン"
