line = "「む。アイリーンが意地悪な攻め方をするから悪いんです」"

[[dialogue]]
speaker = "アイリーン"
# 「だってウェンディさん、素直すぎて何したいか見え見えなんだもん。セドナさんとやったらボッコボコのメッタメタだよ？」
line = "「だってウェンディさん、素直すぎて何したいか見え見えなんだもん。セドナさんとやったらボッコボコのメッタメタだよ？」"

[[dialogue]]
speaker = "ウェンディ"
# 「うぐ……そんな直球に言わなくても……」
line = "「うぐ……そんな直球に言わなくても……」"

[[dialogue]]
speaker = "ウェンディ"
# （私の方がずっと年上なのに、ちゃんと計算してるのに、どうして勝てないんですか……）
line = "（私の方がずっと年上なのに、ちゃんと計算してるのに、どうして勝てないんですか……）"

