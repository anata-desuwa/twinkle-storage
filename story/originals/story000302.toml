[[dialogue]]
speaker = "ウェンディ"
# 「それにネビュラでモンスターを戦力化するにあたり、命令を聞くようにするほか、透明化や瞬間移動など特殊能力の追加も試みました」
line = "「それにネビュラでモンスターを戦力化するにあたり、命令を聞くようにするほか、透明化や瞬間移動など特殊能力の追加も試みました」"

