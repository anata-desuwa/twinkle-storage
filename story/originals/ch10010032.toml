[[dialogue]]
speaker = "unk"
# 第２話,ドレスの着こなし？,P
line = "第２話,ドレスの着こなし？,P"

[[dialogue]]
speaker = "フィオナ"
# 「行きますよ──サンバーストセレモニー！」
line = "「行きますよ──サンバーストセレモニー！」"

[[dialogue]]
speaker = "フィオナ"
# 「モンスター撃破。さすがにもう緋宮会長の敵ではありませんね」
line = "「モンスター撃破。さすがにもう緋宮会長の敵ではありませんね」"

[[dialogue]]
speaker = "フィオナ"
# 「訓練にお付き合いいただいてありがとうございました」
line = "「訓練にお付き合いいただいてありがとうございました」"

[[dialogue]]
speaker = "フィオナ"
# 「事故とはいえ、せっかく手に入れたウェディングドレスの戦闘服ですから。もっと上手く使いこなしたいと思いまして」
line = "「事故とはいえ、せっかく手に入れたウェディングドレスの戦闘服ですから。もっと上手く使いこなしたいと思いまして」"

[[dialogue]]
speaker = "フィオナ"
# 「でもトレーニング用のシミュレーターでは限界を感じますね。もっと上を目指せると思うんですけど……」
line = "「でもトレーニング用のシミュレーターでは限界を感じますね。もっと上を目指せると思うんですけど……」"

[[dialogue]]
speaker = "セーラ"
# 「あ、いたいたー。フィオナちゃん、新しい戦闘服でトレーニングしてたんだ？　真面目だねー」
line = "「あ、いたいたー。フィオナちゃん、新しい戦闘服でトレーニングしてたんだ？　真面目だねー」"

[[dialogue]]
speaker = "フィオナ"
# 「いえいえ。星徒会長なんですから、これくらいは当然です」
line = "「いえいえ。星徒会長なんですから、これくらいは当然です」"

[[dialogue]]
speaker = "セーラ"
# 「さっすがフィオナちゃん。でも──」
line = "「さっすがフィオナちゃん。でも──」"

[[dialogue]]
speaker = "フィオナ"
# 「でも？」
line = "「でも？」"

[[dialogue]]
speaker = "セーラ"
# 「ウェディングドレス着てるから、２人でイチャイチャしてるのかと思っちゃった♪」
line = "「ウェディングドレス着てるから、２人でイチャイチャしてるのかと思っちゃった♪」"

[[dialogue]]
speaker = "フィオナ"
# 「ひゃいっ！？」
line = "「ひゃいっ！？」"

[[dialogue]]
speaker = "セーラ"
# 「会長さんも、こ～んな綺麗なドレスのフィオナちゃんと２人きりだったら、ついつい見惚れちゃうよね～？」
line = "「会長さんも、こ～んな綺麗なドレスのフィオナちゃんと２人きりだったら、ついつい見惚れちゃうよね～？」"

[[dialogue]]
speaker = "unk"
# それはもちろん
line = "それはもちろん"

[[dialogue]]
speaker = "フィオナ"
# 「緋宮会長！？」
line = "「緋宮会長！？」"

[[dialogue]]
speaker = "unk"
# 本当はずっとイチャイチャしてたいです
line = "本当はずっとイチャイチャしてたいです"

[[dialogue]]
speaker = "フィオナ"
# 「ひのみやかいちょ～～～っ！！？」
line = "「ひのみやかいちょ～～～っ！！？」"

[[dialogue]]
speaker = "セーラ"
# 「あはは、はははっ！　会長さん正直すぎ！」
line = "「あはは、はははっ！　会長さん正直すぎ！」"

[[dialogue]]
speaker = "フィオナ"
# 「もう、セーラさんも緋宮会長もからかわないでください……」
line = "「もう、セーラさんも緋宮会長もからかわないでください……」"

[[dialogue]]
speaker = "セーラ"
# 「からかってなんかないって。好きな人とは一緒にいたいもんね～」
line = "「からかってなんかないって。好きな人とは一緒にいたいもんね～」"

[[dialogue]]
speaker = "セーラ"
# 「でもさ、使いこなすならやっぱり実戦が一番じゃない？　そのドレス、人前だと恥ずかしくなって、ぎこちなくなったりしちゃわない？」
line = "「でもさ、使いこなすならやっぱり実戦が一番じゃない？　そのドレス、人前だと恥ずかしくなって、ぎこちなくなったりしちゃわない？」"

[[dialogue]]
speaker = "フィオナ"
# 「そ、そんなことはないと思いますけど……」
line = "「そ、そんなことはないと思いますけど……」"

[[dialogue]]
speaker = "セーラ"
# 「おっと！　丁度いいところにモンスター！　うちらでやっちゃおっか♪」
line = "「おっと！　丁度いいところにモンスター！　うちらでやっちゃおっか♪」"

[[dialogue]]
speaker = "モンスター"
# 「イ～～～～～ッ！」
line = "「イ～～～～～ッ！」"

[[dialogue]]
speaker = "フィオナ"
# 「こ、こんな人の多いところでウェディングドレスなんて……」
line = "「こ、こんな人の多いところでウェディングドレスなんて……」"

[[dialogue]]
speaker = "セーラ"
# 「フィオナちゃん、やっぱり照れてる？」
line = "「フィオナちゃん、やっぱり照れてる？」"

[[dialogue]]
speaker = "フィオナ"
# 「て、照れてませんよ？　まだ慣れないだけで……」
line = "「て、照れてませんよ？　まだ慣れないだけで……」"

[[dialogue]]
speaker = "セーラ"
# 「じゃあうちは～──」
line = "「じゃあうちは～──」"

[[dialogue]]
speaker = "セーラ"
# 「バニーだぴょん♪」
line = "「バニーだぴょん♪」"

[[dialogue]]
speaker = "フィオナ"
# 「セーラさん！？」
line = "「セーラさん！？」"

[[dialogue]]
speaker = "セーラ"
# 「うちもバニーなんだから、フィオナちゃんもウェディングドレスぐらいで恥ずかしがっちゃダメっしょ～。ね、会長さん？」
line = "「うちもバニーなんだから、フィオナちゃんもウェディングドレスぐらいで恥ずかしがっちゃダメっしょ～。ね、会長さん？」"

[[dialogue]]
speaker = "フィオナ"
# 「あ、緋宮会長、セーラさんのバニーが魅力的なのはわかりますけど、そっちばっかり見ちゃダメですっ」
line = "「あ、緋宮会長、セーラさんのバニーが魅力的なのはわかりますけど、そっちばっかり見ちゃダメですっ」"

[[dialogue]]
speaker = "フィオナ"
# 「このドレスを着ている私は、あなたのものですから。あなたのためのドレスなんですから……」
line = "「このドレスを着ている私は、あなたのものですから。あなたのためのドレスなんですから……」"

[[dialogue]]
speaker = "フィオナ"
# 「ちゃんとドレスの私を見てください……ね？」
line = "「ちゃんとドレスの私を見てください……ね？」"

[[dialogue]]
speaker = "セーラ"
# 「きゃ～、フィオナちゃん大胆っ。うちまでちょっと顔熱くなっちゃった」
line = "「きゃ～、フィオナちゃん大胆っ。うちまでちょっと顔熱くなっちゃった」"

[[dialogue]]
speaker = "フィオナ"
# 「～～～～っ！？　こ、これはセーラさんがバニースーツを着るから……」
line = "「～～～～っ！？　こ、これはセーラさんがバニースーツを着るから……」"

[[dialogue]]
speaker = "unk"
# 俺が見てるのはずっとフィオナだけだよ
line = "俺が見てるのはずっとフィオナだけだよ"

[[dialogue]]
speaker = "フィオナ"
# 「──！？」
line = "「──！？」"

[[dialogue]]
speaker = "unk"
# フィオナのウェディングドレス、とっても綺麗だ
line = "フィオナのウェディングドレス、とっても綺麗だ"

[[dialogue]]
speaker = "フィオナ"
# 「緋宮会長……」
line = "「緋宮会長……」"

[[dialogue]]
speaker = "セーラ"
# 「おやおや、お熱いことで。お邪魔虫のうちは大人しくモンスターを撃ち落とすとしますかね～」
line = "「おやおや、お熱いことで。お邪魔虫のうちは大人しくモンスターを撃ち落とすとしますかね～」"

[[dialogue]]
speaker = "ユウリ"
# 「モンスターが出たって聞いてきたはいいが……フィオナと新星の会長さん、見つめ合って何やってんだ？」
line = "「モンスターが出たって聞いてきたはいいが……フィオナと新星の会長さん、見つめ合って何やってんだ？」"

[[dialogue]]
speaker = "ルリエル"
# 「つまりアレですね、バカップルってやつです！」
line = "「つまりアレですね、バカップルってやつです！」"

[[dialogue]]
speaker = "ソフィア"
# 「ルリ、ストレートに言い過ぎ。まぁフィオナ会長が幸せならＯＫですけど」
line = "「ルリ、ストレートに言い過ぎ。まぁフィオナ会長が幸せならＯＫですけど」"

[[dialogue]]
speaker = "フィオナ"
# 「みんな！？　えっと、これはその……これからモンスターを殲滅するところだったの！　ですよね、緋宮会長？」
line = "「みんな！？　えっと、これはその……これからモンスターを殲滅するところだったの！　ですよね、緋宮会長？」"

[[dialogue]]
speaker = "unk"
# そうそう、これから戦うところ
line = "そうそう、これから戦うところ"

[[dialogue]]
speaker = "ユウリ"
# 「ホントか～？　いかにも抱き合ったりキスとかしそうな雰囲気だったぞ」
line = "「ホントか～？　いかにも抱き合ったりキスとかしそうな雰囲気だったぞ」"

[[dialogue]]
speaker = "フィオナ"
# 「ううん、本当に今戦うところだったから！　今全力出すところだったから！　行きますよ、緋宮会長！」
line = "「ううん、本当に今戦うところだったから！　今全力出すところだったから！　行きますよ、緋宮会長！」"

[[dialogue]]
speaker = "フィオナ"
# 「サニティウィンド！！」
line = "「サニティウィンド！！」"

[[dialogue]]
speaker = "unk"
# そしてフィオナはモンスター相手に大暴れし、新たな戦闘服を見事にものにしたのであった──
line = "そしてフィオナはモンスター相手に大暴れし、新たな戦闘服を見事にものにしたのであった──"
