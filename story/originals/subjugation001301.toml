[[dialogue]]
speaker = "ミルフィー"
# 「あ、会長くん、こんにちは♪　今日はお買い物？」
line = "「あ、会長くん、こんにちは♪　今日はお買い物？」"

[[dialogue]]
speaker = "unk"
# そういうミルフィーも？
line = "そういうミルフィーも？"

[[dialogue]]
speaker = "ミルフィー"
# 「うん、マグダレナ様とヒヨちゃんも一緒なんだ」
line = "「うん、マグダレナ様とヒヨちゃんも一緒なんだ」"

[[dialogue]]
speaker = "マグダレナ"
# 「会長さま、ごきげんよう」
line = "「会長さま、ごきげんよう」"

[[dialogue]]
speaker = "ヒヨ"
# 「てやんでい、せっかく<ruby=あね>姐</ruby>さんとのお出かけだってぇのに、会長サンと出会っちまうたぁ幸先わるいぜ」
line = "「てやんでい、せっかく<ruby>姐<rt>あね</rt></ruby>さんとのお出かけだってぇのに、会長サンと出会っちまうたぁ幸先わるいぜ」"

[[dialogue]]
speaker = "ヒヨ"
# 「ハッ──！？　まさか会長サン、いくら姐さんがかわいいからって、後をつけてきたわけじゃねえだろうな？」
line = "「ハッ──！？　まさか会長サン、いくら姐さんがかわいいからって、後をつけてきたわけじゃねえだろうな？」"

[[dialogue]]
speaker = "ミルフィー"
# 「会長くんはそんなことしないよ！？　ていうか、かわいいとか、そんなことないってば……」
line = "「会長くんはそんなことしないよ！？　ていうか、かわいいとか、そんなことないってば……」"

[[dialogue]]
speaker = "ヒヨ"
# 「いいや、姐さんはめちゃくちゃかわいい！　えれぇべっぴんさんだ！　姐さんでもそこは譲れねえ！」
line = "「いいや、姐さんはめちゃくちゃかわいい！　えれぇべっぴんさんだ！　姐さんでもそこは譲れねえ！」"

[[dialogue]]
speaker = "ミルフィー"
# 「そ、そこまで言わなくても……もう、ヒヨちゃん頑固なんだから……」
line = "「そ、そこまで言わなくても……もう、ヒヨちゃん頑固なんだから……」"

[[dialogue]]
speaker = "マグダレナ"
# 「ふふ。ヒヨさまはミルフィーのことがお好きなのですね」
line = "「ふふ。ヒヨさまはミルフィーのことがお好きなのですね」"

[[dialogue]]
speaker = "ヒヨ"
# 「おうよ！　あたしは姐さんの一の舎弟だからな！」
line = "「おうよ！　あたしは姐さんの一の舎弟だからな！」"

[[dialogue]]
speaker = "ミルフィー"
# 「私たち、そういう関係だったんだ……」
line = "「私たち、そういう関係だったんだ……」"

[[dialogue]]
speaker = "unk"
# ミルフィーは俺とマトイのクラスの学級委員長で、守護天使《境界》のマグダレナを<ruby=まつ>祀</ruby>る一族の出身でもある。
line = "ミルフィーは俺とマトイのクラスの学級委員長で、守護天使《境界》のマグダレナを<ruby>祀<rt>まつ</rt></ruby>る一族の出身でもある。"

[[dialogue]]
speaker = "unk"
# ヒヨはミルフィーの部活の後輩で、ミルフィーのことをとても尊敬して慕っている。
line = "ヒヨはミルフィーの部活の後輩で、ミルフィーのことをとても尊敬して慕っている。"

[[dialogue]]
speaker = "ミルフィー"
# 「マグダレナ様、何かご不便はありませんか？　私になんなりとお申し付けください」
line = "「マグダレナ様、何かご不便はありませんか？　私になんなりとお申し付けください」"

[[dialogue]]
speaker = "マグダレナ"
# 「いいえ、不便などしておりませんよ。いつもありがとう、ミルフィー」
line = "「いいえ、不便などしておりませんよ。いつもありがとう、ミルフィー」"

[[dialogue]]
speaker = "ヒヨ"
# 「姐さんはほんとマグダレナさまが好きだなぁ……」
line = "「姐さんはほんとマグダレナさまが好きだなぁ……」"

[[dialogue]]
speaker = "ミルフィー"
# 「マグダレナ様は三界の境界を守るお方だから。マグダレナ様が存在しなければ、天界も人間界も魔界も滅んじゃうんだよ」
line = "「マグダレナ様は三界の境界を守るお方だから。マグダレナ様が存在しなければ、天界も人間界も魔界も滅んじゃうんだよ」"

[[dialogue]]
speaker = "ミルフィー"
# 「リクリエのせいとはいえ、マグダレナ様と直接お会いできるなんて、本当に光栄なことなんだ」
line = "「リクリエのせいとはいえ、マグダレナ様と直接お会いできるなんて、本当に光栄なことなんだ」"

[[dialogue]]
speaker = "ヒヨ"
# 「ふ～む、そういうもんなのか。ま、あたしも頑張って姐さんにもっと頼られるように──」
line = "「ふ～む、そういうもんなのか。ま、あたしも頑張って姐さんにもっと頼られるように──」"

[[dialogue]]
speaker = "ヒヨ"
# 「空が変わった！？　例のリクリエの使徒の──いや、あんときはもっとふざけた感じだったよな。どうなってやがんだ？」
line = "「空が変わった！？　例のリクリエの使徒の──いや、あんときはもっとふざけた感じだったよな。どうなってやがんだ？」"

[[dialogue]]
speaker = "マグダレナ"
# 「まさかこれは……」
line = "「まさかこれは……」"

[[dialogue]]
speaker = "ミルフィー"
# 「マグダレナ様！」
line = "「マグダレナ様！」"

[[dialogue]]
speaker = "マグダレナ"
# 「はい、恐れていたことが起きてしまったようです」
line = "「はい、恐れていたことが起きてしまったようです」"

[[dialogue]]
speaker = "unk"
# ！
line = "！"

[[dialogue]]
speaker = "ヘレナ"
# 『魔王よ。至急九浄の屋敷に来てくれるか？　一分一秒が惜しい』
line = "『魔王よ。至急九浄の屋敷に来てくれるか？　一分一秒が惜しい』"

[[dialogue]]
speaker = "ヘレナ"
# 『……マグダレナたちも一緒にいる？　それは非常に都合がいいな。一緒に来てもらおう』
line = "『……マグダレナたちも一緒にいる？　それは非常に都合がいいな。一緒に来てもらおう』"

[[dialogue]]
speaker = "ヴィーナス"
# 「みんないらっしゃい！　ようこそ九浄家へ！」
line = "「みんないらっしゃい！　ようこそ九浄家へ！」"

[[dialogue]]
speaker = "ミルフィー"
# 「お、お邪魔します。ここが九浄家……噂には聞いてたけどすごいね」
line = "「お、お邪魔します。ここが九浄家……噂には聞いてたけどすごいね」"

[[dialogue]]
speaker = "ヒヨ"
# 「ひょえ～……ギラギラで目ん玉潰れそうだぜぇ……」
line = "「ひょえ～……ギラギラで目ん玉潰れそうだぜぇ……」"

[[dialogue]]
speaker = "マトイ"
# 「あ、委員長も来たんだ。私みたいな庶民には豪華すぎるっていうか、ちょっと場違いな気がしたから、同じクラスの人が増えてちょっと安心したよ～」
line = "「あ、委員長も来たんだ。私みたいな庶民には豪華すぎるっていうか、ちょっと場違いな気がしたから、同じクラスの人が増えてちょっと安心したよ～」"

[[dialogue]]
speaker = "ミルフィー"
# 「はは……別にそんなことで心細くならなくてもいいと思うけど。でもマトイさんもいるってことは……」
line = "「はは……別にそんなことで心細くならなくてもいいと思うけど。でもマトイさんもいるってことは……」"

[[dialogue]]
speaker = "アナ"
# 「私もいます。九浄家のお茶請けのお菓子、とっても美味しいです」
line = "「私もいます。九浄家のお茶請けのお菓子、とっても美味しいです」"

[[dialogue]]
speaker = "サーシャ"
# 「ふふふ、先にお菓子頂いてるわ～」
line = "「ふふふ、先にお菓子頂いてるわ～」"

[[dialogue]]
speaker = "フィオナ"
# 「遅くなってすみません。流星星徒会５名、到着しました」
line = "「遅くなってすみません。流星星徒会５名、到着しました」"

[[dialogue]]
speaker = "ソフィア"
# 「新星学園の星徒会は先に来ていたようですね、こんにちは。……姉さん、くつろぎ過ぎです」
line = "「新星学園の星徒会は先に来ていたようですね、こんにちは。……姉さん、くつろぎ過ぎです」"

[[dialogue]]
speaker = "ユウリ"
# 「なんだ、両星徒会揃い踏みってわけか。わざわざ呼び出すなんてどんな用件だ？」
line = "「なんだ、両星徒会揃い踏みってわけか。わざわざ呼び出すなんてどんな用件だ？」"

[[dialogue]]
speaker = "ルリエル"
# 「もしかして祝勝会でしょうか？　ワクワク」
line = "「もしかして祝勝会でしょうか？　ワクワク」"

[[dialogue]]
speaker = "セーラ"
# 「いや～、そんな雰囲気じゃないっしょ。ほら、あっち見てよ」
line = "「いや～、そんな雰囲気じゃないっしょ。ほら、あっち見てよ」"

[[dialogue]]
speaker = "マトイ"
# 「守護天使と……イクシーさん？　なんだか険しい表情だけど……」
line = "「守護天使と……イクシーさん？　なんだか険しい表情だけど……」"

[[dialogue]]
speaker = "ヘレナ"
# 「よく集まってくれた、両校の星徒会役員たち。そして守護天使の諸君」
line = "「よく集まってくれた、両校の星徒会役員たち。そして守護天使の諸君」"

[[dialogue]]
speaker = "ヘレナ"
# 「用件は他でもない。──世界の危機だ」
line = "「用件は他でもない。──世界の危機だ」"

[[dialogue]]
speaker = "フィオナ"
# 「！」
line = "「！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ヘレナちゃん、どういうこと？　アポロは正気に戻ったし、ギエルも倒したんだから、リクリエは一旦収まったんじゃないの？」
line = "「ヘレナちゃん、どういうこと？　アポロは正気に戻ったし、ギエルも倒したんだから、リクリエは一旦収まったんじゃないの？」"

[[dialogue]]
speaker = "ヘレナ"
# 「ああそうだ。世界の危機は確かに退けられた。だが言うだろう、一難去ってまた一難と」
line = "「ああそうだ。世界の危機は確かに退けられた。だが言うだろう、一難去ってまた一難と」"

[[dialogue]]
speaker = "ヘレナ"
# 「新たな危機が迫っている。正確には、以前から進行していた危険が顕在化したわけだがな」
line = "「新たな危機が迫っている。正確には、以前から進行していた危険が顕在化したわけだがな」"

[[dialogue]]
speaker = "マグダレナ"
# 「私たちからご説明しましょう。皆さま、私たち守護天使が堕天使となった経緯は記憶しておられるでしょうか？」
line = "「私たちからご説明しましょう。皆さま、私たち守護天使が堕天使となった経緯は記憶しておられるでしょうか？」"

[[dialogue]]
speaker = "フィオナ"
# 「はい、覚えています。リクリエの瘴気に蝕まれていたのですよね」
line = "「はい、覚えています。リクリエの瘴気に蝕まれていたのですよね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうそう、守護天使たちの本体は魔界に封印されて──って、本体封印されたままじゃない！？」
line = "「そうそう、守護天使たちの本体は魔界に封印されて──って、本体封印されたままじゃない！？」"

[[dialogue]]
speaker = "マグダレナ"
# 「そうなのです。私たち守護天使が封印されたままでは、世界を運営する役目を果たせません」
line = "「そうなのです。私たち守護天使が封印されたままでは、世界を運営する役目を果たせません」"

[[dialogue]]
speaker = "アルモタヘル"
# 「以前の危機はリクリエによる破壊であったが、今回は世界の機能不全というわけだ」
line = "「以前の危機はリクリエによる破壊であったが、今回は世界の機能不全というわけだ」"

[[dialogue]]
speaker = "フィオナ"
# 「機能不全……具体的にはどうなるのですか？」
line = "「機能不全……具体的にはどうなるのですか？」"

[[dialogue]]
speaker = "アルモタヘル"
# 「そうだな……マグダレナがわかりやすいか。マグダレナは三界の境界を司る──すなわち天界・人間界・魔界を隔てるのが役目だ」
line = "「そうだな……マグダレナがわかりやすいか。マグダレナは三界の境界を司る──すなわち天界・人間界・魔界を隔てるのが役目だ」"

[[dialogue]]
speaker = "マグダレナ"
# 「その権能が失われれば、三界が混じり合い、天界が人間界の空から落ちてきます。人間界も崩落して魔界に落下していくでしょう」
line = "「その権能が失われれば、三界が混じり合い、天界が人間界の空から落ちてきます。人間界も崩落して魔界に落下していくでしょう」"

[[dialogue]]
speaker = "マトイ"
# 「何それ！？　絶対世界滅んじゃうじゃないですか！？」
line = "「何それ！？　絶対世界滅んじゃうじゃないですか！？」"

[[dialogue]]
speaker = "セーラ"
# 「天界・人間界・魔界は地続きで繋がってるわけじゃないから、普通はそうならないけど……なるほどー、マグダレナさんがいないとそうなっちゃうんだ」
line = "「天界・人間界・魔界は地続きで繋がってるわけじゃないから、普通はそうならないけど……なるほどー、マグダレナさんがいないとそうなっちゃうんだ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「でも今まで何とかなってたんでしょ？　どうして急にヤバくなっちゃったのよ？」
line = "「でも今まで何とかなってたんでしょ？　どうして急にヤバくなっちゃったのよ？」"

[[dialogue]]
speaker = "イクシリオン"
# 「いえ、今までは何とか持ちこたえている状態だったのです」
line = "「いえ、今までは何とか持ちこたえている状態だったのです」"

[[dialogue]]
speaker = "イクシリオン"
# 「専門の職を持つ者もいますが、天界の多くの天使たちの仕事は祈ることです。天界の各地にある守護天使様の神殿で祈りを捧げることで、その権能を補佐してきました」
line = "「専門の職を持つ者もいますが、天界の多くの天使たちの仕事は祈ることです。天界の各地にある守護天使様の神殿で祈りを捧げることで、その権能を補佐してきました」"

[[dialogue]]
speaker = "ミルフィー"
# 「私やイクシーちゃんは、マグダレナ様やアルモタヘル様の信仰の総本山……一番大きな神殿を管理する一族なの」
line = "「私やイクシーちゃんは、マグダレナ様やアルモタヘル様の信仰の総本山……一番大きな神殿を管理する一族なの」"

[[dialogue]]
speaker = "ヒヨ"
# 「へぇ、神社でいうと<ruby=ごほんしゃ>御本社</ruby>ってわけか」
line = "「へぇ、神社でいうと<ruby>御本社<rt>ごほんしゃ</rt></ruby>ってわけか」"

[[dialogue]]
speaker = "イクシリオン"
# 「守護天使様がご不在の間も、一般の天使たちが世界を支えてきましたが……さすがに限界が訪れました。このままでは世界が終わります」
line = "「守護天使様がご不在の間も、一般の天使たちが世界を支えてきましたが……さすがに限界が訪れました。このままでは世界が終わります」"

[[dialogue]]
speaker = "ルリエル"
# 「ほえ～……確かに大人の天使が神殿によく行くな～と思ってましたけど、なんとなく祈ってるだけだと思ってました！」
line = "「ほえ～……確かに大人の天使が神殿によく行くな～と思ってましたけど、なんとなく祈ってるだけだと思ってました！」"

[[dialogue]]
speaker = "ミルフィー"
# 「天使ってたいてい大らかだから、あんまりその辺気にしないんだよね……」
line = "「天使ってたいてい大らかだから、あんまりその辺気にしないんだよね……」"

[[dialogue]]
speaker = "ヒヨ"
# 「てやんでい！　つーことは、さっさと守護天使の本体を解放しないといけねえじゃねえか！　この前世界を守ったばっかだってのに、結局世界が終わっちまう！」
line = "「てやんでい！　つーことは、さっさと守護天使の本体を解放しないといけねえじゃねえか！　この前世界を守ったばっかだってのに、結局世界が終わっちまう！」"

[[dialogue]]
speaker = "ミルフィー"
# 「でも守護天使様の本体は魔界に囚われている……しかも魔界のどこに封印されてるかもわからないし……」
line = "「でも守護天使様の本体は魔界に囚われている……しかも魔界のどこに封印されてるかもわからないし……」"

[[dialogue]]
speaker = "ヒヨ"
# 「じゃあ詰みじゃねえか！？」
line = "「じゃあ詰みじゃねえか！？」"

[[dialogue]]
speaker = "ヘレナ"
# 「大交流の時期もまだ遠い。そもそも、<ruby=ラーゴ・シエロ>鏡界の湖</ruby>を通れたとして今からでは間に合わんだろう。そこで──」
line = "「大交流の時期もまだ遠い。そもそも、<ruby>鏡界の湖<rt>ラーゴ・シエロ</rt></ruby>を通れたとして今からでは間に合わんだろう。そこで──」"

[[dialogue]]
speaker = "クラウディア"
# 『余らの出番というわけだ！』
line = "『余らの出番というわけだ！』"

[[dialogue]]
speaker = "ヴィーナス"
# 「！？　その声は──」
line = "「！？　その声は──」"
