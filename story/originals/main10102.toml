[[dialogue]]
speaker = "unk"
# 第２話,九浄ヴィーナスの直感,B
line = "第２話,九浄ヴィーナスの直感,B"

[[dialogue]]
speaker = "unk"
# それは昨年度の終わり。２年生に進級する直前のこと。
line = "それは昨年度の終わり。２年生に進級する直前のこと。"

[[dialogue]]
speaker = "ヴィーナス"
# 「あなたよ！　絶対にあなただわ！」
line = "「あなたよ！　絶対にあなただわ！」"

[[dialogue]]
speaker = "マトイ"
# 「ふえっ！？」
line = "「ふえっ！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ビビビーッとキたわ！　ちょっと来て！」
line = "「ビビビーッとキたわ！　ちょっと来て！」"

[[dialogue]]
speaker = "マトイ"
# 「あの、私……って強ぉ！　めちゃくちゃ力強ーい！」
line = "「あの、私……って強ぉ！　めちゃくちゃ力強ーい！」"

[[dialogue]]
speaker = "マトイ"
# 「あの……九浄ヴィーナスさん、ですよね？　私に何か――」
line = "「あの……九浄ヴィーナスさん、ですよね？　私に何か――」"

[[dialogue]]
speaker = "ヴィーナス"
# 「話というのは他でもないわ！」
line = "「話というのは他でもないわ！」"

[[dialogue]]
speaker = "マトイ"
# 「わわっ！　ご、ごめんなさい！」
line = "「わわっ！　ご、ごめんなさい！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええっ！？　話も聞かない内から断るなんてダメよ！」
line = "「ええっ！？　話も聞かない内から断るなんてダメよ！」"

[[dialogue]]
speaker = "マトイ"
# 「何も身に覚えがないんです。校則違反があったなら、今日中に直しますから──んん？　断る？」
line = "「何も身に覚えがないんです。校則違反があったなら、今日中に直しますから──んん？　断る？」"

[[dialogue]]
speaker = "マトイ"
# 「ヴィーナスさん、話って……なんです？」
line = "「ヴィーナスさん、話って……なんです？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「コホン……話というのは他でもないわ」
line = "「コホン……話というのは他でもないわ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あなた、星徒会に入らない！？」
line = "「あなた、星徒会に入らない！？」"

[[dialogue]]
speaker = "マトイ"
# 「ああ、なるほど。星徒会ですか。そうならそうと最初から言ってくれればいいのに──って」
line = "「ああ、なるほど。星徒会ですか。そうならそうと最初から言ってくれればいいのに──って」"

[[dialogue]]
speaker = "マトイ"
# 「えっ！？　えっ！？　ええぇーっ！？　星徒会って、その……星徒会ですか！？」
line = "「えっ！？　えっ！？　ええぇーっ！？　星徒会って、その……星徒会ですか！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうよ。校則違反なんかじゃないわ」
line = "「そうよ。校則違反なんかじゃないわ」"

[[dialogue]]
speaker = "マトイ"
# （確かヴィーナスさんは現会長のサーシャさんから、次期星徒会長に指名されたって噂だけど……）
line = "（確かヴィーナスさんは現会長のサーシャさんから、次期星徒会長に指名されたって噂だけど……）"

[[dialogue]]
speaker = "マトイ"
# （その新しい星徒会のメンバーに私を指名？　いやいやまさか、指折りの実力者で構成されてる星徒会に私が指名されるわけないでしょ）
line = "（その新しい星徒会のメンバーに私を指名？　いやいやまさか、指折りの実力者で構成されてる星徒会に私が指名されるわけないでしょ）"

[[dialogue]]
speaker = "マトイ"
# 「ひ、人違いじゃないですか？　でなければ、何かの間違いじゃないですか？」
line = "「ひ、人違いじゃないですか？　でなければ、何かの間違いじゃないですか？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そんなわけないじゃない。私がヘンテコな間違いをしでかすと思う？」
line = "「そんなわけないじゃない。私がヘンテコな間違いをしでかすと思う？」"

[[dialogue]]
speaker = "マトイ"
# 「それは……こんな大事なこと、ヴィーナスさんがミスをするとも思えませんけど……」
line = "「それは……こんな大事なこと、ヴィーナスさんがミスをするとも思えませんけど……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「でしょう！？　私はミスなんてしないの！」
line = "「でしょう！？　私はミスなんてしないの！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ピーンと来たのよ！　あなたが星徒会に入ってくれたら、新星学園は今よりもっともっともーっと良くなるって！」
line = "「ピーンと来たのよ！　あなたが星徒会に入ってくれたら、新星学園は今よりもっともっともーっと良くなるって！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そういうわけだから、星徒会に入りなさい！」
line = "「そういうわけだから、星徒会に入りなさい！」"

[[dialogue]]
speaker = "マトイ"
# （う……そんなに私のこと……見込んでくれてるの？）
line = "（う……そんなに私のこと……見込んでくれてるの？）"

[[dialogue]]
speaker = "マトイ"
# （私だって星徒会に憧れを抱いてなかったわけじゃないし……そもそもあのヴィーナスさんからの誘いを断るなんておこがましい真似できないよ）
line = "（私だって星徒会に憧れを抱いてなかったわけじゃないし……そもそもあのヴィーナスさんからの誘いを断るなんておこがましい真似できないよ）"

[[dialogue]]
speaker = "マトイ"
# （よしっ！　だったらもう、ここは覚悟を決めて――）
line = "（よしっ！　だったらもう、ここは覚悟を決めて――）"

[[dialogue]]
speaker = "マトイ"
# 「あの……ヴィーナスさんがそう言うんでしたら」
line = "「あの……ヴィーナスさんがそう言うんでしたら」"

[[dialogue]]
speaker = "ヴィーナス"
# 「決まりね！　よろしく、マトイ！」
line = "「決まりね！　よろしく、マトイ！」"

[[dialogue]]
speaker = "マトイ"
# 「え……私の名前……ご存じなんですか？」
line = "「え……私の名前……ご存じなんですか？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「同級生なんだから、当たり前でしょ。それともフルネームで呼ばれる方が好きかしら、詠野マトイ？」
line = "「同級生なんだから、当たり前でしょ。それともフルネームで呼ばれる方が好きかしら、詠野マトイ？」"

[[dialogue]]
speaker = "マトイ"
# 「い、いえ、名前だけで。マトイで結構です」
line = "「い、いえ、名前だけで。マトイで結構です」"

[[dialogue]]
speaker = "マトイ"
# 「よ、よろしくお願いします。九浄ヴィーナスさん……いえ、ヴィーナス会長」
line = "「よ、よろしくお願いします。九浄ヴィーナスさん……いえ、ヴィーナス会長」"

[[dialogue]]
speaker = "学生Ａ"
# 「聞いた、聞いた？　ヴィーナスさんが直々に星徒会役員を選出したんだって！」
line = "「聞いた、聞いた？　ヴィーナスさんが直々に星徒会役員を選出したんだって！」"

[[dialogue]]
speaker = "学生Ｂ"
# 「ウソッ！　誰、誰？」
line = "「ウソッ！　誰、誰？」"

[[dialogue]]
speaker = "学生Ａ"
# 「えーっと……なんていったっけ……名前は思い出せないんだけど」
line = "「えーっと……なんていったっけ……名前は思い出せないんだけど」"

[[dialogue]]
speaker = "学生Ｂ"
# 「そんな凄い子なのに、影が薄いの？」
line = "「そんな凄い子なのに、影が薄いの？」"

[[dialogue]]
speaker = "学生Ａ"
# 「どうして、そんな華のない人をヴィーナスさんは選んだのかしら」
line = "「どうして、そんな華のない人をヴィーナスさんは選んだのかしら」"

[[dialogue]]
speaker = "マトイ"
# 「……すみません。影が薄くて、華がなくて」
line = "「……すみません。影が薄くて、華がなくて」"

[[dialogue]]
speaker = "学生Ａ"
# 「きゃっ！？　ご、ごめん！！」
line = "「きゃっ！？　ご、ごめん！！」"

[[dialogue]]
speaker = "マトイ"
# （そうだよね――私なんてヴィーナス会長みたいに華も強さもない、平々凡々を絵に描いたような存在だし）
line = "（そうだよね――私なんてヴィーナス会長みたいに華も強さもない、平々凡々を絵に描いたような存在だし）"

[[dialogue]]
speaker = "マトイ"
# 「はぁ……ヴィーナスさんに選ばれて浮かれてたけど、やっぱり今からでも辞退した方が良いのかな」
line = "「はぁ……ヴィーナスさんに選ばれて浮かれてたけど、やっぱり今からでも辞退した方が良いのかな」"

[[dialogue]]
speaker = "マトイ"
# そんなことを思いながらも時間が過ぎて――
line = "そんなことを思いながらも時間が過ぎて――"

[[dialogue]]
speaker = "マトイ"
# 春休みが終わり、新１年生の入学式を間近に控えたある日のこと、晴れて会長になったヴィーナスさんから星徒会メンバー全員に召集がかかった。
line = "春休みが終わり、新１年生の入学式を間近に控えたある日のこと、晴れて会長になったヴィーナスさんから星徒会メンバー全員に召集がかかった。"

[[dialogue]]
speaker = "ヴィーナス"
# 「よく集まったわね！　新・星徒会メンバーのみんな！」
line = "「よく集まったわね！　新・星徒会メンバーのみんな！」"

[[dialogue]]
speaker = "サーシャ"
# 「と言ってもまだ３人だけどね～」
line = "「と言ってもまだ３人だけどね～」"

[[dialogue]]
speaker = "マトイ"
# 「がくがくがくぶるぶるぶる」
line = "「がくがくがくぶるぶるぶる」"

[[dialogue]]
speaker = "サーシャ"
# 「こうやっての顔合わせは初めてよね～。よろしくね、マトイちゃん」
line = "「こうやっての顔合わせは初めてよね～。よろしくね、マトイちゃん」"

[[dialogue]]
speaker = "マトイ"
# 「ふぁ、あっ、ひゃい！　よろしくお願いしまひゅ！」
line = "「ふぁ、あっ、ひゃい！　よろしくお願いしまひゅ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「緊張しているのかしら。マトイって人見知り？」
line = "「緊張しているのかしら。マトイって人見知り？」"

[[dialogue]]
speaker = "マトイ"
# 「そういうレベルの話じゃないんですよお！」
line = "「そういうレベルの話じゃないんですよお！」"

[[dialogue]]
speaker = "マトイ"
# （だってサーシャ前会長だよ？　瞳、おっきい……まつ毛長い……はぅ、見つめられるだけで召されちゃいそうだよ……）
line = "（だってサーシャ前会長だよ？　瞳、おっきい……まつ毛長い……はぅ、見つめられるだけで召されちゃいそうだよ……）"

[[dialogue]]
speaker = "サーシャ"
# 「それじゃあ、とりあえず……お茶でも淹れながらお話しましょう♪」
line = "「それじゃあ、とりあえず……お茶でも淹れながらお話しましょう♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「サーシャさん、とびっきり美味しいのをお願いするわ！」
line = "「サーシャさん、とびっきり美味しいのをお願いするわ！」"

[[dialogue]]
speaker = "サーシャ"
# 「お任せ～。ん～？　マトイちゃん、最近、あんまり眠れてないんじゃないかしら？」
line = "「お任せ～。ん～？　マトイちゃん、最近、あんまり眠れてないんじゃないかしら？」"

[[dialogue]]
speaker = "マトイ"
# 「えっ……はい、実は……」
line = "「えっ……はい、実は……」"

[[dialogue]]
speaker = "サーシャ"
# 「ふふ、やっぱり～。マトイちゃんには、リラックス効果のあるハーブティーを入れるわね～」
line = "「ふふ、やっぱり～。マトイちゃんには、リラックス効果のあるハーブティーを入れるわね～」"

[[dialogue]]
speaker = "マトイ"
# 「お願い、します……」
line = "「お願い、します……」"

[[dialogue]]
speaker = "マトイ"
# （美人なだけじゃない……優しいよぉ……浄化されるよぉ～！）
line = "（美人なだけじゃない……優しいよぉ……浄化されるよぉ～！）"

[[dialogue]]
speaker = "ヴィーナス"
# 「ずず……うん！　やっぱりサーシャさんの淹れてくれたお茶は美味しいわ！　頭も冴える！」
line = "「ずず……うん！　やっぱりサーシャさんの淹れてくれたお茶は美味しいわ！　頭も冴える！」"

[[dialogue]]
speaker = "サーシャ"
# 「ありがとう。それじゃヴィーナスちゃん、初めてのミーティングを始めましょう♪」
line = "「ありがとう。それじゃヴィーナスちゃん、初めてのミーティングを始めましょう♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええ、まずは各々の役職を決めましょう」
line = "「ええ、まずは各々の役職を決めましょう」"

[[dialogue]]
speaker = "ヴィーナス"
# 「当然、私は会長よ。異議ある者は挙手しなさい。正々堂々、迎え撃ってみせるわ！」
line = "「当然、私は会長よ。異議ある者は挙手しなさい。正々堂々、迎え撃ってみせるわ！」"

[[dialogue]]
speaker = "サーシャ"
# 「異議な～し」
line = "「異議な～し」"

[[dialogue]]
speaker = "マトイ"
# 「異議、ありません」
line = "「異議、ありません」"

[[dialogue]]
speaker = "ヴィーナス"
# 「次に、マトイは……書記ね！」
line = "「次に、マトイは……書記ね！」"

[[dialogue]]
speaker = "マトイ"
# 「書記、ですか？」
line = "「書記、ですか？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「マトイの字、この前見せてもらったけどすごく綺麗だったもの。書記程度じゃ役不足って言うなら、副会長のポジションもあるけど？」
line = "「マトイの字、この前見せてもらったけどすごく綺麗だったもの。書記程度じゃ役不足って言うなら、副会長のポジションもあるけど？」"

[[dialogue]]
speaker = "マトイ"
# 「とんでもないです！　書記で！　お願いします！」
line = "「とんでもないです！　書記で！　お願いします！」"

[[dialogue]]
speaker = "サーシャ"
# 「異議な～し」
line = "「異議な～し」"

[[dialogue]]
speaker = "ヴィーナス"
# 「実にスムーズね！　残るは会計と副会長だけど……どうしても人数が足りないわ」
line = "「実にスムーズね！　残るは会計と副会長だけど……どうしても人数が足りないわ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ひとまず、サーシャさんが会計と副会長を兼任するってことでいい？」
line = "「ひとまず、サーシャさんが会計と副会長を兼任するってことでいい？」"

[[dialogue]]
speaker = "サーシャ"
# 「あらあら、まあまあ。責任重大ね～」
line = "「あらあら、まあまあ。責任重大ね～」"

[[dialogue]]
speaker = "マトイ"
# 「さすがに１人に２つの役職を与えるのはどうかと思いますけど……」
line = "「さすがに１人に２つの役職を与えるのはどうかと思いますけど……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうなのよねー。前会長のサーシャさんでも、ちょっと重荷よねー」
line = "「そうなのよねー。前会長のサーシャさんでも、ちょっと重荷よねー」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ま、新入生も入ってくることだし、あとひとりは……そのうち見つけるわ、そのうち！」
line = "「ま、新入生も入ってくることだし、あとひとりは……そのうち見つけるわ、そのうち！」"

[[dialogue]]
speaker = "マトイ"
# 「大雑把すぎますよ……はぁ、大丈夫かなぁ」
line = "「大雑把すぎますよ……はぁ、大丈夫かなぁ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「というわけで、全て決定したわ！　初ミーティングの議事録、任せたわよ、マトイ！」
line = "「というわけで、全て決定したわ！　初ミーティングの議事録、任せたわよ、マトイ！」"

[[dialogue]]
speaker = "マトイ"
# 「はぁい……」
line = "「はぁい……」"
