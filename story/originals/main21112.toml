[[dialogue]]
speaker = "unk"
# 第１２話,混沌の力,B
line = "第１２話,混沌の力,B"

[[dialogue]]
speaker = "ドラケルス"
# 「グルルゥ！」
line = "「グルルゥ！」"

[[dialogue]]
speaker = "クロト"
# 「ディマイズブレイカー！」
line = "「ディマイズブレイカー！」"

[[dialogue]]
speaker = "ドラケルス"
# 「グラァアア………ッ」
line = "「グラァアア………ッ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「今ので機械型モンスターは最後ね！　でも神殿はまだ動いている……梨緒たちはどうなったのかしら？」
line = "「今ので機械型モンスターは最後ね！　でも神殿はまだ動いている……梨緒たちはどうなったのかしら？」"

[[dialogue]]
speaker = "ベアトリス"
# 「会長さーん！　ヴィーナスさーん！」
line = "「会長さーん！　ヴィーナスさーん！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「この声は……ベアトリスね！」
line = "「この声は……ベアトリスね！」"

[[dialogue]]
speaker = "unk"
# 神殿の中から、選挙管理委員会の３人が飛んでくる。
line = "神殿の中から、選挙管理委員会の３人が飛んでくる。"

[[dialogue]]
speaker = "unk"
# そしてもう１人──
line = "そしてもう１人──"

[[dialogue]]
speaker = "ジグ"
# 「初めまして……は違うかな」
line = "「初めまして……は違うかな」"

[[dialogue]]
speaker = "クロト"
# 「仮面をしてないということは、正気に戻ったんだな？」
line = "「仮面をしてないということは、正気に戻ったんだな？」"

[[dialogue]]
speaker = "ジグ"
# 「ああ。改めて名乗ろう、私はレナーテ・Ｚ・サイフリート。ベガの星騎士だ」
line = "「ああ。改めて名乗ろう、私はレナーテ・Ｚ・サイフリート。ベガの星騎士だ」"

[[dialogue]]
speaker = "ジグ"
# 「これからは君たちと共に<ruby=リクリエ>厄災</ruby>と戦うよ。私を弄んだ者への復讐も込みでね」
line = "「これからは君たちと共に<ruby>厄災<rt>リクリエ</rt></ruby>と戦うよ。私を弄んだ者への復讐も込みでね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「梨緒たちがやってくれたのね！」
line = "「梨緒たちがやってくれたのね！」"

[[dialogue]]
speaker = "梨緒"
# 「なんとか……な。ベアトとナターシャにはまた助けられた」
line = "「なんとか……な。ベアトとナターシャにはまた助けられた」"

[[dialogue]]
speaker = "ベアトリス"
# 「梨緒ちゃん、かっこよかった！」
line = "「梨緒ちゃん、かっこよかった！」"

[[dialogue]]
speaker = "ナターシャ"
# 「いやー、ほんとヤバかった。ベアトが治療してくれなかったら死んでたよ」
line = "「いやー、ほんとヤバかった。ベアトが治療してくれなかったら死んでたよ」"

[[dialogue]]
speaker = "ジグ"
# 「私がリクリエの使徒として、君たちにしたことを謝罪する。もちろんその咎も受けよう」
line = "「私がリクリエの使徒として、君たちにしたことを謝罪する。もちろんその咎も受けよう」"

[[dialogue]]
speaker = "ジグ"
# 「だがその前にやるべきことがある」
line = "「だがその前にやるべきことがある」"

[[dialogue]]
speaker = "クロト"
# 「神殿の中はどうなったんだ？　今の状況は？」
line = "「神殿の中はどうなったんだ？　今の状況は？」"

[[dialogue]]
speaker = "ジグ"
# 「神殿の移動システムは停止させた。だが質量の大きさから、神殿はまだ聖庭園に近づき続けている」
line = "「神殿の移動システムは停止させた。だが質量の大きさから、神殿はまだ聖庭園に近づき続けている」"

[[dialogue]]
speaker = "クロト"
# 「つまりこの神殿を物理的に止める必要があるのか……」
line = "「つまりこの神殿を物理的に止める必要があるのか……」"

[[dialogue]]
speaker = "クロト"
# （これだけ巨大な建造物を、本当に止めることが可能なのか？）
line = "（これだけ巨大な建造物を、本当に止めることが可能なのか？）"

[[dialogue]]
speaker = "クロト"
# （破壊するだけでも困難だが、傷つけずに止めるのは、破壊よりも何倍も難しい……）
line = "（破壊するだけでも困難だが、傷つけずに止めるのは、破壊よりも何倍も難しい……）"

[[dialogue]]
speaker = "メルエル"
# 「会長くん！」
line = "「会長くん！」"

[[dialogue]]
speaker = "クロト"
# 「メルエル！」
line = "「メルエル！」"

[[dialogue]]
speaker = "メルエル"
# 「聖庭園の住民の避難は終わったよ！」
line = "「聖庭園の住民の避難は終わったよ！」"

[[dialogue]]
speaker = "メルエル"
# 「現地で聖庭園の空中島自体を移動させることはできないかって、試行錯誤してたんだけど……それはちょっと難しいみたい」
line = "「現地で聖庭園の空中島自体を移動させることはできないかって、試行錯誤してたんだけど……それはちょっと難しいみたい」"

[[dialogue]]
speaker = "メルエル"
# 「ただ、破壊するだけだったらできるかもって！　ケイティお姉ちゃんたち、衛兵隊の人にも協力をお願いしてきたよ！」
line = "「ただ、破壊するだけだったらできるかもって！　ケイティお姉ちゃんたち、衛兵隊の人にも協力をお願いしてきたよ！」"

[[dialogue]]
speaker = "メルエル"
# 「だけどその前に……」
line = "「だけどその前に……」"

[[dialogue]]
speaker = "unk"
# メルエルが手のひら大の宝玉を差し出す。
line = "メルエルが手のひら大の宝玉を差し出す。"

[[dialogue]]
speaker = "unk"
# 透き通る宝玉の中には、小さな文様が刻まれていた。
line = "透き通る宝玉の中には、小さな文様が刻まれていた。"

[[dialogue]]
speaker = "メルエル"
# 「これがアルケインコードが刻まれた秘宝だよ」
line = "「これがアルケインコードが刻まれた秘宝だよ」"

[[dialogue]]
speaker = "メルエル"
# 「魔王の子孫だからかな、宝玉に触れたら、これにどんなアルケインコードが刻まれているか分かったの」
line = "「魔王の子孫だからかな、宝玉に触れたら、これにどんなアルケインコードが刻まれているか分かったの」"

[[dialogue]]
speaker = "メルエル"
# 「コードの名は──アルケインカオスクエーサー」
line = "「コードの名は──アルケインカオスクエーサー」"

[[dialogue]]
speaker = "メルエル"
# 「このアルケインコードは、魔王という器が取り込んでしまった異物を、自分の力に変換する術式」
line = "「このアルケインコードは、魔王という器が取り込んでしまった異物を、自分の力に変換する術式」"

[[dialogue]]
speaker = "メルエル"
# 「初代魔王ラクシスさんも、その身に受けた多くの毒や瘴気に侵されて、浄化の方法を模索してたんだね……」
line = "「初代魔王ラクシスさんも、その身に受けた多くの毒や瘴気に侵されて、浄化の方法を模索してたんだね……」"

[[dialogue]]
speaker = "クロト"
# 「メルエル、その話いったいどこで……！？」
line = "「メルエル、その話いったいどこで……！？」"

[[dialogue]]
speaker = "メルエル"
# 「あっ、えっと……そういう記録も、宝玉の中に収められてたみたい。アルケインコードの情報と一緒に頭の中に入ってきたんだ」
line = "「あっ、えっと……そういう記録も、宝玉の中に収められてたみたい。アルケインコードの情報と一緒に頭の中に入ってきたんだ」"

[[dialogue]]
speaker = "メルエル"
# 「あっ、初代魔王のラクシスさんって……つまり会長くんの……」
line = "「あっ、初代魔王のラクシスさんって……つまり会長くんの……」"

[[dialogue]]
speaker = "メルエル"
# 「ううん、なんでもない！　今は昔話をしてる場合じゃないもんね！」
line = "「ううん、なんでもない！　今は昔話をしてる場合じゃないもんね！」"

[[dialogue]]
speaker = "メルエル"
# 「それでね！　このアルケインコードは、ラクシスさんの頃にはまだなくて、天界に広がった魔王の子孫たちが完成させたものみたい！」
line = "「それでね！　このアルケインコードは、ラクシスさんの頃にはまだなくて、天界に広がった魔王の子孫たちが完成させたものみたい！」"

[[dialogue]]
speaker = "メルエル"
# 「だからこれは、会長くんに使ってもらうためのものなんだよ！」
line = "「だからこれは、会長くんに使ってもらうためのものなんだよ！」"

[[dialogue]]
speaker = "クロト"
# 「ありがとう、メルエル。使わせてもらうよ」
line = "「ありがとう、メルエル。使わせてもらうよ」"

[[dialogue]]
speaker = "unk"
# メルエルが持つ宝玉に触れると、アルケインコードの術式が頭の中に流れ込んでくる。
line = "メルエルが持つ宝玉に触れると、アルケインコードの術式が頭の中に流れ込んでくる。"

[[dialogue]]
speaker = "クロト"
# （ラクシスを苦しめていた浸食は、今の俺の状況とは異なる……）
line = "（ラクシスを苦しめていた浸食は、今の俺の状況とは異なる……）"

[[dialogue]]
speaker = "クロト"
# （果たしてこの力が、リクリエの力を取り込んだ今の俺に適応できるかどうか……）
line = "（果たしてこの力が、リクリエの力を取り込んだ今の俺に適応できるかどうか……）"

[[dialogue]]
speaker = "ヴィーナス"
# 「どう、クロト！？　新しいアルケインコードは、ちゃんと使えそう……？」
line = "「どう、クロト！？　新しいアルケインコードは、ちゃんと使えそう……？」"

[[dialogue]]
speaker = "クロト"
# 「……！！　ああ、行けそうだ！」
line = "「……！！　ああ、行けそうだ！」"

[[dialogue]]
speaker = "クロト"
# 「このアルケインコードがあれば、俺の中のリクリエを恐れなくて済む……！」
line = "「このアルケインコードがあれば、俺の中のリクリエを恐れなくて済む……！」"

[[dialogue]]
speaker = "クロト"
# 「行くぞ……！　アルケインカオスクエーサー！！」
line = "「行くぞ……！　アルケインカオスクエーサー！！」"

[[dialogue]]
speaker = "クロト"
# （俺の中に渦巻くリクリエの力が、逆に俺を包み込んでいる……）
line = "（俺の中に渦巻くリクリエの力が、逆に俺を包み込んでいる……）"

[[dialogue]]
speaker = "クロト"
# （今まで感じていた痛みや苦しさは感じない。これなら……──ぐっ！？）
line = "（今まで感じていた痛みや苦しさは感じない。これなら……──ぐっ！？）"

[[dialogue]]
speaker = "unk"
# 自分の中で、練り上げていた力が反発し合い、弾かれるような感覚があった。
line = "自分の中で、練り上げていた力が反発し合い、弾かれるような感覚があった。"

[[dialogue]]
speaker = "unk"
# 神殿を受け止めるために『巨大な手』を作り出そうとしたが、今の俺にはそこまで精緻な力のコントロールはできないようだった。
line = "神殿を受け止めるために『巨大な手』を作り出そうとしたが、今の俺にはそこまで精緻な力のコントロールはできないようだった。"

[[dialogue]]
speaker = "クロト"
# 「だったら……！」
line = "「だったら……！」"

[[dialogue]]
speaker = "unk"
# イメージするのは、シンプルで巨大な盾。
line = "イメージするのは、シンプルで巨大な盾。"

[[dialogue]]
speaker = "unk"
# 己の中にある『世界を再構成する力』を顕現させ、その莫大なエネルギーで現象を掌握する。
line = "己の中にある『世界を再構成する力』を顕現させ、その莫大なエネルギーで現象を掌握する。"

[[dialogue]]
speaker = "クロト"
# 「カオスイージス！！」
line = "「カオスイージス！！」"

[[dialogue]]
speaker = "unk"
# 女神の神殿の進行方向に、数十メートル──いや１００メートルをゆうに超える巨大な盾が生まれた。
line = "女神の神殿の進行方向に、数十メートル──いや１００メートルをゆうに超える巨大な盾が生まれた。"

[[dialogue]]
speaker = "unk"
# 巨大な不可視の盾は、移動を続ける女神の神殿を受け止め、膨大な運動エネルギーを吸収する。
line = "巨大な不可視の盾は、移動を続ける女神の神殿を受け止め、膨大な運動エネルギーを吸収する。"

[[dialogue]]
speaker = "unk"
# しばらくの間、力と力がせめぎ合うような地響きが続いたが……やがて女神の神殿は、聖庭園に到着する前に完全に停止した。
line = "しばらくの間、力と力がせめぎ合うような地響きが続いたが……やがて女神の神殿は、聖庭園に到着する前に完全に停止した。"

[[dialogue]]
speaker = "メルエル"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "メルエル"
# 「って、ぽけっとしている場合じゃないよね！　どうなっちゃったの！？」
line = "「って、ぽけっとしている場合じゃないよね！　どうなっちゃったの！？」"

[[dialogue]]
speaker = "ナターシャ"
# 「神殿と聖庭園の距離を算出……うん、星術を使って計測しても、ちゃんと止まってるね」
line = "「神殿と聖庭園の距離を算出……うん、星術を使って計測しても、ちゃんと止まってるね」"

[[dialogue]]
speaker = "メルエル"
# 「ってことは──」
line = "「ってことは──」"

[[dialogue]]
speaker = "ヴィーナス"
# 「今度こそ天界を守れたわね！」
line = "「今度こそ天界を守れたわね！」"

[[dialogue]]
speaker = "メルエル"
# 「やったぁっ！」
line = "「やったぁっ！」"

[[dialogue]]
speaker = "ベアトリス"
# 「ふぅ～……」
line = "「ふぅ～……」"

[[dialogue]]
speaker = "unk"
# 危機が去ったことを実感し、みんなが喜びと安堵の声を漏らす。
line = "危機が去ったことを実感し、みんなが喜びと安堵の声を漏らす。"

[[dialogue]]
speaker = "unk"
# 極星星徒会とリクリエの使徒という強敵との連戦だったが、何とか女神の神殿を守ることができた。
line = "極星星徒会とリクリエの使徒という強敵との連戦だったが、何とか女神の神殿を守ることができた。"

[[dialogue]]
speaker = "クロト"
# 「みんな、お疲れ様」
line = "「みんな、お疲れ様」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ほんとよー。デネブから帰ってきて早々、天界が襲われたって聞いたものだからビックリしたわ」
line = "「ほんとよー。デネブから帰ってきて早々、天界が襲われたって聞いたものだからビックリしたわ」"

[[dialogue]]
speaker = "ベアトリス"
# 「私もほんとにヘトヘトだよー……帰ったらニンニクたくさん食べようっと」
line = "「私もほんとにヘトヘトだよー……帰ったらニンニクたくさん食べようっと」"

[[dialogue]]
speaker = "ナターシャ"
# 「エージェントだから体力には自信あったつもりだけど、今回はさすがに疲れたね」
line = "「エージェントだから体力には自信あったつもりだけど、今回はさすがに疲れたね」"

[[dialogue]]
speaker = "unk"
# 疲労を表すように、大げさに肩をすくめてみせるナターシャ。
line = "疲労を表すように、大げさに肩をすくめてみせるナターシャ。"

[[dialogue]]
speaker = "unk"
# そこでナターシャとメルエルの目が合う。
line = "そこでナターシャとメルエルの目が合う。"

[[dialogue]]
speaker = "ナターシャ"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "メルエル"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# 少しの沈黙の後、会話もなく目を逸らす２人。
line = "少しの沈黙の後、会話もなく目を逸らす２人。"

[[dialogue]]
speaker = "unk"
# ２人が今までのように、友人の距離に戻れることはあるのだろうか。
line = "２人が今までのように、友人の距離に戻れることはあるのだろうか。"

[[dialogue]]
speaker = "梨緒"
# 「ふぅ……長い一日だった」
line = "「ふぅ……長い一日だった」"

[[dialogue]]
speaker = "ジグ"
# 「私にはあまり実感がないな。仮面をしていた時は、夢を見ているようなものだったからね」
line = "「私にはあまり実感がないな。仮面をしていた時は、夢を見ているようなものだったからね」"

[[dialogue]]
speaker = "梨緒"
# 「まぁ……そうだろうな」
line = "「まぁ……そうだろうな」"

[[dialogue]]
speaker = "梨緒"
# 「君に言いたいことはたくさんある。いろいろ話をしたいところだが……」
line = "「君に言いたいことはたくさんある。いろいろ話をしたいところだが……」"

[[dialogue]]
speaker = "梨緒"
# 「帰ろう、新星学園に」
line = "「帰ろう、新星学園に」"

[[dialogue]]
speaker = "ジグ"
# 「私たちの──じゃないけどね」
line = "「私たちの──じゃないけどね」"

[[dialogue]]
speaker = "梨緒"
# 「ああ、私たちの学園はなくなってしまった」
line = "「ああ、私たちの学園はなくなってしまった」"

[[dialogue]]
speaker = "梨緒"
# 「それでも新星学園はあるんだ。この世界に」
line = "「それでも新星学園はあるんだ。この世界に」"

[[dialogue]]
speaker = "ジグ"
# 「うん……そうだね」
line = "「うん……そうだね」"
