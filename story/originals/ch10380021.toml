line = "「い、いえっ、何も答えないでくださいっ。返事を聞いたら妄想の世界に旅立ちかねません……！」"

[[dialogue]]
speaker = "イクシリオン"
# 「海では一瞬の油断が命取りですからね……。いつも以上に気を引き締めて、ビーチに目を光らせませんと……」
line = "「海では一瞬の油断が命取りですからね……。いつも以上に気を引き締めて、ビーチに目を光らせませんと……」"

[[dialogue]]
speaker = "イクシリオン"
# 「浜辺の監視をしながらこっそりお互いへ手を伸ばしたり……とか。休憩中に海の家のシャワールームでしっぽり……とか。はぁはぁ、妄想しないようにしなければ……」
line = "「浜辺の監視をしながらこっそりお互いへ手を伸ばしたり……とか。休憩中に海の家のシャワールームでしっぽり……とか。はぁはぁ、妄想しないようにしなければ……」"

[[dialogue]]
speaker = "イクシリオン"
# 「──あぁっ、立ち去ろうとしないでくださいっ！　大丈夫です、耐えられますっ……！　どうか一緒にいてください……！」
line = "「──あぁっ、立ち去ろうとしないでくださいっ！　大丈夫です、耐えられますっ……！　どうか一緒にいてください……！」"

[[dialogue]]
