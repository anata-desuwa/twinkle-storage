line = "「って、こ、こういうのがいけないんですよね！　あ、頭をっ、頭を冷やしますっ……！」"

[[dialogue]]
speaker = "イクシリオン"
# 「今の私は会長の恋人である前に１人のライフセーバーですからね。のろけている場合ではありません」
