line = "「でも……良かったんですか？　せっかくの休日に私の手伝いなんて」"

[[dialogue]]
speaker = "イクシリオン"
# 「今日は天気も良くて、比較的波も穏やかですし、絶好の海水浴日和ですよ？　私のことは気にせず泳いで来てくださっても……」
line = "「今日は天気も良くて、比較的波も穏やかですし、絶好の海水浴日和ですよ？　私のことは気にせず泳いで来てくださっても……」"

[[dialogue]]
speaker = "unk"
# 少しでも彼女と一緒にいたいからね
line = "少しでも彼女と一緒にいたいからね"

[[dialogue]]
speaker = "イクシリオン"
# 「かの──～～っっ。あ、ありがとうございます。しかし、いつまで経っても慣れませんね。会長に彼女と呼んでいただくのは……」
line = "「かの──～～っっ。あ、ありがとうございます。しかし、いつまで経っても慣れませんね。会長に彼女と呼んでいただくのは……」"

[[dialogue]]
speaker = "イクシリオン"
# 「今でも信じられないと言いますか……。ほ、本当に私なんかで良かったんですか……？」
line = "「今でも信じられないと言いますか……。ほ、本当に私なんかで良かったんですか……？」"

[[dialogue]]
