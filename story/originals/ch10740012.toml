[[dialogue]]
speaker = "unk"
# 第２話,意外と尽くすタイプなんだから♪,P
line = "第２話,意外と尽くすタイプなんだから♪,P"

[[dialogue]]
speaker = "パルミエ"
# 「いらっしゃいませ～。ただいま割り引きセール中よ～」
line = "「いらっしゃいませ～。ただいま割り引きセール中よ～」"

[[dialogue]]
speaker = "パルミエ"
# 「もちろん私のスマイルは割引不可だけど♪　ウインク１つ１００万テルスで請け負ってあげるわ～♪」
line = "「もちろん私のスマイルは割引不可だけど♪　ウインク１つ１００万テルスで請け負ってあげるわ～♪」"

[[dialogue]]
speaker = "パルミエ"
# 「じゃんじゃん買って、じゃんじゃん在庫放出させてね～。売り物がなくなっちゃえば購買部も閉められるから～」
line = "「じゃんじゃん買って、じゃんじゃん在庫放出させてね～。売り物がなくなっちゃえば購買部も閉められるから～」"

[[dialogue]]
speaker = "unk"
# パルミエが働いてる！？
line = "パルミエが働いてる！？"

[[dialogue]]
speaker = "パルミエ"
# 「なによ、ダーリン。まるで天地がひっくり返ったような顔しちゃって。そこはお仕事を頑張ってる妻を労うところじゃない」
line = "「なによ、ダーリン。まるで天地がひっくり返ったような顔しちゃって。そこはお仕事を頑張ってる妻を労うところじゃない」"

[[dialogue]]
speaker = "パルミエ"
# 「でもわざわざ会いに来てくれるなんて嬉しいわ♪　ダーリンったら本当に私のことが大好きなのね♪」
line = "「でもわざわざ会いに来てくれるなんて嬉しいわ♪　ダーリンったら本当に私のことが大好きなのね♪」"

[[dialogue]]
speaker = "パルミエ"
# 「特別にただでウインクしてあげちゃう♪　この間の特別試験でもお世話になっちゃったし♪」
line = "「特別にただでウインクしてあげちゃう♪　この間の特別試験でもお世話になっちゃったし♪」"

[[dialogue]]
speaker = "パルミエ"
# 「シフォンとモナカもあれから毎日張り切っちゃって。プリマステラになれたことが本当に嬉しかったみたいなの」
line = "「シフォンとモナカもあれから毎日張り切っちゃって。プリマステラになれたことが本当に嬉しかったみたいなの」"

[[dialogue]]
speaker = "パルミエ"
# 「私までプリマステラにされちゃったのは予想外だったけど、ああして２人に喜んでもらえたのなら結果オーライかしら」
line = "「私までプリマステラにされちゃったのは予想外だったけど、ああして２人に喜んでもらえたのなら結果オーライかしら」"

[[dialogue]]
speaker = "パルミエ"
# 「自信がついたのか、２人とも前より明るくなってくれたし♪　やっぱりあの子たちには笑顔が似合うわ♪」
line = "「自信がついたのか、２人とも前より明るくなってくれたし♪　やっぱりあの子たちには笑顔が似合うわ♪」"

[[dialogue]]
speaker = "パルミエ"
# 「あ、シフォンとモナカをモンスター退治に連れて行く時はくれぐれもお願いね？　新米なんだからあんまり強いモンスターとは戦わせてあげないでよ？」
line = "「あ、シフォンとモナカをモンスター退治に連れて行く時はくれぐれもお願いね？　新米なんだからあんまり強いモンスターとは戦わせてあげないでよ？」"

[[dialogue]]
speaker = "パルミエ"
# 「っと、雑談はほどほどにしてお仕事しないと。レジが混んできちゃったわ」
line = "「っと、雑談はほどほどにしてお仕事しないと。レジが混んできちゃったわ」"

[[dialogue]]
speaker = "パルミエ"
# 「品出しの方は頼んだわよ、ダーリン。足りなさそうな品物、裏から適当に出しておいて～」
line = "「品出しの方は頼んだわよ、ダーリン。足りなさそうな品物、裏から適当に出しておいて～」"

[[dialogue]]
speaker = "パルミエ"
# 「あ、コラ。逃げないの。妻だけに働かせる旦那なんて世間様からダメ夫だと思われちゃうわよ～？」
line = "「あ、コラ。逃げないの。妻だけに働かせる旦那なんて世間様からダメ夫だと思われちゃうわよ～？」"

[[dialogue]]
speaker = "パルミエ"
# 「ふぅ、ようやく客足も落ち着いてきたわね」
line = "「ふぅ、ようやく客足も落ち着いてきたわね」"

[[dialogue]]
speaker = "パルミエ"
# 「購買部がこんなにも忙しいなんて知らなかったわ。まぁ可愛い私が店番をしてるから人が集まってきちゃったのかもだけど♪」
line = "「購買部がこんなにも忙しいなんて知らなかったわ。まぁ可愛い私が店番をしてるから人が集まってきちゃったのかもだけど♪」"

[[dialogue]]
speaker = "パルミエ"
# 「でもでも、こうして２人で店番をしていると夫婦でお店を始めたような気分になっちゃうわね？　バックヤードでキスでもしちゃう？」
line = "「でもでも、こうして２人で店番をしていると夫婦でお店を始めたような気分になっちゃうわね？　バックヤードでキスでもしちゃう？」"

[[dialogue]]
speaker = "unk"
# また何かやらかしたのか？
line = "また何かやらかしたのか？"

[[dialogue]]
speaker = "パルミエ"
# 「んもう相変わらずいけずなんだから。というか違うわよ。罰代わりに店番させられてるわけじゃないってば」
line = "「んもう相変わらずいけずなんだから。というか違うわよ。罰代わりに店番させられてるわけじゃないってば」"

[[dialogue]]
speaker = "パルミエ"
# 「単純におなか部へ相談が来たの。アニマちゃんから１日店番を代わって欲しいって話が」
line = "「単純におなか部へ相談が来たの。アニマちゃんから１日店番を代わって欲しいって話が」"

[[dialogue]]
speaker = "パルミエ"
# 「なんでも研究がすっごくすっごく忙しくて手が離せないらしいわ。だから私が代わってあげたってわけ」
line = "「なんでも研究がすっごくすっごく忙しくて手が離せないらしいわ。だから私が代わってあげたってわけ」"

[[dialogue]]
speaker = "パルミエ"
# 「あ、そうだ。シフォンとモナカにはこのこと黙っててね？　２人はこの相談のこと知らないから」
line = "「あ、そうだ。シフォンとモナカにはこのこと黙っててね？　２人はこの相談のこと知らないから」"

[[dialogue]]
speaker = "パルミエ"
# 「２人とも接客業はあんまり得意じゃないしね～。シフォンは羽根を見られるのが苦手だし、モナカは人見知りだもの」
line = "「２人とも接客業はあんまり得意じゃないしね～。シフォンは羽根を見られるのが苦手だし、モナカは人見知りだもの」"

[[dialogue]]
speaker = "パルミエ"
# 「克服しようと努力してるのは知ってるけど、それでもいきなり店に立つのはハードルが高いからね」
line = "「克服しようと努力してるのは知ってるけど、それでもいきなり店に立つのはハードルが高いからね」"

[[dialogue]]
speaker = "パルミエ"
# 「それでも頑張って引き受けちゃうのがあの子たちだから。こういう仕事は人見知りしないお姉さんがやっつけちゃおうと思って」
line = "「それでも頑張って引き受けちゃうのがあの子たちだから。こういう仕事は人見知りしないお姉さんがやっつけちゃおうと思って」"

[[dialogue]]
speaker = "unk"
# あの面倒くさがり屋のパルミエが？
line = "あの面倒くさがり屋のパルミエが？"

[[dialogue]]
speaker = "パルミエ"
# 「あらあら。私にだって面倒くさいことと面倒くさくないことはあるわよ～」
line = "「あらあら。私にだって面倒くさいことと面倒くさくないことはあるわよ～」"

[[dialogue]]
speaker = "パルミエ"
# 「私にとってモナカとシフォンは大切な大切な親友だもの。大好きな人たちのために何かすることを決して面倒だなんて思わないわ」
line = "「私にとってモナカとシフォンは大切な大切な親友だもの。大好きな人たちのために何かすることを決して面倒だなんて思わないわ」"

[[dialogue]]
speaker = "パルミエ"
# 「ま、もちろん二人が接客業もこなせるようになった時は任せちゃうけど♪　そこまでいけば面倒くさがっちゃってもいいだろうし♪」
line = "「ま、もちろん二人が接客業もこなせるようになった時は任せちゃうけど♪　そこまでいけば面倒くさがっちゃってもいいだろうし♪」"

[[dialogue]]
speaker = "unk"
# 仲間想いなんだな
line = "仲間想いなんだな"

[[dialogue]]
speaker = "パルミエ"
# 「別に普通よ～。ただあの２人にはずっと笑顔でいてもらいたいだーけ」
line = "「別に普通よ～。ただあの２人にはずっと笑顔でいてもらいたいだーけ」"

[[dialogue]]
speaker = "パルミエ"
# 「家族以上に家族な２人だからね。あの２人の幸せが私の幸せなの。あの２人が幸せなら私は他に何も要らないわ♪」
line = "「家族以上に家族な２人だからね。あの２人の幸せが私の幸せなの。あの２人が幸せなら私は他に何も要らないわ♪」"

[[dialogue]]
speaker = "パルミエ"
# 「ともかく、このことは私とダーリンの秘密ってことでお願いね？　お姉ちゃんぶってるところを知られると恥ずかしいから」
line = "「ともかく、このことは私とダーリンの秘密ってことでお願いね？　お姉ちゃんぶってるところを知られると恥ずかしいから」"

[[dialogue]]
speaker = "パルミエ"
# 「あ……でもダーリンはしっかり覚えておいてくれていいからね？　こういうギャップに男の子って弱いものだと思うし」
line = "「あ……でもダーリンはしっかり覚えておいてくれていいからね？　こういうギャップに男の子って弱いものだと思うし」"

[[dialogue]]
speaker = "パルミエ"
# 「今の話を聞いてわかったでしょ？　こう見えて私って尽くす女なの♪　どうどう？　結婚したくなってきたんじゃない？」
line = "「今の話を聞いてわかったでしょ？　こう見えて私って尽くす女なの♪　どうどう？　結婚したくなってきたんじゃない？」"

[[dialogue]]
speaker = "パルミエ"
# 「もし結婚してくれるなら、ダーリンにも尽くしてあげるわよ～？　あ～んなことや、こ～んなことまでしてあげるから♪」
line = "「もし結婚してくれるなら、ダーリンにも尽くしてあげるわよ～？　あ～んなことや、こ～んなことまでしてあげるから♪」"

[[dialogue]]
speaker = "パルミエ"
# 「……あら、大きなため息なんか吐いちゃって。ふざけてるわけじゃないわよ？　本気よ、本気♪」
line = "「……あら、大きなため息なんか吐いちゃって。ふざけてるわけじゃないわよ？　本気よ、本気♪」"

[[dialogue]]
speaker = "パルミエ"
# 「誰だって好きな相手には手間なんか惜しまないものじゃない？　言ってしまえば尽くすのなんて当たり前なのよ」
line = "「誰だって好きな相手には手間なんか惜しまないものじゃない？　言ってしまえば尽くすのなんて当たり前なのよ」"

[[dialogue]]
speaker = "パルミエ"
# 「だってそれが愛なんだから。もしその人のために何かをすることを面倒臭がるのなら、それは本気の愛じゃないの」
line = "「だってそれが愛なんだから。もしその人のために何かをすることを面倒臭がるのなら、それは本気の愛じゃないの」"

[[dialogue]]
speaker = "パルミエ"
# 「私はね？　シフォンとモナカのためならもちろん、ダーリンのためにだって、どんなことも面倒だとは思わないわ」
line = "「私はね？　シフォンとモナカのためならもちろん、ダーリンのためにだって、どんなことも面倒だとは思わないわ」"

[[dialogue]]
speaker = "パルミエ"
# 「そして、いつかダーリンも同じように思ってほしいって願ってる」
line = "「そして、いつかダーリンも同じように思ってほしいって願ってる」"

[[dialogue]]
speaker = "パルミエ"
# 「って、勝手すぎる願いかしら？　ダーリンはそこまで私のこと好きじゃないわよね？　私のために何かするのはやっぱり面倒くさい……わよね？」
line = "「って、勝手すぎる願いかしら？　ダーリンはそこまで私のこと好きじゃないわよね？　私のために何かするのはやっぱり面倒くさい……わよね？」"

[[dialogue]]
speaker = "unk"
# そんなことは……
line = "そんなことは……"

[[dialogue]]
speaker = "パルミエ"
# 「ない、の？　ふふ、そうなのね。嬉しいわ、本当に嬉しい……」
line = "「ない、の？　ふふ、そうなのね。嬉しいわ、本当に嬉しい……」"

[[dialogue]]
speaker = "パルミエ"
# 「なら──後のことは任せたわよダーリン♪　私に代わって購買部のお手伝いをお願いねっ♪」
line = "「なら──後のことは任せたわよダーリン♪　私に代わって購買部のお手伝いをお願いねっ♪」"

[[dialogue]]
speaker = "パルミエ"
# 「朝から働きづめで体力の限界だったのよ～。ようやくあがれるわ～。部室に戻ってゴロゴロしよ～っと！」
line = "「朝から働きづめで体力の限界だったのよ～。ようやくあがれるわ～。部室に戻ってゴロゴロしよ～っと！」"

[[dialogue]]
speaker = "パルミエ"
# 「あ、くれぐれもシフォンとモナカには秘密にしておいてね♪　誰かに仕事を押しつけたなんて知られたら叱られちゃうから♪」
line = "「あ、くれぐれもシフォンとモナカには秘密にしておいてね♪　誰かに仕事を押しつけたなんて知られたら叱られちゃうから♪」"

[[dialogue]]
speaker = "パルミエ"
# 「それじゃダーリン、また今度ね～！」
line = "「それじゃダーリン、また今度ね～！」"
