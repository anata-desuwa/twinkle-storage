[[dialogue]]
speaker = "unk"
# 第１話,天海の指揮者,B
line = "第１話,天海の指揮者,B"

[[dialogue]]
speaker = "フィオナ"
# 「みんなの力を……貸してください。この未曾有の危機を乗り越え──姉さんを取り戻すために！」
line = "「みんなの力を……貸してください。この未曾有の危機を乗り越え──姉さんを取り戻すために！」"

[[dialogue]]
speaker = "みんな"
# 「おー！」「はいっ！」「ええ！」
line = "「おー！」「はいっ！」「ええ！」"

[[dialogue]]
speaker = "アナ"
# 「アポロは──お姉さんは遥か高みで観測されています。恐らくはもう雲の上……」
line = "「アポロは──お姉さんは遥か高みで観測されています。恐らくはもう雲の上……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「おっけ。ならブースト全開──みんな、アポロのいるてっぺんまでかっ飛ばすわよ！」
line = "「おっけ。ならブースト全開──みんな、アポロのいるてっぺんまでかっ飛ばすわよ！」"

[[dialogue]]
speaker = "unk"
# 俺たちは全員で飛翔する。
line = "俺たちは全員で飛翔する。"

[[dialogue]]
speaker = "unk"
# 襲い来るモンスターも、流れ星の雨すらも跳ね除けて……
line = "襲い来るモンスターも、流れ星の雨すらも跳ね除けて……"

[[dialogue]]
speaker = "unk"
# そして──雲海すら超える高空に達し、ようやく辿り着いた。
line = "そして──雲海すら超える高空に達し、ようやく辿り着いた。"

[[dialogue]]
speaker = "unk"
# 彼女は静かに浮かんでいた。人間界を見下ろし、成り行きを示す指揮者のように。
line = "彼女は静かに浮かんでいた。人間界を見下ろし、成り行きを示す指揮者のように。"

[[dialogue]]
speaker = "フィオナ"
# 「ようやく……あなたと向き合う覚悟ができました。姉さん」
line = "「ようやく……あなたと向き合う覚悟ができました。姉さん」"

[[dialogue]]
speaker = "アポロ"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# 星見の名を冠した２人の姉妹が向かい合う。だが……
line = "星見の名を冠した２人の姉妹が向かい合う。だが……"

[[dialogue]]
speaker = "アポロ"
# 「──誰だ、オマエは」
line = "「──誰だ、オマエは」"

[[dialogue]]
speaker = "フィオナ"
# 「……え……？」
line = "「……え……？」"

[[dialogue]]
speaker = "unk"
# こちらを振り向いたアポロの<ruby=かんばせ>貌</ruby>には──いつかの仮面が、元通りの姿で貼りついていた。
line = "こちらを振り向いたアポロの<ruby>貌<rt>かんばせ</rt></ruby>には──いつかの仮面が、元通りの姿で貼りついていた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「っ、待って──仮面が……！」
line = "「っ、待って──仮面が……！」"

[[dialogue]]
speaker = "クロト"
# 「戻ってる──？」
line = "「戻ってる──？」"

[[dialogue]]
speaker = "unk"
# あれは以前、フィオナの手によって砕かれたはず。
line = "あれは以前、フィオナの手によって砕かれたはず。"

[[dialogue]]
speaker = "フィオナ"
# 「姉さん──また忘れてしまったのですか。私です……エリシアです。本当のあなたを取り戻すために、ここまで来ました」
line = "「姉さん──また忘れてしまったのですか。私です……エリシアです。本当のあなたを取り戻すために、ここまで来ました」"

[[dialogue]]
speaker = "アポロ"
# 「姉だと……？　あたしはオマエのような人間を知らない」
line = "「姉だと……？　あたしはオマエのような人間を知らない」"

[[dialogue]]
speaker = "unk"
# 騙っているようには見えない。どうやら本気で、<ruby=エリシア>妹</ruby>のことを認識できなくなっているようだ。
line = "騙っているようには見えない。どうやら本気で、<ruby>妹<rt>エリシア</rt></ruby>のことを認識できなくなっているようだ。"

[[dialogue]]
speaker = "セーラ"
# 「もしかしなくても、<ruby=アレ>仮面</ruby>のせいかなー」
line = "「もしかしなくても、<ruby>仮面<rt>アレ</rt></ruby>のせいかなー」"

[[dialogue]]
speaker = "クロト"
# 「ええ……以前のアポロも、仮面を割られることで初めてフィオナのことを認識していました」
line = "「ええ……以前のアポロも、仮面を割られることで初めてフィオナのことを認識していました」"

[[dialogue]]
speaker = "クロト"
# 「デネブに拐われたマルキアさんと同じ。あれが使徒を使徒たらしめている元凶でしょう」
line = "「デネブに拐われたマルキアさんと同じ。あれが使徒を使徒たらしめている元凶でしょう」"

[[dialogue]]
speaker = "unk"
# セイファート学園長の奥さんもまた、同じく仮面に操られて自我を封じられていた。
line = "セイファート学園長の奥さんもまた、同じく仮面に操られて自我を封じられていた。"

[[dialogue]]
speaker = "unk"
# それでも、アポロに関しちゃ一度は正気を取り戻しかけたはずなのに。
line = "それでも、アポロに関しちゃ一度は正気を取り戻しかけたはずなのに。"

[[dialogue]]
speaker = "クロト"
# 「アポロ──俺たちは、本当の君を知っている」
line = "「アポロ──俺たちは、本当の君を知っている」"

[[dialogue]]
speaker = "クロト"
# 「目を覚ましてくれ。共にリクリエに抗うんだ。そうすれば、きっと、君の妹──エリシアと一緒に暮らせる日も来るはずだから」
line = "「目を覚ましてくれ。共にリクリエに抗うんだ。そうすれば、きっと、君の妹──エリシアと一緒に暮らせる日も来るはずだから」"

[[dialogue]]
speaker = "アポロ"
# 「魔王か……寝言を抜かすようになったな」
line = "「魔王か……寝言を抜かすようになったな」"

[[dialogue]]
speaker = "アポロ"
# 「あたしはひーろー。おまえは魔王。あたし達が出会ったなら戦うだけ、違うか？」
line = "「あたしはひーろー。おまえは魔王。あたし達が出会ったなら戦うだけ、違うか？」"

[[dialogue]]
speaker = "クロト"
# 「違う。俺たちは星騎士──リクリエっていう厄災に立ち向かうだけの存在だ。戦うべき相手は、君じゃない」
line = "「違う。俺たちは星騎士──リクリエっていう厄災に立ち向かうだけの存在だ。戦うべき相手は、君じゃない」"

[[dialogue]]
speaker = "フィオナ"
# 「はい。それに本当の姉さんは、誰よりも世界の救済を願っていたのですから」
line = "「はい。それに本当の姉さんは、誰よりも世界の救済を願っていたのですから」"

[[dialogue]]
speaker = "フィオナ"
# 「たとえ忘れてしまったとしても……何度だって思い出させてあげるだけです」
line = "「たとえ忘れてしまったとしても……何度だって思い出させてあげるだけです」"

[[dialogue]]
speaker = "フィオナ"
# 「かけがえのない仲間の手も借りて──私は本心に気づきました。だから姉さん、あなたにも……！」
line = "「かけがえのない仲間の手も借りて──私は本心に気づきました。だから姉さん、あなたにも……！」"

[[dialogue]]
speaker = "セーラ"
# 「……！　フィオナちゃんの、魔王の力……」
line = "「……！　フィオナちゃんの、魔王の力……」"

[[dialogue]]
speaker = "unk"
# フィオナの全身から熾烈な覇気が<ruby=ほとばし>迸</ruby>る。
line = "フィオナの全身から熾烈な覇気が<ruby>迸<rt>ほとばし</rt></ruby>る。"

[[dialogue]]
speaker = "unk"
# かつてアポロと邂逅した際とは比べ物にならない、魔力と霊力の発露──
line = "かつてアポロと邂逅した際とは比べ物にならない、魔力と霊力の発露──"

[[dialogue]]
speaker = "アポロ"
# 「……なるほど。よくわからんが……目障りなのは確かだ」
line = "「……なるほど。よくわからんが……目障りなのは確かだ」"

[[dialogue]]
speaker = "アポロ"
# 「魔王と同じ波動を感じる。つまり、<ruby=あたし>アポロ</ruby>の敵だ」
line = "「魔王と同じ波動を感じる。つまり、<ruby>アポロ<rt>あたし</rt></ruby>の敵だ」"

[[dialogue]]
speaker = "マトイ"
# 「──っ……！？」
line = "「──っ……！？」"

[[dialogue]]
speaker = "アポロ"
# 「リクリエは成る。たとえ、<ruby=てき>魔王</ruby>が２人に増えようと、あたしのやることは変わらない」
line = "「リクリエは成る。たとえ、<ruby>魔王<rt>てき</rt></ruby>が２人に増えようと、あたしのやることは変わらない」"

[[dialogue]]
speaker = "アポロ"
# 「あたしは流星ライダー・アポロ……どんな悪党もぶっ倒す、正義のヒーローなんだ……！」
line = "「あたしは流星ライダー・アポロ……どんな悪党もぶっ倒す、正義のヒーローなんだ……！」"

[[dialogue]]
speaker = "フィオナ"
# 「いいえ──あなたは星見の本当の長女、フィオナ。いつも一緒に遊んでくれた、私の自慢の姉さんです──！」
line = "「いいえ──あなたは星見の本当の長女、フィオナ。いつも一緒に遊んでくれた、私の自慢の姉さんです──！」"

[[dialogue]]
speaker = "unk"
# 仮面の発する妖力は以前よりも凄まじく、そして、邪悪。
line = "仮面の発する妖力は以前よりも凄まじく、そして、邪悪。"

[[dialogue]]
speaker = "unk"
# その覇気はやがて、アポロの担ぐ大剣へと練りこまれてゆき──
line = "その覇気はやがて、アポロの担ぐ大剣へと練りこまれてゆき──"

[[dialogue]]
speaker = "アポロ"
# 「来い」
line = "「来い」"

[[dialogue]]
speaker = "ユウリ"
# 「んなっ──」
line = "「んなっ──」"

[[dialogue]]
speaker = "ルリエル"
# 「ア──アステラが出ましたっ！？」
line = "「ア──アステラが出ましたっ！？」"

[[dialogue]]
speaker = "unk"
# アポロが大剣を振るった──それだけで、大量のモンスターがひしめく<ruby=アステラ>巣窟</ruby>が生成される。
line = "アポロが大剣を振るった──それだけで、大量のモンスターがひしめく<ruby>巣窟<rt>アステラ</rt></ruby>が生成される。"

[[dialogue]]
speaker = "unk"
# さらに──
line = "さらに──"

[[dialogue]]
speaker = "モンスター"
# 「ジュクジュク……ウジウジ……ジュク……ジュク…………」
line = "「ジュクジュク……ウジウジ……ジュク……ジュク…………」"

[[dialogue]]
speaker = "モンスター"
# 「ベトォ……ズズ……ズ……ザザ……ゲヘヘ…………」
line = "「ベトォ……ズズ……ズ……ザザ……ゲヘヘ…………」"

[[dialogue]]
speaker = "unk"
# アステラの外縁がぼろぼろと崩れ去るや、その場に足場を形成して中から生まれ落ちた異形たちを支えていた。
line = "アステラの外縁がぼろぼろと崩れ去るや、その場に足場を形成して中から生まれ落ちた異形たちを支えていた。"

[[dialogue]]
speaker = "アポロ"
# 「やれ。魔王も、その配下も──まとめてゴミクズにしてしまえ」
line = "「やれ。魔王も、その配下も──まとめてゴミクズにしてしまえ」"

[[dialogue]]
speaker = "サーシャ"
# 「前は精々、モンスターを率いるくらいじゃなかった──？」
line = "「前は精々、モンスターを率いるくらいじゃなかった──？」"

[[dialogue]]
speaker = "アナ"
# 「格段に出力が跳ね上がっていますね。本体も含め……！」
line = "「格段に出力が跳ね上がっていますね。本体も含め……！」"

[[dialogue]]
speaker = "unk"
# アステラは通常、星騎士たちがチームを組んで撃破にあたる。
line = "アステラは通常、星騎士たちがチームを組んで撃破にあたる。"

[[dialogue]]
speaker = "unk"
# それだけの災禍を自在に生成されてしまっては、もはや戦いを長引かせるだけで大きな不利だ。
line = "それだけの災禍を自在に生成されてしまっては、もはや戦いを長引かせるだけで大きな不利だ。"

[[dialogue]]
speaker = "アポロ"
# 「ヒーローはいつだってひとりなんだ。オマエたちみたいな、よってたかっていじめる悪党どもとは違う！」
line = "「ヒーローはいつだってひとりなんだ。オマエたちみたいな、よってたかっていじめる悪党どもとは違う！」"

[[dialogue]]
speaker = "ユウリ"
# 「よく言う──そのモンスターどもはなんなんだっての」
line = "「よく言う──そのモンスターどもはなんなんだっての」"

[[dialogue]]
speaker = "クロト"
# 「もう一度アポロの仮面を砕く。正気さえ取り戻してくれれば、俺たちは戦わなくてもいいはずだ」
line = "「もう一度アポロの仮面を砕く。正気さえ取り戻してくれれば、俺たちは戦わなくてもいいはずだ」"

[[dialogue]]
speaker = "フィオナ"
# 「決して諦めません──私の刃を、姉さんの心に届かせるまで！」
line = "「決して諦めません──私の刃を、姉さんの心に届かせるまで！」"
