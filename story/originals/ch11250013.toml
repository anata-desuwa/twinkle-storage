[[dialogue]]
speaker = "unk"
# 第３話,先輩ヒーロー,P
line = "第３話,先輩ヒーロー,P"

[[dialogue]]
speaker = "unk"
# アクション女優を目指すアポロのために、俺が演技の相手をすることになった。
line = "アクション女優を目指すアポロのために、俺が演技の相手をすることになった。"

[[dialogue]]
speaker = "ヴィーナス"
# 「話は聞いたわ！　私が監督としてアポロとクロトに指示を出すわよ！」
line = "「話は聞いたわ！　私が監督としてアポロとクロトに指示を出すわよ！」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「正直、ヴィーナスが監督なのはちょっと不安なんだが……」
line = "「正直、ヴィーナスが監督なのはちょっと不安なんだが……」"

[[dialogue]]
speaker = "リノ"
# 「アポロちゃん、名演技期待してるわよー」
line = "「アポロちゃん、名演技期待してるわよー」"

[[dialogue]]
speaker = "フィオナ"
# 「姉さーん、頑張ってくださーい」
line = "「姉さーん、頑張ってくださーい」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「しかもオーディエンスまでいるし……まぁ、これくらいでビビるようじゃ役者になんてなれないか。よし、やるぞ！」
line = "「しかもオーディエンスまでいるし……まぁ、これくらいでビビるようじゃ役者になんてなれないか。よし、やるぞ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロトは主人公の新米ヒーロー、アポロは年上の先輩ヒーロー役よ。まずは基地での最初の出会いから。よーい、アクション！」
line = "「クロトは主人公の新米ヒーロー、アポロは年上の先輩ヒーロー役よ。まずは基地での最初の出会いから。よーい、アクション！」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「お前が新入りか」
line = "「お前が新入りか」"

[[dialogue]]
speaker = "unk"
# よろしくお願いします、先輩
line = "よろしくお願いします、先輩"

[[dialogue]]
speaker = "アポロ（大人）"
# 「ふん、戦いを知らない能天気な顔だ。いいか、あたしたちの仕事は悪を倒すことだ。弱いヒーローに価値はない」
line = "「ふん、戦いを知らない能天気な顔だ。いいか、あたしたちの仕事は悪を倒すことだ。弱いヒーローに価値はない」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「お前には期待していないが、せいぜいあたしの足を引っ張るなよ」
line = "「お前には期待していないが、せいぜいあたしの足を引っ張るなよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「へぇ～、やるじゃない！　ツンな感じがちゃんと出てるわ！」
line = "「へぇ～、やるじゃない！　ツンな感じがちゃんと出てるわ！」"

[[dialogue]]
speaker = "フィオナ"
# 「主人公に厳しくクールな先輩ヒーローがどう変化していくか、楽しみですね」
line = "「主人公に厳しくクールな先輩ヒーローがどう変化していくか、楽しみですね」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「この役、そういうキャラなのか……？」
line = "「この役、そういうキャラなのか……？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「次は先輩ヒーローが、主人公を助けてお説教するシーンよ。それじゃスタート！」
line = "「次は先輩ヒーローが、主人公を助けてお説教するシーンよ。それじゃスタート！」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「言ったはずだ。足を引っ張るな、と。お前の勝手な行動があたしたち全員を危険にさらすことになる」
line = "「言ったはずだ。足を引っ張るな、と。お前の勝手な行動があたしたち全員を危険にさらすことになる」"

[[dialogue]]
speaker = "unk"
# ……すみませんでした
line = "……すみませんでした"

[[dialogue]]
speaker = "アポロ（大人）"
# 「誰かを助けるためだろうと関係ない。敵に背中を見せれば、助けた相手ごとやられるだけだ」
line = "「誰かを助けるためだろうと関係ない。敵に背中を見せれば、助けた相手ごとやられるだけだ」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「お前のそういうのは優しさじゃない。甘さっていうんだ。あたしが間に合わなければ命を落としていたんだぞ」
line = "「お前のそういうのは優しさじゃない。甘さっていうんだ。あたしが間に合わなければ命を落としていたんだぞ」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「……だが、あの過酷な状況で子どもを救出したことだけは褒めてやる。根性はあるようだな」
line = "「……だが、あの過酷な状況で子どもを救出したことだけは褒めてやる。根性はあるようだな」"

[[dialogue]]
speaker = "リノ"
# 「厳しさの中に見え隠れする感情……いいわね～」
line = "「厳しさの中に見え隠れする感情……いいわね～」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ここからは変身して撮るわよ！　主人公が身を挺して先輩を助けた後のシーン！」
line = "「ここからは変身して撮るわよ！　主人公が身を挺して先輩を助けた後のシーン！」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「バカ野郎！　どうしてあたしを助けた！？　あんな無茶をして……お前も死ぬところだったんだぞ！？」
line = "「バカ野郎！　どうしてあたしを助けた！？　あんな無茶をして……お前も死ぬところだったんだぞ！？」"

[[dialogue]]
speaker = "unk"
# 気付いたら体が動いていました
line = "気付いたら体が動いていました"

[[dialogue]]
speaker = "アポロ（大人）"
# 「気付いたら……ってこのバカ！　いいか、あたしが危険な状況に陥ったら、次は見捨てるんだぞ！」
line = "「気付いたら……ってこのバカ！　いいか、あたしが危険な状況に陥ったら、次は見捨てるんだぞ！」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「イヤだ？　この前はあたしが助けたって？　それは先任者として未熟なお前をフォローしただけで……」
line = "「イヤだ？　この前はあたしが助けたって？　それは先任者として未熟なお前をフォローしただけで……」"

[[dialogue]]
speaker = "unk"
# 大事な先輩を見捨てるなんてできません！
line = "大事な先輩を見捨てるなんてできません！"

[[dialogue]]
speaker = "アポロ（大人）"
# 「──！」
line = "「──！」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「大事とかそういうことじゃないだろう！　私情を挟むな、組織の一員として立場を考えて動け！」
line = "「大事とかそういうことじゃないだろう！　私情を挟むな、組織の一員として立場を考えて動け！」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「……ったく、お前は本当に仕方ないやつだ」
line = "「……ったく、お前は本当に仕方ないやつだ」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「……バカ」
line = "「……バカ」"

[[dialogue]]
speaker = "フィオナ"
# 「これはなかなか……見ているこちらもキュンときてしまいそうです」
line = "「これはなかなか……見ているこちらもキュンときてしまいそうです」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「う……今のはちょっとはずいな……」
line = "「う……今のはちょっとはずいな……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「いい感じに温まってきたわね～！　次はクライマックス！　抱き合って気持ちを伝え合う場面よ！」
line = "「いい感じに温まってきたわね～！　次はクライマックス！　抱き合って気持ちを伝え合う場面よ！」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「待て待て待て！　流星ライダーにそんなロマンスシーンはいらないだろ！」
line = "「待て待て待て！　流星ライダーにそんなロマンスシーンはいらないだろ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あなたの演技力を鍛えるためなんだから、つべこべ言わない！　監督が必要だって言ったらやるのが役者でしょ？」
line = "「あなたの演技力を鍛えるためなんだから、つべこべ言わない！　監督が必要だって言ったらやるのが役者でしょ？」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「それは……そうだが……」
line = "「それは……そうだが……」"

[[dialogue]]
speaker = "リノ"
# 「ヴィーナスちゃんの言う通りよ！　ラブシーンもこなせてこその女優だわ！」
line = "「ヴィーナスちゃんの言う通りよ！　ラブシーンもこなせてこその女優だわ！」"

[[dialogue]]
speaker = "フィオナ"
# 「絆を深め合ったヒーロー同士のロマンス……興味があります」
line = "「絆を深め合ったヒーロー同士のロマンス……興味があります」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「お前らもう楽しんでるだろ！！」
line = "「お前らもう楽しんでるだろ！！」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「ええい、こうなったら全力でやるまでだ！　お前も本気で来い、魔王！」
line = "「ええい、こうなったら全力でやるまでだ！　お前も本気で来い、魔王！」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「お前のおかげで悪の組織を倒せた。これであたしたちの戦いも終わりだ」
line = "「お前のおかげで悪の組織を倒せた。これであたしたちの戦いも終わりだ」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「最初は甘ちゃんの世話を任されて、どうなることかと思ったが……ここまで戦い抜けたのはお前のおかげだ。ありがとう」
line = "「最初は甘ちゃんの世話を任されて、どうなることかと思ったが……ここまで戦い抜けたのはお前のおかげだ。ありがとう」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「あたしたちの組織も解散になる。お前も元いた場所に──」
line = "「あたしたちの組織も解散になる。お前も元いた場所に──」"

[[dialogue]]
speaker = "unk"
# 別れの言葉を切り出そうとしたアポロを、ぎゅっと抱きしめる。
line = "別れの言葉を切り出そうとしたアポロを、ぎゅっと抱きしめる。"

[[dialogue]]
speaker = "アポロ（大人）"
# 「な、なんのつもりだ……？」
line = "「な、なんのつもりだ……？」"

[[dialogue]]
speaker = "unk"
# 俺は先輩と一緒に生きたいです！
line = "俺は先輩と一緒に生きたいです！"

[[dialogue]]
speaker = "アポロ（大人）"
# 「なっ！？　お前、それどういう意味かわかってるのか！？」
line = "「なっ！？　お前、それどういう意味かわかってるのか！？」"

[[dialogue]]
speaker = "unk"
# 好きです、先輩
line = "好きです、先輩"

[[dialogue]]
speaker = "アポロ（大人）"
# 「ッ──！」
line = "「ッ──！」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「お前は本当に……バカなやつだ。さんざん厳しくしたのに、こんなあたしのどこがいいんだ」
line = "「お前は本当に……バカなやつだ。さんざん厳しくしたのに、こんなあたしのどこがいいんだ」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「だけどあたしも、そんなバカなお前が好きになってしまった。お似合いのバカだ」
line = "「だけどあたしも、そんなバカなお前が好きになってしまった。お似合いのバカだ」"

[[dialogue]]
speaker = "unk"
# アポロが俺を強く抱き返し、至近距離で見つめ合う。
line = "アポロが俺を強く抱き返し、至近距離で見つめ合う。"

[[dialogue]]
speaker = "アポロ（大人）"
# 「これからも、あたしの背中はお前に預ける」
line = "「これからも、あたしの背中はお前に預ける」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「お前はあたしの……一生の相棒だ」
line = "「お前はあたしの……一生の相棒だ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「カーット！！　最高のシーンだったわよ！」
line = "「カーット！！　最高のシーンだったわよ！」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「はぁ～……疲れた。役者ってのは大変なんだなぁ～」
line = "「はぁ～……疲れた。役者ってのは大変なんだなぁ～」"

[[dialogue]]
speaker = "リノ"
# 「アポロちゃん、さっきの良かったわよ～！」
line = "「アポロちゃん、さっきの良かったわよ～！」"

[[dialogue]]
speaker = "フィオナ"
# 「姉さんの演技、とても素敵でした。つい見入ってしまいました」
line = "「姉さんの演技、とても素敵でした。つい見入ってしまいました」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「そうか？　へへ、あたしには役者の才能があるみたいだな」
line = "「そうか？　へへ、あたしには役者の才能があるみたいだな」"

[[dialogue]]
speaker = "unk"
# お疲れ様、アポロ
line = "お疲れ様、アポロ"

[[dialogue]]
speaker = "アポロ（大人）"
# 「あ、ああ……練習付き合ってくれてありがとな。おかげでいい経験になったよ」
line = "「あ、ああ……練習付き合ってくれてありがとな。おかげでいい経験になったよ」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「気が向いたらまた相手になってくれよ……な？」
line = "「気が向いたらまた相手になってくれよ……な？」"

[[dialogue]]
speaker = "unk"
# さっき演技したシーンのせいか、アポロの顔がほんのり赤い。
line = "さっき演技したシーンのせいか、アポロの顔がほんのり赤い。"

[[dialogue]]
speaker = "unk"
# 俺もアポロの顔を見ると、胸の鼓動が速くなるのだった。
line = "俺もアポロの顔を見ると、胸の鼓動が速くなるのだった。"
