[[dialogue]]
speaker = "unk"
# 第４話,花嫁修業をしよう,P
line = "第４話,花嫁修業をしよう,P"

[[dialogue]]
speaker = "unk"
# ヴィーナスの花嫁修業を手伝うと言って迎えた週末。
line = "ヴィーナスの花嫁修業を手伝うと言って迎えた週末。"

[[dialogue]]
speaker = "unk"
# じゃあ早速、花嫁修業をやっていくぞ！
line = "じゃあ早速、花嫁修業をやっていくぞ！"

[[dialogue]]
speaker = "ヴィーナス"
# 「ちょっと待って、花嫁修業をクロトに手伝ってもらうのは、なにかおかしくないかしら！？」
line = "「ちょっと待って、花嫁修業をクロトに手伝ってもらうのは、なにかおかしくないかしら！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「――花嫁修業教室のバイトをやったことがある？　そんなのがあるの！？」
line = "「――花嫁修業教室のバイトをやったことがある？　そんなのがあるの！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ていうか、クロトってもしかして、家事万能とかだったりする！？」
line = "「ていうか、クロトってもしかして、家事万能とかだったりする！？」"

[[dialogue]]
speaker = "unk"
# バイトでひと通りはできるようになった
line = "バイトでひと通りはできるようになった"

[[dialogue]]
speaker = "ヴィーナス"
# 「今更だけど、私よりクロトの方が女子力高いわ！」
line = "「今更だけど、私よりクロトの方が女子力高いわ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「もしかして過酷な運命ってこういうこと！？　でも、私は花嫁修業をして、クロトにプロポーズするって決めたんだから……！」
line = "「もしかして過酷な運命ってこういうこと！？　でも、私は花嫁修業をして、クロトにプロポーズするって決めたんだから……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「――まずは掃除から？　うん、わかったわ！」
line = "「――まずは掃除から？　うん、わかったわ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「…………クロト、早速だけど、助けて欲しいことがあるの」
line = "「…………クロト、早速だけど、助けて欲しいことがあるの」"

[[dialogue]]
speaker = "ヴィーナス"
# 「両足に掃除機のコードが絡まって、身動きが取れなくなったわ！」
line = "「両足に掃除機のコードが絡まって、身動きが取れなくなったわ！」"

[[dialogue]]
speaker = "unk"
# どうしてそうなった！？
line = "どうしてそうなった！？"

[[dialogue]]
speaker = "ヴィーナス"
# 「自分でもわからないわ！　掃除機で変なものを吸わないように注意してたら、足元がこうなってたの！」
line = "「自分でもわからないわ！　掃除機で変なものを吸わないように注意してたら、足元がこうなってたの！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロト～！　大変よ！　洗濯機から泡が沢山溢れてきてるわ！」
line = "「クロト～！　大変よ！　洗濯機から泡が沢山溢れてきてるわ！」"

[[dialogue]]
speaker = "unk"
# それ絶対に、洗剤入れすぎなやつ！
line = "それ絶対に、洗剤入れすぎなやつ！"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうなの！？　クロトに言われた通り、カップ一杯分くらいで入れたはずなんだけど……」
line = "「そうなの！？　クロトに言われた通り、カップ一杯分くらいで入れたはずなんだけど……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「え？　カップ一杯分って、飲む時に使うコップの一杯分くらいって意味じゃないの！？」
line = "「え？　カップ一杯分って、飲む時に使うコップの一杯分くらいって意味じゃないの！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「カップじゃなくて、洗剤容器のキャップ！？　目盛りが付いてる？　気がつかなかったわ……！」
line = "「カップじゃなくて、洗剤容器のキャップ！？　目盛りが付いてる？　気がつかなかったわ……！」"

[[dialogue]]
speaker = "unk"
# そんなこんなで、ドタバタと午前中が過ぎていって――
line = "そんなこんなで、ドタバタと午前中が過ぎていって――"

[[dialogue]]
speaker = "ヴィーナス"
# 「自分のことだから知ってたけど……いざやってみようとすると私、全然家事ができないわ……」
line = "「自分のことだから知ってたけど……いざやってみようとすると私、全然家事ができないわ……」"

[[dialogue]]
speaker = "unk"
# 「でも、一生懸命頑張ってたよ」と俺はヴィーナスの頭を撫でる。
line = "「でも、一生懸命頑張ってたよ」と俺はヴィーナスの頭を撫でる。"

[[dialogue]]
speaker = "ヴィーナス"
# 「ん……♪」
line = "「ん……♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「こんなこと言ったら変かもしれないけど……」
line = "「こんなこと言ったら変かもしれないけど……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロトと一緒に掃除や洗濯をしてた時、これまでしたことがないはずなのに、なんだかすごく懐かしい気持ちになったわ」
line = "「クロトと一緒に掃除や洗濯をしてた時、これまでしたことがないはずなのに、なんだかすごく懐かしい気持ちになったわ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「だから、上手く行ってないけど……花嫁修業、ちょっと楽しいかも、なんて……」
line = "「だから、上手く行ってないけど……花嫁修業、ちょっと楽しいかも、なんて……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「って、そんな悠長なことを言ってる場合じゃないわよね！」
line = "「って、そんな悠長なことを言ってる場合じゃないわよね！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「早く花嫁修業を終えて、クロトに相応しい女の子にならないと――」
line = "「早く花嫁修業を終えて、クロトに相応しい女の子にならないと――」"

[[dialogue]]
speaker = "unk"
# 相応しいとか、気にしなくていい
line = "相応しいとか、気にしなくていい"

[[dialogue]]
speaker = "ヴィーナス"
# 「え？」
line = "「え？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「――私が花嫁修業を終えるまで、付きっきりで教えるから、焦らなくていい？」
line = "「――私が花嫁修業を終えるまで、付きっきりで教えるから、焦らなくていい？」"

[[dialogue]]
speaker = "unk"
# 一生できなきゃ、一生教える。魔王になって、世界を救って、それからゆっくり２人で家事をやればいい。
line = "一生できなきゃ、一生教える。魔王になって、世界を救って、それからゆっくり２人で家事をやればいい。"

[[dialogue]]
speaker = "unk"
# どんな運命でも、好きだからそばにいるよ
line = "どんな運命でも、好きだからそばにいるよ"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロト……！」
line = "「クロト……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私、そんなこと言われたら……」
line = "「私、そんなこと言われたら……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「嬉しくて、思わずハグしたくなっちゃうわ♪」
line = "「嬉しくて、思わずハグしたくなっちゃうわ♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あ……♪　えへへ♪　抱き締めてもらいながら、頭撫でられると、もっと嬉しくなっちゃう……<emoji=heart04>」
line = "「あ……♪　えへへ♪　抱き締めてもらいながら、頭撫でられると、もっと嬉しくなっちゃう……<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ねぇ、クロト……」
line = "「ねぇ、クロト……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「好き……<emoji=heart04>」
line = "「好き……<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
# 「少し……甘えてもいいかしら？」
line = "「少し……甘えてもいいかしら？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「キス、したいわ……<emoji=heart04>」
line = "「キス、したいわ……<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
# 「んっ……<emoji=heart04>　ちゅっ……<emoji=heart04>」
line = "「んっ……<emoji=heart04>　ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そうして、しばし甘い時を過ごしてから――
line = "そうして、しばし甘い時を過ごしてから――"

[[dialogue]]
speaker = "ヴィーナス"
# 「ありがと、クロト」
line = "「ありがと、クロト」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私……改めて宣言するわ」
line = "「私……改めて宣言するわ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「どんなに運命が最悪でも、クロトがそばにいてくれるなら、怖くない。だから――」
line = "「どんなに運命が最悪でも、クロトがそばにいてくれるなら、怖くない。だから――」"

[[dialogue]]
speaker = "ヴィーナス"
# 「正々堂々戦って、運命なんて木っ端ミジンコにしてみせるわ！」
line = "「正々堂々戦って、運命なんて木っ端ミジンコにしてみせるわ！」"

[[dialogue]]
speaker = "unk"
# そう言ってヴィーナスは、俺の好きな、堂々とした明るい笑顔を浮かべてみせるのだった――
line = "そう言ってヴィーナスは、俺の好きな、堂々とした明るい笑顔を浮かべてみせるのだった――"
