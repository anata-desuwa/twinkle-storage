[[dialogue]]
speaker = "unk"
# 第２話,幸せの匂い,P
line = "第２話,幸せの匂い,P"

[[dialogue]]
speaker = "unk"
# 巫女修行を経て、巫術を扱えるようになった後も、ルリエルは時々神社を訪れて訓練を継続していた。
line = "巫女修行を経て、巫術を扱えるようになった後も、ルリエルは時々神社を訪れて訓練を継続していた。"

[[dialogue]]
speaker = "unk"
# そして、その日はミヤハルが不在な代わりに、ある助っ人に特別講師をお願いしていた――
line = "そして、その日はミヤハルが不在な代わりに、ある助っ人に特別講師をお願いしていた――"

[[dialogue]]
speaker = "ルリエル"
# 「ヨミさん、すごいのです！　巫女の力をそんな自然に扱えるなんて！　ミヤハルさんにも負けてませんよ！」
line = "「ヨミさん、すごいのです！　巫女の力をそんな自然に扱えるなんて！　ミヤハルさんにも負けてませんよ！」"

[[dialogue]]
speaker = "ヨミ"
# 「なんか、改めてそんな風に褒められると、照れちゃいますね……」
line = "「なんか、改めてそんな風に褒められると、照れちゃいますね……」"

[[dialogue]]
speaker = "unk"
# 新星学園１年生の<ruby=あまがさき>天ヶ崎</ruby>ヨミ。魔界で３０００年の歴史を持つ『<ruby=あまがさき>天ヶ崎</ruby>神宮』を守ってきた一族の末裔で、彼女もまた巫女の星騎士だ。
line = "新星学園１年生の<ruby>天ヶ崎<rt>あまがさき</rt></ruby>ヨミ。魔界で３０００年の歴史を持つ『<ruby>天ヶ崎<rt>あまがさき</rt></ruby>神宮』を守ってきた一族の末裔で、彼女もまた巫女の星騎士だ。"

[[dialogue]]
speaker = "ヨミ"
# 「私の場合は、子供の頃から巫女のお母さんに力の扱い方を教えてもらっていたので、使い慣れているんです」
line = "「私の場合は、子供の頃から巫女のお母さんに力の扱い方を教えてもらっていたので、使い慣れているんです」"

[[dialogue]]
speaker = "ヨミ"
# 「ただ、リズム感が無いせいで、巫女舞を必要とする術は、未だに全然使えないんですけどね……」
line = "「ただ、リズム感が無いせいで、巫女舞を必要とする術は、未だに全然使えないんですけどね……」"

[[dialogue]]
speaker = "ルリエル"
# 「大丈夫です！　誰にだって苦手なことはあるのです♪　それに、伝説のクルセイダースが使っていた『破邪の鈴』を操れるのは、ヨミさんだけなんですよね？」
line = "「大丈夫です！　誰にだって苦手なことはあるのです♪　それに、伝説のクルセイダースが使っていた『破邪の鈴』を操れるのは、ヨミさんだけなんですよね？」"

[[dialogue]]
speaker = "ルリエル"
# 「だから、ヨミさんはたとえ舞が踊れなくても、すごい巫女さんなのです！　ルリエルは尊敬します！」
line = "「だから、ヨミさんはたとえ舞が踊れなくても、すごい巫女さんなのです！　ルリエルは尊敬します！」"

[[dialogue]]
speaker = "ヨミ"
# 「あ、ありがとうございます。そう言ってもらえると……なんだか自信を持てます♪　えへへ♪」
line = "「あ、ありがとうございます。そう言ってもらえると……なんだか自信を持てます♪　えへへ♪」"

[[dialogue]]
speaker = "unk"
# （ルリエルの素直な言葉はやっぱり強いな）
line = "（ルリエルの素直な言葉はやっぱり強いな）"

[[dialogue]]
speaker = "unk"
# 訓練を見学しに来ていた俺は、恋人として誇らしい気持ちになる。
line = "訓練を見学しに来ていた俺は、恋人として誇らしい気持ちになる。"

[[dialogue]]
speaker = "ルリエル"
# 「それで、ヨミさんみたいな立派な巫女さんになれるように、お聞きしたいのですが――」
line = "「それで、ヨミさんみたいな立派な巫女さんになれるように、お聞きしたいのですが――」"

[[dialogue]]
speaker = "ルリエル"
# 「ヨミさんの持っている<b>煩悩</b>は、一体どんなものなのです？」
line = "「ヨミさんの持っている<b>煩悩</b>は、一体どんなものなのです？」"

[[dialogue]]
speaker = "ヨミ"
# 「こやっ！？　ぼ、煩悩ですか！？」
line = "「こやっ！？　ぼ、煩悩ですか！？」"

[[dialogue]]
speaker = "ルリエル"
# 「はい！　ルリエル達も巫女修行の時に煩悩を解放したので、気になるのです！」
line = "「はい！　ルリエル達も巫女修行の時に煩悩を解放したので、気になるのです！」"

[[dialogue]]
speaker = "unk"
# 俺もルリエルやマトイから話に聞いていたが、どうやら巫女の力を操るには『煩悩<ruby=げだつ>解脱</ruby>』というものをする必要があるらしい。
line = "俺もルリエルやマトイから話に聞いていたが、どうやら巫女の力を操るには『煩悩<ruby>解脱<rt>げだつ</rt></ruby>』というものをする必要があるらしい。"

[[dialogue]]
speaker = "ヨミ"
# 「ええっとぉ……」
line = "「ええっとぉ……」"

[[dialogue]]
speaker = "ヨミ"
# （ど、どうしよう！？　私の場合、物心付く前からなんとなく巫女の力を使えていたので、実は煩悩<ruby=げだつ>解脱</ruby>の修業は全然やったことなくて……！）
line = "（ど、どうしよう！？　私の場合、物心付く前からなんとなく巫女の力を使えていたので、実は煩悩<ruby>解脱<rt>げだつ</rt></ruby>の修業は全然やったことなくて……！）"

[[dialogue]]
speaker = "ルリエル"
# 「わくわく♪」
line = "「わくわく♪」"

[[dialogue]]
speaker = "ヨミ"
# （う……ルリエルさん、すごい期待の眼差しをこちらに向けて来てます……！）
line = "（う……ルリエルさん、すごい期待の眼差しをこちらに向けて来てます……！）"

[[dialogue]]
speaker = "ヨミ"
# （こ、ここは、たとえやったことがなくても、天ヶ崎家の巫女として、ちゃんと答えないと！）
line = "（こ、ここは、たとえやったことがなくても、天ヶ崎家の巫女として、ちゃんと答えないと！）"

[[dialogue]]
speaker = "ヨミ"
# 「に……」
line = "「に……」"

[[dialogue]]
speaker = "ルリエル"
# 「に？」
line = "「に？」"

[[dialogue]]
speaker = "ヨミ"
# 「――匂いフェチです！！！」
line = "「――匂いフェチです！！！」"

[[dialogue]]
speaker = "unk"
# ぶっちゃけてきた！？
line = "ぶっちゃけてきた！？"

[[dialogue]]
speaker = "ルリエル"
# 「匂いフェチ？　それは一体、どういう煩悩なのです？」
line = "「匂いフェチ？　それは一体、どういう煩悩なのです？」"

[[dialogue]]
speaker = "ヨミ"
# 「まさかの伝わってない！？」
line = "「まさかの伝わってない！？」"

[[dialogue]]
speaker = "ヨミ"
# 「ええっと、簡単に言うとですね……匂いが好きといいますか……」
line = "「ええっと、簡単に言うとですね……匂いが好きといいますか……」"

[[dialogue]]
speaker = "ルリエル"
# 「ふむふむ。どんな匂いが好きなのですか？」
line = "「ふむふむ。どんな匂いが好きなのですか？」"

[[dialogue]]
speaker = "ヨミ"
# 「そ、それはぁ……ヒトの体の匂いとか、そのぉ……」
line = "「そ、それはぁ……ヒトの体の匂いとか、そのぉ……」"

[[dialogue]]
speaker = "ルリエル"
# 「ヒトの？　ん～、例えばどんな感じの……」
line = "「ヒトの？　ん～、例えばどんな感じの……」"

[[dialogue]]
speaker = "ヨミ"
# 「こやや！？　こ――」
line = "「こやや！？　こ――」"

[[dialogue]]
speaker = "ヨミ"
# 「これ以上は会長さんも居る前では恥ずかしくて言えませぇ～んっ！！　ごめんなさいっ！　こやああぁぁ～～～んっ！！！」
line = "「これ以上は会長さんも居る前では恥ずかしくて言えませぇ～んっ！！　ごめんなさいっ！　こやああぁぁ～～～んっ！！！」"

[[dialogue]]
speaker = "ルリエル"
# 「えぇっ！？　そんなぁ～！　その先がすごく気になるのに～！？」
line = "「えぇっ！？　そんなぁ～！　その先がすごく気になるのに～！？」"

[[dialogue]]
speaker = "ルリエル"
# 「……こうなったら、実際に試してみるのしかないのです！」
line = "「……こうなったら、実際に試してみるのしかないのです！」"

[[dialogue]]
speaker = "ルリエル"
# 「会長さん、失礼します！」
line = "「会長さん、失礼します！」"

[[dialogue]]
speaker = "unk"
# えっ、ルリエル！？
line = "えっ、ルリエル！？"

[[dialogue]]
speaker = "ルリエル"
# 「くんくん……！」
line = "「くんくん……！」"

[[dialogue]]
speaker = "ヨミ"
# 「こやっ！？　ルリエルさん、会長さんの匂いを嗅いで……！？」
line = "「こやっ！？　ルリエルさん、会長さんの匂いを嗅いで……！？」"

[[dialogue]]
speaker = "ルリエル"
# 「あっ……！　くんくん<emoji=heart04>　くんくんくん<emoji=heart04>」
line = "「あっ……！　くんくん<emoji=heart04>　くんくんくん<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
# 「――えへへ<emoji=heart04>　ヨミさんの言っている意味が、ちょっとわかったかもなのです♪」
line = "「――えへへ<emoji=heart04>　ヨミさんの言っている意味が、ちょっとわかったかもなのです♪」"

[[dialogue]]
speaker = "ルリエル"
# 「会長さんの匂い、なんだかすごくクセになりそうな感じがするのです<emoji=heart04>　嗅いでいると安心して落ち着くというか、ずっと包まれていたくなる感じで……<emoji=heart04>」
line = "「会長さんの匂い、なんだかすごくクセになりそうな感じがするのです<emoji=heart04>　嗅いでいると安心して落ち着くというか、ずっと包まれていたくなる感じで……<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
# 「もっと試してみたくなっちゃうのです♪　え～いっ<emoji=heart04>」
line = "「もっと試してみたくなっちゃうのです♪　え～いっ<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
# 「くんくん<emoji=heart04>　くんくん<emoji=heart04>」
line = "「くんくん<emoji=heart04>　くんくん<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
# 「こやっ！？　会長さんに『だいしゅきホールド』で抱き着いたりして、大胆な！？　こやや……<emoji=heart04>」
line = "「こやっ！？　会長さんに『だいしゅきホールド』で抱き着いたりして、大胆な！？　こやや……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ヨミが見てる！　見てるから！！
line = "ヨミが見てる！　見てるから！！"

[[dialogue]]
speaker = "unk"
# ちょっ、ルリエル！
line = "ちょっ、ルリエル！"

[[dialogue]]
speaker = "ルリエル"
# 「えへへへへへぇ<emoji=heart04>　会長さん、幸せな匂いがするのです……<emoji=heart04>　くんくん<emoji=heart04>」
line = "「えへへへへへぇ<emoji=heart04>　会長さん、幸せな匂いがするのです……<emoji=heart04>　くんくん<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# それからしばらく、ルリエルは幸せそうな顔で、俺に抱き着いたままでいるのであった――
line = "それからしばらく、ルリエルは幸せそうな顔で、俺に抱き着いたままでいるのであった――"
