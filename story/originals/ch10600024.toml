[[dialogue]]
speaker = "unk"
# 第４話,窮屈なこともあるけれど,P
line = "第４話,窮屈なこともあるけれど,P"

[[dialogue]]
speaker = "unk"
# 最近──レミカと２人きりの時間があまり取れていない。彼女は売れっ子のアイドルだからそれは当然なのだけど……
line = "最近──レミカと２人きりの時間があまり取れていない。彼女は売れっ子のアイドルだからそれは当然なのだけど……"

[[dialogue]]
speaker = "unk"
# 事務所の方から『ゴシップ記者がうろついているから気を付けて』という指示が出たこともあって、俺の家へも招けない日々が続いていた。
line = "事務所の方から『ゴシップ記者がうろついているから気を付けて』という指示が出たこともあって、俺の家へも招けない日々が続いていた。"

[[dialogue]]
speaker = "unk"
# そうなれば当然……
line = "そうなれば当然……"

[[dialogue]]
speaker = "レミカ"
# 「星徒会室でデートするしかないよね」
line = "「星徒会室でデートするしかないよね」"

[[dialogue]]
speaker = "unk"
# そうなっちゃうね
line = "そうなっちゃうね"

[[dialogue]]
speaker = "レミカ"
# 「今さらだけど、会長が星徒会長でよかったかも。学園の星徒会室なら、セキュリティもばっちりだし」
line = "「今さらだけど、会長が星徒会長でよかったかも。学園の星徒会室なら、セキュリティもばっちりだし」"

[[dialogue]]
speaker = "レミカ"
# 「流石のゴシップ記者も学園内までは入れないし、星騎士の風紀委員もいるから、天然の要塞って感じかな」
line = "「流石のゴシップ記者も学園内までは入れないし、星騎士の風紀委員もいるから、天然の要塞って感じかな」"

[[dialogue]]
speaker = "レミカ"
# 「で、今日は本当にもう誰も来ないの？　……そっか、会長だけが居残りなんだ」
line = "「で、今日は本当にもう誰も来ないの？　……そっか、会長だけが居残りなんだ」"

[[dialogue]]
speaker = "レミカ"
# 「だったら……恋人特権ってことで。お仕事を応援する格好になっちゃおうかな」
line = "「だったら……恋人特権ってことで。お仕事を応援する格好になっちゃおうかな」"

[[dialogue]]
speaker = "レミカ"
# 「会長のお気に入りのキュートスタイルで応援してあげる。どうかな？」
line = "「会長のお気に入りのキュートスタイルで応援してあげる。どうかな？」"

[[dialogue]]
speaker = "unk"
# すごく元気が出るよ
line = "すごく元気が出るよ"

[[dialogue]]
speaker = "unk"
# ありがとう！
line = "ありがとう！"

[[dialogue]]
speaker = "レミカ"
# 「ふふ、それならよかった。窮屈なお付き合いさせちゃってるお詫びに、書類仕事がはかどる音楽でも弾いてあげるよ」
line = "「ふふ、それならよかった。窮屈なお付き合いさせちゃってるお詫びに、書類仕事がはかどる音楽でも弾いてあげるよ」"

[[dialogue]]
speaker = "レミカ"
# 「他にも喉が渇いたとか、癒しが欲しい～、とか。リクエストはなんでもどうぞ？　今日は私が会長のマネージャーってことで」
line = "「他にも喉が渇いたとか、癒しが欲しい～、とか。リクエストはなんでもどうぞ？　今日は私が会長のマネージャーってことで」"

[[dialogue]]
speaker = "レミカ"
# 「パフォーマンスが上がることならなんでもしてあげるから。遠慮はいらないよ？」
line = "「パフォーマンスが上がることならなんでもしてあげるから。遠慮はいらないよ？」"

[[dialogue]]
speaker = "unk"
# 恋人が可愛らしい衣装で応援してくれたおかげか、俺はその日のタスクをあっという間に達成した。
line = "恋人が可愛らしい衣装で応援してくれたおかげか、俺はその日のタスクをあっという間に達成した。"

[[dialogue]]
speaker = "unk"
# そうなれば後はフリー。学園の門が閉まるまで、レミカと２人きりの時間だ。
line = "そうなれば後はフリー。学園の門が閉まるまで、レミカと２人きりの時間だ。"

[[dialogue]]
speaker = "レミカ"
# 「んっ……ちゅ、んちゅっ……ちゅっ……ぷぁ<emoji=heart04>」
line = "「んっ……ちゅ、んちゅっ……ちゅっ……ぷぁ<emoji=heart04>」"

[[dialogue]]
speaker = "レミカ"
# 「仕事が終わった途端に、キスして欲しいって……ちゅ、んちゅっ……んん<emoji=heart04>」
line = "「仕事が終わった途端に、キスして欲しいって……ちゅ、んちゅっ……んん<emoji=heart04>」"

[[dialogue]]
speaker = "レミカ"
# 「……ちょっとうらやましいかも。私も仕事が終わった後に、キスで癒してくれるマネージャーが欲しいな」
line = "「……ちょっとうらやましいかも。私も仕事が終わった後に、キスで癒してくれるマネージャーが欲しいな」"

[[dialogue]]
speaker = "レミカ"
# 「会長が、星徒会長じゃなかったらな……私の事務所のバイトに応募してもらって、即日で付き人に採用しちゃえるのに」
line = "「会長が、星徒会長じゃなかったらな……私の事務所のバイトに応募してもらって、即日で付き人に採用しちゃえるのに」"

[[dialogue]]
speaker = "レミカ"
# 「うん、無理なのはわかってるよ。だからこういう時間は大切にしたいな……もっとキス、してくれる？」
line = "「うん、無理なのはわかってるよ。だからこういう時間は大切にしたいな……もっとキス、してくれる？」"

[[dialogue]]
speaker = "レミカ"
# 「ちゅ、んちゅっ……ちゅぅっ……ちゅーっ……<emoji=heart04>」
line = "「ちゅ、んちゅっ……ちゅぅっ……ちゅーっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# その後も俺たちは、閉門ぎりぎりまで星徒会室で時間を過ごし……
line = "その後も俺たちは、閉門ぎりぎりまで星徒会室で時間を過ごし……"

[[dialogue]]
speaker = "レミカ"
# 「──うん。忘れ物もない。パーフェクト」
line = "「──うん。忘れ物もない。パーフェクト」"

[[dialogue]]
speaker = "レミカ"
# 「それじゃあ帰ろっか、会長。明日からまたしばらく時間取れないけど、電話やチャットはたくさんするから」
line = "「それじゃあ帰ろっか、会長。明日からまたしばらく時間取れないけど、電話やチャットはたくさんするから」"

[[dialogue]]
speaker = "レミカ"
# 「……今さらだけどごめんね。付き合い始めたばっかりだし、もっと２人の時間が取れたらいいんだけど」
line = "「……今さらだけどごめんね。付き合い始めたばっかりだし、もっと２人の時間が取れたらいいんだけど」"

[[dialogue]]
speaker = "unk"
# 気にしないで欲しい
line = "気にしないで欲しい"

[[dialogue]]
speaker = "unk"
# アイドルを頑張るレミカが好きだから
line = "アイドルを頑張るレミカが好きだから"

[[dialogue]]
speaker = "レミカ"
# 「会長って……そういう嬉しいこと、まっすぐ言ってくれるよね。うん、そのまっすぐさにすごく救われてるよ、私」
line = "「会長って……そういう嬉しいこと、まっすぐ言ってくれるよね。うん、そのまっすぐさにすごく救われてるよ、私」"

[[dialogue]]
speaker = "レミカ"
# 「窮屈な思いをさせちゃうこともあるけれど……これからもよろしく」
line = "「窮屈な思いをさせちゃうこともあるけれど……これからもよろしく」"

[[dialogue]]
speaker = "レミカ"
# 「あ、そうだ。パーフェクトって言ったけど……忘れ物があったかも」
line = "「あ、そうだ。パーフェクトって言ったけど……忘れ物があったかも」"

[[dialogue]]
speaker = "レミカ"
# 「はい、じっとして……」
line = "「はい、じっとして……」"

[[dialogue]]
speaker = "レミカ"
# 「……ちゅっ<emoji=heart04>　ふふ♪」
line = "「……ちゅっ<emoji=heart04>　ふふ♪」"

[[dialogue]]
speaker = "レミカ"
# 「それじゃ今度こそ帰ろう、会長？」
line = "「それじゃ今度こそ帰ろう、会長？」"

[[dialogue]]
speaker = "unk"
# わざわざお別れのキスをするためだけにマスクを下げてくれた恋人の仕草にドキドキした俺は、その日の夜はなかなか寝付けないのだった──
line = "わざわざお別れのキスをするためだけにマスクを下げてくれた恋人の仕草にドキドキした俺は、その日の夜はなかなか寝付けないのだった──"
