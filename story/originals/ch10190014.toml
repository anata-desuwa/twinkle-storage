[[dialogue]]
speaker = "unk"
# 第４話,開発されてしまったんだ,P
line = "第４話,開発されてしまったんだ,P"

[[dialogue]]
speaker = "unk"
# せつなのお試し『主様』としての期間も大分長くなって来たある日のこと――
line = "せつなのお試し『主様』としての期間も大分長くなって来たある日のこと――"

[[dialogue]]
speaker = "せつな"
# 「よし、掃除と洗濯、上手く行きましてにござる♪」
line = "「よし、掃除と洗濯、上手く行きましてにござる♪」"

[[dialogue]]
speaker = "せつな"
# 「おや？　主様、せつなの顔に何か付いておりまするか？」
line = "「おや？　主様、せつなの顔に何か付いておりまするか？」"

[[dialogue]]
speaker = "unk"
# 家で一緒に居るのも馴染んで来たなって
line = "家で一緒に居るのも馴染んで来たなって"

[[dialogue]]
speaker = "せつな"
# 「おおっ、ということは、せつなのメイド力も上がって来たということでござるな！」
line = "「おおっ、ということは、せつなのメイド力も上がって来たということでござるな！」"

[[dialogue]]
speaker = "せつな"
# 「苦手な家事を克服する為、リノ殿に師事して早数か月。修行して良かったでござる♪　主様の側に仕える忍として、恥ずかしくない存在にならねばなりませぬから」
line = "「苦手な家事を克服する為、リノ殿に師事して早数か月。修行して良かったでござる♪　主様の側に仕える忍として、恥ずかしくない存在にならねばなりませぬから」"

[[dialogue]]
speaker = "せつな"
# 「え？　頑張ったご褒美でござるか？　な、何でもして欲しいこと……それなら――」
line = "「え？　頑張ったご褒美でござるか？　な、何でもして欲しいこと……それなら――」"

[[dialogue]]
speaker = "せつな"
# 「ふにゃあ……♪　ごろごろ……♪」
line = "「ふにゃあ……♪　ごろごろ……♪」"

[[dialogue]]
speaker = "unk"
# いつもと変わらなくない？
line = "いつもと変わらなくない？"

[[dialogue]]
speaker = "unk"
# ご褒美が『おうちデート』って
line = "ご褒美が『おうちデート』って"

[[dialogue]]
speaker = "せつな"
# 「いやいや、大違いでござる。今日はせつなのご褒美であるが故、主様と好きに過ごさせて貰うのでござるにゃん♪」
line = "「いやいや、大違いでござる。今日はせつなのご褒美であるが故、主様と好きに過ごさせて貰うのでござるにゃん♪」"

[[dialogue]]
speaker = "せつな"
# 「たとえばこうして、主様に膝枕をして貰ったり」
line = "「たとえばこうして、主様に膝枕をして貰ったり」"

[[dialogue]]
speaker = "unk"
# 最近割とやってないか？
line = "最近割とやってないか？"

[[dialogue]]
speaker = "せつな"
# 「頭をよしよしと撫でて貰ったり……あっ、そこそこ<emoji=heart04>　主様の手、好きでござるぅ……<emoji=heart04>」
line = "「頭をよしよしと撫でて貰ったり……あっ、そこそこ<emoji=heart04>　主様の手、好きでござるぅ……<emoji=heart04>」"

[[dialogue]]
speaker = "せつな"
# 「……はて？　でも、主様の言う通り、これも最近よくやって貰っているような……？」
line = "「……はて？　でも、主様の言う通り、これも最近よくやって貰っているような……？」"

[[dialogue]]
speaker = "せつな"
# 「そもそも、主様の家に出入りするようになったきっかけって、何でござったか……？　そう、確か恋愛に慣れる為、家でもデートするようになったのが始まりで……」
line = "「そもそも、主様の家に出入りするようになったきっかけって、何でござったか……？　そう、確か恋愛に慣れる為、家でもデートするようになったのが始まりで……」"

[[dialogue]]
speaker = "unk"
# いつの間にか普通になって、今に至る感じだ
line = "いつの間にか普通になって、今に至る感じだ"

[[dialogue]]
speaker = "せつな"
# 「ということはせつな、自分でも無自覚の内に、デートに慣れていたと！？」
line = "「ということはせつな、自分でも無自覚の内に、デートに慣れていたと！？」"

[[dialogue]]
speaker = "せつな"
# 「い、いつの間にかせつな、主様に開発されて、ド変態になってしまったでござる……！」
line = "「い、いつの間にかせつな、主様に開発されて、ド変態になってしまったでござる……！」"

[[dialogue]]
speaker = "unk"
# また今度、おでかけデートでもするか？
line = "また今度、おでかけデートでもするか？"

[[dialogue]]
speaker = "unk"
# 言い方！　でも、慣れて来たなら
line = "言い方！　でも、慣れて来たなら"

[[dialogue]]
speaker = "せつな"
# 「そ、それは恥ずかしいでござる！　人目のあるところでは、恋愛は忍ぶものでござる！」
line = "「そ、それは恥ずかしいでござる！　人目のあるところでは、恋愛は忍ぶものでござる！」"

[[dialogue]]
speaker = "せつな"
# 「忍者として、もっとレベルアップしないとダメ？　うぅ……それを言われてしまうと……」
line = "「忍者として、もっとレベルアップしないとダメ？　うぅ……それを言われてしまうと……」"

[[dialogue]]
speaker = "せつな"
# 「というか、何か恋愛事と意識したら、主様とこうしてスキンシップしているのも、こ、恋人のようで恥ずかしく思えて来たでござる……！　って、ふあぁっ<emoji=heart04>」
line = "「というか、何か恋愛事と意識したら、主様とこうしてスキンシップしているのも、こ、恋人のようで恥ずかしく思えて来たでござる……！　って、ふあぁっ<emoji=heart04>」"

[[dialogue]]
speaker = "せつな"
# 「いきなり耳と顎を優しく撫でるのは、ダメでござるよぉ！　んんっ……そこはせつなの弱いところでござるにゃん<emoji=heart04>」
line = "「いきなり耳と顎を優しく撫でるのは、ダメでござるよぉ！　んんっ……そこはせつなの弱いところでござるにゃん<emoji=heart04>」"

[[dialogue]]
speaker = "せつな"
# 「あ、主様……あんっ<emoji=heart04>　せつな、せつな気持ち良くて、とろけちゃ…………あれ？」
line = "「あ、主様……あんっ<emoji=heart04>　せつな、せつな気持ち良くて、とろけちゃ…………あれ？」"

[[dialogue]]
speaker = "せつな"
# 「ど、どうして突然、止めちゃうのでござるか……？」
line = "「ど、どうして突然、止めちゃうのでござるか……？」"

[[dialogue]]
speaker = "せつな"
# 「して欲しかったら、おでかけデートするのが条件？　そ、それを交渉材料にされてしまうと断れないでござるよぉ……」
line = "「して欲しかったら、おでかけデートするのが条件？　そ、それを交渉材料にされてしまうと断れないでござるよぉ……」"

[[dialogue]]
speaker = "せつな"
# 「ふにゃあ……顎と耳の撫で撫で来たぁ<emoji=heart04>　わ、わかったでござるぅ……主様の言うこと、何でも聞きまするぅ<emoji=heart04>　にゃあん<emoji=heart04>　ごろごろ<emoji=heart04>」
line = "「ふにゃあ……顎と耳の撫で撫で来たぁ<emoji=heart04>　わ、わかったでござるぅ……主様の言うこと、何でも聞きまするぅ<emoji=heart04>　にゃあん<emoji=heart04>　ごろごろ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# よしよし。良い子だ
line = "よしよし。良い子だ"

[[dialogue]]
speaker = "せつな"
# 「……ふぅ、ふぅ……や、やはりせつな、いつの間にか主様に開発されている気がするでござる……！」
line = "「……ふぅ、ふぅ……や、やはりせつな、いつの間にか主様に開発されている気がするでござる……！」"

[[dialogue]]
speaker = "せつな"
# 「違う？　逆でござるか？　せつなのせい？　それはどういう……」
line = "「違う？　逆でござるか？　せつなのせい？　それはどういう……」"

[[dialogue]]
speaker = "unk"
# つい意地悪になっちゃうんだ
line = "つい意地悪になっちゃうんだ"

[[dialogue]]
speaker = "unk"
# せつなが可愛いから
line = "せつなが可愛いから"

[[dialogue]]
speaker = "せつな"
# 「か、可愛い！？　主様がせつなのことをそんな風に！？　あわわわわわわ……！」
line = "「か、可愛い！？　主様がせつなのことをそんな風に！？　あわわわわわわ……！」"

[[dialogue]]
speaker = "せつな"
# 「な、何でいきなりそんなこと！？　せつな、ドキドキして、恥ずかしくなってしまうでござる！」
line = "「な、何でいきなりそんなこと！？　せつな、ドキドキして、恥ずかしくなってしまうでござる！」"

[[dialogue]]
speaker = "せつな"
# 「なっ、せつなからエッチに開発されてしまった！？　まさか、日頃胸を押し付けたり、パンチラをしたりと房中術をし続けたせいでござるか！？」
line = "「なっ、せつなからエッチに開発されてしまった！？　まさか、日頃胸を押し付けたり、パンチラをしたりと房中術をし続けたせいでござるか！？」"

[[dialogue]]
speaker = "せつな"
# 「せ、責任を取れでござるか！？　申し訳ありませぬ！　でも、一体どうすれば――」
line = "「せ、責任を取れでござるか！？　申し訳ありませぬ！　でも、一体どうすれば――」"

[[dialogue]]
speaker = "unk"
# 俺専属の忍者になって欲しい
line = "俺専属の忍者になって欲しい"

[[dialogue]]
speaker = "unk"
# 責任を取って
line = "責任を取って"

[[dialogue]]
speaker = "せつな"
# 「かくなる上はこのせつな、切腹してお詫びを！　……って、え？　今なんて？」
line = "「かくなる上はこのせつな、切腹してお詫びを！　……って、え？　今なんて？」"

[[dialogue]]
speaker = "せつな"
# 「主様専属の忍者？　それってつまり……お試しではなく、せつなの正式な主様になってくれるということでござるか！？」
line = "「主様専属の忍者？　それってつまり……お試しではなく、せつなの正式な主様になってくれるということでござるか！？」"

[[dialogue]]
speaker = "せつな"
# 「えぇっ！？　何これドッキリでござるか！？　新たな訓練的なそういう……って、主様！　何故笑うのでござるか！？　やはりドッキリでござるか！？　そうなのでござるか！？」
line = "「えぇっ！？　何これドッキリでござるか！？　新たな訓練的なそういう……って、主様！　何故笑うのでござるか！？　やはりドッキリでござるか！？　そうなのでござるか！？」"

[[dialogue]]
speaker = "せつな"
# 「も、もちろん嫌ではないでござる！　こんなに嬉しいことはありませぬ！　でも、何だか現実感が無くて……せつなはまだまだ未熟者でござるから」
line = "「も、もちろん嫌ではないでござる！　こんなに嬉しいことはありませぬ！　でも、何だか現実感が無くて……せつなはまだまだ未熟者でござるから」"

[[dialogue]]
speaker = "せつな"
# 「主様も同じ？　そんなことは無いでござる！　会長になってまだ期間は短いかもしれませぬが、その頑張りはせつなが近くで見て来て、よく知っているでござる！」
line = "「主様も同じ？　そんなことは無いでござる！　会長になってまだ期間は短いかもしれませぬが、その頑張りはせつなが近くで見て来て、よく知っているでござる！」"

[[dialogue]]
speaker = "unk"
# 俺もせつなの頑張りを見て来たよ
line = "俺もせつなの頑張りを見て来たよ"

[[dialogue]]
speaker = "unk"
# だから、これからも側で支えて欲しい。一緒に成長して行こう。そう伝えた。
line = "だから、これからも側で支えて欲しい。一緒に成長して行こう。そう伝えた。"

[[dialogue]]
speaker = "せつな"
# 「あ……！」
line = "「あ……！」"

[[dialogue]]
speaker = "せつな"
# 「は、はい、主様……！　せつなは――」
line = "「は、はい、主様……！　せつなは――」"

[[dialogue]]
speaker = "せつな"
# 「せつなは主様が望んでくれるなら、この身を尽くしてお仕え致しまする……！」
line = "「せつなは主様が望んでくれるなら、この身を尽くしてお仕え致しまする……！」"

[[dialogue]]
speaker = "せつな"
# 「あ……主様の手、温かいでござる<emoji=heart04>　えへへ……<emoji=heart04>」
line = "「あ……主様の手、温かいでござる<emoji=heart04>　えへへ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 頭を優しく撫でると、せつなはとても幸せそうな笑顔を浮かべるのだった。
line = "頭を優しく撫でると、せつなはとても幸せそうな笑顔を浮かべるのだった。"
