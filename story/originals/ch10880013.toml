[[dialogue]]
speaker = "unk"
# 第３話,妹と遊園地,P
line = "第３話,妹と遊園地,P"

[[dialogue]]
speaker = "リーナ"
# 「えへへ、お兄ちゃんと遊園地なんて夢みたい♪　連れてきてくれてありがとう、お兄ちゃん<emoji=heart04>」
line = "「えへへ、お兄ちゃんと遊園地なんて夢みたい♪　連れてきてくれてありがとう、お兄ちゃん<emoji=heart04>」"

[[dialogue]]
speaker = "リーナ"
# 「遊園地ってあんまり来たことないからワクワクするな～♪　コーヒーカップに乗って～、チュロス食べて～、最後は観覧車でお兄ちゃんと街を眺めるのっ」
line = "「遊園地ってあんまり来たことないからワクワクするな～♪　コーヒーカップに乗って～、チュロス食べて～、最後は観覧車でお兄ちゃんと街を眺めるのっ」"

[[dialogue]]
speaker = "リーナ"
# 「あ、でもジェットコースターは怖いからイヤ。リーナは絶対に乗らないからね」
line = "「あ、でもジェットコースターは怖いからイヤ。リーナは絶対に乗らないからね」"

[[dialogue]]
speaker = "unk"
# そもそもリーナの身長で乗れる？
line = "そもそもリーナの身長で乗れる？"

[[dialogue]]
speaker = "リーナ"
# 「もう、リーナそんなにちっちゃくないもんっ。お兄ちゃんのイジワル～」
line = "「もう、リーナそんなにちっちゃくないもんっ。お兄ちゃんのイジワル～」"

[[dialogue]]
speaker = "リーナ"
# 「さ、行こ！　早くしないとアトラクション並んじゃうよっ」
line = "「さ、行こ！　早くしないとアトラクション並んじゃうよっ」"

[[dialogue]]
speaker = "リーナ"
# 「アハハッ、アハハハハッ♪　コーヒーカップ楽しい～♪」
line = "「アハハッ、アハハハハッ♪　コーヒーカップ楽しい～♪」"

[[dialogue]]
speaker = "リーナ"
# 「ん～♪　チュロスもシナモンたっぷりで美味しい♪　もう１本食べちゃおっかな～♪」
line = "「ん～♪　チュロスもシナモンたっぷりで美味しい♪　もう１本食べちゃおっかな～♪」"

[[dialogue]]
speaker = "リーナ"
# 「お兄ちゃん、次は何乗る？　リーナ、お兄ちゃんと一緒にメリーゴーランドに──」
line = "「お兄ちゃん、次は何乗る？　リーナ、お兄ちゃんと一緒にメリーゴーランドに──」"

[[dialogue]]
speaker = "女の子"
# 「ママ～、ジェットコースターのってみた～い」
line = "「ママ～、ジェットコースターのってみた～い」"

[[dialogue]]
speaker = "母親"
# 「危ないから、もっと大きくなったらね」
line = "「危ないから、もっと大きくなったらね」"

[[dialogue]]
speaker = "父親"
# 「よし、その時はパパと乗ろう！　ジェットコースターは楽しいぞ～」
line = "「よし、その時はパパと乗ろう！　ジェットコースターは楽しいぞ～」"

[[dialogue]]
speaker = "リーナ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "男の子"
# 「へへっ、オレはもう乗れるからな。次ジェットコースター行こうっと」
line = "「へへっ、オレはもう乗れるからな。次ジェットコースター行こうっと」"

[[dialogue]]
speaker = "女の子"
# 「あ～、お兄ちゃんのイジワル～！」
line = "「あ～、お兄ちゃんのイジワル～！」"

[[dialogue]]
speaker = "リーナ"
# 「おにい……ちゃん……」
line = "「おにい……ちゃん……」"

[[dialogue]]
speaker = "unk"
# （やっぱり家族やお兄ちゃんが気になるんだ）
line = "（やっぱり家族やお兄ちゃんが気になるんだ）"

[[dialogue]]
speaker = "リーナ"
# 「あ、ごめん、ぼーっとしてた。お兄ちゃんがせっかく連れてきてくれたんだから、ちゃんと楽しまないとダメだよね」
line = "「あ、ごめん、ぼーっとしてた。お兄ちゃんがせっかく連れてきてくれたんだから、ちゃんと楽しまないとダメだよね」"

[[dialogue]]
speaker = "サチ"
# 「あっ、お兄さん。こんなところで奇遇ですね」
line = "「あっ、お兄さん。こんなところで奇遇ですね」"

[[dialogue]]
speaker = "サチ"
# 「ロストアイテムがあるかもという噂を聞きつけて遊園地に来たんですが、ハズレみたいでした。まぁ、事件が起こらなかったという意味では幸運だったかもしれませんけど」
line = "「ロストアイテムがあるかもという噂を聞きつけて遊園地に来たんですが、ハズレみたいでした。まぁ、事件が起こらなかったという意味では幸運だったかもしれませんけど」"

[[dialogue]]
speaker = "リーナ"
# 「ねぇ、お兄ちゃん……その子、誰？　お兄ちゃんの妹はリーナだけだよね？」
line = "「ねぇ、お兄ちゃん……その子、誰？　お兄ちゃんの妹はリーナだけだよね？」"

[[dialogue]]
speaker = "サチ"
# 「！？　この殺気……もしかして報告に挙がっていたコラプサー？　どうしてお兄さんと──」
line = "「！？　この殺気……もしかして報告に挙がっていたコラプサー？　どうしてお兄さんと──」"

[[dialogue]]
speaker = "サチ"
# 「というか、お兄ちゃんって、また妹が増えたんですか……？」
line = "「というか、お兄ちゃんって、また妹が増えたんですか……？」"

[[dialogue]]
speaker = "リーナ"
# 「お兄ちゃんの妹はリーナだけで十分だよね？　他の妹はいらないよね？　……ね？」
line = "「お兄ちゃんの妹はリーナだけで十分だよね？　他の妹はいらないよね？　……ね？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「おやおや修羅場ですか？　修羅場ですね？」
line = "「おやおや修羅場ですか？　修羅場ですね？」"

[[dialogue]]
speaker = "リーナ"
# 「きゃっ！？　クローバーの髪飾りがしゃべった！？」
line = "「きゃっ！？　クローバーの髪飾りがしゃべった！？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「まぁまぁ落ち着きましょう、ヤンデレ妹ガールさん。恋人や妻が何人もいたらいささか問題ですが、妹はたくさんいてもいいものです」
line = "「まぁまぁ落ち着きましょう、ヤンデレ妹ガールさん。恋人や妻が何人もいたらいささか問題ですが、妹はたくさんいてもいいものです」"

[[dialogue]]
speaker = "トレジアンナ"
# 「妹は増えることはあれ、減ることはないもの。妹同士仲良くした方が得策じゃないですか～？」
line = "「妹は増えることはあれ、減ることはないもの。妹同士仲良くした方が得策じゃないですか～？」"

[[dialogue]]
speaker = "リーナ"
# 「お兄ちゃん、このクローバー怖いよぅ……」
line = "「お兄ちゃん、このクローバー怖いよぅ……」"

[[dialogue]]
speaker = "サチ"
# 「怖がられてるっ！？」
line = "「怖がられてるっ！？」"

[[dialogue]]
speaker = "リーナ"
# 「うぅ……ちょっとおトイレ行ってくるっ」
line = "「うぅ……ちょっとおトイレ行ってくるっ」"

[[dialogue]]
speaker = "サチ"
# 「しかも逃げられたっ！？　もう、トレジアンナさんはいきなり喋らないでください！　誰だって髪飾りが喋ったら驚きますよ！」
line = "「しかも逃げられたっ！？　もう、トレジアンナさんはいきなり喋らないでください！　誰だって髪飾りが喋ったら驚きますよ！」"

[[dialogue]]
speaker = "サチ"
# 「でも、いったいどうしてコラプサーがお兄さんの妹に……？」
line = "「でも、いったいどうしてコラプサーがお兄さんの妹に……？」"

[[dialogue]]
speaker = "unk"
# 俺にもわからないけど……
line = "俺にもわからないけど……"

[[dialogue]]
speaker = "サチ"
# 「ふむふむ。本当は“お兄ちゃん”という存在を嫌っているはずなのに、お兄ちゃんって呼んでくると」
line = "「ふむふむ。本当は“お兄ちゃん”という存在を嫌っているはずなのに、お兄ちゃんって呼んでくると」"

[[dialogue]]
speaker = "サチ"
# 「……それなら、嫌っているだけじゃないのかも」
line = "「……それなら、嫌っているだけじゃないのかも」"

[[dialogue]]
speaker = "サチ"
# 「何度も“お兄ちゃん”のことを聞かされているうちに、優しい“お兄ちゃん”が本当にいる想像をするようになっていたのかもしれません」
line = "「何度も“お兄ちゃん”のことを聞かされているうちに、優しい“お兄ちゃん”が本当にいる想像をするようになっていたのかもしれません」"

[[dialogue]]
speaker = "サチ"
# 「私だって、頼りになるお兄さんがいてくれたらって思っていましたから。縋りたくなる気持ちはわかる気がします」
line = "「私だって、頼りになるお兄さんがいてくれたらって思っていましたから。縋りたくなる気持ちはわかる気がします」"

[[dialogue]]
speaker = "サチ"
# 「だから、“お兄ちゃん”に甘えたいのも、嫌いなのも、両方とも彼女の気持ちなんだと思います」
line = "「だから、“お兄ちゃん”に甘えたいのも、嫌いなのも、両方とも彼女の気持ちなんだと思います」"

[[dialogue]]
speaker = "トレジアンナ"
# 「好きと嫌いは相殺するとは限りませんからね～。妹心と乙女心は複雑なものですよ」
line = "「好きと嫌いは相殺するとは限りませんからね～。妹心と乙女心は複雑なものですよ」"

[[dialogue]]
speaker = "unk"
# 両方とも本当の気持ち……
line = "両方とも本当の気持ち……"

[[dialogue]]
speaker = "トレジアンナ"
# 「今のリーナさんは、元々抱いていた妄想と現実の区別がついていない……いえ、現実から逃げるために、妄想を現実だと思い込んでいるのでしょうか」
line = "「今のリーナさんは、元々抱いていた妄想と現実の区別がついていない……いえ、現実から逃げるために、妄想を現実だと思い込んでいるのでしょうか」"

[[dialogue]]
speaker = "サチ"
# 「！　モンスター！　ここから近い──というかこの遊園地の敷地内じゃないですか！？」
line = "「！　モンスター！　ここから近い──というかこの遊園地の敷地内じゃないですか！？」"

[[dialogue]]
speaker = "女の子"
# 「キャ～～～～～ッ！！？」
line = "「キャ～～～～～ッ！！？」"

[[dialogue]]
speaker = "男の子"
# 「モンスター！？　早く逃げないと……」
line = "「モンスター！？　早く逃げないと……」"

[[dialogue]]
speaker = "父親"
# 「こ、こっちだ！　モンスターのいないところに逃げ──」
line = "「こ、こっちだ！　モンスターのいないところに逃げ──」"

[[dialogue]]
speaker = "ブヒモス"
# 「ブモォオオオオオッ！！」
line = "「ブモォオオオオオッ！！」"

[[dialogue]]
speaker = "母親"
# 「ヒィッ！？」
line = "「ヒィッ！？」"

[[dialogue]]
speaker = "リーナ"
# 「あ……」
line = "「あ……」"

[[dialogue]]
speaker = "リーナ"
# 「このままじゃ死んじゃう……」
line = "「このままじゃ死んじゃう……」"

[[dialogue]]
speaker = "リーナ"
# 「お父さんとお母さんが、死んじゃ──リーナの、お父さんと、お母さんは──」
line = "「お父さんとお母さんが、死んじゃ──リーナの、お父さんと、お母さんは──」"

[[dialogue]]
speaker = "リーナ"
# 「あ──あ──」
line = "「あ──あ──」"

[[dialogue]]
speaker = "リーナ"
# 「死ね……死ね……死ねぇえええっ！！」
line = "「死ね……死ね……死ねぇえええっ！！」"
