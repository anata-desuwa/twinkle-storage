[[dialogue]]
speaker = "unk"
# 第２話,和菓子は１日にして成らず,P
line = "第２話,和菓子は１日にして成らず,P"

[[dialogue]]
speaker = "unk"
# 最近、アナが何やら俺に秘密で怪しい研究に取り組んでいると聞いて、俺はこっそり調査を行っていた。
line = "最近、アナが何やら俺に秘密で怪しい研究に取り組んでいると聞いて、俺はこっそり調査を行っていた。"

[[dialogue]]
speaker = "アナ"
# 「ふっふっふ、ついに完成しました……！」
line = "「ふっふっふ、ついに完成しました……！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「おぉ～。この短期間でよくぞここまで……やはりアナさんは、研究者としても抜きん出た才能がありますね～」
line = "「おぉ～。この短期間でよくぞここまで……やはりアナさんは、研究者としても抜きん出た才能がありますね～」"

[[dialogue]]
speaker = "アナ"
# 「いえ。トレジアンナさんやアニマ先輩に比べれば、まだまだです」
line = "「いえ。トレジアンナさんやアニマ先輩に比べれば、まだまだです」"

[[dialogue]]
speaker = "トレジアンナ"
# 「そんなことありませんよ～。アナさんはまだ１年生で、入学するまではずっと天界に居たんでしょう？　それでこの技術力……末恐ろしい天才と言わざるを得ませんね！」
line = "「そんなことありませんよ～。アナさんはまだ１年生で、入学するまではずっと天界に居たんでしょう？　それでこの技術力……末恐ろしい天才と言わざるを得ませんね！」"

[[dialogue]]
speaker = "アナ"
# 「ありがとうございます。とりあえずこれで、私が手がけた『マジックアイテム』１号の完成です」
line = "「ありがとうございます。とりあえずこれで、私が手がけた『マジックアイテム』１号の完成です」"

[[dialogue]]
speaker = "トレジアンナ"
# 「おめでとうございます～♪　それとどうやら、いいタイミングで来てくれたみたいですね」
line = "「おめでとうございます～♪　それとどうやら、いいタイミングで来てくれたみたいですね」"

[[dialogue]]
speaker = "トレジアンナ"
# 「会長さ～ん、別に隠れてなくても大丈夫ですよ～？」
line = "「会長さ～ん、別に隠れてなくても大丈夫ですよ～？」"

[[dialogue]]
speaker = "unk"
# やっぱり、バレてたか……
line = "やっぱり、バレてたか……"

[[dialogue]]
speaker = "トレジアンナ"
# 「ふふっ、私には探知魔法がありますので♪　恋人のアナさんが何をしているのか、気になって様子を伺っていた、ってところですかね？」
line = "「ふふっ、私には探知魔法がありますので♪　恋人のアナさんが何をしているのか、気になって様子を伺っていた、ってところですかね？」"

[[dialogue]]
speaker = "アナ"
# 「なるほど。会長には完成してから見せて驚かせようと思っていたのですが、余計な心配をおかけしてしまったようですね」
line = "「なるほど。会長には完成してから見せて驚かせようと思っていたのですが、余計な心配をおかけしてしまったようですね」"

[[dialogue]]
speaker = "アナ"
# 「ですが、ノープロブレムです。私は星徒会では副会長として、私生活では恋人として会長を支えるパートナー」
line = "「ですが、ノープロブレムです。私は星徒会では副会長として、私生活では恋人として会長を支えるパートナー」"

[[dialogue]]
speaker = "アナ"
# 「会長の信頼を裏切るような浮気など絶対にしません。ＤＩＳＣのＧＰＳ機能を使ってもらっても構いませんよ」
line = "「会長の信頼を裏切るような浮気など絶対にしません。ＤＩＳＣのＧＰＳ機能を使ってもらっても構いませんよ」"

[[dialogue]]
speaker = "アナ"
# 「むしろ常に会長に監視されていることで、私は恋人として安心できます。せっかくですから、今回の失敗を踏まえて、アプリを入れておきましょうか」
line = "「むしろ常に会長に監視されていることで、私は恋人として安心できます。せっかくですから、今回の失敗を踏まえて、アプリを入れておきましょうか」"

[[dialogue]]
speaker = "unk"
# いやいや、そこまでは大丈夫だから！
line = "いやいや、そこまでは大丈夫だから！"

[[dialogue]]
speaker = "アナ"
# 「そうですか？　私としては、より私のことを知ってもらえるなら、一向にノープロブレムなのですが……」
line = "「そうですか？　私としては、より私のことを知ってもらえるなら、一向にノープロブレムなのですが……」"

[[dialogue]]
speaker = "トレジアンナ"
# 「いや～、アナさん、意外と恋人にはゾッコンタイプだったんですね～♪」
line = "「いや～、アナさん、意外と恋人にはゾッコンタイプだったんですね～♪」"

[[dialogue]]
speaker = "unk"
# 俺だってアナにゾッコンですよ！
line = "俺だってアナにゾッコンですよ！"

[[dialogue]]
speaker = "アナ"
# 「コホン。そ、そういう恥ずかしいことで張り合わないでいいです……」
line = "「コホン。そ、そういう恥ずかしいことで張り合わないでいいです……」"

[[dialogue]]
speaker = "アナ"
# 「それよりも会長、見て下さい。これがトレジアンナさんから魔法技術を学んで作り上げた試作マジックアイテム――その名も『和菓子プリンター』です」
line = "「それよりも会長、見て下さい。これがトレジアンナさんから魔法技術を学んで作り上げた試作マジックアイテム――その名も『和菓子プリンター』です」"

[[dialogue]]
speaker = "unk"
# アナが見せてきたそれは、いわゆる『３Ｄプリンター』と言われる機械によく似ていた。
line = "アナが見せてきたそれは、いわゆる『３Ｄプリンター』と言われる機械によく似ていた。"

[[dialogue]]
speaker = "アナ"
# 「この和菓子プリンターは、私の思考をサンプリングして作ったＡＩが組み込まれており、材料を入れることで、それをＡＩが分析、自動的に和菓子として出力します」
line = "「この和菓子プリンターは、私の思考をサンプリングして作ったＡＩが組み込まれており、材料を入れることで、それをＡＩが分析、自動的に和菓子として出力します」"

[[dialogue]]
speaker = "unk"
# テンションが上がっているのか、早口で説明するアナ。
line = "テンションが上がっているのか、早口で説明するアナ。"

[[dialogue]]
speaker = "アナ"
# 「例えば、洋菓子のショートケーキを材料として入れると、それを和菓子にアレンジした和風ショートケーキとして生成してくれるといった具合です」
line = "「例えば、洋菓子のショートケーキを材料として入れると、それを和菓子にアレンジした和風ショートケーキとして生成してくれるといった具合です」"

[[dialogue]]
speaker = "アナ"
# 「つまりは、これまでになかった材料の組み合わせから、未知の和菓子を生み出す可能性を秘めた、新世界を作る『自動和菓子生成器』なのです。むふ～♪」
line = "「つまりは、これまでになかった材料の組み合わせから、未知の和菓子を生み出す可能性を秘めた、新世界を作る『自動和菓子生成器』なのです。むふ～♪」"

[[dialogue]]
speaker = "アナ"
# 「では早速、実験してみましょう。先程言った、ショートケーキが分かりやすいですね。抹茶と組み合わせれば、抹茶ケーキができあがるはずです」
line = "「では早速、実験してみましょう。先程言った、ショートケーキが分かりやすいですね。抹茶と組み合わせれば、抹茶ケーキができあがるはずです」"

[[dialogue]]
speaker = "アナ"
# 「材料は事前に用意済み。これをセットして、スイッチオン。れでぃ～ご～！」
line = "「材料は事前に用意済み。これをセットして、スイッチオン。れでぃ～ご～！」"

[[dialogue]]
speaker = "アナ"
# 「計算によれば、でき上がるまで、およそ１５分……」
line = "「計算によれば、でき上がるまで、およそ１５分……」"

[[dialogue]]
speaker = "アナ"
# 「…………ふ、ふふふっ……」
line = "「…………ふ、ふふふっ……」"

[[dialogue]]
speaker = "アナ"
# 「……だ、ダメです。まだドヤるのは早い……こらえなければ……し、しかし……」
line = "「……だ、ダメです。まだドヤるのは早い……こらえなければ……し、しかし……」"

[[dialogue]]
speaker = "unk"
# ちらちらと横目で和菓子プリンターを眺めながら、口元のニヤけが止められないアナ。
line = "ちらちらと横目で和菓子プリンターを眺めながら、口元のニヤけが止められないアナ。"

[[dialogue]]
speaker = "トレジアンナ"
# （会長さん、会長さん♪　アナさんって和菓子のことになると、テンションがハイになって面白いですよね～☆）
line = "（会長さん、会長さん♪　アナさんって和菓子のことになると、テンションがハイになって面白いですよね～☆）"

[[dialogue]]
speaker = "unk"
# トレジアンナさんがアナに聞こえないくらいの小声で耳打ちしてくる。
line = "トレジアンナさんがアナに聞こえないくらいの小声で耳打ちしてくる。"

[[dialogue]]
speaker = "トレジアンナ"
# （普段は知的な感じのに、和菓子のことになった途端、子供みたいにはしゃいじゃうのがすごく可愛いです♪）
line = "（普段は知的な感じのに、和菓子のことになった途端、子供みたいにはしゃいじゃうのがすごく可愛いです♪）"

[[dialogue]]
speaker = "unk"
# トレジアンナさんの感想に、首がもげるほどうなずく俺なのであった。
line = "トレジアンナさんの感想に、首がもげるほどうなずく俺なのであった。"

[[dialogue]]
speaker = "アナ"
# 「わくわく……そわそわ……♪」
line = "「わくわく……そわそわ……♪」"

[[dialogue]]
speaker = "unk"
# それから１５分後。和菓子プリンターから、綺麗な抹茶ケーキが出力されてきて――
line = "それから１５分後。和菓子プリンターから、綺麗な抹茶ケーキが出力されてきて――"

[[dialogue]]
speaker = "アナ"
# 「ふふふ、計算通りです……！」
line = "「ふふふ、計算通りです……！」"

[[dialogue]]
speaker = "unk"
# 渾身のドヤ顔を決めるアナ。それから、ソワソワしながらケーキを切り分ける。
line = "渾身のドヤ顔を決めるアナ。それから、ソワソワしながらケーキを切り分ける。"

[[dialogue]]
speaker = "アナ"
# 「では、３人で試食しましょう♪　いただきます――はむっ。もぐもぐもぐ……！」
line = "「では、３人で試食しましょう♪　いただきます――はむっ。もぐもぐもぐ……！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「もぐもぐ……こ、これは……！」
line = "「もぐもぐ……こ、これは……！」"

[[dialogue]]
speaker = "アナ"
# 「すん」
line = "「すん」"

[[dialogue]]
speaker = "トレジアンナ"
# 「うわぁ！？　アナさんが急に冷静な顔に！？」
line = "「うわぁ！？　アナさんが急に冷静な顔に！？」"

[[dialogue]]
speaker = "unk"
# えっと……確かにマズくはないんだけど……
line = "えっと……確かにマズくはないんだけど……"

[[dialogue]]
speaker = "トレジアンナ"
# 「そ、そうですね……美味しいかと言われると……」
line = "「そ、そうですね……美味しいかと言われると……」"

[[dialogue]]
speaker = "アナ"
# 「トレジアンナさん、会長……私は今回、大切なことを学びました。それは――」
line = "「トレジアンナさん、会長……私は今回、大切なことを学びました。それは――」"

[[dialogue]]
speaker = "アナ"
# 「日々、美味しい和菓子を作ってくださる職人さんたちへの『リスペクトの心』……です……」
line = "「日々、美味しい和菓子を作ってくださる職人さんたちへの『リスペクトの心』……です……」"

[[dialogue]]
speaker = "unk"
# ちょっと遠い目をしながら、微妙そうに抹茶ケーキをもっちゃもっちゃ咀嚼するアナなのであった。
line = "ちょっと遠い目をしながら、微妙そうに抹茶ケーキをもっちゃもっちゃ咀嚼するアナなのであった。"
