[[dialogue]]
speaker = "unk"
# 第１話,フィクサーのお仕事,P
line = "第１話,フィクサーのお仕事,P"

[[dialogue]]
speaker = "unk"
# ヴィーナスから星徒会長の役を引き継いでから、すぐのこと──
line = "ヴィーナスから星徒会長の役を引き継いでから、すぐのこと──"

[[dialogue]]
speaker = "ヴィーナス"
# 「みんな！　今からトレーニングルームで、大量のＳランクモンスターが出現した際の訓練をするわよ！」
line = "「みんな！　今からトレーニングルームで、大量のＳランクモンスターが出現した際の訓練をするわよ！」"

[[dialogue]]
speaker = "アナ"
# 「いま忙しい。来週でお願いします」
line = "「いま忙しい。来週でお願いします」"

[[dialogue]]
speaker = "マトイ"
# 「ご、ごめんねヴィーナスっ、私も今から職員室に行かなきゃいけなくて……！　私抜きでお願いっ！」
line = "「ご、ごめんねヴィーナスっ、私も今から職員室に行かなきゃいけなくて……！　私抜きでお願いっ！」"

[[dialogue]]
speaker = "サーシャ"
# 「会長くん、この書類を確認して承認のハンコを押してもらってもいいかしら？　できれば今日中にお願い～」
line = "「会長くん、この書類を確認して承認のハンコを押してもらってもいいかしら？　できれば今日中にお願い～」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……まあ、忙しいことはいいことね！　新しい新星星徒会、しっかり回ってるみたいでよかったわ」
line = "「……まあ、忙しいことはいいことね！　新しい新星星徒会、しっかり回ってるみたいでよかったわ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「で、クロトは？　もちろん私と一緒にトレーニングするわよね？」
line = "「で、クロトは？　もちろん私と一緒にトレーニングするわよね？」"

[[dialogue]]
speaker = "unk"
# 今は手が空かないんで、ゴメン！
line = "今は手が空かないんで、ゴメン！"

[[dialogue]]
speaker = "ヴィーナス"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ヴィーナス"
# 「みんな、よく聞いて。この星徒会のフィクサーとして、みんなに重要な任務を言い渡すわ」
line = "「みんな、よく聞いて。この星徒会のフィクサーとして、みんなに重要な任務を言い渡すわ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「──暇だわ！！！　構って！！！」
line = "「──暇だわ！！！　構って！！！」"

[[dialogue]]
speaker = "unk"
# むしろ手伝って欲しいんだが！？
line = "むしろ手伝って欲しいんだが！？"

[[dialogue]]
speaker = "アナ"
# 「仕方ありませんね。前会長、こちらを」
line = "「仕方ありませんね。前会長、こちらを」"

[[dialogue]]
speaker = "ヴィーナス"
# 「なになに、私向きの仕事？　何かしら？」
line = "「なになに、私向きの仕事？　何かしら？」"

[[dialogue]]
speaker = "アナ"
# 「この書類の向きを揃えておいてください。中身を見る必要はありません。向きを揃え終わったら、もう１度確認して揃えてください」
line = "「この書類の向きを揃えておいてください。中身を見る必要はありません。向きを揃え終わったら、もう１度確認して揃えてください」"

[[dialogue]]
speaker = "ヴィーナス"
# 「よくわからないけど、これは私にしかできないことなの？」
line = "「よくわからないけど、これは私にしかできないことなの？」"

[[dialogue]]
speaker = "アナ"
# 「前会長にしかできません。色んな意味で」
line = "「前会長にしかできません。色んな意味で」"

[[dialogue]]
speaker = "ヴィーナス"
# 「わかったわ！　フィクサーである私に任せなさい！」
line = "「わかったわ！　フィクサーである私に任せなさい！」"

[[dialogue]]
speaker = "unk"
# ──１０分後。
line = "──１０分後。"

[[dialogue]]
speaker = "ヴィーナス"
# 「──耐えられないわ！！！　アナ、このモナカあげるから代わって！！！」
line = "「──耐えられないわ！！！　アナ、このモナカあげるから代わって！！！」"

[[dialogue]]
speaker = "アナ"
# 「交渉成立です。…………うま」
line = "「交渉成立です。…………うま」"

[[dialogue]]
speaker = "unk"
# ……他に渡せる仕事はないのか？
line = "……他に渡せる仕事はないのか？"

[[dialogue]]
speaker = "unk"
# 懐柔されてる！
line = "懐柔されてる！"

[[dialogue]]
speaker = "アナ"
# 「前会長に本物の事務仕事をさせても、３０秒で飽きて放り出します。検証済み。だからいつも、街のパトロールに行ってもらってます」
line = "「前会長に本物の事務仕事をさせても、３０秒で飽きて放り出します。検証済み。だからいつも、街のパトロールに行ってもらってます」"

[[dialogue]]
speaker = "マトイ"
# 「ちょっと気になってることがあるんだけど……フィクサーって結局何なの？　要するに２人目の会長ってこと？」
line = "「ちょっと気になってることがあるんだけど……フィクサーって結局何なの？　要するに２人目の会長ってこと？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「星徒会長を引退した私は、この星徒会を裏から牛耳る影の権力者になったってことよ。カッコいいでしょ？」
line = "「星徒会長を引退した私は、この星徒会を裏から牛耳る影の権力者になったってことよ。カッコいいでしょ？」"

[[dialogue]]
speaker = "マトイ"
# 「それってつまり、何をする役職なの？」
line = "「それってつまり、何をする役職なの？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ん～、裏ボス？　的な存在らしいわよ。裏ボスって普段は表に出てこないじゃない？　つまり、普段は何もしてないってことなんじゃないかしら？」
line = "「ん～、裏ボス？　的な存在らしいわよ。裏ボスって普段は表に出てこないじゃない？　つまり、普段は何もしてないってことなんじゃないかしら？」"

[[dialogue]]
speaker = "サーシャ"
# 「おサボりのいい口実を見つけたわね～」
line = "「おサボりのいい口実を見つけたわね～」"

[[dialogue]]
speaker = "unk"
# 暇なら俺の仕事を手伝ってくれないか？
line = "暇なら俺の仕事を手伝ってくれないか？"

[[dialogue]]
speaker = "ヴィーナス"
# 「嫌よ。書類の確認なんて性に合わないし。大体、クロトが来る前から書類はアナに任せっきりだったから、今さらやれと言われても出来ないわ」
line = "「嫌よ。書類の確認なんて性に合わないし。大体、クロトが来る前から書類はアナに任せっきりだったから、今さらやれと言われても出来ないわ」"

[[dialogue]]
speaker = "アナ"
# 「等価交換は成立してる。文句はない」
line = "「等価交換は成立してる。文句はない」"

[[dialogue]]
speaker = "unk"
# えぇ……
line = "えぇ……"

[[dialogue]]
speaker = "サーシャ"
# 「ふふっ、モンスターからすれば、本当に裏ボス的な存在かもしれないわね？　出会ったら倒されちゃう、理不尽なエンカウントエネミーみたいな？」
line = "「ふふっ、モンスターからすれば、本当に裏ボス的な存在かもしれないわね？　出会ったら倒されちゃう、理不尽なエンカウントエネミーみたいな？」"

[[dialogue]]
speaker = "アナ"
# 「実際、前会長がよくパトロールをしてくれているおかげで、リクリエのモンスター被害が抑えられていることは事実です」
line = "「実際、前会長がよくパトロールをしてくれているおかげで、リクリエのモンスター被害が抑えられていることは事実です」"

[[dialogue]]
speaker = "ヴィーナス"
# 「影の立役者ってことね！」
line = "「影の立役者ってことね！」"

[[dialogue]]
speaker = "マトイ"
# 「影と言う割にはめちゃくちゃ目立ってる気がするけど……」
line = "「影と言う割にはめちゃくちゃ目立ってる気がするけど……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「なんだかみんなに褒められて気分がいいわね。……そうだ、クロトも私のこと褒めていいわよ！　いえ、褒めてちょうだい！」
line = "「なんだかみんなに褒められて気分がいいわね。……そうだ、クロトも私のこと褒めていいわよ！　いえ、褒めてちょうだい！」"

[[dialogue]]
speaker = "unk"
# 褒められたいのなら、まず仕事を……
line = "褒められたいのなら、まず仕事を……"

[[dialogue]]
speaker = "ヴィーナス"
# 「アナ！」
line = "「アナ！」"

[[dialogue]]
speaker = "アナ"
# 「ほいきた。これは高級かすていら……！　いいんですか……！　前会長は女神！」
line = "「ほいきた。これは高級かすていら……！　いいんですか……！　前会長は女神！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「優秀な人材に適任の仕事を与える。そしてその間、私は街の平和を守る。これがフィクサーである私の仕事よ！」
line = "「優秀な人材に適任の仕事を与える。そしてその間、私は街の平和を守る。これがフィクサーである私の仕事よ！」"

[[dialogue]]
speaker = "unk"
# アナさん、チョロ過ぎません！？
line = "アナさん、チョロ過ぎません！？"

[[dialogue]]
speaker = "サーシャ"
# 「会長くん、気持ちはわかるけど、諦めたほうがいいんじゃないかしら～。実際、ヴィーナスちゃんには外回りをしてもらったほうが、こっちとしても助かるのよ」
line = "「会長くん、気持ちはわかるけど、諦めたほうがいいんじゃないかしら～。実際、ヴィーナスちゃんには外回りをしてもらったほうが、こっちとしても助かるのよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふふんっ、心配ないわ。この私が選んだ最高のメンバーだもの。星徒会の事務仕事なんて私がいなくても、ちょちょいのちょいよ」
line = "「ふふんっ、心配ないわ。この私が選んだ最高のメンバーだもの。星徒会の事務仕事なんて私がいなくても、ちょちょいのちょいよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「さあ、皆。仕事なんてさっさと終わらせて特訓よ！　……ほら、クロトもそんな顔しないの！」
line = "「さあ、皆。仕事なんてさっさと終わらせて特訓よ！　……ほら、クロトもそんな顔しないの！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「大丈夫よ。あなただって、私が認めた最高の魔王にして星徒会長なんだから！　自分に自信をもって、ドンと胸を張りなさい！」
line = "「大丈夫よ。あなただって、私が認めた最高の魔王にして星徒会長なんだから！　自分に自信をもって、ドンと胸を張りなさい！」"

[[dialogue]]
speaker = "unk"
# （なんだか、不思議と出来る気がしてきた）
line = "（なんだか、不思議と出来る気がしてきた）"

[[dialogue]]
speaker = "unk"
# ……！！
line = "……！！"

[[dialogue]]
speaker = "サーシャ"
# 「あらあら～♪」
line = "「あらあら～♪」"

[[dialogue]]
speaker = "マトイ"
# 「ヴィーナスにそう言われると、何か本当にできるような気がしてきちゃうんだよね……魔法みたいに」
line = "「ヴィーナスにそう言われると、何か本当にできるような気がしてきちゃうんだよね……魔法みたいに」"

[[dialogue]]
speaker = "アナ"
# 「会長。ジャスト・ドゥ・イット（やるしかない）」
line = "「会長。ジャスト・ドゥ・イット（やるしかない）」"

[[dialogue]]
speaker = "unk"
# それから──ヴィーナスの応援でやる気の上がった俺たちは、バリバリと仕事をこなしていくのだった。
line = "それから──ヴィーナスの応援でやる気の上がった俺たちは、バリバリと仕事をこなしていくのだった。"

[[dialogue]]
speaker = "unk"
# いや、ヴィーナスも仕事しろよ！？
line = "いや、ヴィーナスも仕事しろよ！？"
