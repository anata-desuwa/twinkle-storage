[[dialogue]]
speaker = "unk"
# 第３話,変なあだ名は終わらない,P
line = "第３話,変なあだ名は終わらない,P"

[[dialogue]]
speaker = "unk"
# 『流星附属最強の盾』と称されるアムには、同じく『最強の槍』と称されるライバル・桜十路エルデリーゼがいる。
line = "『流星附属最強の盾』と称されるアムには、同じく『最強の槍』と称されるライバル・桜十路エルデリーゼがいる。"

[[dialogue]]
speaker = "unk"
# ２人の模擬戦闘はトレーニング施設でちょくちょく見られる名物試合となっていて──
line = "２人の模擬戦闘はトレーニング施設でちょくちょく見られる名物試合となっていて──"

[[dialogue]]
speaker = "エルデリーゼ"
# 「ふう……今日のところは私の負けですわね、アム。手に入れたばかりの水着フォームだというのに、見事な戦いぶりでした」
line = "「ふう……今日のところは私の負けですわね、アム。手に入れたばかりの水着フォームだというのに、見事な戦いぶりでした」"

[[dialogue]]
speaker = "アム"
# 「ふっふーん♪　まだエルゼは、あたしの新フォームに対応しきれてないみたいだね！　これで３戦、勝ち越しかな～？」
line = "「ふっふーん♪　まだエルゼは、あたしの新フォームに対応しきれてないみたいだね！　これで３戦、勝ち越しかな～？」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「武器は変わらず盾ではありますが、戦い方が変化するのは厄介ですわね……重力の影響を、私の槍は強く受けてしまいますし……」
line = "「武器は変わらず盾ではありますが、戦い方が変化するのは厄介ですわね……重力の影響を、私の槍は強く受けてしまいますし……」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「今は後塵を拝しておりますが、すぐに対策をしてみせますから！」
line = "「今は後塵を拝しておりますが、すぐに対策をしてみせますから！」"

[[dialogue]]
speaker = "アム"
# 「あたしだって勝ち越してるからって油断はしないよ？　エルゼの対応力は凄いからね！」
line = "「あたしだって勝ち越してるからって油断はしないよ？　エルゼの対応力は凄いからね！」"

[[dialogue]]
speaker = "アナ"
# 「お２人とも、素晴らしい戦いぶりでした。偶然通りがかったのですが、ついつい見入ってしまいました」
line = "「お２人とも、素晴らしい戦いぶりでした。偶然通りがかったのですが、ついつい見入ってしまいました」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「お褒めいただきありがとうございます、アナ先輩。それに、会長様も」
line = "「お褒めいただきありがとうございます、アナ先輩。それに、会長様も」"

[[dialogue]]
speaker = "アム"
# 「えへへっ、あたしの戦いぶり、カッコよかったでしょ、会長！」
line = "「えへへっ、あたしの戦いぶり、カッコよかったでしょ、会長！」"

[[dialogue]]
speaker = "unk"
# ああ、もちろん
line = "ああ、もちろん"

[[dialogue]]
speaker = "アム"
# 「ふっふっふ～♪　会長も気を付けた方がいいよ？　最近のあたしの成長速度はすごいからね！　本気で鍛錬してないと、あっという間に追い抜かれちゃうかも！」
line = "「ふっふっふ～♪　会長も気を付けた方がいいよ？　最近のあたしの成長速度はすごいからね！　本気で鍛錬してないと、あっという間に追い抜かれちゃうかも！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「またアムはすぐ調子に乗って……」
line = "「またアムはすぐ調子に乗って……」"

[[dialogue]]
speaker = "アム"
# 「いや～、でも実際、調子がいいのは確かじゃん？　エルゼに３戦も勝ち越せたのっていつぶりかな～って感じだし！」
line = "「いや～、でも実際、調子がいいのは確かじゃん？　エルゼに３戦も勝ち越せたのっていつぶりかな～って感じだし！」"

[[dialogue]]
speaker = "アム"
# 「最近は水着フォームでの出動も増えて来てるし……うししっ♪　この調子で活躍すれば、あたしの変なあだ名もそのうち消えるはず……！」
line = "「最近は水着フォームでの出動も増えて来てるし……うししっ♪　この調子で活躍すれば、あたしの変なあだ名もそのうち消えるはず……！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「そ、そうですわね……ええ、きっといつの日か消えると思いますよ、はい……」
line = "「そ、そうですわね……ええ、きっといつの日か消えると思いますよ、はい……」"

[[dialogue]]
speaker = "アム"
# 「え、何その煮え切らない返事……」
line = "「え、何その煮え切らない返事……」"

[[dialogue]]
speaker = "アナ"
# 「残念。あだ名はなくなるどころか、さらに増えています」
line = "「残念。あだ名はなくなるどころか、さらに増えています」"

[[dialogue]]
speaker = "アム"
# 「嘘ぉ──っ！？」
line = "「嘘ぉ──っ！？」"

[[dialogue]]
speaker = "アナ"
# 「白楯さんが嫌っていた『流星最硬のタンク』というあだ名が変化し、現在は『流星最硬の水着タンク』という名称が広まってる。先日、新星学園内で確認しました」
line = "「白楯さんが嫌っていた『流星最硬のタンク』というあだ名が変化し、現在は『流星最硬の水着タンク』という名称が広まってる。先日、新星学園内で確認しました」"

[[dialogue]]
speaker = "アム"
# 「うえぇ～～っ！　何それ、聞いてない！！」
line = "「うえぇ～～っ！　何それ、聞いてない！！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「私もその呼称は初耳です……」
line = "「私もその呼称は初耳です……」"

[[dialogue]]
speaker = "アム"
# 「──え、ちょっと待って。他にもあるの！？」
line = "「──え、ちょっと待って。他にもあるの！？」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「え、ええ……聞きたいなら教えますが、怒ってビームを撃たないと約束できますか？」
line = "「え、ええ……聞きたいなら教えますが、怒ってビームを撃たないと約束できますか？」"

[[dialogue]]
speaker = "アム"
# 「約束できない！　でも聞く！！」
line = "「約束できない！　でも聞く！！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「めちゃくちゃですわ、アム……！」
line = "「めちゃくちゃですわ、アム……！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「え、ええっと……その……『頑強ホバークラフト』とか『不死身シールド・夏』とか……」
line = "「え、ええっと……その……『頑強ホバークラフト』とか『不死身シールド・夏』とか……」"

[[dialogue]]
speaker = "アム"
# 「ダッッッサ！！　何それ、おかしいって！　あたし、こんなに活躍してるのに！！」
line = "「ダッッッサ！！　何それ、おかしいって！　あたし、こんなに活躍してるのに！！」"

[[dialogue]]
speaker = "アナ"
# 「白楯さんは知名度があります。アステラ対処時の出撃回数はかなりのもの。危ないところを救われた経験のある星騎士も数多いはず」
line = "「白楯さんは知名度があります。アステラ対処時の出撃回数はかなりのもの。危ないところを救われた経験のある星騎士も数多いはず」"

[[dialogue]]
speaker = "アム"
# 「ですよね！？　いろんな人のピンチ、救ってますよねあたし！！」
line = "「ですよね！？　いろんな人のピンチ、救ってますよねあたし！！」"

[[dialogue]]
speaker = "アナ"
# 「そんな頼りになるシールダーが、小さな背丈に巨大な盾というギャップ持ち。以前にも伝えましたが、マスコットみがあるキャラクターなのでいじられるのも宿命かと」
line = "「そんな頼りになるシールダーが、小さな背丈に巨大な盾というギャップ持ち。以前にも伝えましたが、マスコットみがあるキャラクターなのでいじられるのも宿命かと」"

[[dialogue]]
speaker = "アム"
# 「あたしも以前に言いましたけど！　それ、アナ先輩に言われるのはやっぱり納得いかないんですけどっ！？」
line = "「あたしも以前に言いましたけど！　それ、アナ先輩に言われるのはやっぱり納得いかないんですけどっ！？」"

[[dialogue]]
speaker = "アム"
# 「……ね、ねえ。あのさー……もしかして会長も、あたしの新しいあだ名を聞いてたり……？」
line = "「……ね、ねえ。あのさー……もしかして会長も、あたしの新しいあだ名を聞いてたり……？」"

[[dialogue]]
speaker = "unk"
# ……聞いてもビーム撃ったりしない？
line = "……聞いてもビーム撃ったりしない？"

[[dialogue]]
speaker = "アム"
# 「なんでみんな最初に釘を刺すの！？　撃たないから！　たぶん！！」
line = "「なんでみんな最初に釘を刺すの！？　撃たないから！　たぶん！！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「アム、そこは絶対と言わないとダメだと思いますわ……！」
line = "「アム、そこは絶対と言わないとダメだと思いますわ……！」"

[[dialogue]]
speaker = "アム"
# 「あたしは嘘はつきたくないの！　ほら会長、言って！」
line = "「あたしは嘘はつきたくないの！　ほら会長、言って！」"

[[dialogue]]
speaker = "unk"
# 『歩く水着要塞』とか……
line = "『歩く水着要塞』とか……"

[[dialogue]]
speaker = "unk"
# 『しんがり夏乙女』とか……
line = "『しんがり夏乙女』とか……"

[[dialogue]]
speaker = "アム"
# 「どーーしてーー！？　こんなはずじゃなかった……新フォームを手に入れて注目度も上がって、今度こそカッコいい名前が広まると思ってたのに……」
line = "「どーーしてーー！？　こんなはずじゃなかった……新フォームを手に入れて注目度も上がって、今度こそカッコいい名前が広まると思ってたのに……」"

[[dialogue]]
speaker = "アナ"
# 「だったらいっそのこと、自分であだ名を広めればいいのでは？」
line = "「だったらいっそのこと、自分であだ名を広めればいいのでは？」"

[[dialogue]]
speaker = "アム"
# 「あたしが、自分で……？」
line = "「あたしが、自分で……？」"

[[dialogue]]
speaker = "アナ"
# 「はい。うちの前会長も、新星星徒会のフィクサーを自称しています。あれを考えたのも、広めたのも、前会長本人ですから」
line = "「はい。うちの前会長も、新星星徒会のフィクサーを自称しています。あれを考えたのも、広めたのも、前会長本人ですから」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「なるほど……！　ヴィーナス先輩のフィクサーの二つ名は、流星附属にも知れ渡っていますものね。同じ事をアムもすれば……！」
line = "「なるほど……！　ヴィーナス先輩のフィクサーの二つ名は、流星附属にも知れ渡っていますものね。同じ事をアムもすれば……！」"

[[dialogue]]
speaker = "アム"
# 「そっか！　よーしっ、考えるぞ！　ダサイあだ名を一掃できるスーパーネームを……！！」
line = "「そっか！　よーしっ、考えるぞ！　ダサイあだ名を一掃できるスーパーネームを……！！」"

[[dialogue]]
speaker = "アム"
# 「エルゼとアナ先輩、それと会長も力を貸して！」
line = "「エルゼとアナ先輩、それと会長も力を貸して！」"

[[dialogue]]
speaker = "unk"
# そうして４人で、あーでもない、こーでもないと意見を交わして──
line = "そうして４人で、あーでもない、こーでもないと意見を交わして──"

[[dialogue]]
speaker = "アナ"
# 「決まりました──『サマーアイギス』。これが白楯さんの新しいあだ名です」
line = "「決まりました──『サマーアイギス』。これが白楯さんの新しいあだ名です」"

[[dialogue]]
speaker = "アム"
# 「え……やっば！？　なんかめちゃくちゃかっこいい名前ができちゃった！！」
line = "「え……やっば！？　なんかめちゃくちゃかっこいい名前ができちゃった！！」"

[[dialogue]]
speaker = "アム"
# 「これなら文句ないよ！　あたしが出撃して活躍するたび、この名前で呼ばれるならバッチリだよー！！」
line = "「これなら文句ないよ！　あたしが出撃して活躍するたび、この名前で呼ばれるならバッチリだよー！！」"

[[dialogue]]
speaker = "アム"
# 「みんなありがとう！　さっそく友達にも伝えてくる！！」
line = "「みんなありがとう！　さっそく友達にも伝えてくる！！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「あ……行ってしまいました。相変わらずアムは、思い立ったらすぐ行動なのですから……」
line = "「あ……行ってしまいました。相変わらずアムは、思い立ったらすぐ行動なのですから……」"

[[dialogue]]
speaker = "アナ"
# 「そこが彼女の長所。さて、あとは目論見どおり広まればいいのですが……」
line = "「そこが彼女の長所。さて、あとは目論見どおり広まればいいのですが……」"

[[dialogue]]
speaker = "unk"
# 後日。クラスメイトたちとの集団模擬戦を終えたアムにかけられた言葉は──
line = "後日。クラスメイトたちとの集団模擬戦を終えたアムにかけられた言葉は──"

[[dialogue]]
speaker = "アム"
# 「むっか～～～！　誰だぁ今、夏の絶壁って言ったやつーー！！　出てこ～～いっ！！」
line = "「むっか～～～！　誰だぁ今、夏の絶壁って言ったやつーー！！　出てこ～～いっ！！」"

[[dialogue]]
speaker = "unk"
# 広めようとした『サマーアイギス』よりも、他のダサいあだ名の方が市民権を得ており、ひっくり返すことは叶わなかったらしく。
line = "広めようとした『サマーアイギス』よりも、他のダサいあだ名の方が市民権を得ており、ひっくり返すことは叶わなかったらしく。"

[[dialogue]]
speaker = "unk"
# ぷっつんしてしまったアムはビームを撃ちまくり、いつもの反省文を書くことになるのだった……
line = "ぷっつんしてしまったアムはビームを撃ちまくり、いつもの反省文を書くことになるのだった……"
