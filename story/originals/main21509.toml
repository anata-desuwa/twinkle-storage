[[dialogue]]
speaker = "unk"
# 第９話,良き旅を,B
line = "第９話,良き旅を,B"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
# 「認められない……こんなっ！」
line = "「認められない……こんなっ！」"

[[dialogue]]
speaker = "チナ"
# 「グレイス、合わせろっ！」
line = "「グレイス、合わせろっ！」"

[[dialogue]]
speaker = "グレイス"
# 「はい！　突撃しますッ──！！」
line = "「はい！　突撃しますッ──！！」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
# 「こんなことがっ──！」
line = "「こんなことがっ──！」"

[[dialogue]]
speaker = "レティシア"
# 「もう誰が相手でも──」
line = "「もう誰が相手でも──」"

[[dialogue]]
speaker = "ベアトリス"
# 「私たちを引き裂くことなんてできない！！」
line = "「私たちを引き裂くことなんてできない！！」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
# 「あってはならない……！　こんなこと、あってはならないのにっ──！？」
line = "「あってはならない……！　こんなこと、あってはならないのにっ──！？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「これで終わりよ──ヘヴンリー・アクティベーションッ！！」
line = "「これで終わりよ──ヘヴンリー・アクティベーションッ！！」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
# 「──ぅぁぁぁああぁぁあぁぁああっ！？」
line = "「──ぅぁぁぁああぁぁあぁぁああっ！？」"

[[dialogue]]
speaker = "unk"
# 極星学園生５人のユニゾンアタックが、１体のホロウを消滅させる。そして──
line = "極星学園生５人のユニゾンアタックが、１体のホロウを消滅させる。そして──"

[[dialogue]]
speaker = "unk"
# 次元転送装置がルヴィネの手中に収まる！
line = "次元転送装置がルヴィネの手中に収まる！"

[[dialogue]]
speaker = "ルヴィネ"
# 「アルタイルにいる全複製体に告げる！　貴方達の行き先は──崩壊せしベガの世界！　今すぐここから消えなさい！！！」
line = "「アルタイルにいる全複製体に告げる！　貴方達の行き先は──崩壊せしベガの世界！　今すぐここから消えなさい！！！」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「出来損ないの、分際で……」
line = "「出来損ないの、分際で……」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「どこまで、お父様の邪魔を──」
line = "「どこまで、お父様の邪魔を──」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「けれど……再創生は終わらない……」
line = "「けれど……再創生は終わらない……」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「アルタイルとデネブの破滅は──」
line = "「アルタイルとデネブの破滅は──」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「もはや、決定的──」
line = "「もはや、決定的──」"

[[dialogue]]
speaker = "unk"
# 塔の頂上を埋め尽くしていた複製体のホロウを全て、帰還不可能な平行世界へと追放することができた。
line = "塔の頂上を埋め尽くしていた複製体のホロウを全て、帰還不可能な平行世界へと追放することができた。"

[[dialogue]]
speaker = "チナ"
# 「……やった」
line = "「……やった」"

[[dialogue]]
speaker = "ベアトリス"
# 「私たちの……勝ちだね！」
line = "「私たちの……勝ちだね！」"

[[dialogue]]
speaker = "グレイス"
# 「本当によかった……みんなで勝利を掴むことができました！」
line = "「本当によかった……みんなで勝利を掴むことができました！」"

[[dialogue]]
speaker = "レティシア"
# 「ふふ。ようやく言える余裕ができたわね……ルヴィ」
line = "「ふふ。ようやく言える余裕ができたわね……ルヴィ」"

[[dialogue]]
speaker = "みんな"
# 「おかえりなさい！」
line = "「おかえりなさい！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「うん…………」
line = "「うん…………」"

[[dialogue]]
speaker = "ルヴィネ"
# 「──ただいま！」
line = "「──ただいま！」"

[[dialogue]]
speaker = "テルル"
# 『お疲れ様です──最初の窮地を突破しましたね。そしてルヴィネ。よく……帰ってきてくれました』
line = "『お疲れ様です──最初の窮地を突破しましたね。そしてルヴィネ。よく……帰ってきてくれました』"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「ママ！　見てくれてたのね！」
line = "「ママ！　見てくれてたのね！」"

[[dialogue]]
speaker = "テルル"
# 『ええ。ヴィーナス……果敢な戦いぶり、本当に見事でした』
line = "『ええ。ヴィーナス……果敢な戦いぶり、本当に見事でした』"

[[dialogue]]
speaker = "テルル"
# 『しかし戦いはまだ、終わっていない──いえ、これからが本当の始まりです』
line = "『しかし戦いはまだ、終わっていない──いえ、これからが本当の始まりです』"

[[dialogue]]
speaker = "テルル"
# 『直截に言いましょう──たった今、デネブの世界で流星群が発生しました』
line = "『直截に言いましょう──たった今、デネブの世界で流星群が発生しました』"

[[dialogue]]
speaker = "チナ"
# 「なっ……！？」
line = "「なっ……！？」"

[[dialogue]]
speaker = "テルル"
# 『極星学園の星騎士たちが応戦していますが、ホロウとの実力差は圧倒的……各地で大混乱が起こっています』
line = "『極星学園の星騎士たちが応戦していますが、ホロウとの実力差は圧倒的……各地で大混乱が起こっています』"

[[dialogue]]
speaker = "テルル"
# 『そして──ここ、アルタイルの地上でも、流星群はまだ停止していません。今に再び、大量のホロウが侵入してくることでしょう』
line = "『そして──ここ、アルタイルの地上でも、流星群はまだ停止していません。今に再び、大量のホロウが侵入してくることでしょう』"

[[dialogue]]
speaker = "ルヴィネ"
# 「転送装置は、アルタイルに在るものが全てよ。まだ新しい装置を創る時間はないはず……どうやって？」
line = "「転送装置は、アルタイルに在るものが全てよ。まだ新しい装置を創る時間はないはず……どうやって？」"

[[dialogue]]
speaker = "テルル"
# 『吸血鬼の少女、ベアトリスがアルタイルに来たのと同じ方法です』
line = "『吸血鬼の少女、ベアトリスがアルタイルに来たのと同じ方法です』"

[[dialogue]]
speaker = "ルヴィネ"
# 「……！　教皇庁前の、時空の裂け目！」
line = "「……！　教皇庁前の、時空の裂け目！」"

[[dialogue]]
speaker = "テルル"
# 『はい。製造したホロウを次々に放り込み──アルタイルに偶然たどり着けるルートを模索しているのです』
line = "『はい。製造したホロウを次々に放り込み──アルタイルに偶然たどり着けるルートを模索しているのです』"

[[dialogue]]
speaker = "テルル"
# 『すでに数百体のホロウが時空のはざまで塵と消えました……が、無限の試行回数の前には、いずれアルタイルに出現する個体が現れるのは自明です』
line = "『すでに数百体のホロウが時空のはざまで塵と消えました……が、無限の試行回数の前には、いずれアルタイルに出現する個体が現れるのは自明です』"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「そんな……命を何だと思って……」
line = "「そんな……命を何だと思って……」"

[[dialogue]]
speaker = "ジグ"
# 「まずいね。そうなればもう抑えきれない──装置を奪えば何とかなった、今の戦い以上の絶望が待っている……」
line = "「まずいね。そうなればもう抑えきれない──装置を奪えば何とかなった、今の戦い以上の絶望が待っている……」"

[[dialogue]]
speaker = "クロト"
# 「……大本を叩くしかない！　今すぐデネブに乗り込む！！」
line = "「……大本を叩くしかない！　今すぐデネブに乗り込む！！」"

[[dialogue]]
speaker = "テルル"
# 『声を届けることしかできず、申し訳ありません。ですが、時は一刻を争います。どうか世界を守ってください……』
line = "『声を届けることしかできず、申し訳ありません。ですが、時は一刻を争います。どうか世界を守ってください……』"

[[dialogue]]
speaker = "テルル"
# 『そしてもう１つ、あなたたちに伝えたいことがあります。よく、聞いてください──』
line = "『そしてもう１つ、あなたたちに伝えたいことがあります。よく、聞いてください──』"

[[dialogue]]
speaker = "unk"
# 女神テルルから重要な話を授かった後、俺たちは急いで塔を下り、地上へ向かうことになった。
line = "女神テルルから重要な話を授かった後、俺たちは急いで塔を下り、地上へ向かうことになった。"

[[dialogue]]
speaker = "unk"
# ショートカットの大穴が空いているとはいえ、フィーニスの塔は途方もない階層を連ねている──地上の様子を早く確認しなくては。
line = "ショートカットの大穴が空いているとはいえ、フィーニスの塔は途方もない階層を連ねている──地上の様子を早く確認しなくては。"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "クロト"
# 「……大丈夫か、ヴィーナス？」
line = "「……大丈夫か、ヴィーナス？」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「……うん」
line = "「……うん」"

[[dialogue]]
speaker = "unk"
# これからの決戦のために、俺たちが足を止めることは許されない──すまない、ヴィーナス。
line = "これからの決戦のために、俺たちが足を止めることは許されない──すまない、ヴィーナス。"

[[dialogue]]
speaker = "unk"
# そこかしこに残る戦禍と不気味な天空──しかし両学園は無事に守り切られていた。
line = "そこかしこに残る戦禍と不気味な天空──しかし両学園は無事に守り切られていた。"

[[dialogue]]
speaker = "unk"
# そのことに安堵した俺たちは、早速各地へ連絡を取った──
line = "そのことに安堵した俺たちは、早速各地へ連絡を取った──"

[[dialogue]]
speaker = "梨緒"
# 「魔王。それにベアト──よくやったな！　君たちならきっと成し遂げると思っていたぞ」
line = "「魔王。それにベアト──よくやったな！　君たちならきっと成し遂げると思っていたぞ」"

[[dialogue]]
speaker = "ベアトリス"
# 「梨緒ちゃんも！　地上はひどい戦いだったって……大丈夫だった！？」
line = "「梨緒ちゃんも！　地上はひどい戦いだったって……大丈夫だった！？」"

[[dialogue]]
speaker = "梨緒"
# 「偽のルヴィネに手こずりはしたが、防衛線は割っていない。校舎への被害も軽微だ。安心してくれ」
line = "「偽のルヴィネに手こずりはしたが、防衛線は割っていない。校舎への被害も軽微だ。安心してくれ」"

[[dialogue]]
speaker = "ルリエル"
# 「お帰りなさいなのです、フィオナ会長っ！」
line = "「お帰りなさいなのです、フィオナ会長っ！」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「みんな、無事で何より……よく持ちこたえてくれました！」
line = "「みんな、無事で何より……よく持ちこたえてくれました！」"

[[dialogue]]
speaker = "セーラ"
# 「も～大変だったよぉ。フィオナちゃんがいなくなった途端に強敵登場だもんね」
line = "「も～大変だったよぉ。フィオナちゃんがいなくなった途端に強敵登場だもんね」"

[[dialogue]]
speaker = "ユウリ"
# 「だいたいの事情は聞いた。デネブに乗り込まないと、この騒動は終わらないってな」
line = "「だいたいの事情は聞いた。デネブに乗り込まないと、この騒動は終わらないってな」"

[[dialogue]]
speaker = "ソフィア"
# 「準備はできています。流星星徒会、いつでもいけます！」
line = "「準備はできています。流星星徒会、いつでもいけます！」"

[[dialogue]]
speaker = "クロト"
# 「ありがとう。だがその前に──っと。噂をすれば、だな」
line = "「ありがとう。だがその前に──っと。噂をすれば、だな」"

[[dialogue]]
speaker = "アニマ"
# 「フヒヒヒ！　やぁやぁ会長。例のブツを仕入れたと聞いて飛んで来たヨ！」
line = "「フヒヒヒ！　やぁやぁ会長。例のブツを仕入れたと聞いて飛んで来たヨ！」"

[[dialogue]]
speaker = "アニマ"
# 「早速、検めさせてもらおウ！　敵は待ってはくれないからネ！」
line = "「早速、検めさせてもらおウ！　敵は待ってはくれないからネ！」"

[[dialogue]]
speaker = "クロト"
# 「ええ。これ、お願いします」
line = "「ええ。これ、お願いします」"

[[dialogue]]
speaker = "チナ"
# 「転送装置……魔王が使うんじゃないのか？」
line = "「転送装置……魔王が使うんじゃないのか？」"

[[dialogue]]
speaker = "クロト"
# 「いいや。操作は全て、アルタイル世界からアニマ先輩たちに行ってもらう」
line = "「いいや。操作は全て、アルタイル世界からアニマ先輩たちに行ってもらう」"

[[dialogue]]
speaker = "クロト"
# 「デネブに比べて、アルタイルの方が戦力に余裕がある。デネブに戦力を逐次投入するために、装置はアルタイル側に置いた方が効率がいい」
line = "「デネブに比べて、アルタイルの方が戦力に余裕がある。デネブに戦力を逐次投入するために、装置はアルタイル側に置いた方が効率がいい」"

[[dialogue]]
speaker = "梨緒"
# 「しかしそれだと、もしもの時に帰還が──いや。そもそも敗北すれば結末は一緒か」
line = "「しかしそれだと、もしもの時に帰還が──いや。そもそも敗北すれば結末は一緒か」"

[[dialogue]]
speaker = "クロト"
# 「ああ。自分の生まれ育った世界で死ねないってだけだ」
line = "「ああ。自分の生まれ育った世界で死ねないってだけだ」"

[[dialogue]]
speaker = "クロト"
# 「作戦の概要を伝えるぞ。まずルヴィネたちと一緒に、アルタイルの精鋭が先遣部隊としてデネブ救出に向かう」
line = "「作戦の概要を伝えるぞ。まずルヴィネたちと一緒に、アルタイルの精鋭が先遣部隊としてデネブ救出に向かう」"

[[dialogue]]
speaker = "クロト"
# 「目的は『ＸＥＬＯＳ』の打倒ではなく、あくまでもホロウの無限増殖と次元渡りを阻止することだ」
line = "「目的は『ＸＥＬＯＳ』の打倒ではなく、あくまでもホロウの無限増殖と次元渡りを阻止することだ」"

[[dialogue]]
speaker = "クロト"
# 「……この作戦は、片道切符になってしまうかもしれない。みんな、覚悟はいいか？」
line = "「……この作戦は、片道切符になってしまうかもしれない。みんな、覚悟はいいか？」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「当然よ！　アルタイルもデネブも、ぜーんぶ守り切らなきゃ勝ったとは言えないわ！」
line = "「当然よ！　アルタイルもデネブも、ぜーんぶ守り切らなきゃ勝ったとは言えないわ！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……本当に、ありがとう。感謝するわ」
line = "「……本当に、ありがとう。感謝するわ」"

[[dialogue]]
speaker = "アニマ"
# 「しかし──転送装置も２台あるとなれば、話は変わってくるゾ！」
line = "「しかし──転送装置も２台あるとなれば、話は変わってくるゾ！」"

[[dialogue]]
speaker = "アニマ"
# 「トレジアンナにも準備はさせていルヨ！　彼女とアニマの２人が揃えバ……フヒヒ！　会長、例の件は実行に移させてもらおウ！」
line = "「トレジアンナにも準備はさせていルヨ！　彼女とアニマの２人が揃えバ……フヒヒ！　会長、例の件は実行に移させてもらおウ！」"

[[dialogue]]
speaker = "クロト"
# 「はい！　よろしくお願いします、アニマ先輩」
line = "「はい！　よろしくお願いします、アニマ先輩」"

[[dialogue]]
speaker = "unk"
# 早くも転送装置を何かの計器にかけて測定を始めたアニマ先輩に頭を下げてから、俺はみんなの方へ向き直る。
line = "早くも転送装置を何かの計器にかけて測定を始めたアニマ先輩に頭を下げてから、俺はみんなの方へ向き直る。"

[[dialogue]]
speaker = "クロト"
# 「デネブへの先遣部隊は、新星、流星、極星学園の星徒会メンバー……」
line = "「デネブへの先遣部隊は、新星、流星、極星学園の星徒会メンバー……」"

[[dialogue]]
speaker = "クロト"
# 「そして選管の梨緒とジグ。……アポロは、同一存在がデネブにいるから、留守番だ」
line = "「そして選管の梨緒とジグ。……アポロは、同一存在がデネブにいるから、留守番だ」"

[[dialogue]]
speaker = "アポロ"
# 「ああ。アルタイルは必ず守る……安心して行ってこい！」
line = "「ああ。アルタイルは必ず守る……安心して行ってこい！」"

[[dialogue]]
speaker = "煌嶺"
# 「妾とリーエンの席も、当然あるのであろうな？」
line = "「妾とリーエンの席も、当然あるのであろうな？」"

[[dialogue]]
speaker = "unk"
# 煌嶺が部下のリーエンを連れてやってきた。
line = "煌嶺が部下のリーエンを連れてやってきた。"

[[dialogue]]
speaker = "クロト"
# 「勿論だ。キュリオス勢の助力なしで、今の状況はひっくり返せない」
line = "「勿論だ。キュリオス勢の助力なしで、今の状況はひっくり返せない」"

[[dialogue]]
speaker = "エステル"
# 「──魔王様！　遅くなり申し訳ございません！」
line = "「──魔王様！　遅くなり申し訳ございません！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……エステル」
line = "「……エステル」"

[[dialogue]]
speaker = "エステル"
# 「ルヴィネ会長。先ほど、魔王様から送られてきたメッセージで、おおかたの事情は把握しています……とても驚きましたが……」
line = "「ルヴィネ会長。先ほど、魔王様から送られてきたメッセージで、おおかたの事情は把握しています……とても驚きましたが……」"

[[dialogue]]
speaker = "エステル"
# 「貴女の出自がどうであれ──世界を救う仲間であると。それさえ事実であるならば、このエステル。共に戦います！」
line = "「貴女の出自がどうであれ──世界を救う仲間であると。それさえ事実であるならば、このエステル。共に戦います！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……ごめんなさい。そう言ってもらえて、心強いわ」
line = "「……ごめんなさい。そう言ってもらえて、心強いわ」"

[[dialogue]]
