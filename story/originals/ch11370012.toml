[[dialogue]]
speaker = "unk"
# 第２話,レミカとルルカ,P
line = "第２話,レミカとルルカ,P"

[[dialogue]]
speaker = "unk"
# その日、レミカは空き教室に、とある人物を呼び出していた。
line = "その日、レミカは空き教室に、とある人物を呼び出していた。"

[[dialogue]]
speaker = "ルルカ"
# 「失礼します。お兄ちゃん、レミカ先輩、こんにちは～♪」
line = "「失礼します。お兄ちゃん、レミカ先輩、こんにちは～♪」"

[[dialogue]]
speaker = "unk"
# やって来たのは、レミカと同じ『聖歌隊』に所属する後輩でもある、新星学園１年生の<ruby=うみのべ>海野辺</ruby>ルルカだった。
line = "やって来たのは、レミカと同じ『聖歌隊』に所属する後輩でもある、新星学園１年生の<ruby>海野辺<rt>うみのべ</rt></ruby>ルルカだった。"

[[dialogue]]
speaker = "レミカ"
# 「こんにちは、ルルカさん。来てくれてありがとう」
line = "「こんにちは、ルルカさん。来てくれてありがとう」"

[[dialogue]]
speaker = "ルルカ"
# 「いえいえ～。それで、あたしに話というのは……？」
line = "「いえいえ～。それで、あたしに話というのは……？」"

[[dialogue]]
speaker = "unk"
# ちらりとこちらに視線を向けてくるルルカ。俺は彼女とも面識がある為、レミカに頼まれて、この場に同席していた。
line = "ちらりとこちらに視線を向けてくるルルカ。俺は彼女とも面識がある為、レミカに頼まれて、この場に同席していた。"

[[dialogue]]
speaker = "レミカ"
# 「うん。実は相談があってね……」
line = "「うん。実は相談があってね……」"

[[dialogue]]
speaker = "レミカ"
# 「よかったら、私と一緒に――新しいアイドルユニットを組んでくれないかなって」
line = "「よかったら、私と一緒に――新しいアイドルユニットを組んでくれないかなって」"

[[dialogue]]
speaker = "ルルカ"
# 「えぇっ！？」
line = "「えぇっ！？」"

[[dialogue]]
speaker = "ルルカ"
# 「あ、あたしが……レミカ先輩と一緒にアイドル！？」
line = "「あ、あたしが……レミカ先輩と一緒にアイドル！？」"

[[dialogue]]
speaker = "レミカ"
# 「そう。前にメルエルと『アーネスト』ってユニットを組んだ時みたいに、私と一緒に歌ってくれる相手を探してたんだ」
line = "「そう。前にメルエルと『アーネスト』ってユニットを組んだ時みたいに、私と一緒に歌ってくれる相手を探してたんだ」"

[[dialogue]]
speaker = "レミカ"
# 「私、ルルカさんの歌声は、前からいいなって思ってたの。特に最近は、歌声により磨きがかかってきてて……聴いていて、すごくアイドルの輝きを感じるんだ」
line = "「私、ルルカさんの歌声は、前からいいなって思ってたの。特に最近は、歌声により磨きがかかってきてて……聴いていて、すごくアイドルの輝きを感じるんだ」"

[[dialogue]]
speaker = "ルルカ"
# 「と、トップアイドルのレミカ先輩に、そんなふうに言ってもらえるなんて……！」
line = "「と、トップアイドルのレミカ先輩に、そんなふうに言ってもらえるなんて……！」"

[[dialogue]]
speaker = "レミカ"
# 「だからね、ルルカさんと一緒に歌ってみたいって思ったの。……どうかな？」
line = "「だからね、ルルカさんと一緒に歌ってみたいって思ったの。……どうかな？」"

[[dialogue]]
speaker = "ルルカ"
# 「……すごく光栄で、嬉しいです。でも……」
line = "「……すごく光栄で、嬉しいです。でも……」"

[[dialogue]]
speaker = "unk"
# ルルカは少し考え込むように間を置き、やがて口を開く。
line = "ルルカは少し考え込むように間を置き、やがて口を開く。"

[[dialogue]]
speaker = "ルルカ"
# 「……ごめんなさい」
line = "「……ごめんなさい」"

[[dialogue]]
speaker = "ルルカ"
# 「あたし、今は自分で頑張りたいって、強く思っていることがあって……」
line = "「あたし、今は自分で頑張りたいって、強く思っていることがあって……」"

[[dialogue]]
speaker = "ルルカ"
# 「それは、あたし１人だけの活動じゃなくて、応援してくれている人たちがいるからできることで……」
line = "「それは、あたし１人だけの活動じゃなくて、応援してくれている人たちがいるからできることで……」"

[[dialogue]]
speaker = "ルルカ"
# 「私は、その期待にちゃんと応えたいんです。だから……」
line = "「私は、その期待にちゃんと応えたいんです。だから……」"

[[dialogue]]
speaker = "レミカ"
# 「それって……Ｖチューバー活動のこと？」
line = "「それって……Ｖチューバー活動のこと？」"

[[dialogue]]
speaker = "ルルカ"
# 「え゛っ……！？」
line = "「え゛っ……！？」"

[[dialogue]]
speaker = "unk"
# 俺も思わず驚いて、レミカの顔を見てしまう。
line = "俺も思わず驚いて、レミカの顔を見てしまう。"

[[dialogue]]
speaker = "レミカ"
# 「私ね、『<ruby=うしお>汐</ruby>ルカルカ』っていうＶチューバーの歌が気に入ってて、最近よく聴いてるんだ」
line = "「私ね、『<ruby>汐<rt>うしお</rt></ruby>ルカルカ』っていうＶチューバーの歌が気に入ってて、最近よく聴いてるんだ」"

[[dialogue]]
speaker = "レミカ"
# 「それで、私も歌を仕事にしてるプロだからさ……歌声を聴いてると、わかっちゃうんだよね」
line = "「それで、私も歌を仕事にしてるプロだからさ……歌声を聴いてると、わかっちゃうんだよね」"

[[dialogue]]
speaker = "レミカ"
# 「『汐ルカルカ』の中の人って――ルルカさんなんじゃないかって」
line = "「『汐ルカルカ』の中の人って――ルルカさんなんじゃないかって」"

[[dialogue]]
speaker = "ルルカ"
# 「ぎくぅっ……！」
line = "「ぎくぅっ……！」"

[[dialogue]]
speaker = "unk"
# わかりやすく、思いっきり表情に出てしまうルルカ――良くも悪くも、彼女は正直者なのだ。
line = "わかりやすく、思いっきり表情に出てしまうルルカ――良くも悪くも、彼女は正直者なのだ。"

[[dialogue]]
speaker = "レミカ"
# 「その反応……どうやら当たりみたいだね」
line = "「その反応……どうやら当たりみたいだね」"

[[dialogue]]
speaker = "ルルカ"
# 「う……！　そ、その……はい……そうです……」
line = "「う……！　そ、その……はい……そうです……」"

[[dialogue]]
speaker = "unk"
# 観念したように、ルルカは小さく頷く。
line = "観念したように、ルルカは小さく頷く。"

[[dialogue]]
speaker = "レミカ"
# 「あとさ……じ～っ……会長もこのこと、知ってたでしょ？」
line = "「あとさ……じ～っ……会長もこのこと、知ってたでしょ？」"

[[dialogue]]
speaker = "unk"
# えっ！？
line = "えっ！？"

[[dialogue]]
speaker = "レミカ"
# 「やっぱり。まぁ……会長のことはひとまず置いておいて――」
line = "「やっぱり。まぁ……会長のことはひとまず置いておいて――」"

[[dialogue]]
speaker = "レミカ"
# 「……ルルカさんは、ルカルカとしての活動があるから、アイドルユニットは難しいってことでいいのかな？」
line = "「……ルルカさんは、ルカルカとしての活動があるから、アイドルユニットは難しいってことでいいのかな？」"

[[dialogue]]
speaker = "ルルカ"
# 「そ、それもありますけど……」
line = "「そ、それもありますけど……」"

[[dialogue]]
speaker = "ルルカ"
# 「あとは……あたしが、レミカ先輩と並んで歌うなんて、恐れ多いというか……」
line = "「あとは……あたしが、レミカ先輩と並んで歌うなんて、恐れ多いというか……」"

[[dialogue]]
speaker = "ルルカ"
# 「あたし、自分にはレミカ先輩ほどの歌の才能はないって思っていて……」
line = "「あたし、自分にはレミカ先輩ほどの歌の才能はないって思っていて……」"

[[dialogue]]
speaker = "レミカ"
# 「それ、誰かに言われたの？」
line = "「それ、誰かに言われたの？」"

[[dialogue]]
speaker = "ルルカ"
# 「え……？　いえ……自分で、先輩の歌を聴いていて、そう感じたというか……」
line = "「え……？　いえ……自分で、先輩の歌を聴いていて、そう感じたというか……」"

[[dialogue]]
speaker = "レミカ"
# 「だったら、そんなのは思い込みだから、気にしなくていいよ」
line = "「だったら、そんなのは思い込みだから、気にしなくていいよ」"

[[dialogue]]
speaker = "レミカ"
# 「私は――ルルカさんには歌の才能があると思ってる」
line = "「私は――ルルカさんには歌の才能があると思ってる」"

[[dialogue]]
speaker = "レミカ"
# 「だって私、ルカルカ……ルルカさんの歌を聴いて、一緒に歌ってみたいって、心が動かされたんだから」
line = "「だって私、ルカルカ……ルルカさんの歌を聴いて、一緒に歌ってみたいって、心が動かされたんだから」"

[[dialogue]]
speaker = "ルルカ"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "ルルカ"
# 「レミカ先輩が……あたしの歌で……」
line = "「レミカ先輩が……あたしの歌で……」"

[[dialogue]]
speaker = "レミカ"
# 「ルルカさんは、私とは違う歌を唄うことができる。そして、その歌はちゃんと評価されてる」
line = "「ルルカさんは、私とは違う歌を唄うことができる。そして、その歌はちゃんと評価されてる」"

[[dialogue]]
speaker = "レミカ"
# 「動画の再生数やコメントを見れば、どれだけ人の心に響いているかわかるよ。ルルカさんは、私も含めて、ちゃんと誰かの心に届く歌を唄えてる」
line = "「動画の再生数やコメントを見れば、どれだけ人の心に響いているかわかるよ。ルルカさんは、私も含めて、ちゃんと誰かの心に届く歌を唄えてる」"

[[dialogue]]
speaker = "ルルカ"
# 「レミカ先輩……！　ありがとうございます……そう言ってもらえて、すごく嬉しいです……♪」
line = "「レミカ先輩……！　ありがとうございます……そう言ってもらえて、すごく嬉しいです……♪」"

[[dialogue]]
speaker = "レミカ"
# 「それでね……ルルカさんがルカルカだって分かった上で――」
line = "「それでね……ルルカさんがルカルカだって分かった上で――」"

[[dialogue]]
speaker = "レミカ"
# 「私は、Ｖチューバーとして、アイドルユニットを組んでみたいって思ってるんだ」
line = "「私は、Ｖチューバーとして、アイドルユニットを組んでみたいって思ってるんだ」"

[[dialogue]]
speaker = "ルルカ"
# 「え？　それって……」
line = "「え？　それって……」"

[[dialogue]]
speaker = "レミカ"
# 「実は私も、別の姿でＶチューバー活動をしてみたいと思ってて――」
line = "「実は私も、別の姿でＶチューバー活動をしてみたいと思ってて――」"

[[dialogue]]
speaker = "unk"
# それからレミカは、こどもの日を巡る一件について、ルルカに詳しく説明した。
line = "それからレミカは、こどもの日を巡る一件について、ルルカに詳しく説明した。"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「――で、これが私が新しく変身できるようになった、リトルフォームなんだ」
line = "「――で、これが私が新しく変身できるようになった、リトルフォームなんだ」"

[[dialogue]]
speaker = "ルルカ"
# 「わぁ～っ！！　小さくなったレミカ先輩、すっごく可愛い～！」
line = "「わぁ～っ！！　小さくなったレミカ先輩、すっごく可愛い～！」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「ありがとう。それでね、アイドルユニットを組むなら、一応コンセプトも考えてて……」
line = "「ありがとう。それでね、アイドルユニットを組むなら、一応コンセプトも考えてて……」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「ルカルカに合わせて、『妹キャラ』で行こうかなって考えてるんだ」
line = "「ルカルカに合わせて、『妹キャラ』で行こうかなって考えてるんだ」"

[[dialogue]]
speaker = "ルルカ"
# 「えっ！？　レミカ先輩が妹キャラを！？」
line = "「えっ！？　レミカ先輩が妹キャラを！？」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「この前、会長と出かけた時に、妹キャラで１日過ごしてみたんだけど……反応がすごく良かったんだ」
line = "「この前、会長と出かけた時に、妹キャラで１日過ごしてみたんだけど……反応がすごく良かったんだ」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「ね？　<b>兄さん</b>♪」
line = "「ね？　<b>兄さん</b>♪」"

[[dialogue]]
speaker = "ルルカ"
# 「なっ……！　お兄ちゃん、まさか本当は妹が性癖だったの！？」
line = "「なっ……！　お兄ちゃん、まさか本当は妹が性癖だったの！？」"

[[dialogue]]
speaker = "unk"
# 確かに可愛いとは言ったけども！
line = "確かに可愛いとは言ったけども！"

[[dialogue]]
speaker = "unk"
# 待て待て！
line = "待て待て！"

[[dialogue]]
speaker = "unk"
# 俺が元々好きになったのは大きいレミカの方なのであって、性癖と言われるのは、誤解が過ぎる！
line = "俺が元々好きになったのは大きいレミカの方なのであって、性癖と言われるのは、誤解が過ぎる！"

[[dialogue]]
speaker = "ルルカ"
# 「でも、レミカ先輩が『妹同盟』に参加してくれるなら、すごく面白そうかも♪」
line = "「でも、レミカ先輩が『妹同盟』に参加してくれるなら、すごく面白そうかも♪」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「妹同盟……？　そんなのがあるの？」
line = "「妹同盟……？　そんなのがあるの？」"

[[dialogue]]
speaker = "ルルカ"
# 「はい！　妹っぽい子たちを集めて、チャットグループでよくやり取りしてるんですよ♪」
line = "「はい！　妹っぽい子たちを集めて、チャットグループでよくやり取りしてるんですよ♪」"

[[dialogue]]
speaker = "ルルカ"
# 「レミカ先輩も、せっかくですし参加しませんか？　そのリトルフォームなら、新しい妹仲間として大歓迎です♪」
line = "「レミカ先輩も、せっかくですし参加しませんか？　そのリトルフォームなら、新しい妹仲間として大歓迎です♪」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「妹同盟……うん、面白そう。可愛さの研究にもなりそうだし」
line = "「妹同盟……うん、面白そう。可愛さの研究にもなりそうだし」"

[[dialogue]]
speaker = "ルルカ"
# 「じゃあ、このあと招待送りますね♪」
line = "「じゃあ、このあと招待送りますね♪」"

[[dialogue]]
speaker = "unk"
# こうしてレミカは、妹同盟に参加したり、Ｖチューバーとしてコラボして歌ったりと――
line = "こうしてレミカは、妹同盟に参加したり、Ｖチューバーとしてコラボして歌ったりと――"

[[dialogue]]
speaker = "unk"
# この日をきっかけに、以前よりもルルカと親交を深めていくことになるのだった。
line = "この日をきっかけに、以前よりもルルカと親交を深めていくことになるのだった。"
