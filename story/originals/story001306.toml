[[dialogue]]
speaker = "unk"
# マトイがアムにデートへ誘われた翌日――
line = "マトイがアムにデートへ誘われた翌日――"

[[dialogue]]
speaker = "アム"
# 「というわけで、やって来ました！　街へおでかけデート♪」
line = "「というわけで、やって来ました！　街へおでかけデート♪」"

[[dialogue]]
speaker = "マトイ"
# 「お、おでかけはいいんだけど、なんでデート？
line = "「お、おでかけはいいんだけど、なんでデート？"

[[dialogue]]
speaker = "アム"
# 「ふふふ、カッコいい言い回しでしょ？　あとはそう、マトイ先輩と仲良くなりたいと思って！」
line = "「ふふふ、カッコいい言い回しでしょ？　あとはそう、マトイ先輩と仲良くなりたいと思って！」"

[[dialogue]]
speaker = "アム"
# 「ほら、マトイ先輩とは同じ盾使いなのに、プライベートで遊んだりとか、そういう交流をしたことがなかったじゃないですか。なんで、いい機会かなぁと思いまして♪」
line = "「ほら、マトイ先輩とは同じ盾使いなのに、プライベートで遊んだりとか、そういう交流をしたことがなかったじゃないですか。なんで、いい機会かなぁと思いまして♪」"

[[dialogue]]
speaker = "マトイ"
# 「まあ、学年も、学園も違うし……でも、デートって、具体的には何を？」
line = "「まあ、学年も、学園も違うし……でも、デートって、具体的には何を？」"

[[dialogue]]
speaker = "アム"
# 「目的はお互いのことを知る為ですから、自分の好きなものを紹介する、とかどうでしょう？　じゃあ、まずは言い出しっぺのあたしから！」
line = "「目的はお互いのことを知る為ですから、自分の好きなものを紹介する、とかどうでしょう？　じゃあ、まずは言い出しっぺのあたしから！」"

[[dialogue]]
speaker = "アム"
# 「マトイ先輩、ボウリングで勝負しましょう！」
line = "「マトイ先輩、ボウリングで勝負しましょう！」"

[[dialogue]]
speaker = "unk"
# そうして、マトイはアムとボウリング場へ入る。
line = "そうして、マトイはアムとボウリング場へ入る。"

[[dialogue]]
speaker = "アム"
# 「マトイ先輩、ボウリングは経験者ですか？」
line = "「マトイ先輩、ボウリングは経験者ですか？」"

[[dialogue]]
speaker = "マトイ"
# 「うん、一時期ハマってた時期があって、それなりにかな。アムちゃんはよく、ボウリングやるの？」
line = "「うん、一時期ハマってた時期があって、それなりにかな。アムちゃんはよく、ボウリングやるの？」"

[[dialogue]]
speaker = "アム"
# 「はい！　あたし、スポーツ全般好きなんで♪」
line = "「はい！　あたし、スポーツ全般好きなんで♪」"

[[dialogue]]
speaker = "アム"
# 「――じゃあ、あたしから行きますよ～。えいっ！」
line = "「――じゃあ、あたしから行きますよ～。えいっ！」"

[[dialogue]]
speaker = "アム"
# 「よし！　ストライク！」
line = "「よし！　ストライク！」"

[[dialogue]]
speaker = "マトイ"
# 「おっ、１発目からすごい！」
line = "「おっ、１発目からすごい！」"

[[dialogue]]
speaker = "アム"
# 「次はマトイ先輩の番ですよ。お手並み拝見です！」
line = "「次はマトイ先輩の番ですよ。お手並み拝見です！」"

[[dialogue]]
speaker = "マトイ"
# 「う～ん、私はボウリングも普通だから、そんな期待されるほどじゃないけど……えいっ！」
line = "「う～ん、私はボウリングも普通だから、そんな期待されるほどじゃないけど……えいっ！」"

[[dialogue]]
speaker = "マトイ"
# 「あっ、ピンが１本残っちゃった。じゃあせめてスペアに――」
line = "「あっ、ピンが１本残っちゃった。じゃあせめてスペアに――」"

[[dialogue]]
speaker = "マトイ"
# 「よし、倒せた！」
line = "「よし、倒せた！」"

[[dialogue]]
speaker = "アム"
# 「やりますね～。でも、あたしの方が１歩リードです。この調子で行きますよ～！」
line = "「やりますね～。でも、あたしの方が１歩リードです。この調子で行きますよ～！」"

[[dialogue]]
speaker = "unk"
# そうして、ボウリングを３ゲームし終えた２人は、次にマトイの案内で、オシャレなカフェへと足を運んでいた。
line = "そうして、ボウリングを３ゲームし終えた２人は、次にマトイの案内で、オシャレなカフェへと足を運んでいた。"

[[dialogue]]
speaker = "アム"
# 「マトイ先輩、ケーキが好きだったんですね」
line = "「マトイ先輩、ケーキが好きだったんですね」"

[[dialogue]]
speaker = "マトイ"
# 「うん。この辺りだと、ここのお店のケーキがお気に入りなんだ。どうかな？」
line = "「うん。この辺りだと、ここのお店のケーキがお気に入りなんだ。どうかな？」"

[[dialogue]]
speaker = "アム"
# 「すごく美味しいです！　それにお店の内装や、ケーキの見た目もオシャレで……大人っぽい感じ♪」
line = "「すごく美味しいです！　それにお店の内装や、ケーキの見た目もオシャレで……大人っぽい感じ♪」"

[[dialogue]]
speaker = "マトイ"
# 「ふふっ、気に入ってもらえたならよかった♪」
line = "「ふふっ、気に入ってもらえたならよかった♪」"

[[dialogue]]
speaker = "アム"
# 「ところでマトイ先輩、さっきのボウリング、あたし驚きました！　ボウリングは結構自信あったんですけど、２ゲーム負けちゃって……正直悔しいです！」
line = "「ところでマトイ先輩、さっきのボウリング、あたし驚きました！　ボウリングは結構自信あったんですけど、２ゲーム負けちゃって……正直悔しいです！」"

[[dialogue]]
speaker = "マトイ"
# 「いやいや、僅差だったし。最後の１ゲームも、あと１つストライク取られてたら、負けてたよ」
line = "「いやいや、僅差だったし。最後の１ゲームも、あと１つストライク取られてたら、負けてたよ」"

[[dialogue]]
speaker = "アム"
# 「マトイ先輩って、訓練見てても思いますけど、安定感がすごいですよね。ブレが少ないっていうか……」
line = "「マトイ先輩って、訓練見てても思いますけど、安定感がすごいですよね。ブレが少ないっていうか……」"

[[dialogue]]
speaker = "アム"
# 「今回のボウリングでも、ガーターがないのはもちろん、ストライクを外しても、スペアはしっかりと取ってくる感じで」
line = "「今回のボウリングでも、ガーターがないのはもちろん、ストライクを外しても、スペアはしっかりと取ってくる感じで」"

[[dialogue]]
speaker = "マトイ"
# 「私はもっと、ストライク取りたいんだけどね～。特別得意なわけじゃないから、自然とそういうやり方になっちゃう」
line = "「私はもっと、ストライク取りたいんだけどね～。特別得意なわけじゃないから、自然とそういうやり方になっちゃう」"

[[dialogue]]
speaker = "マトイ"
# 「アムちゃんは、私よりもストライク取れてたじゃない？　私もあれくらい上手かったらよかったんだけどね～」
line = "「アムちゃんは、私よりもストライク取れてたじゃない？　私もあれくらい上手かったらよかったんだけどね～」"

[[dialogue]]
speaker = "アム"
# 「……マトイ先輩って、実はかなり器用ですよね」
line = "「……マトイ先輩って、実はかなり器用ですよね」"

[[dialogue]]
speaker = "マトイ"
# 「え？　そうかな？　自分では普通くらいだと思ってるけど……」
line = "「え？　そうかな？　自分では普通くらいだと思ってるけど……」"

[[dialogue]]
speaker = "アム"
# 「あたし、思ったんですけど……マトイ先輩が星徒会のディフェンス役なのって、たまたま武器に盾があったから、だったりしますか？」
line = "「あたし、思ったんですけど……マトイ先輩が星徒会のディフェンス役なのって、たまたま武器に盾があったから、だったりしますか？」"

[[dialogue]]
speaker = "マトイ"
# 「あ、うん。……それが理由の半分かな」
line = "「あ、うん。……それが理由の半分かな」"

[[dialogue]]
speaker = "マトイ"
# 「ほら、学園に入ったばかりの時に、戦闘適性の試験ってあるでしょ。私は元々、そこでは『オールラウンダー』って判定だったんだよね」
line = "「ほら、学園に入ったばかりの時に、戦闘適性の試験ってあるでしょ。私は元々、そこでは『オールラウンダー』って判定だったんだよね」"

[[dialogue]]
speaker = "マトイ"
# 「私の武器は、盾だけじゃなくて、剣もある」
line = "「私の武器は、盾だけじゃなくて、剣もある」"

[[dialogue]]
speaker = "マトイ"
# 「私が今みたいにディフェンス役を担当するようになったのは、星徒会に入った時に、そういうポジションが誰もいなかったからなんだよね」
line = "「私が今みたいにディフェンス役を担当するようになったのは、星徒会に入った時に、そういうポジションが誰もいなかったからなんだよね」"

[[dialogue]]
speaker = "マトイ"
# 「というより、他のみんなの攻撃力がすごくて、普通の私は出番がなかったって感じかな。一方で、防御に関しては、みんな特別得意ってわけじゃなかった」
line = "「というより、他のみんなの攻撃力がすごくて、普通の私は出番がなかったって感じかな。一方で、防御に関しては、みんな特別得意ってわけじゃなかった」"

[[dialogue]]
speaker = "マトイ"
# 「だから、私が防御を担当しようって思って……今に至る感じ」
line = "「だから、私が防御を担当しようって思って……今に至る感じ」"

[[dialogue]]
speaker = "マトイ"
# 「アムちゃんがさっき、器用だって言ってくれたけど……私からすると、『器用貧乏』なんだよね」
line = "「アムちゃんがさっき、器用だって言ってくれたけど……私からすると、『器用貧乏』なんだよね」"

[[dialogue]]
speaker = "マトイ"
# 「私の水着フォームも、まさにそんな感じでさ。目覚めたのは何故か、回復方面を強化した力だった」
line = "「私の水着フォームも、まさにそんな感じでさ。目覚めたのは何故か、回復方面を強化した力だった」"

[[dialogue]]
speaker = "マトイ"
# 「本当は私もアムちゃんみたいに、防御方面に特化できたらよかったんだけど……」
line = "「本当は私もアムちゃんみたいに、防御方面に特化できたらよかったんだけど……」"

[[dialogue]]
speaker = "マトイ"
# 「……ねぇ、アムちゃん。こんなこと聞かれても困るかもしれないけど……どうしたらアムちゃんみたいに強くなれるかな？」
line = "「……ねぇ、アムちゃん。こんなこと聞かれても困るかもしれないけど……どうしたらアムちゃんみたいに強くなれるかな？」"

[[dialogue]]
speaker = "アム"
# 「あたしみたいに、ですか？」
line = "「あたしみたいに、ですか？」"

[[dialogue]]
speaker = "マトイ"
# 「そう。私、今回アムちゃんの訓練を見てて、同じようになりたいって思ったんだ」
line = "「そう。私、今回アムちゃんの訓練を見てて、同じようになりたいって思ったんだ」"

[[dialogue]]
speaker = "マトイ"
# 「もちろん、私はアムちゃんみたいに天才じゃないから、同じようには行かないのはわかってる。だけど、少しでも盾使いとして近付けたらって……」
line = "「もちろん、私はアムちゃんみたいに天才じゃないから、同じようには行かないのはわかってる。だけど、少しでも盾使いとして近付けたらって……」"

[[dialogue]]
speaker = "アム"
# 「あたしが天才……。いや～、照れるな～♪　それ程でも～」
line = "「あたしが天才……。いや～、照れるな～♪　それ程でも～」"

[[dialogue]]
speaker = "アム"
# 「……と言いたいところですけど、マトイ先輩」
line = "「……と言いたいところですけど、マトイ先輩」"

[[dialogue]]
speaker = "アム"
# 「あたし、正直自分は、天才なんかじゃないと思ってます」
line = "「あたし、正直自分は、天才なんかじゃないと思ってます」"

[[dialogue]]
speaker = "マトイ"
# 「え……？」
line = "「え……？」"

[[dialogue]]
speaker = "アム"
# 「本当の天才っていうのは、規格外の星力を持つヴィーナス前会長や――」
line = "「本当の天才っていうのは、規格外の星力を持つヴィーナス前会長や――」"

[[dialogue]]
speaker = "アム"
# 「『竜』という特別な種族に生まれて、引力をも自在に操るマムみたいなヒトを言うんだと、あたしは思ってます」
line = "「『竜』という特別な種族に生まれて、引力をも自在に操るマムみたいなヒトを言うんだと、あたしは思ってます」"

[[dialogue]]
speaker = "マトイ"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "アム"
# 「でも、あたしはそんな人たちにも負けたくないって心持ちで頑張ってます。だって、流星学園には――」
line = "「でも、あたしはそんな人たちにも負けたくないって心持ちで頑張ってます。だって、流星学園には――」"

[[dialogue]]
speaker = "アム"
# 「たゆまぬ努力の末、マムに並ぶ程の強さを手に入れた、千園寺ヒルディオーネ先輩がいるから」
line = "「たゆまぬ努力の末、マムに並ぶ程の強さを手に入れた、千園寺ヒルディオーネ先輩がいるから」"

[[dialogue]]
speaker = "アム"
# 「それで、どうしたら強くなれるのか知りたい、って話でしたよね――」
line = "「それで、どうしたら強くなれるのか知りたい、って話でしたよね――」"

[[dialogue]]
speaker = "アム"
# 「あたしは、負けない強さを手に入れる為に必要なのは、『心の盾』に誓うことだと思ってます」
line = "「あたしは、負けない強さを手に入れる為に必要なのは、『心の盾』に誓うことだと思ってます」"

[[dialogue]]
speaker = "マトイ"
# 「心の盾……？」
line = "「心の盾……？」"

[[dialogue]]
speaker = "アム"
# 「ディフェンス役は戦う時、他の誰よりも前に立って、敵の攻撃を受け止めて、耐え続けます」
line = "「ディフェンス役は戦う時、他の誰よりも前に立って、敵の攻撃を受け止めて、耐え続けます」"

[[dialogue]]
speaker = "アム"
# 「星徒会としてリクリエの最前線、その１番前で盾を構えてきたマトイ先輩なら、わかるはずです――」
line = "「星徒会としてリクリエの最前線、その１番前で盾を構えてきたマトイ先輩なら、わかるはずです――」"

[[dialogue]]
speaker = "アム"
# 「モンスターの攻撃を受け止めるって、すごく怖いことですよね？」
line = "「モンスターの攻撃を受け止めるって、すごく怖いことですよね？」"

[[dialogue]]
speaker = "アム"
# 「だから、自身の心の支えとなる固い信念が必要なはずです。それを、あたしは心の盾って呼んでます」
line = "「だから、自身の心の支えとなる固い信念が必要なはずです。それを、あたしは心の盾って呼んでます」"

[[dialogue]]
speaker = "アム"
# 「マトイ先輩の信念は何ですか？」
line = "「マトイ先輩の信念は何ですか？」"

[[dialogue]]
speaker = "マトイ"
# 「私の……信念……」
line = "「私の……信念……」"

[[dialogue]]
speaker = "アム"
# 「絶対に何かあるはずです、自覚してないだけで。でなきゃ、星徒会のディフェンス役を続けることなんてできない」
line = "「絶対に何かあるはずです、自覚してないだけで。でなきゃ、星徒会のディフェンス役を続けることなんてできない」"

[[dialogue]]
speaker = "unk"
# 見たことのない真面目な顔をして、マトイの目を真っ直ぐに見るアム。
line = "見たことのない真面目な顔をして、マトイの目を真っ直ぐに見るアム。"

[[dialogue]]
speaker = "unk"
# しばし沈黙が流れて――
line = "しばし沈黙が流れて――"

[[dialogue]]
speaker = "アム"
# 「……ちなみに、あたしは『自分がカッコいいと思える理想の自分を守り抜くこと』です！」
line = "「……ちなみに、あたしは『自分がカッコいいと思える理想の自分を守り抜くこと』です！」"

[[dialogue]]
speaker = "アム"
# 「まあ、そう言いつつ、戦闘になると無我夢中になって忘れちゃってることもあるんで、まだまだなんですけどね～。てへへ♪」
line = "「まあ、そう言いつつ、戦闘になると無我夢中になって忘れちゃってることもあるんで、まだまだなんですけどね～。てへへ♪」"

[[dialogue]]
speaker = "unk"
# アムはそう言って、おどけてみせる。
line = "アムはそう言って、おどけてみせる。"

[[dialogue]]
speaker = "マトイ"
# 「……アムちゃん、ありがとう」
line = "「……アムちゃん、ありがとう」"

[[dialogue]]
speaker = "マトイ"
# 「私、ちゃんと考えてみる」
line = "「私、ちゃんと考えてみる」"

[[dialogue]]
speaker = "アム"
# 「はい！　大丈夫ですよ。マトイ先輩なら！」
line = "「はい！　大丈夫ですよ。マトイ先輩なら！」"

[[dialogue]]
speaker = "アム"
# 「天才盾使いのあたしが保証します！　……なんちゃって～♪」
line = "「天才盾使いのあたしが保証します！　……なんちゃって～♪」"

[[dialogue]]
speaker = "unk"
# 場の雰囲気を明るくするように、笑ってみせるアムなのだった。
line = "場の雰囲気を明るくするように、笑ってみせるアムなのだった。"
