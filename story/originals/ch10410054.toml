[[dialogue]]
speaker = "unk"
# 第４話,続・猫ちゃんスキンシップ,P
line = "第４話,続・猫ちゃんスキンシップ,P"

[[dialogue]]
speaker = "unk"
# その日は休日で、マインが俺の家に遊びにやって来ていた。
line = "その日は休日で、マインが俺の家に遊びにやって来ていた。"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「会長～、前に『約束』したの忘れてないよね～？」
line = "「会長～、前に『約束』したの忘れてないよね～？」"

[[dialogue]]
speaker = "unk"
# ああ、もちろん覚えてるよ
line = "ああ、もちろん覚えてるよ"

[[dialogue]]
speaker = "unk"
# <ruby=ゼロス>ＸＥＬＯＳ</ruby>との最終決戦にあたり、マインには魔界各国との交渉でできる限り多くの戦力を集めてもらうようにお願いした。
line = "<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>との最終決戦にあたり、マインには魔界各国との交渉でできる限り多くの戦力を集めてもらうようにお願いした。"

[[dialogue]]
speaker = "unk"
# そして、彼女は見事それをやり遂げて、更には自身もノヴァフォームに覚醒。戦況に大きく貢献してみせたのだった。
line = "そして、彼女は見事それをやり遂げて、更には自身もノヴァフォームに覚醒。戦況に大きく貢献してみせたのだった。"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「じゃあ約束通り――今日は会長が『なんでもしてくれる日』ってことでいいよね～？」
line = "「じゃあ約束通り――今日は会長が『なんでもしてくれる日』ってことでいいよね～？」"

[[dialogue]]
speaker = "unk"
# できれば、お手柔らかにお願いします……
line = "できれば、お手柔らかにお願いします……"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「大丈夫、大丈夫～♪　ストレス解消を兼ねて、ノヴァフォームの絆を深める為の訓練をするだけだから♪」
line = "「大丈夫、大丈夫～♪　ストレス解消を兼ねて、ノヴァフォームの絆を深める為の訓練をするだけだから♪」"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「というわけで――はい♪　アニマ先輩特製の『獣人化薬』～♪」
line = "「というわけで――はい♪　アニマ先輩特製の『獣人化薬』～♪」"

[[dialogue]]
speaker = "unk"
# え！？　まさかまた、猫の姿に……！？
line = "え！？　まさかまた、猫の姿に……！？"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「にひひ♪　この前とはちょ～っと違うんだよね～」
line = "「にひひ♪　この前とはちょ～っと違うんだよね～」"

[[dialogue]]
speaker = "unk"
# そうして、俺はマインの頼みを聞いて、再び『獣人化薬』を試すことになったのだが……。
line = "そうして、俺はマインの頼みを聞いて、再び『獣人化薬』を試すことになったのだが……。"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「おぉ～！　会長、黒い猫ちゃんの耳と尻尾が生えた～♪」
line = "「おぉ～！　会長、黒い猫ちゃんの耳と尻尾が生えた～♪」"

[[dialogue]]
speaker = "unk"
# どうやら今回の薬は、前回の実験結果を踏まえてアニマ先輩が再調整したものらしく、今度こそ『猫系獣人の魔族』の姿へと変身を果たしていた。
line = "どうやら今回の薬は、前回の実験結果を踏まえてアニマ先輩が再調整したものらしく、今度こそ『猫系獣人の魔族』の姿へと変身を果たしていた。"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「にひひ♪　それじゃあ――猫ちゃん会長とのイチャイチャを始めちゃおっか<emoji=heart04>」
line = "「にひひ♪　それじゃあ――猫ちゃん会長とのイチャイチャを始めちゃおっか<emoji=heart04>」"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「この前触れられなかったところを試しちゃうよ～？　えいっ<emoji=heart04>」
line = "「この前触れられなかったところを試しちゃうよ～？　えいっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# にゃんっ！？　し、尻尾……！
line = "にゃんっ！？　し、尻尾……！"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「きゃははっ♪　猫ちゃんみたいな可愛い声が出たね～<emoji=heart04>」
line = "「きゃははっ♪　猫ちゃんみたいな可愛い声が出たね～<emoji=heart04>」"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「――なんか咄嗟に鳴き声みたいに出ちゃう？　そうなんだ～♪　確かに、『せつな』とかも驚いたりすると、そういうふうに言ったりするもんね～」
line = "「――なんか咄嗟に鳴き声みたいに出ちゃう？　そうなんだ～♪　確かに、『せつな』とかも驚いたりすると、そういうふうに言ったりするもんね～」"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「猫ちゃんって、尻尾は神経が集まってる敏感な部分だって聞くけど……どう？」
line = "「猫ちゃんって、尻尾は神経が集まってる敏感な部分だって聞くけど……どう？」"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「――へぇ～、敏感で、触られると結構くるんだ？　にひひ♪　じゃあ、優しく撫でてあげるね～<emoji=heart04>　すりすり～♪」
line = "「――へぇ～、敏感で、触られると結構くるんだ？　にひひ♪　じゃあ、優しく撫でてあげるね～<emoji=heart04>　すりすり～♪」"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「あとはここも触ってなかったよね～……猫耳<emoji=heart04>」
line = "「あとはここも触ってなかったよね～……猫耳<emoji=heart04>」"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「ほ～ら、裏からゆっくり……なでなで<emoji=heart04>」
line = "「ほ～ら、裏からゆっくり……なでなで<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# に、人間の耳より、敏感かも……
line = "に、人間の耳より、敏感かも……"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「あっ、ピコピコしてる～♪　ん～<emoji=heart04>　これはちょっとヤバいな～」
line = "「あっ、ピコピコしてる～♪　ん～<emoji=heart04>　これはちょっとヤバいな～」"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「私、昔から動物にはあんまり好かれなくてさ～。触ろうとすると、警戒されて逃げられちゃうんだよね～」
line = "「私、昔から動物にはあんまり好かれなくてさ～。触ろうとすると、警戒されて逃げられちゃうんだよね～」"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「だから、じっくり触るのは、会長が変身した猫ちゃんが初めてだったんだけど～……はあぁ<emoji=heart04>」
line = "「だから、じっくり触るのは、会長が変身した猫ちゃんが初めてだったんだけど～……はあぁ<emoji=heart04>」"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「こうしてると、可愛いくて思わず、抱きしめたくなっちゃう♪　――ぎゅ～っ<emoji=heart04>」
line = "「こうしてると、可愛いくて思わず、抱きしめたくなっちゃう♪　――ぎゅ～っ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# マインが俺に抱き着いてくる。
line = "マインが俺に抱き着いてくる。"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「からの～、猫吸いならぬ『彼氏吸い』～♪　――すぅ～、はぁ～<emoji=heart04>」
line = "「からの～、猫吸いならぬ『彼氏吸い』～♪　――すぅ～、はぁ～<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ちょっ……そんな思いっきり嗅ぐのは……！
line = "ちょっ……そんな思いっきり嗅ぐのは……！"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「んふぅ～<emoji=heart04>　大丈夫♪　会長の匂い、もうすっかり好きになっちゃってるから<emoji=heart04>」
line = "「んふぅ～<emoji=heart04>　大丈夫♪　会長の匂い、もうすっかり好きになっちゃってるから<emoji=heart04>」"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「あと気になってるのは～、ここがどう感じるのかかな？　――トントン♪」
line = "「あと気になってるのは～、ここがどう感じるのかかな？　――トントン♪」"

[[dialogue]]
speaker = "unk"
# にゃあぁっ！？♥♥　そ、そこは～……！
line = "にゃあぁっ！？♥♥　そ、そこは～……！"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「あっ♪　やっぱり猫ちゃんの時と同じように感じるんだ～？　――お尻トントン<emoji=heart04>」
line = "「あっ♪　やっぱり猫ちゃんの時と同じように感じるんだ～？　――お尻トントン<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 抱っこしている子供の背中を優しくポンポンするように、マインは尻尾の付け根の上辺りをトントンと優しく叩いてくる。
line = "抱っこしている子供の背中を優しくポンポンするように、マインは尻尾の付け根の上辺りをトントンと優しく叩いてくる。"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「ん～？　――気持ち良すぎて、変な気分になっちゃう～？　ふぅ～ん、なるほどね～♪」
line = "「ん～？　――気持ち良すぎて、変な気分になっちゃう～？　ふぅ～ん、なるほどね～♪」"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「じゃあ……そんな気分にしちゃった責任を取らないとね<emoji=heart04>」
line = "「じゃあ……そんな気分にしちゃった責任を取らないとね<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そう言うと、マインはそっと顔を近づけてきて。
line = "そう言うと、マインはそっと顔を近づけてきて。"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「会長……<emoji=heart04>　ん～っ、ちゅっ……<emoji=heart04>」
line = "「会長……<emoji=heart04>　ん～っ、ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 唇を触れ合わせて、キスを交わす。
line = "唇を触れ合わせて、キスを交わす。"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「――はあぁ～……にひひ<emoji=heart04>　どう？　少しは落ち着いた？」
line = "「――はあぁ～……にひひ<emoji=heart04>　どう？　少しは落ち着いた？」"

[[dialogue]]
speaker = "unk"
# いや……まだ……
line = "いや……まだ……"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「そっか～。じゃあ――どうして欲しいか、ちゃんと言って<emoji=heart04>」
line = "「そっか～。じゃあ――どうして欲しいか、ちゃんと言って<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# もっと……マインとキスがしたい
line = "もっと……マインとキスがしたい"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「……にひひ<emoji=heart04>」
line = "「……にひひ<emoji=heart04>」"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「じゃあ、お尻トントンも……もっとしちゃう？」
line = "「じゃあ、お尻トントンも……もっとしちゃう？」"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「ん～っ……ちゅっ<emoji=heart04>　ちゅっ……<emoji=heart04>」
line = "「ん～っ……ちゅっ<emoji=heart04>　ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# それからも、俺は猫のように、マインからたっぷりと可愛がられてしまうのだった。
line = "それからも、俺は猫のように、マインからたっぷりと可愛がられてしまうのだった。"
