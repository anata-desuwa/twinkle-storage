[[dialogue]]
speaker = "unk"
# 女性であることを隠し、男子生徒として学園に通うユーリス。
line = "女性であることを隠し、男子生徒として学園に通うユーリス。"

[[dialogue]]
speaker = "unk"
# そんな彼女と恋人関係になれたことは嬉しい──だが俺たちはどちらも目立つ身だ。
line = "そんな彼女と恋人関係になれたことは嬉しい──だが俺たちはどちらも目立つ身だ。"

[[dialogue]]
speaker = "unk"
# 片や星徒会長。片や王子にして聖剣の使い手。
line = "片や星徒会長。片や王子にして聖剣の使い手。"

[[dialogue]]
speaker = "unk"
# そうなると『男子』だということを生かして落ち合える場所を探すことになってしまって……
line = "そうなると『男子』だということを生かして落ち合える場所を探すことになってしまって……"

[[dialogue]]
speaker = "ユーリス"
# 「ま、まったく……会長は本当にエッチな男の子なんだから……んあ、ふぅっ……おっぱい触っちゃ……ひぁあっ<emoji=heart04>」
line = "「ま、まったく……会長は本当にエッチな男の子なんだから……んあ、ふぅっ……おっぱい触っちゃ……ひぁあっ<emoji=heart04>」"

[[dialogue]]
speaker = "ユーリス"
# 「いくら誰も来ないからって、ちょっとがっつきすぎだと思うよ……あ、ん、んんっ<emoji=heart04>」
line = "「いくら誰も来ないからって、ちょっとがっつきすぎだと思うよ……あ、ん、んんっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 校舎のはずれにある男子トイレ。ここが新星学園で一番の穴場なのだった。
line = "校舎のはずれにある男子トイレ。ここが新星学園で一番の穴場なのだった。"

[[dialogue]]
speaker = "ユーリス"
# 「個室に入った途端、服を脱がせてっ……はぁ、あ……おっぱい揉みすぎだってば……」
line = "「個室に入った途端、服を脱がせてっ……はぁ、あ……おっぱい揉みすぎだってば……」"

[[dialogue]]
speaker = "ユーリス"
# 「うぅ……これ以上大きくなったらどうしよう。隠すのがもっと大変になっちゃう……」
line = "「うぅ……これ以上大きくなったらどうしよう。隠すのがもっと大変になっちゃう……」"

[[dialogue]]
speaker = "unk"
# 男子の制服の下に、ユーリスがこんなにも大きなおっぱいを隠しているだなんて、俺以外は学園内の誰も知らないだろう。
line = "男子の制服の下に、ユーリスがこんなにも大きなおっぱいを隠しているだなんて、俺以外は学園内の誰も知らないだろう。"

[[dialogue]]
speaker = "unk"
# 驚くことにいまだ成長中らしい。何でも俺が揉み始めてからバストサイズが少し大きくなってきたとかで、この前ちょっと怒られた。
line = "驚くことにいまだ成長中らしい。何でも俺が揉み始めてからバストサイズが少し大きくなってきたとかで、この前ちょっと怒られた。"

[[dialogue]]
speaker = "ユーリス"
# 「おっぱい、剣を振るのにも邪魔だし、揺れないように固定するのもきついし……」
line = "「おっぱい、剣を振るのにも邪魔だし、揺れないように固定するのもきついし……」"

[[dialogue]]
speaker = "ユーリス"
# 「でも、君はおっぱい大きい方が嬉しいんだよね？」
line = "「でも、君はおっぱい大きい方が嬉しいんだよね？」"

[[dialogue]]
speaker = "ユーリス"
# 「はぁ……複雑な気分だよ。女の子だってバレたらいけないけど、彼氏の君には喜んでほしいし……」
line = "「はぁ……複雑な気分だよ。女の子だってバレたらいけないけど、彼氏の君には喜んでほしいし……」"

[[dialogue]]
speaker = "ユーリス"
# 「んぅ、ふうぅ、あぁっ……触り方、いやらしいよぉっ……んあ、あぁっ……<emoji=heart04>　男の人は、本当におっぱいが好きなんだから……あぁんっ<emoji=heart04>」
line = "「んぅ、ふうぅ、あぁっ……触り方、いやらしいよぉっ……んあ、あぁっ……<emoji=heart04>　男の人は、本当におっぱいが好きなんだから……あぁんっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# もじもじと、俺の膝の上で動くユーリスがエロ可愛くって仕方がない。
line = "もじもじと、俺の膝の上で動くユーリスがエロ可愛くって仕方がない。"

[[dialogue]]
speaker = "unk"
# 男物のジャケットやスラックスをはだけて、大きなおっぱいとくびれたウェストが覗くのはいつ見ても倒錯的だ。
line = "男物のジャケットやスラックスをはだけて、大きなおっぱいとくびれたウェストが覗くのはいつ見ても倒錯的だ。"

[[dialogue]]
speaker = "ユーリス"
# 「目がいやらしいよ、もう……君、じっくり楽しもうとしてない？」
line = "「目がいやらしいよ、もう……君、じっくり楽しもうとしてない？」"

[[dialogue]]
speaker = "ユーリス"
# 「……君のおち○ちん、もう準備できてるでしょ。は……早くちょうだい？」
line = "「……君のおち○ちん、もう準備できてるでしょ。は……早くちょうだい？」"

[[dialogue]]
speaker = "ユーリス"
# 「ち──違うよ、おねだりじゃないからっ」
line = "「ち──違うよ、おねだりじゃないからっ」"

[[dialogue]]
speaker = "ユーリス"
# 「ここトイレだから。早く済ませないとまずいからだよっ」
line = "「ここトイレだから。早く済ませないとまずいからだよっ」"

[[dialogue]]
speaker = "ユーリス"
# 「私の方も準備できてるから……うん。おっぱい、たくさん触ってもらったし、その……条件反射？　って言うのかな」
line = "「私の方も準備できてるから……うん。おっぱい、たくさん触ってもらったし、その……条件反射？　って言うのかな」"

[[dialogue]]
speaker = "ユーリス"
# 「トイレで何回もしてるからかな。思い出して濡れちゃったっていうか……」
line = "「トイレで何回もしてるからかな。思い出して濡れちゃったっていうか……」"

[[dialogue]]
speaker = "unk"
# そんなこと言われたらもう我慢なんてできない。
line = "そんなこと言われたらもう我慢なんてできない。"

[[dialogue]]
speaker = "unk"
# 膝上に乗せたユーリスのお尻をそっと持ち上げ、俺はペニスの先端をあてがって──
line = "膝上に乗せたユーリスのお尻をそっと持ち上げ、俺はペニスの先端をあてがって──"

[[dialogue]]
speaker = "ユーリス"
# 「あっ……はいって、ぅ、うぅあ、あぁあっ<emoji=heart04>　きたあぁあっ……<emoji=heart04>」
line = "「あっ……はいって、ぅ、うぅあ、あぁあっ<emoji=heart04>　きたあぁあっ……<emoji=heart04>」"

[[dialogue]]
speaker = "ユーリス"
# 「……ぁ、ご、ごめんっ、おっきい声、出ちゃった……」
line = "「……ぁ、ご、ごめんっ、おっきい声、出ちゃった……」"

[[dialogue]]
speaker = "ユーリス"
# 「君のおち○ちん、すっごく大きいから……んんぅ、ふぅっ……私の中、こじ開けられてる感じが、すごくって……ふぅ、うぅっ……<emoji=heart04>」
line = "「君のおち○ちん、すっごく大きいから……んんぅ、ふぅっ……私の中、こじ開けられてる感じが、すごくって……ふぅ、うぅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "ユーリス"
# 「動くのは、ゆっくりでお願い……ね？」
line = "「動くのは、ゆっくりでお願い……ね？」"

[[dialogue]]
speaker = "unk"
# 男心を無意識にくすぐるお願いにぐっと来てしまう。
line = "男心を無意識にくすぐるお願いにぐっと来てしまう。"

[[dialogue]]
speaker = "unk"
# ユーリスの体を抱きながら、ゆっくりとピストンを始める。
line = "ユーリスの体を抱きながら、ゆっくりとピストンを始める。"

[[dialogue]]
speaker = "ユーリス"
# 「ん～～～っ<emoji=heart04>　ふうぅぁあ、ああぁっ……あ、あふ、すご、ぃ、ぁ、ぁぁっ……<emoji=heart04>」
line = "「ん～～～っ<emoji=heart04>　ふうぅぁあ、ああぁっ……あ、あふ、すご、ぃ、ぁ、ぁぁっ……<emoji=heart04>」"

[[dialogue]]
speaker = "ユーリス"
# 「ずぷずぷって出たり……入ったり……ぅ、ふぅ、んんぁっ……い、いいよお……君が体の中に入ってくるの、す、好きっ……<emoji=heart04>」
line = "「ずぷずぷって出たり……入ったり……ぅ、ふぅ、んんぁっ……い、いいよお……君が体の中に入ってくるの、す、好きっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 奥に突き入れるたび、ぞくっ、びくっ、と体を震わせるユーリス。
line = "奥に突き入れるたび、ぞくっ、びくっ、と体を震わせるユーリス。"

[[dialogue]]
speaker = "unk"
# それに合わせて、俺の手のひらに乗ったおっぱいがたぷたぷ揺れることに、たまらなく興奮してしまう。
line = "それに合わせて、俺の手のひらに乗ったおっぱいがたぷたぷ揺れることに、たまらなく興奮してしまう。"

[[dialogue]]
speaker = "ユーリス"
# 「はぁ、うぅっ、んんぅ、ふぅ、んんぅ……ん、ふぅう、ぅう、ぁっ、はぁ、あぁっ……<emoji=heart04>」
line = "「はぁ、うぅっ、んんぅ、ふぅ、んんぅ……ん、ふぅう、ぅう、ぁっ、はぁ、あぁっ……<emoji=heart04>」"

[[dialogue]]
speaker = "ユーリス"
# 「ど、どうかな……？　ん、ふぅ、うぅ……私。最初の頃より、声っ……お、抑えられるようになったと、思わない？」
line = "「ど、どうかな……？　ん、ふぅ、うぅ……私。最初の頃より、声っ……お、抑えられるようになったと、思わない？」"

[[dialogue]]
speaker = "ユーリス"
# 「はぁ、んん、ふぅ、んっ……でしょ？　うん、初めの頃は、君とキスしてないと我慢、できなかったけどっ……」
line = "「はぁ、んん、ふぅ、んっ……でしょ？　うん、初めの頃は、君とキスしてないと我慢、できなかったけどっ……」"

[[dialogue]]
speaker = "ユーリス"
# 「ふ、ふふふ。もう昔の私とは違うんだから……んぅ、ふぅっ……な、何事も訓練次第で、はぁ、んぅ、上達するものだよっ……ん、ぁあ<emoji=heart04>」
line = "「ふ、ふふふ。もう昔の私とは違うんだから……んぅ、ふぅっ……な、何事も訓練次第で、はぁ、んぅ、上達するものだよっ……ん、ぁあ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 個室トイレでのエッチがバレないよう、喘ぎ声を我慢するコツを身に付けたらしい。
line = "個室トイレでのエッチがバレないよう、喘ぎ声を我慢するコツを身に付けたらしい。"

[[dialogue]]
speaker = "ユーリス"
# 「ん、ふぅ。何度もおち○ちんにずぷずぷされてるうちに、わかってきたんだっ……<emoji=heart04>」
line = "「ん、ふぅ。何度もおち○ちんにずぷずぷされてるうちに、わかってきたんだっ……<emoji=heart04>」"

[[dialogue]]
speaker = "ユーリス"
# 「あ、君のおち○ちんが、ずぶぶぅ～って奥に入ってくる時が、い、一番気持ちいいから……」
line = "「あ、君のおち○ちんが、ずぶぶぅ～って奥に入ってくる時が、い、一番気持ちいいから……」"

[[dialogue]]
speaker = "ユーリス"
# 「そのタイミングに合わせて、ふ、ふぅー……<emoji=heart04>　って、ゆっくり息を吐いてっ……体に力を込めないのが、こ、コツなんだよっ<emoji=heart04>」
line = "「そのタイミングに合わせて、ふ、ふぅー……<emoji=heart04>　って、ゆっくり息を吐いてっ……体に力を込めないのが、こ、コツなんだよっ<emoji=heart04>」"

[[dialogue]]
speaker = "ユーリス"
# 「ほ、ほら……ふぅうぅーっ……ふぅううーっ……<emoji=heart04>　ね、ね？　えっちな声、あんまり、んふぅ、出てないと、思わない？」
line = "「ほ、ほら……ふぅうぅーっ……ふぅううーっ……<emoji=heart04>　ね、ね？　えっちな声、あんまり、んふぅ、出てないと、思わない？」"

[[dialogue]]
speaker = "ユーリス"
# 「君とこっそりエッチできるように……み、身に付けたんだよ。えっちの時の、息継ぎのし方を……<emoji=heart04>」
line = "「君とこっそりエッチできるように……み、身に付けたんだよ。えっちの時の、息継ぎのし方を……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 何ともまあ、いじらしい努力もあったものだ。
line = "何ともまあ、いじらしい努力もあったものだ。"

[[dialogue]]
speaker = "unk"
# ユーリスが可愛いから乳首をキュッと摘まんであげた。
line = "ユーリスが可愛いから乳首をキュッと摘まんであげた。"

[[dialogue]]
speaker = "ユーリス"
# 「ふぇあぁあぁあっ！？<emoji=heart04>」
line = "「ふぇあぁあぁあっ！？<emoji=heart04>」"

[[dialogue]]
speaker = "ユーリス"
# 「あ──あぁ、ば、バカっ。何で不意打ちするんだっ、そういうイジワル、良くないんじゃないかな、んんぅ、ふぅ、うぁああっ……<emoji=heart04>」
line = "「あ──あぁ、ば、バカっ。何で不意打ちするんだっ、そういうイジワル、良くないんじゃないかな、んんぅ、ふぅ、うぁああっ……<emoji=heart04>」"

[[dialogue]]
speaker = "ユーリス"
# 「このおっぱい、君のものだけどっ……い、今みたいなイジワルする時は、ちゃんと事前に言ってっ……はぁあ、あ、ん、んぅ<emoji=heart04>」
line = "「このおっぱい、君のものだけどっ……い、今みたいなイジワルする時は、ちゃんと事前に言ってっ……はぁあ、あ、ん、んぅ<emoji=heart04>」"

[[dialogue]]
speaker = "ユーリス"
# 「心の準備ができてたらっ、んぁ、はぁ、ふぅっ……私、君のしたいこと、断ったりしないんだからっ……」
line = "「心の準備ができてたらっ、んぁ、はぁ、ふぅっ……私、君のしたいこと、断ったりしないんだからっ……」"

[[dialogue]]
speaker = "クロト"
# 「ごめんごめん」
line = "「ごめんごめん」"

[[dialogue]]
speaker = "unk"
# いきなり不意打ちしたことを謝り、優しくおっぱいをこねながら、ユーリスの頬に口づけする。
line = "いきなり不意打ちしたことを謝り、優しくおっぱいをこねながら、ユーリスの頬に口づけする。"

[[dialogue]]
speaker = "ユーリス"
# 「もう……これからは気を付けてね、んぁ、はぁ、ふぅ、んんんっ……<emoji=heart04>」
line = "「もう……これからは気を付けてね、んぁ、はぁ、ふぅ、んんんっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 素直で、すぐ俺の謝罪を信じてしまうユーリスが可愛い。これだからイジワルしたくなってしまうんだ。
line = "素直で、すぐ俺の謝罪を信じてしまうユーリスが可愛い。これだからイジワルしたくなってしまうんだ。"

[[dialogue]]
speaker = "クロト"
# 「あ──誰か来たかも」
line = "「あ──誰か来たかも」"

[[dialogue]]
speaker = "ユーリス"
# 「えっ、ウソ！？」
line = "「えっ、ウソ！？」"

[[dialogue]]
speaker = "unk"
# そう、ウソだ。
line = "そう、ウソだ。"

[[dialogue]]
speaker = "unk"
# だけど俺はわざと耳をそばだてるふりをする。
line = "だけど俺はわざと耳をそばだてるふりをする。"

[[dialogue]]
speaker = "ユーリス"
# 「足音とか聞こえないよ？　誰もいないよね……？」
line = "「足音とか聞こえないよ？　誰もいないよね……？」"

[[dialogue]]
speaker = "unk"
# 外の気配を探りながらも不安がるユーリス。
line = "外の気配を探りながらも不安がるユーリス。"

[[dialogue]]
speaker = "unk"
# 神経を研ぎ澄まそうとするユーリスをかき乱すように、ピストンを速めた。
line = "神経を研ぎ澄まそうとするユーリスをかき乱すように、ピストンを速めた。"

[[dialogue]]
speaker = "ユーリス"
# 「ふぅうう、んんっ、うぅうぅう～～っ！？」
line = "「ふぅうう、んんっ、うぅうぅう～～っ！？」"

[[dialogue]]
speaker = "ユーリス"
# 「あ～っ、はぁっ、ふぅ～っ、か、はっ<emoji=heart04>　な、なんでっ？　ふぅあ、不意打ちはダメって、さっき言った、のにぃっ……ぁ、ぁあっ<emoji=heart04>」
line = "「あ～っ、はぁっ、ふぅ～っ、か、はっ<emoji=heart04>　な、なんでっ？　ふぅあ、不意打ちはダメって、さっき言った、のにぃっ……ぁ、ぁあっ<emoji=heart04>」"

[[dialogue]]
speaker = "ユーリス"
# 「あっ、はっ、はぁんっ<emoji=heart04>　人がいるかもしれないのに……そんなにズンズンしちゃ、ダメぇっ……ぁ、あっ、んぁああっ<emoji=heart04>」
line = "「あっ、はっ、はぁんっ<emoji=heart04>　人がいるかもしれないのに……そんなにズンズンしちゃ、ダメぇっ……ぁ、あっ、んぁああっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 普段のユーリスなら、外に人がいれば気配でわかるだろう。
line = "普段のユーリスなら、外に人がいれば気配でわかるだろう。"

[[dialogue]]
speaker = "unk"
# だけどペニスで激しく突き上げられてはそれどころではない。
line = "だけどペニスで激しく突き上げられてはそれどころではない。"

[[dialogue]]
speaker = "ユーリス"
# 「んふぅっ、あっ、はぁっ、あんっ<emoji=heart04>　おち○ちん、深いところまで、届いてるっ……んん～っ<emoji=heart04>」
line = "「んふぅっ、あっ、はぁっ、あんっ<emoji=heart04>　おち○ちん、深いところまで、届いてるっ……んん～っ<emoji=heart04>」"

[[dialogue]]
speaker = "ユーリス"
# 「ふぁああっ<emoji=heart04>　奥、そんなぐりぐりってされたら……ぅああっ<emoji=heart04>　くあぁ、あぁ、ぁぁあっ<emoji=heart04>」
line = "「ふぁああっ<emoji=heart04>　奥、そんなぐりぐりってされたら……ぅああっ<emoji=heart04>　くあぁ、あぁ、ぁぁあっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ぎゅうっと抱きしられているから、ユーリスは逃れることもできない。
line = "ぎゅうっと抱きしられているから、ユーリスは逃れることもできない。"

[[dialogue]]
speaker = "unk"
# されるがままに責められ、普段の凛々しい王子の姿からは想像できない、とろけた顔で嬌声を上げる。
line = "されるがままに責められ、普段の凛々しい王子の姿からは想像できない、とろけた顔で嬌声を上げる。"

[[dialogue]]
speaker = "ユーリス"
# 「は、速いっ、速いからっ、ぅあぁあ、ダメダメ、声出る、声出ちゃうからっ──ひぁああっ<emoji=heart04>　んふぅっ、あっあっ<emoji=heart04>　ふうぁあっ<emoji=heart04>」
line = "「は、速いっ、速いからっ、ぅあぁあ、ダメダメ、声出る、声出ちゃうからっ──ひぁああっ<emoji=heart04>　んふぅっ、あっあっ<emoji=heart04>　ふうぁあっ<emoji=heart04>」"

[[dialogue]]
