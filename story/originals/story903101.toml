[[dialogue]]
speaker = "ここあ"
# 「確かに！　普通じゃないことはわかるんだけど、見た目とか空気が、いつもの奴と違うっぽい？」
line = "「確かに！　普通じゃないことはわかるんだけど、見た目とか空気が、いつもの奴と違うっぽい？」"

[[dialogue]]
speaker = "花織"
# 「ええっ！？　そんなこと分かります？　ユラギの中なんて、いつだって不穏で不気味じゃないですか」
line = "「ええっ！？　そんなこと分かります？　ユラギの中なんて、いつだって不穏で不気味じゃないですか」"

[[dialogue]]
speaker = "unk"
# ３人ともそれぞれに思ったことを口にする。が、今はユラギの微細な違いに気を払ってる場合ではなさそうだった。
