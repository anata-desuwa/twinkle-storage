[[dialogue]]
speaker = "unk"
# ──ここは、どこだ？
line = "──ここは、どこだ？"

[[dialogue]]
speaker = "unk"
# 脳に薄い膜がかかっているみたいで、上手く考えがまとまらない。
line = "脳に薄い膜がかかっているみたいで、上手く考えがまとまらない。"

[[dialogue]]
speaker = "いろは"
# 「オムオム！！」
line = "「オムオム！！」"

[[dialogue]]
speaker = "オムニス"
# 「……いろは？」
line = "「……いろは？」"

[[dialogue]]
speaker = "花織"
# 「よかったぁ……目、覚ましたみたいだね」
line = "「よかったぁ……目、覚ましたみたいだね」"

[[dialogue]]
speaker = "いろは"
# 「急に頭の中が真っ白になって、気が付いたらここに居たんけど……えっと、その前は……」
line = "「急に頭の中が真っ白になって、気が付いたらここに居たんけど……えっと、その前は……」"

[[dialogue]]
speaker = "ここあ"
# 「あれぇ？　なんか思い出せないね……？」
line = "「あれぇ？　なんか思い出せないね……？」"

[[dialogue]]
speaker = "ここあ"
# 「３人でここに居たような気もするし、そうじゃなかったような気もする……オムにゃんは何か覚えてる？」
line = "「３人でここに居たような気もするし、そうじゃなかったような気もする……オムにゃんは何か覚えてる？」"

[[dialogue]]
speaker = "オムニス"
# 「すまない……俺もみんなと同じ状態だ」
line = "「すまない……俺もみんなと同じ状態だ」"

[[dialogue]]
speaker = "いろは"
# 「あ、そうだ、いいこと思いついた！　あっちのお店に入って、カラオケで歌っていこーよ♪」
line = "「あ、そうだ、いいこと思いついた！　あっちのお店に入って、カラオケで歌っていこーよ♪」"

[[dialogue]]
speaker = "花織"
# 「記憶が飛んでるんだよ！？　まずは何が起こったか確認するのが最初でしょーに！」
line = "「記憶が飛んでるんだよ！？　まずは何が起こったか確認するのが最初でしょーに！」"

[[dialogue]]
speaker = "ここあ"
# 「そだね～。もしかしたらここが、ここあたちのいた世界とそっくりな全く別の世界って可能性もあるし」
line = "「そだね～。もしかしたらここが、ここあたちのいた世界とそっくりな全く別の世界って可能性もあるし」"

[[dialogue]]
speaker = "花織"
# 「うそっ！　また飛ばされちゃったってことですか！？」
line = "「うそっ！　また飛ばされちゃったってことですか！？」"

[[dialogue]]
speaker = "ここあ"
# 「落～ち～着～い～て、カオリン。そーゆー可能性もある、ってだけのことだから」
line = "「落～ち～着～い～て、カオリン。そーゆー可能性もある、ってだけのことだから」"

[[dialogue]]
speaker = "花織"
# 「そ、そうですよね……うぅぅ、これ以上は考えてもしかたない、かぁ～」
line = "「そ、そうですよね……うぅぅ、これ以上は考えてもしかたない、かぁ～」"

[[dialogue]]
speaker = "いろは"
# 「よーし、話もまとまったことだし、カラオケボックスにゴー♪」
line = "「よーし、話もまとまったことだし、カラオケボックスにゴー♪」"

[[dialogue]]
speaker = "花織"
# 「おーっ！　……って、そうじゃないでしょ！　空気読んでよ、いろは！」
line = "「おーっ！　……って、そうじゃないでしょ！　空気読んでよ、いろは！」"

[[dialogue]]
speaker = "いろは"
# 「あははっ♪」
line = "「あははっ♪」"

[[dialogue]]
speaker = "オムニス"
# 「念のため、他のみんなにも連絡を取ってみるか？」
