[[dialogue]]
speaker = "花織"
# 「ええっ？　ほんとだ……ここから近い」
line = "「ええっ？　ほんとだ……ここから近い」"

[[dialogue]]
speaker = "オムニス"
# 「行こう、みんな！」
line = "「行こう、みんな！」"

[[dialogue]]
speaker = "unk"
# ユラギの出現を知らせるアプリ、デュナミスフィアのナビに従ってポイントに駆け付ける。
line = "ユラギの出現を知らせるアプリ、デュナミスフィアのナビに従ってポイントに駆け付ける。"

[[dialogue]]
speaker = "unk"
# 世界から光が失われ、ユラギの中に入ったことが感じられる、のだが──
