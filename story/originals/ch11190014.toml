[[dialogue]]
speaker = "unk"
# 第４話,キミのハートを盗みたい,P
line = "第４話,キミのハートを盗みたい,P"

[[dialogue]]
speaker = "unk"
# ミネコとよく一緒に遊ぶようになった、とある休日。
line = "ミネコとよく一緒に遊ぶようになった、とある休日。"

[[dialogue]]
speaker = "unk"
# その日は彼女が、俺の家へと遊びにやって来ていた――
line = "その日は彼女が、俺の家へと遊びにやって来ていた――"

[[dialogue]]
speaker = "ミネコ"
# 「ふふふ、会長。今日こそこの大怪盗フランボウが、会長のハートを盗んじゃうよ♪　バキュ～ン<emoji=heart04>」
line = "「ふふふ、会長。今日こそこの大怪盗フランボウが、会長のハートを盗んじゃうよ♪　バキュ～ン<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ここ最近のお決まりの常套句を言いながら、可愛く銃で撃ち抜くポーズを取るミネコ。
line = "ここ最近のお決まりの常套句を言いながら、可愛く銃で撃ち抜くポーズを取るミネコ。"

[[dialogue]]
speaker = "unk"
# それで、今日はどうやって？
line = "それで、今日はどうやって？"

[[dialogue]]
speaker = "ミネコ"
# 「ふふっ、知ってる会長？　ヒトとヒトは肌を触れ合わせると、オキシトシンっていう脳内ホルモンが分泌されて、ストレスが軽減されたり、愛を感じたりするらしいよ？」
line = "「ふふっ、知ってる会長？　ヒトとヒトは肌を触れ合わせると、オキシトシンっていう脳内ホルモンが分泌されて、ストレスが軽減されたり、愛を感じたりするらしいよ？」"

[[dialogue]]
speaker = "ミネコ"
# 「だ・か・ら～<emoji=heart04>」
line = "「だ・か・ら～<emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
# 「こうやって、頬や頭を優しくいっぱい撫でることで、気づけばいつの間にか私のことを好き<emoji=heart04>　って感じるようにしちゃおうかな～って♪」
line = "「こうやって、頬や頭を優しくいっぱい撫でることで、気づけばいつの間にか私のことを好き<emoji=heart04>　って感じるようにしちゃおうかな～って♪」"

[[dialogue]]
speaker = "ミネコ"
# 「ほ～ら♪　なでなで<emoji=heart04>　すりすり<emoji=heart04>」
line = "「ほ～ら♪　なでなで<emoji=heart04>　すりすり<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# いやこれ、直球でスキンシップでは！？
line = "いやこれ、直球でスキンシップでは！？"

[[dialogue]]
speaker = "ミネコ"
# 「そうとも言うかな～<emoji=heart04>」
line = "「そうとも言うかな～<emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
# 「でも、効果はあるんじゃない？　ほらほら～<emoji=heart04>　なでなでぇ<emoji=heart04>　すりすりぃ<emoji=heart04>」
line = "「でも、効果はあるんじゃない？　ほらほら～<emoji=heart04>　なでなでぇ<emoji=heart04>　すりすりぃ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 確かに、ミネコもちょっと赤くなってるし
line = "確かに、ミネコもちょっと赤くなってるし"

[[dialogue]]
speaker = "ミネコ"
# 「なっ……！？」
line = "「なっ……！？」"

[[dialogue]]
speaker = "ミネコ"
# 「いや、私は別に撫でられてないから、影響は受けてないよ！？」
line = "「いや、私は別に撫でられてないから、影響は受けてないよ！？」"

[[dialogue]]
speaker = "ミネコ"
# 「顔が赤くなってるのは……そう！　クソゲーを攻略している時みたいなアドレナリン！　アドレナリンが分泌されているからだよ！」
line = "「顔が赤くなってるのは……そう！　クソゲーを攻略している時みたいなアドレナリン！　アドレナリンが分泌されているからだよ！」"

[[dialogue]]
speaker = "unk"
# なら、俺からも撫でないとな
line = "なら、俺からも撫でないとな"

[[dialogue]]
speaker = "ミネコ"
# 「ひゃっ！？　か、会長っ。撫でていいなんて私、言ってないんだけど！？」
line = "「ひゃっ！？　か、会長っ。撫でていいなんて私、言ってないんだけど！？」"

[[dialogue]]
speaker = "unk"
# 俺も撫でていいなんて言ってなかったけど？
line = "俺も撫でていいなんて言ってなかったけど？"

[[dialogue]]
speaker = "ミネコ"
# 「そ、それは……！」
line = "「そ、それは……！」"

[[dialogue]]
speaker = "unk"
# 俺が手のひらで、ミネコの頬っぺたを優しくすりすりすると──
line = "俺が手のひらで、ミネコの頬っぺたを優しくすりすりすると──"

[[dialogue]]
speaker = "ミネコ"
# 「ふあぁっ<emoji=heart04>　はあぁ……ふうぅ……<emoji=heart04>」
line = "「ふあぁっ<emoji=heart04>　はあぁ……ふうぅ……<emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
# 「――い、いや、別に出てないよ！？　そんなすぐに、オキシトシンは出てないから！」
line = "「――い、いや、別に出てないよ！？　そんなすぐに、オキシトシンは出てないから！」"

[[dialogue]]
speaker = "ミネコ"
# 「あっ……<emoji=heart04>　頬と同時に、頭なでなでされて……<emoji=heart04>」
line = "「あっ……<emoji=heart04>　頬と同時に、頭なでなでされて……<emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
# 「はあぁ<emoji=heart04>　んうぅ……ふうぅ……<emoji=heart04>」
line = "「はあぁ<emoji=heart04>　んうぅ……ふうぅ……<emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
# 「えっ！？　――ドキドキしてるかって！？　い、いや？　ドキドキはしてないんじゃないかなっ！？」
line = "「えっ！？　――ドキドキしてるかって！？　い、いや？　ドキドキはしてないんじゃないかなっ！？」"

[[dialogue]]
speaker = "ミネコ"
# 「んっ……<emoji=heart04>　会長の方こそ、本当は私のことを撫でながら……ドキドキしてるんじゃないのっ？」
line = "「んっ……<emoji=heart04>　会長の方こそ、本当は私のことを撫でながら……ドキドキしてるんじゃないのっ？」"

[[dialogue]]
speaker = "unk"
# うん、俺はすごくドキドキしてる
line = "うん、俺はすごくドキドキしてる"

[[dialogue]]
speaker = "ミネコ"
# 「へぇっ！？　そ、そう、なんだ……」
line = "「へぇっ！？　そ、そう、なんだ……」"

[[dialogue]]
speaker = "ミネコ"
# 「つまり会長は……私に愛を、感じちゃってるって、こと？　ふ、ふ～ん……<emoji=heart04>　へぇ～♪」
line = "「つまり会長は……私に愛を、感じちゃってるって、こと？　ふ、ふ～ん……<emoji=heart04>　へぇ～♪」"

[[dialogue]]
speaker = "ミネコ"
# 「ってことは、私の方からも撫でたら……オキシトシンが２倍、分泌されちゃうってことだよね？　ふふふっ♪」
line = "「ってことは、私の方からも撫でたら……オキシトシンが２倍、分泌されちゃうってことだよね？　ふふふっ♪」"

[[dialogue]]
speaker = "ミネコ"
# 「じゃあ……はい<emoji=heart04>　会長、頬っぺたと頭を……なでなでぇ<emoji=heart04>　すりすりぃ<emoji=heart04>」
line = "「じゃあ……はい<emoji=heart04>　会長、頬っぺたと頭を……なでなでぇ<emoji=heart04>　すりすりぃ<emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
# 「どう、かな……？　ドキドキして、私にハート、盗まれちゃいそう？」
line = "「どう、かな……？　ドキドキして、私にハート、盗まれちゃいそう？」"

[[dialogue]]
speaker = "ミネコ"
# 「なでなで～<emoji=heart04>　すりすりぃ<emoji=heart04>」
line = "「なでなで～<emoji=heart04>　すりすりぃ<emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
# 「――ん～？　どうしたの、会長？　もしかして降参したくなっちゃった？　ふふふっ<emoji=heart04>」
line = "「――ん～？　どうしたの、会長？　もしかして降参したくなっちゃった？　ふふふっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 盗みたいって言ったら、どうする？
line = "盗みたいって言ったら、どうする？"

[[dialogue]]
speaker = "unk"
# 俺の方がミネコのハート
line = "俺の方がミネコのハート"

[[dialogue]]
speaker = "ミネコ"
# 「え？　わ、私から……？」
line = "「え？　わ、私から……？」"

[[dialogue]]
speaker = "ミネコ"
# 「――それでもし盗めたら、その時は隣で一緒にリクリエと戦ってほしい？」
line = "「――それでもし盗めたら、その時は隣で一緒にリクリエと戦ってほしい？」"

[[dialogue]]
speaker = "ミネコ"
# 「ん～、でも……私に怪盗を止めさせるっていうのは、すごく難易度が高いと思うよ？」
line = "「ん～、でも……私に怪盗を止めさせるっていうのは、すごく難易度が高いと思うよ？」"

[[dialogue]]
speaker = "ミネコ"
# 「言ったよね？　私にとって怪盗は『ロマン』だって」
line = "「言ったよね？　私にとって怪盗は『ロマン』だって」"

[[dialogue]]
speaker = "ミネコ"
# 「たとえ悪であっても、怪盗というロマンがある限り、私はそれを追いかけずにはいられない」
line = "「たとえ悪であっても、怪盗というロマンがある限り、私はそれを追いかけずにはいられない」"

[[dialogue]]
speaker = "unk"
# だから、怪盗であることは止めないよ
line = "だから、怪盗であることは止めないよ"

[[dialogue]]
speaker = "ミネコ"
# 「どういうこと……？」
line = "「どういうこと……？」"

[[dialogue]]
speaker = "ミネコ"
# 「――私が怪盗としていられて、幸せになれる道を考えてみせる？　そんなの、どうやって……」
line = "「――私が怪盗としていられて、幸せになれる道を考えてみせる？　そんなの、どうやって……」"

[[dialogue]]
speaker = "unk"
# でも――
line = "でも――"

[[dialogue]]
speaker = "unk"
# 今はまだ上手い考えが思いつかない
line = "今はまだ上手い考えが思いつかない"

[[dialogue]]
speaker = "ミネコ"
# 「――いつか必ず見つけると、この場で誓うって？」
line = "「――いつか必ず見つけると、この場で誓うって？」"

[[dialogue]]
speaker = "ミネコ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ミネコ"
# 「ふ、ふふっ……」
line = "「ふ、ふふっ……」"

[[dialogue]]
speaker = "ミネコ"
# 「ははっ♪　あははっ♪」
line = "「ははっ♪　あははっ♪」"

[[dialogue]]
speaker = "ミネコ"
# 「それは――とってもロマンがあるね。難易度高すぎて、本気で言ってるならイカれてるよ。私にはまるで解決法が思いつかない」
line = "「それは――とってもロマンがあるね。難易度高すぎて、本気で言ってるならイカれてるよ。私にはまるで解決法が思いつかない」"

[[dialogue]]
speaker = "ミネコ"
# 「でも、今――」
line = "「でも、今――」"

[[dialogue]]
speaker = "ミネコ"
# 「私、すごくゾクゾクしてる<emoji=heart04>」
line = "「私、すごくゾクゾクしてる<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 彼女は俺の頬を撫でながら、とびきりの笑顔を浮かべて――
line = "彼女は俺の頬を撫でながら、とびきりの笑顔を浮かべて――"

[[dialogue]]
speaker = "ミネコ"
# 「私のハートを盗めるかどうか、期待してるよ、魔王様<emoji=heart04>」
line = "「私のハートを盗めるかどうか、期待してるよ、魔王様<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# じゃあ、頑張らないとな
line = "じゃあ、頑張らないとな"

[[dialogue]]
speaker = "ミネコ"
# 「って、え？」
line = "「って、え？」"

[[dialogue]]
speaker = "ミネコ"
# 「あっ……！？　ふああっ<emoji=heart04>　ち、ちょっと待って<emoji=heart04>　なんか会長の撫で方、さっきまでと違う感じが……<emoji=heart04>」
line = "「あっ……！？　ふああっ<emoji=heart04>　ち、ちょっと待って<emoji=heart04>　なんか会長の撫で方、さっきまでと違う感じが……<emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
# 「――ペットショップのバイトで習った、猫が喜ぶ撫で方！？」
line = "「――ペットショップのバイトで習った、猫が喜ぶ撫で方！？」"

[[dialogue]]
speaker = "ミネコ"
# 「いや、私は猫じゃないんだけど！？　ちょっ……猫じゃないのに、なんで……！」
line = "「いや、私は猫じゃないんだけど！？　ちょっ……猫じゃないのに、なんで……！」"

[[dialogue]]
speaker = "ミネコ"
# 「あっ<emoji=heart04>　ふにゃあああ～～～っ<emoji=heart04><emoji=heart04>」
line = "「あっ<emoji=heart04>　ふにゃあああ～～～っ<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# それから彼女が降参するまで、俺は優しく撫で回し続けるのだった――
line = "それから彼女が降参するまで、俺は優しく撫で回し続けるのだった――"
