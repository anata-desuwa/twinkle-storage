[[dialogue]]
speaker = "unk"
# 第１話,アニマファーストコンタクト・前編,P
line = "第１話,アニマファーストコンタクト・前編,P"

[[dialogue]]
speaker = "unk"
# 俺が星徒会長になってから、しばらく経ったある日のこと──
line = "俺が星徒会長になってから、しばらく経ったある日のこと──"

[[dialogue]]
speaker = "アニマ"
# 「フヒ、毎度ありダ。購買部の出張販売にやって来たヨ、ヴィーナス」
line = "「フヒ、毎度ありダ。購買部の出張販売にやって来たヨ、ヴィーナス」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええ、待ってたわ！　ありがとう、アニマ先輩」
line = "「ええ、待ってたわ！　ありがとう、アニマ先輩」"

[[dialogue]]
speaker = "マトイ"
# 「ヴィーナス、さっき誰に電話してるかと思ったら……また頼んでたの？」
line = "「ヴィーナス、さっき誰に電話してるかと思ったら……また頼んでたの？」"

[[dialogue]]
speaker = "アニマ"
# 「やあ、マトイ。その通りダ。３時のおやつタイムにオススメ、アニマの特製焼き菓子セットだヨ♪」
line = "「やあ、マトイ。その通りダ。３時のおやつタイムにオススメ、アニマの特製焼き菓子セットだヨ♪」"

[[dialogue]]
speaker = "unk"
# あなたは確か、購買部の店員の……
line = "あなたは確か、購買部の店員の……"

[[dialogue]]
speaker = "アニマ"
# 「フヒ♪　星徒会長もこんにちはダ。こうしてちゃんと話すのは初めてだナ？」
line = "「フヒ♪　星徒会長もこんにちはダ。こうしてちゃんと話すのは初めてだナ？」"

[[dialogue]]
speaker = "アニマ"
# 「ならば、アニマの自己紹介をしよう。ご存じ購買部の美少女看板娘にして、天才錬金術師のアニマだ」
line = "「ならば、アニマの自己紹介をしよう。ご存じ購買部の美少女看板娘にして、天才錬金術師のアニマだ」"

[[dialogue]]
speaker = "アニマ"
# 「リクリエに対抗する為、世界を救う発明の実現を目指していル。だが、それ以外にも請われれば何でも作るヨ。気安く声をかけてくれ♪」
line = "「リクリエに対抗する為、世界を救う発明の実現を目指していル。だが、それ以外にも請われれば何でも作るヨ。気安く声をかけてくれ♪」"

[[dialogue]]
speaker = "アニマ"
# 「……おや？　なんだか意外そうな顔だネ」
line = "「……おや？　なんだか意外そうな顔だネ」"

[[dialogue]]
speaker = "アニマ"
# 「ああ、なるほど。アニマはこう見えて、人と話すのは好きだし、接客は得意なんダ♪」
line = "「ああ、なるほど。アニマはこう見えて、人と話すのは好きだし、接客は得意なんダ♪」"

[[dialogue]]
speaker = "アニマ"
# 「ともかく、これから仲良くしてくれると嬉しいヨ、会長。そうだ──」
line = "「ともかく、これから仲良くしてくれると嬉しいヨ、会長。そうだ──」"

[[dialogue]]
speaker = "アニマ"
# 「お近付きの印に、軽い実験でもおひとついかがカナ？」
line = "「お近付きの印に、軽い実験でもおひとついかがカナ？」"

[[dialogue]]
speaker = "アニマ"
# 「この飴玉は、アニマが完成させたばかりの発明でネ。『使用者の星力を一時的に倍増させる』という優れものダ」
line = "「この飴玉は、アニマが完成させたばかりの発明でネ。『使用者の星力を一時的に倍増させる』という優れものダ」"

[[dialogue]]
speaker = "アニマ"
# 「ちょうど実験に協力してくれる相手を探していたところだったんだヨ。どうだい、会長？」
line = "「ちょうど実験に協力してくれる相手を探していたところだったんだヨ。どうだい、会長？」"

[[dialogue]]
speaker = "マトイ"
# 「う～ん、会長。アニマ先輩の薬は、効果は凄いけど、副作用がその……大変だから、試すかどうかはちょっと考えた方がいいと思う、よ……？」
line = "「う～ん、会長。アニマ先輩の薬は、効果は凄いけど、副作用がその……大変だから、試すかどうかはちょっと考えた方がいいと思う、よ……？」"

[[dialogue]]
speaker = "アニマ"
# 「ああ。そういえば、マトイには前に、別の薬を試して貰ったことがあったネ」
line = "「ああ。そういえば、マトイには前に、別の薬を試して貰ったことがあったネ」"

[[dialogue]]
speaker = "アニマ"
# 「主人公属性になりたい、とマトイが言っていたので、星力のオーラによって注目を集め易くする薬を作ったんダが……」
line = "「主人公属性になりたい、とマトイが言っていたので、星力のオーラによって注目を集め易くする薬を作ったんダが……」"

[[dialogue]]
speaker = "アニマ"
# 「マトイが薬を飲んだタイミングで、ヴィーナスが星徒会室にやって来てネ──」
line = "「マトイが薬を飲んだタイミングで、ヴィーナスが星徒会室にやって来てネ──」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あら？　珍しいわね、マトイがアニマ先輩と一緒にいるなん……て……」
line = "「あら？　珍しいわね、マトイがアニマ先輩と一緒にいるなん……て……」"

[[dialogue]]
speaker = "マトイ"
# 「ヴィーナス？　私をじっと見つめて、どうかした？」
line = "「ヴィーナス？　私をじっと見つめて、どうかした？」"

[[dialogue]]
speaker = "マトイ"
# 「も、もしかして……薬の効果で、私が主人公っぽく見えてたり！？」
line = "「も、もしかして……薬の効果で、私が主人公っぽく見えてたり！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「マトイ……な、何だか私、マトイを見てるとドキドキするの。その……いきなりで驚くかもだけど──」
line = "「マトイ……な、何だか私、マトイを見てるとドキドキするの。その……いきなりで驚くかもだけど──」"

[[dialogue]]
speaker = "ヴィーナス"
# 「マトイのこと……お姉様、って呼んでもいい？」
line = "「マトイのこと……お姉様、って呼んでもいい？」"

[[dialogue]]
speaker = "マトイ"
# 「は？　……えっと、私たち同級生──」
line = "「は？　……えっと、私たち同級生──」"

[[dialogue]]
speaker = "ヴィーナス"
# 「お姉様、好き！」
line = "「お姉様、好き！」"

[[dialogue]]
speaker = "マトイ"
# 「百合漫画！？　近い近い近い！」
line = "「百合漫画！？　近い近い近い！」"

[[dialogue]]
speaker = "マトイ"
# 「何これどうなってるんですか！？　アニマ先輩！」
line = "「何これどうなってるんですか！？　アニマ先輩！」"

[[dialogue]]
speaker = "アニマ"
# 「フム、薬の副作用みたいだネ。目立つオーラだけでなく、固有のフェロモンも出ているようダ」
line = "「フム、薬の副作用みたいだネ。目立つオーラだけでなく、固有のフェロモンも出ているようダ」"

[[dialogue]]
speaker = "アニマ"
# 「名付けて『お姉様フェロモン』！」
line = "「名付けて『お姉様フェロモン』！」"

[[dialogue]]
speaker = "マトイ"
# 「余裕か！　そんなことより、ヴィーナスを止めるの手伝って下さい！」
line = "「余裕か！　そんなことより、ヴィーナスを止めるの手伝って下さい！」"

[[dialogue]]
speaker = "アニマ"
# 「残念だが無理な相談ダ。何故なら──」
line = "「残念だが無理な相談ダ。何故なら──」"

[[dialogue]]
speaker = "アニマ"
# 「フェロモンの効果はアニマにも発揮されているからダ、お姉様<emoji=heart04>」
line = "「フェロモンの効果はアニマにも発揮されているからダ、お姉様<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
# 「うわぁぁぁっ、ゾンビものだったぁぁぁっ！」
line = "「うわぁぁぁっ、ゾンビものだったぁぁぁっ！」"

[[dialogue]]
speaker = "マトイ"
# 「その後、薬の効果が切れるまで逃げ回る羽目になったわ……」
line = "「その後、薬の効果が切れるまで逃げ回る羽目になったわ……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ちょっと待って。その時の記憶、私ないんだけど……？」
line = "「ちょっと待って。その時の記憶、私ないんだけど……？」"

[[dialogue]]
speaker = "アニマ"
# 「まあ、そんなわけダ、会長。効果が強力な反面、何かしらの副作用は想定される」
line = "「まあ、そんなわけダ、会長。効果が強力な反面、何かしらの副作用は想定される」"

[[dialogue]]
speaker = "アニマ"
# 「天才錬金術師の名にかけて、体に害は無いと誓うが……フヒ♪　どうするかネ？　それでも薬を試してみるかい？」
line = "「天才錬金術師の名にかけて、体に害は無いと誓うが……フヒ♪　どうするかネ？　それでも薬を試してみるかい？」"

[[dialogue]]
speaker = "アニマ"
# 「……ほう、実験に協力すると？　それは何故ダ？」
line = "「……ほう、実験に協力すると？　それは何故ダ？」"

[[dialogue]]
speaker = "unk"
# 本気で世界を救うつもりだから
line = "本気で世界を救うつもりだから"

[[dialogue]]
speaker = "unk"
# 俺もあなたと同じで、
line = "俺もあなたと同じで、"

[[dialogue]]
speaker = "アニマ"
# 「っ！　フヒッ！　まさかそこを真に受けるとはネ……」
line = "「っ！　フヒッ！　まさかそこを真に受けるとはネ……」"

[[dialogue]]
speaker = "アニマ"
# 「フヒヒッ、ヒヒッ、ハーハッハッ！　面白い！　キミに興味がわいて来たヨ、会長！」
line = "「フヒヒッ、ヒヒッ、ハーハッハッ！　面白い！　キミに興味がわいて来たヨ、会長！」"

[[dialogue]]
speaker = "アニマ"
# 「ああ、そうだとも！　アニマも本気で世界を救うつもりダ！」
line = "「ああ、そうだとも！　アニマも本気で世界を救うつもりダ！」"

[[dialogue]]
speaker = "アニマ"
# 「今回の薬も、その為に作ったものダ！　一時的とはいえ、星力を倍増させられれば、戦闘における切り札となり得ル！」
line = "「今回の薬も、その為に作ったものダ！　一時的とはいえ、星力を倍増させられれば、戦闘における切り札となり得ル！」"

[[dialogue]]
speaker = "アニマ"
# 「キミが本気だというなら、あえて言うヨ！　アニマが世界を救う為にその身を捧げるがいい！」
line = "「キミが本気だというなら、あえて言うヨ！　アニマが世界を救う為にその身を捧げるがいい！」"

[[dialogue]]
speaker = "unk"
# （アニマから手渡された薬を飲む）
line = "（アニマから手渡された薬を飲む）"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロトが爆発したぁぁぁ──ッ！？」
line = "「クロトが爆発したぁぁぁ──ッ！？」"

[[dialogue]]
speaker = "マトイ"
# 「ちょっ、会長ぉぉぉ──ッ！？」
line = "「ちょっ、会長ぉぉぉ──ッ！？」"

[[dialogue]]
speaker = "unk"
# ←To Be Continued...
line = "←To Be Continued..."
