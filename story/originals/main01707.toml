[[dialogue]]
speaker = "unk"
# 第８話,星の死,B
line = "第８話,星の死,B"

[[dialogue]]
speaker = "魔神ギエル"
# 「魔王デモ、女神デモ、何人デモ連レテクルガイイ。今ノ私ニハ及バナイ」
line = "「魔王デモ、女神デモ、何人デモ連レテクルガイイ。今ノ私ニハ及バナイ」"

[[dialogue]]
speaker = "クロト"
# 「────」
line = "「────」"

[[dialogue]]
speaker = "unk"
# ──全員が、地を這う。
line = "──全員が、地を這う。"

[[dialogue]]
speaker = "unk"
# 策はない。
line = "策はない。"

[[dialogue]]
speaker = "unk"
# 燃料も尽きた。
line = "燃料も尽きた。"

[[dialogue]]
speaker = "unk"
# 魔王の総力は投入済み。
line = "魔王の総力は投入済み。"

[[dialogue]]
speaker = "クロト"
# （新たに打つ手は──もう、ない──）
line = "（新たに打つ手は──もう、ない──）"

[[dialogue]]
speaker = "unk"
# だからって終わっていいのか？　このままで？　負けるのか？
line = "だからって終わっていいのか？　このままで？　負けるのか？"

[[dialogue]]
speaker = "unk"
# 違う──そんなことあってはならない！
line = "違う──そんなことあってはならない！"

[[dialogue]]
speaker = "クロト"
# 「まだだ──俺たちは、まだ──ッ…………！」
line = "「まだだ──俺たちは、まだ──ッ…………！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロト……っ……！」
line = "「クロト……っ……！」"

[[dialogue]]
speaker = "unk"
# 満身創痍のまま、立ち上がる。
line = "満身創痍のまま、立ち上がる。"

[[dialogue]]
speaker = "unk"
# たとえ矢が尽き、精神が枯れても──！
line = "たとえ矢が尽き、精神が枯れても──！"

[[dialogue]]
speaker = "魔神ギエル"
# 「愚カナ。貴様ハ負ケタノダ。認メルガイイ、魔王──今度ハ貴様コソガ敗残者ダト！」
line = "「愚カナ。貴様ハ負ケタノダ。認メルガイイ、魔王──今度ハ貴様コソガ敗残者ダト！」"

[[dialogue]]
speaker = "クロト"
# 「違う──俺たちは、まだ、負けてなんか──ぐ──ッ……！！」
line = "「違う──俺たちは、まだ、負けてなんか──ぐ──ッ……！！」"

[[dialogue]]
speaker = "アポロ"
# 「っ、ああ……！　あたしは、あたしが擦り切れてなくなるまで戦ってやる──！」
line = "「っ、ああ……！　あたしは、あたしが擦り切れてなくなるまで戦ってやる──！」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
# 「ここに、力を──結集しましょう」
line = "「ここに、力を──結集しましょう」"

[[dialogue]]
speaker = "クロト＆フィオナ"
# 「<ruby=エーテル>最終審判の時</ruby>・<ruby=パニッシュメント>光の制裁</ruby>──！！」
line = "「<ruby>最終審判の時<rt>エーテル</rt></ruby>・<ruby>光の制裁<rt>パニッシュメント</rt></ruby>──！！」"

[[dialogue]]
speaker = "魔神ギエル"
# 「──マダ判ラヌトイウノカ」
line = "「──マダ判ラヌトイウノカ」"

[[dialogue]]
speaker = "魔神ギエル"
# 「──呑メ」
line = "「──呑メ」"

[[dialogue]]
speaker = "サーシャ"
# 「あっ……」
line = "「あっ……」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
# 「────」
line = "「────」"

[[dialogue]]
speaker = "unk"
# ──あまりにも儚い結末だった。
line = "──あまりにも儚い結末だった。"

[[dialogue]]
speaker = "unk"
# 最後の力を振り絞って繰り出した『光の制裁』さえ──奴のひと呼吸で生まれたブラックホールに吸い込まれて、消える。
line = "最後の力を振り絞って繰り出した『光の制裁』さえ──奴のひと呼吸で生まれたブラックホールに吸い込まれて、消える。"

[[dialogue]]
speaker = "マトイ"
# 「そん……な……指先、ひとつで……」
line = "「そん……な……指先、ひとつで……」"

[[dialogue]]
speaker = "unk"
# ギエルはもはや、俺たちを圧倒しようとも、喜びすらしなくなっていた。
line = "ギエルはもはや、俺たちを圧倒しようとも、喜びすらしなくなっていた。"

[[dialogue]]
speaker = "魔神ギエル"
# 「──跪ケ」
line = "「──跪ケ」"

[[dialogue]]
speaker = "クロト"
# 「ガッ──！」
line = "「ガッ──！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロト──ッ！」
line = "「クロト──ッ！」"

[[dialogue]]
speaker = "unk"
# 倒れた俺の頭を強烈に踏みにじられる。
line = "倒れた俺の頭を強烈に踏みにじられる。"

[[dialogue]]
speaker = "unk"
# そんな、恐るべき屈辱を受けてなお……立てない。
line = "そんな、恐るべき屈辱を受けてなお……立てない。"

[[dialogue]]
speaker = "魔神ギエル"
# 「哀レナモノダ。魔王ダ英雄ダト云エドモ、コンナニモ矮小ナ存在デシカナイ」
line = "「哀レナモノダ。魔王ダ英雄ダト云エドモ、コンナニモ矮小ナ存在デシカナイ」"

[[dialogue]]
speaker = "魔神ギエル"
# 「所詮ハラクシスノ紛イ物カ。己ガ無力サヲ噛ミ締メテ朽チロ」
line = "「所詮ハラクシスノ紛イ物カ。己ガ無力サヲ噛ミ締メテ朽チロ」"

[[dialogue]]
speaker = "クロト"
# 「──ぁ……が、ッ──っ……！！」
line = "「──ぁ……が、ッ──っ……！！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「──やっ……やめて……！　クロトが……クロトが死んじゃう──っ……！」
line = "「──やっ……やめて……！　クロトが……クロトが死んじゃう──っ……！」"

[[dialogue]]
speaker = "unk"
# 何度も。何度も。
line = "何度も。何度も。"

[[dialogue]]
speaker = "unk"
# 超大質量の踏みつけを頭上に落とされ、意識も痛覚もぐちゃぐちゃにされていく。
line = "超大質量の踏みつけを頭上に落とされ、意識も痛覚もぐちゃぐちゃにされていく。"

[[dialogue]]
speaker = "魔神ギエル"
# 「サラバダ。オマエ達ヲ滅シタ後、残ル三界ヲ始末スルトシヨウ」
line = "「サラバダ。オマエ達ヲ滅シタ後、残ル三界ヲ始末スルトシヨウ」"

[[dialogue]]
speaker = "魔神ギエル"
# 「本物ノ──『星ノ死』トイウモノヲ教エテヤル。マクロ・ノヴァ・ブラスト──」
line = "「本物ノ──『星ノ死』トイウモノヲ教エテヤル。マクロ・ノヴァ・ブラスト──」"

[[dialogue]]
speaker = "クロト"
# 「ギエ──ル……」
line = "「ギエ──ル……」"

[[dialogue]]
speaker = "unk"
# 炸裂する星の終わり──超新星爆発。
line = "炸裂する星の終わり──超新星爆発。"

[[dialogue]]
speaker = "unk"
# 目の前が真っ暗になる。
line = "目の前が真っ暗になる。"

[[dialogue]]
speaker = "unk"
# 絶望だった。
line = "絶望だった。"

[[dialogue]]
speaker = "unk"
# 俺たちは紛れもなく負けていた。
line = "俺たちは紛れもなく負けていた。"

[[dialogue]]
speaker = "クロト"
# （終わり──なのか──）
line = "（終わり──なのか──）"

[[dialogue]]
speaker = "unk"
# 俺たちは頑張った。
line = "俺たちは頑張った。"

[[dialogue]]
speaker = "unk"
# 何度だって奇跡を起こしてきた。
line = "何度だって奇跡を起こしてきた。"

[[dialogue]]
speaker = "unk"
# だけど、それも、いずれは限界を迎えるものだったんだ。
line = "だけど、それも、いずれは限界を迎えるものだったんだ。"

[[dialogue]]
speaker = "ヴィーナス"
# （結局──運命は変えられなかった──世界を、渡っても──）
line = "（結局──運命は変えられなかった──世界を、渡っても──）"

[[dialogue]]
speaker = "アポロ"
# （あたしのせいだ──あたしの心の弱さが、全部──）
line = "（あたしのせいだ──あたしの心の弱さが、全部──）"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
# （遅かった──最初から私が、もっと、姉さんを助けることができていたら──）
line = "（遅かった──最初から私が、もっと、姉さんを助けることができていたら──）"

[[dialogue]]
speaker = "unk"
# 俺たちが運命の歯車を奇跡的に噛み合わせて出会ったのと同様に。
line = "俺たちが運命の歯車を奇跡的に噛み合わせて出会ったのと同様に。"

[[dialogue]]
speaker = "unk"
# 絡み合った運命の糸は、こんな化け物をも生んでしまった。
line = "絡み合った運命の糸は、こんな化け物をも生んでしまった。"

[[dialogue]]
speaker = "unk"
# それも総ては──宇宙の意志の、掌の上なのかもしれなくて。
line = "それも総ては──宇宙の意志の、掌の上なのかもしれなくて。"

[[dialogue]]
speaker = "クロト"
# （デネブも──ベガも──そして、アルタイルも……同じ結末を辿るんだ、な……）
line = "（デネブも──ベガも──そして、アルタイルも……同じ結末を辿るんだ、な……）"

[[dialogue]]
speaker = "unk"
# 脳裏にふと、かつての暦の末路が浮かんだ。
line = "脳裏にふと、かつての暦の末路が浮かんだ。"

[[dialogue]]
speaker = "unk"
# どんな世界もいつかは、ああやって終わりを迎えるのだ。
line = "どんな世界もいつかは、ああやって終わりを迎えるのだ。"

[[dialogue]]
speaker = "unk"
# 今の俺たちと同じように、散っていった戦士なんか、星の数ほどいたのだろう。
line = "今の俺たちと同じように、散っていった戦士なんか、星の数ほどいたのだろう。"

[[dialogue]]
speaker = "unk"
# だから──もう、諦めたって、仕方が……
line = "だから──もう、諦めたって、仕方が……"
