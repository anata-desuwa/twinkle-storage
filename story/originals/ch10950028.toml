[[dialogue]]
speaker = "unk"
# お正月に付き合い始めた俺とシズハだったが、あれからあっという間に四季は一巡し、俺たちが恋人になってから２度目のお正月がやってきた。
line = "お正月に付き合い始めた俺とシズハだったが、あれからあっという間に四季は一巡し、俺たちが恋人になってから２度目のお正月がやってきた。"

[[dialogue]]
speaker = "unk"
# もうすっかりデートにも慣れた俺たちは、今回も２人きりで初詣デートをしていた。
line = "もうすっかりデートにも慣れた俺たちは、今回も２人きりで初詣デートをしていた。"

[[dialogue]]
speaker = "unk"
# 参拝を終え、気になっていた甘酒をもらいに行こうという話になったのだが、想像以上に人が並んでいて、どうしようかと顔を見合わせていると──
line = "参拝を終え、気になっていた甘酒をもらいに行こうという話になったのだが、想像以上に人が並んでいて、どうしようかと顔を見合わせていると──"

[[dialogue]]
speaker = "シズハ"
# 「これだったら、私の晴れ着フォームの能力を使った方が早いわ♪」
line = "「これだったら、私の晴れ着フォームの能力を使った方が早いわ♪」"

[[dialogue]]
speaker = "unk"
# シズハはそう言って、前回のお正月に手に入れた晴れ着フォームの力で、聖杯から甘酒を取り出すのだった。
line = "シズハはそう言って、前回のお正月に手に入れた晴れ着フォームの力で、聖杯から甘酒を取り出すのだった。"

[[dialogue]]
speaker = "unk"
# しかし、甘酒を口にしてから少しして、異変が起き始めた。
line = "しかし、甘酒を口にしてから少しして、異変が起き始めた。"

[[dialogue]]
speaker = "シズハ"
# 「あ、あれ……？　なんか私、ちょっと体が熱くなってきちゃったかもぉ……？　はぁあぁっ<emoji=heart04>」
line = "「あ、あれ……？　なんか私、ちょっと体が熱くなってきちゃったかもぉ……？　はぁあぁっ<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
# 「お、俺もなんか……。シズハの作る甘酒って、別にアルコールは入ってないんだよな……？」
line = "「お、俺もなんか……。シズハの作る甘酒って、別にアルコールは入ってないんだよな……？」"

[[dialogue]]
speaker = "シズハ"
# 「う、うん。そのはずなんだけど……、んっ……ふうぅ……<emoji=heart04>」
line = "「う、うん。そのはずなんだけど……、んっ……ふうぅ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# とりあえず、人混みを避けて境内の隅の方へと移動する俺たち。すると、シズハの体から光が広がり始める。
line = "とりあえず、人混みを避けて境内の隅の方へと移動する俺たち。すると、シズハの体から光が広がり始める。"

[[dialogue]]
speaker = "シズハ"
# 「聖杯ちゃんがなんか勝手に発動して――えっ？　周りに認識できないようにする結界を張った……？」
line = "「聖杯ちゃんがなんか勝手に発動して――えっ？　周りに認識できないようにする結界を張った……？」"

[[dialogue]]
speaker = "クロト"
# 「せ、聖杯がそう言ってるのか……？」
line = "「せ、聖杯がそう言ってるのか……？」"

[[dialogue]]
speaker = "シズハ"
# 「う、うん……あと、これも聖杯ちゃんが教えてくれたこと、なんだけどぉ……<emoji=heart04>」
line = "「う、うん……あと、これも聖杯ちゃんが教えてくれたこと、なんだけどぉ……<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
# 「私の晴れ着フォームの力、前のお正月の時よりも強くなってるみたい……<emoji=heart04>　そのせいで制御を誤って、飲むと発情する甘酒を作っちゃったみたいなの<emoji=heart04>」
line = "「私の晴れ着フォームの力、前のお正月の時よりも強くなってるみたい……<emoji=heart04>　そのせいで制御を誤って、飲むと発情する甘酒を作っちゃったみたいなの<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
# 「どういうこと！？」
line = "「どういうこと！？」"

[[dialogue]]
speaker = "シズハ"
# 「会長のバカぁ<emoji=heart04>　そんなの……会長とイチャイチャするタイミングを見計らってたからに、決まってるじゃないっ<emoji=heart04>　はぁあぁっ<emoji=heart04>」
line = "「会長のバカぁ<emoji=heart04>　そんなの……会長とイチャイチャするタイミングを見計らってたからに、決まってるじゃないっ<emoji=heart04>　はぁあぁっ<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
# 「会長は今日、エッチしてくれるのかな……私の方から誘ったりしたら、ちょっとはしたないかな……って、そんなことばっかり考えてて……<emoji=heart04>」
line = "「会長は今日、エッチしてくれるのかな……私の方から誘ったりしたら、ちょっとはしたないかな……って、そんなことばっかり考えてて……<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
# 「ぁああっ<emoji=heart04>　そんな状態で聖杯ちゃんから甘酒を出したら……私の願望が乗って、発情甘酒になっちゃった<emoji=heart04>」
line = "「ぁああっ<emoji=heart04>　そんな状態で聖杯ちゃんから甘酒を出したら……私の願望が乗って、発情甘酒になっちゃった<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
# 「あぁぁあっ<emoji=heart04>　これすごぉいっ<emoji=heart04>　頭の中熱くなって、恥ずかしいことも全部言えちゃうよぉ<emoji=heart04>」
line = "「あぁぁあっ<emoji=heart04>　これすごぉいっ<emoji=heart04>　頭の中熱くなって、恥ずかしいことも全部言えちゃうよぉ<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
# 「それでね……？　はぁぁ<emoji=heart04>　聖杯ちゃんが今、周りが私たちのことを認識できなくなる『隠ぺい結界』を張ってくれたのっ<emoji=heart04>」
line = "「それでね……？　はぁぁ<emoji=heart04>　聖杯ちゃんが今、周りが私たちのことを認識できなくなる『隠ぺい結界』を張ってくれたのっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そう言ってシズハは熱く潤んだ瞳で、じっと俺を見上げてきて。
line = "そう言ってシズハは熱く潤んだ瞳で、じっと俺を見上げてきて。"

[[dialogue]]
speaker = "シズハ"
# 「だから……ね？　会長ぉ<emoji=heart04>」
line = "「だから……ね？　会長ぉ<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
# 「んんぅっ……<emoji=heart04>　はあぁっ<emoji=heart04>　もう入れられるよ<emoji=heart04>　私の発情おま○こ、青姦エッチしてぇ<emoji=heart04>」
line = "「んんぅっ……<emoji=heart04>　はあぁっ<emoji=heart04>　もう入れられるよ<emoji=heart04>　私の発情おま○こ、青姦エッチしてぇ<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
# 「っ……シズハ、本当にここでするのか？　するにしたって、なんとかホテルまで我慢とか――」
line = "「っ……シズハ、本当にここでするのか？　するにしたって、なんとかホテルまで我慢とか――」"

[[dialogue]]
speaker = "unk"
# ここは境内の隅だが、俺たちの姿は隠れておらず、丸見えの状態だった。
line = "ここは境内の隅だが、俺たちの姿は隠れておらず、丸見えの状態だった。"

[[dialogue]]
speaker = "unk"
# １０メートルも離れてない場所を、多くの参拝客が絶えず行き来しているのが、普通に見えている。
line = "１０メートルも離れてない場所を、多くの参拝客が絶えず行き来しているのが、普通に見えている。"

[[dialogue]]
speaker = "シズハ"
# 「あぁあぁっ<emoji=heart04>　お預けダメぇ……<emoji=heart04>　ぁああぁっ<emoji=heart04>　いじわるしないでぇ、会長ぉ<emoji=heart04>」
line = "「あぁあぁっ<emoji=heart04>　お預けダメぇ……<emoji=heart04>　ぁああぁっ<emoji=heart04>　いじわるしないでぇ、会長ぉ<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
# 「はぁあぁぁっ<emoji=heart04>　ああぁっ<emoji=heart04>　会長がエッチしてくれなかったら、私、もう１歩も動けないよぉ<emoji=heart04>　会長だってそうでしょっ？」
line = "「はぁあぁぁっ<emoji=heart04>　ああぁっ<emoji=heart04>　会長がエッチしてくれなかったら、私、もう１歩も動けないよぉ<emoji=heart04>　会長だってそうでしょっ？」"

[[dialogue]]
speaker = "unk"
# おま○こをさらけ出しながら、誘惑するようにお尻を振ってみせるシズハ。その顔はすっかり発情の色に染まってしまっている。
line = "おま○こをさらけ出しながら、誘惑するようにお尻を振ってみせるシズハ。その顔はすっかり発情の色に染まってしまっている。"

[[dialogue]]
speaker = "クロト"
# 「っ……わかった。我慢がつらいのは、俺も一緒だ……っ」
line = "「っ……わかった。我慢がつらいのは、俺も一緒だ……っ」"

[[dialogue]]
speaker = "unk"
# 先程から体が熱くなって、俺も収まりが付かなくなりつつあった。ここが自分の部屋なら、俺の方からシズハを押し倒してしまっていただろう。
line = "先程から体が熱くなって、俺も収まりが付かなくなりつつあった。ここが自分の部屋なら、俺の方からシズハを押し倒してしまっていただろう。"

[[dialogue]]
speaker = "シズハ"
# 「うんっ<emoji=heart04>　会長は、恋人の私が我慢できなくなっちゃってるから、はぁぁっ<emoji=heart04>　それを助けようとしてくれてるだけ……<emoji=heart04>」
line = "「うんっ<emoji=heart04>　会長は、恋人の私が我慢できなくなっちゃってるから、はぁぁっ<emoji=heart04>　それを助けようとしてくれてるだけ……<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
# 「だから、お願い<emoji=heart04>　ぁああっ<emoji=heart04>　私の発情おま○こ――会長で静めてぇ<emoji=heart04>」
line = "「だから、お願い<emoji=heart04>　ぁああっ<emoji=heart04>　私の発情おま○こ――会長で静めてぇ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 恋人に発情しきった淫らな顔でそんな懇願をされては、同じ発情状態の俺が止められるはずもなく。
line = "恋人に発情しきった淫らな顔でそんな懇願をされては、同じ発情状態の俺が止められるはずもなく。"

[[dialogue]]
speaker = "シズハ"
# 「あぁあっ<emoji=heart04>　んんうっ……ふうぅっ<emoji=heart04>」
line = "「あぁあっ<emoji=heart04>　んんうっ……ふうぅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 聖杯による隠ぺい結界がなければすぐバレてしまうような状況に異様な興奮を覚えながら、俺はペニスをシズハのおま○こに擦り付け始める。
line = "聖杯による隠ぺい結界がなければすぐバレてしまうような状況に異様な興奮を覚えながら、俺はペニスをシズハのおま○こに擦り付け始める。"

[[dialogue]]
speaker = "シズハ"
# （はあぁあっ……<emoji=heart04>　外で……しかも周りに人が沢山いる場所でエッチしちゃうなんて、隠ぺい結界があっても、恥ずかしくて体がゾクゾクしてきちゃうよぉ<emoji=heart04>）
line = "（はあぁあっ……<emoji=heart04>　外で……しかも周りに人が沢山いる場所でエッチしちゃうなんて、隠ぺい結界があっても、恥ずかしくて体がゾクゾクしてきちゃうよぉ<emoji=heart04>）"

[[dialogue]]
speaker = "unk"
# 以前からよくあることだったが、エッチ中、シズハの心の声が聖杯越しに流れてくる。
line = "以前からよくあることだったが、エッチ中、シズハの心の声が聖杯越しに流れてくる。"

[[dialogue]]
speaker = "unk"
# 恋人が羞恥心を覚えながらも、この青姦シチュエーションに興奮していることが伝わってきて、俺の興奮もいよいよ頂点に達した。
line = "恋人が羞恥心を覚えながらも、この青姦シチュエーションに興奮していることが伝わってきて、俺の興奮もいよいよ頂点に達した。"

[[dialogue]]
speaker = "シズハ"
# 「あっ<emoji=heart04>　会長のおち○ちん、少しずつおま○こに入って来てぇ……<emoji=heart04>　はあぁっ……んんぅっ……<emoji=heart04>」
line = "「あっ<emoji=heart04>　会長のおち○ちん、少しずつおま○こに入って来てぇ……<emoji=heart04>　はあぁっ……んんぅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# シズハの小さな膣穴に俺のペニスの先端をあてがうと、驚くほど抵抗なく、待っていたと言わんばかりに熱い感触に飲み込まれて――
line = "シズハの小さな膣穴に俺のペニスの先端をあてがうと、驚くほど抵抗なく、待っていたと言わんばかりに熱い感触に飲み込まれて――"

[[dialogue]]
speaker = "シズハ"
# 「んっ――んうぅうううぅぅ～～～っ<emoji=heart04><emoji=heart04>」
line = "「んっ――んうぅうううぅぅ～～～っ<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺のペニスは一気に、奥まで全部入ってしまった。
line = "俺のペニスは一気に、奥まで全部入ってしまった。"

[[dialogue]]
speaker = "シズハ"
# 「んふぅ～っ<emoji=heart04><emoji=heart04>　はあぁっ<emoji=heart04>　んうぅっ<emoji=heart04>　んっ<emoji=heart04>　んんぅっ<emoji=heart04>　んふぅっ<emoji=heart04>　んうぅっ……！」
line = "「んふぅ～っ<emoji=heart04><emoji=heart04>　はあぁっ<emoji=heart04>　んうぅっ<emoji=heart04>　んっ<emoji=heart04>　んんぅっ<emoji=heart04>　んふぅっ<emoji=heart04>　んうぅっ……！」"

[[dialogue]]
speaker = "unk"
# シズハは気持ち良さそうな顔をしながらも、公共の場でしている恥ずかしさからか、声だけはなんとか抑え込もうとしているようだった。
line = "シズハは気持ち良さそうな顔をしながらも、公共の場でしている恥ずかしさからか、声だけはなんとか抑え込もうとしているようだった。"

[[dialogue]]
speaker = "シズハ"
# （はあああぁ～～っ<emoji=heart04><emoji=heart04>　外でおち○ちん、挿れられちゃったぁ～っ<emoji=heart04>）
line = "（はあああぁ～～っ<emoji=heart04><emoji=heart04>　外でおち○ちん、挿れられちゃったぁ～っ<emoji=heart04>）"

[[dialogue]]
speaker = "シズハ"
# （恥ずかしいのに、会長の大きなおち○ちんで、おま○こずぼずぼされるの、気持ちいいよぉ～～っ<emoji=heart04><emoji=heart04>）
line = "（恥ずかしいのに、会長の大きなおち○ちんで、おま○こずぼずぼされるの、気持ちいいよぉ～～っ<emoji=heart04><emoji=heart04>）"

[[dialogue]]
speaker = "シズハ"
# 「んっ<emoji=heart04>　ふうぅっ<emoji=heart04>　んんっ<emoji=heart04>　んぅっ<emoji=heart04>　ふうぅ……っ<emoji=heart04>　んっ<emoji=heart04>　んんぅっ<emoji=heart04>　んふうぅ～っ<emoji=heart04><emoji=heart04>」
line = "「んっ<emoji=heart04>　ふうぅっ<emoji=heart04>　んんっ<emoji=heart04>　んぅっ<emoji=heart04>　ふうぅ……っ<emoji=heart04>　んっ<emoji=heart04>　んんぅっ<emoji=heart04>　んふうぅ～っ<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
# （声出すの恥ずかしいのに、気持ちよくて、声漏れちゃうぅ～～っ<emoji=heart04><emoji=heart04>）
line = "（声出すの恥ずかしいのに、気持ちよくて、声漏れちゃうぅ～～っ<emoji=heart04><emoji=heart04>）"

[[dialogue]]
speaker = "シズハ"
# （今日初詣デートした後は、２人でこっそりラブホテルとか行ってエッチするの期待してたから、オナニーしないで我慢してた分、余計に気持ちいいっ……<emoji=heart04><emoji=heart04>）
line = "（今日初詣デートした後は、２人でこっそりラブホテルとか行ってエッチするの期待してたから、オナニーしないで我慢してた分、余計に気持ちいいっ……<emoji=heart04><emoji=heart04>）"

[[dialogue]]
speaker = "シズハ"
# 「んんんっ<emoji=heart04><emoji=heart04>　んっ<emoji=heart04>　んうぅっ<emoji=heart04>　んっ<emoji=heart04>　ふうぅっ……んくぅっ！　はあぁっ<emoji=heart04>　んっ……んんぅっ<emoji=heart04>　んふぅっ<emoji=heart04>　んんうぅ～っ……<emoji=heart04><emoji=heart04>」
line = "「んんんっ<emoji=heart04><emoji=heart04>　んっ<emoji=heart04>　んうぅっ<emoji=heart04>　んっ<emoji=heart04>　ふうぅっ……んくぅっ！　はあぁっ<emoji=heart04>　んっ……んんぅっ<emoji=heart04>　んふぅっ<emoji=heart04>　んんうぅ～っ……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
# 「っ……シズハ、聖杯の力で、心の声がまた聞こえてきてる」
line = "「っ……シズハ、聖杯の力で、心の声がまた聞こえてきてる」"

[[dialogue]]
speaker = "シズハ"
# 「ふえっ！？　ま、まさか、聖杯ちゃん、また変な気を利かせて……！？」
line = "「ふえっ！？　ま、まさか、聖杯ちゃん、また変な気を利かせて……！？」"

[[dialogue]]
speaker = "クロト"
# 「ラブホエッチを期待してっ、オナニー我慢してたんだ？」
line = "「ラブホエッチを期待してっ、オナニー我慢してたんだ？」"

[[dialogue]]
speaker = "シズハ"
# 「～～っ<emoji=heart04><emoji=heart04>　ば、バカバカぁ<emoji=heart04>　そういうのわかってても、ぁあんっ<emoji=heart04>　言わなくて、いいからぁ……！」
line = "「～～っ<emoji=heart04><emoji=heart04>　ば、バカバカぁ<emoji=heart04>　そういうのわかってても、ぁあんっ<emoji=heart04>　言わなくて、いいからぁ……！」"

[[dialogue]]
speaker = "シズハ"
# 「って、あっ<emoji=heart04>　ダメっ<emoji=heart04>　会長、そこ<emoji=heart04>　弱いところズリズリしちゃダメぇっ<emoji=heart04>　んっ<emoji=heart04>　んうぅっ<emoji=heart04>　んんぅっ<emoji=heart04>　はあぁっ<emoji=heart04>　んっ<emoji=heart04>　んううぅ～～っ<emoji=heart04><emoji=heart04>」
line = "「って、あっ<emoji=heart04>　ダメっ<emoji=heart04>　会長、そこ<emoji=heart04>　弱いところズリズリしちゃダメぇっ<emoji=heart04>　んっ<emoji=heart04>　んうぅっ<emoji=heart04>　んんぅっ<emoji=heart04>　はあぁっ<emoji=heart04>　んっ<emoji=heart04>　んううぅ～～っ<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 聖杯の力が確かに発動していることがわかり、どうせ周りにバレないのなら、シズハにもっと恥ずかしい喘ぎ声を出させたい、と変な欲が湧いてきてしまう。
line = "聖杯の力が確かに発動していることがわかり、どうせ周りにバレないのなら、シズハにもっと恥ずかしい喘ぎ声を出させたい、と変な欲が湧いてきてしまう。"

[[dialogue]]
