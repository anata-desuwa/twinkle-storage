speaker = "シズハ"
# 「んあぁああぁああぁ～～っ<emoji=heart04><emoji=heart04><emoji=heart04>　お外で中出しされちゃってるううぅ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」
line = "「んあぁああぁああぁ～～っ<emoji=heart04><emoji=heart04><emoji=heart04>　お外で中出しされちゃってるううぅ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# シズハの言葉で、ゾクゾクとした背徳感に背筋が震える。
line = "シズハの言葉で、ゾクゾクとした背徳感に背筋が震える。"

[[dialogue]]
speaker = "unk"
# お寺という公共の場、しかも人前で、年下の附属生に中出し射精を決める……それを嬉しそうに受け入れてくれる恋人がいるとなれば、淫欲に酔っぱらってしまいそうだった。
line = "お寺という公共の場、しかも人前で、年下の附属生に中出し射精を決める……それを嬉しそうに受け入れてくれる恋人がいるとなれば、淫欲に酔っぱらってしまいそうだった。"

[[dialogue]]
speaker = "シズハ"
# 「あっ<emoji=heart04><emoji=heart04>　はああぁあぁ～～っ<emoji=heart04><emoji=heart04>　精液いっぱい出してもらえて、子宮熱ぅ～い……っ<emoji=heart04>」
line = "「あっ<emoji=heart04><emoji=heart04>　はああぁあぁ～～っ<emoji=heart04><emoji=heart04>　精液いっぱい出してもらえて、子宮熱ぅ～い……っ<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
# 「あぁんっ<emoji=heart04>　はあぁぁ……っ<emoji=heart04>　すごい<emoji=heart04>　会長の射精、まだ終わらないよぉ<emoji=heart04>　んふぅう……<emoji=heart04>」
line = "「あぁんっ<emoji=heart04>　はあぁぁ……っ<emoji=heart04>　すごい<emoji=heart04>　会長の射精、まだ終わらないよぉ<emoji=heart04>　んふぅう……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ――やがて、大量の射精も終わり、俺は快楽の余韻が引いてきてから、ゆっくりとペニスを抜く。
line = "――やがて、大量の射精も終わり、俺は快楽の余韻が引いてきてから、ゆっくりとペニスを抜く。"

[[dialogue]]
speaker = "シズハ"
# 「んぅうっ……<emoji=heart04>　あぁあっ……はふうぅ……<emoji=heart04>」
line = "「んぅうっ……<emoji=heart04>　あぁあっ……はふうぅ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# お互いの息も落ち着いてくると、参拝している人たちの賑やかな喧騒が耳に届いて、理性が戻ってくる。
line = "お互いの息も落ち着いてくると、参拝している人たちの賑やかな喧騒が耳に届いて、理性が戻ってくる。"

[[dialogue]]
speaker = "シズハ"
# 「はあぁあ……<emoji=heart04>　こんなに沢山人がいる場所で……本気のセックスして、イっちゃったぁ……<emoji=heart04>」
line = "「はあぁあ……<emoji=heart04>　こんなに沢山人がいる場所で……本気のセックスして、イっちゃったぁ……<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
# （こんな場所でお股開いて、おま○こから精液溢れさせちゃってるの……すごく、すごく恥ずかしいはずなのに――）
line = "（こんな場所でお股開いて、おま○こから精液溢れさせちゃってるの……すごく、すごく恥ずかしいはずなのに――）"

[[dialogue]]
speaker = "unk"
# シズハのそんな心の声が、また俺に聞こえてきていて。
line = "シズハのそんな心の声が、また俺に聞こえてきていて。"

[[dialogue]]
speaker = "シズハ"
# （それでも周りにはバレないんだと思ったら……<emoji=heart04>　もっと恥ずかしいこと、してみたくなっちゃう<emoji=heart04>）
line = "（それでも周りにはバレないんだと思ったら……<emoji=heart04>　もっと恥ずかしいこと、してみたくなっちゃう<emoji=heart04>）"

[[dialogue]]
speaker = "シズハ"
# 「ね、ねぇ……会長？」
line = "「ね、ねぇ……会長？」"

[[dialogue]]
speaker = "シズハ"
# 「はぁあぁっ<emoji=heart04>　私、まだ体が熱いの、おさまらなくて……<emoji=heart04>　だから、ねっ<emoji=heart04>」
line = "「はぁあぁっ<emoji=heart04>　私、まだ体が熱いの、おさまらなくて……<emoji=heart04>　だから、ねっ<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
# 「会長のおち○ちん、もう１回だけ……お願いしちゃってもいい？　はぁあんっ<emoji=heart04>」
line = "「会長のおち○ちん、もう１回だけ……お願いしちゃってもいい？　はぁあんっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 熱い吐息を漏らしながら見つめてくるシズハに、俺もまたムクムクと体の奥から熱がぶり返してくるのを感じて──
line = "熱い吐息を漏らしながら見つめてくるシズハに、俺もまたムクムクと体の奥から熱がぶり返してくるのを感じて──"

[[dialogue]]
speaker = "シズハ"
# 「あっ<emoji=heart04>　会長、すごい<emoji=heart04>　もう大きくなって――あんっ……<emoji=heart04>」
line = "「あっ<emoji=heart04>　会長、すごい<emoji=heart04>　もう大きくなって――あんっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺たちは火照った体の熱が冷めるまで、参拝で賑わう喧騒の中に混じって、淫らな音を響かせ続けてしまうのだった。
line = "俺たちは火照った体の熱が冷めるまで、参拝で賑わう喧騒の中に混じって、淫らな音を響かせ続けてしまうのだった。"
