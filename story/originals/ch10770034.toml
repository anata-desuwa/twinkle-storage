[[dialogue]]
speaker = "unk"
# 第４話,イジワルなご主人様,P
line = "第４話,イジワルなご主人様,P"

[[dialogue]]
speaker = "unk"
# 今日は週に１度の、蘭美と２人きりで陳情書や報告書を確認して、情報をまとめたり指示の内容を決定する作業を行う日だった。
line = "今日は週に１度の、蘭美と２人きりで陳情書や報告書を確認して、情報をまとめたり指示の内容を決定する作業を行う日だった。"

[[dialogue]]
speaker = "unk"
# 放課後からすぐに取りかかり、気が付けばぶっ続けで４時間。蘭美の事務能力の高さもあって、あれだけ大量にあった書類はすべて片付いていた。
line = "放課後からすぐに取りかかり、気が付けばぶっ続けで４時間。蘭美の事務能力の高さもあって、あれだけ大量にあった書類はすべて片付いていた。"

[[dialogue]]
speaker = "蘭美"
# 「さて、今日の仕事はあらかた片付いたわね！」
line = "「さて、今日の仕事はあらかた片付いたわね！」"

[[dialogue]]
speaker = "蘭美"
# 「というわけで残った時間は、私が貴方の専属メイドとして修業を積む時間にするわよ、ご主人様！」
line = "「というわけで残った時間は、私が貴方の専属メイドとして修業を積む時間にするわよ、ご主人様！」"

[[dialogue]]
speaker = "unk"
# この『専属メイドとして修業を積む時間』というのは、蘭美が『恋人としてイチャイチャしたい』時に言い出す、最近のトレンドワードだと俺は密かに分析していた。
line = "この『専属メイドとして修業を積む時間』というのは、蘭美が『恋人としてイチャイチャしたい』時に言い出す、最近のトレンドワードだと俺は密かに分析していた。"

[[dialogue]]
speaker = "蘭美"
# 「…………全部わかったような顔でニコニコされるのは、ちょっと腹が立つわね」
line = "「…………全部わかったような顔でニコニコされるのは、ちょっと腹が立つわね」"

[[dialogue]]
speaker = "蘭美"
# 「なんでメイドなのに白無垢姿に変身するんだ、とか……わかりやすいツッコミ所があるんだから、乗って来てくれないと張り合いがないじゃない」
line = "「なんでメイドなのに白無垢姿に変身するんだ、とか……わかりやすいツッコミ所があるんだから、乗って来てくれないと張り合いがないじゃない」"

[[dialogue]]
speaker = "unk"
# 覚えててくれてたんだよな？
line = "覚えててくれてたんだよな？"

[[dialogue]]
speaker = "unk"
# また着てほしいってお願いしてたの
line = "また着てほしいってお願いしてたの"

[[dialogue]]
speaker = "蘭美"
# 「むぅ……わかっているなら、いいのだけれど」
line = "「むぅ……わかっているなら、いいのだけれど」"

[[dialogue]]
speaker = "蘭美"
# 「でも、ツッコミ所はそれだけじゃないでしょう？」
line = "「でも、ツッコミ所はそれだけじゃないでしょう？」"

[[dialogue]]
speaker = "蘭美"
# 「修行よ、修行？　どうしてデートしたり、イチャイチャする時間じゃないのか、理由は聞かなくていいのかしら？」
line = "「修行よ、修行？　どうしてデートしたり、イチャイチャする時間じゃないのか、理由は聞かなくていいのかしら？」"

[[dialogue]]
speaker = "蘭美"
# 「それをご主人様の口から説明すると、私が恥をかくから言わない……？」
line = "「それをご主人様の口から説明すると、私が恥をかくから言わない……？」"

[[dialogue]]
speaker = "蘭美"
# 「へぇ～？　ご主人様は恋人の女心に、大変お詳しいようね？」
line = "「へぇ～？　ご主人様は恋人の女心に、大変お詳しいようね？」"

[[dialogue]]
speaker = "蘭美"
# 「どうせここには私たち２人しかいないんだから、答え合わせをしてみようじゃない」
line = "「どうせここには私たち２人しかいないんだから、答え合わせをしてみようじゃない」"

[[dialogue]]
speaker = "蘭美"
# 「いいわよ、別に間違っていても怒ったりしないから。答えてみなさい、ご主人様！」
line = "「いいわよ、別に間違っていても怒ったりしないから。答えてみなさい、ご主人様！」"

[[dialogue]]
speaker = "unk"
# 従者の立場でイチャイチャしたいんでしょ？
line = "従者の立場でイチャイチャしたいんでしょ？"

[[dialogue]]
speaker = "unk"
# 実は俺に命令されるのが結構好きで
line = "実は俺に命令されるのが結構好きで"

[[dialogue]]
speaker = "蘭美"
# 「ぴゃっ！！？」
line = "「ぴゃっ！！？」"

[[dialogue]]
speaker = "蘭美"
# 「そ、そそそ、そんなわけないぴょんっ！？？」
line = "「そ、そそそ、そんなわけないぴょんっ！？？」"

[[dialogue]]
speaker = "蘭美"
# 「ご主人様は、そんな破廉恥なことを考えてたぴょんっ！？　破廉恥だぴょん！！　そんなわけないぴょんっ！？」
line = "「ご主人様は、そんな破廉恥なことを考えてたぴょんっ！？　破廉恥だぴょん！！　そんなわけないぴょんっ！？」"

[[dialogue]]
speaker = "unk"
# 誤魔化すのは止めなさい！！
line = "誤魔化すのは止めなさい！！"

[[dialogue]]
speaker = "unk"
# 蘭美！　恥ずかしいからって
line = "蘭美！　恥ずかしいからって"

[[dialogue]]
speaker = "unk"
# 俺がわざと、普段の蘭美にはしないような、強い口調でピシャリと命令する。
line = "俺がわざと、普段の蘭美にはしないような、強い口調でピシャリと命令する。"

[[dialogue]]
speaker = "unk"
# すると蘭美は背筋をゾクゾクっと振るわせて、とろんと顔を赤らめる。
line = "すると蘭美は背筋をゾクゾクっと振るわせて、とろんと顔を赤らめる。"

[[dialogue]]
speaker = "蘭美"
# 「ご、ごめんなさい、ご主人様。蘭美は嘘をついたぴょん……<emoji=heart04>」
line = "「ご、ごめんなさい、ご主人様。蘭美は嘘をついたぴょん……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 本当のこと、言ってごらん
line = "本当のこと、言ってごらん"

[[dialogue]]
speaker = "蘭美"
# 「はぅぅ……本当はご主人様に命令されたり、叱られたりするの、大好きだぴょん」
line = "「はぅぅ……本当はご主人様に命令されたり、叱られたりするの、大好きだぴょん」"

[[dialogue]]
speaker = "蘭美"
# 「でもメイド長として、そんなだらしないところばっかり、見せるわけにもいかなくて……」
line = "「でもメイド長として、そんなだらしないところばっかり、見せるわけにもいかなくて……」"

[[dialogue]]
speaker = "unk"
# 俺は蘭美にこっちへ来るように手招きして、近づいてきた彼女を抱き寄せて膝の上に乗せる。
line = "俺は蘭美にこっちへ来るように手招きして、近づいてきた彼女を抱き寄せて膝の上に乗せる。"

[[dialogue]]
speaker = "蘭美"
# 「わぷっ。ご、ご主人様……？」
line = "「わぷっ。ご、ご主人様……？」"

[[dialogue]]
speaker = "unk"
# 膝の上に乗った小さな恋人の頭を、優しく撫でていく。
line = "膝の上に乗った小さな恋人の頭を、優しく撫でていく。"

[[dialogue]]
speaker = "蘭美"
# 「飛び級しただけで、本当はご主人様たちより若い私が、メイド長としてリーダーを務めているのは偉い……？」
line = "「飛び級しただけで、本当はご主人様たちより若い私が、メイド長としてリーダーを務めているのは偉い……？」"

[[dialogue]]
speaker = "蘭美"
# 「だってそんなの……私の年齢は、仕事や立場の言い訳には、ならないもの……」
line = "「だってそんなの……私の年齢は、仕事や立場の言い訳には、ならないもの……」"

[[dialogue]]
speaker = "蘭美"
# 「ヘレナ様やヴィーナスお嬢様の期待には応えたいし、それに貴方の恋人として、立派だって思われたいから……」
line = "「ヘレナ様やヴィーナスお嬢様の期待には応えたいし、それに貴方の恋人として、立派だって思われたいから……」"

[[dialogue]]
speaker = "蘭美"
# 「２人きりの時くらい、もっと欲望全開でもいいって……？」
line = "「２人きりの時くらい、もっと欲望全開でもいいって……？」"

[[dialogue]]
speaker = "蘭美"
# 「むぅ。そうは言うけど、私、ご主人様には結構欲望全開で接しているでしょう？」
line = "「むぅ。そうは言うけど、私、ご主人様には結構欲望全開で接しているでしょう？」"

[[dialogue]]
speaker = "蘭美"
# 「メリハリがあるのは良いことだけど、もっと素直に甘えることも覚えて欲しい……まあ、言いたいことはわかるけれど」
line = "「メリハリがあるのは良いことだけど、もっと素直に甘えることも覚えて欲しい……まあ、言いたいことはわかるけれど」"

[[dialogue]]
speaker = "蘭美"
# 「こればっかりは性格だから、多少は受け入れてもらえると嬉しいわ」
line = "「こればっかりは性格だから、多少は受け入れてもらえると嬉しいわ」"

[[dialogue]]
speaker = "unk"
# 強引なご主人様になってみようかな
line = "強引なご主人様になってみようかな"

[[dialogue]]
speaker = "unk"
# じゃあ俺もたまには……
line = "じゃあ俺もたまには……"

[[dialogue]]
speaker = "蘭美"
# 「……っ！」
line = "「……っ！」"

[[dialogue]]
speaker = "蘭美"
# 「それ、他の人がいる前では絶対やめてよね……！」
line = "「それ、他の人がいる前では絶対やめてよね……！」"

[[dialogue]]
speaker = "蘭美"
# 「いくら人前でイチャイチャするのを気にしないと言っても、限度はあるでしょう！？」
line = "「いくら人前でイチャイチャするのを気にしないと言っても、限度はあるでしょう！？」"

[[dialogue]]
speaker = "蘭美"
# 「私、貴方に命令されたり、叱られたりすると……へ、変な気分になっちゃうから、２人きりの時以外は絶対やめて！」
line = "「私、貴方に命令されたり、叱られたりすると……へ、変な気分になっちゃうから、２人きりの時以外は絶対やめて！」"

[[dialogue]]
speaker = "unk"
# じゃあ、２人きりの今は……？
line = "じゃあ、２人きりの今は……？"

[[dialogue]]
speaker = "蘭美"
# 「そ、そんなの……」
line = "「そ、そんなの……」"

[[dialogue]]
speaker = "蘭美"
# 「そんな破廉恥なこと、言えないぴょんっ<emoji=heart04>」
line = "「そんな破廉恥なこと、言えないぴょんっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 腕の中で顔を真っ赤にする蘭美の頭を、俺は何度も何度も撫でながら、俺たちは夜が更けるまで２人きりでイチャイチャしまくるのだった。
line = "腕の中で顔を真っ赤にする蘭美の頭を、俺は何度も何度も撫でながら、俺たちは夜が更けるまで２人きりでイチャイチャしまくるのだった。"
