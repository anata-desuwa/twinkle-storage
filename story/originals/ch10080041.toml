[[dialogue]]
speaker = "unk"
# 第１話,ニューイヤートリコロール,P
line = "第１話,ニューイヤートリコロール,P"

[[dialogue]]
speaker = "unk"
# 冬の休みも終わり、学園に日常の活気が戻ったある日。
line = "冬の休みも終わり、学園に日常の活気が戻ったある日。"

[[dialogue]]
speaker = "unk"
# アナ達は仮想結界システムを使って、戦闘訓練に取り組んでいた。
line = "アナ達は仮想結界システムを使って、戦闘訓練に取り組んでいた。"

[[dialogue]]
speaker = "アナ"
# 「破魔矢スタンバイ。お２人共、いつでもノープロブレムです」
line = "「破魔矢スタンバイ。お２人共、いつでもノープロブレムです」"

[[dialogue]]
speaker = "ルルカ"
# 「よ～し、あたしの歌でクリスマスパワーを注入しちゃうよ～！　――妹からのＭｅｒｒｙ　Ｌｏｖｅ♪」
line = "「よ～し、あたしの歌でクリスマスパワーを注入しちゃうよ～！　――妹からのＭｅｒｒｙ　Ｌｏｖｅ♪」"

[[dialogue]]
speaker = "リーリア"
# 「私のお正月パワーもマジカルプラス☆　絵馬に願いを込めて――マジカル☆グラフィティ―！」
line = "「私のお正月パワーもマジカルプラス☆　絵馬に願いを込めて――マジカル☆グラフィティ―！」"

[[dialogue]]
speaker = "unk"
# アナの破魔矢に２人の力が収束され、鮮やかなグラデーションの輝きを放つ。
line = "アナの破魔矢に２人の力が収束され、鮮やかなグラデーションの輝きを放つ。"

[[dialogue]]
speaker = "アナ"
# 「破魔矢へのパワー収束臨界点……ここです。ファイア！」
line = "「破魔矢へのパワー収束臨界点……ここです。ファイア！」"

[[dialogue]]
speaker = "アナ"
# 「……シャドウの撃破を確認。リーリアさんの融合魔弾にちなんで、名付けて――『ニューイヤートリコロール』です」
line = "「……シャドウの撃破を確認。リーリアさんの融合魔弾にちなんで、名付けて――『ニューイヤートリコロール』です」"

[[dialogue]]
speaker = "ルルカ"
# 「やった～♪　あたしたち３人で新たな合体技、成功だねっ！　いぇ～い♪」
line = "「やった～♪　あたしたち３人で新たな合体技、成功だねっ！　いぇ～い♪」"

[[dialogue]]
speaker = "リーリア"
# 「マジカルハイタ～ッチ☆　アナちゃんの新しい晴れ着の力、可愛く決まったね♪」
line = "「マジカルハイタ～ッチ☆　アナちゃんの新しい晴れ着の力、可愛く決まったね♪」"

[[dialogue]]
speaker = "ルルカ"
# 「あ～、でも……あたしも晴れ着フォーム、欲しかったなぁ～。２人だけおニューの衣装、ズル～い」
line = "「あ～、でも……あたしも晴れ着フォーム、欲しかったなぁ～。２人だけおニューの衣装、ズル～い」"

[[dialogue]]
speaker = "アナ"
# 「ルルカさんは『ルカルカ』の活動も好調ですし、近いうちにまたＶチューバー衣装に覚醒するんじゃないでしょうか？」
line = "「ルルカさんは『ルカルカ』の活動も好調ですし、近いうちにまたＶチューバー衣装に覚醒するんじゃないでしょうか？」"

[[dialogue]]
speaker = "リーリア"
# 「そうそう。近いところだと、バレンタインとか～？　新衣装でチョコ作りの配信、やるんでしょ？」
line = "「そうそう。近いところだと、バレンタインとか～？　新衣装でチョコ作りの配信、やるんでしょ？」"

[[dialogue]]
speaker = "ルルカ"
# 「やるけどさ～。どうしたら良い配信になるのか、考えることが山積みだよ～」
line = "「やるけどさ～。どうしたら良い配信になるのか、考えることが山積みだよ～」"

[[dialogue]]
speaker = "unk"
# ３人共、訓練お疲れ様
line = "３人共、訓練お疲れ様"

[[dialogue]]
speaker = "アナ"
# 「あっ……！　会長、お疲れ様です。もしかして見ていてくれてたんですか？」
line = "「あっ……！　会長、お疲れ様です。もしかして見ていてくれてたんですか？」"

[[dialogue]]
speaker = "アナ"
# 「どうでしたか？　リーリアさんやサーシャ先輩に負けじと、私も訓練を頑張って、アナ流破魔矢術の合体技を編み出してみました」
line = "「どうでしたか？　リーリアさんやサーシャ先輩に負けじと、私も訓練を頑張って、アナ流破魔矢術の合体技を編み出してみました」"

[[dialogue]]
speaker = "アナ"
# 「ですので会長には、達成感を得る為の<ruby=リワード>報酬</ruby>として、頭を撫でてもらうことを所望します」
line = "「ですので会長には、達成感を得る為の<ruby>報酬<rt>リワード</rt></ruby>として、頭を撫でてもらうことを所望します」"

[[dialogue]]
speaker = "unk"
# ああ。よく頑張ったな、アナ
line = "ああ。よく頑張ったな、アナ"

[[dialogue]]
speaker = "アナ"
# 「あっ……<emoji=heart04>　ふふっ、会長に褒めてもらったことで、また次の<ruby=ミッション>目標</ruby>を達成する為の意欲が湧いてきます。むふ～♪」
line = "「あっ……<emoji=heart04>　ふふっ、会長に褒めてもらったことで、また次の<ruby>目標<rt>ミッション</rt></ruby>を達成する為の意欲が湧いてきます。むふ～♪」"

[[dialogue]]
speaker = "ルルカ"
# 「あ～～！！　アナちゃんがカレシ相手にデレデレしてる！」
line = "「あ～～！！　アナちゃんがカレシ相手にデレデレしてる！」"

[[dialogue]]
speaker = "リーリア"
# 「ちょっとちょっと～？　センパイも、可愛い後輩たちが見ているところで、カノジョとイチャつかないで欲しいんですけど～？」
line = "「ちょっとちょっと～？　センパイも、可愛い後輩たちが見ているところで、カノジョとイチャつかないで欲しいんですけど～？」"

[[dialogue]]
speaker = "アナ"
# 「な、何を言っているんですか、お２人共。イチャついてなんかいません……からかわないでください」
line = "「な、何を言っているんですか、お２人共。イチャついてなんかいません……からかわないでください」"

[[dialogue]]
speaker = "unk"
# 顔を赤くして俺から少し距離を取りながら、モジモジと恥ずかしそうにするアナ。
line = "顔を赤くして俺から少し距離を取りながら、モジモジと恥ずかしそうにするアナ。"

[[dialogue]]
speaker = "ルルカ"
# 「え？　いや、思いっきり恋人のスキンシップだったよね？　自分から撫でてもらいに行ってたし……」
line = "「え？　いや、思いっきり恋人のスキンシップだったよね？　自分から撫でてもらいに行ってたし……」"

[[dialogue]]
speaker = "リーリア"
# 「もしかして……アナちゃんって自分がデレデレしてる自覚、なかったり……？」
line = "「もしかして……アナちゃんって自分がデレデレしてる自覚、なかったり……？」"

[[dialogue]]
speaker = "アナ"
# 「私は常にコンプライアンスを意識して、人前では星徒会の副会長として、会長と接するように心がけているつもりですが……」
line = "「私は常にコンプライアンスを意識して、人前では星徒会の副会長として、会長と接するように心がけているつもりですが……」"

[[dialogue]]
speaker = "ルルカ"
# 「えっと……お兄ちゃんがいると、アナちゃんは物凄く表情が緩むし、声もちょっと甘くなってるよ？」
line = "「えっと……お兄ちゃんがいると、アナちゃんは物凄く表情が緩むし、声もちょっと甘くなってるよ？」"

[[dialogue]]
speaker = "リーリア"
# 「さっきも、和菓子を前にした時みたいに、明らかにテンションが上がって、声が高くなってたよね？」
line = "「さっきも、和菓子を前にした時みたいに、明らかにテンションが上がって、声が高くなってたよね？」"

[[dialogue]]
speaker = "アナ"
# 「な……！？　そ、そんなことはありません。事実無根ですっ」
line = "「な……！？　そ、そんなことはありません。事実無根ですっ」"

[[dialogue]]
speaker = "リーリア"
# 「センパイはちゃんと気づいてますよね？」
line = "「センパイはちゃんと気づいてますよね？」"

[[dialogue]]
speaker = "unk"
# まあ、恋人だし……うん
line = "まあ、恋人だし……うん"

[[dialogue]]
speaker = "アナ"
# 「ほぁっ！！？」
line = "「ほぁっ！！？」"

[[dialogue]]
speaker = "アナ"
# 「自分が無意識に、そんな恥ずかしい行動をしていたなんて……。すぅ～、はぁ～」
line = "「自分が無意識に、そんな恥ずかしい行動をしていたなんて……。すぅ～、はぁ～」"

[[dialogue]]
speaker = "アナ"
# 「……会長、もうちょっと離れてください。恋人とは言え、節度は保つべき」
line = "「……会長、もうちょっと離れてください。恋人とは言え、節度は保つべき」"

[[dialogue]]
speaker = "unk"
# 急に付き合う前みたいなクールなアナに！？
line = "急に付き合う前みたいなクールなアナに！？"

[[dialogue]]
speaker = "アナ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "アナ"
# 「やっぱり嘘です。もっとこっちに来てください」
line = "「やっぱり嘘です。もっとこっちに来てください」"

[[dialogue]]
speaker = "アナ"
# 「私が一緒にいる時は、少なくとも手の繋げる範囲にいて欲しいです」
line = "「私が一緒にいる時は、少なくとも手の繋げる範囲にいて欲しいです」"

[[dialogue]]
speaker = "unk"
# そう言って、しれっと俺の手を取り、繋いでくるアナ。
line = "そう言って、しれっと俺の手を取り、繋いでくるアナ。"

[[dialogue]]
speaker = "ルルカ"
# 「ちょっ……アナちゃん、今ひょっとして、お兄ちゃんを突き放した途端に寂しくなって、デレちゃった感じ！？」
line = "「ちょっ……アナちゃん、今ひょっとして、お兄ちゃんを突き放した途端に寂しくなって、デレちゃった感じ！？」"

[[dialogue]]
speaker = "リーリア"
# 「ヤバい、どうしよう……！　センパイの気持ちがわかるくらい、アナちゃんの反応が可愛すぎなんですけど！？」
line = "「ヤバい、どうしよう……！　センパイの気持ちがわかるくらい、アナちゃんの反応が可愛すぎなんですけど！？」"

[[dialogue]]
speaker = "アナ"
# 「あ、あまりからかわないでください……」
line = "「あ、あまりからかわないでください……」"

[[dialogue]]
speaker = "アナ"
# 「お２人だって、恋人ができたら、きっとわかります……。好きな人とは、本当はいつもくっついていたいものなんです」
line = "「お２人だって、恋人ができたら、きっとわかります……。好きな人とは、本当はいつもくっついていたいものなんです」"

[[dialogue]]
speaker = "アナ"
# 「これでも我慢して、なんとか手を繋ぐだけに留めているんですから……」
line = "「これでも我慢して、なんとか手を繋ぐだけに留めているんですから……」"

[[dialogue]]
speaker = "リーリア"
# 「おや？　なんか今私たち、すごい恋人マウント取られちゃってます？」
line = "「おや？　なんか今私たち、すごい恋人マウント取られちゃってます？」"

[[dialogue]]
speaker = "ルルカ"
# 「くぅ～！　もじもじアナちゃんは滅茶苦茶可愛いけど、マウントアナちゃんはちょっとムカつく～！」
line = "「くぅ～！　もじもじアナちゃんは滅茶苦茶可愛いけど、マウントアナちゃんはちょっとムカつく～！」"

[[dialogue]]
speaker = "unk"
# あげないぞ？（ドヤ顔）
line = "あげないぞ？（ドヤ顔）"

[[dialogue]]
speaker = "リーリア"
# 「センパイのアナちゃんマウントは普通にムカつくんで、やめてください！」
line = "「センパイのアナちゃんマウントは普通にムカつくんで、やめてください！」"

[[dialogue]]
speaker = "アナ"
# 「ふっ……どやぁ」
line = "「ふっ……どやぁ」"

[[dialogue]]
speaker = "ルルカ"
# 「何このドヤ顔バカップル！？」
line = "「何このドヤ顔バカップル！？」"

[[dialogue]]
speaker = "unk"
# そんなこんなで、今日も仲良くじゃれ合うクラスメイト３人組なのであった。
line = "そんなこんなで、今日も仲良くじゃれ合うクラスメイト３人組なのであった。"
