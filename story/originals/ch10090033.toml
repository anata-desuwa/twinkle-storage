[[dialogue]]
speaker = "unk"
# 第３話,突撃アキバデイズ,P
line = "第３話,突撃アキバデイズ,P"

[[dialogue]]
speaker = "セーラ"
# 「アキバとうちゃーく♪　今日のお出かけはここで決まりぃ」
line = "「アキバとうちゃーく♪　今日のお出かけはここで決まりぃ」"

[[dialogue]]
speaker = "unk"
# どうして秋葉原？
line = "どうして秋葉原？"

[[dialogue]]
speaker = "unk"
# なぜここに？
line = "なぜここに？"

[[dialogue]]
speaker = "セーラ"
# 「うんうん。星騎士の任務じゃよく出撃するけどさ、よく考えたらプライベートで来たこと１度もなかったなと思って」
line = "「うんうん。星騎士の任務じゃよく出撃するけどさ、よく考えたらプライベートで来たこと１度もなかったなと思って」"

[[dialogue]]
speaker = "セーラ"
# 「せっかくなら会長さんとのデートに使っちゃえと思って。じっくり見てみたいとこ、結構あるし！」
line = "「せっかくなら会長さんとのデートに使っちゃえと思って。じっくり見てみたいとこ、結構あるし！」"

[[dialogue]]
speaker = "セーラ"
# 「平和なほうが珍しい──ってのも変な感じだけど。本来はこうなんだよね」
line = "「平和なほうが珍しい──ってのも変な感じだけど。本来はこうなんだよね」"

[[dialogue]]
speaker = "セーラ"
# 「ちなみに、会長さんはこのへんよく来る？」
line = "「ちなみに、会長さんはこのへんよく来る？」"

[[dialogue]]
speaker = "セーラ"
# 「たまに──か。ふむふむ、なるほどねぇ。なら教えてもらいたいかも」
line = "「たまに──か。ふむふむ、なるほどねぇ。なら教えてもらいたいかも」"

[[dialogue]]
speaker = "セーラ"
# 「街並みもけっこう変わってきてる？　有名なアニメにも出てくる？　へー！　気になる気になる」
line = "「街並みもけっこう変わってきてる？　有名なアニメにも出てくる？　へー！　気になる気になる」"

[[dialogue]]
speaker = "セーラ"
# 「聞いてるだけで面白そうかも。それじゃ行ってみよ～！」
line = "「聞いてるだけで面白そうかも。それじゃ行ってみよ～！」"

[[dialogue]]
speaker = "セーラ"
# 「わー……一気に色んなカルチャーを浴びて頭クラクラ気味……」
line = "「わー……一気に色んなカルチャーを浴びて頭クラクラ気味……」"

[[dialogue]]
speaker = "セーラ"
# 「でも楽しい！　なんかアガる！　雰囲気重視！」
line = "「でも楽しい！　なんかアガる！　雰囲気重視！」"

[[dialogue]]
speaker = "unk"
# 自分もそう
line = "自分もそう"

[[dialogue]]
speaker = "unk"
# それでいい
line = "それでいい"

[[dialogue]]
speaker = "セーラ"
# 「あ、やっぱり？　わかんなくても楽しんだもん勝ちだよね」
line = "「あ、やっぱり？　わかんなくても楽しんだもん勝ちだよね」"

[[dialogue]]
speaker = "セーラ"
# 「向こうに売ってたカメラとか、超可愛くなかった？　すっごい物欲刺激されたわ……！」
line = "「向こうに売ってたカメラとか、超可愛くなかった？　すっごい物欲刺激されたわ……！」"

[[dialogue]]
speaker = "セーラ"
# 「けど学生には手が出ないくらいの値段だったね……ああいうのは立派に稼げるようになるまでお預けかなあ」
line = "「けど学生には手が出ないくらいの値段だったね……ああいうのは立派に稼げるようになるまでお預けかなあ」"

[[dialogue]]
speaker = "unk"
# カメラ好きでしたっけ
line = "カメラ好きでしたっけ"

[[dialogue]]
speaker = "unk"
# 写真の趣味が？
line = "写真の趣味が？"

[[dialogue]]
speaker = "セーラ"
# 「いや、全然？　ＤＩＳＣの撮影機能くらいしか使ったことないよ」
line = "「いや、全然？　ＤＩＳＣの撮影機能くらいしか使ったことないよ」"

[[dialogue]]
speaker = "セーラ"
# 「でもでも、写真の趣味ってなんかお洒落で大人っぽいじゃん？　単なる憧れ！　みたいな」
line = "「でもでも、写真の趣味ってなんかお洒落で大人っぽいじゃん？　単なる憧れ！　みたいな」"

[[dialogue]]
speaker = "セーラ"
# 「そーそー、うちなんてミーハーなんだから。その場のノリであれいいなーとかこれいいなーって言ってるだけ！」
line = "「そーそー、うちなんてミーハーなんだから。その場のノリであれいいなーとかこれいいなーって言ってるだけ！」"

[[dialogue]]
speaker = "セーラ"
# 「にしても……個性的なお店が多いよね、ホント。これだけお店があると、その方が集客に効果的なのかな……」
line = "「にしても……個性的なお店が多いよね、ホント。これだけお店があると、その方が集客に効果的なのかな……」"

[[dialogue]]
speaker = "セーラ"
# 「ん？　ああこれ──ちょっとメモっておこうかなって。後学のために」
line = "「ん？　ああこれ──ちょっとメモっておこうかなって。後学のために」"

[[dialogue]]
speaker = "セーラ"
# 「必要なのか──って、もちろん！　ほら、色んなビジネスの形態を知っておくことは大事でしょ？」
line = "「必要なのか──って、もちろん！　ほら、色んなビジネスの形態を知っておくことは大事でしょ？」"

[[dialogue]]
speaker = "セーラ"
# 「外国の人も多いねー……色んな言葉で案内も書かれてるし……」
line = "「外国の人も多いねー……色んな言葉で案内も書かれてるし……」"

[[dialogue]]
speaker = "セーラ"
# 「インバウンドっていうんだよね、こういうの。これからの時代には大事か──」
line = "「インバウンドっていうんだよね、こういうの。これからの時代には大事か──」"

[[dialogue]]
speaker = "unk"
# もっと気楽に
line = "もっと気楽に"

[[dialogue]]
speaker = "unk"
# そんな真面目に見るところでもない
line = "そんな真面目に見るところでもない"

[[dialogue]]
speaker = "セーラ"
# 「あはは、そうだった。雰囲気重視って言ったばかりなのに」
line = "「あはは、そうだった。雰囲気重視って言ったばかりなのに」"

[[dialogue]]
speaker = "セーラ"
# 「せっかくのデートだもんね？　会長さんとの時間を大事にしなくっちゃ──腕組んじゃお。えいっ」
line = "「せっかくのデートだもんね？　会長さんとの時間を大事にしなくっちゃ──腕組んじゃお。えいっ」"

[[dialogue]]
speaker = "セーラ"
# 「ふふふ。どやぁ。間近で感じる桐原先輩は」
line = "「ふふふ。どやぁ。間近で感じる桐原先輩は」"

[[dialogue]]
speaker = "セーラ"
# 「ほらほら、向こうにもっと大胆なカップルもいるよ？　うちらも負けてらんないよね～」
line = "「ほらほら、向こうにもっと大胆なカップルもいるよ？　うちらも負けてらんないよね～」"

[[dialogue]]
speaker = "セーラ"
# 「後は……そうだ！　うち向こうのメイド喫茶行ってみたい！」
line = "「後は……そうだ！　うち向こうのメイド喫茶行ってみたい！」"

[[dialogue]]
speaker = "セーラ"
# 「やっぱ秋葉原って言ったらメイドっしょ！　会長さんだって案外興味あるんじゃないの～？」
line = "「やっぱ秋葉原って言ったらメイドっしょ！　会長さんだって案外興味あるんじゃないの～？」"

[[dialogue]]
speaker = "unk"
# 目移りしない
line = "目移りしない"

[[dialogue]]
speaker = "unk"
# 自分にはセーラさんがいる
line = "自分にはセーラさんがいる"

[[dialogue]]
speaker = "セーラ"
# 「へぇ……言ってくれるじゃん。この～」
line = "「へぇ……言ってくれるじゃん。この～」"

[[dialogue]]
speaker = "セーラ"
# 「ふふーん……会長さんが望むなら着てあげないこともないよ？」
line = "「ふふーん……会長さんが望むなら着てあげないこともないよ？」"

[[dialogue]]
speaker = "セーラ"
# 「水着も見せたしー、バニーにだって挑戦したんだから、今さらメイド服ぐらいヨユーヨユー！」
line = "「水着も見せたしー、バニーにだって挑戦したんだから、今さらメイド服ぐらいヨユーヨユー！」"

[[dialogue]]
speaker = "セーラ"
# 「いつかウエディングドレスを着るまでさ……色んなうちを見せてあげるから覚悟してよね、会長さん♪」
line = "「いつかウエディングドレスを着るまでさ……色んなうちを見せてあげるから覚悟してよね、会長さん♪」"
