[[dialogue]]
speaker = "ヴィーナス"
# 「あぁぁあんっ……<emoji=heart04>　まだいっぱい出てる<emoji=heart04>　はあぁあっ……<emoji=heart04>　おま○こ温かくて、しあわせぇ<emoji=heart04>」
