[[dialogue]]
speaker = "unk"
# 第６話,大交流,B
line = "第６話,大交流,B"

[[dialogue]]
speaker = "unk"
# 大交流が行われ、年度途中ながらも例外的に、俺たちの学園へ神族と魔族の留学生がやってきた。
line = "大交流が行われ、年度途中ながらも例外的に、俺たちの学園へ神族と魔族の留学生がやってきた。"

[[dialogue]]
speaker = "unk"
# タイミングが合わず、<ruby=ギエルとの決戦>フィヴォス流星群</ruby>には間に合わなかったものの、彼女たちはその才能を見込まれた精鋭と聞いている。
line = "タイミングが合わず、<ruby>フィヴォス流星群<rt>ギエルとの決戦</rt></ruby>には間に合わなかったものの、彼女たちはその才能を見込まれた精鋭と聞いている。"

[[dialogue]]
speaker = "ヴィーナス"
# 「今回の留学生はスカウトだから、クロトと違って入学金は払わなくていいんだって」
line = "「今回の留学生はスカウトだから、クロトと違って入学金は払わなくていいんだって」"

[[dialogue]]
speaker = "ヴィーナス"
# 「もうちょっと待ってたらクロトもスカウトされてただろうし、働き損だったかもね！」
line = "「もうちょっと待ってたらクロトもスカウトされてただろうし、働き損だったかもね！」"

[[dialogue]]
speaker = "クロト"
# 「気にしてないよ。バイトでお金を貯めるのは、母さんを説得するためでもあったわけだし」
line = "「気にしてないよ。バイトでお金を貯めるのは、母さんを説得するためでもあったわけだし」"

[[dialogue]]
speaker = "クロト"
# 「それにあそこで俺が転入してなかったら、力を付けるのが間に合わなくて、世界は守れなかったよ」
line = "「それにあそこで俺が転入してなかったら、力を付けるのが間に合わなくて、世界は守れなかったよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それもそうね。ふふ♪」
line = "「それもそうね。ふふ♪」"

[[dialogue]]
speaker = "unk"
# 確かにバイトで入学資金を貯めるのは大変だったけど、あれはあれでいい思い出だ。
line = "確かにバイトで入学資金を貯めるのは大変だったけど、あれはあれでいい思い出だ。"

[[dialogue]]
speaker = "unk"
# その頃に出会った環が守護天使で、俺を監視していたというのは驚いたけど。
line = "その頃に出会った環が守護天使で、俺を監視していたというのは驚いたけど。"

[[dialogue]]
speaker = "unk"
# だけど守護天使はセイファート元学園長によって捕えられていたはず。
line = "だけど守護天使はセイファート元学園長によって捕えられていたはず。"

[[dialogue]]
speaker = "unk"
# その彼とも行動を共にしていたし、彼女の正体も目的もいまだにはっきりしていない。
line = "その彼とも行動を共にしていたし、彼女の正体も目的もいまだにはっきりしていない。"

[[dialogue]]
speaker = "サーシャ"
# 「天界と魔界からスカウトされた精鋭らしいけど、どれくらい強いのかしら～？」
line = "「天界と魔界からスカウトされた精鋭らしいけど、どれくらい強いのかしら～？」"

[[dialogue]]
speaker = "マトイ"
# 「ハッ──！？　そんな優秀な留学生が来たら、もしかして私はお役御免に……！？」
line = "「ハッ──！？　そんな優秀な留学生が来たら、もしかして私はお役御免に……！？」"

[[dialogue]]
speaker = "クロト"
# 「ないない。今まで一緒に戦ってきただろ」
line = "「ないない。今まで一緒に戦ってきただろ」"

[[dialogue]]
speaker = "マトイ"
# 「緋宮くん……！　今度マフィン作ってくるね！」
line = "「緋宮くん……！　今度マフィン作ってくるね！」"

[[dialogue]]
speaker = "クロト"
# 「別にマトイのお菓子が目当てなわけじゃないんだけど……いや、もちろんありがたいけど」
line = "「別にマトイのお菓子が目当てなわけじゃないんだけど……いや、もちろんありがたいけど」"

[[dialogue]]
speaker = "クロト"
# 「そろそろ本題に入ろうか。ほら、この前提案した企画」
line = "「そろそろ本題に入ろうか。ほら、この前提案した企画」"

[[dialogue]]
speaker = "アナ"
# 「はい。留学生のためのクイズオリエンテーションですね」
line = "「はい。留学生のためのクイズオリエンテーションですね」"

[[dialogue]]
speaker = "unk"
# 他の生徒と打ち解けるためのオリエンテーションなんて、本来なら入学直後にするものだけど、俺みたいな転入生にはその機会がない。
line = "他の生徒と打ち解けるためのオリエンテーションなんて、本来なら入学直後にするものだけど、俺みたいな転入生にはその機会がない。"

[[dialogue]]
speaker = "unk"
# だから季節外れの留学生のために、季節外れのイベントを用意しようというものだ。
line = "だから季節外れの留学生のために、季節外れのイベントを用意しようというものだ。"

[[dialogue]]
speaker = "ヴィーナス"
# 「参加は留学生だけなの？」
line = "「参加は留学生だけなの？」"

[[dialogue]]
speaker = "クロト"
# 「いや、留学生と在校生の交流を深めるのが目的だから、希望があれば誰でも参加できるようになってる」
line = "「いや、留学生と在校生の交流を深めるのが目的だから、希望があれば誰でも参加できるようになってる」"

[[dialogue]]
speaker = "クロト"
# 「戦いが一段落したから、みんなもイベントがあった方が楽しいだろうし」
line = "「戦いが一段落したから、みんなもイベントがあった方が楽しいだろうし」"

[[dialogue]]
speaker = "ヴィーナス"
# 「いいわね。私たち新星星徒会が勝利を頂くわ！」
line = "「いいわね。私たち新星星徒会が勝利を頂くわ！」"

[[dialogue]]
speaker = "マトイ"
# 「いや、主催が勝っちゃダメでしょ……」
line = "「いや、主催が勝っちゃダメでしょ……」"

[[dialogue]]
speaker = "アナ"
# 「クイズの作成はクイズ研究会にお願いし、進行は放送委員会が担当します。星徒会の参加自体は可能です」
line = "「クイズの作成はクイズ研究会にお願いし、進行は放送委員会が担当します。星徒会の参加自体は可能です」"

[[dialogue]]
speaker = "ヴィーナス"
# 「よし、決まりね！」
line = "「よし、決まりね！」"

[[dialogue]]
speaker = "マトイ"
# 「いいのかな……このままじゃほんとに参戦しちゃいそう……」
line = "「いいのかな……このままじゃほんとに参戦しちゃいそう……」"

[[dialogue]]
speaker = "クロト"
# 「はは……まぁ、その方が盛り上がりそうなら考えるかな」
line = "「はは……まぁ、その方が盛り上がりそうなら考えるかな」"

[[dialogue]]
speaker = "クロト"
# 「具体的な予定は資料の通りだ。確認して、問題がありそうだったら言ってくれ」
line = "「具体的な予定は資料の通りだ。確認して、問題がありそうだったら言ってくれ」"

[[dialogue]]
speaker = "マトイ"
# 「了解。こういう企画してると、普通の生徒会っぽくてなんかいいね」
line = "「了解。こういう企画してると、普通の生徒会っぽくてなんかいいね」"

[[dialogue]]
speaker = "クロト"
# 「そうだな。みんなに楽しんでもらおう」
line = "「そうだな。みんなに楽しんでもらおう」"

[[dialogue]]
speaker = "マトイ"
# 「うんっ」
line = "「うんっ」"

[[dialogue]]
speaker = "unk"
# 先頭に立って戦うだけじゃなくて、こうして生徒のために働くのも会長として充実感がある。
line = "先頭に立って戦うだけじゃなくて、こうして生徒のために働くのも会長として充実感がある。"

[[dialogue]]
speaker = "unk"
# みんながこの新星学園をいい思い出とともに卒業できるよう、頑張っていきたいな。
line = "みんながこの新星学園をいい思い出とともに卒業できるよう、頑張っていきたいな。"

[[dialogue]]
speaker = "クロト"
# 「……さて、今日の仕事はこんなものかな」
line = "「……さて、今日の仕事はこんなものかな」"

[[dialogue]]
speaker = "サーシャ"
# 「珍しく仕事が早く片付いたし、みんなでどこか寄っちゃう～？」
line = "「珍しく仕事が早く片付いたし、みんなでどこか寄っちゃう～？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「さんせー！　メイド隊のみんながオススメしてたお店があるの。行ってみましょっ♪」
line = "「さんせー！　メイド隊のみんながオススメしてたお店があるの。行ってみましょっ♪」"

[[dialogue]]
speaker = "ベアトリス"
# 「ほえ～……」
line = "「ほえ～……」"

[[dialogue]]
speaker = "ベアトリス"
# （ここが新星学園……<b>私たちの通っていた極星学園</b>とは、雰囲気が全然違う）
line = "（ここが新星学園……<b>私たちの通っていた極星学園</b>とは、雰囲気が全然違う）"

[[dialogue]]
speaker = "ベアトリス"
# （偶然が味方したお陰で、すんなり<b>新星学園の留学生の立場</b>を手に入れられたけど、これからどうしよう……）
line = "（偶然が味方したお陰で、すんなり<b>新星学園の留学生の立場</b>を手に入れられたけど、これからどうしよう……）"

[[dialogue]]
speaker = "ベアトリス"
# （ルヴィの話によれば……ここはデネブを滅ぼす諸悪の根源、魔王クロトの根城）
line = "（ルヴィの話によれば……ここはデネブを滅ぼす諸悪の根源、魔王クロトの根城）"

[[dialogue]]
speaker = "ベアトリス"
# （自分からデネブに戻る方法も、連絡を取る手段もないし、大人しく留学生として生活して、情報収集に努めるのが賢い選択……なのかな）
line = "（自分からデネブに戻る方法も、連絡を取る手段もないし、大人しく留学生として生活して、情報収集に努めるのが賢い選択……なのかな）"

[[dialogue]]
speaker = "ベアトリス"
# （うぅぅ……潜入なんてガラじゃないのに、どうしてこんなことにぃ……）
line = "（うぅぅ……潜入なんてガラじゃないのに、どうしてこんなことにぃ……）"

[[dialogue]]
speaker = "クロト"
# 「君、この前流星市国に来た留学生？」
line = "「君、この前流星市国に来た留学生？」"

[[dialogue]]
speaker = "ベアトリス"
# 「ひあああっ！？」
line = "「ひあああっ！？」"

[[dialogue]]
speaker = "クロト"
# 「えっと、ごめん。そこまで驚かすつもりはなくて。……留学生で、もし道に迷ってたらと思って声をかけたんだけど」
line = "「えっと、ごめん。そこまで驚かすつもりはなくて。……留学生で、もし道に迷ってたらと思って声をかけたんだけど」"

[[dialogue]]
speaker = "？？？"
# 「は、はい、私留学生で──ひ、ひ、緋宮クロト！？　……さん？」
line = "「は、はい、私留学生で──ひ、ひ、緋宮クロト！？　……さん？」"

[[dialogue]]
speaker = "クロト"
# 「ああ、うん、俺が緋宮クロトだけど……。俺のこと知ってるんだ？」
line = "「ああ、うん、俺が緋宮クロトだけど……。俺のこと知ってるんだ？」"

[[dialogue]]
speaker = "？？？"
# 「だってその、まお──星徒会長ですしっ」
line = "「だってその、まお──星徒会長ですしっ」"

[[dialogue]]
speaker = "クロト"
# 「魔王は言われ慣れてるから大丈夫だよ」
line = "「魔王は言われ慣れてるから大丈夫だよ」"

[[dialogue]]
speaker = "unk"
# ヴィーナスを始め、アポロに、ネビュラに、いろんな相手から魔王と言われた。
line = "ヴィーナスを始め、アポロに、ネビュラに、いろんな相手から魔王と言われた。"

[[dialogue]]
speaker = "unk"
# 太陽の壁画では悪の存在として伝えられていたけど、今となっては遠い過去の話のようだ。
line = "太陽の壁画では悪の存在として伝えられていたけど、今となっては遠い過去の話のようだ。"

[[dialogue]]
speaker = "ベアトリス"
# 「えっと、あの……私、ベアトリスですっ、ベアトリス・シェイドですっ。魔界からの留学生、ということになっていて……」
line = "「えっと、あの……私、ベアトリスですっ、ベアトリス・シェイドですっ。魔界からの留学生、ということになっていて……」"

[[dialogue]]
speaker = "クロト"
# 「なっていて？」
line = "「なっていて？」"

[[dialogue]]
speaker = "ベアトリス"
# 「ひゃいっ！？　なんでもないですっ！？」
line = "「ひゃいっ！？　なんでもないですっ！？」"

[[dialogue]]
speaker = "ベアトリス"
# 「いえ、その、不審者じゃなくて、ここがあの新星学園なんだなーと、感心してしまって……だから不審者じゃないんですっ」
line = "「いえ、その、不審者じゃなくて、ここがあの新星学園なんだなーと、感心してしまって……だから不審者じゃないんですっ」"

[[dialogue]]
speaker = "unk"
# 不審者じゃないって二度言った。
line = "不審者じゃないって二度言った。"

[[dialogue]]
speaker = "unk"
# 別に怪しんでいないのに、そう言われると逆に怪しいと思ってしまう。
line = "別に怪しんでいないのに、そう言われると逆に怪しいと思ってしまう。"

[[dialogue]]
speaker = "ベアトリス"
# 「そ、それじゃ……ごめんなさいっ」
line = "「そ、それじゃ……ごめんなさいっ」"

[[dialogue]]
speaker = "クロト"
# 「行っちゃった……」
line = "「行っちゃった……」"

[[dialogue]]
speaker = "アナ"
# 「ナンパ失敗しましたね」
line = "「ナンパ失敗しましたね」"

[[dialogue]]
speaker = "クロト"
# 「はは……残念だよ」
line = "「はは……残念だよ」"

[[dialogue]]
speaker = "マトイ"
# 「緊張してたのかな？　でも有名人にいきなり話しかけられたら、挙動不審になっちゃう気持ちはわかるかも……」
line = "「緊張してたのかな？　でも有名人にいきなり話しかけられたら、挙動不審になっちゃう気持ちはわかるかも……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あんまり精鋭って感じじゃなかったけど、あの子も戦ったら強いのかしら？」
line = "「あんまり精鋭って感じじゃなかったけど、あの子も戦ったら強いのかしら？」"

[[dialogue]]
speaker = "サーシャ"
# 「ふふふ。あの子もオリエンテーションで仲良くなれるといいわね～♪」
line = "「ふふふ。あの子もオリエンテーションで仲良くなれるといいわね～♪」"
