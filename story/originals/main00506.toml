[[dialogue]]
speaker = "unk"
# 第８話,星々の連携,B
line = "第８話,星々の連携,B"

[[dialogue]]
speaker = "ユウリ"
# 「──全力強化だ、ルリ！」
line = "「──全力強化だ、ルリ！」"

[[dialogue]]
speaker = "ルリエル"
# 「お任せあれ──！」
line = "「お任せあれ──！」"

[[dialogue]]
speaker = "モンスター"
# 「ィィィ！」
line = "「ィィィ！」"

[[dialogue]]
speaker = "ユウリ"
# 「力を借りるぜ」
line = "「力を借りるぜ」"

[[dialogue]]
speaker = "ユウリ"
# 「イグニッションアサルト！」
line = "「イグニッションアサルト！」"

[[dialogue]]
speaker = "unk"
# ルリエルの加護を浴びたユウリの一閃が、アステラ最奥のモンスターをぶちのめす。
line = "ルリエルの加護を浴びたユウリの一閃が、アステラ最奥のモンスターをぶちのめす。"

[[dialogue]]
speaker = "モンスター"
# 「イイイイイッ……！！」
line = "「イイイイイッ……！！」"

[[dialogue]]
speaker = "unk"
# 主を失った巣は空間ごと消滅していき……
line = "主を失った巣は空間ごと消滅していき……"

[[dialogue]]
speaker = "ユウリ"
# 「ふぅ──っと、これでようやく４つ解放か」
line = "「ふぅ──っと、これでようやく４つ解放か」"

[[dialogue]]
speaker = "ルリエル"
# 「ほっ。疲れましたがようやくこれで……ってまたアステラが増えてます！？　ひええぇ」
line = "「ほっ。疲れましたがようやくこれで……ってまたアステラが増えてます！？　ひええぇ」"

[[dialogue]]
speaker = "unk"
# １５分というスピードでアステライトのひとつを解放したユウリにルリエル。
line = "１５分というスピードでアステライトのひとつを解放したユウリにルリエル。"

[[dialogue]]
speaker = "unk"
# しかし彼女らが降り立った先に見たのは、さらに増殖したアステラの影という影だった。
line = "しかし彼女らが降り立った先に見たのは、さらに増殖したアステラの影という影だった。"

[[dialogue]]
speaker = "ユウリ"
# 「今日はさっきの戦闘だけでけっこう力使ってんだけど……な……！」
line = "「今日はさっきの戦闘だけでけっこう力使ってんだけど……な……！」"

[[dialogue]]
speaker = "ルリエル"
# 「気張るしかありませんね……ふぁいおー！」
line = "「気張るしかありませんね……ふぁいおー！」"

[[dialogue]]
speaker = "unk"
# 次々と生まれ落ちるモンスターに応戦する２人。
line = "次々と生まれ落ちるモンスターに応戦する２人。"

[[dialogue]]
speaker = "unk"
# 星力は無限ではないため、燃費も考えて対処しなくてはならないが……
line = "星力は無限ではないため、燃費も考えて対処しなくてはならないが……"

[[dialogue]]
speaker = "ユウリ"
# 「ああもう、また──！」
line = "「ああもう、また──！」"

[[dialogue]]
speaker = "unk"
# 新たな敵影に反応しかけるユウリ──しかし、そこに現れたのはモンスターではなかった。
line = "新たな敵影に反応しかけるユウリ──しかし、そこに現れたのはモンスターではなかった。"

[[dialogue]]
speaker = "unk"
# 正体は一羽の小さいフェニックス。
line = "正体は一羽の小さいフェニックス。"

[[dialogue]]
speaker = "unk"
# その羽ばたきは闇の竜巻をいくつも起こして、範囲内のモンスターを消滅させた。
line = "その羽ばたきは闇の竜巻をいくつも起こして、範囲内のモンスターを消滅させた。"

[[dialogue]]
speaker = "ルリエル"
# 「今の──って……！」
line = "「今の──って……！」"

[[dialogue]]
speaker = "フィオナ"
# 「──お待たせしました、ユウリ。ルリエル」
line = "「──お待たせしました、ユウリ。ルリエル」"

[[dialogue]]
speaker = "ユウリ"
# 「フィオナ──！」
line = "「フィオナ──！」"

[[dialogue]]
speaker = "ルリエル"
# 「おおおっ会長！　なんと頼もしい援軍でありましょーか！」
line = "「おおおっ会長！　なんと頼もしい援軍でありましょーか！」"

[[dialogue]]
speaker = "ニャリオン"
# 「ニャーッニャッニャッニャッ！　時間稼ぎご苦労であったニャ家来ども！　このフィオナ嬢が来たからにはもう安心ニャン！」
line = "「ニャーッニャッニャッニャッ！　時間稼ぎご苦労であったニャ家来ども！　このフィオナ嬢が来たからにはもう安心ニャン！」"

[[dialogue]]
speaker = "ユウリ"
# 「なんでおまえに偉そうにされるのかはわかんねーけど……助かる！　一気に解放してくぞ！」
line = "「なんでおまえに偉そうにされるのかはわかんねーけど……助かる！　一気に解放してくぞ！」"

[[dialogue]]
speaker = "ルリエル"
# 「あいあいさー！」
line = "「あいあいさー！」"

[[dialogue]]
speaker = "モンスター"
# 「ウィイイイイイ！！」
line = "「ウィイイイイイ！！」"

[[dialogue]]
speaker = "セーラ"
# 「アナちゃん──そっち行ける！？」
line = "「アナちゃん──そっち行ける！？」"

[[dialogue]]
speaker = "アナ"
# 「ノープロブレム──逆サイドの警戒をお願いします、桐原先輩」
line = "「ノープロブレム──逆サイドの警戒をお願いします、桐原先輩」"

[[dialogue]]
speaker = "unk"
# アナの放った業炎の矢が一列に並んだ小アステラをまとめて消し飛ばす。
line = "アナの放った業炎の矢が一列に並んだ小アステラをまとめて消し飛ばす。"

[[dialogue]]
speaker = "unk"
# 無防備なその背後に忍び寄った敵の群れを、雷撃銃が刹那の間に消し炭へと変えた。
line = "無防備なその背後に忍び寄った敵の群れを、雷撃銃が刹那の間に消し炭へと変えた。"

[[dialogue]]
speaker = "セーラ"
# 「だいぶ減らしたけど──」
line = "「だいぶ減らしたけど──」"

[[dialogue]]
speaker = "アナ"
# 「まだまだ、ですね」
line = "「まだまだ、ですね」"

[[dialogue]]
speaker = "unk"
# 星徒会という特級戦力である彼女らは、わずか２名でこの区域の掃討を任されていた。
line = "星徒会という特級戦力である彼女らは、わずか２名でこの区域の掃討を任されていた。"

[[dialogue]]
speaker = "unk"
# 先の戦闘による疲弊も相まって、暗雲立ち込める状況である。
line = "先の戦闘による疲弊も相まって、暗雲立ち込める状況である。"

[[dialogue]]
speaker = "モンスター"
# 「イイイイイィィ……！！」
line = "「イイイイイィィ……！！」"

[[dialogue]]
speaker = "マトイ"
# 「インパルスアイリス」
line = "「インパルスアイリス」"

[[dialogue]]
speaker = "アナ"
# 「！　マトイ先輩」
line = "「！　マトイ先輩」"

[[dialogue]]
speaker = "マトイ"
# 「お待たせしました──！　って言っても、私しかいないんですけど……！」
line = "「お待たせしました──！　って言っても、私しかいないんですけど……！」"

[[dialogue]]
speaker = "unk"
# そこに舞い戻ってきたのはマトイだった。
line = "そこに舞い戻ってきたのはマトイだった。"

[[dialogue]]
speaker = "アナ"
# 「いえ……頼もしいです」
line = "「いえ……頼もしいです」"

[[dialogue]]
speaker = "モンスター"
# 「ウィィィィィイ！！」
line = "「ウィィィィィイ！！」"

[[dialogue]]
speaker = "セーラ"
# 「あたしらもろにアタッカーって感じだからさー。１人でも盾役がいてくれると、超やりやすいんだよ──ねっ！」
line = "「あたしらもろにアタッカーって感じだからさー。１人でも盾役がいてくれると、超やりやすいんだよ──ねっ！」"

[[dialogue]]
speaker = "セーラ"
# 「エレクトロバレット！」
line = "「エレクトロバレット！」"

[[dialogue]]
speaker = "アナ"
# 「レッドデルタ」
line = "「レッドデルタ」"

[[dialogue]]
speaker = "モンスター"
# 「イイイイ──ッ！」
line = "「イイイイ──ッ！」"

[[dialogue]]
speaker = "unk"
# マトイの早駆けを<ruby=デコイ>囮</ruby>として、釣られたモンスターを雷撃と爆炎が舐め尽くす。
line = "マトイの早駆けを<ruby>囮<rt>デコイ</rt></ruby>として、釣られたモンスターを雷撃と爆炎が舐め尽くす。"

[[dialogue]]
speaker = "unk"
# 彼女たちのフォーメーションは、どんどん効率の良い狩り方へと進化していった……。
line = "彼女たちのフォーメーションは、どんどん効率の良い狩り方へと進化していった……。"
