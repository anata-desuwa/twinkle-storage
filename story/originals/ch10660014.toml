[[dialogue]]
speaker = "unk"
# 第４話,浜辺で鍛錬,P
line = "第４話,浜辺で鍛錬,P"

[[dialogue]]
speaker = "unk"
# 唐突に提案されたラティエさんの外出──俺が彼女に連れてこられたのは、人っ子１人いないビーチだった。
line = "唐突に提案されたラティエさんの外出──俺が彼女に連れてこられたのは、人っ子１人いないビーチだった。"

[[dialogue]]
speaker = "unk"
# そこで行われるのは楽しい夏のひと時、などではなくて……
line = "そこで行われるのは楽しい夏のひと時、などではなくて……"

[[dialogue]]
speaker = "ラティエ"
# 「右、左、右っ！　どうした、反応が鈍くなっているぞ！」
line = "「右、左、右っ！　どうした、反応が鈍くなっているぞ！」"

[[dialogue]]
speaker = "unk"
# 速いっ……速すぎる！？
line = "速いっ……速すぎる！？"

[[dialogue]]
speaker = "ラティエ"
# 「目で追うからだ。私の得物──聖雷剣バラクィエルは鞭と変わらん！　切っ先の目視は不可能だ！」
line = "「目で追うからだ。私の得物──聖雷剣バラクィエルは鞭と変わらん！　切っ先の目視は不可能だ！」"

[[dialogue]]
speaker = "ラティエ"
# 「術者の手元を見ろ！　視線を読め！　五感を休まず駆動させろ、さぁ──行くぞ！」
line = "「術者の手元を見ろ！　視線を読め！　五感を休まず駆動させろ、さぁ──行くぞ！」"

[[dialogue]]
speaker = "ラティエ"
# 「ふぅ……いい汗をかいた。少し休憩しようか。きみ、なかなか筋がいいな。流石は新星学園の星徒会長だ」
line = "「ふぅ……いい汗をかいた。少し休憩しようか。きみ、なかなか筋がいいな。流石は新星学園の星徒会長だ」"

[[dialogue]]
speaker = "ラティエ"
# 「あぁ、無理に返事をしなくていい。呼吸を整えたまえ」
line = "「あぁ、無理に返事をしなくていい。呼吸を整えたまえ」"

[[dialogue]]
speaker = "ラティエ"
# 「しかし──どうかな、このビーチは。観光客もおらず、しかし自然は実に豊富だ。学園のトレーニング施設とはまた違った趣があるだろう」
line = "「しかし──どうかな、このビーチは。観光客もおらず、しかし自然は実に豊富だ。学園のトレーニング施設とはまた違った趣があるだろう」"

[[dialogue]]
speaker = "ラティエ"
# 「出会った時こそ魔界にいた私だが、もちろん人間界の各所にも足を運んでいる。ここは穴場の訓練スポットなのさ」
line = "「出会った時こそ魔界にいた私だが、もちろん人間界の各所にも足を運んでいる。ここは穴場の訓練スポットなのさ」"

[[dialogue]]
speaker = "ラティエ"
# 「……む？　どうかしたのか。少し浮かない顔をしているように思うが」
line = "「……む？　どうかしたのか。少し浮かない顔をしているように思うが」"

[[dialogue]]
speaker = "unk"
# 海に行くと聞いたので……
line = "海に行くと聞いたので……"

[[dialogue]]
speaker = "ラティエ"
# 「なんだ、水着でも着て欲しかったのか？　はっはっ、きみも冗談を言うんだな。私の水着など見てもつまらんだろう」
line = "「なんだ、水着でも着て欲しかったのか？　はっはっ、きみも冗談を言うんだな。私の水着など見てもつまらんだろう」"

[[dialogue]]
speaker = "ラティエ"
# 「──な、なに？　そんなことはない……？」
line = "「──な、なに？　そんなことはない……？」"

[[dialogue]]
speaker = "ラティエ"
# 「そ、そうなのか……期待していてくれていたとは知らなかった。まあ、しかし……無理もないのか？」
line = "「そ、そうなのか……期待していてくれていたとは知らなかった。まあ、しかし……無理もないのか？」"

[[dialogue]]
speaker = "ラティエ"
# 「女に海に誘われたら、水着の１つや２つ期待するのも当然か。はは、申し訳ない。私はそういう男女の機微に疎くてな……」
line = "「女に海に誘われたら、水着の１つや２つ期待するのも当然か。はは、申し訳ない。私はそういう男女の機微に疎くてな……」"

[[dialogue]]
speaker = "ラティエ"
# 「あいにく、この歳まで殿方とのご縁には恵まれないままさ」
line = "「あいにく、この歳まで殿方とのご縁には恵まれないままさ」"

[[dialogue]]
speaker = "ラティエ"
# 「なんだ、そんなに驚くことか？　まあ、一般的には珍しいかもしれんが、私はこのとおりの根無し草だからな」
line = "「なんだ、そんなに驚くことか？　まあ、一般的には珍しいかもしれんが、私はこのとおりの根無し草だからな」"

[[dialogue]]
speaker = "ラティエ"
# 「学園長になる前も、なってからも、修行を理由に三界を放浪してばかりの身だ。恋仲になる相手などいるわけもないだろう」
line = "「学園長になる前も、なってからも、修行を理由に三界を放浪してばかりの身だ。恋仲になる相手などいるわけもないだろう」"

[[dialogue]]
speaker = "ラティエ"
# 「暇さえあれば旅に出て、鍛錬とモンスター討伐の繰り返しが私の青春だったんだ」
line = "「暇さえあれば旅に出て、鍛錬とモンスター討伐の繰り返しが私の青春だったんだ」"

[[dialogue]]
speaker = "ラティエ"
# 「はっはっ、驚くなよ。なんと私は、男と手をつないだこともないぞ！」
line = "「はっはっ、驚くなよ。なんと私は、男と手をつないだこともないぞ！」"

[[dialogue]]
speaker = "unk"
# 笑うところじゃないような……
line = "笑うところじゃないような……"

[[dialogue]]
speaker = "ラティエ"
# 「だが、あまり気にもしていないからな。興味がないではないが、私にはリクリエを退けるという大義がある」
line = "「だが、あまり気にもしていないからな。興味がないではないが、私にはリクリエを退けるという大義がある」"

[[dialogue]]
speaker = "ラティエ"
# 「あまり学園長らしいこともできていないんだし、せめて流星最強の星騎士ではあり続けようと思っているんだ」
line = "「あまり学園長らしいこともできていないんだし、せめて流星最強の星騎士ではあり続けようと思っているんだ」"

[[dialogue]]
speaker = "ラティエ"
# 「まぁ……たまに旅をしている時に、横に誰かがいたらと思わないことも、ないではないが」
line = "「まぁ……たまに旅をしている時に、横に誰かがいたらと思わないことも、ないではないが」"

[[dialogue]]
speaker = "ラティエ"
# 「天界で息を呑むような絶景を見た時。魔界の厳かな神殿に参拝する時」
line = "「天界で息を呑むような絶景を見た時。魔界の厳かな神殿に参拝する時」"

[[dialogue]]
speaker = "ラティエ"
# 「放浪は私の趣味であり、生き甲斐であり、楽しみだ。それを分かち合える相手がいればなと思うこともたまにはあるさ」
line = "「放浪は私の趣味であり、生き甲斐であり、楽しみだ。それを分かち合える相手がいればなと思うこともたまにはあるさ」"

[[dialogue]]
speaker = "unk"
# 俺も同じ景色を見てみたいです
line = "俺も同じ景色を見てみたいです"

[[dialogue]]
speaker = "ラティエ"
# 「……質問があるのだが、きみの今の答えは、その……私とそういう仲になりたい、という意味なのかな？」
line = "「……質問があるのだが、きみの今の答えは、その……私とそういう仲になりたい、という意味なのかな？」"

[[dialogue]]
speaker = "ラティエ"
# 「いや、すまん。本当に男と付き合ったことがなくてな、頭が硬いんだ。つまり──」
line = "「いや、すまん。本当に男と付き合ったことがなくてな、頭が硬いんだ。つまり──」"

[[dialogue]]
speaker = "ラティエ"
# 「私は、きみに女性として好かれているのだろうか？」
line = "「私は、きみに女性として好かれているのだろうか？」"

[[dialogue]]
speaker = "unk"
# そのつもりです
line = "そのつもりです"

[[dialogue]]
speaker = "ラティエ"
# 「……はっはっ！　そうか、そうか！　きみは本当に変わった子だな？」
line = "「……はっはっ！　そうか、そうか！　きみは本当に変わった子だな？」"

[[dialogue]]
speaker = "ラティエ"
# 「魔王で、星徒会長で……流星学園の学園長が好きだなどと、とても変わっている。見た目に反して欲の強い子のようだ」
line = "「魔王で、星徒会長で……流星学園の学園長が好きだなどと、とても変わっている。見た目に反して欲の強い子のようだ」"

[[dialogue]]
speaker = "ラティエ"
# 「だが、嫌いではないよ。私は強い相手も好きだが、強くあろうとひたむきな子も好きだ」
line = "「だが、嫌いではないよ。私は強い相手も好きだが、強くあろうとひたむきな子も好きだ」"

[[dialogue]]
speaker = "ラティエ"
# 「うん。私もきみのことを、好ましく思っているよ。そこに嘘はない」
line = "「うん。私もきみのことを、好ましく思っているよ。そこに嘘はない」"

[[dialogue]]
speaker = "ラティエ"
# 「いつかきみを連れて、放浪の旅に出たいな。まだ見ぬ世界の美しさを２人で見る。とても面白そうだ」
line = "「いつかきみを連れて、放浪の旅に出たいな。まだ見ぬ世界の美しさを２人で見る。とても面白そうだ」"

[[dialogue]]
speaker = "ラティエ"
# 「──が。まずは私から１本を取ってもらおうかな？　話しているうちにだいぶ余裕も出てきただろう？」
line = "「──が。まずは私から１本を取ってもらおうかな？　話しているうちにだいぶ余裕も出てきただろう？」"

[[dialogue]]
speaker = "ラティエ"
# 「私の男を名乗るからには、今よりもっとたくましくなってもらわなければね。約束できるかな、きみ？」
line = "「私の男を名乗るからには、今よりもっとたくましくなってもらわなければね。約束できるかな、きみ？」"

[[dialogue]]
speaker = "unk"
# 俺はラティエさんに思いのたけをぶつけるために、再び挑み──ボコボコに負けた。
line = "俺はラティエさんに思いのたけをぶつけるために、再び挑み──ボコボコに負けた。"

[[dialogue]]
speaker = "unk"
# けれど、その日の夕暮れに見た海の景色はとても綺麗で。
line = "けれど、その日の夕暮れに見た海の景色はとても綺麗で。"

[[dialogue]]
speaker = "unk"
# いつの日か、流星最強の彼女を守れるくらいに強い男になろう──そう思うのだった。
line = "いつの日か、流星最強の彼女を守れるくらいに強い男になろう──そう思うのだった。"
