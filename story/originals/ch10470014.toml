[[dialogue]]
speaker = "unk"
# 第４話,ファンシー・メルトダウン・後編,P
line = "第４話,ファンシー・メルトダウン・後編,P"

[[dialogue]]
speaker = "unk"
# メルエルへのお礼ということで始まった、『放課後デート』の中で──
line = "メルエルへのお礼ということで始まった、『放課後デート』の中で──"

[[dialogue]]
speaker = "unk"
# 俺たちは不意に握りあった手を、いつまでも繋ぎ合ったまま……何かを誤魔化すかのように、他愛のない話に花を咲かせて続けていた。
line = "俺たちは不意に握りあった手を、いつまでも繋ぎ合ったまま……何かを誤魔化すかのように、他愛のない話に花を咲かせて続けていた。"

[[dialogue]]
speaker = "メルエル"
# 「さっきのカフェのケーキ、美味しかったね。あんなに美味しいと、何度でも食べたくなっちゃうよ～」
line = "「さっきのカフェのケーキ、美味しかったね。あんなに美味しいと、何度でも食べたくなっちゃうよ～」"

[[dialogue]]
speaker = "メルエル"
# 「──え、また一緒に？　……うんっ、約束だよ♪　会長くんっ」
line = "「──え、また一緒に？　……うんっ、約束だよ♪　会長くんっ」"

[[dialogue]]
speaker = "unk"
# （そうだ、メルエルとの約束が、俺にはまだ……）
line = "（そうだ、メルエルとの約束が、俺にはまだ……）"

[[dialogue]]
speaker = "unk"
# （約束……）
line = "（約束……）"

[[dialogue]]
speaker = "メルエル"
# 「──あのね、もう１つヤクソクしたいことがあって。キミもわたしのこと、スキだっていってくれたでしょ？」
line = "「──あのね、もう１つヤクソクしたいことがあって。キミもわたしのこと、スキだっていってくれたでしょ？」"

[[dialogue]]
speaker = "メルエル"
# 「だから、もしわたしたちがおおきくなって、それでもまだスキだったときは──」
line = "「だから、もしわたしたちがおおきくなって、それでもまだスキだったときは──」"

[[dialogue]]
speaker = "メルエル"
# 「わ、わたしと……ケッコンしてほしいの！」
line = "「わ、わたしと……ケッコンしてほしいの！」"

[[dialogue]]
speaker = "メルエル"
# 「会長くん、急に立ち止まって、どうかしたの？」
line = "「会長くん、急に立ち止まって、どうかしたの？」"

[[dialogue]]
speaker = "unk"
# うん。やらなきゃいけないことを、思い出したんだ
line = "うん。やらなきゃいけないことを、思い出したんだ"

[[dialogue]]
speaker = "メルエル"
# 「──これから大聖堂に行く？　うん、それはもちろんいいけど……」
line = "「──これから大聖堂に行く？　うん、それはもちろんいいけど……」"

[[dialogue]]
speaker = "メルエル"
# 「ここに２人で来るのは１０年ぶりだね～。私は今でもミサには参加するけど、キミと一緒だと急に懐かしい感じがするよ。ふふっ、ちょっと不思議♪」
line = "「ここに２人で来るのは１０年ぶりだね～。私は今でもミサには参加するけど、キミと一緒だと急に懐かしい感じがするよ。ふふっ、ちょっと不思議♪」"

[[dialogue]]
speaker = "unk"
# ここで、新星学園で再会する約束をしたんだよな
line = "ここで、新星学園で再会する約束をしたんだよな"

[[dialogue]]
speaker = "メルエル"
# 「うん。天界に帰る日に、キミとここで話をしたんだよ。キミと初めて出会ったのもこの場所で……私にとっては大切な場所なんだ」
line = "「うん。天界に帰る日に、キミとここで話をしたんだよ。キミと初めて出会ったのもこの場所で……私にとっては大切な場所なんだ」"

[[dialogue]]
speaker = "メルエル"
# 「そうだ、会長くんもまた今度、ミサに参加してみる？　それで、また昔のことを思い出せたら──」
line = "「そうだ、会長くんもまた今度、ミサに参加してみる？　それで、また昔のことを思い出せたら──」"

[[dialogue]]
speaker = "unk"
# 思い出したんだ
line = "思い出したんだ"

[[dialogue]]
speaker = "メルエル"
# 「ふぇ？」
line = "「ふぇ？」"

[[dialogue]]
speaker = "unk"
# メルエルと交わした、もう１つの約束のこと
line = "メルエルと交わした、もう１つの約束のこと"

[[dialogue]]
speaker = "メルエル"
# 「……！　あ、そか。だから、ここに……」
line = "「……！　あ、そか。だから、ここに……」"

[[dialogue]]
speaker = "メルエル"
# 「えっ。でも待って、待ってっ！　まだ私、心の準備が──」
line = "「えっ。でも待って、待ってっ！　まだ私、心の準備が──」"

[[dialogue]]
speaker = "unk"
# メルエル、聞いて欲しい
line = "メルエル、聞いて欲しい"

[[dialogue]]
speaker = "メルエル"
# 「ひ、ひゃい……！　あぅぅ、か、噛んじゃった……」
line = "「ひ、ひゃい……！　あぅぅ、か、噛んじゃった……」"

[[dialogue]]
speaker = "メルエル"
# 「あ、でもひょっとして、約束を勘違いしてたりとか……」
line = "「あ、でもひょっとして、約束を勘違いしてたりとか……」"

[[dialogue]]
speaker = "unk"
# 結婚の約束、だよな……？
line = "結婚の約束、だよな……？"

[[dialogue]]
speaker = "メルエル"
# 「勘違いじゃなかった……！」
line = "「勘違いじゃなかった……！」"

[[dialogue]]
speaker = "メルエル"
# 「い、いやでも、大きくなっても、まだ好きだったらって条件が……」
line = "「い、いやでも、大きくなっても、まだ好きだったらって条件が……」"

[[dialogue]]
speaker = "unk"
# ……俺は、メルエルのことが好きだ
line = "……俺は、メルエルのことが好きだ"

[[dialogue]]
speaker = "メルエル"
# 「っ……！」
line = "「っ……！」"

[[dialogue]]
speaker = "メルエル"
# 「あ、えっと……その……」
line = "「あ、えっと……その……」"

[[dialogue]]
speaker = "unk"
# メルエルの答え、聞いてもいい？
line = "メルエルの答え、聞いてもいい？"

[[dialogue]]
speaker = "メルエル"
# 「は、はい……私も、好きです。……大好き」
line = "「は、はい……私も、好きです。……大好き」"

[[dialogue]]
speaker = "メルエル"
# 「１０年前、初めて会った時からずっと……。再会してからはもっと──キミのことが、大好きでしたっ」
line = "「１０年前、初めて会った時からずっと……。再会してからはもっと──キミのことが、大好きでしたっ」"

[[dialogue]]
speaker = "unk"
# 俺と付き合って欲しい
line = "俺と付き合って欲しい"

[[dialogue]]
speaker = "メルエル"
# 「う、うん……っ。こちらこそ、よろしくお願いします！」
line = "「う、うん……っ。こちらこそ、よろしくお願いします！」"

[[dialogue]]
speaker = "メルエル"
# 「私を、キミの彼女にして下さい……！」
line = "「私を、キミの彼女にして下さい……！」"

[[dialogue]]
speaker = "unk"
# こうして、俺とメルエルは付き合うことになった。
line = "こうして、俺とメルエルは付き合うことになった。"

[[dialogue]]
speaker = "メルエル"
# 「えへへ<emoji=heart04>　ぎゅ～♪　すりすり～♪」
line = "「えへへ<emoji=heart04>　ぎゅ～♪　すりすり～♪」"

[[dialogue]]
speaker = "unk"
# そ、そこまでくっ付かれると、照れるんだけど……
line = "そ、そこまでくっ付かれると、照れるんだけど……"

[[dialogue]]
speaker = "メルエル"
# 「だってだって！　キミと念願の恋人になったんだもん♪　これまで我慢してた分、いっぱいくっ付いて、いっぱいイチャイチャしちゃうんだから<emoji=heart04>」
line = "「だってだって！　キミと念願の恋人になったんだもん♪　これまで我慢してた分、いっぱいくっ付いて、いっぱいイチャイチャしちゃうんだから<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
# 「それともキミは、暑苦しいのは嫌だったりする？　それだったら、恋人の私もちゃんと自重する……」
line = "「それともキミは、暑苦しいのは嫌だったりする？　それだったら、恋人の私もちゃんと自重する……」"

[[dialogue]]
speaker = "unk"
# ……俺もくっ付きたい
line = "……俺もくっ付きたい"

[[dialogue]]
speaker = "unk"
# ごめん。慣れなくて照れ臭かっただけ。
line = "ごめん。慣れなくて照れ臭かっただけ。"

[[dialogue]]
speaker = "メルエル"
# 「えへへ、良かった。好き……♪」
line = "「えへへ、良かった。好き……♪」"

[[dialogue]]
speaker = "メルエル"
# 「あ……会長くん……」
line = "「あ……会長くん……」"

[[dialogue]]
speaker = "unk"
# （メルエルにキスをする）
line = "（メルエルにキスをする）"

[[dialogue]]
speaker = "メルエル"
# 「ん……大好き<emoji=heart04>」
line = "「ん……大好き<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺は溢れるような愛おしい気持ちを胸に、メルエルと初めてのキスを交わすのだった。
line = "俺は溢れるような愛おしい気持ちを胸に、メルエルと初めてのキスを交わすのだった。"
