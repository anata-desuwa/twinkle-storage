[[dialogue]]
speaker = "unk"
# 第２話,ウラとオモテ,P
line = "第２話,ウラとオモテ,P"

[[dialogue]]
speaker = "ヨミ"
# 「ご注文はお決まりですか？」
line = "「ご注文はお決まりですか？」"

[[dialogue]]
speaker = "フロレンシア"
# 「会長さんは……はい、コーヒー、砂糖ミルクなしで。会長さんはブラック飲めるんですね。大人ですね」
line = "「会長さんは……はい、コーヒー、砂糖ミルクなしで。会長さんはブラック飲めるんですね。大人ですね」"

[[dialogue]]
speaker = "フロレンシア"
# 「私はミルクティーでお願いします」
line = "「私はミルクティーでお願いします」"

[[dialogue]]
speaker = "ヨミ"
# 「かしこまりました～。少々お待ちください」
line = "「かしこまりました～。少々お待ちください」"

[[dialogue]]
speaker = "フロレンシア"
# 「お忙しいところお付き合いいただいてありがとうございます。今日はお聞きしたいことがありまして」
line = "「お忙しいところお付き合いいただいてありがとうございます。今日はお聞きしたいことがありまして」"

[[dialogue]]
speaker = "フロレンシア"
# 「それと、この前はご迷惑をおかけしてしまってすみません……」
line = "「それと、この前はご迷惑をおかけしてしまってすみません……」"

[[dialogue]]
speaker = "unk"
# 大暴れだった
line = "大暴れだった"

[[dialogue]]
speaker = "フロレンシア"
# 「うぅ、言わないでくださいよ……あんなにモンスターを相手にするのは初めてで、必死だったんですから」
line = "「うぅ、言わないでくださいよ……あんなにモンスターを相手にするのは初めてで、必死だったんですから」"

[[dialogue]]
speaker = "フロレンシア"
# 「私、保健委員なのに血が苦手で、血を見ると気絶してしまうんです」
line = "「私、保健委員なのに血が苦手で、血を見ると気絶してしまうんです」"

[[dialogue]]
speaker = "フロレンシア"
# 「でも私が気絶してたのに、気が付いたら傷の治療が終わっているんです」
line = "「でも私が気絶してたのに、気が付いたら傷の治療が終わっているんです」"

[[dialogue]]
speaker = "フロレンシア"
# 「こういうことは前から時々あって、決まって治療しようとしていた相手から怖がられるんです」
line = "「こういうことは前から時々あって、決まって治療しようとしていた相手から怖がられるんです」"

[[dialogue]]
speaker = "フロレンシア"
# 「だけど会長さんは怖がってない……ですよね？　……大丈夫？　なら良かったです」
line = "「だけど会長さんは怖がってない……ですよね？　……大丈夫？　なら良かったです」"

[[dialogue]]
speaker = "フロレンシア"
# 「私が気絶している間、何が起こったのか、会長さんに教えてほしいんです。きっと会長さんなら全部知ってるから……」
line = "「私が気絶している間、何が起こったのか、会長さんに教えてほしいんです。きっと会長さんなら全部知ってるから……」"

[[dialogue]]
speaker = "unk"
# （正直には言えない……）
line = "（正直には言えない……）"

[[dialogue]]
speaker = "フロレンシア"
# 「あれ、その手の傷はどうされたんですか？　……さっき星徒会で書類仕事してる時に？　なるほど、紙ってけっこう切れますもんね」
line = "「あれ、その手の傷はどうされたんですか？　……さっき星徒会で書類仕事してる時に？　なるほど、紙ってけっこう切れますもんね」"

[[dialogue]]
speaker = "フロレンシア"
# 「ひぁっ！？　血が──！？」
line = "「ひぁっ！？　血が──！？」"

[[dialogue]]
speaker = "ヨミ"
# 「お待たせしました。ミルクティーのお客様──」
line = "「お待たせしました。ミルクティーのお客様──」"

[[dialogue]]
speaker = "フロレンシア？"
# 「あ、それそっちで」
line = "「あ、それそっちで」"

[[dialogue]]
speaker = "ヨミ"
# 「え、あれ？　じゃあコーヒーは……」
line = "「え、あれ？　じゃあコーヒーは……」"

[[dialogue]]
speaker = "フロレンシア？"
# 「アタシのだ」
line = "「アタシのだ」"

[[dialogue]]
speaker = "ヨミ"
# 「は、はい。ごゆっくりどうぞ～」
line = "「は、はい。ごゆっくりどうぞ～」"

[[dialogue]]
speaker = "フロレンシア？"
# 「ズズッ……やっぱりコーヒーはこの苦みがないとな」
line = "「ズズッ……やっぱりコーヒーはこの苦みがないとな」"

[[dialogue]]
speaker = "unk"
# 君はフロレンシアじゃない？
line = "君はフロレンシアじゃない？"

[[dialogue]]
speaker = "フロレンシア？"
# 「あぁん？　どこからどう見てもアタシはフロレンシアだろ。どこに目ぇ付けてんだ会長サン」
line = "「あぁん？　どこからどう見てもアタシはフロレンシアだろ。どこに目ぇ付けてんだ会長サン」"

[[dialogue]]
speaker = "フロレンシア？"
# 「──って、しらばっくれても意味ねえか。そうさ、アタシはフロレンシアの裏人格だ」
line = "「──って、しらばっくれても意味ねえか。そうさ、アタシはフロレンシアの裏人格だ」"

[[dialogue]]
speaker = "スミカ"
# 「名前は……スミカってことにしとけ。どうでもいいが、呼び名がないと地味に不便だからな」
line = "「名前は……スミカってことにしとけ。どうでもいいが、呼び名がないと地味に不便だからな」"

[[dialogue]]
speaker = "スミカ"
# 「へっ、そんなに身構えなくたっていいじゃねーか。アタシだってれっきとした星騎士なんだからよ」
line = "「へっ、そんなに身構えなくたっていいじゃねーか。アタシだってれっきとした星騎士なんだからよ」"

[[dialogue]]
speaker = "スミカ"
# 「言っとくが、アタシはフロレンシアに危害を加えるつもりはねーし、無理やり乗っ取ってもいねえ」
line = "「言っとくが、アタシはフロレンシアに危害を加えるつもりはねーし、無理やり乗っ取ってもいねえ」"

[[dialogue]]
speaker = "スミカ"
# 「表人格様が意識を失ってる間だけしか出てこれない儚い存在なんだよ、アタシは」
line = "「表人格様が意識を失ってる間だけしか出てこれない儚い存在なんだよ、アタシは」"

[[dialogue]]
speaker = "スミカ"
# 「もちろんフロレンシアが気絶した時に、星術で怪我を治療してるのはこのアタシだ」
line = "「もちろんフロレンシアが気絶した時に、星術で怪我を治療してるのはこのアタシだ」"

[[dialogue]]
speaker = "スミカ"
# 「しっかしいいよなぁ～、保健委員は。精鋭のはずの星騎士どもが痛い痛いって泣き叫ぶところを見られる特等席なんだからよ」
line = "「しっかしいいよなぁ～、保健委員は。精鋭のはずの星騎士どもが痛い痛いって泣き叫ぶところを見られる特等席なんだからよ」"

[[dialogue]]
speaker = "スミカ"
# 「……おいおい、そんなにビビるなって。痛いのは生きてる証だ。つまり命の輝きってやつだ。命を尊び、愛するのは星騎士として当然のことだろぉ？」
line = "「……おいおい、そんなにビビるなって。痛いのは生きてる証だ。つまり命の輝きってやつだ。命を尊び、愛するのは星騎士として当然のことだろぉ？」"

[[dialogue]]
speaker = "スミカ"
# 「ああそうそう、アタシのことは表人格に言うんじゃねーぞ。アタシが出てこれないようにされたらたまんねぇからな」
line = "「ああそうそう、アタシのことは表人格に言うんじゃねーぞ。アタシが出てこれないようにされたらたまんねぇからな」"

[[dialogue]]
speaker = "スミカ"
# 「もしフロレンシアにチクッたら、会長サンの治療するとき３倍痛くしてやる」
line = "「もしフロレンシアにチクッたら、会長サンの治療するとき３倍痛くしてやる」"

[[dialogue]]
speaker = "unk"
# ヒィッ……！？
line = "ヒィッ……！？"

[[dialogue]]
speaker = "スミカ"
# 「イイ顔だなぁ……どこまで痛みに耐えられるか試してみてえな。キヒヒッ、会長サンがモンスターにズタボロにされるのが楽しみだ」
line = "「イイ顔だなぁ……どこまで痛みに耐えられるか試してみてえな。キヒヒッ、会長サンがモンスターにズタボロにされるのが楽しみだ」"

[[dialogue]]
speaker = "スミカ"
# 「あ、手ぇ貸せ。……ほら、さっさとしろ」
line = "「あ、手ぇ貸せ。……ほら、さっさとしろ」"

[[dialogue]]
speaker = "スミカ"
# 「よーし、いい子だ。絆創膏貼ってやる。傷が治りやすくなるやつな」
line = "「よーし、いい子だ。絆創膏貼ってやる。傷が治りやすくなるやつな」"

[[dialogue]]
speaker = "スミカ"
# 「何驚いてやがる。切り傷ひとつ治すのに、メスで切開するようなムダな真似はしねぇよ。切り刻まれてえならやってやるが」
line = "「何驚いてやがる。切り傷ひとつ治すのに、メスで切開するようなムダな真似はしねぇよ。切り刻まれてえならやってやるが」"

[[dialogue]]
speaker = "unk"
# 遠慮しておきます
line = "遠慮しておきます"

[[dialogue]]
speaker = "スミカ"
# 「でもこのまま戻るのも面白そうだな──」
line = "「でもこのまま戻るのも面白そうだな──」"

[[dialogue]]
speaker = "フロレンシア"
# 「あれ……会長さん？」
line = "「あれ……会長さん？」"

[[dialogue]]
speaker = "フロレンシア"
# 「なんで私が会長さんの手を握っているんですか……？　それにどうして会長さんがミルクティーを？　あれ、私コーヒー飲んでる？」
line = "「なんで私が会長さんの手を握っているんですか……？　それにどうして会長さんがミルクティーを？　あれ、私コーヒー飲んでる？」"

[[dialogue]]
speaker = "フロレンシア"
# 「まさか間接キス？　なんでそんな、えと、あの……」
line = "「まさか間接キス？　なんでそんな、えと、あの……」"

[[dialogue]]
speaker = "フロレンシア"
# 「すみませーん、失礼しまーす！」
line = "「すみませーん、失礼しまーす！」"
