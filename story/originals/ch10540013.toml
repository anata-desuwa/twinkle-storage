[[dialogue]]
speaker = "unk"
# 第３話,男の子を知りたい,P
line = "第３話,男の子を知りたい,P"

[[dialogue]]
speaker = "ユーリス"
# 「おはよう、調子はどうだい？」
line = "「おはよう、調子はどうだい？」"

[[dialogue]]
speaker = "ユーリス"
# 「一緒に食べていいかな？」
line = "「一緒に食べていいかな？」"

[[dialogue]]
speaker = "ユーリス"
# 「星徒会の仕事が終わったところかな？　途中まで一緒に帰ろうよ」
line = "「星徒会の仕事が終わったところかな？　途中まで一緒に帰ろうよ」"

[[dialogue]]
speaker = "ユーリス"
# 「そうそう、最近この国の漫画にはまっているんだけど、面白い作品がたくさんあるね」
line = "「そうそう、最近この国の漫画にはまっているんだけど、面白い作品がたくさんあるね」"

[[dialogue]]
speaker = "ユーリス"
# 「漫画はけっこう知っているつもりだったんだけど、この国に来てみると全然だったよ」
line = "「漫画はけっこう知っているつもりだったんだけど、この国に来てみると全然だったよ」"

[[dialogue]]
speaker = "unk"
# 最近、心なしかユーリスからの距離が近い気がする。
line = "最近、心なしかユーリスからの距離が近い気がする。"

[[dialogue]]
speaker = "unk"
# それにユーリスが近くにいるとドキドキするような……
line = "それにユーリスが近くにいるとドキドキするような……"

[[dialogue]]
speaker = "ユーリス"
# 「会長？　聞いてる？」
line = "「会長？　聞いてる？」"

[[dialogue]]
speaker = "ユーリス"
# 「……そんなにじっと見てどうしたんだい？」
line = "「……そんなにじっと見てどうしたんだい？」"

[[dialogue]]
speaker = "unk"
# 最近なんだか近くないか？
line = "最近なんだか近くないか？"

[[dialogue]]
speaker = "ユーリス"
# 「そ、そうかな？　男同士ならこんなものだと思うけど……もし気分を害したなら謝るよ。ごめんね」
line = "「そ、そうかな？　男同士ならこんなものだと思うけど……もし気分を害したなら謝るよ。ごめんね」"

[[dialogue]]
speaker = "ユーリス"
# 「だけど……そうだね、確かに近かったかも。会長を通じて知りたいことがあって」
line = "「だけど……そうだね、確かに近かったかも。会長を通じて知りたいことがあって」"

[[dialogue]]
speaker = "ユーリス"
# 「私は男の子について知りたいんだ」
line = "「私は男の子について知りたいんだ」"

[[dialogue]]
speaker = "unk"
# …………
line = "…………"

[[dialogue]]
speaker = "unk"
# ……………………
line = "……………………"

[[dialogue]]
speaker = "ユーリス"
# 「ま、待ってくれ！　今のは誤解を生みかねない発言だった……言い直すよ」
line = "「ま、待ってくれ！　今のは誤解を生みかねない発言だった……言い直すよ」"

[[dialogue]]
speaker = "ユーリス"
# 「ひけらかすつもりはないけど、私はジルラント王国の王子だ。いわゆる普通の男の子ではない」
line = "「ひけらかすつもりはないけど、私はジルラント王国の王子だ。いわゆる普通の男の子ではない」"

[[dialogue]]
speaker = "ユーリス"
# 「知りたいんだ。普通の男子学生が何をして、何を楽しんでいるのか」
line = "「知りたいんだ。普通の男子学生が何をして、何を楽しんでいるのか」"

[[dialogue]]
speaker = "ユーリス"
# 「だから私に男の子のことを教えてくれないか？　こんなこと頼めるのは会長だけなんだ」
line = "「だから私に男の子のことを教えてくれないか？　こんなこと頼めるのは会長だけなんだ」"

[[dialogue]]
speaker = "unk"
# それなら今からうちに来る？
line = "それなら今からうちに来る？"

[[dialogue]]
speaker = "ユーリス"
# 「か、会長の家に！？」
line = "「か、会長の家に！？」"

[[dialogue]]
speaker = "ユーリス"
# 「コホン。ぜひともお願いするよ。お邪魔するね」
line = "「コホン。ぜひともお願いするよ。お邪魔するね」"

[[dialogue]]
speaker = "unk"
# ジュースどうぞ
line = "ジュースどうぞ"

[[dialogue]]
speaker = "ユーリス"
# 「ありがとう。ちなみにお手洗いは……あっちだね。わかった」
line = "「ありがとう。ちなみにお手洗いは……あっちだね。わかった」"

[[dialogue]]
speaker = "ユーリス"
# 「家まで連れてきたということは、何か見せてもらえるのかな？」
line = "「家まで連れてきたということは、何か見せてもらえるのかな？」"

[[dialogue]]
speaker = "unk"
# ジャーン！　少年漫画誌！
line = "ジャーン！　少年漫画誌！"

[[dialogue]]
speaker = "ユーリス"
# 「おお、これが……！　私はアプリで見ているから、連載誌で読むのは初めてだよ」
line = "「おお、これが……！　私はアプリで見ているから、連載誌で読むのは初めてだよ」"

[[dialogue]]
speaker = "ユーリス"
# 「ふむふむ……なるほど、週刊連載だから１冊は安く、その分紙質はあまり良くないんだね。綺麗なのを読みたければ単行本を買えばいいと」
line = "「ふむふむ……なるほど、週刊連載だから１冊は安く、その分紙質はあまり良くないんだね。綺麗なのを読みたければ単行本を買えばいいと」"

[[dialogue]]
speaker = "ユーリス"
# 「楽しみにしている漫画が毎週読めるのは素晴らしいね。想像するだけでワクワクする──」
line = "「楽しみにしている漫画が毎週読めるのは素晴らしいね。想像するだけでワクワクする──」"

[[dialogue]]
speaker = "ユーリス"
# 「きゃぁっ！？」
line = "「きゃぁっ！？」"

[[dialogue]]
speaker = "ユーリス"
# 「ん、んん……声が裏返ってしまった。驚かせたかな。あはは……」
line = "「ん、んん……声が裏返ってしまった。驚かせたかな。あはは……」"

[[dialogue]]
speaker = "ユーリス"
# 「肌色が多い漫画があったんだけど……こういう漫画は珍しいものなのかな？」
line = "「肌色が多い漫画があったんだけど……こういう漫画は珍しいものなのかな？」"

[[dialogue]]
speaker = "ユーリス"
# 「……少年誌だとよくある？　しかもアニメ化するくらい人気なんだ……」
line = "「……少年誌だとよくある？　しかもアニメ化するくらい人気なんだ……」"

[[dialogue]]
speaker = "ユーリス"
# 「なら私も男子として勉強しないと。ふむふむ……」
line = "「なら私も男子として勉強しないと。ふむふむ……」"

[[dialogue]]
speaker = "ユーリス"
# 「女の子の服はこんなに簡単に脱げるものじゃないんだけど……いや、漫画なんだからそこを気にしても仕方ないか」
line = "「女の子の服はこんなに簡単に脱げるものじゃないんだけど……いや、漫画なんだからそこを気にしても仕方ないか」"

[[dialogue]]
speaker = "ユーリス"
# 「おっぱいを鷲掴みにしてる……ひゃっ、そんなところまで顔を突っ込むんだ……」
line = "「おっぱいを鷲掴みにしてる……ひゃっ、そんなところまで顔を突っ込むんだ……」"

[[dialogue]]
speaker = "ユーリス"
# 「なるほど、男の子はこういうのが好きなのか──ひゃあぁっ！？」
line = "「なるほど、男の子はこういうのが好きなのか──ひゃあぁっ！？」"

[[dialogue]]
speaker = "ユーリス"
# 「あ、いやお風呂のシーンだったから……当たり前だけど、男も裸になるんだね……」
line = "「あ、いやお風呂のシーンだったから……当たり前だけど、男も裸になるんだね……」"

[[dialogue]]
speaker = "ユーリス"
# 「そそ、そうじゃなくて！　王子とはいえ私も男だからね、見るなら女の子の裸の方がいいなと思っただけだよ」
line = "「そそ、そうじゃなくて！　王子とはいえ私も男だからね、見るなら女の子の裸の方がいいなと思っただけだよ」"

[[dialogue]]
speaker = "ユーリス"
# 「今のは他の人には言わないでくれよ。私にも外聞というものがあるからね」
line = "「今のは他の人には言わないでくれよ。私にも外聞というものがあるからね」"

[[dialogue]]
speaker = "unk"
# （ユーリスが少し変だ）
line = "（ユーリスが少し変だ）"

[[dialogue]]
speaker = "ユーリス"
# 「……他の漫画も取ってくる？　わかった、ここで待ってるよ」
line = "「……他の漫画も取ってくる？　わかった、ここで待ってるよ」"

[[dialogue]]
speaker = "ユーリス"
# （お手洗いは……あっちだったね。ジュースを飲んだから尿意が……）
line = "（お手洗いは……あっちだったね。ジュースを飲んだから尿意が……）"

[[dialogue]]
speaker = "unk"
# ちょっとトイレ……
line = "ちょっとトイレ……"

[[dialogue]]
speaker = "ユーリス"
# 「きゃあああああぁっ！？」
line = "「きゃあああああぁっ！？」"

[[dialogue]]
speaker = "unk"
# トイレでユーリスと鉢合わせた俺が見たものは──
line = "トイレでユーリスと鉢合わせた俺が見たものは──"
