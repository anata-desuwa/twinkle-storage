[[dialogue]]
speaker = "unk"
# 第５話,幻夢,B
line = "第５話,幻夢,B"

[[dialogue]]
speaker = "クロト"
# （っああ──今の──記憶、は──）
line = "（っああ──今の──記憶、は──）"

[[dialogue]]
speaker = "unk"
# 白濁と意識が戻ってくる。その前に、ヴィーナスの姿が紡がれた。
line = "白濁と意識が戻ってくる。その前に、ヴィーナスの姿が紡がれた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふーん。そういうことだったのね」
line = "「ふーん。そういうことだったのね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「平行世界……そんなのがあるなんてね。私に昔の記憶がないのも、腑に落ちちゃった」
line = "「平行世界……そんなのがあるなんてね。私に昔の記憶がないのも、腑に落ちちゃった」"

[[dialogue]]
speaker = "ヴィーナス"
# 「<b>だから</b>──私は<ruby=あっち>デネブ</ruby>から来たみたい。本当は、アルタイルの世界に私はいなかったのね」
line = "「<b>だから</b>──私は<ruby>デネブ<rt>あっち</rt></ruby>から来たみたい。本当は、アルタイルの世界に私はいなかったのね」"

[[dialogue]]
speaker = "unk"
# 彼女はすっかり事態を飲み込めているようで、何度もうなずいていた。
line = "彼女はすっかり事態を飲み込めているようで、何度もうなずいていた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロトだって……何度か垣間見てきたんじゃない？　ここじゃない、どこかの自分の記憶」
line = "「クロトだって……何度か垣間見てきたんじゃない？　ここじゃない、どこかの自分の記憶」"

[[dialogue]]
speaker = "クロト"
# （それ──は……）
line = "（それ──は……）"

[[dialogue]]
speaker = "unk"
# ──ある。
line = "──ある。"

[[dialogue]]
speaker = "unk"
# しかしそれは、今までただの幻としてしか処理してこなかった。
line = "しかしそれは、今までただの幻としてしか処理してこなかった。"

[[dialogue]]
speaker = "unk"
# でも、あれは……平行世界の俺が見た確かな記憶の残滓だったのかもしれない。
line = "でも、あれは……平行世界の俺が見た確かな記憶の残滓だったのかもしれない。"

[[dialogue]]
speaker = "ヴィーナス"
# 「もし思い出せたなら……私たちの関係も、もうわかっちゃったかしら。クロト」
line = "「もし思い出せたなら……私たちの関係も、もうわかっちゃったかしら。クロト」"

[[dialogue]]
speaker = "クロト"
# 「……ああ。理解したよ。俺たちは最初から──出会う運命だったんだな」
line = "「……ああ。理解したよ。俺たちは最初から──出会う運命だったんだな」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ハッピーエンドにはまだ早いけどね。向こうの私、まだまだ大ピンチだし」
line = "「ハッピーエンドにはまだ早いけどね。向こうの私、まだまだ大ピンチだし」"

[[dialogue]]
speaker = "クロト"
# 「大丈夫だ。必ず救う──だってヴィーナスは、俺の……」
line = "「大丈夫だ。必ず救う──だってヴィーナスは、俺の……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あはは、続きは向こうでね。じゃそゆことで──頼りにしてるわよ。クロト」
line = "「あはは、続きは向こうでね。じゃそゆことで──頼りにしてるわよ。クロト」"
