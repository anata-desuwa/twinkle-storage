# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# 彼女の横で俺も漫画を読む。この静寂が心地いい。
line = "彼女の横で俺も漫画を読む。この静寂が心地いい。"

[[dialogue]]
speaker = "リィベル"
# 「……ふぅ。んん……ん…………」
line = "「……ふぅ。んん……ん…………」"

[[dialogue]]
speaker = "unk"
# 軽く伸びをして、首をひと回し。
line = "軽く伸びをして、首をひと回し。"

[[dialogue]]
speaker = "リィベル"
# 「どうしたの、私の顔に何かついてる？」
line = "「どうしたの、私の顔に何かついてる？」"

[[dialogue]]
speaker = "unk"
# 漫画版はどう？
line = "漫画版はどう？"

[[dialogue]]
speaker = "リィベル"
# 「そうね……まず、原作で描写不足だった部分が補足されているわね。原作で唐突に出てきたキャラが事前に台詞で示唆されていたり、設定が整理されていたり、読みやすいわ」
line = "「そうね……まず、原作で描写不足だった部分が補足されているわね。原作で唐突に出てきたキャラが事前に台詞で示唆されていたり、設定が整理されていたり、読みやすいわ」"

[[dialogue]]
speaker = "リィベル"
# 「次に、心理描写の掘り下げね。原作で敵対したキャラにも相応の理由が説明されて、作劇に立体感が生まれているわ。後で味方になる時も納得できたし」
line = "「次に、心理描写の掘り下げね。原作で敵対したキャラにも相応の理由が説明されて、作劇に立体感が生まれているわ。後で味方になる時も納得できたし」"

[[dialogue]]
speaker = "リィベル"
# 「原作にない改変要素については、好みの別れるところかしら。あと、キャラがやたら筋肉質なのは人によっては受け付けないかも。私は慣れたけど」
line = "「原作にない改変要素については、好みの別れるところかしら。あと、キャラがやたら筋肉質なのは人によっては受け付けないかも。私は慣れたけど」"

[[dialogue]]
speaker = "リィベル"
# 「ああ、改変といえば食事の描写ね。原作ではほぼなかったけど、作者が食べ歩いて……取材しただけあって、漫画はかなり力が入っているわ。めちゃくちゃ美味しそう」
line = "「ああ、改変といえば食事の描写ね。原作ではほぼなかったけど、作者が食べ歩いて……取材しただけあって、漫画はかなり力が入っているわ。めちゃくちゃ美味しそう」"

[[dialogue]]
speaker = "リィベル"
# 「総じて、非常に丁寧な漫画化ね。人気が出るのも頷けるわ。単純に面白いし」
line = "「総じて、非常に丁寧な漫画化ね。人気が出るのも頷けるわ。単純に面白いし」"

[[dialogue]]
speaker = "リィベル"
# 「……というか、後から気付いたんだけど、これ漫画版から人気が出た作品でしょ。漫画を読んだ後に原作を読んだら、物足りないと思うわ」
line = "「……というか、後から気付いたんだけど、これ漫画版から人気が出た作品でしょ。漫画を読んだ後に原作を読んだら、物足りないと思うわ」"

[[dialogue]]
speaker = "リィベル"
# 「今でも原作は面白いと思ってるし、好きだけど……薦めるなら漫画版ね。原作から入った身としては、なんというか、こう…………」
line = "「今でも原作は面白いと思ってるし、好きだけど……薦めるなら漫画版ね。原作から入った身としては、なんというか、こう…………」"

[[dialogue]]
speaker = "unk"
# 言葉が見つからないのか、ろくろを回すリィベル。気持ちは分かる。
line = "言葉が見つからないのか、ろくろを回すリィベル。気持ちは分かる。"

