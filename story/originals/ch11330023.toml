line = "「魔王。お茶、おかわり」"

[[dialogue]]
speaker = "unk"
# はい、どうぞ
line = "はい、どうぞ"

[[dialogue]]
speaker = "リィベル"
# 「ええ、ありがとう」
line = "「ええ、ありがとう」"

[[dialogue]]
speaker = "unk"
# リィベルは俺に目もくれず、カップを受け取る。よほど集中しているようだ。
line = "リィベルは俺に目もくれず、カップを受け取る。よほど集中しているようだ。"

[[dialogue]]
