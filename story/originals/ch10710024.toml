[[dialogue]]
speaker = "unk"
# 第４話,幸せのドレス,P
line = "第４話,幸せのドレス,P"

[[dialogue]]
speaker = "unk"
# キサナとデートした帰りのことだった。
line = "キサナとデートした帰りのことだった。"

[[dialogue]]
speaker = "キサナ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# ブティックのショーウィンドウに釘付けになるキサナ。
line = "ブティックのショーウィンドウに釘付けになるキサナ。"

[[dialogue]]
speaker = "unk"
# ウィンドウの中には、お姫様が着るような豪奢なドレスが飾られている。
line = "ウィンドウの中には、お姫様が着るような豪奢なドレスが飾られている。"

[[dialogue]]
speaker = "unk"
# ドレスが気になる？
line = "ドレスが気になる？"

[[dialogue]]
speaker = "キサナ"
# 「ち、ちげえよ！　ただ物珍しくて見てただけだ！」
line = "「ち、ちげえよ！　ただ物珍しくて見てただけだ！」"

[[dialogue]]
speaker = "キサナ"
# 「昔、マフィアのボスの娘がこんなん着てたなって思い出して、それだけだ。そりゃガキの頃は憧れたこともあるけどよ……アタシが着るのはなんか違うだろ」
line = "「昔、マフィアのボスの娘がこんなん着てたなって思い出して、それだけだ。そりゃガキの頃は憧れたこともあるけどよ……アタシが着るのはなんか違うだろ」"

[[dialogue]]
speaker = "キサナ"
# 「それに、見ろよこの値段。アタシなら、こんだけ金があったらたけえ肉を食いに行くぜ」
line = "「それに、見ろよこの値段。アタシなら、こんだけ金があったらたけえ肉を食いに行くぜ」"

[[dialogue]]
speaker = "キサナ"
# 「……ああもう、忘れろ。帰んぞ」
line = "「……ああもう、忘れろ。帰んぞ」"

[[dialogue]]
speaker = "キサナ"
# 「……んだよ。何でもねぇっつってんだろ。ジロジロ見るなっての」
line = "「……んだよ。何でもねぇっつってんだろ。ジロジロ見るなっての」"

[[dialogue]]
speaker = "キサナ"
# 「あ、言っとくけど、明日はアタシ、バイトだからな。デートできなくて悪かったな」
line = "「あ、言っとくけど、明日はアタシ、バイトだからな。デートできなくて悪かったな」"

[[dialogue]]
speaker = "キサナ"
# 「アタシのバ先には来んなよ。絶対だからな」
line = "「アタシのバ先には来んなよ。絶対だからな」"

[[dialogue]]
speaker = "unk"
# 働くキサナが見たくて来てしまった。女体化薬（正しくは星力増強剤）で変身しているからバレないはず……
line = "働くキサナが見たくて来てしまった。女体化薬（正しくは星力増強剤）で変身しているからバレないはず……"

[[dialogue]]
speaker = "キサナ"
# 「…………？　気のせいか」
line = "「…………？　気のせいか」"

[[dialogue]]
speaker = "unk"
# キサナは監視員用の背の高いイスに座っていた。耳がぴこぴこ動いていて、周囲に気を配っているのが分かる。
line = "キサナは監視員用の背の高いイスに座っていた。耳がぴこぴこ動いていて、周囲に気を配っているのが分かる。"

[[dialogue]]
speaker = "キサナ"
# 「コラ、飛び込みしてんじゃねえ！　他の客に迷惑だろーが！」
line = "「コラ、飛び込みしてんじゃねえ！　他の客に迷惑だろーが！」"

[[dialogue]]
speaker = "キサナ"
# 「おいそこ！　しつこいナンパすんな！　ケーサツ呼ぶぞケーサツ」
line = "「おいそこ！　しつこいナンパすんな！　ケーサツ呼ぶぞケーサツ」"

[[dialogue]]
speaker = "キサナ"
# 「……っ！」
line = "「……っ！」"

[[dialogue]]
speaker = "キサナ"
# 「おい、オマエ。来んなっつっといただろ、なんでいんだよ」
line = "「おい、オマエ。来んなっつっといただろ、なんでいんだよ」"

[[dialogue]]
speaker = "キサナ"
# 「バレねぇと思ったか？　獣人系魔族の嗅覚を舐めんじゃねえ。女に化けても匂いで分かるっつーの」
line = "「バレねぇと思ったか？　獣人系魔族の嗅覚を舐めんじゃねえ。女に化けても匂いで分かるっつーの」"

[[dialogue]]
speaker = "キサナ"
# 「オマエの匂い、どれだけ嗅いできたと思ってんだ。……って、はずいこと言わせんじゃねえ！」
line = "「オマエの匂い、どれだけ嗅いできたと思ってんだ。……って、はずいこと言わせんじゃねえ！」"

[[dialogue]]
speaker = "キサナ"
# 「はぁ……もうすぐ休憩だから待ってろ」
line = "「はぁ……もうすぐ休憩だから待ってろ」"

[[dialogue]]
speaker = "unk"
# 待つこと数分、キサナが戻ってきた。
line = "待つこと数分、キサナが戻ってきた。"

[[dialogue]]
speaker = "キサナ"
# 「ったく、アタシの働いてるとこがそんなに見たかったのかよ。しかも女に化けてまでとか、変態にも程があんだろ。風紀委員だか公安だかに通報してやろうか？」
line = "「ったく、アタシの働いてるとこがそんなに見たかったのかよ。しかも女に化けてまでとか、変態にも程があんだろ。風紀委員だか公安だかに通報してやろうか？」"

[[dialogue]]
speaker = "キサナ"
# 「ハッ、そんなビビんなって。まぁアタシもオマエの匂い嗅いで嬉しくなっちまったからな。許してやるよ」
line = "「ハッ、そんなビビんなって。まぁアタシもオマエの匂い嗅いで嬉しくなっちまったからな。許してやるよ」"

[[dialogue]]
speaker = "unk"
# 仕事はどう？
line = "仕事はどう？"

[[dialogue]]
speaker = "キサナ"
# 「マジ疲れた。いくらムカつく奴でも殴っちゃいけねえのが疲れた。これならモンスター相手の方が気楽だぜ」
line = "「マジ疲れた。いくらムカつく奴でも殴っちゃいけねえのが疲れた。これならモンスター相手の方が気楽だぜ」"

[[dialogue]]
speaker = "unk"
# バイトで疲れたのか、キサナが俺の肩に寄りかかってくる。
line = "バイトで疲れたのか、キサナが俺の肩に寄りかかってくる。"

[[dialogue]]
speaker = "キサナ"
# 「オマエ、いろいろバイトしてきたんだってな。よくやるぜ」
line = "「オマエ、いろいろバイトしてきたんだってな。よくやるぜ」"

[[dialogue]]
speaker = "キサナ"
# 「……なぁ、少し聞いてくれ」
line = "「……なぁ、少し聞いてくれ」"

[[dialogue]]
speaker = "キサナ"
# 「アタシがガキの頃、いろんなことを教えてくれた女がいてよ、アタシはアネゴって呼んでた」
line = "「アタシがガキの頃、いろんなことを教えてくれた女がいてよ、アタシはアネゴって呼んでた」"

[[dialogue]]
speaker = "キサナ"
# 「アタシみたいな親のいないガキに、アネゴは生き方を教えてくれた。誰も信用するなとか、甘い話には裏があるとか、そういうやつ」
line = "「アタシみたいな親のいないガキに、アネゴは生き方を教えてくれた。誰も信用するなとか、甘い話には裏があるとか、そういうやつ」"

[[dialogue]]
speaker = "キサナ"
# 「あとは、腐った食いもんの見分け方とか、飲める水の見付け方とか……なんでも教わった」
line = "「あとは、腐った食いもんの見分け方とか、飲める水の見付け方とか……なんでも教わった」"

[[dialogue]]
speaker = "キサナ"
# 「まぁそのアネゴがマフィアに入ったから、アタシもいつの間にかマフィアになっちまった。セントリアではそれが普通だった」
line = "「まぁそのアネゴがマフィアに入ったから、アタシもいつの間にかマフィアになっちまった。セントリアではそれが普通だった」"

[[dialogue]]
speaker = "キサナ"
# 「んで、そのアネゴも死んじまって、アタシはとにかく生きていくのに必死だった」
line = "「んで、そのアネゴも死んじまって、アタシはとにかく生きていくのに必死だった」"

[[dialogue]]
speaker = "キサナ"
# 「マフィアはメシこそ食わせてくれるが、下っ端は使い捨てだからな。同じくらいに入ったやつは少しずつ死んで、残ったのはアタシだけだ」
line = "「マフィアはメシこそ食わせてくれるが、下っ端は使い捨てだからな。同じくらいに入ったやつは少しずつ死んで、残ったのはアタシだけだ」"

[[dialogue]]
speaker = "キサナ"
# 「……ああ？　今じゃ顔も覚えてねえし、別にダチでもねえよ。オマエが気にすることじゃねえ。そんな顔すんな」
line = "「……ああ？　今じゃ顔も覚えてねえし、別にダチでもねえよ。オマエが気にすることじゃねえ。そんな顔すんな」"

[[dialogue]]
speaker = "キサナ"
# 「アタシは生きるために、メシ食うために汚ねえこともしてきた。それが正しいことだって自分に言い聞かせて……コラプサー以前に、アタシは悪人なんだ」
line = "「アタシは生きるために、メシ食うために汚ねえこともしてきた。それが正しいことだって自分に言い聞かせて……コラプサー以前に、アタシは悪人なんだ」"

[[dialogue]]
speaker = "キサナ"
# 「あの頃に比べりゃ、今はぬくぬく暮らしてる。居心地もいい……だから、なんか不安なんだよ」
line = "「あの頃に比べりゃ、今はぬくぬく暮らしてる。居心地もいい……だから、なんか不安なんだよ」"

[[dialogue]]
speaker = "キサナ"
# 「『このままじゃ本当に幸せになっちまう』ってな。こんなアタシが幸せになっていいのかって」
line = "「『このままじゃ本当に幸せになっちまう』ってな。こんなアタシが幸せになっていいのかって」"

[[dialogue]]
speaker = "キサナ"
# 「……悪いな。オマエはアタシを選んでくれたのに、そのアタシがこんなんでよ」
line = "「……悪いな。オマエはアタシを選んでくれたのに、そのアタシがこんなんでよ」"

[[dialogue]]
speaker = "キサナ"
# 「おっと、休憩終わっちまう。じゃあな、魔王」
line = "「おっと、休憩終わっちまう。じゃあな、魔王」"

[[dialogue]]
speaker = "unk"
# 少し行くところができたようだ。
line = "少し行くところができたようだ。"

[[dialogue]]
speaker = "キサナ"
# 「お、帰り待っててくれたのか。ちゃんと男に戻ってんな」
line = "「お、帰り待っててくれたのか。ちゃんと男に戻ってんな」"

[[dialogue]]
speaker = "キサナ"
# 「じゃあ、なんか食って帰るか。いや、姐さんがもうメシ作ってるかもしれねえし、一度連絡した方が……おい、なんだよ、その紙袋」
line = "「じゃあ、なんか食って帰るか。いや、姐さんがもうメシ作ってるかもしれねえし、一度連絡した方が……おい、なんだよ、その紙袋」"

[[dialogue]]
speaker = "unk"
# キサナが働いている間に、バイト時代の貯蓄をはたいて買ってきたものだ。
line = "キサナが働いている間に、バイト時代の貯蓄をはたいて買ってきたものだ。"

[[dialogue]]
speaker = "キサナ"
# 「紙袋のロゴ、この前の服屋の……もしかして中身は……っ」
line = "「紙袋のロゴ、この前の服屋の……もしかして中身は……っ」"

[[dialogue]]
speaker = "unk"
# 開けてみて
line = "開けてみて"

[[dialogue]]
speaker = "キサナ"
# 「っ！　やっぱりあのドレスじゃねえか！　どうしてこんなもん買ってきやがった！　アタシは着ねえっつったろ！」
line = "「っ！　やっぱりあのドレスじゃねえか！　どうしてこんなもん買ってきやがった！　アタシは着ねえっつったろ！」"

[[dialogue]]
speaker = "unk"
# キサナが幸せになっていいかなんて分からない。だって、誰が決めることでもないんだから。
line = "キサナが幸せになっていいかなんて分からない。だって、誰が決めることでもないんだから。"

[[dialogue]]
speaker = "unk"
# それでも俺はキサナを幸せにしたい。キサナに幸せでいてほしい。その気持ちを込めて、このドレスを贈る。
line = "それでも俺はキサナを幸せにしたい。キサナに幸せでいてほしい。その気持ちを込めて、このドレスを贈る。"

[[dialogue]]
speaker = "unk"
# ふたりで幸せになろう、キサナ
line = "ふたりで幸せになろう、キサナ"

[[dialogue]]
speaker = "キサナ"
# 「……っ！」
line = "「……っ！」"

[[dialogue]]
speaker = "キサナ"
# 「あーもう、バカには何言っても無駄か。はいはい、負けだよ、アタシの負けだ」
line = "「あーもう、バカには何言っても無駄か。はいはい、負けだよ、アタシの負けだ」"

[[dialogue]]
speaker = "キサナ"
# 「ツラ貸せや……」
line = "「ツラ貸せや……」"

[[dialogue]]
speaker = "キサナ"
# 「ちゅっ」
line = "「ちゅっ」"

[[dialogue]]
speaker = "キサナ"
# 「今のがアタシの答えだ。そこまで言うなら幸せにしてくれよ、魔王さま」
line = "「今のがアタシの答えだ。そこまで言うなら幸せにしてくれよ、魔王さま」"
