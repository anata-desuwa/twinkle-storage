[[dialogue]]
speaker = "ヨミ"
# 「今回の目的は空間転移装置のテストの他に、里の視察もありますからね。しっかり務めましょう！」
line = "「今回の目的は空間転移装置のテストの他に、里の視察もありますからね。しっかり務めましょう！」"

[[dialogue]]
speaker = "せつな"
# 「そうでござるな。紫桜の里の復興ぶりをしかと見届けるでござる」
line = "「そうでござるな。紫桜の里の復興ぶりをしかと見届けるでござる」"

[[dialogue]]
speaker = "ウズメイア"
# 「復興って、ここで何かあったの？」
line = "「復興って、ここで何かあったの？」"

[[dialogue]]
speaker = "せつな"
# 「この辺りでアステラが出現することは滅多にないのでござるが、過去に一度、特大級のものが発生したことがあったでござる」
line = "「この辺りでアステラが出現することは滅多にないのでござるが、過去に一度、特大級のものが発生したことがあったでござる」"

[[dialogue]]
speaker = "せつな"
# 「折り悪く里にはモンスターと戦える者がおらず、師匠も任務のために出かけてしまっていたのでござる」
line = "「折り悪く里にはモンスターと戦える者がおらず、師匠も任務のために出かけてしまっていたのでござる」"

[[dialogue]]
speaker = "せつな"
# 「残っていたのは幼い者や未熟な者ばかり……」
line = "「残っていたのは幼い者や未熟な者ばかり……」"

[[dialogue]]
speaker = "せつな"
# 「それでも何とかモンスターの攻撃を耐え凌ぎ、やり過ごしたのでござるが、村は壊滅状態になってしまったのでござる」
line = "「それでも何とかモンスターの攻撃を耐え凌ぎ、やり過ごしたのでござるが、村は壊滅状態になってしまったのでござる」"

[[dialogue]]
speaker = "ウズメイア"
# 「大変だったんだぁ……」
line = "「大変だったんだぁ……」"

[[dialogue]]
speaker = "せつな"
# 「ですが当主様より支援を頂いて、村はなんとかここまで復興を果たしたのでござる。当主様にはどれほど感謝しても足りないでござる……」
line = "「ですが当主様より支援を頂いて、村はなんとかここまで復興を果たしたのでござる。当主様にはどれほど感謝しても足りないでござる……」"

[[dialogue]]
speaker = "ヨミ"
# 「あれから里にアステラが出現する気配はないのでしょうか？」
line = "「あれから里にアステラが出現する気配はないのでしょうか？」"

[[dialogue]]
speaker = "せつな"
# 「そういった気配はなく、平穏無事な日々が続いているとのことでござるな」
line = "「そういった気配はなく、平穏無事な日々が続いているとのことでござるな」"

[[dialogue]]
speaker = "ヨミ"
# 「油断は禁物ですよ？　きちんと視察を行って、異変が無いことを確認しないと……」
line = "「油断は禁物ですよ？　きちんと視察を行って、異変が無いことを確認しないと……」"

[[dialogue]]
speaker = "ウズメイア"
# 「ヨミヨミ真面目だ～。任務も大事だけどせっかくの忍の里だし、楽しまなきゃダメっしょ♪」
line = "「ヨミヨミ真面目だ～。任務も大事だけどせっかくの忍の里だし、楽しまなきゃダメっしょ♪」"

[[dialogue]]
