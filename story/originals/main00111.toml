[[dialogue]]
speaker = "unk"
# 第１４話,最後の鍛錬,B
line = "第１４話,最後の鍛錬,B"

[[dialogue]]
speaker = "ダークキングフワッチ"
# 「イイイイィィィ～～ッ……！！」
line = "「イイイイィィィ～～ッ……！！」"

[[dialogue]]
speaker = "クロト"
# 「はぁ、はぁっ……どうだ──！？」
line = "「はぁ、はぁっ……どうだ──！？」"

[[dialogue]]
speaker = "アナ"
# 「９秒９８──クリアです」
line = "「９秒９８──クリアです」"

[[dialogue]]
speaker = "マトイ"
# 「やった……！」
line = "「やった……！」"

[[dialogue]]
speaker = "サーシャ"
# 「ギリギリセーフね～。おめでとう、クロトくん」
line = "「ギリギリセーフね～。おめでとう、クロトくん」"

[[dialogue]]
speaker = "クロト"
# 「はは──あくまでみんなのサポートありきではありますけど……」
line = "「はは──あくまでみんなのサポートありきではありますけど……」"

[[dialogue]]
speaker = "マトイ"
# 「でもでも、１０秒じゃほとんど私たちも手出しできなかったし！　ほとんどソロみたいなものだよ！」
line = "「でもでも、１０秒じゃほとんど私たちも手出しできなかったし！　ほとんどソロみたいなものだよ！」"

[[dialogue]]
speaker = "クロト"
# 「よし……見えてきたな！　この調子なら、今度こそ俺一人で──」
line = "「よし……見えてきたな！　この調子なら、今度こそ俺一人で──」"

[[dialogue]]
speaker = "クロト"
# 「……って、あれ？」
line = "「……って、あれ？」"

[[dialogue]]
speaker = "アナ"
# 「さすがに星力を消耗しすぎです。明日は本番ですから、温存したほうがよいかと」
line = "「さすがに星力を消耗しすぎです。明日は本番ですから、温存したほうがよいかと」"

[[dialogue]]
speaker = "サーシャ"
# 「ふふふ、そうね～。リハーサルで倒れちゃったら、せっかくの鍛錬ももったいないもの～」
line = "「ふふふ、そうね～。リハーサルで倒れちゃったら、せっかくの鍛錬ももったいないもの～」"

[[dialogue]]
speaker = "クロト"
# 「なるほど……確かに」
line = "「なるほど……確かに」"

[[dialogue]]
speaker = "マトイ"
# 「ま、今夜くらいはゆっくり休んだら？」
line = "「ま、今夜くらいはゆっくり休んだら？」"

[[dialogue]]
speaker = "アナ"
# 「それがいいです。あのママさんの手料理でも食べて」
line = "「それがいいです。あのママさんの手料理でも食べて」"

[[dialogue]]
speaker = "クロト"
# 「はは……了解だ。今日まで付き合ってくれてありがとう、みんな」
line = "「はは……了解だ。今日まで付き合ってくれてありがとう、みんな」"

[[dialogue]]
speaker = "マトイ"
# 「どういたしまして」
line = "「どういたしまして」"

[[dialogue]]
speaker = "サーシャ"
# 「明日は応援してるわよ、クロトくん～♪」
line = "「明日は応援してるわよ、クロトくん～♪」"

[[dialogue]]
speaker = "unk"
# そうして、俺はみんなに見送られ……
line = "そうして、俺はみんなに見送られ……"

[[dialogue]]
speaker = "unk"
# 最後の鍛錬を終えるのだった。
line = "最後の鍛錬を終えるのだった。"

[[dialogue]]
speaker = "アナ"
# 「……とは言ったものの」
line = "「……とは言ったものの」"

[[dialogue]]
speaker = "マトイ"
# 「ヴィーナスと一対一、かあ……」
line = "「ヴィーナスと一対一、かあ……」"

[[dialogue]]
speaker = "サーシャ"
# 「クロトくん、メキメキ強くなっててびっくりしちゃったわ」
line = "「クロトくん、メキメキ強くなっててびっくりしちゃったわ」"

[[dialogue]]
speaker = "アナ"
# 「確かにこの成長速度なら、いつかはありえるかもと思わせるだけのポテンシャルでした。しかし」
line = "「確かにこの成長速度なら、いつかはありえるかもと思わせるだけのポテンシャルでした。しかし」"

[[dialogue]]
speaker = "マトイ"
# 「時間が足りてないよね……一朝一夕で敵う相手じゃないもの」
line = "「時間が足りてないよね……一朝一夕で敵う相手じゃないもの」"

[[dialogue]]
speaker = "サーシャ"
# 「いくらヴィーナスちゃんでも、ちょい急かしすぎかもね～」
line = "「いくらヴィーナスちゃんでも、ちょい急かしすぎかもね～」"

[[dialogue]]
speaker = "マトイ"
# 「私、いざとなったらヴィーナスに土下座する準備しとく！　だって流石に無茶だもん！」
line = "「私、いざとなったらヴィーナスに土下座する準備しとく！　だって流石に無茶だもん！」"

[[dialogue]]
speaker = "サーシャ"
# 「あら健気な乙女。クロトくん想いなのね、マトイちゃん」
line = "「あら健気な乙女。クロトくん想いなのね、マトイちゃん」"

[[dialogue]]
speaker = "マトイ"
# 「べっ……別にそういうのじゃありませんから！　同じクラスメイトとして心配してるだけです！」
line = "「べっ……別にそういうのじゃありませんから！　同じクラスメイトとして心配してるだけです！」"

[[dialogue]]
speaker = "アナ"
# 「テンプレ・ツンデレ」
line = "「テンプレ・ツンデレ」"

[[dialogue]]
speaker = "マトイ"
# 「（ああもう、明日どうなっちゃうんだろう……）」
line = "「（ああもう、明日どうなっちゃうんだろう……）」"
