[[dialogue]]
speaker = "unk"
# 第４話,２人だけのシークレット,P
line = "第４話,２人だけのシークレット,P"

[[dialogue]]
speaker = "フラン"
# 「行け行け新星！　押せ押せ新星！　よーし、そこだ！　行っけぇえぇええぇぇぇっ！」
line = "「行け行け新星！　押せ押せ新星！　よーし、そこだ！　行っけぇえぇええぇぇぇっ！」"

[[dialogue]]
speaker = "フラン"
# 「うぉおぉおおぉぉぉぉぉっ！　入ったぁああぁぁぁゴォオォォォォォォルッッ！！」
line = "「うぉおぉおおぉぉぉぉぉっ！　入ったぁああぁぁぁゴォオォォォォォォルッッ！！」"

[[dialogue]]
speaker = "unk"
# 今日は女子サッカー部の地方予選トーナメント準決勝。ここで勝てば新星学園は決勝に駒を進め、全国への切符が確実なものになる。
line = "今日は女子サッカー部の地方予選トーナメント準決勝。ここで勝てば新星学園は決勝に駒を進め、全国への切符が確実なものになる。"

[[dialogue]]
speaker = "unk"
# 今のゴールで２対２となり、同点に並んだところだ。
line = "今のゴールで２対２となり、同点に並んだところだ。"

[[dialogue]]
speaker = "アナ"
# 「ハーフタイムを終えての後半３０分。現在のチーム力は、ほぼ五分五分ですね」
line = "「ハーフタイムを終えての後半３０分。現在のチーム力は、ほぼ五分五分ですね」"

[[dialogue]]
speaker = "アナ"
# 「しかし、走り回っている新星サッカー部はかなり疲れが見えています。相手チームはまだ控えのメンバーも残していますし、余力があるように見えますね」
line = "「しかし、走り回っている新星サッカー部はかなり疲れが見えています。相手チームはまだ控えのメンバーも残していますし、余力があるように見えますね」"

[[dialogue]]
speaker = "unk"
# 解説のアナさん、ありがとうございます
line = "解説のアナさん、ありがとうございます"

[[dialogue]]
speaker = "アナ"
# 「ノープロブレムです。ですが、会長もちゃんと試合を見てください」
line = "「ノープロブレムです。ですが、会長もちゃんと試合を見てください」"

[[dialogue]]
speaker = "アナ"
# 「応援しているフラン先輩ばかり見ているの、わかっていますから」
line = "「応援しているフラン先輩ばかり見ているの、わかっていますから」"

[[dialogue]]
speaker = "unk"
# 気づかれてたか。
line = "気づかれてたか。"

[[dialogue]]
speaker = "unk"
# 全国の切符のかかった白熱している試合よりも、額に汗しながら、フィールドの選手に呼びかけるように応援しているフランに目を奪われていた。
line = "全国の切符のかかった白熱している試合よりも、額に汗しながら、フィールドの選手に呼びかけるように応援しているフランに目を奪われていた。"

[[dialogue]]
speaker = "フラン"
# 「いいぞーいいぞー！　いいぞーいいぞー！　あーっ！　惜しーいっ！」
line = "「いいぞーいいぞー！　いいぞーいいぞー！　あーっ！　惜しーいっ！」"

[[dialogue]]
speaker = "unk"
# ノーマークからの渾身のシュートはゴールポストに弾かれてしまい、新星側の応援席から失念のため息が出る。
line = "ノーマークからの渾身のシュートはゴールポストに弾かれてしまい、新星側の応援席から失念のため息が出る。"

[[dialogue]]
speaker = "フラン"
# 「おいおい、ガッカリしてる暇なんてねーぞ！　今ウチに流れが来てんだ！」
line = "「おいおい、ガッカリしてる暇なんてねーぞ！　今ウチに流れが来てんだ！」"

[[dialogue]]
speaker = "フラン"
# 「みんな、声援を届けるんだ！　オレたちの応援は、フィールドに届いて、力になる！　なっ！」
line = "「みんな、声援を届けるんだ！　オレたちの応援は、フィールドに届いて、力になる！　なっ！」"

[[dialogue]]
speaker = "フラン"
# 「行っけー行け行け新星！　押っせー押せ押せ新星！」
line = "「行っけー行け行け新星！　押っせー押せ押せ新星！」"

[[dialogue]]
speaker = "アナ"
# 「……残りはロスタイムで２分ほど。ですがこれはよくないですね」
line = "「……残りはロスタイムで２分ほど。ですがこれはよくないですね」"

[[dialogue]]
speaker = "アナ"
# 「相手チームのワンツーが綺麗に決まり、ディフェンダー不在。突っ込んだキーパーもかわされて……あ、入りました」
line = "「相手チームのワンツーが綺麗に決まり、ディフェンダー不在。突っ込んだキーパーもかわされて……あ、入りました」"

[[dialogue]]
speaker = "アナ"
# 「決勝ゴールですね。ここからの逆転は絶望的です」
line = "「決勝ゴールですね。ここからの逆転は絶望的です」"

[[dialogue]]
speaker = "フラン"
# 「諦めるには、まだ早え！　試合は終わってねえぞ！　行っけー行け行け新星！　押っせー押せ押せ新星！」
line = "「諦めるには、まだ早え！　試合は終わってねえぞ！　行っけー行け行け新星！　押っせー押せ押せ新星！」"

[[dialogue]]
speaker = "unk"
# しかし、フランの不屈の想いは届くことはなく、無情にも試合終了のホイッスルが鳴り響き。
line = "しかし、フランの不屈の想いは届くことはなく、無情にも試合終了のホイッスルが鳴り響き。"

[[dialogue]]
speaker = "unk"
# 我らが新星学園チームは、決勝目前での敗北を喫した。
line = "我らが新星学園チームは、決勝目前での敗北を喫した。"

[[dialogue]]
speaker = "フラン"
# 「くそっ、惜しかったなあ……！　応援がもっと届いてれば……！」
line = "「くそっ、惜しかったなあ……！　応援がもっと届いてれば……！」"

[[dialogue]]
speaker = "フラン"
# 「よく頑張ったー！　いい試合だったぜー！」
line = "「よく頑張ったー！　いい試合だったぜー！」"

[[dialogue]]
speaker = "unk"
# 涙をぬぐって退場する選手たちにねぎらいの言葉をかけるフラン。
line = "涙をぬぐって退場する選手たちにねぎらいの言葉をかけるフラン。"

[[dialogue]]
speaker = "フラン"
# 「みんなの応援も、心がひとつになってて最高だったぜ！」
line = "「みんなの応援も、心がひとつになってて最高だったぜ！」"

[[dialogue]]
speaker = "フラン"
# 「はー、さすがに喉枯れちまった……水分補給とトイレに行ってくるわ。ちょっとの間、頼んだぜ」
line = "「はー、さすがに喉枯れちまった……水分補給とトイレに行ってくるわ。ちょっとの間、頼んだぜ」"

[[dialogue]]
speaker = "アナ"
# 「……おや。会長もお手洗いですか。大丈夫です、遅くなってもノープロブレムです」
line = "「……おや。会長もお手洗いですか。大丈夫です、遅くなってもノープロブレムです」"

[[dialogue]]
speaker = "フラン"
# 「っくぅ……！」
line = "「っくぅ……！」"

[[dialogue]]
speaker = "unk"
# 涙を払って、元気よく
line = "涙を払って、元気よく"

[[dialogue]]
speaker = "unk"
# フラン
line = "フラン"

[[dialogue]]
speaker = "フラン"
# 「……ッ！　な、なんだ、会長も応援に来てたのかよ」
line = "「……ッ！　な、なんだ、会長も応援に来てたのかよ」"

[[dialogue]]
speaker = "フラン"
# 「いやぁ、今のすげえいい試合だったよな！　次やったら絶対に勝てるぜ！」
line = "「いやぁ、今のすげえいい試合だったよな！　次やったら絶対に勝てるぜ！」"

[[dialogue]]
speaker = "フラン"
# 「試合よりもオレを見てたぁ？　ったく、オレなんか見てないで応援しろよ。最高の試合だったんだぜ」
line = "「試合よりもオレを見てたぁ？　ったく、オレなんか見てないで応援しろよ。最高の試合だったんだぜ」"

[[dialogue]]
speaker = "フラン"
# 「知ってるか？　ウチのチームさ、毎日毎日、雨の日も雪の日も陽が落ちるまで練習して、頑張ってたんだぜ」
line = "「知ってるか？　ウチのチームさ、毎日毎日、雨の日も雪の日も陽が落ちるまで練習して、頑張ってたんだぜ」"

[[dialogue]]
speaker = "フラン"
# 「もちろん相手のチームだって、ウチに勝ったくらいだ。血の滲むようなすげえ練習してたんだろうけどさ」
line = "「もちろん相手のチームだって、ウチに勝ったくらいだ。血の滲むようなすげえ練習してたんだろうけどさ」"

[[dialogue]]
speaker = "フラン"
# 「力は五分五分だったんだ。オレの声援がもっと背中を押せてれば……てのは思い上がりか」
line = "「力は五分五分だったんだ。オレの声援がもっと背中を押せてれば……てのは思い上がりか」"

[[dialogue]]
speaker = "unk"
# どうしてフランは応援団にいるんだ？
line = "どうしてフランは応援団にいるんだ？"

[[dialogue]]
speaker = "フラン"
# 「あー、よく言われるんだよな。『応援するより自分でやった方がオレらしくないか？』ってさ」
line = "「あー、よく言われるんだよな。『応援するより自分でやった方がオレらしくないか？』ってさ」"

[[dialogue]]
speaker = "フラン"
# 「オレは戦士だ。戦って誰かを守るのが仕事だ」
line = "「オレは戦士だ。戦って誰かを守るのが仕事だ」"

[[dialogue]]
speaker = "フラン"
# 「だけど戦ってるのは戦士だけじゃねえ。『生きることは戦い』だからな。みんなそれぞれの戦いがある」
line = "「だけど戦ってるのは戦士だけじゃねえ。『生きることは戦い』だからな。みんなそれぞれの戦いがある」"

[[dialogue]]
speaker = "フラン"
# 「部活やってるやつだってそうだろ。だからオレは、一生懸命戦ってるやつの力になってやりてえんだ」
line = "「部活やってるやつだってそうだろ。だからオレは、一生懸命戦ってるやつの力になってやりてえんだ」"

[[dialogue]]
speaker = "フラン"
# 「ま、最初は声がデカいからって応援団にスカウトされて、付き合いで入ったんだけどな」
line = "「ま、最初は声がデカいからって応援団にスカウトされて、付き合いで入ったんだけどな」"

[[dialogue]]
speaker = "フラン"
# 「応援団のほかの連中や、部活のやつらの真剣なところ見てたら、みんなの戦いを少しでも助けたいって思ったんだ」
line = "「応援団のほかの連中や、部活のやつらの真剣なところ見てたら、みんなの戦いを少しでも助けたいって思ったんだ」"

[[dialogue]]
speaker = "フラン"
# 「知ってるか？　仲間が自分を信じてくれてるってだけで、自分でも信じられないような力が出せるんだ」
line = "「知ってるか？　仲間が自分を信じてくれてるってだけで、自分でも信じられないような力が出せるんだ」"

[[dialogue]]
speaker = "フラン"
# 「普通なら勝てっこない相手でも勝てちまう……会長だって、そういう経験あるだろ？」
line = "「普通なら勝てっこない相手でも勝てちまう……会長だって、そういう経験あるだろ？」"

[[dialogue]]
speaker = "フラン"
# 「……なんてな。はは、熱弁しちまった」
line = "「……なんてな。はは、熱弁しちまった」"

[[dialogue]]
speaker = "unk"
# フランはすごくかっこいいよ
line = "フランはすごくかっこいいよ"

[[dialogue]]
speaker = "フラン"
# 「んなっ……！？　別に大したことしてねえよ。オレは当たり前のことをしてるだけっつーか、そういうのは選手に言ってくれ」
line = "「んなっ……！？　別に大したことしてねえよ。オレは当たり前のことをしてるだけっつーか、そういうのは選手に言ってくれ」"

[[dialogue]]
speaker = "unk"
# 当たり前なら、涙を浮かべたりしないよ
line = "当たり前なら、涙を浮かべたりしないよ"

[[dialogue]]
speaker = "フラン"
# 「な、涙！？　な、泣いてなんかねえし！　これは、その、なんだ、そう！　汗が目に入っただけで……！」
line = "「な、涙！？　な、泣いてなんかねえし！　これは、その、なんだ、そう！　汗が目に入っただけで……！」"

[[dialogue]]
speaker = "フラン"
# 「そりゃ胸にジンとキたから、ちょっとくらいは涙が出ちまったかもだけど……ちょっとだけ！　ちょっとだけだかんな！？」
line = "「そりゃ胸にジンとキたから、ちょっとくらいは涙が出ちまったかもだけど……ちょっとだけ！　ちょっとだけだかんな！？」"

[[dialogue]]
speaker = "フラン"
# 「あー、くそっ！　格好悪ぃとこ見られた……このことは絶対、みんなには内緒だからな！？　絶対だぞ！？」
line = "「あー、くそっ！　格好悪ぃとこ見られた……このことは絶対、みんなには内緒だからな！？　絶対だぞ！？」"

[[dialogue]]
speaker = "unk"
# ああ、約束だ
line = "ああ、約束だ"

[[dialogue]]
speaker = "フラン"
# 「本当だろうな？　ったく……あんたと話してると調子狂わされっぱなしだぜ……」
line = "「本当だろうな？　ったく……あんたと話してると調子狂わされっぱなしだぜ……」"

[[dialogue]]
speaker = "フラン"
# 「さーてと、気ぃ取り直して！」
line = "「さーてと、気ぃ取り直して！」"

[[dialogue]]
speaker = "フラン"
# 「まだ応援は終わりじゃねえ。全国の切符は残念だったけど、３位決定戦があるからな。次も気張って応援するぜ！」
line = "「まだ応援は終わりじゃねえ。全国の切符は残念だったけど、３位決定戦があるからな。次も気張って応援するぜ！」"

[[dialogue]]
speaker = "フラン"
# 「次はオレじゃなくって、試合を見るんだぞ？　余所見してるとぶっ飛ばすからな！」
line = "「次はオレじゃなくって、試合を見るんだぞ？　余所見してるとぶっ飛ばすからな！」"
