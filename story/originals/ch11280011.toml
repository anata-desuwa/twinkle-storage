[[dialogue]]
speaker = "unk"
# 第１話,リコさんの友達（附属生編）,P
line = "第１話,リコさんの友達（附属生編）,P"

[[dialogue]]
speaker = "unk"
# 星術使いの犯罪者に対して秘密裏に処理し、治安を守っている学園の裏組織『公安委員会』。
line = "星術使いの犯罪者に対して秘密裏に処理し、治安を守っている学園の裏組織『公安委員会』。"

[[dialogue]]
speaker = "unk"
# 以前より委員会に協力していた俺は、その日も要請を受けて参加していた。
line = "以前より委員会に協力していた俺は、その日も要請を受けて参加していた。"

[[dialogue]]
speaker = "リコリンフィア"
# 「――よし、これにて任務終了だ」
line = "「――よし、これにて任務終了だ」"

[[dialogue]]
speaker = "リコリンフィア"
# 「犯人の連行も済んだことだし……事件解決の協力に感謝する、少年」
line = "「犯人の連行も済んだことだし……事件解決の協力に感謝する、少年」"

[[dialogue]]
speaker = "unk"
# 彼女の名前は『リコリンフィア』――俺は『リコさん』と呼んでいる。
line = "彼女の名前は『リコリンフィア』――俺は『リコさん』と呼んでいる。"

[[dialogue]]
speaker = "unk"
# 非常に小柄だが、成人している大人の女性であり、母さんの友人でもある。
line = "非常に小柄だが、成人している大人の女性であり、母さんの友人でもある。"

[[dialogue]]
speaker = "unk"
# そして、公安委員会のただのエージェントではなく、それを率いるリーダー、『本部長』の役職を持つ人物だったりする。
line = "そして、公安委員会のただのエージェントではなく、それを率いるリーダー、『本部長』の役職を持つ人物だったりする。"

[[dialogue]]
speaker = "リコリンフィア"
# 「お礼にお姉さんと一緒に食事でも……と思ったが、さすがに夜も遅い。これ以上連れ回してはリノに怒られてしまうし、また次の機会にな」
line = "「お礼にお姉さんと一緒に食事でも……と思ったが、さすがに夜も遅い。これ以上連れ回してはリノに怒られてしまうし、また次の機会にな」"

[[dialogue]]
speaker = "unk"
# 翌日。俺が学園に登校すると――
line = "翌日。俺が学園に登校すると――"

[[dialogue]]
speaker = "リコリンフィア"
# 「おはよう、少年。昨日の今日で、すぐに会うとは思わなかったよ」
line = "「おはよう、少年。昨日の今日で、すぐに会うとは思わなかったよ」"

[[dialogue]]
speaker = "リコリンフィア"
# 「――こんなに朝早くから星徒会の仕事があるのか？」
line = "「――こんなに朝早くから星徒会の仕事があるのか？」"

[[dialogue]]
speaker = "リコリンフィア"
# 「そうか。それはすまなかったな。昨日、夜遅くまで協力させてしまって」
line = "「そうか。それはすまなかったな。昨日、夜遅くまで協力させてしまって」"

[[dialogue]]
speaker = "unk"
# いえ、平和を守るのが星騎士の役目ですから
line = "いえ、平和を守るのが星騎士の役目ですから"

[[dialogue]]
speaker = "リコリンフィア"
# 「その心がけには敬意を表する。……だが、少年。体調管理も大事な仕事であることを忘れるな。特にキミは、対リクリエの要というべき魔王なのだから」
line = "「その心がけには敬意を表する。……だが、少年。体調管理も大事な仕事であることを忘れるな。特にキミは、対リクリエの要というべき魔王なのだから」"

[[dialogue]]
speaker = "リコリンフィア"
# 「次からは、無理せずちゃんとお姉さんに言ってくれ。私も反省して、次からはちゃんと確認するようにする」
line = "「次からは、無理せずちゃんとお姉さんに言ってくれ。私も反省して、次からはちゃんと確認するようにする」"

[[dialogue]]
speaker = "unk"
# リコさんは疲れてないですか？
line = "リコさんは疲れてないですか？"

[[dialogue]]
speaker = "リコリンフィア"
# 「私か？　大丈夫だ。実はこの体は、アニマに作ってもらった義体でな。本体は今日、休養に務めている」
line = "「私か？　大丈夫だ。実はこの体は、アニマに作ってもらった義体でな。本体は今日、休養に務めている」"

[[dialogue]]
speaker = "unk"
# アニマ先輩も公安に……！？
line = "アニマ先輩も公安に……！？"

[[dialogue]]
speaker = "リコリンフィア"
# 「ああ。入学当初から外部の協力者として、何度も世話になっているよ。私は使えるものはなんでも使う主義なのでな」
line = "「ああ。入学当初から外部の協力者として、何度も世話になっているよ。私は使えるものはなんでも使う主義なのでな」"

[[dialogue]]
speaker = "リコリンフィア"
# 「しかし、彼女の天才っぷりには本当に驚かされる。まさか、体だけでなく意識までも２つに分けられるとは……」
line = "「しかし、彼女の天才っぷりには本当に驚かされる。まさか、体だけでなく意識までも２つに分けられるとは……」"

[[dialogue]]
speaker = "リコリンフィア"
# 「おかげで本部長と、附属生のリコリンを両立した形で、二重生活を送ることができている」
line = "「おかげで本部長と、附属生のリコリンを両立した形で、二重生活を送ることができている」"

[[dialogue]]
speaker = "ミウ"
# 「あっ、リコリンちゃん。おはようございます！」
line = "「あっ、リコリンちゃん。おはようございます！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「それに会長も！　リコリン、会長と知り合いだったの～？」
line = "「それに会長も！　リコリン、会長と知り合いだったの～？」"

[[dialogue]]
speaker = "リコリンフィア"
# 「リコリンリン☆　ミウちゃん、ヒマワリちゃん、おはよ～♪」
line = "「リコリンリン☆　ミウちゃん、ヒマワリちゃん、おはよ～♪」"

[[dialogue]]
speaker = "リコリンフィア"
# 「てへっ☆」
line = "「てへっ☆」"

[[dialogue]]
speaker = "unk"
# （相変わらず切り替えが早い！）
line = "（相変わらず切り替えが早い！）"

[[dialogue]]
speaker = "unk"
# 知り合ってからもう何度も見ているが、リコさんの『キャラ変』には驚かされる。
line = "知り合ってからもう何度も見ているが、リコさんの『キャラ変』には驚かされる。"

[[dialogue]]
speaker = "unk"
# 制服を着ていることからも分かる通り、彼女はその小柄な体を活かして、附属校の２年生として学園生活を送っているのだ。
line = "制服を着ていることからも分かる通り、彼女はその小柄な体を活かして、附属校の２年生として学園生活を送っているのだ。"

[[dialogue]]
speaker = "unk"
# 本人曰く、附属生という立場は情報収集に何かと便利であるらしい。
line = "本人曰く、附属生という立場は情報収集に何かと便利であるらしい。"

[[dialogue]]
speaker = "リコリンフィア"
# 「あのね、会長のお兄ちゃんとは、この前リゾート結界で知り合ったの～♪」
line = "「あのね、会長のお兄ちゃんとは、この前リゾート結界で知り合ったの～♪」"

[[dialogue]]
speaker = "unk"
# （お兄ちゃん呼びはいつ聞いても、複雑な気分……！）
line = "（お兄ちゃん呼びはいつ聞いても、複雑な気分……！）"

[[dialogue]]
speaker = "unk"
# ミウとヒマワリとは友達なのかと尋ねてみると――
line = "ミウとヒマワリとは友達なのかと尋ねてみると――"

[[dialogue]]
speaker = "ミウ"
# 「はい。私たち、リコリンちゃんとは同じクラスなんです」
line = "「はい。私たち、リコリンちゃんとは同じクラスなんです」"

[[dialogue]]
speaker = "ヒマワリ"
# 「この前、私の部屋で一緒にお泊り会もしたんだよね♪」
line = "「この前、私の部屋で一緒にお泊り会もしたんだよね♪」"

[[dialogue]]
speaker = "unk"
# リコリン、お泊り会に行ったの！？
line = "リコリン、お泊り会に行ったの！？"

[[dialogue]]
speaker = "リコリンフィア"
# 「うん♪　リコリンのこと、２人が誘ってくれたの～♪」
line = "「うん♪　リコリンのこと、２人が誘ってくれたの～♪」"

[[dialogue]]
speaker = "ヒマワリ"
# 「リコリンとは気が合って、仲良くなりたかったからね！」
line = "「リコリンとは気が合って、仲良くなりたかったからね！」"

[[dialogue]]
speaker = "ミウ"
# 「リコリンちゃん、すごく頭が良くて、今度ゴールデングースの新しいメンバーにどうかって、セナリィ社長に推薦してみようと思ってるんです」
line = "「リコリンちゃん、すごく頭が良くて、今度ゴールデングースの新しいメンバーにどうかって、セナリィ社長に推薦してみようと思ってるんです」"

[[dialogue]]
speaker = "リコリンフィア"
# 「リコリン、セナリィ社長に会うの楽しみだな～♪　ふふっ、どんな人なんだろ～？」
line = "「リコリン、セナリィ社長に会うの楽しみだな～♪　ふふっ、どんな人なんだろ～？」"

[[dialogue]]
speaker = "unk"
# ちなみに、セナリィは公安委員会の下請けとして傭兵業をやっている。なので当然、リコさんはセナリィのことを知っている。
line = "ちなみに、セナリィは公安委員会の下請けとして傭兵業をやっている。なので当然、リコさんはセナリィのことを知っている。"

[[dialogue]]
speaker = "unk"
# そして、セナリィもリコさんが本部長であることは知っているわけで。
line = "そして、セナリィもリコさんが本部長であることは知っているわけで。"

[[dialogue]]
speaker = "unk"
# （セナリィの胃に穴が開きそう……！）
line = "（セナリィの胃に穴が開きそう……！）"

[[dialogue]]
speaker = "unk"
# 俺はこっそりリコさんに耳打ちする。
line = "俺はこっそりリコさんに耳打ちする。"

[[dialogue]]
speaker = "リコリンフィア"
# （うん？　私がやっぱり、附属校の生活を楽しんでないかだと？）
line = "（うん？　私がやっぱり、附属校の生活を楽しんでないかだと？）"

[[dialogue]]
speaker = "リコリンフィア"
# （何を言う、少年。附属生になり切っているのはあくまで仕事だからだ）
line = "（何を言う、少年。附属生になり切っているのはあくまで仕事だからだ）"

[[dialogue]]
speaker = "リコリンフィア"
# （交友関係は広い方が、いざという時、役立つだろう？）
line = "（交友関係は広い方が、いざという時、役立つだろう？）"

[[dialogue]]
speaker = "ヒマワリ"
# 「そろそろ教室行く？」
line = "「そろそろ教室行く？」"

[[dialogue]]
speaker = "ミウ"
# 「リコリンちゃんはどうしますか？」
line = "「リコリンちゃんはどうしますか？」"

[[dialogue]]
speaker = "リコリンフィア"
# 「うん、私も一緒に行く～♪」
line = "「うん、私も一緒に行く～♪」"

[[dialogue]]
speaker = "リコリンフィア"
# 「じゃあ、またね♪　お兄ちゃん☆」
line = "「じゃあ、またね♪　お兄ちゃん☆」"

[[dialogue]]
speaker = "unk"
# 附属生になり切ったままミウとヒマワリと一緒にこちらへ手を振ってみせ――
line = "附属生になり切ったままミウとヒマワリと一緒にこちらへ手を振ってみせ――"

[[dialogue]]
speaker = "unk"
# それから一瞬、大人っぽい顔でウィンクをしてから去って行くリコさんなのだった。
line = "それから一瞬、大人っぽい顔でウィンクをしてから去って行くリコさんなのだった。"
