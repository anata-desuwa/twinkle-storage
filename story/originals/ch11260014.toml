[[dialogue]]
speaker = "unk"
# 第４話,俺と魔法少女の恋愛事情,P
line = "第４話,俺と魔法少女の恋愛事情,P"

[[dialogue]]
speaker = "unk"
# トレジアンナさんから好意を伝えられた上で、速攻フラれた一件から、少し経ったある日のこと。
line = "トレジアンナさんから好意を伝えられた上で、速攻フラれた一件から、少し経ったある日のこと。"

[[dialogue]]
speaker = "unk"
# 俺が彼女と一緒に、何気なく過ごしていると――
line = "俺が彼女と一緒に、何気なく過ごしていると――"

[[dialogue]]
speaker = "トレジアンナ"
# 「会長さん、ちょっとご相談なんですけど～」
line = "「会長さん、ちょっとご相談なんですけど～」"

[[dialogue]]
speaker = "トレジアンナ"
# 「今度の週末の休み、私と――デートに出かけませんか？」
line = "「今度の週末の休み、私と――デートに出かけませんか？」"

[[dialogue]]
speaker = "unk"
# えっ！？
line = "えっ！？"

[[dialogue]]
speaker = "unk"
# というわけで――
line = "というわけで――"

[[dialogue]]
speaker = "unk"
# 週末のデート当日。俺は彼女に誘われて、秋葉原にやって来たのだが……
line = "週末のデート当日。俺は彼女に誘われて、秋葉原にやって来たのだが……"

[[dialogue]]
speaker = "トレジアンナ"
# 「ふっふっふっ、手に入れちゃいましたよ～！　新発売の魔法少女フィギュアの店舗限定版♪　お一人様１点限りのところを、会長さんに手伝ってもらって２体☆」
line = "「ふっふっふっ、手に入れちゃいましたよ～！　新発売の魔法少女フィギュアの店舗限定版♪　お一人様１点限りのところを、会長さんに手伝ってもらって２体☆」"

[[dialogue]]
speaker = "トレジアンナ"
# 「これ、店舗限定のパーツ換装で、シャドウ魔法少女に変えられるんですけど、劇中だともう１人の別キャラなんですよね～。だから、２体並べて飾りたかったんです♪」
line = "「これ、店舗限定のパーツ換装で、シャドウ魔法少女に変えられるんですけど、劇中だともう１人の別キャラなんですよね～。だから、２体並べて飾りたかったんです♪」"

[[dialogue]]
speaker = "unk"
# うん、そんなことだろうと思った
line = "うん、そんなことだろうと思った"

[[dialogue]]
speaker = "トレジアンナ"
# 「いや～、私たちすっかり以心伝心ですね☆」
line = "「いや～、私たちすっかり以心伝心ですね☆」"

[[dialogue]]
speaker = "トレジアンナ"
# 「でも、付き合ってくれてありがとうございます、会長さん。どうしても２体欲しかったので、ゲットできて嬉しいです～。えへへ♪」
line = "「でも、付き合ってくれてありがとうございます、会長さん。どうしても２体欲しかったので、ゲットできて嬉しいです～。えへへ♪」"

[[dialogue]]
speaker = "unk"
# そんな風に嬉しそうなトレジアンナさんの笑顔を見ると、俺は早起きして開店前に並んだことも、つい許せてしまう。
line = "そんな風に嬉しそうなトレジアンナさんの笑顔を見ると、俺は早起きして開店前に並んだことも、つい許せてしまう。"

[[dialogue]]
speaker = "unk"
# 好意を伝えられて以来、俺は逆に、彼女を異性として強く<b>意識する</b>ようになってしまっていた。
line = "好意を伝えられて以来、俺は逆に、彼女を異性として強く<b>意識する</b>ようになってしまっていた。"

[[dialogue]]
speaker = "unk"
# ところで、今日はどうして魔法少女衣装を？
line = "ところで、今日はどうして魔法少女衣装を？"

[[dialogue]]
speaker = "トレジアンナ"
# 「それはほら、秋葉原といえば、コスプレじゃないですか～」
line = "「それはほら、秋葉原といえば、コスプレじゃないですか～」"

[[dialogue]]
speaker = "トレジアンナ"
# 「せっかく来るなら、こっちの方が楽しいデートになりそうかな～と思いまして～☆」
line = "「せっかく来るなら、こっちの方が楽しいデートになりそうかな～と思いまして～☆」"

[[dialogue]]
speaker = "unk"
# さらっと口にした『デート』という単語に、俺はまた、こそばゆい気持ちになってしまう。
line = "さらっと口にした『デート』という単語に、俺はまた、こそばゆい気持ちになってしまう。"

[[dialogue]]
speaker = "unk"
# ――それから２人で、近くのスイーツ店に入って、休憩することになった。
line = "――それから２人で、近くのスイーツ店に入って、休憩することになった。"

[[dialogue]]
speaker = "unk"
# 注文を終えて、席に着いたところで、トレジアンナさんが目をキラキラさせながら言う。
line = "注文を終えて、席に着いたところで、トレジアンナさんが目をキラキラさせながら言う。"

[[dialogue]]
speaker = "トレジアンナ"
# 「会長さん！　会計のレシート、貰ってもいいですか？　是非、コレクションしたいです！」
line = "「会長さん！　会計のレシート、貰ってもいいですか？　是非、コレクションしたいです！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「――いいんですか？　やったぁ～☆　ありがとうございます～♪」
line = "「――いいんですか？　やったぁ～☆　ありがとうございます～♪」"

[[dialogue]]
speaker = "unk"
# 俺とのレシート、そんなに嬉しいんですか？
line = "俺とのレシート、そんなに嬉しいんですか？"

[[dialogue]]
speaker = "トレジアンナ"
# 「はい♪　好きな男のヒトとデートに来た、思い出の品になりますから♪」
line = "「はい♪　好きな男のヒトとデートに来た、思い出の品になりますから♪」"

[[dialogue]]
speaker = "unk"
# なんの臆面もなく、またさらっとそんなことを言う彼女。
line = "なんの臆面もなく、またさらっとそんなことを言う彼女。"

[[dialogue]]
speaker = "unk"
# ピンと来ないって言ってましたよね？
line = "ピンと来ないって言ってましたよね？"

[[dialogue]]
speaker = "unk"
# この前……恋愛について
line = "この前……恋愛について"

[[dialogue]]
speaker = "トレジアンナ"
# 「？　ええ、そうですね。私、真剣な交際とかは全然考えてなくて――」
line = "「？　ええ、そうですね。私、真剣な交際とかは全然考えてなくて――」"

[[dialogue]]
speaker = "unk"
# ――なら俺がもし、真剣に恋人になって欲しいって言ったら……どうしますか？
line = "――なら俺がもし、真剣に恋人になって欲しいって言ったら……どうしますか？"

[[dialogue]]
speaker = "unk"
# 俺がそう尋ねると──
line = "俺がそう尋ねると──"

[[dialogue]]
speaker = "トレジアンナ"
# 「だが断る！！！」
line = "「だが断る！！！」"

[[dialogue]]
speaker = "unk"
# そんなに強く！？
line = "そんなに強く！？"

[[dialogue]]
speaker = "トレジアンナ"
# 「はい♪　別に私じゃなくとも、会長さんの周りには、可愛い女の子が沢山いると思いますから☆」
line = "「はい♪　別に私じゃなくとも、会長さんの周りには、可愛い女の子が沢山いると思いますから☆」"

[[dialogue]]
speaker = "トレジアンナ"
# 「私は、会長さんとは程よい距離感で、異性の程よく甘い関係を、気楽に楽しめたらいいな～って考えてます」
line = "「私は、会長さんとは程よい距離感で、異性の程よく甘い関係を、気楽に楽しめたらいいな～って考えてます」"

[[dialogue]]
speaker = "unk"
# なら……まずは友達からならいいですか？
line = "なら……まずは友達からならいいですか？"

[[dialogue]]
speaker = "トレジアンナ"
# 「え？」
line = "「え？」"

[[dialogue]]
speaker = "unk"
# トレジアンナさんはきょとんとした顔をして、目をぱちくりさせる。
line = "トレジアンナさんはきょとんとした顔をして、目をぱちくりさせる。"

[[dialogue]]
speaker = "unk"
# 俺はそんな彼女に、告げた。
line = "俺はそんな彼女に、告げた。"

[[dialogue]]
speaker = "トレジアンナ"
# 「――えっ！？　私と……『友達以上恋人未満』でお付き合いしたい！？」
line = "「――えっ！？　私と……『友達以上恋人未満』でお付き合いしたい！？」"

[[dialogue]]
speaker = "unk"
# そして、その代わりに交換条件として――
line = "そして、その代わりに交換条件として――"

[[dialogue]]
speaker = "unk"
# 『ＴＳ魔法少女』になってもいいです
line = "『ＴＳ魔法少女』になってもいいです"

[[dialogue]]
speaker = "unk"
# もし付き合ってくれたら、俺
line = "もし付き合ってくれたら、俺"

[[dialogue]]
speaker = "トレジアンナ"
# 「なっ！？」
line = "「なっ！？」"

[[dialogue]]
speaker = "unk"
# ――俺が魔法少女に変身した姿の写真、コレクションに加えたくないですか？
line = "――俺が魔法少女に変身した姿の写真、コレクションに加えたくないですか？"

[[dialogue]]
speaker = "unk"
# 俺が更にもうひと押し、そう付け加えると……
line = "俺が更にもうひと押し、そう付け加えると……"

[[dialogue]]
speaker = "トレジアンナ"
# 「――友達以上恋人未満でお願いします！！！」
line = "「――友達以上恋人未満でお願いします！！！」"

[[dialogue]]
speaker = "unk"
# そんなわけで果たして、俺はトレジアンナさんとの契約に成功したのだった。
line = "そんなわけで果たして、俺はトレジアンナさんとの契約に成功したのだった。"

[[dialogue]]
speaker = "unk"
# それから、注文したケーキと飲み物が来て、俺はひと息つこうと紅茶を飲んでいると――
line = "それから、注文したケーキと飲み物が来て、俺はひと息つこうと紅茶を飲んでいると――"

[[dialogue]]
speaker = "トレジアンナ"
# 「会長さん、さっきのことでふと思ったんですけど、質問いいですか～？」
line = "「会長さん、さっきのことでふと思ったんですけど、質問いいですか～？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「友達以上恋人未満っていうのは――<b>キス</b>なんかはありなんでしょうか！？」
line = "「友達以上恋人未満っていうのは――<b>キス</b>なんかはありなんでしょうか！？」"

[[dialogue]]
speaker = "unk"
# 不意打ちの発言に、俺は思わずむせる。
line = "不意打ちの発言に、俺は思わずむせる。"

[[dialogue]]
speaker = "unk"
# いきなり聞きますか、それ！？
line = "いきなり聞きますか、それ！？"

[[dialogue]]
speaker = "トレジアンナ"
# 「え～？　だって、気になるじゃないですか～！　私だって女の子なんですよ～！？」
line = "「え～？　だって、気になるじゃないですか～！　私だって女の子なんですよ～！？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「恋愛はピンと来ませんが……エッチなことには興味津々です！」
line = "「恋愛はピンと来ませんが……エッチなことには興味津々です！」"

[[dialogue]]
speaker = "unk"
# ちょっ！？　大声でなに言ってんですか！？
line = "ちょっ！？　大声でなに言ってんですか！？"

[[dialogue]]
speaker = "トレジアンナ"
# 「あっ！　その反応は～！　えへへへぇ～、どうやら会長さんも、興味あるみたいですね～<emoji=heart04>」
line = "「あっ！　その反応は～！　えへへへぇ～、どうやら会長さんも、興味あるみたいですね～<emoji=heart04>」"

[[dialogue]]
speaker = "トレジアンナ"
# 「なら、どうします～？　どこまでがセーフで、どこまでがアウトか、この後じっくり吟味しちゃいます？」
line = "「なら、どうします～？　どこまでがセーフで、どこまでがアウトか、この後じっくり吟味しちゃいます？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「うふふっ<emoji=heart04>」
line = "「うふふっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ちょっと大人な笑顔でからかう魔法少女に、俺はこれからを期待してドキドキさせられてしまうのであった――
line = "ちょっと大人な笑顔でからかう魔法少女に、俺はこれからを期待してドキドキさせられてしまうのであった――"
