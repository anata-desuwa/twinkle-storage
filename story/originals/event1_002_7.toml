[[dialogue]]
speaker = "unk"
# 合宿７日目。
line = "合宿７日目。"

[[dialogue]]
speaker = "unk"
# リップルが毎日コツコツと作り続けていたリゾート結界。それがついに――
line = "リップルが毎日コツコツと作り続けていたリゾート結界。それがついに――"

[[dialogue]]
speaker = "リップル"
# 「ついに、カタチになりました……！」
line = "「ついに、カタチになりました……！」"

[[dialogue]]
speaker = "リップル"
# 「まだまだなところもタクサンあると思います。でも、皆から意見を聞いて、ちゃんと最後まで仕上げることがデキました！」
line = "「まだまだなところもタクサンあると思います。でも、皆から意見を聞いて、ちゃんと最後まで仕上げることがデキました！」"

[[dialogue]]
speaker = "リップル"
# 「ワタシの海の家が……リゾートが完成したんです！」
line = "「ワタシの海の家が……リゾートが完成したんです！」"

[[dialogue]]
speaker = "unk"
# おめでとう、リップル
line = "おめでとう、リップル"

[[dialogue]]
speaker = "リップル"
# 「カイチョー、アリガトございます！」
line = "「カイチョー、アリガトございます！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「おめでとう！　リップルならきっと上手く行くと思ってたわ！」
line = "「おめでとう！　リップルならきっと上手く行くと思ってたわ！」"

[[dialogue]]
speaker = "マトイ"
# 「もともと来た時から楽園みたいに素敵な場所だったしね」
line = "「もともと来た時から楽園みたいに素敵な場所だったしね」"

[[dialogue]]
speaker = "サーシャ"
# 「よく頑張ったわね～。リップルちゃん、偉い偉い♪」
line = "「よく頑張ったわね～。リップルちゃん、偉い偉い♪」"

[[dialogue]]
speaker = "アナ"
# 「おめでとうございます。１つ１つにしっかりとコンセプトが感じられて、グッジョブです」
line = "「おめでとうございます。１つ１つにしっかりとコンセプトが感じられて、グッジョブです」"

[[dialogue]]
speaker = "フィオナ"
# 「ここに来れたおかげで、私は夏の海の楽しさを知ることが出来ました」
line = "「ここに来れたおかげで、私は夏の海の楽しさを知ることが出来ました」"

[[dialogue]]
speaker = "フィオナ"
# 「ですから、リップルさんがこのリゾート結界に込めた想いは、ちゃんと伝わる場所になっていると、私は思います」
line = "「ですから、リップルさんがこのリゾート結界に込めた想いは、ちゃんと伝わる場所になっていると、私は思います」"

[[dialogue]]
speaker = "リップル"
# 「フィオナ……！　皆もアリガトございます！」
line = "「フィオナ……！　皆もアリガトございます！」"

[[dialogue]]
speaker = "リップル"
# 「……これまでずっと悩んでイタのに、皆が来てくれてから、ウソみたいに手が進んで、カンセイできちゃいました」
line = "「……これまでずっと悩んでイタのに、皆が来てくれてから、ウソみたいに手が進んで、カンセイできちゃいました」"

[[dialogue]]
speaker = "リップル"
# 「それで気付いたんです。海の家は……ワタシが思い描いていた夏の海は、楽しんでくれる人がいてコソだって」
line = "「それで気付いたんです。海の家は……ワタシが思い描いていた夏の海は、楽しんでくれる人がいてコソだって」"

[[dialogue]]
speaker = "リップル"
# 「だから、ワタシ１人が考え込んでいるダケじゃ、いつまでも理想に近付けなくてアタリマエだったんです」
line = "「だから、ワタシ１人が考え込んでいるダケじゃ、いつまでも理想に近付けなくてアタリマエだったんです」"

[[dialogue]]
speaker = "リップル"
# 「皆がここにやって来てくれて、去年の海で味わったハッピーな気持ちや、感動を思い出せたから、そのことに気付くことがデキました！」
line = "「皆がここにやって来てくれて、去年の海で味わったハッピーな気持ちや、感動を思い出せたから、そのことに気付くことがデキました！」"

[[dialogue]]
speaker = "リップル"
# 「ワタシと出会ってくれて、本当にアリガトございます！」
line = "「ワタシと出会ってくれて、本当にアリガトございます！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふふっ、それを言うなら、私達もリップルと出会えて良かったわ」
line = "「ふふっ、それを言うなら、私達もリップルと出会えて良かったわ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「刺激的で楽しいサプライズ合宿になったし、水着フォームという新たな力も手に入れられたしね！」
line = "「刺激的で楽しいサプライズ合宿になったし、水着フォームという新たな力も手に入れられたしね！」"

[[dialogue]]
speaker = "マトイ"
# 「サバイバルも回避出来て、温泉に入れて、料理も美味しい……控え目に言って最高だったよ！」
line = "「サバイバルも回避出来て、温泉に入れて、料理も美味しい……控え目に言って最高だったよ！」"

[[dialogue]]
speaker = "サーシャ"
# 「うふふ♪　マトイちゃん、そればっかり～」
line = "「うふふ♪　マトイちゃん、そればっかり～」"

[[dialogue]]
speaker = "アナ"
# 「よっぽどサバイバルが嫌だったんですね」
line = "「よっぽどサバイバルが嫌だったんですね」"

[[dialogue]]
speaker = "フィオナ"
# 「でも、今度は是非、サバイバルも体験してみたいです」
line = "「でも、今度は是非、サバイバルも体験してみたいです」"

[[dialogue]]
speaker = "unk"
# なら、その時は俺が教えるよ
line = "なら、その時は俺が教えるよ"

[[dialogue]]
speaker = "フィオナ"
# 「はい、是非♪　――ただしお手柔らかに、ですか？　ふふっ、分かりました」
line = "「はい、是非♪　――ただしお手柔らかに、ですか？　ふふっ、分かりました」"

[[dialogue]]
speaker = "サーシャ"
# 「あ、そうだわ。リップルちゃんの結界完成のお祝いで言うの忘れちゃってたけど、皆、ちょっとビーチの方まで来て欲しいの～」
line = "「あ、そうだわ。リップルちゃんの結界完成のお祝いで言うの忘れちゃってたけど、皆、ちょっとビーチの方まで来て欲しいの～」"

[[dialogue]]
speaker = "リップル"
# 「サーシャ？　ビーチに何かあるんデスかー？」
line = "「サーシャ？　ビーチに何かあるんデスかー？」"

[[dialogue]]
speaker = "サーシャ"
# 「実はね～」
line = "「実はね～」"

[[dialogue]]
speaker = "マトイ"
# 「えぇっ！？　このビーチの先にある洞窟で、アステライトを見つけた！？」
line = "「えぇっ！？　このビーチの先にある洞窟で、アステライトを見つけた！？」"

[[dialogue]]
speaker = "フィオナ"
# 「それは本当なんですか……！？　何でそんな……！」
line = "「それは本当なんですか……！？　何でそんな……！」"

[[dialogue]]
speaker = "サーシャ"
# 「私、毎朝の日課で島のあちこちを探検していたんだけど、今日は洞窟の奥まで行ってみようと思って、足を踏み入れたの。そしたら～」
line = "「私、毎朝の日課で島のあちこちを探検していたんだけど、今日は洞窟の奥まで行ってみようと思って、足を踏み入れたの。そしたら～」"

[[dialogue]]
speaker = "ヴィーナス"
# 「洞窟の奥にアステラを見つけたというわけね。……モンスターは？」
line = "「洞窟の奥にアステラを見つけたというわけね。……モンスターは？」"

[[dialogue]]
speaker = "サーシャ"
# 「たくさんいたわ～。でも不思議なことに、洞窟の入り口から外には見えない壁で遮られて、出られないみたいで……」
line = "「たくさんいたわ～。でも不思議なことに、洞窟の入り口から外には見えない壁で遮られて、出られないみたいで……」"

[[dialogue]]
speaker = "アナ"
# 「ふむ。もしかしたら……それがリゾート結界から出られない原因だったりするのでは？」
line = "「ふむ。もしかしたら……それがリゾート結界から出られない原因だったりするのでは？」"

[[dialogue]]
speaker = "マトイ"
# 「アナ、どういうこと？」
line = "「アナ、どういうこと？」"

[[dialogue]]
speaker = "アナ"
# 「アステラが出現した際、その付近にある空間が歪んでおかしくなる現象――『バグ化』がありますよね？　結界の壁が歪んだのは、その影響じゃないかと思ったんです」
line = "「アステラが出現した際、その付近にある空間が歪んでおかしくなる現象――『バグ化』がありますよね？　結界の壁が歪んだのは、その影響じゃないかと思ったんです」"

[[dialogue]]
speaker = "フィオナ"
# 「なるほど。リップルさんが無人島をコピーしてリゾート結界を作っていたところ、現実世界の洞窟にアステライトが発生」
line = "「なるほど。リップルさんが無人島をコピーしてリゾート結界を作っていたところ、現実世界の洞窟にアステライトが発生」"

[[dialogue]]
speaker = "フィオナ"
# 「その際に結界と干渉して、アステラが結界内に取り込まれてしまった。結果、不純物が入り込んだことで結界に想定外の歪みが生じてしまった、と」
line = "「その際に結界と干渉して、アステラが結界内に取り込まれてしまった。結果、不純物が入り込んだことで結界に想定外の歪みが生じてしまった、と」"

[[dialogue]]
speaker = "アナ"
# 「その通りです。それなら、リップルさんが途中から結界の外に出られなくなったこととも辻褄が合います」
line = "「その通りです。それなら、リップルさんが途中から結界の外に出られなくなったこととも辻褄が合います」"

[[dialogue]]
speaker = "アナ"
# 「サーシャ先輩の言った、モンスターが洞窟から出て来れないという現象は――」
line = "「サーシャ先輩の言った、モンスターが洞窟から出て来れないという現象は――」"

[[dialogue]]
speaker = "アナ"
# 「おそらくリゾート結界の壁に歪みが生じているように、アステラ側にも何らかの歪みが生じているからだと推察できます」
line = "「おそらくリゾート結界の壁に歪みが生じているように、アステラ側にも何らかの歪みが生じているからだと推察できます」"

[[dialogue]]
speaker = "ヴィーナス"
# 「サーシャさん、洞窟に足を踏み入れたって言ってたけど、こっちからは洞窟内に出入り可能ってことでいいのかしら？」
line = "「サーシャさん、洞窟に足を踏み入れたって言ってたけど、こっちからは洞窟内に出入り可能ってことでいいのかしら？」"

[[dialogue]]
speaker = "サーシャ"
# 「ええ。見えない壁を通る時に強い抵抗があるけど、星力を最大出力にしたら、通り抜けることが出来たわ」
line = "「ええ。見えない壁を通る時に強い抵抗があるけど、星力を最大出力にしたら、通り抜けることが出来たわ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ということは、そのアステラを攻略出来れば、結界の歪みも直って、外に出られるようになるってことね！」
line = "「ということは、そのアステラを攻略出来れば、結界の歪みも直って、外に出られるようになるってことね！」"

[[dialogue]]
speaker = "リップル"
# 「アステラとモンスター……それはニュースでもよく見かけてたからシッテます。まさか、いつの間にかそれが結界の中に出来てたなんて……！」
line = "「アステラとモンスター……それはニュースでもよく見かけてたからシッテます。まさか、いつの間にかそれが結界の中に出来てたなんて……！」"

[[dialogue]]
speaker = "リップル"
# 「洞窟は元の無人島で見た時、シンピ的な場所で気に入ってたので、そのままにしてアッタんです……」
line = "「洞窟は元の無人島で見た時、シンピ的な場所で気に入ってたので、そのままにしてアッタんです……」"

[[dialogue]]
speaker = "マトイ"
# 「向こうからも出て来れないから、今まで気付かなかったのね。実際、私達もこの１週間気付いてなかったし……」
line = "「向こうからも出て来れないから、今まで気付かなかったのね。実際、私達もこの１週間気付いてなかったし……」"

[[dialogue]]
speaker = "リップル"
# 「つまり、ワタシのスランプは思い込みだったということですね……ハンセーします」
line = "「つまり、ワタシのスランプは思い込みだったということですね……ハンセーします」"

[[dialogue]]
speaker = "リップル"
# 「でも！　そのおかげでカイチョー達と出会えて、大切なことに気付くことがデキました。それはＢＩＧラッキーだったとオモイます！」
line = "「でも！　そのおかげでカイチョー達と出会えて、大切なことに気付くことがデキました。それはＢＩＧラッキーだったとオモイます！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「立ち直りが早いわね。でも、それでこそリップルらしいわ！」
line = "「立ち直りが早いわね。でも、それでこそリップルらしいわ！」"

[[dialogue]]
speaker = "リップル"
# 「ハイ！　クヨクヨしているのはダメだって、モッタイないって、シショーにも教わりましたから！」
line = "「ハイ！　クヨクヨしているのはダメだって、モッタイないって、シショーにも教わりましたから！」"

[[dialogue]]
speaker = "リップル"
# 「ワタシ自身も夏の海みたいに、いつも明るく皆をハッピーにデキる存在になりたいとオモっています♪」
line = "「ワタシ自身も夏の海みたいに、いつも明るく皆をハッピーにデキる存在になりたいとオモっています♪」"

[[dialogue]]
speaker = "リップル"
# 「ですが、結界から出たら皆とはお別れなんデスよね……それは、寂しくオモいます」
line = "「ですが、結界から出たら皆とはお別れなんデスよね……それは、寂しくオモいます」"

[[dialogue]]
speaker = "リップル"
# 「って、カイチョー？　ドウかしましたか？」
line = "「って、カイチョー？　ドウかしましたか？」"

[[dialogue]]
speaker = "リップル"
# 「――提案？　ワタシに、デスか？」
line = "「――提案？　ワタシに、デスか？」"

[[dialogue]]
speaker = "unk"
# リップル、一緒に新星学園へ来ないか？
line = "リップル、一緒に新星学園へ来ないか？"

[[dialogue]]
speaker = "フィオナ"
# 「ふふっ……私も結界から出たら勧誘しようと思ってたのに、緋宮会長に先を越されてしまいました」
line = "「ふふっ……私も結界から出たら勧誘しようと思ってたのに、緋宮会長に先を越されてしまいました」"

[[dialogue]]
speaker = "リップル"
# 「ワタシが、カイチョー達の通うガクエンに……？」
line = "「ワタシが、カイチョー達の通うガクエンに……？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロトならそう言うと思ってたわ！　リップル、そこには私達みたいに星力を持っている仲間がたくさん居て、色んなことを学べるのよ」
line = "「クロトならそう言うと思ってたわ！　リップル、そこには私達みたいに星力を持っている仲間がたくさん居て、色んなことを学べるのよ」"

[[dialogue]]
speaker = "マトイ"
# 「リクリエ阻止を目指す星騎士になる為の場所だけど、だからこそ普通じゃない人達がたくさん集まってるしね」
line = "「リクリエ阻止を目指す星騎士になる為の場所だけど、だからこそ普通じゃない人達がたくさん集まってるしね」"

[[dialogue]]
speaker = "リップル"
# 「でもワタシ、今まで１度もガクエンに通ったことがなくて……」
line = "「でもワタシ、今まで１度もガクエンに通ったことがなくて……」"

[[dialogue]]
speaker = "サーシャ"
# 「そこは大丈夫よ。困った時は私達が相談に乗るし、力になるわ～」
line = "「そこは大丈夫よ。困った時は私達が相談に乗るし、力になるわ～」"

[[dialogue]]
speaker = "アナ"
# 「ノープロブレム。１人で抱え込む必要はありません」
line = "「ノープロブレム。１人で抱え込む必要はありません」"

[[dialogue]]
speaker = "フィオナ"
# 「リップルさんが私に新しい趣味を――サーフィンを教えてくれたのと一緒です」
line = "「リップルさんが私に新しい趣味を――サーフィンを教えてくれたのと一緒です」"

[[dialogue]]
speaker = "フィオナ"
# 「リップルさんも、新しいことに挑戦してみませんか？」
line = "「リップルさんも、新しいことに挑戦してみませんか？」"

[[dialogue]]
speaker = "unk"
# それに何より――
line = "それに何より――"

[[dialogue]]
speaker = "unk"
# 理想のリゾートは、１人じゃ実現できないって分かったんだろう？
line = "理想のリゾートは、１人じゃ実現できないって分かったんだろう？"

[[dialogue]]
speaker = "unk"
# 俺はそうリップルに伝えた。
line = "俺はそうリップルに伝えた。"

[[dialogue]]
speaker = "リップル"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "リップル"
# 「ハイ、そうです！　ワタシ、もっと色んな人達をリゾート結界に招いて、意見を聞いてミタイです！」
line = "「ハイ、そうです！　ワタシ、もっと色んな人達をリゾート結界に招いて、意見を聞いてミタイです！」"

[[dialogue]]
speaker = "リップル"
# 「だからワタシ……皆とガクエンに行きます！」
line = "「だからワタシ……皆とガクエンに行きます！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「決まりね！　それじゃあ、強化合宿の締め括りとして――」
line = "「決まりね！　それじゃあ、強化合宿の締め括りとして――」"

[[dialogue]]
speaker = "ヴィーナス"
# 「皆で洞窟のアステライトを攻略するわよ！」
line = "「皆で洞窟のアステライトを攻略するわよ！」"

[[dialogue]]
speaker = "unk"
# 星徒会、出撃だ！
line = "星徒会、出撃だ！"

[[dialogue]]
speaker = "全員"
# 「おー！」
line = "「おー！」"
