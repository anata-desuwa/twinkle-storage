[[dialogue]]
speaker = "トワ先生（覚醒）"
# 「ふへ～……現役時代の戦いより大変だったかも……」
line = "「ふへ～……現役時代の戦いより大変だったかも……」"

[[dialogue]]
speaker = "ユウリ"
# 「はぁ、はぁ……だけどあたしたちの勝ちだ！」
line = "「はぁ、はぁ……だけどあたしたちの勝ちだ！」"

[[dialogue]]
speaker = "ラクシャ"
# 「んん……？　何が、起きて……」
line = "「んん……？　何が、起きて……」"

[[dialogue]]
speaker = "トワ先生（覚醒）"
# 「環ちゃん！　先生が助けに来たよ！」
line = "「環ちゃん！　先生が助けに来たよ！」"

[[dialogue]]
speaker = "ラクシャ"
# 「タマキって……誰？」
line = "「タマキって……誰？」"

[[dialogue]]
speaker = "トワ先生（覚醒）"
# 「へ──？」
line = "「へ──？」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「あ、ラクシャが塔に戻ったようです」
line = "「あ、ラクシャが塔に戻ったようです」"

[[dialogue]]
speaker = "ユウリ"
# 「新星学園の環がラクシャ……じゃなかったのか？　どうなってんだ？」
line = "「新星学園の環がラクシャ……じゃなかったのか？　どうなってんだ？」"

[[dialogue]]
speaker = "セーラ"
# 「聞きたいことは聞けずじまいで、謎が深まった感じだね」
line = "「聞きたいことは聞けずじまいで、謎が深まった感じだね」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「それにラクシャは本来の姿ではありませんでした。何者かによって力を奪われているのかもしれません。世界を維持するだけの権能は残っているみたいですが……」
line = "「それにラクシャは本来の姿ではありませんでした。何者かによって力を奪われているのかもしれません。世界を維持するだけの権能は残っているみたいですが……」"

[[dialogue]]
speaker = "セーラ"
# 「じゃあほんとはもっと強かったってこと？　そういう意味では助かったかもしんないけど」
line = "「じゃあほんとはもっと強かったってこと？　そういう意味では助かったかもしんないけど」"

[[dialogue]]
speaker = "ユウリ"
# 「あ～も～わかんね～。なんでラクシャだけ他の守護天使と違うところが多いんだ？」
line = "「あ～も～わかんね～。なんでラクシャだけ他の守護天使と違うところが多いんだ？」"

[[dialogue]]
speaker = "セーラ"
# 「ま、しゃーない。その辺の解明はまたの機会だねー」
line = "「ま、しゃーない。その辺の解明はまたの機会だねー」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「では……トワちゃん先生、どうぞ」
line = "「では……トワちゃん先生、どうぞ」"

[[dialogue]]
speaker = "トワ先生（覚醒）"
# 「？　腕を広げてどうしたの？」
line = "「？　腕を広げてどうしたの？」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「ママダレナが抱き締めてあげますよ～」
line = "「ママダレナが抱き締めてあげますよ～」"

[[dialogue]]
speaker = "トワ先生（覚醒）"
# 「ハッ──！　いやでも大人として、こんなちっちゃい子に甘えるわけには……」
line = "「ハッ──！　いやでも大人として、こんなちっちゃい子に甘えるわけには……」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "トワ先生（覚醒）"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "トワ先生（覚醒）"
# 「ママ～っ」
line = "「ママ～っ」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「よしよし」
line = "「よしよし」"

[[dialogue]]
speaker = "トワ先生（覚醒）"
# 「あ……社会人のストレスが癒される……人としてダメになりそう……」
line = "「あ……社会人のストレスが癒される……人としてダメになりそう……」"

[[dialogue]]
speaker = "キリカ"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "マリオン"
