line = "「キリカさん。あなたの溜飲が下がらないのであれば、いつでもお相手しますよ」"

[[dialogue]]
speaker = "キリカ"
# 「……いえ、その必要はありません。感情を律するのは己ですべきことですから」
line = "「……いえ、その必要はありません。感情を律するのは己ですべきことですから」"

[[dialogue]]
speaker = "キリカ"
# 「しかしまたお嬢様の前に立ちふさがるのなら、私がこの拳で砕きます」
line = "「しかしまたお嬢様の前に立ちふさがるのなら、私がこの拳で砕きます」"

[[dialogue]]
speaker = "マリオン"
# 「ふふ。肝に銘じておきます」
line = "「ふふ。肝に銘じておきます」"

[[dialogue]]
speaker = "ウィステリア"
# 「はぁ……人間界に帰ってもどうせ売り切れよね、ロールケーキ……これで何回目かしら」
line = "「はぁ……人間界に帰ってもどうせ売り切れよね、ロールケーキ……これで何回目かしら」"

[[dialogue]]
speaker = "キリカ"
# 「未練がましいのはみっともないですよ、ウィステリア。ロールケーキくらいでよければ私が作ってあげます」
line = "「未練がましいのはみっともないですよ、ウィステリア。ロールケーキくらいでよければ私が作ってあげます」"

