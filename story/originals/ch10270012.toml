[[dialogue]]
speaker = "unk"
# 第２話,オペレーターコハルコ,P
line = "第２話,オペレーターコハルコ,P"

[[dialogue]]
speaker = "キャッピー"
# 「イ～～～～ッ！」
line = "「イ～～～～ッ！」"

[[dialogue]]
speaker = "unk"
# 星徒会長になってから幾度目のモンスターのと戦闘。
line = "星徒会長になってから幾度目のモンスターのと戦闘。"

[[dialogue]]
speaker = "unk"
# それもあと１匹で終わりだ。
line = "それもあと１匹で終わりだ。"

[[dialogue]]
speaker = "キャッピー"
# 「イ～～……」
line = "「イ～～……」"

[[dialogue]]
speaker = "？？？"
# 「右後方、５時の方角です！」
line = "「右後方、５時の方角です！」"

[[dialogue]]
speaker = "unk"
# ――！？
line = "――！？"

[[dialogue]]
speaker = "フワッチ"
# 「イーーーーッ！」
line = "「イーーーーッ！」"

[[dialogue]]
speaker = "フワッチ"
# 「イ～～……」
line = "「イ～～……」"

[[dialogue]]
speaker = "？？？"
# 「モンスターの消滅を確認。ですが３時の方角から新たなモンスター群が近づいています」
line = "「モンスターの消滅を確認。ですが３時の方角から新たなモンスター群が近づいています」"

[[dialogue]]
speaker = "？？？"
# 「申し遅れました。こちらコハルコです」
line = "「申し遅れました。こちらコハルコです」"

[[dialogue]]
speaker = "？？？"
# 「細かい説明は後で。今はモンスターの殲滅を優先しましょう。ナビゲーションします」
line = "「細かい説明は後で。今はモンスターの殲滅を優先しましょう。ナビゲーションします」"

[[dialogue]]
speaker = "コハルコ"
# 「モンスターの討伐お疲れ様。怪我はない？」
line = "「モンスターの討伐お疲れ様。怪我はない？」"

[[dialogue]]
speaker = "unk"
# コハルコさんのおかげです
line = "コハルコさんのおかげです"

[[dialogue]]
speaker = "コハルコ"
# 「ふふ、なら良かった」
line = "「ふふ、なら良かった」"

[[dialogue]]
speaker = "コハルコ"
# 「私が所属する放送委員会は、休み時間の放送や行事の進行だけじゃなくて、戦闘時のオペレーターも担当するの」
line = "「私が所属する放送委員会は、休み時間の放送や行事の進行だけじゃなくて、戦闘時のオペレーターも担当するの」"

[[dialogue]]
speaker = "コハルコ"
# 「星徒会は強いから、オペレーションを必要としないことも多いけどね」
line = "「星徒会は強いから、オペレーションを必要としないことも多いけどね」"

[[dialogue]]
speaker = "コハルコ"
# 「ちなみに私は委員長なの。１年の時から放送委員だから、サーシャとはけっこう長い付き合いかな」
line = "「ちなみに私は委員長なの。１年の時から放送委員だから、サーシャとはけっこう長い付き合いかな」"

[[dialogue]]
speaker = "unk"
# コハルコさんは本当に何でもできるなぁ……
line = "コハルコさんは本当に何でもできるなぁ……"

[[dialogue]]
speaker = "コハルコ"
# 「そんなことないよ。私は会長さんみたいに面と向かって戦うのは得意じゃないし。一応プリマステラではあるけど、誰かと連携して戦う方が得意かな」
line = "「そんなことないよ。私は会長さんみたいに面と向かって戦うのは得意じゃないし。一応プリマステラではあるけど、誰かと連携して戦う方が得意かな」"

[[dialogue]]
speaker = "コハルコ"
# 「モンスターは……うん、もういないね。私の家、割とこの近くなんだ。心配で来てみたんだけど、大丈夫そうで良かった」
line = "「モンスターは……うん、もういないね。私の家、割とこの近くなんだ。心配で来てみたんだけど、大丈夫そうで良かった」"

[[dialogue]]
speaker = "コハルコ"
# 「あ、そうだ。せっかくここまで来たんだし、ちょっとお願いがあるんだけど……いいかな？」
line = "「あ、そうだ。せっかくここまで来たんだし、ちょっとお願いがあるんだけど……いいかな？」"

[[dialogue]]
speaker = "コハルコ"
# 「買い物袋持ってくれてありがとう。１人じゃ食料品はたくさん買えないし、男手があると助かるよ」
line = "「買い物袋持ってくれてありがとう。１人じゃ食料品はたくさん買えないし、男手があると助かるよ」"

[[dialogue]]
speaker = "コハルコ"
# 「私、家はこの辺なんだ。パソコンのパーツショップをやってるんだけど──」
line = "「私、家はこの辺なんだ。パソコンのパーツショップをやってるんだけど──」"

[[dialogue]]
speaker = "ナツコ"
# 「お姉ちゃ～ん！」
line = "「お姉ちゃ～ん！」"

[[dialogue]]
speaker = "トウコ"
# 「その人、コハルコお姉ちゃんのお友達……？」
line = "「その人、コハルコお姉ちゃんのお友達……？」"

[[dialogue]]
speaker = "コハルコ"
# 「２人は学校終わったところかな。この人は私の学校の星徒会長さん。うちの学校で一番強いんだよ」
line = "「２人は学校終わったところかな。この人は私の学校の星徒会長さん。うちの学校で一番強いんだよ」"

[[dialogue]]
speaker = "コハルコ"
# 「会長さん、こっちの２人はナツコとトウコ。私の妹なんだ」
line = "「会長さん、こっちの２人はナツコとトウコ。私の妹なんだ」"

[[dialogue]]
speaker = "ナツコ"
# 「よろしくお願いしまーす！」
line = "「よろしくお願いしまーす！」"

[[dialogue]]
speaker = "トウコ"
# 「はい、よろしくお願いします」
line = "「はい、よろしくお願いします」"

[[dialogue]]
speaker = "コハルコ"
# 「じゃあ、会長さんの袋は２人に持ってもらおうかな」
line = "「じゃあ、会長さんの袋は２人に持ってもらおうかな」"

[[dialogue]]
speaker = "unk"
# けっこう重いし家まで持ちますよ
line = "けっこう重いし家まで持ちますよ"

[[dialogue]]
speaker = "コハルコ"
# 「そう？　じゃあお願いしようかな。ふふ、会長さんは優しいね」
line = "「そう？　じゃあお願いしようかな。ふふ、会長さんは優しいね」"

[[dialogue]]
speaker = "ナツコ"
# 「ねぇねぇ、お姉ちゃん、ジャスティス──」
line = "「ねぇねぇ、お姉ちゃん、ジャスティス──」"

[[dialogue]]
speaker = "コハルコ"
# 「ジャスティス！？」
line = "「ジャスティス！？」"

[[dialogue]]
speaker = "トウコ"
# 「お姉ちゃん、どうかした？」
line = "「お姉ちゃん、どうかした？」"

[[dialogue]]
speaker = "コハルコ"
# 「あ、ううん、何でもない……」
line = "「あ、ううん、何でもない……」"

[[dialogue]]
speaker = "ナツコ"
# 「ジャスティスガールのポーチ、今クラスの女の子みんな持っててね、わたしも欲しいの！　ダメ？」
line = "「ジャスティスガールのポーチ、今クラスの女の子みんな持っててね、わたしも欲しいの！　ダメ？」"

[[dialogue]]
speaker = "コハルコ"
# 「ジャスティスガール？　ああ、この前始まったアニメだね。女の子が悪者をパンチで倒していくやつ」
line = "「ジャスティスガール？　ああ、この前始まったアニメだね。女の子が悪者をパンチで倒していくやつ」"

[[dialogue]]
speaker = "コハルコ"
# 「でもナツコはこの前新しいワンピース買ったからなー。どうしよっかな～」
line = "「でもナツコはこの前新しいワンピース買ったからなー。どうしよっかな～」"

[[dialogue]]
speaker = "ナツコ"
# 「いっぱいおうちのお手伝いするから～！　お皿洗いとかお風呂掃除とかするから！　ね、お願い？」
line = "「いっぱいおうちのお手伝いするから～！　お皿洗いとかお風呂掃除とかするから！　ね、お願い？」"

[[dialogue]]
speaker = "コハルコ"
# 「ふふ、じゃあそのお手伝い次第かな。トウコはジャスティスガール欲しくないの？」
line = "「ふふ、じゃあそのお手伝い次第かな。トウコはジャスティスガール欲しくないの？」"

[[dialogue]]
speaker = "トウコ"
# 「別に……そんなに好きじゃないし」
line = "「別に……そんなに好きじゃないし」"

[[dialogue]]
speaker = "コハルコ"
# 「トウコは相変わらずだね。もっとナツコみたいにいろいろ言ってもいいんだよ？」
line = "「トウコは相変わらずだね。もっとナツコみたいにいろいろ言ってもいいんだよ？」"

[[dialogue]]
speaker = "トウコ"
# 「我慢してるわけじゃないもん」
line = "「我慢してるわけじゃないもん」"

[[dialogue]]
speaker = "コハルコ"
# 「そっか。じゃあ欲しいものがあったらちゃんと言ってね」
line = "「そっか。じゃあ欲しいものがあったらちゃんと言ってね」"

[[dialogue]]
speaker = "unk"
# （仲のいい姉妹だ）
line = "（仲のいい姉妹だ）"

[[dialogue]]
speaker = "コハルコ"
# 「って、会長さんに荷物持たせっぱなしだったね。ごめんごめん」
line = "「って、会長さんに荷物持たせっぱなしだったね。ごめんごめん」"

[[dialogue]]
speaker = "コハルコ"
# 「家までもうちょっとだから、お茶でも飲んでいって。遠慮せずにくつろいでいってよ」
line = "「家までもうちょっとだから、お茶でも飲んでいって。遠慮せずにくつろいでいってよ」"
