[[dialogue]]
speaker = "unk"
# 第２話,ルルカのバレンタイン・後編,P
line = "第２話,ルルカのバレンタイン・後編,P"

[[dialogue]]
speaker = "unk"
# バレンタインの翌朝。
line = "バレンタインの翌朝。"

[[dialogue]]
speaker = "リーリア"
# 「ルルカちゃん、バレンタイン配信、大成功おめでと～！！」
line = "「ルルカちゃん、バレンタイン配信、大成功おめでと～！！」"

[[dialogue]]
speaker = "アナ"
# 「配信後にアップした新曲ＭＶも、わずか一晩で５０万再生を突破。話題になっていますね。ルカルカのチャンネル登録者数も一気に伸びそうで、グッジョブです」
line = "「配信後にアップした新曲ＭＶも、わずか一晩で５０万再生を突破。話題になっていますね。ルカルカのチャンネル登録者数も一気に伸びそうで、グッジョブです」"

[[dialogue]]
speaker = "ルルカ"
# 「それは嬉しいんだけど……例の激辛チョコを食べたシーンの切り抜きが、倍の１００万再生いってるのはちょっと不本意なんだけど！？」
line = "「それは嬉しいんだけど……例の激辛チョコを食べたシーンの切り抜きが、倍の１００万再生いってるのはちょっと不本意なんだけど！？」"

[[dialogue]]
speaker = "リーリア"
# 「でもその衣装、『バレンタインフォーム』っていうの？　マジカル可愛い～！　ＤＩＳＣで写真撮るから、こっちに目線お願いしま～す☆」
line = "「でもその衣装、『バレンタインフォーム』っていうの？　マジカル可愛い～！　ＤＩＳＣで写真撮るから、こっちに目線お願いしま～す☆」"

[[dialogue]]
speaker = "ルルカ"
# 「イェ～イ☆　キューッとウィンク～<emoji=heart04>」
line = "「イェ～イ☆　キューッとウィンク～<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
# 「――って、ルカルカになってる時の癖でつい反応しちゃった！」
line = "「――って、ルカルカになってる時の癖でつい反応しちゃった！」"

[[dialogue]]
speaker = "ルルカ"
# 「バレンタインフォームに覚醒したからサプライズで変身してみせたけど……撮影していいとは言ってないよ！？」
line = "「バレンタインフォームに覚醒したからサプライズで変身してみせたけど……撮影していいとは言ってないよ！？」"

[[dialogue]]
speaker = "unk"
# ルルカ、その衣装すごく可愛いぞ！
line = "ルルカ、その衣装すごく可愛いぞ！"

[[dialogue]]
speaker = "ルルカ"
# 「えっ！？　そ、そうかなぁ～？　えへへへぇ～<emoji=heart04>」
line = "「えっ！？　そ、そうかなぁ～？　えへへへぇ～<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
# 「お兄ちゃんがそう言うなら、もっと撮ってもいいよ～<emoji=heart04>　えへっ☆」
line = "「お兄ちゃんがそう言うなら、もっと撮ってもいいよ～<emoji=heart04>　えへっ☆」"

[[dialogue]]
speaker = "リーリア"
# 「私とセンパイへの反応の差が激しすぎるんですけど！？」
line = "「私とセンパイへの反応の差が激しすぎるんですけど！？」"

[[dialogue]]
speaker = "アナ"
# 「ルルカさん、会長にはちょろドルフィンですね」
line = "「ルルカさん、会長にはちょろドルフィンですね」"

[[dialogue]]
speaker = "unk"
# その日の放課後。俺はルルカとの約束で、リゾート結界のプライベートビーチに来ていた。
line = "その日の放課後。俺はルルカとの約束で、リゾート結界のプライベートビーチに来ていた。"

[[dialogue]]
speaker = "ルルカ"
# 「お兄ちゃん、それじゃあ今日は――恋人として付き合い出して、初めてのバレンタインということで～」
line = "「お兄ちゃん、それじゃあ今日は――恋人として付き合い出して、初めてのバレンタインということで～」"

[[dialogue]]
speaker = "ルルカ"
# 「はいっ♪　妹じゃなく、彼女としての愛を込めた、大本命のバレンタインチョコだよ<emoji=heart04>」
line = "「はいっ♪　妹じゃなく、彼女としての愛を込めた、大本命のバレンタインチョコだよ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ありがとう。すごく嬉しい！
line = "ありがとう。すごく嬉しい！"

[[dialogue]]
speaker = "ルルカ"
# 「えへへ<emoji=heart04>　配信準備でバタバタだったけど、手作りチョコもちゃんと間に合ってよかった～」
line = "「えへへ<emoji=heart04>　配信準備でバタバタだったけど、手作りチョコもちゃんと間に合ってよかった～」"

[[dialogue]]
speaker = "ルルカ"
# 「ん？　どうしたの、お兄ちゃん？　――朝に聞きそびれたことがあるって？」
line = "「ん？　どうしたの、お兄ちゃん？　――朝に聞きそびれたことがあるって？」"

[[dialogue]]
speaker = "unk"
# 俺は頷いた。ルルカがいつの間にバレンタインフォームに覚醒したのか、気になっていた。
line = "俺は頷いた。ルルカがいつの間にバレンタインフォームに覚醒したのか、気になっていた。"

[[dialogue]]
speaker = "ルルカ"
# 「実はバレンタイン前に、イクシーちゃんやトワちゃん先生とちょっと面白い事件があってね～。そこで覚醒したんだ♪」
line = "「実はバレンタイン前に、イクシーちゃんやトワちゃん先生とちょっと面白い事件があってね～。そこで覚醒したんだ♪」"

[[dialogue]]
speaker = "ルルカ"
# 「見た目がこうなってるのは、その時点でルカルカのバレンタイン衣装のデザインがもう決まってたから、水着フォームの時みたいにイメージが反映されたんだと思う♪」
line = "「見た目がこうなってるのは、その時点でルカルカのバレンタイン衣装のデザインがもう決まってたから、水着フォームの時みたいにイメージが反映されたんだと思う♪」"

[[dialogue]]
speaker = "ルルカ"
# 「フォーム覚醒の話はちょっと長くなるから、あとでゆっくり話すとして～」
line = "「フォーム覚醒の話はちょっと長くなるから、あとでゆっくり話すとして～」"

[[dialogue]]
speaker = "ルルカ"
# 「実はね、あたし、チョコ以外にも、お兄ちゃんにもう１つサプライズプレゼントを用意してるんだ♪」
line = "「実はね、あたし、チョコ以外にも、お兄ちゃんにもう１つサプライズプレゼントを用意してるんだ♪」"

[[dialogue]]
speaker = "ルルカ"
# 「何かっていうと――『歌』のプレゼント！　お兄ちゃん、聴いてくれる？」
line = "「何かっていうと――『歌』のプレゼント！　お兄ちゃん、聴いてくれる？」"

[[dialogue]]
speaker = "unk"
# ルルカは静かに息を整え、俺の前で歌い始めた。そして、俺は驚く。
line = "ルルカは静かに息を整え、俺の前で歌い始めた。そして、俺は驚く。"

[[dialogue]]
speaker = "unk"
# てっきり、昨日配信したバレンタインソングを生で披露してくれるのだと思っていた。しかし、彼女が歌ったのは、俺の知らないまったく別の曲だった。
line = "てっきり、昨日配信したバレンタインソングを生で披露してくれるのだと思っていた。しかし、彼女が歌ったのは、俺の知らないまったく別の曲だった。"

[[dialogue]]
speaker = "ルルカ"
# 「……ふぅ。――どうだった、お兄ちゃん？」
line = "「……ふぅ。――どうだった、お兄ちゃん？」"

[[dialogue]]
speaker = "unk"
# ルルカ、今の歌は……！？
line = "ルルカ、今の歌は……！？"

[[dialogue]]
speaker = "ルルカ"
# 「歌のタイトルはね――『海での約束をもう１度』。覚えてるかな？」
line = "「歌のタイトルはね――『海での約束をもう１度』。覚えてるかな？」"

[[dialogue]]
speaker = "ルルカ"
# 「あたしが前に言った、『海をモチーフにした恋の歌』のシリーズ第２弾だよ♪」
line = "「あたしが前に言った、『海をモチーフにした恋の歌』のシリーズ第２弾だよ♪」"

[[dialogue]]
speaker = "unk"
# 俺は頷いた。もちろん覚えている。前にも約束して、ルルカが作詞作曲して作り上げた初のオリジナル曲を聴かせてくれたことがあった。
line = "俺は頷いた。もちろん覚えている。前にも約束して、ルルカが作詞作曲して作り上げた初のオリジナル曲を聴かせてくれたことがあった。"

[[dialogue]]
speaker = "ルルカ"
# 「配信用にバレンタインソングを作ってる時に、お兄ちゃんにもサプライズしたいなって思いついて、作ったんだ♪」
line = "「配信用にバレンタインソングを作ってる時に、お兄ちゃんにもサプライズしたいなって思いついて、作ったんだ♪」"

[[dialogue]]
speaker = "ルルカ"
# 「バレンタインソングは、応援してくれるみんなへの『愛』を込めた曲。でも、それって恋人へのラブソングとはちょっと違うでしょ？」
line = "「バレンタインソングは、応援してくれるみんなへの『愛』を込めた曲。でも、それって恋人へのラブソングとはちょっと違うでしょ？」"

[[dialogue]]
speaker = "ルルカ"
# 「だから同時進行で作るのは大変だったけど……お兄ちゃんへの『好き』を一番伝えられるのは、やっぱり『歌』だって思ったから、頑張って２曲目を作ってみたの♪」
line = "「だから同時進行で作るのは大変だったけど……お兄ちゃんへの『好き』を一番伝えられるのは、やっぱり『歌』だって思ったから、頑張って２曲目を作ってみたの♪」"

[[dialogue]]
speaker = "ルルカ"
# 「お兄ちゃんへの<b>最新</b>のラブソング――ちゃんと届いたかな？」
line = "「お兄ちゃんへの<b>最新</b>のラブソング――ちゃんと届いたかな？」"

[[dialogue]]
speaker = "unk"
# ああ……もちろんだ！
line = "ああ……もちろんだ！"

[[dialogue]]
speaker = "unk"
# 感動で胸が熱くなり、俺は思わずルルカを抱きしめた。
line = "感動で胸が熱くなり、俺は思わずルルカを抱きしめた。"

[[dialogue]]
speaker = "ルルカ"
# 「あっ……！　えへへ……<emoji=heart04>　それなら、よかった♪」
line = "「あっ……！　えへへ……<emoji=heart04>　それなら、よかった♪」"

[[dialogue]]
speaker = "unk"
# ルルカ、好きだ。大好きだ……！
line = "ルルカ、好きだ。大好きだ……！"

[[dialogue]]
speaker = "ルルカ"
# 「お兄ちゃん、もしかしてちょっと泣いてる？　ふふっ♪」
line = "「お兄ちゃん、もしかしてちょっと泣いてる？　ふふっ♪」"

[[dialogue]]
speaker = "ルルカ"
# 「あたしも――お兄ちゃんのこと、大好きだよ<emoji=heart04>　これからもよろしくね」
line = "「あたしも――お兄ちゃんのこと、大好きだよ<emoji=heart04>　これからもよろしくね」"

[[dialogue]]
speaker = "ルルカ"
# 「ん～っ<emoji=heart04>　ちゅっ……<emoji=heart04>」
line = "「ん～っ<emoji=heart04>　ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そして俺たちはキスを交わし、海辺で甘く静かな時間をゆっくりと過ごすのだった。
line = "そして俺たちはキスを交わし、海辺で甘く静かな時間をゆっくりと過ごすのだった。"
