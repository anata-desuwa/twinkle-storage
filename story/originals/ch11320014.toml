[[dialogue]]
speaker = "unk"
# 第４話,緋宮家でのお茶会,P
line = "第４話,緋宮家でのお茶会,P"

[[dialogue]]
speaker = "unk"
# ケイティさんが人間界にやってきてからしばらくが経つ。
line = "ケイティさんが人間界にやってきてからしばらくが経つ。"

[[dialogue]]
speaker = "unk"
# 俺とケイティさんは休日に約束をして、頻繁に会って遊ぶような仲になっていた。
line = "俺とケイティさんは休日に約束をして、頻繁に会って遊ぶような仲になっていた。"

[[dialogue]]
speaker = "ケイティ"
# 「ここが魔王さんのお家なのですね～。お邪魔します～」
line = "「ここが魔王さんのお家なのですね～。お邪魔します～」"

[[dialogue]]
speaker = "ケイティ"
# 「ふふふ、楽しみです。魔王さんからお茶会に誘われるなんて思っていませんでしたから」
line = "「ふふふ、楽しみです。魔王さんからお茶会に誘われるなんて思っていませんでしたから」"

[[dialogue]]
speaker = "unk"
# ケイティさんに楽しんで欲しいです
line = "ケイティさんに楽しんで欲しいです"

[[dialogue]]
speaker = "unk"
# お茶会というほどのものではありませんけど
line = "お茶会というほどのものではありませんけど"

[[dialogue]]
speaker = "ケイティ"
# 「ありがとうございます♪」
line = "「ありがとうございます♪」"

[[dialogue]]
speaker = "ケイティ"
# 「まあまあ、お菓子もたくさん用意していただいたのですね～？」
line = "「まあまあ、お菓子もたくさん用意していただいたのですね～？」"

[[dialogue]]
speaker = "unk"
# 紅茶を淹れますよ
line = "紅茶を淹れますよ"

[[dialogue]]
speaker = "unk"
# どうぞ、座ってください
line = "どうぞ、座ってください"

[[dialogue]]
speaker = "ケイティ"
# 「ではお願いします～」
line = "「ではお願いします～」"

[[dialogue]]
speaker = "ケイティ"
# 「いい香り……こちらはアールグレイですね？　味も深みがあって……美味しいです～」
line = "「いい香り……こちらはアールグレイですね？　味も深みがあって……美味しいです～」"

[[dialogue]]
speaker = "ケイティ"
# 「お菓子の方もいただいていいのですか？　では、いただきます……」
line = "「お菓子の方もいただいていいのですか？　では、いただきます……」"

[[dialogue]]
speaker = "ケイティ"
# 「んんっ……！　こちらのマドレーヌ、とっても美味しいです～。初めて食べる味かもしれません」
line = "「んんっ……！　こちらのマドレーヌ、とっても美味しいです～。初めて食べる味かもしれません」"

[[dialogue]]
speaker = "ケイティ"
# 「一体どこのお店のマドレーヌでしょう？　ぜひ教えてくれませんか？」
line = "「一体どこのお店のマドレーヌでしょう？　ぜひ教えてくれませんか？」"

[[dialogue]]
speaker = "unk"
# これは俺が作りました
line = "これは俺が作りました"

[[dialogue]]
speaker = "ケイティ"
# 「魔王さんが？　なんて素晴らしい……こんな美味しくて紅茶にあうお菓子を作れるなんて……」
line = "「魔王さんが？　なんて素晴らしい……こんな美味しくて紅茶にあうお菓子を作れるなんて……」"

[[dialogue]]
speaker = "ケイティ"
# 「んっ……こちらのきなこクッキーも美味しいです～♪」
line = "「んっ……こちらのきなこクッキーも美味しいです～♪」"

[[dialogue]]
speaker = "ケイティ"
# 「まあ、こちらは星徒会メンバーのマトイさんという方が作られたのですね～？」
line = "「まあ、こちらは星徒会メンバーのマトイさんという方が作られたのですね～？」"

[[dialogue]]
speaker = "ケイティ"
# 「スイーツと言えば有名な桜十路サランさんも学園にいらっしゃいますし……」
line = "「スイーツと言えば有名な桜十路サランさんも学園にいらっしゃいますし……」"

[[dialogue]]
speaker = "ケイティ"
# 「こんな美味しいお菓子に囲まれていたら、毎日でもお茶会を開きたくなってしまいませんか？」
line = "「こんな美味しいお菓子に囲まれていたら、毎日でもお茶会を開きたくなってしまいませんか？」"

[[dialogue]]
speaker = "ケイティ"
# 「ふふ、困ってしまいますね～。こんなに人間界の素敵なところを見せられてしまうと、天界に帰りづらくなってしまいます……」
line = "「ふふ、困ってしまいますね～。こんなに人間界の素敵なところを見せられてしまうと、天界に帰りづらくなってしまいます……」"

[[dialogue]]
speaker = "unk"
# 聖庭園のお茶会に招待してください
line = "聖庭園のお茶会に招待してください"

[[dialogue]]
speaker = "unk"
# 今度は俺が天界に行きますよ
line = "今度は俺が天界に行きますよ"

[[dialogue]]
speaker = "ケイティ"
# 「そうですね。ぜひお招きさせていただきます♪」
line = "「そうですね。ぜひお招きさせていただきます♪」"

[[dialogue]]
speaker = "ケイティ"
# 「その時はメルエルちゃんや、ナターシャちゃんとも一緒にできるといいですね～……」
line = "「その時はメルエルちゃんや、ナターシャちゃんとも一緒にできるといいですね～……」"

[[dialogue]]
speaker = "ケイティ"
# 「私がどうして聖庭園の衛兵になったのか──ですか？」
line = "「私がどうして聖庭園の衛兵になったのか──ですか？」"

[[dialogue]]
speaker = "unk"
# ケイティさんはお嬢様なのでしょう？
line = "ケイティさんはお嬢様なのでしょう？"

[[dialogue]]
speaker = "ケイティ"
# 「そうですね……お嬢様かどうかは分かりませんが、私はお父さまやお母さまからいっぱいの愛情をいただいて育ちました」
line = "「そうですね……お嬢様かどうかは分かりませんが、私はお父さまやお母さまからいっぱいの愛情をいただいて育ちました」"

[[dialogue]]
speaker = "ケイティ"
# 「そんな敬愛するお父さまとお母さまから教わったのが『平和の尊さ』についてです」
line = "「そんな敬愛するお父さまとお母さまから教わったのが『平和の尊さ』についてです」"

[[dialogue]]
speaker = "ケイティ"
# 「平和がどれだけ素晴らしいものであるか、かけがえの無いものであるか……私は幼いころよりずっと学んできました」
line = "「平和がどれだけ素晴らしいものであるか、かけがえの無いものであるか……私は幼いころよりずっと学んできました」"

[[dialogue]]
speaker = "ケイティ"
# 「だから『聖庭園の平和を守るためのお仕事がある』と聞いた時、私は私の進むべき道がはっきりと見えたように思ったのです」
line = "「だから『聖庭園の平和を守るためのお仕事がある』と聞いた時、私は私の進むべき道がはっきりと見えたように思ったのです」"

[[dialogue]]
speaker = "ケイティ"
# 「私の決意を聞き、お父さまもお母さまも最初は驚き心配していましたが、最後は２人とも応援してくれました」
line = "「私の決意を聞き、お父さまもお母さまも最初は驚き心配していましたが、最後は２人とも応援してくれました」"

[[dialogue]]
speaker = "ケイティ"
# 「幸い、私には星騎士としての資質があったようで、隊長という名誉な地位を与えてもらっています」
line = "「幸い、私には星騎士としての資質があったようで、隊長という名誉な地位を与えてもらっています」"

[[dialogue]]
speaker = "unk"
# 全ては平和のためなんですね
line = "全ては平和のためなんですね"

[[dialogue]]
speaker = "ケイティ"
# 「はい♪」
line = "「はい♪」"

[[dialogue]]
speaker = "ケイティ"
# 「みんなが幸せになるためには、世界が平和であらねばなりません」
line = "「みんなが幸せになるためには、世界が平和であらねばなりません」"

[[dialogue]]
speaker = "ケイティ"
# 「私はそのために戦いたいです」
line = "「私はそのために戦いたいです」"

[[dialogue]]
speaker = "ケイティ"
# 「でも、矛盾していることもわかっています……私も本当は戦いたくはありませんから」
line = "「でも、矛盾していることもわかっています……私も本当は戦いたくはありませんから」"

[[dialogue]]
speaker = "ケイティ"
# 「争いは何も生みません。みんなが仲良くして、傷つけ合うことなく平和に過ごせればそれが一番だと思っています」
line = "「争いは何も生みません。みんなが仲良くして、傷つけ合うことなく平和に過ごせればそれが一番だと思っています」"

[[dialogue]]
speaker = "ケイティ"
# 「けれど、現実はそうはいきません……戦いの場でそれを知るたびに、悲しい気持ちになってしまうんです」
line = "「けれど、現実はそうはいきません……戦いの場でそれを知るたびに、悲しい気持ちになってしまうんです」"

[[dialogue]]
speaker = "ケイティ"
# 「あっ、すみません！　勝手に落ち込んでしまいました……」
line = "「あっ、すみません！　勝手に落ち込んでしまいました……」"

[[dialogue]]
speaker = "unk"
# 俺は尊敬します
line = "俺は尊敬します"

[[dialogue]]
speaker = "unk"
# それだけ真剣だということですから
line = "それだけ真剣だということですから"

[[dialogue]]
speaker = "unk"
# 思わずケイティさんの手を取って強く握ってしまう。
line = "思わずケイティさんの手を取って強く握ってしまう。"

[[dialogue]]
speaker = "unk"
# そして、自分のしてしまった事に気付いて慌てて手を離した。
line = "そして、自分のしてしまった事に気付いて慌てて手を離した。"

[[dialogue]]
speaker = "ケイティ"
# 「ふふっ、いいえ……ありがとうございます♪」
line = "「ふふっ、いいえ……ありがとうございます♪」"

[[dialogue]]
speaker = "ケイティ"
# 「魔王さんからそう言ってもらえると、私もとても救われた気持ちになりますね～」
line = "「魔王さんからそう言ってもらえると、私もとても救われた気持ちになりますね～」"

[[dialogue]]
speaker = "unk"
# ケイティさんの手は、あの無骨な大剣を振り回しているとは思えないほど滑らかで柔らかかった。
line = "ケイティさんの手は、あの無骨な大剣を振り回しているとは思えないほど滑らかで柔らかかった。"

[[dialogue]]
speaker = "unk"
# 手のひらに残ったぬくもりを感じつつ、早鐘をうつ心臓を懸命に抑えようとするのだった。
line = "手のひらに残ったぬくもりを感じつつ、早鐘をうつ心臓を懸命に抑えようとするのだった。"
