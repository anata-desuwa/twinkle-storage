[[dialogue]]
speaker = "unk"
# 第２話,新メニュー開発！,P
line = "第２話,新メニュー開発！,P"

[[dialogue]]
speaker = "リップル"
# 「クリスマスは、リゾート結界にあまりお客サン来てくれませーん……」
line = "「クリスマスは、リゾート結界にあまりお客サン来てくれませーん……」"

[[dialogue]]
speaker = "リップル"
# 「そこで、クリスマスにお客サンがリゾート結界に来たくナルような、海の家のクリスマスメニューをモネと考えていたのデスが……うまくイキません」
line = "「そこで、クリスマスにお客サンがリゾート結界に来たくナルような、海の家のクリスマスメニューをモネと考えていたのデスが……うまくイキません」"

[[dialogue]]
speaker = "モネ"
# 「お力になれなくて、すみません……」
line = "「お力になれなくて、すみません……」"

[[dialogue]]
speaker = "リップル"
# 「ですから、いろんなアルバイトをしてきたカイチョーにも協力してホシイです！」
line = "「ですから、いろんなアルバイトをしてきたカイチョーにも協力してホシイです！」"

[[dialogue]]
speaker = "unk"
# 俺にできることなら喜んで！
line = "俺にできることなら喜んで！"

[[dialogue]]
speaker = "リップル"
# 「アリガトございます！　カイチョーがいればヒャクニンリキでーす！」
line = "「アリガトございます！　カイチョーがいればヒャクニンリキでーす！」"

[[dialogue]]
speaker = "unk"
# モネとどんなメニューを考えていたの？
line = "モネとどんなメニューを考えていたの？"

[[dialogue]]
speaker = "リップル"
# 「ハイ！　ひとつめはサンタクロースの激辛ケーキでーす！」
line = "「ハイ！　ひとつめはサンタクロースの激辛ケーキでーす！」"

[[dialogue]]
speaker = "モネ"
# 「デフォルメしたサンタクロースの形をしていて、赤い部分が辛くなっている、というメニューなんですけど……」
line = "「デフォルメしたサンタクロースの形をしていて、赤い部分が辛くなっている、というメニューなんですけど……」"

[[dialogue]]
speaker = "リップル"
# 「モネ以外食べられマセンでした……」
line = "「モネ以外食べられマセンでした……」"

[[dialogue]]
speaker = "モネ"
# 「それに赤くない部分は普通に甘いので、全体としてはあまり美味しくなかったです……。世界にはスパイスを使ったチョコレートもあるので、いけるかもと思ったんですが」
line = "「それに赤くない部分は普通に甘いので、全体としてはあまり美味しくなかったです……。世界にはスパイスを使ったチョコレートもあるので、いけるかもと思ったんですが」"

[[dialogue]]
speaker = "リップル"
# 「他にはモネのアイデアで、トナカイ料理も考えたのデスが……」
line = "「他にはモネのアイデアで、トナカイ料理も考えたのデスが……」"

[[dialogue]]
speaker = "unk"
# トナカイって食べられるの？
line = "トナカイって食べられるの？"

[[dialogue]]
speaker = "モネ"
# 「はい。トナカイを家畜にしている地域では、ソリを引かせるだけでなく、食肉用としても飼育しています」
line = "「はい。トナカイを家畜にしている地域では、ソリを引かせるだけでなく、食肉用としても飼育しています」"

[[dialogue]]
speaker = "モネ"
# 「祖父は食べたことがあるそうで、臭みもなくて美味しいって言っていました」
line = "「祖父は食べたことがあるそうで、臭みもなくて美味しいって言っていました」"

[[dialogue]]
speaker = "モネ"
# 「それに、トナカイはシカの仲間ですから。鹿肉はジビエでよく食されていますよね」
line = "「それに、トナカイはシカの仲間ですから。鹿肉はジビエでよく食されていますよね」"

[[dialogue]]
speaker = "リップル"
# 「でも、トナカイはサンタのソリ引きます！　ミンナのために働いているのに食べるのカワイソウです！」
line = "「でも、トナカイはサンタのソリ引きます！　ミンナのために働いているのに食べるのカワイソウです！」"

[[dialogue]]
speaker = "モネ"
# 「……と、馴染みのない地域では、心理的に抵抗がある人もいるのでやめておこうということになりました」
line = "「……と、馴染みのない地域では、心理的に抵抗がある人もいるのでやめておこうということになりました」"

[[dialogue]]
speaker = "モネ"
# 「トナカイ肉を結界で再現するとしても、そもそもリップルさんがトナカイ肉を食べないといけないので、いろいろと難度が高いです……」
line = "「トナカイ肉を結界で再現するとしても、そもそもリップルさんがトナカイ肉を食べないといけないので、いろいろと難度が高いです……」"

[[dialogue]]
speaker = "リップル"
# 「最後はコレ！　リゾート結界特製ドキドキプレゼントボックスです！　中にランダムでおもちゃやプレゼントがハイッテます♪」
line = "「最後はコレ！　リゾート結界特製ドキドキプレゼントボックスです！　中にランダムでおもちゃやプレゼントがハイッテます♪」"

[[dialogue]]
speaker = "unk"
# 面白そう！
line = "面白そう！"

[[dialogue]]
speaker = "モネ"
# 「あ、ちょっと待ってください、それは──」
line = "「あ、ちょっと待ってください、それは──」"

[[dialogue]]
speaker = "unk"
# 俺がプレゼントを開封しようとした瞬間、閃光とともに爆発した。
line = "俺がプレゼントを開封しようとした瞬間、閃光とともに爆発した。"

[[dialogue]]
speaker = "モネ"
# 「たまに爆発するので、危険だからダメって言ったんです」
line = "「たまに爆発するので、危険だからダメって言ったんです」"

[[dialogue]]
speaker = "リップル"
# 「人体に害はないカヤクですよ？」
line = "「人体に害はないカヤクですよ？」"

[[dialogue]]
speaker = "モネ"
# 「それでもダメです。ビックリしてひっくり返ったら、頭を打ったりしますから」
line = "「それでもダメです。ビックリしてひっくり返ったら、頭を打ったりしますから」"

[[dialogue]]
speaker = "リップル"
# 「ウーン、ワタシは面白いとオモったのですが……」
line = "「ウーン、ワタシは面白いとオモったのですが……」"

[[dialogue]]
speaker = "モネ"
# 「こんな感じで、新メニュー開発に苦慮している状態でして……」
line = "「こんな感じで、新メニュー開発に苦慮している状態でして……」"

[[dialogue]]
speaker = "リップル"
# 「カイチョー！　何かいいアイデアはナイですか！？」
line = "「カイチョー！　何かいいアイデアはナイですか！？」"

[[dialogue]]
speaker = "unk"
# 海の家に元からあるメニューを改良するとか？
line = "海の家に元からあるメニューを改良するとか？"

[[dialogue]]
speaker = "リップル"
# 「ナルホド！　クリスマスバージョンにスルのですね！」
line = "「ナルホド！　クリスマスバージョンにスルのですね！」"

[[dialogue]]
speaker = "モネ"
# 「じゃあカレーを──」
line = "「じゃあカレーを──」"

[[dialogue]]
speaker = "リップル"
# 「カライのはキャッカですっ」
line = "「カライのはキャッカですっ」"

[[dialogue]]
speaker = "モネ"
# 「先手を打たれた！？」
line = "「先手を打たれた！？」"

[[dialogue]]
speaker = "リップル"
# 「でもカレーをクリスマスバージョンにするのはイイですね。どんなスペシャルにしましょーか？」
line = "「でもカレーをクリスマスバージョンにするのはイイですね。どんなスペシャルにしましょーか？」"

[[dialogue]]
speaker = "リップル"
# 「お客サンが楽しめるメニューがイイとオモウのですが……」
line = "「お客サンが楽しめるメニューがイイとオモウのですが……」"

[[dialogue]]
speaker = "unk"
# リップルが楽しいものって何？
line = "リップルが楽しいものって何？"

[[dialogue]]
speaker = "リップル"
# 「サーフィンです！　波に乗るソウカイカンはサイコーです！」
line = "「サーフィンです！　波に乗るソウカイカンはサイコーです！」"

[[dialogue]]
speaker = "リップル"
# 「──！　今、ヒラメキました……イメージがワイテきまーす……」
line = "「──！　今、ヒラメキました……イメージがワイテきまーす……」"

[[dialogue]]
speaker = "リップル"
# 「イイコト考えました！　モネ、チョット手伝ってください！」
line = "「イイコト考えました！　モネ、チョット手伝ってください！」"

[[dialogue]]
speaker = "モネ"
# 「私ですかっ？　お役に立てればいいですけど……」
line = "「私ですかっ？　お役に立てればいいですけど……」"

[[dialogue]]
speaker = "リップル"
# 「カイチョー、少しマッテテくださいね！」
line = "「カイチョー、少しマッテテくださいね！」"

[[dialogue]]
speaker = "unk"
# そうして出来あがったのは──
line = "そうして出来あがったのは──"

[[dialogue]]
speaker = "リップル"
# 「デキました！　特製『波乗りサンタカレー』です！　青いルーを海に見立てて、そこにサンタの飾りをノセました♪」
line = "「デキました！　特製『波乗りサンタカレー』です！　青いルーを海に見立てて、そこにサンタの飾りをノセました♪」"

[[dialogue]]
speaker = "リップル"
# 「飾りはモネに作ってモライました。モネはとっても器用です♪」
line = "「飾りはモネに作ってモライました。モネはとっても器用です♪」"

[[dialogue]]
speaker = "モネ"
# 「いつも本の修繕をしているおかげですかね。思ったより上手くできました」
line = "「いつも本の修繕をしているおかげですかね。思ったより上手くできました」"

[[dialogue]]
speaker = "リップル"
# 「味も自信作ですよ♪　タベテみてください♪　あ～ん♪」
line = "「味も自信作ですよ♪　タベテみてください♪　あ～ん♪」"

[[dialogue]]
speaker = "unk"
# ちゃんとカレーの味で美味しい！
line = "ちゃんとカレーの味で美味しい！"

[[dialogue]]
speaker = "リップル"
# 「デスよね～♪　ワタシにもタベさせてください♪　あ～……んっ♪」
line = "「デスよね～♪　ワタシにもタベさせてください♪　あ～……んっ♪」"

[[dialogue]]
speaker = "リップル"
# 「ん～っ、ワレながらよくデキました♪　カイチョーにタベさせてもらうとＢＩＧオイシイで～す♪」
line = "「ん～っ、ワレながらよくデキました♪　カイチョーにタベさせてもらうとＢＩＧオイシイで～す♪」"

[[dialogue]]
speaker = "モネ"
# 「当然のようにお互いあ～んしてる……すごい……」
line = "「当然のようにお互いあ～んしてる……すごい……」"

[[dialogue]]
speaker = "リップル"
# 「あ、ホッペタにご飯粒がツイテまーす。動かナイでくださいね……」
line = "「あ、ホッペタにご飯粒がツイテまーす。動かナイでくださいね……」"

[[dialogue]]
speaker = "リップル"
# 「チュッ♪」
line = "「チュッ♪」"

[[dialogue]]
speaker = "モネ"
# 「しかもキスまで……！？」
line = "「しかもキスまで……！？」"

[[dialogue]]
speaker = "リップル"
# 「カイチョーのおかげでクリスマスメニューがデキました。アリガトございます！」
line = "「カイチョーのおかげでクリスマスメニューがデキました。アリガトございます！」"

[[dialogue]]
speaker = "リップル"
# 「いつもワタシの力になってくれて、カイチョーのことダイスキです♪」
line = "「いつもワタシの力になってくれて、カイチョーのことダイスキです♪」"
