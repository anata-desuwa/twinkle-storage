[[dialogue]]
speaker = "unk"
# 第２話,影を渡るモノ,P
line = "第２話,影を渡るモノ,P"

[[dialogue]]
speaker = "unk"
# 特殊なモンスターの捜索と討伐の依頼を受けたゴールデングース。
line = "特殊なモンスターの捜索と討伐の依頼を受けたゴールデングース。"

[[dialogue]]
speaker = "unk"
# そのモンスターにはある特徴があって──
line = "そのモンスターにはある特徴があって──"

[[dialogue]]
speaker = "ミウ"
# 「目を離すと、一瞬の隙に逃げられてしまうんだそうです。溶けるように、すーって」
line = "「目を離すと、一瞬の隙に逃げられてしまうんだそうです。溶けるように、すーって」"

[[dialogue]]
speaker = "ヒマワリ"
# 「なにそれー、お化けみたいだね」
line = "「なにそれー、お化けみたいだね」"

[[dialogue]]
speaker = "セナリィ"
# 「ここにいるのは間違いないのでしょう？　手分けして探すとしましょう。発見次第、速やかに連絡するように」
line = "「ここにいるのは間違いないのでしょう？　手分けして探すとしましょう。発見次第、速やかに連絡するように」"

[[dialogue]]
speaker = "ミウ"
# 「でも、セナリィ社長、下手に戦力を分散すると、各個撃破される危険性が……」
line = "「でも、セナリィ社長、下手に戦力を分散すると、各個撃破される危険性が……」"

[[dialogue]]
speaker = "ヒマワリ"
# 「大丈夫だよ、ミウ。そういうヘンテコ系能力の敵って、戦闘力はそんな高くないってのがセオリーじゃん。倒せるようならやっちゃお！」
line = "「大丈夫だよ、ミウ。そういうヘンテコ系能力の敵って、戦闘力はそんな高くないってのがセオリーじゃん。倒せるようならやっちゃお！」"

[[dialogue]]
speaker = "セナリィ"
# 「時間は限られてますわ。怪しいところを発見次第、コール。合流して叩きます。くれぐれも無茶は禁物ですわよ」
line = "「時間は限られてますわ。怪しいところを発見次第、コール。合流して叩きます。くれぐれも無茶は禁物ですわよ」"

[[dialogue]]
speaker = "ヒマワリ＆ミウ"
# 「はいっ！」
line = "「はいっ！」"

[[dialogue]]
speaker = "unk"
# 俺たちは手分けして、神出鬼没なモンスターの捜索へと赴く。
line = "俺たちは手分けして、神出鬼没なモンスターの捜索へと赴く。"

[[dialogue]]
speaker = "ヒマワリ"
# 「どこだーい、モンスターちゃーん。ひゅーっ、ゾンビゲームみたいで、ドッキドキするー」
line = "「どこだーい、モンスターちゃーん。ひゅーっ、ゾンビゲームみたいで、ドッキドキするー」"

[[dialogue]]
speaker = "セナリィ"
# 『こちら、セナリィ、敵影なしですわ。どうぞ』
line = "『こちら、セナリィ、敵影なしですわ。どうぞ』"

[[dialogue]]
speaker = "ミウ"
# 『こちら、ミウ、同じく敵影なしです。どうぞ』
line = "『こちら、ミウ、同じく敵影なしです。どうぞ』"

[[dialogue]]
speaker = "ヒマワリ"
# 「こちら、ヒマワリ。問題なし。どうぞ」
line = "「こちら、ヒマワリ。問題なし。どうぞ」"

[[dialogue]]
speaker = "モンスター"
# 「──────」
line = "「──────」"

[[dialogue]]
speaker = "ヒマワリ"
# 「──えっ、影の中からっ──んんぐぅっ！？」
line = "「──えっ、影の中からっ──んんぐぅっ！？」"

[[dialogue]]
speaker = "ヒマワリ"
# （舐めプしすぎたっ……！　手ぇ動かないし、口塞がれて、声も、出せなっ──）
line = "（舐めプしすぎたっ……！　手ぇ動かないし、口塞がれて、声も、出せなっ──）"

[[dialogue]]
speaker = "ヒマワリ"
# （な、なにこれっ……影の中に、引きずり込まれるっ……！　やだやだやだやだっ！　怖い怖い怖いってぇ！）
line = "（な、なにこれっ……影の中に、引きずり込まれるっ……！　やだやだやだやだっ！　怖い怖い怖いってぇ！）"

[[dialogue]]
speaker = "ヒマワリ"
# （やっ、嘘っ、あたし、死んじゃうのっ……！？　こんな一瞬で──）
line = "（やっ、嘘っ、あたし、死んじゃうのっ……！？　こんな一瞬で──）"

[[dialogue]]
speaker = "unk"
# ヒマワリっ！
line = "ヒマワリっ！"

[[dialogue]]
speaker = "モンスター"
# 「────ッ！」
line = "「────ッ！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「ぅえほっ！　えほっ！　えほっ！？　な、なにがあったの……？　あたし、助かった……？」
line = "「ぅえほっ！　えほっ！　えほっ！？　な、なにがあったの……？　あたし、助かった……？」"

[[dialogue]]
speaker = "unk"
# 大丈夫か！？
line = "大丈夫か！？"

[[dialogue]]
speaker = "ヒマワリ"
# 「会長、さんっ……！？」
line = "「会長、さんっ……！？」"

[[dialogue]]
speaker = "unk"
# ごめん、ヒマワリを尾けていた
line = "ごめん、ヒマワリを尾けていた"

[[dialogue]]
speaker = "ヒマワリ"
# 「おとり捜査ってやつ……？　会長さん、ひどいことするじゃん……ミウと良い勝負だよ」
line = "「おとり捜査ってやつ……？　会長さん、ひどいことするじゃん……ミウと良い勝負だよ」"

[[dialogue]]
speaker = "ヒマワリ"
# 「でも、すぐに助けてくれたから許してあげる！」
line = "「でも、すぐに助けてくれたから許してあげる！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「こんにゃろー！　いたいけな少女をまるっと飲み込もうとか鬼畜な趣味してんじゃん！　絶～～っ対、許さないからねっ！」
line = "「こんにゃろー！　いたいけな少女をまるっと飲み込もうとか鬼畜な趣味してんじゃん！　絶～～っ対、許さないからねっ！」"

[[dialogue]]
speaker = "モンスター"
# 「────！！」
line = "「────！！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「はぁ、はぁっ……やっつけたぁ……！　こちら、ヒマワリ……対象モンスターを撃破。どうぞ」
line = "「はぁ、はぁっ……やっつけたぁ……！　こちら、ヒマワリ……対象モンスターを撃破。どうぞ」"

[[dialogue]]
speaker = "ミウ"
# 『えっ、大丈夫だった！？』
line = "『えっ、大丈夫だった！？』"

[[dialogue]]
speaker = "ヒマワリ"
# 「平気、平気。会長さんが助けてくれたから」
line = "「平気、平気。会長さんが助けてくれたから」"

[[dialogue]]
speaker = "セナリィ"
# 『私が倒したかったですけど、お疲れさま、ヒマワリ。先ほど決めた場所で落ち合いましょう』
line = "『私が倒したかったですけど、お疲れさま、ヒマワリ。先ほど決めた場所で落ち合いましょう』"

[[dialogue]]
speaker = "ヒマワリ"
# 「……ふう、ありがとね、会長さん」
line = "「……ふう、ありがとね、会長さん」"

[[dialogue]]
speaker = "unk"
# ヒマワリが無事で良かったよ
line = "ヒマワリが無事で良かったよ"

[[dialogue]]
speaker = "ヒマワリ"
# 「っ……！　ぅえ、ふぇ、ぅえぇえぇぇぇぇっ！」
line = "「っ……！　ぅえ、ふぇ、ぅえぇえぇぇぇぇっ！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「っうぇ……怖かった……怖かったよぉ……！　助けてくれて、ありがと、ありがと、会長さぁん……！」
line = "「っうぇ……怖かった……怖かったよぉ……！　助けてくれて、ありがと、ありがと、会長さぁん……！」"

[[dialogue]]
speaker = "unk"
# 縋りつくヒマワリの涙が収まるまで、俺は胸を貸してあげた。
line = "縋りつくヒマワリの涙が収まるまで、俺は胸を貸してあげた。"

[[dialogue]]
speaker = "ヒマワリ"
# 「うぅぅ、恥ずかしいところ見られちゃったな……」
line = "「うぅぅ、恥ずかしいところ見られちゃったな……」"

[[dialogue]]
speaker = "unk"
# 治まった？
line = "治まった？"

[[dialogue]]
speaker = "ヒマワリ"
# 「……うん、油断してたあたしが悪かったです。次はもっとしっかりします」
line = "「……うん、油断してたあたしが悪かったです。次はもっとしっかりします」"

[[dialogue]]
speaker = "ヒマワリ"
# 「会長さんたちも、今まで何度も怖い目に遭ってきたんですよね……？」
line = "「会長さんたちも、今まで何度も怖い目に遭ってきたんですよね……？」"

[[dialogue]]
speaker = "unk"
# そうだね、数えきれないくらい
line = "そうだね、数えきれないくらい"

[[dialogue]]
speaker = "ヒマワリ"
# 「そう、ですよね……強くなるには一度や二度くらいのピンチでビビッてらんないですよね！　よーし、もっと気合入れてこ！」
line = "「そう、ですよね……強くなるには一度や二度くらいのピンチでビビッてらんないですよね！　よーし、もっと気合入れてこ！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「じゃ、みんなのところに戻りま──あっ、会長さん！」
line = "「じゃ、みんなのところに戻りま──あっ、会長さん！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「あたしが怖くて泣いちゃったの……みんなには絶対に内緒ですからね……！？」
line = "「あたしが怖くて泣いちゃったの……みんなには絶対に内緒ですからね……！？」"

[[dialogue]]
speaker = "unk"
# こうして、ヒマワリと俺は２人だけの秘密を共有することになったのである。
line = "こうして、ヒマワリと俺は２人だけの秘密を共有することになったのである。"
