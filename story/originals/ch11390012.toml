[[dialogue]]
speaker = "unk"
# 第２話,ヴィーナスと星見姉妹,P
line = "第２話,ヴィーナスと星見姉妹,P"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「パパ、私ね、やってみたいことがあるの！」
line = "「パパ、私ね、やってみたいことがあるの！」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「前にパパが女の子に変身して、附属校に通ってたことがあったでしょ？」
line = "「前にパパが女の子に変身して、附属校に通ってたことがあったでしょ？」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「私もあれと同じように、附属校に通ってみたいわ！」
line = "「私もあれと同じように、附属校に通ってみたいわ！」"

[[dialogue]]
speaker = "unk"
# ――と、そんなやりとりがあり、あっという間に附属校への体験転入を始めてしまったヴィーナス。
line = "――と、そんなやりとりがあり、あっという間に附属校への体験転入を始めてしまったヴィーナス。"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「パパ、ただいま～♪」
line = "「パパ、ただいま～♪」"

[[dialogue]]
speaker = "unk"
# おかえり。附属校はどうだった？
line = "おかえり。附属校はどうだった？"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「すっごく楽しかったわ！　それでね、同じクラスに――」
line = "「すっごく楽しかったわ！　それでね、同じクラスに――」"

[[dialogue]]
speaker = "アポロ"
# 「ヴィーナス～！」
line = "「ヴィーナス～！」"

[[dialogue]]
speaker = "unk"
# そう言って星徒会室に駆け込んできたのは、なんとアポロだった。
line = "そう言って星徒会室に駆け込んできたのは、なんとアポロだった。"

[[dialogue]]
speaker = "アポロ"
# 「ヤバイぞ！　すぐそこのスーパー、ポテトチップスが半額らしい！　早く買いに行こうぜ！」
line = "「ヤバイぞ！　すぐそこのスーパー、ポテトチップスが半額らしい！　早く買いに行こうぜ！」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「本当！？　それってつまり、いつもと同じお金で倍の量を買えるってことよね！？」
line = "「本当！？　それってつまり、いつもと同じお金で倍の量を買えるってことよね！？」"

[[dialogue]]
speaker = "アポロ"
# 「あっ、そうか！　そう考えたら、２個買った方が得だな！」
line = "「あっ、そうか！　そう考えたら、２個買った方が得だな！」"

[[dialogue]]
speaker = "アポロ"
# 「いや待てよ……ってことは、お互いに２個ずつ別の味を買って分け合えば、４倍楽しめるってことじゃねーか！？」
line = "「いや待てよ……ってことは、お互いに２個ずつ別の味を買って分け合えば、４倍楽しめるってことじゃねーか！？」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「さすがアポロ、天才ね！」
line = "「さすがアポロ、天才ね！」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「あっ、私も思いついたわ！　それ、パパの分も買えば、６倍になるんじゃないかしら！？」
line = "「あっ、私も思いついたわ！　それ、パパの分も買えば、６倍になるんじゃないかしら！？」"

[[dialogue]]
speaker = "アポロ"
# 「おいおいヴィーナス、お前、閃きの天才か！？　ひゃっほーい！　なら今日は、みんなでポテトパーティーだぜ～♪」
line = "「おいおいヴィーナス、お前、閃きの天才か！？　ひゃっほーい！　なら今日は、みんなでポテトパーティーだぜ～♪」"

[[dialogue]]
speaker = "unk"
# いや仲いいな、２人共！
line = "いや仲いいな、２人共！"

[[dialogue]]
speaker = "アポロ"
# 「よう、魔王！　今日附属校の方で、ヴィーナスと改めて仲よくなったぞ！」
line = "「よう、魔王！　今日附属校の方で、ヴィーナスと改めて仲よくなったぞ！」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「実は附属校で、アポロと同じクラスになったのよ♪」
line = "「実は附属校で、アポロと同じクラスになったのよ♪」"

[[dialogue]]
speaker = "unk"
# そういえば、アポロはフィオナの姉ではあるが……目覚めるまでは体の成長が止まっていた為、現在は附属校の１年生として学園生活を送っている。
line = "そういえば、アポロはフィオナの姉ではあるが……目覚めるまでは体の成長が止まっていた為、現在は附属校の１年生として学園生活を送っている。"

[[dialogue]]
speaker = "アポロ"
# 「いや～、でもまさか、ヴィーナスの体が小さくなって附属校に来るなんてな～。テンションの上がるサプライズだったぜ！」
line = "「いや～、でもまさか、ヴィーナスの体が小さくなって附属校に来るなんてな～。テンションの上がるサプライズだったぜ！」"

[[dialogue]]
speaker = "unk"
# ヴィーナスは附属校の１年生として体験転入することになったので、そこでたまたま、アポロと同じクラスになったようだ。
line = "ヴィーナスは附属校の１年生として体験転入することになったので、そこでたまたま、アポロと同じクラスになったようだ。"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「――それでね、アポロと放課後、２人で遊ぶ約束をしてたの♪」
line = "「――それでね、アポロと放課後、２人で遊ぶ約束をしてたの♪」"

[[dialogue]]
speaker = "アポロ"
# 「前からヴィーナスとは気が合うと思ってたんだ！　せっかくクラスメイトにもなったわけだし、いい機会だったからな！」
line = "「前からヴィーナスとは気が合うと思ってたんだ！　せっかくクラスメイトにもなったわけだし、いい機会だったからな！」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「そうね♪　私たち、これからもっと仲よしになれそうな気がするわ！」
line = "「そうね♪　私たち、これからもっと仲よしになれそうな気がするわ！」"

[[dialogue]]
speaker = "アポロ"
# 「ああ！　家でポテトパーティーをしながら、一緒に流星ライダーを観ようぜ！」
line = "「ああ！　家でポテトパーティーをしながら、一緒に流星ライダーを観ようぜ！」"

[[dialogue]]
speaker = "unk"
# それから、俺も一緒にスーパーへ行って、大量の半額ポテトチップスを買い込み、星見家へお邪魔することになった。
line = "それから、俺も一緒にスーパーへ行って、大量の半額ポテトチップスを買い込み、星見家へお邪魔することになった。"

[[dialogue]]
speaker = "フィオナ"
# 「姉さん、ただいま帰りました～」
line = "「姉さん、ただいま帰りました～」"

[[dialogue]]
speaker = "アポロ"
# 「おう、フィオナ、お帰り～！　もぐもぐ……お前も一緒にポテトパーティーやろうぜ！」
line = "「おう、フィオナ、お帰り～！　もぐもぐ……お前も一緒にポテトパーティーやろうぜ！」"

[[dialogue]]
speaker = "フィオナ"
# 「ポテトパーティー……？　って、緋宮会長も！？」
line = "「ポテトパーティー……？　って、緋宮会長も！？」"

[[dialogue]]
speaker = "unk"
# お邪魔してます
line = "お邪魔してます"

[[dialogue]]
speaker = "フィオナ"
# 「それにそちらは……」
line = "「それにそちらは……」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「私よ、フィオナ！　前にチャットで言ってた、『リトルフォーム』に変身してるの♪」
line = "「私よ、フィオナ！　前にチャットで言ってた、『リトルフォーム』に変身してるの♪」"

[[dialogue]]
speaker = "フィオナ"
# 「えっ、もしかして、ヴィーナスさんですか！？　ね、姉さんと同じくらい小さくて可愛い……！」
line = "「えっ、もしかして、ヴィーナスさんですか！？　ね、姉さんと同じくらい小さくて可愛い……！」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「あっ、今は附属生になってるから、呼び方を変えた方がいいかしら？」
line = "「あっ、今は附属生になってるから、呼び方を変えた方がいいかしら？」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「お邪魔してるわ、フィオナお姉ちゃん♪」
line = "「お邪魔してるわ、フィオナお姉ちゃん♪」"

[[dialogue]]
speaker = "フィオナ"
# 「お、お姉ちゃん！？」
line = "「お、お姉ちゃん！？」"

[[dialogue]]
speaker = "フィオナ"
# 「わ、私が、お姉ちゃんに……！　はあぁあっ<emoji=heart04>」
line = "「わ、私が、お姉ちゃんに……！　はあぁあっ<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
# 「ん？　『お姉ちゃん』呼びに憧れがあったのか？　まあ確かに、フィオナが『お姉ちゃん』って呼ばれることはないな！」
line = "「ん？　『お姉ちゃん』呼びに憧れがあったのか？　まあ確かに、フィオナが『お姉ちゃん』って呼ばれることはないな！」"

[[dialogue]]
speaker = "アポロ"
# 「ふむふむ。そうなると、あたしが長女で、フィオナが次女、ヴィーナスが三女か……アリだな！」
line = "「ふむふむ。そうなると、あたしが長女で、フィオナが次女、ヴィーナスが三女か……アリだな！」"

[[dialogue]]
speaker = "アポロ"
# 「ヴィーナス、あたしのことも、お姉ちゃんって呼んでいいぞ！」
line = "「ヴィーナス、あたしのことも、お姉ちゃんって呼んでいいぞ！」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「いいわね！　アポロお姉ちゃん♪　これからよろしくね！」
line = "「いいわね！　アポロお姉ちゃん♪　これからよろしくね！」"

[[dialogue]]
speaker = "アポロ"
# 「おう♪　姉妹みたいに仲よくしようぜ！」
line = "「おう♪　姉妹みたいに仲よくしようぜ！」"

[[dialogue]]
speaker = "フィオナ"
# 「そ、そうですね……！」
line = "「そ、そうですね……！」"

[[dialogue]]
speaker = "フィオナ"
# 「ヴィーナスさんがリトルフォームの時は、本物のお姉ちゃんになったつもりで、絆を深め合うのはアリかもしれませんっ！」
line = "「ヴィーナスさんがリトルフォームの時は、本物のお姉ちゃんになったつもりで、絆を深め合うのはアリかもしれませんっ！」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「本当？　じゃあ、フィオナお姉ちゃんには、遠慮なく甘えちゃうわね♪　ぎゅ～っ<emoji=heart04>」
line = "「本当？　じゃあ、フィオナお姉ちゃんには、遠慮なく甘えちゃうわね♪　ぎゅ～っ<emoji=heart04>」"

[[dialogue]]
speaker = "フィオナ"
# 「ふわわぁっ！？　そんな甘えるように抱き着いてきて……！　か、可愛いっ<emoji=heart04>　つい頭をナデナデしたくなってしまいます……！」
line = "「ふわわぁっ！？　そんな甘えるように抱き着いてきて……！　か、可愛いっ<emoji=heart04>　つい頭をナデナデしたくなってしまいます……！」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「あっ……えへへ<emoji=heart04>　お姉ちゃんの手、くすぐったいわ♪」
line = "「あっ……えへへ<emoji=heart04>　お姉ちゃんの手、くすぐったいわ♪」"

[[dialogue]]
speaker = "unk"
# （ヴィーナスって、実は魔性の女なのかも……）
line = "（ヴィーナスって、実は魔性の女なのかも……）"

[[dialogue]]
speaker = "unk"
# そうして、星見姉妹から妹のように可愛がられるヴィーナスなのであった。
line = "そうして、星見姉妹から妹のように可愛がられるヴィーナスなのであった。"
