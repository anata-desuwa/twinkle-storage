[[dialogue]]
speaker = "せつな（覚醒）"
# 「このまま正面に回るでござるよ～。なあに、忍術なので絶対に気付かれないでござる♪」
line = "「このまま正面に回るでござるよ～。なあに、忍術なので絶対に気付かれないでござる♪」"

[[dialogue]]
speaker = "蘭美"
# 「ええと……誰か教えてくれるかしら？　いったいあれは何なの？」
line = "「ええと……誰か教えてくれるかしら？　いったいあれは何なの？」"

[[dialogue]]
speaker = "ヨミ"
# 「あはは、イチャイチャ忍術ですかねぇ？」
line = "「あはは、イチャイチャ忍術ですかねぇ？」"

[[dialogue]]
speaker = "閃"
# 「あんなの入っていけません！　まさかこんな画期的なストーキング術があったなんて……」
line = "「あんなの入っていけません！　まさかこんな画期的なストーキング術があったなんて……」"

[[dialogue]]
speaker = "閃"
# 「あ、いえ。私はストーキング術に興味なんてありませんよ。気のせいです、気のせい」
line = "「あ、いえ。私はストーキング術に興味なんてありませんよ。気のせいです、気のせい」"

[[dialogue]]
speaker = "せつな（覚醒）"
# 「さあ、主様。も～っとむぎゅっとするでござるよ～<emoji=heart04>」
line = "「さあ、主様。も～っとむぎゅっとするでござるよ～<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# こうして、俺はせつなのストーキング忍術を受け続けるのだった。
line = "こうして、俺はせつなのストーキング忍術を受け続けるのだった。"
