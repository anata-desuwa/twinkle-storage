[[dialogue]]
speaker = "unk"
# 第２話,せつな流ストーキング忍術,P
line = "第２話,せつな流ストーキング忍術,P"

[[dialogue]]
speaker = "unk"
# あれから数日後、俺はせつなに呼ばれて九浄家に来ていた。
line = "あれから数日後、俺はせつなに呼ばれて九浄家に来ていた。"

[[dialogue]]
speaker = "せつな（覚醒）"
# 「にんにん！　これがせつなの新しいフォームでござるよ～！」
line = "「にんにん！　これがせつなの新しいフォームでござるよ～！」"

[[dialogue]]
speaker = "蘭美"
# 「完全に使いこなせるようになったみたいね、やるじゃない！」
line = "「完全に使いこなせるようになったみたいね、やるじゃない！」"

[[dialogue]]
speaker = "せつな（覚醒）"
# 「ややっ、蘭美殿からお褒めの言葉を頂戴できるとは！　光栄にござるよ～」
line = "「ややっ、蘭美殿からお褒めの言葉を頂戴できるとは！　光栄にござるよ～」"

[[dialogue]]
speaker = "閃"
# 「せつなが努力している姿を見続けていただけに……感慨深いです」
line = "「せつなが努力している姿を見続けていただけに……感慨深いです」"

[[dialogue]]
speaker = "unk"
# 頑張ったね、せつな
line = "頑張ったね、せつな"

[[dialogue]]
speaker = "せつな（覚醒）"
# 「にゃにゃっ、それほどでもないでござるよ～」
line = "「にゃにゃっ、それほどでもないでござるよ～」"

[[dialogue]]
speaker = "ヨミ"
# 「ふふっ、せつなさん照れてます♪」
line = "「ふふっ、せつなさん照れてます♪」"

[[dialogue]]
speaker = "蘭美"
# 「謙遜は程々になさい。努力を否定することは、結果を否定することにもなるのよ」
line = "「謙遜は程々になさい。努力を否定することは、結果を否定することにもなるのよ」"

[[dialogue]]
speaker = "せつな（覚醒）"
# 「……蘭美殿の言う通りでござるな。有難いお言葉、素直に頂戴しておくでござる」
line = "「……蘭美殿の言う通りでござるな。有難いお言葉、素直に頂戴しておくでござる」"

[[dialogue]]
speaker = "ヨミ"
# 「せつなさん、得たのは新しいフォームだけじゃないんですよね？」
line = "「せつなさん、得たのは新しいフォームだけじゃないんですよね？」"

[[dialogue]]
speaker = "せつな（覚醒）"
# 「そうなのでござる！　なんとこのたび、師匠から正式な忍として認めてもらったでござる！」
line = "「そうなのでござる！　なんとこのたび、師匠から正式な忍として認めてもらったでござる！」"

[[dialogue]]
speaker = "蘭美"
# 「へえ、よかったじゃない。それで、今までとは何が違うのかしら？」
line = "「へえ、よかったじゃない。それで、今までとは何が違うのかしら？」"

[[dialogue]]
speaker = "せつな（覚醒）"
# 「うっ、具体的には……そのぉ……」
line = "「うっ、具体的には……そのぉ……」"

[[dialogue]]
speaker = "ヨミ"
# 「見習い忍者を指導できるようになったみたいですよ」
line = "「見習い忍者を指導できるようになったみたいですよ」"

[[dialogue]]
speaker = "せつな（覚醒）"
# 「そう、それでござる！　助言感謝でござるよ～、ヨミ殿！」
line = "「そう、それでござる！　助言感謝でござるよ～、ヨミ殿！」"

[[dialogue]]
speaker = "蘭美"
# 「ふっ、まだまだね……。なんだかとても頼りないわ！」
line = "「ふっ、まだまだね……。なんだかとても頼りないわ！」"

[[dialogue]]
speaker = "閃"
# 「ですが、新しいフォームで戦闘力も向上したみたいですし、忍者としてもレベルアップしたのでは？」
line = "「ですが、新しいフォームで戦闘力も向上したみたいですし、忍者としてもレベルアップしたのでは？」"

[[dialogue]]
speaker = "unk"
# 実際に見せてあげたらどうかな？
line = "実際に見せてあげたらどうかな？"

[[dialogue]]
speaker = "せつな（覚醒）"
# 「それでござる！　忍としてのニューせつなを披露するでござるよ～！」
line = "「それでござる！　忍としてのニューせつなを披露するでござるよ～！」"

[[dialogue]]
speaker = "蘭美"
# 「いいわ。どのくらい強くなったのか、私に見せてみなさい！　スピード対決よ！」
line = "「いいわ。どのくらい強くなったのか、私に見せてみなさい！　スピード対決よ！」"

[[dialogue]]
speaker = "せつな（覚醒）"
# 「面白いでござるな！　蘭美殿の高速っぷりは有名でござるから」
line = "「面白いでござるな！　蘭美殿の高速っぷりは有名でござるから」"

[[dialogue]]
speaker = "蘭美"
# 「ふふん、私の速度に勝てるかしら？　さあ、捕まえてみなさい！」
line = "「ふふん、私の速度に勝てるかしら？　さあ、捕まえてみなさい！」"

[[dialogue]]
speaker = "ヨミ"
# 「はや！　さすがメイド長、もう見えなくなっちゃいました」
line = "「はや！　さすがメイド長、もう見えなくなっちゃいました」"

[[dialogue]]
speaker = "閃"
# 「さすがにあれには追いつけないような……」
line = "「さすがにあれには追いつけないような……」"

[[dialogue]]
speaker = "unk"
# せつななら勝てるよ！
line = "せつななら勝てるよ！"

[[dialogue]]
speaker = "せつな（覚醒）"
# 「あ、主様ぁ～～。そのお言葉がせつなを強くするでござる！」
line = "「あ、主様ぁ～～。そのお言葉がせつなを強くするでござる！」"

[[dialogue]]
speaker = "せつな（覚醒）"
# 「よーし、頑張るでござるよっ！」
line = "「よーし、頑張るでござるよっ！」"

[[dialogue]]
speaker = "蘭美"
# 「たとえ新たな戦闘服を得たとしても、私に速度で勝てると思わないでちょうだい」
line = "「たとえ新たな戦闘服を得たとしても、私に速度で勝てると思わないでちょうだい」"

[[dialogue]]
speaker = "せつな（覚醒）"
# 「──果たしてそれはどうでござるかな？」
line = "「──果たしてそれはどうでござるかな？」"

[[dialogue]]
speaker = "蘭美"
# 「やるわね、私に追いついてくるなんて。けれどこれが全力だなんて思わないでちょうだい」
line = "「やるわね、私に追いついてくるなんて。けれどこれが全力だなんて思わないでちょうだい」"

[[dialogue]]
speaker = "蘭美"
# 「まだ５割、いや３割、全然本気じゃないんだから。全力を出せば一瞬で──」
line = "「まだ５割、いや３割、全然本気じゃないんだから。全力を出せば一瞬で──」"

[[dialogue]]
speaker = "せつな（覚醒）"
# 「その前に捕まえるでござる！　忍法、影分身っ！」
line = "「その前に捕まえるでござる！　忍法、影分身っ！」"

[[dialogue]]
speaker = "蘭美"
# 「何ですって！？」
line = "「何ですって！？」"

[[dialogue]]
speaker = "せつな（覚醒）"
# 「にんにん、せつなの勝ちでござる～！　忍には忍の戦い方があるでござるよ♪」
line = "「にんにん、せつなの勝ちでござる～！　忍には忍の戦い方があるでござるよ♪」"

[[dialogue]]
speaker = "蘭美"
# 「油断したわ……次はこちらも戦闘服でやるから、もう１戦よ！」
line = "「油断したわ……次はこちらも戦闘服でやるから、もう１戦よ！」"

[[dialogue]]
speaker = "閃"
# 「いえ、同じことを繰り返すより別なことを、次は私がお相手します」
line = "「いえ、同じことを繰り返すより別なことを、次は私がお相手します」"

[[dialogue]]
speaker = "unk"
# 閃なら、ストーキング対決だ！
line = "閃なら、ストーキング対決だ！"

[[dialogue]]
speaker = "閃"
# 「待って下さい！　どうして私ならストーキング対決なんですかっ？」
line = "「待って下さい！　どうして私ならストーキング対決なんですかっ？」"

[[dialogue]]
speaker = "せつな（覚醒）"
# 「閃殿はストーキングの達人でござるからな～。せつなも心して挑まねばなりません！」
line = "「閃殿はストーキングの達人でござるからな～。せつなも心して挑まねばなりません！」"

[[dialogue]]
speaker = "蘭美"
# 「面白そうじゃない。ストーキング対象は言い出しっぺの会長にやってもらおうかしら」
line = "「面白そうじゃない。ストーキング対象は言い出しっぺの会長にやってもらおうかしら」"

[[dialogue]]
speaker = "unk"
# ２人とも準備はいい？
line = "２人とも準備はいい？"

[[dialogue]]
speaker = "unk"
# まかせて！
line = "まかせて！"

[[dialogue]]
speaker = "せつな（覚醒）"
# 「いつでもいいでござるよ」
line = "「いつでもいいでござるよ」"

[[dialogue]]
speaker = "閃"
# 「私はまだやるとは言ってませんよ～っ！」
line = "「私はまだやるとは言ってませんよ～っ！」"

[[dialogue]]
speaker = "蘭美"
# 「問答無用！　ストーキング、スタート！」
line = "「問答無用！　ストーキング、スタート！」"

[[dialogue]]
speaker = "ヨミ"
# 「消えました！？　いつの間に……」
line = "「消えました！？　いつの間に……」"

[[dialogue]]
speaker = "蘭美"
# 「いいわね、何だかんだ言って、２人ともやる気十分ってところかしら」
line = "「いいわね、何だかんだ言って、２人ともやる気十分ってところかしら」"

[[dialogue]]
speaker = "せつな（覚醒）"
# 「……にんにん♪」
line = "「……にんにん♪」"

[[dialogue]]
speaker = "unk"
# （……せつな？）
line = "（……せつな？）"

[[dialogue]]
speaker = "unk"
# （……え？）
line = "（……え？）"

[[dialogue]]
speaker = "せつな（覚醒）"
# 「ストーキング開始でござるよ～。たとえ閃殿が相手でも、主様へのストーキングで負けるわけには参りませぬ」
line = "「ストーキング開始でござるよ～。たとえ閃殿が相手でも、主様へのストーキングで負けるわけには参りませぬ」"

[[dialogue]]
speaker = "せつな（覚醒）"
# 「ふふふ、これぞ密着の術にござる<emoji=heart04>」
line = "「ふふふ、これぞ密着の術にござる<emoji=heart04>」"

[[dialogue]]
speaker = "せつな（覚醒）"
# 「これでもう主様は逃げられないでござる……ずっとせつなと一緒でござる」
line = "「これでもう主様は逃げられないでござる……ずっとせつなと一緒でござる」"

[[dialogue]]
speaker = "unk"
# これってストーキングになるの？
line = "これってストーキングになるの？"

[[dialogue]]
speaker = "unk"
# し、刺激的すぎる
line = "し、刺激的すぎる"

[[dialogue]]
speaker = "せつな（覚醒）"
# 「ご安心下され。師匠直伝、ストーキング忍術にござる」
