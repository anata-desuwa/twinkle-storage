[[dialogue]]
speaker = "unk"
# 第１話,幼なじみの幼なじみ,P
line = "第１話,幼なじみの幼なじみ,P"

[[dialogue]]
speaker = "unk"
# ある日の休日。街に買い物に出ると……
line = "ある日の休日。街に買い物に出ると……"

[[dialogue]]
speaker = "若い男"
# 「君、かわいいね。俺とイイところ行かない？」
line = "「君、かわいいね。俺とイイところ行かない？」"

[[dialogue]]
speaker = "ナターシャ"
# 「イイところってどこ？　私、人間界に来たばかりだからわかんないなぁ～」
line = "「イイところってどこ？　私、人間界に来たばかりだからわかんないなぁ～」"

[[dialogue]]
speaker = "若い男"
# 「え、じゃあ君、天使か魔族？　いやこんなにかわいいんだからきっと天使だろ。この辺詳しいから案内するよ」
line = "「え、じゃあ君、天使か魔族？　いやこんなにかわいいんだからきっと天使だろ。この辺詳しいから案内するよ」"

[[dialogue]]
speaker = "ナターシャ"
# 「そうそう、天使なの。でもこれから人と約束があるから遠慮しとくね」
line = "「そうそう、天使なの。でもこれから人と約束があるから遠慮しとくね」"

[[dialogue]]
speaker = "若い男"
# 「まぁまぁ、そう釣れないこと言わないでよ。ちゃんと楽しませてあげるからさ」
line = "「まぁまぁ、そう釣れないこと言わないでよ。ちゃんと楽しませてあげるからさ」"

[[dialogue]]
speaker = "unk"
# 男がナターシャの腕を掴もうとしたところに──
line = "男がナターシャの腕を掴もうとしたところに──"

[[dialogue]]
speaker = "unk"
# 待った
line = "待った"

[[dialogue]]
speaker = "ナターシャ"
# 「あ、会長さん。こんにちは」
line = "「あ、会長さん。こんにちは」"

[[dialogue]]
speaker = "若い男"
# 「あ？　なんだ、男がいたのかよ。ならさっさとそう言えよ」
line = "「あ？　なんだ、男がいたのかよ。ならさっさとそう言えよ」"

[[dialogue]]
speaker = "unk"
# 俺の顔を見ると、男は露骨に不機嫌そうな顔をして去っていった。
line = "俺の顔を見ると、男は露骨に不機嫌そうな顔をして去っていった。"

[[dialogue]]
speaker = "ナターシャ"
# 「ありがと、会長さん。しつこく声かけられて困っちゃってさ」
line = "「ありがと、会長さん。しつこく声かけられて困っちゃってさ」"

[[dialogue]]
speaker = "ナターシャ"
# 「あれが伝説に聞くナンパってやつ？　いや～、まさか私が声かけられるとは思わなかったよ」
line = "「あれが伝説に聞くナンパってやつ？　いや～、まさか私が声かけられるとは思わなかったよ」"

[[dialogue]]
speaker = "unk"
# ナターシャなら自分でなんとかできたんじゃ？
line = "ナターシャなら自分でなんとかできたんじゃ？"

[[dialogue]]
speaker = "ナターシャ"
# 「うん、できたよ。でも暗殺者だから目立つ真似はしたくないんだよね」
line = "「うん、できたよ。でも暗殺者だから目立つ真似はしたくないんだよね」"

[[dialogue]]
speaker = "ナターシャ"
# 「私、表向きは普通の留学生ってことになってるから。エージェントの任務と星騎士の戦闘以外は、荒事は慎みたいの」
line = "「私、表向きは普通の留学生ってことになってるから。エージェントの任務と星騎士の戦闘以外は、荒事は慎みたいの」"

[[dialogue]]
speaker = "unk"
# ならどうして俺に暗殺者って名乗ったんだ？
line = "ならどうして俺に暗殺者って名乗ったんだ？"

[[dialogue]]
speaker = "ナターシャ"
# 「あなたを消すことが目的じゃないからだよ。あくまで魔王の暴走を止めたいだけだから、<ruby=けんせい>牽制</ruby>してるの」
line = "「あなたを消すことが目的じゃないからだよ。あくまで魔王の暴走を止めたいだけだから、<ruby>牽制<rt>けんせい</rt></ruby>してるの」"

[[dialogue]]
speaker = "ナターシャ"
# 「『魔王』は聖庭園が警戒するほど力を持った存在。あなたも自覚はあるでしょ？　なら、最初から種明かししてしまった方が誤解はないってこと」
line = "「『魔王』は聖庭園が警戒するほど力を持った存在。あなたも自覚はあるでしょ？　なら、最初から種明かししてしまった方が誤解はないってこと」"

[[dialogue]]
speaker = "ナターシャ"
# 「それに、私は私なりにあなたを信用してこうしてるの」
line = "「それに、私は私なりにあなたを信用してこうしてるの」"

[[dialogue]]
speaker = "ナターシャ"
# 「あなたは利口だから、知らせても不用意に騒ぎ立てることはしないし、静観することで潔白を証明できるならそうする」
line = "「あなたは利口だから、知らせても不用意に騒ぎ立てることはしないし、静観することで潔白を証明できるならそうする」"

[[dialogue]]
speaker = "ナターシャ"
# 「そうすれば、私がしばらく近くにいるだけで聖庭園からの疑いは晴れるし、私の仕事も平和に終わる。お互いの利益になるんだよ」
line = "「そうすれば、私がしばらく近くにいるだけで聖庭園からの疑いは晴れるし、私の仕事も平和に終わる。お互いの利益になるんだよ」"

[[dialogue]]
speaker = "メルエル"
# 「ナターシャちゃ～ん！」
line = "「ナターシャちゃ～ん！」"

[[dialogue]]
speaker = "ナターシャ"
# 「あ、来たね」
line = "「あ、来たね」"

[[dialogue]]
speaker = "メルエル"
# 「ナターシャちゃん、お待た──」
line = "「ナターシャちゃん、お待た──」"

[[dialogue]]
speaker = "メルエル"
# 「会長くん！？　どうして２人が一緒にいるの！？」
line = "「会長くん！？　どうして２人が一緒にいるの！？」"

[[dialogue]]
speaker = "ナターシャ"
# 「今そこでたまたま出会ってね。私がナンパされてたところを助けてもらったんだ」
line = "「今そこでたまたま出会ってね。私がナンパされてたところを助けてもらったんだ」"

[[dialogue]]
speaker = "メルエル"
# 「ええっ、ナターシャちゃん大丈夫だった？」
line = "「ええっ、ナターシャちゃん大丈夫だった？」"

[[dialogue]]
speaker = "ナターシャ"
# 「うん、会長さんが颯爽と現れてかっこよく助けてくれたからね」
line = "「うん、会長さんが颯爽と現れてかっこよく助けてくれたからね」"

[[dialogue]]
speaker = "メルエル"
# 「そ、そうなんだ……ありがとう、会長くん」
line = "「そ、そうなんだ……ありがとう、会長くん」"

[[dialogue]]
speaker = "メルエル"
# （ナターシャちゃんが無事だったのは良かったけど、かっこいい会長くんは見たかったよ～っ）
line = "（ナターシャちゃんが無事だったのは良かったけど、かっこいい会長くんは見たかったよ～っ）"

[[dialogue]]
speaker = "unk"
# ２人は幼なじみなんだっけ？
line = "２人は幼なじみなんだっけ？"

[[dialogue]]
speaker = "ナターシャ"
# 「そうそう。メルエルと同じ、天界の聖庭園の出身で、小さい頃から一緒だったんだ。一時期流星市国に行ってた頃は寂しかったな」
line = "「そうそう。メルエルと同じ、天界の聖庭園の出身で、小さい頃から一緒だったんだ。一時期流星市国に行ってた頃は寂しかったな」"

[[dialogue]]
speaker = "ナターシャ"
# 「でも帰ってきたら、向こうで会った男の子の話ばっかりするようになっちゃって」
line = "「でも帰ってきたら、向こうで会った男の子の話ばっかりするようになっちゃって」"

[[dialogue]]
speaker = "メルエル"
# 「なな、ナターシャちゃん！？　その話は内緒にして～っ」
line = "「なな、ナターシャちゃん！？　その話は内緒にして～っ」"

[[dialogue]]
speaker = "ナターシャ"
# 「あ、言っちゃいけなかった？」
line = "「あ、言っちゃいけなかった？」"

[[dialogue]]
speaker = "ナターシャ"
# 「ま、そんな感じで、会長さんの幼なじみの幼なじみってわけ」
line = "「ま、そんな感じで、会長さんの幼なじみの幼なじみってわけ」"

[[dialogue]]
speaker = "ナターシャ"
# 「で、今日は人間界に来たばかりで不慣れな私のために、メルエルが案内してくれる約束だったんだ」
line = "「で、今日は人間界に来たばかりで不慣れな私のために、メルエルが案内してくれる約束だったんだ」"

[[dialogue]]
speaker = "unk"
# なるほど。お邪魔そうだし俺はこれで
line = "なるほど。お邪魔そうだし俺はこれで"

[[dialogue]]
speaker = "メルエル"
# 「えっ！？　あ、うん……」
line = "「えっ！？　あ、うん……」"

[[dialogue]]
speaker = "ナターシャ"
# 「え～、全然邪魔じゃないよね、メルエル？　むしろ賑やかな方が楽しいくらい」
line = "「え～、全然邪魔じゃないよね、メルエル？　むしろ賑やかな方が楽しいくらい」"

[[dialogue]]
speaker = "メルエル"
# 「！　う、うん。良かったら会長くんも一緒に行こ？」
line = "「！　う、うん。良かったら会長くんも一緒に行こ？」"

[[dialogue]]
speaker = "unk"
# それなら喜んで
line = "それなら喜んで"

[[dialogue]]
speaker = "メルエル"
# 「やった！」
line = "「やった！」"

[[dialogue]]
speaker = "メルエル"
# 「こっちが服屋さんで、あっちの建物が本屋さん。向こうのディスカウントストアにはだいたい何でもあるんだよ！」
line = "「こっちが服屋さんで、あっちの建物が本屋さん。向こうのディスカウントストアにはだいたい何でもあるんだよ！」"

[[dialogue]]
speaker = "ナターシャ"
# 「へ～、さすが人間界。いろいろあるんだね」
line = "「へ～、さすが人間界。いろいろあるんだね」"

[[dialogue]]
speaker = "メルエル"
# 「この辺はご飯食べるところもたくさんあるし……そうだ、みんなで一緒にお昼食べよっ」
line = "「この辺はご飯食べるところもたくさんあるし……そうだ、みんなで一緒にお昼食べよっ」"

[[dialogue]]
speaker = "ナターシャ"
# （ふふ、メルエル楽しそうだね。会長さんがいてくれてよかった）
line = "（ふふ、メルエル楽しそうだね。会長さんがいてくれてよかった）"

[[dialogue]]
speaker = "unk"
# （メルエルはどこまで知ってるんだ？）
line = "（メルエルはどこまで知ってるんだ？）"

[[dialogue]]
speaker = "ナターシャ"
# （私の仕事のこと？　大丈夫、メルエル含めて、ほとんどの天使は聖庭園の後ろ暗い部分は知らないから）
line = "（私の仕事のこと？　大丈夫、メルエル含めて、ほとんどの天使は聖庭園の後ろ暗い部分は知らないから）"

[[dialogue]]
speaker = "ナターシャ"
# （私のことは、エリートが聖庭園の仕事を任されてる……ぐらいにしか思ってないよ）
line = "（私のことは、エリートが聖庭園の仕事を任されてる……ぐらいにしか思ってないよ）"

[[dialogue]]
speaker = "メルエル"
# 「ナターシャちゃん、会長くん！　あっちのイタリアンのお店どうかな？　お洒落で美味しそうだよ！」
line = "「ナターシャちゃん、会長くん！　あっちのイタリアンのお店どうかな？　お洒落で美味しそうだよ！」"

[[dialogue]]
speaker = "ナターシャ"
# 「うん、いいんじゃない」
line = "「うん、いいんじゃない」"

[[dialogue]]
speaker = "unk"
# 聖庭園の特務エージェント・ナターシャ。彼女については不明なことが多いが、メルエルと仲がいいことは間違いなさそうだ。
line = "聖庭園の特務エージェント・ナターシャ。彼女については不明なことが多いが、メルエルと仲がいいことは間違いなさそうだ。"

[[dialogue]]
speaker = "ナターシャ"
# 「ふふ……」
line = "「ふふ……」"

[[dialogue]]
speaker = "unk"
# だけどナターシャがメルエルを見つめる目に、何かそれ以上のものがある気がするのだった。
line = "だけどナターシャがメルエルを見つめる目に、何かそれ以上のものがある気がするのだった。"
