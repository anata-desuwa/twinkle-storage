[[dialogue]]
speaker = "unk"
# 第４話,アポロとお買い物,P
line = "第４話,アポロとお買い物,P"

[[dialogue]]
speaker = "unk"
# 今日はアポロと外出をする日だ。なんでも買い物に付き合って欲しいらしい。
line = "今日はアポロと外出をする日だ。なんでも買い物に付き合って欲しいらしい。"

[[dialogue]]
speaker = "unk"
# なんだかドキドキしてきた。休日に繁華街で待ち合わせだなんて、デートみたいじゃないか。
line = "なんだかドキドキしてきた。休日に繁華街で待ち合わせだなんて、デートみたいじゃないか。"

[[dialogue]]
speaker = "unk"
# 男友達と遊ぶ時より、服選びやヘアセットにたっぷりと時間をかけた俺は、待ち合わせ場所へ向かった──
line = "男友達と遊ぶ時より、服選びやヘアセットにたっぷりと時間をかけた俺は、待ち合わせ場所へ向かった──"

[[dialogue]]
speaker = "アポロ"
# 「よお、魔王！　待ってたぜー！」
line = "「よお、魔王！　待ってたぜー！」"

[[dialogue]]
speaker = "unk"
# 今日は何を買う予定なの？
line = "今日は何を買う予定なの？"

[[dialogue]]
speaker = "unk"
# お待たせ
line = "お待たせ"

[[dialogue]]
speaker = "アポロ"
# 「ああ。あたしのパンツを買おうと思ってな！　手伝ってくれ！！」
line = "「ああ。あたしのパンツを買おうと思ってな！　手伝ってくれ！！」"

[[dialogue]]
speaker = "unk"
# ……ズ、ズボンのことだよね？
line = "……ズ、ズボンのことだよね？"

[[dialogue]]
speaker = "アポロ"
# 「なにを言ってるんだ、お前？　パンツと言ったらパンツだ！　下着だ！」
line = "「なにを言ってるんだ、お前？　パンツと言ったらパンツだ！　下着だ！」"

[[dialogue]]
speaker = "unk"
# 何で俺を誘ったの！？
line = "何で俺を誘ったの！？"

[[dialogue]]
speaker = "アポロ"
# 「なんでって……だってお前はあたしと同じ、魔王だろう？　当然、パンツにもこだわりがあるはずだ！」
line = "「なんでって……だってお前はあたしと同じ、魔王だろう？　当然、パンツにもこだわりがあるはずだ！」"

[[dialogue]]
speaker = "アポロ"
# 「やっぱり買い物をするなら、こだわりのある奴と一緒にしないとな！」
line = "「やっぱり買い物をするなら、こだわりのある奴と一緒にしないとな！」"

[[dialogue]]
speaker = "アポロ"
# 「よくわからないって……そんなことないだろ！？　まさかお前、戦いに行く時にヒモの伸びたお古のパンツを穿いてるんじゃないだろうな！？」
line = "「よくわからないって……そんなことないだろ！？　まさかお前、戦いに行く時にヒモの伸びたお古のパンツを穿いてるんじゃないだろうな！？」"

[[dialogue]]
speaker = "アポロ"
# 「戦士たるもの、いつ命を散らすかわからない！　故に最高のパンツを常に穿くものなんだぞ！」
line = "「戦士たるもの、いつ命を散らすかわからない！　故に最高のパンツを常に穿くものなんだぞ！」"

[[dialogue]]
speaker = "unk"
# （流星ライダーでそういうのあったなぁ）
line = "（流星ライダーでそういうのあったなぁ）"

[[dialogue]]
speaker = "unk"
# （ああ、なるほど……）
line = "（ああ、なるほど……）"

[[dialogue]]
speaker = "アポロ"
# 「あたしもだいぶ回復した！　お前と共に戦いに赴くこともあるだろう。来たるべき日に備えて、パンツを新調しておこうと思ったんだ！　わはは！」
line = "「あたしもだいぶ回復した！　お前と共に戦いに赴くこともあるだろう。来たるべき日に備えて、パンツを新調しておこうと思ったんだ！　わはは！」"

[[dialogue]]
speaker = "アポロ"
# 「なに……応援を呼ぶ？　あたしはお前と２人で構わないぞ？」
line = "「なに……応援を呼ぶ？　あたしはお前と２人で構わないぞ？」"

[[dialogue]]
speaker = "unk"
# そう言われるのは光栄だけれど、女の子のパンツなんてどう選べばいいのか俺にはわからないし。
line = "そう言われるのは光栄だけれど、女の子のパンツなんてどう選べばいいのか俺にはわからないし。"

[[dialogue]]
speaker = "unk"
# 俺は頼れる新星星徒会から、都合のつくメンバーに連絡を取った──アポロはデートのつもりはなかったんだ、とちょっぴりしょげながら。
line = "俺は頼れる新星星徒会から、都合のつくメンバーに連絡を取った──アポロはデートのつもりはなかったんだ、とちょっぴりしょげながら。"

[[dialogue]]
speaker = "アナ"
# 「状況は把握しました。会長、心中お察しいたします」
line = "「状況は把握しました。会長、心中お察しいたします」"

[[dialogue]]
speaker = "サーシャ"
# 「お姉ちゃんが来たからにはもう大丈夫よ～♪　それじゃあ下着売り場にー……ゴ～<emoji=heart04>」
line = "「お姉ちゃんが来たからにはもう大丈夫よ～♪　それじゃあ下着売り場にー……ゴ～<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
# 「アポロさん。こういう下着はいかがでしょう」
line = "「アポロさん。こういう下着はいかがでしょう」"

[[dialogue]]
speaker = "アポロ"
# 「むー。どれもこれも地味だな。黒か白の一色じゃないか」
line = "「むー。どれもこれも地味だな。黒か白の一色じゃないか」"

[[dialogue]]
speaker = "アナ"
# 「下着は素材が大事。デザインは重要ではありません。どうせ見えないですし」
line = "「下着は素材が大事。デザインは重要ではありません。どうせ見えないですし」"

[[dialogue]]
speaker = "アポロ"
# 「ダメだダメだ！　ロマンがない！　見えてないところにこだわってこそのヒーローだろ！」
line = "「ダメだダメだ！　ロマンがない！　見えてないところにこだわってこそのヒーローだろ！」"

[[dialogue]]
speaker = "サーシャ"
# 「じゃあ、こういうのはどうかしら～？」
line = "「じゃあ、こういうのはどうかしら～？」"

[[dialogue]]
speaker = "アポロ"
# 「な、なんだこのヒモみたいなえっちなパンツは！？　おおおっ、お前は変態かっ！？」
line = "「な、なんだこのヒモみたいなえっちなパンツは！？　おおおっ、お前は変態かっ！？」"

[[dialogue]]
speaker = "サーシャ"
# 「え～～？　これくらい普通だと思うけれど……」
line = "「え～～？　これくらい普通だと思うけれど……」"

[[dialogue]]
speaker = "アポロ"
# 「なによりカッコよくない！　却下だ！」
line = "「なによりカッコよくない！　却下だ！」"

[[dialogue]]
speaker = "サーシャ"
# 「ひど～い。似合うと思ったのに～」
line = "「ひど～い。似合うと思ったのに～」"

[[dialogue]]
speaker = "アポロ"
# 「よし──じゃあ次は魔王だ！　どんなのを選んでくれたんだ？」
line = "「よし──じゃあ次は魔王だ！　どんなのを選んでくれたんだ？」"

[[dialogue]]
speaker = "unk"
# これでどうですか、お嬢様
line = "これでどうですか、お嬢様"

[[dialogue]]
speaker = "アナ"
# 「へえ…………。そういうのが好きなんですね、会長」
line = "「へえ…………。そういうのが好きなんですね、会長」"

[[dialogue]]
speaker = "サーシャ"
# 「あらあら、うふふ。男の子ね～♪」
line = "「あらあら、うふふ。男の子ね～♪」"

[[dialogue]]
speaker = "アポロ"
# 「また可愛い系か……！　カッコいいパンツが欲しいんだ、あたしは！」
line = "「また可愛い系か……！　カッコいいパンツが欲しいんだ、あたしは！」"

[[dialogue]]
speaker = "アナ"
# 「そもそもカッコいいの定義は何なのですか？」
line = "「そもそもカッコいいの定義は何なのですか？」"

[[dialogue]]
speaker = "サーシャ"
# 「これは難問ね～……！」
line = "「これは難問ね～……！」"

[[dialogue]]
speaker = "unk"
# そうしてパンツ選びは難航を極めて──結局アポロが購入したのは、特撮の怪獣がプリントされたパンツなのだった。
line = "そうしてパンツ選びは難航を極めて──結局アポロが購入したのは、特撮の怪獣がプリントされたパンツなのだった。"

[[dialogue]]
speaker = "アポロ"
# 「お前たちのおかげでかっこいいパンツが手に入ったぞ！　ありがとな！」
line = "「お前たちのおかげでかっこいいパンツが手に入ったぞ！　ありがとな！」"

[[dialogue]]
speaker = "アポロ"
# 「これでいつでも出撃できるぜ！　ひゃっほう！」
line = "「これでいつでも出撃できるぜ！　ひゃっほう！」"

[[dialogue]]
speaker = "アナ"
# 「センスがわかりません……」
line = "「センスがわかりません……」"

[[dialogue]]
speaker = "サーシャ"
# 「うふふ。でも平和な世界って感じがして、いいじゃない♪　さ～て、それじゃあアナちゃん、私たちはお暇しましょうか」
line = "「うふふ。でも平和な世界って感じがして、いいじゃない♪　さ～て、それじゃあアナちゃん、私たちはお暇しましょうか」"

[[dialogue]]
speaker = "アナ"
# 「そうですね。デートのお邪魔でしょうし、退散しましょう」
line = "「そうですね。デートのお邪魔でしょうし、退散しましょう」"

[[dialogue]]
speaker = "アポロ"
# 「……は？　でーと？　なんでそんな話になってるんだ？」
line = "「……は？　でーと？　なんでそんな話になってるんだ？」"

[[dialogue]]
speaker = "サーシャ"
# 「え、デートじゃなかったの？　私たちてっきり……」
line = "「え、デートじゃなかったの？　私たちてっきり……」"

[[dialogue]]
speaker = "アナ"
# 「はい。買い物中に彼女から無理難題を言われたから、会長がヘルプを頼んできたものとばかり」
line = "「はい。買い物中に彼女から無理難題を言われたから、会長がヘルプを頼んできたものとばかり」"

[[dialogue]]
speaker = "アポロ"
# 「ななな、なんであたしと魔王が付き合ってることになってるんだ！？　ただの友人同士の買い物じゃないか！」
line = "「ななな、なんであたしと魔王が付き合ってることになってるんだ！？　ただの友人同士の買い物じゃないか！」"

[[dialogue]]
speaker = "サーシャ"
# 「だって最近いつも一緒にいるし～。アポロちゃんとの買い物で困ってるって言うから、てっきりデートなんだろうな～って」
line = "「だって最近いつも一緒にいるし～。アポロちゃんとの買い物で困ってるって言うから、てっきりデートなんだろうな～って」"

[[dialogue]]
speaker = "アナ"
# 「……お付き合いしてなかったんですね。だったらもう少し気を遣うべきです」
line = "「……お付き合いしてなかったんですね。だったらもう少し気を遣うべきです」"

[[dialogue]]
speaker = "アナ"
# 「恋人でもない異性を下着選びに連れ出すのは、少々相手に誤解を与えるかと……」
line = "「恋人でもない異性を下着選びに連れ出すのは、少々相手に誤解を与えるかと……」"

[[dialogue]]
speaker = "サーシャ"
# 「そうよ～、アポロちゃん。会長くんだって普段よりも気合いを入れておめかししてきてるのに」
line = "「そうよ～、アポロちゃん。会長くんだって普段よりも気合いを入れておめかししてきてるのに」"

[[dialogue]]
speaker = "アポロ"
# 「なに！？　……む。言われてみれば、なんか髪型がちょっと違う……」
line = "「なに！？　……む。言われてみれば、なんか髪型がちょっと違う……」"

[[dialogue]]
speaker = "サーシャ"
# 「相手の気持ちも考えてあげないと可哀そうよ？　それじゃあね♪」
line = "「相手の気持ちも考えてあげないと可哀そうよ？　それじゃあね♪」"

[[dialogue]]
speaker = "アナ"
# 「それでは会長。また学園で」
line = "「それでは会長。また学園で」"

[[dialogue]]
speaker = "アポロ"
# 「な、なんか変な雰囲気になっちゃったな……お前、もしかしてデートのつもりで来てくれたのか？」
line = "「な、なんか変な雰囲気になっちゃったな……お前、もしかしてデートのつもりで来てくれたのか？」"

[[dialogue]]
speaker = "アポロ"
# 「──う。な、なんかすまん……あたし、お前のことは気の置けない友人だと思ってて……」
line = "「──う。な、なんかすまん……あたし、お前のことは気の置けない友人だと思ってて……」"

[[dialogue]]
speaker = "アポロ"
# 「……え、ええと。せっかくだからどこかでお茶でもしていくか？　うん……行こう！」
line = "「……え、ええと。せっかくだからどこかでお茶でもしていくか？　うん……行こう！」"

[[dialogue]]
speaker = "unk"
# その後、お互い変に意識しあってしまい、結局お茶もそこそこに解散することになった俺たちなのだった──
line = "その後、お互い変に意識しあってしまい、結局お茶もそこそこに解散することになった俺たちなのだった──"
