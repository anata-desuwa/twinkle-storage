[[dialogue]]
speaker = "unk"
# キュリオスの欲深き女帝・煌嶺。
line = "キュリオスの欲深き女帝・煌嶺。"

[[dialogue]]
speaker = "unk"
# 彼女に出会う前から、その名は度々聞いていた。
line = "彼女に出会う前から、その名は度々聞いていた。"

[[dialogue]]
speaker = "テルル"
# 『魔界の皇妃──煌嶺。彼女は頽廃都市キュリオスを統べ、人のみならずアステラ由来のモンスターをも従えています』
line = "『魔界の皇妃──煌嶺。彼女は頽廃都市キュリオスを統べ、人のみならずアステラ由来のモンスターをも従えています』"

[[dialogue]]
speaker = "リノ"
# 「これは<ruby=キュリオス>頽廃都市</ruby>の皇妃、煌嶺様から賜ったもの。星骸布は──広げた一帯に、異界の夜空を映すことができる」
line = "「これは<ruby>頽廃都市<rt>キュリオス</rt></ruby>の皇妃、煌嶺様から賜ったもの。星骸布は──広げた一帯に、異界の夜空を映すことができる」"

[[dialogue]]
speaker = "メイプル"
# 「自分の領地さえ守れればそれでよくて、リクリエの最前線である人間界に来ようとか、微塵も思っていないんだよ、煌嶺は」
line = "「自分の領地さえ守れればそれでよくて、リクリエの最前線である人間界に来ようとか、微塵も思っていないんだよ、煌嶺は」"

[[dialogue]]
speaker = "unk"
# 煌嶺について事前に得ていた情報は断片的なものだ。
line = "煌嶺について事前に得ていた情報は断片的なものだ。"

[[dialogue]]
speaker = "unk"
# 星骸布を授けて間接的に援助してくれたものの、謎の多い存在だった。
line = "星骸布を授けて間接的に援助してくれたものの、謎の多い存在だった。"

[[dialogue]]
speaker = "unk"
# だが──
line = "だが──"

[[dialogue]]
speaker = "煌嶺"
# 「妾の名は煌嶺。人間界では知らぬ者もいるか？」
line = "「妾の名は煌嶺。人間界では知らぬ者もいるか？」"

[[dialogue]]
speaker = "unk"
# 彼女は突然、新星学園の理事会に現れた。
line = "彼女は突然、新星学園の理事会に現れた。"

[[dialogue]]
speaker = "unk"
# 星骸布の対価として、新星学園理事の座を手に入れていたのだ。
line = "星骸布の対価として、新星学園理事の座を手に入れていたのだ。"

[[dialogue]]
speaker = "unk"
# そしてあろうことか……
line = "そしてあろうことか……"

[[dialogue]]
speaker = "煌嶺"
# 「ところで、今日の理事会では新星学園の学園長を決めるのであったな。では──」
line = "「ところで、今日の理事会では新星学園の学園長を決めるのであったな。では──」"

[[dialogue]]
speaker = "煌嶺"
# 「妾が学園長を務めようではないか！」
line = "「妾が学園長を務めようではないか！」"

[[dialogue]]
speaker = "unk"
# 当時空席だった、新星学園の学園長になると言い出したのだった。
line = "当時空席だった、新星学園の学園長になると言い出したのだった。"
