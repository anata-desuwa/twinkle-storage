[[dialogue]]
speaker = "ギガンドム"
# 「────グォォオォォォ！！？？」
line = "「────グォォオォォォ！！？？」"

[[dialogue]]
speaker = "シュティレ"
# 「目標の沈黙を確認……！」
line = "「目標の沈黙を確認……！」"

[[dialogue]]
speaker = "アナ（覚醒）"
# 「ふぅぅ……良かった。被害は最小限に食い止められましたね」
line = "「ふぅぅ……良かった。被害は最小限に食い止められましたね」"

[[dialogue]]
speaker = "アニマ（覚醒）"
# 「会長、他の戦場の様子はどうなんダ？」
line = "「会長、他の戦場の様子はどうなんダ？」"

[[dialogue]]
speaker = "unk"
# みんな、無事です！
line = "みんな、無事です！"

[[dialogue]]
speaker = "unk"
# 俺たちが最後だったみたいです
line = "俺たちが最後だったみたいです"

[[dialogue]]
speaker = "シュティレ"
# 「よかった。本当に、どうなることかと思いました……」
line = "「よかった。本当に、どうなることかと思いました……」"

[[dialogue]]
speaker = "アナ（覚醒）"
# 「今回の機械型モンスター襲撃は相当苛烈な戦いでしたが、おかげでノヴァフォーム星騎士も２人、増えましたね」
line = "「今回の機械型モンスター襲撃は相当苛烈な戦いでしたが、おかげでノヴァフォーム星騎士も２人、増えましたね」"

[[dialogue]]
speaker = "アニマ（覚醒）"
# 「戦う前よりも得るモノが増えたナ。フヒ、ハッピーエンドというやつは気分がいイ！」
line = "「戦う前よりも得るモノが増えたナ。フヒ、ハッピーエンドというやつは気分がいイ！」"

[[dialogue]]
speaker = "シュティレ"
# 「はい。お２人はノヴァフォームを、シュティレはマスターの弟子のポジションをゲット。ぶい」
line = "「はい。お２人はノヴァフォームを、シュティレはマスターの弟子のポジションをゲット。ぶい」"

[[dialogue]]
speaker = "アニマ（覚醒）"
# 「あァ……そうだったナ。シュティレ、キミを正式に弟子と認めよウ。アニマの授業は厳しいが、ちゃんと付いてきたまえヨ？」
line = "「あァ……そうだったナ。シュティレ、キミを正式に弟子と認めよウ。アニマの授業は厳しいが、ちゃんと付いてきたまえヨ？」"

[[dialogue]]
speaker = "シュティレ"
# 「──っ！？　驚きました、ちゃっかり弟子という既成事実を作るつもりだったのに……まさか本当に、認めていただけたということでしょうか？」
line = "「──っ！？　驚きました、ちゃっかり弟子という既成事実を作るつもりだったのに……まさか本当に、認めていただけたということでしょうか？」"

[[dialogue]]
speaker = "アニマ（覚醒）"
# 「フヒ！　面白いやつだよキミ。いいじゃないカ、錬金術を用いた巨大ロボット！」
line = "「フヒ！　面白いやつだよキミ。いいじゃないカ、錬金術を用いた巨大ロボット！」"

[[dialogue]]
speaker = "シュティレ"
# 「あれ、どうしてその会話を……？」
line = "「あれ、どうしてその会話を……？」"

[[dialogue]]
speaker = "アニマ（覚醒）"
# 「その狂気なる野望のために、アニマからとことん知識と技術を奪うがいイ！」
line = "「その狂気なる野望のために、アニマからとことん知識と技術を奪うがいイ！」"

[[dialogue]]
speaker = "アニマ（覚醒）"
# 「陸海空から宇宙まで活動できて、腕が無限に伸びル！　そして一兆度のウルトラビームを無限発射が可能なロボット！　必ず作って見せロ、シュティレ！！」
line = "「陸海空から宇宙まで活動できて、腕が無限に伸びル！　そして一兆度のウルトラビームを無限発射が可能なロボット！　必ず作って見せロ、シュティレ！！」"

[[dialogue]]
speaker = "シュティレ"
# 「──はい。マスター！！」
line = "「──はい。マスター！！」"

[[dialogue]]
speaker = "アナ（覚醒）"
# 「……一件落着ですね。会長、今回も本当にありがとうございました」
line = "「……一件落着ですね。会長、今回も本当にありがとうございました」"

[[dialogue]]
speaker = "unk"
# みんなが頑張ってくれたおかげだ
line = "みんなが頑張ってくれたおかげだ"

[[dialogue]]
speaker = "unk"
# 俺は何もしてないよ
line = "俺は何もしてないよ"

[[dialogue]]
speaker = "アナ（覚醒）"
# 「まさか。私たちがノヴァフォームを手に入れるまで、ずっと戦ってくれていたじゃないですか」
line = "「まさか。私たちがノヴァフォームを手に入れるまで、ずっと戦ってくれていたじゃないですか」"

[[dialogue]]
speaker = "アニマ（覚醒）"
# 「そうだゾ、キミ。アニマを庇ってず～っとギガンドムにどつかれテ。顔中がはれ上がって、せっかくの男前が台無しダ♪」
line = "「そうだゾ、キミ。アニマを庇ってず～っとギガンドムにどつかれテ。顔中がはれ上がって、せっかくの男前が台無しダ♪」"

[[dialogue]]
speaker = "シュティレ"
# 「ボコボコにはれ上がったお顔は男の勲章。それもまたロマンです。ぶい」
line = "「ボコボコにはれ上がったお顔は男の勲章。それもまたロマンです。ぶい」"

[[dialogue]]
speaker = "アニマ（覚醒）"
# 「学園に帰ったら、アニマ特製スペシャルドリンクをダースでくれてやるゾ！」
line = "「学園に帰ったら、アニマ特製スペシャルドリンクをダースでくれてやるゾ！」"

[[dialogue]]
speaker = "unk"
# ……保健室に行くので大丈夫です
line = "……保健室に行くので大丈夫です"

[[dialogue]]
speaker = "アニマ（覚醒）"
# 「遠慮するナ、フヒヒヒ！」
line = "「遠慮するナ、フヒヒヒ！」"

[[dialogue]]
speaker = "シュティレ"
# 「……あの、学園に帰る前に、１つワガママよろしいでしょうか。私、勝利を記念して皆さんと記念撮影がしたいです」
line = "「……あの、学園に帰る前に、１つワガママよろしいでしょうか。私、勝利を記念して皆さんと記念撮影がしたいです」"

[[dialogue]]
speaker = "アナ（覚醒）"
# 「シュティレさんの趣味の自撮りですね。お付き合いしましょう」
line = "「シュティレさんの趣味の自撮りですね。お付き合いしましょう」"

[[dialogue]]
speaker = "アニマ（覚醒）"
# 「……うむ。可愛い弟子の頼みダ、１枚だけだゾ？」
line = "「……うむ。可愛い弟子の頼みダ、１枚だけだゾ？」"

[[dialogue]]
speaker = "シュティレ"
# 「はい！　ぁ……でも私のＤＩＳＣ、壊されちゃったんでした……不覚」
line = "「はい！　ぁ……でも私のＤＩＳＣ、壊されちゃったんでした……不覚」"

[[dialogue]]
speaker = "アニマ（覚醒）"
# 「アニマのを使えばいイ。後で送ってやるサ──さぁ、並べ並べ」
line = "「アニマのを使えばいイ。後で送ってやるサ──さぁ、並べ並べ」"

[[dialogue]]
speaker = "シュティレ"
# 「タイマー起動します。ポーズはいつものアレで」
line = "「タイマー起動します。ポーズはいつものアレで」"

[[dialogue]]
speaker = "アナ（覚醒）"
# 「３、２、１──」
line = "「３、２、１──」"

[[dialogue]]
speaker = "アニマ（覚醒）"
# 「フヒヒ♪　勝利のポーズ──ぶい、だナ！」
line = "「フヒヒ♪　勝利のポーズ──ぶい、だナ！」"

[[dialogue]]
speaker = "unk"
# こうして３人の仲間たちと、ボコボコに殴られた俺。
line = "こうして３人の仲間たちと、ボコボコに殴られた俺。"

[[dialogue]]
speaker = "unk"
# 全員でピースサインを浮かべた記念撮影──その写真は後日、新星星徒会室の机の上に飾られることになるのだった。
line = "全員でピースサインを浮かべた記念撮影──その写真は後日、新星星徒会室の机の上に飾られることになるのだった。"
