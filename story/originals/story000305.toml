line = "「くぅ～！　ムカつくー！」"

[[dialogue]]
speaker = "ウェンディ"
# 「私は油断したらお肉が付いちゃうのに……特にお尻周りに。イニシュといい、アイリーンといい、どうして他の魔女は好き勝手食べても太らないんですか」
line = "「私は油断したらお肉が付いちゃうのに……特にお尻周りに。イニシュといい、アイリーンといい、どうして他の魔女は好き勝手食べても太らないんですか」"

[[dialogue]]
