line = "「ウェンディさん、お帰りなさーい。そんなに慌ててどうしたの？」"

[[dialogue]]
speaker = "ウェンディ"
# 「ええっと、そろそろ長官がお戻りになる頃だと思いまして……」
line = "「ええっと、そろそろ長官がお戻りになる頃だと思いまして……」"

[[dialogue]]
speaker = "アイリーン"
# 「長官ならまだ帰ってきてないよー」
line = "「長官ならまだ帰ってきてないよー」"

[[dialogue]]
speaker = "ウェンディ"
# 「ほっ……」
line = "「ほっ……」"

[[dialogue]]
speaker = "アイリーン"
# 「どしたの？　ウェンディさん、長官はまだですかーって、いつもそわそわしてたのに」
line = "「どしたの？　ウェンディさん、長官はまだですかーって、いつもそわそわしてたのに」"

[[dialogue]]
speaker = "ウェンディ"
# 「私そんなんじゃありませんっ」
