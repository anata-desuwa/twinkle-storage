[[dialogue]]
speaker = "イニシュ"
# 「この付近にモンスターの反応はないようです。移動しましょう」
line = "「この付近にモンスターの反応はないようです。移動しましょう」"

[[dialogue]]
speaker = "unk"
# その前にラーメン食べよう！
line = "その前にラーメン食べよう！"

[[dialogue]]
speaker = "イニシュ"
# 「……はい？」
line = "「……はい？」"

[[dialogue]]
speaker = "イニシュ"
# 「私はラーメンを食べに来たわけではありません。モンスターの殲滅のためです」
line = "「私はラーメンを食べに来たわけではありません。モンスターの殲滅のためです」"

[[dialogue]]
speaker = "イニシュ"
# 「確かにエネルギー補給のためにスリープを解除しましたが、まだその必要はありません」
line = "「確かにエネルギー補給のためにスリープを解除しましたが、まだその必要はありません」"

[[dialogue]]
speaker = "unk"
