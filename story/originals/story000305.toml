[[dialogue]]
speaker = "ウェンディ"
# 「ところでアイリーン。長官とはしばらくチェスをしていませんよね。久しぶりに勝負してみてくれませんか？　長官とアイリーンから指し方を学びたいんです」
line = "「ところでアイリーン。長官とはしばらくチェスをしていませんよね。久しぶりに勝負してみてくれませんか？　長官とアイリーンから指し方を学びたいんです」"

[[dialogue]]
speaker = "アイリーン"
# 「別にいいけど長官が受けてくれるかなぁ？」
line = "「別にいいけど長官が受けてくれるかなぁ？」"

[[dialogue]]
speaker = "ウェンディ"
