[[dialogue]]
speaker = "イニシュ"
# 「……わかりました。魔王がそこまで言うのなら行きましょう」
line = "「……わかりました。魔王がそこまで言うのなら行きましょう」"

[[dialogue]]
speaker = "イニシュ"
# 「店の前にこんなに列が……。ラーメンは人間界で人気の料理と聞いていましたが、ここまでとは思いませんでした」
line = "「店の前にこんなに列が……。ラーメンは人間界で人気の料理と聞いていましたが、ここまでとは思いませんでした」"

[[dialogue]]
speaker = "イニシュ"
# 「ですがもう少しで入店できそうですね」
line = "「ですがもう少しで入店できそうですね」"

[[dialogue]]
speaker = "イニシュ"
# 「……ラーメン」
line = "「……ラーメン」"

[[dialogue]]
speaker = "イニシュ"
# 「？　どうしましたか、魔王？」
line = "「？　どうしましたか、魔王？」"

[[dialogue]]
speaker = "イニシュ"
# 「急な用事が入って、今すぐ行かないといけない……？　了解です。では後で合流しましょう」
line = "「急な用事が入って、今すぐ行かないといけない……？　了解です。では後で合流しましょう」"

[[dialogue]]
speaker = "コハルコ"
# 『もしもし？　私が送ったラーメン屋さんの情報、役に立った？』
line = "『もしもし？　私が送ったラーメン屋さんの情報、役に立った？』"

[[dialogue]]
speaker = "コハルコ"
# 『……バッチリ？　ならよかった。よくわからないけど、他の地域の人気店も調べればいいんだよね』
line = "『……バッチリ？　ならよかった。よくわからないけど、他の地域の人気店も調べればいいんだよね』"

[[dialogue]]
speaker = "コハルコ"
# 『あとモンスターの反応だけど、そこから北西に──』
line = "『あとモンスターの反応だけど、そこから北西に──』"

[[dialogue]]
speaker = "unk"
# 俺の考えた作戦は、イニシュがラーメンを食べている間にモンスターを捕獲するというもの。
line = "俺の考えた作戦は、イニシュがラーメンを食べている間にモンスターを捕獲するというもの。"

[[dialogue]]
speaker = "unk"
# いささか無茶ではあるが、コハルコさんのバックアップがあればなんとかなるはず……
line = "いささか無茶ではあるが、コハルコさんのバックアップがあればなんとかなるはず……"

[[dialogue]]
speaker = "unk"
# シーリング！
line = "シーリング！"

[[dialogue]]
speaker = "スミス"
# 「ゲコー！」
line = "「ゲコー！」"

[[dialogue]]
speaker = "イニシュ"
# 「用事は終わりましたか、魔王」
line = "「用事は終わりましたか、魔王」"

[[dialogue]]
speaker = "unk"
# おかげさまで。ラーメンはどうだった？
line = "おかげさまで。ラーメンはどうだった？"

[[dialogue]]
speaker = "イニシュ"
# 「予想以上の味でした。豚骨と魚介の強い旨味に、弾力のある太麺の組み合わせが絶妙です」
line = "「予想以上の味でした。豚骨と魚介の強い旨味に、弾力のある太麺の組み合わせが絶妙です」"

[[dialogue]]
speaker = "イニシュ"
# 「カップ麺でも同系統の味は食したことがありましたが、やはり店で食べるものは違いますね」
line = "「カップ麺でも同系統の味は食したことがありましたが、やはり店で食べるものは違いますね」"

[[dialogue]]
speaker = "イニシュ"
# 「もちろん、カップ麺は手軽に食べられるというメリットがあります。どちらも素晴らしいものです」
line = "「もちろん、カップ麺は手軽に食べられるというメリットがあります。どちらも素晴らしいものです」"

[[dialogue]]
speaker = "unk"
# 他にもおすすめのお店があるんだけど……
line = "他にもおすすめのお店があるんだけど……"

[[dialogue]]
speaker = "イニシュ"
# 「！」
line = "「！」"

[[dialogue]]
speaker = "イニシュ"
# 「……そちらのお店も案内していただけますか？」
line = "「……そちらのお店も案内していただけますか？」"

[[dialogue]]
speaker = "ウェンディ"
# 「あ、会長さん！　ふぅ……ようやく合流できましたね」
line = "「あ、会長さん！　ふぅ……ようやく合流できましたね」"

[[dialogue]]
speaker = "ウェンディ"
# 「はい。使い魔は確かに返却いただきました。そちらの進捗は……やはりある程度はイニシュにやられましたか」
line = "「はい。使い魔は確かに返却いただきました。そちらの進捗は……やはりある程度はイニシュにやられましたか」"

[[dialogue]]
speaker = "ウェンディ"
# 「まとめると、実験体２０体のうち、イニシュに撃破されたのが１０体。捕獲に成功したのが８体、また逃亡中なのが２体」
line = "「まとめると、実験体２０体のうち、イニシュに撃破されたのが１０体。捕獲に成功したのが８体、また逃亡中なのが２体」"

[[dialogue]]
speaker = "ウェンディ"
# 「回収はもう少しですが、残る実験体を全て捕獲できても最初の半数ほど。うぅ……実験としてギリギリの数ですね……」
line = "「回収はもう少しですが、残る実験体を全て捕獲できても最初の半数ほど。うぅ……実験としてギリギリの数ですね……」"

[[dialogue]]
speaker = "ウェンディ"
# 「私も基地では時間稼ぎの策を講じてきましたが──」
line = "「私も基地では時間稼ぎの策を講じてきましたが──」"

[[dialogue]]
speaker = "ウェンディ"
# 「はぁ、はぁ……こんなに飛ばしたのはネビュラの戦闘訓練以来ですよ……」
