[[dialogue]]
speaker = "ウェンディ"
# 「あ、いえ、例の<b>計画</b>がありますから、前倒しできるものは前倒ししておいた方が良いかと思いまして」
line = "「あ、いえ、例の<b>計画</b>がありますから、前倒しできるものは前倒ししておいた方が良いかと思いまして」"

