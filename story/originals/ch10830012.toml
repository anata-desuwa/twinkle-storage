[[dialogue]]
speaker = "unk"
# 第２話,吸血鬼は安眠したい,P
line = "第２話,吸血鬼は安眠したい,P"

[[dialogue]]
speaker = "unk"
# それは、とある昼休み、ソフレとフェリシーと一緒に昼食をしていた時のことだった――
line = "それは、とある昼休み、ソフレとフェリシーと一緒に昼食をしていた時のことだった――"

[[dialogue]]
speaker = "ソフレ"
# 「すぅ……すぅ……スヤスヤ……♪」
line = "「すぅ……すぅ……スヤスヤ……♪」"

[[dialogue]]
speaker = "unk"
# 今日もよく眠ってるな
line = "今日もよく眠ってるな"

[[dialogue]]
speaker = "フェリシー"
# 「ふふっ、そうだね。ソフレ曰く、お腹一杯になって眠るのは、至福の時らしいよ」
line = "「ふふっ、そうだね。ソフレ曰く、お腹一杯になって眠るのは、至福の時らしいよ」"

[[dialogue]]
speaker = "フェリシー"
# 「それでいて、ソフレは全然太らない体質らしいから、すごく羨ましいよね～」
line = "「それでいて、ソフレは全然太らない体質らしいから、すごく羨ましいよね～」"

[[dialogue]]
speaker = "ソフレ"
# 「……ハッ！　今誰か、安眠グッズの話をしていたのだわ！」
line = "「……ハッ！　今誰か、安眠グッズの話をしていたのだわ！」"

[[dialogue]]
speaker = "フェリシー"
# 「わっ、いきなり起きてビックリした！　安眠グッズの話なんかしてないよ！？」
line = "「わっ、いきなり起きてビックリした！　安眠グッズの話なんかしてないよ！？」"

[[dialogue]]
speaker = "ソフレ"
# 「いや、カフェテリアの生徒達の誰かが、間違いなく話していたのよ！　ちょっと聞いて回ってくるのだわ！」
line = "「いや、カフェテリアの生徒達の誰かが、間違いなく話していたのよ！　ちょっと聞いて回ってくるのだわ！」"

[[dialogue]]
speaker = "unk"
# ちょっ、ソフレ！？
line = "ちょっ、ソフレ！？"

[[dialogue]]
speaker = "ソフレ"
# 「――やっぱり、聞き間違えじゃなかったのだわ。どうやら、ＳＮＳで話題の安眠枕があるらしいのよ！」
line = "「――やっぱり、聞き間違えじゃなかったのだわ。どうやら、ＳＮＳで話題の安眠枕があるらしいのよ！」"

[[dialogue]]
speaker = "ソフレ"
# 「ＤＩＳＣで検索すると、ほら！　みんな絶賛しているのだわ！」
line = "「ＤＩＳＣで検索すると、ほら！　みんな絶賛しているのだわ！」"

[[dialogue]]
speaker = "ソフレ"
# 「どうやら、今までにない新素材を中に詰めた枕らしいのよ。まるで雲の上にいるかのような寝心地を味わえるらしいのだわ！」
line = "「どうやら、今までにない新素材を中に詰めた枕らしいのよ。まるで雲の上にいるかのような寝心地を味わえるらしいのだわ！」"

[[dialogue]]
speaker = "フェリシー"
# 「いや、いつも雲の上で寝てるじゃん」
line = "「いや、いつも雲の上で寝てるじゃん」"

[[dialogue]]
speaker = "ソフレ"
# 「全然違うのだわ、フェリシー！　ソフレの雲はあくまで能力の副産物。安眠の為に作られた枕は、別物なのよ！」
line = "「全然違うのだわ、フェリシー！　ソフレの雲はあくまで能力の副産物。安眠の為に作られた枕は、別物なのよ！」"

[[dialogue]]
speaker = "ソフレ"
# 「真の安眠を味わったことがない者には、それがわからないのだわ！」
line = "「真の安眠を味わったことがない者には、それがわからないのだわ！」"

[[dialogue]]
speaker = "unk"
# いつになく言葉に熱が入っている……！
line = "いつになく言葉に熱が入っている……！"

[[dialogue]]
speaker = "フェリシー"
# 「あはは……ソフレは睡眠大好きだから、快適に眠る為なら努力を惜しまないんだよね」
line = "「あはは……ソフレは睡眠大好きだから、快適に眠る為なら努力を惜しまないんだよね」"

[[dialogue]]
speaker = "フェリシー"
# 「私としては、その努力を星騎士として頑張る方面にもっと向けて欲しいんだけどな～」
line = "「私としては、その努力を星騎士として頑張る方面にもっと向けて欲しいんだけどな～」"

[[dialogue]]
speaker = "ソフレ"
# 「とにかく、こうしてはいられないのだわ！　午後の授業なんてサボって、売り切れる前に街へ買いに行くのよ！」
line = "「とにかく、こうしてはいられないのだわ！　午後の授業なんてサボって、売り切れる前に街へ買いに行くのよ！」"

[[dialogue]]
speaker = "フェリシー"
# 「いや、それはダメでしょ！　授業は真面目に受けないと！」
line = "「いや、それはダメでしょ！　授業は真面目に受けないと！」"

[[dialogue]]
speaker = "ソフレ"
# 「１００年間サボりまくってきてるんだから、今更１回くらいどうってことないのよ！」
line = "「１００年間サボりまくってきてるんだから、今更１回くらいどうってことないのよ！」"

[[dialogue]]
speaker = "フェリシー"
# 「今日は平日なんだから、そんな急に売れたりしないって！」
line = "「今日は平日なんだから、そんな急に売れたりしないって！」"

[[dialogue]]
speaker = "ソフレ"
# 「善は急げというじゃない！　これも善行のうちなのだわ！」
line = "「善は急げというじゃない！　これも善行のうちなのだわ！」"

[[dialogue]]
speaker = "フェリシー"
# 「上手いこと言ったつもり！？　絶対にダメだからね！」
line = "「上手いこと言ったつもり！？　絶対にダメだからね！」"

[[dialogue]]
speaker = "ソフレ"
# 「――仕方ないから、放課後まで待ってあげたけど、その代わりソフレの買い物に付き合ってもらうのだわ！」
line = "「――仕方ないから、放課後まで待ってあげたけど、その代わりソフレの買い物に付き合ってもらうのだわ！」"

[[dialogue]]
speaker = "unk"
# ということで、俺たちは放課後、街へとやって来ていた。
line = "ということで、俺たちは放課後、街へとやって来ていた。"

[[dialogue]]
speaker = "ソフレ"
# 「新素材の安眠枕……人気商品だから、１人１個制限がかかっているところが多いらしいのよ」
line = "「新素材の安眠枕……人気商品だから、１人１個制限がかかっているところが多いらしいのよ」"

[[dialogue]]
speaker = "ソフレ"
# 「だけどソフレとしては、最低でも３つ――実際に使う用と、予備と、鑑賞用を確保しておきたいのだわ」
line = "「だけどソフレとしては、最低でも３つ――実際に使う用と、予備と、鑑賞用を確保しておきたいのだわ」"

[[dialogue]]
speaker = "unk"
# 鑑賞用っ！？
line = "鑑賞用っ！？"

[[dialogue]]
speaker = "ソフレ"
# 「安眠グッズはいくつあってもいいのだわ。快適な眠りは、日々の生活を豊かにするのだから」
line = "「安眠グッズはいくつあってもいいのだわ。快適な眠りは、日々の生活を豊かにするのだから」"

[[dialogue]]
speaker = "フェリシー"
# 「ソフレの部屋、安眠グッズでいっぱいだもんね～。この前なんか掃除が大変だったよ」
line = "「ソフレの部屋、安眠グッズでいっぱいだもんね～。この前なんか掃除が大変だったよ」"

[[dialogue]]
speaker = "フェリシー"
# 「――部屋に遊びに行ったことがあるのかって？　うん！　何度もあるよ」
line = "「――部屋に遊びに行ったことがあるのかって？　うん！　何度もあるよ」"

[[dialogue]]
speaker = "ソフレ"
# 「授業に遅刻するからって、こいつが毎日、ソフレを起こしに無理矢理押しかけてきてるだけなのだわ」
line = "「授業に遅刻するからって、こいつが毎日、ソフレを起こしに無理矢理押しかけてきてるだけなのだわ」"

[[dialogue]]
speaker = "ソフレ"
# 「――枕以外に、どんな安眠グッズがあるのか気になるって？　まさか会長、興味があるのだわ！？」
line = "「――枕以外に、どんな安眠グッズがあるのか気になるって？　まさか会長、興味があるのだわ！？」"

[[dialogue]]
speaker = "ソフレ"
# 「そういうことなら、ソフレお気に入りの安眠グッズを紹介してあげないこともないのよ！　例えばそう、ホットアイマスクとか、すごくいいのだわ！」
line = "「そういうことなら、ソフレお気に入りの安眠グッズを紹介してあげないこともないのよ！　例えばそう、ホットアイマスクとか、すごくいいのだわ！」"

[[dialogue]]
speaker = "unk"
# （く、食いつきが凄い……！）
line = "（く、食いつきが凄い……！）"

[[dialogue]]
speaker = "ソフレ"
# 「それにパジャマも馬鹿にできないのだわ。ソフレが好きな生地は――」
line = "「それにパジャマも馬鹿にできないのだわ。ソフレが好きな生地は――」"

[[dialogue]]
speaker = "ソフレ"
# 「ふふふ……残念ながらラスト１個しか残ってなかったけど、安眠枕を無事にゲットできたのだわ……！」
line = "「ふふふ……残念ながらラスト１個しか残ってなかったけど、安眠枕を無事にゲットできたのだわ……！」"

[[dialogue]]
speaker = "フェリシー"
# 「本当に人気商品なんだね。売り切れのところばかりでビックリしたよ」
line = "「本当に人気商品なんだね。売り切れのところばかりでビックリしたよ」"

[[dialogue]]
speaker = "ソフレ"
# 「…………スヤァ～♪」
line = "「…………スヤァ～♪」"

[[dialogue]]
speaker = "unk"
# って、もう使って寝てるし！
line = "って、もう使って寝てるし！"

[[dialogue]]
speaker = "フェリシー"
# 「思いっきり街のど真ん中なのにね～」
line = "「思いっきり街のど真ん中なのにね～」"

[[dialogue]]
speaker = "ソフレ"
# 「すぅ……すぅ……枕……ふわふわなのだわ……♪」
line = "「すぅ……すぅ……枕……ふわふわなのだわ……♪」"

[[dialogue]]
speaker = "フェリシー"
# 「ソフレったら、この後、一体誰が運ぶと思ってるんだか。でも――」
line = "「ソフレったら、この後、一体誰が運ぶと思ってるんだか。でも――」"

[[dialogue]]
speaker = "フェリシー"
# 「寝てる時だけは素直な表情を見せるから、見てるとつい可愛くて、許しちゃうんだよね～」
line = "「寝てる時だけは素直な表情を見せるから、見てるとつい可愛くて、許しちゃうんだよね～」"

[[dialogue]]
speaker = "unk"
# それはすごくわかる
line = "それはすごくわかる"

[[dialogue]]
speaker = "フェリシー"
# 「無邪気な顔しちゃって……つんつん♪」
line = "「無邪気な顔しちゃって……つんつん♪」"

[[dialogue]]
speaker = "ソフレ"
# 「ん……♪　スヤスヤ……♪」
line = "「ん……♪　スヤスヤ……♪」"

[[dialogue]]
speaker = "unk"
# フェリシーが頬っぺたを突いても、幸せそうに眠るソフレなのだった――
line = "フェリシーが頬っぺたを突いても、幸せそうに眠るソフレなのだった――"
