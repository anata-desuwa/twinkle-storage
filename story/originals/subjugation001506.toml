[[dialogue]]
speaker = "イングリット"
# 「ふむ。こちらも出られないか」
line = "「ふむ。こちらも出られないか」"

[[dialogue]]
speaker = "カティア"
# 「これで１０回目だワン……このままじゃ一生アステラに閉じ込められたままになるガオ……」
line = "「これで１０回目だワン……このままじゃ一生アステラに閉じ込められたままになるガオ……」"

[[dialogue]]
speaker = "イングリット"
# 「その心配はない。私に任せろ」
line = "「その心配はない。私に任せろ」"

[[dialogue]]
speaker = "カティア"
# 「任せた結果がこの様だワン……」
line = "「任せた結果がこの様だワン……」"

[[dialogue]]
speaker = "カティア"
# （このコラプサー、強い以外やることなすことダメダメ……私がどうにかしないと……）
line = "（このコラプサー、強い以外やることなすことダメダメ……私がどうにかしないと……）"

[[dialogue]]
speaker = "イングリット"
# 「さて、次は南の方へ行ってみるか」
line = "「さて、次は南の方へ行ってみるか」"

[[dialogue]]
speaker = "カティア"
# 「アステラの中で方角なんてアテにならないと思うワン……！　というかそっちは多分北だガオ！」
line = "「アステラの中で方角なんてアテにならないと思うワン……！　というかそっちは多分北だガオ！」"

[[dialogue]]
speaker = "カティア"
# 「こうなったら、私の嗅覚で──って、これは魔王様の匂い！」
line = "「こうなったら、私の嗅覚で──って、これは魔王様の匂い！」"

[[dialogue]]
speaker = "イングリット"
# 「なに？　魔王だと？」
line = "「なに？　魔王だと？」"

[[dialogue]]
speaker = "カティア"
# 「魔王様が近くにいるワン……！　もしかして、私を心配して……？」
line = "「魔王様が近くにいるワン……！　もしかして、私を心配して……？」"

[[dialogue]]
speaker = "イングリット"
# 「よくやった犬。さあ、私を魔王の元に連れていけ」
line = "「よくやった犬。さあ、私を魔王の元に連れていけ」"

[[dialogue]]
speaker = "カティア"
# （うむむ……このまま魔王様のところへ連れていっていいのかな……）
line = "（うむむ……このまま魔王様のところへ連れていっていいのかな……）"

[[dialogue]]
speaker = "イングリット"
# 「どうした？　なぜ動かない？」
line = "「どうした？　なぜ動かない？」"

[[dialogue]]
speaker = "カティア"
# 「な、なんでもないワン」
line = "「な、なんでもないワン」"

[[dialogue]]
speaker = "カティア"
# （だ、大丈夫だよね……魔王様強いし、きっとなんとかしてくれるはず……！）
line = "（だ、大丈夫だよね……魔王様強いし、きっとなんとかしてくれるはず……！）"

[[dialogue]]
speaker = "カティア"
# 「それじゃあ、魔王様のところへ向かうガオ！」
line = "「それじゃあ、魔王様のところへ向かうガオ！」"

[[dialogue]]
speaker = "マリーベル"
# 「それで、もう１人のコラプサーはどんな人なの？」
line = "「それで、もう１人のコラプサーはどんな人なの？」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「ふふ、そんなにコラプサーの事が気になりまして？」
line = "「ふふ、そんなにコラプサーの事が気になりまして？」"

[[dialogue]]
speaker = "マリーベル"
# 「当然でしょう、これから戦うかもしれない相手よ」
line = "「当然でしょう、これから戦うかもしれない相手よ」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「そうでございますわね。まあ、イングリット様と話し合いをするのはほぼ不可能でございましょうし」
line = "「そうでございますわね。まあ、イングリット様と話し合いをするのはほぼ不可能でございましょうし」"

[[dialogue]]
speaker = "マリーベル"
# 「そんなに話が通じない相手なの？」
line = "「そんなに話が通じない相手なの？」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「はい、イングリット様はとても好戦的なお方でございますの」
line = "「はい、イングリット様はとても好戦的なお方でございますの」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「オブラートに包まずに言うならば、戦闘狂でございますわね……常に強者と戦うことしか考えていないバーサーカーでございますわ」
line = "「オブラートに包まずに言うならば、戦闘狂でございますわね……常に強者と戦うことしか考えていないバーサーカーでございますわ」"

[[dialogue]]
speaker = "マリーベル"
# 「……随分乱暴そうな人なのね」
line = "「……随分乱暴そうな人なのね」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「その認識で合っていますわ……わたくしのこともコキ使ってくれやがりまして──コホン、少しお喋りがすぎましたわ」
line = "「その認識で合っていますわ……わたくしのこともコキ使ってくれやがりまして──コホン、少しお喋りがすぎましたわ」"

[[dialogue]]
speaker = "unk"
# イングリットはジュリエッテより強いの？
line = "イングリットはジュリエッテより強いの？"

[[dialogue]]
speaker = "ジュリエッテ"
# 「わたくしなどより遥かに強いですわ……まぁ、わたくしはコラプサーの中で最弱でございますが」
line = "「わたくしなどより遥かに強いですわ……まぁ、わたくしはコラプサーの中で最弱でございますが」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「そもそも、わたくしは後方支援担当なのです。戦闘があまり得意ではないのも当然でございますわ」
line = "「そもそも、わたくしは後方支援担当なのです。戦闘があまり得意ではないのも当然でございますわ」"

[[dialogue]]
speaker = "マリーベル"
# 「そう、貴重な情報をありがとう」
line = "「そう、貴重な情報をありがとう」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「いえいえ、わたくしたち仲間ではございませんか♪」
line = "「いえいえ、わたくしたち仲間ではございませんか♪」"

[[dialogue]]
speaker = "マリーベル"
# 「仲間ではないと言っているのだけど……」
line = "「仲間ではないと言っているのだけど……」"

[[dialogue]]
speaker = "マリーベル"
# 「じゃあついでに聞くけど、コラプサーの目的は何？　星騎士を邪魔して世界を滅ぼすこと？」
line = "「じゃあついでに聞くけど、コラプサーの目的は何？　星騎士を邪魔して世界を滅ぼすこと？」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「いいえ。我々の目的は世界の破壊などではございません」
line = "「いいえ。我々の目的は世界の破壊などではございません」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「コラプサーの目的は救世。あなた方と同じく世界を守ることでございます」
line = "「コラプサーの目的は救世。あなた方と同じく世界を守ることでございます」"

[[dialogue]]
speaker = "マリーベル"
# 「私たちと同じ……？　じゃあ協力すればいいじゃない。何か恨みでもあるの？」
line = "「私たちと同じ……？　じゃあ協力すればいいじゃない。何か恨みでもあるの？」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「さぁ？　わたくしは存じませぬが、星騎士の方々と共闘できない理由がおありなのでございましょう」
line = "「さぁ？　わたくしは存じませぬが、星騎士の方々と共闘できない理由がおありなのでございましょう」"

[[dialogue]]
speaker = "マリーベル"
# 「──！？　この衝撃……近くで戦闘が行われているようね」
line = "「──！？　この衝撃……近くで戦闘が行われているようね」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「あれは……モンスターの群れとイングリット様でございますわね」
line = "「あれは……モンスターの群れとイングリット様でございますわね」"

[[dialogue]]
speaker = "カティア"
# 「はぁはぁ、モンスター多すぎなんですけど……」
line = "「はぁはぁ、モンスター多すぎなんですけど……」"

[[dialogue]]
speaker = "イングリット"
# 「ふん、この程度で音を上げるとは情けない」
line = "「ふん、この程度で音を上げるとは情けない」"

[[dialogue]]
speaker = "カティア"
# （ていうかコラプサーも強すぎ……！　全然共倒れになってくれないし……）
line = "（ていうかコラプサーも強すぎ……！　全然共倒れになってくれないし……）"

[[dialogue]]
speaker = "unk"
# カティアも一緒にいる！
line = "カティアも一緒にいる！"

[[dialogue]]
speaker = "マリーベル"
# 「無事でよかった……とは言い難いわね」
line = "「無事でよかった……とは言い難いわね」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「ふむ……どうやら魔王様のお仲間もいらっしゃるようでございますし、救援に向かいましょうか」
line = "「ふむ……どうやら魔王様のお仲間もいらっしゃるようでございますし、救援に向かいましょうか」"

[[dialogue]]
speaker = "マリーベル"
# 「行きましょう、会長さん……！」
line = "「行きましょう、会長さん……！」"

[[dialogue]]
speaker = "カティア"
# 「ぜぇ、はぁ……このままじゃ魔王様と合流する前に死んじゃう……」
line = "「ぜぇ、はぁ……このままじゃ魔王様と合流する前に死んじゃう……」"

[[dialogue]]
speaker = "モンスター"
# 「イ～～～ッ」
line = "「イ～～～ッ」"

[[dialogue]]
speaker = "カティア"
# 「あ──！？」
line = "「あ──！？」"

[[dialogue]]
speaker = "マリーベル"
# 「カティアさん大丈夫！？　助けに来たわよ……！」
line = "「カティアさん大丈夫！？　助けに来たわよ……！」"

[[dialogue]]
speaker = "カティア"
# 「マリーベル先輩！？　それに魔王様！　ありがとうございます助かります！」
line = "「マリーベル先輩！？　それに魔王様！　ありがとうございます助かります！」"

[[dialogue]]
speaker = "モンスター"
# 「イ～～～ッ！！」
line = "「イ～～～ッ！！」"

[[dialogue]]
speaker = "イングリット"
# 「……ジュリエッテか」
line = "「……ジュリエッテか」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「不本意ながら、救援に来ましたわ」
line = "「不本意ながら、救援に来ましたわ」"

[[dialogue]]
speaker = "イングリット"
# 「貴様の助けなどいらん」
line = "「貴様の助けなどいらん」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「そう仰ると思いましたわ……言いたいことは山ほどございますが、ひとまずはこのモンスター達を片づけましょう」
line = "「そう仰ると思いましたわ……言いたいことは山ほどございますが、ひとまずはこのモンスター達を片づけましょう」"

[[dialogue]]
speaker = "unk"
# あなたがイングリット？
line = "あなたがイングリット？"

[[dialogue]]
speaker = "イングリット"
# 「誰だ貴様？」
line = "「誰だ貴様？」"

[[dialogue]]
speaker = "カティア"
# 「いやお前が探してた魔王様だワン」
line = "「いやお前が探してた魔王様だワン」"

[[dialogue]]
speaker = "イングリット"
# 「そうか貴様が魔王か！　とうとう見つけたぞ！」
line = "「そうか貴様が魔王か！　とうとう見つけたぞ！」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「魔王の顔写真はコラプサーのアジトで見たではございませんか……」
line = "「魔王の顔写真はコラプサーのアジトで見たではございませんか……」"

[[dialogue]]
speaker = "イングリット"
# 「忘れた。魔王の強さには興味があるが、顔などどうでもいい」
line = "「忘れた。魔王の強さには興味があるが、顔などどうでもいい」"

[[dialogue]]
speaker = "カティア"
# 「やっぱりこのコラプサー、戦い以外ダメダメだワン……！」
line = "「やっぱりこのコラプサー、戦い以外ダメダメだワン……！」"
