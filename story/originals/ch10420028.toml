# 「たっぷり出したのに、おち○ちんちっとも小さくなってません<emoji=heart04>　ぱんぱんに膨らんだまま、ビクンビクンしてます<emoji=heart04>」
line = "「たっぷり出したのに、おち○ちんちっとも小さくなってません<emoji=heart04>　ぱんぱんに膨らんだまま、ビクンビクンしてます<emoji=heart04>」"

