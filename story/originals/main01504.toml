[[dialogue]]
speaker = "unk"
# 第５話,介入者,B
line = "第５話,介入者,B"

[[dialogue]]
speaker = "セドナ"
# 「──やめておけ」
line = "「──やめておけ」"

[[dialogue]]
speaker = "ルリエル"
# 「！」
line = "「！」"

[[dialogue]]
speaker = "unk"
# 俺たちと塔を塞ぐようにして現れたのは──漆黒の<ruby=ほむら>焔</ruby>をたぎらせた、魔女だった。
line = "俺たちと塔を塞ぐようにして現れたのは──漆黒の<ruby>焔<rt>ほむら</rt></ruby>をたぎらせた、魔女だった。"

[[dialogue]]
speaker = "クロト"
# 「セドナ、さん……」
line = "「セドナ、さん……」"

[[dialogue]]
speaker = "セドナ"
# 「やあ。魔界の旅はどうだったかな──諸君。よもや、うろも使わず帰ってくるとは思わなかったが」
line = "「やあ。魔界の旅はどうだったかな──諸君。よもや、うろも使わず帰ってくるとは思わなかったが」"

[[dialogue]]
speaker = "unk"
# 苦笑するセドナさん。なぜ彼女がここにいるのか。
line = "苦笑するセドナさん。なぜ彼女がここにいるのか。"

[[dialogue]]
speaker = "unk"
# それに……今の態度で確信した。やはり彼女たちは、端から俺たちを人間界へ帰す気はなかったのだ。
line = "それに……今の態度で確信した。やはり彼女たちは、端から俺たちを人間界へ帰す気はなかったのだ。"

[[dialogue]]
speaker = "セドナ"
# 「息災で何よりだ、九浄の娘。だというのにむざむざ死地へ戻ってくるなど何を考えているのやら」
line = "「息災で何よりだ、九浄の娘。だというのにむざむざ死地へ戻ってくるなど何を考えているのやら」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええ、おかげさまでね。クロト達を送ってくれたこと──それについては感謝してるわ。しきれないくらいね」
line = "「ええ、おかげさまでね。クロト達を送ってくれたこと──それについては感謝してるわ。しきれないくらいね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「でも……やめとけってどういうこと？　私たちはアポロと、この世界を救うために戦ってるのよ」
line = "「でも……やめとけってどういうこと？　私たちはアポロと、この世界を救うために戦ってるのよ」"

[[dialogue]]
speaker = "セドナ"
# 「わかっているさ。その上で、無謀はよせと言っている」
line = "「わかっているさ。その上で、無謀はよせと言っている」"

[[dialogue]]
speaker = "アイリーン"
# 「ヴィーナスさん……ご無事だったんですね」
line = "「ヴィーナスさん……ご無事だったんですね」"

[[dialogue]]
speaker = "カヤ"
# 「でも、帰ってきちゃった」
line = "「でも、帰ってきちゃった」"

[[dialogue]]
speaker = "マトイ"
# 「アイリーンさん──カヤさん──」
line = "「アイリーンさん──カヤさん──」"

[[dialogue]]
speaker = "アナ"
# 「堂々と学園まで乗り込んでくるものですね。ネビュラさん」
line = "「堂々と学園まで乗り込んでくるものですね。ネビュラさん」"

[[dialogue]]
speaker = "アイリーン"
# 「非常事態ですから。お互いに」
line = "「非常事態ですから。お互いに」"

[[dialogue]]
speaker = "unk"
# ネビュラ──魔女の方々はエージェントまで引き連れて、学園の敷地内に入り込んでいた。
line = "ネビュラ──魔女の方々はエージェントまで引き連れて、学園の敷地内に入り込んでいた。"

[[dialogue]]
speaker = "クロト"
# 「それで……セドナさん。どういうつもりですか？　俺たちの行く手を阻んで」
line = "「それで……セドナさん。どういうつもりですか？　俺たちの行く手を阻んで」"

[[dialogue]]
speaker = "セドナ"
# 「アレを見たのだろう？」
line = "「アレを見たのだろう？」"

[[dialogue]]
speaker = "フィオナ"
# 「っ……！」
line = "「っ……！」"

[[dialogue]]
speaker = "クロト"
# 「何の──」
line = "「何の──」"

[[dialogue]]
speaker = "セドナ"
# 「──何のことか、とは言わせない。今この世界において、特筆すべき脅威はたった一点の存在だ」
line = "「──何のことか、とは言わせない。今この世界において、特筆すべき脅威はたった一点の存在だ」"

[[dialogue]]
speaker = "unk"
# 天を見上げるセドナさん。
line = "天を見上げるセドナさん。"

[[dialogue]]
speaker = "unk"
# その先にあるのは塔の頂上──そして、天蓋にまします仮面の少女。
line = "その先にあるのは塔の頂上──そして、天蓋にまします仮面の少女。"

[[dialogue]]
speaker = "セドナ"
# 「アレを見たなら、私たちの警告も理解できたはずだ。アレはもう、貴様らの敵う相手ではない」
line = "「アレを見たなら、私たちの警告も理解できたはずだ。アレはもう、貴様らの敵う相手ではない」"

[[dialogue]]
speaker = "フィオナ"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "セドナ"
# 「アポロ──と名乗っているリクリエの使徒は、すでに魂のほとんどが<ruby=やくさい>厄災</ruby>と同化している。もはや手のつけられる存在ではない」
line = "「アポロ──と名乗っているリクリエの使徒は、すでに魂のほとんどが<ruby>厄災<rt>やくさい</rt></ruby>と同化している。もはや手のつけられる存在ではない」"

[[dialogue]]
speaker = "マトイ"
# 「ちょっと、そんな言い方──」
line = "「ちょっと、そんな言い方──」"

[[dialogue]]
speaker = "セドナ"
# 「ほとんどが、と言ったろう。元の人格が僅かに残っているのを否定するわけではないさ。だが……現実に使徒の脅威度は何も変わらない」
line = "「ほとんどが、と言ったろう。元の人格が僅かに残っているのを否定するわけではないさ。だが……現実に使徒の脅威度は何も変わらない」"

[[dialogue]]
speaker = "セドナ"
# 「このように」
line = "「このように」"

[[dialogue]]
speaker = "ルリエル"
# 「！　魔法の炎──」
line = "「！　魔法の炎──」"

[[dialogue]]
speaker = "unk"
# セドナさんの放出した『魔焔』が──遥か上空の流れ星を燃やし、消滅させた。
line = "セドナさんの放出した『魔焔』が──遥か上空の流れ星を燃やし、消滅させた。"

[[dialogue]]
speaker = "セドナ"
# 「『リクリエの使徒』は狙った領域に流星を降らせる。どの街を、どの都市を壊滅させるのかも思いのままだ」
line = "「『リクリエの使徒』は狙った領域に流星を降らせる。どの街を、どの都市を壊滅させるのかも思いのままだ」"

[[dialogue]]
speaker = "セドナ"
# 「今の奴にとって人間界など巨大な遊戯盤にすぎない。そんな相手に、貴様らはどう立ち回るという？」
line = "「今の奴にとって人間界など巨大な遊戯盤にすぎない。そんな相手に、貴様らはどう立ち回るという？」"

[[dialogue]]
speaker = "マトイ"
# 「それは……」
line = "「それは……」"

[[dialogue]]
speaker = "カヤ"
# 「星術が使えなきゃ星騎士は意味なし。わざわざ死に急ぐことない」
line = "「星術が使えなきゃ星騎士は意味なし。わざわざ死に急ぐことない」"

[[dialogue]]
speaker = "unk"
# ──アポロは意図して流星を降らせる。
line = "──アポロは意図して流星を降らせる。"

[[dialogue]]
speaker = "unk"
# 加えて、星力の発揮を封じる天蓋さえも操れる。
line = "加えて、星力の発揮を封じる天蓋さえも操れる。"

[[dialogue]]
speaker = "unk"
# はっきり言って……<ruby=スターナイト>星騎士</ruby>に太刀打ちできる術はない。
line = "はっきり言って……<ruby>星騎士<rt>スターナイト</rt></ruby>に太刀打ちできる術はない。"

[[dialogue]]
speaker = "セドナ"
# 「緋宮クロト──いや、魔王。貴様の力量は承知している。その器に、今や魔力と霊力までを有していることもな」
line = "「緋宮クロト──いや、魔王。貴様の力量は承知している。その器に、今や魔力と霊力までを有していることもな」"

[[dialogue]]
speaker = "セドナ"
# 「だが……たとえ貴様１人いたところで、あの脅威相手には立ちゆくまい」
line = "「だが……たとえ貴様１人いたところで、あの脅威相手には立ちゆくまい」"

[[dialogue]]
speaker = "クロト"
# 「あなた達──ネビュラなら、アポロに対処できると？」
line = "「あなた達──ネビュラなら、アポロに対処できると？」"

[[dialogue]]
speaker = "セドナ"
# 「今にご覧の通り、我々には魔力がある。魔法という理でもって、奴を抑えつけるくらいなら可能だ」
line = "「今にご覧の通り、我々には魔力がある。魔法という理でもって、奴を抑えつけるくらいなら可能だ」"

[[dialogue]]
speaker = "セーラ"
# 「んー……明確な勝算とは言えないと思うけど？」
line = "「んー……明確な勝算とは言えないと思うけど？」"

[[dialogue]]
speaker = "セドナ"
# 「ふむ。確かに、私程度の魔力ではまだ不足だろうな」
line = "「ふむ。確かに、私程度の魔力ではまだ不足だろうな」"

[[dialogue]]
speaker = "クロト"
# 「……他にもあてがあると？」
line = "「……他にもあてがあると？」"

[[dialogue]]
speaker = "unk"
# そう訊ねた瞬間だった。
line = "そう訊ねた瞬間だった。"

[[dialogue]]
speaker = "クラウディア"
# 「ま、余らに任せておけということだ──ネビュラの一大ぷろじぇくとなのでな」
line = "「ま、余らに任せておけということだ──ネビュラの一大ぷろじぇくとなのでな」"

[[dialogue]]
speaker = "ルリエル"
# 「あ……基地にいたチビっこさんです！」
line = "「あ……基地にいたチビっこさんです！」"

[[dialogue]]
speaker = "クラウディア"
# 「外の空気はうまい──と言いたいところだが、今日の天気ではビミョ～だのう」
line = "「外の空気はうまい──と言いたいところだが、今日の天気ではビミョ～だのう」"

[[dialogue]]
speaker = "クロト"
# 「君は確か……姫、とか呼ばれてた」
line = "「君は確か……姫、とか呼ばれてた」"

[[dialogue]]
speaker = "アナ"
# 「光の魔女にしてネビュラ総帥──クラウディア・イルゼ・フォン・ゴットフリート」
line = "「光の魔女にしてネビュラ総帥──クラウディア・イルゼ・フォン・ゴットフリート」"

[[dialogue]]
speaker = "クラウディア"
# 「うむ。『腕試し』以来となるな、星騎士ども」
line = "「うむ。『腕試し』以来となるな、星騎士ども」"

[[dialogue]]
speaker = "unk"
# 唐突な光の<ruby=ほんりゅう>奔流</ruby>と共に現れたのは、魔女たちの<ruby=しゅかい>首魁</ruby>たる少女だった。
line = "唐突な光の<ruby>奔流<rt>ほんりゅう</rt></ruby>と共に現れたのは、魔女たちの<ruby>首魁<rt>しゅかい</rt></ruby>たる少女だった。"

[[dialogue]]
speaker = "unk"
# その登場にはなぜか、意外な人物まで反応して……
line = "その登場にはなぜか、意外な人物まで反応して……"

[[dialogue]]
speaker = "ヴィーナス"
# 「あ──あの時のガキンチョ！」
line = "「あ──あの時のガキンチョ！」"

[[dialogue]]
speaker = "クラウディア"
# 「わはは。久しぶりだのう、娘よ」
line = "「わはは。久しぶりだのう、娘よ」"

[[dialogue]]
speaker = "マトイ"
# 「あれ？　どうしてヴィーナスがあの子と知り合いなの……？」
line = "「あれ？　どうしてヴィーナスがあの子と知り合いなの……？」"

[[dialogue]]
speaker = "ユウリ"
# 「確かに──あたしらが基地で会ったのって、ヴィーナスが<ruby=さら>拐</ruby>われてた時だよな？」
line = "「確かに──あたしらが基地で会ったのって、ヴィーナスが<ruby>拐<rt>さら</rt></ruby>われてた時だよな？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「前、お出かけ先のカフェで会ったのよ。いきなり、私の闇とか悩みとか払ってやるって言われて……」
line = "「前、お出かけ先のカフェで会ったのよ。いきなり、私の闇とか悩みとか払ってやるって言われて……」"

[[dialogue]]
speaker = "クラウディア"
# 「人助けというやつだ。光の魔女──その力の真髄、とくと味わうがよい」
line = "「人助けというやつだ。光の魔女──その力の真髄、とくと味わうがよい」"

[[dialogue]]
speaker = "クラウディア"
# 「そこの娘が何やら思い詰めているようだったのでのう。余の魔法は効いたか？」
line = "「そこの娘が何やら思い詰めているようだったのでのう。余の魔法は効いたか？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あの時は……そうね。色々スッキリしたし、私とクロトの関係もわかったし──お礼は言っとくわ」
line = "「あの時は……そうね。色々スッキリしたし、私とクロトの関係もわかったし──お礼は言っとくわ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「でも！　それとこれとは話が別よ。あんた達は一体何を企んでいるっていうの？」
line = "「でも！　それとこれとは話が別よ。あんた達は一体何を企んでいるっていうの？」"

[[dialogue]]
speaker = "クラウディア"
# 「うむ。もったいぶるつもりはないぞ、きっちり教えてやろう。余のせっかくの晴れ舞台なのだからな」
line = "「うむ。もったいぶるつもりはないぞ、きっちり教えてやろう。余のせっかくの晴れ舞台なのだからな」"

[[dialogue]]
speaker = "クロト"
# （クラウディアの晴れ舞台──ってことは、さっきの、アポロを抑えつける算段っていうのが……）
line = "（クラウディアの晴れ舞台──ってことは、さっきの、アポロを抑えつける算段っていうのが……）"

[[dialogue]]
speaker = "アナ"
# （彼女の力……ということになりそうですね）
line = "（彼女の力……ということになりそうですね）"

[[dialogue]]
speaker = "ソフィア"
# （そしてこのオーラ……彼女の真価は、セドナさんよりも上……！）
line = "（そしてこのオーラ……彼女の真価は、セドナさんよりも上……！）"

[[dialogue]]
speaker = "unk"
# 以前、初めて会った際にも感じたすごみは今も健在。
line = "以前、初めて会った際にも感じたすごみは今も健在。"

[[dialogue]]
speaker = "unk"
# そして俺も、魔力の扱いに長けたことでよりその総量の膨大さを推し量れるようになっている。
line = "そして俺も、魔力の扱いに長けたことでよりその総量の膨大さを推し量れるようになっている。"

[[dialogue]]
speaker = "クラウディア"
# 「そうとも。余らは今日という日を待っていたのだ。余の生まれる前から、ずっとな」
line = "「そうとも。余らは今日という日を待っていたのだ。余の生まれる前から、ずっとな」"

[[dialogue]]
speaker = "セドナ"
# 「時期は少々早まったが──事は予見通りに進行している。ゆえに、手出しは無用というわけだ」
line = "「時期は少々早まったが──事は予見通りに進行している。ゆえに、手出しは無用というわけだ」"

[[dialogue]]
speaker = "セドナ"
# 「星騎士よ。貴様らの役目はすでに終えている。今日までのアステラ、モンスターの駆除といった露払い……実にご苦労だった」
line = "「星騎士よ。貴様らの役目はすでに終えている。今日までのアステラ、モンスターの駆除といった露払い……実にご苦労だった」"

[[dialogue]]
speaker = "ヴィーナス"
# 「いきなりご苦労って何よ！　っていうか、私たちだって別にあんた達のために星騎士やってんじゃないんだから！」
line = "「いきなりご苦労って何よ！　っていうか、私たちだって別にあんた達のために星騎士やってんじゃないんだから！」"

[[dialogue]]
speaker = "ルリエル"
# 「そ、そうですよう！　わたし達にとっても今日が本番なのです！　今は力が使えませんけど……」
line = "「そ、そうですよう！　わたし達にとっても今日が本番なのです！　今は力が使えませんけど……」"

[[dialogue]]
speaker = "unk"
# あまりにも不遜な言いつけだが、ネビュラにはネビュラの策がある──それも遥か昔から──ということらしい。
line = "あまりにも不遜な言いつけだが、ネビュラにはネビュラの策がある──それも遥か昔から──ということらしい。"

[[dialogue]]
speaker = "アナ"
# 「<ruby=ラーゴ・シエロ>鏡界の湖</ruby>の占拠──あなた達の仕業ですね」
line = "「<ruby>鏡界の湖<rt>ラーゴ・シエロ</rt></ruby>の占拠──あなた達の仕業ですね」"

[[dialogue]]
speaker = "セドナ"
# 「ああ……そうだ。貴様たちを魔界へ隔離したのも、<ruby=ラーゴ・シエロ>鏡界の湖</ruby>を占拠したのも、全ては計画の一部にすぎない」
line = "「ああ……そうだ。貴様たちを魔界へ隔離したのも、<ruby>鏡界の湖<rt>ラーゴ・シエロ</rt></ruby>を占拠したのも、全ては計画の一部にすぎない」"

[[dialogue]]
speaker = "フィオナ"
# 「計画──」
line = "「計画──」"

[[dialogue]]
speaker = "セドナ"
# 「我々ネビュラが擁するグレート・ウォール計画──それは」
line = "「我々ネビュラが擁するグレート・ウォール計画──それは」"

[[dialogue]]
speaker = "セドナ"
# 「人間界全土を犠牲に、残る魔界と天界を救う算段だ」
line = "「人間界全土を犠牲に、残る魔界と天界を救う算段だ」"
