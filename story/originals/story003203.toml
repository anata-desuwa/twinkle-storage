[[dialogue]]
speaker = "シャロン"
# 「ウルスラ・バレンタインさまと仰るのですね？　苗字がバレンタインなんて奇遇ですっ！」
line = "「ウルスラ・バレンタインさまと仰るのですね？　苗字がバレンタインなんて奇遇ですっ！」"

[[dialogue]]
speaker = "イレーナ"
# 「いえ、お見かけしたところ天使の方のようですし……<ruby=こちら>人間界</ruby>に来てからバレンタインという姓にされた──のですよね？」
line = "「いえ、お見かけしたところ天使の方のようですし……<ruby>人間界<rt>こちら</rt></ruby>に来てからバレンタインという姓にされた──のですよね？」"

[[dialogue]]
speaker = "ウルスラ"
# 「はい、その通りです。バレンタイン好きを拗らせまして」
line = "「はい、その通りです。バレンタイン好きを拗らせまして」"

[[dialogue]]
speaker = "ウルスラ"
# 「己の想いをチョコレートに込め、決意を以て愛を伝えるその尊さ……初めて知った時は、まるで雷に打たれたような衝撃でした」
line = "「己の想いをチョコレートに込め、決意を以て愛を伝えるその尊さ……初めて知った時は、まるで雷に打たれたような衝撃でした」"

[[dialogue]]
speaker = "ウルスラ"
# 「私はバレンタインデーを愛しています。バレンタインデーとひとつになりたいと思うほどに。ですので僭越ながら、人間界での名前に使わせていただきました」
line = "「私はバレンタインデーを愛しています。バレンタインデーとひとつになりたいと思うほどに。ですので僭越ながら、人間界での名前に使わせていただきました」"

[[dialogue]]
speaker = "イレーナ"
# 「それで『バレンタイン』を直接自分の名前にするとは……なるほど、筋金入りの拗らせ具合なのですね……」
line = "「それで『バレンタイン』を直接自分の名前にするとは……なるほど、筋金入りの拗らせ具合なのですね……」"

[[dialogue]]
speaker = "ウルスラ"
# 「はい、筋金入りです♪」
line = "「はい、筋金入りです♪」"

[[dialogue]]
speaker = "ウルスラ"
# 「バレンタインを愛する者として、チョコレートを使ったお菓子には自信があります。よろしければお手伝いさせてください」
line = "「バレンタインを愛する者として、チョコレートを使ったお菓子には自信があります。よろしければお手伝いさせてください」"

[[dialogue]]
speaker = "シャロン"
# 「猫の手も借りたかったところなので、心強いですっ。ウルスラさま、よろしかったらご教授願えますか」
line = "「猫の手も借りたかったところなので、心強いですっ。ウルスラさま、よろしかったらご教授願えますか」"

[[dialogue]]
speaker = "イレーナ"
# 「正直なところ、私たちは高い製菓技術を持っているわけではありません」
line = "「正直なところ、私たちは高い製菓技術を持っているわけではありません」"

[[dialogue]]
speaker = "シャロン"
# 「そんな私たちでも失敗がなく、たくさん数を作れて、そして美味しいお菓子があればよいのですが……」
line = "「そんな私たちでも失敗がなく、たくさん数を作れて、そして美味しいお菓子があればよいのですが……」"

[[dialogue]]
speaker = "ウルスラ"
# 「ふむふむ……となると……お任せください。でしたら、一緒に作りましょう」
line = "「ふむふむ……となると……お任せください。でしたら、一緒に作りましょう」"

[[dialogue]]
speaker = "unk"
# 翌日──
line = "翌日──"

[[dialogue]]
speaker = "ウルスラ"
# 「はい、焼きあがりました♪　ハートの模様のアイスボックスクッキーです<emoji=heart04>」
line = "「はい、焼きあがりました♪　ハートの模様のアイスボックスクッキーです<emoji=heart04>」"

[[dialogue]]
speaker = "ウルスラ"
# 「ナッツとチョコチップを入れて、見た目と食感にも彩りを加えてみました」
line = "「ナッツとチョコチップを入れて、見た目と食感にも彩りを加えてみました」"

[[dialogue]]
speaker = "シャロン"
# 「おお、とても美味しそうですね……！」
line = "「おお、とても美味しそうですね……！」"

[[dialogue]]
speaker = "ウルスラ"
# 「皆さんで試食と参りましょう。よろしければ、会長さんもどうぞ」
line = "「皆さんで試食と参りましょう。よろしければ、会長さんもどうぞ」"

[[dialogue]]
speaker = "unk"
# いただきます
line = "いただきます"

[[dialogue]]
speaker = "シャロン"
# 「いただきまーす、あむっ」
line = "「いただきまーす、あむっ」"

[[dialogue]]
speaker = "イレーナ"
# 「いただきますね……んむ……んっ……！　これは……！」
line = "「いただきますね……んむ……んっ……！　これは……！」"

[[dialogue]]
speaker = "シャロン"
# 「はぁうぅぅ……バターの香ばしさとチョコの風味が合わさって、とても美味しいですっ！」
line = "「はぁうぅぅ……バターの香ばしさとチョコの風味が合わさって、とても美味しいですっ！」"

[[dialogue]]
speaker = "イレーナ"
# 「ナッツの食感も小気味良いですね。売っているものと比べても遜色ない……いえ、それ以上の味かもしれません」
line = "「ナッツの食感も小気味良いですね。売っているものと比べても遜色ない……いえ、それ以上の味かもしれません」"

[[dialogue]]
speaker = "ウルスラ"
# 「ありがとうございます<emoji=heart04>　実は私のお菓子作りの師は、スイーツ作りで名高いサランさんでして」
line = "「ありがとうございます<emoji=heart04>　実は私のお菓子作りの師は、スイーツ作りで名高いサランさんでして」"

[[dialogue]]
speaker = "シャロン"
# 「サランさまのお墨付きですか！　どうりで美味しいわけです！」
line = "「サランさまのお墨付きですか！　どうりで美味しいわけです！」"

[[dialogue]]
speaker = "ウルスラ"
# 「どうです？　会長さんのお口には合いました？」
line = "「どうです？　会長さんのお口には合いました？」"

[[dialogue]]
speaker = "unk"
# 星３つです！
line = "星３つです！"

[[dialogue]]
speaker = "ウルスラ"
# 「お気に召したようで良かったです<emoji=heart04>　よろしければ、たくさん召し上がってくださいね<emoji=heart04>」
line = "「お気に召したようで良かったです<emoji=heart04>　よろしければ、たくさん召し上がってくださいね<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
# 「む……」
line = "「む……」"

[[dialogue]]
speaker = "ウルスラ"
# 「アイスボックスクッキーなら、生地を作っておけば後は切って焼くだけです。これなら数を作るのにも向くかと」
line = "「アイスボックスクッキーなら、生地を作っておけば後は切って焼くだけです。これなら数を作るのにも向くかと」"

[[dialogue]]
speaker = "シャロン"
# 「いいアイデアをもらっちゃいましたねっ。ありがとうございます、ウルスラさまっ」
line = "「いいアイデアをもらっちゃいましたねっ。ありがとうございます、ウルスラさまっ」"

[[dialogue]]
speaker = "ウルスラ"
# 「いえいえ、バレンタインの波動の強まりは、私も望むところですので」
line = "「いえいえ、バレンタインの波動の強まりは、私も望むところですので」"

[[dialogue]]
speaker = "unk"
# あ、ごめん。星徒会の用事で行かなきゃ
line = "あ、ごめん。星徒会の用事で行かなきゃ"

[[dialogue]]
speaker = "シャロン"
# 「はい、行ってらっしゃいませ！」
line = "「はい、行ってらっしゃいませ！」"

[[dialogue]]
speaker = "ウルスラ"
# 「行ってしまわれましたね……星徒会長だけあって、お忙しい方です」
line = "「行ってしまわれましたね……星徒会長だけあって、お忙しい方です」"

[[dialogue]]
speaker = "ウルスラ"
# 「ですが、ガールズトークにはちょうどいいですね」
line = "「ですが、ガールズトークにはちょうどいいですね」"

[[dialogue]]
speaker = "ウルスラ"
# 「おふたりは随分と会長さんと親しいように感じられましたが……バレンタインチョコをお渡しになるつもりですか？」
line = "「おふたりは随分と会長さんと親しいように感じられましたが……バレンタインチョコをお渡しになるつもりですか？」"

[[dialogue]]
speaker = "シャロン"
# 「はい、日頃の感謝と真心を込めて、手作りチョコをお贈りするつもりです」
line = "「はい、日頃の感謝と真心を込めて、手作りチョコをお贈りするつもりです」"

[[dialogue]]
speaker = "ウルスラ"
# 「まあ<emoji=heart04>　大変素晴らしいことだと思います」
line = "「まあ<emoji=heart04>　大変素晴らしいことだと思います」"

[[dialogue]]
speaker = "ウルスラ"
# 「義理チョコ、友チョコという文化も、立派なバレンタインの彩りですからね。イレーナさんも？」
line = "「義理チョコ、友チョコという文化も、立派なバレンタインの彩りですからね。イレーナさんも？」"

[[dialogue]]
speaker = "イレーナ"
# 「いいえ、私は神に仕える神官ですので。特定の男性に贈り物をすることはありません」
line = "「いいえ、私は神に仕える神官ですので。特定の男性に贈り物をすることはありません」"

[[dialogue]]
speaker = "ウルスラ"
# 「まあまあ、そうですか」
line = "「まあまあ、そうですか」"

[[dialogue]]
speaker = "ウルスラ"
# 「では私が会長さんにバレンタインのチョコをお渡ししても、問題ありませんよね？」
line = "「では私が会長さんにバレンタインのチョコをお渡ししても、問題ありませんよね？」"

[[dialogue]]
speaker = "イレーナ"
# 「──！？」
line = "「──！？」"

[[dialogue]]
speaker = "イレーナ"
# 「え、ええ、もちろん……問題ありませんよ」
line = "「え、ええ、もちろん……問題ありませんよ」"

[[dialogue]]
speaker = "ウルスラ"
# 「そうですかそうですか……ふふふ<emoji=heart04>」
line = "「そうですかそうですか……ふふふ<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
# 「何か含みのある笑みに感じられますけど……」
line = "「何か含みのある笑みに感じられますけど……」"

[[dialogue]]
speaker = "ウルスラ"
# 「いいえ、なんでもありませんよ」
line = "「いいえ、なんでもありませんよ」"

[[dialogue]]
speaker = "ウルスラ"
# 「でもそう感じられたなら、それはイレーナさん自身、思い当たる節があるのでは……なーんて<emoji=heart04>」
line = "「でもそう感じられたなら、それはイレーナさん自身、思い当たる節があるのでは……なーんて<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
# （う……こいつ、なんか苦手だわ……）
line = "（う……こいつ、なんか苦手だわ……）"

[[dialogue]]
speaker = "unk"
# 人の心を見透かすようなウルスラの瞳は、イレーナを捉えて離さないのだった。
line = "人の心を見透かすようなウルスラの瞳は、イレーナを捉えて離さないのだった。"
