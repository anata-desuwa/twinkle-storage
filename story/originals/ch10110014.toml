[[dialogue]]
speaker = "unk"
# 第４話,特別な女の子,P
line = "第４話,特別な女の子,P"

[[dialogue]]
speaker = "マトイ"
# 「……ふう、全部片付いたかな？　１体１体はあんまり強くないモンスターだったけど、数が凄かったね」
line = "「……ふう、全部片付いたかな？　１体１体はあんまり強くないモンスターだったけど、数が凄かったね」"

[[dialogue]]
speaker = "マトイ"
# 「あんまり強力なモンスターだと、私のガードも破られちゃったりするんだけど……こういう大群が相手なら、力になれるのかも……」
line = "「あんまり強力なモンスターだと、私のガードも破られちゃったりするんだけど……こういう大群が相手なら、力になれるのかも……」"

[[dialogue]]
speaker = "マトイ"
# 「星徒会に入ってから誰かの背中を守ることが多くなって、私でもやれることがあるんじゃないかって、努力し続けてきたけど……」
line = "「星徒会に入ってから誰かの背中を守ることが多くなって、私でもやれることがあるんじゃないかって、努力し続けてきたけど……」"

[[dialogue]]
speaker = "マトイ"
# 「なんだか、最近はその実感がようやく湧いてきた気がする」
line = "「なんだか、最近はその実感がようやく湧いてきた気がする」"

[[dialogue]]
speaker = "unk"
# 戦闘でも仕事でも、マトイは頼りになるよ
line = "戦闘でも仕事でも、マトイは頼りになるよ"

[[dialogue]]
speaker = "マトイ"
# 「う、うんっ。私も、会長に頼りにされると、いつもよりも力が湧いてくる気がするっ」
line = "「う、うんっ。私も、会長に頼りにされると、いつもよりも力が湧いてくる気がするっ」"

[[dialogue]]
speaker = "マトイ"
# 「……ねえ、会長。モンスターももう片付いたし、ちょっとだけ聞いて欲しいことがあるんだけど、いいかな？」
line = "「……ねえ、会長。モンスターももう片付いたし、ちょっとだけ聞いて欲しいことがあるんだけど、いいかな？」"

[[dialogue]]
speaker = "unk"
# もちろん
line = "もちろん"

[[dialogue]]
speaker = "マトイ"
# 「──私、星徒会のみんなみたいに特別な才能があるわけじゃないってこと、少し気にしてたんだ」
line = "「──私、星徒会のみんなみたいに特別な才能があるわけじゃないってこと、少し気にしてたんだ」"

[[dialogue]]
speaker = "マトイ"
# 「それでも私なりに、私にしかできないことを考えて頑張ってきたつもりだったんだけど……やっぱり、自分なんて、って思うことが多かった」
line = "「それでも私なりに、私にしかできないことを考えて頑張ってきたつもりだったんだけど……やっぱり、自分なんて、って思うことが多かった」"

[[dialogue]]
speaker = "マトイ"
# 「……でもね、最近は会長の力になれることが凄く嬉しいのっ」
line = "「……でもね、最近は会長の力になれることが凄く嬉しいのっ」"

[[dialogue]]
speaker = "マトイ"
# 「『マトイは頼りになる』とか『盾役はチームの要だ』って、この頃はよく言ってくれるでしょ？　会長にそう言ってもらえると、自分にも自信が持てるようになってくるの……」
line = "「『マトイは頼りになる』とか『盾役はチームの要だ』って、この頃はよく言ってくれるでしょ？　会長にそう言ってもらえると、自分にも自信が持てるようになってくるの……」"

[[dialogue]]
speaker = "マトイ"
# 「私も、あなたの傍にいてもいい人間なんだって……。自信を持ってもいいんだって、思えるようになったの」
line = "「私も、あなたの傍にいてもいい人間なんだって……。自信を持ってもいいんだって、思えるようになったの」"

[[dialogue]]
speaker = "マトイ"
# 「特別な才能を持った人間じゃなくても、自分にはできることがあるって、思えるようになった」
line = "「特別な才能を持った人間じゃなくても、自分にはできることがあるって、思えるようになった」"

[[dialogue]]
speaker = "マトイ"
# 「……と、思うんだけど……えへへ、自意識過剰かも。でも、悪いことじゃないよね、これって」
line = "「……と、思うんだけど……えへへ、自意識過剰かも。でも、悪いことじゃないよね、これって」"

[[dialogue]]
speaker = "unk"
# マトイは皆の期待に応えるために頑張ってる
line = "マトイは皆の期待に応えるために頑張ってる"

[[dialogue]]
speaker = "マトイ"
# 「ん……ありがとう。でも、そんなに沢山頑張ったわけじゃないよ？　普通くらいだよ。これくらい努力している人、いっぱいいるし」
line = "「ん……ありがとう。でも、そんなに沢山頑張ったわけじゃないよ？　普通くらいだよ。これくらい努力している人、いっぱいいるし」"

[[dialogue]]
speaker = "マトイ"
# 「な、なんか変な話しちゃった。ごめんね。任務も終わったし、そろそろ帰ろっか」
line = "「な、なんか変な話しちゃった。ごめんね。任務も終わったし、そろそろ帰ろっか」"

[[dialogue]]
speaker = "unk"
# 学園へ戻り、２人で星徒会室に向かう途中、クラスメイトの女子と会った。
line = "学園へ戻り、２人で星徒会室に向かう途中、クラスメイトの女子と会った。"

[[dialogue]]
speaker = "女子生徒Ｃ"
# 「マトイ、お疲れ～。今日の任務、結構ヤバかったって聞いたけど、大丈夫だったん？」
line = "「マトイ、お疲れ～。今日の任務、結構ヤバかったって聞いたけど、大丈夫だったん？」"

[[dialogue]]
speaker = "マトイ"
# 「あ、うん。会長もいてくれてたし、普通に大丈夫だったよ」
line = "「あ、うん。会長もいてくれてたし、普通に大丈夫だったよ」"

[[dialogue]]
speaker = "女子生徒Ｃ"
# 「マジ？　やるじゃん会長～～♪　うちも出動できるようになったら、会長に守ってもらおっかな～～♪」
line = "「マジ？　やるじゃん会長～～♪　うちも出動できるようになったら、会長に守ってもらおっかな～～♪」"

[[dialogue]]
speaker = "マトイ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "女子生徒Ｃ"
# 「ま、大丈夫ならよかった。それじゃあまた後でね～♪」
line = "「ま、大丈夫ならよかった。それじゃあまた後でね～♪」"

[[dialogue]]
speaker = "マトイ"
# 「は～……私も、あんな風に積極的になれたらなぁ。やっぱり私って普通だなぁ……」
line = "「は～……私も、あんな風に積極的になれたらなぁ。やっぱり私って普通だなぁ……」"

[[dialogue]]
speaker = "マトイ"
# 「まあ、ないものねだりしてもしょうがないか……」
line = "「まあ、ないものねだりしてもしょうがないか……」"

[[dialogue]]
speaker = "unk"
# マトイはよく普通って言うけど、十分魅力的だと思うけどな
line = "マトイはよく普通って言うけど、十分魅力的だと思うけどな"

[[dialogue]]
speaker = "マトイ"
# 「へっ！？　そ、それってどういう……」
line = "「へっ！？　そ、それってどういう……」"

[[dialogue]]
speaker = "マトイ"
# 「え、えっと、十分魅力的っていうのは、えっと、その……！」
line = "「え、えっと、十分魅力的っていうのは、えっと、その……！」"

[[dialogue]]
speaker = "unk"
# マトイが普通じゃないと、落ち着かない
line = "マトイが普通じゃないと、落ち着かない"

[[dialogue]]
speaker = "マトイ"
# 「あっ──そ、そういうことね……」
line = "「あっ──そ、そういうことね……」"

[[dialogue]]
speaker = "マトイ"
# 「ん……でもありがとう。えへへ……なんか会長にそう言ってもらえると、嬉しいな……」
line = "「ん……でもありがとう。えへへ……なんか会長にそう言ってもらえると、嬉しいな……」"

[[dialogue]]
speaker = "マトイ"
# 「うん。普通、普通でもいいんだよね。私は私なんだから」
line = "「うん。普通、普通でもいいんだよね。私は私なんだから」"

[[dialogue]]
speaker = "マトイ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "マトイ"
# 「でも、でもね……私は、できれば……会長にとっては、特別な女の子でいたいなぁ……な、なんて……」
line = "「でも、でもね……私は、できれば……会長にとっては、特別な女の子でいたいなぁ……な、なんて……」"

[[dialogue]]
speaker = "マトイ"
# 「ちなみになんだけど……か、会長はどんな女の子が、好みのタイプなの？」
line = "「ちなみになんだけど……か、会長はどんな女の子が、好みのタイプなの？」"

[[dialogue]]
speaker = "マトイ"
# 「例えばなんだけど……お菓子を作るのが趣味の、普通の女の子とかは、ど、どうかな……？」
line = "「例えばなんだけど……お菓子を作るのが趣味の、普通の女の子とかは、ど、どうかな……？」"

[[dialogue]]
speaker = "マトイ"
# （わ、私何いきなり告白とかしちゃってるの！？　どどど、どうしよう……こんなこと突然言われたら困るに決まってるのに……！）
line = "（わ、私何いきなり告白とかしちゃってるの！？　どどど、どうしよう……こんなこと突然言われたら困るに決まってるのに……！）"

[[dialogue]]
speaker = "マトイ"
# （で、でも、今さら撤回するのもなんか変だしっ、えっとえっとえっと……あぁ～～もうどうにでもなれっ……！）
line = "（で、でも、今さら撤回するのもなんか変だしっ、えっとえっとえっと……あぁ～～もうどうにでもなれっ……！）"

[[dialogue]]
speaker = "unk"
# お菓子を作るのが趣味の……普通の女の子
line = "お菓子を作るのが趣味の……普通の女の子"

[[dialogue]]
speaker = "unk"
# お、俺は好きだよ。
line = "お、俺は好きだよ。"

[[dialogue]]
speaker = "マトイ"
# 「あっ──」
line = "「あっ──」"

[[dialogue]]
speaker = "マトイ"
# 「そ──そっか。そっかぁ……えへへ、よかったぁ……」
line = "「そ──そっか。そっかぁ……えへへ、よかったぁ……」"

[[dialogue]]
speaker = "マトイ"
# 「そうだ、会長。その……昨日、家でマフィンを作ってみたんだけど、また食べて感想聞かせてくれないかな……？」
line = "「そうだ、会長。その……昨日、家でマフィンを作ってみたんだけど、また食べて感想聞かせてくれないかな……？」"

[[dialogue]]
speaker = "unk"
# そう言って、マトイは制服のポケットから、綺麗な包み紙に入ったマフィンを取り出す。
line = "そう言って、マトイは制服のポケットから、綺麗な包み紙に入ったマフィンを取り出す。"

[[dialogue]]
speaker = "マトイ"
# 「はい、これ。じ、実は朝からずっと渡そうとタイミング伺ってたんだけど……ポケットに入りっぱなしになっちゃってて……えへへ」
line = "「はい、これ。じ、実は朝からずっと渡そうとタイミング伺ってたんだけど……ポケットに入りっぱなしになっちゃってて……えへへ」"

[[dialogue]]
speaker = "マトイ"
# 「後で星徒会のみんなにも作るつもりだけど……会長からは、先に感想もらえたらなって」
line = "「後で星徒会のみんなにも作るつもりだけど……会長からは、先に感想もらえたらなって」"

[[dialogue]]
speaker = "マトイ"
# 「今回は──会長に食べてもらうために作った、特別製だからっ」
line = "「今回は──会長に食べてもらうために作った、特別製だからっ」"

[[dialogue]]
speaker = "マトイ"
# 「じゃ、じゃあねっ、後で感想聞かせてねっ、絶対だよっ」
line = "「じゃ、じゃあねっ、後で感想聞かせてねっ、絶対だよっ」"

[[dialogue]]
speaker = "unk"
# マトイは恥ずかしくなったのか、先に星徒会室へ行ってしまう。
line = "マトイは恥ずかしくなったのか、先に星徒会室へ行ってしまう。"

[[dialogue]]
speaker = "unk"
# 俺は早く感想を伝えたくて、壁際に寄り、包みを開く。そうして、食べたマフィンからは──
line = "俺は早く感想を伝えたくて、壁際に寄り、包みを開く。そうして、食べたマフィンからは──"

[[dialogue]]
speaker = "unk"
# 甘くて幸せな気持ちになる、特別な味がしたのだった。
line = "甘くて幸せな気持ちになる、特別な味がしたのだった。"
