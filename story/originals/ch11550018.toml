speaker = "unk"
# しかし、再び湧き上がって来る衝動に抗えず、俺はいろはの誘いに頷いてしまうのだった――
line = "しかし、再び湧き上がって来る衝動に抗えず、俺はいろはの誘いに頷いてしまうのだった――"
