[[dialogue]]
speaker = "unk"
# 彼女の微笑みが、怪しい色香を纏っていることに気づいて、俺は思わず息を飲む。
line = "彼女の微笑みが、怪しい色香を纏っていることに気づいて、俺は思わず息を飲む。"

