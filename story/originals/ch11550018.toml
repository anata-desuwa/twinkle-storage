line = "「はふぅぅうんっ……<emoji=heart04>　たくさんの人に見られながらのセックス、すっごく気持ちよくイケちゃったぁ<emoji=heart04>　ぁああっ<emoji=heart04>」"

[[dialogue]]
speaker = "いろは"
# 「こんなに気持ちいいの、初めてだねぇ<emoji=heart04>　あぁぁ<emoji=heart04>　本当に、全てから解放された気分だよぉ<emoji=heart04>　あはぁあ<emoji=heart04>」
line = "「こんなに気持ちいいの、初めてだねぇ<emoji=heart04>　あぁぁ<emoji=heart04>　本当に、全てから解放された気分だよぉ<emoji=heart04>　あはぁあ<emoji=heart04>」"

[[dialogue]]
speaker = "いろは"
# 「んふふふぅ<emoji=heart04>　……そんな顔しないでぇ、全部大丈夫だから<emoji=heart04>　はぁぁ<emoji=heart04>」
line = "「んふふふぅ<emoji=heart04>　……そんな顔しないでぇ、全部大丈夫だから<emoji=heart04>　はぁぁ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# いろはが俺の顔を覗き込みながら、微笑みを浮かべる。すると――
line = "いろはが俺の顔を覗き込みながら、微笑みを浮かべる。すると――"

[[dialogue]]
speaker = "男性Ａ"
# 「あれ……？　俺、今まで何してたんだっけ……？」
line = "「あれ……？　俺、今まで何してたんだっけ……？」"

[[dialogue]]
speaker = "男性Ｂ"
# 「そうだ……用事があるんだった。急がないと……」
line = "「そうだ……用事があるんだった。急がないと……」"

[[dialogue]]
