# 「こんなところでみんな、どうして立ち止まってるんだ……？」
line = "「こんなところでみんな、どうして立ち止まってるんだ……？」"

[[dialogue]]
speaker = "unk"
# 急に、周りの野次馬たちが俺たちへの興味を無くしたかのように、一斉にスマホを操作してその場を立ち去り始める。
line = "急に、周りの野次馬たちが俺たちへの興味を無くしたかのように、一斉にスマホを操作してその場を立ち去り始める。"

[[dialogue]]
speaker = "とびお"
# 「こ、これは……？」
line = "「こ、これは……？」"

[[dialogue]]
speaker = "いろは"
# 「はぁあぁっ<emoji=heart04>　あたしはただ、キミと思いっきり気持ちいいエッチがしたかっただけ<emoji=heart04>　んんぅ<emoji=heart04>　周りの人たちの記憶と証拠は、残らないようにちゃんと消しておいたよ<emoji=heart04>」
line = "「はぁあぁっ<emoji=heart04>　あたしはただ、キミと思いっきり気持ちいいエッチがしたかっただけ<emoji=heart04>　んんぅ<emoji=heart04>　周りの人たちの記憶と証拠は、残らないようにちゃんと消しておいたよ<emoji=heart04>」"

[[dialogue]]
speaker = "いろは"
# 「あぁ、はぁあぁっ<emoji=heart04>　これで、変な心配は要らないよね？　だから――」
line = "「あぁ、はぁあぁっ<emoji=heart04>　これで、変な心配は要らないよね？　だから――」"

[[dialogue]]
speaker = "いろは"
