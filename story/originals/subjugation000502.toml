[[dialogue]]
speaker = "unk"
# 第2話,メイド長の後継,B
line = "第2話,メイド長の後継,B"

[[dialogue]]
speaker = "unk"
# キリカ師匠が風邪を引いて休んだと聞いた翌日。経過が心配で訪ねると、そこには仕事に復帰した彼女の姿があった。
line = "キリカ師匠が風邪を引いて休んだと聞いた翌日。経過が心配で訪ねると、そこには仕事に復帰した彼女の姿があった。"

[[dialogue]]
speaker = "キリカ"
# 「まさか風邪を引いて、１日仕事を休んでしまうとは、メイド長にあらざる失態です……」
line = "「まさか風邪を引いて、１日仕事を休んでしまうとは、メイド長にあらざる失態です……」"

[[dialogue]]
speaker = "マリオン"
# 「ふふっ、お見舞いに行った時のキリカさん、とてもお可愛らしかったんですよ<emoji=heart04>　パジャマ姿が似合っていて……」
line = "「ふふっ、お見舞いに行った時のキリカさん、とてもお可愛らしかったんですよ<emoji=heart04>　パジャマ姿が似合っていて……」"

[[dialogue]]
speaker = "キリカ"
# 「マリオンさん。その話を続けたら、<ruby=ぬきて>貫手</ruby>を食らわしますよ？」
line = "「マリオンさん。その話を続けたら、<ruby>貫手<rt>ぬきて</rt></ruby>を食らわしますよ？」"

[[dialogue]]
speaker = "マリオン"
# 「まあ、残念。お口を糸で結んでおきますね♪」
line = "「まあ、残念。お口を糸で結んでおきますね♪」"

[[dialogue]]
speaker = "unk"
# でも、師匠に大事がなくてよかったです
line = "でも、師匠に大事がなくてよかったです"

[[dialogue]]
speaker = "キリカ"
# 「ありがとうございます。緋宮会長にもご心配をかけてしまい、申し訳ありませんでした」
line = "「ありがとうございます。緋宮会長にもご心配をかけてしまい、申し訳ありませんでした」"

[[dialogue]]
speaker = "キリカ"
# 「風邪自体はそこまで大したことなくて、仕事を休むつもりはなかったのですが……」
line = "「風邪自体はそこまで大したことなくて、仕事を休むつもりはなかったのですが……」"

[[dialogue]]
speaker = "フィオナ"
# 「私が、主人命令で１日休ませたんです」
line = "「私が、主人命令で１日休ませたんです」"

[[dialogue]]
speaker = "フィオナ"
# 「こうでもしないと、キリカは体調が悪化しようがお構いなしに働き続けますから」
line = "「こうでもしないと、キリカは体調が悪化しようがお構いなしに働き続けますから」"

[[dialogue]]
speaker = "unk"
# フィオナ、こんにちは
line = "フィオナ、こんにちは"

[[dialogue]]
speaker = "フィオナ"
# 「ごきげんよう、緋宮会長」
line = "「ごきげんよう、緋宮会長」"

[[dialogue]]
speaker = "フィオナ"
# 「――それにしても、キリカが風邪を引くのは、私が小さい時に移してしまった時以来のことで、驚きました」
line = "「――それにしても、キリカが風邪を引くのは、私が小さい時に移してしまった時以来のことで、驚きました」"

[[dialogue]]
speaker = "キリカ"
# 「申し訳ありません。後から冷静になって考えたのですが……」
line = "「申し訳ありません。後から冷静になって考えたのですが……」"

[[dialogue]]
speaker = "キリカ"
# 「風邪を引いた私が働くことで、お嬢様やメイド隊の皆に感染を広げてしまう危険性がありました」
line = "「風邪を引いた私が働くことで、お嬢様やメイド隊の皆に感染を広げてしまう危険性がありました」"

[[dialogue]]
speaker = "キリカ"
# 「メイドとして一生の不覚です。責任をとって――」
line = "「メイドとして一生の不覚です。責任をとって――」"

[[dialogue]]
speaker = "キリカ"
# 「メイド長の座を降りるのも仕方ないと考えております」
line = "「メイド長の座を降りるのも仕方ないと考えております」"

[[dialogue]]
speaker = "unk"
# ちょっ、師匠！？
line = "ちょっ、師匠！？"

[[dialogue]]
speaker = "マリオン"
# 「まあまあ、うふふ♪　キリカさんのいつもの冗談ですよ」
line = "「まあまあ、うふふ♪　キリカさんのいつもの冗談ですよ」"

[[dialogue]]
speaker = "フィオナ"
# 「キリカの真面目さは、腹を切って詫びるタイプなので……」
line = "「キリカの真面目さは、腹を切って詫びるタイプなので……」"

[[dialogue]]
speaker = "unk"
# 武士！！！
line = "武士！！！"

[[dialogue]]
speaker = "キリカ"
# 「私は毎回本気で言っているのですが……メイド長の役職は元々、成り行きでなったものですし」
line = "「私は毎回本気で言っているのですが……メイド長の役職は元々、成り行きでなったものですし」"

[[dialogue]]
speaker = "キリカ"
# 「私にとって大事なのは、上月家の者として星見家とフィオナお嬢様にお仕えすることですので」
line = "「私にとって大事なのは、上月家の者として星見家とフィオナお嬢様にお仕えすることですので」"

[[dialogue]]
speaker = "フィオナ"
# 「キリカったら、またそういうことを言う……」
line = "「キリカったら、またそういうことを言う……」"

[[dialogue]]
speaker = "マリオン"
# 「とはいえ、メイド長としての責任というものがありますから、そう簡単に投げ出すのはよくないですよね、キリカさん？」
line = "「とはいえ、メイド長としての責任というものがありますから、そう簡単に投げ出すのはよくないですよね、キリカさん？」"

[[dialogue]]
speaker = "キリカ"
# 「あなたがそれを言いますか……。ですが、真面目な話、自分が今回病気になったことで、先のことをちゃんと考えておかなくては と思いました」
line = "「あなたがそれを言いますか……。ですが、真面目な話、自分が今回病気になったことで、先のことをちゃんと考えておかなくては と思いました」"

[[dialogue]]
speaker = "キリカ"
# 「私がやむを得ない事情や、年老いてメイド長の仕事を全うできなくなった時……」
line = "「私がやむを得ない事情や、年老いてメイド長の仕事を全うできなくなった時……」"

[[dialogue]]
speaker = "キリカ"
# 「次の優秀なメイド長候補が自然とそこにいてくれればいいのですが、運に頼るわけにもいきません」
line = "「次の優秀なメイド長候補が自然とそこにいてくれればいいのですが、運に頼るわけにもいきません」"

[[dialogue]]
speaker = "キリカ"
# 「今のうちから、芽のある若いメイドたちを育てて、次のメイド長候補を決めておく必要があります」
line = "「今のうちから、芽のある若いメイドたちを育てて、次のメイド長候補を決めておく必要があります」"

[[dialogue]]
speaker = "unk"
# 数日後、稽古をつけてもらう為にいつものように師匠のもとを訪ねると、次のメイド長候補を選ぼうと声をかけているところで――
line = "数日後、稽古をつけてもらう為にいつものように師匠のもとを訪ねると、次のメイド長候補を選ぼうと声をかけているところで――"

[[dialogue]]
speaker = "ナミエル"
# 「えっ、私を次のメイド長候補に、ですか？」
line = "「えっ、私を次のメイド長候補に、ですか？」"

[[dialogue]]
speaker = "unk"
# 彼女は星見家メイド隊の１人で、流星学園附属校１年生のナミエル・クレシェンテ。
line = "彼女は星見家メイド隊の１人で、流星学園附属校１年生のナミエル・クレシェンテ。"

[[dialogue]]
speaker = "unk"
# 師匠と似たクールで真面目なメイドで、掃除が大の得意。苦手なのは――
line = "師匠と似たクールで真面目なメイドで、掃除が大の得意。苦手なのは――"

[[dialogue]]
speaker = "ナミエル"
# 「キリカさんから声をかけて頂けるなんて、すごく光栄ですが、私……その……」
line = "「キリカさんから声をかけて頂けるなんて、すごく光栄ですが、私……その……」"

[[dialogue]]
speaker = "ナミエル"
# 「知っての通り、料理の腕が……味オンチで、メイドとして先にそこをなんとかしないとは……」
line = "「知っての通り、料理の腕が……味オンチで、メイドとして先にそこをなんとかしないとは……」"

[[dialogue]]
speaker = "ナミエル"
# 「って、緋宮会長、いつの間に！？　覗き見なんて、やらしいですよっ。やはり会長も男性……要警戒対象です……！」
line = "「って、緋宮会長、いつの間に！？　覗き見なんて、やらしいですよっ。やはり会長も男性……要警戒対象です……！」"

[[dialogue]]
speaker = "unk"
# ――といった感じで、男性のこともちょっと苦手だったりする。
line = "――といった感じで、男性のこともちょっと苦手だったりする。"

[[dialogue]]
speaker = "フェニエル"
# 「わ、私を星見家メイド隊の、次のメイド長候補にですかっ？」
line = "「わ、私を星見家メイド隊の、次のメイド長候補にですかっ？」"

[[dialogue]]
speaker = "フェニエル"
# 「な、なして……！？　そんな……バイトの身なのに恐れ多いです……！」
line = "「な、なして……！？　そんな……バイトの身なのに恐れ多いです……！」"

[[dialogue]]
speaker = "unk"
# 以前、『寮生争奪チキチキ花いちもんめバトルウィーク』の一件で仲良くなった流星学園１年生、フェニエル。愛称は『フニ』。
line = "以前、『寮生争奪チキチキ花いちもんめバトルウィーク』の一件で仲良くなった流星学園１年生、フェニエル。愛称は『フニ』。"

[[dialogue]]
speaker = "unk"
# 彼女は北海道出身で、後天的に星力に目覚めて学園にやってきた転入生。先輩からの推薦があり、星見家メイド隊でバイトをしている。
line = "彼女は北海道出身で、後天的に星力に目覚めて学園にやってきた転入生。先輩からの推薦があり、星見家メイド隊でバイトをしている。"

[[dialogue]]
speaker = "フェニエル"
# 「――評価して頂いて、とてもありがたいです。メイドの仕事は好きですし。でも……」
line = "「――評価して頂いて、とてもありがたいです。メイドの仕事は好きですし。でも……」"

[[dialogue]]
speaker = "フェニエル"
# 「私、まだちゃんと言えてませんけれど――お世話になっている流星寮のヒルディオーネお姉様のもとで、次の寮長を目指したいと思っているんです」
line = "「私、まだちゃんと言えてませんけれど――お世話になっている流星寮のヒルディオーネお姉様のもとで、次の寮長を目指したいと思っているんです」"

[[dialogue]]
speaker = "フェニエル"
# 「だから、申し訳ありません、キリカさん。メイド長候補には……」
line = "「だから、申し訳ありません、キリカさん。メイド長候補には……」"

[[dialogue]]
speaker = "キリカ"
# 「ふぅ……参りました。あの２人ならば、どちらも次のメイド長候補になれる可能性があると思っていたのですが、断られてしまいました」
line = "「ふぅ……参りました。あの２人ならば、どちらも次のメイド長候補になれる可能性があると思っていたのですが、断られてしまいました」"

[[dialogue]]
speaker = "マリオン"
# 「ふふっ、なかなか決まらないようですね、キリカさん」
line = "「ふふっ、なかなか決まらないようですね、キリカさん」"

[[dialogue]]
speaker = "キリカ"
# 「マリオンさん……ええ。当てが外れてしまって、これからどうしたものかと考えていたところです」
line = "「マリオンさん……ええ。当てが外れてしまって、これからどうしたものかと考えていたところです」"

[[dialogue]]
speaker = "マリオン"
# 「私に１人、当てがあると言ったらどうしますか？」
line = "「私に１人、当てがあると言ったらどうしますか？」"

[[dialogue]]
speaker = "キリカ"
# 「あなたが推薦を……？　それは一体？」
line = "「あなたが推薦を……？　それは一体？」"

[[dialogue]]
speaker = "マリオン"
# 「あなたの隣にいらっしゃるじゃありませんか。女の子のようにお可愛らしいお顔立ちをされた方が♪」
line = "「あなたの隣にいらっしゃるじゃありませんか。女の子のようにお可愛らしいお顔立ちをされた方が♪」"

[[dialogue]]
speaker = "unk"
# え！？　俺！？
line = "え！？　俺！？"

[[dialogue]]
speaker = "キリカ"
# 「なにをふざけたことを言っているんですか。緋宮会長は男性ですよ？」
line = "「なにをふざけたことを言っているんですか。緋宮会長は男性ですよ？」"

[[dialogue]]
speaker = "マリオン"
# 「別にメイド隊のトップが執事でも、おかしくはないと思いますが？　それに上月神闘流は、星見家を守る者として上月家が代々伝えてきたもの」
line = "「別にメイド隊のトップが執事でも、おかしくはないと思いますが？　それに上月神闘流は、星見家を守る者として上月家が代々伝えてきたもの」"

[[dialogue]]
speaker = "マリオン"
# 「そこには戦闘技術だけでなく、奉仕の精神も含まれている。とキリカさんは会長様に指導していたはずでは？」
line = "「そこには戦闘技術だけでなく、奉仕の精神も含まれている。とキリカさんは会長様に指導していたはずでは？」"

[[dialogue]]
speaker = "キリカ"
# 「確かに、メイドとしての心構えや技術も、上月神闘流の一環として教えていましたが……」
line = "「確かに、メイドとしての心構えや技術も、上月神闘流の一環として教えていましたが……」"

[[dialogue]]
speaker = "マリオン"
# 「ならば後は、性別がどうかというよりも、メイドであるか否かの問題ということです。そこで――」
line = "「ならば後は、性別がどうかというよりも、メイドであるか否かの問題ということです。そこで――」"

[[dialogue]]
speaker = "マリオン"
# 「じゃ～ん♪　私が趣味で会長様ピッタリに作ったメイド服がここに♪」
line = "「じゃ～ん♪　私が趣味で会長様ピッタリに作ったメイド服がここに♪」"

[[dialogue]]
speaker = "unk"
# いや、着ませんよ！？
line = "いや、着ませんよ！？"

[[dialogue]]
speaker = "マリオン"
# 「私、前々から思っていたのです。会長様はきっと……いえ、必ずや、お可愛らしい女装が似合うんじゃないかと！」
line = "「私、前々から思っていたのです。会長様はきっと……いえ、必ずや、お可愛らしい女装が似合うんじゃないかと！」"

[[dialogue]]
speaker = "マリオン"
# 「そしてついに、その時がやってきたということです<emoji=heart04>」
line = "「そしてついに、その時がやってきたということです<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# どういうこと！？
line = "どういうこと！？"

[[dialogue]]
speaker = "マリオン"
# 「え～♪　メイクもすれば、絶対にメイド服似合いますよ<emoji=heart04>　キリカさんも、そう思いませんか？」
line = "「え～♪　メイクもすれば、絶対にメイド服似合いますよ<emoji=heart04>　キリカさんも、そう思いませんか？」"

[[dialogue]]
speaker = "キリカ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "キリカ"
# 「アリですね」
line = "「アリですね」"

[[dialogue]]
speaker = "unk"
# 師匠！？
line = "師匠！？"

[[dialogue]]
speaker = "unk"
# そうして、俺はメイド服を着せられる羽目になったのだった。
line = "そうして、俺はメイド服を着せられる羽目になったのだった。"
