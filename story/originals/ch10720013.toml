[[dialogue]]
speaker = "unk"
# 第３話,クロ×セイ？　セイ×クロ？,P
line = "第３話,クロ×セイ？　セイ×クロ？,P"

[[dialogue]]
speaker = "ミア"
# 「んもう、まさかこんなエッチな本を学園に持ってきてる人がいるなんて。荷物検査をして正解だったわ」
line = "「んもう、まさかこんなエッチな本を学園に持ってきてる人がいるなんて。荷物検査をして正解だったわ」"

[[dialogue]]
speaker = "ミア"
# 「興味を持つな、とまでは言わないけれど……。学園にまで持ち込まないで欲しいわ。ハ、ハレンチよ……」
line = "「興味を持つな、とまでは言わないけれど……。学園にまで持ち込まないで欲しいわ。ハ、ハレンチよ……」"

[[dialogue]]
speaker = "ミア"
# 「でも、こんな本まで出回ってるなんて。やっぱり意外といるのね、会長さんと学園長先生で妄想してる人……」
line = "「でも、こんな本まで出回ってるなんて。やっぱり意外といるのね、会長さんと学園長先生で妄想してる人……」"

[[dialogue]]
speaker = "ミア"
# 「と言っても、この本の持ち主とはわかり合えそうにないけど……。会長さんは絶対責めよ……！　学園長先生が受けだわ……！」
line = "「と言っても、この本の持ち主とはわかり合えそうにないけど……。会長さんは絶対責めよ……！　学園長先生が受けだわ……！」"

[[dialogue]]
speaker = "ミア"
# 「確かに会長さんは童顔で、学園長先生は強面だけど……！　だからこそ会長さんが学園長先生をヒンヒン言わせるからいいのであって──」
line = "「確かに会長さんは童顔で、学園長先生は強面だけど……！　だからこそ会長さんが学園長先生をヒンヒン言わせるからいいのであって──」"

[[dialogue]]
speaker = "unk"
# 俺がどうかした？
line = "俺がどうかした？"

[[dialogue]]
speaker = "ミア"
# 「ひぃあっ！？　かかか、会長さんっ！？　ななな、なんでもないわっ！　私だけは会長さんの良さをちゃんとわかってるって思ってただけ……！」
line = "「ひぃあっ！？　かかか、会長さんっ！？　ななな、なんでもないわっ！　私だけは会長さんの良さをちゃんとわかってるって思ってただけ……！」"

[[dialogue]]
speaker = "ミア"
# 「それより会長さんこそどうしたのっ？　何か急いでる様子だけど……」
line = "「それより会長さんこそどうしたのっ？　何か急いでる様子だけど……」"

[[dialogue]]
speaker = "unk"
# ちょっと学園長に呼ばれてて。それじゃ！
line = "ちょっと学園長に呼ばれてて。それじゃ！"

[[dialogue]]
speaker = "ミア"
# 「あっ、廊下は走っちゃダメーっ！　減点なんだからーっ！」
line = "「あっ、廊下は走っちゃダメーっ！　減点なんだからーっ！」"

[[dialogue]]
speaker = "ミア"
# 「学園長先生に呼ばれて、か……。は、果たして本当にそうなのかしら……。私の予想が正しければ──……」
line = "「学園長先生に呼ばれて、か……。は、果たして本当にそうなのかしら……。私の予想が正しければ──……」"

[[dialogue]]
speaker = "ミア"
# 「い、いたっ。会長さんと学園長先生……！　あ、あんな廊下の影でこそこそお話して……！」
line = "「い、いたっ。会長さんと学園長先生……！　あ、あんな廊下の影でこそこそお話して……！」"

[[dialogue]]
speaker = "ミア"
# 「やっぱりあの２人、私の妄想でもなんでもなく本当に付き合ってるのかも……。ああして人目を盗んでこっそり愛を育んでいるんだわ……」
line = "「やっぱりあの２人、私の妄想でもなんでもなく本当に付き合ってるのかも……。ああして人目を盗んでこっそり愛を育んでいるんだわ……」"

[[dialogue]]
speaker = "ミア"
# 「きっと今もこんな風に──……」
line = "「きっと今もこんな風に──……」"

[[dialogue]]
speaker = "セイファート"
# 「急に呼び出して悪かったね、緋宮会長」
line = "「急に呼び出して悪かったね、緋宮会長」"

[[dialogue]]
speaker = "クロト"
# 「本当ですよ。学園では目立つことはしないって約束したじゃないですか」
line = "「本当ですよ。学園では目立つことはしないって約束したじゃないですか」"

[[dialogue]]
speaker = "セイファート"
# 「すまない。君が登校してきていると思うと、どうしても、その。顔が見たくなってしまってな……」
line = "「すまない。君が登校してきていると思うと、どうしても、その。顔が見たくなってしまってな……」"

[[dialogue]]
speaker = "クロト"
# 「相変わらず学園長は寂しがり屋ですね。昨日あれだけ可愛がってあげたのに、まだ足りないんですか？」
line = "「相変わらず学園長は寂しがり屋ですね。昨日あれだけ可愛がってあげたのに、まだ足りないんですか？」"

[[dialogue]]
speaker = "セイファート"
# 「き、昨日のことは言わないでくれ。あれは君に無理やり──」
line = "「き、昨日のことは言わないでくれ。あれは君に無理やり──」"

[[dialogue]]
speaker = "クロト"
# 「約束を破った罰です。今夜もお仕置きですからね？　たっぷりと苛めてあげますよ……ジェラルド」
line = "「約束を破った罰です。今夜もお仕置きですからね？　たっぷりと苛めてあげますよ……ジェラルド」"

[[dialogue]]
speaker = "セイファート"
# 「っっ。お、仰せのままに……クロト、様……」
line = "「っっ。お、仰せのままに……クロト、様……」"

[[dialogue]]
speaker = "ミア"
# 「って──イ、イケナイわっ。私は一体何を考えて……！　風紀委員がこんな妄想を膨らませちゃ懲戒免職ものよ……！」
line = "「って──イ、イケナイわっ。私は一体何を考えて……！　風紀委員がこんな妄想を膨らませちゃ懲戒免職ものよ……！」"

[[dialogue]]
speaker = "ミア"
# 「で、でも、せっかくの生クロト×セイファートだもの。あと少しだけ──……」
line = "「で、でも、せっかくの生クロト×セイファートだもの。あと少しだけ──……」"

[[dialogue]]
speaker = "イクシリオン"
# 「どうされましたか？」
line = "「どうされましたか？」"

[[dialogue]]
speaker = "ミア"
# 「ひぃあっ！？　イイイ、イクシリオンさんっ……！？　ち、違うのっ。私は別に変な妄想を膨らませていたわけじゃ……！」
line = "「ひぃあっ！？　イイイ、イクシリオンさんっ……！？　ち、違うのっ。私は別に変な妄想を膨らませていたわけじゃ……！」"

[[dialogue]]
speaker = "イクシリオン"
# 「変な妄想？　先ほどはまるで、会長と学園長先生が仲睦まじくされているような独り言を呟かれていましたが……」
line = "「変な妄想？　先ほどはまるで、会長と学園長先生が仲睦まじくされているような独り言を呟かれていましたが……」"

[[dialogue]]
speaker = "ミア"
# 「ひやあぁああっ！？　聞かれてたーーっ！？」
line = "「ひやあぁああっ！？　聞かれてたーーっ！？」"

[[dialogue]]
speaker = "イクシリオン"
# 「ハッ──！？　まさかこれが噂に聞く、びぃ、える……？」
line = "「ハッ──！？　まさかこれが噂に聞く、びぃ、える……？」"

[[dialogue]]
speaker = "ミア"
# 「あああ～～～っ！？　人生終わったーーーっ！？」
line = "「あああ～～～っ！？　人生終わったーーーっ！？」"

[[dialogue]]
speaker = "イクシリオン"
# 「いえいえ、ミアさんの嗜好を否定するつもりはありませんよ」
line = "「いえいえ、ミアさんの嗜好を否定するつもりはありませんよ」"

[[dialogue]]
speaker = "イクシリオン"
# 「しかしなるほど。そう考えると、会長と学園長先生との絡みがどんどん濃厚になってきているような……」
line = "「しかしなるほど。そう考えると、会長と学園長先生との絡みがどんどん濃厚になってきているような……」"

[[dialogue]]
speaker = "ミア"
# 「えっ……！？　の、濃厚にって……！」
line = "「えっ……！？　の、濃厚にって……！」"

[[dialogue]]
speaker = "ミア"
# 「ああ……！　ホ、ホントだわ……！　あんなに顔を近づけ合って……！　い、今にも唇が触れそうじゃない……！」
line = "「ああ……！　ホ、ホントだわ……！　あんなに顔を近づけ合って……！　い、今にも唇が触れそうじゃない……！」"

[[dialogue]]
speaker = "イクシリオン"
# 「が、学園長先生が会長の肩に手を置いて……！　はぁはぁっ、こんな公衆の面前で大胆です……！」
line = "「が、学園長先生が会長の肩に手を置いて……！　はぁはぁっ、こんな公衆の面前で大胆です……！」"

[[dialogue]]
speaker = "ミア"
# 「い、いえ、あれは会長さんが学園長先生に壁ドンしてるのよ……！　学園長先生はあえて嫌がる振りをして会長さんを弱々しく押しのけようとしているんだわ……！」
line = "「い、いえ、あれは会長さんが学園長先生に壁ドンしてるのよ……！　学園長先生はあえて嫌がる振りをして会長さんを弱々しく押しのけようとしているんだわ……！」"

[[dialogue]]
speaker = "イクシリオン"
# 「いえいえ逆ですっ。あれは快感に悶える会長を学園長先生が悪い笑みを浮かべながら支えているところですよ……！　会長は学園長先生の愛玩ペットですから……！」
line = "「いえいえ逆ですっ。あれは快感に悶える会長を学園長先生が悪い笑みを浮かべながら支えているところですよ……！　会長は学園長先生の愛玩ペットですから……！」"

[[dialogue]]
speaker = "ミア"
# 「っっ！　どうやらイクシリオンさんとは解釈違いのようねっ。会長さんはああ見えて夜はオラオラ系なんだから……！　学園長先生は生粋の乙女なのっ……！」
line = "「っっ！　どうやらイクシリオンさんとは解釈違いのようねっ。会長さんはああ見えて夜はオラオラ系なんだから……！　学園長先生は生粋の乙女なのっ……！」"

[[dialogue]]
speaker = "イクシリオン"
# 「いいえっ！　会長は悪オジ学園長先生に騙され躾けられた哀れなペットです……！」
line = "「いいえっ！　会長は悪オジ学園長先生に騙され躾けられた哀れなペットです……！」"

[[dialogue]]
speaker = "ミア"
# 「ち、違うもんっ。きっと会長さんは今もこんな風に学園長先生に囁いてるはずで──……」
line = "「ち、違うもんっ。きっと会長さんは今もこんな風に学園長先生に囁いてるはずで──……」"

[[dialogue]]
speaker = "クロト"
# 「ふふ、もうこんなに元気じゃないか？　一体何を期待しているんだい、ジェラルド？」
line = "「ふふ、もうこんなに元気じゃないか？　一体何を期待しているんだい、ジェラルド？」"

[[dialogue]]
speaker = "セイファート"
# 「ふぁ、や、やめてくれクロト……。こんな廊下の真ん中で……」
line = "「ふぁ、や、やめてくれクロト……。こんな廊下の真ん中で……」"

[[dialogue]]
speaker = "クロト"
# 「誘ってきたのはジェラルドじゃないか。わざわざ俺を呼び出してまで可愛がってもらいたかったんだろ？」
line = "「誘ってきたのはジェラルドじゃないか。わざわざ俺を呼び出してまで可愛がってもらいたかったんだろ？」"

[[dialogue]]
speaker = "セイファート"
# 「待ってくれ、はぁはぁ、せめて続きは学園長室で──……」
line = "「待ってくれ、はぁはぁ、せめて続きは学園長室で──……」"

[[dialogue]]
speaker = "ミア"
# 「そして２人だけの愛の巣で、会長さんは学園長先生を縛り上げるのっ。色っぽく蒸れた学園長先生の胸毛を愛でながら──」
line = "「そして２人だけの愛の巣で、会長さんは学園長先生を縛り上げるのっ。色っぽく蒸れた学園長先生の胸毛を愛でながら──」"

[[dialogue]]
speaker = "イクシリオン"
# 「ですから違いますよ！　会長は普段から学園長先生の苛烈な躾けを受けていて──」
line = "「ですから違いますよ！　会長は普段から学園長先生の苛烈な躾けを受けていて──」"

[[dialogue]]
speaker = "クロト"
# 「が、学園長、もう無理です、耐えられませんっ……！　おもちゃが、震えて、んく、もう立っていられなっ……！」
line = "「が、学園長、もう無理です、耐えられませんっ……！　おもちゃが、震えて、んく、もう立っていられなっ……！」"

[[dialogue]]
speaker = "セイファート"
# 「ほう？　ご主人様からのプレゼントが気に入らないと言うのかね？　ペットの分際で生意気なことを言うじゃないか」
line = "「ほう？　ご主人様からのプレゼントが気に入らないと言うのかね？　ペットの分際で生意気なことを言うじゃないか」"

[[dialogue]]
speaker = "クロト"
# 「はぐぅっ、押し込まないで、くださっ……！　ああァっ、ああああああァァっっーー……！！」
line = "「はぐぅっ、押し込まないで、くださっ……！　ああァっ、ああああああァァっっーー……！！」"

[[dialogue]]
speaker = "ミア"
# 「だから違うってば！　会長さんはドＳなのっ……！　可愛い顔して鬼畜プレイが好きなのっ……！」
line = "「だから違うってば！　会長さんはドＳなのっ……！　可愛い顔して鬼畜プレイが好きなのっ……！」"

[[dialogue]]
speaker = "イクシリオン"
# 「そこについては同意しますが、しかし、普段学園長先生の恋人に飼われているからこそ、女性に対しては鬼畜になってしまうという背景があった方がよりいっそう燃えてっ──」
line = "「そこについては同意しますが、しかし、普段学園長先生の恋人に飼われているからこそ、女性に対しては鬼畜になってしまうという背景があった方がよりいっそう燃えてっ──」"

[[dialogue]]
speaker = "unk"
# ２人とも？　何を話してるの？
line = "２人とも？　何を話してるの？"

[[dialogue]]
speaker = "イクシリオン"
# 「きゃっ、か、会長っ。あはは、なんでもありませんよっ。お体は大丈夫でしたかっ？」
line = "「きゃっ、か、会長っ。あはは、なんでもありませんよっ。お体は大丈夫でしたかっ？」"

[[dialogue]]
speaker = "ミア"
# 「し、心配なのは学園長先生の方よっ。先生を学園長室に放置して私たちに喋りに来るなんて。一体どんな鬼畜プレイを敢行しているのかしら……！」
line = "「し、心配なのは学園長先生の方よっ。先生を学園長室に放置して私たちに喋りに来るなんて。一体どんな鬼畜プレイを敢行しているのかしら……！」"

[[dialogue]]
speaker = "unk"
# だから何を話してるの……？
line = "だから何を話してるの……？"
