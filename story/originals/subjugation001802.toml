[[dialogue]]
speaker = "モネ"
# 「う～ん、やっちゃった……やっちゃったかも……」
line = "「う～ん、やっちゃった……やっちゃったかも……」"

[[dialogue]]
speaker = "モネ"
# 「勢いで人工戦闘服のテスターを引き受けたけど……冷静になるとやっぱり恥ずかしい……！」
line = "「勢いで人工戦闘服のテスターを引き受けたけど……冷静になるとやっぱり恥ずかしい……！」"

[[dialogue]]
speaker = "モネ"
# 「ただのサンタ服ならよかったんだけど、サンタ服に水着はちょっと……露出が……」
line = "「ただのサンタ服ならよかったんだけど、サンタ服に水着はちょっと……露出が……」"

[[dialogue]]
speaker = "モネ"
# 「でもでも、ヘレナさんに『やります！』って言っちゃったし……後には引けないよね」
line = "「でもでも、ヘレナさんに『やります！』って言っちゃったし……後には引けないよね」"

[[dialogue]]
speaker = "モネ"
# 「それに、私のために九浄家の蔵書を特別に公開してくれるらしいし……こんなチャンスは滅多にないよ！」
line = "「それに、私のために九浄家の蔵書を特別に公開してくれるらしいし……こんなチャンスは滅多にないよ！」"

[[dialogue]]
speaker = "モネ"
# 「よし、覚悟を決めよう……。意外と着てみたら恥ずかしくないかもしれないし……物は試し！」
line = "「よし、覚悟を決めよう……。意外と着てみたら恥ずかしくないかもしれないし……物は試し！」"

[[dialogue]]
speaker = "モネ"
# 「すぅーはぁー……うん、いくよ！」
line = "「すぅーはぁー……うん、いくよ！」"

[[dialogue]]
speaker = "モネ"
# 「……………………うん」
line = "「……………………うん」"

[[dialogue]]
speaker = "モネ"
# （や、やっぱり恥ずかしい～～～～～～～～～～！！）
line = "（や、やっぱり恥ずかしい～～～～～～～～～～！！）"

[[dialogue]]
speaker = "モネ"
# （この戦闘服やっぱりおかしいよ～～～～！　季節感とか色々言いたいことはあるけど、特にサンタ水着の露出！　露出度高すぎ！）
line = "（この戦闘服やっぱりおかしいよ～～～～！　季節感とか色々言いたいことはあるけど、特にサンタ水着の露出！　露出度高すぎ！）"

[[dialogue]]
speaker = "モネ"
# （というか、なんでこんな人が多いところで着ちゃったの私！　みんなに見られちゃうよ～～～～！）
line = "（というか、なんでこんな人が多いところで着ちゃったの私！　みんなに見られちゃうよ～～～～！）"

[[dialogue]]
speaker = "モネ"
# 「ああうぅ……恥ずかしい……恥ずか死ぬ……もう脱いじゃおう……」
line = "「ああうぅ……恥ずかしい……恥ずか死ぬ……もう脱いじゃおう……」"

[[dialogue]]
speaker = "イクシリオン"
# 「モネさん！？　そのエッ──ナイスなお姿は！？」
line = "「モネさん！？　そのエッ──ナイスなお姿は！？」"

[[dialogue]]
speaker = "モネ"
# 「さっそく見つかっちゃった！」
line = "「さっそく見つかっちゃった！」"

[[dialogue]]
speaker = "イクシリオン"
# 「さ、サンタクロースに水着を組み合わせるとは……お見それしました。あっぱれです」
line = "「さ、サンタクロースに水着を組み合わせるとは……お見それしました。あっぱれです」"

[[dialogue]]
speaker = "イクシリオン"
# 「それになんという布面積！　も、モネさんのたわわなたわわが白日の下に晒されて……ガハッ！」
line = "「それになんという布面積！　も、モネさんのたわわなたわわが白日の下に晒されて……ガハッ！」"

[[dialogue]]
speaker = "イクシリオン"
# 「……う～ん」
line = "「……う～ん」"

[[dialogue]]
speaker = "モネ"
# 「イクシーさん！　ダメです……気絶してます……」
line = "「イクシーさん！　ダメです……気絶してます……」"

[[dialogue]]
speaker = "モネ"
# 「どうしましょう……まさか、この姿を見せるだけで人を<ruby=あや>殺</ruby>めてしまうなんて……」
line = "「どうしましょう……まさか、この姿を見せるだけで人を<ruby>殺<rt>あや</rt></ruby>めてしまうなんて……」"

[[dialogue]]
speaker = "モネ"
# 「これ以上被害者を出す前に早く退散しないと──」
line = "「これ以上被害者を出す前に早く退散しないと──」"

[[dialogue]]
speaker = "リップル"
# 「あ！　モネやっと見つけマシタ！　探しマシタよ！」
line = "「あ！　モネやっと見つけマシタ！　探しマシタよ！」"

[[dialogue]]
speaker = "モネ"
# 「リップルさん！？　どうして私を探して……？　あっ、というか今はダメです！　私を見ないでください！」
line = "「リップルさん！？　どうして私を探して……？　あっ、というか今はダメです！　私を見ないでください！」"

[[dialogue]]
speaker = "リップル"
# 「ワオ！　モネ、ステキな水着です！　トッテモ、カワイイです！」
line = "「ワオ！　モネ、ステキな水着です！　トッテモ、カワイイです！」"

[[dialogue]]
speaker = "モネ"
# 「うぅ……そんなキラキラした目で私を見ないでください……恥ずかしい……」
line = "「うぅ……そんなキラキラした目で私を見ないでください……恥ずかしい……」"

[[dialogue]]
speaker = "リップル"
# 「モネ、水着を着ているというコトは、リゾート結界に行く気になったということデスか！？」
line = "「モネ、水着を着ているというコトは、リゾート結界に行く気になったということデスか！？」"

[[dialogue]]
speaker = "モネ"
# 「へ？　いや、この格好にはちょっと訳があって──」
line = "「へ？　いや、この格好にはちょっと訳があって──」"

[[dialogue]]
speaker = "リップル"
# 「モネはイマまでリゾート結界に来てくれませんでしたが、ツイに来てくれる気になってくれたんデスね！　ワタシ嬉しいです！」
line = "「モネはイマまでリゾート結界に来てくれませんでしたが、ツイに来てくれる気になってくれたんデスね！　ワタシ嬉しいです！」"

[[dialogue]]
speaker = "モネ"
# 「ええ！？　た、確かに水着を着てたらそう思うかもしれませんけど、これは本当に違くて──」
line = "「ええ！？　た、確かに水着を着てたらそう思うかもしれませんけど、これは本当に違くて──」"

[[dialogue]]
speaker = "リップル"
# 「ダイジョウブです！　全部ワカってます！　真冬の寒さに耐えられず、夏が恋しくなったんデスね！」
line = "「ダイジョウブです！　全部ワカってます！　真冬の寒さに耐えられず、夏が恋しくなったんデスね！」"

[[dialogue]]
speaker = "モネ"
# 「全然わかってない！　というか私の話を聞いてください～！」
line = "「全然わかってない！　というか私の話を聞いてください～！」"

[[dialogue]]
speaker = "リップル"
# 「さあさあ、さっそくリゾート結界に行きマショ～！」
line = "「さあさあ、さっそくリゾート結界に行きマショ～！」"

[[dialogue]]
speaker = "モネ"
# 「えええ今から！？　リップルさんちょっと待ってぇ～！！」
line = "「えええ今から！？　リップルさんちょっと待ってぇ～！！」"

[[dialogue]]
speaker = "モネ"
# 「ホントに待ってくださ～いっ！？」
line = "「ホントに待ってくださ～いっ！？」"
