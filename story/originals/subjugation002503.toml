[[dialogue]]
speaker = "unk"
# バトルフェスタが開幕し、生徒たちが各々挑みたいボスを頭の中にイメージし、セレスティアに触れる。
line = "バトルフェスタが開幕し、生徒たちが各々挑みたいボスを頭の中にイメージし、セレスティアに触れる。"

[[dialogue]]
speaker = "unk"
# すると、視界が白い光に包まれ――
line = "すると、視界が白い光に包まれ――"

[[dialogue]]
speaker = "unk"
# ボスの１体、サチの<ruby=シャドウ>仮想体</ruby>と戦う舞台となるのは、仮想空間の遊園地であった。
line = "ボスの１体、サチの<ruby>仮想体<rt>シャドウ</rt></ruby>と戦う舞台となるのは、仮想空間の遊園地であった。"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「ほう、この仮想結界システムとやら、なかなか大したものじゃな」
line = "「ほう、この仮想結界システムとやら、なかなか大したものじゃな」"

[[dialogue]]
speaker = "シズハ"
# 「わ～、すごい！　遊園地だ～♪　私、実は来るの初めてなんだよね～」
line = "「わ～、すごい！　遊園地だ～♪　私、実は来るの初めてなんだよね～」"

[[dialogue]]
speaker = "トレジアンナ"
# 「ジェットコースターとか、乗ろうと思えば乗れるんですかね～？　みなさんでちょっと試してみちゃいます？」
line = "「ジェットコースターとか、乗ろうと思えば乗れるんですかね～？　みなさんでちょっと試してみちゃいます？」"

[[dialogue]]
speaker = "サチ"
# 「いや、私のシャドウに挑戦しに来たんですよね！？　というかプリムラ、なんで私までここに……」
line = "「いや、私のシャドウに挑戦しに来たんですよね！？　というかプリムラ、なんで私までここに……」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「別にボス役本人が、自分のシャドウのところに来ちゃいけないなんてルールはないんじゃろ？」
line = "「別にボス役本人が、自分のシャドウのところに来ちゃいけないなんてルールはないんじゃろ？」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「ならば、我がサチのシャドウを倒すところを見せつけてやろうと思ってな。貴様はそこで手を出さずに、見学しとるがいいのじゃ！」
line = "「ならば、我がサチのシャドウを倒すところを見せつけてやろうと思ってな。貴様はそこで手を出さずに、見学しとるがいいのじゃ！」"

[[dialogue]]
speaker = "アム"
# 「おっ、附属生仲間発見～！　って、あれ？　サチ会長、本物！？」
line = "「おっ、附属生仲間発見～！　って、あれ？　サチ会長、本物！？」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「皆様、ごきげんようですわ♪」
line = "「皆様、ごきげんようですわ♪」"

[[dialogue]]
speaker = "サチ"
# 「アムちゃん、エルゼちゃん！　２人も挑戦しに来てくれたの？」
line = "「アムちゃん、エルゼちゃん！　２人も挑戦しに来てくれたの？」"

[[dialogue]]
speaker = "アム"
# 「うん！　最強の星騎士を目指すライバルとして、附属校最強のサチ会長には挑戦しておかないとね♪」
line = "「うん！　最強の星騎士を目指すライバルとして、附属校最強のサチ会長には挑戦しておかないとね♪」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「ええ。アムよりも先にサチ様のシャドウに勝って、私ももっと強くなってみせますわ♪」
line = "「ええ。アムよりも先にサチ様のシャドウに勝って、私ももっと強くなってみせますわ♪」"

[[dialogue]]
speaker = "シズハ"
# 「そ～っと――えいっ♪」
line = "「そ～っと――えいっ♪」"

[[dialogue]]
speaker = "アム"
# 「ひゃあっ！？　いきなり何してんのさ、シズハ！」
line = "「ひゃあっ！？　いきなり何してんのさ、シズハ！」"

[[dialogue]]
speaker = "シズハ"
# 「ふふふ♪　それはもちろん、友達同士のコミュニケーションよ♪　アムちゃん、今日も相変わらず張りがあって、いいお尻だこと～<emoji=heart04>」
line = "「ふふふ♪　それはもちろん、友達同士のコミュニケーションよ♪　アムちゃん、今日も相変わらず張りがあって、いいお尻だこと～<emoji=heart04>」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「アムったら、盾使いなのにお尻は隙だらけですわね♪　その点、私はシズハ様のパターンを読んで、ちゃんと防御態勢を取っておりましたわ！」
line = "「アムったら、盾使いなのにお尻は隙だらけですわね♪　その点、私はシズハ様のパターンを読んで、ちゃんと防御態勢を取っておりましたわ！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「……って、あら！？　シズハ様、いなくなってますわ！？」
line = "「……って、あら！？　シズハ様、いなくなってますわ！？」"

[[dialogue]]
speaker = "シズハ"
# 「――エルゼちゃん、隙アリ～♪」
line = "「――エルゼちゃん、隙アリ～♪」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「ひゃんっ<emoji=heart04>　そ、そんな、いつの間にか背後に！？　気を付けておりましたのに、見逃すだなんて！？」
line = "「ひゃんっ<emoji=heart04>　そ、そんな、いつの間にか背後に！？　気を付けておりましたのに、見逃すだなんて！？」"

[[dialogue]]
speaker = "シズハ"
# 「ふふふっ……これが、私がエルゼちゃんの固いガードをすり抜けてお尻を触る為に作り出した新魔法――」
line = "「ふふふっ……これが、私がエルゼちゃんの固いガードをすり抜けてお尻を触る為に作り出した新魔法――」"

[[dialogue]]
speaker = "シズハ"
# 「名づけて、『ヒップステップ』よ！」
line = "「名づけて、『ヒップステップ』よ！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「新技を生み出す目的が不純ですわ！？」
line = "「新技を生み出す目的が不純ですわ！？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「欲望の為に新魔法を生み出してしまうとは、さすがシズハさんですね～☆」
line = "「欲望の為に新魔法を生み出してしまうとは、さすがシズハさんですね～☆」"

[[dialogue]]
speaker = "サチ"
# 「そういうエッチな技は禁止だよ、シズハちゃん！」
line = "「そういうエッチな技は禁止だよ、シズハちゃん！」"

[[dialogue]]
speaker = "シズハ"
# 「てへっ☆」
line = "「てへっ☆」"

[[dialogue]]
speaker = "アム"
# 「あっ、そうだ、プリムラ！　せっかく居合わせたんだし、サチ会長のシャドウ、どっちが先に倒すことができるか勝負しようよ！」
line = "「あっ、そうだ、プリムラ！　せっかく居合わせたんだし、サチ会長のシャドウ、どっちが先に倒すことができるか勝負しようよ！」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「ふふん、いいじゃろう、アム。貴様にも以前より更に強力になった我の力を見せてやるのじゃ！　この新たな第二形態、デストロイフォームでな！」
line = "「ふふん、いいじゃろう、アム。貴様にも以前より更に強力になった我の力を見せてやるのじゃ！　この新たな第二形態、デストロイフォームでな！」"

[[dialogue]]
speaker = "アム"
# 「言っとくけど、あたしの水着フォームだって伊達じゃないんだからね～？　マムに指導してもらって、重力操作もかなり上手くなったんだから！」
line = "「言っとくけど、あたしの水着フォームだって伊達じゃないんだからね～？　マムに指導してもらって、重力操作もかなり上手くなったんだから！」"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「――なるほど。それは見せてもらうのが楽しみね」
line = "「――なるほど。それは見せてもらうのが楽しみね」"

[[dialogue]]
speaker = "アム"
# 「えっ！？　マム！？」
line = "「えっ！？　マム！？」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「……！　妃竜院マハムート！」
line = "「……！　妃竜院マハムート！」"

[[dialogue]]
speaker = "サチ"
# 「マム、その格好は……！？」
line = "「マム、その格好は……！？」"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「ああ、これ？　先日会長たちと訓練することがあったから、アルケインノヴァエクストリームを使ってもらったのよ」
line = "「ああ、これ？　先日会長たちと訓練することがあったから、アルケインノヴァエクストリームを使ってもらったのよ」"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「かけてもらう側の資質に左右されるらしいけれど、上手く行けばパッと成長できて便利よね、アレ」
line = "「かけてもらう側の資質に左右されるらしいけれど、上手く行けばパッと成長できて便利よね、アレ」"

[[dialogue]]
speaker = "サチ"
# 「そんな事もなげに成功するものでしたっけ！？」
line = "「そんな事もなげに成功するものでしたっけ！？」"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「竜の私が『なる』と決めたんだもの。ノヴァフォームの方から頭を垂れるのは、当然のことよ」
line = "「竜の私が『なる』と決めたんだもの。ノヴァフォームの方から頭を垂れるのは、当然のことよ」"

[[dialogue]]
speaker = "サチ"
# （どうしよう、言ってることのレベルが高すぎて、よくわからないかも！？）
line = "（どうしよう、言ってることのレベルが高すぎて、よくわからないかも！？）"

[[dialogue]]
speaker = "サチ"
# 「と、ところでマム……ここに来たということは、私のシャドウに挑みに？」
line = "「と、ところでマム……ここに来たということは、私のシャドウに挑みに？」"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「ええ、サチ。あなたの『幸運』に、私の新しい力がどこまで通用するのか、興味があってね」
line = "「ええ、サチ。あなたの『幸運』に、私の新しい力がどこまで通用するのか、興味があってね」"

[[dialogue]]
speaker = "unk"
# と、そこへゆっくりと歩いて来る人影があった。
line = "と、そこへゆっくりと歩いて来る人影があった。"

[[dialogue]]
speaker = "シャドウサチ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「現れおったか、サチのシャドウ」
line = "「現れおったか、サチのシャドウ」"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「なら早速、運試しと行きましょうか」
line = "「なら早速、運試しと行きましょうか」"

[[dialogue]]
speaker = "unk"
# そうして、サチの仮想体であるシャドウサチとの戦闘が始まったのだが――
line = "そうして、サチの仮想体であるシャドウサチとの戦闘が始まったのだが――"

[[dialogue]]
speaker = "エルデリーゼ"
# 「くっ……これがサチ様の覚醒した力……！　攻撃がまるで命中しませんわ！」
line = "「くっ……これがサチ様の覚醒した力……！　攻撃がまるで命中しませんわ！」"

[[dialogue]]
speaker = "アム"
# 「防ぐ方もダメだ！　攻撃が何故かバリアをすり抜けてくる！」
line = "「防ぐ方もダメだ！　攻撃が何故かバリアをすり抜けてくる！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「いや～、さすがサチさんの能力を完コピしてるだけありますね～。ハンパない強運っぷりです～」
line = "「いや～、さすがサチさんの能力を完コピしてるだけありますね～。ハンパない強運っぷりです～」"

[[dialogue]]
speaker = "サチ"
# 「み、みんな頑張れー！　ボス役だから、応援しかできないけど……」
line = "「み、みんな頑張れー！　ボス役だから、応援しかできないけど……」"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「なるほどね。本来あり得ない出来事が起こる確率を、幸運で限りなく引き上げる――実際に戦ってみると、とんでもない能力だわ」
line = "「なるほどね。本来あり得ない出来事が起こる確率を、幸運で限りなく引き上げる――実際に戦ってみると、とんでもない能力だわ」"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「これは、私も本気を出さないと勝てないわね」
line = "「これは、私も本気を出さないと勝てないわね」"

[[dialogue]]
speaker = "unk"
# そう言いながら、マムはシャドウに向かって、手の平をかざすように構える。そして――
line = "そう言いながら、マムはシャドウに向かって、手の平をかざすように構える。そして――"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「森羅万象、引力操作」
line = "「森羅万象、引力操作」"

[[dialogue]]
speaker = "シャドウサチ"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "unk"
# 次の瞬間。シャドウの動きが鈍り、附属生たちの攻撃が直撃した。
line = "次の瞬間。シャドウの動きが鈍り、附属生たちの攻撃が直撃した。"

[[dialogue]]
speaker = "シズハ"
# 「私たちの攻撃が……当たった！」
line = "「私たちの攻撃が……当たった！」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「我のキャノンも当たったのじゃ！　妃竜院マハムート、一体何をしたのじゃ！？」
line = "「我のキャノンも当たったのじゃ！　妃竜院マハムート、一体何をしたのじゃ！？」"

[[dialogue]]
speaker = "サチ"
# 「もしかしてマム……引力操作で、シャドウの<b>幸運を引き寄せた</b>んですか！？」
line = "「もしかしてマム……引力操作で、シャドウの<b>幸運を引き寄せた</b>んですか！？」"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「私もまだノヴァフォームに変身できるようになって間もないから、どこまで干渉できるか試したかったのよ」
line = "「私もまだノヴァフォームに変身できるようになって間もないから、どこまで干渉できるか試したかったのよ」"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「だけど、大した幸運ね、サチ。この私が全力で引き寄せても、<b>半分</b>が限界だなんて」
line = "「だけど、大した幸運ね、サチ。この私が全力で引き寄せても、<b>半分</b>が限界だなんて」"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「これが附属校最強の生徒会長の力……ふふっ、生意気だけど面白いわ」
line = "「これが附属校最強の生徒会長の力……ふふっ、生意気だけど面白いわ」"

[[dialogue]]
speaker = "サチ"
# 「あ、ありがとうございます……」
line = "「あ、ありがとうございます……」"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「プリムラ。それに他の附属生たちもよ。この私に畏怖して手を休めてないで、しっかり戦いなさい！」
line = "「プリムラ。それに他の附属生たちもよ。この私に畏怖して手を休めてないで、しっかり戦いなさい！」"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「竜の私が１人で勝ったって、当然でしかないでしょう？　附属生のあなた達が残り半分の幸運を打ち破って、勝ってみせなさい！」
line = "「竜の私が１人で勝ったって、当然でしかないでしょう？　附属生のあなた達が残り半分の幸運を打ち破って、勝ってみせなさい！」"

[[dialogue]]
speaker = "アム"
# 「……！　イエス・マム！」
line = "「……！　イエス・マム！」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「言われずとも……！　妃竜院マハムート、残りはそこで見ているがいい！」
line = "「言われずとも……！　妃竜院マハムート、残りはそこで見ているがいい！」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「サチのライバルである我の力、その目にとくと焼き付けてやるのじゃ！」
line = "「サチのライバルである我の力、その目にとくと焼き付けてやるのじゃ！」"

[[dialogue]]
speaker = "unk"
# プリムラを筆頭に気合いを入れ直した附属生たちは、再びシャドウサチに戦いを挑むのだった――
line = "プリムラを筆頭に気合いを入れ直した附属生たちは、再びシャドウサチに戦いを挑むのだった――"
