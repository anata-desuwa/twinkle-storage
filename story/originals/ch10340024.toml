[[dialogue]]
speaker = "unk"
# 第４話,絶対しもべ宣言！,P
line = "第４話,絶対しもべ宣言！,P"

[[dialogue]]
speaker = "シャルレーヌ"
# 「おはようございます、会長さん<emoji=heart04>」
line = "「おはようございます、会長さん<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 何の用かな？
line = "何の用かな？"

[[dialogue]]
speaker = "シャルレーヌ"
# 「そろそろ私のペットになる決心がついた頃かと思いまして……返答はいかがです？」
line = "「そろそろ私のペットになる決心がついた頃かと思いまして……返答はいかがです？」"

[[dialogue]]
speaker = "unk"
# 君のペットになんてならないよ
line = "君のペットになんてならないよ"

[[dialogue]]
speaker = "unk"
# 何度も断ってるはずだけど
line = "何度も断ってるはずだけど"

[[dialogue]]
speaker = "カティア"
# 「くんくん……このクラクラするような甘い匂いは──」
line = "「くんくん……このクラクラするような甘い匂いは──」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「あら、カティア先輩。おはようございます」
line = "「あら、カティア先輩。おはようございます」"

[[dialogue]]
speaker = "カティア"
# 「ひぃっ、シャルレーヌ……様」
line = "「ひぃっ、シャルレーヌ……様」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「『様』はいらないと、前に申し上げたではないですか。そんな畏まらずに」
line = "「『様』はいらないと、前に申し上げたではないですか。そんな畏まらずに」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「あ、そうです、カティア先輩。先日の星霊祭でのご活躍、拝見させていただきました」
line = "「あ、そうです、カティア先輩。先日の星霊祭でのご活躍、拝見させていただきました」"

[[dialogue]]
speaker = "カティア"
# 「ありがとうございます……あんまり見られたくないとこもありましたけど……」
line = "「ありがとうございます……あんまり見られたくないとこもありましたけど……」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「ますますもって、私はカティア先輩が欲しくなりました」
line = "「ますますもって、私はカティア先輩が欲しくなりました」"

[[dialogue]]
speaker = "カティア"
# 「そ、そうですか……？」
line = "「そ、そうですか……？」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「草花と心を交わし、類稀なる嗅覚を持っているのに加えて、いざという時の大胆さも兼ね備えている。我がディアーブル家にとって理想的な存在です」
line = "「草花と心を交わし、類稀なる嗅覚を持っているのに加えて、いざという時の大胆さも兼ね備えている。我がディアーブル家にとって理想的な存在です」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「私は本当にカティア先輩を買ってるんです。学園の卒業後は当家の専属庭師として好待遇をお約束しますよ」
line = "「私は本当にカティア先輩を買ってるんです。学園の卒業後は当家の専属庭師として好待遇をお約束しますよ」"

[[dialogue]]
speaker = "カティア"
# 「うっ……それは本当に嬉しいんですけど──」
line = "「うっ……それは本当に嬉しいんですけど──」"

[[dialogue]]
speaker = "カティア"
# （星騎士としては全然弱っちくて、プリマステラにもまだ程遠い私の就職先としては最高なんだけど──）
line = "（星騎士としては全然弱っちくて、プリマステラにもまだ程遠い私の就職先としては最高なんだけど──）"

[[dialogue]]
speaker = "カティア"
# （やっぱり、シャルレーヌ様の甘い匂いの裏には、嫌～な臭いが潜んでる気がする……）
line = "（やっぱり、シャルレーヌ様の甘い匂いの裏には、嫌～な臭いが潜んでる気がする……）"

[[dialogue]]
speaker = "カティア"
# （うぅ……魔王様、私はどうしたらいいんでしょう……）
line = "（うぅ……魔王様、私はどうしたらいいんでしょう……）"

[[dialogue]]
speaker = "シャルレーヌ"
# 「──そう考えていたのですが、話はもっとシンプルになりましたね」
line = "「──そう考えていたのですが、話はもっとシンプルになりましたね」"

[[dialogue]]
speaker = "カティア"
# 「ふぇ？　シンプル……ですか？」
line = "「ふぇ？　シンプル……ですか？」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「はい、カティア先輩は、会長さんの忠実なしもべなんですよね？」
line = "「はい、カティア先輩は、会長さんの忠実なしもべなんですよね？」"

[[dialogue]]
speaker = "カティア"
# 「は、はい、魔王様が行くところなら、たとえ火の中、水の中！　どこにでもお供しますワン！」
line = "「は、はい、魔王様が行くところなら、たとえ火の中、水の中！　どこにでもお供しますワン！」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「なら、仮に会長さんが私のディアーブル家に婿入りしたとしても、会長さんのお供をする、と」
line = "「なら、仮に会長さんが私のディアーブル家に婿入りしたとしても、会長さんのお供をする、と」"

[[dialogue]]
speaker = "カティア"
# 「わふんっ！？　婿入りって、ま、魔王様が、シャルレーヌ様とっ……！？」
line = "「わふんっ！？　婿入りって、ま、魔王様が、シャルレーヌ様とっ……！？」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「はい、会長さんをディアーブル家に引き入れれば、もれなくしもべであるカティア先輩もついてくる」
line = "「はい、会長さんをディアーブル家に引き入れれば、もれなくしもべであるカティア先輩もついてくる」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「どうです、会長さん。カティア先輩の未来のためにも、私のものになるというのは」
line = "「どうです、会長さん。カティア先輩の未来のためにも、私のものになるというのは」"

[[dialogue]]
speaker = "unk"
# それはちょっとズルくない？
line = "それはちょっとズルくない？"

[[dialogue]]
speaker = "シャルレーヌ"
# 「いいえ、これは<ruby=ネゴシエーション>交渉術</ruby>。ビジネスのやり口です。誰も損しない、素晴らしい提案だと思いますけど？」
line = "「いいえ、これは<ruby>交渉術<rt>ネゴシエーション</rt></ruby>。ビジネスのやり口です。誰も損しない、素晴らしい提案だと思いますけど？」"

[[dialogue]]
speaker = "カティア"
# 「わ、私は魔王様のオマケじゃないですワン！」
line = "「わ、私は魔王様のオマケじゃないですワン！」"

[[dialogue]]
speaker = "カティア"
# 「決めました！　私は魔王様以外の誰にもお仕えしたりしない！」
line = "「決めました！　私は魔王様以外の誰にもお仕えしたりしない！」"

[[dialogue]]
speaker = "カティア"
# 「魔王様に無理やり手を出すつもりなら──ディアーブルの貴族様であろうとも容赦しません！　です！」
line = "「魔王様に無理やり手を出すつもりなら──ディアーブルの貴族様であろうとも容赦しません！　です！」"

[[dialogue]]
speaker = "unk"
# カティア、ステイ
line = "カティア、ステイ"

[[dialogue]]
speaker = "unk"
# 落ち着いて
line = "落ち着いて"

[[dialogue]]
speaker = "カティア"
# 「で、でもっ……！　ガルルル……！」
line = "「で、でもっ……！　ガルルル……！」"

[[dialogue]]
speaker = "unk"
# シャルレーヌにはあげないよ
line = "シャルレーヌにはあげないよ"

[[dialogue]]
speaker = "unk"
# カティアは俺だけのしもべだから
line = "カティアは俺だけのしもべだから"

[[dialogue]]
speaker = "カティア"
# 「ま、魔王様～～っ！？」
line = "「ま、魔王様～～っ！？」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「あらら……２人の結束は思っていたよりお堅いようで。まとめてフラれちゃうなんて、ショック～」
line = "「あらら……２人の結束は思っていたよりお堅いようで。まとめてフラれちゃうなんて、ショック～」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「でも私、と～～っても諦めの悪い女だから」
line = "「でも私、と～～っても諦めの悪い女だから」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「誰が飼い主なのか……いつか絶対にわからせてあげますね、くふふっ♪」
line = "「誰が飼い主なのか……いつか絶対にわからせてあげますね、くふふっ♪」"

[[dialogue]]
speaker = "unk"
# 捨て台詞と甘い香水の香りを残して、シャルレーヌは去っていった。
line = "捨て台詞と甘い香水の香りを残して、シャルレーヌは去っていった。"

[[dialogue]]
speaker = "カティア"
# 「はふぅ……シャルレーヌ様の香水の匂いが強すぎて、息をするのも苦しかったです……」
line = "「はふぅ……シャルレーヌ様の香水の匂いが強すぎて、息をするのも苦しかったです……」"

[[dialogue]]
speaker = "カティア"
# 「でもでも、魔王様が『俺だけのしもべ』ってシャルレーヌ様に言ってくれたの……とっても嬉しかったです……<emoji=heart04>」
line = "「でもでも、魔王様が『俺だけのしもべ』ってシャルレーヌ様に言ってくれたの……とっても嬉しかったです……<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
# 「私こそ魔王様の唯一のしもべ……すなわち、忠実なるペットですワン！」
line = "「私こそ魔王様の唯一のしもべ……すなわち、忠実なるペットですワン！」"

[[dialogue]]
speaker = "カティア"
# 「一生、お傍にいさせてくださいね、魔王様<emoji=heart04>」
line = "「一生、お傍にいさせてくださいね、魔王様<emoji=heart04>」"
