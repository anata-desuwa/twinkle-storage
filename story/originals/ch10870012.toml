[[dialogue]]
speaker = "unk"
# 第２話,破壊衝動との戦い,P
line = "第２話,破壊衝動との戦い,P"

[[dialogue]]
speaker = "シアン"
# 「あたしの推測だとヴァレリーが現れるのは、必ず『美しい場所』だ。わかりたくもねえが、あいつなりのこだわりと美意識があるんだろう」
line = "「あたしの推測だとヴァレリーが現れるのは、必ず『美しい場所』だ。わかりたくもねえが、あいつなりのこだわりと美意識があるんだろう」"

[[dialogue]]
speaker = "シアン"
# 「全員で東京中を手分けして探すぞ。会長さんは――」
line = "「全員で東京中を手分けして探すぞ。会長さんは――」"

[[dialogue]]
speaker = "unk"
# 公安委員会の面々が『美しい場所』をシラミ潰しに当たっているけど、美しい駅舎といえば、やっぱりここだ。
line = "公安委員会の面々が『美しい場所』をシラミ潰しに当たっているけど、美しい駅舎といえば、やっぱりここだ。"

[[dialogue]]
speaker = "ヴァレリー"
# 「おや、会長さん。またお会いしましたね。麗しき星のお導きでしょうか」
line = "「おや、会長さん。またお会いしましたね。麗しき星のお導きでしょうか」"

[[dialogue]]
speaker = "unk"
# 本当にいた！？
line = "本当にいた！？"

[[dialogue]]
speaker = "ヴァレリー"
# 「フフフ、まるで幽霊にでも遭遇したかのような物言い。お生憎様、お互いに生きていれば顔を合わせることもあるでしょう」
line = "「フフフ、まるで幽霊にでも遭遇したかのような物言い。お生憎様、お互いに生きていれば顔を合わせることもあるでしょう」"

[[dialogue]]
speaker = "ヴァレリー"
# 「今日は近くに厄介な番犬の気配も感じられませんね」
line = "「今日は近くに厄介な番犬の気配も感じられませんね」"

[[dialogue]]
speaker = "ヴァレリー"
# 「ちょうどいいです。どうですか、会長さん。先日お約束した通り、私と美術館デートと洒落こむなど」
line = "「ちょうどいいです。どうですか、会長さん。先日お約束した通り、私と美術館デートと洒落こむなど」"

[[dialogue]]
speaker = "ヴァレリー"
# 「美しい物を定期的に観賞し、審美眼を養っておくに越したことはありませんよ」
line = "「美しい物を定期的に観賞し、審美眼を養っておくに越したことはありませんよ」"

[[dialogue]]
speaker = "unk"
# 約束した覚えはないけど……行こうか
line = "約束した覚えはないけど……行こうか"

[[dialogue]]
speaker = "ヴァレリー"
# 「ええ、ええ、行きましょう、美の園へ」
line = "「ええ、ええ、行きましょう、美の園へ」"

[[dialogue]]
speaker = "ヴァレリー"
# 「２人きりのデートです。他の女を呼びよせるなんて野暮な真似は……しませんよね？」
line = "「２人きりのデートです。他の女を呼びよせるなんて野暮な真似は……しませんよね？」"

[[dialogue]]
speaker = "シアン"
# 「あいつが何をやらかしたか、忘れちゃいねえよな。油断禁物だ……隙を見せた瞬間に、頭から喰われるぜ」
line = "「あいつが何をやらかしたか、忘れちゃいねえよな。油断禁物だ……隙を見せた瞬間に、頭から喰われるぜ」"

[[dialogue]]
speaker = "シアン"
# 「気を引き締めろよ、会長さん」
line = "「気を引き締めろよ、会長さん」"

[[dialogue]]
speaker = "unk"
# あえて彼女の誘いに乗り、行動を共にすることで見えてくる真相もあるはずだ。
line = "あえて彼女の誘いに乗り、行動を共にすることで見えてくる真相もあるはずだ。"

[[dialogue]]
speaker = "unk"
# もちろん、罠の可能性も十二分にある。警戒の糸を張り巡らしつつ、俺たちは駅舎内の美術館へと向かった。
line = "もちろん、罠の可能性も十二分にある。警戒の糸を張り巡らしつつ、俺たちは駅舎内の美術館へと向かった。"

[[dialogue]]
speaker = "ヴァレリー"
# 「美しい……！　ああ、実に美しい……！　凛としたコントラスト……瑞々しい躍動感……はぁぁぁ……たまらない……！」
line = "「美しい……！　ああ、実に美しい……！　凛としたコントラスト……瑞々しい躍動感……はぁぁぁ……たまらない……！」"

[[dialogue]]
speaker = "ヴァレリー"
# 「こちらの絵は……おお、圧倒されますね……ただ息を呑むばかりです……！　この美しさ、時が止まったような錯覚すら覚える……！」
line = "「こちらの絵は……おお、圧倒されますね……ただ息を呑むばかりです……！　この美しさ、時が止まったような錯覚すら覚える……！」"

[[dialogue]]
speaker = "ヴァレリー"
# 「この彫像と向き合うと、言葉を失ってしまいますね……万の言葉を並び立てようとも、この美の全てを表現できそうもありません……！」
line = "「この彫像と向き合うと、言葉を失ってしまいますね……万の言葉を並び立てようとも、この美の全てを表現できそうもありません……！」"

[[dialogue]]
speaker = "ヴァレリー"
# 「繊細でありながら大胆なタッチ……この絵画の一筆一筆に心が奪われますね……甘美な夢の中にでもいるようです」
line = "「繊細でありながら大胆なタッチ……この絵画の一筆一筆に心が奪われますね……甘美な夢の中にでもいるようです」"

[[dialogue]]
speaker = "ヴァレリー"
# 「はぁっ……はぁっ……いやはや、申し訳ない。あまりの素晴らしさに、声にして想いを紡がなくては、感動を抑えられそうになくてね」
line = "「はぁっ……はぁっ……いやはや、申し訳ない。あまりの素晴らしさに、声にして想いを紡がなくては、感動を抑えられそうになくてね」"

[[dialogue]]
speaker = "ヴァレリー"
# 「常に発散していないと、思わず壊したくなる美しさなもので……ふぅぅ……体が、疼きますね……！」
line = "「常に発散していないと、思わず壊したくなる美しさなもので……ふぅぅ……体が、疼きますね……！」"

[[dialogue]]
speaker = "ヴァレリー"
# 「少しくらい……バレない範囲でもダメですかね」
line = "「少しくらい……バレない範囲でもダメですかね」"

[[dialogue]]
speaker = "unk"
# ダメだからね
line = "ダメだからね"

[[dialogue]]
speaker = "ヴァレリー"
# 「わかっていますよ、会長さん。いくら私でもそこまで分別がつかないわけでは――おおっ、手が勝手に！？」
line = "「わかっていますよ、会長さん。いくら私でもそこまで分別がつかないわけでは――おおっ、手が勝手に！？」"

[[dialogue]]
speaker = "unk"
# 絶対ダメだからね！？
line = "絶対ダメだからね！？"

[[dialogue]]
speaker = "unk"
# その後もずっと、感動に打ち震えていたヴァレリーだが。
line = "その後もずっと、感動に打ち震えていたヴァレリーだが。"

[[dialogue]]
speaker = "unk"
# うっかり破壊行動に出てしまわないか気が気ではなく、じっくり観賞するところではなかった。
line = "うっかり破壊行動に出てしまわないか気が気ではなく、じっくり観賞するところではなかった。"

[[dialogue]]
speaker = "ヴァレリー"
# 「ああ……ビューティフル……アメージング……マーベラス……！　今回の展示も素晴らしく、私のコレクションに加えたいものばかりでした……！」
line = "「ああ……ビューティフル……アメージング……マーベラス……！　今回の展示も素晴らしく、私のコレクションに加えたいものばかりでした……！」"

[[dialogue]]
speaker = "ヴァレリー"
# 「はぁっ……はぁっ……ああ、脳が大変幸せになりました。ドーパミンが出っ放しですよ……！」
line = "「はぁっ……はぁっ……ああ、脳が大変幸せになりました。ドーパミンが出っ放しですよ……！」"

[[dialogue]]
speaker = "ヴァレリー"
# 「手土産に絵葉書を購入しましたが、やはり、生でなくてはあの感動は得られませんね。いつかはキサナやリーナも連れてきたいものです」
line = "「手土産に絵葉書を購入しましたが、やはり、生でなくてはあの感動は得られませんね。いつかはキサナやリーナも連れてきたいものです」"

[[dialogue]]
speaker = "ヴァレリー"
# 「会長さんが傍にいてくれたおかげで、破壊衝動を堪えることができましたよ。これからも美術館に赴く際には是非ともお付き合いいただきたいですね」
line = "「会長さんが傍にいてくれたおかげで、破壊衝動を堪えることができましたよ。これからも美術館に赴く際には是非ともお付き合いいただきたいですね」"

[[dialogue]]
speaker = "unk"
# いつからそんな衝動を抱えるように……？
line = "いつからそんな衝動を抱えるように……？"

[[dialogue]]
speaker = "ヴァレリー"
# 「おや、女の口から性癖を語らせようとは……」
line = "「おや、女の口から性癖を語らせようとは……」"

[[dialogue]]
speaker = "ヴァレリー"
# 「なるほど、それこそがあなたの性癖なのですね？　いい趣味をお持ちだ、フフフ<emoji=heart04>」
line = "「なるほど、それこそがあなたの性癖なのですね？　いい趣味をお持ちだ、フフフ<emoji=heart04>」"

[[dialogue]]
speaker = "ヴァレリー"
# 「デートに付き合っていただいたお礼です。お話しするとしましょう」
line = "「デートに付き合っていただいたお礼です。お話しするとしましょう」"

[[dialogue]]
speaker = "ヴァレリー"
# 「あなたの期待に応えられるような愉快なものでもないと思いますがね」
line = "「あなたの期待に応えられるような愉快なものでもないと思いますがね」"

[[dialogue]]
speaker = "ヴァレリー"
# 「ふむ……少し場所を変えましょうか。街中で話すには少々刺激の強い話ですから」
line = "「ふむ……少し場所を変えましょうか。街中で話すには少々刺激の強い話ですから」"

[[dialogue]]
speaker = "ヴァレリー"
# 「赤の他人に聞かれたら、怪訝や侮蔑の視線を向けられることでしょう」
line = "「赤の他人に聞かれたら、怪訝や侮蔑の視線を向けられることでしょう」"

[[dialogue]]
speaker = "ヴァレリー"
# 「もっとも、私はその手の視線も快感に置換できますがね、フフフ」
line = "「もっとも、私はその手の視線も快感に置換できますがね、フフフ」"

[[dialogue]]
speaker = "unk"
# 変態だーっ！？
line = "変態だーっ！？"

[[dialogue]]
speaker = "ヴァレリー"
# 「そんな罵りの言葉も、私にとっては立派なご褒美です、フフフフフ<emoji=heart04>」
line = "「そんな罵りの言葉も、私にとっては立派なご褒美です、フフフフフ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# このヴァレリーをもってして『刺激が強い』とは、いったいどんな話をするつもりなのか。
line = "このヴァレリーをもってして『刺激が強い』とは、いったいどんな話をするつもりなのか。"

[[dialogue]]
speaker = "unk"
# 確かに興味をそそられはするけれど、これは俺の性癖ではない……と思う。
line = "確かに興味をそそられはするけれど、これは俺の性癖ではない……と思う。"
