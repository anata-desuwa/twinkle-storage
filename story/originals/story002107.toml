[[dialogue]]
speaker = "リップル"
# 「──正体を見せるのデス、謎の者よ！」
line = "「──正体を見せるのデス、謎の者よ！」"

[[dialogue]]
speaker = "？？？"
# 「フフフ……バレては仕方ナイ」
line = "「フフフ……バレては仕方ナイ」"

[[dialogue]]
speaker = "ユウリ"
# 「！？　なんだ、小人──？」
line = "「！？　なんだ、小人──？」"

[[dialogue]]
speaker = "unk"
# 洞窟の陰から現れたのは、手乗りサイズの小人だった。
line = "洞窟の陰から現れたのは、手乗りサイズの小人だった。"

[[dialogue]]
speaker = "unk"
# 白い羽衣を着た銀髪の少女で、幽玄な雰囲気をまとっている。
line = "白い羽衣を着た銀髪の少女で、幽玄な雰囲気をまとっている。"

[[dialogue]]
speaker = "unk"
# あの姿は……
line = "あの姿は……"

[[dialogue]]
speaker = "unk"
# 雪女！？
line = "雪女！？"

[[dialogue]]
speaker = "雪女"
# 「──ソウ。いかにもワタシは雪女、冬が連れてきた『冬の化身』なのデース！」
line = "「──ソウ。いかにもワタシは雪女、冬が連れてきた『冬の化身』なのデース！」"

[[dialogue]]
speaker = "ルリエル"
# （ま、まるで小さいリップルさんのような見た目です……！）
line = "（ま、まるで小さいリップルさんのような見た目です……！）"

[[dialogue]]
speaker = "サーシャ"
# 「ふふ、なんだか小さくて可愛いわね♪」
line = "「ふふ、なんだか小さくて可愛いわね♪」"

[[dialogue]]
speaker = "アナ"
# 「確かに見た目は可愛いですが……明らかに異質な冷気を放っています！」
line = "「確かに見た目は可愛いですが……明らかに異質な冷気を放っています！」"

[[dialogue]]
speaker = "リップル"
# 「おかしいデース！　ワタシはこのカタをリゾートへ招いた記憶はありまセーン！」
line = "「おかしいデース！　ワタシはこのカタをリゾートへ招いた記憶はありまセーン！」"

[[dialogue]]
speaker = "リップル"
# 「このプライベートビーチは、ワタシの招いたメンバーしか入れないハズですのに……！」
line = "「このプライベートビーチは、ワタシの招いたメンバーしか入れないハズですのに……！」"

[[dialogue]]
speaker = "マトイ"
# 「た、確かに──私たちにひっついてきたとかでもないよね……？」
line = "「た、確かに──私たちにひっついてきたとかでもないよね……？」"

[[dialogue]]
speaker = "セーラ"
# 「侵入してきた──ってことかな？」
line = "「侵入してきた──ってことかな？」"

[[dialogue]]
speaker = "セーラ"
# 「ほら、隙間風と一緒にさ」
line = "「ほら、隙間風と一緒にさ」"

[[dialogue]]
speaker = "アナ"
# 「！　なるほど」
line = "「！　なるほど」"

[[dialogue]]
speaker = "アポロ"
# 「どういうことだ、セーラ！？」
line = "「どういうことだ、セーラ！？」"

[[dialogue]]
speaker = "セーラ"
# 「隙間が生じてる──って、ソフィアちゃんが言ってたっしょ？　つまりそこから入ってきたってこと。あの寒い寒い風と一緒にね」
line = "「隙間が生じてる──って、ソフィアちゃんが言ってたっしょ？　つまりそこから入ってきたってこと。あの寒い寒い風と一緒にね」"

[[dialogue]]
speaker = "雪女"
# 「フフ……いかにも。ワタシは冬の訪れと共にココへやってきたのデス」
line = "「フフ……いかにも。ワタシは冬の訪れと共にココへやってきたのデス」"

[[dialogue]]
speaker = "リップル"
# 「トイウことは……海の家のメニューを書き換えたのもアナタなんですね！？」
line = "「トイウことは……海の家のメニューを書き換えたのもアナタなんですね！？」"

[[dialogue]]
speaker = "雪女"
# 「その通りデス。焼きそばやラムネなんかより、人はカニ鍋のほうが好きにキマってイマース」
line = "「その通りデス。焼きそばやラムネなんかより、人はカニ鍋のほうが好きにキマってイマース」"

[[dialogue]]
speaker = "リップル"
# 「ユルしガタい暴言デス……！　そんなのは押し付けるモノではアリマセン！」
line = "「ユルしガタい暴言デス……！　そんなのは押し付けるモノではアリマセン！」"

[[dialogue]]
speaker = "セーラ"
# 「察するに──これまでの『冬のイタズラ』もまとめて、雪女ちゃんの影響ってことかな～？」
line = "「察するに──これまでの『冬のイタズラ』もまとめて、雪女ちゃんの影響ってことかな～？」"

[[dialogue]]
speaker = "雪女"
# 「フッフッフ……その通りデストモ」
line = "「フッフッフ……その通りデストモ」"

[[dialogue]]
speaker = "雪女"
# 「この隙間から入ったワタシは、たくさんの冬現象をここで起こシタ……」
line = "「この隙間から入ったワタシは、たくさんの冬現象をここで起こシタ……」"

[[dialogue]]
speaker = "雪女"
# 「すべては、そう。冬の素晴らしさをより伝えるために！」
line = "「すべては、そう。冬の素晴らしさをより伝えるために！」"

[[dialogue]]
speaker = "ルリエル"
# 「リ、リップルさんと真逆のことを！？」
line = "「リ、リップルさんと真逆のことを！？」"

[[dialogue]]
speaker = "アナ"
# 「なるほど、そういうことでしたか──」
line = "「なるほど、そういうことでしたか──」"

[[dialogue]]
speaker = "unk"
# いわばウイルスのように入り込んだ雪女が、これまでの異変を起こしていたのだという。
line = "いわばウイルスのように入り込んだ雪女が、これまでの異変を起こしていたのだという。"

[[dialogue]]
speaker = "ソフィア"
# 「──悪の権化め！　この楽園に、冬を持ち込もうなどという暴挙はやめるのです！」
line = "「──悪の権化め！　この楽園に、冬を持ち込もうなどという暴挙はやめるのです！」"

[[dialogue]]
speaker = "雪女"
# 「フフフ……そんなコトを言って、これに抗えるでしょうか？」
line = "「フフフ……そんなコトを言って、これに抗えるでしょうか？」"

[[dialogue]]
speaker = "雪女"
# 「それそれ、冬は楽しいデスぞぉ～？」
line = "「それそれ、冬は楽しいデスぞぉ～？」"

[[dialogue]]
speaker = "ルリエル"
# 「こ、これは！？」
line = "「こ、これは！？」"

[[dialogue]]
speaker = "unk"
# お年玉！
line = "お年玉！"

[[dialogue]]
speaker = "unk"
# プレゼントだ！
line = "プレゼントだ！"

[[dialogue]]
speaker = "アポロ"
# 「うひょー、大量のお年玉じゃねえか！　やっぱ冬って最高だな！」
line = "「うひょー、大量のお年玉じゃねえか！　やっぱ冬って最高だな！」"

[[dialogue]]
speaker = "ルリエル"
# 「わあ、プレゼントもたくさんです！　何が入ってるんでしょう──わくわく♪」
line = "「わあ、プレゼントもたくさんです！　何が入ってるんでしょう──わくわく♪」"

[[dialogue]]
speaker = "ソフィア"
# 「くっ──皆さん！　何を懐柔されているんですか！？」
line = "「くっ──皆さん！　何を懐柔されているんですか！？」"

[[dialogue]]
speaker = "ソフィア"
# 「誘惑に負けてはいけません……！　ここはサマーリゾートですよ！？」
line = "「誘惑に負けてはいけません……！　ここはサマーリゾートですよ！？」"

[[dialogue]]
speaker = "ユウリ"
# （別に負けてもいいんじゃないか……？）
line = "（別に負けてもいいんじゃないか……？）"

[[dialogue]]
speaker = "unk"
# 雪女はそれからもソリや羽子板といった、魅惑的な冬の風物詩を繰り出してきた。
line = "雪女はそれからもソリや羽子板といった、魅惑的な冬の風物詩を繰り出してきた。"

[[dialogue]]
speaker = "リップル"
# 「く……イッタイなにが目的なのデス！」
line = "「く……イッタイなにが目的なのデス！」"

[[dialogue]]
speaker = "リップル"
# 「ワタシのエンドレスサマーを邪魔するなんて許せません！　冬ナラデハのことがしたいなら、外にいればいいデース！」
line = "「ワタシのエンドレスサマーを邪魔するなんて許せません！　冬ナラデハのことがしたいなら、外にいればいいデース！」"

[[dialogue]]
speaker = "雪女"
# 「フフフ……ソレはドウでしょう」
line = "「フフフ……ソレはドウでしょう」"

[[dialogue]]
speaker = "雪女"
# 「このリゾート結界に隙間が生じてしまった原因。それは──アナタ自身の中にあるのデスよ、リップル──！」
line = "「このリゾート結界に隙間が生じてしまった原因。それは──アナタ自身の中にあるのデスよ、リップル──！」"

[[dialogue]]
speaker = "リップル"
# 「エ……！？」
line = "「エ……！？」"
