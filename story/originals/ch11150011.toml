line = "「クリームチーズ入りだって。よかったら食べてみて♪」"

[[dialogue]]
speaker = "マトイ"
# 「あ、はい……いただきます……」
line = "「あ、はい……いただきます……」"

[[dialogue]]
speaker = "マトイ"
# （これほんとに食べていいやつ……？　手を付けようとしたら、畏れ多いとか言って怒ったりしない……？）
line = "（これほんとに食べていいやつ……？　手を付けようとしたら、畏れ多いとか言って怒ったりしない……？）"

[[dialogue]]
speaker = "unk"
# 多分大丈夫だと思う……
line = "多分大丈夫だと思う……"

[[dialogue]]
speaker = "煌嶺"
# 「ん？　どうしたの？」
line = "「ん？　どうしたの？」"

[[dialogue]]
speaker = "マトイ"
# 「あ、いや、煌嶺さんが流星市国に来てからしばらく経つのに、煌嶺さんのこと全然知らないなって……」
line = "「あ、いや、煌嶺さんが流星市国に来てからしばらく経つのに、煌嶺さんのこと全然知らないなって……」"

[[dialogue]]
speaker = "煌嶺"
# 「まぁ、星徒会の人たちにはちゃんと自己紹介もしてなかったし、無理もないかもね」
line = "「まぁ、星徒会の人たちにはちゃんと自己紹介もしてなかったし、無理もないかもね」"

[[dialogue]]
speaker = "煌嶺"
