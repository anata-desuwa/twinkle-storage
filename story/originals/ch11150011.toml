line = "「それは知ってるんですけど……他にもいろいろ気になってることがありまして……」"

[[dialogue]]
speaker = "煌嶺"
# 「ん～？　なぁに～？」
line = "「ん～？　なぁに～？」"

[[dialogue]]
speaker = "マトイ"
# 「えーと、煌嶺さんはどうして、その……威厳がある時と、そうでない時があるんですか？」
line = "「えーと、煌嶺さんはどうして、その……威厳がある時と、そうでない時があるんですか？」"

[[dialogue]]
speaker = "煌嶺"
# 「そんなの気分だよ、気分」
line = "「そんなの気分だよ、気分」"

[[dialogue]]
speaker = "煌嶺"
# 「えらそーにしたい時はえらそーにするし、力抜きたい時はそうするし、中身は変わってないよ」
line = "「えらそーにしたい時はえらそーにするし、力抜きたい時はそうするし、中身は変わってないよ」"

