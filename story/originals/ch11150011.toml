line = "「その美貌に魅入られたのか、財や力が欲しいのか……煌嶺に求婚する男たちが、国を買えるような宝物を携えてキュリオスを訪れるとか」"

[[dialogue]]
speaker = "煌嶺"
# 「お宝が気に入らなかったら処すよ？　──って言っても来ちゃうんだよねー、これが」
line = "「お宝が気に入らなかったら処すよ？　──って言っても来ちゃうんだよねー、これが」"

