line = "「初代煌嶺はキュリオスの皇帝の妃だったんだけど、キュリオスを自分のものにしちゃって、いつの間にか『煌嶺』の名と地位を継承していくことになったんだって」"

[[dialogue]]
speaker = "煌嶺"
# 「だから私に旦那さんはいないよ。ま、古いしきたりってやつだね」
line = "「だから私に旦那さんはいないよ。ま、古いしきたりってやつだね」"

[[dialogue]]
speaker = "アナ"
# 「なるほど、皇妃の肩書はあくまで形式的なものなのですね」
