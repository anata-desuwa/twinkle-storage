[[dialogue]]
speaker = "アナ"
# 「では私からもいいでしょうか。煌嶺さんは魔界の皇妃だと聞いていましたが、妃ということは、夫がいるのですか？」
line = "「では私からもいいでしょうか。煌嶺さんは魔界の皇妃だと聞いていましたが、妃ということは、夫がいるのですか？」"

[[dialogue]]
speaker = "煌嶺"
# 「ああそれ？　よく聞かれ──はしないか。私に質問してくる人あんまりいないし」
line = "「ああそれ？　よく聞かれ──はしないか。私に質問してくる人あんまりいないし」"

[[dialogue]]
speaker = "煌嶺"
# 「『煌嶺』の名前は代々受け継ぐもので、皇妃という地位ごと継ぐことになってるんだ」
line = "「『煌嶺』の名前は代々受け継ぐもので、皇妃という地位ごと継ぐことになってるんだ」"

[[dialogue]]
speaker = "煌嶺"
