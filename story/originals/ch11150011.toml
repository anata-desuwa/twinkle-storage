line = "「忘れたか？　妾は新星学園の理事。星徒会の仕事ぶりを見に来ることに何の不思議もあるまい？」"

[[dialogue]]
speaker = "煌嶺"
# 「というわけで──」
line = "「というわけで──」"

[[dialogue]]
speaker = "煌嶺"
# 「はーい、差し入れだよー♪」
line = "「はーい、差し入れだよー♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「煌嶺から差し入れ！？　まぁお茶にちょうどいいけど」
line = "「煌嶺から差し入れ！？　まぁお茶にちょうどいいけど」"

[[dialogue]]
speaker = "アナ"
