[[dialogue]]
speaker = "unk"
# 第４話,恋か、仕事か,P
line = "第４話,恋か、仕事か,P"

[[dialogue]]
speaker = "女生徒Ａ"
# 「ねぇ、聞いた？　紅明ちゃんが今度、ドラマの主演やるかもって噂！」
line = "「ねぇ、聞いた？　紅明ちゃんが今度、ドラマの主演やるかもって噂！」"

[[dialogue]]
speaker = "女生徒Ｂ"
# 「聞いた聞いた！　漫画原作のでしょ？　人気作だし、本当だったらすごいよね！　でも、作中１番のキスシーンどうするんだろ～？　本当にしちゃうのかな～！？」
line = "「聞いた聞いた！　漫画原作のでしょ？　人気作だし、本当だったらすごいよね！　でも、作中１番のキスシーンどうするんだろ～？　本当にしちゃうのかな～！？」"

[[dialogue]]
speaker = "unk"
# 最近、ＳＮＳでリークがあったとかで、学園内でそんな噂が話題となっていた。男性役は人気のイケメン俳優らしく、俺は正直、噂を耳にする度に複雑な気持ちになる。
line = "最近、ＳＮＳでリークがあったとかで、学園内でそんな噂が話題となっていた。男性役は人気のイケメン俳優らしく、俺は正直、噂を耳にする度に複雑な気持ちになる。"

[[dialogue]]
speaker = "紅明"
# 「ダーリン、おっす～☆」
line = "「ダーリン、おっす～☆」"

[[dialogue]]
speaker = "unk"
# と、廊下を歩いていると、当の本人と鉢合わせる。
line = "と、廊下を歩いていると、当の本人と鉢合わせる。"

[[dialogue]]
speaker = "紅明"
# 「あのさ、ダーリン、今日の放課後は暇？」
line = "「あのさ、ダーリン、今日の放課後は暇？」"

[[dialogue]]
speaker = "紅明"
# 「よかったら、アタシと気晴らしに――遊園地デートでもしない？」
line = "「よかったら、アタシと気晴らしに――遊園地デートでもしない？」"

[[dialogue]]
speaker = "紅明"
# 「ダーリン、一番最初に観覧車乗ろっか♪」
line = "「ダーリン、一番最初に観覧車乗ろっか♪」"

[[dialogue]]
speaker = "unk"
# 紅明からそう提案されて、俺たちは２人で<b>向き合うように</b>、観覧車の席に座ることになった――
line = "紅明からそう提案されて、俺たちは２人で<b>向き合うように</b>、観覧車の席に座ることになった――"

[[dialogue]]
speaker = "紅明"
# 「……ダーリン、ドラマの噂、聞いた？」
line = "「……ダーリン、ドラマの噂、聞いた？」"

[[dialogue]]
speaker = "unk"
# 俺が頷いてみせると──
line = "俺が頷いてみせると──"

[[dialogue]]
speaker = "紅明"
# 「そっか……。その噂、実は本当なんだよね」
line = "「そっか……。その噂、実は本当なんだよね」"

[[dialogue]]
speaker = "紅明"
# 「アタシ……タレントとして、テレビを観てくれるヒトたちに自分の元気を分けて、笑顔にできたらっていつも思ってるんだ」
line = "「アタシ……タレントとして、テレビを観てくれるヒトたちに自分の元気を分けて、笑顔にできたらっていつも思ってるんだ」"

[[dialogue]]
speaker = "紅明"
# 「だからアタシ……ドラマの主演は、断るつもりなんだよね」
line = "「だからアタシ……ドラマの主演は、断るつもりなんだよね」"

[[dialogue]]
speaker = "unk"
# え……？
line = "え……？"

[[dialogue]]
speaker = "紅明"
# 「今のアタシじゃ、本気で演じられないから」
line = "「今のアタシじゃ、本気で演じられないから」"

[[dialogue]]
speaker = "紅明"
# 「だって、それが大きな仕事だとしても、アタシ、ダーリン以外とはキスしたくないもん」
line = "「だって、それが大きな仕事だとしても、アタシ、ダーリン以外とはキスしたくないもん」"

[[dialogue]]
speaker = "紅明"
# 「だからダーリン、そんな不安そうな顔しなくていいっしょ♪　アタシが何よりも一番見たいのは、ダーリンの笑顔なんだからさ☆」
line = "「だからダーリン、そんな不安そうな顔しなくていいっしょ♪　アタシが何よりも一番見たいのは、ダーリンの笑顔なんだからさ☆」"

[[dialogue]]
speaker = "unk"
# そう言いながら、俺の大好きな元気な笑顔で、ウィンクしてみせる紅明。
line = "そう言いながら、俺の大好きな元気な笑顔で、ウィンクしてみせる紅明。"

[[dialogue]]
speaker = "unk"
# 先程まで曇っていた心があっという間に、すっと晴れて行く。
line = "先程まで曇っていた心があっという間に、すっと晴れて行く。"

[[dialogue]]
speaker = "紅明"
# 「あ～あ、ダーリンが相手役ならアタシ、めっちゃすごいヒロイン演じてみせちゃうんだけどね～☆」
line = "「あ～あ、ダーリンが相手役ならアタシ、めっちゃすごいヒロイン演じてみせちゃうんだけどね～☆」"

[[dialogue]]
speaker = "紅明"
# 「こうなったら、監督に頼んでみよっか！　配役を変更してくれるなら、元気に全力ＯＫしちゃうぜって！　うしし♪」
line = "「こうなったら、監督に頼んでみよっか！　配役を変更してくれるなら、元気に全力ＯＫしちゃうぜって！　うしし♪」"

[[dialogue]]
speaker = "unk"
# もしもの時は――
line = "もしもの時は――"

[[dialogue]]
speaker = "紅明"
# 「ん？　――アタシの為にどんな役でもやってみせるって？」
line = "「ん？　――アタシの為にどんな役でもやってみせるって？」"

[[dialogue]]
speaker = "紅明"
# 「んモー<emoji=heart04>　ダーリンってば、冗談だって、冗談☆」
line = "「んモー<emoji=heart04>　ダーリンってば、冗談だって、冗談☆」"

[[dialogue]]
speaker = "紅明"
# 「でも……ふふっ♪　ダーリンが本気で言ってくれたっていうのは、顔を見ればわかるよ」
line = "「でも……ふふっ♪　ダーリンが本気で言ってくれたっていうのは、顔を見ればわかるよ」"

[[dialogue]]
speaker = "紅明"
# 「アタシのことを想ってくれて……すごく嬉しい<emoji=heart04>」
line = "「アタシのことを想ってくれて……すごく嬉しい<emoji=heart04>」"

[[dialogue]]
speaker = "紅明"
# 「ねぇ、ダーリン……そっちに行ってもいい？」
line = "「ねぇ、ダーリン……そっちに行ってもいい？」"

[[dialogue]]
speaker = "unk"
# 俺が頷くと、彼女は向かいの席から、隣へと移動してくる。
line = "俺が頷くと、彼女は向かいの席から、隣へと移動してくる。"

[[dialogue]]
speaker = "紅明"
# 「……キス、してもいい？」
line = "「……キス、してもいい？」"

[[dialogue]]
speaker = "紅明"
# 「あっ……<emoji=heart04>　んっ……ちゅっ<emoji=heart04>」
line = "「あっ……<emoji=heart04>　んっ……ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 紅明がいつもより可愛くて、俺はつい気持ちがはやって、唇を奪うようにキスしてしまう。
line = "紅明がいつもより可愛くて、俺はつい気持ちがはやって、唇を奪うようにキスしてしまう。"

[[dialogue]]
speaker = "紅明"
# 「んちゅっ……<emoji=heart04>　ちゅっ、ちゅっ<emoji=heart04>」
line = "「んちゅっ……<emoji=heart04>　ちゅっ、ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺はキスだけでは足りなくて、彼女の柔らかな体を抱き締める。
line = "俺はキスだけでは足りなくて、彼女の柔らかな体を抱き締める。"

[[dialogue]]
speaker = "紅明"
# 「んっ……<emoji=heart04>　はあぁっ……ダーリン<emoji=heart04>　ちゅっ……んちゅっ<emoji=heart04>」
line = "「んっ……<emoji=heart04>　はあぁっ……ダーリン<emoji=heart04>　ちゅっ……んちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "紅明"
# 「んふぅ<emoji=heart04>　そういえば、ダーリン……ドラマの原作漫画、読んだことある……？　そのキスシーンも、実は場所が遊園地の観覧車なんだ」
line = "「んふぅ<emoji=heart04>　そういえば、ダーリン……ドラマの原作漫画、読んだことある……？　そのキスシーンも、実は場所が遊園地の観覧車なんだ」"

[[dialogue]]
speaker = "紅明"
# 「ただ原作より、アタシたちの方がいっぱい、しちゃってるけど……<emoji=heart04>　ちゅっ、ちゅっ……<emoji=heart04>」
line = "「ただ原作より、アタシたちの方がいっぱい、しちゃってるけど……<emoji=heart04>　ちゅっ、ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# それから熱くなってしまった体を冷ましながら、俺たちは観覧車から降りる。
line = "それから熱くなってしまった体を冷ましながら、俺たちは観覧車から降りる。"

[[dialogue]]
speaker = "unk"
# 紅明はすっきりと元気な笑顔を浮かべながら……
line = "紅明はすっきりと元気な笑顔を浮かべながら……"

[[dialogue]]
speaker = "紅明"
# 「ん～☆　ダーリンといっぱいラブラブちゅっちゅして、元気出た～～！！」
line = "「ん～☆　ダーリンといっぱいラブラブちゅっちゅして、元気出た～～！！」"

[[dialogue]]
speaker = "unk"
# ちょっ、紅明！　しーっ！　しーっ！
line = "ちょっ、紅明！　しーっ！　しーっ！"

[[dialogue]]
speaker = "紅明"
# 「おっといけない☆」
line = "「おっといけない☆」"

[[dialogue]]
speaker = "紅明"
# 「でも、気持ちも元気に晴れたし、せっかく遊園地に来たんだから、この後は思いっきりデートを楽しむっしょ、ダーリン♪」
line = "「でも、気持ちも元気に晴れたし、せっかく遊園地に来たんだから、この後は思いっきりデートを楽しむっしょ、ダーリン♪」"

[[dialogue]]
speaker = "unk"
# そう言って、紅明が俺の腕に抱き着いてきて、手を恋人繋ぎにする。
line = "そう言って、紅明が俺の腕に抱き着いてきて、手を恋人繋ぎにする。"

[[dialogue]]
speaker = "紅明"
# 「あっ……そうだ。キスに夢中になって、言い忘れてた♪」
line = "「あっ……そうだ。キスに夢中になって、言い忘れてた♪」"

[[dialogue]]
speaker = "unk"
# 彼女は耳元で、こっそり囁く。
line = "彼女は耳元で、こっそり囁く。"

[[dialogue]]
speaker = "紅明"
# 「ダーリン――好きだよ<emoji=heart04>」
line = "「ダーリン――好きだよ<emoji=heart04>」"

[[dialogue]]
speaker = "紅明"
# 「アタシ、いつもお茶らけながら言っちゃうけど……本当に本当に、ダーリンのこと大好きだから<emoji=heart04>」
line = "「アタシ、いつもお茶らけながら言っちゃうけど……本当に本当に、ダーリンのこと大好きだから<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺も、大好きだ
line = "俺も、大好きだ"

[[dialogue]]
speaker = "紅明"
# 「ふふっ……ちゅっ<emoji=heart04>」
line = "「ふふっ……ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# もう１度、唇にキスをされる。
line = "もう１度、唇にキスをされる。"

[[dialogue]]
speaker = "unk"
# 一瞬のことだったので、特に周りから注目されずに済んだが――
line = "一瞬のことだったので、特に周りから注目されずに済んだが――"

[[dialogue]]
speaker = "紅明"
# 「……えへへへへぇ<emoji=heart04>　我慢できずに、しちゃったっしょ<emoji=heart04>」
line = "「……えへへへへぇ<emoji=heart04>　我慢できずに、しちゃったっしょ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 後日、紅明は断り文句として監督に相手役の男性キャスト交代を突き付けたらしい。
line = "後日、紅明は断り文句として監督に相手役の男性キャスト交代を突き付けたらしい。"

[[dialogue]]
speaker = "unk"
# ……が、それがなんと受け入れられてしまい、俺が地上波のテレビドラマに出演することになってしまうのは、また別の話。
line = "……が、それがなんと受け入れられてしまい、俺が地上波のテレビドラマに出演することになってしまうのは、また別の話。"
