[[dialogue]]
speaker = "unk"
# 第３話,現代技術はすごいのですね,P
line = "第３話,現代技術はすごいのですね,P"

[[dialogue]]
speaker = "unk"
# トリュファイナさん専用の義体は未だ完成を見ず、かといって出来上がるまで学園に閉じ込めるのも酷だ。
line = "トリュファイナさん専用の義体は未だ完成を見ず、かといって出来上がるまで学園に閉じ込めるのも酷だ。"

[[dialogue]]
speaker = "unk"
# そのため流星市国を案内することにした。現代の知識を知ってもらわなければトリュファイナさんも生きづらいだろうから──
line = "そのため流星市国を案内することにした。現代の知識を知ってもらわなければトリュファイナさんも生きづらいだろうから──"

[[dialogue]]
speaker = "トリュファイナ"
# 「魔王様。今、私たちが歩いているのが歩道というのですね？　通行人はここを歩かねばならない決まり」
line = "「魔王様。今、私たちが歩いているのが歩道というのですね？　通行人はここを歩かねばならない決まり」"

[[dialogue]]
speaker = "トリュファイナ"
# 「そして車道の方は、人をのせた大きな鉄の籠が……なるほど。これが現代の移動魔法ということですね！」
line = "「そして車道の方は、人をのせた大きな鉄の籠が……なるほど。これが現代の移動魔法ということですね！」"

[[dialogue]]
speaker = "unk"
# あれは自動車といって……
line = "あれは自動車といって……"

[[dialogue]]
speaker = "トリュファイナ"
# 「ふん、ふんふん……がそりん？　を、爆発？　させたエネルギー？　で進む……？」
line = "「ふん、ふんふん……がそりん？　を、爆発？　させたエネルギー？　で進む……？」"

[[dialogue]]
speaker = "トリュファイナ"
# 「ほぇ～……すごい理屈なのですね。魔力も霊力も用いないのですか」
line = "「ほぇ～……すごい理屈なのですね。魔力も霊力も用いないのですか」"

[[dialogue]]
speaker = "トリュファイナ"
# 「あっ──あちらの御方。何やら小さな箱に向かってお喋りをしていますね」
line = "「あっ──あちらの御方。何やら小さな箱に向かってお喋りをしていますね」"

[[dialogue]]
speaker = "トリュファイナ"
# 「遠く離れた御方と会話をされているご様子……あれは現代の交信魔法でしょうか！」
line = "「遠く離れた御方と会話をされているご様子……あれは現代の交信魔法でしょうか！」"

[[dialogue]]
speaker = "unk"
# あれはＤＩＳＣといって……
line = "あれはＤＩＳＣといって……"

[[dialogue]]
speaker = "トリュファイナ"
# 「ふん、ふんふん……ねっと？　電波？　通信局？　を経由して……？」
line = "「ふん、ふんふん……ねっと？　電波？　通信局？　を経由して……？」"

[[dialogue]]
speaker = "トリュファイナ"
# 「ほぇえ～……またまた魔力を使わないのですか。本当に、遥か未来に来たことを実感いたします」
line = "「ほぇえ～……またまた魔力を使わないのですか。本当に、遥か未来に来たことを実感いたします」"

[[dialogue]]
speaker = "トリュファイナ"
# 「これからもたくさん、現代のことを教えていただけるのですか？　ありがとうございます」
line = "「これからもたくさん、現代のことを教えていただけるのですか？　ありがとうございます」"

[[dialogue]]
speaker = "トリュファイナ"
# 「しかし魔王様。本当によろしいのですか、私と２人で外出をして」
line = "「しかし魔王様。本当によろしいのですか、私と２人で外出をして」"

[[dialogue]]
speaker = "トリュファイナ"
# 「いえ……少しだけ、周りを気になさった方が良いのではと思いまして」
line = "「いえ……少しだけ、周りを気になさった方が良いのではと思いまして」"

[[dialogue]]
speaker = "unk"
# どういうことですか？
line = "どういうことですか？"

[[dialogue]]
speaker = "トリュファイナ"
# 「それはですね──あ、あちらのお２人、魔王様のお知り合いでは……？」
line = "「それはですね──あ、あちらのお２人、魔王様のお知り合いでは……？」"

[[dialogue]]
speaker = "ソフィア"
# 「会長さん、さっきから何をお１人で虚空に向かってぶつぶつ喋ってるんです？」
line = "「会長さん、さっきから何をお１人で虚空に向かってぶつぶつ喋ってるんです？」"

[[dialogue]]
speaker = "フィオナ"
# 「何か悩んでいることでもあるのですか、緋宮会長？　私たちでよければ相談に乗りますが」
line = "「何か悩んでいることでもあるのですか、緋宮会長？　私たちでよければ相談に乗りますが」"

[[dialogue]]
speaker = "unk"
# ちょうど良かった、紹介するよ
line = "ちょうど良かった、紹介するよ"

[[dialogue]]
speaker = "トリュファイナ"
# （霊体の私と一緒で変な目で見られているというのに。相変わらずお優しい御方ですね、あなた様は……）
line = "（霊体の私と一緒で変な目で見られているというのに。相変わらずお優しい御方ですね、あなた様は……）"

[[dialogue]]
speaker = "フィオナ"
# 「なるほど……緋宮会長に紹介され、強く意識すると見えるようになる……その通りのようですね」
line = "「なるほど……緋宮会長に紹介され、強く意識すると見えるようになる……その通りのようですね」"

[[dialogue]]
speaker = "フィオナ"
# 「初めまして、トリュファイナ様。流星学園星徒会長の、星見フィオナです」
line = "「初めまして、トリュファイナ様。流星学園星徒会長の、星見フィオナです」"

[[dialogue]]
speaker = "ソフィア"
# 「同じく流星星徒会の奏ソフィアです。こんにちは」
line = "「同じく流星星徒会の奏ソフィアです。こんにちは」"

[[dialogue]]
speaker = "トリュファイナ"
# 「はい。初めまして。フィオナ様に、ソフィア様」
line = "「はい。初めまして。フィオナ様に、ソフィア様」"

[[dialogue]]
speaker = "トリュファイナ"
# 「ここは皆様の通われている学園の、憩いの場なのですね。とても賑やかで素晴らしいです」
line = "「ここは皆様の通われている学園の、憩いの場なのですね。とても賑やかで素晴らしいです」"

[[dialogue]]
speaker = "トリュファイナ"
# 「私、現代の社会や風俗を勉強しているのです。よろしければあなた方のお話も聞かせてください！」
line = "「私、現代の社会や風俗を勉強しているのです。よろしければあなた方のお話も聞かせてください！」"

[[dialogue]]
speaker = "トリュファイナ"
# 「まあ……あいすすけえと……氷の上を細い刃のついた靴で滑るのですか。きっと魔法の力が必要ですね、それは」
line = "「まあ……あいすすけえと……氷の上を細い刃のついた靴で滑るのですか。きっと魔法の力が必要ですね、それは」"

[[dialogue]]
speaker = "ソフィア"
# 「あ、いえ……スケートは技術で滑るんですよ」
line = "「あ、いえ……スケートは技術で滑るんですよ」"

[[dialogue]]
speaker = "トリュファイナ"
# 「魔法の力は使わないのですか？」
line = "「魔法の力は使わないのですか？」"

[[dialogue]]
speaker = "ソフィア"
# 「はい、自転車と同じようなものです。コツさえ使めばすぐに上達します」
line = "「はい、自転車と同じようなものです。コツさえ使めばすぐに上達します」"

[[dialogue]]
speaker = "トリュファイナ"
# 「じてんしゃ？　ああ、似た言葉を先ほど聞きました。あれでしょう、ガソリン？　で爆発？　して進むのでしょう、ふふふ♪」
line = "「じてんしゃ？　ああ、似た言葉を先ほど聞きました。あれでしょう、ガソリン？　で爆発？　して進むのでしょう、ふふふ♪」"

[[dialogue]]
speaker = "unk"
# それは自動車です、トリュファイナさん
line = "それは自動車です、トリュファイナさん"

[[dialogue]]
speaker = "トリュファイナ"
# 「ほぇ～……現代は似た言葉で、異なるものがたくさんあるのですね。勉強になります」
line = "「ほぇ～……現代は似た言葉で、異なるものがたくさんあるのですね。勉強になります」"

[[dialogue]]
speaker = "ソフィア"
# 「何なのでしょう。天然な御方なのでしょうか……」
line = "「何なのでしょう。天然な御方なのでしょうか……」"

[[dialogue]]
speaker = "フィオナ"
# 「こ、こらソフィア。失礼ですよ……？」
line = "「こ、こらソフィア。失礼ですよ……？」"

[[dialogue]]
speaker = "フィオナ"
# 「それでは失礼します。とても楽しい時間でした。次はぜひ、流星星徒会室へお越しください」
line = "「それでは失礼します。とても楽しい時間でした。次はぜひ、流星星徒会室へお越しください」"

[[dialogue]]
speaker = "ソフィア"
# 「またお喋りしましょう、トリュファイナさん」
line = "「またお喋りしましょう、トリュファイナさん」"

[[dialogue]]
speaker = "トリュファイナ"
# 「はい。ぜひ」
line = "「はい。ぜひ」"

[[dialogue]]
speaker = "トリュファイナ"
# 「──いい時代ですね、ここは」
line = "「──いい時代ですね、ここは」"

[[dialogue]]
speaker = "トリュファイナ"
# 「街ゆく人々はとても楽しそう。人間も天使も魔族もとても楽しく語らって……」
line = "「街ゆく人々はとても楽しそう。人間も天使も魔族もとても楽しく語らって……」"

[[dialogue]]
speaker = "トリュファイナ"
# 「親しい人とおいしいお茶とお菓子を食べ、嬉しかったことを語り合う……」
line = "「親しい人とおいしいお茶とお菓子を食べ、嬉しかったことを語り合う……」"

[[dialogue]]
speaker = "トリュファイナ"
# 「ここが現代。ラクシス様が守り、今も変わらずあなた様に守られている世界……とても嬉しいです、私」
line = "「ここが現代。ラクシス様が守り、今も変わらずあなた様に守られている世界……とても嬉しいです、私」"

[[dialogue]]
speaker = "トリュファイナ"
# 「でも、贅沢だとは思いますが……私もこの世界の住人になりたいな、と。身の程知らずの願いを抱いてしまいそうになります」
line = "「でも、贅沢だとは思いますが……私もこの世界の住人になりたいな、と。身の程知らずの願いを抱いてしまいそうになります」"

[[dialogue]]
speaker = "unk"
# あなたももうこの世界の一員です
line = "あなたももうこの世界の一員です"

[[dialogue]]
speaker = "unk"
# 他人事じゃないですよ
line = "他人事じゃないですよ"

[[dialogue]]
speaker = "トリュファイナ"
# 「えっ──」
line = "「えっ──」"

[[dialogue]]
speaker = "トリュファイナ"
# 「……ふふ♪　そうですか。そうですよね。うん……」
line = "「……ふふ♪　そうですか。そうですよね。うん……」"

[[dialogue]]
speaker = "トリュファイナ"
# 「やっぱりあなた様は英雄でいらっしゃいますね。お強いだけではない。とても優しい御方……」
line = "「やっぱりあなた様は英雄でいらっしゃいますね。お強いだけではない。とても優しい御方……」"

[[dialogue]]
speaker = "トリュファイナ"
# 「義体が完成した時に備えて、もっと現代を学ばねばなりませんね。これからもお付き合いください、魔王様♪」
line = "「義体が完成した時に備えて、もっと現代を学ばねばなりませんね。これからもお付き合いください、魔王様♪」"
