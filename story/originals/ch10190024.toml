[[dialogue]]
speaker = "unk"
# 第４話,修行・イチャイチャお家デート,P
line = "第４話,修行・イチャイチャお家デート,P"

[[dialogue]]
speaker = "せつな"
# 「せつなの誕生日プレゼントは、主様と１日イチャイチャお家デートでお願いいたしまする！」
line = "「せつなの誕生日プレゼントは、主様と１日イチャイチャお家デートでお願いいたしまする！」"

[[dialogue]]
speaker = "せつな"
# 「え？　それはいつもやってる……？」
line = "「え？　それはいつもやってる……？」"

[[dialogue]]
speaker = "せつな"
# 「いえいえ、これはそういういつも通りのアレコレではないのでござる」
line = "「いえいえ、これはそういういつも通りのアレコレではないのでござる」"

[[dialogue]]
speaker = "せつな"
# 「もうせつなも、主様の専属忍者兼恋人となって、それなりの時間が過ぎたでござる」
line = "「もうせつなも、主様の専属忍者兼恋人となって、それなりの時間が過ぎたでござる」"

[[dialogue]]
speaker = "せつな"
# 「にも関わらず、いつまでも恋愛が恥ずかしいとか、言っていられないのでござりまする！」
line = "「にも関わらず、いつまでも恋愛が恥ずかしいとか、言っていられないのでござりまする！」"

[[dialogue]]
speaker = "せつな"
# 「だから今年の誕生日プレゼントは、主様のお時間を丸一日いただき、せつながプロデュースする『お家デート』を実行したいのでござる」
line = "「だから今年の誕生日プレゼントは、主様のお時間を丸一日いただき、せつながプロデュースする『お家デート』を実行したいのでござる」"

[[dialogue]]
speaker = "unk"
# プレゼントは別で用意しておくね
line = "プレゼントは別で用意しておくね"

[[dialogue]]
speaker = "unk"
# じゃあそれはそれとして
line = "じゃあそれはそれとして"

[[dialogue]]
speaker = "せつな"
# 「ありがとうございまする、主様！　一生懸命デートプランを考えてくるので、楽しみにしていてほしいでござる」
line = "「ありがとうございまする、主様！　一生懸命デートプランを考えてくるので、楽しみにしていてほしいでござる」"

[[dialogue]]
speaker = "unk"
# そして、せつなの誕生日当日。
line = "そして、せつなの誕生日当日。"

[[dialogue]]
speaker = "unk"
# 誕生日おめでとう、せつな
line = "誕生日おめでとう、せつな"

[[dialogue]]
speaker = "せつな"
# 「嬉しいでござる、主様！　せつなもデートに向けて、おめかししてきたでござる♪」
line = "「嬉しいでござる、主様！　せつなもデートに向けて、おめかししてきたでござる♪」"

[[dialogue]]
speaker = "せつな"
# 「えへへぇ～♪　可愛いでござるか？　せつなもこの衣装、気に入ってるでござる」
line = "「えへへぇ～♪　可愛いでござるか？　せつなもこの衣装、気に入ってるでござる」"

[[dialogue]]
speaker = "せつな"
# 「主様に『可愛い』って言ってもらうの、やっぱり転げまわりたくなるほど恥ずかしいでござるが……それでもやっぱり、嬉しいでござる<emoji=heart04>」
line = "「主様に『可愛い』って言ってもらうの、やっぱり転げまわりたくなるほど恥ずかしいでござるが……それでもやっぱり、嬉しいでござる<emoji=heart04>」"

[[dialogue]]
speaker = "せつな"
# 「主様にもっともっと『可愛い』って言ってもらえるように、もっともっと修行して、堂々と並びたてるパートナーになるでござる」
line = "「主様にもっともっと『可愛い』って言ってもらえるように、もっともっと修行して、堂々と並びたてるパートナーになるでござる」"

[[dialogue]]
speaker = "せつな"
# 「にゃっ！？　そ、その……まだ他の人がいる前では、勘弁してほしいでござるぅ。もちろん、ゆくゆくはそれもできるように、立派な恋人忍者になるつもりでござる」
line = "「にゃっ！？　そ、その……まだ他の人がいる前では、勘弁してほしいでござるぅ。もちろん、ゆくゆくはそれもできるように、立派な恋人忍者になるつもりでござる」"

[[dialogue]]
speaker = "unk"
# 誕生日だったのにちょっと意地悪だった
line = "誕生日だったのにちょっと意地悪だった"

[[dialogue]]
speaker = "unk"
# ごめん、ごめん
line = "ごめん、ごめん"

[[dialogue]]
speaker = "せつな"
# 「いえいえ、そのための修行デートでござる！」
line = "「いえいえ、そのための修行デートでござる！」"

[[dialogue]]
speaker = "せつな"
# 「いつもは主様にエスコートしてもらってばかりでござるが、今日はせつなが頑張りたいでござる」
line = "「いつもは主様にエスコートしてもらってばかりでござるが、今日はせつなが頑張りたいでござる」"

[[dialogue]]
speaker = "せつな"
# 「というわけで、ジャジャーン！　お家デートの定番、恋愛映画でござる！　ヨミ殿にオススメを借りてきたでござる」
line = "「というわけで、ジャジャーン！　お家デートの定番、恋愛映画でござる！　ヨミ殿にオススメを借りてきたでござる」"

[[dialogue]]
speaker = "せつな"
# 「あ、主様……鋭いでござるな。これは最もせつなが苦手にしているものと言っても、過言ではないでござりまする……」
line = "「あ、主様……鋭いでござるな。これは最もせつなが苦手にしているものと言っても、過言ではないでござりまする……」"

[[dialogue]]
speaker = "せつな"
# 「何度か、別の映画を一人で観てみたのでござるが……あまりの羞恥で九浄家のお屋敷にある自室を半壊させてしまったでござる」
line = "「何度か、別の映画を一人で観てみたのでござるが……あまりの羞恥で九浄家のお屋敷にある自室を半壊させてしまったでござる」"

[[dialogue]]
speaker = "unk"
# この家、大丈夫か……！？
line = "この家、大丈夫か……！？"

[[dialogue]]
speaker = "せつな"
# 「だ、大丈夫でござる……！！　今日は主様が一緒でござりまする！」
line = "「だ、大丈夫でござる……！！　今日は主様が一緒でござりまする！」"

[[dialogue]]
speaker = "せつな"
# 「どんなに破廉恥で小っ恥ずかしい拷問を受けようとも、主様に手を握っていただければ暴れ出したりはしないでござる。忍びとはそういうものでござる！」
line = "「どんなに破廉恥で小っ恥ずかしい拷問を受けようとも、主様に手を握っていただければ暴れ出したりはしないでござる。忍びとはそういうものでござる！」"

[[dialogue]]
speaker = "unk"
# 恋愛映画はそういうものではないけどね！？
line = "恋愛映画はそういうものではないけどね！？"

[[dialogue]]
speaker = "せつな"
# 「だ、ダメでござりまするか……？　せつな、確かに恋愛映画は大の苦手ではござりまするが、興味がないわけではないでござる」
line = "「だ、ダメでござりまするか……？　せつな、確かに恋愛映画は大の苦手ではござりまするが、興味がないわけではないでござる」"

[[dialogue]]
speaker = "せつな"
# 「正確に言えば、主様の恋人忍者になったことで、昔よりも明確に……興味が出てきたでござる」
line = "「正確に言えば、主様の恋人忍者になったことで、昔よりも明確に……興味が出てきたでござる」"

[[dialogue]]
speaker = "せつな"
# 「せつな自身は、主様のそばにいて、たまに褒めてもらえさえすれば、満足でござる……」
line = "「せつな自身は、主様のそばにいて、たまに褒めてもらえさえすれば、満足でござる……」"

[[dialogue]]
speaker = "せつな"
# 「ですが、世の恋人というのは、きっとそういう関係ではないと思ったのでござりまする……」
line = "「ですが、世の恋人というのは、きっとそういう関係ではないと思ったのでござりまする……」"

[[dialogue]]
speaker = "せつな"
# 「せつなの一方的な満足ではなく、主様が恋人になにを求めているのか、みんなは恋人同士でするどんなことに憧れるのか、そういうことがせつなも知りたいのでござる」
line = "「せつなの一方的な満足ではなく、主様が恋人になにを求めているのか、みんなは恋人同士でするどんなことに憧れるのか、そういうことがせつなも知りたいのでござる」"

[[dialogue]]
speaker = "せつな"
# 「だからせつなと……恋愛映画を観て欲しいでござる」
line = "「だからせつなと……恋愛映画を観て欲しいでござる」"

[[dialogue]]
speaker = "unk"
# そんなの……いいに決まってる
line = "そんなの……いいに決まってる"

[[dialogue]]
speaker = "せつな"
# 「主様っ<emoji=heart04>　ありがとうございまするにゃん♪」
line = "「主様っ<emoji=heart04>　ありがとうございまするにゃん♪」"

[[dialogue]]
speaker = "せつな"
# 「それではさっそく、恋愛映画を再生機にセットして……」
line = "「それではさっそく、恋愛映画を再生機にセットして……」"

[[dialogue]]
speaker = "せつな"
# 「にゃにゃんっ！？　主様、いつになく積極的でござる……っ」
line = "「にゃにゃんっ！？　主様、いつになく積極的でござる……っ」"

[[dialogue]]
speaker = "せつな"
# 「世の恋人は、彼女を膝の上に乗せて、くっついて映画を観たりする……でござるか？」
line = "「世の恋人は、彼女を膝の上に乗せて、くっついて映画を観たりする……でござるか？」"

[[dialogue]]
speaker = "せつな"
# 「そ、そうでござるな……ちょっと恥ずかしいでござるが、嫌ではないと申しまするか……主様の体温を背中全体に感じられて、むしろ嬉しいでござる<emoji=heart04>」
line = "「そ、そうでござるな……ちょっと恥ずかしいでござるが、嫌ではないと申しまするか……主様の体温を背中全体に感じられて、むしろ嬉しいでござる<emoji=heart04>」"

[[dialogue]]
speaker = "せつな"
# 「今日は世間の恋人がどういうものかを学び、実践する日でござる。手を繋ぐのも、膝の上でくっつき合うのも、何でも試していくでござる」
line = "「今日は世間の恋人がどういうものかを学び、実践する日でござる。手を繋ぐのも、膝の上でくっつき合うのも、何でも試していくでござる」"

[[dialogue]]
speaker = "せつな"
# 「主様の方こそ、途中で照れ臭くなったとか言って、逃げたらダメでござるよ♪」
line = "「主様の方こそ、途中で照れ臭くなったとか言って、逃げたらダメでござるよ♪」"

[[dialogue]]
speaker = "せつな"
# 「それじゃあ、２人でぬくぬくくっついたまま、めちゃ甘と評判の恋愛映画を観るでござる！」
line = "「それじゃあ、２人でぬくぬくくっついたまま、めちゃ甘と評判の恋愛映画を観るでござる！」"

[[dialogue]]
speaker = "unk"
# そうして、その日一日、俺とせつなはイチャイチャお家デートを実践するのだった。
line = "そうして、その日一日、俺とせつなはイチャイチャお家デートを実践するのだった。"

[[dialogue]]
speaker = "unk"
# 自分も相当イチャイチャしてると思うのだが、映画のキスシーンではしっかり真っ赤になって固まっているせつなは、やっぱり可愛いなと思った。
line = "自分も相当イチャイチャしてると思うのだが、映画のキスシーンではしっかり真っ赤になって固まっているせつなは、やっぱり可愛いなと思った。"
