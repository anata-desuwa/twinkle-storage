[[dialogue]]
speaker = "フラン"
# 「しっかし見ねえな死神。『出てこい堕天使！』っつって出てくるわけねえしなー」
line = "「しっかし見ねえな死神。『出てこい堕天使！』っつって出てくるわけねえしなー」"

[[dialogue]]
speaker = "グロリア"
# 「黒い装束というお話でしたが、恥ずかしがり屋なのでしょうか？」
line = "「黒い装束というお話でしたが、恥ずかしがり屋なのでしょうか？」"

[[dialogue]]
speaker = "フラン"
# 「全身真っ黒とかむしろ自己主張激しいだろ」
line = "「全身真っ黒とかむしろ自己主張激しいだろ」"

[[dialogue]]
speaker = "グロリア"
# 「目撃情報も空振りでしたし、どうすればいいのでしょうか……。あ、張り紙がしてあります」
line = "「目撃情報も空振りでしたし、どうすればいいのでしょうか……。あ、張り紙がしてあります」"

[[dialogue]]
speaker = "グロリア"
# 「ええと……『遊園地でスタンプラリー開催中。課題をクリアしてスタンプを集めると景品がもらえます！』……だそうです」
line = "「ええと……『遊園地でスタンプラリー開催中。課題をクリアしてスタンプを集めると景品がもらえます！』……だそうです」"

[[dialogue]]
speaker = "フラン"
# 「よし、やるぞ！」
line = "「よし、やるぞ！」"

[[dialogue]]
speaker = "unk"
# 死神を探しに来たんじゃ！？
line = "死神を探しに来たんじゃ！？"

[[dialogue]]
speaker = "フラン"
# 「遊園地から勝負を挑んできてるんだぞ！　受けて立たなきゃ戦士の名折れだ！」
line = "「遊園地から勝負を挑んできてるんだぞ！　受けて立たなきゃ戦士の名折れだ！」"

[[dialogue]]
speaker = "フラン"
# 「それに死神探しが行き詰ってるんだ。何かのきっかけになるかもしれねえだろ」
line = "「それに死神探しが行き詰ってるんだ。何かのきっかけになるかもしれねえだろ」"

[[dialogue]]
speaker = "unk"
# グロリアさんはどうですか？
line = "グロリアさんはどうですか？"

[[dialogue]]
speaker = "グロリア"
# 「ええと……申し訳ありません。娯楽にうとく、スタンプラリーというものを存じ上げなくて……」
line = "「ええと……申し訳ありません。娯楽にうとく、スタンプラリーというものを存じ上げなくて……」"

[[dialogue]]
speaker = "フラン"
# 「カードにスタンプを押していって、全部埋まったら勝ちだ！　ま、やればわかるって」
line = "「カードにスタンプを押していって、全部埋まったら勝ちだ！　ま、やればわかるって」"

[[dialogue]]
speaker = "unk"
# じゃあ試しにやってみま──
line = "じゃあ試しにやってみま──"

[[dialogue]]
speaker = "？？？"
# 「おにーさん♪」
line = "「おにーさん♪」"

[[dialogue]]
speaker = "unk"
# ！？
line = "！？"

[[dialogue]]
speaker = "？？？"
# 「や、また会ったね。元気にしてた？　歯は磨いた？　夜はちゃんとぐっすり寝た？」
line = "「や、また会ったね。元気にしてた？　歯は磨いた？　夜はちゃんとぐっすり寝た？」"

[[dialogue]]
speaker = "グロリア"
# 「あら。いつの間にか近くに……」
line = "「あら。いつの間にか近くに……」"

[[dialogue]]
speaker = "フラン"
# 「なんだ、附属生か。見ねえ顔だな」
line = "「なんだ、附属生か。見ねえ顔だな」"

[[dialogue]]
speaker = "？？？"
# 「ねーねー、今楽しそうな話してたでしょ？　あたしも混ぜて混ぜて？」
line = "「ねーねー、今楽しそうな話してたでしょ？　あたしも混ぜて混ぜて？」"

[[dialogue]]
speaker = "フラン"
# 「別にいいけどお前誰だよ？」
line = "「別にいいけどお前誰だよ？」"

[[dialogue]]
speaker = "プルちゃん"
# 「んーとねー……プルちゃんって呼んで♪」
line = "「んーとねー……プルちゃんって呼んで♪」"

[[dialogue]]
speaker = "グロリア"
# 「プルちゃん、ですね。わかりました」
line = "「プルちゃん、ですね。わかりました」"

[[dialogue]]
speaker = "フラン"
# 「いや答えになってねえし。てかプルちゃんってなんだよ、お前にゃチビで十分だ」
line = "「いや答えになってねえし。てかプルちゃんってなんだよ、お前にゃチビで十分だ」"

[[dialogue]]
speaker = "プルちゃん"
# 「え～、ひっど～い。プルちゃん、かわいいあたしにピッタリじゃない？」
line = "「え～、ひっど～い。プルちゃん、かわいいあたしにピッタリじゃない？」"

[[dialogue]]
speaker = "フラン"
# 「かわいいとか自分で言うなや」
line = "「かわいいとか自分で言うなや」"

[[dialogue]]
speaker = "プルちゃん"
# 「あたしプルちゃん♪　キャハ♪」
line = "「あたしプルちゃん♪　キャハ♪」"

[[dialogue]]
speaker = "フラン"
# 「聞いてねえし！」
line = "「聞いてねえし！」"

[[dialogue]]
speaker = "プルちゃん"
# 「さぁさぁ、チンタラしてたら大変なことになっちゃうよ！　ゴーゴーゴー！」
line = "「さぁさぁ、チンタラしてたら大変なことになっちゃうよ！　ゴーゴーゴー！」"

[[dialogue]]
speaker = "unk"
# そうしてプルちゃんも加わって、４人でスタンプを集めることになった。
line = "そうしてプルちゃんも加わって、４人でスタンプを集めることになった。"

[[dialogue]]
speaker = "unk"
# スタンプラリーの課題はクイズであったり、指定されたアトラクションに乗ったりといろいろだ。
line = "スタンプラリーの課題はクイズであったり、指定されたアトラクションに乗ったりといろいろだ。"

[[dialogue]]
speaker = "グロリア"
# 「あれがコーヒーカップ……遊園地のアトラクションは初めてでしたが、見た目に似合わず激しいのですね……」
line = "「あれがコーヒーカップ……遊園地のアトラクションは初めてでしたが、見た目に似合わず激しいのですね……」"

[[dialogue]]
speaker = "フラン"
# 「ありゃチビが回し過ぎだ」
line = "「ありゃチビが回し過ぎだ」"

[[dialogue]]
speaker = "プルちゃん"
# 「え～、フランおねーさんだって『負けるかー！』ってめちゃくちゃ回してたじゃん」
line = "「え～、フランおねーさんだって『負けるかー！』ってめちゃくちゃ回してたじゃん」"

[[dialogue]]
speaker = "unk"
# 俺もクラクラする……
line = "俺もクラクラする……"

[[dialogue]]
speaker = "プルちゃん"
# 「アハハッ♪　コーヒーカップのスタンプは集めたから～……次はまたクイズだ！」
line = "「アハハッ♪　コーヒーカップのスタンプは集めたから～……次はまたクイズだ！」"

[[dialogue]]
speaker = "フラン"
# 「なになに……朝は四本足、昼は二本足、夜は三本足、この生き物は……。ハッ、お決まりのやつだな。答えは──」
line = "「なになに……朝は四本足、昼は二本足、夜は三本足、この生き物は……。ハッ、お決まりのやつだな。答えは──」"

[[dialogue]]
speaker = "プルちゃん"
# 「マカイフラフラダヌキ！！」
line = "「マカイフラフラダヌキ！！」"

[[dialogue]]
speaker = "フラン"
# 「なんじゃそりゃ！？」
line = "「なんじゃそりゃ！？」"

[[dialogue]]
speaker = "プルちゃん"
# 「知らないの？　魔界のアマツミカにいる、いつも踊ってる愉快なタヌキだよ」
line = "「知らないの？　魔界のアマツミカにいる、いつも踊ってる愉快なタヌキだよ」"

[[dialogue]]
speaker = "フラン"
# 「そんなのいるかよ！」
line = "「そんなのいるかよ！」"

[[dialogue]]
speaker = "グロリア"
# 「ええと……ハズレでした。やはり正解はヒトですね」
line = "「ええと……ハズレでした。やはり正解はヒトですね」"

[[dialogue]]
speaker = "フラン"
# 「いねえじゃねえか！」
line = "「いねえじゃねえか！」"

[[dialogue]]
speaker = "プルちゃん"
# 「アハハハッ♪　いたら面白いのにね♪」
line = "「アハハハッ♪　いたら面白いのにね♪」"

[[dialogue]]
speaker = "フラン"
# 「コイツ～……！」
line = "「コイツ～……！」"

[[dialogue]]
speaker = "グロリア"
# 「ふふ……」
line = "「ふふ……」"

[[dialogue]]
speaker = "フラン"
# 「グロリア？」
line = "「グロリア？」"

[[dialogue]]
speaker = "グロリア"
# 「あ……すみません、フランさんとプルちゃんのやり取りが面白くてつい……」
line = "「あ……すみません、フランさんとプルちゃんのやり取りが面白くてつい……」"

[[dialogue]]
speaker = "フラン"
# 「いや別に構わねえけど。でもそんな風に笑ってるの珍しいな」
line = "「いや別に構わねえけど。でもそんな風に笑ってるの珍しいな」"

[[dialogue]]
speaker = "グロリア"
# 「そう……でしょうか？　……言われてみると、そうかもしれませんね」
line = "「そう……でしょうか？　……言われてみると、そうかもしれませんね」"

[[dialogue]]
speaker = "フラン"
# 「ま、グロリアも楽しんでるってことじゃねえか。よぉし、このままスタンプ全部集めるぞ！」
line = "「ま、グロリアも楽しんでるってことじゃねえか。よぉし、このままスタンプ全部集めるぞ！」"

[[dialogue]]
speaker = "プルちゃん"
# 「お～っ♪」
line = "「お～っ♪」"

[[dialogue]]
speaker = "グロリア"
# 「しかしよいのでしょうか？　私たちは死神様を探しに来たのでは……」
line = "「しかしよいのでしょうか？　私たちは死神様を探しに来たのでは……」"

[[dialogue]]
speaker = "フラン"
# 「あー……ま、そのうち出てくんだろ」
line = "「あー……ま、そのうち出てくんだろ」"
