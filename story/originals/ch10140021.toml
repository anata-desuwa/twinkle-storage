[[dialogue]]
speaker = "unk"
# 第１話,敵前逃亡,P
line = "第１話,敵前逃亡,P"

[[dialogue]]
speaker = "unk"
# 恋人でもないのに、教え子の胸の中で泣きじゃくる失態を見せてから、早２週間。
line = "恋人でもないのに、教え子の胸の中で泣きじゃくる失態を見せてから、早２週間。"

[[dialogue]]
speaker = "トワ先生"
# 「はぅぅ～～、あの時の会長くん、かっこよかったなぁ……」
line = "「はぅぅ～～、あの時の会長くん、かっこよかったなぁ……」"

[[dialogue]]
speaker = "unk"
# ……そうしたら、先生は安心してくれますか？
line = "……そうしたら、先生は安心してくれますか？"

[[dialogue]]
speaker = "unk"
# リクリエは俺が止めます。
line = "リクリエは俺が止めます。"

[[dialogue]]
speaker = "トワ先生"
# 「って、ダメダメ！　いつまで妄想に浸ってるんだ、わたし！」
line = "「って、ダメダメ！　いつまで妄想に浸ってるんだ、わたし！」"

[[dialogue]]
speaker = "トワ先生"
# 「あの時は『会長くん、かっこいいな～。こんな人が彼氏だったら最高だなぁ～』とかイタい妄想しちゃったけど！」
line = "「あの時は『会長くん、かっこいいな～。こんな人が彼氏だったら最高だなぁ～』とかイタい妄想しちゃったけど！」"

[[dialogue]]
speaker = "トワ先生"
# 「そもそも会長くんは教え子！　わたし教師！　年下の男の子相手に『かっこいいなぁ～』じゃないよ、まったく！　立場を弁えなさい！」
line = "「そもそも会長くんは教え子！　わたし教師！　年下の男の子相手に『かっこいいなぁ～』じゃないよ、まったく！　立場を弁えなさい！」"

[[dialogue]]
speaker = "unk"
# あ、こんなところにいた、トワ先生！
line = "あ、こんなところにいた、トワ先生！"

[[dialogue]]
speaker = "トワ先生"
# 「って、ひゃいっ……！？」
line = "「って、ひゃいっ……！？」"

[[dialogue]]
speaker = "トワ先生"
# 「か、会長くん！？　ど、どうしたの？　先生に何か用かな？」
line = "「か、会長くん！？　ど、どうしたの？　先生に何か用かな？」"

[[dialogue]]
speaker = "トワ先生"
# 「え？　この間から、ちょっと避けられてる気がする……？」
line = "「え？　この間から、ちょっと避けられてる気がする……？」"

[[dialogue]]
speaker = "unk"
# だから先生ともう１回、話がしたくて……
line = "だから先生ともう１回、話がしたくて……"

[[dialogue]]
speaker = "unk"
# 俺、何か変なこと言っちゃったかもしれない
line = "俺、何か変なこと言っちゃったかもしれない"

[[dialogue]]
speaker = "トワ先生"
# 「う、ううんっ！　これはキミのせいじゃないの。全面的に先生が悪いっていうか、先生が不甲斐ないから……」
line = "「う、ううんっ！　これはキミのせいじゃないの。全面的に先生が悪いっていうか、先生が不甲斐ないから……」"

[[dialogue]]
speaker = "トワ先生"
# 「う、うん……。もちろん、ね？　いい大人が泣いてる姿を見せちゃって、恥ずかしいっていうのはあるんだけど、嫌だったわけじゃないよっ」
line = "「う、うん……。もちろん、ね？　いい大人が泣いてる姿を見せちゃって、恥ずかしいっていうのはあるんだけど、嫌だったわけじゃないよっ」"

[[dialogue]]
speaker = "トワ先生"
# 「むしろ、嫌じゃなかったことの方が問題……っていうかぁ……」
line = "「むしろ、嫌じゃなかったことの方が問題……っていうかぁ……」"

[[dialogue]]
speaker = "トワ先生"
# （あぁあああぁぁぁっ！　どうしよう、どうしようっ！　会長くんからしてみたら、こんなこと言われても意味不明だよね！？）
line = "（あぁあああぁぁぁっ！　どうしよう、どうしようっ！　会長くんからしてみたら、こんなこと言われても意味不明だよね！？）"

[[dialogue]]
speaker = "トワ先生"
# （先生としてちゃんとしなきゃいけないのに、会長くんと話してるって思うだけで、どんどん緊張してきちゃうし……）
line = "（先生としてちゃんとしなきゃいけないのに、会長くんと話してるって思うだけで、どんどん緊張してきちゃうし……）"

[[dialogue]]
speaker = "トワ先生"
# （顔もどんどん熱くなってきちゃうよぉぉぉ！？　はぅぅ、わたし今、変な顔してない！？　ブサイクになってないよね！？）
line = "（顔もどんどん熱くなってきちゃうよぉぉぉ！？　はぅぅ、わたし今、変な顔してない！？　ブサイクになってないよね！？）"

[[dialogue]]
speaker = "unk"
# 俺、実は先生に言いたいことがあって……
line = "俺、実は先生に言いたいことがあって……"

[[dialogue]]
speaker = "unk"
# それなら良かったです
line = "それなら良かったです"

[[dialogue]]
speaker = "トワ先生"
# 「えっ？　相談事……？　会長くんがわたしに？」
line = "「えっ？　相談事……？　会長くんがわたしに？」"

[[dialogue]]
speaker = "トワ先生"
# 「うんっ！　もちろん聞くよ。なんでも話してほしいな！」
line = "「うんっ！　もちろん聞くよ。なんでも話してほしいな！」"

[[dialogue]]
speaker = "トワ先生"
# 「わたしのことは気にしないで！　教え子から相談があるなんて聞いたら、下らない自分事でウジウジなんてしてられないもん！」
line = "「わたしのことは気にしないで！　教え子から相談があるなんて聞いたら、下らない自分事でウジウジなんてしてられないもん！」"

[[dialogue]]
speaker = "トワ先生"
# 「うん？　先生に聞いてもらいたい話だけど、相談事ではない……？　それはつまり、どういう？」
line = "「うん？　先生に聞いてもらいたい話だけど、相談事ではない……？　それはつまり、どういう？」"

[[dialogue]]
speaker = "unk"
# もしよかったら、付き合ってもらえませんか
line = "もしよかったら、付き合ってもらえませんか"

[[dialogue]]
speaker = "unk"
# 俺、先生のことが好きだっ！
line = "俺、先生のことが好きだっ！"

[[dialogue]]
speaker = "トワ先生"
# 「え……？」
line = "「え……？」"

[[dialogue]]
speaker = "トワ先生"
# 「それはつまり……会長くんも？　先生のことを、好き……ってこと？」
line = "「それはつまり……会長くんも？　先生のことを、好き……ってこと？」"

[[dialogue]]
speaker = "unk"
# ふ、復唱されると恥ずかしいです……
line = "ふ、復唱されると恥ずかしいです……"

[[dialogue]]
speaker = "トワ先生"
# 「って、えぇええええぇぇぇぇええええぇぇぇぇ～～～～～～～～！？」
line = "「って、えぇええええぇぇぇぇええええぇぇぇぇ～～～～～～～～！？」"

[[dialogue]]
speaker = "トワ先生"
# 「嬉しいけど！！　それはちょっと、まずいんじゃないのかなぁぁぁぁぁ～～～～！？」
line = "「嬉しいけど！！　それはちょっと、まずいんじゃないのかなぁぁぁぁぁ～～～～！？」"

[[dialogue]]
speaker = "トワ先生"
# 「いやいやいやいや！　嬉しがっちゃダメでしょ、有明トワ！　そこは教師として！　先生として！？」
line = "「いやいやいやいや！　嬉しがっちゃダメでしょ、有明トワ！　そこは教師として！　先生として！？」"

[[dialogue]]
speaker = "unk"
# えっと……それで、トワ先生？
line = "えっと……それで、トワ先生？"

[[dialogue]]
speaker = "トワ先生"
# 「あっ………………うぅぅぅ～～～～」
line = "「あっ………………うぅぅぅ～～～～」"

[[dialogue]]
speaker = "トワ先生"
# 「ご、ごめんなさぁ～～～～いっ！！」
line = "「ご、ごめんなさぁ～～～～いっ！！」"

[[dialogue]]
speaker = "unk"
# あろうことかわたしは、告白してきてくれた会長くんにまともな返事もできず、その場から逃げ出してしまうのだった。
line = "あろうことかわたしは、告白してきてくれた会長くんにまともな返事もできず、その場から逃げ出してしまうのだった。"
