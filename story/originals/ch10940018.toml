[[dialogue]]
speaker = "unk"
# ヴィーナスの『美鶴の心を開け大作戦』の影響ですっかり美鶴と仲良くなり、恋人になってからしばらくの月日が経った。
line = "ヴィーナスの『美鶴の心を開け大作戦』の影響ですっかり美鶴と仲良くなり、恋人になってからしばらくの月日が経った。"

[[dialogue]]
speaker = "unk"
# 恋仲になってからの彼女の変化は、一番近くで見続けてる俺ですら目を疑うほどだった。
line = "恋仲になってからの彼女の変化は、一番近くで見続けてる俺ですら目を疑うほどだった。"

[[dialogue]]
speaker = "unk"
# 星騎士の任務がない時は、必ず美鶴と放課後デート。
line = "星騎士の任務がない時は、必ず美鶴と放課後デート。"

[[dialogue]]
speaker = "美鶴"
# 「会長さんの手、あったかい。ぎゅー、ぎゅー」
line = "「会長さんの手、あったかい。ぎゅー、ぎゅー」"

[[dialogue]]
speaker = "unk"
# 美鶴の方から積極的に指を絡めてきて、恋人繋ぎで街を練り歩く。
line = "美鶴の方から積極的に指を絡めてきて、恋人繋ぎで街を練り歩く。"

[[dialogue]]
speaker = "unk"
# 俺の方しか見ていない美鶴は気づいてなさそうだけど、周囲の注目の的だ。
line = "俺の方しか見ていない美鶴は気づいてなさそうだけど、周囲の注目の的だ。"

[[dialogue]]
speaker = "美鶴"
# 「会長さん、クレープ美味しいよ。あーん」
line = "「会長さん、クレープ美味しいよ。あーん」"

[[dialogue]]
speaker = "unk"
# 露店で買ったひとつのクレープを仲良く分け合う。今更、間接キス程度じゃ動じない。
line = "露店で買ったひとつのクレープを仲良く分け合う。今更、間接キス程度じゃ動じない。"

[[dialogue]]
speaker = "美鶴"
# 「ほっぺにクリームついてるし。ちゅっ<emoji=heart04>」
line = "「ほっぺにクリームついてるし。ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# クリームを取るという名目で、隙あらばほっぺにキス。
line = "クリームを取るという名目で、隙あらばほっぺにキス。"

[[dialogue]]
speaker = "unk"
# これまで希薄だった人付き合いの時間を、俺１人から一気に取り返すみたいな怒涛のスキンシップで、ただひたすらに幸せな時間を過ごした。
line = "これまで希薄だった人付き合いの時間を、俺１人から一気に取り返すみたいな怒涛のスキンシップで、ただひたすらに幸せな時間を過ごした。"

[[dialogue]]
speaker = "unk"
# とはいえ、楽しい放課後デートも必ず終わりがやってくる。
line = "とはいえ、楽しい放課後デートも必ず終わりがやってくる。"

[[dialogue]]
speaker = "美鶴"
# 「もうデートおしまい？　お別れすんの、寂しい……」
line = "「もうデートおしまい？　お別れすんの、寂しい……」"

[[dialogue]]
speaker = "クロト"
# 「また明日も会えるよ。メッセージも送るし」
line = "「また明日も会えるよ。メッセージも送るし」"

[[dialogue]]
speaker = "美鶴"
# 「や。会長さんとずっと一緒にいたい……ね、もうちょっとだけ。うちの部屋、寄ってかない？」
line = "「や。会長さんとずっと一緒にいたい……ね、もうちょっとだけ。うちの部屋、寄ってかない？」"

[[dialogue]]
speaker = "unk"
# 名残惜しそうに俺の袖を引っ張り、寂しげな顔をした恋人の提案を拒めるはずもなかった。
line = "名残惜しそうに俺の袖を引っ張り、寂しげな顔をした恋人の提案を拒めるはずもなかった。"

[[dialogue]]
speaker = "美鶴"
# 「ようこそ、会長さん……ん、ちゅ」
line = "「ようこそ、会長さん……ん、ちゅ」"

[[dialogue]]
speaker = "unk"
# 九浄家の美鶴の部屋へとお邪魔し、ふたりきりになった途端──
line = "九浄家の美鶴の部屋へとお邪魔し、ふたりきりになった途端──"

[[dialogue]]
speaker = "美鶴"
# 「んぅ……ちゅ、ちゅっ……ん、ちゅぴ、ちゅぱ、ちゅぱっ……ぷぁっ、はぁ……会長さん、好き、好きぃ……<emoji=heart04>」
line = "「んぅ……ちゅ、ちゅっ……ん、ちゅぴ、ちゅぱ、ちゅぱっ……ぷぁっ、はぁ……会長さん、好き、好きぃ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 街中での優しいキスなんてお遊戯みたいに、お互いを貪るような唾液を舐め回すキスで求め合う。
line = "街中での優しいキスなんてお遊戯みたいに、お互いを貪るような唾液を舐め回すキスで求め合う。"

[[dialogue]]
speaker = "unk"
# 愛し合ってる恋人同士のサインだ。
line = "愛し合ってる恋人同士のサインだ。"

[[dialogue]]
speaker = "unk"
# 彼女の部屋でふたりきりになれば、セックスに雪崩れ込むのは至って自然で、いつも通り。
line = "彼女の部屋でふたりきりになれば、セックスに雪崩れ込むのは至って自然で、いつも通り。"

[[dialogue]]
speaker = "美鶴"
# 「会長さんとえっちなチューしたら……うちのおま○こ、くちゅくちゅになっちゃった……恥ずかし」
line = "「会長さんとえっちなチューしたら……うちのおま○こ、くちゅくちゅになっちゃった……恥ずかし」"

[[dialogue]]
speaker = "unk"
# 大きく開いた股間の中心──サーモンピンク色の割れ目からは熱いとろみが零れていて、股間から太ももにかけて愛液の伝った跡まで残っている。
line = "大きく開いた股間の中心──サーモンピンク色の割れ目からは熱いとろみが零れていて、股間から太ももにかけて愛液の伝った跡まで残っている。"

[[dialogue]]
speaker = "クロト"
# 「デートの時から胸を押し付けてきたり、足を絡めてただろ。最初っからエッチしたくてたまらないの、バレバレだったよ」
line = "「デートの時から胸を押し付けてきたり、足を絡めてただろ。最初っからエッチしたくてたまらないの、バレバレだったよ」"

[[dialogue]]
speaker = "美鶴"
# 「む。そーゆー会長さんだって、デートの途中でおち○ぽムクムクしてたくせに。ちゃんと気づいてるよ」
line = "「む。そーゆー会長さんだって、デートの途中でおち○ぽムクムクしてたくせに。ちゃんと気づいてるよ」"

[[dialogue]]
speaker = "クロト"
# 「それは……手繋いでる時に、美鶴がいやらしい握り方してくるから」
line = "「それは……手繋いでる時に、美鶴がいやらしい握り方してくるから」"

[[dialogue]]
speaker = "美鶴"
# 「え。いやらしい握り方なんてしてないし。指と指の間を優しくさわさわしてただけじゃん」
line = "「え。いやらしい握り方なんてしてないし。指と指の間を優しくさわさわしてただけじゃん」"

[[dialogue]]
speaker = "unk"
# 手先が器用な美鶴のタッチは、とても繊細で、そっと撫でられるだけで思わず股間が反応してしまう。
line = "手先が器用な美鶴のタッチは、とても繊細で、そっと撫でられるだけで思わず股間が反応してしまう。"

[[dialogue]]
speaker = "unk"
# 今に至るまでの前戯はその時から始まっていたというわけだ。
line = "今に至るまでの前戯はその時から始まっていたというわけだ。"

[[dialogue]]
speaker = "美鶴"
# 「会長さんの手、あったかくて、安心するし、触ってるだけでとっても気持ちいいから好き」
line = "「会長さんの手、あったかくて、安心するし、触ってるだけでとっても気持ちいいから好き」"

[[dialogue]]
speaker = "クロト"
# 「手だけで満足なのか？」
line = "「手だけで満足なのか？」"

[[dialogue]]
speaker = "美鶴"
# 「会長さん、いじわる」
line = "「会長さん、いじわる」"

[[dialogue]]
speaker = "unk"
# 美鶴の指がペニスへと伸び、そっとなぞった。先端から溢れている先走り汁が美鶴の指に絡みつく。
line = "美鶴の指がペニスへと伸び、そっとなぞった。先端から溢れている先走り汁が美鶴の指に絡みつく。"

[[dialogue]]
speaker = "美鶴"
# 「これ……おち○ぽはもっと好き<emoji=heart04>　熱くて、硬くって……うちの知らない奥の奥まで届いて……うちを気持ちよくしてくれるから、だぁい好き……<emoji=heart04>」
line = "「これ……おち○ぽはもっと好き<emoji=heart04>　熱くて、硬くって……うちの知らない奥の奥まで届いて……うちを気持ちよくしてくれるから、だぁい好き……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# さわさわとまさぐられているだけで、ペニスには大量の血が巡り、限界まで勃起させられてしまう。
line = "さわさわとまさぐられているだけで、ペニスには大量の血が巡り、限界まで勃起させられてしまう。"

[[dialogue]]
speaker = "美鶴"
# 「こんな恥ずかしい言葉、いつから言えるようになっちゃったんだろ……おち○ぽなんて、えっちすぎ」
line = "「こんな恥ずかしい言葉、いつから言えるようになっちゃったんだろ……おち○ぽなんて、えっちすぎ」"

[[dialogue]]
speaker = "unk"
# 最初は男性器の名前すら恥ずかしくて言えなかった美鶴が、いつの間にやらここまでの成長を遂げた。
line = "最初は男性器の名前すら恥ずかしくて言えなかった美鶴が、いつの間にやらここまでの成長を遂げた。"

[[dialogue]]
speaker = "unk"
# 彼女をいやらしい方向に変えたのが自分だと思うと、誇らしいやら感慨深いやら申し訳ないやらだ。
line = "彼女をいやらしい方向に変えたのが自分だと思うと、誇らしいやら感慨深いやら申し訳ないやらだ。"

[[dialogue]]
speaker = "美鶴"
# 「うちがこんなえっちになっちゃうなんて、思ってなかったし。会長さんがうちのこと、おかしくしちゃったんだからね？　分かってる？」
line = "「うちがこんなえっちになっちゃうなんて、思ってなかったし。会長さんがうちのこと、おかしくしちゃったんだからね？　分かってる？」"

[[dialogue]]
speaker = "美鶴"
# 「だから……ちゃんと責任取って。いっぱい気持ちよくしてくれなきゃ許してあげなーい……<emoji=heart04>」
line = "「だから……ちゃんと責任取って。いっぱい気持ちよくしてくれなきゃ許してあげなーい……<emoji=heart04>」"

[[dialogue]]
speaker = "美鶴"
# 「はぁ、あ……硬ぁいの当たってるし……会長さんのおち○ぽと、うちのおま○こ、チュッチュッしてる……<emoji=heart04>」
line = "「はぁ、あ……硬ぁいの当たってるし……会長さんのおち○ぽと、うちのおま○こ、チュッチュッしてる……<emoji=heart04>」"

[[dialogue]]
speaker = "美鶴"
# 「はぁ、んぁ……あれ？　や、おち○ぽ逃げちゃダメじゃん……なんで入れてくれないの？」
line = "「はぁ、んぁ……あれ？　や、おち○ぽ逃げちゃダメじゃん……なんで入れてくれないの？」"

[[dialogue]]
speaker = "美鶴"
# 「ひゃうっ、おち○ぽでお尻ぺちぺちすんのダメ……うちのおま○この場所、分かってるくせに」
line = "「ひゃうっ、おち○ぽでお尻ぺちぺちすんのダメ……うちのおま○この場所、分かってるくせに」"

[[dialogue]]
speaker = "美鶴"
# 「焦らすのやだ……おち○ぽ……おち○ぽ早く入れてよ……おま○こ切なくて、苦しいから……このまま、生ぁ、生でいいんだから……ね？」
line = "「焦らすのやだ……おち○ぽ……おち○ぽ早く入れてよ……おま○こ切なくて、苦しいから……このまま、生ぁ、生でいいんだから……ね？」"

[[dialogue]]
speaker = "unk"
