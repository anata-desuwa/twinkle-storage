[[dialogue]]
speaker = "unk"
# 一番太い亀頭が入ってしまえば、あとはぬるりと。愛液に満ちた膣道を一気に突き抜け、最奥の子宮口をノックした。
line = "一番太い亀頭が入ってしまえば、あとはぬるりと。愛液に満ちた膣道を一気に突き抜け、最奥の子宮口をノックした。"

[[dialogue]]
speaker = "美鶴"
