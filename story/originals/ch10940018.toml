line = "「はぁ、はっ……あんっ……！　はっ……はぁぁ……ぜぇんぶ入ったぁ……うちのおま○こ……会長さんのでいっぱいに広がっちゃったぁっ……<emoji=heart04>」"

[[dialogue]]
