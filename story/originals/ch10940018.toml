# 「んぅ……最初は痛かったのに、もう気持ちいいだけぇ……はぁ、はっ、みっちり埋まってるだけで幸せ……」
line = "「んぅ……最初は痛かったのに、もう気持ちいいだけぇ……はぁ、はっ、みっちり埋まってるだけで幸せ……」"

[[dialogue]]
speaker = "美鶴"
# 「おっきいおち○ぽで、おま○こ広げられちゃうの、『会長さんのものにされた』ってカンジ……きゃんっ<emoji=heart04>」
line = "「おっきいおち○ぽで、おま○こ広げられちゃうの、『会長さんのものにされた』ってカンジ……きゃんっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 手持無沙汰な手で、背後から美鶴のおっぱいを鷲掴む。見た目以上にたっぷりとしたボリュームがあり、抜群の揉み心地だ。
