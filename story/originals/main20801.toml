[[dialogue]]
speaker = "unk"
# 第１話,ルヴィネ追跡計画,B
line = "第１話,ルヴィネ追跡計画,B"

[[dialogue]]
speaker = "unk"
# デネブの救世主にして、極星学園の頂点に立つ星徒会長・ルヴィネ。
line = "デネブの救世主にして、極星学園の頂点に立つ星徒会長・ルヴィネ。"

[[dialogue]]
speaker = "unk"
# 極星学園と力を合わせてリクリエと戦うためには、謎が多い彼女についてもっと知る必要があるだろう。
line = "極星学園と力を合わせてリクリエと戦うためには、謎が多い彼女についてもっと知る必要があるだろう。"

[[dialogue]]
speaker = "unk"
# そのためにナターシャが提案したのは──
line = "そのためにナターシャが提案したのは──"

[[dialogue]]
speaker = "梨緒"
# 「尾行……？」
line = "「尾行……？」"

[[dialogue]]
speaker = "ナターシャ"
# 「そ、尾行。情報は足で稼ぐのが基本でしょ？　徹底的に追跡すれば、何かわかるかもと思って」
line = "「そ、尾行。情報は足で稼ぐのが基本でしょ？　徹底的に追跡すれば、何かわかるかもと思って」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「ふむ。ルヴィネの追跡か……あたしたちも試みたことがあったが、人手が足りなくて上手くいかなかったな」
line = "「ふむ。ルヴィネの追跡か……あたしたちも試みたことがあったが、人手が足りなくて上手くいかなかったな」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「バックアップメンバーも極星学園の動向は監視しているが、追いきれないこともある」
line = "「バックアップメンバーも極星学園の動向は監視しているが、追いきれないこともある」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「だが、これだけ人数がいるなら何か掴めるかもしれない。たまには愚直な手を使ってみるか」
line = "「だが、これだけ人数がいるなら何か掴めるかもしれない。たまには愚直な手を使ってみるか」"

[[dialogue]]
speaker = "ベアトリス"
# 「でも、気になることがあれば私がルヴィに聞いてくればいいんじゃない？」
line = "「でも、気になることがあれば私がルヴィに聞いてくればいいんじゃない？」"

[[dialogue]]
speaker = "ナターシャ"
# 「それはやめといた方がいいんじゃない？　ベアトのことは仲間だと思ってるけど、ルヴィネに聞かれたら言っちゃいけないことポロッと言っちゃいそう」
line = "「それはやめといた方がいいんじゃない？　ベアトのことは仲間だと思ってるけど、ルヴィネに聞かれたら言っちゃいけないことポロッと言っちゃいそう」"

[[dialogue]]
speaker = "ベアトリス"
# 「う……確かに自信ない……」
line = "「う……確かに自信ない……」"

[[dialogue]]
speaker = "梨緒"
# 「それにふらりと帰ってきた君を信用するとも限らない。危害を加えられることはなくとも、監視を付けたり、一時的に拘束されるかもしれない」
line = "「それにふらりと帰ってきた君を信用するとも限らない。危害を加えられることはなくとも、監視を付けたり、一時的に拘束されるかもしれない」"

[[dialogue]]
speaker = "ベアトリス"
# 「あぁ～……ルヴィならやりそう……」
line = "「あぁ～……ルヴィならやりそう……」"

[[dialogue]]
speaker = "ベアトリス"
# 「久しぶりに会いたいけど、やめといた方が良さそうだね……はい、諦めます」
line = "「久しぶりに会いたいけど、やめといた方が良さそうだね……はい、諦めます」"

[[dialogue]]
speaker = "梨緒"
# 「すまない。そうしてくれると助かる」
line = "「すまない。そうしてくれると助かる」"

[[dialogue]]
speaker = "ヴィーナス"
# 「敵のボスを尾行するってなんだか楽しそうね。やってみましょうよ」
line = "「敵のボスを尾行するってなんだか楽しそうね。やってみましょうよ」"

[[dialogue]]
speaker = "フィオナ"
# 「試してみる価値はあるかもしれませんね。ですが具体的にどう尾行するのでしょう？」
line = "「試してみる価値はあるかもしれませんね。ですが具体的にどう尾行するのでしょう？」"

[[dialogue]]
speaker = "ナターシャ"
# 「尾行とか追跡は私の専門分野だし、私が中心になってやろうかなって思ってるよ」
line = "「尾行とか追跡は私の専門分野だし、私が中心になってやろうかなって思ってるよ」"

[[dialogue]]
speaker = "ナターシャ"
# 「だけど１人だと何かあった時怖いし、かといって大人数でゾロゾロってわけにもいかないし、２人一組がいいかな」
line = "「だけど１人だと何かあった時怖いし、かといって大人数でゾロゾロってわけにもいかないし、２人一組がいいかな」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「それじゃ、ナターシャ＋１人と、あたし＋１人のペアで回していくか。レジスタンス活動のおかげで、あたしも隠密行動に覚えがある」
line = "「それじゃ、ナターシャ＋１人と、あたし＋１人のペアで回していくか。レジスタンス活動のおかげで、あたしも隠密行動に覚えがある」"

[[dialogue]]
speaker = "ベアトリス"
# 「もしかして、２４時間ずっと尾行するつもり……？」
line = "「もしかして、２４時間ずっと尾行するつもり……？」"

[[dialogue]]
speaker = "ナターシャ"
# 「そりゃそうだよ。徹底的にって言ったでしょ」
line = "「そりゃそうだよ。徹底的にって言ったでしょ」"

[[dialogue]]
speaker = "ベアトリス"
# 「でも夜は必要ないんじゃ？　ルヴィは寮住まいだよ？」
line = "「でも夜は必要ないんじゃ？　ルヴィは寮住まいだよ？」"

[[dialogue]]
speaker = "クロト"
# 「いや、深夜に寮を抜け出す生徒もいないわけじゃない。夜も監視が必要だと思う」
line = "「いや、深夜に寮を抜け出す生徒もいないわけじゃない。夜も監視が必要だと思う」"

[[dialogue]]
speaker = "ベアトリス"
# 「うーん、ルヴィはそんなことしないと思うけどなぁ……」
line = "「うーん、ルヴィはそんなことしないと思うけどなぁ……」"

[[dialogue]]
speaker = "ナターシャ"
# 「だからこそだよ。思わぬ収穫があるかもしれないからね」
line = "「だからこそだよ。思わぬ収穫があるかもしれないからね」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「よし、じゃあローテーションを組むぞ」
line = "「よし、じゃあローテーションを組むぞ」"

[[dialogue]]
speaker = "ラクシャ"
# 「なんかバイトのシフトみたいだなー」
line = "「なんかバイトのシフトみたいだなー」"

[[dialogue]]
speaker = "クロト"
# 「確かに警備のバイトはこんな感じだったかも」
line = "「確かに警備のバイトはこんな感じだったかも」"

[[dialogue]]
speaker = "unk"
# ナターシャとアポロを中心に、交代のタイミングを考えつつ、ローテーションの組み合わせを構築していく。
line = "ナターシャとアポロを中心に、交代のタイミングを考えつつ、ローテーションの組み合わせを構築していく。"

[[dialogue]]
speaker = "リノ"
# 「じゃあ私は基地の維持と、隠蔽魔法をかける担当ね。あとアポロちゃんがいない時の料理も私に任せて！」
line = "「じゃあ私は基地の維持と、隠蔽魔法をかける担当ね。あとアポロちゃんがいない時の料理も私に任せて！」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「それは待て。長時間の尾行から帰ってきた時にリノの料理が待ってたんじゃ気が滅入る」
line = "「それは待て。長時間の尾行から帰ってきた時にリノの料理が待ってたんじゃ気が滅入る」"

[[dialogue]]
speaker = "リノ"
# 「アポロちゃんひど～い！」
line = "「アポロちゃんひど～い！」"

[[dialogue]]
speaker = "クロト"
# 「はは……そっちもローテーションを考えてもいいかもな」
line = "「はは……そっちもローテーションを考えてもいいかもな」"

[[dialogue]]
speaker = "unk"
# バイト経験のおかげで、料理なら俺もそれなりにできる。
line = "バイト経験のおかげで、料理なら俺もそれなりにできる。"

[[dialogue]]
speaker = "unk"
# 今までアポロに頼りっぱなしだったし、俺もできるだけ手伝おう。
line = "今までアポロに頼りっぱなしだったし、俺もできるだけ手伝おう。"

[[dialogue]]
speaker = "アポロ（大人）"
# 「よし、作戦開始は明日からだ。ちゃんとルヴィネを尾行するためにも、今日はゆっくり体を休めてくれ」
line = "「よし、作戦開始は明日からだ。ちゃんとルヴィネを尾行するためにも、今日はゆっくり体を休めてくれ」"

[[dialogue]]
speaker = "フィオナ"
# 「はい。尾行には体力が必要ですからね」
line = "「はい。尾行には体力が必要ですからね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あいつの秘密を暴いてやるわ！」
line = "「あいつの秘密を暴いてやるわ！」"

[[dialogue]]
speaker = "ラクシャ"
# 「あ～あ、明日からまたバイトかー」
line = "「あ～あ、明日からまたバイトかー」"

[[dialogue]]
speaker = "梨緒"
# 「バイトじゃないだろう……」
line = "「バイトじゃないだろう……」"

[[dialogue]]
speaker = "ベアトリス"
# 「隠れて後をつけるのは気が進まないけど……終わったら謝るからね、ルヴィ」
line = "「隠れて後をつけるのは気が進まないけど……終わったら謝るからね、ルヴィ」"

[[dialogue]]
speaker = "ナターシャ"
# 「さて、エージェントらしく仕事するとしますか」
line = "「さて、エージェントらしく仕事するとしますか」"

[[dialogue]]
speaker = "unk"
# こうして明日からの行動を決め、それぞれ部屋に戻って休んだのだった。
line = "こうして明日からの行動を決め、それぞれ部屋に戻って休んだのだった。"
