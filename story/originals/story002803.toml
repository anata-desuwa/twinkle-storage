[[dialogue]]
speaker = "？？？"
# 「私は、この深淵書庫の管理システム」
line = "「私は、この深淵書庫の管理システム」"

[[dialogue]]
speaker = "ウィステリア"
# 「管理システム……？　ここにそんなのいたのね。ところで、見覚えのある角と翼だけど、関係あるのかしら？」
line = "「管理システム……？　ここにそんなのいたのね。ところで、見覚えのある角と翼だけど、関係あるのかしら？」"

[[dialogue]]
speaker = "管理システム"
# 「意外と目敏いのね。あなたの想像の通りよ。煌竜ヴィライアの因子から私は生まれた」
line = "「意外と目敏いのね。あなたの想像の通りよ。煌竜ヴィライアの因子から私は生まれた」"

[[dialogue]]
speaker = "管理システム"
# 「ヴィライアはかつてのリクリエにおいて、文明を滅ぼした厄災の化身。世界を焼き尽くし、ヴィライアは眠りに就いた」
line = "「ヴィライアはかつてのリクリエにおいて、文明を滅ぼした厄災の化身。世界を焼き尽くし、ヴィライアは眠りに就いた」"

[[dialogue]]
speaker = "管理システム"
# 「ヴィライアは眠ったまま、リクリエで滅びた世界とともにフィーニスの塔に格納され、永い時間が流れた。そして、世界に文明が満ちたことで覚醒した」
line = "「ヴィライアは眠ったまま、リクリエで滅びた世界とともにフィーニスの塔に格納され、永い時間が流れた。そして、世界に文明が満ちたことで覚醒した」"

[[dialogue]]
speaker = "管理システム"
# 「<ruby=私>書庫</ruby>はそれを察知し、ヴィライアを倒すべく、あなたをフィーニスの塔に送り込んだ」
line = "「<ruby>書庫<rt>私</rt></ruby>はそれを察知し、ヴィライアを倒すべく、あなたをフィーニスの塔に送り込んだ」"

[[dialogue]]
speaker = "ウィステリア"
# 「えぇっ！？　あれ、フィーニスの塔の中だったの！？」
line = "「えぇっ！？　あれ、フィーニスの塔の中だったの！？」"

[[dialogue]]
speaker = "管理システム"
# 「ヴィライアを倒すことができなかったあなたは、ヴィライアを呪いの鎖で縛り、封印した」
line = "「ヴィライアを倒すことができなかったあなたは、ヴィライアを呪いの鎖で縛り、封印した」"

[[dialogue]]
speaker = "管理システム"
# 「あれがなければ、魔王の覚醒を待たず世界は滅んでいたでしょう。自覚がないようだけれど、あなたはすでに世界を救った『英雄』よ」
line = "「あれがなければ、魔王の覚醒を待たず世界は滅んでいたでしょう。自覚がないようだけれど、あなたはすでに世界を救った『英雄』よ」"

[[dialogue]]
speaker = "ウィステリア"
# 「はぁ！？　英雄なんて願い下げよ！」
line = "「はぁ！？　英雄なんて願い下げよ！」"

[[dialogue]]
speaker = "ウィステリア"
# 「『千年に一度の英雄』だの、『ミレニアム・ワン』だの、そういうのは余所でやって。私はただ普通の幸せが欲しいだけなの」
line = "「『千年に一度の英雄』だの、『ミレニアム・ワン』だの、そういうのは余所でやって。私はただ普通の幸せが欲しいだけなの」"

[[dialogue]]
speaker = "管理システム"
# 「封印されたヴィライアは、魔王一派によって倒された」
line = "「封印されたヴィライアは、魔王一派によって倒された」"

[[dialogue]]
speaker = "管理システム"
# 「ヴィライアの因子と魔力は鎖を通してこの書庫に『収蔵』され、そして管理システムとして私が実体化した」
line = "「ヴィライアの因子と魔力は鎖を通してこの書庫に『収蔵』され、そして管理システムとして私が実体化した」"

[[dialogue]]
speaker = "ウィステリア"
# 「……待って。私の鎖に吸収された魔力が、どうしてこの書庫に送られるの？」
line = "「……待って。私の鎖に吸収された魔力が、どうしてこの書庫に送られるの？」"

[[dialogue]]
speaker = "管理システム"
# 「簡単なことよ。あなたの持つ魔導書は、この書庫の『鍵』なのだから」
line = "「簡単なことよ。あなたの持つ魔導書は、この書庫の『鍵』なのだから」"

[[dialogue]]
speaker = "ウィステリア"
# 「どういうこと？　私の魔導書は、魔界の実家にあったもの。だけどこの書庫は新星学園の地下にある……私の魔導書と何の関係が？」
line = "「どういうこと？　私の魔導書は、魔界の実家にあったもの。だけどこの書庫は新星学園の地下にある……私の魔導書と何の関係が？」"

[[dialogue]]
speaker = "管理システム"
# 「あなたの再就職先にこの書庫があったのは偶然ではないわ。あなたがここに辿り着くように、呪いが因果を手繰り寄せたの」
line = "「あなたの再就職先にこの書庫があったのは偶然ではないわ。あなたがここに辿り着くように、呪いが因果を手繰り寄せたの」"

[[dialogue]]
speaker = "ウィステリア"
# 「じゃあ、最初の就職先が潰れたのも呪いのせいってわけ？　私が就職する前から経営状態は悪かったはずだけど」
line = "「じゃあ、最初の就職先が潰れたのも呪いのせいってわけ？　私が就職する前から経営状態は悪かったはずだけど」"

[[dialogue]]
speaker = "管理システム"
# 「それも呪いによって歪められた因果。すべての呪いはあなたをここに導くためにあった。それ以外の不運はその余波に過ぎない」
line = "「それも呪いによって歪められた因果。すべての呪いはあなたをここに導くためにあった。それ以外の不運はその余波に過ぎない」"

[[dialogue]]
speaker = "ウィステリア"
# 「はぁ！？　とんだとばっちりじゃない！！　そのせいで私の人生踏んだり蹴ったりなのに！　あと前の会社の人ごめんなさい！」
line = "「はぁ！？　とんだとばっちりじゃない！！　そのせいで私の人生踏んだり蹴ったりなのに！　あと前の会社の人ごめんなさい！」"

[[dialogue]]
speaker = "ウィステリア"
# 「で、この書庫は一体なんなの？　管理システムなんだから、当然知っているんでしょう？　答えてくれないなら、力ずくで聞くことになるけど」
line = "「で、この書庫は一体なんなの？　管理システムなんだから、当然知っているんでしょう？　答えてくれないなら、力ずくで聞くことになるけど」"

[[dialogue]]
speaker = "管理システム"
# 「欲するなら答えましょう」
line = "「欲するなら答えましょう」"

[[dialogue]]
speaker = "管理システム"
# 「この書庫は、リクリエで滅びた魔族の成れの果て。怨嗟と嘆きを収蔵する書庫よ」
line = "「この書庫は、リクリエで滅びた魔族の成れの果て。怨嗟と嘆きを収蔵する書庫よ」"

[[dialogue]]
speaker = "ウィステリア"
# 「魔族の、成れの果て？」
line = "「魔族の、成れの果て？」"

[[dialogue]]
speaker = "管理システム"
# 「森羅暦より過去の世界……玄武暦……朱雀暦……さらにそれより以前から、<ruby=リクリエ>厄災</ruby>は悠久の時を超えて繰り返されてきた」
line = "「森羅暦より過去の世界……玄武暦……朱雀暦……さらにそれより以前から、<ruby>厄災<rt>リクリエ</rt></ruby>は悠久の時を超えて繰り返されてきた」"

[[dialogue]]
speaker = "管理システム"
# 「リクリエで魔族が滅ぼされる度、本は増えていく。魔族たちの無念を綴じて、呪いを秘めた魔本たちが」
line = "「リクリエで魔族が滅ぼされる度、本は増えていく。魔族たちの無念を綴じて、呪いを秘めた魔本たちが」"

[[dialogue]]
speaker = "管理システム"
# 「ここは、リクリエに滅ぼされた幾万幾億の魔族の魔力と魔法、そして怨嗟を本にして収蔵する、呪いの書庫よ」
line = "「ここは、リクリエに滅ぼされた幾万幾億の魔族の魔力と魔法、そして怨嗟を本にして収蔵する、呪いの書庫よ」"

[[dialogue]]
speaker = "ウィステリア"
# 「この本の全てが、呪いの本だっていうの！？」
line = "「この本の全てが、呪いの本だっていうの！？」"

[[dialogue]]
speaker = "管理システム"
# 「ええ、そう。今は眠っているから魔力は封じられているけど、目覚めれば嫌でも解るわ」
line = "「ええ、そう。今は眠っているから魔力は封じられているけど、目覚めれば嫌でも解るわ」"

[[dialogue]]
speaker = "管理システム"
# 「私たちの悲願はリクリエの打倒。私たちを滅ぼし続けたものを、滅ぼす」
line = "「私たちの悲願はリクリエの打倒。私たちを滅ぼし続けたものを、滅ぼす」"

[[dialogue]]
speaker = "管理システム"
# 「そのために、呪いを受け入れる『器』が必要だった」
line = "「そのために、呪いを受け入れる『器』が必要だった」"

[[dialogue]]
speaker = "ウィステリア"
# 「……で、この魔導書の出番ってわけね」
line = "「……で、この魔導書の出番ってわけね」"

[[dialogue]]
speaker = "管理システム"
# 「その通りよ。その魔導書は深淵書庫の一部でありながら、書庫の外で器を探す外典。その魔導書を使いこなす者こそ、私たちの器」
line = "「その通りよ。その魔導書は深淵書庫の一部でありながら、書庫の外で器を探す外典。その魔導書を使いこなす者こそ、私たちの器」"

[[dialogue]]
speaker = "管理システム"
# 「あなたはヴィライアと戦い、『千年に一度の英雄』と呼ばれる存在になった」
line = "「あなたはヴィライアと戦い、『千年に一度の英雄』と呼ばれる存在になった」"

[[dialogue]]
speaker = "管理システム"
# 「だけど『千年に一度』程度では足りない。あなたは永遠に語り継がれる、無二の英雄になる必要がある」
line = "「だけど『千年に一度』程度では足りない。あなたは永遠に語り継がれる、無二の英雄になる必要がある」"

[[dialogue]]
speaker = "管理システム"
# 「私たちを受け入れなさい、ウィステリア。そうすれば、あなたはもっと強くなれる。そしてリクリエを滅ぼす『英雄』になるの」
line = "「私たちを受け入れなさい、ウィステリア。そうすれば、あなたはもっと強くなれる。そしてリクリエを滅ぼす『英雄』になるの」"

[[dialogue]]
speaker = "ウィステリア"
# 「強さなんて求めてないって何度も言ってるでしょ！　永遠に語り継がれるとか死んでもごめんだわ！」
line = "「強さなんて求めてないって何度も言ってるでしょ！　永遠に語り継がれるとか死んでもごめんだわ！」"

[[dialogue]]
speaker = "ウィステリア"
# 「というか、この魔導書一冊だけでも何度も死にかけたのに、こんなもの１人で受け入れたら廃人まっしぐらじゃない！　イヤよ、絶対！」
line = "「というか、この魔導書一冊だけでも何度も死にかけたのに、こんなもの１人で受け入れたら廃人まっしぐらじゃない！　イヤよ、絶対！」"

[[dialogue]]
speaker = "管理システム"
# 「そうね。呪いを受け入れれば、あなたはリクリエと戦うだけの存在になる。だけどあなた１人の犠牲で済むなら安いものでしょう？」
line = "「そうね。呪いを受け入れれば、あなたはリクリエと戦うだけの存在になる。だけどあなた１人の犠牲で済むなら安いものでしょう？」"

[[dialogue]]
speaker = "管理システム"
# 「私たちを拒絶しようとしても無駄。力ずくでも受け入れてもらうわ」
line = "「私たちを拒絶しようとしても無駄。力ずくでも受け入れてもらうわ」"

[[dialogue]]
speaker = "ヴィライア"
# 『あなたが挑むのは、世界を滅ぼした厄災そのもの。果たして、どこまで抗えるかしら？』
line = "『あなたが挑むのは、世界を滅ぼした厄災そのもの。果たして、どこまで抗えるかしら？』"

[[dialogue]]
speaker = "ウィステリア"
# 「！　煌竜ヴィライア……まったく、私ってば本当に運が悪いわ」
line = "「！　煌竜ヴィライア……まったく、私ってば本当に運が悪いわ」"

[[dialogue]]
speaker = "ウィステリア"
# 「ああもう、どうせやるしかないんでしょ！　こうなったらやってやるわ！」
line = "「ああもう、どうせやるしかないんでしょ！　こうなったらやってやるわ！」"
