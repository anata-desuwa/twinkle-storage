[[dialogue]]
speaker = "unk"
# 冬のある夜のこと。新星学園の学生寮『ラルーナ』の寮長、<ruby=きりゅういん>妃竜院</ruby>マハムートは、日課である消灯後の巡回を行っていた。
line = "冬のある夜のこと。新星学園の学生寮『ラルーナ』の寮長、<ruby>妃竜院<rt>きりゅういん</rt></ruby>マハムートは、日課である消灯後の巡回を行っていた。"

[[dialogue]]
speaker = "マハムート"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "マハムート"
