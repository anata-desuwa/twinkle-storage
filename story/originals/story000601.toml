# 「床板が軋むのは、気を付けないといけないわね」
line = "「床板が軋むのは、気を付けないといけないわね」"

[[dialogue]]
speaker = "ヨミ"
# 「というかマム、戦闘服なんですけどっ？　不審者見つけたら、あの鉄球で制裁する気満々じゃないですかっ」
line = "「というかマム、戦闘服なんですけどっ？　不審者見つけたら、あの鉄球で制裁する気満々じゃないですかっ」"

[[dialogue]]
speaker = "unk"
# 鎖の音が怖い……
line = "鎖の音が怖い……"

[[dialogue]]
speaker = "紅明"
# 「気を取り直して、サンタ大作戦を続行するぜ☆」
line = "「気を取り直して、サンタ大作戦を続行するぜ☆」"

[[dialogue]]
speaker = "ヨミ"
