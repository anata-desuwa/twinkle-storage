[[dialogue]]
speaker = "unk"
# 公安委員会の作戦に協力し、リゾート結界に出入りするようになってから１週間が経った。
line = "公安委員会の作戦に協力し、リゾート結界に出入りするようになってから１週間が経った。"

[[dialogue]]
speaker = "リノ"
# 「ふぅ……♪」
line = "「ふぅ……♪」"

[[dialogue]]
speaker = "unk"
# 海で泳いでいたリノが上がり、ビーチを歩いていると、水の滴る美しい容姿とスタイルで、大胆な水着を堂々と着るその姿が周囲の視線を惹きつける。
line = "海で泳いでいたリノが上がり、ビーチを歩いていると、水の滴る美しい容姿とスタイルで、大胆な水着を堂々と着るその姿が周囲の視線を惹きつける。"

[[dialogue]]
speaker = "unk"
# そんな彼女を若い男たちが放っておくわけもなく――
line = "そんな彼女を若い男たちが放っておくわけもなく――"

[[dialogue]]
speaker = "チャラ男Ａ"
# 「ねぇねぇ、お姉さ～ん」
line = "「ねぇねぇ、お姉さ～ん」"

[[dialogue]]
speaker = "チャラ男Ｂ"
# 「俺らと一緒に遊ばな～い？」
line = "「俺らと一緒に遊ばな～い？」"

[[dialogue]]
speaker = "リノ"
# 「あら、私に声を掛けてくれるの？　ふふっ♪」
line = "「あら、私に声を掛けてくれるの？　ふふっ♪」"

[[dialogue]]
speaker = "リノ"
# 「でも、ごめんなさい。私には、世界一可愛い息子がいるから」
line = "「でも、ごめんなさい。私には、世界一可愛い息子がいるから」"

[[dialogue]]
speaker = "チャラ男Ａ"
# 「え！？　息子！？」
line = "「え！？　息子！？」"

[[dialogue]]
speaker = "unk"
# 母さん、お待たせ
line = "母さん、お待たせ"

[[dialogue]]
speaker = "リノ"
# 「あっ、お茶持って来てくれて、ありがと～♪」
line = "「あっ、お茶持って来てくれて、ありがと～♪」"

[[dialogue]]
speaker = "リノ"
# 「というわけでお兄さんたち、ごめんなさいね～。それじゃあクロト、行きましょ♪」
line = "「というわけでお兄さんたち、ごめんなさいね～。それじゃあクロト、行きましょ♪」"

[[dialogue]]
speaker = "unk"
# リノはわざとらしくクロトの腕に抱き着き、にこやかに手を振りながら、その場を去って行く。
line = "リノはわざとらしくクロトの腕に抱き着き、にこやかに手を振りながら、その場を去って行く。"

[[dialogue]]
speaker = "チャラ男Ｂ"
# 「い、今のお姉さん、マジで母親なの……？」
line = "「い、今のお姉さん、マジで母親なの……？」"

[[dialogue]]
speaker = "チャラ男Ａ"
# 「若過ぎんだろ……」
line = "「若過ぎんだろ……」"

[[dialogue]]
speaker = "チャラ男Ｂ"
# 「というか美人過ぎて、息子になりたい……」
line = "「というか美人過ぎて、息子になりたい……」"

[[dialogue]]
speaker = "unk"
# ナンパしに来たお兄さん方を撃退し、彼らが見えなくなるまで母さんと腕を組んだまま歩いていると――
line = "ナンパしに来たお兄さん方を撃退し、彼らが見えなくなるまで母さんと腕を組んだまま歩いていると――"

[[dialogue]]
speaker = "リノ"
# 「ねぇ、クロト。今日って、リコとマインちゃんが少し遅れて来るって連絡あったじゃない？」
line = "「ねぇ、クロト。今日って、リコとマインちゃんが少し遅れて来るって連絡あったじゃない？」"

[[dialogue]]
speaker = "リノ"
# 「それでなんだけど、せっかく親子一緒に遊べる機会なんだし、たまにはお母さんのことも構って欲しいわ♪」
line = "「それでなんだけど、せっかく親子一緒に遊べる機会なんだし、たまにはお母さんのことも構って欲しいわ♪」"

[[dialogue]]
speaker = "unk"
# 確かに、新星学園に通うようになってから、星徒会の業務があり、他の人たちとの関わりも増えて、母さんと過ごす時間が減ってしまっていたことは否めない。
line = "確かに、新星学園に通うようになってから、星徒会の業務があり、他の人たちとの関わりも増えて、母さんと過ごす時間が減ってしまっていたことは否めない。"

[[dialogue]]
speaker = "リノ"
# 「あっ、別に責めているわけじゃないのよ？　クロトが星徒会長として頑張っていることは知っているし、周りから頼られているのは、お母さんとして誇らしいわ」
line = "「あっ、別に責めているわけじゃないのよ？　クロトが星徒会長として頑張っていることは知っているし、周りから頼られているのは、お母さんとして誇らしいわ」"

[[dialogue]]
speaker = "リノ"
# 「ただ、クロトが忙しくしている分、ちょっぴり寂しさもあって」
line = "「ただ、クロトが忙しくしている分、ちょっぴり寂しさもあって」"

[[dialogue]]
speaker = "リノ"
# 「だから、たまにはお母さんとも遊んで欲しいな～って。ダメ？」
line = "「だから、たまにはお母さんとも遊んで欲しいな～って。ダメ？」"

[[dialogue]]
speaker = "unk"
# もちろんいいよ
line = "もちろんいいよ"

[[dialogue]]
speaker = "リノ"
# 「ふふっ、ありがとう♪　じゃあ、ちょっとお母さんと、そこまでデートしましょうか♪」
line = "「ふふっ、ありがとう♪　じゃあ、ちょっとお母さんと、そこまでデートしましょうか♪」"

[[dialogue]]
speaker = "unk"
# そうして母さんに連れられて行った場所は、リゾート結界の奥にある森林エリアだった。
line = "そうして母さんに連れられて行った場所は、リゾート結界の奥にある森林エリアだった。"

[[dialogue]]
speaker = "リノ"
# 「見て見て、クロト。ここに生えてる果物の木」
line = "「見て見て、クロト。ここに生えてる果物の木」"

[[dialogue]]
speaker = "リノ"
# 「実はリップルちゃんに協力してもらって、常夏の気候だからこそできる果物を作らせてもらっているのよ♪」
line = "「実はリップルちゃんに協力してもらって、常夏の気候だからこそできる果物を作らせてもらっているのよ♪」"

[[dialogue]]
speaker = "リノ"
# 「リップルちゃんの能力を使えば、あっという間に成長させることもできるしね。おかげで品種改良が捗って、楽しくて楽しくて……ふふふ♪」
line = "「リップルちゃんの能力を使えば、あっという間に成長させることもできるしね。おかげで品種改良が捗って、楽しくて楽しくて……ふふふ♪」"

[[dialogue]]
speaker = "unk"
# 母さんは趣味の１つは『家庭菜園』で、家のベランダでも野菜を育てたりしている。
line = "母さんは趣味の１つは『家庭菜園』で、家のベランダでも野菜を育てたりしている。"

[[dialogue]]
speaker = "リノ"
# 「それでね、こっちがアップルバナナで、こっちがドラゴンフルーツ。あとはパイナップルに、ランブータンね」
line = "「それでね、こっちがアップルバナナで、こっちがドラゴンフルーツ。あとはパイナップルに、ランブータンね」"

[[dialogue]]
speaker = "リノ"
# 「これらをクロトに食べさせたかったのよ。アップルバナナとか、ランブータンは食べたことないでしょ？」
line = "「これらをクロトに食べさせたかったのよ。アップルバナナとか、ランブータンは食べたことないでしょ？」"

[[dialogue]]
speaker = "リノ"
# 「ちょっと待っててね。取って来て、準備するから」
line = "「ちょっと待っててね。取って来て、準備するから」"

[[dialogue]]
speaker = "unk"
# それから果物を収穫して来た母さんは、空間魔法で器用に皮を取って――
line = "それから果物を収穫して来た母さんは、空間魔法で器用に皮を取って――"

[[dialogue]]
speaker = "リノ"
# 「はい、それじゃあクロト、あ～ん♪」
line = "「はい、それじゃあクロト、あ～ん♪」"

[[dialogue]]
speaker = "unk"
# 指で口まで運んで、食べさせてくれる。
line = "指で口まで運んで、食べさせてくれる。"

[[dialogue]]
speaker = "リノ"
# 「どう？　お母さんの作った果物、美味しい？」
line = "「どう？　お母さんの作った果物、美味しい？」"

[[dialogue]]
speaker = "unk"
# 甘くて、うまいっ！
line = "甘くて、うまいっ！"

[[dialogue]]
speaker = "リノ"
# 「ふふふっ、嬉しい♪　甘いだけじゃなくて、ちゃんと栄養価も満点なのよ～？」
line = "「ふふふっ、嬉しい♪　甘いだけじゃなくて、ちゃんと栄養価も満点なのよ～？」"

[[dialogue]]
speaker = "リノ"
# 「もっと食べる？　はい、あ～ん♪」
line = "「もっと食べる？　はい、あ～ん♪」"

[[dialogue]]
speaker = "リノ"
# 「――あっ、頬っぺたにドラゴンフルーツの種が付いているわよ？」
line = "「――あっ、頬っぺたにドラゴンフルーツの種が付いているわよ？」"

[[dialogue]]
speaker = "リノ"
# 「ほら、取れた♪」
line = "「ほら、取れた♪」"

[[dialogue]]
speaker = "unk"
# 母さんはそれを自分の口に運んで――
line = "母さんはそれを自分の口に運んで――"

[[dialogue]]
speaker = "リノ"
# 「あむっ♪　ふふふ、甘～い♪」
line = "「あむっ♪　ふふふ、甘～い♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「わお<emoji=heart04>　リノさんってば、だいた～ん☆　まるで恋人みた～い♪」
line = "「わお<emoji=heart04>　リノさんってば、だいた～ん☆　まるで恋人みた～い♪」"

[[dialogue]]
speaker = "リコリンフィア"
# 「果物よりも甘々だな。これは……」
line = "「果物よりも甘々だな。これは……」"

[[dialogue]]
speaker = "リノ"
# 「２人とも、やっと出て来たわね。木の影に隠れて見てないで、さっさと声を掛けてくれればよかったのに～」
line = "「２人とも、やっと出て来たわね。木の影に隠れて見てないで、さっさと声を掛けてくれればよかったのに～」"

[[dialogue]]
speaker = "リコリンフィア"
# 「気づいていたなら、少しは自重しろ」
line = "「気づいていたなら、少しは自重しろ」"

[[dialogue]]
speaker = "リノ"
# 「あら、どうして？　親子ならこれくらい愛情表現したって、別に恥ずかしくはないでしょ？」
line = "「あら、どうして？　親子ならこれくらい愛情表現したって、別に恥ずかしくはないでしょ？」"

[[dialogue]]
speaker = "リコリンフィア"
# 「前から知っていたが、お前の親子感はおかしい」
line = "「前から知っていたが、お前の親子感はおかしい」"

[[dialogue]]
speaker = "リノ"
# 「そう？」
line = "「そう？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「きゃはははっ♪　親子であ～んは、なかなかしないですよね～☆」
line = "「きゃはははっ♪　親子であ～んは、なかなかしないですよね～☆」"

[[dialogue]]
speaker = "unk"
# ええぇっ！？　そうなの？
line = "ええぇっ！？　そうなの？"

[[dialogue]]
speaker = "リコリンフィア"
# 「少年、リノにだいぶ毒されているな……」
line = "「少年、リノにだいぶ毒されているな……」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「リノさんの見た目がすごく若くて美人なので、周りに見られたら、絶対カップルだと勘違いされちゃいますよね～」
line = "「リノさんの見た目がすごく若くて美人なので、周りに見られたら、絶対カップルだと勘違いされちゃいますよね～」"

[[dialogue]]
speaker = "リノ"
# 「ふふふっ、息子とまるで恋人みたいだなんて、お母さん、なんだか照れちゃうわ～<emoji=heart04>」
line = "「ふふふっ、息子とまるで恋人みたいだなんて、お母さん、なんだか照れちゃうわ～<emoji=heart04>」"

[[dialogue]]
speaker = "リコリンフィア"
# 「なんで嬉しそうなんだ、お前は」
line = "「なんで嬉しそうなんだ、お前は」"

[[dialogue]]
speaker = "unk"
# き、気を付けよう……
line = "き、気を付けよう……"

[[dialogue]]
speaker = "unk"
# 俺は指摘されてちょっと恥ずかしくなり、頬が熱くなってしまうのだった。
line = "俺は指摘されてちょっと恥ずかしくなり、頬が熱くなってしまうのだった。"

[[dialogue]]
speaker = "unk"
# 同時刻。
line = "同時刻。"

[[dialogue]]
speaker = "unk"
# 犯罪組織『ユゴス』の渋谷拠点にて。
line = "犯罪組織『ユゴス』の渋谷拠点にて。"

[[dialogue]]
speaker = "部下の怪人"
# 「――ヤハト様、準備が整いました」
line = "「――ヤハト様、準備が整いました」"

[[dialogue]]
speaker = "部下の怪人"
# 「ミュータント総勢<b>１０８体</b>、集結完了です」
line = "「ミュータント総勢<b>１０８体</b>、集結完了です」"

[[dialogue]]
speaker = "ヤハト"
# 「よし、まもなく時間だ。では――」
line = "「よし、まもなく時間だ。では――」"

[[dialogue]]
speaker = "ヤハト"
# 「これより、リゾート結界を襲撃する！」
line = "「これより、リゾート結界を襲撃する！」"

[[dialogue]]
speaker = "部下の怪人達"
# 「我らがユゴスの意思のままに！！」
line = "「我らがユゴスの意思のままに！！」"

[[dialogue]]
speaker = "ヤハト"
# 「魔力解放――空間転移！」
line = "「魔力解放――空間転移！」"

[[dialogue]]
speaker = "unk"
# ミュータントの軍勢の姿が一瞬で拠点から消え去る。
line = "ミュータントの軍勢の姿が一瞬で拠点から消え去る。"

[[dialogue]]
speaker = "unk"
# リゾート結界に『嵐』が訪れようとしていた――
line = "リゾート結界に『嵐』が訪れようとしていた――"
