[[dialogue]]
speaker = "unk"
# 第２話,焔に身を任せ,P
line = "第２話,焔に身を任せ,P"

[[dialogue]]
speaker = "アポロ"
# 「──つーわけで、クマロボ探しにここまで来たわけだが……」
line = "「──つーわけで、クマロボ探しにここまで来たわけだが……」"

[[dialogue]]
speaker = "アポロ"
# 「もういない。くそ、逃げられたか」
line = "「もういない。くそ、逃げられたか」"

[[dialogue]]
speaker = "アポロ"
# 「一応、フィオナ達にも連絡しておかないとな。クマロボが新星でも出没したら大変だ」
line = "「一応、フィオナ達にも連絡しておかないとな。クマロボが新星でも出没したら大変だ」"

[[dialogue]]
speaker = "アポロ"
# 「この戦闘服はもう十分に披露してやったし、元の『流星ライダー』フォームもあたしにとっちゃ大事なもんだからな──そろそろ元に戻らないと」
line = "「この戦闘服はもう十分に披露してやったし、元の『流星ライダー』フォームもあたしにとっちゃ大事なもんだからな──そろそろ元に戻らないと」"

[[dialogue]]
speaker = "アポロ"
# 「鍵はあのクマどもが握ってるはずだ。魔王も一緒にその方法を探してもらうぜ！」
line = "「鍵はあのクマどもが握ってるはずだ。魔王も一緒にその方法を探してもらうぜ！」"

[[dialogue]]
speaker = "unk"
# 元に戻りたいんだね
line = "元に戻りたいんだね"

[[dialogue]]
speaker = "unk"
# その服ともさよならだ
line = "その服ともさよならだ"

[[dialogue]]
speaker = "アポロ"
# 「………………いや。このフォームもこのフォームで欲しい」
line = "「………………いや。このフォームもこのフォームで欲しい」"

[[dialogue]]
speaker = "unk"
# 贅沢だなあ
line = "贅沢だなあ"

[[dialogue]]
speaker = "unk"
# わがままだなあ
line = "わがままだなあ"

[[dialogue]]
speaker = "アポロ"
# 「い、いいだろ別に！　気に入っちゃったんだから！　敵からもらったもんだろうがなんだろうが、一度手に入れたからにはあたしのもんだ！」
line = "「い、いいだろ別に！　気に入っちゃったんだから！　敵からもらったもんだろうがなんだろうが、一度手に入れたからにはあたしのもんだ！」"

[[dialogue]]
speaker = "アポロ"
# 「とりあえずクマロボを見つけて退治しようぜ。何がどーなってるのか聞き出してやるぜ」
line = "「とりあえずクマロボを見つけて退治しようぜ。何がどーなってるのか聞き出してやるぜ」"

[[dialogue]]
speaker = "クマロボ"
# 「クマァーーーーーーーーーー！！！！！！」
line = "「クマァーーーーーーーーーー！！！！！！」"

[[dialogue]]
speaker = "アポロ"
# 「っと……話してたら出やがったな。よし、燃やし尽くすぞ魔王！」
line = "「っと……話してたら出やがったな。よし、燃やし尽くすぞ魔王！」"

[[dialogue]]
speaker = "unk"
# そうして、街中に湧くクマロボを退治していった俺たちだが……。
line = "そうして、街中に湧くクマロボを退治していった俺たちだが……。"

[[dialogue]]
speaker = "アポロ"
# 「うーん……いくらクマロボを倒しても手応えないな」
line = "「うーん……いくらクマロボを倒しても手応えないな」"

[[dialogue]]
speaker = "アポロ"
# 「しかもこいつら、クマァーーー！！　しか喋らないから何の情報も吐いてくれないぞ……」
line = "「しかもこいつら、クマァーーー！！　しか喋らないから何の情報も吐いてくれないぞ……」"

[[dialogue]]
speaker = "アポロ"
# 「やっぱり元凶をどうにかしないとダメか……。これも全部あの黒ベア子ってやつの仕業だもんな」
line = "「やっぱり元凶をどうにかしないとダメか……。これも全部あの黒ベア子ってやつの仕業だもんな」"

[[dialogue]]
speaker = "アポロ"
# 「ただ、黒ベア子の行方については、うちに置いてるプトラに聞いてもわからないっていうんだよな。参ったぜ……」
line = "「ただ、黒ベア子の行方については、うちに置いてるプトラに聞いてもわからないっていうんだよな。参ったぜ……」"

[[dialogue]]
speaker = "？？？"
# 「フフ──お困りかな？　若人たち」
line = "「フフ──お困りかな？　若人たち」"

[[dialogue]]
speaker = "アポロ"
# 「！？　この声は──」
line = "「！？　この声は──」"

[[dialogue]]
speaker = "ラティエ"
# 「やあ。学園外で会うとは奇遇だな」
line = "「やあ。学園外で会うとは奇遇だな」"

[[dialogue]]
speaker = "unk"
# （学園内で会う方が珍しいような……）
line = "（学園内で会う方が珍しいような……）"

[[dialogue]]
speaker = "アポロ"
# 「おお、基本学園にいない学園長じゃんか！　相変わらずマント姿がキマってるな！」
line = "「おお、基本学園にいない学園長じゃんか！　相変わらずマント姿がキマってるな！」"

[[dialogue]]
speaker = "ラティエ"
# 「む？　アポロ嬢──そういう君は、随分とイメージチェンジしたようだな」
line = "「む？　アポロ嬢──そういう君は、随分とイメージチェンジしたようだな」"

[[dialogue]]
speaker = "アポロ"
# 「ああ……そのつもりはなかったんだけど、勝手によ」
line = "「ああ……そのつもりはなかったんだけど、勝手によ」"

[[dialogue]]
speaker = "アポロ"
# 「そうだ！　三界のあちこちを巡ってる学園長なら、このフォームとかクマロボ達の秘密だって知ってるんじゃないか？」
line = "「そうだ！　三界のあちこちを巡ってる学園長なら、このフォームとかクマロボ達の秘密だって知ってるんじゃないか？」"

[[dialogue]]
speaker = "ラティエ"
# 「ふむ──最近、各地から報告が上がっている不可解現象か」
line = "「ふむ──最近、各地から報告が上がっている不可解現象か」"

[[dialogue]]
speaker = "ラティエ"
# 「その格好にも関連しているようだな。聞こう」
line = "「その格好にも関連しているようだな。聞こう」"

[[dialogue]]
speaker = "unk"
# 黒ベア子が……
line = "黒ベア子が……"

[[dialogue]]
speaker = "unk"
# クマロボが……
line = "クマロボが……"

[[dialogue]]
speaker = "ラティエ"
# 「ふーむ……なるほどな。もっと楽しく皆を巻き込むお祭り、か」
line = "「ふーむ……なるほどな。もっと楽しく皆を巻き込むお祭り、か」"

[[dialogue]]
speaker = "ラティエ"
# 「しかし、すまない。生憎そのような事象は──三界のどこでも聞いたことがないな」
line = "「しかし、すまない。生憎そのような事象は──三界のどこでも聞いたことがないな」"

[[dialogue]]
speaker = "アポロ"
# 「う……学園長でもそうか」
line = "「う……学園長でもそうか」"

[[dialogue]]
speaker = "ラティエ"
# 「だが……今の君からは普段にない息吹を感じる。まるでアーティストのようなそれを」
line = "「だが……今の君からは普段にない息吹を感じる。まるでアーティストのようなそれを」"

[[dialogue]]
speaker = "アポロ"
# 「！　わかるのか……あたしの芸術の炎が！」
line = "「！　わかるのか……あたしの芸術の炎が！」"

[[dialogue]]
speaker = "ラティエ"
# 「無論。せっかくならその<ruby=ほむら>焔</ruby>に身を任せてみるのもよいのではないかな？」
line = "「無論。せっかくならその<ruby>焔<rt>ほむら</rt></ruby>に身を任せてみるのもよいのではないかな？」"

[[dialogue]]
speaker = "アポロ"
# 「なるほどだ。確かにな……このフォームならではの必殺技だって開発できるかもしれない」
line = "「なるほどだ。確かにな……このフォームならではの必殺技だって開発できるかもしれない」"

[[dialogue]]
speaker = "アポロ"
# 「ありがとな、学園長！　あたし、なんか見えてきた気がするぜ！」
line = "「ありがとな、学園長！　あたし、なんか見えてきた気がするぜ！」"

[[dialogue]]
speaker = "ラティエ"
# 「フ。礼には及ばんさ」
line = "「フ。礼には及ばんさ」"

[[dialogue]]
speaker = "unk"
# そうして学園長に焚きつけられたアポロ。
line = "そうして学園長に焚きつけられたアポロ。"

[[dialogue]]
speaker = "unk"
# この時の俺は、次に彼女がどんな行動に及ぶのか、まだわかっていなかった……。
line = "この時の俺は、次に彼女がどんな行動に及ぶのか、まだわかっていなかった……。"
