[[dialogue]]
speaker = "unk"
# リゾート結界に閉じ込められてしまった俺達は、リップルから改めて話を聞くことにした。
line = "リゾート結界に閉じ込められてしまった俺達は、リップルから改めて話を聞くことにした。"

[[dialogue]]
speaker = "ヴィーナス"
# 「それじゃあ、結界から脱出できるようにする為にも、リップルのことを詳しく教えて貰えないかしら？」
line = "「それじゃあ、結界から脱出できるようにする為にも、リップルのことを詳しく教えて貰えないかしら？」"

[[dialogue]]
speaker = "フィオナ"
# 「星力や星術のことも今まで知らなかったようですし……リップルさんは、結界について、目覚めた時から使えた力だって仰っていましたよね？」
line = "「星力や星術のことも今まで知らなかったようですし……リップルさんは、結界について、目覚めた時から使えた力だって仰っていましたよね？」"

[[dialogue]]
speaker = "マトイ"
# 「そういえば、確かに。『目覚めた』っていうのは、一体どういう意味なの？」
line = "「そういえば、確かに。『目覚めた』っていうのは、一体どういう意味なの？」"

[[dialogue]]
speaker = "リップル"
# 「う～ん、あのデスね。実はワタシが目覚めたのは、人間界で、１年ちょっと前くらいのハナシなんです。それまではずっと、結界の中でネムっていました」
line = "「う～ん、あのデスね。実はワタシが目覚めたのは、人間界で、１年ちょっと前くらいのハナシなんです。それまではずっと、結界の中でネムっていました」"

[[dialogue]]
speaker = "アナ"
# 「眠っていた……とは？」
line = "「眠っていた……とは？」"

[[dialogue]]
speaker = "リップル"
# 「え～と、上手く伝わるか分からないデスけど、結界の中で封印サレていた、というカンジです」
line = "「え～と、上手く伝わるか分からないデスけど、結界の中で封印サレていた、というカンジです」"

[[dialogue]]
speaker = "リップル"
# 「一緒に眠っていたお母さんが、夢の中で、大昔に自分の体ごと結界で包んで、封印したんだって言っていたのをオボえてます」
line = "「一緒に眠っていたお母さんが、夢の中で、大昔に自分の体ごと結界で包んで、封印したんだって言っていたのをオボえてます」"

[[dialogue]]
speaker = "リップル"
# 「お母さんは結界の中で先に寿命を迎えてシマいましたが、それと同時にワタシは封印がトケて、目覚めたというワケです」
line = "「お母さんは結界の中で先に寿命を迎えてシマいましたが、それと同時にワタシは封印がトケて、目覚めたというワケです」"

[[dialogue]]
speaker = "unk"
# そうか……お母さんが……
line = "そうか……お母さんが……"

[[dialogue]]
speaker = "リップル"
# 「あっ、その時は悲しかったけど、今はもうダイジョウブですよ？　シショ―やオクサンと出会って、家族みたいに優しくしてモラいましたから！」
line = "「あっ、その時は悲しかったけど、今はもうダイジョウブですよ？　シショ―やオクサンと出会って、家族みたいに優しくしてモラいましたから！」"

[[dialogue]]
speaker = "リップル"
# 「シショ―とオクサンの夫婦は、夏に海の家を経営してて、去年はそこでお世話にナリました。そこで、ワタシは夏の海のミリョクを知ったのです！」
line = "「シショ―とオクサンの夫婦は、夏に海の家を経営してて、去年はそこでお世話にナリました。そこで、ワタシは夏の海のミリョクを知ったのです！」"

[[dialogue]]
speaker = "リップル"
# 「夏の海はＢＩＧスバラしいです！　ひとりぼっちで悲しい気持ちだったワタシを、楽しくて明るい気持ちでイッパイにシテくれました！」
line = "「夏の海はＢＩＧスバラしいです！　ひとりぼっちで悲しい気持ちだったワタシを、楽しくて明るい気持ちでイッパイにシテくれました！」"

[[dialogue]]
speaker = "リップル"
# 「しかし、日本には季節の移り変わりというものがアリます。夏はあっという間に終わってしまい、ワタシは残念な気持ちにナリました」
line = "「しかし、日本には季節の移り変わりというものがアリます。夏はあっという間に終わってしまい、ワタシは残念な気持ちにナリました」"

[[dialogue]]
speaker = "リップル"
# 「そこでワタシは、オモい付いたのです。ワタシの結界なら、いつでもトコナツの海を楽しめる空間が作れるのではナイかと！」
line = "「そこでワタシは、オモい付いたのです。ワタシの結界なら、いつでもトコナツの海を楽しめる空間が作れるのではナイかと！」"

[[dialogue]]
speaker = "サーシャ"
# 「それでこのリゾート結界を作ったのね～」
line = "「それでこのリゾート結界を作ったのね～」"

[[dialogue]]
speaker = "リップル"
# 「ハイ！　１ヶ月ほど前にワタシは、お世話になっていたシショ―達のところをハナれ、リゾート結界のベースとなる素敵な場所をサガす為、タビに出たのです！」
line = "「ハイ！　１ヶ月ほど前にワタシは、お世話になっていたシショ―達のところをハナれ、リゾート結界のベースとなる素敵な場所をサガす為、タビに出たのです！」"

[[dialogue]]
speaker = "リップル"
# 「ソウして見つけたのが、カイチョー達がやって来た無人島だったというワケです。ここは小さいながら、夏の魅力を詰め込んだ島だと感じマシタので！」
line = "「ソウして見つけたのが、カイチョー達がやって来た無人島だったというワケです。ここは小さいながら、夏の魅力を詰め込んだ島だと感じマシタので！」"

[[dialogue]]
speaker = "サーシャ"
# 「分かるかも～。この無人島、無性に探検してみたくてワクワクするもの♪」
line = "「分かるかも～。この無人島、無性に探検してみたくてワクワクするもの♪」"

[[dialogue]]
speaker = "リップル"
# 「でも、この島が誰かの所有物ダッタなんて、全然気付きマセンでした……」
line = "「でも、この島が誰かの所有物ダッタなんて、全然気付きマセンでした……」"

[[dialogue]]
speaker = "リップル"
# 「勝手に居座ってしまって、そのせいで結界の中に巻き込んでしまって、ゴメンナサイです、ヴィーナス」
line = "「勝手に居座ってしまって、そのせいで結界の中に巻き込んでしまって、ゴメンナサイです、ヴィーナス」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ああ、いいのいいの。リップルに悪気があったわけじゃないんだし、九浄家の看板を立ててたわけじゃないしね」
line = "「ああ、いいのいいの。リップルに悪気があったわけじゃないんだし、九浄家の看板を立ててたわけじゃないしね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「こうしてリップルと出会ったのも何かの縁だと思うわ。元々ここに来ている全員、１週間合宿に出かけて来ると伝えてあるし――」
line = "「こうしてリップルと出会ったのも何かの縁だと思うわ。元々ここに来ている全員、１週間合宿に出かけて来ると伝えてあるし――」"

[[dialogue]]
speaker = "ヴィーナス"
# 「せっかくだから、この結界の中でサバイバル強化合宿をすればいいわね！　その間にリップルのスランプ解決も出来れば……」
line = "「せっかくだから、この結界の中でサバイバル強化合宿をすればいいわね！　その間にリップルのスランプ解決も出来れば……」"

[[dialogue]]
speaker = "アナ"
# 「ノープロブレム」
line = "「ノープロブレム」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そういうことよ！」
line = "「そういうことよ！」"

[[dialogue]]
speaker = "unk"
# むしろサバイバルが楽になったかな？
line = "むしろサバイバルが楽になったかな？"

[[dialogue]]
speaker = "フィオナ"
# 「言われてみればそうですね。リップルさん、この海の家に食料はあるのでしょうか？」
line = "「言われてみればそうですね。リップルさん、この海の家に食料はあるのでしょうか？」"

[[dialogue]]
speaker = "リップル"
# 「いっぱいアリますよ～♪　ワタシの結界は、食べ物もツクれますので！」
line = "「いっぱいアリますよ～♪　ワタシの結界は、食べ物もツクれますので！」"

[[dialogue]]
speaker = "マトイ"
# 「えっ、本当に！？　内心不安だったけど、ここが楽園に思えて来たかも……！」
line = "「えっ、本当に！？　内心不安だったけど、ここが楽園に思えて来たかも……！」"

[[dialogue]]
speaker = "サーシャ"
# 「うふふっ♪　海も綺麗だし、こんなところを独占できるなんて、まさにリゾートね～♪」
line = "「うふふっ♪　海も綺麗だし、こんなところを独占できるなんて、まさにリゾートね～♪」"

[[dialogue]]
speaker = "unk"
# そういうわけで、皆でスランプ解決を手伝うよ
line = "そういうわけで、皆でスランプ解決を手伝うよ"

[[dialogue]]
speaker = "リップル"
# 「アリガトございます！　ＢＩＧ感謝です！」
line = "「アリガトございます！　ＢＩＧ感謝です！」"

[[dialogue]]
speaker = "アナ"
# 「あの、ところで皆さん。私から１つ確認したいことがあるのですが……」
line = "「あの、ところで皆さん。私から１つ確認したいことがあるのですが……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「どうしたの、アナ？」
line = "「どうしたの、アナ？」"

[[dialogue]]
speaker = "アナ"
# 「さっきから違和感があって気付いたんですが、この結界内、星力が使えなくないですか？」
line = "「さっきから違和感があって気付いたんですが、この結界内、星力が使えなくないですか？」"

[[dialogue]]
speaker = "マトイ"
# 「え……？　あっ！？　本当だ……変身出来ない！？」
line = "「え……？　あっ！？　本当だ……変身出来ない！？」"

[[dialogue]]
speaker = "フィオナ"
# 「！　それどころか、守護星との繋がりが感じられません。もしかして、この結界って……」
line = "「！　それどころか、守護星との繋がりが感じられません。もしかして、この結界って……」"

[[dialogue]]
speaker = "アナ"
# 「考えられるのは、結界で守護星とのリンクが遮断されている、とか……」
line = "「考えられるのは、結界で守護星とのリンクが遮断されている、とか……」"

[[dialogue]]
speaker = "サーシャ"
# 「あら～。それはちょっと不便かもしれないわね……」
line = "「あら～。それはちょっと不便かもしれないわね……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「なんてことなの……！　これじゃあ……強化合宿なのに、訓練が出来ないじゃない！」
line = "「なんてことなの……！　これじゃあ……強化合宿なのに、訓練が出来ないじゃない！」"

[[dialogue]]
speaker = "マトイ"
# 「心配するとこ、そこ？」
line = "「心配するとこ、そこ？」"

[[dialogue]]
speaker = "リップル"
# 「シュゴセイ？　それって何です？」
line = "「シュゴセイ？　それって何です？」"

[[dialogue]]
speaker = "フィオナ"
# 「そうでした。リップルさんは星力自体知らなかったんですよね」
line = "「そうでした。リップルさんは星力自体知らなかったんですよね」"

[[dialogue]]
speaker = "unk"
# 説明すると、守護星っていうのは――
line = "説明すると、守護星っていうのは――"

[[dialogue]]
speaker = "リップル"
# 「――ふむふむ、なるほど！　結界を使う時に力を貸してくれている星があるのはカンジていましたが、それがワタシのシュゴセイだったのデスね！」
line = "「――ふむふむ、なるほど！　結界を使う時に力を貸してくれている星があるのはカンジていましたが、それがワタシのシュゴセイだったのデスね！」"

[[dialogue]]
speaker = "リップル"
# 「そういうことなら、ワタシ思い付きました！　結界の空にも同じ名前の星を作ればイイのです！」
line = "「そういうことなら、ワタシ思い付きました！　結界の空にも同じ名前の星を作ればイイのです！」"

[[dialogue]]
speaker = "マトイ"
# 「えっ、そんなこと出来るの！？」
line = "「えっ、そんなこと出来るの！？」"

[[dialogue]]
speaker = "リップル"
# 「デキます！　星の名前は皆さんからそれぞれ聞きましたから、後はそれを現実世界からコピーして、ペーストするダケです！」
line = "「デキます！　星の名前は皆さんからそれぞれ聞きましたから、後はそれを現実世界からコピーして、ペーストするダケです！」"

[[dialogue]]
speaker = "リップル"
# 「行きマスよ～。星空は後回しにしてましたケド、この機会にツクリま～す！」
line = "「行きマスよ～。星空は後回しにしてましたケド、この機会にツクリま～す！」"

[[dialogue]]
speaker = "リップル"
# 「オイデマセ、シュゴセイ！　ぬぅ～ん……ソォイッ！」
line = "「オイデマセ、シュゴセイ！　ぬぅ～ん……ソォイッ！」"

[[dialogue]]
speaker = "マトイ"
# 「きゃっ、何！？　何が起こってるの！？」
line = "「きゃっ、何！？　何が起こってるの！？」"

[[dialogue]]
speaker = "サーシャ"
# 「あら～♪」
line = "「あら～♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「またしても、何も見えないわ！」
line = "「またしても、何も見えないわ！」"

[[dialogue]]
speaker = "フィオナ"
# 「し、視界が晴れたと思ったら……周りの景色がいつの間にか夜に！？」
line = "「し、視界が晴れたと思ったら……周りの景色がいつの間にか夜に！？」"

[[dialogue]]
speaker = "リップル"
# 「ふぅ……星を作るのはカンリョウしました！　これでセイリョク、使うことがデキますか？」
line = "「ふぅ……星を作るのはカンリョウしました！　これでセイリョク、使うことがデキますか？」"

[[dialogue]]
speaker = "アナ"
# 「やってみます。守護星との接続……行けます！　でも、何でしょう？　普段と少し違う感じが……」
line = "「やってみます。守護星との接続……行けます！　でも、何でしょう？　普段と少し違う感じが……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「とりあえず皆、変身よ！　え～いっ！」
line = "「とりあえず皆、変身よ！　え～いっ！」"

[[dialogue]]
speaker = "マトイ"
# 「……よし、星力が使えるわ！　って皆、姿変わってなくない？」
line = "「……よし、星力が使えるわ！　って皆、姿変わってなくない？」"

[[dialogue]]
speaker = "アナ"
# 「いえ、違います。これは……！」
line = "「いえ、違います。これは……！」"

[[dialogue]]
speaker = "フィオナ"
# 「驚くべきことですが、どうやら私達、水着が戦闘服に変化しているみたいです……！」
line = "「驚くべきことですが、どうやら私達、水着が戦闘服に変化しているみたいです……！」"

[[dialogue]]
speaker = "サーシャ"
# 「もしかして、本来の守護星じゃなくて、リップルちゃんが作ったリゾート結界の星で変身したからかしら～？」
line = "「もしかして、本来の守護星じゃなくて、リップルちゃんが作ったリゾート結界の星で変身したからかしら～？」"

[[dialogue]]
speaker = "アナ"
# 「守護星との関係性の変化によって、星力の性質は変化することがあると、論文で見かけたことがあります。おそらくこの水着フォームは、そういうことかと」
line = "「守護星との関係性の変化によって、星力の性質は変化することがあると、論文で見かけたことがあります。おそらくこの水着フォームは、そういうことかと」"

[[dialogue]]
speaker = "ヴィーナス"
# 「凄いわ！　パワーアップする為に強化合宿に来たわけだけど、こんな形で新しい力を得ることになるなんて！」
line = "「凄いわ！　パワーアップする為に強化合宿に来たわけだけど、こんな形で新しい力を得ることになるなんて！」"

[[dialogue]]
speaker = "リップル"
# 「ワオ♪　これが皆さんのセイリョクなんですね！」
line = "「ワオ♪　これが皆さんのセイリョクなんですね！」"

[[dialogue]]
speaker = "リップル"
# 「ワタシも真似してやってみま～す♪　ソォイッ！」
line = "「ワタシも真似してやってみま～す♪　ソォイッ！」"

[[dialogue]]
speaker = "リップル"
# 「オウ♪　見てクダさ～い！　この姿、どうデスか？」
line = "「オウ♪　見てクダさ～い！　この姿、どうデスか？」"

[[dialogue]]
speaker = "unk"
# リップルも水着に変身した！
line = "リップルも水着に変身した！"

[[dialogue]]
speaker = "サーシャ"
# 「リップルちゃん、凄く似合っていて可愛いと思うわ～♪　妹に欲しいくらい♪」
line = "「リップルちゃん、凄く似合っていて可愛いと思うわ～♪　妹に欲しいくらい♪」"

[[dialogue]]
speaker = "リップル"
# 「エヘヘ、照れま～す♪」
line = "「エヘヘ、照れま～す♪」"

[[dialogue]]
speaker = "フィオナ"
# 「サーシャさん、ソフィアが聞いたら嫉妬しちゃいますよ」
line = "「サーシャさん、ソフィアが聞いたら嫉妬しちゃいますよ」"

[[dialogue]]
speaker = "サーシャ"
# 「あ～ん、それは困るわ～。フィオナちゃん、今のは秘密にしててね～？」
line = "「あ～ん、それは困るわ～。フィオナちゃん、今のは秘密にしててね～？」"

[[dialogue]]
speaker = "フィオナ"
# 「ふふっ、考えときます」
line = "「ふふっ、考えときます」"

[[dialogue]]
speaker = "ヴィーナス"
# 「さて、これで星力も使えるようになったし、強化合宿も問題なく出来るわね！」
line = "「さて、これで星力も使えるようになったし、強化合宿も問題なく出来るわね！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それじゃあ改めて、リップルも加えて、結界から脱出する為の強化合宿、スタートよ！」
line = "「それじゃあ改めて、リップルも加えて、結界から脱出する為の強化合宿、スタートよ！」"

[[dialogue]]
speaker = "みんな"
# 「おー！」
line = "「おー！」"

[[dialogue]]
speaker = "unk"
# こうして、合宿がスタートするのだった――
line = "こうして、合宿がスタートするのだった――"
