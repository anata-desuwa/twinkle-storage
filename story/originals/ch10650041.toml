[[dialogue]]
speaker = "unk"
# 第１話,ウェディングドレスのイレーナ,P
line = "第１話,ウェディングドレスのイレーナ,P"

[[dialogue]]
speaker = "イレーナ"
# 「それじゃあいくわよ」
line = "「それじゃあいくわよ」"

[[dialogue]]
speaker = "イレーナ"
# 「はい、ウェディングフォームに変身してみたわ。とりあえず普通に着る分には問題なさそうね」
line = "「はい、ウェディングフォームに変身してみたわ。とりあえず普通に着る分には問題なさそうね」"

[[dialogue]]
speaker = "unk"
# フィオナたちに引き続き、イレーナもウェディングフォームを獲得した。
line = "フィオナたちに引き続き、イレーナもウェディングフォームを獲得した。"

[[dialogue]]
speaker = "unk"
# 俺とイレーナは、新たに得たウェディングドレスの戦闘服の力や性質について検証しているところだ。
line = "俺とイレーナは、新たに得たウェディングドレスの戦闘服の力や性質について検証しているところだ。"

[[dialogue]]
speaker = "イレーナ"
# 「どう？　おかしなところとかない？」
line = "「どう？　おかしなところとかない？」"

[[dialogue]]
speaker = "イレーナ"
# 「……あたしがそわそわしてるって？」
line = "「……あたしがそわそわしてるって？」"

[[dialogue]]
speaker = "イレーナ"
# 「そりゃあ、結婚式挙げるわけでもないのにウェディングドレス着てたら、そわそわもするわよ」
line = "「そりゃあ、結婚式挙げるわけでもないのにウェディングドレス着てたら、そわそわもするわよ」"

[[dialogue]]
speaker = "イレーナ"
# 「別にウェディングドレス着られて嬉しいとか思ってないんだから。この前はウェディングフォームにしか変身できなくて大変だったし」
line = "「別にウェディングドレス着られて嬉しいとか思ってないんだから。この前はウェディングフォームにしか変身できなくて大変だったし」"

[[dialogue]]
speaker = "イレーナ"
# 「で、どうなの？　あたしのウェディングドレス姿は」
line = "「で、どうなの？　あたしのウェディングドレス姿は」"

[[dialogue]]
speaker = "unk"
# とても綺麗だ
line = "とても綺麗だ"

[[dialogue]]
speaker = "イレーナ"
# 「そ、そう……？　まぁそう言われて悪い気はしないけど……」
line = "「そ、そう……？　まぁそう言われて悪い気はしないけど……」"

[[dialogue]]
speaker = "イレーナ"
# 「……輝いてる？　奇跡？　神々しい？　いや、それはさすがに言い過ぎな気が……」
line = "「……輝いてる？　奇跡？　神々しい？　いや、それはさすがに言い過ぎな気が……」"

[[dialogue]]
speaker = "unk"
# そしてイレーナなのに清楚だ！！
line = "そしてイレーナなのに清楚だ！！"

[[dialogue]]
speaker = "イレーナ"
# 「あんたあたしのことなんだと思ってんのよ！！」
line = "「あんたあたしのことなんだと思ってんのよ！！」"

[[dialogue]]
speaker = "イレーナ"
# 「どうせあんたはいつもの露出の多い方が好きだったんでしょうけど、残念だったわね。フンッ」
line = "「どうせあんたはいつもの露出の多い方が好きだったんでしょうけど、残念だったわね。フンッ」"

[[dialogue]]
speaker = "unk"
# どっちのイレーナも好きだよ
line = "どっちのイレーナも好きだよ"

[[dialogue]]
speaker = "イレーナ"
# 「もう……恥ずかしいこと言ってくれちゃって……」
line = "「もう……恥ずかしいこと言ってくれちゃって……」"

[[dialogue]]
speaker = "イレーナ"
# 「ん？　どっちもってことは、露出の多い方も好きってこと？　やっぱりスケベ会長なんじゃ……」
line = "「ん？　どっちもってことは、露出の多い方も好きってこと？　やっぱりスケベ会長なんじゃ……」"

[[dialogue]]
speaker = "イレーナ"
# 「え、髪型が違う？　そうね、この姿に変身すると髪が伸びるみたい。他に例がないわけじゃないけど、体に変化が起こる戦闘服は珍しいから少し驚いたわ」
line = "「え、髪型が違う？　そうね、この姿に変身すると髪が伸びるみたい。他に例がないわけじゃないけど、体に変化が起こる戦闘服は珍しいから少し驚いたわ」"

[[dialogue]]
speaker = "イレーナ"
# 「でもそんなに違和感はないわね。昔は伸ばしてたし。正式に教皇庁所属になったら忙しくて、手入れする余裕がなくて切ったのよ」
line = "「でもそんなに違和感はないわね。昔は伸ばしてたし。正式に教皇庁所属になったら忙しくて、手入れする余裕がなくて切ったのよ」"

[[dialogue]]
speaker = "イレーナ"
# 「ま、変身してる時だけ伸びるなら、手間がなくてありがたいわ」
line = "「ま、変身してる時だけ伸びるなら、手間がなくてありがたいわ」"

[[dialogue]]
speaker = "イレーナ"
# 「だけど昔の髪型を見られてると思うと、なんか恥ずかしいわね……小さい頃の写真を見せてるみたい」
line = "「だけど昔の髪型を見られてると思うと、なんか恥ずかしいわね……小さい頃の写真を見せてるみたい」"

[[dialogue]]
speaker = "イレーナ"
# 「……この髪型も似合ってる？　じゃあ今からでも髪伸ばそうかな……」
line = "「……この髪型も似合ってる？　じゃあ今からでも髪伸ばそうかな……」"

[[dialogue]]
speaker = "イレーナ"
# 「──って、別にあんたを喜ばせたいとかじゃないからねっ！　一般意見として参考にしただけだから！」
line = "「──って、別にあんたを喜ばせたいとかじゃないからねっ！　一般意見として参考にしただけだから！」"

[[dialogue]]
speaker = "イレーナ"
# 「そーれーよーり！　性能の話！　別にあんたにウェディングドレス見せたいわけじゃないんだから！」
line = "「そーれーよーり！　性能の話！　別にあんたにウェディングドレス見せたいわけじゃないんだから！」"

[[dialogue]]
speaker = "イレーナ"
# 「クリスマスやバレンタインは自分で戦闘服を調整して変身したけど、このウェディングドレスはそうじゃないから、使い勝手が違うのよね」
line = "「クリスマスやバレンタインは自分で戦闘服を調整して変身したけど、このウェディングドレスはそうじゃないから、使い勝手が違うのよね」"

[[dialogue]]
speaker = "unk"
# イレーナが得意とするのは回復や支援だ。
line = "イレーナが得意とするのは回復や支援だ。"

[[dialogue]]
speaker = "unk"
# だがウェディングフォームを手に入れたことで、今までと異なる戦い方ができるかもしれない。
line = "だがウェディングフォームを手に入れたことで、今までと異なる戦い方ができるかもしれない。"

[[dialogue]]
speaker = "イレーナ"
# 「この戦闘服、星術を少しだけ強くしようとしたら出力が全開になったり、回復しようとしたら攻撃の術が出たりで、扱いがピーキーなの」
line = "「この戦闘服、星術を少しだけ強くしようとしたら出力が全開になったり、回復しようとしたら攻撃の術が出たりで、扱いがピーキーなの」"

[[dialogue]]
speaker = "イレーナ"
# 「スペック的には他の戦闘服に負けない……というか出力は一番強いと思うんだけど、見かけによらずじゃじゃ馬ね」
line = "「スペック的には他の戦闘服に負けない……というか出力は一番強いと思うんだけど、見かけによらずじゃじゃ馬ね」"

[[dialogue]]
speaker = "イレーナ"
# 「自前じゃない戦闘服の扱い方を学んでいかないといけないわ」
line = "「自前じゃない戦闘服の扱い方を学んでいかないといけないわ」"

[[dialogue]]
speaker = "unk"
# 自前じゃないから露出が少なかったのか……
line = "自前じゃないから露出が少なかったのか……"

[[dialogue]]
speaker = "イレーナ"
# 「口を開けばそればっかり。本当にスケベなんだから」
line = "「口を開けばそればっかり。本当にスケベなんだから」"

[[dialogue]]
speaker = "イレーナ"
# 「でもおへそが出てない戦闘服は初めてね……自分で言うのもなんだけど」
line = "「でもおへそが出てない戦闘服は初めてね……自分で言うのもなんだけど」"

[[dialogue]]
speaker = "unk"
# 露出がなくて慣れない？
line = "露出がなくて慣れない？"

[[dialogue]]
speaker = "イレーナ"
# 「そうそう、やっぱりお腹と太ももは出てないと──」
line = "「そうそう、やっぱりお腹と太ももは出てないと──」"

[[dialogue]]
speaker = "イレーナ"
# 「って、んなわけあるかぁああっ！！！」
line = "「って、んなわけあるかぁああっ！！！」"

[[dialogue]]
speaker = "イレーナ"
# 「ったくもう、すぐに脱がせる方向に持っていこうとして、油断も隙もないんだから。スケベ魔王め」
line = "「ったくもう、すぐに脱がせる方向に持っていこうとして、油断も隙もないんだから。スケベ魔王め」"

[[dialogue]]
speaker = "イレーナ"
# 「ま、いいわ。ウェディングドレスに免じて、あんたのスケベも特別に許してあげる」
line = "「ま、いいわ。ウェディングドレスに免じて、あんたのスケベも特別に許してあげる」"

[[dialogue]]
speaker = "unk"
# やっぱり着られて嬉しいんだ
line = "やっぱり着られて嬉しいんだ"

[[dialogue]]
speaker = "イレーナ"
# 「う……そりゃあ、着てみたいと思ったことがないかと言えばウソになるし」
line = "「う……そりゃあ、着てみたいと思ったことがないかと言えばウソになるし」"

[[dialogue]]
speaker = "イレーナ"
# 「結婚願望……というか結婚したいかどうか関係なく、女の子にとってウェディングドレスは憧れなのよ」
line = "「結婚願望……というか結婚したいかどうか関係なく、女の子にとってウェディングドレスは憧れなのよ」"

[[dialogue]]
speaker = "イレーナ"
# 「フィオナ会長たちのドレスを見て、あたしも着てみたいって思っちゃったの。教皇庁の神官なのに」
line = "「フィオナ会長たちのドレスを見て、あたしも着てみたいって思っちゃったの。教皇庁の神官なのに」"

[[dialogue]]
speaker = "unk"
# 何度見ても綺麗だ
line = "何度見ても綺麗だ"

[[dialogue]]
speaker = "イレーナ"
# 「もう……そんなに褒めても何も出ないわよ」
line = "「もう……そんなに褒めても何も出ないわよ」"

[[dialogue]]
speaker = "イレーナ"
# 「あんたが着てほしいなら、今後も着てあげなくもないけどねっ」
line = "「あんたが着てほしいなら、今後も着てあげなくもないけどねっ」"

[[dialogue]]
speaker = "unk"
# なんだかんだイレーナもまんざらでもなさそうで、またウェディングドレス姿を見せてもらおうと思うのだった。
line = "なんだかんだイレーナもまんざらでもなさそうで、またウェディングドレス姿を見せてもらおうと思うのだった。"
