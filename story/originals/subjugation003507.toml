[[dialogue]]
speaker = "unk"
# 出現報告があった場所へ急行する俺たち。
line = "出現報告があった場所へ急行する俺たち。"

[[dialogue]]
speaker = "トリシャ"
# 「ぴょーん、ぴょーん、ぴょーん……さあ、一緒にこちらへ……ぴょーん、ぴょーん……」
line = "「ぴょーん、ぴょーん、ぴょーん……さあ、一緒にこちらへ……ぴょーん、ぴょーん……」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ぴょーん、ぴょーん……トリシャの真似してぴょんぴょんしてたら疲れてきたゆ……」
line = "「ぴょーん、ぴょーん……トリシャの真似してぴょんぴょんしてたら疲れてきたゆ……」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「こんな時はお菓子ゆ！　お菓子を持ってくるゆ！」
line = "「こんな時はお菓子ゆ！　お菓子を持ってくるゆ！」"

[[dialogue]]
speaker = "舞亜"
# 「お菓子ならあるよ。はい、これ食べて」
line = "「お菓子ならあるよ。はい、これ食べて」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆ～っ、嬉しいゆ♪　はむはむはむはむっ、お菓子おいしいの♪」
line = "「ゆ～っ、嬉しいゆ♪　はむはむはむはむっ、お菓子おいしいの♪」"

[[dialogue]]
speaker = "ミルフィー"
# 「ありがとう、舞亜さん。いいとこに来てくれて助かったよ」
line = "「ありがとう、舞亜さん。いいとこに来てくれて助かったよ」"

[[dialogue]]
speaker = "舞亜"
# 「ゾンビ型幽霊が相手だと戦闘ではあまり役に立てそうにないし、このくらいはね」
line = "「ゾンビ型幽霊が相手だと戦闘ではあまり役に立てそうにないし、このくらいはね」"

[[dialogue]]
speaker = "舞亜"
# 「それにしても……話は聞いてたけど、本当にぴょんぴょんしてるんだね、トリシャさん」
line = "「それにしても……話は聞いてたけど、本当にぴょんぴょんしてるんだね、トリシャさん」"

[[dialogue]]
speaker = "ミルフィー"
# 「人工戦闘服の影響みたいだよ。ゾンビ型幽霊に似せてるのかな」
line = "「人工戦闘服の影響みたいだよ。ゾンビ型幽霊に似せてるのかな」"

[[dialogue]]
speaker = "舞亜"
# 「そうかも。あれに思考能力があるのかは知らないけど、トリシャさんのことまるで仲間だと思ってるみたい」
line = "「そうかも。あれに思考能力があるのかは知らないけど、トリシャさんのことまるで仲間だと思ってるみたい」"

[[dialogue]]
speaker = "舞亜"
# 「それにしてもトリシャさん、ずっと飛び跳ねっぱなしで大丈夫なのかな？」
line = "「それにしてもトリシャさん、ずっと飛び跳ねっぱなしで大丈夫なのかな？」"

[[dialogue]]
speaker = "ミルフィー"
# 「そうだね……ちょっとずつジャンプの高さが下がってきてるのは疲れによるものなのかな？」
line = "「そうだね……ちょっとずつジャンプの高さが下がってきてるのは疲れによるものなのかな？」"

[[dialogue]]
speaker = "舞亜"
# 「あ～……スタミナ切れしてると、足が重たくなって跳べないんだよね」
line = "「あ～……スタミナ切れしてると、足が重たくなって跳べないんだよね」"

[[dialogue]]
speaker = "トリシャ"
# 「ぴょーん、ぴょーん……ぴょーん、ぴょーん……」
line = "「ぴょーん、ぴょーん……ぴょーん、ぴょーん……」"

[[dialogue]]
speaker = "ソフィア"
# 「トリシャさん、大丈夫ですか？　かなり疲れてきているように見えますけど……」
line = "「トリシャさん、大丈夫ですか？　かなり疲れてきているように見えますけど……」"

[[dialogue]]
speaker = "トリシャ"
# 「そうですね……でも、問題ありません……オトモダチとして……最後まで頑張ってみせます……にへへ……」
line = "「そうですね……でも、問題ありません……オトモダチとして……最後まで頑張ってみせます……にへへ……」"

[[dialogue]]
speaker = "トリシャ"
# 「ぴょーん、ぴょーん……さあ、こちらです……私の後について来てください……」
line = "「ぴょーん、ぴょーん……さあ、こちらです……私の後について来てください……」"

[[dialogue]]
speaker = "ソフィア"
# 「……人工戦闘服のサポートがありますから、まだ大丈夫だとは思いますが、それでも……」
line = "「……人工戦闘服のサポートがありますから、まだ大丈夫だとは思いますが、それでも……」"

[[dialogue]]
speaker = "舞亜"
# 「やっぱりちょっときつそうだね」
line = "「やっぱりちょっときつそうだね」"

[[dialogue]]
speaker = "ミルフィー"
# （…………トリシャさん、もう少しだけ……頑張って！）
line = "（…………トリシャさん、もう少しだけ……頑張って！）"

[[dialogue]]
speaker = "トリシャ"
# 「ぴょーん、ぴょーん……まだこれほどの数がいるのですか……想像を遥かに超えた大氾濫ですね……」
line = "「ぴょーん、ぴょーん……まだこれほどの数がいるのですか……想像を遥かに超えた大氾濫ですね……」"

[[dialogue]]
speaker = "ウズメイア"
# 「おーい、こっちこっちー！　まだたっぷり残ってるよー！」
line = "「おーい、こっちこっちー！　まだたっぷり残ってるよー！」"

[[dialogue]]
speaker = "ミルフィー"
# 「ウズメさん！　大聖堂にいるのは、これで全部？」
line = "「ウズメさん！　大聖堂にいるのは、これで全部？」"

[[dialogue]]
speaker = "ウズメイア"
# 「全部どころか半分以下だよ。あっちこっちに散らばってるんだから」
line = "「全部どころか半分以下だよ。あっちこっちに散らばってるんだから」"

[[dialogue]]
speaker = "ソフィア"
# 「あと何か所回ればいいんでしょうか……」
line = "「あと何か所回ればいいんでしょうか……」"

[[dialogue]]
speaker = "マトイ"
# 「報告があった場所は残り僅かです。トリシャさんのベルで各所から集まってきてるようなので、現時点で追加の報告は入っていません」
line = "「報告があった場所は残り僅かです。トリシャさんのベルで各所から集まってきてるようなので、現時点で追加の報告は入っていません」"

[[dialogue]]
speaker = "舞亜"
# 「となると、終わりも近いのかな……」
line = "「となると、終わりも近いのかな……」"

[[dialogue]]
speaker = "トリシャ"
# 「ぴょーん……ぴょーん……ぴょんっ」
line = "「ぴょーん……ぴょーん……ぴょんっ」"

[[dialogue]]
speaker = "トリシャ"
# 「これで……全部です……フフ、ぴょんぴょんしすぎてうさぎさんになるかと思いました……」
line = "「これで……全部です……フフ、ぴょんぴょんしすぎてうさぎさんになるかと思いました……」"

[[dialogue]]
speaker = "ミルフィー"
# 「お疲れさまトリシャさん。ありがとう」
line = "「お疲れさまトリシャさん。ありがとう」"

[[dialogue]]
speaker = "ミルフィー"
# 「それにしても最終地点がアリーナだなんて偶然？　それとも会長くんの狙い通りだったりして」
line = "「それにしても最終地点がアリーナだなんて偶然？　それとも会長くんの狙い通りだったりして」"

[[dialogue]]
speaker = "unk"
# この数を全部収容するにはここしかないから
line = "この数を全部収容するにはここしかないから"

[[dialogue]]
speaker = "unk"
# アリーナなら派手に戦闘してもＯＫ
line = "アリーナなら派手に戦闘してもＯＫ"

[[dialogue]]
speaker = "ソフィア"
# 「後は倒すだけ、ですね……」
line = "「後は倒すだけ、ですね……」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆ～っゆっゆっゆ♪　作戦は大成功なの♪　トリシャもよく頑張ったゆ♪」
line = "「ゆ～っゆっゆっゆ♪　作戦は大成功なの♪　トリシャもよく頑張ったゆ♪」"

[[dialogue]]
speaker = "マトイ"
# 「まだ最後のバトルが残ってるんだけどね……トリシャさんは疲れてると思うし少し休みますか？」
line = "「まだ最後のバトルが残ってるんだけどね……トリシャさんは疲れてると思うし少し休みますか？」"

[[dialogue]]
speaker = "トリシャ"
# 「フフ……最終決戦を前にして、休んでなどいられるでしょうか……ミルフィーさんのオトモダチとして、肩を並べて戦いましょう」
line = "「フフ……最終決戦を前にして、休んでなどいられるでしょうか……ミルフィーさんのオトモダチとして、肩を並べて戦いましょう」"

[[dialogue]]
speaker = "ミルフィー"
# 「これで最後だから一緒に頑張ろうね」
line = "「これで最後だから一緒に頑張ろうね」"

[[dialogue]]
speaker = "トリシャ"
# 「はい、共に……」
line = "「はい、共に……」"

[[dialogue]]
speaker = "舞亜"
# 「でも集めたはいいんだけど、この数はちょっと……いや、かなーり大変だよ？」
line = "「でも集めたはいいんだけど、この数はちょっと……いや、かなーり大変だよ？」"

[[dialogue]]
speaker = "ウズメイア"
# 「そこは気合いで何とかするし♪」
line = "「そこは気合いで何とかするし♪」"

[[dialogue]]
speaker = "ソフィア"
# 「いや、気合いにも限度がありますから……」
line = "「いや、気合いにも限度がありますから……」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆ～っゆっゆっゆ♪　やはりここは余の出番ゆ！」
line = "「ゆ～っゆっゆっゆ♪　やはりここは余の出番ゆ！」"

[[dialogue]]
speaker = "ミルフィー"
# 「え……ジャクリーヌさん？　だ、大丈夫なの？」
line = "「え……ジャクリーヌさん？　だ、大丈夫なの？」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「数が多くてうざったい幽霊は……こうしてやればいいのっ！」
line = "「数が多くてうざったい幽霊は……こうしてやればいいのっ！」"

[[dialogue]]
speaker = "unk"
# 言うが早いかジャクリーヌがとび出して行き、ゾンビ型幽霊を掴んでは片っ端から引っ付けていく。
line = "言うが早いかジャクリーヌがとび出して行き、ゾンビ型幽霊を掴んでは片っ端から引っ付けていく。"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆっ♪　ゆっ♪　こうして、こうして、こうだゆ！　ゆゆゆゆゆ～～～っ♪」
line = "「ゆっ♪　ゆっ♪　こうして、こうして、こうだゆ！　ゆゆゆゆゆ～～～っ♪」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「これで出来あがりゆ！　ぜ～んぶひとまとめにしてやったゆ～♪」
line = "「これで出来あがりゆ！　ぜ～んぶひとまとめにしてやったゆ～♪」"

[[dialogue]]
speaker = "ウズメイア"
# 「ちょっ、マジで！？　全部くっつけちゃったんだけど！」
line = "「ちょっ、マジで！？　全部くっつけちゃったんだけど！」"

[[dialogue]]
speaker = "ミルフィー"
# 「すごいよ、ジャクリーヌさん！　これならおっきいのを１体倒すだけで済んじゃうね」
line = "「すごいよ、ジャクリーヌさん！　これならおっきいのを１体倒すだけで済んじゃうね」"

[[dialogue]]
speaker = "トリシャ"
# 「フフ……１体になった分、幽体の密度も跳ね上がっていますが……」
line = "「フフ……１体になった分、幽体の密度も跳ね上がっていますが……」"

[[dialogue]]
speaker = "ミルフィー"
# 「え？　もしかしてめちゃくちゃ強い？」
line = "「え？　もしかしてめちゃくちゃ強い？」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆっゆっゆ♪　最強になった巨大幽霊ゾンビ……お前たちは倒せるゆ？」
line = "「ゆっゆっゆ♪　最強になった巨大幽霊ゾンビ……お前たちは倒せるゆ？」"

[[dialogue]]
speaker = "舞亜"
# 「うわぁ、ラスボスみたいな発言……」
line = "「うわぁ、ラスボスみたいな発言……」"

[[dialogue]]
speaker = "ソフィア"
# 「でも、実質ラスボスのようなものですし」
line = "「でも、実質ラスボスのようなものですし」"

[[dialogue]]
speaker = "unk"
# こいつをやっつけるぞ！
line = "こいつをやっつけるぞ！"

[[dialogue]]
speaker = "unk"
# みんなの力を合わせて！
line = "みんなの力を合わせて！"

[[dialogue]]
speaker = "ミルフィー"
# 「行くよ、トリシャさん！」
line = "「行くよ、トリシャさん！」"

[[dialogue]]
speaker = "トリシャ"
# 「はい、背中は私がお守りします……」
line = "「はい、背中は私がお守りします……」"

[[dialogue]]
speaker = "ミルフィー"
# 「うんっ」
line = "「うんっ」"

[[dialogue]]
speaker = "マトイ"
# 「メインアタッカーはミルフィーで、サブアタッカーがトリシャさん……」
line = "「メインアタッカーはミルフィーで、サブアタッカーがトリシャさん……」"

[[dialogue]]
speaker = "舞亜"
# 「残る私たちは、２人のサポートだね」
line = "「残る私たちは、２人のサポートだね」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆ？　余は何をするゆ？」
line = "「ゆ？　余は何をするゆ？」"

[[dialogue]]
speaker = "ウズメイア"
# 「お菓子食べながら観戦してればいいんじゃない？」
line = "「お菓子食べながら観戦してればいいんじゃない？」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆっゆっゆ♪　それで決まりなの♪　お菓子頂きまぁすなの♪」
line = "「ゆっゆっゆ♪　それで決まりなの♪　お菓子頂きまぁすなの♪」"

[[dialogue]]
speaker = "ソフィア"
# 「こちらの準備は整いました。あとは開戦の合図を待つだけです」
line = "「こちらの準備は整いました。あとは開戦の合図を待つだけです」"

[[dialogue]]
speaker = "unk"
# じゃあ行くぞ！
line = "じゃあ行くぞ！"

[[dialogue]]
speaker = "ミルフィー"
# 「最終決戦開始ですっ！」
line = "「最終決戦開始ですっ！」"
