[[dialogue]]
speaker = "unk"
# 第１話,穏やかな日々,B
line = "第１話,穏やかな日々,B"

[[dialogue]]
speaker = "マトイ"
# 「マドレーヌ焼いてきたんだ～♪　焼き色もすごくいい感じで、今日のは自信作♪」
line = "「マドレーヌ焼いてきたんだ～♪　焼き色もすごくいい感じで、今日のは自信作♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「やった！　マトイのマドレーヌ好き～♪」
line = "「やった！　マトイのマドレーヌ好き～♪」"

[[dialogue]]
speaker = "アナ"
# 「頭脳労働に糖分は不可欠。いただきます」
line = "「頭脳労働に糖分は不可欠。いただきます」"

[[dialogue]]
speaker = "サーシャ"
# 「うふふ。じゃあ紅茶淹れるわね～」
line = "「うふふ。じゃあ紅茶淹れるわね～」"

[[dialogue]]
speaker = "unk"
# 星徒会業務の傍ら、ヴィーナスやマトイが持ってきてくれたお菓子でティータイム。
line = "星徒会業務の傍ら、ヴィーナスやマトイが持ってきてくれたお菓子でティータイム。"

[[dialogue]]
speaker = "unk"
# この新星学園に転入して、そして星徒会長になって数ヶ月。すっかり見慣れた風景だ。
line = "この新星学園に転入して、そして星徒会長になって数ヶ月。すっかり見慣れた風景だ。"

[[dialogue]]
speaker = "ヴィーナス"
# 「どうしたのよ、クロト。そんな孫を見守るおじいちゃんみたいな顔しちゃって」
line = "「どうしたのよ、クロト。そんな孫を見守るおじいちゃんみたいな顔しちゃって」"

[[dialogue]]
speaker = "クロト"
# 「平和だなって」
line = "「平和だなって」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうね。今日は名前を二度見するような部活の突撃もなかったし」
line = "「そうね。今日は名前を二度見するような部活の突撃もなかったし」"

[[dialogue]]
speaker = "クロト"
# 「いや、そっちじゃなくて。それも星徒会の大事な仕事だけどさ」
line = "「いや、そっちじゃなくて。それも星徒会の大事な仕事だけどさ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「わかってるわよ」
line = "「わかってるわよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「アポロやギエルとの戦いがずいぶん昔のことに感じるわ。そんなに時間が経ったわけじゃないのにね」
line = "「アポロやギエルとの戦いがずいぶん昔のことに感じるわ。そんなに時間が経ったわけじゃないのにね」"

[[dialogue]]
speaker = "unk"
# フィーニスの塔の頂上で繰り広げられたギエルとの決戦。
line = "フィーニスの塔の頂上で繰り広げられたギエルとの決戦。"

[[dialogue]]
speaker = "unk"
# 全ての力を結集した死闘でリクリエを封印し、流星市国は平和を取り戻していた。
line = "全ての力を結集した死闘でリクリエを封印し、流星市国は平和を取り戻していた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「ところで、ちゃんと検診は受けてるわよね」
line = "「ところで、ちゃんと検診は受けてるわよね」"

[[dialogue]]
speaker = "クロト"
# 「もちろん。今のところ何の異常もなし。自分でも意外なくらい健康そのものだ」
line = "「もちろん。今のところ何の異常もなし。自分でも意外なくらい健康そのものだ」"

[[dialogue]]
speaker = "unk"
# ギエルを倒してなお消えなかったリクリエの力を、強引に俺の中に封じた。
line = "ギエルを倒してなお消えなかったリクリエの力を、強引に俺の中に封じた。"

[[dialogue]]
speaker = "unk"
# その力が俺に悪影響を与えていないか、定期的に診てもらっているのだけど……
line = "その力が俺に悪影響を与えていないか、定期的に診てもらっているのだけど……"

[[dialogue]]
speaker = "クロト"
# （あれ、いろんなデータを取られるからな……）
line = "（あれ、いろんなデータを取られるからな……）"

[[dialogue]]
speaker = "unk"
# アニマ先輩に、保健委員の子に、流星学園のエスメラルダ先生、それに母さんまで。
line = "アニマ先輩に、保健委員の子に、流星学園のエスメラルダ先生、それに母さんまで。"

[[dialogue]]
speaker = "unk"
# いろんな人に隅々まで計測されるが、ついでに必要ないデータも取られているんじゃないだろうか。
line = "いろんな人に隅々まで計測されるが、ついでに必要ないデータも取られているんじゃないだろうか。"

[[dialogue]]
speaker = "クロト"
# 「それにしても……戦いがなくても仕事はけっこうあるんだな」
line = "「それにしても……戦いがなくても仕事はけっこうあるんだな」"

[[dialogue]]
speaker = "アナ"
# 「新星学園は生徒数が多いですし、星徒会の権限も大きいので、他の学校の生徒会と比べて業務が多いのは当然です」
line = "「新星学園は生徒数が多いですし、星徒会の権限も大きいので、他の学校の生徒会と比べて業務が多いのは当然です」"

[[dialogue]]
speaker = "クロト"
# 「確かに……。いつもありがとう。助かってるよ、アナ」
line = "「確かに……。いつもありがとう。助かってるよ、アナ」"

[[dialogue]]
speaker = "アナ"
# 「それが副会長の仕事ですから。でも和菓子は感謝の気持ちとしていただきます」
line = "「それが副会長の仕事ですから。でも和菓子は感謝の気持ちとしていただきます」"

[[dialogue]]
speaker = "クロト"
# 「ああ。今度お薦めを持ってくる」
line = "「ああ。今度お薦めを持ってくる」"

[[dialogue]]
speaker = "unk"
# 戦いが大きかった分、後処理の書類仕事もたくさんあって、最近ようやく落ち着いた。
line = "戦いが大きかった分、後処理の書類仕事もたくさんあって、最近ようやく落ち着いた。"

[[dialogue]]
speaker = "unk"
# みんな頑張ってくれたけど、特にアナは和菓子ブーストで獅子奮迅の活躍だった。
line = "みんな頑張ってくれたけど、特にアナは和菓子ブーストで獅子奮迅の活躍だった。"

[[dialogue]]
speaker = "クロト"
# 「でも一区切りついたし、俺も休憩にしようかな。マドレーヌもらうよ。……うん、美味しい。紅茶ともよく合う」
line = "「でも一区切りついたし、俺も休憩にしようかな。マドレーヌもらうよ。……うん、美味しい。紅茶ともよく合う」"

[[dialogue]]
speaker = "マトイ"
# 「えへへ♪　そう言ってくれると嬉しいな」
line = "「えへへ♪　そう言ってくれると嬉しいな」"

[[dialogue]]
speaker = "アポロ"
# 「魔王～～！　遊びに来たぞー！」
line = "「魔王～～！　遊びに来たぞー！」"

[[dialogue]]
speaker = "フィオナ"
# 「お邪魔しますね。合同学園祭の提案書をお持ちしました」
line = "「お邪魔しますね。合同学園祭の提案書をお持ちしました」"

[[dialogue]]
speaker = "ヴィーナス"
# 「いらっしゃい。ちょうど休憩してたところなのよ」
line = "「いらっしゃい。ちょうど休憩してたところなのよ」"

[[dialogue]]
speaker = "アポロ"
# 「お、いいもの食べてるじゃないか。うまそうだな」
line = "「お、いいもの食べてるじゃないか。うまそうだな」"

[[dialogue]]
speaker = "マトイ"
# 「よかったらアポロちゃんも食べて。フィオナさんもどうぞ」
line = "「よかったらアポロちゃんも食べて。フィオナさんもどうぞ」"

[[dialogue]]
speaker = "フィオナ"
# 「私もいいんですか？　ありがとうございます」
line = "「私もいいんですか？　ありがとうございます」"

[[dialogue]]
speaker = "マトイ"
# 「どうぞどうぞー……はっ！？　２人とも星見家のお嬢様なんだし、私が作ったお菓子じゃ口に合わないかも……」
line = "「どうぞどうぞー……はっ！？　２人とも星見家のお嬢様なんだし、私が作ったお菓子じゃ口に合わないかも……」"

[[dialogue]]
speaker = "フィオナ"
# 「ふふ、そんなことないです、とっても美味しいですよ♪」
line = "「ふふ、そんなことないです、とっても美味しいですよ♪」"

[[dialogue]]
speaker = "アポロ"
# 「あたしも気に入ったぞ！　マトイがこれ作ったんだな、やるじゃないか！」
line = "「あたしも気に入ったぞ！　マトイがこれ作ったんだな、やるじゃないか！」"

[[dialogue]]
speaker = "マトイ"
# 「そ、それほどでも……えへへ」
line = "「そ、それほどでも……えへへ」"

[[dialogue]]
speaker = "unk"
# 星見姉妹の反応を見て、照れ笑いを浮かべるマトイ。
line = "星見姉妹の反応を見て、照れ笑いを浮かべるマトイ。"

[[dialogue]]
speaker = "ヴィーナス"
# 「マトイの手作りお菓子は私の心を掴んだんだもの。当然よ」
line = "「マトイの手作りお菓子は私の心を掴んだんだもの。当然よ」"

[[dialogue]]
speaker = "アポロ"
# 「そこはおまえが胸を張るところなのか……？」
line = "「そこはおまえが胸を張るところなのか……？」"

[[dialogue]]
speaker = "unk"
# あの戦いの後、<ruby=デネブ>あちら</ruby>のアポロは元の世界に帰った。
line = "あの戦いの後、<ruby>あちら<rt>デネブ</rt></ruby>のアポロは元の世界に帰った。"

[[dialogue]]
speaker = "unk"
# そして意識を失っていた<ruby=アルタイル>俺たちの世界</ruby>の彼女が目を覚まして──
line = "そして意識を失っていた<ruby>俺たちの世界<rt>アルタイル</rt></ruby>の彼女が目を覚まして──"

[[dialogue]]
speaker = "unk"
# <ruby=アルタイル>俺たちの世界</ruby>のアポロは、眠りながらも彼女と精神が同調しており、戦いの一部始終を知っていた。
line = "<ruby>俺たちの世界<rt>アルタイル</rt></ruby>のアポロは、眠りながらも彼女と精神が同調しており、戦いの一部始終を知っていた。"

[[dialogue]]
speaker = "アポロ"
# 「あたしは……今度こそ本当の流星ライダーになりたい。だから引き続き、あたしのことは『アポロ』と呼んでくれ。『フィオナ』の名前はエリシアに譲ったからな」
line = "「あたしは……今度こそ本当の流星ライダーになりたい。だから引き続き、あたしのことは『アポロ』と呼んでくれ。『フィオナ』の名前はエリシアに譲ったからな」"

[[dialogue]]
speaker = "unk"
# アポロは表向き星見家の養子ということになり、俺たちは彼女を仲間として迎えたのだった。
line = "アポロは表向き星見家の養子ということになり、俺たちは彼女を仲間として迎えたのだった。"

[[dialogue]]
speaker = "サーシャ"
# 「あら～、そろそろ下校時刻だわ～。時間が経つのは早いわね～」
line = "「あら～、そろそろ下校時刻だわ～。時間が経つのは早いわね～」"

[[dialogue]]
speaker = "unk"
# 楽しい時間はあっという間に過ぎるもので、気付けば日も暮れなずんでいた。
line = "楽しい時間はあっという間に過ぎるもので、気付けば日も暮れなずんでいた。"

[[dialogue]]
speaker = "フィオナ"
# 「あ、本当ですね。そろそろお暇しなければ」
line = "「あ、本当ですね。そろそろお暇しなければ」"

[[dialogue]]
speaker = "フィオナ"
# 「今日は美味しいお茶とお菓子をご馳走になりました。流星の星徒会にも遊びに来てくださいね」
line = "「今日は美味しいお茶とお菓子をご馳走になりました。流星の星徒会にも遊びに来てくださいね」"

[[dialogue]]
speaker = "アポロ"
# 「またな！　魔王と新星星徒会のみんな！」
line = "「またな！　魔王と新星星徒会のみんな！」"

[[dialogue]]
speaker = "unk"
# 揃って帰っていくフィオナとアポロを見送る。
line = "揃って帰っていくフィオナとアポロを見送る。"

[[dialogue]]
speaker = "unk"
# 姉妹２人が一緒にいられるという当たり前のことが、本当に嬉しい。
line = "姉妹２人が一緒にいられるという当たり前のことが、本当に嬉しい。"

[[dialogue]]
speaker = "クロト"
# 「残りの仕事は明日にして、俺たちも片付けて帰ろうか」
line = "「残りの仕事は明日にして、俺たちも片付けて帰ろうか」"

[[dialogue]]
speaker = "ヴィーナス"
# 「待ちなさい、クロト。活動日誌、忘れてるわよ」
line = "「待ちなさい、クロト。活動日誌、忘れてるわよ」"

[[dialogue]]
speaker = "クロト"
# 「そうだった。悪い悪い」
line = "「そうだった。悪い悪い」"

[[dialogue]]
speaker = "unk"
# 星徒会の活動日誌は、俺が会長になる前から、前会長であるヴィーナスが書き続けてきたものだ。
line = "星徒会の活動日誌は、俺が会長になる前から、前会長であるヴィーナスが書き続けてきたものだ。"

[[dialogue]]
speaker = "クロト"
# 「……よし、書けた。でも書いてあることだけ見ると、半分遊んでるみたいだな……」
line = "「……よし、書けた。でも書いてあることだけ見ると、半分遊んでるみたいだな……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それでもいいのよ。どんなことでも記録を残しておけば、星徒会が終わった時、きっとアルバム代わりになるわ」
line = "「それでもいいのよ。どんなことでも記録を残しておけば、星徒会が終わった時、きっとアルバム代わりになるわ」"

[[dialogue]]
speaker = "unk"
# それからみんなで寄り道したりしながら帰って、取り戻した平和を存分に謳歌したのだった──
line = "それからみんなで寄り道したりしながら帰って、取り戻した平和を存分に謳歌したのだった──"
