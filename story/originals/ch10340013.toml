[[dialogue]]
speaker = "unk"
# 第３話,世界征服作戦！,P
line = "第３話,世界征服作戦！,P"

[[dialogue]]
speaker = "カティア"
# 「魔王様～！」
line = "「魔王様～！」"

[[dialogue]]
speaker = "カティア"
# 「魔王様魔王様！　今日はどうやって世界征服するんですか？　世界を恐怖と混乱に陥れてやりましょうワン！」
line = "「魔王様魔王様！　今日はどうやって世界征服するんですか？　世界を恐怖と混乱に陥れてやりましょうワン！」"

[[dialogue]]
speaker = "カティア"
# 「ワクワク♪」
line = "「ワクワク♪」"

[[dialogue]]
speaker = "unk"
# じゃあ、とりあえず街に……
line = "じゃあ、とりあえず街に……"

[[dialogue]]
speaker = "カティア"
# 「なるほど、まずは情報収集ですね！　さすが魔王様ですワン！　それじゃレッツゴー……ガオ！」
line = "「なるほど、まずは情報収集ですね！　さすが魔王様ですワン！　それじゃレッツゴー……ガオ！」"

[[dialogue]]
speaker = "カティア"
# 「クックック……愚民どもめ、魔王様の世界征服計画が進行しているとも知らずに……せいぜい仮初めの幸福を享受しているがいいガオ」
line = "「クックック……愚民どもめ、魔王様の世界征服計画が進行しているとも知らずに……せいぜい仮初めの幸福を享受しているがいいガオ」"

[[dialogue]]
speaker = "カティア"
# 「え、この語尾ですか……ワン」
line = "「え、この語尾ですか……ワン」"

[[dialogue]]
speaker = "カティア"
# 「ほら、世界征服を企む魔王の部下には個性が必要じゃないですか。だから犬系の魔族として犬アピールをしようと思いまして。特に口癖とか魔界の方言とかじゃないです」
line = "「ほら、世界征服を企む魔王の部下には個性が必要じゃないですか。だから犬系の魔族として犬アピールをしようと思いまして。特に口癖とか魔界の方言とかじゃないです」"

[[dialogue]]
speaker = "カティア"
# 「このカティア、魔王様のためなら犬にもなりますワン！」
line = "「このカティア、魔王様のためなら犬にもなりますワン！」"

[[dialogue]]
speaker = "カティア"
# 「ん……？　くんくん……とってもいい匂いがします！　お昼食べたのにお腹が空いてきました！」
line = "「ん……？　くんくん……とってもいい匂いがします！　お昼食べたのにお腹が空いてきました！」"

[[dialogue]]
speaker = "カティア"
# 「でも今は魔王様と偵察の真っ最中……ガマンガマン……」
line = "「でも今は魔王様と偵察の真っ最中……ガマンガマン……」"

[[dialogue]]
speaker = "unk"
# ちょっと買い食いしようか
line = "ちょっと買い食いしようか"

[[dialogue]]
speaker = "カティア"
# 「いいんですか！？」
line = "「いいんですか！？」"

[[dialogue]]
speaker = "カティア"
# 「なるほど、世界征服には適切な補給が不可欠ということですね。さすが魔王様です」
line = "「なるほど、世界征服には適切な補給が不可欠ということですね。さすが魔王様です」"

[[dialogue]]
speaker = "カティア"
# 「どれどれ……あれが噂のメロンパンですか。この辺りでは有名だと聞いたことがあります」
line = "「どれどれ……あれが噂のメロンパンですか。この辺りでは有名だと聞いたことがあります」"

[[dialogue]]
speaker = "unk"
# メロンパン２つくださーい
line = "メロンパン２つくださーい"

[[dialogue]]
speaker = "カティア"
# 「さすが魔王様！　魔王様の下賜、ありがたく頂戴します！」
line = "「さすが魔王様！　魔王様の下賜、ありがたく頂戴します！」"

[[dialogue]]
speaker = "カティア"
# 「おお、このメロンパンすごくおっきいです！　それでは……あむっ」
line = "「おお、このメロンパンすごくおっきいです！　それでは……あむっ」"

[[dialogue]]
speaker = "カティア"
# 「ん～！　表面がサクサクで、甘くて、パンもふわっふわでおいしいです！」
line = "「ん～！　表面がサクサクで、甘くて、パンもふわっふわでおいしいです！」"

[[dialogue]]
speaker = "カティア"
# 「うちの村でも小麦を作ってましたから、私パンにはうるさいんですが、これは花丸あげたいくらいです」
line = "「うちの村でも小麦を作ってましたから、私パンにはうるさいんですが、これは花丸あげたいくらいです」"

[[dialogue]]
speaker = "カティア"
# 「はむはむ……あむ……ごちそうさま！　大きいのにあっという間に食べ終わっちゃいました」
line = "「はむはむ……あむ……ごちそうさま！　大きいのにあっという間に食べ終わっちゃいました」"

[[dialogue]]
speaker = "カティア"
# 「そうだ！　世界を手に入れた暁には、メロンパン食べ放題にしましょう！　最高だと思いませんか？」
line = "「そうだ！　世界を手に入れた暁には、メロンパン食べ放題にしましょう！　最高だと思いませんか？」"

[[dialogue]]
speaker = "カティア"
# 「──む！　この匂いは……お肉！　ほうほう、メンチカツなるものがあるんですね」
line = "「──む！　この匂いは……お肉！　ほうほう、メンチカツなるものがあるんですね」"

[[dialogue]]
speaker = "カティア"
# 「世界征服のためにはあらゆる情報が必要……ですよね？」
line = "「世界征服のためにはあらゆる情報が必要……ですよね？」"

[[dialogue]]
speaker = "unk"
# そうだな！
line = "そうだな！"

[[dialogue]]
speaker = "カティア"
# 「さすが魔王様！　というわけでいただきます！　ガブッ」
line = "「さすが魔王様！　というわけでいただきます！　ガブッ」"

[[dialogue]]
speaker = "カティア"
# 「ん～～っ、肉汁がジューシーでたまりません！　村じゃそんなにお肉は食べられなかったから、もう天国ですよ！　人間界ですけど！」
line = "「ん～～っ、肉汁がジューシーでたまりません！　村じゃそんなにお肉は食べられなかったから、もう天国ですよ！　人間界ですけど！」"

[[dialogue]]
speaker = "カティア"
# 「村のみんなにも食べさせてあげたいなぁ……」
line = "「村のみんなにも食べさせてあげたいなぁ……」"

[[dialogue]]
speaker = "unk"
# 故郷が好き？
line = "故郷が好き？"

[[dialogue]]
speaker = "カティア"
# 「そ、そんなわけないじゃないですかっ」
line = "「そ、そんなわけないじゃないですかっ」"

[[dialogue]]
speaker = "カティア"
# 「畑仕事手伝えってうるさいし、野菜料理ばっかだし、シチューのお肉はちょっとしか入ってないし」
line = "「畑仕事手伝えってうるさいし、野菜料理ばっかだし、シチューのお肉はちょっとしか入ってないし」"

[[dialogue]]
speaker = "カティア"
# 「人間界の楽しさを知ってしまったら、とても村に帰る気になりませんね」
line = "「人間界の楽しさを知ってしまったら、とても村に帰る気になりませんね」"

[[dialogue]]
speaker = "カティア"
# 「……置いてきた花、どうなってるかな。今はマーガレットが見頃だろうなぁ」
line = "「……置いてきた花、どうなってるかな。今はマーガレットが見頃だろうなぁ」"

[[dialogue]]
speaker = "カティア"
# 「村のみんな、今頃何してるのかな……お母さんとお父さん寂しがってないかなぁ……」
line = "「村のみんな、今頃何してるのかな……お母さんとお父さん寂しがってないかなぁ……」"

[[dialogue]]
speaker = "カティア"
# 「あ──」
line = "「あ──」"

[[dialogue]]
speaker = "カティア"
# 「魔王様魔王様。あの女の子……キョロキョロして何かあったみたいですね」
line = "「魔王様魔王様。あの女の子……キョロキョロして何かあったみたいですね」"

[[dialogue]]
speaker = "小さな女の子"
# 「うぅ……ひぐ……ぐすっ……」
line = "「うぅ……ひぐ……ぐすっ……」"

[[dialogue]]
speaker = "カティア"
# 「ねぇきみ、どうしたの？」
line = "「ねぇきみ、どうしたの？」"

[[dialogue]]
speaker = "小さな女の子"
# 「ママ、いなくなっちゃって……さっきまでちゃんとおててつないでたのに」
line = "「ママ、いなくなっちゃって……さっきまでちゃんとおててつないでたのに」"

[[dialogue]]
speaker = "カティア"
# 「そっか。それは大変だね」
line = "「そっか。それは大変だね」"

[[dialogue]]
speaker = "カティア"
# （やっぱり迷子みたいですね。こういう時、人間界だとどうするんですか？）
line = "（やっぱり迷子みたいですね。こういう時、人間界だとどうするんですか？）"

[[dialogue]]
speaker = "カティア"
# （……なるほど、交番に連れていけばいいんですね。でも他にできることがあるような……そうだっ）
line = "（……なるほど、交番に連れていけばいいんですね。でも他にできることがあるような……そうだっ）"

[[dialogue]]
speaker = "カティア"
# 「ねぇ、ちょっと手を出してくれる？　ママと手をつないでた方」
line = "「ねぇ、ちょっと手を出してくれる？　ママと手をつないでた方」"

[[dialogue]]
speaker = "小さな女の子"
# 「え？　こう……でいいの？」
line = "「え？　こう……でいいの？」"

[[dialogue]]
speaker = "カティア"
# 「ありがとう。ちょっとじっとしててね」
line = "「ありがとう。ちょっとじっとしててね」"

[[dialogue]]
speaker = "カティア"
# 「くんくんくん……くんくん……お母さんの匂いは……」
line = "「くんくんくん……くんくん……お母さんの匂いは……」"

[[dialogue]]
speaker = "カティア"
# 「見つけました！」
line = "「見つけました！」"

[[dialogue]]
speaker = "カティア"
# 「お母さんが早く見つかってよかったです。あの子、すごく喜んでましたね」
line = "「お母さんが早く見つかってよかったです。あの子、すごく喜んでましたね」"

[[dialogue]]
speaker = "unk"
# よくやったな、カティア
line = "よくやったな、カティア"

[[dialogue]]
speaker = "カティア"
# 「えへへ～♪　光栄です♪」
line = "「えへへ～♪　光栄です♪」"

[[dialogue]]
speaker = "カティア"
# 「これからも悪の道を突き進み──あれ、なんか悪いことしたっけ……？」
line = "「これからも悪の道を突き進み──あれ、なんか悪いことしたっけ……？」"

[[dialogue]]
speaker = "カティア"
# 「ま、魔王様がほめてくれたんだからいいか♪」
line = "「ま、魔王様がほめてくれたんだからいいか♪」"
