[[dialogue]]
speaker = "unk"
# 第２話,お肌のケアは大事です,P
line = "第２話,お肌のケアは大事です,P"

[[dialogue]]
speaker = "サラン"
# 「さ～、お願いします、会長ちゃん」
line = "「さ～、お願いします、会長ちゃん」"

[[dialogue]]
speaker = "サラン"
# 「日焼けしちゃわないように、サランの全身に塗ってね～♪」
line = "「日焼けしちゃわないように、サランの全身に塗ってね～♪」"

[[dialogue]]
speaker = "unk"
# 時は少し遡る。
line = "時は少し遡る。"

[[dialogue]]
speaker = "unk"
# サランに泳ぎ方を教えて欲しいとせがまれたのだが……
line = "サランに泳ぎ方を教えて欲しいとせがまれたのだが……"

[[dialogue]]
speaker = "サラン"
# 「大事なこと忘れてた～」
line = "「大事なこと忘れてた～」"

[[dialogue]]
speaker = "サラン"
# 「サラン、お肌がとっても弱いの。だからちゃんと日焼け対策をしないと～」
line = "「サラン、お肌がとっても弱いの。だからちゃんと日焼け対策をしないと～」"

[[dialogue]]
speaker = "サラン"
# 「いつもだったらちゃんと準備してくるんだけど、今日は急な思い付きだったから何も準備してないの……」
line = "「いつもだったらちゃんと準備してくるんだけど、今日は急な思い付きだったから何も準備してないの……」"

[[dialogue]]
speaker = "サラン"
# 「だから会長ちゃん、ちょっと日焼け止めを買ってくるね～♪」
line = "「だから会長ちゃん、ちょっと日焼け止めを買ってくるね～♪」"

[[dialogue]]
speaker = "unk"
# そう言ってサランは売店で、日焼け止めクリームを買ってきた。
line = "そう言ってサランは売店で、日焼け止めクリームを買ってきた。"

[[dialogue]]
speaker = "サラン"
# 「会長ちゃん、ちょっとまっててね～」
line = "「会長ちゃん、ちょっとまっててね～」"

[[dialogue]]
speaker = "サラン"
# 「こうやって……うんしょ、うんしょっと……それから、ぬ～り、ぬ～り……」
line = "「こうやって……うんしょ、うんしょっと……それから、ぬ～り、ぬ～り……」"

[[dialogue]]
speaker = "unk"
# それを早速、自身の白い肌に塗り始める。
line = "それを早速、自身の白い肌に塗り始める。"

[[dialogue]]
speaker = "unk"
# しかし……
line = "しかし……"

[[dialogue]]
speaker = "サラン"
# 「前はこれで終わり～、後は背中の方なんだけど～……」
line = "「前はこれで終わり～、後は背中の方なんだけど～……」"

[[dialogue]]
speaker = "サラン"
# 「ん～……ん～……」
line = "「ん～……ん～……」"

[[dialogue]]
speaker = "サラン"
# 「手が届かなくて、上手くぬれないの～」
line = "「手が届かなくて、上手くぬれないの～」"

[[dialogue]]
speaker = "unk"
# いつもはどうしてたの？
line = "いつもはどうしてたの？"

[[dialogue]]
speaker = "サラン"
# 「使用人の方にお願いしてたの～。学校の水泳の授業の前は、お友達が手伝ってくれてたんだ～」
line = "「使用人の方にお願いしてたの～。学校の水泳の授業の前は、お友達が手伝ってくれてたんだ～」"

[[dialogue]]
speaker = "サラン"
# 「１人で塗るのは初めてだから、上手く塗れなくて～。ぬ～り、ぬ～り……」
line = "「１人で塗るのは初めてだから、上手く塗れなくて～。ぬ～り、ぬ～り……」"

[[dialogue]]
speaker = "サラン"
# 「ん～、ぬ～り、ぬ～……あっ……」
line = "「ん～、ぬ～り、ぬ～……あっ……」"

[[dialogue]]
speaker = "unk"
# ぷちっ。
line = "ぷちっ。"

[[dialogue]]
speaker = "unk"
# わああああああっ！！！
line = "わああああああっ！！！"

[[dialogue]]
speaker = "unk"
# 水着の内側まで塗り込もうと背中をまさぐっていた指が、うっかり留め具を外してしまう。
line = "水着の内側まで塗り込もうと背中をまさぐっていた指が、うっかり留め具を外してしまう。"

[[dialogue]]
speaker = "unk"
# 危うくサランのたわわなものが露わになってしまうところだったが、その前になんとか水着を押さえてそれを防ぐことができた。
line = "危うくサランのたわわなものが露わになってしまうところだったが、その前になんとか水着を押さえてそれを防ぐことができた。"

[[dialogue]]
speaker = "unk"
# そう、水着を押さえて……
line = "そう、水着を押さえて……"

[[dialogue]]
speaker = "サラン"
# 「ぽよよん？」
line = "「ぽよよん？」"

[[dialogue]]
speaker = "unk"
# ご、ごめんっっっ！！！！！！
line = "ご、ごめんっっっ！！！！！！"

[[dialogue]]
speaker = "サラン"
# 「えへへ、大丈夫だよ～。会長ちゃんはサランの水着が脱げちゃうのを防ごうとしてくれたんだし～」
line = "「えへへ、大丈夫だよ～。会長ちゃんはサランの水着が脱げちゃうのを防ごうとしてくれたんだし～」"

[[dialogue]]
speaker = "サラン"
# 「それに恋人同士なんだから、会長ちゃんに触られても平気だよ～♪」
line = "「それに恋人同士なんだから、会長ちゃんに触られても平気だよ～♪」"

[[dialogue]]
speaker = "unk"
# サランには全く動じた様子はなく、外れた水着の留め具を付け直す。
line = "サランには全く動じた様子はなく、外れた水着の留め具を付け直す。"

[[dialogue]]
speaker = "サラン"
# 「そういえば思い出したかも……サランに１人で日焼け止めを塗らせると危なっかしいから絶対に声をかけてね～、って言われてたこと」
line = "「そういえば思い出したかも……サランに１人で日焼け止めを塗らせると危なっかしいから絶対に声をかけてね～、って言われてたこと」"

[[dialogue]]
speaker = "サラン"
# 「こういう事故が起こっちゃうことを心配して、みんなはサランの面倒をみてくれてたんだね～」
line = "「こういう事故が起こっちゃうことを心配して、みんなはサランの面倒をみてくれてたんだね～」"

[[dialogue]]
speaker = "サラン"
# 「だけど今は日焼け止めを塗ってくれる人は会長ちゃん以外にいないし……」
line = "「だけど今は日焼け止めを塗ってくれる人は会長ちゃん以外にいないし……」"

[[dialogue]]
speaker = "サラン"
# 「ここは会長ちゃんにお願いするしかないよね～♪」
line = "「ここは会長ちゃんにお願いするしかないよね～♪」"

[[dialogue]]
speaker = "unk"
# 塗るの、俺が？
line = "塗るの、俺が？"

[[dialogue]]
speaker = "unk"
# …………え？
line = "…………え？"

[[dialogue]]
speaker = "サラン"
# 「うん。塗り残しが無いように全身まんべんなく塗ってね～<emoji=heart04>」
line = "「うん。塗り残しが無いように全身まんべんなく塗ってね～<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 呆然とする俺に日焼け止めを俺の手に握らせると、くるりと背中を向ける。
line = "呆然とする俺に日焼け止めを俺の手に握らせると、くるりと背中を向ける。"

[[dialogue]]
speaker = "サラン"
# 「さ、どうぞ～……」
line = "「さ、どうぞ～……」"

[[dialogue]]
speaker = "unk"
# 俺は唾を呑み込むと、指先にクリームを取り、それを両の手のひらに伸ばす。
line = "俺は唾を呑み込むと、指先にクリームを取り、それを両の手のひらに伸ばす。"

[[dialogue]]
speaker = "unk"
# そして、心臓をバクバクさせながら、サランの背中にそっと触れた。
line = "そして、心臓をバクバクさせながら、サランの背中にそっと触れた。"

[[dialogue]]
speaker = "サラン"
# 「んっ……えへへ……ちょっとこそばゆいけど～……なんだか気持ちいい～……<emoji=heart04>」
line = "「んっ……えへへ……ちょっとこそばゆいけど～……なんだか気持ちいい～……<emoji=heart04>」"

[[dialogue]]
speaker = "サラン"
# 「そのまま、水着の内側の方にも塗ってね～……」
line = "「そのまま、水着の内側の方にも塗ってね～……」"

[[dialogue]]
speaker = "サラン"
# 「会長ちゃん……優しい手つきで……とっても上手……んふ……」
line = "「会長ちゃん……優しい手つきで……とっても上手……んふ……」"

[[dialogue]]
speaker = "unk"
# 甘い吐息やめて！！！
line = "甘い吐息やめて！！！"

[[dialogue]]
speaker = "サラン"
# 「会長ちゃんが気持ちよくするのが……いけないんだよ～……<emoji=heart04>」
line = "「会長ちゃんが気持ちよくするのが……いけないんだよ～……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# またもや煩悩と戦いながら、サランの全身にクリームを塗り終わった。
line = "またもや煩悩と戦いながら、サランの全身にクリームを塗り終わった。"

[[dialogue]]
speaker = "サラン"
# 「はい、それじゃ今度は会長ちゃんの番だね」
line = "「はい、それじゃ今度は会長ちゃんの番だね」"

[[dialogue]]
speaker = "サラン"
# 「お返しにサランが塗ってあげるから、そこに座って～♪」
line = "「お返しにサランが塗ってあげるから、そこに座って～♪」"

[[dialogue]]
speaker = "サラン"
# 「ぽよ？　遠慮しなくてもいいよ、さあさあ♪」
line = "「ぽよ？　遠慮しなくてもいいよ、さあさあ♪」"

[[dialogue]]
speaker = "unk"
# 自分で塗るから大丈夫だ、と懸命に辞退しようとしたが断り切れなかった。
line = "自分で塗るから大丈夫だ、と懸命に辞退しようとしたが断り切れなかった。"

[[dialogue]]
speaker = "unk"
# とうとう諦めた俺は、サランの柔らかい手で全身に日焼け止めを塗ってもらったのだった。
line = "とうとう諦めた俺は、サランの柔らかい手で全身に日焼け止めを塗ってもらったのだった。"
