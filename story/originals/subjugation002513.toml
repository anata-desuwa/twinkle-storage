[[dialogue]]
speaker = "unk"
# シャドウフィオナを倒した後、俺はシャドウヴィーナスのところへ向かうことにした。
line = "シャドウフィオナを倒した後、俺はシャドウヴィーナスのところへ向かうことにした。"

[[dialogue]]
speaker = "unk"
# そこは、かつて俺たちがリクリエの使徒との決戦を繰り広げた場所――フィーニスの塔の頂上を再現した仮想空間だった。
line = "そこは、かつて俺たちがリクリエの使徒との決戦を繰り広げた場所――フィーニスの塔の頂上を再現した仮想空間だった。"

[[dialogue]]
speaker = "unk"
# そして――
line = "そして――"

[[dialogue]]
speaker = "シャドウヴィーナス"
# 「――――！」
line = "「――――！」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「……ふぅ。やりました……！」
line = "「……ふぅ。やりました……！」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「とりあえず、これでヴィーナスさんとの約束は果たせましたね」
line = "「とりあえず、これでヴィーナスさんとの約束は果たせましたね」"

[[dialogue]]
speaker = "unk"
# フィオナ、まさか１人で倒したのか！？
line = "フィオナ、まさか１人で倒したのか！？"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「あっ、緋宮会長、お疲れ様です」
line = "「あっ、緋宮会長、お疲れ様です」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「そうです、と言えたらカッコよかったんですけど、残念ながら違いまして……」
line = "「そうです、と言えたらカッコよかったんですけど、残念ながら違いまして……」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「最初は私１人ではなくて、姉さんやニャリオン、セーラ先輩、ユウリにルリエル、それに他の星騎士の皆さんも手伝ってくれていたんです」
line = "「最初は私１人ではなくて、姉さんやニャリオン、セーラ先輩、ユウリにルリエル、それに他の星騎士の皆さんも手伝ってくれていたんです」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「ですが……ヴィーナスさんのノヴァフォームが強すぎて、私以外はみんな撃破されてしまいました。私はなんとか耐えて、勝つことができましたけど――」
line = "「ですが……ヴィーナスさんのノヴァフォームが強すぎて、私以外はみんな撃破されてしまいました。私はなんとか耐えて、勝つことができましたけど――」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「見ての通り、魔王フォームでもボロボロの有り様です。あはは」
line = "「見ての通り、魔王フォームでもボロボロの有り様です。あはは」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「――緋宮会長も私に挑んで勝ったけど、同じくボロボロ？　では、魔王同士、お揃いですね。ふふふっ♪」
line = "「――緋宮会長も私に挑んで勝ったけど、同じくボロボロ？　では、魔王同士、お揃いですね。ふふふっ♪」"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「じ～っ……」
line = "「じ～っ……」"

[[dialogue]]
speaker = "アポロ"
# 「サチ、なぜ物影から２人を見てるんだ？　流星ライダーの某１話みたいになってるぞ？」
line = "「サチ、なぜ物影から２人を見てるんだ？　流星ライダーの某１話みたいになってるぞ？」"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「って、アポロちゃん！？　いつからそこに！？」
line = "「って、アポロちゃん！？　いつからそこに！？」"

[[dialogue]]
speaker = "unk"
# あれ？　サチじゃないか
line = "あれ？　サチじゃないか"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「姉さんも戻って来たんですね」
line = "「姉さんも戻って来たんですね」"

[[dialogue]]
speaker = "アポロ"
# 「おう！　あたしたちの熱い思いを繋いで、見事に勝ったみたいだな！　さすがはあたしの妹。オマエがヒーローだ！　よしよし♪」
line = "「おう！　あたしたちの熱い思いを繋いで、見事に勝ったみたいだな！　さすがはあたしの妹。オマエがヒーローだ！　よしよし♪」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「ね、姉さん、公衆の面前で頭を撫でられるのは恥ずかしいです……」
line = "「ね、姉さん、公衆の面前で頭を撫でられるのは恥ずかしいです……」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「センパ～イ☆　可愛い後輩が助けに来ましたよ～って、あれ？　ひょっとして、もう終わっちゃってます？」
line = "「センパ～イ☆　可愛い後輩が助けに来ましたよ～って、あれ？　ひょっとして、もう終わっちゃってます？」"

[[dialogue]]
speaker = "unk"
# リーリア！　マリオンさんには勝てたのか？
line = "リーリア！　マリオンさんには勝てたのか？"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「はい♪　センパイとの絆の力で、大金星上げちゃいましたよ～♪　ふふっ♪」
line = "「はい♪　センパイとの絆の力で、大金星上げちゃいましたよ～♪　ふふっ♪」"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「じ～っ……」
line = "「じ～っ……」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「って、え～っと、なんか強い視線を感じるんですけど……サチちゃん、どうかした？」
line = "「って、え～っと、なんか強い視線を感じるんですけど……サチちゃん、どうかした？」"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「あっ、すみません！　その……リーリア先輩はお兄さんと仲が良さげだなぁ～と思って……」
line = "「あっ、すみません！　その……リーリア先輩はお兄さんと仲が良さげだなぁ～と思って……」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「それを言うなら、サチちゃんもですけどね。だって……」
line = "「それを言うなら、サチちゃんもですけどね。だって……」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「私がこのフォームを欲しくなったきっかけの１つは、サチちゃんですし」
line = "「私がこのフォームを欲しくなったきっかけの１つは、サチちゃんですし」"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「え？」
line = "「え？」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「ほら、サチちゃんもセンパイの可愛い後輩じゃないですか。あと、なんか戦闘服やら戦い方が<b>マジカル</b>な感じで！」
line = "「ほら、サチちゃんもセンパイの可愛い後輩じゃないですか。あと、なんか戦闘服やら戦い方が<b>マジカル</b>な感じで！」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「なのに覚醒フォームで先を越されちゃって、ライバルとして悔しかったというか～」
line = "「なのに覚醒フォームで先を越されちゃって、ライバルとして悔しかったというか～」"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「ら、ライバル、ですか？　私が……？」
line = "「ら、ライバル、ですか？　私が……？」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「あれ？　ひょっとして認識されてない！？」
line = "「あれ？　ひょっとして認識されてない！？」"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「す、すみません……まさかそんな風に思ってもらえてたなんて、想像していませんでした」
line = "「す、すみません……まさかそんな風に思ってもらえてたなんて、想像していませんでした」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「マジカルショック！」
line = "「マジカルショック！」"

[[dialogue]]
speaker = "unk"
# 俺も今、初めて知った
line = "俺も今、初めて知った"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「ぐぬぬ……なら、ここでちゃんと宣言しておかないとですね！」
line = "「ぐぬぬ……なら、ここでちゃんと宣言しておかないとですね！」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「サチちゃん！　妹分のポジションはともかく、可愛い後輩の座は簡単には譲りませんよ～！」
line = "「サチちゃん！　妹分のポジションはともかく、可愛い後輩の座は簡単には譲りませんよ～！」"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「そ、そんなこと急に言われても……！」
line = "「そ、そんなこと急に言われても……！」"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「やれやれ、何を話してるのかと思えば……後輩相手にそんな下らないこと」
line = "「やれやれ、何を話してるのかと思えば……後輩相手にそんな下らないこと」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「マム！？　いやいや、下らなくないですよ！？　私のアイデンティティに関わることなんですから！」
line = "「マム！？　いやいや、下らなくないですよ！？　私のアイデンティティに関わることなんですから！」"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「でも――とりあえず、変な悩みは吹っ切れたみたいね」
line = "「でも――とりあえず、変な悩みは吹っ切れたみたいね」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「もしかしてマム、気にかけてくれてたんですか……？」
line = "「もしかしてマム、気にかけてくれてたんですか……？」"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「当たり前でしょう？　あなたは新星寮の後輩で、私は寮長なんだから」
line = "「当たり前でしょう？　あなたは新星寮の後輩で、私は寮長なんだから」"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「吹っ切れたっていうなら、その姿を私にもちゃんと見せてみなさい」
line = "「吹っ切れたっていうなら、その姿を私にもちゃんと見せてみなさい」"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「ほら、おあつらえ向きの相手が復活したわよ」
line = "「ほら、おあつらえ向きの相手が復活したわよ」"

[[dialogue]]
speaker = "シャドウヴィーナス"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# マムの言った通り、シャドウヴィーナスが復活を果たして、俺たちの前に姿を現す。
line = "マムの言った通り、シャドウヴィーナスが復活を果たして、俺たちの前に姿を現す。"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「イエス・マム！　センパイも、可愛い後輩が頑張っちゃいますから、見てて下さいね～☆」
line = "「イエス・マム！　センパイも、可愛い後輩が頑張っちゃいますから、見てて下さいね～☆」"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「あ……あの、私も！　お兄さんの後輩ですから、頑張ります！」
line = "「あ……あの、私も！　お兄さんの後輩ですから、頑張ります！」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「おっ、やっぱり意識してるじゃないですか～。サチちゃん、負けませんよ～！」
line = "「おっ、やっぱり意識してるじゃないですか～。サチちゃん、負けませんよ～！」"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「は、はい！　リーリア先輩！」
line = "「は、はい！　リーリア先輩！」"

[[dialogue]]
speaker = "unk"
# そうして、俺たちはシャドウヴィーナスに戦いを挑む――
line = "そうして、俺たちはシャドウヴィーナスに戦いを挑む――"

[[dialogue]]
speaker = "unk"
# はずだったのだが。
line = "はずだったのだが。"

[[dialogue]]
speaker = "？？？"
# 「ノヴァセイクリッドアロー！！」
line = "「ノヴァセイクリッドアロー！！」"

[[dialogue]]
speaker = "シャドウヴィーナス"
# 「――――！？」
line = "「――――！？」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「なっ……！？」
line = "「なっ……！？」"

[[dialogue]]
speaker = "アポロ"
# 「シャドウが臨戦態勢に入る前に、火力ゴリ押しで消し飛ばした……だと！？」
line = "「シャドウが臨戦態勢に入る前に、火力ゴリ押しで消し飛ばした……だと！？」"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「……凄いは凄いですけど、普通にズルじゃないですか？」
line = "「……凄いは凄いですけど、普通にズルじゃないですか？」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「やっぱり、偽物よりも本物の私の方が強いわね！」
line = "「やっぱり、偽物よりも本物の私の方が強いわね！」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「ヴィーナスさん！？」
line = "「ヴィーナスさん！？」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「フィオナ、どっちが短い時間でシャドウを倒せるかって話だったけど……」
line = "「フィオナ、どっちが短い時間でシャドウを倒せるかって話だったけど……」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「ごめんね！　やっぱりルールを変えましょう！」
line = "「ごめんね！　やっぱりルールを変えましょう！」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「えぇっ！？　どういうことですか！？」
line = "「えぇっ！？　どういうことですか！？」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「シャドウの代わりに本物の私がフィオナと戦うわ！　改めて、私と全力でバトルしましょう、フィオナ！」
line = "「シャドウの代わりに本物の私がフィオナと戦うわ！　改めて、私と全力でバトルしましょう、フィオナ！」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「いや、私、先程シャドウを倒したばかりで、正直色々限界で……！」
line = "「いや、私、先程シャドウを倒したばかりで、正直色々限界で……！」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「そうなの？　う～ん。じゃあ、そうね……」
line = "「そうなの？　う～ん。じゃあ、そうね……」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「クロトや他の星騎士も集まって来てるみたいだし、私がシャドウの代わりにラスボスをやるわ！」
line = "「クロトや他の星騎士も集まって来てるみたいだし、私がシャドウの代わりにラスボスをやるわ！」"

[[dialogue]]
speaker = "unk"
# まさかのここで無茶振り！？
line = "まさかのここで無茶振り！？"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「だからフィオナ、あなたも魔王としてみんなを率いて、限界を超えてみせなさい！」
line = "「だからフィオナ、あなたも魔王としてみんなを率いて、限界を超えてみせなさい！」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「限界を……超える」
line = "「限界を……超える」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「そうよ、フィオナ！　あなたの魔王の底力、私に見せてみなさい！」
line = "「そうよ、フィオナ！　あなたの魔王の底力、私に見せてみなさい！」"

[[dialogue]]
speaker = "unk"
# ヴィーナスの目には一点の曇りもなく、本気そのもの。
line = "ヴィーナスの目には一点の曇りもなく、本気そのもの。"

[[dialogue]]
speaker = "unk"
# いつも不思議に思うのだけれど――
line = "いつも不思議に思うのだけれど――"

[[dialogue]]
speaker = "unk"
# 彼女の言葉を受けると、何故か、無茶な時でもあと１歩前に踏み出してみようという『気力』が湧いて来るのだ。
line = "彼女の言葉を受けると、何故か、無茶な時でもあと１歩前に踏み出してみようという『気力』が湧いて来るのだ。"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「……わかりました」
line = "「……わかりました」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「その勝負、お受けします……！」
line = "「その勝負、お受けします……！」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「そう来なくっちゃ！」
line = "「そう来なくっちゃ！」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「さあ――ラスボス戦開始よ！！！」
line = "「さあ――ラスボス戦開始よ！！！」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「参ります！」
line = "「参ります！」"

[[dialogue]]
speaker = "unk"
# 両学園でそれぞれ最強と称される星騎士の対戦が、今、始まろうとしていた――
line = "両学園でそれぞれ最強と称される星騎士の対戦が、今、始まろうとしていた――"
