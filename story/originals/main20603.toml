[[dialogue]]
speaker = "unk"
# 第３話,ルヴィネ,B
line = "第３話,ルヴィネ,B"

[[dialogue]]
speaker = "スレイプニル"
# 「ブルルル……」
line = "「ブルルル……」"

[[dialogue]]
speaker = "unk"
# ヴィーナスの光条で貫かれたガーディアンが、塵となって消えていく。
line = "ヴィーナスの光条で貫かれたガーディアンが、塵となって消えていく。"

[[dialogue]]
speaker = "ヴィーナス"
# 「はぁ、はぁ……やっぱりこいつらの相手をするのはきついわね……」
line = "「はぁ、はぁ……やっぱりこいつらの相手をするのはきついわね……」"

[[dialogue]]
speaker = "クロト"
# 「ヴィーナス、大丈夫か？」
line = "「ヴィーナス、大丈夫か？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「大丈夫は大丈夫だけど、クロトこそ平気な顔してやせ我慢してない？　さっきもチナと戦ったばかりだし」
line = "「大丈夫は大丈夫だけど、クロトこそ平気な顔してやせ我慢してない？　さっきもチナと戦ったばかりだし」"

[[dialogue]]
speaker = "クロト"
# 「平気……と言いたいが、なかなかきついな……」
line = "「平気……と言いたいが、なかなかきついな……」"

[[dialogue]]
speaker = "unk"
# チナとの戦いのダメージだけでなく、リクリエの力を使ったせいで体が軋みを上げている。これ以上の連戦は厳しい。
line = "チナとの戦いのダメージだけでなく、リクリエの力を使ったせいで体が軋みを上げている。これ以上の連戦は厳しい。"

[[dialogue]]
speaker = "クロト"
# 「とにかく早くここを離れよう。きっとすぐに追手が来る──」
line = "「とにかく早くここを離れよう。きっとすぐに追手が来る──」"

[[dialogue]]
speaker = "クロト"
# 「──！！」
line = "「──！！」"

[[dialogue]]
speaker = "？？？"
# 「遠路はるばるご苦労様。初めまして、アルタイルからの来訪者さん」
line = "「遠路はるばるご苦労様。初めまして、アルタイルからの来訪者さん」"

[[dialogue]]
speaker = "unk"
# ガーディアンが現れた空からゆっくりと降り立ったのは、マントをまとった天使。
line = "ガーディアンが現れた空からゆっくりと降り立ったのは、マントをまとった天使。"

[[dialogue]]
speaker = "unk"
# 彼女はまるで見えない玉座から見下ろすごとく俺たちを睥睨し、冷たい視線を向ける。
line = "彼女はまるで見えない玉座から見下ろすごとく俺たちを睥睨し、冷たい視線を向ける。"

[[dialogue]]
speaker = "unk"
# その小さな体とは裏腹に、まとう威圧感は今まで相対してきた多くの強敵に匹敵する。
line = "その小さな体とは裏腹に、まとう威圧感は今まで相対してきた多くの強敵に匹敵する。"

[[dialogue]]
speaker = "クロト"
# （でも……何だろう、この感じ……）
line = "（でも……何だろう、この感じ……）"

[[dialogue]]
speaker = "unk"
# だけど彼女の存在を、どこかで知っているような……
line = "だけど彼女の存在を、どこかで知っているような……"

[[dialogue]]
speaker = "unk"
# 伝聞で知っていると、初対面でもそんな気がしないこともあるが、チナから断片的に聞いていたからだろうか……？
line = "伝聞で知っていると、初対面でもそんな気がしないこともあるが、チナから断片的に聞いていたからだろうか……？"

[[dialogue]]
speaker = "？？？"
# 「あなたが魔王──緋宮クロトね」
line = "「あなたが魔王──緋宮クロトね」"

[[dialogue]]
speaker = "ルヴィネ"
# 「同じ星徒会長として、一応挨拶させてもらうわ。私はルヴィネ。極星学園の星徒会長よ」
line = "「同じ星徒会長として、一応挨拶させてもらうわ。私はルヴィネ。極星学園の星徒会長よ」"

[[dialogue]]
speaker = "クロト"
# 「……挨拶ならこっちも返さないとな。新星学園の星徒会長、緋宮クロトだ」
line = "「……挨拶ならこっちも返さないとな。新星学園の星徒会長、緋宮クロトだ」"

[[dialogue]]
speaker = "クロト"
# 「ただしアルタイルの──な」
line = "「ただしアルタイルの──な」"

[[dialogue]]
speaker = "unk"
# まるで喉元に刃を突き付けられるような緊張感。
line = "まるで喉元に刃を突き付けられるような緊張感。"

[[dialogue]]
speaker = "unk"
# だが彼女と話をするなら今しかない。
line = "だが彼女と話をするなら今しかない。"

[[dialogue]]
speaker = "ヴィーナス"
# 「あなたが噂のルヴィネね！　私は新星星徒会のスーパーフィクサー、九浄ヴィーナスよ！　覚えておきなさい！」
line = "「あなたが噂のルヴィネね！　私は新星星徒会のスーパーフィクサー、九浄ヴィーナスよ！　覚えておきなさい！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……フィクサー？　それは星徒会の役職なの？」
line = "「……フィクサー？　それは星徒会の役職なの？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうよ！」
line = "「そうよ！」"

[[dialogue]]
speaker = "クロト"
# 「あー……ええと……」
line = "「あー……ええと……」"

[[dialogue]]
speaker = "unk"
# 当然、フィクサーは正式な役職ではない。ヴィーナスが自分で言っているだけである。
line = "当然、フィクサーは正式な役職ではない。ヴィーナスが自分で言っているだけである。"

[[dialogue]]
speaker = "ルヴィネ"
# 「正式な役職でないなら、それはただの平役員なのでは……？」
line = "「正式な役職でないなら、それはただの平役員なのでは……？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「フィクサーはフィクサーなの！　大事な仕事なんだから！」
line = "「フィクサーはフィクサーなの！　大事な仕事なんだから！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「フィクサーが重要な役目を持つ星徒会なんて、健全ではないと思うんだけど……まぁいいわ。余所の星徒会に口を出すつもりはないのだし」
line = "「フィクサーが重要な役目を持つ星徒会なんて、健全ではないと思うんだけど……まぁいいわ。余所の星徒会に口を出すつもりはないのだし」"

[[dialogue]]
speaker = "unk"
# 敵方の星徒会長から、至極全うな指摘をもらったところで──
line = "敵方の星徒会長から、至極全うな指摘をもらったところで──"

[[dialogue]]
speaker = "ルヴィネ"
# 「チナはどうなったの？　アルタイルに向かったはずだけど」
line = "「チナはどうなったの？　アルタイルに向かったはずだけど」"

[[dialogue]]
speaker = "クロト"
# 「チナなら生きてる。彼女がやろうとしたことは俺たちが止めた」
line = "「チナなら生きてる。彼女がやろうとしたことは俺たちが止めた」"

[[dialogue]]
speaker = "ルヴィネ"
# 「──そう」
line = "「──そう」"

[[dialogue]]
speaker = "unk"
# ルヴィネが頷く一瞬、表情がわずかに緩んだ……気がする。本当にわずかだけど。
line = "ルヴィネが頷く一瞬、表情がわずかに緩んだ……気がする。本当にわずかだけど。"

[[dialogue]]
speaker = "クロト"
# 「俺も少し話をしていいか？」
line = "「俺も少し話をしていいか？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……構わないわ。チナを助けてくれたみたいだから、その分は聞きましょう」
line = "「……構わないわ。チナを助けてくれたみたいだから、その分は聞きましょう」"

[[dialogue]]
speaker = "クロト"
# 「ありがとう。できるだけ手短にするよ」
line = "「ありがとう。できるだけ手短にするよ」"

[[dialogue]]
speaker = "クロト"
# 「君たち極星学園が、アルタイルと戦う理由はチナから聞いている」
line = "「君たち極星学園が、アルタイルと戦う理由はチナから聞いている」"

[[dialogue]]
speaker = "クロト"
# 「だけど俺は戦いに来たんじゃない。チナが持っていた転送装置を破壊した余波で、こっちの世界に飛ばされたんだ」
line = "「だけど俺は戦いに来たんじゃない。チナが持っていた転送装置を破壊した余波で、こっちの世界に飛ばされたんだ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「侵攻ではないと、そう言いたいのね」
line = "「侵攻ではないと、そう言いたいのね」"

[[dialogue]]
speaker = "クロト"
# 「ああ、俺たちはデネブを滅ぼす意志はない」
line = "「ああ、俺たちはデネブを滅ぼす意志はない」"

[[dialogue]]
speaker = "クロト"
# 「チナは言っていた。アルタイルを守ればデネブが、デネブを守ればアルタイルがリクリエの脅威に晒される。だからどちらかが滅びる必要があると」
line = "「チナは言っていた。アルタイルを守ればデネブが、デネブを守ればアルタイルがリクリエの脅威に晒される。だからどちらかが滅びる必要があると」"

[[dialogue]]
speaker = "クロト"
# 「だけど、敵は同じリクリエのはずだ。ならアルタイルとデネブが力を合わせてリクリエと戦うこともできるんじゃないのか？」
line = "「だけど、敵は同じリクリエのはずだ。ならアルタイルとデネブが力を合わせてリクリエと戦うこともできるんじゃないのか？」"

[[dialogue]]
speaker = "クロト"
# 「俺は新星学園の星徒会長として、アルタイルの星騎士として……アルタイルとデネブ、２つの世界で共にリクリエと戦うことを提案する！」
line = "「俺は新星学園の星徒会長として、アルタイルの星騎士として……アルタイルとデネブ、２つの世界で共にリクリエと戦うことを提案する！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# 沈黙したまま、値踏みするように俺に視線を注ぐルヴィネ。
line = "沈黙したまま、値踏みするように俺に視線を注ぐルヴィネ。"

[[dialogue]]
speaker = "unk"
# だがうんざりしたように嘆息して……
line = "だがうんざりしたように嘆息して……"

[[dialogue]]
speaker = "ルヴィネ"
# 「どんな話をするのかと思えば……聞くだけ無駄だったようね」
line = "「どんな話をするのかと思えば……聞くだけ無駄だったようね」"

[[dialogue]]
speaker = "ルヴィネ"
# 「子どものような理屈をこねないで。アルタイルとデネブが両方存在している限り、リクリエは永遠に終わらない」
line = "「子どものような理屈をこねないで。アルタイルとデネブが両方存在している限り、リクリエは永遠に終わらない」"

[[dialogue]]
speaker = "クロト"
# 「それは誰が言ってたんだ？」
line = "「それは誰が言ってたんだ？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「女神様よ。世界の真理を知っているとすれば、あの方以外におられないでしょう」
line = "「女神様よ。世界の真理を知っているとすれば、あの方以外におられないでしょう」"

[[dialogue]]
speaker = "クロト"
# 「女神様が？　本当にそう言ったのか？」
line = "「女神様が？　本当にそう言ったのか？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「私には女神様の声が聞こえるの。……と言っても、あなたたちには信じられないかもしれないけど」
line = "「私には女神様の声が聞こえるの。……と言っても、あなたたちには信じられないかもしれないけど」"

[[dialogue]]
speaker = "unk"
# 少なくとも、アルタイルで接した時や、セイファート元学園長の記憶では、女神はそんなことは言っていなかった。
line = "少なくとも、アルタイルで接した時や、セイファート元学園長の記憶では、女神はそんなことは言っていなかった。"

[[dialogue]]
speaker = "unk"
# それにヴィーナスがデネブからアルタイルに渡ったのは、おそらく女神によるもの。
line = "それにヴィーナスがデネブからアルタイルに渡ったのは、おそらく女神によるもの。"

[[dialogue]]
speaker = "unk"
# 平行世界同士の戦いが起こるなら、女神がそんなことをするだろうか……？
line = "平行世界同士の戦いが起こるなら、女神がそんなことをするだろうか……？"

[[dialogue]]
speaker = "クロト"
# 「それともう１つ。君はデネブを救った英雄だと聞いたが、どうやって成し遂げたんだ？」
line = "「それともう１つ。君はデネブを救った英雄だと聞いたが、どうやって成し遂げたんだ？」"

[[dialogue]]
speaker = "クロト"
# 「君を疑うようで悪いが、リクリエを退けるなんて、天使１人でできる所業とは思えない」
line = "「君を疑うようで悪いが、リクリエを退けるなんて、天使１人でできる所業とは思えない」"

[[dialogue]]
speaker = "ルヴィネ"
# 「女神様のお力よ。私はこの世界を守るべく、女神様から特別に力を授けられたの」
line = "「女神様のお力よ。私はこの世界を守るべく、女神様から特別に力を授けられたの」"

[[dialogue]]
speaker = "クロト"
# （セイファート元学園長のように……か？）
line = "（セイファート元学園長のように……か？）"

[[dialogue]]
speaker = "unk"
# かつてフィーニスの塔を制覇したセイファート元学園長は、女神から力を与えられた。
line = "かつてフィーニスの塔を制覇したセイファート元学園長は、女神から力を与えられた。"

[[dialogue]]
speaker = "unk"
# だがその彼をもってしても、単身で世界を救えるほどの力かと言われれば疑問だ。
line = "だがその彼をもってしても、単身で世界を救えるほどの力かと言われれば疑問だ。"

[[dialogue]]
speaker = "ルヴィネ"
# 「問答は終わりかしら？　であれば……極星学園の星徒会長として、デネブの敵であるあなたたちを処断するわ」
line = "「問答は終わりかしら？　であれば……極星学園の星徒会長として、デネブの敵であるあなたたちを処断するわ」"

[[dialogue]]
speaker = "クロト"
# 「──ッ！」
line = "「──ッ！」"

[[dialogue]]
speaker = "unk"
# ルヴィネが手をかざすだけで衝撃が吹き荒れる。
line = "ルヴィネが手をかざすだけで衝撃が吹き荒れる。"

[[dialogue]]
speaker = "unk"
# 咄嗟に星力を放出して防御していなければ、軽く消し飛ばされていただろう。
line = "咄嗟に星力を放出して防御していなければ、軽く消し飛ばされていただろう。"

[[dialogue]]
speaker = "クロト"
# 「く……変身せずにこの力か……」
line = "「く……変身せずにこの力か……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ちょっと、星騎士のくせに変身もしないで相手にするつもり！？　あなた極星学園の星徒会長なんでしょ！」
line = "「ちょっと、星騎士のくせに変身もしないで相手にするつもり！？　あなた極星学園の星徒会長なんでしょ！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「あなたたち相手に変身する必要なんてないわ」
line = "「あなたたち相手に変身する必要なんてないわ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「もう、ムカつくちみっ子ね！　怪我しても知らないんだから！」
line = "「もう、ムカつくちみっ子ね！　怪我しても知らないんだから！」"

[[dialogue]]
speaker = "unk"
# 世界を守るためにも、ヴィーナスたちを守るためにも、今やられるわけにはいかない。
line = "世界を守るためにも、ヴィーナスたちを守るためにも、今やられるわけにはいかない。"

[[dialogue]]
speaker = "unk"
# ルヴィネを全力で迎え撃つ……！
line = "ルヴィネを全力で迎え撃つ……！"
