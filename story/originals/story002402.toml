[[dialogue]]
speaker = "unk"
# まるで以前のフィオナの時のように、突然トワ先生の戦闘服がウェディングドレス風に変化していた。
line = "まるで以前のフィオナの時のように、突然トワ先生の戦闘服がウェディングドレス風に変化していた。"

[[dialogue]]
speaker = "unk"
# 驚きの出来事ではあったが、とにもかくにも目の前の敵を何とかしなければならない。
line = "驚きの出来事ではあったが、とにもかくにも目の前の敵を何とかしなければならない。"

[[dialogue]]
speaker = "unk"
# 気を取り直してモンスターと対峙する。だが──
line = "気を取り直してモンスターと対峙する。だが──"

[[dialogue]]
speaker = "トワ先生"
# 「勝てちゃった……しかもあっさりと……」
line = "「勝てちゃった……しかもあっさりと……」"

[[dialogue]]
speaker = "マトイ"
# 「すごいですよ、トワちゃん先生！　まさか援軍が来る前に片がついちゃうとは思いませんでした」
line = "「すごいですよ、トワちゃん先生！　まさか援軍が来る前に片がついちゃうとは思いませんでした」"

[[dialogue]]
speaker = "トワ先生"
# 「う、うん。自分でもびっくりだよ」
line = "「う、うん。自分でもびっくりだよ」"

[[dialogue]]
speaker = "トワ先生"
# 「ノヴァフォームほど爆発的な力はないけれど、すごく安定してる……」
line = "「ノヴァフォームほど爆発的な力はないけれど、すごく安定してる……」"

[[dialogue]]
speaker = "マトイ"
# 「これが研究中だったウェディングフォームなんですか？」
line = "「これが研究中だったウェディングフォームなんですか？」"

[[dialogue]]
speaker = "トワ先生"
# 「えーっと、どうなんだろ？　正直わたしも、なんでこんな事になっちゃったのか分かんなくて、混乱してて……」
line = "「えーっと、どうなんだろ？　正直わたしも、なんでこんな事になっちゃったのか分かんなくて、混乱してて……」"

[[dialogue]]
speaker = "unk"
# すごく似合ってます
line = "すごく似合ってます"

[[dialogue]]
speaker = "unk"
# 綺麗です
line = "綺麗です"

[[dialogue]]
speaker = "トワ先生"
# 「えっ？　そ、そうかな～？　自分じゃよくわからないんだけど」
line = "「えっ？　そ、そうかな～？　自分じゃよくわからないんだけど」"

[[dialogue]]
speaker = "マトイ"
# 「写真撮りますね。そしたら全身像を確認できますし」
line = "「写真撮りますね。そしたら全身像を確認できますし」"

[[dialogue]]
speaker = "トワ先生"
# 「ん～、そっかぁ。そだよね……確認は大事だし……じゃあ、お願いしちゃおうかなっ」
line = "「ん～、そっかぁ。そだよね……確認は大事だし……じゃあ、お願いしちゃおうかなっ」"

[[dialogue]]
speaker = "マトイ"
# 「そうだ、せっかくだし会長も並んで並んで♪」
line = "「そうだ、せっかくだし会長も並んで並んで♪」"

[[dialogue]]
speaker = "トワ先生"
# 「どど、どうして会長くんを隣に！？」
line = "「どど、どうして会長くんを隣に！？」"

[[dialogue]]
speaker = "マトイ"
# 「素敵なウェディングドレスだから、新郎役がいた方がそれっぽいかなって」
line = "「素敵なウェディングドレスだから、新郎役がいた方がそれっぽいかなって」"

[[dialogue]]
speaker = "トワ先生"
# 「か、会長くん……」
line = "「か、会長くん……」"

[[dialogue]]
speaker = "マトイ"
# 「じゃあ撮りまーす！」
line = "「じゃあ撮りまーす！」"

[[dialogue]]
speaker = "マトイ"
# 「はいっ、撮れました。さっそくデータを送信しますね」
line = "「はいっ、撮れました。さっそくデータを送信しますね」"

[[dialogue]]
speaker = "トワ先生"
# 「わぁ、ほんとにウェディングドレスだね。これがわたし……？」
line = "「わぁ、ほんとにウェディングドレスだね。これがわたし……？」"

[[dialogue]]
speaker = "マトイ"
# 「とってもよくお似合いです！」
line = "「とってもよくお似合いです！」"

[[dialogue]]
speaker = "トワ先生"
# 「そ、そうかなぁ？　ちょっと無理があるような……でもでもっ、会長くんが隣にいるおかげで、本当に花嫁さんっぽいかも……」
line = "「そ、そうかなぁ？　ちょっと無理があるような……でもでもっ、会長くんが隣にいるおかげで、本当に花嫁さんっぽいかも……」"

[[dialogue]]
speaker = "マトイ"
# 「でもどうして、いきなり戦闘服がドレスになっちゃったんだろ」
line = "「でもどうして、いきなり戦闘服がドレスになっちゃったんだろ」"

[[dialogue]]
speaker = "トワ先生"
# 「フィオナちゃんたちの時もそうだったんだよね……とにかく九浄家に行って理事長に報告しないと」
line = "「フィオナちゃんたちの時もそうだったんだよね……とにかく九浄家に行って理事長に報告しないと」"

[[dialogue]]
speaker = "ヘレナ"
# 「ほぅ……ほほぅ……」
line = "「ほぅ……ほほぅ……」"

[[dialogue]]
speaker = "ヘレナ"
# 「素晴らしい！　これが貴殿の研究成果という訳だな？」
line = "「素晴らしい！　これが貴殿の研究成果という訳だな？」"

[[dialogue]]
speaker = "トワ先生"
# 「い、いえ、こちらはあくまで偶然の産物と言いますか、わたしにとっても想定外のことで……」
line = "「い、いえ、こちらはあくまで偶然の産物と言いますか、わたしにとっても想定外のことで……」"

[[dialogue]]
speaker = "トワ先生"
# 「こちらに向かう途中でアステラに遭遇し、それに対処しようと変身したらこうなってしまったんです」
line = "「こちらに向かう途中でアステラに遭遇し、それに対処しようと変身したらこうなってしまったんです」"

[[dialogue]]
speaker = "トワ先生"
# 「元々の戦闘服が勝手にこのドレスと差し替わってしまったみたいで、なぜ急にこんなことが起きてしまったのか……」
line = "「元々の戦闘服が勝手にこのドレスと差し替わってしまったみたいで、なぜ急にこんなことが起きてしまったのか……」"

[[dialogue]]
speaker = "ヘレナ"
# 「既視感があるな。星見家で起きた件と全く同じではないか？」
line = "「既視感があるな。星見家で起きた件と全く同じではないか？」"

[[dialogue]]
speaker = "トワ先生"
# 「はい……」
line = "「はい……」"

[[dialogue]]
speaker = "ヘレナ"
# 「ウェディングフォームについては我が九浄家でも研究を進めてきた。一定の成果は得られていたが、しかし完全な究明には未だ至っていない」
line = "「ウェディングフォームについては我が九浄家でも研究を進めてきた。一定の成果は得られていたが、しかし完全な究明には未だ至っていない」"

[[dialogue]]
speaker = "トワ先生"
# 「わたしも同じです。表面的な模倣は可能なラインに近づきつつあったんですが、肝心の所はまったく……」
line = "「わたしも同じです。表面的な模倣は可能なラインに近づきつつあったんですが、肝心の所はまったく……」"

[[dialogue]]
speaker = "ヘレナ"
# 「ふむ……では今回のことは、行き詰まった謎を解明する手がかりになるかもしれぬ、ということだな」
line = "「ふむ……では今回のことは、行き詰まった謎を解明する手がかりになるかもしれぬ、ということだな」"

[[dialogue]]
speaker = "ヘレナ"
# 「蘭美、ヨミ」
line = "「蘭美、ヨミ」"

[[dialogue]]
speaker = "蘭美"
# 「お呼びでしょうか、当主様？」
line = "「お呼びでしょうか、当主様？」"

[[dialogue]]
speaker = "ヘレナ"
# 「うむ。２人とも、お客人にアレを見せてやってくれ」
line = "「うむ。２人とも、お客人にアレを見せてやってくれ」"

[[dialogue]]
speaker = "蘭美"
# 「かしこまりました。いくわよ、ヨミ」
line = "「かしこまりました。いくわよ、ヨミ」"

[[dialogue]]
speaker = "ヨミ"
# 「はいっ！」
line = "「はいっ！」"

[[dialogue]]
speaker = "マトイ"
# 「こ、これ！　新しい人工戦闘服ですか！？　ウェディングフォームですよね、しかも和風の！」
line = "「こ、これ！　新しい人工戦闘服ですか！？　ウェディングフォームですよね、しかも和風の！」"

[[dialogue]]
speaker = "トワ先生"
# 「白無垢だね。すごい……とっても似合ってる」
line = "「白無垢だね。すごい……とっても似合ってる」"

[[dialogue]]
speaker = "unk"
# なんで白無垢なんですか？
line = "なんで白無垢なんですか？"

[[dialogue]]
speaker = "ヘレナ"
# 「星見家がスタンダードなウェディングドレスなら、こちらは白無垢にしてはどうかと思ったのだ」
line = "「星見家がスタンダードなウェディングドレスなら、こちらは白無垢にしてはどうかと思ったのだ」"

[[dialogue]]
speaker = "蘭美"
# 「九浄家メイド隊といえばやっぱり和装よ」
line = "「九浄家メイド隊といえばやっぱり和装よ」"

[[dialogue]]
speaker = "ヨミ"
# 「白無垢なんてちょっぴり照れちゃいますけど」
line = "「白無垢なんてちょっぴり照れちゃいますけど」"

[[dialogue]]
speaker = "ヘレナ"
# 「これが現段階でのこちら側での成果だ。しかし、まだ足りぬ。ウェディングフォームに匹敵するものを作るには、更なる研究が必要であろう」
line = "「これが現段階でのこちら側での成果だ。しかし、まだ足りぬ。ウェディングフォームに匹敵するものを作るには、更なる研究が必要であろう」"

[[dialogue]]
speaker = "ヘレナ"
# 「貴殿が偶然にもウェディングフォームを獲得したのは、またとない好機だ」
line = "「貴殿が偶然にもウェディングフォームを獲得したのは、またとない好機だ」"

[[dialogue]]
speaker = "ヘレナ"
# 「どうだろう、あらためて新フォームの研究に助力を願いたいのだが？」
line = "「どうだろう、あらためて新フォームの研究に助力を願いたいのだが？」"

[[dialogue]]
speaker = "トワ先生"
# 「もちろんです、是非お手伝いさせて下さい！」
line = "「もちろんです、是非お手伝いさせて下さい！」"
