[[dialogue]]
speaker = "ここあ"
# 「そういう意味では、ここあも『トレちぇり』ちょっと気になってきたかも～。あとはファッションの流行とか！」
line = "「そういう意味では、ここあも『トレちぇり』ちょっと気になってきたかも～。あとはファッションの流行とか！」"

