speaker = "いろは"
# 「服屋さんはちょっとわかんないけど、『トレちぇり』なら絶対ある！　……そう、ここ秋葉原ならね！！」
line = "「服屋さんはちょっとわかんないけど、『トレちぇり』なら絶対ある！　……そう、ここ秋葉原ならね！！」"

[[dialogue]]
speaker = "ここあ"
# 「まあ、服はお店に行かなくても、街ゆく人を見れば流行はなんとなく掴めるしね～。それで、何か『トレちぇり』関係の買い物がある感じ？」
line = "「まあ、服はお店に行かなくても、街ゆく人を見れば流行はなんとなく掴めるしね～。それで、何か『トレちぇり』関係の買い物がある感じ？」"

[[dialogue]]
speaker = "いろは"
