[[dialogue]]
speaker = "unk"
# 第３話,絆の形は違っても,P
line = "第３話,絆の形は違っても,P"

[[dialogue]]
speaker = "unk"
# 星霊祭以来、ヒルディオーネはよくマハムートと一緒に、戦闘訓練をするようになっていた――
line = "星霊祭以来、ヒルディオーネはよくマハムートと一緒に、戦闘訓練をするようになっていた――"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「マム！　もう１戦行きますわよ！」
line = "「マム！　もう１戦行きますわよ！」"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「やれやれ、体力だけは化け物級ね……来なさい！」
line = "「やれやれ、体力だけは化け物級ね……来なさい！」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「その体力で押し切って、今度こそ１本取ってみせましてよ！　――はああぁっ！」
line = "「その体力で押し切って、今度こそ１本取ってみせましてよ！　――はああぁっ！」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「――よっし！　おーっほっほっほ♪　最後の１本は私の勝ちですわ～♪」
line = "「――よっし！　おーっほっほっほ♪　最後の１本は私の勝ちですわ～♪」"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「はぁ……全く、そのミーティアフォームの持続力はとんでもないわね……」
line = "「はぁ……全く、そのミーティアフォームの持続力はとんでもないわね……」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「それについてくるマムも、さすがは私の宿命のライバルですわ。戦闘訓練に付き合って下さって、感謝しておりましてよ♪」
line = "「それについてくるマムも、さすがは私の宿命のライバルですわ。戦闘訓練に付き合って下さって、感謝しておりましてよ♪」"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「もっと強くなりたいから協力して欲しいって、畏怖をもって真剣に頭を下げてくるんだもの。そこまでされたら、私だって考えるわよ。それに――」
line = "「もっと強くなりたいから協力して欲しいって、畏怖をもって真剣に頭を下げてくるんだもの。そこまでされたら、私だって考えるわよ。それに――」"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「断ったら、変に意地を張ってるみたいで……負けた気になるじゃない」
line = "「断ったら、変に意地を張ってるみたいで……負けた気になるじゃない」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「マム……！　ありがとうございますわ♪」
line = "「マム……！　ありがとうございますわ♪」"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「っ……お礼なんて言わなくていいから。私の方ももっと強くなる為に、あなたをせいぜい利用させてもらうっていうだけよ」
line = "「っ……お礼なんて言わなくていいから。私の方ももっと強くなる為に、あなたをせいぜい利用させてもらうっていうだけよ」"

[[dialogue]]
speaker = "unk"
# 顔を背けながら、手をひらひらと振ってみせるマハムート。
line = "顔を背けながら、手をひらひらと振ってみせるマハムート。"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「あっ、そうですわ！　訓練ついでに、またマムに相談に乗って欲しいことがありましたの！」
line = "「あっ、そうですわ！　訓練ついでに、またマムに相談に乗って欲しいことがありましたの！」"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「恋愛相談なら断るわよ」
line = "「恋愛相談なら断るわよ」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「ですわ！？　何故ですの！？　前は親身になって聞いてくれておりましたのに！」
line = "「ですわ！？　何故ですの！？　前は親身になって聞いてくれておりましたのに！」"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「いちいちあなたが変なことを聞いてくるからでしょ？　私のＤＩＳＣの電話履歴、あなたの名前で９割くらい埋まってるんだけど？」
line = "「いちいちあなたが変なことを聞いてくるからでしょ？　私のＤＩＳＣの電話履歴、あなたの名前で９割くらい埋まってるんだけど？」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「私の相談はどれも大真面目でしてよ！　会長に相応しい恋人となる為、淑女として日々努力していかねばなりませんもの！」
line = "「私の相談はどれも大真面目でしてよ！　会長に相応しい恋人となる為、淑女として日々努力していかねばなりませんもの！」"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「……はぁ、わかったわよ。仕方ないから聞いてあげるわ。それで？　今度は何を悩んでいるのかしら？」
line = "「……はぁ、わかったわよ。仕方ないから聞いてあげるわ。それで？　今度は何を悩んでいるのかしら？」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「実は……『絆の力』についてですの！」
line = "「実は……『絆の力』についてですの！」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「――私、ミーティアフォームになったことは後悔しておりませんわ。おりませんけれど……」
line = "「――私、ミーティアフォームになったことは後悔しておりませんわ。おりませんけれど……」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「それはそれとして、マムや他の子が会長と絆の力を結んでノヴァフォームになっているのに、恋人の私がそれを結べていないことは、気になるのですわ！」
line = "「それはそれとして、マムや他の子が会長と絆の力を結んでノヴァフォームになっているのに、恋人の私がそれを結べていないことは、気になるのですわ！」"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「……だそうよ、<b>会長</b>？」
line = "「……だそうよ、<b>会長</b>？」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「えっ？」
line = "「えっ？」"

[[dialogue]]
speaker = "unk"
# なるほど……
line = "なるほど……"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「ですわ！？　会長、いらっしゃっておりましたの！？　一体いつから……」
line = "「ですわ！？　会長、いらっしゃっておりましたの！？　一体いつから……」"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「ついさっきよ。だから仕方なく、あなたの悩みを聞いてあげることにしたの」
line = "「ついさっきよ。だから仕方なく、あなたの悩みを聞いてあげることにしたの」"

[[dialogue]]
speaker = "unk"
# 先輩、このあと少しいいですか？
line = "先輩、このあと少しいいですか？"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「は、はいですの……」
line = "「は、はいですの……」"

[[dialogue]]
speaker = "unk"
# それから俺は、ヒルディー先輩の手を引いて、リゾート結界のプライベートビーチへとやって来ていた。
line = "それから俺は、ヒルディー先輩の手を引いて、リゾート結界のプライベートビーチへとやって来ていた。"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「あの、会長、ここへ連れて来たのは一体……？」
line = "「あの、会長、ここへ連れて来たのは一体……？」"

[[dialogue]]
speaker = "unk"
# 俺は彼女の両肩に手を添えると、そっと顔を寄せて。
line = "俺は彼女の両肩に手を添えると、そっと顔を寄せて。"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「あっ……！　んっ……<emoji=heart04>　ちゅっ……<emoji=heart04>」
line = "「あっ……！　んっ……<emoji=heart04>　ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「――んっ<emoji=heart04>　はあぁっ……<emoji=heart04>　会長、いきなりキスされたら、驚いて息が止まってしまいますわ……<emoji=heart04>」
line = "「――んっ<emoji=heart04>　はあぁっ……<emoji=heart04>　会長、いきなりキスされたら、驚いて息が止まってしまいますわ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ごめん。でも、すぐに伝えたくなって……
line = "ごめん。でも、すぐに伝えたくなって……"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「え？　伝える……？」
line = "「え？　伝える……？」"

[[dialogue]]
speaker = "unk"
# ――ヒルディーがノヴァフォームにならなかったとしても、関係ない。
line = "――ヒルディーがノヴァフォームにならなかったとしても、関係ない。"

[[dialogue]]
speaker = "unk"
# 俺はヒルディーとの絆が、他の誰よりもいちばん大きいと信じている。
line = "俺はヒルディーとの絆が、他の誰よりもいちばん大きいと信じている。"

[[dialogue]]
speaker = "unk"
# ヒルディーは……違ったかな？
line = "ヒルディーは……違ったかな？"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「会長……<emoji=heart04>　いいえ、そんなことありませんわ」
line = "「会長……<emoji=heart04>　いいえ、そんなことありませんわ」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「あなたがそう言って下さるなら……私、もう迷いませんの。誰よりもあなたとの愛の絆が強いって、信じてみせますわ<emoji=heart04>」
line = "「あなたがそう言って下さるなら……私、もう迷いませんの。誰よりもあなたとの愛の絆が強いって、信じてみせますわ<emoji=heart04>」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「ん……<emoji=heart04>　ちゅっ……<emoji=heart04>」
line = "「ん……<emoji=heart04>　ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# それから、俺たちはまたキスをして、体の熱が落ち着くまで、お互いの絆を確かめ合うのだった――
line = "それから、俺たちはまたキスをして、体の熱が落ち着くまで、お互いの絆を確かめ合うのだった――"
