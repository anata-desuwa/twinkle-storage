[[dialogue]]
speaker = "unk"
# リクリエの本波を退けてからも、俺たち星騎士の戦いは続いていた。
line = "リクリエの本波を退けてからも、俺たち星騎士の戦いは続いていた。"

[[dialogue]]
speaker = "unk"
# 特に最近は、従来の生物型モンスターではなく、堅牢な耐久性を持つ機械型モンスターの出現頻度が上昇している。
line = "特に最近は、従来の生物型モンスターではなく、堅牢な耐久性を持つ機械型モンスターの出現頻度が上昇している。"

[[dialogue]]
speaker = "unk"
# 手練れのプリマステラでも危険を伴う相手──しかし俺たち星騎士も、指を咥えているばかりじゃない。
line = "手練れのプリマステラでも危険を伴う相手──しかし俺たち星騎士も、指を咥えているばかりじゃない。"

[[dialogue]]
speaker = "unk"
# 星騎士のさらなる潜在能力を引き出す『ノヴァフォーム』。
line = "星騎士のさらなる潜在能力を引き出す『ノヴァフォーム』。"

[[dialogue]]
speaker = "unk"
# 研鑽を積んだ上で、精神的なブレイクスルーを成し得た星騎士に、魔王の力を注ぐことで解放できる新型戦闘フォームである。
line = "研鑽を積んだ上で、精神的なブレイクスルーを成し得た星騎士に、魔王の力を注ぐことで解放できる新型戦闘フォームである。"

[[dialogue]]
speaker = "unk"
# ……ノヴァフォームについては、使い手が増えたことで多少の研究が進んだ。
line = "……ノヴァフォームについては、使い手が増えたことで多少の研究が進んだ。"

[[dialogue]]
speaker = "unk"
# 瞬間的な出力は既存の戦闘服を大きく凌駕するものの、星力の燃費が悪く、長期戦闘には向かない。
line = "瞬間的な出力は既存の戦闘服を大きく凌駕するものの、星力の燃費が悪く、長期戦闘には向かない。"

[[dialogue]]
speaker = "unk"
# 変身を解いた後の疲労もかなりのものであるらしく、使用者に大きな負荷を強いる。
line = "変身を解いた後の疲労もかなりのものであるらしく、使用者に大きな負荷を強いる。"

[[dialogue]]
speaker = "unk"
# しかし、そうしたデメリットを踏まえてもなお、機械型モンスターへの有効な攻撃手段であることは間違いなかった。
line = "しかし、そうしたデメリットを踏まえてもなお、機械型モンスターへの有効な攻撃手段であることは間違いなかった。"

[[dialogue]]
speaker = "unk"
# 現在、新星星徒会は、ノヴァフォームを獲得した星騎士を増やすことが喫緊の課題となっている。
line = "現在、新星星徒会は、ノヴァフォームを獲得した星騎士を増やすことが喫緊の課題となっている。"

[[dialogue]]
speaker = "unk"
# だから俺は今日も、彼女の訓練に付き合っていた──
line = "だから俺は今日も、彼女の訓練に付き合っていた──"

[[dialogue]]
speaker = "アナ"
# 「赤き惑星の力、ここに──スカーレットシータ！」
line = "「赤き惑星の力、ここに──スカーレットシータ！」"

[[dialogue]]
speaker = "アナ"
# 「……ふう。会長、今日も訓練に付き合っていただき、ありがとうございました」
line = "「……ふう。会長、今日も訓練に付き合っていただき、ありがとうございました」"

[[dialogue]]
speaker = "アナ"
# 「昨日の反省を生かして、攻め手を変えてみたのですが……どうでしょう？」
line = "「昨日の反省を生かして、攻め手を変えてみたのですが……どうでしょう？」"

[[dialogue]]
speaker = "アナ"
# 「ノヴァフォーム覚醒の兆しとなる輝きは、私の中に見えるでしょうか？」
line = "「ノヴァフォーム覚醒の兆しとなる輝きは、私の中に見えるでしょうか？」"

[[dialogue]]
speaker = "unk"
# ノヴァフォームを得るために行使する魔王の力──『アルケインノヴァエクストリーム』。
line = "ノヴァフォームを得るために行使する魔王の力──『アルケインノヴァエクストリーム』。"

[[dialogue]]
speaker = "unk"
# 覚醒が可能になった星騎士には、俺にだけ感知することができる『魂の輝き』が見えるのだが……
line = "覚醒が可能になった星騎士には、俺にだけ感知することができる『魂の輝き』が見えるのだが……"

[[dialogue]]
speaker = "アナ"
# 「むむ……そのお顔を見るに、私はまだ覚醒には至れないようですね。残念です」
line = "「むむ……そのお顔を見るに、私はまだ覚醒には至れないようですね。残念です」"

[[dialogue]]
speaker = "アナ"
# 「こうして放課後は毎日、会長とマンツーマンの特訓をしていますが……道はなかなかに険しそうですね」
line = "「こうして放課後は毎日、会長とマンツーマンの特訓をしていますが……道はなかなかに険しそうですね」"

[[dialogue]]
speaker = "アナ"
# 「でも焦っても仕方がありません。仮説と実践を繰り返し、今後も邁進していきたいと思います」
line = "「でも焦っても仕方がありません。仮説と実践を繰り返し、今後も邁進していきたいと思います」"

[[dialogue]]
speaker = "サーシャ"
# 「２人とも、お疲れ様～♪」
line = "「２人とも、お疲れ様～♪」"

[[dialogue]]
speaker = "マトイ"
# 「昨日よりも動きが良くなってたと思うよ！　アナ、これからも頑張って！」
line = "「昨日よりも動きが良くなってたと思うよ！　アナ、これからも頑張って！」"

[[dialogue]]
speaker = "アナ"
# 「イエス。先輩方の足を引っ張らないよう、全力を尽くす所存です。つきましては、頑張ったのでご褒美をください」
line = "「イエス。先輩方の足を引っ張らないよう、全力を尽くす所存です。つきましては、頑張ったのでご褒美をください」"

[[dialogue]]
speaker = "サーシャ"
# 「もちろんよ～。疲れてるだろうし、お姉ちゃんがぎゅーってしてあげる～<emoji=heart04>」
line = "「もちろんよ～。疲れてるだろうし、お姉ちゃんがぎゅーってしてあげる～<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
# 「アナの大好きな和菓子、用意してあるよ。今日はこし餡たっぷりのおまんじゅう。食べる？」
line = "「アナの大好きな和菓子、用意してあるよ。今日はこし餡たっぷりのおまんじゅう。食べる？」"

[[dialogue]]
speaker = "アナ"
# 「厳正なる審査の結果、マトイ先輩を今日のＭＶＰとします。花より団子、ハグよりも和菓子」
line = "「厳正なる審査の結果、マトイ先輩を今日のＭＶＰとします。花より団子、ハグよりも和菓子」"

[[dialogue]]
speaker = "サーシャ"
# 「あーん、またおまんじゅうに負けちゃったわ～……お姉ちゃん、悔しいっ！」
line = "「あーん、またおまんじゅうに負けちゃったわ～……お姉ちゃん、悔しいっ！」"

[[dialogue]]
speaker = "マトイ"
# 「いい加減諦めましょう。アナの中で和菓子は絶対の１位なんですから……」
line = "「いい加減諦めましょう。アナの中で和菓子は絶対の１位なんですから……」"

[[dialogue]]
speaker = "サーシャ"
# 「いつの日かお姉ちゃんの愛が、和菓子に打ち勝つ日がくると思ってるのに～。しょんぼりだわ～……」
line = "「いつの日かお姉ちゃんの愛が、和菓子に打ち勝つ日がくると思ってるのに～。しょんぼりだわ～……」"

[[dialogue]]
speaker = "アナ"
# 「もぐもぐ。その愛は実りません。もぐもぐもぐ」
line = "「もぐもぐ。その愛は実りません。もぐもぐもぐ」"

[[dialogue]]
speaker = "アナ"
# 「はぁ……やはり薄皮のおまんじゅうには、舌触りのなめらかなこし餡がベストマッチ。糖分で疲れも吹き飛びます♪」
line = "「はぁ……やはり薄皮のおまんじゅうには、舌触りのなめらかなこし餡がベストマッチ。糖分で疲れも吹き飛びます♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「たっだいま～！　パトロールから帰ったわ！　アナ、調子はどう？」
line = "「たっだいま～！　パトロールから帰ったわ！　アナ、調子はどう？」"

[[dialogue]]
speaker = "アナ"
# 「もぐもぐ。残念ながらおまんじゅうの他に、何の成果も得られませんでした」
line = "「もぐもぐ。残念ながらおまんじゅうの他に、何の成果も得られませんでした」"

[[dialogue]]
speaker = "ヴィーナス"
# 「昨日と同じってわけねー。んー、一体全体、ノヴァフォームを得るための条件って何なのかしら？」
line = "「昨日と同じってわけねー。んー、一体全体、ノヴァフォームを得るための条件って何なのかしら？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「新星星徒会の中でも、まだ覚醒してないのは私とアナだけだし。焦るわね……！」
line = "「新星星徒会の中でも、まだ覚醒してないのは私とアナだけだし。焦るわね……！」"

[[dialogue]]
speaker = "マトイ"
# 「って言ってもヴィーナスは素のままで、ノヴァフォームの私と同じくらいの火力を出しちゃってる気もするんだけど……」
line = "「って言ってもヴィーナスは素のままで、ノヴァフォームの私と同じくらいの火力を出しちゃってる気もするんだけど……」"

[[dialogue]]
speaker = "マトイ"
# 「この前も、機械型モンスターを私と一緒に倒してたのに、撃破数が同じだったし！」
line = "「この前も、機械型モンスターを私と一緒に倒してたのに、撃破数が同じだったし！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あいつ滅茶苦茶硬いわよね！？　ビームの撃ちすぎでクタクタになっちゃうから嫌いだわ」
line = "「あいつ滅茶苦茶硬いわよね！？　ビームの撃ちすぎでクタクタになっちゃうから嫌いだわ」"

[[dialogue]]
speaker = "アナ"
# 「前会長は色々と規格外ですから……もぐもぐ。そういうわけで現状、一番足を引っ張ってるのは私です。焦りますね……もぐもぐ」
line = "「前会長は色々と規格外ですから……もぐもぐ。そういうわけで現状、一番足を引っ張ってるのは私です。焦りますね……もぐもぐ」"

[[dialogue]]
speaker = "マトイ"
# 「あんまり焦ってる感じがしない……！」
line = "「あんまり焦ってる感じがしない……！」"

[[dialogue]]
speaker = "アナ"
# 「──ごくん。まあ、他にも色々と搦め手を講じていますから」
line = "「──ごくん。まあ、他にも色々と搦め手を講じていますから」"

[[dialogue]]
speaker = "ヴィーナス"
# 「カラメテ？　新しい和菓子かしら？」
line = "「カラメテ？　新しい和菓子かしら？」"

[[dialogue]]
speaker = "マトイ"
# 「正攻法とは違う作戦って意味だよ、ヴィーナス」
line = "「正攻法とは違う作戦って意味だよ、ヴィーナス」"

[[dialogue]]
speaker = "アナ"
# 「機械型モンスターの守備力は堅牢の一言。それなのに出現数は増加の一途をたどってる」
line = "「機械型モンスターの守備力は堅牢の一言。それなのに出現数は増加の一途をたどってる」"

[[dialogue]]
speaker = "アナ"
# 「だからこそ、戦闘力が飛びぬけていない星騎士でも、戦える体制を整えるべきだと考えました」
line = "「だからこそ、戦闘力が飛びぬけていない星騎士でも、戦える体制を整えるべきだと考えました」"

[[dialogue]]
speaker = "アナ"
# 「実は数日前から、機械型モンスターを弱らせる薬品の生成を、アニマ先輩に依頼しています」
line = "「実は数日前から、機械型モンスターを弱らせる薬品の生成を、アニマ先輩に依頼しています」"

[[dialogue]]
speaker = "マトイ"
# 「なるほど……！　困った時の錬金術ってわけだね」
line = "「なるほど……！　困った時の錬金術ってわけだね」"

[[dialogue]]
speaker = "アナ"
# 「はい。この後、購買部で会う約束です。というわけで会長、一緒に行きましょう」
line = "「はい。この後、購買部で会う約束です。というわけで会長、一緒に行きましょう」"

[[dialogue]]
speaker = "アナ"
# 「会長に試したい新薬があるそうなので。副作用があったらすまないネ～、と言っていました」
line = "「会長に試したい新薬があるそうなので。副作用があったらすまないネ～、と言っていました」"

[[dialogue]]
speaker = "unk"
# また女の子になっちゃう……
line = "また女の子になっちゃう……"

[[dialogue]]
speaker = "ヴィーナス"
# 「大丈夫！　クロトは女の子になっても可愛いから！！」
line = "「大丈夫！　クロトは女の子になっても可愛いから！！」"

[[dialogue]]
speaker = "unk"
# 何も大丈夫じゃないが？？？
line = "何も大丈夫じゃないが？？？"

[[dialogue]]
speaker = "マトイ"
# 「あはは……頑張ってね、会長」
line = "「あはは……頑張ってね、会長」"

[[dialogue]]
speaker = "サーシャ"
# 「行ってらっしゃ～い<emoji=heart04>」
line = "「行ってらっしゃ～い<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そういうわけで、俺はアナと共に、アニマ先輩の待つ購買部へと向かったのだが──
line = "そういうわけで、俺はアナと共に、アニマ先輩の待つ購買部へと向かったのだが──"

[[dialogue]]
speaker = "シュティレ"
# 「いらっしゃいませ、お待ちしておりました」
line = "「いらっしゃいませ、お待ちしておりました」"

[[dialogue]]
speaker = "シュティレ"
# 「お初にお目にかかります。私は購買部の美少女看板娘２号。不動シュティレと申します。ぶい（無表情でピース）」
line = "「お初にお目にかかります。私は購買部の美少女看板娘２号。不動シュティレと申します。ぶい（無表情でピース）」"

[[dialogue]]
speaker = "アナ"
# 「えっと……？」
line = "「えっと……？」"

[[dialogue]]
speaker = "unk"
# ──どちら様！？
line = "──どちら様！？"

[[dialogue]]
speaker = "unk"
# そこには、まったく見知らぬ附属校の生徒の姿があった。
line = "そこには、まったく見知らぬ附属校の生徒の姿があった。"
