[[dialogue]]
speaker = "unk"
# 第２話,激辛頂上対決,P
line = "第２話,激辛頂上対決,P"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ふぃ～。こうやってまったり休日を過ごすのも悪くないねー。会長、さっきからＤＩＳＣでなに観てるの？」
line = "「ふぃ～。こうやってまったり休日を過ごすのも悪くないねー。会長、さっきからＤＩＳＣでなに観てるの？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「あ～、<ruby=リューチューブ>Ｒｙｕｔｕｂｅ</ruby>？　動画サイトかぁ」
line = "「あ～、<ruby>Ｒｙｕｔｕｂｅ<rt>リューチューブ</rt></ruby>？　動画サイトかぁ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「……にひっ♪　ねー会長、ＤＩＳＣ貸して？　会長がどんな動画をブクマしてるのか気になるな～♪」
line = "「……にひっ♪　ねー会長、ＤＩＳＣ貸して？　会長がどんな動画をブクマしてるのか気になるな～♪」"

[[dialogue]]
speaker = "unk"
# いいよ、どうぞ
line = "いいよ、どうぞ"

[[dialogue]]
speaker = "ネーゼマイン"
# 「む～、あっさりＯＫかぁ。その信頼は嬉しいけど、見られてまずい動画は保存してないってことだよね。ツマンナ～イな～」
line = "「む～、あっさりＯＫかぁ。その信頼は嬉しいけど、見られてまずい動画は保存してないってことだよね。ツマンナ～イな～」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「まぁいっか～。にひひ、彼氏の好み、調べちゃお～っと♪」
line = "「まぁいっか～。にひひ、彼氏の好み、調べちゃお～っと♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「──あ、この子知ってる。Ｖチューバーの『<ruby=うしお>汐</ruby>ルカルカ』じゃん。へー、会長この子が好きなんだ～？」
line = "「──あ、この子知ってる。Ｖチューバーの『<ruby>汐<rt>うしお</rt></ruby>ルカルカ』じゃん。へー、会長この子が好きなんだ～？」"

[[dialogue]]
speaker = "unk"
# ずっと応援してるんだ
line = "ずっと応援してるんだ"

[[dialogue]]
speaker = "ネーゼマイン"
# 「お～、マジだ。専用フォルダ作って、全動画がブクマされてる。へ～、意外かも……」
line = "「お～、マジだ。専用フォルダ作って、全動画がブクマされてる。へ～、意外かも……」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「会長ってあんまりアイドルとか興味なさそ～に見えるけどな。もしかしてこの子、知り合いだったりするー？　なんちて～♪」
line = "「会長ってあんまりアイドルとか興味なさそ～に見えるけどな。もしかしてこの子、知り合いだったりするー？　なんちて～♪」"

[[dialogue]]
speaker = "unk"
# （マイン、無駄に鋭い……！）
line = "（マイン、無駄に鋭い……！）"

[[dialogue]]
speaker = "ネーゼマイン"
# 「あ──昔のこの動画、私も知ってる～。好きなんだよね。再生してみよ～っと♪」
line = "「あ──昔のこの動画、私も知ってる～。好きなんだよね。再生してみよ～っと♪」"

[[dialogue]]
speaker = "汐ルカルカ"
# 『キュー、キュー、キューッとおはドルフィン☆　今日は激辛ラーメンチャレンジしちゃいま～す！　まずはお水を飲んで準備してー……！』
line = "『キュー、キュー、キューッとおはドルフィン☆　今日は激辛ラーメンチャレンジしちゃいま～す！　まずはお水を飲んで準備してー……！』"

[[dialogue]]
speaker = "ネーゼマイン"
# 「あ～、この子シロートだね♪　激辛モノの時にお水は駄目だよ～。辛さが余計に突き刺さっちゃうのに」
line = "「あ～、この子シロートだね♪　激辛モノの時にお水は駄目だよ～。辛さが余計に突き刺さっちゃうのに」"

[[dialogue]]
speaker = "汐ルカルカ"
# 『いったっだきまーす！　ずずずっ────エ゛ンッ！？！？』
line = "『いったっだきまーす！　ずずずっ────エ゛ンッ！？！？』"

[[dialogue]]
speaker = "ネーゼマイン"
# 「あははははっ♪　これ！　この変な声のリアクション！　癖になるよね～っ♪」
line = "「あははははっ♪　これ！　この変な声のリアクション！　癖になるよね～っ♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「は～、面白かった～♪　この子、最近は歌動画ばっかりでネタ系はあげなくなっちゃったよねー。私は昔の方が好きだったな～♪」
line = "「は～、面白かった～♪　この子、最近は歌動画ばっかりでネタ系はあげなくなっちゃったよねー。私は昔の方が好きだったな～♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「てかアレだね、動画見てたら激辛ラーメン食べたくなってきたかも！」
line = "「てかアレだね、動画見てたら激辛ラーメン食べたくなってきたかも！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ルカルカちゃんが食べてたラーメン、有名店のコラボカップ麺なんだよ。流星市国に本店があるんだけど、食べたことある？」
line = "「ルカルカちゃんが食べてたラーメン、有名店のコラボカップ麺なんだよ。流星市国に本店があるんだけど、食べたことある？」"

[[dialogue]]
speaker = "unk"
# いや、ないな
line = "いや、ないな"

[[dialogue]]
speaker = "ネーゼマイン"
# 「それはもったいないね～♪　お昼まだだし、今から行こっか！」
line = "「それはもったいないね～♪　お昼まだだし、今から行こっか！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ほら、ここだよー♪　お昼前だから混んでるけど、回転早いからすぐ食べられると思うよ。並ぼ並ぼっ」
line = "「ほら、ここだよー♪　お昼前だから混んでるけど、回転早いからすぐ食べられると思うよ。並ぼ並ぼっ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「失礼しま～す……って、あれ？　あなたは──」
line = "「失礼しま～す……って、あれ？　あなたは──」"

[[dialogue]]
speaker = "セドナ"
# 「魔王と公安の……？　奇遇だな。お前たちもラーメンを食べに来たのか」
line = "「魔王と公安の……？　奇遇だな。お前たちもラーメンを食べに来たのか」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「流星市国に住んでるのに、ここの激辛ラーメン食べたことないって会長が言うから引っ張って来たんだ～」
line = "「流星市国に住んでるのに、ここの激辛ラーメン食べたことないって会長が言うから引っ張って来たんだ～」"

[[dialogue]]
speaker = "セドナ"
# 「なるほど。ここの味を知らないのは、損失を超えて罪と言える。よかったな魔王、グルメな恋人がいたことに感謝するといい」
line = "「なるほど。ここの味を知らないのは、損失を超えて罪と言える。よかったな魔王、グルメな恋人がいたことに感謝するといい」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「今さらだけど私が公安の所属だとか、会長と付き合ってるだとか、全部知ってるんだね。まぁネビュラだし当然か～……」
line = "「今さらだけど私が公安の所属だとか、会長と付き合ってるだとか、全部知ってるんだね。まぁネビュラだし当然か～……」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ま、今はオフだし気にしないでおこっと。ここに来るってことは、セドナさんもかなりの辛党でしょ？」
line = "「ま、今はオフだし気にしないでおこっと。ここに来るってことは、セドナさんもかなりの辛党でしょ？」"

[[dialogue]]
speaker = "セドナ"
# 「フ──当然だ。ここは一味違うからな。つい何度も足を運んでしまう」
line = "「フ──当然だ。ここは一味違うからな。つい何度も足を運んでしまう」"

[[dialogue]]
speaker = "unk"
# オススメのメニューってあります？
line = "オススメのメニューってあります？"

[[dialogue]]
speaker = "セドナ"
# 「イリュージョンボルケーノＭＡＸ盛りがいいだろう」
line = "「イリュージョンボルケーノＭＡＸ盛りがいいだろう」"

[[dialogue]]
speaker = "unk"
# ……必殺技？？？
line = "……必殺技？？？"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひ♪　ますます私と好みが似てるかも♪　いいよね～、やっぱりボルケーノラーメンが一番だよ！　油断したら死が見える辛さだし！」
line = "「にひ♪　ますます私と好みが似てるかも♪　いいよね～、やっぱりボルケーノラーメンが一番だよ！　油断したら死が見える辛さだし！」"

[[dialogue]]
speaker = "unk"
# 接点のないマインとセドナさんだったが、激辛好きということもあって打ち解けたみたいだ。どうせなら３人で食べるかということになったのだが──
line = "接点のないマインとセドナさんだったが、激辛好きということもあって打ち解けたみたいだ。どうせなら３人で食べるかということになったのだが──"

[[dialogue]]
speaker = "ネーゼマイン"
# 「大将～、こんにちはー♪　食べに来たよ～！」
line = "「大将～、こんにちはー♪　食べに来たよ～！」"

[[dialogue]]
speaker = "ラーメン店主"
# 「いらっしゃいやせェ！　おっ、ラーメンクイーンの嬢ちゃんか！」
line = "「いらっしゃいやせェ！　おっ、ラーメンクイーンの嬢ちゃんか！」"

[[dialogue]]
speaker = "unk"
# ラーメンクイーン……？
line = "ラーメンクイーン……？"

[[dialogue]]
speaker = "ネーゼマイン"
# 「チャレンジメニューを制覇した人に与えられる称号だよ。ふふ、実はこの店の２位の実力者なんだ～♪」
line = "「チャレンジメニューを制覇した人に与えられる称号だよ。ふふ、実はこの店の２位の実力者なんだ～♪」"

[[dialogue]]
speaker = "unk"
# そうなんだ！？
line = "そうなんだ！？"

[[dialogue]]
speaker = "ネーゼマイン"
# 「でも私より上の人がいるんだよね。１位の座のラーメンキング。その人の記録をどうしても抜けなくって……」
line = "「でも私より上の人がいるんだよね。１位の座のラーメンキング。その人の記録をどうしても抜けなくって……」"

[[dialogue]]
speaker = "セドナ"
# 「親父。今日も盛況だな」
line = "「親父。今日も盛況だな」"

[[dialogue]]
speaker = "ラーメン店主"
# 「キ──キングッ！？」
line = "「キ──キングッ！？」"

[[dialogue]]
speaker = "unk"
# ──ぇえぇえぇ！？
line = "──ぇえぇえぇ！？"

[[dialogue]]
speaker = "ラーメン店主"
# 「まさかクイーンとキングが同時の来店だとォ！？　おめェら気合い入れろやァ！」
line = "「まさかクイーンとキングが同時の来店だとォ！？　おめェら気合い入れろやァ！」"

[[dialogue]]
speaker = "店員たち"
# 「お──押忍ッ！！」
line = "「お──押忍ッ！！」"

[[dialogue]]
speaker = "セドナ"
# 「フ──世間は狭いな。お前がクイーンだったのか」
line = "「フ──世間は狭いな。お前がクイーンだったのか」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「……それはこっちのセリフだよ。あなたが記録を塗り替えるまでは、私がキングだったのに」
line = "「……それはこっちのセリフだよ。あなたが記録を塗り替えるまでは、私がキングだったのに」"

[[dialogue]]
speaker = "セドナ"
# 「すまんが恋人の前だからと手は抜けんぞ？　激辛ラーメンは食ではない。命を賭した闘争だからな」
line = "「すまんが恋人の前だからと手は抜けんぞ？　激辛ラーメンは食ではない。命を賭した闘争だからな」"

[[dialogue]]
speaker = "unk"
# ちょっと何言ってるのかわからないです
line = "ちょっと何言ってるのかわからないです"

[[dialogue]]
speaker = "ネーゼマイン"
# 「受けて立つよ！　今日こそキングの座を奪還するっ……！」
line = "「受けて立つよ！　今日こそキングの座を奪還するっ……！」"

[[dialogue]]
speaker = "unk"
# 仲良く食べてバイバイしない？？？
line = "仲良く食べてバイバイしない？？？"

[[dialogue]]
speaker = "セドナ"
# 「親父。ボルケーノラーメン、１００倍だ。この女と同時にスタートする」
line = "「親父。ボルケーノラーメン、１００倍だ。この女と同時にスタートする」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「会長はストップウォッチお願い。あと応援して。マイン頑張れ～って。頼んだよ！」
line = "「会長はストップウォッチお願い。あと応援して。マイン頑張れ～って。頼んだよ！」"

[[dialogue]]
speaker = "unk"
# 争い、よくない！！！
line = "争い、よくない！！！"

[[dialogue]]
speaker = "unk"
# 俺がどれだけ静止しても２人は聞かず……そして数分後。火山の噴火口のようなラーメンが運ばれてきて、激闘が始まったのだった──
line = "俺がどれだけ静止しても２人は聞かず……そして数分後。火山の噴火口のようなラーメンが運ばれてきて、激闘が始まったのだった──"

[[dialogue]]
speaker = "セドナ"
# 「見事だ……まさか給水タイミングをあそこまで削って来るとはな。今日は私の負けだ……次回からは再びお前がキングを名乗るといい」
line = "「見事だ……まさか給水タイミングをあそこまで削って来るとはな。今日は私の負けだ……次回からは再びお前がキングを名乗るといい」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「やったっ！　大勝利～！！」
line = "「やったっ！　大勝利～！！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「会長の応援のおかげだよ──ちゅっ<emoji=heart04>」
line = "「会長の応援のおかげだよ──ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# かっらあぁああぁあああいっ！？
line = "かっらあぁああぁあああいっ！？"

[[dialogue]]
speaker = "unk"
# 感極まったマインにキスをされた途端、唇が痺れて感覚がなくなったんだけど──何だ、この体験！？
line = "感極まったマインにキスをされた途端、唇が痺れて感覚がなくなったんだけど──何だ、この体験！？"
