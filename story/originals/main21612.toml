[[dialogue]]
speaker = "unk"
# リクリエの危機の際に、人類の救世主は現れるという。
line = "リクリエの危機の際に、人類の救世主は現れるという。"

[[dialogue]]
speaker = "unk"
# それは未完のままであった、３つの世界の──
line = "それは未完のままであった、３つの世界の──"

[[dialogue]]
speaker = "unk"
# ──最後の魔王の姿。
line = "──最後の魔王の姿。"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「…………お前は、いったい、何なの……？」
line = "「…………お前は、いったい、何なの……？」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「命を……魂すらを奪ったのに──どうしてまた戻ってくるっ！？」
line = "「命を……魂すらを奪ったのに──どうしてまた戻ってくるっ！？」"

[[dialogue]]
speaker = "unk"
# セレスティアすら用いずに変身を果たし、右の<ruby=かいな>腕</ruby>に巻き付くは、厄災の力。
line = "セレスティアすら用いずに変身を果たし、右の<ruby>腕<rt>かいな</rt></ruby>に巻き付くは、厄災の力。"

[[dialogue]]
speaker = "クロト"
# 「みんな──心配をかけてごめん」
line = "「みんな──心配をかけてごめん」"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロト……パパ……？」
line = "「クロト……パパ……？」"

[[dialogue]]
speaker = "クロト"
# 「ヴィーナス。遅くなって悪かった……」
line = "「ヴィーナス。遅くなって悪かった……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「幽霊じゃ、ない……？　ほんとに、生きてる……？」
line = "「幽霊じゃ、ない……？　ほんとに、生きてる……？」"

[[dialogue]]
speaker = "クロト"
# 「ああ──この通りだ。安心してくれ、ヴィーナス」
line = "「ああ──この通りだ。安心してくれ、ヴィーナス」"

[[dialogue]]
speaker = "煌嶺"
# 「あのまま死ぬような愚物ではないと思ってはいたが……貴様、何をした？」
line = "「あのまま死ぬような愚物ではないと思ってはいたが……貴様、何をした？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「どういう、こと？　いったい……どうやって──」
line = "「どういう、こと？　いったい……どうやって──」"

[[dialogue]]
speaker = "クロト"
# 「……ベガの俺とコンタクトを取った。彼の魂と力、その全てを譲り受けて──だから、還ってくることができたんだ」
line = "「……ベガの俺とコンタクトを取った。彼の魂と力、その全てを譲り受けて──だから、還ってくることができたんだ」"

[[dialogue]]
speaker = "梨緒"
# 「ベガの、君に……！？」
line = "「ベガの、君に……！？」"

[[dialogue]]
speaker = "クロト"
# 「俺はいつもこうだ。１人じゃ何もできない。いつも誰かに力を貸してもらって──だから立ち上がれる……」
line = "「俺はいつもこうだ。１人じゃ何もできない。いつも誰かに力を貸してもらって──だから立ち上がれる……」"

[[dialogue]]
speaker = "クロト"
# 「みんな、今の今まで持ちこたえてくれてありがとう……これが本当に最後の戦いだ！　だから……」
line = "「みんな、今の今まで持ちこたえてくれてありがとう……これが本当に最後の戦いだ！　だから……」"

[[dialogue]]
speaker = "クロト"
# 「俺に──いや、『俺たち』について来てくれ！！」
line = "「俺に──いや、『俺たち』について来てくれ！！」"
