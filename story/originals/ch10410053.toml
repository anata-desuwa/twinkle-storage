[[dialogue]]
speaker = "unk"
# 第３話,マインと猫ちゃんスキンシップ,P
line = "第３話,マインと猫ちゃんスキンシップ,P"

[[dialogue]]
speaker = "unk"
# ある日の放課後、俺はアニマ先輩の新しい実験に付き合う約束をしていた。
line = "ある日の放課後、俺はアニマ先輩の新しい実験に付き合う約束をしていた。"

[[dialogue]]
speaker = "アニマ"
# 「というわけで――『獣人化薬』～♪」
line = "「というわけで――『獣人化薬』～♪」"

[[dialogue]]
speaker = "アニマ"
# 「これまでの戦闘データから、人間・天使・魔族の星力にはそれぞれ異なる性質があると判明してイル」
line = "「これまでの戦闘データから、人間・天使・魔族の星力にはそれぞれ異なる性質があると判明してイル」"

[[dialogue]]
speaker = "アニマ"
# 「そこで一時的に種族を変えられる方法として、まずは『魔族』に変身できる新たな薬を試作開発したというわけダ♪」
line = "「そこで一時的に種族を変えられる方法として、まずは『魔族』に変身できる新たな薬を試作開発したというわけダ♪」"

[[dialogue]]
speaker = "unk"
# 相変わらず、とんでもない代物を……！
line = "相変わらず、とんでもない代物を……！"

[[dialogue]]
speaker = "アニマ"
# 「というわけで会長、試してみてくれるカナ？」
line = "「というわけで会長、試してみてくれるカナ？」"

[[dialogue]]
speaker = "unk"
# 俺はアニマ先輩を信じ、薬を飲む――すると。
line = "俺はアニマ先輩を信じ、薬を飲む――すると。"

[[dialogue]]
speaker = "アニマ"
# 「おお、これは……！」
line = "「おお、これは……！」"

[[dialogue]]
speaker = "クロ猫"
# 「にゃ……？　にゃにゃ～～っ！？」
line = "「にゃ……？　にゃにゃ～～っ！？」"

[[dialogue]]
speaker = "unk"
# （俺、猫になってるぅ～～っ！？）
line = "（俺、猫になってるぅ～～っ！？）"

[[dialogue]]
speaker = "アニマ"
# 「しまっタ！　猫系獣人の魔族になるはずが……失敗して、完全に『猫』になってしまったカ！」
line = "「しまっタ！　猫系獣人の魔族になるはずが……失敗して、完全に『猫』になってしまったカ！」"

[[dialogue]]
speaker = "unk"
# アニマ先輩が「少し待っていてくれるカ？」と言って、保健室から出て行き、少しして。
line = "アニマ先輩が「少し待っていてくれるカ？」と言って、保健室から出て行き、少しして。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「――あっ、本当だ～。黒猫ちゃんがいる～♪」
line = "「――あっ、本当だ～。黒猫ちゃんがいる～♪」"

[[dialogue]]
speaker = "クロ猫"
# 「！　にゃ～ん！」
line = "「！　にゃ～ん！」"

[[dialogue]]
speaker = "unk"
# やって来たのは、なんとマインだった。
line = "やって来たのは、なんとマインだった。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「アニマ先輩から、会長が戻ってくるまで面倒を見ていてくれって頼まれたけど……キミは一体、何の実験に使う猫ちゃんなのかにゃ～？」
line = "「アニマ先輩から、会長が戻ってくるまで面倒を見ていてくれって頼まれたけど……キミは一体、何の実験に使う猫ちゃんなのかにゃ～？」"

[[dialogue]]
speaker = "unk"
# マインは近づいてきて、俺に話しかけてくる。
line = "マインは近づいてきて、俺に話しかけてくる。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ねぇ、猫ちゃん。私もちょ～っと実験してもいい？」
line = "「ねぇ、猫ちゃん。私もちょ～っと実験してもいい？」"

[[dialogue]]
speaker = "クロ猫"
# 「にゃ……？」
line = "「にゃ……？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひ♪　大丈夫、私はちょっと意地悪な天使だけど、小動物をイジメたりはしないって決めてるから～」
line = "「にひひ♪　大丈夫、私はちょっと意地悪な天使だけど、小動物をイジメたりはしないって決めてるから～」"

[[dialogue]]
speaker = "クロ猫"
# 「にゃっ……うにゃ～」
line = "「にゃっ……うにゃ～」"

[[dialogue]]
speaker = "unk"
# マインは俺の頭に手を置いて、撫でてくる。
line = "マインは俺の頭に手を置いて、撫でてくる。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「どう？　撫でられると、どんな感じかにゃ～？」
line = "「どう？　撫でられると、どんな感じかにゃ～？」"

[[dialogue]]
speaker = "クロ猫"
# 「にゃう～ん……♪」
line = "「にゃう～ん……♪」"

[[dialogue]]
speaker = "unk"
# マインの手つきは優しいもので、なんだかちょっと安心する。
line = "マインの手つきは優しいもので、なんだかちょっと安心する。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「じゃあ次は、顎の下を撫でちゃおっかな～？　ほれほれ～♪」
line = "「じゃあ次は、顎の下を撫でちゃおっかな～？　ほれほれ～♪」"

[[dialogue]]
speaker = "クロ猫"
# 「にゃ～ん……ごろごろ……♪」
line = "「にゃ～ん……ごろごろ……♪」"

[[dialogue]]
speaker = "unk"
# （気持ちよくて、喉が鳴ってしまう……）
line = "（気持ちよくて、喉が鳴ってしまう……）"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひ♪　警戒せずに、受け入れてもらえたかな～？　それなら～」
line = "「にひひ♪　警戒せずに、受け入れてもらえたかな～？　それなら～」"

[[dialogue]]
speaker = "unk"
# 俺がリラックス気分で油断していた、次の瞬間――
line = "俺がリラックス気分で油断していた、次の瞬間――"

[[dialogue]]
speaker = "ネーゼマイン"
# 「失礼しま～す♪　えいっ<emoji=heart04>」
line = "「失礼しま～す♪　えいっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# なんといきなり、体にモフッと顔を埋められた。
line = "なんといきなり、体にモフッと顔を埋められた。"

[[dialogue]]
speaker = "クロ猫"
# 「んにゃあっ！？」
line = "「んにゃあっ！？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「すぅ～っ、はぁ～っ……<emoji=heart04>」
line = "「すぅ～っ、はぁ～っ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そして、思いっきり深呼吸をされる。
line = "そして、思いっきり深呼吸をされる。"

[[dialogue]]
speaker = "クロ猫"
# 「に、にゃあぁ……」
line = "「に、にゃあぁ……」"

[[dialogue]]
speaker = "unk"
# （思いっきり嗅がれて、恥ずかしい……！）
line = "（思いっきり嗅がれて、恥ずかしい……！）"

[[dialogue]]
speaker = "ネーゼマイン"
# 「――ん～、なるほどね～♪　これが『猫吸い』か～」
line = "「――ん～、なるほどね～♪　これが『猫吸い』か～」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ありがとね～、猫ちゃん。お礼に、いいことしてあげるね♪」
line = "「ありがとね～、猫ちゃん。お礼に、いいことしてあげるね♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ほ～ら――『お尻トントン』♪」
line = "「ほ～ら――『お尻トントン』♪」"

[[dialogue]]
speaker = "クロ猫"
# 「にゃっ！？　ふにゃあ～～っ！？<emoji=heart04><emoji=heart04>」
line = "「にゃっ！？　ふにゃあ～～っ！？<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 尻尾の付け根の辺りを軽くポンポンと叩かれた瞬間、得も言われぬ<b>快感</b>が電流のように全身を駆け抜けた。
line = "尻尾の付け根の辺りを軽くポンポンと叩かれた瞬間、得も言われぬ<b>快感</b>が電流のように全身を駆け抜けた。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「あっ……にひひっ♪　お尻が上がって来た～。気持ちいいの～？」
line = "「あっ……にひひっ♪　お尻が上がって来た～。気持ちいいの～？」"

[[dialogue]]
speaker = "クロ猫"
# 「にゃ、にゃああぁ～～っ<emoji=heart04>」
line = "「にゃ、にゃああぁ～～っ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 四つん這いの状態から、勝手にお尻が上がっていってしまう。
line = "四つん這いの状態から、勝手にお尻が上がっていってしまう。"

[[dialogue]]
speaker = "unk"
# （や、やばい、これ以上続けられたら……！）
line = "（や、やばい、これ以上続けられたら……！）"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ん？　猫ちゃん、体が光って……」
line = "「ん？　猫ちゃん、体が光って……」"

[[dialogue]]
speaker = "unk"
# ――気づけば、俺は元の人間の姿へと戻っていた。
line = "――気づけば、俺は元の人間の姿へと戻っていた。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「あ～あ、薬の効果が切れちゃったみたいだね～。にひひ♪」
line = "「あ～あ、薬の効果が切れちゃったみたいだね～。にひひ♪」"

[[dialogue]]
speaker = "unk"
# えっ……！？　マイン、知ってたの！？
line = "えっ……！？　マイン、知ってたの！？"

[[dialogue]]
speaker = "ネーゼマイン"
# 「うん♪　実はアニマ先輩に呼び出された時、聞かされてね～♪」
line = "「うん♪　実はアニマ先輩に呼び出された時、聞かされてね～♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「っていうか会長、その体勢……ぷっ♪　きゃはははっ♪　お尻を突き上げたままの体勢になってるよ～」
line = "「っていうか会長、その体勢……ぷっ♪　きゃはははっ♪　お尻を突き上げたままの体勢になってるよ～」"

[[dialogue]]
speaker = "unk"
# 俺は顔が熱くなって、慌てて立ち上がる。
line = "俺は顔が熱くなって、慌てて立ち上がる。"

[[dialogue]]
speaker = "アニマ"
# 「――おっ、ちゃんと元に戻ったようダナ♪」
line = "「――おっ、ちゃんと元に戻ったようダナ♪」"

[[dialogue]]
speaker = "unk"
# と、そこでアニマ先輩が戻って来る。
line = "と、そこでアニマ先輩が戻って来る。"

[[dialogue]]
speaker = "unk"
# 一体どういうことなの！？
line = "一体どういうことなの！？"

[[dialogue]]
speaker = "ネーゼマイン"
# 「アニマ先輩から、会長が猫ちゃんに変身してるから、イチャイチャするならチャンスだよって言われちゃってさ～」
line = "「アニマ先輩から、会長が猫ちゃんに変身してるから、イチャイチャするならチャンスだよって言われちゃってさ～」"

[[dialogue]]
speaker = "アニマ"
# 「薬の効果は、失敗しても短い時間で切れるようにしてあったからナ」
line = "「薬の効果は、失敗しても短い時間で切れるようにしてあったからナ」"

[[dialogue]]
speaker = "アニマ"
# 「それならせっかくだし、会長が猫としてスキンシップされるとどのように感じるのか、知りたくなってナ。フヒ♪」
line = "「それならせっかくだし、会長が猫としてスキンシップされるとどのように感じるのか、知りたくなってナ。フヒ♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「で、猫吸いとか、お尻トントンとか、どんな感じだった～？」
line = "「で、猫吸いとか、お尻トントンとか、どんな感じだった～？」"

[[dialogue]]
speaker = "unk"
# そんなこと言えるかぁ～～っ！！
line = "そんなこと言えるかぁ～～っ！！"

[[dialogue]]
speaker = "ネーゼマイン"
# 「きゃはははっ♪　ゴメ～ン！」
line = "「きゃはははっ♪　ゴメ～ン！」"

[[dialogue]]
speaker = "アニマ"
# 「てへぺろダ♪」
line = "「てへぺろダ♪」"

[[dialogue]]
speaker = "unk"
# そう言って、舌を出し、悪戯スマイルを浮かべてみせる２人なのだった。
line = "そう言って、舌を出し、悪戯スマイルを浮かべてみせる２人なのだった。"
