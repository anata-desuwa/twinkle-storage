[[dialogue]]
speaker = "unk"
# 第１４話,別れと、出会い,B
line = "第１４話,別れと、出会い,B"

[[dialogue]]
speaker = "unk"
# ──魔神ギエルを倒し、リクリエを飲み込んでからのこと……。
line = "──魔神ギエルを倒し、リクリエを飲み込んでからのこと……。"

[[dialogue]]
speaker = "クロト"
# 「──ん……ぁっ…………ここは」
line = "「──ん……ぁっ…………ここは」"

[[dialogue]]
speaker = "ヴィーナス"
# 「──クロト！　目が覚めたのね」
line = "「──クロト！　目が覚めたのね」"

[[dialogue]]
speaker = "クロト"
# 「ああ……っつ。頭がとんでもなく痛いが──なんとか無事みたいだ」
line = "「ああ……っつ。頭がとんでもなく痛いが──なんとか無事みたいだ」"

[[dialogue]]
speaker = "unk"
# どうやら俺の体は保ったらしい──
line = "どうやら俺の体は保ったらしい──"

[[dialogue]]
speaker = "unk"
# ということをみんなで確かめたのち、残す不安はある少女の行方のみとなった。
line = "ということをみんなで確かめたのち、残す不安はある少女の行方のみとなった。"

[[dialogue]]
speaker = "クロト"
# 「……行くのか」
line = "「……行くのか」"

[[dialogue]]
speaker = "アポロ"
# 「ああ。あたしは本来……<ruby=ここ>アルタイル</ruby>にいるべき存在じゃないからな」
line = "「ああ。あたしは本来……<ruby>アルタイル<rt>ここ</rt></ruby>にいるべき存在じゃないからな」"

[[dialogue]]
speaker = "アポロ"
# 「これまで自覚はなかった。けど……今は、元の世界から引っ張られる感じがするんだ」
line = "「これまで自覚はなかった。けど……今は、元の世界から引っ張られる感じがするんだ」"

[[dialogue]]
speaker = "アナ"
# 「デネブ──ですね。仮面の支配がなくなった以上、自然な形ではありますが……」
line = "「デネブ──ですね。仮面の支配がなくなった以上、自然な形ではありますが……」"

[[dialogue]]
speaker = "ルリエル"
# 「せっかくお話できるようになりましたのに……お別れなんて寂しいです！」
line = "「せっかくお話できるようになりましたのに……お別れなんて寂しいです！」"

[[dialogue]]
speaker = "ニャリオン"
# 「ニャァ……名残惜しいニャン……」
line = "「ニャァ……名残惜しいニャン……」"

[[dialogue]]
speaker = "アポロ"
# 「別にいいだろ。こっちにはこっちのあたしがいる」
line = "「別にいいだろ。こっちにはこっちのあたしがいる」"

[[dialogue]]
speaker = "アポロ"
# 「こっちのあたしが目覚めたら……なんて言うか知らないけど。フォローは頼んだぞ、ニャリオン」
line = "「こっちのあたしが目覚めたら……なんて言うか知らないけど。フォローは頼んだぞ、ニャリオン」"

[[dialogue]]
speaker = "ニャリオン"
# 「ニャア！　任されたニャン！」
line = "「ニャア！　任されたニャン！」"

[[dialogue]]
speaker = "フィオナ"
# 「姉さん……」
line = "「姉さん……」"

[[dialogue]]
speaker = "アポロ"
# 「そんな顔するな。エリシア──オマエは、あたしよりずっと立派に育ってる。ホントだぞ」
line = "「そんな顔するな。エリシア──オマエは、あたしよりずっと立派に育ってる。ホントだぞ」"

[[dialogue]]
speaker = "アポロ"
# 「だから……自信持て。この世界の『フィオナ』として、これからもきっとやっていける」
line = "「だから……自信持て。この世界の『フィオナ』として、これからもきっとやっていける」"

[[dialogue]]
speaker = "フィオナ"
# 「っ……はい──っ……！」
line = "「っ……はい──っ……！」"

[[dialogue]]
speaker = "unk"
# 本来、交わることのなかった２人の姉妹は最後にぎゅっと抱き合った。
line = "本来、交わることのなかった２人の姉妹は最後にぎゅっと抱き合った。"

[[dialogue]]
speaker = "unk"
# だんだんと、アポロの存在感がその場から希薄化していく──
line = "だんだんと、アポロの存在感がその場から希薄化していく──"

[[dialogue]]
speaker = "アポロ"
# 「じゃあな。あたしを見捨てないでくれて、ありがとう。みんな」
line = "「じゃあな。あたしを見捨てないでくれて、ありがとう。みんな」"

[[dialogue]]
speaker = "クロト"
# 「──待ってくれ」
line = "「──待ってくれ」"

[[dialogue]]
speaker = "アポロ"
# 「なんだ？」
line = "「なんだ？」"

[[dialogue]]
speaker = "クロト"
# 「最後に……ひとつだけ訊かせてくれ」
line = "「最後に……ひとつだけ訊かせてくれ」"

[[dialogue]]
speaker = "クロト"
# 「俺たちは君のことを、なんて呼べばいい？」
line = "「俺たちは君のことを、なんて呼べばいい？」"

[[dialogue]]
speaker = "unk"
# 素朴な質問。
line = "素朴な質問。"

[[dialogue]]
speaker = "unk"
# それを聞き届けたアポロは、にかっと笑って……
line = "それを聞き届けたアポロは、にかっと笑って……"

[[dialogue]]
speaker = "アポロ"
# 「アポロでいい」
line = "「アポロでいい」"

[[dialogue]]
speaker = "アポロ"
# 「たくさん迷惑かけて……悪かったな。今度こそ、本物のヒーローになれるよう、頑張ってみるさ」
line = "「たくさん迷惑かけて……悪かったな。今度こそ、本物のヒーローになれるよう、頑張ってみるさ」"

[[dialogue]]
speaker = "unk"
# そうして──アポロは。
line = "そうして──アポロは。"

[[dialogue]]
speaker = "unk"
# アルタイル世界の『使徒』として招かれた少女は、そう言葉を残して光の中へ消えていった。
line = "アルタイル世界の『使徒』として招かれた少女は、そう言葉を残して光の中へ消えていった。"

[[dialogue]]
speaker = "unk"
# だから──俺は今、足早に向かっている。
line = "だから──俺は今、足早に向かっている。"

[[dialogue]]
speaker = "マトイ"
# 「あ、緋宮くん！　もう～遅いよ」
line = "「あ、緋宮くん！　もう～遅いよ」"

[[dialogue]]
speaker = "クロト"
# 「ごめんごめん。でも、間に合ったか」
line = "「ごめんごめん。でも、間に合ったか」"

[[dialogue]]
speaker = "unk"
# 流星教皇庁──その中の一室。
line = "流星教皇庁──その中の一室。"

[[dialogue]]
speaker = "unk"
# そこには、もうみんなが揃っていた。
line = "そこには、もうみんなが揃っていた。"

[[dialogue]]
speaker = "unk"
# かけられた『月の壁画』が俺たちを見つめる。
line = "かけられた『月の壁画』が俺たちを見つめる。"

[[dialogue]]
speaker = "unk"
# 今日は──<b>彼女</b>と、ようやくの再会が叶う日だった。
line = "今日は──<b>彼女</b>と、ようやくの再会が叶う日だった。"

[[dialogue]]
speaker = "unk"
# ──眠りの姫君。
line = "──眠りの姫君。"

[[dialogue]]
speaker = "unk"
# アルタイル──俺たちの世界に生きていたはずの、本来の星見の長女。
line = "アルタイル──俺たちの世界に生きていたはずの、本来の星見の長女。"

[[dialogue]]
speaker = "unk"
# 遠い夏の日、偶然にもぶつかった女の子。
line = "遠い夏の日、偶然にもぶつかった女の子。"

[[dialogue]]
speaker = "unk"
# そんな彼女が、今……長き昏睡から初めて、目を覚ます。
line = "そんな彼女が、今……長き昏睡から初めて、目を覚ます。"

[[dialogue]]
speaker = "眠りの少女"
# 「ん──ぁ……ん……っ…………」
line = "「ん──ぁ……ん……っ…………」"

[[dialogue]]
speaker = "眠りの少女"
# 「あれ、あたし……？　どうして……って、おまえたちは……」
line = "「あれ、あたし……？　どうして……って、おまえたちは……」"

[[dialogue]]
speaker = "フィオナ"
# 「おはようございます──姉さん。ずいぶんお寝坊さんでしたね」
line = "「おはようございます──姉さん。ずいぶんお寝坊さんでしたね」"

[[dialogue]]
speaker = "unk"
# きょとんと見開かれた、フィオナそっくりの眼。
line = "きょとんと見開かれた、フィオナそっくりの眼。"

[[dialogue]]
speaker = "unk"
# 彼女は……俺たちの顔をぐるりと見渡してから、すべてを思い出したように微笑んだ。
line = "彼女は……俺たちの顔をぐるりと見渡してから、すべてを思い出したように微笑んだ。"

[[dialogue]]
speaker = "眠りの少女"
# 「ああ……そうか……色々、あったんだな」
line = "「ああ……そうか……色々、あったんだな」"

[[dialogue]]
speaker = "眠りの少女"
# 「おはよう、エリシア。どうやらあたしは──長い夢を見てたみたいだ」
line = "「おはよう、エリシア。どうやらあたしは──長い夢を見てたみたいだ」"
