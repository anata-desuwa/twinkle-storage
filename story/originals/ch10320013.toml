[[dialogue]]
speaker = "unk"
# 第３話,司書さんの実力,P
line = "第３話,司書さんの実力,P"

[[dialogue]]
speaker = "unk"
# くっ、数が多い……！
line = "くっ、数が多い……！"

[[dialogue]]
speaker = "unk"
# アステラから出現した大量のモンスターに苦戦していると──
line = "アステラから出現した大量のモンスターに苦戦していると──"

[[dialogue]]
speaker = "ウィステリア"
# 「カラミティチェイン！」
line = "「カラミティチェイン！」"

[[dialogue]]
speaker = "unk"
# ！？
line = "！？"

[[dialogue]]
speaker = "ウィステリア"
# 「ふぅ、見かねて出てきちゃったわ。お疲れ様、会長くん」
line = "「ふぅ、見かねて出てきちゃったわ。お疲れ様、会長くん」"

[[dialogue]]
speaker = "ウィステリア"
# 「何驚いてるの……って、ああ、私が戦ってるからビックリしてるのね。その話はまた後で」
line = "「何驚いてるの……って、ああ、私が戦ってるからビックリしてるのね。その話はまた後で」"

[[dialogue]]
speaker = "ウィステリア"
# 「それにしてもモンスターがゾロゾロと……ん？　どうして申し訳なさそうな顔してるの？」
line = "「それにしてもモンスターがゾロゾロと……ん？　どうして申し訳なさそうな顔してるの？」"

[[dialogue]]
speaker = "ウィステリア"
# 「……ふぅん、モンスターを引き寄せる体質ねぇ。世の中にはいろんな体質の人がいるものね。あ、なんでもない、こっちの話」
line = "「……ふぅん、モンスターを引き寄せる体質ねぇ。世の中にはいろんな体質の人がいるものね。あ、なんでもない、こっちの話」"

[[dialogue]]
speaker = "ウィステリア"
# 「でもモンスターが湧いてるのはモンスターのせい。君のせいじゃない。気にしなくていいわ」
line = "「でもモンスターが湧いてるのはモンスターのせい。君のせいじゃない。気にしなくていいわ」"

[[dialogue]]
speaker = "ウィステリア"
# 「だけどどうせなら利用させてもらいましょう。会長くんは前衛をお願いね」
line = "「だけどどうせなら利用させてもらいましょう。会長くんは前衛をお願いね」"

[[dialogue]]
speaker = "ウィステリア"
# 「さ、さっさと片付けるわよ！」
line = "「さ、さっさと片付けるわよ！」"

[[dialogue]]
speaker = "ウィステリア"
# 「はい、これで全滅っと。会長くんの戦い方、ちょっと知り合いに似てて合わせやす――何でもないわ」
line = "「はい、これで全滅っと。会長くんの戦い方、ちょっと知り合いに似てて合わせやす――何でもないわ」"

[[dialogue]]
speaker = "ウィステリア"
# 「でもこれ、時間外手当とか出ないのかしら？　……多分出ない？　司書だから？」
line = "「でもこれ、時間外手当とか出ないのかしら？　……多分出ない？　司書だから？」"

[[dialogue]]
speaker = "ウィステリア"
# 「だから欲しいのよ～、働き損になっちゃうし。ま、会長くんが無事だったから良しとしましょう」
line = "「だから欲しいのよ～、働き損になっちゃうし。ま、会長くんが無事だったから良しとしましょう」"

[[dialogue]]
speaker = "ウィステリア"
# 「……え？　どうして私が駆けつけてきたかって？　それは……道を間違えたらたまたま……ま、まぁ、私の運が悪くて良かったわね！」
line = "「……え？　どうして私が駆けつけてきたかって？　それは……道を間違えたらたまたま……ま、まぁ、私の運が悪くて良かったわね！」"

[[dialogue]]
speaker = "ウィステリア"
# 「そういえば、モンスターを引き寄せる体質だっけ。その体質のせいで今までずいぶん怖い思いしたんでしょ？」
line = "「そういえば、モンスターを引き寄せる体質だっけ。その体質のせいで今までずいぶん怖い思いしたんでしょ？」"

[[dialogue]]
speaker = "ウィステリア"
# 「それでも星騎士になる道を選んだのね。えらいえらい」
line = "「それでも星騎士になる道を選んだのね。えらいえらい」"

[[dialogue]]
speaker = "ウィステリア"
# 「囮にして悪かったけど、星騎士として戦ってるところかっこ良かったわ」
line = "「囮にして悪かったけど、星騎士として戦ってるところかっこ良かったわ」"

[[dialogue]]
speaker = "ウィステリア"
# 「ふふっ、照れてる照れてる」
line = "「ふふっ、照れてる照れてる」"

[[dialogue]]
speaker = "ウィステリア"
# 「照れてる会長くん、ちょっとかわいいかも……ハッ！　いけないいけない、職員として生徒に変な気持ちを抱くわけには……」
line = "「照れてる会長くん、ちょっとかわいいかも……ハッ！　いけないいけない、職員として生徒に変な気持ちを抱くわけには……」"

[[dialogue]]
speaker = "unk"
# なぜウィステリアさんが星術を？
line = "なぜウィステリアさんが星術を？"

[[dialogue]]
speaker = "ウィステリア"
# 「ああ～、あんまり言いたくないんだけど、それはね……」
line = "「ああ～、あんまり言いたくないんだけど、それはね……」"

[[dialogue]]
speaker = "キリカ"
# 「彼女が私と同じく流星学園の卒業生だからです」
line = "「彼女が私と同じく流星学園の卒業生だからです」"

[[dialogue]]
speaker = "ウィステリア"
# 「！？　キリカ！？」
line = "「！？　キリカ！？」"

[[dialogue]]
speaker = "キリカ"
# 「ウィステリアは当時の流星学園でも有数の実力者でした。……とはいえ、それを知る者のほとんどは彼女に固く口止めされていますが」
line = "「ウィステリアは当時の流星学園でも有数の実力者でした。……とはいえ、それを知る者のほとんどは彼女に固く口止めされていますが」"

[[dialogue]]
speaker = "ウィステリア"
# 「私はそこそこの成績で目立たずに卒業したかったの！　普通の幸せが欲しかったの！」
line = "「私はそこそこの成績で目立たずに卒業したかったの！　普通の幸せが欲しかったの！」"

[[dialogue]]
speaker = "ウィステリア"
# 「それがうっかり全力出しちゃって、そのせいであなた含めて変な連中に挑まれるし、悪目立ちして散々な学園生活だったわ」
line = "「それがうっかり全力出しちゃって、そのせいであなた含めて変な連中に挑まれるし、悪目立ちして散々な学園生活だったわ」"

[[dialogue]]
speaker = "キリカ"
# 「苦情を言いたいのはこちらです。働きたいと言うから星見家のメイド隊として雇ってあげたのに、三ヶ月足らずで出ていかれては旦那様に申し訳が立ちません」
line = "「苦情を言いたいのはこちらです。働きたいと言うから星見家のメイド隊として雇ってあげたのに、三ヶ月足らずで出ていかれては旦那様に申し訳が立ちません」"

[[dialogue]]
speaker = "ウィステリア"
# 「それはあなたが明らかに他の子より厳しく指導したからでしょ。あなたの指図で働くなんてもうごめんよ！」
line = "「それはあなたが明らかに他の子より厳しく指導したからでしょ。あなたの指図で働くなんてもうごめんよ！」"

[[dialogue]]
speaker = "unk"
# ケンカするほど仲がいい？
line = "ケンカするほど仲がいい？"

[[dialogue]]
speaker = "ウィステリア"
# 「そんなわけないでしょ！」
line = "「そんなわけないでしょ！」"

[[dialogue]]
speaker = "キリカ"
# 「目が節穴なのですか？　本気でそう仰っているなら矯正が必要ですね」
line = "「目が節穴なのですか？　本気でそう仰っているなら矯正が必要ですね」"

[[dialogue]]
speaker = "unk"
# ごめんなさい！
line = "ごめんなさい！"

[[dialogue]]
speaker = "キリカ"
# 「まだ近くにアステラ本体が残っているようです。迅速に叩きましょう」
line = "「まだ近くにアステラ本体が残っているようです。迅速に叩きましょう」"

[[dialogue]]
speaker = "キリカ"
# 「ですがお気を付けください」
line = "「ですがお気を付けください」"

[[dialogue]]
speaker = "キリカ"
# 「ウィステリアは魔界の奥深くの旧い家で生まれ、ほぼ女子校の流星学園にいたせいで年頃の男性にろくに触れずに生きてきました」
line = "「ウィステリアは魔界の奥深くの旧い家で生まれ、ほぼ女子校の流星学園にいたせいで年頃の男性にろくに触れずに生きてきました」"

[[dialogue]]
speaker = "キリカ"
# 「ですから大人ぶっているくせに<ruby=うぶ>初心</ruby>なのです。少し優しくするとうっかり惚れられてしまうかもしれませんよ」
line = "「ですから大人ぶっているくせに<ruby>初心<rt>うぶ</rt></ruby>なのです。少し優しくするとうっかり惚れられてしまうかもしれませんよ」"

[[dialogue]]
speaker = "ウィステリア"
# 「はぁっ！？　実家のことまで言ってないでしょうが！」
line = "「はぁっ！？　実家のことまで言ってないでしょうが！」"

[[dialogue]]
speaker = "キリカ"
# 「言ったでしょう。あなたがメイドとして初めて務めた夜、まだ部屋がないからと一緒に寝たベッドの中で」
line = "「言ったでしょう。あなたがメイドとして初めて務めた夜、まだ部屋がないからと一緒に寝たベッドの中で」"

[[dialogue]]
speaker = "キリカ"
# 「人間界で素敵な恋をするんだ……と嬉しそうに語っていたのを私は覚えていますが」
line = "「人間界で素敵な恋をするんだ……と嬉しそうに語っていたのを私は覚えていますが」"

[[dialogue]]
speaker = "ウィステリア"
# 「なっ――」
line = "「なっ――」"

[[dialogue]]
speaker = "キリカ"
# 「ではアステラの中へ参りましょう」
line = "「ではアステラの中へ参りましょう」"

[[dialogue]]
speaker = "ウィステリア"
# 「えっ、ちょっと、この空気のまま戦うの！？　キリカ、待ちなさーいっ！」
line = "「えっ、ちょっと、この空気のまま戦うの！？　キリカ、待ちなさーいっ！」"
