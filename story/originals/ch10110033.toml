[[dialogue]]
speaker = "unk"
# 第３話,愛してるゲーム（マトイ編）,P
line = "第３話,愛してるゲーム（マトイ編）,P"

[[dialogue]]
speaker = "unk"
# それは週末、マトイが俺の家へ遊びに来ていた時のこと――
line = "それは週末、マトイが俺の家へ遊びに来ていた時のこと――"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「ねぇ、会長。『愛してるゲーム』って知ってる？」
line = "「ねぇ、会長。『愛してるゲーム』って知ってる？」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「――そう、ちょっと前に流行ってたらしいんだけど、お互いに向かい合って『愛してる』って言って、照れた方が負けって遊び」
line = "「――そう、ちょっと前に流行ってたらしいんだけど、お互いに向かい合って『愛してる』って言って、照れた方が負けって遊び」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「その……今ちょうど暇になったし……２人でやってみない？」
line = "「その……今ちょうど暇になったし……２人でやってみない？」"

[[dialogue]]
speaker = "unk"
# 面白そう。やってみようか
line = "面白そう。やってみようか"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「えへへ……実は前から興味があって、してみたかったんだ～♪」
line = "「えへへ……実は前から興味があって、してみたかったんだ～♪」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「じゃあ、どっちが先にしよっか？　――会長から？　うん、わかった」
line = "「じゃあ、どっちが先にしよっか？　――会長から？　うん、わかった」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「そしたら、ちょっと待って。心の準備するから――」
line = "「そしたら、ちょっと待って。心の準備するから――」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「すぅ～……はぁ～……よしっ。どうぞ……！」
line = "「すぅ～……はぁ～……よしっ。どうぞ……！」"

[[dialogue]]
speaker = "unk"
# ――マトイ、愛してる
line = "――マトイ、愛してる"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「――えへへ……<emoji=heart04>」
line = "「――えへへ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 嬉しそうに笑っている……だと！？
line = "嬉しそうに笑っている……だと！？"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「――すぐに照れてくれると思ってたのに通じない？　えっとね……ドキドキはすごくしてるよ。でも……」
line = "「――すぐに照れてくれると思ってたのに通じない？　えっとね……ドキドキはすごくしてるよ。でも……」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「会長、本気で言ってくれてるって、顔を見ればわかるから……普通に嬉しい<emoji=heart04>」
line = "「会長、本気で言ってくれてるって、顔を見ればわかるから……普通に嬉しい<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「――うん、わかるよ。だって……」
line = "「――うん、わかるよ。だって……」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「毎日見てる、好きな人の顔だもん<emoji=heart04>」
line = "「毎日見てる、好きな人の顔だもん<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# くはっ……！？
line = "くはっ……！？"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「えっ……会長！？　どうしたの！？」
line = "「えっ……会長！？　どうしたの！？」"

[[dialogue]]
speaker = "unk"
# 俺の……負けだ
line = "俺の……負けだ"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「いやいや私の番、まだ１度も来てないよ！？」
line = "「いやいや私の番、まだ１度も来てないよ！？」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「――普通にさらっと破壊力の高い台詞で、不意打ちを食らった？　そ、そう……？」
line = "「――普通にさらっと破壊力の高い台詞で、不意打ちを食らった？　そ、そう……？」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「で、でも、とりあえず今のはノーカンで！　これじゃあ全然、ゲームをやった気にならないし！」
line = "「で、でも、とりあえず今のはノーカンで！　これじゃあ全然、ゲームをやった気にならないし！」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「じゃあ、今度は私が言う番ね。……これ、言われるよりも、言う方がちょっと照れそうかも」
line = "「じゃあ、今度は私が言う番ね。……これ、言われるよりも、言う方がちょっと照れそうかも」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「深呼吸して、心を落ち着かせて……すぅ～……はぁ～……よしっ、行くよ？」
line = "「深呼吸して、心を落ち着かせて……すぅ～……はぁ～……よしっ、行くよ？」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「――会長。愛してます」
line = "「――会長。愛してます」"

[[dialogue]]
speaker = "unk"
# っ……！
line = "っ……！"

[[dialogue]]
speaker = "unk"
# 我が彼女ながら、何という可愛さだろう。
line = "我が彼女ながら、何という可愛さだろう。"

[[dialogue]]
speaker = "unk"
# マトイは普段、星徒会のツッコミ役として、周りのメンバーを引き立たせるような役回りが多いのだが、こうして２人きりになると雰囲気が変わる。
line = "マトイは普段、星徒会のツッコミ役として、周りのメンバーを引き立たせるような役回りが多いのだが、こうして２人きりになると雰囲気が変わる。"

[[dialogue]]
speaker = "unk"
# 何というかすごく……最大級に『普通の可愛い女の子』へと変貌するのだ。そのギャップが凄まじい魅力を生み出している。しかし――
line = "何というかすごく……最大級に『普通の可愛い女の子』へと変貌するのだ。そのギャップが凄まじい魅力を生み出している。しかし――"

[[dialogue]]
speaker = "unk"
# 耐えた……！　今度は、耐え切ったたぞ！
line = "耐えた……！　今度は、耐え切ったたぞ！"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「な、なんか会長、今すごく心の中で葛藤してなかった？」
line = "「な、なんか会長、今すごく心の中で葛藤してなかった？」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「――え？　私は自分で思ってるよりも、女の子としての攻撃力が高い？　そうかな……？」
line = "「――え？　私は自分で思ってるよりも、女の子としての攻撃力が高い？　そうかな……？」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「だけど、これでゲームが続けられるね。じゃあ、次は会長の番♪」
line = "「だけど、これでゲームが続けられるね。じゃあ、次は会長の番♪」"

[[dialogue]]
speaker = "unk"
# マトイ、愛してる
line = "マトイ、愛してる"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「んっ……<emoji=heart04>　えへへ～……<emoji=heart04>」
line = "「んっ……<emoji=heart04>　えへへ～……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 照れてはいないけど、マトイ無敵じゃん！
line = "照れてはいないけど、マトイ無敵じゃん！"

[[dialogue]]
speaker = "unk"
# これ、素直に喜ぶのはアリなの！？
line = "これ、素直に喜ぶのはアリなの！？"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「笑ったら負け、っていうルールもあるらしいけど、今回は『照れたら負け』で始めたからな～<emoji=heart04>」
line = "「笑ったら負け、っていうルールもあるらしいけど、今回は『照れたら負け』で始めたからな～<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「――うん？　補足で言葉を付け加えてもいいかって？　なるほど、その方がもっとドキドキして楽しいかも♪　いいよ～」
line = "「――うん？　補足で言葉を付け加えてもいいかって？　なるほど、その方がもっとドキドキして楽しいかも♪　いいよ～」"

[[dialogue]]
speaker = "unk"
# マトイは普通に女の子として滅茶苦茶可愛い
line = "マトイは普通に女の子として滅茶苦茶可愛い"

[[dialogue]]
speaker = "unk"
# さっき心の中で考えたギャップの話を口に出し……
line = "さっき心の中で考えたギャップの話を口に出し……"

[[dialogue]]
speaker = "unk"
# それから女の子らしく俺にお菓子を作って来てくれたり、一方で戦う時は勇敢で格好良かったり等々、マトイの好きなところを列挙していく。
line = "それから女の子らしく俺にお菓子を作って来てくれたり、一方で戦う時は勇敢で格好良かったり等々、マトイの好きなところを列挙していく。"

[[dialogue]]
speaker = "unk"
# が、しかし――
line = "が、しかし――"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「そっか～、えへへ<emoji=heart04>」
line = "「そっか～、えへへ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 防御力、鉄壁か！？
line = "防御力、鉄壁か！？"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「え？　――このゲームを提案する時は、ちょっと照れ臭そうだったのに？　う～ん、確かに、ちょっと恥ずかしかったけど……」
line = "「え？　――このゲームを提案する時は、ちょっと照れ臭そうだったのに？　う～ん、確かに、ちょっと恥ずかしかったけど……」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「私って、慣れない状況に弱いというか……でも、いざこのゲームを始めてみたら、案外平気ということに気づいたというか」
line = "「私って、慣れない状況に弱いというか……でも、いざこのゲームを始めてみたら、案外平気ということに気づいたというか」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「最近は恋人関係にも慣れてきて、私がデレデレしてても、会長ならきっと受け入れてくれるっていう安心感があるのかなって……えへへ<emoji=heart04>」
line = "「最近は恋人関係にも慣れてきて、私がデレデレしてても、会長ならきっと受け入れてくれるっていう安心感があるのかなって……えへへ<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「それじゃあ、今度は私もお返しに……会長の好きなところ、いっぱい言うね<emoji=heart04>」
line = "「それじゃあ、今度は私もお返しに……会長の好きなところ、いっぱい言うね<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「会長……愛してます<emoji=heart04>」
line = "「会長……愛してます<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「普通の私を好きって言ってくれるところが好き<emoji=heart04>」
line = "「普通の私を好きって言ってくれるところが好き<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「いつもみんなに優しくて、どんな強い敵が来ても諦めずに立ち向かうところが、格好良くて好き<emoji=heart04>　それから――」
line = "「いつもみんなに優しくて、どんな強い敵が来ても諦めずに立ち向かうところが、格好良くて好き<emoji=heart04>　それから――」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「私が恋愛に慣れてないのを、彼氏として男らしくエスコートしてくれるところが好き<emoji=heart04>　なのに、実は自分も初めてで、思わず照れちゃったりするところも……可愛くて好き<emoji=heart04>」
line = "「私が恋愛に慣れてないのを、彼氏として男らしくエスコートしてくれるところが好き<emoji=heart04>　なのに、実は自分も初めてで、思わず照れちゃったりするところも……可愛くて好き<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「それ以外にも好きが沢山あって……会長、本当に――大好き<emoji=heart04><emoji=heart04><emoji=heart04>」
line = "「それ以外にも好きが沢山あって……会長、本当に――大好き<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ぐあああああああああ――――っ！？！？
line = "ぐあああああああああ――――っ！？！？"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「あっ！　会長、今までに見たことないくらい顔真っ赤になって照れてる～<emoji=heart04>」
line = "「あっ！　会長、今までに見たことないくらい顔真っ赤になって照れてる～<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「はあぁ～～～っ<emoji=heart04>　すごく可愛い顔で……好き<emoji=heart04>」
line = "「はあぁ～～～っ<emoji=heart04>　すごく可愛い顔で……好き<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# やめて！　俺のＨＰはとっくにゼロよ！！！
line = "やめて！　俺のＨＰはとっくにゼロよ！！！"

[[dialogue]]
speaker = "unk"
# 愛してるゲームにおいて、もはやマトイに勝てる気が全くしない俺なのであった――
line = "愛してるゲームにおいて、もはやマトイに勝てる気が全くしない俺なのであった――"
