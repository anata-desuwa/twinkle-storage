[[dialogue]]
speaker = "unk"
# 第１話,紅明のお母さん・過去編,P
line = "第１話,紅明のお母さん・過去編,P"

[[dialogue]]
speaker = "unk"
# 恋人の紅明と街に出かけていた休日、モンスター出現の報告を受け、俺たちは東京駅前に駆けつけて戦闘を行っていた――
line = "恋人の紅明と街に出かけていた休日、モンスター出現の報告を受け、俺たちは東京駅前に駆けつけて戦闘を行っていた――"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「今日も元気で、勝利の風を吹かすぜ！　威風堂々――」
line = "「今日も元気で、勝利の風を吹かすぜ！　威風堂々――」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「芭蕉扇！！」
line = "「芭蕉扇！！」"

[[dialogue]]
speaker = "モンスター"
# 「ギギーッ！？　……！」
line = "「ギギーッ！？　……！」"

[[dialogue]]
speaker = "unk"
# クーシェンが魔界から持ってきた『芭蕉扇』によって覚醒した、紅明の『ラクシャシーフォーム』。
line = "クーシェンが魔界から持ってきた『芭蕉扇』によって覚醒した、紅明の『ラクシャシーフォーム』。"

[[dialogue]]
speaker = "unk"
# その圧倒的な『風』の星術によって、紅明は新種の機械型モンスターでさえもあっという間に一掃してしまった――
line = "その圧倒的な『風』の星術によって、紅明は新種の機械型モンスターでさえもあっという間に一掃してしまった――"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「ふぅっ♪　これにて一件落着☆　ダーリン、お疲れっしょ～！　ウェ～イ☆」
line = "「ふぅっ♪　これにて一件落着☆　ダーリン、お疲れっしょ～！　ウェ～イ☆」"

[[dialogue]]
speaker = "unk"
# 元気な笑顔で、ハイタッチを交わしてくる紅明。
line = "元気な笑顔で、ハイタッチを交わしてくる紅明。"

[[dialogue]]
speaker = "unk"
# お疲れ様。新フォーム、すごかった
line = "お疲れ様。新フォーム、すごかった"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「んモー<emoji=heart04>　ダーリンにそんな褒められると、嬉しくなっちゃうっしょ♪」
line = "「んモー<emoji=heart04>　ダーリンにそんな褒められると、嬉しくなっちゃうっしょ♪」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「ラクシャシーフォームは、アタシの前世のお袋殿――『羅刹女』の力を引き出すことができるからね。力の源になっている芭蕉扇のお陰でもあるっしょ！」
line = "「ラクシャシーフォームは、アタシの前世のお袋殿――『羅刹女』の力を引き出すことができるからね。力の源になっている芭蕉扇のお陰でもあるっしょ！」"

[[dialogue]]
speaker = "unk"
# 紅明は、実は前世の記憶がある『転生者』である。そして彼女の前世は２０００年前――『西遊記』に登場する「牛魔王」と「羅刹女」の間に生まれた娘、「<ruby=こうがいじ>紅孩児</ruby>」なのだ。
line = "紅明は、実は前世の記憶がある『転生者』である。そして彼女の前世は２０００年前――『西遊記』に登場する「牛魔王」と「羅刹女」の間に生まれた娘、「<ruby>紅孩児<rt>こうがいじ</rt></ruby>」なのだ。"

[[dialogue]]
speaker = "unk"
# 俺はふと、気になったことを聞いてみる。
line = "俺はふと、気になったことを聞いてみる。"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「うん？　――羅刹女がどんなヒトだったのかって？」
line = "「うん？　――羅刹女がどんなヒトだったのかって？」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「それはもう、絶世の美女と言われるくらい、すごく綺麗なママだったよ♪」
line = "「それはもう、絶世の美女と言われるくらい、すごく綺麗なママだったよ♪」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「なのによく、アタシの方がおっぱい大きいことに嫉妬の炎を燃やして、頬をぷく～っとハムスターみたいに膨らませてた」
line = "「なのによく、アタシの方がおっぱい大きいことに嫉妬の炎を燃やして、頬をぷく～っとハムスターみたいに膨らませてた」"

[[dialogue]]
speaker = "unk"
# コンプレックスだったのか……
line = "コンプレックスだったのか……"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「あはは☆　そうなんよ。お袋殿の方が、ずっと美人だったのにね」
line = "「あはは☆　そうなんよ。お袋殿の方が、ずっと美人だったのにね」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「でも、夫や家族を深く愛していて、ヤンチャだったアタシのことも、たくさん可愛がってくれた」
line = "「でも、夫や家族を深く愛していて、ヤンチャだったアタシのことも、たくさん可愛がってくれた」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「アタシとは違って、奥ゆかしいママだったよ。ただ……同時に不安や怒りを素直に表現できない、不器用な性格だった。怒るのが苦手だったんよ」
line = "「アタシとは違って、奥ゆかしいママだったよ。ただ……同時に不安や怒りを素直に表現できない、不器用な性格だった。怒るのが苦手だったんよ」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「牛魔王……親父殿は、勝手によく妾を作っていて、その度に本当は内心怒ってた」
line = "「牛魔王……親父殿は、勝手によく妾を作っていて、その度に本当は内心怒ってた」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「だけど、お袋殿はそれでも親父殿のことを愛していたから、付き添おうとしていたんだ」
line = "「だけど、お袋殿はそれでも親父殿のことを愛していたから、付き添おうとしていたんだ」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「そうして、気づけば怒るタイミングを逃してしまった。親父殿はもう、アタシにも、お袋殿にも止められない『欲望に飲まれた怪物』になってしまっていたんだ」
line = "「そうして、気づけば怒るタイミングを逃してしまった。親父殿はもう、アタシにも、お袋殿にも止められない『欲望に飲まれた怪物』になってしまっていたんだ」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「お袋殿はもっと早く怒って、親父殿の道を正すべきだったと後悔してたよ……だから、自分の代わりに親父殿を止めて欲しいと、アタシにこの芭蕉扇を託したんだ」
line = "「お袋殿はもっと早く怒って、親父殿の道を正すべきだったと後悔してたよ……だから、自分の代わりに親父殿を止めて欲しいと、アタシにこの芭蕉扇を託したんだ」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「それでアタシは修業して、このラクシャシーフォームを手に入れてから、悟空たちと共に親父殿との最終決戦に挑んだってわけさ」
line = "「それでアタシは修業して、このラクシャシーフォームを手に入れてから、悟空たちと共に親父殿との最終決戦に挑んだってわけさ」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「その激戦の中で、芭蕉扇を崖から落としちゃって……完全に失われたものだと思ってたけど、まさかこうして時を経て、戻って来るとは思わなかったよ」
line = "「その激戦の中で、芭蕉扇を崖から落としちゃって……完全に失われたものだと思ってたけど、まさかこうして時を経て、戻って来るとは思わなかったよ」"

[[dialogue]]
speaker = "unk"
# そう言いながら、彼女は大切なものに触れるような手つきで撫でる。
line = "そう言いながら、彼女は大切なものに触れるような手つきで撫でる。"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「あ、ちなみにお袋殿は、孫ができた時は、それはもう嬉しそうに可愛がって、デレデレのお祖母ちゃんをやってたよ」
line = "「あ、ちなみにお袋殿は、孫ができた時は、それはもう嬉しそうに可愛がって、デレデレのお祖母ちゃんをやってたよ」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「だから、色々後悔もあっただろうけど、余生は幸せに過ごせたんじゃないかな」
line = "「だから、色々後悔もあっただろうけど、余生は幸せに過ごせたんじゃないかな」"

[[dialogue]]
speaker = "unk"
# 俺は羅刹女の話を聞いて、そういえば紅明が<b>怒っている</b>姿を見たことがないことに気づく。
line = "俺は羅刹女の話を聞いて、そういえば紅明が<b>怒っている</b>姿を見たことがないことに気づく。"

[[dialogue]]
speaker = "unk"
# もしかして……紅明も怒るのって苦手？
line = "もしかして……紅明も怒るのって苦手？"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「……！　うん。実はそう、アタシも結構苦手なタイプなんだ」
line = "「……！　うん。実はそう、アタシも結構苦手なタイプなんだ」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「あっ、でも、誤解されたくないから言うけど、実はいつも内心怒ってるとか、そういうわけじゃないよ？」
line = "「あっ、でも、誤解されたくないから言うけど、実はいつも内心怒ってるとか、そういうわけじゃないよ？」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「……アタシは苦手って言うよりも、『怒り』ってあんまりよくわからないところがあるんよ」
line = "「……アタシは苦手って言うよりも、『怒り』ってあんまりよくわからないところがあるんよ」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「そりゃ、腹が立つ時が全くないわけじゃないけど……怒っているより、笑ってた方が楽しいじゃん？」
line = "「そりゃ、腹が立つ時が全くないわけじゃないけど……怒っているより、笑ってた方が楽しいじゃん？」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「でも、『怒りがわからないからって、叱らないのは間違っている！』って、当時悟空がアタシをぶん殴りながら叱ってくれたんだ」
line = "「でも、『怒りがわからないからって、叱らないのは間違っている！』って、当時悟空がアタシをぶん殴りながら叱ってくれたんだ」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「そのおかげで、アタシは逃げずに親父殿と向き合うことができた」
line = "「そのおかげで、アタシは逃げずに親父殿と向き合うことができた」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「それから、アタシ自身がママになる経験もして、ちゃんと『叱る』ってことが自分でもできるようになったんだよ」
line = "「それから、アタシ自身がママになる経験もして、ちゃんと『叱る』ってことが自分でもできるようになったんだよ」"

[[dialogue]]
speaker = "unk"
# なら、俺がもし……
line = "なら、俺がもし……"

[[dialogue]]
speaker = "unk"
# ――魔王として間違ったことをしそうになった時は、叱ってくれ。
line = "――魔王として間違ったことをしそうになった時は、叱ってくれ。"

[[dialogue]]
speaker = "unk"
# 俺は彼女にそう伝える。
line = "俺は彼女にそう伝える。"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「ダーリン……。――うしし☆　もちろん！」
line = "「ダーリン……。――うしし☆　もちろん！」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「妻としてこれからも隣で支えて、んモー！　なんでやねん☆　って夫婦漫才みたいにツッコんであげるから、安心するっしょ♪　だから、ダーリンも――」
line = "「妻としてこれからも隣で支えて、んモー！　なんでやねん☆　って夫婦漫才みたいにツッコんであげるから、安心するっしょ♪　だから、ダーリンも――」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「もし迷った時は、ちゃんとアタシに相談してよね。人生２周目の経験で、バッチリ元気が出るアドバイスをしちゃうから☆」
line = "「もし迷った時は、ちゃんとアタシに相談してよね。人生２周目の経験で、バッチリ元気が出るアドバイスをしちゃうから☆」"

[[dialogue]]
speaker = "unk"
# そう言って、俺の腕に抱き着く紅明。
line = "そう言って、俺の腕に抱き着く紅明。"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「あっ……んっ♪　ふふふっ<emoji=heart04>　ダーリンの手、くすぐったいっしょ<emoji=heart04>」
line = "「あっ……んっ♪　ふふふっ<emoji=heart04>　ダーリンの手、くすぐったいっしょ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺が頭を撫でると、彼女は嬉しそうな笑顔を浮かべるのだった――
line = "俺が頭を撫でると、彼女は嬉しそうな笑顔を浮かべるのだった――"
