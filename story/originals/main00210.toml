[[dialogue]]
speaker = "unk"
# 第１３話,在りし日の記憶,B
line = "第１３話,在りし日の記憶,B"

[[dialogue]]
speaker = "unk"
# その後もガーディアンたちと交戦しつつフロアを昇っていく俺たち。
line = "その後もガーディアンたちと交戦しつつフロアを昇っていく俺たち。"

[[dialogue]]
speaker = "unk"
# もう十以上の階を踏破しただろうか。
line = "もう十以上の階を踏破しただろうか。"

[[dialogue]]
speaker = "unk"
# そんな調子で進行していると、ようやく少し開けた地点に出た。
line = "そんな調子で進行していると、ようやく少し開けた地点に出た。"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふう──けっこう昇ってきたわね。相変わらず景色は代わり映えしないけど」
line = "「ふう──けっこう昇ってきたわね。相変わらず景色は代わり映えしないけど」"

[[dialogue]]
speaker = "クロト"
# 「ガーディアンも大量に倒しちゃったけどな……」
line = "「ガーディアンも大量に倒しちゃったけどな……」"

[[dialogue]]
speaker = "unk"
# 暴走状態にあるとはいえ、女神が造ったものを打ち壊していくのにいい気はしない。
line = "暴走状態にあるとはいえ、女神が造ったものを打ち壊していくのにいい気はしない。"

[[dialogue]]
speaker = "unk"
# とはいえ、その暴走の原因もこの先にあると考えるべきか……。
line = "とはいえ、その暴走の原因もこの先にあると考えるべきか……。"

[[dialogue]]
speaker = "フィオナ"
# 「緋宮会長は……星騎士になってまだ１週間なんですよね。とてもそうは思えない戦闘力でした」
line = "「緋宮会長は……星騎士になってまだ１週間なんですよね。とてもそうは思えない戦闘力でした」"

[[dialogue]]
speaker = "クロト"
# 「ありがとう。でも、会長になった以上は甘えたことも言ってられないな」
line = "「ありがとう。でも、会長になった以上は甘えたことも言ってられないな」"

[[dialogue]]
speaker = "ヴィーナス"
# 「まだまだ！　クロトの実力はこんなものじゃないのよ！　魔王モードに入ったクロトは私を圧倒するくらい強いんだから！」
line = "「まだまだ！　クロトの実力はこんなものじゃないのよ！　魔王モードに入ったクロトは私を圧倒するくらい強いんだから！」"

[[dialogue]]
speaker = "unk"
# 自分じゃなくて俺の強さを誇ろうとするヴィーナスが、無性に無邪気で可愛く見えた。
line = "自分じゃなくて俺の強さを誇ろうとするヴィーナスが、無性に無邪気で可愛く見えた。"

[[dialogue]]
speaker = "フィオナ"
# 「魔王モード……ですか。ふふ──でも、それだと悪者になってしまいませんか？」
line = "「魔王モード……ですか。ふふ──でも、それだと悪者になってしまいませんか？」"

[[dialogue]]
speaker = "クロト"
# 「俺もそう言ってるんだが……」
line = "「俺もそう言ってるんだが……」"

[[dialogue]]
speaker = "unk"
# 魔王はかつて世界を蹂躙した絶対悪。
line = "魔王はかつて世界を蹂躙した絶対悪。"

[[dialogue]]
speaker = "unk"
# それが、万人の認めるところの常識で──
line = "それが、万人の認めるところの常識で──"

[[dialogue]]
speaker = "ヴィーナス"
# 「ありえないわ。魔王は三界の覇者にして、この世界を救う英雄だもの。クロトは間違いなくその血を継ぐ存在よ！」
line = "「ありえないわ。魔王は三界の覇者にして、この世界を救う英雄だもの。クロトは間違いなくその血を継ぐ存在よ！」"

[[dialogue]]
speaker = "クロト"
# 「その理由は？」
line = "「その理由は？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「わすれた！」
line = "「わすれた！」"

[[dialogue]]
speaker = "フィオナ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# またヴィーナスの根拠なき主張が始まった。
line = "またヴィーナスの根拠なき主張が始まった。"

[[dialogue]]
speaker = "unk"
# フィオナも面食らってしまっている。
line = "フィオナも面食らってしまっている。"

[[dialogue]]
speaker = "unk"
# なんとか話を逸らしたい……あ、そうだ。
line = "なんとか話を逸らしたい……あ、そうだ。"

[[dialogue]]
speaker = "クロト"
# 「そういえば……さっき戦ってる時に思い出したよ。俺は昔、フィオナに会ったことがある」
line = "「そういえば……さっき戦ってる時に思い出したよ。俺は昔、フィオナに会ったことがある」"

[[dialogue]]
speaker = "フィオナ"
# 「え……私に、ですか？」
line = "「え……私に、ですか？」"

[[dialogue]]
speaker = "キリカ"
# 「いきなりのカミングアウトですね」
line = "「いきなりのカミングアウトですね」"

[[dialogue]]
speaker = "クロト"
# 「ああ。名前に覚えがあると思ったら……そう、たしか９年くらい前の夏だ」
line = "「ああ。名前に覚えがあると思ったら……そう、たしか９年くらい前の夏だ」"

[[dialogue]]
speaker = "unk"
# 俺にとってはハッキリと思い出せる出来事。彼女からすれば、もう覚えちゃいないだろうけど……
line = "俺にとってはハッキリと思い出せる出来事。彼女からすれば、もう覚えちゃいないだろうけど……"

[[dialogue]]
speaker = "クロト"
# 「新しく教皇さんが着任するって聞いて……教皇庁前の広場まで挨拶を見に行ったんだ。母さんに連れられて」
line = "「新しく教皇さんが着任するって聞いて……教皇庁前の広場まで挨拶を見に行ったんだ。母さんに連れられて」"

[[dialogue]]
speaker = "進行"
# 「これよりは３７１代教皇、マリウス様による挨拶と説教になります。どうか最後までご清聴くださいませ」
line = "「これよりは３７１代教皇、マリウス様による挨拶と説教になります。どうか最後までご清聴くださいませ」"

[[dialogue]]
speaker = "流星教皇"
# 「──親愛なる兄弟姉妹の皆さま。今日という佳き日を迎えられましたこと、慎んでお慶び申し上げます」
line = "「──親愛なる兄弟姉妹の皆さま。今日という佳き日を迎えられましたこと、慎んでお慶び申し上げます」"

[[dialogue]]
speaker = "流星教皇"
# 「流星市国がこの地に興りはや３０００余年。聖なる女神様が三界を産み、新たなる秩序が誕生せんという今日……」
line = "「流星市国がこの地に興りはや３０００余年。聖なる女神様が三界を産み、新たなる秩序が誕生せんという今日……」"

[[dialogue]]
speaker = "unk"
# 太陽の日差しがじりじりと照りつける、夏の暑い日だった。
line = "太陽の日差しがじりじりと照りつける、夏の暑い日だった。"

[[dialogue]]
speaker = "unk"
# あれが確か第３７１代教皇──おじさんだったのを覚えているから、恐らくフィオナのお父上なんだろう。
line = "あれが確か第３７１代教皇──おじさんだったのを覚えているから、恐らくフィオナのお父上なんだろう。"

[[dialogue]]
speaker = "unk"
# 俺は教皇さまのお説教とやらがあまり理解できず、その場を離れてしまったのだ。
line = "俺は教皇さまのお説教とやらがあまり理解できず、その場を離れてしまったのだ。"

[[dialogue]]
speaker = "unk"
# そのとき──
line = "そのとき──"

[[dialogue]]
speaker = "女の子"
# 「びゅーんっ！」
line = "「びゅーんっ！」"

[[dialogue]]
speaker = "クロト"
# 「──いてっ」
line = "「──いてっ」"

[[dialogue]]
speaker = "unk"
# たまたま、裏手で女の子とばったりぶつかった。
line = "たまたま、裏手で女の子とばったりぶつかった。"

[[dialogue]]
speaker = "unk"
# その女の子は教皇さまに似た白い祭服を着ていて、明らかに変わった子だったのを覚えている。
line = "その女の子は教皇さまに似た白い祭服を着ていて、明らかに変わった子だったのを覚えている。"

[[dialogue]]
speaker = "女の子"
# 「あれ？　あ、ごめんごめん！　だいじょーぶ？」
line = "「あれ？　あ、ごめんごめん！　だいじょーぶ？」"

[[dialogue]]
speaker = "クロト"
# 「うん、平気……あれ。きみは？」
line = "「うん、平気……あれ。きみは？」"

[[dialogue]]
speaker = "フィオナ？"
# 「わたしこそは星見フィオナだ！　少年、きみの名前は？」
line = "「わたしこそは星見フィオナだ！　少年、きみの名前は？」"

[[dialogue]]
speaker = "クロト"
# 「少年って……同じくらいの歳じゃない？」
line = "「少年って……同じくらいの歳じゃない？」"

[[dialogue]]
speaker = "フィオナ？"
# 「そんなことはないぞ！　わたしのほうが年長者のはずだ！」
line = "「そんなことはないぞ！　わたしのほうが年長者のはずだ！」"

[[dialogue]]
speaker = "unk"
# その時の彼女の妙な言い回しが、なんだか新鮮だったのを覚えている。
line = "その時の彼女の妙な言い回しが、なんだか新鮮だったのを覚えている。"

[[dialogue]]
speaker = "クロト"
# 「ええと、ぼくは──」
line = "「ええと、ぼくは──」"

[[dialogue]]
speaker = "ガードマンＡ"
# 「フィオナ様ー。どちらへ行かれましたかー」
line = "「フィオナ様ー。どちらへ行かれましたかー」"

[[dialogue]]
speaker = "ガードマンＢ"
# 「そろそろフィオナ様のご挨拶の出番ですよー。まったく、どこへ行ったんだ……」
line = "「そろそろフィオナ様のご挨拶の出番ですよー。まったく、どこへ行ったんだ……」"

[[dialogue]]
speaker = "フィオナ？"
# 「まずい。悪の追手がわたしに迫ってきている。名残惜しいが少年、ここでお別れだ」
line = "「まずい。悪の追手がわたしに迫ってきている。名残惜しいが少年、ここでお別れだ」"

[[dialogue]]
speaker = "クロト"
# 「は、はあ……？」
line = "「は、はあ……？」"

[[dialogue]]
speaker = "フィオナ？"
# 「それもこれもお父さまのあいさつがタイクツなのが悪いんだ。少年、ここでわたしを見たことは忘れるんだぞ！」
line = "「それもこれもお父さまのあいさつがタイクツなのが悪いんだ。少年、ここでわたしを見たことは忘れるんだぞ！」"

[[dialogue]]
speaker = "unk"
# 当時の印象と今のフィオナのイメージがすり合わず、なかなかピンとこなかったが……
line = "当時の印象と今のフィオナのイメージがすり合わず、なかなかピンとこなかったが……"

[[dialogue]]
speaker = "unk"
# あの時の少女は確かに星見フィオナだった。間違いない。
line = "あの時の少女は確かに星見フィオナだった。間違いない。"

[[dialogue]]
speaker = "クロト"
# 「フィオナが太陽の星力を振るうのを見てなんとなく思い出したんだ」
line = "「フィオナが太陽の星力を振るうのを見てなんとなく思い出したんだ」"

[[dialogue]]
speaker = "クロト"
# 「今にして思うと、当時のフィオナはまだ子どもだったというか……はは。少しやんちゃな感じだったな」
line = "「今にして思うと、当時のフィオナはまだ子どもだったというか……はは。少しやんちゃな感じだったな」"

[[dialogue]]
speaker = "unk"
# そんなエピソードを披露した俺だったが、当の彼女はやや困り気味な顔をしていた。
line = "そんなエピソードを披露した俺だったが、当の彼女はやや困り気味な顔をしていた。"

[[dialogue]]
speaker = "フィオナ"
# 「……えっと……」
line = "「……えっと……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「覚えてないって♪」
line = "「覚えてないって♪」"

[[dialogue]]
speaker = "クロト"
# 「そりゃそうだ。別にこっちが名乗ったわけでもないからな」
line = "「そりゃそうだ。別にこっちが名乗ったわけでもないからな」"

[[dialogue]]
speaker = "クロト"
# 「ただ、あの頃から縁があったのを思い出してさ」
line = "「ただ、あの頃から縁があったのを思い出してさ」"

[[dialogue]]
speaker = "unk"
# 俺だって今になるまで忘れてたような何気ない出来事だ。
line = "俺だって今になるまで忘れてたような何気ない出来事だ。"

[[dialogue]]
speaker = "unk"
# 向こうからしてみれば俺は大勢いた聴衆の一人でしかなかったわけで、覚えてなくて当然である。
line = "向こうからしてみれば俺は大勢いた聴衆の一人でしかなかったわけで、覚えてなくて当然である。"

[[dialogue]]
speaker = "ヴィーナス"
# 「にしても、ぷぷ。フィオナも可愛いところあるのね！　クロトを少年呼ばわりなんて」
line = "「にしても、ぷぷ。フィオナも可愛いところあるのね！　クロトを少年呼ばわりなんて」"

[[dialogue]]
speaker = "フィオナ"
# 「もう……ヴィーナスさん。昔のことなんですから、からかわないでください」
line = "「もう……ヴィーナスさん。昔のことなんですから、からかわないでください」"

[[dialogue]]
speaker = "クロト"
# 「よくよく考えると、あの時からフィオナは家の務めを果たしてたんだもんな。立派だよ」
line = "「よくよく考えると、あの時からフィオナは家の務めを果たしてたんだもんな。立派だよ」"

[[dialogue]]
speaker = "フィオナ"
# 「え、ええ……ありがとう。大したことではありません」
line = "「え、ええ……ありがとう。大したことではありません」"

[[dialogue]]
speaker = "クロト"
# 「それに比べると俺は何者でもないけど。同じ星徒会長として、肩を並べるくらいになれたらなって……思うよ」
line = "「それに比べると俺は何者でもないけど。同じ星徒会長として、肩を並べるくらいになれたらなって……思うよ」"

[[dialogue]]
speaker = "キリカ"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# 魔王の話も逸らせたし、ヴィーナスも打ち解けてくれたしエピソードトークとしては十分……
line = "魔王の話も逸らせたし、ヴィーナスも打ち解けてくれたしエピソードトークとしては十分……"

[[dialogue]]
speaker = "クロト"
# 「（……？）」
line = "「（……？）」"

[[dialogue]]
speaker = "unk"
# だが、気のせいだろうか。
line = "だが、気のせいだろうか。"

[[dialogue]]
speaker = "unk"
# 昔の話をした時、一瞬──フィオナが気まずそうな顔に見えたのは。
line = "昔の話をした時、一瞬──フィオナが気まずそうな顔に見えたのは。"

[[dialogue]]
speaker = "ニャリオン"
# 「……まー、あれニャン。オマエもよくそんな昔のことを鮮明に覚えていたニャンね」
line = "「……まー、あれニャン。オマエもよくそんな昔のことを鮮明に覚えていたニャンね」"

[[dialogue]]
speaker = "クロト"
# 「……たまたまな」
line = "「……たまたまな」"

[[dialogue]]
speaker = "unk"
# 俺は、ニャリオンにそうはぐらかしつつ答えた。
line = "俺は、ニャリオンにそうはぐらかしつつ答えた。"
