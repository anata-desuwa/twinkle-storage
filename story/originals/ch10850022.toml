[[dialogue]]
speaker = "unk"
# 第２話,守護天使と未来のこと,P
line = "第２話,守護天使と未来のこと,P"

[[dialogue]]
speaker = "unk"
# その日、マグダレナの水着フォームの性能を確認することになり、俺は再びリゾート結界へと足を運んでいた。
line = "その日、マグダレナの水着フォームの性能を確認することになり、俺は再びリゾート結界へと足を運んでいた。"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「――以上が、ママダレナの新しい武器『スコップ』の力です～♪」
line = "「――以上が、ママダレナの新しい武器『スコップ』の力です～♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「能力でブロック状に『領域』を定めて、それを掘ったり、他の領域と組み替えたりすることができるんですよ～」
line = "「能力でブロック状に『領域』を定めて、それを掘ったり、他の領域と組み替えたりすることができるんですよ～」"

[[dialogue]]
speaker = "アニマ"
# 「フム、実に面白い力ダ♪　ママダレナやアルモたんは、本来の守護天使の力から派生して、順調に独自進化を続けているナ」
line = "「フム、実に面白い力ダ♪　ママダレナやアルモたんは、本来の守護天使の力から派生して、順調に独自進化を続けているナ」"

[[dialogue]]
speaker = "unk"
# マグダレナの水着フォームの制作者であるアニマ先輩は、手元のノートにさらさらと書き込みながら、満足げに頷く。
line = "マグダレナの水着フォームの制作者であるアニマ先輩は、手元のノートにさらさらと書き込みながら、満足げに頷く。"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「戦闘だけじゃなく海でも遊べるようになって、とっても嬉しいです♪　ありがとうございます、アニマさま」
line = "「戦闘だけじゃなく海でも遊べるようになって、とっても嬉しいです♪　ありがとうございます、アニマさま」"

[[dialogue]]
speaker = "アニマ"
# 「フヒ♪　構わないヨ。研究も進むし、ママダレナにとっても役に立っているなら一石二鳥ダ♪」
line = "「フヒ♪　構わないヨ。研究も進むし、ママダレナにとっても役に立っているなら一石二鳥ダ♪」"

[[dialogue]]
speaker = "アニマ"
# 「それに、附属生の義体をよく使うようになってからも、会長との交際は順調なようで何よりダ♪」
line = "「それに、附属生の義体をよく使うようになってからも、会長との交際は順調なようで何よりダ♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「はい♪　この間もリゾート結界で２人きりのバカンスを楽しんじゃいました……えへへへ<emoji=heart04>」
line = "「はい♪　この間もリゾート結界で２人きりのバカンスを楽しんじゃいました……えへへへ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺と目が合うと、マグダレナは照れたように微笑む。
line = "俺と目が合うと、マグダレナは照れたように微笑む。"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「こうして今、幸せな時間を過ごせていることに、とても感謝しています♪」
line = "「こうして今、幸せな時間を過ごせていることに、とても感謝しています♪」"

[[dialogue]]
speaker = "アニマ"
# 「そうカ。だがママダレナは、今だけじゃなく――もっと先のことは考えているカ？」
line = "「そうカ。だがママダレナは、今だけじゃなく――もっと先のことは考えているカ？」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「え？　もっと先、ですか……？」
line = "「え？　もっと先、ですか……？」"

[[dialogue]]
speaker = "アニマ"
# 「ソウ。守護天使として、いつかは人間界を去らなくてはならない……と考えているのダロウ？」
line = "「ソウ。守護天使として、いつかは人間界を去らなくてはならない……と考えているのダロウ？」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「……はい。私たち守護天使は世界の摂理を支える柱。その役目を果たすため、いずれは本体の元へ戻らなければならない、と……」
line = "「……はい。私たち守護天使は世界の摂理を支える柱。その役目を果たすため、いずれは本体の元へ戻らなければならない、と……」"

[[dialogue]]
speaker = "アニマ"
# 「確かに、世界の仕組みを考えれば、その考えは正しイ。だが――アニマとしては、リクリエから世界を救った後も、急いで戻る必要はないと考えてイル」
line = "「確かに、世界の仕組みを考えれば、その考えは正しイ。だが――アニマとしては、リクリエから世界を救った後も、急いで戻る必要はないと考えてイル」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「え……？」
line = "「え……？」"

[[dialogue]]
speaker = "アニマ"
# 「ここにいるママダレナは、本体のリソースの一部を抽出した『分体』ダ。本体はオペレーション・ペンタグラムの際に既に解放され、世界を守護する役目へと復帰してイル」
line = "「ここにいるママダレナは、本体のリソースの一部を抽出した『分体』ダ。本体はオペレーション・ペンタグラムの際に既に解放され、世界を守護する役目へと復帰してイル」"

[[dialogue]]
speaker = "アニマ"
# 「そして今もそうであるように、急いで本体の元に戻らずとも、役目は本体だけで問題なく遂行され続けてイル」
line = "「そして今もそうであるように、急いで本体の元に戻らずとも、役目は本体だけで問題なく遂行され続けてイル」"

[[dialogue]]
speaker = "アニマ"
# 「であるなら……パートナーである会長が天寿を全うするまで、ヒトとしての『人生』を体験してから帰還するのも、悪くない選択だと思わないカ？」
line = "「であるなら……パートナーである会長が天寿を全うするまで、ヒトとしての『人生』を体験してから帰還するのも、悪くない選択だと思わないカ？」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「人生を……体験……？」
line = "「人生を……体験……？」"

[[dialogue]]
speaker = "アニマ"
# 「少なくともアニマは、義体の完成時から今日まで、それを想定してアップデートをし続けてきたつもりダ」
line = "「少なくともアニマは、義体の完成時から今日まで、それを想定してアップデートをし続けてきたつもりダ」"

[[dialogue]]
speaker = "アニマ"
# 「<b>友人</b>には、幸せになって欲しいからナ」
line = "「<b>友人</b>には、幸せになって欲しいからナ」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「！　アニマさま……」
line = "「！　アニマさま……」"

[[dialogue]]
speaker = "アニマ"
# 「だから、ママダレナ。今だけじゃなく、これからの――『未来の幸せ』についても、ちゃんと考えてみるとイイ」
line = "「だから、ママダレナ。今だけじゃなく、これからの――『未来の幸せ』についても、ちゃんと考えてみるとイイ」"

[[dialogue]]
speaker = "unk"
# アニマ先輩が学園へ戻った後、俺はマグダレナと海辺を散歩していた。
line = "アニマ先輩が学園へ戻った後、俺はマグダレナと海辺を散歩していた。"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「……会長」
line = "「……会長」"

[[dialogue]]
speaker = "unk"
# しばらく沈黙が続いた後、マグダレナが静かに口を開く。
line = "しばらく沈黙が続いた後、マグダレナが静かに口を開く。"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「私、アニマさまの仰った通り……これまで自分の未来のことは、あまり考えないようにしてきました」
line = "「私、アニマさまの仰った通り……これまで自分の未来のことは、あまり考えないようにしてきました」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「以前もお話しましたが……この身は仮初めのもの。リクリエを阻止できても、今の私がどれくらい地上にいられるかはわかりませんから……」
line = "「以前もお話しましたが……この身は仮初めのもの。リクリエを阻止できても、今の私がどれくらい地上にいられるかはわかりませんから……」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「会長と恋人の関係になってからは、なおさら『今が幸せであるように』と願って過ごしてきました」
line = "「会長と恋人の関係になってからは、なおさら『今が幸せであるように』と願って過ごしてきました」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「いつ戻ることになっても悔いがないように。会長やみなさんともう会えなくなっても、いい思い出が残るようにと……」
line = "「いつ戻ることになっても悔いがないように。会長やみなさんともう会えなくなっても、いい思い出が残るようにと……」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「でも……もしも叶うのなら、私は――」
line = "「でも……もしも叶うのなら、私は――」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「会長やみなさんと、ずっと一緒にいたいです。守護天使ではなく、１人の天使として……この先も生きてみたい……！」
line = "「会長やみなさんと、ずっと一緒にいたいです。守護天使ではなく、１人の天使として……この先も生きてみたい……！」"

[[dialogue]]
speaker = "unk"
# なら、もっと甘えて欲しいな
line = "なら、もっと甘えて欲しいな"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「え……？」
line = "「え……？」"

[[dialogue]]
speaker = "unk"
# 俺にとって、守護天使という立場は関係ない。１人の女の子として、マグダレナのことが好きだ。
line = "俺にとって、守護天使という立場は関係ない。１人の女の子として、マグダレナのことが好きだ。"

[[dialogue]]
speaker = "unk"
# そして――彼女には幸せになって欲しいと思っている。
line = "そして――彼女には幸せになって欲しいと思っている。"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「――だから、将来のことは２人で一緒に考えていきたい……？」
line = "「――だから、将来のことは２人で一緒に考えていきたい……？」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「会長……<emoji=heart04>　そんなふうに言われたら……私、お言葉に甘えたくなっちゃいます……<emoji=heart04>」
line = "「会長……<emoji=heart04>　そんなふうに言われたら……私、お言葉に甘えたくなっちゃいます……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺はそっとマグダレナの手を取り、指を絡める。
line = "俺はそっとマグダレナの手を取り、指を絡める。"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「私も会長と、一緒に『将来の幸せ』を考えてみたいです<emoji=heart04>」
line = "「私も会長と、一緒に『将来の幸せ』を考えてみたいです<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺もマグダレナには、ずっとそばにいて欲しい
line = "俺もマグダレナには、ずっとそばにいて欲しい"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「えへへ<emoji=heart04>　はい<emoji=heart04>　私――」
line = "「えへへ<emoji=heart04>　はい<emoji=heart04>　私――」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「なんだか……将来が、すごく楽しみになってきました……♪」
line = "「なんだか……将来が、すごく楽しみになってきました……♪」"

[[dialogue]]
speaker = "unk"
# 目の前に広がる海の水平線へ、マグダレナは期待に満ちた眼差しを向けて微笑むのだった。
line = "目の前に広がる海の水平線へ、マグダレナは期待に満ちた眼差しを向けて微笑むのだった。"
