[[dialogue]]
speaker = "ユウリ"
# 「はぁ、はぁ、はぁ……！　少しは、スッキリしたぜ……！」
line = "「はぁ、はぁ、はぁ……！　少しは、スッキリしたぜ……！」"

[[dialogue]]
speaker = "セーラ"
# 「うちらの連携めっちゃ良くなかった～？　一度モンスターを取り逃がしたとは思えないツーカーぶりだったじゃーん♪」
line = "「うちらの連携めっちゃ良くなかった～？　一度モンスターを取り逃がしたとは思えないツーカーぶりだったじゃーん♪」"

[[dialogue]]
speaker = "ユーリス"
# 「ふふ、そうだね。こう言うと不謹慎だけど、今日ほど清々しい戦いはなかったよ」
line = "「ふふ、そうだね。こう言うと不謹慎だけど、今日ほど清々しい戦いはなかったよ」"

[[dialogue]]
speaker = "ユーリス"
# 「ユウリさんには、ええと……色々と迷惑をかけてしまったかもしれないけど……」
line = "「ユウリさんには、ええと……色々と迷惑をかけてしまったかもしれないけど……」"

[[dialogue]]
speaker = "ユウリ"
# 「ったくホントだぜ。バニースーツを着させられるわ、恥ずかしい色仕掛けをさせられるわ。今日ほど最悪な日はなかったつーの」
line = "「ったくホントだぜ。バニースーツを着させられるわ、恥ずかしい色仕掛けをさせられるわ。今日ほど最悪な日はなかったつーの」"

[[dialogue]]
speaker = "ユウリ"
# 「でも……ま。終わってみりゃ割と楽しかったぜ。新しいダチもできたしな」
line = "「でも……ま。終わってみりゃ割と楽しかったぜ。新しいダチもできたしな」"

[[dialogue]]
speaker = "ユーリス"
# 「ユウリさん……」
line = "「ユウリさん……」"

[[dialogue]]
speaker = "ユウリ"
# 「おら手ぇ出せよ。健闘を讃え合おうぜ、ユリアーナ」
line = "「おら手ぇ出せよ。健闘を讃え合おうぜ、ユリアーナ」"

[[dialogue]]
speaker = "ユーリス"
# 「うんっ！」
line = "「うんっ！」"

[[dialogue]]
speaker = "セーラ"
# 「はぁ～、青春じゃな～。おばあちゃん、嬉しいよ～」
line = "「はぁ～、青春じゃな～。おばあちゃん、嬉しいよ～」"

[[dialogue]]
speaker = "unk"
# ばあさんや、わしらも茶でもしばこうぞ
line = "ばあさんや、わしらも茶でもしばこうぞ"

[[dialogue]]
speaker = "セーラ"
# 「そうだねぇ、お茶請けにいいおせんべいがあってのぅ」
line = "「そうだねぇ、お茶請けにいいおせんべいがあってのぅ」"

[[dialogue]]
speaker = "ユウリ"
# 「アホ言いながらそれとなく現場を離れようとしてんじゃねえ！？　まだ後片付けが残ってるじゃねえか！」
line = "「アホ言いながらそれとなく現場を離れようとしてんじゃねえ！？　まだ後片付けが残ってるじゃねえか！」"

[[dialogue]]
speaker = "ユーリス"
# 「この大量に散らばったカードを整理しなくちゃね。片付けを終えるまでが戦闘だよ」
line = "「この大量に散らばったカードを整理しなくちゃね。片付けを終えるまでが戦闘だよ」"

[[dialogue]]
speaker = "セーラ"
# 「バレちった♪　にしても不思議なモンスターだったね？　倒した後も消えずにカードに戻っちゃうなんて」
line = "「バレちった♪　にしても不思議なモンスターだったね？　倒した後も消えずにカードに戻っちゃうなんて」"

[[dialogue]]
speaker = "ユーリス"
# 「擬態というよりカード自体がモンスターに変質していたのかもしれないね。これもリクリエの影響かもしれない」
line = "「擬態というよりカード自体がモンスターに変質していたのかもしれないね。これもリクリエの影響かもしれない」"

[[dialogue]]
speaker = "ユウリ"
# 「この床に散らばってるカードもさっきまでいた雑魚モンスターだよな？　今はもう単なるカードにしか見えねえけど」
line = "「この床に散らばってるカードもさっきまでいた雑魚モンスターだよな？　今はもう単なるカードにしか見えねえけど」"

[[dialogue]]
speaker = "セーラ"
# 「たぶんあのボスモンスターの影響でモンスター化してたんじゃないかな？　ボスモンスターを倒した拍子に戻ったみたいだし」
line = "「たぶんあのボスモンスターの影響でモンスター化してたんじゃないかな？　ボスモンスターを倒した拍子に戻ったみたいだし」"

[[dialogue]]
speaker = "unk"
# 身近なものがモンスターに変わる、か
line = "身近なものがモンスターに変わる、か"

[[dialogue]]
speaker = "ユーリス"
# 「ああ。これは新たなる脅威だよ。ボスモンスターの残骸やモンスター化していたカードも含めて、解析班に渡そう」
line = "「ああ。これは新たなる脅威だよ。ボスモンスターの残骸やモンスター化していたカードも含めて、解析班に渡そう」"

[[dialogue]]
speaker = "ユウリ"
# 「ちっ、焼却処分はお預けか」
line = "「ちっ、焼却処分はお預けか」"

[[dialogue]]
speaker = "セーラ"
# 「ま、これでカジノの平和は守られたよね。原因さえわかれば、後はヘレナさんが良い感じに対処してくれるだろーし」
line = "「ま、これでカジノの平和は守られたよね。原因さえわかれば、後はヘレナさんが良い感じに対処してくれるだろーし」"

[[dialogue]]
speaker = "unk"
# となれば──
line = "となれば──"

[[dialogue]]
speaker = "セーラ"
# 「せっかくだし、後片付け終わったらカジノでもうひと遊びしちゃおっか♪　臨時休業の札、出しちゃったし♪」
line = "「せっかくだし、後片付け終わったらカジノでもうひと遊びしちゃおっか♪　臨時休業の札、出しちゃったし♪」"

[[dialogue]]
speaker = "ユウリ"
# 「お、いいっすね。優秀なカジノディーラーもいるしな」
line = "「お、いいっすね。優秀なカジノディーラーもいるしな」"

[[dialogue]]
speaker = "unk"
# 照れるな
line = "照れるな"

[[dialogue]]
speaker = "ユウリ"
# 「あんたじゃねえよ」
line = "「あんたじゃねえよ」"

[[dialogue]]
speaker = "ユーリス"
# 「勝手にはしゃぎ回るのはどうかと思うけど……ふふ。ま、遊戯台の点検もしたいしね。きちんと安全確認を終えるまでが警備だから」
line = "「勝手にはしゃぎ回るのはどうかと思うけど……ふふ。ま、遊戯台の点検もしたいしね。きちんと安全確認を終えるまでが警備だから」"

[[dialogue]]
speaker = "セーラ"
# 「んじゃ決まり♪　今度こそユウリちゃんのバニーガール写真、ニャリオンちゃんに送りつけてあげるぜぃ♪」
line = "「んじゃ決まり♪　今度こそユウリちゃんのバニーガール写真、ニャリオンちゃんに送りつけてあげるぜぃ♪」"

[[dialogue]]
speaker = "ユウリ"
# 「ちょっ、それだけはマジやめてください！　社会的に死ぬ！」
line = "「ちょっ、それだけはマジやめてください！　社会的に死ぬ！」"

[[dialogue]]
speaker = "ユーリス"
# 「なら今度は私もプレイヤーとして参加しようかな。ユウリさんはもっと女の子らしい自分をみんなに知ってもらうべきだと思うしね」
line = "「なら今度は私もプレイヤーとして参加しようかな。ユウリさんはもっと女の子らしい自分をみんなに知ってもらうべきだと思うしね」"

[[dialogue]]
speaker = "ユウリ"
# 「はぁ！？　てめ、裏切ったな、ポンコツ王女！？　優しく手ぇ差し伸べてきた紳士っぷりはどこ行ったよ！？」
line = "「はぁ！？　てめ、裏切ったな、ポンコツ王女！？　優しく手ぇ差し伸べてきた紳士っぷりはどこ行ったよ！？」"

[[dialogue]]
speaker = "セーラ"
# 「よーし、ディーラーさん、カード配っちゃって～。まずはポーカーで勝負といこうじゃんか♪」
line = "「よーし、ディーラーさん、カード配っちゃって～。まずはポーカーで勝負といこうじゃんか♪」"

[[dialogue]]
speaker = "ユーリス"
# 「久しぶりに腕が鳴るよ。また別の勇者スキルも披露できそうだ」
line = "「久しぶりに腕が鳴るよ。また別の勇者スキルも披露できそうだ」"

[[dialogue]]
speaker = "unk"
# それじゃオープンザゲーム──！
line = "それじゃオープンザゲーム──！"

[[dialogue]]
speaker = "ユウリ"
# 「いや、どこにカード飛ばすんだよ！？　締まんねえな、おい！」
line = "「いや、どこにカード飛ばすんだよ！？　締まんねえな、おい！」"
