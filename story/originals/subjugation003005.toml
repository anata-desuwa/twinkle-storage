[[dialogue]]
speaker = "unk"
# ナミエルとアムの二人三脚生活が始まってからしばらく経ち、クリスマスイブになった。
line = "ナミエルとアムの二人三脚生活が始まってからしばらく経ち、クリスマスイブになった。"

[[dialogue]]
speaker = "アム"
# 「あっ、会長だ！　こんにちは～♪」
line = "「あっ、会長だ！　こんにちは～♪」"

[[dialogue]]
speaker = "unk"
# 昼休みの時間になり、俺が大聖堂カフェテリアへと向かうと、一緒に昼食をしているアム達を見かけて、声をかける。
line = "昼休みの時間になり、俺が大聖堂カフェテリアへと向かうと、一緒に昼食をしているアム達を見かけて、声をかける。"

[[dialogue]]
speaker = "ナミエル"
# 「ごきげんよう。会長も昼食ですか？」
line = "「ごきげんよう。会長も昼食ですか？」"

[[dialogue]]
speaker = "スノーマン"
# 「会長だ～♪」
line = "「会長だ～♪」"

[[dialogue]]
speaker = "unk"
# 俺にも姿が見えるようになったスノーマンが、声は聞こえないものの、身振り手振りで挨拶してくれる。
line = "俺にも姿が見えるようになったスノーマンが、声は聞こえないものの、身振り手振りで挨拶してくれる。"

[[dialogue]]
speaker = "unk"
# あれから近況はどんな感じ？
line = "あれから近況はどんな感じ？"

[[dialogue]]
speaker = "ナミエル"
# 「そうですね……スノーマンの記憶は、残念ながらまだ戻っていなくて、クリスマスフォームも解除できないままです」
line = "「そうですね……スノーマンの記憶は、残念ながらまだ戻っていなくて、クリスマスフォームも解除できないままです」"

[[dialogue]]
speaker = "アム"
# 「おかげで、この衣装のままで過ごすのもそうだけど、ナミエルやスノーマンとの共同生活にも、すっかり慣れちゃったよ～。あははっ♪」
line = "「おかげで、この衣装のままで過ごすのもそうだけど、ナミエルやスノーマンとの共同生活にも、すっかり慣れちゃったよ～。あははっ♪」"

[[dialogue]]
speaker = "アム"
# 「あっ、そうだ！　会長、聞いて聞いて！　あたし、今の状態で色々試してみたんだけど、１つ面白い発見をしてさ～」
line = "「あっ、そうだ！　会長、聞いて聞いて！　あたし、今の状態で色々試してみたんだけど、１つ面白い発見をしてさ～」"

[[dialogue]]
speaker = "アム"
# 「なんと！　クリスマスフォームの解除はできないけど、衣装を脱ぐことはできるっていうのが判明したんだよ～！」
line = "「なんと！　クリスマスフォームの解除はできないけど、衣装を脱ぐことはできるっていうのが判明したんだよ～！」"

[[dialogue]]
speaker = "unk"
# 解除できないのに脱げるってどういうこと？
line = "解除できないのに脱げるってどういうこと？"

[[dialogue]]
speaker = "アム"
# 「例えばね～、どこか１箇所だけ――あたしのクリスマスフォームだと、トナカイの角飾りだけ残しておくとするじゃん？」
line = "「例えばね～、どこか１箇所だけ――あたしのクリスマスフォームだと、トナカイの角飾りだけ残しておくとするじゃん？」"

[[dialogue]]
speaker = "アム"
# 「で、そうすると、他は全部脱いですっぽんぽんの裸になったとしても、短時間であれば変身状態が維持されてる判定になる、ってことがわかったんだ！」
line = "「で、そうすると、他は全部脱いですっぽんぽんの裸になったとしても、短時間であれば変身状態が維持されてる判定になる、ってことがわかったんだ！」"

[[dialogue]]
speaker = "アム"
# 「そのおかげで、あたし達はお風呂にも入って、体を洗うことができるようになったんだよ！　ね、ナミエル♪」
line = "「そのおかげで、あたし達はお風呂にも入って、体を洗うことができるようになったんだよ！　ね、ナミエル♪」"

[[dialogue]]
speaker = "ナミエル"
# 「そ、そういうことはいちいち会長に報告しなくていいですから！」
line = "「そ、そういうことはいちいち会長に報告しなくていいですから！」"

[[dialogue]]
speaker = "ナミエル"
# 「ちなみに、会長！　それに気づくまでは確かに入浴はしていませんでしたけど、クリスマスフォームの力で体は清潔に保護されていましたから！」
line = "「ちなみに、会長！　それに気づくまでは確かに入浴はしていませんでしたけど、クリスマスフォームの力で体は清潔に保護されていましたから！」"

[[dialogue]]
speaker = "ナミエル"
# 「なので、綺麗じゃない状態で学園に通っていた期間は存在しないので、そこのところ覚えておいて下さいね？」
line = "「なので、綺麗じゃない状態で学園に通っていた期間は存在しないので、そこのところ覚えておいて下さいね？」"

[[dialogue]]
speaker = "ナミエル"
# 「い・い・で・す・ね？」
line = "「い・い・で・す・ね？」"

[[dialogue]]
speaker = "unk"
# ナミエルさんはいつも清潔です……！
line = "ナミエルさんはいつも清潔です……！"

[[dialogue]]
speaker = "unk"
# アッ、ハイ！
line = "アッ、ハイ！"

[[dialogue]]
speaker = "ナミエル"
# 「わかればいいです」
line = "「わかればいいです」"

[[dialogue]]
speaker = "アム"
# 「いや～、でも、１メートル以上離れられないのは不便だけどさ。おかげで家族みたいに、仲は深まったよね～♪」
line = "「いや～、でも、１メートル以上離れられないのは不便だけどさ。おかげで家族みたいに、仲は深まったよね～♪」"

[[dialogue]]
speaker = "アム"
# 「一緒にお風呂に入ったし～、寝る時も毎日一緒のベッドだし。あとこの前は、お母さんへの状況説明もかねて、１回あたしの家にも泊まることになったんだけど～」
line = "「一緒にお風呂に入ったし～、寝る時も毎日一緒のベッドだし。あとこの前は、お母さんへの状況説明もかねて、１回あたしの家にも泊まることになったんだけど～」"

[[dialogue]]
speaker = "アム"
# 「お母さんがナミエルと会ったら、あたしに妹が出来たみたいだって、喜んじゃったんだよね～♪　ね？」
line = "「お母さんがナミエルと会ったら、あたしに妹が出来たみたいだって、喜んじゃったんだよね～♪　ね？」"

[[dialogue]]
speaker = "ナミエル"
# 「ま、まぁ、アム先輩のお母さんはすごく可愛い人でしたけど……」
line = "「ま、まぁ、アム先輩のお母さんはすごく可愛い人でしたけど……」"

[[dialogue]]
speaker = "スノーマン"
# 「アムの家に泊まるの、楽しかった♪」
line = "「アムの家に泊まるの、楽しかった♪」"

[[dialogue]]
speaker = "アム"
# 「ナミエル、抱き着き癖があってさ～。あたしの家に泊まると思ってなかったから、抱き枕の代わりに、あたしに抱き着いてきて～♪」
line = "「ナミエル、抱き着き癖があってさ～。あたしの家に泊まると思ってなかったから、抱き枕の代わりに、あたしに抱き着いてきて～♪」"

[[dialogue]]
speaker = "ナミエル"
# 「わー！　わーっ！　それは言わないで下さいっ！　処しますよ！？」
line = "「わー！　わーっ！　それは言わないで下さいっ！　処しますよ！？」"

[[dialogue]]
speaker = "unk"
# すっかり仲良しになったみたいだな
line = "すっかり仲良しになったみたいだな"

[[dialogue]]
speaker = "アム"
# 「えへへっ、まるで姉妹みたいでしょ～？」
line = "「えへへっ、まるで姉妹みたいでしょ～？」"

[[dialogue]]
speaker = "ナミエル"
# 「いや、アム先輩と姉妹はちょっと……」
line = "「いや、アム先輩と姉妹はちょっと……」"

[[dialogue]]
speaker = "アム"
# 「え～？　ナミエルってば、もう照れちゃって～♪」
line = "「え～？　ナミエルってば、もう照れちゃって～♪」"

[[dialogue]]
speaker = "ナミエル"
# 「照れてないですっ！　というか、そういうアム先輩だって、子供っぽいところが色々あるじゃないですか」
line = "「照れてないですっ！　というか、そういうアム先輩だって、子供っぽいところが色々あるじゃないですか」"

[[dialogue]]
speaker = "ナミエル"
# 「たとえば、お化けが苦手で、部屋の電気を完全に暗くしてると、夜眠れないとか……」
line = "「たとえば、お化けが苦手で、部屋の電気を完全に暗くしてると、夜眠れないとか……」"

[[dialogue]]
speaker = "アム"
# 「はぁっ！？　べ、別に怖くないし！　寝る時に豆電球点けとくのは、昔からの習慣ってだけだし……！」
line = "「はぁっ！？　べ、別に怖くないし！　寝る時に豆電球点けとくのは、昔からの習慣ってだけだし……！」"

[[dialogue]]
speaker = "ナミエル"
# 「そうですか？　他には――」
line = "「そうですか？　他には――」"

[[dialogue]]
speaker = "アム"
# 「そそそ、そんなことより！　明日の流星寮のクリスマスパーティー、楽しみだね～！　会長も参加するんでしょ？」
line = "「そそそ、そんなことより！　明日の流星寮のクリスマスパーティー、楽しみだね～！　会長も参加するんでしょ？」"

[[dialogue]]
speaker = "ナミエル"
# 「誤魔化しましたね。じ～っ……」
line = "「誤魔化しましたね。じ～っ……」"

[[dialogue]]
speaker = "unk"
# 流星寮のパーティーに参加するよ
line = "流星寮のパーティーに参加するよ"

[[dialogue]]
speaker = "unk"
# 俺も声をかけてもらってるから
line = "俺も声をかけてもらってるから"

[[dialogue]]
speaker = "アム"
# 「ナミエルも参加するよね？　まあ、物理的に離れられないから、あたし的には一緒に来てくれないと困るけど～」
line = "「ナミエルも参加するよね？　まあ、物理的に離れられないから、あたし的には一緒に来てくれないと困るけど～」"

[[dialogue]]
speaker = "ナミエル"
# 「……そうですね。附属校の一員として、参加すべきだと思っています」
line = "「……そうですね。附属校の一員として、参加すべきだと思っています」"

[[dialogue]]
speaker = "アム"
# （ん？　あれ……？　ナミエル、なんか今一瞬、間があったような……？）
line = "（ん？　あれ……？　ナミエル、なんか今一瞬、間があったような……？）"

[[dialogue]]
speaker = "unk"
# それから昼休みは、俺も同席させてもらって、彼女たちと昼食をしながら過ごすのだった。
line = "それから昼休みは、俺も同席させてもらって、彼女たちと昼食をしながら過ごすのだった。"
