[[dialogue]]
speaker = "unk"
# 星騎士としては新米ではあるが、この活動が両校の力の底上げになるといいのだが。
line = "星騎士としては新米ではあるが、この活動が両校の力の底上げになるといいのだが。"

[[dialogue]]
speaker = "unk"
# 汗を流そうとシャワーのある更衣室に入ると――
