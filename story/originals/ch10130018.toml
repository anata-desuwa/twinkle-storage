[[dialogue]]
speaker = "unk"
# そこにいたのは、トレーニングか部活あがりと思われる、うっすら汗をかいた下着姿のユウリ。ということは――
line = "そこにいたのは、トレーニングか部活あがりと思われる、うっすら汗をかいた下着姿のユウリ。ということは――"

[[dialogue]]
speaker = "ユウリ"
# 「そうだよ、こっちは女子更衣室だバカヤロー！　男子更衣室は……ああ、そうか、男子更衣室って小さいから見つけられなかったんだな……」
