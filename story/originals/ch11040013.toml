[[dialogue]]
speaker = "unk"
# 第３話,藍の目指す先は,P
line = "第３話,藍の目指す先は,P"

[[dialogue]]
speaker = "unk"
# 『脇役ながらも強い存在感』『ドラマごとにまるで別人』と話題の新人女優として、泉原藍の名は学園外にも広まり始めたが──
line = "『脇役ながらも強い存在感』『ドラマごとにまるで別人』と話題の新人女優として、泉原藍の名は学園外にも広まり始めたが──"

[[dialogue]]
speaker = "ロクサーナ"
# 「何度言えばわかる！　お前の頭に詰まってるのはクリームチーズか何かか！？」
line = "「何度言えばわかる！　お前の頭に詰まってるのはクリームチーズか何かか！？」"

[[dialogue]]
speaker = "藍"
# 「ぴゃい！　ごめんなさい！」
line = "「ぴゃい！　ごめんなさい！」"

[[dialogue]]
speaker = "unk"
# 演劇部では相変わらず、ロクサーナの怒号が飛び交っていた。
line = "演劇部では相変わらず、ロクサーナの怒号が飛び交っていた。"

[[dialogue]]
speaker = "ロクサーナ"
# 「しばらく仕事の方を優先していたせいか、舞台勘が鈍ったようだな。今のお前の芝居は、おとなしくていい子ちゃんなドラマ仕立てだ」
line = "「しばらく仕事の方を優先していたせいか、舞台勘が鈍ったようだな。今のお前の芝居は、おとなしくていい子ちゃんなドラマ仕立てだ」"

[[dialogue]]
speaker = "ロクサーナ"
# 「モニターの前で見せるドラマと、広大なホールの上の舞台じゃ表現方法はまったくの別物だ。舞台上で大袈裟なくらいに感情を出さなければ、観客まで届かん」
line = "「モニターの前で見せるドラマと、広大なホールの上の舞台じゃ表現方法はまったくの別物だ。舞台上で大袈裟なくらいに感情を出さなければ、観客まで届かん」"

[[dialogue]]
speaker = "藍"
# 「は、はい……」
line = "「は、はい……」"

[[dialogue]]
speaker = "ロクサーナ"
# 「お前が演者をやっている理由はなんだ？　金のためか？　特別な存在になりたいからか？　単純に面白いからか？」
line = "「お前が演者をやっている理由はなんだ？　金のためか？　特別な存在になりたいからか？　単純に面白いからか？」"

[[dialogue]]
speaker = "ロクサーナ"
# 「目指す先はどこだ？　行く先々でちやほやされる芸能人か？　世界で活躍する舞台女優か？　学生の部活レベルでおしまいか？」
line = "「目指す先はどこだ？　行く先々でちやほやされる芸能人か？　世界で活躍する舞台女優か？　学生の部活レベルでおしまいか？」"

[[dialogue]]
speaker = "ロクサーナ"
# 「お前がどんな理由で、どの道を選ぼうが私の知ったことではない。どれでも構わんし、否定するつもりもない」
line = "「お前がどんな理由で、どの道を選ぼうが私の知ったことではない。どれでも構わんし、否定するつもりもない」"

[[dialogue]]
speaker = "ロクサーナ"
# 「だが、ブレることだけは許さん。己の信念すら貫けんような奴は、観客の心も貫けん」
line = "「だが、ブレることだけは許さん。己の信念すら貫けんような奴は、観客の心も貫けん」"

[[dialogue]]
speaker = "藍"
# 「……ごめんなさい、部長。ちょっと休憩いただきます」
line = "「……ごめんなさい、部長。ちょっと休憩いただきます」"

[[dialogue]]
speaker = "ロクサーナ"
# 「好きにしろ。１０分で戻れ」
line = "「好きにしろ。１０分で戻れ」"

[[dialogue]]
speaker = "メイプル"
# 「部長、今日はなんだか藍に当たりが強くないですか？」
line = "「部長、今日はなんだか藍に当たりが強くないですか？」"

[[dialogue]]
speaker = "ロクサーナ"
# 「そんなことはない。私が凡骨に対して容赦しないのは、いつものことだろう」
line = "「そんなことはない。私が凡骨に対して容赦しないのは、いつものことだろう」"

[[dialogue]]
speaker = "メイプル"
# 「それはまぁそうなんですけど……」
line = "「それはまぁそうなんですけど……」"

[[dialogue]]
speaker = "ロクサーナ"
# 「なんだ、当たりを強くしてほしいなら、お望みどおりにしてやるぞ？　手始めにさっきのＮＧの罰として、全身くすぐりの刑に──」
line = "「なんだ、当たりを強くしてほしいなら、お望みどおりにしてやるぞ？　手始めにさっきのＮＧの罰として、全身くすぐりの刑に──」"

[[dialogue]]
speaker = "メイプル"
# 「強めなくていいです！　処さないでくださ～い！」
line = "「強めなくていいです！　処さないでくださ～い！」"

[[dialogue]]
speaker = "藍"
# 「はぁぁ……今日も怒られちゃいました……」
line = "「はぁぁ……今日も怒られちゃいました……」"

[[dialogue]]
speaker = "unk"
# 藍、お疲れさま
line = "藍、お疲れさま"

[[dialogue]]
speaker = "藍"
# 「会長さん……格好悪いところ見られちゃいましたね」
line = "「会長さん……格好悪いところ見られちゃいましたね」"

[[dialogue]]
speaker = "unk"
# 藍の演技、よくできてたと思うけどな
line = "藍の演技、よくできてたと思うけどな"

[[dialogue]]
speaker = "藍"
# 「ありがとうございます。でも、自然とカメラを意識した立ち回りになっちゃってたのは、部長の言う通りなんです」
line = "「ありがとうございます。でも、自然とカメラを意識した立ち回りになっちゃってたのは、部長の言う通りなんです」"

[[dialogue]]
speaker = "藍"
# 「この稽古は舞台演劇なんだから……気持ち、切り替えなきゃ……」
line = "「この稽古は舞台演劇なんだから……気持ち、切り替えなきゃ……」"

[[dialogue]]
speaker = "unk"
# 部長を信頼してるんだね
line = "部長を信頼してるんだね"

[[dialogue]]
speaker = "藍"
# 「はい。人としては得意なタイプではないですけどね。すぐ怒られますし、圧は強いですし、入部したばかりの時は怖すぎて辞めちゃおうかと思ってたくらいです」
line = "「はい。人としては得意なタイプではないですけどね。すぐ怒られますし、圧は強いですし、入部したばかりの時は怖すぎて辞めちゃおうかと思ってたくらいです」"

[[dialogue]]
speaker = "藍"
# 「でも、部長の言うことに間違いはありませんから。自分でもどこか違和感のある部分を的確に指摘してくれるんです」
line = "「でも、部長の言うことに間違いはありませんから。自分でもどこか違和感のある部分を的確に指摘してくれるんです」"

[[dialogue]]
speaker = "藍"
# 「ドラマはあまり好きじゃないような言い方をしてましたけど、私の出ているドラマも毎話欠かさず観てくれてますし、私の演技についての感想もくれるんですよ」
line = "「ドラマはあまり好きじゃないような言い方をしてましたけど、私の出ているドラマも毎話欠かさず観てくれてますし、私の演技についての感想もくれるんですよ」"

[[dialogue]]
speaker = "藍"
# 「だいたいはダメ出しですし、二言目は必ずドラマの脚本への愚痴なんですけどね、ふふ」
line = "「だいたいはダメ出しですし、二言目は必ずドラマの脚本への愚痴なんですけどね、ふふ」"

[[dialogue]]
speaker = "藍"
# 「部長は興味のない人には塩対応になりますから、私に期待してくれてるからこそ、キツい言葉を投げかけてくれているんだと思ってます」
line = "「部長は興味のない人には塩対応になりますから、私に期待してくれてるからこそ、キツい言葉を投げかけてくれているんだと思ってます」"

[[dialogue]]
speaker = "unk"
# 確かにそういうとこある
line = "確かにそういうとこある"

[[dialogue]]
speaker = "藍"
# 「会長さんもロミオの時はめいっぱい絞られましたもんね」
line = "「会長さんもロミオの時はめいっぱい絞られましたもんね」"

[[dialogue]]
speaker = "藍"
# 「さっき、部長に言われて、少し考えたんです」
line = "「さっき、部長に言われて、少し考えたんです」"

[[dialogue]]
speaker = "藍"
# 「私が演者をやっているのは、いつもの自分とは違う誰かに変身できるのが楽しいから」
line = "「私が演者をやっているのは、いつもの自分とは違う誰かに変身できるのが楽しいから」"

[[dialogue]]
speaker = "藍"
# 「そして、そんな変身を見事に遂げてみせる、理想の役者に近づくため」
line = "「そして、そんな変身を見事に遂げてみせる、理想の役者に近づくため」"

[[dialogue]]
speaker = "藍"
# 「目指す先は、一人前の女優。できれば、世界に羽ばたけるほどの存在になりたい──でも、それ以上に」
line = "「目指す先は、一人前の女優。できれば、世界に羽ばたけるほどの存在になりたい──でも、それ以上に」"

[[dialogue]]
speaker = "藍"
# 「ぐうの音も出ないような完璧な演技で、部長をギャフンと言わせたいんです」
line = "「ぐうの音も出ないような完璧な演技で、部長をギャフンと言わせたいんです」"

[[dialogue]]
speaker = "藍"
# 「それが入部した時から、ブレることのない私の目標なんです。まだまだ先は長そうですけどね」
line = "「それが入部した時から、ブレることのない私の目標なんです。まだまだ先は長そうですけどね」"

[[dialogue]]
speaker = "unk"
# 応援してるよ
line = "応援してるよ"

[[dialogue]]
speaker = "藍"
# 「はい、ありがとうございます！　会長さん、そろそろ戻りま──」
line = "「はい、ありがとうございます！　会長さん、そろそろ戻りま──」"

[[dialogue]]
speaker = "ロクサーナ"
# 「ほうほう、なるほど。なかなか熱いところがあるじゃあないか」
line = "「ほうほう、なるほど。なかなか熱いところがあるじゃあないか」"

[[dialogue]]
speaker = "藍"
# 「ぶ、部長！？　いつからそこに！？」
line = "「ぶ、部長！？　いつからそこに！？」"

[[dialogue]]
speaker = "ロクサーナ"
# 「いつからと言われれば……そうだな、『人間的には苦手なタイプ』とかなんとか、私に対する愚痴を言っていたところからか」
line = "「いつからと言われれば……そうだな、『人間的には苦手なタイプ』とかなんとか、私に対する愚痴を言っていたところからか」"

[[dialogue]]
speaker = "藍"
# 「そ、そんな言い方はしてなかったと思いますけど……ずっと聞いてたんですか！？」
line = "「そ、そんな言い方はしてなかったと思いますけど……ずっと聞いてたんですか！？」"

[[dialogue]]
speaker = "ロクサーナ"
# 「演者の声は、通りが良いからな。あれだけ大きな声で話していれば、聞こえもする」
line = "「演者の声は、通りが良いからな。あれだけ大きな声で話していれば、聞こえもする」"

[[dialogue]]
speaker = "ロクサーナ"
# 「しかし、私をギャフンと言わせるために演者を続けるとはな。実にいい意気込みだ、くっくっく」
line = "「しかし、私をギャフンと言わせるために演者を続けるとはな。実にいい意気込みだ、くっくっく」"

[[dialogue]]
speaker = "藍"
# 「あの、それは違くて……」
line = "「あの、それは違くて……」"

[[dialogue]]
speaker = "ロクサーナ"
# 「なんだ、違うのか？」
line = "「なんだ、違うのか？」"

[[dialogue]]
speaker = "藍"
# 「い、いいえ……違わないです。いつか部長に、私の演技を心から認めさせて……褒めてほしいです……！」
line = "「い、いいえ……違わないです。いつか部長に、私の演技を心から認めさせて……褒めてほしいです……！」"

[[dialogue]]
speaker = "ロクサーナ"
# 「お前は演者として覇気と向上心に欠けていたのが心配だったが、存外負けず嫌いなところもあったのだな」
line = "「お前は演者として覇気と向上心に欠けていたのが心配だったが、存外負けず嫌いなところもあったのだな」"

[[dialogue]]
speaker = "ロクサーナ"
# 「役者とは数多の同業からたった１つの役を勝ち取らねばならない仕事だ。そうでなくてはいかん！」
line = "「役者とは数多の同業からたった１つの役を勝ち取らねばならない仕事だ。そうでなくてはいかん！」"

[[dialogue]]
speaker = "ロクサーナ"
# 「私を心から満足させる演技をしてくれる日を心待ちにするとしよう。さて、私が筆を折るのと、どっちが早いかな？」
line = "「私を心から満足させる演技をしてくれる日を心待ちにするとしよう。さて、私が筆を折るのと、どっちが早いかな？」"

[[dialogue]]
speaker = "藍"
# 「ぶ、部長っ！　絶対にギャフンと言わせてみせますからね！」
line = "「ぶ、部長っ！　絶対にギャフンと言わせてみせますからね！」"

[[dialogue]]
speaker = "ロクサーナ"
# 「おお、おお、勇ましいことだ。それまでせいぜい『ギャフン』と鳴く練習でもしておくとするか」
line = "「おお、おお、勇ましいことだ。それまでせいぜい『ギャフン』と鳴く練習でもしておくとするか」"

[[dialogue]]
speaker = "ロクサーナ"
# 「『ギャフン』『ギャフーン！』『ギャフン♪』どれがお好みだ？　くっくっく」
line = "「『ギャフン』『ギャフーン！』『ギャフン♪』どれがお好みだ？　くっくっく」"

[[dialogue]]
speaker = "unk"
# からかうように去ってゆくロクサーナを見つめる藍の視線には闘志が宿り──
line = "からかうように去ってゆくロクサーナを見つめる藍の視線には闘志が宿り──"

[[dialogue]]
speaker = "藍"
# 「我が魂が折れることは決してない！　使命を成し遂げるその時までは！　必ず！」
line = "「我が魂が折れることは決してない！　使命を成し遂げるその時までは！　必ず！」"

[[dialogue]]
speaker = "unk"
# その後の演技には、これまで以上の熱が入ったのであった。
line = "その後の演技には、これまで以上の熱が入ったのであった。"
