[[dialogue]]
speaker = "unk"
# ヴィーナスがヨミに、サンタ大作戦の概要を話すと――
line = "ヴィーナスがヨミに、サンタ大作戦の概要を話すと――"

[[dialogue]]
speaker = "ヨミ"
# 「えぇっ！？　私もサンタをやるんですか！？」
line = "「えぇっ！？　私もサンタをやるんですか！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そういうこと！　私がセシアを手伝えないから、ヨミヨミの手を借りたいのよ！」
line = "「そういうこと！　私がセシアを手伝えないから、ヨミヨミの手を借りたいのよ！」"

[[dialogue]]
speaker = "ヨミ"
# 「お嬢様の頼みですし、セシアちゃんの記憶を取り戻す為でしたら、もちろん協力しますけど……」
line = "「お嬢様の頼みですし、セシアちゃんの記憶を取り戻す為でしたら、もちろん協力しますけど……」"

[[dialogue]]
speaker = "ヨミ"
# 「私、サンタはやったことがないんですけど……大丈夫ですかね？」
line = "「私、サンタはやったことがないんですけど……大丈夫ですかね？」"

[[dialogue]]
speaker = "紅明"
# 「あははっ♪　んモー、ヨミヨミってば、難しく考えすぎだって～。サンタなんて、ノリでいけるいける☆」
line = "「あははっ♪　んモー、ヨミヨミってば、難しく考えすぎだって～。サンタなんて、ノリでいけるいける☆」"

[[dialogue]]
speaker = "ヨミ"
# 「って、紅明先輩、どさくさに紛れて尻尾モフモフしないで下さい！」
line = "「って、紅明先輩、どさくさに紛れて尻尾モフモフしないで下さい！」"

[[dialogue]]
speaker = "セシア"
# 「ヨミヨミ、紅明ママと知り合いだったのね」
line = "「ヨミヨミ、紅明ママと知り合いだったのね」"

[[dialogue]]
speaker = "紅明"
# 「うん♪　アタシ、１度でも話した子とは連絡先を交換するようにしてるから☆　ヨミヨミはメッセ送ると、マメに返してくれるんよね～」
line = "「うん♪　アタシ、１度でも話した子とは連絡先を交換するようにしてるから☆　ヨミヨミはメッセ送ると、マメに返してくれるんよね～」"

[[dialogue]]
speaker = "ヨミ"
# 「だって、ちゃんと返さないと、紅明先輩、拗ねたりするから……」
line = "「だって、ちゃんと返さないと、紅明先輩、拗ねたりするから……」"

[[dialogue]]
speaker = "unk"
# セシアもヨミヨミと面識あるんだね
line = "セシアもヨミヨミと面識あるんだね"

[[dialogue]]
speaker = "セシア"
# 「ええ。九浄家のお屋敷で、ヴィーナスが紹介してくれたの。ヨミヨミはわたくしのママではないけれど、モフモフしていて好きよ」
line = "「ええ。九浄家のお屋敷で、ヴィーナスが紹介してくれたの。ヨミヨミはわたくしのママではないけれど、モフモフしていて好きよ」"

[[dialogue]]
speaker = "ヨミ"
# 「そ、その評価は喜ぶべきなんでしょうか……」
line = "「そ、その評価は喜ぶべきなんでしょうか……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「――さて、サンタ大作戦の参加メンバーはこれでいいとして、肝心のプレゼントはどうしようかしら？」
line = "「――さて、サンタ大作戦の参加メンバーはこれでいいとして、肝心のプレゼントはどうしようかしら？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「理想は当然、学園の生徒たち全員に豪華なプレゼントを配って、喜んでもらうことだけど……」
line = "「理想は当然、学園の生徒たち全員に豪華なプレゼントを配って、喜んでもらうことだけど……」"

[[dialogue]]
speaker = "unk"
# 限度はあるよね
line = "限度はあるよね"

[[dialogue]]
speaker = "ヴィーナス"
# 「残念ながら、そうね。準備費用は九浄家の方で出すけど、１人辺りにかけられる予算っていうのはどうしても決まってきちゃうわ」
line = "「残念ながら、そうね。準備費用は九浄家の方で出すけど、１人辺りにかけられる予算っていうのはどうしても決まってきちゃうわ」"

[[dialogue]]
speaker = "紅明"
# 「フフフ……みんなの笑顔は見たいけれど、プレゼントを準備するにもやはりお金が必要……そんな、今も昔も変わらぬ問題を克服する秘策が、アタシにあるぜ！」
line = "「フフフ……みんなの笑顔は見たいけれど、プレゼントを準備するにもやはりお金が必要……そんな、今も昔も変わらぬ問題を克服する秘策が、アタシにあるぜ！」"

[[dialogue]]
speaker = "ヨミ"
# 「紅明先輩、秘策って一体……？」
line = "「紅明先輩、秘策って一体……？」"

[[dialogue]]
speaker = "紅明"
# 「なに、簡単な話さ。アタシたちは星騎士。ならば、『プレゼントを作り出す』という星術を使えるようになればいい」
line = "「なに、簡単な話さ。アタシたちは星騎士。ならば、『プレゼントを作り出す』という星術を使えるようになればいい」"

[[dialogue]]
speaker = "ヨミ"
# 「いや、そんな無茶苦茶な――」
line = "「いや、そんな無茶苦茶な――」"

[[dialogue]]
speaker = "紅明"
# 「今こそ、アタシの隠された第２形態を解禁する時！　変身っ！！」
line = "「今こそ、アタシの隠された第２形態を解禁する時！　変身っ！！」"

[[dialogue]]
speaker = "ヨミ"
# 「えぇっ！？」
line = "「えぇっ！？」"

[[dialogue]]
speaker = "紅明"
# 「<ruby=きえんばんじょう>気炎万丈</ruby>、紅き童子が聖夜を駆ける――」
line = "「<ruby>気炎万丈<rt>きえんばんじょう</rt></ruby>、紅き童子が聖夜を駆ける――」"

[[dialogue]]
speaker = "紅明"
# 「<ruby=さんたくろう>三太九郎</ruby>改め、サンタクロース牛紅明！　世のため人のため、クリスマスも元気で救うぜ！」
line = "「<ruby>三太九郎<rt>さんたくろう</rt></ruby>改め、サンタクロース牛紅明！　世のため人のため、クリスマスも元気で救うぜ！」"

[[dialogue]]
speaker = "セシア"
# 「紅明ママがサンタに変身したわ！」
line = "「紅明ママがサンタに変身したわ！」"

[[dialogue]]
speaker = "unk"
# 紅明、かわいい！　でも、その姿は……！？
line = "紅明、かわいい！　でも、その姿は……！？"

[[dialogue]]
speaker = "紅明"
# 「えへへ♪　ダーリン、ありがと<emoji=heart04>」
line = "「えへへ♪　ダーリン、ありがと<emoji=heart04>」"

[[dialogue]]
speaker = "紅明"
# 「これは昔むかし、アタシのご先祖様が、人間界の子供たちを満面の笑顔にしたいって思った時に、修行して手に入れた新たな力ってやつかな☆」
line = "「これは昔むかし、アタシのご先祖様が、人間界の子供たちを満面の笑顔にしたいって思った時に、修行して手に入れた新たな力ってやつかな☆」"

[[dialogue]]
speaker = "紅明"
# 「というわけで、百聞は一見に如かず。サンタの袋から～……ほい♪　よい子なセッシーにひと足早いクリスマスプレゼントをあげちゃおう☆」
line = "「というわけで、百聞は一見に如かず。サンタの袋から～……ほい♪　よい子なセッシーにひと足早いクリスマスプレゼントをあげちゃおう☆」"

[[dialogue]]
speaker = "セシア"
# 「わあぁっ♪　セシアにくれるの！？　紅明ママ……ううん、サンタママ、ありがと～♪」
line = "「わあぁっ♪　セシアにくれるの！？　紅明ママ……ううん、サンタママ、ありがと～♪」"

[[dialogue]]
speaker = "セシア"
# 「中身を開けてもいいかしら？」
line = "「中身を開けてもいいかしら？」"

[[dialogue]]
speaker = "紅明"
# 「うん、もちろん♪」
line = "「うん、もちろん♪」"

[[dialogue]]
speaker = "セシア"
# 「箱の中に入っているのは……これは、機械かしら？」
line = "「箱の中に入っているのは……これは、機械かしら？」"

[[dialogue]]
speaker = "紅明"
# 「それはＤＩＳＣって言って、簡単に説明するとアタシ達が連絡を取り合う為に使ってるものなんだ」
line = "「それはＤＩＳＣって言って、簡単に説明するとアタシ達が連絡を取り合う為に使ってるものなんだ」"

[[dialogue]]
speaker = "紅明"
# 「セッシーとは、これから仲良くしていきたいからさ。アタシと連絡先を交換して欲しいなって思って♪」
line = "「セッシーとは、これから仲良くしていきたいからさ。アタシと連絡先を交換して欲しいなって思って♪」"

[[dialogue]]
speaker = "セシア"
# 「紅明ママ……！　セシア、感激だわ♪　ママはやっぱり素敵なママね♪」
line = "「紅明ママ……！　セシア、感激だわ♪　ママはやっぱり素敵なママね♪」"

[[dialogue]]
speaker = "ヨミ"
# 「本当に星術でプレゼントを作り出したんですか！？　ば、爆裂すごいです……！」
line = "「本当に星術でプレゼントを作り出したんですか！？　ば、爆裂すごいです……！」"

[[dialogue]]
speaker = "紅明"
# 「善哉善哉♪　これが本物のサンタクロースの力っしょ☆　なんつってね♪」
line = "「善哉善哉♪　これが本物のサンタクロースの力っしょ☆　なんつってね♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「これは……閃いたかもしれないわ！　ねぇ、クロト！」
line = "「これは……閃いたかもしれないわ！　ねぇ、クロト！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ほら、アナとアニマ先輩が研究してた、例のアレがあるじゃない？　それに使えるかも！」
line = "「ほら、アナとアニマ先輩が研究してた、例のアレがあるじゃない？　それに使えるかも！」"

[[dialogue]]
speaker = "unk"
# もしかして、新フォームの……？
line = "もしかして、新フォームの……？"

[[dialogue]]
speaker = "ヴィーナス"
# 「そう！　夏に手に入れた水着フォームから応用して――」
line = "「そう！　夏に手に入れた水着フォームから応用して――」"

[[dialogue]]
speaker = "ヴィーナス"
# 「クリスマスフォームを作り出すのよ！」
line = "「クリスマスフォームを作り出すのよ！」"
