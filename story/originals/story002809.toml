[[dialogue]]
speaker = "ヴィライア"
# 『ウィステリアは確かに呪いを受け入れた……けれど、人間の娘からも魔力を感じる。何が起きたというの……？』
line = "『ウィステリアは確かに呪いを受け入れた……けれど、人間の娘からも魔力を感じる。何が起きたというの……？』"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
# 「私１人で呪いを受け止めるのは無理でも、数分の１なら制御できる」
line = "「私１人で呪いを受け止めるのは無理でも、数分の１なら制御できる」"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
# 「私が構築した術式は、魔力と呪いを本の形に分割し、その本を適合者に貸し出すもの」
line = "「私が構築した術式は、魔力と呪いを本の形に分割し、その本を適合者に貸し出すもの」"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
# 「ただ収蔵するだけだった『書庫』を、『図書館』に改造させてもらったってわけ」
line = "「ただ収蔵するだけだった『書庫』を、『図書館』に改造させてもらったってわけ」"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
# 「名付けて……う～ん、思い付かないわね。紙屋敷さんはどう？」
line = "「名付けて……う～ん、思い付かないわね。紙屋敷さんはどう？」"

[[dialogue]]
speaker = "モネ（覚醒）"
# 「では、魔族の無念や怨念を率いて戦う者…………魔将というのはいかがでしょうか？」
line = "「では、魔族の無念や怨念を率いて戦う者…………魔将というのはいかがでしょうか？」"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
# 「いいわね、それ。さすが未来の大作家！」
line = "「いいわね、それ。さすが未来の大作家！」"

[[dialogue]]
speaker = "モネ（覚醒）"
# 「もう、おだてないでください～」
line = "「もう、おだてないでください～」"

[[dialogue]]
speaker = "モネ（覚醒）"
# 「ちなみに、書庫の呪いっていくつに分けられたんですか？　私とウィステリアさんだけじゃないみたいですけど」
line = "「ちなみに、書庫の呪いっていくつに分けられたんですか？　私とウィステリアさんだけじゃないみたいですけど」"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
# 「『怠惰』『憤怒』『色欲』『嫉妬』『強欲』『暴食』『傲慢』──流星教が唱えた七つの大罪になぞらえて、７つに分割したわ」
line = "「『怠惰』『憤怒』『色欲』『嫉妬』『強欲』『暴食』『傲慢』──流星教が唱えた七つの大罪になぞらえて、７つに分割したわ」"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
# 「魔族は奔放で、欲望に正直で、自分勝手な生き物だから、大罪なんて当てはめるのにおあつらえ向きなのよね」
line = "「魔族は奔放で、欲望に正直で、自分勝手な生き物だから、大罪なんて当てはめるのにおあつらえ向きなのよね」"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
# 「紙屋敷さんにも一番相性のいい一冊──『傲慢』を貸し出したわ」
line = "「紙屋敷さんにも一番相性のいい一冊──『傲慢』を貸し出したわ」"

[[dialogue]]
speaker = "モネ（覚醒）"
# 「わ、私が『傲慢』！？　自分で言うことじゃないかもですけど、『傲慢』とは縁遠いような……」
line = "「わ、私が『傲慢』！？　自分で言うことじゃないかもですけど、『傲慢』とは縁遠いような……」"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
# 「さっきの啖呵、すごくよかったわ。女神様にだって譲れないって」
line = "「さっきの啖呵、すごくよかったわ。女神様にだって譲れないって」"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
# 「あれはまさに傲慢って感じでかっこよかったわよ」
line = "「あれはまさに傲慢って感じでかっこよかったわよ」"

[[dialogue]]
speaker = "モネ（覚醒）"
# 「は、恥ずかしいです～っ」
line = "「は、恥ずかしいです～っ」"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
# 「恥ずかしがらなくていいのよ。強くなるには、時には傲慢さも必要だもの。むしろ紙屋敷さんはすごいんだから、もっと自惚れなさいな」
line = "「恥ずかしがらなくていいのよ。強くなるには、時には傲慢さも必要だもの。むしろ紙屋敷さんはすごいんだから、もっと自惚れなさいな」"

[[dialogue]]
speaker = "モネ（覚醒）"
# 「が、頑張ります！」
line = "「が、頑張ります！」"

[[dialogue]]
speaker = "モネ（覚醒）"
# 「じゃあウィステリアさんの大罪は……」
line = "「じゃあウィステリアさんの大罪は……」"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
# 「『怠惰』が割り当てられたみたいね。ちゃんと社会人として働いてるし、私こそ『怠惰』とは無縁だと思うんだけど……」
line = "「『怠惰』が割り当てられたみたいね。ちゃんと社会人として働いてるし、私こそ『怠惰』とは無縁だと思うんだけど……」"

[[dialogue]]
speaker = "ヴィライア"
# 『英雄になる才を持ちながら、英雄になろうとしなかった。そんなあなたにはお似合いじゃないかしら』
line = "『英雄になる才を持ちながら、英雄になろうとしなかった。そんなあなたにはお似合いじゃないかしら』"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
# 「一言多いわよ、このデカドラゴン！」
line = "「一言多いわよ、このデカドラゴン！」"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
# 「さて、と。それじゃこのうるさいドラゴンを退治するとしましょうか」
line = "「さて、と。それじゃこのうるさいドラゴンを退治するとしましょうか」"

[[dialogue]]
speaker = "ヴィライア"
# 『はぁ……何をするかと思えば、書庫の分割ですって？　随分な子ども騙しね。それでは私たちの求める“英雄”には程遠いわ』
line = "『はぁ……何をするかと思えば、書庫の分割ですって？　随分な子ども騙しね。それでは私たちの求める“英雄”には程遠いわ』"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
# 「ええ、それでいいのよ。絶対の『英雄』は要らない。足りないなら、みんなで力を合わせればいい。……ね、紙屋敷さん」
line = "「ええ、それでいいのよ。絶対の『英雄』は要らない。足りないなら、みんなで力を合わせればいい。……ね、紙屋敷さん」"

[[dialogue]]
speaker = "モネ（覚醒）"
# 「はい！」
line = "「はい！」"

[[dialogue]]
speaker = "モネ（覚醒）"
# （憧れのウィステリアさんと一緒に戦えるなんて、夢みたい……ううん、夢じゃない。もっと自惚れろ）
line = "（憧れのウィステリアさんと一緒に戦えるなんて、夢みたい……ううん、夢じゃない。もっと自惚れろ）"

[[dialogue]]
speaker = "モネ（覚醒）"
# （私、ウィステリアさんと並ぶのに相応しい星騎士になったんだ！　胸を張れ、紙屋敷モネ！！）
line = "（私、ウィステリアさんと並ぶのに相応しい星騎士になったんだ！　胸を張れ、紙屋敷モネ！！）"

[[dialogue]]
speaker = "モネ（覚醒）"
# 「『傲慢』の魔将、紙屋敷モネ、行きます！」
line = "「『傲慢』の魔将、紙屋敷モネ、行きます！」"

[[dialogue]]
speaker = "ヴィライア"
# 『結局、力ずくになるのね。……いいわ、呪いに沈みなさい』
line = "『結局、力ずくになるのね。……いいわ、呪いに沈みなさい』"

[[dialogue]]
speaker = "ヴィライア"
# 『ダークブレイズブレス』
line = "『ダークブレイズブレス』"

[[dialogue]]
speaker = "unk"
# 魔竜の口から放たれた炎が、ウィステリアとモネを焼き焦がさんと迫る。
line = "魔竜の口から放たれた炎が、ウィステリアとモネを焼き焦がさんと迫る。"

[[dialogue]]
speaker = "unk"
# しかしウィステリアが手をかざすと、魔導書の目が赤く輝いて炎を吹き飛ばした。
line = "しかしウィステリアが手をかざすと、魔導書の目が赤く輝いて炎を吹き飛ばした。"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
# 「ちゃんと魔導書のコントロールが戻ったわね。いつも呪ってくるくせに、肝心な時に役に立たないんだから、ほんと腹立たしいわ」
line = "「ちゃんと魔導書のコントロールが戻ったわね。いつも呪ってくるくせに、肝心な時に役に立たないんだから、ほんと腹立たしいわ」"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
# 「さぁ、さっき寝ていた分、キリキリ働きなさい！　スロウスナイトメア！」
line = "「さぁ、さっき寝ていた分、キリキリ働きなさい！　スロウスナイトメア！」"

[[dialogue]]
speaker = "unk"
# もう一度魔導書の目が怪しく光り、石になったように竜の動きが止まる。
line = "もう一度魔導書の目が怪しく光り、石になったように竜の動きが止まる。"

[[dialogue]]
speaker = "ヴィライア"
# 『ぐっ……！？　体が、動かない……！？』
line = "『ぐっ……！？　体が、動かない……！？』"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
# 「さっき私を怠け者呼ばわりしてくれたから、あなたの動きを止めてあげたわ」
line = "「さっき私を怠け者呼ばわりしてくれたから、あなたの動きを止めてあげたわ」"

[[dialogue]]
speaker = "ヴィライア"
# 『それなら……！』
line = "『それなら……！』"

[[dialogue]]
speaker = "unk"
# ウィステリアを再び拘束せんと、四方八方から呪縛の鎖が殺到する。
line = "ウィステリアを再び拘束せんと、四方八方から呪縛の鎖が殺到する。"

[[dialogue]]
speaker = "unk"
# だが──
line = "だが──"

[[dialogue]]
speaker = "モネ（覚醒）"
# 「テリトリーオブオーサー！」
line = "「テリトリーオブオーサー！」"

[[dialogue]]
speaker = "unk"
# モネが魔本を開くと、鎖は向きを変え、まるで命令されたかのようにヴィライアを襲う。
line = "モネが魔本を開くと、鎖は向きを変え、まるで命令されたかのようにヴィライアを襲う。"

[[dialogue]]
speaker = "ヴィライア"
# 『くっ……こざかしい！』
line = "『くっ……こざかしい！』"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
# 「このまま攻めるわよ、紙屋敷さん！」
line = "「このまま攻めるわよ、紙屋敷さん！」"

[[dialogue]]
speaker = "モネ（覚醒）"
# 「はい！　司書と図書委員の連携を見せましょう！」
line = "「はい！　司書と図書委員の連携を見せましょう！」"
