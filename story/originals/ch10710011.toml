[[dialogue]]
speaker = "unk"
# 第１話,キサナの気まぐれ,P
line = "第１話,キサナの気まぐれ,P"

[[dialogue]]
speaker = "キサナ"
# 「ったく逃亡生活も楽じゃねえな。どこ行っても新星だか流星だかの制服がうろちょろしてやがる」
line = "「ったく逃亡生活も楽じゃねえな。どこ行っても新星だか流星だかの制服がうろちょろしてやがる」"

[[dialogue]]
speaker = "キサナ"
# 「とにかく今日の寝床寝床っと。お、丁度良いところに空き家があんじゃねえか」
line = "「とにかく今日の寝床寝床っと。お、丁度良いところに空き家があんじゃねえか」"

[[dialogue]]
speaker = "キサナ"
# 「ここならしばらく身を隠せ────ん？」
line = "「ここならしばらく身を隠せ────ん？」"

[[dialogue]]
speaker = "unk"
# コラプサーによる襲撃事件後、姿をくらましたキサナという女の子を探して街を見回っていた。
line = "コラプサーによる襲撃事件後、姿をくらましたキサナという女の子を探して街を見回っていた。"

[[dialogue]]
speaker = "unk"
# とはいえ、こんな真っ昼間から出歩いているはずが──
line = "とはいえ、こんな真っ昼間から出歩いているはずが──"

[[dialogue]]
speaker = "キサナ"
# 「わーったか？　この街なら飯なんか漁ろうと思えばいくらでも漁れんだよ。しかもこんな上等なもんをな」
line = "「わーったか？　この街なら飯なんか漁ろうと思えばいくらでも漁れんだよ。しかもこんな上等なもんをな」"

[[dialogue]]
speaker = "キサナ"
# 「つかこの街は一体どーなってんだ。まだ食える弁当を平気で捨てやがって。マジでムカつくぜ」
line = "「つかこの街は一体どーなってんだ。まだ食える弁当を平気で捨てやがって。マジでムカつくぜ」"

[[dialogue]]
speaker = "unk"
# いた！？
line = "いた！？"

[[dialogue]]
speaker = "キサナ"
# 「あ？　テメエ、魔王じゃねえか。チッ、やっぱ鉢合わせちまったか。だからこんな明るいうちに出歩くのは嫌だったんだ」
line = "「あ？　テメエ、魔王じゃねえか。チッ、やっぱ鉢合わせちまったか。だからこんな明るいうちに出歩くのは嫌だったんだ」"

[[dialogue]]
speaker = "キサナ"
# 「見逃してくれるわけは……ねえわな。ったく面倒なことになっちまったぜ。柄にもねえことするもんじゃねえな」
line = "「見逃してくれるわけは……ねえわな。ったく面倒なことになっちまったぜ。柄にもねえことするもんじゃねえな」"

[[dialogue]]
speaker = "キサナ"
# 「おい、ガキ。弁当持って先に戻っとけ。あ、ステーキ弁当は食うなよ？　そりゃアタシんだからな？　それ以外は好きに食っちまっていいからよ」
line = "「おい、ガキ。弁当持って先に戻っとけ。あ、ステーキ弁当は食うなよ？　そりゃアタシんだからな？　それ以外は好きに食っちまっていいからよ」"

[[dialogue]]
speaker = "unk"
# その小さな女の子は……
line = "その小さな女の子は……"

[[dialogue]]
speaker = "キサナ"
# 「あん？　別に攫ってきたわけじゃねえよ」
line = "「あん？　別に攫ってきたわけじゃねえよ」"

[[dialogue]]
speaker = "キサナ"
# 「空き家同然の家に忍び込んだらコイツが部屋の隅で丸まってやがったんだ」
line = "「空き家同然の家に忍び込んだらコイツが部屋の隅で丸まってやがったんだ」"

[[dialogue]]
speaker = "キサナ"
# 「どこの国にもいるもんだな。平気でテメエのガキほっぽり出して消える親ってのは」
line = "「どこの国にもいるもんだな。平気でテメエのガキほっぽり出して消える親ってのは」"

[[dialogue]]
speaker = "キサナ"
# 「聞いた話じゃあ、男と出て行ったきり何日も家に帰ってきてねーんだとよ」
line = "「聞いた話じゃあ、男と出て行ったきり何日も家に帰ってきてねーんだとよ」"

[[dialogue]]
speaker = "キサナ"
# 「そりゃ家も空き家に見えるってもんだ。テメエのガキの面倒くらい最後まで見ろっての」
line = "「そりゃ家も空き家に見えるってもんだ。テメエのガキの面倒くらい最後まで見ろっての」"

[[dialogue]]
speaker = "キサナ"
# 「このガキときたら、全然喋らねえくせに腹の虫はぐぅぐぅとうるせぇし。眠れねえったらありゃしねえ」
line = "「このガキときたら、全然喋らねえくせに腹の虫はぐぅぐぅとうるせぇし。眠れねえったらありゃしねえ」"

[[dialogue]]
speaker = "unk"
# それでその子のために弁当を？
line = "それでその子のために弁当を？"

[[dialogue]]
speaker = "キサナ"
# 「ハッ、ついでだ、ついで。アタシも飯食わなきゃ生きてけねえからな。この街の地理もまだよくわかってねえからよ」
line = "「ハッ、ついでだ、ついで。アタシも飯食わなきゃ生きてけねえからな。この街の地理もまだよくわかってねえからよ」"

[[dialogue]]
speaker = "キサナ"
# 「宿と街の案内の駄賃代わりってとこだ。これでも借りは返す主義なんだよ」
line = "「宿と街の案内の駄賃代わりってとこだ。これでも借りは返す主義なんだよ」"

[[dialogue]]
speaker = "キサナ"
# 「で……やんのかやらねえのかどっちだ？　お優しい魔王さまがガキに免じて見逃してくれるのを期待してんだけどな？」
line = "「で……やんのかやらねえのかどっちだ？　お優しい魔王さまがガキに免じて見逃してくれるのを期待してんだけどな？」"

[[dialogue]]
speaker = "unk"
# その子の保護が最優先だ
line = "その子の保護が最優先だ"

[[dialogue]]
speaker = "キサナ"
# 「保護だ？　正義の味方さまが何してくれるってんだよ？　困ってる子どもは放っておけないってか」
line = "「保護だ？　正義の味方さまが何してくれるってんだよ？　困ってる子どもは放っておけないってか」"

[[dialogue]]
speaker = "キサナ"
# 「──施設に預ける？　ふざけてんじゃねえぞ、偽善者が。そういう態度がムカつくんだよ」
line = "「──施設に預ける？　ふざけてんじゃねえぞ、偽善者が。そういう態度がムカつくんだよ」"

[[dialogue]]
speaker = "キサナ"
# 「テメエの道楽にコイツを巻き込んでんじゃねえよ。他人に任せても何も変わらねえ」
line = "「テメエの道楽にコイツを巻き込んでんじゃねえよ。他人に任せても何も変わらねえ」"

[[dialogue]]
speaker = "キサナ"
# 「せいぜい体を丸める場所があの家からその施設に変わるだけじゃねえか。その施設っつーのは、コイツにどれだけのことをするっつーんだよ？」
line = "「せいぜい体を丸める場所があの家からその施設に変わるだけじゃねえか。その施設っつーのは、コイツにどれだけのことをするっつーんだよ？」"

[[dialogue]]
speaker = "キサナ"
# 「どーせ何もしねえ。いいや、何もしねえどころか、良いように使われて終わりだ」
line = "「どーせ何もしねえ。いいや、何もしねえどころか、良いように使われて終わりだ」"

[[dialogue]]
speaker = "キサナ"
# 「アタシはな、今までずっと見てきたんだ」
line = "「アタシはな、今までずっと見てきたんだ」"

[[dialogue]]
speaker = "キサナ"
# 「泥水啜って生きてるようなアタシらに、善人ぶって近づいてきて、甘い言葉で惑わして、ついて行ったら最後、使い捨てにして高笑いするクソ野郎どもをよ」
line = "「泥水啜って生きてるようなアタシらに、善人ぶって近づいてきて、甘い言葉で惑わして、ついて行ったら最後、使い捨てにして高笑いするクソ野郎どもをよ」"

[[dialogue]]
speaker = "キサナ"
# 「そんなヤツらんとこに行かせるくらいなら、１人で生きていく術を身につけさせた方がよっぽどマシだ」
line = "「そんなヤツらんとこに行かせるくらいなら、１人で生きていく術を身につけさせた方がよっぽどマシだ」"

[[dialogue]]
speaker = "キサナ"
# 「この街はまだ食える弁当すら捨てちまうような街だしな。家から出さえすりゃいくらでも食いもんにありつける」
line = "「この街はまだ食える弁当すら捨てちまうような街だしな。家から出さえすりゃいくらでも食いもんにありつける」"

[[dialogue]]
speaker = "キサナ"
# 「だいたいテメエみてえなヤツが一番タチわりいんだよ。後先考えねえで、正しいことしてますって面でしゃしゃり出て来やがって」
line = "「だいたいテメエみてえなヤツが一番タチわりいんだよ。後先考えねえで、正しいことしてますって面でしゃしゃり出て来やがって」"

[[dialogue]]
speaker = "キサナ"
# 「あーイライラするぜ。やっぱ一発ぶん殴──ふにゃっ！？」
line = "「あーイライラするぜ。やっぱ一発ぶん殴──ふにゃっ！？」"

[[dialogue]]
speaker = "キサナ"
# 「オマっ、ガキっ、どこ触って──はにゃっ！？　バカ、やめろ、尻尾握るんじゃねえっ……！」
line = "「オマっ、ガキっ、どこ触って──はにゃっ！？　バカ、やめろ、尻尾握るんじゃねえっ……！」"

[[dialogue]]
speaker = "キサナ"
# 「つか先に戻っとけって言ったじゃねえかっ。……はぁ？　一緒に食べる？　先に食いたきゃ食えっつったろっ」
line = "「つか先に戻っとけって言ったじゃねえかっ。……はぁ？　一緒に食べる？　先に食いたきゃ食えっつったろっ」"

[[dialogue]]
speaker = "キサナ"
# 「ちょっ、ひにゃっ……！？　尻尾引っ張んなっ……！　わかった行くっ、アタシも一緒に戻りゃいいんだろうがっ……！」
line = "「ちょっ、ひにゃっ……！？　尻尾引っ張んなっ……！　わかった行くっ、アタシも一緒に戻りゃいいんだろうがっ……！」"

[[dialogue]]
speaker = "キサナ"
# 「チッ……つーわけだから行かせてもらうぜ？　テメエの言うことなんざ信用できねえしな」
line = "「チッ……つーわけだから行かせてもらうぜ？　テメエの言うことなんざ信用できねえしな」"

[[dialogue]]
speaker = "キサナ"
# 「それともここでやるか？　腹に風穴空いても知らねえぞ？」
line = "「それともここでやるか？　腹に風穴空いても知らねえぞ？」"

[[dialogue]]
speaker = "キサナ"
# 「アタシの力はテメエもよく知って──ひぃあっ！？　オマっ、メンチ切ってる時に尻尾引っ張るんじゃねえっ……！！」
line = "「アタシの力はテメエもよく知って──ひぃあっ！？　オマっ、メンチ切ってる時に尻尾引っ張るんじゃねえっ……！！」"

[[dialogue]]
speaker = "キサナ"
# 「きゃふっ、んふっ、わかった、わかったからっ……！　あーくそっ、とにかく追いかけてくんじゃねえぞ魔王っ……！」
line = "「きゃふっ、んふっ、わかった、わかったからっ……！　あーくそっ、とにかく追いかけてくんじゃねえぞ魔王っ……！」"

[[dialogue]]
speaker = "キサナ"
# 「ったく、このガキは……。あ？　ステーキ弁当だけは譲らねえっつってんだろ。アタシの大好物なんだよ」
line = "「ったく、このガキは……。あ？　ステーキ弁当だけは譲らねえっつってんだろ。アタシの大好物なんだよ」"

[[dialogue]]
speaker = "キサナ"
# 「んひぃあっ……！　テメ、ゴラっ、一切れだけだからな、畜生っ……！　調子に乗ってっとぶっとばすぞっ」
line = "「んひぃあっ……！　テメ、ゴラっ、一切れだけだからな、畜生っ……！　調子に乗ってっとぶっとばすぞっ」"

[[dialogue]]
speaker = "キサナ"
# 「そーだ、飯食ったら水浴びしに行くぞ。昨日、庭に噴水のあるデケえ建物を見つけてな」
line = "「そーだ、飯食ったら水浴びしに行くぞ。昨日、庭に噴水のあるデケえ建物を見つけてな」"

[[dialogue]]
speaker = "キサナ"
# 「は？　流星学園？　んだよ、んじゃ無理じゃねえか。危うく敵地に水浴びしに行くとこだったぜ……」
line = "「は？　流星学園？　んだよ、んじゃ無理じゃねえか。危うく敵地に水浴びしに行くとこだったぜ……」"

[[dialogue]]
speaker = "unk"
# 根っからの悪人ってわけでも……ないのか？
line = "根っからの悪人ってわけでも……ないのか？"
