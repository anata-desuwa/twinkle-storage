[[dialogue]]
speaker = "unk"
# 第１話,甘えたがりな恋人,P
line = "第１話,甘えたがりな恋人,P"

[[dialogue]]
speaker = "unk"
# ヴィーナスと恋人になってから迎えたお正月休み。俺たちはデートに出かけることになった――
line = "ヴィーナスと恋人になってから迎えたお正月休み。俺たちはデートに出かけることになった――"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロト～！　おっはよ～♪」
line = "「クロト～！　おっはよ～♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「じゃ～ん♪　今日のデートは、お正月っていうことで晴れ着にしてみたわ！」
line = "「じゃ～ん♪　今日のデートは、お正月っていうことで晴れ着にしてみたわ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「でも、いつもよりオシャレしたくて、うちのメイド長にメイクしてもらったの♪　どうかしら？」
line = "「でも、いつもよりオシャレしたくて、うちのメイド長にメイクしてもらったの♪　どうかしら？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「――綺麗？　えへへ～♪　ありがと♪」
line = "「――綺麗？　えへへ～♪　ありがと♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それで、今日なんだけど、新年になって初めてのデートじゃない？」
line = "「それで、今日なんだけど、新年になって初めてのデートじゃない？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「その記念にスペシャルな感じにしたいと思って、私、考えてきたの！　ズバリ今回は――」
line = "「その記念にスペシャルな感じにしたいと思って、私、考えてきたの！　ズバリ今回は――」"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロトにお姫様抱っこしてもらいながらデートしてみたいんだけど、どうかしら！？」
line = "「クロトにお姫様抱っこしてもらいながらデートしてみたいんだけど、どうかしら！？」"

[[dialogue]]
speaker = "unk"
# さすがに人前だと目立って恥ずかしいよ！？
line = "さすがに人前だと目立って恥ずかしいよ！？"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふふっ♪　冗談よ。ただ――」
line = "「ふふっ♪　冗談よ。ただ――」"

[[dialogue]]
speaker = "unk"
# ヴィーナスは俺の腕に抱き着いてきた。
line = "ヴィーナスは俺の腕に抱き着いてきた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「その分、今日はいっぱい甘えちゃうんだから<emoji=heart04>　えへへ♪　じゃあ、いきましょ！」
line = "「その分、今日はいっぱい甘えちゃうんだから<emoji=heart04>　えへへ♪　じゃあ、いきましょ！」"

[[dialogue]]
speaker = "unk"
# それから俺たちは街へ移動し、デートを開始したのだが――
line = "それから俺たちは街へ移動し、デートを開始したのだが――"

[[dialogue]]
speaker = "ヴィーナス"
# 「ねぇねぇ、クロト、こういう人通りが多いところでもイチャイチャしてるカップルって、たまに見るわよね？」
line = "「ねぇねぇ、クロト、こういう人通りが多いところでもイチャイチャしてるカップルって、たまに見るわよね？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「だから、意外とやってみると、大丈夫な気がしない？　というわけで、ん～<emoji=heart04>」
line = "「だから、意外とやってみると、大丈夫な気がしない？　というわけで、ん～<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
# 「――なにって、キスのおねだりよ<emoji=heart04>　恋人なんだし、別におかしくないでしょ？」
line = "「――なにって、キスのおねだりよ<emoji=heart04>　恋人なんだし、別におかしくないでしょ？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「――お姫様抱っこより恥ずかしいからＮＧ？　ふふっ、じゃあ、人気のないところを見つけたら、いいの？」
line = "「――お姫様抱っこより恥ずかしいからＮＧ？　ふふっ、じゃあ、人気のないところを見つけたら、いいの？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あ～！　今ちょっと、考える間があったわよ？　恋人なんだから、顔見たらわかっちゃうんだから♪」
line = "「あ～！　今ちょっと、考える間があったわよ？　恋人なんだから、顔見たらわかっちゃうんだから♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「でも、キスがお預けなら仕方ないわね。その代わりに繋いだ手の方でイチャイチャすることにするわ」
line = "「でも、キスがお預けなら仕方ないわね。その代わりに繋いだ手の方でイチャイチャすることにするわ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ほら、こうやって小指だけで繋いでみたりすると……赤い糸で繋がってるみたいな感じがしない？　えへへ♪」
line = "「ほら、こうやって小指だけで繋いでみたりすると……赤い糸で繋がってるみたいな感じがしない？　えへへ♪」"

[[dialogue]]
speaker = "unk"
# ウィンドウショッピングを楽しんだ後、俺たちはカフェに入って、ケーキを注文する。
line = "ウィンドウショッピングを楽しんだ後、俺たちはカフェに入って、ケーキを注文する。"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロト、いつもみたいに食べさせて～♪　あ～ん<emoji=heart04>」
line = "「クロト、いつもみたいに食べさせて～♪　あ～ん<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
# 「――あむっ♪　もぐもぐ……ん～<emoji=heart04>　初めて入ったお店だけど、聞いていた通り、すごく美味しいわ♪」
line = "「――あむっ♪　もぐもぐ……ん～<emoji=heart04>　初めて入ったお店だけど、聞いていた通り、すごく美味しいわ♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ほら、今度はクロトが食べる番よ。フォークでケーキを切って……はい、口開けて？　あ～ん<emoji=heart04>」
line = "「ほら、今度はクロトが食べる番よ。フォークでケーキを切って……はい、口開けて？　あ～ん<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
# 「どう？　ショートケーキ、甘くて美味しい？　じゃあ今度は、クロトの注文したチョコレートケーキが食べたいわ♪」
line = "「どう？　ショートケーキ、甘くて美味しい？　じゃあ今度は、クロトの注文したチョコレートケーキが食べたいわ♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あ～ん<emoji=heart04>　あむっ♪　ん～<emoji=heart04>　こっちもすごく美味しくて、頬っぺたが落ちちゃいそう♪」
line = "「あ～ん<emoji=heart04>　あむっ♪　ん～<emoji=heart04>　こっちもすごく美味しくて、頬っぺたが落ちちゃいそう♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「恋人だと、２つ頼んで、こういう食べさせ合いっこができるからお得よね♪」
line = "「恋人だと、２つ頼んで、こういう食べさせ合いっこができるからお得よね♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「え？　――恋人でも、必ずしもするわけではない？　そうなの？」
line = "「え？　――恋人でも、必ずしもするわけではない？　そうなの？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あっ、だから星徒会のみんなに話した時、バカップルだって言ってたのね！　私は気にしないけど！」
line = "「あっ、だから星徒会のみんなに話した時、バカップルだって言ってたのね！　私は気にしないけど！」"

[[dialogue]]
speaker = "unk"
# 俺は気になるんだけど！？
line = "俺は気になるんだけど！？"

[[dialogue]]
speaker = "ヴィーナス"
# 「だとしても、あ～んしてもらうのって、それだけで幸せがトッピングされて、美味しくなる感じがしない？」
line = "「だとしても、あ～んしてもらうのって、それだけで幸せがトッピングされて、美味しくなる感じがしない？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私はこれからも、クロトにい～っぱい、あ～んってしてもらいたいわ。クロトはどう？」
line = "「私はこれからも、クロトにい～っぱい、あ～んってしてもらいたいわ。クロトはどう？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「――えへへ♪　じゃあ、食べさせ合いっこの続きね♪」
line = "「――えへへ♪　じゃあ、食べさせ合いっこの続きね♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「はい、クロトもチョコケーキ、あ～ん<emoji=heart04>」
line = "「はい、クロトもチョコケーキ、あ～ん<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# それからもヴィーナスと色んなところを周り、気づけば夜になっていた。
line = "それからもヴィーナスと色んなところを周り、気づけば夜になっていた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「もうこんな時間！　これ以上遅くなると、九浄家のみんなに心配されちゃうわね」
line = "「もうこんな時間！　これ以上遅くなると、九浄家のみんなに心配されちゃうわね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「だけど、今日は恋人っぽいことが沢山できたし、満足なお正月デートだったわ♪」
line = "「だけど、今日は恋人っぽいことが沢山できたし、満足なお正月デートだったわ♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それじゃあ、帰りましょうか――って、クロト？」
line = "「それじゃあ、帰りましょうか――って、クロト？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「きゃっ……こ、これって、お姫様抱っこ？」
line = "「きゃっ……こ、これって、お姫様抱っこ？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「――もう辺りは暗いし、帰り道なら目立たないから？」
line = "「――もう辺りは暗いし、帰り道なら目立たないから？」"

[[dialogue]]
speaker = "unk"
# それに、冗談っぽく言ってたけど、本当はしてもらいたそうな顔だったから、と俺は告げる。
line = "それに、冗談っぽく言ってたけど、本当はしてもらいたそうな顔だったから、と俺は告げる。"

[[dialogue]]
speaker = "ヴィーナス"
# 「……！　クロト……♪」
line = "「……！　クロト……♪」"

[[dialogue]]
speaker = "unk"
# よし、じゃあ行くぞ
line = "よし、じゃあ行くぞ"

[[dialogue]]
speaker = "ヴィーナス"
# 「わぁ～～～っ♪　ふふっ、見て見て、流れ星が綺麗だわ！」
line = "「わぁ～～～っ♪　ふふっ、見て見て、流れ星が綺麗だわ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ねぇ、クロト！」
line = "「ねぇ、クロト！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ありがと。今日のデートは大満足よ♪」
line = "「ありがと。今日のデートは大満足よ♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……ちゅっ<emoji=heart04>」
line = "「……ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ご満悦のヴィーナスは、俺の頬にキスをしてくれたのだった――
line = "ご満悦のヴィーナスは、俺の頬にキスをしてくれたのだった――"
