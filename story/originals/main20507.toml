[[dialogue]]
speaker = "unk"
# 第７話,チナとの再会,B
line = "第７話,チナとの再会,B"

[[dialogue]]
speaker = "unk"
# 一時は絶望的な戦力差かと思われたが、フィオナの帰還と、煌嶺の参戦によって押し返し始めている。
line = "一時は絶望的な戦力差かと思われたが、フィオナの帰還と、煌嶺の参戦によって押し返し始めている。"

[[dialogue]]
speaker = "unk"
# 一方、俺とヴィーナス、選挙管理委員会の３人は、デネブ側の指揮官を探して戦場を駆け回っていた。
line = "一方、俺とヴィーナス、選挙管理委員会の３人は、デネブ側の指揮官を探して戦場を駆け回っていた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「どこにいるのよ、あのちみっ子！　ガーディアンが暴れるのをどこかで見てるのかしら？」
line = "「どこにいるのよ、あのちみっ子！　ガーディアンが暴れるのをどこかで見てるのかしら？」"

[[dialogue]]
speaker = "クロト"
# 「チナは俺に強い敵意を持っていた。アルタイルに来ているなら、真っ先に俺を狙うだろう」
line = "「チナは俺に強い敵意を持っていた。アルタイルに来ているなら、真っ先に俺を狙うだろう」"

[[dialogue]]
speaker = "クロト"
# 「極星従騎は確かに強いが、アルタイルへの攻撃をガーディアンだけに任せるとは思えない」
line = "「極星従騎は確かに強いが、アルタイルへの攻撃をガーディアンだけに任せるとは思えない」"

[[dialogue]]
speaker = "ナターシャ"
# 「ってことはー……」
line = "「ってことはー……」"

[[dialogue]]
speaker = "梨緒"
# 「チナ以外の指揮官が来ているか……それとも何か企んでいるということか」
line = "「チナ以外の指揮官が来ているか……それとも何か企んでいるということか」"

[[dialogue]]
speaker = "クロト"
# 「企んでいる……か」
line = "「企んでいる……か」"

[[dialogue]]
speaker = "unk"
# シノさんも、チナの宣戦布告には何か隠された意図があるかもしれないと言っていた。
line = "シノさんも、チナの宣戦布告には何か隠された意図があるかもしれないと言っていた。"

[[dialogue]]
speaker = "unk"
# なら先日、チナが教皇庁に現れたことも偶然じゃないのか……？
line = "なら先日、チナが教皇庁に現れたことも偶然じゃないのか……？"

[[dialogue]]
speaker = "クロト"
# 「もしかすると、チナが教皇庁に現れたのは下見だったのかも……」
line = "「もしかすると、チナが教皇庁に現れたのは下見だったのかも……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「なるほど、そうかもしれないわね！　教皇庁に行ってみましょ！」
line = "「なるほど、そうかもしれないわね！　教皇庁に行ってみましょ！」"

[[dialogue]]
speaker = "unk"
# そのまま空から教皇庁に近づいていくが──
line = "そのまま空から教皇庁に近づいていくが──"

[[dialogue]]
speaker = "梨緒"
# 「──！　どうやら邪魔をしたい輩がいるようだ」
line = "「──！　どうやら邪魔をしたい輩がいるようだ」"

[[dialogue]]
speaker = "梨緒"
# 「選管は敵を食い止めよう。君たちは行ってくれ」
line = "「選管は敵を食い止めよう。君たちは行ってくれ」"

[[dialogue]]
speaker = "クロト"
# 「ああ、わかった！」
line = "「ああ、わかった！」"

[[dialogue]]
speaker = "unk"
# 俺とヴィーナスは飛翔を止めずに教皇庁へと向かう。
line = "俺とヴィーナスは飛翔を止めずに教皇庁へと向かう。"

[[dialogue]]
speaker = "ナターシャ"
# 「これでよかったの？」
line = "「これでよかったの？」"

[[dialogue]]
speaker = "梨緒"
# 「ああ、チナの相手は星徒会に任せよう。私たちは──」
line = "「ああ、チナの相手は星徒会に任せよう。私たちは──」"

[[dialogue]]
speaker = "梨緒"
# 「そこだ！」
line = "「そこだ！」"

[[dialogue]]
speaker = "ジグ"
# 「おや、よくわかったね」
line = "「おや、よくわかったね」"

[[dialogue]]
speaker = "梨緒"
# 「不本意ながら、君のことはよく知っているからな。どうせ高見の見物を決め込むつもりだったんだろう」
line = "「不本意ながら、君のことはよく知っているからな。どうせ高見の見物を決め込むつもりだったんだろう」"

[[dialogue]]
speaker = "梨緒"
# 「同じ世界から来た者の責任だ。君の相手は私がする」
line = "「同じ世界から来た者の責任だ。君の相手は私がする」"

[[dialogue]]
speaker = "ジグ"
# 「同じ世界？　ああ、星徒会とか会長とか何か言っていたっけ」
line = "「同じ世界？　ああ、星徒会とか会長とか何か言っていたっけ」"

[[dialogue]]
speaker = "梨緒"
# 「何度も言わせるな。私たちは平行世界ベガの新星学園で、同じ星徒会にいたんだ」
line = "「何度も言わせるな。私たちは平行世界ベガの新星学園で、同じ星徒会にいたんだ」"

[[dialogue]]
speaker = "unk"
# 
line = ""

[[dialogue]]
speaker = "ジグ"
# 「知らないって言ってるだろう？　私は最初から神の<ruby=しもべ>僕</ruby>だ。星徒会長になった覚えなんてない」
line = "「知らないって言ってるだろう？　私は最初から神の<ruby>僕<rt>しもべ</rt></ruby>だ。星徒会長になった覚えなんてない」"

[[dialogue]]
speaker = "ジグ"
# 「でも君、ベガの出身だったんだ。へぇ、それは珍しい」
line = "「でも君、ベガの出身だったんだ。へぇ、それは珍しい」"

[[dialogue]]
speaker = "ジグ"
# 「きっと傷心だろうし、少し手加減してあげようか？」
line = "「きっと傷心だろうし、少し手加減してあげようか？」"

[[dialogue]]
speaker = "梨緒"
# 「それで気遣いのつもりか？　相変わらず癇に障るやつだ」
line = "「それで気遣いのつもりか？　相変わらず癇に障るやつだ」"

[[dialogue]]
speaker = "梨緒"
# 「今日こそは勝たせてもらう！　その怪しげな仮面、剥がしてやるから覚悟しろ」
line = "「今日こそは勝たせてもらう！　その怪しげな仮面、剥がしてやるから覚悟しろ」"

[[dialogue]]
speaker = "チナ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ヴィーナス"
# 「いたわよ！　ドンピシャだわ！」
line = "「いたわよ！　ドンピシャだわ！」"

[[dialogue]]
speaker = "unk"
# 教皇庁の前の広場の片隅、どこか遠くを見据えるような表情で佇むチナ。
line = "教皇庁の前の広場の片隅、どこか遠くを見据えるような表情で佇むチナ。"

[[dialogue]]
speaker = "クロト"
# （あれは……？）
line = "（あれは……？）"

[[dialogue]]
speaker = "unk"
# チナの手の中にある、黒い玉。
line = "チナの手の中にある、黒い玉。"

[[dialogue]]
speaker = "unk"
# まるでブラックホールのような得体の知れない威容を放っているが、同時に既視感もあるような……
line = "まるでブラックホールのような得体の知れない威容を放っているが、同時に既視感もあるような……"

[[dialogue]]
speaker = "チナ"
# 「……来たか、魔王」
line = "「……来たか、魔王」"

[[dialogue]]
speaker = "unk"
# チナもこちらに気付き、視線を向ける。
line = "チナもこちらに気付き、視線を向ける。"

[[dialogue]]
speaker = "unk"
# しかし以前のように激しい怒りや憎しみを露わにすることはなく、静かに俺たちを見上げていた。
line = "しかし以前のように激しい怒りや憎しみを露わにすることはなく、静かに俺たちを見上げていた。"

[[dialogue]]
speaker = "チナ"
# 「今日でアルタイルを終わらせる」
line = "「今日でアルタイルを終わらせる」"

[[dialogue]]
speaker = "クロト"
# 「いいや、アルタイルは終わらせない。俺たちが守る」
line = "「いいや、アルタイルは終わらせない。俺たちが守る」"

[[dialogue]]
speaker = "チナ"
# 「ならやってみせろ、魔王！」
line = "「ならやってみせろ、魔王！」"

[[dialogue]]
speaker = "unk"
# 星術によって空中に光の道を作り出し、チナのローラースケートが駆ける。
line = "星術によって空中に光の道を作り出し、チナのローラースケートが駆ける。"

[[dialogue]]
speaker = "unk"
# チナが弾丸となって突進し、俺は真正面から拳を叩きつけた。
line = "チナが弾丸となって突進し、俺は真正面から拳を叩きつけた。"
