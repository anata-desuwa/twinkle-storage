[[dialogue]]
speaker = "unk"
# 第４話,斉天大聖の初デート,P
line = "第４話,斉天大聖の初デート,P"

[[dialogue]]
speaker = "unk"
# クーシェンと仲良くなり、しばらく経ったある日のこと。
line = "クーシェンと仲良くなり、しばらく経ったある日のこと。"

[[dialogue]]
speaker = "unk"
# 俺はクーシェンから「デートに行こうよ！」と誘われて、遊園地へやって来ていた。
line = "俺はクーシェンから「デートに行こうよ！」と誘われて、遊園地へやって来ていた。"

[[dialogue]]
speaker = "クーシェン"
# 「ここが人間界の遊園地か～♪　ウキウキしてきた～♪」
line = "「ここが人間界の遊園地か～♪　ウキウキしてきた～♪」"

[[dialogue]]
speaker = "unk"
# 俺と手を繋ぎながら無邪気に笑うクーシェン。
line = "俺と手を繋ぎながら無邪気に笑うクーシェン。"

[[dialogue]]
speaker = "unk"
# その小さく柔らかな手の感触と温かさを、つい意識してしまっていると――
line = "その小さく柔らかな手の感触と温かさを、つい意識してしまっていると――"

[[dialogue]]
speaker = "クーシェン"
# 「って、にーにー、どうかした？　なんか今日は変だよ？　反応がいつもと違くない？」
line = "「って、にーにー、どうかした？　なんか今日は変だよ？　反応がいつもと違くない？」"

[[dialogue]]
speaker = "クーシェン"
# 「あ～、さては、今日が初デートだから、ボクのことを女の子として意識しちゃってるのかな～？」
line = "「あ～、さては、今日が初デートだから、ボクのことを女の子として意識しちゃってるのかな～？」"

[[dialogue]]
speaker = "クーシェン"
# 「ねーねーから教えてもらった通り、『デート』って言っとくと、男のヒトの反応が違うっていうのは本当だったね♪　ウキキ♪」
line = "「ねーねーから教えてもらった通り、『デート』って言っとくと、男のヒトの反応が違うっていうのは本当だったね♪　ウキキ♪」"

[[dialogue]]
speaker = "クーシェン"
# 「――ん？　なんで、デートなのかって？　それはもちろん『大人ゲージ』を貯める為だよ♪」
line = "「――ん？　なんで、デートなのかって？　それはもちろん『大人ゲージ』を貯める為だよ♪」"

[[dialogue]]
speaker = "クーシェン"
# 「確かに『おっぱいゲージ』から先に貯めるって決めたけど、『大人ゲージ』も別に貯めといて損はないでしょ？」
line = "「確かに『おっぱいゲージ』から先に貯めるって決めたけど、『大人ゲージ』も別に貯めといて損はないでしょ？」"

[[dialogue]]
speaker = "クーシェン"
# 「そのことをねーねーに相談したら、それならにーにーとのデートがいいんじゃない？　って言ってもらったんだ～♪」
line = "「そのことをねーねーに相談したら、それならにーにーとのデートがいいんじゃない？　って言ってもらったんだ～♪」"

[[dialogue]]
speaker = "unk"
# おのれ、策士紅明……！
line = "おのれ、策士紅明……！"

[[dialogue]]
speaker = "クーシェン"
# 「というわけで、今日はボクがいっぱい、大人なデートでにーにーのことをドキドキさせちゃうから、楽しみにしててよね♪」
line = "「というわけで、今日はボクがいっぱい、大人なデートでにーにーのことをドキドキさせちゃうから、楽しみにしててよね♪」"

[[dialogue]]
speaker = "クーシェン"
# 「にーにー、早く行こっ♪」
line = "「にーにー、早く行こっ♪」"

[[dialogue]]
speaker = "unk"
# そう言って、彼女は俺の手を引いて走り出すのだった――
line = "そう言って、彼女は俺の手を引いて走り出すのだった――"

[[dialogue]]
speaker = "unk"
# それから俺たちは遊園地を楽しみ、気づけばあっという間に夕方になってしまっていた。
line = "それから俺たちは遊園地を楽しみ、気づけばあっという間に夕方になってしまっていた。"

[[dialogue]]
speaker = "クーシェン"
# 「はぁ～っ♪　金斗雲でスピードは慣れてるはずなのに、絶叫マシーン、どれもすごくウキウキして、楽しかった～！」
line = "「はぁ～っ♪　金斗雲でスピードは慣れてるはずなのに、絶叫マシーン、どれもすごくウキウキして、楽しかった～！」"

[[dialogue]]
speaker = "クーシェン"
# 「でも、残念……もっと遊びたかったけど、そろそろ帰らなくちゃいけない時間か～」
line = "「でも、残念……もっと遊びたかったけど、そろそろ帰らなくちゃいけない時間か～」"

[[dialogue]]
speaker = "クーシェン"
# 「――また一緒に遊びに来ようって？　へぇ～、にーにー、ボクとまたデートしたいんだ～？　えへへへぇ、仕方ないな～、もう♪」
line = "「――また一緒に遊びに来ようって？　へぇ～、にーにー、ボクとまたデートしたいんだ～？　えへへへぇ、仕方ないな～、もう♪」"

[[dialogue]]
speaker = "クーシェン"
# 「んっ……ふわぁ～……♪」
line = "「んっ……ふわぁ～……♪」"

[[dialogue]]
speaker = "unk"
# ふと、彼女が大きな欠伸をする。
line = "ふと、彼女が大きな欠伸をする。"

[[dialogue]]
speaker = "unk"
# クーシェン、もしかして眠い？
line = "クーシェン、もしかして眠い？"

[[dialogue]]
speaker = "クーシェン"
# 「うん……ちょっと、ウキウキしすぎちゃったかも……。でも、ボクそんなに子供じゃないから、全然平気だよっ」
line = "「うん……ちょっと、ウキウキしすぎちゃったかも……。でも、ボクそんなに子供じゃないから、全然平気だよっ」"

[[dialogue]]
speaker = "クーシェン"
# 「――へ？　眠たかったら、流星寮までおんぶするって？　そこまでしなくていいよ～！　なんか子供っぽいし！」
line = "「――へ？　眠たかったら、流星寮までおんぶするって？　そこまでしなくていいよ～！　なんか子供っぽいし！」"

[[dialogue]]
speaker = "unk"
# 大人っぽければいいんだ？
line = "大人っぽければいいんだ？"

[[dialogue]]
speaker = "クーシェン"
# 「――え……？　お姫様抱っこ！？」
line = "「――え……？　お姫様抱っこ！？」"

[[dialogue]]
speaker = "クーシェン"
# 「そ、それは確かに、大人ゲージ貯まりそうだけど、でも……」
line = "「そ、それは確かに、大人ゲージ貯まりそうだけど、でも……」"

[[dialogue]]
speaker = "クーシェン"
# 「べ、別に恥ずかしいとか思ってないよ！　エッチなことには慣れてるんだから……って、ひゃあぁっ！？」
line = "「べ、別に恥ずかしいとか思ってないよ！　エッチなことには慣れてるんだから……って、ひゃあぁっ！？」"

[[dialogue]]
speaker = "unk"
# 俺はクーシェンをお姫様抱っこする。
line = "俺はクーシェンをお姫様抱っこする。"

[[dialogue]]
speaker = "クーシェン"
# 「に、にーにー！　まだボク、していいんなんて言ってないよっ！？」
line = "「に、にーにー！　まだボク、していいんなんて言ってないよっ！？」"

[[dialogue]]
speaker = "クーシェン"
# 「――この前、子供って呼んでイジワルした仕返し？　う、うぅ……にーにーのばか……」
line = "「――この前、子供って呼んでイジワルした仕返し？　う、うぅ……にーにーのばか……」"

[[dialogue]]
speaker = "unk"
# 彼女の小さな体を抱えたまま、遊園地の出口へ向かって歩き始める。
line = "彼女の小さな体を抱えたまま、遊園地の出口へ向かって歩き始める。"

[[dialogue]]
speaker = "クーシェン"
# （こ、これがお姫様抱っこ……大人がするものなんだから、恥ずかしくないはずなのに、顔が熱くなって、胸がドキドキする……）
line = "（こ、これがお姫様抱っこ……大人がするものなんだから、恥ずかしくないはずなのに、顔が熱くなって、胸がドキドキする……）"

[[dialogue]]
speaker = "クーシェン"
# （い、いや、ボクはすぐ大人になるんだから、これくらい恥ずかしくない……恥ずかしくなんだから……！）
line = "（い、いや、ボクはすぐ大人になるんだから、これくらい恥ずかしくない……恥ずかしくなんだから……！）"

[[dialogue]]
speaker = "クーシェン"
# （で、でも……）
line = "（で、でも……）"

[[dialogue]]
speaker = "クーシェン"
# （今の胸のドキドキは……気持ちがウキウキしてる時と、なんか似てる気がして、嫌じゃない……）
line = "（今の胸のドキドキは……気持ちがウキウキしてる時と、なんか似てる気がして、嫌じゃない……）"

[[dialogue]]
speaker = "クーシェン"
# （このドキドキ、一体何なんだろう……？）
line = "（このドキドキ、一体何なんだろう……？）"

[[dialogue]]
speaker = "unk"
# もしかして照れてる？
line = "もしかして照れてる？"

[[dialogue]]
speaker = "クーシェン"
# 「ち、違うよ！？　照れてないもん！」
line = "「ち、違うよ！？　照れてないもん！」"

[[dialogue]]
speaker = "クーシェン"
# 「――も、もう、笑わないでよ！　今日のにーにー、なんかいつものにーにーと違うよ！？」
line = "「――も、もう、笑わないでよ！　今日のにーにー、なんかいつものにーにーと違うよ！？」"

[[dialogue]]
speaker = "クーシェン"
# （なんか、にーにーの顔が真っすぐに見れない！？　ボクは一体、何をそんなに恥ずかしがってるの……！？）
line = "（なんか、にーにーの顔が真っすぐに見れない！？　ボクは一体、何をそんなに恥ずかしがってるの……！？）"

[[dialogue]]
speaker = "unk"
# 今日のクーシェン、すごく可愛いな
line = "今日のクーシェン、すごく可愛いな"

[[dialogue]]
speaker = "クーシェン"
# 「えっ……えええぇっ！？　にーにー、いきなり何言い出すの！？」
line = "「えっ……えええぇっ！？　にーにー、いきなり何言い出すの！？」"

[[dialogue]]
speaker = "クーシェン"
# 「かかか、可愛いとか、帰る時になって急にそんな……！　というか、ボクはいつでもカッコ可愛い女の子なんだけど！？」
line = "「かかか、可愛いとか、帰る時になって急にそんな……！　というか、ボクはいつでもカッコ可愛い女の子なんだけど！？」"

[[dialogue]]
speaker = "クーシェン"
# （な、なんで当たり前のことをにーにーに言われてるだけなのに、ボク……こんなにドキドキしてるの～！？）
line = "（な、なんで当たり前のことをにーにーに言われてるだけなのに、ボク……こんなにドキドキしてるの～！？）"

[[dialogue]]
speaker = "クーシェン"
# 「うぅ～～！　と、とりあえず、今日はもうデート終わり！　だから、にーにーはそれ以上、変なこと言うの禁止～～～っ！」
line = "「うぅ～～！　と、とりあえず、今日はもうデート終わり！　だから、にーにーはそれ以上、変なこと言うの禁止～～～っ！」"

[[dialogue]]
speaker = "unk"
# そう言って、今までに見たことない程、顔を真っ赤にする彼女が可愛くて、俺はまた思わず笑ってしまう。
line = "そう言って、今までに見たことない程、顔を真っ赤にする彼女が可愛くて、俺はまた思わず笑ってしまう。"

[[dialogue]]
speaker = "unk"
# 俺はいつの間にか、クーシェンを１人の女の子として見るようになっていたことを、この時ようやく自覚するのだった――
line = "俺はいつの間にか、クーシェンを１人の女の子として見るようになっていたことを、この時ようやく自覚するのだった――"
