[[dialogue]]
speaker = "unk"
# 第４話,暗殺者の本心？,P
line = "第４話,暗殺者の本心？,P"

[[dialogue]]
speaker = "ナターシャ"
# 「じー」
line = "「じー」"

[[dialogue]]
speaker = "ナターシャ"
# 「じぃ～～」
line = "「じぃ～～」"

[[dialogue]]
speaker = "ナターシャ"
# 「じぃーーーーーっ」
line = "「じぃーーーーーっ」"

[[dialogue]]
speaker = "unk"
# （最近すごく視線を感じる……！）
line = "（最近すごく視線を感じる……！）"

[[dialogue]]
speaker = "unk"
# ナターシャの気配を感じる日がしばらく続き……
line = "ナターシャの気配を感じる日がしばらく続き……"

[[dialogue]]
speaker = "ナターシャ"
# 「あ、会長さん、おはよう。朝から会うなんて奇遇だね」
line = "「あ、会長さん、おはよう。朝から会うなんて奇遇だね」"

[[dialogue]]
speaker = "unk"
# ずっと俺を監視してたんだろ？
line = "ずっと俺を監視してたんだろ？"

[[dialogue]]
speaker = "ナターシャ"
# 「まぁそれが仕事だしね。むしろ監視してなかったら仕事してないことになるし」
line = "「まぁそれが仕事だしね。むしろ監視してなかったら仕事してないことになるし」"

[[dialogue]]
speaker = "ナターシャ"
# 「……最近特に視線を感じる？　ん～、どうしてかなぁ～？　気付かれないように監視してたはずなんだけどな～？」
line = "「……最近特に視線を感じる？　ん～、どうしてかなぁ～？　気付かれないように監視してたはずなんだけどな～？」"

[[dialogue]]
speaker = "ナターシャ"
# 「あ、でもさ。よく考えたら、私は選挙管理委員会なんだから、コソコソ監視する必要なんてないんだよね」
line = "「あ、でもさ。よく考えたら、私は選挙管理委員会なんだから、コソコソ監視する必要なんてないんだよね」"

[[dialogue]]
speaker = "ナターシャ"
# 「だからしばらくの間、密着取材──ならぬ密着監視させてもらうね？」
line = "「だからしばらくの間、密着取材──ならぬ密着監視させてもらうね？」"

[[dialogue]]
speaker = "unk"
# それから、ナターシャがいつも近くにいる生活が始まった。
line = "それから、ナターシャがいつも近くにいる生活が始まった。"

[[dialogue]]
speaker = "ナターシャ"
# 「会長さん、今日は教室でお昼？　ならご一緒させてもらうよ」
line = "「会長さん、今日は教室でお昼？　ならご一緒させてもらうよ」"

[[dialogue]]
speaker = "ナターシャ"
# 「ああ、今日はゼリーじゃないよ。梨緒からサンドイッチ強奪してきたから」
line = "「ああ、今日はゼリーじゃないよ。梨緒からサンドイッチ強奪してきたから」"

[[dialogue]]
speaker = "ナターシャ"
# 「会長さんは何食べてるの？　今日は購買のからあげ弁当？　ねぇ、お弁当、美味しい？」
line = "「会長さんは何食べてるの？　今日は購買のからあげ弁当？　ねぇ、お弁当、美味しい？」"

[[dialogue]]
speaker = "ナターシャ"
# 「私、自分が食べるものは関心ないけど、人が食べるところは興味あるんだ」
line = "「私、自分が食べるものは関心ないけど、人が食べるところは興味あるんだ」"

[[dialogue]]
speaker = "ナターシャ"
# 「ねぇ、美味しい？　美味しいなら美味しい顔してよ」
line = "「ねぇ、美味しい？　美味しいなら美味しい顔してよ」"

[[dialogue]]
speaker = "ナターシャ"
# 「……ふふ、そっか、美味しいんだ。会長さんも男の子だし、やっぱりこういうのが好きなんだね」
line = "「……ふふ、そっか、美味しいんだ。会長さんも男の子だし、やっぱりこういうのが好きなんだね」"

[[dialogue]]
speaker = "ナターシャ"
# 「こんな時間までお仕事お疲れ様。新星学園って生徒がたくさんいるから、星徒会も大変なんだね」
line = "「こんな時間までお仕事お疲れ様。新星学園って生徒がたくさんいるから、星徒会も大変なんだね」"

[[dialogue]]
speaker = "ナターシャ"
# 「お茶かコーヒーでも飲む？　温かい紅茶だったらほっとするかな。道具借りるね」
line = "「お茶かコーヒーでも飲む？　温かい紅茶だったらほっとするかな。道具借りるね」"

[[dialogue]]
speaker = "ナターシャ"
# 「はい、どうぞ。自分はいつも水飲んでるから、上手く淹れられてるかわからないけど」
line = "「はい、どうぞ。自分はいつも水飲んでるから、上手く淹れられてるかわからないけど」"

[[dialogue]]
speaker = "ナターシャ"
# 「……紅茶、美味しい？　ありがと、ならよかった」
line = "「……紅茶、美味しい？　ありがと、ならよかった」"

[[dialogue]]
speaker = "unk"
# 最近、距離が近くない？
line = "最近、距離が近くない？"

[[dialogue]]
speaker = "ナターシャ"
# 「そりゃそうでしょ。密着監視なんだから」
line = "「そりゃそうでしょ。密着監視なんだから」"

[[dialogue]]
speaker = "ナターシャ"
# 「……そうじゃなくて心理的に？　そうかな？　普通に監視してるつもりなんだけどなー」
line = "「……そうじゃなくて心理的に？　そうかな？　普通に監視してるつもりなんだけどなー」"

[[dialogue]]
speaker = "ナターシャ"
# 「ううん、ウソ。ホントはわかってるんだ、私の中で会長さんの存在が大きくなってるって」
line = "「ううん、ウソ。ホントはわかってるんだ、私の中で会長さんの存在が大きくなってるって」"

[[dialogue]]
speaker = "ナターシャ"
# 「私は魔王を監視する任務のために、新星学園にやってきた。その任務はいつまで続くか私にもわからない」
line = "「私は魔王を監視する任務のために、新星学園にやってきた。その任務はいつまで続くか私にもわからない」"

[[dialogue]]
speaker = "ナターシャ"
# 「魔王が危険な存在じゃないと聖庭園が判断すれば、その時点でお役御免でサヨナラ」
line = "「魔王が危険な存在じゃないと聖庭園が判断すれば、その時点でお役御免でサヨナラ」"

[[dialogue]]
speaker = "ナターシャ"
# 「でも……それは困るな。会長さんと一緒にいられなくなっちゃう」
line = "「でも……それは困るな。会長さんと一緒にいられなくなっちゃう」"

[[dialogue]]
speaker = "ナターシャ"
# 「そんなのイヤ……会長さんと離れたくないって、思っちゃってる……」
line = "「そんなのイヤ……会長さんと離れたくないって、思っちゃってる……」"

[[dialogue]]
speaker = "ナターシャ"
# 「任務なのに……私、会長さんのこと……」
line = "「任務なのに……私、会長さんのこと……」"

[[dialogue]]
speaker = "unk"
# ナターシャ……
line = "ナターシャ……"

[[dialogue]]
speaker = "ナターシャ"
# 「──ていう感じで、対象と距離を縮めておくと、いざという時さくっとやれるんだよ」
line = "「──ていう感じで、対象と距離を縮めておくと、いざという時さくっとやれるんだよ」"

[[dialogue]]
speaker = "unk"
# そんなことだろうと思った！
line = "そんなことだろうと思った！"

[[dialogue]]
speaker = "ナターシャ"
# 「ははは。私のことを理解してくれて何より」
line = "「ははは。私のことを理解してくれて何より」"

[[dialogue]]
speaker = "ナターシャ"
# 「どこまで本当かは会長さんの想像にお任せするよ。もしかしたら全部本当の気持ちかもね？」
line = "「どこまで本当かは会長さんの想像にお任せするよ。もしかしたら全部本当の気持ちかもね？」"

[[dialogue]]
speaker = "メルエル"
# 「会長くん、まだいる……？　ボランティア部のことで相談が──」
line = "「会長くん、まだいる……？　ボランティア部のことで相談が──」"

[[dialogue]]
speaker = "メルエル"
# 「ナターシャちゃん、どうして星徒会室に……！？　しかも２人きり！？」
line = "「ナターシャちゃん、どうして星徒会室に……！？　しかも２人きり！？」"

[[dialogue]]
speaker = "ナターシャ"
# 「そりゃ選挙管理委員会として監視してるところだったからね」
line = "「そりゃ選挙管理委員会として監視してるところだったからね」"

[[dialogue]]
speaker = "ナターシャ"
# 「大丈夫、何も起こらなかったよ。会長さんにはフラれちゃったから」
line = "「大丈夫、何も起こらなかったよ。会長さんにはフラれちゃったから」"

[[dialogue]]
speaker = "メルエル"
# 「フラれた！？」
line = "「フラれた！？」"

[[dialogue]]
speaker = "unk"
# フッてないよ！？
line = "フッてないよ！？"

[[dialogue]]
speaker = "メルエル"
# 「ナターシャちゃんの冗談か～……ビックリしちゃったよぉ」
line = "「ナターシャちゃんの冗談か～……ビックリしちゃったよぉ」"

[[dialogue]]
speaker = "ナターシャ"
# 「ははは。期待通りのリアクションありがと。メルエルはからかうと面白いね」
line = "「ははは。期待通りのリアクションありがと。メルエルはからかうと面白いね」"

[[dialogue]]
speaker = "ナターシャ"
# 「ふぅ、空気こもってきたかな。窓開けて空気入れ替えよっか」
line = "「ふぅ、空気こもってきたかな。窓開けて空気入れ替えよっか」"

[[dialogue]]
speaker = "ナターシャ"
# 「ひぁあああああっ！？」
line = "「ひぁあああああっ！？」"

[[dialogue]]
speaker = "メルエル"
# 「ナターシャちゃん！？　どうしたの！？」
line = "「ナターシャちゃん！？　どうしたの！？」"

[[dialogue]]
speaker = "ナターシャ"
# 「むむむ、虫っ！　虫～～っ！？」
line = "「むむむ、虫っ！　虫～～っ！？」"

[[dialogue]]
speaker = "メルエル"
# 「ああ、窓開けたから入ってきちゃったんだね。最近温かくなってきたから、元気になったのかも」
line = "「ああ、窓開けたから入ってきちゃったんだね。最近温かくなってきたから、元気になったのかも」"

[[dialogue]]
speaker = "メルエル"
# 「大丈夫、ナターシャちゃん。もう出ていったよ」
line = "「大丈夫、ナターシャちゃん。もう出ていったよ」"

[[dialogue]]
speaker = "ナターシャ"
# 「あ、ありがと……」
line = "「あ、ありがと……」"

[[dialogue]]
speaker = "unk"
# 隙を見せるのも監視対象を油断させる演技……？
line = "隙を見せるのも監視対象を油断させる演技……？"

[[dialogue]]
speaker = "ナターシャ"
# 「違う違う！　ホントにダメ！」
line = "「違う違う！　ホントにダメ！」"

[[dialogue]]
speaker = "メルエル"
# 「人間界には、天界にいない虫も多いんだよ。天界の虫もチョウチョとか綺麗な虫ばっかりだから、最初は驚いちゃうよね」
line = "「人間界には、天界にいない虫も多いんだよ。天界の虫もチョウチョとか綺麗な虫ばっかりだから、最初は驚いちゃうよね」"

[[dialogue]]
speaker = "ナターシャ"
# 「ダメダメダメっ！　人間界の虫はダメなの～～～～っ！！」
line = "「ダメダメダメっ！　人間界の虫はダメなの～～～～っ！！」"

[[dialogue]]
speaker = "unk"
# 語る言葉には本当か嘘かわからないことが多く、ミステリアスなナターシャ。
line = "語る言葉には本当か嘘かわからないことが多く、ミステリアスなナターシャ。"

[[dialogue]]
speaker = "unk"
# 彼女のことは掴みどころがないと思っていたけど、意外な弱点が判明したのだった。
line = "彼女のことは掴みどころがないと思っていたけど、意外な弱点が判明したのだった。"
