[[dialogue]]
speaker = "unk"
# 和気あいあいと話しながら、お寺の本堂前にやってきた晴れ着の４人。
line = "和気あいあいと話しながら、お寺の本堂前にやってきた晴れ着の４人。"

[[dialogue]]
speaker = "リーリア"
# 「そういえば、アナちゃんやサーシャさんは、後日改めて新星星徒会で初詣に来る予定なんですよね？」
line = "「そういえば、アナちゃんやサーシャさんは、後日改めて新星星徒会で初詣に来る予定なんですよね？」"

[[dialogue]]
speaker = "サーシャ"
# 「実は会長くんとヴィーナスちゃんが、星見家と五名門の人たちが集まるお正月の会合にお呼ばれしているの～」
line = "「実は会長くんとヴィーナスちゃんが、星見家と五名門の人たちが集まるお正月の会合にお呼ばれしているの～」"

[[dialogue]]
speaker = "アナ"
# 「それで、マトイ先輩も両親の実家へ帰省するタイミングを合わせることになり、星徒会メンバーでの初詣は後日改めてという話になっています」
line = "「それで、マトイ先輩も両親の実家へ帰省するタイミングを合わせることになり、星徒会メンバーでの初詣は後日改めてという話になっています」"

[[dialogue]]
speaker = "リーリア"
# 「なるほど～。本当は新年初日から、センパイに可愛い後輩の晴れ着姿を披露してあげたかったんですけど、残念ですね～」
line = "「なるほど～。本当は新年初日から、センパイに可愛い後輩の晴れ着姿を披露してあげたかったんですけど、残念ですね～」"

[[dialogue]]
speaker = "シズハ"
# 「あっ……！」
line = "「あっ……！」"

[[dialogue]]
speaker = "unk"
# そこでシズハが気づいて足を止める。４人のところへやってきたのは――
line = "そこでシズハが気づいて足を止める。４人のところへやってきたのは――"

[[dialogue]]
speaker = "ソフィア"
# 「姉さん、お待たせしました」
line = "「姉さん、お待たせしました」"

[[dialogue]]
speaker = "unk"
# ソフィアたち流星学園１年生の３人組だった。
line = "ソフィアたち流星学園１年生の３人組だった。"

[[dialogue]]
speaker = "サーシャ"
# 「ソフィ～♪　待っていたわ～。ウズメちゃん、舞亜ちゃん、あけましておめでと～♪」
line = "「ソフィ～♪　待っていたわ～。ウズメちゃん、舞亜ちゃん、あけましておめでと～♪」"

[[dialogue]]
speaker = "ウズメイア"
# 「みなさん、晴れ晴れしく、新年あけましておめでとうございま～す♪」
line = "「みなさん、晴れ晴れしく、新年あけましておめでとうございま～す♪」"

[[dialogue]]
speaker = "舞亜"
# 「あけおめです、サーシャさん。３人で一緒に参加しにきました」
line = "「あけおめです、サーシャさん。３人で一緒に参加しにきました」"

[[dialogue]]
speaker = "シズハ"
# 「あ、あのっ……ソフィア先輩……！」
line = "「あ、あのっ……ソフィア先輩……！」"

[[dialogue]]
speaker = "unk"
# そんな中、シズハは緊張した面持ちで、ソフィアと向かい合う。
line = "そんな中、シズハは緊張した面持ちで、ソフィアと向かい合う。"

[[dialogue]]
speaker = "シズハ"
# 「初めまして、染井シズハです……！　あ、あけましておめでとうございます……！」
line = "「初めまして、染井シズハです……！　あ、あけましておめでとうございます……！」"

[[dialogue]]
speaker = "ソフィア"
# 「こちらこそ、初めまして。あけましておめでとうございます、シズハさん」
line = "「こちらこそ、初めまして。あけましておめでとうございます、シズハさん」"

[[dialogue]]
speaker = "シズハ"
# 「はい！　えっと……その……」
line = "「はい！　えっと……その……」"

[[dialogue]]
speaker = "シズハ"
# （頭の中でどういうことを話そうか、昨日から色々考えていたはずなのに、いざとなると言葉がなかなか出てこない……！）
line = "（頭の中でどういうことを話そうか、昨日から色々考えていたはずなのに、いざとなると言葉がなかなか出てこない……！）"

[[dialogue]]
speaker = "unk"
# シズハが何から話すべきか、目を白黒させていると──
line = "シズハが何から話すべきか、目を白黒させていると──"

[[dialogue]]
speaker = "男の子"
# 「あっ、獅子舞だ～！」
line = "「あっ、獅子舞だ～！」"

[[dialogue]]
speaker = "老人"
# 「おお、獅子舞様じゃ……ありがたやありがたや」
line = "「おお、獅子舞様じゃ……ありがたやありがたや」"

[[dialogue]]
speaker = "unk"
# 周りの参拝客の声が聞こえてきて、シズハたちは振り返る。
line = "周りの参拝客の声が聞こえてきて、シズハたちは振り返る。"

[[dialogue]]
speaker = "獅子舞"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "サーシャ"
# 「あら～、あれはこのお寺で有名な、縁起物の『獅子舞』ね」
line = "「あら～、あれはこのお寺で有名な、縁起物の『獅子舞』ね」"

[[dialogue]]
speaker = "ウズメイア"
# 「わ～、めっちゃ可愛いし♪　写真撮っとかないと！」
line = "「わ～、めっちゃ可愛いし♪　写真撮っとかないと！」"

[[dialogue]]
speaker = "舞亜"
# 「なんか……こっちに近づいてきてる？」
line = "「なんか……こっちに近づいてきてる？」"

[[dialogue]]
speaker = "リーリア"
# 「確かに、なんかこっちに強い視線を感じますね～……って」
line = "「確かに、なんかこっちに強い視線を感じますね～……って」"

[[dialogue]]
speaker = "獅子舞"
# 「……ふん」
line = "「……ふん」"

[[dialogue]]
speaker = "リーリア"
# （な、なんか私の顔見て、鼻を鳴らされたんですけど！？）
line = "（な、なんか私の顔見て、鼻を鳴らされたんですけど！？）"

[[dialogue]]
speaker = "unk"
# 獅子舞はリーリアから視線を外すと、シズハの前へと移動し、立ち止まる。
line = "獅子舞はリーリアから視線を外すと、シズハの前へと移動し、立ち止まる。"

[[dialogue]]
speaker = "獅子舞"
# 「お前が……トレジアンナの言っていた、星騎士の染井シズハか？」
line = "「お前が……トレジアンナの言っていた、星騎士の染井シズハか？」"

[[dialogue]]
speaker = "シズハ"
# 「えっ！？　どうしてトレジアンナさんの名前を……？」
line = "「えっ！？　どうしてトレジアンナさんの名前を……？」"

[[dialogue]]
speaker = "獅子舞"
# 「ふん……いい機会だ。挨拶してやるとしよう――」
line = "「ふん……いい機会だ。挨拶してやるとしよう――」"

[[dialogue]]
speaker = "ウズメイア"
# 「えっ！？　周囲の参拝客の人たちが消えちゃったし！？」
line = "「えっ！？　周囲の参拝客の人たちが消えちゃったし！？」"

[[dialogue]]
speaker = "アナ"
# 「これは、何かの力による結界……！？」
line = "「これは、何かの力による結界……！？」"

[[dialogue]]
speaker = "獅子舞"
# 「そう。吾輩の力でお前たちを招き入れたのだ。吾輩の住む、この寺の結界内にな」
line = "「そう。吾輩の力でお前たちを招き入れたのだ。吾輩の住む、この寺の結界内にな」"

[[dialogue]]
speaker = "獅子舞"
# 「吾輩の名は、日本一帯で広く知られし『獅子舞』。その正体は――」
line = "「吾輩の名は、日本一帯で広く知られし『獅子舞』。その正体は――」"

[[dialogue]]
speaker = "獅子舞"
# 「『正月のロストアイテム』である！」
line = "「『正月のロストアイテム』である！」"

[[dialogue]]
speaker = "シズハ"
# 「ロストアイテム！？　あなたが……！？」
line = "「ロストアイテム！？　あなたが……！？」"

[[dialogue]]
speaker = "unk"
# 『ロストアイテム』――それは、リクリエを経ても消えずに存在し続け、常識では測れない不思議な力を宿すオーパーツのことである。
line = "『ロストアイテム』――それは、リクリエを経ても消えずに存在し続け、常識では測れない不思議な力を宿すオーパーツのことである。"

[[dialogue]]
speaker = "unk"
# 遥か昔の消えた歴史の中で作り出されたそれらは、世界がリクリエで再構築される際も影響を受け付けず、残り続けるほどの存在強度を誇っていた。
line = "遥か昔の消えた歴史の中で作り出されたそれらは、世界がリクリエで再構築される際も影響を受け付けず、残り続けるほどの存在強度を誇っていた。"

[[dialogue]]
speaker = "unk"
# 現在、そのロストアイテムは『魔法少女』たちによって秘密裏に回収されている。もし世間に存在が知れ渡れば、その力が悪用される危険性があるからだ。
line = "現在、そのロストアイテムは『魔法少女』たちによって秘密裏に回収されている。もし世間に存在が知れ渡れば、その力が悪用される危険性があるからだ。"

[[dialogue]]
speaker = "unk"
# ――そして、その魔法少女の１人こそが、シズハであった。
line = "――そして、その魔法少女の１人こそが、シズハであった。"

[[dialogue]]
speaker = "獅子舞"
# 「……吾輩は、九浄家の現当主・九浄ヘレナからも公認を得ているロストアイテム。この寺を古くより守護し続けている」
line = "「……吾輩は、九浄家の現当主・九浄ヘレナからも公認を得ているロストアイテム。この寺を古くより守護し続けている」"

[[dialogue]]
speaker = "シズハ"
# （あ……そういえば、トレジアンナさんが前に、公認されてるロストアイテムだと自ら名乗ってきたら、それは回収しなくてもいいって……）
line = "（あ……そういえば、トレジアンナさんが前に、公認されてるロストアイテムだと自ら名乗ってきたら、それは回収しなくてもいいって……）"

[[dialogue]]
speaker = "獅子舞"
# 「吾輩は、ここに祀られ続けてきた最も崇高なる聖遺物。故に、ロストアイテムだからと迂闊に手を出そうとすれば、神罰が当たると心しておけ」
line = "「吾輩は、ここに祀られ続けてきた最も崇高なる聖遺物。故に、ロストアイテムだからと迂闊に手を出そうとすれば、神罰が当たると心しておけ」"

[[dialogue]]
speaker = "ディーラック"
# 「うわぁ、自分で崇高とか言っちゃうなんて、作られた存在の癖に傲慢なのサ」
line = "「うわぁ、自分で崇高とか言っちゃうなんて、作られた存在の癖に傲慢なのサ」"

[[dialogue]]
speaker = "シズハ"
# 「って、ディーちゃん！？　みんなの前に姿を現すのは、マズいんじゃ……」
line = "「って、ディーちゃん！？　みんなの前に姿を現すのは、マズいんじゃ……」"

[[dialogue]]
speaker = "unk"
# それまでシズハの横で透明になっていた『ディーラック』が姿を現す。
line = "それまでシズハの横で透明になっていた『ディーラック』が姿を現す。"

[[dialogue]]
speaker = "ディーラック"
# 「はっ、この獅子舞がロストアイテムとかぶっちゃけてる時点で、ボクがこそこそ隠れていても仕方ないだろう？」
line = "「はっ、この獅子舞がロストアイテムとかぶっちゃけてる時点で、ボクがこそこそ隠れていても仕方ないだろう？」"

[[dialogue]]
speaker = "リーリア"
# 「えっと、シズハちゃん。その檻に入っている子は一体……？　なんか、ニャリオンちゃんみたいに喋っているけど……」
line = "「えっと、シズハちゃん。その檻に入っている子は一体……？　なんか、ニャリオンちゃんみたいに喋っているけど……」"

[[dialogue]]
speaker = "ディーラック"
# 「あぁん？　あんなヒトカスに飼われてる猫畜生と、一緒にしないで欲しいのサ！」
line = "「あぁん？　あんなヒトカスに飼われてる猫畜生と、一緒にしないで欲しいのサ！」"

[[dialogue]]
speaker = "リーリア"
# 「口悪ぅ！？」
line = "「口悪ぅ！？」"

[[dialogue]]
speaker = "シズハ"
# 「え、えっとぉ、どう説明したらいいか～……」
line = "「え、えっとぉ、どう説明したらいいか～……」"

[[dialogue]]
speaker = "ディーラック"
# 「檻に入れられてるボクのことはどうでもいいからサ、今は目の前で自由にしているロストアイテムのことを気にしなよ」
line = "「檻に入れられてるボクのことはどうでもいいからサ、今は目の前で自由にしているロストアイテムのことを気にしなよ」"

[[dialogue]]
speaker = "ディーラック"
# 「それで？　正月のロストアイテムとやらが一体何の用なのサ。ボクは下らないことに巻き込まれたくないし、この結界からさっさと解放して欲しいんだけど？」
line = "「それで？　正月のロストアイテムとやらが一体何の用なのサ。ボクは下らないことに巻き込まれたくないし、この結界からさっさと解放して欲しいんだけど？」"

[[dialogue]]
speaker = "獅子舞"
# 「お前がトレジアンナの言っていた『ディーラック』とやらか。吾輩は別に、お前たちを結界に閉じ込めたつもりはない」
line = "「お前がトレジアンナの言っていた『ディーラック』とやらか。吾輩は別に、お前たちを結界に閉じ込めたつもりはない」"

[[dialogue]]
speaker = "獅子舞"
# 「ここにはありがたく招き入れてやっただけだ。出たいというならいつでも外に放り出してやろう。ただしその場合、晴れ着の力はくれてやらんがな」
line = "「ここにはありがたく招き入れてやっただけだ。出たいというならいつでも外に放り出してやろう。ただしその場合、晴れ着の力はくれてやらんがな」"

[[dialogue]]
speaker = "シズハ"
# 「えっ、晴れ着の力って……どういうこと？」
line = "「えっ、晴れ着の力って……どういうこと？」"

[[dialogue]]
speaker = "獅子舞"
# 「ふん……おい、そこの魔族の姉妹。名前はそう、ソフィアとサーシャだったか」
line = "「ふん……おい、そこの魔族の姉妹。名前はそう、ソフィアとサーシャだったか」"

[[dialogue]]
speaker = "ソフィア"
# 「……！　どうして私と姉さんの名前を？」
line = "「……！　どうして私と姉さんの名前を？」"

[[dialogue]]
speaker = "獅子舞"
# 「以前の正月にも、ここへ来たことがあったな？　そして、お前たちは姉妹の縁を結び直すことに成功した」
line = "「以前の正月にも、ここへ来たことがあったな？　そして、お前たちは姉妹の縁を結び直すことに成功した」"

[[dialogue]]
speaker = "獅子舞"
# 「その縁起の良さに免じて、吾輩はお前たちと、縁結びを手伝ったウズメイアという娘にも力をくれてやったのだ」
line = "「その縁起の良さに免じて、吾輩はお前たちと、縁結びを手伝ったウズメイアという娘にも力をくれてやったのだ」"

[[dialogue]]
speaker = "ウズメイア"
# 「えっ、もしかしてあの時、あたしたちの晴れ着フォームが起動したのって……！？」
line = "「えっ、もしかしてあの時、あたしたちの晴れ着フォームが起動したのって……！？」"

[[dialogue]]
speaker = "獅子舞"
# 「実際にありがたく見せてやろう。これが吾輩の持つ崇高なる正月の力――」
line = "「実際にありがたく見せてやろう。これが吾輩の持つ崇高なる正月の力――」"

[[dialogue]]
speaker = "unk"
# 再び視界が眩い光に包まれる――そして。
line = "再び視界が眩い光に包まれる――そして。"

[[dialogue]]
speaker = "シズハ"
# 「これは……！　ロストアイテムである獅子舞さんの力！？」
line = "「これは……！　ロストアイテムである獅子舞さんの力！？」"

[[dialogue]]
speaker = "サーシャ"
# 「あら～♪　すごいわ～」
line = "「あら～♪　すごいわ～」"

[[dialogue]]
speaker = "リーリア"
# 「今までとは違うマジカルな力を感じます！」
line = "「今までとは違うマジカルな力を感じます！」"

[[dialogue]]
speaker = "アナ"
# 「晴れ着フォームの起動を確認。どうやら……獅子舞さんが正月にまつわる特別な力を持っていることは、事実のようです」
line = "「晴れ着フォームの起動を確認。どうやら……獅子舞さんが正月にまつわる特別な力を持っていることは、事実のようです」"

[[dialogue]]
speaker = "獅子舞"
# 「ふん、わかったか？　お前たち星騎士の晴れ着フォームに、これまで戦う力を与えてやっていたのは、吾輩というわけだ」
line = "「ふん、わかったか？　お前たち星騎士の晴れ着フォームに、これまで戦う力を与えてやっていたのは、吾輩というわけだ」"

[[dialogue]]
speaker = "サーシャ"
# 「そうだったのね～♪　獅子舞さん、ありがと～♪」
line = "「そうだったのね～♪　獅子舞さん、ありがと～♪」"

[[dialogue]]
speaker = "獅子舞"
# 「ふふんっ！　そうだ、感謝し崇め奉るがいい。九浄ヘレナにも隠してきた事実を、今回特別に明かしてやったのだからな」
line = "「ふふんっ！　そうだ、感謝し崇め奉るがいい。九浄ヘレナにも隠してきた事実を、今回特別に明かしてやったのだからな」"

[[dialogue]]
speaker = "アナ"
# 「ですが……どうして？」
line = "「ですが……どうして？」"

[[dialogue]]
speaker = "獅子舞"
# 「気まぐれだ。あと、縁起の悪い噂も色々聞こえてくるものでな……なんでも――」
line = "「気まぐれだ。あと、縁起の悪い噂も色々聞こえてくるものでな……なんでも――」"

[[dialogue]]
speaker = "獅子舞"
# 「星騎士にバニー衣装を着せようと企む、けしからんロストアイテムが出没したとか」
line = "「星騎士にバニー衣装を着せようと企む、けしからんロストアイテムが出没したとか」"

[[dialogue]]
speaker = "アナ"
# 「……！　会長が報告書に上げていた、アステラカジノ事件の『ダッチ』！」
line = "「……！　会長が報告書に上げていた、アステラカジノ事件の『ダッチ』！」"

[[dialogue]]
speaker = "unk"
# 以前、クロトたちは『アステラカジノ』の異空間に巻き込まれ、そこで『欲望のロストアイテム』であるダッチと対決した。
line = "以前、クロトたちは『アステラカジノ』の異空間に巻き込まれ、そこで『欲望のロストアイテム』であるダッチと対決した。"

[[dialogue]]
speaker = "unk"
# その事件には<ruby=かんこうれい>緘口令</ruby>が敷かれており、学園上層部や両星徒会、そして当事者のみが知る限られた情報となっている。
line = "その事件には<ruby>緘口令<rt>かんこうれい</rt></ruby>が敷かれており、学園上層部や両星徒会、そして当事者のみが知る限られた情報となっている。"

[[dialogue]]
speaker = "獅子舞"
# 「そう……あの俗物だ！　バニーなどという低俗な衣装を、吾輩は断じて認めん！」
line = "「そう……あの俗物だ！　バニーなどという低俗な衣装を、吾輩は断じて認めん！」"

[[dialogue]]
speaker = "獅子舞"
# 「人間界の衣装ならば、晴れ着こそが崇高にして至高……！　星騎士が纏う戦闘服としてこれ以上なく美しい、完璧なフォームなのだ！」
line = "「人間界の衣装ならば、晴れ着こそが崇高にして至高……！　星騎士が纏う戦闘服としてこれ以上なく美しい、完璧なフォームなのだ！」"

[[dialogue]]
speaker = "シズハ"
# 「えっ？」
line = "「えっ？」"

[[dialogue]]
speaker = "サーシャ"
# 「あら～♪　うふふっ、獅子舞さんは晴れ着が好きなのね～♪」
line = "「あら～♪　うふふっ、獅子舞さんは晴れ着が好きなのね～♪」"

[[dialogue]]
speaker = "獅子舞"
# 「否！　好きとかそういう低俗なのでは断じてない！　吾輩が数多のリクリエを乗り越えながら辿り着いた、崇高な結論である！」
line = "「否！　好きとかそういう低俗なのでは断じてない！　吾輩が数多のリクリエを乗り越えながら辿り着いた、崇高な結論である！」"

[[dialogue]]
speaker = "獅子舞"
# 「吾輩は、お前たち星騎士の小娘共が晴れ着で戦場を美しく舞えるように、力を与えてやっているのだ……！」
line = "「吾輩は、お前たち星騎士の小娘共が晴れ着で戦場を美しく舞えるように、力を与えてやっているのだ……！」"

[[dialogue]]
speaker = "ディーラック"
# 「いや、お前の趣味じゃん……」
line = "「いや、お前の趣味じゃん……」"

[[dialogue]]
speaker = "獅子舞"
# 「趣味ではない！　故に、今回新たな晴れ着を纏ってきたそこの４人！　お前たちにただで力をくれてやると思ったら、大間違いである！」
line = "「趣味ではない！　故に、今回新たな晴れ着を纏ってきたそこの４人！　お前たちにただで力をくれてやると思ったら、大間違いである！」"

[[dialogue]]
speaker = "アナ"
# 「ということは、何か条件があるのでしょうか……？」
line = "「ということは、何か条件があるのでしょうか……？」"

[[dialogue]]
speaker = "ディーラック"
# 「なんか、すごい面倒臭そうな予感がするんだけど……」
line = "「なんか、すごい面倒臭そうな予感がするんだけど……」"

[[dialogue]]
speaker = "獅子舞"
# 「晴れ着の力とはすなわち、正月の力。故に――」
line = "「晴れ着の力とはすなわち、正月の力。故に――」"

[[dialogue]]
speaker = "獅子舞"
# 「正式に晴れ着フォームの力を手に入れたくば、試練として吾輩との『羽根突き』に勝ち、認めさせてみせるがいい！」
line = "「正式に晴れ着フォームの力を手に入れたくば、試練として吾輩との『羽根突き』に勝ち、認めさせてみせるがいい！」"

[[dialogue]]
speaker = "シズハ"
# 「羽根突き勝負！？」
line = "「羽根突き勝負！？」"

[[dialogue]]
speaker = "unk"
# 呆気に取られるシズハたちに、獅子舞はふんと鼻を鳴らしてみせるのだった。
line = "呆気に取られるシズハたちに、獅子舞はふんと鼻を鳴らしてみせるのだった。"
