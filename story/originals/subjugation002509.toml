[[dialogue]]
speaker = "unk"
# シャドウリーリアとの戦場に選ばれたのは、学園生には既に見慣れた常夏の海――リゾート結界であった。
line = "シャドウリーリアとの戦場に選ばれたのは、学園生には既に見慣れた常夏の海――リゾート結界であった。"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「これが仮想結界システム……ふふふ」
line = "「これが仮想結界システム……ふふふ」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「まさに人類が夢にまで見た、フルダイブ型ＶＲですわね♪　お金の匂いがして参りましてよ！」
line = "「まさに人類が夢にまで見た、フルダイブ型ＶＲですわね♪　お金の匂いがして参りましてよ！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひ♪　セナリィのことだから、戦いよりもそんなことだろうと思ったよ～」
line = "「にひひ♪　セナリィのことだから、戦いよりもそんなことだろうと思ったよ～」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「でも、戦う相手をリーリアちゃんのシャドウにしたのは、何か理由があるんでしょ？」
line = "「でも、戦う相手をリーリアちゃんのシャドウにしたのは、何か理由があるんでしょ？」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「ええ、マイン。挑戦するなら、せっかくですから同じ<b>銃使い</b>と１度戦ってみたいと思いましたの」
line = "「ええ、マイン。挑戦するなら、せっかくですから同じ<b>銃使い</b>と１度戦ってみたいと思いましたの」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「――ふむ、なるほど。ここでの戦いはアリーナでも中継されるし、戦闘記録として映像に残るということだね」
line = "「――ふむ、なるほど。ここでの戦いはアリーナでも中継されるし、戦闘記録として映像に残るということだね」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「そう！　私が華麗な銃撃戦を見せれば、秘密結社ゴールデングースのいい宣伝にもなりますでしょう？」
line = "「そう！　私が華麗な銃撃戦を見せれば、秘密結社ゴールデングースのいい宣伝にもなりますでしょう？」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「そうすれば、仮想結界システムの視察も兼ねて、一石二鳥ですわ♪　おほほほほほ！」
line = "「そうすれば、仮想結界システムの視察も兼ねて、一石二鳥ですわ♪　おほほほほほ！」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「――って、あなたは日傘探偵のジュエリー・ブラウン様！？」
line = "「――って、あなたは日傘探偵のジュエリー・ブラウン様！？」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「やあ、こんにちは。ゴシック傭兵、バンデット・セナリィさん」
line = "「やあ、こんにちは。ゴシック傭兵、バンデット・セナリィさん」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「キミのことは我が助手――新星学園の会長からよく聞いているよ」
line = "「キミのことは我が助手――新星学園の会長からよく聞いているよ」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「よっ、セナっち、マイン！　紅明ちゃんが元気な仲間たちを連れて、助太刀に来たぜ～☆」
line = "「よっ、セナっち、マイン！　紅明ちゃんが元気な仲間たちを連れて、助太刀に来たぜ～☆」"

[[dialogue]]
speaker = "クーシェン"
# 「やあやあ我こそは、現代の斉天大聖、クーシェン！　人間界で有名な強い傭兵に出会えると聞いて、紅明ねーねーと一緒にボク参上～♪」
line = "「やあやあ我こそは、現代の斉天大聖、クーシェン！　人間界で有名な強い傭兵に出会えると聞いて、紅明ねーねーと一緒にボク参上～♪」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「紅明様！？　それに、最近魔界からスカウトされてきた、強いことで有名な附属生のクーシェン様！？」
line = "「紅明様！？　それに、最近魔界からスカウトされてきた、強いことで有名な附属生のクーシェン様！？」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「あと、実はもう１人いてね」
line = "「あと、実はもう１人いてね」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「もう１人……？　――はっ！？　背後に誰か……！？」
line = "「もう１人……？　――はっ！？　背後に誰か……！？」"

[[dialogue]]
speaker = "unk"
# ばっと振り向くセナリィ。そこにいたのは――
line = "ばっと振り向くセナリィ。そこにいたのは――"

[[dialogue]]
speaker = "ミネコ"
# 「おっと、これは驚いた。まさか、気配を隠していたのに気づくなんてね」
line = "「おっと、これは驚いた。まさか、気配を隠していたのに気づくなんてね」"

[[dialogue]]
speaker = "ミネコ"
# 「スナイパーライフルの狙撃を見ずに避ける天才傭兵って噂は、どうやら眉唾でもなさそうだね」
line = "「スナイパーライフルの狙撃を見ずに避ける天才傭兵って噂は、どうやら眉唾でもなさそうだね」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「あなたは……確か、流星学園１年生のミネコ・フランボワーズ様……でしたかしら？」
line = "「あなたは……確か、流星学園１年生のミネコ・フランボワーズ様……でしたかしら？」"

[[dialogue]]
speaker = "ミネコ"
# 「ご名答♪　そしてまたの名を『大怪盗フランボウ』――知っているかな？」
line = "「ご名答♪　そしてまたの名を『大怪盗フランボウ』――知っているかな？」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「え？　フランボウって、数年前から世界中で有名になった、ルパンに続くもう１人の大怪盗の……！？」
line = "「え？　フランボウって、数年前から世界中で有名になった、ルパンに続くもう１人の大怪盗の……！？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にわかには信じ難いけど……でも、確かに言動に違和感を感じない。嘘を言っている人間の声色じゃないね」
line = "「にわかには信じ難いけど……でも、確かに言動に違和感を感じない。嘘を言っている人間の声色じゃないね」"

[[dialogue]]
speaker = "ミネコ"
# 「ありがとう、<b>公安委員会</b>所属のネゴシエイターさん♪　キミならそう言ってくれると思っていたよ」
line = "「ありがとう、<b>公安委員会</b>所属のネゴシエイターさん♪　キミならそう言ってくれると思っていたよ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「……！　そんな委員会、学園では聞いたことないけど……それ、どこ情報なのかな？」
line = "「……！　そんな委員会、学園では聞いたことないけど……それ、どこ情報なのかな？」"

[[dialogue]]
speaker = "ミネコ"
# 「私は怪盗だからね。情報であろうとも、盗むのはお手のものだよ」
line = "「私は怪盗だからね。情報であろうとも、盗むのはお手のものだよ」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「マジか！？　ミネコちん、あの大怪盗だったん！？」
line = "「マジか！？　ミネコちん、あの大怪盗だったん！？」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「知らなかったんですの！？」
line = "「知らなかったんですの！？」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「というか、大怪盗なのが本当なら、バラすのマズくね？　大丈夫なん？」
line = "「というか、大怪盗なのが本当なら、バラすのマズくね？　大丈夫なん？」"

[[dialogue]]
speaker = "ミネコ"
# 「あはは、紅明、黙っててごめんね～♪　でも、大丈夫大丈夫～♪」
line = "「あはは、紅明、黙っててごめんね～♪　でも、大丈夫大丈夫～♪」"

[[dialogue]]
speaker = "ミネコ"
# 「この面子には名乗っておいた方が面白そうかなって思ったんだよね。それに万が一の時は、なんとでもしちゃうし♪」
line = "「この面子には名乗っておいた方が面白そうかなって思ったんだよね。それに万が一の時は、なんとでもしちゃうし♪」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「全く……ミネコ、キミという奴は……」
line = "「全く……ミネコ、キミという奴は……」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「しかし、公安委員会か。私も助けて貰っているよ。<b>リコリンフィア</b>にもよく伝えておいてもらえるかな？　ネーゼマインさん」
line = "「しかし、公安委員会か。私も助けて貰っているよ。<b>リコリンフィア</b>にもよく伝えておいてもらえるかな？　ネーゼマインさん」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「えっ、ちょい待って、ジュエリーちゃん。それ……まさか推理したの？」
line = "「えっ、ちょい待って、ジュエリーちゃん。それ……まさか推理したの？」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「それが趣味なのでね。そして今、線が繋がった。謎がまた１つ解けて嬉しいよ」
line = "「それが趣味なのでね。そして今、線が繋がった。謎がまた１つ解けて嬉しいよ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「あ～、ヤバ……探偵と怪盗、マジもんじゃん……」
line = "「あ～、ヤバ……探偵と怪盗、マジもんじゃん……」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「でも、その２人が実は知り合い同士とか、面白過ぎるんだけど！　にひひひっ♪」
line = "「でも、その２人が実は知り合い同士とか、面白過ぎるんだけど！　にひひひっ♪」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「望んだわけじゃないのに、クラスメイトにまでなられてしまって、私も困っている……」
line = "「望んだわけじゃないのに、クラスメイトにまでなられてしまって、私も困っている……」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「キャハハハハハ！　なにそれ♪」
line = "「キャハハハハハ！　なにそれ♪」"

[[dialogue]]
speaker = "unk"
# 思わず、大きく笑ってしまうネーゼマイン。
line = "思わず、大きく笑ってしまうネーゼマイン。"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「というか紅明様、あなた、ミネコ様の正体を知らないのに、一体どこで知り合ったんですの？」
line = "「というか紅明様、あなた、ミネコ様の正体を知らないのに、一体どこで知り合ったんですの？」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「え？　どこでっていうか、いつものノリで新顔の子を見かけたから、とりあえず挨拶して友達になった感じ？」
line = "「え？　どこでっていうか、いつものノリで新顔の子を見かけたから、とりあえず挨拶して友達になった感じ？」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「コミュ強ですわーー！？」
line = "「コミュ強ですわーー！？」"

[[dialogue]]
speaker = "クーシェン"
# 「ねぇねぇ、セナリィ！　それよりも早く、ボクとバトルしようよ～！」
line = "「ねぇねぇ、セナリィ！　それよりも早く、ボクとバトルしようよ～！」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「ホワイ！？　なぜ私がクーシェン様とバトルを！？」
line = "「ホワイ！？　なぜ私がクーシェン様とバトルを！？」"

[[dialogue]]
speaker = "クーシェン"
# 「だってほら、この後シャドウとバトルするじゃない？　その前に準備運動みたいな感じでさ♪」
line = "「だってほら、この後シャドウとバトルするじゃない？　その前に準備運動みたいな感じでさ♪」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「こっちはこっちでとんでもねぇ戦闘狂ですわ！？」
line = "「こっちはこっちでとんでもねぇ戦闘狂ですわ！？」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「絶対やりませんわよ！？　私のエンプレスフォームは燃費がクッソ悪いんですの！」
line = "「絶対やりませんわよ！？　私のエンプレスフォームは燃費がクッソ悪いんですの！」"

[[dialogue]]
speaker = "クーシェン"
# 「え～！　本物の傭兵だっていうから、ウキウキして来たのに～！」
line = "「え～！　本物の傭兵だっていうから、ウキウキして来たのに～！」"

[[dialogue]]
speaker = "unk"
# と、そこへ――
line = "と、そこへ――"

[[dialogue]]
speaker = "シャドウリーリア"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「ほら！　クーシェン様、ちょうど相手が現れましてよ！　バトルしたいなら、あちらにして下さいませ！」
line = "「ほら！　クーシェン様、ちょうど相手が現れましてよ！　バトルしたいなら、あちらにして下さいませ！」"

[[dialogue]]
speaker = "クーシェン"
# 「む～、仕方ないな～。そん代わり、セナリィも本気出してみせてよね！」
line = "「む～、仕方ないな～。そん代わり、セナリィも本気出してみせてよね！」"

[[dialogue]]
speaker = "ミネコ"
# 「私も楽しみにしているよ。傭兵バンデット・セナリィ、そのお手並みを拝見ってね♪」
line = "「私も楽しみにしているよ。傭兵バンデット・セナリィ、そのお手並みを拝見ってね♪」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「変に注目されて、クッソやりづれぇですわ！？」
line = "「変に注目されて、クッソやりづれぇですわ！？」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「よ～し、それじゃあ、みんなテンション上げて行こうぜ～！」
line = "「よ～し、それじゃあ、みんなテンション上げて行こうぜ～！」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「愉快な仲間たちと共に元気衝天☆　いざ、勝負！」
line = "「愉快な仲間たちと共に元気衝天☆　いざ、勝負！」"

[[dialogue]]
speaker = "unk"
# そうして、セナリィたちとシャドウリーリアの戦いが始まるのだった――
line = "そうして、セナリィたちとシャドウリーリアの戦いが始まるのだった――"
