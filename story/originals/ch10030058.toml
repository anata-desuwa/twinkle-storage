# ある日の仕事終わりの星徒会室。
line = "ある日の仕事終わりの星徒会室。"

[[dialogue]]
speaker = "unk"
# ヴィーナスと一緒に帰ろうとしたところで、彼女が唐突に宣言した。
line = "ヴィーナスと一緒に帰ろうとしたところで、彼女が唐突に宣言した。"

[[dialogue]]
speaker = "ヴィーナス"
# 「今日からパパ呼びとイチャイチャを禁止するわよ！」
line = "「今日からパパ呼びとイチャイチャを禁止するわよ！」"

[[dialogue]]
speaker = "クロト"
# 「それってもしかして……マトイに怒られちゃったから？」
line = "「それってもしかして……マトイに怒られちゃったから？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええ。マトイが言う以上、私もきちんと反省しなくちゃって思ったの」
line = "「ええ。マトイが言う以上、私もきちんと反省しなくちゃって思ったの」"

[[dialogue]]
speaker = "unk"
# 今日、星徒会室でヴィーナスが俺のことをパパと呼んで甘えて来て、ついイチャイチャしてしまっていたのだが――
line = "今日、星徒会室でヴィーナスが俺のことをパパと呼んで甘えて来て、ついイチャイチャしてしまっていたのだが――"

[[dialogue]]
speaker = "unk"
# それを見ていたマトイから、「さすがに人前ではもうちょっと自重するべき」と注意を受けてしまったのだ。
line = "それを見ていたマトイから、「さすがに人前ではもうちょっと自重するべき」と注意を受けてしまったのだ。"

[[dialogue]]
speaker = "ヴィーナス"
# 「マトイは『２人きりの時は別にいい』って言ってくれてたけど、確かに最近、ちょっとルーズになりすぎていたのは事実ね」
line = "「マトイは『２人きりの時は別にいい』って言ってくれてたけど、確かに最近、ちょっとルーズになりすぎていたのは事実ね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「だから自分への罰も含めて、１ヶ月間、パパに甘えるのは禁止にしようと思うの！」
line = "「だから自分への罰も含めて、１ヶ月間、パパに甘えるのは禁止にしようと思うの！」"

[[dialogue]]
speaker = "unk"
# 俺は恋人らしいことができないのを寂しく思いつつも、ヴィーナスが頑張ろうと思っているならと、それに頷いたのだが――
line = "俺は恋人らしいことができないのを寂しく思いつつも、ヴィーナスが頑張ろうと思っているならと、それに頷いたのだが――"

[[dialogue]]
speaker = "unk"
# それから３日経った、休日の朝。
