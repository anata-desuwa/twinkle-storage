[[dialogue]]
speaker = "unk"
# 第4話,マリオン大戦,P
line = "第4話,マリオン大戦,P"

[[dialogue]]
speaker = "unk"
# マリオンが専属メイドみたいにお世話をしてくれるようになってから、付き合いも長くなってきたある日のこと。
line = "マリオンが専属メイドみたいにお世話をしてくれるようになってから、付き合いも長くなってきたある日のこと。"

[[dialogue]]
speaker = "マリオン"
# 「～♪　～～♪」
line = "「～♪　～～♪」"

[[dialogue]]
speaker = "マリオン"
# 「――おや？　会長様、何か私に言いたそうな顔をしてらっしゃいますね。いかがされましたか？」
line = "「――おや？　会長様、何か私に言いたそうな顔をしてらっしゃいますね。いかがされましたか？」"

[[dialogue]]
speaker = "unk"
# 最近のマリオン……なんか数が増えてない？
line = "最近のマリオン……なんか数が増えてない？"

[[dialogue]]
speaker = "マリオン"
# 「え？　……ああ、そういうことですか。確かに最近は、複数体で身の回りをお世話させていただいておりましたね」
line = "「え？　……ああ、そういうことですか。確かに最近は、複数体で身の回りをお世話させていただいておりましたね」"

[[dialogue]]
speaker = "マリオン"
# 「実は先日、人形達全員で誰が会長様の担当になるか、大揉めする事案が発生致しまして」
line = "「実は先日、人形達全員で誰が会長様の担当になるか、大揉めする事案が発生致しまして」"

[[dialogue]]
speaker = "マリオン"
# 「なんでそうなったかと申しますと、原因は嫉妬によるものです。会長様のお可愛さに我慢できなくなり、人形達が不満を噴出させたのです」
line = "「なんでそうなったかと申しますと、原因は嫉妬によるものです。会長様のお可愛さに我慢できなくなり、人形達が不満を噴出させたのです」"

[[dialogue]]
speaker = "マリオン"
# 「話し合いは熾烈を極め、やがて人形達は、担当の座を手に入れる為にバトルロイヤルまで行う事態に……」
line = "「話し合いは熾烈を極め、やがて人形達は、担当の座を手に入れる為にバトルロイヤルまで行う事態に……」"

[[dialogue]]
speaker = "unk"
# まさかのマリオン大戦勃発！？
line = "まさかのマリオン大戦勃発！？"

[[dialogue]]
speaker = "マリオン"
# 「――あら、人形達が嫉妬だなんて冗談だとお思いですか？　嘘ではないですよ。本当にあったことです」
line = "「――あら、人形達が嫉妬だなんて冗談だとお思いですか？　嘘ではないですよ。本当にあったことです」"

[[dialogue]]
speaker = "マリオン"
# 「（会長様には秘密にしていますが、私は自分と寸分違わぬ同スペックの人形を作ることが可能ですから……）」
line = "「（会長様には秘密にしていますが、私は自分と寸分違わぬ同スペックの人形を作ることが可能ですから……）」"

[[dialogue]]
speaker = "マリオン"
# 「（それこそ、<b>中身の人格</b>まで）」
line = "「（それこそ、<b>中身の人格</b>まで）」"

[[dialogue]]
speaker = "マリオン"
# 「それに私は、最初から会長様に対して、本気でお可愛いと思っていますよ？」
line = "「それに私は、最初から会長様に対して、本気でお可愛いと思っていますよ？」"

[[dialogue]]
speaker = "unk"
# け、結婚とか子育てしたいっていうのも……？
line = "け、結婚とか子育てしたいっていうのも……？"

[[dialogue]]
speaker = "マリオン"
# 「ええ、本当です。私、子供を産むことに興味がありまして」
line = "「ええ、本当です。私、子供を産むことに興味がありまして」"

[[dialogue]]
speaker = "マリオン"
# 「実は、もともと私は人間界の生まれではないのです。育った場所が特殊な環境でして、自分の子供を産んで育てるという意識を、長い間持ったことがありませんでした」
line = "「実は、もともと私は人間界の生まれではないのです。育った場所が特殊な環境でして、自分の子供を産んで育てるという意識を、長い間持ったことがありませんでした」"

[[dialogue]]
speaker = "マリオン"
# 「それに加えて、私は自分の能力で、分身とも言える人形を作り出すことができましたから、昔は他人への関心自体が薄い性格でした」
line = "「それに加えて、私は自分の能力で、分身とも言える人形を作り出すことができましたから、昔は他人への関心自体が薄い性格でした」"

[[dialogue]]
speaker = "マリオン"
# 「しかしある時、流星学園に通うことが決まって、長い間住んでいた故郷を離れ、人間界へとやってきたのです」
line = "「しかしある時、流星学園に通うことが決まって、長い間住んでいた故郷を離れ、人間界へとやってきたのです」"

[[dialogue]]
speaker = "マリオン"
# 「そこでトワのような友人ができて、星徒会に入って、多くの子達と関わるようになりました」
line = "「そこでトワのような友人ができて、星徒会に入って、多くの子達と関わるようになりました」"

[[dialogue]]
speaker = "マリオン"
# 「そうする内に、次第に私は、<b>自分ではない他の誰か</b>に強い関心を抱くようになったのです」
line = "「そうする内に、次第に私は、<b>自分ではない他の誰か</b>に強い関心を抱くようになったのです」"

[[dialogue]]
speaker = "マリオン"
# 「そして、今では会長様も知っての通り、可愛い子を見ると愛でずにはいられない性格になってしまって――」
line = "「そして、今では会長様も知っての通り、可愛い子を見ると愛でずにはいられない性格になってしまって――」"

[[dialogue]]
speaker = "マリオン"
# 「結果、自分の分身ではなく、自分の子供が欲しいなと思うようになったというわけです」
line = "「結果、自分の分身ではなく、自分の子供が欲しいなと思うようになったというわけです」"

[[dialogue]]
speaker = "マリオン"
# 「会長様との、お可愛い子を<emoji=heart04>　……うふふっ<emoji=heart04>」
line = "「会長様との、お可愛い子を<emoji=heart04>　……うふふっ<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
# 「――子供がほしいっていうのは、わかっていただけましたか？　それならよかったです♪」
line = "「――子供がほしいっていうのは、わかっていただけましたか？　それならよかったです♪」"

[[dialogue]]
speaker = "マリオン"
# 「……？　会長様、どうされました？」
line = "「……？　会長様、どうされました？」"

[[dialogue]]
speaker = "unk"
# マリオンは俺のこと……どう思ってるんだ？
line = "マリオンは俺のこと……どう思ってるんだ？"

[[dialogue]]
speaker = "マリオン"
# 「え？」
line = "「え？」"

[[dialogue]]
speaker = "unk"
# 俺はマリオンを、異性として好きになってしまっているが、マリオンが特別そうじゃないなら、心から好きだと思える相手と子供を作った方がいいと思う。そう伝えると――
line = "俺はマリオンを、異性として好きになってしまっているが、マリオンが特別そうじゃないなら、心から好きだと思える相手と子供を作った方がいいと思う。そう伝えると――"

[[dialogue]]
speaker = "マリオン"
# 「……ふふっ、何を仰るかと思えば、会長様――」
line = "「……ふふっ、何を仰るかと思えば、会長様――」"

[[dialogue]]
speaker = "マリオン"
# 「先程、嫉妬したって言ったじゃないですか」
line = "「先程、嫉妬したって言ったじゃないですか」"

[[dialogue]]
speaker = "マリオン"
# 「確かに、出会ったばかりの頃は気に入った男の子ではあっても、好きだとは言い切れなかったかもしれません」
line = "「確かに、出会ったばかりの頃は気に入った男の子ではあっても、好きだとは言い切れなかったかもしれません」"

[[dialogue]]
speaker = "マリオン"
# 「お可愛いから、ついからかいたくなる気持ちも、多少……いえ、すごくありました」
line = "「お可愛いから、ついからかいたくなる気持ちも、多少……いえ、すごくありました」"

[[dialogue]]
speaker = "マリオン"
# 「ですが……私達が会長様の担当である私に嫉妬したのは、会長様のことがどんどん好きになっていって、気持ちを抑えられなくなったからです」
line = "「ですが……私達が会長様の担当である私に嫉妬したのは、会長様のことがどんどん好きになっていって、気持ちを抑えられなくなったからです」"

[[dialogue]]
speaker = "マリオン"
# 「会長様――私は今、あなたのことが本当に好きですよ」
line = "「会長様――私は今、あなたのことが本当に好きですよ」"

[[dialogue]]
speaker = "マリオン"
# 「それで……先程、会長様の言ったことも、本気と受け取ってよろしいですか？」
line = "「それで……先程、会長様の言ったことも、本気と受け取ってよろしいですか？」"

[[dialogue]]
speaker = "マリオン"
# 「私のこと……好きだって、確かに言って下さいましたよね？」
line = "「私のこと……好きだって、確かに言って下さいましたよね？」"

[[dialogue]]
speaker = "マリオン"
# 「ふふっ<emoji=heart04>　聞き間違えじゃないとわかったら、私、もう我慢できなくなっちゃいますよ？」
line = "「ふふっ<emoji=heart04>　聞き間違えじゃないとわかったら、私、もう我慢できなくなっちゃいますよ？」"

[[dialogue]]
speaker = "unk"
# ちょっ、なんで入口の鍵閉めたの！？
line = "ちょっ、なんで入口の鍵閉めたの！？"

[[dialogue]]
speaker = "マリオン"
# 「うふふっ、第二次マリオン大戦勃発です<emoji=heart04>」
line = "「うふふっ、第二次マリオン大戦勃発です<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
# 「んっ……<emoji=heart04>」
line = "「んっ……<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
# 「――大丈夫です、会長様……<emoji=heart04>　複数の私達で全身をマッサージさせていただくだけですから、力を抜いて下さい……<emoji=heart04>」
line = "「――大丈夫です、会長様……<emoji=heart04>　複数の私達で全身をマッサージさせていただくだけですから、力を抜いて下さい……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# な、何も考えられなくなる……
line = "な、何も考えられなくなる……"

[[dialogue]]
speaker = "マリオン"
# 「ふふっ、お可愛いらしい顔ですこと……<emoji=heart04>　私達によるあなたの為だけのハーレム、どうかたっぷりとご堪能下さいませ……<emoji=heart04>」
line = "「ふふっ、お可愛いらしい顔ですこと……<emoji=heart04>　私達によるあなたの為だけのハーレム、どうかたっぷりとご堪能下さいませ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# その後、俺はマリオン達に埋もれて、濃密な甘い時を過ごすのだった――
line = "その後、俺はマリオン達に埋もれて、濃密な甘い時を過ごすのだった――"
