[[dialogue]]
speaker = "unk"
# 第４話,守護天使の恋愛相談,P
line = "第４話,守護天使の恋愛相談,P"

[[dialogue]]
speaker = "unk"
# アルモが戦線に加わってくれてから、数ヶ月が経過したある日──
line = "アルモが戦線に加わってくれてから、数ヶ月が経過したある日──"

[[dialogue]]
speaker = "アルモタヘル"
# 「休日に突然押しかけてすまぬ、人の子よ」
line = "「休日に突然押しかけてすまぬ、人の子よ」"

[[dialogue]]
speaker = "unk"
# それは全然構わないんだけど、一体どうしたの？
line = "それは全然構わないんだけど、一体どうしたの？"

[[dialogue]]
speaker = "アルモタヘル"
# 「ああ、実はお前に、相談したいことがあってな。義体の調子がここ最近、おかしいのだ」
line = "「ああ、実はお前に、相談したいことがあってな。義体の調子がここ最近、おかしいのだ」"

[[dialogue]]
speaker = "アルモタヘル"
# 「もちろん義体のこと故、最初にアニマやアナに相談したのだ。然れど、何故かお前に聞けと言われてしまってな」
line = "「もちろん義体のこと故、最初にアニマやアナに相談したのだ。然れど、何故かお前に聞けと言われてしまってな」"

[[dialogue]]
speaker = "unk"
# 義体の調子が！？　大丈夫なの……！？
line = "義体の調子が！？　大丈夫なの……！？"

[[dialogue]]
speaker = "アルモタヘル"
# 「わからぬ。わからぬが、落ち着け。お前にそう肩を強く掴まれると、体の調子がまたおかしくなる」
line = "「わからぬ。わからぬが、落ち着け。お前にそう肩を強く掴まれると、体の調子がまたおかしくなる」"

[[dialogue]]
speaker = "アルモタヘル"
# 「──否、謝らずともよい。とりあえず、まずはどのような異変か聞いてくれまいか」
line = "「──否、謝らずともよい。とりあえず、まずはどのような異変か聞いてくれまいか」"

[[dialogue]]
speaker = "アルモタヘル"
# 「実は、義体の異変というのは、お前も関係していることなのだ」
line = "「実は、義体の異変というのは、お前も関係していることなのだ」"

[[dialogue]]
speaker = "unk"
# 俺が……？
line = "俺が……？"

[[dialogue]]
speaker = "アルモタヘル"
# 「然り。先程、我の体にお前の手が触れたであろう？　あのように、お前と物理的な接触があった時や……」
line = "「然り。先程、我の体にお前の手が触れたであろう？　あのように、お前と物理的な接触があった時や……」"

[[dialogue]]
speaker = "アルモタヘル"
# 「逆に今日のような休日、お前と離れた時に、体に異様な反応が起きる」
line = "「逆に今日のような休日、お前と離れた時に、体に異様な反応が起きる」"

[[dialogue]]
speaker = "unk"
# ん？
line = "ん？"

[[dialogue]]
speaker = "アルモタヘル"
# 「症状としては、動悸が激しくなったり、顔が熱くなったり、精神が落ち着かなくなったり……などだ」
line = "「症状としては、動悸が激しくなったり、顔が熱くなったり、精神が落ち着かなくなったり……などだ」"

[[dialogue]]
speaker = "アルモタヘル"
# 「お前には、これの原因がわかったりするだろうか？」
line = "「お前には、これの原因がわかったりするだろうか？」"

[[dialogue]]
speaker = "unk"
# んん？　そ、それって……
line = "んん？　そ、それって……"

[[dialogue]]
speaker = "アルモタヘル"
# 「心当たりのある顔だな。教えてくれ、我のこの症状は、何かの病気なのだろうか？」
line = "「心当たりのある顔だな。教えてくれ、我のこの症状は、何かの病気なのだろうか？」"

[[dialogue]]
speaker = "アルモタヘル"
# 「……？　どうした。我とお前の仲であろう。何故言いづらそうにしている？」
line = "「……？　どうした。我とお前の仲であろう。何故言いづらそうにしている？」"

[[dialogue]]
speaker = "アルモタヘル"
# 「まさか我の体は、それ程に深刻な病なのか……？」
line = "「まさか我の体は、それ程に深刻な病なのか……？」"

[[dialogue]]
speaker = "unk"
# （いやいや。自意識過剰過ぎだ）
line = "（いやいや。自意識過剰過ぎだ）"

[[dialogue]]
speaker = "unk"
# （まさか、アルモが俺のことを……？）
line = "（まさか、アルモが俺のことを……？）"

[[dialogue]]
speaker = "アルモタヘル"
# 「なに、症状の検証とな？　もちろん我から相談したのだ、協力は惜しまぬ」
line = "「なに、症状の検証とな？　もちろん我から相談したのだ、協力は惜しまぬ」"

[[dialogue]]
speaker = "アルモタヘル"
# 「して、何から確かめる？　……手を繋ぐ？　ふむ、接触した際に起こる異変を確かめるというわけだな」
line = "「して、何から確かめる？　……手を繋ぐ？　ふむ、接触した際に起こる異変を確かめるというわけだな」"

[[dialogue]]
speaker = "アルモタヘル"
# 「……これでいいか？　ああ、やはり動悸が激しくなってきた。お前に触れられると、症状が出るのは間違いない」
line = "「……これでいいか？　ああ、やはり動悸が激しくなってきた。お前に触れられると、症状が出るのは間違いない」"

[[dialogue]]
speaker = "アルモタヘル"
# 「──手の繋ぎ方を変える？　それでまた、何かわかるのか？」
line = "「──手の繋ぎ方を変える？　それでまた、何かわかるのか？」"

[[dialogue]]
speaker = "アルモタヘル"
# 「我の指を、お前の指と指の間に絡めて……こうか？　こんな手の繋ぎ方があるのだな。面白い」
line = "「我の指を、お前の指と指の間に絡めて……こうか？　こんな手の繋ぎ方があるのだな。面白い」"

[[dialogue]]
speaker = "アルモタヘル"
# 「……む、先程よりも更に動悸が激しくなった。体温も上がっているようだ」
line = "「……む、先程よりも更に動悸が激しくなった。体温も上がっているようだ」"

[[dialogue]]
speaker = "アルモタヘル"
# 「嫌な感じがするか？　否、むしろ心地良い感じがする。アルコールを接種した時に似ているような……」
line = "「嫌な感じがするか？　否、むしろ心地良い感じがする。アルコールを接種した時に似ているような……」"

[[dialogue]]
speaker = "unk"
# （これって本当に……）
line = "（これって本当に……）"

[[dialogue]]
speaker = "アルモタヘル"
# 「ふむ。いま思い付いたのだが、このドキドキする症状は、お前との接触面積によって変化するのではないか？」
line = "「ふむ。いま思い付いたのだが、このドキドキする症状は、お前との接触面積によって変化するのではないか？」"

[[dialogue]]
speaker = "アルモタヘル"
# 「であれば、仮説を検証する為に、次は『はぐ』というものを試してみたいと思うが、どうだ？」
line = "「であれば、仮説を検証する為に、次は『はぐ』というものを試してみたいと思うが、どうだ？」"

[[dialogue]]
speaker = "アルモタヘル"
# 「む？　何を慌てている？　確かにここでは珍しいかもしれぬが、『はぐ』は挨拶の一種と聞いた」
line = "「む？　何を慌てている？　確かにここでは珍しいかもしれぬが、『はぐ』は挨拶の一種と聞いた」"

[[dialogue]]
speaker = "unk"
# （いや、そうだ。俺自身の気持ちを確かめる為にも……）
line = "（いや、そうだ。俺自身の気持ちを確かめる為にも……）"

[[dialogue]]
speaker = "アルモタヘル"
# 「ハグを試すか？　然り。それでは、失礼する」
line = "「ハグを試すか？　然り。それでは、失礼する」"

[[dialogue]]
speaker = "アルモタヘル"
# 「んっ……仮説はどうやら、合っているようだ。我のドキドキは、手を繋いだ時よりも強くなっている」
line = "「んっ……仮説はどうやら、合っているようだ。我のドキドキは、手を繋いだ時よりも強くなっている」"

[[dialogue]]
speaker = "unk"
# （アルモの体、凄く柔らかくて、良い匂いがする……！）
line = "（アルモの体、凄く柔らかくて、良い匂いがする……！）"

[[dialogue]]
speaker = "アルモタヘル"
# 「そして、このドキドキはやはり嫌ではない。心臓は激しく動き、体も汗が出るくらい熱くなっているが、何故かとても安心する」
line = "「そして、このドキドキはやはり嫌ではない。心臓は激しく動き、体も汗が出るくらい熱くなっているが、何故かとても安心する」"

[[dialogue]]
speaker = "アルモタヘル"
# 「我のこれは病気か？　少し違うように感じるのだが……」
line = "「我のこれは病気か？　少し違うように感じるのだが……」"

[[dialogue]]
speaker = "unk"
# これは異性同士の反応っていうか……
line = "これは異性同士の反応っていうか……"

[[dialogue]]
speaker = "unk"
# 病気じゃないと思う。
line = "病気じゃないと思う。"

[[dialogue]]
speaker = "アルモタヘル"
# 「ほう？　つまり我が、お前を男性として意識するようになったが故の反応というわけか。面白い」
line = "「ほう？　つまり我が、お前を男性として意識するようになったが故の反応というわけか。面白い」"

[[dialogue]]
speaker = "アルモタヘル"
# 「ところで、気になったのだが……」
line = "「ところで、気になったのだが……」"

[[dialogue]]
speaker = "unk"
# 不意にアルモが顔を近付け、額同士をくっ付けた。
line = "不意にアルモが顔を近付け、額同士をくっ付けた。"

[[dialogue]]
speaker = "アルモタヘル"
# 「ふむ、顔が赤いぞ。熱でもあるのか？」
line = "「ふむ、顔が赤いぞ。熱でもあるのか？」"

[[dialogue]]
speaker = "unk"
# あ、アルモ、いきなり何！？
line = "あ、アルモ、いきなり何！？"

[[dialogue]]
speaker = "アルモタヘル"
# 「人の子はこうやって体温を計ると聞いたのだが……何か違ったか？」
line = "「人の子はこうやって体温を計ると聞いたのだが……何か違ったか？」"

[[dialogue]]
speaker = "unk"
# 無邪気な様子で首を傾げるアルモ。
line = "無邪気な様子で首を傾げるアルモ。"

[[dialogue]]
speaker = "unk"
# そんな彼女を女性として意識するようになってしまった俺は、胸のドキドキが止まらず、顔を直視出来なくなってしまうのだった。
line = "そんな彼女を女性として意識するようになってしまった俺は、胸のドキドキが止まらず、顔を直視出来なくなってしまうのだった。"
