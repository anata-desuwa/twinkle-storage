[[dialogue]]
speaker = "unk"
# 第２話,光の魔女と学園巡り,P
line = "第２話,光の魔女と学園巡り,P"

[[dialogue]]
speaker = "クラウディア"
# 「──邪魔するぞ」
line = "「──邪魔するぞ」"

[[dialogue]]
speaker = "unk"
# どうしてここに！？
line = "どうしてここに！？"

[[dialogue]]
speaker = "unk"
# クラウディア！？
line = "クラウディア！？"

[[dialogue]]
speaker = "クラウディア"
# 「わっはっは。慌てるでない。正門？　そんなもの通っていないぞ。ちょちょいと経路を繋げて……ひとっ飛びしてきただけだ」
line = "「わっはっは。慌てるでない。正門？　そんなもの通っていないぞ。ちょちょいと経路を繋げて……ひとっ飛びしてきただけだ」"

[[dialogue]]
speaker = "クラウディア"
# 「何？　部外者は立ち入り禁止？　固いことを言うな」
line = "「何？　部外者は立ち入り禁止？　固いことを言うな」"

[[dialogue]]
speaker = "クラウディア"
# 「ここが以前に話していた──星徒会室というやつだな？　余の部屋に比べるとせせこましいが、まあ悪くはない」
line = "「ここが以前に話していた──星徒会室というやつだな？　余の部屋に比べるとせせこましいが、まあ悪くはない」"

[[dialogue]]
speaker = "クラウディア"
# 「このあたりに玉座を置いてはどうだ？　ん？　そこまで偉くない？　なんだ、気が弱いのう」
line = "「このあたりに玉座を置いてはどうだ？　ん？　そこまで偉くない？　なんだ、気が弱いのう」"

[[dialogue]]
speaker = "クラウディア"
# 「まあよい。それより、ようやく学園とやらに来れたのだ。余は隅々まで巡ってみたいぞ。案内せい！」
line = "「まあよい。それより、ようやく学園とやらに来れたのだ。余は隅々まで巡ってみたいぞ。案内せい！」"

[[dialogue]]
speaker = "クラウディア"
# 「ほほー……こんな風になっておるのだな。思っていたよりもずっと広い城ではないか」
line = "「ほほー……こんな風になっておるのだな。思っていたよりもずっと広い城ではないか」"

[[dialogue]]
speaker = "クラウディア"
# 「しかも、ここまで人がひしめいておるとは！　それになんだか明るく賑やかだ。基地とはえらい違いだのう……」
line = "「しかも、ここまで人がひしめいておるとは！　それになんだか明るく賑やかだ。基地とはえらい違いだのう……」"

[[dialogue]]
speaker = "モネ"
# 「あ、あれ……？　会長が小さな子を連れて歩いてる──もしかして隠し子……？」
line = "「あ、あれ……？　会長が小さな子を連れて歩いてる──もしかして隠し子……？」"

[[dialogue]]
speaker = "メルエル"
# 「！？　か、会長くんに隠し子！？」
line = "「！？　か、会長くんに隠し子！？」"

[[dialogue]]
speaker = "unk"
# （説明が難しいので黙っておく）
line = "（説明が難しいので黙っておく）"

[[dialogue]]
speaker = "unk"
# 違う違う
line = "違う違う"

[[dialogue]]
speaker = "クラウディア"
# 「はっはっは！　余はネビュ──ではなかった。ええと、とにかく偉くてすごい存在なのだ！」
line = "「はっはっは！　余はネビュ──ではなかった。ええと、とにかく偉くてすごい存在なのだ！」"

[[dialogue]]
speaker = "クラウディア"
# （魔女を名乗るとまーたセドナに叱られてしまうからの。余はいい子だからたまには『じちょう』するのだ）
line = "（魔女を名乗るとまーたセドナに叱られてしまうからの。余はいい子だからたまには『じちょう』するのだ）"

[[dialogue]]
speaker = "unk"
# セドナさんの許可はとった？
line = "セドナさんの許可はとった？"

[[dialogue]]
speaker = "unk"
# 基地から出てもよかったの？
line = "基地から出てもよかったの？"

[[dialogue]]
speaker = "クラウディア"
# 「うむ！　月に一度ほどはお出かけの機会が与えられておる。問題ない」
line = "「うむ！　月に一度ほどはお出かけの機会が与えられておる。問題ない」"

[[dialogue]]
speaker = "クラウディア"
# 「お付きにアイリーンをよこされたが、邪魔だったのでな。撒いてきた。今ごろ余を探し回っておるかもしれん」
line = "「お付きにアイリーンをよこされたが、邪魔だったのでな。撒いてきた。今ごろ余を探し回っておるかもしれん」"

[[dialogue]]
speaker = "クラウディア"
# 「それより、学園というのは庭もあるのかの？　ほう！　出てみようぞ、さっそく連れてゆけ！」
line = "「それより、学園というのは庭もあるのかの？　ほう！　出てみようぞ、さっそく連れてゆけ！」"

[[dialogue]]
speaker = "クラウディア"
# 「ほほー……！　流星市国の中にこんな光景があったとはの。いやはや、人間界というのは森と比べてなんとも広いな」
line = "「ほほー……！　流星市国の中にこんな光景があったとはの。いやはや、人間界というのは森と比べてなんとも広いな」"

[[dialogue]]
speaker = "unk"
# 森って……
line = "森って……"

[[dialogue]]
speaker = "クラウディア"
# 「魔女の森だ。余ら魔女が生まれ育つ、三界とは隔たった異界──人の子には立ち入れん領域だの」
line = "「魔女の森だ。余ら魔女が生まれ育つ、三界とは隔たった異界──人の子には立ち入れん領域だの」"

[[dialogue]]
speaker = "クラウディア"
# 「何もない、退屈な場所だ。余の生まれる数百年前からほとんど光景も変わっておらんらしい」
line = "「何もない、退屈な場所だ。余の生まれる数百年前からほとんど光景も変わっておらんらしい」"

[[dialogue]]
speaker = "クラウディア"
# 「それに比べると人間界は実に面白い！　宿題は面倒だが、セドナも余に色んなことを教えてくれるしのう」
line = "「それに比べると人間界は実に面白い！　宿題は面倒だが、セドナも余に色んなことを教えてくれるしのう」"

[[dialogue]]
speaker = "クラウディア"
# 「う……そういえば朝から何も食べておらなんだ。腹の虫が鳴ってしまったぞ」
line = "「う……そういえば朝から何も食べておらなんだ。腹の虫が鳴ってしまったぞ」"

[[dialogue]]
speaker = "unk"
# カフェに連れてくよ
line = "カフェに連れてくよ"

[[dialogue]]
speaker = "unk"
# なにか食べにいこうか
line = "なにか食べにいこうか"

[[dialogue]]
speaker = "クラウディア"
# 「ほほー……！　学園にはこのような場所まであるとは。中々しゃれおつではないか！」
line = "「ほほー……！　学園にはこのような場所まであるとは。中々しゃれおつではないか！」"

[[dialogue]]
speaker = "クラウディア"
# 「パンケーキにカレーにリゾット……うーむ。余の知らぬメニューがたくさん並んでおるぞ」
line = "「パンケーキにカレーにリゾット……うーむ。余の知らぬメニューがたくさん並んでおるぞ」"

[[dialogue]]
speaker = "クラウディア"
# 「む……この『ろこもこ』というのはなんだ？　可愛い名前だのう！」
line = "「む……この『ろこもこ』というのはなんだ？　可愛い名前だのう！」"

[[dialogue]]
speaker = "クラウディア"
# 「ハンバーグ……ということは……肉！？　決まりだ！　余はこれを注文するぞ！」
line = "「ハンバーグ……ということは……肉！？　決まりだ！　余はこれを注文するぞ！」"

[[dialogue]]
speaker = "クラウディア"
# 「もぐもぐ……むほほ～～！　ウマイ！　これはウマイぞ！　でかした魔王、褒めてつかわす！」
line = "「もぐもぐ……むほほ～～！　ウマイ！　これはウマイぞ！　でかした魔王、褒めてつかわす！」"

[[dialogue]]
speaker = "クラウディア"
# 「大げさ？　そんなことはない！　なにせ森では薬草やら香草やら緑黄色の草っ葉ばかりを食べさせられておった。余は肉に目がないのだ！」
line = "「大げさ？　そんなことはない！　なにせ森では薬草やら香草やら緑黄色の草っ葉ばかりを食べさせられておった。余は肉に目がないのだ！」"

[[dialogue]]
speaker = "クラウディア"
# 「これだから人間界はやめられん。むふふ、これからは定期的にここを訪れるのも悪くないのう！」
line = "「これだから人間界はやめられん。むふふ、これからは定期的にここを訪れるのも悪くないのう！」"

[[dialogue]]
speaker = "クラウディア"
# 「ふぅ！　満腹にもなったことだし、散歩を再開するとするか。……およ？　……どうかしたのかの？」
line = "「ふぅ！　満腹にもなったことだし、散歩を再開するとするか。……およ？　……どうかしたのかの？」"

[[dialogue]]
speaker = "マトイ"
# 『あ、もしもし──会長？　今ちょっと緊急事態で──繁華街に大きめのアステラが発生したみたいなの！　来れる！？』
line = "『あ、もしもし──会長？　今ちょっと緊急事態で──繁華街に大きめのアステラが発生したみたいなの！　来れる！？』"

[[dialogue]]
speaker = "クラウディア"
# 「ふむ……連絡機か？　何用であったのだ？」
line = "「ふむ……連絡機か？　何用であったのだ？」"

[[dialogue]]
speaker = "unk"
# 今日は付き添えなくなった
line = "今日は付き添えなくなった"

[[dialogue]]
speaker = "unk"
# ごめん、出動だ
line = "ごめん、出動だ"

[[dialogue]]
speaker = "クラウディア"
# 「なぬ？　ふむ──流星市国の危機とな。それが『すたーないと』の責務だというわけだな」
line = "「なぬ？　ふむ──流星市国の危機とな。それが『すたーないと』の責務だというわけだな」"

[[dialogue]]
speaker = "クラウディア"
# 「原因は──アステライトか。なるほど……ここから数キロ北と言ったところかのう」
line = "「原因は──アステライトか。なるほど……ここから数キロ北と言ったところかのう」"

[[dialogue]]
speaker = "unk"
# まだ何も言ってないのに……
line = "まだ何も言ってないのに……"

[[dialogue]]
speaker = "unk"
# ！？
line = "！？"

[[dialogue]]
speaker = "クラウディア"
# 「浄めるとするか。そう大した規模でもあるまい」
line = "「浄めるとするか。そう大した規模でもあるまい」"

[[dialogue]]
speaker = "マトイ"
# 『──ごめん会長！　さっきのアステラなんだけど……今、破裂して自然消滅しちゃったみたい！』
line = "『──ごめん会長！　さっきのアステラなんだけど……今、破裂して自然消滅しちゃったみたい！』"

[[dialogue]]
speaker = "マトイ"
# 『なんで急に消えたのかはわかんないけど……平和に終わったんならいいよね！　じゃ！』
line = "『なんで急に消えたのかはわかんないけど……平和に終わったんならいいよね！　じゃ！』"

[[dialogue]]
speaker = "unk"
# クラウディアがやったの？
line = "クラウディアがやったの？"

[[dialogue]]
speaker = "unk"
# これも魔法？
line = "これも魔法？"

[[dialogue]]
speaker = "クラウディア"
# 「ま……一飯の礼というやつだ」
line = "「ま……一飯の礼というやつだ」"

[[dialogue]]
speaker = "unk"
# 君は……
line = "君は……"

[[dialogue]]
speaker = "クラウディア"
# 「数百年に一度──魔女の森には、真祖の形質を継いだ存在が生まれる。その魔力は、森の総勢を合わせたものに匹敵する」
line = "「数百年に一度──魔女の森には、真祖の形質を継いだ存在が生まれる。その魔力は、森の総勢を合わせたものに匹敵する」"

[[dialogue]]
speaker = "クラウディア"
# 「光の魔女──そう呼ばれておる」
line = "「光の魔女──そう呼ばれておる」"

[[dialogue]]
speaker = "クラウディア"
# 「ま、要は偉くてすごいということだ。今のは見なかったことにしておけ。お主さえ黙っていれば、余がお小言を言われることもないからの！」
line = "「ま、要は偉くてすごいということだ。今のは見なかったことにしておけ。お主さえ黙っていれば、余がお小言を言われることもないからの！」"

[[dialogue]]
speaker = "クラウディア"
# 「さ──学園巡りはまだまだだぞ。余が満足するまで付き合ってもらうからの！」
line = "「さ──学園巡りはまだまだだぞ。余が満足するまで付き合ってもらうからの！」"
