[[dialogue]]
speaker = "unk"
# 第４話,偽りの聖女,P
line = "第４話,偽りの聖女,P"

[[dialogue]]
speaker = "unk"
# 日曜の夜、大聖堂に行くと、イレーナがいつになくくたびれていた。
line = "日曜の夜、大聖堂に行くと、イレーナがいつになくくたびれていた。"

[[dialogue]]
speaker = "イレーナ"
# 「はぁ～、疲れたーー……」
line = "「はぁ～、疲れたーー……」"

[[dialogue]]
speaker = "イレーナ"
# 「説法して、懺悔を聞いて、怪我とか病気を治して……聖女ポイントを稼ぐのも大変だわ」
line = "「説法して、懺悔を聞いて、怪我とか病気を治して……聖女ポイントを稼ぐのも大変だわ」"

[[dialogue]]
speaker = "イレーナ"
# 「人の気も知らないで聖女様聖女様って崇めちゃって。どいつもこいつもあたしに騙されてるくせに、ほんとおめでたいわね」
line = "「人の気も知らないで聖女様聖女様って崇めちゃって。どいつもこいつもあたしに騙されてるくせに、ほんとおめでたいわね」"

[[dialogue]]
speaker = "イレーナ"
# 「朝から今までずーっとお澄まし顔で、表情筋マヒするかと思ったわよ。あ～、ピッツァ食べたい」
line = "「朝から今までずーっとお澄まし顔で、表情筋マヒするかと思ったわよ。あ～、ピッツァ食べたい」"

[[dialogue]]
speaker = "unk"
# もっと素を出せばいいのに
line = "もっと素を出せばいいのに"

[[dialogue]]
speaker = "イレーナ"
# 「ダメよ。せっかく苦労して今の地位を築いたんだから」
line = "「ダメよ。せっかく苦労して今の地位を築いたんだから」"

[[dialogue]]
speaker = "イレーナ"
# 「この歳で教皇庁の神官って特例中の特例なの。それも聖女としての活動が認められたから」
line = "「この歳で教皇庁の神官って特例中の特例なの。それも聖女としての活動が認められたから」"

[[dialogue]]
speaker = "イレーナ"
# 「まぁ、だからって特別高い給料がもらえるわけでもないけど。聖職者だし」
line = "「まぁ、だからって特別高い給料がもらえるわけでもないけど。聖職者だし」"

[[dialogue]]
speaker = "イレーナ"
# 「だいたいこんな聖女サマは嫌でしょ。気が短くて、口が悪くて、わがままで……女神様だって真面目に信仰してないし」
line = "「だいたいこんな聖女サマは嫌でしょ。気が短くて、口が悪くて、わがままで……女神様だって真面目に信仰してないし」"

[[dialogue]]
speaker = "イレーナ"
# 「だってそうでしょ？　世界が滅ぶってことは、女神様がこの世界を見限ったってことじゃないの？　そう思っちゃうのはいけないこと？」
line = "「だってそうでしょ？　世界が滅ぶってことは、女神様がこの世界を見限ったってことじゃないの？　そう思っちゃうのはいけないこと？」"

[[dialogue]]
speaker = "イレーナ"
# 「どう考えても聖女には程遠いわ。こんなのに祈られたら、治る病気も治らないわよ」
line = "「どう考えても聖女には程遠いわ。こんなのに祈られたら、治る病気も治らないわよ」"

[[dialogue]]
speaker = "イレーナ"
# 「みんな本当のあたしを知らない。でも知ったら幻滅する。だから知らなくていい」
line = "「みんな本当のあたしを知らない。でも知ったら幻滅する。だから知らなくていい」"

[[dialogue]]
speaker = "イレーナ"
# 「だけど……あんたは聖女の私にも、聖女じゃないあたしにも変わらないわね」
line = "「だけど……あんたは聖女の私にも、聖女じゃないあたしにも変わらないわね」"

[[dialogue]]
speaker = "イレーナ"
# 「あんたは<b>あたし</b>のこと嫌いじゃないの？」
line = "「あんたは<b>あたし</b>のこと嫌いじゃないの？」"

[[dialogue]]
speaker = "unk"
# 俺はむしろ好きだけど
line = "俺はむしろ好きだけど"

[[dialogue]]
speaker = "イレーナ"
# 「はぁ！？」
line = "「はぁ！？」"

[[dialogue]]
speaker = "イレーナ"
# 「な、なんでそうなるのよ！？　あたしの話聞いてたの！？」
line = "「な、なんでそうなるのよ！？　あたしの話聞いてたの！？」"

[[dialogue]]
speaker = "イレーナ"
# 「ったく……人のことからかってんじゃないわよ、バカ」
line = "「ったく……人のことからかってんじゃないわよ、バカ」"

[[dialogue]]
speaker = "unk"
# 聖女になったこと、後悔してる？
line = "聖女になったこと、後悔してる？"

[[dialogue]]
speaker = "イレーナ"
# 「……後悔、ね」
line = "「……後悔、ね」"

[[dialogue]]
speaker = "イレーナ"
# 「そりゃ何度も後悔したわよ。あの時、行き倒れてた人を助けなきゃよかったって」
line = "「そりゃ何度も後悔したわよ。あの時、行き倒れてた人を助けなきゃよかったって」"

[[dialogue]]
speaker = "イレーナ"
# 「そしたらあたしは普通の女の子だった。ファッションを気にして、ネイルもして、人目も気にせずオリーブオイルを好きなだけかけて」
line = "「そしたらあたしは普通の女の子だった。ファッションを気にして、ネイルもして、人目も気にせずオリーブオイルを好きなだけかけて」"

[[dialogue]]
speaker = "イレーナ"
# 「コンビニ行く時も変装しなくていいし、甘いものだって食べたい時に食べれる」
line = "「コンビニ行く時も変装しなくていいし、甘いものだって食べたい時に食べれる」"

[[dialogue]]
speaker = "イレーナ"
# 「でもきっと。ううん、必ず──」
line = "「でもきっと。ううん、必ず──」"

[[dialogue]]
speaker = "イレーナ"
# 「あの時に戻ったとしても、あたしは同じ選択をする」
line = "「あの時に戻ったとしても、あたしは同じ選択をする」"

[[dialogue]]
speaker = "イレーナ"
# 「だって、助けなかったらもっと後悔するから」
line = "「だって、助けなかったらもっと後悔するから」"

[[dialogue]]
speaker = "イレーナ"
# 「あたしが助けてきたのは、みんなそんな人たちだった」
line = "「あたしが助けてきたのは、みんなそんな人たちだった」"

[[dialogue]]
speaker = "イレーナ"
# 「救いを求めていた。希望を探していた。奇跡を願っていた」
line = "「救いを求めていた。希望を探していた。奇跡を願っていた」"

[[dialogue]]
speaker = "イレーナ"
# 「この世に聖女がいると信じている人がいる。あたしが聖女だと信じている人がいる。聖女が偽物でもそれは本当」
line = "「この世に聖女がいると信じている人がいる。あたしが聖女だと信じている人がいる。聖女が偽物でもそれは本当」"

[[dialogue]]
speaker = "イレーナ"
# 「言っとくけど……たとえ成り行きでも、自分でつき始めた嘘を取り消す気はないの」
line = "「言っとくけど……たとえ成り行きでも、自分でつき始めた嘘を取り消す気はないの」"

[[dialogue]]
speaker = "イレーナ"
# 「あたしは性悪なエセ聖女なんだから」
line = "「あたしは性悪なエセ聖女なんだから」"

[[dialogue]]
speaker = "老婦人"
# 「まさかこの目がまた見えるようになるなんて……これで孫の顔が見られます！　本当に、本当にありがとうございました！」
line = "「まさかこの目がまた見えるようになるなんて……これで孫の顔が見られます！　本当に、本当にありがとうございました！」"

[[dialogue]]
speaker = "イレーナ"
# 「感謝は女神様に祈りでお伝えください。ではお帰りお気を付けて」
line = "「感謝は女神様に祈りでお伝えください。ではお帰りお気を付けて」"

[[dialogue]]
speaker = "イレーナ"
# 「……っ」
line = "「……っ」"

[[dialogue]]
speaker = "イレーナ"
# 「目を治すのはさすがに無茶したわね。星力使いすぎてキツいわ……」
line = "「目を治すのはさすがに無茶したわね。星力使いすぎてキツいわ……」"

[[dialogue]]
speaker = "イレーナ"
# 「ちょっとあんた、肩貸しなさい。こうなったら迷惑かけまくってやるわ」
line = "「ちょっとあんた、肩貸しなさい。こうなったら迷惑かけまくってやるわ」"

[[dialogue]]
speaker = "unk"
# イレーナはやっぱり聖女だよ
line = "イレーナはやっぱり聖女だよ"

[[dialogue]]
speaker = "イレーナ"
# 「はぁ？　あんた人の話聞いてないわね。このバカ」
line = "「はぁ？　あんた人の話聞いてないわね。このバカ」"

[[dialogue]]
speaker = "イレーナ"
# 「別に聖女になりたくてなったわけじゃない。でも今さらやめる気もない」
line = "「別に聖女になりたくてなったわけじゃない。でも今さらやめる気もない」"

[[dialogue]]
speaker = "イレーナ"
# 「みんな聖女様聖女様って言って、あたしのことを全然知らないのは癪だけど……」
line = "「みんな聖女様聖女様って言って、あたしのことを全然知らないのは癪だけど……」"

[[dialogue]]
speaker = "イレーナ"
# 「ま、あんたが本当のあたしを知ってればいいわ」
line = "「ま、あんたが本当のあたしを知ってればいいわ」"

[[dialogue]]
speaker = "イレーナ"
# 「うぬぼれないでよ？　あんたで妥協してあげるって言ってるの。いい？」
line = "「うぬぼれないでよ？　あんたで妥協してあげるって言ってるの。いい？」"

[[dialogue]]
speaker = "unk"
# わかってる
line = "わかってる"

[[dialogue]]
speaker = "イレーナ"
# 「妙にいい顔してるわね……」
line = "「妙にいい顔してるわね……」"

[[dialogue]]
speaker = "イレーナ"
# 「なんかムカつくから、あたしのために美味しいピッツァを探してきなさい！　ちゃんと本格的なやつじゃないと満足しないんだからね！」
line = "「なんかムカつくから、あたしのために美味しいピッツァを探してきなさい！　ちゃんと本格的なやつじゃないと満足しないんだからね！」"
