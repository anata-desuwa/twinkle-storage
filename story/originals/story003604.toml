[[dialogue]]
speaker = "unk"
# リバースフォーム制御のため、仮想モンスターとの訓練を続けるサチ。
line = "リバースフォーム制御のため、仮想モンスターとの訓練を続けるサチ。"

[[dialogue]]
speaker = "サチ"
# 「――もう１度です！　はあぁっ！」
line = "「――もう１度です！　はあぁっ！」"

[[dialogue]]
speaker = "モンスター"
# 「フワ～ッチ♪」
line = "「フワ～ッチ♪」"

[[dialogue]]
speaker = "unk"
# しかし攻撃は、ことごとく不運に阻まれる。
line = "しかし攻撃は、ことごとく不運に阻まれる。"

[[dialogue]]
speaker = "unk"
# 突然足場が崩れ、大波が押し寄せ、武器が砂に埋まって抜けなくなる――まるで『不幸』につけ狙われているかのようだった。
line = "突然足場が崩れ、大波が押し寄せ、武器が砂に埋まって抜けなくなる――まるで『不幸』につけ狙われているかのようだった。"

[[dialogue]]
speaker = "サチ"
# 「はぁ……はぁ……まるでアンラッキーデーの時みたいです……」
line = "「はぁ……はぁ……まるでアンラッキーデーの時みたいです……」"

[[dialogue]]
speaker = "シズハ"
# 「サチちゃんのリバースフォーム……『不運を引き寄せる』能力って……これ、まともに戦えないんじゃ……」
line = "「サチちゃんのリバースフォーム……『不運を引き寄せる』能力って……これ、まともに戦えないんじゃ……」"

[[dialogue]]
speaker = "トレジアンナ"
# 「ええ。想像以上に厄介ですね。何か打開策を考えないと……」
line = "「ええ。想像以上に厄介ですね。何か打開策を考えないと……」"

[[dialogue]]
speaker = "サチ"
# 「きゃあっ！？」
line = "「きゃあっ！？」"

[[dialogue]]
speaker = "unk"
# 再び何もないところでつまずき、砂浜に転倒。
line = "再び何もないところでつまずき、砂浜に転倒。"

[[dialogue]]
speaker = "サチ"
# 「くっ……！　プリムラはあんなに能力を使えてたのに、私は……！」
line = "「くっ……！　プリムラはあんなに能力を使えてたのに、私は……！」"

[[dialogue]]
speaker = "unk"
# 砂を握りしめ、悔しさを滲ませる。
line = "砂を握りしめ、悔しさを滲ませる。"

[[dialogue]]
speaker = "シズハ"
# 「サチちゃん……」
line = "「サチちゃん……」"

[[dialogue]]
speaker = "unk"
# その時――
line = "その時――"

[[dialogue]]
speaker = "プリムラ"
# 「おい、サチ！　我の時と同じように体が光っておるぞ！」
line = "「おい、サチ！　我の時と同じように体が光っておるぞ！」"

[[dialogue]]
speaker = "サチ"
# 「えっ……！？　きゃっ……！？」
line = "「えっ……！？　きゃっ……！？」"

[[dialogue]]
speaker = "サチ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# サチ、大丈夫か……！？
line = "サチ、大丈夫か……！？"

[[dialogue]]
speaker = "unk"
# 俺が駆け寄ると、サチはゆっくりと顔を上げた。
line = "俺が駆け寄ると、サチはゆっくりと顔を上げた。"

[[dialogue]]
speaker = "サチ"
# 「大丈夫ですよ、お兄さん」
line = "「大丈夫ですよ、お兄さん」"

[[dialogue]]
speaker = "サチ"
# 「――えいっ♪」
line = "「――えいっ♪」"

[[dialogue]]
speaker = "unk"
# 次の瞬間、俺は砂浜に押し倒されていた。
line = "次の瞬間、俺は砂浜に押し倒されていた。"

[[dialogue]]
speaker = "サチ"
# 「ふふっ……不運なことに、ラッキースケベが起きちゃいましたね<emoji=heart04>」
line = "「ふふっ……不運なことに、ラッキースケベが起きちゃいましたね<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# いや、思いっきり自分で押してなかった！？
line = "いや、思いっきり自分で押してなかった！？"

[[dialogue]]
speaker = "unk"
# サチはそのまま妖しく微笑みながら、両手で俺の体をすりすりと撫で始める。
line = "サチはそのまま妖しく微笑みながら、両手で俺の体をすりすりと撫で始める。"

[[dialogue]]
speaker = "サチ"
# 「お兄さんって、線は細いのに、ちゃんと筋肉がついていて……男の人って感じがするんですよね<emoji=heart04>」
line = "「お兄さんって、線は細いのに、ちゃんと筋肉がついていて……男の人って感じがするんですよね<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
# 「前から、こんなふうに……じっくり触ってみたかったんです<emoji=heart04>」
line = "「前から、こんなふうに……じっくり触ってみたかったんです<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
# 「ま、まさか……サチちゃんも精神が反転してる！？」
line = "「ま、まさか……サチちゃんも精神が反転してる！？」"

[[dialogue]]
speaker = "サチ"
# 「ふふっ……どうやらそうみたい♪」
line = "「ふふっ……どうやらそうみたい♪」"

[[dialogue]]
speaker = "サチ"
# 「でもね、シズハちゃん……私、なんだかすごく、気分がいいの♪」
line = "「でもね、シズハちゃん……私、なんだかすごく、気分がいいの♪」"

[[dialogue]]
speaker = "サチ"
# 「今なら……これまでにできなかったことも、できちゃいそうで……<emoji=heart04>」
line = "「今なら……これまでにできなかったことも、できちゃいそうで……<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
# 「たとえば――お兄さんに、こんな風にエッチなイタズラをしちゃったりとか<emoji=heart04>　ぎゅ～っ<emoji=heart04>」
line = "「たとえば――お兄さんに、こんな風にエッチなイタズラをしちゃったりとか<emoji=heart04>　ぎゅ～っ<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
# 「さ、サチのやつ、普段はハレンチ禁止とか言っておきながら、自分から眷族に抱きついとるではないか！？」
line = "「さ、サチのやつ、普段はハレンチ禁止とか言っておきながら、自分から眷族に抱きついとるではないか！？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「これは……！　今のサチさんの状態を言い表すなら――」
line = "「これは……！　今のサチさんの状態を言い表すなら――」"

[[dialogue]]
speaker = "トレジアンナ"
# 「『エッチな小悪魔化』しちゃっているみたいです！」
line = "「『エッチな小悪魔化』しちゃっているみたいです！」"

[[dialogue]]
speaker = "プリムラ"
# 「『エッチな小悪魔サチ』じゃと！？」
line = "「『エッチな小悪魔サチ』じゃと！？」"

[[dialogue]]
speaker = "unk"
# サチ、落ち着け！　お尻を触るのは……！
line = "サチ、落ち着け！　お尻を触るのは……！"

[[dialogue]]
speaker = "シズハ"
# 「お尻！？　会長のハイブリッドプリケツを！？」
line = "「お尻！？　会長のハイブリッドプリケツを！？」"

[[dialogue]]
speaker = "サチ"
# 「ふふっ、大丈夫ですよ♪　よくシズハちゃんが言っているじゃないですか――」
line = "「ふふっ、大丈夫ですよ♪　よくシズハちゃんが言っているじゃないですか――」"

[[dialogue]]
speaker = "サチ"
# 「お尻を触るのはコミュニケーションだって<emoji=heart04>」
line = "「お尻を触るのはコミュニケーションだって<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
# 「あっ、なら大丈夫か♪」
line = "「あっ、なら大丈夫か♪」"

[[dialogue]]
speaker = "unk"
# いや、何も大丈夫じゃないよ！？
line = "いや、何も大丈夫じゃないよ！？"

[[dialogue]]
speaker = "サチ"
# 「もう、お兄さんったら……もしかして興奮しちゃってるんですか？　エッチなのは禁止ですよ<emoji=heart04>」
line = "「もう、お兄さんったら……もしかして興奮しちゃってるんですか？　エッチなのは禁止ですよ<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
# 「お尻を触るのは別にエッチなことじゃないんですから～、じっとしてて下さいね♪」
line = "「お尻を触るのは別にエッチなことじゃないんですから～、じっとしてて下さいね♪」"

[[dialogue]]
speaker = "unk"
# ちょっ……そこは……アッーーー！？
line = "ちょっ……そこは……アッーーー！？"

[[dialogue]]
speaker = "プリムラ"
# 「うわあぁっ！　ハレンチじゃ！　サチが過去最高にハレンチなのじゃーーーっ！？」
line = "「うわあぁっ！　ハレンチじゃ！　サチが過去最高にハレンチなのじゃーーーっ！？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「ふおおおぉっ！？　本当は止めるべきなのでしょうが……記憶魔法で保存、保存、保存ーーーっ！！」
line = "「ふおおおぉっ！？　本当は止めるべきなのでしょうが……記憶魔法で保存、保存、保存ーーーっ！！」"

[[dialogue]]
speaker = "シズハ"
# 「はい、次は私！　私も会長のハイブリッドプリケツ、触りたいわ！」
line = "「はい、次は私！　私も会長のハイブリッドプリケツ、触りたいわ！」"

[[dialogue]]
speaker = "ディーラック"
# 「ダメだ、こいつら……」
line = "「ダメだ、こいつら……」"

[[dialogue]]
speaker = "unk"
# やがて、小一時間後。
line = "やがて、小一時間後。"

[[dialogue]]
speaker = "サチ"
# 「ハッ……！？　わ、私……！」
line = "「ハッ……！？　わ、私……！」"

[[dialogue]]
speaker = "unk"
# 正気に戻ったサチは、自分の状況を理解し――
line = "正気に戻ったサチは、自分の状況を理解し――"

[[dialogue]]
speaker = "サチ"
# 「お兄さん、違うんですぅぅぅーーーっ！！」
line = "「お兄さん、違うんですぅぅぅーーーっ！！」"

[[dialogue]]
speaker = "unk"
# 俺の上に馬乗りになったまま、絶叫した。
line = "俺の上に馬乗りになったまま、絶叫した。"

[[dialogue]]
speaker = "プリムラ"
# 「サチ！　それはどっちの意味でじゃ！？　本当はハレンチだとわかって、やっておったのか！？」
line = "「サチ！　それはどっちの意味でじゃ！？　本当はハレンチだとわかって、やっておったのか！？」"

[[dialogue]]
speaker = "サチ"
# 「わわわ、わかってない！　エッチなことは禁止だからぁぁぁーーーっ！！」
line = "「わわわ、わかってない！　エッチなことは禁止だからぁぁぁーーーっ！！」"

[[dialogue]]
speaker = "unk"
# お、俺は大丈夫だ……貞操は守ったから……
line = "お、俺は大丈夫だ……貞操は守ったから……"

[[dialogue]]
speaker = "unk"
# 俺の戦闘服は、まるでモンスターと死闘を繰り広げた後のようにボロボロに破れまくっていた。
line = "俺の戦闘服は、まるでモンスターと死闘を繰り広げた後のようにボロボロに破れまくっていた。"

[[dialogue]]
speaker = "サチ"
# 「～～～っ！！　すすす、すみませんでしたぁぁぁ～～っ！！」
line = "「～～～っ！！　すすす、すみませんでしたぁぁぁ～～っ！！」"

[[dialogue]]
speaker = "unk"
# 顔を真っ赤に染めて、全力疾走で逃げ出してしまうサチ。
line = "顔を真っ赤に染めて、全力疾走で逃げ出してしまうサチ。"

[[dialogue]]
speaker = "プリムラ"
# 「お、恐ろしい……！　あのサチがあそこまで変貌してしまうとは、リバースフォーム、本当に恐ろしい力なのじゃ……！」
line = "「お、恐ろしい……！　あのサチがあそこまで変貌してしまうとは、リバースフォーム、本当に恐ろしい力なのじゃ……！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「う～ん……反転した力の制御は、想像以上に難航しそうですね……」
line = "「う～ん……反転した力の制御は、想像以上に難航しそうですね……」"

[[dialogue]]
speaker = "シズハ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ディーラック"
# 「ん？　シズハちゃん……？」
line = "「ん？　シズハちゃん……？」"

[[dialogue]]
speaker = "unk"
# 数日後。
line = "数日後。"

[[dialogue]]
speaker = "unk"
# 俺とトレジアンナさんは、シズハに呼び出された。
line = "俺とトレジアンナさんは、シズハに呼び出された。"

[[dialogue]]
speaker = "トレジアンナ"
# 「シズハさん、お話とは一体なんでしょう？」
line = "「シズハさん、お話とは一体なんでしょう？」"

[[dialogue]]
speaker = "シズハ"
# 「会長、トレジアンナさん……相談があるの」
line = "「会長、トレジアンナさん……相談があるの」"

[[dialogue]]
speaker = "シズハ"
# 「サチちゃんとプリムラちゃん、反転させられた力のせいで、今すごく困ってるでしょ？」
line = "「サチちゃんとプリムラちゃん、反転させられた力のせいで、今すごく困ってるでしょ？」"

[[dialogue]]
speaker = "シズハ"
# 「私……『解放のロストアイテム』の一件や、ディーちゃんのことでも、何度も２人に助けてもらった」
line = "「私……『解放のロストアイテム』の一件や、ディーちゃんのことでも、何度も２人に助けてもらった」"

[[dialogue]]
speaker = "シズハ"
# 「だから今度は、私が友達として……困っている２人の力になりたいの！」
line = "「だから今度は、私が友達として……困っている２人の力になりたいの！」"

[[dialogue]]
speaker = "unk"
# 一瞬息を吸い込み、シズハはまっすぐにこちらを見つめる。
line = "一瞬息を吸い込み、シズハはまっすぐにこちらを見つめる。"

[[dialogue]]
speaker = "シズハ"
# 「私も――」
line = "「私も――」"

[[dialogue]]
speaker = "シズハ"
# 「サチちゃんの『フォルトゥーナフォーム』みたいに……魔法少女として強くなりたい！」
line = "「サチちゃんの『フォルトゥーナフォーム』みたいに……魔法少女として強くなりたい！」"

[[dialogue]]
speaker = "unk"
# そう宣言するシズハの瞳には、迷いのない強い決意の光が宿っているのだった。
line = "そう宣言するシズハの瞳には、迷いのない強い決意の光が宿っているのだった。"
