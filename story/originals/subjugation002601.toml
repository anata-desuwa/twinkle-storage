line = "「よくぞお聞きくださいマシタ！　最近は皆サンのおかげで、リゾート結界もたくさんの生徒サンたちに来てもらえるようになりマシタ」"

[[dialogue]]
speaker = "リップル"
# 「そこで今年の夏は、も～っと盛り上がるように、このリゾート結界あげての『特別イベント』を企画しているのデース！」
line = "「そこで今年の夏は、も～っと盛り上がるように、このリゾート結界あげての『特別イベント』を企画しているのデース！」"

[[dialogue]]
speaker = "ルリエル"
# 「おおっ！」
