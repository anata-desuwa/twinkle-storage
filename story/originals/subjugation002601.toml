# 「Ｏｈ、ありがたい申し出デース！」
line = "「Ｏｈ、ありがたい申し出デース！」"

[[dialogue]]
speaker = "リップル"
# 「ですがワタシも流星の皆サンと同じでこれから大事な会議があるのデース。お気持ちだけ頂戴しておきマース」
line = "「ですがワタシも流星の皆サンと同じでこれから大事な会議があるのデース。お気持ちだけ頂戴しておきマース」"

[[dialogue]]
