line = "「おお！　すごいぞリップル！」"

[[dialogue]]
speaker = "アポロ"
# 「んで水着コンテストってなんだ？　全員で泳ぎっこでもするのか！？　あたしの犬かきが火を噴く時がきたよーだな！」
line = "「んで水着コンテストってなんだ？　全員で泳ぎっこでもするのか！？　あたしの犬かきが火を噴く時がきたよーだな！」"

