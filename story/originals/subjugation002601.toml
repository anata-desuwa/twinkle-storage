[[dialogue]]
speaker = "unk"
# それは、とある夏の日のこと──
line = "それは、とある夏の日のこと──"

[[dialogue]]
speaker = "ルリエル"
# 「海です～～！！」
line = "「海です～～！！」"

[[dialogue]]
speaker = "アポロ"
# 「わっはっは！　夏といえばやっぱりビーチだよな！」
line = "「わっはっは！　夏といえばやっぱりビーチだよな！」"

[[dialogue]]
speaker = "アナ"
# 「ふむ……やはりここに来なくては、夏という気がしませんね」
line = "「ふむ……やはりここに来なくては、夏という気がしませんね」"

[[dialogue]]
speaker = "unk"
# 絶好の海日和ということで、俺たちはリゾート結界を訪れていた。
line = "絶好の海日和ということで、俺たちはリゾート結界を訪れていた。"

[[dialogue]]
speaker = "unk"
# 先日、桜十路家の遊園地にも新しいプールができていたが、ビーチもそれに負けないくらい賑わっていた。
line = "先日、桜十路家の遊園地にも新しいプールができていたが、ビーチもそれに負けないくらい賑わっていた。"

[[dialogue]]
speaker = "リップル"
# 「ハーイ、皆サーン！　リップルデース！　今日はよくぞおいでくださいマシタ！」
line = "「ハーイ、皆サーン！　リップルデース！　今日はよくぞおいでくださいマシタ！」"

[[dialogue]]
speaker = "リップル"
# 「せーの……」
line = "「せーの……」"

[[dialogue]]
speaker = "リップル＆ソフィア"
# 「エンドレスサマーへ、ようこそ！！」
line = "「エンドレスサマーへ、ようこそ！！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええ！　目一杯楽しませてもらうわ！」
line = "「ええ！　目一杯楽しませてもらうわ！」"

[[dialogue]]
speaker = "マトイ"
# 「すっかりソフィアちゃんがホスト側に……」
line = "「すっかりソフィアちゃんがホスト側に……」"

[[dialogue]]
speaker = "サーシャ"
# 「冬に初めて訪れて以来、すっかり<ruby=あししげ>足繁</ruby>く通うようになっちゃって……ちょっとでも寒い日が続くと、すぐリゾートに行きたがるのよ」
line = "「冬に初めて訪れて以来、すっかり<ruby>足繁<rt>あししげ</rt></ruby>く通うようになっちゃって……ちょっとでも寒い日が続くと、すぐリゾートに行きたがるのよ」"

[[dialogue]]
speaker = "アポロ"
# 「海は楽しいもんな！　気持ちはわかるぞ、ソフィア！」
line = "「海は楽しいもんな！　気持ちはわかるぞ、ソフィア！」"

[[dialogue]]
speaker = "unk"
# あんまりはしゃぎすぎないように
