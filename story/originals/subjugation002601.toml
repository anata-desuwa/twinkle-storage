[[dialogue]]
speaker = "unk"
# アポロも……
line = "アポロも……"

[[dialogue]]
speaker = "アポロ"
# 「大丈夫だっての。心配性だなあ、魔王は」
line = "「大丈夫だっての。心配性だなあ、魔王は」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あれ──そういえばフィオナはいないの？」
line = "「あれ──そういえばフィオナはいないの？」"

[[dialogue]]
speaker = "ルリエル"
# 「フィオナ会長たちは、次の作戦会議があるとかで今日は来れないみたいです♪　その分、わたしが存分に楽しんでくると約束しました！」
line = "「フィオナ会長たちは、次の作戦会議があるとかで今日は来れないみたいです♪　その分、わたしが存分に楽しんでくると約束しました！」"

[[dialogue]]
speaker = "マトイ"
# 「流星の作戦会議……」
line = "「流星の作戦会議……」"

[[dialogue]]
speaker = "アナ"
# 「それは……地味に戦力外通告されているのでは？」
line = "「それは……地味に戦力外通告されているのでは？」"

[[dialogue]]
speaker = "ルリエル"
# 「え？　ええ？　そ、そんなことないですよねえ、会長さん！？」
line = "「え？　ええ？　そ、そんなことないですよねえ、会長さん！？」"

[[dialogue]]
speaker = "unk"
# ソフィアもいるから
