[[dialogue]]
speaker = "unk"
# 第９話,ボン・ボヤージュ,B
line = "第９話,ボン・ボヤージュ,B"

[[dialogue]]
speaker = "クロト"
# 「──オオオオオオオオッッ！」
line = "「──オオオオオオオオッッ！」"

[[dialogue]]
speaker = "アイリーン"
# 「っ……！」
line = "「っ……！」"

[[dialogue]]
speaker = "カヤ"
# 「先ほどの比ではない出力を確認──」
line = "「先ほどの比ではない出力を確認──」"

[[dialogue]]
speaker = "セドナ"
# 「フ──いくらか成長はしたようだな」
line = "「フ──いくらか成長はしたようだな」"

[[dialogue]]
speaker = "マトイ"
# 「緋宮くん……」
line = "「緋宮くん……」"

[[dialogue]]
speaker = "アナ"
# （凄まじい鬼気……前会長の抜けた分まで奮闘しているような……）
line = "（凄まじい鬼気……前会長の抜けた分まで奮闘しているような……）"

[[dialogue]]
speaker = "クロト"
# 「──ふぅ……」
line = "「──ふぅ……」"

[[dialogue]]
speaker = "unk"
# みなぎっていた全身の力が抜けていく。それは抑えつけていた自分への怒りだったのかもしれない。
line = "みなぎっていた全身の力が抜けていく。それは抑えつけていた自分への怒りだったのかもしれない。"

[[dialogue]]
speaker = "unk"
# ともあれ、ヴィーナスのいないフォーメーションで奮闘した俺たちは──彼女たちへ力を示してみせた。
line = "ともあれ、ヴィーナスのいないフォーメーションで奮闘した俺たちは──彼女たちへ力を示してみせた。"

[[dialogue]]
speaker = "クラウディア"
# 「くくくっ──なるほどな」
line = "「くくくっ──なるほどな」"

[[dialogue]]
speaker = "unk"
# クラウディアと名乗った少女は、どこか満足したように魔法杖をしまう。
line = "クラウディアと名乗った少女は、どこか満足したように魔法杖をしまう。"

[[dialogue]]
speaker = "クラウディア"
# 「うむ！　実に昂ぶる戦いであったぞ！　余は満足だ、これをもってお主らを合格としよう！」
line = "「うむ！　実に昂ぶる戦いであったぞ！　余は満足だ、これをもってお主らを合格としよう！」"

[[dialogue]]
speaker = "セドナ"
# 「姫にこれ以上暴れられては、基地の方が持ちませんからね」
line = "「姫にこれ以上暴れられては、基地の方が持ちませんからね」"

[[dialogue]]
speaker = "クラウディア"
# 「はっはっは。しかしせーとかいというのも中々やるのう、余は驚いたぞ！」
line = "「はっはっは。しかしせーとかいというのも中々やるのう、余は驚いたぞ！」"

[[dialogue]]
speaker = "アイリーン"
# 「彼らも毎日<ruby=けんさん>研鑽</ruby>を積んでいるようですから。私も負けてはいられませんね……！」
line = "「彼らも毎日<ruby>研鑽<rt>けんさん</rt></ruby>を積んでいるようですから。私も負けてはいられませんね……！」"

[[dialogue]]
speaker = "ソフィア"
# （にしては、全然へばってないようですけど……）
line = "（にしては、全然へばってないようですけど……）"

[[dialogue]]
speaker = "アナ"
# （やはり底知れませんね。魔女の総帥──）
line = "（やはり底知れませんね。魔女の総帥──）"

[[dialogue]]
speaker = "フィオナ"
# 「──では。改めて、あなた方──魔女の経路をお借りしてもよろしいでしょうか？」
line = "「──では。改めて、あなた方──魔女の経路をお借りしてもよろしいでしょうか？」"

[[dialogue]]
speaker = "クラウディア"
# 「うむ。好きに使うがよいぞ」
line = "「うむ。好きに使うがよいぞ」"

[[dialogue]]
speaker = "クロト"
# 「セドナさんも──それでいいでしょうか？」
line = "「セドナさんも──それでいいでしょうか？」"

[[dialogue]]
speaker = "セドナ"
# 「……ああ。いいだろう。姫の決めたことだ、異存はない」
line = "「……ああ。いいだろう。姫の決めたことだ、異存はない」"

[[dialogue]]
speaker = "unk"
# セドナさんにとってもかの少女は上役であるのか、あっさりと許諾してくれた。
line = "セドナさんにとってもかの少女は上役であるのか、あっさりと許諾してくれた。"

[[dialogue]]
speaker = "unk"
# これで……
line = "これで……"

[[dialogue]]
speaker = "セドナ"
# 「今回限りの特例だ。今から『うろ』を通じて貴様らを魔界へ送ってやる」
line = "「今回限りの特例だ。今から『うろ』を通じて貴様らを魔界へ送ってやる」"

[[dialogue]]
speaker = "セドナ"
# 「ただし連れていけるのは『６人』までだ──この場でメンバーを決めろ。３分待ってやる」
line = "「ただし連れていけるのは『６人』までだ──この場でメンバーを決めろ。３分待ってやる」"

[[dialogue]]
speaker = "ルリエル"
# 「さ、３分だけでありますか！？」
line = "「さ、３分だけでありますか！？」"

[[dialogue]]
speaker = "マトイ"
# 「それに今すぐって──人間界を離れるんだったら、準備とか……！」
line = "「それに今すぐって──人間界を離れるんだったら、準備とか……！」"

[[dialogue]]
speaker = "セドナ"
# 「準備だ？　腑抜けたことを抜かすな。常在戦場──仮にも騎士を名乗るのなら、覚悟に<ruby=いとま>暇</ruby>など不要」
line = "「準備だ？　腑抜けたことを抜かすな。常在戦場──仮にも騎士を名乗るのなら、覚悟に<ruby>暇<rt>いとま</rt></ruby>など不要」"

[[dialogue]]
speaker = "セドナ"
# 「第一、貴様らには火急の用があるのだろうが。すぐに支度をしてやるだけこちらの親切心と思え」
line = "「第一、貴様らには火急の用があるのだろうが。すぐに支度をしてやるだけこちらの親切心と思え」"

[[dialogue]]
speaker = "クロト"
# 「……ああ。早く向かえるに越したことはない──すぐにでも話し合って決めさせてもらう」
line = "「……ああ。早く向かえるに越したことはない──すぐにでも話し合って決めさせてもらう」"

[[dialogue]]
speaker = "フィオナ"
# 「何人かは確定ですね」
line = "「何人かは確定ですね」"

[[dialogue]]
speaker = "unk"
# そうして俺たちは選抜メンバーを選ぶことにした。
line = "そうして俺たちは選抜メンバーを選ぶことにした。"

[[dialogue]]
speaker = "unk"
# 行き先は魔界──待ち構えるは霊力を操る未曾有の大敵。危険な行軍になることは必至だ。
line = "行き先は魔界──待ち構えるは霊力を操る未曾有の大敵。危険な行軍になることは必至だ。"

[[dialogue]]
speaker = "unk"
# まずは俺とフィオナ──
line = "まずは俺とフィオナ──"

[[dialogue]]
speaker = "unk"
# どちらも星徒会を率いる会長で、また流れる<b>血筋</b>からしても必須の戦力と判断された。
line = "どちらも星徒会を率いる会長で、また流れる<b>血筋</b>からしても必須の戦力と判断された。"

[[dialogue]]
speaker = "unk"
# そしてサーシャ先輩とソフィアちゃん──奏姉妹。
line = "そしてサーシャ先輩とソフィアちゃん──奏姉妹。"

[[dialogue]]
speaker = "unk"
# 魔界生まれの魔族である彼女たちもまた、今回の旅には欠かせない要員だった。
line = "魔界生まれの魔族である彼女たちもまた、今回の旅には欠かせない要員だった。"

[[dialogue]]
speaker = "unk"
# そして残る２人にはマトイとユウリ──
line = "そして残る２人にはマトイとユウリ──"

[[dialogue]]
speaker = "unk"
# 属性的にも、足りないサポートを補う形だ。
line = "属性的にも、足りないサポートを補う形だ。"

[[dialogue]]
speaker = "クロト"
# 「──この６人で行く。みんな、頼んだ」
line = "「──この６人で行く。みんな、頼んだ」"

[[dialogue]]
speaker = "セドナ"
# 「承知した。アイリーン、終着点の設定をしておいてやれ」
line = "「承知した。アイリーン、終着点の設定をしておいてやれ」"

[[dialogue]]
speaker = "アイリーン"
# 「はい──比較的安全な地帯へお送りいたします」
line = "「はい──比較的安全な地帯へお送りいたします」"

[[dialogue]]
speaker = "ユウリ"
# 「っしゃあ！　ヴィーナスのためにも気合入れてくぞ！」
line = "「っしゃあ！　ヴィーナスのためにも気合入れてくぞ！」"

[[dialogue]]
speaker = "マトイ"
# （私で大丈夫かな……？　ううん、でもヴィーナスだって頑張ってるんだから、私だって……！）
line = "（私で大丈夫かな……？　ううん、でもヴィーナスだって頑張ってるんだから、私だって……！）"

[[dialogue]]
speaker = "ソフィア"
# 「こんな形で魔界へ帰ることになるなんて……」
line = "「こんな形で魔界へ帰ることになるなんて……」"

[[dialogue]]
speaker = "サーシャ"
# 「ふふ。頑張りましょうね、ソフィ♪」
line = "「ふふ。頑張りましょうね、ソフィ♪」"

[[dialogue]]
speaker = "unk"
# 魔界選抜６人──
line = "魔界選抜６人──"

[[dialogue]]
speaker = "unk"
# 俺たちはしばらく人間界からお別れし、未知の世界を突き進む。
line = "俺たちはしばらく人間界からお別れし、未知の世界を突き進む。"

[[dialogue]]
speaker = "ニャリオン"
# 「ワガハイを忘れるなニャン！　６人と１匹だニャン！」
line = "「ワガハイを忘れるなニャン！　６人と１匹だニャン！」"

[[dialogue]]
speaker = "ユウリ"
# 「シリアスが崩れるんだよ、おまえ」
line = "「シリアスが崩れるんだよ、おまえ」"

[[dialogue]]
speaker = "フィオナ"
# 「ルリエル、セーラさん──しばらく学園を空けることになりますが、留守をよろしくお願いいたします」
line = "「ルリエル、セーラさん──しばらく学園を空けることになりますが、留守をよろしくお願いいたします」"

[[dialogue]]
speaker = "ルリエル"
# 「──もちろんです！　流星市国……いえ人間界の平和はわたし達が守ります！」
line = "「──もちろんです！　流星市国……いえ人間界の平和はわたし達が守ります！」"

[[dialogue]]
speaker = "セーラ"
# 「うんうん。プリマステラの子たちにも協力してもらうし──滅多なことがなければ大丈夫だって」
line = "「うんうん。プリマステラの子たちにも協力してもらうし──滅多なことがなければ大丈夫だって」"

[[dialogue]]
speaker = "クロト"
# 「アナも頼んだ。魔界に行ったら俺も連絡が取れなくなる──必要なら先生たちを頼ってくれ」
line = "「アナも頼んだ。魔界に行ったら俺も連絡が取れなくなる──必要なら先生たちを頼ってくれ」"

[[dialogue]]
speaker = "アナ"
# 「はい。アニマ先輩と一緒に、別ルートでの捜索も視野に入れておきます」
line = "「はい。アニマ先輩と一緒に、別ルートでの捜索も視野に入れておきます」"

[[dialogue]]
speaker = "unk"
# これで準備は整った。
line = "これで準備は整った。"

[[dialogue]]
speaker = "unk"
# 後はただ、魔界へ行ってヴィーナスの身柄を救出するのみ。
line = "後はただ、魔界へ行ってヴィーナスの身柄を救出するのみ。"

[[dialogue]]
speaker = "アイリーン"
# 「セット完了──『世界樹のうろ』は正確に魔界へ繋がりました。いつでも行けます」
line = "「セット完了──『世界樹のうろ』は正確に魔界へ繋がりました。いつでも行けます」"

[[dialogue]]
speaker = "セドナ"
# 「よし。順番に並べ、もたもたするな！」
line = "「よし。順番に並べ、もたもたするな！」"

[[dialogue]]
speaker = "マトイ"
# 「は、はいぃ！？」
line = "「は、はいぃ！？」"

[[dialogue]]
speaker = "ソフィア"
# （魔界と言っても広大ですが、どちらへ出るのでしょうか……？）
line = "（魔界と言っても広大ですが、どちらへ出るのでしょうか……？）"

[[dialogue]]
speaker = "フィオナ"
# 「……さすがにドキドキしてきましたね」
line = "「……さすがにドキドキしてきましたね」"

[[dialogue]]
speaker = "サーシャ"
# 「覚悟を決めるしかないわね。平気、会長くん？」
line = "「覚悟を決めるしかないわね。平気、会長くん？」"

[[dialogue]]
speaker = "クロト"
# 「ええ。こんなにも速やかに手配してくれて──ありがたい限りですよ」
line = "「ええ。こんなにも速やかに手配してくれて──ありがたい限りですよ」"

[[dialogue]]
speaker = "unk"
# 俺の胸はどんな緊張よりも喜びに満ちていた。
line = "俺の胸はどんな緊張よりも喜びに満ちていた。"

[[dialogue]]
speaker = "unk"
# これでヴィーナスに近づける──そう思うと、武者震いさえ湧いてきた。
line = "これでヴィーナスに近づける──そう思うと、武者震いさえ湧いてきた。"

[[dialogue]]
speaker = "アイリーン"
# 「『<ruby=ユグドラシル>世界樹</ruby>』起動──目標は魔界Ⅳ－Ｒ１３地点！　<ruby=ボン・ボヤージュ>良き旅を</ruby>！」
line = "「『<ruby>世界樹<rt>ユグドラシル</rt></ruby>』起動──目標は魔界Ⅳ－Ｒ１３地点！　<ruby>良き旅を<rt>ボン・ボヤージュ</rt></ruby>！」"

[[dialogue]]
speaker = "クロト"
# （待っていてくれ──ヴィーナス！）
line = "（待っていてくれ──ヴィーナス！）"
