[[dialogue]]
speaker = "unk"
# 第４話,プリムラと初デート,P
line = "第４話,プリムラと初デート,P"

[[dialogue]]
speaker = "unk"
# プリムラと交際を始めた俺は、さっそく彼女を初デートに誘うことにした。
line = "プリムラと交際を始めた俺は、さっそく彼女を初デートに誘うことにした。"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「今度の休日に、遊園地デートじゃと？　ほほう、主をもてなそうというわけか♪」
line = "「今度の休日に、遊園地デートじゃと？　ほほう、主をもてなそうというわけか♪」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「よかろう、付き合ってやるのじゃ！　遅刻するでないぞ！」
line = "「よかろう、付き合ってやるのじゃ！　遅刻するでないぞ！」"

[[dialogue]]
speaker = "unk"
# プリムラに快諾してもらえたことが嬉しかったのか、俺は待ち合わせの１時間前に到着してしまった。
line = "プリムラに快諾してもらえたことが嬉しかったのか、俺は待ち合わせの１時間前に到着してしまった。"

[[dialogue]]
speaker = "unk"
# 流石にこんなに早い時間じゃあ、プリムラもいないだろうな……
line = "流石にこんなに早い時間じゃあ、プリムラもいないだろうな……"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「そわそわ……そわそわ……」
line = "「そわそわ……そわそわ……」"

[[dialogue]]
speaker = "unk"
# （１時間前なのに、いたー！？）
line = "（１時間前なのに、いたー！？）"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「きき、緊張してきたのじゃ……それにどうやって時間を潰す？　こんなに早いと、流石に眷族もまだ来んじゃろうし……」
line = "「きき、緊張してきたのじゃ……それにどうやって時間を潰す？　こんなに早いと、流石に眷族もまだ来んじゃろうし……」"

[[dialogue]]
speaker = "unk"
# ──おはよう！
line = "──おはよう！"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「なぁっ──！？　もう来たのじゃ！？　えっ、我、時間を勘違いしておったか……！？」
line = "「なぁっ──！？　もう来たのじゃ！？　えっ、我、時間を勘違いしておったか……！？」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「何っ……貴様も楽しみで早く到着してしまった、じゃと。そ、そうじゃったか！　実は我も──」
line = "「何っ……貴様も楽しみで早く到着してしまった、じゃと。そ、そうじゃったか！　実は我も──」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「──って！？　わわ、我は別に楽しみで早起きしたわけではないのじゃ！」
line = "「──って！？　わわ、我は別に楽しみで早起きしたわけではないのじゃ！」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「これは──そうっ！　貴様がどのくらい早く到着するかを観察し、我への忠誠心の深さを測ろうと思ってじゃな……！」
line = "「これは──そうっ！　貴様がどのくらい早く到着するかを観察し、我への忠誠心の深さを測ろうと思ってじゃな……！」"

[[dialogue]]
speaker = "unk"
# ありがとう、すごく嬉しい！
line = "ありがとう、すごく嬉しい！"

[[dialogue]]
speaker = "unk"
# 楽しみにしてくれてたんだね
line = "楽しみにしてくれてたんだね"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「むにゅにゅぅ……！　ほっぺをもちもちするでな～い！　不遜じゃぞっ……！」
line = "「むにゅにゅぅ……！　ほっぺをもちもちするでな～い！　不遜じゃぞっ……！」"

[[dialogue]]
speaker = "unk"
# （と言いつつ、嬉しそうだ）
line = "（と言いつつ、嬉しそうだ）"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「むにゅにゅぅ～……フヘへへっ<emoji=heart04>」
line = "「むにゅにゅぅ～……フヘへへっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 照れ隠しをするプリムラが可愛くて、ついついほっぺをもちもち触ってしまった。
line = "照れ隠しをするプリムラが可愛くて、ついついほっぺをもちもち触ってしまった。"

[[dialogue]]
speaker = "unk"
# こんな感じで、俺たちの初デートは始まった──
line = "こんな感じで、俺たちの初デートは始まった──"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「ほほ～、これが遊園地か……！　実に活気があるではないか！」
line = "「ほほ～、これが遊園地か……！　実に活気があるではないか！」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「じゃが惜しむらくは、ゲートで守りをしておった女の態度じゃ。我、１０万と１０歳じゃのに、子供料金でチケットを切りおった……！」
line = "「じゃが惜しむらくは、ゲートで守りをしておった女の態度じゃ。我、１０万と１０歳じゃのに、子供料金でチケットを切りおった……！」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「おまけに『お兄さんとはぐれちゃダメよ』などと！　おのれぇ～っ……！」
line = "「おまけに『お兄さんとはぐれちゃダメよ』などと！　おのれぇ～っ……！」"

[[dialogue]]
speaker = "unk"
# でも恋人だって言い返してくれたよね
line = "でも恋人だって言い返してくれたよね"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「当然じゃ！　我と眷族はツガイなのじゃから。誤解されたままでは居心地が悪いじゃろうが」
line = "「当然じゃ！　我と眷族はツガイなのじゃから。誤解されたままでは居心地が悪いじゃろうが」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「よ～し、下がった気分を吹き飛ばすのじゃ！　あの猛り狂う乗り物に乗るのじゃっ！」
line = "「よ～し、下がった気分を吹き飛ばすのじゃ！　あの猛り狂う乗り物に乗るのじゃっ！」"

[[dialogue]]
speaker = "unk"
# そうしてプリムラと遊園地を練り歩くことになったのだけれど──
line = "そうしてプリムラと遊園地を練り歩くことになったのだけれど──"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「──なぬ！？　身長が１５０センチないと乗れないじゃと！？」
line = "「──なぬ！？　身長が１５０センチないと乗れないじゃと！？」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「だ、大丈夫じゃ……背伸びをすれば、ほ、ほれ！　１５０のラインを越えたのじゃ！」
line = "「だ、大丈夫じゃ……背伸びをすれば、ほ、ほれ！　１５０のラインを越えたのじゃ！」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「ずるはダメ？　ひどいのじゃ！　……乗せてくれ、頼む～っ！」
line = "「ずるはダメ？　ひどいのじゃ！　……乗せてくれ、頼む～っ！」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「フフフ、幽霊屋敷とな。果たして終末兵器の我を、恐れさせることができるかのう？」
line = "「フフフ、幽霊屋敷とな。果たして終末兵器の我を、恐れさせることができるかのう？」"

[[dialogue]]
speaker = "女性スタッフ"
# 「中は暗いから、お兄さんとはぐれないようにね♪」
line = "「中は暗いから、お兄さんとはぐれないようにね♪」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「ちち、違うのじゃ～！　こやつは我の配下であり、恋人なのじゃ～っ！」
line = "「ちち、違うのじゃ～！　こやつは我の配下であり、恋人なのじゃ～っ！」"

[[dialogue]]
speaker = "unk"
# 小さな背丈のプリムラと、行く先々で色々なトラブルはあったけれど……なんだかんだで楽しい１日になったのだった。
line = "小さな背丈のプリムラと、行く先々で色々なトラブルはあったけれど……なんだかんだで楽しい１日になったのだった。"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「すっかり日が暮れるまで遊んでしまったのじゃ。眷族よ、我は大満足じゃ！　今日は誘ってくれて感謝するぞ！」
line = "「すっかり日が暮れるまで遊んでしまったのじゃ。眷族よ、我は大満足じゃ！　今日は誘ってくれて感謝するぞ！」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「しかし、我の姿……おチビのままでは楽しみきれなかったのも事実じゃ」
line = "「しかし、我の姿……おチビのままでは楽しみきれなかったのも事実じゃ」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「我が真の姿を取り戻した時、また来ようではないか！　……ん？　そうじゃ、何度も言っておるじゃろう。本当の我はダイナマイトボディーなんじゃからな！」
line = "「我が真の姿を取り戻した時、また来ようではないか！　……ん？　そうじゃ、何度も言っておるじゃろう。本当の我はダイナマイトボディーなんじゃからな！」"

[[dialogue]]
speaker = "unk"
# でもそのためには……
line = "でもそのためには……"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「うむ。封印がすべて解かれなければならん。我の兵器としての力がすべて解放されるわけじゃから、いつのことになるか……」
line = "「うむ。封印がすべて解かれなければならん。我の兵器としての力がすべて解放されるわけじゃから、いつのことになるか……」"

[[dialogue]]
speaker = "unk"
# ……もしかして世界の危機？
line = "……もしかして世界の危機？"

[[dialogue]]
speaker = "unk"
# それに封印が解かれるってことは
line = "それに封印が解かれるってことは"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「フフフ、当然じゃな。我に施された封印がすべて解かれれば、それすなわち世界の終焉を意味するじゃろう！」
line = "「フフフ、当然じゃな。我に施された封印がすべて解かれれば、それすなわち世界の終焉を意味するじゃろう！」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「……なんての。壊しはせんよ、もうな」
line = "「……なんての。壊しはせんよ、もうな」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「想いを伝えあった貴様が、守ろうとしておる世界じゃし……我を作ったやつの思惑に、そのまま乗っかるのも癪なのじゃ」
line = "「想いを伝えあった貴様が、守ろうとしておる世界じゃし……我を作ったやつの思惑に、そのまま乗っかるのも癪なのじゃ」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「──ま、それでも世界征服することは、諦めておらんがの！」
line = "「──ま、それでも世界征服することは、諦めておらんがの！」"

[[dialogue]]
speaker = "unk"
# それってどう違うの……？
line = "それってどう違うの……？"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「全然違うのじゃ！　壊さずとも、我の強さは世界中に広めなければならんじゃろう！？」
line = "「全然違うのじゃ！　壊さずとも、我の強さは世界中に広めなければならんじゃろう！？」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「我は悪の終末兵器！　この世界で一番強いことを知らしめるのは生き甲斐なのじゃ！　誰よりも目立って、すごい存在にならなければならん！」
line = "「我は悪の終末兵器！　この世界で一番強いことを知らしめるのは生き甲斐なのじゃ！　誰よりも目立って、すごい存在にならなければならん！」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「よいか、眷族よ。貴様はずっと我の傍におるのじゃぞ！」
line = "「よいか、眷族よ。貴様はずっと我の傍におるのじゃぞ！」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「……うむ、約束じゃ<emoji=heart04>」
line = "「……うむ、約束じゃ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 人為的にリクリエを引き起こす……そのために製造された終末兵器『メルクリウス』。その暴力性を危険視する人は確かに多いけれど。
line = "人為的にリクリエを引き起こす……そのために製造された終末兵器『メルクリウス』。その暴力性を危険視する人は確かに多いけれど。"

[[dialogue]]
speaker = "unk"
# 俺は今、目の前にいる彼女──『プリムラ』の優しさを信じたいと思っている。
line = "俺は今、目の前にいる彼女──『プリムラ』の優しさを信じたいと思っている。"

[[dialogue]]
speaker = "unk"
# 兵器を管理する立場の魔王として。
line = "兵器を管理する立場の魔王として。"

[[dialogue]]
speaker = "unk"
# そして、彼女のことを好きだと思う、１人の男として──
line = "そして、彼女のことを好きだと思う、１人の男として──"
