[[dialogue]]
speaker = "unk"
# 第３話,脚本家は面倒くさい（後編）,P
line = "第３話,脚本家は面倒くさい（後編）,P"

[[dialogue]]
speaker = "ロクサーナ"
# 「ふぅ……美味かった。くっくっく、長同士、顔を突き合わせてのディナーがカップ麺とはな」
line = "「ふぅ……美味かった。くっくっく、長同士、顔を突き合わせてのディナーがカップ麺とはな」"

[[dialogue]]
speaker = "ロクサーナ"
# 「此度の件でわかってもらえたと思うが、創作者というのは実に面倒で利己的な人種なのだよ」
line = "「此度の件でわかってもらえたと思うが、創作者というのは実に面倒で利己的な人種なのだよ」"

[[dialogue]]
speaker = "unk"
# 何人か心当たりがある……
line = "何人か心当たりがある……"

[[dialogue]]
speaker = "ロクサーナ"
# 「そうだろう、そうだろう。私に目をつけられたのが運の尽きと諦めてもらえれば幸いだ」
line = "「そうだろう、そうだろう。私に目をつけられたのが運の尽きと諦めてもらえれば幸いだ」"

[[dialogue]]
speaker = "ロクサーナ"
# 「完成を間近に控えて、私は機嫌がいい。部外者だというのに、こんな時間まで付き合ってくれている礼のひとつもしよう。会長、私に何か要求はないか」
line = "「完成を間近に控えて、私は機嫌がいい。部外者だというのに、こんな時間まで付き合ってくれている礼のひとつもしよう。会長、私に何か要求はないか」"

[[dialogue]]
speaker = "unk"
# ロクサーナのことが知りたいな
line = "ロクサーナのことが知りたいな"

[[dialogue]]
speaker = "ロクサーナ"
# 「私のこと、だと？　プロフィールならば学生証にでも書かれているだろう」
line = "「私のこと、だと？　プロフィールならば学生証にでも書かれているだろう」"

[[dialogue]]
speaker = "ロクサーナ"
# 「そもそも私のことなど、知ったところでどうなるものでもあるまい。会長と比べたら平々凡々で、さして面白くもないぞ」
line = "「そもそも私のことなど、知ったところでどうなるものでもあるまい。会長と比べたら平々凡々で、さして面白くもないぞ」"

[[dialogue]]
speaker = "unk"
# 好きな物と嫌いな物と癖と将来の夢は何？
line = "好きな物と嫌いな物と癖と将来の夢は何？"

[[dialogue]]
speaker = "unk"
# そうだなぁ……軽い自己紹介と
line = "そうだなぁ……軽い自己紹介と"

[[dialogue]]
speaker = "ロクサーナ"
# 「はっ……いつぞの意趣返しのつもりか？　味な真似をするじゃないか。その心意気に免じて、付き合ってやる」
line = "「はっ……いつぞの意趣返しのつもりか？　味な真似をするじゃないか。その心意気に免じて、付き合ってやる」"

[[dialogue]]
speaker = "ロクサーナ"
# 「新星学園３年、ロクサーナ・ハイドランジアだ。６月２５日生まれ、生まれは魔界のシャリオン地方」
line = "「新星学園３年、ロクサーナ・ハイドランジアだ。６月２５日生まれ、生まれは魔界のシャリオン地方」"

[[dialogue]]
speaker = "ロクサーナ"
# 「好きな物は苦いコーヒー、嫌いな物は甘ったるいコーヒー。癖……口癖は……凡骨、か？」
line = "「好きな物は苦いコーヒー、嫌いな物は甘ったるいコーヒー。癖……口癖は……凡骨、か？」"

[[dialogue]]
speaker = "ロクサーナ"
# 「夢は……己の全てを表現した『究極の舞台』を作り上げることだ。そのためならば私の生命をチップにするのすら厭わん」
line = "「夢は……己の全てを表現した『究極の舞台』を作り上げることだ。そのためならば私の生命をチップにするのすら厭わん」"

[[dialogue]]
speaker = "unk"
# 脚本家を志したのは、どうして？
line = "脚本家を志したのは、どうして？"

[[dialogue]]
speaker = "ロクサーナ"
# 「私の手に紙とペンだけが握られていたからだ。いや、それしか私の手元に残っていなかったからだ」
line = "「私の手に紙とペンだけが握られていたからだ。いや、それしか私の手元に残っていなかったからだ」"

[[dialogue]]
speaker = "ロクサーナ"
# 「思いのほか、人のプライバシーに踏み込んでくるのだな？」
line = "「思いのほか、人のプライバシーに踏み込んでくるのだな？」"

[[dialogue]]
speaker = "unk"
# 気に障ったなら話さなくてもいいよ
line = "気に障ったなら話さなくてもいいよ"

[[dialogue]]
speaker = "ロクサーナ"
# 「なぁに、構わん。最早どうにもならない過去の出来事だ」
line = "「なぁに、構わん。最早どうにもならない過去の出来事だ」"

[[dialogue]]
speaker = "ロクサーナ"
# 「魔界の出身だと言ったな。私は町の豪商の家に生まれた。幸いにも食う物には困らぬ、何ら不自由のない幼少期を過ごさせてもらったよ」
line = "「魔界の出身だと言ったな。私は町の豪商の家に生まれた。幸いにも食う物には困らぬ、何ら不自由のない幼少期を過ごさせてもらったよ」"

[[dialogue]]
speaker = "ロクサーナ"
# 「だが、それは私にとっては退屈な日々だった」
line = "「だが、それは私にとっては退屈な日々だった」"

[[dialogue]]
speaker = "ロクサーナ"
# 「豪商の娘というだけで、街の権力者どもが揃いも揃って年端も行かぬ私にヘコヘコと頭を下げて、ご機嫌伺いだ」
line = "「豪商の娘というだけで、街の権力者どもが揃いも揃って年端も行かぬ私にヘコヘコと頭を下げて、ご機嫌伺いだ」"

[[dialogue]]
speaker = "ロクサーナ"
# 「大人としてのプライドや矜持がないのかと、銅貨よりも安く頭を下げる連中を、冷めた目で眺めている幼少期だった」
line = "「大人としてのプライドや矜持がないのかと、銅貨よりも安く頭を下げる連中を、冷めた目で眺めている幼少期だった」"

[[dialogue]]
speaker = "ロクサーナ"
# 「しかし、ある日、それはいとも容易く崩壊し、逆転した」
line = "「しかし、ある日、それはいとも容易く崩壊し、逆転した」"

[[dialogue]]
speaker = "ロクサーナ"
# 「父と権力者との癒着が発覚して民衆の怒りを買ってな。暴徒と化した民衆たちによって私の屋敷は打ち壊され、家財はことごとく奪われた」
line = "「父と権力者との癒着が発覚して民衆の怒りを買ってな。暴徒と化した民衆たちによって私の屋敷は打ち壊され、家財はことごとく奪われた」"

[[dialogue]]
speaker = "ロクサーナ"
# 「使用人の手引きで、私は命からがら逃げ出したものの、その時の私が咄嗟に掴んでいたのは数枚の紙束と１本のペンだけだった」
line = "「使用人の手引きで、私は命からがら逃げ出したものの、その時の私が咄嗟に掴んでいたのは数枚の紙束と１本のペンだけだった」"

[[dialogue]]
speaker = "ロクサーナ"
# 「私はその持ち出した紙に、渦巻く感情の全てを叩きつけた。<ruby=そうぼう>双眸</ruby>で見た情景を、使える語彙の全てでもって克明に描写した」
line = "「私はその持ち出した紙に、渦巻く感情の全てを叩きつけた。<ruby>双眸<rt>そうぼう</rt></ruby>で見た情景を、使える語彙の全てでもって克明に描写した」"

[[dialogue]]
speaker = "ロクサーナ"
# 「怒り狂う民衆、燃え落ちる屋敷、追い詰められる恐怖……書き留めた物は、一片の物語となった」
line = "「怒り狂う民衆、燃え落ちる屋敷、追い詰められる恐怖……書き留めた物は、一片の物語となった」"

[[dialogue]]
speaker = "ロクサーナ"
# 「極めて粗削りで、今読み返したらうっかり引き裂いてしまいそうな稚拙な代物ではあったがな。読む者に何らかの感情を抱かせる脚本の体を為していた」
line = "「極めて粗削りで、今読み返したらうっかり引き裂いてしまいそうな稚拙な代物ではあったがな。読む者に何らかの感情を抱かせる脚本の体を為していた」"

[[dialogue]]
speaker = "ロクサーナ"
# 「それが私が初めて書き上げた脚本、処女作だ」
line = "「それが私が初めて書き上げた脚本、処女作だ」"

[[dialogue]]
speaker = "ロクサーナ"
# 「己が抱いた感情を、浮かんだ思念を、文章という形でアウトプットする」
line = "「己が抱いた感情を、浮かんだ思念を、文章という形でアウトプットする」"

[[dialogue]]
speaker = "ロクサーナ"
# 「会長は創作の沼に堕ちたことがあるか？　創作は良いぞ、一度浸かってしまったら二度と這い上がる気になれない甘美の底なし沼だ」
line = "「会長は創作の沼に堕ちたことがあるか？　創作は良いぞ、一度浸かってしまったら二度と這い上がる気になれない甘美の底なし沼だ」"

[[dialogue]]
speaker = "ロクサーナ"
# 「作品の結末──最後のピリオドを打った瞬間に訪れる感動と恍惚は、何物にも喩え難い。物を作ることでしか得られない快感は確実に存在する」
line = "「作品の結末──最後のピリオドを打った瞬間に訪れる感動と恍惚は、何物にも喩え難い。物を作ることでしか得られない快感は確実に存在する」"

[[dialogue]]
speaker = "ロクサーナ"
# 「すっかり創作の奴隷となった私は、本格的に脚本家としての活動を始めた──というわけだ」
line = "「すっかり創作の奴隷となった私は、本格的に脚本家としての活動を始めた──というわけだ」"

[[dialogue]]
speaker = "ロクサーナ"
# 「──そうか。昔話をしていて思い出したよ。初心忘れるべからず、だな」
line = "「──そうか。昔話をしていて思い出したよ。初心忘れるべからず、だな」"

[[dialogue]]
speaker = "ロクサーナ"
# 「小手先の技術ばかりに頼りきり、感情を叩きつける愉悦を忘れるところだった」
line = "「小手先の技術ばかりに頼りきり、感情を叩きつける愉悦を忘れるところだった」"

[[dialogue]]
speaker = "ロクサーナ"
# 「そうだ、そうだ、変なギミックや創作論ではなく、登場人物が自身の感情に素直に従えば全ては解決する」
line = "「そうだ、そうだ、変なギミックや創作論ではなく、登場人物が自身の感情に素直に従えば全ては解決する」"

[[dialogue]]
speaker = "ロクサーナ"
# 「──ああ、実はクライマックスの出来に少し悩んでいたのだがな。お前と話していて、別案が思いついた」
line = "「──ああ、実はクライマックスの出来に少し悩んでいたのだがな。お前と話していて、別案が思いついた」"

[[dialogue]]
speaker = "ロクサーナ"
# 「よし……よし……全てのキャラクターの行動と理念がしっくりとハマった。くだらんことを話してしまったと思ったが……なかなか役に立ったな」
line = "「よし……よし……全てのキャラクターの行動と理念がしっくりとハマった。くだらんことを話してしまったと思ったが……なかなか役に立ったな」"

[[dialogue]]
speaker = "ロクサーナ"
# 「この分ならばあと数時間で完成に至るよ。会長、協力に感謝する」
line = "「この分ならばあと数時間で完成に至るよ。会長、協力に感謝する」"

[[dialogue]]
speaker = "unk"
# どういたしまして
line = "どういたしまして"

[[dialogue]]
speaker = "ロクサーナ"
# 「完成の瞬間は、会長に立ち会い、喜びを分かち合ってほしい。もう少し、ここにいてくれるか？」
line = "「完成の瞬間は、会長に立ち会い、喜びを分かち合ってほしい。もう少し、ここにいてくれるか？」"

[[dialogue]]
speaker = "unk"
# もちろん。楽しみにしてる
line = "もちろん。楽しみにしてる"

[[dialogue]]
speaker = "ロクサーナ"
# 「時間も時間だ。眠いようなら目を閉じててくれて構わん。まあ、完成した瞬間には叩き起こすがな、くっくっく」
line = "「時間も時間だ。眠いようなら目を閉じててくれて構わん。まあ、完成した瞬間には叩き起こすがな、くっくっく」"

[[dialogue]]
speaker = "unk"
# ロクサーナの走らせるペンの音を子守歌代わりに目を閉じた。
line = "ロクサーナの走らせるペンの音を子守歌代わりに目を閉じた。"

[[dialogue]]
speaker = "unk"
# 次に目覚める時はロクサーナ渾身の脚本が完成した時だ。
line = "次に目覚める時はロクサーナ渾身の脚本が完成した時だ。"

[[dialogue]]
speaker = "ロクサーナ"
# 「起きろ、凡骨。できたぞ」
line = "「起きろ、凡骨。できたぞ」"

[[dialogue]]
speaker = "unk"
# そして、明け方近く、ロクサーナの脚本は無事完成した。
line = "そして、明け方近く、ロクサーナの脚本は無事完成した。"

[[dialogue]]
speaker = "unk"
# この脚本は、演劇部の卒業公演にてお披露目されるとのことだった。
line = "この脚本は、演劇部の卒業公演にてお披露目されるとのことだった。"
