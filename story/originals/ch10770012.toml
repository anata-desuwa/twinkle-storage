[[dialogue]]
speaker = "unk"
# 第２話,メイド長は成長中,P
line = "第２話,メイド長は成長中,P"

[[dialogue]]
speaker = "unk"
# それは、蘭美、せつな、ヴィーナスの３人が、星徒会室で談笑していた時のことだった――
line = "それは、蘭美、せつな、ヴィーナスの３人が、星徒会室で談笑していた時のことだった――"

[[dialogue]]
speaker = "せつな"
# 「そういえば、せつな、最近１つ悩みがござりまして……」
line = "「そういえば、せつな、最近１つ悩みがござりまして……」"

[[dialogue]]
speaker = "蘭美"
# 「なに？　そういうことなら、この私に言ってみなさい。メイド長として、特別に聞いてあげるわ」
line = "「なに？　そういうことなら、この私に言ってみなさい。メイド長として、特別に聞いてあげるわ」"

[[dialogue]]
speaker = "せつな"
# 「ありがとうございまする。実は――」
line = "「ありがとうございまする。実は――」"

[[dialogue]]
speaker = "せつな"
# 「せつな、最近また胸が大きくなって、ブラジャーのサイズが合わなくなってしまったのでござる！」
line = "「せつな、最近また胸が大きくなって、ブラジャーのサイズが合わなくなってしまったのでござる！」"

[[dialogue]]
speaker = "蘭美"
# 「は！？」
line = "「は！？」"

[[dialogue]]
speaker = "unk"
# いきなり何を言い出してるんだ！？
line = "いきなり何を言い出してるんだ！？"

[[dialogue]]
speaker = "ヴィーナス"
# 「あのね……せつな――」
line = "「あのね……せつな――」"

[[dialogue]]
speaker = "ヴィーナス"
# 「実は私も同じく、ブラが合わなくなっていたところだったの！　奇遇ね！」
line = "「実は私も同じく、ブラが合わなくなっていたところだったの！　奇遇ね！」"

[[dialogue]]
speaker = "unk"
# えぇ～～～っ！？
line = "えぇ～～～っ！？"

[[dialogue]]
speaker = "蘭美"
# 「ていうか、待ちなさいよ！　それの何が悩みなわけ！？　胸が大きくなったのはいいことじゃない！」
line = "「ていうか、待ちなさいよ！　それの何が悩みなわけ！？　胸が大きくなったのはいいことじゃない！」"

[[dialogue]]
speaker = "せつな"
# 「悩みなのは、せつな、新しいブラが欲しいのでござるが、大人っぽいやつを買うことに挑戦してみたいのでござる！」
line = "「悩みなのは、せつな、新しいブラが欲しいのでござるが、大人っぽいやつを買うことに挑戦してみたいのでござる！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ビビッときたわ！　つまりあれよ、いわゆる大人なランジェリーショップに売ってるやつってことよね？」
line = "「ビビッときたわ！　つまりあれよ、いわゆる大人なランジェリーショップに売ってるやつってことよね？」"

[[dialogue]]
speaker = "せつな"
# 「その通りでござる。せつな、次の新しいブラは、大人なエロスが溢れるものを付けてみたいのでござる！」
line = "「その通りでござる。せつな、次の新しいブラは、大人なエロスが溢れるものを付けてみたいのでござる！」"

[[dialogue]]
speaker = "せつな"
# 「しかし、いざそういう場所に入ろうと思うと、１人では尻込みしてまう雰囲気があるというか……」
line = "「しかし、いざそういう場所に入ろうと思うと、１人では尻込みしてまう雰囲気があるというか……」"

[[dialogue]]
speaker = "蘭美"
# 「いや、普段から房中術とか口にしてる貴方が、それを言う！？　別に入れるでしょ、普通に！」
line = "「いや、普段から房中術とか口にしてる貴方が、それを言う！？　別に入れるでしょ、普通に！」"

[[dialogue]]
speaker = "せつな"
# 「なんと！？　蘭美殿は大人なランジェリーショップに入ったことがあるのでござるか！？」
line = "「なんと！？　蘭美殿は大人なランジェリーショップに入ったことがあるのでござるか！？」"

[[dialogue]]
speaker = "蘭美"
# 「あるわよ！　だって、大人っぽい場所……カッコいいじゃない！」
line = "「あるわよ！　だって、大人っぽい場所……カッコいいじゃない！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「なるほど……面白いわね！　ならせっかくだし、今度の休日、みんなで一緒に買いに行きましょう！」
line = "「なるほど……面白いわね！　ならせっかくだし、今度の休日、みんなで一緒に買いに行きましょう！」"

[[dialogue]]
speaker = "せつな"
# 「本当でござるか！？　それは心強くて、助かりまする♪　是非お願いしたいでござる！」
line = "「本当でござるか！？　それは心強くて、助かりまする♪　是非お願いしたいでござる！」"

[[dialogue]]
speaker = "蘭美"
# 「って、待ちなさい！　みんなってことは、私も行くの！？」
line = "「って、待ちなさい！　みんなってことは、私も行くの！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「？　そうだけど、嫌だった？　買い換える必要があるのは、私とせつなだし、蘭美が他になにか用事があるなら無理には――」
line = "「？　そうだけど、嫌だった？　買い換える必要があるのは、私とせつなだし、蘭美が他になにか用事があるなら無理には――」"

[[dialogue]]
speaker = "蘭美"
# 「って、誰の胸が小さくて成長してないですって！？」
line = "「って、誰の胸が小さくて成長してないですって！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「いや、言ってないけど！？」
line = "「いや、言ってないけど！？」"

[[dialogue]]
speaker = "蘭美"
# 「言っとくけど、私はお嬢様やせつなと比べて年齢が下だからそう見えるだけで、胸は発展途上なだけぴょん！」
line = "「言っとくけど、私はお嬢様やせつなと比べて年齢が下だからそう見えるだけで、胸は発展途上なだけぴょん！」"

[[dialogue]]
speaker = "蘭美"
# 「３年後くらいには、最速で成長して、２人を越えるくらいダイナマイトになっているぴょん！！」
line = "「３年後くらいには、最速で成長して、２人を越えるくらいダイナマイトになっているぴょん！！」"

[[dialogue]]
speaker = "せつな"
# 「蘭美殿。興奮してまた、ラパン地方の方言が出ているでござるよ！」
line = "「蘭美殿。興奮してまた、ラパン地方の方言が出ているでござるよ！」"

[[dialogue]]
speaker = "蘭美"
# 「おっと、いけないいけない……ふぅ」
line = "「おっと、いけないいけない……ふぅ」"

[[dialogue]]
speaker = "蘭美"
# 「そういうことだから、会長！　私は年相応なだけで、貧乳なわけじゃないから、そこのところ勘違いしないで頂戴！」
line = "「そういうことだから、会長！　私は年相応なだけで、貧乳なわけじゃないから、そこのところ勘違いしないで頂戴！」"

[[dialogue]]
speaker = "unk"
# なにも言ってないけど！？
line = "なにも言ってないけど！？"

[[dialogue]]
speaker = "蘭美"
# 「だから、もちろん私も行くわよ！　ええ！　私の胸も絶賛最速で成長中だもの！」
line = "「だから、もちろん私も行くわよ！　ええ！　私の胸も絶賛最速で成長中だもの！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「決まりね！　そしたら、今度の休日は、私たち４人で大人なブラを買いに行くわよ！」
line = "「決まりね！　そしたら、今度の休日は、私たち４人で大人なブラを買いに行くわよ！」"

[[dialogue]]
speaker = "せつな"
# 「お～！　でござる♪」
line = "「お～！　でござる♪」"

[[dialogue]]
speaker = "unk"
# ――って、４人って言った今！？
line = "――って、４人って言った今！？"

[[dialogue]]
speaker = "unk"
# 行ってらっしゃ～い
line = "行ってらっしゃ～い"

[[dialogue]]
speaker = "unk"
# 日曜日――
line = "日曜日――"

[[dialogue]]
speaker = "ヴィーナス"
# 「さすが東京。潤沢なラインナップで、全員大人なブラを買うことができたわね！」
line = "「さすが東京。潤沢なラインナップで、全員大人なブラを買うことができたわね！」"

[[dialogue]]
speaker = "蘭美"
# 「ええ、私も買えたわ。それはいいんだけど――」
line = "「ええ、私も買えたわ。それはいいんだけど――」"

[[dialogue]]
speaker = "蘭美"
# 「会長がこの中で１番大きい、Ｉカップのブラを買っているのはどういうことなの！？」
line = "「会長がこの中で１番大きい、Ｉカップのブラを買っているのはどういうことなの！？」"

[[dialogue]]
speaker = "unk"
# 最近、俺も前のじゃサイズが合わなくなって
line = "最近、俺も前のじゃサイズが合わなくなって"

[[dialogue]]
speaker = "蘭美"
# 「前のってなに！？　男の胸筋がってこと！？」
line = "「前のってなに！？　男の胸筋がってこと！？」"

[[dialogue]]
speaker = "せつな"
# 「主様は、アニマ先輩の研究している薬の副作用で、時折女体化することがあるのでござる！」
line = "「主様は、アニマ先輩の研究している薬の副作用で、時折女体化することがあるのでござる！」"

[[dialogue]]
speaker = "蘭美"
# 「はぁ！？　女体化！？　なにを言って――」
line = "「はぁ！？　女体化！？　なにを言って――」"

[[dialogue]]
speaker = "ヴィーナス"
# 「実際に見せた方が早いわ！　クロト、アニマ先輩からいざという時の為に貰っている、星力倍増薬マーク２の出番よ！」
line = "「実際に見せた方が早いわ！　クロト、アニマ先輩からいざという時の為に貰っている、星力倍増薬マーク２の出番よ！」"

[[dialogue]]
speaker = "unk"
# そうして、アニマ先輩の薬を飲んで、変身してから戻ってくると――
line = "そうして、アニマ先輩の薬を飲んで、変身してから戻ってくると――"

[[dialogue]]
speaker = "ヴィーナス"
# 「見なさい！　これが……脅威のＩカップ、バスト９９センチのスーパークロトよ！」
line = "「見なさい！　これが……脅威のＩカップ、バスト９９センチのスーパークロトよ！」"

[[dialogue]]
speaker = "蘭美"
# 「な……！」
line = "「な……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あ、でも、ブラが合わなくなったってことは、更に大きくなったってことよね。１００の大台に乗ったかもしれないわ、多分！」
line = "「あ、でも、ブラが合わなくなったってことは、更に大きくなったってことよね。１００の大台に乗ったかもしれないわ、多分！」"

[[dialogue]]
speaker = "蘭美"
# 「っ……か、会長の――」
line = "「っ……か、会長の――」"

[[dialogue]]
speaker = "蘭美"
# 「裏切り者おぉぉぉ～～～～～～～～～っ！！！」
line = "「裏切り者おぉぉぉ～～～～～～～～～っ！！！」"

[[dialogue]]
speaker = "unk"
# そんなわけで、天才なのに胸が小さいのがコンプレックスな蘭美なのだった――
line = "そんなわけで、天才なのに胸が小さいのがコンプレックスな蘭美なのだった――"
