[[dialogue]]
speaker = "unk"
# イクシリオンとトワは新星寮に移動し、キッチンを借りてチョコ作りを開始した。
line = "イクシリオンとトワは新星寮に移動し、キッチンを借りてチョコ作りを開始した。"

[[dialogue]]
speaker = "トワ先生"
# 「じゃあ、まずは試しにチョコ作りを見せてもらっていいかな？」
line = "「じゃあ、まずは試しにチョコ作りを見せてもらっていいかな？」"

[[dialogue]]
speaker = "イクシリオン"
# 「はい。では、変身していない状態から始めますね」
line = "「はい。では、変身していない状態から始めますね」"

[[dialogue]]
speaker = "unk"
# イクシリオンは迷いのない手つきでチョコ作りを始める。
line = "イクシリオンは迷いのない手つきでチョコ作りを始める。"

[[dialogue]]
speaker = "トワ先生"
# 「イクシリオンちゃん、すごく慣れてるね。普段からよく料理してるの？」
line = "「イクシリオンちゃん、すごく慣れてるね。普段からよく料理してるの？」"

[[dialogue]]
speaker = "イクシリオン"
# 「ええ、人間界に来てから初めて一人暮らしをするようになったので、自分でちゃんと生活できるように、時間がある時はなるべく料理を作っています」
line = "「ええ、人間界に来てから初めて一人暮らしをするようになったので、自分でちゃんと生活できるように、時間がある時はなるべく料理を作っています」"

[[dialogue]]
speaker = "トワ先生"
# 「えらい……！　イクシリオンちゃんって確か、流星学園の附属校に通ってたんだよね？」
line = "「えらい……！　イクシリオンちゃんって確か、流星学園の附属校に通ってたんだよね？」"

[[dialogue]]
speaker = "イクシリオン"
# 「はい。なので、今ではだいぶできるようになりました」
line = "「はい。なので、今ではだいぶできるようになりました」"

[[dialogue]]
speaker = "トワ先生"
# 「附属校時代から自炊してたのはすごいね……！　先生は学園卒業後に本格的に自分で料理を始めたから――あっ、いや、なんでもないよ！？　あははは……！」
line = "「附属校時代から自炊してたのはすごいね……！　先生は学園卒業後に本格的に自分で料理を始めたから――あっ、いや、なんでもないよ！？　あははは……！」"

[[dialogue]]
speaker = "トワ先生"
# 「コホン――ちなみに、附属校から新星学園に進学した理由ってあるの？」
line = "「コホン――ちなみに、附属校から新星学園に進学した理由ってあるの？」"

[[dialogue]]
speaker = "イクシリオン"
# 「私の一族は守護天使アルモタヘル様を信奉していて、象徴の色として、私も赤色が好きだったんです。それで、新星学園の制服を見たとき、着てみたいと思って……<emoji=heart04>」
line = "「私の一族は守護天使アルモタヘル様を信奉していて、象徴の色として、私も赤色が好きだったんです。それで、新星学園の制服を見たとき、着てみたいと思って……<emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
# 「なるほど！　赤い制服かぁ～♪」
line = "「なるほど！　赤い制服かぁ～♪」"

[[dialogue]]
speaker = "イクシリオン"
# 「あっ、でも、一応両親には手紙を送って許可をもらったうえで入学しましたので……！」
line = "「あっ、でも、一応両親には手紙を送って許可をもらったうえで入学しましたので……！」"

[[dialogue]]
speaker = "トワ先生"
# 「あははっ♪　大丈夫大丈夫、イクシリオンちゃんは普段から真面目だし、それくらい全然いいと思うよ！」
line = "「あははっ♪　大丈夫大丈夫、イクシリオンちゃんは普段から真面目だし、それくらい全然いいと思うよ！」"

[[dialogue]]
speaker = "イクシリオン"
# 「ありがとうございます……新星学園の制服、本当に気に入っているので……♪」
line = "「ありがとうございます……新星学園の制服、本当に気に入っているので……♪」"

[[dialogue]]
speaker = "unk"
# イクシリオンは会話を楽しみながらも、手を止めることなくチョコ作りを続ける。
line = "イクシリオンは会話を楽しみながらも、手を止めることなくチョコ作りを続ける。"

[[dialogue]]
speaker = "イクシリオン"
# （トワ先生と会話しながら作業することで、妄想トリップせずに済んでいるので……このまま順調にいければ――）
line = "（トワ先生と会話しながら作業することで、妄想トリップせずに済んでいるので……このまま順調にいければ――）"

[[dialogue]]
speaker = "クロト"
# 「やあ、イクシー」
line = "「やあ、イクシー」"

[[dialogue]]
speaker = "イクシリオン"
# 「えっ！？　か、会長！？」
line = "「えっ！？　か、会長！？」"

[[dialogue]]
speaker = "クロト"
# 「昨日言ってたバレンタインチョコ、作ってくれてたのか？　嬉しいな」
line = "「昨日言ってたバレンタインチョコ、作ってくれてたのか？　嬉しいな」"

[[dialogue]]
speaker = "イクシリオン"
# 「は、はい<emoji=heart04>　実はそうなんです……えへへ<emoji=heart04>」
line = "「は、はい<emoji=heart04>　実はそうなんです……えへへ<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
# 「って、痛っ……！？」
line = "「って、痛っ……！？」"

[[dialogue]]
speaker = "unk"
# イクシリオンは手元が狂い、包丁で指先を掠めてしまった。
line = "イクシリオンは手元が狂い、包丁で指先を掠めてしまった。"

[[dialogue]]
speaker = "クロト"
# 「イクシー、大丈夫か！？」
line = "「イクシー、大丈夫か！？」"

[[dialogue]]
speaker = "イクシリオン"
# 「大丈夫です！　ちょっと不注意で……」
line = "「大丈夫です！　ちょっと不注意で……」"

[[dialogue]]
speaker = "クロト"
# 「ごめん、俺のせいだ！　すぐ救急箱取ってくるから、待ってて！」
line = "「ごめん、俺のせいだ！　すぐ救急箱取ってくるから、待ってて！」"

[[dialogue]]
speaker = "イクシリオン"
# 「あっ<emoji=heart04>　会長、そんな……！　私、保健委員ですので、自分で手当てできます……！」
line = "「あっ<emoji=heart04>　会長、そんな……！　私、保健委員ですので、自分で手当てできます……！」"

[[dialogue]]
speaker = "イクシリオン"
# （ああっ<emoji=heart04>　会長と手が触れ合って……こんなに優しく……<emoji=heart04>）
line = "（ああっ<emoji=heart04>　会長と手が触れ合って……こんなに優しく……<emoji=heart04>）"

[[dialogue]]
speaker = "unk"
# クロトはイクシリオンの手を両手で包み込み、丁寧に消毒して絆創膏を貼る。
line = "クロトはイクシリオンの手を両手で包み込み、丁寧に消毒して絆創膏を貼る。"

[[dialogue]]
speaker = "イクシリオン"
# （胸のドキドキで、指先の痛みもすぐに吹き飛んで……むしろ甘い感覚が伝わってくる感じで……<emoji=heart04>）
line = "（胸のドキドキで、指先の痛みもすぐに吹き飛んで……むしろ甘い感覚が伝わってくる感じで……<emoji=heart04>）"

[[dialogue]]
speaker = "クロト"
# 「――俺が心配なんだ」
line = "「――俺が心配なんだ」"

[[dialogue]]
speaker = "イクシリオン"
# 「え……？」
line = "「え……？」"

[[dialogue]]
speaker = "unk"
# クロトは手を包みながら、真剣な瞳で言う。
line = "クロトは手を包みながら、真剣な瞳で言う。"

[[dialogue]]
speaker = "クロト"
# 「チョコを作ってくれるのは嬉しい。でも、俺はそれよりも、イクシーの方が大切なんだ。だから……この綺麗な手を怪我しないように気を付けて欲しい」
line = "「チョコを作ってくれるのは嬉しい。でも、俺はそれよりも、イクシーの方が大切なんだ。だから……この綺麗な手を怪我しないように気を付けて欲しい」"

[[dialogue]]
speaker = "イクシリオン"
# 「わ、私の方が大切……！？」
line = "「わ、私の方が大切……！？」"

[[dialogue]]
speaker = "イクシリオン"
# （そ、それってつまり……会長がそこまで私のことを想って……！？　ああっ、いけません……！　そんな真剣な眼差しで見つめられたら、私……<emoji=heart04>）
line = "（そ、それってつまり……会長がそこまで私のことを想って……！？　ああっ、いけません……！　そんな真剣な眼差しで見つめられたら、私……<emoji=heart04>）"

[[dialogue]]
speaker = "トワ先生"
# 「――イクシリオンちゃん……イクシリオンちゃん！」
line = "「――イクシリオンちゃん……イクシリオンちゃん！」"

[[dialogue]]
speaker = "イクシリオン"
# （あれ？　なんだか、トワ先生の声が近くから……？）
line = "（あれ？　なんだか、トワ先生の声が近くから……？）"

[[dialogue]]
speaker = "トワ先生"
# 「――イクシリオンちゃん！　大丈夫？」
line = "「――イクシリオンちゃん！　大丈夫？」"

[[dialogue]]
speaker = "イクシリオン"
# 「ハッ……！？　私……妄想トリップして……？」
line = "「ハッ……！？　私……妄想トリップして……？」"

[[dialogue]]
speaker = "トワ先生"
# 「うん。イクシリオンちゃんの言う通り、いきなりバレンタインフォームに変身したと思ったら、そのまま……」
line = "「うん。イクシリオンちゃんの言う通り、いきなりバレンタインフォームに変身したと思ったら、そのまま……」"

[[dialogue]]
speaker = "イクシリオン"
# 「ああ……やっぱり、チョコ作りをすると強制的に変身してしまうんですね……」
line = "「ああ……やっぱり、チョコ作りをすると強制的に変身してしまうんですね……」"

[[dialogue]]
speaker = "トワ先生"
# 「それもそうだけど――」
line = "「それもそうだけど――」"

[[dialogue]]
speaker = "バレンタヒヒーン"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "トワ先生"
# 「なんかチョコも光ったと思ったら、とんでもないものが出来上がってるんだけど！？　しかもなんか動いてるし！」
line = "「なんかチョコも光ったと思ったら、とんでもないものが出来上がってるんだけど！？　しかもなんか動いてるし！」"

[[dialogue]]
speaker = "イクシリオン"
# 「実は、バレンタインフォームの力で、チョコも変身してしまうようで……」
line = "「実は、バレンタインフォームの力で、チョコも変身してしまうようで……」"

[[dialogue]]
speaker = "バレンタヒヒーン"
# 「バレンタヒヒーン！」
line = "「バレンタヒヒーン！」"

[[dialogue]]
speaker = "トワ先生"
# 「鳴いた！？　え、これ生きてるの！？　いや、生きてないよね！？」
line = "「鳴いた！？　え、これ生きてるの！？　いや、生きてないよね！？」"

[[dialogue]]
speaker = "バレンタヒヒーン"
# 「ブルブルブル……！」
line = "「ブルブルブル……！」"

[[dialogue]]
speaker = "トワ先生"
# 「馬みたいに首振ってるけど、どっち！？」
line = "「馬みたいに首振ってるけど、どっち！？」"

[[dialogue]]
speaker = "イクシリオン"
# 「自我はないので、勝手に暴れたりはしません。そこは安心して大丈夫かと……」
line = "「自我はないので、勝手に暴れたりはしません。そこは安心して大丈夫かと……」"

[[dialogue]]
speaker = "トワ先生"
# 「昨日はこれ、どう処理したの……？」
line = "「昨日はこれ、どう処理したの……？」"

[[dialogue]]
speaker = "イクシリオン"
# 「新星寮のみなさんと分けて、美味しくいただきました。味は大味でしたが……」
line = "「新星寮のみなさんと分けて、美味しくいただきました。味は大味でしたが……」"

[[dialogue]]
speaker = "トワ先生"
# 「そ、そうなんだ……でも、これを会長くんに渡すのは、ちょっと……あれだよね……」
line = "「そ、そうなんだ……でも、これを会長くんに渡すのは、ちょっと……あれだよね……」"

[[dialogue]]
speaker = "イクシリオン"
# 「はい……情緒に欠けるというか……」
line = "「はい……情緒に欠けるというか……」"

[[dialogue]]
speaker = "バレンタヒヒーン"
# 「バレンタヒヒーン！」
line = "「バレンタヒヒーン！」"

[[dialogue]]
speaker = "unk"
# こうして、状況を確認したあと、予定通りトワもチョコ作りを手伝うことになった。
line = "こうして、状況を確認したあと、予定通りトワもチョコ作りを手伝うことになった。"

[[dialogue]]
speaker = "unk"
# （※ちなみに、バレンタヒヒーンは後で、新星寮のみなさんで美味しく頂きました）
line = "（※ちなみに、バレンタヒヒーンは後で、新星寮のみなさんで美味しく頂きました）"

[[dialogue]]
speaker = "トワ先生"
# 「私、チョコを作るのは久しぶりなんだけど、作り方は今のところ大丈夫そうかな？」
line = "「私、チョコを作るのは久しぶりなんだけど、作り方は今のところ大丈夫そうかな？」"

[[dialogue]]
speaker = "イクシリオン"
# 「はい。先生の手際がスムーズなので、順調ですよ」
line = "「はい。先生の手際がスムーズなので、順調ですよ」"

[[dialogue]]
speaker = "トワ先生"
# （チョコ作りか……学生時代は友チョコしか作ったことなかったな。これまで男の子に作ったことはなくて……）
line = "（チョコ作りか……学生時代は友チョコしか作ったことなかったな。これまで男の子に作ったことはなくて……）"

[[dialogue]]
speaker = "トワ先生"
# （もしも私がバレンタインチョコを渡すなら、その相手は……）
line = "（もしも私がバレンタインチョコを渡すなら、その相手は……）"

[[dialogue]]
speaker = "トワ先生"
# （――って、いやいや、私、なに考えてるの！？　会長くんは生徒だし、ウェディングフォームの時は善意で協力してくれただけであって……！）
line = "（――って、いやいや、私、なに考えてるの！？　会長くんは生徒だし、ウェディングフォームの時は善意で協力してくれただけであって……！）"

[[dialogue]]
speaker = "イクシリオン"
# 「え？　これは……！？　急にバレンタインフォームが光り出して……！」
line = "「え？　これは……！？　急にバレンタインフォームが光り出して……！」"

[[dialogue]]
speaker = "トワ先生"
# 「なっ……！？」
line = "「なっ……！？」"

[[dialogue]]
speaker = "イクシリオン"
# 「トワ先生、衣装が……！」
line = "「トワ先生、衣装が……！」"

[[dialogue]]
speaker = "トワ先生"
# 「先生も、バレンタインフォームに変身しちゃった……！？」
line = "「先生も、バレンタインフォームに変身しちゃった……！？」"

[[dialogue]]
speaker = "unk"
# イクシリオンに共鳴するように、トワも突然変身してしまうのだった。
line = "イクシリオンに共鳴するように、トワも突然変身してしまうのだった。"
