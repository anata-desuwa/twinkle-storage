[[dialogue]]
speaker = "unk"
# 第１３話,理事会再び,B
line = "第１３話,理事会再び,B"

[[dialogue]]
speaker = "unk"
# 緋宮クロトが平行世界に関する演説を行い、信任選挙を発表して３日が経過した。
line = "緋宮クロトが平行世界に関する演説を行い、信任選挙を発表して３日が経過した。"

[[dialogue]]
speaker = "unk"
# その日、新星学園の会議室では、再び理事会が行われていた。
line = "その日、新星学園の会議室では、再び理事会が行われていた。"

[[dialogue]]
speaker = "シノ"
# 「先日は到着が遅くなってしまって申し訳ありませんでした。九浄ヘレナさんからご紹介いただきました、十六夜シノです」
line = "「先日は到着が遅くなってしまって申し訳ありませんでした。九浄ヘレナさんからご紹介いただきました、十六夜シノです」"

[[dialogue]]
speaker = "理事Ａ"
# 「こんなにお若い人が学園長候補……？」
line = "「こんなにお若い人が学園長候補……？」"

[[dialogue]]
speaker = "理事Ｂ"
# 「いや、どこかで見た覚えが……確か学生社長と呼ばれていた……」
line = "「いや、どこかで見た覚えが……確か学生社長と呼ばれていた……」"

[[dialogue]]
speaker = "unk"
# 予想外に若い学園長候補に驚きと戸惑いを見せる理事たち。
line = "予想外に若い学園長候補に驚きと戸惑いを見せる理事たち。"

[[dialogue]]
speaker = "unk"
# だが煌嶺は、むしろ愉快そうに笑う。
line = "だが煌嶺は、むしろ愉快そうに笑う。"

[[dialogue]]
speaker = "煌嶺"
# 「フッ……若さなら妾と変わらぬであろう？　気にする必要あるまい」
line = "「フッ……若さなら妾と変わらぬであろう？　気にする必要あるまい」"

[[dialogue]]
speaker = "煌嶺"
# 「ま、流星の騎士と謳われたセイファートの後釜としては意外ではあるがな」
line = "「ま、流星の騎士と謳われたセイファートの後釜としては意外ではあるがな」"

[[dialogue]]
speaker = "ヘレナ"
# 「なに、有能さは私が保証する。問題は微塵もないと断言しよう」
line = "「なに、有能さは私が保証する。問題は微塵もないと断言しよう」"

[[dialogue]]
speaker = "unk"
# 学園長候補は、この場にいる煌嶺と十六夜シノに絞られた。
line = "学園長候補は、この場にいる煌嶺と十六夜シノに絞られた。"

[[dialogue]]
speaker = "unk"
# どちらが就任しても、流星・新星両校の歴史を通して最年少の学園長となる。
line = "どちらが就任しても、流星・新星両校の歴史を通して最年少の学園長となる。"

[[dialogue]]
speaker = "煌嶺"
# 「さて、妾の主張は変わらぬ。アルタイルを守るためなら、平行世界も滅ぼしてみせようぞ」
line = "「さて、妾の主張は変わらぬ。アルタイルを守るためなら、平行世界も滅ぼしてみせようぞ」"

[[dialogue]]
speaker = "unk"
# 理事の顔を１人１人見渡し、ほくそ笑んでみせる煌嶺。
line = "理事の顔を１人１人見渡し、ほくそ笑んでみせる煌嶺。"

[[dialogue]]
speaker = "unk"
# 極星学園に宣戦布告された現在、理事が求める学園長像とは、煌嶺のような争いを厭わない強者だった。
line = "極星学園に宣戦布告された現在、理事が求める学園長像とは、煌嶺のような争いを厭わない強者だった。"

[[dialogue]]
speaker = "シノ"
# 「現会長の緋宮クロトさんは、デネブを滅ぼす気はないと仰っていますが……それでもですか？」
line = "「現会長の緋宮クロトさんは、デネブを滅ぼす気はないと仰っていますが……それでもですか？」"

[[dialogue]]
speaker = "煌嶺"
# 「だからどうした。星騎士は敵と戦う剣。臆病者は錆びた鈍らにも劣る」
line = "「だからどうした。星騎士は敵と戦う剣。臆病者は錆びた鈍らにも劣る」"

[[dialogue]]
speaker = "シノ"
# 「ふむ、なるほど。緋宮会長が信任されても、彼を尊重するつもりはないと……そう仰るのですね」
line = "「ふむ、なるほど。緋宮会長が信任されても、彼を尊重するつもりはないと……そう仰るのですね」"

[[dialogue]]
speaker = "unk"
# 会議室のテーブルを挟んで対峙する煌嶺とシノ。
line = "会議室のテーブルを挟んで対峙する煌嶺とシノ。"

[[dialogue]]
speaker = "unk"
# 天才社長と呼ばれたシノとはいえ、存在感は煌嶺が圧倒的に格上だが……シノに臆する様子はない。
line = "天才社長と呼ばれたシノとはいえ、存在感は煌嶺が圧倒的に格上だが……シノに臆する様子はない。"

[[dialogue]]
speaker = "シノ"
# 「煌嶺殿のお考えは理解しました。では私も主張を述べさせていただきます」
line = "「煌嶺殿のお考えは理解しました。では私も主張を述べさせていただきます」"

[[dialogue]]
speaker = "unk"
# シノが理事たちに向き直る。
line = "シノが理事たちに向き直る。"

[[dialogue]]
speaker = "unk"
# 学園長は理事たちの投票で決まるもの。相手は煌嶺だけではない。
line = "学園長は理事たちの投票で決まるもの。相手は煌嶺だけではない。"

[[dialogue]]
speaker = "シノ"
# 「まず私は、極星学園の香堂チナ──彼女の言葉に疑いを持っています」
line = "「まず私は、極星学園の香堂チナ──彼女の言葉に疑いを持っています」"

[[dialogue]]
speaker = "シノ"
# 「前学園長ジェラルド・セイファートは、黒騎士として九浄ヴィーナスを魔界に連れ去り、殺害しようとしました。言うまでもなく、許されない裏切りです」
line = "「前学園長ジェラルド・セイファートは、黒騎士として九浄ヴィーナスを魔界に連れ去り、殺害しようとしました。言うまでもなく、許されない裏切りです」"

[[dialogue]]
speaker = "シノ"
# 「ですが得られたものもあります」
line = "「ですが得られたものもあります」"

[[dialogue]]
speaker = "シノ"
# 「星徒会の報告によれば、彼が目指していたのは全ての平行世界を含めたリセットでした」
line = "「星徒会の報告によれば、彼が目指していたのは全ての平行世界を含めたリセットでした」"

[[dialogue]]
speaker = "シノ"
# 「他の世界を滅ぼすことで生き残れるという、香堂チナの言葉とは矛盾します」
line = "「他の世界を滅ぼすことで生き残れるという、香堂チナの言葉とは矛盾します」"

[[dialogue]]
speaker = "煌嶺"
# 「裏切り者の言葉を信じるのか？」
line = "「裏切り者の言葉を信じるのか？」"

[[dialogue]]
speaker = "シノ"
# 「確かに彼は我々を<ruby=たばか>謀</ruby>っていましたが、その時セイファート前学園長は星徒会と対峙し、彼らを抹殺しようとしていました。あえて嘘をついたとは思えません」
line = "「確かに彼は我々を<ruby>謀<rt>たばか</rt></ruby>っていましたが、その時セイファート前学園長は星徒会と対峙し、彼らを抹殺しようとしていました。あえて嘘をついたとは思えません」"

[[dialogue]]
speaker = "シノ"
# 「それに敵の言葉が信用できないとなれば、香堂チナについても同じこと。両者とも確実性に欠けると言わざるを得ないでしょう」
line = "「それに敵の言葉が信用できないとなれば、香堂チナについても同じこと。両者とも確実性に欠けると言わざるを得ないでしょう」"

[[dialogue]]
speaker = "シノ"
# 「また、理事会や学園長が生徒を従わせる、という指揮系統にも疑問を抱いています」
line = "「また、理事会や学園長が生徒を従わせる、という指揮系統にも疑問を抱いています」"

[[dialogue]]
speaker = "シノ"
# 「今までリクリエとの戦いで前線に立ってきたのは、生徒である星騎士たちです」
line = "「今までリクリエとの戦いで前線に立ってきたのは、生徒である星騎士たちです」"

[[dialogue]]
speaker = "シノ"
# 「緋宮会長をはじめとする星徒会が、今まで知られていなかった秘密を解き明かし、戦うべき敵を見定め、そして勝利してきました」
line = "「緋宮会長をはじめとする星徒会が、今まで知られていなかった秘密を解き明かし、戦うべき敵を見定め、そして勝利してきました」"

[[dialogue]]
speaker = "シノ"
# 「フィヴォス流星群の時、世界を守れたのは彼らの奮闘あってこそ。学園組織や理事たちの貢献は大きくありません」
line = "「フィヴォス流星群の時、世界を守れたのは彼らの奮闘あってこそ。学園組織や理事たちの貢献は大きくありません」"

[[dialogue]]
speaker = "シノ"
# 「そんな微力な大人たちが、どうして星騎士たちに道を指し示せるのでしょう。今更、私たちが彼らを導く余地などないのです」
line = "「そんな微力な大人たちが、どうして星騎士たちに道を指し示せるのでしょう。今更、私たちが彼らを導く余地などないのです」"

[[dialogue]]
speaker = "理事Ｂ"
# 「確かに今まで世界を救ってきたのは、緋宮会長たちだ。だが常にそうであるとは限らない。選択を誤ることもある」
line = "「確かに今まで世界を救ってきたのは、緋宮会長たちだ。だが常にそうであるとは限らない。選択を誤ることもある」"

[[dialogue]]
speaker = "理事Ｂ"
# 「そういう時こそ、責任ある大人が道を正す必要があるのではないかね」
line = "「そういう時こそ、責任ある大人が道を正す必要があるのではないかね」"

[[dialogue]]
speaker = "シノ"
# 「もちろんそういうお考えも理解できます」
line = "「もちろんそういうお考えも理解できます」"

[[dialogue]]
speaker = "シノ"
# 「ですが一般に、現場を知らない上層部がしゃしゃり出てきたら……組織としてはいい予感がしませんよね」
line = "「ですが一般に、現場を知らない上層部がしゃしゃり出てきたら……組織としてはいい予感がしませんよね」"

[[dialogue]]
speaker = "理事Ｂ"
# 「ぅ…………」
line = "「ぅ…………」"

[[dialogue]]
speaker = "煌嶺"
# 「ククッ……」
line = "「ククッ……」"

[[dialogue]]
speaker = "unk"
# 気まずそうに沈黙する理事の横で、煌嶺がおかしさをこらえるように笑う。
line = "気まずそうに沈黙する理事の横で、煌嶺がおかしさをこらえるように笑う。"

[[dialogue]]
speaker = "unk"
# 絶大な戦闘力を持ち、自身が戦いの場に立つ煌嶺としても、最前線を知らずに上から指図しようとする理事は滑稽に見えたのかもしれない。
line = "絶大な戦闘力を持ち、自身が戦いの場に立つ煌嶺としても、最前線を知らずに上から指図しようとする理事は滑稽に見えたのかもしれない。"

[[dialogue]]
speaker = "シノ"
# 「それに──」
line = "「それに──」"

[[dialogue]]
speaker = "シノ"
# 「個人的な事情はあれど、多くの星騎士たちは純粋に世界を守るために、この新星学園に集ってきました」
line = "「個人的な事情はあれど、多くの星騎士たちは純粋に世界を守るために、この新星学園に集ってきました」"

[[dialogue]]
speaker = "シノ"
# 「そんな彼らに『他の世界を滅ぼすための戦い』ができるでしょうか？」
line = "「そんな彼らに『他の世界を滅ぼすための戦い』ができるでしょうか？」"

[[dialogue]]
speaker = "煌嶺"
# 「ぬるいことを言うのだな。それでも１つの組織を束ねる長になろうとする者の言葉か」
line = "「ぬるいことを言うのだな。それでも１つの組織を束ねる長になろうとする者の言葉か」"

[[dialogue]]
speaker = "煌嶺"
# 「アルタイルを守るために、デネブを滅ぼす。それも世界を守る戦いであろう。何を躊躇する必要がある」
line = "「アルタイルを守るために、デネブを滅ぼす。それも世界を守る戦いであろう。何を躊躇する必要がある」"

[[dialogue]]
speaker = "煌嶺"
# 「星騎士は剣だ。力だ。戦えなければ意味がない。強くなければ価値がない」
line = "「星騎士は剣だ。力だ。戦えなければ意味がない。強くなければ価値がない」"

[[dialogue]]
speaker = "煌嶺"
# 「妾が学園長になった暁には、星騎士たちをより強く、より鋭い刃にしてみせよう。妾の力を与え、技を鍛え、何者にも負けぬ剣にしてやろうではないか」
line = "「妾が学園長になった暁には、星騎士たちをより強く、より鋭い刃にしてみせよう。妾の力を与え、技を鍛え、何者にも負けぬ剣にしてやろうではないか」"

[[dialogue]]
speaker = "シノ"
# 「つまり煌嶺殿が星騎士に求めるものは、力であると？」
line = "「つまり煌嶺殿が星騎士に求めるものは、力であると？」"

[[dialogue]]
speaker = "煌嶺"
# 「そうだ。妾は強く、美しく、烈しい者を愛する」
line = "「そうだ。妾は強く、美しく、烈しい者を愛する」"

[[dialogue]]
speaker = "シノ"
# 「ふむ……」
line = "「ふむ……」"

[[dialogue]]
speaker = "unk"
# 煌嶺の言葉に、一瞬思案するそぶりを見せるシノ。
line = "煌嶺の言葉に、一瞬思案するそぶりを見せるシノ。"

[[dialogue]]
speaker = "unk"
# だが彼女は煌嶺に賛意を示すことはなかった。
line = "だが彼女は煌嶺に賛意を示すことはなかった。"

[[dialogue]]
speaker = "シノ"
# 「煌嶺殿にとって、星騎士たちは己の欲望を実現するための力、兵器なのでしょう」
line = "「煌嶺殿にとって、星騎士たちは己の欲望を実現するための力、兵器なのでしょう」"

[[dialogue]]
speaker = "シノ"
# 「しかし星騎士たちは兵器ではありません。効率的な生産もできず、才能によって強さにばらつきがあり、精神もまだ未熟な若者に過ぎない……兵器としては失格です」
line = "「しかし星騎士たちは兵器ではありません。効率的な生産もできず、才能によって強さにばらつきがあり、精神もまだ未熟な若者に過ぎない……兵器としては失格です」"

[[dialogue]]
speaker = "シノ"
# 「ですが彼らは兵器でないからこそ──強いのです」
line = "「ですが彼らは兵器でないからこそ──強いのです」"

[[dialogue]]
speaker = "シノ"
# 「一部の星騎士だけが変身できる、ノヴァフォームをご存じでしょうか。激しい星力の消耗の代わりに、普段とは比べ物にならない力を得られる形態です」
line = "「一部の星騎士だけが変身できる、ノヴァフォームをご存じでしょうか。激しい星力の消耗の代わりに、普段とは比べ物にならない力を得られる形態です」"

[[dialogue]]
speaker = "シノ"
# 「強力な機械型モンスターや極星従騎に対抗することも可能で、しかしノヴァフォームに至るには覚醒のきっかけが必要だそうです」
line = "「強力な機械型モンスターや極星従騎に対抗することも可能で、しかしノヴァフォームに至るには覚醒のきっかけが必要だそうです」"

[[dialogue]]
speaker = "シノ"
# 「そして私はノヴァフォームを体得した１人である、現星徒会書記の詠野マトイさんにお話を聞きました」
line = "「そして私はノヴァフォームを体得した１人である、現星徒会書記の詠野マトイさんにお話を聞きました」"

[[dialogue]]
speaker = "シノ"
# 「『当たり前の日常を守りたい』『みんなの普通を守りたい』──そう強く思ったことが、覚醒のきっかけだったそうです」
line = "「『当たり前の日常を守りたい』『みんなの普通を守りたい』──そう強く思ったことが、覚醒のきっかけだったそうです」"

[[dialogue]]
speaker = "シノ"
# 「星騎士は兵器ではありません。だからこそ、その想い次第で強くなれます。ならば想いによっては弱くなることもあるでしょう」
line = "「星騎士は兵器ではありません。だからこそ、その想い次第で強くなれます。ならば想いによっては弱くなることもあるでしょう」"

[[dialogue]]
speaker = "シノ"
# 「大事なものを守るための戦い──それが『他の世界を滅ぼす戦い』に変わった時、彼らの想いと強さにどんな影響をもたらすか」
line = "「大事なものを守るための戦い──それが『他の世界を滅ぼす戦い』に変わった時、彼らの想いと強さにどんな影響をもたらすか」"

[[dialogue]]
speaker = "シノ"
# 「弱くなることはあれど、強くなることはないでしょう。モンスターやアステラに対する防衛力が低下することも十分考えられます」
line = "「弱くなることはあれど、強くなることはないでしょう。モンスターやアステラに対する防衛力が低下することも十分考えられます」"

[[dialogue]]
speaker = "シノ"
# 「角を矯めて牛を殺す──アルタイルを守るためにデネブとの戦いを選び、その結果、アルタイルを危険にさらすことになれば本末転倒です」
line = "「角を矯めて牛を殺す──アルタイルを守るためにデネブとの戦いを選び、その結果、アルタイルを危険にさらすことになれば本末転倒です」"

[[dialogue]]
speaker = "unk"
# シノは落ち着いた声で、淀みなく流れる川のように、自分の主張を述べる。
line = "シノは落ち着いた声で、淀みなく流れる川のように、自分の主張を述べる。"

[[dialogue]]
speaker = "unk"
# 理事たちはいつの間にか、耳を澄ませて彼女の言葉に耳を傾けていた。
line = "理事たちはいつの間にか、耳を澄ませて彼女の言葉に耳を傾けていた。"

[[dialogue]]
speaker = "シノ"
# 「ところで煌嶺殿。確認ですが、あなたはデネブを滅ぼすことでアルタイルを守ろうというお考えなのですよね？」
line = "「ところで煌嶺殿。確認ですが、あなたはデネブを滅ぼすことでアルタイルを守ろうというお考えなのですよね？」"

[[dialogue]]
speaker = "煌嶺"
# 「それがどうした？　強いものが生き残る──それが世の摂理であろう？」
line = "「それがどうした？　強いものが生き残る──それが世の摂理であろう？」"

[[dialogue]]
speaker = "シノ"
# 「いいえ、キュリオスの女帝は欲深いとお聞きしていましたが、思いのほか理想が低いのだなと思いまして」
line = "「いいえ、キュリオスの女帝は欲深いとお聞きしていましたが、思いのほか理想が低いのだなと思いまして」"

[[dialogue]]
speaker = "煌嶺"
# 「何……？」
line = "「何……？」"

[[dialogue]]
speaker = "unk"
# シノが突然放った挑発的な言葉に、初めて煌嶺の笑みが揺らいだ。
line = "シノが突然放った挑発的な言葉に、初めて煌嶺の笑みが揺らいだ。"

