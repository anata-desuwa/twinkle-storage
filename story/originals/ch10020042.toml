[[dialogue]]
speaker = "unk"
# 第２話,妹が増える日,P
line = "第２話,妹が増える日,P"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「ねぇねぇソフィ、どの呼び方がいいかしら～♪　お姉ちゃんに教えて～<emoji=heart04>」
line = "「ねぇねぇソフィ、どの呼び方がいいかしら～♪　お姉ちゃんに教えて～<emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
# 「どれがいいか、と言われても……」
line = "「どれがいいか、と言われても……」"

[[dialogue]]
speaker = "unk"
# やあ、２人とも
line = "やあ、２人とも"

[[dialogue]]
speaker = "ソフィア"
# 「あっ、会長さん。助けてください。姉さんがおかしくなってしまいました」
line = "「あっ、会長さん。助けてください。姉さんがおかしくなってしまいました」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「ひど～い！　お姉ちゃんは真面目にお話しているのに～……」
line = "「ひど～い！　お姉ちゃんは真面目にお話しているのに～……」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「でも会長くんにも関係のある話だし、丁度いいタイミングかもしれないわね～♪」
line = "「でも会長くんにも関係のある話だし、丁度いいタイミングかもしれないわね～♪」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「ねぇ会長くん、そろそろ新しい妹が欲しくないかしら～？」
line = "「ねぇ会長くん、そろそろ新しい妹が欲しくないかしら～？」"

[[dialogue]]
speaker = "unk"
# どういうことです！？
line = "どういうことです！？"

[[dialogue]]
speaker = "ソフィア"
# 「なんでも先日、会長さんのお母様──リノさんから『私のことはお義母さんって呼んでいいのよ』と姉さんが言われたらしく……」
line = "「なんでも先日、会長さんのお母様──リノさんから『私のことはお義母さんって呼んでいいのよ』と姉さんが言われたらしく……」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「そうなの～。最近よく会長くんのお家にお邪魔してるんだけど、本当の娘みたいに接してくれててね～<emoji=heart04>」
line = "「そうなの～。最近よく会長くんのお家にお邪魔してるんだけど、本当の娘みたいに接してくれててね～<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「だからお姉ちゃん、この幸せな気持ちを会長くんにもお返ししたいな～って思って……」
line = "「だからお姉ちゃん、この幸せな気持ちを会長くんにもお返ししたいな～って思って……」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「私が切れる最強のカードはもちろん、可愛い可愛い妹のソフィでしょう？」
line = "「私が切れる最強のカードはもちろん、可愛い可愛い妹のソフィでしょう？」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「名付けて、会長くんにとっても愛らしい妹を増やしてあげよう計画～<emoji=heart04>」
line = "「名付けて、会長くんにとっても愛らしい妹を増やしてあげよう計画～<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# な、なるほど……？
line = "な、なるほど……？"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「だからソフィに、会長くんの妹になったら、どういう風に呼んでみたい？　って聞いてたの～」
line = "「だからソフィに、会長くんの妹になったら、どういう風に呼んでみたい？　って聞いてたの～」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「王道に『お兄ちゃん』？　敬意を込めて『お兄様』？　ちょっと変化球で『にぃに』って呼ぶのもありかもね～って♪」
line = "「王道に『お兄ちゃん』？　敬意を込めて『お兄様』？　ちょっと変化球で『にぃに』って呼ぶのもありかもね～って♪」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「それなのに、ソフィの反応が芳しくなくって～……」
line = "「それなのに、ソフィの反応が芳しくなくって～……」"

[[dialogue]]
speaker = "ソフィア"
# 「姉さんはいつでも急におかしなことを思いつくんですから困ります」
line = "「姉さんはいつでも急におかしなことを思いつくんですから困ります」"

[[dialogue]]
speaker = "ソフィア"
# 「会長さんからも言ってあげてください。いくら恋人の妹だからって、いきなり『お兄ちゃん』なんて呼ばれたら驚きますよね？」
line = "「会長さんからも言ってあげてください。いくら恋人の妹だからって、いきなり『お兄ちゃん』なんて呼ばれたら驚きますよね？」"

[[dialogue]]
speaker = "unk"
# もう妹はいっぱいいるし
line = "もう妹はいっぱいいるし"

[[dialogue]]
speaker = "unk"
# そんなことはないよ？
line = "そんなことはないよ？"

[[dialogue]]
speaker = "ソフィア"
# 「……そうでした。変わり者の姉さんとお付き合いしてるんですから、会長さんもちょっぴり変わっているんでした。まともなのは私だけですか……」
line = "「……そうでした。変わり者の姉さんとお付き合いしてるんですから、会長さんもちょっぴり変わっているんでした。まともなのは私だけですか……」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「も～。そんなにおかしいことじゃないでしょ～？」
line = "「も～。そんなにおかしいことじゃないでしょ～？」"

[[dialogue]]
speaker = "ソフィア"
# 「気が早いと言ってるんです。婚約しているならまだしも……」
line = "「気が早いと言ってるんです。婚約しているならまだしも……」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「え～、でもでも、このまま学園を卒業したら、そういう未来もあるかもしれないでしょう？」
line = "「え～、でもでも、このまま学園を卒業したら、そういう未来もあるかもしれないでしょう？」"

[[dialogue]]
speaker = "ソフィア"
# 「なら、そういう未来になってから話せばいいことだと思います」
line = "「なら、そういう未来になってから話せばいいことだと思います」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「そんな～。ソフィ、会長くんのこと、お兄ちゃんって呼ぶのは嫌なの～？」
line = "「そんな～。ソフィ、会長くんのこと、お兄ちゃんって呼ぶのは嫌なの～？」"

[[dialogue]]
speaker = "ソフィア"
# 「い、嫌だなんて言ってません。姉さんと同じくらい尊敬してますし、信頼していますよ」
line = "「い、嫌だなんて言ってません。姉さんと同じくらい尊敬してますし、信頼していますよ」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「ならいいじゃな～い♪　ほらほら、ソフィの好きな呼び方で、会長くんのこと呼んでみて～<emoji=heart04>」
line = "「ならいいじゃな～い♪　ほらほら、ソフィの好きな呼び方で、会長くんのこと呼んでみて～<emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
# 「う～……恥ずかしいと言っているだけなのに、どうして通じないんでしょうか……」
line = "「う～……恥ずかしいと言っているだけなのに、どうして通じないんでしょうか……」"

[[dialogue]]
speaker = "ソフィア"
# 「姉さんの奔放なところはもう諦めますが……御本人への確認も大切です。会長さんは、私が妹になったら嬉しいんですか？」
line = "「姉さんの奔放なところはもう諦めますが……御本人への確認も大切です。会長さんは、私が妹になったら嬉しいんですか？」"

[[dialogue]]
speaker = "unk"
# もちろん嬉しいよ！
line = "もちろん嬉しいよ！"

[[dialogue]]
speaker = "ソフィア"
# 「……はぁ、分かりました。それじゃあこれからは会長さんのこと……『兄さん』って呼びます」
line = "「……はぁ、分かりました。それじゃあこれからは会長さんのこと……『兄さん』って呼びます」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「きゃー♪　うふふ、これでも～っと仲良しになれたわね～♪」
line = "「きゃー♪　うふふ、これでも～っと仲良しになれたわね～♪」"

[[dialogue]]
speaker = "ソフィア"
# 「姉さんは単純なんですから……あ、そうですっ」
line = "「姉さんは単純なんですから……あ、そうですっ」"

[[dialogue]]
speaker = "ソフィア"
# 「それじゃあ早速、兄さんにお願いがあります。妹の頼みですし、もちろん聞いてくれますよね？」
line = "「それじゃあ早速、兄さんにお願いがあります。妹の頼みですし、もちろん聞いてくれますよね？」"

[[dialogue]]
speaker = "unk"
# ああ、もちろん
line = "ああ、もちろん"

[[dialogue]]
speaker = "ソフィア"
# 「では今後、学園内ではあまり姉さんと目立ってイチャイチャすることは避けてもらえると助かります！」
line = "「では今後、学園内ではあまり姉さんと目立ってイチャイチャすることは避けてもらえると助かります！」"

[[dialogue]]
speaker = "ソフィア"
# 「図書館で膝枕をしてたり、保健室で耳かきをしたり、手を繋いで夜の見回りをしていたり……」
line = "「図書館で膝枕をしてたり、保健室で耳かきをしたり、手を繋いで夜の見回りをしていたり……」"

[[dialogue]]
speaker = "ソフィア"
# 「バカップルなうわさ話が絶えないもので、妹として恥ずかしい限りなので」
line = "「バカップルなうわさ話が絶えないもので、妹として恥ずかしい限りなので」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「そんなぁ！？　これはもしかして、藪蛇だったかしら～……」
line = "「そんなぁ！？　これはもしかして、藪蛇だったかしら～……」"

[[dialogue]]
speaker = "unk"
# 善処します……
line = "善処します……"

[[dialogue]]
speaker = "ソフィア"
# 「はい、よろしくお願いしますね。兄さん♪」
line = "「はい、よろしくお願いしますね。兄さん♪」"

[[dialogue]]
speaker = "unk"
# そうして俺は、サーシャさんの提案によって新たにソフィアから『兄さん』と呼ばれるようになるのだった──
line = "そうして俺は、サーシャさんの提案によって新たにソフィアから『兄さん』と呼ばれるようになるのだった──"

[[dialogue]]
speaker = "unk"
# ──後日。奏ソフィアは１人、カフェでお茶を楽しんでいた。
line = "──後日。奏ソフィアは１人、カフェでお茶を楽しんでいた。"

[[dialogue]]
speaker = "ソフィア"
# 「会長さんが、兄さん……兄さん、ですか……」
line = "「会長さんが、兄さん……兄さん、ですか……」"

[[dialogue]]
speaker = "ソフィア"
# 「ふふっ……♪　自分で思っている以上に、嬉しいのかもしれません。姉さんにするみたいに、甘えちゃってもいいんでしょうか……♪」
line = "「ふふっ……♪　自分で思っている以上に、嬉しいのかもしれません。姉さんにするみたいに、甘えちゃってもいいんでしょうか……♪」"

[[dialogue]]
speaker = "ルルカ"
# 「あっ──見つけた！　ねぇねぇ、今ちょっといいかな！」
line = "「あっ──見つけた！　ねぇねぇ、今ちょっといいかな！」"

[[dialogue]]
speaker = "ソフィア"
# 「あ、新星学園の──んん？」
line = "「あ、新星学園の──んん？」"

[[dialogue]]
speaker = "ソフィア"
# （委員会も部活動も違う方々ですね……いったい何の集まりでしょうか？）
line = "（委員会も部活動も違う方々ですね……いったい何の集まりでしょうか？）"

[[dialogue]]
speaker = "ルルカ"
# 「何だか風の噂で、新しい妹が増えたって聞いてね！　ご挨拶に来たの！」
line = "「何だか風の噂で、新しい妹が増えたって聞いてね！　ご挨拶に来たの！」"

[[dialogue]]
speaker = "メイプル"
# 「ふっふっふ……まさか新たな『妹ライバル』が増えるとはな！　その挑戦、受けて立つ！！」
line = "「ふっふっふ……まさか新たな『妹ライバル』が増えるとはな！　その挑戦、受けて立つ！！」"

[[dialogue]]
speaker = "モナカ"
# 「モ、モナカは、みんなで仲良くできると嬉しいな……！」
line = "「モ、モナカは、みんなで仲良くできると嬉しいな……！」"

[[dialogue]]
speaker = "ソフィア"
# 「…………はい？」
line = "「…………はい？」"

[[dialogue]]
speaker = "unk"
# この後、学園内の妹グループとソフィアは仲良しになるのだが、それはまた別のお話──
line = "この後、学園内の妹グループとソフィアは仲良しになるのだが、それはまた別のお話──"
