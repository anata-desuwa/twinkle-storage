[[dialogue]]
speaker = "unk"
# 第１話,フィオナ会長の弱点？,P
line = "第１話,フィオナ会長の弱点？,P"

[[dialogue]]
speaker = "フィオナ"
# 「あ、こんにちは、緋宮会長。ちょうどお茶をしていたところなんですが、ご一緒されますか？」
line = "「あ、こんにちは、緋宮会長。ちょうどお茶をしていたところなんですが、ご一緒されますか？」"

[[dialogue]]
speaker = "フィオナ"
# 「ここは流星・新星両学園の生徒にとって憩いの場ですからね。ソイラテが人気ですが、カフェモカもお薦めですよ」
line = "「ここは流星・新星両学園の生徒にとって憩いの場ですからね。ソイラテが人気ですが、カフェモカもお薦めですよ」"

[[dialogue]]
speaker = "ソフィア"
# 「あ、フィオナ会長。この書類、星徒会室に持っていっておきますね」
line = "「あ、フィオナ会長。この書類、星徒会室に持っていっておきますね」"

[[dialogue]]
speaker = "フィオナ"
# 「それならここで見ちゃうよ。どれどれ……うん、オッケー。提出して大丈夫」
line = "「それならここで見ちゃうよ。どれどれ……うん、オッケー。提出して大丈夫」"

[[dialogue]]
speaker = "ソフィア"
# 「恐縮です」
line = "「恐縮です」"

[[dialogue]]
speaker = "フィオナ"
# 「せっかくだしソフィアもどう？」
line = "「せっかくだしソフィアもどう？」"

[[dialogue]]
speaker = "ソフィア"
# 「うぅ、残念ながら今日はフィギュアスケートの練習があるので……。失礼します」
line = "「うぅ、残念ながら今日はフィギュアスケートの練習があるので……。失礼します」"

[[dialogue]]
speaker = "フィオナ"
# 「そう。じゃあ練習頑張ってね。いつもありがとう」
line = "「そう。じゃあ練習頑張ってね。いつもありがとう」"

[[dialogue]]
speaker = "ソフィア"
# 「はいっ」
line = "「はいっ」"

[[dialogue]]
speaker = "unk"
# 頼れる会長だ……！
line = "頼れる会長だ……！"

[[dialogue]]
speaker = "フィオナ"
# 「流星学園と新星学園の星徒会は、生徒たちの先頭に立って戦うのが使命ですが、通常の星徒会業務も必要ですから」
line = "「流星学園と新星学園の星徒会は、生徒たちの先頭に立って戦うのが使命ですが、通常の星徒会業務も必要ですから」"

[[dialogue]]
speaker = "フィオナ"
# 「でもさっきのは、ソフィアがしっかりしているおかげですよ。頼もしい書記です」
line = "「でもさっきのは、ソフィアがしっかりしているおかげですよ。頼もしい書記です」"

[[dialogue]]
speaker = "フィオナ"
# 「緋宮会長こそ、新星学園に途中から編入するのは簡単なことではありません」
line = "「緋宮会長こそ、新星学園に途中から編入するのは簡単なことではありません」"

[[dialogue]]
speaker = "フィオナ"
# 「入学費用もアルバイトをしてご自分で用立てたと聞きました。そこまではなかなかできませんよ」
line = "「入学費用もアルバイトをしてご自分で用立てたと聞きました。そこまではなかなかできませんよ」"

[[dialogue]]
speaker = "フィオナ"
# 「しかし転入して早々星徒会長になったのですから大変でしょう。星徒会業務は大丈夫ですか？」
line = "「しかし転入して早々星徒会長になったのですから大変でしょう。星徒会業務は大丈夫ですか？」"

[[dialogue]]
speaker = "フィオナ"
# 「……ふふ、そのご様子だとやはり苦労もあるのですね。しかし先々代の会長であるサーシャさんもいるのですし、徐々に慣れていけばいいと思います」
line = "「……ふふ、そのご様子だとやはり苦労もあるのですね。しかし先々代の会長であるサーシャさんもいるのですし、徐々に慣れていけばいいと思います」"

[[dialogue]]
speaker = "フィオナ"
# 「！　残念ですがお茶の時間はここまで。アステラの反応です」
line = "「！　残念ですがお茶の時間はここまで。アステラの反応です」"

[[dialogue]]
speaker = "ユウリ"
# 「なんか……ずいぶんブクブクしたモンスターだな。リクリエももちっとセンス磨いてこいっての。センスとかあるのか知らねーが」
line = "「なんか……ずいぶんブクブクしたモンスターだな。リクリエももちっとセンス磨いてこいっての。センスとかあるのか知らねーが」"

[[dialogue]]
speaker = "ルリエル"
# 「なんというか、見ていると不安になる系です！」
line = "「なんというか、見ていると不安になる系です！」"

[[dialogue]]
speaker = "フィオナ"
# 「ルリエルは私たちに加護を。セーラさんは牽制をお願いします」
line = "「ルリエルは私たちに加護を。セーラさんは牽制をお願いします」"

[[dialogue]]
speaker = "ルリエル"
# 「かしこまりですっ！」
line = "「かしこまりですっ！」"

[[dialogue]]
speaker = "セーラ"
# 「いえっさ～。あれ、女の人にはマムだっけ？　ま、どっちでもいいか♪」
line = "「いえっさ～。あれ、女の人にはマムだっけ？　ま、どっちでもいいか♪」"

[[dialogue]]
speaker = "ニャリオン"
# 「ニャニャ！？　モンスターがこっち来たニャン！」
line = "「ニャニャ！？　モンスターがこっち来たニャン！」"

[[dialogue]]
speaker = "フィオナ"
# 「ユウリ！」
line = "「ユウリ！」"

[[dialogue]]
speaker = "ユウリ"
# 「へっ、ヤツらの攻撃なんて通さねーっての！」
line = "「へっ、ヤツらの攻撃なんて通さねーっての！」"

[[dialogue]]
speaker = "フィオナ"
# 「ここで決めましょう、緋宮会長」
line = "「ここで決めましょう、緋宮会長」"

[[dialogue]]
speaker = "unk"
# ああ！
line = "ああ！"

[[dialogue]]
speaker = "フィオナ"
# 「切り裂け！　アストラルエッジ！」
line = "「切り裂け！　アストラルエッジ！」"

[[dialogue]]
speaker = "ニャリオン"
# 「ニャニャニャ～♪　敵じゃニャかったニャン！」
line = "「ニャニャニャ～♪　敵じゃニャかったニャン！」"

[[dialogue]]
speaker = "ユウリ"
# 「アホ猫は役に立ってなかったけどな」
line = "「アホ猫は役に立ってなかったけどな」"

[[dialogue]]
speaker = "ニャリオン"
# 「うっさいニャ！」
line = "「うっさいニャ！」"

[[dialogue]]
speaker = "セーラ"
# 「いえ～ぃ、お疲れ～。新星の会長さんも活躍してたね」
line = "「いえ～ぃ、お疲れ～。新星の会長さんも活躍してたね」"

[[dialogue]]
speaker = "フィオナ"
# 「みんなお疲れさま。今日はこのまま解散で大丈夫だよ」
line = "「みんなお疲れさま。今日はこのまま解散で大丈夫だよ」"

[[dialogue]]
speaker = "ルリエル"
# 「ラジャーですっ」
line = "「ラジャーですっ」"

[[dialogue]]
speaker = "フィオナ"
# 「緋宮会長もお疲れ様でした。小規模なうちに対処できて良かったです」
line = "「緋宮会長もお疲れ様でした。小規模なうちに対処できて良かったです」"

[[dialogue]]
speaker = "unk"
# フィオナはすごい先輩だ
line = "フィオナはすごい先輩だ"

[[dialogue]]
speaker = "フィオナ"
# 「先輩？　……ああ、なるほど。星騎士としても、会長としても、私の方が先でしたからね」
line = "「先輩？　……ああ、なるほど。星騎士としても、会長としても、私の方が先でしたからね」"

[[dialogue]]
speaker = "フィオナ"
# 「ですが私も責務を果たすために励む日々です。張り合うわけではありませんが、お互い会長として頑張っていきましょうね」
line = "「ですが私も責務を果たすために励む日々です。張り合うわけではありませんが、お互い会長として頑張っていきましょうね」"

[[dialogue]]
speaker = "フィオナ"
# 「たとえどんな敵が現れても……今日みたいなかわいいモンスターが相手でも全力で──」
line = "「たとえどんな敵が現れても……今日みたいなかわいいモンスターが相手でも全力で──」"

[[dialogue]]
speaker = "フィオナ"
# 「……あれ、そんな驚いた顔をされてどうしたんですか？」
line = "「……あれ、そんな驚いた顔をされてどうしたんですか？」"

[[dialogue]]
speaker = "フィオナ"
# 「さっきのモンスター、かわいくなかったですか？　こう……丸々としていて、目とか出っ張り気味で、ブヨブヨで愛嬌があるというか」
line = "「さっきのモンスター、かわいくなかったですか？　こう……丸々としていて、目とか出っ張り気味で、ブヨブヨで愛嬌があるというか」"

[[dialogue]]
speaker = "ニャリオン"
# 「フィオナ嬢はかわいいのストライクゾーンが広いのニャ」
line = "「フィオナ嬢はかわいいのストライクゾーンが広いのニャ」"

[[dialogue]]
speaker = "ニャリオン"
# 「具体的に言うと、ちょっとでも丸っこいものは、グロかろうとキモかろうとほぼ１００パーかわいいに入るニャン」
line = "「具体的に言うと、ちょっとでも丸っこいものは、グロかろうとキモかろうとほぼ１００パーかわいいに入るニャン」"

[[dialogue]]
speaker = "unk"
# ガバガバだ……！
line = "ガバガバだ……！"

[[dialogue]]
speaker = "フィオナ"
# 「何を驚いているんですか？　緋宮会長？　緋宮会長～？」
line = "「何を驚いているんですか？　緋宮会長？　緋宮会長～？」"
