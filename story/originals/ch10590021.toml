[[dialogue]]
speaker = "unk"
# 第１話,カイチョーとクリスマス,P
line = "第１話,カイチョーとクリスマス,P"

[[dialogue]]
speaker = "リップル"
# 「ラッシャッセー！」
line = "「ラッシャッセー！」"

[[dialogue]]
speaker = "モネ"
# 「い、いらっしゃいませー……」
line = "「い、いらっしゃいませー……」"

[[dialogue]]
speaker = "リップル"
# 「ヨウコソ！　リゾート結界・クリスマスバージョンです！」
line = "「ヨウコソ！　リゾート結界・クリスマスバージョンです！」"

[[dialogue]]
speaker = "リップル"
# 「今までは夏しかリゾート結界を調整デキませんでしたが、チョットなら変えられるようにナリました♪」
line = "「今までは夏しかリゾート結界を調整デキませんでしたが、チョットなら変えられるようにナリました♪」"

[[dialogue]]
speaker = "リップル"
# 「大きなチェンジはデキませんが、クリスマスらしくスルくらいならヨユーでーす！」
line = "「大きなチェンジはデキませんが、クリスマスらしくスルくらいならヨユーでーす！」"

[[dialogue]]
speaker = "モネ"
# 「元々リップルさんが持っていた力は、季節とは関係のないものなのかもしれません。それをリップルさんの思い入れの強い“夏”と結びつけることで制御していたのかと」
line = "「元々リップルさんが持っていた力は、季節とは関係のないものなのかもしれません。それをリップルさんの思い入れの強い“夏”と結びつけることで制御していたのかと」"

[[dialogue]]
speaker = "モネ"
# 「それが、リップルさんの成長に伴ってより細かいコントロールが可能になった……とか？」
line = "「それが、リップルさんの成長に伴ってより細かいコントロールが可能になった……とか？」"

[[dialogue]]
speaker = "モネ"
# 「このままいくと、季節関係なくリゾート結界を自在に操れるようになるかもしれません」
line = "「このままいくと、季節関係なくリゾート結界を自在に操れるようになるかもしれません」"

[[dialogue]]
speaker = "unk"
# （それはそれでちょっと不安かも……）
line = "（それはそれでちょっと不安かも……）"

[[dialogue]]
speaker = "リップル"
# 「カイチョー？　モネ？　ドウしましたか？」
line = "「カイチョー？　モネ？　ドウしましたか？」"

[[dialogue]]
speaker = "モネ"
# 「あ、いえ、なんでもないですっ」
line = "「あ、いえ、なんでもないですっ」"

[[dialogue]]
speaker = "モネ"
# （リップルさんに悪気はないので、私と会長とで見守っていきましょう）
line = "（リップルさんに悪気はないので、私と会長とで見守っていきましょう）"

[[dialogue]]
speaker = "モネ"
# （だけどこの前は、海が苦手な私と本のために結界を調整してくれました。私たちが想像しているような最悪の事態にはならないと思いますよ）
line = "（だけどこの前は、海が苦手な私と本のために結界を調整してくれました。私たちが想像しているような最悪の事態にはならないと思いますよ）"

[[dialogue]]
speaker = "unk"
# ……うん、そうだね
line = "……うん、そうだね"

[[dialogue]]
speaker = "リップル"
# 「ソシテ！　ワタシとモネもクリスマスバージョンです！　ミテください、カイチョー！」
line = "「ソシテ！　ワタシとモネもクリスマスバージョンです！　ミテください、カイチョー！」"

[[dialogue]]
speaker = "リップル"
# 「フフーン♪　ドウですか？」
line = "「フフーン♪　ドウですか？」"

[[dialogue]]
speaker = "unk"
# サンタ……というよりプレゼント？
line = "サンタ……というよりプレゼント？"

[[dialogue]]
speaker = "リップル"
# 「ハイ！　サンタといえばプレゼント……というコトで、ワタシがプレゼントにナリました！」
line = "「ハイ！　サンタといえばプレゼント……というコトで、ワタシがプレゼントにナリました！」"

[[dialogue]]
speaker = "unk"
# （露出がすごいけど）とってもカワイイ！
line = "（露出がすごいけど）とってもカワイイ！"

[[dialogue]]
speaker = "リップル"
# 「デスよね～♪　ワタシもオキニイリです！」
line = "「デスよね～♪　ワタシもオキニイリです！」"

[[dialogue]]
speaker = "リップル"
# 「カイチョーにワタシをプレゼントでーす！　ギュ～っとハグしちゃいまーす！」
line = "「カイチョーにワタシをプレゼントでーす！　ギュ～っとハグしちゃいまーす！」"

[[dialogue]]
speaker = "モネ"
# 「わわ、ほとんど裸なのにそんなに密着したら……」
line = "「わわ、ほとんど裸なのにそんなに密着したら……」"

[[dialogue]]
speaker = "リップル"
# 「キスもプレゼントしちゃいまーす♪　ホッペタに……ちゅっ<emoji=heart04>」
line = "「キスもプレゼントしちゃいまーす♪　ホッペタに……ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "モネ"
# 「リップルさん、大胆……！？」
line = "「リップルさん、大胆……！？」"

[[dialogue]]
speaker = "モネ"
# 「あっ、会長が真っ赤になってますっ！？　リップルさん、一旦ストップです！」
line = "「あっ、会長が真っ赤になってますっ！？　リップルさん、一旦ストップです！」"

[[dialogue]]
speaker = "リップル"
# 「アレ？　結界の中、暑かったデスか？　温度チョウセイしましょうか？」
line = "「アレ？　結界の中、暑かったデスか？　温度チョウセイしましょうか？」"

[[dialogue]]
speaker = "モネ"
# 「そういうことじゃないです……」
line = "「そういうことじゃないです……」"

[[dialogue]]
speaker = "unk"
# （理性がどうにかなりそうだった……）
line = "（理性がどうにかなりそうだった……）"

[[dialogue]]
speaker = "リップル"
# 「カイチョー、モネの水着もカワイイから見てアゲテください！」
line = "「カイチョー、モネの水着もカワイイから見てアゲテください！」"

[[dialogue]]
speaker = "モネ"
# 「私は見なくていいですから～っ」
line = "「私は見なくていいですから～っ」"

[[dialogue]]
speaker = "モネ"
# 「あの、リップルさん、戦闘服の話はいいですから本題を……」
line = "「あの、リップルさん、戦闘服の話はいいですから本題を……」"

[[dialogue]]
speaker = "リップル"
# 「オー、ソウでした！　カイチョーに聞きたいコトあるんでした！」
line = "「オー、ソウでした！　カイチョーに聞きたいコトあるんでした！」"

[[dialogue]]
speaker = "リップル"
# 「ワタシはエンドレスサマーを大きくするために、クリスマスについてモネとチョウサしているのです」
line = "「ワタシはエンドレスサマーを大きくするために、クリスマスについてモネとチョウサしているのです」"

[[dialogue]]
speaker = "リップル"
# 「ソコで、カイチョーのクリスマスの過ごし方を聞きたいんです。今までカイチョーはどんなクリスマスを過ごしていたんデスか？」
line = "「ソコで、カイチョーのクリスマスの過ごし方を聞きたいんです。今までカイチョーはどんなクリスマスを過ごしていたんデスか？」"

[[dialogue]]
speaker = "リップル"
# 「フムフム……家族と過ごすコトが多いんデスね。チキンやケーキを食べて……オー、やっぱりチキンは人気デスね！」
line = "「フムフム……家族と過ごすコトが多いんデスね。チキンやケーキを食べて……オー、やっぱりチキンは人気デスね！」"

[[dialogue]]
speaker = "リップル"
# 「アルバイトしているコトもあった……？　オ～、ナルホド、さすがカイチョーです。ちなみにどんなアルバイトしてたんデスか？」
line = "「アルバイトしているコトもあった……？　オ～、ナルホド、さすがカイチョーです。ちなみにどんなアルバイトしてたんデスか？」"

[[dialogue]]
speaker = "リップル"
# 「サンタになってプレゼントを配る……？　ナント！　カイチョーもサンタだったのですか！？」
line = "「サンタになってプレゼントを配る……？　ナント！　カイチョーもサンタだったのですか！？」"

[[dialogue]]
speaker = "リップル"
# 「他にはケーキを作ったり、ハンバイしたり……ナルホド、いろんなアルバイトがあるんですね！」
line = "「他にはケーキを作ったり、ハンバイしたり……ナルホド、いろんなアルバイトがあるんですね！」"

[[dialogue]]
speaker = "モネ"
# 「私も基本は家族と一緒でしたね。家族みんなで海外旅行に行ったこともありましたけど、疲れちゃって、結局毎年家になりました」
line = "「私も基本は家族と一緒でしたね。家族みんなで海外旅行に行ったこともありましたけど、疲れちゃって、結局毎年家になりました」"

[[dialogue]]
speaker = "リップル"
# 「へー、リョコウもアリなんですね！　オモシロイです！」
line = "「へー、リョコウもアリなんですね！　オモシロイです！」"

[[dialogue]]
speaker = "モネ"
# 「もちろん、特別な仲の人と過ごすのもいいと思いますよ」
line = "「もちろん、特別な仲の人と過ごすのもいいと思いますよ」"

[[dialogue]]
speaker = "リップル"
# 「特別な仲……」
line = "「特別な仲……」"

[[dialogue]]
speaker = "unk"
# リップルと目が合って、その瞬間、顔が熱くなるのを感じた。
line = "リップルと目が合って、その瞬間、顔が熱くなるのを感じた。"

[[dialogue]]
speaker = "リップル"
# 「特別ならやっぱり……カイチョーですね」
line = "「特別ならやっぱり……カイチョーですね」"

[[dialogue]]
speaker = "unk"
# クリスマスにデートしようか
line = "クリスマスにデートしようか"

[[dialogue]]
speaker = "リップル"
# 「ハイ！　ワタシもデートしたいです！」
line = "「ハイ！　ワタシもデートしたいです！」"

[[dialogue]]
speaker = "unk"
# 何を隠そう、俺たちは恋人同士。彼女とデートするのに何らはばかる必要はない。
line = "何を隠そう、俺たちは恋人同士。彼女とデートするのに何らはばかる必要はない。"

[[dialogue]]
speaker = "モネ"
# 「ふふ、良かったですね、リップルさん」
line = "「ふふ、良かったですね、リップルさん」"

[[dialogue]]
speaker = "リップル"
# 「ハイ♪　フフフ～ン♪　カイチョーとのデート、ＢＩＧタノシミです♪」
line = "「ハイ♪　フフフ～ン♪　カイチョーとのデート、ＢＩＧタノシミです♪」"

[[dialogue]]
speaker = "unk"
# リップルとのデートが待ち遠しくて、早くクリスマスになってほしいと思うのだった。
line = "リップルとのデートが待ち遠しくて、早くクリスマスになってほしいと思うのだった。"
