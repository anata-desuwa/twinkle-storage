[[dialogue]]
speaker = "unk"
# ある日、俺が星徒会室で仕事をしていると、勢いよく扉を開けてやって来たのは――
line = "ある日、俺が星徒会室で仕事をしていると、勢いよく扉を開けてやって来たのは――"

[[dialogue]]
speaker = "ルリエル"
# 「会長さ～ん！　ごきげんようなのです♪」
line = "「会長さ～ん！　ごきげんようなのです♪」"

[[dialogue]]
speaker = "unk"
# ルリエル、今日は一体どうしたんだ？
line = "ルリエル、今日は一体どうしたんだ？"

[[dialogue]]
speaker = "unk"
# ルリエルに続いて、用事があるので遅れて来ると言っていたマトイも現れる。
line = "ルリエルに続いて、用事があるので遅れて来ると言っていたマトイも現れる。"

[[dialogue]]
speaker = "マトイ"
# 「お疲れ様、会長。実は、ヘレナさんが私とルリエルちゃんに新しい人工戦闘服を作ってくれたんだ」
line = "「お疲れ様、会長。実は、ヘレナさんが私とルリエルちゃんに新しい人工戦闘服を作ってくれたんだ」"

[[dialogue]]
speaker = "ルリエル"
# 「それをさっき受け取って来たので、会長さんに披露しに来たのですよ♪」
line = "「それをさっき受け取って来たので、会長さんに披露しに来たのですよ♪」"

[[dialogue]]
speaker = "ルリエル"
# 「行きますよ～。いざ、フォームチェンジなのです！」
line = "「行きますよ～。いざ、フォームチェンジなのです！」"

[[dialogue]]
speaker = "ルリエル"
# 「じゃ～ん♪　これがわたしたちの新しい戦闘服、『巫女フォーム』なのですよ～！」
line = "「じゃ～ん♪　これがわたしたちの新しい戦闘服、『巫女フォーム』なのですよ～！」"

[[dialogue]]
speaker = "マトイ"
# 「ど、どうかな、会長？」
line = "「ど、どうかな、会長？」"

[[dialogue]]
speaker = "unk"
# かわいい！！
line = "かわいい！！"

[[dialogue]]
speaker = "unk"
# ２人共すごく似合ってるよ！
line = "２人共すごく似合ってるよ！"

[[dialogue]]
speaker = "ルリエル"
# 「えへへぇ♪　会長さんに褒められると嬉しくなっちゃいます♪」
line = "「えへへぇ♪　会長さんに褒められると嬉しくなっちゃいます♪」"

[[dialogue]]
speaker = "マトイ"
# 「あ、ありがと……えへへ」
line = "「あ、ありがと……えへへ」"

[[dialogue]]
speaker = "マトイ"
# 「ただ……この巫女フォームなんだけど、これまでとはまた違う特殊な力を扱う戦闘服らしいんだよね」
line = "「ただ……この巫女フォームなんだけど、これまでとはまた違う特殊な力を扱う戦闘服らしいんだよね」"

[[dialogue]]
speaker = "マトイ"
# 「普通の星力から性質を変化させた『巫女の力』っていうもので戦うらしくて、それは訓練しないと、上手く使えないみたい」
line = "「普通の星力から性質を変化させた『巫女の力』っていうもので戦うらしくて、それは訓練しないと、上手く使えないみたい」"

[[dialogue]]
speaker = "ルリエル"
# 「なので、ヘレナさんから修業先を教えてもらったのです！」
line = "「なので、ヘレナさんから修業先を教えてもらったのです！」"

[[dialogue]]
speaker = "unk"
# マトイが明日から数日間、新星星徒会の業務を離れる話は、ヘレナちゃんと通じて事前に聞いていた。
line = "マトイが明日から数日間、新星星徒会の業務を離れる話は、ヘレナちゃんと通じて事前に聞いていた。"

[[dialogue]]
speaker = "unk"
# 『星力から性質を変化させた巫女の力』というものへの興味は尽きないが、今回の俺はお留守番ということになる。
line = "『星力から性質を変化させた巫女の力』というものへの興味は尽きないが、今回の俺はお留守番ということになる。"

[[dialogue]]
speaker = "マトイ"
# 「それで、修業を見てくれるっていう星騎士の子と、ここで会う約束をしてるんだけど……」
line = "「それで、修業を見てくれるっていう星騎士の子と、ここで会う約束をしてるんだけど……」"

[[dialogue]]
speaker = "？？？"
# 「ごめんやす～」
line = "「ごめんやす～」"

[[dialogue]]
speaker = "ルリエル"
# 「あっ、ちょうど来たみたいなのです！」
line = "「あっ、ちょうど来たみたいなのです！」"

[[dialogue]]
speaker = "ミヤハル"
# 「お初にお目にかかります～。九浄ヘレナはんに呼ばれて来た者どす<emoji=heart04>」
line = "「お初にお目にかかります～。九浄ヘレナはんに呼ばれて来た者どす<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 星徒会室の扉が開き、中に入って来たのは、俺がまだ１度も顔を合わせたことのない女生徒だった。
line = "星徒会室の扉が開き、中に入って来たのは、俺がまだ１度も顔を合わせたことのない女生徒だった。"

[[dialogue]]
speaker = "ミヤハル"
# 「うち、流星学園２年生の<ruby=あべの>安倍野</ruby>ミヤハルと申します<emoji=heart04>」
line = "「うち、流星学園２年生の<ruby>安倍野<rt>あべの</rt></ruby>ミヤハルと申します<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
# 「ミヤハル先輩、ごきげんようなのです！」
line = "「ミヤハル先輩、ごきげんようなのです！」"

[[dialogue]]
speaker = "ミヤハル"
# 「あら～、ルリエルはん、ごきげんようどす<emoji=heart04>　巫女の戦闘服、よう似合っとるねぇ～。可愛いらしいわぁ<emoji=heart04>」
line = "「あら～、ルリエルはん、ごきげんようどす<emoji=heart04>　巫女の戦闘服、よう似合っとるねぇ～。可愛いらしいわぁ<emoji=heart04>」"

[[dialogue]]
speaker = "ミヤハル"
# 「それに、新星星徒会の詠野マトイはんも、トマルはんによう似て、べっぴんさんやねぇ。よろしゅうなぁ<emoji=heart04>」
line = "「それに、新星星徒会の詠野マトイはんも、トマルはんによう似て、べっぴんさんやねぇ。よろしゅうなぁ<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
# 「はい。姉の私も、これからお世話になります。よろしくお願いします」
line = "「はい。姉の私も、これからお世話になります。よろしくお願いします」"

[[dialogue]]
speaker = "ルリエル"
# 「会長さん、ミヤハルさんはすごいんですよ！」
line = "「会長さん、ミヤハルさんはすごいんですよ！」"

[[dialogue]]
speaker = "ルリエル"
# 「なんと、日本で有名なあの伝説の陰陽師、『<ruby=あべのせいめい>安倍晴明</ruby>』さんのご子孫なのです！」
line = "「なんと、日本で有名なあの伝説の陰陽師、『<ruby>安倍晴明<rt>あべのせいめい</rt></ruby>』さんのご子孫なのです！」"

[[dialogue]]
speaker = "unk"
# 安倍晴明といえば、今から１１００年前の時代に当時の京都で活躍していたことで有名な星騎士である。
line = "安倍晴明といえば、今から１１００年前の時代に当時の京都で活躍していたことで有名な星騎士である。"

[[dialogue]]
speaker = "ミヤハル"
# 「実はそうなんよ～。あとはそうやねぇ、会長はんにはもう１つの肩書きを説明しておくと――」
line = "「実はそうなんよ～。あとはそうやねぇ、会長はんにはもう１つの肩書きを説明しておくと――」"

[[dialogue]]
speaker = "ミヤハル"
# 「安倍晴明はんって、実は『<ruby=せんせいしゃ>選星者</ruby>』だったんよ」
line = "「安倍晴明はんって、実は『<ruby>選星者<rt>せんせいしゃ</rt></ruby>』だったんよ」"

[[dialogue]]
speaker = "unk"
# えっ！？　それじゃあ、まさか……！？
line = "えっ！？　それじゃあ、まさか……！？"

[[dialogue]]
speaker = "ミヤハル"
# 「ふふっ<emoji=heart04>　そう――」
line = "「ふふっ<emoji=heart04>　そう――」"

[[dialogue]]
speaker = "ミヤハル"
# 「うちは、それを受け継ぐ選星者の１人『陰陽師』なんよ<emoji=heart04>」
line = "「うちは、それを受け継ぐ選星者の１人『陰陽師』なんよ<emoji=heart04>」"

[[dialogue]]
speaker = "ミヤハル"
# 「そういうわけで、はんなりとよろしゅうなぁ<emoji=heart04>」
line = "「そういうわけで、はんなりとよろしゅうなぁ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 現代の陰陽師は、そう言って、にこっと雅な笑みを浮かべてみせるのだった――
line = "現代の陰陽師は、そう言って、にこっと雅な笑みを浮かべてみせるのだった――"
