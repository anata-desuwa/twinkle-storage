[[dialogue]]
speaker = "ルリエル"
# 「へい会長さんっ！　トス、トースっ！　わたしの華麗なアタックで決めてみせますよぉ～！」
line = "「へい会長さんっ！　トス、トースっ！　わたしの華麗なアタックで決めてみせますよぉ～！」"

[[dialogue]]
speaker = "イクシリオン"
# 「させませんっ！　んんっっ……！！　アグレッシブに動くと、はぁはぁ、ハイレグ部分がどんどん食い込んできて……」
line = "「させませんっ！　んんっっ……！！　アグレッシブに動くと、はぁはぁ、ハイレグ部分がどんどん食い込んできて……」"

[[dialogue]]
speaker = "ウィステリア"
# 「ボーッとしてちゃダメよ、イクシーさんっ。すぐに次が──」
line = "「ボーッとしてちゃダメよ、イクシーさんっ。すぐに次が──」"

[[dialogue]]
speaker = "ウィステリア"
# 「ぶふぅ！？」
line = "「ぶふぅ！？」"

[[dialogue]]
speaker = "unk"
# すみませんっ、顔面に……！
line = "すみませんっ、顔面に……！"

[[dialogue]]
speaker = "ウィステリア"
# 「い、いいのよ。わざとじゃないのはわかってるから」
line = "「い、いいのよ。わざとじゃないのはわかってるから」"

[[dialogue]]
speaker = "ルリエル"
# 「えへへっ、海って楽しいですね～！　ビーチバレーにスイカ割り、砂のお城作りに日光浴！」
line = "「えへへっ、海って楽しいですね～！　ビーチバレーにスイカ割り、砂のお城作りに日光浴！」"

[[dialogue]]
speaker = "イクシリオン"
# 「浜辺で摂る食事も格別です。新鮮な魚介類はもちろん、いつも街で食べてるようなホットスナックも一段と美味しくて」
line = "「浜辺で摂る食事も格別です。新鮮な魚介類はもちろん、いつも街で食べてるようなホットスナックも一段と美味しくて」"

[[dialogue]]
speaker = "ルリエル"
# 「こーいうのを求めてたんですよぉ～。ルリエル、ちょっと周りを探検してきます！」
line = "「こーいうのを求めてたんですよぉ～。ルリエル、ちょっと周りを探検してきます！」"

[[dialogue]]
speaker = "イクシリオン"
# 「私もご一緒します。少々食べ過ぎてしまったので身体を動かさなくては」
line = "「私もご一緒します。少々食べ過ぎてしまったので身体を動かさなくては」"

[[dialogue]]
speaker = "unk"
# いや、流石に遊びすぎ──
line = "いや、流石に遊びすぎ──"

[[dialogue]]
speaker = "ウィステリア"
# 「ふふ、行かせてあげなさい。そう根を詰めて特訓するものでもないわ」
line = "「ふふ、行かせてあげなさい。そう根を詰めて特訓するものでもないわ」"

[[dialogue]]
speaker = "ウィステリア"
# 「２人とも海に来るのも、水着を着るのも初めてなんでしょ？　なら、しばらくは好きに遊ばせてあげたらいいの」
line = "「２人とも海に来るのも、水着を着るのも初めてなんでしょ？　なら、しばらくは好きに遊ばせてあげたらいいの」"

[[dialogue]]
speaker = "ウィステリア"
# 「会長くんは今回２人の教官役も任されてるって話だったもんね。焦っちゃう気持ちもわかるわ」
line = "「会長くんは今回２人の教官役も任されてるって話だったもんね。焦っちゃう気持ちもわかるわ」"

[[dialogue]]
speaker = "ウィステリア"
# 「でも、だからこそ、まずは生徒たちに心のゆとりを持たせてあげなくちゃ。今一番焦ってるのは、誰でもないあの２人なんだから」
line = "「でも、だからこそ、まずは生徒たちに心のゆとりを持たせてあげなくちゃ。今一番焦ってるのは、誰でもないあの２人なんだから」"

[[dialogue]]
speaker = "ウィステリア"
# 「あの２人は優秀な星騎士だけど、そんな彼女たちでも、思うように力を扱えず内心戸惑ってるはずよ。そんな状態で特訓なんてしても逆効果になるだけだわ」
line = "「あの２人は優秀な星騎士だけど、そんな彼女たちでも、思うように力を扱えず内心戸惑ってるはずよ。そんな状態で特訓なんてしても逆効果になるだけだわ」"

[[dialogue]]
speaker = "ウィステリア"
# 「指導者に大切なのは、特訓を付けることじゃなくて、教え導くことよ。教え子たちが自然と実力を開花させられるように、ね？」
line = "「指導者に大切なのは、特訓を付けることじゃなくて、教え導くことよ。教え子たちが自然と実力を開花させられるように、ね？」"

[[dialogue]]
speaker = "unk"
# なるほど……
line = "なるほど……"

[[dialogue]]
speaker = "ウィステリア"
# 「ごめんなさい。説教臭くなっちゃったかしら。会長くんも教官役に戸惑ってる１人なのに」
line = "「ごめんなさい。説教臭くなっちゃったかしら。会長くんも教官役に戸惑ってる１人なのに」"

[[dialogue]]
speaker = "ウィステリア"
# 「でも、あの子たちなら大丈夫よ。ただ遊び呆けているわけじゃないわ。ほら──見てみなさい？」
line = "「でも、あの子たちなら大丈夫よ。ただ遊び呆けているわけじゃないわ。ほら──見てみなさい？」"

[[dialogue]]
speaker = "ルリエル"
# 「海で泳ぐ時はくれぐれも足が付くところまでにしてくださいねっ？　おとーさんやおかーさんの目の届かない場所にも行っちゃいけませんよぉ～？」
line = "「海で泳ぐ時はくれぐれも足が付くところまでにしてくださいねっ？　おとーさんやおかーさんの目の届かない場所にも行っちゃいけませんよぉ～？」"

[[dialogue]]
speaker = "子どもたち"
# 「はーいっ！」
line = "「はーいっ！」"

[[dialogue]]
speaker = "ルリエル"
# 「えへへ、いい返事です！　ではでは、お渡しした法螺貝を構えてください！　みんなで法螺貝コンサートといきましょう！」
line = "「えへへ、いい返事です！　ではでは、お渡しした法螺貝を構えてください！　みんなで法螺貝コンサートといきましょう！」"

[[dialogue]]
speaker = "イクシリオン"
# 「ご無事ですかっ？　もう大丈夫ですよ、掴まってください」
line = "「ご無事ですかっ？　もう大丈夫ですよ、掴まってください」"

[[dialogue]]
speaker = "女性客"
# 「はぁはぁ、ありがとうございます。急に足が攣ってしまって、もうダメかと……」
line = "「はぁはぁ、ありがとうございます。急に足が攣ってしまって、もうダメかと……」"

[[dialogue]]
speaker = "イクシリオン"
# 「安心してください。常に目を光らせていますから。ですが海に入る前は、みっちり柔軟をして備えてくださいね？」
line = "「安心してください。常に目を光らせていますから。ですが海に入る前は、みっちり柔軟をして備えてくださいね？」"

[[dialogue]]
speaker = "ウィステリア"
# 「ふふ、流石はプリマステラね。誰に命じられたわけでもなく、ビーチにいるお客さんのために動き回って」
line = "「ふふ、流石はプリマステラね。誰に命じられたわけでもなく、ビーチにいるお客さんのために動き回って」"

[[dialogue]]
speaker = "ウィステリア"
# 「水着になってもあの子たちはあの子たち。星騎士に必要なものはもうとっくに身に付けているわ。今はただ慣れない姿や力に緊張しちゃっているだけ」
line = "「水着になってもあの子たちはあの子たち。星騎士に必要なものはもうとっくに身に付けているわ。今はただ慣れない姿や力に緊張しちゃっているだけ」"

[[dialogue]]
speaker = "ウィステリア"
# 「緊張さえ解ければ、自ずと力も使いこなせるようになってるはずよ。だから会長くんも、彼女たちを信じて見守ってあげなさい」
line = "「緊張さえ解ければ、自ずと力も使いこなせるようになってるはずよ。だから会長くんも、彼女たちを信じて見守ってあげなさい」"

[[dialogue]]
speaker = "ウィステリア"
# 「それでももし悩んでいるようなら『自信を持て』って励ましてあげて？　その言葉が彼女たちにとって何より心の支えになるはずだから」
line = "「それでももし悩んでいるようなら『自信を持て』って励ましてあげて？　その言葉が彼女たちにとって何より心の支えになるはずだから」"

[[dialogue]]
speaker = "ウィステリア"
# 「彼女たちもまた、会長くんを信じているからこそ──ね？」
line = "「彼女たちもまた、会長くんを信じているからこそ──ね？」"

[[dialogue]]
speaker = "ウィステリア"
# 「って、司書の私が何を偉そうに話してるのかしら。やだわ、先輩面でくどくど喋っちゃって」
line = "「って、司書の私が何を偉そうに話してるのかしら。やだわ、先輩面でくどくど喋っちゃって」"

[[dialogue]]
speaker = "unk"
# いえ、すごく参考になりました
line = "いえ、すごく参考になりました"

[[dialogue]]
speaker = "ウィステリア"
# 「……そう？　口うるさい大人だなって思わない？」
line = "「……そう？　口うるさい大人だなって思わない？」"

[[dialogue]]
speaker = "unk"
# ウィステリアさんの言葉が俺にとっての支えですよ
line = "ウィステリアさんの言葉が俺にとっての支えですよ"

[[dialogue]]
speaker = "ウィステリア"
# 「お、大袈裟よ。大層なことは言ってないわ」
line = "「お、大袈裟よ。大層なことは言ってないわ」"

[[dialogue]]
speaker = "ウィステリア"
# （こんなに尊敬の眼差しを向けてくれるなんて……。先輩風を吹かせるのもたまには悪くないかもしれないわね……）
line = "（こんなに尊敬の眼差しを向けてくれるなんて……。先輩風を吹かせるのもたまには悪くないかもしれないわね……）"

[[dialogue]]
speaker = "ウィステリア"
# （憧れは恋に似てるって聞くし……。こうして頼れるお姉さんらしさを出して行けば、会長くんに惹かれてもらえるかも……）
line = "（憧れは恋に似てるって聞くし……。こうして頼れるお姉さんらしさを出して行けば、会長くんに惹かれてもらえるかも……）"

[[dialogue]]
speaker = "ウィステリア"
# （って、ダメダメ！　何を考えてるの！　生徒相手に不純な気持ちを抱いちゃいけないわ……！）
line = "（って、ダメダメ！　何を考えてるの！　生徒相手に不純な気持ちを抱いちゃいけないわ……！）"

[[dialogue]]
speaker = "ウィステリア"
# （……でも、ここは学園じゃないし。私は今休暇中だし。大胆な水着も着ちゃってるし……）
line = "（……でも、ここは学園じゃないし。私は今休暇中だし。大胆な水着も着ちゃってるし……）"

[[dialogue]]
speaker = "ウィステリア"
# （このままそれとなく大人の余裕と色気を見せながら、慣れない仕事に悩む会長くんをそっと励ましてあげれば──）
line = "（このままそれとなく大人の余裕と色気を見せながら、慣れない仕事に悩む会長くんをそっと励ましてあげれば──）"

[[dialogue]]
speaker = "イクシリオン"
# 「教師と生徒……暑いビーチで燃え上がる禁断の恋……ですね」
line = "「教師と生徒……暑いビーチで燃え上がる禁断の恋……ですね」"

[[dialogue]]
speaker = "ウィステリア"
# 「ひぃあ！？　イ、イクシーさん……！？」
line = "「ひぃあ！？　イ、イクシーさん……！？」"

[[dialogue]]
speaker = "ルリエル"
# 「なんだかウィステリアさん、さっきよりも会長さんとの距離近くないですか？」
line = "「なんだかウィステリアさん、さっきよりも会長さんとの距離近くないですか？」"

[[dialogue]]
speaker = "ウィステリア"
# 「こここ、これは話している間につい近づいちゃっただけよ……！　潮風で声が聞き取りづらかったものだから……！　それに私教師じゃなくて司書だしっ」
line = "「こここ、これは話している間につい近づいちゃっただけよ……！　潮風で声が聞き取りづらかったものだから……！　それに私教師じゃなくて司書だしっ」"

[[dialogue]]
speaker = "イクシリオン"
# 「……やはり、あのくらい露出が高い方が殿方は嬉しいのでしょうか。しかし私には、あんな過激すぎる格好はとても……」
line = "「……やはり、あのくらい露出が高い方が殿方は嬉しいのでしょうか。しかし私には、あんな過激すぎる格好はとても……」"

[[dialogue]]
speaker = "ルリエル"
# 「というかズルいのです！　ルリエルも会長さんとお話したいのです！　独り占めしないでくださ～いっ！」
line = "「というかズルいのです！　ルリエルも会長さんとお話したいのです！　独り占めしないでくださ～いっ！」"

[[dialogue]]
speaker = "ウィステリア"
# 「ひひひ、独り占めなんてしてないわ。私はあくまで先輩として、慣れない教官役に抜擢された会長くんに大人のアドバイスを──」
line = "「ひひひ、独り占めなんてしてないわ。私はあくまで先輩として、慣れない教官役に抜擢された会長くんに大人のアドバイスを──」"

[[dialogue]]
speaker = "水着フワッチ"
# 「イーーーーーッ」
line = "「イーーーーーッ」"

[[dialogue]]
speaker = "unk"
# みんなっ！
line = "みんなっ！"

[[dialogue]]
speaker = "ルリエル"
# 「は、はいっ！　さっきのモンスターですぅ！」
line = "「は、はいっ！　さっきのモンスターですぅ！」"

[[dialogue]]
speaker = "イクシリオン"
# 「すぐに行きましょう！　モンスターの好き気勝手にはさせません！」
line = "「すぐに行きましょう！　モンスターの好き気勝手にはさせません！」"
