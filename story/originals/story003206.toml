[[dialogue]]
speaker = "ウルスラ"
# 『繰り返し告げましょう。イレーナさんが会長さんにチョコを手渡さない限り、あなたたちが学園から出ることはできません』
line = "『繰り返し告げましょう。イレーナさんが会長さんにチョコを手渡さない限り、あなたたちが学園から出ることはできません』"

[[dialogue]]
speaker = "イレーナ"
# 「ふざけないで！　とっととここから出しなさい！」
line = "「ふざけないで！　とっととここから出しなさい！」"

[[dialogue]]
speaker = "ウルスラ"
# 『イレーナさんがいけないんですよ？』
line = "『イレーナさんがいけないんですよ？』"

[[dialogue]]
speaker = "イレーナ"
# 「……は？　なんで、あたしが──」
line = "「……は？　なんで、あたしが──」"

[[dialogue]]
speaker = "ウルスラ"
# 『私は素直になれないイレーナさんの背中を押したいだけなんです』
line = "『私は素直になれないイレーナさんの背中を押したいだけなんです』"

[[dialogue]]
speaker = "ウルスラ"
# 『モンスターが<ruby=ばっこ>跋扈</ruby>するこの世界では、いつ命を落とすかもわかりません。直接モンスターと対峙する、危険な環境に身を置く星騎士ならば尚更です』
line = "『モンスターが<ruby>跋扈<rt>ばっこ</rt></ruby>するこの世界では、いつ命を落とすかもわかりません。直接モンスターと対峙する、危険な環境に身を置く星騎士ならば尚更です』"

[[dialogue]]
speaker = "ウルスラ"
# 『想いを伝えられぬまま、命を落とした乙女もいました……そんな悲しいことがあるでしょうか？』
line = "『想いを伝えられぬまま、命を落とした乙女もいました……そんな悲しいことがあるでしょうか？』"

[[dialogue]]
speaker = "ウルスラ"
# 『想いを伝えられていたならば、死の間際に後悔することもなく、ともすれば行動も変わり、命が失われることもなかったかもしれないというのに』
line = "『想いを伝えられていたならば、死の間際に後悔することもなく、ともすれば行動も変わり、命が失われることもなかったかもしれないというのに』"

[[dialogue]]
speaker = "ウルスラ"
# 『命短し、恋せよ乙女──』
line = "『命短し、恋せよ乙女──』"

[[dialogue]]
speaker = "ウルスラ"
# 『恋心を秘めた乙女の恋愛の全てを成就させること、それが私の永遠の使命です』
line = "『恋心を秘めた乙女の恋愛の全てを成就させること、それが私の永遠の使命です』"

[[dialogue]]
speaker = "イレーナ"
# 「黙って聞いてりゃ、好き勝手にベラベラと……あー、もう猫かぶりやめやめ！　他に誰もいないんなら、あんた相手も素で行くわ」
line = "「黙って聞いてりゃ、好き勝手にベラベラと……あー、もう猫かぶりやめやめ！　他に誰もいないんなら、あんた相手も素で行くわ」"

[[dialogue]]
speaker = "イレーナ"
# 「あんたのことだから、あたしの素もお見通しだったんだろうけどね！」
line = "「あんたのことだから、あたしの素もお見通しだったんだろうけどね！」"

[[dialogue]]
speaker = "ウルスラ"
# 『ふふ、今のイレーナさんの方が、私には魅力的に感じます』
line = "『ふふ、今のイレーナさんの方が、私には魅力的に感じます』"

[[dialogue]]
speaker = "イレーナ"
# 「そりゃどーも。あんたに褒められたところで、嬉しくもなんともないけど！」
line = "「そりゃどーも。あんたに褒められたところで、嬉しくもなんともないけど！」"

[[dialogue]]
speaker = "イレーナ"
# 「あんたがやってること、なんていうか知ってる？　小さな親切、大きなお世話っていうのよ！　単なるお節介！」
line = "「あんたがやってること、なんていうか知ってる？　小さな親切、大きなお世話っていうのよ！　単なるお節介！」"

[[dialogue]]
speaker = "イレーナ"
# 「想いを伝えられずに後悔した子？　そりゃいるでしょうよ。でも、その子はあたしじゃないし」
line = "「想いを伝えられずに後悔した子？　そりゃいるでしょうよ。でも、その子はあたしじゃないし」"

[[dialogue]]
speaker = "イレーナ"
# 「あたしにあんたは必要ない！　はた迷惑なお節介は、人を選べって言ってんのよ！」
line = "「あたしにあんたは必要ない！　はた迷惑なお節介は、人を選べって言ってんのよ！」"

[[dialogue]]
speaker = "ウルスラ"
# 『そうですか。ですが困りましたね。会長さんにチョコを渡すか、私を倒さない限り、学園からは一歩も出られなくなっていますので……』
line = "『そうですか。ですが困りましたね。会長さんにチョコを渡すか、私を倒さない限り、学園からは一歩も出られなくなっていますので……』"

[[dialogue]]
speaker = "イレーナ"
# 「ったく……なんで、あたしがチョコ持ってる前提で話が進んでんのよ……」
line = "「ったく……なんで、あたしがチョコ持ってる前提で話が進んでんのよ……」"

[[dialogue]]
speaker = "ウルスラ"
# 『もっとも、バレンタインの私は無敵です。倒すのは骨が折れると思いますよ』
line = "『もっとも、バレンタインの私は無敵です。倒すのは骨が折れると思いますよ』"

[[dialogue]]
speaker = "イレーナ"
# 「ちなみにこれ、放っておいたらどうなるわけ？」
line = "「ちなみにこれ、放っておいたらどうなるわけ？」"

[[dialogue]]
speaker = "ウルスラ"
# 『永劫に続くエンドレス・バレンタインを味わってください。心ゆくまで、たっぷりと。１ヶ月でも、１年でも』
line = "『永劫に続くエンドレス・バレンタインを味わってください。心ゆくまで、たっぷりと。１ヶ月でも、１年でも』"

[[dialogue]]
speaker = "イレーナ"
# 「そんなに<ruby=くつろ>寛</ruby>いでたら、ホワイトデーだって終わるし、賞味期限だって切れるわよ！」
line = "「そんなに<ruby>寛<rt>くつろ</rt></ruby>いでたら、ホワイトデーだって終わるし、賞味期限だって切れるわよ！」"

[[dialogue]]
speaker = "unk"
# チョコがあるなら渡してくれれば……
line = "チョコがあるなら渡してくれれば……"

[[dialogue]]
speaker = "イレーナ"
# 「ったく……あんたってばモテるくせに乙女心がわかってないわよね」
line = "「ったく……あんたってばモテるくせに乙女心がわかってないわよね」"

[[dialogue]]
speaker = "イレーナ"
# 「女がバレンタインのチョコを渡す時はね、自分のタイミングってものがあんの」
line = "「女がバレンタインのチョコを渡す時はね、自分のタイミングってものがあんの」"

[[dialogue]]
speaker = "イレーナ"
# 「『学園を出るために』とか『誰かに強制されて』とか……自分の気持ち以外で、チョコを渡すって行為がたまらなくイヤなのよ」
line = "「『学園を出るために』とか『誰かに強制されて』とか……自分の気持ち以外で、チョコを渡すって行為がたまらなくイヤなのよ」"

[[dialogue]]
speaker = "イレーナ"
# 「も、もちろん！？　あんたにチョコを渡すかどうかはともかくとしてよ！？　一般論！　一般論だからね！」
line = "「も、もちろん！？　あんたにチョコを渡すかどうかはともかくとしてよ！？　一般論！　一般論だからね！」"

[[dialogue]]
speaker = "unk"
# ──わかった。さっさと脱出しよう！
line = "──わかった。さっさと脱出しよう！"

[[dialogue]]
speaker = "イレーナ"
# 「うん、あんたのそういうこと──」
line = "「うん、あんたのそういうこと──」"

[[dialogue]]
speaker = "イレーナ"
# （──って、あっぶな。変なこと言いそうになったわ……）
line = "（──って、あっぶな。変なこと言いそうになったわ……）"

[[dialogue]]
speaker = "unk"
# ウルスラの言動は、フェイクの可能性もある。
line = "ウルスラの言動は、フェイクの可能性もある。"

[[dialogue]]
speaker = "unk"
# 学園から出られないのが本当か確認するため、イレーナとともに校門へと向かった。
line = "学園から出られないのが本当か確認するため、イレーナとともに校門へと向かった。"

[[dialogue]]
speaker = "イレーナ"
# 「やっぱり、駄目ね。ウルスラが言った通り、校門は閉じてて、ビクともしない」
line = "「やっぱり、駄目ね。ウルスラが言った通り、校門は閉じてて、ビクともしない」"

[[dialogue]]
speaker = "unk"
# 見えない壁ができてる
line = "見えない壁ができてる"

[[dialogue]]
speaker = "イレーナ"
# 「当然、そのくらいの対策は取られてるわよね。壁を乗り越えるのも駄目……他に脱出できそうな抜け道は……」
line = "「当然、そのくらいの対策は取られてるわよね。壁を乗り越えるのも駄目……他に脱出できそうな抜け道は……」"

[[dialogue]]
speaker = "シャロン"
# 「会長さま……イレーナさま……」
line = "「会長さま……イレーナさま……」"

[[dialogue]]
speaker = "イレーナ"
# 「シャロン！？　帰ったんじゃなかったの！？」
line = "「シャロン！？　帰ったんじゃなかったの！？」"

[[dialogue]]
speaker = "イレーナ"
# 「そっか、シャロンもウルスラに閉じ込められたのね。それなら３人で協力して、一緒にあのクレイジーバレンタインモンスターを倒しましょう！」
line = "「そっか、シャロンもウルスラに閉じ込められたのね。それなら３人で協力して、一緒にあのクレイジーバレンタインモンスターを倒しましょう！」"

[[dialogue]]
speaker = "シャロン"
# 「ごめんなさい、イレーナさま」
line = "「ごめんなさい、イレーナさま」"

[[dialogue]]
speaker = "unk"
# 様子がおかしい！
line = "様子がおかしい！"

[[dialogue]]
speaker = "イレーナ"
# 「シャロン！？　もしかして、あなた……！」
line = "「シャロン！？　もしかして、あなた……！」"

[[dialogue]]
speaker = "シャロン"
# 「会長さまにチョコを渡すか、さもなくば──ウルスラさまを倒す前に私を倒してください！」
line = "「会長さまにチョコを渡すか、さもなくば──ウルスラさまを倒す前に私を倒してください！」"

[[dialogue]]
speaker = "unk"
# ウルスラと意気投合してるー！？
line = "ウルスラと意気投合してるー！？"

[[dialogue]]
speaker = "イレーナ"
# 「どうしてそうなるのよ！」
line = "「どうしてそうなるのよ！」"

[[dialogue]]
speaker = "シャロン"
# 「だって、イレーナさまは──」
line = "「だって、イレーナさまは──」"

[[dialogue]]
speaker = "イレーナ"
# 「あーあー、聞こえなーい！　それ以上言わなくていいわ！　あたしたちの邪魔をするからには容赦しないからね！」
line = "「あーあー、聞こえなーい！　それ以上言わなくていいわ！　あたしたちの邪魔をするからには容赦しないからね！」"

[[dialogue]]
speaker = "unk"
# 聖女とシスター、真っ向からぶつかり合う聖戦が始まる！
line = "聖女とシスター、真っ向からぶつかり合う聖戦が始まる！"
