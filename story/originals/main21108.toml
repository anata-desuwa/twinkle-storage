[[dialogue]]
speaker = "unk"
# 第８話,再戦,B
line = "第８話,再戦,B"

[[dialogue]]
speaker = "ナターシャ"
# 「あぐっ……！？」
line = "「あぐっ……！？」"

[[dialogue]]
speaker = "unk"
# ジグの斬撃を受け、ナターシャが地に墜ちる。
line = "ジグの斬撃を受け、ナターシャが地に墜ちる。"

[[dialogue]]
speaker = "unk"
# 黒い羽や体のいたるところには傷が刻まれ、赤い血で濡れていないところはなかった。
line = "黒い羽や体のいたるところには傷が刻まれ、赤い血で濡れていないところはなかった。"

[[dialogue]]
speaker = "ナターシャ"
# 「はぁ、はぁ……かっこつけて引き受けたはいいけど……１人でリクリエの使徒を相手にするのは無茶だよね……」
line = "「はぁ、はぁ……かっこつけて引き受けたはいいけど……１人でリクリエの使徒を相手にするのは無茶だよね……」"

[[dialogue]]
speaker = "ナターシャ"
# 「あー……死にそう……血ぃ出すぎ……まだ手足が繋がってるのが、奇跡だよ……」
line = "「あー……死にそう……血ぃ出すぎ……まだ手足が繋がってるのが、奇跡だよ……」"

[[dialogue]]
speaker = "ナターシャ"
# 「てか、遊んでるでしょ……？　トドメを差す機会は……いくらでもあったはずなのに」
line = "「てか、遊んでるでしょ……？　トドメを差す機会は……いくらでもあったはずなのに」"

[[dialogue]]
speaker = "ジグ"
# 「まぁね。アガサが戻ってくるまでの退屈しのぎさ」
line = "「まぁね。アガサが戻ってくるまでの退屈しのぎさ」"

[[dialogue]]
speaker = "ナターシャ"
# 「はぁ……これでも天界で指折りのエージェントだったんだけどな。自信なくすなぁ……」
line = "「はぁ……これでも天界で指折りのエージェントだったんだけどな。自信なくすなぁ……」"

[[dialogue]]
speaker = "ナターシャ"
# 「でも……梨緒が戻ってくることは、疑ってないんだ？」
line = "「でも……梨緒が戻ってくることは、疑ってないんだ？」"

[[dialogue]]
speaker = "ジグ"
# 「ああ。アガサは自分の弱さに耐えられずに、“真なる神”の救いを求めるだろう」
line = "「ああ。アガサは自分の弱さに耐えられずに、“真なる神”の救いを求めるだろう」"

[[dialogue]]
speaker = "ジグ"
# 「その時こそ、私とアガサは本当の仲間になれるんだ」
line = "「その時こそ、私とアガサは本当の仲間になれるんだ」"

[[dialogue]]
speaker = "ナターシャ"
# 「ふーん。それは解釈違いかも」
line = "「ふーん。それは解釈違いかも」"

[[dialogue]]
speaker = "ジグ"
# 「解釈？」
line = "「解釈？」"

[[dialogue]]
speaker = "ナターシャ"
# 「うん。あのパッと見クールなくせしてじゃじゃ馬な梨緒が、そんなに聞き分けいいかなって」
line = "「うん。あのパッと見クールなくせしてじゃじゃ馬な梨緒が、そんなに聞き分けいいかなって」"

[[dialogue]]
speaker = "ジグ"
# 「ふふ、君こそわかっていないね」
line = "「ふふ、君こそわかっていないね」"

[[dialogue]]
speaker = "ジグ"
# 「アガサは弱い。誰よりも弱くて、それを認めたくなくて強がっているだけの子どもさ」
line = "「アガサは弱い。誰よりも弱くて、それを認めたくなくて強がっているだけの子どもさ」"

[[dialogue]]
speaker = "ナターシャ"
# 「言うねぇ、さすが星徒会長と副会長だっただけある」
line = "「言うねぇ、さすが星徒会長と副会長だっただけある」"

[[dialogue]]
speaker = "ナターシャ"
# 「まぁ間違ってはいないと思うけど……それだけじゃないと思うよ、うちの委員長は」
line = "「まぁ間違ってはいないと思うけど……それだけじゃないと思うよ、うちの委員長は」"

[[dialogue]]
speaker = "ジグ"
# 「ふぅん。君はアガサを信じているんだね。いささか意外だよ」
line = "「ふぅん。君はアガサを信じているんだね。いささか意外だよ」"

[[dialogue]]
speaker = "ジグ"
# 「だけど君の相手も飽きた。そろそろ息の根を止めようか」
line = "「だけど君の相手も飽きた。そろそろ息の根を止めようか」"

[[dialogue]]
speaker = "unk"
# ジグが大剣を振りかぶり、満身創痍のナターシャに向かって振り下ろす──
line = "ジグが大剣を振りかぶり、満身創痍のナターシャに向かって振り下ろす──"

[[dialogue]]
speaker = "ジグ"
# 「──！」
line = "「──！」"

[[dialogue]]
speaker = "unk"
# 剣がナターシャに届く寸前、ジグの眼前に雷が走った。
line = "剣がナターシャに届く寸前、ジグの眼前に雷が走った。"

[[dialogue]]
speaker = "unk"
# そして──
line = "そして──"

[[dialogue]]
speaker = "梨緒"
# 「待たせたな、ナターシャ」
line = "「待たせたな、ナターシャ」"

[[dialogue]]
speaker = "ナターシャ"
# 「ほんとだよ……今まさに死ぬところだったんだから」
line = "「ほんとだよ……今まさに死ぬところだったんだから」"

[[dialogue]]
speaker = "ベアトリス"
# 「ナターシャちゃん、大丈夫！？」
line = "「ナターシャちゃん、大丈夫！？」"

[[dialogue]]
speaker = "ナターシャ"
# 「全然だいじょーぶじゃない……死ぬ一歩手前……めっちゃ血ぃ出た……」
line = "「全然だいじょーぶじゃない……死ぬ一歩手前……めっちゃ血ぃ出た……」"

[[dialogue]]
speaker = "ナターシャ"
# 「吸血鬼的に血がもったいないって思ってない？」
line = "「吸血鬼的に血がもったいないって思ってない？」"

[[dialogue]]
speaker = "ベアトリス"
# 「思ってないよっ！　ちょびっとしか！」
line = "「思ってないよっ！　ちょびっとしか！」"

[[dialogue]]
speaker = "ナターシャ"
# 「思ってるじゃん」
line = "「思ってるじゃん」"

[[dialogue]]
speaker = "unk"
# 死にかけながらも、気安いやり取りを忘れないナターシャ。
line = "死にかけながらも、気安いやり取りを忘れないナターシャ。"

[[dialogue]]
speaker = "unk"
# 常に命の危険と隣り合わせのエージェントにとっては、自身が殺されかけたことも、大きな出来事ではないのかもしれない。
line = "常に命の危険と隣り合わせのエージェントにとっては、自身が殺されかけたことも、大きな出来事ではないのかもしれない。"

[[dialogue]]
speaker = "梨緒"
# 「ベアト、ナターシャを頼む。戦闘になればジグの相手で精一杯になる」
line = "「ベアト、ナターシャを頼む。戦闘になればジグの相手で精一杯になる」"

[[dialogue]]
speaker = "ベアトリス"
# 「うん、わかった！　ナターシャちゃんは私が治療するね！」
line = "「うん、わかった！　ナターシャちゃんは私が治療するね！」"

[[dialogue]]
speaker = "unk"
# ベアトリスが傷ついたナターシャを抱えて、部屋の隅へと下がっていく。
line = "ベアトリスが傷ついたナターシャを抱えて、部屋の隅へと下がっていく。"

[[dialogue]]
speaker = "ジグ"
# 「おやおや、せっかく戻ってきたのに、また私にやられに来たのかい？　“真なる神”に救いを求めに来たんだと思ったんだけど」
line = "「おやおや、せっかく戻ってきたのに、また私にやられに来たのかい？　“真なる神”に救いを求めに来たんだと思ったんだけど」"

[[dialogue]]
speaker = "梨緒"
# 「救い……か。確かに私は弱くて何もできない、情けない人間だ」
line = "「救い……か。確かに私は弱くて何もできない、情けない人間だ」"

[[dialogue]]
speaker = "梨緒"
# 「だが今は、私が君を救う番だ。君が心の中で流した涙を拭ってみせる！」
line = "「だが今は、私が君を救う番だ。君が心の中で流した涙を拭ってみせる！」"

[[dialogue]]
speaker = "ジグ"
# 「救う……ねぇ。さっきもそう言っていたね」
line = "「救う……ねぇ。さっきもそう言っていたね」"

[[dialogue]]
speaker = "ジグ"
# 「だけど私に救いなんて不要だ。だって私はもう“真なる神”に救われているのだから」
line = "「だけど私に救いなんて不要だ。だって私はもう“真なる神”に救われているのだから」"

[[dialogue]]
speaker = "梨緒"
# 「いいや、君は救われてなんかいない。君は今も絶望の闇の中だ」
line = "「いいや、君は救われてなんかいない。君は今も絶望の闇の中だ」"

[[dialogue]]
speaker = "梨緒"
# 「だから今度こそ私が勝って、君をリクリエから解放する！」
line = "「だから今度こそ私が勝って、君をリクリエから解放する！」"

[[dialogue]]
speaker = "ジグ"
# 「“今度こそ”って言って、威勢よく挑んで負けたことが何度あったかな」
line = "「“今度こそ”って言って、威勢よく挑んで負けたことが何度あったかな」"

[[dialogue]]
speaker = "ジグ"
# 「さっき逃げたのでアガサの９９９敗目だ。１０００回目の勝負なら勝てると思ったかい？」
line = "「さっき逃げたのでアガサの９９９敗目だ。１０００回目の勝負なら勝てると思ったかい？」"

[[dialogue]]
speaker = "unk"
# ジグの<b>眼</b>に、梨緒の『<ruby=みらい>可能性</ruby>』が映る。
line = "ジグの<b>眼</b>に、梨緒の『<ruby>可能性<rt>みらい</rt></ruby>』が映る。"

[[dialogue]]
speaker = "unk"
# 梨緒は牽制のためにクロスボウを撃つ。
line = "梨緒は牽制のためにクロスボウを撃つ。"

[[dialogue]]
speaker = "unk"
# ジグは紙一重でそれを躱すと、星力をまとって突進。
line = "ジグは紙一重でそれを躱すと、星力をまとって突進。"

[[dialogue]]
speaker = "unk"
# 押し止めようとする射撃を弾いて、梨緒を斬って捨てる──
line = "押し止めようとする射撃を弾いて、梨緒を斬って捨てる──"

[[dialogue]]
speaker = "ジグ"
# 「ほら、やっぱりアガサの負けだ」
line = "「ほら、やっぱりアガサの負けだ」"

[[dialogue]]
speaker = "梨緒"
# 「そうだな、私の負けだ」
line = "「そうだな、私の負けだ」"

[[dialogue]]
speaker = "梨緒"
# 「だから──次だ」
line = "「だから──次だ」"

[[dialogue]]
speaker = "ジグ"
# 「──！！」
line = "「──！！」"

[[dialogue]]
speaker = "unk"
# ジグが見た『<ruby=みらい>可能性</ruby>』の中で梨緒は敗北した。
line = "ジグが見た『<ruby>可能性<rt>みらい</rt></ruby>』の中で梨緒は敗北した。"

[[dialogue]]
speaker = "unk"
# だが梨緒の表情には一切の焦りも動揺もない。
line = "だが梨緒の表情には一切の焦りも動揺もない。"

[[dialogue]]
speaker = "梨緒"
# 「今勝ったのは君だろう、何を驚いている？」
line = "「今勝ったのは君だろう、何を驚いている？」"

[[dialogue]]
speaker = "ジグ"
# 「君こそ大きな口を叩いておいて、負けて恥ずかしくないのかい？」
line = "「君こそ大きな口を叩いておいて、負けて恥ずかしくないのかい？」"

[[dialogue]]
speaker = "梨緒"
# 「そうだな、１０００回目の敗北……いや、可能性の中であればもっとか」
line = "「そうだな、１０００回目の敗北……いや、可能性の中であればもっとか」"

[[dialogue]]
speaker = "梨緒"
# 「だからどうした」
line = "「だからどうした」"

[[dialogue]]
speaker = "梨緒"
# 「千だろうと、万だろうと、億だろうと、いくら負けようが関係ない」
line = "「千だろうと、万だろうと、億だろうと、いくら負けようが関係ない」"

[[dialogue]]
speaker = "梨緒"
# 「数多の敗北を超えて、１つの勝利を手繰り寄せる。その１つが那由多の彼方にあろうとも……！」
line = "「数多の敗北を超えて、１つの勝利を手繰り寄せる。その１つが那由多の彼方にあろうとも……！」"

[[dialogue]]
speaker = "ジグ"
# 「たとえ無限に繰り返そうと、君に勝利の可能性はない……！」
line = "「たとえ無限に繰り返そうと、君に勝利の可能性はない……！」"

[[dialogue]]
speaker = "unk"
# 現実で雷矢と斬撃の応酬を繰り広げながら、梨緒とジグにしか見えない可能性の地平で、幾度となくぶつかり合う。
line = "現実で雷矢と斬撃の応酬を繰り広げながら、梨緒とジグにしか見えない可能性の地平で、幾度となくぶつかり合う。"

[[dialogue]]
speaker = "unk"
# 一瞬の間に、かつて２人がベガで重ねた勝負の数を超え、その数だけ梨緒がジグに敗北する。
line = "一瞬の間に、かつて２人がベガで重ねた勝負の数を超え、その数だけ梨緒がジグに敗北する。"

[[dialogue]]
speaker = "unk"
# わずか数秒で天文学的な数の敗北が積み重なっていくが、それでも梨緒が怯むことはない。
line = "わずか数秒で天文学的な数の敗北が積み重なっていくが、それでも梨緒が怯むことはない。"

[[dialogue]]
speaker = "梨緒"
# 「今のはジグの連撃に対して反応が遅れた……次だ」
line = "「今のはジグの連撃に対して反応が遅れた……次だ」"

[[dialogue]]
speaker = "unk"
# 梨緒は可能性の中で負けても動じることなく、即座にノルンの力で次の可能性を予測し、ジグに食らいついていく。
line = "梨緒は可能性の中で負けても動じることなく、即座にノルンの力で次の可能性を予測し、ジグに食らいついていく。"

[[dialogue]]
speaker = "ジグ"
# 「確かに先ほどとは違うようだ。それなら──」
line = "「確かに先ほどとは違うようだ。それなら──」"

[[dialogue]]
speaker = "ベアトリス"
# 「──ッ！」
line = "「──ッ！」"

[[dialogue]]
speaker = "unk"
# ベアトリスがナターシャの治療をしていると、そこにジグが急速に接近していく。
line = "ベアトリスがナターシャの治療をしていると、そこにジグが急速に接近していく。"

[[dialogue]]
speaker = "ジグ"
# 「見えたよ──２人が死ぬ『<ruby=みらい>可能性</ruby>』が」
line = "「見えたよ──２人が死ぬ『<ruby>可能性<rt>みらい</rt></ruby>』が」"

[[dialogue]]
speaker = "unk"
# ジグが死角から迫り、大剣の一振りでナターシャとベアトリスの首を刎ねる──
line = "ジグが死角から迫り、大剣の一振りでナターシャとベアトリスの首を刎ねる──"

[[dialogue]]
speaker = "ジグ"
# 「──！？」
line = "「──！？」"

[[dialogue]]
speaker = "unk"
# だがジグが見た『可能性』が現実になることはなく、梨緒がクロスボウで斬撃を受け止めていた。
line = "だがジグが見た『可能性』が現実になることはなく、梨緒がクロスボウで斬撃を受け止めていた。"

[[dialogue]]
speaker = "梨緒"
# 「その『<ruby=みらい>可能性</ruby>』は私にも見えた。だから邪魔させてもらった」
line = "「その『<ruby>可能性<rt>みらい</rt></ruby>』は私にも見えた。だから邪魔させてもらった」"

[[dialogue]]
speaker = "ベアトリス"
# 「ありがとう、梨緒ちゃん！」
line = "「ありがとう、梨緒ちゃん！」"

[[dialogue]]
speaker = "ナターシャ"
# 「やるじゃん」
line = "「やるじゃん」"

[[dialogue]]
speaker = "梨緒"
# 「ノルンの力を幾千幾万と使うことで、『因果』の糸を辿れるようになってきた」
line = "「ノルンの力を幾千幾万と使うことで、『因果』の糸を辿れるようになってきた」"

[[dialogue]]
speaker = "梨緒"
# 「私はようやくノルンの遣した力を使いこなせてきたようだ」
line = "「私はようやくノルンの遣した力を使いこなせてきたようだ」"

[[dialogue]]
speaker = "ジグ"
# 「なるほど、これが『因果』を司るノルンの力か……いささか過小評価していたようだ」
line = "「なるほど、これが『因果』を司るノルンの力か……いささか過小評価していたようだ」"

[[dialogue]]
speaker = "ジグ"
# 「だけどこれは予測していたかい？」
line = "「だけどこれは予測していたかい？」"

[[dialogue]]
speaker = "unk"
# ジグの手の中に紫の瘴気が集まり、仮面を形作る。
line = "ジグの手の中に紫の瘴気が集まり、仮面を形作る。"

[[dialogue]]
speaker = "unk"
# そして仮面が梨緒の顔に取り憑いて──
line = "そして仮面が梨緒の顔に取り憑いて──"

[[dialogue]]
speaker = "梨緒"
# 「く──っ！？」
line = "「く──っ！？」"

[[dialogue]]
speaker = "ベアトリス"
# 「梨緒ちゃん！？」
line = "「梨緒ちゃん！？」"

[[dialogue]]
speaker = "ジグ"
# 「さぁ、私と一緒に新しい世界を始めよう、アガサ」
line = "「さぁ、私と一緒に新しい世界を始めよう、アガサ」"
