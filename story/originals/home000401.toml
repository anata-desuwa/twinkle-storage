[[dialogue]]
speaker = "トレジアンナ"
# 「みなさんこんにちは～！　イベント『魔法少女トレジャー☆サチ３』をプレイしてくれた方はお久しぶり、そうじゃない方は初めまして♪」
line = "「みなさんこんにちは～！　イベント『魔法少女トレジャー☆サチ３』をプレイしてくれた方はお久しぶり、そうじゃない方は初めまして♪」"

[[dialogue]]
speaker = "トレジアンナ"
# 「蒐集の魔法少女トレジャー☆アンナですよ～！　キラッ☆」
line = "「蒐集の魔法少女トレジャー☆アンナですよ～！　キラッ☆」"

[[dialogue]]
speaker = "トレジアンナ"
# 「……異世界の存在が確認されてから、私はずっと、いつかこんな日がやってくるのではないかと期待していました。そう――」
line = "「……異世界の存在が確認されてから、私はずっと、いつかこんな日がやってくるのではないかと期待していました。そう――」"

[[dialogue]]
speaker = "トレジアンナ"
# 「異世界の魔法少女と運命が交差する、春映画みたいなオールスターズ展開を！！」
line = "「異世界の魔法少女と運命が交差する、春映画みたいなオールスターズ展開を！！」"

[[dialogue]]
speaker = "いろは"
# 「いや～、まさかあたしは、異世界の魔法少女と出会えるなんて思わなかったよ～！　しかもアンナちゃんみたいな、魔法少女好きの同志と！」
line = "「いや～、まさかあたしは、異世界の魔法少女と出会えるなんて思わなかったよ～！　しかもアンナちゃんみたいな、魔法少女好きの同志と！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「いえいえ、これはもう運命ですよ♪　このまま２人で、魔法少女について熱く語り明かしちゃいましょうか～！」
line = "「いえいえ、これはもう運命ですよ♪　このまま２人で、魔法少女について熱く語り明かしちゃいましょうか～！」"

[[dialogue]]
speaker = "いろは"
# 「いいね、いいね～！　じゃあカラオケ行っちゃう？　異世界の魔法少女アニメの主題歌、映像付きでめっちゃ聴きた～い♪」
line = "「いいね、いいね～！　じゃあカラオケ行っちゃう？　異世界の魔法少女アニメの主題歌、映像付きでめっちゃ聴きた～い♪」"

[[dialogue]]
speaker = "花織"
# 「いやいや、ウチらをスルーしないでよ、トレジアンナさん！？」
line = "「いやいや、ウチらをスルーしないでよ、トレジアンナさん！？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「あははっ☆　冗談ですよ～♪　はい、じゃあカメラに向かって、花織さんの３サイズを教えてもらってもいいですか～？」
line = "「あははっ☆　冗談ですよ～♪　はい、じゃあカメラに向かって、花織さんの３サイズを教えてもらってもいいですか～？」"

[[dialogue]]
speaker = "花織"
# 「えっと、ウチは上から～……って言うかぁ！！　いろはやここあさんと比べて、ウチがいちばん小さいんだから！」
line = "「えっと、ウチは上から～……って言うかぁ！！　いろはやここあさんと比べて、ウチがいちばん小さいんだから！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「てへぺろ☆　すみませ～ん♪　花織さんはしっかりツッコミを入れてくれるので、つい～☆」
line = "「てへぺろ☆　すみませ～ん♪　花織さんはしっかりツッコミを入れてくれるので、つい～☆」"

[[dialogue]]
speaker = "ここあ"
# 「にゃははっ☆　アンナちんって面白いよね～。ちなみにここあは身長１４９センチで、上から８９・５７・８６だよ～♪」
line = "「にゃははっ☆　アンナちんって面白いよね～。ちなみにここあは身長１４９センチで、上から８９・５７・８６だよ～♪」"

[[dialogue]]
speaker = "トレジアンナ"
# 「マジですか！？　うおおおおっ！　異世界の魔法少女の容姿と数字データを照らし合わせて、記憶魔法で保存保存保存！！！」
line = "「マジですか！？　うおおおおっ！　異世界の魔法少女の容姿と数字データを照らし合わせて、記憶魔法で保存保存保存！！！」"

[[dialogue]]
speaker = "ここあ"
# 「そういえば、アンナちんも身長小さいのにおっぱい大きいよね～。サイズどれくらいなの？」
line = "「そういえば、アンナちんも身長小さいのにおっぱい大きいよね～。サイズどれくらいなの？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「ふふふっ、私ですか～？　私は身長１４４センチで、ここあさんよりも小柄ですが、なんと――おっぱいは８８センチのＧカップなんですよ～☆」
line = "「ふふふっ、私ですか～？　私は身長１４４センチで、ここあさんよりも小柄ですが、なんと――おっぱいは８８センチのＧカップなんですよ～☆」"

[[dialogue]]
speaker = "花織"
# 「でっか！？　身長比率で考えたら、ここあさんよりもトランジスタグラマーなんじゃ！？」
line = "「でっか！？　身長比率で考えたら、ここあさんよりもトランジスタグラマーなんじゃ！？」"

[[dialogue]]
speaker = "いろは"
# 「アンナちゃんは深夜アニメの方に出てきそうな魔法少女だよね～！」
line = "「アンナちゃんは深夜アニメの方に出てきそうな魔法少女だよね～！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「いや～、それほどでも～♪　照れちゃいますね～☆」
line = "「いや～、それほどでも～♪　照れちゃいますね～☆」"

[[dialogue]]
speaker = "花織"
# 「喜ぶとこなの……？　というか、雑談になっちゃってるけど大丈夫？　これ、<b>予告</b>だよね？」
line = "「喜ぶとこなの……？　というか、雑談になっちゃってるけど大丈夫？　これ、<b>予告</b>だよね？」"

[[dialogue]]
speaker = "いろは"
# 「あっ、そうだった！　『マジカミ』と『ティンクルスターナイツ』のコラボ予告をするために来たんだった！」
line = "「あっ、そうだった！　『マジカミ』と『ティンクルスターナイツ』のコラボ予告をするために来たんだった！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「異世界の魔法少女とお話できるとあって、ついテンションが上がっちゃって、すみませ～ん！」
line = "「異世界の魔法少女とお話できるとあって、ついテンションが上がっちゃって、すみませ～ん！」"

[[dialogue]]
speaker = "ここあ"
# 「にゃはは～、大丈夫だよ、アンナちん♪　こういうのは全部、オモシロイのが正義だから☆」
line = "「にゃはは～、大丈夫だよ、アンナちん♪　こういうのは全部、オモシロイのが正義だから☆」"

[[dialogue]]
speaker = "トレジアンナ"
# 「ありがとうございます！　では、コホン――改めまして、『マジカミ』と『ティンクルスターナイツ』の魔法少女コラボイベント☆」
line = "「ありがとうございます！　では、コホン――改めまして、『マジカミ』と『ティンクルスターナイツ』の魔法少女コラボイベント☆」"

[[dialogue]]
speaker = "いろは"
# 「『マジカミ×トレジャー☆サチ～魔法少女のキスパンデミック～』が３日後から開催！」
line = "「『マジカミ×トレジャー☆サチ～魔法少女のキスパンデミック～』が３日後から開催！」"

[[dialogue]]
speaker = "花織"
# 「ウチらマジカミの魔法少女たちが登場するのはもちろん、タイトル通り、クルスタの魔法少女たちも登場します♪」
line = "「ウチらマジカミの魔法少女たちが登場するのはもちろん、タイトル通り、クルスタの魔法少女たちも登場します♪」"

[[dialogue]]
speaker = "ここあ"
# 「ってことで、呼んじゃおっかにゃ～♪　サチサチ☆　プリちん♪　シズハっち～！」
line = "「ってことで、呼んじゃおっかにゃ～♪　サチサチ☆　プリちん♪　シズハっち～！」"

[[dialogue]]
speaker = "サチ"
# 「ど、どうも……！　お呼びに預かりました、幸運の魔法少女トレジャー☆サチこと、流星学園附属校、生徒会長の白詰サチですっ！」
line = "「ど、どうも……！　お呼びに預かりました、幸運の魔法少女トレジャー☆サチこと、流星学園附属校、生徒会長の白詰サチですっ！」"

[[dialogue]]
speaker = "プリムラ"
# 「まったく、トレジアンナのせいで待ちわびたぞ！　悪の終末兵器にして、漆黒の魔法少女、プリムラじゃ！」
line = "「まったく、トレジアンナのせいで待ちわびたぞ！　悪の終末兵器にして、漆黒の魔法少女、プリムラじゃ！」"

[[dialogue]]
speaker = "シズハ"
# 「聖杯の魔法少女、染井シズハよ！　お正月に引き続き、頑張るからよろしくね♪」
line = "「聖杯の魔法少女、染井シズハよ！　お正月に引き続き、頑張るからよろしくね♪」"

[[dialogue]]
speaker = "いろは"
# 「というわけで、作品の枠を超えた、マジやばいカミ魔法少女コラボ♪」
line = "「というわけで、作品の枠を超えた、マジやばいカミ魔法少女コラボ♪」"

[[dialogue]]
speaker = "サチ"
# 「『マジカミ×トレジャー☆サチ』をよろしくお願いします！」
line = "「『マジカミ×トレジャー☆サチ』をよろしくお願いします！」"

[[dialogue]]
speaker = "いろは"
# 「あたしたち魔法少女の活躍を、おっ楽しみに～♪」
line = "「あたしたち魔法少女の活躍を、おっ楽しみに～♪」"
