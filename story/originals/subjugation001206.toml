[[dialogue]]
speaker = "マトイ"
# 「聞いたよ、姫咲さん！　あのレミカさんとユニットを組むことになったって！」
line = "「聞いたよ、姫咲さん！　あのレミカさんとユニットを組むことになったって！」"

[[dialogue]]
speaker = "メルエル"
# 「も、もう噂になってるの！？　ついこの間、練習を始めたばかりなのに……！」
line = "「も、もう噂になってるの！？　ついこの間、練習を始めたばかりなのに……！」"

[[dialogue]]
speaker = "マトイ"
# 「ふふ、衣装もすっごく可愛いって聞いてるよ。ライブ本番は星徒会全員で盛り上げに行くね！」
line = "「ふふ、衣装もすっごく可愛いって聞いてるよ。ライブ本番は星徒会全員で盛り上げに行くね！」"

[[dialogue]]
speaker = "メルエル"
# 「う、ぅ～……！　お友達みんなから同じようなこと言われて、ちょっぴりプレッシャー……！」
line = "「う、ぅ～……！　お友達みんなから同じようなこと言われて、ちょっぴりプレッシャー……！」"

[[dialogue]]
speaker = "マトイ"
# 「そうなんだ？　ヴィーナスからは『歌もダンスも完璧よ！　てっぺんを取れるわね！』って聞いてるけど……」
line = "「そうなんだ？　ヴィーナスからは『歌もダンスも完璧よ！　てっぺんを取れるわね！』って聞いてるけど……」"

[[dialogue]]
speaker = "メルエル"
# 「ヴィーナスちゃんはちょっと大げさだから……まだまだ、ついていくので精一杯って感じかな……？」
line = "「ヴィーナスちゃんはちょっと大げさだから……まだまだ、ついていくので精一杯って感じかな……？」"

[[dialogue]]
speaker = "メルエル"
# 「今も時間があれば、いろんなアイドルグループのライブやパフォーマンスを見て、お勉強してるくらいだし」
line = "「今も時間があれば、いろんなアイドルグループのライブやパフォーマンスを見て、お勉強してるくらいだし」"

[[dialogue]]
speaker = "マトイ"
# 「あ、だからＤＩＳＣ見てたんだ。邪魔しちゃってごめんね？」
line = "「あ、だからＤＩＳＣ見てたんだ。邪魔しちゃってごめんね？」"

[[dialogue]]
speaker = "メルエル"
# 「ううん！　応援してくれてありがとう！」
line = "「ううん！　応援してくれてありがとう！」"

[[dialogue]]
speaker = "メルエル"
# 「放課後までまだ時間あるし、少しでも多く参考にしないと……ぁ、この動画すごい。みんなやっぱり可愛いなあ……」
line = "「放課後までまだ時間あるし、少しでも多く参考にしないと……ぁ、この動画すごい。みんなやっぱり可愛いなあ……」"

[[dialogue]]
speaker = "メルエル"
# 「コメントの数もすごいなー。ファンの言葉も参考にしよっかな……」
line = "「コメントの数もすごいなー。ファンの言葉も参考にしよっかな……」"

[[dialogue]]
speaker = "メルエル"
# 「えーっと……『とっても可愛い』『パフォーマンスが流石』……『でもセンターの子、恋愛禁止ってルールを破ったよね』……え？」
line = "「えーっと……『とっても可愛い』『パフォーマンスが流石』……『でもセンターの子、恋愛禁止ってルールを破ったよね』……え？」"

[[dialogue]]
speaker = "メルエル"
# 「『ファンだったのに裏切られた』……？　あ、あれれ……？」
line = "「『ファンだったのに裏切られた』……？　あ、あれれ……？」"

[[dialogue]]
speaker = "unk"
# ──ユニット名を『アーネスト』と定めた日からしばらく時が経った。
line = "──ユニット名を『アーネスト』と定めた日からしばらく時が経った。"

[[dialogue]]
speaker = "unk"
# ポラリスプロダクションの名で借りる予定のライブ会場では、１時間のパフォーマンスが予定されている。
line = "ポラリスプロダクションの名で借りる予定のライブ会場では、１時間のパフォーマンスが予定されている。"

[[dialogue]]
speaker = "unk"
# 何曲も連続して歌う必要があるため、練習は欠かせない……けれど心配はほとんどご無用といった感じだった。
line = "何曲も連続して歌う必要があるため、練習は欠かせない……けれど心配はほとんどご無用といった感じだった。"

[[dialogue]]
speaker = "レミカ"
# 「ふぅっ──最後まで通せたね。会長、どうだった？」
line = "「ふぅっ──最後まで通せたね。会長、どうだった？」"

[[dialogue]]
speaker = "unk"
# 日に日によくなってる！
line = "日に日によくなってる！"

[[dialogue]]
speaker = "unk"
# バッチリ！
line = "バッチリ！"

[[dialogue]]
speaker = "レミカ"
# 「ふふ、ありがと。メルエルが頑張ってくれてるからね。先輩の私が足を引っ張るわけにはいかないし」
line = "「ふふ、ありがと。メルエルが頑張ってくれてるからね。先輩の私が足を引っ張るわけにはいかないし」"

[[dialogue]]
speaker = "メルエル"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "レミカ"
# 「メルエル？」
line = "「メルエル？」"

[[dialogue]]
speaker = "メルエル"
# 「──えっ！？　あ、うんっ……何も問題がないなら、よかったぁ」
line = "「──えっ！？　あ、うんっ……何も問題がないなら、よかったぁ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「いいわね～、今日も完璧じゃない！　ばっちりだわ！」
line = "「いいわね～、今日も完璧じゃない！　ばっちりだわ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「でも、おかしいわね。アイドルアニメだとライブまでに何かしらの問題があるはずなのに～」
line = "「でも、おかしいわね。アイドルアニメだとライブまでに何かしらの問題があるはずなのに～」"

[[dialogue]]
speaker = "ヴィーナス"
# 「チームが喧嘩して『もう私アイドルやめる！』みたいなアクシデントがあって。でもそれを乗り越えて絆がぐっと強くなったりして……！」
line = "「チームが喧嘩して『もう私アイドルやめる！』みたいなアクシデントがあって。でもそれを乗り越えて絆がぐっと強くなったりして……！」"

[[dialogue]]
speaker = "レミカ"
# 「いや、トラブルがないならそれに越したことはないでしょ」
line = "「いや、トラブルがないならそれに越したことはないでしょ」"

[[dialogue]]
speaker = "アナ"
# 「そのとおりです。先輩方、レッスンお疲れ様でした。データ解析を開始してもよろしいでしょうか？」
line = "「そのとおりです。先輩方、レッスンお疲れ様でした。データ解析を開始してもよろしいでしょうか？」"

[[dialogue]]
speaker = "レミカ"
# 「うん、ありがとう。ちょうど練習も終わったし、ぱぱっとやっちゃおうか」
line = "「うん、ありがとう。ちょうど練習も終わったし、ぱぱっとやっちゃおうか」"

[[dialogue]]
speaker = "アナ"
# 「イエス。メルエル先輩は……」
line = "「イエス。メルエル先輩は……」"

[[dialogue]]
speaker = "メルエル"
# 「あっ……ご、ごめんね。まだアイドルフォーム、ただの衣装でしかないみたいで……」
line = "「あっ……ご、ごめんね。まだアイドルフォーム、ただの衣装でしかないみたいで……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「むむっ……！　きっとメルエルの心に、何かしこりがあるのね！　トラブルの予感がするわ！」
line = "「むむっ……！　きっとメルエルの心に、何かしこりがあるのね！　トラブルの予感がするわ！」"

[[dialogue]]
speaker = "アナ"
# 「いきなりアイドルをやれと言われて、戦闘服を即起動できる方が驚きます。レミカ先輩と違って、メルエル先輩は巻き込まれた立場」
line = "「いきなりアイドルをやれと言われて、戦闘服を即起動できる方が驚きます。レミカ先輩と違って、メルエル先輩は巻き込まれた立場」"

[[dialogue]]
speaker = "メルエル"
# 「あはは、ごめんね。起動できるようになったらすぐ言うから」
line = "「あはは、ごめんね。起動できるようになったらすぐ言うから」"

[[dialogue]]
speaker = "メルエル"
# 「…………はぁ」
line = "「…………はぁ」"

[[dialogue]]
speaker = "unk"
# （なんだかメルエルの表情が暗い……？）
line = "（なんだかメルエルの表情が暗い……？）"

[[dialogue]]
speaker = "レミカ"
# 「それじゃ今日の練習はここまでだね」
line = "「それじゃ今日の練習はここまでだね」"

[[dialogue]]
speaker = "メルエル"
# 「う、うん。お疲れ様……ん、会長くん？　どうしたの？」
line = "「う、うん。お疲れ様……ん、会長くん？　どうしたの？」"

[[dialogue]]
speaker = "unk"
# メルエル、一緒に帰ろうか？
line = "メルエル、一緒に帰ろうか？"

[[dialogue]]
speaker = "メルエル"
# 「キミと一緒に帰るの、なんだか懐かしいよね。日曜ミサのあともこうして帰ったこと、あったっけ」
line = "「キミと一緒に帰るの、なんだか懐かしいよね。日曜ミサのあともこうして帰ったこと、あったっけ」"

[[dialogue]]
speaker = "unk"
# メルエル、何か悩んでることはない？
line = "メルエル、何か悩んでることはない？"

[[dialogue]]
speaker = "メルエル"
# 「えっ！？　う、ううんっ……何にもないよっ？」
line = "「えっ！？　う、ううんっ……何にもないよっ？」"

[[dialogue]]
speaker = "メルエル"
# 「練習で疲れてるのかな、ちょっとぼーっとしちゃってただけで……」
line = "「練習で疲れてるのかな、ちょっとぼーっとしちゃってただけで……」"

[[dialogue]]
speaker = "unk"
# 俺はアーネストのプロデューサーだから
line = "俺はアーネストのプロデューサーだから"

[[dialogue]]
speaker = "unk"
# もしも何かあったら言ってくれよ
line = "もしも何かあったら言ってくれよ"

[[dialogue]]
speaker = "メルエル"
# 「う、うん！　ありがとう……！　あ、会長くんはあっちだよね。私はこっちだから……また明日ね！」
line = "「う、うん！　ありがとう……！　あ、会長くんはあっちだよね。私はこっちだから……また明日ね！」"

[[dialogue]]
speaker = "メルエル"
# 「言えないよー……会長くんには……」
line = "「言えないよー……会長くんには……」"

[[dialogue]]
speaker = "メルエル"
# 「あの動画のコメント……」
line = "「あの動画のコメント……」"

[[dialogue]]
speaker = "unk"
# ──彼氏がいてがっかり。恋人がいただなんて、裏切られた気分。
line = "──彼氏がいてがっかり。恋人がいただなんて、裏切られた気分。"

[[dialogue]]
speaker = "メルエル"
# 「私、会長くんのこと、大好きで……ヴィーナスちゃんやレミカちゃんに褒められた笑顔は、会長くんのことを思い浮かべたからできてるお顔で……」
line = "「私、会長くんのこと、大好きで……ヴィーナスちゃんやレミカちゃんに褒められた笑顔は、会長くんのことを思い浮かべたからできてるお顔で……」"

[[dialogue]]
speaker = "メルエル"
# 「ステージの上で、お客さんに見せていい笑顔なのかな……」
line = "「ステージの上で、お客さんに見せていい笑顔なのかな……」"

[[dialogue]]
speaker = "メルエル"
# 「私……とっても不義理なこと、しちゃってるんじゃ……？」
line = "「私……とっても不義理なこと、しちゃってるんじゃ……？」"
