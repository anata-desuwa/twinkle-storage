[[dialogue]]
speaker = "unk"
# 第１話,さまよえる魔法使い,P
line = "第１話,さまよえる魔法使い,P"

[[dialogue]]
speaker = "unk"
# 黒ベア子によって強制的に流星市国へ召喚されてしまったノルトハウゼン。
line = "黒ベア子によって強制的に流星市国へ召喚されてしまったノルトハウゼン。"

[[dialogue]]
speaker = "unk"
# しかし、あまりにもテキトーな召喚だったため、黒ベア子たちのいる新星学園の星徒会室ではなく、流星学園の校舎前に召喚されてしまった。
line = "しかし、あまりにもテキトーな召喚だったため、黒ベア子たちのいる新星学園の星徒会室ではなく、流星学園の校舎前に召喚されてしまった。"

[[dialogue]]
speaker = "unk"
# 見慣れない光景に戸惑いつつも、ここがどこなのか手当たり次第に聞いて回りながら、マイペースに探索を始める。
line = "見慣れない光景に戸惑いつつも、ここがどこなのか手当たり次第に聞いて回りながら、マイペースに探索を始める。"

[[dialogue]]
speaker = "unk"
# そして──
line = "そして──"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「少々お話を伺いたいのですが、ここは一体どこなのでしょう？　もしかして、イリスクラウドではないのでしょうか？」
line = "「少々お話を伺いたいのですが、ここは一体どこなのでしょう？　もしかして、イリスクラウドではないのでしょうか？」"

[[dialogue]]
speaker = "アイリーン"
# 「えっと、ここは流星市国だよ。イリスクラウドっていう場所は知らないかな～」
line = "「えっと、ここは流星市国だよ。イリスクラウドっていう場所は知らないかな～」"

[[dialogue]]
speaker = "ノルトハウゼン"
# （イリスクラウドの名前も知られていないなんて……ここはよほど遠い異国の地、ということなのでしょうか？）
line = "（イリスクラウドの名前も知られていないなんて……ここはよほど遠い異国の地、ということなのでしょうか？）"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「……どうしましょう、困りましたわ」
line = "「……どうしましょう、困りましたわ」"

[[dialogue]]
speaker = "アイリーン"
# 「どうしたの？　私でよかったらお話聞くけど？」
line = "「どうしたの？　私でよかったらお話聞くけど？」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「ありがとうございます、親切なお方。わたくしはハルツの魔法使い、ノルトハウゼンですわ」
line = "「ありがとうございます、親切なお方。わたくしはハルツの魔法使い、ノルトハウゼンですわ」"

[[dialogue]]
speaker = "アイリーン"
# 「魔法使いっ！？」
line = "「魔法使いっ！？」"

[[dialogue]]
speaker = "アイリーン"
# 「あ……えーっと、魔法使い？　魔女ではなくて？」
line = "「あ……えーっと、魔法使い？　魔女ではなくて？」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「はい、人々に夢と希望を届ける魔法使いですわ♪」
line = "「はい、人々に夢と希望を届ける魔法使いですわ♪」"

[[dialogue]]
speaker = "アイリーン"
# 「うーん……」
line = "「うーん……」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「どうかなさいましたか？」
line = "「どうかなさいましたか？」"

[[dialogue]]
speaker = "アイリーン"
# 「あー、いやいや、ちょっとね。とりあえず、おねーさんがどういう人なのか、もっと詳しく知りたいかな～」
line = "「あー、いやいや、ちょっとね。とりあえず、おねーさんがどういう人なのか、もっと詳しく知りたいかな～」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「詳しく、ですか？　わかりました、ではお話しいたしますわ」
line = "「詳しく、ですか？　わかりました、ではお話しいたしますわ」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「わたくしはイリスクラウドにあるアイゼングラート、その山奥にあるハルツという町の出身ですわ」
line = "「わたくしはイリスクラウドにあるアイゼングラート、その山奥にあるハルツという町の出身ですわ」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「その町には『ハルツ魔法アカデミー』という魔法を学ぶ学校がありますの」
line = "「その町には『ハルツ魔法アカデミー』という魔法を学ぶ学校がありますの」"

[[dialogue]]
speaker = "アイリーン"
# 「魔法を学ぶ学校！？　聞いたことないよ、そんなところがあるの？」
line = "「魔法を学ぶ学校！？　聞いたことないよ、そんなところがあるの？」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「そうなんです。素敵な魔法使いを目指す女の子たちが集まる場所ですわ」
line = "「そうなんです。素敵な魔法使いを目指す女の子たちが集まる場所ですわ」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「ハルツの魔法は『ドリームマジック』と呼ばれ、多くのみなさんから愛されていますのよ」
line = "「ハルツの魔法は『ドリームマジック』と呼ばれ、多くのみなさんから愛されていますのよ」"

[[dialogue]]
speaker = "アイリーン"
# 「じゃ、おねーさんもその学校の卒業生なんだ！」
line = "「じゃ、おねーさんもその学校の卒業生なんだ！」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「はい。他の方より時間がかかってしまいましたが、無事卒業して、魔法使いになることができましたわ」
line = "「はい。他の方より時間がかかってしまいましたが、無事卒業して、魔法使いになることができましたわ」"

[[dialogue]]
speaker = "アイリーン"
# 「魔法って、どんなものが使えるの？」
line = "「魔法って、どんなものが使えるの？」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「空に虹をかけたり、星を降らせたり、花火を打ち上げたり、でしょうか。そういった人々を楽しませる魔法ですのよ」
line = "「空に虹をかけたり、星を降らせたり、花火を打ち上げたり、でしょうか。そういった人々を楽しませる魔法ですのよ」"

[[dialogue]]
speaker = "アイリーン"
# （うーん、想像してた魔法と違うかも……少なくとも私たち『魔女』とは関係ないってことなのかなあ？）
line = "（うーん、想像してた魔法と違うかも……少なくとも私たち『魔女』とは関係ないってことなのかなあ？）"

[[dialogue]]
speaker = "アイリーン"
# （それにしても、この人……）
line = "（それにしても、この人……）"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「──わたくしが１番感動した魔法は、何といってもお姉さまに見せてもらった『星降らし』の魔法です」
line = "「──わたくしが１番感動した魔法は、何といってもお姉さまに見せてもらった『星降らし』の魔法です」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「ハルツに来ることがありましたら、ぜひ見て行ってください。あなたもきっと感動すると思いますわ」
line = "「ハルツに来ることがありましたら、ぜひ見て行ってください。あなたもきっと感動すると思いますわ」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「わたくしがお見せできればよいのですけど、それはとても難しい魔法で……今のわたくしではきっと成功させることはできないでしょう」
line = "「わたくしがお見せできればよいのですけど、それはとても難しい魔法で……今のわたくしではきっと成功させることはできないでしょう」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「けれど、何年かかっても成し遂げて見せますわ。わたくしの魔法でみなさんを笑顔にしたいんですの」
line = "「けれど、何年かかっても成し遂げて見せますわ。わたくしの魔法でみなさんを笑顔にしたいんですの」"

[[dialogue]]
speaker = "アイリーン"
# （なんか、いいね！　魔法のこと話してる時のこの人、本当に楽しそう♪）
line = "（なんか、いいね！　魔法のこと話してる時のこの人、本当に楽しそう♪）"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「あ……つい夢中になって一方的にお話ししてしまいましたわ」
line = "「あ……つい夢中になって一方的にお話ししてしまいましたわ」"

[[dialogue]]
speaker = "アイリーン"
# 「ううん。ハルツの魔法っていうのがどれだけ素敵なものなのか、すっごく伝わって来たよ！」
line = "「ううん。ハルツの魔法っていうのがどれだけ素敵なものなのか、すっごく伝わって来たよ！」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「まぁ、それは何よりも嬉しいお言葉ですわ♪」
line = "「まぁ、それは何よりも嬉しいお言葉ですわ♪」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「楽しい時間をありがとうございます。それでは親切なお方、ごきげんよう──」
line = "「楽しい時間をありがとうございます。それでは親切なお方、ごきげんよう──」"

[[dialogue]]
speaker = "アイリーン"
# 「あーっ、ちょっと待った、ちょっと待った！！」
line = "「あーっ、ちょっと待った、ちょっと待った！！」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「はい？」
line = "「はい？」"

[[dialogue]]
speaker = "アイリーン"
# 「何か困ってて私に声をかけたんだよね？」
line = "「何か困ってて私に声をかけたんだよね？」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「そうでしたわ。わたくし、なぜ自分がこのような場所にいるのか、分からないのです」
line = "「そうでしたわ。わたくし、なぜ自分がこのような場所にいるのか、分からないのです」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「いつものように魔法の練習をしていると黒い穴のようなものが現れ、それから目の前が真っ暗になって、気が付いたらこの街へ来ていました」
line = "「いつものように魔法の練習をしていると黒い穴のようなものが現れ、それから目の前が真っ暗になって、気が付いたらこの街へ来ていました」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「なんとかイリスクラウドに戻る事は出来ないのでしょうか？」
line = "「なんとかイリスクラウドに戻る事は出来ないのでしょうか？」"

[[dialogue]]
speaker = "アイリーン"
# 「戻るもなにも、そこがどこだか分からないからな～……」
line = "「戻るもなにも、そこがどこだか分からないからな～……」"

[[dialogue]]
speaker = "アイリーン"
# （黒い穴っていうのもよく分かんないし、なんか普通じゃないことに巻き込まれてるっぽい）
line = "（黒い穴っていうのもよく分かんないし、なんか普通じゃないことに巻き込まれてるっぽい）"

[[dialogue]]
speaker = "アイリーン"
# （魔法の話を外でベラベラ話されても困るし、とりあえずネビュラで保護しといた方が良さそう）
line = "（魔法の話を外でベラベラ話されても困るし、とりあえずネビュラで保護しといた方が良さそう）"

[[dialogue]]
speaker = "アイリーン"
# （長官に報告したら、どうしたらいいか指示ももらえるだろうし）
line = "（長官に報告したら、どうしたらいいか指示ももらえるだろうし）"

[[dialogue]]
speaker = "アイリーン"
# 「そうしたら、私と一緒に来てくれないかな？　もしかしたらそのイリスクラウドって場所のこと、知ってる人がいるかもだから」
line = "「そうしたら、私と一緒に来てくれないかな？　もしかしたらそのイリスクラウドって場所のこと、知ってる人がいるかもだから」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「ありがとうございます、助かりますわ」
line = "「ありがとうございます、助かりますわ」"

[[dialogue]]
speaker = "アイリーン"
# 「よーし、それじゃあしゅっぱ～つ♪」
line = "「よーし、それじゃあしゅっぱ～つ♪」"

[[dialogue]]
speaker = "unk"
# こうしてノルトハウゼンは保護され、ネビュラの基地へと向かうことになったのだった。
line = "こうしてノルトハウゼンは保護され、ネビュラの基地へと向かうことになったのだった。"
