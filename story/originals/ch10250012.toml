[[dialogue]]
speaker = "unk"
# 第２話,舞亜修行中,P
line = "第２話,舞亜修行中,P"

[[dialogue]]
speaker = "舞亜"
# 「ふっ──、はっ──」
line = "「ふっ──、はっ──」"

[[dialogue]]
speaker = "ソフィア"
# 「もっと鋭く速く、星力を刃のように研ぎ澄ませるようなイメージです」
line = "「もっと鋭く速く、星力を刃のように研ぎ澄ませるようなイメージです」"

[[dialogue]]
speaker = "舞亜"
# 「こう──かな」
line = "「こう──かな」"

[[dialogue]]
speaker = "ソフィア"
# 「そうです、その感じです」
line = "「そうです、その感じです」"

[[dialogue]]
speaker = "unk"
# 特訓中？
line = "特訓中？"

[[dialogue]]
speaker = "舞亜"
# 「うん。私、大会とかで学園にいないことも多いから、ソフィに星術を教えてもらってるんだ」
line = "「うん。私、大会とかで学園にいないことも多いから、ソフィに星術を教えてもらってるんだ」"

[[dialogue]]
speaker = "舞亜"
# 「流星学園に入ったからには、ちゃんと誰かを守れる星騎士になりたいからね」
line = "「流星学園に入ったからには、ちゃんと誰かを守れる星騎士になりたいからね」"

[[dialogue]]
speaker = "ソフィア"
# 「舞亜さんは忙しいので、いつもというわけではないですが。これでも流星の星徒会役員ですから同学年の指導はできます」
line = "「舞亜さんは忙しいので、いつもというわけではないですが。これでも流星の星徒会役員ですから同学年の指導はできます」"

[[dialogue]]
speaker = "ソフィア"
# 「ついでに勉強も見ています。舞亜さんは英語以外壊滅的ですからね……」
line = "「ついでに勉強も見ています。舞亜さんは英語以外壊滅的ですからね……」"

[[dialogue]]
speaker = "舞亜"
# 「ふふ、流星の受験の時は英語で一点突破したよ」
line = "「ふふ、流星の受験の時は英語で一点突破したよ」"

[[dialogue]]
speaker = "ソフィア"
# 「褒めてませんっ」
line = "「褒めてませんっ」"

[[dialogue]]
speaker = "舞亜"
# 「ははは。ソフィにはほんとに助けられてるよ。いつもありがとう」
line = "「ははは。ソフィにはほんとに助けられてるよ。いつもありがとう」"

[[dialogue]]
speaker = "ソフィア"
# 「むー……」
line = "「むー……」"

[[dialogue]]
speaker = "舞亜"
# 「そうだ、会長さんにもトレーニングお願いしていいかな？　とっても強いんでしょ」
line = "「そうだ、会長さんにもトレーニングお願いしていいかな？　とっても強いんでしょ」"

[[dialogue]]
speaker = "unk"
# お安い御用だ
line = "お安い御用だ"

[[dialogue]]
speaker = "舞亜"
# 「ふふっ、気前がいいね。それじゃお願いします」
line = "「ふふっ、気前がいいね。それじゃお願いします」"

[[dialogue]]
speaker = "舞亜"
# 「ふぅ……ありがとう、会長さん。自分でも動きが良くなった気がするよ」
line = "「ふぅ……ありがとう、会長さん。自分でも動きが良くなった気がするよ」"

[[dialogue]]
speaker = "舞亜"
# 「もしかして、女の子をエスコートするのは手慣れてるのかな？」
line = "「もしかして、女の子をエスコートするのは手慣れてるのかな？」"

[[dialogue]]
speaker = "unk"
# いや全然
line = "いや全然"

[[dialogue]]
speaker = "舞亜"
# 「そうなんだ。会長さん、モテそうなのにね」
line = "「そうなんだ。会長さん、モテそうなのにね」"

[[dialogue]]
speaker = "ソフィア"
# 「そろそろ終わりにしましょうか。フィギュアの試合も近いですし、体に障ると良くないです」
line = "「そろそろ終わりにしましょうか。フィギュアの試合も近いですし、体に障ると良くないです」"

[[dialogue]]
speaker = "舞亜"
# 「ごめん、もうちょっとだけいい？　最近フィギュアの練習ばかりだったし、あと少しで感覚が掴めそうなんだ」
line = "「ごめん、もうちょっとだけいい？　最近フィギュアの練習ばかりだったし、あと少しで感覚が掴めそうなんだ」"

[[dialogue]]
speaker = "unk"
# どうしてそんなに一生懸命なんだ？
line = "どうしてそんなに一生懸命なんだ？"

[[dialogue]]
speaker = "舞亜"
# 「私ね、星になりたいんだ」
line = "「私ね、星になりたいんだ」"

[[dialogue]]
speaker = "unk"
# 星？
line = "星？"

[[dialogue]]
speaker = "舞亜"
# 「ああ、変な言い方しちゃったね」
line = "「ああ、変な言い方しちゃったね」"

[[dialogue]]
speaker = "舞亜"
# 「前にフィギュアスケートの会場にモンスターが現れたことがあって、星騎士に助けてもらったんだ」
line = "「前にフィギュアスケートの会場にモンスターが現れたことがあって、星騎士に助けてもらったんだ」"

[[dialogue]]
speaker = "舞亜"
# 「その時の星騎士さんがとてもかっこよくて、その名の通り、夜空に輝く星みたいだと思って」
line = "「その時の星騎士さんがとてもかっこよくて、その名の通り、夜空に輝く星みたいだと思って」"

[[dialogue]]
speaker = "舞亜"
# 「私もそんな存在になりたいと思ってここに来たんだ」
line = "「私もそんな存在になりたいと思ってここに来たんだ」"

[[dialogue]]
speaker = "舞亜"
# 「親は、私はスケート以外興味ないと思ってたみたいで、すごく驚いてたけど。でも話したらちゃんと理解してくれた」
line = "「親は、私はスケート以外興味ないと思ってたみたいで、すごく驚いてたけど。でも話したらちゃんと理解してくれた」"

[[dialogue]]
speaker = "舞亜"
# 「あと、私を助けてくれた星騎士さんにもう一度会ってお礼を言いたくて」
line = "「あと、私を助けてくれた星騎士さんにもう一度会ってお礼を言いたくて」"

[[dialogue]]
speaker = "ソフィア"
# 「その星騎士はどなたなんでしょうね。フィオナ会長やセーラ先輩は覚えがないと言っていましたが」
line = "「その星騎士はどなたなんでしょうね。フィオナ会長やセーラ先輩は覚えがないと言っていましたが」"

[[dialogue]]
speaker = "舞亜"
# 「うーん、流星に入ってから見たことないんだよね、その人。大人っぽい人だからもう卒業してるのかも。名前聞いておけばよかったなぁ」
line = "「うーん、流星に入ってから見たことないんだよね、その人。大人っぽい人だからもう卒業してるのかも。名前聞いておけばよかったなぁ」"

[[dialogue]]
speaker = "舞亜"
# 「まぁ、星騎士として戦ってたらきっとそのうち会えるでしょ。そのためにも強くならないとね」
line = "「まぁ、星騎士として戦ってたらきっとそのうち会えるでしょ。そのためにも強くならないとね」"

[[dialogue]]
speaker = "ソフィア"
# 「星力で空中に氷を作って滑るとは……さすが舞亜さん、フィギュアスケートの動きを取り入れた綺麗な技です」
line = "「星力で空中に氷を作って滑るとは……さすが舞亜さん、フィギュアスケートの動きを取り入れた綺麗な技です」"

[[dialogue]]
speaker = "舞亜"
# 「だって怖いじゃん、空飛ぶのって」
line = "「だって怖いじゃん、空飛ぶのって」"

[[dialogue]]
speaker = "ソフィア"
# 「は──？」
line = "「は──？」"

[[dialogue]]
speaker = "舞亜"
# 「みんな戦うときはビュンビュン飛んでるけど、人が重力に反して飛ぶなんておかしくない？」
line = "「みんな戦うときはビュンビュン飛んでるけど、人が重力に反して飛ぶなんておかしくない？」"

[[dialogue]]
speaker = "舞亜"
# 「スケートのジャンプは自分の足で跳んでるからいいんだけどさ、星力で飛ぶと足元がふわふわして不安になるんだ」
line = "「スケートのジャンプは自分の足で跳んでるからいいんだけどさ、星力で飛ぶと足元がふわふわして不安になるんだ」"

[[dialogue]]
speaker = "unk"
# だから氷の上滑ってるんだ……
line = "だから氷の上滑ってるんだ……"

[[dialogue]]
speaker = "舞亜"
# 「そうだよ。飛行機乗る時も怖いからいつも毛布被って全力で寝てるし」
line = "「そうだよ。飛行機乗る時も怖いからいつも毛布被って全力で寝てるし」"

[[dialogue]]
speaker = "ソフィア"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ソフィア"
# 「私の感心を返してくださいっ」
line = "「私の感心を返してくださいっ」"

[[dialogue]]
speaker = "舞亜"
# 「そう言われてもなー。ほかのことで感心してもらうから返さなくていい？」
line = "「そう言われてもなー。ほかのことで感心してもらうから返さなくていい？」"

[[dialogue]]
speaker = "ソフィア"
# 「そういう問題じゃありません。むぅ……」
line = "「そういう問題じゃありません。むぅ……」"

[[dialogue]]
speaker = "舞亜"
# 「じゃあ今度、新しい衣装とプログラムを見せてあげる。まだどこの大会でも使ってないやつだよ」
line = "「じゃあ今度、新しい衣装とプログラムを見せてあげる。まだどこの大会でも使ってないやつだよ」"

[[dialogue]]
speaker = "ソフィア"
# 「それなら──というかむしろサービスしすぎじゃないですか！？」
line = "「それなら──というかむしろサービスしすぎじゃないですか！？」"

[[dialogue]]
speaker = "舞亜"
# 「言ったでしょ、ソフィには助けられてるって。あ、会長さんもついでに見る？」
line = "「言ったでしょ、ソフィには助けられてるって。あ、会長さんもついでに見る？」"

[[dialogue]]
speaker = "舞亜"
# 「あ、でもけっこうきわどい衣装だから、エッチな目で見ちゃダメだよ？　ふふふっ♪」
line = "「あ、でもけっこうきわどい衣装だから、エッチな目で見ちゃダメだよ？　ふふふっ♪」"
