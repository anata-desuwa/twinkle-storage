[[dialogue]]
speaker = "unk"
# そして、ついに――
line = "そして、ついに――"

[[dialogue]]
speaker = "アラクネ"
# 「――――っ！！」
line = "「――――っ！！」"

[[dialogue]]
speaker = "オムニス"
# 「や、やった……！」
line = "「や、やった……！」"

[[dialogue]]
speaker = "いろは"
# 「全部倒した～～っ！！」
line = "「全部倒した～～っ！！」"

[[dialogue]]
speaker = "花織"
# 「やった～～っ！！」
line = "「やった～～っ！！」"

[[dialogue]]
speaker = "ここあ"
# 「いぇ～い☆　勝ったぁ～っ♪」
line = "「いぇ～い☆　勝ったぁ～っ♪」"

[[dialogue]]
speaker = "unk"
# 魔法少女たちは目の前に立ち塞がっていた最後の１体を倒し、悪魔討伐を果たすことに成功した。
line = "魔法少女たちは目の前に立ち塞がっていた最後の１体を倒し、悪魔討伐を果たすことに成功した。"

[[dialogue]]
speaker = "陽彩"
# 「ふぅ……少なくともこの辺りにいたアラクネは全て倒し切ったようだ。これでひとまずは安心だな……」
line = "「ふぅ……少なくともこの辺りにいたアラクネは全て倒し切ったようだ。これでひとまずは安心だな……」"

[[dialogue]]
speaker = "オムニス"
# 「みんな、お疲れ様！　陽彩もすごかったぞ！」
line = "「みんな、お疲れ様！　陽彩もすごかったぞ！」"

[[dialogue]]
speaker = "陽彩"
# 「ああ。皮肉にも、向こうの世界やみんなに迷惑をかけた力があったからこそ、状況を打開することができた……」
line = "「ああ。皮肉にも、向こうの世界やみんなに迷惑をかけた力があったからこそ、状況を打開することができた……」"

[[dialogue]]
speaker = "陽彩"
# 「これだけで、ぼくのやったことの罪滅ぼしになったとは思わないが……」
line = "「これだけで、ぼくのやったことの罪滅ぼしになったとは思わないが……」"

[[dialogue]]
speaker = "いろは"
# 「そんなことないよ！　陽彩ちゃん、ピンチを助けてくれて、ありがと～♪」
line = "「そんなことないよ！　陽彩ちゃん、ピンチを助けてくれて、ありがと～♪」"

[[dialogue]]
speaker = "陽彩"
# 「わっ！？　い、いろは、いきなり抱き着いてきたら驚くだろう！」
line = "「わっ！？　い、いろは、いきなり抱き着いてきたら驚くだろう！」"

[[dialogue]]
speaker = "いろは"
# 「感謝の気持ちを伝えたかったから♪　本当に陽彩ちゃんのお陰なんだから、貸し借りなし！　今回のことは気にしないで！」
line = "「感謝の気持ちを伝えたかったから♪　本当に陽彩ちゃんのお陰なんだから、貸し借りなし！　今回のことは気にしないで！」"

[[dialogue]]
speaker = "陽彩"
# 「そうは言っても……周りに大きな迷惑をかけたって思うと、やっぱり落ち込むんだ……」
line = "「そうは言っても……周りに大きな迷惑をかけたって思うと、やっぱり落ち込むんだ……」"

[[dialogue]]
speaker = "いろは"
# 「う～ん、でもさ、もし逆の立場だったら、陽彩ちゃんだって助けてくれようとするでしょ？」
line = "「う～ん、でもさ、もし逆の立場だったら、陽彩ちゃんだって助けてくれようとするでしょ？」"

[[dialogue]]
speaker = "いろは"
# 「あたしが悪魔に寄生されて、異世界に飛び出しちゃった～……ってなったらさ！」
line = "「あたしが悪魔に寄生されて、異世界に飛び出しちゃった～……ってなったらさ！」"

[[dialogue]]
speaker = "陽彩"
# 「それは、まぁ…………友達だし」
line = "「それは、まぁ…………友達だし」"

[[dialogue]]
speaker = "いろは"
# 「だから、こういうのお互い様だよ！　あたしが、もしもこの先――」
line = "「だから、こういうのお互い様だよ！　あたしが、もしもこの先――」"

[[dialogue]]
speaker = "いろは"
# 「同じように悪魔になっちゃったりしたら、今度は陽彩ちゃんが助けにきてよ！　もちろん、ここにゃんや――カオリンもね♪」
line = "「同じように悪魔になっちゃったりしたら、今度は陽彩ちゃんが助けにきてよ！　もちろん、ここにゃんや――カオリンもね♪」"

[[dialogue]]
speaker = "花織"
# 「あのねぇ……せっかく勝ったんだから、縁起でもないこと言わないでよ～」
line = "「あのねぇ……せっかく勝ったんだから、縁起でもないこと言わないでよ～」"

[[dialogue]]
speaker = "いろは"
# 「あははっ♪　ごめ～ん！」
line = "「あははっ♪　ごめ～ん！」"

[[dialogue]]
speaker = "ここあ"
# 「にゃははっ☆　いろはすなら、闇落ちしかけても気合いでなんとかちゃいそうだけどね～」
line = "「にゃははっ☆　いろはすなら、闇落ちしかけても気合いでなんとかちゃいそうだけどね～」"

[[dialogue]]
speaker = "陽彩"
# 「あ～……その、あれだ……」
line = "「あ～……その、あれだ……」"

[[dialogue]]
speaker = "いろは"
# 「ん？　陽彩ちゃん、どうかした？」
line = "「ん？　陽彩ちゃん、どうかした？」"

[[dialogue]]
speaker = "陽彩"
# 「ぼくはいろはみたいに人付き合いが得意じゃないから、上手く言えていなかった気がするんだけど……」
line = "「ぼくはいろはみたいに人付き合いが得意じゃないから、上手く言えていなかった気がするんだけど……」"

[[dialogue]]
speaker = "陽彩"
# 「今回の件は、本当にみんなに迷惑をかけた……すまないっ。あと――」
line = "「今回の件は、本当にみんなに迷惑をかけた……すまないっ。あと――」"

[[dialogue]]
speaker = "陽彩"
# 「助けに来てくれて……ありがとう。本当に、感謝してる」
line = "「助けに来てくれて……ありがとう。本当に、感謝してる」"

[[dialogue]]
speaker = "いろは"
# 「うんっ、どういたしまして♪」
line = "「うんっ、どういたしまして♪」"

[[dialogue]]
speaker = "花織"
# 「陽彩ちゃんが無事でよかったよ！」
line = "「陽彩ちゃんが無事でよかったよ！」"

[[dialogue]]
speaker = "ここあ"
# 「終わり良ければすべて良しってね☆」
line = "「終わり良ければすべて良しってね☆」"

[[dialogue]]
speaker = "ここあ"
# 「それじゃ、ここあたちの世界に帰ろう♪　他のみんなもきっと、寂しがってるんじゃないかにゃ～？」
line = "「それじゃ、ここあたちの世界に帰ろう♪　他のみんなもきっと、寂しがってるんじゃないかにゃ～？」"

[[dialogue]]
speaker = "オムニス"
# 「そうだな。帰ろう、陽彩！」
line = "「そうだな。帰ろう、陽彩！」"

[[dialogue]]
speaker = "陽彩"
# 「ああ。道中にまだ悪魔が残っている可能性もあるから、気を付けて帰ろう」
line = "「ああ。道中にまだ悪魔が残っている可能性もあるから、気を付けて帰ろう」"

[[dialogue]]
speaker = "いろは"
# 「よ～し、それじゃあ改めて、みんなで仲良く、しゅっぱ～つ♪」
line = "「よ～し、それじゃあ改めて、みんなで仲良く、しゅっぱ～つ♪」"

[[dialogue]]
speaker = "unk"
# こうして、陽彩は明るい表情を取り戻して、友達と共に元の世界へと帰って行くのだった。
line = "こうして、陽彩は明るい表情を取り戻して、友達と共に元の世界へと帰って行くのだった。"
