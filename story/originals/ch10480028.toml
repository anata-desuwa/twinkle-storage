line = "「はああぁっ……<emoji=heart04>　あぁんっ<emoji=heart04>　やっと射精、止まったぁ……<emoji=heart04>　ふうぅ、はあぁっ<emoji=heart04>」"

[[dialogue]]
speaker = "マハムート"
# 「あっ、あんっ<emoji=heart04>　チ○ポ抜けて……<emoji=heart04>」
line = "「あっ、あんっ<emoji=heart04>　チ○ポ抜けて……<emoji=heart04>」"

[[dialogue]]
speaker = "マハムート"
# 「はぁ……はぁ……<emoji=heart04>　んん……<emoji=heart04>」
line = "「はぁ……はぁ……<emoji=heart04>　んん……<emoji=heart04>」"

[[dialogue]]
speaker = "マハムート"
# 「貴方の精子、入り切らずに、溢れて来てる……<emoji=heart04>　んっ<emoji=heart04>　相変わらず、凶悪な射精量なんだから……<emoji=heart04>」
line = "「貴方の精子、入り切らずに、溢れて来てる……<emoji=heart04>　んっ<emoji=heart04>　相変わらず、凶悪な射精量なんだから……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
# 「してる最中のマムが、エッチ過ぎるせいだよ」
line = "「してる最中のマムが、エッチ過ぎるせいだよ」"

[[dialogue]]
speaker = "マハムート"
# 「ふふっ……でも、貴方の男らしい攻めも、なかなか悪くなかったわよ<emoji=heart04>」
line = "「ふふっ……でも、貴方の男らしい攻めも、なかなか悪くなかったわよ<emoji=heart04>」"

[[dialogue]]
speaker = "マハムート"
# 「ん……ちゅっ<emoji=heart04>」
line = "「ん……ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# マムはそっと、キスをしてくれる。
line = "マムはそっと、キスをしてくれる。"

[[dialogue]]
speaker = "unk"
# それから少し、余韻を楽しむように抱き合ってから――
line = "それから少し、余韻を楽しむように抱き合ってから――"

[[dialogue]]
speaker = "マハムート"
# 「……さて、会長。汚れちゃったし、１回シャワーを浴びに行きましょうか」
line = "「……さて、会長。汚れちゃったし、１回シャワーを浴びに行きましょうか」"

[[dialogue]]
speaker = "マハムート"
# 「せっかくだし、このまま海の家まで運んでもらおうかしら？」
line = "「せっかくだし、このまま海の家まで運んでもらおうかしら？」"

[[dialogue]]
speaker = "クロト"
# 「イエス・マム」
line = "「イエス・マム」"

[[dialogue]]
speaker = "マハムート"
# 「ふふっ……よろしく頼むわ。ああ、そうだ……言い忘れてたわ。熱が冷める前に――」
line = "「ふふっ……よろしく頼むわ。ああ、そうだ……言い忘れてたわ。熱が冷める前に――」"

[[dialogue]]
speaker = "unk"
# マムは俺の耳元でそっと囁く。
line = "マムは俺の耳元でそっと囁く。"

[[dialogue]]
speaker = "マハムート"
# 「会長。私も……愛してるわよ<emoji=heart04>」
line = "「会長。私も……愛してるわよ<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
# 「っ……！？」
line = "「っ……！？」"

[[dialogue]]
speaker = "マハムート"
# 「って、あら？　もう……悪い子ね。また復活して、お尻に当たってるわよ？」
line = "「って、あら？　もう……悪い子ね。また復活して、お尻に当たってるわよ？」"

[[dialogue]]
speaker = "クロト"
# 「これは……マムが不意打ちするから……」
line = "「これは……マムが不意打ちするから……」"

[[dialogue]]
speaker = "マハムート"
# 「私のせい？　でも、シャワーは一緒に浴びるだけよ？　ふふっ<emoji=heart04>」
line = "「私のせい？　でも、シャワーは一緒に浴びるだけよ？　ふふっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そう言いつつもシャワールームに着くと、仕方ないわねと甘くささやいて、また恋人のお世話してくれるマムなのだった――
line = "そう言いつつもシャワールームに着くと、仕方ないわねと甘くささやいて、また恋人のお世話してくれるマムなのだった――"
