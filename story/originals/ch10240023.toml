[[dialogue]]
speaker = "unk"
# 第３話,ヨミとブラッシング,P
line = "第３話,ヨミとブラッシング,P"

[[dialogue]]
speaker = "unk"
# ぶっちゃけた話、俺はヨミの尻尾をモフモフするのが大好きである。
line = "ぶっちゃけた話、俺はヨミの尻尾をモフモフするのが大好きである。"

[[dialogue]]
speaker = "ヨミ"
# 「会長、仕事お疲れ様です。少し休憩にしますか？」
line = "「会長、仕事お疲れ様です。少し休憩にしますか？」"

[[dialogue]]
speaker = "ヨミ"
# 「それなら私、緑茶を入れてきますね――って、尻尾をモフりたい気分……ですか？」
line = "「それなら私、緑茶を入れてきますね――って、尻尾をモフりたい気分……ですか？」"

[[dialogue]]
speaker = "ヨミ"
# 「も、もう！　会長ってば、まだ昼間なのに……い、いえ、夜だからいいってわけじゃないですけど……！」
line = "「も、もう！　会長ってば、まだ昼間なのに……い、いえ、夜だからいいってわけじゃないですけど……！」"

[[dialogue]]
speaker = "ヨミ"
# 「星徒会メンバーの方がきて見られたりしたら、変な目で見られちゃいますよ……？　その……エッチなことしてた、って……」
line = "「星徒会メンバーの方がきて見られたりしたら、変な目で見られちゃいますよ……？　その……エッチなことしてた、って……」"

[[dialogue]]
speaker = "ヨミ"
# 「――他の人には触らせてるのに、恋人の自分はダメなのか、って……そ、それは女性の友達相手なので、会長に触られるのとは違うっていうか……」
line = "「――他の人には触らせてるのに、恋人の自分はダメなのか、って……そ、それは女性の友達相手なので、会長に触られるのとは違うっていうか……」"

[[dialogue]]
speaker = "ヨミ"
# 「どう違うのかって聞かれると、その……好きな人に触られると、ドキドキしちゃうというか……」
line = "「どう違うのかって聞かれると、その……好きな人に触られると、ドキドキしちゃうというか……」"

[[dialogue]]
speaker = "ヨミ"
# 「あっ、会長……<emoji=heart04>　尻尾モフっていいって、まだ言ってないのに……んっ……<emoji=heart04>」
line = "「あっ、会長……<emoji=heart04>　尻尾モフっていいって、まだ言ってないのに……んっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 恋人のスキンシップ……ダメか？
line = "恋人のスキンシップ……ダメか？"

[[dialogue]]
speaker = "ヨミ"
# 「こやん<emoji=heart04>　尻尾撫でながら、耳元で囁くのはずるいですよぉ……<emoji=heart04>」
line = "「こやん<emoji=heart04>　尻尾撫でながら、耳元で囁くのはずるいですよぉ……<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
# 「私、せっかく自重してたのに……流されちゃいます……<emoji=heart04>」
line = "「私、せっかく自重してたのに……流されちゃいます……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 尻尾は嬉しそうに左右に揺れている。そのモフモフとした感触を楽しんでいると――不意に、くしゃみが出てしまった。
line = "尻尾は嬉しそうに左右に揺れている。そのモフモフとした感触を楽しんでいると――不意に、くしゃみが出てしまった。"

[[dialogue]]
speaker = "ヨミ"
# 「会長、どうしました？　――え？　鼻がなんだかムズムズする……？」
line = "「会長、どうしました？　――え？　鼻がなんだかムズムズする……？」"

[[dialogue]]
speaker = "unk"
# それから数日経った、放課後。俺はヨミから空き教室に呼び出された――
line = "それから数日経った、放課後。俺はヨミから空き教室に呼び出された――"

[[dialogue]]
speaker = "ヨミ"
# 「会長……お伝えしなければならないことがあります。申し訳ないんですけど――」
line = "「会長……お伝えしなければならないことがあります。申し訳ないんですけど――」"

[[dialogue]]
speaker = "ヨミ"
# 「今日から尻尾モフモフは禁止になります」
line = "「今日から尻尾モフモフは禁止になります」"

[[dialogue]]
speaker = "unk"
# 終わりだ……
line = "終わりだ……"

[[dialogue]]
speaker = "ヨミ"
# 「ちょっ、世界が終わったみたいな絶望的な顔に！？　そんなショック受けます！？」
line = "「ちょっ、世界が終わったみたいな絶望的な顔に！？　そんなショック受けます！？」"

[[dialogue]]
speaker = "unk"
# 俺の心の癒しが……（涙）
line = "俺の心の癒しが……（涙）"

[[dialogue]]
speaker = "ヨミ"
# 「泣くほど！？　お、落ち着いてください、会長！　だ、ダメというのはその、理由があって……！」
line = "「泣くほど！？　お、落ち着いてください、会長！　だ、ダメというのはその、理由があって……！」"

[[dialogue]]
speaker = "ヨミ"
# 「先日、会長がモフモフしてた時に、くしゃみをしてたじゃないですか。それで確認してみたんですけど――」
line = "「先日、会長がモフモフしてた時に、くしゃみをしてたじゃないですか。それで確認してみたんですけど――」"

[[dialogue]]
speaker = "ヨミ"
# 「どうやら私、換毛期に入ったみたいで、恥ずかしながら、抜け毛が多くなってるようなんです……」
line = "「どうやら私、換毛期に入ったみたいで、恥ずかしながら、抜け毛が多くなってるようなんです……」"

[[dialogue]]
speaker = "ヨミ"
# 「なので、換毛期が終わるまでは、控えていただけると……」
line = "「なので、換毛期が終わるまでは、控えていただけると……」"

[[dialogue]]
speaker = "unk"
# なら、ブラッシングをしよう！
line = "なら、ブラッシングをしよう！"

[[dialogue]]
speaker = "ヨミ"
# 「え？　――会長がブラシでしてくれるんですか？　それならモフれるから一石二鳥……？」
line = "「え？　――会長がブラシでしてくれるんですか？　それならモフれるから一石二鳥……？」"

[[dialogue]]
speaker = "ヨミ"
# 「下心丸出しじゃないですかっ！　ま、まぁ……会長がそこまで私の尻尾を気に入ってくれてるのは、悪い気はしないですけど……」
line = "「下心丸出しじゃないですかっ！　ま、まぁ……会長がそこまで私の尻尾を気に入ってくれてるのは、悪い気はしないですけど……」"

[[dialogue]]
speaker = "unk"
# そんなわけで、俺はヘアブラシを用意し、ヨミの尻尾をブラッシングすることになった――
line = "そんなわけで、俺はヘアブラシを用意し、ヨミの尻尾をブラッシングすることになった――"

[[dialogue]]
speaker = "ヨミ"
# 「は、恥ずかしいですけど……よろしくお願いします……」
line = "「は、恥ずかしいですけど……よろしくお願いします……」"

[[dialogue]]
speaker = "ヨミ"
# 「って、んっ……<emoji=heart04>　こ、こやぁ……<emoji=heart04>　会長のブラッシング……な、なんかいやらしいですぅ……！」
line = "「って、んっ……<emoji=heart04>　こ、こやぁ……<emoji=heart04>　会長のブラッシング……な、なんかいやらしいですぅ……！」"

[[dialogue]]
speaker = "ヨミ"
# 「ど、どんな風にって……なんか自分でブラッシングするのと全然違って……マッサージされてるみたいに……<emoji=heart04>　こやんっ……<emoji=heart04>」
line = "「ど、どんな風にって……なんか自分でブラッシングするのと全然違って……マッサージされてるみたいに……<emoji=heart04>　こやんっ……<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
# 「き、気持ちいいのは、だって……会長が変に上手いからで……<emoji=heart04>　ふあぁっ……<emoji=heart04>　なんでそんな手馴れてるんですかぁ……！？」
line = "「き、気持ちいいのは、だって……会長が変に上手いからで……<emoji=heart04>　ふあぁっ……<emoji=heart04>　なんでそんな手馴れてるんですかぁ……！？」"

[[dialogue]]
speaker = "ヨミ"
# 「――ブラッシングのバイトをしたことがある？　いや、どんなバイトなんですか、それぇ……<emoji=heart04>　はあぁ……<emoji=heart04>」
line = "「――ブラッシングのバイトをしたことがある？　いや、どんなバイトなんですか、それぇ……<emoji=heart04>　はあぁ……<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
# 「こやんっ<emoji=heart04>　か、会長ぉ<emoji=heart04>　そ、そこはぁ……<emoji=heart04>　尻尾の付け根は弱いから、ブラッシングされるとぉ……だ、ダメですぅ……<emoji=heart04>　ふうぅ……<emoji=heart04>」
line = "「こやんっ<emoji=heart04>　か、会長ぉ<emoji=heart04>　そ、そこはぁ……<emoji=heart04>　尻尾の付け根は弱いから、ブラッシングされるとぉ……だ、ダメですぅ……<emoji=heart04>　ふうぅ……<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
# 「あっ<emoji=heart04>　会長、どさくさに紛れて手で変なところ触っちゃ……<emoji=heart04>　んっ<emoji=heart04>　ど、同時責めなんてされたら、声が我慢できな――」
line = "「あっ<emoji=heart04>　会長、どさくさに紛れて手で変なところ触っちゃ……<emoji=heart04>　んっ<emoji=heart04>　ど、同時責めなんてされたら、声が我慢できな――」"

[[dialogue]]
speaker = "ヨミ"
# 「こやあぁぁんっ……<emoji=heart04>」
line = "「こやあぁぁんっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ブラッシングが終わった後、ヨミは脱力して俺の胸にもたれかかっていた。
line = "ブラッシングが終わった後、ヨミは脱力して俺の胸にもたれかかっていた。"

[[dialogue]]
speaker = "ヨミ"
# 「はぁ……はぁ……<emoji=heart04>　も、もう……会長、爆裂スケベなんですから……<emoji=heart04>　ダメって言ったのに、意地悪したりして……<emoji=heart04>」
line = "「はぁ……はぁ……<emoji=heart04>　も、もう……会長、爆裂スケベなんですから……<emoji=heart04>　ダメって言ったのに、意地悪したりして……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ヨミが可愛くて、つい……
line = "ヨミが可愛くて、つい……"

[[dialogue]]
speaker = "ヨミ"
# 「またそんなこと言って……何度も誤魔化されませんからね……っ」
line = "「またそんなこと言って……何度も誤魔化されませんからね……っ」"

[[dialogue]]
speaker = "ヨミ"
# 「――その割に喜んでたって？　そ、そんなことありませんからっ」
line = "「――その割に喜んでたって？　そ、そんなことありませんからっ」"

[[dialogue]]
speaker = "ヨミ"
# 「え？　ならブラッシングはこれっきりにする？　そ、その言い方はずるいです……」
line = "「え？　ならブラッシングはこれっきりにする？　そ、その言い方はずるいです……」"

[[dialogue]]
speaker = "ヨミ"
# 「ん……<emoji=heart04>　し、仕方ないですね……その代わり、次は優しくしてくださいね……？」
line = "「ん……<emoji=heart04>　し、仕方ないですね……その代わり、次は優しくしてくださいね……？」"

[[dialogue]]
speaker = "unk"
# そういえば、換毛期ってことは――
line = "そういえば、換毛期ってことは――"

[[dialogue]]
speaker = "ヨミ"
# 「え？　は、はい。確かに、耳も同じように毛が生え変わりますけど……」
line = "「え？　は、はい。確かに、耳も同じように毛が生え変わりますけど……」"

[[dialogue]]
speaker = "ヨミ"
# 「――耳もブラッシングしたい！？　い、いや、そこは尻尾の付け根と同じくらい敏感なので、自分で……あっ<emoji=heart04>」
line = "「――耳もブラッシングしたい！？　い、いや、そこは尻尾の付け根と同じくらい敏感なので、自分で……あっ<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
# 「か、会長……ダメですぅ……<emoji=heart04>　ふあぁんっ……<emoji=heart04>」
line = "「か、会長……ダメですぅ……<emoji=heart04>　ふあぁんっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ヨミの可愛い反応を見たくて、俺はまた、ついブラッシングに熱が入ってしまうのだった――
line = "ヨミの可愛い反応を見たくて、俺はまた、ついブラッシングに熱が入ってしまうのだった――"
