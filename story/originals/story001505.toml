[[dialogue]]
speaker = "unk"
# 一方、サチとプリムラは消えたロストアイテムを探して、図書館へとやってきていた。
line = "一方、サチとプリムラは消えたロストアイテムを探して、図書館へとやってきていた。"

[[dialogue]]
speaker = "プリムラ"
# 「のうサチよ。わざわざ図書館を見回るのに、戦闘服にまで着替える必要があるのか？」
line = "「のうサチよ。わざわざ図書館を見回るのに、戦闘服にまで着替える必要があるのか？」"

[[dialogue]]
speaker = "サチ"
# 「さっきディーラックさんから連絡があってね。校内のところどころに感知術式を設置しておいたらしいんだけど、少し前にここからロストアイテムの反応があったみたい」
line = "「さっきディーラックさんから連絡があってね。校内のところどころに感知術式を設置しておいたらしいんだけど、少し前にここからロストアイテムの反応があったみたい」"

[[dialogue]]
speaker = "プリムラ"
# 「ほう。あやつ、ひょうきんな態度で意外とやるのじゃ！　シズハよりも、我の使い魔としてスカウトするのも悪くないかもしれぬ」
line = "「ほう。あやつ、ひょうきんな態度で意外とやるのじゃ！　シズハよりも、我の使い魔としてスカウトするのも悪くないかもしれぬ」"

[[dialogue]]
speaker = "トレジアンナ"
# 「ただ、私の探索術式では周囲に反応が感じられませんね～。果たして、この場所にとどまってくれているかどうか……」
line = "「ただ、私の探索術式では周囲に反応が感じられませんね～。果たして、この場所にとどまってくれているかどうか……」"

[[dialogue]]
speaker = "サチ"
# 「……！　プリムラ、また体が光ってる！」
line = "「……！　プリムラ、また体が光ってる！」"

[[dialogue]]
speaker = "プリムラ"
# 「なっ……これは……！？」
line = "「なっ……これは……！？」"

[[dialogue]]
speaker = "プリムラ"
# 「また、さっきと同じじゃ！　体の中で力が荒れ狂うように、制御がっ……！」
line = "「また、さっきと同じじゃ！　体の中で力が荒れ狂うように、制御がっ……！」"

[[dialogue]]
speaker = "プリムラ"
# 「ぐっ……ぬあああぁぁぁーーーっ！！？」
line = "「ぐっ……ぬあああぁぁぁーーーっ！！？」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「ま、また……勝手に、この形態に変身を……！」
line = "「ま、また……勝手に、この形態に変身を……！」"

[[dialogue]]
speaker = "サチ"
# 「ということは、近くに解放のロストアイテムがいるってこと……！？」
line = "「ということは、近くに解放のロストアイテムがいるってこと……！？」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「おのれ……どこに隠れておるのじゃ！　貴様、出てこーいっ！　人の体で遊びおって！」
line = "「おのれ……どこに隠れておるのじゃ！　貴様、出てこーいっ！　人の体で遊びおって！」"

[[dialogue]]
speaker = "unk"
# と、その時だった。
line = "と、その時だった。"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「……って、今度はなんじゃ！？　急に真っ暗じゃぞ！？」
line = "「……って、今度はなんじゃ！？　急に真っ暗じゃぞ！？」"

[[dialogue]]
speaker = "サチ"
# 「な、何ここ……！？　強制的に転移させられた……！？」
line = "「な、何ここ……！？　強制的に転移させられた……！？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「……！　こ、ここは……『深淵書庫』……！」
line = "「……！　こ、ここは……『深淵書庫』……！」"

[[dialogue]]
speaker = "サチ"
# 「この場所を知っているんですか、トレジアンナさん？」
line = "「この場所を知っているんですか、トレジアンナさん？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「ええ、この場所の存在は、学園に来る前から知っていました」
line = "「ええ、この場所の存在は、学園に来る前から知っていました」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「お、おい。どういうことじゃ、ここは……」
line = "「お、おい。どういうことじゃ、ここは……」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「周りの至るところから、ロストアイテムの反応がするぞ……！？」
line = "「周りの至るところから、ロストアイテムの反応がするぞ……！？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「その通りです。何故ならこの深淵書庫は――」
line = "「その通りです。何故ならこの深淵書庫は――」"

[[dialogue]]
speaker = "トレジアンナ"
# 「それ自体が回収不可能な程に巨大な、ロストアイテムだからです」
line = "「それ自体が回収不可能な程に巨大な、ロストアイテムだからです」"

[[dialogue]]
speaker = "シズハ"
# 「う～ん、ここもハズレかな。ディーちゃんはどう？」
line = "「う～ん、ここもハズレかな。ディーちゃんはどう？」"

[[dialogue]]
speaker = "ディーラック"
# 「残念ながら、周囲にロストアイテムの反応はないね～」
line = "「残念ながら、周囲にロストアイテムの反応はないね～」"

[[dialogue]]
speaker = "サーシャ"
# 「あら～。じゃあ、次はカフェテリアの方にでも行ってみる？」
line = "「あら～。じゃあ、次はカフェテリアの方にでも行ってみる？」"

[[dialogue]]
speaker = "シズハ"
# 「そうね。焦っても仕方ないし……みんなでまた、お喋りしながら向かおっか♪」
line = "「そうね。焦っても仕方ないし……みんなでまた、お喋りしながら向かおっか♪」"

[[dialogue]]
speaker = "unk"
# それからカフェテリアへと足を運びつつ、俺はふと湧いてきた疑問をシズハに尋ねてみた。
line = "それからカフェテリアへと足を運びつつ、俺はふと湧いてきた疑問をシズハに尋ねてみた。"

[[dialogue]]
speaker = "シズハ"
# 「――ん？　会長、どうしたの？　私に何か聞きたいこと？」
line = "「――ん？　会長、どうしたの？　私に何か聞きたいこと？」"

[[dialogue]]
speaker = "unk"
# ２ヶ月前まで病院にいたって話だったけど
シズハはどうして、人間界に？
line = "２ヶ月前まで病院にいたって話だったけど\nシズハはどうして、人間界に？"

[[dialogue]]
speaker = "シズハ"
# 「え？」
line = "「え？」"

[[dialogue]]
speaker = "unk"
# 俺は、シズハがいつ頃から人間界に来てたのか、気になっていた。
line = "俺は、シズハがいつ頃から人間界に来てたのか、気になっていた。"

[[dialogue]]
speaker = "unk"
# 両親は魔界にいるんだよね？
line = "両親は魔界にいるんだよね？"

[[dialogue]]
speaker = "シズハ"
# 「ううん？　両親は昔からずっと、人間界に住んでるよ？　病院にもよくお見舞いに来てくれたし……」
line = "「ううん？　両親は昔からずっと、人間界に住んでるよ？　病院にもよくお見舞いに来てくれたし……」"

[[dialogue]]
speaker = "サーシャ"
# 「あらあら、うふふ♪　もう、なに言ってるのよ、シズハったら。お父さんお母さんはずっと魔界でしょ？」
line = "「あらあら、うふふ♪　もう、なに言ってるのよ、シズハったら。お父さんお母さんはずっと魔界でしょ？」"

[[dialogue]]
speaker = "unk"
# そう、サーシャさんやソフィアの故郷は、俺たちが以前訪れたこともある魔界の氷雪都市『レゾフ』だ。
line = "そう、サーシャさんやソフィアの故郷は、俺たちが以前訪れたこともある魔界の氷雪都市『レゾフ』だ。"

[[dialogue]]
speaker = "サーシャ"
# 「シズハだって、レゾフの病院でずっと……あれ？」
line = "「シズハだって、レゾフの病院でずっと……あれ？」"

[[dialogue]]
speaker = "サーシャ"
# 「シズハっていつ、人間界へ来たんだったかしら……？」
line = "「シズハっていつ、人間界へ来たんだったかしら……？」"

[[dialogue]]
speaker = "シズハ"
# 「ん……？　あれ？　会長、今……私たち、なんの話をしてたんだっけ？」
line = "「ん……？　あれ？　会長、今……私たち、なんの話をしてたんだっけ？」"

[[dialogue]]
speaker = "unk"
# え？　別に変わった話題は特に……
line = "え？　別に変わった話題は特に……"

[[dialogue]]
speaker = "サーシャ"
# 「……？　う～ん……でも確か、何か３人で話してたはずよね？」
line = "「……？　う～ん……でも確か、何か３人で話してたはずよね？」"

[[dialogue]]
speaker = "サーシャ"
# 「あらあら？　もしかして私たち、３人ともド忘れしちゃったのかしら？　ふふっ♪　やっぱり姉と妹と弟で気が合うのね～♪」
line = "「あらあら？　もしかして私たち、３人ともド忘れしちゃったのかしら？　ふふっ♪　やっぱり姉と妹と弟で気が合うのね～♪」"

[[dialogue]]
speaker = "unk"
# しれっと弟にされてる！
line = "しれっと弟にされてる！"

[[dialogue]]
speaker = "シズハ"
# 「あははっ♪　ってことは～、会長は私の――お兄ちゃんってことよね♪」
line = "「あははっ♪　ってことは～、会長は私の――お兄ちゃんってことよね♪」"

[[dialogue]]
speaker = "サーシャ"
# 「あら～♪」
line = "「あら～♪」"

[[dialogue]]
speaker = "シズハ"
# 「ねぇねぇ、お兄ちゃん♪　次の場所まで、仲良く手を繋いで行こうよ～♪」
line = "「ねぇねぇ、お兄ちゃん♪　次の場所まで、仲良く手を繋いで行こうよ～♪」"

[[dialogue]]
speaker = "サーシャ"
# 「あ～ん、ずるいわよ２人共～。お姉ちゃんだけ仲間外れにしないで～」
line = "「あ～ん、ずるいわよ２人共～。お姉ちゃんだけ仲間外れにしないで～」"

[[dialogue]]
speaker = "unk"
# 何故かシズハとサーシャさんに挟まれるようにして手を繋ぐことになりながら、再びロストアイテム探しに戻るのだった。
line = "何故かシズハとサーシャさんに挟まれるようにして手を繋ぐことになりながら、再びロストアイテム探しに戻るのだった。"
