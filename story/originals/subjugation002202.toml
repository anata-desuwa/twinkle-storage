[[dialogue]]
speaker = "unk"
# 大聖堂のカフェテリアへと話す場所を移したミネコは、頼んだコーヒーに口を付ける。
line = "大聖堂のカフェテリアへと話す場所を移したミネコは、頼んだコーヒーに口を付ける。"

[[dialogue]]
speaker = "ミネコ"
# 「ん～♪　大聖堂カフェテリア、流星市国で１、２を争う程に料理が美味しいと聞いていたけど、コーヒーも絶品だね～♪」
line = "「ん～♪　大聖堂カフェテリア、流星市国で１、２を争う程に料理が美味しいと聞いていたけど、コーヒーも絶品だね～♪」"

[[dialogue]]
speaker = "ミネコ"
# 「価格はすごく安いのに、いい豆を使ってるよ」
line = "「価格はすごく安いのに、いい豆を使ってるよ」"

[[dialogue]]
speaker = "ミネコ"
# 「それに、入れ方も素人技じゃない。有名なバリスタでも居るのかな～？」
line = "「それに、入れ方も素人技じゃない。有名なバリスタでも居るのかな～？」"

[[dialogue]]
speaker = "unk"
# 俺が同じくコーヒー、ジュエリーが紅茶を飲んで、落ち着いたところで、ミネコは再び口を開く。
line = "俺が同じくコーヒー、ジュエリーが紅茶を飲んで、落ち着いたところで、ミネコは再び口を開く。"

[[dialogue]]
speaker = "ミネコ"
# 「ふふっ♪　会長、その顔はまだ、私が怪盗だって信じられない顔だね？」
line = "「ふふっ♪　会長、その顔はまだ、私が怪盗だって信じられない顔だね？」"

[[dialogue]]
speaker = "unk"
# 『大怪盗フランボウ』……ジュエリーから因縁があると聞かされる以前から、その名前は知っていた。
line = "『大怪盗フランボウ』……ジュエリーから因縁があると聞かされる以前から、その名前は知っていた。"

[[dialogue]]
speaker = "unk"
# ３年程前から、世界各国の高価な品を盗み出し、テレビや新聞、ネットニュースでも話題に上がる程の世界的に有名な怪盗の１人だからだ。
line = "３年程前から、世界各国の高価な品を盗み出し、テレビや新聞、ネットニュースでも話題に上がる程の世界的に有名な怪盗の１人だからだ。"

[[dialogue]]
speaker = "unk"
# しかし――
line = "しかし――"

[[dialogue]]
speaker = "unk"
# 大怪盗フランボウ
line = "大怪盗フランボウ"

[[dialogue]]
speaker = "unk"
# 確か長身の男性のはずじゃ……？
line = "確か長身の男性のはずじゃ……？"

[[dialogue]]
speaker = "unk"
# 写真や映像で撮られた姿は『長身の紳士』――男性だったはずだ。ミネコとは似ても似つかない。
line = "写真や映像で撮られた姿は『長身の紳士』――男性だったはずだ。ミネコとは似ても似つかない。"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「――それがおそらく、彼女の能力なのだろう」
line = "「――それがおそらく、彼女の能力なのだろう」"

[[dialogue]]
speaker = "ミネコ"
# 「ふふっ♪　仕事する時は、そういう風に『変装』しているからね。怪盗のイメージとしては、それが王道でしょ？」
line = "「ふふっ♪　仕事する時は、そういう風に『変装』しているからね。怪盗のイメージとしては、それが王道でしょ？」"

[[dialogue]]
speaker = "ミネコ"
# 「さて、改めて、『本当』の自己紹介をさせてもらおうかな♪」
line = "「さて、改めて、『本当』の自己紹介をさせてもらおうかな♪」"

[[dialogue]]
speaker = "ミネコ"
# 「私はミネコ・フランボワーズ。世間を騒がす『大怪盗フランボウ』、その正体である可愛い女の子だよ<emoji=heart04>」
line = "「私はミネコ・フランボワーズ。世間を騒がす『大怪盗フランボウ』、その正体である可愛い女の子だよ<emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
# 「あっ、ちなみにミネコ・フランボワーズも偽名なので、悪しからず♪　でも、自分で考えて付けたお気に入りネームだから、普段はミネコって呼んでくれると嬉しいな♪」
line = "「あっ、ちなみにミネコ・フランボワーズも偽名なので、悪しからず♪　でも、自分で考えて付けたお気に入りネームだから、普段はミネコって呼んでくれると嬉しいな♪」"

[[dialogue]]
speaker = "ミネコ"
# 「一応、ジュエリーとは単純に探偵と怪盗っていう間柄以外にも、『選星者』として、『名探偵』と『大怪盗』で対の役職にあるって感じかな」
line = "「一応、ジュエリーとは単純に探偵と怪盗っていう間柄以外にも、『選星者』として、『名探偵』と『大怪盗』で対の役職にあるって感じかな」"

[[dialogue]]
speaker = "ミネコ"
# 「まあでも、私がプライベートで他の選星者と顔を合わせたのは、今日が初めてなんだけどね～♪」
line = "「まあでも、私がプライベートで他の選星者と顔を合わせたのは、今日が初めてなんだけどね～♪」"

[[dialogue]]
speaker = "unk"
# 『選星者』――それは、ジュエリー曰く、女神から『役職』を授けられた者のことを指すという。
line = "『選星者』――それは、ジュエリー曰く、女神から『役職』を授けられた者のことを指すという。"

[[dialogue]]
speaker = "unk"
# 選星者は天からの啓示により、生まれながらにそのことを自覚し、役職に応じた特殊な能力を与えられているという。
line = "選星者は天からの啓示により、生まれながらにそのことを自覚し、役職に応じた特殊な能力を与えられているという。"

[[dialogue]]
speaker = "unk"
# ジュエリーの役職は『名探偵』。
line = "ジュエリーの役職は『名探偵』。"

[[dialogue]]
speaker = "unk"
# それから以前仲良くなった『<ruby=エクソシスト>祓魔師</ruby>』の『恵原フェリシー』。他には『予言者』なども存在しているらしい。
line = "それから以前仲良くなった『<ruby>祓魔師<rt>エクソシスト</rt></ruby>』の『恵原フェリシー』。他には『予言者』なども存在しているらしい。"

[[dialogue]]
speaker = "unk"
# そして、今回出会ったミネコが『大怪盗』というわけだ。
line = "そして、今回出会ったミネコが『大怪盗』というわけだ。"

[[dialogue]]
speaker = "unk"
# どうしてわざわざ自分の正体を？
line = "どうしてわざわざ自分の正体を？"

[[dialogue]]
speaker = "ミネコ"
# 「うんうん、当然の疑問だよね！　その理由は――」
line = "「うんうん、当然の疑問だよね！　その理由は――」"

[[dialogue]]
speaker = "ミネコ"
# 「キミたちと仲良くなりたいからだよ♪」
line = "「キミたちと仲良くなりたいからだよ♪」"

[[dialogue]]
speaker = "ミネコ"
# 「仲良くなるには、まずは自分から名乗らなくちゃでしょ？」
line = "「仲良くなるには、まずは自分から名乗らなくちゃでしょ？」"

[[dialogue]]
speaker = "ミネコ"
# 「かつて、ジュエリーのご先祖様……世界三大探偵の『ブラウン神父』も、初代の大怪盗フランボウと、最終的に仲良くなったって聞くしね♪」
line = "「かつて、ジュエリーのご先祖様……世界三大探偵の『ブラウン神父』も、初代の大怪盗フランボウと、最終的に仲良くなったって聞くしね♪」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「確かに、同じ選星者同士だ。和解できるなら、それに越したことはない。だが――」
line = "「確かに、同じ選星者同士だ。和解できるなら、それに越したことはない。だが――」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「これまで３年間、キミは幾つもの貴重な品を盗み出してきた。その事実は消えない。キミは自首して、窃盗の罪を償う気はあるのかい？」
line = "「これまで３年間、キミは幾つもの貴重な品を盗み出してきた。その事実は消えない。キミは自首して、窃盗の罪を償う気はあるのかい？」"

[[dialogue]]
speaker = "ミネコ"
# 「ふふっ♪」
line = "「ふふっ♪」"

[[dialogue]]
speaker = "ミネコ"
# 「――もちろん、ないよ！　怪盗はこれからも続けるし、捕まるつもりもさらさらない」
line = "「――もちろん、ないよ！　怪盗はこれからも続けるし、捕まるつもりもさらさらない」"

[[dialogue]]
speaker = "unk"
# なのに、正体を明かしたのか……？
line = "なのに、正体を明かしたのか……？"

[[dialogue]]
speaker = "ミネコ"
# 「うん。別に、たかだか正体を明かした程度のことで、私は捕まったりしないからね♪」
line = "「うん。別に、たかだか正体を明かした程度のことで、私は捕まったりしないからね♪」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「キミの能力は、もう見当が付いている。明解に換言するならば……『情報改竄』。――そうだろう？」
line = "「キミの能力は、もう見当が付いている。明解に換言するならば……『情報改竄』。――そうだろう？」"

[[dialogue]]
speaker = "ミネコ"
# 「さすがは『名探偵』♪　その通～り！」
line = "「さすがは『名探偵』♪　その通～り！」"

[[dialogue]]
speaker = "ミネコ"
# 「私は選星者『大怪盗』としての能力で、物理的な証拠はもちろん、人の記憶さえも、やろうと思えば書き換えることができる」
line = "「私は選星者『大怪盗』としての能力で、物理的な証拠はもちろん、人の記憶さえも、やろうと思えば書き換えることができる」"

[[dialogue]]
speaker = "ミネコ"
# 「たとえば今回みたいに、書類を偽造して最初から流星学園に在籍していたという『記録』を作り出したり――」
line = "「たとえば今回みたいに、書類を偽造して最初から流星学園に在籍していたという『記録』を作り出したり――」"

[[dialogue]]
speaker = "ミネコ"
# 「周囲の記憶に存在していない私の情報を、ちょちょいっ♪　と上書きしたりね。その逆で、情報を『消す』こともできるよ」
line = "「周囲の記憶に存在していない私の情報を、ちょちょいっ♪　と上書きしたりね。その逆で、情報を『消す』こともできるよ」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「そう。元々、能力の推測はしていた。『大怪盗』は現場に都合の悪い証拠を決して残さない」
line = "「そう。元々、能力の推測はしていた。『大怪盗』は現場に都合の悪い証拠を決して残さない」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「指紋や足跡はもちろん、監視カメラに映らず、全てのセンサーに感知されず――更には、直接追っても幻のように消えて、物理的に視認できなくなる」
line = "「指紋や足跡はもちろん、監視カメラに映らず、全てのセンサーに感知されず――更には、直接追っても幻のように消えて、物理的に視認できなくなる」"

[[dialogue]]
speaker = "ミネコ"
# 「ふふっ♪　人間の五感もまた、情報だからね～♪　都合が悪ければ、その情報を改ざんして、目の前に存在しない『透明人間』になってしまえばいい」
line = "「ふふっ♪　人間の五感もまた、情報だからね～♪　都合が悪ければ、その情報を改ざんして、目の前に存在しない『透明人間』になってしまえばいい」"

[[dialogue]]
speaker = "unk"
# 反則級の能力じゃないか……！
line = "反則級の能力じゃないか……！"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「ああ。『捕まらない』という１点において、彼女はこの学園の星騎士……いや」
line = "「ああ。『捕まらない』という１点において、彼女はこの学園の星騎士……いや」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「世界で最強の能力者と言っていいだろう。故に――」
line = "「世界で最強の能力者と言っていいだろう。故に――」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「今こうして目の前にいても、物理的な証拠を何も残さないから法的に捕まえることができないし、無理矢理拘束しようとしても、逃げられるからできない」
line = "「今こうして目の前にいても、物理的な証拠を何も残さないから法的に捕まえることができないし、無理矢理拘束しようとしても、逃げられるからできない」"

[[dialogue]]
speaker = "ミネコ"
# 「そういうこと♪　ああ、試しにここで大声で叫んで、周りにバラしてくれて構わないよ？」
line = "「そういうこと♪　ああ、試しにここで大声で叫んで、周りにバラしてくれて構わないよ？」"

[[dialogue]]
speaker = "ミネコ"
# 「その場合は、ちょちょいっとみんなの記憶を書き換えて、上手い具合に修正しちゃうから♪」
line = "「その場合は、ちょちょいっとみんなの記憶を書き換えて、上手い具合に修正しちゃうから♪」"

[[dialogue]]
speaker = "unk"
# ニコニコしながら言うミネコ。おそらく、本当にできてしまうのだろう。
line = "ニコニコしながら言うミネコ。おそらく、本当にできてしまうのだろう。"

[[dialogue]]
speaker = "unk"
# 一体、キミの目的はなんなんだ……？
line = "一体、キミの目的はなんなんだ……？"

[[dialogue]]
speaker = "ミネコ"
# 「さっきも言った通り、キミたちと仲良くなりたいってのは本当だよ」
line = "「さっきも言った通り、キミたちと仲良くなりたいってのは本当だよ」"

[[dialogue]]
speaker = "ミネコ"
# 「でもまぁ、それだけじゃ当然納得できないよね～」
line = "「でもまぁ、それだけじゃ当然納得できないよね～」"

[[dialogue]]
speaker = "ミネコ"
# 「だけど――私の目的については、ひとまず『謎』ということで♪」
line = "「だけど――私の目的については、ひとまず『謎』ということで♪」"

[[dialogue]]
speaker = "ミネコ"
# 「ほら、ジュエリーと会長は、『名探偵』とその助手、なんでしょ？」
line = "「ほら、ジュエリーと会長は、『名探偵』とその助手、なんでしょ？」"

[[dialogue]]
speaker = "ミネコ"
# 「ならば、この大怪盗フランボウの目的を、推理して当ててくれたまえ♪　ふっふっふ～♪」
line = "「ならば、この大怪盗フランボウの目的を、推理して当ててくれたまえ♪　ふっふっふ～♪」"

[[dialogue]]
speaker = "ミネコ"
# 「そういうわけで改めて、これからよろしくね、会長♪」
line = "「そういうわけで改めて、これからよろしくね、会長♪」"

[[dialogue]]
speaker = "unk"
# 彼女はそう言うと、有無を言わさず俺の手を取って、ぶんぶんと握手する。
line = "彼女はそう言うと、有無を言わさず俺の手を取って、ぶんぶんと握手する。"

[[dialogue]]
speaker = "unk"
# それから、悪戯好きの子供のように、楽しそうな笑顔を浮かべてみせるのだった。
line = "それから、悪戯好きの子供のように、楽しそうな笑顔を浮かべてみせるのだった。"
