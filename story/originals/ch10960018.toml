[[dialogue]]
speaker = "unk"
# 深夜、街でモンスターが発生。
line = "深夜、街でモンスターが発生。"

[[dialogue]]
speaker = "unk"
# 急ぎ出動し、モンスターを倒して帰路に就いたのだが──
line = "急ぎ出動し、モンスターを倒して帰路に就いたのだが──"

[[dialogue]]
speaker = "？？？"
# 「こちらだ」
line = "「こちらだ」"

[[dialogue]]
speaker = "クロト"
# 「──！？」
line = "「──！？」"

[[dialogue]]
speaker = "unk"
# 背後から聞こえた、敵意のこもった声。
line = "背後から聞こえた、敵意のこもった声。"

[[dialogue]]
speaker = "unk"
# こちらが反応する間もなく、そのまま路地裏へと連れ込まれて……
line = "こちらが反応する間もなく、そのまま路地裏へと連れ込まれて……"

[[dialogue]]
speaker = "unk"
# 不審者に連れてこられたのは、人気のない公園だった。
line = "不審者に連れてこられたのは、人気のない公園だった。"

[[dialogue]]
speaker = "unk"
# 警戒を露わにしながら、その不審者の名前を呼ぶ。
line = "警戒を露わにしながら、その不審者の名前を呼ぶ。"

[[dialogue]]
speaker = "クロト"
# 「イングリット、何のつもりだ？　また戦いを挑みに来たのか？」
line = "「イングリット、何のつもりだ？　また戦いを挑みに来たのか？」"

[[dialogue]]
speaker = "イングリット"
# 「そうだ、ここで私と戦え」
line = "「そうだ、ここで私と戦え」"

[[dialogue]]
speaker = "イングリット"
# 「だが今日は、刃も拳もいらない戦いだ」
line = "「だが今日は、刃も拳もいらない戦いだ」"

[[dialogue]]
speaker = "クロト"
# 「は──？」
line = "「は──？」"

[[dialogue]]
speaker = "unk"
# 意外な言葉に面食らっていると、その隙にイングリットが俺を押し倒して──
line = "意外な言葉に面食らっていると、その隙にイングリットが俺を押し倒して──"

[[dialogue]]
speaker = "イングリット"
# 「さぁ、私と戦ってもらおうか……！」
line = "「さぁ、私と戦ってもらおうか……！」"

[[dialogue]]
speaker = "クロト"
# 「！！？？」
line = "「！！？？」"

[[dialogue]]
speaker = "unk"
# 突然の事態に思考が追いつかない。
line = "突然の事態に思考が追いつかない。"

[[dialogue]]
speaker = "unk"
# コラプサーとの戦闘を覚悟したら、いきなり押し倒されて、相手が衣服を脱ぎだして……
line = "コラプサーとの戦闘を覚悟したら、いきなり押し倒されて、相手が衣服を脱ぎだして……"

[[dialogue]]
speaker = "unk"
# これではまるでセッ──
line = "これではまるでセッ──"

[[dialogue]]
speaker = "イングリット"
# 「何を驚いている？　貴様はこれから私とセックスするんだ」
line = "「何を驚いている？　貴様はこれから私とセックスするんだ」"

[[dialogue]]
speaker = "クロト"
# 「──」
line = "「──」"

[[dialogue]]
speaker = "unk"
# 本当に予想通りの言葉が出てきて、頭が真っ白になった。
line = "本当に予想通りの言葉が出てきて、頭が真っ白になった。"

[[dialogue]]
speaker = "unk"
# なのに……
line = "なのに……"

[[dialogue]]
speaker = "イングリット"
# 「ん？　視線を感じるぞ？」
line = "「ん？　視線を感じるぞ？」"

[[dialogue]]
speaker = "unk"
# 露わになったイングリットの胸から目が離せない。
line = "露わになったイングリットの胸から目が離せない。"

[[dialogue]]
speaker = "unk"
# 少し身じろぎしただけで重そうに揺れて、戦士というには大きすぎるサイズを主張する。
line = "少し身じろぎしただけで重そうに揺れて、戦士というには大きすぎるサイズを主張する。"

[[dialogue]]
speaker = "unk"
# 丸々とした形も見惚れてしまうほど綺麗で、否応なしに男の本能を刺激されてしまう。
line = "丸々とした形も見惚れてしまうほど綺麗で、否応なしに男の本能を刺激されてしまう。"

[[dialogue]]
speaker = "クロト"
# 「ど、どうしてイングリットが俺とセックスを……？」
line = "「ど、どうしてイングリットが俺とセックスを……？」"

[[dialogue]]
speaker = "イングリット"
# 「ヴァレリーが言っていたぞ、男と女はこうして戦うと。そして強い女は男を組み伏せるのだとな」
line = "「ヴァレリーが言っていたぞ、男と女はこうして戦うと。そして強い女は男を組み伏せるのだとな」"

[[dialogue]]
speaker = "イングリット"
# 「貴様が男で、私が女。ちょうどいいだろう」
line = "「貴様が男で、私が女。ちょうどいいだろう」"

[[dialogue]]
speaker = "クロト"
# 「いや、それは比喩か冗談なんじゃ……」
line = "「いや、それは比喩か冗談なんじゃ……」"

[[dialogue]]
speaker = "unk"
# セックスは普通そんな理由でするものじゃない。
line = "セックスは普通そんな理由でするものじゃない。"

[[dialogue]]
speaker = "unk"
# だがイングリットに“普通”は通用しない。
line = "だがイングリットに“普通”は通用しない。"

[[dialogue]]
speaker = "イングリット"
# 「ほう、これが魔王のペニスか。これを私の中に入れればいいのだな」
line = "「ほう、これが魔王のペニスか。これを私の中に入れればいいのだな」"

[[dialogue]]
speaker = "unk"
# 俺の意志を確認することもなく、勝手に得心するイングリット。
line = "俺の意志を確認することもなく、勝手に得心するイングリット。"

[[dialogue]]
speaker = "unk"
# そしてペニスの先端を股間にあてがい、腰を落として──
line = "そしてペニスの先端を股間にあてがい、腰を落として──"

[[dialogue]]
speaker = "イングリット"
# 「では私の体に屈してもらうぞ、魔王！」
line = "「では私の体に屈してもらうぞ、魔王！」"

[[dialogue]]
speaker = "イングリット"
# 「んん～～～～～～～～～～っ！！？」
line = "「んん～～～～～～～～～～っ！！？」"

[[dialogue]]
speaker = "unk"
# ズブリと肉の槍が突き刺さり、気付けば俺のペニスが深々と咥えられていた。
line = "ズブリと肉の槍が突き刺さり、気付けば俺のペニスが深々と咥えられていた。"

[[dialogue]]
speaker = "イングリット"
# 「くっ……はぁ……これがセックスか……」
line = "「くっ……はぁ……これがセックスか……」"

[[dialogue]]
speaker = "クロト"
# 「痛くはないか……？」
line = "「痛くはないか……？」"

[[dialogue]]
speaker = "unk"
# さっきペニスがイングリットの中に入った時、処女膜を破った感触があった。
line = "さっきペニスがイングリットの中に入った時、処女膜を破った感触があった。"

[[dialogue]]
speaker = "unk"
# 無理やり押し倒されて、俺が彼女を気遣うのも変な気はするのだけど……
line = "無理やり押し倒されて、俺が彼女を気遣うのも変な気はするのだけど……"

[[dialogue]]
speaker = "イングリット"
# 「戦いなのだから、痛みなど当然だろう。モンスターの爪で抉られた時に比べれば、大したものではない」
line = "「戦いなのだから、痛みなど当然だろう。モンスターの爪で抉られた時に比べれば、大したものではない」"

[[dialogue]]
speaker = "イングリット"
# 「だが腹の奥が熱い……なんだこれは……」
line = "「だが腹の奥が熱い……なんだこれは……」"

[[dialogue]]
speaker = "unk"
# 戦士だけあって痛みに強いのか、イングリットの表情にはすでに快感が表れていた。
line = "戦士だけあって痛みに強いのか、イングリットの表情にはすでに快感が表れていた。"

[[dialogue]]
speaker = "unk"
# 俺も熱い体温と肉の感触に包まれ、即物的な快感に下半身がいきり立つ。
line = "俺も熱い体温と肉の感触に包まれ、即物的な快感に下半身がいきり立つ。"

[[dialogue]]
speaker = "イングリット"
# 「んんっ……！　フフ、どうした魔王、悶えているのか？　貴様のペニスが私の中でビクビクと跳ねているぞ」
line = "「んんっ……！　フフ、どうした魔王、悶えているのか？　貴様のペニスが私の中でビクビクと跳ねているぞ」"

[[dialogue]]
speaker = "unk"
# イングリットが呼吸する度に膣壁が収縮し、きつく絞ってペニスを刺激する。
line = "イングリットが呼吸する度に膣壁が収縮し、きつく絞ってペニスを刺激する。"

[[dialogue]]
speaker = "unk"
# 膣に並んだ肉ひだの感触まで伝わってきて、余計にイングリットを感じてしまう。
line = "膣に並んだ肉ひだの感触まで伝わってきて、余計にイングリットを感じてしまう。"

[[dialogue]]
speaker = "イングリット"
# 「どうだ魔王、私と繋がった心地は？　悔しいか？　屈辱か？」
line = "「どうだ魔王、私と繋がった心地は？　悔しいか？　屈辱か？」"

[[dialogue]]
speaker = "クロト"
# 「いや、悔しくはないけど……」
line = "「いや、悔しくはないけど……」"

[[dialogue]]
speaker = "unk"
# 下半身から上ってくるのは確かな快感で、あの傍若無人な彼女も体はちゃんと女の子なんだなと、下世話なことを考えてしまった。
line = "下半身から上ってくるのは確かな快感で、あの傍若無人な彼女も体はちゃんと女の子なんだなと、下世話なことを考えてしまった。"

[[dialogue]]
speaker = "イングリット"
# 「で……ここからどうすればいいんだ？」
line = "「で……ここからどうすればいいんだ？」"

[[dialogue]]
speaker = "クロト"
# 「腰を動かすとか……？」
line = "「腰を動かすとか……？」"

[[dialogue]]
speaker = "イングリット"
# 「ふむ。ではそうするか」
line = "「ふむ。ではそうするか」"

[[dialogue]]
speaker = "unk"
# 敵である俺を疑うこともなく、下半身に力を込めて……
line = "敵である俺を疑うこともなく、下半身に力を込めて……"

[[dialogue]]
speaker = "イングリット"
# 「ふぁああっ……！　はぁ……はっ……んんっ……！」
line = "「ふぁああっ……！　はぁ……はっ……んんっ……！」"

[[dialogue]]
speaker = "イングリット"
# 「んんっ……なんだ、これは……？　はぁはっ……はぁっ……ふぅっ……あぁ……っ！」
line = "「んんっ……なんだ、これは……？　はぁはっ……はぁっ……ふぅっ……あぁ……っ！」"

[[dialogue]]
speaker = "unk"
# イングリットが体を上下に動かし、膣内で粘膜とペニスが擦れ合う。
line = "イングリットが体を上下に動かし、膣内で粘膜とペニスが擦れ合う。"

[[dialogue]]
speaker = "イングリット"
# 「ふっ、んんっ……私の中で、ペニスが……はぁ、ふぅ……はあぁんっ……！」
line = "「ふっ、んんっ……私の中で、ペニスが……はぁ、ふぅ……はあぁんっ……！」"

[[dialogue]]
speaker = "イングリット"
# 「私が動くと……ふぁ、はぁ……ゾクゾクと、変な感覚が……んっ……はあぁ……っ」
line = "「私が動くと……ふぁ、はぁ……ゾクゾクと、変な感覚が……んっ……はあぁ……っ」"

[[dialogue]]
speaker = "unk"
# イングリットの体が小刻みに震え、声にも艶が混じる。
line = "イングリットの体が小刻みに震え、声にも艶が混じる。"

[[dialogue]]
speaker = "unk"
# 膣内からは愛液がにじみ出し、ぬるりとした感触が快感を増幅させていた。
line = "膣内からは愛液がにじみ出し、ぬるりとした感触が快感を増幅させていた。"

[[dialogue]]
speaker = "イングリット"
# 「腹の奥が、ムズムズして……くぅっ……なるほど、これは確かに戦いだな……」
line = "「腹の奥が、ムズムズして……くぅっ……なるほど、これは確かに戦いだな……」"

[[dialogue]]
speaker = "イングリット"
# 「だが貴様にも効いているようだな。はぁ、ふぅ……んっ……貴様も苦悶の声を漏らし、歯を食いしばっているじゃないか……！」
line = "「だが貴様にも効いているようだな。はぁ、ふぅ……んっ……貴様も苦悶の声を漏らし、歯を食いしばっているじゃないか……！」"

[[dialogue]]
speaker = "クロト"
# 「いやそれは、気持ち、い……くっ……」
line = "「いやそれは、気持ち、い……くっ……」"

[[dialogue]]
speaker = "イングリット"
# 「ハハハッ、いい顔だな……ふっ、はぁ、はっ……もっと苦しむがいい、魔王……！」
line = "「ハハハッ、いい顔だな……ふっ、はぁ、はっ……もっと苦しむがいい、魔王……！」"

[[dialogue]]
speaker = "unk"
# 今の状態がわかっているのかいないのか、イングリットは俺を責めようと腰を振り続ける。
line = "今の状態がわかっているのかいないのか、イングリットは俺を責めようと腰を振り続ける。"

[[dialogue]]
speaker = "イングリット"
# 「貴様のペニスが、大きくて……んふっ、んぅっ……私の中が、広げられ、て……っ」
line = "「貴様のペニスが、大きくて……んふっ、んぅっ……私の中が、広げられ、て……っ」"

[[dialogue]]
speaker = "イングリット"
# 「はっ……はぁはっ、んんっ……中で、ズルズルと、擦れて……くっ……腹に、響くな……」
line = "「はっ……はぁはっ、んんっ……中で、ズルズルと、擦れて……くっ……腹に、響くな……」"

[[dialogue]]
speaker = "イングリット"
# 「だが、これでこそ戦いだ……はっ……んっ、ふんっ……耐えられるのは、どちらか、試してやる……っ」
line = "「だが、これでこそ戦いだ……はっ……んっ、ふんっ……耐えられるのは、どちらか、試してやる……っ」"

[[dialogue]]
speaker = "unk"
# とろとろの蜜で濡れた粘膜とペニスが絡み、摩擦熱のように快感を生む。
line = "とろとろの蜜で濡れた粘膜とペニスが絡み、摩擦熱のように快感を生む。"

[[dialogue]]
speaker = "unk"
# 見せつけるように揺れる胸の破壊力が凄まじくて、あのイングリットも女なんだと意識させられてしまう。
line = "見せつけるように揺れる胸の破壊力が凄まじくて、あのイングリットも女なんだと意識させられてしまう。"

[[dialogue]]
speaker = "イングリット"
# 「ふっ、はっ、はぁ……んんっ……！　またペニスが、ビクビクしたぞ……っ」
line = "「ふっ、はっ、はぁ……んんっ……！　またペニスが、ビクビクしたぞ……っ」"

[[dialogue]]
speaker = "イングリット"
# 「はっ……あっ……貴様も……腹の奥に来る、このむず痒さをこらえるので……精いっぱいのようだな……っ」
line = "「はっ……あっ……貴様も……腹の奥に来る、このむず痒さをこらえるので……精いっぱいのようだな……っ」"

[[dialogue]]
speaker = "イングリット"
# 「はぁっ……！　ふっ……！　んんっ……！　もっと悶えろ……！　もっと呻け……！　ハハッ、いいザマだ……！」
line = "「はぁっ……！　ふっ……！　んんっ……！　もっと悶えろ……！　もっと呻け……！　ハハッ、いいザマだ……！」"

[[dialogue]]
speaker = "unk"
# イングリットが俺を倒そうと腰を振るが、反応がいちいちズレているから、むしろこちらの頭がおかしくなりそうだ。
line = "イングリットが俺を倒そうと腰を振るが、反応がいちいちズレているから、むしろこちらの頭がおかしくなりそうだ。"

[[dialogue]]
speaker = "unk"
# でもそれならと、イタズラ心が湧いてきて……
line = "でもそれならと、イタズラ心が湧いてきて……"

[[dialogue]]
speaker = "クロト"
# 「イングリットは知らないかもしれないけど──」
line = "「イングリットは知らないかもしれないけど──」"

[[dialogue]]
speaker = "イングリット"
# 「何……？　ち○ぽと、おま○こ……？　セックスの時は、性器のことをそう言うのか」
line = "「何……？　ち○ぽと、おま○こ……？　セックスの時は、性器のことをそう言うのか」"

[[dialogue]]
speaker = "イングリット"
# 「いいだろう、戦の作法ならそうしてやる……はあぁ……貴様のち○ぽが、私のおま○この中で、擦れて……っ」
line = "「いいだろう、戦の作法ならそうしてやる……はあぁ……貴様のち○ぽが、私のおま○この中で、擦れて……っ」"

[[dialogue]]
speaker = "イングリット"
# 「んんっ……！？　ち○ぽがさらに大きくなって……ふぁっ、あっ……私のおま○こが、いっぱいに、なって……」
line = "「んんっ……！？　ち○ぽがさらに大きくなって……ふぁっ、あっ……私のおま○こが、いっぱいに、なって……」"

[[dialogue]]
speaker = "イングリット"
# 「クハハッ……伝わる……伝わってくるぞ……！　今のが効いたのだな、魔王……！」
line = "「クハハッ……伝わる……伝わってくるぞ……！　今のが効いたのだな、魔王……！」"

[[dialogue]]
speaker = "unk"
# 騙しているようで罪悪感があるものの、それが背徳の快感に変わっていく。
line = "騙しているようで罪悪感があるものの、それが背徳の快感に変わっていく。"

[[dialogue]]
speaker = "unk"
# さらに、目の前でたぷんたぷんと弾む胸を鷲掴みにしてやった。
line = "さらに、目の前でたぷんたぷんと弾む胸を鷲掴みにしてやった。"

[[dialogue]]
speaker = "イングリット"
# 「ひぁああっ！？　胸を揉まれて……はあぁっ……あぁ……んん～～っ！」
line = "「ひぁああっ！？　胸を揉まれて……はあぁっ……あぁ……んん～～っ！」"

[[dialogue]]
speaker = "unk"
# これが戦いというなら加減はいらない。遠慮なく力任せに揉みしだく。
line = "これが戦いというなら加減はいらない。遠慮なく力任せに揉みしだく。"

[[dialogue]]
speaker = "イングリット"
# 「んはぁ、はっ……ぁん……なん、だ……？　貴様に、胸を触られると……熱くなって……ひやぁああっ……！」
line = "「んはぁ、はっ……ぁん……なん、だ……？　貴様に、胸を触られると……熱くなって……ひやぁああっ……！」"

[[dialogue]]
speaker = "unk"
# あまりに大きなおっぱいは手のひらに収まらなくて、指の間から肉がこぼれる。
line = "あまりに大きなおっぱいは手のひらに収まらなくて、指の間から肉がこぼれる。"

[[dialogue]]
speaker = "unk"
# 極上の柔らかさに興奮が高まって、桜色の乳首に吸い付いた。
line = "極上の柔らかさに興奮が高まって、桜色の乳首に吸い付いた。"

[[dialogue]]
speaker = "イングリット"
# 「ひああっ！？　乳首を、しゃぶるな……んんっ……！　はぁ、あっ……乳など、出んぞ……」
line = "「ひああっ！？　乳首を、しゃぶるな……んんっ……！　はぁ、あっ……乳など、出んぞ……」"

[[dialogue]]
speaker = "イングリット"
# 「んん～～っ！　じゅるじゅると、音を立てて吸って……貴様は、乳飲み子かっ……はあぁっ<emoji=heart04>」
line = "「んん～～っ！　じゅるじゅると、音を立てて吸って……貴様は、乳飲み子かっ……はあぁっ<emoji=heart04>」"

