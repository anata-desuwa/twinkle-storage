[[dialogue]]
speaker = "unk"
# 第３話,先生はワーカーホリック,P
line = "第３話,先生はワーカーホリック,P"

[[dialogue]]
speaker = "unk"
# 星徒会の雑務をこなしているうち、消灯時間を過ぎてしまったある日の夜。
line = "星徒会の雑務をこなしているうち、消灯時間を過ぎてしまったある日の夜。"

[[dialogue]]
speaker = "unk"
# 俺は校内で、怪しげな人影を見つけた。ふらふらとした足取りは見るからに怪しい……
line = "俺は校内で、怪しげな人影を見つけた。ふらふらとした足取りは見るからに怪しい……"

[[dialogue]]
speaker = "unk"
# モンスターではないだろうが星徒会長として見過ごすことはできない。
line = "モンスターではないだろうが星徒会長として見過ごすことはできない。"

[[dialogue]]
speaker = "unk"
# 慎重にその人影へと近づいていって──
line = "慎重にその人影へと近づいていって──"

[[dialogue]]
speaker = "エスメラルダ"
# 「あれぇ……どうしてー……なーんで……コーヒー、飲みたいのになぁー……」
line = "「あれぇ……どうしてー……なーんで……コーヒー、飲みたいのになぁー……」"

[[dialogue]]
speaker = "エスメラルダ"
# 「困ったなぁ。カフェインが欲しいのになぁ……」
line = "「困ったなぁ。カフェインが欲しいのになぁ……」"

[[dialogue]]
speaker = "unk"
# エスメラルダ先生！？　何やってるんです？
line = "エスメラルダ先生！？　何やってるんです？"

[[dialogue]]
speaker = "エスメラルダ"
# 「んー……？　あ、会長さんだ、おはよぉ～！」
line = "「んー……？　あ、会長さんだ、おはよぉ～！」"

[[dialogue]]
speaker = "unk"
# お……おはよう？
line = "お……おはよう？"

[[dialogue]]
speaker = "エスメラルダ"
# 「ねー。今日って何かあったかなぁ？　仕事がひと段落ついたから、コーヒー飲みに来たんだけどー……」
line = "「ねー。今日って何かあったかなぁ？　仕事がひと段落ついたから、コーヒー飲みに来たんだけどー……」"

[[dialogue]]
speaker = "エスメラルダ"
# 「カフェがね、開いてないの。これじゃコーヒー飲めないよー……」
line = "「カフェがね、開いてないの。これじゃコーヒー飲めないよー……」"

[[dialogue]]
speaker = "エスメラルダ"
# 「そりゃそうです……って、えー。おかしいよぉ。だってさっき時計見たもの」
line = "「そりゃそうです……って、えー。おかしいよぉ。だってさっき時計見たもの」"

[[dialogue]]
speaker = "エスメラルダ"
# 「１１時だったからー……ぎりぎりモーニング食べられるかな～って……」
line = "「１１時だったからー……ぎりぎりモーニング食べられるかな～って……」"

[[dialogue]]
speaker = "エスメラルダ"
# 「──え？　夜の……１１時？」
line = "「──え？　夜の……１１時？」"

[[dialogue]]
speaker = "エスメラルダ"
# 「…………あー。そう言えば真っ暗だねー……そっか、そっか……夜の方の１１時だったかー……」
line = "「…………あー。そう言えば真っ暗だねー……そっか、そっか……夜の方の１１時だったかー……」"

[[dialogue]]
speaker = "エスメラルダ"
# 「あはは。流星学園の星徒会がね、リクリエのおんもしろいデータをいっぱいくれてね？」
line = "「あはは。流星学園の星徒会がね、リクリエのおんもしろいデータをいっぱいくれてね？」"

[[dialogue]]
speaker = "エスメラルダ"
# 「よぉ～し、解析しちゃうぞ～って思ってー……それから家に帰ってなくてー……」
line = "「よぉ～し、解析しちゃうぞ～って思ってー……それから家に帰ってなくてー……」"

[[dialogue]]
speaker = "エスメラルダ"
# 「最後に寝たのいつだっけ。２日くらい前に仮眠は取った……気がする。椅子に座って１５分くらい？」
line = "「最後に寝たのいつだっけ。２日くらい前に仮眠は取った……気がする。椅子に座って１５分くらい？」"

[[dialogue]]
speaker = "unk"
# 無茶しすぎですよ、死んじゃいますよ！？
line = "無茶しすぎですよ、死んじゃいますよ！？"

[[dialogue]]
speaker = "エスメラルダ"
# 「あー、だいじょぶ、だいじょぶ。ちゃんと栄養は取ってるから」
line = "「あー、だいじょぶ、だいじょぶ。ちゃんと栄養は取ってるから」"

[[dialogue]]
speaker = "エスメラルダ"
# 「ラムネでしょ。チョコレートでしょ。後はエナドリとコーヒーがあればね、頭の栄養はばっちりなのよ」
line = "「ラムネでしょ。チョコレートでしょ。後はエナドリとコーヒーがあればね、頭の栄養はばっちりなのよ」"

[[dialogue]]
speaker = "エスメラルダ"
# 「それに私は、魔族だから。ふふふ。人間とは体の作りが違うからぁ……」
line = "「それに私は、魔族だから。ふふふ。人間とは体の作りが違うからぁ……」"

[[dialogue]]
speaker = "エスメラルダ"
# 「ふわぁあぁあっ……んんぅう～……」
line = "「ふわぁあぁあっ……んんぅう～……」"

[[dialogue]]
speaker = "エスメラルダ"
# 「んー、でも困ったなぁ。もうちょっと続けたいのに、コーヒー飲めないのは困るなぁ……」
line = "「んー、でも困ったなぁ。もうちょっと続けたいのに、コーヒー飲めないのは困るなぁ……」"

[[dialogue]]
speaker = "エスメラルダ"
# 「……え？　会長さんに付いて行ったら、コーヒー飲めるの？」
line = "「……え？　会長さんに付いて行ったら、コーヒー飲めるの？」"

[[dialogue]]
speaker = "エスメラルダ"
# 「やった～。助かっちゃう……ついてく、ついてく……」
line = "「やった～。助かっちゃう……ついてく、ついてく……」"

[[dialogue]]
speaker = "unk"
# 流石に放っておけないし、消灯しているから学園内の部屋はほとんど施錠されている。
line = "流石に放っておけないし、消灯しているから学園内の部屋はほとんど施錠されている。"

[[dialogue]]
speaker = "unk"
# 寝ぼけたまま、ぽてぽてと俺の後を追いかけてくる先生。住所を聞いても「研究室が私のお家よ～♪」とか言うから埒が明かない。
line = "寝ぼけたまま、ぽてぽてと俺の後を追いかけてくる先生。住所を聞いても「研究室が私のお家よ～♪」とか言うから埒が明かない。"

[[dialogue]]
speaker = "unk"
# 仕方がないので──
line = "仕方がないので──"

[[dialogue]]
speaker = "エスメラルダ"
# 「あれ～、ここはどこ？　私はー……エスメラルダだったわね」
line = "「あれ～、ここはどこ？　私はー……エスメラルダだったわね」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「流星学園寮ですわ。エスメラルダ先生」
line = "「流星学園寮ですわ。エスメラルダ先生」"

[[dialogue]]
speaker = "エスメラルダ"
# 「ほんとだ。どうりで見覚えがあると思った」
line = "「ほんとだ。どうりで見覚えがあると思った」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「まったく……昨夜、ゾンビみたいになった先生が緋宮会長に運ばれてきたと時は、驚いていいやら呆れていいやら」
line = "「まったく……昨夜、ゾンビみたいになった先生が緋宮会長に運ばれてきたと時は、驚いていいやら呆れていいやら」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「エスメラルダ先生を心配して、今朝も緋宮会長が来てますわよ」
line = "「エスメラルダ先生を心配して、今朝も緋宮会長が来てますわよ」"

[[dialogue]]
speaker = "エスメラルダ"
# 「あ、おはよー」
line = "「あ、おはよー」"

[[dialogue]]
speaker = "unk"
# おはよーじゃないです……
line = "おはよーじゃないです……"

[[dialogue]]
speaker = "エスメラルダ"
# 「あはは……ごめんなさい……」
line = "「あはは……ごめんなさい……」"

[[dialogue]]
speaker = "エスメラルダ"
# 「分析官の仕事がブラックってわけじゃなくて。むしろ私、その……お仕事が大好きでね？」
line = "「分析官の仕事がブラックってわけじゃなくて。むしろ私、その……お仕事が大好きでね？」"

[[dialogue]]
speaker = "エスメラルダ"
# 「面白そうなデータが集まると、ついついのめり込んじゃうっていうか……」
line = "「面白そうなデータが集まると、ついついのめり込んじゃうっていうか……」"

[[dialogue]]
speaker = "エスメラルダ"
# 「流星の学園長にも怒られたの。その破滅した生活態度を何とかしろって」
line = "「流星の学園長にも怒られたの。その破滅した生活態度を何とかしろって」"

[[dialogue]]
speaker = "エスメラルダ"
# 「でもデータがいけないのよ。あんな気になる数値を記録するから……」
line = "「でもデータがいけないのよ。あんな気になる数値を記録するから……」"

[[dialogue]]
speaker = "unk"
# ……反省してます？
line = "……反省してます？"

[[dialogue]]
speaker = "エスメラルダ"
# 「し、してる！　してるから！」
line = "「し、してる！　してるから！」"

[[dialogue]]
speaker = "エスメラルダ"
# 「や、約束。約束するわ、会長さん。もう無茶な徹夜はしないって……！」
line = "「や、約束。約束するわ、会長さん。もう無茶な徹夜はしないって……！」"

[[dialogue]]
speaker = "unk"
# エスメラルダ先生はきっとまた同じことをするはずだと思い、俺はＤＩＳＣの連絡先を交換した。
line = "エスメラルダ先生はきっとまた同じことをするはずだと思い、俺はＤＩＳＣの連絡先を交換した。"

[[dialogue]]
speaker = "unk"
# 研究する前に必ず俺に一報を入れること──そうしてもらえれば、先生が徹夜するのを防ぐことができると考えたからだ。
line = "研究する前に必ず俺に一報を入れること──そうしてもらえれば、先生が徹夜するのを防ぐことができると考えたからだ。"

[[dialogue]]
speaker = "エスメラルダ"
# 「大丈夫よっ！　もうこんなことしない！　約束するから～っ！」
line = "「大丈夫よっ！　もうこんなことしない！　約束するから～っ！」"

[[dialogue]]
speaker = "unk"
# それから数週間後の深夜に、俺が彼女の研究室に突撃することになるのだけど──それはまた、別のお話。
line = "それから数週間後の深夜に、俺が彼女の研究室に突撃することになるのだけど──それはまた、別のお話。"
