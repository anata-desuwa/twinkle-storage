[[dialogue]]
speaker = "unk"
# 第１話,おなか部のグータラお嬢様,P
line = "第１話,おなか部のグータラお嬢様,P"

[[dialogue]]
speaker = "パルミエ"
# 『おねが～いっ！　すぐに誰か来て～！　すごくピンチなのよ～！』
line = "『おねが～いっ！　すぐに誰か来て～！　すごくピンチなのよ～！』"

[[dialogue]]
speaker = "unk"
# 何かあったのかっ！？
line = "何かあったのかっ！？"

[[dialogue]]
speaker = "パルミエ"
# 「あっ、来てくれたのねっ。誰か知らないけど、そこに置いてあるお水取ってくれないかしらっ。喉が渇いて渇いて仕方なかったのよ～」
line = "「あっ、来てくれたのねっ。誰か知らないけど、そこに置いてあるお水取ってくれないかしらっ。喉が渇いて渇いて仕方なかったのよ～」"

[[dialogue]]
speaker = "パルミエ"
# 「っと危ない！　角待ちなんて味な真似してくれるわね……！　返り討ちにしてあげるわっ……！」
line = "「っと危ない！　角待ちなんて味な真似してくれるわね……！　返り討ちにしてあげるわっ……！」"

[[dialogue]]
speaker = "unk"
# あの……ピンチっていうのは？
line = "あの……ピンチっていうのは？"

[[dialogue]]
speaker = "パルミエ"
# 「だから喉がカラカラなのっ。ゲーム中は手を離せないし……！　この位置からじゃ微妙にペットボトルまで手が届かないのよ～！」
line = "「だから喉がカラカラなのっ。ゲーム中は手を離せないし……！　この位置からじゃ微妙にペットボトルまで手が届かないのよ～！」"

[[dialogue]]
speaker = "パルミエ"
# 「あ、そうだ。ついでにグラスへ注ぎ直して氷も入れてきて？　あとストローも。プレイ中に飲み物<ruby=あお>呷</ruby>ってられないのよね～」
line = "「あ、そうだ。ついでにグラスへ注ぎ直して氷も入れてきて？　あとストローも。プレイ中に飲み物<ruby>呷<rt>あお</rt></ruby>ってられないのよね～」"

[[dialogue]]
speaker = "パルミエ"
# 「って──ちょっとちょっと。急に背を向けてどうしたのよ～？　可愛い私の世話を焼けるのよ～？　そこは感激してご奉仕するところじゃなぁい？」
line = "「って──ちょっとちょっと。急に背を向けてどうしたのよ～？　可愛い私の世話を焼けるのよ～？　そこは感激してご奉仕するところじゃなぁい？」"

[[dialogue]]
speaker = "パルミエ"
# 「わかったらほーら。お水と氷をグラスに入れて持ってきて？　そのままストローを私の口元まで近づけて～？」
line = "「わかったらほーら。お水と氷をグラスに入れて持ってきて？　そのままストローを私の口元まで近づけて～？」"

[[dialogue]]
speaker = "パルミエ"
# 「んちゅぅ……ゴクゴクぅ。ぷはぁ、生き返ったわ～」
line = "「んちゅぅ……ゴクゴクぅ。ぷはぁ、生き返ったわ～」"

[[dialogue]]
speaker = "パルミエ"
# 「ふふ、あなた中々ポイント高いわね～。なんだかんだ言いながらお願いを聞いてくれるなんて旦那様候補にぴったりだわ♪」
line = "「ふふ、あなた中々ポイント高いわね～。なんだかんだ言いながらお願いを聞いてくれるなんて旦那様候補にぴったりだわ♪」"

[[dialogue]]
speaker = "パルミエ"
# 「良かったら名前を──……って、あら？　星徒会長さんじゃない」
line = "「良かったら名前を──……って、あら？　星徒会長さんじゃない」"

[[dialogue]]
speaker = "パルミエ"
# 「ゲーム画面しか見てなかったから気付かなかったわ。へぇ、近くで見ると結構いい男じゃない♪」
line = "「ゲーム画面しか見てなかったから気付かなかったわ。へぇ、近くで見ると結構いい男じゃない♪」"

[[dialogue]]
speaker = "パルミエ"
# 「しかも頼まれたら断れないお節介で世話焼きさんなんて。ふふ、ますます旦那様候補にぴったりだわ」
line = "「しかも頼まれたら断れないお節介で世話焼きさんなんて。ふふ、ますます旦那様候補にぴったりだわ」"

[[dialogue]]
speaker = "パルミエ"
# 「ねね、会長さん♪　私と結婚するつもりはない？　私、まだ見ぬダーリンを探してこの学園に入学してきたの♪」
line = "「ねね、会長さん♪　私と結婚するつもりはない？　私、まだ見ぬダーリンを探してこの学園に入学してきたの♪」"

[[dialogue]]
speaker = "パルミエ"
# 「私の親が政治家でね～。学園を卒業しちゃったら見ず知らずの男と無理やり結婚させられちゃうかもしれないのよ～……」
line = "「私の親が政治家でね～。学園を卒業しちゃったら見ず知らずの男と無理やり結婚させられちゃうかもしれないのよ～……」"

[[dialogue]]
speaker = "パルミエ"
# 「新星学園の会長さんってことなら肩書きも十分だろうし♪　親も納得するに違いないわ～」
line = "「新星学園の会長さんってことなら肩書きも十分だろうし♪　親も納得するに違いないわ～」"

[[dialogue]]
speaker = "パルミエ"
# 「それに会長さんが私のダーリンになってくれたら、好きなだけグータラ生活できちゃいそうだし♪」
line = "「それに会長さんが私のダーリンになってくれたら、好きなだけグータラ生活できちゃいそうだし♪」"

[[dialogue]]
speaker = "パルミエ"
# 「ね、いいでしょ、ダーリン♪　私と結婚しましょ、ダーリン♪　こんなに可愛いお嫁さんと一緒になれるなら最高に幸せじゃない、ダーリン♪」
line = "「ね、いいでしょ、ダーリン♪　私と結婚しましょ、ダーリン♪　こんなに可愛いお嫁さんと一緒になれるなら最高に幸せじゃない、ダーリン♪」"

[[dialogue]]
speaker = "unk"
# ちょっ、近いから……！
line = "ちょっ、近いから……！"

[[dialogue]]
speaker = "パルミエ"
# 「あらあら意外と初心なのね？　ちょっとおっぱい押しつけただけで顔真っ赤にしちゃって♪」
line = "「あらあら意外と初心なのね？　ちょっとおっぱい押しつけただけで顔真っ赤にしちゃって♪」"

[[dialogue]]
speaker = "パルミエ"
# 「その子犬っぽさも私好みだわ～。良かった、無事に旦那様候補が見つかって♪」
line = "「その子犬っぽさも私好みだわ～。良かった、無事に旦那様候補が見つかって♪」"

[[dialogue]]
speaker = "パルミエ"
# 「もちろん私の可愛さなら引く手数多なんだけど♪　選抜するのも面倒臭くてどうしようかと思ってたのよね～」
line = "「もちろん私の可愛さなら引く手数多なんだけど♪　選抜するのも面倒臭くてどうしようかと思ってたのよね～」"

[[dialogue]]
speaker = "パルミエ"
# 「ということで、これから末永くよろしくね、ダーリン♪　あとお水のおかわり、ちょーだい？」
line = "「ということで、これから末永くよろしくね、ダーリン♪　あとお水のおかわり、ちょーだい？」"

[[dialogue]]
speaker = "パルミエ"
# 「って、ちょっとちょっと。どこに行こうとしてるのよ。ノリが悪いわよ、ダーリン」
line = "「って、ちょっとちょっと。どこに行こうとしてるのよ。ノリが悪いわよ、ダーリン」"

[[dialogue]]
speaker = "パルミエ"
# 「せっかくだからもう少し親睦を深めましょうよ。夫婦生活は長い会話であるって偉い人も言ってたじゃない」
line = "「せっかくだからもう少し親睦を深めましょうよ。夫婦生活は長い会話であるって偉い人も言ってたじゃない」"

[[dialogue]]
speaker = "パルミエ"
# 「……うん？　夫婦以前に私の名前も知らない？　あら、美人の代名詞である私の名前を知らないなんて恥ずかしいわよ？」
line = "「……うん？　夫婦以前に私の名前も知らない？　あら、美人の代名詞である私の名前を知らないなんて恥ずかしいわよ？」"

[[dialogue]]
speaker = "パルミエ"
# 「私はパルミエ・ダックワーズ。ちゃーんと覚えておいて？　あ、緋宮パルミエって名乗っちゃった方がいいかしら？」
line = "「私はパルミエ・ダックワーズ。ちゃーんと覚えておいて？　あ、緋宮パルミエって名乗っちゃった方がいいかしら？」"

[[dialogue]]
speaker = "パルミエ"
# 「って冗談よ、冗談。でも、そうやって照れるところも可愛いわ♪」
line = "「って冗談よ、冗談。でも、そうやって照れるところも可愛いわ♪」"

[[dialogue]]
speaker = "パルミエ"
# 「いいから、こっちに来て一緒にゲームでもしましょ？　対戦相手が欲しかったところなのよ～」
line = "「いいから、こっちに来て一緒にゲームでもしましょ？　対戦相手が欲しかったところなのよ～」"

[[dialogue]]
speaker = "unk"
# なんだこの自由人……
line = "なんだこの自由人……"

[[dialogue]]
speaker = "パルミエ"
# 「ふふ、魅力的でしょ？　私、可愛い上に自分の欲求に素直なところが取り柄なの♪」
line = "「ふふ、魅力的でしょ？　私、可愛い上に自分の欲求に素直なところが取り柄なの♪」"

[[dialogue]]
speaker = "パルミエ"
# 「面倒臭いことなんてヤダヤダ。一度きりの人生だもの。やりたいことだけやって楽しく過ごしたいじゃない？」
line = "「面倒臭いことなんてヤダヤダ。一度きりの人生だもの。やりたいことだけやって楽しく過ごしたいじゃない？」"

[[dialogue]]
speaker = "パルミエ"
# 「遊びたい時に遊んで、寝たい時に寝て、誰かをからかいたい時にからかう。それが人生を謳歌する秘訣よ♪」
line = "「遊びたい時に遊んで、寝たい時に寝て、誰かをからかいたい時にからかう。それが人生を謳歌する秘訣よ♪」"

[[dialogue]]
speaker = "unk"
# やっぱりからかってたのか
line = "やっぱりからかってたのか"

[[dialogue]]
speaker = "パルミエ"
# 「ダーリン候補なのは事実よ～？　ひと目見てビビっと来ちゃったし♪　世話焼きっぽいところも気に入っちゃったわ♪」
line = "「ダーリン候補なのは事実よ～？　ひと目見てビビっと来ちゃったし♪　世話焼きっぽいところも気に入っちゃったわ♪」"

[[dialogue]]
speaker = "パルミエ"
# 「そうだ。いっそ星徒会なんて辞めて、おなか部に入らない？　何を隠そうここはおなか部の部室なのよ～」
line = "「そうだ。いっそ星徒会なんて辞めて、おなか部に入らない？　何を隠そうここはおなか部の部室なのよ～」"

[[dialogue]]
speaker = "パルミエ"
# 「簡単に言えば、人助けサークルみたいなものでね。幼馴染み２人と一緒にちょっとしたお悩み相談に乗って回ってるの」
line = "「簡単に言えば、人助けサークルみたいなものでね。幼馴染み２人と一緒にちょっとしたお悩み相談に乗って回ってるの」"

[[dialogue]]
speaker = "パルミエ"
# 「ま、働いてるのはもっぱら残りの２人だけどね♪　私はこうして自由気ままにだらだら過ごせる部室が欲しかっただけだから♪」
line = "「ま、働いてるのはもっぱら残りの２人だけどね♪　私はこうして自由気ままにだらだら過ごせる部室が欲しかっただけだから♪」"

[[dialogue]]
speaker = "パルミエ"
# 「そもそも依頼も滅多にこないし。もし入部してくれたら……んっ。こうして四六時中、私と乳繰りあって過ごせちゃうけど♪」
line = "「そもそも依頼も滅多にこないし。もし入部してくれたら……んっ。こうして四六時中、私と乳繰りあって過ごせちゃうけど♪」"

[[dialogue]]
speaker = "パルミエ"
# 「ひゃんっ。あらあら本当に照れ屋さんなんだから♪　そんなに慌てて距離を取らなくてもいいのに♪」
line = "「ひゃんっ。あらあら本当に照れ屋さんなんだから♪　そんなに慌てて距離を取らなくてもいいのに♪」"

[[dialogue]]
speaker = "パルミエ"
# 「なぁに？　もう戻るつもりなの？　ダメよ、もう少しここにいーて。まだまだ私の世話を焼いてくれなきゃ困るわ～」
line = "「なぁに？　もう戻るつもりなの？　ダメよ、もう少しここにいーて。まだまだ私の世話を焼いてくれなきゃ困るわ～」"

[[dialogue]]
speaker = "パルミエ"
# 「いいから、もう少しここにいなさい？　疲れてるんでしょ？　目の下に大きなクマができてるわよ？」
line = "「いいから、もう少しここにいなさい？　疲れてるんでしょ？　目の下に大きなクマができてるわよ？」"

[[dialogue]]
speaker = "パルミエ"
# 「私のＳＯＳを聞いて一目散に飛び込んで来る人だもの。大方どんな些細なことにも首を突っ込んで回ってるんじゃない？」
line = "「私のＳＯＳを聞いて一目散に飛び込んで来る人だもの。大方どんな些細なことにも首を突っ込んで回ってるんじゃない？」"

[[dialogue]]
speaker = "パルミエ"
# 「クマまで作るなんて頑張りすぎよ。星騎士なんて有り余るほどいるんだから、たまには誰かに仕事を押しつけて、グータラ過ごせばいーの」
line = "「クマまで作るなんて頑張りすぎよ。星騎士なんて有り余るほどいるんだから、たまには誰かに仕事を押しつけて、グータラ過ごせばいーの」"

[[dialogue]]
speaker = "パルミエ"
# 「もしも叱られたら私が離してくれなかったって言えばいいから♪　大人しくだらだらしなさい？　そのうち倒れちゃうわよ？」
line = "「もしも叱られたら私が離してくれなかったって言えばいいから♪　大人しくだらだらしなさい？　そのうち倒れちゃうわよ？」"

[[dialogue]]
speaker = "パルミエ"
# 「ふふ、なぁに。意外そうな顔して。このくらいの気遣いは当然よ。良い妻っていうのは旦那を大切にするものなんだから♪」
line = "「ふふ、なぁに。意外そうな顔して。このくらいの気遣いは当然よ。良い妻っていうのは旦那を大切にするものなんだから♪」"

[[dialogue]]
speaker = "パルミエ"
# 「ということでダーリン、早くお水のおかわり持ってきて～？　あとゲームソフトの入れ替えも頼んだわね♪　それと後でマッサージもおねが～い♪」
line = "「ということでダーリン、早くお水のおかわり持ってきて～？　あとゲームソフトの入れ替えも頼んだわね♪　それと後でマッサージもおねが～い♪」"

[[dialogue]]
speaker = "パルミエ"
# 「あらあら。どうして疲れた顔しちゃってるの？　可愛い私にご奉仕できるんだから、そこはむしろ元気になるところじゃない♪」
line = "「あらあら。どうして疲れた顔しちゃってるの？　可愛い私にご奉仕できるんだから、そこはむしろ元気になるところじゃない♪」"
