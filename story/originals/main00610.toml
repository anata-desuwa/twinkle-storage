[[dialogue]]
speaker = "unk"
# 第１２話,姫,B
line = "第１２話,姫,B"

[[dialogue]]
speaker = "アイリーン"
# 「──っ！」
line = "「──っ！」"

[[dialogue]]
speaker = "クロト"
# 「これで文句ないな──撤退だ！」
line = "「これで文句ないな──撤退だ！」"

[[dialogue]]
speaker = "ルリエル"
# 「あいあいさー！」
line = "「あいあいさー！」"

[[dialogue]]
speaker = "unk"
# アイリーンさん達を退けて基地を脱する──
line = "アイリーンさん達を退けて基地を脱する──"

[[dialogue]]
speaker = "unk"
# 全員で夜空へと飛び立った先では、基地の全容が見渡せた。
line = "全員で夜空へと飛び立った先では、基地の全容が見渡せた。"

[[dialogue]]
speaker = "マトイ"
# 「わっ！？　海風がすごい──！」
line = "「わっ！？　海風がすごい──！」"

[[dialogue]]
speaker = "クロト"
# 「こんなところに基地を構えてたなんてな──」
line = "「こんなところに基地を構えてたなんてな──」"

[[dialogue]]
speaker = "サーシャ"
# 「見つからないうちに、さっさと飛んで逃げちゃいましょ♪」
line = "「見つからないうちに、さっさと飛んで逃げちゃいましょ♪」"

[[dialogue]]
speaker = "セーラ"
# 「んじゃ、うちはこのへんで～」
line = "「んじゃ、うちはこのへんで～」"

[[dialogue]]
speaker = "ソフィア"
# 「だーめーでーす。学園長に報告へ行きますよ」
line = "「だーめーでーす。学園長に報告へ行きますよ」"

[[dialogue]]
speaker = "ユウリ"
# 「はあ、長ぇ一日だ……」
line = "「はあ、長ぇ一日だ……」"

[[dialogue]]
speaker = "unk"
# そんなこんなで──
line = "そんなこんなで──"

[[dialogue]]
speaker = "unk"
# 『ネビュラ』から逃れた俺たちは、報告のため学園へと戻っていった。
line = "『ネビュラ』から逃れた俺たちは、報告のため学園へと戻っていった。"

[[dialogue]]
speaker = "ネビュラ隊員Ａ"
# 「──対象ロスト。行き先は恐らく流星学園」
line = "「──対象ロスト。行き先は恐らく流星学園」"

[[dialogue]]
speaker = "ネビュラ隊員Ｂ"
# 「アイリーン様……追わなくてもよろしかったのですか？」
line = "「アイリーン様……追わなくてもよろしかったのですか？」"

[[dialogue]]
speaker = "アイリーン"
# 「ええ──十分です。いずれまた会う機会もあるでしょう」
line = "「ええ──十分です。いずれまた会う機会もあるでしょう」"

[[dialogue]]
speaker = "unk"
# クロトら去りし後。
line = "クロトら去りし後。"

[[dialogue]]
speaker = "unk"
# アイリーンは、魔法を通して彼らの星力──その痕跡を解析していた。
line = "アイリーンは、魔法を通して彼らの星力──その痕跡を解析していた。"

[[dialogue]]
speaker = "アイリーン"
# （太陽の星力……やはり星見の娘の血は、本物でしたか）
line = "（太陽の星力……やはり星見の娘の血は、本物でしたか）"

[[dialogue]]
speaker = "unk"
# いずれまた会う。
line = "いずれまた会う。"

[[dialogue]]
speaker = "unk"
# その言葉は、紛れもない運命なのかもしれなかった……。
line = "その言葉は、紛れもない運命なのかもしれなかった……。"

[[dialogue]]
speaker = "セドナ"
# 「と、いうわけで──彼らとの初接触を果たしました」
line = "「と、いうわけで──彼らとの初接触を果たしました」"

[[dialogue]]
speaker = "？？？"
# 「な～んだ、もう行ってしもうたのか。せっかくの客人であったというに」
line = "「な～んだ、もう行ってしもうたのか。せっかくの客人であったというに」"

[[dialogue]]
speaker = "セドナ"
# 「十分な情報は与えました。いずれ、向こうから接触を図ってくるでしょう」
line = "「十分な情報は与えました。いずれ、向こうから接触を図ってくるでしょう」"

[[dialogue]]
speaker = "？？？"
# 「余は張り切って準備をしておったのだぞ。こういうのは第一いんしょーが肝心と言うからのう」
line = "「余は張り切って準備をしておったのだぞ。こういうのは第一いんしょーが肝心と言うからのう」"

[[dialogue]]
speaker = "セドナ"
# 「僭越ながら。その前に先日の課題をご提出いただかないことには……」
line = "「僭越ながら。その前に先日の課題をご提出いただかないことには……」"

[[dialogue]]
speaker = "？？？"
# 「わかっておる、わかっておる。全く、その眼で睨まれてはあやつらが帰るのも無理はない」
line = "「わかっておる、わかっておる。全く、その眼で睨まれてはあやつらが帰るのも無理はない」"

[[dialogue]]
speaker = "？？？"
# 「とはいえ、ま……それなら再会を心待ちにするとしようかのう」
line = "「とはいえ、ま……それなら再会を心待ちにするとしようかのう」"

[[dialogue]]
speaker = "？？？"
# 「あのクロトという<ruby=わっぱ>童</ruby>──それから、ヴィーナスとかいう娘。あの２人……何やらただならぬ繋がりに見えたがのう」
line = "「あのクロトという<ruby>童<rt>わっぱ</rt></ruby>──それから、ヴィーナスとかいう娘。あの２人……何やらただならぬ繋がりに見えたがのう」"

[[dialogue]]
speaker = "unk"
# 笑う少女。
line = "笑う少女。"

[[dialogue]]
speaker = "unk"
# 果たして、彼らが再びここを訪れる日は来るのだろうか……。
line = "果たして、彼らが再びここを訪れる日は来るのだろうか……。"
