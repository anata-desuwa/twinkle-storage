[[dialogue]]
speaker = "ヘレナ"
# 「魔王もとくとありがたみを噛みしめるがよい。私の奉仕を受けられる贅沢な人間など、この世に２人といないのだからな」
line = "「魔王もとくとありがたみを噛みしめるがよい。私の奉仕を受けられる贅沢な人間など、この世に２人といないのだからな」"

[[dialogue]]
speaker = "ヘレナ"
# 「私がたっぷりと甘やかしてやる。この、大人の包容力でな……ふふふ」
line = "「私がたっぷりと甘やかしてやる。この、大人の包容力でな……ふふふ」"

[[dialogue]]
speaker = "unk"
# ヘレナちゃんが甘えたいだけ
