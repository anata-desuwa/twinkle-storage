[[dialogue]]
speaker = "マトイ"
# 「でも、会長を支えてくれる人ができたのはいいことなんじゃない？」
line = "「でも、会長を支えてくれる人ができたのはいいことなんじゃない？」"

[[dialogue]]
speaker = "サーシャ"
# 「それもそうね。会長くんが無理しないように見ていてくれるのなら」
line = "「それもそうね。会長くんが無理しないように見ていてくれるのなら」"

[[dialogue]]
speaker = "ヘレナ"
# 「ふふふ、その通りだ。私は貴重な人材なのだぞ」
