line = "第３話,甘えんぼヘレナちゃん,P"

[[dialogue]]
speaker = "unk"
# ある日のこと──
line = "ある日のこと──"

[[dialogue]]
speaker = "マトイ"
# 「会長～。この書類作ったから、見てみてくれない？」
line = "「会長～。この書類作ったから、見てみてくれない？」"

[[dialogue]]
speaker = "アナ"
# 「会長。次回の流星との合同会議における議題なのですが……」
line = "「会長。次回の流星との合同会議における議題なのですが……」"

[[dialogue]]
speaker = "サーシャ"
# 「会長くーん。茶道部の子が部室の鍵なくしちゃったみたいなんだけど～」
line = "「会長くーん。茶道部の子が部室の鍵なくしちゃったみたいなんだけど～」"

[[dialogue]]
speaker = "unk"
# 俺はいつものように、会長の仕事をまっとうしていた。
line = "俺はいつものように、会長の仕事をまっとうしていた。"

[[dialogue]]
speaker = "ヘレナ"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "ヘレナ"
# 「魔王よ。疲れてはいないか？　仕事は順調か？」
line = "「魔王よ。疲れてはいないか？　仕事は順調か？」"

[[dialogue]]
speaker = "ヘレナ"
# 「茶菓子もあるぞ。もし肩が凝っておるのなら、私が丹念に揉みほぐしてやる」
line = "「茶菓子もあるぞ。もし肩が凝っておるのなら、私が丹念に揉みほぐしてやる」"

[[dialogue]]
speaker = "unk"
# いつものこと
line = "いつものこと"

[[dialogue]]
speaker = "unk"
# 問題ない
line = "問題ない"

[[dialogue]]
speaker = "ヘレナ"
# 「そうか……」
line = "「そうか……」"

[[dialogue]]
speaker = "ヘレナ"
# 「だが、疲れた時はいつでも言うがよい。このヘレナちゃんがいつでも貴殿の癒やしとなろうぞ」
line = "「だが、疲れた時はいつでも言うがよい。このヘレナちゃんがいつでも貴殿の癒やしとなろうぞ」"

[[dialogue]]
speaker = "ヘレナ"
# 「貴殿はいつも無理しがちな面があるからな。たまには息抜きも必要だ」
line = "「貴殿はいつも無理しがちな面があるからな。たまには息抜きも必要だ」"

[[dialogue]]
speaker = "ヘレナ"
# 「私とはもう、単なる生徒と学園の関係者……という関係を超えた仲だ。いつでも頼ってくればよい」
line = "「私とはもう、単なる生徒と学園の関係者……という関係を超えた仲だ。いつでも頼ってくればよい」"

[[dialogue]]
speaker = "ヘレナ"
# 「なんなら、この間の猫カフェにでも一緒に──」
line = "「なんなら、この間の猫カフェにでも一緒に──」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……ねえ、ヘレナちゃん。すっごい気が散るんだけど」
line = "「……ねえ、ヘレナちゃん。すっごい気が散るんだけど」"

[[dialogue]]
speaker = "ヘレナ"
# 「気にするでない」
line = "「気にするでない」"

[[dialogue]]
speaker = "ヴィーナス"
# 「気にするわよ！　大体、なんでうちの星徒会室にちゃっかり潜り込んでるのよ！」
line = "「気にするわよ！　大体、なんでうちの星徒会室にちゃっかり潜り込んでるのよ！」"

[[dialogue]]
speaker = "ヘレナ"
# 「新星学園の理事長として、いくつか相談事を引き受けていてな──たまたまこちらへ来ていたのだ」
line = "「新星学園の理事長として、いくつか相談事を引き受けていてな──たまたまこちらへ来ていたのだ」"

[[dialogue]]
speaker = "ヘレナ"
# 「そのついでに、伴侶の仕事ぶりでも見ておこうかと思ったまでだ」
line = "「そのついでに、伴侶の仕事ぶりでも見ておこうかと思ったまでだ」"

[[dialogue]]
speaker = "マトイ"
# 「伴侶！？」
line = "「伴侶！？」"

[[dialogue]]
speaker = "サーシャ"
# 「あらあら。会長くんも将来安泰ねえ」
line = "「あらあら。会長くんも将来安泰ねえ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「もう。最近はそっちばっかり……愛娘のことも少しは気にしたらどうなのよ！」
line = "「もう。最近はそっちばっかり……愛娘のことも少しは気にしたらどうなのよ！」"

[[dialogue]]
speaker = "ヘレナ"
# 「今は娘より伴侶だ」
line = "「今は娘より伴侶だ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「むう！」
line = "「むう！」"

[[dialogue]]
speaker = "アナ"
# 「まあ、お２人も大概仲良く見えますが」
