[[dialogue]]
speaker = "ヘレナ"
# 「い、いや……あれはそういうことではなく……」
line = "「い、いや……あれはそういうことではなく……」"

[[dialogue]]
speaker = "ヘレナ"
# 「私はただ、魔王に日々の疲れを癒やしてほしくて……だな……」
