[[dialogue]]
speaker = "unk"
# 遥か上空にそびえる大型モンスターの口から、小型モンスターが絶えず出現し続けている。
line = "遥か上空にそびえる大型モンスターの口から、小型モンスターが絶えず出現し続けている。"

[[dialogue]]
speaker = "unk"
# 俺たちはいよいよマムのビーチバレー訓練以上の、多数の敵を捌かなければいけない状況へと追い込まれていた。
line = "俺たちはいよいよマムのビーチバレー訓練以上の、多数の敵を捌かなければいけない状況へと追い込まれていた。"

[[dialogue]]
speaker = "アム"
# 「くっ……！　敵の数が多すぎる！　体がもう１つ欲しい……！」
line = "「くっ……！　敵の数が多すぎる！　体がもう１つ欲しい……！」"

[[dialogue]]
speaker = "マハムート"
# 「できないことを言わない！　自分の力でできることをイメージなさい！」
line = "「できないことを言わない！　自分の力でできることをイメージなさい！」"

[[dialogue]]
speaker = "アム"
# 「イエス・マム！　うおぉぉぉーーーっ！」
line = "「イエス・マム！　うおぉぉぉーーーっ！」"

[[dialogue]]
speaker = "unk"
# アムがここぞとばかりの反射神経で、迫り来るモンスターの大群を捌き、殲滅して行くが、それでも手数が足りない。
line = "アムがここぞとばかりの反射神経で、迫り来るモンスターの大群を捌き、殲滅して行くが、それでも手数が足りない。"

[[dialogue]]
speaker = "unk"
# だから、俺たちはマトイの状況にすぐ気づくことができなかった。
line = "だから、俺たちはマトイの状況にすぐ気づくことができなかった。"

[[dialogue]]
speaker = "マトイ"
# 「はぁ……はぁ……！」
line = "「はぁ……はぁ……！」"

[[dialogue]]
speaker = "女の子"
# 「お姉さん……！」
line = "「お姉さん……！」"

[[dialogue]]
speaker = "マトイ"
# 「大丈夫……私が守るから……！」
line = "「大丈夫……私が守るから……！」"

[[dialogue]]
speaker = "unk"
# マトイの守っている星力持ちの女の子。敵が隙あらばその子を狙い、絶え間なく攻撃を仕掛けてきていた。
line = "マトイの守っている星力持ちの女の子。敵が隙あらばその子を狙い、絶え間なく攻撃を仕掛けてきていた。"

[[dialogue]]
speaker = "モンスター"
# 「ギギギ！」
line = "「ギギギ！」"

[[dialogue]]
speaker = "マトイ"
# 「させない！　はあぁぁぁーーーっ！」
line = "「させない！　はあぁぁぁーーーっ！」"

[[dialogue]]
speaker = "マトイ"
# （集中を切らすな。全部捌き続けろ！　他の誰かに助けてもらうまでの間でいい！）
line = "（集中を切らすな。全部捌き続けろ！　他の誰かに助けてもらうまでの間でいい！）"

[[dialogue]]
speaker = "マトイ"
# 「会長ーーーッ！　マムーーーッ！　アムちゃんッ！！　お願い！　誰でもいいから手を貸してッ！！！」
line = "「会長ーーーッ！　マムーーーッ！　アムちゃんッ！！　お願い！　誰でもいいから手を貸してッ！！！」"

[[dialogue]]
speaker = "unk"
# マトイ！？　待ってろ、今すぐ行く！
line = "マトイ！？　待ってろ、今すぐ行く！"

[[dialogue]]
speaker = "モンスター"
# 「ギーッ！」
line = "「ギーッ！」"

[[dialogue]]
speaker = "unk"
# しかし、目の前にモンスターの大群が殺到してくる。
line = "しかし、目の前にモンスターの大群が殺到してくる。"

[[dialogue]]
speaker = "unk"
# 邪魔だぁぁぁーーーッ！！
line = "邪魔だぁぁぁーーーッ！！"

[[dialogue]]
speaker = "マトイ"
# （ダメッ……！　これ以上は……保たない……！）
line = "（ダメッ……！　これ以上は……保たない……！）"

[[dialogue]]
speaker = "マトイ"
# 「あっ……！？」
line = "「あっ……！？」"

[[dialogue]]
speaker = "unk"
# 敵の攻撃の集中砲火で、ついにマトイの盾が砕かれる。そして、咄嗟に盾代わりにした剣も弾かれ、手から離れてしまう。
line = "敵の攻撃の集中砲火で、ついにマトイの盾が砕かれる。そして、咄嗟に盾代わりにした剣も弾かれ、手から離れてしまう。"

[[dialogue]]
speaker = "マトイ"
# （武器を両方とも失った……！　普通じゃない状況……！　私にできることはもう――）
line = "（武器を両方とも失った……！　普通じゃない状況……！　私にできることはもう――）"

[[dialogue]]
speaker = "unk"
# マトイが後ろに視線を向けると、そこには恐怖に一生懸命耐える女の子の姿があって。
line = "マトイが後ろに視線を向けると、そこには恐怖に一生懸命耐える女の子の姿があって。"

[[dialogue]]
speaker = "マトイ"
# 「諦め……られるかぁぁぁぁぁぁーーーーーーっ！！！」
line = "「諦め……られるかぁぁぁぁぁぁーーーーーーっ！！！」"

[[dialogue]]
speaker = "unk"
# マトイは両腕を前に構えて防御の姿勢をとり、女の子へ向けて放たれる集中砲火を体で受け止めた。
line = "マトイは両腕を前に構えて防御の姿勢をとり、女の子へ向けて放たれる集中砲火を体で受け止めた。"

[[dialogue]]
speaker = "マトイ"
# 「か……はっ……！」
line = "「か……はっ……！」"

[[dialogue]]
speaker = "unk"
# マトイーーーーーーーーーッ！！！
line = "マトイーーーーーーーーーッ！！！"

[[dialogue]]
speaker = "unk"
# 俺は地面に倒れ込みそうになるマトイに駆け寄って、体を支える。
line = "俺は地面に倒れ込みそうになるマトイに駆け寄って、体を支える。"

[[dialogue]]
speaker = "アム"
# 「マトイ先輩ッ！！！」
line = "「マトイ先輩ッ！！！」"

[[dialogue]]
speaker = "unk"
# 続いてアムが到着し、盾を地面に突き刺すと重力バリアーを周囲に展開。マトイの代わりに女の子を守ろうとする。
line = "続いてアムが到着し、盾を地面に突き刺すと重力バリアーを周囲に展開。マトイの代わりに女の子を守ろうとする。"

[[dialogue]]
speaker = "unk"
# モンスターの大群が再びこちらへ集中砲火を放とうとしていたが――
line = "モンスターの大群が再びこちらへ集中砲火を放とうとしていたが――"

[[dialogue]]
speaker = "マハムート"
# 「……やってくれたわね」
line = "「……やってくれたわね」"

[[dialogue]]
speaker = "unk"
# 俺たちとモンスター群の間に、マムが割って入る。そして――
line = "俺たちとモンスター群の間に、マムが割って入る。そして――"

[[dialogue]]
speaker = "マハムート"
# 「引力操作」
line = "「引力操作」"

[[dialogue]]
speaker = "モンスター"
# 「ギッ……！？」
line = "「ギッ……！？」"

[[dialogue]]
speaker = "マハムート"
# 「跡形もなく、ぶっ潰れなさい……！」
line = "「跡形もなく、ぶっ潰れなさい……！」"

[[dialogue]]
speaker = "unk"
# マムが敵に向けた手の平を、ぐっと握る。
line = "マムが敵に向けた手の平を、ぐっと握る。"

[[dialogue]]
speaker = "マハムート"
# 「ブラックホール・イグニッション！！！」
line = "「ブラックホール・イグニッション！！！」"

[[dialogue]]
speaker = "unk"
# 凄まじい引力によってモンスター群が空中の１点へと圧縮され、大爆発を巻き起こす。
line = "凄まじい引力によってモンスター群が空中の１点へと圧縮され、大爆発を巻き起こす。"

[[dialogue]]
speaker = "マハムート"
# 「――会長、マトイの状態は……！？」
line = "「――会長、マトイの状態は……！？」"

[[dialogue]]
speaker = "unk"
# 傷が酷い……！　出血が止まらない……！
line = "傷が酷い……！　出血が止まらない……！"

[[dialogue]]
speaker = "アム"
# 「マトイ先輩！　大丈夫ですか、マトイ先輩！」
line = "「マトイ先輩！　大丈夫ですか、マトイ先輩！」"

[[dialogue]]
speaker = "マトイ"
# 「大……丈夫……」
line = "「大……丈夫……」"

[[dialogue]]
speaker = "unk"
# マトイがゆっくりと顔を上げる。
line = "マトイがゆっくりと顔を上げる。"

[[dialogue]]
speaker = "マトイ"
# 「まだ戦える……」
line = "「まだ戦える……」"

[[dialogue]]
speaker = "アム"
# 「なに言ってるんですか！？　その体じゃ無理ですよ！　すぐに回復しないと……！」
line = "「なに言ってるんですか！？　その体じゃ無理ですよ！　すぐに回復しないと……！」"

[[dialogue]]
speaker = "マトイ"
# 「守るのと並行して回復星術を使うから、大丈夫……」
line = "「守るのと並行して回復星術を使うから、大丈夫……」"

[[dialogue]]
speaker = "マハムート"
# 「無理よ。盾はさっき砕けたでしょ。水着フォームに変身して、自身の回復を最優先になさい」
line = "「無理よ。盾はさっき砕けたでしょ。水着フォームに変身して、自身の回復を最優先になさい」"

[[dialogue]]
speaker = "マトイ"
# 「それでも……私は、みんなの『普通』を守りたい……！」
line = "「それでも……私は、みんなの『普通』を守りたい……！」"

[[dialogue]]
speaker = "マハムート"
# 「マトイ……？」
line = "「マトイ……？」"

[[dialogue]]
speaker = "マトイ"
# 「自分が星騎士として、なんで今日まで戦って来れたのか、やっとわかったんです……」
line = "「自分が星騎士として、なんで今日まで戦って来れたのか、やっとわかったんです……」"

[[dialogue]]
speaker = "マトイ"
# 「私は……当たり前の日常を守りたい――」
line = "「私は……当たり前の日常を守りたい――」"

[[dialogue]]
speaker = "マトイ"
# （みんなが普通に、笑って過ごせる幸せを……）
line = "（みんなが普通に、笑って過ごせる幸せを……）"

[[dialogue]]
speaker = "マトイ"
# （ヴィーナス）
line = "（ヴィーナス）"

[[dialogue]]
speaker = "マトイ"
# （サーシャさん）
line = "（サーシャさん）"

[[dialogue]]
speaker = "マトイ"
# （アナ）
line = "（アナ）"

[[dialogue]]
speaker = "マトイ"
# （そして――）
line = "（そして――）"

[[dialogue]]
speaker = "マトイ"
# （会長）
line = "（会長）"

[[dialogue]]
speaker = "マトイ"
# 「――かけがえのない私の大切な『普通』を、守る為に……！」
line = "「――かけがえのない私の大切な『普通』を、守る為に……！」"

[[dialogue]]
speaker = "unk"
# その時、俺には見えた。
line = "その時、俺には見えた。"

[[dialogue]]
speaker = "unk"
# マトイの中に灯る、きら星のような輝きを。
line = "マトイの中に灯る、きら星のような輝きを。"

[[dialogue]]
speaker = "unk"
# それは確かな予感だ。今なら、きっと――
line = "それは確かな予感だ。今なら、きっと――"

[[dialogue]]
speaker = "unk"
# 俺は、マトイを信じる！
line = "俺は、マトイを信じる！"

[[dialogue]]
speaker = "マトイ"
# 「会長……？」
line = "「会長……？」"

[[dialogue]]
speaker = "unk"
# アルケインノヴァエクストリーム！！！
line = "アルケインノヴァエクストリーム！！！"

[[dialogue]]
speaker = "マトイ"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "unk"
# マトイのきら星のような輝きが、眩く広がっていく。
line = "マトイのきら星のような輝きが、眩く広がっていく。"

[[dialogue]]
speaker = "unk"
# そして――
line = "そして――"

[[dialogue]]
speaker = "マトイ"
# 「これが……」
line = "「これが……」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「魔王の絆の力――私の『ノヴァフォーム』」
line = "「魔王の絆の力――私の『ノヴァフォーム』」"

[[dialogue]]
speaker = "アム"
# 「マトイ先輩、その姿は……！？　それに、傷がもう消えてる……！？」
line = "「マトイ先輩、その姿は……！？　それに、傷がもう消えてる……！？」"

[[dialogue]]
speaker = "マハムート"
# 「どうやら……自分の殻を破ったみたいね」
line = "「どうやら……自分の殻を破ったみたいね」"

[[dialogue]]
speaker = "モンスター"
# 「ギギギッ！」
line = "「ギギギッ！」"

[[dialogue]]
speaker = "unk"
# マトイの強い輝きに惹かれるかのように、モンスターの大群が再び押し寄せ、一斉砲火を開始しようとする。俺たちは身構えるが――
line = "マトイの強い輝きに惹かれるかのように、モンスターの大群が再び押し寄せ、一斉砲火を開始しようとする。俺たちは身構えるが――"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「させない！」
line = "「させない！」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# （イメージしろ。これは会長と絆で繋がった『魔王の力』）
line = "（イメージしろ。これは会長と絆で繋がった『魔王の力』）"

[[dialogue]]
speaker = "マトイ（覚醒）"
# （だったら――）
line = "（だったら――）"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「ディバイドシールド！」
line = "「ディバイドシールド！」"

[[dialogue]]
speaker = "unk"
# マトイが盾を構えた、次の瞬間。
line = "マトイが盾を構えた、次の瞬間。"

[[dialogue]]
speaker = "アム"
# 「マトイ先輩の盾が……分裂した！？」
line = "「マトイ先輩の盾が……分裂した！？」"

[[dialogue]]
speaker = "unk"
# 盾が分身するように無数に展開され、モンスターの攻撃を全て受け止める。
line = "盾が分身するように無数に展開され、モンスターの攻撃を全て受け止める。"

[[dialogue]]
speaker = "マトイ（覚醒）"
# （防御だけじゃ足りない。私が望むのは、守る為の強い力！）
line = "（防御だけじゃ足りない。私が望むのは、守る為の強い力！）"

[[dialogue]]
speaker = "unk"
# 攻撃を受けた盾が砕け、それは星力の輝きに変換されて、マトイのもう１つの武器である大剣へと吸収されて行く。
line = "攻撃を受けた盾が砕け、それは星力の輝きに変換されて、マトイのもう１つの武器である大剣へと吸収されて行く。"

[[dialogue]]
speaker = "マトイ（覚醒）"
# （私の中にある『最強』のイメージ――）
line = "（私の中にある『最強』のイメージ――）"

[[dialogue]]
speaker = "マトイ（覚醒）"
# （それは、劣等感を抱きつつも憎めない――私の親友）
line = "（それは、劣等感を抱きつつも憎めない――私の親友）"

[[dialogue]]
speaker = "マトイ（覚醒）"
# （神々しいまでの憧れの輝き――）
line = "（神々しいまでの憧れの輝き――）"

[[dialogue]]
speaker = "unk"
# マトイが両手で大剣を構える。
line = "マトイが両手で大剣を構える。"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「あの<ruby=ほし>金星</ruby>に届け――」
line = "「あの<ruby>金星<rt>ほし</rt></ruby>に届け――」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「リフレクトゴッデスカリバーーーッ！！！」
line = "「リフレクトゴッデスカリバーーーッ！！！」"

[[dialogue]]
speaker = "unk"
# 振り下ろした大剣から凄まじい星力の輝きが、上空の大型モンスターに向かって解き放たれる。
line = "振り下ろした大剣から凄まじい星力の輝きが、上空の大型モンスターに向かって解き放たれる。"

[[dialogue]]
speaker = "unk"
# それは小型モンスターの大群を巻き込みながら、大型モンスターに直撃。
line = "それは小型モンスターの大群を巻き込みながら、大型モンスターに直撃。"

[[dialogue]]
speaker = "モンスター"
# 「ギアァァァーーーーーーッ！！？」
line = "「ギアァァァーーーーーーッ！！？」"

[[dialogue]]
speaker = "アム"
# 「すごい……！　大型モンスターの動きが止まった！　小型モンスターも吹き飛ばして……今なら！」
line = "「すごい……！　大型モンスターの動きが止まった！　小型モンスターも吹き飛ばして……今なら！」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「みんな、力を貸して！　あのモンスターを倒して、この戦いを終わらせる！」
line = "「みんな、力を貸して！　あのモンスターを倒して、この戦いを終わらせる！」"

[[dialogue]]
speaker = "マハムート"
# 「いいわ。私たちで援護してあげる。貴方のやりたいようにやりなさい、マトイ！」
line = "「いいわ。私たちで援護してあげる。貴方のやりたいようにやりなさい、マトイ！」"

[[dialogue]]
speaker = "アム"
# 「背中はあたしが守るよ！　だから――やっちゃえ！　マトイ先輩！！」
line = "「背中はあたしが守るよ！　だから――やっちゃえ！　マトイ先輩！！」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「うん！　会長、指示をお願い！」
line = "「うん！　会長、指示をお願い！」"

[[dialogue]]
speaker = "unk"
# アルケインノヴァエクストリーム！！！
line = "アルケインノヴァエクストリーム！！！"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「ありがとう。――行ってくる！」
line = "「ありがとう。――行ってくる！」"

[[dialogue]]
speaker = "unk"
# 大型モンスターへと向かって、飛び立つマトイ。
line = "大型モンスターへと向かって、飛び立つマトイ。"

[[dialogue]]
speaker = "unk"
# 決戦が幕を開けるのだった。
line = "決戦が幕を開けるのだった。"
