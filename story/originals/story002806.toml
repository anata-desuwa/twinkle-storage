[[dialogue]]
speaker = "unk"
# 書庫から伸びた鎖が、傷ついたウィステリアの四肢を拘束し、自由を奪う。
line = "書庫から伸びた鎖が、傷ついたウィステリアの四肢を拘束し、自由を奪う。"

[[dialogue]]
speaker = "unk"
# それはフィーニスの塔で戒められたヴィライアの再現だった。
line = "それはフィーニスの塔で戒められたヴィライアの再現だった。"

[[dialogue]]
speaker = "ウィステリア"
# 「く……ぅっ……鎖で縛りつけて、いつかの意趣返しかしら？」
line = "「く……ぅっ……鎖で縛りつけて、いつかの意趣返しかしら？」"

[[dialogue]]
speaker = "ヴィライア"
# 『この姿は吸収した魔力からヴィライアを再現したもの。私にヴィライアとしての感情はないわ』
line = "『この姿は吸収した魔力からヴィライアを再現したもの。私にヴィライアとしての感情はないわ』"

[[dialogue]]
speaker = "ヴィライア"
# 『星力だけでよく抵抗したわ。でもこれで理解したでしょう。魔導書なしではあなたは“英雄”たりえない』
line = "『星力だけでよく抵抗したわ。でもこれで理解したでしょう。魔導書なしではあなたは“英雄”たりえない』"

[[dialogue]]
speaker = "ウィステリア"
# 「だから、英雄なんかならないって言ってるでしょっ！」
line = "「だから、英雄なんかならないって言ってるでしょっ！」"

[[dialogue]]
speaker = "ヴィライア"
# 『運命を受け入れなさい。呪いに身を委ねるのよ』
line = "『運命を受け入れなさい。呪いに身を委ねるのよ』"

[[dialogue]]
speaker = "ウィステリア"
# 「こいつ、ホント聞く耳なしね……」
line = "「こいつ、ホント聞く耳なしね……」"

[[dialogue]]
speaker = "ウィステリア"
# （でも、もう打つ手なし。どうしたら……）
line = "（でも、もう打つ手なし。どうしたら……）"

[[dialogue]]
speaker = "モネ"
# 「どわーーーーーーーーっ！？」
line = "「どわーーーーーーーーっ！？」"

[[dialogue]]
speaker = "ウィステリア"
# 「紙屋敷さん！？」
line = "「紙屋敷さん！？」"

[[dialogue]]
speaker = "モネ"
# 「あたた……ウィステリアさん、よかった。ご無事だったんですね」
line = "「あたた……ウィステリアさん、よかった。ご無事だったんですね」"

[[dialogue]]
speaker = "ウィステリア"
# 「いや、全然ご無事じゃないけど……それより、どうして戻ってきたの！？　ここは……」
line = "「いや、全然ご無事じゃないけど……それより、どうして戻ってきたの！？　ここは……」"

[[dialogue]]
speaker = "モネ"
# 「『リクリエで滅んだ魔族の怨念を収めた書庫』なんですよね？」
line = "「『リクリエで滅んだ魔族の怨念を収めた書庫』なんですよね？」"

[[dialogue]]
speaker = "ウィステリア"
# 「なんで知って……紙屋敷さん、まさかここの本を読んだの！？」
line = "「なんで知って……紙屋敷さん、まさかここの本を読んだの！？」"

[[dialogue]]
speaker = "モネ"
# 「はい。この子に教えてもらいました」
line = "「はい。この子に教えてもらいました」"

[[dialogue]]
speaker = "unk"
# そう言って、本を見せるモネ。指先は焦げ、戦闘服もところどころ破けている。
line = "そう言って、本を見せるモネ。指先は焦げ、戦闘服もところどころ破けている。"

[[dialogue]]
speaker = "ウィステリア"
# 「呪いの本を読むってことはその本に呪われるってことなの。今まで読めなかった字が読めるのも、呪いを受けたからよ」
line = "「呪いの本を読むってことはその本に呪われるってことなの。今まで読めなかった字が読めるのも、呪いを受けたからよ」"

[[dialogue]]
speaker = "ウィステリア"
# 「一冊読むだけでそんなにボロボロになって……でも、この書庫の危険性は理解したでしょう。ここにある本は全て呪いの本」
line = "「一冊読むだけでそんなにボロボロになって……でも、この書庫の危険性は理解したでしょう。ここにある本は全て呪いの本」"

[[dialogue]]
speaker = "ウィステリア"
# 「しかも、その呪いが流星市国に解き放たれようとしている」
line = "「しかも、その呪いが流星市国に解き放たれようとしている」"

[[dialogue]]
speaker = "ウィステリア"
# 「紙屋敷さん、私の最後の力であなたを図書館に戻すわ。援軍を呼んできて」
line = "「紙屋敷さん、私の最後の力であなたを図書館に戻すわ。援軍を呼んできて」"

[[dialogue]]
speaker = "ウィステリア"
# 「できるだけ強力な援軍を……新星・流星両学園の星徒会を呼んで。ヴィライアが現れた。そう伝えれば必ず来てくれるわ」
line = "「できるだけ強力な援軍を……新星・流星両学園の星徒会を呼んで。ヴィライアが現れた。そう伝えれば必ず来てくれるわ」"

[[dialogue]]
speaker = "ウィステリア"
# 「そして、この書庫を破壊するように伝えて」
line = "「そして、この書庫を破壊するように伝えて」"

[[dialogue]]
speaker = "ウィステリア"
# 「呪いが解き放たれる前にこの書庫を破壊する。それが新星学園からこの地下図書館の調査を任された、私の答えよ」
line = "「呪いが解き放たれる前にこの書庫を破壊する。それが新星学園からこの地下図書館の調査を任された、私の答えよ」"

[[dialogue]]
speaker = "ヴィライア"
# 『心外ね。あなたが魔本たちの呪いを受け入れれば、破壊する必要なんてないわ』
line = "『心外ね。あなたが魔本たちの呪いを受け入れれば、破壊する必要なんてないわ』"

[[dialogue]]
speaker = "モネ"
# 「きゃあーっ！？　おっきなドラゴン！？」
line = "「きゃあーっ！？　おっきなドラゴン！？」"

[[dialogue]]
speaker = "ウィステリア"
# 「ウソ、気付いてなかったの！？」
line = "「ウソ、気付いてなかったの！？」"

[[dialogue]]
speaker = "モネ"
# 「本たちとウィステリアさんのことしか頭になかったので……」
line = "「本たちとウィステリアさんのことしか頭になかったので……」"

[[dialogue]]
speaker = "ウィステリア"
# 「あのドラゴンは煌竜ヴィライア。かつてのリクリエで世界を滅ぼした竜……の再現らしいわ」
line = "「あのドラゴンは煌竜ヴィライア。かつてのリクリエで世界を滅ぼした竜……の再現らしいわ」"

[[dialogue]]
speaker = "ウィステリア"
# 「あれの言う通りに書庫の呪いを受け入れれば、私は廃人になってしまう代わりに、強大な力を得る」
line = "「あれの言う通りに書庫の呪いを受け入れれば、私は廃人になってしまう代わりに、強大な力を得る」"

[[dialogue]]
speaker = "ウィステリア"
# 「その力でリクリエを退けること。それがあのドラゴンの目的よ」
line = "「その力でリクリエを退けること。それがあのドラゴンの目的よ」"

[[dialogue]]
speaker = "モネ"
# 「つまり書庫を破壊して流星市国を守るか……」
line = "「つまり書庫を破壊して流星市国を守るか……」"

[[dialogue]]
speaker = "モネ"
# 「ウィステリアさんが書庫の呪いを受け入れ、その自我と引き換えに強大な力を得るか……」
line = "「ウィステリアさんが書庫の呪いを受け入れ、その自我と引き換えに強大な力を得るか……」"

[[dialogue]]
speaker = "ヴィライア"
# 『ふたつにひとつ、なんて言わせないわ』
line = "『ふたつにひとつ、なんて言わせないわ』"

[[dialogue]]
speaker = "ヴィライア"
# 『人間の娘。私の邪魔をしないなら、あなたに危害は加えないと約束するわ。私の敵はリクリエであって、人間ではないのだから』
line = "『人間の娘。私の邪魔をしないなら、あなたに危害は加えないと約束するわ。私の敵はリクリエであって、人間ではないのだから』"

[[dialogue]]
speaker = "ヴィライア"
# 『けれど、邪魔をするなら排除するまで。命が惜しければ何もせず、書庫の隅でじっとしていなさい』
line = "『けれど、邪魔をするなら排除するまで。命が惜しければ何もせず、書庫の隅でじっとしていなさい』"

[[dialogue]]
speaker = "ウィステリア"
# 「紙屋敷さん。怖いだろうけど、脅しに屈しちゃダメよ。助けを呼んできて。この書庫を壊して、流星市国を守らなくちゃ」
line = "「紙屋敷さん。怖いだろうけど、脅しに屈しちゃダメよ。助けを呼んできて。この書庫を壊して、流星市国を守らなくちゃ」"

[[dialogue]]
speaker = "ウィステリア"
# 「大丈夫、あなたは私が守るわ」
line = "「大丈夫、あなたは私が守るわ」"

[[dialogue]]
speaker = "モネ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "モネ"
# 「私は……どちらも選びません！」
line = "「私は……どちらも選びません！」"

[[dialogue]]
speaker = "モネ"
# 「私は、ウィステリアさんも、この本たちも、どちらも諦めない！！」
line = "「私は、ウィステリアさんも、この本たちも、どちらも諦めない！！」"
