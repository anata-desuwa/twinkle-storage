[[dialogue]]
speaker = "ウズメイア"
# 「もぐもぐもぐ……」
line = "「もぐもぐもぐ……」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「ど、どうでしょうか、ウズメイア先輩……」
line = "「ど、どうでしょうか、ウズメイア先輩……」"

[[dialogue]]
speaker = "ウズメイア"
# 「──かっらぁ！？　た、確かに２人が言ってるとおり……シャルレーヌちゃんのチョコ、めちゃくちゃ激辛だし！？」
line = "「──かっらぁ！？　た、確かに２人が言ってるとおり……シャルレーヌちゃんのチョコ、めちゃくちゃ激辛だし！？」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「妙ですね……お砂糖や生クリームなど、甘い物しか入れていないはずなのですけれど」
line = "「妙ですね……お砂糖や生クリームなど、甘い物しか入れていないはずなのですけれど」"

[[dialogue]]
speaker = "ウズメイア"
# 「だよねえ。お酒も入れてたけど、あくまで香りづけくらいの量じゃん？　これ、ハバネロソースを１瓶ぶち込んだみたいな辛さだし！」
line = "「だよねえ。お酒も入れてたけど、あくまで香りづけくらいの量じゃん？　これ、ハバネロソースを１瓶ぶち込んだみたいな辛さだし！」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「私たちが目を離した隙に、誰かがイタズラをしたのでしょうか……？」
line = "「私たちが目を離した隙に、誰かがイタズラをしたのでしょうか……？」"

[[dialogue]]
speaker = "ウズメイア"
# 「いや、それは考えにくくない？　あたしたち、チョコの前に付きっきりだったよね？」
line = "「いや、それは考えにくくない？　あたしたち、チョコの前に付きっきりだったよね？」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「ですよね……原因がぜんぜんわからないです」
line = "「ですよね……原因がぜんぜんわからないです」"

[[dialogue]]
speaker = "ウズメイア"
# 「んー。あたしもさっぱりだけど、とりあえず作り直してみよ？　工程をチェックしながらやれば、原因がわかるかもだよ」
line = "「んー。あたしもさっぱりだけど、とりあえず作り直してみよ？　工程をチェックしながらやれば、原因がわかるかもだよ」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「そうですね。何事も検証です。やってみましょう」
line = "「そうですね。何事も検証です。やってみましょう」"

[[dialogue]]
speaker = "unk"
# そうして、シャルレーヌがチョコレートを作り直したのだが──
line = "そうして、シャルレーヌがチョコレートを作り直したのだが──"

[[dialogue]]
speaker = "unk"
# 辛ぁあぁあぁあぁい！？
line = "辛ぁあぁあぁあぁい！？"

[[dialogue]]
speaker = "シャルレーヌ"
# 「な、なぜ……！？」
line = "「な、なぜ……！？」"

[[dialogue]]
speaker = "ウズメイア"
# 「世にも奇妙なチョコレート物語だし……！？　え、マジでどこから辛い要素が生まれてるの！？」
line = "「世にも奇妙なチョコレート物語だし……！？　え、マジでどこから辛い要素が生まれてるの！？」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「くっ……たかがチョコ作りごときで躓くだなんて……」
line = "「くっ……たかがチョコ作りごときで躓くだなんて……」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「──ウズメイア先輩。このままでは悔しいです。完成するまでお付き合いいただいてもよろしいですか？」
line = "「──ウズメイア先輩。このままでは悔しいです。完成するまでお付き合いいただいてもよろしいですか？」"

[[dialogue]]
speaker = "ウズメイア"
# 「ペアだもん、当然だし～！　力を合わせてゴー♪」
line = "「ペアだもん、当然だし～！　力を合わせてゴー♪」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「お酒を入れるアレンジをいったんやめてみました。レシピに忠実に作ったので今度こそ……」
line = "「お酒を入れるアレンジをいったんやめてみました。レシピに忠実に作ったので今度こそ……」"

[[dialogue]]
speaker = "unk"
# ハバネローーー！？
line = "ハバネローーー！？"

[[dialogue]]
speaker = "ウズメイア"
# 「うわお、会長くん、火ぃ噴きそうだし……！」
line = "「うわお、会長くん、火ぃ噴きそうだし……！」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「ど、どうしてっ……？」
line = "「ど、どうしてっ……？」"

[[dialogue]]
speaker = "ウズメイア"
# 「レシピそのものに問題があるのかも！　あたしがさっき作ったブラウニーを、シャルレーヌちゃんが作ってみたよ！」
line = "「レシピそのものに問題があるのかも！　あたしがさっき作ったブラウニーを、シャルレーヌちゃんが作ってみたよ！」"

[[dialogue]]
speaker = "unk"
# もう舌がひりひりして限界れす……
line = "もう舌がひりひりして限界れす……"

[[dialogue]]
speaker = "ルリエル"
# 「あれあれ？　会長さん、せっかくの試食なのに食べないのです？　じゃあルリエルが貰っちゃうのです！　もぐもぐもぐっ──♪」
line = "「あれあれ？　会長さん、せっかくの試食なのに食べないのです？　じゃあルリエルが貰っちゃうのです！　もぐもぐもぐっ──♪」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「あ、それは──」
line = "「あ、それは──」"

[[dialogue]]
speaker = "ルリエル"
# 「ひょぇーっ！？！？　辛い辛い辛い～っ！　激辛なのです～っ！？」
line = "「ひょぇーっ！？！？　辛い辛い辛い～っ！　激辛なのです～っ！？」"

[[dialogue]]
speaker = "unk"
# そうして何度目かの試行錯誤の末──
line = "そうして何度目かの試行錯誤の末──"

[[dialogue]]
speaker = "シャルレーヌ"
# 「原因がわかったかもしれません。会長さん、このチョコレートを食べてみてください」
line = "「原因がわかったかもしれません。会長さん、このチョコレートを食べてみてください」"

[[dialogue]]
speaker = "unk"
# ……あ、これはちゃんと甘い？
line = "……あ、これはちゃんと甘い？"

[[dialogue]]
speaker = "シャルレーヌ"
# 「……やっぱり、そういうことでしたか」
line = "「……やっぱり、そういうことでしたか」"

[[dialogue]]
speaker = "ウズメイア"
# 「さっき会長くんが食べたチョコは、仕上げの星力チャージをしてないパターンだし……」
line = "「さっき会長くんが食べたチョコは、仕上げの星力チャージをしてないパターンだし……」"

[[dialogue]]
speaker = "ウズメイア"
# 「流星学園のバレンタインは、大聖堂のイベントで配ることは知ってるよね？」
line = "「流星学園のバレンタインは、大聖堂のイベントで配ることは知ってるよね？」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「星騎士の作るチョコということで、おまじないみたいな意味合いで、星力を込める作業が仕上げにあるんですが……」
line = "「星騎士の作るチョコということで、おまじないみたいな意味合いで、星力を込める作業が仕上げにあるんですが……」"

[[dialogue]]
speaker = "ウズメイア"
# 「うん。その最後の工程だけカットしてみた感じ」
line = "「うん。その最後の工程だけカットしてみた感じ」"

[[dialogue]]
speaker = "ウズメイア"
# 「バレンタインフォームって人工戦闘服だから、まだ動作が不安定なのかな～って思って試してみたんだけど、正解だったみたい！」
line = "「バレンタインフォームって人工戦闘服だから、まだ動作が不安定なのかな～って思って試してみたんだけど、正解だったみたい！」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「レシピではなく、問題は私の星力にあったみたいですね……」
line = "「レシピではなく、問題は私の星力にあったみたいですね……」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「ウズメイア先輩はちゃんと新衣装をコントロールできているのに、お恥ずかしい限りです」
line = "「ウズメイア先輩はちゃんと新衣装をコントロールできているのに、お恥ずかしい限りです」"

[[dialogue]]
speaker = "ウズメイア"
# 「大丈夫！　まだ初日だもん。せっかくのペアなんだし、力を合わせて本番までに激甘チョコ、作れるように特訓だし♪」
line = "「大丈夫！　まだ初日だもん。せっかくのペアなんだし、力を合わせて本番までに激甘チョコ、作れるように特訓だし♪」"

[[dialogue]]
speaker = "unk"
# 俺も最後まで練習に付き合うよ
line = "俺も最後まで練習に付き合うよ"

[[dialogue]]
speaker = "シャルレーヌ"
# 「お２人とも……ありがとうございます。私も一刻も早く、バレンタインフォームを手懐けられるよう努力しますね」
line = "「お２人とも……ありがとうございます。私も一刻も早く、バレンタインフォームを手懐けられるよう努力しますね」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「ところで、ひどい味のものを何度も食べさせてしまった無礼をお詫びしなくては、ですよね♪」
line = "「ところで、ひどい味のものを何度も食べさせてしまった無礼をお詫びしなくては、ですよね♪」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「会長さん、こちらの甘～いトリュフチョコでお口直ししてください。はい……あ～ん<emoji=heart04>」
line = "「会長さん、こちらの甘～いトリュフチョコでお口直ししてください。はい……あ～ん<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
# 「あっ、何それ面白そ～♪　作り置きはいっぱいあるし！　会長くん、あたしのブラウニーももっと食べて！　あ～ん♪」
line = "「あっ、何それ面白そ～♪　作り置きはいっぱいあるし！　会長くん、あたしのブラウニーももっと食べて！　あ～ん♪」"

[[dialogue]]
speaker = "unk"
# もがもが……！？
line = "もがもが……！？"

[[dialogue]]
speaker = "unk"
# 初日からトラブルが発生してしまった流星学園のバレンタインだったが、シャルレーヌのチョコが激辛になってしまう原因は判明した。
line = "初日からトラブルが発生してしまった流星学園のバレンタインだったが、シャルレーヌのチョコが激辛になってしまう原因は判明した。"

[[dialogue]]
speaker = "unk"
# バレンタインデーまであと数日だけれど、できるかぎり彼女たちのところへ顔を出そうと思うのだった──
line = "バレンタインデーまであと数日だけれど、できるかぎり彼女たちのところへ顔を出そうと思うのだった──"

[[dialogue]]
speaker = "unk"
# ──それから数時間後。
line = "──それから数時間後。"

[[dialogue]]
speaker = "unk"
# 生徒たちが帰宅して静まり返るカフェテリアに、蠢く影がひとつ……
line = "生徒たちが帰宅して静まり返るカフェテリアに、蠢く影がひとつ……"

[[dialogue]]
speaker = "フワッチ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# こそこそと忍び込んだフワッチは、流星学園生が作り置きした星力入りのチョコレートの前で目を輝かせた。
line = "こそこそと忍び込んだフワッチは、流星学園生が作り置きした星力入りのチョコレートの前で目を輝かせた。"

[[dialogue]]
speaker = "フワッチ"
# 「イ～～～～～っ♪」
line = "「イ～～～～～っ♪」"
