[[dialogue]]
speaker = "unk"
# 第８話,ジグの囁き,B
line = "第８話,ジグの囁き,B"

[[dialogue]]
speaker = "チナ"
# 「おおおおっ！」
line = "「おおおおっ！」"

[[dialogue]]
speaker = "クロト"
# 「うおおおっ！」
line = "「うおおおっ！」"

[[dialogue]]
speaker = "unk"
# チナの槍と俺の拳が幾度もぶつかり、火花を散らせる。
line = "チナの槍と俺の拳が幾度もぶつかり、火花を散らせる。"

[[dialogue]]
speaker = "unk"
# 動きを止めようとヴィーナスの鎖がチナを追うが、吹き荒れる嵐が薙ぎ払った。
line = "動きを止めようとヴィーナスの鎖がチナを追うが、吹き荒れる嵐が薙ぎ払った。"

[[dialogue]]
speaker = "ヴィーナス"
# 「ノヴァフォームでもないってのに、相変わらず強いわね……！　ていうか前より強くなってるじゃない！」
line = "「ノヴァフォームでもないってのに、相変わらず強いわね……！　ていうか前より強くなってるじゃない！」"

[[dialogue]]
speaker = "チナ"
# 「アタシは会長から力を<ruby=たまわ>賜</ruby>ったんだ！　当然だろ！」
line = "「アタシは会長から力を<ruby>賜<rt>たまわ</rt></ruby>ったんだ！　当然だろ！」"

[[dialogue]]
speaker = "チナ"
# 「だけどそれだけじゃない──」
line = "「だけどそれだけじゃない──」"

[[dialogue]]
speaker = "チナ"
# 「デネブは一度滅びかけた。アタシらはあの滅びを目に焼き付けた……！」
line = "「デネブは一度滅びかけた。アタシらはあの滅びを目に焼き付けた……！」"

[[dialogue]]
speaker = "チナ"
# 「滅びは繰り返させない……！　その覚悟が、アタシらを……極星学園を強くしたんだ！」
line = "「滅びは繰り返させない……！　その覚悟が、アタシらを……極星学園を強くしたんだ！」"

[[dialogue]]
speaker = "unk"
# 俺たちの戦いによってアルタイルは守られた。
line = "俺たちの戦いによってアルタイルは守られた。"

[[dialogue]]
speaker = "unk"
# 流星市国にも被害は出たものの、クラウディアのグレートウォールによって壊滅は免れた。
line = "流星市国にも被害は出たものの、クラウディアのグレートウォールによって壊滅は免れた。"

[[dialogue]]
speaker = "unk"
# しかし一歩間違えば世界は滅び、瀬戸際で守れたとしても、流星市国を含め各地は甚大な破壊を受けただろう。
line = "しかし一歩間違えば世界は滅び、瀬戸際で守れたとしても、流星市国を含め各地は甚大な破壊を受けただろう。"

[[dialogue]]
speaker = "クロト"
# （だがチナの言う通りなら……誰がデネブを守った？）
line = "（だがチナの言う通りなら……誰がデネブを守った？）"

[[dialogue]]
speaker = "クロト"
# （破滅寸前にまで陥ったはずのデネブが、今も存在しているのはなぜなんだ……？）
line = "（破滅寸前にまで陥ったはずのデネブが、今も存在しているのはなぜなんだ……？）"

[[dialogue]]
speaker = "チナ"
# 「デネブはアタシたちが守る！　滅ぶのはオマエたちだ！」
line = "「デネブはアタシたちが守る！　滅ぶのはオマエたちだ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「だけどいいの！？　この前家族を亡くしたって言ってたけど、アルタイルを滅ぼせば、この世界にいるあなたの家族も……！」
line = "「だけどいいの！？　この前家族を亡くしたって言ってたけど、アルタイルを滅ぼせば、この世界にいるあなたの家族も……！」"

[[dialogue]]
speaker = "チナ"
# 「そんなのわかってんだよ！」
line = "「そんなのわかってんだよ！」"

[[dialogue]]
speaker = "チナ"
# 「でも選んだんだ！　オマエらアルタイルの連中を滅ぼしてでも、デネブを守るって！」
line = "「でも選んだんだ！　オマエらアルタイルの連中を滅ぼしてでも、デネブを守るって！」"

[[dialogue]]
speaker = "チナ"
# 「こんなことはうちの生徒たちにやらせられねえ！　だからアタシたち極星星徒会だけでやるんだ！」
line = "「こんなことはうちの生徒たちにやらせられねえ！　だからアタシたち極星星徒会だけでやるんだ！」"

[[dialogue]]
speaker = "unk"
# 小さな体で声を張り上げてチナが叫ぶ。
line = "小さな体で声を張り上げてチナが叫ぶ。"

[[dialogue]]
speaker = "unk"
# 彼女の覚悟は本物だ。自分の世界を守ろうという想いも。
line = "彼女の覚悟は本物だ。自分の世界を守ろうという想いも。"

[[dialogue]]
speaker = "unk"
# ならば俺たちも、己の覚悟を彼女にぶつけなければならない。
line = "ならば俺たちも、己の覚悟を彼女にぶつけなければならない。"

[[dialogue]]
speaker = "チナ"
# 「アルタイルを守るっていうなら、オマエらもデネブを滅ぼす覚悟をしてきたんだろうな？」
line = "「アルタイルを守るっていうなら、オマエらもデネブを滅ぼす覚悟をしてきたんだろうな？」"

[[dialogue]]
speaker = "クロト"
# 「いいや、俺たちが選んだ道は違う」
line = "「いいや、俺たちが選んだ道は違う」"

[[dialogue]]
speaker = "チナ"
# 「は？」
line = "「は？」"

[[dialogue]]
speaker = "クロト"
# 「アルタイルは守る。だけどデネブとは戦わない」
line = "「アルタイルは守る。だけどデネブとは戦わない」"

[[dialogue]]
speaker = "クロト"
# 「アルタイルやデネブを脅かすのがリクリエであるというのなら、デネブとともにリクリエと戦う」
line = "「アルタイルやデネブを脅かすのがリクリエであるというのなら、デネブとともにリクリエと戦う」"

[[dialogue]]
speaker = "クロト"
# 「極星学園とも協力したい。デネブに行って、君たちの星徒会長と話がしたいんだ」
line = "「極星学園とも協力したい。デネブに行って、君たちの星徒会長と話がしたいんだ」"

[[dialogue]]
speaker = "クロト"
# 「だから君にも力を貸してほしい！」
line = "「だから君にも力を貸してほしい！」"

[[dialogue]]
speaker = "チナ"
# 「な──！？」
line = "「な──！？」"

[[dialogue]]
speaker = "unk"
# チナが驚愕に目を見開く。
line = "チナが驚愕に目を見開く。"

[[dialogue]]
speaker = "unk"
# 怒りでもなく、覚悟でもなく、俺の返答の不可解さに忘我していた。
line = "怒りでもなく、覚悟でもなく、俺の返答の不可解さに忘我していた。"

[[dialogue]]
speaker = "チナ"
# 「そんな都合のいい選択がありえるか！　オマエがデネブのことを勝手に決めるな！」
line = "「そんな都合のいい選択がありえるか！　オマエがデネブのことを勝手に決めるな！」"

[[dialogue]]
speaker = "チナ"
# 「覚悟のないやつに、世界を守る資格はない！　オマエらがそこまでバカなら、容赦なくアルタイルを滅ぼす！」
line = "「覚悟のないやつに、世界を守る資格はない！　オマエらがそこまでバカなら、容赦なくアルタイルを滅ぼす！」"

[[dialogue]]
speaker = "クロト"
# 「いいや、滅ぼさせはしない！　アルタイルも、デネブも！」
line = "「いいや、滅ぼさせはしない！　アルタイルも、デネブも！」"

[[dialogue]]
speaker = "チナ"
# 「ふざけるなーーッ！！」
line = "「ふざけるなーーッ！！」"

[[dialogue]]
speaker = "unk"
# 俺とチナの攻撃が、そして意志がぶつかり合う。
line = "俺とチナの攻撃が、そして意志がぶつかり合う。"

[[dialogue]]
speaker = "unk"
# チナは、アルタイルを滅ぼすという咎を負ってでも、自分の世界を守ると決めた。
line = "チナは、アルタイルを滅ぼすという咎を負ってでも、自分の世界を守ると決めた。"

[[dialogue]]
speaker = "unk"
# 俺は、アルタイルを危険に晒してでも、両方の世界を救う道を探すと決めた。
line = "俺は、アルタイルを危険に晒してでも、両方の世界を救う道を探すと決めた。"

[[dialogue]]
speaker = "unk"
# これは覚悟の戦いだ。
line = "これは覚悟の戦いだ。"

[[dialogue]]
speaker = "クロト"
# 「アビスインパクト！！」
line = "「アビスインパクト！！」"

[[dialogue]]
speaker = "チナ"
# 「ぐあっ……！？」
line = "「ぐあっ……！？」"

[[dialogue]]
speaker = "unk"
# 俺の拳撃が闇色の衝撃波となってチナを捉えた。
line = "俺の拳撃が闇色の衝撃波となってチナを捉えた。"

[[dialogue]]
speaker = "unk"
# 続けて攻撃を──
line = "続けて攻撃を──"

[[dialogue]]
speaker = "チナ"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "クロト"
# 「──！？」
line = "「──！？」"

[[dialogue]]
speaker = "クロト"
# （今、笑った……？　何だ、この違和感は……？）
line = "（今、笑った……？　何だ、この違和感は……？）"

[[dialogue]]
speaker = "クロト"
# （そういえば、さっきまでチナが姿を表さなかったのはなぜだ……？）
line = "（そういえば、さっきまでチナが姿を表さなかったのはなぜだ……？）"

[[dialogue]]
speaker = "クロト"
# （やはり何かを企んでいる──！？）
line = "（やはり何かを企んでいる──！？）"

[[dialogue]]
speaker = "チナ"
# 「どうした魔王！　怖気づいたか！」
line = "「どうした魔王！　怖気づいたか！」"

[[dialogue]]
speaker = "クロト"
# 「ぐっ……！」
line = "「ぐっ……！」"

[[dialogue]]
speaker = "unk"
# クロトとヴィーナスがチナとぶつかる中、ジグと選挙管理委員会は空中で激突を繰り広げていた。
line = "クロトとヴィーナスがチナとぶつかる中、ジグと選挙管理委員会は空中で激突を繰り広げていた。"

[[dialogue]]
speaker = "unk"
# 雷矢が唸りを上げてジグに迫り、大剣がそれを斬り払う。
line = "雷矢が唸りを上げてジグに迫り、大剣がそれを斬り払う。"

[[dialogue]]
speaker = "unk"
# 剣尖が梨緒を狙えば、紙一重で一閃を躱し、掠めた金髪が風に巻かれて飛んでいった。
line = "剣尖が梨緒を狙えば、紙一重で一閃を躱し、掠めた金髪が風に巻かれて飛んでいった。"

[[dialogue]]
speaker = "unk"
# さらに──
line = "さらに──"

[[dialogue]]
speaker = "ベアトリス"
# 「そこですっ！」
line = "「そこですっ！」"

[[dialogue]]
speaker = "unk"
# ベアトリスの槍が伸びて、切っ先がジグを狙う。
line = "ベアトリスの槍が伸びて、切っ先がジグを狙う。"

[[dialogue]]
speaker = "unk"
# 当然のように大剣が槍を弾くが──
line = "当然のように大剣が槍を弾くが──"

[[dialogue]]
speaker = "ナターシャ"
# 「──」
line = "「──」"

[[dialogue]]
speaker = "unk"
# そこにナターシャの追撃と梨緒の矢が飛んできて、ジグは咄嗟に後ろに飛び退いた。
line = "そこにナターシャの追撃と梨緒の矢が飛んできて、ジグは咄嗟に後ろに飛び退いた。"

[[dialogue]]
speaker = "ジグ"
# 「この前より連携が良くなっているね。仲良くなったみたいだ」
line = "「この前より連携が良くなっているね。仲良くなったみたいだ」"

[[dialogue]]
speaker = "梨緒"
# 「リクリエによってベガは滅びた。それを理解しながら、どうして君がリクリエに与する……！？」
line = "「リクリエによってベガは滅びた。それを理解しながら、どうして君がリクリエに与する……！？」"

[[dialogue]]
speaker = "ジグ"
# 「言っただろう、私は“真なる神の騎士”だと。神が望むなら従うまでさ」
line = "「言っただろう、私は“真なる神の騎士”だと。神が望むなら従うまでさ」"

[[dialogue]]
speaker = "ジグ"
# 「私には君の方が理解できないよ。なぜ自分の世界が滅びたのに、まだ抗おうとするんだい？」
line = "「私には君の方が理解できないよ。なぜ自分の世界が滅びたのに、まだ抗おうとするんだい？」"

[[dialogue]]
speaker = "ジグ"
# 「君には守るものなんてもうないだろう？」
line = "「君には守るものなんてもうないだろう？」"

[[dialogue]]
speaker = "ジグ"
# 「犠牲が出たことは真摯に受け止めよう。だけど嘆いてばかりではいけない。私たちにはまだ守るものがあるんだから」
line = "「犠牲が出たことは真摯に受け止めよう。だけど嘆いてばかりではいけない。私たちにはまだ守るものがあるんだから」"

[[dialogue]]
speaker = "梨緒"
# 「──！」
line = "「──！」"

[[dialogue]]
speaker = "unk"
# ジグは同じ口で、同じ声で、かつてと正反対の言葉を口にする。
line = "ジグは同じ口で、同じ声で、かつてと正反対の言葉を口にする。"

[[dialogue]]
speaker = "梨緒"
# （リクリエの使徒は洗脳状態にある。今のジグの言葉を真に受ける必要はない……！）
line = "（リクリエの使徒は洗脳状態にある。今のジグの言葉を真に受ける必要はない……！）"

[[dialogue]]
speaker = "unk"
# 梨緒は自分にそう言い聞かせるが、表情の陰りは隠せない。
line = "梨緒は自分にそう言い聞かせるが、表情の陰りは隠せない。"

[[dialogue]]
speaker = "unk"
# ジグの言葉はガラスの破片のように小さな刃となって、梨緒の心の柔らかい部分に突き刺さる。
line = "ジグの言葉はガラスの破片のように小さな刃となって、梨緒の心の柔らかい部分に突き刺さる。"

[[dialogue]]
speaker = "梨緒"
# 「確かに私の世界は滅びた。だからこそ、滅びは繰り返させない」
line = "「確かに私の世界は滅びた。だからこそ、滅びは繰り返させない」"

[[dialogue]]
speaker = "梨緒"
# 「私は今度こそ世界を救う！」
line = "「私は今度こそ世界を救う！」"

[[dialogue]]
speaker = "ジグ"
# 「救う……ねぇ」
line = "「救う……ねぇ」"

[[dialogue]]
speaker = "ジグ"
# 「リクリエを退けることが救いだとは思わないけど、君たちの言葉を借りてあえて言おう」
line = "「リクリエを退けることが救いだとは思わないけど、君たちの言葉を借りてあえて言おう」"

[[dialogue]]
speaker = "ジグ"
# 「世界を救うなんて君たちにはできないよ」
line = "「世界を救うなんて君たちにはできないよ」"

[[dialogue]]
speaker = "ジグ"
# 「可能性は──ない」
line = "「可能性は──ない」"

[[dialogue]]
speaker = "ジグ"
# 「可能性は残されている。私はそう思うよ」
line = "「可能性は残されている。私はそう思うよ」"

[[dialogue]]
speaker = "梨緒"
# （違う、違う、違う……！　今のジグは、私の知っているジグとは違うんだ……！）
line = "（違う、違う、違う……！　今のジグは、私の知っているジグとは違うんだ……！）"

[[dialogue]]
speaker = "梨緒"
# （今のジグは正気じゃない。だから目を覚まさせてやらなければ……）
line = "（今のジグは正気じゃない。だから目を覚まさせてやらなければ……）"

[[dialogue]]
speaker = "梨緒"
# （それとも君は、あの時からそう思っていたのか……？）
line = "（それとも君は、あの時からそう思っていたのか……？）"

[[dialogue]]
speaker = "ベアトリス"
# 「梨緒ちゃん！」
line = "「梨緒ちゃん！」"

[[dialogue]]
speaker = "梨緒"
# 「──！」
line = "「──！」"

[[dialogue]]
speaker = "ナターシャ"
# 「よりにもよって、リクリエの使徒の前でぼうっとしないでよね」
line = "「よりにもよって、リクリエの使徒の前でぼうっとしないでよね」"

[[dialogue]]
speaker = "梨緒"
# 「すまない……戦闘に集中する」
line = "「すまない……戦闘に集中する」"

[[dialogue]]
speaker = "unk"
# 梨緒は迷いを振り切るように頭を横に振り、ジグに向き直る。
line = "梨緒は迷いを振り切るように頭を横に振り、ジグに向き直る。"

[[dialogue]]
speaker = "unk"
# そこでジグは軽く首を傾げた。
line = "そこでジグは軽く首を傾げた。"

[[dialogue]]
speaker = "ジグ"
# 「しかし不思議だ。君がベガから来たというなら、どうやってこのアルタイルにやってきたんだろうね？」
line = "「しかし不思議だ。君がベガから来たというなら、どうやってこのアルタイルにやってきたんだろうね？」"

[[dialogue]]
speaker = "梨緒"
# 「それは君も同じだ！　君もベガから来たんだろう！」
line = "「それは君も同じだ！　君もベガから来たんだろう！」"

[[dialogue]]
speaker = "ジグ"
# 「私は“真なる神”の加護を受けているからね。平行世界の<ruby=くびき>軛</ruby>は受けない」
line = "「私は“真なる神”の加護を受けているからね。平行世界の<ruby>軛<rt>くびき</rt></ruby>は受けない」"

[[dialogue]]
speaker = "ジグ"
# 「だけど私のように“神”の加護を受けているわけでもく、魔王でもない」
line = "「だけど私のように“神”の加護を受けているわけでもく、魔王でもない」"

[[dialogue]]
speaker = "ジグ"
# 「つまり君はただの異物。この世界に紛れ込んだ死にぞこないだ」
line = "「つまり君はただの異物。この世界に紛れ込んだ死にぞこないだ」"

[[dialogue]]
speaker = "梨緒"
# 「──ッ！」
line = "「──ッ！」"

[[dialogue]]
speaker = "ジグ"
# 「君が突っかかってくるから相手をしてあげていたけど、そろそろ言ってあげようかな」
line = "「君が突っかかってくるから相手をしてあげていたけど、そろそろ言ってあげようかな」"

[[dialogue]]
speaker = "unk"
# ジグが後方に星力を収束させ、弾丸のように梨緒に迫る。
line = "ジグが後方に星力を収束させ、弾丸のように梨緒に迫る。"

[[dialogue]]
speaker = "ジグ"
# 「君は──」
line = "「君は──」"

[[dialogue]]
speaker = "ジグ"
# 「弱い」
line = "「弱い」"

[[dialogue]]
speaker = "梨緒"
# 「くああああっ──！！」
line = "「くああああっ──！！」"

[[dialogue]]
speaker = "ベアトリス"
# 「梨緒ちゃんっ！？」
line = "「梨緒ちゃんっ！？」"
