[[dialogue]]
speaker = "unk"
# 第２話,不知火ヒトリは壁になりたい,P
line = "第２話,不知火ヒトリは壁になりたい,P"

[[dialogue]]
speaker = "unk"
# ──昼休み、昼食を取りにカフェテリアに来ると、ぼーっとしているヒトリを見つけた。
line = "──昼休み、昼食を取りにカフェテリアに来ると、ぼーっとしているヒトリを見つけた。"

[[dialogue]]
speaker = "ヒトリ"
# 「はぁぁぁ～～～……見て、ゆーちゃん……あの子たち、お互いにあーんってやってる～～」
line = "「はぁぁぁ～～～……見て、ゆーちゃん……あの子たち、お互いにあーんってやってる～～」"

[[dialogue]]
speaker = "ヒトリ"
# 「はぁぁぁ～～～、てぇてぇ……」
line = "「はぁぁぁ～～～、てぇてぇ……」"

[[dialogue]]
speaker = "ゆーちゃん"
# 「てーてー！」
line = "「てーてー！」"

[[dialogue]]
speaker = "ヒトリ"
# 「新星と流星学園は、女の子が多くて天国みたいだよ……はぁぁ～～」
line = "「新星と流星学園は、女の子が多くて天国みたいだよ……はぁぁ～～」"

[[dialogue]]
speaker = "unk"
# ここ、座ってもいいか？
line = "ここ、座ってもいいか？"

[[dialogue]]
speaker = "ヒトリ"
# 「ひぁっ！？　か、会長さん……？　どうしてここに……」
line = "「ひぁっ！？　か、会長さん……？　どうしてここに……」"

[[dialogue]]
speaker = "ヒトリ"
# 「え、えっと、席ならほかにもたくさんあって、その、こ、ここに座る必要はないんじゃないでしょうか……！」
line = "「え、えっと、席ならほかにもたくさんあって、その、こ、ここに座る必要はないんじゃないでしょうか……！」"

[[dialogue]]
speaker = "ヒトリ"
# 「あ……い、意外と埋まってますね……。そ、その……ど、どうぞ」
line = "「あ……い、意外と埋まってますね……。そ、その……ど、どうぞ」"

[[dialogue]]
speaker = "ヒトリ"
# 「……か、会長さんも１人なんですか？　い、いつも星徒会のみなさんと一緒だと思ってたんですけど」
line = "「……か、会長さんも１人なんですか？　い、いつも星徒会のみなさんと一緒だと思ってたんですけど」"

[[dialogue]]
speaker = "ヒトリ"
# 「今日はたまたま？　そ、そうですか……」
line = "「今日はたまたま？　そ、そうですか……」"

[[dialogue]]
speaker = "ヒトリ"
# 「わ、わたしはいつもこんな感じです……基本、ぼっちなので……」
line = "「わ、わたしはいつもこんな感じです……基本、ぼっちなので……」"

[[dialogue]]
speaker = "ヒトリ"
# 「あっ、し、心配には及びませんっ、わたしにはゆーちゃんがいるので全然大丈夫です……！」
line = "「あっ、し、心配には及びませんっ、わたしにはゆーちゃんがいるので全然大丈夫です……！」"

[[dialogue]]
speaker = "ゆーちゃん"
# 「ゆー！」
line = "「ゆー！」"

[[dialogue]]
speaker = "ヒトリ"
# 「……す、すみませんっ、やっぱり、すぐ食べてすぐ教室戻ります～っ」
line = "「……す、すみませんっ、やっぱり、すぐ食べてすぐ教室戻ります～っ」"

[[dialogue]]
speaker = "unk"
# 一緒にお昼食べない？
line = "一緒にお昼食べない？"

[[dialogue]]
speaker = "ヒトリ"
# 「い、いいんですか……？　わたしと一緒にいると寒気がするとか、突然誰もいない空間に喋り出して怖いとか、色々言われるんですけど……」
line = "「い、いいんですか……？　わたしと一緒にいると寒気がするとか、突然誰もいない空間に喋り出して怖いとか、色々言われるんですけど……」"

[[dialogue]]
speaker = "ヒトリ"
# 「き、気にしない……そうですか。あ、ありがとうございます……」
line = "「き、気にしない……そうですか。あ、ありがとうございます……」"

[[dialogue]]
speaker = "ヒトリ"
# 「……小さな頃、幽霊が見えることがおかしいことだって気づかなくて、人前でも普通に、幽霊と会話してたんです」
line = "「……小さな頃、幽霊が見えることがおかしいことだって気づかなくて、人前でも普通に、幽霊と会話してたんです」"

[[dialogue]]
speaker = "ヒトリ"
# 「そ、そりゃあ周りの人から見れば、変な子に見えますよね……」
line = "「そ、そりゃあ周りの人から見れば、変な子に見えますよね……」"

[[dialogue]]
speaker = "ヒトリ"
# 「そんなだから、全然お友達もできなくて……ま、まあ、幽霊のお友達はたくさんいたので、寂しくはなかったんですけど……」
line = "「そんなだから、全然お友達もできなくて……ま、まあ、幽霊のお友達はたくさんいたので、寂しくはなかったんですけど……」"

[[dialogue]]
speaker = "ヒトリ"
# 「でも、どうしても人と接しなきゃいけない時とかって……あるじゃないですか」
line = "「でも、どうしても人と接しなきゃいけない時とかって……あるじゃないですか」"

[[dialogue]]
speaker = "ヒトリ"
# 「例えばその……た、体育の時間とかで、２人組を作ってとか言われた時」
line = "「例えばその……た、体育の時間とかで、２人組を作ってとか言われた時」"

[[dialogue]]
speaker = "ヒトリ"
# 「うっ……！　お、思い出したら胸が痛くなってきました……」
line = "「うっ……！　お、思い出したら胸が痛くなってきました……」"

[[dialogue]]
speaker = "ヒトリ"
# 「家庭科の時間で、チームを作って料理をすることになった時とか……」
line = "「家庭科の時間で、チームを作って料理をすることになった時とか……」"

[[dialogue]]
speaker = "ヒトリ"
# 「ううっ……！　ポルターガイスト現象が起こったのは、わたしのせいじゃないのに……！」
line = "「ううっ……！　ポルターガイスト現象が起こったのは、わたしのせいじゃないのに……！」"

[[dialogue]]
speaker = "ヒトリ"
# 「修学旅行の時も、体育祭の時も、課外活動の時も……っ」
line = "「修学旅行の時も、体育祭の時も、課外活動の時も……っ」"

[[dialogue]]
speaker = "ヒトリ"
# 「う、ううぅぅ……！　ど、どうして人生には誰かと一緒に何かをしなければならない瞬間が、こんなに多いんでしょう……っ」
line = "「う、ううぅぅ……！　ど、どうして人生には誰かと一緒に何かをしなければならない瞬間が、こんなに多いんでしょう……っ」"

[[dialogue]]
speaker = "unk"
# い、色々大変だったんだな……
line = "い、色々大変だったんだな……"

[[dialogue]]
speaker = "ヒトリ"
# 「……でも、悪いことばっかりじゃありませんでした」
line = "「……でも、悪いことばっかりじゃありませんでした」"

[[dialogue]]
speaker = "ヒトリ"
# 「わ、わたしが誰かと一緒にチームを組むのは苦手でしたけど、誰かがチームを組んで、仲良さそうに頑張ってるのを眺めるのは、好きだなって気づいたんです」
line = "「わ、わたしが誰かと一緒にチームを組むのは苦手でしたけど、誰かがチームを組んで、仲良さそうに頑張ってるのを眺めるのは、好きだなって気づいたんです」"

[[dialogue]]
speaker = "ヒトリ"
# 「羨ましいなって思う気持ちよりも、見守っていることで凄く胸がポカポカして……これはなんだろうってずっと思ってたんですけど……」
line = "「羨ましいなって思う気持ちよりも、見守っていることで凄く胸がポカポカして……これはなんだろうってずっと思ってたんですけど……」"

[[dialogue]]
speaker = "ヒトリ"
# 「最近、この気持ちの正体に気づいたんです。それで──」
line = "「最近、この気持ちの正体に気づいたんです。それで──」"

[[dialogue]]
speaker = "ヒトリ"
# 「わたしは壁になりたかったんだな、って──」
line = "「わたしは壁になりたかったんだな、って──」"

[[dialogue]]
speaker = "unk"
# なんて……？
line = "なんて……？"

[[dialogue]]
speaker = "ヒトリ"
# 「『尊い』っていうんでしょうか。わたし、女の子同士が仲良さそうに手を繋いだりボディタッチしてるのを見ると、胸がきゅーーってなるんですっ」
line = "「『尊い』っていうんでしょうか。わたし、女の子同士が仲良さそうに手を繋いだりボディタッチしてるのを見ると、胸がきゅーーってなるんですっ」"

[[dialogue]]
speaker = "ヒトリ"
# 「ほらっ、あそこ見てくださいっ、女の子同士で『あーん』ってして食べさせあってるんですよっ」
line = "「ほらっ、あそこ見てくださいっ、女の子同士で『あーん』ってして食べさせあってるんですよっ」"

[[dialogue]]
speaker = "ヒトリ"
# 「はぁぁぁ～～～……て、てぇてぇ……」
line = "「はぁぁぁ～～～……て、てぇてぇ……」"

[[dialogue]]
speaker = "ヒトリ"
# 「あの子たちと友達になりたいとか思いません。わたしは女の子同士の絡み──すなわち『百合』を眺める壁でありたい……」
line = "「あの子たちと友達になりたいとか思いません。わたしは女の子同士の絡み──すなわち『百合』を眺める壁でありたい……」"

[[dialogue]]
speaker = "ヒトリ"
# 「そのためなら、ぼっちも受け入れます……！」
line = "「そのためなら、ぼっちも受け入れます……！」"

[[dialogue]]
speaker = "unk"
# ま、まさかの百合好き女子……！
line = "ま、まさかの百合好き女子……！"

[[dialogue]]
speaker = "ヒトリ"
# 「あっ、ほら、あっちでは一緒に写真撮ってますよっ！　頬っぺたくっつく距離でピースしててっ、わぁぁっ……！　て、てぇてぇ……」
line = "「あっ、ほら、あっちでは一緒に写真撮ってますよっ！　頬っぺたくっつく距離でピースしててっ、わぁぁっ……！　て、てぇてぇ……」"

[[dialogue]]
speaker = "ゆーちゃん"
# 「てーてー！」
line = "「てーてー！」"

[[dialogue]]
speaker = "unk"
# ヒトリ。百合について、俺にも教えてくれないか？
line = "ヒトリ。百合について、俺にも教えてくれないか？"

[[dialogue]]
speaker = "ヒトリ"
# 「もちろんいいですよ……って、えっ！？　か、会長さんいま何て！？　ひ、ひょっとして百合にご興味が！？」
line = "「もちろんいいですよ……って、えっ！？　か、会長さんいま何て！？　ひ、ひょっとして百合にご興味が！？」"

[[dialogue]]
speaker = "ヒトリ"
# 「ままま、まさか、同志ができる！？　そんなこと……今まで考えたこともなかった！」
line = "「ままま、まさか、同志ができる！？　そんなこと……今まで考えたこともなかった！」"

[[dialogue]]
speaker = "ヒトリ"
# 「だ、ダメじゃないですっ！　百合に興味を持つのは、素晴らしいことだと思いますっ！　わ、わたしでよければ、布教させて頂きますっ」
line = "「だ、ダメじゃないですっ！　百合に興味を持つのは、素晴らしいことだと思いますっ！　わ、わたしでよければ、布教させて頂きますっ」"

[[dialogue]]
speaker = "unk"
# その後、ヒトリは昼休みギリギリまで百合に対する情熱を語ってくれて。
line = "その後、ヒトリは昼休みギリギリまで百合に対する情熱を語ってくれて。"

[[dialogue]]
speaker = "unk"
# 俺はほんの少し、彼女との距離を縮められたような気がしたのだった。
line = "俺はほんの少し、彼女との距離を縮められたような気がしたのだった。"
