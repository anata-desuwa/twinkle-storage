line = "「（珍しく構ってもらえる方に出会えたようです）」"

[[dialogue]]
speaker = "フィオナ"
# 「（仲良くなれそうでよかった）」
line = "「（仲良くなれそうでよかった）」"

[[dialogue]]
speaker = "ヴィーナス"
