[[dialogue]]
speaker = "フィオナ"
# 「ふふ。お陰さまですね」
line = "「ふふ。お陰さまですね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「フィオナも、やるじゃない！　召喚術が得意なのね」
