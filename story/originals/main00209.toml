line = "「おい、オマエ！　フィオナ嬢を語るニャら誰か忘れてないかニャン？」"

[[dialogue]]
speaker = "クロト"
# 「ああ。もちろん、ニャリオンもすごい」
line = "「ああ。もちろん、ニャリオンもすごい」"

[[dialogue]]
speaker = "ニャリオン"
