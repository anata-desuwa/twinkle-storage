line = "「ありがたいが、歴で言えば俺がまだまだなのは確かだしな。それに……」"

[[dialogue]]
speaker = "フィオナ"
# 「それに？」
line = "「それに？」"

[[dialogue]]
speaker = "クロト"
# 「露出も多い」
line = "「露出も多い」"

[[dialogue]]
speaker = "フィオナ"
# 「ろっ……！？」
line = "「ろっ……！？」"

[[dialogue]]
speaker = "unk"
# 明らかに肌の面積が多かった。正直、目のやり場にこまる。
line = "明らかに肌の面積が多かった。正直、目のやり場にこまる。"

[[dialogue]]
speaker = "フィオナ"
