line = "「そっ……それはっ、私の守護星がたまたま──太陽だからであって」"

[[dialogue]]
speaker = "フィオナ"
# 「星力を行使するたびに多大な熱量が宿るので、戦闘服はそれに耐えられるようになっているんです！」
line = "「星力を行使するたびに多大な熱量が宿るので、戦闘服はそれに耐えられるようになっているんです！」"

[[dialogue]]
speaker = "クロト"
# 「なるほど。そう合理的な理由があったとは知らなかった」
line = "「なるほど。そう合理的な理由があったとは知らなかった」"

[[dialogue]]
speaker = "フィオナ"
# 「……かと言って、そうまじまじ見つめられては困るのですが……」
line = "「……かと言って、そうまじまじ見つめられては困るのですが……」"

[[dialogue]]
speaker = "ニャリオン"
# 「（おたくの会長は精神攻撃が得意なのかニャン？）」
line = "「（おたくの会長は精神攻撃が得意なのかニャン？）」"

[[dialogue]]
speaker = "ヴィーナス"
