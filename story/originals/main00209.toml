speaker = "フィオナ"
# 「も、もうっ。昔のことはいいでしょう、キリカ」
line = "「も、もうっ。昔のことはいいでしょう、キリカ」"

[[dialogue]]
speaker = "unk"
# 照れるフィオナに微笑むキリカさんを見ていると、２人の関係の深さがうかがえるようだった。
