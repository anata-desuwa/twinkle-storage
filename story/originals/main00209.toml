line = "「（ただの天然だから許して……）」"

[[dialogue]]
speaker = "クロト"
# 「それに──キリカさんだって、やっぱり只者じゃなかった」
line = "「それに──キリカさんだって、やっぱり只者じゃなかった」"

[[dialogue]]
speaker = "キリカ"
# 「……私、ですか。それほどでは」
line = "「……私、ですか。それほどでは」"

[[dialogue]]
speaker = "ヴィーナス"
# 「確かにアレは尋常じゃない<ruby=はや>疾</ruby>さだったわね！　クロトも参考にできるんじゃない？」
line = "「確かにアレは尋常じゃない<ruby>疾<rt>はや</rt></ruby>さだったわね！　クロトも参考にできるんじゃない？」"

[[dialogue]]
speaker = "クロト"
# 「ああ。俺も見習うべきところが沢山あった」
line = "「ああ。俺も見習うべきところが沢山あった」"

[[dialogue]]
speaker = "unk"
# キリカさんの戦闘スタイルは意外と言うべきか拳闘だった。
line = "キリカさんの戦闘スタイルは意外と言うべきか拳闘だった。"

[[dialogue]]
speaker = "unk"
# 拳に紫電の星力をまとい、流麗に舞う身のこなしは武の達人を思わせる。
line = "拳に紫電の星力をまとい、流麗に舞う身のこなしは武の達人を思わせる。"

[[dialogue]]
speaker = "フィオナ"
# 「キリカは武術の名門である、<ruby=こうづき>上月</ruby>の者ですから」
line = "「キリカは武術の名門である、<ruby>上月<rt>こうづき</rt></ruby>の者ですから」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あ、聞いたことある！　上月家って、確か武術の名門よね──なんとか流っていう！」
line = "「あ、聞いたことある！　上月家って、確か武術の名門よね──なんとか流っていう！」"

[[dialogue]]
speaker = "フィオナ"
# 「ええ。上月神闘流──千年前に興った由緒ある武道で、血縁の者でも流派を継ぐことさえ難しいんですよ」
line = "「ええ。上月神闘流──千年前に興った由緒ある武道で、血縁の者でも流派を継ぐことさえ難しいんですよ」"

[[dialogue]]
speaker = "クロト"
# 「なるほど。それに加えて星力のコントロールまで……」
line = "「なるほど。それに加えて星力のコントロールまで……」"

[[dialogue]]
speaker = "キリカ"
# 「恐縮です。ですが私は、お嬢様の盾となるべく立ち回っているに過ぎません」
line = "「恐縮です。ですが私は、お嬢様の盾となるべく立ち回っているに過ぎません」"

[[dialogue]]
speaker = "フィオナ"
# 「もう。そうやって自分をないがしろにしないでください、キリカ」
line = "「もう。そうやって自分をないがしろにしないでください、キリカ」"

[[dialogue]]
speaker = "unk"
# 達人のような──ではなく、実際に達人だったようだ。
line = "達人のような──ではなく、実際に達人だったようだ。"

[[dialogue]]
speaker = "ヴィーナス"
# 「そんな人がどうしてメイドをやってるの？　ていうか２人ってどういう関係？」
line = "「そんな人がどうしてメイドをやってるの？　ていうか２人ってどういう関係？」"

[[dialogue]]
speaker = "キリカ"
