line = "「よく知ってるんだな。さすがは高位の使い魔ニャリオン」"

[[dialogue]]
speaker = "ニャリオン"
# 「ニャーッニャッニャッニャッ！　もっと褒めるがよいニャン！」
line = "「ニャーッニャッニャッニャッ！　もっと褒めるがよいニャン！」"

[[dialogue]]
speaker = "キリカ"
