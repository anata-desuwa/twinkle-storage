line = "「当然ニャン。ワガハイという偉大にして高位な使い魔を人間界に喚べるのはフィオナ嬢だけなのニャン！」"

[[dialogue]]
speaker = "unk"
# 太陽の星力──
line = "太陽の星力──"

[[dialogue]]
speaker = "unk"
# フィオナの振るっていた力は、眩しくも温かい華やかな術式だった。
line = "フィオナの振るっていた力は、眩しくも温かい華やかな術式だった。"

[[dialogue]]
speaker = "クロト"
# 「まぶしくて頼もしかったよ。フィオナはすごいな」
line = "「まぶしくて頼もしかったよ。フィオナはすごいな」"

[[dialogue]]
speaker = "フィオナ"
