[[dialogue]]
speaker = "unk"
# せつな、ウズメイア、シャルレーヌは駅の方へ、俺とイレーナ、シャロンは繁華街へと向かった。
line = "せつな、ウズメイア、シャルレーヌは駅の方へ、俺とイレーナ、シャロンは繁華街へと向かった。"

[[dialogue]]
speaker = "シャロン"
# 「はぁっ！」
line = "「はぁっ！」"

[[dialogue]]
speaker = "フワッチ"
# 「イ～ッ！？」
line = "「イ～ッ！？」"

[[dialogue]]
speaker = "イレーナ"
# 「この辺りのモンスターは片付いたみたいね……」
line = "「この辺りのモンスターは片付いたみたいね……」"

[[dialogue]]
speaker = "ドラケルス"
# 「グルルルァアア！！」
line = "「グルルルァアア！！」"

[[dialogue]]
speaker = "イレーナ"
# 「！　機械型モンスターまで出てきた！？」
line = "「！　機械型モンスターまで出てきた！？」"

[[dialogue]]
speaker = "シャロン"
# 「いきますよー！」
line = "「いきますよー！」"

[[dialogue]]
speaker = "シャロン"
# 「くっ、カカオ９９％チョコ並みの硬さですね……このままだとジリ貧かもしれません」
line = "「くっ、カカオ９９％チョコ並みの硬さですね……このままだとジリ貧かもしれません」"

[[dialogue]]
speaker = "イレーナ"
# 「ね、あんた、強烈な一撃、叩き込めない？　あたしも合わせるから同時に──」
line = "「ね、あんた、強烈な一撃、叩き込めない？　あたしも合わせるから同時に──」"

[[dialogue]]
speaker = "unk"
# よし、全力で──
line = "よし、全力で──"

[[dialogue]]
speaker = "ウルスラ"
# 「皆さん、お困りのようですね」
line = "「皆さん、お困りのようですね」"

[[dialogue]]
speaker = "シャロン"
# 「ウルスラさま！？」
line = "「ウルスラさま！？」"

[[dialogue]]
speaker = "ウルスラ"
# 「バレンタインの波動を充填していたので、駆けつけるのが遅くなってしまいました。申し訳ありません」
line = "「バレンタインの波動を充填していたので、駆けつけるのが遅くなってしまいました。申し訳ありません」"

[[dialogue]]
speaker = "イレーナ"
# 「ウルスラさん、あなたも戦えるんですか？」
line = "「ウルスラさん、あなたも戦えるんですか？」"

[[dialogue]]
speaker = "ウルスラ"
# 「はい。実は私、バレンタインが近づけば近づくほど強くなる星騎士でして」
line = "「はい。実は私、バレンタインが近づけば近づくほど強くなる星騎士でして」"

[[dialogue]]
speaker = "ウルスラ"
# 「バレンタインの波動を限界まで吸収した私は、最強で無敵ですよ<emoji=heart04>」
line = "「バレンタインの波動を限界まで吸収した私は、最強で無敵ですよ<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
# 「最強無敵！？　それは頼りになります！」
line = "「最強無敵！？　それは頼りになります！」"

[[dialogue]]
speaker = "ウルスラ"
# 「これより、バレンタインを執行します」
line = "「これより、バレンタインを執行します」"

[[dialogue]]
speaker = "シャロン"
# 「す、すごいですっ！　ウルスラさまの星力が爆発的に膨れ上がって──！」
line = "「す、すごいですっ！　ウルスラさまの星力が爆発的に膨れ上がって──！」"

[[dialogue]]
speaker = "ウルスラ"
# 「トゥルーラブジャッジメント！」
line = "「トゥルーラブジャッジメント！」"

[[dialogue]]
speaker = "シャロン"
# 「一撃必殺！？　すごい力です……！」
line = "「一撃必殺！？　すごい力です……！」"

[[dialogue]]
speaker = "ウルスラ"
# 「ふふ、バレンタインの素晴らしさ、伝わりました？」
line = "「ふふ、バレンタインの素晴らしさ、伝わりました？」"

[[dialogue]]
speaker = "unk"
# その驚異的な力を目の当たりにした俺たちは、コクコクと何度も頷くしかなかったのであった。
line = "その驚異的な力を目の当たりにした俺たちは、コクコクと何度も頷くしかなかったのであった。"

[[dialogue]]
speaker = "unk"
# ウルスラの大活躍によってモンスターは全て倒され、街に平和が戻った。
line = "ウルスラの大活躍によってモンスターは全て倒され、街に平和が戻った。"

[[dialogue]]
speaker = "イレーナ"
# 「──以上、バレンタインの使者、ウルスラ・バレンタインの活躍により、教皇庁主催のバレンタインイベントは無事に終了しました──と」
line = "「──以上、バレンタインの使者、ウルスラ・バレンタインの活躍により、教皇庁主催のバレンタインイベントは無事に終了しました──と」"

[[dialogue]]
speaker = "イレーナ"
# 「報告書はこんなところでいいわね。トラブルなしに終わらせてくれないのも、いつも通りっていうか……」
line = "「報告書はこんなところでいいわね。トラブルなしに終わらせてくれないのも、いつも通りっていうか……」"

[[dialogue]]
speaker = "unk"
# お疲れさま、イレーナ
line = "お疲れさま、イレーナ"

[[dialogue]]
speaker = "イレーナ"
# 「あら、何か用？　シャロンなら先に帰ったわよ」
line = "「あら、何か用？　シャロンなら先に帰ったわよ」"

[[dialogue]]
speaker = "unk"
# それなら俺たちも帰ろうか
line = "それなら俺たちも帰ろうか"

[[dialogue]]
speaker = "イレーナ"
# 「そうね、長居しててもしょうがないし……なんだか、あっという間の一日だったわね」
line = "「そうね、長居しててもしょうがないし……なんだか、あっという間の一日だったわね」"

[[dialogue]]
speaker = "イレーナ"
# 「あ、あー……あんたはさ、やっぱりチョコたくさんもらうの？　あんたの周り、女の子だらけで、しかも美少女揃いだもんね」
line = "「あ、あー……あんたはさ、やっぱりチョコたくさんもらうの？　あんたの周り、女の子だらけで、しかも美少女揃いだもんね」"

[[dialogue]]
speaker = "イレーナ"
# 「ま、大半は義理チョコだろうけど？　可愛い子からプレゼントもらったら悪い気しないわよね」
line = "「ま、大半は義理チョコだろうけど？　可愛い子からプレゼントもらったら悪い気しないわよね」"

[[dialogue]]
speaker = "イレーナ"
# 「中には本命もあったりしてー？　……なによ、まんざらでもなさそうな顔しちゃって」
line = "「中には本命もあったりしてー？　……なによ、まんざらでもなさそうな顔しちゃって」"

[[dialogue]]
speaker = "イレーナ"
# 「甘い物食べ過ぎて、虫歯にならないよう気をつけなさいよ。寝る前にはちゃんと歯を磨きなさい。……って、何言ってんだか」
line = "「甘い物食べ過ぎて、虫歯にならないよう気をつけなさいよ。寝る前にはちゃんと歯を磨きなさい。……って、何言ってんだか」"

[[dialogue]]
speaker = "イレーナ"
# 「……たくさんもらうんなら、もうチョコなんていらないわよね？」
line = "「……たくさんもらうんなら、もうチョコなんていらないわよね？」"

[[dialogue]]
speaker = "イレーナ"
# 「それとも逆に？　１個ぐらい増えたところで、どうってことない感じだったりして？」
line = "「それとも逆に？　１個ぐらい増えたところで、どうってことない感じだったりして？」"

[[dialogue]]
speaker = "unk"
# それってどういう──
line = "それってどういう──"

[[dialogue]]
speaker = "イレーナ"
# 「う、ううん、なんでもないわ。ほら、もう暗いし早く帰りましょ」
line = "「う、ううん、なんでもないわ。ほら、もう暗いし早く帰りましょ」"

[[dialogue]]
speaker = "？？？"
# 『帰らせませんよ』
line = "『帰らせませんよ』"

[[dialogue]]
speaker = "unk"
# 今の声は──ウルスラ！？
line = "今の声は──ウルスラ！？"

[[dialogue]]
speaker = "ウルスラ"
# 『だって、まだバレンタインは終わっていないのですから』
line = "『だって、まだバレンタインは終わっていないのですから』"

[[dialogue]]
speaker = "イレーナ"
# 「どういう意味ですか！？」
line = "「どういう意味ですか！？」"

[[dialogue]]
speaker = "ウルスラ"
# 『伝えるべき想いが、手渡されるべき物が──その相手に渡らない限り、バレンタインは永遠に終わりません』
line = "『伝えるべき想いが、手渡されるべき物が──その相手に渡らない限り、バレンタインは永遠に終わりません』"

[[dialogue]]
speaker = "イレーナ"
# 「な、何のことよ！？」
line = "「な、何のことよ！？」"

[[dialogue]]
speaker = "ウルスラ"
# 『この期に及んで、惚けていらっしゃる』
line = "『この期に及んで、惚けていらっしゃる』"

[[dialogue]]
speaker = "ウルスラ"
# 『イレーナさんがこっそりと懐に忍ばせている、チョコレート』
line = "『イレーナさんがこっそりと懐に忍ばせている、チョコレート』"

[[dialogue]]
speaker = "イレーナ"
# 「っ！？　なんでそれを──」
line = "「っ！？　なんでそれを──」"

[[dialogue]]
speaker = "ウルスラ"
# 『それが会長さんの手に渡らない限り、あなたたちは一歩たりとも学園からは出られないんです』
line = "『それが会長さんの手に渡らない限り、あなたたちは一歩たりとも学園からは出られないんです』"

[[dialogue]]
speaker = "unk"
# こうして、ここに『チョコを渡さないと出られない学園』が誕生したのであった。
line = "こうして、ここに『チョコを渡さないと出られない学園』が誕生したのであった。"
