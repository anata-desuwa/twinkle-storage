[[dialogue]]
speaker = "アニュラス"
# 「来るっ、くるくる、アクメくりゅっ<emoji=heart04>　……あっ<emoji=heart04>　あっ<emoji=heart04>　あっ<emoji=heart04>　イクッ<emoji=heart04>　イクイクイクッ――」
