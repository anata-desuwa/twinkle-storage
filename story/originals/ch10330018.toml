[[dialogue]]
speaker = "アニュラス"
# 「んあぁぁぁっ<emoji=heart04>　精液来てるぅっ<emoji=heart04>　子宮に奥まで、どくどくって注がれてぇ……<emoji=heart04>　はあぁぁぁ～～っ<emoji=heart04>」
line = "「んあぁぁぁっ<emoji=heart04>　精液来てるぅっ<emoji=heart04>　子宮に奥まで、どくどくって注がれてぇ……<emoji=heart04>　はあぁぁぁ～～っ<emoji=heart04>」"

[[dialogue]]
speaker = "アニュラス"
# 「ふあぁぁぁっ<emoji=heart04>　凄いぃ……<emoji=heart04>　会長のおち○ぽ、まだ脈打って、射精してるのぉ……はふぅぅ……<emoji=heart04>」
