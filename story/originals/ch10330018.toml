speaker = "unk"
# その言い回しが気になり、彼女の顔を見ると、少し切なそうな、期待するような視線が俺のペニスに向けられていて――
line = "その言い回しが気になり、彼女の顔を見ると、少し切なそうな、期待するような視線が俺のペニスに向けられていて――"

