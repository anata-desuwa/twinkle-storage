[[dialogue]]
speaker = "アニュラス"
# 「好きっ、会長とのセックス好きぃっ<emoji=heart04>　おほぉぉっ！　おち○ぽ、おち○ぽおち○ぽぉっ<emoji=heart04>　んあぁぁっ！　気持ちよしゅぎなのぉっ<emoji=heart04>　ひっ、ひっ、ふひぃぃんっ！」
