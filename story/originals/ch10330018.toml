[[dialogue]]
speaker = "アニュラス"
# 「来て、きてきて、中に出してぇっ<emoji=heart04>　おっ、おっ、んおぉぉぉ<emoji=heart04>　会長の精子、私のおま○こにいっぱい出してぇっ<emoji=heart04>　あっ、あっ、んあぁぁぁっ<emoji=heart04>」
