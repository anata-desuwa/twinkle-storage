[[dialogue]]
speaker = "アニュラス"
# 「あああ、おま○この奥に来てるっ<emoji=heart04>　気持ちいいの登って来るのっ、んあっ、あぁんっ、ふあぁぁっ<emoji=heart04>　知らないアクメ来るぅぅぅっ<emoji=heart04>　おっ、おほっ、んおぉぉぉっ<emoji=heart04>」
line = "「あああ、おま○この奥に来てるっ<emoji=heart04>　気持ちいいの登って来るのっ、んあっ、あぁんっ、ふあぁぁっ<emoji=heart04>　知らないアクメ来るぅぅぅっ<emoji=heart04>　おっ、おほっ、んおぉぉぉっ<emoji=heart04>」"

