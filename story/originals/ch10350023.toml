[[dialogue]]
speaker = "unk"
# 第３話,因果応報,P
line = "第３話,因果応報,P"

[[dialogue]]
speaker = "セナリィ"
# 「投資は決して怖いものではない……ヒマワリから投資の極意を習った私は無敵ですわ」
line = "「投資は決して怖いものではない……ヒマワリから投資の極意を習った私は無敵ですわ」"

[[dialogue]]
speaker = "セナリィ"
# 「慎重に慎重を重ね、見守り続けてきた暗号資産は１週間連続の続伸……よもや、ここから下がるはずがありませんわよね」
line = "「慎重に慎重を重ね、見守り続けてきた暗号資産は１週間連続の続伸……よもや、ここから下がるはずがありませんわよね」"

[[dialogue]]
speaker = "セナリィ"
# 「ふふ、私の目に狂いはありませんわ。ビッグマニー・カム・ヒアーッ！　ポチッとな」
line = "「ふふ、私の目に狂いはありませんわ。ビッグマニー・カム・ヒアーッ！　ポチッとな」"

[[dialogue]]
speaker = "セナリィ"
# 「どうして下がってますのぉおぉぉっ！」
line = "「どうして下がってますのぉおぉぉっ！」"

[[dialogue]]
speaker = "セナリィ"
# 「私が買った瞬間が最高値……？　寝ている間に怒涛のナイアガラフォールですわ」
line = "「私が買った瞬間が最高値……？　寝ている間に怒涛のナイアガラフォールですわ」"

[[dialogue]]
speaker = "セナリィ"
# 「……さぁて、と。溶けてしまった活動資金、どうしたものでしょう……」
line = "「……さぁて、と。溶けてしまった活動資金、どうしたものでしょう……」"

[[dialogue]]
speaker = "ミウ"
# 「社長、おはようございます」
line = "「社長、おはようございます」"

[[dialogue]]
speaker = "セナリィ"
# 「──！！？」
line = "「──！！？」"

[[dialogue]]
speaker = "ミウ"
# 「？　なんだか汗だくですけど……今日、そんなに暑いですか？　どうかしました？」
line = "「？　なんだか汗だくですけど……今日、そんなに暑いですか？　どうかしました？」"

[[dialogue]]
speaker = "セナリィ"
# 「そうですわね、暑いですわね。でも、私の懐は大寒波が押し寄せてますわね」
line = "「そうですわね、暑いですわね。でも、私の懐は大寒波が押し寄せてますわね」"

[[dialogue]]
speaker = "セナリィ"
# （どうしましょうどうしましょうどうしましょう）
line = "（どうしましょうどうしましょうどうしましょう）"

[[dialogue]]
speaker = "セナリィ"
# （ミウやヒマワリが運営資金が目減りしてることに気づいたら、大変なことに……）
line = "（ミウやヒマワリが運営資金が目減りしてることに気づいたら、大変なことに……）"

[[dialogue]]
speaker = "セナリィ"
# （その前になんとかして資金繰りをしないと……そう、星徒会に掛け合って──）
line = "（その前になんとかして資金繰りをしないと……そう、星徒会に掛け合って──）"

[[dialogue]]
speaker = "セナリィ"
# （『投資でお金を溶かしちゃったから貸してほしいですわ、てへ☆』そんな無様な理由で貸してくれるわけがないわよね……）
line = "（『投資でお金を溶かしちゃったから貸してほしいですわ、てへ☆』そんな無様な理由で貸してくれるわけがないわよね……）"

[[dialogue]]
speaker = "セナリィ"
# （だからといって、ここに座っていても埒があかないわ……公安の突発案件でも日雇いのバイトでもいいから、少しでもお金を稼がないと……）
line = "（だからといって、ここに座っていても埒があかないわ……公安の突発案件でも日雇いのバイトでもいいから、少しでもお金を稼がないと……）"

[[dialogue]]
speaker = "セナリィ"
# 「私、用事を思い出しましたわー……ちょっと外に──」
line = "「私、用事を思い出しましたわー……ちょっと外に──」"

[[dialogue]]
speaker = "ヒマワリ"
# 「た、た、大変です、社長ー！　会社の運営資金がごっそり減ってるんです！」
line = "「た、た、大変です、社長ー！　会社の運営資金がごっそり減ってるんです！」"

[[dialogue]]
speaker = "セナリィ"
# 「ギクッ！！？」
line = "「ギクッ！！？」"

[[dialogue]]
speaker = "ミウ"
# 「ええっ！　本当なの、ヒマワリちゃん！」
line = "「ええっ！　本当なの、ヒマワリちゃん！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「ほら見て、ミウ。昨晩、大きな出金履歴があるじゃない？」
line = "「ほら見て、ミウ。昨晩、大きな出金履歴があるじゃない？」"

[[dialogue]]
speaker = "ミウ"
# 「本当だね……かなりの大金。最近、ゴールデングースの知名度は鰻登りだから、私たちの活動を妬んだサイバー攻撃の線もあるんじゃないかな」
line = "「本当だね……かなりの大金。最近、ゴールデングースの知名度は鰻登りだから、私たちの活動を妬んだサイバー攻撃の線もあるんじゃないかな」"

[[dialogue]]
speaker = "ヒマワリ"
# 「あり得るー！　でも、このセキュリティを突破するなんてめちゃ凄腕のハッカーだよ。もちろん社長の持ってるカードなら簡単に引き出せるけど」
line = "「あり得るー！　でも、このセキュリティを突破するなんてめちゃ凄腕のハッカーだよ。もちろん社長の持ってるカードなら簡単に引き出せるけど」"

[[dialogue]]
speaker = "ミウ"
# 「秘密結社ゴールデングースのお金を盗むだなんて不届きにも程があるよ。犯人を捕まえたら、ゴールデングースの流儀をその身に教えてあげなきゃ！　ね！」
line = "「秘密結社ゴールデングースのお金を盗むだなんて不届きにも程があるよ。犯人を捕まえたら、ゴールデングースの流儀をその身に教えてあげなきゃ！　ね！」"

[[dialogue]]
speaker = "セナリィ"
# 「ひぃっ！？　な、何もそこまでしなくてもよろしいのではなくて？」
line = "「ひぃっ！？　な、何もそこまでしなくてもよろしいのではなくて？」"

[[dialogue]]
speaker = "ヒマワリ"
# 「いいえ、社長は優しすぎます！　徹底的にやっちゃいましょう！」
line = "「いいえ、社長は優しすぎます！　徹底的にやっちゃいましょう！」"

[[dialogue]]
speaker = "ミウ"
# 「時代が時代なら、窃盗は二度と悪さができないよう、指を切断されても当然なくらいの重罪ですよ？」
line = "「時代が時代なら、窃盗は二度と悪さができないよう、指を切断されても当然なくらいの重罪ですよ？」"

[[dialogue]]
speaker = "セナリィ"
# 「ひぃいぃぃっ！？」
line = "「ひぃいぃぃっ！？」"

[[dialogue]]
speaker = "ミウ"
# 「それとも、社長、犯人に心当たりがあるんですか？」
line = "「それとも、社長、犯人に心当たりがあるんですか？」"

[[dialogue]]
speaker = "セナリィ"
# 「心当たり、心当たり……あ、ああー！　昨晩でしたわね？　それなら、私が投資につぎ込んだのですわ」
line = "「心当たり、心当たり……あ、ああー！　昨晩でしたわね？　それなら、私が投資につぎ込んだのですわ」"

[[dialogue]]
speaker = "セナリィ"
# 「ごめんなさい、はした金だったから、うっかり忘れてましたわ、ほほほ」
line = "「ごめんなさい、はした金だったから、うっかり忘れてましたわ、ほほほ」"

[[dialogue]]
speaker = "ヒマワリ"
# 「なんだー、人騒がせですよ、社長。それでどちらに投資されたんですか？」
line = "「なんだー、人騒がせですよ、社長。それでどちらに投資されたんですか？」"

[[dialogue]]
speaker = "セナリィ"
# 「……言わなきゃダメですの？」
line = "「……言わなきゃダメですの？」"

[[dialogue]]
speaker = "ヒマワリ"
# 「もちろんですよ。まさか大暴落するのが見え見えだったリューセーコインじゃないでしょうし」
line = "「もちろんですよ。まさか大暴落するのが見え見えだったリューセーコインじゃないでしょうし」"

[[dialogue]]
speaker = "セナリィ"
# 「そ、そのリューセーコインですわ！」
line = "「そ、そのリューセーコインですわ！」"

[[dialogue]]
speaker = "セナリィ"
# 「投資は慎重にやればそんなに危なくないってヒマワリが言いましたのよ！？　数時間で価値が半分以下になるだなんて想像できて！？」
line = "「投資は慎重にやればそんなに危なくないってヒマワリが言いましたのよ！？　数時間で価値が半分以下になるだなんて想像できて！？」"

[[dialogue]]
speaker = "ヒマワリ"
# 「えっ、慎重にやったのにどうして……あんなに仕込まれてるのが見え見えだったのに……そんなのわざと溶かすくらいのつもりじゃないと──はっ！」
line = "「えっ、慎重にやったのにどうして……あんなに仕込まれてるのが見え見えだったのに……そんなのわざと溶かすくらいのつもりじゃないと──はっ！」"

[[dialogue]]
speaker = "ミウ"
# 「そうだよ、ヒマワリちゃん。これはわざと……社長から私たちへのメッセージ……教訓なんだよ！」
line = "「そうだよ、ヒマワリちゃん。これはわざと……社長から私たちへのメッセージ……教訓なんだよ！」"

[[dialogue]]
speaker = "ミウ"
# 「そうじゃなきゃ、こんなお金をドブに捨てるようなことするわけないもんね！」
line = "「そうじゃなきゃ、こんなお金をドブに捨てるようなことするわけないもんね！」"

[[dialogue]]
speaker = "セナリィ"
# 「ふぐっ！？」
line = "「ふぐっ！？」"

[[dialogue]]
speaker = "ヒマワリ"
# 「なるほどぉ……見習いのあたしたちに、わざわざ会社の資産を減らしてまで、逆境から立ち上がるメンタルについて教えてくれたんだ……そうですよね、社長！」
line = "「なるほどぉ……見習いのあたしたちに、わざわざ会社の資産を減らしてまで、逆境から立ち上がるメンタルについて教えてくれたんだ……そうですよね、社長！」"

[[dialogue]]
speaker = "セナリィ"
# 「そ、そうですわ！　私はそれを言いたかったのです！　おほ、ほーっほっほっ！」
line = "「そ、そうですわ！　私はそれを言いたかったのです！　おほ、ほーっほっほっ！」"

[[dialogue]]
speaker = "セナリィ"
# 「溶けてしまったお金は戻ってきません！　失った過去のはした金より、未来に稼ぐ大金に目を向けるのですわ！」
line = "「溶けてしまったお金は戻ってきません！　失った過去のはした金より、未来に稼ぐ大金に目を向けるのですわ！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「おおー、さすが社長！　その瞳は遥か未来を見通しているんですね！　そんな社長にピッタリの案件が届いてますよ！」
line = "「おおー、さすが社長！　その瞳は遥か未来を見通しているんですね！　そんな社長にピッタリの案件が届いてますよ！」"

[[dialogue]]
speaker = "セナリィ"
# 「あら、どんなかしら？」
line = "「あら、どんなかしら？」"

[[dialogue]]
speaker = "ヒマワリ"
# 「公安委員会から、社長の<ruby=エンプレス>女帝</ruby>フォームがどうしても必要な超大口案件です！　奇遇にも、ちょうど昨晩の損失とほぼ同額の報酬ですね！」
line = "「公安委員会から、社長の<ruby>女帝<rt>エンプレス</rt></ruby>フォームがどうしても必要な超大口案件です！　奇遇にも、ちょうど昨晩の損失とほぼ同額の報酬ですね！」"

[[dialogue]]
speaker = "セナリィ"
# 「い゛ぃっ！？　またヒマワリと『アレ』をやれというんですの！？　イーヤーでーすーわーっ！　一週間はポンコツになってしまいますのよー！」
line = "「い゛ぃっ！？　またヒマワリと『アレ』をやれというんですの！？　イーヤーでーすーわーっ！　一週間はポンコツになってしまいますのよー！」"

[[dialogue]]
speaker = "ミウ"
# 「え、断っちゃうんですか……？　社長の格好いいところが見られると思ったのに……」
line = "「え、断っちゃうんですか……？　社長の格好いいところが見られると思ったのに……」"

[[dialogue]]
speaker = "セナリィ"
# 「ぐぬぬぬぬぅ……！　わっ、わかりましたわ、やってやります！　やってやればいいのでしょうっ！？」
line = "「ぐぬぬぬぬぅ……！　わっ、わかりましたわ、やってやります！　やってやればいいのでしょうっ！？」"

[[dialogue]]
speaker = "ミウ"
# 「それでこそ、私たちのセナリィ社長ですっ♪」
line = "「それでこそ、私たちのセナリィ社長ですっ♪」"

[[dialogue]]
speaker = "unk"
# こうして、ゴールデングースの面々は勇ましく任務へと出撃し。
line = "こうして、ゴールデングースの面々は勇ましく任務へと出撃し。"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「きぃいぃぃやぁあぁぁぁぁぁっっっ！！？！？」
line = "「きぃいぃぃやぁあぁぁぁぁぁっっっ！！？！？」"

[[dialogue]]
speaker = "unk"
# <ruby=エンプレス>女帝</ruby>フォームの長時間着用を強いられたセナリィは、運営資金を溶かしたお仕置きとばかりに限界まで酷使されたのであった。
line = "<ruby>女帝<rt>エンプレス</rt></ruby>フォームの長時間着用を強いられたセナリィは、運営資金を溶かしたお仕置きとばかりに限界まで酷使されたのであった。"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「もう投資はコリゴリですわ～～～っ！！」
line = "「もう投資はコリゴリですわ～～～っ！！」"
