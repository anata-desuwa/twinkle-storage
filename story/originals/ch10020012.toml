[[dialogue]]
speaker = "unk"
# 第２話,姉離れは寂しいもの,P
line = "第２話,姉離れは寂しいもの,P"

[[dialogue]]
speaker = "ソフィア"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "サーシャ"
# 「……どうしたのソフィ？　あんまりフォークが進んでないみたいだけど、嫌いなものでもあった？　お姉ちゃんが食べてあげようか？」
line = "「……どうしたのソフィ？　あんまりフォークが進んでないみたいだけど、嫌いなものでもあった？　お姉ちゃんが食べてあげようか？」"

[[dialogue]]
speaker = "ソフィア"
# 「子供扱いしないでください。苦手なものは人間界に来る前にある程度克服しました。昔みたいに姉さんに食べてもらうようなことはありません」
line = "「子供扱いしないでください。苦手なものは人間界に来る前にある程度克服しました。昔みたいに姉さんに食べてもらうようなことはありません」"

[[dialogue]]
speaker = "サーシャ"
# 「あら、そうなの～。だったらどうして？」
line = "「あら、そうなの～。だったらどうして？」"

[[dialogue]]
speaker = "ソフィア"
# 「……なぜ、新星の会長さんがここにいらっしゃるんですか。２人で久しぶりに食事をしよう、という話だったはずですが」
line = "「……なぜ、新星の会長さんがここにいらっしゃるんですか。２人で久しぶりに食事をしよう、という話だったはずですが」"

[[dialogue]]
speaker = "ソフィア"
# 「いえ、別に会長さんがいること自体は気にしてません。ただ、相変わらずの気分屋でため息が止まらないだけです」
line = "「いえ、別に会長さんがいること自体は気にしてません。ただ、相変わらずの気分屋でため息が止まらないだけです」"

[[dialogue]]
speaker = "unk"
# せっかくの姉妹水入らずだったのに、ごめん
line = "せっかくの姉妹水入らずだったのに、ごめん"

[[dialogue]]
speaker = "ソフィア"
# 「会長さんが謝ることはありませんよ。どうせ、私がいることを知らされずに、姉さんから食事に誘われたんですよね？」
line = "「会長さんが謝ることはありませんよ。どうせ、私がいることを知らされずに、姉さんから食事に誘われたんですよね？」"

[[dialogue]]
speaker = "サーシャ"
# 「だって～、どうせならみんなで食べたほうが、ご飯も美味しくなると思って。会長くんも１人でお昼ご飯食べようとしてたし～」
line = "「だって～、どうせならみんなで食べたほうが、ご飯も美味しくなると思って。会長くんも１人でお昼ご飯食べようとしてたし～」"

[[dialogue]]
speaker = "ソフィア"
# 「とまあ、こういう人であることは姉妹である私が一番よくわかっているので、気にしなくていいです」
line = "「とまあ、こういう人であることは姉妹である私が一番よくわかっているので、気にしなくていいです」"

[[dialogue]]
speaker = "ソフィア"
# 「すみません、フィオナ会長から電話が。少し席を外します」
line = "「すみません、フィオナ会長から電話が。少し席を外します」"

[[dialogue]]
speaker = "サーシャ"
# 「いってらっしゃ～い」
line = "「いってらっしゃ～い」"

[[dialogue]]
speaker = "サーシャ"
# 「ごめんなさいね、会長くん。巻き込んじゃって」
line = "「ごめんなさいね、会長くん。巻き込んじゃって」"

[[dialogue]]
speaker = "サーシャ"
# 「私と１対１で話すよりも、会長くんがいてくれたほうがリラックスして話せるかなと思ったんだけど……逆効果だったみたい」
line = "「私と１対１で話すよりも、会長くんがいてくれたほうがリラックスして話せるかなと思ったんだけど……逆効果だったみたい」"

[[dialogue]]
speaker = "unk"
# 昔から、あまり仲は……？
line = "昔から、あまり仲は……？"

[[dialogue]]
speaker = "サーシャ"
# 「いえ？　魔界にいた頃はお姉ちゃんお姉ちゃんって言って、どこに行くにも私の後ろについてくるような、すっごく甘えてくる子だったのよ～」
line = "「いえ？　魔界にいた頃はお姉ちゃんお姉ちゃんって言って、どこに行くにも私の後ろについてくるような、すっごく甘えてくる子だったのよ～」"

[[dialogue]]
speaker = "サーシャ"
# 「それが今では立派に独り立ちしちゃって……」
line = "「それが今では立派に独り立ちしちゃって……」"

[[dialogue]]
speaker = "サーシャ"
# 「お姉ちゃん、すっごく寂しいわ～～～っ！」
line = "「お姉ちゃん、すっごく寂しいわ～～～っ！」"

[[dialogue]]
speaker = "サーシャ"
# 「昔は抱きしめたり、ほっぺすりすりしても嫌がらないどころか、嬉しそうに抱きしめ返してくれたのに～～～っ！」
line = "「昔は抱きしめたり、ほっぺすりすりしても嫌がらないどころか、嬉しそうに抱きしめ返してくれたのに～～～っ！」"

[[dialogue]]
speaker = "サーシャ"
# 「ぐすん……まあでもそうよね。ソフィも姉離れするような年齢よね。そうよね。わかってる。わかってるわ……」
line = "「ぐすん……まあでもそうよね。ソフィも姉離れするような年齢よね。そうよね。わかってる。わかってるわ……」"

[[dialogue]]
speaker = "サーシャ"
# 「……でも」
line = "「……でも」"

[[dialogue]]
speaker = "サーシャ"
# 「そういう、ちょっと反抗的なソフィも、可愛いと思わないかしら？　うふふ、どうにかして昔みたいに、甘えさせたいって気になっちゃう♪」
line = "「そういう、ちょっと反抗的なソフィも、可愛いと思わないかしら？　うふふ、どうにかして昔みたいに、甘えさせたいって気になっちゃう♪」"

[[dialogue]]
speaker = "unk"
# （だいぶ厄介なシスコンだ……！）
line = "（だいぶ厄介なシスコンだ……！）"

[[dialogue]]
speaker = "unk"
# （シスコンはシスコンなんだろうけど……）
line = "（シスコンはシスコンなんだろうけど……）"

[[dialogue]]
speaker = "ソフィア"
# 「ただいま戻りました。なんの話をしていたんですか？」
line = "「ただいま戻りました。なんの話をしていたんですか？」"

[[dialogue]]
speaker = "サーシャ"
# 「ソフィの反抗期について話してたのよ♪」
line = "「ソフィの反抗期について話してたのよ♪」"

[[dialogue]]
speaker = "ソフィア"
# 「なっ……！　は、反抗期なんかじゃありませんっ！　姉さんとはウマが合わないというだけで、反抗期なんて子供っぽいものと勘違いされるのは不服ですっ！」
line = "「なっ……！　は、反抗期なんかじゃありませんっ！　姉さんとはウマが合わないというだけで、反抗期なんて子供っぽいものと勘違いされるのは不服ですっ！」"

[[dialogue]]
speaker = "ソフィア"
# 「だ、大体姉さんも妹離れするべきなんじゃないですか。いつまでも自分に甘えてくれる存在がいるとは、思わないほうがいいですよ」
line = "「だ、大体姉さんも妹離れするべきなんじゃないですか。いつまでも自分に甘えてくれる存在がいるとは、思わないほうがいいですよ」"

[[dialogue]]
speaker = "サーシャ"
# 「なぁんでそんなこと言うの～～！　お姉ちゃん、泣いちゃうわよ？」
line = "「なぁんでそんなこと言うの～～！　お姉ちゃん、泣いちゃうわよ？」"

[[dialogue]]
speaker = "ソフィア"
# 「こんな公衆の面前で泣くのはやめてください！　恥ずかしいです」
line = "「こんな公衆の面前で泣くのはやめてください！　恥ずかしいです」"

[[dialogue]]
speaker = "サーシャ"
# 「じゃあ妹離れできないお姉ちゃんは、妹を抱きしめてなでなでしてもいいってことよね？」
line = "「じゃあ妹離れできないお姉ちゃんは、妹を抱きしめてなでなでしてもいいってことよね？」"

[[dialogue]]
speaker = "ソフィア"
# 「ダメです」
line = "「ダメです」"

[[dialogue]]
speaker = "サーシャ"
# 「ソフィ、お姉ちゃん権限を行使してもいいのよ？」
line = "「ソフィ、お姉ちゃん権限を行使してもいいのよ？」"

[[dialogue]]
speaker = "ソフィア"
# 「そんなものはありません。ダメです」
line = "「そんなものはありません。ダメです」"

[[dialogue]]
speaker = "サーシャ"
# 「……わかったわ。今日のところは諦めることにします」
line = "「……わかったわ。今日のところは諦めることにします」"

[[dialogue]]
speaker = "ソフィア"
# 「明日も明後日もそれ以降もずっとそうしてください」
line = "「明日も明後日もそれ以降もずっとそうしてください」"

[[dialogue]]
speaker = "サーシャ"
# 「……会長くん。お姉ちゃんは今、猛烈に妹成分を欲しているわ」
line = "「……会長くん。お姉ちゃんは今、猛烈に妹成分を欲しているわ」"

[[dialogue]]
speaker = "サーシャ"
# 「だから……会長くんを妹だと思って、抱きしめていいかしら？」
line = "「だから……会長くんを妹だと思って、抱きしめていいかしら？」"

[[dialogue]]
speaker = "ソフィア"
# 「はあっ！？！？」
line = "「はあっ！？！？」"

[[dialogue]]
speaker = "unk"
# ダメです
line = "ダメです"

[[dialogue]]
speaker = "サーシャ"
# 「あら残念～。仕方ないわね。妹成分の補給は、また今度まで取っておくことにするわ」
line = "「あら残念～。仕方ないわね。妹成分の補給は、また今度まで取っておくことにするわ」"

[[dialogue]]
speaker = "ソフィア"
# （……か、会長さんに妹の立場を取られるくらいなら、許してあげなくも……）
line = "（……か、会長さんに妹の立場を取られるくらいなら、許してあげなくも……）"

[[dialogue]]
speaker = "サーシャ"
# 「ソフィ？　何か言った？」
line = "「ソフィ？　何か言った？」"

[[dialogue]]
speaker = "ソフィア"
# 「い、いえ、何もっ。それより、こんなくだらない話をしていては、ご飯を食べる前に休み時間が終わってしまいますっ。早く食べましょうっ」
line = "「い、いえ、何もっ。それより、こんなくだらない話をしていては、ご飯を食べる前に休み時間が終わってしまいますっ。早く食べましょうっ」"

[[dialogue]]
speaker = "サーシャ"
# 「それもそうね。料理が冷めちゃうわ～」
line = "「それもそうね。料理が冷めちゃうわ～」"

[[dialogue]]
speaker = "サーシャ"
# 「あ、ソフィ？　久しぶりに、あーん、してあげる♪　ほーら♪」
line = "「あ、ソフィ？　久しぶりに、あーん、してあげる♪　ほーら♪」"

[[dialogue]]
speaker = "ソフィア"
# 「結構です！」
line = "「結構です！」"

[[dialogue]]
speaker = "unk"
# ソフィアの言葉が聞こえていた俺には、もはや仲の良い姉妹のじゃれ合いにしか見えず──
line = "ソフィアの言葉が聞こえていた俺には、もはや仲の良い姉妹のじゃれ合いにしか見えず──"

[[dialogue]]
speaker = "unk"
# 思わず、微笑ましくなってしまうのだった。
line = "思わず、微笑ましくなってしまうのだった。"
