[[dialogue]]
speaker = "unk"
# 第４話,神殿のガーディアン,B
line = "第４話,神殿のガーディアン,B"

[[dialogue]]
speaker = "レティシア"
# 「アルタイルの星騎士の相手をする必要はないわ。このまま神殿内部に突入しましょう」
line = "「アルタイルの星騎士の相手をする必要はないわ。このまま神殿内部に突入しましょう」"

[[dialogue]]
speaker = "グレイス"
# 「はい！」
line = "「はい！」"

[[dialogue]]
speaker = "unk"
# 極星従騎を壁にして、神殿に侵入しようとするグレイスとレティシア。
line = "極星従騎を壁にして、神殿に侵入しようとするグレイスとレティシア。"

[[dialogue]]
speaker = "アリコーン"
# 「ヒヒィン！」
line = "「ヒヒィン！」"

[[dialogue]]
speaker = "グレイス"
# 「──！？　まだ防衛のガーディアンがいたんですか！」
line = "「──！？　まだ防衛のガーディアンがいたんですか！」"

[[dialogue]]
speaker = "unk"
# しかしその前に、神獣のガーディアンが立ちふさがる。
line = "しかしその前に、神獣のガーディアンが立ちふさがる。"

[[dialogue]]
speaker = "ナターシャ"
# 「危なかった。先に中に入られるとまずいからね」
line = "「危なかった。先に中に入られるとまずいからね」"

[[dialogue]]
speaker = "ナターシャ"
# 「きっと極星の２人は、デネブの神殿を攻略して内部構造を把握してる。侵入を許すと、そのまま奥に行っちゃうよ」
line = "「きっと極星の２人は、デネブの神殿を攻略して内部構造を把握してる。侵入を許すと、そのまま奥に行っちゃうよ」"

[[dialogue]]
speaker = "梨緒"
# 「ああ、わかった！　極星従騎を蹴散らすぞ！」
line = "「ああ、わかった！　極星従騎を蹴散らすぞ！」"

[[dialogue]]
speaker = "スレイプニル"
# 「ブルルル！」
line = "「ブルルル！」"

[[dialogue]]
speaker = "梨緒"
# 「吹き飛ばせ──ライトニングテンペスト！」
line = "「吹き飛ばせ──ライトニングテンペスト！」"

[[dialogue]]
speaker = "ベアトリス"
# 「悪いけど、グレイスちゃんとレティシアちゃんのところに行かせてもらうよ！」
line = "「悪いけど、グレイスちゃんとレティシアちゃんのところに行かせてもらうよ！」"

[[dialogue]]
speaker = "スレイプニル"
# 「ヒィン……」
line = "「ヒィン……」"

[[dialogue]]
speaker = "ナターシャ"
# （ん……？）
line = "（ん……？）"

[[dialogue]]
speaker = "ガーディアン・オルサレクス"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ナターシャ"
# （あのガーディアン、何……？）
line = "（あのガーディアン、何……？）"

[[dialogue]]
speaker = "unk"
# 神殿を守るように飛行するガーディアンたちのその奥。
line = "神殿を守るように飛行するガーディアンたちのその奥。"

[[dialogue]]
speaker = "unk"
# まるで周囲を見渡すように鎮座する、機械のガーディアンがいた。
line = "まるで周囲を見渡すように鎮座する、機械のガーディアンがいた。"

[[dialogue]]
speaker = "ナターシャ"
# （極星星徒会もこっちも攻撃してこないけど、何してるの？）
line = "（極星星徒会もこっちも攻撃してこないけど、何してるの？）"

[[dialogue]]
speaker = "ホルン"
# 「クルル！」
line = "「クルル！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ちょこまか動くんじゃないわよ！」
line = "「ちょこまか動くんじゃないわよ！」"

[[dialogue]]
speaker = "unk"
# ヴィーナスが鎖を放ち、無数の鳥型ガーディアンを一網打尽にする。
line = "ヴィーナスが鎖を放ち、無数の鳥型ガーディアンを一網打尽にする。"

[[dialogue]]
speaker = "メルエル"
# 「会長くん！」
line = "「会長くん！」"

[[dialogue]]
speaker = "クロト"
# 「ああ、合わせる！」
line = "「ああ、合わせる！」"

[[dialogue]]
speaker = "メルエル"
# 「眩き調べよ響け──ディヴォーテッド・コンチェルト！」
line = "「眩き調べよ響け──ディヴォーテッド・コンチェルト！」"

[[dialogue]]
speaker = "unk"
# そして俺とメルエルの力を収束させ、光の旋律が極星従騎を一網打尽にした。
line = "そして俺とメルエルの力を収束させ、光の旋律が極星従騎を一網打尽にした。"

[[dialogue]]
speaker = "ガーディアン・オルサレクス"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "ガーディアン・オルサレクス"
# 「──」
line = "「──」"

[[dialogue]]
speaker = "ナターシャ"
# （あのガーディアン、今光ったような……）
line = "（あのガーディアン、今光ったような……）"

[[dialogue]]
speaker = "ナターシャ"
# （嫌な胸騒ぎがする……）
line = "（嫌な胸騒ぎがする……）"

[[dialogue]]
speaker = "スレイプニル"
# 「ヒヒィン！」
line = "「ヒヒィン！」"

[[dialogue]]
speaker = "アポロ"
# 「邪魔するなーっ！」
line = "「邪魔するなーっ！」"

[[dialogue]]
speaker = "スレイプニル"
# 「ヒィン……！」
line = "「ヒィン……！」"

[[dialogue]]
speaker = "unk"
# 魔王の力を宿した大剣を一閃し、流星の瞬きが極星従騎を両断する。
line = "魔王の力を宿した大剣を一閃し、流星の瞬きが極星従騎を両断する。"

[[dialogue]]
speaker = "ガーディアン・オルサレクス"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ガーディアン・オルサレクス"
# 「────」
line = "「────」"

[[dialogue]]
speaker = "ナターシャ"
# （あのガーディアン、やっぱり何かに反応してる？　しかもあいつにエネルギーが集中しているような……）
line = "（あのガーディアン、やっぱり何かに反応してる？　しかもあいつにエネルギーが集中しているような……）"

[[dialogue]]
speaker = "ナターシャ"
# （ここは２０００年前の魔王に狙われた、女神の神殿。ならもしかして──）
line = "（ここは２０００年前の魔王に狙われた、女神の神殿。ならもしかして──）"

[[dialogue]]
speaker = "グレイス"
# 「はぁっ──！」
line = "「はぁっ──！」"

[[dialogue]]
speaker = "unk"
# 極星星徒会の攻撃で、ガーディアンが１体、また１体と駆逐されていく。
line = "極星星徒会の攻撃で、ガーディアンが１体、また１体と駆逐されていく。"

[[dialogue]]
speaker = "ヴィーナス"
# 「このままだと極星星徒会が先に神殿に入っちゃうわ！　ノヴァフォームで一気にケリをつけるわよ！」
line = "「このままだと極星星徒会が先に神殿に入っちゃうわ！　ノヴァフォームで一気にケリをつけるわよ！」"

[[dialogue]]
speaker = "クロト"
# 「ガーディアンがこっちに……！？」
line = "「ガーディアンがこっちに……！？」"

[[dialogue]]
speaker = "ナターシャ"
# 「みんなあのガーディアンから離れて！　ヴィーナス、ストッ──」
line = "「みんなあのガーディアンから離れて！　ヴィーナス、ストッ──」"

[[dialogue]]
speaker = "ヴィーナス"
# 「チェンジ・ノヴァフォ──」
line = "「チェンジ・ノヴァフォ──」"

[[dialogue]]
speaker = "ガーディアン・オルサレクス"
# 「──」
line = "「──」"

[[dialogue]]
speaker = "unk"
# ナターシャが止めるのも間に合わず、ヴィーナスがノヴァフォームに変身しようとした瞬間、ガーディアンから光が放たれ、視界が閃光に染まる。
line = "ナターシャが止めるのも間に合わず、ヴィーナスがノヴァフォームに変身しようとした瞬間、ガーディアンから光が放たれ、視界が閃光に染まる。"

[[dialogue]]
speaker = "クロト"
# 「ガーディアンが自爆した……！？」
line = "「ガーディアンが自爆した……！？」"

[[dialogue]]
speaker = "ナターシャ"
# 「くっ……魔王の力に反応したんだ……！」
line = "「くっ……魔王の力に反応したんだ……！」"

[[dialogue]]
speaker = "unk"
# 閃光に呑まれた俺たちは、真っ逆さまに墜落していった。
line = "閃光に呑まれた俺たちは、真っ逆さまに墜落していった。"
