[[dialogue]]
speaker = "unk"
# 第１話,守護天使ラクシャ,B
line = "第１話,守護天使ラクシャ,B"

[[dialogue]]
speaker = "unk"
# 俺たちは平行世界デネブへと渡り、そこで極星学園の星徒会長・ルヴィネと、彼女に対抗するレジスタンスと出会った。
line = "俺たちは平行世界デネブへと渡り、そこで極星学園の星徒会長・ルヴィネと、彼女に対抗するレジスタンスと出会った。"

[[dialogue]]
speaker = "unk"
# 平行世界デネブで何が起きたのか、説明を聞こうとしていたところに現れたのが──
line = "平行世界デネブで何が起きたのか、説明を聞こうとしていたところに現れたのが──"

[[dialogue]]
speaker = "unk"
# 俺のかつてのバイト仲間・市倉環。
line = "俺のかつてのバイト仲間・市倉環。"

[[dialogue]]
speaker = "unk"
# その正体は、守護天使《円環》のラクシャだ。
line = "その正体は、守護天使《円環》のラクシャだ。"

[[dialogue]]
speaker = "ヴィーナス"
# 「どうして環がデネブにいるのよ？　ていうか今デネブの話を聞くところだったのに、邪魔しないでくれる？」
line = "「どうして環がデネブにいるのよ？　ていうか今デネブの話を聞くところだったのに、邪魔しないでくれる？」"

[[dialogue]]
speaker = "ラクシャ"
# 「あ、そうなんだ。ボクも<ruby=こっち>デネブ</ruby>に戻ってきて間もないし、よければ聞かせてほしいんだけど」
line = "「あ、そうなんだ。ボクも<ruby>デネブ<rt>こっち</rt></ruby>に戻ってきて間もないし、よければ聞かせてほしいんだけど」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「お前が本当に敵じゃないかを確認してからだ。魔王たちとはいろいろあったみたいだからな」
line = "「お前が本当に敵じゃないかを確認してからだ。魔王たちとはいろいろあったみたいだからな」"

[[dialogue]]
speaker = "ラクシャ"
# 「それもそうか。じゃあ改めて名乗らせてもらうよ」
line = "「それもそうか。じゃあ改めて名乗らせてもらうよ」"

[[dialogue]]
speaker = "ラクシャ"
# 「ボクは守護天使の一柱、《円環》のラクシャ。前はわけあって、市倉環って名前で学生をやってたけどね」
line = "「ボクは守護天使の一柱、《円環》のラクシャ。前はわけあって、市倉環って名前で学生をやってたけどね」"

[[dialogue]]
speaker = "unk"
# そう、俺やヴィーナスにとって、彼女は同じ新星学園の生徒のはずだった。
line = "そう、俺やヴィーナスにとって、彼女は同じ新星学園の生徒のはずだった。"

[[dialogue]]
speaker = "unk"
# だが──
line = "だが──"

[[dialogue]]
speaker = "unk"
# セイファート元学園長にヴィーナスがさらわれ、救出のために魔界に赴いた時。
line = "セイファート元学園長にヴィーナスがさらわれ、救出のために魔界に赴いた時。"

[[dialogue]]
speaker = "unk"
# ヴィーナスの元に向かう俺たちの前に、環が立ちはだかった。
line = "ヴィーナスの元に向かう俺たちの前に、環が立ちはだかった。"

[[dialogue]]
speaker = "unk"
# 戦闘の結果は、俺たちが勝利。
line = "戦闘の結果は、俺たちが勝利。"

[[dialogue]]
speaker = "unk"
# 『世界が無事なら、また会えるかも』という言葉を遺して消滅したが──
line = "『世界が無事なら、また会えるかも』という言葉を遺して消滅したが──"

[[dialogue]]
speaker = "unk"
# 『あの時消えた環がどうして俺たちの前にいるのか？』『環はどうしてセイファートに与していたのか？』『どうやって平行世界デネブに来たのか？』
line = "『あの時消えた環がどうして俺たちの前にいるのか？』『環はどうしてセイファートに与していたのか？』『どうやって平行世界デネブに来たのか？』"

[[dialogue]]
speaker = "unk"
# 彼女に聞きたいことはいくらでもあって、疑問は尽きない。
line = "彼女に聞きたいことはいくらでもあって、疑問は尽きない。"

[[dialogue]]
speaker = "リノ"
# 「《円環》のラクシャ……守護する摂理は流転ね。万物の循環を司る存在だわ」
line = "「《円環》のラクシャ……守護する摂理は流転ね。万物の循環を司る存在だわ」"

[[dialogue]]
speaker = "リノ"
# 「魂の輪廻も彼女の管轄。転生の天使といっても過言じゃないわね」
line = "「魂の輪廻も彼女の管轄。転生の天使といっても過言じゃないわね」"

[[dialogue]]
speaker = "ラクシャ"
# 「そ。さすが長生きな魔女さん、よく知ってるね」
line = "「そ。さすが長生きな魔女さん、よく知ってるね」"

[[dialogue]]
speaker = "リノ"
# 「守護天使に長生きとは言われたくないんだけど。悠久の時を生きる守護天使に比べたら、５００歳の魔女だってミジンコみたいなものだわ」
line = "「守護天使に長生きとは言われたくないんだけど。悠久の時を生きる守護天使に比べたら、５００歳の魔女だってミジンコみたいなものだわ」"

[[dialogue]]
speaker = "ラクシャ"
# 「ははは。それもそうだ」
line = "「ははは。それもそうだ」"

[[dialogue]]
speaker = "ラクシャ"
# 「改めて言っておくけど、ボクは敵じゃないよ。最初から今までずっとね」
line = "「改めて言っておくけど、ボクは敵じゃないよ。最初から今までずっとね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「じゃあ、なんで環はセイファートと一緒にいたの？　敵じゃないってどの口で言うのよ」
line = "「じゃあ、なんで環はセイファートと一緒にいたの？　敵じゃないってどの口で言うのよ」"

[[dialogue]]
speaker = "ラクシャ"
# 「それには理由があるんだけど……う～ん……どの順番で話すかなぁ……」
line = "「それには理由があるんだけど……う～ん……どの順番で話すかなぁ……」"

[[dialogue]]
speaker = "unk"
# 環はしばし逡巡した後、少し真剣な顔になって語り始める。
line = "環はしばし逡巡した後、少し真剣な顔になって語り始める。"

[[dialogue]]
speaker = "ラクシャ"
# 「まず、ボクがセイファートに与したのは、彼が緋宮クロトを殺めるのを避けるためだ」
line = "「まず、ボクがセイファートに与したのは、彼が緋宮クロトを殺めるのを避けるためだ」"

[[dialogue]]
speaker = "ラクシャ"
# 「彼が女神の力を奪い、敵になったのは、ボクの想定外の事態だった」
line = "「彼が女神の力を奪い、敵になったのは、ボクの想定外の事態だった」"

[[dialogue]]
speaker = "ラクシャ"
# 「あの時点では、まだ魔王よりセイファートの方が強かった。でもリクリエを阻止するためには魔王を失うわけにはいかない」
line = "「あの時点では、まだ魔王よりセイファートの方が強かった。でもリクリエを阻止するためには魔王を失うわけにはいかない」"

[[dialogue]]
speaker = "ラクシャ"
# 「そういうわけで、セイファートと魔王がぶつからないように奔走してたってわけ。ボクにとっても苦肉の策だったんだよ」
line = "「そういうわけで、セイファートと魔王がぶつからないように奔走してたってわけ。ボクにとっても苦肉の策だったんだよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「なんか言い訳っぽいわね」
line = "「なんか言い訳っぽいわね」"

[[dialogue]]
speaker = "ラクシャ"
# 「まぁ言い訳は言い訳だね。ヴィーナスに危険が及ぶことになったのは、悪いと思ってるよ」
line = "「まぁ言い訳は言い訳だね。ヴィーナスに危険が及ぶことになったのは、悪いと思ってるよ」"

[[dialogue]]
speaker = "ラクシャ"
# 「肉体をもう１つ近くに忍ばせておいて、いざとなったらヴィーナスを助けるつもりだった。成功する可能性は低かったけどね」
line = "「肉体をもう１つ近くに忍ばせておいて、いざとなったらヴィーナスを助けるつもりだった。成功する可能性は低かったけどね」"

[[dialogue]]
speaker = "ラクシャ"
# 「魔界で魔王の前に立ちふさがったのは、魔王の力を試すため」
line = "「魔界で魔王の前に立ちふさがったのは、魔王の力を試すため」"

[[dialogue]]
speaker = "ラクシャ"
# 「直接戦って、これならセイファートに勝てるかもしれないと感じた。だから<ruby=クロスダスト>霊屑</ruby>を託し、魔王が覚醒する可能性に賭けた」
line = "「直接戦って、これならセイファートに勝てるかもしれないと感じた。だから<ruby>霊屑<rt>クロスダスト</rt></ruby>を託し、魔王が覚醒する可能性に賭けた」"

[[dialogue]]
speaker = "ラクシャ"
# 「結果として……魔王は見事覚醒を果たし、期待以上の成果を得られた。それはキミたちも知っての通り」
line = "「結果として……魔王は見事覚醒を果たし、期待以上の成果を得られた。それはキミたちも知っての通り」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それは……そうだけど」
line = "「それは……そうだけど」"

[[dialogue]]
speaker = "unk"
# 環の行動は俺の魔王としての覚醒に繋がり、それはリクリエの阻止にも寄与した。
line = "環の行動は俺の魔王としての覚醒に繋がり、それはリクリエの阻止にも寄与した。"

[[dialogue]]
speaker = "unk"
# 確かに、結果だけ見れば環は俺たちの味方といえるだろう。
line = "確かに、結果だけ見れば環は俺たちの味方といえるだろう。"

[[dialogue]]
speaker = "クロト"
# 「セイファート元学園長に味方していたことについては、ひとまず説明を信じよう」
line = "「セイファート元学園長に味方していたことについては、ひとまず説明を信じよう」"

[[dialogue]]
speaker = "クロト"
# 「だけど君は何者なんだ？　他の守護天使とは明らかに違う」
line = "「だけど君は何者なんだ？　他の守護天使とは明らかに違う」"

[[dialogue]]
speaker = "ラクシャ"
# 「うん、ボクもそれをこれから話そうと思っていたところ」
line = "「うん、ボクもそれをこれから話そうと思っていたところ」"

[[dialogue]]
speaker = "ラクシャ"
# 「キミやヴィーナスとはアルタイルで出会った。だけどボクはアルタイルのラクシャじゃない。デネブのラクシャだ」
line = "「キミやヴィーナスとはアルタイルで出会った。だけどボクはアルタイルのラクシャじゃない。デネブのラクシャだ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「環もデネブから……！？」
line = "「環もデネブから……！？」"

[[dialogue]]
speaker = "ラクシャ"
# 「うん。だってボクはヴィーナスと一緒にアルタイルに来たからね」
line = "「うん。だってボクはヴィーナスと一緒にアルタイルに来たからね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええっ！？」
line = "「ええっ！？」"

[[dialogue]]
speaker = "クロト"
# 「ヴィーナスと環が一緒に……？」
line = "「ヴィーナスと環が一緒に……？」"

[[dialogue]]
speaker = "unk"
# 正直、俺も驚きを禁じ得ない。
line = "正直、俺も驚きを禁じ得ない。"

[[dialogue]]
speaker = "unk"
# 環がアルタイルのラクシャでない可能性は薄々考えていたが、ヴィーナスと環にそこまで密接な関係があるとは思わなかった。
line = "環がアルタイルのラクシャでない可能性は薄々考えていたが、ヴィーナスと環にそこまで密接な関係があるとは思わなかった。"

[[dialogue]]
speaker = "ラクシャ"
# 「どうしてそんなことになったのか、時間を遡って説明するよ。デネブは今、森羅暦３０１２年だから……十年以上前の出来事だね」
line = "「どうしてそんなことになったのか、時間を遡って説明するよ。デネブは今、森羅暦３０１２年だから……十年以上前の出来事だね」"

[[dialogue]]
speaker = "ラクシャ"
# 「女神テルルは憂いていた。リクリエは魔王ラクシスによって退けられたが、次のリクリエはより激しいものになるだろうと」
line = "「女神テルルは憂いていた。リクリエは魔王ラクシスによって退けられたが、次のリクリエはより激しいものになるだろうと」"

[[dialogue]]
speaker = "ラクシャ"
# 「テルルは世界の滅びを避けようとしたが、彼女は現世に強く干渉することができない。そのままじゃ存在が大きすぎるんだ」
line = "「テルルは世界の滅びを避けようとしたが、彼女は現世に強く干渉することができない。そのままじゃ存在が大きすぎるんだ」"

[[dialogue]]
speaker = "ラクシャ"
# 「だからテルルは考えた。神ではなく、人として関与することはできないかと」
line = "「だからテルルは考えた。神ではなく、人として関与することはできないかと」"

[[dialogue]]
speaker = "ラクシャ"
# 「そこでテルルからボクに声がかかった。流転──魂と物質の循環を司るボクは、守護天使の中でも現世に干渉しやすいからね」
line = "「そこでテルルからボクに声がかかった。流転──魂と物質の循環を司るボクは、守護天使の中でも現世に干渉しやすいからね」"

[[dialogue]]
speaker = "ラクシャ"
# 「そして流転を司るボクは、女神の魂の一部を切り離し、人間として転生させた」
line = "「そして流転を司るボクは、女神の魂の一部を切り離し、人間として転生させた」"

[[dialogue]]
speaker = "ヴィーナス"
# 「！　まさか──」
line = "「！　まさか──」"

[[dialogue]]
speaker = "ラクシャ"
# 「そう。それがヴィーナス──キミの母親だ」
line = "「そう。それがヴィーナス──キミの母親だ」"
