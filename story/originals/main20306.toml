[[dialogue]]
speaker = "unk"
# 第６話,アガサとジグ,B
line = "第６話,アガサとジグ,B"

[[dialogue]]
speaker = "unk"
# 梨緒が保健室で目を覚ましたのは、ジグとの戦闘から丸１日ほど経った頃だった。
line = "梨緒が保健室で目を覚ましたのは、ジグとの戦闘から丸１日ほど経った頃だった。"

[[dialogue]]
speaker = "unk"
# 幸い怪我は軽く、入院するほどではないと診断されたのだが……
line = "幸い怪我は軽く、入院するほどではないと診断されたのだが……"

[[dialogue]]
speaker = "unk"
# 「気絶は恐らく心因性のもの」「心の傷は医療機器では測れない」と医者に言われ、ここで安静にしているように言い含められてしまった。
line = "「気絶は恐らく心因性のもの」「心の傷は医療機器では測れない」と医者に言われ、ここで安静にしているように言い含められてしまった。"

[[dialogue]]
speaker = "梨緒"
# 「夢……じゃないんだな」
line = "「夢……じゃないんだな」"

[[dialogue]]
speaker = "unk"
# 梨緒の脳裏に浮かぶのは、仮面を付けたジグの姿。
line = "梨緒の脳裏に浮かぶのは、仮面を付けたジグの姿。"

[[dialogue]]
speaker = "unk"
# 夢であってほしいと願っても、胸に突き刺さる戦慄は、あの光景が幻でないと克明に示していた。
line = "夢であってほしいと願っても、胸に突き刺さる戦慄は、あの光景が幻でないと克明に示していた。"

[[dialogue]]
speaker = "梨緒"
# 「悪夢であれば、どんなに良かったか……」
line = "「悪夢であれば、どんなに良かったか……」"

[[dialogue]]
speaker = "梨緒"
# 「ジグ……」
line = "「ジグ……」"

[[dialogue]]
speaker = "unk"
# レナーテ・<ruby=ジグ>Ｚ</ruby>・サイフリート。
line = "レナーテ・<ruby>Ｚ<rt>ジグ</rt></ruby>・サイフリート。"

[[dialogue]]
speaker = "unk"
# かつて新星星徒会の星徒会長だった、梨緒の<ruby=ライバル>宿敵</ruby>。
line = "かつて新星星徒会の星徒会長だった、梨緒の<ruby>宿敵<rt>ライバル</rt></ruby>。"

[[dialogue]]
speaker = "梨緒"
# 「ジグ……あいつは仮面を纏い、リクリエのモンスターを従えていた」
line = "「ジグ……あいつは仮面を纏い、リクリエのモンスターを従えていた」"

[[dialogue]]
speaker = "梨緒"
# 「先日、緋宮クロトが話していた『リクリエの使徒』の特徴と完全に一致する……」
line = "「先日、緋宮クロトが話していた『リクリエの使徒』の特徴と完全に一致する……」"

[[dialogue]]
speaker = "梨緒"
# 「あのジグが……世界の再創生を願い、モンスターをけしかける、リクリエの使徒だって……？」
line = "「あのジグが……世界の再創生を願い、モンスターをけしかける、リクリエの使徒だって……？」"

[[dialogue]]
speaker = "unk"
# 理解できない。
line = "理解できない。"

[[dialogue]]
speaker = "unk"
# ジグはいつも飄々としていて、掴みどころのないやつだった。
line = "ジグはいつも飄々としていて、掴みどころのないやつだった。"

[[dialogue]]
speaker = "unk"
# どんなピンチを前にしても、まるで忘れていた宿題を片付けるように、「まあ何とかするよ」と軽く笑う……そんな彼女があの新星学園の希望でもあった。
line = "どんなピンチを前にしても、まるで忘れていた宿題を片付けるように、「まあ何とかするよ」と軽く笑う……そんな彼女があの新星学園の希望でもあった。"

[[dialogue]]
speaker = "梨緒"
# 「また、救えなかった……！　私は、弱い……っ」
line = "「また、救えなかった……！　私は、弱い……っ」"

[[dialogue]]
speaker = "ジグ"
# 「やぁ、アガサ。コーヒー飲むかい？」
line = "「やぁ、アガサ。コーヒー飲むかい？」"

[[dialogue]]
speaker = "梨緒"
# 「──！　見るな……」
line = "「──！　見るな……」"

[[dialogue]]
speaker = "ジグ"
# 「君が泣き虫なのはとっくに知ってるよ。今さらじゃないか」
line = "「君が泣き虫なのはとっくに知ってるよ。今さらじゃないか」"

[[dialogue]]
speaker = "梨緒"
# 「うる……さい……」
line = "「うる……さい……」"

[[dialogue]]
speaker = "梨緒"
# 「だいたい、君は今……」
line = "「だいたい、君は今……」"

[[dialogue]]
speaker = "ジグ"
# 「出撃中のはずだって？　今日は想定よりモンスターが少なくてね、さくっと終わらせて帰ってきたよ」
line = "「出撃中のはずだって？　今日は想定よりモンスターが少なくてね、さくっと終わらせて帰ってきたよ」"

[[dialogue]]
speaker = "ジグ"
# 「いやぁ、最近出撃ばかりだったから、ようやく少し休めるね」
line = "「いやぁ、最近出撃ばかりだったから、ようやく少し休めるね」"

[[dialogue]]
speaker = "梨緒"
# 「……流星市国以外にもモンスターが現れるのが当たり前になり、各地で大きな被害が出ている。関東だけでもいくつもの都市が壊滅した」
line = "「……流星市国以外にもモンスターが現れるのが当たり前になり、各地で大きな被害が出ている。関東だけでもいくつもの都市が壊滅した」"

[[dialogue]]
speaker = "梨緒"
# 「人類の生存圏は刻一刻と狭まり、今もどこかで犠牲が出ている……」
line = "「人類の生存圏は刻一刻と狭まり、今もどこかで犠牲が出ている……」"

[[dialogue]]
speaker = "ジグ"
# 「ああ、そうだね。その通りだ」
line = "「ああ、そうだね。その通りだ」"

[[dialogue]]
speaker = "ジグ"
# 「でも、勝つよ」
line = "「でも、勝つよ」"

[[dialogue]]
speaker = "梨緒"
# 「だけど……！　このままでは世界は……！」
line = "「だけど……！　このままでは世界は……！」"

[[dialogue]]
speaker = "ジグ"
# 「大丈夫、何とかなるさ」
line = "「大丈夫、何とかなるさ」"

[[dialogue]]
speaker = "ジグ"
# 「根拠もなく気休めを言っているわけじゃないよ」
line = "「根拠もなく気休めを言っているわけじゃないよ」"

[[dialogue]]
speaker = "ジグ"
# 「３０００年前、以前のリクリエの時だって世界は滅亡の間際まで追い詰められた」
line = "「３０００年前、以前のリクリエの時だって世界は滅亡の間際まで追い詰められた」"

[[dialogue]]
speaker = "ジグ"
# 「だけど世界は破滅に打ち勝った。だから今がある」
line = "「だけど世界は破滅に打ち勝った。だから今がある」"

[[dialogue]]
speaker = "ジグ"
# 「可能性は残されている。私はそう思うよ」
line = "「可能性は残されている。私はそう思うよ」"

[[dialogue]]
speaker = "梨緒"
# 「ジグ……」
line = "「ジグ……」"

[[dialogue]]
speaker = "ジグ"
# 「犠牲が出たことは真摯に受け止めよう。だけど嘆いてばかりではいけない。私たちにはまだ守るものがあるんだから」
line = "「犠牲が出たことは真摯に受け止めよう。だけど嘆いてばかりではいけない。私たちにはまだ守るものがあるんだから」"

[[dialogue]]
speaker = "ジグ"
# 「<ruby=うしな>喪</ruby>ったもののためにも、前を向いて戦おう。それが星騎士だ」
line = "「<ruby>喪<rt>うしな</rt></ruby>ったもののためにも、前を向いて戦おう。それが星騎士だ」"

[[dialogue]]
speaker = "梨緒"
# 「……ああ。わかっている。君に言われなくても」
line = "「……ああ。わかっている。君に言われなくても」"

[[dialogue]]
speaker = "ジグ"
# 「そうか。じゃあ余計なお世話だったね」
line = "「そうか。じゃあ余計なお世話だったね」"

[[dialogue]]
speaker = "ジグ"
# 「で、コーヒー飲む？」
line = "「で、コーヒー飲む？」"

[[dialogue]]
speaker = "梨緒"
# 「私は紅茶派だ」
line = "「私は紅茶派だ」"

[[dialogue]]
speaker = "ジグ"
# 「はは、アガサはそうでなくちゃ」
line = "「はは、アガサはそうでなくちゃ」"

[[dialogue]]
speaker = "梨緒"
# （あのジグが、リクリエの側についた……？）
line = "（あのジグが、リクリエの側についた……？）"

[[dialogue]]
speaker = "梨緒"
# （そんなの、あってはならないことだ。あれだけ人々を救ってきたジグが、世界を破滅に導くなんて）
line = "（そんなの、あってはならないことだ。あれだけ人々を救ってきたジグが、世界を破滅に導くなんて）"

[[dialogue]]
speaker = "梨緒"
# （それとも君は……本当は世界の破滅を望んでいたのか？）
line = "（それとも君は……本当は世界の破滅を望んでいたのか？）"

[[dialogue]]
speaker = "unk"
# 星徒会長と副会長だったあの時は、ジグのことを理解していたつもりだった。
line = "星徒会長と副会長だったあの時は、ジグのことを理解していたつもりだった。"

[[dialogue]]
speaker = "unk"
# だが今となっては、思い上がっていただけなのかもしれない。
line = "だが今となっては、思い上がっていただけなのかもしれない。"

[[dialogue]]
speaker = "梨緒"
# 「うぅ……ぐすっ……ひぐ……」
line = "「うぅ……ぐすっ……ひぐ……」"

[[dialogue]]
speaker = "unk"
# 情けない。
line = "情けない。"

[[dialogue]]
speaker = "unk"
# ジグを止められなかった。
line = "ジグを止められなかった。"

[[dialogue]]
speaker = "unk"
# 軽くあしらわれ、引き留めることもできなかった。
line = "軽くあしらわれ、引き留めることもできなかった。"

[[dialogue]]
speaker = "unk"
# ずっと近くにいながら、その本心を知ることすらできなかった。
line = "ずっと近くにいながら、その本心を知ることすらできなかった。"

[[dialogue]]
speaker = "梨緒"
# 「くっ……頭が……」
line = "「くっ……頭が……」"

[[dialogue]]
speaker = "unk"
# 頭が痛い。ズキズキと頭が割れるように痛む。
line = "頭が痛い。ズキズキと頭が割れるように痛む。"

[[dialogue]]
speaker = "梨緒"
# 「私は……私は……」
line = "「私は……私は……」"

[[dialogue]]
speaker = "梨緒"
# 「私は……なんて……無力なんだろう……」
line = "「私は……なんて……無力なんだろう……」"

[[dialogue]]
speaker = "？？？"
# 「梨緒ちゃん……あの、これ……」
line = "「梨緒ちゃん……あの、これ……」"

[[dialogue]]
speaker = "梨緒"
# 「──！？」
line = "「──！？」"

[[dialogue]]
speaker = "unk"
# 梨緒が声の方を振り向くと、そこにはハンカチを手にしたベアトリスの姿があった。
line = "梨緒が声の方を振り向くと、そこにはハンカチを手にしたベアトリスの姿があった。"
