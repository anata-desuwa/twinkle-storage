[[dialogue]]
speaker = "unk"
# 第４話,呪いの灯り,P
line = "第４話,呪いの灯り,P"

[[dialogue]]
speaker = "unk"
# 俺とリィベルは映画を観に渋谷までやってきた。
line = "俺とリィベルは映画を観に渋谷までやってきた。"

[[dialogue]]
speaker = "リィベル"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# なんとなく、リィベルがそわそわしているような……
line = "なんとなく、リィベルがそわそわしているような……"

[[dialogue]]
speaker = "unk"
# もしかして映画は初めて？
line = "もしかして映画は初めて？"

[[dialogue]]
speaker = "リィベル"
# 「……そうよ。悪い？」
line = "「……そうよ。悪い？」"

[[dialogue]]
speaker = "リィベル"
# 「……何事にも初めてはある？　まぁ、それはそうでしょうけど……はぁ、落ち着かないわ」
line = "「……何事にも初めてはある？　まぁ、それはそうでしょうけど……はぁ、落ち着かないわ」"

[[dialogue]]
speaker = "リィベル"
# 「これでも楽しみにしてるのよ。そうは見えないでしょうけど。まったく、アニメ化でいきなり映画なんて、やってくれるわね」
line = "「これでも楽しみにしてるのよ。そうは見えないでしょうけど。まったく、アニメ化でいきなり映画なんて、やってくれるわね」"

[[dialogue]]
speaker = "unk"
# 今日、俺たちが観に来たのはリィベルが読んでいた小説のアニメ映画だ。豪華制作陣＆豪華声優陣で注目の一作になっている。
line = "今日、俺たちが観に来たのはリィベルが読んでいた小説のアニメ映画だ。豪華制作陣＆豪華声優陣で注目の一作になっている。"

[[dialogue]]
speaker = "unk"
# ドリンク買ってくる。何がいい？
line = "ドリンク買ってくる。何がいい？"

[[dialogue]]
speaker = "リィベル"
# 「そうね。紅茶かコーヒー……いえ」
line = "「そうね。紅茶かコーヒー……いえ」"

[[dialogue]]
speaker = "リィベル"
# （紅茶とコーヒーはお手洗いが近くなるってネットに書いてあったからやめておきましょう）
line = "（紅茶とコーヒーはお手洗いが近くなるってネットに書いてあったからやめておきましょう）"

[[dialogue]]
speaker = "リィベル"
# 「ジンジャーエールでお願い」
line = "「ジンジャーエールでお願い」"

[[dialogue]]
speaker = "unk"
# ＯＫ！
line = "ＯＫ！"

[[dialogue]]
speaker = "unk"
# 今日は映画の封切り日で人が多い。売店が混んでないといいけど……
line = "今日は映画の封切り日で人が多い。売店が混んでないといいけど……"

[[dialogue]]
speaker = "リィベル"
# （魔王、行ったわね……）
line = "（魔王、行ったわね……）"

[[dialogue]]
speaker = "リィベル"
# （私なんかの世話を焼いて、ヒマなのかしら……いえ、そんなはずないのだけど……）
line = "（私なんかの世話を焼いて、ヒマなのかしら……いえ、そんなはずないのだけど……）"

[[dialogue]]
speaker = "？？？"
# 「おや、リィベルさん。こんなところでお会いするとは奇遇ですね」
line = "「おや、リィベルさん。こんなところでお会いするとは奇遇ですね」"

[[dialogue]]
speaker = "リィベル"
# 「あなたは──」
line = "「あなたは──」"

[[dialogue]]
speaker = "トレジアンナ"
# 「マジにマジカル☆　凛とリリカル！　華麗にカレイド♪」
line = "「マジにマジカル☆　凛とリリカル！　華麗にカレイド♪」"

[[dialogue]]
speaker = "トレジアンナ"
# 「蒐集の魔法少女トレジャー☆アンナです♪　初めまして、リィベルさんっ！」
line = "「蒐集の魔法少女トレジャー☆アンナです♪　初めまして、リィベルさんっ！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「キラッ☆」
line = "「キラッ☆」"

[[dialogue]]
speaker = "リィベル"
# （イラッ）
line = "（イラッ）"

[[dialogue]]
speaker = "リィベル"
# 「ロストアイテムの専門家、だったかしら。深淵書庫の管理システムである私を封印しに来たの？」
line = "「ロストアイテムの専門家、だったかしら。深淵書庫の管理システムである私を封印しに来たの？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「いえいえ。今日は完全にオフですよ。魔法少女アニメの劇場版リバイバル上映を観に来たんです。スクリーンに蘇る往年の名作たち！　胸アツです！」
line = "「いえいえ。今日は完全にオフですよ。魔法少女アニメの劇場版リバイバル上映を観に来たんです。スクリーンに蘇る往年の名作たち！　胸アツです！」"

[[dialogue]]
speaker = "リィベル"
# （確かに胸は厚いでしょうけど）
line = "（確かに胸は厚いでしょうけど）"

[[dialogue]]
speaker = "トレジアンナ"
# 「リィベルさんはおデートですか？　人が多くて向こうは気が付いてないようでしたけど、さっき会長さんとすれ違いましたよ」
line = "「リィベルさんはおデートですか？　人が多くて向こうは気が付いてないようでしたけど、さっき会長さんとすれ違いましたよ」"

[[dialogue]]
speaker = "リィベル"
# 「はぁ、デート！？　私と……魔王が逢引きしているっていうの！？」
line = "「はぁ、デート！？　私と……魔王が逢引きしているっていうの！？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「え、違うんですか？　私てっきり……というか、会長さんとリィベルさんは同じ学園の先輩後輩なんですから、ふたりきりで映画に行くのはもうデートですよ！」
line = "「え、違うんですか？　私てっきり……というか、会長さんとリィベルさんは同じ学園の先輩後輩なんですから、ふたりきりで映画に行くのはもうデートですよ！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「この前もおふたりで漫画を買いに行って……あ」
line = "「この前もおふたりで漫画を買いに行って……あ」"

[[dialogue]]
speaker = "リィベル"
# 「ふぅん。あなた、やっぱり私を監視していたのね」
line = "「ふぅん。あなた、やっぱり私を監視していたのね」"

[[dialogue]]
speaker = "トレジアンナ"
# 「失礼、口が滑ってしまいました。ですが、嘘はいけませんので正直に言いましょう。──あなたはロストアイテム『深淵書庫』の一部。監視、観察の対象です」
line = "「失礼、口が滑ってしまいました。ですが、嘘はいけませんので正直に言いましょう。──あなたはロストアイテム『深淵書庫』の一部。監視、観察の対象です」"

[[dialogue]]
speaker = "unk"
# ロストアイテムとは、リクリエを乗り越えた異物であり、リクリエにすら耐える強力な力を持ったアイテム群。トレジアンナさんはその蒐集者であり監視者だ。
line = "ロストアイテムとは、リクリエを乗り越えた異物であり、リクリエにすら耐える強力な力を持ったアイテム群。トレジアンナさんはその蒐集者であり監視者だ。"

[[dialogue]]
speaker = "トレジアンナ"
# 「深淵書庫は非常に危険なロストアイテムです。暴走すれば、流星市国は呪いに飲み込まれてしまうでしょう。この街は巨大な不発弾の上に建っているようなものです」
line = "「深淵書庫は非常に危険なロストアイテムです。暴走すれば、流星市国は呪いに飲み込まれてしまうでしょう。この街は巨大な不発弾の上に建っているようなものです」"

[[dialogue]]
speaker = "トレジアンナ"
# 「もちろん、魔将覚醒がうまくいけば暴走は防げます。ですが、同時に失敗する可能性もあるわけです。その時のために準備をしておくのも、専門家の仕事です」
line = "「もちろん、魔将覚醒がうまくいけば暴走は防げます。ですが、同時に失敗する可能性もあるわけです。その時のために準備をしておくのも、専門家の仕事です」"

[[dialogue]]
speaker = "トレジアンナ"
# 「ロストアイテムは本来この時代に存在しえないもの。そのせいで、現代のみなさんにご迷惑をおかけするわけにはいきませんからね！」
line = "「ロストアイテムは本来この時代に存在しえないもの。そのせいで、現代のみなさんにご迷惑をおかけするわけにはいきませんからね！」"

[[dialogue]]
speaker = "リィベル"
# 「私はその『ロストアイテム』という分類にも納得していないんだけど。分類なんて後付けだし、深淵書庫の成り立ちに<ruby=あなたたち>魔女</ruby>が関わっているとも限らないし」
line = "「私はその『ロストアイテム』という分類にも納得していないんだけど。分類なんて後付けだし、深淵書庫の成り立ちに<ruby>魔女<rt>あなたたち</rt></ruby>が関わっているとも限らないし」"

[[dialogue]]
speaker = "トレジアンナ"
# 「それはそうなんですが、まぁ、備えあれば嬉しいな、ということで！」
line = "「それはそうなんですが、まぁ、備えあれば嬉しいな、ということで！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「ところでリィベルさん、可愛いステッキや衣装に興味はありませんか？　むしろこっちが本題なんですけど──」
line = "「ところでリィベルさん、可愛いステッキや衣装に興味はありませんか？　むしろこっちが本題なんですけど──」"

[[dialogue]]
speaker = "リィベル"
# 「そろそろ映画が始まるから行くわ。じゃ」
line = "「そろそろ映画が始まるから行くわ。じゃ」"

[[dialogue]]
speaker = "リィベル"
# 「この時代に存在しえないもの、ね……分かっているわ、そんなこと」
line = "「この時代に存在しえないもの、ね……分かっているわ、そんなこと」"

[[dialogue]]
speaker = "unk"
# リィベル、お待たせ
line = "リィベル、お待たせ"

[[dialogue]]
speaker = "リィベル"
# 「ええ、ありが……何そのバケツは？　ああ、ポップコーンね。……それにしても大きすぎない？　食べきれなくても知らないわよ」
line = "「ええ、ありが……何そのバケツは？　ああ、ポップコーンね。……それにしても大きすぎない？　食べきれなくても知らないわよ」"

[[dialogue]]
speaker = "リィベル"
# 「まぁいいわ。映画、楽しみましょう」
line = "「まぁいいわ。映画、楽しみましょう」"

[[dialogue]]
speaker = "リィベル"
# 「うぐぐぐ……お腹がはちきれそう…………」
line = "「うぐぐぐ……お腹がはちきれそう…………」"

[[dialogue]]
speaker = "リィベル"
# 「調子に乗って大きいの注文するからよ。おかげで晩ご飯は入りそうにないわ」
line = "「調子に乗って大きいの注文するからよ。おかげで晩ご飯は入りそうにないわ」"

[[dialogue]]
speaker = "リィベル"
# 「まぁいいわ、映画は楽しめたから。私だけじゃ映画館まで来なかっただろうし」
line = "「まぁいいわ、映画は楽しめたから。私だけじゃ映画館まで来なかっただろうし」"

[[dialogue]]
speaker = "リィベル"
# 「……暗くなってきたわね。灯籠、点けましょうか」
line = "「……暗くなってきたわね。灯籠、点けましょうか」"

[[dialogue]]
speaker = "リィベル"
# 「映画の内容、憶えてる？」
line = "「映画の内容、憶えてる？」"

[[dialogue]]
speaker = "unk"
# 生前、人に裏切られて死んだ主人公は、別の世界に生を受ける。
line = "生前、人に裏切られて死んだ主人公は、別の世界に生を受ける。"

[[dialogue]]
speaker = "unk"
# 彼は前世の記憶に苦しみ、疑心暗鬼に陥りながらも、信じられる仲間を見つけて活躍していく──という物語だ。
line = "彼は前世の記憶に苦しみ、疑心暗鬼に陥りながらも、信じられる仲間を見つけて活躍していく──という物語だ。"

[[dialogue]]
speaker = "リィベル"
# 「作中、何度も灯籠が出てきたのは気付いたかしら？　原作や漫画でもそうだったけど、アニメではより分かりやすかったわね」
line = "「作中、何度も灯籠が出てきたのは気付いたかしら？　原作や漫画でもそうだったけど、アニメではより分かりやすかったわね」"

[[dialogue]]
speaker = "リィベル"
# 「昼夜を問わず歴史書を読み漁る主人公を見守ったり、あるいは夜闇に輝いて道を照らしたり…………」
line = "「昼夜を問わず歴史書を読み漁る主人公を見守ったり、あるいは夜闇に輝いて道を照らしたり…………」"

[[dialogue]]
speaker = "リィベル"
# 「あれは、絶望に負けない意思の表象。暗闇に屈しない決意なのよ」
line = "「あれは、絶望に負けない意思の表象。暗闇に屈しない決意なのよ」"

[[dialogue]]
speaker = "リィベル"
# 「だから、あの作品に触れた私の戦闘服にも反映されているんだと思うわ」
line = "「だから、あの作品に触れた私の戦闘服にも反映されているんだと思うわ」"

[[dialogue]]
speaker = "リィベル"
# 「でも、この灯籠に宿るのは呪いの炎よ。そんな私にも、闇を照らすことができるかしら」
line = "「でも、この灯籠に宿るのは呪いの炎よ。そんな私にも、闇を照らすことができるかしら」"

[[dialogue]]
speaker = "unk"
# リィベルなら、きっとできる
line = "リィベルなら、きっとできる"

[[dialogue]]
speaker = "リィベル"
# 「ふっ、あなたならそう言うと思ってたわ。相変わらず、考えなしのお人好し。でも…………」
line = "「ふっ、あなたならそう言うと思ってたわ。相変わらず、考えなしのお人好し。でも…………」"

[[dialogue]]
speaker = "リィベル"
# 「あなたが言うなら、そうかもね」
line = "「あなたが言うなら、そうかもね」"

[[dialogue]]
speaker = "unk"
# 小さく微笑むリィベル。その横顔を、灯籠が照らしていた──
line = "小さく微笑むリィベル。その横顔を、灯籠が照らしていた──"
