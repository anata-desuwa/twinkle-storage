[[dialogue]]
speaker = "unk"
# 第４話,バトルＤＥデート！？,P
line = "第４話,バトルＤＥデート！？,P"

[[dialogue]]
speaker = "ウィステリア"
# 「はぁ……夏ももうすぐ終わりなのよね……水着、思ったより着れなかったわ……」
line = "「はぁ……夏ももうすぐ終わりなのよね……水着、思ったより着れなかったわ……」"

[[dialogue]]
speaker = "unk"
# これから海デート行きましょう！
line = "これから海デート行きましょう！"

[[dialogue]]
speaker = "ウィステリア"
# 「！　そうよね、時間がないことを嘆くより行動するべきだわ。行きましょう、海！」
line = "「！　そうよね、時間がないことを嘆くより行動するべきだわ。行きましょう、海！」"

[[dialogue]]
speaker = "unk"
# その週末──
line = "その週末──"

[[dialogue]]
speaker = "ウィステリア"
# 「会長くんと海デート～♪　細かいこと考えずに、最初からこうすれば良かったのよ」
line = "「会長くんと海デート～♪　細かいこと考えずに、最初からこうすれば良かったのよ」"

[[dialogue]]
speaker = "ウィステリア"
# 「ふふ……こういうところは、好きな人と来てこそよね。泳ぐのもいいけど、海の家で何か食べるのも悪くないわね。会長くんはお腹空いて──」
line = "「ふふ……こういうところは、好きな人と来てこそよね。泳ぐのもいいけど、海の家で何か食べるのも悪くないわね。会長くんはお腹空いて──」"

[[dialogue]]
speaker = "ウィステリア"
# 「ん？　この音は──」
line = "「ん？　この音は──」"

[[dialogue]]
speaker = "モンスター"
# 「イ～～～ッ！」
line = "「イ～～～ッ！」"

[[dialogue]]
speaker = "ウィステリア"
# 「やっぱりーっ！」
line = "「やっぱりーっ！」"

[[dialogue]]
speaker = "ウィステリア"
# 「でもデートの邪魔はさせないわ！」
line = "「でもデートの邪魔はさせないわ！」"

[[dialogue]]
speaker = "水着フワッチ"
# 「イ～……」
line = "「イ～……」"

[[dialogue]]
speaker = "ウィステリア"
# 「油断も隙もあったもんじゃないわね。これでデートを再開──」
line = "「油断も隙もあったもんじゃないわね。これでデートを再開──」"

[[dialogue]]
speaker = "モンスター"
# 「イ～～～～～～～ッ！！」
line = "「イ～～～～～～～ッ！！」"

[[dialogue]]
speaker = "ウィステリア"
# 「できなかった！？」
line = "「できなかった！？」"

[[dialogue]]
speaker = "モンスター"
# 「シャ～～～～～～～ッ！！！」
line = "「シャ～～～～～～～ッ！！！」"

[[dialogue]]
speaker = "ウィステリア"
# 「サメまで出てきちゃって……はぁ、ホント不運だわ。このままじゃ延々とモンスターが湧いてきそうね。それなら──」
line = "「サメまで出てきちゃって……はぁ、ホント不運だわ。このままじゃ延々とモンスターが湧いてきそうね。それなら──」"

[[dialogue]]
speaker = "ウィステリア"
# 「戦いながらデートすればいいのよ！」
line = "「戦いながらデートすればいいのよ！」"

[[dialogue]]
speaker = "unk"
# ええ～～～～～っ！？
line = "ええ～～～～～っ！？"

[[dialogue]]
speaker = "ウィステリア"
# 「会長くん、かき氷買ってきたわよ。一緒に食べましょ♪」
line = "「会長くん、かき氷買ってきたわよ。一緒に食べましょ♪」"

[[dialogue]]
speaker = "ウィステリア"
# 「はい、あ～ん<emoji=heart04>　かき氷おいしい？」
line = "「はい、あ～ん<emoji=heart04>　かき氷おいしい？」"

[[dialogue]]
speaker = "unk"
# 頭がキーンとします……
line = "頭がキーンとします……"

[[dialogue]]
speaker = "ウィステリア"
# 「ふふ、それも夏の風物詩よ♪　それじゃ私も……あんっ。ん～～っ、ほんとにキーンとするわね♪」
line = "「ふふ、それも夏の風物詩よ♪　それじゃ私も……あんっ。ん～～っ、ほんとにキーンとするわね♪」"

[[dialogue]]
speaker = "モンスター"
# 「イ～～～」
line = "「イ～～～」"

[[dialogue]]
speaker = "ウィステリア"
# 「そこっ！」
line = "「そこっ！」"

[[dialogue]]
speaker = "モンスター"
# 「イ～～……」
line = "「イ～～……」"

[[dialogue]]
speaker = "ウィステリア"
# 「ちょっと砂浜を歩きましょうか。ほら、手を繋いで」
line = "「ちょっと砂浜を歩きましょうか。ほら、手を繋いで」"

[[dialogue]]
speaker = "ウィステリア"
# 「ふふふ……耳を澄ますと、さざ波の音が心地いいわね。まるで海に<ruby=たゆた>揺蕩</ruby>っているみたい──」
line = "「ふふふ……耳を澄ますと、さざ波の音が心地いいわね。まるで海に<ruby>揺蕩<rt>たゆた</rt></ruby>っているみたい──」"

[[dialogue]]
speaker = "モンスター"
# 「シャーー──」
line = "「シャーー──」"

[[dialogue]]
speaker = "ウィステリア"
# 「サメにはサメよ、マリシャスシャークバイト！」
line = "「サメにはサメよ、マリシャスシャークバイト！」"

[[dialogue]]
speaker = "モンスター"
# 「シャ～～～ッ！？」
line = "「シャ～～～ッ！？」"

[[dialogue]]
speaker = "ウィステリア"
# 「あ、バナナボートもあるみたいね。船で引っ張ってくれるんだって。楽しそうじゃない？」
line = "「あ、バナナボートもあるみたいね。船で引っ張ってくれるんだって。楽しそうじゃない？」"

[[dialogue]]
speaker = "unk"
# まるでモンスターがいないみたいに振る舞ってる……
line = "まるでモンスターがいないみたいに振る舞ってる……"

[[dialogue]]
speaker = "ウィステリア"
# 「だってモンスターにかかずらってるだけ損じゃない。海にいられる時間は限られてるのよ。できるだけ楽しまなきゃ」
line = "「だってモンスターにかかずらってるだけ損じゃない。海にいられる時間は限られてるのよ。できるだけ楽しまなきゃ」"

[[dialogue]]
speaker = "ウィステリア"
# 「それに、君と一緒にいたいって気持ちは、モンスターなんかじゃ邪魔できないわ」
line = "「それに、君と一緒にいたいって気持ちは、モンスターなんかじゃ邪魔できないわ」"

[[dialogue]]
speaker = "ウィステリア"
# 「好きよ……会長くん」
line = "「好きよ……会長くん」"

[[dialogue]]
speaker = "unk"
# 俺もウィステリアさんが好きです
line = "俺もウィステリアさんが好きです"

[[dialogue]]
speaker = "ウィステリア"
# 「ふふ、好きって言われちゃった<emoji=heart04>　これだけでもデートに来た甲斐あったかも」
line = "「ふふ、好きって言われちゃった<emoji=heart04>　これだけでもデートに来た甲斐あったかも」"

[[dialogue]]
speaker = "ウィステリア"
# 「だけどそれだけじゃなくて、キス──」
line = "「だけどそれだけじゃなくて、キス──」"

[[dialogue]]
speaker = "モンスター"
# 「グルルル！」
line = "「グルルル！」"

[[dialogue]]
speaker = "ウィステリア"
# 「邪魔！」
line = "「邪魔！」"

[[dialogue]]
speaker = "モンスター"
# 「グルル……」
line = "「グルル……」"

[[dialogue]]
speaker = "ウィステリア"
# 「ようやく終わり──」
line = "「ようやく終わり──」"

[[dialogue]]
speaker = "ウィステリア"
# 「近くにアステラ？　もう、夏も終わりだからってモンスターのバーゲンセールしなくていいのに……やっぱり呪われてる」
line = "「近くにアステラ？　もう、夏も終わりだからってモンスターのバーゲンセールしなくていいのに……やっぱり呪われてる」"

[[dialogue]]
speaker = "ウィステリア"
# 「ごめんね、いつも運と間が悪い彼女で……。こんなんじゃデート気分になれないわよね」
line = "「ごめんね、いつも運と間が悪い彼女で……。こんなんじゃデート気分になれないわよね」"

[[dialogue]]
speaker = "unk"
# 刺激的なデートです
line = "刺激的なデートです"

[[dialogue]]
speaker = "ウィステリア"
# 「！」
line = "「！」"

[[dialogue]]
speaker = "ウィステリア"
# 「……ありがとう、会長くん、こんな私を彼女にしてくれて」
line = "「……ありがとう、会長くん、こんな私を彼女にしてくれて」"

[[dialogue]]
speaker = "ウィステリア"
# 「私、やっぱり君が好き。君がいてくれて良かった」
line = "「私、やっぱり君が好き。君がいてくれて良かった」"

[[dialogue]]
speaker = "ウィステリア"
# 「君となら不運なんて吹き飛ばせるわ。だから──」
line = "「君となら不運なんて吹き飛ばせるわ。だから──」"

[[dialogue]]
speaker = "ウィステリア"
# 「ちゅっ<emoji=heart04>」
line = "「ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "ウィステリア"
# 「ようやくキスできたわね。さ、アステラなんてぶっとばして、思い切りイチャイチャしましょう<emoji=heart04>」
line = "「ようやくキスできたわね。さ、アステラなんてぶっとばして、思い切りイチャイチャしましょう<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そして２人でアステラを消滅させ、残りの時間を思う存分楽しんだのだった──
line = "そして２人でアステラを消滅させ、残りの時間を思う存分楽しんだのだった──"
