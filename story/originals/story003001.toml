[[dialogue]]
speaker = "unk"
# それはクリスマスも近づいた、とある日の昼下がり――
line = "それはクリスマスも近づいた、とある日の昼下がり――"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「フニ、ひとつ聞きたいことがありますわ」
line = "「フニ、ひとつ聞きたいことがありますわ」"

[[dialogue]]
speaker = "フェニエル"
# 「は、はい、何でしょうか？」
line = "「は、はい、何でしょうか？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「前回のクリスマス、フニはセシア様をお手伝いしてプレゼント配りをしていましたわね？」
line = "「前回のクリスマス、フニはセシア様をお手伝いしてプレゼント配りをしていましたわね？」"

[[dialogue]]
speaker = "フェニエル"
# 「そうですね。セッシーちゃんとルルカちゃんのお手伝いをさせてもらいました」
line = "「そうですね。セッシーちゃんとルルカちゃんのお手伝いをさせてもらいました」"

[[dialogue]]
speaker = "フェニエル"
# 「あの時はお姉様に『無暗に高価なものを配りまくるのはよくない』というアドバイスを頂きましたよね」
line = "「あの時はお姉様に『無暗に高価なものを配りまくるのはよくない』というアドバイスを頂きましたよね」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「うむむむむむ……」
line = "「うむむむむむ……」"

[[dialogue]]
speaker = "フェニエル"
# 「……お姉様？」
line = "「……お姉様？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「……決めましたわ」
line = "「……決めましたわ」"

[[dialogue]]
speaker = "フェニエル"
# 「え？」
line = "「え？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「<ruby=イルソーレ>流星寮</ruby>でクリスマスパーティーを開きますわよっ！」
line = "「<ruby>流星寮<rt>イルソーレ</rt></ruby>でクリスマスパーティーを開きますわよっ！」"

[[dialogue]]
speaker = "フェニエル"
# 「ど、どうしたんですか、急に？」
line = "「ど、どうしたんですか、急に？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「以前より我が流星寮でも、クリスマスの催しを開きたいと考えていたんですの！」
line = "「以前より我が流星寮でも、クリスマスの催しを開きたいと考えていたんですの！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「クリスマスパーティーは毎回カフェテリアで盛大に行われていますわ。しかし、それは流星、新星、附属生という学園全体のものですわ」
line = "「クリスマスパーティーは毎回カフェテリアで盛大に行われていますわ。しかし、それは流星、新星、附属生という学園全体のものですわ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「私の提案するのは、流星寮の寮生たち全員が楽しめるような、伝統と格式あるパーティーですの！」
line = "「私の提案するのは、流星寮の寮生たち全員が楽しめるような、伝統と格式あるパーティーですの！」"

[[dialogue]]
speaker = "フェニエル"
# 「流星寮のパーティー……楽しそうですね、いいと思います」
line = "「流星寮のパーティー……楽しそうですね、いいと思います」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「必ずや流星寮の名に相応しい素晴らしいパーティーにして見せますわ！　マムにはぜぇ～～～ったい真似できない、エレガントなクリスマスパーティーに！」
line = "「必ずや流星寮の名に相応しい素晴らしいパーティーにして見せますわ！　マムにはぜぇ～～～ったい真似できない、エレガントなクリスマスパーティーに！」"

[[dialogue]]
speaker = "フェニエル"
# 「お姉様……もしかして本音はそちらでは……？」
line = "「お姉様……もしかして本音はそちらでは……？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「いいですか、フニ。お金は天下の回りもの！　祭事においてお金を使わない者に、大きな<ruby=チャンス>商談</ruby>は舞い込んでこないものですわ！」
line = "「いいですか、フニ。お金は天下の回りもの！　祭事においてお金を使わない者に、大きな<ruby>商談<rt>チャンス</rt></ruby>は舞い込んでこないものですわ！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「というわけで、パーティーにはいくらつぎ込んでも構いません！　足りない分は私のポケットマネーから出させていただきますわ！」
line = "「というわけで、パーティーにはいくらつぎ込んでも構いません！　足りない分は私のポケットマネーから出させていただきますわ！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「そうですわね、例えばですけどプロの楽団を呼ぶのはどうかしら？　フルオーケストラで聖歌を唄うなんて大感動間違いなしですわ！」
line = "「そうですわね、例えばですけどプロの楽団を呼ぶのはどうかしら？　フルオーケストラで聖歌を唄うなんて大感動間違いなしですわ！」"

[[dialogue]]
speaker = "フェニエル"
# 「以前に頂いたアドバイスと真逆を突っ走っているように思うのは気のせいでしょうか……」
line = "「以前に頂いたアドバイスと真逆を突っ走っているように思うのは気のせいでしょうか……」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「流星寮の威光を示すには必要な出費ですわ！」
line = "「流星寮の威光を示すには必要な出費ですわ！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「とにかく、開催しますわよ！　流星寮プレゼンツのクリスマスパーティー！」
line = "「とにかく、開催しますわよ！　流星寮プレゼンツのクリスマスパーティー！」"

[[dialogue]]
speaker = "フェニエル"
# 「わかりました。でもお姉様、クリスマスまでそれほど日がありません」
line = "「わかりました。でもお姉様、クリスマスまでそれほど日がありません」"

[[dialogue]]
speaker = "フェニエル"
# 「当日までの準備期間、お姉様も私もちょうど色々忙しくて、スケジュールがびっしりなんですがどうしましょう？」
line = "「当日までの準備期間、お姉様も私もちょうど色々忙しくて、スケジュールがびっしりなんですがどうしましょう？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「根性で何とかしますわ！」
line = "「根性で何とかしますわ！」"

[[dialogue]]
speaker = "フェニエル"
# 「そ、そんな……さすがに根性だけではどうにもなりませんよ……」
line = "「そ、そんな……さすがに根性だけではどうにもなりませんよ……」"

[[dialogue]]
speaker = "フェニエル"
# 「万全を期すためにも無理をせず、任せられるところは誰かに任せてしまった方がよいのではないでしょうか……？」
line = "「万全を期すためにも無理をせず、任せられるところは誰かに任せてしまった方がよいのではないでしょうか……？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ふむ……一理ありますわね」
line = "「ふむ……一理ありますわね」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「我が流星寮には、そういった企画を見事に実現してみせる優秀な人材も揃っているはずですわ」
line = "「我が流星寮には、そういった企画を見事に実現してみせる優秀な人材も揃っているはずですわ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「<ruby=ラルーナ>新星寮</ruby>との格の違いを見せつけるためにも、寮生から実行委員を選出するのが妥当な判断かもしれませんわね」
line = "「<ruby>新星寮<rt>ラルーナ</rt></ruby>との格の違いを見せつけるためにも、寮生から実行委員を選出するのが妥当な判断かもしれませんわね」"

[[dialogue]]
speaker = "フェニエル"
# 「では、正式に募集をかけてみますね？」
line = "「では、正式に募集をかけてみますね？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ええ、頼んだわよフニ！」
line = "「ええ、頼んだわよフニ！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「テーマは『流星寮の品格に相応しいクリスマスパーティー』、やる気のある者なら誰でも歓迎しますわ！」
line = "「テーマは『流星寮の品格に相応しいクリスマスパーティー』、やる気のある者なら誰でも歓迎しますわ！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「おーっほっほっほ！　どんな子が集まってくれるのか、今から楽しみですわっ♪」
line = "「おーっほっほっほ！　どんな子が集まってくれるのか、今から楽しみですわっ♪」"

[[dialogue]]
speaker = "unk"
# こうして……流星寮クリスマスパーティーの実行スタッフを募集するポスターが<b>大々的に</b>貼りだされたのだった。
line = "こうして……流星寮クリスマスパーティーの実行スタッフを募集するポスターが<b>大々的に</b>貼りだされたのだった。"
