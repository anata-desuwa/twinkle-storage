[[dialogue]]
speaker = "unk"
# 第１３話,激震,B
line = "第１３話,激震,B"

[[dialogue]]
speaker = "梨緒"
# （前もこんなことが──）
line = "（前もこんなことが──）"

[[dialogue]]
speaker = "unk"
# ベガの終局の瞬間、フィオナに手を伸ばそうとして……届かなかった。
line = "ベガの終局の瞬間、フィオナに手を伸ばそうとして……届かなかった。"

[[dialogue]]
speaker = "梨緒"
# （私はベガのフィオナを救えなかった……）
line = "（私はベガのフィオナを救えなかった……）"

[[dialogue]]
speaker = "梨緒"
# （デネブのフィオナも……助けるどころか、助けられてばかりで……）
line = "（デネブのフィオナも……助けるどころか、助けられてばかりで……）"

[[dialogue]]
speaker = "unk"
# そして光に包まれて、ベガが消滅する──
line = "そして光に包まれて、ベガが消滅する──"

[[dialogue]]
speaker = "梨緒"
# 「ジグ……！？」
line = "「ジグ……！？」"

[[dialogue]]
speaker = "梨緒"
# 「──ッ！！」
line = "「──ッ！！」"

[[dialogue]]
speaker = "梨緒"
# （今の光景は……？　あの時、ジグに何が起きた……？）
line = "（今の光景は……？　あの時、ジグに何が起きた……？）"

[[dialogue]]
speaker = "アポロ"
# 「よ、起きたか！　行方不明になったかと思ったら、教皇庁の前で倒れてたからビックリしたぞ！」
line = "「よ、起きたか！　行方不明になったかと思ったら、教皇庁の前で倒れてたからビックリしたぞ！」"

[[dialogue]]
speaker = "梨緒"
# 「アポロ！？　小さい方の……じゃあここはアルタイルか……？」
line = "「アポロ！？　小さい方の……じゃあここはアルタイルか……？」"

[[dialogue]]
speaker = "アポロ"
# 「？　あたしに小さいとか大きいとかあるのか？」
line = "「？　あたしに小さいとか大きいとかあるのか？」"

[[dialogue]]
speaker = "梨緒"
# 「ああ……後で話す……」
line = "「ああ……後で話す……」"

[[dialogue]]
speaker = "クロト"
# 「俺たち、生きてるんだな……」
line = "「俺たち、生きてるんだな……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええ、ちゃんと足も付いてるわね」
line = "「ええ、ちゃんと足も付いてるわね」"

[[dialogue]]
speaker = "マトイ"
# 「おかえり！　緋宮くんもヴィーナスも生きてて良かった！」
line = "「おかえり！　緋宮くんもヴィーナスも生きてて良かった！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ごめんマトイ、お土産買えなかったわ！」
line = "「ごめんマトイ、お土産買えなかったわ！」"

[[dialogue]]
speaker = "マトイ"
# 「お土産！？　ていうかどこ行ってたの！？」
line = "「お土産！？　ていうかどこ行ってたの！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「デネブに里帰りしてたのよ」
line = "「デネブに里帰りしてたのよ」"

[[dialogue]]
speaker = "マトイ"
# 「デネブ！？　里帰り！？　それはよかったけど！」
line = "「デネブ！？　里帰り！？　それはよかったけど！」"

[[dialogue]]
speaker = "マトイ"
# 「でもごめん、いますごくヤバいことになってて！」
line = "「でもごめん、いますごくヤバいことになってて！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ヤバいこと……？」
line = "「ヤバいこと……？」"

[[dialogue]]
speaker = "マトイ"
# 「今、天界全土が極星学園に襲撃されてるの！！」
line = "「今、天界全土が極星学園に襲撃されてるの！！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「なんですってっ！？」
line = "「なんですってっ！？」"
