[[dialogue]]
speaker = "unk"
# 第４話,戦いの道か、料理の道か,P
line = "第４話,戦いの道か、料理の道か,P"

[[dialogue]]
speaker = "unk"
# 蛍火と付き合いも長くなってきたある日。俺は放課後、カフェテリアで話したいことがあると彼女を呼び出した。
line = "蛍火と付き合いも長くなってきたある日。俺は放課後、カフェテリアで話したいことがあると彼女を呼び出した。"

[[dialogue]]
speaker = "蛍火"
# 「師匠？　不肖、東雲蛍火、参りました。……それで、お話とは一体何でしょうか？」
line = "「師匠？　不肖、東雲蛍火、参りました。……それで、お話とは一体何でしょうか？」"

[[dialogue]]
speaker = "unk"
# 蛍火、最近何かをずっと悩んでない？
line = "蛍火、最近何かをずっと悩んでない？"

[[dialogue]]
speaker = "蛍火"
# 「あ……」
line = "「あ……」"

[[dialogue]]
speaker = "蛍火"
# 「お見通し……でしたか。さすが、師匠には敵いませんね」
line = "「お見通し……でしたか。さすが、師匠には敵いませんね」"

[[dialogue]]
speaker = "蛍火"
# 「師匠の仰る通り……最近、少し考えてしまっていることがあります」
line = "「師匠の仰る通り……最近、少し考えてしまっていることがあります」"

[[dialogue]]
speaker = "蛍火"
# 「はい……それは、戦いについてのことです。最近は私も、リクリエの厄災がどんどん流星市国に迫って来ているのを、肌で感じております」
line = "「はい……それは、戦いについてのことです。最近は私も、リクリエの厄災がどんどん流星市国に迫って来ているのを、肌で感じております」"

[[dialogue]]
speaker = "蛍火"
# 「にも関わらず、私は最前線に立たず、後方で料理人を続けています。……本当にこれでいいのだろうかと、思ってしまうのです」
line = "「にも関わらず、私は最前線に立たず、後方で料理人を続けています。……本当にこれでいいのだろうかと、思ってしまうのです」"

[[dialogue]]
speaker = "unk"
# 蛍火はでも、料理人も目指したいんだよね？
line = "蛍火はでも、料理人も目指したいんだよね？"

[[dialogue]]
speaker = "蛍火"
# 「それは……はい、仰る通りです」
line = "「それは……はい、仰る通りです」"

[[dialogue]]
speaker = "蛍火"
# 「最近は師匠のおかげで友達も増えて……皆様がよく、私の料理を食べにやって来てくれるようになりました」
line = "「最近は師匠のおかげで友達も増えて……皆様がよく、私の料理を食べにやって来てくれるようになりました」"

[[dialogue]]
speaker = "蛍火"
# 「友達が美味しいと喜んでくれるのが、私はとても嬉しくて。以前よりもずっと……料理の道を極めたいという気持ちが強くなりました」
line = "「友達が美味しいと喜んでくれるのが、私はとても嬉しくて。以前よりもずっと……料理の道を極めたいという気持ちが強くなりました」"

[[dialogue]]
speaker = "蛍火"
# 「ですが……同時に私は、師匠やサーシャ先輩達に、申し訳ないとも感じてしまうのです」
line = "「ですが……同時に私は、師匠やサーシャ先輩達に、申し訳ないとも感じてしまうのです」"

[[dialogue]]
speaker = "unk"
# それは蛍火が、元星徒会メンバーだから？
line = "それは蛍火が、元星徒会メンバーだから？"

[[dialogue]]
speaker = "蛍火"
# 「はい。自惚れかもしれませんが……少なくとも、私は星徒会に入れるだけの力を持っています」
line = "「はい。自惚れかもしれませんが……少なくとも、私は星徒会に入れるだけの力を持っています」"

[[dialogue]]
speaker = "蛍火"
# 「最前線で戦えるだけの力がある。だというのに、今の私は後方支援ばかりで……」
line = "「最前線で戦えるだけの力がある。だというのに、今の私は後方支援ばかりで……」"

[[dialogue]]
speaker = "蛍火"
# 「私はやるべきことから、目を背けているのではないかと……どうしても考えてしまうのです」
line = "「私はやるべきことから、目を背けているのではないかと……どうしても考えてしまうのです」"

[[dialogue]]
speaker = "蛍火"
# 「何より、友達になってくれた、師匠や星徒会の皆様が命をかけて戦っているのに、私は……」
line = "「何より、友達になってくれた、師匠や星徒会の皆様が命をかけて戦っているのに、私は……」"

[[dialogue]]
speaker = "unk"
# 何も間違ってないと思う
line = "何も間違ってないと思う"

[[dialogue]]
speaker = "unk"
# 俺は蛍火が料理人を目指すのは……
line = "俺は蛍火が料理人を目指すのは……"

[[dialogue]]
speaker = "蛍火"
# 「師匠……？」
line = "「師匠……？」"

[[dialogue]]
speaker = "unk"
# ──確かに、蛍火の高い戦闘力は貴重なものだ。
line = "──確かに、蛍火の高い戦闘力は貴重なものだ。"

[[dialogue]]
speaker = "unk"
# 星徒会に戻って来てくれたら、こんなに心強いことはないだろう。
line = "星徒会に戻って来てくれたら、こんなに心強いことはないだろう。"

[[dialogue]]
speaker = "unk"
# しかしそれでも、星徒会役員やプリマステラが１人多く出動したところで、倒せるモンスターやアステラの数には限度がある。
line = "しかしそれでも、星徒会役員やプリマステラが１人多く出動したところで、倒せるモンスターやアステラの数には限度がある。"

[[dialogue]]
speaker = "unk"
# 一方で、凄腕料理人が星騎士みんなの料理を作ってくれて、栄養ある料理で肉体をサポートし、美味しい料理でモチベーションをあげてくれたら、どうだろうか。
line = "一方で、凄腕料理人が星騎士みんなの料理を作ってくれて、栄養ある料理で肉体をサポートし、美味しい料理でモチベーションをあげてくれたら、どうだろうか。"

[[dialogue]]
speaker = "unk"
# たった１人の力で何十、何百という星騎士を支えることが出来る。
line = "たった１人の力で何十、何百という星騎士を支えることが出来る。"

[[dialogue]]
speaker = "unk"
# 蛍火が料理人を目指すことと、世界を救う助けになることは、何も矛盾していない。
line = "蛍火が料理人を目指すことと、世界を救う助けになることは、何も矛盾していない。"

[[dialogue]]
speaker = "unk"
# ……この世界を救って欲しい
line = "……この世界を救って欲しい"

[[dialogue]]
speaker = "unk"
# ──だから、蛍火は迷わず料理の腕を磨くことで、
line = "──だから、蛍火は迷わず料理の腕を磨くことで、"

[[dialogue]]
speaker = "蛍火"
# 「料理でリクリエから世界を救う……」
line = "「料理でリクリエから世界を救う……」"

[[dialogue]]
speaker = "蛍火"
# 「そんなこと、今まで考えたこともありませんでした」
line = "「そんなこと、今まで考えたこともありませんでした」"

[[dialogue]]
speaker = "蛍火"
# 「果たして私にそれが出来るのか、今はまだ自信はありませんが──」
line = "「果たして私にそれが出来るのか、今はまだ自信はありませんが──」"

[[dialogue]]
speaker = "蛍火"
# 「少し、真面目に考えてみようと思いますっ」
line = "「少し、真面目に考えてみようと思いますっ」"

[[dialogue]]
speaker = "unk"
# その間、最前線は俺たちに任せてくれ
line = "その間、最前線は俺たちに任せてくれ"

[[dialogue]]
speaker = "蛍火"
# 「はい、師匠っ。………………あっ」
line = "「はい、師匠っ。………………あっ」"

[[dialogue]]
speaker = "蛍火"
# 「……い、いえ、何でもありません。ちょっとしたことに気付いただけですので……」
line = "「……い、いえ、何でもありません。ちょっとしたことに気付いただけですので……」"

[[dialogue]]
speaker = "蛍火"
# （今、最前線を任せろと言われて、すんなり受け入れることが出来ました）
line = "（今、最前線を任せろと言われて、すんなり受け入れることが出来ました）"

[[dialogue]]
speaker = "蛍火"
# （私は師匠の弟子で、友達で……それ以上に──）
line = "（私は師匠の弟子で、友達で……それ以上に──）"

[[dialogue]]
speaker = "蛍火"
# （私はいつの間にか貴方様のことを、心から信じられるくらい……お慕いするようになっていたのですね）
line = "（私はいつの間にか貴方様のことを、心から信じられるくらい……お慕いするようになっていたのですね）"

[[dialogue]]
speaker = "蛍火"
# 「……ふえっ！？　か、顔が赤い、ですか？　こ、これはちょっと……考えすぎて頭に血が昇っただけですのでっ」
line = "「……ふえっ！？　か、顔が赤い、ですか？　こ、これはちょっと……考えすぎて頭に血が昇っただけですのでっ」"

[[dialogue]]
speaker = "蛍火"
# 「あ、あの……師匠っ。その──」
line = "「あ、あの……師匠っ。その──」"

[[dialogue]]
speaker = "蛍火"
# 「これからも末永く、よろしくお願い致しますねっ」
line = "「これからも末永く、よろしくお願い致しますねっ」"

[[dialogue]]
speaker = "unk"
# 蛍火はそう言うと、初めて友達になった時のように、手を差し出す。
line = "蛍火はそう言うと、初めて友達になった時のように、手を差し出す。"

[[dialogue]]
speaker = "unk"
# もちろん！
line = "もちろん！"

[[dialogue]]
speaker = "蛍火"
# 「は、はい！　……ふふっ」
line = "「は、はい！　……ふふっ」"

[[dialogue]]
speaker = "unk"
# 改めて握手すると、蛍火は照れつつも。
line = "改めて握手すると、蛍火は照れつつも。"

[[dialogue]]
speaker = "unk"
# 久しぶりに明るい笑顔を見せてくれるのだった。
line = "久しぶりに明るい笑顔を見せてくれるのだった。"
