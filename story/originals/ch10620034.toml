[[dialogue]]
speaker = "unk"
# 第４話,ジュエリーとの未来,P
line = "第４話,ジュエリーとの未来,P"

[[dialogue]]
speaker = "unk"
# ジュエリーがウェディングフォームを手に入れてからというもの――２人で将来のことを語らう時間が、前よりも増えた気がする。
line = "ジュエリーがウェディングフォームを手に入れてからというもの――２人で将来のことを語らう時間が、前よりも増えた気がする。"

[[dialogue]]
speaker = "ジュエリー"
# 「助手。先日、結婚式場でモデルとして写真の撮影をした時……改めて私に愛を誓ってくれただろう？」
line = "「助手。先日、結婚式場でモデルとして写真の撮影をした時……改めて私に愛を誓ってくれただろう？」"

[[dialogue]]
speaker = "ジュエリー"
# 「その影響もあってか、最近はキミとの将来に思いを馳せるのが、とても楽しいんだ」
line = "「その影響もあってか、最近はキミとの将来に思いを馳せるのが、とても楽しいんだ」"

[[dialogue]]
speaker = "ジュエリー"
# 「ついには、こんな物まで用意してしまってね──」
line = "「ついには、こんな物まで用意してしまってね──」"

[[dialogue]]
speaker = "unk"
# ジュエリーはそう言って、１冊の小さなノートを取り出してみせた。
line = "ジュエリーはそう言って、１冊の小さなノートを取り出してみせた。"

[[dialogue]]
speaker = "ジュエリー"
# 「これは『未来予想手帳』だ。私たちの将来に考えを巡らして、書き綴っている」
line = "「これは『未来予想手帳』だ。私たちの将来に考えを巡らして、書き綴っている」"

[[dialogue]]
speaker = "ジュエリー"
# 「――ん、見てもいいのかって？」
line = "「――ん、見てもいいのかって？」"

[[dialogue]]
speaker = "ジュエリー"
# 「ふふっ、言っただろう？　<b>私たち</b>の将来のプランが書いてある、と」
line = "「ふふっ、言っただろう？　<b>私たち</b>の将来のプランが書いてある、と」"

[[dialogue]]
speaker = "ジュエリー"
# 「だから私は、キミにも見てほしいんだ。私が思い描いている、私たちの未来を」
line = "「だから私は、キミにも見てほしいんだ。私が思い描いている、私たちの未来を」"

[[dialogue]]
speaker = "ジュエリー"
# 「そうだな……ベタなところで言えば、子供の名前などを考えてみた」
line = "「そうだな……ベタなところで言えば、子供の名前などを考えてみた」"

[[dialogue]]
speaker = "ジュエリー"
# 「キミとの子供なら、名前の案はいくらでも出てくるんだが……いざ真剣に考えると、これがなかなか難しいものでね」
line = "「キミとの子供なら、名前の案はいくらでも出てくるんだが……いざ真剣に考えると、これがなかなか難しいものでね」"

[[dialogue]]
speaker = "ジュエリー"
# 「候補はいろいろ書き出しているが、一向に絞り切ることができない。むしろ日ごとに増えていくから困ったものだ」
line = "「候補はいろいろ書き出しているが、一向に絞り切ることができない。むしろ日ごとに増えていくから困ったものだ」"

[[dialogue]]
speaker = "ジュエリー"
# 「キミとの子どもならたくさん欲しいけれど……何人産むかは応相談かな。ふふっ<emoji=heart04>」
line = "「キミとの子どもならたくさん欲しいけれど……何人産むかは応相談かな。ふふっ<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
# 「あとは家の間取りも想像してみたんだ」
line = "「あとは家の間取りも想像してみたんだ」"

[[dialogue]]
speaker = "ジュエリー"
# 「子どもの人数にもよるだろうが、私としてはできるだけ広い家がいいな」
line = "「子どもの人数にもよるだろうが、私としてはできるだけ広い家がいいな」"

[[dialogue]]
speaker = "ジュエリー"
# 「とはいえ、流星市国でそれほど大きな家に住むのは難しいかもしれないから、助手さえよければイギリスの方で暮らしたり……そんなことも考えたりね」
line = "「とはいえ、流星市国でそれほど大きな家に住むのは難しいかもしれないから、助手さえよければイギリスの方で暮らしたり……そんなことも考えたりね」"

[[dialogue]]
speaker = "ジュエリー"
# 「ああ、もちろん全てを勝手に決めるつもりはないよ。だから……キミの意見もしっかり聞かせて欲しいんだ、我が助手」
line = "「ああ、もちろん全てを勝手に決めるつもりはないよ。だから……キミの意見もしっかり聞かせて欲しいんだ、我が助手」"

[[dialogue]]
speaker = "unk"
# 色々考えてくれてて嬉しいよ、ジュエリー
line = "色々考えてくれてて嬉しいよ、ジュエリー"

[[dialogue]]
speaker = "ジュエリー"
# 「キミとの理想の未来を想像することは、推理を組み立てているみたいで、とても楽しいんだ」
line = "「キミとの理想の未来を想像することは、推理を組み立てているみたいで、とても楽しいんだ」"

[[dialogue]]
speaker = "ジュエリー"
# 「思考の訓練にもなるし、今から考えておいて決して損にはならないからね」
line = "「思考の訓練にもなるし、今から考えておいて決して損にはならないからね」"

[[dialogue]]
speaker = "unk"
# 俺たちの将来設計だしな
line = "俺たちの将来設計だしな"

[[dialogue]]
speaker = "ジュエリー"
# 「ふふっ、そういうことだ」
line = "「ふふっ、そういうことだ」"

[[dialogue]]
speaker = "unk"
# と、手帳の内容を見ている内に、あるページが目に留まる。
line = "と、手帳の内容を見ている内に、あるページが目に留まる。"

[[dialogue]]
speaker = "ジュエリー"
# 「ああ、それは私の学園卒業後のことについてだよ」
line = "「ああ、それは私の学園卒業後のことについてだよ」"

[[dialogue]]
speaker = "ジュエリー"
# 「このまま探偵業を仕事として続けていくならば、ちゃんとした『探偵事務所』を構えるのも、選択肢の１つだろうと思ってね」
line = "「このまま探偵業を仕事として続けていくならば、ちゃんとした『探偵事務所』を構えるのも、選択肢の１つだろうと思ってね」"

[[dialogue]]
speaker = "ジュエリー"
# 「しかし……正直迷っている」
line = "「しかし……正直迷っている」"

[[dialogue]]
speaker = "ジュエリー"
# 「もし私が卒業後も探偵業を続けると言えば、キミはおそらく、助手として私を手伝う道を選ぶだろう？」
line = "「もし私が卒業後も探偵業を続けると言えば、キミはおそらく、助手として私を手伝う道を選ぶだろう？」"

[[dialogue]]
speaker = "ジュエリー"
# 「けれど私にとって……謎解きは『趣味』なんだ」
line = "「けれど私にとって……謎解きは『趣味』なんだ」"

[[dialogue]]
speaker = "ジュエリー"
# 「それを職業にして、キミに負担をかけるのは本意ではない」
line = "「それを職業にして、キミに負担をかけるのは本意ではない」"

[[dialogue]]
speaker = "unk"
# 負担……？
line = "負担……？"

[[dialogue]]
speaker = "ジュエリー"
# 「私は『名探偵』という選星者の能力の都合上、今まで『殺人事件』にも何度も遭遇してきた」
line = "「私は『名探偵』という選星者の能力の都合上、今まで『殺人事件』にも何度も遭遇してきた」"

[[dialogue]]
speaker = "ジュエリー"
# 「探偵の『<ruby=ごう>業</ruby>』というやつだ。当たり前だが……人の死体を見るのは気分のいいものではないし、犯人と対峙して危険に巻き込まれることも少なくない」
line = "「探偵の『<ruby>業<rt>ごう</rt></ruby>』というやつだ。当たり前だが……人の死体を見るのは気分のいいものではないし、犯人と対峙して危険に巻き込まれることも少なくない」"

[[dialogue]]
speaker = "ジュエリー"
# 「私は愛するキミがそんな目に遭うくらいなら……正直、探偵にならなくてもいいと思っている」
line = "「私は愛するキミがそんな目に遭うくらいなら……正直、探偵にならなくてもいいと思っている」"

[[dialogue]]
speaker = "unk"
# ジュエリーは探偵をするのは嫌？
line = "ジュエリーは探偵をするのは嫌？"

[[dialogue]]
speaker = "unk"
# 俺のことを抜きにして考えた時――
line = "俺のことを抜きにして考えた時――"

[[dialogue]]
speaker = "ジュエリー"
# 「それは……」
line = "「それは……」"

[[dialogue]]
speaker = "ジュエリー"
# 「……私は昔から、肌が弱い体質もあるし、ズボラな性格もあって、両親に迷惑をかけることが多かった」
line = "「……私は昔から、肌が弱い体質もあるし、ズボラな性格もあって、両親に迷惑をかけることが多かった」"

[[dialogue]]
speaker = "ジュエリー"
# 「人の役に立てることなんて、『謎解きが得意』なことくらいしかなかったんだ。幼い時はまだ星力にも目覚めていなかったしね」
line = "「人の役に立てることなんて、『謎解きが得意』なことくらいしかなかったんだ。幼い時はまだ星力にも目覚めていなかったしね」"

[[dialogue]]
speaker = "ジュエリー"
# 「だから、事件を解決し続ける内に、『日傘探偵』と呼ばれて、人々から頼られることが……とても嬉しくて、誇らしかった」
line = "「だから、事件を解決し続ける内に、『日傘探偵』と呼ばれて、人々から頼られることが……とても嬉しくて、誇らしかった」"

[[dialogue]]
speaker = "ジュエリー"
# 「自分の趣味で人の役に立てるというのは、本当に幸せなことだよ」
line = "「自分の趣味で人の役に立てるというのは、本当に幸せなことだよ」"

[[dialogue]]
speaker = "ジュエリー"
# 「『日傘探偵』という呼び名は、明解に換言するならば、私にとって――『誇り』なんだ」
line = "「『日傘探偵』という呼び名は、明解に換言するならば、私にとって――『誇り』なんだ」"

[[dialogue]]
speaker = "unk"
# 探偵が嫌じゃないなら、俺は続けてほしい
line = "探偵が嫌じゃないなら、俺は続けてほしい"

[[dialogue]]
speaker = "ジュエリー"
# 「……いいのかい？」
line = "「……いいのかい？」"

[[dialogue]]
speaker = "unk"
# 俺は頷く。
line = "俺は頷く。"

[[dialogue]]
speaker = "unk"
# ジュエリーが事件を解決する際に、真実を明かす時の姿は本当にカッコいいと、俺は心から思っている。
line = "ジュエリーが事件を解決する際に、真実を明かす時の姿は本当にカッコいいと、俺は心から思っている。"

[[dialogue]]
speaker = "unk"
# 『日傘探偵』は、俺にとっても誇りなんだ
line = "『日傘探偵』は、俺にとっても誇りなんだ"

[[dialogue]]
speaker = "ジュエリー"
# 「ああ……」
line = "「ああ……」"

[[dialogue]]
speaker = "ジュエリー"
# 「キミはいつだって、私を喜ばせる言葉をかけてくれる」
line = "「キミはいつだって、私を喜ばせる言葉をかけてくれる」"

[[dialogue]]
speaker = "ジュエリー"
# 「そうだね……わかるよ。私もキミの優しいところが好きだし、星徒会長として仕事する姿も、星騎士として戦う姿もカッコよくて……とても好きだ」
line = "「そうだね……わかるよ。私もキミの優しいところが好きだし、星徒会長として仕事する姿も、星騎士として戦う姿もカッコよくて……とても好きだ」"

[[dialogue]]
speaker = "ジュエリー"
# 「それと同じように、キミは探偵としての私も好いてくれているということなんだね」
line = "「それと同じように、キミは探偵としての私も好いてくれているということなんだね」"

[[dialogue]]
speaker = "unk"
# お互いの顔と顔の距離が、自然と近づく。
line = "お互いの顔と顔の距離が、自然と近づく。"

[[dialogue]]
speaker = "ジュエリー"
# 「……心から愛しているよ。我が助手<emoji=heart04>」
line = "「……心から愛しているよ。我が助手<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 静かに唇を重ねる。
line = "静かに唇を重ねる。"

[[dialogue]]
speaker = "unk"
# 柔らかく、確かめ合うような、甘いキス。
line = "柔らかく、確かめ合うような、甘いキス。"

[[dialogue]]
speaker = "ジュエリー"
# 「んっ……ちゅっ……<emoji=heart04>」
line = "「んっ……ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺も、世界で１番愛してるよ、ジュエリー
line = "俺も、世界で１番愛してるよ、ジュエリー"

[[dialogue]]
speaker = "ジュエリー"
# 「ふふっ……<emoji=heart04>　キミという『真実の愛』を見つけられて、私は幸せ者だ<emoji=heart04>」
line = "「ふふっ……<emoji=heart04>　キミという『真実の愛』を見つけられて、私は幸せ者だ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺にとってどんな宝石よりも価値のある笑顔で、ジュエリーが微笑む。
line = "俺にとってどんな宝石よりも価値のある笑顔で、ジュエリーが微笑む。"

[[dialogue]]
speaker = "ジュエリー"
# 「助手……ん……<emoji=heart04>　ちゅっ……ちゅっ……<emoji=heart04>」
line = "「助手……ん……<emoji=heart04>　ちゅっ……ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 温かな触れ合いの中で未来を想像しながら、俺たちはそっと寄り添い合うのだった。
line = "温かな触れ合いの中で未来を想像しながら、俺たちはそっと寄り添い合うのだった。"
