[[dialogue]]
speaker = "unk"
# モンスターの討伐が終わり、家に戻って花嫁修業を再開する。
line = "モンスターの討伐が終わり、家に戻って花嫁修業を再開する。"

[[dialogue]]
speaker = "イレーナ"
# 「さてと、それじゃ始めるとしましょうか」
line = "「さてと、それじゃ始めるとしましょうか」"

[[dialogue]]
speaker = "unk"
# 俺の部屋で何を……？
line = "俺の部屋で何を……？"

[[dialogue]]
speaker = "イレーナ"
# 「決まってるわ。掃除よ、お掃除」
line = "「決まってるわ。掃除よ、お掃除」"

[[dialogue]]
speaker = "イレーナ"
# 「あんたの部屋を隅から隅まで徹底的に綺麗にしてあげるわね」
line = "「あんたの部屋を隅から隅まで徹底的に綺麗にしてあげるわね」"

[[dialogue]]
speaker = "ジュエリー"
# 「おや？　我が助手よ、何やら少し緊張しているように見えるが？」
line = "「おや？　我が助手よ、何やら少し緊張しているように見えるが？」"

[[dialogue]]
speaker = "ジュエリー"
# 「もしかして、掃除の最中にあまり見られたくない物がポロリと出てきてしまうのを警戒しているのかな？」
line = "「もしかして、掃除の最中にあまり見られたくない物がポロリと出てきてしまうのを警戒しているのかな？」"

[[dialogue]]
speaker = "unk"
# そ、そんな物は持ってないよ……？
line = "そ、そんな物は持ってないよ……？"

[[dialogue]]
speaker = "ジュエリー"
# 「どうしたんだい愛しの我が助手よ？　まるで追い詰められた犯人のような目をして」
line = "「どうしたんだい愛しの我が助手よ？　まるで追い詰められた犯人のような目をして」"

[[dialogue]]
speaker = "ジュエリー"
# 「それではこの部屋にお宝が眠っていると自白しているようなものだ。ふふ、そんなにこの名探偵に秘密を暴いて欲しいのかい？」
line = "「それではこの部屋にお宝が眠っていると自白しているようなものだ。ふふ、そんなにこの名探偵に秘密を暴いて欲しいのかい？」"

[[dialogue]]
speaker = "イレーナ"
# 「手伝ってもらえるかしら、ジュエリー？」
line = "「手伝ってもらえるかしら、ジュエリー？」"

[[dialogue]]
speaker = "ジュエリー"
# 「もちろんだとも」
line = "「もちろんだとも」"

[[dialogue]]
speaker = "unk"
# ちょっと、２人ともーっ！！！
line = "ちょっと、２人ともーっ！！！"

[[dialogue]]
speaker = "イレーナ"
# 「どれどれ……」
line = "「どれどれ……」"

[[dialogue]]
speaker = "イレーナ"
# 「あれ、何も面白いものが見つからないわね。どうなってるのよ」
line = "「あれ、何も面白いものが見つからないわね。どうなってるのよ」"

[[dialogue]]
speaker = "ジュエリー"
# 「助手の隠し方が巧妙なのか、あるいはそういった物は隠されていないのか……」
line = "「助手の隠し方が巧妙なのか、あるいはそういった物は隠されていないのか……」"

[[dialogue]]
speaker = "ジュエリー"
# 「ふふ、怪盗でなくともお宝の在処が気になってしまうね」
line = "「ふふ、怪盗でなくともお宝の在処が気になってしまうね」"

[[dialogue]]
speaker = "イレーナ"
# 「まぁいいわ。どうせＤＩＳＣにでも入れてるんでしょ」
line = "「まぁいいわ。どうせＤＩＳＣにでも入れてるんでしょ」"

[[dialogue]]
speaker = "unk"
# （ギクッ）
line = "（ギクッ）"

[[dialogue]]
speaker = "イレーナ"
# 「それとはいこれ。ゴミ袋」
line = "「それとはいこれ。ゴミ袋」"

[[dialogue]]
speaker = "イレーナ"
# 「何キョトンとしてんのよ。妻が掃除したんなら、ゴミ出しは夫の仕事でしょ？　ゴミまとめといたから、これはあんたが出しときなさい」
line = "「何キョトンとしてんのよ。妻が掃除したんなら、ゴミ出しは夫の仕事でしょ？　ゴミまとめといたから、これはあんたが出しときなさい」"

[[dialogue]]
speaker = "unk"
# わかりました！
line = "わかりました！"

[[dialogue]]
speaker = "ジュエリー"
# 「ふふふ」
line = "「ふふふ」"

[[dialogue]]
speaker = "イレーナ"
# 「ん、どうしたの？」
line = "「ん、どうしたの？」"

[[dialogue]]
speaker = "ジュエリー"
# 「料理修行の時の畏まった様子が無くなって良い感じだ」
line = "「料理修行の時の畏まった様子が無くなって良い感じだ」"

[[dialogue]]
speaker = "イレーナ"
# 「そ、そう？」
line = "「そ、そう？」"

[[dialogue]]
speaker = "ジュエリー"
# 「いい具合に肩の力が抜けているように見える。助手とも自然に言葉を交わしていて……実に仲睦まじい夫婦のようだよ」
line = "「いい具合に肩の力が抜けているように見える。助手とも自然に言葉を交わしていて……実に仲睦まじい夫婦のようだよ」"

[[dialogue]]
speaker = "イレーナ"
# 「っっ……！！　へ、変なこと言わないでよ……！！」
line = "「っっ……！！　へ、変なこと言わないでよ……！！」"

[[dialogue]]
speaker = "ジュエリー"
# 「頬を赤く染めて可愛いじゃないか」
line = "「頬を赤く染めて可愛いじゃないか」"

[[dialogue]]
speaker = "イレーナ"
# 「だ、だってちゃんと花嫁らしくしないとウェディングフォームを解除出来ないんでしょ！」
line = "「だ、だってちゃんと花嫁らしくしないとウェディングフォームを解除出来ないんでしょ！」"

[[dialogue]]
speaker = "イレーナ"
# 「だから、仕方なく……って、あんたも何ニヤニヤしてるのよ！」
line = "「だから、仕方なく……って、あんたも何ニヤニヤしてるのよ！」"

[[dialogue]]
speaker = "unk"
# あ、フィオナから連絡だ
line = "あ、フィオナから連絡だ"

[[dialogue]]
speaker = "フィオナ"
# 『トワ先生から聞きました。ジュエリーさんにウェディングフォームが発現してしまったのですよね？』
line = "『トワ先生から聞きました。ジュエリーさんにウェディングフォームが発現してしまったのですよね？』"

[[dialogue]]
speaker = "フィオナ"
# 『何か私に協力できることがあればと思って連絡したのですが……』
line = "『何か私に協力できることがあればと思って連絡したのですが……』"

[[dialogue]]
speaker = "イレーナ"
# （協力できること、ね……そう言えばフィオナ会長はウェディングフォームが初めて発現した星騎士だったわ）
line = "（協力できること、ね……そう言えばフィオナ会長はウェディングフォームが初めて発現した星騎士だったわ）"

[[dialogue]]
speaker = "イレーナ"
# （会長を相手にして花嫁修業をしたという話も聞いてるし、話を聞くだけ聞いてみても──）
line = "（会長を相手にして花嫁修業をしたという話も聞いてるし、話を聞くだけ聞いてみても──）"

[[dialogue]]
speaker = "イレーナ"
# 「あっ！」
line = "「あっ！」"

[[dialogue]]
speaker = "unk"
# わわっ！？
line = "わわっ！？"

[[dialogue]]
speaker = "フィオナ"
# 『あの、今の叫び声は……何かありましたか？』
line = "『あの、今の叫び声は……何かありましたか？』"

[[dialogue]]
speaker = "イレーナ"
# 「フィオナ会長、イレーナです。実は助けていただきたいことがありまして」
line = "「フィオナ会長、イレーナです。実は助けていただきたいことがありまして」"

[[dialogue]]
speaker = "フィオナ"
# 『イレーナさん？　もしかしてイレーナさんもウェディングフォームが発現したんですか？』
line = "『イレーナさん？　もしかしてイレーナさんもウェディングフォームが発現したんですか？』"

[[dialogue]]
speaker = "イレーナ"
# 「はい、実はそうなんです」
line = "「はい、実はそうなんです」"

[[dialogue]]
speaker = "イレーナ"
# 「ウェディングフォームを解除するためには、花婿役を用意して結婚式を挙げる必要があります」
line = "「ウェディングフォームを解除するためには、花婿役を用意して結婚式を挙げる必要があります」"

[[dialogue]]
speaker = "イレーナ"
# 「ですが今回、私が花嫁になってしまったために、結婚式の神官役を務めることが出来なくなってしまったのです」
line = "「ですが今回、私が花嫁になってしまったために、結婚式の神官役を務めることが出来なくなってしまったのです」"

[[dialogue]]
speaker = "イレーナ"
# 「なので、フィオナ会長に神官役をお願いできないか、と思いまして……」
line = "「なので、フィオナ会長に神官役をお願いできないか、と思いまして……」"

[[dialogue]]
speaker = "フィオナ"
# 『神官役……ええ、大丈夫だと思います。私は流星教皇の娘ですし、挙式の手順も知っています』
line = "『神官役……ええ、大丈夫だと思います。私は流星教皇の娘ですし、挙式の手順も知っています』"

[[dialogue]]
speaker = "フィオナ"
# 『わかりました。そのお役目、お引き受けさせて頂きますね』
line = "『わかりました。そのお役目、お引き受けさせて頂きますね』"

[[dialogue]]
speaker = "イレーナ"
# 「よかった……心より感謝いたします……」
line = "「よかった……心より感謝いたします……」"

[[dialogue]]
speaker = "unk"
# こうして一番の問題だった神官役についても解決した。
line = "こうして一番の問題だった神官役についても解決した。"

[[dialogue]]
speaker = "unk"
# そしていよいよ、ウェディングフォーム解除に向けて、挙式の準備に取りかかるのだった。
line = "そしていよいよ、ウェディングフォーム解除に向けて、挙式の準備に取りかかるのだった。"
