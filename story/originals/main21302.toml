[[dialogue]]
speaker = "unk"
# 第２話,可能性の模索,B
line = "第２話,可能性の模索,B"

[[dialogue]]
speaker = "クロト"
# 「誰１人欠けることなくリクリエを止める。そんな未来を引き寄せることは……可能か？」
line = "「誰１人欠けることなくリクリエを止める。そんな未来を引き寄せることは……可能か？」"

[[dialogue]]
speaker = "unk"
# 俺の問いかけを業突く張りだと評すジグだったが──
line = "俺の問いかけを業突く張りだと評すジグだったが──"

[[dialogue]]
speaker = "ジグ"
# 「方法はなくもない──かもしれないね？」
line = "「方法はなくもない──かもしれないね？」"

[[dialogue]]
speaker = "クロト"
# 「本当か……！？」
line = "「本当か……！？」"

[[dialogue]]
speaker = "ジグ"
# 「あくまでもゼロではない、というだけの話だよ。可能性は１％にも満たないだろう」
line = "「あくまでもゼロではない、というだけの話だよ。可能性は１％にも満たないだろう」"

[[dialogue]]
speaker = "ジグ"
# 「天機の星眼は、ものや人に秘められた可能性を視通す。かつて視えていたアルタイルの破滅の未来は、アガサの覚醒によって変化した」
line = "「天機の星眼は、ものや人に秘められた可能性を視通す。かつて視えていたアルタイルの破滅の未来は、アガサの覚醒によって変化した」"

[[dialogue]]
speaker = "ジグ"
# 「けれど、世界の命運を左右するほどの劇的な変化というのは、当然、そうやすやすと起こるわけではない」
line = "「けれど、世界の命運を左右するほどの劇的な変化というのは、当然、そうやすやすと起こるわけではない」"

[[dialogue]]
speaker = "ジグ"
# 「可能性という言葉は一見、希望に満ちているように聞こえるけれど……何事にも限界はある」
line = "「可能性という言葉は一見、希望に満ちているように聞こえるけれど……何事にも限界はある」"

[[dialogue]]
speaker = "ジグ"
# 「人間は鳥のように空は飛べない。魚のように水中で呼吸はできない。私の星眼は、観測する対象が持つ潜在能力から、実現する可能性を先読みするだけだ」
line = "「人間は鳥のように空は飛べない。魚のように水中で呼吸はできない。私の星眼は、観測する対象が持つ潜在能力から、実現する可能性を先読みするだけだ」"

[[dialogue]]
speaker = "ジグ"
# 「本当に起こせるのかい？　アガサのような……実は守護天使様がその身に宿っていただなんて、チートみたいなちゃぶ台返しをもう一度」
line = "「本当に起こせるのかい？　アガサのような……実は守護天使様がその身に宿っていただなんて、チートみたいなちゃぶ台返しをもう一度」"

[[dialogue]]
speaker = "ジグ"
# 「奇跡っていうのは、二度も三度も起こらないから奇跡と呼ぶ。そういうものなんじゃないかな？」
line = "「奇跡っていうのは、二度も三度も起こらないから奇跡と呼ぶ。そういうものなんじゃないかな？」"

[[dialogue]]
speaker = "クロト"
# 「…………それでも」
line = "「…………それでも」"

[[dialogue]]
speaker = "梨緒"
# 「──それでも足掻かない理由にはならない」
line = "「──それでも足掻かない理由にはならない」"

[[dialogue]]
speaker = "ジグ"
# 「アガサ……いつからそこにいたのかな」
line = "「アガサ……いつからそこにいたのかな」"

[[dialogue]]
speaker = "梨緒"
# 「これでも選管の委員長だからな。入ったばかりの新人がふらっとどこかに消えたら、探すのが私の役目だ」
line = "「これでも選管の委員長だからな。入ったばかりの新人がふらっとどこかに消えたら、探すのが私の役目だ」"

[[dialogue]]
speaker = "梨緒"
# 「……魔王、話は聞いた。私も君と同じ気持ちだ」
line = "「……魔王、話は聞いた。私も君と同じ気持ちだ」"

[[dialogue]]
speaker = "梨緒"
# 「気に入らない未来があるのであれば、それを変えるために足掻く……私たち星騎士は、いつだってそうやって戦ってきた」
line = "「気に入らない未来があるのであれば、それを変えるために足掻く……私たち星騎士は、いつだってそうやって戦ってきた」"

[[dialogue]]
speaker = "梨緒"
# 「望ましい未来のために、二度目の奇跡を起こす必要があるのなら──そうするだけだ」
line = "「望ましい未来のために、二度目の奇跡を起こす必要があるのなら──そうするだけだ」"

[[dialogue]]
speaker = "梨緒"
# 「ジグが視ているのは、厳密には『未来そのもの』ではなく、潜在能力と可能性なんだろう？」
line = "「ジグが視ているのは、厳密には『未来そのもの』ではなく、潜在能力と可能性なんだろう？」"

[[dialogue]]
speaker = "梨緒"
# 「であれば、我々のうちの誰かに宿る潜在能力に劇的な変化があるか、世界の命運を変えるほどの選択をすれば、未来は変わる」
line = "「であれば、我々のうちの誰かに宿る潜在能力に劇的な変化があるか、世界の命運を変えるほどの選択をすれば、未来は変わる」"

[[dialogue]]
speaker = "ジグ"
# 「簡単に言うねぇ。具体的なプランはあるのかい？」
line = "「簡単に言うねぇ。具体的なプランはあるのかい？」"

[[dialogue]]
speaker = "梨緒"
# 「……はっきりとはない。だから『足掻く』と言ったんだ」
line = "「……はっきりとはない。だから『足掻く』と言ったんだ」"

[[dialogue]]
speaker = "梨緒"
# 「まだできるアプローチはある。そうだろう、魔王？」
line = "「まだできるアプローチはある。そうだろう、魔王？」"

[[dialogue]]
speaker = "クロト"
# 「ああ。さっきメルエルとナターシャに、天界への増援要請を送った。じきに魔界にも協力を仰ぐ」
line = "「ああ。さっきメルエルとナターシャに、天界への増援要請を送った。じきに魔界にも協力を仰ぐ」"

[[dialogue]]
speaker = "クロト"
# 「それだけじゃない。ネビュラの魔女。コラプサー。<ruby=ざいや>在野</ruby>にいる星術使い……俺が知りうる、三界すべての戦力を人間界に集める」
line = "「それだけじゃない。ネビュラの魔女。コラプサー。<ruby>在野<rt>ざいや</rt></ruby>にいる星術使い……俺が知りうる、三界すべての戦力を人間界に集める」"

[[dialogue]]
speaker = "ジグ"
# 「戦力の補強は必須だろうね。だがルヴィネとディザスターハンドを相手に、ただの星騎士がいくらいたところで烏合の衆だ」
line = "「戦力の補強は必須だろうね。だがルヴィネとディザスターハンドを相手に、ただの星騎士がいくらいたところで烏合の衆だ」"

[[dialogue]]
speaker = "クロト"
# 「だけど人が集まれば、それだけ可能性は増える。望ましい未来を見つけられるかもしれない」
line = "「だけど人が集まれば、それだけ可能性は増える。望ましい未来を見つけられるかもしれない」"

[[dialogue]]
speaker = "ジグ"
# 「女神ルヴィネを討つ……それでリクリエが止まる確証はないけれど、彼女を倒す可能性そのものは見えているんだ」
line = "「女神ルヴィネを討つ……それでリクリエが止まる確証はないけれど、彼女を倒す可能性そのものは見えているんだ」"

[[dialogue]]
speaker = "ジグ"
# 「それによって、次の３０００年を買う、その猶予が手に入る可能性に賭けることはできないのかい？」
line = "「それによって、次の３０００年を買う、その猶予が手に入る可能性に賭けることはできないのかい？」"

[[dialogue]]
speaker = "クロト"
# 「すまないが、できない」
line = "「すまないが、できない」"

[[dialogue]]
speaker = "クロト"
# 「次の３０００年という猶予が手に入る確証もなければ、『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』に挑む機会が二度ある保証もない」
line = "「次の３０００年という猶予が手に入る確証もなければ、『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』に挑む機会が二度ある保証もない」"

[[dialogue]]
speaker = "クロト"
# 「俺はここで、リクリエという仕組みそのものを完全に終わらせたい」
line = "「俺はここで、リクリエという仕組みそのものを完全に終わらせたい」"

[[dialogue]]
speaker = "ジグ"
# 「それはつまり、ルヴィネではなく『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』を討ちたい、ということかな？」
line = "「それはつまり、ルヴィネではなく『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』を討ちたい、ということかな？」"

[[dialogue]]
speaker = "クロト"
# 「これは俺個人の考えなんだが……必ずしも『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』を倒す必要はないと思っているんだ」
line = "「これは俺個人の考えなんだが……必ずしも『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』を倒す必要はないと思っているんだ」"

[[dialogue]]
speaker = "クロト"
# 「『何度も世界をやり直すことで、生命や文明の発展をより効率化させること』がリクリエの目的であることはわかっている」
line = "「『何度も世界をやり直すことで、生命や文明の発展をより効率化させること』がリクリエの目的であることはわかっている」"

[[dialogue]]
speaker = "クロト"
# 「『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』がこの機構を生み出したのであれば、実は俺たちと『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』の間には交渉の余地があるかもしれない」
line = "「『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』がこの機構を生み出したのであれば、実は俺たちと『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』の間には交渉の余地があるかもしれない」"

[[dialogue]]
speaker = "クロト"
# 「相手は神であるが故に、俺たちとは恐らくものを考える尺度が違う」
line = "「相手は神であるが故に、俺たちとは恐らくものを考える尺度が違う」"

[[dialogue]]
speaker = "クロト"
# 「俺たちが理不尽に感じていることを、『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』は特に理不尽とも思っていない可能性がある」
line = "「俺たちが理不尽に感じていることを、『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』は特に理不尽とも思っていない可能性がある」"

[[dialogue]]
speaker = "クロト"
# 「……そこでルヴィネの存在が必要になるんだ」
line = "「……そこでルヴィネの存在が必要になるんだ」"

[[dialogue]]
speaker = "クロト"
# 「どの程度会話の通じる相手かはわからない。だけど、ルヴィネであればその『声』は神に届く」
line = "「どの程度会話の通じる相手かはわからない。だけど、ルヴィネであればその『声』は神に届く」"

[[dialogue]]
speaker = "クロト"
# 「俺たちヒトの論理を神に届けて、リクリエがなくとも世界が進歩しうることを訴える必要がある」
line = "「俺たちヒトの論理を神に届けて、リクリエがなくとも世界が進歩しうることを訴える必要がある」"

[[dialogue]]
speaker = "ジグ"
# 「『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』はそこまで会話の通じる相手ではないと思うよ。使徒の扱いを見ればわかるだろう？」
line = "「『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』はそこまで会話の通じる相手ではないと思うよ。使徒の扱いを見ればわかるだろう？」"

[[dialogue]]
speaker = "クロト"
# 「当然、その場合は戦い抜くだけだ」
line = "「当然、その場合は戦い抜くだけだ」"

[[dialogue]]
speaker = "ジグ"
# 「ふむ。君の意志は固いようだね」
line = "「ふむ。君の意志は固いようだね」"

[[dialogue]]
speaker = "ジグ"
# 「だけど本当に大丈夫かい？　君が途中で心折れてしまったりしたら、アルタイルは終わりだよ？」
line = "「だけど本当に大丈夫かい？　君が途中で心折れてしまったりしたら、アルタイルは終わりだよ？」"

[[dialogue]]
speaker = "クロト"
# 「俺は折れない。支えてくれる仲間がいるかぎり。それに……」
line = "「俺は折れない。支えてくれる仲間がいるかぎり。それに……」"

[[dialogue]]
speaker = "ジグ"
# 「……私とは違う、と？」
line = "「……私とは違う、と？」"

[[dialogue]]
speaker = "クロト"
# 「ああ。俺はジグと違って、未来が直接視えるわけじゃない。持たざる者だからこそ抱ける蛮勇ってやつだ」
line = "「ああ。俺はジグと違って、未来が直接視えるわけじゃない。持たざる者だからこそ抱ける蛮勇ってやつだ」"

[[dialogue]]
speaker = "クロト"
# 「アルタイルには、ベガの生き残りも、デネブの人達もいる。３つの平行世界の住人たちで手を取り合えば、きっと奇跡を起こせる。そう信じている」
line = "「アルタイルには、ベガの生き残りも、デネブの人達もいる。３つの平行世界の住人たちで手を取り合えば、きっと奇跡を起こせる。そう信じている」"

[[dialogue]]
speaker = "ジグ"
# 「うーん……強気というか、呑気というか……あるいは、一度世界を救ったからこその余裕なのかな」
line = "「うーん……強気というか、呑気というか……あるいは、一度世界を救ったからこその余裕なのかな」"

[[dialogue]]
speaker = "ジグ"
# 「ひとまず君の覚悟は理解した。じゃあもっと具体的な話をしようか」
line = "「ひとまず君の覚悟は理解した。じゃあもっと具体的な話をしようか」"

[[dialogue]]
speaker = "ジグ"
# 「ルヴィネを仲間に引き入れるには、極星学園星徒会の協力が欠かせない。彼女たちをどう説得するつもりだい？」
line = "「ルヴィネを仲間に引き入れるには、極星学園星徒会の協力が欠かせない。彼女たちをどう説得するつもりだい？」"

[[dialogue]]
speaker = "クロト"
# 「……ルヴィネが亡くなってしまう未来を、そのまま伝えようと思う」
line = "「……ルヴィネが亡くなってしまう未来を、そのまま伝えようと思う」"

[[dialogue]]
speaker = "ジグ"
# 「難しいと思うけどね。特にあの天使の子は、ルヴィネに心酔しきっているようだし」
line = "「難しいと思うけどね。特にあの天使の子は、ルヴィネに心酔しきっているようだし」"

[[dialogue]]
speaker = "梨緒"
# 「……レティシアか。アポロから話は聞いている。相当、頭が硬いらしいな」
line = "「……レティシアか。アポロから話は聞いている。相当、頭が硬いらしいな」"

[[dialogue]]
speaker = "ジグ"
# 「敵である緋宮クロトから、ルヴィネ死亡の未来を聞いて……はいそうですかと、協力してくれるとはとても思えないね」
line = "「敵である緋宮クロトから、ルヴィネ死亡の未来を聞いて……はいそうですかと、協力してくれるとはとても思えないね」"

[[dialogue]]
speaker = "クロト"
# 「……難しいことは、わかっているさ」
line = "「……難しいことは、わかっているさ」"

[[dialogue]]
speaker = "unk"
# それでも俺は諦めない。諦めたくない。俺はデネブの彼女たちに示したいんだ。
line = "それでも俺は諦めない。諦めたくない。俺はデネブの彼女たちに示したいんだ。"

[[dialogue]]
speaker = "unk"
# 『緋宮クロト』は、世界が変わっても君たちの味方なんだってことを。
line = "『緋宮クロト』は、世界が変わっても君たちの味方なんだってことを。"

[[dialogue]]
speaker = "unk"
# それからすぐ後、俺は星徒会のメンバーとベアトリスを呼び出した。
line = "それからすぐ後、俺は星徒会のメンバーとベアトリスを呼び出した。"

[[dialogue]]
speaker = "unk"
# そして、ジグの星眼によってルヴィネが死亡する未来を視たことを、告げた──
line = "そして、ジグの星眼によってルヴィネが死亡する未来を視たことを、告げた──"

[[dialogue]]
speaker = "ベアトリス"
# 「…………そんな。ル、ルヴィがっ……嘘……や、やだ……やだよ……」
line = "「…………そんな。ル、ルヴィがっ……嘘……や、やだ……やだよ……」"

[[dialogue]]
speaker = "梨緒"
# 「ベアト、落ち着け……魔王の話はまだ終わりじゃない」
line = "「ベアト、落ち着け……魔王の話はまだ終わりじゃない」"

[[dialogue]]
speaker = "ベアトリス"
# 「り、梨緒ちゃん……ごめん、そうだよね。ただちょっと、びっくりしちゃったっていうか……」
line = "「り、梨緒ちゃん……ごめん、そうだよね。ただちょっと、びっくりしちゃったっていうか……」"

[[dialogue]]
speaker = "クロト"
# 「いきなりですまない。でも、俺はこの未来を否定したい」
line = "「いきなりですまない。でも、俺はこの未来を否定したい」"

[[dialogue]]
speaker = "クロト"
# 「俺たち星騎士の使命は、リクリエを防ぐことだ」
line = "「俺たち星騎士の使命は、リクリエを防ぐことだ」"

[[dialogue]]
speaker = "クロト"
# 「今現在、ルヴィネと対立はしているけれど……リクリエを起こそうとしているのは『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』だ」
line = "「今現在、ルヴィネと対立はしているけれど……リクリエを起こそうとしているのは『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』だ」"

[[dialogue]]
speaker = "クロト"
# 「ルヴィネを倒すことは、勝利する条件でも目的でもない」
line = "「ルヴィネを倒すことは、勝利する条件でも目的でもない」"

[[dialogue]]
speaker = "クロト"
# 「ルヴィネは『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』に繋がる手がかりだ……『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』と戦うにせよ交渉するにせよ、ルヴィネには生きていてもらいたい」
line = "「ルヴィネは『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』に繋がる手がかりだ……『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』と戦うにせよ交渉するにせよ、ルヴィネには生きていてもらいたい」"

[[dialogue]]
speaker = "ベアトリス"
# 「…………う、うん」
line = "「…………う、うん」"

[[dialogue]]
speaker = "クロト"
# 「それにルヴィネは、極星学園みんなの親友だ。俺たちの仲間の、大切な親友を倒す未来は……明確に否定したい」
line = "「それにルヴィネは、極星学園みんなの親友だ。俺たちの仲間の、大切な親友を倒す未来は……明確に否定したい」"

[[dialogue]]
speaker = "ベアトリス"
# 「会長さん……！」
line = "「会長さん……！」"

[[dialogue]]
speaker = "クロト"
# 「どうだろう、星徒会のみんな。意見を聞かせてくれ」
line = "「どうだろう、星徒会のみんな。意見を聞かせてくれ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロトの意見に賛成よ！」
line = "「クロトの意見に賛成よ！」"

[[dialogue]]
speaker = "サーシャ"
# 「いいんじゃないかしら～♪」
line = "「いいんじゃないかしら～♪」"

[[dialogue]]
speaker = "マトイ"
# 「会長らしい決断だと思うよ。私も力になる！」
line = "「会長らしい決断だと思うよ。私も力になる！」"

[[dialogue]]
speaker = "アナ"
# 「ルヴィネさんを打倒しても、新しい女神が出てくる可能性は大いにあるでしょう。私も賛成です」
line = "「ルヴィネさんを打倒しても、新しい女神が出てくる可能性は大いにあるでしょう。私も賛成です」"

[[dialogue]]
speaker = "ベアトリス"
# 「みんな……あ、ありがとうっ！」
line = "「みんな……あ、ありがとうっ！」"

[[dialogue]]
speaker = "ジグ"
# 「やっぱりこうなるんだ。魔王と話した時からそんな気はしていたけど」
line = "「やっぱりこうなるんだ。魔王と話した時からそんな気はしていたけど」"

[[dialogue]]
speaker = "梨緒"
# 「賛成多数で可決だな。ジグ、君にも励んでもらうぞ」
line = "「賛成多数で可決だな。ジグ、君にも励んでもらうぞ」"

[[dialogue]]
speaker = "ジグ"
# 「まぁ了解。私なりに最善を尽くすよ」
line = "「まぁ了解。私なりに最善を尽くすよ」"

[[dialogue]]
speaker = "ジグ"
# 「まったく、今代の魔王様は強欲だね……」
line = "「まったく、今代の魔王様は強欲だね……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「いいじゃない！　クロトは魔王なんだもの、世界一欲張りなくらいじゃないと！」
line = "「いいじゃない！　クロトは魔王なんだもの、世界一欲張りなくらいじゃないと！」"

[[dialogue]]
speaker = "アナ"
# 「しかし会長。方針は理解できましたが、実際どのように動きますか？」
line = "「しかし会長。方針は理解できましたが、実際どのように動きますか？」"

[[dialogue]]
speaker = "マトイ"
# 「姫咲さんたちが天界から応援を連れてくるまで、少しの時間はあると思うけど……」
line = "「姫咲さんたちが天界から応援を連れてくるまで、少しの時間はあると思うけど……」"

[[dialogue]]
speaker = "クロト"
# 「ああ。戦力が集まり次第、転送装置を使ってデネブに乗り込む予定だが……決行までの時間を大切に使おう」
line = "「ああ。戦力が集まり次第、転送装置を使ってデネブに乗り込む予定だが……決行までの時間を大切に使おう」"

[[dialogue]]
speaker = "クロト"
# 「具体的な方法論としては……極星星徒会の全員に同じことを話して、信用してもらう」
line = "「具体的な方法論としては……極星星徒会の全員に同じことを話して、信用してもらう」"

[[dialogue]]
speaker = "サーシャ"
# 「できるかしら？　みんながみんな、ベアトリスちゃんみたいに素直な子ってわけじゃないし……」
line = "「できるかしら？　みんながみんな、ベアトリスちゃんみたいに素直な子ってわけじゃないし……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「大丈夫よ。クロトが真剣に話したら、みんなきっと信じてくれるわ！」
line = "「大丈夫よ。クロトが真剣に話したら、みんなきっと信じてくれるわ！」"

[[dialogue]]
speaker = "アナ"
# 「私は……難しいと思います」
line = "「私は……難しいと思います」"

[[dialogue]]
speaker = "アナ"
# 「ルヴィネさんが死ぬ未来を視ただなんて……アルタイル側に懐柔するための嘘だと断じられ、さらに溝が深まるかもしれません」
line = "「ルヴィネさんが死ぬ未来を視ただなんて……アルタイル側に懐柔するための嘘だと断じられ、さらに溝が深まるかもしれません」"

[[dialogue]]
speaker = "マトイ"
# 「そうだね。それにジグさんの星眼のビジョンは、証拠も根拠も出せないし……言葉だけで説得なんて、できるのかな？」
line = "「そうだね。それにジグさんの星眼のビジョンは、証拠も根拠も出せないし……言葉だけで説得なんて、できるのかな？」"

[[dialogue]]
speaker = "アナ"
# 「なんにせよ、チナさんたちにもっと心を開いてもらわなければいけません」
line = "「なんにせよ、チナさんたちにもっと心を開いてもらわなければいけません」"

[[dialogue]]
speaker = "クロト"
# 「ああ。それについてなんだけど、こんなアプローチはどうかな……？」
line = "「ああ。それについてなんだけど、こんなアプローチはどうかな……？」"
