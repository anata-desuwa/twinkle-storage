[[dialogue]]
speaker = "シャロン"
# 「……そうですか。会長さまは以前からイレーナさまのお心を知っておられたのですね……」
line = "「……そうですか。会長さまは以前からイレーナさまのお心を知っておられたのですね……」"

[[dialogue]]
speaker = "シャロン"
# 「イレーナさまは、女神様よりお力を賜ったことで、聖女として称えられるようになって……」
line = "「イレーナさまは、女神様よりお力を賜ったことで、聖女として称えられるようになって……」"

[[dialogue]]
speaker = "シャロン"
# 「私のように女神様のお慈悲に救われたわけでも、女神様への信仰を支えにしていたわけでもなく、むしろ女神様のことを……」
line = "「私のように女神様のお慈悲に救われたわけでも、女神様への信仰を支えにしていたわけでもなく、むしろ女神様のことを……」"

[[dialogue]]
speaker = "シャロン"
# 「私……何も知りませんでした。イレーナさまのご事情も、イレーナさまのお心も……」
line = "「私……何も知りませんでした。イレーナさまのご事情も、イレーナさまのお心も……」"

[[dialogue]]
speaker = "シャロン"
# 「きっと私は知らず知らずの間にイレーナさまを傷つけてしまっていたのですね」
line = "「きっと私は知らず知らずの間にイレーナさまを傷つけてしまっていたのですね」"

[[dialogue]]
speaker = "シャロン"
# 「だからあのようなイレーナさまらしくもない口汚いお言葉を……」
line = "「だからあのようなイレーナさまらしくもない口汚いお言葉を……」"

[[dialogue]]
speaker = "unk"
# いや、あれはあっちが素
line = "いや、あれはあっちが素"

[[dialogue]]
speaker = "シャロン"
# 「えっ？　そうなの、ですか？　聖職者があのような品のないお言葉遣いを？　え？　え？　ほ、本当にそのようなことが……？」
line = "「えっ？　そうなの、ですか？　聖職者があのような品のないお言葉遣いを？　え？　え？　ほ、本当にそのようなことが……？」"

[[dialogue]]
speaker = "unk"
# ショックを受けるのそこなんだ……
line = "ショックを受けるのそこなんだ……"

[[dialogue]]
speaker = "シャロン"
# 「い、いえっ。お言葉遣いも一人一人の個性を表すものでありますから。他人がどうこう指摘して良いものではありませんっ」
line = "「い、いえっ。お言葉遣いも一人一人の個性を表すものでありますから。他人がどうこう指摘して良いものではありませんっ」"

[[dialogue]]
speaker = "シャロン"
# 「それよりもイレーナさまに謝罪を……！！」
line = "「それよりもイレーナさまに謝罪を……！！」"

[[dialogue]]
speaker = "unk"
# ひとまず俺が様子を見てくるよ
line = "ひとまず俺が様子を見てくるよ"

[[dialogue]]
speaker = "シャロン"
# 「ですが──……いえ、わかりました」
line = "「ですが──……いえ、わかりました」"

[[dialogue]]
speaker = "シャロン"
# 「会長さま。どうかイレーナさまをお願いいたします」
line = "「会長さま。どうかイレーナさまをお願いいたします」"

[[dialogue]]
speaker = "イレーナ"
# 「はぁ……。やっちゃったわ……」
line = "「はぁ……。やっちゃったわ……」"

[[dialogue]]
speaker = "イレーナ"
# 「……なによ。来たのあんた」
line = "「……なによ。来たのあんた」"

[[dialogue]]
speaker = "イレーナ"
# 「別に後悔なんかしてないわよ。むしろ言いたいことが言えてスッキリしたわ。ぶっちゃけあの子、ずっとうざったかったのよね」
line = "「別に後悔なんかしてないわよ。むしろ言いたいことが言えてスッキリしたわ。ぶっちゃけあの子、ずっとうざったかったのよね」"

[[dialogue]]
speaker = "イレーナ"
# 「事あるごとに女神様ー女神様ーってバカのひとつ覚えみたいに言っちゃってさ。これだから敬虔な信徒ってヤツは……」
line = "「事あるごとに女神様ー女神様ーってバカのひとつ覚えみたいに言っちゃってさ。これだから敬虔な信徒ってヤツは……」"

[[dialogue]]
speaker = "イレーナ"
# 「ま、どのみちあたしは終わりね。ひた隠しにしてきた性根も、信仰心がないこともバレちゃったし」
line = "「ま、どのみちあたしは終わりね。ひた隠しにしてきた性根も、信仰心がないこともバレちゃったし」"

[[dialogue]]
speaker = "イレーナ"
# 「あの子があたしのことを触れ回れば、今の立場からも下ろされるでしょうね。ふふ、もう二度と面倒臭い人助けもしなくて済むってわけじゃない♪」
line = "「あの子があたしのことを触れ回れば、今の立場からも下ろされるでしょうね。ふふ、もう二度と面倒臭い人助けもしなくて済むってわけじゃない♪」"

[[dialogue]]
speaker = "unk"
# 本当にそれでいいのか？
line = "本当にそれでいいのか？"

[[dialogue]]
speaker = "イレーナ"
# 「いいわよ。むしろせいせいするわ。やっと普通の女の子に戻れるんだもの」
line = "「いいわよ。むしろせいせいするわ。やっと普通の女の子に戻れるんだもの」"

[[dialogue]]
speaker = "unk"
# でも──
line = "でも──"

[[dialogue]]
speaker = "イレーナ"
# 「うっさいわね！　じゃあ何？　あたしはずっと『聖女サマ』を演じ続けてろってのっ？」
line = "「うっさいわね！　じゃあ何？　あたしはずっと『聖女サマ』を演じ続けてろってのっ？」"

[[dialogue]]
speaker = "イレーナ"
# 「誰にも素顔を見せないまま、好きなこともできずに女神サマとやらに使い潰されてればいいのっ？」
line = "「誰にも素顔を見せないまま、好きなこともできずに女神サマとやらに使い潰されてればいいのっ？」"

[[dialogue]]
speaker = "イレーナ"
# 「そんなの嫌よ。あたしは聖女になるために生まれてきたわけじゃないっ。女神サマのために生きるつもりもない……！」
line = "「そんなの嫌よ。あたしは聖女になるために生まれてきたわけじゃないっ。女神サマのために生きるつもりもない……！」"

[[dialogue]]
speaker = "シャロン"
# 「──イレーナさまっ！」
line = "「──イレーナさまっ！」"

[[dialogue]]
speaker = "イレーナ"
# 「ひゃっ！？　シャ、シャロン！？」
line = "「ひゃっ！？　シャ、シャロン！？」"

[[dialogue]]
speaker = "シャロン"
# 「ずっと、ひっく、たった一人でそのように苦しんでおられたのですね……！」
line = "「ずっと、ひっく、たった一人でそのように苦しんでおられたのですね……！」"

[[dialogue]]
speaker = "シャロン"
# 「今までお気持ちに寄り添うこともできず、申し訳ございませんでした……！　シスターとして不徳を恥じるばかりです……！」
line = "「今までお気持ちに寄り添うこともできず、申し訳ございませんでした……！　シスターとして不徳を恥じるばかりです……！」"

[[dialogue]]
speaker = "イレーナ"
# 「いきなり出てきて何泣いてるのよ……！　離れなさいってば、暑苦しいじゃない……！」
line = "「いきなり出てきて何泣いてるのよ……！　離れなさいってば、暑苦しいじゃない……！」"

[[dialogue]]
speaker = "シャロン"
# 「申し訳ございません。どうしてもイレーナさまのことが気になって、こっそりと聞き耳を立ててしまいました……」
line = "「申し訳ございません。どうしてもイレーナさまのことが気になって、こっそりと聞き耳を立ててしまいました……」"

[[dialogue]]
speaker = "シャロン"
# 「ですがご安心ください。ご事情は理解しました。私、教皇庁に掛け合ってみますっ！」
line = "「ですがご安心ください。ご事情は理解しました。私、教皇庁に掛け合ってみますっ！」"

[[dialogue]]
speaker = "イレーナ"
# 「はぁっ？　掛け合うってまさか……」
line = "「はぁっ？　掛け合うってまさか……」"

[[dialogue]]
speaker = "シャロン"
# 「もちろん、イレーナさまが無事に神官を離任できるようにですっ。どうか私にお任せくださいっ」
line = "「もちろん、イレーナさまが無事に神官を離任できるようにですっ。どうか私にお任せくださいっ」"

[[dialogue]]
speaker = "イレーナ"
# 「そ、そう……勝手にすればいいけど……」
line = "「そ、そう……勝手にすればいいけど……」"

[[dialogue]]
speaker = "シャロン"
# 「イレーナさま……？　聖女をお辞めになりたいというお話ではなかったのですか……？」
line = "「イレーナさま……？　聖女をお辞めになりたいというお話ではなかったのですか……？」"

[[dialogue]]
speaker = "イレーナ"
# 「っ……違わない、けど」
line = "「っ……違わない、けど」"

[[dialogue]]
speaker = "シャロン"
# 「ご安心ください。もう二度とイレーナさまがお心を患わせることはありません。教皇庁へはうまくお話を通してみせますから」
line = "「ご安心ください。もう二度とイレーナさまがお心を患わせることはありません。教皇庁へはうまくお話を通してみせますから」"

[[dialogue]]
speaker = "イレーナ"
# 「それはいいけど……他に言うことないの？」
line = "「それはいいけど……他に言うことないの？」"

[[dialogue]]
speaker = "シャロン"
# 「？？？　他に、とは？」
line = "「？？？　他に、とは？」"

[[dialogue]]
speaker = "イレーナ"
# 「あたしはエセ聖女だったのよ。あんたのことも、他のみんなのこともずっと騙していたの」
line = "「あたしはエセ聖女だったのよ。あんたのことも、他のみんなのこともずっと騙していたの」"

[[dialogue]]
speaker = "イレーナ"
# 「さも善人のように振る舞って、偽りの信仰を騙って、聖女の役目なんて面倒臭いって思ってるような女なのよ？」
line = "「さも善人のように振る舞って、偽りの信仰を騙って、聖女の役目なんて面倒臭いって思ってるような女なのよ？」"

[[dialogue]]
speaker = "イレーナ"
# 「あたしはあんたたちの信仰をバカにしてるのよ？　許せないんじゃないの？　内心はらわた煮えくりかえってるんじゃないの？」
line = "「あたしはあんたたちの信仰をバカにしてるのよ？　許せないんじゃないの？　内心はらわた煮えくりかえってるんじゃないの？」"

[[dialogue]]
speaker = "シャロン"
# 「いえ、私は──」
line = "「いえ、私は──」"

