[[dialogue]]
speaker = "unk"
# 第５話,ルヴィネの実力,B
line = "第５話,ルヴィネの実力,B"

[[dialogue]]
speaker = "クロト"
# 「マトイ！　繋げろ──今だ！！」
line = "「マトイ！　繋げろ──今だ！！」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「うんっ！　リフレクトゴッデスカリバー！！」
line = "「うんっ！　リフレクトゴッデスカリバー！！」"

[[dialogue]]
speaker = "ジグ"
# 「やり直せばいいのに……世界は滅びるしかないんだから……」
line = "「やり直せばいいのに……世界は滅びるしかないんだから……」"

[[dialogue]]
speaker = "unk"
# いかに強力な能力の使い手とは言え、本物には劣る……死線を何度も潜り抜けてきた俺たちの方に分がある！
line = "いかに強力な能力の使い手とは言え、本物には劣る……死線を何度も潜り抜けてきた俺たちの方に分がある！"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「事象凍結！　──アナちゃん、トドメよ！」
line = "「事象凍結！　──アナちゃん、トドメよ！」"

[[dialogue]]
speaker = "アナ（覚醒）"
# 「了解──ラヴァーレッド・シグマ！！」
line = "「了解──ラヴァーレッド・シグマ！！」"

[[dialogue]]
speaker = "アポロ"
# 「諦めたら、楽になれるのに……」
line = "「諦めたら、楽になれるのに……」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「う～っ……これ本当に６割程度なの！？　めちゃくちゃ手強かったわ！！」
line = "「う～っ……これ本当に６割程度なの！？　めちゃくちゃ手強かったわ！！」"

[[dialogue]]
speaker = "クロト"
# 「みんなお疲れ様。ノヴァフォームの起動時間は、まだ残ってるな？」
line = "「みんなお疲れ様。ノヴァフォームの起動時間は、まだ残ってるな？」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「もちろん。私たちもずっと訓練、続けてきたからね！」
line = "「もちろん。私たちもずっと訓練、続けてきたからね！」"

[[dialogue]]
speaker = "アナ（覚醒）"
# 「消耗は軽微。ルヴィネさんと戦うにあたって、まだ十分に余力はあります」
line = "「消耗は軽微。ルヴィネさんと戦うにあたって、まだ十分に余力はあります」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「極星学園のみんなは頂上にたどり着けてるかしら？　急がないと──っ！？」
line = "「極星学園のみんなは頂上にたどり着けてるかしら？　急がないと──っ！？」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「あ～もうっ……おかわりってこと！？」
line = "「あ～もうっ……おかわりってこと！？」"

[[dialogue]]
speaker = "アナ（覚醒）"
# 「ルヴィネさんの本気度がうかがえますね……プラネットマルス・ノヴァ、セット！」
line = "「ルヴィネさんの本気度がうかがえますね……プラネットマルス・ノヴァ、セット！」"

[[dialogue]]
speaker = "unk"
# このままではキリがない──かと言って無視して奥へ進めば、頂上でルヴィネと使徒に挟み撃ちされる構図になってしまう。
line = "このままではキリがない──かと言って無視して奥へ進めば、頂上でルヴィネと使徒に挟み撃ちされる構図になってしまう。"

[[dialogue]]
speaker = "クロト"
# 「正面突破だ──制圧するぞ！！」
line = "「正面突破だ──制圧するぞ！！」"

[[dialogue]]
speaker = "ベアトリス"
# 「はぁ、はぁっ……！」
line = "「はぁ、はぁっ……！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「そのくらいにしておきなさいベアト。さっきの、痛かったでしょう？」
line = "「そのくらいにしておきなさいベアト。さっきの、痛かったでしょう？」"

[[dialogue]]
speaker = "ベアトリス"
# 「それは聞けない相談だよ！　ルヴィ──！」
line = "「それは聞けない相談だよ！　ルヴィ──！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「そんな攻撃、いくら重ねても無駄よ」
line = "「そんな攻撃、いくら重ねても無駄よ」"

[[dialogue]]
speaker = "unk"
# ルヴィネが手をかざす。それだけで──
line = "ルヴィネが手をかざす。それだけで──"

[[dialogue]]
speaker = "ベアトリス"
# 「──きゃぁああっ！？」
line = "「──きゃぁああっ！？」"

[[dialogue]]
speaker = "unk"
# 強烈な衝撃波をぶつけられ、ベアトリスは弾き飛ばされてしまう。
line = "強烈な衝撃波をぶつけられ、ベアトリスは弾き飛ばされてしまう。"

[[dialogue]]
speaker = "チナ"
# 「ちくしょう……！　同じ星力なのに、どうしてこんなにも差があるんだ！？」
line = "「ちくしょう……！　同じ星力なのに、どうしてこんなにも差があるんだ！？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「──そういえば、言ってなかったわね」
line = "「──そういえば、言ってなかったわね」"

[[dialogue]]
speaker = "ルヴィネ"
# 「私は星力なんて使わない。<ruby=テルル>不出来な姉</ruby>の力なんてね」
line = "「私は星力なんて使わない。<ruby>不出来な姉<rt>テルル</rt></ruby>の力なんてね」"

[[dialogue]]
speaker = "グレイス"
# 「星力じゃない……？　でも、ルヴィは守護星を持っていたはずで……！」
line = "「星力じゃない……？　でも、ルヴィは守護星を持っていたはずで……！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「それも嘘よ。私は１０年前から、お父様から賜った『霊力』を使っている」
line = "「それも嘘よ。私は１０年前から、お父様から賜った『霊力』を使っている」"

[[dialogue]]
speaker = "ルヴィネ"
# 「いつも変身する時に、セレスティアを霊力でぴかぴか光らせて……面倒だったわ」
line = "「いつも変身する時に、セレスティアを霊力でぴかぴか光らせて……面倒だったわ」"

[[dialogue]]
speaker = "チナ"
# 「なん、だって……！？」
line = "「なん、だって……！？」"

[[dialogue]]
speaker = "unk"
# 避難地で暮らし始めて、しばらく経った頃……
line = "避難地で暮らし始めて、しばらく経った頃……"

[[dialogue]]
speaker = "unk"
# 半壊した学園の施設に生きている機器があり、守護星を調べられる機会があった。
line = "半壊した学園の施設に生きている機器があり、守護星を調べられる機会があった。"

[[dialogue]]
speaker = "unk"
# 複雑な機器の操作はチナたちにはできなかった。全ての操作をルヴィネが行い、全員の守護星が明らかになった夜──
line = "複雑な機器の操作はチナたちにはできなかった。全ての操作をルヴィネが行い、全員の守護星が明らかになった夜──"

[[dialogue]]
speaker = "ベアトリス"
# 「私の守護星は、ポラリス・アウストラリス……！　南極に一番近い星で！」
line = "「私の守護星は、ポラリス・アウストラリス……！　南極に一番近い星で！」"

[[dialogue]]
speaker = "グレイス"
# 「私の守護星は、ファワリス……いつか北極星に組み込まれる星座なんですね！」
line = "「私の守護星は、ファワリス……いつか北極星に組み込まれる星座なんですね！」"

[[dialogue]]
speaker = "チナ"
# 「アタシはエライ。レティシアはエダシク……どっちも北極星に関係してるだなんて、こんな偶然あるんだな！」
line = "「アタシはエライ。レティシアはエダシク……どっちも北極星に関係してるだなんて、こんな偶然あるんだな！」"

[[dialogue]]
speaker = "レティシア"
# 「……すごい、ぐうぜん？」
line = "「……すごい、ぐうぜん？」"

[[dialogue]]
speaker = "チナ"
# 「ルヴィの守護星も調べたかったなあ。アタシらじゃ機械の動かし方、よくわからなかったし……」
line = "「ルヴィの守護星も調べたかったなあ。アタシらじゃ機械の動かし方、よくわからなかったし……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「いいえ。テルル様に遣わされた時に、守護星のことは聞いているの」
line = "「いいえ。テルル様に遣わされた時に、守護星のことは聞いているの」"

[[dialogue]]
speaker = "ルヴィネ"
# 「私の守護星は──ポラリス。今の北極星よ。ふふ……みんな同じなのね」
line = "「私の守護星は──ポラリス。今の北極星よ。ふふ……みんな同じなのね」"

[[dialogue]]
speaker = "unk"
# 避難地で星力に覚醒しているのは、この５人だけ。
line = "避難地で星力に覚醒しているのは、この５人だけ。"

[[dialogue]]
speaker = "unk"
# その全員が『極星』にまつわる守護星を宿しているだなんて──まるで運命だ。
line = "その全員が『極星』にまつわる守護星を宿しているだなんて──まるで運命だ。"

[[dialogue]]
speaker = "unk"
# きっと意味があるとチナは思った。自分たちは視えない何かで結ばれた、かけがえのない親友なのだと──
line = "きっと意味があるとチナは思った。自分たちは視えない何かで結ばれた、かけがえのない親友なのだと──"

[[dialogue]]
speaker = "ルヴィネ"
# 「４人が偶然一緒だったから、私も極星にまつわる星を偽った。使えると思ったのよ」
line = "「４人が偶然一緒だったから、私も極星にまつわる星を偽った。使えると思ったのよ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「ただの偶然の一致にも、ヒトは意味を見出す生き物だから」
line = "「ただの偶然の一致にも、ヒトは意味を見出す生き物だから」"

[[dialogue]]
speaker = "ルヴィネ"
# 「事実、あの日を境に、チナからさらに強い信頼を得られたのを感じたわ。違う？」
line = "「事実、あの日を境に、チナからさらに強い信頼を得られたのを感じたわ。違う？」"

[[dialogue]]
speaker = "チナ"
# 「──このやろぉぉおおっ！！！」
line = "「──このやろぉぉおおっ！！！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「チナの弱点はそういうところよ。すぐ頭に血が上るから、隙を作るのもたやすい」
line = "「チナの弱点はそういうところよ。すぐ頭に血が上るから、隙を作るのもたやすい」"

[[dialogue]]
speaker = "チナ"
# 「ぐぁぁああっ──！？」
line = "「ぐぁぁああっ──！？」"

[[dialogue]]
speaker = "グレイス"
# 「チナっ──大丈夫ですか！？」
line = "「チナっ──大丈夫ですか！？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「そしてグレイスは、味方が傷つくとすぐに集中力がなくなる──そのクセ、直しなさいと言ったでしょう？」
line = "「そしてグレイスは、味方が傷つくとすぐに集中力がなくなる──そのクセ、直しなさいと言ったでしょう？」"

[[dialogue]]
speaker = "グレイス"
# 「……きゃああっ！？」
line = "「……きゃああっ！？」"

[[dialogue]]
speaker = "レティシア"
# 「はあぁあっ──！」
line = "「はあぁあっ──！」"

[[dialogue]]
speaker = "unk"
# チナとグレイスに攻撃が降り注いだ隙に、刀を振りかざすレティシアだったが──
line = "チナとグレイスに攻撃が降り注いだ隙に、刀を振りかざすレティシアだったが──"

[[dialogue]]
speaker = "ルヴィネ"
# 「レティシアを抑えるのはもっと簡単よ」
line = "「レティシアを抑えるのはもっと簡単よ」"

[[dialogue]]
speaker = "unk"
# ルヴィネは一切の防御姿勢を取らずに、レティシアとの距離をさらに詰めて棒立ちになった。
line = "ルヴィネは一切の防御姿勢を取らずに、レティシアとの距離をさらに詰めて棒立ちになった。"

[[dialogue]]
speaker = "レティシア"
# 「──っ！？」
line = "「──っ！？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「──やっぱり。チナだったら振りぬいたでしょうに……レティシア、あなたは本当に優しい子ね」
line = "「──やっぱり。チナだったら振りぬいたでしょうに……レティシア、あなたは本当に優しい子ね」"

[[dialogue]]
speaker = "レティシア"
# 「くぅぅっ──！！」
line = "「くぅぅっ──！！」"

[[dialogue]]
speaker = "unk"
# ルヴィネの戦力は圧倒的だった。どれだけ努力をしても埋まらないと、本能でわかるほどの絶望的な戦力差──
line = "ルヴィネの戦力は圧倒的だった。どれだけ努力をしても埋まらないと、本能でわかるほどの絶望的な戦力差──"

[[dialogue]]
speaker = "ルヴィネ"
# 「ベアト。私が今、全力を出していると思う？」
line = "「ベアト。私が今、全力を出していると思う？」"

[[dialogue]]
speaker = "ベアトリス"
# 「あはは……全然、思わないよ。全力の半分も出してないんじゃないかな……」
line = "「あはは……全然、思わないよ。全力の半分も出してないんじゃないかな……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「ええ──これで２割程度よ。まだ続けるの？」
line = "「ええ──これで２割程度よ。まだ続けるの？」"

[[dialogue]]
speaker = "ベアトリス"
# 「うんっ、それでも続けるよ！　まだ希望を捨てるには、早いから……！」
line = "「うんっ、それでも続けるよ！　まだ希望を捨てるには、早いから……！」"

[[dialogue]]
speaker = "ベアトリス"
# 「ルヴィが全力を出したら、私たちはひとたまりもない。でも……！」
line = "「ルヴィが全力を出したら、私たちはひとたまりもない。でも……！」"

[[dialogue]]
speaker = "ベアトリス"
# 「裏を返せば、やっぱりルヴィは手加減してくれてるってことだもんっ！」
line = "「裏を返せば、やっぱりルヴィは手加減してくれてるってことだもんっ！」"

[[dialogue]]
speaker = "ベアトリス"
# 「まだ声を届けることはできる、私たちのこと……大切だって思ってくれてる！　ルヴィ、違うっ！？」
line = "「まだ声を届けることはできる、私たちのこと……大切だって思ってくれてる！　ルヴィ、違うっ！？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「…………違うわ」
line = "「…………違うわ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「私があなたたちにトドメを刺さないのは、まだ利用価値があるからよ」
line = "「私があなたたちにトドメを刺さないのは、まだ利用価値があるからよ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「みんなに一つ、提案をするわ」
line = "「みんなに一つ、提案をするわ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「あなたたち。私と一緒に……新しい世界を創ってみる気はないかしら？」
line = "「あなたたち。私と一緒に……新しい世界を創ってみる気はないかしら？」"
