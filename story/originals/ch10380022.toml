[[dialogue]]
speaker = "unk"
# 第２話,皆さんの水着、いやらしすぎでは……？,P
line = "第２話,皆さんの水着、いやらしすぎでは……？,P"

[[dialogue]]
speaker = "イクシリオン"
# 「ぜぇぜぇ、あ、暑い……。ここまで蒸し蒸しだと流石に参りますね……」
line = "「ぜぇぜぇ、あ、暑い……。ここまで蒸し蒸しだと流石に参りますね……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あらイクシー。みんなもう水着に着替えてるわよ？　あなたも早く着替えて着替えて♪」
line = "「あらイクシー。みんなもう水着に着替えてるわよ？　あなたも早く着替えて着替えて♪」"

[[dialogue]]
speaker = "アナ"
# 「前会長、はしゃぎすぎです。これはイベントではありません。あくまで一時措置なのですから」
line = "「前会長、はしゃぎすぎです。これはイベントではありません。あくまで一時措置なのですから」"

[[dialogue]]
speaker = "サーシャ"
# 「まさか冷房が壊れちゃうなんてね～。真夏の一番暑い時期に困っちゃうわ～」
line = "「まさか冷房が壊れちゃうなんてね～。真夏の一番暑い時期に困っちゃうわ～」"

[[dialogue]]
speaker = "ヴィーナス"
# 「おかげで学園公認水着パーティーを開けたんだからいいじゃない。ふふ、授業中も水着で過ごしていいなんてワクワクしちゃうわ」
line = "「おかげで学園公認水着パーティーを開けたんだからいいじゃない。ふふ、授業中も水着で過ごしていいなんてワクワクしちゃうわ」"

[[dialogue]]
speaker = "アナ"
# 「パーティーではないですが……非日常的なのは事実ですからね」
line = "「パーティーではないですが……非日常的なのは事実ですからね」"

[[dialogue]]
speaker = "イクシリオン"
# 「～～っっ。み、皆さん、本当に水着に着替えて……。公衆の面前でなんと大胆、なんとインモラルな……」
line = "「～～っっ。み、皆さん、本当に水着に着替えて……。公衆の面前でなんと大胆、なんとインモラルな……」"

[[dialogue]]
speaker = "unk"
# イクシーも水着に着替えた方がいいよ
line = "イクシーも水着に着替えた方がいいよ"

[[dialogue]]
speaker = "イクシリオン"
# 「会長まで水着に……！　ビーチでもないのに上半身裸で……！」
line = "「会長まで水着に……！　ビーチでもないのに上半身裸で……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「むしろ、あなたくらいよ。まだ制服着ているのは。ご丁寧にタイツまで履いて……。熱中症になっちゃうわよ？」
line = "「むしろ、あなたくらいよ。まだ制服着ているのは。ご丁寧にタイツまで履いて……。熱中症になっちゃうわよ？」"

[[dialogue]]
speaker = "イクシリオン"
# 「それはわかっているのですが、やはり抵抗が……」
line = "「それはわかっているのですが、やはり抵抗が……」"

[[dialogue]]
speaker = "サーシャ"
# 「恥ずかしいのはわかるけど～。そのままだと倒れちゃうわよ～？」
line = "「恥ずかしいのはわかるけど～。そのままだと倒れちゃうわよ～？」"

[[dialogue]]
speaker = "イクシリオン"
# 「い、いえ、恥ずかしいわけでは……。水着で校内を闊歩するというのは水着戦闘服を得てから毎日のように妄想していたシチュですし……」
line = "「い、いえ、恥ずかしいわけでは……。水着で校内を闊歩するというのは水着戦闘服を得てから毎日のように妄想していたシチュですし……」"

[[dialogue]]
speaker = "イクシリオン"
# 「水着と言えば下着も同然……。つまり水着で出歩くというのは下着で出歩いているのと同義……」
line = "「水着と言えば下着も同然……。つまり水着で出歩くというのは下着で出歩いているのと同義……」"

[[dialogue]]
speaker = "イクシリオン"
# 「要するに水着は、下着で出歩きたいという欲求を叶えてくれる夢のアイテム──！　わかってます、それは重々わかっているのですがっ……」
line = "「要するに水着は、下着で出歩きたいという欲求を叶えてくれる夢のアイテム──！　わかってます、それは重々わかっているのですがっ……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「イクシー、大丈夫？　何かブツブツ言ってるけど……。もう熱中症の症状が出ちゃってるんじゃないかしら……？」
line = "「イクシー、大丈夫？　何かブツブツ言ってるけど……。もう熱中症の症状が出ちゃってるんじゃないかしら……？」"

[[dialogue]]
speaker = "unk"
# とりあえず鼻血拭いて、こっち来て！
line = "とりあえず鼻血拭いて、こっち来て！"

[[dialogue]]
speaker = "イクシリオン"
# 「ひゃんっ……！　か、会長、こんな物陰に半裸で連れ込んで、はぁはぁ、何をするつもりなんですか……？」
line = "「ひゃんっ……！　か、会長、こんな物陰に半裸で連れ込んで、はぁはぁ、何をするつもりなんですか……？」"

[[dialogue]]
speaker = "イクシリオン"
# 「ふぁ……！？　おおお、お顔が近いです……！　まさかキキキ……！？　すすす、すぐ近くにヴィーナスさんたちもいらっしゃいますから……！」
line = "「ふぁ……！？　おおお、お顔が近いです……！　まさかキキキ……！？　すすす、すぐ近くにヴィーナスさんたちもいらっしゃいますから……！」"

[[dialogue]]
speaker = "イクシリオン"
# 「って──ちべたっ。これは、<ruby=ひょうのう>氷嚢</ruby>……？」
line = "「って──ちべたっ。これは、<ruby>氷嚢<rt>ひょうのう</rt></ruby>……？」"

[[dialogue]]
speaker = "イクシリオン"
# 「私が茹だってるように見えたから……ですか？　確かに暑くて暑くて仕方なくて……。今や学内全体がサウナのような状況ですし……」
line = "「私が茹だってるように見えたから……ですか？　確かに暑くて暑くて仕方なくて……。今や学内全体がサウナのような状況ですし……」"

[[dialogue]]
speaker = "イクシリオン"
# 「皆さんの言うとおり、早く水着に着替えるべきだとわかっているのですが、その……」
line = "「皆さんの言うとおり、早く水着に着替えるべきだとわかっているのですが、その……」"

[[dialogue]]
speaker = "イクシリオン"
# 「……いえ、百聞は一見にしかずですよね。んっ……」
line = "「……いえ、百聞は一見にしかずですよね。んっ……」"

[[dialogue]]
speaker = "イクシリオン"
# 「どうですか？　正直その、見劣りしますよね……？」
line = "「どうですか？　正直その、見劣りしますよね……？」"

[[dialogue]]
speaker = "イクシリオン"
# 「ですから、ヴィーナスさんたちの水着姿に比べて、です。競泳水着って肌の露出が少ないですから……」
line = "「ですから、ヴィーナスさんたちの水着姿に比べて、です。競泳水着って肌の露出が少ないですから……」"

[[dialogue]]
speaker = "イクシリオン"
# 「おまけにジャージまで羽織ってしまってますし……。水着のヴィーナスさんたちと並んで立つと、その……」
line = "「おまけにジャージまで羽織ってしまってますし……。水着のヴィーナスさんたちと並んで立つと、その……」"

[[dialogue]]
speaker = "イクシリオン"
# 「色気がないな、と会長に思われちゃうんじゃないかって……」
line = "「色気がないな、と会長に思われちゃうんじゃないかって……」"

[[dialogue]]
speaker = "unk"
# 俺は好きだよ、イクシーの水着姿
line = "俺は好きだよ、イクシーの水着姿"

[[dialogue]]
speaker = "イクシリオン"
# 「え……？　まさか競泳水着フェチだったんですか？　確かにその、競泳水着には競泳水着の良さもあると自覚していますが……」
line = "「え……？　まさか競泳水着フェチだったんですか？　確かにその、競泳水着には競泳水着の良さもあると自覚していますが……」"

[[dialogue]]
speaker = "イクシリオン"
# 「素材の破れやすさなんて最たる物ですよね。爪を立てようものなら、簡単にビリビリ破れてしまいそうですし……」
line = "「素材の破れやすさなんて最たる物ですよね。爪を立てようものなら、簡単にビリビリ破れてしまいそうですし……」"

[[dialogue]]
speaker = "イクシリオン"
# 「破れた場所から覗く日焼けひとつない白い肌……──あれはビキニでは決して得られないエロスですっ……」
line = "「破れた場所から覗く日焼けひとつない白い肌……──あれはビキニでは決して得られないエロスですっ……」"

[[dialogue]]
speaker = "イクシリオン"
# 「防御力低そうな点も興奮しますし……！　実際、この戦闘服で戦う時はいつもドキドキしてしまっていて。攻撃を受けるたびに破れてしまわないかと気が気では──」
line = "「防御力低そうな点も興奮しますし……！　実際、この戦闘服で戦う時はいつもドキドキしてしまっていて。攻撃を受けるたびに破れてしまわないかと気が気では──」"

[[dialogue]]
speaker = "unk"
# その競泳水着にはイクシーの優しさが表れてるからね
line = "その競泳水着にはイクシーの優しさが表れてるからね"

[[dialogue]]
speaker = "イクシリオン"
# 「私の優しさ、ですか？」
line = "「私の優しさ、ですか？」"

[[dialogue]]
speaker = "unk"
# ビキニじゃ水難救助なんてできないから
line = "ビキニじゃ水難救助なんてできないから"

[[dialogue]]
speaker = "イクシリオン"
# 「あ……」
line = "「あ……」"

[[dialogue]]
speaker = "イクシリオン"
# 「ふふ、そうですね。この競泳水着には、保健委員としての私の矜恃が表れているのかもしれません」
line = "「ふふ、そうですね。この競泳水着には、保健委員としての私の矜恃が表れているのかもしれません」"

[[dialogue]]
speaker = "イクシリオン"
# 「単純に水着を選ぶだけなら、もっと過激な──……それこそマイクロビキニのようなものを選んでいたと思います」
line = "「単純に水着を選ぶだけなら、もっと過激な──……それこそマイクロビキニのようなものを選んでいたと思います」"

[[dialogue]]
speaker = "イクシリオン"
# 「事実、人工戦闘服を調整する時にチラりと脳裏をよぎりましたし……。でも、気がついたらこの水着を選んでいました」
line = "「事実、人工戦闘服を調整する時にチラりと脳裏をよぎりましたし……。でも、気がついたらこの水着を選んでいました」"

[[dialogue]]
speaker = "イクシリオン"
# 「あはは、なんだか気恥ずかしいです……。会長に自分の心を覗き見られているみたいで……」
line = "「あはは、なんだか気恥ずかしいです……。会長に自分の心を覗き見られているみたいで……」"

[[dialogue]]
speaker = "イクシリオン"
# 「ですが……すごく嬉しいです。会長は私の見てくれではなく、本質を好きだと言ってくれるのですね……？」
line = "「ですが……すごく嬉しいです。会長は私の見てくれではなく、本質を好きだと言ってくれるのですね……？」"

[[dialogue]]
speaker = "イクシリオン"
# 「おかげで心の靄が晴れました。ふふふ、私、会長の彼女になれて本当に良かったです」
line = "「おかげで心の靄が晴れました。ふふふ、私、会長の彼女になれて本当に良かったです」"

[[dialogue]]
speaker = "イクシリオン"
# 「私以上に私のことを理解してくれている。こんな素敵な恋人、他にいませんから<emoji=heart04>」
line = "「私以上に私のことを理解してくれている。こんな素敵な恋人、他にいませんから<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
# 「でも……水着に色気がないという点は否定しませんでしたよね？　やっぱり色気不足だとは思っているんですか？」
line = "「でも……水着に色気がないという点は否定しませんでしたよね？　やっぱり色気不足だとは思っているんですか？」"

[[dialogue]]
speaker = "イクシリオン"
# 「あはは、責めているわけではありませんよ。この水着姿を気に入ってくれていることはよーくわかっていますから」
line = "「あはは、責めているわけではありませんよ。この水着姿を気に入ってくれていることはよーくわかっていますから」"

[[dialogue]]
speaker = "イクシリオン"
# 「会長が喜んでくれるのなら、いつか派手な水着にも挑戦しようと思ってるだけです」
line = "「会長が喜んでくれるのなら、いつか派手な水着にも挑戦しようと思ってるだけです」"

[[dialogue]]
speaker = "イクシリオン"
# 「校内じゃ絶対に着られないような、恋人に見せる専用のエッチな水着を……」
line = "「校内じゃ絶対に着られないような、恋人に見せる専用のエッチな水着を……」"

[[dialogue]]
speaker = "イクシリオン"
# 「どうか、えへへ、期待していてくださいね……？」
line = "「どうか、えへへ、期待していてくださいね……？」"
