[[dialogue]]
speaker = "シアン"
# 「数日前、赤髪の獣人系魔族が目撃されたのがここだ。ま、その特徴だけじゃキサナだとは断定できないけどな」
line = "「数日前、赤髪の獣人系魔族が目撃されたのがここだ。ま、その特徴だけじゃキサナだとは断定できないけどな」"

[[dialogue]]
speaker = "シアン"
# 「同じ特徴は渋谷や浅草でも目撃されている。全く影も形もないってわけじゃないようだ」
line = "「同じ特徴は渋谷や浅草でも目撃されている。全く影も形もないってわけじゃないようだ」"

[[dialogue]]
speaker = "シアン"
# 「目撃地点やキサナの情報を繋ぎ合わせれば、やつの目的や、今どこにいるかがわかるかもしれねえ」
line = "「目撃地点やキサナの情報を繋ぎ合わせれば、やつの目的や、今どこにいるかがわかるかもしれねえ」"

[[dialogue]]
speaker = "シアン"
# 「キサナについてわかっていることは……獣人系の魔族、若い女、荒い言動……」
line = "「キサナについてわかっていることは……獣人系の魔族、若い女、荒い言動……」"

[[dialogue]]
speaker = "シアン"
# 「あと、食い物を粗末にするやつが嫌いってところか。キサナ自身が食い物に困った経験があると考えるのが普通だろうな」
line = "「あと、食い物を粗末にするやつが嫌いってところか。キサナ自身が食い物に困った経験があると考えるのが普通だろうな」"

[[dialogue]]
speaker = "シアン"
# 「それにあの耳としっぽは、あたしの知る限り魔界のセントリア地方に多い。チンピラっぽさを見るに、西セントリアのマフィアの崩れか？」
line = "「それにあの耳としっぽは、あたしの知る限り魔界のセントリア地方に多い。チンピラっぽさを見るに、西セントリアのマフィアの崩れか？」"

[[dialogue]]
speaker = "シアン"
# 「キサナが自分で人間界に来たとは思えない。やはりコラプサーが組織的に密航を手引きしたと考えるのが妥当だろう」
line = "「キサナが自分で人間界に来たとは思えない。やはりコラプサーが組織的に密航を手引きしたと考えるのが妥当だろう」"

[[dialogue]]
speaker = "unk"
# 警察みたいですね
line = "警察みたいですね"

[[dialogue]]
speaker = "シアン"
# 「それが公安委員会の本分だからな。あんたはネーゼマインやセナリィを先に知っちまったから、トンチキなイメージがついちまったみたいだが」
line = "「それが公安委員会の本分だからな。あんたはネーゼマインやセナリィを先に知っちまったから、トンチキなイメージがついちまったみたいだが」"

[[dialogue]]
speaker = "シアン"
# 「ま、今回はあたしだけで調べたわけじゃねえけどな」
line = "「ま、今回はあたしだけで調べたわけじゃねえけどな」"

[[dialogue]]
speaker = "コハルコ"
# 『もしもし。こちら放送委員会・委員長のコハルコです。秋葉原でも赤髪の魔族の目撃情報がありました。連れもいたらしいのでコラプサーではないかもですが』
line = "『もしもし。こちら放送委員会・委員長のコハルコです。秋葉原でも赤髪の魔族の目撃情報がありました。連れもいたらしいのでコラプサーではないかもですが』"

[[dialogue]]
speaker = "シアン"
# 「いや、助かる。もしかしたらその連れも、他のコラプサー構成員かもしれないしな」
line = "「いや、助かる。もしかしたらその連れも、他のコラプサー構成員かもしれないしな」"

[[dialogue]]
speaker = "コハルコ"
# 『あ、こんにちは、会長さん。私は公安委員会じゃないんだけど、コラプサー関係は特別に協力することになってるの』
line = "『あ、こんにちは、会長さん。私は公安委員会じゃないんだけど、コラプサー関係は特別に協力することになってるの』"

[[dialogue]]
speaker = "コハルコ"
# 『公安の存在自体は、隠していてもどうせバレるからってことでヘレナさんに教えてもらってたけどね』
line = "『公安の存在自体は、隠していてもどうせバレるからってことでヘレナさんに教えてもらってたけどね』"

[[dialogue]]
speaker = "シアン"
# 「朝比奈コハルコ──裏社会でジャスティスウィザードと呼ばれたあんたの腕があれば、すぐに居場所も掴めると思ったんだが……難しいか？」
line = "「朝比奈コハルコ──裏社会でジャスティスウィザードと呼ばれたあんたの腕があれば、すぐに居場所も掴めると思ったんだが……難しいか？」"

[[dialogue]]
speaker = "コハルコ"
# 『その名前は出さない約束ですよ。……難しいのは確かですが』
line = "『その名前は出さない約束ですよ。……難しいのは確かですが』"

[[dialogue]]
speaker = "コハルコ"
# 『ＤＩＳＣから居場所の特定を試みましたが、うまくいきませんでした。少なくとも私と同等レベルのハッカーがコラプサーにはいるようです』
line = "『ＤＩＳＣから居場所の特定を試みましたが、うまくいきませんでした。少なくとも私と同等レベルのハッカーがコラプサーにはいるようです』"

[[dialogue]]
speaker = "シアン"
# 「ジャスティスウィザードと同レベルのハッカーか……嬉しくない情報だな。まぁ、そうでもなければ逃げられないか」
line = "「ジャスティスウィザードと同レベルのハッカーか……嬉しくない情報だな。まぁ、そうでもなければ逃げられないか」"

[[dialogue]]
speaker = "シアン"
# 「話を聞く限り、キサナにハッキング技術があるとは思えない。やはりキサナが言った通り、コラプサーはちゃんとバックがある組織ってことだ」
line = "「話を聞く限り、キサナにハッキング技術があるとは思えない。やはりキサナが言った通り、コラプサーはちゃんとバックがある組織ってことだ」"

[[dialogue]]
speaker = "シアン"
# 「ところでコハルコ、会長さん相手にはタメ口なんだし、あたしに敬語はやめてくれないか？　同じ３年生だろ？」
line = "「ところでコハルコ、会長さん相手にはタメ口なんだし、あたしに敬語はやめてくれないか？　同じ３年生だろ？」"

[[dialogue]]
speaker = "コハルコ"
# 『別に構いませんが……私はオペレーターとして公私を分けているだけですよ。任務中であれば、誰が相手でも丁寧な言葉遣いを心掛けています』
line = "『別に構いませんが……私はオペレーターとして公私を分けているだけですよ。任務中であれば、誰が相手でも丁寧な言葉遣いを心掛けています』"

[[dialogue]]
speaker = "シアン"
# 「あ……そうなのか。あたしの気にしすぎだ。悪い、忘れてくれ」
line = "「あ……そうなのか。あたしの気にしすぎだ。悪い、忘れてくれ」"

[[dialogue]]
speaker = "コハルコ"
# 『はぁ……わかりました』
line = "『はぁ……わかりました』"

[[dialogue]]
speaker = "シアン"
# 「ったく、あたしの完全な空回りじゃねえか……」
line = "「ったく、あたしの完全な空回りじゃねえか……」"

[[dialogue]]
speaker = "シアン"
# 「いや、何でもない。この辺で目撃情報があったってことは、駅員や周囲の会社の人間も見ているかもしれない。聞き込みを──」
line = "「いや、何でもない。この辺で目撃情報があったってことは、駅員や周囲の会社の人間も見ているかもしれない。聞き込みを──」"

[[dialogue]]
speaker = "コハルコ"
# 『！　東京駅周辺にモンスター反応！　一番近いのは会長さんたちです！』
line = "『！　東京駅周辺にモンスター反応！　一番近いのは会長さんたちです！』"

[[dialogue]]
speaker = "シアン"
# 「ついてねぇな……。ま、荒事の前に肩慣らしと行くか」
line = "「ついてねぇな……。ま、荒事の前に肩慣らしと行くか」"

[[dialogue]]
speaker = "シアン"
# 「そらっ！」
line = "「そらっ！」"

[[dialogue]]
speaker = "シアン"
# 「最近の任務は犯罪組織への潜入とかだったから、流星市国のモンスターと戦うのは久しぶりだ」
line = "「最近の任務は犯罪組織への潜入とかだったから、流星市国のモンスターと戦うのは久しぶりだ」"

[[dialogue]]
speaker = "シアン"
# 「神経使う捜査に比べりゃ、戦うだけの方が気が楽だが……久々に戦うとやっぱり強いな。余所のモンスターとはパワーも耐久力も段違いだ」
line = "「神経使う捜査に比べりゃ、戦うだけの方が気が楽だが……久々に戦うとやっぱり強いな。余所のモンスターとはパワーも耐久力も段違いだ」"

[[dialogue]]
speaker = "シアン"
# 「ん？　どうした会長さん？　……ユウリに戦い方が似てる？　ああ、うちの後輩に同じ得物のやつがいるんだったな。ついでに獣人系の魔族だったっけ」
line = "「ん？　どうした会長さん？　……ユウリに戦い方が似てる？　ああ、うちの後輩に同じ得物のやつがいるんだったな。ついでに獣人系の魔族だったっけ」"

[[dialogue]]
speaker = "unk"
# うちの後輩？
line = "うちの後輩？"

[[dialogue]]
speaker = "シアン"
# 「っ！？　いや、海外にいると流星とか新星とかどっちでもよくなるからな。つい間違えちまった」
line = "「っ！？　いや、海外にいると流星とか新星とかどっちでもよくなるからな。つい間違えちまった」"

[[dialogue]]
speaker = "コハルコ"
# 『会長さん、４時の方角からモンスター急接近！　民間人が危険です！』
line = "『会長さん、４時の方角からモンスター急接近！　民間人が危険です！』"

[[dialogue]]
speaker = "イグニック"
# 「イイィィイイイッ！」
line = "「イイィィイイイッ！」"

[[dialogue]]
speaker = "unk"
# 危ない！
line = "危ない！"

[[dialogue]]
speaker = "？？？"
# 「ほえ？」
line = "「ほえ？」"

[[dialogue]]
speaker = "イグニック"
# 「イイィィ……」
line = "「イイィィ……」"

[[dialogue]]
speaker = "？？？"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "？？？"
# 「かっこい～っ！」
line = "「かっこい～っ！」"

[[dialogue]]
speaker = "シアン"
# 「これで終わりだ！」
line = "「これで終わりだ！」"

[[dialogue]]
speaker = "コハルコ"
# 『モンスターの消滅を確認。掃討完了です。お疲れ様でした』
line = "『モンスターの消滅を確認。掃討完了です。お疲れ様でした』"

[[dialogue]]
speaker = "シアン"
# 「ま、こんなもんだな。あたしの星術が鈍ってなくてよかったよ」
line = "「ま、こんなもんだな。あたしの星術が鈍ってなくてよかったよ」"

[[dialogue]]
speaker = "unk"
# ベテランの貫禄がありました
line = "ベテランの貫禄がありました"

[[dialogue]]
speaker = "シアン"
# 「……うるせえ、余計なこと言うんじゃねえ」
line = "「……うるせえ、余計なこと言うんじゃねえ」"

[[dialogue]]
speaker = "？？？"
# 「さっきのすごくかっこよかった！　助けてくれてありがとう！」
line = "「さっきのすごくかっこよかった！　助けてくれてありがとう！」"

[[dialogue]]
speaker = "シアン"
# 「ん？　さっき会長さんが助けた子か。怪我がないようで何よりだが──」
line = "「ん？　さっき会長さんが助けた子か。怪我がないようで何よりだが──」"

[[dialogue]]
speaker = "？？？"
# 「リーナのお兄ちゃん、やっと会えた！」
line = "「リーナのお兄ちゃん、やっと会えた！」"

[[dialogue]]
speaker = "unk"
# お兄ちゃん！？
line = "お兄ちゃん！？"

[[dialogue]]
speaker = "シアン"
# 「……あんた、妹いたのか？」
line = "「……あんた、妹いたのか？」"
