[[dialogue]]
speaker = "unk"
# 第２話,キサナの住む世界,P
line = "第２話,キサナの住む世界,P"

[[dialogue]]
speaker = "キサナ"
# 「わっかんねえ……いったいどれ買ったらいいんだよ……」
line = "「わっかんねえ……いったいどれ買ったらいいんだよ……」"

[[dialogue]]
speaker = "キサナ"
# 「おいガキ、どれが欲しい──ってダメか……。喋れる状態じゃねえわな……」
line = "「おいガキ、どれが欲しい──ってダメか……。喋れる状態じゃねえわな……」"

[[dialogue]]
speaker = "キサナ"
# 「あーもう面倒くせえ。適当にパクっていきゃどれか当たりがあんだろ。そうと決まりゃあ、この辺りのもんごっそりと──」
line = "「あーもう面倒くせえ。適当にパクっていきゃどれか当たりがあんだろ。そうと決まりゃあ、この辺りのもんごっそりと──」"

[[dialogue]]
speaker = "unk"
# 何してるんだ！？
line = "何してるんだ！？"

[[dialogue]]
speaker = "キサナ"
# 「ヤベっ、また魔王かよっ。よせよせ騒ぎを大きくすんなっ。盗めるもんも盗めなくなっちまうだろうがっ」
line = "「ヤベっ、また魔王かよっ。よせよせ騒ぎを大きくすんなっ。盗めるもんも盗めなくなっちまうだろうがっ」"

[[dialogue]]
speaker = "キサナ"
# 「こっちにも事情があんだよ。このガキが昨日熱出してぶっ倒れちまって……」
line = "「こっちにも事情があんだよ。このガキが昨日熱出してぶっ倒れちまって……」"

[[dialogue]]
speaker = "キサナ"
# 「だけどあの家にゃ薬もひとつもねえからよ。仕方なく探しに来てやったんだ」
line = "「だけどあの家にゃ薬もひとつもねえからよ。仕方なく探しに来てやったんだ」"

[[dialogue]]
speaker = "キサナ"
# 「けどアタシ、字ぃ読めねえし。どれを飲ませりゃいいかわかんねえし。つかそもそも金もねえし」
line = "「けどアタシ、字ぃ読めねえし。どれを飲ませりゃいいかわかんねえし。つかそもそも金もねえし」"

[[dialogue]]
speaker = "キサナ"
# 「ガキに聞こうにもこのザマだ。ま、フラフラんとこ無理やり連れ出して来ちまったからな……」
line = "「ガキに聞こうにもこのザマだ。ま、フラフラんとこ無理やり連れ出して来ちまったからな……」"

[[dialogue]]
speaker = "キサナ"
# 「つーわけでいいだろ薬の１つや２つパクったって。こんなにたくさん並んでんだからケチケチしてんじゃねえよ」
line = "「つーわけでいいだろ薬の１つや２つパクったって。こんなにたくさん並んでんだからケチケチしてんじゃねえよ」"

[[dialogue]]
speaker = "キサナ"
# 「それともなんだ？　金も身よりもねえヤツは死ねってか？　ハッ、まぁそれが世の摂理ってもん──」
line = "「それともなんだ？　金も身よりもねえヤツは死ねってか？　ハッ、まぁそれが世の摂理ってもん──」"

[[dialogue]]
speaker = "unk"
# 事情はわかった。ついてきてくれ
line = "事情はわかった。ついてきてくれ"

[[dialogue]]
speaker = "キサナ"
# 「は？　誰が敵についていくと思っ──あ、おいっ。ガキから手ぇ離せっ。待て、どこに連れてくつもりだ、テメエ……！」
line = "「は？　誰が敵についていくと思っ──あ、おいっ。ガキから手ぇ離せっ。待て、どこに連れてくつもりだ、テメエ……！」"

[[dialogue]]
speaker = "キサナ"
# 「んだ、ここ……オマエん家か？　おいおい、いいのかよ。アタシは敵だぜ？　家に案内するかふつー」
line = "「んだ、ここ……オマエん家か？　おいおい、いいのかよ。アタシは敵だぜ？　家に案内するかふつー」"

[[dialogue]]
speaker = "キサナ"
# 「あっ、おい。話聞けよ。ちょっ、ガキに何飲ませてやがる……！」
line = "「あっ、おい。話聞けよ。ちょっ、ガキに何飲ませてやがる……！」"

[[dialogue]]
speaker = "キサナ"
# 「このタオルを濡らして絞れ……？　ああ、くそ。わーったよ。やりゃいいんだろ、やりゃあ」
line = "「このタオルを濡らして絞れ……？　ああ、くそ。わーったよ。やりゃいいんだろ、やりゃあ」"

[[dialogue]]
speaker = "キサナ"
# 「ふぅ……あんガキ。また人の尻尾握り締めやがって……。おかげで自慢の毛並みが台無しだっての」
line = "「ふぅ……あんガキ。また人の尻尾握り締めやがって……。おかげで自慢の毛並みが台無しだっての」"

[[dialogue]]
speaker = "キサナ"
# 「あ？　ガキならオマエん部屋でぐっすりだよ。オマエの飲ませた薬が効いて、熱もまぁ……下がったみてえだな」
line = "「あ？　ガキならオマエん部屋でぐっすりだよ。オマエの飲ませた薬が効いて、熱もまぁ……下がったみてえだな」"

[[dialogue]]
speaker = "キサナ"
# 「恩に着せようってか？　魂胆が丸見えだぜ」
line = "「恩に着せようってか？　魂胆が丸見えだぜ」"

[[dialogue]]
speaker = "unk"
# そんなつもりはないよ
line = "そんなつもりはないよ"

[[dialogue]]
speaker = "キサナ"
# 「善人ぶんなっつってんだろ。ま……今回のことは一応感謝しておいてやるけどよ」
line = "「善人ぶんなっつってんだろ。ま……今回のことは一応感謝しておいてやるけどよ」"

[[dialogue]]
speaker = "キサナ"
# 「だけど借りにはしねえ。おい、カード持って来いよ。ポーカーしようぜ。さっきの薬代を賭けて勝負だ」
line = "「だけど借りにはしねえ。おい、カード持って来いよ。ポーカーしようぜ。さっきの薬代を賭けて勝負だ」"

[[dialogue]]
speaker = "キサナ"
# 「アタシが負けたら……そうだな。大人しく捕まってやるよ。おら、わかったらとっとと持って来やがれ」
line = "「アタシが負けたら……そうだな。大人しく捕まってやるよ。おら、わかったらとっとと持って来やがれ」"

[[dialogue]]
speaker = "キサナ"
# 「スリーカード。アタシの勝ちだな。これで貸し借りはなしだ」
line = "「スリーカード。アタシの勝ちだな。これで貸し借りはなしだ」"

[[dialogue]]
speaker = "キサナ"
# 「よっしゃ、このままステーキも賭けてもう一勝負しようぜ。いいだろ、な？　オマエも病人に肉食わせてえだろ？」
line = "「よっしゃ、このままステーキも賭けてもう一勝負しようぜ。いいだろ、な？　オマエも病人に肉食わせてえだろ？」"

[[dialogue]]
speaker = "unk"
# 君はどうしてあの子の世話を？
line = "君はどうしてあの子の世話を？"

[[dialogue]]
speaker = "キサナ"
# 「あぁ？　前に言ったろ。宿代の代わりだよ。オマエみてえに善人ぶりてえわけじゃねえ」
line = "「あぁ？　前に言ったろ。宿代の代わりだよ。オマエみてえに善人ぶりてえわけじゃねえ」"

[[dialogue]]
speaker = "キサナ"
# 「魔界のセントリア地方の西部──アタシの住んでたところじゃ親のいないガキなんてわんさかいたからな」
line = "「魔界のセントリア地方の西部──アタシの住んでたところじゃ親のいないガキなんてわんさかいたからな」"

[[dialogue]]
speaker = "キサナ"
# 「アタシの場合はどっかのチンピラと娼婦がガキ作って……捨てたのか、死んだのか。親の顔も見た覚えがねえ。ま、見たくもねえがな」
line = "「アタシの場合はどっかのチンピラと娼婦がガキ作って……捨てたのか、死んだのか。親の顔も見た覚えがねえ。ま、見たくもねえがな」"

[[dialogue]]
speaker = "キサナ"
# 「あのガキも普段から、邪魔だとか、消えろだとか親に言われてたらしいな。実際、家出してもケーサツにすら届けやしねえ」
line = "「あのガキも普段から、邪魔だとか、消えろだとか親に言われてたらしいな。実際、家出してもケーサツにすら届けやしねえ」"

[[dialogue]]
speaker = "キサナ"
# 「優しい世界で生きてる正義の味方にゃわかんねえだろうけどな。世界には確かにあるんだよ。そんな暗闇が」
line = "「優しい世界で生きてる正義の味方にゃわかんねえだろうけどな。世界には確かにあるんだよ。そんな暗闇が」"

[[dialogue]]
speaker = "キサナ"
# 「だから、ちょっと昔を思い出して懐かしくなっただけだ」
line = "「だから、ちょっと昔を思い出して懐かしくなっただけだ」"

[[dialogue]]
speaker = "キサナ"
# 「ああいうガキに最低限テメエで生きる術を教えてやんのがアタシらんとこの暗黙のなんちゃらって感じだったしよ。宿借りの恩もあるからな」
line = "「ああいうガキに最低限テメエで生きる術を教えてやんのがアタシらんとこの暗黙のなんちゃらって感じだったしよ。宿借りの恩もあるからな」"

[[dialogue]]
speaker = "キサナ"
# 「この街にゃ飲める水も、栄養のある食いもんも、雨風しのげる場所も探せばどこにでもある。泥水を啜る必要も腐った飯を漁る必要もねえ」
line = "「この街にゃ飲める水も、栄養のある食いもんも、雨風しのげる場所も探せばどこにでもある。泥水を啜る必要も腐った飯を漁る必要もねえ」"

[[dialogue]]
speaker = "キサナ"
# 「生きようと思えばいくらでもテメエ１人で生きられる。いいや、生きなきゃなんねえ。自分以外のヤツは信用できねえからな」
line = "「生きようと思えばいくらでもテメエ１人で生きられる。いいや、生きなきゃなんねえ。自分以外のヤツは信用できねえからな」"

[[dialogue]]
speaker = "キサナ"
# 「ま、こんな小綺麗なとこに住んでる魔王には関係ねえ話だ。それよりさっさとカード配れよ。こっちは腹ぺこなんだ」
line = "「ま、こんな小綺麗なとこに住んでる魔王には関係ねえ話だ。それよりさっさとカード配れよ。こっちは腹ぺこなんだ」"

[[dialogue]]
speaker = "unk"
# なら俺が勝ったら──
line = "なら俺が勝ったら──"

[[dialogue]]
speaker = "キサナ"
# 「あぁ？　アイツを施設に？　チッ、またそれかよ。アタシの話聞いてなかったのか？」
line = "「あぁ？　アイツを施設に？　チッ、またそれかよ。アタシの話聞いてなかったのか？」"

[[dialogue]]
speaker = "キサナ"
# 「んな胡散臭え施設になんざ連れてくつもりはねえ。どうせ保護するとか言って面倒見ねえんだろ」
line = "「んな胡散臭え施設になんざ連れてくつもりはねえ。どうせ保護するとか言って面倒見ねえんだろ」"

[[dialogue]]
speaker = "キサナ"
# 「アタシらみたいなのはな、どこまで行ってもテメエで身を守るしかねえんだ」
line = "「アタシらみたいなのはな、どこまで行ってもテメエで身を守るしかねえんだ」"

[[dialogue]]
speaker = "キサナ"
# 「ま……どうしても連れて行きたいってんならアタシに勝ってみろよ。それでこそ勝負ってもんだ」
line = "「ま……どうしても連れて行きたいってんならアタシに勝ってみろよ。それでこそ勝負ってもんだ」"

[[dialogue]]
speaker = "キサナ"
# 「ただアタシに勝てると思うなよ？　こちとらカードで命張ったこともあるんだ。簡単には負けねえぜ？」
line = "「ただアタシに勝てると思うなよ？　こちとらカードで命張ったこともあるんだ。簡単には負けねえぜ？」"

[[dialogue]]
speaker = "キサナ"
# 「フルハウス。またアタシの勝ちだな」
line = "「フルハウス。またアタシの勝ちだな」"

[[dialogue]]
speaker = "キサナ"
# 「……あ？　もう一回？　次は何賭けんだよ、つか何回やんだよ。確かに一回勝負とは言わなかったけどよ！」
line = "「……あ？　もう一回？　次は何賭けんだよ、つか何回やんだよ。確かに一回勝負とは言わなかったけどよ！」"

[[dialogue]]
speaker = "キサナ"
# 「素っ裸同然にされてんのにまだやんのか？　おい、やめろ。パンツは賭けんな。それは要らねえから剥いでねえんだよ！」
line = "「素っ裸同然にされてんのにまだやんのか？　おい、やめろ。パンツは賭けんな。それは要らねえから剥いでねえんだよ！」"

[[dialogue]]
speaker = "キサナ"
# 「はぁ……意味わからねえ。どうしてそこまであのガキを保護したいんだか……。テメエにとっちゃ赤の他人だろうがよ」
line = "「はぁ……意味わからねえ。どうしてそこまであのガキを保護したいんだか……。テメエにとっちゃ赤の他人だろうがよ」"

[[dialogue]]
speaker = "キサナ"
# 「そりゃ確かに施設ってのがオマエの言う通りの場所だったとしたらどれだけ──……」
line = "「そりゃ確かに施設ってのがオマエの言う通りの場所だったとしたらどれだけ──……」"

[[dialogue]]
speaker = "キサナ"
# 「なんでもねえよ。それより賭けは終わりだ。さっさと負けた分のステーキ払いやがれ」
line = "「なんでもねえよ。それより賭けは終わりだ。さっさと負けた分のステーキ払いやがれ」"

[[dialogue]]
speaker = "キサナ"
# 「いいから早く買って来やがれ。肉食うまで帰るに帰れねえじゃねえか！」
line = "「いいから早く買って来やがれ。肉食うまで帰るに帰れねえじゃねえか！」"
