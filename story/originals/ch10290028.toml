[[dialogue]]
speaker = "シャルレーヌ"
# 「んふぅっ、んんぅっ、あ、ぁっ──ん、んぁあぁっ<emoji=heart04><emoji=heart04><emoji=heart04>」
line = "「んふぅっ、んんぅっ、あ、ぁっ──ん、んぁあぁっ<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「勢いヤバぁ……んっ<emoji=heart04>　んんっ<emoji=heart04>　奥にびゅくびゅく、いっぱい当たって、るぅっ……<emoji=heart04>」
