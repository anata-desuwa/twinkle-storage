# 「尻尾緩めてあげますっ<emoji=heart04>　ああっ<emoji=heart04>　だから一緒に、一緒にイこ<emoji=heart04>　んんぅうっ<emoji=heart04>　あああっ<emoji=heart04>　イクイクイク──イクぅうぅぅ～っ……！！」
