# 尻尾の拘束が緩んだ直後、ダムの決壊みたいな射精が始まった。
line = "尻尾の拘束が緩んだ直後、ダムの決壊みたいな射精が始まった。"

[[dialogue]]
speaker = "シャルレーヌ"
# 「あっ──んんぅあっ！？　あ、ふわぁぁっ……すっごぉい<emoji=heart04>　射精っ<emoji=heart04>　おま○この中で、びゅうびゅう、出てるぅっ<emoji=heart04>」
