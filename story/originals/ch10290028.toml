[[dialogue]]
speaker = "シャルレーヌ"
# 「と、止まらない、じゃないっ……この<emoji=heart04>　ほんと、ドスケベなんだから、ぁっ……<emoji=heart04>　あ──ふぅぅうっ<emoji=heart04>」
line = "「と、止まらない、じゃないっ……この<emoji=heart04>　ほんと、ドスケベなんだから、ぁっ……<emoji=heart04>　あ──ふぅぅうっ<emoji=heart04>」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「射精、勢いすごくって──ぉっ<emoji=heart04>　おぉっ<emoji=heart04>　気持ちぃっ……んんぅっ……ぁ、あ、ぁっ……<emoji=heart04><emoji=heart04>」
line = "「射精、勢いすごくって──ぉっ<emoji=heart04>　おぉっ<emoji=heart04>　気持ちぃっ……んんぅっ……ぁ、あ、ぁっ……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そのまま気を失いそうになるほどの大量射精が、何十秒もかけてじっくりと続いて──
line = "そのまま気を失いそうになるほどの大量射精が、何十秒もかけてじっくりと続いて──"

[[dialogue]]
speaker = "unk"
# もう出し尽くしたと思っていたのに。ペニスを引き抜く瞬間の刺激で、また精液が飛んで──シャルレーヌのおっぱいまで汚してしまった……
line = "もう出し尽くしたと思っていたのに。ペニスを引き抜く瞬間の刺激で、また精液が飛んで──シャルレーヌのおっぱいまで汚してしまった……"

[[dialogue]]
speaker = "シャルレーヌ"
# 「はぁあ～っ……ふぅうう～っ……はぁ～っ……ふぅう～っ……<emoji=heart04>」
line = "「はぁあ～っ……ふぅうう～っ……はぁ～っ……ふぅう～っ……<emoji=heart04>」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「射精、ようやくおさまりましたね～……くふふ、魔王様の敗北宣言……最高でしたぁ<emoji=heart04>」
line = "「射精、ようやくおさまりましたね～……くふふ、魔王様の敗北宣言……最高でしたぁ<emoji=heart04>」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「すっごく強いのに……みんなの憧れなのに……シャルレーヌの言うこと、ぜーんぶ聞いてくれる……くふふっ<emoji=heart04>」
line = "「すっごく強いのに……みんなの憧れなのに……シャルレーヌの言うこと、ぜーんぶ聞いてくれる……くふふっ<emoji=heart04>」"

[[dialogue]]
speaker = "シャルレーヌ"
