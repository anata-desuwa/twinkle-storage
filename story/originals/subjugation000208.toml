[[dialogue]]
speaker = "unk"
# 合宿最終日の夜。
line = "合宿最終日の夜。"

[[dialogue]]
speaker = "unk"
# 俺達が準備して待っていると、賑やかな声が聞こえてきた――
line = "俺達が準備して待っていると、賑やかな声が聞こえてきた――"

[[dialogue]]
speaker = "ヴィーナス"
# 「あっ、いたいた！　お～い、クロト～、アナ～、サーシャさ～ん！」
line = "「あっ、いたいた！　お～い、クロト～、アナ～、サーシャさ～ん！」"

[[dialogue]]
speaker = "サーシャ"
# 「ヴィーナスちゃん、マトイちゃん、おかえりなさ～い♪　お姉ちゃん会いたかったわ～♪」
line = "「ヴィーナスちゃん、マトイちゃん、おかえりなさ～い♪　お姉ちゃん会いたかったわ～♪」"

[[dialogue]]
speaker = "マトイ"
# 「あはは、ただいまです～。すみません、少し集合時間に遅れちゃいました」
line = "「あはは、ただいまです～。すみません、少し集合時間に遅れちゃいました」"

[[dialogue]]
speaker = "マトイ"
# 「皆で集まって花火やるって知ったら、ヴィーナスが差し入れ花火買うって言い出して聞かなくて……」
line = "「皆で集まって花火やるって知ったら、ヴィーナスが差し入れ花火買うって言い出して聞かなくて……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「じゃ～ん！　やるなら派手にやりたいと思って、沢山買い込んできたわよ！」
line = "「じゃ～ん！　やるなら派手にやりたいと思って、沢山買い込んできたわよ！」"

[[dialogue]]
speaker = "アナ"
# 「おかえりなさい、お２人共。それにフィオナ先輩も、お忙しい中、参加して頂きありがとうございます」
line = "「おかえりなさい、お２人共。それにフィオナ先輩も、お忙しい中、参加して頂きありがとうございます」"

[[dialogue]]
speaker = "フィオナ"
# 「いえいえ、こちらこそお招き頂きありがとうございます、アナさん」
line = "「いえいえ、こちらこそお招き頂きありがとうございます、アナさん」"

[[dialogue]]
speaker = "フィオナ"
# 「サバイバル合宿にも参加したかったんですが、スケジュールが合わなくて……」
line = "「サバイバル合宿にも参加したかったんですが、スケジュールが合わなくて……」"

[[dialogue]]
speaker = "アナ"
# 「急に決まった合宿でしたから、こちらこそすみませんでした。でも、花火だけでも来て頂けて嬉しいです」
line = "「急に決まった合宿でしたから、こちらこそすみませんでした。でも、花火だけでも来て頂けて嬉しいです」"

[[dialogue]]
speaker = "フィオナ"
# 「ふふっ、仕事を頑張って、何とかスケジュール空けちゃいました。ちょっとだけでも参加したかったので」
line = "「ふふっ、仕事を頑張って、何とかスケジュール空けちゃいました。ちょっとだけでも参加したかったので」"

[[dialogue]]
speaker = "リップル"
# 「イェ～イ！　もちろんワタシも参加しますよ～♪」
line = "「イェ～イ！　もちろんワタシも参加しますよ～♪」"

[[dialogue]]
speaker = "リップル"
# 「友達と一緒に花火スルのは、ワタシもやりたかったことデスから♪」
line = "「友達と一緒に花火スルのは、ワタシもやりたかったことデスから♪」"

[[dialogue]]
speaker = "unk"
# これで合宿メンバー、全員集合だな
line = "これで合宿メンバー、全員集合だな"

[[dialogue]]
speaker = "アナ"
# 「それじゃあ、夏の締め括りとして、花火大会を開催しましょう」
line = "「それじゃあ、夏の締め括りとして、花火大会を開催しましょう」"

[[dialogue]]
speaker = "サーシャ"
# 「お～♪」
line = "「お～♪」"

[[dialogue]]
speaker = "unk"
# アナが事前に用意していた物に加え、ヴィーナスが大量に手持ち花火を買って来たので、豪勢な花火大会になった――
line = "アナが事前に用意していた物に加え、ヴィーナスが大量に手持ち花火を買って来たので、豪勢な花火大会になった――"

[[dialogue]]
speaker = "アナ"
# 「ふおぉ……！　これが花火ですか。綺麗なのもありますが、何やら気分が高揚しますね」
line = "「ふおぉ……！　これが花火ですか。綺麗なのもありますが、何やら気分が高揚しますね」"

[[dialogue]]
speaker = "マトイ"
# 「えっ、アナは花火やるの初めて！？」
line = "「えっ、アナは花火やるの初めて！？」"

[[dialogue]]
speaker = "アナ"
# 「ええ、実は。前から興味があったので、夏になったら是非やりたいと思っていたんです」
line = "「ええ、実は。前から興味があったので、夏になったら是非やりたいと思っていたんです」"

[[dialogue]]
speaker = "フィオナ"
# 「アナさんはそういえば、１年生でしたね」
line = "「アナさんはそういえば、１年生でしたね」"

[[dialogue]]
speaker = "マトイ"
# 「そっか、考えてみれば去年まで天界にいたんだもんね。花火をやったことがなくても不思議はないのか……」
line = "「そっか、考えてみれば去年まで天界にいたんだもんね。花火をやったことがなくても不思議はないのか……」"

[[dialogue]]
speaker = "サーシャ"
# 「ふふっ、私も１年生の夏に花火を初めてやったのよね～。当時を思い出すわ～」
line = "「ふふっ、私も１年生の夏に花火を初めてやったのよね～。当時を思い出すわ～」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ならアナ、もっとガンガン花火を使っていいわよ！　私みたいに、両手の指の間に８本持ちで！」
line = "「ならアナ、もっとガンガン花火を使っていいわよ！　私みたいに、両手の指の間に８本持ちで！」"

[[dialogue]]
speaker = "マトイ"
# 「いや点け過ぎでしょ！　煙が凄いことになってるから！」
line = "「いや点け過ぎでしょ！　煙が凄いことになってるから！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「見て見て！　炎の翼みたいでしょ！」
line = "「見て見て！　炎の翼みたいでしょ！」"

[[dialogue]]
speaker = "リップル"
# 「ワオ♪　ヴィーナス、カッコイイ！　ワタシもやりたいで～す♪」
line = "「ワオ♪　ヴィーナス、カッコイイ！　ワタシもやりたいで～す♪」"

[[dialogue]]
speaker = "フィオナ"
# 「ふふっ、リップルさん、真似したがるんじゃないかと思ってました」
line = "「ふふっ、リップルさん、真似したがるんじゃないかと思ってました」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それにしても、花火だけじゃなくて、私もサバイバル合宿に参加したかったわ！　仲間外れにしてずるいわよ！」
line = "「それにしても、花火だけじゃなくて、私もサバイバル合宿に参加したかったわ！　仲間外れにしてずるいわよ！」"

[[dialogue]]
speaker = "アナ"
# 「すみません。３人で話してた際に、唐突に思い付いて始めたので……」
line = "「すみません。３人で話してた際に、唐突に思い付いて始めたので……」"

[[dialogue]]
speaker = "サーシャ"
# 「私も最初は、本当にやるの？　ってビックリしたわ～」
line = "「私も最初は、本当にやるの？　ってビックリしたわ～」"

[[dialogue]]
speaker = "ヴィーナス"
# 「事情は聞いてるけど……それでもやっぱり羨ましい！　だから、今度の長い休みの時は、みんな揃ってやりましょう！」
line = "「事情は聞いてるけど……それでもやっぱり羨ましい！　だから、今度の長い休みの時は、みんな揃ってやりましょう！」"

[[dialogue]]
speaker = "マトイ"
# 「確かに、サバイバル風の合宿なら、私もやりたかったかも」
line = "「確かに、サバイバル風の合宿なら、私もやりたかったかも」"

[[dialogue]]
speaker = "リップル"
# 「私も今度は、最初から参加したいで～す！」
line = "「私も今度は、最初から参加したいで～す！」"

[[dialogue]]
speaker = "unk"
# やるとしたら、冬休みとか？
line = "やるとしたら、冬休みとか？"

[[dialogue]]
speaker = "フィオナ"
# 「なるほど。リゾート結界は常夏ですから、冬でも今回みたいな合宿が出来ますしね」
line = "「なるほど。リゾート結界は常夏ですから、冬でも今回みたいな合宿が出来ますしね」"

[[dialogue]]
speaker = "フィオナ"
# 「今度は是非、流星学園の星徒会も参加させて下さい。前回の合宿の話をしたら皆、凄く羨ましいって食いついてましたから」
line = "「今度は是非、流星学園の星徒会も参加させて下さい。前回の合宿の話をしたら皆、凄く羨ましいって食いついてましたから」"

[[dialogue]]
speaker = "リップル"
# 「フィオナの友達ともワタシ、仲良くなりたいで～す♪」
line = "「フィオナの友達ともワタシ、仲良くなりたいで～す♪」"

[[dialogue]]
speaker = "リップル"
# 「このリゾート結界のプライベートビーチは、今後も両校の星徒会室に空間を繋げておきますので、自由に使ってクダさい！」
line = "「このリゾート結界のプライベートビーチは、今後も両校の星徒会室に空間を繋げておきますので、自由に使ってクダさい！」"

[[dialogue]]
speaker = "マトイ"
# 「えっ、本当に！？　それって凄くない！？」
line = "「えっ、本当に！？　それって凄くない！？」"

[[dialogue]]
speaker = "リップル"
# 「ハイ♪　夏の海はフメツで～す♪」
line = "「ハイ♪　夏の海はフメツで～す♪」"

[[dialogue]]
speaker = "サーシャ"
# 「あらあら、うふふ♪　今後は水着でいる機会も多くなりそうね～」
line = "「あらあら、うふふ♪　今後は水着でいる機会も多くなりそうね～」"

[[dialogue]]
speaker = "リップル"
# 「それと、花火大会でもワタシ、とっておきを用意してきてるんデスよ～♪」
line = "「それと、花火大会でもワタシ、とっておきを用意してきてるんデスよ～♪」"

[[dialogue]]
speaker = "リップル"
# 「海の方を御覧アレで～す！　そぉいっ♪」
line = "「海の方を御覧アレで～す！　そぉいっ♪」"

[[dialogue]]
speaker = "サーシャ"
# 「きゃ～♪　凄いスゴ～い！　打ち上げ花火ね～♪」
line = "「きゃ～♪　凄いスゴ～い！　打ち上げ花火ね～♪」"

[[dialogue]]
speaker = "リップル"
# 「ハイ♪　頑張ってツクリました！」
line = "「ハイ♪　頑張ってツクリました！」"

[[dialogue]]
speaker = "リップル"
# 「まだまだ沢山ありますよ～！　じゃんじゃん連発しま～す♪」
line = "「まだまだ沢山ありますよ～！　じゃんじゃん連発しま～す♪」"

[[dialogue]]
speaker = "アナ"
# 「おぉ～……！　これが打ち上げ花火……！」
line = "「おぉ～……！　これが打ち上げ花火……！」"

[[dialogue]]
speaker = "アナ"
# 「動画で見るのとは全然迫力が違います……！　体に響いて……綺麗で、感動します」
line = "「動画で見るのとは全然迫力が違います……！　体に響いて……綺麗で、感動します」"

[[dialogue]]
speaker = "unk"
# た～まや～！
line = "た～まや～！"

[[dialogue]]
speaker = "アナ"
# 「あっ、会長。それは花火伝統の掛け声ですね。今なら何となく、言いたくなる気持ちが分かります」
line = "「あっ、会長。それは花火伝統の掛け声ですね。今なら何となく、言いたくなる気持ちが分かります」"

[[dialogue]]
speaker = "サーシャ"
# 「か～ぎや～♪　うふふ、花火大会とは言ってたけど、まさかこんな大きな打ち上げ花火まで見られるとは思わなかったわ～♪」
line = "「か～ぎや～♪　うふふ、花火大会とは言ってたけど、まさかこんな大きな打ち上げ花火まで見られるとは思わなかったわ～♪」"

[[dialogue]]
speaker = "サーシャ"
# 「――アナちゃん、ありがとうね」
line = "「――アナちゃん、ありがとうね」"

[[dialogue]]
speaker = "アナ"
# 「いえ、打ち上げ花火はリップルさんのサプライズですから、私も計算外のことで……」
line = "「いえ、打ち上げ花火はリップルさんのサプライズですから、私も計算外のことで……」"

[[dialogue]]
speaker = "サーシャ"
# 「ううん。そうじゃなくて、私の為に合宿をしてくれたこと♪」
line = "「ううん。そうじゃなくて、私の為に合宿をしてくれたこと♪」"

[[dialogue]]
speaker = "サーシャ"
# 「私は、今年が学園で過ごす最後の夏でしょう？　だからアナちゃんは、サバイバル合宿をしようって言ってくれたのよね？」
line = "「私は、今年が学園で過ごす最後の夏でしょう？　だからアナちゃんは、サバイバル合宿をしようって言ってくれたのよね？」"

[[dialogue]]
speaker = "アナ"
# 「……はて、何のことでしょう？」
line = "「……はて、何のことでしょう？」"

[[dialogue]]
speaker = "サーシャ"
# 「誤魔化しても分かっちゃうわよ～。こう見えてもお姉ちゃん、元星徒会長なんだから」
line = "「誤魔化しても分かっちゃうわよ～。こう見えてもお姉ちゃん、元星徒会長なんだから」"

[[dialogue]]
speaker = "サーシャ"
# 「アナちゃんがヴィーナスちゃんみたいに積極的なことを言い出せば、おや？　って思うくらいには、ちゃんと見てるのよ？」
line = "「アナちゃんがヴィーナスちゃんみたいに積極的なことを言い出せば、おや？　って思うくらいには、ちゃんと見てるのよ？」"

[[dialogue]]
speaker = "アナ"
# 「……まあ、サーシャ先輩にはお世話になってますし、私は一応、星徒会の副会長ですから」
line = "「……まあ、サーシャ先輩にはお世話になってますし、私は一応、星徒会の副会長ですから」"

[[dialogue]]
speaker = "アナ"
# 「星徒会の後輩として、役目を果たしたまでです」
line = "「星徒会の後輩として、役目を果たしたまでです」"

[[dialogue]]
speaker = "サーシャ"
# 「ん～！　アナちゃ～ん♪」
line = "「ん～！　アナちゃ～ん♪」"

[[dialogue]]
speaker = "アナ"
# 「おうっ……サーシャ先輩、おっぱいで息ができないです」
line = "「おうっ……サーシャ先輩、おっぱいで息ができないです」"

[[dialogue]]
speaker = "サーシャ"
# 「だって、アナちゃんが抱き締めたくなるようなことを言うんだもの♪」
line = "「だって、アナちゃんが抱き締めたくなるようなことを言うんだもの♪」"

[[dialogue]]
speaker = "サーシャ"
# 「私ね、魔界を出て、新星学園に来て本当に良かったわ」
line = "「私ね、魔界を出て、新星学園に来て本当に良かったわ」"

[[dialogue]]
speaker = "サーシャ"
# 「こうして、皆に出会えたから」
line = "「こうして、皆に出会えたから」"

[[dialogue]]
speaker = "サーシャ"
# 「家族みたいに大切に思える皆と出会えて、私とっても幸せよ」
line = "「家族みたいに大切に思える皆と出会えて、私とっても幸せよ」"

[[dialogue]]
speaker = "unk"
# そう言われたら、来年も夏合宿しないとですね
line = "そう言われたら、来年も夏合宿しないとですね"

[[dialogue]]
speaker = "アナ"
# 「確かに。家族なら、卒業しても関係ないですから」
line = "「確かに。家族なら、卒業しても関係ないですから」"

[[dialogue]]
speaker = "サーシャ"
# 「あ～ん<emoji=heart04>　会長くんもありがと～♪　ぎゅ～っ<emoji=heart04>」
line = "「あ～ん<emoji=heart04>　会長くんもありがと～♪　ぎゅ～っ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# サーシャさん、息が苦しいです
line = "サーシャさん、息が苦しいです"

[[dialogue]]
speaker = "サーシャ"
# 「あらあら、うふふ♪　ごめんなさい、嬉しくなっちゃって♪」
line = "「あらあら、うふふ♪　ごめんなさい、嬉しくなっちゃって♪」"

[[dialogue]]
speaker = "サーシャ"
# 「――お姉ちゃん、今からとっても、来年が楽しみだわ♪」
line = "「――お姉ちゃん、今からとっても、来年が楽しみだわ♪」"

[[dialogue]]
speaker = "unk"
# そう言って皆と一緒に花火を見上げながら、サーシャさんは嬉しそうな笑顔を浮かべるのだった。
line = "そう言って皆と一緒に花火を見上げながら、サーシャさんは嬉しそうな笑顔を浮かべるのだった。"
