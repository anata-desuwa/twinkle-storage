[[dialogue]]
speaker = "unk"
# 第２話,最後の稽古,B
line = "第２話,最後の稽古,B"

[[dialogue]]
speaker = "クロト"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# 俺は当て所もなくフィーニスの塔へやってきていた。
line = "俺は当て所もなくフィーニスの塔へやってきていた。"

[[dialogue]]
speaker = "unk"
# 何度もこの周辺は調査しているが、やはり残された手がかりはない。
line = "何度もこの周辺は調査しているが、やはり残された手がかりはない。"

[[dialogue]]
speaker = "unk"
# そこへ……
line = "そこへ……"

[[dialogue]]
speaker = "セイファート"
# 「──憔悴か」
line = "「──憔悴か」"

[[dialogue]]
speaker = "クロト"
# 「！　セイファート──学園長……」
line = "「！　セイファート──学園長……」"

[[dialogue]]
speaker = "セイファート"
# 「激戦の後だ。今は教師陣に任せ、少しは休養しておくといい」
line = "「激戦の後だ。今は教師陣に任せ、少しは休養しておくといい」"

[[dialogue]]
speaker = "クロト"
# 「……ご忠告痛み入ります。ただ……今はとても、落ち着いていられる精神状態じゃないんですよ」
line = "「……ご忠告痛み入ります。ただ……今はとても、落ち着いていられる精神状態じゃないんですよ」"

[[dialogue]]
speaker = "セイファート"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "セイファート"
# 「君にとって……本当に大切な存在のようだな」
line = "「君にとって……本当に大切な存在のようだな」"

[[dialogue]]
speaker = "クロト"
# 「……ええ。──俺を星徒会長にしてくれたのも、彼女ですから」
line = "「……ええ。──俺を星徒会長にしてくれたのも、彼女ですから」"

[[dialogue]]
speaker = "セイファート"
# 「御前試合か。懐かしいな」
line = "「御前試合か。懐かしいな」"

[[dialogue]]
speaker = "unk"
# 御前試合。
line = "御前試合。"

[[dialogue]]
speaker = "unk"
# あれが日誌に組み込まれた既定の運命だったとしても、俺にとって最大の岐路だったのには違いない。
line = "あれが日誌に組み込まれた既定の運命だったとしても、俺にとって最大の岐路だったのには違いない。"

[[dialogue]]
speaker = "セイファート"
# 「大切な仲間と巡り会えたなら喜ばしいことだ」
line = "「大切な仲間と巡り会えたなら喜ばしいことだ」"

[[dialogue]]
speaker = "クロト"
# 「はい。大切な仲間……かけがえのない……ただ」
line = "「はい。大切な仲間……かけがえのない……ただ」"

[[dialogue]]
speaker = "クロト"
# 「……それだけじゃない。そんな気も、するんです」
line = "「……それだけじゃない。そんな気も、するんです」"

[[dialogue]]
speaker = "セイファート"
# 「む……？」
line = "「む……？」"

[[dialogue]]
speaker = "unk"
# マトイだってアナだってサーシャ先輩だって、もちろん俺にとってみんな大切な仲間だ。
line = "マトイだってアナだってサーシャ先輩だって、もちろん俺にとってみんな大切な仲間だ。"

[[dialogue]]
speaker = "unk"
# だけど、彼女だけは……
line = "だけど、彼女だけは……"

[[dialogue]]
speaker = "unk"
# ヴィーナスだけは、俺にとって<b>特別</b>であるような気がしてならなかった。
line = "ヴィーナスだけは、俺にとって<b>特別</b>であるような気がしてならなかった。"

[[dialogue]]
speaker = "unk"
# 出会った時から……ずっと。
line = "出会った時から……ずっと。"

[[dialogue]]
speaker = "クロト"
# 「──そうだ。お願いがあります、学園長」
line = "「──そうだ。お願いがあります、学園長」"

[[dialogue]]
speaker = "セイファート"
# 「何かな」
line = "「何かな」"

[[dialogue]]
speaker = "クロト"
# 「俺は弱い」
line = "「俺は弱い」"

[[dialogue]]
speaker = "クロト"
# 「あなたに……強くあれと言われたあの日から。俺なりに成長はしたつもりでいたけど、まだ足りない」
line = "「あなたに……強くあれと言われたあの日から。俺なりに成長はしたつもりでいたけど、まだ足りない」"

[[dialogue]]
speaker = "セイファート"
# 「……見違えたと思ったがな」
line = "「……見違えたと思ったがな」"

[[dialogue]]
speaker = "unk"
# そう思ってもらえるのは何より。
line = "そう思ってもらえるのは何より。"

[[dialogue]]
speaker = "unk"
# だが、今の体たらくじゃ俺自身がとても納得できない。だから。
line = "だが、今の体たらくじゃ俺自身がとても納得できない。だから。"

[[dialogue]]
speaker = "クロト"
# 「──稽古をつけてくれませんか。セイファート学園長」
line = "「──稽古をつけてくれませんか。セイファート学園長」"

[[dialogue]]
speaker = "セイファート"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "unk"
# それは俺が彼と再会して以来、初めての申し出だった。
line = "それは俺が彼と再会して以来、初めての申し出だった。"

[[dialogue]]
speaker = "クロト"
# 「男として……星騎士として……俺はもっと、力をつけなくちゃならないから」
line = "「男として……星騎士として……俺はもっと、力をつけなくちゃならないから」"

[[dialogue]]
speaker = "セイファート"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# 学園長はじっ……と黙して俺のことを見据えていた。しばらくして──
line = "学園長はじっ……と黙して俺のことを見据えていた。しばらくして──"

[[dialogue]]
speaker = "セイファート"
# 「──いいだろう。かつて示した道筋──再び照らしてやるのも<ruby=やぶさ>吝</ruby>かではない」
line = "「──いいだろう。かつて示した道筋──再び照らしてやるのも<ruby>吝<rt>やぶさ</rt></ruby>かではない」"

[[dialogue]]
speaker = "クロト"
# 「胸をお借りします。あの時、授かった薫陶は──未だ忘れていませんから」
line = "「胸をお借りします。あの時、授かった薫陶は──未だ忘れていませんから」"

[[dialogue]]
speaker = "unk"
# 学園長の全身から底知れぬ星力がほとばしる。
line = "学園長の全身から底知れぬ星力がほとばしる。"

[[dialogue]]
speaker = "unk"
# 通常は、大人になるにつれて衰えていくという力も──この人の規格外さには及ばないようだ。
line = "通常は、大人になるにつれて衰えていくという力も──この人の規格外さには及ばないようだ。"

[[dialogue]]
speaker = "セイファート"
# 「加減は無用。御前試合の時に見せた片鱗も合わせて──全霊をもって挑んでくるがいい」
line = "「加減は無用。御前試合の時に見せた片鱗も合わせて──全霊をもって挑んでくるがいい」"

[[dialogue]]
speaker = "クロト"
# 「ええ──遠慮なくいかせてもらいます。──おおおおっ！」
line = "「ええ──遠慮なくいかせてもらいます。──おおおおっ！」"

[[dialogue]]
speaker = "unk"
# そうして俺は、やりきれない思いと共に星力を解放した……。
line = "そうして俺は、やりきれない思いと共に星力を解放した……。"
