[[dialogue]]
speaker = "unk"
# 星徒会室で合宿の開催が決定した翌日の朝。
line = "星徒会室で合宿の開催が決定した翌日の朝。"

[[dialogue]]
speaker = "unk"
# 俺達はリゾート結界のビーチに集合していた――
line = "俺達はリゾート結界のビーチに集合していた――"

[[dialogue]]
speaker = "アナ"
# 「リップルさん、今回はリゾート結界を貸して頂き、ありがとうございます」
line = "「リップルさん、今回はリゾート結界を貸して頂き、ありがとうございます」"

[[dialogue]]
speaker = "リップル"
# 「アハハ～、お礼なんていいデスよ～。むしろこれは、前の合宿でワタシが皆に助けて貰ったことへのお礼デスから！」
line = "「アハハ～、お礼なんていいデスよ～。むしろこれは、前の合宿でワタシが皆に助けて貰ったことへのお礼デスから！」"

[[dialogue]]
speaker = "サーシャ"
# 「でも、まさか星徒会用のプライベートビーチを作ってくれるなんて、思わなかったわ～。まさに無人島で、お姉ちゃんウキウキしちゃう♪」
line = "「でも、まさか星徒会用のプライベートビーチを作ってくれるなんて、思わなかったわ～。まさに無人島で、お姉ちゃんウキウキしちゃう♪」"

[[dialogue]]
speaker = "リップル"
# 「この結界は、ワタシが学園の皆さんに開放している『パブリックビーチ』をコピーしてツクった、もう１つのリゾート結界で～す」
line = "「この結界は、ワタシが学園の皆さんに開放している『パブリックビーチ』をコピーしてツクった、もう１つのリゾート結界で～す」"

[[dialogue]]
speaker = "サーシャ"
# 「そんなことも出来ちゃうのね～」
line = "「そんなことも出来ちゃうのね～」"

[[dialogue]]
speaker = "アナ"
# 「まさに万能。リップルさん、もはや出来ないことはないのでは？」
line = "「まさに万能。リップルさん、もはや出来ないことはないのでは？」"

[[dialogue]]
speaker = "リップル"
# 「残念ながら、そこまで万能ではナイです。リゾート結界を召喚することは、いつでもデキますが――」
line = "「残念ながら、そこまで万能ではナイです。リゾート結界を召喚することは、いつでもデキますが――」"

[[dialogue]]
speaker = "リップル"
# 「結界の中で何かを新しくツクったり、イジったり出来るのは夏の期間だけ。夏パワーが最大出力の時じゃないと、デキないです」
line = "「結界の中で何かを新しくツクったり、イジったり出来るのは夏の期間だけ。夏パワーが最大出力の時じゃないと、デキないです」"

[[dialogue]]
speaker = "サーシャ"
# 「夏パワー？」
line = "「夏パワー？」"

[[dialogue]]
speaker = "リップル"
# 「ハイ。ワタシの力には周期があって、夏の時期が１番強くなるんです。それでワタシは夏パワーって呼んでます」
line = "「ハイ。ワタシの力には周期があって、夏の時期が１番強くなるんです。それでワタシは夏パワーって呼んでます」"

[[dialogue]]
speaker = "アナ"
# 「なるほど、人狼系の魔族は月の満ち欠けによって、星力が変化すると聞いたことがあります。おそらくリップルさんのは、それに近い特性なのでしょう」
line = "「なるほど、人狼系の魔族は月の満ち欠けによって、星力が変化すると聞いたことがあります。おそらくリップルさんのは、それに近い特性なのでしょう」"

[[dialogue]]
speaker = "リップル"
# 「なので、今の内に皆さんへお礼をしたかったんです♪　せっかくのサバイバル合宿なら、他に人が居ない方が雰囲気も出るかとオモいますし！」
line = "「なので、今の内に皆さんへお礼をしたかったんです♪　せっかくのサバイバル合宿なら、他に人が居ない方が雰囲気も出るかとオモいますし！」"

[[dialogue]]
speaker = "リップル"
# 「ちなみに海の家に設置した扉と、新星学園の星徒会室を繋げてあるので、そこから出入り自由になってま～す♪」
line = "「ちなみに海の家に設置した扉と、新星学園の星徒会室を繋げてあるので、そこから出入り自由になってま～す♪」"

[[dialogue]]
speaker = "unk"
# 凄い便利……！
line = "凄い便利……！"

[[dialogue]]
speaker = "リップル"
# 「１つ残念なのは、ワタシも出来ればサバイバル合宿に参加したかったのデスが、今はパブリックビーチの方で海の家が忙しくて、なかなか手が離せないことデスね……」
line = "「１つ残念なのは、ワタシも出来ればサバイバル合宿に参加したかったのデスが、今はパブリックビーチの方で海の家が忙しくて、なかなか手が離せないことデスね……」"

[[dialogue]]
speaker = "リップル"
# 「あ、でも、言ってくれれば、結界をチョチョイと弄ってサポートするくらいは全然デキますので、何かあれば呼んでクダさい！」
line = "「あ、でも、言ってくれれば、結界をチョチョイと弄ってサポートするくらいは全然デキますので、何かあれば呼んでクダさい！」"

[[dialogue]]
speaker = "アナ"
# 「ありがとうございます。リップルさんも、もし時間が空きましたら遊びに来て下さい」
line = "「ありがとうございます。リップルさんも、もし時間が空きましたら遊びに来て下さい」"

[[dialogue]]
speaker = "unk"
# 途中参加も待ってるよ
line = "途中参加も待ってるよ"

[[dialogue]]
speaker = "サーシャ"
# 「喜んで歓迎するわ～♪」
line = "「喜んで歓迎するわ～♪」"

[[dialogue]]
speaker = "リップル"
# 「ハイ♪　また様子を見に来ますね！」
line = "「ハイ♪　また様子を見に来ますね！」"

[[dialogue]]
speaker = "リップル"
# 「それじゃあ、ワタシはそろそろ海の家を開店するジカンなので、パブリックビーチの方へ行ってキマ～す！」
line = "「それじゃあ、ワタシはそろそろ海の家を開店するジカンなので、パブリックビーチの方へ行ってキマ～す！」"

[[dialogue]]
speaker = "サーシャ"
# 「は～い、行ってらっしゃい♪　リップルちゃん、海の家頑張って～」
line = "「は～い、行ってらっしゃい♪　リップルちゃん、海の家頑張って～」"

[[dialogue]]
speaker = "リップル"
# 「サーシャ達も合宿、頑張ってクダさい♪」
line = "「サーシャ達も合宿、頑張ってクダさい♪」"

[[dialogue]]
speaker = "unk"
# そうしてリップルを見送った後、アナの号令でサバイバル合宿はスタートした。
line = "そうしてリップルを見送った後、アナの号令でサバイバル合宿はスタートした。"

[[dialogue]]
speaker = "アナ"
# 「――それでは、まずはサバイバル合宿を開始するに当たって、昨日決めておいたルールを再確認しましょう」
line = "「――それでは、まずはサバイバル合宿を開始するに当たって、昨日決めておいたルールを再確認しましょう」"

[[dialogue]]
speaker = "サーシャ"
# 「は～い♪」
line = "「は～い♪」"

[[dialogue]]
speaker = "アナ"
# 「合宿の期間は、今日から週末にかけての３泊４日です」
line = "「合宿の期間は、今日から週末にかけての３泊４日です」"

[[dialogue]]
speaker = "アナ"
# 「緊急時以外は結界の外へ出たり、海の家を使うことは禁止となります」
line = "「緊急時以外は結界の外へ出たり、海の家を使うことは禁止となります」"

[[dialogue]]
speaker = "アナ"
# 「ただし、身だしなみはやはり気になるので、温泉に入って体を洗うのは可とします」
line = "「ただし、身だしなみはやはり気になるので、温泉に入って体を洗うのは可とします」"

[[dialogue]]
speaker = "サーシャ"
# 「寝泊まりについては、これからビーチにテントを設営して、そこでするんだったわよね？」
line = "「寝泊まりについては、これからビーチにテントを設営して、そこでするんだったわよね？」"

[[dialogue]]
speaker = "サーシャ"
# 「食料は無人島内で調達して、飲み水は海の家を使わずに、無人島の湧き水を汲んで来る」
line = "「食料は無人島内で調達して、飲み水は海の家を使わずに、無人島の湧き水を汲んで来る」"

[[dialogue]]
speaker = "サーシャ"
# 「つまりは、ビーチでのサマーキャンプということね～」
line = "「つまりは、ビーチでのサマーキャンプということね～」"

[[dialogue]]
speaker = "アナ"
# 「その通りです。厳密にはサバイバル風合宿といった感じになりますが、あくまで楽しむことが第一目的ですし」
line = "「その通りです。厳密にはサバイバル風合宿といった感じになりますが、あくまで楽しむことが第一目的ですし」"

[[dialogue]]
speaker = "アナ"
# 「会長はともかく、私とサーシャ先輩にはサバイバル経験がありませんので、今回はこれくらいのレベルから始めるのがいいのではないかと」
line = "「会長はともかく、私とサーシャ先輩にはサバイバル経験がありませんので、今回はこれくらいのレベルから始めるのがいいのではないかと」"

[[dialogue]]
speaker = "アナ"
# 「ただ、この前の前会長は、最初から本気サバイバルをやる予定だった気がしますが……」
line = "「ただ、この前の前会長は、最初から本気サバイバルをやる予定だった気がしますが……」"

[[dialogue]]
speaker = "サーシャ"
# 「ふふっ♪　ヴィーナスちゃんは初めてのサバイバルでも、私達なら何とかなるって、信じてた感じよね～」
line = "「ふふっ♪　ヴィーナスちゃんは初めてのサバイバルでも、私達なら何とかなるって、信じてた感じよね～」"

[[dialogue]]
speaker = "unk"
# 相変わらず無茶振りですね……
line = "相変わらず無茶振りですね……"

[[dialogue]]
speaker = "サーシャ"
# 「でも、そのおかげでリップルちゃんと出会えたから、結果オーライだったのがヴィーナスちゃんらしいところよね～♪」
line = "「でも、そのおかげでリップルちゃんと出会えたから、結果オーライだったのがヴィーナスちゃんらしいところよね～♪」"

[[dialogue]]
speaker = "アナ"
# 「そこが前会長のカリスマ性というか、真似できないところですね」
line = "「そこが前会長のカリスマ性というか、真似できないところですね」"

[[dialogue]]
speaker = "アナ"
# 「そんなわけで、無茶振りはあくまで前会長の特権です。私達は今回、サバイバルの雰囲気を楽しむ感じで行きたいと思います」
line = "「そんなわけで、無茶振りはあくまで前会長の特権です。私達は今回、サバイバルの雰囲気を楽しむ感じで行きたいと思います」"

[[dialogue]]
speaker = "アナ"
# 「お２人はそれでよろしいでしょうか？」
line = "「お２人はそれでよろしいでしょうか？」"

[[dialogue]]
speaker = "サーシャ"
# 「ええ。アナちゃんの考えてくれたルールで問題ないと思うわ～」
line = "「ええ。アナちゃんの考えてくれたルールで問題ないと思うわ～」"

[[dialogue]]
speaker = "unk"
# 俺も大丈夫
line = "俺も大丈夫"

[[dialogue]]
speaker = "アナ"
# 「それじゃあ早速、テントの設営から始めて行きましょう」
line = "「それじゃあ早速、テントの設営から始めて行きましょう」"

[[dialogue]]
speaker = "アナ"
# 「会長、ご指導よろしくお願いします」
line = "「会長、ご指導よろしくお願いします」"

[[dialogue]]
speaker = "unk"
# 任せてくれ！
line = "任せてくれ！"

[[dialogue]]
speaker = "サーシャ"
# 「頼りにしてるわ、会長くん♪」
line = "「頼りにしてるわ、会長くん♪」"

[[dialogue]]
speaker = "unk"
# 俺はそれから２人に、テントの設置のやり方を教えて行くのだった――
line = "俺はそれから２人に、テントの設置のやり方を教えて行くのだった――"
