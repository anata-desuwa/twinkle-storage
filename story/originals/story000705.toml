[[dialogue]]
speaker = "unk"
# そうして、年は明けて――
line = "そうして、年は明けて――"

[[dialogue]]
speaker = "unk"
# 迎えた新年、元旦当日。
line = "迎えた新年、元旦当日。"

[[dialogue]]
speaker = "unk"
# 俺は新星学園の校門前で、サーシャさんと待ち合わせをしていた。
line = "俺は新星学園の校門前で、サーシャさんと待ち合わせをしていた。"

[[dialogue]]
speaker = "？？？"
# 「会長く～ん♪」
line = "「会長く～ん♪」"

[[dialogue]]
speaker = "サーシャ"
# 「あけましておめでと～♪」
line = "「あけましておめでと～♪」"

[[dialogue]]
speaker = "unk"
# サーシャさん、晴れ着似合ってますね！
line = "サーシャさん、晴れ着似合ってますね！"

[[dialogue]]
speaker = "サーシャ"
# 「あらあらうふふ♪　ありがと～。お姉ちゃん、褒められて嬉しくなっちゃうわ～♪」
line = "「あらあらうふふ♪　ありがと～。お姉ちゃん、褒められて嬉しくなっちゃうわ～♪」"

[[dialogue]]
speaker = "サーシャ"
# 「この晴れ着、実はヘレナさんがデザインした新しい戦闘服でね。起動する為のデータが欲しいってことで、ヴィーナスちゃんがくれたの～」
line = "「この晴れ着、実はヘレナさんがデザインした新しい戦闘服でね。起動する為のデータが欲しいってことで、ヴィーナスちゃんがくれたの～」"

[[dialogue]]
speaker = "サーシャ"
# 「って、あら？　そういえば、ヴィーナスちゃんの姿が見えないけど……？」
line = "「って、あら？　そういえば、ヴィーナスちゃんの姿が見えないけど……？」"

[[dialogue]]
speaker = "サーシャ"
# 「――初詣の場所で合流する予定？　そうなのね～。他になにか用事でもあったのかしら？」
line = "「――初詣の場所で合流する予定？　そうなのね～。他になにか用事でもあったのかしら？」"

[[dialogue]]
speaker = "？？？"
# 「会長く～ん♪」
line = "「会長く～ん♪」"

[[dialogue]]
speaker = "サーシャ"
# 「あら？」
line = "「あら？」"

[[dialogue]]
speaker = "ウズメイア"
# 「あけおめ～！　じゃじゃ～ん♪」
line = "「あけおめ～！　じゃじゃ～ん♪」"

[[dialogue]]
speaker = "ウズメイア"
# 「これが、あたしの晴れ着姿だよ♪　会長くん、どうどう？　男子的な感想、聞かせて欲しいし♪」
line = "「これが、あたしの晴れ着姿だよ♪　会長くん、どうどう？　男子的な感想、聞かせて欲しいし♪」"

[[dialogue]]
speaker = "unk"
# す、すごく似合ってると思うけど……
line = "す、すごく似合ってると思うけど……"

[[dialogue]]
speaker = "ウズメイア"
# 「え？　なになに？　――アレンジが派手？」
line = "「え？　なになに？　――アレンジが派手？」"

[[dialogue]]
speaker = "ウズメイア"
# 「えっへへ～、これ超イケてるっしょ～？　ヘレナさんに提案したら、ノリノリでデザインしてくれたんだ～」
line = "「えっへへ～、これ超イケてるっしょ～？　ヘレナさんに提案したら、ノリノリでデザインしてくれたんだ～」"

[[dialogue]]
speaker = "ウズメイア"
# 「これぞ、日本伝統文化の最先端、って感じ？」
line = "「これぞ、日本伝統文化の最先端、って感じ？」"

[[dialogue]]
speaker = "サーシャ"
# 「ウズメちゃ～ん！　久しぶりね～♪」
line = "「ウズメちゃ～ん！　久しぶりね～♪」"

[[dialogue]]
speaker = "ウズメイア"
# 「あっ、サーシャ先輩！　あけおめです～♪」
line = "「あっ、サーシャ先輩！　あけおめです～♪」"

[[dialogue]]
speaker = "ウズメイア"
# 「ていうか、うわぁぁぁっ♪　サーシャ先輩、晴れ着似合い過ぎだし！　めっちゃ色っぽいんだけど～♪」
line = "「ていうか、うわぁぁぁっ♪　サーシャ先輩、晴れ着似合い過ぎだし！　めっちゃ色っぽいんだけど～♪」"

[[dialogue]]
speaker = "サーシャ"
# 「あらあらうふふ♪　ウズメちゃんの方こそ、すごく可愛いわ～♪　思わず妹にしちゃいたいくらい♪」
line = "「あらあらうふふ♪　ウズメちゃんの方こそ、すごく可愛いわ～♪　思わず妹にしちゃいたいくらい♪」"

[[dialogue]]
speaker = "ウズメイア"
# 「もう、サーシャ先輩ってば、ソフィアが聞いたら拗ねちゃいますよ～？」
line = "「もう、サーシャ先輩ってば、ソフィアが聞いたら拗ねちゃいますよ～？」"

[[dialogue]]
speaker = "サーシャ"
# 「あの子は拗ねてるところも可愛くてね～？　って、いけないわね。こういうことばかり言っていると、また怒らせちゃうわ」
line = "「あの子は拗ねてるところも可愛くてね～？　って、いけないわね。こういうことばかり言っていると、また怒らせちゃうわ」"

[[dialogue]]
speaker = "サーシャ"
# 「そういえば、さっきヘレナさんがデザインしてくれたって言っていたけれど、もしかしてウズメちゃんのも晴れ着フォームなのかしら？」
line = "「そういえば、さっきヘレナさんがデザインしてくれたって言っていたけれど、もしかしてウズメちゃんのも晴れ着フォームなのかしら？」"

[[dialogue]]
speaker = "ウズメイア"
# 「えっ、ってことは、サーシャ先輩も？　マジマジ！？　お揃いじゃ～ん♪」
line = "「えっ、ってことは、サーシャ先輩も？　マジマジ！？　お揃いじゃ～ん♪」"

[[dialogue]]
speaker = "サーシャ"
# 「うふふっ♪　ウズメちゃん、和装の戦闘服が欲しかったって言ってたものね～」
line = "「うふふっ♪　ウズメちゃん、和装の戦闘服が欲しかったって言ってたものね～」"

[[dialogue]]
speaker = "ウズメイア"
# 「そうなんですよ～。でも、まだ起動が上手く行ってなくて～」
line = "「そうなんですよ～。でも、まだ起動が上手く行ってなくて～」"

[[dialogue]]
speaker = "サーシャ"
# 「そっかそっか。ウズメちゃんもまだなのね～。今度機会があったら、色々試してみましょうか」
line = "「そっかそっか。ウズメちゃんもまだなのね～。今度機会があったら、色々試してみましょうか」"

[[dialogue]]
speaker = "サーシャ"
# 「それと、ウズメちゃんと会長くん、いつの間にか知り合いだったのね～」
line = "「それと、ウズメちゃんと会長くん、いつの間にか知り合いだったのね～」"

[[dialogue]]
speaker = "ウズメイア"
# 「実はこの間、知り合ったんですよ～。会長くん、すごく話しやすいから、あっという間に仲良くなっちゃって～♪」
line = "「実はこの間、知り合ったんですよ～。会長くん、すごく話しやすいから、あっという間に仲良くなっちゃって～♪」"

[[dialogue]]
speaker = "ウズメイア"
# 「ね、会長くん♪」
line = "「ね、会長くん♪」"

[[dialogue]]
speaker = "unk"
# すっかり友達になっちゃったな
line = "すっかり友達になっちゃったな"

[[dialogue]]
speaker = "サーシャ"
# 「２人共、友達作り得意だものね～。確かに気が合いそうだわ」
line = "「２人共、友達作り得意だものね～。確かに気が合いそうだわ」"

[[dialogue]]
speaker = "サーシャ"
# 「それで、晴れ着を着てるってことは、ウズメちゃんもこれから初詣かしら？」
line = "「それで、晴れ着を着てるってことは、ウズメちゃんもこれから初詣かしら？」"

[[dialogue]]
speaker = "ウズメイア"
# 「そのことなんですけど、実は、あたしもサーシャ先輩たちの初詣に、参加させてもらいたいなって思ってまして！」
line = "「そのことなんですけど、実は、あたしもサーシャ先輩たちの初詣に、参加させてもらいたいなって思ってまして！」"

[[dialogue]]
speaker = "サーシャ"
# 「あら、そうなの？」
line = "「あら、そうなの？」"

[[dialogue]]
speaker = "unk"
# それから俺たちは電車に乗って、流星市国の外へと移動することになった。
line = "それから俺たちは電車に乗って、流星市国の外へと移動することになった。"

[[dialogue]]
speaker = "unk"
# 流星市国は日本の中――もっと言えば、東京の一角に存在している小さな国だ。
line = "流星市国は日本の中――もっと言えば、東京の一角に存在している小さな国だ。"

[[dialogue]]
speaker = "unk"
# そして、流星教を国教としている為、お寺や神社は存在しない。
line = "そして、流星教を国教としている為、お寺や神社は存在しない。"

[[dialogue]]
speaker = "unk"
# その為、初詣をするなら、東京まで出向くのが一般的である。
line = "その為、初詣をするなら、東京まで出向くのが一般的である。"

[[dialogue]]
speaker = "unk"
# というわけで、俺たちは東京のとある有名なお寺へとやってきていた――
line = "というわけで、俺たちは東京のとある有名なお寺へとやってきていた――"

[[dialogue]]
speaker = "ヴィーナス"
# 「あっ、来たわね！　あけましておめでとう、みんな♪」
line = "「あっ、来たわね！　あけましておめでとう、みんな♪」"

[[dialogue]]
speaker = "ウズメイア"
# 「ヴィーナス先輩、あけおめ～♪　やばっ！　先輩の晴れ着姿も、めちゃめちゃ綺麗なんだけど～！」
line = "「ヴィーナス先輩、あけおめ～♪　やばっ！　先輩の晴れ着姿も、めちゃめちゃ綺麗なんだけど～！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふっふ～ん♪　ありがと！　たまには九浄家の娘らしく、和服姿も見せないとね！」
line = "「ふっふ～ん♪　ありがと！　たまには九浄家の娘らしく、和服姿も見せないとね！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロト、どうかしら？　今日は大人な女性を目指して、お化粧もバッチリしてもらって来たのよ！」
line = "「クロト、どうかしら？　今日は大人な女性を目指して、お化粧もバッチリしてもらって来たのよ！」"

[[dialogue]]
speaker = "unk"
# すごく似合ってる。綺麗だ
line = "すごく似合ってる。綺麗だ"

[[dialogue]]
speaker = "ヴィーナス"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そ、そう。似合ってるならよかったわ！　うん！」
line = "「そ、そう。似合ってるならよかったわ！　うん！」"

[[dialogue]]
speaker = "サーシャ"
# 「あら～♪　ヴィーナスちゃんが珍しく照れてるわ～♪　かわいい～♪」
line = "「あら～♪　ヴィーナスちゃんが珍しく照れてるわ～♪　かわいい～♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「へっ！？　サーシャさん、何を言っているの！　そんなことないわよ！？」
line = "「へっ！？　サーシャさん、何を言っているの！　そんなことないわよ！？」"

[[dialogue]]
speaker = "サーシャ"
# 「うふふっ♪　言いながらも、顔がニヤニヤしちゃってるわよ～？」
line = "「うふふっ♪　言いながらも、顔がニヤニヤしちゃってるわよ～？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「も、もう、サーシャさんってば！　うぅ～……！」
line = "「も、もう、サーシャさんってば！　うぅ～……！」"

[[dialogue]]
speaker = "unk"
# そして――
line = "そして――"

[[dialogue]]
speaker = "？？？"
# 「姉さん」
line = "「姉さん」"

[[dialogue]]
speaker = "サーシャ"
# 「えっ？」
line = "「えっ？」"

[[dialogue]]
speaker = "unk"
# サーシャさんが驚いた顔をして、振り返ると――
line = "サーシャさんが驚いた顔をして、振り返ると――"

[[dialogue]]
speaker = "ソフィア"
# 「……あけまして、おめでとうございます」
line = "「……あけまして、おめでとうございます」"

[[dialogue]]
speaker = "サーシャ"
# 「ソフィ……？」
line = "「ソフィ……？」"

[[dialogue]]
speaker = "unk"
# こうして、ついに奏姉妹は顔を合わせるのだった――
line = "こうして、ついに奏姉妹は顔を合わせるのだった――"
