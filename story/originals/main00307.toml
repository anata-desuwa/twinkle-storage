[[dialogue]]
speaker = "unk"
# 第１１話,星読事変,B
line = "第１１話,星読事変,B"

[[dialogue]]
speaker = "クロト"
# 「どうだアポロ──これでも満足できないかっ！？」
line = "「どうだアポロ──これでも満足できないかっ！？」"

[[dialogue]]
speaker = "アポロ"
# 「へえ……中々やるな！」
line = "「へえ……中々やるな！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あんたもね！　ほんとに見た目通りにいかないっていうか……！」
line = "「あんたもね！　ほんとに見た目通りにいかないっていうか……！」"

[[dialogue]]
speaker = "クロト"
# 「『月』の守護星──」
line = "「『月』の守護星──」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええ──けど、普通じゃないわ。あんなに暗い力なんて……！」
line = "「ええ──けど、普通じゃないわ。あんなに暗い力なんて……！」"

[[dialogue]]
speaker = "unk"
# 闇の月──彼女はその加護を受け、得体の知れない力を大いに振るってきた。
line = "闇の月──彼女はその加護を受け、得体の知れない力を大いに振るってきた。"

[[dialogue]]
speaker = "マトイ"
# 「でも、これで私たちが優勢……！」
line = "「でも、これで私たちが優勢……！」"

[[dialogue]]
speaker = "クロト"
# 「ああ。おとなしく武器を捨てるんだ」
line = "「ああ。おとなしく武器を捨てるんだ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「捨てたって許さないわ。とりあえずその仮面ひっ剥いであげる」
line = "「捨てたって許さないわ。とりあえずその仮面ひっ剥いであげる」"

[[dialogue]]
speaker = "アポロ"
# 「ふっふっふ。そううまく行くかな？」
line = "「ふっふっふ。そううまく行くかな？」"

[[dialogue]]
speaker = "アナ"
# 「──何かやろうとしてる。止めましょう」
line = "「──何かやろうとしてる。止めましょう」"

[[dialogue]]
speaker = "マトイ"
# 「ええ、一緒に──」
line = "「ええ、一緒に──」"

[[dialogue]]
speaker = "ギエル"
# 「──させませんよ、お嬢様方」
line = "「──させませんよ、お嬢様方」"

[[dialogue]]
speaker = "マトイ"
# 「っ、あなた……！」
line = "「っ、あなた……！」"

[[dialogue]]
speaker = "クロト"
# 「マトイ──！」
line = "「マトイ──！」"

[[dialogue]]
speaker = "unk"
# 横入りするギエルに対し、俺が応戦して撃退する。
line = "横入りするギエルに対し、俺が応戦して撃退する。"

[[dialogue]]
speaker = "unk"
# 繰り出した拳撃は彼の横っ腹を捉えたが、すぐに体勢を立て直される。
line = "繰り出した拳撃は彼の横っ腹を捉えたが、すぐに体勢を立て直される。"

[[dialogue]]
speaker = "クロト"
# 「もう一発──」
line = "「もう一発──」"

[[dialogue]]
speaker = "ギエル"
# 「ふ──さすがは魔王の血族。中々やるようですが、所詮はただの空拳……」
line = "「ふ──さすがは魔王の血族。中々やるようですが、所詮はただの空拳……」"

[[dialogue]]
speaker = "ギエル"
# 「っ！？」
line = "「っ！？」"

[[dialogue]]
speaker = "クロト"
# （！？）
line = "（！？）"

[[dialogue]]
speaker = "unk"
# 距離を取る。
line = "距離を取る。"

[[dialogue]]
speaker = "unk"
# 執事──ギエルの眼は、瞠目に見開かれていた。
line = "執事──ギエルの眼は、瞠目に見開かれていた。"

[[dialogue]]
speaker = "ギエル"
# 「……。今、何を……」
line = "「……。今、何を……」"

[[dialogue]]
speaker = "unk"
# 今。俺の拳は間違いなく防がれた。
line = "今。俺の拳は間違いなく防がれた。"

[[dialogue]]
speaker = "unk"
# だが……防がれた後で、もう一撃が命中した。
line = "だが……防がれた後で、もう一撃が命中した。"

[[dialogue]]
speaker = "クロト"
# （……なんだ……？　今の感覚は……？）
line = "（……なんだ……？　今の感覚は……？）"

[[dialogue]]
speaker = "サーシャ"
# 「クロトくん！　危ないわ！」
line = "「クロトくん！　危ないわ！」"

[[dialogue]]
speaker = "モンスター"
# 「ウイイイ──！！」
line = "「ウイイイ──！！」"

[[dialogue]]
speaker = "クロト"
# 「──ッ」
line = "「──ッ」"

[[dialogue]]
speaker = "unk"
# 一瞬の隙を晒した俺へ、アポロが遠隔でモンスターをけしかけてきた。
line = "一瞬の隙を晒した俺へ、アポロが遠隔でモンスターをけしかけてきた。"

[[dialogue]]
speaker = "モンスター"
# 「イイイイっっ……！」
line = "「イイイイっっ……！」"

[[dialogue]]
speaker = "クロト"
# 「あ……ありがとうございます。サーシャ先輩」
line = "「あ……ありがとうございます。サーシャ先輩」"

[[dialogue]]
speaker = "サーシャ"
# 「ええ──何か思うところがあったみたいだけど。今はあの子に集中しないと」
line = "「ええ──何か思うところがあったみたいだけど。今はあの子に集中しないと」"

[[dialogue]]
speaker = "unk"
# そうだ。
line = "そうだ。"

[[dialogue]]
speaker = "unk"
# 今、注意すべきは目の前の相手で……
line = "今、注意すべきは目の前の相手で……"

[[dialogue]]
speaker = "クロト"
# 「──いい加減にするんだアポロ。さもないと……もっと痛い目に遭わせることになるぞ」
line = "「──いい加減にするんだアポロ。さもないと……もっと痛い目に遭わせることになるぞ」"

[[dialogue]]
speaker = "アポロ"
# 「ふふ……ふふふふ。痛い目か。ヒーローに対してそーゆーのは、<b>しぼうふらぐ</b>って言うんだぜ！」
line = "「ふふ……ふふふふ。痛い目か。ヒーローに対してそーゆーのは、<b>しぼうふらぐ</b>って言うんだぜ！」"

[[dialogue]]
speaker = "unk"
# あまりにも話が通じない。
line = "あまりにも話が通じない。"

[[dialogue]]
speaker = "unk"
# さらに<b>ノリノリ</b>になったアポロは、濃密なオーラを自らに集約させていく。
line = "さらに<b>ノリノリ</b>になったアポロは、濃密なオーラを自らに集約させていく。"

[[dialogue]]
speaker = "マトイ"
# 「あれって──」
line = "「あれって──」"

[[dialogue]]
speaker = "アナ"
# 「再構築の瘴気──塔のガーディアンを汚染していたのと同じものです！」
line = "「再構築の瘴気──塔のガーディアンを汚染していたのと同じものです！」"

[[dialogue]]
speaker = "unk"
# なぜ彼女があれを操っているのか。問いかけている余裕は無論なく。
line = "なぜ彼女があれを操っているのか。問いかけている余裕は無論なく。"

[[dialogue]]
speaker = "クロト"
# 「通してもらう！」
line = "「通してもらう！」"

[[dialogue]]
speaker = "ギエル"
# 「──させません」
line = "「──させません」"

[[dialogue]]
speaker = "unk"
# 先ほどの一撃も、あいにく二度は発動せず──
line = "先ほどの一撃も、あいにく二度は発動せず──"

[[dialogue]]
speaker = "アポロ"
# 「遅いぜ」
line = "「遅いぜ」"

[[dialogue]]
speaker = "アポロ"
# 「──喰らえ！　流星ストーーーーム！！」
line = "「──喰らえ！　流星ストーーーーム！！」"

[[dialogue]]
speaker = "unk"
# 天高く大剣を掲げるアポロ──すると事象はすぐに起こった。
line = "天高く大剣を掲げるアポロ──すると事象はすぐに起こった。"

[[dialogue]]
speaker = "マトイ"
# 「これは……」
line = "「これは……」"

[[dialogue]]
speaker = "アナ"
# 「流星……！？」
line = "「流星……！？」"

[[dialogue]]
speaker = "unk"
# 降り注ぐ星々の光。
line = "降り注ぐ星々の光。"

[[dialogue]]
speaker = "unk"
# 幻想的でさえある光景は、しかし破滅的な勢力を伴って地上を蹂躙していた。
line = "幻想的でさえある光景は、しかし破滅的な勢力を伴って地上を蹂躙していた。"

[[dialogue]]
speaker = "アポロ"
# 「ふはははは！　吹き荒れろ、流れ星たち！　星々の光を灯すのだー！」
line = "「ふはははは！　吹き荒れろ、流れ星たち！　星々の光を灯すのだー！」"

[[dialogue]]
speaker = "unk"
# 再構築の瘴気と流星の煌めきが混沌と融合し、乱気流のごとく陰陽のうねりが逆巻いている。
line = "再構築の瘴気と流星の煌めきが混沌と融合し、乱気流のごとく陰陽のうねりが逆巻いている。"

[[dialogue]]
speaker = "unk"
# これは──一秒でも放っておくとまずい！
line = "これは──一秒でも放っておくとまずい！"

[[dialogue]]
speaker = "クロト"
# 「──全員！　市民に被害が出ないよう防護壁を展開──星徒会以外のメンバーにも避難誘導を指示してくれ！」
line = "「──全員！　市民に被害が出ないよう防護壁を展開──星徒会以外のメンバーにも避難誘導を指示してくれ！」"

[[dialogue]]
speaker = "アナ"
# 「<ruby=ラジャー>了解</ruby>です──バーミリオンイータ」
line = "「<ruby>了解<rt>ラジャー</rt></ruby>です──バーミリオンイータ」"

[[dialogue]]
speaker = "サーシャ"
# 「防護<ruby=テリトリー>領域</ruby>展開──もう、あんまり柄じゃないのに」
line = "「防護<ruby>領域<rt>テリトリー</rt></ruby>展開──もう、あんまり柄じゃないのに」"

[[dialogue]]
speaker = "unk"
# 星徒会、さらにはプリマステラの生徒たちが全力をもって嵐を食い止める。
line = "星徒会、さらにはプリマステラの生徒たちが全力をもって嵐を食い止める。"

[[dialogue]]
speaker = "unk"
# そんなアポロ本人は嵐の中心で愉快げに佇んでいた。
line = "そんなアポロ本人は嵐の中心で愉快げに佇んでいた。"

[[dialogue]]
speaker = "アポロ"
# 「わーっはっはっは！　心地よい風なのだ！」
line = "「わーっはっはっは！　心地よい風なのだ！」"

[[dialogue]]
speaker = "アポロ"
# 「この星の正体を教えてやる！　流れ星とゆーのはな、寿命が尽きて大気圏で燃え尽きた天体のことを指すのだ！」
line = "「この星の正体を教えてやる！　流れ星とゆーのはな、寿命が尽きて大気圏で燃え尽きた天体のことを指すのだ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「だったらなんだってのよ！」
line = "「だったらなんだってのよ！」"

[[dialogue]]
speaker = "アポロ"
# 「流星にとって、光るのは最期の瞬間だ。だからこれは命のきらめき！　終焉の機を待ち焦がれる流星のともしびなのだ！」
line = "「流星にとって、光るのは最期の瞬間だ。だからこれは命のきらめき！　終焉の機を待ち焦がれる流星のともしびなのだ！」"

[[dialogue]]
speaker = "アポロ"
# 「人間や《魔王》なんてちっぽけな存在が、リクリエを邪魔するなんて許されないんだぜ！」
line = "「人間や《魔王》なんてちっぽけな存在が、リクリエを邪魔するなんて許されないんだぜ！」"

[[dialogue]]
speaker = "クロト"
# 「っ……！？」
line = "「っ……！？」"

[[dialogue]]
speaker = "unk"
# 死んだ星の力を使っている──だって？
line = "死んだ星の力を使っている──だって？"

[[dialogue]]
speaker = "unk"
# また、軽々しいテンションでさらに重大な事実を公言したアポロ。
line = "また、軽々しいテンションでさらに重大な事実を公言したアポロ。"

[[dialogue]]
speaker = "アナ"
# 「……彼女はさしずめ、リクリエの使徒と言ったところでしょうか」
line = "「……彼女はさしずめ、リクリエの使徒と言ったところでしょうか」"

[[dialogue]]
speaker = "クロト"
# 「そんな存在が──いや、けどあのオーラ……」
line = "「そんな存在が──いや、けどあのオーラ……」"

[[dialogue]]
speaker = "unk"
# 実際に、アポロは再構築の瘴気をまとったまま平然としている。
line = "実際に、アポロは再構築の瘴気をまとったまま平然としている。"

[[dialogue]]
speaker = "unk"
# この少女そのものがそういう存在であるとしか思えないのも確かだった。
line = "この少女そのものがそういう存在であるとしか思えないのも確かだった。"

[[dialogue]]
speaker = "ヴィーナス"
# 「──残念だけど！　あんたの思う通りにはならないわ」
line = "「──残念だけど！　あんたの思う通りにはならないわ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「こっちにクロトがいる限り──平和な未来はしっかり約束されてるんだから！」
line = "「こっちにクロトがいる限り──平和な未来はしっかり約束されてるんだから！」"

[[dialogue]]
speaker = "アポロ"
# 「ふふーん。それはどうかな」
line = "「ふふーん。それはどうかな」"

[[dialogue]]
speaker = "unk"
# ヴィーナスは今も《魔王》である俺を信頼している。
line = "ヴィーナスは今も《魔王》である俺を信頼している。"

[[dialogue]]
speaker = "unk"
# そんな彼女を見て、アポロは不敵に笑った。
line = "そんな彼女を見て、アポロは不敵に笑った。"

[[dialogue]]
speaker = "ヴィーナス"
# 「っ……！？　これって──」
line = "「っ……！？　これって──」"

[[dialogue]]
speaker = "unk"
# ヴィーナスの持っていた日誌が、いつかと同じように共鳴を始めた。
line = "ヴィーナスの持っていた日誌が、いつかと同じように共鳴を始めた。"

[[dialogue]]
speaker = "unk"
# しかし──
line = "しかし──"

[[dialogue]]
speaker = "クロト"
# 「もしかして、新しいページが──！？」
line = "「もしかして、新しいページが──！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ううん、違う──これ……書き換えられてる……！」
line = "「ううん、違う──これ……書き換えられてる……！」"

[[dialogue]]
speaker = "unk"
# どす黒いオーラに包まれて、未来の日誌は自動でページをめくられていく。
line = "どす黒いオーラに包まれて、未来の日誌は自動でページをめくられていく。"

[[dialogue]]
speaker = "unk"
# しかも、その内容は……
line = "しかも、その内容は……"

[[dialogue]]
speaker = "ヴィーナス"
# 「『荒鷹ノ──月──十四──日。い──偉大なる真の<b>ひーろー</b>、アポロ様が出現し、人間界は恐れおののく』」
line = "「『荒鷹ノ──月──十四──日。い──偉大なる真の<b>ひーろー</b>、アポロ様が出現し、人間界は恐れおののく』」"

[[dialogue]]
speaker = "ヴィーナス"
# 「『終焉の時は近い。救世主の誕生を祝うのだ。アポロ様ばんざい、アポロ様さいこう』──って、何……これ……！？」
line = "「『終焉の時は近い。救世主の誕生を祝うのだ。アポロ様ばんざい、アポロ様さいこう』──って、何……これ……！？」"

[[dialogue]]
speaker = "unk"
# 未来の日誌。その書き換え。この事実が示す現象は……
line = "未来の日誌。その書き換え。この事実が示す現象は……"

[[dialogue]]
speaker = "クロト"
# 「未来の──改竄──っ……？」
line = "「未来の──改竄──っ……？」"

[[dialogue]]
speaker = "アポロ"
# 「ふっふっふっふ！　<b>どこ</b>から持ってきたのか知らないけど、そんなアイテムこのアポロ様の前では無力！」
line = "「ふっふっふっふ！　<b>どこ</b>から持ってきたのか知らないけど、そんなアイテムこのアポロ様の前では無力！」"

[[dialogue]]
speaker = "unk"
# その時、ひときわ強い流星の嵐が彼女を中心に巻き起こった。
line = "その時、ひときわ強い流星の嵐が彼女を中心に巻き起こった。"

[[dialogue]]
speaker = "アポロ"
# 「なぜなら正義のヒーローとは！　どんな悲惨な運命でもひっくり返すからヒーローなのだ！」
line = "「なぜなら正義のヒーローとは！　どんな悲惨な運命でもひっくり返すからヒーローなのだ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「っつ──！」
line = "「っつ──！」"

[[dialogue]]
speaker = "unk"
# 前が見えないほど強まっていく混沌の旋風。
line = "前が見えないほど強まっていく混沌の旋風。"

[[dialogue]]
speaker = "unk"
# この間も、体中に星力の加護をかけ続けなければ持っていかれてしまう。
line = "この間も、体中に星力の加護をかけ続けなければ持っていかれてしまう。"

[[dialogue]]
speaker = "アポロ"
# 「確かに中々の歯ごたえだったぞ緋宮クロト──だがあたしの求める真のおまえには程遠い！」
line = "「確かに中々の歯ごたえだったぞ緋宮クロト──だがあたしの求める真のおまえには程遠い！」"

[[dialogue]]
speaker = "アポロ"
# 「どうやら覚醒にはまだ条件が必要なようだ。そしてホントの魔王を倒さない限り、あたしは真のヒーローになれん！」
line = "「どうやら覚醒にはまだ条件が必要なようだ。そしてホントの魔王を倒さない限り、あたしは真のヒーローになれん！」"

[[dialogue]]
speaker = "アポロ"
# 「せいぜい次回までにその牙、しっかり研いでおくのだな！」
line = "「せいぜい次回までにその牙、しっかり研いでおくのだな！」"

[[dialogue]]
speaker = "クロト"
# 「っ──なんだって？！」
line = "「っ──なんだって？！」"

[[dialogue]]
speaker = "アポロ"
# 「いくぞギエル、今宵はここまでだ！」
line = "「いくぞギエル、今宵はここまでだ！」"

[[dialogue]]
speaker = "ギエル"
# 「は──仰せのままに」
line = "「は──仰せのままに」"

[[dialogue]]
speaker = "クロト"
# 「待てアポロ──話は終わってないぞ！　君はどこから──」
line = "「待てアポロ──話は終わってないぞ！　君はどこから──」"

[[dialogue]]
speaker = "アポロ"
# 「わっはっは！　また会おうぞ魔王、我が宿敵よ！」
line = "「わっはっは！　また会おうぞ魔王、我が宿敵よ！」"

[[dialogue]]
speaker = "unk"
# 俺の呼び声はむなしく嵐にかき消され──
line = "俺の呼び声はむなしく嵐にかき消され──"

[[dialogue]]
speaker = "unk"
# 当の彼女もまた、発散する風よろしく姿をくらましてしまった。
line = "当の彼女もまた、発散する風よろしく姿をくらましてしまった。"

[[dialogue]]
speaker = "マトイ"
# 「うそ……戻っちゃった」
line = "「うそ……戻っちゃった」"

[[dialogue]]
speaker = "サーシャ"
# 「何だったのかしら、本当……？」
line = "「何だったのかしら、本当……？」"

[[dialogue]]
speaker = "unk"
# アポロが去ったと同時に、再び晴れていく夜の帳。
line = "アポロが去ったと同時に、再び晴れていく夜の帳。"

[[dialogue]]
speaker = "unk"
# また彼女に従っていたギエルや、統率されていたモンスター達まで露と消えてしまっていた。
line = "また彼女に従っていたギエルや、統率されていたモンスター達まで露と消えてしまっていた。"

[[dialogue]]
speaker = "アナ"
# 「ただの少女ではないかと」
line = "「ただの少女ではないかと」"

[[dialogue]]
speaker = "クロト"
# 「ああ……」
line = "「ああ……」"

[[dialogue]]
speaker = "アポロ"
# 「愚問だ。緋宮クロト──おまえこそが魔王であり、そして、魔王を倒すのはヒーローの宿命だと、太古の昔から決まっているからだ！」
line = "「愚問だ。緋宮クロト──おまえこそが魔王であり、そして、魔王を倒すのはヒーローの宿命だと、太古の昔から決まっているからだ！」"

[[dialogue]]
speaker = "unk"
# 数々の意味深な発言を残していったアポロ。少なくとも、俺たちと縁深い存在であるのは確かだろう。
line = "数々の意味深な発言を残していったアポロ。少なくとも、俺たちと縁深い存在であるのは確かだろう。"

[[dialogue]]
speaker = "ヴィーナス"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "クロト"
# 「ヴィーナス……」
line = "「ヴィーナス……」"

[[dialogue]]
speaker = "unk"
# 彼女が全幅の信頼を置いていた“未来の日誌”──
line = "彼女が全幅の信頼を置いていた“未来の日誌”──"

[[dialogue]]
speaker = "unk"
# それさえも書き換えられる彼女は、一体何者だというのだろうか。
line = "それさえも書き換えられる彼女は、一体何者だというのだろうか。"
