[[dialogue]]
speaker = "unk"
# 第８話,守護天使の加護,B
line = "第８話,守護天使の加護,B"

[[dialogue]]
speaker = "ナターシャ"
# 「はい、おしまい。極星従騎の相手も慣れてきたね」
line = "「はい、おしまい。極星従騎の相手も慣れてきたね」"

[[dialogue]]
speaker = "ラクシャ"
# 「やっぱ不自然だよね、極星従騎って。女神テルルに新しいガーディアンを生み出す余力なんてないはずだし」
line = "「やっぱ不自然だよね、極星従騎って。女神テルルに新しいガーディアンを生み出す余力なんてないはずだし」"

[[dialogue]]
speaker = "クロト"
# 「じゃあ極星従騎は偽物のガーディアンなのか？」
line = "「じゃあ極星従騎は偽物のガーディアンなのか？」"

[[dialogue]]
speaker = "ラクシャ"
# 「いいや、守護天使として断言するけど、極星従騎は紛れもなくガーディアンだよ」
line = "「いいや、守護天使として断言するけど、極星従騎は紛れもなくガーディアンだよ」"

[[dialogue]]
speaker = "梨緒"
# 「ベアトは極星従騎について何か知らないか？」
line = "「ベアトは極星従騎について何か知らないか？」"

[[dialogue]]
speaker = "ベアトリス"
# 「ううん。私がデネブにいた頃にはいなかったから……」
line = "「ううん。私がデネブにいた頃にはいなかったから……」"

[[dialogue]]
speaker = "梨緒"
# 「そうか。今まで幾度も戦ってきた極星従騎だが、ガーディアンであること以外何もわかっていないんだな」
line = "「そうか。今まで幾度も戦ってきた極星従騎だが、ガーディアンであること以外何もわかっていないんだな」"

[[dialogue]]
speaker = "unk"
# ここ最近ではモンスターよりも極星従騎との戦いの方が多いくらいだが、未だに謎の多い存在だ。
line = "ここ最近ではモンスターよりも極星従騎との戦いの方が多いくらいだが、未だに謎の多い存在だ。"

[[dialogue]]
speaker = "ヴィーナス"
# 「みんな、天井を見て！　さっき極星従騎が降りてきたところに穴があるわ！」
line = "「みんな、天井を見て！　さっき極星従騎が降りてきたところに穴があるわ！」"

[[dialogue]]
speaker = "フィオナ"
# 「もしかすると、あの穴を通ってルヴィネは頂上に向かったのかもしれません。追いかけましょう」
line = "「もしかすると、あの穴を通ってルヴィネは頂上に向かったのかもしれません。追いかけましょう」"

[[dialogue]]
speaker = "梨緒"
# 「では作戦通り、道中の敵は私たち選挙管理委員会が引き付ける」
line = "「では作戦通り、道中の敵は私たち選挙管理委員会が引き付ける」"

[[dialogue]]
speaker = "ベアトリス"
# 「うん、暴れちゃうよ！」
line = "「うん、暴れちゃうよ！」"

[[dialogue]]
speaker = "ナターシャ"
# 「私は隠れてこそこそする方が得意なんだけど、ま、そういう割り振りだから仕方ないね」
line = "「私は隠れてこそこそする方が得意なんだけど、ま、そういう割り振りだから仕方ないね」"

[[dialogue]]
speaker = "梨緒"
# 「魔王、フィオナ、ヴィーナス。君たちは頂上へ行ってくれ」
line = "「魔王、フィオナ、ヴィーナス。君たちは頂上へ行ってくれ」"

[[dialogue]]
speaker = "フィオナ"
# 「はい。敵を押し付けるようですみませんが、よろしくお願いします」
line = "「はい。敵を押し付けるようですみませんが、よろしくお願いします」"

[[dialogue]]
speaker = "ラクシャ"
# 「じゃあボクは手はず通り、半身と合流するために第零層へ向かうよ」
line = "「じゃあボクは手はず通り、半身と合流するために第零層へ向かうよ」"

[[dialogue]]
speaker = "クロト"
# 「ああ、後でみんな合流しよう！」
line = "「ああ、後でみんな合流しよう！」"

[[dialogue]]
speaker = "unk"
# 分かれた仲間の無事を願いつつ、それぞれの目的地へ向かった。
line = "分かれた仲間の無事を願いつつ、それぞれの目的地へ向かった。"

[[dialogue]]
speaker = "ヴィーナス"
# 「着いたわ！」
line = "「着いたわ！」"

[[dialogue]]
speaker = "unk"
# アルタイルでは二度辿り着いた頂上。
line = "アルタイルでは二度辿り着いた頂上。"

[[dialogue]]
speaker = "unk"
# 平行世界デネブでは初めての場所だが──
line = "平行世界デネブでは初めての場所だが──"

[[dialogue]]
speaker = "ヴィーナス"
# 「っ！？　ディザスターハンド！？　やっぱりこっちにも……！？」
line = "「っ！？　ディザスターハンド！？　やっぱりこっちにも……！？」"

[[dialogue]]
speaker = "クロト"
# 「正面からぶつかるわけにはいかない、今すぐ撤退──」
line = "「正面からぶつかるわけにはいかない、今すぐ撤退──」"

[[dialogue]]
speaker = "フィオナ"
# 「待ってください、あそこに……！」
line = "「待ってください、あそこに……！」"

[[dialogue]]
speaker = "unk"
# フィーニスの塔の頂上、その上空に<ruby=そび>聳</ruby>えるディザスターハンド──の真下。
line = "フィーニスの塔の頂上、その上空に<ruby>聳<rt>そび</rt></ruby>えるディザスターハンド──の真下。"

[[dialogue]]
speaker = "unk"
# そこに佇む小さな影は……
line = "そこに佇む小さな影は……"

[[dialogue]]
speaker = "ルヴィネ"
# 「……！　あなたたち、どうしてここに……？」
line = "「……！　あなたたち、どうしてここに……？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「まさかこんなところにまで来るとは思わなかったわ。近づかれるまで気づかないなんて、<b>これ</b>の制御に気を取られ過ぎたわね」
line = "「まさかこんなところにまで来るとは思わなかったわ。近づかれるまで気づかないなんて、<b>これ</b>の制御に気を取られ過ぎたわね」"

[[dialogue]]
speaker = "unk"
# 「これ」とはディザスターハンドを指しているのだろう。
line = "「これ」とはディザスターハンドを指しているのだろう。"

[[dialogue]]
speaker = "unk"
# だがどうしてルヴィネがディザスターハンドと共にいる？
line = "だがどうしてルヴィネがディザスターハンドと共にいる？"

[[dialogue]]
speaker = "unk"
# ルヴィネはデネブの守護者じゃなかったのか？
line = "ルヴィネはデネブの守護者じゃなかったのか？"

[[dialogue]]
speaker = "クロト"
# 「ルヴィネ。君の上にある巨大な手……あれを俺たちはディザスターハンドと呼んでいる」
line = "「ルヴィネ。君の上にある巨大な手……あれを俺たちはディザスターハンドと呼んでいる」"

[[dialogue]]
speaker = "ルヴィネ"
# 「ディザスターハンド……厄災の手、ね。私は名前を付けていなかったけど、確かに相応しい名前かもしれないわ」
line = "「ディザスターハンド……厄災の手、ね。私は名前を付けていなかったけど、確かに相応しい名前かもしれないわ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「涼しい顔してるんじゃないわよ！　どうしてあんたがあの手と一緒にいるの？　やっぱりリクリエの側だったっていうの？」
line = "「涼しい顔してるんじゃないわよ！　どうしてあんたがあの手と一緒にいるの？　やっぱりリクリエの側だったっていうの？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……いいえ。これはアルタイルを滅ぼすために使うもの。デネブを守るためなら私は手段を選ばないわ」
line = "「……いいえ。これはアルタイルを滅ぼすために使うもの。デネブを守るためなら私は手段を選ばないわ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「じゃあ私たちがアルタイルのフィーニスの塔に登ってきた時、あの手が襲ってきたのはあんたの仕業なの？」
line = "「じゃあ私たちがアルタイルのフィーニスの塔に登ってきた時、あの手が襲ってきたのはあんたの仕業なの？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「ええ。あの時は仕留め損なったわ。あの時あなたたちを消せていれば、今頃アルタイルを滅ぼすことができていたでしょうに」
line = "「ええ。あの時は仕留め損なったわ。あの時あなたたちを消せていれば、今頃アルタイルを滅ぼすことができていたでしょうに」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……ッ！」
line = "「……ッ！」"

[[dialogue]]
speaker = "unk"
# 冷たく言ってのけるルヴィネに、怒りをにじませるヴィーナス。
line = "冷たく言ってのけるルヴィネに、怒りをにじませるヴィーナス。"

[[dialogue]]
speaker = "unk"
# アルタイルに住まう者として、確かに彼女の言動は許せるものではない。
line = "アルタイルに住まう者として、確かに彼女の言動は許せるものではない。"

[[dialogue]]
speaker = "unk"
# だけどルヴィネの言葉は一貫しているようで、引っかかる点がある。
line = "だけどルヴィネの言葉は一貫しているようで、引っかかる点がある。"

[[dialogue]]
speaker = "クロト"
# 「君はデネブを守るために、ディザスターハンドを使うと言うんだな」
line = "「君はデネブを守るために、ディザスターハンドを使うと言うんだな」"

[[dialogue]]
speaker = "クロト"
# 「それならなおさら分からない。君ほどの力があれば、あの手の脅威は理解できるはずだ」
line = "「それならなおさら分からない。君ほどの力があれば、あの手の脅威は理解できるはずだ」"

[[dialogue]]
speaker = "クロト"
# 「悔しいけど、あの手だけでアルタイルの総力に匹敵する……いやそれ以上かもしれない」
line = "「悔しいけど、あの手だけでアルタイルの総力に匹敵する……いやそれ以上かもしれない」"

[[dialogue]]
speaker = "クロト"
# 「デネブにとっても、ディザスターハンドは脅威のはずだ。首尾よくアルタイルを滅ぼせたとしても、あの手にデネブが滅ぼされるかもしれない」
line = "「デネブにとっても、ディザスターハンドは脅威のはずだ。首尾よくアルタイルを滅ぼせたとしても、あの手にデネブが滅ぼされるかもしれない」"

[[dialogue]]
speaker = "ルヴィネ"
# 「ご忠告痛み入るわ。だけどあなたたちに心配される筋合いはない」
line = "「ご忠告痛み入るわ。だけどあなたたちに心配される筋合いはない」"

[[dialogue]]
speaker = "クロト"
# 「言っただろ、俺たちはアルタイルもデネブも守りたいんだ」
line = "「言っただろ、俺たちはアルタイルもデネブも守りたいんだ」"

[[dialogue]]
speaker = "クロト"
# 「そこでひとつ俺から君に提案だ」
line = "「そこでひとつ俺から君に提案だ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「提案……？」
line = "「提案……？」"

[[dialogue]]
speaker = "クロト"
# 「一緒にディザスターハンドを倒さないか？　あの手は途方もなく強大だが、君とならできるかもしれない」
line = "「一緒にディザスターハンドを倒さないか？　あの手は途方もなく強大だが、君とならできるかもしれない」"

[[dialogue]]
speaker = "クロト"
# 「アルタイルもデネブもリクリエに脅かされている。ならともにリクリエと戦うべきだ」
line = "「アルタイルもデネブもリクリエに脅かされている。ならともにリクリエと戦うべきだ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……馬鹿馬鹿しいわね。今この瞬間まで敵対していたのに、はいそうですかと共闘できるわけがない。背中を撃たれるかもしれないのだから」
line = "「……馬鹿馬鹿しいわね。今この瞬間まで敵対していたのに、はいそうですかと共闘できるわけがない。背中を撃たれるかもしれないのだから」"

[[dialogue]]
speaker = "ルヴィネ"
# 「そもそもあなたたちと問答する気はないわ。あなたたちは敵よ」
line = "「そもそもあなたたちと問答する気はないわ。あなたたちは敵よ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「だから──消えなさい」
line = "「だから──消えなさい」"

[[dialogue]]
speaker = "ヴィーナス"
# 「チェンジ・ノヴァフォーム！」
line = "「チェンジ・ノヴァフォーム！」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「そうはさせないわ！」
line = "「そうはさせないわ！」"

[[dialogue]]
speaker = "unk"
# 敵意を向けるルヴィネに対抗し、ヴィーナスがノヴァフォームに変身する。
line = "敵意を向けるルヴィネに対抗し、ヴィーナスがノヴァフォームに変身する。"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「──！？」
line = "「──！？」"

[[dialogue]]
speaker = "unk"
# だがその瞬間、塔の頂上が白い光に包まれて──
line = "だがその瞬間、塔の頂上が白い光に包まれて──"

[[dialogue]]
speaker = "unk"
# その頃、ラクシャは無事に第零層へとたどり着いていた。
line = "その頃、ラクシャは無事に第零層へとたどり着いていた。"

[[dialogue]]
speaker = "ラクシャ"
# 「はーい、とうちゃーく。それじゃ早速半身と同期して──」
line = "「はーい、とうちゃーく。それじゃ早速半身と同期して──」"

[[dialogue]]
speaker = "ラクシャ"
# 「いやこれまずいな」
line = "「いやこれまずいな」"
