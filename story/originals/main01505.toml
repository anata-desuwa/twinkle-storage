[[dialogue]]
speaker = "unk"
# かつてない未知の可能性への賭けだった。
line = "かつてない未知の可能性への賭けだった。"

[[dialogue]]
speaker = "フィオナ"
# 「束の間でも──仮面を割って、姉さんの正気を取り戻す」
line = "「束の間でも──仮面を割って、姉さんの正気を取り戻す」"

[[dialogue]]
speaker = "フィオナ"
# 「そして、わずかでも声を届かせたなら。わずかでも姉さんの本心を聴けたなら。私はきっと、眠れる血を引き出せる気がするんです」
line = "「そして、わずかでも声を届かせたなら。わずかでも姉さんの本心を聴けたなら。私はきっと、眠れる血を引き出せる気がするんです」"

[[dialogue]]
speaker = "フィオナ"
# 「そして私と緋宮会長──２人の完全な魔王で使徒の仮面を破壊する。それが、私の描くリクリエの終わりです」
line = "「そして私と緋宮会長──２人の完全な魔王で使徒の仮面を破壊する。それが、私の描くリクリエの終わりです」"

[[dialogue]]
speaker = "カヤ"
# 「……そっちの方が、よほど無茶」
line = "「……そっちの方が、よほど無茶」"

[[dialogue]]
speaker = "アイリーン"
# 「過程も、結果も……何もかも希望的観測にすぎません。不確定要素が多すぎます……！」
line = "「過程も、結果も……何もかも希望的観測にすぎません。不確定要素が多すぎます……！」"

[[dialogue]]
speaker = "クラウディア"
# 「ふうむ……」
line = "「ふうむ……」"

[[dialogue]]
speaker = "unk"
# 彼女たちの言う通り──フィオナのプランは不確かな青写真にすぎない。
line = "彼女たちの言う通り──フィオナのプランは不確かな青写真にすぎない。"

[[dialogue]]
speaker = "unk"
# それでも、クラウディアさえも鼻白んだことが、フィオナの発する気迫が本物だったことを示している。
line = "それでも、クラウディアさえも鼻白んだことが、フィオナの発する気迫が本物だったことを示している。"

[[dialogue]]
speaker = "セドナ"
# 「姉妹の絆を通じて、己の覚醒と使徒の無力化を同時に行う──か。なんとも都合のよいことだ」
line = "「姉妹の絆を通じて、己の覚醒と使徒の無力化を同時に行う──か。なんとも都合のよいことだ」"

[[dialogue]]
speaker = "セドナ"
# 「──話にならない。聡い娘だと思っていたが……そのような荒唐無稽に傾倒するのは賭けとすら呼べん。根拠なき願望だ」
line = "「──話にならない。聡い娘だと思っていたが……そのような荒唐無稽に傾倒するのは賭けとすら呼べん。根拠なき願望だ」"

[[dialogue]]
speaker = "フィオナ"
# 「かもしれませんね。ですが、奇跡とはそういうものでしょう？」
line = "「かもしれませんね。ですが、奇跡とはそういうものでしょう？」"

[[dialogue]]
speaker = "フィオナ"
# 「姉さんを解放できるとすれば、それは地上にたった１人……私にしか背負えない役目なのですから！」
line = "「姉さんを解放できるとすれば、それは地上にたった１人……私にしか背負えない役目なのですから！」"

[[dialogue]]
speaker = "unk"
# 一触即発──そんな空気の中で。
line = "一触即発──そんな空気の中で。"
