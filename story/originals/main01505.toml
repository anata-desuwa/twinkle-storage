[[dialogue]]
speaker = "unk"
# 第６話,秘策と秘策,B
line = "第６話,秘策と秘策,B"

[[dialogue]]
speaker = "マトイ"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "ユウリ"
# 「……っりえねぇ……」
line = "「……っりえねぇ……」"

[[dialogue]]
speaker = "クロト"
# 「……想像以上の遠大さ──だな」
line = "「……想像以上の遠大さ──だな」"

[[dialogue]]
speaker = "unk"
# セドナさんの口から語られた『計画』の全貌を聞いて、俺たちは全員が言葉をなくした。
line = "セドナさんの口から語られた『計画』の全貌を聞いて、俺たちは全員が言葉をなくした。"

[[dialogue]]
speaker = "クロト"
# 「リクリエの被害を人間界だけに抑え込む──だって……？　そんなの、俺たちに認められるはずがない」
line = "「リクリエの被害を人間界だけに抑え込む──だって……？　そんなの、俺たちに認められるはずがない」"

[[dialogue]]
speaker = "クロト"
# 「それに第一──そんなことが本当に可能なのか……？」
line = "「それに第一──そんなことが本当に可能なのか……？」"

[[dialogue]]
speaker = "サーシャ"
# 「ええ。リクリエが強大であるというならなおさら、抑えるのだって簡単じゃないはず」
line = "「ええ。リクリエが強大であるというならなおさら、抑えるのだって簡単じゃないはず」"

[[dialogue]]
speaker = "セドナ"
# 「魔女という種族は代々、結界術に長けていてな。この日のために『守り』の術は絶えず研鑽を続けてきた」
line = "「魔女という種族は代々、結界術に長けていてな。この日のために『守り』の術は絶えず研鑽を続けてきた」"

[[dialogue]]
speaker = "セドナ"
# 「もっとも──尋常ならざる規模というのは確かだ。私が全力を出したとしても、精々この街一帯しか覆えまい」
line = "「もっとも──尋常ならざる規模というのは確かだ。私が全力を出したとしても、精々この街一帯しか覆えまい」"

[[dialogue]]
speaker = "アイリーン"
# 「はい。森の魔女たち総出でもっても、人間界全域というのは不可能でしょう」
line = "「はい。森の魔女たち総出でもっても、人間界全域というのは不可能でしょう」"

[[dialogue]]
speaker = "マトイ"
# 「なら──」
line = "「なら──」"

[[dialogue]]
speaker = "クラウディア"
# 「そこで、余の出番というわけだ」
line = "「そこで、余の出番というわけだ」"

[[dialogue]]
speaker = "クラウディア"
# 「魔界と天界に挟まれた人間界。その上下を挟み込むように張る超世界規模の大結界──グレート・ウォールは余の魔力によって生成する」
line = "「魔界と天界に挟まれた人間界。その上下を挟み込むように張る超世界規模の大結界──グレート・ウォールは余の魔力によって生成する」"

[[dialogue]]
speaker = "マトイ"
# 「人間界ごと覆う……って……」
line = "「人間界ごと覆う……って……」"

[[dialogue]]
speaker = "ユウリ"
# 「途方もねぇな……んなことを、何千年も前から考えてやがったのかよ……」
line = "「途方もねぇな……んなことを、何千年も前から考えてやがったのかよ……」"

[[dialogue]]
speaker = "unk"
# ネビュラの語るビジョンもクラウディアの自信も、現実味が薄れるほどに壮大なスケールの話だった。
line = "ネビュラの語るビジョンもクラウディアの自信も、現実味が薄れるほどに壮大なスケールの話だった。"

[[dialogue]]
speaker = "セドナ"
# 「安心しろ。これは何も、このまま滅べという通達ではない」
line = "「安心しろ。これは何も、このまま滅べという通達ではない」"

[[dialogue]]
speaker = "セドナ"
# 「星騎士──貴様らは救う。また『うろ』を開いてやってもいい。『湖』の占拠はあくまでも予期せぬ被害が及ぶのを防ぐためでしかない」
line = "「星騎士──貴様らは救う。また『うろ』を開いてやってもいい。『湖』の占拠はあくまでも予期せぬ被害が及ぶのを防ぐためでしかない」"

[[dialogue]]
speaker = "クラウディア"
# 「うむ。余らとしても、無駄な犠牲は出したくないのだ。わかってくれ」
line = "「うむ。余らとしても、無駄な犠牲は出したくないのだ。わかってくれ」"

[[dialogue]]
speaker = "カヤ"
# 「無駄死に、よくない。戦士なら」
line = "「無駄死に、よくない。戦士なら」"

[[dialogue]]
speaker = "セーラ"
# 「その優しさには感謝するけどー……」
line = "「その優しさには感謝するけどー……」"

[[dialogue]]
speaker = "unk"
# 俺たちの魔界送りを『隔離』と呼んでいた意味も知れた。だけど……
line = "俺たちの魔界送りを『隔離』と呼んでいた意味も知れた。だけど……"

[[dialogue]]
speaker = "クロト"
# 「……あなた達の考えはわかった。三界全部をいかれるくらいならせめて魔界と天界は守るって発想も」
line = "「……あなた達の考えはわかった。三界全部をいかれるくらいならせめて魔界と天界は守るって発想も」"

[[dialogue]]
speaker = "クロト"
# 「だけど、俺たちにも──決して譲れない一線がある。終焉に抗う<ruby=スターナイト>星騎士</ruby>として」
line = "「だけど、俺たちにも──決して譲れない一線がある。終焉に抗う<ruby>星騎士<rt>スターナイト</rt></ruby>として」"

[[dialogue]]
speaker = "マトイ"
# 「うん……！　私もそう思う……！」
line = "「うん……！　私もそう思う……！」"

[[dialogue]]
speaker = "セドナ"
# 「ふむ。吠えるだけなら<ruby=いぬ>狗</ruby>でもできる」
line = "「ふむ。吠えるだけなら<ruby>狗<rt>いぬ</rt></ruby>でもできる」"

[[dialogue]]
speaker = "クロト"
# 「そもそも、『うろ』で隔離できるのは何人だ？　星騎士じゃない人たちはどうなる？　……グレート・ウォール計画が発動すれば、人間界にある他の命は見殺しか？」
line = "「そもそも、『うろ』で隔離できるのは何人だ？　星騎士じゃない人たちはどうなる？　……グレート・ウォール計画が発動すれば、人間界にある他の命は見殺しか？」"

[[dialogue]]
speaker = "セドナ"
# 「やむなくな」
line = "「やむなくな」"

[[dialogue]]
speaker = "クロト"
# 「だから認められないと言ってるんだ。たとえ魔界や天界を守るためだったとしても、人間界を見捨てていいはずがない」
line = "「だから認められないと言ってるんだ。たとえ魔界や天界を守るためだったとしても、人間界を見捨てていいはずがない」"

[[dialogue]]
speaker = "クロト"
# 「だって俺たちは──戦えない人たちを守るために、星騎士になったんだから……！」
line = "「だって俺たちは──戦えない人たちを守るために、星騎士になったんだから……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロト……」
line = "「クロト……」"

[[dialogue]]
speaker = "unk"
# 俺だって昔は力がなかった。モンスターに襲われてばかりだった。
line = "俺だって昔は力がなかった。モンスターに襲われてばかりだった。"

[[dialogue]]
speaker = "unk"
# でも、そんな俺だからこそ、同じような人々を救いたいと願った──そう思えるようになったんだ。
line = "でも、そんな俺だからこそ、同じような人々を救いたいと願った──そう思えるようになったんだ。"

[[dialogue]]
speaker = "クロト"
# 「だから……俺たちの住むこの街を、世界を──他の何かの犠牲になんて、差し出せるわけないだろう！」
line = "「だから……俺たちの住むこの街を、世界を──他の何かの犠牲になんて、差し出せるわけないだろう！」"

[[dialogue]]
speaker = "セドナ"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "？？？"
# 『強くあれ。世界を取り込まんとする力に、決して飲まれることなきように』
line = "『強くあれ。世界を取り込まんとする力に、決して飲まれることなきように』"

[[dialogue]]
speaker = "？？？"
# 『君の両手には……他者を救う温かさが宿っている』
line = "『君の両手には……他者を救う温かさが宿っている』"

[[dialogue]]
speaker = "unk"
# いつか、俺が初めて出会った星の輝き。
line = "いつか、俺が初めて出会った星の輝き。"

[[dialogue]]
speaker = "unk"
# その道しるべは不幸な形で途絶えてしまったけれど──かつて感じた光の尊さだけは、真実だったと信じている。
line = "その道しるべは不幸な形で途絶えてしまったけれど──かつて感じた光の尊さだけは、真実だったと信じている。"

[[dialogue]]
speaker = "ユウリ"
# 「あたしは……リクリエに抗う星騎士たちに憧れて学園に入った。ま、新星は落ちちまったんだけど」
line = "「あたしは……リクリエに抗う星騎士たちに憧れて学園に入った。ま、新星は落ちちまったんだけど」"

[[dialogue]]
speaker = "セーラ"
# 「うちも、世界の終わりなんて無視できなかった。星徒会に入ったのは、当時の会長に根負けして……かな」
line = "「うちも、世界の終わりなんて無視できなかった。星徒会に入ったのは、当時の会長に根負けして……かな」"

[[dialogue]]
speaker = "アナ"
# 「私は──大学への推薦を蹴って、新星学園への留学を決めました。自分の知らない世界がどこまで広がっているか知りたくて」
line = "「私は──大学への推薦を蹴って、新星学園への留学を決めました。自分の知らない世界がどこまで広がっているか知りたくて」"

[[dialogue]]
speaker = "サーシャ"
# 「私も近いかしら。魔界で出会った一冊の本が、私をここまで導いてくれたわ」
line = "「私も近いかしら。魔界で出会った一冊の本が、私をここまで導いてくれたわ」"

[[dialogue]]
speaker = "ルリエル"
# 「初めて見る人間界は、もうびっくりの連続で……！　ですがここで過ごすうちに、どんどん大切な場所になっていきました」
line = "「初めて見る人間界は、もうびっくりの連続で……！　ですがここで過ごすうちに、どんどん大切な場所になっていきました」"

[[dialogue]]
speaker = "ソフィア"
# 「同感です。温暖な気候──最初はそれが好ましいだけの異界の地でしたが、ここを守りたいと願うのにそう時間は要りませんでした」
line = "「同感です。温暖な気候──最初はそれが好ましいだけの異界の地でしたが、ここを守りたいと願うのにそう時間は要りませんでした」"

[[dialogue]]
speaker = "マトイ"
# 「私はー……えっと、附属からのエスカレーターで。星術が使えるなら、世界を守れるならそれがいいよねって。弟はどうだか知らないけど……」
line = "「私はー……えっと、附属からのエスカレーターで。星術が使えるなら、世界を守れるならそれがいいよねって。弟はどうだか知らないけど……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私はもちろん──クロトって魔王を目覚めさせるために。そして、絶対にリクリエを止めるために」
line = "「私はもちろん──クロトって魔王を目覚めさせるために。そして、絶対にリクリエを止めるために」"

[[dialogue]]
speaker = "セドナ"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# 出身も性格もバラバラな俺たちだけど、たったひとつの願いを抱いてここまできた。
line = "出身も性格もバラバラな俺たちだけど、たったひとつの願いを抱いてここまできた。"

[[dialogue]]
speaker = "unk"
# そして──
line = "そして──"

[[dialogue]]
speaker = "フィオナ"
# 「私は──姉の意志を継ぎ、魔王として世界を救うために」
line = "「私は──姉の意志を継ぎ、魔王として世界を救うために」"

[[dialogue]]
speaker = "unk"
# 誰よりも強い覚悟を抱いた彼女もまた、同じ地平を目指して。
line = "誰よりも強い覚悟を抱いた彼女もまた、同じ地平を目指して。"

[[dialogue]]
speaker = "セドナ"
# 「──貴様たちの誇りはわかった。それを踏みにじるつもりはない。だが、現実は動かしようもあるまい」
line = "「──貴様たちの誇りはわかった。それを踏みにじるつもりはない。だが、現実は動かしようもあるまい」"

[[dialogue]]
speaker = "セドナ"
# 「この状況下では貴様以外、まともに星術すらも使えない──」
line = "「この状況下では貴様以外、まともに星術すらも使えない──」"

[[dialogue]]
speaker = "クロト"
# 「いや──まだ手はある。アナ、フィオナ」
line = "「いや──まだ手はある。アナ、フィオナ」"

[[dialogue]]
speaker = "アナ"
# 「ええ。つい今しがた、準備は整ったようです」
line = "「ええ。つい今しがた、準備は整ったようです」"

[[dialogue]]
speaker = "フィオナ"
# 「すぅ──参りましょうか」
line = "「すぅ──参りましょうか」"

[[dialogue]]
speaker = "サーシャ"
# 「え……？」
line = "「え……？」"

[[dialogue]]
speaker = "unk"
# アナからＧＯのサインを受けて、俺は全霊を全身に込める。
line = "アナからＧＯのサインを受けて、俺は全霊を全身に込める。"

[[dialogue]]
speaker = "unk"
# そして俺は──<b>地に手をつけた</b>。
line = "そして俺は──<b>地に手をつけた</b>。"

[[dialogue]]
speaker = "クロト"
# 「スターライン構築──地脈、解放」
line = "「スターライン構築──地脈、解放」"

[[dialogue]]
speaker = "セドナ"
# 「何……？」
line = "「何……？」"

[[dialogue]]
speaker = "unk"
# 俺が手のひらをつけた地点から──ぶわりと、広がっていく切なる光。
line = "俺が手のひらをつけた地点から──ぶわりと、広がっていく切なる光。"

[[dialogue]]
speaker = "unk"
# そして……
line = "そして……"

[[dialogue]]
speaker = "マトイ"
# 「──あ、あれっ？　星術が……使えるようになってるかも！」
line = "「──あ、あれっ？　星術が……使えるようになってるかも！」"

[[dialogue]]
speaker = "ソフィア"
# 「ええ。ですが、いつもと感覚が違うような……」
line = "「ええ。ですが、いつもと感覚が違うような……」"

[[dialogue]]
speaker = "セドナ"
# 「星力の復活……？　何をした……？」
line = "「星力の復活……？　何をした……？」"

[[dialogue]]
speaker = "アイリーン"
# 「天蓋は元のまま、ですが──」
line = "「天蓋は元のまま、ですが──」"

[[dialogue]]
speaker = "クロト"
# 「繋げたんだ。他の領域と」
line = "「繋げたんだ。他の領域と」"

[[dialogue]]
speaker = "セドナ"
# 「繋げた──だと？」
line = "「繋げた──だと？」"

[[dialogue]]
speaker = "クロト"
# 「ああ。天蓋が覆っているのは流星市国一帯。けど、それにしたって人間界の一部にすぎない」
line = "「ああ。天蓋が覆っているのは流星市国一帯。けど、それにしたって人間界の一部にすぎない」"

[[dialogue]]
speaker = "クロト"
# 「地球は丸い。だからこうして──天蓋の影響を受けていない地域から、星の力を<b>汲み上げる</b>」
line = "「地球は丸い。だからこうして──天蓋の影響を受けていない地域から、星の力を<b>汲み上げる</b>」"

[[dialogue]]
speaker = "セドナ"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "unk"
# 今まさに両足をつけている地上から、星々の波動が噴き上がってくる。
line = "今まさに両足をつけている地上から、星々の波動が噴き上がってくる。"

[[dialogue]]
speaker = "unk"
# 天蓋の範囲外にある国々と地脈を繋げることで──間接的に星との交信を可能にする荒業だった。
line = "天蓋の範囲外にある国々と地脈を繋げることで──間接的に星との交信を可能にする荒業だった。"

[[dialogue]]
speaker = "クロト"
# 「流星市国も、他の外国も、地球の裏側だって──みんな同じ空を見上げてる。この地脈は、それを共有するものだ」
line = "「流星市国も、他の外国も、地球の裏側だって──みんな同じ空を見上げてる。この地脈は、それを共有するものだ」"

[[dialogue]]
speaker = "アナ"
# 「各国の支部に連絡し──アンテナを設けてもらいました。天蓋への対策は、全星騎士にとっての急務でしたので」
line = "「各国の支部に連絡し──アンテナを設けてもらいました。天蓋への対策は、全星騎士にとっての急務でしたので」"

[[dialogue]]
speaker = "フィオナ"
# 「私たち星騎士の思いはひとつです。この世界を救うために、戦っている」
line = "「私たち星騎士の思いはひとつです。この世界を救うために、戦っている」"

[[dialogue]]
speaker = "unk"
# 天でダメなら、地を伝う。
line = "天でダメなら、地を伝う。"

[[dialogue]]
speaker = "unk"
# 地球そのものの地脈を通じて、俺たちだけじゃない他の星騎士たちもある程度の力を取り戻せたはず。
line = "地球そのものの地脈を通じて、俺たちだけじゃない他の星騎士たちもある程度の力を取り戻せたはず。"

[[dialogue]]
speaker = "unk"
# フィオナには霊力と魔力を使って、俺という支柱を強化してもらっていた。
line = "フィオナには霊力と魔力を使って、俺という支柱を強化してもらっていた。"

[[dialogue]]
speaker = "セーラ"
# 「いつもの星の力が……下から湧き上がってくる、って感じかな」
line = "「いつもの星の力が……下から湧き上がってくる、って感じかな」"

[[dialogue]]
speaker = "ルリエル"
# 「ふえぇ、なんか不思議な感じです！」
line = "「ふえぇ、なんか不思議な感じです！」"

[[dialogue]]
speaker = "マトイ"
# 「でも……これなら戦えるよ！」
line = "「でも……これなら戦えるよ！」"

[[dialogue]]
speaker = "アナ"
# 「はい。普段の感覚と違うので、やりづらいとは思いますが──なんとか対応してください」
line = "「はい。普段の感覚と違うので、やりづらいとは思いますが──なんとか対応してください」"

[[dialogue]]
speaker = "クロト"
# 「さらに言えば、今──アポロはフィーニスの塔のてっぺんにいる。でもって、フィーニスの塔ってやつは、この地球上と<b>地続き</b>だ」
line = "「さらに言えば、今──アポロはフィーニスの塔のてっぺんにいる。でもって、フィーニスの塔ってやつは、この地球上と<b>地続き</b>だ」"

[[dialogue]]
speaker = "クロト"
# 「希望はある。セドナさん。俺たちはまだ折れちゃいない」
line = "「希望はある。セドナさん。俺たちはまだ折れちゃいない」"

[[dialogue]]
speaker = "セドナ"
# 「……フ。なるほど。確かに、従来の８割程度の出力には迫れているようだ」
line = "「……フ。なるほど。確かに、従来の８割程度の出力には迫れているようだ」"

[[dialogue]]
