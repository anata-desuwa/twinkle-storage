[[dialogue]]
speaker = "unk"
# 第４話,舞亜の星,P
line = "第４話,舞亜の星,P"

[[dialogue]]
speaker = "舞亜"
# 「あ、会長さん、こんにちは。実は相談したいことがあってね。ソフィが……」
line = "「あ、会長さん、こんにちは。実は相談したいことがあってね。ソフィが……」"

[[dialogue]]
speaker = "舞亜"
# 『ねぇソフィ、ちょっと数学の課題でわからないところがあって……』
line = "『ねぇソフィ、ちょっと数学の課題でわからないところがあって……』"

[[dialogue]]
speaker = "ソフィア"
# 『つーん』
line = "『つーん』"

[[dialogue]]
speaker = "舞亜"
# 『……ソフィ、なんか最近私に冷たくない？』
line = "『……ソフィ、なんか最近私に冷たくない？』"

[[dialogue]]
speaker = "ソフィア"
# 『舞亜さんは姉さんに会いたかったんですよね？　じゃあ姉さんと仲良くすればいいじゃないですか』
line = "『舞亜さんは姉さんに会いたかったんですよね？　じゃあ姉さんと仲良くすればいいじゃないですか』"

[[dialogue]]
speaker = "舞亜"
# 「……って感じで、最近ソフィがご機嫌ナナメなんだよね。ソフィと仲良くなったのはお姉さんに近づくため、みたいに思われたみたいで」
line = "「……って感じで、最近ソフィがご機嫌ナナメなんだよね。ソフィと仲良くなったのはお姉さんに近づくため、みたいに思われたみたいで」"

[[dialogue]]
speaker = "舞亜"
# 「確かにきっかけはお姉さんだったけど、ソフィは大事な友達なのに」
line = "「確かにきっかけはお姉さんだったけど、ソフィは大事な友達なのに」"

[[dialogue]]
speaker = "unk"
# その気持ちを直接伝えればいい
line = "その気持ちを直接伝えればいい"

[[dialogue]]
speaker = "舞亜"
# 「そう……かな？」
line = "「そう……かな？」"

[[dialogue]]
speaker = "舞亜"
# 「……うん、そうだよね。思ってることはちゃんと言わないと伝わらないよね。だから協力してくれる、会長さん？」
line = "「……うん、そうだよね。思ってることはちゃんと言わないと伝わらないよね。だから協力してくれる、会長さん？」"

[[dialogue]]
speaker = "ソフィア"
# 「なんですか、会長さんから私に話って。珍しいですね」
line = "「なんですか、会長さんから私に話って。珍しいですね」"

[[dialogue]]
speaker = "舞亜"
# 「ごめん、本当は話があるのは私なんだ」
line = "「ごめん、本当は話があるのは私なんだ」"

[[dialogue]]
speaker = "ソフィア"
# 「舞亜さんっ？　これはどういう……」
line = "「舞亜さんっ？　これはどういう……」"

[[dialogue]]
speaker = "舞亜"
# 「最近あんまり話してくれなかったからさ、これくらいしないとダメかなって。……ちゃんと話を聞いてほしい。私、真剣だから」
line = "「最近あんまり話してくれなかったからさ、これくらいしないとダメかなって。……ちゃんと話を聞いてほしい。私、真剣だから」"

[[dialogue]]
speaker = "unk"
# 俺からも頼む
line = "俺からも頼む"

[[dialogue]]
speaker = "ソフィア"
# 「……わかりました。そこまで言うなら、ちゃんとお聞きします」
line = "「……わかりました。そこまで言うなら、ちゃんとお聞きします」"

[[dialogue]]
speaker = "舞亜"
# 「ありがとう、ソフィ」
line = "「ありがとう、ソフィ」"

[[dialogue]]
speaker = "舞亜"
# 「どこから話していいかわからないんだけど……実は私、流星に入ったらフィギュアスケートやめようと思ってたんだ」
line = "「どこから話していいかわからないんだけど……実は私、流星に入ったらフィギュアスケートやめようと思ってたんだ」"

[[dialogue]]
speaker = "ソフィア"
# 「えっ」
line = "「えっ」"

[[dialogue]]
speaker = "舞亜"
# 「そもそも私、最初はフィギュアスケート好きじゃなかったしね」
line = "「そもそも私、最初はフィギュアスケート好きじゃなかったしね」"

[[dialogue]]
speaker = "ソフィア"
# 「えええっ！？」
line = "「えええっ！？」"

[[dialogue]]
speaker = "舞亜"
# 「誤解しないでほしいんだけど、フィギュアスケートが嫌いだったんじゃないよ。でも……前はそんなに好きじゃなかった」
line = "「誤解しないでほしいんだけど、フィギュアスケートが嫌いだったんじゃないよ。でも……前はそんなに好きじゃなかった」"

[[dialogue]]
speaker = "舞亜"
# 「母さんが元選手で、父さんもスポーツ関係の仕事だから、物心ついた時にはリンクで滑ってた」
line = "「母さんが元選手で、父さんもスポーツ関係の仕事だから、物心ついた時にはリンクで滑ってた」"

[[dialogue]]
speaker = "舞亜"
# 「練習は大変だし、おやつは自由に食べられないし、友達とも遊べないけど、私は嫌だとかやめたいとか言わなかった」
line = "「練習は大変だし、おやつは自由に食べられないし、友達とも遊べないけど、私は嫌だとかやめたいとか言わなかった」"

[[dialogue]]
speaker = "舞亜"
# 「だって私にはフィギュアスケートが一番向いてるってなんとなくわかってたから」
line = "「だって私にはフィギュアスケートが一番向いてるってなんとなくわかってたから」"

[[dialogue]]
speaker = "舞亜"
# 「だけどつらい気持ちがちょっとずつ溜まっていって、ひとりになるといつも泣きそうだった」
line = "「だけどつらい気持ちがちょっとずつ溜まっていって、ひとりになるといつも泣きそうだった」"

[[dialogue]]
speaker = "舞亜"
# 「でもね、見たんだ。夜空に輝く星を」
line = "「でもね、見たんだ。夜空に輝く星を」"

[[dialogue]]
speaker = "舞亜"
# 「海外遠征中、道に迷った時に見つけたひとつの星」
line = "「海外遠征中、道に迷った時に見つけたひとつの星」"

[[dialogue]]
speaker = "舞亜"
# 「星なんていつもは何気なく視界に入るだけの存在だった。だけど気付けば見惚れていた」
line = "「星なんていつもは何気なく視界に入るだけの存在だった。だけど気付けば見惚れていた」"

[[dialogue]]
speaker = "舞亜"
# 「真っ暗闇に光が差し込んだ気がした。綺麗だった。胸が熱くなった」
line = "「真っ暗闇に光が差し込んだ気がした。綺麗だった。胸が熱くなった」"

[[dialogue]]
speaker = "舞亜"
# 「私はたったそれだけで救われた」
line = "「私はたったそれだけで救われた」"

[[dialogue]]
speaker = "舞亜"
# 「だからその星に近づきたいと思った」
line = "「だからその星に近づきたいと思った」"

[[dialogue]]
speaker = "舞亜"
# 「誰かを照らせる存在に、誰かの道しるべになれる存在に……あの夜見た星になりたいと思った」
line = "「誰かを照らせる存在に、誰かの道しるべになれる存在に……あの夜見た星になりたいと思った」"

[[dialogue]]
speaker = "舞亜"
# 「リンクという氷の空で輝く星になるために、いっぱい練習して、世界大会でも優勝するようになった」
line = "「リンクという氷の空で輝く星になるために、いっぱい練習して、世界大会でも優勝するようになった」"

[[dialogue]]
speaker = "舞亜"
# 「そして星騎士という新たな星を見つけて今に至る──って感じかな。流星に入ったら、星騎士に専念するつもりだったけど」
line = "「そして星騎士という新たな星を見つけて今に至る──って感じかな。流星に入ったら、星騎士に専念するつもりだったけど」"

[[dialogue]]
speaker = "ソフィア"
# 「じゃあどうして今もフィギュアを続けているんですか？」
line = "「じゃあどうして今もフィギュアを続けているんですか？」"

[[dialogue]]
speaker = "舞亜"
# 「そう、そこからが大事な話。私たちが初めて会ったときのこと覚えてる？」
line = "「そう、そこからが大事な話。私たちが初めて会ったときのこと覚えてる？」"

[[dialogue]]
speaker = "ソフィア"
# 「ええ、まぁ……あの時はすごく興奮しました。舞亜さんがこんな奔放な人だとは思いませんでしたけど」
line = "「ええ、まぁ……あの時はすごく興奮しました。舞亜さんがこんな奔放な人だとは思いませんでしたけど」"

[[dialogue]]
speaker = "舞亜"
# 「ふふ、褒められると照れちゃうな」
line = "「ふふ、褒められると照れちゃうな」"

[[dialogue]]
speaker = "ソフィア"
# 「だから褒めてませんっ」
line = "「だから褒めてませんっ」"

[[dialogue]]
speaker = "舞亜"
# 「ソフィと出会って、あのキラキラした目を見て気付いたんだ」
line = "「ソフィと出会って、あのキラキラした目を見て気付いたんだ」"

[[dialogue]]
speaker = "舞亜"
# 「私はソフィの星になれてたんだって」
line = "「私はソフィの星になれてたんだって」"

[[dialogue]]
speaker = "舞亜"
# 「だから私はこれからもソフィを照らす星でいたい。私という星をソフィにもっと見てもらいたい」
line = "「だから私はこれからもソフィを照らす星でいたい。私という星をソフィにもっと見てもらいたい」"

[[dialogue]]
speaker = "舞亜"
# 「私がフィギュアスケートを続けてるのはソフィが見てくれてるおかげなんだよ」
line = "「私がフィギュアスケートを続けてるのはソフィが見てくれてるおかげなんだよ」"

[[dialogue]]
speaker = "ソフィア"
# 「舞亜さん……」
line = "「舞亜さん……」"

[[dialogue]]
speaker = "ソフィア"
# 「その……すみません、こんなことでムキになってしまって。私だって舞亜さんがそんなつもりじゃないことくらいわかっていたはずなのに」
line = "「その……すみません、こんなことでムキになってしまって。私だって舞亜さんがそんなつもりじゃないことくらいわかっていたはずなのに」"

[[dialogue]]
speaker = "舞亜"
# 「ううん、こっちこそ私の気持ち、全然伝えられてなかったから。いい機会だったと思う」
line = "「ううん、こっちこそ私の気持ち、全然伝えられてなかったから。いい機会だったと思う」"

[[dialogue]]
speaker = "舞亜"
# 「また一緒にパンケーキ食べに行こうよ。１人だとカロリー高すぎるもんね」
line = "「また一緒にパンケーキ食べに行こうよ。１人だとカロリー高すぎるもんね」"

[[dialogue]]
speaker = "ソフィア"
# 「はい、必ず。約束です」
line = "「はい、必ず。約束です」"

[[dialogue]]
speaker = "舞亜"
# 「ありがとう、会長さん。おかげで友達に誤解されたままにならずに済んだよ」
line = "「ありがとう、会長さん。おかげで友達に誤解されたままにならずに済んだよ」"

[[dialogue]]
speaker = "unk"
# どういたしまして
line = "どういたしまして"

[[dialogue]]
speaker = "舞亜"
# 「また今度お礼させてね。そうだ、お休みの日にデートしよっか？」
line = "「また今度お礼させてね。そうだ、お休みの日にデートしよっか？」"

[[dialogue]]
speaker = "unk"
# ！？
line = "！？"

[[dialogue]]
speaker = "舞亜"
# 「あ、まんざらでもない感じかな。会長さんもかわいいところあるね♪」
line = "「あ、まんざらでもない感じかな。会長さんもかわいいところあるね♪」"

[[dialogue]]
speaker = "ソフィア"
# 「ですがその前に数学の課題です。明日提出ですから今すぐ終わらせましょうっ」
line = "「ですがその前に数学の課題です。明日提出ですから今すぐ終わらせましょうっ」"

[[dialogue]]
speaker = "舞亜"
# 「えええっ、今その流れ！？　せっかくスッキリしたところだったにぃ～～～っ！！」
line = "「えええっ、今その流れ！？　せっかくスッキリしたところだったにぃ～～～っ！！」"
