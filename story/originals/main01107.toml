[[dialogue]]
speaker = "unk"
# 第９話,漆黒の野望,B
line = "第９話,漆黒の野望,B"

[[dialogue]]
speaker = "ヴィーナス"
# 「ぁ──ぅ……っ──く……っ──」
line = "「ぁ──ぅ……っ──く……っ──」"

[[dialogue]]
speaker = "黒騎士"
# 『フン──よくもその死に体でいつまでも粘るものだ』
line = "『フン──よくもその死に体でいつまでも粘るものだ』"

[[dialogue]]
speaker = "unk"
# 地に伏したヴィーナスは息も絶え絶えに黒騎士を見上げる。
line = "地に伏したヴィーナスは息も絶え絶えに黒騎士を見上げる。"

[[dialogue]]
speaker = "unk"
# すべての星力を使い果たし、また『冬』による大寒波を浴びたことで、彼女の命は風前の灯火となっていた。
line = "すべての星力を使い果たし、また『冬』による大寒波を浴びたことで、彼女の命は風前の灯火となっていた。"

[[dialogue]]
speaker = "黒騎士"
# 『思い出せ。貴様がこの世界へ到来する以前──果たしてどこにいたのかを』
line = "『思い出せ。貴様がこの世界へ到来する以前──果たしてどこにいたのかを』"

[[dialogue]]
speaker = "ヴィーナス"
# 「知ら──ない、わよ……っ！　昔のことは覚えてないって、言ってんでしょ……っ！」
line = "「知ら──ない、わよ……っ！　昔のことは覚えてないって、言ってんでしょ……っ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「気づいたらヘレナちゃんのお屋敷にいて……<ruby=かんざし>簪</ruby>を掲げて……そんで今の私になって……」
line = "「気づいたらヘレナちゃんのお屋敷にいて……<ruby>簪<rt>かんざし</rt></ruby>を掲げて……そんで今の私になって……」"

[[dialogue]]
speaker = "unk"
# ヴィーナスの言葉に嘘はなかった。
line = "ヴィーナスの言葉に嘘はなかった。"

[[dialogue]]
speaker = "unk"
# ただこの世界に飛来した時から彼女は、正体の知れない使命感に突き動かされてきたのだから。
line = "ただこの世界に飛来した時から彼女は、正体の知れない使命感に突き動かされてきたのだから。"

[[dialogue]]
speaker = "unk"
# 自分が<b>元いた世界</b>──それに思いを巡らせる機会も、これまでにありはしなかった。
line = "自分が<b>元いた世界</b>──それに思いを巡らせる機会も、これまでにありはしなかった。"

[[dialogue]]
speaker = "ヴィーナス"
# 「大体──それを知って何しようってのよ、あんたは──！」
line = "「大体──それを知って何しようってのよ、あんたは──！」"

[[dialogue]]
speaker = "黒騎士"
# 『……再創生だ』
line = "『……再創生だ』"

[[dialogue]]
speaker = "ヴィーナス"
# 「え……？」
line = "「え……？」"

[[dialogue]]
speaker = "黒騎士"
# 『新世界の再創生──それにより、今一度こちらの世界とあちらの世界を繋げる必要がある』
line = "『新世界の再創生──それにより、今一度こちらの世界とあちらの世界を繋げる必要がある』"

[[dialogue]]
speaker = "黒騎士"
# 『貴様の元いたデネブと──こちら、アルタイルの世界を、何もかもかき混ぜることによって』
line = "『貴様の元いたデネブと──こちら、アルタイルの世界を、何もかもかき混ぜることによって』"

[[dialogue]]
speaker = "ヴィーナス"
# 「世界の再創生──って……それ、リクリエ……」
line = "「世界の再創生──って……それ、リクリエ……」"

[[dialogue]]
speaker = "黒騎士"
# 『そうだ。今代のリクリエには、平行するすべての世界をゼロから創り直してもらう必要がある』
line = "『そうだ。今代のリクリエには、平行するすべての世界をゼロから創り直してもらう必要がある』"

[[dialogue]]
speaker = "黒騎士"
# 『この森──ネメシスのように。すべてを無に帰し、それらを組み替えることでしか新世界は生まれ得ない』
line = "『この森──ネメシスのように。すべてを無に帰し、それらを組み替えることでしか新世界は生まれ得ない』"

[[dialogue]]
speaker = "黒騎士"
# 『そのためにも──デネブの娘。貴様の記憶にこそ、全ての鍵があるのだ』
line = "『そのためにも──デネブの娘。貴様の記憶にこそ、全ての鍵があるのだ』"

[[dialogue]]
speaker = "ヴィーナス"
# 「──」
line = "「──」"

[[dialogue]]
speaker = "unk"
# 昔の記憶がない。
line = "昔の記憶がない。"

[[dialogue]]
speaker = "unk"
# そのことを、ヴィーナスはさほど不都合に感じたことはなかった。クロトだって似たような事情があると聞いたこともある。
line = "そのことを、ヴィーナスはさほど不都合に感じたことはなかった。クロトだって似たような事情があると聞いたこともある。"

[[dialogue]]
speaker = "unk"
# しかし目の前の黒騎士は──その一点にただ執着していた。
line = "しかし目の前の黒騎士は──その一点にただ執着していた。"

[[dialogue]]
speaker = "黒騎士"
# 『仕方ない──ここまで弱らせても吐かぬのなら、本当に記憶にないのだろう』
line = "『仕方ない──ここまで弱らせても吐かぬのなら、本当に記憶にないのだろう』"

[[dialogue]]
speaker = "黒騎士"
# 『なれば貴様を分解し──記憶を直接覗く他あるまい』
line = "『なれば貴様を分解し──記憶を直接覗く他あるまい』"

[[dialogue]]
speaker = "ヴィーナス"
# 「っ……！？　あっ──くぅっ！？」
line = "「っ……！？　あっ──くぅっ！？」"

[[dialogue]]
speaker = "黒騎士"
# 『エーテルバニッシュメント』
line = "『エーテルバニッシュメント』"

[[dialogue]]
speaker = "unk"
# 暗黒のエネルギーが檻となって、ヴィーナスの全身を幽閉する。
line = "暗黒のエネルギーが檻となって、ヴィーナスの全身を幽閉する。"

[[dialogue]]
speaker = "unk"
# そして精気から星力までを、彼女から根こそぎ吸い上げていった。
line = "そして精気から星力までを、彼女から根こそぎ吸い上げていった。"

[[dialogue]]
speaker = "ヴィーナス"
# 「なっ──くっ、あっ……！　何、してんのよ──っっ……！」
line = "「なっ──くっ、あっ……！　何、してんのよ──っっ……！」"

[[dialogue]]
speaker = "黒騎士"
# 『九浄ヴィーナスという存在を霊体にまで分解させ──消散する前に、この大寒波を利用して凍結させる』
line = "『九浄ヴィーナスという存在を霊体にまで分解させ──消散する前に、この大寒波を利用して凍結させる』"

[[dialogue]]
speaker = "黒騎士"
# 『貴様の霊体そのものを読み解くことで……デネブへの道が見通せるやもしれん』
line = "『貴様の霊体そのものを読み解くことで……デネブへの道が見通せるやもしれん』"

[[dialogue]]
speaker = "黒騎士"
# 『もっとも……この手段を取ったが最後、元に戻せぬのが難点だがな』
line = "『もっとも……この手段を取ったが最後、元に戻せぬのが難点だがな』"

[[dialogue]]
speaker = "ヴィーナス"
# 「──ッ！」
line = "「──ッ！」"

[[dialogue]]
speaker = "unk"
# つまりは、死──
line = "つまりは、死──"

[[dialogue]]
speaker = "unk"
# 無き記憶を呼び覚ませないというヴィーナスに代わって、黒騎士は自ら彼女を検分しようとしていた。
line = "無き記憶を呼び覚ませないというヴィーナスに代わって、黒騎士は自ら彼女を検分しようとしていた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「い──やっ……！　助けて、みんな──っ……！」
line = "「い──やっ……！　助けて、みんな──っ……！」"

[[dialogue]]
speaker = "黒騎士"
# 『無駄な足掻きと知っていよう。外は今も大いなる冬に見舞われている──魔獣の遠吠えすら、ここには届かない』
line = "『無駄な足掻きと知っていよう。外は今も大いなる冬に見舞われている──魔獣の遠吠えすら、ここには届かない』"

[[dialogue]]
speaker = "黒騎士"
# 『首を断つ。苦しみは一瞬だ。その存在がかき消えぬうちに……全身を凍てつかせてやる』
line = "『首を断つ。苦しみは一瞬だ。その存在がかき消えぬうちに……全身を凍てつかせてやる』"

[[dialogue]]
speaker = "ヴィーナス"
# 「────っ！」
line = "「────っ！」"

[[dialogue]]
speaker = "黒騎士"
# 『果てよ──』
line = "『果てよ──』"

[[dialogue]]
speaker = "unk"
# 黒騎士が剣を振り上げる。
line = "黒騎士が剣を振り上げる。"

[[dialogue]]
speaker = "unk"
# 躊躇なき烈断の一閃──だが、その寸前。
line = "躊躇なき烈断の一閃──だが、その寸前。"

[[dialogue]]
speaker = "ヴィーナス"
# 「！？」
line = "「！？」"

[[dialogue]]
speaker = "黒騎士"
# 『……何』
line = "『……何』"

[[dialogue]]
speaker = "unk"
# 冥府の森を縫って飛来した拳撃の真空波が──２人の間を割って、剣を弾き飛ばしていた。
line = "冥府の森を縫って飛来した拳撃の真空波が──２人の間を割って、剣を弾き飛ばしていた。"

[[dialogue]]
speaker = "クロト"
# 「うちのメンバーに──手出しはしないでもらおうか」
line = "「うちのメンバーに──手出しはしないでもらおうか」"
