[[dialogue]]
speaker = "unk"
# それは、クリスマスを今月に控えたある日のこと――
line = "それは、クリスマスを今月に控えたある日のこと――"

[[dialogue]]
speaker = "セシア"
# 「紅明ママ～♪　セシア、呼ばれて来たわ～♪」
line = "「紅明ママ～♪　セシア、呼ばれて来たわ～♪」"

[[dialogue]]
speaker = "紅明"
# 「おっす、セッシー☆　よくぞ来た！」
line = "「おっす、セッシー☆　よくぞ来た！」"

[[dialogue]]
speaker = "セシア"
# 「あら？　紅明ママ、今日はサンタの格好をしたりしてどうしたの？　クリスマスはまだ少し先よ？」
line = "「あら？　紅明ママ、今日はサンタの格好をしたりしてどうしたの？　クリスマスはまだ少し先よ？」"

[[dialogue]]
speaker = "紅明"
# 「うん、実はそのことなんだけど、今日呼び出したのは、今年のクリスマスについて、セッシーにお願いごとがあるからなんだ」
line = "「うん、実はそのことなんだけど、今日呼び出したのは、今年のクリスマスについて、セッシーにお願いごとがあるからなんだ」"

[[dialogue]]
speaker = "セシア"
# 「お願いごと？」
line = "「お願いごと？」"

[[dialogue]]
speaker = "紅明"
# 「ああ、ズバリ――」
line = "「ああ、ズバリ――」"

[[dialogue]]
speaker = "紅明"
# 「初代サンタのアタシが、セッシーを２代目サンタに任命するぜ！！！」
line = "「初代サンタのアタシが、セッシーを２代目サンタに任命するぜ！！！」"

[[dialogue]]
speaker = "セシア"
# 「セシアが、次のサンタに？」
line = "「セシアが、次のサンタに？」"

[[dialogue]]
speaker = "unk"
# 「――そんなわけで」
line = "「――そんなわけで」"

[[dialogue]]
speaker = "セシア"
# 「わたくしが、今年のサンタ役に決まったというわけなの♪」
line = "「わたくしが、今年のサンタ役に決まったというわけなの♪」"

[[dialogue]]
speaker = "unk"
# サンタ衣装、かわいい！
line = "サンタ衣装、かわいい！"

[[dialogue]]
speaker = "セシア"
# 「ふふっ、会長、ありがとう♪　前回はわたくしだけ衣装がなかったから、ついに着ることができて、とても嬉しいわ♪」
line = "「ふふっ、会長、ありがとう♪　前回はわたくしだけ衣装がなかったから、ついに着ることができて、とても嬉しいわ♪」"

[[dialogue]]
speaker = "unk"
# クリスマスを２週間後に控えた今日。
line = "クリスマスを２週間後に控えた今日。"

[[dialogue]]
speaker = "unk"
# 今年も学園の生徒たちにクリスマスプレゼントを配るサンタ企画が決定し、その為の衣装をお披露目するために、セシアは星徒会室までやってきたのだった。
line = "今年も学園の生徒たちにクリスマスプレゼントを配るサンタ企画が決定し、その為の衣装をお披露目するために、セシアは星徒会室までやってきたのだった。"

[[dialogue]]
speaker = "unk"
# 衣装の用意は、ヘレナちゃんが？
line = "衣装の用意は、ヘレナちゃんが？"

[[dialogue]]
speaker = "セシア"
# 「ええ。紅明ママがヘレナちゃんに頼んでくれていたの」
line = "「ええ。紅明ママがヘレナちゃんに頼んでくれていたの」"

[[dialogue]]
speaker = "セシア"
# 「ネビュラとの技術共有で、魔女も水着フォームに変身できるようになったでしょう？」
line = "「ネビュラとの技術共有で、魔女も水着フォームに変身できるようになったでしょう？」"

[[dialogue]]
speaker = "セシア"
# 「その応用で、アニマとアナが『霊力』対応型の人工戦闘服として、わたくしのクリスマスフォームを完成させてくれたのよ」
line = "「その応用で、アニマとアナが『霊力』対応型の人工戦闘服として、わたくしのクリスマスフォームを完成させてくれたのよ」"

[[dialogue]]
speaker = "unk"
# 彼女は流星学園附属校に通う１年生の『セシア』。
line = "彼女は流星学園附属校に通う１年生の『セシア』。"

[[dialogue]]
speaker = "unk"
# その正体は、世界の摂理を管理する６柱の『守護天使』が１柱、『《万成》のアウクセシア』――その転生体である。
line = "その正体は、世界の摂理を管理する６柱の『守護天使』が１柱、『《万成》のアウクセシア』――その転生体である。"

[[dialogue]]
speaker = "unk"
# 前回のクリスマスの時、転生直後で記憶喪失だった彼女をヴィーナスが拾って来て、俺や紅明たちと一緒にクリスマスプレゼントを配ることになったという経緯がある。
line = "前回のクリスマスの時、転生直後で記憶喪失だった彼女をヴィーナスが拾って来て、俺や紅明たちと一緒にクリスマスプレゼントを配ることになったという経緯がある。"

[[dialogue]]
speaker = "セシア"
# 「ちなみに今回、サンタになりきる為のアイテムも用意しているわ」
line = "「ちなみに今回、サンタになりきる為のアイテムも用意しているわ」"

[[dialogue]]
speaker = "unk"
# アイテム……？
line = "アイテム……？"

[[dialogue]]
speaker = "unk"
# 俺が首を傾げていると、セシアは楽しそうにサンタの袋からあるものを取り出して――
line = "俺が首を傾げていると、セシアは楽しそうにサンタの袋からあるものを取り出して――"

[[dialogue]]
speaker = "セシア"
# 「ふふっ……装着♪」
line = "「ふふっ……装着♪」"

[[dialogue]]
speaker = "セシア"
# 「フォッフォッフォ♪　どうじゃ、会長？　似合っているかしら？」
line = "「フォッフォッフォ♪　どうじゃ、会長？　似合っているかしら？」"

[[dialogue]]
speaker = "unk"
# 白ヒゲ！
line = "白ヒゲ！"

[[dialogue]]
speaker = "セシア"
# 「気に入ってくれたようで何よりだわ♪　さてと――」
line = "「気に入ってくれたようで何よりだわ♪　さてと――」"

[[dialogue]]
speaker = "セシア"
# 「それでね、本当は前回みたいに、紅明ママやヨミヨミも一緒にプレゼント配りが出来たらよかったんだけど……」
line = "「それでね、本当は前回みたいに、紅明ママやヨミヨミも一緒にプレゼント配りが出来たらよかったんだけど……」"

[[dialogue]]
speaker = "セシア"
# 「今回は２人共、別の用事が重なっちゃったみたいなの。紅明ママはタレント業の方で、クリスマスバラエティの生放送に出演しないといけないらしくて――」
line = "「今回は２人共、別の用事が重なっちゃったみたいなの。紅明ママはタレント業の方で、クリスマスバラエティの生放送に出演しないといけないらしくて――」"

[[dialogue]]
speaker = "セシア"
# 「ヨミヨミは、大聖堂カフェテリアでやるクリスマスパーティーの司会進行役を頼まれたみたい。その準備をしなくちゃならないんですって」
line = "「ヨミヨミは、大聖堂カフェテリアでやるクリスマスパーティーの司会進行役を頼まれたみたい。その準備をしなくちゃならないんですって」"

[[dialogue]]
speaker = "unk"
# だから紅明は、セシアにサンタを頼んだのか
line = "だから紅明は、セシアにサンタを頼んだのか"

[[dialogue]]
speaker = "セシア"
# 「ええ。紅明ママに頼まれたんだもの。わたくし、張り切って頑張るわ♪」
line = "「ええ。紅明ママに頼まれたんだもの。わたくし、張り切って頑張るわ♪」"

[[dialogue]]
speaker = "unk"
# と、その時だった。
line = "と、その時だった。"

[[dialogue]]
speaker = "unk"
# 星徒会の扉がノックされる。
line = "星徒会の扉がノックされる。"

[[dialogue]]
speaker = "セシア"
# 「どうやら２人共、準備ができたみたいね」
line = "「どうやら２人共、準備ができたみたいね」"

[[dialogue]]
speaker = "unk"
# ２人……？
line = "２人……？"

[[dialogue]]
speaker = "セシア"
# 「ふふっ、紅明ママとヨミヨミの代わりに、今年の助っ人をお願いしたのよ」
line = "「ふふっ、紅明ママとヨミヨミの代わりに、今年の助っ人をお願いしたのよ」"

[[dialogue]]
speaker = "２人"
# 「失礼しま～す！」
line = "「失礼しま～す！」"

[[dialogue]]
speaker = "ルルカ"
# 「じゃじゃ～ん♪　お兄ちゃん！」
line = "「じゃじゃ～ん♪　お兄ちゃん！」"

[[dialogue]]
speaker = "フェニエル"
# 「メリークリスマスです♪　ちょっと早いですけど……えへへ♪」
line = "「メリークリスマスです♪　ちょっと早いですけど……えへへ♪」"

[[dialogue]]
speaker = "unk"
# なんと現れたのは、同じくクリスマスの衣装を纏ったルルカとフニ。
line = "なんと現れたのは、同じくクリスマスの衣装を纏ったルルカとフニ。"

[[dialogue]]
speaker = "unk"
# こうして、今年の新たなクリスマスイベントが幕を開けるのだった――
line = "こうして、今年の新たなクリスマスイベントが幕を開けるのだった――"
