line = "「聞いてください！　全くもう……それで、結婚雑誌ですか？」"

[[dialogue]]
speaker = "ナミエル"
# 「へぇ……このようなものがあるのですね。知りませんでした。きっと戦闘のどさくさで書店から吹き飛ばされてしまったのですね」
line = "「へぇ……このようなものがあるのですね。知りませんでした。きっと戦闘のどさくさで書店から吹き飛ばされてしまったのですね」"

[[dialogue]]
