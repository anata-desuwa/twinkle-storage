line = "「っっ……。も、もっと他に言い方はなかったのですか？　動機が不純です。公私の混同はよしてください」"

[[dialogue]]
speaker = "ナミエル"
# 「私一人で夜道を帰らせるのは嫌だから……とか。彼氏として彼女の仕事を手伝いたい……とか。色々あるではないですか」
line = "「私一人で夜道を帰らせるのは嫌だから……とか。彼氏として彼女の仕事を手伝いたい……とか。色々あるではないですか」"

[[dialogue]]
speaker = "ナミエル"
# 「む、無論、そのようなことを言われたいわけではありませんが。夜道など一人で帰れますし、清掃を手伝っていただいても時間が無駄にかかるだけですし」
line = "「む、無論、そのようなことを言われたいわけではありませんが。夜道など一人で帰れますし、清掃を手伝っていただいても時間が無駄にかかるだけですし」"

[[dialogue]]
speaker = "ナミエル"
# 「と、とにかく。手伝うにしても健全な理由で手伝ってください。深夜デートなんて、ふ、不健全なこと……」
line = "「と、とにかく。手伝うにしても健全な理由で手伝ってください。深夜デートなんて、ふ、不健全なこと……」"

