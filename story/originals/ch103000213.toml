# 「ふぅ、こんなところまで瓦礫が飛んで。やはり今夜は大立ち回りだったようですね」
line = "「ふぅ、こんなところまで瓦礫が飛んで。やはり今夜は大立ち回りだったようですね」"

[[dialogue]]
