# 「……そろそろ帰られても良いのですよ？　もう夜も遅いですし、お陰様で大部分は片付きましたので」
line = "「……そろそろ帰られても良いのですよ？　もう夜も遅いですし、お陰様で大部分は片付きましたので」"

[[dialogue]]
speaker = "ナミエル"
# 「これは美化委員の仕事です。無理して手伝っていただかなくとも……」
line = "「これは美化委員の仕事です。無理して手伝っていただかなくとも……」"

[[dialogue]]
speaker = "unk"
