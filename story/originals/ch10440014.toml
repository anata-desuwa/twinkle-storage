[[dialogue]]
speaker = "unk"
# 第４話,メルクリウスハート,P
line = "第４話,メルクリウスハート,P"

[[dialogue]]
speaker = "unk"
# プリムラとの付き合いも長くなってきた、とある休日。彼女が突然、家に押しかけてきた――
line = "プリムラとの付き合いも長くなってきた、とある休日。彼女が突然、家に押しかけてきた――"

[[dialogue]]
speaker = "プリムラ"
# 「フフフ……<ruby=けんぞく>眷族</ruby>よ、よもやこの券を忘れてはおるまいな？」
line = "「フフフ……<ruby>眷族<rt>けんぞく</rt></ruby>よ、よもやこの券を忘れてはおるまいな？」"

[[dialogue]]
speaker = "プリムラ"
# 「そう、これは……貴様が以前困っていた時に我が力を貸して、その見返りとして発行させた『１日何でも言うことを聞く券』じゃ！」
line = "「そう、これは……貴様が以前困っていた時に我が力を貸して、その見返りとして発行させた『１日何でも言うことを聞く券』じゃ！」"

[[dialogue]]
speaker = "unk"
# まさかそれを使って、俺を眷族にしようと？
line = "まさかそれを使って、俺を眷族にしようと？"

[[dialogue]]
speaker = "プリムラ"
# 「フハハハ！　その通り！　少なくとも今日１日は、我の命令を素直に聞くのじゃ！」
line = "「フハハハ！　その通り！　少なくとも今日１日は、我の命令を素直に聞くのじゃ！」"

[[dialogue]]
speaker = "プリムラ"
# 「なに、案ずるな。今回に限っていえば、悪事を働けなどと命令するつもりはない。我が貴様に命じるのは――」
line = "「なに、案ずるな。今回に限っていえば、悪事を働けなどと命令するつもりはない。我が貴様に命じるのは――」"

[[dialogue]]
speaker = "プリムラ"
# 「我を<b>抱っこ</b>することじゃ！」
line = "「我を<b>抱っこ</b>することじゃ！」"

[[dialogue]]
speaker = "unk"
# ……なんて？
line = "……なんて？"

[[dialogue]]
speaker = "プリムラ"
# 「抱っこじゃ！　貴様は今、ソファーに腰かけているであろう？　我をその膝の上に乗せるがよい！」
line = "「抱っこじゃ！　貴様は今、ソファーに腰かけているであろう？　我をその膝の上に乗せるがよい！」"

[[dialogue]]
speaker = "プリムラ"
# 「何も難しいことは言っておらぬであろう？　まさか嫌とは言うまいな？」
line = "「何も難しいことは言っておらぬであろう？　まさか嫌とは言うまいな？」"

[[dialogue]]
speaker = "プリムラ"
# 「――フフフ、よしよし♪　ならば膝の上、邪魔させてもらうぞ。……よいしょっと」
line = "「――フフフ、よしよし♪　ならば膝の上、邪魔させてもらうぞ。……よいしょっと」"

[[dialogue]]
speaker = "プリムラ"
# 「ふむふむ……おお……！　なるほど♪」
line = "「ふむふむ……おお……！　なるほど♪」"

[[dialogue]]
speaker = "プリムラ"
# 「フフフ、これはなかなかにいいものなのじゃ♪　世界征服をした暁には、玉座にこうやって２人腰かけるのも悪くないやもしれぬ」
line = "「フフフ、これはなかなかにいいものなのじゃ♪　世界征服をした暁には、玉座にこうやって２人腰かけるのも悪くないやもしれぬ」"

[[dialogue]]
speaker = "プリムラ"
# 「――む？　なぜ抱っこなのかじゃと？」
line = "「――む？　なぜ抱っこなのかじゃと？」"

[[dialogue]]
speaker = "プリムラ"
# 「貴様、いつもサチとこんな形で抱き合っておるであろう。故に我も同じことをしてみただけのこと」
line = "「貴様、いつもサチとこんな形で抱き合っておるであろう。故に我も同じことをしてみただけのこと」"

[[dialogue]]
speaker = "unk"
# 言っとくけど、あれは不可抗力だからね！？
line = "言っとくけど、あれは不可抗力だからね！？"

[[dialogue]]
speaker = "プリムラ"
# 「貴様がサチの幸運を狂わせる特異点であることは承知の上じゃ」
line = "「貴様がサチの幸運を狂わせる特異点であることは承知の上じゃ」"

[[dialogue]]
speaker = "プリムラ"
# 「ただ、貴様は我と眷族の契約を結んでいるのだから、我がサチと同じことをしても何らおかしくはなかろう？」
line = "「ただ、貴様は我と眷族の契約を結んでいるのだから、我がサチと同じことをしても何らおかしくはなかろう？」"

[[dialogue]]
speaker = "プリムラ"
# 「というよりも、むしろ我の方に権利があるはず。待てよ、サチとはもっとハレンチな状態になっておったな……そうじゃ！」
line = "「というよりも、むしろ我の方に権利があるはず。待てよ、サチとはもっとハレンチな状態になっておったな……そうじゃ！」"

[[dialogue]]
speaker = "プリムラ"
# 「お互いに腕を相手の背中に回して、もっと密着するのじゃ。こんな風に」
line = "「お互いに腕を相手の背中に回して、もっと密着するのじゃ。こんな風に」"

[[dialogue]]
speaker = "プリムラ"
# 「ほら、貴様もじゃ。サチがよくて、我がダメなどとは言うまいな？」
line = "「ほら、貴様もじゃ。サチがよくて、我がダメなどとは言うまいな？」"

[[dialogue]]
speaker = "プリムラ"
# 「何をもたもたしておるのじゃ。早くせい」
line = "「何をもたもたしておるのじゃ。早くせい」"

[[dialogue]]
speaker = "unk"
# （プリムラの体を抱き締める）
line = "（プリムラの体を抱き締める）"

[[dialogue]]
speaker = "プリムラ"
# 「ん……、フフフ……♪　何だ、サチのやつめ、これで慌てるとはまだまだ子供じゃな」
line = "「ん……、フフフ……♪　何だ、サチのやつめ、これで慌てるとはまだまだ子供じゃな」"

[[dialogue]]
speaker = "プリムラ"
# 「全然悪くないではないか。体温が心地よく、布団よりもよく寝られそうじゃ」
line = "「全然悪くないではないか。体温が心地よく、布団よりもよく寝られそうじゃ」"

[[dialogue]]
speaker = "プリムラ"
# 「貴様も、サチとくっつくよりも、我の方がよいのではないか？　なんせ、我の体は世界でただ１つの賢者の石でできておるのじゃからな♪」
line = "「貴様も、サチとくっつくよりも、我の方がよいのではないか？　なんせ、我の体は世界でただ１つの賢者の石でできておるのじゃからな♪」"

[[dialogue]]
speaker = "プリムラ"
# 「人を駄目にしてしまうであろう抱き心地の、ぷにぷにもちもち肌よ。それに、元の姿を取り戻せば、我は胸や尻も大きいナイスバディ―なのじゃ」
line = "「人を駄目にしてしまうであろう抱き心地の、ぷにぷにもちもち肌よ。それに、元の姿を取り戻せば、我は胸や尻も大きいナイスバディ―なのじゃ」"

[[dialogue]]
speaker = "プリムラ"
# 「サチとどちらが優れているかなど比べるまでもあるまい。我の眷属になれば、こうして抱っこする権利が手に入るというわけじゃ」
line = "「サチとどちらが優れているかなど比べるまでもあるまい。我の眷属になれば、こうして抱っこする権利が手に入るというわけじゃ」"

[[dialogue]]
speaker = "プリムラ"
# 「故に、どうじゃ？　そろそろ貴様も、我の眷族に下ってもよい頃合いなのではないか？」
line = "「故に、どうじゃ？　そろそろ貴様も、我の眷族に下ってもよい頃合いなのではないか？」"

[[dialogue]]
speaker = "プリムラ"
# 「フフフ……澄ましておるが、心臓の音が早まっているのを感じるぞ♪　これはすなわち、我を子供ではなく女として見ているということ。違うか？」
line = "「フフフ……澄ましておるが、心臓の音が早まっているのを感じるぞ♪　これはすなわち、我を子供ではなく女として見ているということ。違うか？」"

[[dialogue]]
speaker = "unk"
# 俺も一応男だし……こうも密着してたら……
line = "俺も一応男だし……こうも密着してたら……"

[[dialogue]]
speaker = "プリムラ"
# 「フハハハ！　その反応は、なかなかに悪くない気分なのじゃ♪」
line = "「フハハハ！　その反応は、なかなかに悪くない気分なのじゃ♪」"

[[dialogue]]
speaker = "プリムラ"
# 「これは明日、サチに自慢してやらねばな！」
line = "「これは明日、サチに自慢してやらねばな！」"

[[dialogue]]
speaker = "unk"
# （もしかして、サチが羨ましくて……？）
line = "（もしかして、サチが羨ましくて……？）"

[[dialogue]]
speaker = "プリムラ"
# 「――ということが、昨日あったのじゃ！　これはもう、我の勝ちであろう？」
line = "「――ということが、昨日あったのじゃ！　これはもう、我の勝ちであろう？」"

[[dialogue]]
speaker = "サチ"
# 「え、えっと……」
line = "「え、えっと……」"

[[dialogue]]
speaker = "プリムラ"
# 「どうした、驚いて声も出ないか？」
line = "「どうした、驚いて声も出ないか？」"

[[dialogue]]
speaker = "サチ"
# 「う、うん……なんというか、それってもう恋人同士のやることっていうか……」
line = "「う、うん……なんというか、それってもう恋人同士のやることっていうか……」"

[[dialogue]]
speaker = "プリムラ"
# 「は？」
line = "「は？」"

[[dialogue]]
speaker = "サチ"
# 「いやだって、自発的に抱き合うって……少なくとも、相手のことが好きじゃないとできないよね？」
line = "「いやだって、自発的に抱き合うって……少なくとも、相手のことが好きじゃないとできないよね？」"

[[dialogue]]
speaker = "サチ"
# 「プリムラはつまり、お兄さんのことが……」
line = "「プリムラはつまり、お兄さんのことが……」"

[[dialogue]]
speaker = "プリムラ"
# 「ななな、何を言っておるのじゃ！？　我が眷族のことをす、す、す、好き！？　悪の終末兵器たる我が、そのような意識を向けるわけが……」
line = "「ななな、何を言っておるのじゃ！？　我が眷族のことをす、す、す、好き！？　悪の終末兵器たる我が、そのような意識を向けるわけが……」"

[[dialogue]]
speaker = "unk"
# （こちらを見るプリムラと、目を合わせる）
line = "（こちらを見るプリムラと、目を合わせる）"

[[dialogue]]
speaker = "プリムラ"
# 「～～～～～～っ！　じゅ――」
line = "「～～～～～～っ！　じゅ――」"

[[dialogue]]
speaker = "プリムラ"
# 「１０万年早いのじゃ、馬鹿者ぉぉぉ～～～っ！」
line = "「１０万年早いのじゃ、馬鹿者ぉぉぉ～～～っ！」"

[[dialogue]]
speaker = "サチ"
# 「あのプリムラが……ふふっ♪」
line = "「あのプリムラが……ふふっ♪」"

[[dialogue]]
speaker = "サチ"
# 「お兄さん。これからもどうか、プリムラのことをよろしくお願いしますね」
line = "「お兄さん。これからもどうか、プリムラのことをよろしくお願いしますね」"

[[dialogue]]
speaker = "unk"
# サチの手前、照れ臭くなりつつも、プリムラが昨日と違って男として意識してくれたことを、嬉しく思ってしまうのだった。
line = "サチの手前、照れ臭くなりつつも、プリムラが昨日と違って男として意識してくれたことを、嬉しく思ってしまうのだった。"
