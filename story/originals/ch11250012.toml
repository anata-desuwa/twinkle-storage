[[dialogue]]
speaker = "unk"
# 第２話,目指せヒーロー,P
line = "第２話,目指せヒーロー,P"

[[dialogue]]
speaker = "フィオナ"
# 「おお……！　まさかそんな展開が！」
line = "「おお……！　まさかそんな展開が！」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「ふふ、まだまだ序の口だ。これくらいで驚いてたら身が持たないぞ」
line = "「ふふ、まだまだ序の口だ。これくらいで驚いてたら身が持たないぞ」"

[[dialogue]]
speaker = "フィオナ"
# 「そうなんですか……！？　この先の話を見るのが待ち切れません……！」
line = "「そうなんですか……！？　この先の話を見るのが待ち切れません……！」"

[[dialogue]]
speaker = "unk"
# ２人とも何を見てるんだ？
line = "２人とも何を見てるんだ？"

[[dialogue]]
speaker = "フィオナ"
# 「デネブの流星ライダーシリーズです。こっちは十年進んでいるから、アルタイルとは違う流星ライダーがいるんですよ」
line = "「デネブの流星ライダーシリーズです。こっちは十年進んでいるから、アルタイルとは違う流星ライダーがいるんですよ」"

[[dialogue]]
speaker = "フィオナ"
# 「忍者モチーフだったり、機械文明と戦ったり、敵にクイズを出したり、それぞれ個性的な特徴を持っているんです」
line = "「忍者モチーフだったり、機械文明と戦ったり、敵にクイズを出したり、それぞれ個性的な特徴を持っているんです」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「デネブの世界は大きな破壊を経験したから、流星ライダーシリーズの復活には数年を要した。作品にも影響を与えただろうな」
line = "「デネブの世界は大きな破壊を経験したから、流星ライダーシリーズの復活には数年を要した。作品にも影響を与えただろうな」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「だからリクリエを無事退けたアルタイルでは、デネブとは違う流星ライダーが生まれるんじゃないか」
line = "「だからリクリエを無事退けたアルタイルでは、デネブとは違う流星ライダーが生まれるんじゃないか」"

[[dialogue]]
speaker = "フィオナ"
# 「つまり異なる未来の流星ライダー……！　そう考えると、私はとてつもなく貴重なものを目にしているのかもしれません……！」
line = "「つまり異なる未来の流星ライダー……！　そう考えると、私はとてつもなく貴重なものを目にしているのかもしれません……！」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「そうだ魔王、ちょっと頼んでいいか？　アクションの練習に付き合ってくれるとありがたいんだが」
line = "「そうだ魔王、ちょっと頼んでいいか？　アクションの練習に付き合ってくれるとありがたいんだが」"

[[dialogue]]
speaker = "unk"
# アクションの練習？
line = "アクションの練習？"

[[dialogue]]
speaker = "アポロ（大人）"
# 「ああ。もし平和になったら、アクション女優になって、流星ライダーに出たいと思ってる」
line = "「ああ。もし平和になったら、アクション女優になって、流星ライダーに出たいと思ってる」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「スーツを着てのアクションもいいが、変身もしたいからな。どっちもできる女優になりたいんだ」
line = "「スーツを着てのアクションもいいが、変身もしたいからな。どっちもできる女優になりたいんだ」"

[[dialogue]]
speaker = "フィオナ"
# 「素晴らしい夢ですっ！　応援します姉さん！」
line = "「素晴らしい夢ですっ！　応援します姉さん！」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「ありがとう、エリシア。流星ライダーになったあたしをいつか見せてやる！」
line = "「ありがとう、エリシア。流星ライダーになったあたしをいつか見せてやる！」"

[[dialogue]]
speaker = "unk"
# そういうことなら喜んで！
line = "そういうことなら喜んで！"

[[dialogue]]
speaker = "アポロ（大人）"
# 「助かる。魔王ならきっとすぐに要領を掴めるはずだ」
line = "「助かる。魔王ならきっとすぐに要領を掴めるはずだ」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「よし、せっかくだからこっちでいくか」
line = "「よし、せっかくだからこっちでいくか」"

[[dialogue]]
speaker = "unk"
# 俺も変身して、アポロに向かい合う。
line = "俺も変身して、アポロに向かい合う。"

[[dialogue]]
speaker = "アポロ（大人）"
# 「あたしが右手でパンチを繰り出すから、魔王がそれを左手で捌く。さらに魔王が右パンチで反撃して、それをあたしが受ける」
line = "「あたしが右手でパンチを繰り出すから、魔王がそれを左手で捌く。さらに魔王が右パンチで反撃して、それをあたしが受ける」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「もちろん本当に殴るわけじゃないぞ。やられたふりをするから、寸止めしてくれ。段取りを確認して……よし、本番だ」
line = "「もちろん本当に殴るわけじゃないぞ。やられたふりをするから、寸止めしてくれ。段取りを確認して……よし、本番だ」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「──はっ！」
line = "「──はっ！」"

[[dialogue]]
speaker = "unk"
# 左手で防いで……反撃！
line = "左手で防いで……反撃！"

[[dialogue]]
speaker = "アポロ（大人）"
# 「……よし。いい感じだ」
line = "「……よし。いい感じだ」"

[[dialogue]]
speaker = "フィオナ"
# 「おお……様になっています」
line = "「おお……様になっています」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「あとはキックを入れたり、相手を投げたり、やられて吹っ飛んだりして、見栄えするアクションにしていくんだ」
line = "「あとはキックを入れたり、相手を投げたり、やられて吹っ飛んだりして、見栄えするアクションにしていくんだ」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「じゃあもっと激しくいくぞ。リズム良くパン、パン、パン、だ」
line = "「じゃあもっと激しくいくぞ。リズム良くパン、パン、パン、だ」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「そら！　そら！　そら！」
line = "「そら！　そら！　そら！」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「楽しくなってきたな。よし、思いっきり来い──！」
line = "「楽しくなってきたな。よし、思いっきり来い──！」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「わっととと……！？」
line = "「わっととと……！？」"

[[dialogue]]
speaker = "unk"
# アクションの途中、お互いの体がもつれ合って倒れ込む。
line = "アクションの途中、お互いの体がもつれ合って倒れ込む。"

[[dialogue]]
speaker = "フィオナ"
# 「姉さん！？　緋宮会長！？」
line = "「姉さん！？　緋宮会長！？」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「平気か、魔王？」
line = "「平気か、魔王？」"

[[dialogue]]
speaker = "unk"
# 気が付くと、アポロが俺の下敷きになっていた。
line = "気が付くと、アポロが俺の下敷きになっていた。"

[[dialogue]]
speaker = "unk"
# 体が密着してしまって、アポロの柔らかさと温もりを強く感じる。
line = "体が密着してしまって、アポロの柔らかさと温もりを強く感じる。"

[[dialogue]]
speaker = "unk"
# アポロ、大丈夫！？
line = "アポロ、大丈夫！？"

[[dialogue]]
speaker = "アポロ（大人）"
# 「ああ、あたしは全然大丈夫だ」
line = "「ああ、あたしは全然大丈夫だ」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「魔王に何もなくてよかったよ。アクションの相手してもらってるのに、怪我させるわけにはいかないからな」
line = "「魔王に何もなくてよかったよ。アクションの相手してもらってるのに、怪我させるわけにはいかないからな」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「だがそろそろ離れてくれないか……？　その……胸が当たってるから……」
line = "「だがそろそろ離れてくれないか……？　その……胸が当たってるから……」"

[[dialogue]]
speaker = "unk"
# ごめんっ！？
line = "ごめんっ！？"

[[dialogue]]
speaker = "unk"
# アポロに言われて慌てて立ち上がる。
line = "アポロに言われて慌てて立ち上がる。"

[[dialogue]]
speaker = "アポロ（大人）"
# 「まぁ……なんだ。アクションは体が接触するものだからな。気にするな」
line = "「まぁ……なんだ。アクションは体が接触するものだからな。気にするな」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「さて、今日はこの辺にしておくか。初めて合わせたにしては上々だろ」
line = "「さて、今日はこの辺にしておくか。初めて合わせたにしては上々だろ」"

[[dialogue]]
speaker = "フィオナ"
# 「私も見ていて楽しかったです。まるで流星ライダーのワンシーンのようでした」
line = "「私も見ていて楽しかったです。まるで流星ライダーのワンシーンのようでした」"

[[dialogue]]
speaker = "フィオナ"
# 「ですが姉さん。アクション女優になるなら、アクションだけじゃなくて、普通の演技もできないといけないのでは……？」
line = "「ですが姉さん。アクション女優になるなら、アクションだけじゃなくて、普通の演技もできないといけないのでは……？」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「はっ──！？　そういえばそうだった！？」
line = "「はっ──！？　そういえばそうだった！？」"

[[dialogue]]
speaker = "unk"
# 演技の方も俺を相手にしてみる？
line = "演技の方も俺を相手にしてみる？"

[[dialogue]]
speaker = "アポロ（大人）"
# 「魔王は新星学園の演劇部を手伝ったことがある……？　役者経験もあるのか？」
line = "「魔王は新星学園の演劇部を手伝ったことがある……？　役者経験もあるのか？」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「そいつは心強い。よし、明日から頼んだぞ！」
line = "「そいつは心強い。よし、明日から頼んだぞ！」"

[[dialogue]]
speaker = "unk"
# 演技の経験が、まさか平行世界で役に立つとは思わなかった。
line = "演技の経験が、まさか平行世界で役に立つとは思わなかった。"

[[dialogue]]
speaker = "unk"
# だけどさっき感じた大人の女性の柔らかさは、俺の知るアポロのイメージと全然違っていて、記憶に強く刻まれたのだった。
line = "だけどさっき感じた大人の女性の柔らかさは、俺の知るアポロのイメージと全然違っていて、記憶に強く刻まれたのだった。"
