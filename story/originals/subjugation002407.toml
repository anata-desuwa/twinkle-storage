[[dialogue]]
speaker = "unk"
# 覚醒したサチとディーラックの『幸運』のぶつかり合い。
line = "覚醒したサチとディーラックの『幸運』のぶつかり合い。"

[[dialogue]]
speaker = "unk"
# その行く末は果たして――
line = "その行く末は果たして――"

[[dialogue]]
speaker = "ディーラック"
# 「何故サ……！？　サチちゃんだけならまだしも、全員に幸運のロストアイテムが通用してない！」
line = "「何故サ……！？　サチちゃんだけならまだしも、全員に幸運のロストアイテムが通用してない！」"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「これは、私だけの力じゃありませんから。私の幸運の星は――ここにいるみんなです！」
line = "「これは、私だけの力じゃありませんから。私の幸運の星は――ここにいるみんなです！」"

[[dialogue]]
speaker = "unk"
# そう、サチの進化した幸運によって、俺たちの攻撃はディーラックに全て<b>当たる</b>ようになっていた。
line = "そう、サチの進化した幸運によって、俺たちの攻撃はディーラックに全て<b>当たる</b>ようになっていた。"

[[dialogue]]
speaker = "unk"
# それは、トレジアンナさんが作った機能ではなく、サチ自身で覚醒させた『自身だけでなく周囲にも幸運を与える』という新たな力。
line = "それは、トレジアンナさんが作った機能ではなく、サチ自身で覚醒させた『自身だけでなく周囲にも幸運を与える』という新たな力。"

[[dialogue]]
speaker = "ディーラック"
# 「くっ……！　だったら、こっちも幸運の最大出力をぶつけるまでサ！　――ハアアアァッ！！」
line = "「くっ……！　だったら、こっちも幸運の最大出力をぶつけるまでサ！　――ハアアアァッ！！」"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「ルーレットフルスロットル！」
line = "「ルーレットフルスロットル！」"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「輝け、明日を照らす光」
line = "「輝け、明日を照らす光」"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「――マジカルシャイニングスター！！」
line = "「――マジカルシャイニングスター！！」"

[[dialogue]]
speaker = "unk"
# サチとディーラックの放った凄まじい幸運のエネルギーが衝突し、拮抗する。
line = "サチとディーラックの放った凄まじい幸運のエネルギーが衝突し、拮抗する。"

[[dialogue]]
speaker = "ディーラック"
# 「サチちゃん！　この運試しに勝って、戦いを終わらせるのサ！」
line = "「サチちゃん！　この運試しに勝って、戦いを終わらせるのサ！」"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「――いいえ。ディーラックさん、終わらせるのは、私たちのどちらでもありません」
line = "「――いいえ。ディーラックさん、終わらせるのは、私たちのどちらでもありません」"

[[dialogue]]
speaker = "シズハ"
# 「ディーちゃん！」
line = "「ディーちゃん！」"

[[dialogue]]
speaker = "ディーラック"
# 「っ！　シズハちゃん……！」
line = "「っ！　シズハちゃん……！」"

[[dialogue]]
speaker = "シズハ"
# 「今度こそ、止めてみせる！　あなたの友達として！」
line = "「今度こそ、止めてみせる！　あなたの友達として！」"

[[dialogue]]
speaker = "シズハ"
# 「聖杯ちゃん、どうか願いを叶えて」
line = "「聖杯ちゃん、どうか願いを叶えて」"

[[dialogue]]
speaker = "シズハ"
# 「――インフィニット・オーバーフロー！！！」
line = "「――インフィニット・オーバーフロー！！！」"

[[dialogue]]
speaker = "unk"
# シズハの願いに応えて、彼女の中にある聖杯から膨大な魔力が溢れ出し、それを収束して撃ち放つ。
line = "シズハの願いに応えて、彼女の中にある聖杯から膨大な魔力が溢れ出し、それを収束して撃ち放つ。"

[[dialogue]]
speaker = "unk"
# それはサチの幸運の力によって融合反応を起こし、虹色の輝く星となってディーラックの最大出力を押し返す。
line = "それはサチの幸運の力によって融合反応を起こし、虹色の輝く星となってディーラックの最大出力を押し返す。"

[[dialogue]]
speaker = "ディーラック"
# 「くっ――うおおおおおおおおおぉっ！！？」
line = "「くっ――うおおおおおおおおおぉっ！！？」"

[[dialogue]]
speaker = "ディーラック"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ディーラック"
# 「また……シズハちゃんに邪魔をされたのサ……」
line = "「また……シズハちゃんに邪魔をされたのサ……」"

[[dialogue]]
speaker = "ディーラック"
# 「くっ……」
line = "「くっ……」"

[[dialogue]]
speaker = "シズハ"
# 「！　ディーちゃんっ」
line = "「！　ディーちゃんっ」"

[[dialogue]]
speaker = "unk"
# 力を失い、幸運のロストアイテムと共に地面に倒れ伏したディーラック。
line = "力を失い、幸運のロストアイテムと共に地面に倒れ伏したディーラック。"

[[dialogue]]
speaker = "unk"
# シズハがすぐに駆け寄って、抱き起こす。
line = "シズハがすぐに駆け寄って、抱き起こす。"

[[dialogue]]
speaker = "シズハ"
# 「大丈夫！？　命は奪わないようにって、聖杯ちゃんにお願いはしたけど……」
line = "「大丈夫！？　命は奪わないようにって、聖杯ちゃんにお願いはしたけど……」"

[[dialogue]]
speaker = "ディーラック"
# 「アハハ、つくづく甘いネ、シズハちゃん……そんな情けを敵のボクにかけるなんて……」
line = "「アハハ、つくづく甘いネ、シズハちゃん……そんな情けを敵のボクにかけるなんて……」"

[[dialogue]]
speaker = "ディーラック"
# 「でも――キミならそうやって、ボクのすぐ近くまで来てくれると思っていたサ……！」
line = "「でも――キミならそうやって、ボクのすぐ近くまで来てくれると思っていたサ……！」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「いかん！　そやつから離れろ、シズハ！」
line = "「いかん！　そやつから離れろ、シズハ！」"

[[dialogue]]
speaker = "ディーラック"
# 「もう遅いのサ」
line = "「もう遅いのサ」"

[[dialogue]]
speaker = "unk"
# ディーラックが幸運のロストアイテムをシズハの前に浮かせて、何らかの術式を発動させる。
line = "ディーラックが幸運のロストアイテムをシズハの前に浮かせて、何らかの術式を発動させる。"

[[dialogue]]
speaker = "シズハ"
# 「あ……！？」
line = "「あ……！？」"

[[dialogue]]
speaker = "unk"
# シズハの体が光り輝いて、それは程なくして収まる。
line = "シズハの体が光り輝いて、それは程なくして収まる。"

[[dialogue]]
speaker = "unk"
# そして、直後に幸運のロストアイテムは、粉々に砕け散った。
line = "そして、直後に幸運のロストアイテムは、粉々に砕け散った。"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「シズハちゃん、大丈夫！？」
line = "「シズハちゃん、大丈夫！？」"

[[dialogue]]
speaker = "シズハ"
# 「う、うん……。特に何も……」
line = "「う、うん……。特に何も……」"

[[dialogue]]
speaker = "ディーラック"
# 「……急造の物にしては、なかなか保った方なんじゃないかな、<b>疑似</b>ロストアイテム……」
line = "「……急造の物にしては、なかなか保った方なんじゃないかな、<b>疑似</b>ロストアイテム……」"

[[dialogue]]
speaker = "ディーラック"
# 「戦いには負けちゃったけど……これで、最低限の目的は叶えたサ……」
line = "「戦いには負けちゃったけど……これで、最低限の目的は叶えたサ……」"

[[dialogue]]
speaker = "ディーラック"
# 「でも……ハハ……。我ながら…………なんて愚かな…………」
line = "「でも……ハハ……。我ながら…………なんて愚かな…………」"

[[dialogue]]
speaker = "ディーラック"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "シズハ"
# 「ディーちゃん……！？　しっかりして、ディーちゃんっ！！」
line = "「ディーちゃん……！？　しっかりして、ディーちゃんっ！！」"

[[dialogue]]
speaker = "unk"
# そうして、ディーラックが力尽きて動かなくなった後も、シズハはいつまでも寄り添い続けるのだった――
line = "そうして、ディーラックが力尽きて動かなくなった後も、シズハはいつまでも寄り添い続けるのだった――"
