[[dialogue]]
speaker = "unk"
# 第２話,ラティエと守護天使,P
line = "第２話,ラティエと守護天使,P"

[[dialogue]]
speaker = "ラティエ"
# 「しかし、面白い偶然もあるものだ。休日の喫茶店で相席になるとはね」
line = "「しかし、面白い偶然もあるものだ。休日の喫茶店で相席になるとはね」"

[[dialogue]]
speaker = "ラティエ"
# 「きみ、息苦しかったんじゃないか？　なにせ私はこんな見た目でも、一応は学園長だからね」
line = "「きみ、息苦しかったんじゃないか？　なにせ私はこんな見た目でも、一応は学園長だからね」"

[[dialogue]]
speaker = "unk"
# いいえ。コーヒーご馳走様でした
line = "いいえ。コーヒーご馳走様でした"

[[dialogue]]
speaker = "ラティエ"
# 「なに、気にするな。教え子に財布を出させる教師がどこにいる。また機会があれば語らおうじゃないか」
line = "「なに、気にするな。教え子に財布を出させる教師がどこにいる。また機会があれば語らおうじゃないか」"

[[dialogue]]
speaker = "ラティエ"
# 「さて──と。私はこれから街を散策するが、きみはどうする？」
line = "「さて──と。私はこれから街を散策するが、きみはどうする？」"

[[dialogue]]
speaker = "unk"
# ご一緒してもいいですか？
line = "ご一緒してもいいですか？"

[[dialogue]]
speaker = "ラティエ"
# 「フフ、きみは本当に変わっているな。普通、学生は教師と歩くなど嫌がるものだろうに」
line = "「フフ、きみは本当に変わっているな。普通、学生は教師と歩くなど嫌がるものだろうに」"

[[dialogue]]
speaker = "ラティエ"
# 「だが嬉しいよ。私は肩書こそ学園長だが、本業は旅人だと思っているからね」
line = "「だが嬉しいよ。私は肩書こそ学園長だが、本業は旅人だと思っているからね」"

[[dialogue]]
speaker = "ラティエ"
# 「では行こうか。久しぶりの人間界が楽しみだ。旅の土産話でもしながら歩こうじゃないか」
line = "「では行こうか。久しぶりの人間界が楽しみだ。旅の土産話でもしながら歩こうじゃないか」"

[[dialogue]]
speaker = "ラティエ"
# 「この辺りはだいぶ様変わりしているね。１年も離れてはいないはずなのだが」
line = "「この辺りはだいぶ様変わりしているね。１年も離れてはいないはずなのだが」"

[[dialogue]]
speaker = "ラティエ"
# 「む──あの店もなくなっているのか。困ったな、贔屓にしていたのだがね」
line = "「む──あの店もなくなっているのか。困ったな、贔屓にしていたのだがね」"

[[dialogue]]
speaker = "ラティエ"
# 「やはり人間界は変化が早いな……来るたびに大きく見た目が変わる」
line = "「やはり人間界は変化が早いな……来るたびに大きく見た目が変わる」"

[[dialogue]]
speaker = "ラティエ"
# 「天界も魔界も、幾度もさすらったものだが……こと『変化』という一点に絞れば、人間界は特に慌ただしい」
line = "「天界も魔界も、幾度もさすらったものだが……こと『変化』という一点に絞れば、人間界は特に慌ただしい」"

[[dialogue]]
speaker = "ラティエ"
# 「……おや、あそこにいるのは？」
line = "「……おや、あそこにいるのは？」"

[[dialogue]]
speaker = "マグダレナ"
# 「あ、会長さま……？」
line = "「あ、会長さま……？」"

[[dialogue]]
speaker = "アルモタヘル"
# 「人の子か。奇遇であるな。それに──」
line = "「人の子か。奇遇であるな。それに──」"

[[dialogue]]
speaker = "ラティエ"
# 「あなた方が、義体を借りて暮らすという守護天使殿か。なるほど……確かに普通の天使と見分けがつかん」
line = "「あなた方が、義体を借りて暮らすという守護天使殿か。なるほど……確かに普通の天使と見分けがつかん」"

[[dialogue]]
speaker = "マグダレナ"
# 「お初にお目にかかります。あなたがラティエさまですね？　お噂はかねがね聞いておりますよ」
line = "「お初にお目にかかります。あなたがラティエさまですね？　お噂はかねがね聞いておりますよ」"

[[dialogue]]
speaker = "ラティエ"
# 「フ、いい噂かな？」
line = "「フ、いい噂かな？」"

[[dialogue]]
speaker = "アルモタヘル"
# 「喋る人の子によって違うな。雄々しく猛々しい武人という者もあらば、気まぐれにどこかへ消える根無し草だと言う者もいる」
line = "「喋る人の子によって違うな。雄々しく猛々しい武人という者もあらば、気まぐれにどこかへ消える根無し草だと言う者もいる」"

[[dialogue]]
speaker = "ラティエ"
# 「フフ、どちらも当たっている。して──《境界》と《命脈》のお２人は、この街で何を？」
line = "「フフ、どちらも当たっている。して──《境界》と《命脈》のお２人は、この街で何を？」"

[[dialogue]]
speaker = "ラティエ"
# 「お２人とも真剣な顔をしておられた。さぞや崇高な目的があったように、私には映ったのだが……」
line = "「お２人とも真剣な顔をしておられた。さぞや崇高な目的があったように、私には映ったのだが……」"

[[dialogue]]
speaker = "マグダレナ"
# 「私はレンタルビデオ店をめぐっておりました。先週リリースされたドラマシリーズの最新作をようやく借りられたのです♪」
line = "「私はレンタルビデオ店をめぐっておりました。先週リリースされたドラマシリーズの最新作をようやく借りられたのです♪」"

[[dialogue]]
speaker = "ラティエ"
# 「ほ、ほう？」
line = "「ほ、ほう？」"

[[dialogue]]
speaker = "アルモタヘル"
# 「我はステーキレストランを３軒、食べ歩いていた。これから４店目へ赴くところだ」
line = "「我はステーキレストランを３軒、食べ歩いていた。これから４店目へ赴くところだ」"

[[dialogue]]
speaker = "ラティエ"
# 「……そ、そうか。意外と俗っぽい返事が来たな……」
line = "「……そ、そうか。意外と俗っぽい返事が来たな……」"

[[dialogue]]
speaker = "unk"
# （ラティエさんが動揺している……！？）
line = "（ラティエさんが動揺している……！？）"

[[dialogue]]
speaker = "ラティエ"
# 「てっきりリクリエに抗するための集いとばかり……だが、いや、このくらい穏やかに構えた方が良いのかもしれないな」
line = "「てっきりリクリエに抗するための集いとばかり……だが、いや、このくらい穏やかに構えた方が良いのかもしれないな」"

[[dialogue]]
speaker = "ラティエ"
# 「此度のリクリエを乗り切るには、三界の力だけでは足りないだろう。守護天使殿が人間に味方してくれるのであれば心強い」
line = "「此度のリクリエを乗り切るには、三界の力だけでは足りないだろう。守護天使殿が人間に味方してくれるのであれば心強い」"

[[dialogue]]
speaker = "マグダレナ"
# 「そう言っていただけると恐縮です。ところでラティエさまはどのようなご用事で？」
line = "「そう言っていただけると恐縮です。ところでラティエさまはどのようなご用事で？」"

[[dialogue]]
speaker = "ラティエ"
# 「私は買い物を。この時季は化粧品の新作が出る。冷やかしだけでもしていこうかと」
line = "「私は買い物を。この時季は化粧品の新作が出る。冷やかしだけでもしていこうかと」"

[[dialogue]]
speaker = "unk"
# 買い物って、化粧品だったんですか？
line = "買い物って、化粧品だったんですか？"

[[dialogue]]
speaker = "ラティエ"
# 「きみは私のことを武骨な人間だと思っていないか？　まあ、否定はしないが……」
line = "「きみは私のことを武骨な人間だと思っていないか？　まあ、否定はしないが……」"

[[dialogue]]
speaker = "ラティエ"
# 「これでも三界を股にかけた旅人だからね。向かう土地によって気候は違うだろう？」
line = "「これでも三界を股にかけた旅人だからね。向かう土地によって気候は違うだろう？」"

[[dialogue]]
speaker = "ラティエ"
# 「肌のコンディションは精神と健康に直結する。気温やら湿度やら、ちゃんと対策しておかないと長旅はできんものだ」
line = "「肌のコンディションは精神と健康に直結する。気温やら湿度やら、ちゃんと対策しておかないと長旅はできんものだ」"

[[dialogue]]
speaker = "マグダレナ"
# 「まぁ……そうなのですね。お化粧とはそんなにも大切なのですか。私、使ったことがありません」
line = "「まぁ……そうなのですね。お化粧とはそんなにも大切なのですか。私、使ったことがありません」"

[[dialogue]]
speaker = "アルモタヘル"
# 「我もそうだ。そも、食えもしないものになぜ金を出す？　人の子には変わった者も多いが、貴女も相当なようだな」
line = "「我もそうだ。そも、食えもしないものになぜ金を出す？　人の子には変わった者も多いが、貴女も相当なようだな」"

[[dialogue]]
speaker = "ラティエ"
# 「こ、ここまで意識が足りないとは……お２人の義体は一般の天使と変わらないと聞いているのに」
line = "「こ、ここまで意識が足りないとは……お２人の義体は一般の天使と変わらないと聞いているのに」"

[[dialogue]]
speaker = "ラティエ"
# 「ちょうど良い機会だ。私からお２人に化粧品を贈ろう。守護天使の肌が荒れていては威厳もあったものではない」
line = "「ちょうど良い機会だ。私からお２人に化粧品を贈ろう。守護天使の肌が荒れていては威厳もあったものではない」"

[[dialogue]]
speaker = "マグダレナ"
# 「まあ……お気遣いありがとうございます」
line = "「まあ……お気遣いありがとうございます」"

[[dialogue]]
speaker = "アルモタヘル"
# 「いや、我はステーキを……」
line = "「いや、我はステーキを……」"

[[dialogue]]
speaker = "ラティエ"
# 「当然、きみも来たまえよ」
line = "「当然、きみも来たまえよ」"

[[dialogue]]
speaker = "unk"
# 俺もですか！？
line = "俺もですか！？"

[[dialogue]]
speaker = "ラティエ"
# 「今の時代、男もファンデーションくらい塗っても罰は当たらんよ。なあに、物は試しというやつだ」
line = "「今の時代、男もファンデーションくらい塗っても罰は当たらんよ。なあに、物は試しというやつだ」"

[[dialogue]]
speaker = "ラティエ"
# 「さぁ──行こうか？」
line = "「さぁ──行こうか？」"

[[dialogue]]
speaker = "unk"
# その後、大きなデパートの化粧品売り場に連れていかれた俺たちは、ラティエさんの勧めるままに色々なものを試すことになった。
line = "その後、大きなデパートの化粧品売り場に連れていかれた俺たちは、ラティエさんの勧めるままに色々なものを試すことになった。"

[[dialogue]]
speaker = "unk"
# さすらいの旅人、流星最強の一角として名高いラティエさんは、意外にもおしゃれが好きらしい。
line = "さすらいの旅人、流星最強の一角として名高いラティエさんは、意外にもおしゃれが好きらしい。"

[[dialogue]]
speaker = "unk"
# 俺も訓練ばかりじゃなく、身だしなみにも気を遣わなければならないなと思ったのだった。
line = "俺も訓練ばかりじゃなく、身だしなみにも気を遣わなければならないなと思ったのだった。"
