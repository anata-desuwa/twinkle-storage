[[dialogue]]
speaker = "エステル"
# 「流星群の後の避難地で、魔王様の潔白を誰よりも強く訴えていたのが、グレイス先輩だと聞きました」
line = "「流星群の後の避難地で、魔王様の潔白を誰よりも強く訴えていたのが、グレイス先輩だと聞きました」"

[[dialogue]]
speaker = "グレイス"
# 「でも結局……私は信じるのをやめました。エステルは、強いですね……」
line = "「でも結局……私は信じるのをやめました。エステルは、強いですね……」"

[[dialogue]]
speaker = "エステル"
# 「やめざるを得なかっただけだと思います。１０年前のあの騒動を現地で経験すれば……無理もありません」
