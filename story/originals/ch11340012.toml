[[dialogue]]
speaker = "エステル"
# 「い、いいんですか……？　ありがとうございます……！」
line = "「い、いいんですか……？　ありがとうございます……！」"

[[dialogue]]
speaker = "グレイス"
# 「……私は何も見ていません。だからお礼なんて、いりません」
line = "「……私は何も見ていません。だからお礼なんて、いりません」"

[[dialogue]]
speaker = "グレイス"
# 「アルタイルにやってきて……真実を知りました。デネブの魔王さんは裏切ってなんかいないって」
line = "「アルタイルにやってきて……真実を知りました。デネブの魔王さんは裏切ってなんかいないって」"

[[dialogue]]
speaker = "エステル"
# 「……はい」
line = "「……はい」"

[[dialogue]]
speaker = "グレイス"
# 「あの時から私、変にエステルのことを意識して……つっけんどんな態度、いっぱい取っちゃいました。だから……ごめんなさい」
line = "「あの時から私、変にエステルのことを意識して……つっけんどんな態度、いっぱい取っちゃいました。だから……ごめんなさい」"

[[dialogue]]
speaker = "エステル"
# 「そんな……謝らないでください。私、気にしていません。ベアトリス副会長から、色々お話も聞いていますし……」
line = "「そんな……謝らないでください。私、気にしていません。ベアトリス副会長から、色々お話も聞いていますし……」"

[[dialogue]]
speaker = "グレイス"
# 「──ベアトから？」
line = "「──ベアトから？」"

[[dialogue]]
speaker = "エステル"
# 「はい。グレイス先輩と私の様子を心配して、声をかけてくださって……」
line = "「はい。グレイス先輩と私の様子を心配して、声をかけてくださって……」"

[[dialogue]]
speaker = "エステル"
# 「その時に聞きました。グレイス先輩は昔、魔王様のことを信じていたと……」
