line = "「でもご両親を亡くされた、幼い頃のグレイス先輩は……心を守るためにも魔王様を恨むしかなかった……」"

[[dialogue]]
speaker = "エステル"
# 「だから私、何も気にしていません。お気になさらないでください」
line = "「だから私、何も気にしていません。お気になさらないでください」"

[[dialogue]]
speaker = "グレイス"
