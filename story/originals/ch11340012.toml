[[dialogue]]
speaker = "unk"
# 第２話,グレイスとエステル,P
line = "第２話,グレイスとエステル,P"

[[dialogue]]
speaker = "グレイス"
# 「魔王さん、わざわざありがとうございます」
line = "「魔王さん、わざわざありがとうございます」"

[[dialogue]]
speaker = "unk"
# 俺に用事があるって？
line = "俺に用事があるって？"

[[dialogue]]
speaker = "グレイス"
# 「はい。小耳に挟んだのですが、私たちに先んじて、アルタイルの世界にエステルが来ているんですよね？」
line = "「はい。小耳に挟んだのですが、私たちに先んじて、アルタイルの世界にエステルが来ているんですよね？」"

[[dialogue]]
speaker = "グレイス"
# 「あの子と会ってお話がしたいんですけれど、取次ぎをお願いできますか……？」
line = "「あの子と会ってお話がしたいんですけれど、取次ぎをお願いできますか……？」"

[[dialogue]]
speaker = "unk"
# 問題ないよ。エステルも喜ぶと思う
line = "問題ないよ。エステルも喜ぶと思う"

[[dialogue]]
speaker = "グレイス"
# 「……そう、でしょうか。あはは」
line = "「……そう、でしょうか。あはは」"

[[dialogue]]
speaker = "グレイス"
# 「私とあの子はそりが合わない──って言ったらお互いに問題があるように聞こえちゃいますね」
line = "「私とあの子はそりが合わない──って言ったらお互いに問題があるように聞こえちゃいますね」"

[[dialogue]]
speaker = "グレイス"
# 「あの子は何も悪くないんです。私が一方的に苦手意識を持って、デネブにいた頃はぎくしゃくしてたんです……」
line = "「あの子は何も悪くないんです。私が一方的に苦手意識を持って、デネブにいた頃はぎくしゃくしてたんです……」"

[[dialogue]]
speaker = "グレイス"
# 「──だから謝りたくて。エステルと一度、お話をさせてくれませんか？」
line = "「──だから謝りたくて。エステルと一度、お話をさせてくれませんか？」"

[[dialogue]]
speaker = "unk"
# 俺はフィオナに連絡を取り、星見家の邸宅の一室で、グレイスとエステルを引き合わせることにした。
line = "俺はフィオナに連絡を取り、星見家の邸宅の一室で、グレイスとエステルを引き合わせることにした。"

[[dialogue]]
speaker = "エステル"
# 「グレイス先輩、お久しぶりです！」
line = "「グレイス先輩、お久しぶりです！」"

[[dialogue]]
speaker = "グレイス"
# 「は、はい。エステルも、元気そうで……」
line = "「は、はい。エステルも、元気そうで……」"

[[dialogue]]
speaker = "エステル"
# 「わざわざ私の顔を見に来ていただけるだなんて嬉しいです。本日はどのような……？」
line = "「わざわざ私の顔を見に来ていただけるだなんて嬉しいです。本日はどのような……？」"

[[dialogue]]
speaker = "グレイス"
# 「そ、そのこと、なのですが……ええと……」
line = "「そ、そのこと、なのですが……ええと……」"

[[dialogue]]
speaker = "unk"
# エステルに謝りたいんだって
line = "エステルに謝りたいんだって"

[[dialogue]]
speaker = "エステル"
# 「謝る、ですか……？　あっ、もしかして──」
line = "「謝る、ですか……？　あっ、もしかして──」"

[[dialogue]]
speaker = "グレイス"
# 「はい。ちょっと前にデネブであった、あの一件のことで……」
line = "「はい。ちょっと前にデネブであった、あの一件のことで……」"

[[dialogue]]
speaker = "グレイス"
# 「あれっ？　エステル、手帳から何か落ちましたよ！　拾ってあげますね！」
line = "「あれっ？　エステル、手帳から何か落ちましたよ！　拾ってあげますね！」"

[[dialogue]]
speaker = "エステル"
# 「あっ──」
line = "「あっ──」"

[[dialogue]]
speaker = "グレイス"
# 「……こ、これはっ！？」
line = "「……こ、これはっ！？」"

[[dialogue]]
speaker = "unk"
# グレイスが拾ったのは、ぼろぼろに擦りきれた雑誌の１ページ──その切り抜きだった。
line = "グレイスが拾ったのは、ぼろぼろに擦りきれた雑誌の１ページ──その切り抜きだった。"

[[dialogue]]
speaker = "unk"
# 『流星市国を守る、新星学園の星徒会長に迫る』と銘打たれた記事と、１人の星騎士の写真──
line = "『流星市国を守る、新星学園の星徒会長に迫る』と銘打たれた記事と、１人の星騎士の写真──"

[[dialogue]]
speaker = "グレイス"
# 「緋宮、クロト……！」
line = "「緋宮、クロト……！」"

[[dialogue]]
speaker = "エステル"
# 「す、すみません、グレイス先輩……あの……」
line = "「す、すみません、グレイス先輩……あの……」"

[[dialogue]]
speaker = "グレイス"
# 「どうして……こんなものを？　エステル、この男は裏切り者ですよ！？」
line = "「どうして……こんなものを？　エステル、この男は裏切り者ですよ！？」"

[[dialogue]]
speaker = "エステル"
# 「……グレイス先輩。そんなこと、仰らないでください……魔王様は何も悪いことなど……」
line = "「……グレイス先輩。そんなこと、仰らないでください……魔王様は何も悪いことなど……」"

[[dialogue]]
speaker = "グレイス"
# 「目を覚ましてください！　こいつはデネブを……私たちを見捨てたんです！　自分だけが助かるために！！」
line = "「目を覚ましてください！　こいつはデネブを……私たちを見捨てたんです！　自分だけが助かるために！！」"

[[dialogue]]
speaker = "エステル"
# 「……違います。きっと何か、誤解があるはずなんです……」
line = "「……違います。きっと何か、誤解があるはずなんです……」"

[[dialogue]]
speaker = "エステル"
# 「私はかつて、魔王様に命を救われました。あの御方がいなかったら今、私は生きていません……命の、恩人なんです……」
line = "「私はかつて、魔王様に命を救われました。あの御方がいなかったら今、私は生きていません……命の、恩人なんです……」"

[[dialogue]]
speaker = "グレイス"
# 「…………！！」
line = "「…………！！」"

[[dialogue]]
speaker = "エステル"
# 「ルヴィネ会長のお言葉も、女神様のお話も、理解はしています。でも私は、信じているんです……」
line = "「ルヴィネ会長のお言葉も、女神様のお話も、理解はしています。でも私は、信じているんです……」"

[[dialogue]]
speaker = "グレイス"
# （…………この子は、まだ？）
line = "（…………この子は、まだ？）"

[[dialogue]]
speaker = "グレイス"
# （…………私はとっくに、諦めたのに）
line = "（…………私はとっくに、諦めたのに）"

[[dialogue]]
speaker = "グレイス"
# 「……返します。ですが、これはお家の引き出しにでも入れておいてください。持ち歩くのは感心しません」
