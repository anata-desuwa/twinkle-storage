[[dialogue]]
speaker = "unk"
# 第２話,悪の味方,P
line = "第２話,悪の味方,P"

[[dialogue]]
speaker = "unk"
# ネーゼマインと知り合ってから少し経ったある日のこと。彼女から呼び出しを受け、カフェテリアに行くと、何やら騒がしい様子で――
line = "ネーゼマインと知り合ってから少し経ったある日のこと。彼女から呼び出しを受け、カフェテリアに行くと、何やら騒がしい様子で――"

[[dialogue]]
speaker = "ネーゼマイン"
# 「おっ、会長。こっちこっち～」
line = "「おっ、会長。こっちこっち～」"

[[dialogue]]
speaker = "unk"
# マイン、一体何があったんだ？
line = "マイン、一体何があったんだ？"

[[dialogue]]
speaker = "ネーゼマイン"
# 「いや、それがさ～、セナリィが仕事の依頼人と揉めちゃって。会長に仲裁を手伝って貰いたいんだよね」
line = "「いや、それがさ～、セナリィが仕事の依頼人と揉めちゃって。会長に仲裁を手伝って貰いたいんだよね」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ああでも、会長は無言で立ってるだけでいいから♪　どういうことかは、見ていれば分かるよ♪」
line = "「ああでも、会長は無言で立ってるだけでいいから♪　どういうことかは、見ていれば分かるよ♪」"

[[dialogue]]
speaker = "軽薄な男子生徒"
# 「だから、今手持ちがあんまりなくてさぁ。学生料金ってことで、少しくらいサービスしてくれても良くない？」
line = "「だから、今手持ちがあんまりなくてさぁ。学生料金ってことで、少しくらいサービスしてくれても良くない？」"

[[dialogue]]
speaker = "セナリィ"
# 「最初の契約と話が違いますわ。それに、ちゃんと契約書にあなた自身がサインをしたはずですわよね？」
line = "「最初の契約と話が違いますわ。それに、ちゃんと契約書にあなた自身がサインをしたはずですわよね？」"

[[dialogue]]
speaker = "unk"
# ――彼女はバンデット・セナリィ。海外で有名な傭兵であり、現在は学園に通いつつ、お金を稼ぐ為に秘密結社ゴールデングースを立ち上げた起業家でもある。
line = "――彼女はバンデット・セナリィ。海外で有名な傭兵であり、現在は学園に通いつつ、お金を稼ぐ為に秘密結社ゴールデングースを立ち上げた起業家でもある。"

[[dialogue]]
speaker = "軽薄な男子生徒"
# 「傭兵ってのはケチ臭いなぁ。凄く美人なのに、お金にがめついとモテないよ？」
line = "「傭兵ってのはケチ臭いなぁ。凄く美人なのに、お金にがめついとモテないよ？」"

[[dialogue]]
speaker = "セナリィ"
# 「その言葉、そっくりお返ししますわ。約束も守れない、後出しで値切るようなケチ臭い男はモテませんわよ？」
line = "「その言葉、そっくりお返ししますわ。約束も守れない、後出しで値切るようなケチ臭い男はモテませんわよ？」"

[[dialogue]]
speaker = "軽薄な男子生徒"
# 「んだと！？　俺は３年生で、上級生だぞ！？　バンデット・セナリィだか何だか知らないが、調子に乗りやがって……！」
line = "「んだと！？　俺は３年生で、上級生だぞ！？　バンデット・セナリィだか何だか知らないが、調子に乗りやがって……！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「はいはい、一旦そこまで～。調子に乗るなと今、仰いましたけど、先輩は周りをよく見た方がいいと思いますよ～？」
line = "「はいはい、一旦そこまで～。調子に乗るなと今、仰いましたけど、先輩は周りをよく見た方がいいと思いますよ～？」"

[[dialogue]]
speaker = "軽薄な男子生徒"
# 「はぁ？　話の邪魔すんじゃねぇ……って、げっ！？　星徒会長！？」
line = "「はぁ？　話の邪魔すんじゃねぇ……って、げっ！？　星徒会長！？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「先輩も知ってると思いますけど、この学園においては星徒会長が、大きな権力を持ってるんですよね～？」
line = "「先輩も知ってると思いますけど、この学園においては星徒会長が、大きな権力を持ってるんですよね～？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「例えば……学内で横暴な振る舞いをしている人を罰せられるくらいには。にひひ♪」
line = "「例えば……学内で横暴な振る舞いをしている人を罰せられるくらいには。にひひ♪」"

[[dialogue]]
speaker = "軽薄な男子生徒"
# 「ぐっ……！」
line = "「ぐっ……！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「で、何でしたっけ？　契約書をちゃ～んと交わしてたと思いますけど、お金の支払いを渋っているんでしたっけ？　何が不満なのか、もう１度お聞かせ願えます？」
line = "「で、何でしたっけ？　契約書をちゃ～んと交わしてたと思いますけど、お金の支払いを渋っているんでしたっけ？　何が不満なのか、もう１度お聞かせ願えます？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ん～、交渉終わり～♪　お金は無事に支払って貰ったし、これにて一見落着ってね☆」
line = "「ん～、交渉終わり～♪　お金は無事に支払って貰ったし、これにて一見落着ってね☆」"

[[dialogue]]
speaker = "セナリィ"
# 「助かりましたわ、マイン。さすがは我が社の顧問弁護士ですわね！」
line = "「助かりましたわ、マイン。さすがは我が社の顧問弁護士ですわね！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「弁護士じゃなくて、交渉人ね」
line = "「弁護士じゃなくて、交渉人ね」"

[[dialogue]]
speaker = "unk"
# 凄い手際だった
line = "凄い手際だった"

[[dialogue]]
speaker = "ネーゼマイン"
# 「実は、私のお父さんが弁護士でね。その背中を見て育った影響かな～」
line = "「実は、私のお父さんが弁護士でね。その背中を見て育った影響かな～」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「え？　将来は弁護士を目指しているのかって？　それは無理じゃないかな～。気質が致命的に合ってないっていうかね～」
line = "「え？　将来は弁護士を目指しているのかって？　それは無理じゃないかな～。気質が致命的に合ってないっていうかね～」"

[[dialogue]]
speaker = "セナリィ"
# 「私は合っていると思いますけれど、そこはやたら拘りますわよね」
line = "「私は合っていると思いますけれど、そこはやたら拘りますわよね」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「弁護士ってのは、正義の人が相応しい職業なんだよ。例えば、うちのお父さんや、会長みたいなね。残念ながら、私はそっち寄りじゃないから」
line = "「弁護士ってのは、正義の人が相応しい職業なんだよ。例えば、うちのお父さんや、会長みたいなね。残念ながら、私はそっち寄りじゃないから」"

[[dialogue]]
speaker = "セナリィ"
# 「あら、悪を弁護してくれる人が居てもいいと思いますけれど？」
line = "「あら、悪を弁護してくれる人が居てもいいと思いますけれど？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「だからこうして、『悪の味方』として交渉人をやっているってわけ。公安委員会所属の、ね」
line = "「だからこうして、『悪の味方』として交渉人をやっているってわけ。公安委員会所属の、ね」"

[[dialogue]]
speaker = "unk"
# セナリィは公安委員会に協力してるんだっけ
line = "セナリィは公安委員会に協力してるんだっけ"

[[dialogue]]
speaker = "セナリィ"
# 「秘密結社ゴールデングースとして、公安委員会から仕事の依頼を受けて、任務に参加しておりますわ」
line = "「秘密結社ゴールデングースとして、公安委員会から仕事の依頼を受けて、任務に参加しておりますわ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「いわゆる下請けってやつだね。私は公安委員会所属の交渉人として、ゴールデングースとの窓口担当。ついでにセナリィのバディを務めるように、上から指示を受けてるってわけ」
line = "「いわゆる下請けってやつだね。私は公安委員会所属の交渉人として、ゴールデングースとの窓口担当。ついでにセナリィのバディを務めるように、上から指示を受けてるってわけ」"

[[dialogue]]
speaker = "セナリィ"
# 「先程の交渉もそうですが、頭脳の優秀さは折り紙付きですわ。ですから、ゴールデングースの正社員として、絶賛引き抜き勧誘中なんですの！」
line = "「先程の交渉もそうですが、頭脳の優秀さは折り紙付きですわ。ですから、ゴールデングースの正社員として、絶賛引き抜き勧誘中なんですの！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「それね～。誘ってくれるのはありがたいけど、自分からわざわざ悪の道に行くのはね～」
line = "「それね～。誘ってくれるのはありがたいけど、自分からわざわざ悪の道に行くのはね～」"

[[dialogue]]
speaker = "セナリィ"
# 「自分は『悪の味方』だと、よく言っているのに？」
line = "「自分は『悪の味方』だと、よく言っているのに？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「私は確かに悪寄りだけど、あくまで『味方』、お手伝いさんで居たいってこと。だから私としては、簡単には頷けないんだよ」
line = "「私は確かに悪寄りだけど、あくまで『味方』、お手伝いさんで居たいってこと。だから私としては、簡単には頷けないんだよ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「それにどうしても私を引き抜きたいっていうなら、思わず頷いちゃうくらい心に響く誘い文句くらい言ってくれないとね～」
line = "「それにどうしても私を引き抜きたいっていうなら、思わず頷いちゃうくらい心に響く誘い文句くらい言ってくれないとね～」"

[[dialogue]]
speaker = "セナリィ"
# 「笑える面白い台詞募集中って顔に書いてありますわよ」
line = "「笑える面白い台詞募集中って顔に書いてありますわよ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひ♪　セナリィ渾身の誘い文句は面白かったな～。まるでプロポーズみたいに熱烈な……」
line = "「にひひ♪　セナリィ渾身の誘い文句は面白かったな～。まるでプロポーズみたいに熱烈な……」"

[[dialogue]]
speaker = "セナリィ"
# 「ちょっ、それ以上口にしたら、ぶっ殺しますわよ！？」
line = "「ちょっ、それ以上口にしたら、ぶっ殺しますわよ！？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「きゃははは♪　冗談だって～☆」
line = "「きゃははは♪　冗談だって～☆」"

[[dialogue]]
speaker = "unk"
# じゃあ俺も、お願いしようかな
line = "じゃあ俺も、お願いしようかな"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ん？　それって、星徒会のってこと？　でも、私は星徒会メンバーと違って、正義寄りじゃないしな～」
line = "「ん？　それって、星徒会のってこと？　でも、私は星徒会メンバーと違って、正義寄りじゃないしな～」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「違う？　会長の顧問交渉人？　ふ～ん、面白いけど、私がそれを引き受ける必然性はなくない？」
line = "「違う？　会長の顧問交渉人？　ふ～ん、面白いけど、私がそれを引き受ける必然性はなくない？」"

[[dialogue]]
speaker = "unk"
# マインは俺が困った時に手を貸して欲しい
line = "マインは俺が困った時に手を貸して欲しい"

[[dialogue]]
speaker = "unk"
# 俺が公安委員会の仕事に手を貸す代わりに
line = "俺が公安委員会の仕事に手を貸す代わりに"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひ♪　なるほど、交換条件ってわけだ。でも、それだけじゃ弱いな～。だって仮に私が断っても、会長は公安委員会に協力するもん」
line = "「にひひ♪　なるほど、交換条件ってわけだ。でも、それだけじゃ弱いな～。だって仮に私が断っても、会長は公安委員会に協力するもん」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「だから、どうしてもって言うなら、私が納得するような言葉じゃないと――」
line = "「だから、どうしてもって言うなら、私が納得するような言葉じゃないと――」"

[[dialogue]]
speaker = "unk"
# マインのストレス解消に付き合うよ
line = "マインのストレス解消に付き合うよ"

[[dialogue]]
speaker = "ネーゼマイン"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ぷっ……きゃははははは！　それ、覚えてたんだ？　うん、分かった。いいよ！　会長の顧問交渉人、引き受けてあげる♪」
line = "「ぷっ……きゃははははは！　それ、覚えてたんだ？　うん、分かった。いいよ！　会長の顧問交渉人、引き受けてあげる♪」"

[[dialogue]]
speaker = "セナリィ"
# 「え！？　マイン！？」
line = "「え！？　マイン！？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「その代わり、言ったことにはちゃ～んと責任持って貰うからね？　にひひ♪」
line = "「その代わり、言ったことにはちゃ～んと責任持って貰うからね？　にひひ♪」"

[[dialogue]]
speaker = "unk"
# 小悪魔のように、しかしどこか嬉しそうに笑うマインと、俺は握手を交わすのだった。
line = "小悪魔のように、しかしどこか嬉しそうに笑うマインと、俺は握手を交わすのだった。"
