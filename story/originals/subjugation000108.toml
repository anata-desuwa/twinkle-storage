[[dialogue]]
speaker = "コハルコ"
# 「ふぅ……今度こそ終わりだね」
line = "「ふぅ……今度こそ終わりだね」"

[[dialogue]]
speaker = "マグダレナ"
# 「はい、お疲れ様でした」
line = "「はい、お疲れ様でした」"

[[dialogue]]
speaker = "アルモタヘル"
# 「はぁ、はぁ……途中少し食べたが、もう空腹で倒れそうだ……」
line = "「はぁ、はぁ……途中少し食べたが、もう空腹で倒れそうだ……」"

[[dialogue]]
speaker = "unk"
# ケバブ買ってきました！
line = "ケバブ買ってきました！"

[[dialogue]]
speaker = "アルモタヘル"
# 「おお！　よくやった！　はむはむはむはむ……あむっ……ごくん」
line = "「おお！　よくやった！　はむはむはむはむ……あむっ……ごくん」"

[[dialogue]]
speaker = "コハルコ"
# 「すごい食べっぷり……ほんとにお腹空いてたんですね」
line = "「すごい食べっぷり……ほんとにお腹空いてたんですね」"

[[dialogue]]
speaker = "アルモタヘル"
# 「ふぅ……まだ満腹にはほど遠いが、生き返った心地だ。感謝するぞ、人の子よ」
line = "「ふぅ……まだ満腹にはほど遠いが、生き返った心地だ。感謝するぞ、人の子よ」"

[[dialogue]]
speaker = "コハルコ"
# 「改めて……会長さんも、マグダレナさんも、アルモタヘルさんも今日はお手伝いありがとうございました」
line = "「改めて……会長さんも、マグダレナさんも、アルモタヘルさんも今日はお手伝いありがとうございました」"

[[dialogue]]
speaker = "コハルコ"
# 「一歩間違えたら事故が起きてたし、秋葉原のイメージ悪化に繋がりかねなかったですから」
line = "「一歩間違えたら事故が起きてたし、秋葉原のイメージ悪化に繋がりかねなかったですから」"

[[dialogue]]
speaker = "コハルコ"
# 「他の場所だったら怪我していいってわけじゃないけど、やっぱり秋葉原は平和であってほしいです」
line = "「他の場所だったら怪我していいってわけじゃないけど、やっぱり秋葉原は平和であってほしいです」"

[[dialogue]]
speaker = "マグダレナ"
# 「コハルコさまはこの街が大事なのですね」
line = "「コハルコさまはこの街が大事なのですね」"

[[dialogue]]
speaker = "コハルコ"
# 「はい、秋葉原は私の家族がいる街ですから」
line = "「はい、秋葉原は私の家族がいる街ですから」"

[[dialogue]]
speaker = "ナツコ"
# 「おねえちゃーん！」
line = "「おねえちゃーん！」"

[[dialogue]]
speaker = "コハルコ"
# 「ナツコ？」
line = "「ナツコ？」"

[[dialogue]]
speaker = "トウコ"
# 「お姉ちゃんが帰ってくるの遅いから、商店街の人に聞いたらここだって」
line = "「お姉ちゃんが帰ってくるの遅いから、商店街の人に聞いたらここだって」"

[[dialogue]]
speaker = "コハルコ"
# 「トウコまで……ほんとだ、気付いたらもうこんな時間……。ごめん、急いで買い物してご飯作るからね」
line = "「トウコまで……ほんとだ、気付いたらもうこんな時間……。ごめん、急いで買い物してご飯作るからね」"

[[dialogue]]
speaker = "ナツコ"
# 「ううん、お姉ちゃん、秋葉原のために頑張ってたんだよね！　商店街の人がありがとうって言ってたよ！」
line = "「ううん、お姉ちゃん、秋葉原のために頑張ってたんだよね！　商店街の人がありがとうって言ってたよ！」"

[[dialogue]]
speaker = "トウコ"
# 「ご飯はお母さんが作ってくれたから大丈夫。だから帰ろ、お姉ちゃん」
line = "「ご飯はお母さんが作ってくれたから大丈夫。だから帰ろ、お姉ちゃん」"

[[dialogue]]
speaker = "コハルコ"
# 「……そうだね。ご飯は家族みんなで食べた方がおいしいもんね」
line = "「……そうだね。ご飯は家族みんなで食べた方がおいしいもんね」"

[[dialogue]]
speaker = "マグダレナ"
# 「ふふ、よい家族ですね。つい頬が緩んでしまいます」
line = "「ふふ、よい家族ですね。つい頬が緩んでしまいます」"

[[dialogue]]
speaker = "アルモタヘル"
# 「ああ。我も腹が満ちるようだ」
line = "「ああ。我も腹が満ちるようだ」"

[[dialogue]]
speaker = "アルモタヘル"
# 「しかしコハルコよ。お前、家族とは──」
line = "「しかしコハルコよ。お前、家族とは──」"

[[dialogue]]
speaker = "アルモタヘル"
# 「いや、お前の家族が幸せなら今は何も言うまい」
line = "「いや、お前の家族が幸せなら今は何も言うまい」"

[[dialogue]]
speaker = "コハルコ"
# 「は、はぁ……？」
line = "「は、はぁ……？」"

[[dialogue]]
speaker = "コハルコ"
# （もしかしてうちの家族のこと、わかるのかな？　アルモタヘルさんは《命脈》の守護天使だから）
line = "（もしかしてうちの家族のこと、わかるのかな？　アルモタヘルさんは《命脈》の守護天使だから）"

[[dialogue]]
speaker = "コハルコ"
# 「それじゃ、私はお先に失礼します。だけどその前に……はい、今までの分のお給料です」
line = "「それじゃ、私はお先に失礼します。だけどその前に……はい、今までの分のお給料です」"

[[dialogue]]
speaker = "アルモタヘル"
# 「！！」
line = "「！！」"

[[dialogue]]
speaker = "マグダレナ"
# 「この守護天使マグダレナ、初めてのお給料です……」
line = "「この守護天使マグダレナ、初めてのお給料です……」"

[[dialogue]]
speaker = "マグダレナ"
# 「ふふ、ふふふ……達成感というものでしょうか。きっと今まで教皇庁の方から頂いた額とは比べられないのでしょうが、とても嬉しいです」
line = "「ふふ、ふふふ……達成感というものでしょうか。きっと今まで教皇庁の方から頂いた額とは比べられないのでしょうが、とても嬉しいです」"

[[dialogue]]
speaker = "アルモタヘル"
# 「これで自分の金でケバブを買える……！　あ、いや、給金が入ったら馳走する約束だったな。忘れてはいないぞ」
line = "「これで自分の金でケバブを買える……！　あ、いや、給金が入ったら馳走する約束だったな。忘れてはいないぞ」"

[[dialogue]]
speaker = "アルモタヘル"
# 「よい、皆でケバブを食べよう。それがよい。この金で買えるだけ買ってやる」
line = "「よい、皆でケバブを食べよう。それがよい。この金で買えるだけ買ってやる」"

[[dialogue]]
speaker = "コハルコ"
# 「今日はとても助かりました。おふたりとも大活躍でしたね」
line = "「今日はとても助かりました。おふたりとも大活躍でしたね」"

[[dialogue]]
speaker = "アルモタヘル"
# 「こちらこそコハルコには世話になった。お前がいなければ、我は鐚一文稼ぐことができなかっただろう」
line = "「こちらこそコハルコには世話になった。お前がいなければ、我は鐚一文稼ぐことができなかっただろう」"

[[dialogue]]
speaker = "マグダレナ"
# 「ええ、感謝してもしきれません」
line = "「ええ、感謝してもしきれません」"

[[dialogue]]
speaker = "コハルコ"
# 「そんな。守護天使さんにそこまで言われると畏れ多いですよ」
line = "「そんな。守護天使さんにそこまで言われると畏れ多いですよ」"

[[dialogue]]
speaker = "コハルコ"
# （天使や教皇庁の人に見られたらすごく怒られそうだから、見つからなくて良かった……！）
line = "（天使や教皇庁の人に見られたらすごく怒られそうだから、見つからなくて良かった……！）"

[[dialogue]]
speaker = "コハルコ"
# 「会長さんもありがとう。はい、バイト代」
line = "「会長さんもありがとう。はい、バイト代」"

[[dialogue]]
speaker = "unk"
# ありがとうございます
line = "ありがとうございます"

[[dialogue]]
speaker = "コハルコ"
# 「じゃあ私はほんとに帰るよ。またね」
line = "「じゃあ私はほんとに帰るよ。またね」"

[[dialogue]]
speaker = "トウコ"
# 「さようなら」
line = "「さようなら」"

[[dialogue]]
speaker = "ナツコ"
# 「バイバーイ！」
line = "「バイバーイ！」"

[[dialogue]]
speaker = "マグダレナ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# どうしました？
line = "どうしました？"

[[dialogue]]
speaker = "マグダレナ"
# 「ふと疑問に思ったのです。どうして、私は自分でお金を稼ぎたいと言ったのか」
line = "「ふと疑問に思ったのです。どうして、私は自分でお金を稼ぎたいと言ったのか」"

[[dialogue]]
speaker = "マグダレナ"
# 「皆さまのお世話になってばかりで情けなくて、守護天使としての威厳が損なわれるのではないかと不安になったから。自分でもそう思っておりました」
line = "「皆さまのお世話になってばかりで情けなくて、守護天使としての威厳が損なわれるのではないかと不安になったから。自分でもそう思っておりました」"

[[dialogue]]
speaker = "マグダレナ"
# 「でも違ったのです」
line = "「でも違ったのです」"

[[dialogue]]
speaker = "マグダレナ"
# 「私はお世話になった方々に感謝を伝えたかった。働くという形で恩返しがしたかった」
line = "「私はお世話になった方々に感謝を伝えたかった。働くという形で恩返しがしたかった」"

[[dialogue]]
speaker = "マグダレナ"
# 「例えばお母さまに日頃の感謝を伝えたい時、会長さまはどうされましたか」
line = "「例えばお母さまに日頃の感謝を伝えたい時、会長さまはどうされましたか」"

[[dialogue]]
speaker = "unk"
# 家事を手伝ったり肩を揉んだりとか……
line = "家事を手伝ったり肩を揉んだりとか……"

[[dialogue]]
speaker = "マグダレナ"
# 「そうです。きっとそれと同じことです。労働という形で気持ちをお返ししたかったのです」
line = "「そうです。きっとそれと同じことです。労働という形で気持ちをお返ししたかったのです」"

[[dialogue]]
speaker = "マグダレナ"
# 「アルモタヘルもそうだったのではないですか？」
line = "「アルモタヘルもそうだったのではないですか？」"

[[dialogue]]
speaker = "アルモタヘル"
# 「むぅ。お前に全部言われてしまったか」
line = "「むぅ。お前に全部言われてしまったか」"

[[dialogue]]
speaker = "アルモタヘル"
# 「我ら守護天使は世界の摂理を司る者。本来なら三界の者とは交わらない存在。だが義体に宿った我らは、ともに世界を守る仲間だ」
line = "「我ら守護天使は世界の摂理を司る者。本来なら三界の者とは交わらない存在。だが義体に宿った我らは、ともに世界を守る仲間だ」"

[[dialogue]]
speaker = "アルモタヘル"
# 「人の子よ、お前には感謝している。そしてこれからは、お前が我らに感謝したくなるような、頼もしい味方となろう」
line = "「人の子よ、お前には感謝している。そしてこれからは、お前が我らに感謝したくなるような、頼もしい味方となろう」"

[[dialogue]]
speaker = "アルモタヘル"
# 「これからもよろしく頼むぞ」
line = "「これからもよろしく頼むぞ」"

[[dialogue]]
speaker = "unk"
# はい！
line = "はい！"

[[dialogue]]
speaker = "unk"
# 後日──
line = "後日──"

[[dialogue]]
speaker = "マグダレナ"
# 「ランニングコープスの最新話更新！？　早く視聴しなくては……！」
line = "「ランニングコープスの最新話更新！？　早く視聴しなくては……！」"

[[dialogue]]
speaker = "アルモタヘル"
# 「む！？　店主よ腕を上げたな！　ケバブ十人前──いや百人前追加だ！」
line = "「む！？　店主よ腕を上げたな！　ケバブ十人前──いや百人前追加だ！」"

[[dialogue]]
speaker = "unk"
# 頑張って働いていた反動か、守護天使たちはそれぞれの嗜好に没頭してしまい……
line = "頑張って働いていた反動か、守護天使たちはそれぞれの嗜好に没頭してしまい……"

[[dialogue]]
speaker = "unk"
# 彼女たちを社会復帰（？）させるためにまた頑張るのであった──。
line = "彼女たちを社会復帰（？）させるためにまた頑張るのであった──。"
