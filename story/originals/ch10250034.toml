[[dialogue]]
speaker = "unk"
# 第４話,恋人たちの夜,P
line = "第４話,恋人たちの夜,P"

[[dialogue]]
speaker = "unk"
# 流星寮のクリスマスパーティーも無事終了し、家に戻ってきた。
line = "流星寮のクリスマスパーティーも無事終了し、家に戻ってきた。"

[[dialogue]]
speaker = "unk"
# もちろん俺だけじゃなく、恋人の舞亜も一緒だ。
line = "もちろん俺だけじゃなく、恋人の舞亜も一緒だ。"

[[dialogue]]
speaker = "舞亜"
# 「あのー、会長さん？」
line = "「あのー、会長さん？」"

[[dialogue]]
speaker = "unk"
# ゆっくりしていいからね
line = "ゆっくりしていいからね"

[[dialogue]]
speaker = "unk"
# 自分の家だと思ってくつろいで
line = "自分の家だと思ってくつろいで"

[[dialogue]]
speaker = "舞亜"
# 「いやいや、そういう問題じゃなくて。どうして私がここにいるの？」
line = "「いやいや、そういう問題じゃなくて。どうして私がここにいるの？」"

[[dialogue]]
speaker = "舞亜"
# 「パーティーが終わって、いい雰囲気で一緒に帰ったところまではいいんだけど……」
line = "「パーティーが終わって、いい雰囲気で一緒に帰ったところまではいいんだけど……」"

[[dialogue]]
speaker = "舞亜"
# 「……この手、そろそろいいんじゃない？」
line = "「……この手、そろそろいいんじゃない？」"

[[dialogue]]
speaker = "unk"
# 離したくない
line = "離したくない"

[[dialogue]]
speaker = "unk"
# つないだままがいい
line = "つないだままがいい"

[[dialogue]]
speaker = "舞亜"
# 「ふふっ、完全にスイッチ入っちゃってるし」
line = "「ふふっ、完全にスイッチ入っちゃってるし」"

[[dialogue]]
speaker = "舞亜"
# 「クリスマスで浮かれちゃう気持ちもわかるけどね。でも、繋いだ手を離したくないからって、そのままお持ち帰りしちゃうのはどうかなぁ」
line = "「クリスマスで浮かれちゃう気持ちもわかるけどね。でも、繋いだ手を離したくないからって、そのままお持ち帰りしちゃうのはどうかなぁ」"

[[dialogue]]
speaker = "舞亜"
# 「まあ、お持ち帰りされるのは……こっちも想定してたから問題ないんだけどね。でも、ずっと手を繋いだままだと、いろいろやりづらいでしょ」
line = "「まあ、お持ち帰りされるのは……こっちも想定してたから問題ないんだけどね。でも、ずっと手を繋いだままだと、いろいろやりづらいでしょ」"

[[dialogue]]
speaker = "舞亜"
# 「あ、いや、変な意味じゃなくて！　もう、いきなり抱きつかないの！　むぎゅってしないでぇぇ～～っ！！」
line = "「あ、いや、変な意味じゃなくて！　もう、いきなり抱きつかないの！　むぎゅってしないでぇぇ～～っ！！」"

[[dialogue]]
speaker = "舞亜"
# 「ふふ……もう、がっつきすぎだってば、仕方のない会長さんだね」
line = "「ふふ……もう、がっつきすぎだってば、仕方のない会長さんだね」"

[[dialogue]]
speaker = "舞亜"
# 「やりづらいって言ったのは、玄関のカギ開けるのとか、飲み物用意したりすることで……この人器用にやるな～って感心したけど」
line = "「やりづらいって言ったのは、玄関のカギ開けるのとか、飲み物用意したりすることで……この人器用にやるな～って感心したけど」"

[[dialogue]]
speaker = "舞亜"
# 「なんでこう、いちゃいちゃに全力なわけ？　おまけに、クリスマスフォームをやめようとすると拗ねるし」
line = "「なんでこう、いちゃいちゃに全力なわけ？　おまけに、クリスマスフォームをやめようとすると拗ねるし」"

[[dialogue]]
speaker = "unk"
# 今日の舞亜は特別だから
line = "今日の舞亜は特別だから"

[[dialogue]]
speaker = "unk"
# だって可愛いから
line = "だって可愛いから"

[[dialogue]]
speaker = "舞亜"
# 「うん……知ってる。帰り道で何度も言われたし」
line = "「うん……知ってる。帰り道で何度も言われたし」"

[[dialogue]]
speaker = "舞亜"
# 「あんなに情熱的に求められたら、私だって……そういう気になっちゃうでしょ。だから、クリスマスフォームだってそのままだし」
line = "「あんなに情熱的に求められたら、私だって……そういう気になっちゃうでしょ。だから、クリスマスフォームだってそのままだし」"

[[dialogue]]
speaker = "舞亜"
# 「とりあえず改めて、メリークリスマス♪　色々あったけど、無事パーティーが成功してよかったね」
line = "「とりあえず改めて、メリークリスマス♪　色々あったけど、無事パーティーが成功してよかったね」"

[[dialogue]]
speaker = "舞亜"
# 「あっ、こら、繋いだ手をブンブンしないのっ。わかったから落ち着いて、ねっ？」
line = "「あっ、こら、繋いだ手をブンブンしないのっ。わかったから落ち着いて、ねっ？」"

[[dialogue]]
speaker = "舞亜"
# 「私は会長さんみたいに器用じゃないから、出来れば手を離して欲しいんだけど……」
line = "「私は会長さんみたいに器用じゃないから、出来れば手を離して欲しいんだけど……」"

[[dialogue]]
speaker = "unk"
# 代わりに何してくれる？
line = "代わりに何してくれる？"

[[dialogue]]
speaker = "unk"
# しょうがないなぁ
line = "しょうがないなぁ"

[[dialogue]]
speaker = "舞亜"
# 「………………ちゅ<emoji=heart04>　これでいい？」
line = "「………………ちゅ<emoji=heart04>　これでいい？」"

[[dialogue]]
speaker = "舞亜"
# 「あ～あ、もっとギュッてしてくるし……キスしたの失敗だったかなぁ？」
line = "「あ～あ、もっとギュッてしてくるし……キスしたの失敗だったかなぁ？」"

[[dialogue]]
speaker = "舞亜"
# 「はいはい、もっとすればいいんでしょ？　んちゅ<emoji=heart04>　ちゅ～っ<emoji=heart04>　ちゅ<emoji=heart04>」
line = "「はいはい、もっとすればいいんでしょ？　んちゅ<emoji=heart04>　ちゅ～っ<emoji=heart04>　ちゅ<emoji=heart04>」"

[[dialogue]]
speaker = "舞亜"
# 「普段は我慢させちゃってごめんね。２人きりの時は、私ももうちょっと頑張るから<emoji=heart04>」
line = "「普段は我慢させちゃってごめんね。２人きりの時は、私ももうちょっと頑張るから<emoji=heart04>」"

[[dialogue]]
speaker = "舞亜"
# 「はい、ちゃんとキスしたんだからそろそろ手を離してよ」
line = "「はい、ちゃんとキスしたんだからそろそろ手を離してよ」"

[[dialogue]]
speaker = "舞亜"
# 「まったく、名残惜しそうにして……よし、離れた」
line = "「まったく、名残惜しそうにして……よし、離れた」"

[[dialogue]]
speaker = "unk"
# 離れちゃった……
line = "離れちゃった……"

[[dialogue]]
speaker = "unk"
# 手を離してどうするの？
line = "手を離してどうするの？"

[[dialogue]]
speaker = "舞亜"
# 「恋人同士いちゃいちゃするのも悪くないけど、クリスマスなんだから、それらしいこともしないとね」
line = "「恋人同士いちゃいちゃするのも悪くないけど、クリスマスなんだから、それらしいこともしないとね」"

[[dialogue]]
speaker = "舞亜"
# 「ということで……はいっ、クリスマスプレゼント<emoji=heart04>」
line = "「ということで……はいっ、クリスマスプレゼント<emoji=heart04>」"

[[dialogue]]
speaker = "舞亜"
# 「このマフラーは買ったのだけど、おまけでついてるスイーツは自作だからね」
line = "「このマフラーは買ったのだけど、おまけでついてるスイーツは自作だからね」"

[[dialogue]]
speaker = "舞亜"
# 「味の方は大丈夫。あの特訓のおかげで上手に作れるようになったから。パーティーで出したクリスマスケーキもすごく喜んでもらえたし」
line = "「味の方は大丈夫。あの特訓のおかげで上手に作れるようになったから。パーティーで出したクリスマスケーキもすごく喜んでもらえたし」"

[[dialogue]]
speaker = "舞亜"
# 「会長さんも食べてくれた？　クリスマスフォームで作ったスイーツはバフがかかるから、すぐわかったんじゃない？」
line = "「会長さんも食べてくれた？　クリスマスフォームで作ったスイーツはバフがかかるから、すぐわかったんじゃない？」"

[[dialogue]]
speaker = "舞亜"
# 「というわけで味は保証済み、きっと美味しいよ～」
line = "「というわけで味は保証済み、きっと美味しいよ～」"

[[dialogue]]
speaker = "舞亜"
# 「あ、気になるなら今食べちゃう？　いいよー。疲れも吹っ飛ぶかも。私も少し分けてもらおうかな」
line = "「あ、気になるなら今食べちゃう？　いいよー。疲れも吹っ飛ぶかも。私も少し分けてもらおうかな」"

[[dialogue]]
speaker = "舞亜"
# 「では、頂きます……んふ、甘さ強めでおいしい～<emoji=heart04>」
line = "「では、頂きます……んふ、甘さ強めでおいしい～<emoji=heart04>」"

[[dialogue]]
speaker = "舞亜"
# 「ん？　会長さんもプレゼントくれるの？　ふふっ、彼女に贈るクリスマスプレゼントだから、気合い入れてるのかな～？」
line = "「ん？　会長さんもプレゼントくれるの？　ふふっ、彼女に贈るクリスマスプレゼントだから、気合い入れてるのかな～？」"

[[dialogue]]
speaker = "舞亜"
# 「ありがと。これは寮に戻ってから開けさせてもらうね。今開けると、ドキドキが爆発しちゃいそうだから」
line = "「ありがと。これは寮に戻ってから開けさせてもらうね。今開けると、ドキドキが爆発しちゃいそうだから」"

[[dialogue]]
speaker = "舞亜"
# 「……うん、今も絶賛ドキドキしてるよ。大好きな人がこんなすぐ近くにいるんだもん、おかしくなりそうなのを、頑張って我慢してるんだから」
line = "「……うん、今も絶賛ドキドキしてるよ。大好きな人がこんなすぐ近くにいるんだもん、おかしくなりそうなのを、頑張って我慢してるんだから」"

[[dialogue]]
speaker = "舞亜"
# 「ねえ、会長さん……ふふっ、メリークリスマス<emoji=heart04>　いっぱいいっぱいありがとう、大好きだよ<emoji=heart04>」
line = "「ねえ、会長さん……ふふっ、メリークリスマス<emoji=heart04>　いっぱいいっぱいありがとう、大好きだよ<emoji=heart04>」"

[[dialogue]]
speaker = "舞亜"
# 「……ちゅっ<emoji=heart04>」
line = "「……ちゅっ<emoji=heart04>」"
