[[dialogue]]
speaker = "unk"
# 第２話,どっちが好き？（前編）,P
line = "第２話,どっちが好き？（前編）,P"

[[dialogue]]
speaker = "アニマ"
# 「ついに試作品ができたゾ、会長！」
line = "「ついに試作品ができたゾ、会長！」"

[[dialogue]]
speaker = "unk"
# ある日突然、アニマ先輩がテンション高く、星徒会室にやって来た。何事かと聞き返すと――
line = "ある日突然、アニマ先輩がテンション高く、星徒会室にやって来た。何事かと聞き返すと――"

[[dialogue]]
speaker = "アニマ"
# 「ほらこの前、新種モンスターと戦った後に、会長としての仕事があるから、附属校に通い続けるのは難しいと言っていたダロウ？」
line = "「ほらこの前、新種モンスターと戦った後に、会長としての仕事があるから、附属校に通い続けるのは難しいと言っていたダロウ？」"

[[dialogue]]
speaker = "unk"
# アルモと同じ理由で、俺も一時的に附属生女子のアバターに魂を移して、附属校に通ったことがあったのだが、その時の話らしい。
line = "アルモと同じ理由で、俺も一時的に附属生女子のアバターに魂を移して、附属校に通ったことがあったのだが、その時の話らしい。"

[[dialogue]]
speaker = "アニマ"
# 「そこでアニマは考えた。魂が２つあれば、二役を同時にこなすことも可能ではナイかと！　というわけで……これダ！」
line = "「そこでアニマは考えた。魂が２つあれば、二役を同時にこなすことも可能ではナイかと！　というわけで……これダ！」"

[[dialogue]]
speaker = "アニマ"
# 「<ruby=たましい>魂</ruby><ruby=ぶんれつやく>分裂薬</ruby>～！」
line = "「<ruby>魂<rt>たましい</rt></ruby><ruby>分裂薬<rt>ぶんれつやく</rt></ruby>～！」"

[[dialogue]]
speaker = "unk"
# またとんでもないものを作り出してる！？
line = "またとんでもないものを作り出してる！？"

[[dialogue]]
speaker = "アニマ"
# 「フヒ♪　例によって何かしら副作用はあるだろうガ……安心したまえ。今日は会長に試してもらおうとは思っていナイ」
line = "「フヒ♪　例によって何かしら副作用はあるだろうガ……安心したまえ。今日は会長に試してもらおうとは思っていナイ」"

[[dialogue]]
speaker = "アニマ"
# 「それよりも、こうした方が面白そうだと思ったのでネ――というわけで、出番ダ、アルモたん！」
line = "「それよりも、こうした方が面白そうだと思ったのでネ――というわけで、出番ダ、アルモたん！」"

[[dialogue]]
speaker = "アルモたん"
# 「じゃ～ん♪　なのだ！」
line = "「じゃ～ん♪　なのだ！」"

[[dialogue]]
speaker = "アルモタヘル"
# 「ふふっ、どうだ？　人の子よ」
line = "「ふふっ、どうだ？　人の子よ」"

[[dialogue]]
speaker = "unk"
# アルモが２人……！？
line = "アルモが２人……！？"

[[dialogue]]
speaker = "unk"
# え、えええぇぇぇーーっ！！？
line = "え、えええぇぇぇーーっ！！？"

[[dialogue]]
speaker = "アニマ"
# 「そう、魂を分裂させたことで、２つの体を同時に動かせるようになったというわけダ！」
line = "「そう、魂を分裂させたことで、２つの体を同時に動かせるようになったというわけダ！」"

[[dialogue]]
speaker = "アルモタヘル"
# 「自身がもう１人横にいるというのは不思議な感じだが、人の子が喜ぶというなら、我も嬉しいぞ」
line = "「自身がもう１人横にいるというのは不思議な感じだが、人の子が喜ぶというなら、我も嬉しいぞ」"

[[dialogue]]
speaker = "アルモたん"
# 「両方のアルモたんが楽しめて、お得だな♪」
line = "「両方のアルモたんが楽しめて、お得だな♪」"

[[dialogue]]
speaker = "アニマ"
# 「フヒ、会長としては、恋人２人に囲まれて、まさに両手に花、夢の合法的ハーレムというやつダ♪　嬉しいダロウ？」
line = "「フヒ、会長としては、恋人２人に囲まれて、まさに両手に花、夢の合法的ハーレムというやつダ♪　嬉しいダロウ？」"

[[dialogue]]
speaker = "unk"
# 嬉しいけど、正直困る……！
line = "嬉しいけど、正直困る……！"

[[dialogue]]
speaker = "アルモたん"
# 「そうなのか？　――どっちかを贔屓にすると、もう片方に罪悪感が湧くから？」
line = "「そうなのか？　――どっちかを贔屓にすると、もう片方に罪悪感が湧くから？」"

[[dialogue]]
speaker = "アルモタヘル"
# 「ふふっ、確かに他の女子が相手であれば、嫉妬の炎を燃やしてしまうだろうが、相手がもう１人の我というならば――」
line = "「ふふっ、確かに他の女子が相手であれば、嫉妬の炎を燃やしてしまうだろうが、相手がもう１人の我というならば――」"

[[dialogue]]
speaker = "アルモたん"
# 「えへへ、会長のそういう優しいところは好きなのだ♪」
line = "「えへへ、会長のそういう優しいところは好きなのだ♪」"

[[dialogue]]
speaker = "アルモたん"
# 「ぎゅ～っ♪　すりすり<emoji=heart04>」
line = "「ぎゅ～っ♪　すりすり<emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル"
# 「って、こら！　もう１人の我よ、何を勝手にくっ付いているのだ！　そういうことをするなら、同時にしないと不公平であろう！」
line = "「って、こら！　もう１人の我よ、何を勝手にくっ付いているのだ！　そういうことをするなら、同時にしないと不公平であろう！」"

[[dialogue]]
speaker = "アルモたん"
# 「え？　相手がもう１人の自分なら、遠慮する必要がないのだ。こういうのは早い者勝ちなのだ♪」
line = "「え？　相手がもう１人の自分なら、遠慮する必要がないのだ。こういうのは早い者勝ちなのだ♪」"

[[dialogue]]
speaker = "アルモタヘル"
# 「なっ！？　む、むむっ……！」
line = "「なっ！？　む、むむっ……！」"

[[dialogue]]
speaker = "アルモタヘル"
# 「人の子よ、こちらを向くがよい！」
line = "「人の子よ、こちらを向くがよい！」"

[[dialogue]]
speaker = "unk"
# え？　――わぷっ！？
line = "え？　――わぷっ！？"

[[dialogue]]
speaker = "アルモタヘル"
# 「ほら<emoji=heart04>　そんな、ぺったんこのちんちくりんボディより、大きい方がいいであろう？」
line = "「ほら<emoji=heart04>　そんな、ぺったんこのちんちくりんボディより、大きい方がいいであろう？」"

[[dialogue]]
speaker = "アルモたん"
# 「なぁっ！？　まさかの自分にディスられたのだ！？　というか、胸を使うのは卑怯なのだ！」
line = "「なぁっ！？　まさかの自分にディスられたのだ！？　というか、胸を使うのは卑怯なのだ！」"

[[dialogue]]
speaker = "アルモタヘル"
# 「ふふん♪　先に抜け駆けをしたのは、お前の方であろう？　ならば、こちらも弱肉強食のあり方を見せつけるまで」
line = "「ふふん♪　先に抜け駆けをしたのは、お前の方であろう？　ならば、こちらも弱肉強食のあり方を見せつけるまで」"

[[dialogue]]
speaker = "アルモタヘル"
# 「ステーキは肉厚な方がいいに決まっているからな。――そうであろう？　人の子よ」
line = "「ステーキは肉厚な方がいいに決まっているからな。――そうであろう？　人の子よ」"

[[dialogue]]
speaker = "アルモたん"
# 「はぁ！？　そんなことないのだ！　最近の会長はずっと、アルモたんとラブラブだったのだ！」
line = "「はぁ！？　そんなことないのだ！　最近の会長はずっと、アルモたんとラブラブだったのだ！」"

[[dialogue]]
speaker = "アルモたん"
# 「賞味期限切れのお肉より、新鮮なお肉の方が美味に決まっているのだ！」
line = "「賞味期限切れのお肉より、新鮮なお肉の方が美味に決まっているのだ！」"

[[dialogue]]
speaker = "アルモタヘル"
# 「誰が賞味期限切れだ！？　熟成肉は美味であると、お前も知っているであろう！」
line = "「誰が賞味期限切れだ！？　熟成肉は美味であると、お前も知っているであろう！」"

[[dialogue]]
speaker = "アルモたん"
# 「会長の好みは違うのだ♪　この前デートに行った時も、アルモたんのことを好きだって言ってくれたのだ！」
line = "「会長の好みは違うのだ♪　この前デートに行った時も、アルモたんのことを好きだって言ってくれたのだ！」"

[[dialogue]]
speaker = "アルモタヘル"
# 「それは最近ずっと、そっちのアバターで活動していたからであろう！」
line = "「それは最近ずっと、そっちのアバターで活動していたからであろう！」"

[[dialogue]]
speaker = "アルモたん"
# 「最近はよく、アルモたんとキスだってしているのだ♪」
line = "「最近はよく、アルモたんとキスだってしているのだ♪」"

[[dialogue]]
speaker = "アルモタヘル"
# 「っ……！　ふ……ふふふ……！」
line = "「っ……！　ふ……ふふふ……！」"

[[dialogue]]
speaker = "アルモタヘル"
# 「――アニマよ、悪いが会長は連れていくぞ！」
line = "「――アニマよ、悪いが会長は連れていくぞ！」"

[[dialogue]]
speaker = "unk"
# え！？　おわぁ～っ！？
line = "え！？　おわぁ～っ！？"

[[dialogue]]
speaker = "アルモたん"
# 「なっ！？　会長を担いで逃げたのだ！？　待つのだ～～～っ！」
line = "「なっ！？　会長を担いで逃げたのだ！？　待つのだ～～～っ！」"

[[dialogue]]
speaker = "アニマ"
# 「ごゆっくり～♪」
line = "「ごゆっくり～♪」"

[[dialogue]]
speaker = "アニマ"
# 「後で何があったか、報告を聞くのが楽しみだナ。……フヒ♪」
line = "「後で何があったか、報告を聞くのが楽しみだナ。……フヒ♪」"

[[dialogue]]
speaker = "unk"
# こうして、俺は大きな方のアルモに連れ去られることになるのだった――
line = "こうして、俺は大きな方のアルモに連れ去られることになるのだった――"
