[[dialogue]]
speaker = "unk"
# その仮想空間は、以前のオペレーション・ペンタグラムで訪れたことのある、魔界の神殿であった――
line = "その仮想空間は、以前のオペレーション・ペンタグラムで訪れたことのある、魔界の神殿であった――"

[[dialogue]]
speaker = "ウズメイア"
# 「あっ！　会長く～ん、こっちこっち～！　一緒の場所なんて合縁奇縁だし♪」
line = "「あっ！　会長く～ん、こっちこっち～！　一緒の場所なんて合縁奇縁だし♪」"

[[dialogue]]
speaker = "舞亜"
# 「こんにちは、会長さん。私も輝く星に挑戦しに来たよ」
line = "「こんにちは、会長さん。私も輝く星に挑戦しに来たよ」"

[[dialogue]]
speaker = "ソフィア"
# 「お疲れ様です。フィオナ会長のところへ挑みに来たんですね」
line = "「お疲れ様です。フィオナ会長のところへ挑みに来たんですね」"

[[dialogue]]
speaker = "unk"
# ああ。同じ会長として１度戦ってみたくて
line = "ああ。同じ会長として１度戦ってみたくて"

[[dialogue]]
speaker = "unk"
# そう、俺がやって来たのは流星学園最強の星徒会長、フィオナのシャドウと戦う為の仮想空間だった。
line = "そう、俺がやって来たのは流星学園最強の星徒会長、フィオナのシャドウと戦う為の仮想空間だった。"

[[dialogue]]
speaker = "シャルレーヌ"
# 「くふふっ、会長さん、全力が出せないって聞きましたけど、大丈夫なんですか～？」
line = "「くふふっ、会長さん、全力が出せないって聞きましたけど、大丈夫なんですか～？」"

[[dialogue]]
speaker = "unk"
# と、ウズメの後ろからひょっこりと現れたのは、以前バレンタインの時にウズメと仲良くなった附属生のシャルレーヌ。
line = "と、ウズメの後ろからひょっこりと現れたのは、以前バレンタインの時にウズメと仲良くなった附属生のシャルレーヌ。"

[[dialogue]]
speaker = "シャルレーヌ"
# 「コテンパンにやられちゃうかもしれないのに、わざわざ戦いに来るなんて、本当にマゾなんですから～<emoji=heart04>」
line = "「コテンパンにやられちゃうかもしれないのに、わざわざ戦いに来るなんて、本当にマゾなんですから～<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# あれ？　シャルレーヌ、素の性格が出て……
line = "あれ？　シャルレーヌ、素の性格が出て……"

[[dialogue]]
speaker = "ウズメイア"
# 「実は、それにはちょっと事情があって～」
line = "「実は、それにはちょっと事情があって～」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「バレンタインの後、ウズメイア先輩と話していたら、ソフィア先輩と舞亜先輩にその現場を見られちゃったんですよ」
line = "「バレンタインの後、ウズメイア先輩と話していたら、ソフィア先輩と舞亜先輩にその現場を見られちゃったんですよ」"

[[dialogue]]
speaker = "ウズメイア"
# 「周りに気付かないくらい、シャルレーヌちゃんと夢中で話し込んじゃってたんだよね～」
line = "「周りに気付かないくらい、シャルレーヌちゃんと夢中で話し込んじゃってたんだよね～」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「それで……ソフィア先輩も舞亜先輩も、ウズメイア先輩みたいに全然動じなくて」
line = "「それで……ソフィア先輩も舞亜先輩も、ウズメイア先輩みたいに全然動じなくて」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「なので、知られちゃった以上は隠していても仕方ないし、もう開き直って素の方でやらせてもらってる感じです」
line = "「なので、知られちゃった以上は隠していても仕方ないし、もう開き直って素の方でやらせてもらってる感じです」"

[[dialogue]]
speaker = "舞亜"
# 「私はこっちのシャルちゃんの方が可愛いと思うよ？　ほら、綺麗な薔薇にはトゲがあるっていうし」
line = "「私はこっちのシャルちゃんの方が可愛いと思うよ？　ほら、綺麗な薔薇にはトゲがあるっていうし」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「それ、褒めてます……？」
line = "「それ、褒めてます……？」"

[[dialogue]]
speaker = "ソフィア"
# 「私は舞亜にウズメ、姉さんと周りがマイペースなヒトだらけなんで、シャルさんはむしろ気遣いのできる、いい後輩だと思ってますよ」
line = "「私は舞亜にウズメ、姉さんと周りがマイペースなヒトだらけなんで、シャルさんはむしろ気遣いのできる、いい後輩だと思ってますよ」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「ソフィア先輩、ありがとうございます～♪　優しくて大好き～<emoji=heart04>」
line = "「ソフィア先輩、ありがとうございます～♪　優しくて大好き～<emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
# 「ふふふ、私は後輩にホットな先輩なので」
line = "「ふふふ、私は後輩にホットな先輩なので」"

[[dialogue]]
speaker = "unk"
# なんか懐柔されてない……？
line = "なんか懐柔されてない……？"

[[dialogue]]
speaker = "舞亜"
# 「親しい後輩ができて、ソフィー、張り切っているみたい。まぁ、シャルちゃんは悪い子ではなさそうだから、大丈夫じゃないかな？」
line = "「親しい後輩ができて、ソフィー、張り切っているみたい。まぁ、シャルちゃんは悪い子ではなさそうだから、大丈夫じゃないかな？」"

[[dialogue]]
speaker = "ウズメイア"
# 「あ、それと、トリシャさんたちも来てるんだよ！　ほら、あそこ！」
line = "「あ、それと、トリシャさんたちも来てるんだよ！　ほら、あそこ！」"

[[dialogue]]
speaker = "unk"
# ウズメが視線をやった方を見やると、そこにはトリシャさんがヒトリに声をかけているところだった。
line = "ウズメが視線をやった方を見やると、そこにはトリシャさんがヒトリに声をかけているところだった。"

[[dialogue]]
speaker = "トリシャ"
# 「あの……不知火ヒトリさん、ですよね？　これ……お近づきの印にお菓子をどうぞ」
line = "「あの……不知火ヒトリさん、ですよね？　これ……お近づきの印にお菓子をどうぞ」"

[[dialogue]]
speaker = "ヒトリ"
# 「ひゃうっ」
line = "「ひゃうっ」"

[[dialogue]]
speaker = "unk"
# ヒトリは人見知りを発動して、背後の棺桶の中に隠れてしまう。
line = "ヒトリは人見知りを発動して、背後の棺桶の中に隠れてしまう。"

[[dialogue]]
speaker = "トリシャ"
# 「ごっ、ごめんなさい……！　脅かすつもりは、なかったのですが……」
line = "「ごっ、ごめんなさい……！　脅かすつもりは、なかったのですが……」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆ～ん……」
line = "「ゆ～ん……」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ヒトリは相変わらず生きてる<b>ヒト</b>を怖がってて、よくわかんない奴なの。おばけは全然怖がらないのに」
line = "「ヒトリは相変わらず生きてる<b>ヒト</b>を怖がってて、よくわかんない奴なの。おばけは全然怖がらないのに」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「仕方ないから、そのお菓子は<ruby=ゆ>余</ruby>が食べてあげゆ！」
line = "「仕方ないから、そのお菓子は<ruby>余<rt>ゆ</rt></ruby>が食べてあげゆ！」"

[[dialogue]]
speaker = "トリシャ"
# 「え？　はい、どうぞ……この日の為に、お菓子は沢山用意してきてあるので」
line = "「え？　はい、どうぞ……この日の為に、お菓子は沢山用意してきてあるので」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「そうなの？　なんだかハロウィンみたいだゆ♪」
line = "「そうなの？　なんだかハロウィンみたいだゆ♪」"

[[dialogue]]
speaker = "トリシャ"
# 「はい。お友達を増やすのに、いい機会だと思いまして……」
line = "「はい。お友達を増やすのに、いい機会だと思いまして……」"

[[dialogue]]
speaker = "トリシャ"
# 「お菓子をきっかけにして……友達になることができたらと」
line = "「お菓子をきっかけにして……友達になることができたらと」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「お前、なかなかよくわかってるの。お菓子をくれるなら、余が友達になってあげてもいいゆ♪」
line = "「お前、なかなかよくわかってるの。お菓子をくれるなら、余が友達になってあげてもいいゆ♪」"

[[dialogue]]
speaker = "トリシャ"
# 「本当ですか？　なら、ジャクリーヌさん、是非どうぞ……！」
line = "「本当ですか？　なら、ジャクリーヌさん、是非どうぞ……！」"

[[dialogue]]
speaker = "トリシャ"
# 「ふ、ふへへ、やった……♪　また友達が増えました……」
line = "「ふ、ふへへ、やった……♪　また友達が増えました……」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「お菓子、いただきますなの！　あ～ん♪　ぱくっ――もぐもぐ♪　……んぐっ！？」
line = "「お菓子、いただきますなの！　あ～ん♪　ぱくっ――もぐもぐ♪　……んぐっ！？」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆおおおぉーーーっ！？」
line = "「ゆおおおぉーーーっ！？」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「このお菓子、すごく美味しいゆ！！！　これを食べないとか、むしろお菓子に失礼なの！　トリシャ、余にもっと寄越すゆ！」
line = "「このお菓子、すごく美味しいゆ！！！　これを食べないとか、むしろお菓子に失礼なの！　トリシャ、余にもっと寄越すゆ！」"

[[dialogue]]
speaker = "トリシャ"
# 「は、はい。沢山ありますので、どうぞ……」
line = "「は、はい。沢山ありますので、どうぞ……」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ほら、ヒトリもずっと棺桶に引きこもってないで、さっさと出て来るの！」
line = "「ほら、ヒトリもずっと棺桶に引きこもってないで、さっさと出て来るの！」"

[[dialogue]]
speaker = "unk"
# ジャクリーヌは棺桶に体をすり抜けさせて、中からヒトリも同じくすり抜けさせながら、力技で引っ張り出す。
line = "ジャクリーヌは棺桶に体をすり抜けさせて、中からヒトリも同じくすり抜けさせながら、力技で引っ張り出す。"

[[dialogue]]
speaker = "ヒトリ"
# 「じゃ、ジャクリーヌさん、そのすり抜け能力は反則です……！」
line = "「じゃ、ジャクリーヌさん、そのすり抜け能力は反則です……！」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「いいから、このお菓子を早く食べてみるの！　ほら、口開けゆ！」
line = "「いいから、このお菓子を早く食べてみるの！　ほら、口開けゆ！」"

[[dialogue]]
speaker = "ヒトリ"
# 「わ、わかりました。あ～ん……」
line = "「わ、わかりました。あ～ん……」"

[[dialogue]]
speaker = "ヒトリ"
# 「あむっ……もぐもぐ……んっ！？　お、美味しいです、すごく……！」
line = "「あむっ……もぐもぐ……んっ！？　お、美味しいです、すごく……！」"

[[dialogue]]
speaker = "トリシャ"
# 「本当ですか？　良かった……」
line = "「本当ですか？　良かった……」"

[[dialogue]]
speaker = "ヒトリ"
# 「あ、あの……」
line = "「あ、あの……」"

[[dialogue]]
speaker = "ヒトリ"
# 「トリシャさん、さっきは隠れてしまってごめんなさい……。私、ヒトと話す時、すごく緊張してしまって……」
line = "「トリシャさん、さっきは隠れてしまってごめんなさい……。私、ヒトと話す時、すごく緊張してしまって……」"

[[dialogue]]
speaker = "トリシャ"
# 「いえ、気持ちはわかりますので……ですが、よろしければ、ヒトリさんと、それに……<b>ゆーさん</b>とも友達になれたらと」
line = "「いえ、気持ちはわかりますので……ですが、よろしければ、ヒトリさんと、それに……<b>ゆーさん</b>とも友達になれたらと」"

[[dialogue]]
speaker = "ヒトリ"
# 「えっ、ゆーちゃんのことが見えるんですか！？」
line = "「えっ、ゆーちゃんのことが見えるんですか！？」"

[[dialogue]]
speaker = "ゆーちゃん"
# 「ゆー！」
line = "「ゆー！」"

[[dialogue]]
speaker = "unk"
# ヒトリといつも一緒にいる幽霊のゆーちゃんが驚いたように声を上げる。
line = "ヒトリといつも一緒にいる幽霊のゆーちゃんが驚いたように声を上げる。"

[[dialogue]]
speaker = "トリシャ"
# 「はい。私は守護星との繋がりを見ることができるので……へびつかい座β星のケバルライ。ゆーさんもヒトリさんと同じ守護星に繋がっているのですね」
line = "「はい。私は守護星との繋がりを見ることができるので……へびつかい座β星のケバルライ。ゆーさんもヒトリさんと同じ守護星に繋がっているのですね」"

[[dialogue]]
speaker = "ヒトリ"
# 「すごい……！　そのことに気づいたのは、トリシャさんが初めてです」
line = "「すごい……！　そのことに気づいたのは、トリシャさんが初めてです」"

[[dialogue]]
speaker = "unk"
# と、２人の会話が弾みそうになったところで――
line = "と、２人の会話が弾みそうになったところで――"

[[dialogue]]
speaker = "シャドウフィオナ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ウズメイア"
# 「あっ！　シャドウが現れたし！」
line = "「あっ！　シャドウが現れたし！」"

[[dialogue]]
speaker = "ソフィア"
# 「フィオナ会長の魔王フォーム、いざ相手として対峙すると、凄まじい力を感じて、圧倒されますね……」
line = "「フィオナ会長の魔王フォーム、いざ相手として対峙すると、凄まじい力を感じて、圧倒されますね……」"

[[dialogue]]
speaker = "unk"
# みんなの力を貸して欲しい
line = "みんなの力を貸して欲しい"

[[dialogue]]
speaker = "unk"
# だけど、挑戦するなら勝ちたい
line = "だけど、挑戦するなら勝ちたい"

[[dialogue]]
speaker = "ヒトリ"
# 「は、はい。私ももっと強くなりたいとここへ来たので……微力ながらお手伝いしますっ」
line = "「は、はい。私ももっと強くなりたいとここへ来たので……微力ながらお手伝いしますっ」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「仕方ないですね～。その代わり、後でたっぷりお礼を期待してますからね、会長さん？　くふふっ♪」
line = "「仕方ないですね～。その代わり、後でたっぷりお礼を期待してますからね、会長さん？　くふふっ♪」"

[[dialogue]]
speaker = "unk"
# そうして、俺はみんなと一緒に、フィオナのシャドウへ挑戦を開始するのだった――
line = "そうして、俺はみんなと一緒に、フィオナのシャドウへ挑戦を開始するのだった――"
