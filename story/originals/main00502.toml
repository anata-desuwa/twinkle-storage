line = "「なぜならこれは森羅暦２５００年ではなく、朱雀暦２５００年の出来事なのですから」"

[[dialogue]]
speaker = "クロト"
# 「完全に別世界……ってことか」
line = "「完全に別世界……ってことか」"

[[dialogue]]
speaker = "unk"
# そう聞くと、あたかもパラレルワールドのような連想をしてしまいそうになるが違う。
line = "そう聞くと、あたかもパラレルワールドのような連想をしてしまいそうになるが違う。"

[[dialogue]]
speaker = "unk"
# なぜならこの壁画たちは一列に連なっているのだから……。
line = "なぜならこの壁画たちは一列に連なっているのだから……。"

[[dialogue]]
speaker = "ヴィーナス"
# 「んー……でも２５００年ごろが描かれてるってことは、もうすぐ私たちの時代に追いつくわね」
line = "「んー……でも２５００年ごろが描かれてるってことは、もうすぐ私たちの時代に追いつくわね」"

[[dialogue]]
speaker = "unk"
# ならば、その文明はさらなる発展を遂げて今日に至るだろうか？
line = "ならば、その文明はさらなる発展を遂げて今日に至るだろうか？"

[[dialogue]]
speaker = "unk"
# 答えは否だ。
line = "答えは否だ。"

[[dialogue]]
speaker = "フィオナ"
# 「次の壁画は……空白。そしてまた、『石と棍棒』です」
line = "「次の壁画は……空白。そしてまた、『石と棍棒』です」"

[[dialogue]]
speaker = "ヴィーナス"
# 「へ……ど、どゆこと……！？」
line = "「へ……ど、どゆこと……！？」"

[[dialogue]]
speaker = "クロト"
# 「この『石と棍棒』からはまた──次なる暦が始まるってわけだな」
line = "「この『石と棍棒』からはまた──次なる暦が始まるってわけだな」"

[[dialogue]]
speaker = "マグダレナ"
# 「ご明察です。ここから先に描かれているのは、玄武暦での出来事です」
line = "「ご明察です。ここから先に描かれているのは、玄武暦での出来事です」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ま、また新しい暦が……！　ええっと、つまり……整理すると……！」
line = "「ま、また新しい暦が……！　ええっと、つまり……整理すると……！」"

[[dialogue]]
speaker = "unk"
# ヴィーナスは一旦立ち止まり、これまでの情報を頭でまとめ始めた。
line = "ヴィーナスは一旦立ち止まり、これまでの情報を頭でまとめ始めた。"

[[dialogue]]
speaker = "unk"
# 俺も推察こそ立ってはいるものの──慮外の真実に驚愕を禁じ得ない。
line = "俺も推察こそ立ってはいるものの──慮外の真実に驚愕を禁じ得ない。"

[[dialogue]]
speaker = "ヴィーナス"
# 「……さすがにわかったわ。ここに描かれているのは──<b>私たちの世界の過去</b>、ってことね」
line = "「……さすがにわかったわ。ここに描かれているのは──<b>私たちの世界の過去</b>、ってことね」"

[[dialogue]]
speaker = "クロト"
# 「──恐らく、そう言いたいんだろう」
line = "「──恐らく、そう言いたいんだろう」"

[[dialogue]]
speaker = "マグダレナ"
# 「ええ。こうして歴史が並べられていることが、何よりの証左と言えます」
line = "「ええ。こうして歴史が並べられていることが、何よりの証左と言えます」"

[[dialogue]]
speaker = "unk"
# ここに描かれている壁画の様子は──そのどれも森羅暦に至るより前の世界。
line = "ここに描かれている壁画の様子は──そのどれも森羅暦に至るより前の世界。"

[[dialogue]]
speaker = "unk"
# 世界は何度も『石と棍棒』になるまで文明を白紙に帰されて、その度に再び０からのスタートを余儀なくされた。
line = "世界は何度も『石と棍棒』になるまで文明を白紙に帰されて、その度に再び０からのスタートを余儀なくされた。"

[[dialogue]]
speaker = "フィオナ"
# 「世界の初期化。それこそが、リクリエの正体といったところでしょうか」
line = "「世界の初期化。それこそが、リクリエの正体といったところでしょうか」"

[[dialogue]]
speaker = "マグダレナ"
# 「いかにも。リクリエは確かに世界の破滅──しかし終焉には、次なる始動がつきものです」
line = "「いかにも。リクリエは確かに世界の破滅──しかし終焉には、次なる始動がつきものです」"

[[dialogue]]
speaker = "unk"
# 新たな文明を始めるためのリセット──
line = "新たな文明を始めるためのリセット──"

[[dialogue]]
speaker = "unk"
# 俺たちが終わりだと思っていたリクリエは、これまで幾度も繰り返されてきたやり直しだったのだと知る。
line = "俺たちが終わりだと思っていたリクリエは、これまで幾度も繰り返されてきたやり直しだったのだと知る。"

[[dialogue]]
speaker = "フィオナ"
# 「機構は理解しましたが……なぜ、世界はこのようなことを繰り返しているのでしょうか？」
line = "「機構は理解しましたが……なぜ、世界はこのようなことを繰り返しているのでしょうか？」"

[[dialogue]]
speaker = "マグダレナ"
# 「その答えは──この暦の行き着く先を見れば、おわかりいただけるかもしれません」
line = "「その答えは──この暦の行き着く先を見れば、おわかりいただけるかもしれません」"

[[dialogue]]
speaker = "unk"
# 壁画の続きはこれまでと変わりなかった。
line = "壁画の続きはこれまでと変わりなかった。"

[[dialogue]]
speaker = "unk"
# 原初があり、中世があり、近代があり、現代的な発展を迎えては、再び原初に戻る。
line = "原初があり、中世があり、近代があり、現代的な発展を迎えては、再び原初に戻る。"

[[dialogue]]
speaker = "unk"
# しかし……
line = "しかし……"

[[dialogue]]
speaker = "ヴィーナス"
# 「あれ？　さっきの『魔界滅亡』の絵がないわよ？」
line = "「あれ？　さっきの『魔界滅亡』の絵がないわよ？」"

[[dialogue]]
speaker = "マグダレナ"
# 「はい。この世界では、朱雀暦２５００年に訪れた天災を避け、三界ともどもさらなる発展を遂げました」
line = "「はい。この世界では、朱雀暦２５００年に訪れた天災を避け、三界ともどもさらなる発展を遂げました」"

[[dialogue]]
speaker = "マグダレナ"
# 「しかしそのおかげで天界と魔界による大戦争が発生。人間界も必然とそれに巻き込まれ、未知の滅びへと向かいます」
line = "「しかしそのおかげで天界と魔界による大戦争が発生。人間界も必然とそれに巻き込まれ、未知の滅びへと向かいます」"

[[dialogue]]
speaker = "フィオナ"
# 「……！？」
line = "「……！？」"

[[dialogue]]
speaker = "クロト"
# 「信じられないな……そんなのが実際に起こっていたなんて」
line = "「信じられないな……そんなのが実際に起こっていたなんて」"

[[dialogue]]
speaker = "unk"
# 人間界の文明は既に現代と遜色ないレベルに達していた。
line = "人間界の文明は既に現代と遜色ないレベルに達していた。"

[[dialogue]]
speaker = "unk"
# 聖なる術式を操る天界と、科学を極めた人間界と、モンスターを手中に収めた魔界が熾烈な争いを繰り広げている。
line = "聖なる術式を操る天界と、科学を極めた人間界と、モンスターを手中に収めた魔界が熾烈な争いを繰り広げている。"

[[dialogue]]
speaker = "unk"
# けれど……
line = "けれど……"

[[dialogue]]
speaker = "マグダレナ"
# 「この争いも２７００年あたりで途絶え……また『石と棍棒』の時代が始まります」
line = "「この争いも２７００年あたりで途絶え……また『石と棍棒』の時代が始まります」"

[[dialogue]]
speaker = "マグダレナ"
# 「そうして次も、また同じように歴史が続いていきますが……いずれも前の世界よりはスムーズに発展が進みます」
line = "「そうして次も、また同じように歴史が続いていきますが……いずれも前の世界よりはスムーズに発展が進みます」"

[[dialogue]]
speaker = "unk"
# 朱雀暦の終点は２５００年すぎだった。
line = "朱雀暦の終点は２５００年すぎだった。"

[[dialogue]]
speaker = "unk"
# しかし玄武暦の終点は２７００年を越えて。
line = "しかし玄武暦の終点は２７００年を越えて。"

[[dialogue]]
speaker = "unk"
# 恐らく次に始まったこの壁画群は、２９００年ごろまでその寿命を延ばすに違いない。
line = "恐らく次に始まったこの壁画群は、２９００年ごろまでその寿命を延ばすに違いない。"

[[dialogue]]
speaker = "クロト"
# 「<b>文明が長生きしている</b>。それと、天災の描写も明らかに減っている」
line = "「<b>文明が長生きしている</b>。それと、天災の描写も明らかに減っている」"

[[dialogue]]
speaker = "マグダレナ"
# 「よい着眼点です、クロトさま。摂理の再構築──その本質とはすなわち、その刷新にあるのです」
line = "「よい着眼点です、クロトさま。摂理の再構築──その本質とはすなわち、その刷新にあるのです」"

[[dialogue]]
speaker = "フィオナ"
# 「世界そのものを発展させるための、システム──」
line = "「世界そのものを発展させるための、システム──」"

[[dialogue]]
speaker = "unk"
# 魔界が滅んでしまう厄災が訪れるなら、<b>次の世界</b>ではそれを防ぐ。
line = "魔界が滅んでしまう厄災が訪れるなら、<b>次の世界</b>ではそれを防ぐ。"

[[dialogue]]
speaker = "unk"
# 三界を巻き込んだ戦争が起こってしまうのなら、<b>次の世界</b>ではその火種を取り除く。
line = "三界を巻き込んだ戦争が起こってしまうのなら、<b>次の世界</b>ではその火種を取り除く。"

[[dialogue]]
speaker = "unk"
# いわば世界の自浄作用だ。
line = "いわば世界の自浄作用だ。"

[[dialogue]]
speaker = "unk"
# 大戦争が、天変地異が、文明の停滞が見受けられたとき、そのエラーを元に次の世界を構築するアップデート。
line = "大戦争が、天変地異が、文明の停滞が見受けられたとき、そのエラーを元に次の世界を構築するアップデート。"

[[dialogue]]
speaker = "unk"
# 気が遠くなるほど超大なスパンで世界はサイクルを繰り返し、徐々に徐々に発展を続けてきたのだという。
line = "気が遠くなるほど超大なスパンで世界はサイクルを繰り返し、徐々に徐々に発展を続けてきたのだという。"

[[dialogue]]
speaker = "unk"
# そしてその最後にあたるのが、今の俺たちの世界のはずで……。
line = "そしてその最後にあたるのが、今の俺たちの世界のはずで……。"

[[dialogue]]
speaker = "クロト"
# 「世界を刷新すると言えば聞こえはいい──が」
line = "「世界を刷新すると言えば聞こえはいい──が」"

[[dialogue]]
speaker = "クロト"
# 「それは……そのシステムが機能する度に！　そこにあった命が、助けを求める人々が、なすすべもなく蹂躙されていったってことじゃないか！？」
line = "「それは……そのシステムが機能する度に！　そこにあった命が、助けを求める人々が、なすすべもなく蹂躙されていったってことじゃないか！？」"

[[dialogue]]
speaker = "マグダレナ"
# 「ええ、いかにも。しかしリクリエという機構に善しも悪しきもありません」
line = "「ええ、いかにも。しかしリクリエという機構に善しも悪しきもありません」"

[[dialogue]]
speaker = "マグダレナ"
# 「ただ世界そのものがより良く発展するのを求めて、新陳代謝のごとく終焉と再誕を繰り返す。それだけです」
line = "「ただ世界そのものがより良く発展するのを求めて、新陳代謝のごとく終焉と再誕を繰り返す。それだけです」"

[[dialogue]]
speaker = "クロト"
# 「馬鹿な……」
line = "「馬鹿な……」"

[[dialogue]]
speaker = "フィオナ"
# 「ちなみに、このことを知っているのは……」
line = "「ちなみに、このことを知っているのは……」"

[[dialogue]]
speaker = "マグダレナ"
# 「あなた方だけです。これらの真実は、リクリエを乗り越えた私たちのような存在でもない限り、知る由もありません」
line = "「あなた方だけです。これらの真実は、リクリエを乗り越えた私たちのような存在でもない限り、知る由もありません」"

[[dialogue]]
speaker = "ヴィーナス"
# 「どうしようクロト。私たち、世界の真実ってやつに近づいちゃった！？」
line = "「どうしようクロト。私たち、世界の真実ってやつに近づいちゃった！？」"

[[dialogue]]
speaker = "クロト"
# 「できれば信じたくない類の真実だけどな」
line = "「できれば信じたくない類の真実だけどな」"

[[dialogue]]
speaker = "unk"
# 単なる世界の破滅というより、理屈がわかったからこそ脅威が増したように感じられた。
line = "単なる世界の破滅というより、理屈がわかったからこそ脅威が増したように感じられた。"

[[dialogue]]
speaker = "unk"
# そんな、世界そのものを作り変える超大なシステムに対して、俺たちに抗える術はあるのだろうか……？
line = "そんな、世界そのものを作り変える超大なシステムに対して、俺たちに抗える術はあるのだろうか……？"

[[dialogue]]
speaker = "マグダレナ"
# 「もうそろそろ通路も終点を迎えます。行きましょう」
line = "「もうそろそろ通路も終点を迎えます。行きましょう」"

[[dialogue]]
speaker = "ヴィーナス"
# 「──あ、ちょっと。この絵の暦は何なのよ、スザク、ゲンブって来たら次はビャッコ？」
line = "「──あ、ちょっと。この絵の暦は何なのよ、スザク、ゲンブって来たら次はビャッコ？」"

[[dialogue]]
speaker = "マグダレナ"
# 「ふふ──決まっています」
line = "「ふふ──決まっています」"

[[dialogue]]
speaker = "マグダレナ"
# 「『森羅暦』です」
line = "「『森羅暦』です」"

[[dialogue]]
speaker = "unk"
# 原始──古代──中世──近代と──壁画を巡っていく俺たち。
line = "原始──古代──中世──近代と──壁画を巡っていく俺たち。"

[[dialogue]]
speaker = "unk"
# やがてたどり着いた通路の終点には小部屋があった。
line = "やがてたどり着いた通路の終点には小部屋があった。"

[[dialogue]]
speaker = "unk"
# それはすなわち、この描かれた歴史もひとつの終点を迎えたことを意味している。
line = "それはすなわち、この描かれた歴史もひとつの終点を迎えたことを意味している。"

[[dialogue]]
speaker = "unk"
# そして、その終点にあったものとは──
line = "そして、その終点にあったものとは──"

[[dialogue]]
speaker = "ヴィーナス"
# 「あ……」
line = "「あ……」"

[[dialogue]]
speaker = "クロト"
# 「これは……」
line = "「これは……」"

[[dialogue]]
speaker = "フィオナ"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "unk"
# 俺たちの前に現れた最後の壁画。
line = "俺たちの前に現れた最後の壁画。"

[[dialogue]]
speaker = "unk"
# それは、今度こそ見覚えのあるものだった。
line = "それは、今度こそ見覚えのあるものだった。"

[[dialogue]]
speaker = "ヴィーナス"
# 「魔王の絵──大聖堂の、太陽の壁画！！」
line = "「魔王の絵──大聖堂の、太陽の壁画！！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「っと思ったけど──あれ？　ちょっと違う？」
line = "「っと思ったけど──あれ？　ちょっと違う？」"

[[dialogue]]
speaker = "クロト"
# 「……違う、な」
line = "「……違う、な」"

[[dialogue]]
speaker = "unk"
# 似ている。
line = "似ている。"

[[dialogue]]
speaker = "unk"
# けれど、決定的に違う。
line = "けれど、決定的に違う。"

[[dialogue]]
speaker = "unk"
# 呆然とする俺たちの横で、フィオナがつぶやいた。
line = "呆然とする俺たちの横で、フィオナがつぶやいた。"

[[dialogue]]
speaker = "フィオナ"
# 「月の壁画……」
line = "「月の壁画……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「え……？」
line = "「え……？」"

[[dialogue]]
speaker = "フィオナ"
# 「これは──私の家にある『月の壁画』。それと全く同じものです」
line = "「これは──私の家にある『月の壁画』。それと全く同じものです」"

[[dialogue]]
speaker = "クロト"
# 「フィオナの家──って、流星教皇庁か？」
line = "「フィオナの家──って、流星教皇庁か？」"

[[dialogue]]
speaker = "フィオナ"
# 「はい。中でも、居住スペースですが」
line = "「はい。中でも、居住スペースですが」"

[[dialogue]]
speaker = "ヴィーナス"
# 「『太陽の壁画』とは違う──ってことよね……」
line = "「『太陽の壁画』とは違う──ってことよね……」"

[[dialogue]]
speaker = "unk"
# これまでの壁画はずっと、リクリエによる初期化を挟んで幾度となく文明の発展が描かれ続けてきた。
line = "これまでの壁画はずっと、リクリエによる初期化を挟んで幾度となく文明の発展が描かれ続けてきた。"

[[dialogue]]
speaker = "unk"
# しかしそれもここが終点。
line = "しかしそれもここが終点。"

[[dialogue]]
speaker = "unk"
# 今に繋がっている時代の最後がこれだとするなら、答えはひとつしかない。
line = "今に繋がっている時代の最後がこれだとするなら、答えはひとつしかない。"

[[dialogue]]
speaker = "フィオナ"
# 「ええ。これは」
line = "「ええ。これは」"

[[dialogue]]
speaker = "フィオナ"
# 「『魔王がリクリエを食い止めた』絵です」
line = "「『魔王がリクリエを食い止めた』絵です」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "unk"
# 息を呑む。
line = "息を呑む。"

[[dialogue]]
speaker = "unk"
# その説明は、ヴィーナスやマグダレナさんが語ったのと同じ。
line = "その説明は、ヴィーナスやマグダレナさんが語ったのと同じ。"

[[dialogue]]
speaker = "マグダレナ"
# 「──なるほど。星見の家には、こちらが残されておりましたか」
line = "「──なるほど。星見の家には、こちらが残されておりましたか」"

[[dialogue]]
speaker = "unk"
# 魔王が悪者か英雄か。
line = "魔王が悪者か英雄か。"

[[dialogue]]
speaker = "unk"
# そんな言説は今どうでもよくなっていた。
line = "そんな言説は今どうでもよくなっていた。"

[[dialogue]]
speaker = "unk"
# この絵を見て、何よりも無視できなかったのは……
line = "この絵を見て、何よりも無視できなかったのは……"

[[dialogue]]
speaker = "ヴィーナス"
# 「この顔──クロトにそっくりじゃない？」
line = "「この顔──クロトにそっくりじゃない？」"

[[dialogue]]
speaker = "フィオナ"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "クロト"
# 「似てる……な」
line = "「似てる……な」"

[[dialogue]]
speaker = "unk"
# 自分でも自覚せざるを得ないほど、その人物は俺とよく似ていた。
line = "自分でも自覚せざるを得ないほど、その人物は俺とよく似ていた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「すごいわ！　クロトは魔王だって信じてたけど……本当に３０００年前も活躍してたなんて！」
line = "「すごいわ！　クロトは魔王だって信じてたけど……本当に３０００年前も活躍してたなんて！」"

[[dialogue]]
speaker = "クロト"
# 「いやいや……俺本人ってことはありえないだろ」
line = "「いやいや……俺本人ってことはありえないだろ」"

[[dialogue]]
speaker = "マグダレナ"
# 「そうですね。こちらは３０００年前に訪れたリクリエを阻んだ──魔王ラクシスの絵になります」
line = "「そうですね。こちらは３０００年前に訪れたリクリエを阻んだ──魔王ラクシスの絵になります」"

[[dialogue]]
speaker = "unk"
# 魔王。英雄。リクリエを食い止め、ここまで描かれてきた歴史のサイクルを破綻させた存在。
line = "魔王。英雄。リクリエを食い止め、ここまで描かれてきた歴史のサイクルを破綻させた存在。"

[[dialogue]]
speaker = "unk"
# ただ『リクリエを止めた』ということの意味が、これまでと全く違う様相になって立ち上がってくる。
line = "ただ『リクリエを止めた』ということの意味が、これまでと全く違う様相になって立ち上がってくる。"

[[dialogue]]
speaker = "マグダレナ"
# 「歴史上においてリクリエが阻止されたのはこれが初めて。そしてここから、世界はさらに三千年も続いていく」
line = "「歴史上においてリクリエが阻止されたのはこれが初めて。そしてここから、世界はさらに三千年も続いていく」"

[[dialogue]]
speaker = "マグダレナ"
# 「おわかりいただけたでしょうか。森羅暦という今の世界は、過去のそれとは比較にならぬほど長久化している」
line = "「おわかりいただけたでしょうか。森羅暦という今の世界は、過去のそれとは比較にならぬほど長久化している」"

[[dialogue]]
speaker = "クロト"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "マグダレナ"
# 「より正確に言えば──現在の森羅暦の前に、旧森羅暦とも呼べる時代があった。その境目こそが、リクリエの失敗」
line = "「より正確に言えば──現在の森羅暦の前に、旧森羅暦とも呼べる時代があった。その境目こそが、リクリエの失敗」"

[[dialogue]]
speaker = "ヴィーナス"
# 「魔王のおかげで、ってことね……！？」
line = "「魔王のおかげで、ってことね……！？」"

[[dialogue]]
speaker = "フィオナ"
# 「リクリエ側からすれば──魔王のせいで、というところでしょうか」
line = "「リクリエ側からすれば──魔王のせいで、というところでしょうか」"

[[dialogue]]
speaker = "unk"
# 俺たちが太古の昔と思っていた３０００年前──『リクリエ防衛』。
line = "俺たちが太古の昔と思っていた３０００年前──『リクリエ防衛』。"

[[dialogue]]
speaker = "unk"
# それは、それよりも遥かに悠久な歴史の、たった先端でしかなかったと知る。
line = "それは、それよりも遥かに悠久な歴史の、たった先端でしかなかったと知る。"

[[dialogue]]
speaker = "マグダレナ"
# 「ただ、リクリエを撃退したと言っても無傷では済みませんでした。滅亡は免れながらも、文明はここでしばらく後退します」
line = "「ただ、リクリエを撃退したと言っても無傷では済みませんでした。滅亡は免れながらも、文明はここでしばらく後退します」"

[[dialogue]]
speaker = "マグダレナ"
# 「ゆえに魔王ラクシスは策を講じました。森羅という暦をゼロに戻し、リクリエでない新たな世界の存続を望んだのです」
line = "「ゆえに魔王ラクシスは策を講じました。森羅という暦をゼロに戻し、リクリエでない新たな世界の存続を望んだのです」"

[[dialogue]]
speaker = "クロト"
# 「そこから３０００年後が、今の時代ってことか……」
line = "「そこから３０００年後が、今の時代ってことか……」"

[[dialogue]]
speaker = "unk"
# 森羅という暦がリクリエを元年としているのはそのためだという。
line = "森羅という暦がリクリエを元年としているのはそのためだという。"

[[dialogue]]
speaker = "フィオナ"
# 「しかし……疑問です。世界が長生きしているのなら、リクリエにとっても悪くない結果なのではないでしょうか」
line = "「しかし……疑問です。世界が長生きしているのなら、リクリエにとっても悪くない結果なのではないでしょうか」"

[[dialogue]]
speaker = "マグダレナ"
# 「いいえ。森羅暦は異例の長命──にもかかわらず、文明の発展はさほど進んでいません」
line = "「いいえ。森羅暦は異例の長命──にもかかわらず、文明の発展はさほど進んでいません」"

[[dialogue]]
speaker = "マグダレナ"
# 「刷新と効率化を望むリクリエにとって……最も忌むべき結果となっているのです」
line = "「刷新と効率化を望むリクリエにとって……最も忌むべき結果となっているのです」"

[[dialogue]]
speaker = "クロト"
# 「勝手な……！」
line = "「勝手な……！」"

[[dialogue]]
speaker = "unk"
# リクリエに善悪の区別などないとマグダレナさんは言っていた。
line = "リクリエに善悪の区別などないとマグダレナさんは言っていた。"

[[dialogue]]
speaker = "unk"
# 文明を加速させぬ人類が<b>だらだら</b>生きているのが、恐らく非効率的と判断されているのだろう。
line = "文明を加速させぬ人類が<b>だらだら</b>生きているのが、恐らく非効率的と判断されているのだろう。"

[[dialogue]]
speaker = "マグダレナ"
# 「ですから、<b>ガタ</b>が来ているでしょう。星雲巣の出現──モンスターの蔓延──あれらはリクリエの予兆ですが、隙につけ込まれている結果です」
line = "「ですから、<b>ガタ</b>が来ているでしょう。星雲巣の出現──モンスターの蔓延──あれらはリクリエの予兆ですが、隙につけ込まれている結果です」"

[[dialogue]]
speaker = "クロト"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私のお気に入りのドライヤーはもうオンボロだけど、子どもの頃から使ってるから手放せないわ。それと似たようなもんってことね！？」
line = "「私のお気に入りのドライヤーはもうオンボロだけど、子どもの頃から使ってるから手放せないわ。それと似たようなもんってことね！？」"

[[dialogue]]
speaker = "クロト"
# 「そ、そうだな」
line = "「そ、そうだな」"

[[dialogue]]
speaker = "フィオナ"
# 「わかりやすくはありますね」
line = "「わかりやすくはありますね」"

[[dialogue]]
speaker = "unk"
# いわば旧型の世界を使い古しているのが、今と言ったところか。
line = "いわば旧型の世界を使い古しているのが、今と言ったところか。"

[[dialogue]]
speaker = "unk"
# ゆえにリクリエは３０００年越しに、今度こそ──初期化を完遂しようとしてくる。
line = "ゆえにリクリエは３０００年越しに、今度こそ──初期化を完遂しようとしてくる。"

[[dialogue]]
speaker = "マグダレナ"
# 「だからこそ、此度のリクリエは強大なのです。守護天使である私にも──主たる女神にも予測がつかないほどの」
line = "「だからこそ、此度のリクリエは強大なのです。守護天使である私にも──主たる女神にも予測がつかないほどの」"

[[dialogue]]
speaker = "クロト"
# 「やり直しのやり直し……ってところか」
line = "「やり直しのやり直し……ってところか」"

[[dialogue]]
speaker = "クロト"
# 「世界の発展──意図は理解した。でも、現実に生きる俺たちが認められることじゃないな」
line = "「世界の発展──意図は理解した。でも、現実に生きる俺たちが認められることじゃないな」"

[[dialogue]]
speaker = "ヴィーナス"
# 「だったらやることはひとつよ！　クロトが魔王としての力を取り戻して、また撃退してやれば──」
line = "「だったらやることはひとつよ！　クロトが魔王としての力を取り戻して、また撃退してやれば──」"

[[dialogue]]
speaker = "unk"
# そう。
line = "そう。"

[[dialogue]]
speaker = "unk"
# ヴィーナスがこちらを向いた瞬間だった。
line = "ヴィーナスがこちらを向いた瞬間だった。"
