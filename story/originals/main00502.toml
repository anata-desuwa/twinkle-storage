[[dialogue]]
speaker = "unk"
# 第３話,異暦と時代の壁画,B
line = "第３話,異暦と時代の壁画,B"

[[dialogue]]
speaker = "ガーディアン"
# 「ピピ──ガガ──プシュウゥゥ………………」
line = "「ピピ──ガガ──プシュウゥゥ………………」"

[[dialogue]]
speaker = "クロト"
# 「……なんとか３人でも突破できたか」
line = "「……なんとか３人でも突破できたか」"

[[dialogue]]
speaker = "ヴィーナス"
# 「前よりちょっと手強いカンジだったかな♪」
line = "「前よりちょっと手強いカンジだったかな♪」"

[[dialogue]]
speaker = "フィオナ"
# 「ふふ。さすがはご両名です」
line = "「ふふ。さすがはご両名です」"

[[dialogue]]
speaker = "unk"
# ３人は３人でも、両学園の粋を集めたチームだ。
line = "３人は３人でも、両学園の粋を集めたチームだ。"

[[dialogue]]
speaker = "unk"
# フィオナとヴィーナスに比べると、今の俺が若干劣っているのは否めないが……
line = "フィオナとヴィーナスに比べると、今の俺が若干劣っているのは否めないが……"

[[dialogue]]
speaker = "unk"
# それでも星騎士たちの中では精鋭揃いと言っていいだろう。
line = "それでも星騎士たちの中では精鋭揃いと言っていいだろう。"

[[dialogue]]
speaker = "クロト"
# 「実際……これがもし人間界にぞろぞろ出てきたら危ないな。大型モンスタークラスの強さがある」
line = "「実際……これがもし人間界にぞろぞろ出てきたら危ないな。大型モンスタークラスの強さがある」"

[[dialogue]]
speaker = "ヴィーナス"
# 「大丈夫じゃない？　この機械たちはだって、塔を守る存在なんでしょ？」
line = "「大丈夫じゃない？　この機械たちはだって、塔を守る存在なんでしょ？」"

[[dialogue]]
speaker = "フィオナ"
# 「理屈で言えばそうですが……この先何が起こるかは、正直読めませんよね」
line = "「理屈で言えばそうですが……この先何が起こるかは、正直読めませんよね」"

[[dialogue]]
speaker = "unk"
# 俺たちが何者かもわからぬまま襲撃してくる時点でガーディアンたちも壊れている。
line = "俺たちが何者かもわからぬまま襲撃してくる時点でガーディアンたちも壊れている。"

[[dialogue]]
speaker = "unk"
# この一帯に沈んでいる瘴気の汚染──その影響は存在の根底までもを<ruby=こんだく>混濁</ruby>させる。
line = "この一帯に沈んでいる瘴気の汚染──その影響は存在の根底までもを<ruby>混濁<rt>こんだく</rt></ruby>させる。"

[[dialogue]]
speaker = "クロト"
# 「こいつらは第一階層のものより強かった。もし、このまま先に進んでいくなら……」
line = "「こいつらは第一階層のものより強かった。もし、このまま先に進んでいくなら……」"

[[dialogue]]
speaker = "フィオナ"
# 「上部へ進むほど強大な守護者が待っている──というのも、ありそうな話です」
line = "「上部へ進むほど強大な守護者が待っている──というのも、ありそうな話です」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ならクロトが先頭ね！　私たちはその後をついてくわ！」
line = "「ならクロトが先頭ね！　私たちはその後をついてくわ！」"

[[dialogue]]
speaker = "クロト"
# 「わかった。いざという時は盾になるから、援護を頼む」
line = "「わかった。いざという時は盾になるから、援護を頼む」"

[[dialogue]]
speaker = "フィオナ"
# 「ふふ。頼もしいんですね」
line = "「ふふ。頼もしいんですね」"

[[dialogue]]
speaker = "unk"
# これでも男だ。
line = "これでも男だ。"

[[dialogue]]
speaker = "unk"
# 未知のダンジョンを前に不安な気持ちはあるが、矢面に立つなら自分が適任だろう。
line = "未知のダンジョンを前に不安な気持ちはあるが、矢面に立つなら自分が適任だろう。"

[[dialogue]]
speaker = "ヴィーナス"
# 「フィオナは<ruby=しんがり>殿</ruby>よ！　もし私たちが危険な状況になったら、撤退の判断をしてね！」
line = "「フィオナは<ruby>殿<rt>しんがり</rt></ruby>よ！　もし私たちが危険な状況になったら、撤退の判断をしてね！」"

[[dialogue]]
speaker = "フィオナ"
# 「ふふ……フォーメーションですね。かしこまりました」
line = "「ふふ……フォーメーションですね。かしこまりました」"

[[dialogue]]
speaker = "unk"
# フィオナはいつでも冷静な判断を下してくれる。
line = "フィオナはいつでも冷静な判断を下してくれる。"

[[dialogue]]
speaker = "unk"
# 殿を任せるなら、確かにふさわしいと言えた。
line = "殿を任せるなら、確かにふさわしいと言えた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「そして私は遊撃手にして主砲よ！　前からでも後ろからでも、ガンガン壊れたガーディアンどもを打ち抜くわ」
line = "「そして私は遊撃手にして主砲よ！　前からでも後ろからでも、ガンガン壊れたガーディアンどもを打ち抜くわ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「２人とも、私が本気になったからには大船に乗ったつもりでいなさい！　……あ、でもクロトはサボっちゃダメよ。実戦経験は貴重なんだから」
line = "「２人とも、私が本気になったからには大船に乗ったつもりでいなさい！　……あ、でもクロトはサボっちゃダメよ。実戦経験は貴重なんだから」"

[[dialogue]]
speaker = "unk"
# ヴィーナスもいつになく張り切っている。
line = "ヴィーナスもいつになく張り切っている。"

[[dialogue]]
speaker = "unk"
# このメンバーならきっと大丈夫だろう。
line = "このメンバーならきっと大丈夫だろう。"

[[dialogue]]
speaker = "unk"
# フィーニス第二階層の内部を進んでいく俺たち。
line = "フィーニス第二階層の内部を進んでいく俺たち。"

[[dialogue]]
speaker = "unk"
# 道中、ガーディアンとの交戦を何度か繰り広げつつも……
line = "道中、ガーディアンとの交戦を何度か繰り広げつつも……"

[[dialogue]]
speaker = "unk"
# 俺たちの話題は、必然と第二階層の独特な雰囲気へ派生する。
line = "俺たちの話題は、必然と第二階層の独特な雰囲気へ派生する。"

[[dialogue]]
speaker = "ヴィーナス"
# 「にしても……な～んか見覚えある雰囲気よね、ここ」
line = "「にしても……な～んか見覚えある雰囲気よね、ここ」"

[[dialogue]]
speaker = "クロト"
# 「ああ。このあたりとか、壁画……そっくりだな」
line = "「ああ。このあたりとか、壁画……そっくりだな」"

[[dialogue]]
speaker = "フィオナ"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# <b>何</b>に……かは言うまでもなかった。
line = "<b>何</b>に……かは言うまでもなかった。"

[[dialogue]]
speaker = "unk"
# 大聖堂に飾られていた『太陽の壁画』──
line = "大聖堂に飾られていた『太陽の壁画』──"

[[dialogue]]
speaker = "unk"
# 第二階層の壁にある絵や象形は、あれに酷似したタッチで印されていた。
line = "第二階層の壁にある絵や象形は、あれに酷似したタッチで印されていた。"

[[dialogue]]
speaker = "unk"
# どこまでも続く通路の壁には、同じ絵柄がずらりと並んでいる。
line = "どこまでも続く通路の壁には、同じ絵柄がずらりと並んでいる。"

[[dialogue]]
speaker = "unk"
# 天使の絵。魔族の絵。
line = "天使の絵。魔族の絵。"

[[dialogue]]
speaker = "unk"
# 人間の絵もあれば、普通の哺乳類や爬虫類の姿もある。
line = "人間の絵もあれば、普通の哺乳類や爬虫類の姿もある。"

[[dialogue]]
speaker = "unk"
# 環境もまた多種多様で、荒野があれば野原もあって海も川も森林もある。
line = "環境もまた多種多様で、荒野があれば野原もあって海も川も森林もある。"

[[dialogue]]
speaker = "unk"
# 有り体に言って、森羅万象を描いた壁画と称してもよかった。
line = "有り体に言って、森羅万象を描いた壁画と称してもよかった。"

[[dialogue]]
speaker = "unk"
# しかし……
line = "しかし……"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええ、どういうこと！？　こっちに描かれてるの……ビルだわ！」
line = "「ええ、どういうこと！？　こっちに描かれてるの……ビルだわ！」"

[[dialogue]]
speaker = "フィオナ"
# 「こちらには自動車と……それから飛行機が描かれていますね。かなり旧式のようですが」
line = "「こちらには自動車と……それから飛行機が描かれていますね。かなり旧式のようですが」"

[[dialogue]]
speaker = "クロト"
# 「こっちは天界の様子で……こっちは魔界か？　時代が進んでるのは間違いないな」
line = "「こっちは天界の様子で……こっちは魔界か？　時代が進んでるのは間違いないな」"

[[dialogue]]
speaker = "unk"
# 歩くにつれ。進むにつれ。
line = "歩くにつれ。進むにつれ。"

[[dialogue]]
speaker = "unk"
# 壁画のテイストこそ変わらないものの、描かれている内容──その文明が段々と発展しているのがわかる。
line = "壁画のテイストこそ変わらないものの、描かれている内容──その文明が段々と発展しているのがわかる。"

[[dialogue]]
speaker = "ヴィーナス"
# 「どゆこと……？　自然を描くものじゃなかったの？」
line = "「どゆこと……？　自然を描くものじゃなかったの？」"

[[dialogue]]
speaker = "フィオナ"
# 「自然を含めたすべて──というのが正しいのかもしれません」
line = "「自然を含めたすべて──というのが正しいのかもしれません」"

[[dialogue]]
speaker = "フィオナ"
# 「これらが描いているのは……『世界の歴史』、と言ったところでしょうか」
line = "「これらが描いているのは……『世界の歴史』、と言ったところでしょうか」"

[[dialogue]]
speaker = "unk"
# 世界。
line = "世界。"

[[dialogue]]
speaker = "unk"
# それも三界すべての歴史だ。
line = "それも三界すべての歴史だ。"

[[dialogue]]
speaker = "ヴィーナス"
# 「なるほど……なら、このまま進んでけばいずれ私たちの時代に着くってことね♪」
line = "「なるほど……なら、このまま進んでけばいずれ私たちの時代に着くってことね♪」"

[[dialogue]]
speaker = "クロト"
# 「……だと、俺も思ってたんだが」
line = "「……だと、俺も思ってたんだが」"

[[dialogue]]
speaker = "unk"
# 立ち並ぶ高層ビル群が描かれた人間界の図。
line = "立ち並ぶ高層ビル群が描かれた人間界の図。"

[[dialogue]]
speaker = "unk"
# しかし、その次に現れた壁画は一気にその文明レベルを落としていた。
line = "しかし、その次に現れた壁画は一気にその文明レベルを落としていた。"

[[dialogue]]
speaker = "フィオナ"
# 「これは──石と棍棒、ですか」
line = "「これは──石と棍棒、ですか」"

[[dialogue]]
speaker = "クロト"
# 「……焚き火。石貨。それから、狩りの様子か」
line = "「……焚き火。石貨。それから、狩りの様子か」"

[[dialogue]]
speaker = "ヴィーナス"
# 「え──あ、あれ？　なんか巻き戻ってない、これ……？」
line = "「え──あ、あれ？　なんか巻き戻ってない、これ……？」"

[[dialogue]]
speaker = "unk"
# ここに入ってすぐの地点でも見た壁画だった。
line = "ここに入ってすぐの地点でも見た壁画だった。"

[[dialogue]]
speaker = "unk"
# 道を間違えてしまったのかと、ヴィーナスはあたふたして来た道を振り返る。
line = "道を間違えてしまったのかと、ヴィーナスはあたふたして来た道を振り返る。"

[[dialogue]]
speaker = "クロト"
# 「いや……大丈夫だヴィーナス。これが絵の順番なんだろう」
line = "「いや……大丈夫だヴィーナス。これが絵の順番なんだろう」"

[[dialogue]]
speaker = "フィオナ"
# 「村落の誕生──車輪の発明──それから国同士の戦争も経て……」
line = "「村落の誕生──車輪の発明──それから国同士の戦争も経て……」"

[[dialogue]]
speaker = "unk"
# 通路を進みつつ脇の壁画を眺めていく俺たち。
line = "通路を進みつつ脇の壁画を眺めていく俺たち。"

[[dialogue]]
speaker = "フィオナ"
# 「今度は無人飛行機が描かれています。先ほどのビル群より、もういくらか技術が発展したようですね」
line = "「今度は無人飛行機が描かれています。先ほどのビル群より、もういくらか技術が発展したようですね」"

[[dialogue]]
speaker = "クロト"
# 「じゃあ、次は……？」
line = "「じゃあ、次は……？」"

[[dialogue]]
speaker = "unk"
# さらに一歩を踏み進める。
line = "さらに一歩を踏み進める。"

[[dialogue]]
speaker = "unk"
# すると、現れた壁画はやはり『石と棍棒』だった。
line = "すると、現れた壁画はやはり『石と棍棒』だった。"

[[dialogue]]
speaker = "ヴィーナス"
# 「また原始時代！　私たち、グルグル同じとこ回ってたりしないわよね？」
line = "「また原始時代！　私たち、グルグル同じとこ回ってたりしないわよね？」"

[[dialogue]]
speaker = "クロト"
# 「もっと先に行こう。そうすればわかるはず」
line = "「もっと先に行こう。そうすればわかるはず」"

[[dialogue]]
speaker = "unk"
# それからずっと進んでも同じだった。
line = "それからずっと進んでも同じだった。"

[[dialogue]]
speaker = "unk"
# 原初があり、中世があり、近代があり、現代的な発展を迎えては、再び原初に戻る。
line = "原初があり、中世があり、近代があり、現代的な発展を迎えては、再び原初に戻る。"

[[dialogue]]
speaker = "unk"
# 輪廻するように繰り返されるこのサイクルは、決して壁画の枚数不足なんかじゃない。
line = "輪廻するように繰り返されるこのサイクルは、決して壁画の枚数不足なんかじゃない。"

[[dialogue]]
speaker = "ヴィーナス"
# 「っ、どういうことなの──いつまで経っても現代にたどり着かないじゃない」
line = "「っ、どういうことなの──いつまで経っても現代にたどり着かないじゃない」"

[[dialogue]]
speaker = "クロト"
# 「また『石と棍棒』だ。その前の絵は、つい数十年前くらいのテクノロジーに見えるのに……」
line = "「また『石と棍棒』だ。その前の絵は、つい数十年前くらいのテクノロジーに見えるのに……」"

[[dialogue]]
speaker = "unk"
# 近代から原始へ。
line = "近代から原始へ。"

[[dialogue]]
speaker = "unk"
# その、相容れない２つの絵の狭間に立ち尽くしていると──
line = "その、相容れない２つの絵の狭間に立ち尽くしていると──"

[[dialogue]]
speaker = "？？？"
# 「その絵と絵の間が、リクリエ──」
line = "「その絵と絵の間が、リクリエ──」"

[[dialogue]]
speaker = "ヴィーナス"
# 「！　誰……！？」
line = "「！　誰……！？」"

[[dialogue]]
speaker = "フィオナ"
# 「あ、あなたは……！」
line = "「あ、あなたは……！」"

[[dialogue]]
speaker = "クロト"
# 「守護天使……マグダレナ、さん？」
line = "「守護天使……マグダレナ、さん？」"

[[dialogue]]
speaker = "unk"
# 俺は咄嗟に前へ踏み出し、ヴィーナスとフィオナを背中に隠す。
line = "俺は咄嗟に前へ踏み出し、ヴィーナスとフィオナを背中に隠す。"

[[dialogue]]
speaker = "マグダレナ"
# 「よい覇気です。緋宮クロトさま。こうして相まみえるのは初めまして、ですね」
line = "「よい覇気です。緋宮クロトさま。こうして相まみえるのは初めまして、ですね」"

[[dialogue]]
speaker = "クロト"
# 「……前にも、第一階層の終点で出会ったはず。だが」
line = "「……前にも、第一階層の終点で出会ったはず。だが」"

[[dialogue]]
speaker = "マグダレナ"
# 「ええ。あれは一時的な残留思念。今の私も霊体ですが、ようやくリアルタイムでのコンタクトが可能となりました」
line = "「ええ。あれは一時的な残留思念。今の私も霊体ですが、ようやくリアルタイムでのコンタクトが可能となりました」"

[[dialogue]]
speaker = "マグダレナ"
# 「<ruby=せいかん>精悍</ruby>なお顔つきです。それに、御子を守るように立つお心構えも素晴らしいですね」
line = "「<ruby>精悍<rt>せいかん</rt></ruby>なお顔つきです。それに、御子を守るように立つお心構えも素晴らしいですね」"

[[dialogue]]
speaker = "クロト"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# こちらの警戒心も見透かされていた。
line = "こちらの警戒心も見透かされていた。"

[[dialogue]]
speaker = "unk"
# 今の彼女から敵意やリクリエの瘴気は感じられなかったが……流星星徒会は、堕天使となった彼女と交戦したという話も聞く。
line = "今の彼女から敵意やリクリエの瘴気は感じられなかったが……流星星徒会は、堕天使となった彼女と交戦したという話も聞く。"

[[dialogue]]
speaker = "unk"
# ひとまず油断すべきではないだろう。
line = "ひとまず油断すべきではないだろう。"

[[dialogue]]
speaker = "ヴィーナス"
# 「御子って確か私のことよね。あなた、この前は言いたいことだけ言って消えちゃったじゃない！」
line = "「御子って確か私のことよね。あなた、この前は言いたいことだけ言って消えちゃったじゃない！」"

[[dialogue]]
speaker = "マグダレナ"
# 「失礼いたしました。残る力を御子に授けたつもりでしたが、お役に立ちましたか？」
line = "「失礼いたしました。残る力を御子に授けたつもりでしたが、お役に立ちましたか？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「立ったよーな、立ってないよーな……」
line = "「立ったよーな、立ってないよーな……」"

[[dialogue]]
speaker = "フィオナ"
# （第一階層の終点では……ヴィーナスさんの日誌に、記述が追加されていましたね）
line = "（第一階層の終点では……ヴィーナスさんの日誌に、記述が追加されていましたね）"

[[dialogue]]
speaker = "クロト"
# （ああ。でも結局、アポロの出現でかき乱された格好になる）
line = "（ああ。でも結局、アポロの出現でかき乱された格好になる）"

[[dialogue]]
speaker = "unk"
# 「この塔を登れ」と彼女はかつて俺たちに告げた。
line = "「この塔を登れ」と彼女はかつて俺たちに告げた。"

[[dialogue]]
speaker = "unk"
# 俺たちを導こうという意志は感じられるが、どこまで信用してよいものか。
line = "俺たちを導こうという意志は感じられるが、どこまで信用してよいものか。"

[[dialogue]]
speaker = "マグダレナ"
# 「お恥ずかしながら。今の私も仮初の身には違いありません。魔界の深部に囚われた本体が解放されない限りは」
