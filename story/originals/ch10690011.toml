[[dialogue]]
speaker = "unk"
# 第１話,守護天使のお茶会,P
line = "第１話,守護天使のお茶会,P"

[[dialogue]]
speaker = "unk"
# クリスマスパーティーが終わって少し経ったある日、大聖堂カフェテリアへ足を運ぶと、守護天使３人がお茶しているところに遭遇した。
line = "クリスマスパーティーが終わって少し経ったある日、大聖堂カフェテリアへ足を運ぶと、守護天使３人がお茶しているところに遭遇した。"

[[dialogue]]
speaker = "セシア"
# 「あら、会長。こんにちは。もしかして、会長もお茶しにきたのかしら？」
line = "「あら、会長。こんにちは。もしかして、会長もお茶しにきたのかしら？」"

[[dialogue]]
speaker = "セシア"
# 「そう、仕事の休憩にきたのね。それなら、せっかくだし、わたくしたちと一緒にお茶でもどうかしら？　――ねぇ、ママダレナ、いいでしょう？」
line = "「そう、仕事の休憩にきたのね。それなら、せっかくだし、わたくしたちと一緒にお茶でもどうかしら？　――ねぇ、ママダレナ、いいでしょう？」"

[[dialogue]]
speaker = "マグダレナ"
# 「ええ、もちろんいいですよ。会長さま、隣の席が空いていますから、どうぞ」
line = "「ええ、もちろんいいですよ。会長さま、隣の席が空いていますから、どうぞ」"

[[dialogue]]
speaker = "アルモタヘル"
# 「我も構わぬぞ、人の子よ。もぐもぐ……ほら、チキンも沢山あるぞ。話のつまみに食べるがよい」
line = "「我も構わぬぞ、人の子よ。もぐもぐ……ほら、チキンも沢山あるぞ。話のつまみに食べるがよい」"

[[dialogue]]
speaker = "unk"
# 俺はお言葉に甘えて、同席させてもらうことにした。
line = "俺はお言葉に甘えて、同席させてもらうことにした。"

[[dialogue]]
speaker = "unk"
# セシア、学園生活にはなれてきた？
line = "セシア、学園生活にはなれてきた？"

[[dialogue]]
speaker = "セシア"
# 「ええ、附属校のみんなが優しくしてくれて、とても楽しいわ」
line = "「ええ、附属校のみんなが優しくしてくれて、とても楽しいわ」"

[[dialogue]]
speaker = "セシア"
# 「わたくしのママになってくれそうな人たちも見つけたのよ♪　ふふっ、甘え甲斐がありそうだわ。あむっ……もぐもぐ」
line = "「わたくしのママになってくれそうな人たちも見つけたのよ♪　ふふっ、甘え甲斐がありそうだわ。あむっ……もぐもぐ」"

[[dialogue]]
speaker = "マグダレナ"
# 「セシア、口元にケーキのクリームが付いてますよ。拭きますから、じっとしてて下さい」
line = "「セシア、口元にケーキのクリームが付いてますよ。拭きますから、じっとしてて下さい」"

[[dialogue]]
speaker = "セシア"
# 「ん……♪　えへへ、ママダレナ、ありがと～<emoji=heart04>」
line = "「ん……♪　えへへ、ママダレナ、ありがと～<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# マグダレナさんは『ママ』なんだね
line = "マグダレナさんは『ママ』なんだね"

[[dialogue]]
speaker = "セシア"
# 「そうよ。わたくしが初めて、ママというものを知った相手……記憶が失われても、魂がちゃんとママダレナのことを覚えていたわ」
line = "「そうよ。わたくしが初めて、ママというものを知った相手……記憶が失われても、魂がちゃんとママダレナのことを覚えていたわ」"

[[dialogue]]
speaker = "マグダレナ"
# 「私自身は、母性というものに自覚があるわけではないのですが……」
line = "「私自身は、母性というものに自覚があるわけではないのですが……」"

[[dialogue]]
speaker = "アルモタヘル"
# 「母というならば、種族を司る我の方が相応しいと思うのだが、セシアの感覚はいまいちわからぬ」
line = "「母というならば、種族を司る我の方が相応しいと思うのだが、セシアの感覚はいまいちわからぬ」"

[[dialogue]]
speaker = "セシア"
# 「理屈ではないのよ、アルモタヘル。あなたもここに来て、食文化にハマったのならわかるでしょう？　好きとは理屈を超越するの」
line = "「理屈ではないのよ、アルモタヘル。あなたもここに来て、食文化にハマったのならわかるでしょう？　好きとは理屈を超越するの」"

[[dialogue]]
speaker = "アルモタヘル"
# 「確かに、栄養の補給であっても、つい美味な肉を求めてしまう……そうか、セシアよ。我にとっての肉が、お前にとってのママであったのだな」
line = "「確かに、栄養の補給であっても、つい美味な肉を求めてしまう……そうか、セシアよ。我にとっての肉が、お前にとってのママであったのだな」"

[[dialogue]]
speaker = "セシア"
# 「ええ、アルモタヘル。わたくしたち、転生前よりお互いのことをわかりあえそうね♪」
line = "「ええ、アルモタヘル。わたくしたち、転生前よりお互いのことをわかりあえそうね♪」"

[[dialogue]]
speaker = "unk"
# そういえば、セシアはなんで転生したんだ？
line = "そういえば、セシアはなんで転生したんだ？"

[[dialogue]]
speaker = "セシア"
# 「ああ、そういえば、会長にはまだ、転生の経緯を話していなかったわね」
line = "「ああ、そういえば、会長にはまだ、転生の経緯を話していなかったわね」"

[[dialogue]]
speaker = "セシア"
# 「転生前のわたくしは、『蓄積』を司る守護天使『《<ruby=ばんせい>万成</ruby>》のアウクセシア』。生物の成長や進化、時間の進行などの概念を管理していたわ」
line = "「転生前のわたくしは、『蓄積』を司る守護天使『《<ruby>万成<rt>ばんせい</rt></ruby>》のアウクセシア』。生物の成長や進化、時間の進行などの概念を管理していたわ」"

[[dialogue]]
speaker = "マグダレナ"
# 「アウクセシアが存在しなければ、この世界のあらゆる情報を記録し、保持することができません。いわば『世界の記憶装置』と言えるでしょう」
line = "「アウクセシアが存在しなければ、この世界のあらゆる情報を記録し、保持することができません。いわば『世界の記憶装置』と言えるでしょう」"

[[dialogue]]
speaker = "セシア"
# 「そして、わたくしの霊力の源は、これまで三界が積み重ねてきたありとあらゆる蓄積――『世界の歴史』という圧倒的な情報量に直結していた」
line = "「そして、わたくしの霊力の源は、これまで三界が積み重ねてきたありとあらゆる蓄積――『世界の歴史』という圧倒的な情報量に直結していた」"

[[dialogue]]
speaker = "セシア"
# 「《万成》の冠名が示す通り、『万物が積み重ねてきた集大成』というべき力を持っていたの」
line = "「《万成》の冠名が示す通り、『万物が積み重ねてきた集大成』というべき力を持っていたの」"

[[dialogue]]
speaker = "アルモタヘル"
# 「３０００年前のリクリエ阻止以降、更に積み重ねられた三界の歴史によって、アウクセシアは我ら守護天使６柱の中でも最強というべき霊力を有していた」
line = "「３０００年前のリクリエ阻止以降、更に積み重ねられた三界の歴史によって、アウクセシアは我ら守護天使６柱の中でも最強というべき霊力を有していた」"

[[dialogue]]
speaker = "セシア"
# 「だからこそ、わたくしは何者かによって厳重な封印をかけられたみたいなの。ママダレナやアルモタヘルのように、わたくしは堕天すらも許されなかった」
line = "「だからこそ、わたくしは何者かによって厳重な封印をかけられたみたいなの。ママダレナやアルモタヘルのように、わたくしは堕天すらも許されなかった」"

[[dialogue]]
speaker = "マグダレナ"
# 「リクリエを起こそうとする上で、セシアの強大な力は邪魔だったのでしょう。利用せず、完全に封印することを選んだと考えられます」
line = "「リクリエを起こそうとする上で、セシアの強大な力は邪魔だったのでしょう。利用せず、完全に封印することを選んだと考えられます」"

[[dialogue]]
speaker = "セシア"
# 「だけど、転生前のわたくしは、リクリエの危機が迫る中で、自分１人なにもできない状況を良しとしなかった。そこで、生まれ変わる道を選んだ」
line = "「だけど、転生前のわたくしは、リクリエの危機が迫る中で、自分１人なにもできない状況を良しとしなかった。そこで、生まれ変わる道を選んだ」"

[[dialogue]]
speaker = "セシア"
# 「自身を消滅させて、流星市国に転生することで、あなたたち星騎士の力になろうとしたのよ」
line = "「自身を消滅させて、流星市国に転生することで、あなたたち星騎士の力になろうとしたのよ」"

[[dialogue]]
speaker = "セシア"
# 「そうして生まれたのが、わたくし、万成の守護天使２代目『セシア』というわけ」
line = "「そうして生まれたのが、わたくし、万成の守護天使２代目『セシア』というわけ」"

[[dialogue]]
speaker = "unk"
# セシアとアウクセシアは違う存在なのか？
line = "セシアとアウクセシアは違う存在なのか？"

[[dialogue]]
speaker = "セシア"
# 「ええ。どうしてわたくしが転生したのかという情報は思い出すことができたけど、アウクセシアとしての記憶は、完全に失われている」
line = "「ええ。どうしてわたくしが転生したのかという情報は思い出すことができたけど、アウクセシアとしての記憶は、完全に失われている」"

[[dialogue]]
speaker = "セシア"
# 「わたくしはあくまで生まれ変わり。この前誕生したばかりの、新たな守護天使セシアよ」
line = "「わたくしはあくまで生まれ変わり。この前誕生したばかりの、新たな守護天使セシアよ」"

[[dialogue]]
speaker = "アルモタヘル"
# 「と言いつつも、我らからすれば、話せば話す程、アウクセシアと全然変わらぬのだがな。マグダレナをママ扱いしたり……」
line = "「と言いつつも、我らからすれば、話せば話す程、アウクセシアと全然変わらぬのだがな。マグダレナをママ扱いしたり……」"

[[dialogue]]
speaker = "unk"
# あ、転生前から、そこは変わらないんだ
line = "あ、転生前から、そこは変わらないんだ"

[[dialogue]]
speaker = "マグダレナ"
# 「はい。見た目は小さくなりましたが、中身は大体今みたいな感じですね」
line = "「はい。見た目は小さくなりましたが、中身は大体今みたいな感じですね」"

[[dialogue]]
speaker = "マグダレナ"
# 「でも、私はセシアが昔と変わらないままで嬉しかったですよ。ふふっ……♪」
line = "「でも、私はセシアが昔と変わらないままで嬉しかったですよ。ふふっ……♪」"

[[dialogue]]
speaker = "セシア"
# 「ママダレナ……♪　えへへ、セシアもママダレナにまた会えて嬉しいわ♪」
line = "「ママダレナ……♪　えへへ、セシアもママダレナにまた会えて嬉しいわ♪」"

[[dialogue]]
speaker = "セシア"
# 「ん？　なにかしら、会長？　――なんでママ好きになったのか気になるですって？」
line = "「ん？　なにかしら、会長？　――なんでママ好きになったのか気になるですって？」"

[[dialogue]]
speaker = "セシア"
# 「さっきも言ったけど、好きに理由なんてないのよ。心ある者ならば誰しも、本能でママを求めているの」
line = "「さっきも言ったけど、好きに理由なんてないのよ。心ある者ならば誰しも、本能でママを求めているの」"

[[dialogue]]
speaker = "セシア"
# 「そして、わたくしはただ、その本能に人より素直なだけよ」
line = "「そして、わたくしはただ、その本能に人より素直なだけよ」"

[[dialogue]]
speaker = "unk"
# ただの性癖では……？
line = "ただの性癖では……？"

[[dialogue]]
speaker = "セシア"
# 「なによ会長、その顔は。あなただって、性癖の１つや２つ、あるでしょう？」
line = "「なによ会長、その顔は。あなただって、性癖の１つや２つ、あるでしょう？」"

[[dialogue]]
speaker = "セシア"
# 「ママの魅力に共感しないということは、わたくしのような小さい子の方が好きなのかしら？」
line = "「ママの魅力に共感しないということは、わたくしのような小さい子の方が好きなのかしら？」"

[[dialogue]]
speaker = "セシア"
# 「わたくしのことを話したんだもの。今度はあなたのことを教えなさい」
line = "「わたくしのことを話したんだもの。今度はあなたのことを教えなさい」"

[[dialogue]]
speaker = "アルモタヘル"
# 「ほう、人の子の性癖か。それは我も気になるな」
line = "「ほう、人の子の性癖か。それは我も気になるな」"

[[dialogue]]
speaker = "マグダレナ"
# 「こらこら、２人ともいけませんよ。そのように迫っては……」
line = "「こらこら、２人ともいけませんよ。そのように迫っては……」"

[[dialogue]]
speaker = "マグダレナ"
# 「大丈夫ですよ、会長さま。私はあなたがどんな性癖でも受け入れましょう。落ち着いて話して下さい」
line = "「大丈夫ですよ、会長さま。私はあなたがどんな性癖でも受け入れましょう。落ち着いて話して下さい」"

[[dialogue]]
speaker = "unk"
# いや、話しませんよ！？
line = "いや、話しませんよ！？"

[[dialogue]]
speaker = "unk"
# その後も守護天使３人から、性癖について追究される羽目になったのだった――
line = "その後も守護天使３人から、性癖について追究される羽目になったのだった――"
