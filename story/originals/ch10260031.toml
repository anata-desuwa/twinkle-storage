[[dialogue]]
speaker = "unk"
# 第１話,クラスメイツトリコロール,P
line = "第１話,クラスメイツトリコロール,P"

[[dialogue]]
speaker = "unk"
# バトルフェスタ・ペンタグラムを終えた数日後。
line = "バトルフェスタ・ペンタグラムを終えた数日後。"

[[dialogue]]
speaker = "unk"
# 仮想結界システムを用いて、リーリア達が戦闘訓練を行っていた――
line = "仮想結界システムを用いて、リーリア達が戦闘訓練を行っていた――"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「よ～し、そろそろ融合魔弾を決めちゃうんで、２人ともサポートお願いね！」
line = "「よ～し、そろそろ融合魔弾を決めちゃうんで、２人ともサポートお願いね！」"

[[dialogue]]
speaker = "アナ（覚醒）"
# 「ノープロブレム。シャドウからの攻撃は私が防御します」
line = "「ノープロブレム。シャドウからの攻撃は私が防御します」"

[[dialogue]]
speaker = "ルルカ"
# 「あたしは歌でリーリアちゃんを強化するね！　――ストリーミングキャロル！」
line = "「あたしは歌でリーリアちゃんを強化するね！　――ストリーミングキャロル！」"

[[dialogue]]
speaker = "unk"
# 俺が見学に向かうと、リーリアと一緒に訓練していたのは、彼女のクラスメイトのアナとルルカだった。
line = "俺が見学に向かうと、リーリアと一緒に訓練していたのは、彼女のクラスメイトのアナとルルカだった。"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「あっ、センパ～イ！　可愛い後輩彼女の活躍、観に来てくれたんですね～☆」
line = "「あっ、センパ～イ！　可愛い後輩彼女の活躍、観に来てくれたんですね～☆」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「なら一層、張り切ってぶっ放しちゃいますよ～！　想いに名づける色は決まった！」
line = "「なら一層、張り切ってぶっ放しちゃいますよ～！　想いに名づける色は決まった！」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「融合魔弾！　クラスメイツトリコロール！！」
line = "「融合魔弾！　クラスメイツトリコロール！！」"

[[dialogue]]
speaker = "アナ（覚醒）"
# 「シャドウ３体の消滅を確認。これにてミッションクリアです」
line = "「シャドウ３体の消滅を確認。これにてミッションクリアです」"

[[dialogue]]
speaker = "ルルカ"
# 「ひゃ～、相変わらず凄い威力！　それぞれノヴァフォームのシャドウだったのに……！」
line = "「ひゃ～、相変わらず凄い威力！　それぞれノヴァフォームのシャドウだったのに……！」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「そりゃあもう、私のこの『アルカンシェルフォーム』は、センパイとの絆の力ですから☆」
line = "「そりゃあもう、私のこの『アルカンシェルフォーム』は、センパイとの絆の力ですから☆」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「恋人のラブラブ絆パワーの前には、リクリエだろうとなんだろうと敵じゃないですよねっ、センパイ♪　――えいっ<emoji=heart04>」
line = "「恋人のラブラブ絆パワーの前には、リクリエだろうとなんだろうと敵じゃないですよねっ、センパイ♪　――えいっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そう言って、リーリアが俺の腕に抱き着いて来る。
line = "そう言って、リーリアが俺の腕に抱き着いて来る。"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「ぎゅ～っ<emoji=heart04>　ふふっ、どうです？　可愛い後輩にくっ付かれて、マジカルドキドキしちゃってますか～？」
line = "「ぎゅ～っ<emoji=heart04>　ふふっ、どうです？　可愛い後輩にくっ付かれて、マジカルドキドキしちゃってますか～？」"

[[dialogue]]
speaker = "unk"
# え、いや特には……
line = "え、いや特には……"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「真顔！？　ちょっとは嬉しそうな反応して下さいよ～！　センパ～イ！」
line = "「真顔！？　ちょっとは嬉しそうな反応して下さいよ～！　センパ～イ！」"

[[dialogue]]
speaker = "unk"
# あはは、ゴメンゴメン
line = "あはは、ゴメンゴメン"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「もう！　センパイったら、すぐそうやって彼女をイジメるんですから～♪　あんまりやると拗ねちゃいますよ～？　つんつん<emoji=heart04>」
line = "「もう！　センパイったら、すぐそうやって彼女をイジメるんですから～♪　あんまりやると拗ねちゃいますよ～？　つんつん<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 言いつつもリーリアは楽しそうに、俺の頬っぺたをつっ突いて来る。
line = "言いつつもリーリアは楽しそうに、俺の頬っぺたをつっ突いて来る。"

[[dialogue]]
speaker = "ルルカ"
# 「あたしたちがいるのに、カップルが何かおっぱじめてるんだけど……」
line = "「あたしたちがいるのに、カップルが何かおっぱじめてるんだけど……」"

[[dialogue]]
speaker = "アナ（覚醒）"
# 「バカップル、滅ぶべし」
line = "「バカップル、滅ぶべし」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「ふっふっふ☆　２人もいつか恋人ができれば、私の気持ちがわかるよ♪」
line = "「ふっふっふ☆　２人もいつか恋人ができれば、私の気持ちがわかるよ♪」"

[[dialogue]]
speaker = "ルルカ"
# 「恋人マウント！？　むぅ～……あっ、そう言えば！」
line = "「恋人マウント！？　むぅ～……あっ、そう言えば！」"

[[dialogue]]
speaker = "ルルカ"
# 「ねぇ、お兄ちゃん。リーリアちゃんのおっぱいって、<b>パッド</b>なんでしょ～？」
line = "「ねぇ、お兄ちゃん。リーリアちゃんのおっぱいって、<b>パッド</b>なんでしょ～？」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「ちょっ！？　いきなり何言ってんの！？」
line = "「ちょっ！？　いきなり何言ってんの！？」"

[[dialogue]]
speaker = "ルルカ"
# 「恋人に『自分を偽らなくていいんだよ』って言ってあげなくていいの～？」
line = "「恋人に『自分を偽らなくていいんだよ』って言ってあげなくていいの～？」"

[[dialogue]]
speaker = "unk"
# いや、いつも言ってはいるんだけど……
line = "いや、いつも言ってはいるんだけど……"

[[dialogue]]
speaker = "ルルカ"
# 「なになに？　――可愛い後輩が『クラスで突然おっぱいがしぼんだ女』になっていいのかって怒る？」
line = "「なになに？　――可愛い後輩が『クラスで突然おっぱいがしぼんだ女』になっていいのかって怒る？」"

[[dialogue]]
speaker = "アナ（覚醒）"
# 「そもそも、前から聞きたかったのですが、リーリアさんはどうしておっぱいを盛ろうと思ったんですか？」
line = "「そもそも、前から聞きたかったのですが、リーリアさんはどうしておっぱいを盛ろうと思ったんですか？」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「それは、えっと……ネビュラのスパイとして、センパイにハニートラップを仕掛けるつもりだったので、おっぱいは大きい方が有利かなって……」
line = "「それは、えっと……ネビュラのスパイとして、センパイにハニートラップを仕掛けるつもりだったので、おっぱいは大きい方が有利かなって……」"

[[dialogue]]
speaker = "アナ（覚醒）"
# 「ほう、あくまで業務の一環であり、そこに見栄はなかったと？」
line = "「ほう、あくまで業務の一環であり、そこに見栄はなかったと？」"

[[dialogue]]
speaker = "アナ（覚醒）"
# 「ですが――おかしいですね。リーリアさんは春の入学当初から居ましたが、会長はその後、途中から学園にやって来た転入生です。その<ruby=理由>パッド</ruby>は矛盾していませんか？」
line = "「ですが――おかしいですね。リーリアさんは春の入学当初から居ましたが、会長はその後、途中から学園にやって来た転入生です。その<ruby>パッド<rt>理由</rt></ruby>は矛盾していませんか？」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「うぐっ！？　すみません！　本当はただ見栄を張りたかっただけです！」
line = "「うぐっ！？　すみません！　本当はただ見栄を張りたかっただけです！」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「でも待って！　アナちゃんとルルカちゃんなら、わかるでしょ！？」
line = "「でも待って！　アナちゃんとルルカちゃんなら、わかるでしょ！？」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「星騎士の女の子ってどうして――みんなおっぱいが大きいの！？」
line = "「星騎士の女の子ってどうして――みんなおっぱいが大きいの！？」"

[[dialogue]]
speaker = "ルルカ"
# 「同意を求められても困るんだけど……？」
line = "「同意を求められても困るんだけど……？」"

[[dialogue]]
speaker = "アナ（覚醒）"
# 「言いたいことはわかります。女性の平均と星騎士の平均バストには大きな隔たりがあると、私も感じていました」
line = "「言いたいことはわかります。女性の平均と星騎士の平均バストには大きな隔たりがあると、私も感じていました」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「でしょ！？　でもね――そんな女性の為に、人間界のパッドはマジカル進化しているんだよ！」
line = "「でしょ！？　でもね――そんな女性の為に、人間界のパッドはマジカル進化しているんだよ！」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「着け心地とか外れにくさも段違いだし、不自然にならないように『ちょっとだけ盛る』みたいにできたり、素晴らしいアイテムが色々あるんだから！」
line = "「着け心地とか外れにくさも段違いだし、不自然にならないように『ちょっとだけ盛る』みたいにできたり、素晴らしいアイテムが色々あるんだから！」"

[[dialogue]]
speaker = "アナ（覚醒）"
# 「ふむ……」
line = "「ふむ……」"

[[dialogue]]
speaker = "アナ（覚醒）"
# 「その話、詳しく聞かせてもらっても？」
line = "「その話、詳しく聞かせてもらっても？」"

[[dialogue]]
speaker = "ルルカ"
# 「アナちゃん！？　そこでパッドを付けたら負けだよ！？」
line = "「アナちゃん！？　そこでパッドを付けたら負けだよ！？」"

[[dialogue]]
speaker = "ルルカ"
# 「小さいことはステータスなんだから！　そこにはちゃんと誇りを持つべきじゃないかな！？」
line = "「小さいことはステータスなんだから！　そこにはちゃんと誇りを持つべきじゃないかな！？」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「ふ～ん、そっか～。ルルカちゃんは全然興味ないんだ？　なら、続きはアナちゃんにだけ教えてあげるね☆」
line = "「ふ～ん、そっか～。ルルカちゃんは全然興味ないんだ？　なら、続きはアナちゃんにだけ教えてあげるね☆」"

[[dialogue]]
speaker = "ルルカ"
# 「なっ！？　なぁぁぁ～～～っ！？」
line = "「なっ！？　なぁぁぁ～～～っ！？」"

[[dialogue]]
speaker = "ルルカ"
# 「お兄ちゃ～～～ん！！　彼女さんが友達をイジメるんだけど、どう思う！？」
line = "「お兄ちゃ～～～ん！！　彼女さんが友達をイジメるんだけど、どう思う！？」"

[[dialogue]]
speaker = "unk"
# すごく、帰りたいです……
line = "すごく、帰りたいです……"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「待ってセンパイ！　パッドにも見た目重視と感触重視があって、彼氏の意見も聞きたいの！」
line = "「待ってセンパイ！　パッドにも見た目重視と感触重視があって、彼氏の意見も聞きたいの！」"

[[dialogue]]
speaker = "ルルカ"
# 「感触重視って…パッドなのに触らせるの！？　エッチなのはダメだよ、リーリアちゃん！？」
line = "「感触重視って…パッドなのに触らせるの！？　エッチなのはダメだよ、リーリアちゃん！？」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「ふっふっふっ。彼氏彼女というのは、エッチなものなんだよ、ルルカちゃん？」
line = "「ふっふっふっ。彼氏彼女というのは、エッチなものなんだよ、ルルカちゃん？」"

[[dialogue]]
speaker = "ルルカ"
# 「くぅ～～～！　リーリアちゃんに恋人マウント取られるの、なんかすごく悔しいぃ～～～！」
line = "「くぅ～～～！　リーリアちゃんに恋人マウント取られるの、なんかすごく悔しいぃ～～～！」"

[[dialogue]]
speaker = "アナ（覚醒）"
# 「低身長の爆乳天使アナ……アニマ先輩のようなトランジスタグラマー路線も、アリですね」
line = "「低身長の爆乳天使アナ……アニマ先輩のようなトランジスタグラマー路線も、アリですね」"

[[dialogue]]
speaker = "ルルカ"
# 「アナちゃん！？　パッド堕ちしないで、戻って来て！」
line = "「アナちゃん！？　パッド堕ちしないで、戻って来て！」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「私たちの味方であるパッドの悪口は止めてもらえます！？」
line = "「私たちの味方であるパッドの悪口は止めてもらえます！？」"

[[dialogue]]
speaker = "unk"
# そんなこんなで、今日も仲良くじゃれ合うクラスメイト３人なのであった――
line = "そんなこんなで、今日も仲良くじゃれ合うクラスメイト３人なのであった――"
