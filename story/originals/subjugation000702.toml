[[dialogue]]
speaker = "ミア"
# 「思わず飛び出して来ちゃったけど……さっきのあの態度、逆に子どもっぽかったかも」
line = "「思わず飛び出して来ちゃったけど……さっきのあの態度、逆に子どもっぽかったかも」"

[[dialogue]]
speaker = "ミア"
# 「単独行動が危険なのはエリス先輩の言う通りだし。なのに、つい意地になっちゃって……」
line = "「単独行動が危険なのはエリス先輩の言う通りだし。なのに、つい意地になっちゃって……」"

[[dialogue]]
speaker = "ミア"
# 「う、ううんっ。どちらにしても野放しにはできないわっ。今もまた星騎士が襲われている可能性だってあるんだからっ」
line = "「う、ううんっ。どちらにしても野放しにはできないわっ。今もまた星騎士が襲われている可能性だってあるんだからっ」"

[[dialogue]]
speaker = "ミア"
# 「……だけど相手はあのエリス先輩を一方的に打ちのめしたのよね。あの風紀委員のエースを……」
line = "「……だけど相手はあのエリス先輩を一方的に打ちのめしたのよね。あの風紀委員のエースを……」"

[[dialogue]]
speaker = "ミア"
# 「っっ。弱気になっちゃダメよ、ミアっ。怖くない、私にならできるっ！」
line = "「っっ。弱気になっちゃダメよ、ミアっ。怖くない、私にならできるっ！」"

[[dialogue]]
speaker = "ミア"
# 「そうよ。こういう時のために今まで努力してきたんだもの……！　今こそ私はママとパパみたいな立派な星騎士になるの……！」
line = "「そうよ。こういう時のために今まで努力してきたんだもの……！　今こそ私はママとパパみたいな立派な星騎士になるの……！」"

[[dialogue]]
speaker = "ミア"
# 「それにここですごくすごーく活躍できれば、もう誰も私をちびっ子扱いできないわ……！　ちんちくりんだからって、見くびられることもなくなるはず……！」
line = "「それにここですごくすごーく活躍できれば、もう誰も私をちびっ子扱いできないわ……！　ちんちくりんだからって、見くびられることもなくなるはず……！」"

[[dialogue]]
speaker = "ミア"
# 「よしっ……やってやろうじゃない！　この事件はぜーったいに私が一人で解決してみせるっ……！」
line = "「よしっ……やってやろうじゃない！　この事件はぜーったいに私が一人で解決してみせるっ……！」"

[[dialogue]]
speaker = "ミア"
# 「<ruby=けんにんかけつ>堅忍果決</ruby>、<ruby=ごうきかだん>剛毅果断</ruby>、強い意志を以て臨めば為せないことなんて──」
line = "「<ruby>堅忍果決<rt>けんにんかけつ</rt></ruby>、<ruby>剛毅果断<rt>ごうきかだん</rt></ruby>、強い意志を以て臨めば為せないことなんて──」"

[[dialogue]]
speaker = "unk"
# ミアっ！
line = "ミアっ！"

[[dialogue]]
speaker = "ミア"
# 「きゃあああああああっっ～～！！？　くくく、来るなら来なさいっっ……！！　私が相手をしてやるわっっ……！！」
line = "「きゃあああああああっっ～～！！？　くくく、来るなら来なさいっっ……！！　私が相手をしてやるわっっ……！！」"

[[dialogue]]
speaker = "ミア"
# 「って……か、会長さん？　追いかけてきたの？」
line = "「って……か、会長さん？　追いかけてきたの？」"

[[dialogue]]
speaker = "ミア"
# 「何よ、その心配そうな顔。私を子ども扱いして……私だって一人前の星騎士なのに失礼だわ」
line = "「何よ、その心配そうな顔。私を子ども扱いして……私だって一人前の星騎士なのに失礼だわ」"

[[dialogue]]
speaker = "ミア"
# 「わざわざ追いかけてきてもらって悪いけど、私は１人で大丈夫。会長さんのお守りなんて必要ないから」
line = "「わざわざ追いかけてきてもらって悪いけど、私は１人で大丈夫。会長さんのお守りなんて必要ないから」"

[[dialogue]]
speaker = "unk"
# でもすごく怯えてたし
line = "でもすごく怯えてたし"

[[dialogue]]
speaker = "ミア"
# 「お、怯えてないわっ。さっきのはそのっ、武者震いよっ」
line = "「お、怯えてないわっ。さっきのはそのっ、武者震いよっ」"

[[dialogue]]
speaker = "ミア"
# 「確かにその……私はエリス先輩みたいにすごい星力は持ってないけど。対人戦闘の経験もほんのちょっぴり少ないかもしれないけど……」
line = "「確かにその……私はエリス先輩みたいにすごい星力は持ってないけど。対人戦闘の経験もほんのちょっぴり少ないかもしれないけど……」"

[[dialogue]]
speaker = "ミア"
# 「でも訓練なら毎日してるしっ、モンスター退治だってしてるっ、星騎士同士のケンカの仲裁だって日常茶飯事だわっ。悪人なんかに負けやしないもんっ」
line = "「でも訓練なら毎日してるしっ、モンスター退治だってしてるっ、星騎士同士のケンカの仲裁だって日常茶飯事だわっ。悪人なんかに負けやしないもんっ」"

[[dialogue]]
speaker = "unk"
# ミアの力は疑ってないよ
line = "ミアの力は疑ってないよ"

[[dialogue]]
speaker = "ミア"
# 「そーなの……？　えへへ、なーんだ。話がわかるじゃない♪」
line = "「そーなの……？　えへへ、なーんだ。話がわかるじゃない♪」"

[[dialogue]]
speaker = "ミア"
# 「なら犯人捜しは私に任せて、会長さんは出歩いてる星騎士に注意して回って？　１人でいるところを襲われたら大変だもんっ」
line = "「なら犯人捜しは私に任せて、会長さんは出歩いてる星騎士に注意して回って？　１人でいるところを襲われたら大変だもんっ」"

[[dialogue]]
speaker = "ミア"
# 「それじゃよろしくね、会長さん！」
line = "「それじゃよろしくね、会長さん！」"

[[dialogue]]
speaker = "ミア"
# 「って、どうしてついてくるのよ！？」
line = "「って、どうしてついてくるのよ！？」"

[[dialogue]]
speaker = "ミア"
# 「やっぱり私のこと子ども扱いしてるじゃなーいっ。私一人じゃ太刀打ちできないと思ってるからついてくるんでしょっ？」
line = "「やっぱり私のこと子ども扱いしてるじゃなーいっ。私一人じゃ太刀打ちできないと思ってるからついてくるんでしょっ？」"

[[dialogue]]
speaker = "ミア"
# 「さっきは私の実力を認めてくれてるようなこと言ってたのにっ。この嘘つきっ。嘘つきっ」
line = "「さっきは私の実力を認めてくれてるようなこと言ってたのにっ。この嘘つきっ。嘘つきっ」"

[[dialogue]]
speaker = "ミア"
# 「単独行動がちょっぴり危険なのはわかるけど……。だけど手分けして探した方が効率もいいし、被害も減らせるかもじゃない」
line = "「単独行動がちょっぴり危険なのはわかるけど……。だけど手分けして探した方が効率もいいし、被害も減らせるかもじゃない」"

[[dialogue]]
speaker = "ミア"
# 「少しは私の力を信用して──」
line = "「少しは私の力を信用して──」"

[[dialogue]]
speaker = "ミア"
# 「！　モンスター……！？」
line = "「！　モンスター……！？」"

[[dialogue]]
speaker = "ミア"
# 「話は後よっ、すぐにやっつけに行かなきゃっ！　誰かが襲われていたら大変だわっ！」
line = "「話は後よっ、すぐにやっつけに行かなきゃっ！　誰かが襲われていたら大変だわっ！」"

[[dialogue]]
speaker = "ミア"
# 「たぁあっっ！！　てやああああっっ！！」
line = "「たぁあっっ！！　てやああああっっ！！」"

[[dialogue]]
speaker = "ミア"
# 「これで──フィニッシュよ！！」
line = "「これで──フィニッシュよ！！」"

[[dialogue]]
speaker = "ミア"
# 「ふぅ、良かった。被害が出る前に倒せたみたいね」
line = "「ふぅ、良かった。被害が出る前に倒せたみたいね」"

[[dialogue]]
speaker = "ミア"
# 「でもでも、ふふん。これで私の実力はわかったでしょ？　会長さんの助けなんか必要ないんだから♪」
line = "「でもでも、ふふん。これで私の実力はわかったでしょ？　会長さんの助けなんか必要ないんだから♪」"

[[dialogue]]
speaker = "ミア"
# 「わかったら今度こそ手分けして捜査しましょ？　何かあったらすぐに知らせるから。ねね、それならいいでしょ？」
line = "「わかったら今度こそ手分けして捜査しましょ？　何かあったらすぐに知らせるから。ねね、それならいいでしょ？」"

[[dialogue]]
speaker = "unk"
# でも……
line = "でも……"

[[dialogue]]
speaker = "ミア"
# 「む……。これだけ言ってもダメだなんて……」
line = "「む……。これだけ言ってもダメだなんて……」"

[[dialogue]]
speaker = "ミア"
# 「そんなにも……そんなにも私が弱そうに見える？」
line = "「そんなにも……そんなにも私が弱そうに見える？」"

[[dialogue]]
speaker = "ミア"
# 「他の人より体が小さいから……？　ちんちくりんだから……？」
line = "「他の人より体が小さいから……？　ちんちくりんだから……？」"

[[dialogue]]
speaker = "ミア"
# 「だから会長さんも……私の言うこと聞いてくれないの？」
line = "「だから会長さんも……私の言うこと聞いてくれないの？」"

[[dialogue]]
speaker = "ミア"
# 「私なんかじゃ、ぐすっ、ママやパパみたいな立派な星騎士になれないって言うの……！？」
line = "「私なんかじゃ、ぐすっ、ママやパパみたいな立派な星騎士になれないって言うの……！？」"

[[dialogue]]
speaker = "unk"
# あっ、待ってっ！
line = "あっ、待ってっ！"
