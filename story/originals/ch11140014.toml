[[dialogue]]
speaker = "unk"
# 第４話,１人の天使として,P
line = "第４話,１人の天使として,P"

[[dialogue]]
speaker = "ベアトリス"
# 「とうとう明日、デネブに帰るんだね～……」
line = "「とうとう明日、デネブに帰るんだね～……」"

[[dialogue]]
speaker = "グレイス"
# 「うぅ……まだまだ遊び足りないですが……！」
line = "「うぅ……まだまだ遊び足りないですが……！」"

[[dialogue]]
speaker = "レティシア"
# 「いい加減、デネブにいる私たちと居場所を交換しないとね」
line = "「いい加減、デネブにいる私たちと居場所を交換しないとね」"

[[dialogue]]
speaker = "チナ"
# 「ああ。そうだよな……ま、これからいくらでも、アルタイルに来れる機会はあるよな！」
line = "「ああ。そうだよな……ま、これからいくらでも、アルタイルに来れる機会はあるよな！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「チナの言う通り──とは言うけれど、せっかくの機会よ。皆、アルタイルで過ごす最後の１日、心残りのないようにね？」
line = "「チナの言う通り──とは言うけれど、せっかくの機会よ。皆、アルタイルで過ごす最後の１日、心残りのないようにね？」"

[[dialogue]]
speaker = "unk"
# 明日の朝早くに、ルヴィネたちはデネブへ帰ってしまう。
line = "明日の朝早くに、ルヴィネたちはデネブへ帰ってしまう。"

[[dialogue]]
speaker = "unk"
# もちろん今生の別れなんかじゃない──けれど。
line = "もちろん今生の別れなんかじゃない──けれど。"

[[dialogue]]
speaker = "ルヴィネ"
# 「……魔王、どうかしたの？」
line = "「……魔王、どうかしたの？」"

[[dialogue]]
speaker = "unk"
# 今夜、少し時間を貰えるか？
line = "今夜、少し時間を貰えるか？"

[[dialogue]]
speaker = "ルヴィネ"
# 「ええ、問題ないわ。皆と違って予定もないし──空けておくわね」
line = "「ええ、問題ないわ。皆と違って予定もないし──空けておくわね」"

[[dialogue]]
speaker = "unk"
# その日の夜──俺は禁域となっているフィーニスの塔のふもとで、ルヴィネと落ち合った。
line = "その日の夜──俺は禁域となっているフィーニスの塔のふもとで、ルヴィネと落ち合った。"

[[dialogue]]
speaker = "ルヴィネ"
# 「魔王、待たせたわね。こんなところで何の用事かしら」
line = "「魔王、待たせたわね。こんなところで何の用事かしら」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……というより、その大荷物はどうしたの？　望遠鏡に、レジャーシート。水筒にお弁当まで……？」
line = "「……というより、その大荷物はどうしたの？　望遠鏡に、レジャーシート。水筒にお弁当まで……？」"

[[dialogue]]
speaker = "unk"
# 天体観測でもどうかなと思って
line = "天体観測でもどうかなと思って"

[[dialogue]]
speaker = "unk"
# アルタイル最後の夜に……
line = "アルタイル最後の夜に……"

[[dialogue]]
speaker = "ルヴィネ"
# 「あら……ふふ、楽しい催しね。誘ってくれてありがとう」
line = "「あら……ふふ、楽しい催しね。誘ってくれてありがとう」"

[[dialogue]]
speaker = "ルヴィネ"
# 「でも──他は誰もいないのね？」
