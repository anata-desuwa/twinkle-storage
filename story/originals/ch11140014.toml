[[dialogue]]
speaker = "unk"
# 軽食のサンドイッチをつまみながら、望遠鏡を交代で覗き込み、ルヴィネと楽しい時間を過ごした──
line = "軽食のサンドイッチをつまみながら、望遠鏡を交代で覗き込み、ルヴィネと楽しい時間を過ごした──"

[[dialogue]]
speaker = "ルヴィネ"
# 「魔王、随分と物知りね。というより、星の解説に慣れてるのかしら？」
line = "「魔王、随分と物知りね。というより、星の解説に慣れてるのかしら？」"

[[dialogue]]
speaker = "unk"
# 昔、プラネタリウムでバイトしてたから
