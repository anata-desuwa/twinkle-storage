line = "「そう？　物好きなのね、貴方。わかったわ。星徒会長同士、積もる話もあるでしょうし──」"

[[dialogue]]
speaker = "ルヴィネ"
# 「星空を眺めながらお喋りするだなんて、とても星騎士らしいわね。付き合うわ」
line = "「星空を眺めながらお喋りするだなんて、とても星騎士らしいわね。付き合うわ」"

[[dialogue]]
speaker = "unk"
# 新星学園の備品である天体望遠鏡はとても高性能だ。
line = "新星学園の備品である天体望遠鏡はとても高性能だ。"

[[dialogue]]
speaker = "unk"
# 今日はよく晴れていて、夜空を彩る星々がはっきりと見える。
