[[dialogue]]
speaker = "イレーナ"
# 「何かあったわけじゃないけど……最近思うのよ。教皇庁や流星市国とは、あとどれだけの付き合いになるのかなって」
line = "「何かあったわけじゃないけど……最近思うのよ。教皇庁や流星市国とは、あとどれだけの付き合いになるのかなって」"

