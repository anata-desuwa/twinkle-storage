line = "「それは考えてるところなんだけど──」"

[[dialogue]]
speaker = "フィオナ"
# 「イレーナさん、イタリアに帰られるんですかっ！？」
line = "「イレーナさん、イタリアに帰られるんですかっ！？」"

[[dialogue]]
speaker = "イレーナ"
# 「フィ、フィオナ会長！？　聞かれていたんですか！？」
line = "「フィ、フィオナ会長！？　聞かれていたんですか！？」"

[[dialogue]]
speaker = "フィオナ"
# 「すみません。この子を探しに来たら、話が聞こえてきたもので……」
line = "「すみません。この子を探しに来たら、話が聞こえてきたもので……」"

[[dialogue]]
speaker = "子猫"
# 「み～」
line = "「み～」"

[[dialogue]]
speaker = "unk"
# フィオナの腕の中で、さっき逃げていった子猫が機嫌良さそうに鳴いた。
