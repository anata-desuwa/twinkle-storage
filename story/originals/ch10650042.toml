# 「私は流星教皇の娘。いずれ流星教皇となる可能性が高いです」
line = "「私は流星教皇の娘。いずれ流星教皇となる可能性が高いです」"

[[dialogue]]
speaker = "フィオナ"
# 「その時、イレーナさんのような神官が教皇庁にいれば心強いと思っていたのですが……」
