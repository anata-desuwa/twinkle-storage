speaker = "イレーナ"
# 「いえ、帰るとしても今の話ではありません。そもそもまだ決めたわけではありませんし」
line = "「いえ、帰るとしても今の話ではありません。そもそもまだ決めたわけではありませんし」"

[[dialogue]]
speaker = "イレーナ"
# 「ですが将来について考えているのは事実です」
line = "「ですが将来について考えているのは事実です」"

[[dialogue]]
speaker = "イレーナ"
# 「フィオナ会長もご存じの通り、私が聖女と呼ばれているのは、星術の癒しの力によるもの。星力を失えばただの人です」
line = "「フィオナ会長もご存じの通り、私が聖女と呼ばれているのは、星術の癒しの力によるもの。星力を失えばただの人です」"

[[dialogue]]
speaker = "イレーナ"
# 「聖女でなくなれば、故郷に帰るのも自然なことかと」
line = "「聖女でなくなれば、故郷に帰るのも自然なことかと」"

[[dialogue]]
speaker = "フィオナ"
# 「それはもったいないです！」
line = "「それはもったいないです！」"

[[dialogue]]
speaker = "イレーナ"
# 「えっ？」
line = "「えっ？」"

[[dialogue]]
speaker = "フィオナ"
# 「イレーナさんは、星騎士として活躍し、聖女として慕われているのみならず、神官としての優秀さは教皇庁でも評判になっています」
line = "「イレーナさんは、星騎士として活躍し、聖女として慕われているのみならず、神官としての優秀さは教皇庁でも評判になっています」"

[[dialogue]]
speaker = "フィオナ"
# 「イレーナさんの説教はわかりやすくて心に響くと人気ですし、書類仕事も早くて正確だと聞いています」
line = "「イレーナさんの説教はわかりやすくて心に響くと人気ですし、書類仕事も早くて正確だと聞いています」"

[[dialogue]]
