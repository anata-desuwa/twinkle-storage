[[dialogue]]
speaker = "フィオナ"
# 「はい。将来の幹部になるやもと、そう考えていました」
line = "「はい。将来の幹部になるやもと、そう考えていました」"

[[dialogue]]
speaker = "フィオナ"
# 「よければ流星市国に残っていただいて、ともに信仰に寄り添っていければと思っています」
