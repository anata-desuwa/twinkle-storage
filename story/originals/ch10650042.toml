line = "「そりゃあ私も鬼じゃないから、人並に動物をかわいいと思うこともあるわよ。だけど触ろうとすると、今みたいにいつも拒否られるのよね」"

[[dialogue]]
speaker = "イレーナ"
# 「……外面を取り繕わずに自分をさらけ出せば、相手も心を開いてくれる？　そ、そうね。やってみるわ」
line = "「……外面を取り繕わずに自分をさらけ出せば、相手も心を開いてくれる？　そ、そうね。やってみるわ」"

[[dialogue]]
speaker = "イレーナ"
