[[dialogue]]
speaker = "unk"
# 第２話,ドリームマジック,P
line = "第２話,ドリームマジック,P"

[[dialogue]]
speaker = "unk"
# ネビュラの基地についたアイリーンは、ノルトハウゼンをネビュラの長官であるセドナに引き合わせた。
line = "ネビュラの基地についたアイリーンは、ノルトハウゼンをネビュラの長官であるセドナに引き合わせた。"

[[dialogue]]
speaker = "unk"
# イリスクラウドや魔法使いについてのより詳しい情報を、セドナはノルトハウゼンから巧みに引き出していく。
line = "イリスクラウドや魔法使いについてのより詳しい情報を、セドナはノルトハウゼンから巧みに引き出していく。"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「──イリスクラウドは、大陸全体を謎の霧が覆っているのです」
line = "「──イリスクラウドは、大陸全体を謎の霧が覆っているのです」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「霧の中には凶悪な魔物が棲みついていて、人を襲ったり惑わしたりしますわ」
line = "「霧の中には凶悪な魔物が棲みついていて、人を襲ったり惑わしたりしますわ」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「そんな霧の中を走行できる魔導列車『ミストトレイン』に乗って戦うのが『トレインナイト』なのです」
line = "「そんな霧の中を走行できる魔導列車『ミストトレイン』に乗って戦うのが『トレインナイト』なのです」"

[[dialogue]]
speaker = "セドナ"
# 「霧の中から現れる魔物、か……広大な魔界の何処かであれば、そのような現象が起きていても不思議ではないが……」
line = "「霧の中から現れる魔物、か……広大な魔界の何処かであれば、そのような現象が起きていても不思議ではないが……」"

[[dialogue]]
speaker = "セドナ"
# 「しかし貴方の話すイリスクラウドという大陸、アイゼングラートという国家、ハルツという都市にはことごとく聞き覚えがない」
line = "「しかし貴方の話すイリスクラウドという大陸、アイゼングラートという国家、ハルツという都市にはことごとく聞き覚えがない」"

[[dialogue]]
speaker = "ウェンディ"
# 「人間界、天界、魔界の地名を調べてみましたが、それと思わしき場所の情報を見つけることは出来ませんでした」
line = "「人間界、天界、魔界の地名を調べてみましたが、それと思わしき場所の情報を見つけることは出来ませんでした」"

[[dialogue]]
speaker = "ウェンディ"
# 「もし彼女の言うような大陸を覆いつくす線路や魔導列車、魔物と戦う特別な部隊が存在するのなら、我々ネビュラの情報網にかかっていないことが不自然です」
line = "「もし彼女の言うような大陸を覆いつくす線路や魔導列車、魔物と戦う特別な部隊が存在するのなら、我々ネビュラの情報網にかかっていないことが不自然です」"

[[dialogue]]
speaker = "セドナ"
# 「……突然現れた黒い穴に呑み込まれ、気が付いたら見知らぬこの地に居た、ということだったな？」
line = "「……突然現れた黒い穴に呑み込まれ、気が付いたら見知らぬこの地に居た、ということだったな？」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「はい、その通りですわ」
line = "「はい、その通りですわ」"

[[dialogue]]
speaker = "セドナ"
# 「これは推察の域を出ず、可能性のひとつとして捉えて欲しいのだが……ここは貴方のいた世界とは違う世界なのかもしれない」
line = "「これは推察の域を出ず、可能性のひとつとして捉えて欲しいのだが……ここは貴方のいた世界とは違う世界なのかもしれない」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「違う世界……そのようなことがあるのでしょうか？」
line = "「違う世界……そのようなことがあるのでしょうか？」"

[[dialogue]]
speaker = "セドナ"
# 「そうそう頻繁に起きては困る話だが……何度かそういった事例は確認されている」
line = "「そうそう頻繁に起きては困る話だが……何度かそういった事例は確認されている」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「それは困りましたわ……わたくし、どうすればよいのでしょう」
line = "「それは困りましたわ……わたくし、どうすればよいのでしょう」"

[[dialogue]]
speaker = "セドナ"
# 「さすがに情報が足りないな。ひとまずここに留まり、元の世界へ戻る方法を探すといい」
line = "「さすがに情報が足りないな。ひとまずここに留まり、元の世界へ戻る方法を探すといい」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「何と感謝申し上げてよいやら……ありがとうございます、セドナさん」
line = "「何と感謝申し上げてよいやら……ありがとうございます、セドナさん」"

[[dialogue]]
speaker = "セドナ"
# 「アイリーン、当面はお前が彼女の面倒を見てやれ」
line = "「アイリーン、当面はお前が彼女の面倒を見てやれ」"

[[dialogue]]
speaker = "アイリーン"
# 「了解しました、長官！　ノルトハウゼンさん、よろしくねっ♪」
line = "「了解しました、長官！　ノルトハウゼンさん、よろしくねっ♪」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「はい、よろしくお願いいたします」
line = "「はい、よろしくお願いいたします」"

[[dialogue]]
speaker = "セドナ"
# 「ところで……貴方は魔法使いという話だったが、どのような魔法を使えるのだろうか？」
line = "「ところで……貴方は魔法使いという話だったが、どのような魔法を使えるのだろうか？」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「お恥ずかしながらわたくし、魔法アカデミーの卒業生の中でもとびきりの劣等生なのですわ」
line = "「お恥ずかしながらわたくし、魔法アカデミーの卒業生の中でもとびきりの劣等生なのですわ」"

[[dialogue]]
speaker = "ウェンディ"
# 「そ、そうなのですか？」
line = "「そ、そうなのですか？」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「ですがご所望とあれば、お応えしないわけには参りません。ハルツの魔法使いの誇りにかけて、全力で楽しませてみせますわ」
line = "「ですがご所望とあれば、お応えしないわけには参りません。ハルツの魔法使いの誇りにかけて、全力で楽しませてみせますわ」"

[[dialogue]]
speaker = "セドナ"
# 「そうか……貴方の魔法には興味がある。簡単なもので良いから見せてもらいたい」
line = "「そうか……貴方の魔法には興味がある。簡単なもので良いから見せてもらいたい」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「わかりましたわ。では、わたくしが最も得意とする魔法をご覧くださいませ」
line = "「わかりましたわ。では、わたくしが最も得意とする魔法をご覧くださいませ」"

[[dialogue]]
speaker = "unk"
# ノルトハウゼンは呼吸を整えると、宙に手を差し伸べる。
line = "ノルトハウゼンは呼吸を整えると、宙に手を差し伸べる。"

[[dialogue]]
speaker = "unk"
# その手のひらから、色とりどりの火の玉が浮かび上がり宙に舞った。
line = "その手のひらから、色とりどりの火の玉が浮かび上がり宙に舞った。"

[[dialogue]]
speaker = "unk"
# そして、パチンと指を鳴らすと同時に、それらの火球がいっせいに弾ける。
line = "そして、パチンと指を鳴らすと同時に、それらの火球がいっせいに弾ける。"

[[dialogue]]
speaker = "アイリーン"
# 「花火！　そういえば花火を生み出せるって言ってたね」
line = "「花火！　そういえば花火を生み出せるって言ってたね」"

[[dialogue]]
speaker = "セドナ"
# 「鮮やかな火球を生み出し、それに弾けるような音を組み合わせて、あたかも花火が上がっているように見せている……そういうことだな？」
line = "「鮮やかな火球を生み出し、それに弾けるような音を組み合わせて、あたかも花火が上がっているように見せている……そういうことだな？」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「わたくしの腕では実際の花火を打ち上げる魔法は使えませんわ」
line = "「わたくしの腕では実際の花火を打ち上げる魔法は使えませんわ」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「ですから、簡単な魔法を組み合わせて花火を生み出しました……これもまたドリームマジックですわ」
line = "「ですから、簡単な魔法を組み合わせて花火を生み出しました……これもまたドリームマジックですわ」"

[[dialogue]]
speaker = "セドナ"
# 「なるほど、人々に希望を与え幸せにする魔法、か……ハルツの魔法がどういうものか、およそのところは理解できたように思う」
line = "「なるほど、人々に希望を与え幸せにする魔法、か……ハルツの魔法がどういうものか、およそのところは理解できたように思う」"

[[dialogue]]
speaker = "セドナ"
# 「しかし魔法については、我々のものとは根本的に違うもののようだな」
line = "「しかし魔法については、我々のものとは根本的に違うもののようだな」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「あら、ではみなさんも魔法使いなのですか？」
line = "「あら、ではみなさんも魔法使いなのですか？」"

[[dialogue]]
speaker = "セドナ"
# 「正確には魔法使いではなく、魔女だ」
line = "「正確には魔法使いではなく、魔女だ」"

[[dialogue]]
speaker = "セドナ"
# 「それに我々の魔法は戦いに特化したもので、おそらく貴方の期待しているようなものではない」
line = "「それに我々の魔法は戦いに特化したもので、おそらく貴方の期待しているようなものではない」"

[[dialogue]]
speaker = "アイリーン"
# 「ノルトハウゼンさんみたいに花火を作ったり、虹を作ったり、星を降らせたりはできないよ～」
line = "「ノルトハウゼンさんみたいに花火を作ったり、虹を作ったり、星を降らせたりはできないよ～」"

[[dialogue]]
speaker = "ウェンディ"
# 「虹を作ったり、星を降らせたり……？　そんなことまで出来るのですか？」
line = "「虹を作ったり、星を降らせたり……？　そんなことまで出来るのですか？」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「わたくしは力が足りず、せいぜい小さな星を手の中に生み出す程度ですが、わたくしの姉はそれは見事な『星降らし』を行うことが出来ますわ」
line = "「わたくしは力が足りず、せいぜい小さな星を手の中に生み出す程度ですが、わたくしの姉はそれは見事な『星降らし』を行うことが出来ますわ」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「いつかわたくしも姉のように『しあわせの流星群』を成功させることが夢ですの」
line = "「いつかわたくしも姉のように『しあわせの流星群』を成功させることが夢ですの」"

[[dialogue]]
speaker = "アイリーン"
# 「それなら虹は！？　虹はどうなのっ？」
line = "「それなら虹は！？　虹はどうなのっ？」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「虹は……一度も成功させたことがありません」
line = "「虹は……一度も成功させたことがありません」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「ですがご所望でしたら……お応えしないわけにはいきませんわ」
line = "「ですがご所望でしたら……お応えしないわけにはいきませんわ」"

[[dialogue]]
speaker = "セドナ"
# 「では、お願いしよう」
line = "「では、お願いしよう」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「わかりました……ではご覧ください、ノルトハウゼンがお送りするドリームマジック──」
line = "「わかりました……ではご覧ください、ノルトハウゼンがお送りするドリームマジック──」"

[[dialogue]]
speaker = "unk"
# ノルトハウゼンは大きく息を吸い込むと、再び杖を宙にかざす。
line = "ノルトハウゼンは大きく息を吸い込むと、再び杖を宙にかざす。"

[[dialogue]]
speaker = "unk"
# そして──
line = "そして──"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「ウォーターイリュージョン！」
line = "「ウォーターイリュージョン！」"

[[dialogue]]
speaker = "セドナ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "アイリーン"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ウェンディ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "セドナ"
# 「何も起きないようだな……」
line = "「何も起きないようだな……」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「失敗してしまったようです。ですが、一度の失敗で諦めたりはしません。もう一度──」
line = "「失敗してしまったようです。ですが、一度の失敗で諦めたりはしません。もう一度──」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「ウォーターイリュージョン！　えいっ！　えいっ！」
line = "「ウォーターイリュージョン！　えいっ！　えいっ！」"

[[dialogue]]
speaker = "ウェンディ"
# 「あの……難しいようでしたら、無理にとは──」
line = "「あの……難しいようでしたら、無理にとは──」"

[[dialogue]]
speaker = "unk"
# 何度も杖を振って虹を出そうとするノルトハウゼンを見かねて、ウェンディが止めに入った。
line = "何度も杖を振って虹を出そうとするノルトハウゼンを見かねて、ウェンディが止めに入った。"

[[dialogue]]
speaker = "unk"
# だが──
line = "だが──"

[[dialogue]]
speaker = "セドナ"
# 「ほう……」
line = "「ほう……」"

[[dialogue]]
speaker = "ウェンディ"
# 「な、何ですか……この空気……！？」
line = "「な、何ですか……この空気……！？」"

[[dialogue]]
speaker = "アイリーン"
# 「これは大成功の予感だよっ！」
line = "「これは大成功の予感だよっ！」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「はい、わたくしも何だか成功しそうな気がしますわ！　いきますよ、ウォーターイリュージョン！！！　えーいっ！！！」
line = "「はい、わたくしも何だか成功しそうな気がしますわ！　いきますよ、ウォーターイリュージョン！！！　えーいっ！！！」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「ひぁああああっ！！！！」
line = "「ひぁああああっ！！！！」"

[[dialogue]]
speaker = "unk"
# ノルトハウゼンの頭上に大量の水が生まれ、それが降ってくる。
line = "ノルトハウゼンの頭上に大量の水が生まれ、それが降ってくる。"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「……ずぶぬれになってしまいました」
line = "「……ずぶぬれになってしまいました」"

[[dialogue]]
speaker = "アイリーン"
# 「わわわ、ノルトハウゼンさん！　もういいから！　ナイスファイトだよっ！」
line = "「わわわ、ノルトハウゼンさん！　もういいから！　ナイスファイトだよっ！」"

[[dialogue]]
speaker = "セドナ"
# 「着替えを用意してやってくれ」
line = "「着替えを用意してやってくれ」"

[[dialogue]]
speaker = "ウェンディ"
# 「分かりました」
line = "「分かりました」"
