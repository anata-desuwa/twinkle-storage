[[dialogue]]
speaker = "unk"
# 第３話,戦う理由,B
line = "第３話,戦う理由,B"

[[dialogue]]
speaker = "unk"
# アルバイトを続けるルヴィネを空から監視しながら、またナターシャが問う。
line = "アルバイトを続けるルヴィネを空から監視しながら、またナターシャが問う。"

[[dialogue]]
speaker = "ナターシャ"
# 「で、梨緒は何のために戦ってるの？　世界を守るとか言ってなかったっけ？」
line = "「で、梨緒は何のために戦ってるの？　世界を守るとか言ってなかったっけ？」"

[[dialogue]]
speaker = "梨緒"
# 「……そうだ。私は人々を守るために星騎士になった」
line = "「……そうだ。私は人々を守るために星騎士になった」"

[[dialogue]]
speaker = "梨緒"
# 「ベガを救うために、フィオナやエリシア、ジグとともにディザスターハンドと戦った。だけど世界は守れなかった」
line = "「ベガを救うために、フィオナやエリシア、ジグとともにディザスターハンドと戦った。だけど世界は守れなかった」"

[[dialogue]]
speaker = "梨緒"
# 「アルタイルに来て、今度こそ世界を救おうと思った」
line = "「アルタイルに来て、今度こそ世界を救おうと思った」"

[[dialogue]]
speaker = "梨緒"
# 「ベガが滅んだと知ってからも、世界を救う意志は変わらない」
line = "「ベガが滅んだと知ってからも、世界を救う意志は変わらない」"

[[dialogue]]
speaker = "梨緒"
# 「……そのはずだった」
line = "「……そのはずだった」"

[[dialogue]]
speaker = "ナターシャ"
# 「はず？」
line = "「はず？」"

[[dialogue]]
speaker = "梨緒"
# 「わからなくなってきたんだ。私が何のために戦ってきたのか」
line = "「わからなくなってきたんだ。私が何のために戦ってきたのか」"

[[dialogue]]
speaker = "梨緒"
# 「世界を救うために戦っていたはずなのに……それが本当だったかどうか、自信がないんだ」
line = "「世界を救うために戦っていたはずなのに……それが本当だったかどうか、自信がないんだ」"

[[dialogue]]
speaker = "ナターシャ"
# 「ふーん、そういうこと」
line = "「ふーん、そういうこと」"

[[dialogue]]
speaker = "ナターシャ"
# 「そういえばさ、私も不思議に思ったことがあったんだよね。アルタイルの梨緒が死んでて、ベガの梨緒だってわかった時あったよね」
line = "「そういえばさ、私も不思議に思ったことがあったんだよね。アルタイルの梨緒が死んでて、ベガの梨緒だってわかった時あったよね」"

[[dialogue]]
speaker = "梨緒"
# 「……？　ああ、確か信任選挙の前だったか」
line = "「……？　ああ、確か信任選挙の前だったか」"

[[dialogue]]
speaker = "ナターシャ"
# 「あの時、やけに立ち直りが早いと思ったんだよね」
line = "「あの時、やけに立ち直りが早いと思ったんだよね」"

[[dialogue]]
speaker = "ナターシャ"
# 「家族も友達も故郷も失って、世界を救おうとしたことも無駄になったんだから、当分戦えないくらいになってもおかしくないと思うんだ」
line = "「家族も友達も故郷も失って、世界を救おうとしたことも無駄になったんだから、当分戦えないくらいになってもおかしくないと思うんだ」"

[[dialogue]]
speaker = "梨緒"
# 「……何が言いたい？」
line = "「……何が言いたい？」"

[[dialogue]]
speaker = "ナターシャ"
# 「梨緒の言う通り、単純に世界を救いたいだけじゃないかもってこと」
line = "「梨緒の言う通り、単純に世界を救いたいだけじゃないかもってこと」"

[[dialogue]]
speaker = "ナターシャ"
# 「あ、ジグ」
line = "「あ、ジグ」"

[[dialogue]]
speaker = "梨緒"
# 「！！　どこだ！？　ジグは私が──」
line = "「！！　どこだ！？　ジグは私が──」"

[[dialogue]]
speaker = "unk"
# 険しい顔で街を見回す梨緒。
line = "険しい顔で街を見回す梨緒。"

[[dialogue]]
speaker = "unk"
# だがあの忌々しい仮面はどこにもいない。
line = "だがあの忌々しい仮面はどこにもいない。"

[[dialogue]]
speaker = "ナターシャ"
# 「ごめん、嘘ついた」
line = "「ごめん、嘘ついた」"

[[dialogue]]
speaker = "梨緒"
# 「ナターシャ！！」
line = "「ナターシャ！！」"

[[dialogue]]
speaker = "ナターシャ"
# 「ごめんってば。でも梨緒ってジグのことになると目の色変わるよね。まるでジグに勝つために生きてるみたい」
line = "「ごめんってば。でも梨緒ってジグのことになると目の色変わるよね。まるでジグに勝つために生きてるみたい」"

[[dialogue]]
speaker = "ナターシャ"
# 「確かジグに負けたのが９９９回だっけ？」
line = "「確かジグに負けたのが９９９回だっけ？」"

[[dialogue]]
speaker = "梨緒"
# 「９９８回だ」
line = "「９９８回だ」"

[[dialogue]]
speaker = "ナターシャ"
# 「即答できるんだ。ちょっと引くなー」
line = "「即答できるんだ。ちょっと引くなー」"

[[dialogue]]
speaker = "ナターシャ"
# 「前から思ってたんだけどさ、ぶっちゃけ、それだけ負けても挑み続ける方が異常だよ」
line = "「前から思ってたんだけどさ、ぶっちゃけ、それだけ負けても挑み続ける方が異常だよ」"

[[dialogue]]
speaker = "梨緒"
# 「異常……？　勝つまで挑むのは普通じゃないのか？」
line = "「異常……？　勝つまで挑むのは普通じゃないのか？」"

[[dialogue]]
speaker = "ナターシャ"
# 「いや、普通じゃないよ。考えたことない？　諦めずにジグに挑み続けた時間と労力を、他のことに向けてたら何かできていたんじゃないかって」
line = "「いや、普通じゃないよ。考えたことない？　諦めずにジグに挑み続けた時間と労力を、他のことに向けてたら何かできていたんじゃないかって」"

[[dialogue]]
speaker = "梨緒"
# 「……ジグに勝つのは諦めろと？」
line = "「……ジグに勝つのは諦めろと？」"

[[dialogue]]
speaker = "ナターシャ"
# 「違う違う。ジグはリクリエの使徒になっちゃったからどうにかしないといけないし、私もあいつのこと好きじゃないから梨緒に勝ってほしいと思ってるよ」
line = "「違う違う。ジグはリクリエの使徒になっちゃったからどうにかしないといけないし、私もあいつのこと好きじゃないから梨緒に勝ってほしいと思ってるよ」"

[[dialogue]]
speaker = "ナターシャ"
# 「でもそこまで別に勝ちにこだわらなくてもいいんじゃないって思うよ」
line = "「でもそこまで別に勝ちにこだわらなくてもいいんじゃないって思うよ」"

[[dialogue]]
speaker = "ナターシャ"
# 「そんなにジグに勝ちたいのは、ただの負けず嫌いなだけじゃないのかなって」
line = "「そんなにジグに勝ちたいのは、ただの負けず嫌いなだけじゃないのかなって」"

[[dialogue]]
speaker = "梨緒"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ナターシャ"
# 「あ、ルヴィネに動きがあった。追いかけるよ」
line = "「あ、ルヴィネに動きがあった。追いかけるよ」"

[[dialogue]]
speaker = "unk"
# ナターシャと梨緒に代わり、俺とアポロが尾行を引き継いだ。
line = "ナターシャと梨緒に代わり、俺とアポロが尾行を引き継いだ。"

[[dialogue]]
speaker = "unk"
# 次第に夜が更けていき、時刻はもう夜の零時。
line = "次第に夜が更けていき、時刻はもう夜の零時。"

[[dialogue]]
speaker = "unk"
# ルヴィネは寮で寝ているはずだが──
line = "ルヴィネは寮で寝ているはずだが──"

[[dialogue]]
speaker = "アポロ（大人）"
# 「ルヴィネが寮から出てきた？　こんな時間にどこ行くんだ？」
line = "「ルヴィネが寮から出てきた？　こんな時間にどこ行くんだ？」"

[[dialogue]]
speaker = "unk"
# わざわざ深夜に１人で向かうとなると、何か秘密があるのかもしれない。
line = "わざわざ深夜に１人で向かうとなると、何か秘密があるのかもしれない。"

[[dialogue]]
speaker = "unk"
# そんな期待を感じながらルヴィネを追いかける。
line = "そんな期待を感じながらルヴィネを追いかける。"

[[dialogue]]
speaker = "unk"
# ルヴィネを追跡していくと、ある店の前で立ち止まる。
line = "ルヴィネを追跡していくと、ある店の前で立ち止まる。"

[[dialogue]]
speaker = "unk"
# そしてルヴィネは迷うことなく店に入っていた。
line = "そしてルヴィネは迷うことなく店に入っていた。"

[[dialogue]]
speaker = "unk"
# その店は──
line = "その店は──"

[[dialogue]]
speaker = "アポロ（大人）"
# 「担々麺専門店『２９』」
line = "「担々麺専門店『２９』」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「やっぱり担々麺かよ……深夜に寮を抜けて食いに行くとか、とんだ不良じゃないか」
line = "「やっぱり担々麺かよ……深夜に寮を抜けて食いに行くとか、とんだ不良じゃないか」"

[[dialogue]]
speaker = "クロト"
# 「あはは……」
line = "「あはは……」"

[[dialogue]]
speaker = "unk"
# 結局、ルヴィネの担々麺好きが筋金入りであることだけはわかったのだった……
line = "結局、ルヴィネの担々麺好きが筋金入りであることだけはわかったのだった……"
