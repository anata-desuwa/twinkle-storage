[[dialogue]]
speaker = "unk"
# 第２話,続・魔王ハーレム建造計画,P
line = "第２話,続・魔王ハーレム建造計画,P"

[[dialogue]]
speaker = "unk"
# ある日、俺はヴィーナスから九浄家に招かれて、遊びに来ていたのだが――
line = "ある日、俺はヴィーナスから九浄家に招かれて、遊びに来ていたのだが――"

[[dialogue]]
speaker = "ヴィーナス"
# 「今日は、クロトの魔王ハーレム建造計画を進めるわよ！」
line = "「今日は、クロトの魔王ハーレム建造計画を進めるわよ！」"

[[dialogue]]
speaker = "unk"
# 諦めてなかった……だと！？
line = "諦めてなかった……だと！？"

[[dialogue]]
speaker = "ヴィーナス"
# 「だって、みんなで家族になるの、楽しそうじゃない？」
line = "「だって、みんなで家族になるの、楽しそうじゃない？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ね！　ヨミヨミ！」
line = "「ね！　ヨミヨミ！」"

[[dialogue]]
speaker = "ヨミ"
# 「え？　私ですかっ！？」
line = "「え？　私ですかっ！？」"

[[dialogue]]
speaker = "ヨミ"
# 「そ、それはそのぅ……。こやや……」
line = "「そ、それはそのぅ……。こやや……」"

[[dialogue]]
speaker = "unk"
# 俺から恥ずかしそうに視線をそらすヨミヨミ。何故そんな反応をするのかと思っていると――
line = "俺から恥ずかしそうに視線をそらすヨミヨミ。何故そんな反応をするのかと思っていると――"

[[dialogue]]
speaker = "ヴィーナス"
# 「実は昨日のうちに、ハーレムについて話しておいたのよ！」
line = "「実は昨日のうちに、ハーレムについて話しておいたのよ！」"

[[dialogue]]
speaker = "unk"
# 俺は事前に聞いてないんだけど！？
line = "俺は事前に聞いてないんだけど！？"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロトは反対しそうだから、まずは外堀を埋めといたのよ！」
line = "「クロトは反対しそうだから、まずは外堀を埋めといたのよ！」"

[[dialogue]]
speaker = "ヨミ"
# 「だ、大事なことなので、まずは実家の両親に相談しないと……」
line = "「だ、大事なことなので、まずは実家の両親に相談しないと……」"

[[dialogue]]
speaker = "unk"
# 全然外堀埋まってる感じじゃないんだけど！？
line = "全然外堀埋まってる感じじゃないんだけど！？"

[[dialogue]]
speaker = "ヴィーナス"
# 「でも、クロトのことは嫌いじゃないってことよね！　とりあえず、ヨミヨミは攻略済み、っと……」
line = "「でも、クロトのことは嫌いじゃないってことよね！　とりあえず、ヨミヨミは攻略済み、っと……」"

[[dialogue]]
speaker = "unk"
# 言いながらヴィーナスは、いつかの『未来の日誌』を思わせるデコレーションがされた『魔王ハーレム建造計画』というタイトルのノートに何やらメモをしている。
line = "言いながらヴィーナスは、いつかの『未来の日誌』を思わせるデコレーションがされた『魔王ハーレム建造計画』というタイトルのノートに何やらメモをしている。"

[[dialogue]]
speaker = "ヨミ"
# 「こやっ！？　お嬢様、ちょ、ちょっと待って下さい！　攻略済みというのは流石に、爆裂飛躍があるというか……！」
line = "「こやっ！？　お嬢様、ちょ、ちょっと待って下さい！　攻略済みというのは流石に、爆裂飛躍があるというか……！」"

[[dialogue]]
speaker = "蘭美"
# 「あら、お嬢様にヨミ、何してるの……って、会長っ！？」
line = "「あら、お嬢様にヨミ、何してるの……って、会長っ！？」"

[[dialogue]]
speaker = "unk"
# そこに現れたのは、ヨミヨミと同じく九浄家メイド隊で、そのメイド長を務めている蘭美であった。
line = "そこに現れたのは、ヨミヨミと同じく九浄家メイド隊で、そのメイド長を務めている蘭美であった。"

[[dialogue]]
speaker = "蘭美"
# 「い、言っとくけど、私はまだ、あなたをご主人様と認めたわけじゃないから！　メイド長として、ちゃんと<b>慎重</b>に見極めてから決めるから！」
line = "「い、言っとくけど、私はまだ、あなたをご主人様と認めたわけじゃないから！　メイド長として、ちゃんと<b>慎重</b>に見極めてから決めるから！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「『最速』が口癖の蘭美がわざわざそう言うってことは、これも攻略済みと見て大丈夫そうね！　メモメモ……」
line = "「『最速』が口癖の蘭美がわざわざそう言うってことは、これも攻略済みと見て大丈夫そうね！　メモメモ……」"

[[dialogue]]
speaker = "蘭美"
# 「お嬢様！？　その判断は速すぎるぴょん！？　こういうのは時間をかけて、シチューを煮込むようにじっくりと焦らずに工程を経る必要が……！」
line = "「お嬢様！？　その判断は速すぎるぴょん！？　こういうのは時間をかけて、シチューを煮込むようにじっくりと焦らずに工程を経る必要が……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「大丈夫よ！　クロトなら、蘭美の望む主人になれると信じているわ！　だって、クロトは世界を救う魔王だもの♪」
line = "「大丈夫よ！　クロトなら、蘭美の望む主人になれると信じているわ！　だって、クロトは世界を救う魔王だもの♪」"

[[dialogue]]
speaker = "せつな"
# 「あっ、ちなみにせつなは、主様ならもちろん旦那様に大歓迎でござるよ～♪　にんにん♪」
line = "「あっ、ちなみにせつなは、主様ならもちろん旦那様に大歓迎でござるよ～♪　にんにん♪」"

[[dialogue]]
speaker = "unk"
# メイド兼忍者でもあるせつなが、ドロンと煙と共に参上しながら言う。
line = "メイド兼忍者でもあるせつなが、ドロンと煙と共に参上しながら言う。"

[[dialogue]]
speaker = "unk"
# 何となくそんな気はしてた……！
line = "何となくそんな気はしてた……！"

[[dialogue]]
speaker = "ヴィーナス"
# 「せつなは勝ち確ね！」
line = "「せつなは勝ち確ね！」"

[[dialogue]]
speaker = "せつな"
# 「ふっふっふっ、主様が旦那様になった暁には、これまで使えなかった房中術を解禁して、あんなことやこんなことをにゃんにゃんしちゃうでござる<emoji=heart04>」
line = "「ふっふっふっ、主様が旦那様になった暁には、これまで使えなかった房中術を解禁して、あんなことやこんなことをにゃんにゃんしちゃうでござる<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
# 「か、会長とにゃんにゃん……。こやや……」
line = "「か、会長とにゃんにゃん……。こやや……」"

[[dialogue]]
speaker = "美鶴"
# 「あれ？　みんな集まって何してるの……って、会長さん？　もしかして……」
line = "「あれ？　みんな集まって何してるの……って、会長さん？　もしかして……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「美鶴、いいところに来たわね！　この前言ってたハーレムの話よ！」
line = "「美鶴、いいところに来たわね！　この前言ってたハーレムの話よ！」"

[[dialogue]]
speaker = "美鶴"
# 「ん～、うちは……ハーレムはちょっと嫌かな～」
line = "「ん～、うちは……ハーレムはちょっと嫌かな～」"

[[dialogue]]
speaker = "美鶴"
# 「まあ、会長さんがお嬢様の旦那様になって、そのメイドとして働くって話なら、別に嫌じゃないけど。……男子の中では一番仲が良いし」
line = "「まあ、会長さんがお嬢様の旦那様になって、そのメイドとして働くって話なら、別に嫌じゃないけど。……男子の中では一番仲が良いし」"

[[dialogue]]
speaker = "ヴィーナス"
# 「わかったわ！　ハーレムはみんなで楽しく過ごすためのものだから、そこに入らなくても美鶴は九浄家の大切なメイドよ」
line = "「わかったわ！　ハーレムはみんなで楽しく過ごすためのものだから、そこに入らなくても美鶴は九浄家の大切なメイドよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ただ――美鶴がわざわざ『一番仲が良い』と言うのは気になるわね。思ってたよりもイイ感じなのかしら？」
line = "「ただ――美鶴がわざわざ『一番仲が良い』と言うのは気になるわね。思ってたよりもイイ感じなのかしら？」"

[[dialogue]]
speaker = "美鶴"
# 「ん～～……そりゃまあ、新星学園で生活してて、会長さんに悪い感情向けてる女の子はいませんよ。どんだけ頑張ってくれてるか、わかりますし」
line = "「ん～～……そりゃまあ、新星学園で生活してて、会長さんに悪い感情向けてる女の子はいませんよ。どんだけ頑張ってくれてるか、わかりますし」"

[[dialogue]]
speaker = "美鶴"
# 「ただうちは恋人にするなら自分だけを見てくれる人がいいですし……って、これ普通のことじゃないですか？」
line = "「ただうちは恋人にするなら自分だけを見てくれる人がいいですし……って、これ普通のことじゃないですか？」"

[[dialogue]]
speaker = "美鶴"
# 「お嬢様は会長さんが、他の女の子を好きでもいいんですか？」
line = "「お嬢様は会長さんが、他の女の子を好きでもいいんですか？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私のことを沢山愛してくれるのは疑いようもないし、特に気にしないわ！！」
line = "「私のことを沢山愛してくれるのは疑いようもないし、特に気にしないわ！！」"

[[dialogue]]
speaker = "美鶴"
# 「わーお……すごい自信だ」
line = "「わーお……すごい自信だ」"

[[dialogue]]
speaker = "unk"
# もちろんヴィーナスの言う通りなのだが、本人に自信満々に言われると、ちょっと照れ臭い。
line = "もちろんヴィーナスの言う通りなのだが、本人に自信満々に言われると、ちょっと照れ臭い。"

[[dialogue]]
speaker = "ヴィーナス"
# 「それにクロトは魔王なんだから、私がその寵愛を独り占めするのは良くないことだわ！　クロトには１人でも多くの女の子を幸せにする義務があると思うの！」
line = "「それにクロトは魔王なんだから、私がその寵愛を独り占めするのは良くないことだわ！　クロトには１人でも多くの女の子を幸せにする義務があると思うの！」"

[[dialogue]]
speaker = "unk"
# その理屈はやっぱりよく分からないなあ！？
line = "その理屈はやっぱりよく分からないなあ！？"

[[dialogue]]
speaker = "unk"
# 信頼が厚いのは嬉しいけど
line = "信頼が厚いのは嬉しいけど"

[[dialogue]]
speaker = "美鶴"
# 「ふふふふ……やっぱりお嬢様と会長さんは面白いね。あなたたちに仕えてたら、うちもいつか会長さんのこと、好きになっちゃうかも？」
line = "「ふふふふ……やっぱりお嬢様と会長さんは面白いね。あなたたちに仕えてたら、うちもいつか会長さんのこと、好きになっちゃうかも？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうなったら遠慮なく私に言ってちょうだい！　魔王ハーレムはいつでも新規メンバーを受付中よ！！」
line = "「そうなったら遠慮なく私に言ってちょうだい！　魔王ハーレムはいつでも新規メンバーを受付中よ！！」"

[[dialogue]]
speaker = "unk"
# いつでも新規メンバー受付はダメだってば！
line = "いつでも新規メンバー受付はダメだってば！"

[[dialogue]]
speaker = "閃"
# 「わ、私は……お嬢様がハーレムを望むのであれば、そのように……」
line = "「わ、私は……お嬢様がハーレムを望むのであれば、そのように……」"

[[dialogue]]
speaker = "unk"
# うおっ！？　閃、いつの間に！？
line = "うおっ！？　閃、いつの間に！？"

[[dialogue]]
speaker = "閃"
# 「あの……お嬢様、昨晩あれから考えたことがあるのですが、１つお聞きしてもいいでしょうか？」
line = "「あの……お嬢様、昨晩あれから考えたことがあるのですが、１つお聞きしてもいいでしょうか？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「何かしら、閃ちゃん？」
line = "「何かしら、閃ちゃん？」"

[[dialogue]]
speaker = "閃"
# 「ハーレムということはつまり、一夫一妻という関係性に囚われないということ。ならば――」
line = "「ハーレムということはつまり、一夫一妻という関係性に囚われないということ。ならば――」"

[[dialogue]]
speaker = "閃"
# 「お嬢様が会長さんと結婚しつつ、<b>私がお嬢様と結婚する</b>、というのはアリなのでしょうかっ！？」
line = "「お嬢様が会長さんと結婚しつつ、<b>私がお嬢様と結婚する</b>、というのはアリなのでしょうかっ！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「その発想はなかったわ！　閃ちゃん、あなた――」
line = "「その発想はなかったわ！　閃ちゃん、あなた――」"

[[dialogue]]
speaker = "ヴィーナス"
# 「面白いことを考えるわね！　いいわよ♪　私とも結婚しましょう！」
line = "「面白いことを考えるわね！　いいわよ♪　私とも結婚しましょう！」"

[[dialogue]]
speaker = "閃"
# 「本当ですか！？　お嬢様と結婚……！　すうぅ～……はあぁ……すうぅ～……ふうぅぅ！」
line = "「本当ですか！？　お嬢様と結婚……！　すうぅ～……はあぁ……すうぅ～……ふうぅぅ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ただし！　私はクロトが１番好きだから、閃ちゃんは２番よ。あと、閃ちゃんもパパと結婚するならいいわ！」
line = "「ただし！　私はクロトが１番好きだから、閃ちゃんは２番よ。あと、閃ちゃんもパパと結婚するならいいわ！」"

[[dialogue]]
speaker = "美鶴"
# 「九浄家、風紀乱れ過ぎでは……？」
line = "「九浄家、風紀乱れ過ぎでは……？」"

[[dialogue]]
speaker = "ヘレナ"
# 「うむうむ。旧家名家というものは、往々にしてそういうところがあるものなのだ」
line = "「うむうむ。旧家名家というものは、往々にしてそういうところがあるものなのだ」"

[[dialogue]]
speaker = "美鶴"
# 「当主様、突然湧き出ないでください。あと絶対そんなわけないと思います」
line = "「当主様、突然湧き出ないでください。あと絶対そんなわけないと思います」"

[[dialogue]]
speaker = "unk"
# 手伝ってもらえませんかね！？
line = "手伝ってもらえませんかね！？"

[[dialogue]]
speaker = "unk"
# ２人ともあそこのバカ娘を止めるの
line = "２人ともあそこのバカ娘を止めるの"

[[dialogue]]
speaker = "unk"
# これ以上はとんでもないことになりそうなので、再びなんとかヴィーナスを思いとどまらせる俺なのであった――
line = "これ以上はとんでもないことになりそうなので、再びなんとかヴィーナスを思いとどまらせる俺なのであった――"
