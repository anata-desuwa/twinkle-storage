[[dialogue]]
speaker = "unk"
# 第３話,天使の羽に想いを込めて,P
line = "第３話,天使の羽に想いを込めて,P"

[[dialogue]]
speaker = "unk"
# その日は休日で、フニが俺の家に遊びにやってきていた。
line = "その日は休日で、フニが俺の家に遊びにやってきていた。"

[[dialogue]]
speaker = "フェニエル"
# 「焼き色が付いてきたら１８０℃に温度を下げて……これでよし、と」
line = "「焼き色が付いてきたら１８０℃に温度を下げて……これでよし、と」"

[[dialogue]]
speaker = "フェニエル"
# 「後はオーブンで３０分、焼き上がりを待つだけです♪」
line = "「後はオーブンで３０分、焼き上がりを待つだけです♪」"

[[dialogue]]
speaker = "unk"
# フニの手作り、楽しみだな
line = "フニの手作り、楽しみだな"

[[dialogue]]
speaker = "フェニエル"
# 「ホウちゃんから教えて貰ったアップルパイ、美味しく作れてるといいんですけど……」
line = "「ホウちゃんから教えて貰ったアップルパイ、美味しく作れてるといいんですけど……」"

[[dialogue]]
speaker = "フェニエル"
# 「とりあえず、待っている間に手が空きますので、<b>ご主人様</b>、何かして欲しいことはございますか？」
line = "「とりあえず、待っている間に手が空きますので、<b>ご主人様</b>、何かして欲しいことはございますか？」"

[[dialogue]]
speaker = "フェニエル"
# 「――ノヴァフォームでイチャイチャしたい？　えへへ……はい<emoji=heart04>　かしこまりました……♪」
line = "「――ノヴァフォームでイチャイチャしたい？　えへへ……はい<emoji=heart04>　かしこまりました……♪」"

[[dialogue]]
speaker = "unk"
# 告白して付き合い始めた日がそうだったように、フニと恋人になってからも、２人きりの時は彼女がメイドのように振舞ってくれて、イチャイチャするようになっていた――
line = "告白して付き合い始めた日がそうだったように、フニと恋人になってからも、２人きりの時は彼女がメイドのように振舞ってくれて、イチャイチャするようになっていた――"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「それでは、お膝の上に失礼致しますね……ご主人様<emoji=heart04>　――よいしょっ」
line = "「それでは、お膝の上に失礼致しますね……ご主人様<emoji=heart04>　――よいしょっ」"

[[dialogue]]
speaker = "unk"
# ご主人様呼びをしてくれながら膝の上に座ったフニ。彼女の頭を、俺は優しく撫でる。
line = "ご主人様呼びをしてくれながら膝の上に座ったフニ。彼女の頭を、俺は優しく撫でる。"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「あっ<emoji=heart04>　ん……はふぅ……<emoji=heart04>　えへへぇ<emoji=heart04>　こうして膝の上に座りながら撫でて貰うの、すごく安心して落ち着きます……♪」
line = "「あっ<emoji=heart04>　ん……はふぅ……<emoji=heart04>　えへへぇ<emoji=heart04>　こうして膝の上に座りながら撫でて貰うの、すごく安心して落ち着きます……♪」"

[[dialogue]]
speaker = "unk"
# 試したいことがあるんだけど、いいかな？
line = "試したいことがあるんだけど、いいかな？"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「え？　――私の羽に触りたい、ですか？　はい、大丈夫ですけど……」
line = "「え？　――私の羽に触りたい、ですか？　はい、大丈夫ですけど……」"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「――天使の羽に気持ちを込めて触れると、その気持ちが流れ込んで伝わる？　えっ、そうなんですか？」
line = "「――天使の羽に気持ちを込めて触れると、その気持ちが流れ込んで伝わる？　えっ、そうなんですか？」"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「私、ホウちゃんの力が目覚めた時に初めて天使の羽が生えてきたので、全然知りませんでした」
line = "「私、ホウちゃんの力が目覚めた時に初めて天使の羽が生えてきたので、全然知りませんでした」"

[[dialogue]]
speaker = "unk"
# 俺もネットで調べて初めて知ったのだが、沢山の情報が出てくるので、どうやら本当のことではあるらしい。だからこそ、どんな感じか興味が湧いてしまったのだ。
line = "俺もネットで調べて初めて知ったのだが、沢山の情報が出てくるので、どうやら本当のことではあるらしい。だからこそ、どんな感じか興味が湧いてしまったのだ。"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「私もそれを聞いたら、興味が湧いてきちゃいました。なので、ご主人様……どうぞ試してみてくれませんか<emoji=heart04>」
line = "「私もそれを聞いたら、興味が湧いてきちゃいました。なので、ご主人様……どうぞ試してみてくれませんか<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そんな風に許してくれるので、俺はお言葉に甘えて、そっと背中の羽を撫でる。
line = "そんな風に許してくれるので、俺はお言葉に甘えて、そっと背中の羽を撫でる。"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「あっ<emoji=heart04>　こ、これ……ふあぁっ<emoji=heart04>　す、すごいです……<emoji=heart04>」
line = "「あっ<emoji=heart04>　こ、これ……ふあぁっ<emoji=heart04>　す、すごいです……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 伝わっているかな……？
line = "伝わっているかな……？"

[[dialogue]]
speaker = "unk"
# 俺がどのくらいフニを想っているか
line = "俺がどのくらいフニを想っているか"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「は、はい<emoji=heart04>　わかります……<emoji=heart04>　本当に羽からご主人様の気持ちが流れ込んでくる感じがして……<emoji=heart04>　はあぁっ……<emoji=heart04>」
line = "「は、はい<emoji=heart04>　わかります……<emoji=heart04>　本当に羽からご主人様の気持ちが流れ込んでくる感じがして……<emoji=heart04>　はあぁっ……<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「ご主人様からいっぱい愛されてるのが、伝わってきます……<emoji=heart04>　んっ……ふうぅ……<emoji=heart04>」
line = "「ご主人様からいっぱい愛されてるのが、伝わってきます……<emoji=heart04>　んっ……ふうぅ……<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「羽に触れた手を通して、心が繋がっている感じがして、温かくて幸せな気持ちになっちゃいます……<emoji=heart04>　はふぅ……<emoji=heart04>」
line = "「羽に触れた手を通して、心が繋がっている感じがして、温かくて幸せな気持ちになっちゃいます……<emoji=heart04>　はふぅ……<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「で、でも……心に直接いっぱい褒められているみたいな気恥ずかしさがあって、なまら照れちゃいます……<emoji=heart04>」
line = "「で、でも……心に直接いっぱい褒められているみたいな気恥ずかしさがあって、なまら照れちゃいます……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# こちらの好きという気持ちが伝わる一方で、フニの気持ちがこちらに伝わるわけではないのは、ちょっと残念だなと思っていると――
line = "こちらの好きという気持ちが伝わる一方で、フニの気持ちがこちらに伝わるわけではないのは、ちょっと残念だなと思っていると――"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「――それなら次は、私がご主人様をいっぱい褒めながら、その……キスするというのはどうでしょう？」
line = "「――それなら次は、私がご主人様をいっぱい褒めながら、その……キスするというのはどうでしょう？」"

[[dialogue]]
speaker = "unk"
# え？　もしかして……伝わっちゃった？
line = "え？　もしかして……伝わっちゃった？"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「えへへ……なんとなくですけど、そんな感じがしました♪」
line = "「えへへ……なんとなくですけど、そんな感じがしました♪」"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「あと……私も、ご主人様にいっぱい好きって気持ちを流し込まれちゃったので……」
line = "「あと……私も、ご主人様にいっぱい好きって気持ちを流し込まれちゃったので……」"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「わ、私自身も……キスしたいって気持ちになっちゃってて……<emoji=heart04>」
line = "「わ、私自身も……キスしたいって気持ちになっちゃってて……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 可愛い恋人にそんなことを言われれば、断る選択などあるはずもなく。
line = "可愛い恋人にそんなことを言われれば、断る選択などあるはずもなく。"

[[dialogue]]
speaker = "unk"
# じゃあ……お願いしてもいいかな？
line = "じゃあ……お願いしてもいいかな？"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「はい、ご主人様<emoji=heart04>　それでは……ご奉仕、させて頂きますね……<emoji=heart04>」
line = "「はい、ご主人様<emoji=heart04>　それでは……ご奉仕、させて頂きますね……<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「ん……<emoji=heart04>　ちゅっ……<emoji=heart04>」
line = "「ん……<emoji=heart04>　ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺の方に向き直ったフニがそっと唇を近づけてきて……キスをする。
line = "俺の方に向き直ったフニがそっと唇を近づけてきて……キスをする。"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「ご主人様……いつも私に優しくして下さって、なまら好きです……<emoji=heart04>　一緒に居ると、とても安心した気持ちになれます……<emoji=heart04>　ちゅっ……<emoji=heart04>」
line = "「ご主人様……いつも私に優しくして下さって、なまら好きです……<emoji=heart04>　一緒に居ると、とても安心した気持ちになれます……<emoji=heart04>　ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「でも、同時に力強くて、男の人として頼れる部分があるのが素敵です<emoji=heart04>　んちゅっ……<emoji=heart04>」
line = "「でも、同時に力強くて、男の人として頼れる部分があるのが素敵です<emoji=heart04>　んちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「星騎士としてとても強いだけじゃなくて、いざという時に決して諦めない、心の強さがなまらカッコよくて、ドキドキしちゃいます……<emoji=heart04>　んっ……<emoji=heart04>」
line = "「星騎士としてとても強いだけじゃなくて、いざという時に決して諦めない、心の強さがなまらカッコよくて、ドキドキしちゃいます……<emoji=heart04>　んっ……<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「ご主人様は私にとって、世界一素敵な男の人です<emoji=heart04>　心からお慕いしております<emoji=heart04>　ちゅっ……ちゅっ……<emoji=heart04>」
line = "「ご主人様は私にとって、世界一素敵な男の人です<emoji=heart04>　心からお慕いしております<emoji=heart04>　ちゅっ……ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「んむっ……あっ<emoji=heart04>　ご主人様……とてもお顔が赤くなってますよ？」
line = "「んむっ……あっ<emoji=heart04>　ご主人様……とてもお顔が赤くなってますよ？」"

[[dialogue]]
speaker = "unk"
# 確かに、気持ちいいかもしれない……
line = "確かに、気持ちいいかもしれない……"

[[dialogue]]
speaker = "unk"
# こ、これは、すごく照れるけど……
line = "こ、これは、すごく照れるけど……"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「えへへ……<emoji=heart04>　ご主人様に照れてもらえるなんて、嬉しくなっちゃいます♪　恋人メイドとして、また新しいご奉仕方法が見つかっちゃいましたね……<emoji=heart04>」
line = "「えへへ……<emoji=heart04>　ご主人様に照れてもらえるなんて、嬉しくなっちゃいます♪　恋人メイドとして、また新しいご奉仕方法が見つかっちゃいましたね……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# と、その時、ピピピッとキッチンの方から電子音が聞こえて来る。
line = "と、その時、ピピピッとキッチンの方から電子音が聞こえて来る。"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「あっ、夢中で忘れちゃってましたけど、アップルパイが焼き上がったみたいですね」
line = "「あっ、夢中で忘れちゃってましたけど、アップルパイが焼き上がったみたいですね」"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「じゃあ、次は――あ～んのご奉仕をさせて頂きますね<emoji=heart04>　んっ……ちゅっ<emoji=heart04>」
line = "「じゃあ、次は――あ～んのご奉仕をさせて頂きますね<emoji=heart04>　んっ……ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# その後、フニの作ってくれたアップルパイを食べさせてもらって、心だけじゃなくお腹も満たされながら、幸せな休日を過ごすのだった――
line = "その後、フニの作ってくれたアップルパイを食べさせてもらって、心だけじゃなくお腹も満たされながら、幸せな休日を過ごすのだった――"
