[[dialogue]]
speaker = "unk"
# 第１話,海で遊ぶぞ！,P
line = "第１話,海で遊ぶぞ！,P"

[[dialogue]]
speaker = "unk"
# 新星・流星の星徒会メンバーで、リゾート合宿をしていた頃──
line = "新星・流星の星徒会メンバーで、リゾート合宿をしていた頃──"

[[dialogue]]
speaker = "アポロ"
# 「うおお～！　夏だ～！　おい魔王、こっちだこっち！　もたもたしてたら夏が逃げちゃうぞ！」
line = "「うおお～！　夏だ～！　おい魔王、こっちだこっち！　もたもたしてたら夏が逃げちゃうぞ！」"

[[dialogue]]
speaker = "unk"
# 外は冬だ
line = "外は冬だ"

[[dialogue]]
speaker = "unk"
# ここだけはね
line = "ここだけはね"

[[dialogue]]
speaker = "アポロ"
# 「細かいことを気にするな！　この中にいる限り、あたしらの夏は終わらないのさ」
line = "「細かいことを気にするな！　この中にいる限り、あたしらの夏は終わらないのさ」"

[[dialogue]]
speaker = "アポロ"
# 「しかし……リップルってすごいやつなんだな！　ここまでの結界領域を展開できるなんて……星騎士的にもすげー戦力なんじゃないか！？」
line = "「しかし……リップルってすごいやつなんだな！　ここまでの結界領域を展開できるなんて……星騎士的にもすげー戦力なんじゃないか！？」"

[[dialogue]]
speaker = "アポロ"
# 「さて、と。まーなんかたまに寒い風が吹くっつってたけど、海に潜ればやり過ごせるよな！」
line = "「さて、と。まーなんかたまに寒い風が吹くっつってたけど、海に潜ればやり過ごせるよな！」"

[[dialogue]]
speaker = "アポロ"
# 「ん？　泳げるのかって？　ふっ、愚問だな。流星ライダーアポロには水中フォームもあるんだ──水中戦だってお手の物だぜ！」
line = "「ん？　泳げるのかって？　ふっ、愚問だな。流星ライダーアポロには水中フォームもあるんだ──水中戦だってお手の物だぜ！」"

[[dialogue]]
speaker = "アポロ"
# 「さーて、何して遊ぼっかなあ……ん？」
line = "「さーて、何して遊ぼっかなあ……ん？」"

[[dialogue]]
speaker = "アポロ"
# 「──おい魔王、こっちに変なゴーグルが置いてあったぞ。こりゃなんだ？」
line = "「──おい魔王、こっちに変なゴーグルが置いてあったぞ。こりゃなんだ？」"

[[dialogue]]
speaker = "アポロ"
# 「シュノーケル？　ほー……なるほど、こいつを着けたまま海ん中を観察するのか……それも面白そうだな！」
line = "「シュノーケル？　ほー……なるほど、こいつを着けたまま海ん中を観察するのか……それも面白そうだな！」"

[[dialogue]]
speaker = "アポロ"
# 「おーい！　フィーオナー！」
line = "「おーい！　フィーオナー！」"

[[dialogue]]
speaker = "フィオナ"
# 「あら、姉さん──会長さんも」
line = "「あら、姉さん──会長さんも」"

[[dialogue]]
speaker = "アポロ"
# 「おう！　これからスケジューリングするんだ。一緒に向こうのサンゴ礁でも見に行こうぜ！」
line = "「おう！　これからスケジューリングするんだ。一緒に向こうのサンゴ礁でも見に行こうぜ！」"

[[dialogue]]
speaker = "unk"
# 真面目か？
line = "真面目か？"

[[dialogue]]
speaker = "unk"
# シュノーケリングね
line = "シュノーケリングね"

[[dialogue]]
speaker = "フィオナ"
# 「ふふ、いいですよ。ここは水も透き通っていて綺麗ですし……楽しみですね」
line = "「ふふ、いいですよ。ここは水も透き通っていて綺麗ですし……楽しみですね」"

[[dialogue]]
speaker = "アポロ"
# 「ああ。海の生き物がたくさん見れるぞ！」
line = "「ああ。海の生き物がたくさん見れるぞ！」"

[[dialogue]]
speaker = "アポロ"
# 「ソレが終わったらユウリ達も入れて、砂浜でビーチバレー決勝戦だ！　水鉄砲の撃ち合いもやりたいし──」
line = "「ソレが終わったらユウリ達も入れて、砂浜でビーチバレー決勝戦だ！　水鉄砲の撃ち合いもやりたいし──」"

[[dialogue]]
speaker = "フィオナ"
# 「もう。姉さんったら、はしゃぎすぎて怪我しないでくださいね──」
line = "「もう。姉さんったら、はしゃぎすぎて怪我しないでくださいね──」"

[[dialogue]]
speaker = "unk"
# それからもアポロはみんなを誘い、さまざまな海のレジャーを堪能した……。
line = "それからもアポロはみんなを誘い、さまざまな海のレジャーを堪能した……。"

[[dialogue]]
speaker = "アポロ"
# 「ふーっ……あー、くたびれた」
line = "「ふーっ……あー、くたびれた」"

[[dialogue]]
speaker = "アポロ"
# 「あたしはお姉さんなのに、ついつい子どもみたいに遊んじまった……やれやれだぜ」
line = "「あたしはお姉さんなのに、ついつい子どもみたいに遊んじまった……やれやれだぜ」"

[[dialogue]]
speaker = "unk"
# 十分子どもだ
line = "十分子どもだ"

[[dialogue]]
speaker = "アポロ"
# 「ま、姉としてのイゲンを見せるのは次からだな」
line = "「ま、姉としてのイゲンを見せるのは次からだな」"

[[dialogue]]
speaker = "アポロ"
# 「にしても、だ。海の家──って、なんで海の家なんだ？　海の持ち物なのか？」
line = "「にしても、だ。海の家──って、なんで海の家なんだ？　海の持ち物なのか？」"

[[dialogue]]
speaker = "unk"
# そういうものだから
line = "そういうものだから"

[[dialogue]]
speaker = "unk"
# そういう側面もある
line = "そういう側面もある"

[[dialogue]]
speaker = "アポロ"
# 「ほーん……ま、覚えやすくていいけどな」
line = "「ほーん……ま、覚えやすくていいけどな」"

[[dialogue]]
speaker = "アポロ"
# 「ん？　ああ──海に来るのは、あたしがまだ<b>起きてた</b>頃以来だ」
line = "「ん？　ああ──海に来るのは、あたしがまだ<b>起きてた</b>頃以来だ」"

[[dialogue]]
speaker = "アポロ"
# 「だから……フィオナと一緒にああして遊べる日がまた来るなんて、思ってもみなかった。ホントに……嬉しいんだ」
line = "「だから……フィオナと一緒にああして遊べる日がまた来るなんて、思ってもみなかった。ホントに……嬉しいんだ」"

[[dialogue]]
speaker = "アポロ"
# 「でもよ。時々いいのかって考えちまう」
line = "「でもよ。時々いいのかって考えちまう」"

[[dialogue]]
speaker = "アポロ"
# 「あんな風に暴れたあたしが、こんな幸せを受け取ってていいのかって……」
line = "「あんな風に暴れたあたしが、こんな幸せを受け取ってていいのかって……」"

[[dialogue]]
speaker = "unk"
# アポロ……
line = "アポロ……"

[[dialogue]]
speaker = "unk"
# ……
line = "……"

[[dialogue]]
speaker = "アポロ"
# 「あーっよくない！　よくないぞあたし！　ダメ！　これ以上はすとっぷだ！」
line = "「あーっよくない！　よくないぞあたし！　ダメ！　これ以上はすとっぷだ！」"

[[dialogue]]
speaker = "unk"
# 急にどうした
line = "急にどうした"

[[dialogue]]
speaker = "unk"
# なんで？
line = "なんで？"

[[dialogue]]
speaker = "アポロ"
# 「フィオナに言われてたんだ。１人でいる時に思い詰めるなって。悩むなら自分がいる時にしろ、って」
line = "「フィオナに言われてたんだ。１人でいる時に思い詰めるなって。悩むなら自分がいる時にしろ、って」"

[[dialogue]]
speaker = "アポロ"
# 「魔王が隣にいるとはいえ──あたしとしたことが、約束を破るところだった。やっぱアポロ様はいつだって天衣無縫じゃないとな！」
line = "「魔王が隣にいるとはいえ──あたしとしたことが、約束を破るところだった。やっぱアポロ様はいつだって天衣無縫じゃないとな！」"

[[dialogue]]
speaker = "アポロ"
# 「──よおし、元気回復！」
line = "「──よおし、元気回復！」"

[[dialogue]]
speaker = "unk"
# アポロは勢いよく立ち上がり、そのまま砂浜を駆け出してしまった。
line = "アポロは勢いよく立ち上がり、そのまま砂浜を駆け出してしまった。"

[[dialogue]]
speaker = "アポロ"
# 「おーい、こっちだ魔王！　今度はビーチフラッグ対決だ！　早く来ないと不戦敗にするからな～！」
line = "「おーい、こっちだ魔王！　今度はビーチフラッグ対決だ！　早く来ないと不戦敗にするからな～！」"

[[dialogue]]
speaker = "unk"
# いつまでも遊び足りないアポロに、気力の限り付き合うこととなった……。
line = "いつまでも遊び足りないアポロに、気力の限り付き合うこととなった……。"
