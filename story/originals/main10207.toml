[[dialogue]]
speaker = "unk"
# 第７話,激ヤバのヤバ,B
line = "第７話,激ヤバのヤバ,B"

[[dialogue]]
speaker = "せつな"
# 「――<ruby=ラーゴ・シエロ>鏡界の湖</ruby>を占拠している謎の敵の存在を確認したでござる」
line = "「――<ruby>鏡界の湖<rt>ラーゴ・シエロ</rt></ruby>を占拠している謎の敵の存在を確認したでござる」"

[[dialogue]]
speaker = "美鶴"
# 「一時的に交戦しましたが、休戦交渉の末、撤退いたしました」
line = "「一時的に交戦しましたが、休戦交渉の末、撤退いたしました」"

[[dialogue]]
speaker = "ヘレナ"
# 「ふむ、ご苦労だった。負傷はないか？」
line = "「ふむ、ご苦労だった。負傷はないか？」"

[[dialogue]]
speaker = "ヨミ"
# 「大丈夫です。３名ともケガなく戻って来れました」
line = "「大丈夫です。３名ともケガなく戻って来れました」"

[[dialogue]]
speaker = "ヘレナ"
# 「そうか。それでこそ貴殿らを派遣した甲斐があるというもの。良い判断だった。十全にその役目を果たしてくれたな」
line = "「そうか。それでこそ貴殿らを派遣した甲斐があるというもの。良い判断だった。十全にその役目を果たしてくれたな」"

[[dialogue]]
speaker = "ヨミ"
# 「私とせつなさんだけだったら、まだ<ruby=ラーゴ・シエロ>鏡界の湖</ruby>にいたかもしれませんね」
line = "「私とせつなさんだけだったら、まだ<ruby>鏡界の湖<rt>ラーゴ・シエロ</rt></ruby>にいたかもしれませんね」"

[[dialogue]]
speaker = "せつな"
# 「いやはや、五体満足で情報を持ち帰れたのは、美鶴殿の冷静で的確な判断力のおかげでござる」
line = "「いやはや、五体満足で情報を持ち帰れたのは、美鶴殿の冷静で的確な判断力のおかげでござる」"

[[dialogue]]
speaker = "美鶴"
# 「臆病なだけだよ」
line = "「臆病なだけだよ」"

[[dialogue]]
speaker = "美鶴"
# （忍んでないせつなに真面目すぎるヨミーのペアなら、無限湧きし続ける鏡像相手にいつまでも立ち回ってたかも）
line = "（忍んでないせつなに真面目すぎるヨミーのペアなら、無限湧きし続ける鏡像相手にいつまでも立ち回ってたかも）"

[[dialogue]]
speaker = "美鶴"
# （うちは当主様が期待してた通りに、突っ走りがちな２人のストッパー役を果たしたってワケで）
line = "（うちは当主様が期待してた通りに、突っ走りがちな２人のストッパー役を果たしたってワケで）"

[[dialogue]]
speaker = "美鶴"
# （んー。当主様の掌の上で転がされてる感あるー）
line = "（んー。当主様の掌の上で転がされてる感あるー）"

[[dialogue]]
speaker = "ヘレナ"
# 「<ruby=ラーゴ・シエロ>鏡界の湖</ruby>を占拠し、三界の行き来を妨げている輩がいる……最初に生み出された鏡像から察するに、単独犯ではあるまい」
line = "「<ruby>鏡界の湖<rt>ラーゴ・シエロ</rt></ruby>を占拠し、三界の行き来を妨げている輩がいる……最初に生み出された鏡像から察するに、単独犯ではあるまい」"

[[dialogue]]
speaker = "ヘレナ"
# 「ここで<b>奴ら</b>が動いてきたか……」
line = "「ここで<b>奴ら</b>が動いてきたか……」"

[[dialogue]]
speaker = "美鶴"
# 「当主様……ひとつお伺いしても？」
line = "「当主様……ひとつお伺いしても？」"

[[dialogue]]
speaker = "ヘレナ"
# 「なんだ？　ひとつと言わず、なんでも尋ねるがいい。私に答えられることならばな」
line = "「なんだ？　ひとつと言わず、なんでも尋ねるがいい。私に答えられることならばな」"

[[dialogue]]
speaker = "美鶴"
# 「当主様は<ruby=ラーゴ・シエロ>鏡界の湖</ruby>に何がいるのか、なんとなく勘づいてたんじゃないです？」
line = "「当主様は<ruby>鏡界の湖<rt>ラーゴ・シエロ</rt></ruby>に何がいるのか、なんとなく勘づいてたんじゃないです？」"

[[dialogue]]
speaker = "ヘレナ"
# 「……ほう？　何故そう思った？」
line = "「……ほう？　何故そう思った？」"

[[dialogue]]
speaker = "美鶴"
# 「なんていうか……どうにも手際が良すぎやしないかと思いまして。当主様は今回の事件について、どこまで察してるんです？」
line = "「なんていうか……どうにも手際が良すぎやしないかと思いまして。当主様は今回の事件について、どこまで察してるんです？」"

[[dialogue]]
speaker = "ヘレナ"
# 「ほほう、珍しく踏み込んでくるではないか」
line = "「ほほう、珍しく踏み込んでくるではないか」"

[[dialogue]]
speaker = "美鶴"
# 「ん……まぁ、そーですね。うちにしちゃ、らしくないかもしんないです」
line = "「ん……まぁ、そーですね。うちにしちゃ、らしくないかもしんないです」"

[[dialogue]]
speaker = "美鶴"
# 「でも今回はどーにも当主様の思惑ってのが気になっちゃいまして」
line = "「でも今回はどーにも当主様の思惑ってのが気になっちゃいまして」"

[[dialogue]]
speaker = "ヘレナ"
# 「なるほど……ふふ、まあいい。この際だから私の推測を話しておこう」
line = "「なるほど……ふふ、まあいい。この際だから私の推測を話しておこう」"

[[dialogue]]
speaker = "ヘレナ"
# 「そうだな。私は……ヴィーナスに次いで姿を消した魔王たちは、おそらくヴィーナスを追って魔界に向かったのではないかと考えている」
line = "「そうだな。私は……ヴィーナスに次いで姿を消した魔王たちは、おそらくヴィーナスを追って魔界に向かったのではないかと考えている」"

[[dialogue]]
speaker = "せつな"
# 「魔界でござるか！？　しかし今は三界の行き来の出来ない時節でござる」
line = "「魔界でござるか！？　しかし今は三界の行き来の出来ない時節でござる」"

[[dialogue]]
speaker = "ヨミ"
# 「しかも<ruby=ラーゴ・シエロ>鏡界の湖</ruby>に近づけさせないように水鏡の魔女が陣取っていて――」
line = "「しかも<ruby>鏡界の湖<rt>ラーゴ・シエロ</rt></ruby>に近づけさせないように水鏡の魔女が陣取っていて――」"

[[dialogue]]
speaker = "ヨミ"
# 「はっ！？　つまりあの魔女と、魔女のお仲間がお嬢様をさらった犯人！？」
line = "「はっ！？　つまりあの魔女と、魔女のお仲間がお嬢様をさらった犯人！？」"

[[dialogue]]
speaker = "ヘレナ"
# 「いや……<ruby=ラーゴ・シエロ>鏡界の湖</ruby>の占拠は、ヴィーナスがさらわれた件とはまた別であろうな」
line = "「いや……<ruby>鏡界の湖<rt>ラーゴ・シエロ</rt></ruby>の占拠は、ヴィーナスがさらわれた件とはまた別であろうな」"

[[dialogue]]
speaker = "ヘレナ"
# 「おそらく彼奴らの目的は、リクリエを人間界に閉じ込め──ん？　いや、まさかとは思うが……」
line = "「おそらく彼奴らの目的は、リクリエを人間界に閉じ込め──ん？　いや、まさかとは思うが……」"

[[dialogue]]
speaker = "ヨミ"
# 「当主様、何かお気づきに？」
line = "「当主様、何かお気づきに？」"

[[dialogue]]
speaker = "ヘレナ"
# 「彼奴らめ、人間界と心中するつもりか？」
line = "「彼奴らめ、人間界と心中するつもりか？」"

[[dialogue]]
speaker = "せつな"
# 「心中……！？」
line = "「心中……！？」"

[[dialogue]]
speaker = "美鶴"
# 「どういう意味かはよく分かんないですけど、めちゃヤバいってことだけは伝わりました」
line = "「どういう意味かはよく分かんないですけど、めちゃヤバいってことだけは伝わりました」"

[[dialogue]]
speaker = "ヘレナ"
# 「ヤバいな。激ヤバだよ」
line = "「ヤバいな。激ヤバだよ」"

[[dialogue]]
speaker = "ヘレナ"
# 「さて……ここで重要なのは、我ら九浄家がどう動くべきか、だが──」
line = "「さて……ここで重要なのは、我ら九浄家がどう動くべきか、だが──」"

[[dialogue]]
speaker = "蘭美"
# 「ご当主様、大変ですっ！」
line = "「ご当主様、大変ですっ！」"

[[dialogue]]
speaker = "ヘレナ"
# 「む、いったいどうした？　メイド長が形振り構わず駆け込んできたとなれば、ただごとではないようだな」
line = "「む、いったいどうした？　メイド長が形振り構わず駆け込んできたとなれば、ただごとではないようだな」"

[[dialogue]]
speaker = "蘭美"
# 「はい。かつてない異常事態かと……窓の外をご覧いただけますか」
line = "「はい。かつてない異常事態かと……窓の外をご覧いただけますか」"

[[dialogue]]
speaker = "せつな"
# 「窓の外でござるか？　なんだかチカチカ光ってるでござるが……」
line = "「窓の外でござるか？　なんだかチカチカ光ってるでござるが……」"

[[dialogue]]
speaker = "ヨミ"
# 「花火でも打ち上げて──こやーーんっ！？」
line = "「花火でも打ち上げて──こやーーんっ！？」"

[[dialogue]]
speaker = "美鶴"
# 「なるほど。一目瞭然だね」
line = "「なるほど。一目瞭然だね」"

[[dialogue]]
speaker = "蘭美"
# 「流星群が、激化しております……！」
line = "「流星群が、激化しております……！」"

[[dialogue]]
speaker = "ヘレナ"
# 「激ヤバのヤバであるな」
line = "「激ヤバのヤバであるな」"

[[dialogue]]
speaker = "unk"
# 空から降り注ぐ無数の光の帯。
line = "空から降り注ぐ無数の光の帯。"

[[dialogue]]
speaker = "unk"
# それは花火より激しくて、花火よりも破滅的な輝きだった。
line = "それは花火より激しくて、花火よりも破滅的な輝きだった。"
