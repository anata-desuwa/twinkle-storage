[[dialogue]]
speaker = "unk"
# 時間を置き去りにするように、流星寮のクリスマスパーティーは進んで行く。
line = "時間を置き去りにするように、流星寮のクリスマスパーティーは進んで行く。"

[[dialogue]]
speaker = "unk"
# 普段は夜更かしを禁じられている附属生も、今日だけは許されていた。
line = "普段は夜更かしを禁じられている附属生も、今日だけは許されていた。"

[[dialogue]]
speaker = "アニュラス"
# 「はーっはっは！　これを見ろ！　流星ライダー！」
line = "「はーっはっは！　これを見ろ！　流星ライダー！」"

[[dialogue]]
speaker = "アポロ"
# 「卑怯だぞ、仮面怪人！　人質を取るなんて、それでも騎士か！」
line = "「卑怯だぞ、仮面怪人！　人質を取るなんて、それでも騎士か！」"

[[dialogue]]
speaker = "アニュラス"
# 「うぐっ、それを言われるとつらいがっ……いいんだ、今日の私は仮面怪人だからなっ！」
line = "「うぐっ、それを言われるとつらいがっ……いいんだ、今日の私は仮面怪人だからなっ！」"

[[dialogue]]
speaker = "アニュラス"
# 「ふははははは、見よっ！　この動きについてこられるかっ？」
line = "「ふははははは、見よっ！　この動きについてこられるかっ？」"

[[dialogue]]
speaker = "アポロ"
# 「なんて不気味な動きっ、さすがは怪人だ！　しかし、あたしも流星ライダーだ！　そんな動きには惑わされないぞ！」
line = "「なんて不気味な動きっ、さすがは怪人だ！　しかし、あたしも流星ライダーだ！　そんな動きには惑わされないぞ！」"

[[dialogue]]
speaker = "アポロ"
# 「唸れ流星！　轟け雷鳴！　いざ必殺の……トルネードスピンキィィーーーーック！！！！」
line = "「唸れ流星！　轟け雷鳴！　いざ必殺の……トルネードスピンキィィーーーーック！！！！」"

[[dialogue]]
speaker = "アニュラス"
# 「ぎゃああああああ～～～～っ！　仮面がっ！　命よりも大事な私の仮面がぁぁ～～～っ！」
line = "「ぎゃああああああ～～～～っ！　仮面がっ！　命よりも大事な私の仮面がぁぁ～～～っ！」"

[[dialogue]]
speaker = "アポロ"
# 「正義は勝ぁつ！　流星ライダーの大勝利だ！」
line = "「正義は勝ぁつ！　流星ライダーの大勝利だ！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「……この寸劇は何かしら？」
line = "「……この寸劇は何かしら？」"

[[dialogue]]
speaker = "フェニエル"
# 「は、はいっ、これは『流星ライダーＶＳ仮面怪人』ですね。附属生には大人気みたいです」
line = "「は、はいっ、これは『流星ライダーＶＳ仮面怪人』ですね。附属生には大人気みたいです」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「確かに盛り上がっていますわね。私には理解できないけど……」
line = "「確かに盛り上がっていますわね。私には理解できないけど……」"

[[dialogue]]
speaker = "フィオナ"
# 「姉さーん！　とっても可愛いですよー！　キューティープリティー、ア・ポ・ロ！」
line = "「姉さーん！　とっても可愛いですよー！　キューティープリティー、ア・ポ・ロ！」"

[[dialogue]]
speaker = "アポロ"
# 「かわいいじゃなくてかっこいいだ！　流星ライダーなんだぞ！」
line = "「かわいいじゃなくてかっこいいだ！　流星ライダーなんだぞ！」"

[[dialogue]]
speaker = "キリカ"
# 「それは無理ですね。クリスマスフォームのアポロ様のかわゆさは上限突破していますから」
line = "「それは無理ですね。クリスマスフォームのアポロ様のかわゆさは上限突破していますから」"

[[dialogue]]
speaker = "マリオン"
# 「むぎゅ～～～～っ」
line = "「むぎゅ～～～～っ」"

[[dialogue]]
speaker = "アポロ"
# 「こ、こらぁ！　勝手に抱きつくんじゃなぁーい！！」
line = "「こ、こらぁ！　勝手に抱きつくんじゃなぁーい！！」"

[[dialogue]]
speaker = "キリカ"
# 「順番ですよ。さあ、アポロ様を愛でたい方は列に並んで下さい」
line = "「順番ですよ。さあ、アポロ様を愛でたい方は列に並んで下さい」"

[[dialogue]]
speaker = "フィオナ"
# 「はい！」
line = "「はい！」"

[[dialogue]]
speaker = "キリカ"
# 「お嬢様は既に散々抱き締めているはずですが？」
line = "「お嬢様は既に散々抱き締めているはずですが？」"

[[dialogue]]
speaker = "フィオナ"
# 「何度でもいいの！　姉さんの可愛さには勝てないんだから」
line = "「何度でもいいの！　姉さんの可愛さには勝てないんだから」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「星見家の方々……一体どうされましたの？　アポロさんへの熱狂ぶりが普通ではないのですが……」
line = "「星見家の方々……一体どうされましたの？　アポロさんへの熱狂ぶりが普通ではないのですが……」"

[[dialogue]]
speaker = "フェニエル"
# 「はい……アポロ様のクリスマスフォームが愛らしすぎて……お嬢様もメイド長も、お屋敷中のみんなが暴走している状態で……」
line = "「はい……アポロ様のクリスマスフォームが愛らしすぎて……お嬢様もメイド長も、お屋敷中のみんなが暴走している状態で……」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「確かにあの戦闘服は可愛すぎますの。夢中になってしまう気持ちも分かりますわ。ですけど、それにしてもあの様子は常軌を逸しているのでは……？」
line = "「確かにあの戦闘服は可愛すぎますの。夢中になってしまう気持ちも分かりますわ。ですけど、それにしてもあの様子は常軌を逸しているのでは……？」"

[[dialogue]]
speaker = "unk"
# ずっと可愛がれなかったから仕方ない
line = "ずっと可愛がれなかったから仕方ない"

[[dialogue]]
speaker = "unk"
# みんなアポロ大好きだから
line = "みんなアポロ大好きだから"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「そうですわね、ひとまず見なかったことに致しますわ」
line = "「そうですわね、ひとまず見なかったことに致しますわ」"

[[dialogue]]
speaker = "舞亜"
# 「あっ、寮長さん！　おなか空いてませんか？　焼きたてピザのデリバリーですよ？」
line = "「あっ、寮長さん！　おなか空いてませんか？　焼きたてピザのデリバリーですよ？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「インラインスケートで配っているんですの？　随分と器用なことをしますのね」
line = "「インラインスケートで配っているんですの？　随分と器用なことをしますのね」"

[[dialogue]]
speaker = "舞亜"
# 「フィギュアスケーターですから、このくらいは余裕ですよ♪」
line = "「フィギュアスケーターですから、このくらいは余裕ですよ♪」"

[[dialogue]]
speaker = "フェニエル"
# 「あのっ、ピザを１切れもらっていいですか？」
line = "「あのっ、ピザを１切れもらっていいですか？」"

[[dialogue]]
speaker = "舞亜"
# 「いいよー。フニちゃんにはこれ！　チーズとハチミツたっぷりのピザ！」
line = "「いいよー。フニちゃんにはこれ！　チーズとハチミツたっぷりのピザ！」"

[[dialogue]]
speaker = "舞亜"
# 「それじゃファンサービス行くよっ！　トウクリスティー――からのっ、連続高速スピンっ」
line = "「それじゃファンサービス行くよっ！　トウクリスティー――からのっ、連続高速スピンっ」"

[[dialogue]]
speaker = "フェニエル"
# 「こんな間近で舞亜さんの演技が見られるなんてっ……幸せすぎておかしくなっちゃいます……」
line = "「こんな間近で舞亜さんの演技が見られるなんてっ……幸せすぎておかしくなっちゃいます……」"

[[dialogue]]
speaker = "舞亜"
# 「あはははっ、今日はいっぱいサービスしちゃうよ！　なんたってクリスマスパーティーだからねっ♪」
line = "「あはははっ、今日はいっぱいサービスしちゃうよ！　なんたってクリスマスパーティーだからねっ♪」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「……間近で見ると圧巻ですわね……」
line = "「……間近で見ると圧巻ですわね……」"

[[dialogue]]
speaker = "フェニエル"
# 「録画しとけばよかったぁぁぁ！　北海道のみんなにも見せてあげたかったぁ！」
line = "「録画しとけばよかったぁぁぁ！　北海道のみんなにも見せてあげたかったぁ！」"

[[dialogue]]
speaker = "unk"
# 喜んで撮らせてくれるよ
line = "喜んで撮らせてくれるよ"

[[dialogue]]
speaker = "unk"
# お願いしてみたら？
line = "お願いしてみたら？"

[[dialogue]]
speaker = "フェニエル"
# 「えへへ、そうですかねぇ……？　じゃあ頼んでみようかなぁ……」
line = "「えへへ、そうですかねぇ……？　じゃあ頼んでみようかなぁ……」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「フニがここまでデレデレになるとは思いませんでしたわ」
line = "「フニがここまでデレデレになるとは思いませんでしたわ」"

[[dialogue]]
speaker = "アポロ"
# 「はぁ、はぁ、はぁ……やっと逃げられたぞ……なんてしつこいんだ、あいつら」
line = "「はぁ、はぁ、はぁ……やっと逃げられたぞ……なんてしつこいんだ、あいつら」"

[[dialogue]]
speaker = "アニュラス"
# 「しばし休んで体力を回復させるといい。ほら、チキンを持って来てやったぞ」
line = "「しばし休んで体力を回復させるといい。ほら、チキンを持って来てやったぞ」"

[[dialogue]]
speaker = "アポロ"
# 「んっ、クリスマスと言えばやっぱりチキンだよな！　もぐもぐもぐもぐ……うん、うまい！」
line = "「んっ、クリスマスと言えばやっぱりチキンだよな！　もぐもぐもぐもぐ……うん、うまい！」"

[[dialogue]]
speaker = "アポロ"
# 「魔王たちも楽しんでるか？　ほら、チキンうまいぞ。ヒルディオーネ、おまえも食え！」
line = "「魔王たちも楽しんでるか？　ほら、チキンうまいぞ。ヒルディオーネ、おまえも食え！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ありがとうございます、頂きますわ」
line = "「ありがとうございます、頂きますわ」"

[[dialogue]]
speaker = "アポロ"
# 「ちなみにそのチキンはアニュラスが焼いたやつなっ」
line = "「ちなみにそのチキンはアニュラスが焼いたやつなっ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「んぐっ！　だ、大丈夫ですの？」
line = "「んぐっ！　だ、大丈夫ですの？」"

[[dialogue]]
speaker = "アニュラス"
# 「失礼な。これでも会長からはＯＫをもらっているんだぞ」
line = "「失礼な。これでも会長からはＯＫをもらっているんだぞ」"

[[dialogue]]
speaker = "unk"
# チキンはＯＫだよ
line = "チキンはＯＫだよ"

[[dialogue]]
speaker = "unk"
# ケーキは無理だったけどね
line = "ケーキは無理だったけどね"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「そう……でしたら安心して頂きますわ」
line = "「そう……でしたら安心して頂きますわ」"

[[dialogue]]
speaker = "アニュラス"
# 「可能ならケーキも及第点をもらいたかったんだが……」
line = "「可能ならケーキも及第点をもらいたかったんだが……」"

[[dialogue]]
speaker = "アポロ"
# 「ケーキは舞亜がいるからなっ。あっちはクリスマスフォームのモチーフがパティシエなんだし、無理するなって」
line = "「ケーキは舞亜がいるからなっ。あっちはクリスマスフォームのモチーフがパティシエなんだし、無理するなって」"

[[dialogue]]
speaker = "アニュラス"
# 「わかった。しかし、諦めるつもりはないぞ。いつか必ずおいしいケーキを焼いて見せる！」
line = "「わかった。しかし、諦めるつもりはないぞ。いつか必ずおいしいケーキを焼いて見せる！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「……根性ありますわね」
line = "「……根性ありますわね」"

[[dialogue]]
speaker = "アニュラス"
# 「ふふっ、それだけが取り柄だからな」
line = "「ふふっ、それだけが取り柄だからな」"

[[dialogue]]
speaker = "unk"
# 他にもいっぱいいいところがある
line = "他にもいっぱいいいところがある"

[[dialogue]]
speaker = "unk"
# 根性だけじゃない
line = "根性だけじゃない"

[[dialogue]]
speaker = "アニュラス"
# 「そうか？　では私が知らない私を、みんなが知っていると言うことだな」
line = "「そうか？　では私が知らない私を、みんなが知っていると言うことだな」"

[[dialogue]]
speaker = "アニュラス"
# 「今回はいい教訓を得た。私はまた１つ流星の騎士に近づけただろう。ここにいる全員に感謝だ」
line = "「今回はいい教訓を得た。私はまた１つ流星の騎士に近づけただろう。ここにいる全員に感謝だ」"
