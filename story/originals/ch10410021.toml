[[dialogue]]
speaker = "unk"
# 第１話,お試しの恋人,P
line = "第１話,お試しの恋人,P"

[[dialogue]]
speaker = "unk"
# ネーゼマインと恋人関係になってしばらく経ったある日、公安委員会の任務を終えた後に、２人で一息ついていた。
line = "ネーゼマインと恋人関係になってしばらく経ったある日、公安委員会の任務を終えた後に、２人で一息ついていた。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「会長、コンビニへのお使いありがとね～。うん、そのブラックコーヒーで大丈夫～」
line = "「会長、コンビニへのお使いありがとね～。うん、そのブラックコーヒーで大丈夫～」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「でも、奢ってくれなくても、別によかったのに。今日は私の方が仕事を手伝ってもらったわけだし、むしろ会長に奢ろうと思ってたんだけど……」
line = "「でも、奢ってくれなくても、別によかったのに。今日は私の方が仕事を手伝ってもらったわけだし、むしろ会長に奢ろうと思ってたんだけど……」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「――彼氏として、彼女を労いたい？　にひひ、なにそれ～、カッコつけちゃって～♪」
line = "「――彼氏として、彼女を労いたい？　にひひ、なにそれ～、カッコつけちゃって～♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ただ、言われてみればこの頃、恋人らしいことできてなかったよね？　お互い学園の仕事でやたら忙しくて、全然会えてなかったし」
line = "「ただ、言われてみればこの頃、恋人らしいことできてなかったよね？　お互い学園の仕事でやたら忙しくて、全然会えてなかったし」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「まぁ、恋人って言っても、お試し中ではあるんだけどさ～」
line = "「まぁ、恋人って言っても、お試し中ではあるんだけどさ～」"

[[dialogue]]
speaker = "unk"
# そう、マインとは、正式な恋人関係ではない。以前、俺が彼女に好きだと告白した時――
line = "そう、マインとは、正式な恋人関係ではない。以前、俺が彼女に好きだと告白した時――"

[[dialogue]]
speaker = "ネーゼマイン"
# 「会長～、私のことが好きってマジで言ってる？　――そっか～、本気なのか～」
line = "「会長～、私のことが好きってマジで言ってる？　――そっか～、本気なのか～」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「……ただ、私は多分、会長が思っているよりも性格のよくない女だと思うよ？　なにせ、自分で自分のことが好きじゃないくらいだからね～、私は」
line = "「……ただ、私は多分、会長が思っているよりも性格のよくない女だと思うよ？　なにせ、自分で自分のことが好きじゃないくらいだからね～、私は」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「それでも、私と付き合いたいと思う？　――ふ～ん、物好きだね～」
line = "「それでも、私と付き合いたいと思う？　――ふ～ん、物好きだね～」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「なら、まずはお試しで付き合ってみるのはどうかな？　私、恋愛経験は皆無だから、付き合うって実感が湧かないのが正直なところだけど……」
line = "「なら、まずはお試しで付き合ってみるのはどうかな？　私、恋愛経験は皆無だから、付き合うって実感が湧かないのが正直なところだけど……」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「会長のことは、まぁ……嫌いじゃないしね♪」
line = "「会長のことは、まぁ……嫌いじゃないしね♪」"

[[dialogue]]
speaker = "unk"
# ――そんなことがあって、マインとは未だお試し関係のまま、現在に至る。
line = "――そんなことがあって、マインとは未だお試し関係のまま、現在に至る。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「せっかくだし、久しぶりになんか恋人らしいことでもしてこっか？」
line = "「せっかくだし、久しぶりになんか恋人らしいことでもしてこっか？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「例えば、そうだな～。夜遅いけど、ゲームセンターはまだ空いている時間だし……寄ってく？」
line = "「例えば、そうだな～。夜遅いけど、ゲームセンターはまだ空いている時間だし……寄ってく？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「――にひひ♪　決まりだね。それじゃあ、ちょっとした夜デートってことで♪」
line = "「――にひひ♪　決まりだね。それじゃあ、ちょっとした夜デートってことで♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ほらほら～、会長、もっとしっかりゲームの操作しないと～♪」
line = "「ほらほら～、会長、もっとしっかりゲームの操作しないと～♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「せっかく私の好きなアーケードゲームの『ボムボムマン』のプレイスキルを伝授してあげようとしてるのに、全然集中できてないよ～？」
line = "「せっかく私の好きなアーケードゲームの『ボムボムマン』のプレイスキルを伝授してあげようとしてるのに、全然集中できてないよ～？」"

[[dialogue]]
speaker = "unk"
# だって、マインが密着してくるから……！
line = "だって、マインが密着してくるから……！"

[[dialogue]]
speaker = "ネーゼマイン"
# 「え～？　会長、そんなエッチこと考えてたの～？　やらしいんだ～<emoji=heart04>」
line = "「え～？　会長、そんなエッチこと考えてたの～？　やらしいんだ～<emoji=heart04>」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「それに恋人なんだから、これくらいのスキンシップは慣れていかないと～。ほらほら～♪」
line = "「それに恋人なんだから、これくらいのスキンシップは慣れていかないと～。ほらほら～♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「きゃははっ♪　太もも撫でてるだけなのに、会長の手、震えちゃってる～！　このままだと、ゲームオーバーになっちゃうよ～？」
line = "「きゃははっ♪　太もも撫でてるだけなのに、会長の手、震えちゃってる～！　このままだと、ゲームオーバーになっちゃうよ～？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ほら、耳元で応援してあげるから……がんばれ、がんばれ<emoji=heart04>　――ふぅ～っ<emoji=heart04>」
line = "「ほら、耳元で応援してあげるから……がんばれ、がんばれ<emoji=heart04>　――ふぅ～っ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ひゃわぁっ！？　耳に息が当たって……！
line = "ひゃわぁっ！？　耳に息が当たって……！"

[[dialogue]]
speaker = "ネーゼマイン"
# 「きゃはははっ♪　今、すっごい声が出たよ、会長～！　もう１回聞かせて欲しいな～<emoji=heart04>」
line = "「きゃはははっ♪　今、すっごい声が出たよ、会長～！　もう１回聞かせて欲しいな～<emoji=heart04>」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「あ♪　ほらほら、ちゃんとゲーム画面見て～？　このままじゃ追い詰められて、負けちゃうよ～？」
line = "「あ♪　ほらほら、ちゃんとゲーム画面見て～？　このままじゃ追い詰められて、負けちゃうよ～？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「――あ～、負けちゃったね～♪　会長、情けな～い<emoji=heart04>　女の子と密着したくらいで、動揺しちゃうなんて～。会長の、スケベ雑魚～<emoji=heart04>」
line = "「――あ～、負けちゃったね～♪　会長、情けな～い<emoji=heart04>　女の子と密着したくらいで、動揺しちゃうなんて～。会長の、スケベ雑魚～<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# いやこれ、どんなプレイ！？
line = "いやこれ、どんなプレイ！？"

[[dialogue]]
speaker = "ネーゼマイン"
# 「きゃははっ♪　恋人の協力プレイってやつかな～？」
line = "「きゃははっ♪　恋人の協力プレイってやつかな～？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「――ん～？　ゲームセンターに来たのに、ゲームを楽しまなくていいのかって？　それじゃあ、協力プレイは止めちゃってもいいのかな～？」
line = "「――ん～？　ゲームセンターに来たのに、ゲームを楽しまなくていいのかって？　それじゃあ、協力プレイは止めちゃってもいいのかな～？」"

[[dialogue]]
speaker = "unk"
# ……もう１回、お願いします
line = "……もう１回、お願いします"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひ♪　仕方ないな～」
line = "「にひひ♪　仕方ないな～」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「次はさっきよりも、長く続けられるように頑張ってね？　会長<emoji=heart04>」
line = "「次はさっきよりも、長く続けられるように頑張ってね？　会長<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# その後、ゲームセンターを出ての帰り道。マインは大きく伸びをすると――
line = "その後、ゲームセンターを出ての帰り道。マインは大きく伸びをすると――"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ん～♪　ストレス解消もできてスッキリした～♪」
line = "「ん～♪　ストレス解消もできてスッキリした～♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「あ、でも、会長は悶々としちゃって大変だったかな～？　なんてね～、にひひ♪」
line = "「あ、でも、会長は悶々としちゃって大変だったかな～？　なんてね～、にひひ♪」"

[[dialogue]]
speaker = "unk"
# 久しぶりにマインと遊べて、楽しかったよ
line = "久しぶりにマインと遊べて、楽しかったよ"

[[dialogue]]
speaker = "ネーゼマイン"
# 「……！　……あ～、会長はそういうこと、面と向かって言うんだもんな～」
line = "「……！　……あ～、会長はそういうこと、面と向かって言うんだもんな～」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ん～……あれ？　会長、まつ毛の上になんか、ゴミが付いてるよ？」
line = "「ん～……あれ？　会長、まつ毛の上になんか、ゴミが付いてるよ？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「――まだ取れてないね～。私が取ってあげるから、目を閉じてくれる？」
line = "「――まだ取れてないね～。私が取ってあげるから、目を閉じてくれる？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ん……ちゅっ<emoji=heart04>」
line = "「ん……ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ファッ！？　い、今、キス……！？
line = "ファッ！？　い、今、キス……！？"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひっ♪　いい顔だね～♪」
line = "「にひひっ♪　いい顔だね～♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「忙しい中、仕事と遊びに付き合ってくれた今日のお礼だよ♪」
line = "「忙しい中、仕事と遊びに付き合ってくれた今日のお礼だよ♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「じゃあ会長、またね～♪」
line = "「じゃあ会長、またね～♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「……ふぅ。久しぶりに会長とキス、しちゃったな～……」
line = "「……ふぅ。久しぶりに会長とキス、しちゃったな～……」"

[[dialogue]]
speaker = "ネーゼマイン"
# （本当は、頬っぺたにするつもりだったんだけど……）
line = "（本当は、頬っぺたにするつもりだったんだけど……）"

[[dialogue]]
speaker = "ネーゼマイン"
# （まぁ……うん。しばらく会えてなかったしね。その分ってことで……♪）
line = "（まぁ……うん。しばらく会えてなかったしね。その分ってことで……♪）"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひ……<emoji=heart04>」
line = "「にひひ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# その日は珍しく鼻歌を唄いながら、家への帰路に着くネーゼマインなのであった。
line = "その日は珍しく鼻歌を唄いながら、家への帰路に着くネーゼマインなのであった。"
