[[dialogue]]
speaker = "unk"
# 第２話,守護天使の休日？,P
line = "第２話,守護天使の休日？,P"

[[dialogue]]
speaker = "マグダレナ"
# 「私のわがままにお付き合いいただいてすみません。この世界を自分の目で見てみたいなどと……」
line = "「私のわがままにお付き合いいただいてすみません。この世界を自分の目で見てみたいなどと……」"

[[dialogue]]
speaker = "unk"
# 全然大丈夫です
line = "全然大丈夫です"

[[dialogue]]
speaker = "マグダレナ"
# 「ふふ、そう言っていただけてありがたいです」
line = "「ふふ、そう言っていただけてありがたいです」"

[[dialogue]]
speaker = "ソフィア"
# 「流星と新星の星徒会で案内することになりましたけど、ちょっと珍しい組み合わせですね。私と新星の会長さんとヴィーナスさんですから」
line = "「流星と新星の星徒会で案内することになりましたけど、ちょっと珍しい組み合わせですね。私と新星の会長さんとヴィーナスさんですから」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ところでその前に聞いておきたいんだけど、どうして私が御子なの？」
line = "「ところでその前に聞いておきたいんだけど、どうして私が御子なの？」"

[[dialogue]]
speaker = "マグダレナ"
# 「御子――いえ、今はヴィーナスさまとお呼びしましょう」
line = "「御子――いえ、今はヴィーナスさまとお呼びしましょう」"

[[dialogue]]
speaker = "マグダレナ"
# 「今はこの身の堕天を防ぐため、本体とのリンクは絶っている状態です。正気を失った守護天使マグダレナの中の、わずかに残った理性。それを切り取ったものが私です」
line = "「今はこの身の堕天を防ぐため、本体とのリンクは絶っている状態です。正気を失った守護天使マグダレナの中の、わずかに残った理性。それを切り取ったものが私です」"

[[dialogue]]
speaker = "マグダレナ"
# 「ですから申し訳ありません。今この体の私が持っている情報は完全ではなく、あの時フィーニスの塔で話した以上のことはわからないのです」
line = "「ですから申し訳ありません。今この体の私が持っている情報は完全ではなく、あの時フィーニスの塔で話した以上のことはわからないのです」"

[[dialogue]]
speaker = "ソフィア"
# 「コンピューターで言うなら、データの一部だけを移植した状態……ということでしょうか。やはり力も万全ではないのですか？」
line = "「コンピューターで言うなら、データの一部だけを移植した状態……ということでしょうか。やはり力も万全ではないのですか？」"

[[dialogue]]
speaker = "マグダレナ"
# 「はい。元々、守護天使は女神様から力を与えられた存在ですが、今はそのごく一部しか発揮できません」
line = "「はい。元々、守護天使は女神様から力を与えられた存在ですが、今はそのごく一部しか発揮できません」"

[[dialogue]]
speaker = "ヴィーナス"
# 「でもなんだかんだ言って強いんでしょ？　それなら十分よ。マグダレナの本体もそのうち取り返してあげるわ！」
line = "「でもなんだかんだ言って強いんでしょ？　それなら十分よ。マグダレナの本体もそのうち取り返してあげるわ！」"

[[dialogue]]
speaker = "マグダレナ"
# 「ふふっ、ありがとうございます。心強いです」
line = "「ふふっ、ありがとうございます。心強いです」"

[[dialogue]]
speaker = "ヴィーナス"
# 「せっかくなんだから今はこの世界を楽しみましょ。今日の予定は？　どこか行きたいところある？」
line = "「せっかくなんだから今はこの世界を楽しみましょ。今日の予定は？　どこか行きたいところある？」"

[[dialogue]]
speaker = "マグダレナ"
# 「それが、今の私には右も左もわからない状態でして……」
line = "「それが、今の私には右も左もわからない状態でして……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「じゃあ映画にしましょ！　とびっきりロマンチックなやつ！」
line = "「じゃあ映画にしましょ！　とびっきりロマンチックなやつ！」"

[[dialogue]]
speaker = "ソフィア"
# 「ならパンケーキのお店にしましょう。最近評判のお店があってですね」
line = "「ならパンケーキのお店にしましょう。最近評判のお店があってですね」"

[[dialogue]]
speaker = "マグダレナ"
# 「ええと……会長さまのおすすめはありますでしょうか？」
line = "「ええと……会長さまのおすすめはありますでしょうか？」"

[[dialogue]]
speaker = "unk"
# のんびりお散歩とか？
line = "のんびりお散歩とか？"

[[dialogue]]
speaker = "マグダレナ"
# 「ふふ……そうですね、私にはそれが性に合っているのかもしれません」
line = "「ふふ……そうですね、私にはそれが性に合っているのかもしれません」"

[[dialogue]]
speaker = "ヴィーナス"
# 「オッケー。たまにはあてもなくブラブラしましょうか」
line = "「オッケー。たまにはあてもなくブラブラしましょうか」"

[[dialogue]]
speaker = "マグダレナ"
# 「メロンパン、というのですね。甘くて香ばしくて、それにとても食感が良いです」
line = "「メロンパン、というのですね。甘くて香ばしくて、それにとても食感が良いです」"

[[dialogue]]
speaker = "ソフィア"
# 「ヴィーナスさんとマグダレナさん、とても美人ですからとても目立ってますね。しかも……」
line = "「ヴィーナスさんとマグダレナさん、とても美人ですからとても目立ってますね。しかも……」"

[[dialogue]]
speaker = "ソフィア"
# （抜群のプロポーション……！　私が男だったら振り返らない自信はないかもしれません……）
line = "（抜群のプロポーション……！　私が男だったら振り返らない自信はないかもしれません……）"

[[dialogue]]
speaker = "ウィステリア"
# 「はぁ～……」
line = "「はぁ～……」"

[[dialogue]]
speaker = "マグダレナ"
# 「あら……あなたは確か、司書のウィステリアさま。何かお悩みがあれば聞かせてください。微力ながらお力になりますよ」
line = "「あら……あなたは確か、司書のウィステリアさま。何かお悩みがあれば聞かせてください。微力ながらお力になりますよ」"

[[dialogue]]
speaker = "ウィステリア"
# 「えっ？　守護天使……さん？　いえそんな、大したことじゃないですし、わざわざお話するようなことじゃ……」
line = "「えっ？　守護天使……さん？　いえそんな、大したことじゃないですし、わざわざお話するようなことじゃ……」"

[[dialogue]]
speaker = "マグダレナ"
# 「お気になさらず。永きにわたって世界を見守ってきた守護天使にとって、この世界に生きる者は皆我が子のようなもの」
line = "「お気になさらず。永きにわたって世界を見守ってきた守護天使にとって、この世界に生きる者は皆我が子のようなもの」"

[[dialogue]]
speaker = "マグダレナ"
# 「小さなことでも大きなことでも、子の苦しみに寄り添い、良き方向へ導くのは当然のことではありませんか」
line = "「小さなことでも大きなことでも、子の苦しみに寄り添い、良き方向へ導くのは当然のことではありませんか」"

[[dialogue]]
speaker = "ウィステリア"
# 「マグダレナさん……」
line = "「マグダレナさん……」"

[[dialogue]]
speaker = "マグダレナ"
# 「まずは落ち着いてください。メロンパンをどうぞ」
line = "「まずは落ち着いてください。メロンパンをどうぞ」"

[[dialogue]]
speaker = "ウィステリア"
# 「ありがとうございます。……あ、おいしい」
line = "「ありがとうございます。……あ、おいしい」"

[[dialogue]]
speaker = "ウィステリア"
# 「実はいつのまにか冷蔵庫が壊れてて、中身が全滅して……修理を頼もうにも時間がかかるし、でも新品は高いし……」
line = "「実はいつのまにか冷蔵庫が壊れてて、中身が全滅して……修理を頼もうにも時間がかかるし、でも新品は高いし……」"

[[dialogue]]
speaker = "ウィステリア"
# 「仕方ないから当分はコンビニと外食で済ませようと思ったけど、家の近くのコンビニが改装で休業しちゃって……」
line = "「仕方ないから当分はコンビニと外食で済ませようと思ったけど、家の近くのコンビニが改装で休業しちゃって……」"

[[dialogue]]
speaker = "ウィステリア"
# 「下ろしたばっかりの現金も落としちゃうし……最近こんなのばっかり……給料日まだ遠いのに……」
line = "「下ろしたばっかりの現金も落としちゃうし……最近こんなのばっかり……給料日まだ遠いのに……」"

[[dialogue]]
speaker = "ソフィア"
# （思ったより切実だった……）
line = "（思ったより切実だった……）"

[[dialogue]]
speaker = "マグダレナ"
# 「大丈夫です、ウィステリアさま。確かに不運が重なることはあります。ですが人生は長いのです」
line = "「大丈夫です、ウィステリアさま。確かに不運が重なることはあります。ですが人生は長いのです」"

[[dialogue]]
speaker = "マグダレナ"
# 「不運が続くように感じても、一生の中では一瞬なのです。必ず良いことはあります」
line = "「不運が続くように感じても、一生の中では一瞬なのです。必ず良いことはあります」"

[[dialogue]]
speaker = "ウィステリア"
# 「いつも赤信号に引っ掛かったり、おみくじで凶か大凶しか引いたことがなかったとしても……？」
line = "「いつも赤信号に引っ掛かったり、おみくじで凶か大凶しか引いたことがなかったとしても……？」"

[[dialogue]]
speaker = "マグダレナ"
# 「はい」
line = "「はい」"

[[dialogue]]
speaker = "ウィステリア"
# 「業者の手違いで水道とガスと電気が同時に止められてもですか……？」
line = "「業者の手違いで水道とガスと電気が同時に止められてもですか……？」"

[[dialogue]]
speaker = "ヴィーナス"
# （この人こんなに運悪かったんだ……！）
line = "（この人こんなに運悪かったんだ……！）"

[[dialogue]]
speaker = "マグダレナ"
# 「それでもです。時に打ちひしがれてもかまいません。立ち止まるのも良いでしょう」
line = "「それでもです。時に打ちひしがれてもかまいません。立ち止まるのも良いでしょう」"

[[dialogue]]
speaker = "マグダレナ"
# 「ですが時が傷を少し癒してくれたなら、ちゃんと顔を上げて前を向くのが幸福に近づく第一歩です」
line = "「ですが時が傷を少し癒してくれたなら、ちゃんと顔を上げて前を向くのが幸福に近づく第一歩です」"

[[dialogue]]
speaker = "ウィステリア"
# 「守護天使さま……！」
line = "「守護天使さま……！」"

[[dialogue]]
speaker = "ソフィア"
# 「それで、冷蔵庫はどうするんですか？」
line = "「それで、冷蔵庫はどうするんですか？」"

[[dialogue]]
speaker = "ウィステリア"
# 「あ～……後で考える。今はマグダレナさんに話聞いてもらえるだけでいいや……」
line = "「あ～……後で考える。今はマグダレナさんに話聞いてもらえるだけでいいや……」"

[[dialogue]]
speaker = "unk"
# 何も解決してないけど……
line = "何も解決してないけど……"

[[dialogue]]
speaker = "unk"
# 本人がそう言うならいいか！
line = "本人がそう言うならいいか！"

[[dialogue]]
speaker = "マグダレナ"
# 「ふふふふっ♪」
line = "「ふふふふっ♪」"
