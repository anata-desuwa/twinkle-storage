[[dialogue]]
speaker = "unk"
# 第２話,太くないって！,P
line = "第２話,太くないって！,P"

[[dialogue]]
speaker = "unk"
# ある日の昼休み、俺がフェリシー達と昼食を共にしていると――
line = "ある日の昼休み、俺がフェリシー達と昼食を共にしていると――"

[[dialogue]]
speaker = "フェリシー"
# 「ん～、今日の日替わり定食も美味しい～♪　この唐揚げ、絶品だよ～！　もぐもぐ……」
line = "「ん～、今日の日替わり定食も美味しい～♪　この唐揚げ、絶品だよ～！　もぐもぐ……」"

[[dialogue]]
speaker = "ソフレ"
# 「……フェリシー、気になることがあるのだわ」
line = "「……フェリシー、気になることがあるのだわ」"

[[dialogue]]
speaker = "unk"
# そう切り出したのは、流星学園２年、吸血鬼のソフレ・ヴァートリン。フェリシーのクラスメイトだ。
line = "そう切り出したのは、流星学園２年、吸血鬼のソフレ・ヴァートリン。フェリシーのクラスメイトだ。"

[[dialogue]]
speaker = "フェリシー"
# 「ん～？　どうしたの、ソフレ？」
line = "「ん～？　どうしたの、ソフレ？」"

[[dialogue]]
speaker = "ソフレ"
# 「お前、もしかして最近――」
line = "「お前、もしかして最近――」"

[[dialogue]]
speaker = "ソフレ"
# 「少し太ったのだわ？」
line = "「少し太ったのだわ？」"

[[dialogue]]
speaker = "フェリシー"
# 「っ……！　ごほっ、ごほごほっ！」
line = "「っ……！　ごほっ、ごほごほっ！」"

[[dialogue]]
speaker = "フェリシー"
# 「何を言い出すの、いきなり！？」
line = "「何を言い出すの、いきなり！？」"

[[dialogue]]
speaker = "ソフレ"
# 「いや、なんだか最近、お前の姿を見る度に違和感を覚えていたんだけど……その正体に今気付いたのだわ」
line = "「いや、なんだか最近、お前の姿を見る度に違和感を覚えていたんだけど……その正体に今気付いたのだわ」"

[[dialogue]]
speaker = "ソフレ"
# 「体型がいつもよりアンバランスなのよ。そう――」
line = "「体型がいつもよりアンバランスなのよ。そう――」"

[[dialogue]]
speaker = "ソフレ"
# 「お前の太もも……前より太くなってない？」
line = "「お前の太もも……前より太くなってない？」"

[[dialogue]]
speaker = "フェリシー"
# 「太くなってないよっ！？　何を証拠にそんな……！」
line = "「太くなってないよっ！？　何を証拠にそんな……！」"

[[dialogue]]
speaker = "ソフレ"
# 「さっき日替わり定食の前に、別の定食を食べてなかったかしら？」
line = "「さっき日替わり定食の前に、別の定食を食べてなかったかしら？」"

[[dialogue]]
speaker = "フェリシー"
# 「…………カフェテリアのご飯、美味しいから……」
line = "「…………カフェテリアのご飯、美味しいから……」"

[[dialogue]]
speaker = "ソフレ"
# 「確か、この前も定食を複数頼んでいたのだわ。それを考えると、やはり太――」
line = "「確か、この前も定食を複数頼んでいたのだわ。それを考えると、やはり太――」"

[[dialogue]]
speaker = "フェリシー"
# 「太ってないっ！！」
line = "「太ってないっ！！」"

[[dialogue]]
speaker = "ソフレ"
# 「それなら会長に聞いてみればいいのだわ。会長はフェリシーの太ももを見て、どう思う？」
line = "「それなら会長に聞いてみればいいのだわ。会長はフェリシーの太ももを見て、どう思う？」"

[[dialogue]]
speaker = "unk"
# ……太いか、太くないかで言えば、太――
line = "……太いか、太くないかで言えば、太――"

[[dialogue]]
speaker = "フェリシー"
# 「太くないってっ！！！　というか、なんで太ももが基準なの！？」
line = "「太くないってっ！！！　というか、なんで太ももが基準なの！？」"

[[dialogue]]
speaker = "ソフレ"
# 「フェリシーといえば、太ももなのだわ。それはもう、１００年前のフェリーチェよりも印象が強いくらいに」
line = "「フェリシーといえば、太ももなのだわ。それはもう、１００年前のフェリーチェよりも印象が強いくらいに」"

[[dialogue]]
speaker = "フェリシー"
# 「そんな風に見られてたの！？　ていうか私、ひいお祖母ちゃんよりも太いの！？」
line = "「そんな風に見られてたの！？　ていうか私、ひいお祖母ちゃんよりも太いの！？」"

[[dialogue]]
speaker = "unk"
# モンスター発生のアラート……！
line = "モンスター発生のアラート……！"

[[dialogue]]
speaker = "unk"
# 俺たち３人はモンスターが出現した場所に駆けつけ、戦闘を開始したのだが――
line = "俺たち３人はモンスターが出現した場所に駆けつけ、戦闘を開始したのだが――"

[[dialogue]]
speaker = "フェリシー"
# 「くっ……！　なんか、思うように体の動きが……！？」
line = "「くっ……！　なんか、思うように体の動きが……！？」"

[[dialogue]]
speaker = "フェリシー"
# 「ま、まさか……本当に体重が増えたから……！？」
line = "「ま、まさか……本当に体重が増えたから……！？」"

[[dialogue]]
speaker = "ソフレ"
# 「いや……体重が原因ではないのだわ」
line = "「いや……体重が原因ではないのだわ」"

[[dialogue]]
speaker = "フェリシー"
# 「え？」
line = "「え？」"

[[dialogue]]
speaker = "ソフレ"
# 「太ももが太くなったことが原因よ」
line = "「太ももが太くなったことが原因よ」"

[[dialogue]]
speaker = "フェリシー"
# 「だからなんで太もも！？」
line = "「だからなんで太もも！？」"

[[dialogue]]
speaker = "ソフレ"
# 「太ももが極端に太くなった結果――太もも同士の干渉により、足の可動域が減少したのよ！」
line = "「太ももが極端に太くなった結果――太もも同士の干渉により、足の可動域が減少したのよ！」"

[[dialogue]]
speaker = "unk"
# フェリシー、危ない！
line = "フェリシー、危ない！"

[[dialogue]]
speaker = "フェリシー"
# 「！　し、しまった！　足がもつれて避けられない……！」
line = "「！　し、しまった！　足がもつれて避けられない……！」"

[[dialogue]]
speaker = "フェリシー"
# 「って、会長くん！？　ひゃっ！？」
line = "「って、会長くん！？　ひゃっ！？」"

[[dialogue]]
speaker = "フェリシー"
# 「こ、これってお姫様抱っこ！？　ま、待って待って、いきなりこんな……！　心の準備がぁ～～～っつ！」
line = "「こ、これってお姫様抱っこ！？　ま、待って待って、いきなりこんな……！　心の準備がぁ～～～っつ！」"

[[dialogue]]
speaker = "ソフレ"
# 「いや、普段の距離感バグって近過ぎるお前が、なんでされる側になると、恥ずかしがってるのよ……えいっ」
line = "「いや、普段の距離感バグって近過ぎるお前が、なんでされる側になると、恥ずかしがってるのよ……えいっ」"

[[dialogue]]
speaker = "unk"
# その後、ツッコミ代わりにソフレの放った落雷攻撃で、モンスターは一掃された――
line = "その後、ツッコミ代わりにソフレの放った落雷攻撃で、モンスターは一掃された――"

[[dialogue]]
speaker = "フェリシー"
# 「――うぅ……会長くんにお姫様抱っこされるなんて……！」
line = "「――うぅ……会長くんにお姫様抱っこされるなんて……！」"

[[dialogue]]
speaker = "フェリシー"
# 「あっ、嫌なわけじゃないんだよ！？　で、でも今はタイミングが悪いというか、その……」
line = "「あっ、嫌なわけじゃないんだよ！？　で、でも今はタイミングが悪いというか、その……」"

[[dialogue]]
speaker = "ソフレ"
# 「なるほど、体重を気にしているのね。会長、実際どうなの？」
line = "「なるほど、体重を気にしているのね。会長、実際どうなの？」"

[[dialogue]]
speaker = "unk"
# ……重いか、重くないかで言えば、重――
line = "……重いか、重くないかで言えば、重――"

[[dialogue]]
speaker = "フェリシー"
# 「～～～っ！　だ、ダイエットする！　体重、絶対に元に戻すからぁぁぁっ！」
line = "「～～～っ！　だ、ダイエットする！　体重、絶対に元に戻すからぁぁぁっ！」"

[[dialogue]]
speaker = "unk"
# それから数週間後――
line = "それから数週間後――"

[[dialogue]]
speaker = "フェリシー"
# 「２人共見て！　あれからちゃんとダイエットして、体重を元に戻したよ！」
line = "「２人共見て！　あれからちゃんとダイエットして、体重を元に戻したよ！」"

[[dialogue]]
speaker = "unk"
# おぉっ、えらい！　おめでとう！
line = "おぉっ、えらい！　おめでとう！"

[[dialogue]]
speaker = "ソフレ"
# 「確かに、体型のバランスはよくなったのだわ」
line = "「確かに、体型のバランスはよくなったのだわ」"

[[dialogue]]
speaker = "ソフレ"
# 「でも……」
line = "「でも……」"

[[dialogue]]
speaker = "ソフレ"
# 「改めて見るとお前――太ももは最初から、滅茶苦茶太いわね」
line = "「改めて見るとお前――太ももは最初から、滅茶苦茶太いわね」"

[[dialogue]]
speaker = "フェリシー"
# 「太くないって！！！」
line = "「太くないって！！！」"

[[dialogue]]
speaker = "unk"
# そこだけは絶対に認めないフェリシーなのであった――
line = "そこだけは絶対に認めないフェリシーなのであった――"
