[[dialogue]]
speaker = "unk"
# 第２話,桜花爛漫,B
line = "第２話,桜花爛漫,B"

[[dialogue]]
speaker = "unk"
# ……。
line = "……。"

[[dialogue]]
speaker = "unk"
# …………。
line = "…………。"

[[dialogue]]
speaker = "ヘレナ"
# 「散る桜――残る桜も――散る桜――」
line = "「散る桜――残る桜も――散る桜――」"

[[dialogue]]
speaker = "ヘレナ"
# 「諸君、お初にお目にかかる。いや、場合によっては、久しぶりと言えるかもしれぬが――」
line = "「諸君、お初にお目にかかる。いや、場合によっては、久しぶりと言えるかもしれぬが――」"

[[dialogue]]
speaker = "ヘレナ"
# 「立てばプリティ、座ればゴージャス。泣く子も黙る、九浄家二十六代目当主・<b>九浄ヘレナ</b>ちゃんとは、私のこと」
line = "「立てばプリティ、座ればゴージャス。泣く子も黙る、九浄家二十六代目当主・<b>九浄ヘレナ</b>ちゃんとは、私のこと」"

[[dialogue]]
speaker = "ヘレナ"
# 「桜に代わって……成敗だ」
line = "「桜に代わって……成敗だ」"

[[dialogue]]
speaker = "せつな"
# 「……あの、当主様」
line = "「……あの、当主様」"

[[dialogue]]
speaker = "ヘレナ"
# 「む、どうかしたか？　せつな」
line = "「む、どうかしたか？　せつな」"

[[dialogue]]
speaker = "せつな"
# 「突然、お初にって……一体誰に名乗っているのでござるか？　それに何もない方を見たりして……」
line = "「突然、お初にって……一体誰に名乗っているのでござるか？　それに何もない方を見たりして……」"

[[dialogue]]
speaker = "ヘレナ"
# 「なに、我が内なる魂が名乗るべきタイミングだと囁いたのでな。どうやらここが『私の初めての出番』であるらしいと」
line = "「なに、我が内なる魂が名乗るべきタイミングだと囁いたのでな。どうやらここが『私の初めての出番』であるらしいと」"

[[dialogue]]
speaker = "せつな"
# 「は、はぁ……左様でござるか」
line = "「は、はぁ……左様でござるか」"

[[dialogue]]
speaker = "せつな"
# （相変わらず当主様は、不思議なことを言うお方でござる……）
line = "（相変わらず当主様は、不思議なことを言うお方でござる……）"

[[dialogue]]
speaker = "ヨミ"
# 「って、のんきに冗談を言ってる場合じゃありませんよ、ご当主様！」
line = "「って、のんきに冗談を言ってる場合じゃありませんよ、ご当主様！」"

[[dialogue]]
speaker = "ヨミ"
# 「今はヴィーナスお嬢様の行方がわからない一大事なんですから！」
line = "「今はヴィーナスお嬢様の行方がわからない一大事なんですから！」"

[[dialogue]]
speaker = "ヘレナ"
# 「ヨミヨミか。任務管轄係の仕事はよいのか？」
line = "「ヨミヨミか。任務管轄係の仕事はよいのか？」"

[[dialogue]]
speaker = "ヨミ"
# 「よ、よくはありませんが……どうしてもお嬢様のことが気がかりで、何度もミスをしてしまって……。それで、頭を冷やしていたところです……」
line = "「よ、よくはありませんが……どうしてもお嬢様のことが気がかりで、何度もミスをしてしまって……。それで、頭を冷やしていたところです……」"

[[dialogue]]
speaker = "せつな"
# 「……お嬢様が謎の影に<ruby=さら>拐</ruby>われて、もう丸２日以上――せつなもこれ以上は、じっとしていられませぬ！」
line = "「……お嬢様が謎の影に<ruby>拐<rt>さら</rt></ruby>われて、もう丸２日以上――せつなもこれ以上は、じっとしていられませぬ！」"

[[dialogue]]
speaker = "せつな"
# 「当主様、何卒、せつなにお嬢様捜索のご指示を下さいませ！　お願い致しまする！」
line = "「当主様、何卒、せつなにお嬢様捜索のご指示を下さいませ！　お願い致しまする！」"

[[dialogue]]
speaker = "ヘレナ"
# 「落ち着け、せつな。察するに……今は私の<b>手の届かぬところ</b>で事が推移しているようだ」
line = "「落ち着け、せつな。察するに……今は私の<b>手の届かぬところ</b>で事が推移しているようだ」"

[[dialogue]]
speaker = "ヘレナ"
# 「残念ながら、まだ我々の出番ではないということだ。ヨミヨミ、今月のモンスター出現傾向はどうなってる？」
line = "「残念ながら、まだ我々の出番ではないということだ。ヨミヨミ、今月のモンスター出現傾向はどうなってる？」"

[[dialogue]]
speaker = "ヨミ"
# 「あ、はい！　アステライトの出現が３５％増で、リクリエは着実に勢力を……って、そうじゃなくて！　ご当主様はお嬢様が心配じゃないんですか！？」
line = "「あ、はい！　アステライトの出現が３５％増で、リクリエは着実に勢力を……って、そうじゃなくて！　ご当主様はお嬢様が心配じゃないんですか！？」"

[[dialogue]]
speaker = "ヨミ"
# 「閃先輩なんか、ショックすぎて日課のストーキングがウォーキングになってしまったんですよ！？」
line = "「閃先輩なんか、ショックすぎて日課のストーキングがウォーキングになってしまったんですよ！？」"

[[dialogue]]
speaker = "ヘレナ"
# 「健康でよいではないか」
line = "「健康でよいではないか」"

[[dialogue]]
speaker = "せつな"
# 「いや、確かにそうでござるけども……」
line = "「いや、確かにそうでござるけども……」"

[[dialogue]]
speaker = "unk"
# せつなとヨミがいくら訴えようとも、ヘレナが平静な顔を変えることはなかった。
line = "せつなとヨミがいくら訴えようとも、ヘレナが平静な顔を変えることはなかった。"

[[dialogue]]
speaker = "unk"
# それは<ruby=ていかん>諦観</ruby>であったのか、それとも……
line = "それは<ruby>諦観<rt>ていかん</rt></ruby>であったのか、それとも……"

[[dialogue]]
speaker = "せつな"
# 「ハッ……せつな、わかったでござる！　当主様はその超常的な先見性で、お嬢様の無事を見通しているのでござるな！？」
line = "「ハッ……せつな、わかったでござる！　当主様はその超常的な先見性で、お嬢様の無事を見通しているのでござるな！？」"

[[dialogue]]
speaker = "ヨミ"
# 「！　なるほど！　それなら確かに、落ち着いているのも納得です！」
line = "「！　なるほど！　それなら確かに、落ち着いているのも納得です！」"

[[dialogue]]
speaker = "ヘレナ"
# 「？　いや？」
line = "「？　いや？」"

[[dialogue]]
speaker = "ヘレナ"
# 「ヴィーナスは──あるいはここで死ぬやもしれぬな。我が魂も、かつてない凶兆を囁いている」
line = "「ヴィーナスは──あるいはここで死ぬやもしれぬな。我が魂も、かつてない凶兆を囁いている」"

[[dialogue]]
speaker = "せつな"
# 「なっ……！？」
line = "「なっ……！？」"

[[dialogue]]
speaker = "ヨミ"
# 「そんな……！　ご当主様にとって、ヴィーナスお嬢様は大事な娘でしょう！？」
line = "「そんな……！　ご当主様にとって、ヴィーナスお嬢様は大事な娘でしょう！？」"

[[dialogue]]
speaker = "ヘレナ"
# 「大事な娘……か。私が腹を痛めて産んだわけではないが……確かにそうだな」
line = "「大事な娘……か。私が腹を痛めて産んだわけではないが……確かにそうだな」"

[[dialogue]]
speaker = "せつな"
# 「えっ！？　ご当主様は、ヴィーナスお嬢様の実母ではあられないのでござるか……！？」
line = "「えっ！？　ご当主様は、ヴィーナスお嬢様の実母ではあられないのでござるか……！？」"

[[dialogue]]
speaker = "ヨミ"
# 「……以前、メイド隊の先輩から聞いたことがあります。ご当主様とヴィーナスお嬢様の『出会い』──」
line = "「……以前、メイド隊の先輩から聞いたことがあります。ご当主様とヴィーナスお嬢様の『出会い』──」"

[[dialogue]]
speaker = "ヨミ"
# 「改めて、ご当主様の口からお聞きしたいです。ヴィーナスお嬢様は、昔の記憶がないとも仰っしゃっていたので」
line = "「改めて、ご当主様の口からお聞きしたいです。ヴィーナスお嬢様は、昔の記憶がないとも仰っしゃっていたので」"

[[dialogue]]
speaker = "ヘレナ"
# 「ふむ……わかった。今こそ語るべき機というやつか」
line = "「ふむ……わかった。今こそ語るべき機というやつか」"

[[dialogue]]
speaker = "ヘレナ"
# 「あれは５年前……いや、６年前だったか。ん？　４年前？　違うな、７年前だったような気も……」
line = "「あれは５年前……いや、６年前だったか。ん？　４年前？　違うな、７年前だったような気も……」"

[[dialogue]]
speaker = "ヨミ"
# 「うろ覚え！？　こ、細かいところは今いいですから……とにかく、数年前ですね？」
line = "「うろ覚え！？　こ、細かいところは今いいですから……とにかく、数年前ですね？」"

[[dialogue]]
speaker = "ヘレナ"
# 「うむ。当時、私は既に当主の座についていた。財政難を覆し、九浄の屋敷を再建させたのもちょうどその頃だったか」
line = "「うむ。当時、私は既に当主の座についていた。財政難を覆し、九浄の屋敷を再建させたのもちょうどその頃だったか」"

[[dialogue]]
speaker = "せつな"
# 「そういえば……昔の九浄家は、長らく低迷していたと聞いたことがあるでござる」
line = "「そういえば……昔の九浄家は、長らく低迷していたと聞いたことがあるでござる」"

[[dialogue]]
speaker = "ヨミ"
# 「はい。代替わりしたご当主様は次々と新事業を打ち立て、その手腕によって苦境の九浄家をみるみる復興させていったそうです」
line = "「はい。代替わりしたご当主様は次々と新事業を打ち立て、その手腕によって苦境の九浄家をみるみる復興させていったそうです」"

[[dialogue]]
speaker = "ヨミ"
# 「そうしてご当主様は、今の大資産家としての地位を築きました」
line = "「そうしてご当主様は、今の大資産家としての地位を築きました」"

[[dialogue]]
speaker = "せつな"
# 「せつなの――<ruby=しおう>紫桜</ruby>の里もまた、そんな九浄家の財力に助けられた場所の１つ……というわけでござるな」
line = "「せつなの――<ruby>紫桜<rt>しおう</rt></ruby>の里もまた、そんな九浄家の財力に助けられた場所の１つ……というわけでござるな」"

[[dialogue]]
speaker = "ヘレナ"
# 「新星学園なるものを立ち上げるから出資してくれないかと、持ちかけられたのもその頃だったか。まあ、それはよい」
line = "「新星学園なるものを立ち上げるから出資してくれないかと、持ちかけられたのもその頃だったか。まあ、それはよい」"

[[dialogue]]
speaker = "ヘレナ"
# 「それで……そう、ヴィーナスと出会った日の話だったな」
line = "「それで……そう、ヴィーナスと出会った日の話だったな」"

[[dialogue]]
speaker = "ヘレナ"
# （――光のどけき、ある春の日。私はいつものように屋敷でくつろいでいた）
line = "（――光のどけき、ある春の日。私はいつものように屋敷でくつろいでいた）"

[[dialogue]]
speaker = "ヨミ"
# （ふむふむ）
line = "（ふむふむ）"

[[dialogue]]
speaker = "せつな"
# （それでどうなったのでござるか？）
line = "（それでどうなったのでござるか？）"

[[dialogue]]
speaker = "ヘレナ"
# （うむ。その折、突然――時空の扉が開いた）
line = "（うむ。その折、突然――時空の扉が開いた）"

[[dialogue]]
speaker = "ヨミ"
# （はい？）
line = "（はい？）"

[[dialogue]]
speaker = "せつな"
# （急展開すぎるでござる！　えっと……何かの比喩でござるか？）
line = "（急展開すぎるでござる！　えっと……何かの比喩でござるか？）"

[[dialogue]]
speaker = "ヘレナ"
# （ただの事実だ。私も面食らいはしたが、確かに目の前には扉らしきものが開かれていた）
line = "（ただの事実だ。私も面食らいはしたが、確かに目の前には扉らしきものが開かれていた）"

[[dialogue]]
speaker = "ヘレナ"
# （程なくして、そこから幼き<ruby=おなご>女子</ruby>が歩み出てきた。両手に日記帳と、<ruby=かんざし>簪</ruby>を大事そうに抱えてな。そして奴はこう名乗ったわけだ）
line = "（程なくして、そこから幼き<ruby>女子<rt>おなご</rt></ruby>が歩み出てきた。両手に日記帳と、<ruby>簪<rt>かんざし</rt></ruby>を大事そうに抱えてな。そして奴はこう名乗ったわけだ）"

[[dialogue]]
speaker = "ヴィーナス"
# 「私はヴィーナス！　えーっと……この<ruby=かんざし>簪</ruby>が目に入らぬか！」
line = "「私はヴィーナス！　えーっと……この<ruby>簪<rt>かんざし</rt></ruby>が目に入らぬか！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私、まだ色んなこと思い出せないままなんだけど──お願い！　私を九浄家の娘にしてほしいの！」
line = "「私、まだ色んなこと思い出せないままなんだけど──お願い！　私を九浄家の娘にしてほしいの！」"

[[dialogue]]
speaker = "ヘレナ"
# （──とな）
line = "（──とな）"

[[dialogue]]
speaker = "せつな"
# 「その簪とは一体……？」
line = "「その簪とは一体……？」"

[[dialogue]]
speaker = "ヘレナ"
# 「ヴィーナスの示した簪は──調べた結果、九浄家に代々受け継がれてきた『<ruby=えんおう>鴛桜</ruby>の<ruby=かんざし>簪</ruby>』と判明した」
line = "「ヴィーナスの示した簪は──調べた結果、九浄家に代々受け継がれてきた『<ruby>鴛桜<rt>えんおう</rt></ruby>の<ruby>簪<rt>かんざし</rt></ruby>』と判明した」"

[[dialogue]]
speaker = "ヘレナ"
# 「それは本来、数十年前に失われていたもの。またその喪失をきっかけに、九浄家の没落が始まったとも言われている」
line = "「それは本来、数十年前に失われていたもの。またその喪失をきっかけに、九浄家の没落が始まったとも言われている」"

[[dialogue]]
speaker = "ヘレナ"
# 「そんな道具を、年端も行かぬ<ruby=おなご>女子</ruby>が持ち帰ってきたわけだから……ま、ただならぬ運命を感じるのも頷けよう？」
line = "「そんな道具を、年端も行かぬ<ruby>女子<rt>おなご</rt></ruby>が持ち帰ってきたわけだから……ま、ただならぬ運命を感じるのも頷けよう？」"

[[dialogue]]
speaker = "ヘレナ"
# 「故に私は、奴を娘として迎え入れ、九浄の名を与えることを決めた。ヴィーナスとの出会いはそんなところだ」
line = "「故に私は、奴を娘として迎え入れ、九浄の名を与えることを決めた。ヴィーナスとの出会いはそんなところだ」"

[[dialogue]]
speaker = "ヨミ"
# 「お嬢様はどこでその<ruby=かんざし>簪</ruby>を……」
line = "「お嬢様はどこでその<ruby>簪<rt>かんざし</rt></ruby>を……」"

[[dialogue]]
speaker = "ヘレナ"
# 「さてな。だが、九浄家の記録によれば、かの家宝は不幸な事故により跡形もなく破壊されたとある。当時の証言からも間違いはあるまい」
line = "「さてな。だが、九浄家の記録によれば、かの家宝は不幸な事故により跡形もなく破壊されたとある。当時の証言からも間違いはあるまい」"

[[dialogue]]
speaker = "ヨミ"
# 「え……？　それじゃあ、お嬢様が持ち帰ったものって――」
line = "「え……？　それじゃあ、お嬢様が持ち帰ったものって――」"

[[dialogue]]
speaker = "ヘレナ"
# 「本来、破壊され消滅したはずの宝を、傷ひとつない状態で持ってきた」
line = "「本来、破壊され消滅したはずの宝を、傷ひとつない状態で持ってきた」"

[[dialogue]]
speaker = "ヘレナ"
# 「そして私の前に開いた次元の扉。諸々を総合して私はこう結論づけた」
line = "「そして私の前に開いた次元の扉。諸々を総合して私はこう結論づけた」"

[[dialogue]]
speaker = "ヘレナ"
# 「ヴィーナスは──<b>ここならぬ世</b>から来た存在」
line = "「ヴィーナスは──<b>ここならぬ世</b>から来た存在」"

[[dialogue]]
speaker = "ヨミ"
# 「ここならぬ、世……」
line = "「ここならぬ、世……」"

[[dialogue]]
speaker = "ヘレナ"
# 「……かもしれない。ま、可能性の話だがな」
line = "「……かもしれない。ま、可能性の話だがな」"

[[dialogue]]
speaker = "せつな"
# 「で、でもそれって──？」
line = "「で、でもそれって──？」"

[[dialogue]]
speaker = "unk"
# その時、ヘレナに声がかかった。
line = "その時、ヘレナに声がかかった。"

[[dialogue]]
speaker = "閃"
# 「――当主様、失礼致します」
line = "「――当主様、失礼致します」"

[[dialogue]]
speaker = "せつな"
# 「あっ、閃殿！」
line = "「あっ、閃殿！」"

[[dialogue]]
speaker = "閃"
# 「幼きヴィーナスお嬢様の話、それはもう大変興味深く、改めてじっくりとお聞きしたいところではあるのですが――」
line = "「幼きヴィーナスお嬢様の話、それはもう大変興味深く、改めてじっくりとお聞きしたいところではあるのですが――」"

[[dialogue]]
speaker = "閃"
# 「当主様に会いたいというお客人がいらっしゃっておりまして……」
line = "「当主様に会いたいというお客人がいらっしゃっておりまして……」"

[[dialogue]]
speaker = "ヘレナ"
# 「ほう。貴殿か……珍しいな」
line = "「ほう。貴殿か……珍しいな」"

[[dialogue]]
speaker = "キリカ"
# 「ご無沙汰しております、九浄ヘレナ様」
line = "「ご無沙汰しております、九浄ヘレナ様」"

[[dialogue]]
speaker = "ヨミ"
# 「あなたは、星見家メイド長の……！」
line = "「あなたは、星見家メイド長の……！」"

[[dialogue]]
speaker = "せつな"
# 「上月キリカ殿……！」
line = "「上月キリカ殿……！」"

[[dialogue]]
speaker = "キリカ"
# 「あちらの命運は<b>お嬢様方</b>に託すとして──こちらの危機について、少しばかりお力をお借りしたく存じます。九浄の皆さま」
line = "「あちらの命運は<b>お嬢様方</b>に託すとして──こちらの危機について、少しばかりお力をお借りしたく存じます。九浄の皆さま」"
