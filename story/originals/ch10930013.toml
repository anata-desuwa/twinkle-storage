[[dialogue]]
speaker = "unk"
# 第３話,レッツ恋バナ！,P
line = "第３話,レッツ恋バナ！,P"

[[dialogue]]
speaker = "ミルフィー"
# 「はぁ……」
line = "「はぁ……」"

[[dialogue]]
speaker = "イクシリオン"
# 「ミルフィーさん、最近ため息が多いですね……」
line = "「ミルフィーさん、最近ため息が多いですね……」"

[[dialogue]]
speaker = "マグダレナ"
# 「もしかして、何か悩み事でも？　よろしければお力になりますが……」
line = "「もしかして、何か悩み事でも？　よろしければお力になりますが……」"

[[dialogue]]
speaker = "ミルフィー"
# 「そ、そんな！　マグダレナ様に相談なんて畏れ多いです！　こうやって一緒の席に座ってるだけでも精一杯なのに……！」
line = "「そ、そんな！　マグダレナ様に相談なんて畏れ多いです！　こうやって一緒の席に座ってるだけでも精一杯なのに……！」"

[[dialogue]]
speaker = "マグダレナ"
# 「貴方がそう畏まるのも無理はありません。ですが私は、私の愛しい信徒が苦しんでいるのを見過ごしたくはないのです。どうか、私に力にならせてもらえませんか……？」
line = "「貴方がそう畏まるのも無理はありません。ですが私は、私の愛しい信徒が苦しんでいるのを見過ごしたくはないのです。どうか、私に力にならせてもらえませんか……？」"

[[dialogue]]
speaker = "ミルフィー"
# 「マグダレナ様……！」
line = "「マグダレナ様……！」"

[[dialogue]]
speaker = "ミルフィー"
# 「……マグダレナ様にそこまで言われましたら、話さないわけにはいきませんね」
line = "「……マグダレナ様にそこまで言われましたら、話さないわけにはいきませんね」"

[[dialogue]]
speaker = "イクシリオン"
# 「私も！　私も相談に乗りますよ！」
line = "「私も！　私も相談に乗りますよ！」"

[[dialogue]]
speaker = "ミルフィー"
# 「イクシーちゃんもありがとう」
line = "「イクシーちゃんもありがとう」"

[[dialogue]]
speaker = "マグダレナ"
# 「それで悩みというのは……」
line = "「それで悩みというのは……」"

[[dialogue]]
speaker = "ミルフィー"
# 「はい、実は私……最近会長くんのことばかり考えてしまうんです……寝ても覚めても会長くんのことが頭から離れなくて……」
line = "「はい、実は私……最近会長くんのことばかり考えてしまうんです……寝ても覚めても会長くんのことが頭から離れなくて……」"

[[dialogue]]
speaker = "ミルフィー"
# 「今会長くんは何してるんだろうとか、会長くんと今日は話せたなぁとか……なんだったら夢にまで会長くんが出てきてしまって……」
line = "「今会長くんは何してるんだろうとか、会長くんと今日は話せたなぁとか……なんだったら夢にまで会長くんが出てきてしまって……」"

[[dialogue]]
speaker = "イクシリオン"
# 「そ、それは……」
line = "「そ、それは……」"

[[dialogue]]
speaker = "イクシリオン"
# （完ッ全に恋！！　ミルフィーさんてば、会長に恋してしまってます！！　でもこの感じ……ミルフィーさんは恋を自覚されていないようですね……）
line = "（完ッ全に恋！！　ミルフィーさんてば、会長に恋してしまってます！！　でもこの感じ……ミルフィーさんは恋を自覚されていないようですね……）"

[[dialogue]]
speaker = "マグダレナ"
# 「なるほど……それでは勉学も部活にも支障をきたしてしまいますね」
line = "「なるほど……それでは勉学も部活にも支障をきたしてしまいますね」"

[[dialogue]]
speaker = "ミルフィー"
# 「そうなんです……私はクラス委員長としてしっかりしないといけないのに……」
line = "「そうなんです……私はクラス委員長としてしっかりしないといけないのに……」"

[[dialogue]]
speaker = "イクシリオン"
# 「そ、そのミルフィーさん、他に何か気になることとかありますか？　例えば会長のことを考えてると、ドキドキするとか……」
line = "「そ、そのミルフィーさん、他に何か気になることとかありますか？　例えば会長のことを考えてると、ドキドキするとか……」"

[[dialogue]]
speaker = "ミルフィー"
# 「！？　そうなのっ、会長くんのこと考えてると心臓がバクバクして……顔も、赤くなったり……して……」
line = "「！？　そうなのっ、会長くんのこと考えてると心臓がバクバクして……顔も、赤くなったり……して……」"

[[dialogue]]
speaker = "マグダレナ"
# 「なるほど……それはもしかすると病気かもしれませんね……」
line = "「なるほど……それはもしかすると病気かもしれませんね……」"

[[dialogue]]
speaker = "ミルフィー"
# 「びょ、病気ですか……！？」
line = "「びょ、病気ですか……！？」"

[[dialogue]]
speaker = "マグダレナ"
# 「はい……天使の中には、人間界で長く過ごしていると、体に変調をきたす者も現れるとか。人間界に順応出来なかった天使は、残念ながら……」
line = "「はい……天使の中には、人間界で長く過ごしていると、体に変調をきたす者も現れるとか。人間界に順応出来なかった天使は、残念ながら……」"

[[dialogue]]
speaker = "イクシリオン"
# （恋の病はある意味では病気ですが、この場合は違いますよ、マグダレナ様！）
line = "（恋の病はある意味では病気ですが、この場合は違いますよ、マグダレナ様！）"

[[dialogue]]
speaker = "イクシリオン"
# （そう、恋の病とは大人の病……！　健全な男女の心と身体を内側から蝕み、大人の階段を上らせ血沸き肉踊る酒池肉林へと……！）
line = "（そう、恋の病とは大人の病……！　健全な男女の心と身体を内側から蝕み、大人の階段を上らせ血沸き肉踊る酒池肉林へと……！）"

[[dialogue]]
speaker = "ミルフィー"
# 「どうしよう……私、そんな重い病気になっちゃったの……？」
line = "「どうしよう……私、そんな重い病気になっちゃったの……？」"

[[dialogue]]
speaker = "イクシリオン"
# 「ちょっと待ってください！　その判断は早計ですよ！　その原因が重い病気とは限りません！」
line = "「ちょっと待ってください！　その判断は早計ですよ！　その原因が重い病気とは限りません！」"

[[dialogue]]
speaker = "イクシリオン"
# 「ミルフィーさん、心臓がドキドキするのは会長のことを考えてる時だけなんですよね」
line = "「ミルフィーさん、心臓がドキドキするのは会長のことを考えてる時だけなんですよね」"

[[dialogue]]
speaker = "ミルフィー"
# 「うん、そうだけど……」
line = "「うん、そうだけど……」"

[[dialogue]]
speaker = "イクシリオン"
# 「他の異性のことを考えてもドキドキしたりしませんよね！」
line = "「他の異性のことを考えてもドキドキしたりしませんよね！」"

[[dialogue]]
speaker = "ミルフィー"
# 「うんしない……というか、考えることないかな」
line = "「うんしない……というか、考えることないかな」"

[[dialogue]]
speaker = "イクシリオン"
# 「ならそれはズバリ、恋の病です！！」
line = "「ならそれはズバリ、恋の病です！！」"

[[dialogue]]
speaker = "ミルフィー"
# 「！！？？」
line = "「！！？？」"

[[dialogue]]
speaker = "マグダレナ"
# 「あらまあ……そういうことでしたか」
line = "「あらまあ……そういうことでしたか」"

[[dialogue]]
speaker = "ミルフィー"
# 「そ、そんなっ、私は別に……！」
line = "「そ、そんなっ、私は別に……！」"

[[dialogue]]
speaker = "イクシリオン"
# 「じゃあ、想像してみてください。会長が誰か知らない女の子と付き合ったり、イチャイチャしているところを……！」
line = "「じゃあ、想像してみてください。会長が誰か知らない女の子と付き合ったり、イチャイチャしているところを……！」"

[[dialogue]]
speaker = "ミルフィー"
# 「そんなの………うっ、うぅぅ～～～！！」
line = "「そんなの………うっ、うぅぅ～～～！！」"

[[dialogue]]
speaker = "イクシリオン"
# 「辛い気持ちになりましたよね。だとすれば、それは恋で間違いありません！」
line = "「辛い気持ちになりましたよね。だとすれば、それは恋で間違いありません！」"

[[dialogue]]
speaker = "ミルフィー"
# 「私、恋してたんだ……会長くんに……」
line = "「私、恋してたんだ……会長くんに……」"

[[dialogue]]
speaker = "マグダレナ"
# 「ふふふ、悩み事が少し解決したようでよかったです」
line = "「ふふふ、悩み事が少し解決したようでよかったです」"

[[dialogue]]
speaker = "unk"
# ミルフィー、こんなところで何してるの？
line = "ミルフィー、こんなところで何してるの？"

[[dialogue]]
speaker = "ミルフィー"
# 「きゃああああああああ！！　かかかか会長くん！？」
line = "「きゃああああああああ！！　かかかか会長くん！？」"

[[dialogue]]
speaker = "unk"
# えと……そんなに驚いた？
line = "えと……そんなに驚いた？"

[[dialogue]]
speaker = "イクシリオン"
# 「ええと……ちょっと色々ありまして……はは」
line = "「ええと……ちょっと色々ありまして……はは」"

[[dialogue]]
speaker = "ミルフィー"
# 「そ、それで会長くん……私たちの会話、聞いてた……？」
line = "「そ、それで会長くん……私たちの会話、聞いてた……？」"

[[dialogue]]
speaker = "unk"
# 聞いてなかったけど……なんの話をしてたの？
line = "聞いてなかったけど……なんの話をしてたの？"

[[dialogue]]
speaker = "ミルフィー"
# 「そ、それは秘密！　絶対秘密！　会長くんにだけ秘密！！」
line = "「そ、それは秘密！　絶対秘密！　会長くんにだけ秘密！！」"

[[dialogue]]
speaker = "unk"
# すごい気になるんだけど……
line = "すごい気になるんだけど……"

[[dialogue]]
speaker = "マグダレナ"
# 「ふふ、聞かないであげてください」
line = "「ふふ、聞かないであげてください」"

[[dialogue]]
speaker = "イクシリオン"
# （それよりもミルフィーさん、ここは会長にアピールするチャンスですよ）
line = "（それよりもミルフィーさん、ここは会長にアピールするチャンスですよ）"

[[dialogue]]
speaker = "ミルフィー"
# （って言われても！　いきなりチャンスって言われても分かんないよっ）
line = "（って言われても！　いきなりチャンスって言われても分かんないよっ）"

[[dialogue]]
speaker = "イクシリオン"
# （デート、デートです！　男女の仲を深めるためにも、デートに誘いましょう！）
line = "（デート、デートです！　男女の仲を深めるためにも、デートに誘いましょう！）"

[[dialogue]]
speaker = "ミルフィー"
# （で、でででデート！？　会長くんと、私が……！？）
line = "（で、でででデート！？　会長くんと、私が……！？）"

[[dialogue]]
speaker = "ミルフィー"
# 「あ、あのっ、会長くん……！　その、ええと……」
line = "「あ、あのっ、会長くん……！　その、ええと……」"

[[dialogue]]
speaker = "ミルフィー"
# 「こ、今週の日曜日とか……空いてる？　あのえと、実はその会長くんと２人きりで、遊びに行きたいなぁって……」
line = "「こ、今週の日曜日とか……空いてる？　あのえと、実はその会長くんと２人きりで、遊びに行きたいなぁって……」"

[[dialogue]]
speaker = "unk"
# うん、空いてるよ。一緒に遊びに行こうか
line = "うん、空いてるよ。一緒に遊びに行こうか"

[[dialogue]]
speaker = "ミルフィー"
# 「やっぱりダメだよね！　ごめん……って、いいの！？」
line = "「やっぱりダメだよね！　ごめん……って、いいの！？」"

[[dialogue]]
speaker = "unk"
# うん、もちろん
line = "うん、もちろん"

[[dialogue]]
speaker = "ミルフィー"
# 「じゃ、じゃあ、約束ね……！　日曜日楽しみにしてるから！」
line = "「じゃ、じゃあ、約束ね……！　日曜日楽しみにしてるから！」"

[[dialogue]]
speaker = "unk"
# 純粋にミルフィーと一緒に遊びたくて約束したけど……これってもしかして、デートってやつなのでは？
line = "純粋にミルフィーと一緒に遊びたくて約束したけど……これってもしかして、デートってやつなのでは？"

[[dialogue]]
speaker = "unk"
# そう気づいてしまったら、心臓が早鐘を打ち、身体が熱くなったのだった。
line = "そう気づいてしまったら、心臓が早鐘を打ち、身体が熱くなったのだった。"
