[[dialogue]]
speaker = "イクシリオン"
# 「まさか、先生までバレンタインフォームになってしまうなんて……！」
line = "「まさか、先生までバレンタインフォームになってしまうなんて……！」"

[[dialogue]]
speaker = "unk"
# トワは１度落ち着いて、自分の衣装を見回しながら考え込む。
line = "トワは１度落ち着いて、自分の衣装を見回しながら考え込む。"

[[dialogue]]
speaker = "トワ先生"
# 「……これはおそらく、以前『太陽フレア』が起きた時と同じような現象じゃないかな――」
line = "「……これはおそらく、以前『太陽フレア』が起きた時と同じような現象じゃないかな――」"

[[dialogue]]
speaker = "イクシリオン"
# 「太陽フレアというと、トワ先生よりも前に、流星学園のフィオナ会長がウェディングフォームに覚醒したっていう……？」
line = "「太陽フレアというと、トワ先生よりも前に、流星学園のフィオナ会長がウェディングフォームに覚醒したっていう……？」"

[[dialogue]]
speaker = "トワ先生"
# 「そう。あの時はフィオナちゃんの星力が暴走して、その余波を受けたキリカちゃんやナミエルちゃんも、同じようにウェディングフォームに変身しちゃったの」
line = "「そう。あの時はフィオナちゃんの星力が暴走して、その余波を受けたキリカちゃんやナミエルちゃんも、同じようにウェディングフォームに変身しちゃったの」"

[[dialogue]]
speaker = "トワ先生"
# 「――今回も同じように、イクシリオンちゃんの力の余波で、私もバレンタインフォームに覚醒したんだと思う」
line = "「――今回も同じように、イクシリオンちゃんの力の余波で、私もバレンタインフォームに覚醒したんだと思う」"

[[dialogue]]
speaker = "イクシリオン"
# 「私の力が暴走したせいで……！　申し訳ありません、先生！」
line = "「私の力が暴走したせいで……！　申し訳ありません、先生！」"

[[dialogue]]
speaker = "トワ先生"
# 「ううん、謝らなくて大丈夫だよ。不測の事態ではあるけど、新しい力に目覚めるのは星騎士として喜ばしいことだからね」
line = "「ううん、謝らなくて大丈夫だよ。不測の事態ではあるけど、新しい力に目覚めるのは星騎士として喜ばしいことだからね」"

[[dialogue]]
speaker = "トワ先生"
# 「ま、まあ……ちょっとフリフリで、着てると照れくさくはあるけど……」
line = "「ま、まあ……ちょっとフリフリで、着てると照れくさくはあるけど……」"

[[dialogue]]
speaker = "イクシリオン"
# 「そんなことありません！　先生にとても似合っていますよ！」
line = "「そんなことありません！　先生にとても似合っていますよ！」"

[[dialogue]]
speaker = "トワ先生"
# 「あ、ありがとう♪　――とにかく、もう１度チョコ作りを試してみよう。星力の制御には、先生ちょっと自信あるから♪」
line = "「あ、ありがとう♪　――とにかく、もう１度チョコ作りを試してみよう。星力の制御には、先生ちょっと自信あるから♪」"

[[dialogue]]
speaker = "unk"
# そんなわけで、トワとイクシリオンは再びチョコ作りに取りかかった――のだが。
line = "そんなわけで、トワとイクシリオンは再びチョコ作りに取りかかった――のだが。"

[[dialogue]]
speaker = "トワ先生"
# 「し、失礼しま～す……！」
line = "「し、失礼しま～す……！」"

[[dialogue]]
speaker = "クロト"
# 「トワ先生、お疲れ様です。どうしました？」
line = "「トワ先生、お疲れ様です。どうしました？」"

[[dialogue]]
speaker = "トワ先生"
# 「あっ、会長くん……！　今日の仕事はもう終わり？　今、少し時間いいかな……？」
line = "「あっ、会長くん……！　今日の仕事はもう終わり？　今、少し時間いいかな……？」"

[[dialogue]]
speaker = "トワ先生"
# 「その……今日はバレンタインデーでしょ？　だから――」
line = "「その……今日はバレンタインデーでしょ？　だから――」"

[[dialogue]]
speaker = "トワ先生"
# 「は、はいっ……！　これ、チョコをどうぞ……！」
line = "「は、はいっ……！　これ、チョコをどうぞ……！」"

[[dialogue]]
speaker = "クロト"
# 「えっ、先生が俺に……？」
line = "「えっ、先生が俺に……？」"

[[dialogue]]
speaker = "トワ先生"
# 「う、うん……先生が生徒に渡すのは、やっぱり変かなって思ったんだけど……」
line = "「う、うん……先生が生徒に渡すのは、やっぱり変かなって思ったんだけど……」"

[[dialogue]]
speaker = "トワ先生"
# 「でも、この前のジューンブライドの時も、すごくお世話になったし……感謝の気持ちをちゃんと伝えたくて！」
line = "「でも、この前のジューンブライドの時も、すごくお世話になったし……感謝の気持ちをちゃんと伝えたくて！」"

[[dialogue]]
speaker = "クロト"
# 「驚いただけなので、そんなにかしこまらなくても大丈夫ですよ、先生。ううん――」
line = "「驚いただけなので、そんなにかしこまらなくても大丈夫ですよ、先生。ううん――」"

[[dialogue]]
speaker = "unk"
# クロトは柔らかく微笑み、言葉を続ける。
line = "クロトは柔らかく微笑み、言葉を続ける。"

[[dialogue]]
speaker = "クロト"
# 「ありがとう、トワちゃん。俺、本当に嬉しい」
line = "「ありがとう、トワちゃん。俺、本当に嬉しい」"

[[dialogue]]
speaker = "トワ先生"
# 「～～～っ！？　か、会長くん……<emoji=heart04>」
line = "「～～～っ！？　か、会長くん……<emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
# （はわわっ<emoji=heart04>　急にちゃん付けしてくるのは……ずるいよぉ……！　胸がドキドキ止まらなくなっちゃう……<emoji=heart04>）
line = "（はわわっ<emoji=heart04>　急にちゃん付けしてくるのは……ずるいよぉ……！　胸がドキドキ止まらなくなっちゃう……<emoji=heart04>）"

[[dialogue]]
speaker = "クロト"
# 「あのさ、トワちゃん。俺、前からずっと言いたかったことがあって――」
line = "「あのさ、トワちゃん。俺、前からずっと言いたかったことがあって――」"

[[dialogue]]
speaker = "トワ先生"
# 「な、なに……？」
line = "「な、なに……？」"

[[dialogue]]
speaker = "クロト"
# 「先生と生徒じゃなくて――俺と恋人として付き合ってほしい」
line = "「先生と生徒じゃなくて――俺と恋人として付き合ってほしい」"

[[dialogue]]
speaker = "トワ先生"
# 「はわわぁ～～～っ！？！？　こ、恋人ぉ！？」
line = "「はわわぁ～～～っ！？！？　こ、恋人ぉ！？」"

[[dialogue]]
speaker = "クロト"
# 「うん。ダメかな……？」
line = "「うん。ダメかな……？」"

[[dialogue]]
speaker = "トワ先生"
# 「で、でも、私は先生だし……年上だし……！」
line = "「で、でも、私は先生だし……年上だし……！」"

[[dialogue]]
speaker = "unk"
# クロトはトワの手を取って、まっすぐ見つめる。
line = "クロトはトワの手を取って、まっすぐ見つめる。"

[[dialogue]]
speaker = "クロト"
# 「立場も年齢も関係ない。俺はトワちゃんだから好きなんだ」
line = "「立場も年齢も関係ない。俺はトワちゃんだから好きなんだ」"

[[dialogue]]
speaker = "クロト"
# 「前に疑似結婚式で、愛を誓ってくれた時……あれは、本気じゃなかった？」
line = "「前に疑似結婚式で、愛を誓ってくれた時……あれは、本気じゃなかった？」"

[[dialogue]]
speaker = "トワ先生"
# 「わ、私は……」
line = "「わ、私は……」"

[[dialogue]]
speaker = "トワ先生"
# 「私は、会長くんのこと――！」
line = "「私は、会長くんのこと――！」"

[[dialogue]]
speaker = "イクシリオン"
# 「――先生！　トワ先生っ！」
line = "「――先生！　トワ先生っ！」"

[[dialogue]]
speaker = "トワ先生"
# 「……はっ！？　まさか今、私も妄想トリップしてた……！？」
line = "「……はっ！？　まさか今、私も妄想トリップしてた……！？」"

[[dialogue]]
speaker = "イクシリオン"
# 「は、はい。チョコを混ぜながらも、ずっとうっとりした顔で……それで――」
line = "「は、はい。チョコを混ぜながらも、ずっとうっとりした顔で……それで――」"

[[dialogue]]
speaker = "バレンタヒヒーン"
# 「バレンタヒヒーン！」
line = "「バレンタヒヒーン！」"

[[dialogue]]
speaker = "トワ先生"
# 「はわぁっ！？　ま、また動く巨大チョコができてるぅ～～～っ！？！？」
line = "「はわぁっ！？　ま、また動く巨大チョコができてるぅ～～～っ！？！？」"

[[dialogue]]
speaker = "イクシリオン"
# 「先生のバレンタインフォームも、私と同じように暴走状態になってしまっているみたいです……」
line = "「先生のバレンタインフォームも、私と同じように暴走状態になってしまっているみたいです……」"

[[dialogue]]
speaker = "unk"
# ――それから、１週間ほどが経過した。
line = "――それから、１週間ほどが経過した。"

[[dialogue]]
speaker = "unk"
# 放課後のたびに２人はチョコ作りを繰り返していたが……。
line = "放課後のたびに２人はチョコ作りを繰り返していたが……。"

[[dialogue]]
speaker = "バレンタヒヒーン"
# 「バレンタヒヒーン！！！」
line = "「バレンタヒヒーン！！！」"

[[dialogue]]
speaker = "トワ先生"
# 「はぁ、はぁ……！　ダメだ……何度やっても、途中で妄想が暴走して、動くチョコになっちゃう……！」
line = "「はぁ、はぁ……！　ダメだ……何度やっても、途中で妄想が暴走して、動くチョコになっちゃう……！」"

[[dialogue]]
speaker = "unk"
# 毎回どちらか、あるいは２人とも妄想トリップを引き起こし、結果――バレンタヒヒーンは量産され続けていた。
line = "毎回どちらか、あるいは２人とも妄想トリップを引き起こし、結果――バレンタヒヒーンは量産され続けていた。"

[[dialogue]]
speaker = "イクシリオン"
# 「……申し訳ありません、先生」
line = "「……申し訳ありません、先生」"

[[dialogue]]
speaker = "トワ先生"
# 「イクシリオンちゃん……？」
line = "「イクシリオンちゃん……？」"

[[dialogue]]
speaker = "イクシリオン"
# 「私の妄想癖のせいで、先生まで巻き込んでしまって……本当に恥ずかしいです……」
line = "「私の妄想癖のせいで、先生まで巻き込んでしまって……本当に恥ずかしいです……」"

[[dialogue]]
speaker = "unk"
# トワが顔を覗き込むと、イクシリオンはしょんぼりと肩を落としていた。
line = "トワが顔を覗き込むと、イクシリオンはしょんぼりと肩を落としていた。"

[[dialogue]]
speaker = "イクシリオン"
# 「私……先生に、まだ言えてなかったことがあって……」
line = "「私……先生に、まだ言えてなかったことがあって……」"

[[dialogue]]
speaker = "unk"
# イクシリオンは１度深呼吸をしてから、意を決して口を開く。
line = "イクシリオンは１度深呼吸をしてから、意を決して口を開く。"

[[dialogue]]
speaker = "イクシリオン"
# 「本当は私――普段から、<b>エッチで恥ずかしい</b>妄想ばかりしてるんですっ……！」
line = "「本当は私――普段から、<b>エッチで恥ずかしい</b>妄想ばかりしてるんですっ……！」"

[[dialogue]]
speaker = "トワ先生"
# 「えっ！？　突然なんのカミングアウト！？」
line = "「えっ！？　突然なんのカミングアウト！？」"

[[dialogue]]
speaker = "unk"
# イクシリオンの爆弾発言に、トワは思わず目を丸くして固まってしまうのだった。
line = "イクシリオンの爆弾発言に、トワは思わず目を丸くして固まってしまうのだった。"
