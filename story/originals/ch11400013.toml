[[dialogue]]
speaker = "unk"
# 第３話,ウェンディ式記憶術,P
line = "第３話,ウェンディ式記憶術,P"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「ご迷惑をおかけして、申し訳ありませんでしたわ」
line = "「ご迷惑をおかけして、申し訳ありませんでしたわ」"

[[dialogue]]
speaker = "unk"
# 虹を生み出す魔法に挑戦したノルトハウゼンだったが、それは失敗に終わってしまった。
line = "虹を生み出す魔法に挑戦したノルトハウゼンだったが、それは失敗に終わってしまった。"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「着替えまで用意して頂いて、ありがとうございました」
line = "「着替えまで用意して頂いて、ありがとうございました」"

[[dialogue]]
speaker = "リーリア"
# 「いえいえ、気にしなくても大丈夫ですよ。服のサイズ的にはどうですか～？　特に胸の辺りとかきつかったりしないですか？」
line = "「いえいえ、気にしなくても大丈夫ですよ。服のサイズ的にはどうですか～？　特に胸の辺りとかきつかったりしないですか？」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「ありがとうございます、丁度良いサイズですわ」
line = "「ありがとうございます、丁度良いサイズですわ」"

[[dialogue]]
speaker = "リーリア"
# 「その制服、私が新星学園に潜入するときに着てるものなんですけど～。そっかぁ～、私とぴったり同じくらいのサイズなんですね～☆」
line = "「その制服、私が新星学園に潜入するときに着てるものなんですけど～。そっかぁ～、私とぴったり同じくらいのサイズなんですね～☆」"

[[dialogue]]
speaker = "ウェンディ"
# 「同じくらいのサイズ……？」
line = "「同じくらいのサイズ……？」"

[[dialogue]]
speaker = "アイリーン"
# 「ノルトハウゼンさんとリーリアさんが……？」
line = "「ノルトハウゼンさんとリーリアさんが……？」"

[[dialogue]]
speaker = "リーリア"
# 「ど、どうしてそんなに見比べてるんですかね～？　ほらほら、おかしなことなんてなーんにも無いですよ～？」
line = "「ど、どうしてそんなに見比べてるんですかね～？　ほらほら、おかしなことなんてなーんにも無いですよ～？」"

[[dialogue]]
speaker = "ウェンディ"
# 「ノルトハウゼンさんに代わりの服を、となった時に、どうしてリーリアが真っ先に名乗りを上げたのか不思議でしたが……」
line = "「ノルトハウゼンさんに代わりの服を、となった時に、どうしてリーリアが真っ先に名乗りを上げたのか不思議でしたが……」"

[[dialogue]]
speaker = "アイリーン"
# 「もしかして、そういうアピールをしたかったから？」
line = "「もしかして、そういうアピールをしたかったから？」"

[[dialogue]]
speaker = "リーリア"
# 「あ、あはは～。２人が何を言ってるのか、私には何にも分かりませ～ん」
line = "「あ、あはは～。２人が何を言ってるのか、私には何にも分かりませ～ん」"

[[dialogue]]
speaker = "ウェンディ"
# 「まあ、いいです……わざわざ藪をつつく必要はありませんし、深くは突っ込まないでおきます」
line = "「まあ、いいです……わざわざ藪をつつく必要はありませんし、深くは突っ込まないでおきます」"

[[dialogue]]
speaker = "アイリーン"
# 「うんうん、リーリアさんかわいそう～♪」
line = "「うんうん、リーリアさんかわいそう～♪」"

[[dialogue]]
speaker = "リーリア"
# 「かわいそうとか言うなっ！」
line = "「かわいそうとか言うなっ！」"

[[dialogue]]
speaker = "ウェンディ"
# 「胸のサイズはともかく、ずっと制服のままでいるのは居心地が悪いでしょう。服が乾き次第持ってきますので」
line = "「胸のサイズはともかく、ずっと制服のままでいるのは居心地が悪いでしょう。服が乾き次第持ってきますので」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「ありがとうございます。ですが、わたくしは制服姿でも問題ありませんわ」
line = "「ありがとうございます。ですが、わたくしは制服姿でも問題ありませんわ」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「魔法アカデミーを卒業したのもそれほど昔のことではありませんし、特鉄隊に入隊した今でも学校には通っておりますから」
line = "「魔法アカデミーを卒業したのもそれほど昔のことではありませんし、特鉄隊に入隊した今でも学校には通っておりますから」"

[[dialogue]]
speaker = "リーリア"
# 「魔法アカデミー？　って何？」
line = "「魔法アカデミー？　って何？」"

[[dialogue]]
speaker = "アイリーン"
# 「ノルトハウゼンさんの通ってた魔法を教えてくれる学校だよ」
line = "「ノルトハウゼンさんの通ってた魔法を教えてくれる学校だよ」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「ハルツ魔法アカデミー、ですわ」
line = "「ハルツ魔法アカデミー、ですわ」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「けれど、正直に申し上げますと、わたくし勉強はあまり得意ではないんです」
line = "「けれど、正直に申し上げますと、わたくし勉強はあまり得意ではないんです」"

[[dialogue]]
speaker = "リーリア"
# 「えっ、そうなんですか？　すごく賢そうに見えるんですけど……」
line = "「えっ、そうなんですか？　すごく賢そうに見えるんですけど……」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「毎日遅くまで補習授業を受けているのですが、フィンチリー教官からは、それでは到底間に合わない、と言われておりますわ」
line = "「毎日遅くまで補習授業を受けているのですが、フィンチリー教官からは、それでは到底間に合わない、と言われておりますわ」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「魔法に関することだけでなく、語学、数学、社会学、あらゆる科目において壊滅的な成績ですの」
line = "「魔法に関することだけでなく、語学、数学、社会学、あらゆる科目において壊滅的な成績ですの」"

[[dialogue]]
speaker = "ウェンディ"
# 「壊滅的って……穏やかな口調で言われても」
line = "「壊滅的って……穏やかな口調で言われても」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「昔からどうにも物覚えがよくないのですわ。一生懸命覚えても、すぐに忘れてしまいますの」
line = "「昔からどうにも物覚えがよくないのですわ。一生懸命覚えても、すぐに忘れてしまいますの」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「一度、パディントンさんにアドバイスを頂いたこともあるのですけど……」
line = "「一度、パディントンさんにアドバイスを頂いたこともあるのですけど……」"

[[dialogue]]
speaker = "ウェンディ"
# 「パディントンさんというのは？」
line = "「パディントンさんというのは？」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「特鉄隊の副官を務めている方ですわ。一度目で見たものはすべて記憶してしまうそうでして」
line = "「特鉄隊の副官を務めている方ですわ。一度目で見たものはすべて記憶してしまうそうでして」"

[[dialogue]]
speaker = "アイリーン"
# 「へぇ～、それはすごいね……そのヒトからはどんなアドバイスをもらったの？」
line = "「へぇ～、それはすごいね……そのヒトからはどんなアドバイスをもらったの？」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「ええと……とにかく余計なものを目に入れないこと、だそうです」
line = "「ええと……とにかく余計なものを目に入れないこと、だそうです」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「記憶力を高めるために邪魔なものは排除して、きれいな心で物事と向き合うと『スーパーみこみこゾーン』に突入し最強になれるのだとか……」
line = "「記憶力を高めるために邪魔なものは排除して、きれいな心で物事と向き合うと『スーパーみこみこゾーン』に突入し最強になれるのだとか……」"

[[dialogue]]
speaker = "アイリーン"
# 「余計なものに気を取られないようにする、ってところまでは分かるんだけど……」
line = "「余計なものに気を取られないようにする、ってところまでは分かるんだけど……」"

[[dialogue]]
speaker = "ウェンディ"
# 「『スーパーみこみこゾーン』の辺りから、一気に胡散臭くなりましたね……」
line = "「『スーパーみこみこゾーン』の辺りから、一気に胡散臭くなりましたね……」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「実はその辺りは、わたくしにもよく分かりませんでした。ですがパディントンさんがおっしゃることなのですから、きっとそういった領域があるのでしょう」
line = "「実はその辺りは、わたくしにもよく分かりませんでした。ですがパディントンさんがおっしゃることなのですから、きっとそういった領域があるのでしょう」"

[[dialogue]]
speaker = "リーリア"
# 「ちなみにウェンディさんも記憶力いいですけど、何かコツとかあるんですか？」
line = "「ちなみにウェンディさんも記憶力いいですけど、何かコツとかあるんですか？」"

[[dialogue]]
speaker = "ウェンディ"
# 「えっ？　意識していることは特にありませんが、そうですね……」
line = "「えっ？　意識していることは特にありませんが、そうですね……」"

[[dialogue]]
speaker = "アイリーン"
# 「コツ、あるんだ！　どんな方法？　聞かせて聞かせて♪」
line = "「コツ、あるんだ！　どんな方法？　聞かせて聞かせて♪」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「是非、ご教授頂きたいですわ」
line = "「是非、ご教授頂きたいですわ」"

[[dialogue]]
speaker = "ウェンディ"
# 「物事を記号的に扱うのではなく、現実感のあるものに置き換えて考えてみるんです」
line = "「物事を記号的に扱うのではなく、現実感のあるものに置き換えて考えてみるんです」"

[[dialogue]]
speaker = "ウェンディ"
# 「例えば何か数字を覚えなくてはならない時、私ならその数字の後に貨幣の単位をつけますね」
line = "「例えば何か数字を覚えなくてはならない時、私ならその数字の後に貨幣の単位をつけますね」"

[[dialogue]]
speaker = "ウェンディ"
# 「５３８４５ではなく、５３８４５テルス……ほら、これだけでもう絶対に忘れなくなったでしょう？」
line = "「５３８４５ではなく、５３８４５テルス……ほら、これだけでもう絶対に忘れなくなったでしょう？」"

[[dialogue]]
speaker = "アイリーン"
# 「うわぁ……ウェンディさんの悪いトコ出てる……」
line = "「うわぁ……ウェンディさんの悪いトコ出てる……」"

[[dialogue]]
speaker = "リーリア"
# 「それで記憶力が跳ね上がるのは、お金にがめつ……厳しいウェンディさんだけですって～」
line = "「それで記憶力が跳ね上がるのは、お金にがめつ……厳しいウェンディさんだけですって～」"

[[dialogue]]
speaker = "ウェンディ"
# 「何とでも言ってください。もし記憶違いをしたせいで１テルスでも損したら大変なことじゃありませんか……そう考えると必死になりませんか？」
line = "「何とでも言ってください。もし記憶違いをしたせいで１テルスでも損したら大変なことじゃありませんか……そう考えると必死になりませんか？」"

[[dialogue]]
speaker = "アイリーン"
# 「スーパーみこみこゾーンに負けないくらい超謎理論だね～」
line = "「スーパーみこみこゾーンに負けないくらい超謎理論だね～」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「ふふっ、とても参考になりましたわ」
line = "「ふふっ、とても参考になりましたわ」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「ただ単純に単語や数字を覚えようとするのではなく、何か具体的なものを思い浮かべながら覚える……確かにその方が覚えやすいかもしれません」
line = "「ただ単純に単語や数字を覚えようとするのではなく、何か具体的なものを思い浮かべながら覚える……確かにその方が覚えやすいかもしれません」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「ありがとうございます、ウェンディさん。わたくし、今なら何でも覚えられそうな気がしてきましたわ♪」
line = "「ありがとうございます、ウェンディさん。わたくし、今なら何でも覚えられそうな気がしてきましたわ♪」"

[[dialogue]]
speaker = "ウェンディ"
# 「お力になれたのなら幸いです」
line = "「お力になれたのなら幸いです」"

[[dialogue]]
speaker = "アイリーン"
# 「よーし、それじゃ本当にノルトハウゼンさんの記憶力が上がったのか、確かめてみよう！」
line = "「よーし、それじゃ本当にノルトハウゼンさんの記憶力が上がったのか、確かめてみよう！」"

[[dialogue]]
speaker = "unk"
# それから４人でしばらく記憶力のテストをしてみたのだが、そんなことで簡単に解決するような話ではなく……
line = "それから４人でしばらく記憶力のテストをしてみたのだが、そんなことで簡単に解決するような話ではなく……"

[[dialogue]]
speaker = "unk"
# 結局、ノルトハウゼンの記憶力は向上しないままに終わったのだった。
line = "結局、ノルトハウゼンの記憶力は向上しないままに終わったのだった。"
