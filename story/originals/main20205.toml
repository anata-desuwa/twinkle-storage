[[dialogue]]
speaker = "unk"
# 第５話,新たなるメンバー,B
line = "第５話,新たなるメンバー,B"

[[dialogue]]
speaker = "梨緒"
# 「あの御前試合の日から、もう数ヶ月……か」
line = "「あの御前試合の日から、もう数ヶ月……か」"

[[dialogue]]
speaker = "梨緒"
# （これまで、緋宮クロトの動向を監視すると同時に、ジグの行方を探し続けてきた……）
line = "（これまで、緋宮クロトの動向を監視すると同時に、ジグの行方を探し続けてきた……）"

[[dialogue]]
speaker = "梨緒"
# （私が発見されたというこの場所に何らかの痕跡がないかを調べ、美術部にジグの似顔絵を描いてもらい目撃情報を募った。……しかし、成果はなし）
line = "（私が発見されたというこの場所に何らかの痕跡がないかを調べ、美術部にジグの似顔絵を描いてもらい目撃情報を募った。……しかし、成果はなし）"

[[dialogue]]
speaker = "梨緒"
# （ジグが暮らしていたはずの<ruby=ラルーナ>新星学園寮</ruby>の部屋も見に行ったが……空き部屋だった）
line = "（ジグが暮らしていたはずの<ruby>新星学園寮<rt>ラルーナ</rt></ruby>の部屋も見に行ったが……空き部屋だった）"

[[dialogue]]
speaker = "梨緒"
# 「緋宮クロトが口にしていた平行世界という言葉……確証こそないものの、状況証拠だけで言えばどんどん揃っていってしまう。まったく嫌になる」
line = "「緋宮クロトが口にしていた平行世界という言葉……確証こそないものの、状況証拠だけで言えばどんどん揃っていってしまう。まったく嫌になる」"

[[dialogue]]
speaker = "梨緒"
# （だが、もし仮にここが私たちの住んでいた世界とは異なる平行世界だったとして……あの状況から私だけが逃げ延びて、ジグが死んだとは考えづらい）
line = "（だが、もし仮にここが私たちの住んでいた世界とは異なる平行世界だったとして……あの状況から私だけが逃げ延びて、ジグが死んだとは考えづらい）"

[[dialogue]]
speaker = "梨緒"
# 「私は生まれてこの方、ジグに勝ったことが１度もないのだから……な」
line = "「私は生まれてこの方、ジグに勝ったことが１度もないのだから……な」"

[[dialogue]]
speaker = "梨緒"
# 「私が生きている以上、ジグも必ず生きている。もしかすると、すでにこの世界で活動を開始しているのかもしれない」
line = "「私が生きている以上、ジグも必ず生きている。もしかすると、すでにこの世界で活動を開始しているのかもしれない」"

[[dialogue]]
speaker = "梨緒"
# 「ジグ……早く私を見つけてくれ。いつものように、飄々とした態度で『何とでもなるさ』と声をかけてくれ」
line = "「ジグ……早く私を見つけてくれ。いつものように、飄々とした態度で『何とでもなるさ』と声をかけてくれ」"

[[dialogue]]
speaker = "梨緒"
# 「なあ、頼むよ……また私と勝負してくれ……」
line = "「なあ、頼むよ……また私と勝負してくれ……」"

[[dialogue]]
speaker = "unk"
# 何故か、ジグのことを考えると頭が痛む。
line = "何故か、ジグのことを考えると頭が痛む。"

[[dialogue]]
speaker = "unk"
# 心臓は早鐘を打ち、体中の血液がまるでジェットコースターのように急上昇と急降下を繰り返し、吐き気がする。
line = "心臓は早鐘を打ち、体中の血液がまるでジェットコースターのように急上昇と急降下を繰り返し、吐き気がする。"

[[dialogue]]
speaker = "梨緒"
# （そうだ、私には何か、やらなければならないことがあったはずだ……）
line = "（そうだ、私には何か、やらなければならないことがあったはずだ……）"

[[dialogue]]
speaker = "梨緒"
# （どこかで、誰かに託されたものが……私の中に……）
line = "（どこかで、誰かに託されたものが……私の中に……）"

[[dialogue]]
speaker = "アポロ"
# 「おーーっと！　こんなところに居やがったか！！」
line = "「おーーっと！　こんなところに居やがったか！！」"

[[dialogue]]
speaker = "梨緒"
# 「君は……フィオナじゃないか」
line = "「君は……フィオナじゃないか」"

[[dialogue]]
speaker = "アポロ"
# 「だーーっ！　もう！　あたしの名前はアポロだっつってんだろうが！　いい加減覚えろよな、ポンコツ！」
line = "「だーーっ！　もう！　あたしの名前はアポロだっつってんだろうが！　いい加減覚えろよな、ポンコツ！」"

[[dialogue]]
speaker = "梨緒"
# 「ポンコツ！？」
line = "「ポンコツ！？」"

[[dialogue]]
speaker = "アポロ"
# 「オマエがあたしの何を知ってるのかは知らねえけど、あたしにはあたしの矜持ってもんがあるんだ。流星ライダーをバカにするなよ！」
line = "「オマエがあたしの何を知ってるのかは知らねえけど、あたしにはあたしの矜持ってもんがあるんだ。流星ライダーをバカにするなよ！」"

[[dialogue]]
speaker = "梨緒"
# 「バカぁ！？」
line = "「バカぁ！？」"

[[dialogue]]
speaker = "梨緒"
# 「うぅぅ……やっぱり私は、ポンコツでバカな役立たずなんだ……」
line = "「うぅぅ……やっぱり私は、ポンコツでバカな役立たずなんだ……」"

[[dialogue]]
speaker = "アポロ"
# 「あっはっはっは！　なんだオマエ、やっぱ面白い奴だな！　何言ってるかゼンゼンわかんないぞ！」
line = "「あっはっはっは！　なんだオマエ、やっぱ面白い奴だな！　何言ってるかゼンゼンわかんないぞ！」"

[[dialogue]]
speaker = "アポロ"
# 「おっ、そうだ。グミいるか？　悲しい気持ちになった時はな、お菓子を食べるといいぞ！　甘いものを食べれば、だいたいのことはどうでもよくなる」
line = "「おっ、そうだ。グミいるか？　悲しい気持ちになった時はな、お菓子を食べるといいぞ！　甘いものを食べれば、だいたいのことはどうでもよくなる」"

[[dialogue]]
speaker = "梨緒"
# 「……い、頂こう」
line = "「……い、頂こう」"

[[dialogue]]
speaker = "アポロ"
# 「あっ！　グミは１つだけだからな！　貴重な今日の分のおやつから分けてやってるんだ、ちゃんと感謝して食べろよ！」
line = "「あっ！　グミは１つだけだからな！　貴重な今日の分のおやつから分けてやってるんだ、ちゃんと感謝して食べろよ！」"

[[dialogue]]
speaker = "梨緒"
# 「ああ。ありがとう、感謝する」
line = "「ああ。ありがとう、感謝する」"

[[dialogue]]
speaker = "unk"
# 梨緒がアポロからもらったグミを口に含むと、甘味が口いっぱいに広がる。悩みがどうでもよくなったりはしないが、いく分気持ちは落ち着いた。
line = "梨緒がアポロからもらったグミを口に含むと、甘味が口いっぱいに広がる。悩みがどうでもよくなったりはしないが、いく分気持ちは落ち着いた。"

[[dialogue]]
speaker = "梨緒"
# 「それでアポロ、どうしたんだ？　何やら私を探しているようだったが」
line = "「それでアポロ、どうしたんだ？　何やら私を探しているようだったが」"

[[dialogue]]
speaker = "アポロ"
# 「おお、そうだった！　あたしはオマエに聞きたいことがあったんだった」
line = "「おお、そうだった！　あたしはオマエに聞きたいことがあったんだった」"

[[dialogue]]
speaker = "梨緒"
# 「聞きたいこと……？」
line = "「聞きたいこと……？」"

[[dialogue]]
speaker = "アポロ"
# 「どうやらフィオナと魔王との間では話が付いてるらしいけどな、あたしとしては直接オマエの言葉が聞きたいんだ」
line = "「どうやらフィオナと魔王との間では話が付いてるらしいけどな、あたしとしては直接オマエの言葉が聞きたいんだ」"

[[dialogue]]
speaker = "アポロ"
# 「ズバリ、オマエの目的はなんだ……！？」
line = "「ズバリ、オマエの目的はなんだ……！？」"

[[dialogue]]
speaker = "梨緒"
# 「私の……目的？」
line = "「私の……目的？」"

[[dialogue]]
speaker = "アポロ"
# 「オマエは一体、何のために戦っているのかって話だ！　流星ライダーにとっても、星騎士にとっても１番重要なことだぞ！」
line = "「オマエは一体、何のために戦っているのかって話だ！　流星ライダーにとっても、星騎士にとっても１番重要なことだぞ！」"

[[dialogue]]
speaker = "梨緒"
# 「そ、それはもちろん……リクリエを止め、世界を救うことだ！」
line = "「そ、それはもちろん……リクリエを止め、世界を救うことだ！」"

[[dialogue]]
speaker = "アポロ"
# 「なるほど。つまりあたしや魔王と目的は一緒だな！　なのに何故、オマエは協力できないんだ」
line = "「なるほど。つまりあたしや魔王と目的は一緒だな！　なのに何故、オマエは協力できないんだ」"

[[dialogue]]
speaker = "梨緒"
# 「それは……」
line = "「それは……」"

[[dialogue]]
speaker = "梨緒"
# 「私は……魔王クロトが、世界を滅ぼす様をこの目で見たんだ……」
line = "「私は……魔王クロトが、世界を滅ぼす様をこの目で見たんだ……」"

[[dialogue]]
speaker = "梨緒"
# 「太陽の壁画でも伝えられている通り、魔王の力は世界を滅ぼしかねない危険な力だ。いち個人が野放図に振るっていいものだとは思えない」
line = "「太陽の壁画でも伝えられている通り、魔王の力は世界を滅ぼしかねない危険な力だ。いち個人が野放図に振るっていいものだとは思えない」"

[[dialogue]]
speaker = "アポロ"
# 「……ふむ」
line = "「……ふむ」"

[[dialogue]]
speaker = "梨緒"
# 「私は、私が見た絶望的な光景を忘れることができない……」
line = "「私は、私が見た絶望的な光景を忘れることができない……」"

[[dialogue]]
speaker = "梨緒"
# 「だが、ここではみんなが緋宮クロトを信用している」
line = "「だが、ここではみんなが緋宮クロトを信用している」"

[[dialogue]]
speaker = "梨緒"
# 「私だけが、みんなと違うことを信じている」
line = "「私だけが、みんなと違うことを信じている」"

[[dialogue]]
speaker = "梨緒"
# （そうだ。私は不安なんだ。……すべてを忘れて楽観的に構える図太さも、自分の主観を盲信して突き進む頑強さも、私には欠けている）
line = "（そうだ。私は不安なんだ。……すべてを忘れて楽観的に構える図太さも、自分の主観を盲信して突き進む頑強さも、私には欠けている）"

[[dialogue]]
speaker = "梨緒"
# （目の前にいるアポロ……<b>本物の</b>星見フィオナもそうだ。彼女は本来、もっと成熟した女の子だった）
line = "（目の前にいるアポロ……<b>本物の</b>星見フィオナもそうだ。彼女は本来、もっと成熟した女の子だった）"

[[dialogue]]
speaker = "梨緒"
# （今ここにある現実だと思っているものはすべて、死の間際に私が見ている妄想でないと、誰が保証できる……）
line = "（今ここにある現実だと思っているものはすべて、死の間際に私が見ている妄想でないと、誰が保証できる……）"

[[dialogue]]
speaker = "梨緒"
# 「教えてくれ、アポロ。私は狂ってしまったのか？」
line = "「教えてくれ、アポロ。私は狂ってしまったのか？」"

[[dialogue]]
speaker = "梨緒"
# 「私はもはや、自分自身すらも信じ切ることができない」
line = "「私はもはや、自分自身すらも信じ切ることができない」"

[[dialogue]]
speaker = "unk"
# うなだれながら言葉を紡ぐ梨緒を前にして、アポロは偉そうに頷いて見せた。
line = "うなだれながら言葉を紡ぐ梨緒を前にして、アポロは偉そうに頷いて見せた。"

[[dialogue]]
speaker = "アポロ"
# 「なるほど！　オマエの悩みは完全に理解した！」
line = "「なるほど！　オマエの悩みは完全に理解した！」"

[[dialogue]]
speaker = "アポロ"
# 「ならばヒーローを目指すあたしが、これからは一緒に悩んでやろう！！」
line = "「ならばヒーローを目指すあたしが、これからは一緒に悩んでやろう！！」"

[[dialogue]]
speaker = "梨緒"
# 「……なに？」
line = "「……なに？」"

[[dialogue]]
speaker = "アポロ"
# 「あたしは昔、ずっと１人で考えすぎて、大きく道を間違えた」
line = "「あたしは昔、ずっと１人で考えすぎて、大きく道を間違えた」"

[[dialogue]]
speaker = "アポロ"
# 「知ってるか？　ヒトってのは１人で考えていると、極端な答えを出しやすいんだぞ！」
line = "「知ってるか？　ヒトってのは１人で考えていると、極端な答えを出しやすいんだぞ！」"

[[dialogue]]
speaker = "アポロ"
# 「オマエが悩むなら、あたしが一緒に考えてやる」
line = "「オマエが悩むなら、あたしが一緒に考えてやる」"

[[dialogue]]
speaker = "アポロ"
# 「もしオマエが間違っていたら、あたしが『間違っている』と教えてやる！」
line = "「もしオマエが間違っていたら、あたしが『間違っている』と教えてやる！」"

[[dialogue]]
speaker = "アポロ"
# 「少なくとも、答えに悩んでいる今のオマエは、狂ってなんかいないぞ」
line = "「少なくとも、答えに悩んでいる今のオマエは、狂ってなんかいないぞ」"

[[dialogue]]
speaker = "アポロ"
# 「いいか？　狂った人間というのは、シンプルで力強いものなんだ！　昔のあたしや、ギエルがそうだったようにな」
line = "「いいか？　狂った人間というのは、シンプルで力強いものなんだ！　昔のあたしや、ギエルがそうだったようにな」"

[[dialogue]]
speaker = "アポロ"
# 「迷ってばかりで、複雑で、弱々なオマエは、まだ正気の人間だ」
line = "「迷ってばかりで、複雑で、弱々なオマエは、まだ正気の人間だ」"

[[dialogue]]
speaker = "アポロ"
# 「安心しろ！　オマエの正気は、あたしが保証してやる！」
line = "「安心しろ！　オマエの正気は、あたしが保証してやる！」"

[[dialogue]]
speaker = "アポロ"
# 「だからオマエは、あたしと一緒に来い！！」
line = "「だからオマエは、あたしと一緒に来い！！」"

[[dialogue]]
speaker = "梨緒"
# 「……それはつまり、君が選挙管理委員会に所属する……ということか？」
line = "「……それはつまり、君が選挙管理委員会に所属する……ということか？」"

[[dialogue]]
speaker = "アポロ"
# 「んん？　『せんきょかんりいいんかい』……？」
line = "「んん？　『せんきょかんりいいんかい』……？」"

[[dialogue]]
speaker = "アポロ"
# 「ああ、フィオナが言ってた、梨緒の作った秘密結社のことか！」
line = "「ああ、フィオナが言ってた、梨緒の作った秘密結社のことか！」"

[[dialogue]]
speaker = "梨緒"
# 「いや、秘密結社ではまったくないが……」
line = "「いや、秘密結社ではまったくないが……」"

[[dialogue]]
speaker = "アポロ"
# 「ふむふむ。そういうつもりじゃなかったんだが、それもいいかもしれないな」
line = "「ふむふむ。そういうつもりじゃなかったんだが、それもいいかもしれないな」"

[[dialogue]]
speaker = "アポロ"
# 「フィオナは流星、魔王は新星の星徒会長なのに、あたしだけ毎日遊んでいるわけにはいかないし……」
line = "「フィオナは流星、魔王は新星の星徒会長なのに、あたしだけ毎日遊んでいるわけにはいかないし……」"

[[dialogue]]
speaker = "アポロ"
# 「ただちょっと待て！　一応フィオナに相談してからだ」
line = "「ただちょっと待て！　一応フィオナに相談してからだ」"

[[dialogue]]
speaker = "アポロ"
# 「勝手に危ないことをすると、おやつ抜きになってしまうからな！」
line = "「勝手に危ないことをすると、おやつ抜きになってしまうからな！」"

[[dialogue]]
speaker = "梨緒"
# 「え？　あ、いや、アポロ……？」
line = "「え？　あ、いや、アポロ……？」"

[[dialogue]]
speaker = "アポロ"
# 「そうと決まれば善は急げだ！　さっそくこのことを相談してくるぞ！　──じゃあまたな、梨緒！」
line = "「そうと決まれば善は急げだ！　さっそくこのことを相談してくるぞ！　──じゃあまたな、梨緒！」"

[[dialogue]]
speaker = "梨緒"
# 「いやまて、話を勝手に……」
line = "「いやまて、話を勝手に……」"

[[dialogue]]
speaker = "梨緒"
# 「って、もう行ってしまった……」
line = "「って、もう行ってしまった……」"

[[dialogue]]
speaker = "unk"
# その場に取り残された梨緒は、子どものように全力疾走で走り去っていくアポロの背中を、茫然と見送るしかなかった。
line = "その場に取り残された梨緒は、子どものように全力疾走で走り去っていくアポロの背中を、茫然と見送るしかなかった。"
