[[dialogue]]
speaker = "サーシャ"
# 「あ～ん<emoji=heart04>　会長くんに引き離されちゃったわ～♪」
line = "「あ～ん<emoji=heart04>　会長くんに引き離されちゃったわ～♪」"

[[dialogue]]
speaker = "ルヴィネ"
# 「けほっ……何なの、本当に……」
line = "「けほっ……何なの、本当に……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「魔王。貴方まで一緒になって……ふざけるのは程々にして頂戴」
line = "「魔王。貴方まで一緒になって……ふざけるのは程々にして頂戴」"

[[dialogue]]
speaker = "unk"
# もう『兄さん』呼びは終わり……？
line = "もう『兄さん』呼びは終わり……？"

[[dialogue]]
speaker = "ルヴィネ"
# 「当たり前でしょう！？　アルタイルには変人しかいないの……！？」
line = "「当たり前でしょう！？　アルタイルには変人しかいないの……！？」"

[[dialogue]]
speaker = "unk"
# ──それから、しばらく後。
line = "──それから、しばらく後。"

[[dialogue]]
speaker = "unk"
# 星徒会室から逃げ出したルヴィネは、カフェテリアで休息を取っていた。
line = "星徒会室から逃げ出したルヴィネは、カフェテリアで休息を取っていた。"

[[dialogue]]
speaker = "ルヴィネ"
# 「創造神の傀儡ではなく、１人の天使として知見を深めていく……そのことの大切さは理解しているけれど、いきなり散々な目に遭ったわ」
line = "「創造神の傀儡ではなく、１人の天使として知見を深めていく……そのことの大切さは理解しているけれど、いきなり散々な目に遭ったわ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「おばさん呼ばわりされるし、妹キャラが似合うだなんて言われるし……立派な女神になるための道のりは前途多難そうね……」
line = "「おばさん呼ばわりされるし、妹キャラが似合うだなんて言われるし……立派な女神になるための道のりは前途多難そうね……」"

[[dialogue]]
speaker = "ルルカ"
# 「あっ──いたいた！　こんにちは、ルヴィネさん！　今ちょっといいですか？」
line = "「あっ──いたいた！　こんにちは、ルヴィネさん！　今ちょっといいですか？」"

[[dialogue]]
