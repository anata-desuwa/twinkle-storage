line = "「貴女たちは……？」"

[[dialogue]]
speaker = "ルルカ"
# 「さっきアナちゃんから、新しい妹が増えたって聞いて──ご挨拶に来ました！　よろしくお願いしますっ！」
line = "「さっきアナちゃんから、新しい妹が増えたって聞いて──ご挨拶に来ました！　よろしくお願いしますっ！」"

[[dialogue]]
speaker = "メイプル"
# 「ふっふっふ……まさか平行世界から、新たな『妹ライバル』が現れるとは！　油断ならない相手のようだな！」
line = "「ふっふっふ……まさか平行世界から、新たな『妹ライバル』が現れるとは！　油断ならない相手のようだな！」"

[[dialogue]]
speaker = "クーシェン"
# 「誰が一番、にーにーの妹にふさわしいか勝負だよ！　ボク、負けないから！！」
line = "「誰が一番、にーにーの妹にふさわしいか勝負だよ！　ボク、負けないから！！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「？？？？　……？？　？？？」
line = "「？？？？　……？？　？？？」"

[[dialogue]]
speaker = "unk"
# そうしてルヴィネは、学園内に存在する妹同盟の女の子たちに囲まれて、親交を深めることになるのだが。
line = "そうしてルヴィネは、学園内に存在する妹同盟の女の子たちに囲まれて、親交を深めることになるのだが。"

[[dialogue]]
speaker = "unk"
# それはまた、別のお話──
line = "それはまた、別のお話──"
