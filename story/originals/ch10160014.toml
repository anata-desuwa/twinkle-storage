[[dialogue]]
speaker = "unk"
# 第４話,不知火ヒトリは夜空を見上げる,P
line = "第４話,不知火ヒトリは夜空を見上げる,P"

[[dialogue]]
speaker = "unk"
# 星徒会の仕事が長引き、閉門ギリギリの時間になってしまった。
line = "星徒会の仕事が長引き、閉門ギリギリの時間になってしまった。"

[[dialogue]]
speaker = "ヒトリ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ヒトリ"
# 「あっ……会長さん、お疲れ様です」
line = "「あっ……会長さん、お疲れ様です」"

[[dialogue]]
speaker = "unk"
# ……ヒトリはなにしてるの？
line = "……ヒトリはなにしてるの？"

[[dialogue]]
speaker = "ヒトリ"
# 「──わたし、ですか？　わたしはただ、『みんな』と夜空を眺めていたんです。月に１度くらい、こうしてるんです」
line = "「──わたし、ですか？　わたしはただ、『みんな』と夜空を眺めていたんです。月に１度くらい、こうしてるんです」"

[[dialogue]]
speaker = "ヒトリ"
# 「モンスターが出たから変身してるわけじゃありませんよ。こっちのほうが『みんな』も落ち着いてくれるので」
line = "「モンスターが出たから変身してるわけじゃありませんよ。こっちのほうが『みんな』も落ち着いてくれるので」"

[[dialogue]]
speaker = "unk"
# ……みんなって？
line = "……みんなって？"

[[dialogue]]
speaker = "ヒトリ"
# 「『みんな』は『みんな』です。わたしに『憑いて』きてくれている、みんなのことです」
line = "「『みんな』は『みんな』です。わたしに『憑いて』きてくれている、みんなのことです」"

[[dialogue]]
speaker = "ヒトリ"
# 「……会長さんはあんまり『みんな』を怖がっているイメージはなかったんですけど、やっぱり怖いですか？」
line = "「……会長さんはあんまり『みんな』を怖がっているイメージはなかったんですけど、やっぱり怖いですか？」"

[[dialogue]]
speaker = "ヒトリ"
# 「皆さん、わたしが『みんな』のことを話すと……少し怖がってしまうんです。仕方のないことなのかなって思いますけど、やっぱり寂しいです」
line = "「皆さん、わたしが『みんな』のことを話すと……少し怖がってしまうんです。仕方のないことなのかなって思いますけど、やっぱり寂しいです」"

[[dialogue]]
speaker = "ヒトリ"
# 「幽霊の中には、確かに悪い幽霊もいます。人を呪ったり、憑りついていたずらしたりする、そういう幽霊ですね」
line = "「幽霊の中には、確かに悪い幽霊もいます。人を呪ったり、憑りついていたずらしたりする、そういう幽霊ですね」"

[[dialogue]]
speaker = "ヒトリ"
# 「でも、ほとんどの幽霊はそうじゃありません。ただこの世にいたいだけ……そんな幽霊ばかりなんです」
line = "「でも、ほとんどの幽霊はそうじゃありません。ただこの世にいたいだけ……そんな幽霊ばかりなんです」"

[[dialogue]]
speaker = "ヒトリ"
# 「意外、でしたか？」
line = "「意外、でしたか？」"

[[dialogue]]
speaker = "unk"
# ヒトリはそういう幽霊の友達になってあげてるんだな
line = "ヒトリはそういう幽霊の友達になってあげてるんだな"

[[dialogue]]
speaker = "ヒトリ"
# 「いえ、逆ですよ。わたしが友達になってもらってるんです」
line = "「いえ、逆ですよ。わたしが友達になってもらってるんです」"

[[dialogue]]
speaker = "ヒトリ"
# 「みんな、優しいんですよ？　おかげで、ヒトのお友達は全然できませんでしたけど、寂しいって思ったことはありません」
line = "「みんな、優しいんですよ？　おかげで、ヒトのお友達は全然できませんでしたけど、寂しいって思ったことはありません」"

[[dialogue]]
speaker = "ヒトリ"
# 「……わたし、『みんな』に、何かできることはないかって、ずっと考えてるんです」
line = "「……わたし、『みんな』に、何かできることはないかって、ずっと考えてるんです」"

[[dialogue]]
speaker = "ヒトリ"
# 「幽霊がいるっていうと、皆さん、早く成仏させてあげたほうがいいとか、除霊したほうがいいとか、そういうことを言うじゃないですか」
line = "「幽霊がいるっていうと、皆さん、早く成仏させてあげたほうがいいとか、除霊したほうがいいとか、そういうことを言うじゃないですか」"

[[dialogue]]
speaker = "ヒトリ"
# 「成仏できずに困っている幽霊がいるのは、事実です。だから、そういう霊の未練を取り除いて、成仏させてあげるのはいいことだと思います」
line = "「成仏できずに困っている幽霊がいるのは、事実です。だから、そういう霊の未練を取り除いて、成仏させてあげるのはいいことだと思います」"

[[dialogue]]
speaker = "ヒトリ"
# 「でも、みんながみんな、そういうわけじゃない。ただこの世にいたい、そう考えている霊も、多いんです」
line = "「でも、みんながみんな、そういうわけじゃない。ただこの世にいたい、そう考えている霊も、多いんです」"

[[dialogue]]
speaker = "ヒトリ"
# 「そういう霊の、居場所を作ってあげたい……それが、幽霊の姿が見えて、言葉を聞けるわたしの、役目なのかなって……」
line = "「そういう霊の、居場所を作ってあげたい……それが、幽霊の姿が見えて、言葉を聞けるわたしの、役目なのかなって……」"

[[dialogue]]
speaker = "ヒトリ"
# 「……って、ごめんなさい。聞かれてもいないのにわたし、何話してるんでしょう……」
line = "「……って、ごめんなさい。聞かれてもいないのにわたし、何話してるんでしょう……」"

[[dialogue]]
speaker = "unk"
# いや、ヒトリのことが聞けて嬉しいよ
line = "いや、ヒトリのことが聞けて嬉しいよ"

[[dialogue]]
speaker = "ヒトリ"
# 「……そ、そうですか？　それならよかったです」
line = "「……そ、そうですか？　それならよかったです」"

[[dialogue]]
speaker = "ヒトリ"
# 「な、なんでこんなこと、話しちゃったんだろ……まだ誰にも話したことがなかったのに」
line = "「な、なんでこんなこと、話しちゃったんだろ……まだ誰にも話したことがなかったのに」"

[[dialogue]]
speaker = "unk"
# それにしても『居場所』を作る、か……
line = "それにしても『居場所』を作る、か……"

[[dialogue]]
speaker = "ヒトリ"
# 「……は、はい。まだ、どういう風にその役目をこなせばいいのか、わからないんですけど」
line = "「……は、はい。まだ、どういう風にその役目をこなせばいいのか、わからないんですけど」"

[[dialogue]]
speaker = "ヒトリ"
# 「その答えが見つかるまでは、わたしが『みんな』の居場所になってあげたいなって思うんです……」
line = "「その答えが見つかるまでは、わたしが『みんな』の居場所になってあげたいなって思うんです……」"

[[dialogue]]
speaker = "ヒトリ"
# 「お、おかしいですか？　その、こんなこと人に話したことなくて……」
line = "「お、おかしいですか？　その、こんなこと人に話したことなくて……」"

[[dialogue]]
speaker = "unk"
# 『夢』をしっかり持ってて、素直に尊敬した
line = "『夢』をしっかり持ってて、素直に尊敬した"

[[dialogue]]
speaker = "ヒトリ"
# 「あ、ありがとうございます……っ、会長さんにそんな風に言ってもらえると、う、嬉しいです……」
line = "「あ、ありがとうございます……っ、会長さんにそんな風に言ってもらえると、う、嬉しいです……」"

[[dialogue]]
speaker = "ヒトリ"
# 「わっ……み、『みんな』もありがとうって言ってます。会長さん、流石ですね。『みんな』からも認めてもらえて、凄いですっ」
line = "「わっ……み、『みんな』もありがとうって言ってます。会長さん、流石ですね。『みんな』からも認めてもらえて、凄いですっ」"

[[dialogue]]
speaker = "ヒトリ"
# 「わ、わたしも、会長さんに話せてよかったです……っ」
line = "「わ、わたしも、会長さんに話せてよかったです……っ」"

[[dialogue]]
speaker = "ゆーちゃん"
# 「てーてー！　てーてー！」
line = "「てーてー！　てーてー！」"

[[dialogue]]
speaker = "ヒトリ"
# 「ゆ、ゆーちゃん！　だから、違うってば！　か、会長さんは優しいから、話しやすいのっ。変な意味はないんだよっ」
line = "「ゆ、ゆーちゃん！　だから、違うってば！　か、会長さんは優しいから、話しやすいのっ。変な意味はないんだよっ」"

[[dialogue]]
speaker = "ヒトリ"
# 「か、会長さんもその……わ、わたし、変なこと言っちゃったかもしれないですけど、あんまり気にしないでくださいっ……」
line = "「か、会長さんもその……わ、わたし、変なこと言っちゃったかもしれないですけど、あんまり気にしないでくださいっ……」"

[[dialogue]]
speaker = "ヒトリ"
# 「そ、それよりっ、今日はもうお仕事終わりでしたら、会長さんも一緒に星を見ませんか……？」
line = "「そ、それよりっ、今日はもうお仕事終わりでしたら、会長さんも一緒に星を見ませんか……？」"

[[dialogue]]
speaker = "ヒトリ"
# 「その……『みんな』もそう言ってますし……」
line = "「その……『みんな』もそう言ってますし……」"

[[dialogue]]
speaker = "ゆーちゃん"
# 「ゆー？」
line = "「ゆー？」"

[[dialogue]]
speaker = "ヒトリ"
# 「い、いいでしょ！　『みんな』だってそう思ってるよね！？　ゆーちゃんも別に会長さんが居たって平気でしょ！？」
line = "「い、いいでしょ！　『みんな』だってそう思ってるよね！？　ゆーちゃんも別に会長さんが居たって平気でしょ！？」"

[[dialogue]]
speaker = "ヒトリ"
# 「って、す、すみませんすみません、お仕事終わりで疲れてますよねっ。なんか変なお誘いしちゃって、ごめんなさいっ……！」
line = "「って、す、すみませんすみません、お仕事終わりで疲れてますよねっ。なんか変なお誘いしちゃって、ごめんなさいっ……！」"

[[dialogue]]
speaker = "unk"
# お言葉に甘えて、俺も星を見てから帰ろうかな
line = "お言葉に甘えて、俺も星を見てから帰ろうかな"

[[dialogue]]
speaker = "ヒトリ"
# 「あっ……い、いいんですか？」
line = "「あっ……い、いいんですか？」"

[[dialogue]]
speaker = "ヒトリ"
# 「は、はいっ、ありがとうございますっ……嬉しいですっ」
line = "「は、はいっ、ありがとうございますっ……嬉しいですっ」"

[[dialogue]]
speaker = "ゆーちゃん"
# 「てーてー！」
line = "「てーてー！」"

[[dialogue]]
speaker = "ヒトリ"
# 「ち、違うの！　そういうのじゃないんだってば！」
line = "「ち、違うの！　そういうのじゃないんだってば！」"

[[dialogue]]
speaker = "unk"
# 俺はヒトリが誘ってくれたことに嬉しさを感じつつ。
line = "俺はヒトリが誘ってくれたことに嬉しさを感じつつ。"

[[dialogue]]
speaker = "unk"
# その夜は、みんなで星空を見上げながら、穏やかな時間を過ごしたのだった。
line = "その夜は、みんなで星空を見上げながら、穏やかな時間を過ごしたのだった。"
