[[dialogue]]
speaker = "unk"
# 第２話,プリムラの優しいところ,P
line = "第２話,プリムラの優しいところ,P"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「今日から１週間、流星学園中の草むしりじゃと～っ！？　なんで我がそんなことをせねばならんのじゃ！」
line = "「今日から１週間、流星学園中の草むしりじゃと～っ！？　なんで我がそんなことをせねばならんのじゃ！」"

[[dialogue]]
speaker = "サチ"
# 「当然でしょ！　またお兄さんを支配下に置こうとしたんだから。しっかり従ってもらうからね！」
line = "「当然でしょ！　またお兄さんを支配下に置こうとしたんだから。しっかり従ってもらうからね！」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「ぐぬぬぬ……ちょっと契約の儀式を試しただけなのじゃ……！　頭の固いやつめ！」
line = "「ぐぬぬぬ……ちょっと契約の儀式を試しただけなのじゃ……！　頭の固いやつめ！」"

[[dialogue]]
speaker = "サチ"
# 「試すことがそもそもいけないの！　いい、もしサボったりしたらお小遣いもカットだから！　宝石磨きのアルバイトも禁止しちゃうよ！？」
line = "「試すことがそもそもいけないの！　いい、もしサボったりしたらお小遣いもカットだから！　宝石磨きのアルバイトも禁止しちゃうよ！？」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「何ぃ！？　サチっ、貴様の血は何色じゃ……！？　ヒトの心がないのか！」
line = "「何ぃ！？　サチっ、貴様の血は何色じゃ……！？　ヒトの心がないのか！」"

[[dialogue]]
speaker = "unk"
# 俺も手伝うよ、プリムラ
line = "俺も手伝うよ、プリムラ"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「おおっ！　流石は眷族なのじゃ……！」
line = "「おおっ！　流石は眷族なのじゃ……！」"

[[dialogue]]
speaker = "サチ"
# 「ダメです、お兄さん。これは罰なのでプリムラ１人にさせてください」
line = "「ダメです、お兄さん。これは罰なのでプリムラ１人にさせてください」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「手伝ってもらうくらいいいじゃろ！？」
line = "「手伝ってもらうくらいいいじゃろ！？」"

[[dialogue]]
speaker = "サチ"
# 「お兄さんはプリムラに甘いところがありますから。ちょっとお掃除を頑張ったら、すぐ頭を撫でたりチョコをあげたりするでしょう？」
line = "「お兄さんはプリムラに甘いところがありますから。ちょっとお掃除を頑張ったら、すぐ頭を撫でたりチョコをあげたりするでしょう？」"

[[dialogue]]
speaker = "unk"
# ……身に覚えがありすぎる
line = "……身に覚えがありすぎる"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「うぅ～……サチの石頭めっ」
line = "「うぅ～……サチの石頭めっ」"

[[dialogue]]
speaker = "サチ"
# 「何か言った？」
line = "「何か言った？」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「何も言ってないのじゃ！　草むしり、やればいいのであろう！　サチのアホ～っ……！！」
line = "「何も言ってないのじゃ！　草むしり、やればいいのであろう！　サチのアホ～っ……！！」"

[[dialogue]]
speaker = "サチ"
# 「はあ……まったく子供なんだから。そういうわけなのでお兄さん、今日から１週間、プリムラには罰掃除をさせます」
line = "「はあ……まったく子供なんだから。そういうわけなのでお兄さん、今日から１週間、プリムラには罰掃除をさせます」"

[[dialogue]]
speaker = "サチ"
# 「なのであの、学園の方に『プリムラに反抗の意思がある』みたいな報告はしないでいただけると……」
line = "「なのであの、学園の方に『プリムラに反抗の意思がある』みたいな報告はしないでいただけると……」"

[[dialogue]]
speaker = "unk"
# 大丈夫、内緒にするよ
line = "大丈夫、内緒にするよ"

[[dialogue]]
speaker = "サチ"
# 「はい、ありがとうございます！」
line = "「はい、ありがとうございます！」"

[[dialogue]]
speaker = "サチ"
# 「はあ……たぶんあの子のことだから、契約の儀式だって、本当に深く考えずにやってみただけなんだろうけど」
line = "「はあ……たぶんあの子のことだから、契約の儀式だって、本当に深く考えずにやってみただけなんだろうけど」"

[[dialogue]]
speaker = "サチ"
# 「私やお兄さんみたいに、プリムラの性格を分かっている人ばかりではないので……」
line = "「私やお兄さんみたいに、プリムラの性格を分かっている人ばかりではないので……」"

[[dialogue]]
speaker = "サチ"
# 「プリムラには優しい心があると普段からアピールしておかないと、いざという時に困った事になりそうですし」
line = "「プリムラには優しい心があると普段からアピールしておかないと、いざという時に困った事になりそうですし」"

[[dialogue]]
speaker = "unk"
# サチは優しいね
line = "サチは優しいね"

[[dialogue]]
speaker = "サチ"
# 「お兄さんには負けますよ。では、これから１週間、心を鬼にしてくださいね！」
line = "「お兄さんには負けますよ。では、これから１週間、心を鬼にしてくださいね！」"

[[dialogue]]
speaker = "unk"
# それから数日後──
line = "それから数日後──"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「むしり、むしり……むしり、むしり……」
line = "「むしり、むしり……むしり、むしり……」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「くそ～……死ぬほどつまらんのじゃ……本当なら今ごろ眷族とチョコパフェを食ったり、テレビゲームをしておれたじゃろうに……」
line = "「くそ～……死ぬほどつまらんのじゃ……本当なら今ごろ眷族とチョコパフェを食ったり、テレビゲームをしておれたじゃろうに……」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「草むしり、手を抜いたらサチにバレるし……あやつめ、毎日むしった草の量まで確認しおって。小姑の素質があるのじゃ……」
line = "「草むしり、手を抜いたらサチにバレるし……あやつめ、毎日むしった草の量まで確認しおって。小姑の素質があるのじゃ……」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「──む？　何じゃ、あの植え込みのところで何かが動いたような……」
line = "「──む？　何じゃ、あの植え込みのところで何かが動いたような……」"

[[dialogue]]
speaker = "unk"
# それから、さらに数日後──
line = "それから、さらに数日後──"

[[dialogue]]
speaker = "unk"
# プリムラがサボっているかも、だって？
line = "プリムラがサボっているかも、だって？"

[[dialogue]]
speaker = "サチ"
# 「そうなんです。ここ数日、むしっている草の量が少なくって……それに私が言いつけた範囲からいなくなっちゃうこともあるんです」
line = "「そうなんです。ここ数日、むしっている草の量が少なくって……それに私が言いつけた範囲からいなくなっちゃうこともあるんです」"

[[dialogue]]
speaker = "サチ"
# 「でも作業自体を投げ出しているわけじゃないので、厳しく叱ったら逆効果になりそうで……お兄さんも来ていただけませんか？」
line = "「でも作業自体を投げ出しているわけじゃないので、厳しく叱ったら逆効果になりそうで……お兄さんも来ていただけませんか？」"

[[dialogue]]
speaker = "unk"
# 飴と鞭ってやつだね
line = "飴と鞭ってやつだね"

[[dialogue]]
speaker = "サチ"
# 「はい、私だけだと叱るばっかりになっちゃいそうなので。お願いします！」
line = "「はい、私だけだと叱るばっかりになっちゃいそうなので。お願いします！」"

[[dialogue]]
speaker = "サチ"
# 「今日はこのあたりを掃除するように言ってあったんですけど、やっぱりいませんね……」
line = "「今日はこのあたりを掃除するように言ってあったんですけど、やっぱりいませんね……」"

[[dialogue]]
speaker = "サチ"
# 「えっ、あっちの方に一瞬、人影が……？　はい、行ってみましょう！」
line = "「えっ、あっちの方に一瞬、人影が……？　はい、行ってみましょう！」"

[[dialogue]]
speaker = "unk"
# そうして進むと、植え込みの陰に隠れるようにして、プリムラが座っているところを見つけた。
line = "そうして進むと、植え込みの陰に隠れるようにして、プリムラが座っているところを見つけた。"

[[dialogue]]
speaker = "unk"
# 彼女があやしているのは──２匹の野良猫だった。
line = "彼女があやしているのは──２匹の野良猫だった。"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「フハハハ！　何じゃおぬしら、腹を出して寝そべりおって～♪　そろって降参のポーズというわけか？」
line = "「フハハハ！　何じゃおぬしら、腹を出して寝そべりおって～♪　そろって降参のポーズというわけか？」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「ククク、終末兵器たる我がよほど恐ろしいと見える。よかろう、今日もたっぷり撫でまわしてやろうではないか！」
line = "「ククク、終末兵器たる我がよほど恐ろしいと見える。よかろう、今日もたっぷり撫でまわしてやろうではないか！」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「ほれほれ、なでりなでり。心地よいじゃろう、賢者の石で作った我の肌は、ぷにぷにもちもち触感なのじゃ♪」
line = "「ほれほれ、なでりなでり。心地よいじゃろう、賢者の石で作った我の肌は、ぷにぷにもちもち触感なのじゃ♪」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「おぉ、おぉ♪　ニャーニャーわめきおって。腹が減ったのか～？」
line = "「おぉ、おぉ♪　ニャーニャーわめきおって。腹が減ったのか～？」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「今日は特別にお高いペットフードをくれてやろう！　我のお小遣いから買うたのじゃ、心して食うのじゃぞ！」
line = "「今日は特別にお高いペットフードをくれてやろう！　我のお小遣いから買うたのじゃ、心して食うのじゃぞ！」"

[[dialogue]]
speaker = "サチ"
# 「……お兄さん、これは」
line = "「……お兄さん、これは」"

[[dialogue]]
speaker = "unk"
# 問題はなさそうだね
line = "問題はなさそうだね"

[[dialogue]]
speaker = "サチ"
# 「はい。小さな命を愛でる気持ちがある。プリムラの危険性のなさを伝えるのに、これ以上ないシーンかと思います」
line = "「はい。小さな命を愛でる気持ちがある。プリムラの危険性のなさを伝えるのに、これ以上ないシーンかと思います」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「──よし！　我の恐ろしさで心を縛り、食事を与えて体を縛ってやったぞ。ここからが本番なのじゃ♪」
line = "「──よし！　我の恐ろしさで心を縛り、食事を与えて体を縛ってやったぞ。ここからが本番なのじゃ♪」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「のう、おぬしたち。我の眷族にならんか～？　もうすでに１号は決まっておるので、おぬしたちは眷族２号と３号じゃ！　どうじゃ～？」
line = "「のう、おぬしたち。我の眷族にならんか～？　もうすでに１号は決まっておるので、おぬしたちは眷族２号と３号じゃ！　どうじゃ～？」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「我が世界を征服した暁には、相応の地位を約束してやるぞ？　フハハハハ！」
line = "「我が世界を征服した暁には、相応の地位を約束してやるぞ？　フハハハハ！」"

[[dialogue]]
speaker = "サチ"
# 「…………あの言動さえなければ、もう何も言うことはないんですけれどね」
line = "「…………あの言動さえなければ、もう何も言うことはないんですけれどね」"

[[dialogue]]
speaker = "unk"
# そうしてプリムラの罰掃除期間は終わり──直後に俺は、餌付けをしていた野良猫たちを紹介されたのだった。
line = "そうしてプリムラの罰掃除期間は終わり──直後に俺は、餌付けをしていた野良猫たちを紹介されたのだった。"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「ほれ眷族、おぬしの仲間じゃ！　後輩じゃからな、仲良くせいよ！」
line = "「ほれ眷族、おぬしの仲間じゃ！　後輩じゃからな、仲良くせいよ！」"

[[dialogue]]
speaker = "unk"
# 野良猫たちをだっこして微笑むプリムラを見て、俺は彼女に惹かれていくのを感じるのだった──
line = "野良猫たちをだっこして微笑むプリムラを見て、俺は彼女に惹かれていくのを感じるのだった──"
