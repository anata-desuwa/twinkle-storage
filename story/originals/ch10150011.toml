[[dialogue]]
speaker = "unk"
# 第１話,アルモたんと呼べ,P
line = "第１話,アルモたんと呼べ,P"

[[dialogue]]
speaker = "unk"
# ある日。アナと書類仕事をしていると、星徒会室の扉をノックする音が響いた──
line = "ある日。アナと書類仕事をしていると、星徒会室の扉をノックする音が響いた──"

[[dialogue]]
speaker = "アルモタヘル"
# 「頼もう」
line = "「頼もう」"

[[dialogue]]
speaker = "アナ"
# 「ノープロブレム。お入り下さい」
line = "「ノープロブレム。お入り下さい」"

[[dialogue]]
speaker = "アルモタヘル"
# 「失礼する。この学園の星徒会とやらは、ここで間違いないだろうか？」
line = "「失礼する。この学園の星徒会とやらは、ここで間違いないだろうか？」"

[[dialogue]]
speaker = "unk"
# あ、貴女は、まさか……！
line = "あ、貴女は、まさか……！"

[[dialogue]]
speaker = "アルモタヘル"
# 「うむ。我が名は、守護天使《<ruby=めいみゃく>命脈</ruby>》のアルモタヘル。リクリエの原因を解明し、世界を守護する為、ここに降臨した」
line = "「うむ。我が名は、守護天使《<ruby>命脈<rt>めいみゃく</rt></ruby>》のアルモタヘル。リクリエの原因を解明し、世界を守護する為、ここに降臨した」"

[[dialogue]]
speaker = "アルモタヘル"
# 「先日は不甲斐ない姿を晒し、面目次第もない。すでに承知のことかと思うが、我もマグダレナ同様、リクリエの瘴気に飲まれ堕天していたようだ」
line = "「先日は不甲斐ない姿を晒し、面目次第もない。すでに承知のことかと思うが、我もマグダレナ同様、リクリエの瘴気に飲まれ堕天していたようだ」"

[[dialogue]]
speaker = "アルモタヘル"
# 「この体は守護天使本来のものではない。この学園にいる錬金術の子と、そこにいる天使の子──」
line = "「この体は守護天使本来のものではない。この学園にいる錬金術の子と、そこにいる天使の子──」"

[[dialogue]]
speaker = "アナ"
# 「私と、アニマ先輩ですね。２人でアルモタヘル様を人間界に降臨させる為の、<b>物理アバター</b>を作成しました」
line = "「私と、アニマ先輩ですね。２人でアルモタヘル様を人間界に降臨させる為の、<b>物理アバター</b>を作成しました」"

[[dialogue]]
speaker = "アナ"
# 「守護天使様の本体は、未だ魔界の奥地に囚われている状態」
line = "「守護天使様の本体は、未だ魔界の奥地に囚われている状態」"

[[dialogue]]
speaker = "アナ"
# 「しかし、アニマ先輩が我々の交戦記録から存在情報を探知し、力のごく一部ですが、アバターの中へ緊急避難させることができました」
line = "「しかし、アニマ先輩が我々の交戦記録から存在情報を探知し、力のごく一部ですが、アバターの中へ緊急避難させることができました」"

[[dialogue]]
speaker = "アルモタヘル"
# 「そういうことだ。これから我も戦いに協力する故、この学園のトップ──星徒会長であるお前に、挨拶に来た次第だ」
line = "「そういうことだ。これから我も戦いに協力する故、この学園のトップ──星徒会長であるお前に、挨拶に来た次第だ」"

[[dialogue]]
speaker = "アナ"
# 「でも、守護天使様の膨大な存在情報を、アバターに収めるのは無理……」
line = "「でも、守護天使様の膨大な存在情報を、アバターに収めるのは無理……」"

[[dialogue]]
speaker = "アナ"
# 「過去のリクリエについてや、魔界に囚われている本体の所在など、記憶情報には大きな欠落があるようです」
line = "「過去のリクリエについてや、魔界に囚われている本体の所在など、記憶情報には大きな欠落があるようです」"

[[dialogue]]
speaker = "アルモタヘル"
# 「リクリエの阻止という使命は忘れておらぬ故、問題ない。それにこの義体、現状では守護天使の本体にこそ及ばぬが、見事なものだ」
line = "「リクリエの阻止という使命は忘れておらぬ故、問題ない。それにこの義体、現状では守護天使の本体にこそ及ばぬが、見事なものだ」"

[[dialogue]]
speaker = "アルモタヘル"
# 「通常の天使の肉体をベースとし、守護天使の力を再現する為に強化されている。それでいて破綻が無い。間違いなく天才の所業と言えよう」
line = "「通常の天使の肉体をベースとし、守護天使の力を再現する為に強化されている。それでいて破綻が無い。間違いなく天才の所業と言えよう」"

[[dialogue]]
speaker = "アナ"
# 「光栄です。そう言って貰えると、頑張った甲斐があります」
line = "「光栄です。そう言って貰えると、頑張った甲斐があります」"

[[dialogue]]
speaker = "unk"
# 不完全でも圧倒的な星力（？）のオーラを感じる……！
line = "不完全でも圧倒的な星力（？）のオーラを感じる……！"

[[dialogue]]
speaker = "アルモタヘル"
# 「守護天使の力はお前たちが扱う星力ではなく、３０００年前にこの世界から失われた『<b>霊力</b>』に由来するのだが……まあいい。いずれにせよ──」
line = "「守護天使の力はお前たちが扱う星力ではなく、３０００年前にこの世界から失われた『<b>霊力</b>』に由来するのだが……まあいい。いずれにせよ──」"

[[dialogue]]
speaker = "アルモタヘル"
# 「我が炎、必ずやお前たちの役に立つと約束しよう。人の子よ、これからよろしく頼む」
line = "「我が炎、必ずやお前たちの役に立つと約束しよう。人の子よ、これからよろしく頼む」"

[[dialogue]]
speaker = "unk"
# こちらこそ、よろしくお願いします
line = "こちらこそ、よろしくお願いします"

[[dialogue]]
speaker = "unk"
# 心強いです！
line = "心強いです！"

[[dialogue]]
speaker = "アルモタヘル"
# 「うむ。それと、我が呼び方についてだが、親しみを込めて……」
line = "「うむ。それと、我が呼び方についてだが、親しみを込めて……」"

[[dialogue]]
speaker = "アルモタヘル"
# 「『アルモたん』と呼ぶがよい」
line = "「『アルモたん』と呼ぶがよい」"

[[dialogue]]
speaker = "アナ"
# 「は？」
line = "「は？」"

[[dialogue]]
speaker = "unk"
# 何て？
line = "何て？"

[[dialogue]]
speaker = "アルモタヘル"
# 「む？　よく聞こえなかったか」
line = "「む？　よく聞こえなかったか」"

[[dialogue]]
speaker = "アルモタヘル"
# 「もう一度言おう。我が呼び方についてだが、親しみを込めて……」
line = "「もう一度言おう。我が呼び方についてだが、親しみを込めて……」"

[[dialogue]]
speaker = "unk"
# 何故にアルモたん！？
line = "何故にアルモたん！？"

[[dialogue]]
speaker = "unk"
# いやいやいや、聞こえてましたから！
line = "いやいやいや、聞こえてましたから！"

[[dialogue]]
speaker = "アルモタヘル"
# 「我が名──アルモタヘルは、どうやら皆、覚え難いようでな……。学園の子らがよく言い間違うのだ」
line = "「我が名──アルモタヘルは、どうやら皆、覚え難いようでな……。学園の子らがよく言い間違うのだ」"

[[dialogue]]
speaker = "アルモタヘル"
# 「我は名前の間違いなど気にしないのだが、その場に居合わせた錬金術の子が、良き提案をしてくれた」
line = "「我は名前の間違いなど気にしないのだが、その場に居合わせた錬金術の子が、良き提案をしてくれた」"

[[dialogue]]
speaker = "アルモタヘル"
# 「『アルモたん』という愛称で呼んで貰うようにすれば、本名もきっと間違えずに覚えてくれるはずだ、と」
line = "「『アルモたん』という愛称で呼んで貰うようにすれば、本名もきっと間違えずに覚えてくれるはずだ、と」"

[[dialogue]]
speaker = "unk"
# 元凶はアニマ先輩か……
line = "元凶はアニマ先輩か……"

[[dialogue]]
speaker = "アナ"
# 「守護天使様に何とんでもない愛称付けてるんですか、あの人。頭おかしいんじゃないですか？」
line = "「守護天使様に何とんでもない愛称付けてるんですか、あの人。頭おかしいんじゃないですか？」"

[[dialogue]]
speaker = "アルモタヘル"
# 「やはり天才かと、我は感心したぞ？　親しみやすく、良き名だ。我は気に入っている」
line = "「やはり天才かと、我は感心したぞ？　親しみやすく、良き名だ。我は気に入っている」"

[[dialogue]]
speaker = "アルモタヘル"
# 「人の子らは仲間に対し、親しみを込めて愛称で呼ぶことがあると聞く。故に、我のことも『アルモたん』で構わぬ」
line = "「人の子らは仲間に対し、親しみを込めて愛称で呼ぶことがあると聞く。故に、我のことも『アルモたん』で構わぬ」"

[[dialogue]]
speaker = "アナ"
# 「守護天使様相手に、その呼び方はさすがに……って、会長？」
line = "「守護天使様相手に、その呼び方はさすがに……って、会長？」"

[[dialogue]]
speaker = "unk"
# ……アルモたん！
line = "……アルモたん！"

[[dialogue]]
speaker = "unk"
# 貴女がそう望むなら、呼ばせてもらいます。
line = "貴女がそう望むなら、呼ばせてもらいます。"

[[dialogue]]
speaker = "アナ"
# 「えぇぇぇぇ……！？」
line = "「えぇぇぇぇ……！？」"

[[dialogue]]
speaker = "アナ"
# 「会長、正気に戻って。守護天使様ですよ、守護天使様っ。天界では女神様に次ぐ存在で、リクリエという緊急事態でなければ私たちが声をかけられるような方ではないんです！」
line = "「会長、正気に戻って。守護天使様ですよ、守護天使様っ。天界では女神様に次ぐ存在で、リクリエという緊急事態でなければ私たちが声をかけられるような方ではないんです！」"

[[dialogue]]
speaker = "アルモタヘル"
# 「おお……おぉ！　我は喜ばしい。そう呼んでくれたのはお前が初だ、人の子よ！」
line = "「おお……おぉ！　我は喜ばしい。そう呼んでくれたのはお前が初だ、人の子よ！」"

[[dialogue]]
speaker = "アナ"
# 「そうでしょうとも……！」
line = "「そうでしょうとも……！」"

[[dialogue]]
speaker = "unk"
# あ、やっぱり皆、呼べなかったんだ
line = "あ、やっぱり皆、呼べなかったんだ"

[[dialogue]]
speaker = "アルモタヘル"
# 「人の子よ。お前の名も、我に教えるがよい」
line = "「人の子よ。お前の名も、我に教えるがよい」"

[[dialogue]]
speaker = "unk"
# ……緋宮クロトだ
line = "……緋宮クロトだ"

[[dialogue]]
speaker = "アルモタヘル"
# 「うむ、良き名だ。我が記憶に焼き付けよう」
line = "「うむ、良き名だ。我が記憶に焼き付けよう」"

[[dialogue]]
speaker = "アルモタヘル"
# 「改めて、これからよろしく頼むぞ」
line = "「改めて、これからよろしく頼むぞ」"

[[dialogue]]
speaker = "unk"
# こうして、手を差し出したアルモと握手を交わし、俺たちは心強い仲間を手に入れたのだった。
line = "こうして、手を差し出したアルモと握手を交わし、俺たちは心強い仲間を手に入れたのだった。"
