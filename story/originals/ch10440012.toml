[[dialogue]]
speaker = "unk"
# 第２話,自称・悪の終末兵器（後編）,P
line = "第２話,自称・悪の終末兵器（後編）,P"

[[dialogue]]
speaker = "unk"
# プリムラと初めて出会い、<ruby=けんぞく>眷族</ruby>の契約をしてしてしまった後。俺達は場所を星徒会室へと移して、話し合うことになった――
line = "プリムラと初めて出会い、<ruby>眷族<rt>けんぞく</rt></ruby>の契約をしてしてしまった後。俺達は場所を星徒会室へと移して、話し合うことになった――"

[[dialogue]]
speaker = "サチ"
# 「――なるほど。お兄さんとプリムラが契約を結んだ経緯は、大体わかりました」
line = "「――なるほど。お兄さんとプリムラが契約を結んだ経緯は、大体わかりました」"

[[dialogue]]
speaker = "サチ"
# 「で、プリムラ！　悪事はもうバレたんだから、いさぎよく契約を破棄しなさい！」
line = "「で、プリムラ！　悪事はもうバレたんだから、いさぎよく契約を破棄しなさい！」"

[[dialogue]]
speaker = "プリムラ"
# 「それができたらとっくにやっておるわ！　こやつに飲ませた我の体の一部が、命令を全く受け付けぬのじゃ！」
line = "「それができたらとっくにやっておるわ！　こやつに飲ませた我の体の一部が、命令を全く受け付けぬのじゃ！」"

[[dialogue]]
speaker = "サチ"
# 「自分の一部に拒否されるって……お兄さんの方からも、契約は破棄できない感じですか？」
line = "「自分の一部に拒否されるって……お兄さんの方からも、契約は破棄できない感じですか？」"

[[dialogue]]
speaker = "unk"
# 体内でぷるぷるとすり寄られてる感が……
line = "体内でぷるぷるとすり寄られてる感が……"

[[dialogue]]
speaker = "プリムラ"
# 「懐柔されておるではないか！　ぐぬぬ……まさか貴様が、我を眷族にする程の膨大な力を秘めていようとは……我が本来の力を取り戻せば、負けるはずないというのに……！」
line = "「懐柔されておるではないか！　ぐぬぬ……まさか貴様が、我を眷族にする程の膨大な力を秘めていようとは……我が本来の力を取り戻せば、負けるはずないというのに……！」"

[[dialogue]]
speaker = "プリムラ"
# 「――なに？　そもそも我が一体何なのか、じゃと？　最初に言うたであろう。我は『悪の終末兵器』なのじゃ！」
line = "「――なに？　そもそも我が一体何なのか、じゃと？　最初に言うたであろう。我は『悪の終末兵器』なのじゃ！」"

[[dialogue]]
speaker = "サチ"
# 「嘘臭い主張ですが、本当です。プリムラの正体は、ロストアイテムの１つ『賢者の石』を素材として作られた、リクリエを引き起こす為の終末兵器――」
line = "「嘘臭い主張ですが、本当です。プリムラの正体は、ロストアイテムの１つ『賢者の石』を素材として作られた、リクリエを引き起こす為の終末兵器――」"

[[dialogue]]
speaker = "プリムラ"
# 「『メルクリウス』。それが我の、兵器としての真名じゃ。周囲のエネルギーを種類問わず吸収し、無限に成長し続ける」
line = "「『メルクリウス』。それが我の、兵器としての真名じゃ。周囲のエネルギーを種類問わず吸収し、無限に成長し続ける」"

[[dialogue]]
speaker = "プリムラ"
# 「そうやってリクリエを引き起こすのが、我に与えられた命令じゃった」
line = "「そうやってリクリエを引き起こすのが、我に与えられた命令じゃった」"

[[dialogue]]
speaker = "サチ"
# 「ただし、プリムラが何者に作られ、命令されたのかは、自分でも知らないそうです。おそらく、黒幕は自身の存在を隠したかったのでしょう」
line = "「ただし、プリムラが何者に作られ、命令されたのかは、自分でも知らないそうです。おそらく、黒幕は自身の存在を隠したかったのでしょう」"

[[dialogue]]
speaker = "プリムラ"
# 「むっ……その顔は、まだ半信半疑といった様子じゃな？　よかろう、ならば見るがよい！」
line = "「むっ……その顔は、まだ半信半疑といった様子じゃな？　よかろう、ならば見るがよい！」"

[[dialogue]]
speaker = "プリムラ"
# 「この場から１歩も動かず、あそこの来客用の菓子受けにあるチョコを、取ってみせるのじゃ！」
line = "「この場から１歩も動かず、あそこの来客用の菓子受けにあるチョコを、取ってみせるのじゃ！」"

[[dialogue]]
speaker = "プリムラ"
# 「ゆくぞ、体を変形させて――」
line = "「ゆくぞ、体を変形させて――」"

[[dialogue]]
speaker = "unk"
# すごい！　腕がゴムみたいに伸びた！
line = "すごい！　腕がゴムみたいに伸びた！"

[[dialogue]]
speaker = "プリムラ"
# 「フハハハ！　どうじゃ！　もぐもぐ……我は自在に体の形状や性質を変化させることができるのじゃ！」
line = "「フハハハ！　どうじゃ！　もぐもぐ……我は自在に体の形状や性質を変化させることができるのじゃ！」"

[[dialogue]]
speaker = "プリムラ"
# 「体の一部を分離し、貴様に飲ませたのも、この能力の応用というわけじゃ」
line = "「体の一部を分離し、貴様に飲ませたのも、この能力の応用というわけじゃ」"

[[dialogue]]
speaker = "サチ"
# 「賢者の石は、どのような物質でも構成し、生み出せるロストアイテムだそうです」
line = "「賢者の石は、どのような物質でも構成し、生み出せるロストアイテムだそうです」"

[[dialogue]]
speaker = "サチ"
# 「もっとも、今は能力の大部分が封印されていて、ハンパに変形できるスライムみたいな感じですが」
line = "「もっとも、今は能力の大部分が封印されていて、ハンパに変形できるスライムみたいな感じですが」"

[[dialogue]]
speaker = "プリムラ"
# 「ハンパなスライム言うな！　我はサチの持つ封印のロストアイテムによって、本来の力を奪われているのじゃ……そのせいで、今は腕や髪といった体の一部しか変形させられん」
line = "「ハンパなスライム言うな！　我はサチの持つ封印のロストアイテムによって、本来の力を奪われているのじゃ……そのせいで、今は腕や髪といった体の一部しか変形させられん」"

[[dialogue]]
speaker = "プリムラ"
# 「言っておくが、本来の我はこんなちんちくりんボディではないのじゃぞ？　ボンキュッボンな、大人ボディなのじゃ！　それが気づいた時にはこんな姿に……」
line = "「言っておくが、本来の我はこんなちんちくりんボディではないのじゃぞ？　ボンキュッボンな、大人ボディなのじゃ！　それが気づいた時にはこんな姿に……」"

[[dialogue]]
speaker = "プリムラ"
# 「１年前、サチが幸運にも『星の鎖』を手にしていなければ、我が敗北などするはずなかったのじゃ……」
line = "「１年前、サチが幸運にも『星の鎖』を手にしていなければ、我が敗北などするはずなかったのじゃ……」"

[[dialogue]]
speaker = "サチ"
# 「１年前に、私がちょうどロストアイテムを回収していたんです。それが封印のロストアイテム『星の鎖』でした。回収した直後に、プリムラと遭遇する事件が起きて――」
line = "「１年前に、私がちょうどロストアイテムを回収していたんです。それが封印のロストアイテム『星の鎖』でした。回収した直後に、プリムラと遭遇する事件が起きて――」"

[[dialogue]]
speaker = "プリムラ"
# 「我が兵器として起動したばかりのところに、突然、サチが現れた。この幸運をまき散らす化け物とは、一進一退の攻防を繰り広げたが……」
line = "「我が兵器として起動したばかりのところに、突然、サチが現れた。この幸運をまき散らす化け物とは、一進一退の攻防を繰り広げたが……」"

[[dialogue]]
speaker = "プリムラ"
# 「星の鎖が命運を分けた。こやつは幸運にものをいわせて、我の懐に飛び込み……気づいた時には我は封印され、このような姿になっていた」
line = "「星の鎖が命運を分けた。こやつは幸運にものをいわせて、我の懐に飛び込み……気づいた時には我は封印され、このような姿になっていた」"

[[dialogue]]
speaker = "サチ"
# 「私が首に下げて、いつも服の内側にしまっているペンダントが、星の鎖です。先にも見せましたが、プリムラが反抗しようとすれば、こうやって――」
line = "「私が首に下げて、いつも服の内側にしまっているペンダントが、星の鎖です。先にも見せましたが、プリムラが反抗しようとすれば、こうやって――」"

[[dialogue]]
speaker = "サチ"
# 「拘束っ！」
line = "「拘束っ！」"

[[dialogue]]
speaker = "プリムラ"
# 「ちょっ！？」
line = "「ちょっ！？」"

[[dialogue]]
speaker = "サチ"
# 「――このように、拘束と命じることで、鎖を召喚できるんです」
line = "「――このように、拘束と命じることで、鎖を召喚できるんです」"

[[dialogue]]
speaker = "プリムラ"
# 「お試し感覚で我を簀巻きにするでないわ！　というか、さっき１回やって見せたじゃろ！」
line = "「お試し感覚で我を簀巻きにするでないわ！　というか、さっき１回やって見せたじゃろ！」"

[[dialogue]]
speaker = "サチ"
# 「今現在プリムラは、私が星の鎖を所持していることもあって、学園から許可を貰って、私の管理下に置いている状態です」
line = "「今現在プリムラは、私が星の鎖を所持していることもあって、学園から許可を貰って、私の管理下に置いている状態です」"

[[dialogue]]
speaker = "サチ"
# 「なので、プリムラがお兄さんと無理矢理契約をしたことについては、私の監督不行き届きでした。大変申し訳ありません」
line = "「なので、プリムラがお兄さんと無理矢理契約をしたことについては、私の監督不行き届きでした。大変申し訳ありません」"

[[dialogue]]
speaker = "サチ"
# 「契約の解除方法についてはもちろん見つけ出しますし、プリムラも責任を持って更生させるので、今回のことはどうか、お許しいただけないでしょうか……？」
line = "「契約の解除方法についてはもちろん見つけ出しますし、プリムラも責任を持って更生させるので、今回のことはどうか、お許しいただけないでしょうか……？」"

[[dialogue]]
speaker = "プリムラ"
# 「ふん、更生など誰がするか！　我はあくまで悪の終末兵器として生まれた存在。いつか必ず力を取り戻し、世界征服をしてやるのじゃ！」
line = "「ふん、更生など誰がするか！　我はあくまで悪の終末兵器として生まれた存在。いつか必ず力を取り戻し、世界征服をしてやるのじゃ！」"

[[dialogue]]
speaker = "プリムラ"
# 「故に、我のことを舐めて油断すれば、いつか体の内側から食い破られることになるぞ……！」
line = "「故に、我のことを舐めて油断すれば、いつか体の内側から食い破られることになるぞ……！」"

[[dialogue]]
speaker = "プリムラ"
# 「体から我の分体を取り除けない以上、主従を逆転するチャンスはこれからいくらでもあるのじゃからな！」
line = "「体から我の分体を取り除けない以上、主従を逆転するチャンスはこれからいくらでもあるのじゃからな！」"

[[dialogue]]
speaker = "サチ"
# 「こら、プリムラ！　アンタまだそんなこと言って……！」
line = "「こら、プリムラ！　アンタまだそんなこと言って……！」"

[[dialogue]]
speaker = "unk"
# いいよ、サチ。これからよろしく、プリムラ
line = "いいよ、サチ。これからよろしく、プリムラ"

[[dialogue]]
speaker = "プリムラ"
# 「お、おう……って、いや少しはビビらんか！　なに澄ました顔をしとるのじゃ！？」
line = "「お、おう……って、いや少しはビビらんか！　なに澄ました顔をしとるのじゃ！？」"

[[dialogue]]
speaker = "プリムラ"
# 「さては貴様、我を逆に眷族にしたからと、調子に乗っておるな！？　子供っぽい見た目だからと、舐めるでないわ！」
line = "「さては貴様、我を逆に眷族にしたからと、調子に乗っておるな！？　子供っぽい見た目だからと、舐めるでないわ！」"

[[dialogue]]
speaker = "プリムラ"
# 「――そうではないじゃと？　だったら、なんだと……」
line = "「――そうではないじゃと？　だったら、なんだと……」"

[[dialogue]]
speaker = "unk"
# 今の目的は世界征服なんでしょ？　なら――
line = "今の目的は世界征服なんでしょ？　なら――"

[[dialogue]]
speaker = "プリムラ"
# 「――我が世界を滅ぼすはずがない、と？」
line = "「――我が世界を滅ぼすはずがない、と？」"

[[dialogue]]
speaker = "プリムラ"
# 「フ……クク……フハハハハ！　気に入ったぞ、貴様！」
line = "「フ……クク……フハハハハ！　気に入ったぞ、貴様！」"

[[dialogue]]
speaker = "プリムラ"
# 「面白いことを言う！　サチへの特異点としてだけでなく、一個人として貴様に興味が湧いてきたぞ！」
line = "「面白いことを言う！　サチへの特異点としてだけでなく、一個人として貴様に興味が湧いてきたぞ！」"

[[dialogue]]
speaker = "プリムラ"
# 「ますます我の眷属にしたくなった！　改めて宣言するぞ、新星の星徒会長！」
line = "「ますます我の眷属にしたくなった！　改めて宣言するぞ、新星の星徒会長！」"

[[dialogue]]
speaker = "プリムラ"
# 「我は必ずや主導権を奪い返し、貴様を我の眷族にしてみせるのじゃ！　首を洗って待っているがよいぞ！　フハハハハハ！」
line = "「我は必ずや主導権を奪い返し、貴様を我の眷族にしてみせるのじゃ！　首を洗って待っているがよいぞ！　フハハハハハ！」"

[[dialogue]]
speaker = "unk"
# 自称・悪の終末兵器は愉快そうに笑いながら、その瞳を力強く輝かせるのだった。
line = "自称・悪の終末兵器は愉快そうに笑いながら、その瞳を力強く輝かせるのだった。"
