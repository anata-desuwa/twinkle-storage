[[dialogue]]
speaker = "ウェンディ"
# （けれどどうして、さっきから――ツェツィーリエの挑発するような笑みが離れないんですか！）
line = "（けれどどうして、さっきから――ツェツィーリエの挑発するような笑みが離れないんですか！）"

[[dialogue]]
speaker = "ウェンディ"
# （それが……それが――）
line = "（それが……それが――）"

[[dialogue]]
speaker = "ウェンディ"
# 「どうしても気に障るんですよっ！！！　ヒットですっ！！！」
line = "「どうしても気に障るんですよっ！！！　ヒットですっ！！！」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「おお～！　いったね～」
line = "「おお～！　いったね～」"

[[dialogue]]
speaker = "アイリーン"
# 「ワクワク♪」
line = "「ワクワク♪」"

[[dialogue]]
speaker = "ウェンディ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ウェンディ"
# 「……………………『６』……２１点、です……」
line = "「……………………『６』……２１点、です……」"

[[dialogue]]
speaker = "アイリーン"
# 「やったー！　やったよウェンディさん！！」
line = "「やったー！　やったよウェンディさん！！」"

[[dialogue]]
speaker = "ウェンディ"
# 「は……はは……ははは……」
line = "「は……はは……ははは……」"

[[dialogue]]
speaker = "アイリーン"
# 「スタンドにしかけてやめてヒットにしたみたいだけど、ウェンディさん的には何かあったの？」
line = "「スタンドにしかけてやめてヒットにしたみたいだけど、ウェンディさん的には何かあったの？」"

[[dialogue]]
speaker = "ウェンディ"
# 「本当は……バーストの危険性が、かなり高かったんですけど……」
line = "「本当は……バーストの危険性が、かなり高かったんですけど……」"

[[dialogue]]
speaker = "ウェンディ"
# 「でも、確率を超えた何かを感じ取ったので……勝負しました」
line = "「でも、確率を超えた何かを感じ取ったので……勝負しました」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「いいね～、そういうの好きだよ～♪」
line = "「いいね～、そういうの好きだよ～♪」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「ウェンディのことちょっと見直しちゃったな。こんな痺れるような勝負が出来るんだって」
line = "「ウェンディのことちょっと見直しちゃったな。こんな痺れるような勝負が出来るんだって」"

[[dialogue]]
speaker = "ウェンディ"
# 「ほんのり上から目線なのがやっぱり気に食わないのですが……でもまあ、面白い勝負でしたよ」
line = "「ほんのり上から目線なのがやっぱり気に食わないのですが……でもまあ、面白い勝負でしたよ」"

[[dialogue]]
speaker = "セドナ"
# 「勝った気になるのは早いのではないか？　まだディーラーのカードがオープンになっていないだろう？」
line = "「勝った気になるのは早いのではないか？　まだディーラーのカードがオープンになっていないだろう？」"

[[dialogue]]
speaker = "ウェンディ"
# 「そうですね、ドローの可能性はあります！　ではディーラー、伏せられたカードのオープンを……って、あれ？」
line = "「そうですね、ドローの可能性はあります！　ではディーラー、伏せられたカードのオープンを……って、あれ？」"

[[dialogue]]
speaker = "セドナ"
# 「ずいぶんと盛り上がっていたようだな」
line = "「ずいぶんと盛り上がっていたようだな」"

[[dialogue]]
speaker = "ウェンディ"
# 「せせせ、セドナ長官っ！！！？」
line = "「せせせ、セドナ長官っ！！！？」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「たはは、これまた珍しいねぇ。長官も遊びに来たんですか？」
line = "「たはは、これまた珍しいねぇ。長官も遊びに来たんですか？」"

[[dialogue]]
speaker = "ウェンディ"
# 「そんなわけないでしょう！」
line = "「そんなわけないでしょう！」"

[[dialogue]]
speaker = "ヘレナ"
# 「カジノでバカ勝ちしている者がいると聞いて来てみたが、貴殿の組織の娘であったか」
line = "「カジノでバカ勝ちしている者がいると聞いて来てみたが、貴殿の組織の娘であったか」"

[[dialogue]]
speaker = "ヘレナ"
# 「先ほどの勝負、一部始終を見させてもらったぞ。我がカジノの歴史に残るほどの名勝負であった！」
line = "「先ほどの勝負、一部始終を見させてもらったぞ。我がカジノの歴史に残るほどの名勝負であった！」"

[[dialogue]]
speaker = "ウェンディ"
# 「あ、あなたは……？　我がカジノって、ここのオーナー……ということは……」
line = "「あ、あなたは……？　我がカジノって、ここのオーナー……ということは……」"

[[dialogue]]
speaker = "ヘレナ"
# 「うむ、お察しの通りだ！」
line = "「うむ、お察しの通りだ！」"

[[dialogue]]
speaker = "ヘレナ"
# 「立てばプリティ、座ればゴージャス。カジノオーナーにして九浄家二十六代目当主・九浄ヘレナちゃんとは、私のことであるっ！」
line = "「立てばプリティ、座ればゴージャス。カジノオーナーにして九浄家二十六代目当主・九浄ヘレナちゃんとは、私のことであるっ！」"

[[dialogue]]
speaker = "アイリーン"
# 「うわー、すっごいヒト、出てきちゃった……」
line = "「うわー、すっごいヒト、出てきちゃった……」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「こんにちは～♪　カジノ、楽しませてもらってるよん♪」
line = "「こんにちは～♪　カジノ、楽しませてもらってるよん♪」"

[[dialogue]]
speaker = "ヘレナ"
# 「うむうむ、それは結構！」
line = "「うむうむ、それは結構！」"

[[dialogue]]
speaker = "ウェンディ"
# 「ば、バカっ！　どこまで怖いもの知らずなんですか、あなたは！」
line = "「ば、バカっ！　どこまで怖いもの知らずなんですか、あなたは！」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「え～」
line = "「え～」"

[[dialogue]]
speaker = "セドナ"
# 「ウェンディ」
line = "「ウェンディ」"

[[dialogue]]
speaker = "ウェンディ"
# 「ひゃいっ！！」
line = "「ひゃいっ！！」"

[[dialogue]]
speaker = "セドナ"
# 「時には息抜きもいいだろう。だがあまり熱くなりすぎるなよ」
line = "「時には息抜きもいいだろう。だがあまり熱くなりすぎるなよ」"

[[dialogue]]
speaker = "ウェンディ"
# 「りょ、了解でありますっ！　さ！　アイリーン、ツェツィーリエ！　帰りますよっ！」
line = "「りょ、了解でありますっ！　さ！　アイリーン、ツェツィーリエ！　帰りますよっ！」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「わわわ、ちょっと待ってよ！　まだ勝負の途中だし、配当も貰ってないからーっ！！」
line = "「わわわ、ちょっと待ってよ！　まだ勝負の途中だし、配当も貰ってないからーっ！！」"

[[dialogue]]
speaker = "アイリーン"
# 「お先に失礼しまーす♪」
line = "「お先に失礼しまーす♪」"

[[dialogue]]
speaker = "セドナ"
# 「咎めるつもりはなかったのだがな……この場を捨て行くとは」
line = "「咎めるつもりはなかったのだがな……この場を捨て行くとは」"

[[dialogue]]
speaker = "セドナ"
# 「部下が失礼をした、申し訳ない」
line = "「部下が失礼をした、申し訳ない」"

[[dialogue]]
speaker = "ヘレナ"
# 「なんの、気にせずともよい」
line = "「なんの、気にせずともよい」"

[[dialogue]]
speaker = "セドナ"
# 「この不始末は私が引き継ごう……さあディーラー、その伏せられたカードをめくってくれ」
line = "「この不始末は私が引き継ごう……さあディーラー、その伏せられたカードをめくってくれ」"

[[dialogue]]
speaker = "トリュファイナ"
# 「……………………」
line = "「……………………」"
