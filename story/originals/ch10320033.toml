[[dialogue]]
speaker = "unk"
# 第３話,ウィステリアの秘密？,P
line = "第３話,ウィステリアの秘密？,P"

[[dialogue]]
speaker = "unk"
# ウィステリアさんの新居が決まるまで、一時的に我が家に滞在することになった。
line = "ウィステリアさんの新居が決まるまで、一時的に我が家に滞在することになった。"

[[dialogue]]
speaker = "unk"
# しかも母さんが出張で家を離れてしまって、ウィステリアさんと２人きりだ。
line = "しかも母さんが出張で家を離れてしまって、ウィステリアさんと２人きりだ。"

[[dialogue]]
speaker = "ウィステリア"
# 「会長くん、ショートケーキ作ったの。一緒に食べましょ──」
line = "「会長くん、ショートケーキ作ったの。一緒に食べましょ──」"

[[dialogue]]
speaker = "ウィステリア"
# 「きゃぁっ！？」
line = "「きゃぁっ！？」"

[[dialogue]]
speaker = "unk"
# 危ない！！
line = "危ない！！"

[[dialogue]]
speaker = "ウィステリア"
# 「あ、ありがとう、会長くん……受け止めてくれなかったら、ケーキが台無しになるところだったわ」
line = "「あ、ありがとう、会長くん……受け止めてくれなかったら、ケーキが台無しになるところだったわ」"

[[dialogue]]
speaker = "ウィステリア"
# 「危ない危ない……ケーキを作ってる時も生地ひっくり返しそうになったし、やっぱり不運だわ……」
line = "「危ない危ない……ケーキを作ってる時も生地ひっくり返しそうになったし、やっぱり不運だわ……」"

[[dialogue]]
speaker = "unk"
# ケーキは無事だったが、深い胸の谷間にクリームがこぼれてしまっている。
line = "ケーキは無事だったが、深い胸の谷間にクリームがこぼれてしまっている。"

[[dialogue]]
speaker = "unk"
# 俺は顔を近づけて──
line = "俺は顔を近づけて──"

[[dialogue]]
speaker = "unk"
# ぺろっ
line = "ぺろっ"

[[dialogue]]
speaker = "ウィステリア"
# 「ひゃあああっ！？」
line = "「ひゃあああっ！？」"

[[dialogue]]
speaker = "ウィステリア"
# 「かかかか、会長くん！？　ちょっと大胆過ぎないかしら！？」
line = "「かかかか、会長くん！？　ちょっと大胆過ぎないかしら！？」"

[[dialogue]]
speaker = "ウィステリア"
# 「クリームがもったいなかったから？　え～、絶対そうじゃないでしょ」
line = "「クリームがもったいなかったから？　え～、絶対そうじゃないでしょ」"

[[dialogue]]
speaker = "ウィステリア"
# 「もう、またケーキ落とすところだったじゃない……会長くんも男の子なのね」
line = "「もう、またケーキ落とすところだったじゃない……会長くんも男の子なのね」"

[[dialogue]]
speaker = "ウィステリア"
# 「それじゃ気を取り直して、一緒にケーキ食べましょ。紅茶も淹れたわよ」
line = "「それじゃ気を取り直して、一緒にケーキ食べましょ。紅茶も淹れたわよ」"

[[dialogue]]
speaker = "unk"
# ケーキ美味しいです
line = "ケーキ美味しいです"

[[dialogue]]
speaker = "ウィステリア"
# 「でしょう？　星見家メイド隊で、キリカから教わったケーキなんだから。お菓子に関してはキリカのこと認めてるのよ、私」
line = "「でしょう？　星見家メイド隊で、キリカから教わったケーキなんだから。お菓子に関してはキリカのこと認めてるのよ、私」"

[[dialogue]]
speaker = "ウィステリア"
# 「会長くんと一緒に三時のティータイムなんて、至福の時間だわ～♪」
line = "「会長くんと一緒に三時のティータイムなんて、至福の時間だわ～♪」"

[[dialogue]]
speaker = "unk"
# ところで、ウィステリアさんって魔族なんですよね？
line = "ところで、ウィステリアさんって魔族なんですよね？"

[[dialogue]]
speaker = "ウィステリア"
# 「そうよ。私、魔族らしくないかしら？」
line = "「そうよ。私、魔族らしくないかしら？」"

[[dialogue]]
speaker = "ウィステリア"
# 「……身体的特徴？　ああ、魔女以外は、角とか尻尾とか何かしら付いてるものね」
line = "「……身体的特徴？　ああ、魔女以外は、角とか尻尾とか何かしら付いてるものね」"

[[dialogue]]
speaker = "ウィステリア"
# 「私の場合、腰から生えてる羽みたいなのがそれね」
line = "「私の場合、腰から生えてる羽みたいなのがそれね」"

[[dialogue]]
speaker = "unk"
# そこだったんですか！？
line = "そこだったんですか！？"

[[dialogue]]
speaker = "ウィステリア"
# 「そうよ。そんなに大きくないから、付いてるのに気付かない人もいるけどね」
line = "「そうよ。そんなに大きくないから、付いてるのに気付かない人もいるけどね」"

[[dialogue]]
speaker = "ウィステリア"
# 「これ、石でできてるのよ。動物の耳だったり、竜の翼だったりはあるけど、無機物系の特徴を持つ魔族は珍しいかもしれないわね」
line = "「これ、石でできてるのよ。動物の耳だったり、竜の翼だったりはあるけど、無機物系の特徴を持つ魔族は珍しいかもしれないわね」"

[[dialogue]]
speaker = "ウィステリア"
# 「お祖父様──なんて呼び方は今はしなくていいわね。うちの祖父は体の半分が水晶だったし、そういう一族なのよ」
line = "「お祖父様──なんて呼び方は今はしなくていいわね。うちの祖父は体の半分が水晶だったし、そういう一族なのよ」"

[[dialogue]]
speaker = "ウィステリア"
# 「……私の実家の話？　話してもいいけど、あんまりおもしろい話じゃないわよ」
line = "「……私の実家の話？　話してもいいけど、あんまりおもしろい話じゃないわよ」"

[[dialogue]]
speaker = "ウィステリア"
# 「魔界にはドゥームフォレストって呼ばれる、暗い暗い森があって、さらにその奥に大きな渓谷があるの」
line = "「魔界にはドゥームフォレストって呼ばれる、暗い暗い森があって、さらにその奥に大きな渓谷があるの」"

[[dialogue]]
speaker = "ウィステリア"
# 「私の実家は、その渓谷にそびえる大きな館」
line = "「私の実家は、その渓谷にそびえる大きな館」"

[[dialogue]]
speaker = "ウィステリア"
# 「そこに住んでいるのは、邪悪な呪術を代々伝える、魔界でも有数の<ruby=ふる>旧</ruby>い一族」
line = "「そこに住んでいるのは、邪悪な呪術を代々伝える、魔界でも有数の<ruby>旧<rt>ふる</rt></ruby>い一族」"

[[dialogue]]
speaker = "ウィステリア"
# 「水晶でできた怪物みたいな祖父を筆頭に、呪術を極めるために歴史を積み重ねる、おぞましい連中よ」
line = "「水晶でできた怪物みたいな祖父を筆頭に、呪術を極めるために歴史を積み重ねる、おぞましい連中よ」"

[[dialogue]]
speaker = "ウィステリア"
# 「あと、ドゥームフォレストにはリクリエのモンスターより強い魔獣がそこかしこにいてね。魔界の中でもトップクラスに危ない場所だって言われているわ」
line = "「あと、ドゥームフォレストにはリクリエのモンスターより強い魔獣がそこかしこにいてね。魔界の中でもトップクラスに危ない場所だって言われているわ」"

[[dialogue]]
speaker = "ウィステリア"
# 「その魔獣を呪術の練習相手にしていたから、戦闘経験を積むのに苦労はしなかったわ……」
line = "「その魔獣を呪術の練習相手にしていたから、戦闘経験を積むのに苦労はしなかったわ……」"

[[dialogue]]
speaker = "ウィステリア"
# 「そのせいで腕自慢の星騎士に挑まれて、１００人抜きなんてやらされる羽目に……コホン、そのことは忘れましょう」
line = "「そのせいで腕自慢の星騎士に挑まれて、１００人抜きなんてやらされる羽目に……コホン、そのことは忘れましょう」"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
# 「で、魔将フォームでは羽が水晶になって、大きくなったの。地下図書館の魔力で変化したのかしら」
line = "「で、魔将フォームでは羽が水晶になって、大きくなったの。地下図書館の魔力で変化したのかしら」"

[[dialogue]]
speaker = "unk"
# 水晶の翼、神秘的でかっこいい……！
line = "水晶の翼、神秘的でかっこいい……！"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
# 「会長くんの目が輝いてる……！　男の子ってこういうのが好きなのね」
line = "「会長くんの目が輝いてる……！　男の子ってこういうのが好きなのね」"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
# 「ちなみに、水晶といっても魔族の体の一部だから、そう簡単に割れたりしないわ。心配しないで大丈夫よ」
line = "「ちなみに、水晶といっても魔族の体の一部だから、そう簡単に割れたりしないわ。心配しないで大丈夫よ」"

[[dialogue]]
speaker = "unk"
# 触ってみてもいいですか？
line = "触ってみてもいいですか？"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
# 「いいけど、そんなに面白いものじゃないわよ。どうせ石だし」
line = "「いいけど、そんなに面白いものじゃないわよ。どうせ石だし」"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
# 「……どうぞ。別に減るものじゃないからいいんだけど、自分の体を触らせるのって、ちょっと恥ずかしいわね」
line = "「……どうぞ。別に減るものじゃないからいいんだけど、自分の体を触らせるのって、ちょっと恥ずかしいわね」"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
# 「ひぁあ！？」
line = "「ひぁあ！？」"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
# 「ち、違うの。今のは思ってたのと違うところを触られて──あぁんっ<emoji=heart04>」
line = "「ち、違うの。今のは思ってたのと違うところを触られて──あぁんっ<emoji=heart04>」"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
# （いつもはこんなことないのに、会長くんに触られてるから……？）
line = "（いつもはこんなことないのに、会長くんに触られてるから……？）"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
# 「あ、会長くんの指がつつ～って……ん～っ<emoji=heart04>　あ、そこ触っちゃ……あ……ふぅ……はぁん<emoji=heart04>」
line = "「あ、会長くんの指がつつ～って……ん～っ<emoji=heart04>　あ、そこ触っちゃ……あ……ふぅ……はぁん<emoji=heart04>」"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
# 「もう、会長くんがそう来るなら私も容赦しないわよ！　コチョコチョコチョ～っ」
line = "「もう、会長くんがそう来るなら私も容赦しないわよ！　コチョコチョコチョ～っ」"

[[dialogue]]
speaker = "unk"
# ウィステリアさんの手が俺の服をまさぐり、弱いところをくすぐる。
line = "ウィステリアさんの手が俺の服をまさぐり、弱いところをくすぐる。"

[[dialogue]]
speaker = "unk"
# もちろん俺も反撃して、じゃれ合いながら午後を過ごしたのだった。
line = "もちろん俺も反撃して、じゃれ合いながら午後を過ごしたのだった。"
