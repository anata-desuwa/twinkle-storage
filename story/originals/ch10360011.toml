[[dialogue]]
speaker = "unk"
# 第１話,白昼の極星,P
line = "第１話,白昼の極星,P"

[[dialogue]]
speaker = "unk"
# それはフィオナと知り合って、数日後のこと――
line = "それはフィオナと知り合って、数日後のこと――"

[[dialogue]]
speaker = "フィオナ"
# 「失礼致します、緋宮会長。先日の戦闘の報告書を持って来ました」
line = "「失礼致します、緋宮会長。先日の戦闘の報告書を持って来ました」"

[[dialogue]]
speaker = "unk"
# ところで、そちらの方は……？
line = "ところで、そちらの方は……？"

[[dialogue]]
speaker = "unk"
# フィオナ、ありがとう
line = "フィオナ、ありがとう"

[[dialogue]]
speaker = "フィオナ"
# 「実は、こちらに来る途中でお会いしまして。そうしたら、流星寮の寮長として、緋宮会長に挨拶をしたいとのことで」
line = "「実は、こちらに来る途中でお会いしまして。そうしたら、流星寮の寮長として、緋宮会長に挨拶をしたいとのことで」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「おーっほっほっほ！　ごきげんよう。お初にお目に掛かりますわ、新星学園の会長」
line = "「おーっほっほっほ！　ごきげんよう。お初にお目に掛かりますわ、新星学園の会長」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「私は流星学園の３年生、<ruby=せんおんじ>千園寺</ruby>ヒルディオーネですわ！　流星寮の寮長<ruby=エトワール・イルソーレ>『真昼の極星』</ruby>を務めておりますの」
line = "「私は流星学園の３年生、<ruby>千園寺<rt>せんおんじ</rt></ruby>ヒルディオーネですわ！　流星寮の寮長<ruby>『真昼の極星』<rt>エトワール・イルソーレ</rt></ruby>を務めておりますの」"

[[dialogue]]
speaker = "unk"
# エトワール・イルソーレ……？
line = "エトワール・イルソーレ……？"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「生徒達から寮長へ、敬意を込めて呼ばれる二つ名ですわ。栄えある流星寮の伝統ですわね。私も誇りを持って名乗っておりますわ」
line = "「生徒達から寮長へ、敬意を込めて呼ばれる二つ名ですわ。栄えある流星寮の伝統ですわね。私も誇りを持って名乗っておりますわ」"

[[dialogue]]
speaker = "フィオナ"
# 「千園寺先輩は流星学園において、星騎士の模範とも称されている方です。特に寮生からは『お姉様』と呼ばれて、尊敬されているんですよ」
line = "「千園寺先輩は流星学園において、星騎士の模範とも称されている方です。特に寮生からは『お姉様』と呼ばれて、尊敬されているんですよ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「おーっほっほ、それ程でもありましてよ！　私は千園寺家の令嬢として当然の、エレガントな振る舞いをしているだけですわ」
line = "「おーっほっほ、それ程でもありましてよ！　私は千園寺家の令嬢として当然の、エレガントな振る舞いをしているだけですわ」"

[[dialogue]]
speaker = "unk"
# 宇宙開発で有名な、あの千園寺……？
line = "宇宙開発で有名な、あの千園寺……？"

[[dialogue]]
speaker = "フィオナ"
# 「はい。九浄家も名を連ねている流星市国『五名門』の１つで、宇宙開発企業の『千園寺ギャラクティック』が世界的にも有名ですね」
line = "「はい。九浄家も名を連ねている流星市国『五名門』の１つで、宇宙開発企業の『千園寺ギャラクティック』が世界的にも有名ですね」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「さて、私の自己紹介はこれくらいでよろしいでしょう。今日来たのは、挨拶する為だけではありませんわ」
line = "「さて、私の自己紹介はこれくらいでよろしいでしょう。今日来たのは、挨拶する為だけではありませんわ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ズバリ、緋宮会長。貴方に宣戦布告をする為でしてよ！」
line = "「ズバリ、緋宮会長。貴方に宣戦布告をする為でしてよ！」"

[[dialogue]]
speaker = "unk"
# えぇっ！？
line = "えぇっ！？"

[[dialogue]]
speaker = "フィオナ"
# 「千園寺先輩……！？　私、そんなこと聞いていないんですが！？」
line = "「千園寺先輩……！？　私、そんなこと聞いていないんですが！？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「先日の御前試合、私も映像で観させて頂きましたわ。新星学園最強と呼ばれる内の１人、九浄ヴィーナスに勝利したことには驚きましたが……」
line = "「先日の御前試合、私も映像で観させて頂きましたわ。新星学園最強と呼ばれる内の１人、九浄ヴィーナスに勝利したことには驚きましたが……」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「それで調子に乗ってもらっては困りますわ！　学園最強と称される者は他にもおりますのよ！　まずはここにいる流星学園星徒会長である星見フィオナ！」
line = "「それで調子に乗ってもらっては困りますわ！　学園最強と称される者は他にもおりますのよ！　まずはここにいる流星学園星徒会長である星見フィオナ！」"

[[dialogue]]
speaker = "フィオナ"
# 「ま、まあ、会長なので間違ってはないですけど……」
line = "「ま、まあ、会長なので間違ってはないですけど……」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「それから私と対を為す<ruby=エトワール・ラルーナ>『宵闇の極星』</ruby>こと、新星寮の寮長である<ruby=きりゅういん>妃竜院</ruby>マハムート！」
line = "「それから私と対を為す<ruby>『宵闇の極星』<rt>エトワール・ラルーナ</rt></ruby>こと、新星寮の寮長である<ruby>妃竜院<rt>きりゅういん</rt></ruby>マハムート！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「そして、マムと入学の頃からライバル関係にあるこの私、千園寺ヒルディオーネ！　少なくとも私たちを破らぬ限り、最強の肩書きは名乗らせませんわ！」
line = "「そして、マムと入学の頃からライバル関係にあるこの私、千園寺ヒルディオーネ！　少なくとも私たちを破らぬ限り、最強の肩書きは名乗らせませんわ！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「御前試合の内容も、お粗末なもの！　何度も無様に転がされ、ギリギリで力を覚醒させての逆転。エレガントとは程遠いですわ！」
line = "「御前試合の内容も、お粗末なもの！　何度も無様に転がされ、ギリギリで力を覚醒させての逆転。エレガントとは程遠いですわ！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「とはいえ、あの九浄ヴィーナスに勝ったのもまた事実！　故に、貴方には特別に、この私と親交を結ぶことを許可しましてよ！　光栄に思いなさい！」
line = "「とはいえ、あの九浄ヴィーナスに勝ったのもまた事実！　故に、貴方には特別に、この私と親交を結ぶことを許可しましてよ！　光栄に思いなさい！」"

[[dialogue]]
speaker = "unk"
# え、えっと……？
line = "え、えっと……？"

[[dialogue]]
speaker = "フィオナ"
# 「こ、これはつまり、千園寺先輩なりに緋宮会長を評価しているというか。友人になりましょう、というお誘いってことですよね……？」
line = "「こ、これはつまり、千園寺先輩なりに緋宮会長を評価しているというか。友人になりましょう、というお誘いってことですよね……？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「は？　何を言ってますの、フィオナ。友人に戦線布告などするわけがないでしょう！」
line = "「は？　何を言ってますの、フィオナ。友人に戦線布告などするわけがないでしょう！」"

[[dialogue]]
speaker = "フィオナ"
# 「あれぇ！？」
line = "「あれぇ！？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「……私はあの御前試合を見て、感じましたのよ。緋宮会長は人並みならぬ努力を重ねて、ここに立っている人間だと」
line = "「……私はあの御前試合を見て、感じましたのよ。緋宮会長は人並みならぬ努力を重ねて、ここに立っている人間だと」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「故に私は……貴方に問いますわ。緋宮会長は、<b>最強</b>というものに興味がありまして？」
line = "「故に私は……貴方に問いますわ。緋宮会長は、<b>最強</b>というものに興味がありまして？」"

[[dialogue]]
speaker = "unk"
# 興味はある
line = "興味はある"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「それは、何故ですの……？」
line = "「それは、何故ですの……？」"

[[dialogue]]
speaker = "unk"
# 最強になれば、リクリエから皆を守れる
line = "最強になれば、リクリエから皆を守れる"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「おーっほっほっほ、笑わせてくれますこと！　しかし、落ち着いていて、それも本気の目ですわ」
line = "「おーっほっほっほ、笑わせてくれますこと！　しかし、落ち着いていて、それも本気の目ですわ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「私の見立てはやはり、間違っていませんでしたわ。ならば貴方をやはり友人とは呼べませんわね！」
line = "「私の見立てはやはり、間違っていませんでしたわ。ならば貴方をやはり友人とは呼べませんわね！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「緋宮会長、今日から貴方は、私と同じ最強を目指す<b>同志</b>ですわ！」
line = "「緋宮会長、今日から貴方は、私と同じ最強を目指す<b>同志</b>ですわ！」"

[[dialogue]]
speaker = "フィオナ"
# 「えっと……つまり、これから仲良くしようってことですね！？」
line = "「えっと……つまり、これから仲良くしようってことですね！？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ですわ！！！」
line = "「ですわ！！！」"

[[dialogue]]
speaker = "フィオナ"
# 「ほっ……」
line = "「ほっ……」"

[[dialogue]]
speaker = "unk"
# （通訳、大変そうだな……）
line = "（通訳、大変そうだな……）"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「どうやら緋宮会長の顔を見るに、私の言いたいことは伝わったようですわね？　でも、宣戦布告というのは別に間違っておりませんのよ」
line = "「どうやら緋宮会長の顔を見るに、私の言いたいことは伝わったようですわね？　でも、宣戦布告というのは別に間違っておりませんのよ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「緋宮会長は『学園対抗杯』について、もうご存知かしら？」
line = "「緋宮会長は『学園対抗杯』について、もうご存知かしら？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「流星学園と新星学園は毎年、モンスターの討伐戦績で実力を競い合っておりますの。すなわち、緋宮会長と私は、同志でありライバルということになりますわ」
line = "「流星学園と新星学園は毎年、モンスターの討伐戦績で実力を競い合っておりますの。すなわち、緋宮会長と私は、同志でありライバルということになりますわ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ちなみに、私が入学してからの２年間は、流星学園が連勝しておりますわ」
line = "「ちなみに、私が入学してからの２年間は、流星学園が連勝しておりますわ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「今年も勿論、エレガントに勝たせて頂きますので。無様を晒したくなければ、御前試合の最後のように本気で来ることですわ」
line = "「今年も勿論、エレガントに勝たせて頂きますので。無様を晒したくなければ、御前試合の最後のように本気で来ることですわ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「それでは私、お先に失礼致しますわね」
line = "「それでは私、お先に失礼致しますわね」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「おーっほっほっほ！　ごめんあそばせ！」
line = "「おーっほっほっほ！　ごめんあそばせ！」"

[[dialogue]]
speaker = "unk"
# 千園寺先輩、凄く面白い人だね
line = "千園寺先輩、凄く面白い人だね"

[[dialogue]]
speaker = "フィオナ"
# 「ええ、まあ……。でも、言葉選びがちょっと悪いだけで……本当に凄い人なんですよ」
line = "「ええ、まあ……。でも、言葉選びがちょっと悪いだけで……本当に凄い人なんですよ」"

[[dialogue]]
speaker = "フィオナ"
# 「お世辞でも何でもなく、２年間、学園対抗杯を勝利に導いて来た、流星学園が誇る<ruby=スター>極星</ruby>ですから」
line = "「お世辞でも何でもなく、２年間、学園対抗杯を勝利に導いて来た、流星学園が誇る<ruby>極星<rt>スター</rt></ruby>ですから」"
