[[dialogue]]
speaker = "unk"
# メインの大プールで泳いだ後は、別なプールへと移動する。
line = "メインの大プールで泳いだ後は、別なプールへと移動する。"

[[dialogue]]
speaker = "unk"
# 次は定期的に波の発生するプールに遊びに来ていた。
line = "次は定期的に波の発生するプールに遊びに来ていた。"

[[dialogue]]
speaker = "ラティエ"
# 「おおお、これは面白いな。プールなのにまるで海を泳いでいるようだ」
line = "「おおお、これは面白いな。プールなのにまるで海を泳いでいるようだ」"

[[dialogue]]
speaker = "サラン"
# 「波にふわふわ、翻弄されちゃう～♪」
line = "「波にふわふわ、翻弄されちゃう～♪」"

[[dialogue]]
speaker = "unk"
# 泳げないサランは浮き輪をしっかり装着して、楽しそうに波に揺られている。
line = "泳げないサランは浮き輪をしっかり装着して、楽しそうに波に揺られている。"

[[dialogue]]
speaker = "unk"
# 一方のエルゼは、プールを楽しんではいるものの、学園長とは距離を取りつつ冷たい態度を取り続けていた。
line = "一方のエルゼは、プールを楽しんではいるものの、学園長とは距離を取りつつ冷たい態度を取り続けていた。"

[[dialogue]]
speaker = "エスメラルダ"
# 『エルデリーゼさん、学園長と何か因縁があるのかしら？』
line = "『エルデリーゼさん、学園長と何か因縁があるのかしら？』"

[[dialogue]]
speaker = "unk"
# エルゼはフィオナを敬愛しているんです
line = "エルゼはフィオナを敬愛しているんです"

[[dialogue]]
speaker = "unk"
# 因縁、というわけではないのですが
line = "因縁、というわけではないのですが"

[[dialogue]]
speaker = "unk"
# 聞いたところによると、エルゼが星騎士として伸び悩んでいた時に、相談に乗ってくれたのがフィオナだという話だ。
line = "聞いたところによると、エルゼが星騎士として伸び悩んでいた時に、相談に乗ってくれたのがフィオナだという話だ。"

[[dialogue]]
speaker = "エスメラルダ"
# 『フィオナさんに迷惑をかけている学園長には思うところあり、ということなのね……』
line = "『フィオナさんに迷惑をかけている学園長には思うところあり、ということなのね……』"

[[dialogue]]
speaker = "unk"
# そんなエルゼの様子に、学園長も気付いてはいるのだろう。
line = "そんなエルゼの様子に、学園長も気付いてはいるのだろう。"

[[dialogue]]
speaker = "unk"
# しかし、特に気にした様子はなく、変わらぬ態度で２人に話しかけている。
line = "しかし、特に気にした様子はなく、変わらぬ態度で２人に話しかけている。"

[[dialogue]]
speaker = "ラティエ"
# 「波と言えば、２人は『<ruby=ドゥームズデイ>破滅の大波</ruby>』をご存知かな？」
line = "「波と言えば、２人は『<ruby>破滅の大波<rt>ドゥームズデイ</rt></ruby>』をご存知かな？」"

[[dialogue]]
speaker = "サラン"
# 「ぽよ？　聞いたことありませんね～、何なのでしょう～？」
line = "「ぽよ？　聞いたことありませんね～、何なのでしょう～？」"

[[dialogue]]
speaker = "ラティエ"
# 「魔界に『黒の海』と呼ばれる海域があるんだが、そこは魔界で最も波の荒い場所と言われているのだ」
line = "「魔界に『黒の海』と呼ばれる海域があるんだが、そこは魔界で最も波の荒い場所と言われているのだ」"

[[dialogue]]
speaker = "ラティエ"
# 「当然その海域を、船は避けて運航する。だが、敢えてこの荒波に立ち向かおうという者たちもいる」
line = "「当然その海域を、船は避けて運航する。だが、敢えてこの荒波に立ち向かおうという者たちもいる」"

[[dialogue]]
speaker = "ラティエ"
# 「その船に乗せてもらったことがあるのだが……あれは貴重な体験だった」
line = "「その船に乗せてもらったことがあるのだが……あれは貴重な体験だった」"

[[dialogue]]
speaker = "unk"
# どうしてそんな危ない場所に……
line = "どうしてそんな危ない場所に……"

[[dialogue]]
speaker = "ラティエ"
# 「ひと言でいうなら冒険心をくすぐられた、というところかな」
line = "「ひと言でいうなら冒険心をくすぐられた、というところかな」"

[[dialogue]]
speaker = "ラティエ"
# 「まさに命がけだった。それを団結してくぐり抜けた後は、まるで生まれ変わったような気持ちになれたよ」
line = "「まさに命がけだった。それを団結してくぐり抜けた後は、まるで生まれ変わったような気持ちになれたよ」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「冒険心……」
line = "「冒険心……」"

[[dialogue]]
speaker = "ラティエ"
# 「おや、エルデリーゼ嬢も興味が湧いてきたかな？」
line = "「おや、エルデリーゼ嬢も興味が湧いてきたかな？」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「そ、そんなことはありませんわ！！」
line = "「そ、そんなことはありませんわ！！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「ありませんけど……他にはどんな経験をされておりますの？」
line = "「ありませんけど……他にはどんな経験をされておりますの？」"

[[dialogue]]
speaker = "unk"
# だが──少しずつではあるが、学園長の話にエルゼも反応し始めている。
line = "だが──少しずつではあるが、学園長の話にエルゼも反応し始めている。"

[[dialogue]]
speaker = "unk"
# 学園長の旅の話は、好奇心旺盛なエルゼにとって大好物のはずだった。
line = "学園長の旅の話は、好奇心旺盛なエルゼにとって大好物のはずだった。"

[[dialogue]]
speaker = "ラティエ"
# 「そうだな……面白い体験といえば、海賊に襲われたことがある」
line = "「そうだな……面白い体験といえば、海賊に襲われたことがある」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「か、海賊ですの！？」
line = "「か、海賊ですの！？」"

[[dialogue]]
speaker = "サラン"
# 「海賊さんって本当にいるんですね～」
line = "「海賊さんって本当にいるんですね～」"

[[dialogue]]
speaker = "ラティエ"
# 「これも魔界を旅していた時なんだが、突然船を襲われてね……あの時は驚いたよ」
line = "「これも魔界を旅していた時なんだが、突然船を襲われてね……あの時は驚いたよ」"

[[dialogue]]
speaker = "ラティエ"
# 「いで立ちもみんなが想像する通りの海賊の格好をしていた」
line = "「いで立ちもみんなが想像する通りの海賊の格好をしていた」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「そんなの空想の世界にしか存在しないのかと思っていましたわ……」
line = "「そんなの空想の世界にしか存在しないのかと思っていましたわ……」"

[[dialogue]]
speaker = "ラティエ"
# 「世界には驚くことがいっぱいある。旅をしているとそういうものに、次々と出会うことが出来るからね」
line = "「世界には驚くことがいっぱいある。旅をしているとそういうものに、次々と出会うことが出来るからね」"

[[dialogue]]
speaker = "サラン"
# 「だから学園長さんは旅がやめられないんですね～」
line = "「だから学園長さんは旅がやめられないんですね～」"

[[dialogue]]
speaker = "ラティエ"
# 「はっはっは、そういうことだよ」
line = "「はっはっは、そういうことだよ」"

[[dialogue]]
speaker = "ラティエ"
# 「そうだ、こういったイベントをしてみるのはどうだろう？　突然船が襲われてしまったという設定で海賊が現れ──」
line = "「そうだ、こういったイベントをしてみるのはどうだろう？　突然船が襲われてしまったという設定で海賊が現れ──」"

[[dialogue]]
speaker = "unk"
# っ……！！！？
line = "っ……！！！？"

[[dialogue]]
speaker = "unk"
# 学園長は俺に背後から組み付き動けなくする。
line = "学園長は俺に背後から組み付き動けなくする。"

[[dialogue]]
speaker = "unk"
# そのまま波を蹴って飛び上がり、ビーチサイドに軽やかに着地すると大声で叫んだ。
line = "そのまま波を蹴って飛び上がり、ビーチサイドに軽やかに着地すると大声で叫んだ。"

[[dialogue]]
speaker = "ラティエ"
# 「我こそは大海賊ラティエである。この者の命が惜しければ金品を全て置いていくのだ！」
line = "「我こそは大海賊ラティエである。この者の命が惜しければ金品を全て置いていくのだ！」"

[[dialogue]]
speaker = "サラン"
# 「まあ、大変。会長ちゃんが人質に～」
line = "「まあ、大変。会長ちゃんが人質に～」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「そうはさせませんわ！　私が相手になります、海賊様！」
line = "「そうはさせませんわ！　私が相手になります、海賊様！」"

[[dialogue]]
speaker = "ラティエ"
# 「これはこれは、可愛らしいピーターパンの登場だ！　ではひとつ、手合わせを願おうか」
line = "「これはこれは、可愛らしいピーターパンの登場だ！　ではひとつ、手合わせを願おうか」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「望むところです！」
line = "「望むところです！」"

[[dialogue]]
speaker = "エスメラルダ"
# 『いい流れよ！　これは学園長のデータを取るまたとない機会だわ！　このまま続けて！！』
line = "『いい流れよ！　これは学園長のデータを取るまたとない機会だわ！　このまま続けて！！』"

[[dialogue]]
speaker = "unk"
# （悪いところ出てるっ！！！）
line = "（悪いところ出てるっ！！！）"

[[dialogue]]
speaker = "unk"
# （先生～～！！！）
line = "（先生～～！！！）"

[[dialogue]]
speaker = "エルデリーゼ"
# 「いざ勝負！」
line = "「いざ勝負！」"

[[dialogue]]
speaker = "ラティエ"
# 「ああ、かかってこい！」
line = "「ああ、かかってこい！」"

[[dialogue]]
speaker = "ラティエ"
# 「はっはっは、さすがは星騎士。見事な連続攻撃だ。『最強の矛』という異名も伊達ではないな」
line = "「はっはっは、さすがは星騎士。見事な連続攻撃だ。『最強の矛』という異名も伊達ではないな」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「くっ……！」
line = "「くっ……！」"

[[dialogue]]
speaker = "エルデリーゼ"
# （互角に打ち合っているように見せてはいますが、完全に余裕をもってあしらわれてしまっています）
line = "（互角に打ち合っているように見せてはいますが、完全に余裕をもってあしらわれてしまっています）"

[[dialogue]]
speaker = "エルデリーゼ"
# （相当な実力差が無ければできない芸当ですわ。実力者だとは聞いていましたが、これ程とは思っておりませんでしたの……）
line = "（相当な実力差が無ければできない芸当ですわ。実力者だとは聞いていましたが、これ程とは思っておりませんでしたの……）"

[[dialogue]]
speaker = "ラティエ"
# 「ほら、ヒロインのきみも何かやらないと」
line = "「ほら、ヒロインのきみも何かやらないと」"

[[dialogue]]
speaker = "unk"
# 助けてー！　エルデリーゼ！！
line = "助けてー！　エルデリーゼ！！"

[[dialogue]]
speaker = "unk"
# 俺？　え、えっと……
line = "俺？　え、えっと……"

[[dialogue]]
speaker = "エルデリーゼ"
# 「っ……！　会長を、お放しくださいっ！！」
line = "「っ……！　会長を、お放しくださいっ！！」"

[[dialogue]]
speaker = "ラティエ"
# （ほう……！　これは、いい攻撃だ…………頃合いだな）
line = "（ほう……！　これは、いい攻撃だ…………頃合いだな）"

[[dialogue]]
speaker = "ラティエ"
# 「む、しまった！　武器を弾き飛ばされてしまった！」
line = "「む、しまった！　武器を弾き飛ばされてしまった！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「えっ！？」
line = "「えっ！？」"

[[dialogue]]
speaker = "ラティエ"
# 「やるではないか。きみの実力に敬意を表し、会長くんは返してやろう」
line = "「やるではないか。きみの実力に敬意を表し、会長くんは返してやろう」"

[[dialogue]]
speaker = "ラティエ"
# 「また手合わせできる日を楽しみにしているぞ、さらばだ！」
line = "「また手合わせできる日を楽しみにしているぞ、さらばだ！」"

[[dialogue]]
speaker = "unk"
# 高笑いと共に学園長は飛び上がる。
line = "高笑いと共に学園長は飛び上がる。"

[[dialogue]]
speaker = "unk"
# なっ……！？
line = "なっ……！？"

[[dialogue]]
speaker = "unk"
# と、その中空で突然、身体を解放される。
line = "と、その中空で突然、身体を解放される。"

[[dialogue]]
speaker = "unk"
# 当然俺はプールに向かって真っ逆さまに──
line = "当然俺はプールに向かって真っ逆さまに──"

[[dialogue]]
speaker = "エルデリーゼ"
# 「会長様～～～～っ！！！」
line = "「会長様～～～～っ！！！」"
