[[dialogue]]
speaker = "unk"
# 第２話,居候ウィステリアさん,P
line = "第２話,居候ウィステリアさん,P"

[[dialogue]]
speaker = "ウィステリア"
# 「うぅ……不運だわ……」
line = "「うぅ……不運だわ……」"

[[dialogue]]
speaker = "unk"
# 魔将になったせいですか？
line = "魔将になったせいですか？"

[[dialogue]]
speaker = "ウィステリア"
# 「そうなのよ～……。実は元々住んでたマンションの部屋に、隕石が落っこちちゃって」
line = "「そうなのよ～……。実は元々住んでたマンションの部屋に、隕石が落っこちちゃって」"

[[dialogue]]
speaker = "unk"
# 隕石！？
line = "隕石！？"

[[dialogue]]
speaker = "ウィステリア"
# 「それで私の部屋だけ住めなくなっちゃって、新しい物件が見つかるまでホテル暮らしなのよ」
line = "「それで私の部屋だけ住めなくなっちゃって、新しい物件が見つかるまでホテル暮らしなのよ」"

[[dialogue]]
speaker = "ウィステリア"
# 「だから出費がかさむし、出勤にも時間がかかるし、踏んだり蹴ったりだわ」
line = "「だから出費がかさむし、出勤にも時間がかかるし、踏んだり蹴ったりだわ」"

[[dialogue]]
speaker = "ウィステリア"
# 「新しい物件探しもしなくちゃいけないし、これじゃ私が世界を呪いたくなりそうよ……」
line = "「新しい物件探しもしなくちゃいけないし、これじゃ私が世界を呪いたくなりそうよ……」"

[[dialogue]]
speaker = "unk"
# それならうちに来るのはどうですか？
line = "それならうちに来るのはどうですか？"

[[dialogue]]
speaker = "ウィステリア"
# 「会長くんちに！？　いいの！？」
line = "「会長くんちに！？　いいの！？」"

[[dialogue]]
speaker = "ウィステリア"
# 「それなら家賃もかからないし、通勤も短くなるし、大助かりだわ！　何より会長くんと一緒にいられるしね♪」
line = "「それなら家賃もかからないし、通勤も短くなるし、大助かりだわ！　何より会長くんと一緒にいられるしね♪」"

[[dialogue]]
speaker = "ウィステリア"
# 「いや、ちょっと待って。会長くん、お母様と２人暮らしでしょ？　学生ならともかく、いきなりこんな大人が上がりこんできたら、お母様が驚くわ」
line = "「いや、ちょっと待って。会長くん、お母様と２人暮らしでしょ？　学生ならともかく、いきなりこんな大人が上がりこんできたら、お母様が驚くわ」"

[[dialogue]]
speaker = "ウィステリア"
# 「それに教師ではないとはいえ、学園職員が生徒と一緒に住むって、風紀的にいいのかしら……？」
line = "「それに教師ではないとはいえ、学園職員が生徒と一緒に住むって、風紀的にいいのかしら……？」"

[[dialogue]]
speaker = "ウィステリア"
# 「何かあったら怖いし、学園にも許可を取らないと……。会長くんも本当に大丈夫かどうか、お母様に聞いてみてね？」
line = "「何かあったら怖いし、学園にも許可を取らないと……。会長くんも本当に大丈夫かどうか、お母様に聞いてみてね？」"

[[dialogue]]
speaker = "リィベル"
# 「何やってるの、ウィステリア。司書なのだから静かになさい」
line = "「何やってるの、ウィステリア。司書なのだから静かになさい」"

[[dialogue]]
speaker = "ウィステリア"
# 「あなた、いつも私に厳しいわね。私のこと嫌いなの？」
line = "「あなた、いつも私に厳しいわね。私のこと嫌いなの？」"

[[dialogue]]
speaker = "リィベル"
# 「嫌いよ。あなたが英雄になればいいって、何度も言ってるのに。この怠惰魔族」
line = "「嫌いよ。あなたが英雄になればいいって、何度も言ってるのに。この怠惰魔族」"

[[dialogue]]
speaker = "ウィステリア"
# 「だからそれは無理って言ってるでしょうが。魔将システムは作ってあげたんだから、いい加減諦めなさい」
line = "「だからそれは無理って言ってるでしょうが。魔将システムは作ってあげたんだから、いい加減諦めなさい」"

[[dialogue]]
speaker = "リィベル"
# 「フン」
line = "「フン」"

[[dialogue]]
speaker = "モネ"
# 「まぁまぁ、リィベルさん。私も魔将の１人として頑張りますから」
line = "「まぁまぁ、リィベルさん。私も魔将の１人として頑張りますから」"

[[dialogue]]
speaker = "モネ"
# 「でもさっきのは少し声が大きかったので、気を付けてくださいね、ウィステリアさん」
line = "「でもさっきのは少し声が大きかったので、気を付けてくださいね、ウィステリアさん」"

[[dialogue]]
speaker = "ウィステリア"
# 「あ、はい、ごめんなさい……」
line = "「あ、はい、ごめんなさい……」"

[[dialogue]]
speaker = "ウィステリア"
# （やっぱり図書館では紙屋敷さんが一番怖いわ……）
line = "（やっぱり図書館では紙屋敷さんが一番怖いわ……）"

[[dialogue]]
speaker = "unk"
# その翌日、ウィステリアさんが我が家にやってきた。
line = "その翌日、ウィステリアさんが我が家にやってきた。"

[[dialogue]]
speaker = "ウィステリア"
# 「学園の許可、出ちゃったわね……非常事態だからＯＫって言われちゃった」
line = "「学園の許可、出ちゃったわね……非常事態だからＯＫって言われちゃった」"

[[dialogue]]
speaker = "ウィステリア"
# 「会長くんのお母様も許してくれたけど、本当にいいのかしら？」
line = "「会長くんのお母様も許してくれたけど、本当にいいのかしら？」"

[[dialogue]]
speaker = "unk"
# ようこそ我が家へ！
line = "ようこそ我が家へ！"

[[dialogue]]
speaker = "ウィステリア"
# 「ありがとう、会長くん。そこまで言われたら、遠慮するのも失礼ね。ありがたくお世話になるわ」
line = "「ありがとう、会長くん。そこまで言われたら、遠慮するのも失礼ね。ありがたくお世話になるわ」"

[[dialogue]]
speaker = "ウィステリア"
# 「そうだ、住まわせてもらうんだから、家事とかは任せて！　星見家メイド隊でバイトしてたこともあるから、こう見えても家事は得意なのよ」
line = "「そうだ、住まわせてもらうんだから、家事とかは任せて！　星見家メイド隊でバイトしてたこともあるから、こう見えても家事は得意なのよ」"

[[dialogue]]
speaker = "ウィステリア"
# 「あ、そろそろ夕飯の時間ね。腕によりをかけて作っちゃうわよ！」
line = "「あ、そろそろ夕飯の時間ね。腕によりをかけて作っちゃうわよ！」"

[[dialogue]]
speaker = "ウィステリア"
# 「は～い、お待たせ。あるものを使ったからカレーになっちゃったけど、言ってくれたら他のものも作れるわよ」
line = "「は～い、お待たせ。あるものを使ったからカレーになっちゃったけど、言ってくれたら他のものも作れるわよ」"

[[dialogue]]
speaker = "ウィステリア"
# 「それじゃ……いただきます」
line = "「それじゃ……いただきます」"

[[dialogue]]
speaker = "ウィステリア"
# 「ん？　じっと見つめてどうしたの、会長くん？」
line = "「ん？　じっと見つめてどうしたの、会長くん？」"

[[dialogue]]
speaker = "unk"
# ウィステリアさんにあ～んしてほしいです！
line = "ウィステリアさんにあ～んしてほしいです！"

[[dialogue]]
speaker = "ウィステリア"
# 「ええっ！？　いや、あ～んするのは初めてじゃないけど、照れるわね……」
line = "「ええっ！？　いや、あ～んするのは初めてじゃないけど、照れるわね……」"

[[dialogue]]
speaker = "ウィステリア"
# 「でも、いいわよ。君がしてほしいならもちろんしてあげるわ」
line = "「でも、いいわよ。君がしてほしいならもちろんしてあげるわ」"

[[dialogue]]
speaker = "ウィステリア"
# 「はい、あ～ん。……どう、美味しい？」
line = "「はい、あ～ん。……どう、美味しい？」"

[[dialogue]]
speaker = "unk"
# 程よい辛さでとっても美味しいです！
line = "程よい辛さでとっても美味しいです！"

[[dialogue]]
speaker = "ウィステリア"
# 「ふふふ、ありがと。大人向けにピリッとする辛さにしてみたんだけど、会長くんは気に入ってくれたみたいね」
line = "「ふふふ、ありがと。大人向けにピリッとする辛さにしてみたんだけど、会長くんは気に入ってくれたみたいね」"

[[dialogue]]
speaker = "ウィステリア"
# 「じゃあ私も、あ～んするのお願いしていい？　あ～……んっ」
line = "「じゃあ私も、あ～んするのお願いしていい？　あ～……んっ」"

[[dialogue]]
speaker = "ウィステリア"
# 「ふふ、自分で作ったカレーだけど、会長くんが食べさせてくれるともっと美味しいわ。ありがとね」
line = "「ふふ、自分で作ったカレーだけど、会長くんが食べさせてくれるともっと美味しいわ。ありがとね」"

[[dialogue]]
speaker = "リノ"
# 「じー……」
line = "「じー……」"

[[dialogue]]
speaker = "ウィステリア"
# 「きゃひぃっ！？　リ、リノさん、いつからお戻りに！？」
line = "「きゃひぃっ！？　リ、リノさん、いつからお戻りに！？」"

[[dialogue]]
speaker = "リノ"
# 「いいのいいの、私のことは気にせずどうぞ♪」
line = "「いいのいいの、私のことは気にせずどうぞ♪」"

[[dialogue]]
speaker = "リノ"
# 「ちなみに、ウィステリアちゃんがあ～んしてあげてるところから見てたわよ」
line = "「ちなみに、ウィステリアちゃんがあ～んしてあげてるところから見てたわよ」"

[[dialogue]]
speaker = "ウィステリア"
# 「ばっちり見られてた！？」
line = "「ばっちり見られてた！？」"

[[dialogue]]
speaker = "リノ"
# 「いや～、まさかクロトの彼女が、あのウィステリアちゃんだとは思わなかったわ。英雄は惹かれ合うのかしら」
line = "「いや～、まさかクロトの彼女が、あのウィステリアちゃんだとは思わなかったわ。英雄は惹かれ合うのかしら」"

[[dialogue]]
speaker = "ウィステリア"
# 「いいい、いえっ、ワタクシはただのしがない司書でございますよ！？」
line = "「いいい、いえっ、ワタクシはただのしがない司書でございますよ！？」"

[[dialogue]]
speaker = "リノ"
# 「またまた～、謙遜しなくていいのよ。『千年に一度の英雄』だもの」
line = "「またまた～、謙遜しなくていいのよ。『千年に一度の英雄』だもの」"

[[dialogue]]
speaker = "ウィステリア"
# 「はぅっ！？」
line = "「はぅっ！？」"

[[dialogue]]
speaker = "リノ"
# 「あれ、悪いこと言っちゃった？」
line = "「あれ、悪いこと言っちゃった？」"

[[dialogue]]
speaker = "ウィステリア"
# 「いえその、その呼び方は遠慮していただきたいと存じますか……忘れてほしいと言いますか……」
line = "「いえその、その呼び方は遠慮していただきたいと存じますか……忘れてほしいと言いますか……」"

[[dialogue]]
speaker = "リノ"
# 「あら、そうなの。ごめん、気を付けるようにするわ」
line = "「あら、そうなの。ごめん、気を付けるようにするわ」"

[[dialogue]]
speaker = "リノ"
# 「でも本当に驚いたのよ。ウィステリアちゃんのことは前から聞いていたけど、実際に見るとますます凄いわ」
line = "「でも本当に驚いたのよ。ウィステリアちゃんのことは前から聞いていたけど、実際に見るとますます凄いわ」"

[[dialogue]]
speaker = "リノ"
# 「あなたの持つ魔導書には強大な魔力と呪いが宿っている。熟練の大魔女でも手に余る、国すら滅ぼしかねない呪いよ」
line = "「あなたの持つ魔導書には強大な魔力と呪いが宿っている。熟練の大魔女でも手に余る、国すら滅ぼしかねない呪いよ」"

[[dialogue]]
speaker = "リノ"
# 「そんなものを若くして使いこなすなんて、天才中の天才としか言えないわ。魔王とは異なる英雄の資質ね」
line = "「そんなものを若くして使いこなすなんて、天才中の天才としか言えないわ。魔王とは異なる英雄の資質ね」"

[[dialogue]]
speaker = "ウィステリア"
# 「あ……ありがとうございます。でも私、英雄になりたいわけじゃないんです……」
line = "「あ……ありがとうございます。でも私、英雄になりたいわけじゃないんです……」"

[[dialogue]]
speaker = "リノ"
# 「あらあら。やっぱり気苦労はあるのね」
line = "「あらあら。やっぱり気苦労はあるのね」"

[[dialogue]]
speaker = "リノ"
# 「あ、そうそう。私、急な出張が決まっちゃって、しばらく家を空けるから。留守はよろしくね２人とも！」
line = "「あ、そうそう。私、急な出張が決まっちゃって、しばらく家を空けるから。留守はよろしくね２人とも！」"

[[dialogue]]
speaker = "ウィステリア"
# 「はい、わかりました。任せてくださ──」
line = "「はい、わかりました。任せてくださ──」"

[[dialogue]]
speaker = "ウィステリア"
# 「えええええ～～～～～っ！！？」
line = "「えええええ～～～～～っ！！？」"

[[dialogue]]
speaker = "unk"
# こうして、ウィステリアさんと２人きりで暮らす生活が始まったのだった。
line = "こうして、ウィステリアさんと２人きりで暮らす生活が始まったのだった。"
