[[dialogue]]
speaker = "unk"
# 『コハルコ先輩が失踪した』とリーリアから報せを受け、秋葉原へと急行する。
line = "『コハルコ先輩が失踪した』とリーリアから報せを受け、秋葉原へと急行する。"

[[dialogue]]
speaker = "unk"
# すると彼女の上官であるマリオンも同時に到着していた。
line = "すると彼女の上官であるマリオンも同時に到着していた。"

[[dialogue]]
speaker = "マリオン"
# 「会長様もいらっしゃいましたね。……リーリア、状況の説明を」
line = "「会長様もいらっしゃいましたね。……リーリア、状況の説明を」"

[[dialogue]]
speaker = "リーリア"
# 「はい。失踪時、コハルコ先輩は若い女と一緒でした。私たち学園の生徒と同じくらいです。先日の事件を考えると、コラプサーの一味かと思われます」
line = "「はい。失踪時、コハルコ先輩は若い女と一緒でした。私たち学園の生徒と同じくらいです。先日の事件を考えると、コラプサーの一味かと思われます」"

[[dialogue]]
speaker = "リーリア"
# 「追跡を試みましたが、コハルコ先輩から攻撃を受け、叶いませんでした。……すみません、センパイ。私がついていながら……」
line = "「追跡を試みましたが、コハルコ先輩から攻撃を受け、叶いませんでした。……すみません、センパイ。私がついていながら……」"

[[dialogue]]
speaker = "unk"
# リーリアのせいじゃない
line = "リーリアのせいじゃない"

[[dialogue]]
speaker = "リーリア"
# 「……すみません、本当に」
line = "「……すみません、本当に」"

[[dialogue]]
speaker = "リーリア"
# 「ですが、コハルコ先輩が洗脳や催眠を受けた様子はありませんでした。自分の意思でコラプサーについていったとしか思えません」
line = "「ですが、コハルコ先輩が洗脳や催眠を受けた様子はありませんでした。自分の意思でコラプサーについていったとしか思えません」"

[[dialogue]]
speaker = "リーリア"
# 「……最後に言っていたんです。『家族を守りたい』って」
line = "「……最後に言っていたんです。『家族を守りたい』って」"

[[dialogue]]
speaker = "マリオン"
# 「今の話で確信しました。コハルコ様がターゲットと聞いたときからもしやと思っていましたが……コラプサーの黒幕は私の想定していた人物です」
line = "「今の話で確信しました。コハルコ様がターゲットと聞いたときからもしやと思っていましたが……コラプサーの黒幕は私の想定していた人物です」"

[[dialogue]]
speaker = "マリオン"
# 「通称『追憶の魔女』……我々ネビュラの破戒者です」
line = "「通称『追憶の魔女』……我々ネビュラの破戒者です」"

[[dialogue]]
speaker = "unk"
# コハルコがレイラに連れ去られ、辿り着いたのは秋葉原近くの廃教会だった。
line = "コハルコがレイラに連れ去られ、辿り着いたのは秋葉原近くの廃教会だった。"

[[dialogue]]
speaker = "コハルコ"
# （こんなところにコラプサーが居たんだ……灯台下暗しだなぁ……）
line = "（こんなところにコラプサーが居たんだ……灯台下暗しだなぁ……）"

[[dialogue]]
speaker = "レイラ"
# 「戻りました、イザベラさん」
line = "「戻りました、イザベラさん」"

[[dialogue]]
speaker = "イザベラ"
# 「ご苦労様、レイラ。待っていたわ」
line = "「ご苦労様、レイラ。待っていたわ」"

[[dialogue]]
speaker = "コハルコ"
# （この人は……！？　私に瓜二つ……どうなってるの？）
line = "（この人は……！？　私に瓜二つ……どうなってるの？）"

[[dialogue]]
speaker = "イザベラ"
# 「くっ……うぅ……」
line = "「くっ……うぅ……」"

[[dialogue]]
speaker = "レイラ"
# 「また頭痛ですか？」
line = "「また頭痛ですか？」"

[[dialogue]]
speaker = "イザベラ"
# 「いつものことよ、気にしなくていいわ。それより……」
line = "「いつものことよ、気にしなくていいわ。それより……」"

[[dialogue]]
speaker = "レイラ"
# 「ええ、すぐに出ます。ではお気を付けて」
line = "「ええ、すぐに出ます。ではお気を付けて」"

[[dialogue]]
speaker = "イザベラ"
# 「……久しぶりね、<ruby=イミタティオ>複製</ruby>。あなたは赤ん坊だったから憶えていないだろうけど」
line = "「……久しぶりね、<ruby>複製<rt>イミタティオ</rt></ruby>。あなたは赤ん坊だったから憶えていないだろうけど」"

[[dialogue]]
speaker = "コハルコ"
# （イミタ……？　私のこと、だよね？）
line = "（イミタ……？　私のこと、だよね？）"

[[dialogue]]
speaker = "イザベラ"
# 「私は魔女のイザベラ」
line = "「私は魔女のイザベラ」"

[[dialogue]]
speaker = "イザベラ"
# 「訊きたいことはあるでしょうけど、それに答える前にいくつか確認をしましょう」
line = "「訊きたいことはあるでしょうけど、それに答える前にいくつか確認をしましょう」"

[[dialogue]]
speaker = "イザベラ"
# 「ネビュラと付き合っているんだから、魔女については知っているわよね？　……じゃあ、光の魔女については？」
line = "「ネビュラと付き合っているんだから、魔女については知っているわよね？　……じゃあ、光の魔女については？」"

[[dialogue]]
speaker = "コハルコ"
# 「魔女を束ねる存在、強大な力を持った魔女ということは聞いています」
line = "「魔女を束ねる存在、強大な力を持った魔女ということは聞いています」"

[[dialogue]]
speaker = "イザベラ"
# 「間違ってはいないわね。でも、それだけじゃないわ」
line = "「間違ってはいないわね。でも、それだけじゃないわ」"

[[dialogue]]
speaker = "イザベラ"
# 「光の魔女とは、魔女という種族そのものよ」
line = "「光の魔女とは、魔女という種族そのものよ」"

[[dialogue]]
speaker = "イザベラ"
# 「初代の光の魔女ディアナは結界により魔女の森を隔離し、リクリエから守った。それ以来、光の魔女は代々、森の結界を更新し続けてきた」
line = "「初代の光の魔女ディアナは結界により魔女の森を隔離し、リクリエから守った。それ以来、光の魔女は代々、森の結界を更新し続けてきた」"

[[dialogue]]
speaker = "イザベラ"
# 「それは結界術に優れる魔女の中でも、光の魔女にしかできないことよ。光の魔女がいなければ魔女は存続できない」
line = "「それは結界術に優れる魔女の中でも、光の魔女にしかできないことよ。光の魔女がいなければ魔女は存続できない」"

[[dialogue]]
speaker = "イザベラ"
# 「では、もし光の魔女が生まれてこなければ？　結界は解け、魔女の森はリクリエに飲み込まれてしまうでしょう」
line = "「では、もし光の魔女が生まれてこなければ？　結界は解け、魔女の森はリクリエに飲み込まれてしまうでしょう」"

[[dialogue]]
speaker = "イザベラ"
# 「ゆえに魔女の歴史の中には、光の魔女を人工的に生み出す研究があった。結局は闇に葬られたけど」
line = "「ゆえに魔女の歴史の中には、光の魔女を人工的に生み出す研究があった。結局は闇に葬られたけど」"

[[dialogue]]
speaker = "イザベラ"
# 「私は『追憶の魔女』。歴史を読み解き、古い技術や魔法を復元する仕事をしていたわ。人間風に言うと、考古学者というやつね」
line = "「私は『追憶の魔女』。歴史を読み解き、古い技術や魔法を復元する仕事をしていたわ。人間風に言うと、考古学者というやつね」"

[[dialogue]]
speaker = "イザベラ"
# 「禁じられた研究を蘇らせ、私は生み出した。人造の光の魔女を」
line = "「禁じられた研究を蘇らせ、私は生み出した。人造の光の魔女を」"

[[dialogue]]
speaker = "コハルコ"
# 「…………まさか」
line = "「…………まさか」"

[[dialogue]]
speaker = "イザベラ"
# 「察しがよくて助かるわ。そう、あなたは先代の光の魔女・トリュファイナの力を受け継ぐ器として造られた──」
line = "「察しがよくて助かるわ。そう、あなたは先代の光の魔女・トリュファイナの力を受け継ぐ器として造られた──」"

[[dialogue]]
speaker = "イザベラ"
# 「光の魔女の<ruby=レプリカ>複製体</ruby>よ」
line = "「光の魔女の<ruby>複製体<rt>レプリカ</rt></ruby>よ」"

[[dialogue]]
speaker = "コハルコ"
# 「…………っ！？　私が……<ruby=レプリカ>複製体</ruby>……？」
line = "「…………っ！？　私が……<ruby>複製体<rt>レプリカ</rt></ruby>……？」"

[[dialogue]]
speaker = "イザベラ"
# 「光の魔女を人為的に生み出すアプローチはふたつあった。ひとつは光の魔女のクローンを生み出すこと、もうひとつは普通の魔女に光の魔女の力を宿すこと」
line = "「光の魔女を人為的に生み出すアプローチはふたつあった。ひとつは光の魔女のクローンを生み出すこと、もうひとつは普通の魔女に光の魔女の力を宿すこと」"

[[dialogue]]
speaker = "イザベラ"
# 「私はそのふたつを組み合わせた。私の遺伝子をベースに、トリュファイナの力を植え付けたのがあなたよ。オリジナルほどではないでしょうけど、機能はするはず」
line = "「私はそのふたつを組み合わせた。私の遺伝子をベースに、トリュファイナの力を植え付けたのがあなたよ。オリジナルほどではないでしょうけど、機能はするはず」"

[[dialogue]]
speaker = "イザベラ"
# 「あなたを核として儀式を行い、新たに結界を形成。その結界でこの世界を覆い、リクリエを回避する。これが私の計画よ」
line = "「あなたを核として儀式を行い、新たに結界を形成。その結界でこの世界を覆い、リクリエを回避する。これが私の計画よ」"

[[dialogue]]
speaker = "コハルコ"
# 「……それが可能なら、魔女たちがすでに達成しているのでは？」
line = "「……それが可能なら、魔女たちがすでに達成しているのでは？」"

[[dialogue]]
speaker = "イザベラ"
# 「まあ当然の疑問ね。けれど、私たち魔女が使う魔力には限りがある。魔女全員の力を合わせても、リクリエに対抗するには足りない」
line = "「まあ当然の疑問ね。けれど、私たち魔女が使う魔力には限りがある。魔女全員の力を合わせても、リクリエに対抗するには足りない」"

[[dialogue]]
speaker = "イザベラ"
# 「だから、結界には星力を使うわ」
line = "「だから、結界には星力を使うわ」"

[[dialogue]]
speaker = "イザベラ"
# 「結界にコラプサーの力を組み込み、地球に降り注ぐ星力を結界の維持に使う。星騎士たちは戦えなくなるけど、モンスターもいなくなるんだから問題ないでしょ？」
line = "「結界にコラプサーの力を組み込み、地球に降り注ぐ星力を結界の維持に使う。星騎士たちは戦えなくなるけど、モンスターもいなくなるんだから問題ないでしょ？」"

[[dialogue]]
speaker = "イザベラ"
# 「以前コラプサーが星騎士を襲っていたのも、結界の起動に必要な星力を集めるためよ」
line = "「以前コラプサーが星騎士を襲っていたのも、結界の起動に必要な星力を集めるためよ」"

[[dialogue]]
speaker = "コハルコ"
# （なるほど……それなら確かにコラプサーの目的は『救世』だ）
line = "（なるほど……それなら確かにコラプサーの目的は『救世』だ）"

[[dialogue]]
speaker = "コハルコ"
# （だけど私の正体が、人間どころか普通の魔女でもないなんて、さすがに思わなかったなぁ……）
line = "（だけど私の正体が、人間どころか普通の魔女でもないなんて、さすがに思わなかったなぁ……）"

[[dialogue]]
speaker = "イザベラ"
# 「では始めましょう」
line = "「では始めましょう」"

[[dialogue]]
speaker = "unk"
# どこからともなく魔法の鎖が伸び、コハルコを拘束する。
line = "どこからともなく魔法の鎖が伸び、コハルコを拘束する。"

[[dialogue]]
speaker = "コハルコ"
# 「──！」
line = "「──！」"

[[dialogue]]
speaker = "unk"
# そして廃教会の床に魔法陣が浮かび上がる。幾重にも描かれた、精緻な図形。フィクションなら美しいと思えるのだろうが、現実では違う。
line = "そして廃教会の床に魔法陣が浮かび上がる。幾重にも描かれた、精緻な図形。フィクションなら美しいと思えるのだろうが、現実では違う。"

[[dialogue]]
speaker = "unk"
# コハルコの命を結界に変える断頭台だ。
line = "コハルコの命を結界に変える断頭台だ。"

[[dialogue]]
speaker = "コハルコ"
# （逃げられない……でも、これはこれでいいのかな）
line = "（逃げられない……でも、これはこれでいいのかな）"

[[dialogue]]
speaker = "コハルコ"
# （家族のいない世界で千年も生きたいとは思わない。その長い命を家族のために使うのなら、私はそれでいい）
line = "（家族のいない世界で千年も生きたいとは思わない。その長い命を家族のために使うのなら、私はそれでいい）"

[[dialogue]]
speaker = "コハルコ"
# （お父さん、お母さん、今までありがとう）
line = "（お父さん、お母さん、今までありがとう）"

[[dialogue]]
speaker = "コハルコ"
# （ナツコ、トウコ、元気でね）
line = "（ナツコ、トウコ、元気でね）"
