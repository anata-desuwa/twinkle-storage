[[dialogue]]
speaker = "unk"
# 戦いを終えた後、俺たちは落ち着いて話す為に、新星学園の会議室へと移動した。
line = "戦いを終えた後、俺たちは落ち着いて話す為に、新星学園の会議室へと移動した。"

[[dialogue]]
speaker = "トマル"
# 「――みなさま、遅くなって申し訳ありませんでした。シズハさまが呼ぶ声が頭の中に聞こえてきて、急いで駆け付けたのですが……」
line = "「――みなさま、遅くなって申し訳ありませんでした。シズハさまが呼ぶ声が頭の中に聞こえてきて、急いで駆け付けたのですが……」"

[[dialogue]]
speaker = "シズハ"
# 「ヴィクトリアフォームの願いを叶える力でトマル君に呼びかけて、仮想空間に入って来れるようにゲートを作っておいたのよ♪」
line = "「ヴィクトリアフォームの願いを叶える力でトマル君に呼びかけて、仮想空間に入って来れるようにゲートを作っておいたのよ♪」"

[[dialogue]]
speaker = "トレジアンナ"
# 「それで、トマルさんが駆け付けたことに気づいて、隙ができたところを狙撃してもらうように、気配を潜めて待機してもらっていたんです」
line = "「それで、トマルさんが駆け付けたことに気づいて、隙ができたところを狙撃してもらうように、気配を潜めて待機してもらっていたんです」"

[[dialogue]]
speaker = "サチ"
# 「そうだったんだね。ありがとう、トマルくん♪　おかげで最後の攻撃に繋げられたよ」
line = "「そうだったんだね。ありがとう、トマルくん♪　おかげで最後の攻撃に繋げられたよ」"

[[dialogue]]
speaker = "トマル"
# 「お役に立てたなら、何よりです♪」
line = "「お役に立てたなら、何よりです♪」"

[[dialogue]]
speaker = "プリムラ"
# 「シズハもよくやったのじゃ！　ヴィクトリアフォームの覚醒がなければ、我とサチは暴走したままで敗北していたかもしれんからな！」
line = "「シズハもよくやったのじゃ！　ヴィクトリアフォームの覚醒がなければ、我とサチは暴走したままで敗北していたかもしれんからな！」"

[[dialogue]]
speaker = "シズハ"
# 「ううん。私よりも、今回はディーちゃんが私の願いに応えてくれたおかげだよ」
line = "「ううん。私よりも、今回はディーちゃんが私の願いに応えてくれたおかげだよ」"

[[dialogue]]
speaker = "ディーラック"
# 「は？　ボクは別に……」
line = "「は？　ボクは別に……」"

[[dialogue]]
speaker = "プリムラ"
# 「そうじゃな。ディーラック――」
line = "「そうじゃな。ディーラック――」"

[[dialogue]]
speaker = "プリムラ"
# 「今回はお前にも礼を言わねばなるまい。……感謝しとくぞ」
line = "「今回はお前にも礼を言わねばなるまい。……感謝しとくぞ」"

[[dialogue]]
speaker = "ディーラック"
# 「はぁ！？　お前、なに礼なんか言って……」
line = "「はぁ！？　お前、なに礼なんか言って……」"

[[dialogue]]
speaker = "サチ"
# 「私からも、ありがとうございます、ディーラックさん。助かりました」
line = "「私からも、ありがとうございます、ディーラックさん。助かりました」"

[[dialogue]]
speaker = "ディーラック"
# 「っ……なに調子こいてんだよ、お前ら！　ボクは獅子舞にかけられた『枷の術式』のせいで、シズハちゃんの命令を聞かざるを得ないだけであって――」
line = "「っ……なに調子こいてんだよ、お前ら！　ボクは獅子舞にかけられた『枷の術式』のせいで、シズハちゃんの命令を聞かざるを得ないだけであって――」"

[[dialogue]]
speaker = "ディーラック"
# 「ヒトカス共なんて、別に助けたつもりなんてないっつーの！　なのに勝手に勘違いして礼を言って、バカなんじゃない？」
line = "「ヒトカス共なんて、別に助けたつもりなんてないっつーの！　なのに勝手に勘違いして礼を言って、バカなんじゃない？」"

[[dialogue]]
speaker = "プリムラ"
# 「なっ、貴様……！　せっかく我が感謝してやってるというのに、下手に出ればこのっ！」
line = "「なっ、貴様……！　せっかく我が感謝してやってるというのに、下手に出ればこのっ！」"

[[dialogue]]
speaker = "ディーラック"
# 「ちょっ……お前、いたたたっ！　尻尾をまた引っ張んな！　何してんのサ、コラ！」
line = "「ちょっ……お前、いたたたっ！　尻尾をまた引っ張んな！　何してんのサ、コラ！」"

[[dialogue]]
speaker = "プリムラ"
# 「貴様が素直に、感謝を受け取らんからじゃ！　エントロフィーには、シズハに手を出すな、ぶっ殺すぞとか、言ってた癖に！」
line = "「貴様が素直に、感謝を受け取らんからじゃ！　エントロフィーには、シズハに手を出すな、ぶっ殺すぞとか、言ってた癖に！」"

[[dialogue]]
speaker = "ディーラック"
# 「はぁっ！？　うっさいなぁ！　細かいことをいちいちほじくり返すなよ、バーカバーカ！」
line = "「はぁっ！？　うっさいなぁ！　細かいことをいちいちほじくり返すなよ、バーカバーカ！」"

[[dialogue]]
speaker = "プリムラ"
# 「バカじゃと！？　なら貴様はアホじゃ！　アーホアーホ！」
line = "「バカじゃと！？　なら貴様はアホじゃ！　アーホアーホ！」"

[[dialogue]]
speaker = "トマル"
# 「ふふっ、お２人とも仲がよろしいですね♪」
line = "「ふふっ、お２人とも仲がよろしいですね♪」"

[[dialogue]]
speaker = "トレジアンナ"
# 「さすが親子ですよね～。喧嘩のノリがそっくりです♪」
line = "「さすが親子ですよね～。喧嘩のノリがそっくりです♪」"

[[dialogue]]
speaker = "プリムラ"
# 「誰が親子じゃ！？　こいつが生みの親とか認めとらんわ！」
line = "「誰が親子じゃ！？　こいつが生みの親とか認めとらんわ！」"

[[dialogue]]
speaker = "ディーラック"
# 「ほら～、ママの言うことはちゃんと聞かないとダメでちゅよ～？　プリムラちゃ～ん」
line = "「ほら～、ママの言うことはちゃんと聞かないとダメでちゅよ～？　プリムラちゃ～ん」"

[[dialogue]]
speaker = "プリムラ"
# 「赤ちゃん扱いすなぁ！」
line = "「赤ちゃん扱いすなぁ！」"

[[dialogue]]
speaker = "サチ"
# 「赤ちゃん……ふっ……ふふっ……♪」
line = "「赤ちゃん……ふっ……ふふっ……♪」"

[[dialogue]]
speaker = "プリムラ"
# 「なにサチも笑っとんのじゃ！？　我が暴走した時よりも、サチの暴走した時の方が酷かったじゃろうが！？」
line = "「なにサチも笑っとんのじゃ！？　我が暴走した時よりも、サチの暴走した時の方が酷かったじゃろうが！？」"

[[dialogue]]
speaker = "プリムラ"
# 「今回のリバースフォームの訓練中、一体何回暴走して、眷族をハレンチな目に合わせたと思って――」
line = "「今回のリバースフォームの訓練中、一体何回暴走して、眷族をハレンチな目に合わせたと思って――」"

[[dialogue]]
speaker = "サチ"
# 「ちょっ……それはぁ～～っ！？　言うの禁止ーーーっ！！」
line = "「ちょっ……それはぁ～～っ！？　言うの禁止ーーーっ！！」"

[[dialogue]]
speaker = "unk"
# そういえば、反転の力はどうなったんだ？
line = "そういえば、反転の力はどうなったんだ？"

[[dialogue]]
speaker = "サチ"
# 「それについてなんですが……」
line = "「それについてなんですが……」"

[[dialogue]]
speaker = "サチ"
# 「以前に比べて、かなり戦えるようにはなったんですが、通常フォームにはまだ戻れないみたいで……」
line = "「以前に比べて、かなり戦えるようにはなったんですが、通常フォームにはまだ戻れないみたいで……」"

[[dialogue]]
speaker = "プリムラ"
# 「我もデストロイフォームになれんし、サチのフォルトゥーナフォームも封印されたままじゃの」
line = "「我もデストロイフォームになれんし、サチのフォルトゥーナフォームも封印されたままじゃの」"

[[dialogue]]
speaker = "プリムラ"
# 「まあ今回、エントロフィーの奴も捕まらんかったし、『反転のロストアイテム』も逃したままじゃからな」
line = "「まあ今回、エントロフィーの奴も捕まらんかったし、『反転のロストアイテム』も逃したままじゃからな」"

[[dialogue]]
speaker = "トレジアンナ"
# 「全部めでたしハッピーエンド！　ってわけにはいきませんでしたが、リバースフォームにはリバースフォーム独自の強さがあります！」
line = "「全部めでたしハッピーエンド！　ってわけにはいきませんでしたが、リバースフォームにはリバースフォーム独自の強さがあります！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「流石にフォルトゥーナフォームほどではありませんが、新たな可能性の芽吹きということで、良しとしようじゃありませんか！」
line = "「流石にフォルトゥーナフォームほどではありませんが、新たな可能性の芽吹きということで、良しとしようじゃありませんか！」"

[[dialogue]]
speaker = "サチ"
# 「そう、ですね……。そんなわけでお兄さん、しばらくは戦力ダウンってことになっちゃうんですが、すみません……」
line = "「そう、ですね……。そんなわけでお兄さん、しばらくは戦力ダウンってことになっちゃうんですが、すみません……」"

[[dialogue]]
speaker = "unk"
# その時は遠慮なく俺を呼んでね
line = "その時は遠慮なく俺を呼んでね"

[[dialogue]]
speaker = "unk"
# じゃあ次のロストアイテムを見つけたら
line = "じゃあ次のロストアイテムを見つけたら"

[[dialogue]]
speaker = "サチ"
# 「はい！　ありがとうございます、お兄さん♪」
line = "「はい！　ありがとうございます、お兄さん♪」"

[[dialogue]]
speaker = "シズハ"
# 「ねぇ、ディーちゃん」
line = "「ねぇ、ディーちゃん」"

[[dialogue]]
speaker = "ディーラック"
# 「あん？　なにサ、シズハちゃん」
line = "「あん？　なにサ、シズハちゃん」"

[[dialogue]]
speaker = "シズハ"
# 「改めて、これから私と一緒に戦ってくれる？」
line = "「改めて、これから私と一緒に戦ってくれる？」"

[[dialogue]]
speaker = "ディーラック"
# 「はん、イヤだね……と言いたいところだけど」
line = "「はん、イヤだね……と言いたいところだけど」"

[[dialogue]]
speaker = "ディーラック"
# 「どっちにしろ、『枷の術式』のせいで、シズハちゃんの言うことは聞かざるを得ないから、仕方ないね」
line = "「どっちにしろ、『枷の術式』のせいで、シズハちゃんの言うことは聞かざるを得ないから、仕方ないね」"

[[dialogue]]
speaker = "シズハ"
# 「私は別に、獅子舞さんとかトレジアンナさんに頼んで、術式を解除してもらってもいいよ？」
line = "「私は別に、獅子舞さんとかトレジアンナさんに頼んで、術式を解除してもらってもいいよ？」"

[[dialogue]]
speaker = "ディーラック"
# 「は？　…………そんなの、あの獅子舞が許すわけないのサ！」
line = "「は？　…………そんなの、あの獅子舞が許すわけないのサ！」"

[[dialogue]]
speaker = "ディーラック"
# 「……シズハちゃんってさ」
line = "「……シズハちゃんってさ」"

[[dialogue]]
speaker = "シズハ"
# 「うん？」
line = "「うん？」"

[[dialogue]]
speaker = "ディーラック"
# 「本っ当に、心底、愚か者だよね」
line = "「本っ当に、心底、愚か者だよね」"

[[dialogue]]
speaker = "シズハ"
# 「ふふっ♪　そうかも」
line = "「ふふっ♪　そうかも」"

[[dialogue]]
speaker = "シズハ"
# 「でも――私はディーちゃんのことを信じるって、もう決めてるから」
line = "「でも――私はディーちゃんのことを信じるって、もう決めてるから」"

[[dialogue]]
speaker = "ディーラック"
# 「はん、バカなヒトカス」
line = "「はん、バカなヒトカス」"

[[dialogue]]
speaker = "unk"
# そっぽを向きながら、悪態をつくディーラックであったが――
line = "そっぽを向きながら、悪態をつくディーラックであったが――"

[[dialogue]]
speaker = "unk"
# その声色はどこか、機嫌よさげに聞こえるのだった。
line = "その声色はどこか、機嫌よさげに聞こえるのだった。"

[[dialogue]]
speaker = "unk"
# 一方、その頃。
line = "一方、その頃。"

[[dialogue]]
speaker = "エントロフィー"
# 「エントロフィー、戻りました～♪」
line = "「エントロフィー、戻りました～♪」"

[[dialogue]]
speaker = "？？？？？"
# 「――ご苦労様です」
line = "「――ご苦労様です」"

[[dialogue]]
speaker = "unk"
# 椅子に座って、映写機から投影される魔法少女たちのリアルタイム映像を眺めていた女性は、エントロフィーに視線を移す。
line = "椅子に座って、映写機から投影される魔法少女たちのリアルタイム映像を眺めていた女性は、エントロフィーに視線を移す。"

[[dialogue]]
speaker = "エントロフィーL"
# 「いえいえ♪　それで、いかがっすか、『虚構の魔女』様？」
line = "「いえいえ♪　それで、いかがっすか、『虚構の魔女』様？」"

[[dialogue]]
speaker = "虚構の魔女"
# 「観察していましたが……魔法少女、素晴らしいですね」
line = "「観察していましたが……魔法少女、素晴らしいですね」"

[[dialogue]]
speaker = "エントロフィーL"
# 「いや～、そうっすよね～♪」
line = "「いや～、そうっすよね～♪」"

[[dialogue]]
speaker = "エントロフィーL"
# 「最初は、反転のロストアイテムなら余裕で勝てそうかと思ってたんですけど～」
line = "「最初は、反転のロストアイテムなら余裕で勝てそうかと思ってたんですけど～」"

[[dialogue]]
speaker = "エントロフィーL"
# 「まさか土壇場で、シズハのアネさんが覚醒するとは思わなかったっすよ～♪」
line = "「まさか土壇場で、シズハのアネさんが覚醒するとは思わなかったっすよ～♪」"

[[dialogue]]
speaker = "虚構の魔女"
# 「私も、予想していませんでした。ですが……」
line = "「私も、予想していませんでした。ですが……」"

[[dialogue]]
speaker = "虚構の魔女"
# 「だからこそ、『<ruby=フィクション>虚構</ruby>』の素材として、素晴らしい」
line = "「だからこそ、『<ruby>虚構<rt>フィクション</rt></ruby>』の素材として、素晴らしい」"

[[dialogue]]
speaker = "虚構の魔女"
# 「これなら下らない<ruby=リアル>現実</ruby>を、<ruby=フィクション>虚構</ruby>で置き換えることができそうです」
line = "「これなら下らない<ruby>現実<rt>リアル</rt></ruby>を、<ruby>虚構<rt>フィクション</rt></ruby>で置き換えることができそうです」"

[[dialogue]]
speaker = "unk"
# 自らの力で作り出した虚構の空間から、映像越しに現実の世界を眺める１人の魔女は、そう呟くのだった。
line = "自らの力で作り出した虚構の空間から、映像越しに現実の世界を眺める１人の魔女は、そう呟くのだった。"
