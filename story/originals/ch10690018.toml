[[dialogue]]
speaker = "セシア"
# 「恋人として付き合っている以上、いつかは体験することになるのだから、いい機会じゃないかしら？」
line = "「恋人として付き合っている以上、いつかは体験することになるのだから、いい機会じゃないかしら？」"

