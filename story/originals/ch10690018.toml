[[dialogue]]
speaker = "unk"
# セシアと恋人体験をするようになってしばらく経ったある日。俺は新星寮にある彼女の部屋へと、遊びにきていた。
line = "セシアと恋人体験をするようになってしばらく経ったある日。俺は新星寮にある彼女の部屋へと、遊びにきていた。"

[[dialogue]]
speaker = "unk"
# 彼女を膝の上に乗せながら、一緒に本を読んだりして、まったり過ごしていたのだが――
line = "彼女を膝の上に乗せながら、一緒に本を読んだりして、まったり過ごしていたのだが――"

[[dialogue]]
speaker = "セシア"
# 「これが、会長のおち○ちんなのね。思っていたよりずっと、大きくて迫力があって、すごいわ……」
line = "「これが、会長のおち○ちんなのね。思っていたよりずっと、大きくて迫力があって、すごいわ……」"

[[dialogue]]
speaker = "セシア"
# 「あら、どうしたの？　――わたくしは体が小さいから、こういうのはまだ早いって？」
line = "「あら、どうしたの？　――わたくしは体が小さいから、こういうのはまだ早いって？」"

[[dialogue]]
speaker = "セシア"
# 「でも会長は、わたくしの体で興奮したから、大きくなっているんじゃないの？」
line = "「でも会長は、わたくしの体で興奮したから、大きくなっているんじゃないの？」"

[[dialogue]]
speaker = "unk"
# 俺は図星でなにも言えなくなってしまう。
line = "俺は図星でなにも言えなくなってしまう。"

[[dialogue]]
speaker = "unk"
# セシアが読んでいた本が『エッチのやり方』に関するものであり、彼女とすることを想像してしまい、ついムラムラして、勃起してしまったのだ。
line = "セシアが読んでいた本が『エッチのやり方』に関するものであり、彼女とすることを想像してしまい、ついムラムラして、勃起してしまったのだ。"

[[dialogue]]
speaker = "セシア"
# 「小さいからと、できないわけじゃないわ。それにわたくしは守護天使よ」
