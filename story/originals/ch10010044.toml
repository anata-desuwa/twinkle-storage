[[dialogue]]
speaker = "unk"
# 第４話,甘えんぼのエリシア,P
line = "第４話,甘えんぼのエリシア,P"

[[dialogue]]
speaker = "フィオナ"
# 「おはようございます、あなた」
line = "「おはようございます、あなた」"

[[dialogue]]
speaker = "フィオナ"
# 「星見家の改装も今日で終わりです。この呼び方も、しばらくおあずけだと思うと、名残惜しいですね」
line = "「星見家の改装も今日で終わりです。この呼び方も、しばらくおあずけだと思うと、名残惜しいですね」"

[[dialogue]]
speaker = "フィオナ"
# 「今日はキリカが迎えに来ることになっています。私ひとりでも帰れるんですが、キリカがご挨拶したいと言って……すみません」
line = "「今日はキリカが迎えに来ることになっています。私ひとりでも帰れるんですが、キリカがご挨拶したいと言って……すみません」"

[[dialogue]]
speaker = "アポロ"
# 「フィオナ、久しぶりだな！　魔王も元気だったか！」
line = "「フィオナ、久しぶりだな！　魔王も元気だったか！」"

[[dialogue]]
speaker = "キリカ"
# 「お嬢様が一緒にいらしたいと無理を仰いまして、ついてきてしまいました。申し訳ありません。こちら、粗品です。お納めください」
line = "「お嬢様が一緒にいらしたいと無理を仰いまして、ついてきてしまいました。申し訳ありません。こちら、粗品です。お納めください」"

[[dialogue]]
speaker = "キリカ"
# 「……リノ様がいらっしゃらないようですが」
line = "「……リノ様がいらっしゃらないようですが」"

[[dialogue]]
speaker = "unk"
# 母は急な出張で出かけています
line = "母は急な出張で出かけています"

[[dialogue]]
speaker = "キリカ"
# 「そうでしたか。いずれまたご挨拶に伺います。よろしくお伝えください」
line = "「そうでしたか。いずれまたご挨拶に伺います。よろしくお伝えください」"

[[dialogue]]
speaker = "アポロ"
# 「フィオナ、魔王と魔王のお母さんに迷惑かけなかったか～？」
line = "「フィオナ、魔王と魔王のお母さんに迷惑かけなかったか～？」"

[[dialogue]]
speaker = "フィオナ"
# 「むっ。姉さん、どういう意味ですか？」
line = "「むっ。姉さん、どういう意味ですか？」"

[[dialogue]]
speaker = "アポロ"
# 「ちっちゃい頃のお泊り会の時なんか、寂しいって先生にムリ言って、よそのクラスなのに、あたしの隣で寝ただろ」
line = "「ちっちゃい頃のお泊り会の時なんか、寂しいって先生にムリ言って、よそのクラスなのに、あたしの隣で寝ただろ」"

[[dialogue]]
speaker = "アポロ"
# 「他にも、晩ご飯の野菜を食べてやったり、割れたクッキー交換してやったり。あたしはお前が心配だったぞ！」
line = "「他にも、晩ご飯の野菜を食べてやったり、割れたクッキー交換してやったり。あたしはお前が心配だったぞ！」"

[[dialogue]]
speaker = "フィオナ"
# 「…………姉さん」
line = "「…………姉さん」"

[[dialogue]]
speaker = "フィオナ"
# 「それは二人だけのヒミツって約束したでしょっ！？　も～怒った！　怒りましたよ！」
line = "「それは二人だけのヒミツって約束したでしょっ！？　も～怒った！　怒りましたよ！」"

[[dialogue]]
speaker = "フィオナ"
# 「新年らしく、羽根つきで勝負はいかがですか？」
line = "「新年らしく、羽根つきで勝負はいかがですか？」"

[[dialogue]]
speaker = "アポロ"
# 「いいぜ。その勝負、受けて立つ！」
line = "「いいぜ。その勝負、受けて立つ！」"

[[dialogue]]
speaker = "unk"
# ２人が上空へと飛び立ち、星術スーパー羽根つき星見家杯がここに開幕した。
line = "２人が上空へと飛び立ち、星術スーパー羽根つき星見家杯がここに開幕した。"

[[dialogue]]
speaker = "フィオナ"
# 「星見流羽根突術・暁！」
line = "「星見流羽根突術・暁！」"

[[dialogue]]
speaker = "アポロ"
# 「なんの、裏・星見流羽根突術・黄昏！」
line = "「なんの、裏・星見流羽根突術・黄昏！」"

[[dialogue]]
speaker = "キリカ"
# 「星見流羽根突術とはいったい……？　裏とは……？」
line = "「星見流羽根突術とはいったい……？　裏とは……？」"

[[dialogue]]
speaker = "unk"
# ノリで言ってるだけだと思います
line = "ノリで言ってるだけだと思います"

[[dialogue]]
speaker = "キリカ"
# 「そうですか……さすが双子、息がぴったりですね」
line = "「そうですか……さすが双子、息がぴったりですね」"

[[dialogue]]
speaker = "キリカ"
# 「出先でケンカとは……帰ったらおふたりともお説教ですね。ふふ」
line = "「出先でケンカとは……帰ったらおふたりともお説教ですね。ふふ」"

[[dialogue]]
speaker = "unk"
# 楽しそうですね？
line = "楽しそうですね？"

[[dialogue]]
speaker = "キリカ"
# 「おふたりはいつも一緒でしたから、ケンカも珍しいことではありませんでした。ですが、とても…………とても久しぶりだったので、つい」
line = "「おふたりはいつも一緒でしたから、ケンカも珍しいことではありませんでした。ですが、とても…………とても久しぶりだったので、つい」"

[[dialogue]]
speaker = "フィオナ"
# 「私に恋人がいたら悪いんですか！？　私の恥ずかしいところばっかり緋宮会長の前で言わないでください！」
line = "「私に恋人がいたら悪いんですか！？　私の恥ずかしいところばっかり緋宮会長の前で言わないでください！」"

[[dialogue]]
speaker = "アポロ"
# 「そうは言ってないだろー！　あたしは心配なんだ！」
line = "「そうは言ってないだろー！　あたしは心配なんだ！」"

[[dialogue]]
speaker = "アポロ"
# 「ほんとはお前、メチャクチャ甘えんぼのくせに、カッコつけようとして無理してないか！？」
line = "「ほんとはお前、メチャクチャ甘えんぼのくせに、カッコつけようとして無理してないか！？」"

[[dialogue]]
speaker = "フィオナ"
# 「誰が甘えんぼですか、普通です普通！」
line = "「誰が甘えんぼですか、普通です普通！」"

[[dialogue]]
speaker = "アポロ"
# 「流星ライダーの食玩のシークレット、泣いて欲しがっただろ！」
line = "「流星ライダーの食玩のシークレット、泣いて欲しがっただろ！」"

[[dialogue]]
speaker = "フィオナ"
# 「そんなことも……ありましたけど！」
line = "「そんなことも……ありましたけど！」"

[[dialogue]]
speaker = "アポロ"
# 「グリンピース食べられるようになったか！？」
line = "「グリンピース食べられるようになったか！？」"

[[dialogue]]
speaker = "フィオナ"
# 「すでに姉さんの前で何度も食べてます！」
line = "「すでに姉さんの前で何度も食べてます！」"

[[dialogue]]
speaker = "アポロ"
# 「ピーマンは！？」
line = "「ピーマンは！？」"

[[dialogue]]
speaker = "フィオナ"
# 「…………もういいでしょう、姉さん。そろそろ決着を付けましょう！」
line = "「…………もういいでしょう、姉さん。そろそろ決着を付けましょう！」"

[[dialogue]]
speaker = "アポロ"
# 「おい、誤魔化すな！」
line = "「おい、誤魔化すな！」"

[[dialogue]]
speaker = "キリカ"
# 「ご覧のように、フィオナ……いえ、エリシアお嬢様は幼い頃はそれはそれは甘えん坊で、フィオナお嬢様の後ろをついて回っておられました」
line = "「ご覧のように、フィオナ……いえ、エリシアお嬢様は幼い頃はそれはそれは甘えん坊で、フィオナお嬢様の後ろをついて回っておられました」"

[[dialogue]]
speaker = "キリカ"
# 「ですが、それもフィオナお嬢様がお眠りになるまで」
line = "「ですが、それもフィオナお嬢様がお眠りになるまで」"

[[dialogue]]
speaker = "キリカ"
# 「エリシアお嬢様が『星見フィオナ』となってからはご自身を厳しく律していらっしゃいました。張り詰めているご様子で、仕える私たちも、時折心配になるほどでした」
line = "「エリシアお嬢様が『星見フィオナ』となってからはご自身を厳しく律していらっしゃいました。張り詰めているご様子で、仕える私たちも、時折心配になるほどでした」"

[[dialogue]]
speaker = "キリカ"
# 「けれど、緋宮会長がお嬢様と寄り添うようになってから、全てが変わりました。最近はいつも楽しそうに笑っておられて…………あなたのおかげです」
line = "「けれど、緋宮会長がお嬢様と寄り添うようになってから、全てが変わりました。最近はいつも楽しそうに笑っておられて…………あなたのおかげです」"

[[dialogue]]
speaker = "キリカ"
# 「幼い日のように、無邪気にケンカする日が来るなんて、思いもしませんでした」
line = "「幼い日のように、無邪気にケンカする日が来るなんて、思いもしませんでした」"

[[dialogue]]
speaker = "キリカ"
# 「星見家メイド長として、私個人としてもお礼を言います。本当に、ありがとうございます」
line = "「星見家メイド長として、私個人としてもお礼を言います。本当に、ありがとうございます」"

[[dialogue]]
speaker = "フィオナ"
# 「行きますよ、姉さん！　全力で攻撃するので、全力で打ち返してきてください！　私が勝ったらこれからピーマンは姉さんが食べてください！」
line = "「行きますよ、姉さん！　全力で攻撃するので、全力で打ち返してきてください！　私が勝ったらこれからピーマンは姉さんが食べてください！」"

[[dialogue]]
speaker = "アポロ"
# 「いや自分で食べろ！　まぁいい、どうせあたしが勝つからな！　来い！」
line = "「いや自分で食べろ！　まぁいい、どうせあたしが勝つからな！　来い！」"

[[dialogue]]
speaker = "フィオナ"
# 「星見流羽根突術奥義・御来光！」
line = "「星見流羽根突術奥義・御来光！」"

[[dialogue]]
speaker = "アポロ"
# 「裏・星見流羽根突術奥義・逢魔ヶ時！」
line = "「裏・星見流羽根突術奥義・逢魔ヶ時！」"

[[dialogue]]
speaker = "unk"
# 微笑むキリカ師匠の頭上で閃光が弾け、視界が遮られる。そして──
line = "微笑むキリカ師匠の頭上で閃光が弾け、視界が遮られる。そして──"

[[dialogue]]
speaker = "アポロ"
# 「はーはっはっは！　お姉ちゃんの勝ちだ！」
line = "「はーはっはっは！　お姉ちゃんの勝ちだ！」"

[[dialogue]]
speaker = "フィオナ"
# 「くっ、そんなぁ……」
line = "「くっ、そんなぁ……」"

[[dialogue]]
speaker = "unk"
# 惜しくも負けて落下するフィオナを、俺も変身してお姫様抱っこで受け止める。
line = "惜しくも負けて落下するフィオナを、俺も変身してお姫様抱っこで受け止める。"

[[dialogue]]
speaker = "フィオナ"
# 「あ、受け止めてくださったんですね。ありがとうございます」
line = "「あ、受け止めてくださったんですね。ありがとうございます」"

[[dialogue]]
speaker = "フィオナ"
# 「姉さんに負けてしまいました……。新しい戦闘服にも早く慣れないとですね」
line = "「姉さんに負けてしまいました……。新しい戦闘服にも早く慣れないとですね」"

[[dialogue]]
speaker = "アポロ"
# 「ま～た人前でイチャイチャしてるな」
line = "「ま～た人前でイチャイチャしてるな」"

[[dialogue]]
speaker = "アポロ"
# 「ま、魔王にはちゃんと甘えられてるみたいで安心したぜ。あたしはこのまま飛んで帰る。キリカ、行くぞ」
line = "「ま、魔王にはちゃんと甘えられてるみたいで安心したぜ。あたしはこのまま飛んで帰る。キリカ、行くぞ」"

[[dialogue]]
speaker = "キリカ"
# 「はい。ではフィオナお嬢様、失礼いたします」
line = "「はい。ではフィオナお嬢様、失礼いたします」"

[[dialogue]]
speaker = "フィオナ"
# 「気を使ってくれたんでしょうか？　２人とも、迎えに来たのに先に帰ってしまいました」
line = "「気を使ってくれたんでしょうか？　２人とも、迎えに来たのに先に帰ってしまいました」"

[[dialogue]]
speaker = "unk"
# 俺の初夢、まだ言ってなかったよね？
line = "俺の初夢、まだ言ってなかったよね？"

[[dialogue]]
speaker = "フィオナ"
# 「あなたの初夢、ですか？　どんな夢だったんでしょう？」
line = "「あなたの初夢、ですか？　どんな夢だったんでしょう？」"

[[dialogue]]
speaker = "unk"
# 結婚して一緒に住む夢だったんだ
line = "結婚して一緒に住む夢だったんだ"

[[dialogue]]
speaker = "フィオナ"
# 「ふふ、それは素敵な夢ですね。その初夢、必ず一緒に叶えましょう」
line = "「ふふ、それは素敵な夢ですね。その初夢、必ず一緒に叶えましょう」"
