[[dialogue]]
speaker = "unk"
# 第２２話,御前試合Ⅲ,B
line = "第２２話,御前試合Ⅲ,B"

[[dialogue]]
speaker = "unk"
# お互いが最後に放った波動がぶつかり合う。
line = "お互いが最後に放った波動がぶつかり合う。"

[[dialogue]]
speaker = "unk"
# 黄金の輝きをもってしても打ち消せない俺の攻撃が、最後に彼女へと命中していた。
line = "黄金の輝きをもってしても打ち消せない俺の攻撃が、最後に彼女へと命中していた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「私の……負けね……ふふっ、さすが……魔王……」
line = "「私の……負けね……ふふっ、さすが……魔王……」"

[[dialogue]]
speaker = "クロト"
# 「ああ──ありがとな、ヴィーナス」
line = "「ああ──ありがとな、ヴィーナス」"

[[dialogue]]
speaker = "unk"
# 先ほどまでの戦況から一転──
line = "先ほどまでの戦況から一転──"

[[dialogue]]
speaker = "unk"
# 俺たちの見せた攻防は、まさしく全生徒へ贈るにふさわしい武勇となってその決着を迎えていた。
line = "俺たちの見せた攻防は、まさしく全生徒へ贈るにふさわしい武勇となってその決着を迎えていた。"

[[dialogue]]
speaker = "セイファート"
# 「勝者、緋宮クロト──」
line = "「勝者、緋宮クロト──」"

[[dialogue]]
speaker = "セイファート"
# 「よって次期新星学園星徒会長は、彼へ任命することとする！」
line = "「よって次期新星学園星徒会長は、彼へ任命することとする！」"

[[dialogue]]
speaker = "トワ先生"
# 「え、ええぇぇぇ～～！？　いつの間に！？　どうなっちゃったの～～！」
line = "「え、ええぇぇぇ～～！？　いつの間に！？　どうなっちゃったの～～！」"

[[dialogue]]
speaker = "クラスの女子Ａ"
# 「すごすぎなんだけど！」
line = "「すごすぎなんだけど！」"

[[dialogue]]
speaker = "クラスの女子Ｂ"
# 「会長が手を抜いた……ようには見えなかったし……」
line = "「会長が手を抜いた……ようには見えなかったし……」"

[[dialogue]]
speaker = "unk"
# アリーナ中がざわめく。
line = "アリーナ中がざわめく。"

[[dialogue]]
speaker = "unk"
# 無理もない──自分でも驚くほどの逆転劇を演じてしまったのだから。
line = "無理もない──自分でも驚くほどの逆転劇を演じてしまったのだから。"

[[dialogue]]
speaker = "クロト"
# 「あ……」
line = "「あ……」"

[[dialogue]]
speaker = "unk"
# 戦闘を終えると、みなぎっていた力がどこかへ放出されていくのを感じた。
line = "戦闘を終えると、みなぎっていた力がどこかへ放出されていくのを感じた。"

[[dialogue]]
speaker = "unk"
# 元に戻った……のか。
line = "元に戻った……のか。"

[[dialogue]]
speaker = "ヴィーナス"
# 「さて。でも……これで、御前試合としては最高のパフォーマンスになったわね」
line = "「さて。でも……これで、御前試合としては最高のパフォーマンスになったわね」"

[[dialogue]]
speaker = "クロト"
# 「ヴィーナス……」
line = "「ヴィーナス……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「──みんな、見たわね！？　これが緋宮クロト──これからあなた達を背負って立つ、新たな星徒会長の姿よ！」
line = "「──みんな、見たわね！？　これが緋宮クロト──これからあなた達を背負って立つ、新たな星徒会長の姿よ！」"

[[dialogue]]
speaker = "unk"
# ヴィーナスは俺を称え、全生徒へ向けてそう宣言した。
line = "ヴィーナスは俺を称え、全生徒へ向けてそう宣言した。"

[[dialogue]]
speaker = "unk"
# 俺の戦いぶりを認めてくれたのか──盛大な拍手が巻き起こる。
line = "俺の戦いぶりを認めてくれたのか──盛大な拍手が巻き起こる。"

[[dialogue]]
speaker = "ヴィーナス"
# 「ほらクロト、星徒会長としてビシッとみんなにその威厳を示すのよ！」
line = "「ほらクロト、星徒会長としてビシッとみんなにその威厳を示すのよ！」"

[[dialogue]]
speaker = "クロト"
# 「あ、ああ……と言ってもいきなりすぎて」
line = "「あ、ああ……と言ってもいきなりすぎて」"

[[dialogue]]
speaker = "ヴィーナス"
# 「難しいこと考えなくていいから！　ほらほら！」
line = "「難しいこと考えなくていいから！　ほらほら！」"

[[dialogue]]
speaker = "unk"
# 転入生挨拶の後は星徒会長挨拶だなんて、波乱万丈にも程があるな。
line = "転入生挨拶の後は星徒会長挨拶だなんて、波乱万丈にも程があるな。"

[[dialogue]]
speaker = "クロト"
# 「──みんな。今日のことはいきなりすぎて、まだ戸惑っている人もいるかもしれない」
line = "「──みんな。今日のことはいきなりすぎて、まだ戸惑っている人もいるかもしれない」"

[[dialogue]]
speaker = "クロト"
# 「実は俺も同じなんだ。今日までずっと迷い続けて……だけど、ヴィーナスとの戦いで、ようやく答えを出すことができた」
line = "「実は俺も同じなんだ。今日までずっと迷い続けて……だけど、ヴィーナスとの戦いで、ようやく答えを出すことができた」"

[[dialogue]]
speaker = "クロト"
# 「だから今日から──俺が見つけた答えを示していく。星徒会長のあるべき姿っていうものを」
line = "「だから今日から──俺が見つけた答えを示していく。星徒会長のあるべき姿っていうものを」"

[[dialogue]]
speaker = "クロト"
# 「緋宮クロトは、どんな人だって見捨てない！　モンスターからも、リクリエからも！　助けを求める人がいるなら──必ず救ってみせる！」
line = "「緋宮クロトは、どんな人だって見捨てない！　モンスターからも、リクリエからも！　助けを求める人がいるなら──必ず救ってみせる！」"

[[dialogue]]
speaker = "クロト"
# 「星徒会はそのために戦う。だからみんなも、一緒に付いてきてくれ！」
line = "「星徒会はそのために戦う。だからみんなも、一緒に付いてきてくれ！」"

[[dialogue]]
speaker = "unk"
# アリーナ中が湧き、俺に温かな声援が浴びせられる。
line = "アリーナ中が湧き、俺に温かな声援が浴びせられる。"

[[dialogue]]
speaker = "クロト"
# 「はは……なんか照れるな。でも、これが会長になるっていうことか」
line = "「はは……なんか照れるな。でも、これが会長になるっていうことか」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええそうよ──私だってもっともっと強くなる。真の魔王であるあなたに追いつけるくらい」
line = "「ええそうよ──私だってもっともっと強くなる。真の魔王であるあなたに追いつけるくらい」"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロトが不甲斐なかったら、星徒会長の座だってまた奪い取っちゃうんだから！　気を引き締めてかかりなさい！」
line = "「クロトが不甲斐なかったら、星徒会長の座だってまた奪い取っちゃうんだから！　気を引き締めてかかりなさい！」"

[[dialogue]]
speaker = "クロト"
# 「ああ、望むところだ！」
line = "「ああ、望むところだ！」"

[[dialogue]]
speaker = "サーシャ"
# 「とんでもない歓声ね～」
line = "「とんでもない歓声ね～」"

[[dialogue]]
speaker = "マトイ"
# 「緋宮くん、おめでとう！　ヴィーナスに勝っちゃうなんて、本当にすごいよ！」
line = "「緋宮くん、おめでとう！　ヴィーナスに勝っちゃうなんて、本当にすごいよ！」"

[[dialogue]]
speaker = "アナ"
# 「ヴィーナス前会長も、お疲れ様です」
line = "「ヴィーナス前会長も、お疲れ様です」"

[[dialogue]]
speaker = "クロト"
# 「みんな……」
line = "「みんな……」"

[[dialogue]]
speaker = "unk"
# 星徒会のみんなが、労いの言葉と共にこちらに駆け寄ってきてくれる。
line = "星徒会のみんなが、労いの言葉と共にこちらに駆け寄ってきてくれる。"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふふん！　これでようやく、役者は全員揃ったというわけねっ！」
line = "「ふふん！　これでようやく、役者は全員揃ったというわけねっ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「でも──こんなのまだまだ序の口よ。これから世界を守る戦いが始まるんだから」
line = "「でも──こんなのまだまだ序の口よ。これから世界を守る戦いが始まるんだから」"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロトだけじゃないわよ！　みんな、準備はいい？」
line = "「クロトだけじゃないわよ！　みんな、準備はいい？」"

[[dialogue]]
speaker = "クロト"
# 「ああ──やってやろう！」
line = "「ああ──やってやろう！」"

[[dialogue]]
speaker = "みんな"
# 「おーー！！」
line = "「おーー！！」"

[[dialogue]]
speaker = "unk"
# まだまだ新米であることに変わりはない。これからまた迷ったりするんだろうけど。
line = "まだまだ新米であることに変わりはない。これからまた迷ったりするんだろうけど。"

[[dialogue]]
speaker = "unk"
# 新たな仲間たちと一緒なら、どんな困難も乗り越えられるような万能感に満ちていた。
line = "新たな仲間たちと一緒なら、どんな困難も乗り越えられるような万能感に満ちていた。"

[[dialogue]]
speaker = "クロト"
# 「（ああ、今なら──なんだって出来そうな気がする──）」
line = "「（ああ、今なら──なんだって出来そうな気がする──）」"

[[dialogue]]
speaker = "unk"
# ──と、思っていたのだが。
line = "──と、思っていたのだが。"

[[dialogue]]
speaker = "クロト"
# 「……あっ」
line = "「……あっ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ん──えぇっ！？」
line = "「ん──えぇっ！？」"

[[dialogue]]
speaker = "unk"
# 緊張の糸が切れたその瞬間。自分が倒れ込んだのがわかった。
line = "緊張の糸が切れたその瞬間。自分が倒れ込んだのがわかった。"

[[dialogue]]
speaker = "unk"
# 咄嗟に手を伸ばしたヴィーナスの胸に抱きかかえられる。
line = "咄嗟に手を伸ばしたヴィーナスの胸に抱きかかえられる。"

[[dialogue]]
speaker = "マトイ"
# 「ああっやっぱり！　無茶しすぎだっていうのに……」
line = "「ああっやっぱり！　無茶しすぎだっていうのに……」"

[[dialogue]]
speaker = "サーシャ"
# 「しばらく動けないかもしれないわねぇ、クロトくん」
line = "「しばらく動けないかもしれないわねぇ、クロトくん」"

[[dialogue]]
speaker = "アナ"
# 「彼はこれ以上ない結果を示した。ふふ、もう次期会長とは呼べませんね」
line = "「彼はこれ以上ない結果を示した。ふふ、もう次期会長とは呼べませんね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「も、もう──にしたって、私にもたれかからなくてもいいでしょっ」
line = "「も、もう──にしたって、私にもたれかからなくてもいいでしょっ」"

[[dialogue]]
speaker = "クロト"
# 「すぅ……すぅ……」
line = "「すぅ……すぅ……」"

[[dialogue]]
speaker = "unk"
# 薄れゆく意識のなかで──
line = "薄れゆく意識のなかで──"

[[dialogue]]
speaker = "unk"
# 初めて感じたはずのヴィーナスの温もりに、俺は奇妙な懐かしみを覚えていた。
line = "初めて感じたはずのヴィーナスの温もりに、俺は奇妙な懐かしみを覚えていた。"
