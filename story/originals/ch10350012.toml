[[dialogue]]
speaker = "unk"
# 第２話,裏世界のバディ,P
line = "第２話,裏世界のバディ,P"

[[dialogue]]
speaker = "unk"
# とある事件で知り合った公安委員会の少女・ネーゼマインから、人払いした空き教室で話があるという連絡を受けた――
line = "とある事件で知り合った公安委員会の少女・ネーゼマインから、人払いした空き教室で話があるという連絡を受けた――"

[[dialogue]]
speaker = "ネーゼマイン"
# 「やあ、会長。わざわざ足を運んでもらっちゃってごめんね～」
line = "「やあ、会長。わざわざ足を運んでもらっちゃってごめんね～」"

[[dialogue]]
speaker = "unk"
# セナリィがどうしてここに？
line = "セナリィがどうしてここに？"

[[dialogue]]
speaker = "unk"
# それはいいんだけど
line = "それはいいんだけど"

[[dialogue]]
speaker = "セナリィ"
# 「まさか会長様、マインとも既に顔見知りでしたの？　やはり見立て通り、人脈の侮れない方ですわね……」
line = "「まさか会長様、マインとも既に顔見知りでしたの？　やはり見立て通り、人脈の侮れない方ですわね……」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「実は私、公安委員会の仕事ではセナリィとバディを組んでるんだよね～。この前の事件では、セナリィに陽動を頼んでたから、その場に居なかったんだけどさ」
line = "「実は私、公安委員会の仕事ではセナリィとバディを組んでるんだよね～。この前の事件では、セナリィに陽動を頼んでたから、その場に居なかったんだけどさ」"

[[dialogue]]
speaker = "セナリィ"
# 「私、そのファーストコンタクトの話、全然聞いてないのだけれど！？　事前に知っていたら、会長様との営業トークをもっと上手く運べましたのに……！」
line = "「私、そのファーストコンタクトの話、全然聞いてないのだけれど！？　事前に知っていたら、会長様との営業トークをもっと上手く運べましたのに……！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひ♪　でも、そのおかげで千園寺先輩も加わっての面白い出会いになったみたいじゃん？　いや～、その場を見てみたかったな～」
line = "「にひひ♪　でも、そのおかげで千園寺先輩も加わっての面白い出会いになったみたいじゃん？　いや～、その場を見てみたかったな～」"

[[dialogue]]
speaker = "セナリィ"
# 「マイン、さては貴方、わざと伝えませんでしたわね！？」
line = "「マイン、さては貴方、わざと伝えませんでしたわね！？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ごめ～ん☆　でも、会長とはおかげで上手く打ち解けたみたいだから、結果オーライでしょ？　今も結構、素の部分を晒してるし♪」
line = "「ごめ～ん☆　でも、会長とはおかげで上手く打ち解けたみたいだから、結果オーライでしょ？　今も結構、素の部分を晒してるし♪」"

[[dialogue]]
speaker = "unk"
# 意外と面白い子だよね
line = "意外と面白い子だよね"

[[dialogue]]
speaker = "セナリィ"
# 「全然嬉しくないんですけど！？　ああもう、会長様への第一印象はもっと、ダークでクールに決める予定でしたのに……！」
line = "「全然嬉しくないんですけど！？　ああもう、会長様への第一印象はもっと、ダークでクールに決める予定でしたのに……！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「さてさて～、場も和んだところで、今回会長を呼び出した件なんだけど……公安委員会から新しいミッションが下ってるんだ～」
line = "「さてさて～、場も和んだところで、今回会長を呼び出した件なんだけど……公安委員会から新しいミッションが下ってるんだ～」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「私としては、いつも通りセナリィに外注しようと思って、ここに呼んでたの」
line = "「私としては、いつも通りセナリィに外注しようと思って、ここに呼んでたの」"

[[dialogue]]
speaker = "unk"
# セナリィは公安委員会所属じゃない？
line = "セナリィは公安委員会所属じゃない？"

[[dialogue]]
speaker = "セナリィ"
# 「私、組織のしがらみとか面倒で嫌いですの。なので、秘密結社ゴールデングースとして、依頼を受ける形でミッションに参加しておりますわ」
line = "「私、組織のしがらみとか面倒で嫌いですの。なので、秘密結社ゴールデングースとして、依頼を受ける形でミッションに参加しておりますわ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「元々、九浄家がセナリィを学園にスカウトする際、公安委員会への所属を打診してたらしいんだけどね～」
line = "「元々、九浄家がセナリィを学園にスカウトする際、公安委員会への所属を打診してたらしいんだけどね～」"

[[dialogue]]
speaker = "セナリィ"
# 「ゴールデングースへの出資と依頼を条件に、スカウトを引き受けたというわけですわね。武器商人の下に居るよりも儲からないなら、お話になりませんもの」
line = "「ゴールデングースへの出資と依頼を条件に、スカウトを引き受けたというわけですわね。武器商人の下に居るよりも儲からないなら、お話になりませんもの」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「なんで、公安委員会がクライアント、ゴールデングースは下請けって関係かな。で、私は公安委員会のゴールデングース担当窓口って感じ」
line = "「なんで、公安委員会がクライアント、ゴールデングースは下請けって関係かな。で、私は公安委員会のゴールデングース担当窓口って感じ」"

[[dialogue]]
speaker = "セナリィ"
# 「私としては、マインをゴールデングースの正式メンバーに勧誘中なのですが、交渉が手強くて参っておりますわ」
line = "「私としては、マインをゴールデングースの正式メンバーに勧誘中なのですが、交渉が手強くて参っておりますわ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひ、そりゃそうでしょ～。私は公安委員会の交渉人だし、簡単には落ちてあげられないね♪」
line = "「にひひ、そりゃそうでしょ～。私は公安委員会の交渉人だし、簡単には落ちてあげられないね♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「……で、話が逸れちゃったけど、会長を今回この場に呼び出したのは、セナリィが言い出したからなんだよ～」
line = "「……で、話が逸れちゃったけど、会長を今回この場に呼び出したのは、セナリィが言い出したからなんだよ～」"

[[dialogue]]
speaker = "セナリィ"
# 「今回の依頼を受ける条件として、会長様のミッション参加を要請したのですわ」
line = "「今回の依頼を受ける条件として、会長様のミッション参加を要請したのですわ」"

[[dialogue]]
speaker = "セナリィ"
# 「私のことを信用して貰う為には、口だけでなく実際にその目で仕事を見て貰うのが早いでしょう？」
line = "「私のことを信用して貰う為には、口だけでなく実際にその目で仕事を見て貰うのが早いでしょう？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「短絡的だよね～。しかも、私が会長と知り合ってなかったら、どう私を説得するつもりだったんだか」
line = "「短絡的だよね～。しかも、私が会長と知り合ってなかったら、どう私を説得するつもりだったんだか」"

[[dialogue]]
speaker = "セナリィ"
# 「あら、そこを何とかするのが、交渉人である貴方の仕事でしょう、マイン？　まさか出来ないなんて、言わないと思ってましたもの」
line = "「あら、そこを何とかするのが、交渉人である貴方の仕事でしょう、マイン？　まさか出来ないなんて、言わないと思ってましたもの」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「私に対して、そこまで信用出来るのがセナリィの凄いところだよね。度胸あるよ、まったく」
line = "「私に対して、そこまで信用出来るのがセナリィの凄いところだよね。度胸あるよ、まったく」"

[[dialogue]]
speaker = "セナリィ"
# 「私はプロの傭兵として名を馳せた、バンデット・セナリィ。そのくらいの度胸が無ければ、戦場で生き残れませんわ」
line = "「私はプロの傭兵として名を馳せた、バンデット・セナリィ。そのくらいの度胸が無ければ、戦場で生き残れませんわ」"

[[dialogue]]
speaker = "unk"
# バンデット・セナリィは本名じゃないよね？
line = "バンデット・セナリィは本名じゃないよね？"

[[dialogue]]
speaker = "セナリィ"
# 「二つ名ですわ。ですがそれは、私が戦場で得たプロとしての誇りであり、勝ち取って来た名声であり、生きて来た報酬でもありますの」
line = "「二つ名ですわ。ですがそれは、私が戦場で得たプロとしての誇りであり、勝ち取って来た名声であり、生きて来た報酬でもありますの」"

[[dialogue]]
speaker = "セナリィ"
# 「故に私は、気に入ってその名前を使っておりますわ。会長様も、本名と思って呼んで下さいませ」
line = "「故に私は、気に入ってその名前を使っておりますわ。会長様も、本名と思って呼んで下さいませ」"

[[dialogue]]
speaker = "セナリィ"
# 「二つ名の由来？　ああ、それは私の能力に関係しておりますの」
line = "「二つ名の由来？　ああ、それは私の能力に関係しておりますの」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「セナリィの瞳って、たまに色が変わるって知ってた？　生まれつき『強奪の星眼』っていう異能の力を持ってるんだよ」
line = "「セナリィの瞳って、たまに色が変わるって知ってた？　生まれつき『強奪の星眼』っていう異能の力を持ってるんだよ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「相手が発動した星術を見ることで、その力を無効化して星眼に吸収、ストックすることが出来るんだって」
line = "「相手が発動した星術を見ることで、その力を無効化して星眼に吸収、ストックすることが出来るんだって」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ストックした星術はいつでも即発動可能っていう、なかなかにチートな代物なんだよ～♪」
line = "「ストックした星術はいつでも即発動可能っていう、なかなかにチートな代物なんだよ～♪」"

[[dialogue]]
speaker = "セナリィ"
# 「ふふんっ（ドヤ顔）」
line = "「ふふんっ（ドヤ顔）」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ただし、ストックしておける星術は１つまで。あと１度星眼を使ったらクールタイムが発生するので連続使用は出来ず、集団戦が苦手っていう――」
line = "「ただし、ストックしておける星術は１つまで。あと１度星眼を使ったらクールタイムが発生するので連続使用は出来ず、集団戦が苦手っていう――」"

[[dialogue]]
speaker = "セナリィ"
# 「ちょっ、わざわざ欠点まで明かす必要あります！？　営業妨害ですわよ！」
line = "「ちょっ、わざわざ欠点まで明かす必要あります！？　営業妨害ですわよ！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひ♪　まあ、そんな感じで相手の星術を奪う能力が有名になって、盗賊……バンデット・セナリィという悪名が付けられたってわけだね」
line = "「にひひ♪　まあ、そんな感じで相手の星術を奪う能力が有名になって、盗賊……バンデット・セナリィという悪名が付けられたってわけだね」"

[[dialogue]]
speaker = "セナリィ"
# 「ふふんっ（ドヤ顔）」
line = "「ふふんっ（ドヤ顔）」"

[[dialogue]]
speaker = "unk"
# そこはドヤ顔なんだ……
line = "そこはドヤ顔なんだ……"

[[dialogue]]
speaker = "セナリィ"
# 「今回のミッションでは、悪名高きバンデット・セナリィの力……そして、悪即善のなんたるかを会長様にお見せ致しますわ。是非ご期待下さいませ」
line = "「今回のミッションでは、悪名高きバンデット・セナリィの力……そして、悪即善のなんたるかを会長様にお見せ致しますわ。是非ご期待下さいませ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「それじゃあ、そろそろミッションの詳細を説明しようと思うけど……会長は協力してくれるってことでいいのかな？」
line = "「それじゃあ、そろそろミッションの詳細を説明しようと思うけど……会長は協力してくれるってことでいいのかな？」"

[[dialogue]]
speaker = "unk"
# 見て見ぬフリは出来ない
line = "見て見ぬフリは出来ない"

[[dialogue]]
speaker = "unk"
# 知ってしまった以上
line = "知ってしまった以上"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひ♪　会長ならそう言うと思ってたんだ～♪」
line = "「にひひ♪　会長ならそう言うと思ってたんだ～♪」"

[[dialogue]]
speaker = "セナリィ"
# 「ふふっ、悪の作戦会議の始まりですわね」
line = "「ふふっ、悪の作戦会議の始まりですわね」"

[[dialogue]]
speaker = "unk"
# この日を境に、俺は２人と共に公安委員会の任務をこなすようになるのだった――
line = "この日を境に、俺は２人と共に公安委員会の任務をこなすようになるのだった――"
