[[dialogue]]
speaker = "unk"
# 第２話,ジュリエッテの特技,P
line = "第２話,ジュリエッテの特技,P"

[[dialogue]]
speaker = "unk"
# ──ジュリエッテから突然の告白を受けてから数日。
line = "──ジュリエッテから突然の告白を受けてから数日。"

[[dialogue]]
speaker = "ジュリエッテ"
# 「ささっ……ささささ……」
line = "「ささっ……ささささ……」"

[[dialogue]]
speaker = "unk"
# 最近外出すると、ジュリエッテにストーキングされる。
line = "最近外出すると、ジュリエッテにストーキングされる。"

[[dialogue]]
speaker = "unk"
# ……かと言って、何かしらアプローチをかけてくるわけでもなく、ただ後ろを付いてくるだけ。正直不気味だ。
line = "……かと言って、何かしらアプローチをかけてくるわけでもなく、ただ後ろを付いてくるだけ。正直不気味だ。"

[[dialogue]]
speaker = "ジュリエッテ"
# 「むむむ……魔王様にアピールしないといけないのですが……妙に照れくさいでございますわ」
line = "「むむむ……魔王様にアピールしないといけないのですが……妙に照れくさいでございますわ」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「しかし魔王様をわたくしの虜に出来れば、野望に大きく近づきますわ……！」
line = "「しかし魔王様をわたくしの虜に出来れば、野望に大きく近づきますわ……！」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「がんばれわたくし……！　勇気を出すでございますわ……！」
line = "「がんばれわたくし……！　勇気を出すでございますわ……！」"

[[dialogue]]
speaker = "unk"
# ジュリエッテ？
line = "ジュリエッテ？"

[[dialogue]]
speaker = "ジュリエッテ"
# 「ひゃあん！？　ま、魔王様！？」
line = "「ひゃあん！？　ま、魔王様！？」"

[[dialogue]]
speaker = "ジュリエッテ"
# （声をかけるつもりが、逆に声をかけられてしまいましたわっ）
line = "（声をかけるつもりが、逆に声をかけられてしまいましたわっ）"

[[dialogue]]
speaker = "ジュリエッテ"
# 「こ、こんなところで奇遇でございますわね……おほほほ」
line = "「こ、こんなところで奇遇でございますわね……おほほほ」"

[[dialogue]]
speaker = "unk"
# 最近ずっと付いてきてたよね
line = "最近ずっと付いてきてたよね"

[[dialogue]]
speaker = "ジュリエッテ"
# 「そ、それは、その……！　好きな人を追いかけて何が悪いんでございますの……！」
line = "「そ、それは、その……！　好きな人を追いかけて何が悪いんでございますの……！」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「ずっとチャンスをうかがっていたのでございますのよ！　好きな人にアピールするために！」
line = "「ずっとチャンスをうかがっていたのでございますのよ！　好きな人にアピールするために！」"

[[dialogue]]
speaker = "unk"
# 無理してない……？
line = "無理してない……？"

[[dialogue]]
speaker = "ジュリエッテ"
# 「無理なんてしてないでございますよっ。わたくし、愛に生きる女でございますから！」
line = "「無理なんてしてないでございますよっ。わたくし、愛に生きる女でございますから！」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「それよりも魔王様、せっかくの機会ですしご一緒してもよろしくて？」
line = "「それよりも魔王様、せっかくの機会ですしご一緒してもよろしくて？」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「わたくし、大大大好きな魔王様と同じ時を過ごしたいでございますの♪」
line = "「わたくし、大大大好きな魔王様と同じ時を過ごしたいでございますの♪」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「……ふふ、一緒に楽しい時間を過ごしましょう魔王様♪」
line = "「……ふふ、一緒に楽しい時間を過ごしましょう魔王様♪」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「ところで魔王様はどこかへお出かけですか？　この時間ですとランチでございますか？」
line = "「ところで魔王様はどこかへお出かけですか？　この時間ですとランチでございますか？」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「そうでございますわ魔王様！　せっかくでしたら、わたくしがランチをお作りして差し上げますわ！」
line = "「そうでございますわ魔王様！　せっかくでしたら、わたくしがランチをお作りして差し上げますわ！」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「わたくし、想い人に手料理を振る舞うのが小さい頃からの夢でしたの。ですから、お願いしてもよろしくて？」
line = "「わたくし、想い人に手料理を振る舞うのが小さい頃からの夢でしたの。ですから、お願いしてもよろしくて？」"

[[dialogue]]
speaker = "unk"
# ……じゃあ、うちに来る？
line = "……じゃあ、うちに来る？"

[[dialogue]]
speaker = "ジュリエッテ"
# 「魔王様のお家でございますか！？」
line = "「魔王様のお家でございますか！？」"

[[dialogue]]
speaker = "ジュリエッテ"
# （まだお付き合いもしてないのに、殿方のお部屋にお邪魔するだなんてハレンチですわ！　不潔ですわ！）
line = "（まだお付き合いもしてないのに、殿方のお部屋にお邪魔するだなんてハレンチですわ！　不潔ですわ！）"

[[dialogue]]
speaker = "ジュリエッテ"
# （で、ですが……魔王様のお家にお邪魔する機会なんて滅多にないはず……！　これはチャンスでございますわ！）
line = "（で、ですが……魔王様のお家にお邪魔する機会なんて滅多にないはず……！　これはチャンスでございますわ！）"

[[dialogue]]
speaker = "ジュリエッテ"
# 「ぜ、是非お願いしたいでございますわっ、とびっきりの手料理を振る舞いますわ！」
line = "「ぜ、是非お願いしたいでございますわっ、とびっきりの手料理を振る舞いますわ！」"

[[dialogue]]
speaker = "ジュリエッテ"
# （遂にきてしまいましたわ！　殿方のお家に！　しかしここで怖気づくわけにはいきませんわ……これも野望のため！）
line = "（遂にきてしまいましたわ！　殿方のお家に！　しかしここで怖気づくわけにはいきませんわ……これも野望のため！）"

[[dialogue]]
speaker = "ジュリエッテ"
# 「……さて、早速ですがキッチンを拝見させていただきますわね」
line = "「……さて、早速ですがキッチンを拝見させていただきますわね」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「ふむふむ……余っていそうな材料は卵と牛乳と食パンと……」
line = "「ふむふむ……余っていそうな材料は卵と牛乳と食パンと……」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「これなら、アレが作れますわね♪　ジュリエッテ・ハルヴィーノやってやるでございますわ～！」
line = "「これなら、アレが作れますわね♪　ジュリエッテ・ハルヴィーノやってやるでございますわ～！」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「～～～～♪」
line = "「～～～～♪」"

[[dialogue]]
speaker = "ジュリエッテ"
# （ハッ！？　わたくしとしたことがノリノリで料理をしてしまっていますわ！？）
line = "（ハッ！？　わたくしとしたことがノリノリで料理をしてしまっていますわ！？）"

[[dialogue]]
speaker = "ジュリエッテ"
# （冷静になりますと、どうしてこのわたくしが他人のために手料理など……）
line = "（冷静になりますと、どうしてこのわたくしが他人のために手料理など……）"

[[dialogue]]
speaker = "ジュリエッテ"
# （ですが、魔王様に取り入ることは、後々利益になるはずでございますわ……ここは耐えるのでございます！　ジュリエッテ！）
line = "（ですが、魔王様に取り入ることは、後々利益になるはずでございますわ……ここは耐えるのでございます！　ジュリエッテ！）"

[[dialogue]]
speaker = "ジュリエッテ"
# 「あとは卵液に浸したパンをフライパンで焼いて……フレンチトーストの完成でございますわ～！　魔王様、早速召し上がってくださいませ！」
line = "「あとは卵液に浸したパンをフライパンで焼いて……フレンチトーストの完成でございますわ～！　魔王様、早速召し上がってくださいませ！」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「お味はどうです？　甘さは丁度いいでございましょうか？」
line = "「お味はどうです？　甘さは丁度いいでございましょうか？」"

[[dialogue]]
speaker = "unk"
# すごく美味しい！
line = "すごく美味しい！"

[[dialogue]]
speaker = "ジュリエッテ"
# 「そうでございますか！　気に入っていただき嬉しゅうございます！」
line = "「そうでございますか！　気に入っていただき嬉しゅうございます！」"

[[dialogue]]
speaker = "ジュリエッテ"
# （ハッ……！？　わたくしってば、何をはしゃいで……）
line = "（ハッ……！？　わたくしってば、何をはしゃいで……）"

[[dialogue]]
speaker = "ジュリエッテ"
# （でも、褒められるのは悪くない気分でございますわね……他人のために料理をするのは面倒ですが……）
line = "（でも、褒められるのは悪くない気分でございますわね……他人のために料理をするのは面倒ですが……）"

[[dialogue]]
speaker = "unk"
# 意外と料理が上手なんだね
line = "意外と料理が上手なんだね"

[[dialogue]]
speaker = "ジュリエッテ"
# 「意外とってなんでございますの、意外とって……！」
line = "「意外とってなんでございますの、意外とって……！」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「わたくし、こう見えても家事と料理は得意でございましてよ。まあ、自分からやりたくない類のものでございますが」
line = "「わたくし、こう見えても家事と料理は得意でございましてよ。まあ、自分からやりたくない類のものでございますが」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「ところで、魔王様は飢えて死にかけたことはございまして？　ふふ、他愛のない質問でございましてよ」
line = "「ところで、魔王様は飢えて死にかけたことはございまして？　ふふ、他愛のない質問でございましてよ」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「暖かい料理をいつでも食べられるというのは、それだけで幸せなことでございますの」
line = "「暖かい料理をいつでも食べられるというのは、それだけで幸せなことでございますの」"

[[dialogue]]
speaker = "ジュリエッテ"
# （家を出て野をさまよっていた頃に身に付けた料理でしたが、今日は役に立ったでございますね……）
line = "（家を出て野をさまよっていた頃に身に付けた料理でしたが、今日は役に立ったでございますね……）"

[[dialogue]]
speaker = "ジュリエッテ"
# 「さて、魔王様に手料理を振る舞えたことでございますし、そろそろわたくしはお暇させていただきますわ」
line = "「さて、魔王様に手料理を振る舞えたことでございますし、そろそろわたくしはお暇させていただきますわ」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「……ふふ、案外悪くない時間でございましたわ。またお会いしましょう魔王様」
line = "「……ふふ、案外悪くない時間でございましたわ。またお会いしましょう魔王様」"
