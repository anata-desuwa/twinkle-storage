[[dialogue]]
speaker = "unk"
# 俺たちは後からやって来たリーリアとシズハに、ダッチのことを説明した。
line = "俺たちは後からやって来たリーリアとシズハに、ダッチのことを説明した。"

[[dialogue]]
speaker = "リーリア"
# 「まさか……ＤＩＳＣにメッセージを送ってきたのが、獅子舞さんの弟である別のロストアイテムだなんて！」
line = "「まさか……ＤＩＳＣにメッセージを送ってきたのが、獅子舞さんの弟である別のロストアイテムだなんて！」"

[[dialogue]]
speaker = "ダッチ"
# 「ああ、懐かしくも美しい魂の色です。魔弾の魔女、リーリア様。私は今日、貴女に会いにきたのですよ！」
line = "「ああ、懐かしくも美しい魂の色です。魔弾の魔女、リーリア様。私は今日、貴女に会いにきたのですよ！」"

[[dialogue]]
speaker = "リーリア"
# 「私に？　一体何の用で……」
line = "「私に？　一体何の用で……」"

[[dialogue]]
speaker = "ダッチ"
# 「兄上が元旦の夜、酔っ払って私に会いに来たのです！　貴女が七彩流羽根突き術・漆ノ型を使ってみせた、とそれはもう上機嫌に語りましてねぇ」
line = "「兄上が元旦の夜、酔っ払って私に会いに来たのです！　貴女が七彩流羽根突き術・漆ノ型を使ってみせた、とそれはもう上機嫌に語りましてねぇ」"

[[dialogue]]
speaker = "リーリア"
# 「上機嫌？　獅子舞さんが……？」
line = "「上機嫌？　獅子舞さんが……？」"

[[dialogue]]
speaker = "獅子舞"
# 「おい、愚弟！　変なことを言うな！」
line = "「おい、愚弟！　変なことを言うな！」"

[[dialogue]]
speaker = "サーシャ"
# 「あら～♪　獅子舞さん、実は喜んでいたのね～」
line = "「あら～♪　獅子舞さん、実は喜んでいたのね～」"

[[dialogue]]
speaker = "獅子舞"
# 「よ、喜んどらんわ！　こいつが勝手に勘違いして、そう言ってるだけだ！」
line = "「よ、喜んどらんわ！　こいつが勝手に勘違いして、そう言ってるだけだ！」"

[[dialogue]]
speaker = "ダッチ"
# 「フフフ……！　嬉しそうに兄上が話すのを聞いて、私もリーリア様と羽根突きで遊びたくなった。だから今日、ここにやって来たのです！」
line = "「フフフ……！　嬉しそうに兄上が話すのを聞いて、私もリーリア様と羽根突きで遊びたくなった。だから今日、ここにやって来たのです！」"

[[dialogue]]
speaker = "ダッチ"
# 「さあ、勝負しましょう、リーリア様！　私の『晴れ着バニー』に対する欲望と、貴女の晴れ着の力、どちらが強いか、いざ勝負です！！」
line = "「さあ、勝負しましょう、リーリア様！　私の『晴れ着バニー』に対する欲望と、貴女の晴れ着の力、どちらが強いか、いざ勝負です！！」"

[[dialogue]]
speaker = "リーリア"
# 「わかりました。あなたは過去に事件を起こしているロストアイテム……このまま放置するわけにもいきませんから！」
line = "「わかりました。あなたは過去に事件を起こしているロストアイテム……このまま放置するわけにもいきませんから！」"

[[dialogue]]
speaker = "unk"
# そうして、ダッチとの羽根突き勝負が始まったのだが――
line = "そうして、ダッチとの羽根突き勝負が始まったのだが――"

[[dialogue]]
speaker = "ダッチ"
# 「ほら、また行きますよぉ～！　七彩流羽根突き術・弐ノ型『<ruby=だいだい>橙</ruby>』！」
line = "「ほら、また行きますよぉ～！　七彩流羽根突き術・弐ノ型『<ruby>橙<rt>だいだい</rt></ruby>』！」"

[[dialogue]]
speaker = "リーリア"
# 「くっ……！　参ノ型『黄色』！」
line = "「くっ……！　参ノ型『黄色』！」"

[[dialogue]]
speaker = "unk"
# なんと、ダッチもリーリアと同じ羽根突き術を使ってきた。
line = "なんと、ダッチもリーリアと同じ羽根突き術を使ってきた。"

[[dialogue]]
speaker = "ダッチ"
# 「フフフ、驚きましたか？　私も兄上と同じ七彩に連なる者！　ですから、同じ技を使えるのですよ！　<ruby=よん>肆</ruby>ノ型『緑』！」
line = "「フフフ、驚きましたか？　私も兄上と同じ七彩に連なる者！　ですから、同じ技を使えるのですよ！　<ruby>肆<rt>よん</rt></ruby>ノ型『緑』！」"

[[dialogue]]
speaker = "リーリア"
# 「伍ノ型『青』！」
line = "「伍ノ型『青』！」"

[[dialogue]]
speaker = "ダッチ"
# 「さあ、手伝って差し上げますよ！　見せて下さい、リーリア様。貴女が辿り着いた七彩の輝きを！　<ruby=ろく>陸</ruby>ノ型『藍色』！」
line = "「さあ、手伝って差し上げますよ！　見せて下さい、リーリア様。貴女が辿り着いた七彩の輝きを！　<ruby>陸<rt>ろく</rt></ruby>ノ型『藍色』！」"

[[dialogue]]
speaker = "リーリア"
# 「言われずとも……行きます！　<ruby=しち>漆</ruby>ノ型――『紫』！！」
line = "「言われずとも……行きます！　<ruby>漆<rt>しち</rt></ruby>ノ型――『紫』！！」"

[[dialogue]]
speaker = "unk"
# 交互に積み重ねた色が、リーリアの技によって虹色の輝きを放つ。その技に、ダッチは見惚れる。
line = "交互に積み重ねた色が、リーリアの技によって虹色の輝きを放つ。その技に、ダッチは見惚れる。"

[[dialogue]]
speaker = "ダッチ"
# 「フオオオォォ……！　素晴らしいっ！」
line = "「フオオオォォ……！　素晴らしいっ！」"

[[dialogue]]
speaker = "ダッチ"
# 「これが我らが主の描こうとしていた、尊き『欲望』の色……！」
line = "「これが我らが主の描こうとしていた、尊き『欲望』の色……！」"

[[dialogue]]
speaker = "ダッチ"
# 「ですが……<ruby=わたくし>私</ruby>の欲望は更にその上を行く！」
line = "「ですが……<ruby>私<rt>わたくし</rt></ruby>の欲望は更にその上を行く！」"

[[dialogue]]
speaker = "ダッチ"
# 「七彩流羽根突き術・<ruby=はち>捌</ruby>ノ型――」
line = "「七彩流羽根突き術・<ruby>捌<rt>はち</rt></ruby>ノ型――」"

[[dialogue]]
speaker = "獅子舞"
# 「なっ……８番目だと！？」
line = "「なっ……８番目だと！？」"

[[dialogue]]
speaker = "ダッチ"
# 「――『<ruby=しろうさぎ>白兎</ruby>』ィ！！！」
line = "「――『<ruby>白兎<rt>しろうさぎ</rt></ruby>』ィ！！！」"

[[dialogue]]
speaker = "リーリア"
# 「虹の上をウサギが駆けて……！？」
line = "「虹の上をウサギが駆けて……！？」"

[[dialogue]]
speaker = "unk"
# 子ウサギが跳ねるイメージが具現化し、純白の美しい光がぴょんと地面へと落ちて、転がる。
line = "子ウサギが跳ねるイメージが具現化し、純白の美しい光がぴょんと地面へと落ちて、転がる。"

[[dialogue]]
speaker = "ダッチ"
# 「これが我が主の亡き後……まだ見たことがない漆ノ型を返す為に、果てなき『欲望』で作り上げた、私だけの型！！」
line = "「これが我が主の亡き後……まだ見たことがない漆ノ型を返す為に、果てなき『欲望』で作り上げた、私だけの型！！」"

[[dialogue]]
speaker = "獅子舞"
# 「愚弟、お前という奴は！　なんという狂気的な欲望を……！」
line = "「愚弟、お前という奴は！　なんという狂気的な欲望を……！」"

[[dialogue]]
speaker = "リーリア"
# 「悔しいですが……綺麗な色でした。私の負けです……」
line = "「悔しいですが……綺麗な色でした。私の負けです……」"

[[dialogue]]
speaker = "ダッチ"
# 「フオオオォォォッ！！　やりました！　勝ちましたよ、兄上！　念願だった漆ノ型を自身の技で上回った！　私の欲望がまた１つ、磨き上げられました！！」
line = "「フオオオォォォッ！！　やりました！　勝ちましたよ、兄上！　念願だった漆ノ型を自身の技で上回った！　私の欲望がまた１つ、磨き上げられました！！」"

[[dialogue]]
speaker = "ダッチ"
# 「リーリア様を倒した以上、他の方々では私に羽根突きで勝つことはできない！　これで新年を鮮やかに彩る、素敵な晴れ着バニーが拝めますねぇ……！」
line = "「リーリア様を倒した以上、他の方々では私に羽根突きで勝つことはできない！　これで新年を鮮やかに彩る、素敵な晴れ着バニーが拝めますねぇ……！」"

[[dialogue]]
speaker = "リーリア"
# 「――いいえ、まだです。私よりも、晴れ着の力が強い星騎士がいます」
line = "「――いいえ、まだです。私よりも、晴れ着の力が強い星騎士がいます」"

[[dialogue]]
speaker = "ダッチ"
# 「……なんですと？」
line = "「……なんですと？」"

[[dialogue]]
speaker = "リーリア"
# 「すみません。後をお願いできますか――サーシャさん」
line = "「すみません。後をお願いできますか――サーシャさん」"

[[dialogue]]
speaker = "サーシャ"
# 「ええ、任せて。私が先輩として、リーリアちゃんの仇をとるわ」
line = "「ええ、任せて。私が先輩として、リーリアちゃんの仇をとるわ」"

[[dialogue]]
speaker = "ダッチ"
# 「サーシャ様、まさか貴女が羽根突きで、私に勝つと仰るのですか？」
line = "「サーシャ様、まさか貴女が羽根突きで、私に勝つと仰るのですか？」"

[[dialogue]]
speaker = "サーシャ"
# 「そうよ。獅子舞さんから晴れ着の力を、リーリアちゃんから羽根突きの技を教わった私が、あなたに勝ってみせる」
line = "「そうよ。獅子舞さんから晴れ着の力を、リーリアちゃんから羽根突きの技を教わった私が、あなたに勝ってみせる」"

[[dialogue]]
speaker = "unk"
# サーシャさんは本気の眼差しで、ダッチのことを見据えるのだった。
line = "サーシャさんは本気の眼差しで、ダッチのことを見据えるのだった。"
