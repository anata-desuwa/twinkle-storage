[[dialogue]]
speaker = "セシア"
# 「わたくし……あるべきところに還るのね……」
line = "「わたくし……あるべきところに還るのね……」"

[[dialogue]]
speaker = "サチ"
# 「私たちの勝利です……！」
line = "「私たちの勝利です……！」"

[[dialogue]]
speaker = "パテル"
# 「セシアがフィーニスの塔に還ったね。これで世界も正常化に近づいたはずだよ」
line = "「セシアがフィーニスの塔に還ったね。これで世界も正常化に近づいたはずだよ」"

[[dialogue]]
speaker = "ルリエル"
# 「は～、お疲れ様でした～……。今日は思い通りにいくことばかりで、とってもラッキーでしたね！」
line = "「は～、お疲れ様でした～……。今日は思い通りにいくことばかりで、とってもラッキーでしたね！」"

[[dialogue]]
speaker = "クラウディア（黄昏）"
# 「ハーーハッハッハ！　余の大活躍であったな！」
line = "「ハーーハッハッハ！　余の大活躍であったな！」"

[[dialogue]]
speaker = "アナ"
# 「さすがネビュラの総帥。肩書に違わぬ力でした」
line = "「さすがネビュラの総帥。肩書に違わぬ力でした」"

[[dialogue]]
speaker = "クラウディア（黄昏）"
# 「うむ。お主らの働きも悪くなかったぞ」
line = "「うむ。お主らの働きも悪くなかったぞ」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「モンスターが消えましたわね。守護天使を解放できたようです」
line = "「モンスターが消えましたわね。守護天使を解放できたようです」"

[[dialogue]]
speaker = "アム"
# 「ふっふん、あたしの方がモンスター倒してたよね！」
line = "「ふっふん、あたしの方がモンスター倒してたよね！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「む。それは聞き捨てなりませんの。私の槍の方がモンスターを貫きましたわ！」
line = "「む。それは聞き捨てなりませんの。私の槍の方がモンスターを貫きましたわ！」"

[[dialogue]]
speaker = "アム"
# 「え～、あたしの方が倒したでしょ！　む～……こうなったら模擬戦だ！」
line = "「え～、あたしの方が倒したでしょ！　む～……こうなったら模擬戦だ！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「ええ、受けて立ちますわ！　流星市国に帰ったらすぐ始めますわよ！」
line = "「ええ、受けて立ちますわ！　流星市国に帰ったらすぐ始めますわよ！」"

[[dialogue]]
speaker = "ナミエル"
# 「結局こうなるのですね……」
line = "「結局こうなるのですね……」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「さてと。家来のみなさーん、こっちですよー」
line = "「さてと。家来のみなさーん、こっちですよー」"

[[dialogue]]
speaker = "ナミエル"
# 「ディアーブル家の方々、来ていたのですね。何をされるんですか？」
line = "「ディアーブル家の方々、来ていたのですね。何をされるんですか？」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「狩りの後の<ruby=ピクニック>野営</ruby>は貴族の嗜みですから。本当なら豪華な料理を用意するところですが、時間もないのでお茶とお菓子だけ用意させました」
line = "「狩りの後の<ruby>野営<rt>ピクニック</rt></ruby>は貴族の嗜みですから。本当なら豪華な料理を用意するところですが、時間もないのでお茶とお菓子だけ用意させました」"

[[dialogue]]
speaker = "ナミエル"
# 「では私もお手伝いを……」
line = "「では私もお手伝いを……」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「ナミエルさん。今日は給仕をしなくていいですよ」
line = "「ナミエルさん。今日は給仕をしなくていいですよ」"

[[dialogue]]
speaker = "ナミエル"
# 「でも私はメイドですから……」
line = "「でも私はメイドですから……」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「メイドであるならなおさら、客人の時は客人として扱われてください。私の使用人に恥をかかせないでくださいな」
line = "「メイドであるならなおさら、客人の時は客人として扱われてください。私の使用人に恥をかかせないでくださいな」"

[[dialogue]]
speaker = "ナミエル"
# 「……はい。ではいただきますね」
line = "「……はい。ではいただきますね」"

[[dialogue]]
speaker = "アイリーン"
# 「わぁ、このジャムおいしそ～！　こっちはスコーンかな？」
line = "「わぁ、このジャムおいしそ～！　こっちはスコーンかな？」"

[[dialogue]]
speaker = "プリムラ"
# 「貴様、さっきまでとは雰囲気が違うな」
line = "「貴様、さっきまでとは雰囲気が違うな」"

[[dialogue]]
speaker = "アイリーン"
# 「いや～、今までは外行きモードっていうか、セドナさんにネビュラらしくしろって言われててね」
line = "「いや～、今までは外行きモードっていうか、セドナさんにネビュラらしくしろって言われててね」"

[[dialogue]]
speaker = "アイリーン"
# 「でもリクリエは止めたし、もういいよね。私が言っちゃいけないかもだけど、人間界が無事で良かった！　さ、お菓子一緒に食べよ、ミーちゃん♪」
line = "「でもリクリエは止めたし、もういいよね。私が言っちゃいけないかもだけど、人間界が無事で良かった！　さ、お菓子一緒に食べよ、ミーちゃん♪」"

[[dialogue]]
speaker = "ミーちゃん"
# 「ホー！」
line = "「ホー！」"

[[dialogue]]
speaker = "ルリエル"
# 「ああ！？　戻ってきたら美味しそうなもの食べてます！　羨ましいです！」
line = "「ああ！？　戻ってきたら美味しそうなもの食べてます！　羨ましいです！」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「もちろん皆さんの分もありますよ。ディアーブル家の土地で採れたベリーのジャムです。召し上がれ」
line = "「もちろん皆さんの分もありますよ。ディアーブル家の土地で採れたベリーのジャムです。召し上がれ」"

[[dialogue]]
speaker = "パテル"
# 「いっただっきまーす♪　ん～、これすごくおいしい♪」
line = "「いっただっきまーす♪　ん～、これすごくおいしい♪」"

[[dialogue]]
speaker = "サチ"
# 「では私も頂きますね。恥ずかしながら、激しい戦いでお腹が減ってしまって……」
line = "「では私も頂きますね。恥ずかしながら、激しい戦いでお腹が減ってしまって……」"

[[dialogue]]
speaker = "プリムラ"
# 「ひょいっと」
line = "「ひょいっと」"

[[dialogue]]
speaker = "サチ"
# 「あ！　今私が食べようとしたの取ったでしょ！」
line = "「あ！　今私が食べようとしたの取ったでしょ！」"

[[dialogue]]
speaker = "プリムラ"
# 「さぁ～？　何のことか知らんなぁ～」
line = "「さぁ～？　何のことか知らんなぁ～」"

[[dialogue]]
speaker = "アナ"
# 「これがケンカするほど仲が良い……ということなのでしょうか。トマルさんがいないとやはりこうなりますね」
line = "「これがケンカするほど仲が良い……ということなのでしょうか。トマルさんがいないとやはりこうなりますね」"

[[dialogue]]
speaker = "クラウディア（黄昏）"
# 「もちろん余の分もあるのだろうな」
line = "「もちろん余の分もあるのだろうな」"

[[dialogue]]
speaker = "アイリーン"
# 「姫様！？　どうしてここにいるんですか！？」
line = "「姫様！？　どうしてここにいるんですか！？」"

[[dialogue]]
speaker = "クラウディア（黄昏）"
# 「セドナの目を盗んでな。今頃慌てふためいているやもしれんが、あやつなら上手くやるだろう」
line = "「セドナの目を盗んでな。今頃慌てふためいているやもしれんが、あやつなら上手くやるだろう」"

[[dialogue]]
speaker = "セドナ"
# 『姫様。お疲れ様でした。堕天使が相手といえど、光の魔女の敵ではありませんでしたね』
line = "『姫様。お疲れ様でした。堕天使が相手といえど、光の魔女の敵ではありませんでしたね』"

[[dialogue]]
speaker = "クラウディア（黄昏）"
# 「セドナ！？　う、うむ、くるしゅうないぞ」
line = "「セドナ！？　う、うむ、くるしゅうないぞ」"

[[dialogue]]
speaker = "クラウディア（黄昏）"
# （どうした？　てっきりお説教かと思ったが……）
line = "（どうした？　てっきりお説教かと思ったが……）"

[[dialogue]]
speaker = "セドナ"
# 『ネビュラとしては姫様の労を労わねばなりません。採れたて野菜のフルコースを用意してお帰りをお待ちしています』
line = "『ネビュラとしては姫様の労を労わねばなりません。採れたて野菜のフルコースを用意してお帰りをお待ちしています』"

[[dialogue]]
speaker = "クラウディア（黄昏）"
# 「やっぱり怒っているではないか！？　野菜はイヤだ～～～！！」
line = "「やっぱり怒っているではないか！？　野菜はイヤだ～～～！！」"

[[dialogue]]
speaker = "アム"
# 「ところでさぁ……シャルレーヌってほんとに１年生なの？」
line = "「ところでさぁ……シャルレーヌってほんとに１年生なの？」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「はい、そうですよ。よく言われるんですけど、そんなに１年生らしくないですか？」
line = "「はい、そうですよ。よく言われるんですけど、そんなに１年生らしくないですか？」"

[[dialogue]]
speaker = "サチ"
# （だって１年生なのに……）
line = "（だって１年生なのに……）"

[[dialogue]]
speaker = "アム"
# （この中で一番……）
line = "（この中で一番……）"

[[dialogue]]
speaker = "エルデリーゼ"
# （お胸が大きいですから！）
line = "（お胸が大きいですから！）"

[[dialogue]]
speaker = "ルリエル"
# 「へぇ、シャルレーヌさん、１年生だったんですか。一番大人っぽいから意外ですね！」
line = "「へぇ、シャルレーヌさん、１年生だったんですか。一番大人っぽいから意外ですね！」"

[[dialogue]]
speaker = "サチ"
# 「あぅっ……私、３年生で生徒会長なのに……」
line = "「あぅっ……私、３年生で生徒会長なのに……」"

[[dialogue]]
speaker = "プリムラ"
# 「ハハッ、サチ、言われておるぞ」
line = "「ハハッ、サチ、言われておるぞ」"

[[dialogue]]
speaker = "ナミエル"
# 「プリムラさまも体型は似たようなものでは……？」
line = "「プリムラさまも体型は似たようなものでは……？」"

[[dialogue]]
speaker = "プリムラ"
# 「我は真の姿ではボンキュッボンなのじゃ！」
line = "「我は真の姿ではボンキュッボンなのじゃ！」"

[[dialogue]]
speaker = "アナ"
# 「他の場所でもきっと皆さんが頑張ってくれているはずです。私たちの戦いは終わった以上、信じて待ちましょう」
line = "「他の場所でもきっと皆さんが頑張ってくれているはずです。私たちの戦いは終わった以上、信じて待ちましょう」"

[[dialogue]]
speaker = "ルリエル"
# 「そうですね、絶対やってくれます！　……あれ？　パテルさんには流星学園、アルモタヘルさんには新星学園、セシアさんには附属校生……それだと他の場所は？」
line = "「そうですね、絶対やってくれます！　……あれ？　パテルさんには流星学園、アルモタヘルさんには新星学園、セシアさんには附属校生……それだと他の場所は？」"
