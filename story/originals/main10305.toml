[[dialogue]]
speaker = "unk"
# 第５話,破られた約束,B
line = "第５話,破られた約束,B"

[[dialogue]]
speaker = "シルヴィ"
# 「ごちそう様！」
line = "「ごちそう様！」"

[[dialogue]]
speaker = "サーシャ"
# 「ごちそう様でした」
line = "「ごちそう様でした」"

[[dialogue]]
speaker = "蛍火"
# 「お粗末様です」
line = "「お粗末様です」"

[[dialogue]]
speaker = "蛍火"
# 「では、私は後片付けしていますので、おふたりはどうぞごゆっくり」
line = "「では、私は後片付けしていますので、おふたりはどうぞごゆっくり」"

[[dialogue]]
speaker = "シルヴィ"
# 「ありがとっ」
line = "「ありがとっ」"

[[dialogue]]
speaker = "サーシャ"
# 「お疲れ様～」
line = "「お疲れ様～」"

[[dialogue]]
speaker = "サーシャ"
# 「シルヴィ。今日、このあと時間あるかしら？」
line = "「シルヴィ。今日、このあと時間あるかしら？」"

[[dialogue]]
speaker = "シルヴィ"
# 「大丈夫！　今日はなんもないよ！」
line = "「大丈夫！　今日はなんもないよ！」"

[[dialogue]]
speaker = "サーシャ"
# 「じゃあ、このまま大聖堂に行ってみない？」
line = "「じゃあ、このまま大聖堂に行ってみない？」"

[[dialogue]]
speaker = "シルヴィ"
# 「うっ…………」
line = "「うっ…………」"

[[dialogue]]
speaker = "サーシャ"
# 「ふふっ……とって食べたりしないわよ～♪」
line = "「ふふっ……とって食べたりしないわよ～♪」"

[[dialogue]]
speaker = "シルヴィ"
# 「……サーシャ怒ってる？　怒ってるよね？」
line = "「……サーシャ怒ってる？　怒ってるよね？」"

[[dialogue]]
speaker = "サーシャ"
# 「怒ってないわ～。でも、そう思うなら一緒に来て」
line = "「怒ってないわ～。でも、そう思うなら一緒に来て」"

[[dialogue]]
speaker = "シルヴィ"
# 「もう、分かったよぅ……」
line = "「もう、分かったよぅ……」"

[[dialogue]]
speaker = "unk"
# ここ大聖堂は女神の信仰の中心地だ。
line = "ここ大聖堂は女神の信仰の中心地だ。"

[[dialogue]]
speaker = "unk"
# 人々に星力を与え、星騎士を誕生させたのも女神とされている。
line = "人々に星力を与え、星騎士を誕生させたのも女神とされている。"

[[dialogue]]
speaker = "unk"
# 星騎士たちにとって、ここは己のうちに秘めた誓いや祈りを捧げる場所でもあるのだ。
line = "星騎士たちにとって、ここは己のうちに秘めた誓いや祈りを捧げる場所でもあるのだ。"

[[dialogue]]
speaker = "サーシャ"
# 「ふたりでここに来るのも久しぶりね～♪」
line = "「ふたりでここに来るのも久しぶりね～♪」"

[[dialogue]]
speaker = "シルヴィ"
# 「うん、そうだね……」
line = "「うん、そうだね……」"

[[dialogue]]
speaker = "サーシャ"
# 「知ってる？　ここにあるのは『太陽の壁画』だけど、実は別に『月の壁画』があって……あれ？　これ言っていいのかしら？」
line = "「知ってる？　ここにあるのは『太陽の壁画』だけど、実は別に『月の壁画』があって……あれ？　これ言っていいのかしら？」"

[[dialogue]]
speaker = "シルヴィ"
# 「え！？　そこまで言ってやめるの！？」
line = "「え！？　そこまで言ってやめるの！？」"

[[dialogue]]
speaker = "サーシャ"
# 「この先はフィオナちゃんに許可をとらないとだわ～♪」
line = "「この先はフィオナちゃんに許可をとらないとだわ～♪」"

[[dialogue]]
speaker = "シルヴィ"
# 「めっちゃ気になる～！」
line = "「めっちゃ気になる～！」"

[[dialogue]]
speaker = "シルヴィ"
# 「ええと、壁画に描かれてるのって……どちらも魔王だよね？」
line = "「ええと、壁画に描かれてるのって……どちらも魔王だよね？」"

[[dialogue]]
speaker = "サーシャ"
# 「そうよ～、でもそれぞれの壁画で別な描かれ方をしているの」
line = "「そうよ～、でもそれぞれの壁画で別な描かれ方をしているの」"

[[dialogue]]
speaker = "シルヴィ"
# 「へぇ……そうなんだ……」
line = "「へぇ……そうなんだ……」"

[[dialogue]]
speaker = "サーシャ"
# （『太陽の壁画』の魔王は大悪として描かれている。一般的に知られているのはこちらの方……）
line = "（『太陽の壁画』の魔王は大悪として描かれている。一般的に知られているのはこちらの方……）"

[[dialogue]]
speaker = "サーシャ"
# （一方で『月の壁画』で魔王はリクリエを撃退した英雄として描かれているのよね……）
line = "（一方で『月の壁画』で魔王はリクリエを撃退した英雄として描かれているのよね……）"

[[dialogue]]
speaker = "シルヴィ"
# 「魔王、か……そういえば、今の会長くんも魔王なんだっけ？」
line = "「魔王、か……そういえば、今の会長くんも魔王なんだっけ？」"

[[dialogue]]
speaker = "サーシャ"
# 「そうよ～とっても魔王だわ～」
line = "「そうよ～とっても魔王だわ～」"

[[dialogue]]
speaker = "サーシャ"
# 「……今思えば、その言葉から今の星徒会は始まったのね」
line = "「……今思えば、その言葉から今の星徒会は始まったのね」"

[[dialogue]]
speaker = "サーシャ"
# 「少し、聴いててくれる？」
line = "「少し、聴いててくれる？」"

[[dialogue]]
speaker = "シルヴィ"
# 「うん……」
line = "「うん……」"

[[dialogue]]
speaker = "サーシャ"
# 「始まりは、会長くん──緋宮クロトくんが転入してきたことだった」
line = "「始まりは、会長くん──緋宮クロトくんが転入してきたことだった」"

[[dialogue]]
speaker = "サーシャ"
# 「転入初日、ヴィーナスちゃんが彼を魔王と呼び、御前試合を叩きつけた」
line = "「転入初日、ヴィーナスちゃんが彼を魔王と呼び、御前試合を叩きつけた」"

[[dialogue]]
speaker = "サーシャ"
# 「彼は見事、御前試合に勝利し、新星星徒会長に就任。対リクリエの最前線に立つことになる」
line = "「彼は見事、御前試合に勝利し、新星星徒会長に就任。対リクリエの最前線に立つことになる」"

[[dialogue]]
speaker = "サーシャ"
# 「そして、会長くん、ヴィーナスちゃん、流星学園のフィオナちゃんを中心に私たちはフィーニスの塔を昇り、世界の真実を知ったわ」
line = "「そして、会長くん、ヴィーナスちゃん、流星学園のフィオナちゃんを中心に私たちはフィーニスの塔を昇り、世界の真実を知ったわ」"

[[dialogue]]
speaker = "シルヴィ"
# 「ちょっと待って！　フィーニスの塔って入っちゃいけないんじゃなかった！？　めっちゃ怒られるやつ！」
line = "「ちょっと待って！　フィーニスの塔って入っちゃいけないんじゃなかった！？　めっちゃ怒られるやつ！」"

[[dialogue]]
speaker = "サーシャ"
# 「じゃあ今の話オフレコでお願いね～」
line = "「じゃあ今の話オフレコでお願いね～」"

[[dialogue]]
speaker = "シルヴィ"
# 「ぐだぐだだよ、もう！」
line = "「ぐだぐだだよ、もう！」"

[[dialogue]]
speaker = "サーシャ"
# 「続けるわね？　……塔の攻略中、ヴィーナスちゃんが<ruby=さら>拐</ruby>われてしまったの」
line = "「続けるわね？　……塔の攻略中、ヴィーナスちゃんが<ruby>拐<rt>さら</rt></ruby>われてしまったの」"

[[dialogue]]
speaker = "サーシャ"
# 「ヴィーナスちゃんを追って、私たちは魔界レゾフに降り立った」
line = "「ヴィーナスちゃんを追って、私たちは魔界レゾフに降り立った」"

[[dialogue]]
speaker = "シルヴィ"
# 「え、どうやって魔界に？　これも言えないやつ？」
line = "「え、どうやって魔界に？　これも言えないやつ？」"

[[dialogue]]
speaker = "サーシャ"
# 「もう、話の腰を折らないの」
line = "「もう、話の腰を折らないの」"

[[dialogue]]
speaker = "シルヴィ"
# 「今のあたしが悪いの！？」
line = "「今のあたしが悪いの！？」"

[[dialogue]]
speaker = "サーシャ"
# 「運よく占い師さんのおかげでヴィーナスちゃんは見つけられたけど、同時にスタンピードが発生して大変だったわ」
line = "「運よく占い師さんのおかげでヴィーナスちゃんは見つけられたけど、同時にスタンピードが発生して大変だったわ」"

[[dialogue]]
speaker = "シルヴィ"
# 「スタンピード……大いなる冬に連なる大寒波。レゾフの大災害……サーシャから何度か話してもらったよね？」
line = "「スタンピード……大いなる冬に連なる大寒波。レゾフの大災害……サーシャから何度か話してもらったよね？」"

[[dialogue]]
speaker = "サーシャ"
# 「ええ、ちょうどその時期だったの」
line = "「ええ、ちょうどその時期だったの」"

[[dialogue]]
speaker = "サーシャ"
# 「でも、これも流星の学園長の協力でなんとかなって、ヴィーナスちゃんを救出。その勢いのまま人間界に戻って、あとはみんなの知るとおりね」
line = "「でも、これも流星の学園長の協力でなんとかなって、ヴィーナスちゃんを救出。その勢いのまま人間界に戻って、あとはみんなの知るとおりね」"

[[dialogue]]
speaker = "unk"
# 新星・流星の両星徒会を中心に、学園に所属する全星騎士の尽力によってリクリエは退けられた。
line = "新星・流星の両星徒会を中心に、学園に所属する全星騎士の尽力によってリクリエは退けられた。"

[[dialogue]]
speaker = "unk"
# ──だがその中に、シルヴィはいなかった。
line = "──だがその中に、シルヴィはいなかった。"

[[dialogue]]
speaker = "シルヴィ"
# 「…………ぐすっ」
line = "「…………ぐすっ」"

[[dialogue]]
speaker = "サーシャ"
# 「シルヴィ……」
line = "「シルヴィ……」"

[[dialogue]]
speaker = "シルヴィ"
# 「……なんであたしは、そこにいなかったんだろう」
line = "「……なんであたしは、そこにいなかったんだろう」"

[[dialogue]]
speaker = "シルヴィ"
# 「……約束、憶えてる？」
line = "「……約束、憶えてる？」"

[[dialogue]]
speaker = "サーシャ"
# 「もちろん、憶えてる。忘れたことなんてないわ」
line = "「もちろん、憶えてる。忘れたことなんてないわ」"

[[dialogue]]
speaker = "シルヴィ"
# 「ごめん、本当にごめん……なんて、なんて謝ったらいいか…………」
line = "「ごめん、本当にごめん……なんて、なんて謝ったらいいか…………」"

[[dialogue]]
speaker = "サーシャ"
# 「私こそごめんなさい。責めるつもりはなかったの。……だって、私は、ずっとあなたに助けられていたんだから」
line = "「私こそごめんなさい。責めるつもりはなかったの。……だって、私は、ずっとあなたに助けられていたんだから」"
