[[dialogue]]
speaker = "unk"
# 第１０話,極星学園、開校,B
line = "第１０話,極星学園、開校,B"

[[dialogue]]
speaker = "unk"
# 女神テルルの遣いであるルヴィネの存在は、すぐにデネブ中に広まることとなった。
line = "女神テルルの遣いであるルヴィネの存在は、すぐにデネブ中に広まることとなった。"

[[dialogue]]
speaker = "unk"
# 『仮面の女』の撃破、そして緋宮クロト裏切りの報は、すぐに三界を駆け巡った。
line = "『仮面の女』の撃破、そして緋宮クロト裏切りの報は、すぐに三界を駆け巡った。"

[[dialogue]]
speaker = "unk"
# アルタイル、ベガなどの平行世界の情報はそれに遅れ、時間をかけてゆっくりと人々に浸透することになる。
line = "アルタイル、ベガなどの平行世界の情報はそれに遅れ、時間をかけてゆっくりと人々に浸透することになる。"

[[dialogue]]
speaker = "unk"
# ──近づきつつあったリクリエの<ruby=ほんぱ>本波</ruby>は、いったん跳ねのけることに成功した。
line = "──近づきつつあったリクリエの<ruby>本波<rt>ほんぱ</rt></ruby>は、いったん跳ねのけることに成功した。"

[[dialogue]]
speaker = "unk"
# しかしアステラもモンスターも未だにその出現は止まらない。
line = "しかしアステラもモンスターも未だにその出現は止まらない。"

[[dialogue]]
speaker = "unk"
# <ruby=ラーゴ・シエロ>鏡界の湖</ruby>は『仮面の女』に破壊されたままであり、何より人類防衛のかなめであった２つの学園が機能不全に陥っている。
line = "<ruby>鏡界の湖<rt>ラーゴ・シエロ</rt></ruby>は『仮面の女』に破壊されたままであり、何より人類防衛のかなめであった２つの学園が機能不全に陥っている。"

[[dialogue]]
speaker = "unk"
# 星騎士のほとんどは死亡。施設も壊滅状態──ゆえにデネブは、大掛かりな復興政策をとる必要に迫られていた。
line = "星騎士のほとんどは死亡。施設も壊滅状態──ゆえにデネブは、大掛かりな復興政策をとる必要に迫られていた。"

[[dialogue]]
speaker = "unk"
# デネブの復興に際しても、ルヴィネは身を粉にして尽力した。
line = "デネブの復興に際しても、ルヴィネは身を粉にして尽力した。"

[[dialogue]]
speaker = "unk"
# 流星市国外への援助要請、<ruby=ラーゴ・シエロ>鏡界の湖</ruby>の再開通による三界の協力体制の確立。緋宮クロトを未だ信奉するレジスタンスの撃退──時は瞬く間に過ぎた。
line = "流星市国外への援助要請、<ruby>鏡界の湖<rt>ラーゴ・シエロ</rt></ruby>の再開通による三界の協力体制の確立。緋宮クロトを未だ信奉するレジスタンスの撃退──時は瞬く間に過ぎた。"

[[dialogue]]
speaker = "unk"
# そして流星群から数年後に打ち出されたのが、新しい星騎士養成機関の創設。
line = "そして流星群から数年後に打ち出されたのが、新しい星騎士養成機関の創設。"

[[dialogue]]
speaker = "unk"
# 第３の学園──極星学園の誕生である。
line = "第３の学園──極星学園の誕生である。"

[[dialogue]]
speaker = "unk"
# 本来、チナは１つ下、レティシアは１つ上の年齢だったが、新しい学園の開校に合わせて『ポラリス』の５人は同時に入学──同級生となった。
line = "本来、チナは１つ下、レティシアは１つ上の年齢だったが、新しい学園の開校に合わせて『ポラリス』の５人は同時に入学──同級生となった。"

[[dialogue]]
speaker = "チナ"
# 「祝！　極星学園、開校前日！」
line = "「祝！　極星学園、開校前日！」"

[[dialogue]]
speaker = "ベアトリス"
# 「すごいね～っ……どこもかしこもピカピカだよチナちゃん！　ここが明日から、私たちが通う学園かぁ……！」
line = "「すごいね～っ……どこもかしこもピカピカだよチナちゃん！　ここが明日から、私たちが通う学園かぁ……！」"

[[dialogue]]
speaker = "チナ"
# 「長かったなあ……とうとうアタシたちにも城ができるってわけだ！　く～っ……あの日、泥水をすすってでも生き延びた甲斐があったぜ」
line = "「長かったなあ……とうとうアタシたちにも城ができるってわけだ！　く～っ……あの日、泥水をすすってでも生き延びた甲斐があったぜ」"

[[dialogue]]
speaker = "ベアトリス"
# 「星騎士としての活動はずっと続けてきたけど、それでもやっぱり学園があるのは嬉しいよ～♪」
line = "「星騎士としての活動はずっと続けてきたけど、それでもやっぱり学園があるのは嬉しいよ～♪」"

[[dialogue]]
speaker = "ベアトリス"
# 「授業に、部活動に、委員会……楽しみだなあ。たくさんお友達できたらいいな～♪」
line = "「授業に、部活動に、委員会……楽しみだなあ。たくさんお友達できたらいいな～♪」"

[[dialogue]]
speaker = "チナ"
# 「あれ……そういえばグレイスはどこだ？」
line = "「あれ……そういえばグレイスはどこだ？」"

[[dialogue]]
speaker = "レティシア"
# 「購買部を見に行くって言ってたわね──ああ、ちょうど戻って来たわ」
line = "「購買部を見に行くって言ってたわね──ああ、ちょうど戻って来たわ」"

[[dialogue]]
speaker = "グレイス"
# 「しょぼーん。店員さん、だーれもいませんでした……」
line = "「しょぼーん。店員さん、だーれもいませんでした……」"

[[dialogue]]
speaker = "チナ"
# 「そりゃそうだろ。明日から開校だって何度も言ったじゃねーか。はしゃぎすぎなんだよ、グレイスは」
line = "「そりゃそうだろ。明日から開校だって何度も言ったじゃねーか。はしゃぎすぎなんだよ、グレイスは」"

[[dialogue]]
speaker = "レティシア"
# 「それを言うならチナもでしょう？　制服に着替えてる時から、ずいぶんとウキウキしていたように見えたわ」
line = "「それを言うならチナもでしょう？　制服に着替えてる時から、ずいぶんとウキウキしていたように見えたわ」"

[[dialogue]]
speaker = "ベアトリス"
# 「あはは、そうだね～。ネクタイ３回も結び直してたし」
line = "「あはは、そうだね～。ネクタイ３回も結び直してたし」"

[[dialogue]]
speaker = "チナ"
# 「う……ウキウキなんてしてねえって！　あれはそう、武者震いってやつだよ。極星の星徒会役員として、当然持つべき心構えっていうか……」
line = "「う……ウキウキなんてしてねえって！　あれはそう、武者震いってやつだよ。極星の星徒会役員として、当然持つべき心構えっていうか……」"

[[dialogue]]
speaker = "グレイス"
# 「ぷぷ。チナは子供ですねえ」
line = "「ぷぷ。チナは子供ですねえ」"

[[dialogue]]
speaker = "チナ"
# 「お前にだけは言われたかねえよ！」
line = "「お前にだけは言われたかねえよ！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「ん……学園の設備はすべて問題なしね」
line = "「ん……学園の設備はすべて問題なしね」"

[[dialogue]]
speaker = "グレイス"
# 「あっ、お帰りなさいルヴィ──じゃなかった。お疲れ様です、ルヴィネ星徒会長！」
line = "「あっ、お帰りなさいルヴィ──じゃなかった。お疲れ様です、ルヴィネ星徒会長！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「ふふ、気が早いわね──お疲れ様。グレイス会計」
line = "「ふふ、気が早いわね──お疲れ様。グレイス会計」"

[[dialogue]]
speaker = "グレイス"
# 「おぉお……会計。いい響きです、役職があると偉い人になった気がします！」
line = "「おぉお……会計。いい響きです、役職があると偉い人になった気がします！」"

[[dialogue]]
speaker = "チナ"
# 「今さらだけどルヴィ、本当にグレイスが会計で大丈夫か……？　アタシ、マジで心配なんだけど」
line = "「今さらだけどルヴィ、本当にグレイスが会計で大丈夫か……？　アタシ、マジで心配なんだけど」"

[[dialogue]]
speaker = "グレイス"
# 「どういう意味ですか！　私はしっかり者です！」
line = "「どういう意味ですか！　私はしっかり者です！」"

[[dialogue]]
speaker = "チナ"
# 「しっかりしてるやつはそんなこと言わねえんだよ」
line = "「しっかりしてるやつはそんなこと言わねえんだよ」"

[[dialogue]]
speaker = "ベアトリス"
# 「それを言うなら、私が副会長っていうのもおかしい気が～……」
line = "「それを言うなら、私が副会長っていうのもおかしい気が～……」"

[[dialogue]]
speaker = "チナ"
# 「いや、それはない」
line = "「いや、それはない」"

[[dialogue]]
speaker = "レティシア"
# 「それはないわね」
line = "「それはないわね」"

[[dialogue]]
speaker = "ベアトリス"
# 「なんで！？　実力ならレティシアちゃんだよ！？　それに一番お姉さんだし……！」
line = "「なんで！？　実力ならレティシアちゃんだよ！？　それに一番お姉さんだし……！」"

[[dialogue]]
speaker = "レティシア"
# 「戦闘力も年功も、役職とは無関係よ。私は誰かの上に立てる器ではないもの」
line = "「戦闘力も年功も、役職とは無関係よ。私は誰かの上に立てる器ではないもの」"

[[dialogue]]
speaker = "グレイス"
# 「フフフ、ベアト？　不安なら私が、今から代わってあげてもいいですよ？」
line = "「フフフ、ベアト？　不安なら私が、今から代わってあげてもいいですよ？」"

[[dialogue]]
speaker = "チナ"
# 「グレイスに副会長やらすくらいならアタシがやるっての」
line = "「グレイスに副会長やらすくらいならアタシがやるっての」"

[[dialogue]]
speaker = "グレイス"
# 「なにおう～っ！？」
line = "「なにおう～っ！？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「うちのメンバーは戦闘力こそあれ……少し個性的だから。私がいない時のまとめ役は、ベアトが適任よ」
line = "「うちのメンバーは戦闘力こそあれ……少し個性的だから。私がいない時のまとめ役は、ベアトが適任よ」"

[[dialogue]]
speaker = "ベアトリス"
# 「ルヴィまで……不安だなぁ。魔界や天界の留学生さんから『はぁ？　あのザコが副会長？』とか言われたらどうしよう……」
line = "「ルヴィまで……不安だなぁ。魔界や天界の留学生さんから『はぁ？　あのザコが副会長？』とか言われたらどうしよう……」"

[[dialogue]]
speaker = "チナ"
# 「安心しろベアト。いざとなったらアタシに相談すりゃいい。うちの副会長を小馬鹿にするやつはぶちのめしてやる！」
line = "「安心しろベアト。いざとなったらアタシに相談すりゃいい。うちの副会長を小馬鹿にするやつはぶちのめしてやる！」"

[[dialogue]]
speaker = "レティシア"
# 「安心してベアト。役員の指名はルヴィの判断。ルヴィは何も間違わないわ」
line = "「安心してベアト。役員の指名はルヴィの判断。ルヴィは何も間違わないわ」"

[[dialogue]]
speaker = "グレイス"
# 「まあ、安心してくださいベアト。いざとなったら私が副会長を継ぎますので！　大船が控えていますよ！」
line = "「まあ、安心してくださいベアト。いざとなったら私が副会長を継ぎますので！　大船が控えていますよ！」"

[[dialogue]]
speaker = "ベアトリス"
# 「う、うん……みんななりに励ましてくれてるってことは分かるよ……！　私、副会長がんばってみる！！」
line = "「う、うん……みんななりに励ましてくれてるってことは分かるよ……！　私、副会長がんばってみる！！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「それはそうとあなたたち、学園の下見は終わった？」
line = "「それはそうとあなたたち、学園の下見は終わった？」"

[[dialogue]]
speaker = "ベアトリス"
# 「うん。建設途中にも何度も見周りしてたし、地理はばっちりだよ！」
line = "「うん。建設途中にも何度も見周りしてたし、地理はばっちりだよ！」"

[[dialogue]]
speaker = "グレイス"
# 「魔界や天界から留学生もたくさんやってきますからね。案内はお任せください！」
line = "「魔界や天界から留学生もたくさんやってきますからね。案内はお任せください！」"

[[dialogue]]
speaker = "チナ"
# 「んじゃあ、用事はこんなもんか。どーする、昼時だしルヴィのバイト先でも行くか？」
line = "「んじゃあ、用事はこんなもんか。どーする、昼時だしルヴィのバイト先でも行くか？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「それはまた今度ね。学園見学が終わっているのならちょうどいいわ。……あなたたちに伝えておきたいことがあるのだけど、時間をくれる？」
line = "「それはまた今度ね。学園見学が終わっているのならちょうどいいわ。……あなたたちに伝えておきたいことがあるのだけど、時間をくれる？」"

[[dialogue]]
speaker = "グレイス"
# 「もちろんですよ。このあと、何も予定はありませんし」
line = "「もちろんですよ。このあと、何も予定はありませんし」"

[[dialogue]]
speaker = "レティシア"
# 「ルヴィからのお願いを拒否するわけがないわ。どんなお話？」
line = "「ルヴィからのお願いを拒否するわけがないわ。どんなお話？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……外でする話ではないわね。星徒会室へ来てくれるかしら」
line = "「……外でする話ではないわね。星徒会室へ来てくれるかしら」"

[[dialogue]]
speaker = "ベアトリス"
# 「はーい。極星星徒会、最初のミーティングだね！」
line = "「はーい。極星星徒会、最初のミーティングだね！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "チナ"
# （……？　何だか暗い顔してるな、ルヴィ。何かあったのか……？）
line = "（……？　何だか暗い顔してるな、ルヴィ。何かあったのか……？）"
