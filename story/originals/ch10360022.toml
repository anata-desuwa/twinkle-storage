line = "「ふむふむ……『デキる彼女はエッチなコレクションにも動じない。寛容な彼女だとアピールをする絶好の機会』──なるほど、勉強になりますわ！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「隠し場所はベッドの下が定番……はしたないですが、ちょっと捜索してみましょう！」
line = "「隠し場所はベッドの下が定番……はしたないですが、ちょっと捜索してみましょう！」"

[[dialogue]]
speaker = "ヒルディオーネ"
