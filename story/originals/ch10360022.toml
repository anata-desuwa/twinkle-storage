[[dialogue]]
speaker = "unk"
# 第２話,マム、大変ですわ！,P
line = "第２話,マム、大変ですわ！,P"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「お～っほっほっほ！　そんなわけでマム！　緋宮会長とお付き合いすることになりましたわー！　ごめんあそばせー！」
line = "「お～っほっほっほ！　そんなわけでマム！　緋宮会長とお付き合いすることになりましたわー！　ごめんあそばせー！」"

[[dialogue]]
speaker = "マハムート"
# 「会って早々、喧しいドリルね……ま、一応は祝福してあげる。おめでとう、ヒルディー」
line = "「会って早々、喧しいドリルね……ま、一応は祝福してあげる。おめでとう、ヒルディー」"

[[dialogue]]
speaker = "マハムート"
# 「いつまで続く関係かはわからないけど、せいぜい上手くやることね？」
line = "「いつまで続く関係かはわからないけど、せいぜい上手くやることね？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「聞き捨てなりませんわ！？　私が会長と早々に別れることになるとでも言いたいんですの！？」
line = "「聞き捨てなりませんわ！？　私が会長と早々に別れることになるとでも言いたいんですの！？」"

[[dialogue]]
speaker = "マハムート"
# 「だってあなた、超がつくくらいの世間知らずじゃない。おまけに人生初の彼氏……わけのわからないことをしまくるのが目に浮かぶわ」
line = "「だってあなた、超がつくくらいの世間知らずじゃない。おまけに人生初の彼氏……わけのわからないことをしまくるのが目に浮かぶわ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ムキー！？」
line = "「ムキー！？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# （でも……マムの言う通りかもしれませんわ。私、お世辞にも恋愛強者ではありませんし……ここは恥を忍んで……！）
line = "（でも……マムの言う通りかもしれませんわ。私、お世辞にも恋愛強者ではありませんし……ここは恥を忍んで……！）"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「そ、その……マム？　もしもの時、相談に乗ってもらうことって可能でして……？」
line = "「そ、その……マム？　もしもの時、相談に乗ってもらうことって可能でして……？」"

[[dialogue]]
speaker = "マハムート"
# 「あら、いつになく弱気なのね？」
line = "「あら、いつになく弱気なのね？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「本来ならライバルのあなたにこんなことは言いたくありませんが……今回だけは別ですわ！」
line = "「本来ならライバルのあなたにこんなことは言いたくありませんが……今回だけは別ですわ！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「どうしても会長に嫌われたくないのです。この交際を上手く続けるためならば、下げたくない頭だって下げましてよ！」
line = "「どうしても会長に嫌われたくないのです。この交際を上手く続けるためならば、下げたくない頭だって下げましてよ！」"

[[dialogue]]
speaker = "マハムート"
# 「はあ……仕方ないわね。暇だったら話くらいは聞いてあげるわよ」
line = "「はあ……仕方ないわね。暇だったら話くらいは聞いてあげるわよ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「感謝いたしますわ！　でも……自分で何もせずに助けを求めたりするつもりはありません！」
line = "「感謝いたしますわ！　でも……自分で何もせずに助けを求めたりするつもりはありません！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「まずは私の知識を増やさねば……！　こんな時こそ普段は使わないインターネット！　ＤＩＳＣで情報収集ですわ！」
line = "「まずは私の知識を増やさねば……！　こんな時こそ普段は使わないインターネット！　ＤＩＳＣで情報収集ですわ！」"

[[dialogue]]
speaker = "マハムート"
# 「……おかしな記事に影響を受けなければいいのだけど」
line = "「……おかしな記事に影響を受けなければいいのだけど」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「こ、ここが緋宮会長のお宅なのですか……緊張いたしますわ……！」
line = "「こ、ここが緋宮会長のお宅なのですか……緊張いたしますわ……！」"

[[dialogue]]
speaker = "unk"
# お茶を淹れてきますね
line = "お茶を淹れてきますね"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「お、お構いなく……おほほ♪」
line = "「お、お構いなく……おほほ♪」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ここでしばらくくつろいでから、そのあとは会長と街へ出かける……初めてのデート！　しかも私が今いるのは、彼氏のお家！」
line = "「ここでしばらくくつろいでから、そのあとは会長と街へ出かける……初めてのデート！　しかも私が今いるのは、彼氏のお家！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「彼氏のお家に来たカノジョは何をするべきなのか……早速インターネットで検索ですわ！」
line = "「彼氏のお家に来たカノジョは何をするべきなのか……早速インターネットで検索ですわ！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「なになに……『こっそりエッチな本の捜索をしてみよう♪』……はぇ？　ほ、本当ですのっ？」
line = "「なになに……『こっそりエッチな本の捜索をしてみよう♪』……はぇ？　ほ、本当ですのっ？」"

[[dialogue]]
speaker = "ヒルディオーネ"
