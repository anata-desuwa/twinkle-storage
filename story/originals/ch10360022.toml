[[dialogue]]
speaker = "マハムート"
# 『……いきなり何を言ってるの？　頭は大丈夫？　忙しいから切るわよ』
line = "『……いきなり何を言ってるの？　頭は大丈夫？　忙しいから切るわよ』"

