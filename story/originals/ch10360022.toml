line = "「どんなに過激な性癖の本が出てきても笑顔で許しますわよ！　ゴソゴソ……ゴソゴソ……こ、これは──！？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「まずいですわ──マムに電話です！　相談しましょう！！」
line = "「まずいですわ──マムに電話です！　相談しましょう！！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「マム、大変ですわ！　会長のベッドの下に、エッチな本がありませんの！！」
