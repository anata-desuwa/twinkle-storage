[[dialogue]]
speaker = "unk"
# 第９話,氷雪の姉妹,B
line = "第９話,氷雪の姉妹,B"

[[dialogue]]
speaker = "unk"
# さらに一方──
line = "さらに一方──"

[[dialogue]]
speaker = "モンスター"
# 「イイイイイィィ……！！」
line = "「イイイイイィィ……！！」"

[[dialogue]]
speaker = "ソフィア"
# 「──ふっ！　とっ──やっ！」
line = "「──ふっ！　とっ──やっ！」"

[[dialogue]]
speaker = "モンスター"
# 「イイイィィィ……！？」
line = "「イイイィィィ……！？」"

[[dialogue]]
speaker = "unk"
# 氷上の妖精が舞っていた。
line = "氷上の妖精が舞っていた。"

[[dialogue]]
speaker = "unk"
# 彼女の描いた剣とステップの軌跡には、粉雪の刃が滞空して迫るモンスターを切りつける。
line = "彼女の描いた剣とステップの軌跡には、粉雪の刃が滞空して迫るモンスターを切りつける。"

[[dialogue]]
speaker = "ソフィア"
# （避ける──守る──斬る。常に冷静に、辺りを見回して）
line = "（避ける──守る──斬る。常に冷静に、辺りを見回して）"

[[dialogue]]
speaker = "モンスター"
# 「イイイイ～～～ッ！！」
line = "「イイイイ～～～ッ！！」"

[[dialogue]]
speaker = "unk"
# 全身に纏う氷のヴェールは障壁の役割を持ちながら、接近する相手に強烈な冷気を浴びせて機動力を奪う。
line = "全身に纏う氷のヴェールは障壁の役割を持ちながら、接近する相手に強烈な冷気を浴びせて機動力を奪う。"

[[dialogue]]
speaker = "unk"
# かたやソフィアの俊敏な動きはとらえどころなく、徹底したヒットアンドアウェイによって一帯の敵が殲滅された。
line = "かたやソフィアの俊敏な動きはとらえどころなく、徹底したヒットアンドアウェイによって一帯の敵が殲滅された。"

[[dialogue]]
speaker = "ソフィア"
# 「ふぅ、ふぅ……こんなところでしょうか。確かに通常の個体より手強いようです」
line = "「ふぅ、ふぅ……こんなところでしょうか。確かに通常の個体より手強いようです」"

[[dialogue]]
speaker = "unk"
# 舞いが終わる。
line = "舞いが終わる。"

[[dialogue]]
speaker = "unk"
# 常に懐へ切り込み、撹乱と陽動と攻撃を絶え間なく繰り返すソフィアの戦闘スタイルは多大なスタミナを要求する。
line = "常に懐へ切り込み、撹乱と陽動と攻撃を絶え間なく繰り返すソフィアの戦闘スタイルは多大なスタミナを要求する。"

[[dialogue]]
speaker = "unk"
# そこへ……
line = "そこへ……"

[[dialogue]]
speaker = "モンスター"
# 「イイイイイィィ……！！」
line = "「イイイイイィィ……！！」"

[[dialogue]]
speaker = "ソフィア"
# 「！」
line = "「！」"

[[dialogue]]
speaker = "unk"
# 一匹。氷漬けからよみがえったモンスターが彼女の背後をついた。
line = "一匹。氷漬けからよみがえったモンスターが彼女の背後をついた。"

[[dialogue]]
speaker = "ソフィア"
# （冷気が、足りなかった──！？）
line = "（冷気が、足りなかった──！？）"

[[dialogue]]
speaker = "unk"
# 焦るなと自分に言い聞かせるソフィア。
line = "焦るなと自分に言い聞かせるソフィア。"

[[dialogue]]
speaker = "unk"
# それなら冷静に、さらなる氷術を浴びせればいいだけだと──
line = "それなら冷静に、さらなる氷術を浴びせればいいだけだと──"

[[dialogue]]
speaker = "サーシャ"
# 「フローズンインパクト」
line = "「フローズンインパクト」"

[[dialogue]]
speaker = "モンスター"
# 「イイイィィィ……！！」
line = "「イイイィィィ……！！」"

[[dialogue]]
speaker = "ソフィア"
# 「──あ……」
line = "「──あ……」"

[[dialogue]]
speaker = "unk"
# ソフィアが次の踏み込みに移るまでもなく。
line = "ソフィアが次の踏み込みに移るまでもなく。"

[[dialogue]]
speaker = "unk"
# 背後から飛来した絶対零度の斬撃が、モンスターの頭部を儚く刈り取った。
line = "背後から飛来した絶対零度の斬撃が、モンスターの頭部を儚く刈り取った。"

[[dialogue]]
speaker = "サーシャ"
# 「──強くなったわね、ソフィ」
line = "「──強くなったわね、ソフィ」"

[[dialogue]]
speaker = "ソフィア"
# 「……別に。姉さんの知っている頃の私じゃありませんから」
line = "「……別に。姉さんの知っている頃の私じゃありませんから」"

[[dialogue]]
speaker = "unk"
# 攻撃の主──サーシャが大鎌を背負い降り立つ。
line = "攻撃の主──サーシャが大鎌を背負い降り立つ。"

[[dialogue]]
speaker = "unk"
# これで彼女たちの周りには、氷漬けになった屍が転がるのみとなっていた。
line = "これで彼女たちの周りには、氷漬けになった屍が転がるのみとなっていた。"

[[dialogue]]
speaker = "ソフィア"
# 「今のだって……私だけでもやれましたから。ただ、ちょっと休憩してただけで」
line = "「今のだって……私だけでもやれましたから。ただ、ちょっと休憩してただけで」"

[[dialogue]]
speaker = "サーシャ"
# 「ふふふ。ソフィが冷やしておいてくれたから、一撃で倒すことができたのよ。えらいえらい」
line = "「ふふふ。ソフィが冷やしておいてくれたから、一撃で倒すことができたのよ。えらいえらい」"

[[dialogue]]
speaker = "ソフィア"
# 「あ……頭を撫でないでください！　私ももう子どもじゃないんです！」
line = "「あ……頭を撫でないでください！　私ももう子どもじゃないんです！」"

[[dialogue]]
speaker = "unk"
# 可愛がるサーシャの右手から、顔を真っ赤にして逃れるソフィア。
line = "可愛がるサーシャの右手から、顔を真っ赤にして逃れるソフィア。"

[[dialogue]]
speaker = "unk"
# 先ほどまでの冷徹な立ち回りとは似ても似つかぬ動揺を見せていた。
line = "先ほどまでの冷徹な立ち回りとは似ても似つかぬ動揺を見せていた。"

[[dialogue]]
speaker = "サーシャ"
# 「流星に進学したのは聞いていたけれど……まさか星徒会に入ってるなんて思わなかったわ。ふふ、お揃いね」
line = "「流星に進学したのは聞いていたけれど……まさか星徒会に入ってるなんて思わなかったわ。ふふ、お揃いね」"

[[dialogue]]
speaker = "ソフィア"
# 「べ……別に姉さんの真似をしたわけじゃありません。憧れの人がいたから、入ったんです」
line = "「べ……別に姉さんの真似をしたわけじゃありません。憧れの人がいたから、入ったんです」"

[[dialogue]]
speaker = "サーシャ"
# 「へえ……」
line = "「へえ……」"

[[dialogue]]
speaker = "unk"
# 強がるソフィアを見て、サーシャは心の中で微笑む。
line = "強がるソフィアを見て、サーシャは心の中で微笑む。"

[[dialogue]]
speaker = "サーシャ"
# 「流星のみんなには良くしてもらってる？」
line = "「流星のみんなには良くしてもらってる？」"

[[dialogue]]
speaker = "ソフィア"
# 「……はい。少々、皆さん不真面目なところがありますが……その分フィオナ会長がいるので」
line = "「……はい。少々、皆さん不真面目なところがありますが……その分フィオナ会長がいるので」"

[[dialogue]]
speaker = "サーシャ"
# 「そっか。それが、ソフィの憧れの人？」
line = "「そっか。それが、ソフィの憧れの人？」"

[[dialogue]]
speaker = "ソフィア"
# 「はい！　フィオナ会長は素晴らしい御仁です。私はあの人の偉大さに心打たれて、ああなりたいって思ったんです！」
line = "「はい！　フィオナ会長は素晴らしい御仁です。私はあの人の偉大さに心打たれて、ああなりたいって思ったんです！」"

[[dialogue]]
speaker = "サーシャ"
# 「ふふふ。私はまだ会ったことないけど……ソフィがそう言うなら、きっと素敵な子なんでしょうね」
line = "「ふふふ。私はまだ会ったことないけど……ソフィがそう言うなら、きっと素敵な子なんでしょうね」"

[[dialogue]]
speaker = "unk"
# 屈託なく笑うソフィアを見て、サーシャもまた朗らかに微笑む。
line = "屈託なく笑うソフィアを見て、サーシャもまた朗らかに微笑む。"

[[dialogue]]
speaker = "unk"
# 離れた妹がこうして健やかに育っているなら心配は要らないか──と。
line = "離れた妹がこうして健やかに育っているなら心配は要らないか──と。"

[[dialogue]]
speaker = "ソフィア"
# （でも……ちょっとくらい嫉妬してくれてもいいですけど……）
line = "（でも……ちょっとくらい嫉妬してくれてもいいですけど……）"

[[dialogue]]
speaker = "サーシャ"
# 「ソフィ？」
line = "「ソフィ？」"

[[dialogue]]
speaker = "ソフィア"
# 「なんでもありませんっ」
line = "「なんでもありませんっ」"

[[dialogue]]
speaker = "unk"
# こうしている間も、二人は湧き出るモンスターたちの討伐を背中合わせで続けていた。
line = "こうしている間も、二人は湧き出るモンスターたちの討伐を背中合わせで続けていた。"

[[dialogue]]
speaker = "unk"
# それでも世間話に興じていられるのは、戦闘における呼吸が言語不要なほど合致していたからである。
line = "それでも世間話に興じていられるのは、戦闘における呼吸が言語不要なほど合致していたからである。"

[[dialogue]]
speaker = "ソフィア"
# 「それより……姉さんは、どうなんですか？　会長職を退いて、今は会計に就いたみたいですけど……」
line = "「それより……姉さんは、どうなんですか？　会長職を退いて、今は会計に就いたみたいですけど……」"

[[dialogue]]
speaker = "サーシャ"
# 「あら、よく知ってるのね」
line = "「あら、よく知ってるのね」"

[[dialogue]]
speaker = "ソフィア"
# 「た──たまたまです！　敵情視察です！」
line = "「た──たまたまです！　敵情視察です！」"

[[dialogue]]
speaker = "unk"
# 敵じゃないでしょう、とたしなめながらサーシャは笑った。
line = "敵じゃないでしょう、とたしなめながらサーシャは笑った。"

[[dialogue]]
speaker = "サーシャ"
# 「そうね──私も毎日楽しいわ。最近はクロトくんっていう可愛い後輩も入ってきたし……なんて、自分たちの会長に言っちゃいけないわね」
line = "「そうね──私も毎日楽しいわ。最近はクロトくんっていう可愛い後輩も入ってきたし……なんて、自分たちの会長に言っちゃいけないわね」"

[[dialogue]]
speaker = "ソフィア"
# 「……むむぅ」
line = "「……むむぅ」"

[[dialogue]]
speaker = "ソフィア"
# 「な、なら姉さんは……私のことはどう思っているんですか」
line = "「な、なら姉さんは……私のことはどう思っているんですか」"

[[dialogue]]
speaker = "サーシャ"
# 「どうって……」
line = "「どうって……」"

[[dialogue]]
speaker = "unk"
# ソフィアにサーシャ。奏姉妹は共に魔界の出身である。
line = "ソフィアにサーシャ。奏姉妹は共に魔界の出身である。"

[[dialogue]]
speaker = "unk"
# 一般の魔族が人間界へ留学するのは困難を極めることだったが、二人は共にその高いハードルを超えた。
line = "一般の魔族が人間界へ留学するのは困難を極めることだったが、二人は共にその高いハードルを超えた。"

[[dialogue]]
speaker = "unk"
# その上で、姉離れのため距離を取ろうとする自分を、一体どう思っているのかソフィアは問うている。
line = "その上で、姉離れのため距離を取ろうとする自分を、一体どう思っているのかソフィアは問うている。"

[[dialogue]]
speaker = "サーシャ"
# 「そうね──ソフィは私にとって、世界で唯一の、とっても可愛い妹よ」
line = "「そうね──ソフィは私にとって、世界で唯一の、とっても可愛い妹よ」"

[[dialogue]]
speaker = "サーシャ"
# 「たとえ……どんなに離れていてもね」
line = "「たとえ……どんなに離れていてもね」"

[[dialogue]]
speaker = "ソフィア"
# 「あ……」
line = "「あ……」"

[[dialogue]]
speaker = "unk"
# サーシャが先んじて留学した時。
line = "サーシャが先んじて留学した時。"

[[dialogue]]
speaker = "unk"
# ソフィアは、慕っていた姉から離れざるをえなくなった。
line = "ソフィアは、慕っていた姉から離れざるをえなくなった。"

[[dialogue]]
speaker = "unk"
# それから彼女も成長し、人間界へ来て、フィオナと出会い、今のソフィアが形成されたわけであるが……
line = "それから彼女も成長し、人間界へ来て、フィオナと出会い、今のソフィアが形成されたわけであるが……"

[[dialogue]]
speaker = "unk"
# たとえ距離が縮まろうと遠ざかろうと、二人の関係に何も変わりはないとサーシャは言う。
line = "たとえ距離が縮まろうと遠ざかろうと、二人の関係に何も変わりはないとサーシャは言う。"

[[dialogue]]
speaker = "サーシャ"
# 「ホントなら抱きしめてナデナデしてほっぺすりすりまでしてあげたいところなのだけど……なんか嫌われちゃいそうだし」
line = "「ホントなら抱きしめてナデナデしてほっぺすりすりまでしてあげたいところなのだけど……なんか嫌われちゃいそうだし」"

[[dialogue]]
speaker = "ソフィア"
# 「そ、それが嫌だから流星にきたんですっ。やらなくて正解ですっ」
line = "「そ、それが嫌だから流星にきたんですっ。やらなくて正解ですっ」"

[[dialogue]]
speaker = "サーシャ"
# 「ふふふ。なら、また許してくれる日を待っているわ」
line = "「ふふふ。なら、また許してくれる日を待っているわ」"

[[dialogue]]
speaker = "unk"
# ソフィアの氷剣が舞い、サーシャの氷鎌が走った。
line = "ソフィアの氷剣が舞い、サーシャの氷鎌が走った。"

[[dialogue]]
speaker = "unk"
# 出没していたモンスターの大半を狩り尽くすと、残るは大型の一頭のみとなっていた。
line = "出没していたモンスターの大半を狩り尽くすと、残るは大型の一頭のみとなっていた。"

[[dialogue]]
speaker = "モンスター"
# 「ウィイイイイイ！！」
line = "「ウィイイイイイ！！」"

[[dialogue]]
speaker = "ソフィア"
# 「ちょっと手強そうですね」
line = "「ちょっと手強そうですね」"

[[dialogue]]
speaker = "サーシャ"
# 「ええ。でも、最後は一緒に力を合わせれば──」
line = "「ええ。でも、最後は一緒に力を合わせれば──」"

[[dialogue]]
speaker = "unk"
# と、姉妹が同じ方向を見据えたその時。
line = "と、姉妹が同じ方向を見据えたその時。"

[[dialogue]]
speaker = "モンスター"
# 「イイイイ──ッ！」
line = "「イイイイ──ッ！」"

[[dialogue]]
speaker = "ソフィア"
# 「！？」
line = "「！？」"

[[dialogue]]
speaker = "unk"
# 繁華街から射出された業炎の矢が通り過ぎ、残る最後の一匹を消し炭に変えた。
line = "繁華街から射出された業炎の矢が通り過ぎ、残る最後の一匹を消し炭に変えた。"

[[dialogue]]
speaker = "ソフィア"
# 「な……なんですか今の……」
line = "「な……なんですか今の……」"

[[dialogue]]
speaker = "サーシャ"
# 「アナちゃんの本気ね。ふふ、いい相方を見つけられたみたい」
line = "「アナちゃんの本気ね。ふふ、いい相方を見つけられたみたい」"

[[dialogue]]
speaker = "unk"
# にこやかに笑うサーシャを、ソフィアはやや気難しそうな顔で見つめた。
line = "にこやかに笑うサーシャを、ソフィアはやや気難しそうな顔で見つめた。"

[[dialogue]]
speaker = "ソフィア"
# （ほら、結局私以外でも……）
line = "（ほら、結局私以外でも……）"

[[dialogue]]
speaker = "サーシャ"
# 「？」
line = "「？」"

[[dialogue]]
speaker = "unk"
# 姉妹の心は近いようで遠く、遠いようで近く。
line = "姉妹の心は近いようで遠く、遠いようで近く。"

[[dialogue]]
speaker = "unk"
# 交わした言葉はさほど多くなかったものの、その共闘は２人にとって意味のある時間となった。
line = "交わした言葉はさほど多くなかったものの、その共闘は２人にとって意味のある時間となった。"
