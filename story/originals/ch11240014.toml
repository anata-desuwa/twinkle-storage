[[dialogue]]
speaker = "unk"
# 第４話,俺たち『らしい』お家デート,P
line = "第４話,俺たち『らしい』お家デート,P"

[[dialogue]]
speaker = "unk"
# 環は見た目通りのアクティブな女の子で、体を動かす遊びを好む。
line = "環は見た目通りのアクティブな女の子で、体を動かす遊びを好む。"

[[dialogue]]
speaker = "unk"
# ゲームセンターのダンスゲームとか、バッティングセンターなんかに誘うと喜んでついて来てくれる──が。
line = "ゲームセンターのダンスゲームとか、バッティングセンターなんかに誘うと喜んでついて来てくれる──が。"

[[dialogue]]
speaker = "unk"
# 彼女の趣味の１つに、映画鑑賞がある。自宅でまったり過ごすのも好きなことを知っているのは、恋人の特権かもしれない。
line = "彼女の趣味の１つに、映画鑑賞がある。自宅でまったり過ごすのも好きなことを知っているのは、恋人の特権かもしれない。"

[[dialogue]]
speaker = "ラクシャ"
# 「とうとうあの監督の新作が観られるだなんて嬉しいなあ。公開してた時、ちょうど会長たちとバタバタしてたから見逃してたんだ」
line = "「とうとうあの監督の新作が観られるだなんて嬉しいなあ。公開してた時、ちょうど会長たちとバタバタしてたから見逃してたんだ」"

[[dialogue]]
speaker = "ラクシャ"
# 「あれ、覚えてない？　一緒に映画館で見たじゃん。主人公が、矢を何本も同時に撃つやつ」
line = "「あれ、覚えてない？　一緒に映画館で見たじゃん。主人公が、矢を何本も同時に撃つやつ」"

[[dialogue]]
speaker = "unk"
# ミュージカルシーンもあるやつだっけ
line = "ミュージカルシーンもあるやつだっけ"

[[dialogue]]
speaker = "ラクシャ"
# 「そうそう！　クライマックスの人間砲弾のシーン、めちゃくちゃ面白かったでしょ！」
line = "「そうそう！　クライマックスの人間砲弾のシーン、めちゃくちゃ面白かったでしょ！」"

[[dialogue]]
speaker = "ラクシャ"
# 「今日観るのは、同じ監督のやつだよ。すっごい楽しみ！　会長、準備はいい？」
line = "「今日観るのは、同じ監督のやつだよ。すっごい楽しみ！　会長、準備はいい？」"

[[dialogue]]
speaker = "unk"
# ポップコーンとコーラはここに！
line = "ポップコーンとコーラはここに！"

[[dialogue]]
speaker = "ラクシャ"
# 「オッケー、それじゃ、上映開始～♪」
line = "「オッケー、それじゃ、上映開始～♪」"

[[dialogue]]
speaker = "ラクシャ"
# 「……最高だった」
line = "「……最高だった」"

[[dialogue]]
speaker = "unk"
# 神映画だ。間違いなく
line = "神映画だ。間違いなく"

[[dialogue]]
speaker = "ラクシャ"
# 「うん。主人公たち２人が肩車しながら敵を殲滅するシーン、あまりに完璧すぎない？」
line = "「うん。主人公たち２人が肩車しながら敵を殲滅するシーン、あまりに完璧すぎない？」"

[[dialogue]]
speaker = "ラクシャ"
# 「バイクと馬で疾走するシーンもカッコよかったなあ……ボクも免許取ろうかな……！」
line = "「バイクと馬で疾走するシーンもカッコよかったなあ……ボクも免許取ろうかな……！」"

[[dialogue]]
speaker = "unk"
# 俺も興味があるな
line = "俺も興味があるな"

[[dialogue]]
speaker = "ラクシャ"
# 「２人でツーリングとかも楽しいかもね！　やりたいことリストに入れとこっと」
line = "「２人でツーリングとかも楽しいかもね！　やりたいことリストに入れとこっと」"

[[dialogue]]
speaker = "ラクシャ"
# 「あー、楽しかった。でも長いこと観てたからお腹空いたね。どっかに食べに行く？」
line = "「あー、楽しかった。でも長いこと観てたからお腹空いたね。どっかに食べに行く？」"

[[dialogue]]
speaker = "unk"
# せっかくだしピザでも取ろうか
line = "せっかくだしピザでも取ろうか"

[[dialogue]]
speaker = "ラクシャ"
# 「──ナイスアイデア。それ採用！　早速ＤＩＳＣで注文っと……」
line = "「──ナイスアイデア。それ採用！　早速ＤＩＳＣで注文っと……」"

[[dialogue]]
speaker = "ラクシャ"
# 「あ、今日は月末近くだから、セールやってる。懐かしいな」
line = "「あ、今日は月末近くだから、セールやってる。懐かしいな」"

[[dialogue]]
speaker = "ラクシャ"
# 「昔ここでもバイトしてたよね。月末はいっつもバタバタして……大変だったけど楽しかったよねー」
line = "「昔ここでもバイトしてたよね。月末はいっつもバタバタして……大変だったけど楽しかったよねー」"

[[dialogue]]
speaker = "unk"
# そうしてピザの注文を終えて……
line = "そうしてピザの注文を終えて……"

[[dialogue]]
speaker = "ラクシャ"
# 「よし！　後は待つだけ──ってことで♪」
line = "「よし！　後は待つだけ──ってことで♪」"

[[dialogue]]
speaker = "ラクシャ"
# 「イチャイチャしよーぜ、会長っ♪」
line = "「イチャイチャしよーぜ、会長っ♪」"

[[dialogue]]
speaker = "ラクシャ"
# 「えー、いいじゃん。にんにくたっぷりジェノベーゼピザを食べた後だとキスできないじゃん。今しよ？」
line = "「えー、いいじゃん。にんにくたっぷりジェノベーゼピザを食べた後だとキスできないじゃん。今しよ？」"

[[dialogue]]
speaker = "unk"
# 俺は気にしないけど
line = "俺は気にしないけど"

[[dialogue]]
speaker = "ラクシャ"
# 「ボクが気にするの！　キミってさぁ、女心をわからないよねホントに」
line = "「ボクが気にするの！　キミってさぁ、女心をわからないよねホントに」"

[[dialogue]]
speaker = "ラクシャ"
# 「ん……ちゅ<emoji=heart04>　へへ、ほら、もっとギューってしてよ……ねっ<emoji=heart04>」
line = "「ん……ちゅ<emoji=heart04>　へへ、ほら、もっとギューってしてよ……ねっ<emoji=heart04>」"

[[dialogue]]
speaker = "ラクシャ"
# 「んちゅ……ぷぁ<emoji=heart04>　会長、インターフォン鳴ってる……早く行かなきゃ……」
line = "「んちゅ……ぷぁ<emoji=heart04>　会長、インターフォン鳴ってる……早く行かなきゃ……」"

[[dialogue]]
speaker = "unk"
# もう少しだけ……
line = "もう少しだけ……"

[[dialogue]]
speaker = "ラクシャ"
# 「だーめ。待たせちゃ悪いじゃん……また後でね？」
line = "「だーめ。待たせちゃ悪いじゃん……また後でね？」"

[[dialogue]]
speaker = "青年"
# 「ちわー、流星ピザでーす」
line = "「ちわー、流星ピザでーす」"

[[dialogue]]
speaker = "ラクシャ"
# 「待ってました～……って！？」
line = "「待ってました～……って！？」"

[[dialogue]]
speaker = "青年"
# 「あれ、市倉じゃん！？　それに──リ、リーダー！？」
line = "「あれ、市倉じゃん！？　それに──リ、リーダー！？」"

[[dialogue]]
speaker = "unk"
# 君はまだここでバイトしてたんだな
line = "君はまだここでバイトしてたんだな"

[[dialogue]]
speaker = "unk"
# リーダーは昔の話だよ
line = "リーダーは昔の話だよ"

[[dialogue]]
speaker = "ラクシャ"
# 「世間は狭いね～。宅配お疲れ様！」
line = "「世間は狭いね～。宅配お疲れ様！」"

[[dialogue]]
speaker = "青年"
# 「あれ……もしかして２人って……」
line = "「あれ……もしかして２人って……」"

[[dialogue]]
speaker = "ラクシャ"
# 「……あー、うん。付き合ってるんだ、ボクら」
line = "「……あー、うん。付き合ってるんだ、ボクら」"

[[dialogue]]
speaker = "青年"
# 「そうなのか……仲良かったもんなぁ、２人とも！　自分のことのように嬉しいよ！」
line = "「そうなのか……仲良かったもんなぁ、２人とも！　自分のことのように嬉しいよ！」"

[[dialogue]]
speaker = "ラクシャ"
# 「忙しいのに頼んじゃってごめんねー。みんな元気にしてる？」
line = "「忙しいのに頼んじゃってごめんねー。みんな元気にしてる？」"

[[dialogue]]
speaker = "青年"
# 「…………う、うぅ……！！」
line = "「…………う、うぅ……！！」"

[[dialogue]]
speaker = "ラクシャ"
# 「……どうしたの？」
line = "「……どうしたの？」"

[[dialogue]]
speaker = "青年"
# 「あの時のメンバーは、もういないんだ……生き残ったのは俺だけ……」
line = "「あの時のメンバーは、もういないんだ……生き残ったのは俺だけ……」"

[[dialogue]]
speaker = "ラクシャ"
# 「なん──だって！？」
line = "「なん──だって！？」"

[[dialogue]]
speaker = "青年"
# 「リーダーが辞めて……市倉も辞めた後……新しく来た店長がひどい奴でさ……もう俺しか……」
line = "「リーダーが辞めて……市倉も辞めた後……新しく来た店長がひどい奴でさ……もう俺しか……」"

[[dialogue]]
speaker = "青年"
# 「今日もてんてこ舞いで、届け先で遅いって怒鳴られて……小銭も投げられてさ……俺、もう辛くて……うぅうう……！」
line = "「今日もてんてこ舞いで、届け先で遅いって怒鳴られて……小銭も投げられてさ……俺、もう辛くて……うぅうう……！」"

[[dialogue]]
speaker = "ラクシャ"
# 「そんな……なんてひどい……」
line = "「そんな……なんてひどい……」"

[[dialogue]]
speaker = "青年"
# 「──頼む！　今日だけでいいんだ、臨時で手伝ってくれないか！？　デート中に悪いとは思う……だけどもう、頼れるのは市倉たちしか……！」
line = "「──頼む！　今日だけでいいんだ、臨時で手伝ってくれないか！？　デート中に悪いとは思う……だけどもう、頼れるのは市倉たちしか……！」"

[[dialogue]]
speaker = "unk"
# …………環
line = "…………環"

[[dialogue]]
speaker = "ラクシャ"
# 「──うん。かつての仲間を見捨てちゃ、天使がすたるってもんだよ」
line = "「──うん。かつての仲間を見捨てちゃ、天使がすたるってもんだよ」"

[[dialogue]]
speaker = "ラクシャ"
# 「ピザは後で温め直せばいいや。よーし、天使環ちゃんとバイト魔王が助けてあげよう！　ほら、泣かないで！　行くよっ！」
line = "「ピザは後で温め直せばいいや。よーし、天使環ちゃんとバイト魔王が助けてあげよう！　ほら、泣かないで！　行くよっ！」"

[[dialogue]]
speaker = "unk"
# 家デートはおかしな締めになっちゃったけど……こういうアクシデントも、バイト漬けだった俺たちには『らしい』のかもしれない。
line = "家デートはおかしな締めになっちゃったけど……こういうアクシデントも、バイト漬けだった俺たちには『らしい』のかもしれない。"

[[dialogue]]
speaker = "unk"
# こうして俺と環は、古巣のピザ屋で久しぶりに、かつてのコンビネーションを発揮するのだった──
line = "こうして俺と環は、古巣のピザ屋で久しぶりに、かつてのコンビネーションを発揮するのだった──"
