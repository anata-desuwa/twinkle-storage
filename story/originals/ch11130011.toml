[[dialogue]]
speaker = "unk"
# 第１話,元星徒会長ジグ,P
line = "第１話,元星徒会長ジグ,P"

[[dialogue]]
speaker = "unk"
# かつて流星市国や天界で対峙したリクリエの使徒・ジグ。
line = "かつて流星市国や天界で対峙したリクリエの使徒・ジグ。"

[[dialogue]]
speaker = "unk"
# 彼女は梨緒の手によって正気を取り戻し、共にリクリエと戦う仲間となった。
line = "彼女は梨緒の手によって正気を取り戻し、共にリクリエと戦う仲間となった。"

[[dialogue]]
speaker = "unk"
# 今日はジグが星徒会室を訪れる日だ。
line = "今日はジグが星徒会室を訪れる日だ。"

[[dialogue]]
speaker = "unk"
# ジグを迎える用意をすべく、星徒会室の扉を開けると──
line = "ジグを迎える用意をすべく、星徒会室の扉を開けると──"

[[dialogue]]
speaker = "ジグ"
# 「やぁ、いらっしゃい。コーヒー、淹れさせてもらったよ」
line = "「やぁ、いらっしゃい。コーヒー、淹れさせてもらったよ」"

[[dialogue]]
speaker = "unk"
# もういる！？
line = "もういる！？"

[[dialogue]]
speaker = "ジグ"
# 「私も<ruby=ここ>新星学園</ruby>の星徒会長だったからね。勝手知ったるというやつさ」
line = "「私も<ruby>新星学園<rt>ここ</rt></ruby>の星徒会長だったからね。勝手知ったるというやつさ」"

[[dialogue]]
speaker = "ジグ"
# 「魔王もコーヒーどうぞ。コーヒーに合うバウムクーヘンも持ってきたからね」
line = "「魔王もコーヒーどうぞ。コーヒーに合うバウムクーヘンも持ってきたからね」"

[[dialogue]]
speaker = "unk"
# これはどうもご丁寧に……
line = "これはどうもご丁寧に……"

[[dialogue]]
speaker = "unk"
# 俺が星徒会長で、ジグが来客のはずなのに、なぜかジグの方が星徒会長然としていた。
line = "俺が星徒会長で、ジグが来客のはずなのに、なぜかジグの方が星徒会長然としていた。"

[[dialogue]]
speaker = "梨緒"
# 「すまない、ジグを見ていないか？　一緒にここに来るはずだったんだが──」
line = "「すまない、ジグを見ていないか？　一緒にここに来るはずだったんだが──」"

[[dialogue]]
speaker = "梨緒"
# 「って、ジグ！？　どうしてここにいる！？」
line = "「って、ジグ！？　どうしてここにいる！？」"

[[dialogue]]
speaker = "ジグ"
# 「はは。待ち切れなくてね。つい先に来てしまったよ」
line = "「はは。待ち切れなくてね。つい先に来てしまったよ」"

[[dialogue]]
speaker = "梨緒"
# 「ジグ～っ！　相変わらず適当だな君は！」
line = "「ジグ～っ！　相変わらず適当だな君は！」"

[[dialogue]]
speaker = "ジグ"
# 「では改めて名乗らせてもらおう。私はレナーテ・<ruby=ジグ>Ｚ</ruby>・サイフリート。出身はドイツ。かつて平行世界ベガで、新星学園の星徒会長をしていた」
line = "「では改めて名乗らせてもらおう。私はレナーテ・<ruby>Ｚ<rt>ジグ</rt></ruby>・サイフリート。出身はドイツ。かつて平行世界ベガで、新星学園の星徒会長をしていた」"

[[dialogue]]
speaker = "ジグ"
# 「ファーストネームはレナーテだが、ジグの方が慣れているだろうし、ジグで構わないよ」
line = "「ファーストネームはレナーテだが、ジグの方が慣れているだろうし、ジグで構わないよ」"

[[dialogue]]
speaker = "ジグ"
# 「君たちも知っての通り、つい先日まで、私は“真なる神の騎士”を名乗り、リクリエの使徒として世界を破滅に導こうとしていた」
line = "「君たちも知っての通り、つい先日まで、私は“真なる神の騎士”を名乗り、リクリエの使徒として世界を破滅に導こうとしていた」"

[[dialogue]]
speaker = "ジグ"
# 「特に魔王は、私が暴走させてしまったこともあったね。あの時はたくさんの人を傷つけた」
line = "「特に魔王は、私が暴走させてしまったこともあったね。あの時はたくさんの人を傷つけた」"

[[dialogue]]
speaker = "ジグ"
# 「本当にすまない。全て私の不徳の致すところだ」
line = "「本当にすまない。全て私の不徳の致すところだ」"

[[dialogue]]
speaker = "unk"
# ジグのせいだと思ってないよ
line = "ジグのせいだと思ってないよ"

[[dialogue]]
speaker = "ジグ"
# 「ありがとう。そう言ってくれると助かるよ」
line = "「ありがとう。そう言ってくれると助かるよ」"

[[dialogue]]
speaker = "ジグ"
# 「ちなみにサイフリートという姓だが、これは邪竜ファフニールを倒した英雄ジークフリートの読み方の１つでもある」
line = "「ちなみにサイフリートという姓だが、これは邪竜ファフニールを倒した英雄ジークフリートの読み方の１つでもある」"

[[dialogue]]
speaker = "ジグ"
# 「その名の通り、私の家はジークフリートの血を引いているらしい」
line = "「その名の通り、私の家はジークフリートの血を引いているらしい」"

[[dialogue]]
speaker = "unk"
# 一族に伝わる能力があるって聞いたけど
line = "一族に伝わる能力があるって聞いたけど"

[[dialogue]]
speaker = "ジグ"
# 「ああ、そうだ。私の一族の中には、とある能力に目覚める者がいる。それが『天機の星眼』だ」
line = "「ああ、そうだ。私の一族の中には、とある能力に目覚める者がいる。それが『天機の星眼』だ」"

[[dialogue]]
speaker = "ジグ"
# 「私の眼は、人や物に秘められた才能や潜在能力──つまりは可能性を見ることができる」
line = "「私の眼は、人や物に秘められた才能や潜在能力──つまりは可能性を見ることができる」"

[[dialogue]]
speaker = "ジグ"
# 「この眼でコーヒー豆を見れば、一番美味しい淹れ方もわかるという寸法さ」
line = "「この眼でコーヒー豆を見れば、一番美味しい淹れ方もわかるという寸法さ」"

[[dialogue]]
speaker = "梨緒"
# 「その眼はそんな可能性まで見えるのか！？」
line = "「その眼はそんな可能性まで見えるのか！？」"

[[dialogue]]
speaker = "unk"
# けっこうチートな能力では？
line = "けっこうチートな能力では？"

[[dialogue]]
speaker = "ジグ"
# 「あくまで可能性を見ているだけさ。不可能が可能になるような能力じゃないよ」
line = "「あくまで可能性を見ているだけさ。不可能が可能になるような能力じゃないよ」"

[[dialogue]]
speaker = "ジグ"
# 「邪竜の血を浴びたジークフリートよりも、養父の裏切りを見抜いたシグルドらしい能力だが……まぁ細かいことは気にしないでくれ」
line = "「邪竜の血を浴びたジークフリートよりも、養父の裏切りを見抜いたシグルドらしい能力だが……まぁ細かいことは気にしないでくれ」"

[[dialogue]]
speaker = "unk"
# わかった
line = "わかった"

[[dialogue]]
speaker = "ジグ"
# 「これからはアルタイルの新星学園に所属し、星騎士として全身全霊をかけてリクリエと戦うよ」
line = "「これからはアルタイルの新星学園に所属し、星騎士として全身全霊をかけてリクリエと戦うよ」"

[[dialogue]]
speaker = "ジグ"
# 「これでもベガでは最強の星騎士と呼ばれていた身だ。それなりに頼りにしてくれ」
line = "「これでもベガでは最強の星騎士と呼ばれていた身だ。それなりに頼りにしてくれ」"

[[dialogue]]
speaker = "梨緒"
# 「待った。その言葉はそのまま受け取っていいものなのか？」
line = "「待った。その言葉はそのまま受け取っていいものなのか？」"

[[dialogue]]
speaker = "ジグ"
# 「ん？　どういう意味だい？」
line = "「ん？　どういう意味だい？」"

[[dialogue]]
speaker = "梨緒"
# 「元々君の言葉は本気かどうかわかりづらかったが、今のは特に白々しく聞こえた」
line = "「元々君の言葉は本気かどうかわかりづらかったが、今のは特に白々しく聞こえた」"

[[dialogue]]
speaker = "梨緒"
# 「思うことがあるなら正直に言ってくれ。彼はそれを話すに足る相手だと思う」
line = "「思うことがあるなら正直に言ってくれ。彼はそれを話すに足る相手だと思う」"

[[dialogue]]
speaker = "ジグ"
# 「……それもそうだね。ベガでは１人で抱え込んでしまったし」
line = "「……それもそうだね。ベガでは１人で抱え込んでしまったし」"

[[dialogue]]
speaker = "ジグ"
# 「正直に言うと、私は世界を守るための戦いというやつに疲れてしまったんだ」
line = "「正直に言うと、私は世界を守るための戦いというやつに疲れてしまったんだ」"

[[dialogue]]
speaker = "ジグ"
# 「私はこの眼で、ベガの滅びの『<ruby=みらい>可能性</ruby>』を幾度も見た。運命を変えようと努力したが、できなかった」
line = "「私はこの眼で、ベガの滅びの『<ruby>可能性<rt>みらい</rt></ruby>』を幾度も見た。運命を変えようと努力したが、できなかった」"

[[dialogue]]
speaker = "ジグ"
# 「滅びの『<ruby=みらい>可能性</ruby>』を見る度、他の『<ruby=みらい>可能性</ruby>』を見ようとして、また滅びに突き当たった。結果として、数えきれない数の破滅を疑似的に体験してしまった」
line = "「滅びの『<ruby>可能性<rt>みらい</rt></ruby>』を見る度、他の『<ruby>可能性<rt>みらい</rt></ruby>』を見ようとして、また滅びに突き当たった。結果として、数えきれない数の破滅を疑似的に体験してしまった」"

[[dialogue]]
speaker = "ジグ"
# 「だから、私の精神は大きく疲弊している。一度折れた心はそう簡単には元には戻らない」
line = "「だから、私の精神は大きく疲弊している。一度折れた心はそう簡単には元には戻らない」"

[[dialogue]]
speaker = "ジグ"
# 「使徒にされた分、償わなければと思うし、私を操っていたリクリエに復讐したいとも思っているが……それが本音だ」
line = "「使徒にされた分、償わなければと思うし、私を操っていたリクリエに復讐したいとも思っているが……それが本音だ」"

[[dialogue]]
speaker = "ジグ"
# 「もちろん戦いで手を抜くつもりはないけれど、疲れた私なりの本気になってしまうと思う」
line = "「もちろん戦いで手を抜くつもりはないけれど、疲れた私なりの本気になってしまうと思う」"

[[dialogue]]
speaker = "unk"
# 本音を言ってくれてありがとう
line = "本音を言ってくれてありがとう"

[[dialogue]]
speaker = "ジグ"
# 「そうやって受け入れられると、安心するような、余計に居心地が悪いような……複雑な気分だよ」
line = "「そうやって受け入れられると、安心するような、余計に居心地が悪いような……複雑な気分だよ」"

[[dialogue]]
speaker = "梨緒"
# 「なら休め。無理に戦うな」
line = "「なら休め。無理に戦うな」"

[[dialogue]]
speaker = "梨緒"
# 「少なくとも、アルタイルはベガよりも切迫した状況ではない。魔王やフィオナ、アポロがいる」
line = "「少なくとも、アルタイルはベガよりも切迫した状況ではない。魔王やフィオナ、アポロがいる」"

[[dialogue]]
speaker = "梨緒"
# 「もし誰かが、君が使徒だった頃の贖罪を求めるなら、私が代わりに戦う。だから君は君のペースで戦えるようになればいい」
line = "「もし誰かが、君が使徒だった頃の贖罪を求めるなら、私が代わりに戦う。だから君は君のペースで戦えるようになればいい」"

[[dialogue]]
speaker = "unk"
# 俺もそう思うよ
line = "俺もそう思うよ"

[[dialogue]]
speaker = "ジグ"
# 「……そうだね。焦る必要はないのかもしれない」
line = "「……そうだね。焦る必要はないのかもしれない」"

[[dialogue]]
speaker = "ジグ"
# 「ありがとう、２人とも。お言葉に甘えて、しばし羽を休めさせてもらうよ」
line = "「ありがとう、２人とも。お言葉に甘えて、しばし羽を休めさせてもらうよ」"

[[dialogue]]
speaker = "ジグ"
# 「というわけで、リハビリ中でよければよろしく。魔王様」
line = "「というわけで、リハビリ中でよければよろしく。魔王様」"
