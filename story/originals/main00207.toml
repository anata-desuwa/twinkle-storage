[[dialogue]]
speaker = "unk"
# 第９話,フィーニスの塔,B
line = "第９話,フィーニスの塔,B"

[[dialogue]]
speaker = "unk"
# ヴィーナスを追いかけて向かった先。
line = "ヴィーナスを追いかけて向かった先。"

[[dialogue]]
speaker = "unk"
# そこには、長大な塔が雲海さえも突き抜けてそびえ立っていた。
line = "そこには、長大な塔が雲海さえも突き抜けてそびえ立っていた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「フィーニスの塔──なんて、言わなくても知ってるわよね」
line = "「フィーニスの塔──なんて、言わなくても知ってるわよね」"

[[dialogue]]
speaker = "クロト"
# 「ああ」
line = "「ああ」"

[[dialogue]]
speaker = "unk"
# 何せその威容は、流星市国に住んでいる限りどこからでも目に入るもの。
line = "何せその威容は、流星市国に住んでいる限りどこからでも目に入るもの。"

[[dialogue]]
speaker = "unk"
# 日本どころか人間界、いや三界に現存するあらゆる建造物の中でも桁外れの大きさだ。
line = "日本どころか人間界、いや三界に現存するあらゆる建造物の中でも桁外れの大きさだ。"

[[dialogue]]
speaker = "クロト"
# 「流星市国のシンボルにして──確か、リクリエを鎮めるために建てられた塔。だったか？」
line = "「流星市国のシンボルにして──確か、リクリエを鎮めるために建てられた塔。だったか？」"

[[dialogue]]
speaker = "フィオナ"
# 「正確に言えば──フィーニスの塔は、太古の昔に女神が築いたと言われる天界と人間界との連絡塔です」
line = "「正確に言えば──フィーニスの塔は、太古の昔に女神が築いたと言われる天界と人間界との連絡塔です」"

[[dialogue]]
speaker = "フィオナ"
# 「一説には、三界の均衡を保っているのもこの塔の役割だとか」
line = "「一説には、三界の均衡を保っているのもこの塔の役割だとか」"

[[dialogue]]
speaker = "ニャリオン"
# 「ここから見ると、とんでもない大きさニャン」
line = "「ここから見ると、とんでもない大きさニャン」"

[[dialogue]]
speaker = "unk"
# 文字通り天へと繋がる架け橋。
line = "文字通り天へと繋がる架け橋。"

[[dialogue]]
speaker = "unk"
# こうして間近で見上げていると、どんな伝説も信じられそうな気分になる。
line = "こうして間近で見上げていると、どんな伝説も信じられそうな気分になる。"

[[dialogue]]
speaker = "クロト"
# 「フィオナは詳しいな──って思ったけど。そうか、星見の人間だもんな」
line = "「フィオナは詳しいな──って思ったけど。そうか、星見の人間だもんな」"

[[dialogue]]
speaker = "フィオナ"
# 「ふふ……はい。幼い頃から何度も教えられてきましたので」
line = "「ふふ……はい。幼い頃から何度も教えられてきましたので」"

[[dialogue]]
speaker = "unk"
# 流星市国の建造物ということは、流星教皇庁の所有物にあたる。
line = "流星市国の建造物ということは、流星教皇庁の所有物にあたる。"

[[dialogue]]
speaker = "unk"
# その長女であるフィオナが詳しいのも当然だった。
line = "その長女であるフィオナが詳しいのも当然だった。"

[[dialogue]]
speaker = "クロト"
# 「大聖堂が２校の中心だっていうのも……これがあるからか」
line = "「大聖堂が２校の中心だっていうのも……これがあるからか」"

[[dialogue]]
speaker = "フィオナ"
# 「それに関しても──元々、フィーニスの塔を中心に２つの学園が建てられた、と言ったほうが正しいでしょう」
line = "「それに関しても──元々、フィーニスの塔を中心に２つの学園が建てられた、と言ったほうが正しいでしょう」"

[[dialogue]]
speaker = "クロト"
# 「……そうか。大昔からあるんだもんな」
line = "「……そうか。大昔からあるんだもんな」"

[[dialogue]]
speaker = "unk"
# 大聖堂が中立地帯であったのも頷ける。
line = "大聖堂が中立地帯であったのも頷ける。"

[[dialogue]]
speaker = "unk"
# この塔は学園の──いや、ともすれば流星市国にとってもひとつの“核”と呼べる存在だった。
line = "この塔は学園の──いや、ともすれば流星市国にとってもひとつの“核”と呼べる存在だった。"

[[dialogue]]
speaker = "クロト"
# 「ヴィーナスはどうしてここを？」
line = "「ヴィーナスはどうしてここを？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええ。ここを見て──今さっき追加されたばかりの、<b>今日の</b>ページよ」
line = "「ええ。ここを見て──今さっき追加されたばかりの、<b>今日の</b>ページよ」"

[[dialogue]]
speaker = "unk"
# 『<ruby=こうじゃく>黄雀</ruby>ノ月十二日。《魔王》と共に天高き<ruby=むきゅう>無窮</ruby>の塔へ向かう』
line = "『<ruby>黄雀<rt>こうじゃく</rt></ruby>ノ月十二日。《魔王》と共に天高き<ruby>無窮<rt>むきゅう</rt></ruby>の塔へ向かう』"

[[dialogue]]
speaker = "unk"
# 『そこは守護天使の司りし場所。ここを昇ることできっと、彼の力も目覚めに近づくだろう』
line = "『そこは守護天使の司りし場所。ここを昇ることできっと、彼の力も目覚めに近づくだろう』"

[[dialogue]]
speaker = "unk"
# ヴィーナスに見せてもらった日誌には、確かにこの塔を示唆する一文が記されていた。
line = "ヴィーナスに見せてもらった日誌には、確かにこの塔を示唆する一文が記されていた。"

[[dialogue]]
speaker = "unk"
# そして、この《魔王》というのが俺のことだと彼女は言う。
line = "そして、この《魔王》というのが俺のことだと彼女は言う。"

[[dialogue]]
speaker = "キリカ"
# 「黄雀ノ月十二日に守護天使の話……確かに現在の状況と一致していますね。不気味なくらいに」
line = "「黄雀ノ月十二日に守護天使の話……確かに現在の状況と一致していますね。不気味なくらいに」"

[[dialogue]]
speaker = "ニャリオン"
# 「日誌のページがいきなり増えて、しかも欲しい情報がぴったり記載されてるニャんて……こんな都合のいいことがありうるのかニャン？」
line = "「日誌のページがいきなり増えて、しかも欲しい情報がぴったり記載されてるニャんて……こんな都合のいいことがありうるのかニャン？」"

[[dialogue]]
speaker = "フィオナ"
# 「まるで、導かれるように……ですね」
line = "「まるで、導かれるように……ですね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「この日誌に間違いはないわ。さあ、とっとと入りましょ！」
line = "「この日誌に間違いはないわ。さあ、とっとと入りましょ！」"

[[dialogue]]
speaker = "unk"
# 日誌に従ってがぜんやる気になるヴィーナス。彼女はやはり、その記述に強い信頼を置いている。
line = "日誌に従ってがぜんやる気になるヴィーナス。彼女はやはり、その記述に強い信頼を置いている。"

[[dialogue]]
speaker = "フィオナ"
# 「ですが……フィーニスの塔は生徒の立ち入りが禁じられています。星徒会も例外ではありません」
line = "「ですが……フィーニスの塔は生徒の立ち入りが禁じられています。星徒会も例外ではありません」"

[[dialogue]]
speaker = "キリカ"
# 「生徒でなくとも、一般の入場が許可されることはまずないと聞いていますね」
line = "「生徒でなくとも、一般の入場が許可されることはまずないと聞いていますね」"

[[dialogue]]
speaker = "クロト"
# 「学園生でもダメなのか……」
line = "「学園生でもダメなのか……」"

[[dialogue]]
speaker = "unk"
# 星徒会の権限をしても不可侵──
line = "星徒会の権限をしても不可侵──"

[[dialogue]]
speaker = "unk"
# フィーニスの塔とは、それほどまでに聖なる領域のようだった。
line = "フィーニスの塔とは、それほどまでに聖なる領域のようだった。"

[[dialogue]]
speaker = "クロト"
# 「どうかな、ヴィーナス。さすがに星徒会が率先してルールを破るのはあれだし……一度持ち帰って栞を確かめるとか」
line = "「どうかな、ヴィーナス。さすがに星徒会が率先してルールを破るのはあれだし……一度持ち帰って栞を確かめるとか」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# 妥協案を提示してみる俺。
line = "妥協案を提示してみる俺。"

[[dialogue]]
speaker = "unk"
# するとそれまで能天気だったヴィーナスの態度に、わずかな陰りが見られる。
line = "するとそれまで能天気だったヴィーナスの態度に、わずかな陰りが見られる。"

[[dialogue]]
speaker = "ヴィーナス"
# 「……ううん」
line = "「……ううん」"

[[dialogue]]
speaker = "ヴィーナス"
# 「行かなきゃダメなの。私は……この先にあるものを、見ないと」
line = "「行かなきゃダメなの。私は……この先にあるものを、見ないと」"

[[dialogue]]
speaker = "クロト"
# 「ヴィーナス……」
line = "「ヴィーナス……」"

[[dialogue]]
speaker = "unk"
# 同じだ。
line = "同じだ。"

[[dialogue]]
speaker = "unk"
# あの時と同じ目をしている。
line = "あの時と同じ目をしている。"

[[dialogue]]
speaker = "unk"
# 根拠もなく、俺ならやれると豪語しきっていたあの時と。
line = "根拠もなく、俺ならやれると豪語しきっていたあの時と。"

[[dialogue]]
speaker = "ニャリオン"
# 「ニャーもそう聞くと気になるニャンが、塔の扉は開かずの扉とされてるニャン」
line = "「ニャーもそう聞くと気になるニャンが、塔の扉は開かずの扉とされてるニャン」"

[[dialogue]]
speaker = "クロト"
# 「ガードマンみたいな人も……特にいないしな」
line = "「ガードマンみたいな人も……特にいないしな」"

[[dialogue]]
speaker = "unk"
# フィーニスの塔はそれこそ学園のシンボルとして堂々と鎮座している。
line = "フィーニスの塔はそれこそ学園のシンボルとして堂々と鎮座している。"

[[dialogue]]
speaker = "unk"
# それでも誰も近寄ろうとしないのは、この門が開け放たれないのを知っているからだろう。
line = "それでも誰も近寄ろうとしないのは、この門が開け放たれないのを知っているからだろう。"

[[dialogue]]
speaker = "ヴィーナス"
# 「むぐぐ……でもダメ！　私がここを昇らないと日誌の通りにならないんだから！　そんなの許しません！」
line = "「むぐぐ……でもダメ！　私がここを昇らないと日誌の通りにならないんだから！　そんなの許しません！」"

[[dialogue]]
speaker = "クロト"
# 「過程と結果が真逆だな……」
line = "「過程と結果が真逆だな……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「えーい！　私が開けなさいと言ったら開けなさーいっ！」
line = "「えーい！　私が開けなさいと言ったら開けなさーいっ！」"

[[dialogue]]
speaker = "フィオナ"
# 「え……？」
line = "「え……？」"

[[dialogue]]
speaker = "unk"
# ヴィーナスが塔へ命じるように右手を振りかざす──
line = "ヴィーナスが塔へ命じるように右手を振りかざす──"

[[dialogue]]
speaker = "unk"
# と、空間一帯が謎の輝きに包まれた。
line = "と、空間一帯が謎の輝きに包まれた。"

[[dialogue]]
speaker = "クロト"
# 「な──」
line = "「な──」"

[[dialogue]]
speaker = "クロト"
# 「ここは……！？」
line = "「ここは……！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「もしかして──入れちゃった！？」
line = "「もしかして──入れちゃった！？」"

[[dialogue]]
speaker = "unk"
# 空間転移を果たした俺たちは揃って顔を見合わせる。
line = "空間転移を果たした俺たちは揃って顔を見合わせる。"

[[dialogue]]
speaker = "unk"
# 本当にヴィーナスの命令に呼応してしまった。
line = "本当にヴィーナスの命令に呼応してしまった。"

[[dialogue]]
speaker = "unk"
# まるで、彼女を迎え入れるかのように……
line = "まるで、彼女を迎え入れるかのように……"

[[dialogue]]
speaker = "フィオナ"
# 「それに、どうやら……ただならぬ力も働いているようです」
line = "「それに、どうやら……ただならぬ力も働いているようです」"

[[dialogue]]
speaker = "クロト"
# 「！　……確かに」
line = "「！　……確かに」"

[[dialogue]]
speaker = "unk"
# 俺も、ヴィーナスも、フィオナも──
line = "俺も、ヴィーナスも、フィオナも──"

[[dialogue]]
speaker = "unk"
# 先ほどまで制服姿で外にいたというのに、いつの間にか変身後の姿となっていた。
line = "先ほどまで制服姿で外にいたというのに、いつの間にか変身後の姿となっていた。"

[[dialogue]]
speaker = "キリカ"
# 「ここでは強制的に星力が引き出されるようです」
line = "「ここでは強制的に星力が引き出されるようです」"

[[dialogue]]
speaker = "ヴィーナス"
# 「──これはもう行けってことに違いないわね！　さあクロト、がんがんずんずんぐいぐい進むわよ！」
line = "「──これはもう行けってことに違いないわね！　さあクロト、がんがんずんずんぐいぐい進むわよ！」"

[[dialogue]]
speaker = "クロト"
# 「適応力が高いなヴィーナスは」
line = "「適応力が高いなヴィーナスは」"

[[dialogue]]
speaker = "ヴィーナス"
# 「流星の会長さんは出てってもいいわよ。このままだと校則違反だし」
line = "「流星の会長さんは出てってもいいわよ。このままだと校則違反だし」"

[[dialogue]]
speaker = "フィオナ"
# 「いえ……私も行きます」
line = "「いえ……私も行きます」"

[[dialogue]]
speaker = "フィオナ"
# 「（魔王の真実……私も見極めなくてはなりませんから）」
line = "「（魔王の真実……私も見極めなくてはなりませんから）」"

[[dialogue]]
speaker = "クロト"
# 「？」
line = "「？」"

[[dialogue]]
speaker = "unk"
# また、フィオナが俺の顔を見つめていた。
line = "また、フィオナが俺の顔を見つめていた。"

[[dialogue]]
speaker = "キリカ"
# 「フィオナ様。僭越ながら、かの塔の内部となるとここは完全に未知の空間──不用意に踏み入るのは危険も大きいかと」
line = "「フィオナ様。僭越ながら、かの塔の内部となるとここは完全に未知の空間──不用意に踏み入るのは危険も大きいかと」"

[[dialogue]]
speaker = "フィオナ"
# 「大丈夫──不用意ではありません。キリカ、あなたがついていてくれるのなら」
line = "「大丈夫──不用意ではありません。キリカ、あなたがついていてくれるのなら」"

[[dialogue]]
speaker = "キリカ"
# 「ふ……なるほど。かしこまりました」
line = "「ふ……なるほど。かしこまりました」"

[[dialogue]]
speaker = "キリカ"
# 「この身は常に貴方様と共にあるもの……必要とあらば、存分に腕を奮うとしましょう」
line = "「この身は常に貴方様と共にあるもの……必要とあらば、存分に腕を奮うとしましょう」"

[[dialogue]]
speaker = "ニャリオン"
# 「ワガハイも行くに決まっているニャン！　未知のダンジョンみたいでワクワクするニャン！」
line = "「ワガハイも行くに決まっているニャン！　未知のダンジョンみたいでワクワクするニャン！」"

[[dialogue]]
speaker = "フィオナ"
# 「行楽じゃありませんからね、ニャリオン」
line = "「行楽じゃありませんからね、ニャリオン」"

[[dialogue]]
speaker = "クロト"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# その時、なぜか……
line = "その時、なぜか……"

[[dialogue]]
speaker = "unk"
# ふと怖くなった。
line = "ふと怖くなった。"

[[dialogue]]
speaker = "unk"
# 堕天使。日誌。入塔。
line = "堕天使。日誌。入塔。"

[[dialogue]]
speaker = "unk"
# トントン拍子、と言えば聞こえはよいが──
line = "トントン拍子、と言えば聞こえはよいが──"

[[dialogue]]
speaker = "unk"
# ヴィーナスを中心に回る運命の歯車は、急速な回転に軋みを上げているように思えて……
line = "ヴィーナスを中心に回る運命の歯車は、急速な回転に軋みを上げているように思えて……"

[[dialogue]]
speaker = "クロト"
# 「（……いや、気にしすぎか）」
line = "「（……いや、気にしすぎか）」"

[[dialogue]]
speaker = "unk"
# 考えたところで埒が明かない。とにかく今は気を引き締めて、塔を探索するとしよう。
line = "考えたところで埒が明かない。とにかく今は気を引き締めて、塔を探索するとしよう。"
