[[dialogue]]
speaker = "unk"
# 依頼を受け、ヒマワリとミウの２人が追いかけているのは、セレスティアの横領犯。
line = "依頼を受け、ヒマワリとミウの２人が追いかけているのは、セレスティアの横領犯。"

[[dialogue]]
speaker = "unk"
# 基本的に、星騎士でもセレスティアなしでは星術のコントロールは難しい。
line = "基本的に、星騎士でもセレスティアなしでは星術のコントロールは難しい。"

[[dialogue]]
speaker = "unk"
# 逆に在野の星力持ちでもセレスティアがあれば、ある程度星術が行使できるようになるため、セレスティアが闇取引されることがあるのだ。
line = "逆に在野の星力持ちでもセレスティアがあれば、ある程度星術が行使できるようになるため、セレスティアが闇取引されることがあるのだ。"

[[dialogue]]
speaker = "ヒマワリ"
# 「セレスティア横領の現行犯で逮捕するーっ！　待て待てーっ！」
line = "「セレスティア横領の現行犯で逮捕するーっ！　待て待てーっ！」"

[[dialogue]]
speaker = "横領犯"
# 「待てと言われて待つ阿呆がいるかよ！」
line = "「待てと言われて待つ阿呆がいるかよ！」"

[[dialogue]]
speaker = "ミウ"
# 「今度こそ逃がしません！　今回は脚を射貫いてでも止めます！」
line = "「今度こそ逃がしません！　今回は脚を射貫いてでも止めます！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「あっ、待って！　そこにモンスターが！」
line = "「あっ、待って！　そこにモンスターが！」"

[[dialogue]]
speaker = "横領犯"
# 「ハッ！　そんな古い手に乗るか──」
line = "「ハッ！　そんな古い手に乗るか──」"

[[dialogue]]
speaker = "モンスター"
# 「ピガガー！」
line = "「ピガガー！」"

[[dialogue]]
speaker = "横領犯"
# 「なっ、マジで──ぎゃあぁっ！？」
line = "「なっ、マジで──ぎゃあぁっ！？」"

[[dialogue]]
speaker = "ヒマワリ"
# 「言わんこっちゃない。あたしはちゃんと教えてあげたのにー！」
line = "「言わんこっちゃない。あたしはちゃんと教えてあげたのにー！」"

[[dialogue]]
speaker = "ミウ"
# 「また新型モンスターだね、無理は禁物だよ、ヒマワリちゃん」
line = "「また新型モンスターだね、無理は禁物だよ、ヒマワリちゃん」"

[[dialogue]]
speaker = "ヒマワリ"
# 「わかってるって。──喰らえっ！」
line = "「わかってるって。──喰らえっ！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「うわ、やっぱダメだー！　めちゃめちゃ硬ーい！」
line = "「うわ、やっぱダメだー！　めちゃめちゃ硬ーい！」"

[[dialogue]]
speaker = "ミウ"
# 「並の星騎士じゃ通用しないとは言われてたけど、まさか、私たちがここまで無力だなんて……」
line = "「並の星騎士じゃ通用しないとは言われてたけど、まさか、私たちがここまで無力だなんて……」"

[[dialogue]]
speaker = "ヒマワリ"
# 「ミウ、プランＡでもＢでもＣでもいいから、なんかないのー！？」
line = "「ミウ、プランＡでもＢでもＣでもいいから、なんかないのー！？」"

[[dialogue]]
speaker = "ミウ"
# 「あいつ相手にはどうしようもないよ。全力で逃げるか、もしくは──」
line = "「あいつ相手にはどうしようもないよ。全力で逃げるか、もしくは──」"

[[dialogue]]
speaker = "ヒマワリ"
# 「もしくは？」
line = "「もしくは？」"

[[dialogue]]
speaker = "ミウ"
# 「ヒーローの到着を願うだけ……助けてください！」
line = "「ヒーローの到着を願うだけ……助けてください！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「セナリィ社長ーッ！」
line = "「セナリィ社長ーッ！」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「その願い、聞き届けましたわ！」
line = "「その願い、聞き届けましたわ！」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「私、颯爽登場ッッッ！」
line = "「私、颯爽登場ッッッ！」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「社員の窮地とあらば駆けつけるのが社長の役目！　ウチの社員を可愛がってくれた礼は火力でお返ししますわ！」
line = "「社員の窮地とあらば駆けつけるのが社長の役目！　ウチの社員を可愛がってくれた礼は火力でお返ししますわ！」"

[[dialogue]]
speaker = "ミウ"
# 「やっちゃってください、社長ーっ！」
line = "「やっちゃってください、社長ーっ！」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「武装展開！　ミサイルストォオォォゥム！！」
line = "「武装展開！　ミサイルストォオォォゥム！！」"

[[dialogue]]
speaker = "モンスター"
# 「ピピピ……ガガーー……！」
line = "「ピピピ……ガガーー……！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「あたしたちがいくら撃ってもダメージを与えられなかった敵を、たったの一撃で……！」
line = "「あたしたちがいくら撃ってもダメージを与えられなかった敵を、たったの一撃で……！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「さすがはセナリィ社長です！　素敵ですー！　社長についてきて良かったー！」
line = "「さすがはセナリィ社長です！　素敵ですー！　社長についてきて良かったー！」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「そう、もっと、もっと！　私を褒めなさいな！」
line = "「そう、もっと、もっと！　私を褒めなさいな！」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「私は褒められて伸びる子！　褒められることで私は無限の力を発揮しますわ！」
line = "「私は褒められて伸びる子！　褒められることで私は無限の力を発揮しますわ！」"

[[dialogue]]
speaker = "モンスター"
# 「ガアアアッ！！」
line = "「ガアアアッ！！」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「おっと、雑魚を片付けたところで、オヤブンのお出ましのようですわね」
line = "「おっと、雑魚を片付けたところで、オヤブンのお出ましのようですわね」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「さ、このまま、銀河のチリにして差し上げますわ！」
line = "「さ、このまま、銀河のチリにして差し上げますわ！」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「……あら？　あら？　あらら？」
line = "「……あら？　あら？　あらら？」"

[[dialogue]]
speaker = "ミウ"
# 「どうしたんですか、セナリィ社長。またズドーンとやっちゃってください」
line = "「どうしたんですか、セナリィ社長。またズドーンとやっちゃってください」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「そうしたいのは、やまやまなんですけども……弾が出ませんわね？」
line = "「そうしたいのは、やまやまなんですけども……弾が出ませんわね？」"

[[dialogue]]
speaker = "ヒマワリ"
# 「もしかして、もうエネルギー切れですか！？　褒めたら無限の力じゃなかったんですかー！？」
line = "「もしかして、もうエネルギー切れですか！？　褒めたら無限の力じゃなかったんですかー！？」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「ノリですわ、ノリ！　無限の力なんてあるはずがないでしょう！」
line = "「ノリですわ、ノリ！　無限の力なんてあるはずがないでしょう！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「ま、そうですよねー」
line = "「ま、そうですよねー」"

[[dialogue]]
speaker = "ミウ"
# 「『褒め』にそこまでの力はありませんよね」
line = "「『褒め』にそこまでの力はありませんよね」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「あなたたち、案外ドライですわよねぇー！」
line = "「あなたたち、案外ドライですわよねぇー！」"

[[dialogue]]
speaker = "モンスター"
# 「ギィィィ！　ギィアァァァァ！」
line = "「ギィィィ！　ギィアァァァァ！」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「あいたたた！　やめっ、やめなさい！　こら！」
line = "「あいたたた！　やめっ、やめなさい！　こら！」"

[[dialogue]]
speaker = "ミウ"
# 「エネルギーが切れても、防御力は高いんですね。でも、持ち堪えてても攻撃はできないんじゃ、ただのサンドバッグ」
line = "「エネルギーが切れても、防御力は高いんですね。でも、持ち堪えてても攻撃はできないんじゃ、ただのサンドバッグ」"

[[dialogue]]
speaker = "ヒマワリ"
# 「あたしたちの攻撃は、あいつには通じないし……このままじゃ社長がやられちゃうよー！」
line = "「あたしたちの攻撃は、あいつには通じないし……このままじゃ社長がやられちゃうよー！」"

[[dialogue]]
speaker = "ミウ"
# 「絶体絶命のピンチ……何もしないでやられちゃうよりは、やってみるべきですよね♪」
line = "「絶体絶命のピンチ……何もしないでやられちゃうよりは、やってみるべきですよね♪」"

[[dialogue]]
speaker = "ヒマワリ"
# 「え、なに？　ミウ、ちょっと嬉しそうなんだけど」
line = "「え、なに？　ミウ、ちょっと嬉しそうなんだけど」"

[[dialogue]]
speaker = "ミウ"
# 「ヒマワリちゃん！　私にいい考えがあるんです！」
line = "「ヒマワリちゃん！　私にいい考えがあるんです！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「あ、もしかして、前に考えてたセナリィ社長に星力をリチャージする方法？」
line = "「あ、もしかして、前に考えてたセナリィ社長に星力をリチャージする方法？」"

[[dialogue]]
speaker = "ミウ"
# 「そう！　それにはヒマワリちゃんの星術が絶対に必要。ヒマワリちゃんじゃなきゃ、絶対にできないことなの」
line = "「そう！　それにはヒマワリちゃんの星術が絶対に必要。ヒマワリちゃんじゃなきゃ、絶対にできないことなの」"

[[dialogue]]
speaker = "ヒマワリ"
# 「任せてよ！　あたしにできることなら、なんだってやるからさ！」
line = "「任せてよ！　あたしにできることなら、なんだってやるからさ！」"

[[dialogue]]
speaker = "ミウ"
# 「本当だね？　えっとね、ごにょごにょごにょ」
line = "「本当だね？　えっとね、ごにょごにょごにょ」"

[[dialogue]]
speaker = "ヒマワリ"
# 「──え？　あたしの星術を社長に……うん、うん……ぅえぇぇ！？」
line = "「──え？　あたしの星術を社長に……うん、うん……ぅえぇぇ！？」"

[[dialogue]]
speaker = "ミウ"
# 「──って感じなんだけど、どう？　イケると思う？」
line = "「──って感じなんだけど、どう？　イケると思う？」"

[[dialogue]]
speaker = "ヒマワリ"
# 「あは、うはははっ♪　やってみなきゃわかんないけど、ミウってばエグいこと考えるよねー！」
line = "「あは、うはははっ♪　やってみなきゃわかんないけど、ミウってばエグいこと考えるよねー！」"
