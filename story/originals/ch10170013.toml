[[dialogue]]
speaker = "unk"
# 第３話,友達１００人計画・後編,P
line = "第３話,友達１００人計画・後編,P"

[[dialogue]]
speaker = "unk"
# 友達１００人計画が始動してから数日経った放課後。蛍火と友達作りの為に、街へ遊びに来ていた。
line = "友達１００人計画が始動してから数日経った放課後。蛍火と友達作りの為に、街へ遊びに来ていた。"

[[dialogue]]
speaker = "蛍火"
# 「それで、師匠……３人目の友達候補というのは、一体どういう方なのでしょうか？」
line = "「それで、師匠……３人目の友達候補というのは、一体どういう方なのでしょうか？」"

[[dialogue]]
speaker = "unk"
# そうだな……少し蛍火に似てるかも
line = "そうだな……少し蛍火に似てるかも"

[[dialogue]]
speaker = "蛍火"
# 「私に……ですか？」
line = "「私に……ですか？」"

[[dialogue]]
speaker = "マトイ"
# 「あっ、いたいた。会長、待たせてごめんねー」
line = "「あっ、いたいた。会長、待たせてごめんねー」"

[[dialogue]]
speaker = "マトイ"
# 「それで、そちらが元星徒会メンバーの東雲蛍火さん……かな？　初めまして、現星徒会の書記をやっています、２年生の詠野マトイです」
line = "「それで、そちらが元星徒会メンバーの東雲蛍火さん……かな？　初めまして、現星徒会の書記をやっています、２年生の詠野マトイです」"

[[dialogue]]
speaker = "マトイ"
# 「東雲さんのことは、よくサーシャさんから聞いてました！　カフェテリアで評判の限定メニューって、全部東雲さんが調理してるんだよね？　凄いなぁ、同じ２年生なのに」
line = "「東雲さんのことは、よくサーシャさんから聞いてました！　カフェテリアで評判の限定メニューって、全部東雲さんが調理してるんだよね？　凄いなぁ、同じ２年生なのに」"

[[dialogue]]
speaker = "蛍火"
# 「……ええ、まあ」
line = "「……ええ、まあ」"

[[dialogue]]
speaker = "マトイ"
# 「え、ええっと、星騎士としても強いの有名だよね！　ヴィーナスと戦っても勝てちゃうんじゃないかって、よく話題になるよ。クラスが別だから、模擬戦が実現したことないんだよね～」
line = "「え、ええっと、星騎士としても強いの有名だよね！　ヴィーナスと戦っても勝てちゃうんじゃないかって、よく話題になるよ。クラスが別だから、模擬戦が実現したことないんだよね～」"

[[dialogue]]
speaker = "蛍火"
# 「はあ、そうですか……」
line = "「はあ、そうですか……」"

[[dialogue]]
speaker = "unk"
# （蛍火は緊張し過ぎ！）
line = "（蛍火は緊張し過ぎ！）"

[[dialogue]]
speaker = "unk"
# （そ、素っ気なさ過ぎる……！）
line = "（そ、素っ気なさ過ぎる……！）"

[[dialogue]]
speaker = "マトイ"
# 「えっと……その……背中の大剣って、いつも学園の外でも持ち歩いてるの？」
line = "「えっと……その……背中の大剣って、いつも学園の外でも持ち歩いてるの？」"

[[dialogue]]
speaker = "蛍火"
# 「この包丁のことですか？　ええ、まあ……教皇庁の許可も得ています。特殊な星術で保護している為、モンスター以外を傷つける心配もありません」
line = "「この包丁のことですか？　ええ、まあ……教皇庁の許可も得ています。特殊な星術で保護している為、モンスター以外を傷つける心配もありません」"

[[dialogue]]
speaker = "マトイ"
# 「ほ、包丁だったんだね、それ……（って、心配はそこじゃなくて！　凄く目立つし、威圧感がありすぎるよってことなんだけどなぁ！）」
line = "「ほ、包丁だったんだね、それ……（って、心配はそこじゃなくて！　凄く目立つし、威圧感がありすぎるよってことなんだけどなぁ！）」"

[[dialogue]]
speaker = "蛍火"
# 「……この『鬼丸烈火』は、父から贈られたものなので」
line = "「……この『鬼丸烈火』は、父から贈られたものなので」"

[[dialogue]]
speaker = "マトイ"
# 「……！　そっか。大切なものなんだね」
line = "「……！　そっか。大切なものなんだね」"

[[dialogue]]
speaker = "unk"
# 自己紹介が終わったところで、３人で街を散策する。聞けば、マトイにはオススメのオープンカフェがあるらしく、場所も近いらしいので、そこへ向かうことになった。
line = "自己紹介が終わったところで、３人で街を散策する。聞けば、マトイにはオススメのオープンカフェがあるらしく、場所も近いらしいので、そこへ向かうことになった。"

[[dialogue]]
speaker = "蛍火"
# （うぅ……。師匠……緊張モードで、詠野さんに気を遣わせてしまいました……）
line = "（うぅ……。師匠……緊張モードで、詠野さんに気を遣わせてしまいました……）"

[[dialogue]]
speaker = "蛍火"
# （でも、詠野さんには師匠から、私が緊張しいだってことは、伝えてくれてるんですよね？）
line = "（でも、詠野さんには師匠から、私が緊張しいだってことは、伝えてくれてるんですよね？）"

[[dialogue]]
speaker = "unk"
# いや、マトイには何も教えてないよ
line = "いや、マトイには何も教えてないよ"

[[dialogue]]
speaker = "蛍火"
# （えぇ！？　ど、どうして……）
line = "（えぇ！？　ど、どうして……）"

[[dialogue]]
speaker = "unk"
# それからオープンカフェに到着し、マトイが大好きだというショートケーキを頼んで食べる。
line = "それからオープンカフェに到着し、マトイが大好きだというショートケーキを頼んで食べる。"

[[dialogue]]
speaker = "蛍火"
# 「ふわぁぁ……これ、凄く美味しいですっ。こんなに美味しいショートケーキを食べたのは、生まれて初めてかもしれませんっ」
line = "「ふわぁぁ……これ、凄く美味しいですっ。こんなに美味しいショートケーキを食べたのは、生まれて初めてかもしれませんっ」"

[[dialogue]]
speaker = "マトイ"
# 「そうでしょ～！　私、ショートケーキが一番の好物で、色んなお店のを食べたんだけど、その中でもここが一番美味しいと思ってるんだよね」
line = "「そうでしょ～！　私、ショートケーキが一番の好物で、色んなお店のを食べたんだけど、その中でもここが一番美味しいと思ってるんだよね」"

[[dialogue]]
speaker = "マトイ"
# 「……でも、良かった。やっぱり東雲さん、さっきまでは初対面で緊張してたんだね」
line = "「……でも、良かった。やっぱり東雲さん、さっきまでは初対面で緊張してたんだね」"

[[dialogue]]
speaker = "蛍火"
# 「えっ？　あっ……」
line = "「えっ？　あっ……」"

[[dialogue]]
speaker = "マトイ"
# 「東雲さん、料理人だし、美味しいものを食べれば少しはリラックス出来るかなって思ったんだ。……実はさ、私も結構、緊張しいなんだよね。東雲さんも多分、同じなのかなって」
line = "「東雲さん、料理人だし、美味しいものを食べれば少しはリラックス出来るかなって思ったんだ。……実はさ、私も結構、緊張しいなんだよね。東雲さんも多分、同じなのかなって」"

[[dialogue]]
speaker = "マトイ"
# 「私には……その気持ちがよくわかるからさ。だから、東雲さんが笑顔になってくれて、良かった！」
line = "「私には……その気持ちがよくわかるからさ。だから、東雲さんが笑顔になってくれて、良かった！」"

[[dialogue]]
speaker = "蛍火"
# 「詠野さん、私の為に……！　ふっ……うぅっ……」
line = "「詠野さん、私の為に……！　ふっ……うぅっ……」"

[[dialogue]]
speaker = "マトイ"
# 「あ、あれ！？　どうしたの東雲さん！　甘いもの、やっぱりダメだった！？」
line = "「あ、あれ！？　どうしたの東雲さん！　甘いもの、やっぱりダメだった！？」"

[[dialogue]]
speaker = "蛍火"
# 「っ……違うんです。私、詠野さんの優しさに……つい感極まってしまって……！」
line = "「っ……違うんです。私、詠野さんの優しさに……つい感極まってしまって……！」"

[[dialogue]]
speaker = "マトイ"
# 「なんだ、そっか。あはは、そしたらほら、泣かないで一緒にショートケーキ食べよ？　甘いの食べたら、女の子は笑顔になるから」
line = "「なんだ、そっか。あはは、そしたらほら、泣かないで一緒にショートケーキ食べよ？　甘いの食べたら、女の子は笑顔になるから」"

[[dialogue]]
speaker = "蛍火"
# 「はいっ。ありがとうございます……美味しいです！」
line = "「はいっ。ありがとうございます……美味しいです！」"

[[dialogue]]
speaker = "unk"
# 今回、遊びに誘った理由なんだけど──
line = "今回、遊びに誘った理由なんだけど──"

[[dialogue]]
speaker = "unk"
# それでさ、マトイ。
line = "それでさ、マトイ。"

[[dialogue]]
speaker = "蛍火"
# 「っ……師匠。大丈夫、です。その先は、私が自分で言います」
line = "「っ……師匠。大丈夫、です。その先は、私が自分で言います」"

[[dialogue]]
speaker = "蛍火"
# 「詠野さん。お願いしたいことがあります」
line = "「詠野さん。お願いしたいことがあります」"

[[dialogue]]
speaker = "マトイ"
# 「う、うん、どうしたの？　改まって……ひょっとしてまた緊張してる？」
line = "「う、うん、どうしたの？　改まって……ひょっとしてまた緊張してる？」"

[[dialogue]]
speaker = "蛍火"
# 「はい……。私は、詠野さんの気遣いがとても嬉しくて……出来れば、これからも親しくしていきたいと考えております」
line = "「はい……。私は、詠野さんの気遣いがとても嬉しくて……出来れば、これからも親しくしていきたいと考えております」"

[[dialogue]]
speaker = "蛍火"
# 「なのでその……私と是非……と、友達になって、頂けないでしょうか」
line = "「なのでその……私と是非……と、友達になって、頂けないでしょうか」"

[[dialogue]]
speaker = "unk"
# 蛍火は深く頭を下げる。マトイはびっくりしたように目を丸くしていたが──
line = "蛍火は深く頭を下げる。マトイはびっくりしたように目を丸くしていたが──"

[[dialogue]]
speaker = "マトイ"
# 「そっか……うん！　喜んで！」
line = "「そっか……うん！　喜んで！」"

[[dialogue]]
speaker = "マトイ"
# 「──これから仲良くしようね、蛍火！」
line = "「──これから仲良くしようね、蛍火！」"

[[dialogue]]
speaker = "蛍火"
# 「詠野さん……っ。はいっ、よろしくお願いしますっ」
line = "「詠野さん……っ。はいっ、よろしくお願いしますっ」"

[[dialogue]]
speaker = "マトイ"
# 「私のことも下の名前で呼んで？　ほら、友達なんだから、さ」
line = "「私のことも下の名前で呼んで？　ほら、友達なんだから、さ」"

[[dialogue]]
speaker = "蛍火"
# 「え、えっと……それじゃあ、マトイ……さん？」
line = "「え、えっと……それじゃあ、マトイ……さん？」"

[[dialogue]]
speaker = "マトイ"
# 「きゃ～っ、素の蛍火可愛いぃ！　ギャップ萌えってやつだね、これ！」
line = "「きゃ～っ、素の蛍火可愛いぃ！　ギャップ萌えってやつだね、これ！」"

[[dialogue]]
speaker = "マトイ"
# 「ねぇ、蛍火！　今度、私の家に遊びにきて？　お菓子作りとか教えて欲しいな！」
line = "「ねぇ、蛍火！　今度、私の家に遊びにきて？　お菓子作りとか教えて欲しいな！」"

[[dialogue]]
speaker = "蛍火"
# 「わ、私が、友達の家に遊びに……！」
line = "「わ、私が、友達の家に遊びに……！」"

[[dialogue]]
speaker = "unk"
# やはり、マトイなら何も言わなくても蛍火の力になってくれると信じたのは、間違いではなかった。
line = "やはり、マトイなら何も言わなくても蛍火の力になってくれると信じたのは、間違いではなかった。"

[[dialogue]]
speaker = "unk"
# 幸せそうに笑う蛍火を見ていると、こっちの顔まで釣られるようにほころんでしまうのだった。
line = "幸せそうに笑う蛍火を見ていると、こっちの顔まで釣られるようにほころんでしまうのだった。"
