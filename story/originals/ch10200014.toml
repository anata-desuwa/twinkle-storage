[[dialogue]]
speaker = "unk"
# 第４話,ルルカの夢,P
line = "第４話,ルルカの夢,P"

[[dialogue]]
speaker = "unk"
# 動画を作るために、綺麗な海があるところへ行きたい──
line = "動画を作るために、綺麗な海があるところへ行きたい──"

[[dialogue]]
speaker = "unk"
# そんなルルカの要望を叶えるため、休日の午後。２人でネットサーフィンに勤しんでいた。
line = "そんなルルカの要望を叶えるため、休日の午後。２人でネットサーフィンに勤しんでいた。"

[[dialogue]]
speaker = "ルルカ"
# 「あ！　この海水浴場、いいかもっ。砂浜が真っ白だよ、お兄ちゃん！」
line = "「あ！　この海水浴場、いいかもっ。砂浜が真っ白だよ、お兄ちゃん！」"

[[dialogue]]
speaker = "unk"
# そろそろどいてくれないか？
line = "そろそろどいてくれないか？"

[[dialogue]]
speaker = "unk"
# それはいいんだけど……
line = "それはいいんだけど……"

[[dialogue]]
speaker = "ルルカ"
# 「えーっ、なんで？　お兄ちゃんのお膝の上に座っちゃ駄目？」
line = "「えーっ、なんで？　お兄ちゃんのお膝の上に座っちゃ駄目？」"

[[dialogue]]
speaker = "ルルカ"
# 「２人でおんなじ画面見るんだし、あたしはいっぱい甘えられるしー。一石二鳥じゃん！」
line = "「２人でおんなじ画面見るんだし、あたしはいっぱい甘えられるしー。一石二鳥じゃん！」"

[[dialogue]]
speaker = "ルルカ"
# 「ほらほら。お兄ちゃん。こっちのページもクリックして。画像がいっぱい見られるみたいだよ」
line = "「ほらほら。お兄ちゃん。こっちのページもクリックして。画像がいっぱい見られるみたいだよ」"

[[dialogue]]
speaker = "ルルカ"
# 「ふむふむ……あ～、この浜辺は、夜景が素敵なのかあ……インスピレーション、湧きそうだなぁ……」
line = "「ふむふむ……あ～、この浜辺は、夜景が素敵なのかあ……インスピレーション、湧きそうだなぁ……」"

[[dialogue]]
speaker = "unk"
# インスピレーション？
line = "インスピレーション？"

[[dialogue]]
speaker = "ルルカ"
# 「うん、そう」
line = "「うん、そう」"

[[dialogue]]
speaker = "ルルカ"
# 「次にアップロードする歌動画は、その……オリジナルの曲にしようかな～って思ってるんだよね」
line = "「次にアップロードする歌動画は、その……オリジナルの曲にしようかな～って思ってるんだよね」"

[[dialogue]]
speaker = "ルルカ"
# 「もちろん既存のアイドルソングも大好きだし、その歌に込められた想いを考えて歌うことも大好きなんだけど……そろそろ、チャレンジもしてみようかなって思って」
line = "「もちろん既存のアイドルソングも大好きだし、その歌に込められた想いを考えて歌うことも大好きなんだけど……そろそろ、チャレンジもしてみようかなって思って」"

[[dialogue]]
speaker = "ルルカ"
# 「ず～っと夢だったんだ。あたしの、あたしだけの曲を書いて、詞を作って……歌うこと」
line = "「ず～っと夢だったんだ。あたしの、あたしだけの曲を書いて、詞を作って……歌うこと」"

[[dialogue]]
speaker = "ルルカ"
# 「Ｖチューバーとしての活動も、バズるための動画作りも、楽しくないわけじゃないし、やりがいも感じてる」
line = "「Ｖチューバーとしての活動も、バズるための動画作りも、楽しくないわけじゃないし、やりがいも感じてる」"

[[dialogue]]
speaker = "ルルカ"
# 「でも、最近はお兄ちゃんが色々活動を手伝ってくれてるじゃん？　おかげで少し楽になって……余裕が出てきたからかな。思い出したの」
line = "「でも、最近はお兄ちゃんが色々活動を手伝ってくれてるじゃん？　おかげで少し楽になって……余裕が出てきたからかな。思い出したの」"

[[dialogue]]
speaker = "ルルカ"
# 「あたしは、お母さんに憧れて、歌を始めたんだって」
line = "「あたしは、お母さんに憧れて、歌を始めたんだって」"

[[dialogue]]
speaker = "ルルカ"
# 「お兄ちゃん、知ってるかな？　『魅惑の歌姫』って呼ばれてる魔界のアイドル」
line = "「お兄ちゃん、知ってるかな？　『魅惑の歌姫』って呼ばれてる魔界のアイドル」"

[[dialogue]]
speaker = "unk"
# 魔界の超有名アイドルだろ？　人間界でも有名だ
line = "魔界の超有名アイドルだろ？　人間界でも有名だ"

[[dialogue]]
speaker = "ルルカ"
# 「うん。その人がね、あたしのお母さんなの」
line = "「うん。その人がね、あたしのお母さんなの」"

[[dialogue]]
speaker = "ルルカ"
# 「えへへ……全然そんな風に見えないよね。あんまり知ってる人もいないんじゃないかな。友達にも言ったことないし」
line = "「えへへ……全然そんな風に見えないよね。あんまり知ってる人もいないんじゃないかな。友達にも言ったことないし」"

[[dialogue]]
speaker = "ルルカ"
# 「隠してるわけじゃないよ？　自慢のお母さんだし、あたしはお母さんの娘だってことに誇りを持ってる」
line = "「隠してるわけじゃないよ？　自慢のお母さんだし、あたしはお母さんの娘だってことに誇りを持ってる」"

[[dialogue]]
speaker = "ルルカ"
# 「だけど……才能みたいなのはなかったみたいなんだよね。歌唱コンクールは良くて３位とかだし、聖歌隊の中にもあたしより上手な人はいっぱいいるし……」
line = "「だけど……才能みたいなのはなかったみたいなんだよね。歌唱コンクールは良くて３位とかだし、聖歌隊の中にもあたしより上手な人はいっぱいいるし……」"

[[dialogue]]
speaker = "ルルカ"
# 「でもね、どーしてもあたしの歌をみんなに聞いて欲しかったんだ。Ｖチューバーを始めたのも、最初はみんなに歌を聴いてもらうためだったんだよ」
line = "「でもね、どーしてもあたしの歌をみんなに聞いて欲しかったんだ。Ｖチューバーを始めたのも、最初はみんなに歌を聴いてもらうためだったんだよ」"

[[dialogue]]
speaker = "ルルカ"
# 「Ｖチューバー活動を続けて、ラッキーなことに有名になれたけれど……」
line = "「Ｖチューバー活動を続けて、ラッキーなことに有名になれたけれど……」"

[[dialogue]]
speaker = "ルルカ"
# 「有名になることが、あたしの目的じゃないんだよね。最初にやりたかったこと、少し忘れちゃってたかも」
line = "「有名になることが、あたしの目的じゃないんだよね。最初にやりたかったこと、少し忘れちゃってたかも」"

[[dialogue]]
speaker = "unk"
# それで、どうして海に行きたいんだ？
line = "それで、どうして海に行きたいんだ？"

[[dialogue]]
speaker = "ルルカ"
# 「あたしにとって、海は特別なの」
line = "「あたしにとって、海は特別なの」"

[[dialogue]]
speaker = "ルルカ"
# 「あたし、子供の頃から泳ぐのがすっごく好きだったんだけど、故郷の街には小さな湖があるだけだったんだよ」
line = "「あたし、子供の頃から泳ぐのがすっごく好きだったんだけど、故郷の街には小さな湖があるだけだったんだよ」"

[[dialogue]]
speaker = "ルルカ"
# 「泳ぐには十分だったから不満はなかったんだけど……ある日ね、お母さんが人間界にある『海』のことを教えてくれたんだ」
line = "「泳ぐには十分だったから不満はなかったんだけど……ある日ね、お母さんが人間界にある『海』のことを教えてくれたんだ」"

[[dialogue]]
speaker = "ルルカ"
# 「……初めて海の動画を見た時、すっごく感動したんだ」
line = "「……初めて海の動画を見た時、すっごく感動したんだ」"

[[dialogue]]
speaker = "ルルカ"
# 「視界いっぱいに広がる海……青く澄み渡ってて、びっくりするくらい綺麗だった。潮の満ち引き、さざなみの音、そこに集まる人たちの笑顔……全部が素敵だった」
line = "「視界いっぱいに広がる海……青く澄み渡ってて、びっくりするくらい綺麗だった。潮の満ち引き、さざなみの音、そこに集まる人たちの笑顔……全部が素敵だった」"

[[dialogue]]
speaker = "ルルカ"
# 「人間界に来てから、もう何度も海には行ってるけど……いつ見ても綺麗だし、見るたびに心が動かされる感じがするんだよ」
line = "「人間界に来てから、もう何度も海には行ってるけど……いつ見ても綺麗だし、見るたびに心が動かされる感じがするんだよ」"

[[dialogue]]
speaker = "ルルカ"
# 「それでね、海を見てると胸の辺りがぞわぞわ～ってして……」
line = "「それでね、海を見てると胸の辺りがぞわぞわ～ってして……」"

[[dialogue]]
speaker = "ルルカ"
# 「──歌いたいなって、思うの」
line = "「──歌いたいなって、思うの」"

[[dialogue]]
speaker = "ルルカ"
# 「……えへへ、なんか言ってることおかしいかも。でも、本当のことなんだよね。海に行くと、歌のインスピレーションが湧くんだよ」
line = "「……えへへ、なんか言ってることおかしいかも。でも、本当のことなんだよね。海に行くと、歌のインスピレーションが湧くんだよ」"

[[dialogue]]
speaker = "ルルカ"
# 「いつか自分の曲を作るなら、絶対に海をモチーフにして歌を作ろうって決めてたんだ」
line = "「いつか自分の曲を作るなら、絶対に海をモチーフにして歌を作ろうって決めてたんだ」"

[[dialogue]]
speaker = "ルルカ"
# 「えっと、その、それでね……歌詞を書くには、テーマが必要なんだよ。テーマ自体は決まってるんだけど、その、体験が欲しいというか、なんというか……」
line = "「えっと、その、それでね……歌詞を書くには、テーマが必要なんだよ。テーマ自体は決まってるんだけど、その、体験が欲しいというか、なんというか……」"

[[dialogue]]
speaker = "unk"
# テーマは何？
line = "テーマは何？"

[[dialogue]]
speaker = "ルルカ"
# 「……恋に、しようかなって思ってるの」
line = "「……恋に、しようかなって思ってるの」"

[[dialogue]]
speaker = "ルルカ"
# 「──あっ！　お、お兄ちゃんと一緒に、海に行きたいっていうのは、えっと、なんていうか偶然？　みたいな感じで、別に変な意味はないっていうか！」
line = "「──あっ！　お、お兄ちゃんと一緒に、海に行きたいっていうのは、えっと、なんていうか偶然？　みたいな感じで、別に変な意味はないっていうか！」"

[[dialogue]]
speaker = "ルルカ"
# 「ルカルカと１番深い関係にあるのはお兄ちゃんじゃん？　だ、だから、恋のことも、お兄ちゃんと一緒にいたほうがわかりやすいんじゃないかなって思ったっていうか──」
line = "「ルカルカと１番深い関係にあるのはお兄ちゃんじゃん？　だ、だから、恋のことも、お兄ちゃんと一緒にいたほうがわかりやすいんじゃないかなって思ったっていうか──」"

[[dialogue]]
speaker = "ルルカ"
# 「……ん。その──ね？」
line = "「……ん。その──ね？」"

[[dialogue]]
speaker = "ルルカ"
# 「お兄ちゃんと一緒に海に行けば、素敵な閃きがいっぱい生まれると思ったんだ」
line = "「お兄ちゃんと一緒に海に行けば、素敵な閃きがいっぱい生まれると思ったんだ」"

[[dialogue]]
speaker = "ルルカ"
# 「──って、えへへ。あたしの都合ばっかりだね。ごめんね、お兄ちゃん」
line = "「──って、えへへ。あたしの都合ばっかりだね。ごめんね、お兄ちゃん」"

[[dialogue]]
speaker = "unk"
# ルルカがどんな曲を作るのか、楽しみだ
line = "ルルカがどんな曲を作るのか、楽しみだ"

[[dialogue]]
speaker = "ルルカ"
# 「──ありがと、本当に優しいね、お兄ちゃんは」
line = "「──ありがと、本当に優しいね、お兄ちゃんは」"

[[dialogue]]
speaker = "ルルカ"
# 「優しくって……いっぱい甘えさせてくれて……頼りがいがあって……」
line = "「優しくって……いっぱい甘えさせてくれて……頼りがいがあって……」"

[[dialogue]]
speaker = "ルルカ"
# 「昔、お母さんに言われたことがあるの。歌が上手になりたいのなら、もっと自分の気持ちを表現することを考えてみたら？　って」
line = "「昔、お母さんに言われたことがあるの。歌が上手になりたいのなら、もっと自分の気持ちを表現することを考えてみたら？　って」"

[[dialogue]]
speaker = "ルルカ"
# 「あの頃は何を言われてるのかぜんぜんだったけど……今は、何となく、わかるかも」
line = "「あの頃は何を言われてるのかぜんぜんだったけど……今は、何となく、わかるかも」"

[[dialogue]]
speaker = "ルルカ"
# 「──うん。あたしにとって特別な海。そこに、お兄ちゃんと一緒に行って、その時に生まれるドキドキを形にすれば……いいんだよね」
line = "「──うん。あたしにとって特別な海。そこに、お兄ちゃんと一緒に行って、その時に生まれるドキドキを形にすれば……いいんだよね」"

[[dialogue]]
speaker = "ルルカ"
# 「ね、お兄ちゃん。あたし、とっても素敵な曲を作るから……その時は」
line = "「ね、お兄ちゃん。あたし、とっても素敵な曲を作るから……その時は」"

[[dialogue]]
speaker = "ルルカ"
# 「絶対、ぜーったい、一番最初に聴いて、感想を教えてね？」
line = "「絶対、ぜーったい、一番最初に聴いて、感想を教えてね？」"
