[[dialogue]]
speaker = "unk"
# 第２話,ナターシャのランチ,P
line = "第２話,ナターシャのランチ,P"

[[dialogue]]
speaker = "unk"
# 昼食を軽く済ませようと思って購買に行くと、珍しい面々がいた。
line = "昼食を軽く済ませようと思って購買に行くと、珍しい面々がいた。"

[[dialogue]]
speaker = "ナターシャ"
# 「ん～、お昼どうしよっかなー……と言いつつ、いつものにしちゃうんだけどね」
line = "「ん～、お昼どうしよっかなー……と言いつつ、いつものにしちゃうんだけどね」"

[[dialogue]]
speaker = "梨緒"
# 「またゼリー飲料か？　手早く飲めるのはいいが、そればかりでは栄養が足りないぞ」
line = "「またゼリー飲料か？　手早く飲めるのはいいが、そればかりでは栄養が足りないぞ」"

[[dialogue]]
speaker = "ベアトリス"
# 「というか、ゼリーだけだと味気なくない？　せっかく流星市国に来たんだから、美味しいもの食べないと人生損だよ」
line = "「というか、ゼリーだけだと味気なくない？　せっかく流星市国に来たんだから、美味しいもの食べないと人生損だよ」"

[[dialogue]]
speaker = "unk"
# 俺もしっかり食べた方がいいと思う
line = "俺もしっかり食べた方がいいと思う"

[[dialogue]]
speaker = "ナターシャ"
# 「おや、会長さん、奇遇だね──って、でもないか。学生がお昼時に購買で会うのは普通のことだし」
line = "「おや、会長さん、奇遇だね──って、でもないか。学生がお昼時に購買で会うのは普通のことだし」"

[[dialogue]]
speaker = "ナターシャ"
# 「だけど、そう言われても何食べていいかわからないんだよ。元々食べ物に興味ない方だから」
line = "「だけど、そう言われても何食べていいかわからないんだよ。元々食べ物に興味ない方だから」"

[[dialogue]]
speaker = "アポロ"
# 「それは難儀だな……。よし！　じゃあそんなナターシャのために、あたしたちが<ruby=ひるめし>昼飯</ruby>を考えてやろうじゃないか！」
line = "「それは難儀だな……。よし！　じゃあそんなナターシャのために、あたしたちが<ruby>昼飯<rt>ひるめし</rt></ruby>を考えてやろうじゃないか！」"

[[dialogue]]
speaker = "unk"
# というわけで、選挙管理委員会のメンバーが、おすすめのメニューをナターシャにプレゼンすることになった。
line = "というわけで、選挙管理委員会のメンバーが、おすすめのメニューをナターシャにプレゼンすることになった。"

[[dialogue]]
speaker = "アポロ"
# 「まずはあたしだ！　一発でナターシャのフェイバリットメニューを決めてやるぜ！」
line = "「まずはあたしだ！　一発でナターシャのフェイバリットメニューを決めてやるぜ！」"

[[dialogue]]
speaker = "ナターシャ"
# 「へぇ、そこまで言うなら期待させてもらおうかな」
line = "「へぇ、そこまで言うなら期待させてもらおうかな」"

[[dialogue]]
speaker = "アポロ"
# 「あたしのおすすめメニューは……鯖の味噌煮定食だ！」
line = "「あたしのおすすめメニューは……鯖の味噌煮定食だ！」"

[[dialogue]]
speaker = "unk"
# いぶし銀なチョイスだ……！
line = "いぶし銀なチョイスだ……！"

[[dialogue]]
speaker = "ナターシャ"
# 「それじゃいただきまーす。あ～ん」
line = "「それじゃいただきまーす。あ～ん」"

[[dialogue]]
speaker = "アポロ"
# 「見た目は地味かもしれないが、美味いんだぜ！　鯖味噌は奥が深いんだ！」
line = "「見た目は地味かもしれないが、美味いんだぜ！　鯖味噌は奥が深いんだ！」"

[[dialogue]]
speaker = "ナターシャ"
# 「ふーん、こんな感じなんだ」
line = "「ふーん、こんな感じなんだ」"

[[dialogue]]
speaker = "アポロ"
# 「反応薄っ！？」
line = "「反応薄っ！？」"

[[dialogue]]
speaker = "ナターシャ"
# 「確かに複雑な味をしてるけど、それ以上は何も思わないかな。感動がなくてごめん」
line = "「確かに複雑な味をしてるけど、それ以上は何も思わないかな。感動がなくてごめん」"

[[dialogue]]
speaker = "ベアトリス"
# 「じゃあ私はこのニンニクたっぷり餃子を──」
line = "「じゃあ私はこのニンニクたっぷり餃子を──」"

[[dialogue]]
speaker = "ナターシャ"
# 「あ、私、匂いの強いものは食べないようにしてるから。暗殺者的に。ごめんね」
line = "「あ、私、匂いの強いものは食べないようにしてるから。暗殺者的に。ごめんね」"

[[dialogue]]
speaker = "ベアトリス"
# 「え～～っ！？」
line = "「え～～っ！？」"

[[dialogue]]
speaker = "ナターシャ"
# 「ていうかベアト、すでにニンニクくさい」
line = "「ていうかベアト、すでにニンニクくさい」"

[[dialogue]]
speaker = "ベアトリス"
# 「ウソっ！？　さっき餃子食べたから！？」
line = "「ウソっ！？　さっき餃子食べたから！？」"

[[dialogue]]
speaker = "unk"
# カフェテリアのメニューとしていいのかな……？
line = "カフェテリアのメニューとしていいのかな……？"

[[dialogue]]
speaker = "梨緒"
# 「ベアトは実食の前に失格か。では私が最後だな」
line = "「ベアトは実食の前に失格か。では私が最後だな」"

[[dialogue]]
speaker = "梨緒"
# 「私のおすすめメニューは……イギリス料理の定番、フィッシュ＆チップスだ。カフェテリアのものはレベルが高いぞ」
line = "「私のおすすめメニューは……イギリス料理の定番、フィッシュ＆チップスだ。カフェテリアのものはレベルが高いぞ」"

[[dialogue]]
speaker = "ナターシャ"
# 「どれどれ……はむ。……うん、魚と芋だね」
line = "「どれどれ……はむ。……うん、魚と芋だね」"

[[dialogue]]
speaker = "梨緒"
# 「くっ……負けた」
line = "「くっ……負けた」"

[[dialogue]]
speaker = "アポロ"
# 「いや勝負じゃないだろ」
line = "「いや勝負じゃないだろ」"

[[dialogue]]
speaker = "unk"
# ３人とも撃沈。万事休すかと思われたが──
line = "３人とも撃沈。万事休すかと思われたが──"

[[dialogue]]
speaker = "ナターシャ"
# 「ん？　梨緒、何か持ってる？」
line = "「ん？　梨緒、何か持ってる？」"

[[dialogue]]
speaker = "梨緒"
# 「ああ、自分で作ったサンドイッチだ。星見家で世話になりっぱなしだから、食費を浮かせようと思ってな。学食よりは安上がりだ」
line = "「ああ、自分で作ったサンドイッチだ。星見家で世話になりっぱなしだから、食費を浮かせようと思ってな。学食よりは安上がりだ」"

[[dialogue]]
speaker = "ナターシャ"
# 「へー、梨緒って意外と料理できるんだ」
line = "「へー、梨緒って意外と料理できるんだ」"

[[dialogue]]
speaker = "梨緒"
# 「いや、サンドイッチくらい誰でも作れるだろう。基本挟むだけだし、シンプルな具なら作るのも簡単だ」
line = "「いや、サンドイッチくらい誰でも作れるだろう。基本挟むだけだし、シンプルな具なら作るのも簡単だ」"

[[dialogue]]
speaker = "ベアトリス"
# 「世の中にはその『くらい』ができない人もいるんだよ！」
line = "「世の中にはその『くらい』ができない人もいるんだよ！」"

[[dialogue]]
speaker = "アポロ"
# 「ベアト、サンドイッチ作れないのか……」
line = "「ベアト、サンドイッチ作れないのか……」"

[[dialogue]]
speaker = "ベアトリス"
# 「だって私が挟むと崩れちゃうんだも～んっ」
line = "「だって私が挟むと崩れちゃうんだも～んっ」"

[[dialogue]]
speaker = "梨緒"
# 「コツならあとで教える……。で、このサンドイッチがどうした？」
line = "「コツならあとで教える……。で、このサンドイッチがどうした？」"

[[dialogue]]
speaker = "ナターシャ"
# 「それもらっていい？」
line = "「それもらっていい？」"

[[dialogue]]
speaker = "梨緒"
# 「別に構わないが……何の変哲もない、ハムとチーズのサンドイッチだぞ？」
line = "「別に構わないが……何の変哲もない、ハムとチーズのサンドイッチだぞ？」"

[[dialogue]]
speaker = "ナターシャ"
# 「うん、それがいいの。ちょうだい？」
line = "「うん、それがいいの。ちょうだい？」"

[[dialogue]]
speaker = "梨緒"
# 「そこまで言うならいいが……口に合わなくても知らないからな」
line = "「そこまで言うならいいが……口に合わなくても知らないからな」"

[[dialogue]]
speaker = "ナターシャ"
# 「ありがと。……あ～ん。あむあむ」
line = "「ありがと。……あ～ん。あむあむ」"

[[dialogue]]
speaker = "ナターシャ"
# 「うん、悪くないね」
line = "「うん、悪くないね」"

[[dialogue]]
speaker = "梨緒"
# 「そうか？　特にナターシャが気に入る要素はなかったと思うんだが……」
line = "「そうか？　特にナターシャが気に入る要素はなかったと思うんだが……」"

[[dialogue]]
speaker = "ナターシャ"
# 「味は普通なんだけど、梨緒のサンドイッチだと思うと、なんかいいなって」
line = "「味は普通なんだけど、梨緒のサンドイッチだと思うと、なんかいいなって」"

[[dialogue]]
speaker = "梨緒"
# 「ナターシャ……」
line = "「ナターシャ……」"

[[dialogue]]
speaker = "ナターシャ"
# 「梨緒が朝早く起きて作るの想像したら、苦労の味がするよね」
line = "「梨緒が朝早く起きて作るの想像したら、苦労の味がするよね」"

[[dialogue]]
speaker = "梨緒"
# 「ナターシャ！」
line = "「ナターシャ！」"

[[dialogue]]
speaker = "アポロ"
# 「梨緒のサンドイッチか、あたしも気になるな。ちょっとくれ」
line = "「梨緒のサンドイッチか、あたしも気になるな。ちょっとくれ」"

[[dialogue]]
speaker = "ベアトリス"
# 「あ、私も欲しいなー」
line = "「あ、私も欲しいなー」"

[[dialogue]]
speaker = "梨緒"
# 「そもそも私の昼食なんだが……まぁいいか。普通のサンドイッチでよければ食べてくれ」
line = "「そもそも私の昼食なんだが……まぁいいか。普通のサンドイッチでよければ食べてくれ」"

[[dialogue]]
speaker = "ナターシャ"
# 「じゃあ私ももうひとつ」
line = "「じゃあ私ももうひとつ」"

[[dialogue]]
speaker = "梨緒"
# 「ナターシャは食べすぎだ。私の分がなくなるだろ」
line = "「ナターシャは食べすぎだ。私の分がなくなるだろ」"

[[dialogue]]
speaker = "ナターシャ"
# 「ちぇっ。梨緒のケチー」
line = "「ちぇっ。梨緒のケチー」"

[[dialogue]]
speaker = "unk"
# 梨緒のサンドイッチを分け合う選挙管理委員会の４人。
line = "梨緒のサンドイッチを分け合う選挙管理委員会の４人。"

[[dialogue]]
speaker = "unk"
# 味は普通と言いつつも、ナターシャの笑みはまんざらでもなさそうだった。
line = "味は普通と言いつつも、ナターシャの笑みはまんざらでもなさそうだった。"
