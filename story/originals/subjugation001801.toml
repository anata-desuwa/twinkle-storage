[[dialogue]]
speaker = "unk"
# ──１２月。クリスマスが近づいてきたある日のこと。
line = "──１２月。クリスマスが近づいてきたある日のこと。"

[[dialogue]]
speaker = "リップル"
# 「う～ん……ヒマで～す。ヒマすぎま～す……」
line = "「う～ん……ヒマで～す。ヒマすぎま～す……」"

[[dialogue]]
speaker = "リップル"
# 「お客さんが少ないで～す……このままではワタシのドリームが達成デキませーん……」
line = "「お客さんが少ないで～す……このままではワタシのドリームが達成デキませーん……」"

[[dialogue]]
speaker = "リップル"
# 「ワタシの夢は、ハッピーなリゾート結界で全世界で覆って、エンドレスサマーを完成させるコト……」
line = "「ワタシの夢は、ハッピーなリゾート結界で全世界で覆って、エンドレスサマーを完成させるコト……」"

[[dialogue]]
speaker = "リップル"
# 「でも人が来てくれナイと、リゾート結界は大きくナリませーん……」
line = "「でも人が来てくれナイと、リゾート結界は大きくナリませーん……」"

[[dialogue]]
speaker = "紅明"
# 「そりゃもう冬だからねぇ～。それにクリスマスも間近だし～」
line = "「そりゃもう冬だからねぇ～。それにクリスマスも間近だし～」"

[[dialogue]]
speaker = "リップル"
# 「う～ん、クリスマスのことよくワカらないです……。ケーキを食べてプレゼントをもらうのは知ってるんデスが……」
line = "「う～ん、クリスマスのことよくワカらないです……。ケーキを食べてプレゼントをもらうのは知ってるんデスが……」"

[[dialogue]]
speaker = "紅明"
# 「リプるんクリスマスを知らないの！？　あ～でもそっか……リプるんは長い間結界の中で封印されてたんだもんね」
line = "「リプるんクリスマスを知らないの！？　あ～でもそっか……リプるんは長い間結界の中で封印されてたんだもんね」"

[[dialogue]]
speaker = "リップル"
# 「そうナンです！　ズーっと結界の中で眠っていたので、知らないコトばっかりでーす！」
line = "「そうナンです！　ズーっと結界の中で眠っていたので、知らないコトばっかりでーす！」"

[[dialogue]]
speaker = "リップル"
# 「シショーのところで、ケーキとチキンを食べた記憶はあるのデスが、普通のパーティーとどうチガウのでしょー？」
line = "「シショーのところで、ケーキとチキンを食べた記憶はあるのデスが、普通のパーティーとどうチガウのでしょー？」"

[[dialogue]]
speaker = "リップル"
# 「よかったら、クリスマスについてオシエテくれませんか？　ソナエあればウレシイナです！」
line = "「よかったら、クリスマスについてオシエテくれませんか？　ソナエあればウレシイナです！」"

[[dialogue]]
speaker = "紅明"
# 「それを言うなら、備えあればウレイなし、だぜ！　でもウレイってアタシもよく分かんない！」
line = "「それを言うなら、備えあればウレイなし、だぜ！　でもウレイってアタシもよく分かんない！」"

[[dialogue]]
speaker = "リップル"
# 「ソレヨリも、本題はクリスマスでーす！　クリスマスってそもそもナニモノですか？」
line = "「ソレヨリも、本題はクリスマスでーす！　クリスマスってそもそもナニモノですか？」"

[[dialogue]]
speaker = "紅明"
# 「クリスマスは冬のイベントだよ♪　みんなでウェーイ♪　イェーイ☆　って感じでパーティーするの！　合言葉は……メリ～クリスマ～ス☆」
line = "「クリスマスは冬のイベントだよ♪　みんなでウェーイ♪　イェーイ☆　って感じでパーティーするの！　合言葉は……メリ～クリスマ～ス☆」"

[[dialogue]]
speaker = "リップル"
# 「？？？　まるで意味がワカらないです！」
line = "「？？？　まるで意味がワカらないです！」"

[[dialogue]]
speaker = "紅明"
# 「サンタクロースっておじさんがプレゼントをくれてハッピー！　トナカイのソリに乗って世界を駆け巡るんだぜ☆」
line = "「サンタクロースっておじさんがプレゼントをくれてハッピー！　トナカイのソリに乗って世界を駆け巡るんだぜ☆」"

[[dialogue]]
speaker = "リップル"
# 「サンタクロース！？　新しいキャラクターが出てキマした！　ますますワカらないです！」
line = "「サンタクロース！？　新しいキャラクターが出てキマした！　ますますワカらないです！」"

[[dialogue]]
speaker = "紅明"
# 「ごめんリプるん！　アタシ説明下手だから！　これ以上はクリスマスの達人に聞いて！」
line = "「ごめんリプるん！　アタシ説明下手だから！　これ以上はクリスマスの達人に聞いて！」"

[[dialogue]]
speaker = "リップル"
# 「クリスマスのタツジン？　そんな人思い浮カビませーん！」
line = "「クリスマスのタツジン？　そんな人思い浮カビませーん！」"

[[dialogue]]
speaker = "紅明"
# 「じゃあ頭のいい人！　本とかいっぱい読んでて知識豊富な感じの！」
line = "「じゃあ頭のいい人！　本とかいっぱい読んでて知識豊富な感じの！」"

[[dialogue]]
speaker = "リップル"
# 「本……本を読む人なら……モネですネ！　モネならきっとクリスマスのゴクイを教えてくれるハズです！」
line = "「本……本を読む人なら……モネですネ！　モネならきっとクリスマスのゴクイを教えてくれるハズです！」"

[[dialogue]]
speaker = "リップル"
# 「モネはワタシの知らないコト、たくさん教えてくれマス。ワタシ、モネのことスキでーす！」
line = "「モネはワタシの知らないコト、たくさん教えてくれマス。ワタシ、モネのことスキでーす！」"

[[dialogue]]
speaker = "紅明"
# 「モネちんとはクラスメイトなんだっけ。じゃあさっそく行ってきな！　ここはアタシに任せて！」
line = "「モネちんとはクラスメイトなんだっけ。じゃあさっそく行ってきな！　ここはアタシに任せて！」"

[[dialogue]]
speaker = "リップル"
# 「アリガトございます！　モネを探す旅へレッツゴーです！」
line = "「アリガトございます！　モネを探す旅へレッツゴーです！」"

[[dialogue]]
speaker = "unk"
# 一方その頃──
line = "一方その頃──"

[[dialogue]]
speaker = "モネ"
# 「む、むむむ無理です！　私に人工戦闘服なんて無理です！　というか──」
line = "「む、むむむ無理です！　私に人工戦闘服なんて無理です！　というか──」"

[[dialogue]]
speaker = "モネ"
# 「水着サンタクロースなんて恥ずかしすぎますよ～～～！！！」
line = "「水着サンタクロースなんて恥ずかしすぎますよ～～～！！！」"

[[dialogue]]
speaker = "ヘレナ"
# 「──無理、とな。この九浄ヘレナに物申すというのか？」
line = "「──無理、とな。この九浄ヘレナに物申すというのか？」"

[[dialogue]]
speaker = "モネ"
# 「いえいえいえ！！　そんな滅相もございません！　やらせていただきます！　むしろやらせてください！」
line = "「いえいえいえ！！　そんな滅相もございません！　やらせていただきます！　むしろやらせてください！」"

[[dialogue]]
speaker = "ヘレナ"
# 「ぷっ……ふふっ、ふふふっ♪　冗談に決まっているだろう♪」
line = "「ぷっ……ふふっ、ふふふっ♪　冗談に決まっているだろう♪」"

[[dialogue]]
speaker = "モネ"
# 「へ？」
line = "「へ？」"

[[dialogue]]
speaker = "ヘレナ"
# 「別に命令するつもりなど毛頭ない。ただ貴殿に可能性を感じたのだ」
line = "「別に命令するつもりなど毛頭ない。ただ貴殿に可能性を感じたのだ」"

[[dialogue]]
speaker = "モネ"
# 「可能性……ですか？　プリマステラにもなれていない私にですか？」
line = "「可能性……ですか？　プリマステラにもなれていない私にですか？」"

[[dialogue]]
speaker = "ヘレナ"
# 「うむ。プリマステラになれずとも、貴殿は確かに星力の輝きを宿している。その光がまだ蕾ほどの大きさだろうとも、いつか花開くと信じている」
line = "「うむ。プリマステラになれずとも、貴殿は確かに星力の輝きを宿している。その光がまだ蕾ほどの大きさだろうとも、いつか花開くと信じている」"

[[dialogue]]
speaker = "モネ"
# 「ヘレナさん……！　そんなに私のことを信じて……！」
line = "「ヘレナさん……！　そんなに私のことを信じて……！」"

[[dialogue]]
speaker = "ヘレナ"
# （実のところ、水着サンタのデザインが彼女に似合うと感じたからなのだが。まぁ嘘は言っていないから問題あるまい）
line = "（実のところ、水着サンタのデザインが彼女に似合うと感じたからなのだが。まぁ嘘は言っていないから問題あるまい）"

[[dialogue]]
speaker = "モネ"
# 「ですけど、やっぱり恥ずかしいものは恥ずかしいです……！　大体なんでクリスマス服と水着のミックスなんですか！？　季節感を大切にしましょう！」
line = "「ですけど、やっぱり恥ずかしいものは恥ずかしいです……！　大体なんでクリスマス服と水着のミックスなんですか！？　季節感を大切にしましょう！」"

[[dialogue]]
speaker = "ヘレナ"
# 「別にサンタが水着を着ていてもおかしくはないだろう。海の向こうでは、夏にサンタがサーフィンをしているのだぞ？」
line = "「別にサンタが水着を着ていてもおかしくはないだろう。海の向こうでは、夏にサンタがサーフィンをしているのだぞ？」"

[[dialogue]]
speaker = "モネ"
# 「この国は普通に今冬ですけど！？」
line = "「この国は普通に今冬ですけど！？」"

[[dialogue]]
speaker = "ヘレナ"
# 「まあよいではないか。クリスマスには水着のサンタだと私の魂が叫ぶのだ。このヘレナちゃんソウルは最早誰にも止められん」
line = "「まあよいではないか。クリスマスには水着のサンタだと私の魂が叫ぶのだ。このヘレナちゃんソウルは最早誰にも止められん」"

[[dialogue]]
speaker = "ヘレナ"
# 「それにこの話は貴殿にとって悪いことばかりではないぞ。とっておきの報酬も考えているからな」
line = "「それにこの話は貴殿にとって悪いことばかりではないぞ。とっておきの報酬も考えているからな」"

[[dialogue]]
speaker = "モネ"
# 「とっておきの報酬……ですか？」
line = "「とっておきの報酬……ですか？」"

[[dialogue]]
speaker = "ヘレナ"
# 「ああ、もし、貴殿がこの人工戦闘服のテスターを受けると言うならば……九浄家秘蔵の書庫を解放してやろう！」
line = "「ああ、もし、貴殿がこの人工戦闘服のテスターを受けると言うならば……九浄家秘蔵の書庫を解放してやろう！」"

[[dialogue]]
speaker = "モネ"
# 「くくく九浄家の蔵書を読み漁ってもいいんですか！？　好きなだけ！！」
line = "「くくく九浄家の蔵書を読み漁ってもいいんですか！？　好きなだけ！！」"

[[dialogue]]
speaker = "ヘレナ"
# 「無論だ。貴殿が嫌になるまで読み尽くすがいい」
line = "「無論だ。貴殿が嫌になるまで読み尽くすがいい」"

[[dialogue]]
speaker = "モネ"
# 「嫌になんてなるわけがありませんよ！　同じ本も読み直す度に違った味わいがありますし本たちも手に取る度に喜んでくれて──」
line = "「嫌になんてなるわけがありませんよ！　同じ本も読み直す度に違った味わいがありますし本たちも手に取る度に喜んでくれて──」"

[[dialogue]]
speaker = "モネ"
# 「──はっ！　すみません、１人で興奮してしまって……」
line = "「──はっ！　すみません、１人で興奮してしまって……」"

[[dialogue]]
speaker = "ヘレナ"
# 「よい。学園の理事長としても、生徒の生き生きとした姿を見るのは喜ばしいことである」
line = "「よい。学園の理事長としても、生徒の生き生きとした姿を見るのは喜ばしいことである」"

[[dialogue]]
speaker = "ヘレナ"
# 「……して、モネよ。改めて問おう。人工戦闘服のテスターを引き受けてくれるか？」
line = "「……して、モネよ。改めて問おう。人工戦闘服のテスターを引き受けてくれるか？」"

[[dialogue]]
speaker = "モネ"
# 「はい！　やらせてください！　まだ見ぬ本たちのため……いえ、学園の未来のために！」
line = "「はい！　やらせてください！　まだ見ぬ本たちのため……いえ、学園の未来のために！」"

[[dialogue]]
speaker = "ヘレナ"
# 「うむ、よく言った。貴殿がテスターを引き受けてくれると信じていたぞ」
line = "「うむ、よく言った。貴殿がテスターを引き受けてくれると信じていたぞ」"

[[dialogue]]
speaker = "ヘレナ"
# 「それではモネよ、水着サンタクロースとして星騎士の使命を全うするのだ！」
line = "「それではモネよ、水着サンタクロースとして星騎士の使命を全うするのだ！」"

[[dialogue]]
speaker = "モネ"
# 「はい！　私、がんばります！」
line = "「はい！　私、がんばります！」"
