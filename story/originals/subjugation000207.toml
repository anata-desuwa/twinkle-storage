[[dialogue]]
speaker = "unk"
# サバイバル合宿もあっという間に４日目――最終日を迎えた。
line = "サバイバル合宿もあっという間に４日目――最終日を迎えた。"

[[dialogue]]
speaker = "サーシャ"
# 「あら♪　いい手応えが来たわ。これは大きいかも～♪」
line = "「あら♪　いい手応えが来たわ。これは大きいかも～♪」"

[[dialogue]]
speaker = "アナ"
# 「釣り糸がかなり荒ぶってますね。お姉ちゃん……じゃなかったサーシャ先輩、手伝いましょうか？」
line = "「釣り糸がかなり荒ぶってますね。お姉ちゃん……じゃなかったサーシャ先輩、手伝いましょうか？」"

[[dialogue]]
speaker = "サーシャ"
# 「大丈夫よ。見てて……え～いっ！」
line = "「大丈夫よ。見てて……え～いっ！」"

[[dialogue]]
speaker = "サーシャ"
# 「取ったど～♪」
line = "「取ったど～♪」"

[[dialogue]]
speaker = "アナ"
# 「おぉ～っ、お見事……！　この魚は凄いですよ……！」
line = "「おぉ～っ、お見事……！　この魚は凄いですよ……！」"

[[dialogue]]
speaker = "アナ"
# 「この合宿１番の大物です。写真を撮っておくべきかと」
line = "「この合宿１番の大物です。写真を撮っておくべきかと」"

[[dialogue]]
speaker = "サーシャ"
# 「本当？　嬉しいわ～♪　じゃあ、アナちゃんも会長くんも一緒に、記念撮影しましょ♪」
line = "「本当？　嬉しいわ～♪　じゃあ、アナちゃんも会長くんも一緒に、記念撮影しましょ♪」"

[[dialogue]]
speaker = "アナ"
# 「それでは、ＤＩＳＣのセットは私が。２人共並んで下さい」
line = "「それでは、ＤＩＳＣのセットは私が。２人共並んで下さい」"

[[dialogue]]
speaker = "アナ"
# 「はい、５秒カウント行きますよ～」
line = "「はい、５秒カウント行きますよ～」"

[[dialogue]]
speaker = "サーシャ"
# 「いぇ～い♪　２人共、ぎゅ～っ<emoji=heart04>」
line = "「いぇ～い♪　２人共、ぎゅ～っ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# サーシャさん、胸が顔に当たってます、胸が！
line = "サーシャさん、胸が顔に当たってます、胸が！"

[[dialogue]]
speaker = "アナ"
# 「チーズです。ぶい」
line = "「チーズです。ぶい」"

[[dialogue]]
speaker = "アナ"
# 「――よし、ついに上手く焼けましたよ。見て下さい、サーシャ先輩」
line = "「――よし、ついに上手く焼けましたよ。見て下さい、サーシャ先輩」"

[[dialogue]]
speaker = "サーシャ"
# 「あら～♪　おめでとう、アナちゃん。焼き魚、成功ね～！」
line = "「あら～♪　おめでとう、アナちゃん。焼き魚、成功ね～！」"

[[dialogue]]
speaker = "アナ"
# 「いただきます。……もぐもぐ」
line = "「いただきます。……もぐもぐ」"

[[dialogue]]
speaker = "アナ"
# 「おぉ～……自分で焼いた魚、何だか美味しく感じます」
line = "「おぉ～……自分で焼いた魚、何だか美味しく感じます」"

[[dialogue]]
speaker = "アナ"
# 「和菓子を初めて口にした時のような、感動の味です……！」
line = "「和菓子を初めて口にした時のような、感動の味です……！」"

[[dialogue]]
speaker = "サーシャ"
# 「うふふ♪　自分で上手く料理が出来ると、嬉しいわよね～。今度は和菓子の手作りとか、一緒にやってみる？」
line = "「うふふ♪　自分で上手く料理が出来ると、嬉しいわよね～。今度は和菓子の手作りとか、一緒にやってみる？」"

[[dialogue]]
speaker = "アナ"
# 「なるほど。頑張れば自分でも料理が出来ると分かった以上、和菓子を作らないという選択肢はないです」
line = "「なるほど。頑張れば自分でも料理が出来ると分かった以上、和菓子を作らないという選択肢はないです」"

[[dialogue]]
speaker = "アナ"
# 「今度、是非教えて下さい」
line = "「今度、是非教えて下さい」"

[[dialogue]]
speaker = "サーシャ"
# 「ならヴィーナスちゃんとマトイちゃんも誘って、皆でやりましょうか。マトイちゃんはお菓子作り得意だから、頼りになるはずよ」
line = "「ならヴィーナスちゃんとマトイちゃんも誘って、皆でやりましょうか。マトイちゃんはお菓子作り得意だから、頼りになるはずよ」"

[[dialogue]]
speaker = "サーシャ"
# 「もちろん会長くんもね。和菓子作りも、実はやったことあるんじゃないかしら？」
line = "「もちろん会長くんもね。和菓子作りも、実はやったことあるんじゃないかしら？」"

[[dialogue]]
speaker = "unk"
# 任せて下さい。バイトで経験あるので！
line = "任せて下さい。バイトで経験あるので！"

[[dialogue]]
speaker = "サーシャ"
# 「うふふ、やっぱり～♪」
line = "「うふふ、やっぱり～♪」"

[[dialogue]]
speaker = "アナ"
# 「なんと……！　会長、和菓子を手作り出来るんですか……！？」
line = "「なんと……！　会長、和菓子を手作り出来るんですか……！？」"

[[dialogue]]
speaker = "アナ"
# 「会長が急に男性として、魅力的に思えてきました」
line = "「会長が急に男性として、魅力的に思えてきました」"

[[dialogue]]
speaker = "サーシャ"
# 「あらあら、現金ね～♪」
line = "「あらあら、現金ね～♪」"

[[dialogue]]
speaker = "unk"
# そんなこんなで昼食を終えた後。
line = "そんなこんなで昼食を終えた後。"

[[dialogue]]
speaker = "unk"
# 合宿を終わらせる為、数日過ごしたテントを片付けることになった。
line = "合宿を終わらせる為、数日過ごしたテントを片付けることになった。"

[[dialogue]]
speaker = "サーシャ"
# 「サバイバル合宿、気付けばあっという間に終わっちゃったわね～」
line = "「サバイバル合宿、気付けばあっという間に終わっちゃったわね～」"

[[dialogue]]
speaker = "アナ"
# 「ええ。充実した数日間でした」
line = "「ええ。充実した数日間でした」"

[[dialogue]]
speaker = "アナ"
# 「サーシャ先輩は、どうでしたか？　サバイバルの雰囲気だけでも、楽しむことができましたか？」
line = "「サーシャ先輩は、どうでしたか？　サバイバルの雰囲気だけでも、楽しむことができましたか？」"

[[dialogue]]
speaker = "サーシャ"
# 「それはもう♪　最初は冗談のつもりで口にしたサバイバル合宿だったけど、やってみたかったのは本当だったし――」
line = "「それはもう♪　最初は冗談のつもりで口にしたサバイバル合宿だったけど、やってみたかったのは本当だったし――」"

[[dialogue]]
speaker = "サーシャ"
# 「アナちゃんがしようって誘ってくれたおかげで、夏の楽しい思い出ができたわ。ありがとう♪」
line = "「アナちゃんがしようって誘ってくれたおかげで、夏の楽しい思い出ができたわ。ありがとう♪」"

[[dialogue]]
speaker = "アナ"
# 「それなら良かったです。そのついでといっては何ですが――」
line = "「それなら良かったです。そのついでといっては何ですが――」"

[[dialogue]]
speaker = "アナ"
# 「サーシャ先輩、会長。もう１つだけ、私のやりたいことに付き合って頂けませんか？」
line = "「サーシャ先輩、会長。もう１つだけ、私のやりたいことに付き合って頂けませんか？」"

[[dialogue]]
speaker = "サーシャ"
# 「え？」
line = "「え？」"

[[dialogue]]
speaker = "アナ"
# 「最後のレクリエーションがあるんです」
line = "「最後のレクリエーションがあるんです」"
