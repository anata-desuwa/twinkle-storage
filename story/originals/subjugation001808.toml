[[dialogue]]
speaker = "リップル"
# 「モネ！　早く遊びましょう！　レッツゴーです！」
line = "「モネ！　早く遊びましょう！　レッツゴーです！」"

[[dialogue]]
speaker = "モネ"
# 「リップルさん、手を引っ張らないでください～っ」
line = "「リップルさん、手を引っ張らないでください～っ」"

[[dialogue]]
speaker = "リップル"
# 「ゴメンなさい、ついテンション上がってシマッテ……えへへ」
line = "「ゴメンなさい、ついテンション上がってシマッテ……えへへ」"

[[dialogue]]
speaker = "モネ"
# 「気持ちはわかりますけど……別に逃げたりしませんから。私もリップルさんと遊ぶの楽しみにしてましたし」
line = "「気持ちはわかりますけど……別に逃げたりしませんから。私もリップルさんと遊ぶの楽しみにしてましたし」"

[[dialogue]]
speaker = "リップル"
# 「モネ！　嬉しいです！　ギュ～～～～っとハグしちゃいます！」
line = "「モネ！　嬉しいです！　ギュ～～～～っとハグしちゃいます！」"

[[dialogue]]
speaker = "モネ"
# 「うぎゅ……リップルさん、苦しい……苦しいですから……」
line = "「うぎゅ……リップルさん、苦しい……苦しいですから……」"

[[dialogue]]
speaker = "リップル"
# 「えへへ……それはモネの照れ隠しってワカってますから、離シマせん～」
line = "「えへへ……それはモネの照れ隠しってワカってますから、離シマせん～」"

[[dialogue]]
speaker = "モネ"
# 「うっ、バレてる……でもでも、やっぱりハグはまだ恥ずかしいです～」
line = "「うっ、バレてる……でもでも、やっぱりハグはまだ恥ずかしいです～」"

[[dialogue]]
speaker = "リップル"
# 「ダイジョーブです！　きっとスグにハグも慣れま～す！」
line = "「ダイジョーブです！　きっとスグにハグも慣れま～す！」"

[[dialogue]]
speaker = "モネ"
# 「そうですかね……私もリップルさんとハグすること自体は嫌いじゃないですけど……」
line = "「そうですかね……私もリップルさんとハグすること自体は嫌いじゃないですけど……」"

[[dialogue]]
speaker = "リップル"
# 「えへへ……ワタシもモネとハグするのダイスキです！　ソレに……チュッ♪」
line = "「えへへ……ワタシもモネとハグするのダイスキです！　ソレに……チュッ♪」"

[[dialogue]]
speaker = "モネ"
# 「────！！？？」
line = "「────！！？？」"

[[dialogue]]
speaker = "リップル"
# 「ホッペにチューです♪　シンアイのアカシでーす。どうデスか？　嬉しいデスか？」
line = "「ホッペにチューです♪　シンアイのアカシでーす。どうデスか？　嬉しいデスか？」"

[[dialogue]]
speaker = "モネ"
# 「り、りりりリップルさん！　そういうのは気軽にやっちゃダメですから！」
line = "「り、りりりリップルさん！　そういうのは気軽にやっちゃダメですから！」"

[[dialogue]]
speaker = "リップル"
# 「モネが持ってキテくれた本に、チューは挨拶って書いてマシた！」
line = "「モネが持ってキテくれた本に、チューは挨拶って書いてマシた！」"

[[dialogue]]
speaker = "リップル"
# 「それにモネのコトはダイスキですし、大切な人ですよ？　だからちゅーしてもオッケーです！」
line = "「それにモネのコトはダイスキですし、大切な人ですよ？　だからちゅーしてもオッケーです！」"

[[dialogue]]
speaker = "モネ"
# 「そ、そういう好きとか大切じゃなくて、ＬＯＶＥとかそういう感じの……」
line = "「そ、そういう好きとか大切じゃなくて、ＬＯＶＥとかそういう感じの……」"

[[dialogue]]
speaker = "リップル"
# 「やっぱり問題ナッシングです！　モネへのダイスキはＢＩＧＬＯＶＥで～す！」
line = "「やっぱり問題ナッシングです！　モネへのダイスキはＢＩＧＬＯＶＥで～す！」"

[[dialogue]]
speaker = "モネ"
# 「えええっ！？」
line = "「えええっ！？」"

[[dialogue]]
speaker = "unk"
# 知らない間に２人がすごく仲良くなってる！
line = "知らない間に２人がすごく仲良くなってる！"

[[dialogue]]
speaker = "モネ"
# 「かかかかかか会長！！？？　どうしてここに！！」
line = "「かかかかかか会長！！？？　どうしてここに！！」"

[[dialogue]]
speaker = "リップル"
# 「カイチョー！　ラッシャッセーでーす！」
line = "「カイチョー！　ラッシャッセーでーす！」"

[[dialogue]]
speaker = "モネ"
# 「もしかして、さっきの見てましたか！？　見てないですよね会長！」
line = "「もしかして、さっきの見てましたか！？　見てないですよね会長！」"

[[dialogue]]
speaker = "unk"
# ええと……ノーコメントで
line = "ええと……ノーコメントで"

[[dialogue]]
speaker = "モネ"
# 「ガーン……絶対に見られてた……会長にキスの現場を見られるなんて……」
line = "「ガーン……絶対に見られてた……会長にキスの現場を見られるなんて……」"

[[dialogue]]
speaker = "リップル"
# 「ダイジョーブです！　ワタシたちにやましいコトなんて何もナイです！」
line = "「ダイジョーブです！　ワタシたちにやましいコトなんて何もナイです！」"

[[dialogue]]
speaker = "リップル"
# 「ただチョット、他のみんなよりもラブラブなだけデスから♪」
line = "「ただチョット、他のみんなよりもラブラブなだけデスから♪」"

[[dialogue]]
speaker = "モネ"
# 「リップルさん！　その言い方は誤解を招きますから！」
line = "「リップルさん！　その言い方は誤解を招きますから！」"

[[dialogue]]
speaker = "リップル"
# 「誤解されてもダイジョーブです♪　ワタシは覚悟デキてますヨ♪」
line = "「誤解されてもダイジョーブです♪　ワタシは覚悟デキてますヨ♪」"

[[dialogue]]
speaker = "モネ"
# 「やっぱりリップルさん、分かってて言ってますよね！？」
line = "「やっぱりリップルさん、分かってて言ってますよね！？」"

[[dialogue]]
speaker = "モネ"
# 「でも、どうして会長がリゾート結界に……？」
line = "「でも、どうして会長がリゾート結界に……？」"

[[dialogue]]
speaker = "unk"
# ヘレナちゃんから様子を見てきてって頼まれて
line = "ヘレナちゃんから様子を見てきてって頼まれて"

[[dialogue]]
speaker = "モネ"
# 「あ……そうでした。報告がまだでした……」
line = "「あ……そうでした。報告がまだでした……」"

[[dialogue]]
speaker = "モネ"
# 「水着サンタの戦闘服ですが、リゾート結界でトレーニングしたおかげで使いこなせるようになりました」
line = "「水着サンタの戦闘服ですが、リゾート結界でトレーニングしたおかげで使いこなせるようになりました」"

[[dialogue]]
speaker = "モネ"
# 「こうして変身できるようになりましたし、新しい星術も使えるようになりました」
line = "「こうして変身できるようになりましたし、新しい星術も使えるようになりました」"

[[dialogue]]
speaker = "モネ"
# 「海で泳いだり、ビーチで遊ぶのも好きになって……全部リップルさんのおかげですね」
line = "「海で泳いだり、ビーチで遊ぶのも好きになって……全部リップルさんのおかげですね」"

[[dialogue]]
speaker = "リップル"
# 「ユージョーパワーです♪　イェー♪」
line = "「ユージョーパワーです♪　イェー♪」"

[[dialogue]]
speaker = "モネ"
# 「いぇー♪」
line = "「いぇー♪」"

[[dialogue]]
speaker = "unk"
# ２人が仲良くなってよかった
line = "２人が仲良くなってよかった"

[[dialogue]]
speaker = "リップル"
# 「ワタシたち、同じクラスだったですケド、クリスマスを通じても～っとナカヨシにナッタんです！」
line = "「ワタシたち、同じクラスだったですケド、クリスマスを通じても～っとナカヨシにナッタんです！」"

[[dialogue]]
speaker = "モネ"
# 「そうですね。あの日リップルさんが私に声をかけてくれなかったら、こんなに仲良しにはなれてなかったです」
line = "「そうですね。あの日リップルさんが私に声をかけてくれなかったら、こんなに仲良しにはなれてなかったです」"

[[dialogue]]
speaker = "リップル"
# 「クリスマスにはＢＩＧ感謝で～す♪　モネもリゾート結界の常連さんにナッテくれましたし♪」
line = "「クリスマスにはＢＩＧ感謝で～す♪　モネもリゾート結界の常連さんにナッテくれましたし♪」"

[[dialogue]]
speaker = "リップル"
# 「水着サンタを使いこなせるようにナッテも、リゾート結界に来てクダさいね？」
line = "「水着サンタを使いこなせるようにナッテも、リゾート結界に来てクダさいね？」"

[[dialogue]]
speaker = "モネ"
# 「はい。リップルさんに会いに来ますよ」
line = "「はい。リップルさんに会いに来ますよ」"

[[dialogue]]
speaker = "リップル"
# 「モネ～♪」
line = "「モネ～♪」"

[[dialogue]]
speaker = "モネ"
# 「もうリップルさん、またくっついて……」
line = "「もうリップルさん、またくっついて……」"

[[dialogue]]
speaker = "リップル"
# 「だってだって、嬉しいデスから！」
line = "「だってだって、嬉しいデスから！」"

[[dialogue]]
speaker = "モネ"
# 「私がここに来なくても、最近はリップルさんが図書館に来るじゃないですか」
line = "「私がここに来なくても、最近はリップルさんが図書館に来るじゃないですか」"

[[dialogue]]
speaker = "リップル"
# 「モネのおかげで本にもハマれました！　図書館でもリゾート結界でもモネにアイタイです」
line = "「モネのおかげで本にもハマれました！　図書館でもリゾート結界でもモネにアイタイです」"

[[dialogue]]
speaker = "モネ"
# 「リップルさんてば……ふふ、仕方ないですね」
line = "「リップルさんてば……ふふ、仕方ないですね」"

[[dialogue]]
speaker = "unk"
# なんだか間に挟まってはいけない空気感……
line = "なんだか間に挟まってはいけない空気感……"

[[dialogue]]
speaker = "リップル"
# 「間に挟まる……？　カイチョーもワタシたちとハグしたいデスか？」
line = "「間に挟まる……？　カイチョーもワタシたちとハグしたいデスか？」"

[[dialogue]]
speaker = "モネ"
# 「そそ、そんな格好で会長とハグなんてダメですぅ～っ！？」
line = "「そそ、そんな格好で会長とハグなんてダメですぅ～っ！？」"

[[dialogue]]
speaker = "リップル"
# 「それはワタシのハグをモネが独占したいってコトです？　モネってば嫉妬ブカイですね～♪」
line = "「それはワタシのハグをモネが独占したいってコトです？　モネってば嫉妬ブカイですね～♪」"

[[dialogue]]
speaker = "モネ"
# 「ああいえ、そういうわけじゃっ」
line = "「ああいえ、そういうわけじゃっ」"

[[dialogue]]
speaker = "リップル"
# 「やっぱりモネは嫉妬ブカイです♪　もぉカワイイですね～♪」
line = "「やっぱりモネは嫉妬ブカイです♪　もぉカワイイですね～♪」"

[[dialogue]]
speaker = "モネ"
# 「もうもう、リップルさんのいじわるっ！」
line = "「もうもう、リップルさんのいじわるっ！」"

[[dialogue]]
speaker = "リップル"
# 「ああっ、モネ拗ねないでクダさ～い。いっぱいハグしマスから～♪」
line = "「ああっ、モネ拗ねないでクダさ～い。いっぱいハグしマスから～♪」"

[[dialogue]]
speaker = "リップル"
# 「それにカイチョーも遠慮しなくてダイジョーブです！　エンドレスサマーはミンナを笑顔にするタメにありますから！」
line = "「それにカイチョーも遠慮しなくてダイジョーブです！　エンドレスサマーはミンナを笑顔にするタメにありますから！」"

[[dialogue]]
speaker = "リップル"
# 「ワタシはモネのおかげで学んだんです。エンドレスサマーはワタシの知ってる海を広げるだけじゃ、ダメなんだって」
line = "「ワタシはモネのおかげで学んだんです。エンドレスサマーはワタシの知ってる海を広げるだけじゃ、ダメなんだって」"

[[dialogue]]
speaker = "リップル"
# 「この世界には、人の数だけヨロコビやタノシミがあります♪　それをたくさん吸収することで、エンドレスサマーのカンセイにつながるんです♪」
line = "「この世界には、人の数だけヨロコビやタノシミがあります♪　それをたくさん吸収することで、エンドレスサマーのカンセイにつながるんです♪」"

[[dialogue]]
speaker = "モネ"
# 「だからリップルさんは、これからもリゾート結界をみんなが楽しめるものにしていくんですよね」
line = "「だからリップルさんは、これからもリゾート結界をみんなが楽しめるものにしていくんですよね」"

[[dialogue]]
speaker = "リップル"
# 「ハイ♪　モネもカイチョーも学園中のミンナがハッピーになれるエンドレスサマーを目指してイキま～す♪」
line = "「ハイ♪　モネもカイチョーも学園中のミンナがハッピーになれるエンドレスサマーを目指してイキま～す♪」"

[[dialogue]]
speaker = "リップル"
# 「モネもカイチョーも、真のエンドレスサマーをタノシミにしててクダサイね！」
line = "「モネもカイチョーも、真のエンドレスサマーをタノシミにしててクダサイね！」"
