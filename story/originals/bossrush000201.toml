[[dialogue]]
speaker = "unk"
# 俺は梨緒と共に、リクリエの使徒・ジグについての記録をまとめていた。
line = "俺は梨緒と共に、リクリエの使徒・ジグについての記録をまとめていた。"

[[dialogue]]
speaker = "梨緒"
# 「改めて基本的なことからだ。彼女の本名はレナーテ・<ruby=ジグ>Ｚ</ruby>・サイフリート。元は平行世界ベガの星騎士だ」
line = "「改めて基本的なことからだ。彼女の本名はレナーテ・<ruby>Ｚ<rt>ジグ</rt></ruby>・サイフリート。元は平行世界ベガの星騎士だ」"

[[dialogue]]
speaker = "unk"
# ジグはアポロの次に現れたリクリエの使徒だ。
line = "ジグはアポロの次に現れたリクリエの使徒だ。"

[[dialogue]]
speaker = "unk"
# 彼女はかつて梨緒の仲間だったが、俺たちの前に現れた時は敵として立ちはだかった。
line = "彼女はかつて梨緒の仲間だったが、俺たちの前に現れた時は敵として立ちはだかった。"

[[dialogue]]
speaker = "梨緒"
# 「私とジグはここアルタイルとは別の世界──平行世界ベガの住人だった」
line = "「私とジグはここアルタイルとは別の世界──平行世界ベガの住人だった」"

[[dialogue]]
speaker = "梨緒"
# 「私たちは新星学園の星徒会で、私は副会長、ジグは星徒会長を務めていた」
line = "「私たちは新星学園の星徒会で、私は副会長、ジグは星徒会長を務めていた」"

[[dialogue]]
speaker = "梨緒"
# 「ジグについては私が一番知っているつもりだが、私が把握していないこともあるだろう。君からも教えてくれ」
line = "「ジグについては私が一番知っているつもりだが、私が把握していないこともあるだろう。君からも教えてくれ」"

[[dialogue]]
speaker = "unk"
# 俺と梨緒で過去を振り返りながら、ジグとの戦いを時系列で追っていく。
line = "俺と梨緒で過去を振り返りながら、ジグとの戦いを時系列で追っていく。"

[[dialogue]]
speaker = "モンスター"
# 『グルルルッ！！！』
line = "『グルルルッ！！！』"

[[dialogue]]
speaker = "unk"
# アポロとギエルとの戦いが終わり、しばらくした頃、機械でできた竜のような新型モンスターが出現した。
line = "アポロとギエルとの戦いが終わり、しばらくした頃、機械でできた竜のような新型モンスターが出現した。"

[[dialogue]]
speaker = "unk"
# 新型モンスターは従来のモンスターを凌ぐ強敵で、多くの星騎士が苦戦を強いられた。
line = "新型モンスターは従来のモンスターを凌ぐ強敵で、多くの星騎士が苦戦を強いられた。"

[[dialogue]]
speaker = "unk"
# 後に判明したことだが、このモンスターを生み出したのは、リクリエの使徒となったジグだった。
line = "後に判明したことだが、このモンスターを生み出したのは、リクリエの使徒となったジグだった。"

[[dialogue]]
speaker = "unk"
# つまりこの時すでに、ジグとの戦いは始まっていたのだ。
line = "つまりこの時すでに、ジグとの戦いは始まっていたのだ。"
