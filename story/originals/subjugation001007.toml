[[dialogue]]
speaker = "unk"
# 守護天使同士の戦いは果たして――
line = "守護天使同士の戦いは果たして――"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「これで終わりなのだ！」
line = "「これで終わりなのだ！」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「フィニッシュです！」
line = "「フィニッシュです！」"

[[dialogue]]
speaker = "アルモタヘル"
# 「…………！」
line = "「…………！」"

[[dialogue]]
speaker = "マグダレナ"
# 「っ……」
line = "「っ……」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「ふふん、見たかなのだ！　小さい体でも、ちゃんとパワーアップしているのだ！」
line = "「ふふん、見たかなのだ！　小さい体でも、ちゃんとパワーアップしているのだ！」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「前にはなかった力に目覚めた感じがします。守護天使として、私たちも新たな成長をしているということでしょうか」
line = "「前にはなかった力に目覚めた感じがします。守護天使として、私たちも新たな成長をしているということでしょうか」"

[[dialogue]]
speaker = "unk"
# と、その時、結界の一部が砕けて穴が開くと――
line = "と、その時、結界の一部が砕けて穴が開くと――"

[[dialogue]]
speaker = "unk"
# ２人共、大丈夫か！？
line = "２人共、大丈夫か！？"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「おっ、会長！　助けにきてくれたのか！？」
line = "「おっ、会長！　助けにきてくれたのか！？」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「この隠蔽の結界に、よく気づかれましたね」
line = "「この隠蔽の結界に、よく気づかれましたね」"

[[dialogue]]
speaker = "セシア"
# 「それは、私が見つけたのよ。マグダレナ」
line = "「それは、私が見つけたのよ。マグダレナ」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「セシア……！　なるほど、あなたが結界の霊力を感知してくれたのですね。助かりました」
line = "「セシア……！　なるほど、あなたが結界の霊力を感知してくれたのですね。助かりました」"

[[dialogue]]
speaker = "ナミエル"
# 「一体、何があったんですか？」
line = "「一体、何があったんですか？」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「ナミエル、実は――」
line = "「ナミエル、実は――」"

[[dialogue]]
speaker = "ナミエル"
# 「保健室で治療中だったはずの大人アバターが勝手に動いて……？　そんなことがあるんですか？」
line = "「保健室で治療中だったはずの大人アバターが勝手に動いて……？　そんなことがあるんですか？」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「私たちにも原因はわかりません。後でアニマさまに調べてもらう必要がありますね」
line = "「私たちにも原因はわかりません。後でアニマさまに調べてもらう必要がありますね」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「とりあえず結界から出て、本体を保健室に運ぶのだ……あれ？」
line = "「とりあえず結界から出て、本体を保健室に運ぶのだ……あれ？」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「どうしました？　アルモタヘル？」
line = "「どうしました？　アルモタヘル？」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「そういえば大人アバターを倒したはずなのに、どうして結界が解除されずに――」
line = "「そういえば大人アバターを倒したはずなのに、どうして結界が解除されずに――」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「！　皆さま、そのアバターからすぐに離れて下さい！」
line = "「！　皆さま、そのアバターからすぐに離れて下さい！」"

[[dialogue]]
speaker = "unk"
# 次の瞬間、倒れている守護天使２人の大人アバターから、禍々しい霧のようなものが抜け出て、小さな２人の体に纏わりつく。
line = "次の瞬間、倒れている守護天使２人の大人アバターから、禍々しい霧のようなものが抜け出て、小さな２人の体に纏わりつく。"

[[dialogue]]
speaker = "unk"
# これはあの時の、リクリエの瘴気……！
line = "これはあの時の、リクリエの瘴気……！"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「くっ……やられたのだ……！　本体を操っていたのは、この瘴気ということか！」
line = "「くっ……やられたのだ……！　本体を操っていたのは、この瘴気ということか！」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「あの時の新種モンスターは、消滅したわけじゃなくて……瘴気に姿を変えていただけ……！　モンスターの狙いは――」
line = "「あの時の新種モンスターは、消滅したわけじゃなくて……瘴気に姿を変えていただけ……！　モンスターの狙いは――」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「我らの体を乗っ取ることなのだ……！　離れろ、会長、ナミエル、セシア！　体が勝手に動いて、お前たちに攻撃をしようとしている……！」
line = "「我らの体を乗っ取ることなのだ……！　離れろ、会長、ナミエル、セシア！　体が勝手に動いて、お前たちに攻撃をしようとしている……！」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「こうなった以上、私たちにできることは――アルモタヘル」
line = "「こうなった以上、私たちにできることは――アルモタヘル」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「……！　ああ、そうか。そうだな、マグダレナ」
line = "「……！　ああ、そうか。そうだな、マグダレナ」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「――３人共、我らが堕天している時と同じだ。我らの体が完全に乗っ取られる前に、倒して欲しいのだ」
line = "「――３人共、我らが堕天している時と同じだ。我らの体が完全に乗っ取られる前に、倒して欲しいのだ」"

[[dialogue]]
speaker = "ナミエル"
# 「わかりました！　とりあえず、動きを止められればいいんですよね？　気を失わせれば……」
line = "「わかりました！　とりあえず、動きを止められればいいんですよね？　気を失わせれば……」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「いえ、それではダメです。モンスターの瘴気を倒すには、私たちが体の中から逃がさないように霊力で抑え込んだ状態で、完全に消滅させる必要があります」
line = "「いえ、それではダメです。モンスターの瘴気を倒すには、私たちが体の中から逃がさないように霊力で抑え込んだ状態で、完全に消滅させる必要があります」"

[[dialogue]]
speaker = "ナミエル"
# 「え？　それって……」
line = "「え？　それって……」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「ごめんなさい、ナミエル。嫌なことを押し付けてしまいますが――」
line = "「ごめんなさい、ナミエル。嫌なことを押し付けてしまいますが――」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「この体を、倒して下さい。完全に」
line = "「この体を、倒して下さい。完全に」"

[[dialogue]]
speaker = "ナミエル"
# 「なっ……！？」
line = "「なっ……！？」"

[[dialogue]]
speaker = "ナミエル"
# 「た、倒して、お２人の魂はどうなるんですか？　本体に戻るんですよね？」
line = "「た、倒して、お２人の魂はどうなるんですか？　本体に戻るんですよね？」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「ああ。我らは守護天使の本体から、魂をコピーしてアバターに移していただけ。だから、この魂が失われても、死にはしないのだ」
line = "「ああ。我らは守護天使の本体から、魂をコピーしてアバターに移していただけ。だから、この魂が失われても、死にはしないのだ」"

[[dialogue]]
speaker = "ナミエル"
# 「……ちょっと待って下さい。私が言った本体っていうのは、そういうことじゃなくて……！」
line = "「……ちょっと待って下さい。私が言った本体っていうのは、そういうことじゃなくて……！」"

[[dialogue]]
speaker = "ナミエル"
# 「今ここにあるお２人の魂は――記憶はどうなるんですか？」
line = "「今ここにあるお２人の魂は――記憶はどうなるんですか？」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「……消えることになるでしょう」
line = "「……消えることになるでしょう」"

[[dialogue]]
speaker = "ナミエル"
# 「そんな……！」
line = "「そんな……！」"

[[dialogue]]
speaker = "セシア"
# 「……２人は、それでいいの？」
line = "「……２人は、それでいいの？」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「……ああ。元々、人間界で生きるこの日々は、我ら守護天使にとっては仮初の夢のようなもの」
line = "「……ああ。元々、人間界で生きるこの日々は、我ら守護天使にとっては仮初の夢のようなもの」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「リクリエを止めた後は、再び世界を見守る座に還る運命だったのだ」
line = "「リクリエを止めた後は、再び世界を見守る座に還る運命だったのだ」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「それに今の記憶が失われても、アニマさまがきっとまた本体の魂をコピーして、私たちのアバターを目覚めさせてくれるでしょう。だから……」
line = "「それに今の記憶が失われても、アニマさまがきっとまた本体の魂をコピーして、私たちのアバターを目覚めさせてくれるでしょう。だから……」"

[[dialogue]]
speaker = "セシア"
# 「……わかったわ。同じ守護天使として、わたくしが――」
line = "「……わかったわ。同じ守護天使として、わたくしが――」"

[[dialogue]]
speaker = "ナミエル"
# 「ダメです！」
line = "「ダメです！」"

[[dialogue]]
speaker = "セシア"
# 「ナミエル……？」
line = "「ナミエル……？」"

[[dialogue]]
speaker = "ナミエル"
# 「私はまだ……お２人と、仲よくなれてません！　ママダレナ、アルモたん！」
line = "「私はまだ……お２人と、仲よくなれてません！　ママダレナ、アルモたん！」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「その呼び方……！」
line = "「その呼び方……！」"

[[dialogue]]
speaker = "ナミエル"
# 「言ってたじゃないですか！　これから友人関係を築けていけたらって！　だから、そんな簡単に諦めたりしないで下さい！」
line = "「言ってたじゃないですか！　これから友人関係を築けていけたらって！　だから、そんな簡単に諦めたりしないで下さい！」"

[[dialogue]]
speaker = "ナミエル"
# 「私は諦めたくありません！　２人を助けたい！」
line = "「私は諦めたくありません！　２人を助けたい！」"

[[dialogue]]
speaker = "unk"
# 俺は、そんなナミエルの肩を叩く。
line = "俺は、そんなナミエルの肩を叩く。"

[[dialogue]]
speaker = "ナミエル"
# 「緋宮会長……？」
line = "「緋宮会長……？」"

[[dialogue]]
speaker = "unk"
# 俺も同じ気持ちだ。２人を必ず助けるぞ！
line = "俺も同じ気持ちだ。２人を必ず助けるぞ！"

[[dialogue]]
speaker = "ナミエル"
# 「……！　はいっ！」
line = "「……！　はいっ！」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「くっ……ダメだ、これ以上は瘴気を抑え切れない……！」
line = "「くっ……ダメだ、これ以上は瘴気を抑え切れない……！」"

[[dialogue]]
speaker = "ナミエル"
# 「待っていて下さい！　そんな瘴気、私が必ず掃除してみせます！」
line = "「待っていて下さい！　そんな瘴気、私が必ず掃除してみせます！」"

[[dialogue]]
speaker = "unk"
# 俺たちは守護天使２人を救う為、戦闘を開始するのだった――
line = "俺たちは守護天使２人を救う為、戦闘を開始するのだった――"
