[[dialogue]]
speaker = "unk"
# 第１話,九浄家メイドのお仕事,B
line = "第１話,九浄家メイドのお仕事,B"

[[dialogue]]
speaker = "unk"
# 新星、流星両学園の星徒会メンバーによるフィーニスの塔攻略。
line = "新星、流星両学園の星徒会メンバーによるフィーニスの塔攻略。"

[[dialogue]]
speaker = "unk"
# 『煌竜ヴィライア』との激戦に勝利した喜びも束の間、突如現れた謎の黒騎士の襲撃を受けた。
line = "『煌竜ヴィライア』との激戦に勝利した喜びも束の間、突如現れた謎の黒騎士の襲撃を受けた。"

[[dialogue]]
speaker = "unk"
# 星騎士たちの奮戦も空しく、黒騎士は九浄ヴィーナスを何処かへと連れ去ってしまう。
line = "星騎士たちの奮戦も空しく、黒騎士は九浄ヴィーナスを何処かへと連れ去ってしまう。"

[[dialogue]]
speaker = "unk"
# その報を受けた九浄家では――
line = "その報を受けた九浄家では――"

[[dialogue]]
speaker = "閃"
# 「はぁ～～～……」
line = "「はぁ～～～……」"

[[dialogue]]
speaker = "閃"
# 「ハッ……！　ため息はいけませんね。幸せが逃げてしまいます……」
line = "「ハッ……！　ため息はいけませんね。幸せが逃げてしまいます……」"

[[dialogue]]
speaker = "閃"
# 「私はメイド、九浄家のメイド。掃除、洗濯、お料理に雑念は不要です。集中、集中……」
line = "「私はメイド、九浄家のメイド。掃除、洗濯、お料理に雑念は不要です。集中、集中……」"

[[dialogue]]
speaker = "閃"
# 「はぁ～～～……」
line = "「はぁ～～～……」"

[[dialogue]]
speaker = "閃"
# 「嗚呼、お嬢様は今、<ruby=いずこ>何処</ruby>……果たしてご無事なのでしょうか……お腹を空かせてはいないでしょうか……」
line = "「嗚呼、お嬢様は今、<ruby>何処<rt>いずこ</rt></ruby>……果たしてご無事なのでしょうか……お腹を空かせてはいないでしょうか……」"

[[dialogue]]
speaker = "閃"
# 「きゃっ……！？」
line = "「きゃっ……！？」"

[[dialogue]]
speaker = "閃"
# 「きゃあぁあぁぁああぁぁっ！！？」
line = "「きゃあぁあぁぁああぁぁっ！！？」"

[[dialogue]]
speaker = "美鶴"
# 「すっごい悲鳴。なにごと？」
line = "「すっごい悲鳴。なにごと？」"

[[dialogue]]
speaker = "閃"
# 「あいたたた……私としたことが……」
line = "「あいたたた……私としたことが……」"

[[dialogue]]
speaker = "美鶴"
# 「閃？　だいじょぶ？　だいじょばない？」
line = "「閃？　だいじょぶ？　だいじょばない？」"

[[dialogue]]
speaker = "閃"
# 「美鶴さん！？　も、問題ありません。どこも怪我はしていませんし、痛みもありません。お気遣い感謝します」
line = "「美鶴さん！？　も、問題ありません。どこも怪我はしていませんし、痛みもありません。お気遣い感謝します」"

[[dialogue]]
speaker = "美鶴"
# 「そ？　無事なら良いけど、気ぃつけなよー。お嬢様がさらわれちゃって、心配なのも分かるけどさ」
line = "「そ？　無事なら良いけど、気ぃつけなよー。お嬢様がさらわれちゃって、心配なのも分かるけどさ」"

[[dialogue]]
speaker = "閃"
# 「いえ、新星・流星両校の星徒会の方々がお嬢様の捜索にあたっているのですから、心配するまでもありません」
line = "「いえ、新星・流星両校の星徒会の方々がお嬢様の捜索にあたっているのですから、心配するまでもありません」"

[[dialogue]]
speaker = "閃"
# 「各学園のエリートが揃いぶみ。お嬢様の行方を突き止めるなど、お茶の子さいさいです」
line = "「各学園のエリートが揃いぶみ。お嬢様の行方を突き止めるなど、お茶の子さいさいです」"

[[dialogue]]
speaker = "閃"
# 「きっと明日にでも発見の報が届くことでしょう。ええ、間違いありません、間違いありませんとも！」
line = "「きっと明日にでも発見の報が届くことでしょう。ええ、間違いありません、間違いありませんとも！」"

[[dialogue]]
speaker = "美鶴"
# 「早いとこ見つけてほしいよね。今頃、お嬢様はどんな目にあってんのかも分からないしね」
line = "「早いとこ見つけてほしいよね。今頃、お嬢様はどんな目にあってんのかも分からないしね」"

[[dialogue]]
speaker = "閃"
# 「どんな目……とは？」
line = "「どんな目……とは？」"

[[dialogue]]
speaker = "美鶴"
# 「そりゃー……花も恥じらう乙女の口から言うのは恥ずかしいような目？」
line = "「そりゃー……花も恥じらう乙女の口から言うのは恥ずかしいような目？」"

[[dialogue]]
speaker = "閃"
# 「恥ずかしい目──ハッ……！？」
line = "「恥ずかしい目──ハッ……！？」"

[[dialogue]]
speaker = "美鶴"
# 「お嬢様を亡き者にしたいんならさ。わざわざさらわなくても良かったワケじゃん」
line = "「お嬢様を亡き者にしたいんならさ。わざわざさらわなくても良かったワケじゃん」"

[[dialogue]]
speaker = "美鶴"
# 「でも、わざわざさらったってゆーならさ、なんてゆーか……その、ほら、アレ、お愉しんだりしちゃうんじゃん？」
line = "「でも、わざわざさらったってゆーならさ、なんてゆーか……その、ほら、アレ、お愉しんだりしちゃうんじゃん？」"

[[dialogue]]
speaker = "閃"
# 「美鶴さんの言、一理あります……そう、ですよね……」
line = "「美鶴さんの言、一理あります……そう、ですよね……」"

[[dialogue]]
speaker = "閃"
# 「お嬢様のような絶世の美少女を目の前にし、醜悪な劣情を抑えられるオスなどいるはずもありません……！」
line = "「お嬢様のような絶世の美少女を目の前にし、醜悪な劣情を抑えられるオスなどいるはずもありません……！」"

[[dialogue]]
speaker = "閃"
# 「嗚呼、なんと……なんという羨ま──いえ、この藤岡閃、お嬢様の護衛としてあるまじき失態……！」
line = "「嗚呼、なんと……なんという羨ま──いえ、この藤岡閃、お嬢様の護衛としてあるまじき失態……！」"

[[dialogue]]
speaker = "美鶴"
# 「ちょっと欲望漏れなかった？」
line = "「ちょっと欲望漏れなかった？」"

[[dialogue]]
speaker = "閃"
# 「多少強引にでもお嬢様に同行し、ぴったりと付き添い、寝食も共にするべきでした……！」
line = "「多少強引にでもお嬢様に同行し、ぴったりと付き添い、寝食も共にするべきでした……！」"

[[dialogue]]
speaker = "美鶴"
# （閃にお嬢様直属の護衛任せといて、だいじょぶ？　むしろ、お嬢様の貞操がマズくない？）
line = "（閃にお嬢様直属の護衛任せといて、だいじょぶ？　むしろ、お嬢様の貞操がマズくない？）"

[[dialogue]]
speaker = "閃"
# 「向かう場所がフィーニスの塔でさえなければ……！　私の予測の星眼がお嬢様の危機を見逃しはしなかったのに……！」
line = "「向かう場所がフィーニスの塔でさえなければ……！　私の予測の星眼がお嬢様の危機を見逃しはしなかったのに……！」"

[[dialogue]]
speaker = "美鶴"
# 「ヨソクノセーガン……あー、アレね」
line = "「ヨソクノセーガン……あー、アレね」"

[[dialogue]]
speaker = "閃"
# 「はい。私の異能の力──目視した情報を統合し、事前に訪れる危機を察知できるといったものです」
line = "「はい。私の異能の力──目視した情報を統合し、事前に訪れる危機を察知できるといったものです」"

[[dialogue]]
speaker = "美鶴"
# 「未来が見えるなんて、めちゃチートじゃん」
line = "「未来が見えるなんて、めちゃチートじゃん」"

[[dialogue]]
speaker = "閃"
# 「誤解されがちなのですが、予知や予言とは異なります。思われているほど万能ではありませんよ」
line = "「誤解されがちなのですが、予知や予言とは異なります。思われているほど万能ではありませんよ」"

[[dialogue]]
speaker = "美鶴"
# 「それでも、つよつよ能力なのは間違いないじゃん？」
line = "「それでも、つよつよ能力なのは間違いないじゃん？」"

[[dialogue]]
speaker = "美鶴"
# 「お嬢様の傍でそれを発揮できてたら……あー、でもお嬢様をさらえちゃうようなヤバ強なヤツなら、予測されても何とかしちゃうんかな」
line = "「お嬢様の傍でそれを発揮できてたら……あー、でもお嬢様をさらえちゃうようなヤバ強なヤツなら、予測されても何とかしちゃうんかな」"

[[dialogue]]
speaker = "閃"
# 「くうう……許すまじ！　許すまじ！　許すまじ……！　犯人を見つけたらどうしてくれましょう……フフフ」
line = "「くうう……許すまじ！　許すまじ！　許すまじ……！　犯人を見つけたらどうしてくれましょう……フフフ」"

[[dialogue]]
speaker = "閃"
# 「お嬢様がキズモノにでもなっていようものなら……私は自分を抑えられる自信がありませんよ。刺し違えてでも息の根を──ンフ、フフフ」
line = "「お嬢様がキズモノにでもなっていようものなら……私は自分を抑えられる自信がありませんよ。刺し違えてでも息の根を──ンフ、フフフ」"

[[dialogue]]
speaker = "美鶴"
# 「閃、お嬢様好きすぎ……もはやラブだね」
line = "「閃、お嬢様好きすぎ……もはやラブだね」"

[[dialogue]]
speaker = "閃"
# 「ラ、ラ、ラブではありません！　私とお嬢様はあくまで主従関係であり、四六時中お傍に仕えているが故、お嬢様の素晴らしさを目の当たりにし過ぎた結果であって」
line = "「ラ、ラ、ラブではありません！　私とお嬢様はあくまで主従関係であり、四六時中お傍に仕えているが故、お嬢様の素晴らしさを目の当たりにし過ぎた結果であって」"

[[dialogue]]
speaker = "閃"
# 「尊敬を超越し、親愛にも似た感情を抱くのは至極当然なのです！　事実、お嬢様のファンはメイド隊の中にも多く、私だけに限った話ではなくてですね！」
line = "「尊敬を超越し、親愛にも似た感情を抱くのは至極当然なのです！　事実、お嬢様のファンはメイド隊の中にも多く、私だけに限った話ではなくてですね！」"

[[dialogue]]
speaker = "美鶴"
# 「ストップストップ。早口早口」
line = "「ストップストップ。早口早口」"

[[dialogue]]
speaker = "閃"
# 「ハッ！？　いえ、その、こほん、この上なく尊敬し、お慕い申し上げてます、よ？」
line = "「ハッ！？　いえ、その、こほん、この上なく尊敬し、お慕い申し上げてます、よ？」"

[[dialogue]]
speaker = "美鶴"
# 「あー、ね。そゆことよね、はいなはいな」
line = "「あー、ね。そゆことよね、はいなはいな」"

[[dialogue]]
speaker = "閃"
# 「そ、そういう美鶴さんは随分と落ち着いているようですが、お嬢様が心配ではないのですか？」
line = "「そ、そういう美鶴さんは随分と落ち着いているようですが、お嬢様が心配ではないのですか？」"

[[dialogue]]
speaker = "美鶴"
# 「もちろん、心配してるよ。お嬢様がさらわれたのはヤバいと思ってるし、犯人は憎たらしいよ」
line = "「もちろん、心配してるよ。お嬢様がさらわれたのはヤバいと思ってるし、犯人は憎たらしいよ」"

[[dialogue]]
speaker = "美鶴"
# 「でも、うち、あんまり感情を表に出せないみたいでさ。薄情モンっぽく見えてたら、ごめん」
line = "「でも、うち、あんまり感情を表に出せないみたいでさ。薄情モンっぽく見えてたら、ごめん」"

[[dialogue]]
speaker = "閃"
# 「いえ、謝る必要はありません。むしろ、冷静でいられるのは羨ましいくらいです」
line = "「いえ、謝る必要はありません。むしろ、冷静でいられるのは羨ましいくらいです」"

[[dialogue]]
speaker = "閃"
# 「私なんて犯人を想像するだけで、<ruby=はらわた>腸</ruby>が煮えくり返りそうになるというのに……ヒッ、ヒヒヒ……！」
line = "「私なんて犯人を想像するだけで、<ruby>腸<rt>はらわた</rt></ruby>が煮えくり返りそうになるというのに……ヒッ、ヒヒヒ……！」"

[[dialogue]]
speaker = "美鶴"
# 「おーい、閃。メイド姿の女の子がしちゃいけない顔になってるよー」
line = "「おーい、閃。メイド姿の女の子がしちゃいけない顔になってるよー」"

[[dialogue]]
speaker = "蘭美"
# 「閃、落ち着きなさい。美鶴もあまり閃を刺激しないように」
line = "「閃、落ち着きなさい。美鶴もあまり閃を刺激しないように」"

[[dialogue]]
speaker = "美鶴"
# 「あ、メイド長。お疲れさまです」
line = "「あ、メイド長。お疲れさまです」"

[[dialogue]]
speaker = "閃"
# 「お、お疲れさまです、メイド長。あの、今回の件──」
line = "「お、お疲れさまです、メイド長。あの、今回の件──」"

[[dialogue]]
speaker = "蘭美"
# 「閃、お嬢様誘拐の件、あなたに一切の責はないわ。誰がお嬢様の護衛を務めていたとしても起きえた事態です」
line = "「閃、お嬢様誘拐の件、あなたに一切の責はないわ。誰がお嬢様の護衛を務めていたとしても起きえた事態です」"

[[dialogue]]
speaker = "閃"
# 「ですが、お嬢様の安否が……！」
line = "「ですが、お嬢様の安否が……！」"

[[dialogue]]
speaker = "蘭美"
# 「私たちが仕える九浄家のお嬢様よ？　無事の帰還を信じてなさい」
line = "「私たちが仕える九浄家のお嬢様よ？　無事の帰還を信じてなさい」"

[[dialogue]]
speaker = "閃"
# 「は、はいっ！」
line = "「は、はいっ！」"

[[dialogue]]
speaker = "蘭美"
# 「それと閃。さっき転んだのは大丈夫？」
line = "「それと閃。さっき転んだのは大丈夫？」"

[[dialogue]]
speaker = "閃"
# 「ご存じでしたか。お恥ずかしい限りです」
line = "「ご存じでしたか。お恥ずかしい限りです」"

[[dialogue]]
speaker = "蘭美"
# 「あれだけ派手な音と声を立てれば、屋敷中のメイドが気づいてるわ」
line = "「あれだけ派手な音と声を立てれば、屋敷中のメイドが気づいてるわ」"

[[dialogue]]
speaker = "蘭美"
# 「今は痛くなくても、後でぶり返す場合もあるわ。念のため診てもらうように。勤労も結構だけど、自愛なさい」
line = "「今は痛くなくても、後でぶり返す場合もあるわ。念のため診てもらうように。勤労も結構だけど、自愛なさい」"

[[dialogue]]
speaker = "閃"
# 「……はい、ありがとうございます」
line = "「……はい、ありがとうございます」"

[[dialogue]]
speaker = "蘭美"
# 「それと美鶴、ご当主様がお呼びよ。ついてきなさい」
line = "「それと美鶴、ご当主様がお呼びよ。ついてきなさい」"

[[dialogue]]
speaker = "美鶴"
# 「えー」
line = "「えー」"

[[dialogue]]
speaker = "蘭美"
# 「露骨に嫌そうな顔するんじゃないの。ご当主様が直々にあなたを指名したのだから、もっと胸を張りなさい」
line = "「露骨に嫌そうな顔するんじゃないの。ご当主様が直々にあなたを指名したのだから、もっと胸を張りなさい」"

[[dialogue]]
speaker = "美鶴"
# 「は～い……」
line = "「は～い……」"

[[dialogue]]
speaker = "美鶴"
# （当主様の話ってなんだろ。特別ボーナスが出るとか、休みをくれるって話なら大歓迎なんだけど）
line = "（当主様の話ってなんだろ。特別ボーナスが出るとか、休みをくれるって話なら大歓迎なんだけど）"

[[dialogue]]
speaker = "美鶴"
# （ピリついてるメイド長を見る限り、そういう話じゃなさそだね）
line = "（ピリついてるメイド長を見る限り、そういう話じゃなさそだね）"
