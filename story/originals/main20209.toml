[[dialogue]]
speaker = "unk"
# 第９話,クイズ大会開始！,B
line = "第９話,クイズ大会開始！,B"

[[dialogue]]
speaker = "unk"
# 今日はクイズ大会本番。
line = "今日はクイズ大会本番。"

[[dialogue]]
speaker = "unk"
# 人が集まるだろうかと言っていた俺たちの心配とは裏腹に、留学生・在校生含め多数の生徒が参加してくれた。
line = "人が集まるだろうかと言っていた俺たちの心配とは裏腹に、留学生・在校生含め多数の生徒が参加してくれた。"

[[dialogue]]
speaker = "アナ"
# 「参加チームは２００を超えました。１チーム３～５人なので、参加者数で言うと１０００人近く。期待以上ですね」
line = "「参加チームは２００を超えました。１チーム３～５人なので、参加者数で言うと１０００人近く。期待以上ですね」"

[[dialogue]]
speaker = "サーシャ"
# 「噂になってたものね～」
line = "「噂になってたものね～」"

[[dialogue]]
speaker = "unk"
# 星徒会と選挙管理委員会の対決が生徒の間で話題となり、クイズ大会が周知された。
line = "星徒会と選挙管理委員会の対決が生徒の間で話題となり、クイズ大会が周知された。"

[[dialogue]]
speaker = "unk"
# そのおかげか予想以上の参加者数となっており、結果オーライとはこのことだろう。
line = "そのおかげか予想以上の参加者数となっており、結果オーライとはこのことだろう。"

[[dialogue]]
speaker = "マトイ"
# 「ほんとに私たちが参加しちゃっていいのかな……」
line = "「ほんとに私たちが参加しちゃっていいのかな……」"

[[dialogue]]
speaker = "アナ"
# 「現状、星徒会の参加を疑問視する声はありませんし、選管以外も星徒会を倒そうと意気込んでいるとか」
line = "「現状、星徒会の参加を疑問視する声はありませんし、選管以外も星徒会を倒そうと意気込んでいるとか」"

[[dialogue]]
speaker = "ヴィーナス"
# 「フッフッフ……全校生徒が敵なんて燃えてくるわね。クイズでも最強を証明してやるわ！」
line = "「フッフッフ……全校生徒が敵なんて燃えてくるわね。クイズでも最強を証明してやるわ！」"

[[dialogue]]
speaker = "サーシャ"
# 「全校生徒ではないけどね～」
line = "「全校生徒ではないけどね～」"

[[dialogue]]
speaker = "unk"
# それでも二千数百人の生徒のうち、３分の１が参加しているとなれば大したものだ。
line = "それでも二千数百人の生徒のうち、３分の１が参加しているとなれば大したものだ。"

[[dialogue]]
speaker = "unk"
# 俺が発案した企画にたくさんの人が参加してくれて、会長として嬉しいし、協力してくれた人たちや参加してくれた生徒には感謝している。
line = "俺が発案した企画にたくさんの人が参加してくれて、会長として嬉しいし、協力してくれた人たちや参加してくれた生徒には感謝している。"

[[dialogue]]
speaker = "unk"
# 特に問題を用意してくれたクイズ研究会と、進行を引き受けてくれた放送委員会には頭が上がらない。
line = "特に問題を用意してくれたクイズ研究会と、進行を引き受けてくれた放送委員会には頭が上がらない。"

[[dialogue]]
speaker = "クロト"
# 「こうなった以上は優勝を目指そう。手を抜いたりしたら、それこそみんなに怒られるよ」
line = "「こうなった以上は優勝を目指そう。手を抜いたりしたら、それこそみんなに怒られるよ」"

[[dialogue]]
speaker = "マトイ"
# 「博識なアナに、思慮深いサーシャさん、バイトのおかげで経験豊富な緋宮くん……あとお菓子のことはわかる私。頑張ればきっと勝てるよ」
line = "「博識なアナに、思慮深いサーシャさん、バイトのおかげで経験豊富な緋宮くん……あとお菓子のことはわかる私。頑張ればきっと勝てるよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「マトイ、私を忘れてるわよ！」
line = "「マトイ、私を忘れてるわよ！」"

[[dialogue]]
speaker = "マトイ"
# 「うん。戦力外だからね……」
line = "「うん。戦力外だからね……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「どういう意味よ～！　私だって活躍するんだから！」
line = "「どういう意味よ～！　私だって活躍するんだから！」"

[[dialogue]]
speaker = "unk"
# そろそろ開会の時間だ。
line = "そろそろ開会の時間だ。"

[[dialogue]]
speaker = "unk"
# まずは開会式。段取りは放送委員会がしてくれることになっている。
line = "まずは開会式。段取りは放送委員会がしてくれることになっている。"

[[dialogue]]
speaker = "紅明"
# 『ニューヨークにっ、行きたいか～～～～～～～っ！！！』
line = "『ニューヨークにっ、行きたいか～～～～～～～っ！！！』"

[[dialogue]]
speaker = "紅明"
# 『オッス、アタシ放送委員会の牛紅明！　魔界や天界からきたばっかりのみんなはよろしくな☆』
line = "『オッス、アタシ放送委員会の牛紅明！　魔界や天界からきたばっかりのみんなはよろしくな☆』"

[[dialogue]]
speaker = "紅明"
# 『盛り上げるならアタシにお任せ♪　ってことでコハルコ委員長から指名を受けたからな！　本日の司会はアタシがやらせてもらうぜ！』
line = "『盛り上げるならアタシにお任せ♪　ってことでコハルコ委員長から指名を受けたからな！　本日の司会はアタシがやらせてもらうぜ！』"

[[dialogue]]
speaker = "紅明"
# 『おやおや、参加者の中からザワザワが聞こえるな？　アタシのこと知ってくれてる？　テレビ見てくれてるのかな～？』
line = "『おやおや、参加者の中からザワザワが聞こえるな？　アタシのこと知ってくれてる？　テレビ見てくれてるのかな～？』"

[[dialogue]]
speaker = "紅明"
# 『アタシは絶賛タレント活動もしてて、テレビも出てるんだ♪　うちのエナジー牛乳『ホルスタミン』もよろしくだぜ☆』
line = "『アタシは絶賛タレント活動もしてて、テレビも出てるんだ♪　うちのエナジー牛乳『ホルスタミン』もよろしくだぜ☆』"

[[dialogue]]
speaker = "紅明"
# 『そんじゃ宣伝も済んだところで、今大会の主催者兼ラスボスの緋宮クロト星徒会長から挨拶だ！』
line = "『そんじゃ宣伝も済んだところで、今大会の主催者兼ラスボスの緋宮クロト星徒会長から挨拶だ！』"

[[dialogue]]
speaker = "クロト"
# 「俺、ラスボスなんだ……」
line = "「俺、ラスボスなんだ……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ここはうんと煽ってくるのよ。かかってきなさいって」
line = "「ここはうんと煽ってくるのよ。かかってきなさいって」"

[[dialogue]]
speaker = "クロト"
# 「はは……頑張ってみるよ」
line = "「はは……頑張ってみるよ」"

[[dialogue]]
speaker = "unk"
# 中途半端では盛り上がらないし、やり過ぎても反感を買う。なかなか難しそうだ。
line = "中途半端では盛り上がらないし、やり過ぎても反感を買う。なかなか難しそうだ。"

[[dialogue]]
speaker = "unk"
# 放送委員会からマイクを受け取って壇上に立つ。
line = "放送委員会からマイクを受け取って壇上に立つ。"

[[dialogue]]
speaker = "クロト"
# 『星徒会長の緋宮クロトだ。まずはみんな、このクイズ大会に参加してくれてありがとう』
line = "『星徒会長の緋宮クロトだ。まずはみんな、このクイズ大会に参加してくれてありがとう』"

[[dialogue]]
speaker = "クロト"
# 『最近大交流で来てくれた留学生は知らないかもしれないけど、実は俺も転入生だったんだ』
line = "『最近大交流で来てくれた留学生は知らないかもしれないけど、実は俺も転入生だったんだ』"

[[dialogue]]
speaker = "クロト"
# 『幸い俺はいろいろあってみんなと仲良くなれたけど、やっぱりきっかけがあった方が打ち解けやすいと思って、このイベントを提案させてもらった』
line = "『幸い俺はいろいろあってみんなと仲良くなれたけど、やっぱりきっかけがあった方が打ち解けやすいと思って、このイベントを提案させてもらった』"

[[dialogue]]
speaker = "クロト"
# 『俺たち星騎士は、世界を、人々を守るために、この新星学園にやってきた。もちろん個人的な理由がある人もいるだろうけど、多くはそうだと思う』
line = "『俺たち星騎士は、世界を、人々を守るために、この新星学園にやってきた。もちろん個人的な理由がある人もいるだろうけど、多くはそうだと思う』"

[[dialogue]]
speaker = "クロト"
# 『でもそれは、俺たちが学生であることを否定するわけじゃない。俺たちは世界を守る戦士であり、青春を謳歌する若者でもある』
line = "『でもそれは、俺たちが学生であることを否定するわけじゃない。俺たちは世界を守る戦士であり、青春を謳歌する若者でもある』"

[[dialogue]]
speaker = "クロト"
# 『俺たちには俺たちの命がある。自分の命を生きている』
line = "『俺たちには俺たちの命がある。自分の命を生きている』"

[[dialogue]]
speaker = "クロト"
# 『だからみんながこの学園を卒業する時、戦いの記憶だけじゃなくて、楽しかった思い出も胸に抱いていてくれると、俺は嬉しい』
line = "『だからみんながこの学園を卒業する時、戦いの記憶だけじゃなくて、楽しかった思い出も胸に抱いていてくれると、俺は嬉しい』"

[[dialogue]]
speaker = "クロト"
# 『……なんて、お節介だったかな。言われるまでもないって思う人もいるだろうけど』
line = "『……なんて、お節介だったかな。言われるまでもないって思う人もいるだろうけど』"

[[dialogue]]
speaker = "クロト"
# 『それが星徒会長としての俺の望みだ。新星学園で良かったと、そう思って卒業できるようにしたいんだ』
line = "『それが星徒会長としての俺の望みだ。新星学園で良かったと、そう思って卒業できるようにしたいんだ』"

[[dialogue]]
speaker = "クロト"
# 『あと安心してほしいんだけど、俺たち星徒会も問題の内容は知らない。そこはイーブンだ』
line = "『あと安心してほしいんだけど、俺たち星徒会も問題の内容は知らない。そこはイーブンだ』"

[[dialogue]]
speaker = "クロト"
# 『でも俺たち星徒会は簡単には負けない。全力のさらに上の全力で挑んできてくれ』
line = "『でも俺たち星徒会は簡単には負けない。全力のさらに上の全力で挑んできてくれ』"

[[dialogue]]
speaker = "クロト"
# 『リクリエだって俺たちの青春は奪えない。──さぁ、楽しもう！』
line = "『リクリエだって俺たちの青春は奪えない。──さぁ、楽しもう！』"

[[dialogue]]
speaker = "unk"
# 挨拶を終えて壇上から降り、お礼を言いながら放送委員会の人にマイクを預ける。
line = "挨拶を終えて壇上から降り、お礼を言いながら放送委員会の人にマイクを預ける。"

[[dialogue]]
speaker = "unk"
# ふうっと息を吐くと肩から力が抜けて、思っていたより緊張していたんだなと自分で気付く。
line = "ふうっと息を吐くと肩から力が抜けて、思っていたより緊張していたんだなと自分で気付く。"

[[dialogue]]
speaker = "ヴィーナス"
# 「いいんじゃない。もっと煽ってもよかったと思うけど」
line = "「いいんじゃない。もっと煽ってもよかったと思うけど」"

[[dialogue]]
speaker = "マトイ"
# 「緋宮くん、かっこよかったよ！」
line = "「緋宮くん、かっこよかったよ！」"

[[dialogue]]
speaker = "アナ"
# 「ザ・会長って感じでした」
line = "「ザ・会長って感じでした」"

[[dialogue]]
speaker = "サーシャ"
# 「立派になったのね～」
line = "「立派になったのね～」"

[[dialogue]]
speaker = "クロト"
# 「なんか恥ずかしいな……」
line = "「なんか恥ずかしいな……」"

[[dialogue]]
speaker = "unk"
# みんな褒めてくれてるんだけど照れる。
line = "みんな褒めてくれてるんだけど照れる。"

[[dialogue]]
speaker = "unk"
# ちょっとかっこつけた気もするけど、星徒会長として言いたいことは言えた。
line = "ちょっとかっこつけた気もするけど、星徒会長として言いたいことは言えた。"

[[dialogue]]
speaker = "紅明"
# 『緋宮会長～、ありがと～！　アタシ、ちょっと胸が熱くなっちゃったぜ！』
line = "『緋宮会長～、ありがと～！　アタシ、ちょっと胸が熱くなっちゃったぜ！』"

[[dialogue]]
speaker = "紅明"
# 『じゃあ改めて大会の説明だ！　まずはＡからＨのブロックに分かれて、ブロック予選を勝ち抜いてもらうぜ』
line = "『じゃあ改めて大会の説明だ！　まずはＡからＨのブロックに分かれて、ブロック予選を勝ち抜いてもらうぜ』"

[[dialogue]]
speaker = "紅明"
# 『大会に参加申請した時に各チーム、ＤＩＳＣで登録しただろ？　それで自分のチームのブロックが表示されるようになってんだ』
line = "『大会に参加申請した時に各チーム、ＤＩＳＣで登録しただろ？　それで自分のチームのブロックが表示されるようになってんだ』"

[[dialogue]]
speaker = "クロト"
# 「俺たちは……Ｃブロックだな」
line = "「俺たちは……Ｃブロックだな」"

[[dialogue]]
speaker = "ヴィーナス"
# 「星徒会として、かっこ悪いところは見せられないわ！」
line = "「星徒会として、かっこ悪いところは見せられないわ！」"

[[dialogue]]
speaker = "サーシャ"
# 「どんな問題が来るかしら。楽しみだわ～」
line = "「どんな問題が来るかしら。楽しみだわ～」"
