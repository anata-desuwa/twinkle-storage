[[dialogue]]
speaker = "アポロ"
# 「でっかいなー……」
line = "「でっかいなー……」"

[[dialogue]]
speaker = "ベアトリス"
# 「うん、とっても大きい……」
line = "「うん、とっても大きい……」"

[[dialogue]]
speaker = "梨緒"
# 「ああ。ここまでとはな……」
line = "「ああ。ここまでとはな……」"

[[dialogue]]
speaker = "ナターシャ"
# 「そういう台詞は、人の胸じゃなくて海を見て言いなよ。別に見られて減るもんでもないけどさー」
line = "「そういう台詞は、人の胸じゃなくて海を見て言いなよ。別に見られて減るもんでもないけどさー」"

[[dialogue]]
speaker = "ナターシャ"
# 「だいたい、女同士で胸が大きいだの小さいだの言い合うのって、男の幻想じゃない？」
line = "「だいたい、女同士で胸が大きいだの小さいだの言い合うのって、男の幻想じゃない？」"

[[dialogue]]
speaker = "梨緒"
# 「いや、君のはそういうレベルを超えているだろう……」
line = "「いや、君のはそういうレベルを超えているだろう……」"

[[dialogue]]
speaker = "ベアトリス"
# 「ご、ごめんなさい。あまりにもセクシーだったからっ」
line = "「ご、ごめんなさい。あまりにもセクシーだったからっ」"

[[dialogue]]
speaker = "アポロ"
# 「水着だとデカチチっぷりがホント引き立つなー。あたしの胸もそんくらいおっきく育たねーもんかな～」
line = "「水着だとデカチチっぷりがホント引き立つなー。あたしの胸もそんくらいおっきく育たねーもんかな～」"

[[dialogue]]
speaker = "ナターシャ"
# 「アポロはたぶん成長すれば──じゃなくて、胸の大きさ比べするためにここへ来たわけじゃないでしょ？」
line = "「アポロはたぶん成長すれば──じゃなくて、胸の大きさ比べするためにここへ来たわけじゃないでしょ？」"

[[dialogue]]
speaker = "梨緒"
# 「そ、そうだったな。ここに来た目的を確認しよう」
line = "「そ、そうだったな。ここに来た目的を確認しよう」"

[[dialogue]]
speaker = "unk"
# 遡ること、数時間前──
line = "遡ること、数時間前──"

[[dialogue]]
speaker = "梨緒"
# 「くぅぅ、また魔王に負けた。これで２７９敗目だ……！」
line = "「くぅぅ、また魔王に負けた。これで２７９敗目だ……！」"

[[dialogue]]
speaker = "ベアトリス"
# 「次こそ勝てるよ、梨緒ちゃん。ファイトだよっ！」
line = "「次こそ勝てるよ、梨緒ちゃん。ファイトだよっ！」"

[[dialogue]]
speaker = "ナターシャ"
# 「それだけ負けられるのも、もはや才能だよね。連敗の世界記録でも目指しちゃう？」
line = "「それだけ負けられるのも、もはや才能だよね。連敗の世界記録でも目指しちゃう？」"

[[dialogue]]
speaker = "アポロ"
# 「ジグにも模擬戦で負けっ放しみたいだしなー。あいつはまだ病み上がりなのに」
line = "「ジグにも模擬戦で負けっ放しみたいだしなー。あいつはまだ病み上がりなのに」"

[[dialogue]]
speaker = "梨緒"
# 「くっ……追い打ちをかけないでくれっ……！」
line = "「くっ……追い打ちをかけないでくれっ……！」"

[[dialogue]]
speaker = "マトイ"
# 「うーん。やっぱりレベルが低かったのかなー……」
line = "「うーん。やっぱりレベルが低かったのかなー……」"

[[dialogue]]
speaker = "梨緒"
# 「レベルが低い！？」
line = "「レベルが低い！？」"

[[dialogue]]
speaker = "アナ"
# 「雑魚狩りが大事でしたね」
line = "「雑魚狩りが大事でしたね」"

[[dialogue]]
speaker = "梨緒"
# 「雑魚！？」
line = "「雑魚！？」"

[[dialogue]]
speaker = "梨緒"
# 「どうせ私は２７９戦負けっぱなしの、レベルの低い雑魚だ……！　出がらしのティーバッグのような価値のない存在なんだ……！」
line = "「どうせ私は２７９戦負けっぱなしの、レベルの低い雑魚だ……！　出がらしのティーバッグのような価値のない存在なんだ……！」"

[[dialogue]]
speaker = "ベアトリス"
# 「お、落ち着いて。誰も梨緒ちゃんのこととは言ってないよっ」
line = "「お、落ち着いて。誰も梨緒ちゃんのこととは言ってないよっ」"

[[dialogue]]
speaker = "アポロ"
# 「それよりマトイもアナもどーして水着なんか着てるんだ？」
line = "「それよりマトイもアナもどーして水着なんか着てるんだ？」"

[[dialogue]]
speaker = "ナターシャ"
# 「魔王の趣味かな？　平時は水着で過ごすように言い付けられてるとか」
line = "「魔王の趣味かな？　平時は水着で過ごすように言い付けられてるとか」"

[[dialogue]]
speaker = "リップル"
# 「イエイエ。新星星徒会の皆さんには、ワタシのリゾート結界で新モードのテストをしてもらっていたんデスよ！」
line = "「イエイエ。新星星徒会の皆さんには、ワタシのリゾート結界で新モードのテストをしてもらっていたんデスよ！」"

[[dialogue]]
speaker = "梨緒"
# 「わわっ。君は……？」
line = "「わわっ。君は……？」"

[[dialogue]]
speaker = "アポロ"
# 「お、リップルじゃねーか！　そっか、マトイとアナはリップルのビーチに遊びに行ってたワケだな！」
line = "「お、リップルじゃねーか！　そっか、マトイとアナはリップルのビーチに遊びに行ってたワケだな！」"

[[dialogue]]
speaker = "ナターシャ"
# 「あー、噂に聞いたことあるね。なんでも常夏のリゾート結界を管理している天使がいるとか」
line = "「あー、噂に聞いたことあるね。なんでも常夏のリゾート結界を管理している天使がいるとか」"

[[dialogue]]
speaker = "ベアトリス"
# 「常夏リゾート！　お日様の光をいっぱい浴びられそう！」
line = "「常夏リゾート！　お日様の光をいっぱい浴びられそう！」"

[[dialogue]]
speaker = "リップル"
# 「フフフ、興味アリますか～？　では皆さんも是非ご参加ください！」
line = "「フフフ、興味アリますか～？　では皆さんも是非ご参加ください！」"

[[dialogue]]
speaker = "梨緒"
# 「新モードのテスト、と言っていたな。それを我々もということか？」
line = "「新モードのテスト、と言っていたな。それを我々もということか？」"

[[dialogue]]
speaker = "リップル"
# 「ハイ！　修行したい人や、新しい楽しみが欲しい人に向けたサバイバルゲームのようなモノでーす！」
line = "「ハイ！　修行したい人や、新しい楽しみが欲しい人に向けたサバイバルゲームのようなモノでーす！」"

[[dialogue]]
speaker = "梨緒"
# 「修行したい人……」
line = "「修行したい人……」"

[[dialogue]]
speaker = "アポロ"
# 「なんかよくわからないけど、楽しそうだな！」
line = "「なんかよくわからないけど、楽しそうだな！」"

[[dialogue]]
speaker = "ベアトリス"
# 「でも海はちょっと……。興味はあるんだけど……」
line = "「でも海はちょっと……。興味はあるんだけど……」"

[[dialogue]]
speaker = "ナターシャ"
# 「私は何でもいいかなー」
line = "「私は何でもいいかなー」"

[[dialogue]]
speaker = "リップル"
# 「ワタシとしても選挙管理委員会の皆さんのお力を借りられれば、百人力なのデスが……イカガでしょう？」
line = "「ワタシとしても選挙管理委員会の皆さんのお力を借りられれば、百人力なのデスが……イカガでしょう？」"

[[dialogue]]
speaker = "梨緒"
# 「……いや、すまない。せっかくのお誘いだが、私たちは魔王の監視をしなければいけないからな」
line = "「……いや、すまない。せっかくのお誘いだが、私たちは魔王の監視をしなければいけないからな」"

[[dialogue]]
speaker = "リップル"
# 「ソウですか……ではワタシは新星星徒会の皆さんの再チャレンジを気長に待ちます」
line = "「ソウですか……ではワタシは新星星徒会の皆さんの再チャレンジを気長に待ちます」"

[[dialogue]]
speaker = "梨緒"
# 「……待て。再チャレンジだと？　もしや星徒会の面々は最後までクリアできなかったのか？」
line = "「……待て。再チャレンジだと？　もしや星徒会の面々は最後までクリアできなかったのか？」"

[[dialogue]]
speaker = "リップル"
# 「ハイ、それがドウカしまし──」
line = "「ハイ、それがドウカしまし──」"

[[dialogue]]
speaker = "梨緒"
# 「やろう！！」
line = "「やろう！！」"

[[dialogue]]
speaker = "リップル"
# 「ひゃふっ！？」
line = "「ひゃふっ！？」"

[[dialogue]]
speaker = "梨緒"
# 「やろう、みんな！　星徒会がクリアできなかった新モードとやらを私たちが先にクリアしてみせようじゃないか！」
line = "「やろう、みんな！　星徒会がクリアできなかった新モードとやらを私たちが先にクリアしてみせようじゃないか！」"

[[dialogue]]
speaker = "アポロ"
# 「あっはっは、相変わらず梨緒は負けず嫌いだな！」
line = "「あっはっは、相変わらず梨緒は負けず嫌いだな！」"

[[dialogue]]
speaker = "ベアトリス"
# 「ふふ、梨緒ちゃんがその気ならお手伝いするよ」
line = "「ふふ、梨緒ちゃんがその気ならお手伝いするよ」"

[[dialogue]]
speaker = "ナターシャ"
# 「まぁ、たまにはビーチで羽を伸ばすのもいいか」
line = "「まぁ、たまにはビーチで羽を伸ばすのもいいか」"

[[dialogue]]
speaker = "リップル"
# 「ソレでは選挙管理委員会ご一行様、ご案内デ～ス！」
line = "「ソレでは選挙管理委員会ご一行様、ご案内デ～ス！」"

[[dialogue]]
speaker = "梨緒"
# 「そうだ、目的を忘れるな、みんな！　何も私たちはナターシャの乳を見に来たわけじゃない！」
line = "「そうだ、目的を忘れるな、みんな！　何も私たちはナターシャの乳を見に来たわけじゃない！」"

[[dialogue]]
speaker = "ベアトリス"
# 「そうだね！　リゾート結界に来たからには楽しまなきゃ！」
line = "「そうだね！　リゾート結界に来たからには楽しまなきゃ！」"

[[dialogue]]
speaker = "梨緒"
# 「ちがっ──わなくはないか……。それも大事だが、新星星徒会に勝つことも大事だ！」
line = "「ちがっ──わなくはないか……。それも大事だが、新星星徒会に勝つことも大事だ！」"

[[dialogue]]
speaker = "ナターシャ"
# 「でも話に聞いてたのと雰囲気がちょっと違うね？　閉じ込められているような感覚がするけれど」
line = "「でも話に聞いてたのと雰囲気がちょっと違うね？　閉じ込められているような感覚がするけれど」"

[[dialogue]]
speaker = "リップル"
# 「それが新モードのトクチョウなんですよ～。このモードでは、ゲームをクリアするか脱落するかしないと結界から出られナイんです」
line = "「それが新モードのトクチョウなんですよ～。このモードでは、ゲームをクリアするか脱落するかしないと結界から出られナイんです」"

[[dialogue]]
speaker = "リップル"
# 「それまでは海でサバイバルする必要がアリます。食べものや寝るところの確保も自分たちで、というルールです！」
line = "「それまでは海でサバイバルする必要がアリます。食べものや寝るところの確保も自分たちで、というルールです！」"

[[dialogue]]
speaker = "アポロ"
# 「じきゅーじそくってヤツか！　おもしろそーだな！」
line = "「じきゅーじそくってヤツか！　おもしろそーだな！」"

[[dialogue]]
speaker = "ナターシャ"
# 「それで、何をすればゲームクリアになるの？」
line = "「それで、何をすればゲームクリアになるの？」"

[[dialogue]]
speaker = "リップル"
# 「結界内にいるモンスターのボスを倒せばクリアです！　逆に全滅するとゲームオーバーにナリます！」
line = "「結界内にいるモンスターのボスを倒せばクリアです！　逆に全滅するとゲームオーバーにナリます！」"

[[dialogue]]
speaker = "リップル"
# 「あ、もちろんモンスターはワタシのリゾート結界で再現したニセモノなので、万が一やられても危険はナイですよ～！」
line = "「あ、もちろんモンスターはワタシのリゾート結界で再現したニセモノなので、万が一やられても危険はナイですよ～！」"

[[dialogue]]
speaker = "梨緒"
# 「万に一つもやられるつもりはないがな。なら早速、周辺を探索してみよう」
line = "「万に一つもやられるつもりはないがな。なら早速、周辺を探索してみよう」"

[[dialogue]]
speaker = "梨緒"
# 「星徒会がクリアできなかったこの新モードも、私たちならクリアできるはずだ！」
line = "「星徒会がクリアできなかったこの新モードも、私たちならクリアできるはずだ！」"

[[dialogue]]
speaker = "梨緒"
# 「気合いを入れていこう！　せんかん～」
line = "「気合いを入れていこう！　せんかん～」"

[[dialogue]]
speaker = "ベアトリス・アポロ"
# 「ファイ、おー！」
line = "「ファイ、おー！」"

[[dialogue]]
speaker = "ナターシャ"
# 「やれやれ、元気だね～」
line = "「やれやれ、元気だね～」"
