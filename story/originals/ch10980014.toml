[[dialogue]]
speaker = "unk"
# 第４話,ヒマワリちゃんの投資講座,P
line = "第４話,ヒマワリちゃんの投資講座,P"

[[dialogue]]
speaker = "ミウ"
# 「はじまりました、ヒマワリちゃんの投資講座です」
line = "「はじまりました、ヒマワリちゃんの投資講座です」"

[[dialogue]]
speaker = "ヒマワリ"
# 「先生のヒマワリです。社長が投資について知りたいというので、素人意見で恐縮ですが、あたしがレクチャーしようと思います」
line = "「先生のヒマワリです。社長が投資について知りたいというので、素人意見で恐縮ですが、あたしがレクチャーしようと思います」"

[[dialogue]]
speaker = "セナリィ"
# 「はい、先生！　投資って怖くて難しいというイメージがありますわ！」
line = "「はい、先生！　投資って怖くて難しいというイメージがありますわ！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「いい質問ですねー。世間のイメージでは、怖い・損しそう・詐欺っぽいとか思われがちですけど」
line = "「いい質問ですねー。世間のイメージでは、怖い・損しそう・詐欺っぽいとか思われがちですけど」"

[[dialogue]]
speaker = "ヒマワリ"
# 「株式投資って、そんなに怖くないんですよ。ただし、一攫千金とか一発逆転を狙っている人には、オススメしないです。宝クジじゃないですからね」
line = "「株式投資って、そんなに怖くないんですよ。ただし、一攫千金とか一発逆転を狙っている人には、オススメしないです。宝クジじゃないですからね」"

[[dialogue]]
speaker = "セナリィ"
# 「ギクッ……！　でも、損することだってありますわよね？」
line = "「ギクッ……！　でも、損することだってありますわよね？」"

[[dialogue]]
speaker = "ヒマワリ"
# 「もちろんですよ。あたしが常勝みたいに思われてるかもですけど、全然そんなことないですからね？　値動きを見切れるのは、神様かインサイダーだけです」
line = "「もちろんですよ。あたしが常勝みたいに思われてるかもですけど、全然そんなことないですからね？　値動きを見切れるのは、神様かインサイダーだけです」"

[[dialogue]]
speaker = "セナリィ"
# 「そうなんですの？　てっきり勝ちまくりなのかと」
line = "「そうなんですの？　てっきり勝ちまくりなのかと」"

[[dialogue]]
speaker = "ヒマワリ"
# 「トータルでは勝ってますけど、勝ち４の負け６くらいですかねー」
line = "「トータルでは勝ってますけど、勝ち４の負け６くらいですかねー」"

[[dialogue]]
speaker = "セナリィ"
# 「負けが多いのに勝っている……どういうカラクリですの？」
line = "「負けが多いのに勝っている……どういうカラクリですの？」"

[[dialogue]]
speaker = "ヒマワリ"
# 「負けは少なく、勝ちは大きくです。『ここを割ったらマズい！』と思ったら、マイナスでも売っちゃう。いわゆる損切りってヤツですね」
line = "「負けは少なく、勝ちは大きくです。『ここを割ったらマズい！』と思ったら、マイナスでも売っちゃう。いわゆる損切りってヤツですね」"

[[dialogue]]
speaker = "ヒマワリ"
# 「戦いでもなんでも、見切りをつけての引き際って難しいですよね。欲張らずコツコツやるのが何よりですよ」
line = "「戦いでもなんでも、見切りをつけての引き際って難しいですよね。欲張らずコツコツやるのが何よりですよ」"

[[dialogue]]
speaker = "セナリィ"
# 「何も難しいことは言ってませんわね……私でもやれそうな気がしてきましたわ！」
line = "「何も難しいことは言ってませんわね……私でもやれそうな気がしてきましたわ！」"

[[dialogue]]
speaker = "unk"
# セナリィは引き際を見誤るから……
line = "セナリィは引き際を見誤るから……"

[[dialogue]]
speaker = "ヒマワリ"
# 「あとはリスク分散ですね。『卵はひとつのカゴに盛るな』です」
line = "「あとはリスク分散ですね。『卵はひとつのカゴに盛るな』です」"

[[dialogue]]
speaker = "セナリィ"
# 「卵を……どういう意味ですの？」
line = "「卵を……どういう意味ですの？」"

[[dialogue]]
speaker = "ヒマワリ"
# 「１０個の卵を１つのカゴに盛っていたら、そのカゴを落とした時に全部割れちゃうじゃないですか」
line = "「１０個の卵を１つのカゴに盛っていたら、そのカゴを落とした時に全部割れちゃうじゃないですか」"

[[dialogue]]
speaker = "ヒマワリ"
# 「でも、２つでも３つでも……いくつかのカゴに分けておけば、落としてしまっても割れるのはそのカゴの分だけ。ダメージは少なく済みます」
line = "「でも、２つでも３つでも……いくつかのカゴに分けておけば、落としてしまっても割れるのはそのカゴの分だけ。ダメージは少なく済みます」"

[[dialogue]]
speaker = "ミウ"
# 「部隊が壊滅するよりは、犠牲は１人だけに留めておこうってことですね」
line = "「部隊が壊滅するよりは、犠牲は１人だけに留めておこうってことですね」"

[[dialogue]]
speaker = "ヒマワリ"
# 「そう、そう。１人がやられたら、みんなで弔い合戦をして、やり返せばいいんですよ！」
line = "「そう、そう。１人がやられたら、みんなで弔い合戦をして、やり返せばいいんですよ！」"

[[dialogue]]
speaker = "unk"
# そのたとえはどうだろう……
line = "そのたとえはどうだろう……"

[[dialogue]]
speaker = "ヒマワリ"
# 「というわけで、無茶と深追いと後悔をしない。ちょっと慎重になるだけで、あたしくらいの資産なんて簡単に作れるんで！」
line = "「というわけで、無茶と深追いと後悔をしない。ちょっと慎重になるだけで、あたしくらいの資産なんて簡単に作れるんで！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「皆さんもちょっぴりだけ頑張ってみてください。はい、ヒマワリの投資講座でした！」
line = "「皆さんもちょっぴりだけ頑張ってみてください。はい、ヒマワリの投資講座でした！」"

[[dialogue]]
speaker = "ミウ"
# 「はい、拍手～」
line = "「はい、拍手～」"

[[dialogue]]
speaker = "ミウ"
# 「──って言ってますけど、ヒマワリちゃんはお金に関しては、天賦の才と経験がありますからね」
line = "「──って言ってますけど、ヒマワリちゃんはお金に関しては、天賦の才と経験がありますからね」"

[[dialogue]]
speaker = "ヒマワリ"
# 「えー、そんなことないのにー」
line = "「えー、そんなことないのにー」"

[[dialogue]]
speaker = "ミウ"
# 「あるの。会長さんとセナリィ社長はあまり真に受けて、火傷しないように気をつけてください」
line = "「あるの。会長さんとセナリィ社長はあまり真に受けて、火傷しないように気をつけてください」"

[[dialogue]]
speaker = "unk"
# はい
line = "はい"

[[dialogue]]
speaker = "セナリィ"
# 「重々、気をつけますわ」
line = "「重々、気をつけますわ」"

[[dialogue]]
speaker = "ヒマワリ"
# 「どうです、会長さん。参考になりました？」
line = "「どうです、会長さん。参考になりました？」"

[[dialogue]]
speaker = "unk"
# 俺には難しそうだな
line = "俺には難しそうだな"

[[dialogue]]
speaker = "ヒマワリ"
# 「そうですかねー。会長さんは勝負勘もいいし、リスク管理も上手ですし、向いてると思うんですけど」
line = "「そうですかねー。会長さんは勝負勘もいいし、リスク管理も上手ですし、向いてると思うんですけど」"

[[dialogue]]
speaker = "ヒマワリ"
# 「困ったら、なんでも聞いてくださいね。投資に絶対はないですけど、アドバイスくらいならできますんで」
line = "「困ったら、なんでも聞いてくださいね。投資に絶対はないですけど、アドバイスくらいならできますんで」"

[[dialogue]]
speaker = "ヒマワリ"
# 「まー、でも、やらなくても大丈夫かな？」
line = "「まー、でも、やらなくても大丈夫かな？」"

[[dialogue]]
speaker = "ヒマワリ"
# 「あたし、未来の旦那様も、まとめて養えるくらいの蓄えはありますし―」
line = "「あたし、未来の旦那様も、まとめて養えるくらいの蓄えはありますし―」"

[[dialogue]]
speaker = "ヒマワリ"
# 「いざとなれば、あたしが会長さんのこと、養ってあげちゃいますから、ね♪」
line = "「いざとなれば、あたしが会長さんのこと、養ってあげちゃいますから、ね♪」"

[[dialogue]]
speaker = "unk"
# それってどういう……？
line = "それってどういう……？"

[[dialogue]]
speaker = "ヒマワリ"
# 「んー？　言葉以上の意味はないんで、言葉通りに受け止めてください」
line = "「んー？　言葉以上の意味はないんで、言葉通りに受け止めてください」"

[[dialogue]]
speaker = "セナリィ"
# 「わっ、わっ！？　これはどうすればいいんですの！？　ヒマワリー！　助けてくださいましー！」
line = "「わっ、わっ！？　これはどうすればいいんですの！？　ヒマワリー！　助けてくださいましー！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「はーい、社長、今、行きまーす！」
line = "「はーい、社長、今、行きまーす！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「会長さん、またあたしと遊んでくださいね！」
line = "「会長さん、またあたしと遊んでくださいね！」"
