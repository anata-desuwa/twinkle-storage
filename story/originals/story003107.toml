[[dialogue]]
speaker = "unk"
# 全員に見守られる中で始まった、リーリアと獅子舞の羽根突き勝負。
line = "全員に見守られる中で始まった、リーリアと獅子舞の羽根突き勝負。"

[[dialogue]]
speaker = "unk"
# しかし、羽根が１度でも落ちれば決着というその勝負は、あっという間に結末を迎える。
line = "しかし、羽根が１度でも落ちれば決着というその勝負は、あっという間に結末を迎える。"

[[dialogue]]
speaker = "獅子舞"
# 「七彩流羽根突き術・弐ノ型『<ruby=だいだい>橙</ruby>』！」
line = "「七彩流羽根突き術・弐ノ型『<ruby>橙<rt>だいだい</rt></ruby>』！」"

[[dialogue]]
speaker = "リーリア"
# 「っ……！」
line = "「っ……！」"

[[dialogue]]
speaker = "unk"
# リーリアはその技を受け切れず、地面に羽根を落としてしまった。
line = "リーリアはその技を受け切れず、地面に羽根を落としてしまった。"

[[dialogue]]
speaker = "シズハ"
# 「あぁっ……！　リーリア先輩、技を出されるまでは返せていたのに！」
line = "「あぁっ……！　リーリア先輩、技を出されるまでは返せていたのに！」"

[[dialogue]]
speaker = "獅子舞"
# 「ふん……確かに、交流を深めながらも練習はちゃんとしていたようだな。しかし、それだけで勝てる程、吾輩は甘くない」
line = "「ふん……確かに、交流を深めながらも練習はちゃんとしていたようだな。しかし、それだけで勝てる程、吾輩は甘くない」"

[[dialogue]]
speaker = "獅子舞"
# 「渋谷リーリア、これでは到底、お前を認められんな！　分かったら練習に戻って、出直して――」
line = "「渋谷リーリア、これでは到底、お前を認められんな！　分かったら練習に戻って、出直して――」"

[[dialogue]]
speaker = "リーリア"
# 「挑戦が１度だなんて、私がいつ言いました？」
line = "「挑戦が１度だなんて、私がいつ言いました？」"

[[dialogue]]
speaker = "獅子舞"
# 「……何？」
line = "「……何？」"

[[dialogue]]
speaker = "リーリア"
# 「要するに、獅子舞さんに１回でも羽根を落とさせればいいんですよね？　だったら――」
line = "「要するに、獅子舞さんに１回でも羽根を落とさせればいいんですよね？　だったら――」"

[[dialogue]]
speaker = "リーリア"
# 「このまま勝つまで連戦し続けて、あなたに認めさせてみせます！」
line = "「このまま勝つまで連戦し続けて、あなたに認めさせてみせます！」"

[[dialogue]]
speaker = "獅子舞"
# 「ふん……そう来たか。だが、言うは易く行うは難し――やれるものならやってみるがいい！」
line = "「ふん……そう来たか。だが、言うは易く行うは難し――やれるものならやってみるがいい！」"

[[dialogue]]
speaker = "unk"
# それから、リーリアと獅子舞の羽根突きは繰り返し続いていた。
line = "それから、リーリアと獅子舞の羽根突きは繰り返し続いていた。"

[[dialogue]]
speaker = "獅子舞"
# 「七彩流羽根突き術・参ノ型『<ruby=きいろ>黄色</ruby>』！」
line = "「七彩流羽根突き術・参ノ型『<ruby>黄色<rt>きいろ</rt></ruby>』！」"

[[dialogue]]
speaker = "リーリア"
# 「っ……！　はぁ……はぁ……！」
line = "「っ……！　はぁ……はぁ……！」"

[[dialogue]]
speaker = "unk"
# だが、それは同時に敗北が積み重なることも意味する。リーリアは地に羽根が転がる光景を、もはや数え切れぬほど目に焼き付けていた。
line = "だが、それは同時に敗北が積み重なることも意味する。リーリアは地に羽根が転がる光景を、もはや数え切れぬほど目に焼き付けていた。"

[[dialogue]]
speaker = "サーシャ"
# 「リーリアちゃん、大丈夫？　一旦、休憩したっていいのよ？　少し休んでから、また挑戦すれば――」
line = "「リーリアちゃん、大丈夫？　一旦、休憩したっていいのよ？　少し休んでから、また挑戦すれば――」"

[[dialogue]]
speaker = "リーリア"
# 「サーシャさん、ありがとうございます。でも、大丈夫です。あとちょっとで、見えそうなんで……！」
line = "「サーシャさん、ありがとうございます。でも、大丈夫です。あとちょっとで、見えそうなんで……！」"

[[dialogue]]
speaker = "サーシャ"
# 「見える？」
line = "「見える？」"

[[dialogue]]
speaker = "リーリア"
# 「はい。獅子舞さんに勝てるイメージが……！」
line = "「はい。獅子舞さんに勝てるイメージが……！」"

[[dialogue]]
speaker = "リーリア"
# 「獅子舞さん、次の勝負です！　はあぁっ！」
line = "「獅子舞さん、次の勝負です！　はあぁっ！」"

[[dialogue]]
speaker = "unk"
# 地面に落ちた羽根を拾って、リーリアは再び獅子舞に向かって、魔法を乗せて打ち放つ。
line = "地面に落ちた羽根を拾って、リーリアは再び獅子舞に向かって、魔法を乗せて打ち放つ。"

[[dialogue]]
speaker = "獅子舞"
# 「ふん……わかっているぞ。この連戦が最も効率のよい練習であり、そして、勝機のある策、ということであろう？」
line = "「ふん……わかっているぞ。この連戦が最も効率のよい練習であり、そして、勝機のある策、ということであろう？」"

[[dialogue]]
speaker = "アナ"
# （そう、リーリアさんにとっては獅子舞さんの技を見切る練習となり、連戦に連戦を続ければ、獅子舞さんだって集中力が切れてミスを起こす可能性が上がっていく――）
line = "（そう、リーリアさんにとっては獅子舞さんの技を見切る練習となり、連戦に連戦を続ければ、獅子舞さんだって集中力が切れてミスを起こす可能性が上がっていく――）"

[[dialogue]]
speaker = "獅子舞"
# 「だが、そんな下らないやり方での勝利など、吾輩は断じて認めん！」
line = "「だが、そんな下らないやり方での勝利など、吾輩は断じて認めん！」"

[[dialogue]]
speaker = "獅子舞"
# 「七彩流羽根突き術・<ruby=よん>肆</ruby>ノ型『<ruby=みどり>緑</ruby>』！」
line = "「七彩流羽根突き術・<ruby>肆<rt>よん</rt></ruby>ノ型『<ruby>緑<rt>みどり</rt></ruby>』！」"

[[dialogue]]
speaker = "unk"
# 容赦なく、獅子舞がこれまで何度も繰り返してきたのと同じように、一寸の狂いもなく技を放つ。
line = "容赦なく、獅子舞がこれまで何度も繰り返してきたのと同じように、一寸の狂いもなく技を放つ。"

[[dialogue]]
speaker = "リーリア"
# 「獅子舞さんの技、本当に綺麗ですよね……」
line = "「獅子舞さんの技、本当に綺麗ですよね……」"

[[dialogue]]
speaker = "unk"
# 技の名前通り、羽根が緑色の光の軌跡を描きながら飛び、地面へと落ち行く。リーリアはそれを瞳に焼き付けるように、しっかりと見て。
line = "技の名前通り、羽根が緑色の光の軌跡を描きながら飛び、地面へと落ち行く。リーリアはそれを瞳に焼き付けるように、しっかりと見て。"

[[dialogue]]
speaker = "リーリア"
# 「だから――その色、真似させてもらいます！」
line = "「だから――その色、真似させてもらいます！」"

[[dialogue]]
speaker = "リーリア"
# 「<ruby=しちさい>七彩</ruby>流羽根突き術・壱ノ型『<ruby=あか>赤</ruby>』！」
line = "「<ruby>七彩<rt>しちさい</rt></ruby>流羽根突き術・壱ノ型『<ruby>赤<rt>あか</rt></ruby>』！」"

[[dialogue]]
speaker = "獅子舞"
# 「何ぃ！？」
line = "「何ぃ！？」"

[[dialogue]]
speaker = "unk"
# 獅子舞がここまでに見せてきた技でもって、リーリアが赤い光の軌跡を描いてみせた。
line = "獅子舞がここまでに見せてきた技でもって、リーリアが赤い光の軌跡を描いてみせた。"

[[dialogue]]
speaker = "獅子舞"
# 「くっ……七彩流羽根突き術・伍ノ型『<ruby=あお>青</ruby>』！」
line = "「くっ……七彩流羽根突き術・伍ノ型『<ruby>青<rt>あお</rt></ruby>』！」"

[[dialogue]]
speaker = "unk"
# 初めて、獅子舞の洗練された動きに乱れが生じる。
line = "初めて、獅子舞の洗練された動きに乱れが生じる。"

[[dialogue]]
speaker = "unk"
# リーリアの技に対して、咄嗟に次の技を使って返す。が――
line = "リーリアの技に対して、咄嗟に次の技を使って返す。が――"

[[dialogue]]
speaker = "リーリア"
# 「弐ノ型『<ruby=だいだい>橙</ruby>』！」
line = "「弐ノ型『<ruby>橙<rt>だいだい</rt></ruby>』！」"

[[dialogue]]
speaker = "unk"
# リーリアはそれを橙色に変えて、カウンターを決める。
line = "リーリアはそれを橙色に変えて、カウンターを決める。"

[[dialogue]]
speaker = "サーシャ"
# 「また技で返した♪　リーリアちゃん、すごいわ～！」
line = "「また技で返した♪　リーリアちゃん、すごいわ～！」"

[[dialogue]]
speaker = "獅子舞"
# 「渋谷リーリア、お前は……！」
line = "「渋谷リーリア、お前は……！」"

[[dialogue]]
speaker = "リーリア"
# 「あなたの羽根突き術……その綺麗な色を、ここまでの勝負で全て覚えさせてもらいました！」
line = "「あなたの羽根突き術……その綺麗な色を、ここまでの勝負で全て覚えさせてもらいました！」"

[[dialogue]]
speaker = "シズハ"
# 「リーリア先輩、すごい！　そんなことできるなんて……！」
line = "「リーリア先輩、すごい！　そんなことできるなんて……！」"

[[dialogue]]
speaker = "アナ"
# 「リーリアさんは生まれつき『<ruby=ハイパーサイメシア>完全記憶能力</ruby>』という特殊体質を持っています。それによって、獅子舞さんの動きと技を見て覚えたんです」
line = "「リーリアさんは生まれつき『<ruby>完全記憶能力<rt>ハイパーサイメシア</rt></ruby>』という特殊体質を持っています。それによって、獅子舞さんの動きと技を見て覚えたんです」"

[[dialogue]]
speaker = "舞亜"
# 「それ、聞いたことある。見たものを全て記憶して絶対に忘れない――どんなに昔の記憶でも数瞬前のように、鮮明に思い出すことができるって」
line = "「それ、聞いたことある。見たものを全て記憶して絶対に忘れない――どんなに昔の記憶でも数瞬前のように、鮮明に思い出すことができるって」"

[[dialogue]]
speaker = "シズハ"
# 「あっ！　じゃあ、リーリア先輩の能力『魔弾』って……」
line = "「あっ！　じゃあ、リーリア先輩の能力『魔弾』って……」"

[[dialogue]]
speaker = "アナ"
# 「そう。完全記憶能力によって過去の思い出を頭の中に鮮明に呼び起せるからこそ、リーリアさんは想いを力に変える魔弾を作り出すことができるんです」
line = "「そう。完全記憶能力によって過去の思い出を頭の中に鮮明に呼び起せるからこそ、リーリアさんは想いを力に変える魔弾を作り出すことができるんです」"

[[dialogue]]
speaker = "リーリア"
# 「さあ、ここから勝ちを取りに行きますよ！　七彩流羽根突き術・参ノ型『<ruby=きいろ>黄色</ruby>』！」
line = "「さあ、ここから勝ちを取りに行きますよ！　七彩流羽根突き術・参ノ型『<ruby>黄色<rt>きいろ</rt></ruby>』！」"

[[dialogue]]
speaker = "獅子舞"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "unk"
# その瞬間、獅子舞は昔の記憶を思い出していた。
line = "その瞬間、獅子舞は昔の記憶を思い出していた。"

[[dialogue]]
speaker = "unk"
# それはリクリエを何度も挟んだ遥か昔の――しかし、今でも鮮明に思い出せる、決して忘れられない記憶だ。
line = "それはリクリエを何度も挟んだ遥か昔の――しかし、今でも鮮明に思い出せる、決して忘れられない記憶だ。"

[[dialogue]]
speaker = "？？？"
# 「獅子舞、行っくよ～☆　七彩流羽根突き術・<ruby=ろく>陸</ruby>ノ型『<ruby=あいいろ>藍色</ruby>』！」
line = "「獅子舞、行っくよ～☆　七彩流羽根突き術・<ruby>陸<rt>ろく</rt></ruby>ノ型『<ruby>藍色<rt>あいいろ</rt></ruby>』！」"

[[dialogue]]
speaker = "獅子舞"
# 「何っ！？　くっ……！　また新しい技だと！？」
line = "「何っ！？　くっ……！　また新しい技だと！？」"

[[dialogue]]
speaker = "？？？"
# 「ふふふっ、綺麗な技でしょ～？　あと１つ作り出せれば、まさに七彩の技が完成だね☆」
line = "「ふふふっ、綺麗な技でしょ～？　あと１つ作り出せれば、まさに七彩の技が完成だね☆」"

[[dialogue]]
speaker = "unk"
# 記憶の中でそう言って微笑むのは、ロストアイテムである獅子舞を作り出した『七彩の魔女』。
line = "記憶の中でそう言って微笑むのは、ロストアイテムである獅子舞を作り出した『七彩の魔女』。"

[[dialogue]]
speaker = "獅子舞"
# 「おのれ……もう１回だ！　次こそは吾輩が勝ってみせるぞ、<b>ラルク</b>！」
line = "「おのれ……もう１回だ！　次こそは吾輩が勝ってみせるぞ、<b>ラルク</b>！」"

[[dialogue]]
speaker = "ラルク"
# 「え～？　そう言いつつ、さっきから全然勝ててないけど～？　ふふっ☆」
line = "「え～？　そう言いつつ、さっきから全然勝ててないけど～？　ふふっ☆」"

[[dialogue]]
speaker = "unk"
# 結局、獅子舞はその日、ラルクに１度も羽根突きで勝つことができなかった。
line = "結局、獅子舞はその日、ラルクに１度も羽根突きで勝つことができなかった。"

[[dialogue]]
speaker = "獅子舞"
# 「……しかし、貴様は本当に『七』という数にこだわるな」
line = "「……しかし、貴様は本当に『七』という数にこだわるな」"

[[dialogue]]
speaker = "ラルク"
# 「ん？　まぁね～♪　ほら、縁起の良い数字でしょ☆」
line = "「ん？　まぁね～♪　ほら、縁起の良い数字でしょ☆」"

[[dialogue]]
speaker = "獅子舞"
# 「ふん、例の魔道具もあと１つ作る気か？」
line = "「ふん、例の魔道具もあと１つ作る気か？」"

[[dialogue]]
speaker = "ラルク"
# 「もちろん！　それで『七彩のアイテムズ』が完成ってね☆」
line = "「もちろん！　それで『七彩のアイテムズ』が完成ってね☆」"

[[dialogue]]
speaker = "獅子舞"
# 「頭の痛い話だ。今でさえ変な<ruby=ていまい>弟妹</ruby>ばかりで、気苦労が絶えぬというのに……」
line = "「頭の痛い話だ。今でさえ変な<ruby>弟妹<rt>ていまい</rt></ruby>ばかりで、気苦労が絶えぬというのに……」"

[[dialogue]]
speaker = "ラルク"
# 「まあ、そこは１番上の長男として頑張ってもらわないとね～☆　獅子舞お兄ちゃん♪　お母さんは頼りにしてるよ～♪」
line = "「まあ、そこは１番上の長男として頑張ってもらわないとね～☆　獅子舞お兄ちゃん♪　お母さんは頼りにしてるよ～♪」"

[[dialogue]]
speaker = "獅子舞"
# 「勘弁してくれ……」
line = "「勘弁してくれ……」"

[[dialogue]]
speaker = "unk"
# そんな風に言いつつも、獅子舞は内心楽しみにしていた。
line = "そんな風に言いつつも、獅子舞は内心楽しみにしていた。"

[[dialogue]]
speaker = "unk"
# 自分の主はいずれ７つ、最後まで作り上げるだろうと信じて疑わなかった。
line = "自分の主はいずれ７つ、最後まで作り上げるだろうと信じて疑わなかった。"

[[dialogue]]
speaker = "獅子舞"
# 「おい、ラルク。七彩流羽根突き術の７番目の技は、いつになったら完成させる気だ？」
line = "「おい、ラルク。七彩流羽根突き術の７番目の技は、いつになったら完成させる気だ？」"

[[dialogue]]
speaker = "ラルク"
# 「あはは、ごめん。でも私、魔道具はちゃんと７つ作り上げたでしょ？」
line = "「あはは、ごめん。でも私、魔道具はちゃんと７つ作り上げたでしょ？」"

[[dialogue]]
speaker = "ラルク"
# 「だから、羽根突きの最後の技は、私の代わりに、獅子舞にお願いしようかな。あと、人間界のことも」
line = "「だから、羽根突きの最後の技は、私の代わりに、獅子舞にお願いしようかな。あと、人間界のことも」"

[[dialogue]]
speaker = "獅子舞"
# 「ふざけるな！　そんな中途半端は認めん！」
line = "「ふざけるな！　そんな中途半端は認めん！」"

[[dialogue]]
speaker = "獅子舞"
# 「お前が作った技だぞ！？　吾輩が作ってどうする！　ちゃんと最後まで投げ出さずに、<b>生きて</b>作りきれ！」
line = "「お前が作った技だぞ！？　吾輩が作ってどうする！　ちゃんと最後まで投げ出さずに、<b>生きて</b>作りきれ！」"

[[dialogue]]
speaker = "ラルク"
# 「ごめん……でも、お願い、獅子舞。私の好きな人間界を、代わりに見守っていて欲しいの」
line = "「ごめん……でも、お願い、獅子舞。私の好きな人間界を、代わりに見守っていて欲しいの」"

[[dialogue]]
speaker = "ラルク"
# 「リクリエは止められないかもしれない。だけど、<ruby=あなたたち>私の魔道具</ruby>が人間界の文化を次の世界へと繋いでくれたら、私たちの色は――記憶は消えない」
line = "「リクリエは止められないかもしれない。だけど、<ruby>私の魔道具<rt>あなたたち</rt></ruby>が人間界の文化を次の世界へと繋いでくれたら、私たちの色は――記憶は消えない」"

[[dialogue]]
speaker = "獅子舞"
# 「お前自身が生きて繋げばいい！　何故わざわざお前が命をかけて戦いに行く必要がある！？　お前は魔女なのだぞ！？」
line = "「お前自身が生きて繋げばいい！　何故わざわざお前が命をかけて戦いに行く必要がある！？　お前は魔女なのだぞ！？」"

[[dialogue]]
speaker = "獅子舞"
# 「魔女の森に戻って、リクリエをやり過ごせ！　なのにどうしてそこまで人間界に――！」
line = "「魔女の森に戻って、リクリエをやり過ごせ！　なのにどうしてそこまで人間界に――！」"

[[dialogue]]
speaker = "ラルク"
# 「大切な友達がいるから」
line = "「大切な友達がいるから」"

[[dialogue]]
speaker = "獅子舞"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "ラルク"
# 「人間界に来て、大切な友達が沢山できた。それを放って、私だけ逃げるなんてできない」
line = "「人間界に来て、大切な友達が沢山できた。それを放って、私だけ逃げるなんてできない」"

[[dialogue]]
speaker = "ラルク"
# 「私、本当に心から人間界を愛しているんだ。だから、守りたい。最後まで一緒に、みんなと戦いたいんだよ」
line = "「私、本当に心から人間界を愛しているんだ。だから、守りたい。最後まで一緒に、みんなと戦いたいんだよ」"

[[dialogue]]
speaker = "ラルク"
# 「だから、あなたたちを作った七彩の魔女として、最後のお願い。もしも世界がリクリエに飲み込まれても、私が愛した人間界を守って」
line = "「だから、あなたたちを作った七彩の魔女として、最後のお願い。もしも世界がリクリエに飲み込まれても、私が愛した人間界を守って」"

[[dialogue]]
speaker = "獅子舞"
# 「……認めんぞ。他の奴らが認めても、吾輩だけはお前が戦いに行くことを最後まで認めんっ！」
line = "「……認めんぞ。他の奴らが認めても、吾輩だけはお前が戦いに行くことを最後まで認めんっ！」"

[[dialogue]]
speaker = "ラルク"
# 「ごめんね。獅子舞……」
line = "「ごめんね。獅子舞……」"

[[dialogue]]
speaker = "ラルク"
# 「いつか、あなたにもわかって欲しい――」
line = "「いつか、あなたにもわかって欲しい――」"

[[dialogue]]
speaker = "リーリア"
# 「七彩流羽根突き術・伍ノ型『<ruby=あお>青</ruby>』！」
line = "「七彩流羽根突き術・伍ノ型『<ruby>青<rt>あお</rt></ruby>』！」"

[[dialogue]]
speaker = "獅子舞"
# 「っ……！」
line = "「っ……！」"

[[dialogue]]
speaker = "unk"
# 獅子舞の目の前にいるリーリアの姿が、自身の創造主と重なる。だからこそ、認められなかった。
line = "獅子舞の目の前にいるリーリアの姿が、自身の創造主と重なる。だからこそ、認められなかった。"

[[dialogue]]
speaker = "獅子舞"
# 「おのれ……<ruby=よん>肆</ruby>ノ型『<ruby=みどり>緑</ruby>』！」
line = "「おのれ……<ruby>肆<rt>よん</rt></ruby>ノ型『<ruby>緑<rt>みどり</rt></ruby>』！」"

[[dialogue]]
speaker = "獅子舞"
# 「認めん……吾輩は認めんぞ、リーリア！　そう簡単に、認めるわけにはいかないのだ！！」
line = "「認めん……吾輩は認めんぞ、リーリア！　そう簡単に、認めるわけにはいかないのだ！！」"

[[dialogue]]
speaker = "unk"
# 彼女がもしかしたら、七彩の魔女の<b>生まれ変わり</b>かもしれないだなんて。
line = "彼女がもしかしたら、七彩の魔女の<b>生まれ変わり</b>かもしれないだなんて。"

[[dialogue]]
speaker = "リーリア"
# 「<ruby=ろく>陸</ruby>ノ型『<ruby=あいいろ>藍色</ruby>』！」
line = "「<ruby>陸<rt>ろく</rt></ruby>ノ型『<ruby>藍色<rt>あいいろ</rt></ruby>』！」"

[[dialogue]]
speaker = "獅子舞"
# 「弐ノ型『<ruby=だいだい>橙</ruby>』！」
line = "「弐ノ型『<ruby>橙<rt>だいだい</rt></ruby>』！」"

[[dialogue]]
speaker = "unk"
# 違う色を違う色で打ち返す、技の応酬。そんな中で一瞬、リーリアはアナと視線が合う。
line = "違う色を違う色で打ち返す、技の応酬。そんな中で一瞬、リーリアはアナと視線が合う。"

[[dialogue]]
speaker = "アナ"
# （リーリアさん、今です！）
line = "（リーリアさん、今です！）"

[[dialogue]]
speaker = "unk"
# リーリアはこくりと頷いて、言う。
line = "リーリアはこくりと頷いて、言う。"

[[dialogue]]
speaker = "リーリア"
# 「――七彩流羽根突き術の色は全て覚えました。だからこそ……獅子舞さん、勝負です！」
line = "「――七彩流羽根突き術の色は全て覚えました。だからこそ……獅子舞さん、勝負です！」"

[[dialogue]]
speaker = "リーリア"
# 「七彩流羽根突き術・<ruby=しち>漆</ruby>ノ型――『<ruby=むらさき>紫</ruby>』！！」
line = "「七彩流羽根突き術・<ruby>漆<rt>しち</rt></ruby>ノ型――『<ruby>紫<rt>むらさき</rt></ruby>』！！」"

[[dialogue]]
speaker = "獅子舞"
# 「っ――！」
line = "「っ――！」"

[[dialogue]]
speaker = "unk"
# その技は、獅子舞の知らない紫色だった。それだけじゃなく――
line = "その技は、獅子舞の知らない紫色だった。それだけじゃなく――"

[[dialogue]]
speaker = "シズハ"
# 「すごい……！　綺麗な色！」
line = "「すごい……！　綺麗な色！」"

[[dialogue]]
speaker = "サーシャ"
# 「虹だわ～♪」
line = "「虹だわ～♪」"

[[dialogue]]
speaker = "unk"
# 紫に加えて、赤、橙、黄、緑、青、藍色と七彩の光条へと変化して、虹の橋を描く。
line = "紫に加えて、赤、橙、黄、緑、青、藍色と七彩の光条へと変化して、虹の橋を描く。"

[[dialogue]]
speaker = "獅子舞"
# （ああ、なんて……）
line = "（ああ、なんて……）"

[[dialogue]]
speaker = "unk"
# それを見た獅子舞は、思わず――
line = "それを見た獅子舞は、思わず――"

[[dialogue]]
speaker = "獅子舞"
# （綺麗な技なのだ……）
line = "（綺麗な技なのだ……）"

[[dialogue]]
speaker = "unk"
# 羽根を返すのを忘れて、地面に落ちるまで見惚れてしまった。
line = "羽根を返すのを忘れて、地面に落ちるまで見惚れてしまった。"

[[dialogue]]
speaker = "舞亜"
# 「あ……！」
line = "「あ……！」"

[[dialogue]]
speaker = "ソフィア"
# 「やりました……！」
line = "「やりました……！」"

[[dialogue]]
speaker = "ウズメイア"
# 「リーリアの勝ちだし！！」
line = "「リーリアの勝ちだし！！」"

[[dialogue]]
speaker = "シズハ"
# 「やったぁ～～～っ！！」
line = "「やったぁ～～～っ！！」"

[[dialogue]]
speaker = "サーシャ"
# 「リーリアちゃん、すごいわ～♪　お姉ちゃん、よしよししちゃう～♪　ぎゅ～っ♪」
line = "「リーリアちゃん、すごいわ～♪　お姉ちゃん、よしよししちゃう～♪　ぎゅ～っ♪」"

[[dialogue]]
speaker = "リーリア"
# 「わぷっ！？　サーシャさん、おっぱいに埋まって息できないです～……！」
line = "「わぷっ！？　サーシャさん、おっぱいに埋まって息できないです～……！」"

[[dialogue]]
speaker = "獅子舞"
# 「なぜ……お前が、最後の<ruby=しち>漆</ruby>ノ型を？」
line = "「なぜ……お前が、最後の<ruby>漆<rt>しち</rt></ruby>ノ型を？」"

[[dialogue]]
speaker = "unk"
# しばらく言葉もなく惚けていた獅子舞が、リーリアに視線を向けて問いかける。
line = "しばらく言葉もなく惚けていた獅子舞が、リーリアに視線を向けて問いかける。"

[[dialogue]]
speaker = "リーリア"
# 「――不思議なんですけど、私が羽根突きの技を作るとしたら『こんな感じかな』っていう感覚に、どの技も驚くくらいピッタリ当てはまるんですよ」
line = "「――不思議なんですけど、私が羽根突きの技を作るとしたら『こんな感じかな』っていう感覚に、どの技も驚くくらいピッタリ当てはまるんですよ」"

[[dialogue]]
speaker = "リーリア"
# 「だからこそ、思ったんです。この七彩流羽根突き術っていうのは、７つの技を順番に繋げて打つことで奥義の『虹』が完成する連続技だって」
line = "「だからこそ、思ったんです。この七彩流羽根突き術っていうのは、７つの技を順番に繋げて打つことで奥義の『虹』が完成する連続技だって」"

[[dialogue]]
speaker = "リーリア"
# 「だから……最後の漆ノ型は、獅子舞さんが隠していましたけど、きっとこういう技だろうって」
line = "「だから……最後の漆ノ型は、獅子舞さんが隠していましたけど、きっとこういう技だろうって」"

[[dialogue]]
speaker = "リーリア"
# 「正解でしたかね？」
line = "「正解でしたかね？」"

[[dialogue]]
speaker = "獅子舞"
# 「……見事だ」
line = "「……見事だ」"

[[dialogue]]
speaker = "unk"
# 獅子舞は、あえて口にしなかった。
line = "獅子舞は、あえて口にしなかった。"

[[dialogue]]
speaker = "unk"
# 漆ノ型は、獅子舞が長年考えても作れなかった、未だ見ぬ未完の技であったことを。
line = "漆ノ型は、獅子舞が長年考えても作れなかった、未だ見ぬ未完の技であったことを。"

[[dialogue]]
speaker = "獅子舞"
# 「……リーリア、お前は練習の最中、人間界が好きだと言っていたな」
line = "「……リーリア、お前は練習の最中、人間界が好きだと言っていたな」"

[[dialogue]]
speaker = "リーリア"
# 「え？　あ、はい……」
line = "「え？　あ、はい……」"

[[dialogue]]
speaker = "獅子舞"
# 「リクリエによって、もし人間界が絶望的な状況に陥ったとして……それと立ち向かうために、命をかけられる程にか？」
line = "「リクリエによって、もし人間界が絶望的な状況に陥ったとして……それと立ち向かうために、命をかけられる程にか？」"

[[dialogue]]
speaker = "リーリア"
# 「……そうですね。私はもう、逃げられないと思います」
line = "「……そうですね。私はもう、逃げられないと思います」"

[[dialogue]]
speaker = "リーリア"
# 「人間界に好きなものがいっぱいできちゃったので。だから、私はこれからもっと強くなりたいです」
line = "「人間界に好きなものがいっぱいできちゃったので。だから、私はこれからもっと強くなりたいです」"

[[dialogue]]
speaker = "リーリア"
# 「獅子舞さんがくれたこの晴れ着の力で、人間界と友達を守れるように」
line = "「獅子舞さんがくれたこの晴れ着の力で、人間界と友達を守れるように」"

[[dialogue]]
speaker = "獅子舞"
# 「……そうか。ならば仕方あるまい」
line = "「……そうか。ならば仕方あるまい」"

[[dialogue]]
speaker = "獅子舞"
# 「認めてやろう、渋谷リーリア。お前のことを」
line = "「認めてやろう、渋谷リーリア。お前のことを」"

[[dialogue]]
speaker = "リーリア"
# 「いよっしっ☆　これにてマジカルウィンです！　えへへっ♪」
line = "「いよっしっ☆　これにてマジカルウィンです！　えへへっ♪」"

[[dialogue]]
speaker = "unk"
# 両手でぐっとガッツポーズをして、満面の笑顔を咲かせるリーリア。
line = "両手でぐっとガッツポーズをして、満面の笑顔を咲かせるリーリア。"

[[dialogue]]
speaker = "アナ"
# 「やりましたね、リーリアさん。グッジョブです」
line = "「やりましたね、リーリアさん。グッジョブです」"

[[dialogue]]
speaker = "リーリア"
# 「アナちゃんが、七彩流の技が虹の七色かもって推測して、ヒントをくれたおかげだよ♪　いぇ～い☆」
line = "「アナちゃんが、七彩流の技が虹の七色かもって推測して、ヒントをくれたおかげだよ♪　いぇ～い☆」"

[[dialogue]]
speaker = "アナ"
# 「ハイタッチです♪」
line = "「ハイタッチです♪」"

[[dialogue]]
speaker = "獅子舞"
# （ふん……友達、か）
line = "（ふん……友達、か）"

[[dialogue]]
speaker = "unk"
# そうして、友達と嬉しげに手を打ち合わせるリーリアを眺めながら、獅子舞も小さく笑うように鼻を鳴らすのだった。
line = "そうして、友達と嬉しげに手を打ち合わせるリーリアを眺めながら、獅子舞も小さく笑うように鼻を鳴らすのだった。"
