[[dialogue]]
speaker = "unk"
# 新たな姿へと変貌を遂げたディーラックと、戦闘を開始した俺たち。
line = "新たな姿へと変貌を遂げたディーラックと、戦闘を開始した俺たち。"

[[dialogue]]
speaker = "unk"
# しかし――
line = "しかし――"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「くっ……！　まるで砲撃が当たらんのじゃ……！」
line = "「くっ……！　まるで砲撃が当たらんのじゃ……！」"

[[dialogue]]
speaker = "シズハ"
# 「サチちゃんの幸運……敵に回すとこんなに圧倒的だなんて……！」
line = "「サチちゃんの幸運……敵に回すとこんなに圧倒的だなんて……！」"

[[dialogue]]
speaker = "ディーラック"
# 「そう、いくら攻撃しても無駄サ。キミたちがこれまで勝ち続けてこられたのは、この幸運の力あってのことだからネ！」
line = "「そう、いくら攻撃しても無駄サ。キミたちがこれまで勝ち続けてこられたのは、この幸運の力あってのことだからネ！」"

[[dialogue]]
speaker = "ディーラック"
# 「だというのに――」
line = "「だというのに――」"

[[dialogue]]
speaker = "サチ"
# 「はああぁっ！　ノックアップスプラッシュ！」
line = "「はああぁっ！　ノックアップスプラッシュ！」"

[[dialogue]]
speaker = "ディーラック"
# 「諦めが悪くてウザいのサ！　サチちゃんっ！」
line = "「諦めが悪くてウザいのサ！　サチちゃんっ！」"

[[dialogue]]
speaker = "サチ"
# 「――きゃあっ！？」
line = "「――きゃあっ！？」"

[[dialogue]]
speaker = "unk"
# 何度も攻撃に挑戦していたサチは、ディーラックの手の平から放たれた衝撃波に吹き飛ばされる。
line = "何度も攻撃に挑戦していたサチは、ディーラックの手の平から放たれた衝撃波に吹き飛ばされる。"

[[dialogue]]
speaker = "トマル"
# 「サチさま！　大丈夫ですか！？」
line = "「サチさま！　大丈夫ですか！？」"

[[dialogue]]
speaker = "サチ"
# 「うん、大丈夫……！　星術と魔法の二重防御で防いだから……！」
line = "「うん、大丈夫……！　星術と魔法の二重防御で防いだから……！」"

[[dialogue]]
speaker = "ディーラック"
# 「どうやら魔法も使えるようになったみたいだけど、所詮焼け石に水サ」
line = "「どうやら魔法も使えるようになったみたいだけど、所詮焼け石に水サ」"

[[dialogue]]
speaker = "サチ"
# 「だとしても……諦めません！」
line = "「だとしても……諦めません！」"

[[dialogue]]
speaker = "unk"
# サチが再び杖を構え、ディーラックへ向けて術を使おうとする。
line = "サチが再び杖を構え、ディーラックへ向けて術を使おうとする。"

[[dialogue]]
speaker = "ディーラック"
# 「しつこい！　これで終わりサ！　――ハアァッ！！」
line = "「しつこい！　これで終わりサ！　――ハアァッ！！」"

[[dialogue]]
speaker = "unk"
# それに対して、凄まじいエネルギーを手の平に集中させて放つディーラック。
line = "それに対して、凄まじいエネルギーを手の平に集中させて放つディーラック。"

[[dialogue]]
speaker = "トレジアンナ"
# 「いけない！　避けて下さい、サチさん！」
line = "「いけない！　避けて下さい、サチさん！」"

[[dialogue]]
speaker = "ディーラック"
# 「無理サ！　この一撃は、<b>幸運で絶対に当たる</b>！」
line = "「無理サ！　この一撃は、<b>幸運で絶対に当たる</b>！」"

[[dialogue]]
speaker = "unk"
# サチは攻撃を避けようと飛び回るが、エネルギー弾がジグザグの滅茶苦茶な軌道を描きながらも、確実にホーミングして迫る。
line = "サチは攻撃を避けようと飛び回るが、エネルギー弾がジグザグの滅茶苦茶な軌道を描きながらも、確実にホーミングして迫る。"

[[dialogue]]
speaker = "サチ"
# （っ……ダメ！　避けきれない……！）
line = "（っ……ダメ！　避けきれない……！）"

[[dialogue]]
speaker = "unk"
# 次の瞬間。
line = "次の瞬間。"

[[dialogue]]
speaker = "unk"
# エネルギー弾はホーミングを<b>凍結</b>させられたかのように真っすぐな軌道になり──直後にサチの前に現れた<b>盾</b>によって防がれた。
line = "エネルギー弾はホーミングを<b>凍結</b>させられたかのように真っすぐな軌道になり──直後にサチの前に現れた<b>盾</b>によって防がれた。"

[[dialogue]]
speaker = "unk"
# それは――
line = "それは――"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「――お待たせ、サチちゃん！」
line = "「――お待たせ、サチちゃん！」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「お姉ちゃんたちが助けにきたわよ～」
line = "「お姉ちゃんたちが助けにきたわよ～」"

[[dialogue]]
speaker = "サチ"
# 「サーシャ先輩！」
line = "「サーシャ先輩！」"

[[dialogue]]
speaker = "トマル"
# 「マトイ姉さま！」
line = "「マトイ姉さま！」"

[[dialogue]]
speaker = "unk"
# ２人共、間に合ったか……！
line = "２人共、間に合ったか……！"

[[dialogue]]
speaker = "unk"
# ここへ来る前、俺は嫌な予感がして、新星学園の星徒会メンバーに協力要請しておいたのだ。
line = "ここへ来る前、俺は嫌な予感がして、新星学園の星徒会メンバーに協力要請しておいたのだ。"

[[dialogue]]
speaker = "ディーラック"
# 「っ……！　他に誰も入って来れないよう、幸運の力で結界を張っていたはずなのにどうやって……！？」
line = "「っ……！　他に誰も入って来れないよう、幸運の力で結界を張っていたはずなのにどうやって……！？」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「確かに小さな穴を開けるのにも苦労したわ。でも、新星学園の星徒会にはすごく頭の良い<ruby=アナちゃん>副会長</ruby>と、規格外の力を持つ<ruby=ヴィーナスちゃん>フィクサー</ruby>がいるから」
line = "「確かに小さな穴を開けるのにも苦労したわ。でも、新星学園の星徒会にはすごく頭の良い<ruby>副会長<rt>アナちゃん</rt></ruby>と、規格外の力を持つ<ruby>フィクサー<rt>ヴィーナスちゃん</rt></ruby>がいるから」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「ヴィーナスのゴリ押しビームと私たちのノヴァフォームの力を合わせれば、一瞬だけなら２人通れるサイズの穴を開けられるって、アナが計算してくれたの」
line = "「ヴィーナスのゴリ押しビームと私たちのノヴァフォームの力を合わせれば、一瞬だけなら２人通れるサイズの穴を開けられるって、アナが計算してくれたの」"

[[dialogue]]
speaker = "ディーラック"
# 「ノヴァフォーム、本当に厄介な力なのサ……！　だけど、いくら星騎士が増えたところで、今のボクは止められないのサ！」
line = "「ノヴァフォーム、本当に厄介な力なのサ……！　だけど、いくら星騎士が増えたところで、今のボクは止められないのサ！」"

[[dialogue]]
speaker = "サチ"
# 「――いいえ、そんなことありません」
line = "「――いいえ、そんなことありません」"

[[dialogue]]
speaker = "ディーラック"
# 「助けが来て、運の流れが変わったとでも？」
line = "「助けが来て、運の流れが変わったとでも？」"

[[dialogue]]
speaker = "ディーラック"
# 「ハッ……そんなことあるわけないのサ！　だってサチちゃん、キミの『幸運』は今、ボクに全部奪われているんだから！」
line = "「ハッ……そんなことあるわけないのサ！　だってサチちゃん、キミの『幸運』は今、ボクに全部奪われているんだから！」"

[[dialogue]]
speaker = "ディーラック"
# 「わかるかい！？　キミの能力は失われたんだよ！　流れは全部、ボクにあるんだ！」
line = "「わかるかい！？　キミの能力は失われたんだよ！　流れは全部、ボクにあるんだ！」"

[[dialogue]]
speaker = "unk"
# しかし、サチは怯まず、真っすぐにディーラックを見つめ返しながら言う。
line = "しかし、サチは怯まず、真っすぐにディーラックを見つめ返しながら言う。"

[[dialogue]]
speaker = "サチ"
# 「違います。私の幸運は決して失われてなんかいません」
line = "「違います。私の幸運は決して失われてなんかいません」"

[[dialogue]]
speaker = "サチ"
# 「何故なら――私の本当の幸運は、私が困っている時、手を差し伸べて支えてくれる、みんながいてくれることだから」
line = "「何故なら――私の本当の幸運は、私が困っている時、手を差し伸べて支えてくれる、みんながいてくれることだから」"

[[dialogue]]
speaker = "ディーラック"
# 「は……？」
line = "「は……？」"

[[dialogue]]
speaker = "サチ"
# 「今回のことで、やっと分かったんです。私に<b>幸せを運んでくれる</b>人たち――その人たちとの出会いと絆こそが、私にとっての『幸運』なんだって」
line = "「今回のことで、やっと分かったんです。私に<b>幸せを運んでくれる</b>人たち――その人たちとの出会いと絆こそが、私にとっての『幸運』なんだって」"

[[dialogue]]
speaker = "サチ"
# 「だから……そこから生まれたラッキーをちょっと持って行かれた程度で、私は挫けたりしません！」
line = "「だから……そこから生まれたラッキーをちょっと持って行かれた程度で、私は挫けたりしません！」"

[[dialogue]]
speaker = "サチ"
# 「だって――」
line = "「だって――」"

[[dialogue]]
speaker = "サチ"
# 「私の輝く幸運の星たちは、こんなにも沢山輝いているんだから！」
line = "「私の輝く幸運の星たちは、こんなにも沢山輝いているんだから！」"

[[dialogue]]
speaker = "unk"
# その時だ。
line = "その時だ。"

[[dialogue]]
speaker = "unk"
# 俺の目に、サチの心に輝く<b>星</b>が見えた。
line = "俺の目に、サチの心に輝く<b>星</b>が見えた。"

[[dialogue]]
speaker = "unk"
# 先日、サチの戦闘服がアップデートされた際に――
line = "先日、サチの戦闘服がアップデートされた際に――"

[[dialogue]]
speaker = "トレジアンナ"
# 「実は、今はまだ使えませんが、サチさんの戦闘服にはもう１つの機能があります」
line = "「実は、今はまだ使えませんが、サチさんの戦闘服にはもう１つの機能があります」"

[[dialogue]]
speaker = "トレジアンナ"
# 「というより、本来はそっちが本命です」
line = "「というより、本来はそっちが本命です」"

[[dialogue]]
speaker = "トレジアンナ"
# 「魔王の力と同じように、別の力同士――星力と魔力を融合させることで爆発的に出力を引き上げる『融合反応炉心』」
line = "「魔王の力と同じように、別の力同士――星力と魔力を融合させることで爆発的に出力を引き上げる『融合反応炉心』」"

[[dialogue]]
speaker = "トレジアンナ"
# 「それを起動させるには、２つの条件を満たす必要があります」
line = "「それを起動させるには、２つの条件を満たす必要があります」"

[[dialogue]]
speaker = "トレジアンナ"
# 「１つは、サチさんが幸運の力を取り戻すこと。本来、融合反応は成功確率が非常に低く、それを安定させる為にはサチさんの幸運で成功確率を引き上げる必要があります」
line = "「１つは、サチさんが幸運の力を取り戻すこと。本来、融合反応は成功確率が非常に低く、それを安定させる為にはサチさんの幸運で成功確率を引き上げる必要があります」"

[[dialogue]]
speaker = "トレジアンナ"
# 「そして、もう１つの条件は――」
line = "「そして、もう１つの条件は――」"

[[dialogue]]
speaker = "unk"
# ――俺は信じていた。
line = "――俺は信じていた。"

[[dialogue]]
speaker = "unk"
# いや、きっと、他のみんなも同じだ。
line = "いや、きっと、他のみんなも同じだ。"

[[dialogue]]
speaker = "unk"
# サチならきっと、幸運を取り戻せる。
line = "サチならきっと、幸運を取り戻せる。"

[[dialogue]]
speaker = "unk"
# だから、俺は迷わずもう１つの条件――<b>炉心に火を灯す</b>為に、その技を叫ぶ。
line = "だから、俺は迷わずもう１つの条件――<b>炉心に火を灯す</b>為に、その技を叫ぶ。"

[[dialogue]]
speaker = "unk"
# アルケインノヴァエクストリーム！！！
line = "アルケインノヴァエクストリーム！！！"

[[dialogue]]
speaker = "unk"
# ――私は、白い光の中にいた。
line = "――私は、白い光の中にいた。"

[[dialogue]]
speaker = "unk"
# そして、その中で更に眩く輝く星を見つける。
line = "そして、その中で更に眩く輝く星を見つける。"

[[dialogue]]
speaker = "unk"
# 私はそれを掴もうと、手を伸ばす。
line = "私はそれを掴もうと、手を伸ばす。"

[[dialogue]]
speaker = "unk"
# しかし、私１人では手が届かない。
line = "しかし、私１人では手が届かない。"

[[dialogue]]
speaker = "unk"
# でも――
line = "でも――"

[[dialogue]]
speaker = "トレジアンナ"
# 「サチさん！」
line = "「サチさん！」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「サチちゃん！」
line = "「サチちゃん！」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「サチちゃん！」
line = "「サチちゃん！」"

[[dialogue]]
speaker = "シズハ"
# 「サチちゃん！」
line = "「サチちゃん！」"

[[dialogue]]
speaker = "トマル"
# 「サチさま！」
line = "「サチさま！」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「我がライバルなら、取り戻してみせろ！」
line = "「我がライバルなら、取り戻してみせろ！」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「サチ！！！」
line = "「サチ！！！」"

[[dialogue]]
speaker = "unk"
# みんなが、相棒が――背中を押してくれる。
line = "みんなが、相棒が――背中を押してくれる。"

[[dialogue]]
speaker = "unk"
# そして――ついに手が届き、掴み取る。
line = "そして――ついに手が届き、掴み取る。"

[[dialogue]]
speaker = "サチ"
# 「輝け――私の『<ruby=ラッキースター>幸運の星</ruby>』！！！」
line = "「輝け――私の『<ruby>幸運の星<rt>ラッキースター</rt></ruby>』！！！」"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「――感じます。流星がこちらに流れたのを」
line = "「――感じます。流星がこちらに流れたのを」"

[[dialogue]]
speaker = "ディーラック"
# 「な、なんなのサ……その姿は一体！？」
line = "「な、なんなのサ……その姿は一体！？」"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「これは、みんながくれた幸運の力……だから、今こそ名乗ります」
line = "「これは、みんながくれた幸運の力……だから、今こそ名乗ります」"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「この手に掴むは、明日を照らす光！」
line = "「この手に掴むは、明日を照らす光！」"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「幸運の魔法少女トレジャー☆サチ、フォルトゥーナフォーム！　ここに新生です！」
line = "「幸運の魔法少女トレジャー☆サチ、フォルトゥーナフォーム！　ここに新生です！」"

[[dialogue]]
speaker = "ディーラック"
# 「フォルトゥーナフォーム！？」
line = "「フォルトゥーナフォーム！？」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「――我らも忘れてもらっては困るぞ」
line = "「――我らも忘れてもらっては困るぞ」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「悪の終末兵器にして、トレジャー☆サチの宿命のライバル！　漆黒の魔法少女プリムラ†ノワール！」
line = "「悪の終末兵器にして、トレジャー☆サチの宿命のライバル！　漆黒の魔法少女プリムラ†ノワール！」"

[[dialogue]]
speaker = "シズハ"
# 「愛する友へ感謝を込めて、心願成就！　聖杯の魔法少女グレイル☆シズハ！」
line = "「愛する友へ感謝を込めて、心願成就！　聖杯の魔法少女グレイル☆シズハ！」"

[[dialogue]]
speaker = "トマル"
# 「僭越ながら、助太刀致します――魔法少女の友、詠野トマル！」
line = "「僭越ながら、助太刀致します――魔法少女の友、詠野トマル！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「そして、華麗に復活を遂げた蒐集の魔法少女――トレジャー☆アンナ！」
line = "「そして、華麗に復活を遂げた蒐集の魔法少女――トレジャー☆アンナ！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「さあ、サチさん！　素敵にステッキ、決めちゃいましょう！」
line = "「さあ、サチさん！　素敵にステッキ、決めちゃいましょう！」"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「はい！　人事天命――」
line = "「はい！　人事天命――」"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「ここからは、ハズレなしです！」
line = "「ここからは、ハズレなしです！」"

[[dialogue]]
speaker = "unk"
# そうして、新たな変身を果たしたサチを中心として、俺たちは再びディーラックへ勝負を挑むのだった――
line = "そうして、新たな変身を果たしたサチを中心として、俺たちは再びディーラックへ勝負を挑むのだった――"
