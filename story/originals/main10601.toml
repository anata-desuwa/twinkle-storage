[[dialogue]]
speaker = "unk"
# 第１話,第１話『バースデイムード』,B
line = "第１話,第１話『バースデイムード』,B"

[[dialogue]]
speaker = "unk"
# 某日──
line = "某日──"

[[dialogue]]
speaker = "クラウディア"
# 「──へくちょんっ！」
line = "「──へくちょんっ！」"

[[dialogue]]
speaker = "クラウディア"
# 「うー……最近は冷えてきたのう。毛布、毛布はどこだ」
line = "「うー……最近は冷えてきたのう。毛布、毛布はどこだ」"

[[dialogue]]
speaker = "クラウディア"
# 「人間界のなんと寒いことか。魔女の森にいた頃は、季節の移ろいなど気にも留めなかったが……」
line = "「人間界のなんと寒いことか。魔女の森にいた頃は、季節の移ろいなど気にも留めなかったが……」"

[[dialogue]]
speaker = "クラウディア"
# 「噂によれば人間界には『こたつ』なるアイテムがあるらしい。余の部屋にもぜひ設置してもらいたいところだ」
line = "「噂によれば人間界には『こたつ』なるアイテムがあるらしい。余の部屋にもぜひ設置してもらいたいところだ」"

[[dialogue]]
speaker = "クラウディア"
# 「しかし……冬といえば余の誕生日ぞ！　１２月２５日──かくもめでたき日を前に、ネビュラの連中は一体何をしておる」
line = "「しかし……冬といえば余の誕生日ぞ！　１２月２５日──かくもめでたき日を前に、ネビュラの連中は一体何をしておる」"

[[dialogue]]
speaker = "クラウディア"
# 「バースデーレディであるはずの余が、なぜひとりで積み木遊びなどしていなくてはならんのだ！」
line = "「バースデーレディであるはずの余が、なぜひとりで積み木遊びなどしていなくてはならんのだ！」"

[[dialogue]]
speaker = "クラウディア"
# 「<ruby=みな>ネビュラの魔女たち</ruby>は……しっかり『おいわい』の準備をしておるのか？　なんだか不安になってきたぞ」
line = "「<ruby>ネビュラの魔女たち<rt>みな</rt></ruby>は……しっかり『おいわい』の準備をしておるのか？　なんだか不安になってきたぞ」"

[[dialogue]]
speaker = "クラウディア"
# 「もしかすると連中──余の誕生日など、すっかり忘れてしまっているのではあるまいな！？」
line = "「もしかすると連中──余の誕生日など、すっかり忘れてしまっているのではあるまいな！？」"

[[dialogue]]
speaker = "クラウディア"
# 「嫌な予感がしてきたぞ。そういえば、この前も……」
line = "「嫌な予感がしてきたぞ。そういえば、この前も……」"

[[dialogue]]
speaker = "クラウディア"
# 「──わっはっは、元気か？　ネビュラの魔女たちよ！」
line = "「──わっはっは、元気か？　ネビュラの魔女たちよ！」"

[[dialogue]]
speaker = "ウェンディ"
# 「あ、クラウディア様。ご心配なく、元気にやっておりますよ」
line = "「あ、クラウディア様。ご心配なく、元気にやっておりますよ」"

[[dialogue]]
speaker = "クラウディア"
# 「そうか。だが、もう『としのせ』であるぞ。この時期になると色々と忙しいのではないか？」
line = "「そうか。だが、もう『としのせ』であるぞ。この時期になると色々と忙しいのではないか？」"

[[dialogue]]
speaker = "ウェンディ"
# 「ええ……確かに師走とあって、片付けなくちゃならない仕事は多いです」
line = "「ええ……確かに師走とあって、片付けなくちゃならない仕事は多いです」"

[[dialogue]]
speaker = "クラウディア"
# 「そうであろうそうであろう！　なにせ１２月には、色々と催しごとが目白押しだから──なあ？」
line = "「そうであろうそうであろう！　なにせ１２月には、色々と催しごとが目白押しだから──なあ？」"

[[dialogue]]
speaker = "ウェンディ"
# 「ふふ、確かにそうですね」
line = "「ふふ、確かにそうですね」"

[[dialogue]]
speaker = "ウェンディ"
# 「ですが、年末になって慌てないよう普段から余裕をもって動いています。心配いただかずとも大丈夫ですよ、クラウディア様」
line = "「ですが、年末になって慌てないよう普段から余裕をもって動いています。心配いただかずとも大丈夫ですよ、クラウディア様」"

[[dialogue]]
speaker = "クラウディア"
# 「そうか……」
line = "「そうか……」"

[[dialogue]]
speaker = "クラウディア"
# 「セドナよ。お主も精が出るのう！」
line = "「セドナよ。お主も精が出るのう！」"

[[dialogue]]
speaker = "セドナ"
# 「？　どうかされましたか、姫様」
line = "「？　どうかされましたか、姫様」"

[[dialogue]]
speaker = "クラウディア"
# 「いや、特に何も。ただ……日頃の労をねぎらおうと思ってな」
line = "「いや、特に何も。ただ……日頃の労をねぎらおうと思ってな」"

[[dialogue]]
speaker = "クラウディア"
# 「それにしても──いやあ、もう１２月とは！　時が過ぎるのは早いのう──なあ？」
line = "「それにしても──いやあ、もう１２月とは！　時が過ぎるのは早いのう──なあ？」"

[[dialogue]]
speaker = "セドナ"
# 「その通りです。だからこそ１分１秒を重んじ、漫然と過ぎる時を許してはならない」
line = "「その通りです。だからこそ１分１秒を重んじ、漫然と過ぎる時を許してはならない」"

[[dialogue]]
speaker = "セドナ"
# 「我々ネビュラが解決しなければならない任務は、まだまだ山のように積み上がっているのですから」
line = "「我々ネビュラが解決しなければならない任務は、まだまだ山のように積み上がっているのですから」"

[[dialogue]]
speaker = "クラウディア"
# 「お、おう……」
line = "「お、おう……」"

[[dialogue]]
speaker = "クラウディア"
# 「今にして思えば誰ひとり、バースデーのバの字も口にしていないではないか」
line = "「今にして思えば誰ひとり、バースデーのバの字も口にしていないではないか」"

[[dialogue]]
speaker = "クラウディア"
# 「うーっ……どうにも気に食わん。かと言って、余からアピールするのもなんだか<ruby=しゃく>癪</ruby>だ」
line = "「うーっ……どうにも気に食わん。かと言って、余からアピールするのもなんだか<ruby>癪<rt>しゃく</rt></ruby>だ」"

[[dialogue]]
speaker = "クラウディア"
# 「本来ならもう前々々々々々々々々…………夜祭を行っていてもおかしくない頃合いだというのに！」
line = "「本来ならもう前々々々々々々々々…………夜祭を行っていてもおかしくない頃合いだというのに！」"

[[dialogue]]
speaker = "クラウディア"
# 「そうでなくとも最近は、学園との交流も増えて、やれ『ぎじゅつていけい』だの『そうごきょうりょく』だので、基地を留守にすることが増えた」
line = "「そうでなくとも最近は、学園との交流も増えて、やれ『ぎじゅつていけい』だの『そうごきょうりょく』だので、基地を留守にすることが増えた」"

[[dialogue]]
speaker = "クラウディア"
# 「セドナも……ウェンディも……何をコソコソ出かけて、余をほっぽらかしにしておるというのだ」
line = "「セドナも……ウェンディも……何をコソコソ出かけて、余をほっぽらかしにしておるというのだ」"

[[dialogue]]
speaker = "クラウディア"
# 「余は四六時中ここにいて、ヒマでヒマで仕方ないというのに……余を祝う気持ちどころか、よそよそしささえ感じる」
line = "「余は四六時中ここにいて、ヒマでヒマで仕方ないというのに……余を祝う気持ちどころか、よそよそしささえ感じる」"

[[dialogue]]
speaker = "クラウディア"
# 「せっかく余が人間界との交流を打ち出したというのに、その余が自由に動けんとはどういうことだ。まったく面白くない」
line = "「せっかく余が人間界との交流を打ち出したというのに、その余が自由に動けんとはどういうことだ。まったく面白くない」"

[[dialogue]]
speaker = "クラウディア"
# 「なぜこんなことに……ん？　待てよ」
line = "「なぜこんなことに……ん？　待てよ」"

[[dialogue]]
speaker = "クラウディア"
# 「そういえば、この前、勝手に抜け出して遊びに行った日も……」
line = "「そういえば、この前、勝手に抜け出して遊びに行った日も……」"

[[dialogue]]
speaker = "セーラ"
# 『もーすぐクリスマスだねー。ルリちーはなんか予定あるの？』
line = "『もーすぐクリスマスだねー。ルリちーはなんか予定あるの？』"

[[dialogue]]
speaker = "ルリエル"
# 『はい！　聖歌隊ではキャロルを歌ったり、募金活動をしたりします！』
line = "『はい！　聖歌隊ではキャロルを歌ったり、募金活動をしたりします！』"

[[dialogue]]
speaker = "ユウリ"
# 『いいな。クリスマスが近づくと、なんかワクワクしてくるよな』
line = "『いいな。クリスマスが近づくと、なんかワクワクしてくるよな』"

[[dialogue]]
speaker = "セーラ"
# 『わかる。ついついテンション上がっちゃうよね』
line = "『わかる。ついついテンション上がっちゃうよね』"

[[dialogue]]
speaker = "ルリエル"
# 『１２月って、学園も忙しい時期ですけど……クリスマスのおかげで毎日楽しみになっちゃいます！』
line = "『１２月って、学園も忙しい時期ですけど……クリスマスのおかげで毎日楽しみになっちゃいます！』"

[[dialogue]]
speaker = "クラウディア"
# 「くりすます……もしや、アレのせいか！？」
line = "「くりすます……もしや、アレのせいか！？」"

[[dialogue]]
speaker = "クラウディア"
# 「なんということだ。噂に聞けばあのクリスマスとやらも、１２月２５日であるという」
line = "「なんということだ。噂に聞けばあのクリスマスとやらも、１２月２５日であるという」"

[[dialogue]]
speaker = "クラウディア"
# 「解せぬ！　１２月２５日といえばクラウディア・イルゼ・フォン・ゴットフリートの生誕日！　それ以外の祝うべきことなどない！」
line = "「解せぬ！　１２月２５日といえばクラウディア・イルゼ・フォン・ゴットフリートの生誕日！　それ以外の祝うべきことなどない！」"

[[dialogue]]
speaker = "クラウディア"
# 「だというのに……世間はクリスマスなぞにうつつを抜かしておる！　これはどういうことだ！」
line = "「だというのに……世間はクリスマスなぞにうつつを抜かしておる！　これはどういうことだ！」"

[[dialogue]]
speaker = "クラウディア"
# 「もしや他の魔女たちも、人間界の風潮にたぶらかされておるのではないか！？」
line = "「もしや他の魔女たちも、人間界の風潮にたぶらかされておるのではないか！？」"

[[dialogue]]
speaker = "クラウディア"
# 「魔女の森にそんな風習はなかったというのに……なんと軟弱なことか！」
line = "「魔女の森にそんな風習はなかったというのに……なんと軟弱なことか！」"

[[dialogue]]
speaker = "クラウディア"
# 「それに……クリスマスというのは、サンタクロースなるものにプレゼントをもらえる日らしい。それもおかしな話だ」
line = "「それに……クリスマスというのは、サンタクロースなるものにプレゼントをもらえる日らしい。それもおかしな話だ」"

[[dialogue]]
speaker = "クラウディア"
# 「せっかく、余だけがめでたい日だというのに……他の連中もプレゼントをもらっているなんて」
line = "「せっかく、余だけがめでたい日だというのに……他の連中もプレゼントをもらっているなんて」"

[[dialogue]]
speaker = "クラウディア"
# 「う～……なんだか釈然としないぞ！　サンタがそんなに偉いのか～！」
line = "「う～……なんだか釈然としないぞ！　サンタがそんなに偉いのか～！」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「──クリスマスはサンタを祝う日じゃないよん、クラウディア様」
line = "「──クリスマスはサンタを祝う日じゃないよん、クラウディア様」"
