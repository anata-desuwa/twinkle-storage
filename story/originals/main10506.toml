[[dialogue]]
speaker = "unk"
# 第６話,閃へのプレゼントだぴょん！,B
line = "第６話,閃へのプレゼントだぴょん！,B"

[[dialogue]]
speaker = "閃"
# 「お……お嬢様……ぐ、偶然ですね……」
line = "「お……お嬢様……ぐ、偶然ですね……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「閃、探してたのよ！　なかなか見つからなくて困ったわ」
line = "「閃、探してたのよ！　なかなか見つからなくて困ったわ」"

[[dialogue]]
speaker = "閃"
# 「も、申し訳ありません……」
line = "「も、申し訳ありません……」"

[[dialogue]]
speaker = "蘭美"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ヴィーナス"
# 「実はね、閃にビックリドッキリなサプライズプレゼントがあるのよ！　驚いた？」
line = "「実はね、閃にビックリドッキリなサプライズプレゼントがあるのよ！　驚いた？」"

[[dialogue]]
speaker = "閃"
# 「は、はい……びっくりしました……」
line = "「は、はい……びっくりしました……」"

[[dialogue]]
speaker = "蘭美"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "閃"
# 「は、はは……」
line = "「は、はは……」"

[[dialogue]]
speaker = "蘭美"
# 「バレバレよ。下手な演技はおよしなさい、閃」
line = "「バレバレよ。下手な演技はおよしなさい、閃」"

[[dialogue]]
speaker = "閃"
# 「う……」
line = "「う……」"

[[dialogue]]
speaker = "蘭美"
# 「やっぱり予測の星眼を持つ閃にサプライズプレゼントは難しかったようね」
line = "「やっぱり予測の星眼を持つ閃にサプライズプレゼントは難しかったようね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「えっ？　じゃ全部演技で最初から気付いてたってこと？」
line = "「えっ？　じゃ全部演技で最初から気付いてたってこと？」"

[[dialogue]]
speaker = "閃"
# 「も、申し訳ありません……」
line = "「も、申し訳ありません……」"

[[dialogue]]
speaker = "蘭美"
# 「お嬢様の護衛である閃が、今日に限ってこちらから探しても出会えないというのは変だと思ったのよ」
line = "「お嬢様の護衛である閃が、今日に限ってこちらから探しても出会えないというのは変だと思ったのよ」"

[[dialogue]]
speaker = "蘭美"
# 「大方、プレゼントを渡されるのにベストなタイミングを見計ろうとして、却ってわざとらしい登場になってしまった、といったところかしら？」
line = "「大方、プレゼントを渡されるのにベストなタイミングを見計ろうとして、却ってわざとらしい登場になってしまった、といったところかしら？」"

[[dialogue]]
speaker = "閃"
# 「お察しの通りです……」
line = "「お察しの通りです……」"

[[dialogue]]
speaker = "蘭美"
# 「それで、どこまで先を見通せているのかしら？」
line = "「それで、どこまで先を見通せているのかしら？」"

[[dialogue]]
speaker = "閃"
# 「メイド長のクリスマスフォームを覚醒させるためにプレゼントを配っていることと……クリスマスの思い出を聞いて回っていること……」
line = "「メイド長のクリスマスフォームを覚醒させるためにプレゼントを配っていることと……クリスマスの思い出を聞いて回っていること……」"

[[dialogue]]
speaker = "閃"
# 「後は……お２人が何をプレゼントに選んだのか……くらいでしょうか……」
line = "「後は……お２人が何をプレゼントに選んだのか……くらいでしょうか……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「つまり全部ってことじゃない！！」
line = "「つまり全部ってことじゃない！！」"

[[dialogue]]
speaker = "閃"
# 「そ……そういうことになります……」
line = "「そ……そういうことになります……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「つまんない～。もー、さっさとプレゼント渡しちゃって終わりにしましょう」
line = "「つまんない～。もー、さっさとプレゼント渡しちゃって終わりにしましょう」"

[[dialogue]]
speaker = "閃"
# 「そんなぁ～～……！」
line = "「そんなぁ～～……！」"

[[dialogue]]
speaker = "蘭美"
# 「とんでもなくすごい能力なんだけど、こういう時には不便ね……予測の星眼」
line = "「とんでもなくすごい能力なんだけど、こういう時には不便ね……予測の星眼」"

[[dialogue]]
speaker = "閃"
# 「親にも同じことを言われたことがあります……」
line = "「親にも同じことを言われたことがあります……」"

[[dialogue]]
speaker = "閃"
# 「あんな事は滅多に起きることじゃないんだから、無理に星眼を開いたままにしていなくていいんだよって」
line = "「あんな事は滅多に起きることじゃないんだから、無理に星眼を開いたままにしていなくていいんだよって」"

[[dialogue]]
speaker = "閃"
# 「でも、もし私が<b>視て</b>いなかったばかりに、災いを避けられなかったら、と考えると……」
line = "「でも、もし私が<b>視て</b>いなかったばかりに、災いを避けられなかったら、と考えると……」"

[[dialogue]]
speaker = "蘭美"
# （閃は９歳の頃、ご両親とのドライブ中にトラックと衝突するという事故に遭っている）
line = "（閃は９歳の頃、ご両親とのドライブ中にトラックと衝突するという事故に遭っている）"

[[dialogue]]
speaker = "蘭美"
# （その時の閃は星眼を開いておらず、事故を避けることが出来なかった）
line = "（その時の閃は星眼を開いておらず、事故を避けることが出来なかった）"

[[dialogue]]
speaker = "蘭美"
# （閃が普段から、負担のかかる星眼を開いたままにしているのは、この時のトラウマによるもの）
line = "（閃が普段から、負担のかかる星眼を開いたままにしているのは、この時のトラウマによるもの）"

[[dialogue]]
speaker = "蘭美"
# （自分が<b>視て</b>いれば、誰かの危機を救うことが出来るかもしれない……そんな考えに囚われるようになった）
line = "（自分が<b>視て</b>いれば、誰かの危機を救うことが出来るかもしれない……そんな考えに囚われるようになった）"

[[dialogue]]
speaker = "蘭美"
# （そして星眼を閉じることに恐怖を覚えるようにも……）
line = "（そして星眼を閉じることに恐怖を覚えるようにも……）"

[[dialogue]]
speaker = "蘭美"
# 「そうね、閃の場合事情が事情だから仕方がないと言えるわね」
line = "「そうね、閃の場合事情が事情だから仕方がないと言えるわね」"

[[dialogue]]
speaker = "閃"
# 「申し訳ありません……」
line = "「申し訳ありません……」"

[[dialogue]]
speaker = "蘭美"
# 「いいわよ。急がなくても少しずつ過去の傷を癒していけば──」
line = "「いいわよ。急がなくても少しずつ過去の傷を癒していけば──」"

[[dialogue]]
speaker = "ヴィーナス"
# 「今すぐ星眼を閉じなさい！」
line = "「今すぐ星眼を閉じなさい！」"

[[dialogue]]
speaker = "閃"
# 「お嬢様ぁっ！！？」
line = "「お嬢様ぁっ！！？」"

[[dialogue]]
speaker = "蘭美"
# 「ふっ、さすがお嬢様。容赦がないわね」
line = "「ふっ、さすがお嬢様。容赦がないわね」"

[[dialogue]]
speaker = "閃"
# 「あの……星眼を閉じて、万が一お嬢様の身に何かあったら、と思うと私は──」
line = "「あの……星眼を閉じて、万が一お嬢様の身に何かあったら、と思うと私は──」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ちょっとの間だけでいいから！」
line = "「ちょっとの間だけでいいから！」"

[[dialogue]]
speaker = "閃"
# 「こ、恐いです～！」
line = "「こ、恐いです～！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「怖くない！　四の五の言わずに閉じるのよ！」
line = "「怖くない！　四の五の言わずに閉じるのよ！」"

[[dialogue]]
speaker = "閃"
# 「わ、わかりましたぁ～～！！！」
line = "「わ、わかりましたぁ～～！！！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「閉じたかしら？」
line = "「閉じたかしら？」"

[[dialogue]]
speaker = "閃"
# 「……閉じました」
line = "「……閉じました」"

[[dialogue]]
speaker = "ヴィーナス"
# 「確認するけれど、あなたの星眼は視覚情報を元に、これから先に起きる未来を導き出すものよね？」
line = "「確認するけれど、あなたの星眼は視覚情報を元に、これから先に起きる未来を導き出すものよね？」"

[[dialogue]]
speaker = "閃"
# 「はい……」
line = "「はい……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「出力を最大にしても３分先までの予知が限界。つまり……」
line = "「出力を最大にしても３分先までの予知が限界。つまり……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「今、この場で考えたサプライズなら、閃も予測できないということで間違いないわよね？」
line = "「今、この場で考えたサプライズなら、閃も予測できないということで間違いないわよね？」"

[[dialogue]]
speaker = "蘭美"
# 「確かにそうね！　それで何をプレゼントする気なの、お嬢様？」
line = "「確かにそうね！　それで何をプレゼントする気なの、お嬢様？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……それが問題なのよ、ぶっちゃけ何も思い付いてないわ！」
line = "「……それが問題なのよ、ぶっちゃけ何も思い付いてないわ！」"

[[dialogue]]
speaker = "閃"
# 「あ、あの……お嬢様、私はそのお気持ちだけで十分……」
line = "「あ、あの……お嬢様、私はそのお気持ちだけで十分……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「だめよ……それじゃ私の気が済まないわ……うーん、そうね……えいっ！」
line = "「だめよ……それじゃ私の気が済まないわ……うーん、そうね……えいっ！」"

[[dialogue]]
speaker = "閃"
# 「っ……！？！？！？！？！？」
line = "「っ……！？！？！？！？！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「いつも私のことを護衛してくれてありがとう、閃……なでなで」
line = "「いつも私のことを護衛してくれてありがとう、閃……なでなで」"

[[dialogue]]
speaker = "閃"
# 「おおおお、お嬢様……こ、これは……」
line = "「おおおお、お嬢様……こ、これは……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「頑張ってる閃に、私から『なでなで』のプレゼントよ……なでなで」
line = "「頑張ってる閃に、私から『なでなで』のプレゼントよ……なでなで」"

[[dialogue]]
speaker = "ヴィーナス"
# 「どうかしら、こんなのしか思いつかなかったけれど……サプライズを味わえてるかしら？」
line = "「どうかしら、こんなのしか思いつかなかったけれど……サプライズを味わえてるかしら？」"

[[dialogue]]
speaker = "閃"
# 「お嬢様……私……幸せです……はぅぅ……」
line = "「お嬢様……私……幸せです……はぅぅ……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふふん、驚きすぎて固まってしまってるじゃない？　どうやら大成功過ぎるくらい大成功だったみたいねっ！」
line = "「ふふん、驚きすぎて固まってしまってるじゃない？　どうやら大成功過ぎるくらい大成功だったみたいねっ！」"

[[dialogue]]
speaker = "蘭美"
# 「まあ閃にとっては、間違いなく最高のプレゼントだと思うわ」
line = "「まあ閃にとっては、間違いなく最高のプレゼントだと思うわ」"

[[dialogue]]
speaker = "蘭美"
# 「その後で申し訳ないけれど、こちらのクリスマスプレゼントも受け取ってね。訓練用の竹刀を収める竹刀袋よ」
line = "「その後で申し訳ないけれど、こちらのクリスマスプレゼントも受け取ってね。訓練用の竹刀を収める竹刀袋よ」"

[[dialogue]]
speaker = "閃"
# 「あ、ありがとう……ございますぅ……」
line = "「あ、ありがとう……ございますぅ……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「なでなでなで……」
line = "「なでなでなで……」"

[[dialogue]]
speaker = "閃"
# 「はぅぅぅ～～……」
line = "「はぅぅぅ～～……」"

[[dialogue]]
speaker = "蘭美"
# （なんて罪作りなのかしら……お嬢様、恐ろしい子っ！！）
line = "（なんて罪作りなのかしら……お嬢様、恐ろしい子っ！！）"
