line = "（デネブのアポロは言った。『お前を信じる』──と）"

[[dialogue]]
speaker = "梨緒"
# （そう言われたら、私だって信じるしかないだろう……！　必ず生きて会えると……信じているからな……！）
line = "（そう言われたら、私だって信じるしかないだろう……！　必ず生きて会えると……信じているからな……！）"

