line = "「でもルヴィは極星星徒会の仲間で、誰よりも一生懸命デネブを守ってきた……」"

[[dialogue]]
speaker = "ベアトリス"
# 「ルヴィがリクリエ側だとしたら、デネブを守ってきたのも、リクリエを成就させるため……」
line = "「ルヴィがリクリエ側だとしたら、デネブを守ってきたのも、リクリエを成就させるため……」"

[[dialogue]]
speaker = "ベアトリス"
# 「だけどそんなの、信じられないよ……」
line = "「だけどそんなの、信じられないよ……」"

[[dialogue]]
speaker = "ナターシャ"
# 「まぁ確かに、何日か監視したけど、ルヴィネは真面目にデネブを守ってたよね」
line = "「まぁ確かに、何日か監視したけど、ルヴィネは真面目にデネブを守ってたよね」"

[[dialogue]]
speaker = "ナターシャ"
# 「少なくとも、どうせ滅ぼすからどうでもいい、って思ってるようには見えなかったかな」
line = "「少なくとも、どうせ滅ぼすからどうでもいい、って思ってるようには見えなかったかな」"

[[dialogue]]
speaker = "ベアトリス"
# 「私がみんなに自分の素性を話せなかったように、ルヴィも言えないことがあるのかも……」
line = "「私がみんなに自分の素性を話せなかったように、ルヴィも言えないことがあるのかも……」"

[[dialogue]]
speaker = "ベアトリス"
# 「『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』に生み出されたから、その命令に従っているのかもしれない……」
line = "「『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』に生み出されたから、その命令に従っているのかもしれない……」"

[[dialogue]]
speaker = "ナターシャ"
# 「つまり、ベアトはまだルヴィネを信じたいんだ？」
line = "「つまり、ベアトはまだルヴィネを信じたいんだ？」"

[[dialogue]]
speaker = "ベアトリス"
# 「うん。アルタイルのみんなからすれば、虫のいいことを言ってると思うだろうけど……」
line = "「うん。アルタイルのみんなからすれば、虫のいいことを言ってると思うだろうけど……」"

[[dialogue]]
speaker = "ベアトリス"
# 「でも私、もう一度ルヴィに会わないと納得できない。もう一回、ルヴィの口から話を聞きたい……！」
line = "「でも私、もう一度ルヴィに会わないと納得できない。もう一回、ルヴィの口から話を聞きたい……！」"

[[dialogue]]
speaker = "ナターシャ"
# 「なるほど。ま、いいんじゃない」
line = "「なるほど。ま、いいんじゃない」"

[[dialogue]]
speaker = "ナターシャ"
# 「『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』や新しい女神の存在だけでも、とんでもないどんでん返しだったからね。まだ何かあってもおかしくないよ」
line = "「『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』や新しい女神の存在だけでも、とんでもないどんでん返しだったからね。まだ何かあってもおかしくないよ」"

[[dialogue]]
speaker = "クロト"
# 「現状、ルヴィネがアルタイルの敵であることは間違いないだろう」
line = "「現状、ルヴィネがアルタイルの敵であることは間違いないだろう」"

[[dialogue]]
speaker = "クロト"
# 「だけど俺も、彼女がデネブの人々を守るところを見た。確かにルヴィネは真摯にデネブを守ろうとしているように思える」
line = "「だけど俺も、彼女がデネブの人々を守るところを見た。確かにルヴィネは真摯にデネブを守ろうとしているように思える」"

[[dialogue]]
speaker = "クロト"
# 「彼女がディザスターハンドを操れるなら、今までもアルタイルやデネブを破壊することができたはずだ。それをしなかった理由があるのかもしれない」
line = "「彼女がディザスターハンドを操れるなら、今までもアルタイルやデネブを破壊することができたはずだ。それをしなかった理由があるのかもしれない」"

[[dialogue]]
speaker = "クロト"
# 「彼女が本当に『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』に従っているのか、あるいは他に思惑があるのか、ルヴィネにはまだ聞くべきことがありそうだ」
line = "「彼女が本当に『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』に従っているのか、あるいは他に思惑があるのか、ルヴィネにはまだ聞くべきことがありそうだ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうね、知ってることを洗いざらい喋ってもらうわ！」
line = "「そうね、知ってることを洗いざらい喋ってもらうわ！」"

[[dialogue]]
speaker = "unk"
# フィーニスの塔ではルヴィネの正体に迫ることができた。
line = "フィーニスの塔ではルヴィネの正体に迫ることができた。"

[[dialogue]]
speaker = "unk"
# だが『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』に生み出されたルヴィネなら、まだ俺たちの知らない事実を知っているのではないかと思うのだった。
line = "だが『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』に生み出されたルヴィネなら、まだ俺たちの知らない事実を知っているのではないかと思うのだった。"
