line = "「……そうか。オマエがそう言うなら信じるぞ」"

[[dialogue]]
speaker = "アポロ"
# 「だけど相談したいことがあったら言ってくれよな。あたしたちは仲間なんだから」
line = "「だけど相談したいことがあったら言ってくれよな。あたしたちは仲間なんだから」"

[[dialogue]]
speaker = "梨緒"
# 「ああ、ありがとう、アポロ」
line = "「ああ、ありがとう、アポロ」"

