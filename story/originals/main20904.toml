# 「正直、自分でもよくわからないんだ……」
line = "「正直、自分でもよくわからないんだ……」"

[[dialogue]]
speaker = "梨緒"
# 「だけど、きっと誰かに相談できることじゃない。自分で向き合わなきゃいけないことなんだ」
line = "「だけど、きっと誰かに相談できることじゃない。自分で向き合わなきゃいけないことなんだ」"

