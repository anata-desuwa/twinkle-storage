line = "「本当に？　大丈夫なようには見えないが……」"

[[dialogue]]
speaker = "unk"
# ごまかすように返事をする梨緒の顔を、アポロが心配そうにのぞき込む。
line = "ごまかすように返事をする梨緒の顔を、アポロが心配そうにのぞき込む。"

