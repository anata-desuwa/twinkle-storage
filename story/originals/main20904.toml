line = "「……信じろ、とアポロは言っていた。だから私は信じる。２人はあの場を切り抜けて、今も生きていると」"

[[dialogue]]
speaker = "クロト"
# 「……ああ、そうだな」
line = "「……ああ、そうだな」"

[[dialogue]]
speaker = "クロト"
# 「母さんは『何とかする算段はある』と言っていた。母さんがそう言うなら、何か手立てはあるはずだ」
line = "「母さんは『何とかする算段はある』と言っていた。母さんがそう言うなら、何か手立てはあるはずだ」"

[[dialogue]]
speaker = "アポロ"
# 「そうだぞ、平行世界とはいえあたしはあたしだ。ヒーローは負けないさ！」
line = "「そうだぞ、平行世界とはいえあたしはあたしだ。ヒーローは負けないさ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……そうね。今はくよくよしている場合じゃないわ！」
line = "「……そうね。今はくよくよしている場合じゃないわ！」"

[[dialogue]]
speaker = "フィオナ"
# 「はい。『世界を救ってこい』と言われましたから」
line = "「はい。『世界を救ってこい』と言われましたから」"

[[dialogue]]
speaker = "unk"
# 残念ながら、レジスタンスの２人のために今できることは何もない。
line = "残念ながら、レジスタンスの２人のために今できることは何もない。"

[[dialogue]]
speaker = "unk"
# 命を賭して俺たちを送り出してくれた２人のためにも、今は前を向かなければいけない。
line = "命を賭して俺たちを送り出してくれた２人のためにも、今は前を向かなければいけない。"

[[dialogue]]
speaker = "unk"
# 環もいつか必ず迎えに行くと約束した。
line = "環もいつか必ず迎えに行くと約束した。"

[[dialogue]]
speaker = "アポロ"
# 「デネブのあたしがレジスタンスなんてやってるとはな。かっこいいじゃないか！」
line = "「デネブのあたしがレジスタンスなんてやってるとはな。かっこいいじゃないか！」"

[[dialogue]]
speaker = "アポロ"
# 「なぁなぁ、向こうのあたしはどんな感じだったんだ？」
line = "「なぁなぁ、向こうのあたしはどんな感じだったんだ？」"

[[dialogue]]
speaker = "梨緒"
# 「ベガの彼女よりも成長していて、立派な大人になっていたよ。まさにヒーローのような強さと頼もしさだった」
line = "「ベガの彼女よりも成長していて、立派な大人になっていたよ。まさにヒーローのような強さと頼もしさだった」"

[[dialogue]]
speaker = "アポロ"
# 「そうか！　いっぺん自分で見てみたいけど、何とかならないかなぁ～」
line = "「そうか！　いっぺん自分で見てみたいけど、何とかならないかなぁ～」"

[[dialogue]]
speaker = "梨緒"
