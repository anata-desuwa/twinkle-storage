line = "「ベアトは大丈夫？　ベアトもショックだったでしょ？」"

[[dialogue]]
speaker = "ベアトリス"
# 「う、うん……ルヴィが女神で、しかもリクリエ側だったなんて……」
line = "「う、うん……ルヴィが女神で、しかもリクリエ側だったなんて……」"

[[dialogue]]
speaker = "unk"
# ベアトリスは極星学園の副会長として、ルヴィネを誰よりも近くで見てきたはずだ。
line = "ベアトリスは極星学園の副会長として、ルヴィネを誰よりも近くで見てきたはずだ。"

[[dialogue]]
speaker = "unk"
# そんなベアトリスにとって、ルヴィネの正体は大きな衝撃だっただろう。
line = "そんなベアトリスにとって、ルヴィネの正体は大きな衝撃だっただろう。"

[[dialogue]]
speaker = "ベアトリス"
