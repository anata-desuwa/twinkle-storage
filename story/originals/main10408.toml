[[dialogue]]
speaker = "unk"
# 第８話,オペレーション・ペンタグラム,B
line = "第８話,オペレーション・ペンタグラム,B"

[[dialogue]]
speaker = "unk"
# セドナとウェンディが基地に戻ると、さっそく指令室にネビュラの主要メンバーが集められた。
line = "セドナとウェンディが基地に戻ると、さっそく指令室にネビュラの主要メンバーが集められた。"

[[dialogue]]
speaker = "unk"
# そしてセドナの口から、ヘレナとの会談結果、新星・流星学園との協調路線を取ることになったことが示される。
line = "そしてセドナの口から、ヘレナとの会談結果、新星・流星学園との協調路線を取ることになったことが示される。"

[[dialogue]]
speaker = "アイリーン"
# 「守護天使の問題、人間側にもちゃんと気付いてるヒトがいたんだね」
line = "「守護天使の問題、人間側にもちゃんと気付いてるヒトがいたんだね」"

[[dialogue]]
speaker = "リーリア"
# 「危険度でいったら、ふつーにリクリエ並みですからね……マジカルヤバいですよ」
line = "「危険度でいったら、ふつーにリクリエ並みですからね……マジカルヤバいですよ」"

[[dialogue]]
speaker = "セドナ"
# 「その通りだ。我々魔女にとっても放置しておける問題ではない」
line = "「その通りだ。我々魔女にとっても放置しておける問題ではない」"

[[dialogue]]
speaker = "セドナ"
# 「守護天使の本体が封じられている魔界の神殿は６つ。その内所在が明らかになっている神殿は５つだ」
line = "「守護天使の本体が封じられている魔界の神殿は６つ。その内所在が明らかになっている神殿は５つだ」"

[[dialogue]]
speaker = "セドナ"
# 「今回の作戦ではその全てに、同時に星騎士たちを送り込むことになる」
line = "「今回の作戦ではその全てに、同時に星騎士たちを送り込むことになる」"

[[dialogue]]
speaker = "セドナ"
# 「我々ネビュラ隊員はその各チームに随行し案内役を務めるのだ」
line = "「我々ネビュラ隊員はその各チームに随行し案内役を務めるのだ」"

[[dialogue]]
speaker = "ウェンディ"
# 「大規模な作戦になりそうですし、イニシュも叩き起こしてきた方がいいでしょうか？」
line = "「大規模な作戦になりそうですし、イニシュも叩き起こしてきた方がいいでしょうか？」"

[[dialogue]]
speaker = "セドナ"
# 「今はいい、寝かせておけ。本戦には参加してもらうが」
line = "「今はいい、寝かせておけ。本戦には参加してもらうが」"

[[dialogue]]
speaker = "アイリーン"
# 「それじゃ、マリオンさんには私から連絡しておきます」
line = "「それじゃ、マリオンさんには私から連絡しておきます」"

[[dialogue]]
speaker = "セドナ"
# 「ああ、頼む」
line = "「ああ、頼む」"

[[dialogue]]
speaker = "リーリア"
# 「ううう～っ、まさに共同作戦って感じでテンションあがる～！」
line = "「ううう～っ、まさに共同作戦って感じでテンションあがる～！」"

[[dialogue]]
speaker = "カヤ"
# 「私は粛々と与えられた任務を遂行するのみ」
line = "「私は粛々と与えられた任務を遂行するのみ」"

[[dialogue]]
speaker = "リーリア"
# 「そんなこと言わずに仲良くしてみたら？　ま、カヤらしいけど」
line = "「そんなこと言わずに仲良くしてみたら？　ま、カヤらしいけど」"

[[dialogue]]
speaker = "セドナ"
# 「まだ話は終わっていないぞ。もうひとつ大事なことがある」
line = "「まだ話は終わっていないぞ。もうひとつ大事なことがある」"

[[dialogue]]
speaker = "セドナ"
# 「この作戦の話は我々の間だけに留めておくように。……決して姫様のお耳に入れてはならない」
line = "「この作戦の話は我々の間だけに留めておくように。……決して姫様のお耳に入れてはならない」"

[[dialogue]]
speaker = "アイリーン"
# 「あ～、クラウディア様が聞いたら、絶対自分も参加するって言い出すに決まってるからね」
line = "「あ～、クラウディア様が聞いたら、絶対自分も参加するって言い出すに決まってるからね」"

[[dialogue]]
speaker = "セドナ"
# 「姫様には世界樹に魔力を注ぐ役目を担ってもらわなくてはならない」
line = "「姫様には世界樹に魔力を注ぐ役目を担ってもらわなくてはならない」"

[[dialogue]]
speaker = "セドナ"
# 「説明は当日、私が行う。それまでくれぐれも作戦が漏れぬよう注意せよ」
line = "「説明は当日、私が行う。それまでくれぐれも作戦が漏れぬよう注意せよ」"

[[dialogue]]
speaker = "セドナ"
# 「作戦名は『オペレーション・ペンタグラム』、当日に向けて各々準備を怠らぬように！」
line = "「作戦名は『オペレーション・ペンタグラム』、当日に向けて各々準備を怠らぬように！」"

[[dialogue]]
speaker = "全員"
# 「イエス・マム！」
line = "「イエス・マム！」"

[[dialogue]]
speaker = "unk"
# そうして数日が経過し──
line = "そうして数日が経過し──"

[[dialogue]]
speaker = "unk"
# ネビュラと星騎士たちの初めての共同作戦、『オペレーション・ペンタグラム』の日を迎えた。
line = "ネビュラと星騎士たちの初めての共同作戦、『オペレーション・ペンタグラム』の日を迎えた。"

[[dialogue]]
speaker = "セドナ"
# 「──話が決まったところで作戦の説明を進めよう。天使の本体は現在、魔界の各地の<ruby=ふる>旧</ruby>い神殿に封印されている」
line = "「──話が決まったところで作戦の説明を進めよう。天使の本体は現在、魔界の各地の<ruby>旧<rt>ふる</rt></ruby>い神殿に封印されている」"

[[dialogue]]
speaker = "セドナ"
# 「作戦はいたって単純だ。流星市国から魔界にある神殿に戦力を送り込み、堕天使となった守護天使を撃破する」
line = "「作戦はいたって単純だ。流星市国から魔界にある神殿に戦力を送り込み、堕天使となった守護天使を撃破する」"

[[dialogue]]
speaker = "セドナ"
# 「ただし世界樹で送れる戦力には限りがある。一ヵ所につき十数名が限界だろう」
line = "「ただし世界樹で送れる戦力には限りがある。一ヵ所につき十数名が限界だろう」"

[[dialogue]]
speaker = "セドナ"
# 「そしておそらく、堕天使は今までに戦ったものより格段に強い。何せ女神に近い高等存在の本体。死闘になるのは必至だ」
line = "「そしておそらく、堕天使は今までに戦ったものより格段に強い。何せ女神に近い高等存在の本体。死闘になるのは必至だ」"

[[dialogue]]
speaker = "セドナ"
# 「また、案内として各チームにはネビュラの魔女が同行する。世界樹の中で迷子になっては敵わないからな」
line = "「また、案内として各チームにはネビュラの魔女が同行する。世界樹の中で迷子になっては敵わないからな」"

[[dialogue]]
speaker = "セドナ"
# 「しかし魔界への道を開くのに膨大な魔力を消費する。世界樹にかかる負担も大きい。チャンスは一度きりだ」
line = "「しかし魔界への道を開くのに膨大な魔力を消費する。世界樹にかかる負担も大きい。チャンスは一度きりだ」"

[[dialogue]]
speaker = "ヘレナ"
# 『つまり敗北は許されない。<ruby=けんこんいってき>乾坤一擲</ruby>の戦いだ。心してくれ』
line = "『つまり敗北は許されない。<ruby>乾坤一擲<rt>けんこんいってき</rt></ruby>の戦いだ。心してくれ』"

[[dialogue]]
speaker = "ウェンディ"
# （……いよいよ始まります、か……）
line = "（……いよいよ始まります、か……）"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「ねえねえ、ウェンディ」
line = "「ねえねえ、ウェンディ」"

[[dialogue]]
speaker = "ウェンディ"
# 「ツェツィーリエ！？　どうしてここに……！」
line = "「ツェツィーリエ！？　どうしてここに……！」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「なーんかお祭り騒ぎみたいになってるからさ、様子を見にきたんだよん♪」
line = "「なーんかお祭り騒ぎみたいになってるからさ、様子を見にきたんだよん♪」"

[[dialogue]]
speaker = "ウェンディ"
# 「冷やかしですか、帰ってください」
line = "「冷やかしですか、帰ってください」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「塩対応だな～、戦いの前にエールを送ろうと思っただけなのに」
line = "「塩対応だな～、戦いの前にエールを送ろうと思っただけなのに」"

[[dialogue]]
speaker = "ウェンディ"
# 「気持ちだけ受け取っておきます」
line = "「気持ちだけ受け取っておきます」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「あとさ、今回のお話、ありがとうって言っときたくてね」
line = "「あとさ、今回のお話、ありがとうって言っときたくてね」"

[[dialogue]]
speaker = "ウェンディ"
# 「ん、何の話ですか？」
line = "「ん、何の話ですか？」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「ほら、学園と同盟を組んで一緒にやってくって話になったでしょ？」
line = "「ほら、学園と同盟を組んで一緒にやってくって話になったでしょ？」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「資金だけじゃなくて<ruby=こっち>技術</ruby>の方でも学園の人たちが協力してくれることになったんだよね」
line = "「資金だけじゃなくて<ruby>技術<rt>こっち</rt></ruby>の方でも学園の人たちが協力してくれることになったんだよね」"

[[dialogue]]
speaker = "ウェンディ"
# 「ああ、そうでしたね。お礼というのはその事ですか」
line = "「ああ、そうでしたね。お礼というのはその事ですか」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「そうだよ。ひょっとしたら、こないだの発明が日の目を見る時もあるかも」
line = "「そうだよ。ひょっとしたら、こないだの発明が日の目を見る時もあるかも」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「その時はウェンディ、また試作品のテストを手伝って♪」
line = "「その時はウェンディ、また試作品のテストを手伝って♪」"

[[dialogue]]
speaker = "ウェンディ"
# 「あんな目に遭うのは二度とごめんです！」
line = "「あんな目に遭うのは二度とごめんです！」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「たはは♪　でもさ、これを機に人間界との交流が盛んになればいいね」
line = "「たはは♪　でもさ、これを機に人間界との交流が盛んになればいいね」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「アタシの夢も、ウェンディの夢も、いよいよ現実味を帯びてくるんじゃない？」
line = "「アタシの夢も、ウェンディの夢も、いよいよ現実味を帯びてくるんじゃない？」"

[[dialogue]]
speaker = "ウェンディ"
# 「ええ……そうですね……」
line = "「ええ……そうですね……」"

[[dialogue]]
speaker = "ウェンディ"
# （人間界との交流が盛んになり、魔女たちの間にも経済という概念が浸透していけば……）
line = "（人間界との交流が盛んになり、魔女たちの間にも経済という概念が浸透していけば……）"

[[dialogue]]
speaker = "ウェンディ"
# （そうすればいよいよ実現するかもしれません……私の悲願、魔女の森に銀行を作るという夢も）
line = "（そうすればいよいよ実現するかもしれません……私の悲願、魔女の森に銀行を作るという夢も）"

[[dialogue]]
speaker = "ウェンディ"
# （それにツェツィーリエの夢……）
line = "（それにツェツィーリエの夢……）"

[[dialogue]]
speaker = "ウェンディ"
# （人間界との交流が盛んになれば、その技術が魔女の森にも取り入れられていくことになるでしょう──）
line = "（人間界との交流が盛んになれば、その技術が魔女の森にも取り入れられていくことになるでしょう──）"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「あのさ、前からずっと思ってたんだけど、アタシたちってさ……」
line = "「あのさ、前からずっと思ってたんだけど、アタシたちってさ……」"

[[dialogue]]
speaker = "ウェンディ"
# 「あ～！　それ以上言わないでください！　ありえません！　断固拒否します！」
line = "「あ～！　それ以上言わないでください！　ありえません！　断固拒否します！」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「え～、言わせろよ～！」
line = "「え～、言わせろよ～！」"

[[dialogue]]
speaker = "ウェンディ"
# （……ずっと、目を背けていたんですから）
line = "（……ずっと、目を背けていたんですから）"

[[dialogue]]
speaker = "ウェンディ"
# （いがみ合ってはいるけれど……私とツェツィーリエ、似た者同士だってこと）
line = "（いがみ合ってはいるけれど……私とツェツィーリエ、似た者同士だってこと）"

[[dialogue]]
speaker = "セドナ"
# 「ウェンディ、いつまで無駄話をしているつもりだ！」
line = "「ウェンディ、いつまで無駄話をしているつもりだ！」"

[[dialogue]]
speaker = "ウェンディ"
# 「も、申し訳ありません！」
line = "「も、申し訳ありません！」"

[[dialogue]]
speaker = "セドナ"
# 「お前はイニシュを連れてマグダレナの神殿に向かってもらう、心してかかれ」
line = "「お前はイニシュを連れてマグダレナの神殿に向かってもらう、心してかかれ」"

[[dialogue]]
speaker = "ウェンディ"
# 「了解しました！！！」
line = "「了解しました！！！」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「……ま、頑張ってね。無事に帰ってきなよ」
line = "「……ま、頑張ってね。無事に帰ってきなよ」"

[[dialogue]]
speaker = "ウェンディ"
# 「ええ、行ってきます！」
line = "「ええ、行ってきます！」"
