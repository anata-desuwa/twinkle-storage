[[dialogue]]
speaker = "unk"
# いよいよ明日はバレンタインデー。それなのにまたチョコレート泥棒が出てしまったらしい──俺は大急ぎでカフェテリアへ向かった。
line = "いよいよ明日はバレンタインデー。それなのにまたチョコレート泥棒が出てしまったらしい──俺は大急ぎでカフェテリアへ向かった。"

[[dialogue]]
speaker = "ルリエル"
# 「ちちち、違うのです～……！　ルリエルは犯人じゃないのです！　ちょっと目を離した隙に、誰かが食べ散らかしていて……！」
line = "「ちちち、違うのです～……！　ルリエルは犯人じゃないのです！　ちょっと目を離した隙に、誰かが食べ散らかしていて……！」"

[[dialogue]]
speaker = "セーラ"
# 「それは疑ってないんだけど……ルリちーが購買行って帰るまで、１０分くらいでしょ？　そんなにたくさん食べられるもの？」
line = "「それは疑ってないんだけど……ルリちーが購買行って帰るまで、１０分くらいでしょ？　そんなにたくさん食べられるもの？」"

[[dialogue]]
speaker = "ウズメイア"
# 「作り置きしてたチョコ、片っ端から食べられちゃうだなんて……」
line = "「作り置きしてたチョコ、片っ端から食べられちゃうだなんて……」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「本当に由々しき事態ですね。明日の大聖堂のイベントに間に合うでしょうか……」
line = "「本当に由々しき事態ですね。明日の大聖堂のイベントに間に合うでしょうか……」"

[[dialogue]]
speaker = "unk"
# ジュエリー、どう思う？
line = "ジュエリー、どう思う？"

[[dialogue]]
speaker = "ジュエリー"
# 「助手。もしかしたら一連の犯行は、モンスターの仕業かもしれない」
line = "「助手。もしかしたら一連の犯行は、モンスターの仕業かもしれない」"

[[dialogue]]
speaker = "ジュエリー"
# 「前回の盗み食いの時から奇妙なんだ。いくら何でもカフェテリアにあるチョコを全部食べつくすだなんて、人間業じゃないだろう？」
line = "「前回の盗み食いの時から奇妙なんだ。いくら何でもカフェテリアにあるチョコを全部食べつくすだなんて、人間業じゃないだろう？」"

[[dialogue]]
speaker = "ジュエリー"
# 「集団犯かとも思ったが、その痕跡もない。それにこれを見てくれるかい。昨夜、かじられたチョコの余りだ」
line = "「集団犯かとも思ったが、その痕跡もない。それにこれを見てくれるかい。昨夜、かじられたチョコの余りだ」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「それは、私の失敗作の……？」
line = "「それは、私の失敗作の……？」"

[[dialogue]]
speaker = "ジュエリー"
# 「ああ。シャルレーヌさんが昨日、昼間に作っていた激辛チョコさ。こっそり拝借して置いておいたんだが、またかじられている」
line = "「ああ。シャルレーヌさんが昨日、昼間に作っていた激辛チョコさ。こっそり拝借して置いておいたんだが、またかじられている」"

[[dialogue]]
speaker = "ジュエリー"
# 「このチョコを辛いと知っている者なら、食べずに放っておくだろう？　しかし同じミスを２度もしている。犯人には知能が見られないんだ」
line = "「このチョコを辛いと知っている者なら、食べずに放っておくだろう？　しかし同じミスを２度もしている。犯人には知能が見られないんだ」"

[[dialogue]]
speaker = "ウズメイア"
# 「でもアラートは反応してないんだよね？」
line = "「でもアラートは反応してないんだよね？」"

[[dialogue]]
speaker = "ジュエリー"
# 「だからここからは想像なんだが……もしかしたら、新種のモンスターではないかな？」
line = "「だからここからは想像なんだが……もしかしたら、新種のモンスターではないかな？」"

[[dialogue]]
speaker = "ジュエリー"
# 「星騎士にもステルス能力を持った生徒がいるだろう？　それと同じような力を持つ、特殊個体モンスター……そう考えると辻褄が合う」
line = "「星騎士にもステルス能力を持った生徒がいるだろう？　それと同じような力を持つ、特殊個体モンスター……そう考えると辻褄が合う」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「確かに仮説として成り立つとは思いますけれど、目的は一体……？」
line = "「確かに仮説として成り立つとは思いますけれど、目的は一体……？」"

[[dialogue]]
speaker = "ウズメイア"
# 「うーん……あれじゃない？　星力の込められたチョコだし、それを食べて強くなろうとしてるとか……」
line = "「うーん……あれじゃない？　星力の込められたチョコだし、それを食べて強くなろうとしてるとか……」"

[[dialogue]]
speaker = "ジュエリー"
# 「ともかく、アラートに反応しないからヒトの犯行、という思い込みは捨てるべきかもしれない。今後の対応だが──」
line = "「ともかく、アラートに反応しないからヒトの犯行、という思い込みは捨てるべきかもしれない。今後の対応だが──」"

[[dialogue]]
speaker = "女子生徒"
# 「──キャァアァアアーッ！」
line = "「──キャァアァアアーッ！」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「今の悲鳴は……！？」
line = "「今の悲鳴は……！？」"

[[dialogue]]
speaker = "ウズメイア"
# 「みんな、あっち！　カフェの隅っこ──！」
line = "「みんな、あっち！　カフェの隅っこ──！」"

[[dialogue]]
speaker = "フワッチ"
# 「イ～～～～～～っ♪」
line = "「イ～～～～～～っ♪」"

[[dialogue]]
speaker = "女子生徒"
# 「やめてぇ！　それ、大切なチョコなの！　食べないで～！」
line = "「やめてぇ！　それ、大切なチョコなの！　食べないで～！」"

[[dialogue]]
speaker = "ウズメイア"
# 「ああっ、ひどい！　手当たり次第にチョコを食べてる……！　あいつが犯人！？」
line = "「ああっ、ひどい！　手当たり次第にチョコを食べてる……！　あいつが犯人！？」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「モンスター発生のアラートが反応していません！　ジュエリー先輩の推理が当たったみたいです……！」
line = "「モンスター発生のアラートが反応していません！　ジュエリー先輩の推理が当たったみたいです……！」"

[[dialogue]]
speaker = "ルリエル"
# 「というか、あのフワッチ……チョコを食べるたびに大きくなっていませんか！？」
line = "「というか、あのフワッチ……チョコを食べるたびに大きくなっていませんか！？」"

[[dialogue]]
speaker = "フワッチ"
# 「イーーーーーーッ！！」
line = "「イーーーーーーッ！！」"

[[dialogue]]
speaker = "unk"
# チョコを暴食していたフワッチが輝きだし、そして──
line = "チョコを暴食していたフワッチが輝きだし、そして──"

[[dialogue]]
speaker = "チョコッチ"
# 「イ～～～～ト～～～～ッ！！」
line = "「イ～～～～ト～～～～ッ！！」"

[[dialogue]]
speaker = "ウズメイア"
# 「青天霹靂～っ！？　なんか進化したし～～～っ！？」
line = "「青天霹靂～っ！？　なんか進化したし～～～っ！？」"
