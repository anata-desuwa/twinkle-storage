[[dialogue]]
speaker = "unk"
# 第５話,煌嶺の野望,B
line = "第５話,煌嶺の野望,B"

[[dialogue]]
speaker = "煌嶺"
# 「聞こえなかったか？　妾がこの新星学園の学園長になると言ったのだ」
line = "「聞こえなかったか？　妾がこの新星学園の学園長になると言ったのだ」"

[[dialogue]]
speaker = "ヘレナ"
# 「無論聞こえているとも。ただ、貴殿の申し出は意外であった」
line = "「無論聞こえているとも。ただ、貴殿の申し出は意外であった」"

[[dialogue]]
speaker = "ヘレナ"
# 「学園長というのは存外面倒なものだ。キュリオスの主・煌嶺は奔放で知られているが、失礼ながら学園長が務まるのかと思ってな」
line = "「学園長というのは存外面倒なものだ。キュリオスの主・煌嶺は奔放で知られているが、失礼ながら学園長が務まるのかと思ってな」"

[[dialogue]]
speaker = "煌嶺"
# 「これでも妾は一国の主。組織を束ねる苦労は理解しているとも」
line = "「これでも妾は一国の主。組織を束ねる苦労は理解しているとも」"

[[dialogue]]
speaker = "ヘレナ"
# 「しかし学園長の職務を行う間、キュリオスをどうするのだ？　国を長く留守にするわけにもいくまい」
line = "「しかし学園長の職務を行う間、キュリオスをどうするのだ？　国を長く留守にするわけにもいくまい」"

[[dialogue]]
speaker = "煌嶺"
# 「大交流の度にキュリオスと新星学園を行き来すれば良かろう」
line = "「大交流の度にキュリオスと新星学園を行き来すれば良かろう」"

[[dialogue]]
speaker = "煌嶺"
# 「ラティエとはキュリオスで<ruby=まみ>見</ruby>えたが、あやつは流星学園の学園長なのだろう？　なら常にここにいる必要はあるまい」
line = "「ラティエとはキュリオスで<ruby>見<rt>まみ</rt></ruby>えたが、あやつは流星学園の学園長なのだろう？　なら常にここにいる必要はあるまい」"

[[dialogue]]
speaker = "ヘレナ"
# （相変わらず余計なことをしてくれるな、<ruby=やつ>ラティエ</ruby>は……）
line = "（相変わらず余計なことをしてくれるな、<ruby>ラティエ<rt>やつ</rt></ruby>は……）"

[[dialogue]]
speaker = "煌嶺"
# 「随分と邪険にしてくれるではないか、ヘレナ殿。そんなに妾が気に入らぬか？」
line = "「随分と邪険にしてくれるではないか、ヘレナ殿。そんなに妾が気に入らぬか？」"

[[dialogue]]
speaker = "ヘレナ"
# 「いやいや、ただの確認だとも」
line = "「いやいや、ただの確認だとも」"

[[dialogue]]
speaker = "ヘレナ"
# 「貴殿は学園というものを知らない。就任してから、想像していたものと違うとなってはお互い不幸だからな」
line = "「貴殿は学園というものを知らない。就任してから、想像していたものと違うとなってはお互い不幸だからな」"

[[dialogue]]
speaker = "煌嶺"
# 「なるほど。それはご心配痛み入る。さすが傾いていた九浄家を建て直したヘレナ殿だ」
line = "「なるほど。それはご心配痛み入る。さすが傾いていた九浄家を建て直したヘレナ殿だ」"

[[dialogue]]
speaker = "ヘレナ"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "煌嶺"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# 静かに視線と意志をぶつけ合うヘレナと煌嶺。
line = "静かに視線と意志をぶつけ合うヘレナと煌嶺。"

[[dialogue]]
speaker = "unk"
# 相手は悪名高きキュリオスの主。星騎士の学園の長にふさわしいとは思えない。
line = "相手は悪名高きキュリオスの主。星騎士の学園の長にふさわしいとは思えない。"

[[dialogue]]
speaker = "unk"
# 何よりヘレナの直感が告げていた。彼女を学園長にしてはいけないと。
line = "何よりヘレナの直感が告げていた。彼女を学園長にしてはいけないと。"

[[dialogue]]
speaker = "ヘレナ"
# 「ならば問おう。貴殿はなぜ学園長になりたいのだ？」
line = "「ならば問おう。貴殿はなぜ学園長になりたいのだ？」"

[[dialogue]]
speaker = "煌嶺"
# 「簡単だ」
line = "「簡単だ」"

[[dialogue]]
speaker = "煌嶺"
# 「妾は欲しい。この学園が。星騎士が」
line = "「妾は欲しい。この学園が。星騎士が」"

[[dialogue]]
speaker = "煌嶺"
# 「欲するものは手に入れる。それが妾だ」
line = "「欲するものは手に入れる。それが妾だ」"

[[dialogue]]
speaker = "unk"
# 煌嶺の宝石のような瞳が、炎を灯したように爛々と輝く。
line = "煌嶺の宝石のような瞳が、炎を灯したように爛々と輝く。"

[[dialogue]]
speaker = "unk"
# そこに映るのは、ただ純粋な欲望。
line = "そこに映るのは、ただ純粋な欲望。"

[[dialogue]]
speaker = "unk"
# “欲しい”──その感情が煌嶺という存在を衝き動かしていた。
line = "“欲しい”──その感情が煌嶺という存在を衝き動かしていた。"

[[dialogue]]
speaker = "理事Ａ"
# 「そ、それだけのことで学園長に……？」
line = "「そ、それだけのことで学園長に……？」"

[[dialogue]]
speaker = "煌嶺"
# 「それだけ、とはつれないな。“欲しい”は立派な動機だぞ？」
line = "「それだけ、とはつれないな。“欲しい”は立派な動機だぞ？」"

[[dialogue]]
speaker = "煌嶺"
# 「先日のガーディアンとの戦いは見せてもらった。取るに足らぬ有象無象かと思っていたが、中々に悪くない」
line = "「先日のガーディアンとの戦いは見せてもらった。取るに足らぬ有象無象かと思っていたが、中々に悪くない」"

[[dialogue]]
speaker = "煌嶺"
# 「今の実力であれば妾どころか、キュリオスの精兵にも及ばぬ」
line = "「今の実力であれば妾どころか、キュリオスの精兵にも及ばぬ」"

[[dialogue]]
speaker = "煌嶺"
# 「だが見どころはある。秘めた星々の輝きは、磨けばより鋭さを増し、乱麻を絶つが如く敵を斬る剣となるだろう」
line = "「だが見どころはある。秘めた星々の輝きは、磨けばより鋭さを増し、乱麻を絶つが如く敵を斬る剣となるだろう」"

[[dialogue]]
speaker = "煌嶺"
# 「そして、妾が学園長になるのはもうひとつ理由がある」
line = "「そして、妾が学園長になるのはもうひとつ理由がある」"

[[dialogue]]
speaker = "unk"
# 煌嶺がにぃっと笑みを深めた。
line = "煌嶺がにぃっと笑みを深めた。"

[[dialogue]]
speaker = "unk"
# まるで虎視眈々と得物を狙う肉食獣のように。
line = "まるで虎視眈々と得物を狙う肉食獣のように。"

[[dialogue]]
speaker = "煌嶺"
# 「妾はこの世界を守る。たとえ他の世界を滅ぼしてもな」
line = "「妾はこの世界を守る。たとえ他の世界を滅ぼしてもな」"

[[dialogue]]
speaker = "理事Ｂ"
# 「！」
line = "「！」"

[[dialogue]]
speaker = "unk"
# その瞬間、会議室の空気が変わった。
line = "その瞬間、会議室の空気が変わった。"

[[dialogue]]
speaker = "unk"
# 煌嶺の堂々とした宣言は、浮足立っていた理事たちの心を鷲掴みにし、女帝の存在感が場を侵食していく。
line = "煌嶺の堂々とした宣言は、浮足立っていた理事たちの心を鷲掴みにし、女帝の存在感が場を侵食していく。"

[[dialogue]]
speaker = "ヘレナ"
# 「なるほど。あの動画は貴殿の仕業であったか」
line = "「なるほど。あの動画は貴殿の仕業であったか」"

[[dialogue]]
speaker = "煌嶺"
# 「さてな」
line = "「さてな」"

[[dialogue]]
speaker = "unk"
# 厳しい視線を向けるヘレナに対し、煌嶺が不敵に笑んだ。
line = "厳しい視線を向けるヘレナに対し、煌嶺が不敵に笑んだ。"

[[dialogue]]
speaker = "煌嶺"
# 「この世界──アルタイルを守ればデネブが滅ぶ。それは嘆かわしいことだ」
line = "「この世界──アルタイルを守ればデネブが滅ぶ。それは嘆かわしいことだ」"

[[dialogue]]
speaker = "煌嶺"
# 「暴君で知られる妾とて、平行世界の民を皆殺しにしたいわけではない。だがこの世界を守るためならば妾は迷わん」
line = "「暴君で知られる妾とて、平行世界の民を皆殺しにしたいわけではない。だがこの世界を守るためならば妾は迷わん」"

[[dialogue]]
speaker = "煌嶺"
# 「生存競争であるというなら、この戦い、受けて立とうではないか！」
line = "「生存競争であるというなら、この戦い、受けて立とうではないか！」"

[[dialogue]]
speaker = "理事Ｂ"
# 「おお……！」
line = "「おお……！」"

[[dialogue]]
speaker = "unk"
# 煌嶺を訝しんでいた理事までもが、眼の色を変えて彼女を見ていた。
line = "煌嶺を訝しんでいた理事までもが、眼の色を変えて彼女を見ていた。"

[[dialogue]]
speaker = "unk"
# キュリオスの女帝はただ強いだけではない。人心を掌握し、虜にし──我が物にする。
line = "キュリオスの女帝はただ強いだけではない。人心を掌握し、虜にし──我が物にする。"

[[dialogue]]
speaker = "unk"
# それが欲望の化身たる彼女の力だった。
line = "それが欲望の化身たる彼女の力だった。"

[[dialogue]]
speaker = "煌嶺"
# 「おっと。部下から連絡だ……ほう、良い甘味の店が見つかったとな」
line = "「おっと。部下から連絡だ……ほう、良い甘味の店が見つかったとな」"

[[dialogue]]
speaker = "煌嶺"
# 「何？　先着１０名限定の隠しメニュー……？　うむ、それは今すぐ向かわねばなるまい。妾はそれが“欲しい”のだからな」
line = "「何？　先着１０名限定の隠しメニュー……？　うむ、それは今すぐ向かわねばなるまい。妾はそれが“欲しい”のだからな」"

[[dialogue]]
speaker = "煌嶺"
# 「ではまた会おう。次の理事会を楽しみにしているぞ」
line = "「ではまた会おう。次の理事会を楽しみにしているぞ」"

[[dialogue]]
speaker = "ヘレナ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# 悠々と会議室を後にする煌嶺を、ヘレナは渋い顔で見送った。
line = "悠々と会議室を後にする煌嶺を、ヘレナは渋い顔で見送った。"
