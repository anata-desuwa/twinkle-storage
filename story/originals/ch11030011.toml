[[dialogue]]
speaker = "unk"
# 第１話,ロクサーナの突撃取材,P
line = "第１話,ロクサーナの突撃取材,P"

[[dialogue]]
speaker = "unk"
# この日は朝早くから、星徒会室に来客があった。
line = "この日は朝早くから、星徒会室に来客があった。"

[[dialogue]]
speaker = "ロクサーナ"
# 「演劇部部長ロクサーナだ！　朝イチから失礼する」
line = "「演劇部部長ロクサーナだ！　朝イチから失礼する」"

[[dialogue]]
speaker = "アナ"
# 「おはようございます、ロクサーナ部長。演劇部の部費の申請ですか」
line = "「おはようございます、ロクサーナ部長。演劇部の部費の申請ですか」"

[[dialogue]]
speaker = "ロクサーナ"
# 「先日の舞台では演出の都合上、セットを派手に爆破したからな。追加申請をしたいのはやまやまなのだが、今日の目的はそれじゃない。会長への取材申請だ」
line = "「先日の舞台では演出の都合上、セットを派手に爆破したからな。追加申請をしたいのはやまやまなのだが、今日の目的はそれじゃない。会長への取材申請だ」"

[[dialogue]]
speaker = "unk"
# 俺に取材？
line = "俺に取材？"

[[dialogue]]
speaker = "ロクサーナ"
# 「新星学園で最も強い男である星徒会長をモデルにした寸劇をやってほしいとリクエストがあってな」
line = "「新星学園で最も強い男である星徒会長をモデルにした寸劇をやってほしいとリクエストがあってな」"

[[dialogue]]
speaker = "ロクサーナ"
# 「差し当たり、リアリティ追及のため、会長に密着取材をおこないたいというわけだ」
line = "「差し当たり、リアリティ追及のため、会長に密着取材をおこないたいというわけだ」"

[[dialogue]]
speaker = "ロクサーナ"
# 「会長、お前のできる反応は『首を縦に振る』か『ＹＥＳと言う』の２択だ。どっちを選んでも良いぞ」
line = "「会長、お前のできる反応は『首を縦に振る』か『ＹＥＳと言う』の２択だ。どっちを選んでも良いぞ」"

[[dialogue]]
speaker = "unk"
# ＹＥＳ
line = "ＹＥＳ"

[[dialogue]]
speaker = "unk"
# （首を縦に振る）
line = "（首を縦に振る）"

[[dialogue]]
speaker = "ロクサーナ"
# 「よろしい！　では、早速、取材を始めさせてもらう。手始めに趣味、好きな物、癖と将来の夢はなんだ？」
line = "「よろしい！　では、早速、取材を始めさせてもらう。手始めに趣味、好きな物、癖と将来の夢はなんだ？」"

[[dialogue]]
speaker = "アナ"
# 「会長の趣味は漫画を読むことと時代劇を見ること。好きな物は和菓子ですね」
line = "「会長の趣味は漫画を読むことと時代劇を見ること。好きな物は和菓子ですね」"

[[dialogue]]
speaker = "アナ"
# 「手持ち無沙汰だと、そわそわする癖があります。ワーカーホリック気味ですね。将来の夢は立派な星騎士になること……とメモリーしています」
line = "「手持ち無沙汰だと、そわそわする癖があります。ワーカーホリック気味ですね。将来の夢は立派な星騎士になること……とメモリーしています」"

[[dialogue]]
speaker = "ロクサーナ"
# 「……ふむ。会長、今の情報に間違いはないか？　訂正する点は？」
line = "「……ふむ。会長、今の情報に間違いはないか？　訂正する点は？」"

[[dialogue]]
speaker = "unk"
# 特にないです
line = "特にないです"

[[dialogue]]
speaker = "アナ"
# 「会長の補佐たる副会長たるもの、このくらい答えられて当然。オフコースです」
line = "「会長の補佐たる副会長たるもの、このくらい答えられて当然。オフコースです」"

[[dialogue]]
speaker = "ロクサーナ"
# 「なるほど。会長には極めて優秀な副会長がついているのだな。重要な役どころだ。メイプルにでもやらせるとするか」
line = "「なるほど。会長には極めて優秀な副会長がついているのだな。重要な役どころだ。メイプルにでもやらせるとするか」"

[[dialogue]]
speaker = "ロクサーナ"
# 「アナ副会長、お前から見て、会長はどのような存在だ？」
line = "「アナ副会長、お前から見て、会長はどのような存在だ？」"

[[dialogue]]
speaker = "アナ"
# 「会長ですか。全生徒が手本とするべき、尊い存在ですね。人格、人柄、容姿、仕事ぶりなど全てにおいて、非の打ちどころがありません。パーフェクトです」
line = "「会長ですか。全生徒が手本とするべき、尊い存在ですね。人格、人柄、容姿、仕事ぶりなど全てにおいて、非の打ちどころがありません。パーフェクトです」"

[[dialogue]]
speaker = "unk"
# 後で和菓子をあげよう
line = "後で和菓子をあげよう"

[[dialogue]]
speaker = "アナ"
# 「ありがたき幸せ」
line = "「ありがたき幸せ」"

[[dialogue]]
speaker = "アナ"
# 「ロクサーナ部長、取材はこれで終了でしょうか？」
line = "「ロクサーナ部長、取材はこれで終了でしょうか？」"

[[dialogue]]
speaker = "ロクサーナ"
# 「バカを言え。この程度の情報収集は序の口に過ぎん。密着取材はまだ始まったばかりだ。今日１日、会長と行動を共にさせてもらう」
line = "「バカを言え。この程度の情報収集は序の口に過ぎん。密着取材はまだ始まったばかりだ。今日１日、会長と行動を共にさせてもらう」"

[[dialogue]]
speaker = "ロクサーナ"
# 「ふむ。授業は極めて真面目に取り組んでいるようだな」
line = "「ふむ。授業は極めて真面目に取り組んでいるようだな」"

[[dialogue]]
speaker = "ロクサーナ"
# 「昼食はハンバーグプレートか。ふむ、会長はライスを箸で食べる派なのだな」
line = "「昼食はハンバーグプレートか。ふむ、会長はライスを箸で食べる派なのだな」"

[[dialogue]]
speaker = "ロクサーナ"
# 「ふむふむ。星徒会の仕事ぶりは実に興味深い。星徒会各役員のキャスティングは悩ましいな」
line = "「ふむふむ。星徒会の仕事ぶりは実に興味深い。星徒会各役員のキャスティングは悩ましいな」"

[[dialogue]]
speaker = "unk"
# 新星星徒会、出撃する！
line = "新星星徒会、出撃する！"

[[dialogue]]
speaker = "unk"
# アステライト発生アラートだ！
line = "アステライト発生アラートだ！"

[[dialogue]]
speaker = "ロクサーナ"
# 「おお！　待っていたのはこの瞬間だ！」
line = "「おお！　待っていたのはこの瞬間だ！」"

[[dialogue]]
speaker = "アナ"
# 「ロクサーナ部長、ついてくるつもりですか？」
line = "「ロクサーナ部長、ついてくるつもりですか？」"

[[dialogue]]
speaker = "ロクサーナ"
# 「当然だろう！　千載一遇の取材チャンス！　この決定的瞬間を見逃してどうする！」
line = "「当然だろう！　千載一遇の取材チャンス！　この決定的瞬間を見逃してどうする！」"

[[dialogue]]
speaker = "アナ"
# 「星徒会活動は遊びではありません。極めてデンジャラスですよ」
line = "「星徒会活動は遊びではありません。極めてデンジャラスですよ」"

[[dialogue]]
speaker = "ロクサーナ"
# 「私の取材とて遊びではない！　取材が危険と隣り合わせなのは承知の上だ！」
line = "「私の取材とて遊びではない！　取材が危険と隣り合わせなのは承知の上だ！」"

[[dialogue]]
speaker = "ロクサーナ"
# 「これでもプリマステラの端くれだ。己の身を護る程度の力は備わっている。心配せずとも足を引っ張るような真似も、手を煩わせるような愚行もせん」
line = "「これでもプリマステラの端くれだ。己の身を護る程度の力は備わっている。心配せずとも足を引っ張るような真似も、手を煩わせるような愚行もせん」"

[[dialogue]]
speaker = "ロクサーナ"
# 「取材を拒否されようとも、私は私の信念で動く。神であろうが星徒会長であろうが、私の好奇心を止められる者は存在せん！」
line = "「取材を拒否されようとも、私は私の信念で動く。神であろうが星徒会長であろうが、私の好奇心を止められる者は存在せん！」"

[[dialogue]]
speaker = "アナ"
# 「会長、そちらに向かいました！」
line = "「会長、そちらに向かいました！」"

[[dialogue]]
speaker = "unk"
# ディマイズブレイカー！
line = "ディマイズブレイカー！"

[[dialogue]]
speaker = "ロクサーナ"
# 「うむ、実に見事な手際だ。今の戦いを舞台で再現するとなると、派手なアクションが必要になる。演出泣かせだな。また舞台のひとつも爆破せねばなるまい」
line = "「うむ、実に見事な手際だ。今の戦いを舞台で再現するとなると、派手なアクションが必要になる。演出泣かせだな。また舞台のひとつも爆破せねばなるまい」"

[[dialogue]]
speaker = "unk"
# 無事、アステライトを制圧し、本日の星徒会業務はこれにて終了となった。
line = "無事、アステライトを制圧し、本日の星徒会業務はこれにて終了となった。"

[[dialogue]]
speaker = "アナ"
# 「ロクサーナ部長、会長への密着取材はいかがでしたか」
line = "「ロクサーナ部長、会長への密着取材はいかがでしたか」"

[[dialogue]]
speaker = "ロクサーナ"
# 「退屈知らずの１日だった。新星のトップに君臨する会長の仕事とは想像以上の激務なのだな」
line = "「退屈知らずの１日だった。新星のトップに君臨する会長の仕事とは想像以上の激務なのだな」"

[[dialogue]]
speaker = "ロクサーナ"
# 「会長をより深く描くとなると、とても寸劇程度の尺では足りそうにない。実に参考になった。星徒会諸君、感謝する」
line = "「会長をより深く描くとなると、とても寸劇程度の尺では足りそうにない。実に参考になった。星徒会諸君、感謝する」"

[[dialogue]]
speaker = "unk"
# 演劇部部長による密着取材は終わり、それぞれが家へと帰っていった。
line = "演劇部部長による密着取材は終わり、それぞれが家へと帰っていった。"

[[dialogue]]
speaker = "unk"
# ――翌日。
line = "――翌日。"

[[dialogue]]
speaker = "ロクサーナ"
# 「演劇部部長ロクサーナだ！」
line = "「演劇部部長ロクサーナだ！」"

[[dialogue]]
speaker = "unk"
# また来た！？
line = "また来た！？"

[[dialogue]]
speaker = "アナ"
# 「昨日で取材は終わりじゃなかったのですか」
line = "「昨日で取材は終わりじゃなかったのですか」"

[[dialogue]]
speaker = "ロクサーナ"
# 「いつ取材が終わりだと言った？　寸劇程度の尺では足りないと言った覚えはあるがな！」
line = "「いつ取材が終わりだと言った？　寸劇程度の尺では足りないと言った覚えはあるがな！」"

[[dialogue]]
speaker = "ロクサーナ"
# 「星徒会長を描くならば、大長編だ！　今後も密着取材を敢行させてもらう！」
line = "「星徒会長を描くならば、大長編だ！　今後も密着取材を敢行させてもらう！」"

[[dialogue]]
speaker = "unk"
# どうやら変わり者の脚本家の興味を惹きつけてしまったようで、彼女の密着取材はしばらくの間、続くのであった。
line = "どうやら変わり者の脚本家の興味を惹きつけてしまったようで、彼女の密着取材はしばらくの間、続くのであった。"
