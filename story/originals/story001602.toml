[[dialogue]]
speaker = "ヒマワリ"
# 「あたし、<ruby=すずの>鈴野</ruby>ヒマワリです！　附属校２年です！」
line = "「あたし、<ruby>鈴野<rt>すずの</rt></ruby>ヒマワリです！　附属校２年です！」"

[[dialogue]]
speaker = "ミウ"
# 「同じく、附属校２年、<ruby=ふかざわ>深沢</ruby>ミウです。ヒマワリちゃんとは大の仲良しの親友なんです」
line = "「同じく、附属校２年、<ruby>深沢<rt>ふかざわ</rt></ruby>ミウです。ヒマワリちゃんとは大の仲良しの親友なんです」"

[[dialogue]]
speaker = "セナリィ"
# 「わざわざ訪れてくれた客人を、ただ追い返すような無粋な真似は致しません。話くらいはお聞きしますわ」
line = "「わざわざ訪れてくれた客人を、ただ追い返すような無粋な真似は致しません。話くらいはお聞きしますわ」"

[[dialogue]]
speaker = "セナリィ"
# 「ですが──聞き間違いでなければ、おふたりはゴールデングースに入りたいと？」
line = "「ですが──聞き間違いでなければ、おふたりはゴールデングースに入りたいと？」"

[[dialogue]]
speaker = "ミウ"
# 「は、はい！　間違いないです」
line = "「は、はい！　間違いないです」"

[[dialogue]]
speaker = "ヒマワリ"
# 「あたしたち、セナリィ様が戦っているところを見たんです！」
line = "「あたしたち、セナリィ様が戦っているところを見たんです！」"

[[dialogue]]
speaker = "ミウ"
# 「およそ１週間前──２人で一緒にお出かけして、少し帰りが遅くなった週末の夜です」
line = "「およそ１週間前──２人で一緒にお出かけして、少し帰りが遅くなった週末の夜です」"

[[dialogue]]
speaker = "ヒマワリ"
# 「近道を通ろうとして裏路地に迷い込んじゃったんですけど、そしたらドンパチが聞こえてきて」
line = "「近道を通ろうとして裏路地に迷い込んじゃったんですけど、そしたらドンパチが聞こえてきて」"

[[dialogue]]
speaker = "セナリィ"
# 「そこにいたのが私だった？」
line = "「そこにいたのが私だった？」"

[[dialogue]]
speaker = "ヒマワリ"
# 「はい！　悪そうな奴らを、たった１人でやっつけてて！」
line = "「はい！　悪そうな奴らを、たった１人でやっつけてて！」"

[[dialogue]]
speaker = "セナリィ"
# 「甘いですわね！　あなたの力、利用させていただきます！　《<ruby=バンデット>強奪</ruby>》！」
line = "「甘いですわね！　あなたの力、利用させていただきます！　《<ruby>強奪<rt>バンデット</rt></ruby>》！」"

[[dialogue]]
speaker = "セナリィ"
# 「──《<ruby=リリース>解放</ruby>》！　自分の力でやられる屈辱、その身で味わうがいいですわ！」
line = "「──《<ruby>解放<rt>リリース</rt></ruby>》！　自分の力でやられる屈辱、その身で味わうがいいですわ！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「そんなわけで、２人して『これだーっ！』って思ったんです！」
line = "「そんなわけで、２人して『これだーっ！』って思ったんです！」"

[[dialogue]]
speaker = "ミウ"
# 「セナリィ様の華麗に踊るようなガンアクションに感激しちゃいました。一目惚れってあるんですね……！」
line = "「セナリィ様の華麗に踊るようなガンアクションに感激しちゃいました。一目惚れってあるんですね……！」"

[[dialogue]]
speaker = "セナリィ"
# 「そ、そう？　そんなに素敵だったかしら」
line = "「そ、そう？　そんなに素敵だったかしら」"

[[dialogue]]
speaker = "ミウ"
# 「はい！　それはもう！　この世に『女帝』がいらっしゃるならば、それはセナリィ様に他ならないと思いました」
line = "「はい！　それはもう！　この世に『女帝』がいらっしゃるならば、それはセナリィ様に他ならないと思いました」"

[[dialogue]]
speaker = "ミウ"
# 「その後、あの時の美しい女性は誰だったのかから始まり、いろいろと調べていたら、最終的に『秘密結社ゴールデングース』に行き着きまして」
line = "「その後、あの時の美しい女性は誰だったのかから始まり、いろいろと調べていたら、最終的に『秘密結社ゴールデングース』に行き着きまして」"

[[dialogue]]
speaker = "セナリィ"
# 「へえ……大した調査力ですわね」
line = "「へえ……大した調査力ですわね」"

[[dialogue]]
speaker = "ミウ"
# 「はい、私、そういうのがちょっと得意なので」
line = "「はい、私、そういうのがちょっと得意なので」"

[[dialogue]]
speaker = "ヒマワリ"
# 「これは絶対、強くて麗しいセナリィ様の元で働くしかないと！　あたしたちは決めたんです！」
line = "「これは絶対、強くて麗しいセナリィ様の元で働くしかないと！　あたしたちは決めたんです！」"

[[dialogue]]
speaker = "セナリィ"
# 「……今、なんておっしゃいました？」
line = "「……今、なんておっしゃいました？」"

[[dialogue]]
speaker = "ミウ"
# 「私たち、強くて麗しいセナリィ様の元で働きたいんです！」
line = "「私たち、強くて麗しいセナリィ様の元で働きたいんです！」"

[[dialogue]]
speaker = "セナリィ"
# 「そ、そう……そんなにも……んん、まぁ……そうですわねぇ……強くて麗しいですか……ふふっ、ふふふ♪」
line = "「そ、そう……そんなにも……んん、まぁ……そうですわねぇ……強くて麗しいですか……ふふっ、ふふふ♪」"

[[dialogue]]
speaker = "ヒマワリ"
# 「セナリィ様？」
line = "「セナリィ様？」"

[[dialogue]]
speaker = "セナリィ"
# 「ああ、いえ……こほん。ここは笑う子は泣き、泣く子は黙る、秘密結社ゴールデングースですわよ」
line = "「ああ、いえ……こほん。ここは笑う子は泣き、泣く子は黙る、秘密結社ゴールデングースですわよ」"

[[dialogue]]
speaker = "ミウ"
# 「最終的にみんな黙っちゃうんですね」
line = "「最終的にみんな黙っちゃうんですね」"

[[dialogue]]
speaker = "セナリィ"
# 「附属２年とおっしゃいましたわね？　あなたたちのようなお子様に、私の真の美学が理解できるはずがありません」
line = "「附属２年とおっしゃいましたわね？　あなたたちのようなお子様に、私の真の美学が理解できるはずがありません」"

[[dialogue]]
speaker = "セナリィ"
# 「私の元に来る依頼は、危険や死と隣り合わせ。デッド・オア・アライブ……」
line = "「私の元に来る依頼は、危険や死と隣り合わせ。デッド・オア・アライブ……」"

[[dialogue]]
speaker = "セナリィ"
# 「足手まといのお子様を引き連れてやれるほど、生ぬるい仕事ではありませんのよ」
line = "「足手まといのお子様を引き連れてやれるほど、生ぬるい仕事ではありませんのよ」"

[[dialogue]]
speaker = "セナリィ"
# 「私の戦いを見たことも、ここを訪れたことも全てお忘れなさい。とっととお家に返って、ワンちゃんをモフる動画でも観ていた方が幸せな毎日を過ごせますわよ」
line = "「私の戦いを見たことも、ここを訪れたことも全てお忘れなさい。とっととお家に返って、ワンちゃんをモフる動画でも観ていた方が幸せな毎日を過ごせますわよ」"

[[dialogue]]
speaker = "セナリィ"
# （はーっ……キマった……！　キマりすぎましたわー……！）
line = "（はーっ……キマった……！　キマりすぎましたわー……！）"

[[dialogue]]
speaker = "セナリィ"
# （未来あるお子様を、危険な任務に晒すわけにはいかないものね。親御さんも心配されるはずよ）
line = "（未来あるお子様を、危険な任務に晒すわけにはいかないものね。親御さんも心配されるはずよ）"

[[dialogue]]
speaker = "ヒマワリ"
# 「危険は承知の上です！　あたしたち、成績は優秀なんです！　有望株ですよ！」
line = "「危険は承知の上です！　あたしたち、成績は優秀なんです！　有望株ですよ！」"

[[dialogue]]
speaker = "ミウ"
# 「ヒマワリちゃんと私が加わることで、今まで以上に困難な任務も受けられるようになる……そうは思いませんか？」
line = "「ヒマワリちゃんと私が加わることで、今まで以上に困難な任務も受けられるようになる……そうは思いませんか？」"

[[dialogue]]
speaker = "セナリィ"
# 「ふうん……？　どうやら腕に覚えがあるようですわね？」
line = "「ふうん……？　どうやら腕に覚えがあるようですわね？」"

[[dialogue]]
speaker = "ミウ"
# 「未経験ですけど、やる気は人一倍あります」
line = "「未経験ですけど、やる気は人一倍あります」"

[[dialogue]]
speaker = "セナリィ"
# 「未経験者を歓迎してませんし、アットホームな職場でもなければ、福利厚生もしっかりしてませんわよ」
line = "「未経験者を歓迎してませんし、アットホームな職場でもなければ、福利厚生もしっかりしてませんわよ」"

[[dialogue]]
speaker = "ヒマワリ"
# 「それでも、です！」
line = "「それでも、です！」"

[[dialogue]]
speaker = "セナリィ"
# （やれやれ……この子たちの目、本気ね。そう簡単には引き下がってくれそうにないわ）
line = "（やれやれ……この子たちの目、本気ね。そう簡単には引き下がってくれそうにないわ）"

[[dialogue]]
speaker = "セナリィ"
# （一時的な熱病のようなものでしょう。ま、まあ、強くて麗しい私に見惚れて？　憧れられるのは悪い気はしませんけども？）
line = "（一時的な熱病のようなものでしょう。ま、まあ、強くて麗しい私に見惚れて？　憧れられるのは悪い気はしませんけども？）"

[[dialogue]]
speaker = "セナリィ"
# （シッシッと仔犬のように追い払ったところで、この分だと毎日のように詰めかけてきそうね）
line = "（シッシッと仔犬のように追い払ったところで、この分だと毎日のように詰めかけてきそうね）"

[[dialogue]]
speaker = "セナリィ"
# （このセナリィ、情に絆されるような甘っちょろい女ではないわ）
line = "（このセナリィ、情に絆されるような甘っちょろい女ではないわ）"

[[dialogue]]
speaker = "セナリィ"
# （２人を確実に諦めさせる体のいい言い訳が必要そうね。ええと、どうしましょう……）
line = "（２人を確実に諦めさせる体のいい言い訳が必要そうね。ええと、どうしましょう……）"

[[dialogue]]
speaker = "セナリィ"
# 「では、あなたたちに受けてもらうとしましょう。毎年、多くの脱落者が出て、採用確率０．０１％と実しやかに囁かれる秘密結社ゴールデングース、地獄の入社試験を！」
line = "「では、あなたたちに受けてもらうとしましょう。毎年、多くの脱落者が出て、採用確率０．０１％と実しやかに囁かれる秘密結社ゴールデングース、地獄の入社試験を！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「じ、地獄の入社試験ーーーーッッッ！！？」
line = "「じ、地獄の入社試験ーーーーッッッ！！？」"

[[dialogue]]
speaker = "ミウ"
# 「いったいどんな内容が待ち構えているんでしょうか……どきどきわくわく」
line = "「いったいどんな内容が待ち構えているんでしょうか……どきどきわくわく」"

[[dialogue]]
speaker = "セナリィ"
# 「引き下がるなら今の内ですわよ。始まってから後悔しても遅いですわ」
line = "「引き下がるなら今の内ですわよ。始まってから後悔しても遅いですわ」"

[[dialogue]]
speaker = "ミウ"
# 「いえ、もちろんやります！　やらせてください！」
line = "「いえ、もちろんやります！　やらせてください！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「そんな面白そうなこと、やらいでかです！」
line = "「そんな面白そうなこと、やらいでかです！」"

[[dialogue]]
speaker = "セナリィ"
# 「あ、あら、そう？　そうなの？」
line = "「あ、あら、そう？　そうなの？」"

[[dialogue]]
speaker = "セナリィ"
# （ぬぬぅ、困ったわね……入社試験なんて初めてだし、今更、何も考えてないなんて言えないし……！）
line = "（ぬぬぅ、困ったわね……入社試験なんて初めてだし、今更、何も考えてないなんて言えないし……！）"

[[dialogue]]
speaker = "セナリィ"
# 「し、試験は１週間後！　それまでに考え──じゃなくて、入念な準備を整えておきますわ！」
line = "「し、試験は１週間後！　それまでに考え──じゃなくて、入念な準備を整えておきますわ！」"

[[dialogue]]
speaker = "ミウ"
# 「わかりました！　１週間後ですね。それまでにこちらもプランを立てておきます」
line = "「わかりました！　１週間後ですね。それまでにこちらもプランを立てておきます」"

[[dialogue]]
speaker = "ヒマワリ"
# 「毎晩いっぱい寝て、体調を万全にしておきます！」
line = "「毎晩いっぱい寝て、体調を万全にしておきます！」"

[[dialogue]]
speaker = "セナリィ"
# 「……それはとても感心ですわね」
line = "「……それはとても感心ですわね」"

[[dialogue]]
speaker = "セナリィ"
# （２人を傷つけないよう、穏便に諦めさせる方法は……ま、１週間あればいいアイデアのひとつも思いつくことでしょう）
line = "（２人を傷つけないよう、穏便に諦めさせる方法は……ま、１週間あればいいアイデアのひとつも思いつくことでしょう）"
