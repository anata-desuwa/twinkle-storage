[[dialogue]]
speaker = "unk"
# 第４話,アニマシンクロハート,P
line = "第４話,アニマシンクロハート,P"

[[dialogue]]
speaker = "unk"
# ある休日。街へタブレットを買い換えに来ていた俺は、迷子らしき女の子と一緒にいるアニマ先輩と遭遇した。
line = "ある休日。街へタブレットを買い換えに来ていた俺は、迷子らしき女の子と一緒にいるアニマ先輩と遭遇した。"

[[dialogue]]
speaker = "アニマ"
# 「フヒ、安心したまえ、お嬢ちゃん。キミのお母さんはアニマがすぐに見つけてみせるとも」
line = "「フヒ、安心したまえ、お嬢ちゃん。キミのお母さんはアニマがすぐに見つけてみせるとも」"

[[dialogue]]
speaker = "女の子"
# 「ひ、ひとりで大丈夫……です……」
line = "「ひ、ひとりで大丈夫……です……」"

[[dialogue]]
speaker = "アニマ"
# 「いやいや、ひとりで不安そうに見えるゾ？　そうだ、いいものがある。飲むと精神が安定する薬ダ♪」
line = "「いやいや、ひとりで不安そうに見えるゾ？　そうだ、いいものがある。飲むと精神が安定する薬ダ♪」"

[[dialogue]]
speaker = "アニマ"
# 「ほら、綺麗な緑色ダロウ？　味もわざとらしいメロン味にしてみた」
line = "「ほら、綺麗な緑色ダロウ？　味もわざとらしいメロン味にしてみた」"

[[dialogue]]
speaker = "アニマ"
# 「フヒヒッ、飲んでみたまえ。余りの美味しさに──飛ぶゾ？」
line = "「フヒヒッ、飲んでみたまえ。余りの美味しさに──飛ぶゾ？」"

[[dialogue]]
speaker = "女の子"
# 「ひぃっ……！？」
line = "「ひぃっ……！？」"

[[dialogue]]
speaker = "unk"
# アニマ先輩、ストォォォ──ップ！！！
line = "アニマ先輩、ストォォォ──ップ！！！"

[[dialogue]]
speaker = "アニマ"
# 「おや？　こんにちはダ、会長。こんなところで会うとは奇遇だネ」
line = "「おや？　こんにちはダ、会長。こんなところで会うとは奇遇だネ」"

[[dialogue]]
speaker = "アニマ"
# 「……なに、方法が間違っている？　フム、キミがそう言うなら、試してみよう」
line = "「……なに、方法が間違っている？　フム、キミがそう言うなら、試してみよう」"

[[dialogue]]
speaker = "アニマ"
# 「お嬢ちゃん、これならどうだろうカ？　アニマが作った特製クッキーだヨ」
line = "「お嬢ちゃん、これならどうだろうカ？　アニマが作った特製クッキーだヨ」"

[[dialogue]]
speaker = "女の子"
# 「わぁ……可愛い袋！　それに良い匂い……！　これ、本当にお姉ちゃんが作ったの？」
line = "「わぁ……可愛い袋！　それに良い匂い……！　これ、本当にお姉ちゃんが作ったの？」"

[[dialogue]]
speaker = "アニマ"
# 「フヒ、そうだとも。しかも、発明した保存術式で、中身は焼き立てホカホカのままダ。美味しいゾ？」
line = "「フヒ、そうだとも。しかも、発明した保存術式で、中身は焼き立てホカホカのままダ。美味しいゾ？」"

[[dialogue]]
speaker = "女の子"
# 「もぐもぐ……本当だ！　こんなに美味しいクッキー、初めて食べた！　お姉ちゃん、ありがとう！」
line = "「もぐもぐ……本当だ！　こんなに美味しいクッキー、初めて食べた！　お姉ちゃん、ありがとう！」"

[[dialogue]]
speaker = "アニマ"
# 「……！　ああ、どういたしましてダ。フヒ」
line = "「……！　ああ、どういたしましてダ。フヒ」"

[[dialogue]]
speaker = "unk"
# その後、程なくしてお母さんは見つかった。女の子はすっかりアニマ先輩に心許して「ばいばい、お姉ちゃん！」と笑顔で手を振り、去って行った。
line = "その後、程なくしてお母さんは見つかった。女の子はすっかりアニマ先輩に心許して「ばいばい、お姉ちゃん！」と笑顔で手を振り、去って行った。"

[[dialogue]]
speaker = "アニマ"
# 「……キミの言う通りだったナ。精神安定薬など、使う必要はなかった」
line = "「……キミの言う通りだったナ。精神安定薬など、使う必要はなかった」"

[[dialogue]]
speaker = "アニマ"
# 「子供をどうすれば笑顔に出来るか、理解はしたヨ。しかしながら、どうもアニマはそこら辺の……他人への共感というものが欠如しているようダ」
line = "「子供をどうすれば笑顔に出来るか、理解はしたヨ。しかしながら、どうもアニマはそこら辺の……他人への共感というものが欠如しているようダ」"

[[dialogue]]
speaker = "アニマ"
# 「キミに指摘されなければ、アニマには多分、『ただ普通のお菓子をあげればいい』だなんて、思い付かなかっただろうネ」
line = "「キミに指摘されなければ、アニマには多分、『ただ普通のお菓子をあげればいい』だなんて、思い付かなかっただろうネ」"

[[dialogue]]
speaker = "アニマ"
# 「……いや、変なことを言ったナ、すまない。そんなことより、キミは今日どうしてここに？」
line = "「……いや、変なことを言ったナ、すまない。そんなことより、キミは今日どうしてここに？」"

[[dialogue]]
speaker = "unk"
# タブレットの買い換えに。……先輩は？
line = "タブレットの買い換えに。……先輩は？"

[[dialogue]]
speaker = "アニマ"
# 「アニマは研究資材が少なくなって来たので、その調達だヨ。それにしてもタブレットか、フム……」
line = "「アニマは研究資材が少なくなって来たので、その調達だヨ。それにしてもタブレットか、フム……」"

[[dialogue]]
speaker = "アニマ"
# 「キミが学園でも使っていたものだナ？　錬金術と情報技術は相反するため、これまで積極的に知ろうとはしなかったが──」
line = "「キミが学園でも使っていたものだナ？　錬金術と情報技術は相反するため、これまで積極的に知ろうとはしなかったが──」"

[[dialogue]]
speaker = "アニマ"
# 「提案なのだが、アニマも一緒に付いて行ってもいいだろうカ？　なに、キミが便利だというなら、これを機に学んでみるのもいいかもしれないと思ってネ」
line = "「提案なのだが、アニマも一緒に付いて行ってもいいだろうカ？　なに、キミが便利だというなら、これを機に学んでみるのもいいかもしれないと思ってネ」"

[[dialogue]]
speaker = "アニマ"
# 「フヒッ♪　アニマもついにタブレットを買ってしまったゾ。しかも、キミと同じ機種をダ。ドヤァ」
line = "「フヒッ♪　アニマもついにタブレットを買ってしまったゾ。しかも、キミと同じ機種をダ。ドヤァ」"

[[dialogue]]
speaker = "アニマ"
# 「ム？　どうしたのダ、会長。なぜ照れている？　機種が同じだと、何か問題があるのカ？」
line = "「ム？　どうしたのダ、会長。なぜ照れている？　機種が同じだと、何か問題があるのカ？」"

[[dialogue]]
speaker = "unk"
# カップルみたいなので……
line = "カップルみたいなので……"

[[dialogue]]
speaker = "unk"
# その……女の子とお揃いだと、
line = "その……女の子とお揃いだと、"

[[dialogue]]
speaker = "アニマ"
# 「……なるほど。カップルみたい、か。確かに言われてみると、そうかもしれないナ……？」
line = "「……なるほど。カップルみたい、か。確かに言われてみると、そうかもしれないナ……？」"

[[dialogue]]
speaker = "アニマ"
# 「すまない、会長。気付くと、やってしまった感があるナ……。さっき同じ失敗をしたばかりだというのに、浮かれて繰り返してしまった」
line = "「すまない、会長。気付くと、やってしまった感があるナ……。さっき同じ失敗をしたばかりだというのに、浮かれて繰り返してしまった」"

[[dialogue]]
speaker = "アニマ"
# 「アニマはやはり、他人への共感が足りていないようダ……」
line = "「アニマはやはり、他人への共感が足りていないようダ……」"

[[dialogue]]
speaker = "unk"
# 同じ機種にしようと思ったんですか？
line = "同じ機種にしようと思ったんですか？"

[[dialogue]]
speaker = "unk"
# 先輩はどうして、
line = "先輩はどうして、"

[[dialogue]]
speaker = "アニマ"
# 「それは……キミが使っているものと同じものなら、ツールとして信頼出来ル。わからないことがあれば、教えてもらえるし──」
line = "「それは……キミが使っているものと同じものなら、ツールとして信頼出来ル。わからないことがあれば、教えてもらえるし──」"

[[dialogue]]
speaker = "アニマ"
# 「キミと一緒だと、面白そうだと思ったんダ……」
line = "「キミと一緒だと、面白そうだと思ったんダ……」"

[[dialogue]]
speaker = "unk"
# じゃあ先輩は、俺とお揃いだと嫌ですか？
line = "じゃあ先輩は、俺とお揃いだと嫌ですか？"

[[dialogue]]
speaker = "アニマ"
# 「いや、そんなことはないゾ。恥ずかしさはあるが、嫌じゃない……あぁ！」
line = "「いや、そんなことはないゾ。恥ずかしさはあるが、嫌じゃない……あぁ！」"

[[dialogue]]
speaker = "アニマ"
# 「──ああ、そうカ。この気持ちは……キミも一緒か」
line = "「──ああ、そうカ。この気持ちは……キミも一緒か」"

[[dialogue]]
speaker = "アニマ"
# 「フヒヒッ……確かにこれは、ちょっと照れるナ？」
line = "「フヒヒッ……確かにこれは、ちょっと照れるナ？」"

[[dialogue]]
speaker = "アニマ"
# 「ありがとうダ、会長。……アニマはキミのおかげで一つ、共感を知ることが出来タ」
line = "「ありがとうダ、会長。……アニマはキミのおかげで一つ、共感を知ることが出来タ」"

[[dialogue]]
speaker = "アニマ"
# 「だから、そうだな……。その……今度は人の心についても……また一緒に、実験して貰えると嬉しイ」
line = "「だから、そうだな……。その……今度は人の心についても……また一緒に、実験して貰えると嬉しイ」"

[[dialogue]]
speaker = "unk"
# もちろん、いくらでも
line = "もちろん、いくらでも"

[[dialogue]]
speaker = "アニマ"
# 「……さて。気を取り直してダ、会長。今日はまだ、時間はあったりするのかね？」
line = "「……さて。気を取り直してダ、会長。今日はまだ、時間はあったりするのかね？」"

[[dialogue]]
speaker = "アニマ"
# 「ならばせっかくダ、このまま一緒に街で実験と洒落込もうじゃないか」
line = "「ならばせっかくダ、このまま一緒に街で実験と洒落込もうじゃないか」"

[[dialogue]]
speaker = "アニマ"
# 「ほら、こっちダ。早く来たまえ！」
line = "「ほら、こっちダ。早く来たまえ！」"

[[dialogue]]
speaker = "アニマ"
# 「フヒ♪」
line = "「フヒ♪」"

[[dialogue]]
speaker = "unk"
# そうしてアニマ先輩は、楽しそうに俺の手を取ると。
line = "そうしてアニマ先輩は、楽しそうに俺の手を取ると。"

[[dialogue]]
speaker = "unk"
# 思わず見惚れてしまうような、女の子らしい笑顔を浮かべるのだった。
line = "思わず見惚れてしまうような、女の子らしい笑顔を浮かべるのだった。"
