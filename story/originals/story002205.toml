line = "「このっ……言わせておけば……！」"

[[dialogue]]
speaker = "セナリィ"
# （でも妙ですわ……。私の眼で監視していましたが、ダッチの動きに怪しいそぶりは一切ない……！）
line = "（でも妙ですわ……。私の眼で監視していましたが、ダッチの動きに怪しいそぶりは一切ない……！）"

[[dialogue]]
speaker = "セナリィ"
