[[dialogue]]
speaker = "ネーゼマイン"
# 「だけど絶対に何かはしてる。その裏をかかないと……私たち全員、何もできずに負けちゃう……！」
line = "「だけど絶対に何かはしてる。その裏をかかないと……私たち全員、何もできずに負けちゃう……！」"
