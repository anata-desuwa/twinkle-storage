speaker = "ヒルディオーネ"
# （うぅう……！　オリられるわけがないじゃありませんの！　ストレートフラッシュが出来てしまったら……！）
line = "（うぅう……！　オリられるわけがないじゃありませんの！　ストレートフラッシュが出来てしまったら……！）"

