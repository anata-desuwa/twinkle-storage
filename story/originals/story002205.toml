line = "（嘘ぉ！？　ハートの８、９、１０が来た！？　ストフラの完成っ……これが財閥令嬢の運ってこと！？）"

[[dialogue]]
speaker = "ヒルディオーネ"
# （な、何か思った通りの役ができましたわ！？　でもこれなら……あの変態紳士に一泡吹かせられるはず！）
