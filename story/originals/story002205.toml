[[dialogue]]
speaker = "ダッチ"
# 「フフ。勝負の前に喉が渇きましたね。可愛い子ウサギのセナリィ様、ワインを一杯いただけますか？」
line = "「フフ。勝負の前に喉が渇きましたね。可愛い子ウサギのセナリィ様、ワインを一杯いただけますか？」"

[[dialogue]]
speaker = "セナリィ"
# 「ぐ、ぐぅっ……！　このバンデット・セナリィを給仕として使うだなんて……この屈辱、後で必ずや……！」
line = "「ぐ、ぐぅっ……！　このバンデット・セナリィを給仕として使うだなんて……この屈辱、後で必ずや……！」"

[[dialogue]]
speaker = "ダッチ"
# 「嗚呼、いけません。いけませんねぇ」
line = "「嗚呼、いけません。いけませんねぇ」"

[[dialogue]]
speaker = "ダッチ"
# 「まだ全員が敗北されていないため意思までは奪っておりませんが……それでももう貴女は私の子ウサギなのですよ？」
line = "「まだ全員が敗北されていないため意思までは奪っておりませんが……それでももう貴女は私の子ウサギなのですよ？」"

[[dialogue]]
speaker = "ダッチ"
# 「先ほど、きちんとお伝えしたはず。語尾には何をつけろと言いましたか？」
line = "「先ほど、きちんとお伝えしたはず。語尾には何をつけろと言いましたか？」"

[[dialogue]]
speaker = "セナリィ"
# 「ぐぬぬぬっ……！」
line = "「ぐぬぬぬっ……！」"

[[dialogue]]
speaker = "セナリィ"
# 「お、お待たせいたしましたわ……ぴょん♪　ダッチ様にドリンクサービスっ<emoji=heart04>　子ウサギの愛情たっぷり赤ワインです、ぴょーんっ♪」
line = "「お、お待たせいたしましたわ……ぴょん♪　ダッチ様にドリンクサービスっ<emoji=heart04>　子ウサギの愛情たっぷり赤ワインです、ぴょーんっ♪」"

[[dialogue]]
speaker = "ダッチ"
# 「フォォオオォ！！　これだ！　これでこそウサギだ！　魔界はラパン地方の方言を取り入れたこの口調こそが正義！　フォォオ～……！」
line = "「フォォオオォ！！　これだ！　これでこそウサギだ！　魔界はラパン地方の方言を取り入れたこの口調こそが正義！　フォォオ～……！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ぜ、絶対に負けられません……死よりも恐ろしい罰ゲームですわ……」
line = "「ぜ、絶対に負けられません……死よりも恐ろしい罰ゲームですわ……」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「これは相当に業の深い欲望だね。ロストアイテムってみんなあんな感じなの、会長？」
line = "「これは相当に業の深い欲望だね。ロストアイテムってみんなあんな感じなの、会長？」"

[[dialogue]]
speaker = "unk"
# あいつだけだと思う……
line = "あいつだけだと思う……"

[[dialogue]]
speaker = "ダッチ"
# 「さぁセナリィ様。次は肩揉みです。その可憐な手のひらで、私の肩を優しく揉みほぐしていただけますかな？」
line = "「さぁセナリィ様。次は肩揉みです。その可憐な手のひらで、私の肩を優しく揉みほぐしていただけますかな？」"

[[dialogue]]
speaker = "セナリィ"
# 「ぐぎぎぎっ……！　お、お揉み致しますぴょん、ダッチ様……モミモミ、モ～ミっ……だぴょんっ♪」
line = "「ぐぎぎぎっ……！　お、お揉み致しますぴょん、ダッチ様……モミモミ、モ～ミっ……だぴょんっ♪」"

[[dialogue]]
speaker = "ダッチ"
# 「オゥフ……！　やる気がムンムン湧いてまいりましたよ！　では──２回戦と参りましょうか！」
line = "「オゥフ……！　やる気がムンムン湧いてまいりましたよ！　では──２回戦と参りましょうか！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「次戦は、ゲームが苦手な私が参ります。緋宮会長、ネーゼマイン様。後はよろしくお願いいたしますわ！」
line = "「次戦は、ゲームが苦手な私が参ります。緋宮会長、ネーゼマイン様。後はよろしくお願いいたしますわ！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「……先ほどのゲーム、どこか不自然な空気は私も感じておりますわ。ならば遊戯に慣れているあなたたちの思考時間を増やすべきだと考えておりますの」
line = "「……先ほどのゲーム、どこか不自然な空気は私も感じておりますわ。ならば遊戯に慣れているあなたたちの思考時間を増やすべきだと考えておりますの」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「千園寺先輩……」
line = "「千園寺先輩……」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「おーっほっほっほ！　だからと言って端っから負けるつもりもありません！　千園寺の底力、見せて差し上げますわ！」
line = "「おーっほっほっほ！　だからと言って端っから負けるつもりもありません！　千園寺の底力、見せて差し上げますわ！」"

[[dialogue]]
speaker = "ダッチ"
# 「ヒルディオーネ様ですか……フフ！　手に汗握る名勝負をいたしましょう！」
line = "「ヒルディオーネ様ですか……フフ！　手に汗握る名勝負をいたしましょう！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「御託はよろしくてよ。さぁ、カードを！」
line = "「御託はよろしくてよ。さぁ、カードを！」"

[[dialogue]]
speaker = "モンスター"
# 「イ～っ！」
line = "「イ～っ！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# （大見得を切りましたが、トランプなんて本当に数えるほどしか触ったことがありませんわ……）
line = "（大見得を切りましたが、トランプなんて本当に数えるほどしか触ったことがありませんわ……）"

[[dialogue]]
speaker = "ヒルディオーネ"
# （クラブの４、ダイヤの４、ハートの６、ハートの７、ダイヤのＱ……）
line = "（クラブの４、ダイヤの４、ハートの６、ハートの７、ダイヤのＱ……）"

[[dialogue]]
speaker = "ヒルディオーネ"
# （これ……どうするのが正解ですの？　流石に緋宮会長たちに相談するのはルール違反ですし……）
line = "（これ……どうするのが正解ですの？　流石に緋宮会長たちに相談するのはルール違反ですし……）"

[[dialogue]]
speaker = "ネーゼマイン"
# （セナリィの時ほどじゃないけど、いいハンドだね。ワンペアでも役があるのは大きい）
line = "（セナリィの時ほどじゃないけど、いいハンドだね。ワンペアでも役があるのは大きい）"

[[dialogue]]
speaker = "ヒルディオーネ"
