line = "（強いハンドを作らなければ勝負には勝てない、ですわよね？　ワンペアって一番弱い役だったはずですし……）"

[[dialogue]]
speaker = "ヒルディオーネ"
# （もっと強い役……そういえば同じ色で階段状になれば、ストレートフラッシュという役があったはずですわ！）
line = "（もっと強い役……そういえば同じ色で階段状になれば、ストレートフラッシュという役があったはずですわ！）"

