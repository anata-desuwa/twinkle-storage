# 「でも開場時間になったらまた整理よろしくお願いしますね」
line = "「でも開場時間になったらまた整理よろしくお願いしますね」"

[[dialogue]]
speaker = "アルモタヘル"
# 「何……！？」
line = "「何……！？」"

[[dialogue]]
speaker = "アルモタヘル"
# 「あ、想像しただけで腹が空く……ダメだ、意識が──」
line = "「あ、想像しただけで腹が空く……ダメだ、意識が──」"

[[dialogue]]
speaker = "マグダレナ"
# 「アルモタヘル！？　アルモタヘルーーーッ！？」
line = "「アルモタヘル！？　アルモタヘルーーーッ！？」"

[[dialogue]]
speaker = "unk"
# その後、なんやかんやありつつもみんなで頑張って──
line = "その後、なんやかんやありつつもみんなで頑張って──"

[[dialogue]]
speaker = "unk"
# なんとか無事にイベントは幕を閉じたのだった。
line = "なんとか無事にイベントは幕を閉じたのだった。"
