[[dialogue]]
speaker = "アルモタヘル"
# 「お前のような者が紛れ込んでいるから必要な措置だと肝に銘じておくがいい」
line = "「お前のような者が紛れ込んでいるから必要な措置だと肝に銘じておくがいい」"

[[dialogue]]
speaker = "ファン？"
