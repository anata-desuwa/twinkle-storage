[[dialogue]]
speaker = "unk"
# 俺たちが秋葉原に到着すると、会場のビルの周りに人だかりができていた。
line = "俺たちが秋葉原に到着すると、会場のビルの周りに人だかりができていた。"

[[dialogue]]
speaker = "ファン"
# 「新曲のリリイベ楽しみ～。でもちょっと人ヤバくない？」
line = "「新曲のリリイベ楽しみ～。でもちょっと人ヤバくない？」"

[[dialogue]]
speaker = "マグダレナ"
# 「おお、人がたくさん……賑わいがあるのはいいことです」
line = "「おお、人がたくさん……賑わいがあるのはいいことです」"

[[dialogue]]
speaker = "アルモタヘル"
# 「それどころではないぞ。下手をすれば怪我どころでは済まない」
line = "「それどころではないぞ。下手をすれば怪我どころでは済まない」"

[[dialogue]]
speaker = "コハルコ"
# 「どうしてこんなに人が？　まだ売り出し中だから先着順でも大丈夫って話だったけど……」
line = "「どうしてこんなに人が？　まだ売り出し中だから先着順でも大丈夫って話だったけど……」"

[[dialogue]]
speaker = "ファン"
# 「会場限定版のＣＤとブロマイドのセット、ちゃんと数あんのかなー。ランダムでサイン入り封入とか、当たり狙うしかないっしょ」
line = "「会場限定版のＣＤとブロマイドのセット、ちゃんと数あんのかなー。ランダムでサイン入り封入とか、当たり狙うしかないっしょ」"

[[dialogue]]
speaker = "コハルコ"
# 「それかー！」
line = "「それかー！」"

[[dialogue]]
speaker = "マグダレナ"
# 「どういうことです……？」
line = "「どういうことです……？」"

[[dialogue]]
speaker = "コハルコ"
# 「アイドルには興味がなくて、希少なグッズを入手して、後で高額で売る目的の人がいるんです」
line = "「アイドルには興味がなくて、希少なグッズを入手して、後で高額で売る目的の人がいるんです」"

[[dialogue]]
speaker = "コハルコ"
# 「お金になりそうなものには何でも手を出してくるからなぁ……後でプレミア付くかもって期待もあるのかも」
line = "「お金になりそうなものには何でも手を出してくるからなぁ……後でプレミア付くかもって期待もあるのかも」"

[[dialogue]]
speaker = "アルモタヘル"
# 「聞いたことがある。テンバ・イヤーというやつだな」
line = "「聞いたことがある。テンバ・イヤーというやつだな」"

[[dialogue]]
speaker = "unk"
# だいたい合ってます
line = "だいたい合ってます"

[[dialogue]]
speaker = "ファン？"
# 「早く整理券配れー！　こちとら客だぞ！」
line = "「早く整理券配れー！　こちとら客だぞ！」"

[[dialogue]]
speaker = "コハルコ"
# 「うーん、確かに整理券配らないといけないんだけど、このままじゃ転売目的の人にも渡っちゃうし……」
line = "「うーん、確かに整理券配らないといけないんだけど、このままじゃ転売目的の人にも渡っちゃうし……」"

[[dialogue]]
speaker = "マグダレナ"
# 「つまり、本当のファンかどうか見分けたいということでしょうか」
line = "「つまり、本当のファンかどうか見分けたいということでしょうか」"

[[dialogue]]
speaker = "unk"
# じゃあこういうのはどうでしょう？
line = "じゃあこういうのはどうでしょう？"

[[dialogue]]
speaker = "アルモタヘル"
# 「……ふむ……ふむ。なるほど。そういうことか」
line = "「……ふむ……ふむ。なるほど。そういうことか」"

[[dialogue]]
speaker = "コハルコ"
# 「うん、それでやってみようか。イベント会社の人とも話してみるね」
line = "「うん、それでやってみようか。イベント会社の人とも話してみるね」"

[[dialogue]]
speaker = "コハルコ"
# 「整理券配布を開始しますので、列に並んでお待ちくださーい！」
line = "「整理券配布を開始しますので、列に並んでお待ちくださーい！」"

[[dialogue]]
speaker = "unk"
# 列の整理が始まると、イベントに参加できないと不安がった人たちからざわめきが上がる。
line = "列の整理が始まると、イベントに参加できないと不安がった人たちからざわめきが上がる。"

[[dialogue]]
speaker = "マグダレナ"
# 「みなさ～ん、落ち着いてくださーい。列を形成しているところですので、少々お待ちくださいね」
line = "「みなさ～ん、落ち着いてくださーい。列を形成しているところですので、少々お待ちくださいね」"

[[dialogue]]
speaker = "ファン"
# 「そんなこと言われてもー、ホントに整理券あんの？」
line = "「そんなこと言われてもー、ホントに整理券あんの？」"

[[dialogue]]
speaker = "マグダレナ"
# 「お気持ちは理解いたします。ですが会場スペースが限られており、安全のために制限せざるを得ないのです」
line = "「お気持ちは理解いたします。ですが会場スペースが限られており、安全のために制限せざるを得ないのです」"

[[dialogue]]
speaker = "ファン"
# 「わかってるけどさぁ、最初から申し込みにするとか、もうちょっと何とかならなかったの？」
line = "「わかってるけどさぁ、最初から申し込みにするとか、もうちょっと何とかならなかったの？」"

[[dialogue]]
speaker = "マグダレナ"
# 「ご指摘仰る通りです。今回はこのような混雑を想定しておらず、ご迷惑をおかけしてしまいました」
line = "「ご指摘仰る通りです。今回はこのような混雑を想定しておらず、ご迷惑をおかけしてしまいました」"

[[dialogue]]
speaker = "マグダレナ"
# 「我々の不手際です。大変申し訳ありません」
line = "「我々の不手際です。大変申し訳ありません」"

[[dialogue]]
speaker = "ファン"
# 「う……そんなに頭下げられると文句言えないじゃん……」
line = "「う……そんなに頭下げられると文句言えないじゃん……」"

[[dialogue]]
speaker = "unk"
# 不満げなファンの女の子だったが、マグダレナさんの柔らかな雰囲気が態度を和らげているようだ。
line = "不満げなファンの女の子だったが、マグダレナさんの柔らかな雰囲気が態度を和らげているようだ。"

[[dialogue]]
speaker = "マグダレナ"
# 「ところで、今日、出演予定のアイドルグループのメンバーのお名前はご存じでしょうか？」
line = "「ところで、今日、出演予定のアイドルグループのメンバーのお名前はご存じでしょうか？」"

[[dialogue]]
speaker = "ファン"
# 「そんなの知ってるに決まってるじゃん！　あたしクレミちゃん推し！」
line = "「そんなの知ってるに決まってるじゃん！　あたしクレミちゃん推し！」"

[[dialogue]]
speaker = "マグダレナ"
# 「お答えありがとうございます。整理券をどうぞ。入場時間になりましたら、こちらをお持ちください」
line = "「お答えありがとうございます。整理券をどうぞ。入場時間になりましたら、こちらをお持ちください」"

[[dialogue]]
speaker = "ファン"
# 「あ、今のってそういう……？　さっきはきついこと言ってごめんなさい。初めてのイベントだったんで……」
line = "「あ、今のってそういう……？　さっきはきついこと言ってごめんなさい。初めてのイベントだったんで……」"

[[dialogue]]
speaker = "マグダレナ"
# 「いえいえ。こちらこそすみませんでした。イベントお楽しみくださいね」
line = "「いえいえ。こちらこそすみませんでした。イベントお楽しみくださいね」"

[[dialogue]]
speaker = "アルモタヘル"
# 「メンバーの名前を答えて──」
line = "「メンバーの名前を答えて──」"

[[dialogue]]
speaker = "ファン？"
# （そんなのさっきＤＩＳＣで調べてから楽勝だっての。チョロいぜ）
line = "（そんなのさっきＤＩＳＣで調べてから楽勝だっての。チョロいぜ）"

[[dialogue]]
speaker = "アルモタヘル"
# 「もらおうかと思ったが、質問を変えよう。今日発売の新曲のタイトルは？」
line = "「もらおうかと思ったが、質問を変えよう。今日発売の新曲のタイトルは？」"

[[dialogue]]
speaker = "ファン？"
# 「えっ？」
line = "「えっ？」"

[[dialogue]]
speaker = "アルモタヘル"
# 「どうした？　アイドルのファンなのだから答えられるだろう？　正確でなくてもだいたい合っていれば構わないぞ」
line = "「どうした？　アイドルのファンなのだから答えられるだろう？　正確でなくてもだいたい合っていれば構わないぞ」"

[[dialogue]]
speaker = "ファン？"
# 「思い出すのでちょっと待ってくださいって。ええっと……」
line = "「思い出すのでちょっと待ってくださいって。ええっと……」"

[[dialogue]]
speaker = "アルモタヘル"
# 「残念、時間切れだ。正解は『ドキドキ☆ワルプルギス　恋の呪い<emoji=heart04>』だ」
line = "「残念、時間切れだ。正解は『ドキドキ☆ワルプルギス　恋の呪い<emoji=heart04>』だ」"

[[dialogue]]
speaker = "ファン？"
# 「何だその怪しすぎる曲名！？」
line = "「何だその怪しすぎる曲名！？」"

[[dialogue]]
speaker = "アルモタヘル"
# 「そういうアイドルなのだ。我も驚いたが。──とはいえ、イベントに並ぶなら知らぬ方がおかしいと思うが」
line = "「そういうアイドルなのだ。我も驚いたが。──とはいえ、イベントに並ぶなら知らぬ方がおかしいと思うが」"

[[dialogue]]
speaker = "ファン？"
# 「まさか答えられなかったから整理券を配らないってわけじゃないだろうな！？　聞いてないぞ！」
line = "「まさか答えられなかったから整理券を配らないってわけじゃないだろうな！？　聞いてないぞ！」"

[[dialogue]]
speaker = "アルモタヘル"
# 「いや？　整理券は配るが」
line = "「いや？　整理券は配るが」"

[[dialogue]]
speaker = "ファン？"
# 「ならいいんだよ──って、２００３番！？　番号めちゃくちゃ後じゃないか！　これじゃ限定グッズ買えないだろ！　詐欺だ詐欺だ！」
line = "「ならいいんだよ──って、２００３番！？　番号めちゃくちゃ後じゃないか！　これじゃ限定グッズ買えないだろ！　詐欺だ詐欺だ！」"

[[dialogue]]
speaker = "アルモタヘル"
# 「詐欺？　告知サイトには、混雑の場合は整理券を発行すると書いてある。何も虚偽はない」
line = "「詐欺？　告知サイトには、混雑の場合は整理券を発行すると書いてある。何も虚偽はない」"

[[dialogue]]
speaker = "アルモタヘル"
# 「文句があるなら好きにぶちまけるがいい。だがこちらも抗弁の用意はある」
