[[dialogue]]
speaker = "マグダレナ"
# 「みなさーん、整理券はまだありますからね。押さないでくださいね～」
line = "「みなさーん、整理券はまだありますからね。押さないでくださいね～」"

[[dialogue]]
speaker = "アルモタヘル"
# 「質問は思ったより有効のようだな。ファンとやらでないのが反応でわかるぞ」
line = "「質問は思ったより有効のようだな。ファンとやらでないのが反応でわかるぞ」"

[[dialogue]]
speaker = "unk"
