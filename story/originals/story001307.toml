[[dialogue]]
speaker = "unk"
# 週が明けて、マムの訓練指導が再開した。アムと交代しての休憩時間、俺がマトイを探していると――
line = "週が明けて、マムの訓練指導が再開した。アムと交代しての休憩時間、俺がマトイを探していると――"

[[dialogue]]
speaker = "マトイ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# マトイは何かを考えるように、海を眺めていた。今日はよく同じような表情を浮かべている。
line = "マトイは何かを考えるように、海を眺めていた。今日はよく同じような表情を浮かべている。"

[[dialogue]]
speaker = "unk"
# マトイ、何か考えごとか？
line = "マトイ、何か考えごとか？"

[[dialogue]]
speaker = "マトイ"
# 「ああ、会長。ちょっとね……」
line = "「ああ、会長。ちょっとね……」"

[[dialogue]]
speaker = "unk"
# 何かあるなら、相談に乗ると告げる。
line = "何かあるなら、相談に乗ると告げる。"

[[dialogue]]
speaker = "unk"
# マトイはまた少し考えるように海を見つめてから――
line = "マトイはまた少し考えるように海を見つめてから――"

[[dialogue]]
speaker = "マトイ"
# 「私の星騎士としての信念って何なんだろう、って考えてたんだ」
line = "「私の星騎士としての信念って何なんだろう、って考えてたんだ」"

[[dialogue]]
speaker = "マトイ"
# 「私さ、いつも自分で自分のことを普通の人間だって思ってきたから、強い信念とか、そんなことあまり考えたことがなかったんだよね」
line = "「私さ、いつも自分で自分のことを普通の人間だって思ってきたから、強い信念とか、そんなことあまり考えたことがなかったんだよね」"

[[dialogue]]
speaker = "マトイ"
# 「私はそんな大層な理由で星騎士になったわけじゃない。ただ、人よりもちょっと強い星力を持っていたってだけ」
line = "「私はそんな大層な理由で星騎士になったわけじゃない。ただ、人よりもちょっと強い星力を持っていたってだけ」"

[[dialogue]]
speaker = "マトイ"
# 「星力に目覚めた時は、すごく嬉しかった。特別な人間になれた気がして、だったら星騎士にならなきゃって使命感に燃えたりもした」
line = "「星力に目覚めた時は、すごく嬉しかった。特別な人間になれた気がして、だったら星騎士にならなきゃって使命感に燃えたりもした」"

[[dialogue]]
speaker = "マトイ"
# 「正直に言えば、『普通じゃないこと』への憧れがあった。自分はこれからすごい星騎士になれるかもしれないって、ちょっとワクワクしたりもした」
line = "「正直に言えば、『普通じゃないこと』への憧れがあった。自分はこれからすごい星騎士になれるかもしれないって、ちょっとワクワクしたりもした」"

[[dialogue]]
speaker = "マトイ"
# 「まあ、そんな幻想は入学して早々、規格外のヴィーナスを見て打ち砕かれる羽目になったんだけど……あはは」
line = "「まあ、そんな幻想は入学して早々、規格外のヴィーナスを見て打ち砕かれる羽目になったんだけど……あはは」"

[[dialogue]]
speaker = "マトイ"
# 「……アムちゃんはきっと、本校に進学したら星徒会入りを果たすと思う。いや、ヴィーナスに憧れているから、もしかしたら進学先は新星学園かもしれないね」
line = "「……アムちゃんはきっと、本校に進学したら星徒会入りを果たすと思う。いや、ヴィーナスに憧れているから、もしかしたら進学先は新星学園かもしれないね」"

[[dialogue]]
speaker = "マトイ"
# 「私は未だに、ヴィーナスから星徒会に誘われなければ、星徒会に入ることはなかったと思ってる。たまたま、そういう縁があっただけ」
line = "「私は未だに、ヴィーナスから星徒会に誘われなければ、星徒会に入ることはなかったと思ってる。たまたま、そういう縁があっただけ」"

[[dialogue]]
speaker = "マトイ"
# 「だから……自分が本当に星徒会メンバーに相応しいのかって言われたら、正直自信がないんだ」
line = "「だから……自分が本当に星徒会メンバーに相応しいのかって言われたら、正直自信がないんだ」"

[[dialogue]]
speaker = "マトイ"
# 「私は……他のみんなみたいに特別な才能なんてない……普通の人間だから」
line = "「私は……他のみんなみたいに特別な才能なんてない……普通の人間だから」"

[[dialogue]]
speaker = "unk"
# ふと、そこで俺は思い返す。数日前、マムに言われたことを――
line = "ふと、そこで俺は思い返す。数日前、マムに言われたことを――"

[[dialogue]]
speaker = "マハムート"
# 「会長、マトイのことで相談があるわ」
line = "「会長、マトイのことで相談があるわ」"

[[dialogue]]
speaker = "マハムート"
# 「――マトイの才能についてよ」
line = "「――マトイの才能についてよ」"

[[dialogue]]
speaker = "マハムート"
# 「これまで、誰も真剣に指摘をしてこなかった。というより、誰もちゃんと見極められなかったのね……私も含めて」
line = "「これまで、誰も真剣に指摘をしてこなかった。というより、誰もちゃんと見極められなかったのね……私も含めて」"

[[dialogue]]
speaker = "マハムート"
# 「今回、あの子と向き合ってみて、ようやくわかった」
line = "「今回、あの子と向き合ってみて、ようやくわかった」"

[[dialogue]]
speaker = "マハムート"
# 「あの子は確かに、天才ではないわ」
line = "「あの子は確かに、天才ではないわ」"

[[dialogue]]
speaker = "マハムート"
# 「だけど、あの子が自分で思っているような、『普通』でも決してない」
line = "「だけど、あの子が自分で思っているような、『普通』でも決してない」"

[[dialogue]]
speaker = "マハムート"
# 「物覚えだったら……会長、あなたの方が早いわ。それと、アムのように能力が防御に特化しているわけでもない」
line = "「物覚えだったら……会長、あなたの方が早いわ。それと、アムのように能力が防御に特化しているわけでもない」"

[[dialogue]]
speaker = "マハムート"
# 「そういう意味では普通ね。ただ……会長、知ってる？」
line = "「そういう意味では普通ね。ただ……会長、知ってる？」"

[[dialogue]]
speaker = "マハムート"
# 「あの子、固有の特殊な星術を持ってないという以外、何でも普通レベルにこなせるのよ。攻撃、防御、回復、味方の補助、それだけじゃない」
line = "「あの子、固有の特殊な星術を持ってないという以外、何でも普通レベルにこなせるのよ。攻撃、防御、回復、味方の補助、それだけじゃない」"

[[dialogue]]
speaker = "マハムート"
# 「炎、水、氷、雷、風、光、闇、その他諸々の星術。教えれば、全部普通に覚えることができる。使える星術の種類を聞いて、驚いたわ」
line = "「炎、水、氷、雷、風、光、闇、その他諸々の星術。教えれば、全部普通に覚えることができる。使える星術の種類を聞いて、驚いたわ」"

[[dialogue]]
speaker = "マハムート"
# 「誰しも何か尖った部分があるものよ。でも、あの子はその真逆を行く」
line = "「誰しも何か尖った部分があるものよ。でも、あの子はその真逆を行く」"

[[dialogue]]
speaker = "マハムート"
# 「あの子は全ての分野に適性を持っている。つまりは『全適正』」
line = "「あの子は全ての分野に適性を持っている。つまりは『全適正』」"

[[dialogue]]
speaker = "マハムート"
# 「どの分野も１００点満点には到達しないけど、一方であらゆる分野で平均点を決して下回ることがない」
line = "「どの分野も１００点満点には到達しないけど、一方であらゆる分野で平均点を決して下回ることがない」"

[[dialogue]]
speaker = "マハムート"
# 「そして、できない分野が存在しないから、例えば『防御』のように１つの分野を鍛え続ければ、成長速度は普通でも、着実に強くなっていく」
line = "「そして、できない分野が存在しないから、例えば『防御』のように１つの分野を鍛え続ければ、成長速度は普通でも、着実に強くなっていく」"

[[dialogue]]
speaker = "マハムート"
# 「その証拠に、あの子は新星学園星徒会のディフェンス役として、リクリエとの決戦を生き抜いてみせた。常人が才能なしにできることではないわ」
line = "「その証拠に、あの子は新星学園星徒会のディフェンス役として、リクリエとの決戦を生き抜いてみせた。常人が才能なしにできることではないわ」"

[[dialogue]]
speaker = "マハムート"
# 「つまり、あの子は鍛えれば鍛える程、普通に強くなっていく『大器晩成』型」
line = "「つまり、あの子は鍛えれば鍛える程、普通に強くなっていく『大器晩成』型」"

[[dialogue]]
speaker = "マハムート"
# 「最終的に何でも普通にこなせるようになる、真の『オールラウンダー』よ」
line = "「最終的に何でも普通にこなせるようになる、真の『オールラウンダー』よ」"

[[dialogue]]
speaker = "unk"
# それが……マトイの才能
line = "それが……マトイの才能"

[[dialogue]]
speaker = "マハムート"
# 「ただ……私がそのこと言っても、多分伝わらない」
line = "「ただ……私がそのこと言っても、多分伝わらない」"

[[dialogue]]
speaker = "マハムート"
# 「私は今回指導するまで、マトイとそこまで深く関わってこなかったしね。だから――」
line = "「私は今回指導するまで、マトイとそこまで深く関わってこなかったしね。だから――」"

[[dialogue]]
speaker = "マハムート"
# 「このことをちゃんと伝えられるのは、会長。今日まで一緒に星徒会をやってきた貴方よ」
line = "「このことをちゃんと伝えられるのは、会長。今日まで一緒に星徒会をやってきた貴方よ」"

[[dialogue]]
speaker = "unk"
# 俺がマムに言われたことをマトイに伝えると――
line = "俺がマムに言われたことをマトイに伝えると――"

[[dialogue]]
speaker = "マトイ"
# 「マムがそんなことを……」
line = "「マムがそんなことを……」"

[[dialogue]]
speaker = "unk"
# でも俺は、本当は――
line = "でも俺は、本当は――"

[[dialogue]]
speaker = "unk"
# 才能があるとか無いとか、そんなのはどうでもいいんだ。
line = "才能があるとか無いとか、そんなのはどうでもいいんだ。"

[[dialogue]]
speaker = "マトイ"
# 「え……？」
line = "「え……？」"

[[dialogue]]
speaker = "unk"
# 今日まで、俺たち星徒会を盾で守り続けてきたのは、他の誰でもない。マトイだ。
line = "今日まで、俺たち星徒会を盾で守り続けてきたのは、他の誰でもない。マトイだ。"

[[dialogue]]
speaker = "unk"
# それは揺るぎない事実。
line = "それは揺るぎない事実。"

[[dialogue]]
speaker = "unk"
# マトイがどんな敵を前にしても、いつも変わらず、勇敢に盾を構え続けてきたことを、俺は知っている。
line = "マトイがどんな敵を前にしても、いつも変わらず、勇敢に盾を構え続けてきたことを、俺は知っている。"

[[dialogue]]
speaker = "unk"
# だから――
line = "だから――"

[[dialogue]]
speaker = "unk"
# その『普通』を、マトイはもっと誇っていい
line = "その『普通』を、マトイはもっと誇っていい"

[[dialogue]]
speaker = "マトイ"
# 「会長……」
line = "「会長……」"

[[dialogue]]
speaker = "unk"
# と、その時だった。
line = "と、その時だった。"

[[dialogue]]
speaker = "マトイ"
# 「モンスター出現アラート……！」
line = "「モンスター出現アラート……！」"

[[dialogue]]
speaker = "unk"
# モンスターが出現したのは、学園のすぐ近くだった。俺はリゾート結界にいたマトイ、マム、アムの３人で臨時チームを組み、対処へ向かったが――
line = "モンスターが出現したのは、学園のすぐ近くだった。俺はリゾート結界にいたマトイ、マム、アムの３人で臨時チームを組み、対処へ向かったが――"

[[dialogue]]
speaker = "マハムート"
# 「とんでもないことになったわね……」
line = "「とんでもないことになったわね……」"

[[dialogue]]
speaker = "アム"
# 「マム！　言われた通り、セレスティアで救援要請シグナルは出しました！　でも……」
line = "「マム！　言われた通り、セレスティアで救援要請シグナルは出しました！　でも……」"

[[dialogue]]
speaker = "マトイ"
# 「これは……数が普通じゃない……！」
line = "「これは……数が普通じゃない……！」"

[[dialogue]]
speaker = "モンスター"
# 「ギギギ……！」
line = "「ギギギ……！」"

[[dialogue]]
speaker = "マハムート"
# 「これが噂の新種モンスターね。確かに、これまでのとは異質の雰囲気だわ」
line = "「これが噂の新種モンスターね。確かに、これまでのとは異質の雰囲気だわ」"

[[dialogue]]
speaker = "アム"
# 「どうしよう……！　周りには、逃げ遅れた人達が沢山いるのに……！」
line = "「どうしよう……！　周りには、逃げ遅れた人達が沢山いるのに……！」"

[[dialogue]]
speaker = "マトイ"
# 「モンスターが群れを為して、周囲に包囲網を作ってる……！　これじゃ他の星騎士たちが来ても、簡単に入って来れない……！」
line = "「モンスターが群れを為して、周囲に包囲網を作ってる……！　これじゃ他の星騎士たちが来ても、簡単に入って来れない……！」"

[[dialogue]]
speaker = "unk"
# そう、新種のモンスターは目の前にも沢山いるが、それ以外の群れが俺たちのいるエリアを取り囲むように、円状の包囲網を形成していた。
line = "そう、新種のモンスターは目の前にも沢山いるが、それ以外の群れが俺たちのいるエリアを取り囲むように、円状の包囲網を形成していた。"

[[dialogue]]
speaker = "unk"
# まるで、エリア内の獲物を逃がさんとばかりに。
line = "まるで、エリア内の獲物を逃がさんとばかりに。"

[[dialogue]]
speaker = "マハムート"
# 「落ち着きなさい、２人共。この新種モンスターを想定して、一対多数の防御訓練をしてきたんでしょう」
line = "「落ち着きなさい、２人共。この新種モンスターを想定して、一対多数の防御訓練をしてきたんでしょう」"

[[dialogue]]
speaker = "アム"
# 「……！　イエス、マム！」
line = "「……！　イエス、マム！」"

[[dialogue]]
speaker = "マハムート"
# 「会長、貴方に指示は任せるわ。民間人を救助しつつ、エリアを取り囲んでいるモンスター群の壁を突破するわよ」
line = "「会長、貴方に指示は任せるわ。民間人を救助しつつ、エリアを取り囲んでいるモンスター群の壁を突破するわよ」"

[[dialogue]]
speaker = "unk"
# よし、行くぞ！
line = "よし、行くぞ！"

[[dialogue]]
speaker = "マトイ"
# 「うん！　落ち着いて……いつも通りに！」
line = "「うん！　落ち着いて……いつも通りに！」"

[[dialogue]]
speaker = "unk"
# 俺たちは新種モンスターとの交戦を開始するのだった――
line = "俺たちは新種モンスターとの交戦を開始するのだった――"
