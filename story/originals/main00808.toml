line = "「学園に入ったことも──クロトに出会えたことだって！　みんな日誌のおかげなんだから──！」"

[[dialogue]]
speaker = "クロト"
# 「──それは違う」
line = "「──それは違う」"

[[dialogue]]
speaker = "unk"
# でも。
line = "でも。"

[[dialogue]]
speaker = "unk"
# そのひと言だけは、きっぱりと否定した。
line = "そのひと言だけは、きっぱりと否定した。"

[[dialogue]]
speaker = "unk"
# 彼女はやはり──大事な部分を履き違えている。
line = "彼女はやはり──大事な部分を履き違えている。"

[[dialogue]]
speaker = "クロト"
# 「ヴィーナスが今ここにいるのは、ヴィーナス自身のおかげだよ」
line = "「ヴィーナスが今ここにいるのは、ヴィーナス自身のおかげだよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "unk"
# だから……俺は伝えてやらなくちゃいけなかった。
line = "だから……俺は伝えてやらなくちゃいけなかった。"

[[dialogue]]
speaker = "unk"
# いつまでも、日誌という鎖に縛られたままの彼女を、解放するために。
line = "いつまでも、日誌という鎖に縛られたままの彼女を、解放するために。"

[[dialogue]]
speaker = "クロト"
# 「ここに書かれてるのは、ただの文字だ」
line = "「ここに書かれてるのは、ただの文字だ」"

[[dialogue]]
speaker = "クロト"
# 「内容だって、ヴィーナスの人生を構成するほんの一部にすぎない。それこそ、女子が毎日したためる日記と変わらない程度にな」
line = "「内容だって、ヴィーナスの人生を構成するほんの一部にすぎない。それこそ、女子が毎日したためる日記と変わらない程度にな」"

[[dialogue]]
speaker = "ヴィーナス"
# 「っ……な、何を……」
line = "「っ……な、何を……」"

[[dialogue]]
speaker = "unk"
# 俺は未来の日誌を手に取って言う。
line = "俺は未来の日誌を手に取って言う。"

[[dialogue]]
speaker = "unk"
# これは、彼女の思っているほど、だいそれた存在ではないのだと。
line = "これは、彼女の思っているほど、だいそれた存在ではないのだと。"

[[dialogue]]
speaker = "クロト"
# 「危険な竜が相手でも、みんながついてきてくれたのは──『日誌に書かれてるから』なんかじゃない」
line = "「危険な竜が相手でも、みんながついてきてくれたのは──『日誌に書かれてるから』なんかじゃない」"

[[dialogue]]
speaker = "クロト"
# 「九浄ヴィーナスっていう個人を──みんなが信頼した結果だ。どうして、そんな簡単なことがわからない？」
line = "「九浄ヴィーナスっていう個人を──みんなが信頼した結果だ。どうして、そんな簡単なことがわからない？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「っっ……」
line = "「っっ……」"

[[dialogue]]
speaker = "マトイ"
# 「最初からそう言ってるんだけどね……」
line = "「最初からそう言ってるんだけどね……」"

[[dialogue]]
speaker = "サーシャ"
# 「ヴィーナスちゃんのわがままは今に始まったことじゃないからねぇ」
line = "「ヴィーナスちゃんのわがままは今に始まったことじゃないからねぇ」"

[[dialogue]]
speaker = "unk"
# 当たり前の事実をヴィーナスに教えてやる。
line = "当たり前の事実をヴィーナスに教えてやる。"

[[dialogue]]
speaker = "unk"
# それでも、彼女は首を横に振って否定した。
line = "それでも、彼女は首を横に振って否定した。"

[[dialogue]]
speaker = "ヴィーナス"
# 「で……でもっ、違うの！　私とその日誌は──っ……ほとんど同じものっていうか」
line = "「で……でもっ、違うの！　私とその日誌は──っ……ほとんど同じものっていうか」"

[[dialogue]]
speaker = "ヴィーナス"
# 「みんなが私を頼ってくれるのは──嬉しいけど。当の私は……ずっとそれに頼りっきりだったの。クロトと出会う前から」
line = "「みんなが私を頼ってくれるのは──嬉しいけど。当の私は……ずっとそれに頼りっきりだったの。クロトと出会う前から」"

[[dialogue]]
speaker = "ヴィーナス"
# 「だから──今さら日誌に背いたら、私が私じゃなくなっちゃうような気がして……！」
line = "「だから──今さら日誌に背いたら、私が私じゃなくなっちゃうような気がして……！」"

[[dialogue]]
speaker = "クロト"
# 「それは無用な心配だな。みんなはちゃんと、ヴィーナス本人のことを見てるよ」
line = "「それは無用な心配だな。みんなはちゃんと、ヴィーナス本人のことを見てるよ」"

[[dialogue]]
speaker = "クロト"
# 「自分のことを軽視しすぎなんだよ。言っただろ、ここに書かれてるのは一部にすぎないって」
line = "「自分のことを軽視しすぎなんだよ。言っただろ、ここに書かれてるのは一部にすぎないって」"

[[dialogue]]
speaker = "ヴィーナス"
# 「っ……そんなの、わかるはずないじゃない──！」
line = "「っ……そんなの、わかるはずないじゃない──！」"

[[dialogue]]
speaker = "クロト"
# 「わかるよ。全部読んだから」
line = "「わかるよ。全部読んだから」"

[[dialogue]]
speaker = "ヴィーナス"
# 「！？」
line = "「！？」"

[[dialogue]]
speaker = "クロト"
# 「ヴィーナスが辿ってきた人生を知った。だから、何もかもとは言わないけど、わかる」
line = "「ヴィーナスが辿ってきた人生を知った。だから、何もかもとは言わないけど、わかる」"

[[dialogue]]
speaker = "unk"
# 大事な日誌を借り受けた昨日。
line = "大事な日誌を借り受けた昨日。"

[[dialogue]]
speaker = "unk"
# 少々時間はかかってしまったけれど、夜通しでなんとか読破できた。
line = "少々時間はかかってしまったけれど、夜通しでなんとか読破できた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「全部、なんて……何ページあると思ってるのよ……」
line = "「全部、なんて……何ページあると思ってるのよ……」"

[[dialogue]]
speaker = "クロト"
# 「１９２１ページ」
line = "「１９２１ページ」"

[[dialogue]]
speaker = "マトイ"
# （数えてんのかい）
line = "（数えてんのかい）"

[[dialogue]]
speaker = "クロト"
# 「面白かった。九浄家に着いてから、俺と出会うまで……ヴィーナスの日々がありありと記されてた」
line = "「面白かった。九浄家に着いてから、俺と出会うまで……ヴィーナスの日々がありありと記されてた」"

[[dialogue]]
speaker = "ヴィーナス"
# 「～～っ。か、貸すとは言ったけどっ、勝手に読んでいいなんて言ってないわよっ！」
line = "「～～っ。か、貸すとは言ったけどっ、勝手に読んでいいなんて言ってないわよっ！」"

[[dialogue]]
speaker = "クロト"
# 「はは……確かに女子の日記を読むなんて、デリカシーに欠ける行為だったかもな。でも、おかげでよくわかったよ」
line = "「はは……確かに女子の日記を読むなんて、デリカシーに欠ける行為だったかもな。でも、おかげでよくわかったよ」"

[[dialogue]]
speaker = "unk"
# この数年、彼女の人生を導いてきた道しるべ。
line = "この数年、彼女の人生を導いてきた道しるべ。"

[[dialogue]]
speaker = "unk"
# それを読むことで、俺には彼女の生きた軌跡が追体験できるかのようだった。
line = "それを読むことで、俺には彼女の生きた軌跡が追体験できるかのようだった。"

[[dialogue]]
speaker = "クロト"
# 「確かにここには──ヴィーナスにとって、重要な人生の選択肢が刻まれてる」
line = "「確かにここには──ヴィーナスにとって、重要な人生の選択肢が刻まれてる」"

[[dialogue]]
speaker = "クロト"
# 「ヴィーナスにとってかけがえのない宝物だっていうのも、当然だと思った。俺と引き合わせてくれたのも間違いないしな」
line = "「ヴィーナスにとってかけがえのない宝物だっていうのも、当然だと思った。俺と引き合わせてくれたのも間違いないしな」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そ、そう──そうよ。だから……今さら他の生き方なんて……」
line = "「そ、そう──そうよ。だから……今さら他の生き方なんて……」"

[[dialogue]]
speaker = "クロト"
# 「けど──九浄ヴィーナスって人間の真価は、これだけじゃないだろ？」
line = "「けど──九浄ヴィーナスって人間の真価は、これだけじゃないだろ？」"

[[dialogue]]
speaker = "クロト"
# 「俺は今日まで近くでヴィーナスを見てきた。俺と出会ってからの日付も、全部読み返したけど……ここに書かれてないことなんて山ほどあったぞ」
line = "「俺は今日まで近くでヴィーナスを見てきた。俺と出会ってからの日付も、全部読み返したけど……ここに書かれてないことなんて山ほどあったぞ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そんなことないわ！　大事なことはいつだって、そこに書かれてたもの！」
line = "「そんなことないわ！　大事なことはいつだって、そこに書かれてたもの！」"

[[dialogue]]
speaker = "クロト"
# 「本当か？　昨日、ヴィーナスの買ったバッグの柄まで書かれてたか？」
line = "「本当か？　昨日、ヴィーナスの買ったバッグの柄まで書かれてたか？」"

[[dialogue]]
speaker = "クロト"
# 「男の子の失くした風船を、迷わず空まで取ってくるなんて記述があったか？」
line = "「男の子の失くした風船を、迷わず空まで取ってくるなんて記述があったか？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「！　そ、それはないけど──あんなの、ただ体が勝手に動いただけだし……」
line = "「！　そ、それはないけど──あんなの、ただ体が勝手に動いただけだし……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ていうか、大事なことでもなんでもないじゃない。そんなの！」
line = "「ていうか、大事なことでもなんでもないじゃない。そんなの！」"

[[dialogue]]
speaker = "クロト"
# 「なんでもなくないよ。あの男の子にとってはきっと、人生の中でも大きなイベントだったに違いない」
line = "「なんでもなくないよ。あの男の子にとってはきっと、人生の中でも大きなイベントだったに違いない」"

[[dialogue]]
speaker = "unk"
# 人は一日の中で、数限りない選択をする。
line = "人は一日の中で、数限りない選択をする。"

[[dialogue]]
speaker = "unk"
# ヴィーナスは、たくさんの決断を下してきているくせに、重要なことほど日誌任せにしてしまうという悪癖を患っていた。
line = "ヴィーナスは、たくさんの決断を下してきているくせに、重要なことほど日誌任せにしてしまうという悪癖を患っていた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「……でも」
line = "「……でも」"

[[dialogue]]
speaker = "ヴィーナス"
# 「でも、私が勝手に動いたら……あんまり良くない結果になる」
line = "「でも、私が勝手に動いたら……あんまり良くない結果になる」"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロトに迷惑かけちゃったことだって──あったでしょ？　この前だって──」
line = "「クロトに迷惑かけちゃったことだって──あったでしょ？　この前だって──」"

[[dialogue]]
speaker = "クロト"
# 「ん？　ああ……」
line = "「ん？　ああ……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「来季の予算編成？　そんなものはね──こうでこうでこうよ！」
line = "「来季の予算編成？　そんなものはね──こうでこうでこうよ！」"

[[dialogue]]
speaker = "クロト"
# 「そんな適当に決めていいのか？　アナに相談したほうがいいんじゃ」
line = "「そんな適当に決めていいのか？　アナに相談したほうがいいんじゃ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「大丈夫大丈夫♪　部長とはみんな知り合いだし、なんとなく規模感もわかってるから♪」
line = "「大丈夫大丈夫♪　部長とはみんな知り合いだし、なんとなく規模感もわかってるから♪」"

[[dialogue]]
speaker = "unk"
# そんなノリで編成された部活動への予算割当てだったが──
line = "そんなノリで編成された部活動への予算割当てだったが──"

[[dialogue]]
speaker = "unk"
# 後に各所から不満が噴出することになった。
line = "後に各所から不満が噴出することになった。"

[[dialogue]]
speaker = "unk"
# 特に規模の大きいサバイバル部やアニマル研究会からは、不当に評価が低いと連日抗議されたものだ。
line = "特に規模の大きいサバイバル部やアニマル研究会からは、不当に評価が低いと連日抗議されたものだ。"

[[dialogue]]
speaker = "クロト"
# 「確かにそんなこともあったな。あの時は結構てんてこまいだった」
line = "「確かにそんなこともあったな。あの時は結構てんてこまいだった」"

[[dialogue]]
speaker = "ヴィーナス"
# 「でしょう……？　これまでは私が会長だったから、自分が責任を取れば良かったけど……今はそうじゃないし」
line = "「でしょう……？　これまでは私が会長だったから、自分が責任を取れば良かったけど……今はそうじゃないし」"

[[dialogue]]
speaker = "unk"
# しおらしく反省しているヴィーナス。
line = "しおらしく反省しているヴィーナス。"

[[dialogue]]
speaker = "unk"
# しかし、彼女はまだ気づいていなかったようだ。
line = "しかし、彼女はまだ気づいていなかったようだ。"

[[dialogue]]
speaker = "クロト"
# 「あの件……実はあれでよかったんだよ」
line = "「あの件……実はあれでよかったんだよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「へっ……？」
line = "「へっ……？」"

[[dialogue]]
speaker = "クロト"
# 「サバイバル部とアニマル研究会は──部員数を偽ってたんだ。正確には、掛け持ちの幽霊部員を水増ししてた」
line = "「サバイバル部とアニマル研究会は──部員数を偽ってたんだ。正確には、掛け持ちの幽霊部員を水増ししてた」"

[[dialogue]]
speaker = "クロト"
# 「これは、後日アナが調査してくれたことなんだが」
line = "「これは、後日アナが調査してくれたことなんだが」"

[[dialogue]]
speaker = "アナ"
# 「明確な校則違反でした。そのオーバー分を考慮すると、前会長の見積もりでちょうど適切」
line = "「明確な校則違反でした。そのオーバー分を考慮すると、前会長の見積もりでちょうど適切」"

[[dialogue]]
speaker = "クロト"
# 「ヴィーナスの勘のほうが、彼らの話よりも的確だったんだよ。だから未然に良からぬことを防ぐことができた」
line = "「ヴィーナスの勘のほうが、彼らの話よりも的確だったんだよ。だから未然に良からぬことを防ぐことができた」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そ……そうだったの……？」
line = "「そ……そうだったの……？」"

[[dialogue]]
speaker = "unk"
# ヴィーナスの向こう見ずな推進力が──時に日誌の運命力をも上回ることだってある。
line = "ヴィーナスの向こう見ずな推進力が──時に日誌の運命力をも上回ることだってある。"

[[dialogue]]
speaker = "unk"
# 俺が伝えたかったのは、そういうことだ。
line = "俺が伝えたかったのは、そういうことだ。"

[[dialogue]]
speaker = "クロト"
# 「マトイやアナにしたってそうだ。星徒会に入った時のこと、教えてくれたよな」
line = "「マトイやアナにしたってそうだ。星徒会に入った時のこと、教えてくれたよな」"

[[dialogue]]
speaker = "マトイ"
# 「うんうん。今でも覚えてる──『ビビッときた』って、ヴィーナスにいきなり手首掴まれて」
line = "「うんうん。今でも覚えてる──『ビビッときた』って、ヴィーナスにいきなり手首掴まれて」"

[[dialogue]]
speaker = "アナ"
# 「私も──教室に乗り込まれました。副会長の座を用意するなんて、新入生の私を相手に無茶言って」
line = "「私も──教室に乗り込まれました。副会長の座を用意するなんて、新入生の私を相手に無茶言って」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そ、それは──ただ日誌に書かれてたようにやっただけで……」
line = "「そ、それは──ただ日誌に書かれてたようにやっただけで……」"

[[dialogue]]
speaker = "クロト"
# 「いや。日誌の中には──ただ『書記候補と出会った』とか『副会長の座を与えた』としか書かれてないよ」
line = "「いや。日誌の中には──ただ『書記候補と出会った』とか『副会長の座を与えた』としか書かれてないよ」"

[[dialogue]]
speaker = "unk"
# そして、だからこそ──この日誌には概して個人名が記されていない。
line = "そして、だからこそ──この日誌には概して個人名が記されていない。"

[[dialogue]]
speaker = "unk"
# 書記、副会長、魔族、天使……それら一般的なカテゴリーでしか、人物については記載がない。
line = "書記、副会長、魔族、天使……それら一般的なカテゴリーでしか、人物については記載がない。"

[[dialogue]]
speaker = "クロト"
# 「だから──『アナ』や『マトイ』との出会いは、決して予期されていたものじゃない」
line = "「だから──『アナ』や『マトイ』との出会いは、決して予期されていたものじゃない」"

[[dialogue]]
speaker = "クロト"
# 「全部が全部、ヴィーナス流の<b>解釈</b>なんだよ。それは紛れもないヴィーナス自身の意思だ」
line = "「全部が全部、ヴィーナス流の<b>解釈</b>なんだよ。それは紛れもないヴィーナス自身の意思だ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "unk"
# そして──そんな彼女の想いに引っ張られてできたのが、俺たちだ。
line = "そして──そんな彼女の想いに引っ張られてできたのが、俺たちだ。"

[[dialogue]]
speaker = "クロト"
# 「今の新星星徒会は──予定調和の結果なんかじゃない」
line = "「今の新星星徒会は──予定調和の結果なんかじゃない」"

[[dialogue]]
speaker = "クロト"
# 「ヴィーナス自身が選び取って、作り上げた居場所なんだよ。だからみんな、ヴィーナス自身のことを信じるんだ。簡単なことだ」
line = "「ヴィーナス自身が選び取って、作り上げた居場所なんだよ。だからみんな、ヴィーナス自身のことを信じるんだ。簡単なことだ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「わたし……自身を……」
line = "「わたし……自身を……」"

[[dialogue]]
speaker = "unk"
# ヴィーナスを、新星のみんなが見つめていた。
line = "ヴィーナスを、新星のみんなが見つめていた。"

[[dialogue]]
speaker = "unk"
# 当の本人以外──誰も理解していたことだ。
line = "当の本人以外──誰も理解していたことだ。"

[[dialogue]]
speaker = "unk"
# いくら日誌とやらが正しそうな道筋を指し示していたって、それだけで破滅的な竜に立ち向かおうとは思えない。
line = "いくら日誌とやらが正しそうな道筋を指し示していたって、それだけで破滅的な竜に立ち向かおうとは思えない。"

[[dialogue]]
speaker = "unk"
# みんな──ヴィーナスが正義のために足掻くのを知ってるからこそ、ついてきてくれるんだ。
line = "みんな──ヴィーナスが正義のために足掻くのを知ってるからこそ、ついてきてくれるんだ。"

[[dialogue]]
speaker = "フィオナ"
# 「緋宮会長を立派な魔王に鍛える──ヴィーナスさんの信条でしたね。でも、そのことは……」
line = "「緋宮会長を立派な魔王に鍛える──ヴィーナスさんの信条でしたね。でも、そのことは……」"

[[dialogue]]
speaker = "クロト"
# 「ああ。この日誌に、そんな使命は書かれてない。ただ、俺と出会うまでの道筋が漠然と示されているだけだ」
line = "「ああ。この日誌に、そんな使命は書かれてない。ただ、俺と出会うまでの道筋が漠然と示されているだけだ」"

[[dialogue]]
speaker = "unk"
# 俺じゃなきゃダメなのだと以前のヴィーナスは言った。
line = "俺じゃなきゃダメなのだと以前のヴィーナスは言った。"

[[dialogue]]
speaker = "unk"
# その根拠はこの際、フィーリングでもビビッときたでもなんでも構わない。
line = "その根拠はこの際、フィーリングでもビビッときたでもなんでも構わない。"

[[dialogue]]
speaker = "unk"
# ただ、その選択は紛れもなく彼女自身のものだ。
line = "ただ、その選択は紛れもなく彼女自身のものだ。"

[[dialogue]]
speaker = "unk"
# だから──俺と出会ってからの行動がどれも、間違いだったなんて思わない。思わせたくない。
line = "だから──俺と出会ってからの行動がどれも、間違いだったなんて思わない。思わせたくない。"

[[dialogue]]
speaker = "ヴィーナス"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# 俺たちの言葉を聞いて──ヴィーナスは呆気にとられたように、放心していた。
line = "俺たちの言葉を聞いて──ヴィーナスは呆気にとられたように、放心していた。"

[[dialogue]]
speaker = "フィオナ"
# 「ヴィーナスさんの本心は──もう痛いくらいにお聞きしています。あれは、日誌に書かれた予定調和なんかじゃないはずです」
line = "「ヴィーナスさんの本心は──もう痛いくらいにお聞きしています。あれは、日誌に書かれた予定調和なんかじゃないはずです」"

[[dialogue]]
speaker = "アナ"
# 「そうですね。もっとわがままでいてください。妙な不思議アイテムより、前会長の根拠のない自信のほうが私は好きです」
line = "「そうですね。もっとわがままでいてください。妙な不思議アイテムより、前会長の根拠のない自信のほうが私は好きです」"

[[dialogue]]
speaker = "マトイ"
# 「あはは、辛辣。でも同感かも」
line = "「あはは、辛辣。でも同感かも」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あ……う……みんな……」
line = "「あ……う……みんな……」"

[[dialogue]]
speaker = "unk"
# 言ってしまえば──ヴィーナスの手元にはいつも、日誌という攻略本があった。
line = "言ってしまえば──ヴィーナスの手元にはいつも、日誌という攻略本があった。"

[[dialogue]]
speaker = "unk"
# 日々を生きていく上で、それにすがろうとするのはむしろ自然な行為だったろう。
line = "日々を生きていく上で、それにすがろうとするのはむしろ自然な行為だったろう。"

[[dialogue]]
speaker = "unk"
# たとえ自分に置き換えてみたとしても、依存せず生きるのは難しかっただろう。
line = "たとえ自分に置き換えてみたとしても、依存せず生きるのは難しかっただろう。"

[[dialogue]]
speaker = "unk"
# だけど、いつの間にか……未来の日誌は、彼女にとって指針ではなく呪縛になってしまっていた。
line = "だけど、いつの間にか……未来の日誌は、彼女にとって指針ではなく呪縛になってしまっていた。"

[[dialogue]]
speaker = "unk"
# 正しい未来が来たれば来たるほどに、従わなくちゃという強迫観念に駆られるようになった。
line = "正しい未来が来たれば来たるほどに、従わなくちゃという強迫観念に駆られるようになった。"

[[dialogue]]
speaker = "unk"
# そしていつしか、その予知性が『使命』となって重くのしかかり……ヴィーナス本人の意志をも奪ってしまった。
line = "そしていつしか、その予知性が『使命』となって重くのしかかり……ヴィーナス本人の意志をも奪ってしまった。"

[[dialogue]]
speaker = "unk"
# でも。
line = "でも。"

[[dialogue]]
speaker = "クロト"
# 「ヴィーナスは──自分が気づいてなかっただけで、ちゃんと重大な決断を下してきてるよ。一人じゃ何も決められないなんてことはない」
line = "「ヴィーナスは──自分が気づいてなかっただけで、ちゃんと重大な決断を下してきてるよ。一人じゃ何も決められないなんてことはない」"

[[dialogue]]
speaker = "クロト"
# 「だから……もっと自分を信じてくれ。俺たちを導いてきてくれたように」
line = "「だから……もっと自分を信じてくれ。俺たちを導いてきてくれたように」"

[[dialogue]]
speaker = "クロト"
# 「他の何にも縛られない──本当のヴィーナスを、俺たちは見てるから」
line = "「他の何にも縛られない──本当のヴィーナスを、俺たちは見てるから」"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロト……」
line = "「クロト……」"

[[dialogue]]
speaker = "unk"
# 目に見えた成果なんかすぐに出なくてもいい。
line = "目に見えた成果なんかすぐに出なくてもいい。"

[[dialogue]]
speaker = "unk"
# 彼女が突き進んだ道の先には、きっと明るい未来が待っているのだと、他ならぬ俺たちが信じられているのだから。
line = "彼女が突き進んだ道の先には、きっと明るい未来が待っているのだと、他ならぬ俺たちが信じられているのだから。"

[[dialogue]]
speaker = "クロト"
# 「もし、それでも、寄る辺がなくて不安だっていうなら」
line = "「もし、それでも、寄る辺がなくて不安だっていうなら」"

[[dialogue]]
speaker = "クロト"
# 「俺を頼れ」
line = "「俺を頼れ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「！」
line = "「！」"

[[dialogue]]
speaker = "クロト"
# 「今度は俺が──ヴィーナスを引っ張ってやるから。もう二度と、不甲斐ないなんて言わせない」
line = "「今度は俺が──ヴィーナスを引っ張ってやるから。もう二度と、不甲斐ないなんて言わせない」"

[[dialogue]]
speaker = "ヴィーナス"
# 「な……何よ……もう。いきなり……格好つけちゃって」
line = "「な……何よ……もう。いきなり……格好つけちゃって」"

[[dialogue]]
speaker = "サーシャ"
# （ヴィーナスちゃん、顔赤い？）
line = "（ヴィーナスちゃん、顔赤い？）"

[[dialogue]]
speaker = "アナ"
# （珍しいこともあるものです）
line = "（珍しいこともあるものです）"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふ……ふふっ。ええ……でも──そうね。なら、お言葉に甘えちゃおうかしら」
line = "「ふ……ふふっ。ええ……でも──そうね。なら、お言葉に甘えちゃおうかしら」"

[[dialogue]]
speaker = "unk"
# それからヴィーナスは……笑った。
line = "それからヴィーナスは……笑った。"

[[dialogue]]
speaker = "unk"
# つきものが落ちたみたいに、清々しい笑顔になる。
line = "つきものが落ちたみたいに、清々しい笑顔になる。"

[[dialogue]]
speaker = "ヴィーナス"
# 「あーあ。なんか、私だけ気づいてなかったのね」
line = "「あーあ。なんか、私だけ気づいてなかったのね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……わかったわ」
line = "「……わかったわ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私──もう、決めることから逃げない。どんなに不透明な道でも突き進んでやるわ」
line = "「私──もう、決めることから逃げない。どんなに不透明な道でも突き進んでやるわ」"

[[dialogue]]
speaker = "クロト"
# 「ああ。その意気だ」
line = "「ああ。その意気だ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それに──みんなだって巻き込んでやるんだから、覚悟しなさい。ここから先の保証なんかないわよ！」
line = "「それに──みんなだって巻き込んでやるんだから、覚悟しなさい。ここから先の保証なんかないわよ！」"

[[dialogue]]
speaker = "ルリエル"
# 「おおっ！　それでこそ新星のフィクサー様なのです！」
line = "「おおっ！　それでこそ新星のフィクサー様なのです！」"

[[dialogue]]
speaker = "セーラ"
# 「んー♪　ヴィーナスちゃんはやっぱり元気な方がいいねー♪」
line = "「んー♪　ヴィーナスちゃんはやっぱり元気な方がいいねー♪」"

[[dialogue]]
speaker = "ニャリオン"
# 「ニャ。乱暴な性格のくせに、ウニャウニャ悩みすぎなのニャン」
line = "「ニャ。乱暴な性格のくせに、ウニャウニャ悩みすぎなのニャン」"

[[dialogue]]
speaker = "unk"
# みんなで決意を新たにしたが──なんとことはない。
line = "みんなで決意を新たにしたが──なんとことはない。"

[[dialogue]]
speaker = "unk"
# ただ、俺たちはヴィーナスを信じていると再確認したにすぎなかった。
line = "ただ、俺たちはヴィーナスを信じていると再確認したにすぎなかった。"
