[[dialogue]]
speaker = "リーナ"
# 「レイラお姉ちゃん、キサナお姉ちゃん！　こっちこっちー！」
line = "「レイラお姉ちゃん、キサナお姉ちゃん！　こっちこっちー！」"

[[dialogue]]
speaker = "レイラ"
# 「リーナ！　ごめんね、遅くなって」
line = "「リーナ！　ごめんね、遅くなって」"

[[dialogue]]
speaker = "リーナ"
# 「それより見て見て！　今日の獲物でございますー！」
line = "「それより見て見て！　今日の獲物でございますー！」"

[[dialogue]]
speaker = "unk"
# リーナがぶんぶん振り回しているのは、アザラシに似た魔獣だ。さっき仕留めたところらしい。
line = "リーナがぶんぶん振り回しているのは、アザラシに似た魔獣だ。さっき仕留めたところらしい。"

[[dialogue]]
speaker = "キサナ"
# 「それは……この辺にいる魔獣か？」
line = "「それは……この辺にいる魔獣か？」"

[[dialogue]]
speaker = "リーナ"
# 「うん。ジュリエッテちゃんが頭を狙うでございますって言ってたから、やってみたらできたの！」
line = "「うん。ジュリエッテちゃんが頭を狙うでございますって言ってたから、やってみたらできたの！」"

[[dialogue]]
speaker = "レイラ"
# 「そ、そっか……リーナは狩り上手だね」
line = "「そ、そっか……リーナは狩り上手だね」"

[[dialogue]]
speaker = "キサナ"
# 「よし、とりあえず焼いて食おうぜ。レイラ、火ぃおこせ。アタシが捌く」
line = "「よし、とりあえず焼いて食おうぜ。レイラ、火ぃおこせ。アタシが捌く」"

[[dialogue]]
speaker = "レイラ"
# 「はいはい。リーナ、まき拾い手伝ってくれる？」
line = "「はいはい。リーナ、まき拾い手伝ってくれる？」"

[[dialogue]]
speaker = "リーナ"
# 「は～い。ごはんごはん～♪」
line = "「は～い。ごはんごはん～♪」"

[[dialogue]]
speaker = "レイラ"
# 「お客様。本日のメインディッシュ、その辺にいた魔獣の丸焼きでございます」
line = "「お客様。本日のメインディッシュ、その辺にいた魔獣の丸焼きでございます」"

[[dialogue]]
speaker = "キサナ"
# 「うるせえ。変な小芝居してんじゃねえよ」
line = "「うるせえ。変な小芝居してんじゃねえよ」"

[[dialogue]]
speaker = "unk"
# そう吐き捨てながらも、キサナは手際よく丸焼きを切り分けていく。
line = "そう吐き捨てながらも、キサナは手際よく丸焼きを切り分けていく。"

[[dialogue]]
speaker = "リーナ"
# 「いっただきまーす♪　……これ、おいしくないかも。なんか生ぐさい……」
line = "「いっただきまーす♪　……これ、おいしくないかも。なんか生ぐさい……」"

[[dialogue]]
speaker = "レイラ"
# 「ひゅごっ……もぐもぐ……やっぱり味付けが海水だけだとさすがに食べにくいね……ひゅごっ……ジュリエッテがいてくれればよかったんだけど」
line = "「ひゅごっ……もぐもぐ……やっぱり味付けが海水だけだとさすがに食べにくいね……ひゅごっ……ジュリエッテがいてくれればよかったんだけど」"

[[dialogue]]
speaker = "キサナ"
# 「食うかしゃべるかどっちかにしろ」
line = "「食うかしゃべるかどっちかにしろ」"

[[dialogue]]
speaker = "レイラ"
# 「ひゅごっ……もぐもぐ……ひゅごっ……もぐもぐ……」
line = "「ひゅごっ……もぐもぐ……ひゅごっ……もぐもぐ……」"

[[dialogue]]
speaker = "キサナ"
# 「食う方に集中すんのかよ。……ったく。アタシが言うのもアレだが、オマエもよくコイツについていこうと思ったな」
line = "「食う方に集中すんのかよ。……ったく。アタシが言うのもアレだが、オマエもよくコイツについていこうと思ったな」"

[[dialogue]]
speaker = "リーナ"
# 「リーナ、よく覚えてないんだけど……気が付いたら、病院にひとりでいたの」
line = "「リーナ、よく覚えてないんだけど……気が付いたら、病院にひとりでいたの」"

[[dialogue]]
speaker = "リーナ"
# 「お父さんもお母さんもお兄ちゃんもいなくって……ナースさんに聞いても、誰も教えてくれないし……リーナ、寂しくて死んじゃいそうだった」
line = "「お父さんもお母さんもお兄ちゃんもいなくって……ナースさんに聞いても、誰も教えてくれないし……リーナ、寂しくて死んじゃいそうだった」"

[[dialogue]]
speaker = "リーナ"
# 「そんなときに、レイラお姉ちゃんが会いに来てくれたんだ」
line = "「そんなときに、レイラお姉ちゃんが会いに来てくれたんだ」"

[[dialogue]]
speaker = "リーナ"
# 「レイラお姉ちゃんはね、一緒に『お兄ちゃんを探そう』って言ってくれたの！」
line = "「レイラお姉ちゃんはね、一緒に『お兄ちゃんを探そう』って言ってくれたの！」"

[[dialogue]]
speaker = "リーナ"
# 「リーナにそう言ってくれたの、レイラお姉ちゃんだけだったからすっごく嬉しかった！」
line = "「リーナにそう言ってくれたの、レイラお姉ちゃんだけだったからすっごく嬉しかった！」"

[[dialogue]]
speaker = "レイラ"
# 「そ、そうなんだ……あはは……」
line = "「そ、そうなんだ……あはは……」"

[[dialogue]]
speaker = "レイラ"
# （リーナと出会ったのは、白い、無機質な病室だった……）
line = "（リーナと出会ったのは、白い、無機質な病室だった……）"

[[dialogue]]
speaker = "レイラ"
# （イザベラさんから、交通事故に遭った女の子がコラプサーに目覚めたと言われ、リーナに会いに行った）
line = "（イザベラさんから、交通事故に遭った女の子がコラプサーに目覚めたと言われ、リーナに会いに行った）"

[[dialogue]]
speaker = "レイラ"
# （家族を失った彼女になんて声をかけていいか分からないけど、それでも、ひとりぼっちにさせちゃいけないと思って）
line = "（家族を失った彼女になんて声をかけていいか分からないけど、それでも、ひとりぼっちにさせちゃいけないと思って）"

[[dialogue]]
speaker = "レイラ"
# （でもリーナが口にしたのは、予想外の言葉だった……）
line = "（でもリーナが口にしたのは、予想外の言葉だった……）"

[[dialogue]]
speaker = "リーナ"
# 「お兄ちゃん……お兄ちゃんがどこにもいないの」
line = "「お兄ちゃん……お兄ちゃんがどこにもいないの」"

[[dialogue]]
speaker = "レイラ"
# 「え……？」
line = "「え……？」"

[[dialogue]]
speaker = "レイラ"
# （リーナには、リーナが生まれる前に亡くなったお兄さんがいた。リーナの両親が、何かにつけてそのお兄さんの話をすることもイザベラさんから聞いていた）
line = "（リーナには、リーナが生まれる前に亡くなったお兄さんがいた。リーナの両親が、何かにつけてそのお兄さんの話をすることもイザベラさんから聞いていた）"

[[dialogue]]
speaker = "レイラ"
# （でも、そのお兄さんを探しているなんて、思いもしなかった）
line = "（でも、そのお兄さんを探しているなんて、思いもしなかった）"

[[dialogue]]
speaker = "リーナ"
# 「リーナ、いらない子なの？　だからお父さんもお母さんもお兄ちゃんも迎えに来てくれないの？」
line = "「リーナ、いらない子なの？　だからお父さんもお母さんもお兄ちゃんも迎えに来てくれないの？」"

[[dialogue]]
speaker = "レイラ"
# 「そんなことないよ。今、お父さんとお母さんは遠いところにいて迎えに来れないの。だから私が来たんだ」
line = "「そんなことないよ。今、お父さんとお母さんは遠いところにいて迎えに来れないの。だから私が来たんだ」"

[[dialogue]]
speaker = "リーナ"
# 「お兄ちゃんは？　……お兄ちゃんはどこにいるの？」
line = "「お兄ちゃんは？　……お兄ちゃんはどこにいるの？」"

[[dialogue]]
speaker = "レイラ"
# 「……お兄ちゃんは迷子みたい。だから一緒に探しに行こう？」
line = "「……お兄ちゃんは迷子みたい。だから一緒に探しに行こう？」"

[[dialogue]]
speaker = "リーナ"
# 「ホントに！？　ありがとう、お姉ちゃん！」
line = "「ホントに！？　ありがとう、お姉ちゃん！」"

[[dialogue]]
speaker = "レイラ"
# （私はリーナの入院記録をハッキングで消して、リーナを連れて帰った。ここには……ううん、どこにもリーナの居場所はないと思ったから）
line = "（私はリーナの入院記録をハッキングで消して、リーナを連れて帰った。ここには……ううん、どこにもリーナの居場所はないと思ったから）"

[[dialogue]]
speaker = "リーナ"
# 「すぅー……すぅー……」
line = "「すぅー……すぅー……」"

[[dialogue]]
speaker = "レイラ"
# 「ふふっ、疲れて寝ちゃった。今日一日だけでもいろいろあったもんね」
line = "「ふふっ、疲れて寝ちゃった。今日一日だけでもいろいろあったもんね」"

[[dialogue]]
speaker = "キサナ"
# 「コイツ、どうするつもりだよ。このまま狂ったままにしとくのか？」
line = "「コイツ、どうするつもりだよ。このまま狂ったままにしとくのか？」"

[[dialogue]]
speaker = "レイラ"
# 「リーナはね、夢を見ているの。いないはずのお兄ちゃんが本当にいたらっていう夢を」
line = "「リーナはね、夢を見ているの。いないはずのお兄ちゃんが本当にいたらっていう夢を」"

[[dialogue]]
speaker = "レイラ"
# 「私もね、何度も夢に見た。両親が死んだのが悪い夢で、本当は生きてるっていう夢。だから、その夢を無理に覚まそうとはしないよ」
line = "「私もね、何度も夢に見た。両親が死んだのが悪い夢で、本当は生きてるっていう夢。だから、その夢を無理に覚まそうとはしないよ」"

[[dialogue]]
speaker = "レイラ"
# 「リーナの目が覚めるまで、私は待つから」
line = "「リーナの目が覚めるまで、私は待つから」"

[[dialogue]]
speaker = "キサナ"
# 「はっ、そうかよ。好きにしろ」
line = "「はっ、そうかよ。好きにしろ」"

[[dialogue]]
speaker = "unk"
# ぱちぱちと音を上げ、薪が爆ぜた。焚き火の炎が静寂に溶けていく。
line = "ぱちぱちと音を上げ、薪が爆ぜた。焚き火の炎が静寂に溶けていく。"
