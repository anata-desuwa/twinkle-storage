[[dialogue]]
speaker = "unk"
# 第４話,夏は終わっても,P
line = "第４話,夏は終わっても,P"

[[dialogue]]
speaker = "unk"
# リップルとの付き合いも長くなってきたある日。一緒に遊びたいと誘われて、俺達は街にやってきていた――
line = "リップルとの付き合いも長くなってきたある日。一緒に遊びたいと誘われて、俺達は街にやってきていた――"

[[dialogue]]
speaker = "リップル"
# 「ワオ！　人がイッパイで賑やかで～す♪」
line = "「ワオ！　人がイッパイで賑やかで～す♪」"

[[dialogue]]
speaker = "unk"
# リップルとお出かけは初めてだな
line = "リップルとお出かけは初めてだな"

[[dialogue]]
speaker = "リップル"
# 「ハイ♪　いつもリゾート結界で、星徒会の皆で遊ぶコトが多かったデスから、新鮮です！」
line = "「ハイ♪　いつもリゾート結界で、星徒会の皆で遊ぶコトが多かったデスから、新鮮です！」"

[[dialogue]]
speaker = "リップル"
# 「ワタシ、あまり都会の街を歩いたことがないので、今日は色々教えて欲しいで～す♪」
line = "「ワタシ、あまり都会の街を歩いたことがないので、今日は色々教えて欲しいで～す♪」"

[[dialogue]]
speaker = "リップル"
# 「あ、そうだ！　カイチョー、せっかく一緒に歩くのデスから――」
line = "「あ、そうだ！　カイチョー、せっかく一緒に歩くのデスから――」"

[[dialogue]]
speaker = "unk"
# （り、リップルから手を繋いできて……！？）
line = "（り、リップルから手を繋いできて……！？）"

[[dialogue]]
speaker = "リップル"
# 「エヘヘ♪　男女で出掛ける時はこうして手を繋ぐんだって、シショーが言ってマシた！　さあ、行きましょー♪」
line = "「エヘヘ♪　男女で出掛ける時はこうして手を繋ぐんだって、シショーが言ってマシた！　さあ、行きましょー♪」"

[[dialogue]]
speaker = "リップル"
# 「ゲームセンター、カイチョーと１度来てみたかったんです！　ワタシ、ダンスするやつ得意なんデスよ？　対戦しましょう、対戦！」
line = "「ゲームセンター、カイチョーと１度来てみたかったんです！　ワタシ、ダンスするやつ得意なんデスよ？　対戦しましょう、対戦！」"

[[dialogue]]
speaker = "リップル"
# 「……あ！　見て下さいカイチョー、これ！　クレーンゲームの景品で、イルカのぬいぐるみがアリま～す！　可愛いで～す♪」
line = "「……あ！　見て下さいカイチョー、これ！　クレーンゲームの景品で、イルカのぬいぐるみがアリま～す！　可愛いで～す♪」"

[[dialogue]]
speaker = "リップル"
# 「――ハイ！　ワタシ、イルカが好きなんです♪　可愛くて、グッズもよく集めたりシテて……」
line = "「――ハイ！　ワタシ、イルカが好きなんです♪　可愛くて、グッズもよく集めたりシテて……」"

[[dialogue]]
speaker = "リップル"
# 「……え？　取ってくれるんデスか？　ゲームセンターのバイトをしてたことがあって、コツを知ってる？」
line = "「……え？　取ってくれるんデスか？　ゲームセンターのバイトをしてたことがあって、コツを知ってる？」"

[[dialogue]]
speaker = "unk"
# それから、クレーンゲームに挑戦して、３回でイルカのぬいぐるみを取ることが出来た――
line = "それから、クレーンゲームに挑戦して、３回でイルカのぬいぐるみを取ることが出来た――"

[[dialogue]]
speaker = "リップル"
# 「わあぁ♪　カイチョー、アリガトございます！　あっという間に取れて、凄いです♪」
line = "「わあぁ♪　カイチョー、アリガトございます！　あっという間に取れて、凄いです♪」"

[[dialogue]]
speaker = "リップル"
# 「……エヘヘ♪　カイチョーからの初めてプレゼントですね。ワタシ、ＢＩＧ大切にします♪」
line = "「……エヘヘ♪　カイチョーからの初めてプレゼントですね。ワタシ、ＢＩＧ大切にします♪」"

[[dialogue]]
speaker = "unk"
# そう言われると、なんか照れるな……
line = "そう言われると、なんか照れるな……"

[[dialogue]]
speaker = "リップル"
# 「――美味しいタイ焼きのお店が近くにある？　それは楽しみで～す！」
line = "「――美味しいタイ焼きのお店が近くにある？　それは楽しみで～す！」"

[[dialogue]]
speaker = "リップル"
# 「おっ、見えてきました。あそこのお店デスかね？」
line = "「おっ、見えてきました。あそこのお店デスかね？」"

[[dialogue]]
speaker = "リップル"
# 「――カイチョーが買って来てくれるんデスか？　ワカリました。そうしたらワタシ、ここで待ってます！」
line = "「――カイチョーが買って来てくれるんデスか？　ワカリました。そうしたらワタシ、ここで待ってます！」"

[[dialogue]]
speaker = "unk"
# 俺は一旦、その場を離れてたい焼きの屋台へ向かい、２人分買って戻って来ると――
line = "俺は一旦、その場を離れてたい焼きの屋台へ向かい、２人分買って戻って来ると――"

[[dialogue]]
speaker = "チャラい男"
# 「それにしてもやっぱ、笑顔が凄くカワイイね～♪　一緒にいると、こっちも楽しい気分になって来る感じで」
line = "「それにしてもやっぱ、笑顔が凄くカワイイね～♪　一緒にいると、こっちも楽しい気分になって来る感じで」"

[[dialogue]]
speaker = "リップル"
# 「アリガトございます。お兄さんは今日はお一人なんデスか？」
line = "「アリガトございます。お兄さんは今日はお一人なんデスか？」"

[[dialogue]]
speaker = "unk"
# （無邪気な笑顔……！）
line = "（無邪気な笑顔……！）"

[[dialogue]]
speaker = "チャラい男"
# 「そうなんだよ～。キミもさ、一緒に来たのは別に、彼氏とかじゃないんでしょ？　だったらオレと遊ばない？　オレの方がもっと楽しい場所を案内できるよ？」
line = "「そうなんだよ～。キミもさ、一緒に来たのは別に、彼氏とかじゃないんでしょ？　だったらオレと遊ばない？　オレの方がもっと楽しい場所を案内できるよ？」"

[[dialogue]]
speaker = "リップル"
# 「楽しい場所、というのは興味がアリマスが、今日はカイチョーと一緒に遊ぶ為に来てイルので……」
line = "「楽しい場所、というのは興味がアリマスが、今日はカイチョーと一緒に遊ぶ為に来てイルので……」"

[[dialogue]]
speaker = "リップル"
# 「――あっ！　カイチョー♪　戻って来たんデスね……って、ワオ！？」
line = "「――あっ！　カイチョー♪　戻って来たんデスね……って、ワオ！？」"

[[dialogue]]
speaker = "リップル"
# 「カイチョーにお姫様抱っこされちゃいました！？　ど、どうしたんですか、カイチョー？」
line = "「カイチョーにお姫様抱っこされちゃいました！？　ど、どうしたんですか、カイチョー？」"

[[dialogue]]
speaker = "チャラい男"
# 「ちょっ！？　おい！　オレがまだその子と話している途中――」
line = "「ちょっ！？　おい！　オレがまだその子と話している途中――」"

[[dialogue]]
speaker = "unk"
# 楽しい場所には、俺が連れて行くんで！
line = "楽しい場所には、俺が連れて行くんで！"

[[dialogue]]
speaker = "リップル"
# 「それじゃあ、降りますね。よいしょっと……カイチョー、お姫様抱っこアリガトございました！　あのお兄さん、もう追っては来てないみたいですね」
line = "「それじゃあ、降りますね。よいしょっと……カイチョー、お姫様抱っこアリガトございました！　あのお兄さん、もう追っては来てないみたいですね」"

[[dialogue]]
speaker = "リップル"
# 「それにしても、お姫様抱っこで連れ去られるの、凄くテンション上がっちゃいました♪　そんなことされたのは、生まれて初めてで……」
line = "「それにしても、お姫様抱っこで連れ去られるの、凄くテンション上がっちゃいました♪　そんなことされたのは、生まれて初めてで……」"

[[dialogue]]
speaker = "リップル"
# 「って、カイチョー？　何だか怒ってマスか？」
line = "「って、カイチョー？　何だか怒ってマスか？」"

[[dialogue]]
speaker = "リップル"
# 「怒ってないケド、いい気はしない？　……ワタシが原因ナラ、謝ります。フキゲンな理由、教えてホシイです！」
line = "「怒ってないケド、いい気はしない？　……ワタシが原因ナラ、謝ります。フキゲンな理由、教えてホシイです！」"

[[dialogue]]
speaker = "リップル"
# 「――え？　ワタシがさっきのお兄さんに、無邪気な笑顔を向けていたから……デスか？」
line = "「――え？　ワタシがさっきのお兄さんに、無邪気な笑顔を向けていたから……デスか？」"

[[dialogue]]
speaker = "unk"
# それで正直……嫉妬しちゃって
line = "それで正直……嫉妬しちゃって"

[[dialogue]]
speaker = "リップル"
# 「っ……カイチョー！」
line = "「っ……カイチョー！」"

[[dialogue]]
speaker = "リップル"
# 「カイチョーが、ワタシと同じ気持ちでウレシイです！　ハグしちゃいます♪」
line = "「カイチョーが、ワタシと同じ気持ちでウレシイです！　ハグしちゃいます♪」"

[[dialogue]]
speaker = "リップル"
# 「――ハイ！　ワタシも他の子に、嫉妬しちゃってマシた……！」
line = "「――ハイ！　ワタシも他の子に、嫉妬しちゃってマシた……！」"

[[dialogue]]
speaker = "リップル"
# 「カイチョーは皆に優しくて、他の女の子達からも人気がありマスから、よく話してイマスよね？　ワタシ、最近はそれを見ると心がモヤモヤして……」
line = "「カイチョーは皆に優しくて、他の女の子達からも人気がありマスから、よく話してイマスよね？　ワタシ、最近はそれを見ると心がモヤモヤして……」"

[[dialogue]]
speaker = "リップル"
# 「星徒会の皆に相談したら……それは嫉妬ダッテ言われたんです。だから――」
line = "「星徒会の皆に相談したら……それは嫉妬ダッテ言われたんです。だから――」"

[[dialogue]]
speaker = "リップル"
# 「今日は２人きりで遊んで……１日ダケでもカイチョーを独占したかったんです」
line = "「今日は２人きりで遊んで……１日ダケでもカイチョーを独占したかったんです」"

[[dialogue]]
speaker = "unk"
# そっか、だったら――
line = "そっか、だったら――"

[[dialogue]]
speaker = "リップル"
# 「改めて、デートのお誘い……デスか？」
line = "「改めて、デートのお誘い……デスか？」"

[[dialogue]]
speaker = "リップル"
# 「ハイ♪　もちろんＯＫです！　カイチョーとデート、ＢＩＧ嬉しいです♪」
line = "「ハイ♪　もちろんＯＫです！　カイチョーとデート、ＢＩＧ嬉しいです♪」"

[[dialogue]]
speaker = "リップル"
# 「また手を繋いでも、イイですか？　エヘヘ♪　デートだと思うと、何だか急にドキドキしちゃいます……♪」
line = "「また手を繋いでも、イイですか？　エヘヘ♪　デートだと思うと、何だか急にドキドキしちゃいます……♪」"

[[dialogue]]
speaker = "リップル"
# 「カイチョー……ちゅっ<emoji=heart04>」
line = "「カイチョー……ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# あっ、頬っぺたにキス……！
line = "あっ、頬っぺたにキス……！"

[[dialogue]]
speaker = "リップル"
# 「ハイ♪　最大の親愛を示すアイサツです」
line = "「ハイ♪　最大の親愛を示すアイサツです」"

[[dialogue]]
speaker = "リップル"
# 「今日はドキドキでいっぱいの、ハッピーな初デートにしましょう♪」
line = "「今日はドキドキでいっぱいの、ハッピーな初デートにしましょう♪」"

[[dialogue]]
speaker = "unk"
# そう言ってリップルは、満開の笑顔を咲かせるのだった――
line = "そう言ってリップルは、満開の笑顔を咲かせるのだった――"
