[[dialogue]]
speaker = "unk"
# 第４話,氷雪都市レゾフ,B
line = "第４話,氷雪都市レゾフ,B"

[[dialogue]]
speaker = "unk"
# それからしばらく俺たちはＤＩＳＣの案内を元に原野を駆け抜けた。
line = "それからしばらく俺たちはＤＩＳＣの案内を元に原野を駆け抜けた。"

[[dialogue]]
speaker = "unk"
# 人っ子一人いない広大な荒野を、ひたすら全速力で飛行し続ける……。
line = "人っ子一人いない広大な荒野を、ひたすら全速力で飛行し続ける……。"

[[dialogue]]
speaker = "unk"
# 冷気は収まるどころかますます強まるばかりで、体力の限界も迎えつつあった、その時。
line = "冷気は収まるどころかますます強まるばかりで、体力の限界も迎えつつあった、その時。"

[[dialogue]]
speaker = "unk"
# ついに吹雪の向こうに──人工的な光が灯るのを見つけた。
line = "ついに吹雪の向こうに──人工的な光が灯るのを見つけた。"

[[dialogue]]
speaker = "クロト"
# 「──」
line = "「──」"

[[dialogue]]
speaker = "ユウリ"
# 「うお……」
line = "「うお……」"

[[dialogue]]
speaker = "マトイ"
# 「こ──ここが……」
line = "「こ──ここが……」"

[[dialogue]]
speaker = "サーシャ"
# 「ようこそ──魔界都市レゾフ、私たちの生まれた街へ」
line = "「ようこそ──魔界都市レゾフ、私たちの生まれた街へ」"

[[dialogue]]
speaker = "unk"
# 極寒の荒野を駆け抜けて到達した先は……
line = "極寒の荒野を駆け抜けて到達した先は……"

[[dialogue]]
speaker = "unk"
# しんしんと氷雪の降り積もる、白銀の大都市だった。
line = "しんしんと氷雪の降り積もる、白銀の大都市だった。"

[[dialogue]]
speaker = "フィオナ"
# 「これは──ソフィアから話を聞いたことはありましたが……」
line = "「これは──ソフィアから話を聞いたことはありましたが……」"

[[dialogue]]
speaker = "クロト"
# 「想像以上の景観──だな」
line = "「想像以上の景観──だな」"

[[dialogue]]
speaker = "マトイ"
# 「な、なんかいよいよ別世界に来たって感じ……！」
line = "「な、なんかいよいよ別世界に来たって感じ……！」"

[[dialogue]]
speaker = "ソフィア"
# 「こ、この氷点下……！　まさしくレゾフ──うう……帰ってきてしまいました」
line = "「こ、この氷点下……！　まさしくレゾフ──うう……帰ってきてしまいました」"

[[dialogue]]
speaker = "ソフィア"
# （それにしても、まさか皆さんをレゾフに連れてくることになるなんて……考えもしませんでしたが）
line = "（それにしても、まさか皆さんをレゾフに連れてくることになるなんて……考えもしませんでしたが）"

[[dialogue]]
speaker = "ユウリ"
# 「へぇ。ソフィアがここで育ったっつーと、なんか感慨深いよな」
line = "「へぇ。ソフィアがここで育ったっつーと、なんか感慨深いよな」"

[[dialogue]]
speaker = "unk"
# レゾフにはちらほらと人が行き交っていた。
line = "レゾフにはちらほらと人が行き交っていた。"

[[dialogue]]
speaker = "unk"
# そのほとんどが毛皮の帽子をかぶって、暖かそうなコートに身を包んでおり、この地の風土を感じさせる。
line = "そのほとんどが毛皮の帽子をかぶって、暖かそうなコートに身を包んでおり、この地の風土を感じさせる。"

[[dialogue]]
speaker = "unk"
# 突き刺すような寒さも人間界ではありえないもので……なんというか空気そのものが<b>違った</b>質なのだと思わされた。
line = "突き刺すような寒さも人間界ではありえないもので……なんというか空気そのものが<b>違った</b>質なのだと思わされた。"

[[dialogue]]
speaker = "unk"
# そこへ……
line = "そこへ……"

[[dialogue]]
speaker = "レゾフの住人"
# 「あんた達──旅人かい？　見ない風体だね」
line = "「あんた達──旅人かい？　見ない風体だね」"

[[dialogue]]
speaker = "クロト"
# 「！　はい。俺たちは人間界から来た──」
line = "「！　はい。俺たちは人間界から来た──」"

[[dialogue]]
speaker = "サーシャ"
# 「あら～こちらは久しぶりの里帰りよ、リタおばさん♪」
line = "「あら～こちらは久しぶりの里帰りよ、リタおばさん♪」"

[[dialogue]]
speaker = "レゾフの住人"
# 「ん……？　おお！　あんたはサーシャ──レイル区のサーシャじゃないかい！」
line = "「ん……？　おお！　あんたはサーシャ──レイル区のサーシャじゃないかい！」"

[[dialogue]]
speaker = "レゾフの住人"
# 「ということはこっちはもしや……ソフィア！　やっぱりソフィアだね！？」
line = "「ということはこっちはもしや……ソフィア！　やっぱりソフィアだね！？」"

[[dialogue]]
speaker = "ソフィア"
# 「あはは……お久しぶりです。急用で、一時的に帰ってきました」
line = "「あはは……お久しぶりです。急用で、一時的に帰ってきました」"

[[dialogue]]
speaker = "クロト"
# （はは……）
line = "（はは……）"

[[dialogue]]
speaker = "ユウリ"
# （なんつーか……こそばゆい感じだな。こーゆーの）
line = "（なんつーか……こそばゆい感じだな。こーゆーの）"

[[dialogue]]
speaker = "フィオナ"
# （ソフィアのあんな表情は初めて見ます。やはり<ruby=ふるさと>故郷</ruby>というのは、特別なものなのでしょう）
line = "（ソフィアのあんな表情は初めて見ます。やはり<ruby>故郷<rt>ふるさと</rt></ruby>というのは、特別なものなのでしょう）"

[[dialogue]]
speaker = "unk"
# サーシャ先輩とソフィアちゃんは、そのまましばらく女性と話し込んで……
line = "サーシャ先輩とソフィアちゃんは、そのまましばらく女性と話し込んで……"

[[dialogue]]
speaker = "unk"
# 俺たちのことについても、それとなく説明をしてくれたようだった。
line = "俺たちのことについても、それとなく説明をしてくれたようだった。"

[[dialogue]]
speaker = "unk"
# 魔界の勝手知ったる２人がいるというのは、この異郷にあってとても心強い。
line = "魔界の勝手知ったる２人がいるというのは、この異郷にあってとても心強い。"

[[dialogue]]
speaker = "リタおばさん"
# 「おっと──つい話し込んじまったかね。あたしは銭湯に向かうとするよ」
line = "「おっと──つい話し込んじまったかね。あたしは銭湯に向かうとするよ」"

[[dialogue]]
speaker = "リタおばさん"
# 「しっかし……最近はあの旅人といい、珍奇な客が多いねえ。レゾフにもいよいよ『インバウンド』ってやつがきたのかねえ。ははは……」
line = "「しっかし……最近はあの旅人といい、珍奇な客が多いねえ。レゾフにもいよいよ『インバウンド』ってやつがきたのかねえ。ははは……」"

[[dialogue]]
speaker = "unk"
# リタおばさん──とサーシャさん達が呼んだ女性が去っていく。
line = "リタおばさん──とサーシャさん達が呼んだ女性が去っていく。"

[[dialogue]]
speaker = "マトイ"
# （あの旅人……？）
line = "（あの旅人……？）"

[[dialogue]]
speaker = "クロト"
# （気にはなるが……ひとまずは自分たちのことが先決だな）
line = "（気にはなるが……ひとまずは自分たちのことが先決だな）"

[[dialogue]]
speaker = "フィオナ"
# 「ヴィーナスさんの手がかりについて、街の方々にも聞ければいいんですけど……」
line = "「ヴィーナスさんの手がかりについて、街の方々にも聞ければいいんですけど……」"

[[dialogue]]
speaker = "ユウリ"
# 「つっても……さすがにもう夜も遅いな。あんま外に人は出歩いてなさそうだぜ」
line = "「つっても……さすがにもう夜も遅いな。あんま外に人は出歩いてなさそうだぜ」"

[[dialogue]]
speaker = "ソフィア"
# 「レゾフは気候柄、夜に出歩く人は少ないですしね」
line = "「レゾフは気候柄、夜に出歩く人は少ないですしね」"

[[dialogue]]
speaker = "マトイ"
# 「だったらお家を訪ねてみるとか？　私、聞いてみるよ──！」
line = "「だったらお家を訪ねてみるとか？　私、聞いてみるよ──！」"

[[dialogue]]
speaker = "unk"
# 人一倍張り切るマトイ。
line = "人一倍張り切るマトイ。"

[[dialogue]]
speaker = "unk"
# しかし、彼女は明らかに疲れた様子で、レゾフに着いてからも絶えず身を凍えさせていた。
line = "しかし、彼女は明らかに疲れた様子で、レゾフに着いてからも絶えず身を凍えさせていた。"

[[dialogue]]
speaker = "クロト"
# 「──いや、すぐの行動はやめよう、マトイ。体を休めるのも大事なことだしな」
line = "「──いや、すぐの行動はやめよう、マトイ。体を休めるのも大事なことだしな」"

[[dialogue]]
speaker = "マトイ"
# 「あっ……」
line = "「あっ……」"

[[dialogue]]
speaker = "サーシャ"
# 「そうね。無事にここまでは着けたことだし──家まで案内しようかしら」
line = "「そうね。無事にここまでは着けたことだし──家まで案内しようかしら」"

[[dialogue]]
speaker = "ソフィア"
# 「そうですね。魔界を探索するにも拠点は必要でしょうし」
line = "「そうですね。魔界を探索するにも拠点は必要でしょうし」"

[[dialogue]]
speaker = "サーシャ"
# 「暖炉もあるし、うちでゆっくり休むといいわ。温まるわよ、マトイちゃん」
line = "「暖炉もあるし、うちでゆっくり休むといいわ。温まるわよ、マトイちゃん」"

[[dialogue]]
speaker = "マトイ"
# 「あ……ありがとうございます」
line = "「あ……ありがとうございます」"

[[dialogue]]
speaker = "クロト"
# 「今日は朝から走り回って──ネビュラとの試練も、魔獣との戦いもあった。みんな疲労が溜まってるはずだ」
line = "「今日は朝から走り回って──ネビュラとの試練も、魔獣との戦いもあった。みんな疲労が溜まってるはずだ」"

[[dialogue]]
speaker = "クロト"
# 「ここは２人の好意に甘えて……明日まで休ませてもらうとしよう」
line = "「ここは２人の好意に甘えて……明日まで休ませてもらうとしよう」"

[[dialogue]]
speaker = "ソフィア"
# 「長い一日でした……今日は本当にあちこちを回りましたね」
line = "「長い一日でした……今日は本当にあちこちを回りましたね」"

[[dialogue]]
speaker = "ユウリ"
# 「ヴィーナスを取り返すならアイツともやり合わなきゃだしな──体力を蓄えとくに越したことはねえ」
line = "「ヴィーナスを取り返すならアイツともやり合わなきゃだしな──体力を蓄えとくに越したことはねえ」"

[[dialogue]]
speaker = "フィオナ"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# ──そうして俺たちは奏姉妹のご実家まで案内された。
line = "──そうして俺たちは奏姉妹のご実家まで案内された。"

[[dialogue]]
speaker = "unk"
# 完全な異界の文化に驚きつつも、<ruby=まき>薪</ruby>をくべた昔ながらの暖炉で温まることに……。
line = "完全な異界の文化に驚きつつも、<ruby>薪<rt>まき</rt></ruby>をくべた昔ながらの暖炉で温まることに……。"

[[dialogue]]
speaker = "サーシャ"
# 「……あら。残念ねソフィア、お父さんもお母さんも留守にしてるみたい」
line = "「……あら。残念ねソフィア、お父さんもお母さんも留守にしてるみたい」"

[[dialogue]]
speaker = "ソフィア"
# 「ああ……そういえば、仕事でセントリアの方へ向かうと言ってましたね。私も姉さんもいなくてつまんないから、って」
line = "「ああ……そういえば、仕事でセントリアの方へ向かうと言ってましたね。私も姉さんもいなくてつまんないから、って」"

[[dialogue]]
speaker = "サーシャ"
# 「そんな理由？　相変わらずねえ」
line = "「そんな理由？　相変わらずねえ」"

[[dialogue]]
speaker = "unk"
# また２人のご両親は、稼業によりともども留守にしており──
line = "また２人のご両親は、稼業によりともども留守にしており──"

[[dialogue]]
speaker = "unk"
# 魔界の都市間の広さからして、戻ってくるのは当分先だろうということだった。
line = "魔界の都市間の広さからして、戻ってくるのは当分先だろうということだった。"

[[dialogue]]
speaker = "unk"
# ２人の家は、俺たち全員が泊まっても余裕なほど大きく……
line = "２人の家は、俺たち全員が泊まっても余裕なほど大きく……"

[[dialogue]]
speaker = "unk"
# その晩はレゾフ名物というお芋のスープを作ってもらい、みんなで心身ともに温まるのだった。
line = "その晩はレゾフ名物というお芋のスープを作ってもらい、みんなで心身ともに温まるのだった。"
