[[dialogue]]
speaker = "unk"
# ロストアイテムの捜索がはじまり、各自変身して、空を飛んだりしながら探していると――
line = "ロストアイテムの捜索がはじまり、各自変身して、空を飛んだりしながら探していると――"

[[dialogue]]
speaker = "サチ"
# 「大変です、お兄さん！　マトイさん！」
line = "「大変です、お兄さん！　マトイさん！」"

[[dialogue]]
speaker = "マトイ"
# 「どうしたの、サチちゃん！　もしかして、ロストアイテムを見つけた！？」
line = "「どうしたの、サチちゃん！　もしかして、ロストアイテムを見つけた！？」"

[[dialogue]]
speaker = "サチ"
# 「フィオナ会長が……記憶を奪われてしまいました！」
line = "「フィオナ会長が……記憶を奪われてしまいました！」"

[[dialogue]]
speaker = "unk"
# なんだって！？
line = "なんだって！？"

[[dialogue]]
speaker = "マトイ"
# 「それで、フィオナさんがロストアイテムに襲われたって本当なの！？」
line = "「それで、フィオナさんがロストアイテムに襲われたって本当なの！？」"

[[dialogue]]
speaker = "トマル"
# 「流星学園の屋外で倒れていたのを、私とサチさまで見つけたんです」
line = "「流星学園の屋外で倒れていたのを、私とサチさまで見つけたんです」"

[[dialogue]]
speaker = "トマル"
# 「それで記憶の状態を確かめてみたんですが……その――」
line = "「それで記憶の状態を確かめてみたんですが……その――」"

[[dialogue]]
speaker = "トマル"
# 「かなり前まで記憶が退行してしまっているみたいで……」
line = "「かなり前まで記憶が退行してしまっているみたいで……」"

[[dialogue]]
speaker = "フィオナ"
# 「あの……！　サチお姉さんはもしかして、本物の魔法少女なんですか！？」
line = "「あの……！　サチお姉さんはもしかして、本物の魔法少女なんですか！？」"

[[dialogue]]
speaker = "サチ"
# 「い、いや、フィオナ会長、違うんです。私は普通のプリマステラで……」
line = "「い、いや、フィオナ会長、違うんです。私は普通のプリマステラで……」"

[[dialogue]]
speaker = "フィオナ"
# 「あ……！　ごめんなさい。ついはしゃいじゃって……」
line = "「あ……！　ごめんなさい。ついはしゃいじゃって……」"

[[dialogue]]
speaker = "サチ"
# 「いえ、よくそれっぽいって言われてるんで……」
line = "「いえ、よくそれっぽいって言われてるんで……」"

[[dialogue]]
speaker = "フィオナ"
# 「そうですよね……魔法少女たるもの、正体を隠さないといけませんもんね！」
line = "「そうですよね……魔法少女たるもの、正体を隠さないといけませんもんね！」"

[[dialogue]]
speaker = "サチ"
# 「え？」
line = "「え？」"

[[dialogue]]
speaker = "フィオナ"
# 「大丈夫です、お姉さん。私、そういうのわかってますから！　誰にも言いません……！」
line = "「大丈夫です、お姉さん。私、そういうのわかってますから！　誰にも言いません……！」"

[[dialogue]]
speaker = "サチ"
# 「い、いやいや！　そういうことじゃなくて、私は本当に魔法少女ではないんです……！」
line = "「い、いやいや！　そういうことじゃなくて、私は本当に魔法少女ではないんです……！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「ほら、サチさんってやっぱり魔法少女に見えるんですよ！」
line = "「ほら、サチさんってやっぱり魔法少女に見えるんですよ！」"

[[dialogue]]
speaker = "フィオナ"
# 「杖がしゃべった……！　これは……！」
line = "「杖がしゃべった……！　これは……！」"

[[dialogue]]
speaker = "サチ"
# 「ちょっとトレジアンナさん！　今喋り出したら、ややこしくなるでしょ！？」
line = "「ちょっとトレジアンナさん！　今喋り出したら、ややこしくなるでしょ！？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「フィオナさん、ちなみに魔法少女名は、トレジャー☆サチって言うんですよ～♪」
line = "「フィオナさん、ちなみに魔法少女名は、トレジャー☆サチって言うんですよ～♪」"

[[dialogue]]
speaker = "サチ"
# 「なにを開き直ってるんですか、この杖はぁぁぁ！？」
line = "「なにを開き直ってるんですか、この杖はぁぁぁ！？」"

[[dialogue]]
speaker = "フィオナ"
# 「わあぁ……！　魔法少女……本当に存在したんですね……！」
line = "「わあぁ……！　魔法少女……本当に存在したんですね……！」"

[[dialogue]]
speaker = "サチ"
# 「ほらぁ！　信じちゃってる！　どうするんですか、これ！？」
line = "「ほらぁ！　信じちゃってる！　どうするんですか、これ！？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「てへぺろ☆」
line = "「てへぺろ☆」"

[[dialogue]]
speaker = "マトイ"
# 「フィオナさん、なんか魔法少女にすごい食いついてるんだけど……」
line = "「フィオナさん、なんか魔法少女にすごい食いついてるんだけど……」"

[[dialogue]]
speaker = "unk"
# 瞳が子供みたいにキラキラしてるな……
line = "瞳が子供みたいにキラキラしてるな……"

[[dialogue]]
speaker = "フィオナ"
# 「それから、そっちのプリムラお姉さんも！」
line = "「それから、そっちのプリムラお姉さんも！」"

[[dialogue]]
speaker = "プリムラ"
# 「な、なんじゃ？　我はサチと違って、本当に魔法少女ではないぞ？　我は悪の終末兵器で……」
line = "「な、なんじゃ？　我はサチと違って、本当に魔法少女ではないぞ？　我は悪の終末兵器で……」"

[[dialogue]]
speaker = "フィオナ"
# 「わかってます！　お姉さんはそういうパターンですよね！」
line = "「わかってます！　お姉さんはそういうパターンですよね！」"

[[dialogue]]
speaker = "プリムラ"
# 「そ、そういうパターン……？」
line = "「そ、そういうパターン……？」"

[[dialogue]]
speaker = "フィオナ"
# 「主人公の魔法少女と対になる、ライバルポジション！　黒い衣装を着て、魔法少女とは名乗らないし、設定としても違う……ですが！」
line = "「主人公の魔法少女と対になる、ライバルポジション！　黒い衣装を着て、魔法少女とは名乗らないし、設定としても違う……ですが！」"

[[dialogue]]
speaker = "フィオナ"
# 「その行動をもって、次第に周囲から主人公と同じ魔法少女として認められていき、最後には自分ではなく、他の人達から呼ばれるようになるんです！」
line = "「その行動をもって、次第に周囲から主人公と同じ魔法少女として認められていき、最後には自分ではなく、他の人達から呼ばれるようになるんです！」"

[[dialogue]]
speaker = "フィオナ"
# 「漆黒の魔法少女、プリムラ†ノワールと！」
line = "「漆黒の魔法少女、プリムラ†ノワールと！」"

[[dialogue]]
speaker = "フィオナ"
# 「あ、ちなみに下の名前と、冠名の間に入っているのは、『ダガー』って十字記号のイメージです！　本当は名前の前に冠名を入れたいところですが……」
line = "「あ、ちなみに下の名前と、冠名の間に入っているのは、『ダガー』って十字記号のイメージです！　本当は名前の前に冠名を入れたいところですが……」"

[[dialogue]]
speaker = "フィオナ"
# 「語呂が悪いのと、トレジャー☆サチの対という存在であることから、あえて名前の後に冠名を入れてみました！」
line = "「語呂が悪いのと、トレジャー☆サチの対という存在であることから、あえて名前の後に冠名を入れてみました！」"

[[dialogue]]
speaker = "プリムラ"
# 「はあぁぁぁっ！？　プリムラ†ノワールじゃと！？　貴様！　ふっ――」
line = "「はあぁぁぁっ！？　プリムラ†ノワールじゃと！？　貴様！　ふっ――」"

[[dialogue]]
speaker = "プリムラ"
# 「フフフ……！　悪くないのじゃ……次からそう名乗ってやらんこともないぞ？」
line = "「フフフ……！　悪くないのじゃ……次からそう名乗ってやらんこともないぞ？」"

[[dialogue]]
speaker = "サチ"
# 「気に入ってるーーーーーーっ！！？」
line = "「気に入ってるーーーーーーっ！！？」"

[[dialogue]]
speaker = "フィオナ"
# 「採用してくれるんですか！？　やりました！　私が本物の魔法少女の名づけ親に……！」
line = "「採用してくれるんですか！？　やりました！　私が本物の魔法少女の名づけ親に……！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「おおぉっ！？　私が勧誘しても拒否られていたのに、新たな魔法少女がついに……！」
line = "「おおぉっ！？　私が勧誘しても拒否られていたのに、新たな魔法少女がついに……！」"

[[dialogue]]
speaker = "サチ"
# 「いやいやいやいやいや！　プリムラが横で名乗りはじめたら、私も同じ魔法少女に見られちゃうんだけど！？」
line = "「いやいやいやいやいや！　プリムラが横で名乗りはじめたら、私も同じ魔法少女に見られちゃうんだけど！？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「大丈夫ですよ。そんな嫉妬なんてせずとも、トレジャー☆サチが主役の魔法少女であることは変わりませんから」
line = "「大丈夫ですよ。そんな嫉妬なんてせずとも、トレジャー☆サチが主役の魔法少女であることは変わりませんから」"

[[dialogue]]
speaker = "プリムラ"
# 「そうじゃぞ、トレジャー☆サチ。プリムラ†ノワールはいずれ貴様を倒す悪の魔法少女なのじゃからな！」
line = "「そうじゃぞ、トレジャー☆サチ。プリムラ†ノワールはいずれ貴様を倒す悪の魔法少女なのじゃからな！」"

[[dialogue]]
speaker = "フィオナ"
# 「私はトレジャー☆サチも、王道でいい魔法少女名だと思います！」
line = "「私はトレジャー☆サチも、王道でいい魔法少女名だと思います！」"

[[dialogue]]
speaker = "サチ"
# 「とりあえず全員、トレジャー付けるのやめてくれる！？」
line = "「とりあえず全員、トレジャー付けるのやめてくれる！？」"

[[dialogue]]
speaker = "フィオナ"
# 「はっ……！」
line = "「はっ……！」"

[[dialogue]]
speaker = "フィオナ"
# 「そうか、魔法少女が実在するということは――」
line = "「そうか、魔法少女が実在するということは――」"

[[dialogue]]
speaker = "フィオナ"
# 「もしかして、特撮ヒーローも実在するのでは……！？」
line = "「もしかして、特撮ヒーローも実在するのでは……！？」"

[[dialogue]]
speaker = "マトイ"
# 「と、とりあえず……」
line = "「と、とりあえず……」"

[[dialogue]]
speaker = "マトイ"
# 「フィオナさんの記憶が戻っても、今日のことは触れない方がよさそうだね……」
line = "「フィオナさんの記憶が戻っても、今日のことは触れない方がよさそうだね……」"

[[dialogue]]
speaker = "unk"
# うん、忘れることにしよう……
line = "うん、忘れることにしよう……"

[[dialogue]]
speaker = "unk"
# マトイと２人、密かにそう誓うのだった。
line = "マトイと２人、密かにそう誓うのだった。"
