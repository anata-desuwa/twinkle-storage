[[dialogue]]
speaker = "unk"
# 第４話,チナの想い,P
line = "第４話,チナの想い,P"

[[dialogue]]
speaker = "unk"
# ここ最近、チナと一緒にお昼を食べることが多くなっていた。
line = "ここ最近、チナと一緒にお昼を食べることが多くなっていた。"

[[dialogue]]
speaker = "チナ"
# 「ったく、またあんたか……アタシが飯食ってるとこ見て何かいいことあるのかよ？」
line = "「ったく、またあんたか……アタシが飯食ってるとこ見て何かいいことあるのかよ？」"

[[dialogue]]
speaker = "unk"
# 俺的にはいいことあるよ
line = "俺的にはいいことあるよ"

[[dialogue]]
speaker = "チナ"
# 「え、マジで……？　何かの特殊性癖か……？」
line = "「え、マジで……？　何かの特殊性癖か……？」"

[[dialogue]]
speaker = "チナ"
# 「いや、深く考えるのはやめとこう。なんか妙な気分になりそうだ」
line = "「いや、深く考えるのはやめとこう。なんか妙な気分になりそうだ」"

[[dialogue]]
speaker = "チナ"
# 「なぁ……今日の放課後だけどさ、２人きりになれるとこ、ないか？」
line = "「なぁ……今日の放課後だけどさ、２人きりになれるとこ、ないか？」"

[[dialogue]]
speaker = "unk"
# ２人きりになれる場所──ということで放課後、星徒会室に来てもらった。
line = "２人きりになれる場所──ということで放課後、星徒会室に来てもらった。"

[[dialogue]]
speaker = "チナ"
# 「星徒会室か……確かに２人きりになるにはちょうどいいか」
line = "「星徒会室か……確かに２人きりになるにはちょうどいいか」"

[[dialogue]]
speaker = "チナ"
# 「単刀直入に言う。あんたに話がある」
line = "「単刀直入に言う。あんたに話がある」"

[[dialogue]]
speaker = "チナ"
# 「悪かった。謝るよ」
line = "「悪かった。謝るよ」"

[[dialogue]]
speaker = "unk"
# 俺の前で深々と頭を下げるチナ。
line = "俺の前で深々と頭を下げるチナ。"

[[dialogue]]
speaker = "unk"
# 数十秒か、それ以上か、しばらくその姿勢を続け、ようやく顔を上げる。
line = "数十秒か、それ以上か、しばらくその姿勢を続け、ようやく顔を上げる。"

[[dialogue]]
speaker = "チナ"
# 「アタシはあんたを家族の仇だと思ってた」
line = "「アタシはあんたを家族の仇だと思ってた」"

[[dialogue]]
speaker = "チナ"
# 「魔王がデネブを裏切ってアルタイルに逃げたって聞いて、あんたのせいでデネブがぐちゃぐちゃになったと思っていた」
line = "「魔王がデネブを裏切ってアルタイルに逃げたって聞いて、あんたのせいでデネブがぐちゃぐちゃになったと思っていた」"

[[dialogue]]
speaker = "チナ"
# 「あんたがデネブを裏切らなければ、アタシの家族は今も生きていると、そう思っていた」
line = "「あんたがデネブを裏切らなければ、アタシの家族は今も生きていると、そう思っていた」"

[[dialogue]]
speaker = "チナ"
# 「……だけど、そうじゃないんだな」
line = "「……だけど、そうじゃないんだな」"

[[dialogue]]
speaker = "チナ"
# 「あんたと戦って、ここしばらく一緒にいて、あんたがデネブを裏切ったわけじゃないってことはわかった」
line = "「あんたと戦って、ここしばらく一緒にいて、あんたがデネブを裏切ったわけじゃないってことはわかった」"

[[dialogue]]
speaker = "チナ"
# 「もしもどこかにデネブを裏切った魔王がいたとしても、アルタイルのあんたは別人だ。あんたはアルタイルを守ろうとする、１人の星騎士だった」
line = "「もしもどこかにデネブを裏切った魔王がいたとしても、アルタイルのあんたは別人だ。あんたはアルタイルを守ろうとする、１人の星騎士だった」"

[[dialogue]]
speaker = "チナ"
# 「破滅の化身とか、お前が世界を滅ぼすとか、いろいろ言って悪かった」
line = "「破滅の化身とか、お前が世界を滅ぼすとか、いろいろ言って悪かった」"

[[dialogue]]
speaker = "チナ"
# 「魔王だから、悪者扱いには慣れてる……？　いや慣れちゃダメだろ。アタシが言うのもなんだけど」
line = "「魔王だから、悪者扱いには慣れてる……？　いや慣れちゃダメだろ。アタシが言うのもなんだけど」"

[[dialogue]]
speaker = "unk"
# 気にしてくれてありがとう
line = "気にしてくれてありがとう"

[[dialogue]]
speaker = "チナ"
# 「ベアトは言っていた。ルヴィは新しい女神で、リクリエを起こそうとしているって」
line = "「ベアトは言っていた。ルヴィは新しい女神で、リクリエを起こそうとしているって」"

[[dialogue]]
speaker = "チナ"
# 「創造神とか、新しい女神とか、そんなこと言われたってそう簡単に信じられない。ルヴィがアタシたちを騙していたなんて、思いたくない」
line = "「創造神とか、新しい女神とか、そんなこと言われたってそう簡単に信じられない。ルヴィがアタシたちを騙していたなんて、思いたくない」"

[[dialogue]]
speaker = "チナ"
# 「だけど……アタシは信じたくないだけかもしれない」
line = "「だけど……アタシは信じたくないだけかもしれない」"

[[dialogue]]
speaker = "チナ"
# 「ルヴィは仲間なんだって、まだ信じていたいのかもしれない」
line = "「ルヴィは仲間なんだって、まだ信じていたいのかもしれない」"

[[dialogue]]
speaker = "unk"
# 極星学園の星徒会長・ルヴィネ。
line = "極星学園の星徒会長・ルヴィネ。"

[[dialogue]]
speaker = "unk"
# 彼女は女神テルルに代わる新しい女神であり、創造神『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』に従ってリクリエを起こそうとしている。
line = "彼女は女神テルルに代わる新しい女神であり、創造神『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』に従ってリクリエを起こそうとしている。"

[[dialogue]]
speaker = "unk"
# だけどルヴィネはモンスターからデネブを守ったり、アルバイトをしたりと、その目的とは矛盾する行動も取っていた。
line = "だけどルヴィネはモンスターからデネブを守ったり、アルバイトをしたりと、その目的とは矛盾する行動も取っていた。"

[[dialogue]]
speaker = "チナ"
# 「だけど決めたんだ。何があろうと、アタシはデネブを守るために戦う」
line = "「だけど決めたんだ。何があろうと、アタシはデネブを守るために戦う」"

[[dialogue]]
speaker = "チナ"
# 「デネブを守るためなら誰とでも戦う。アルタイルとも、ルヴィともだ」
line = "「デネブを守るためなら誰とでも戦う。アルタイルとも、ルヴィともだ」"

[[dialogue]]
speaker = "チナ"
# 「もちろん戦わなくて済むならそれでいい。アタシだって好き好んでアルタイルを破壊したいわけじゃない」
line = "「もちろん戦わなくて済むならそれでいい。アタシだって好き好んでアルタイルを破壊したいわけじゃない」"

[[dialogue]]
speaker = "unk"
# ああ、わかってるよ
line = "ああ、わかってるよ"

[[dialogue]]
speaker = "チナ"
# 「あんたは、デネブとアルタイル、どちらも救うと言った」
line = "「あんたは、デネブとアルタイル、どちらも救うと言った」"

[[dialogue]]
speaker = "チナ"
# 「本当に可能なら、アタシも両方の世界を守りたい。……結局あんたと同じこと言うのは癪だけどな」
line = "「本当に可能なら、アタシも両方の世界を守りたい。……結局あんたと同じこと言うのは癪だけどな」"

[[dialogue]]
speaker = "チナ"
# 「あんたにはこの気持ちを聞いてほしかったんだ」
line = "「あんたにはこの気持ちを聞いてほしかったんだ」"

[[dialogue]]
speaker = "チナ"
# 「今日２人きりになりたいって言ったのはこのためだ。聞いてくれて、ありがとう」
line = "「今日２人きりになりたいって言ったのはこのためだ。聞いてくれて、ありがとう」"

[[dialogue]]
speaker = "チナ"
# 「ん？　どうした魔王？　ちょっと安心したような、がっかりしたような顔して」
line = "「ん？　どうした魔王？　ちょっと安心したような、がっかりしたような顔して」"

[[dialogue]]
speaker = "unk"
# ２人きりだからてっきり告白かと思って
line = "２人きりだからてっきり告白かと思って"

[[dialogue]]
speaker = "チナ"
# 「は……？　こくはく……？」
line = "「は……？　こくはく……？」"

[[dialogue]]
speaker = "チナ"
# 「はあっ！？　そんなわけないだろ、この色ボケ魔王！　こっちは真剣なんだぞ！」
line = "「はあっ！？　そんなわけないだろ、この色ボケ魔王！　こっちは真剣なんだぞ！」"

[[dialogue]]
speaker = "チナ"
# 「そもそも、アタシから告白されたって嬉しいのかよ？」
line = "「そもそも、アタシから告白されたって嬉しいのかよ？」"

[[dialogue]]
speaker = "unk"
# すごく嬉しいよ
line = "すごく嬉しいよ"

[[dialogue]]
speaker = "チナ"
# 「はぁあああっ！？　何言ってんだバカ！！」
line = "「はぁあああっ！？　何言ってんだバカ！！」"

[[dialogue]]
speaker = "チナ"
# 「ったく、からかうなっての……アタシのどこがいいんだか」
line = "「ったく、からかうなっての……アタシのどこがいいんだか」"

[[dialogue]]
speaker = "チナ"
# 「ああ、あともうひとつ、言うの忘れてた」
line = "「ああ、あともうひとつ、言うの忘れてた」"

[[dialogue]]
speaker = "チナ"
# 「あんたと教皇庁で戦った時、アタシを助けてくれたよな。あんたが止めてくれなかったらアタシは死んでいた」
line = "「あんたと教皇庁で戦った時、アタシを助けてくれたよな。あんたが止めてくれなかったらアタシは死んでいた」"

[[dialogue]]
speaker = "チナ"
# 「あの時は、アルタイルを滅ぼせれば、アタシは死んでもよかった。だけど今生きていて、まだやるべきことがあると思っている」
line = "「あの時は、アルタイルを滅ぼせれば、アタシは死んでもよかった。だけど今生きていて、まだやるべきことがあると思っている」"

[[dialogue]]
speaker = "チナ"
# 「だから本当に……ありがとな！」
line = "「だから本当に……ありがとな！」"
