[[dialogue]]
speaker = "ヘレナ"
# 「ああ、そうだ。これを見せるために貴殿を呼んだのだ。私がデザインを手がけてきたアパレルブランド『ヘレナ』のことは知っているな？」
line = "「ああ、そうだ。これを見せるために貴殿を呼んだのだ。私がデザインを手がけてきたアパレルブランド『ヘレナ』のことは知っているな？」"

[[dialogue]]
speaker = "ヘレナ"
# 「<ruby=へい>弊</ruby>ブランド『ヘレナ』はこれまで若い女子を客層にファッションを提供してきた。だが、ここらで新機軸を打ち出してみるのもアリかと思ってな」
line = "「<ruby>弊<rt>へい</rt></ruby>ブランド『ヘレナ』はこれまで若い女子を客層にファッションを提供してきた。だが、ここらで新機軸を打ち出してみるのもアリかと思ってな」"

[[dialogue]]
