[[dialogue]]
speaker = "unk"
# 第２話,守護天使の集い？,P
line = "第２話,守護天使の集い？,P"

[[dialogue]]
speaker = "パテル"
# 「へー、ほーん……あんな感じかー」
line = "「へー、ほーん……あんな感じかー」"

[[dialogue]]
speaker = "unk"
# こんなところで何してるんだ？
line = "こんなところで何してるんだ？"

[[dialogue]]
speaker = "パテル"
# 「しっ。ほらあれ見て」
line = "「しっ。ほらあれ見て」"

[[dialogue]]
speaker = "マグダレナ"
# 「ティッシュどうぞ～」
line = "「ティッシュどうぞ～」"

[[dialogue]]
speaker = "アルモタヘル"
# 「遠慮せず受け取るがいい」
line = "「遠慮せず受け取るがいい」"

[[dialogue]]
speaker = "パテル"
# 「プッ、フフッ……守護天使がホントにバイトしてる～！」
line = "「プッ、フフッ……守護天使がホントにバイトしてる～！」"

[[dialogue]]
speaker = "unk"
# そんなにおかしい？
line = "そんなにおかしい？"

[[dialogue]]
speaker = "パテル"
# 「だって守護天使がだよ？　女神様と一緒に世界を管理する大いなる存在が……ププッ、フフッ、ティッシュ配りとか……アハハッ」
line = "「だって守護天使がだよ？　女神様と一緒に世界を管理する大いなる存在が……ププッ、フフッ、ティッシュ配りとか……アハハッ」"

[[dialogue]]
speaker = "パテル"
# 「いや～、このおかしさは同じ守護天使にしかわかんないかなぁ～。例えるなら、船釣りに豪華客船を出してくるみたいな？　それぐらいアンバランスなんだよ」
line = "「いや～、このおかしさは同じ守護天使にしかわかんないかなぁ～。例えるなら、船釣りに豪華客船を出してくるみたいな？　それぐらいアンバランスなんだよ」"

[[dialogue]]
speaker = "パテル"
# 「マグダレナが司る摂理は『領域』。三界を隔て、空間の調和を保つ者」
line = "「マグダレナが司る摂理は『領域』。三界を隔て、空間の調和を保つ者」"

[[dialogue]]
speaker = "パテル"
# 「アルモタヘルは『種族』。天使、人間、魔族の三種族を含め、あらゆる生き物の系譜を管理する者」
line = "「アルモタヘルは『種族』。天使、人間、魔族の三種族を含め、あらゆる生き物の系譜を管理する者」"

[[dialogue]]
speaker = "パテル"
# 「それに比べるとティッシュ配りはねー……やることちっちゃすぎるって言うか。プププッ」
line = "「それに比べるとティッシュ配りはねー……やることちっちゃすぎるって言うか。プププッ」"

[[dialogue]]
speaker = "unk"
# パテルの摂理は『淘汰』だったっけ？
line = "パテルの摂理は『淘汰』だったっけ？"

[[dialogue]]
speaker = "パテル"
# 「そう、『淘汰』。環境に適応できない者が死ぬことだけど……まぁ世界の整理とでも言うべきかもね」
line = "「そう、『淘汰』。環境に適応できない者が死ぬことだけど……まぁ世界の整理とでも言うべきかもね」"

[[dialogue]]
speaker = "パテル"
# 「世界のリソースは有限だ。もしすべての命が“不死”であれば、生命体が必要とするリソースは際限なく増え続けてしまう」
line = "「世界のリソースは有限だ。もしすべての命が“不死”であれば、生命体が必要とするリソースは際限なく増え続けてしまう」"

[[dialogue]]
speaker = "パテル"
# 「考えてもみてよ。親が子を作って、その子が親になって、またその子も親になっていったら……食料に、空気に、あと土地とか。どれだけ必要になるのって話だよ」
line = "「考えてもみてよ。親が子を作って、その子が親になって、またその子も親になっていったら……食料に、空気に、あと土地とか。どれだけ必要になるのって話だよ」"

[[dialogue]]
speaker = "パテル"
# 「だから適度に減らす必要があるんだよ。これから生まれるもののためにもね」
line = "「だから適度に減らす必要があるんだよ。これから生まれるもののためにもね」"

[[dialogue]]
speaker = "パテル"
# 「他には『流転』とか、『蓄積』とか、『普遍』の摂理があるけど……あ、噂をすれば」
line = "「他には『流転』とか、『蓄積』とか、『普遍』の摂理があるけど……あ、噂をすれば」"

[[dialogue]]
speaker = "セシア"
# 「ママ～～<emoji=heart04>」
line = "「ママ～～<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ"
# 「あ……セシア、来ていたのですね」
line = "「あ……セシア、来ていたのですね」"

[[dialogue]]
speaker = "セシア"
# 「ママダレナが働いてるって聞いたから来ちゃった<emoji=heart04>　ママ、お仕事お疲れ様<emoji=heart04>」
line = "「ママダレナが働いてるって聞いたから来ちゃった<emoji=heart04>　ママ、お仕事お疲れ様<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ"
# 「ありがとうございます。もう少しで終わるので待っていてください」
line = "「ありがとうございます。もう少しで終わるので待っていてください」"

[[dialogue]]
speaker = "セシア"
# 「は～い<emoji=heart04>」
line = "「は～い<emoji=heart04>」"

[[dialogue]]
speaker = "パテル"
# 「あれが今のアウクセシアか……ちっちゃくなったけど変わらないなぁ」
line = "「あれが今のアウクセシアか……ちっちゃくなったけど変わらないなぁ」"

[[dialogue]]
speaker = "パテル"
# 「あれじゃお母さんのパート先に来る娘だよ。でも見た目は子どもになったから、アウクセシアよりはまだマシ……いやあれはちょっと……」
line = "「あれじゃお母さんのパート先に来る娘だよ。でも見た目は子どもになったから、アウクセシアよりはまだマシ……いやあれはちょっと……」"

[[dialogue]]
speaker = "パテル"
# 「そもそもアウクセシアのママは、あたしたちを生み出した女神様でしょ……」
line = "「そもそもアウクセシアのママは、あたしたちを生み出した女神様でしょ……」"

[[dialogue]]
speaker = "パテル"
# 「それにしてもさー……どうしてあいつらあんなにボインなの！？」
line = "「それにしてもさー……どうしてあいつらあんなにボインなの！？」"

[[dialogue]]
speaker = "パテル"
# 「マグダレナは言わずもがな。アルモタヘルもラクシャもおっきいし、アウクセシアも元はスタイル良かったし……キュートさは一番だからバランスは取れてるかもだけど～──」
line = "「マグダレナは言わずもがな。アルモタヘルもラクシャもおっきいし、アウクセシアも元はスタイル良かったし……キュートさは一番だからバランスは取れてるかもだけど～──」"

[[dialogue]]
speaker = "パテル"
# 「あっ、ヤバ、こっち来た！　あたし隠れるからごまかしといて！」
line = "「あっ、ヤバ、こっち来た！　あたし隠れるからごまかしといて！」"

[[dialogue]]
speaker = "アルモタヘル"
# 「今、馴染みのある気配を感じたのだが……人の子よ、知らないか？」
line = "「今、馴染みのある気配を感じたのだが……人の子よ、知らないか？」"

[[dialogue]]
speaker = "unk"
# し、知りませんね……
line = "し、知りませんね……"

[[dialogue]]
speaker = "アルモタヘル"
# 「目が泳いでいるぞ。先日の話は聞いている。どうせパテルだろう」
line = "「目が泳いでいるぞ。先日の話は聞いている。どうせパテルだろう」"

[[dialogue]]
speaker = "アルモタヘル"
# 「まったく、肉体を得たのなら素直に姿を現せばよいものを。相変わらず気まぐれなやつだ」
line = "「まったく、肉体を得たのなら素直に姿を現せばよいものを。相変わらず気まぐれなやつだ」"

[[dialogue]]
speaker = "セシア"
# 「パテルってどんな守護天使なのかしら？　転生したからよくわからないわ。覚えていないということは、ママではないということは確かなのだけど」
line = "「パテルってどんな守護天使なのかしら？　転生したからよくわからないわ。覚えていないということは、ママではないということは確かなのだけど」"

[[dialogue]]
speaker = "マグダレナ"
# 「そうですね……彼女は『淘汰』を司る守護天使で、この世界の死神と称することもできます」
line = "「そうですね……彼女は『淘汰』を司る守護天使で、この世界の死神と称することもできます」"

[[dialogue]]
speaker = "マグダレナ"
# 「ですが性格は死神らしくはなく、イタズラ好きで、落ち着きがなくて……やんちゃな子どものような雰囲気でしょうか」
line = "「ですが性格は死神らしくはなく、イタズラ好きで、落ち着きがなくて……やんちゃな子どものような雰囲気でしょうか」"

[[dialogue]]
speaker = "アルモタヘル"
# 「ううむ、表現に窮するな。マグダレナの言葉は間違いではないが、完全とも言いづらい。生意気であることは間違いないが」
line = "「ううむ、表現に窮するな。マグダレナの言葉は間違いではないが、完全とも言いづらい。生意気であることは間違いないが」"

[[dialogue]]
speaker = "マグダレナ"
# 「パテルは我々他の守護天使とも距離を置いている節がありますから。リクリエに対するスタンスも違いますし……」
line = "「パテルは我々他の守護天使とも距離を置いている節がありますから。リクリエに対するスタンスも違いますし……」"

[[dialogue]]
speaker = "セシア"
# 「……直接会ってみないとわからなさそうね。楽しみにしておくわ」
line = "「……直接会ってみないとわからなさそうね。楽しみにしておくわ」"

[[dialogue]]
speaker = "マグダレナ"
# 「あぁ、そろそろ仕事に戻らなければ。またお会いしましょう、会長さま」
line = "「あぁ、そろそろ仕事に戻らなければ。またお会いしましょう、会長さま」"

[[dialogue]]
speaker = "パテル"
# 「ふー、ようやく行ったかぁ。んもー、本人がいないからって好き勝手言ってくれちゃってさ。あたしはこんなにかわいくてフレンドリーなのに。ねー？」
line = "「ふー、ようやく行ったかぁ。んもー、本人がいないからって好き勝手言ってくれちゃってさ。あたしはこんなにかわいくてフレンドリーなのに。ねー？」"

[[dialogue]]
speaker = "パテル"
# 「──あ」
line = "「──あ」"

[[dialogue]]
speaker = "フラン"
# 「秋葉原カレー大食い選手権か……勝ちはオレが頂くぜ！」
line = "「秋葉原カレー大食い選手権か……勝ちはオレが頂くぜ！」"

[[dialogue]]
speaker = "グロリア"
# 「応援しています。でも無理はしないでくださいね？」
line = "「応援しています。でも無理はしないでくださいね？」"

[[dialogue]]
speaker = "フラン"
# 「わかってるって。そうだ、賞品の割引チケット、グロリアにやるよ。カレー好きだろ？」
line = "「わかってるって。そうだ、賞品の割引チケット、グロリアにやるよ。カレー好きだろ？」"

[[dialogue]]
speaker = "グロリア"
# 「いいんですか？　ふふ、ありがとうございます」
line = "「いいんですか？　ふふ、ありがとうございます」"

[[dialogue]]
speaker = "パテル"
# 「へ～、グロリアってカレー好きなんだ。フランは変わらないなー」
line = "「へ～、グロリアってカレー好きなんだ。フランは変わらないなー」"

[[dialogue]]
speaker = "unk"
# 声をかけなくていいのか？
line = "声をかけなくていいのか？"

[[dialogue]]
speaker = "パテル"
# 「あー……いいよ。あたしのことも知らせなくていいから。死神なんて、積極的に関わるものじゃないしね」
line = "「あー……いいよ。あたしのことも知らせなくていいから。死神なんて、積極的に関わるものじゃないしね」"

[[dialogue]]
speaker = "パテル"
# 「ほら、どこか遊びに行こ。マグダレナたちにもグロリアたちにも会わないように、ちょっと遠いところがいいな」
line = "「ほら、どこか遊びに行こ。マグダレナたちにもグロリアたちにも会わないように、ちょっと遠いところがいいな」"
