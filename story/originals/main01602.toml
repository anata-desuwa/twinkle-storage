[[dialogue]]
speaker = "unk"
# 第２話,頂,B
line = "第２話,頂,B"

[[dialogue]]
speaker = "unk"
# そして俺たちは──続く階層も駆け抜けた。
line = "そして俺たちは──続く階層も駆け抜けた。"

[[dialogue]]
speaker = "unk"
# かつて煌竜と戦った第三階層も、続く第四階層も……
line = "かつて煌竜と戦った第三階層も、続く第四階層も……"

[[dialogue]]
speaker = "unk"
# かつてセイファート学園長が踏破したという道のりをなぞるようにして。時おり強引に壁を突破して。
line = "かつてセイファート学園長が踏破したという道のりをなぞるようにして。時おり強引に壁を突破して。"

[[dialogue]]
speaker = "unk"
# フィーニスの塔を駆け上がっていった。
line = "フィーニスの塔を駆け上がっていった。"

[[dialogue]]
speaker = "unk"
# そして……
line = "そして……"

[[dialogue]]
speaker = "unk"
# 一陣の夜風が吹き抜ける。
line = "一陣の夜風が吹き抜ける。"

[[dialogue]]
speaker = "unk"
# 昇りつめた先に待っていたのは、楕円に広がる空の庭園だった。
line = "昇りつめた先に待っていたのは、楕円に広がる空の庭園だった。"

[[dialogue]]
speaker = "unk"
# <ruby=じゃくまく>寂寞</ruby>たる夜の<ruby=とばり>帳</ruby>の下で、俺たちの到達を祝うように聖なる光が灯っている。
line = "<ruby>寂寞<rt>じゃくまく</rt></ruby>たる夜の<ruby>帳<rt>とばり</rt></ruby>の下で、俺たちの到達を祝うように聖なる光が灯っている。"

[[dialogue]]
speaker = "アナ"
# 「ここが……」
line = "「ここが……」"

[[dialogue]]
speaker = "ソフィア"
# 「フィーニスの塔の──頂上……」
line = "「フィーニスの塔の──頂上……」"

[[dialogue]]
speaker = "unk"
# そして──少女はその地で待っていた。
line = "そして──少女はその地で待っていた。"

[[dialogue]]
speaker = "unk"
# 表情は半分しか見えない。だが、俺たちを見ても眉ひとつ動いていないのはわかった。
line = "表情は半分しか見えない。だが、俺たちを見ても眉ひとつ動いていないのはわかった。"

[[dialogue]]
speaker = "フィオナ"
# 「……姉さん。こちらを向いてください」
line = "「……姉さん。こちらを向いてください」"

[[dialogue]]
speaker = "アポロ"
# 「……？　おかしいな……小バエはさっき、地上へ落としたはずだが……」
line = "「……？　おかしいな……小バエはさっき、地上へ落としたはずだが……」"

[[dialogue]]
speaker = "フィオナ"
# 「泥臭く昇ってきました。伝えたいことは変わりません」
line = "「泥臭く昇ってきました。伝えたいことは変わりません」"

[[dialogue]]
speaker = "アポロ"
# 「諦めの悪いれんちゅうだ」
line = "「諦めの悪いれんちゅうだ」"

[[dialogue]]
speaker = "アポロ"
# 「だが……どうしてこの状況で星術が使える？」
line = "「だが……どうしてこの状況で星術が使える？」"

[[dialogue]]
speaker = "クロト"
# 「少々、ズルさせてもらってな」
line = "「少々、ズルさせてもらってな」"

[[dialogue]]
speaker = "リノ"
# 「人の子には──人の子なりの知恵があるのよ。使徒さん」
line = "「人の子には──人の子なりの知恵があるのよ。使徒さん」"

[[dialogue]]
speaker = "unk"
# 辺り一帯へ展開させる魔具──星骸布。
line = "辺り一帯へ展開させる魔具──星骸布。"

[[dialogue]]
speaker = "unk"
# 魔界の星空をリンクさせることで、俺たちは一時的にでも星騎士として復活する。
line = "魔界の星空をリンクさせることで、俺たちは一時的にでも星騎士として復活する。"

[[dialogue]]
speaker = "クロト"
# 「これでもう、俺たちに天蓋は通じない。今度こそ真っ向から向き合ってもらう」
line = "「これでもう、俺たちに天蓋は通じない。今度こそ真っ向から向き合ってもらう」"

[[dialogue]]
speaker = "アポロ"
# 「布……？　ふん。悪党はいつも妙な武器ばかり使う」
line = "「布……？　ふん。悪党はいつも妙な武器ばかり使う」"

[[dialogue]]
speaker = "unk"
# 本来、星骸布は制限時間つきのアイテムだが──それを告げる必要はない。速やかに決着をつける。
line = "本来、星骸布は制限時間つきのアイテムだが──それを告げる必要はない。速やかに決着をつける。"

[[dialogue]]
speaker = "クロト"
# 「この流れ星の雨……君の仕業か？」
line = "「この流れ星の雨……君の仕業か？」"

[[dialogue]]
speaker = "アポロ"
# 「もちろんだ」
line = "「もちろんだ」"

[[dialogue]]
speaker = "アポロ"
# 「今はしぶとく防がれてるが……問題ない。大昔のキョーリューだって、たった一発の隕石で滅んだんだからな」
line = "「今はしぶとく防がれてるが……問題ない。大昔のキョーリューだって、たった一発の隕石で滅んだんだからな」"

[[dialogue]]
speaker = "アポロ"
# 「この流星群で……オマエたち全員終わらせてやる……！」
line = "「この流星群で……オマエたち全員終わらせてやる……！」"

[[dialogue]]
speaker = "フィオナ"
# 「……なるほど。ですが、姉さん」
line = "「……なるほど。ですが、姉さん」"

[[dialogue]]
speaker = "フィオナ"
# 「それは本当に──ヒーローの行いと言えるでしょうか？」
line = "「それは本当に──ヒーローの行いと言えるでしょうか？」"

[[dialogue]]
speaker = "アポロ"
# 「何……？」
line = "「何……？」"

[[dialogue]]
speaker = "フィオナ"
# 「たとえリクリエが、よりよき世界を目指して刷新するものだったとしても。今を生きている人類を滅ぼすなんて──ヒーローのすることでしょうか？」
line = "「たとえリクリエが、よりよき世界を目指して刷新するものだったとしても。今を生きている人類を滅ぼすなんて──ヒーローのすることでしょうか？」"

[[dialogue]]
speaker = "アポロ"
# 「それ……は……」
line = "「それ……は……」"

[[dialogue]]
speaker = "unk"
# アポロが流星ライダー──ヒーローを自称する上で、避けては通れない矛盾だった。
line = "アポロが流星ライダー──ヒーローを自称する上で、避けては通れない矛盾だった。"

[[dialogue]]
speaker = "unk"
# リクリエの脅威が最大限に迫る今だからこそ、その現実はアポロに突き刺さる。
line = "リクリエの脅威が最大限に迫る今だからこそ、その現実はアポロに突き刺さる。"

[[dialogue]]
speaker = "unk"
# しかし──
line = "しかし──"

[[dialogue]]
speaker = "アポロ"
# 「──っっっ！！」
line = "「──っっっ！！」"

[[dialogue]]
speaker = "アポロ"
# 「……違ウ。違ウ違ウ違ウッ！」
line = "「……違ウ。違ウ違ウ違ウッ！」"

[[dialogue]]
speaker = "アポロ"
# 「あたしはヒーロー……オマエたちは悪党……だから……いくら倒したって、滅ぼしたって、いいんだ。それがあたしの使命なんだ！」
line = "「あたしはヒーロー……オマエたちは悪党……だから……いくら倒したって、滅ぼしたって、いいんだ。それがあたしの使命なんだ！」"

[[dialogue]]
speaker = "マトイ"
# 「……！　やっぱり説得できないの──」
line = "「……！　やっぱり説得できないの──」"

[[dialogue]]
speaker = "unk"
# それが使命なんだ──
line = "それが使命なんだ──"

[[dialogue]]
speaker = "unk"
# そう宣言した瞬間、仮面に宿る瘴気がより濃度を強めていた。
line = "そう宣言した瞬間、仮面に宿る瘴気がより濃度を強めていた。"

[[dialogue]]
speaker = "unk"
# リクリエすべての力が集約されている──というのは過言じゃない。どんなアステライトよりも強く濃い瘴気がアポロの全身を包んでいた。
line = "リクリエすべての力が集約されている──というのは過言じゃない。どんなアステライトよりも強く濃い瘴気がアポロの全身を包んでいた。"

[[dialogue]]
speaker = "unk"
# でも──
line = "でも──"

[[dialogue]]
speaker = "クロト"
# 「……安心したよ」
line = "「……安心したよ」"

[[dialogue]]
speaker = "アポロ"
# 「何……？」
line = "「何……？」"

[[dialogue]]
speaker = "クロト"
# 「原因がはっきりした。アポロ──やっぱり君は意志も行動も何もかも、その仮面に支配されている」
line = "「原因がはっきりした。アポロ──やっぱり君は意志も行動も何もかも、その仮面に支配されている」"

[[dialogue]]
speaker = "unk"
# 今の一瞬、言動さえ上書きされてしまったのがその証拠だ。
line = "今の一瞬、言動さえ上書きされてしまったのがその証拠だ。"

[[dialogue]]
speaker = "unk"
# それは、元来のアポロの人格が、確かに残っていることを意味する。
line = "それは、元来のアポロの人格が、確かに残っていることを意味する。"

[[dialogue]]
speaker = "アポロ"
# 「違う……こんなもの、ただの飾りだ！　あたしはあたしの意思で！　リクリエを執行するって言ってるんだ！」
line = "「違う……こんなもの、ただの飾りだ！　あたしはあたしの意思で！　リクリエを執行するって言ってるんだ！」"

[[dialogue]]
speaker = "アポロ"
# 「それに、仮面がどうだったとしても──魔王。あたし達が争う運命に変わりはないぞ！」
line = "「それに、仮面がどうだったとしても──魔王。あたし達が争う運命に変わりはないぞ！」"

[[dialogue]]
speaker = "リノ"
# 「いいえ──そんなことないわ。そうさせないために私がきたの」
line = "「いいえ──そんなことないわ。そうさせないために私がきたの」"

[[dialogue]]
speaker = "アポロ"
# 「何……？」
line = "「何……？」"

[[dialogue]]
speaker = "unk"
# 大剣を構えるアポロに対し、母さんは堂々と前へ歩み出る。
line = "大剣を構えるアポロに対し、母さんは堂々と前へ歩み出る。"

[[dialogue]]
speaker = "リノ"
# 「──私、他にも色々な魔具を集めているのよ。蒐集癖っていうのかしら。そこで相談なんだけど」
line = "「──私、他にも色々な魔具を集めているのよ。蒐集癖っていうのかしら。そこで相談なんだけど」"

[[dialogue]]
speaker = "リノ"
# 「あなたの仮面──私にもらえないかしら？」
line = "「あなたの仮面──私にもらえないかしら？」"

[[dialogue]]
speaker = "アポロ"
# 「な……なんだと……？」
line = "「な……なんだと……？」"

[[dialogue]]
speaker = "クロト"
# 「俺たちは君を倒さない。君の仮面だけを──この<ruby=はこ>筐</ruby>の中へ封印する」
line = "「俺たちは君を倒さない。君の仮面だけを──この<ruby>筐<rt>はこ</rt></ruby>の中へ封印する」"

[[dialogue]]
speaker = "アポロ"
# 「──」
line = "「──」"

[[dialogue]]
speaker = "unk"
# 母さんが取り出すは天界由来の秘宝──『シエルの筐』。
line = "母さんが取り出すは天界由来の秘宝──『シエルの筐』。"

[[dialogue]]
speaker = "unk"
# あの中に、アポロを使徒たらしめている元凶だけを閉じ込める。それが俺たちに残された唯一の希望。
line = "あの中に、アポロを使徒たらしめている元凶だけを閉じ込める。それが俺たちに残された唯一の希望。"

[[dialogue]]
speaker = "リノ"
# 「ちょっとでいいわ。もし、本当にそれが<b>ただの</b>飾りだっていうのなら……貸してくれたっていいでしょう？」
line = "「ちょっとでいいわ。もし、本当にそれが<b>ただの</b>飾りだっていうのなら……貸してくれたっていいでしょう？」"

[[dialogue]]
speaker = "アポロ"
# 「っ……！」
line = "「っ……！」"

[[dialogue]]
speaker = "アポロ"
# 「……ダメだ。この仮面は……流星ライダーとして、必要なものだ。オマエたちなんかに渡すわけないだろ」
line = "「……ダメだ。この仮面は……流星ライダーとして、必要なものだ。オマエたちなんかに渡すわけないだろ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「取れないんだ」
line = "「取れないんだ」"

[[dialogue]]
speaker = "ソフィア"
# 「白状してるようなものですね……！」
line = "「白状してるようなものですね……！」"

[[dialogue]]
speaker = "アポロ"
# 「……ふぅ。うるさいうるさい」
line = "「……ふぅ。うるさいうるさい」"

[[dialogue]]
speaker = "アポロ"
# 「いい加減、オマエ達のツラも見飽きたぞ。もう一度叩き落としてやる──！」
line = "「いい加減、オマエ達のツラも見飽きたぞ。もう一度叩き落としてやる──！」"

[[dialogue]]
speaker = "モンスター"
# 「──クオオオオオオオオンッ！」
line = "「──クオオオオオオオオンッ！」"

[[dialogue]]
speaker = "モンスター"
# 「──グウウウアアアアアアッッ…………！！」
line = "「──グウウウアアアアアアッッ…………！！」"

[[dialogue]]
speaker = "ユウリ"
# 「っ……！？　なんだありゃ、見たことねえ……！」
line = "「っ……！？　なんだありゃ、見たことねえ……！」"

[[dialogue]]
speaker = "ニャリオン"
# 「クライマックスともなると──モンスターも特別級ニャンか……！？」
line = "「クライマックスともなると──モンスターも特別級ニャンか……！？」"

[[dialogue]]
speaker = "unk"
# アポロが地に大剣を突きつけると配下のモンスターたちが召喚される。
line = "アポロが地に大剣を突きつけると配下のモンスターたちが召喚される。"

[[dialogue]]
speaker = "unk"
# そして──凄まじい瘴気が彼女の背から立ち昇った！
line = "そして──凄まじい瘴気が彼女の背から立ち昇った！"

[[dialogue]]
speaker = "ヴィーナス"
# 「！」
line = "「！」"

[[dialogue]]
speaker = "アポロ"
# 「我はアポロ。アルタイルを再創造すべく、デネブより使わされたリクリエの使徒」
line = "「我はアポロ。アルタイルを再創造すべく、デネブより使わされたリクリエの使徒」"

[[dialogue]]
speaker = "セーラ"
# 「……っ！？　なんか、性格が変わってない──？」
line = "「……っ！？　なんか、性格が変わってない──？」"

[[dialogue]]
speaker = "アナ"
# 「人格の侵食が強まっています──！　このままでは……！」
line = "「人格の侵食が強まっています──！　このままでは……！」"

[[dialogue]]
speaker = "リノ"
# 「抑えつけないといけないわね──」
line = "「抑えつけないといけないわね──」"

[[dialogue]]
speaker = "ソフィア"
# 「結局……戦うしかありませんか」
line = "「結局……戦うしかありませんか」"

[[dialogue]]
speaker = "ユウリ"
# 「ちっ……けど──強引にでもその仮面引っ剥がして──正気に戻してやっからな。覚悟しろよ！」
line = "「ちっ……けど──強引にでもその仮面引っ剥がして──正気に戻してやっからな。覚悟しろよ！」"

[[dialogue]]
speaker = "クロト"
# 「あの仮面は壊しても容易に再生する。本体からの分離を目標に戦うぞ！」
line = "「あの仮面は壊しても容易に再生する。本体からの分離を目標に戦うぞ！」"

[[dialogue]]
speaker = "フィオナ"
# 「霊力、全開──」
line = "「霊力、全開──」"

[[dialogue]]
speaker = "フィオナ"
# 「いきますよ、姉さん。今度こそ──あなたの素顔を見せてください」
line = "「いきますよ、姉さん。今度こそ──あなたの素顔を見せてください」"

[[dialogue]]
speaker = "アポロ"
# 「果てろ……人間風情が、宇宙の<ruby=ことわり>理</ruby>に勝てると思うな！」
line = "「果てろ……人間風情が、宇宙の<ruby>理<rt>ことわり</rt></ruby>に勝てると思うな！」"
