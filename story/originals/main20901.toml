[[dialogue]]
speaker = "unk"
# 第１話,目覚めたチナ,B
line = "第１話,目覚めたチナ,B"

[[dialogue]]
speaker = "unk"
# 緋宮クロトたちがデネブに飛ばされた後、チナは気を失い、新星学園に身柄を拘束されていた。
line = "緋宮クロトたちがデネブに飛ばされた後、チナは気を失い、新星学園に身柄を拘束されていた。"

[[dialogue]]
speaker = "チナ"
# 「ん……んん……」
line = "「ん……んん……」"

[[dialogue]]
speaker = "チナ"
# 「ここは……どこだ……？　アタシは転送装置を使って、アルタイルを滅ぼそうと──」
line = "「ここは……どこだ……？　アタシは転送装置を使って、アルタイルを滅ぼそうと──」"

[[dialogue]]
speaker = "チナ"
# 「！　そうだ、アタシは魔王に負けて……」
line = "「！　そうだ、アタシは魔王に負けて……」"

[[dialogue]]
speaker = "マトイ"
# 「良かった、目が覚めたんだね」
line = "「良かった、目が覚めたんだね」"

[[dialogue]]
speaker = "サーシャ"
# 「怪我も大したことなくて安心したわ～」
line = "「怪我も大したことなくて安心したわ～」"

[[dialogue]]
speaker = "チナ"
# 「！？　お前らは、新星学園の……！？」
line = "「！？　お前らは、新星学園の……！？」"

[[dialogue]]
speaker = "アナ"
# 「会長たちとの戦闘の後、気絶したあなたを拘束させてもらいました」
line = "「会長たちとの戦闘の後、気絶したあなたを拘束させてもらいました」"

[[dialogue]]
speaker = "アナ"
# 「ここは新星学園の会議室です。アニマ先輩に改造してもらって、即席の独房にしています」
line = "「ここは新星学園の会議室です。アニマ先輩に改造してもらって、即席の独房にしています」"

[[dialogue]]
speaker = "アナ"
# 「セレスティアは会長に破壊されましたし、力ずくで脱出することはできませんよ」
line = "「セレスティアは会長に破壊されましたし、力ずくで脱出することはできませんよ」"

[[dialogue]]
speaker = "チナ"
# 「くっ…………」
line = "「くっ…………」"

[[dialogue]]
speaker = "アナ"
# 「あなたには聞きたいことがあります。ですが手荒なことをするつもりは──」
line = "「あなたには聞きたいことがあります。ですが手荒なことをするつもりは──」"

[[dialogue]]
speaker = "チナ"
# 「……れ」
line = "「……れ」"

[[dialogue]]
speaker = "アナ"
# 「ん？」
line = "「ん？」"

[[dialogue]]
speaker = "チナ"
# 「やるならやれ！　捕虜になるつもりはない！」
line = "「やるならやれ！　捕虜になるつもりはない！」"

[[dialogue]]
speaker = "マトイ"
# 「ええっ、何言ってるのっ！？」
line = "「ええっ、何言ってるのっ！？」"

[[dialogue]]
speaker = "サーシャ"
# 「あらあら、いきなり物騒ね～」
line = "「あらあら、いきなり物騒ね～」"

[[dialogue]]
speaker = "チナ"
# 「人質になって、デネブを脅かすくらいなら死んだほうがマシだ！　さっさとやれ！」
line = "「人質になって、デネブを脅かすくらいなら死んだほうがマシだ！　さっさとやれ！」"

[[dialogue]]
speaker = "マトイ"
# 「ちょ、ちょっと待って！　人質とかそんなこと考えてないから！」
line = "「ちょ、ちょっと待って！　人質とかそんなこと考えてないから！」"

[[dialogue]]
speaker = "アナ"
# 「そうです、私たちはあなたを傷つけるつもりはありません。さすがに自由の身にすることはできませんが」
line = "「そうです、私たちはあなたを傷つけるつもりはありません。さすがに自由の身にすることはできませんが」"

[[dialogue]]
speaker = "unk"
# 声を荒げて訴えるチナに、マトイは慌てて目を丸くし、アナはゆっくり首を横に振って否定する。
line = "声を荒げて訴えるチナに、マトイは慌てて目を丸くし、アナはゆっくり首を横に振って否定する。"

[[dialogue]]
speaker = "アナ"
# 「新星学園は『デネブとともにリクリエと立ち向かう』と決めました」
line = "「新星学園は『デネブとともにリクリエと立ち向かう』と決めました」"

[[dialogue]]
speaker = "アナ"
# 「あなたを傷つけてしまったら、デネブ側の心象を害し、共闘が叶わなくなる可能性がある。だからあなたに危害を加えることはありません」
line = "「あなたを傷つけてしまったら、デネブ側の心象を害し、共闘が叶わなくなる可能性がある。だからあなたに危害を加えることはありません」"

[[dialogue]]
speaker = "アナ"
# 「たとえあなたを害する者がいたとしても、手は出させません。緋宮会長が不在である今、星徒会役員である私たちが責任を持って守ります」
line = "「たとえあなたを害する者がいたとしても、手は出させません。緋宮会長が不在である今、星徒会役員である私たちが責任を持って守ります」"

[[dialogue]]
speaker = "チナ"
# 「ハン、自分たちの世界を滅ぼそうとしたやつを守るなんて、会長がバカならお前ら役員もバカだな」
line = "「ハン、自分たちの世界を滅ぼそうとしたやつを守るなんて、会長がバカならお前ら役員もバカだな」"

[[dialogue]]
speaker = "チナ"
# 「『デネブとともにリクリエに立ち向かう』──だって？」
line = "「『デネブとともにリクリエに立ち向かう』──だって？」"

[[dialogue]]
speaker = "チナ"
# 「そんなことできるもんか！　『生き残る世界は１つだけ』って、ルヴィ──ルヴィネ会長が言ってたんだ！」
line = "「そんなことできるもんか！　『生き残る世界は１つだけ』って、ルヴィ──ルヴィネ会長が言ってたんだ！」"

[[dialogue]]
speaker = "unk"
# 囚われの身になっても、チナは頑なな態度を崩さない。
line = "囚われの身になっても、チナは頑なな態度を崩さない。"

[[dialogue]]
speaker = "unk"
# しかしアナも動じず、いつもの調子で言葉を返す。
line = "しかしアナも動じず、いつもの調子で言葉を返す。"

[[dialogue]]
speaker = "アナ"
# 「ルヴィネという人物の言葉が真実かどうかは不明です。私たちも否定する証拠は持ち合わせていません」
line = "「ルヴィネという人物の言葉が真実かどうかは不明です。私たちも否定する証拠は持ち合わせていません」"

[[dialogue]]
speaker = "アナ"
# 「ですが私たち星騎士が戦うべき相手は、平行世界ではなくリクリエです。会長も、私たち星徒会役員も、そう考えています」
line = "「ですが私たち星騎士が戦うべき相手は、平行世界ではなくリクリエです。会長も、私たち星徒会役員も、そう考えています」"

[[dialogue]]
speaker = "チナ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# まるで視線で貫かんばかりに、アナを鋭くにらむチナ。
line = "まるで視線で貫かんばかりに、アナを鋭くにらむチナ。"

[[dialogue]]
speaker = "unk"
# 互いの主張はやはり平行線だ。アルタイルとデネブ、２つの世界のごとく交わることはない。
line = "互いの主張はやはり平行線だ。アルタイルとデネブ、２つの世界のごとく交わることはない。"

[[dialogue]]
speaker = "サーシャ"
# 「ところでちょっと教えてほしいんだけど、あなたが持っていた装置は平行世界を渡るものなのよね？」
line = "「ところでちょっと教えてほしいんだけど、あなたが持っていた装置は平行世界を渡るものなのよね？」"

[[dialogue]]
speaker = "サーシャ"
# 「会長くんたちがあの装置を破壊して、穴に吸い込まれるところは映像で見たわ」
line = "「会長くんたちがあの装置を破壊して、穴に吸い込まれるところは映像で見たわ」"

[[dialogue]]
speaker = "サーシャ"
# 「だったらあの時発生した穴は、デネブに繋がっているのかしら？　会長くんたちは今デネブにいるの？」
line = "「だったらあの時発生した穴は、デネブに繋がっているのかしら？　会長くんたちは今デネブにいるの？」"

[[dialogue]]
speaker = "チナ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "サーシャ"
# 「あら、何も言ってくれないわね～」
line = "「あら、何も言ってくれないわね～」"

[[dialogue]]
speaker = "チナ"
# 「お前らは敵だ。ほいほい答えるわけないだろ。拷問されたって言うもんか！」
line = "「お前らは敵だ。ほいほい答えるわけないだろ。拷問されたって言うもんか！」"

[[dialogue]]
speaker = "マトイ"
# 「いや、拷問なんてするつもりないんだけど……」
line = "「いや、拷問なんてするつもりないんだけど……」"

[[dialogue]]
speaker = "サーシャ"
# （会長くんたちが今どうしてるか、少しでもわかればと思ったんだけど、難しそうね。心配だけど今は信じるしかないわ）
line = "（会長くんたちが今どうしてるか、少しでもわかればと思ったんだけど、難しそうね。心配だけど今は信じるしかないわ）"

[[dialogue]]
speaker = "マトイ"
# （そうですね……。だけどヴィーナスも会長も、そう簡単にやられるわけありません……！）
line = "（そうですね……。だけどヴィーナスも会長も、そう簡単にやられるわけありません……！）"

[[dialogue]]
speaker = "アナ"
# （ヴィーナス前会長を始め、平行世界を超える事例は今までにもありました）
line = "（ヴィーナス前会長を始め、平行世界を超える事例は今までにもありました）"

[[dialogue]]
speaker = "アナ"
# （それに会長には、平行世界を渡る魔王ラクシスの力があります。何とかなる……と思いましょう）
line = "（それに会長には、平行世界を渡る魔王ラクシスの力があります。何とかなる……と思いましょう）"

[[dialogue]]
speaker = "アナ"
# （そして私たちはこの世界で、今できることをしなければ）
line = "（そして私たちはこの世界で、今できることをしなければ）"

[[dialogue]]
speaker = "マトイ"
# （うん……！）
line = "（うん……！）"

[[dialogue]]
speaker = "アナ"
# 「香堂チナさん。あなたと私たちは、今は敵です」
line = "「香堂チナさん。あなたと私たちは、今は敵です」"

[[dialogue]]
speaker = "アナ"
# 「情報を渡さないために黙秘するのも、確かに１つの選択でしょう。無理やり聞き出すようなことはしません」
line = "「情報を渡さないために黙秘するのも、確かに１つの選択でしょう。無理やり聞き出すようなことはしません」"

[[dialogue]]
speaker = "アナ"
# 「ですがあなたの言葉には腑に落ちない点があります」
line = "「ですがあなたの言葉には腑に落ちない点があります」"

[[dialogue]]
speaker = "チナ"
# 「お前のせいで、アタシの家族は……！」
line = "「お前のせいで、アタシの家族は……！」"

[[dialogue]]
speaker = "クロト"
# 『君の家族……？　なんのことだ、君はいったい！？』
line = "『君の家族……？　なんのことだ、君はいったい！？』"

[[dialogue]]
speaker = "チナ"
# 「お前はアタシたちの世界を破壊した……！　この魔王め……！」
line = "「お前はアタシたちの世界を破壊した……！　この魔王め……！」"

[[dialogue]]
speaker = "アナ"
# 「あなたは以前、『魔王クロトがデネブを破壊した』と言っていました。あれはどういう意味ですか？」
line = "「あなたは以前、『魔王クロトがデネブを破壊した』と言っていました。あれはどういう意味ですか？」"

[[dialogue]]
speaker = "アナ"
# 「私たちが知る限り、デネブの緋宮クロトもリクリエと戦っていたはずです。でなければヴィーナス前会長は──」
line = "「私たちが知る限り、デネブの緋宮クロトもリクリエと戦っていたはずです。でなければヴィーナス前会長は──」"

[[dialogue]]
speaker = "チナ"
# 「何言ってる！！　魔王クロトはデネブを裏切って、アルタイルに逃げたんだ！！」
line = "「何言ってる！！　魔王クロトはデネブを裏切って、アルタイルに逃げたんだ！！」"

[[dialogue]]
speaker = "アナ"
# 「はい……？　緋宮会長が、デネブからアルタイルに……？」
line = "「はい……？　緋宮会長が、デネブからアルタイルに……？」"

[[dialogue]]
speaker = "サーシャ"
# 「ん～……どういうことかしら？　私たちの知っている会長くんは、アルタイルの会長くんよね～？」
line = "「ん～……どういうことかしら？　私たちの知っている会長くんは、アルタイルの会長くんよね～？」"

[[dialogue]]
speaker = "マトイ"
# 「会長がデネブから来た……？　いやそれはヴィーナスの話じゃ……」
line = "「会長がデネブから来た……？　いやそれはヴィーナスの話じゃ……」"

[[dialogue]]
speaker = "チナ"
# 「いいや、ルヴィネ会長が言ってたんだ！　あいつは、魔王クロトは、自分が生まれたデネブを見捨ててアルタイルに──」
line = "「いいや、ルヴィネ会長が言ってたんだ！　あいつは、魔王クロトは、自分が生まれたデネブを見捨ててアルタイルに──」"

[[dialogue]]
speaker = "アナ"
# 「いいえ、そんなはずはありません」
line = "「いいえ、そんなはずはありません」"

[[dialogue]]
speaker = "アナ"
# 「会長──この世界の緋宮クロトは、リノさんが幼い頃から養育してきました。その記録もあります」
line = "「会長──この世界の緋宮クロトは、リノさんが幼い頃から養育してきました。その記録もあります」"

[[dialogue]]
speaker = "アナ"
# 「それに会長がデネブから来たのであれば、ヴィーナス前会長を知っていなければおかしいですし、わざわざ覚醒させる意味もありません」
line = "「それに会長がデネブから来たのであれば、ヴィーナス前会長を知っていなければおかしいですし、わざわざ覚醒させる意味もありません」"

[[dialogue]]
speaker = "アナ"
# 「ですからチナさん。敵味方の立場とは関係なく、あなたの認識には何かしらの齟齬があるのではないでしょうか？」
line = "「ですからチナさん。敵味方の立場とは関係なく、あなたの認識には何かしらの齟齬があるのではないでしょうか？」"

[[dialogue]]
speaker = "チナ"
# 「は……？　お前ら……何言って……？」
line = "「は……？　お前ら……何言って……？」"
