[[dialogue]]
speaker = "unk"
# 第３話,リズム感とは（宇宙）,P
line = "第３話,リズム感とは（宇宙）,P"

[[dialogue]]
speaker = "unk"
# ある日の放課後。俺は空き教室で、ヨミの巫女舞の練習に付き合っていた。しかし──
line = "ある日の放課後。俺は空き教室で、ヨミの巫女舞の練習に付き合っていた。しかし──"

[[dialogue]]
speaker = "ヨミ"
# 「ど、どうだったでしょうか、会長……？」
line = "「ど、どうだったでしょうか、会長……？」"

[[dialogue]]
speaker = "unk"
# その……リズム感がイマイチ、かな……
line = "その……リズム感がイマイチ、かな……"

[[dialogue]]
speaker = "ヨミ"
# 「うぅぅ……ですよね……。実は私、リズム感が昔から壊滅的で……」
line = "「うぅぅ……ですよね……。実は私、リズム感が昔から壊滅的で……」"

[[dialogue]]
speaker = "ヨミ"
# 「リズム感、りずむ感、リズムかん……『りずむかん』って一体何なのでしょう……」
line = "「リズム感、りずむ感、リズムかん……『りずむかん』って一体何なのでしょう……」"

[[dialogue]]
speaker = "アニマ"
# 「フヒ♪　どうやらお困りのようだネ、我が心の友よ」
line = "「フヒ♪　どうやらお困りのようだネ、我が心の友よ」"

[[dialogue]]
speaker = "ヨミ"
# 「アニマ先輩！？」
line = "「アニマ先輩！？」"

[[dialogue]]
speaker = "unk"
# アニマ先輩とヨミは知り合いなのか？
line = "アニマ先輩とヨミは知り合いなのか？"

[[dialogue]]
speaker = "ヨミ"
# 「はい、先輩の方から声を掛けて頂いたのがきっかけで。よくカフェテリアで一緒にお昼を食べたり、休日一緒に出掛けたりするんですよ」
line = "「はい、先輩の方から声を掛けて頂いたのがきっかけで。よくカフェテリアで一緒にお昼を食べたり、休日一緒に出掛けたりするんですよ」"

[[dialogue]]
speaker = "アニマ"
# 「フヒヒ、いわゆる接客担当同士の連帯意識というやつダ。ヨミのことは、心の友と呼ばせて貰っているヨ」
line = "「フヒヒ、いわゆる接客担当同士の連帯意識というやつダ。ヨミのことは、心の友と呼ばせて貰っているヨ」"

[[dialogue]]
speaker = "アニマ"
# 「それはともかく、ここはアニマの発明した薬の出番ダロウ。名付けて『リズムワカール』！」
line = "「それはともかく、ここはアニマの発明した薬の出番ダロウ。名付けて『リズムワカール』！」"

[[dialogue]]
speaker = "unk"
# 胡散臭すぎる……！
line = "胡散臭すぎる……！"

[[dialogue]]
speaker = "ヨミ"
# 「リズム感がわかるようになるってことですか！？　た、確かに上手い話過ぎて、ちょっと信じ難いですけど……」
line = "「リズム感がわかるようになるってことですか！？　た、確かに上手い話過ぎて、ちょっと信じ難いですけど……」"

[[dialogue]]
speaker = "アニマ"
# 「効果は一時的だが、至って本気だとも。……どうするね、ヨミ？　例によって副作用は出るだろうが、体に害が無いことだけは保障するヨ」
line = "「効果は一時的だが、至って本気だとも。……どうするね、ヨミ？　例によって副作用は出るだろうが、体に害が無いことだけは保障するヨ」"

[[dialogue]]
speaker = "ヨミ"
# 「わ、私は……少しでもリズム感が掴めるきっかけになるなら、試してみたいです！　アニマ先輩が天才なのは、よくわかってますし」
line = "「わ、私は……少しでもリズム感が掴めるきっかけになるなら、試してみたいです！　アニマ先輩が天才なのは、よくわかってますし」"

[[dialogue]]
speaker = "ヨミ"
# 「……よし、行きます！　ごくごく…………あれ、意外と美味しい……？」
line = "「……よし、行きます！　ごくごく…………あれ、意外と美味しい……？」"

[[dialogue]]
speaker = "ヨミ"
# 「そう……この味を例えるなら──宇宙です」
line = "「そう……この味を例えるなら──宇宙です」"

[[dialogue]]
speaker = "ヨミ"
# 「会長、私には今……頭の中に無限に広がる宇宙が見えます。リズム感が何なのか、宇宙の彼方が見えるようにわかって来ました」
line = "「会長、私には今……頭の中に無限に広がる宇宙が見えます。リズム感が何なのか、宇宙の彼方が見えるようにわかって来ました」"

[[dialogue]]
speaker = "unk"
# よし、一緒に保健室に行こう！
line = "よし、一緒に保健室に行こう！"

[[dialogue]]
speaker = "アニマ"
# 「急くな会長、ヨミはラリってるわけではなイ」
line = "「急くな会長、ヨミはラリってるわけではなイ」"

[[dialogue]]
speaker = "ヨミ"
# 「そうか……ようやく私にも分かりました。これが『リズム』というものの正体だったのですね」
line = "「そうか……ようやく私にも分かりました。これが『リズム』というものの正体だったのですね」"

[[dialogue]]
speaker = "ヨミ"
# 「広がる宇宙の中で、私はついに──リズム感の真理に到達しました」
line = "「広がる宇宙の中で、私はついに──リズム感の真理に到達しました」"

[[dialogue]]
speaker = "ヨミ"
# 「会長、アニマ先輩！　これから巫女舞を踊ってみます。今ならばきっと──」
line = "「会長、アニマ先輩！　これから巫女舞を踊ってみます。今ならばきっと──」"

[[dialogue]]
speaker = "unk"
# ──ヨミはつい先程までとは別人のように、本当に圧倒的な出来栄えの美しい巫女舞を披露してみせた。
line = "──ヨミはつい先程までとは別人のように、本当に圧倒的な出来栄えの美しい巫女舞を披露してみせた。"

[[dialogue]]
speaker = "unk"
# 本当にリズム感が完璧になってる……！
line = "本当にリズム感が完璧になってる……！"

[[dialogue]]
speaker = "アニマ"
# 「素晴らしいゾ、心の友よ！　ちゃんと薬の効果が発揮されたようだナ」
line = "「素晴らしいゾ、心の友よ！　ちゃんと薬の効果が発揮されたようだナ」"

[[dialogue]]
speaker = "ヨミ"
# 「ありがとうございます、アニマ先輩のおかげです！　まさかこんなに巫女舞を踊れるようになるなんて……感動です！」
line = "「ありがとうございます、アニマ先輩のおかげです！　まさかこんなに巫女舞を踊れるようになるなんて……感動です！」"

[[dialogue]]
speaker = "アニマ"
# 「ちなみに、後学の為に教えてくれヨミ。……リズム感の真理とは、一体どのようなものなんダ？」
line = "「ちなみに、後学の為に教えてくれヨミ。……リズム感の真理とは、一体どのようなものなんダ？」"

[[dialogue]]
speaker = "ヨミ"
# 「リズム感の真理とはすなわち……」
line = "「リズム感の真理とはすなわち……」"

[[dialogue]]
speaker = "ヨミ"
# 「──ズキューンと来てグワァァァって感じで、バリバリーンとブワァァァッするものですね！」
line = "「──ズキューンと来てグワァァァって感じで、バリバリーンとブワァァァッするものですね！」"

[[dialogue]]
speaker = "unk"
# 語彙力！！！
line = "語彙力！！！"

[[dialogue]]
speaker = "アニマ"
# 「フム……それが副作用カ？」
line = "「フム……それが副作用カ？」"

[[dialogue]]
speaker = "ヨミ"
# 「ん？　あれ……急に頭の中がぼやけて……」
line = "「ん？　あれ……急に頭の中がぼやけて……」"

[[dialogue]]
speaker = "ヨミ"
# 「あ、ああ……宇宙が、見えなくなってしまいました……ガッカリです……」
line = "「あ、ああ……宇宙が、見えなくなってしまいました……ガッカリです……」"

[[dialogue]]
speaker = "アニマ"
# 「どうやら、薬の効き目が切れてしまったようだナ。……しかし、一度は真理に到達したんダ。再現することも可能なんじゃないカ？」
line = "「どうやら、薬の効き目が切れてしまったようだナ。……しかし、一度は真理に到達したんダ。再現することも可能なんじゃないカ？」"

[[dialogue]]
speaker = "ヨミ"
# 「そうでしょうか……？」
line = "「そうでしょうか……？」"

[[dialogue]]
speaker = "アニマ"
# 「コツは掴めたかもしれないダロウ？　先程の感覚を思い出しながら、もう一度舞ってみたらどうダ？」
line = "「コツは掴めたかもしれないダロウ？　先程の感覚を思い出しながら、もう一度舞ってみたらどうダ？」"

[[dialogue]]
speaker = "ヨミ"
# 「な、なるほど！　よし、やってみます！」
line = "「な、なるほど！　よし、やってみます！」"

[[dialogue]]
speaker = "ヨミ"
# 「ズキューン！　グワァァァッ！　バリバリーン！　ブワァァァッ！」
line = "「ズキューン！　グワァァァッ！　バリバリーン！　ブワァァァッ！」"

[[dialogue]]
speaker = "ヨミ"
# 「………………えっと」
line = "「………………えっと」"

[[dialogue]]
speaker = "ヨミ"
# 「リズム感……どこかに飛んで行っちゃいました……」
line = "「リズム感……どこかに飛んで行っちゃいました……」"

[[dialogue]]
speaker = "アニマ"
# 「フッ……フヒッ……まさかそのまま口に出して舞うとは……ふふ、ふふふっ（腹を抱えてうずくまる）」
line = "「フッ……フヒッ……まさかそのまま口に出して舞うとは……ふふ、ふふふっ（腹を抱えてうずくまる）」"

[[dialogue]]
speaker = "unk"
# （腹を抱えて爆笑）
line = "（腹を抱えて爆笑）"

[[dialogue]]
speaker = "ヨミ"
# 「こやぁぁぁっ！？　だって、先輩たちが再現しろって言うからっ！」
line = "「こやぁぁぁっ！？　だって、先輩たちが再現しろって言うからっ！」"

[[dialogue]]
speaker = "アニマ"
# 「わ、ワンモア……今のもう１回見たイ……！」
line = "「わ、ワンモア……今のもう１回見たイ……！」"

[[dialogue]]
speaker = "ヨミ"
# 「爆裂笑い過ぎですっ！」
line = "「爆裂笑い過ぎですっ！」"

[[dialogue]]
speaker = "ヨミ"
# 「うぅ……リズム感とは一体……（宇宙）」
line = "「うぅ……リズム感とは一体……（宇宙）」"

[[dialogue]]
speaker = "unk"
# 一度真理に到達したからか、遥か遠くを見るような目をするヨミなのであった。
line = "一度真理に到達したからか、遥か遠くを見るような目をするヨミなのであった。"
