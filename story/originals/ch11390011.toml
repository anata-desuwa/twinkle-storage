[[dialogue]]
speaker = "unk"
# 第１話,小さくなったフィクサー,P
line = "第１話,小さくなったフィクサー,P"

[[dialogue]]
speaker = "unk"
# 『こどもの日』の一件で、ヴィーナスの不思議な力によって、新たな姿『リトルフォーム』が覚醒した後。
line = "『こどもの日』の一件で、ヴィーナスの不思議な力によって、新たな姿『リトルフォーム』が覚醒した後。"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「――じゃ～ん！　というわけで、これが新生フィクサーの姿よ♪」
line = "「――じゃ～ん！　というわけで、これが新生フィクサーの姿よ♪」"

[[dialogue]]
speaker = "unk"
# 新星学園星徒会の仲間たちに、俺とヴィーナスは事情説明を行っていた。
line = "新星学園星徒会の仲間たちに、俺とヴィーナスは事情説明を行っていた。"

[[dialogue]]
speaker = "アナ"
# 「お～、次の新フォームはこう来ましたか。これまた興味深い……」
line = "「お～、次の新フォームはこう来ましたか。これまた興味深い……」"

[[dialogue]]
speaker = "マトイ"
# 「本当に体が小さくなっちゃうんだ……！　リトルフォーム、普通じゃないね！」
line = "「本当に体が小さくなっちゃうんだ……！　リトルフォーム、普通じゃないね！」"

[[dialogue]]
speaker = "サーシャ"
# 「きゃ～っ<emoji=heart04>　小さくなったヴィーナスちゃん、すっごく可愛いわ～♪　お姉ちゃん、ハグしたくなっちゃう～♪　ぎゅ～っ<emoji=heart04>」
line = "「きゃ～っ<emoji=heart04>　小さくなったヴィーナスちゃん、すっごく可愛いわ～♪　お姉ちゃん、ハグしたくなっちゃう～♪　ぎゅ～っ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ヴィーナスの小さな姿を見て興奮したサーシャさんが、勢いよく抱き着く。
line = "ヴィーナスの小さな姿を見て興奮したサーシャさんが、勢いよく抱き着く。"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「わぷっ！？　サーシャさんってば、そんなに強く抱き着かれたら息が苦しいわ♪」
line = "「わぷっ！？　サーシャさんってば、そんなに強く抱き着かれたら息が苦しいわ♪」"

[[dialogue]]
speaker = "サーシャ"
# 「あら～、ごめんなさい。でも、小さいヴィーナスちゃんがあまりに可愛いから、私のこと『お姉ちゃん』って呼んで欲しくなっちゃうわ～♪」
line = "「あら～、ごめんなさい。でも、小さいヴィーナスちゃんがあまりに可愛いから、私のこと『お姉ちゃん』って呼んで欲しくなっちゃうわ～♪」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「私もリトルフォームの時は、子供になったような気分になるからいいわよ♪　サーシャお姉ちゃん♪」
line = "「私もリトルフォームの時は、子供になったような気分になるからいいわよ♪　サーシャお姉ちゃん♪」"

[[dialogue]]
speaker = "サーシャ"
# 「っ！？　きゃ～っ<emoji=heart04><emoji=heart04>　ヴィーナスちゃん、嬉しい～！　私がお姉ちゃんよ～<emoji=heart04>　よしよしっ♪　ぎゅ～～っ<emoji=heart04><emoji=heart04>」
line = "「っ！？　きゃ～っ<emoji=heart04><emoji=heart04>　ヴィーナスちゃん、嬉しい～！　私がお姉ちゃんよ～<emoji=heart04>　よしよしっ♪　ぎゅ～～っ<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「む～っ！？　今度こそおっぱいで息ができないわ、お姉ちゃん！」
line = "「む～っ！？　今度こそおっぱいで息ができないわ、お姉ちゃん！」"

[[dialogue]]
speaker = "アナ"
# 「……サーシャ先輩、そんなこと言ってると、またソフィアさんに嫉妬されちゃいますよ」
line = "「……サーシャ先輩、そんなこと言ってると、またソフィアさんに嫉妬されちゃいますよ」"

[[dialogue]]
speaker = "マトイ"
# 「でも、なんだろう？　なんか前にもこんなことがあったようなデジャヴが……」
line = "「でも、なんだろう？　なんか前にもこんなことがあったようなデジャヴが……」"

[[dialogue]]
speaker = "アナ"
# 「この星徒会が発足してまだ間もない頃、前会長が頭を打って、精神が幼く退行してしまった時の記憶じゃないでしょうか？」
line = "「この星徒会が発足してまだ間もない頃、前会長が頭を打って、精神が幼く退行してしまった時の記憶じゃないでしょうか？」"

[[dialogue]]
speaker = "マトイ"
# 「それだ！　あの時は大変だったな～」
line = "「それだ！　あの時は大変だったな～」"

[[dialogue]]
speaker = "unk"
# ちょっと懐かしいな
line = "ちょっと懐かしいな"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「それ、私は全然覚えてないのよね！　みんなで空飛ぶかけっこをしたって言ってたっけ？」
line = "「それ、私は全然覚えてないのよね！　みんなで空飛ぶかけっこをしたって言ってたっけ？」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「そうだ！　せっかく小さな体に変身できるようになったことだし、パパやみんなとまた同じように遊びたいわ♪」
line = "「そうだ！　せっかく小さな体に変身できるようになったことだし、パパやみんなとまた同じように遊びたいわ♪」"

[[dialogue]]
speaker = "マトイ"
# 「えぇ～！？　星力で空飛ぶガチのかけっこをまたやるの！？」
line = "「えぇ～！？　星力で空飛ぶガチのかけっこをまたやるの！？」"

[[dialogue]]
speaker = "unk"
# そうして、俺たちは仮想結界で天界フィールドを選択し、戦闘服に変身した状態で空を飛び回ってのレースを行うことになった。
line = "そうして、俺たちは仮想結界で天界フィールドを選択し、戦闘服に変身した状態で空を飛び回ってのレースを行うことになった。"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「ぎゅ～ん♪」
line = "「ぎゅ～ん♪」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「やったわ！　私が１番でゴールよ♪」
line = "「やったわ！　私が１番でゴールよ♪」"

[[dialogue]]
speaker = "サーシャ"
# 「あら～、すごいわ～♪」
line = "「あら～、すごいわ～♪」"

[[dialogue]]
speaker = "マトイ"
# 「負けた～！　ていうか、小さくなってもめちゃくちゃ速い！」
line = "「負けた～！　ていうか、小さくなってもめちゃくちゃ速い！」"

[[dialogue]]
speaker = "アナ"
# 「むしろ通常戦闘服より、パワーアップしてる感すらありますね」
line = "「むしろ通常戦闘服より、パワーアップしてる感すらありますね」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「私、記憶喪失になった時のこと全然覚えてないから、みんなで空飛ぶかけっこをしたって聞いた時、すごく羨ましかったのよね！」
line = "「私、記憶喪失になった時のこと全然覚えてないから、みんなで空飛ぶかけっこをしたって聞いた時、すごく羨ましかったのよね！」"

[[dialogue]]
speaker = "マトイ"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「だからこうしてみんなと遊べて、とっても嬉しいわ♪」
line = "「だからこうしてみんなと遊べて、とっても嬉しいわ♪」"

[[dialogue]]
speaker = "マトイ"
# 「そっか。なら……私も本気で遊んじゃおっかな♪」
line = "「そっか。なら……私も本気で遊んじゃおっかな♪」"

[[dialogue]]
speaker = "アナ"
# 「ええ、そうですね。いつもはあまりやらない、飛行技術を鍛える為の訓練にもなりますし」
line = "「ええ、そうですね。いつもはあまりやらない、飛行技術を鍛える為の訓練にもなりますし」"

[[dialogue]]
speaker = "サーシャ"
# 「ふふっ、本気でってことなら、アレよね～♪」
line = "「ふふっ、本気でってことなら、アレよね～♪」"

[[dialogue]]
speaker = "マトイ"
# 「もちろん！」
line = "「もちろん！」"

[[dialogue]]
speaker = "アナ"
# 「ノープロブレムです」
line = "「ノープロブレムです」"

[[dialogue]]
speaker = "３人"
# 「――チェンジ、ノヴァフォーム！！」
line = "「――チェンジ、ノヴァフォーム！！」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「――よ～し……それじゃあヴィーナス、今度は負けないよ！」
line = "「――よ～し……それじゃあヴィーナス、今度は負けないよ！」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「わぁ～っ♪　すごい！　みんなで全力飛行レース、ワクワクしてきたわ！」
line = "「わぁ～っ♪　すごい！　みんなで全力飛行レース、ワクワクしてきたわ！」"

[[dialogue]]
speaker = "アナ（覚醒）"
# 「仮想結界内ですから、出力を限界まで上げてもノープロブレムです」
line = "「仮想結界内ですから、出力を限界まで上げてもノープロブレムです」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「あらあら、うふふっ♪　それじゃあ、お姉ちゃんもたまには先輩らしく、星騎士としてカッコいいところを見せなきゃならないわね～♪」
line = "「あらあら、うふふっ♪　それじゃあ、お姉ちゃんもたまには先輩らしく、星騎士としてカッコいいところを見せなきゃならないわね～♪」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「パパも、全力で勝負よ！」
line = "「パパも、全力で勝負よ！」"

[[dialogue]]
speaker = "unk"
# ああ、もちろんだ！
line = "ああ、もちろんだ！"

[[dialogue]]
speaker = "unk"
# そうして俺たちは、小さい頃に戻って追いかけっこをするような気持ちで、空を飛び回って遊ぶのだった。
line = "そうして俺たちは、小さい頃に戻って追いかけっこをするような気持ちで、空を飛び回って遊ぶのだった。"

[[dialogue]]
speaker = "unk"
# その後、ヴィーナスは全力で遊んで疲れたのか、眠くなってしまったようで、俺がおんぶして九浄邸まで送ることになった。
line = "その後、ヴィーナスは全力で遊んで疲れたのか、眠くなってしまったようで、俺がおんぶして九浄邸まで送ることになった。"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「んうぅ……あれ？　パパ……？」
line = "「んうぅ……あれ？　パパ……？」"

[[dialogue]]
speaker = "unk"
# 起きたか？
line = "起きたか？"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「もしかして……家まで送ってくれるの？」
line = "「もしかして……家まで送ってくれるの？」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「パパ、確か記憶喪失になった日も、私をこうやっておぶってくれたのよね」
line = "「パパ、確か記憶喪失になった日も、私をこうやっておぶってくれたのよね」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「遊んだことは覚えてないけど……パパにおんぶしてもらっている最中に、記憶が戻ったんだったわ」
line = "「遊んだことは覚えてないけど……パパにおんぶしてもらっている最中に、記憶が戻ったんだったわ」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「――え？　あの時、私がパパのことを『お父さんみたいだ』って言ってた？」
line = "「――え？　あの時、私がパパのことを『お父さんみたいだ』って言ってた？」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「ふふっ、それってつまり、私の勘は当たってたってことよね♪」
line = "「ふふっ、それってつまり、私の勘は当たってたってことよね♪」"

[[dialogue]]
speaker = "unk"
# そう言いつつ、ぎゅっと背中に抱き着きながら、顔をすりすりさせてくるヴィーナス。
line = "そう言いつつ、ぎゅっと背中に抱き着きながら、顔をすりすりさせてくるヴィーナス。"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「んふふ<emoji=heart04>　パパの背中、あったかくて、いい匂いがするわ♪　私の好きな匂い……<emoji=heart04>」
line = "「んふふ<emoji=heart04>　パパの背中、あったかくて、いい匂いがするわ♪　私の好きな匂い……<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「あっ、そうだわ。あの時も確か、パパっていい匂いがする～って思ってたけど……今ならそれがどうしてかわかるわ♪」
line = "「あっ、そうだわ。あの時も確か、パパっていい匂いがする～って思ってたけど……今ならそれがどうしてかわかるわ♪」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「私、あの時からきっと……パパのことをもう、男の人として好きだったのよ<emoji=heart04>」
line = "「私、あの時からきっと……パパのことをもう、男の人として好きだったのよ<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「ねぇ、パパはいつから、私のことを女の子として好きになっていたの？」
line = "「ねぇ、パパはいつから、私のことを女の子として好きになっていたの？」"

[[dialogue]]
speaker = "unk"
# え？　う～ん、そうだな……
line = "え？　う～ん、そうだな……"

[[dialogue]]
speaker = "unk"
# 話を振られて考えてみるが、いつからかは正直わからない。気づいたらもう、好きになっていた。
line = "話を振られて考えてみるが、いつからかは正直わからない。気づいたらもう、好きになっていた。"

[[dialogue]]
speaker = "unk"
# しかし俺も、ヴィーナスを背負った時に『いい匂いがする』と思ったことが、記憶として蘇ってくる。
line = "しかし俺も、ヴィーナスを背負った時に『いい匂いがする』と思ったことが、記憶として蘇ってくる。"

[[dialogue]]
speaker = "unk"
# もしかしたら、それがヴィーナスを女の子として意識するきっかけだったのかもしれない。
line = "もしかしたら、それがヴィーナスを女の子として意識するきっかけだったのかもしれない。"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「へぇ～、パパも私の匂いでドキドキしてたのね♪　なら、小さい私の匂いはどうかしら？　すりすり～<emoji=heart04>」
line = "「へぇ～、パパも私の匂いでドキドキしてたのね♪　なら、小さい私の匂いはどうかしら？　すりすり～<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「あっ！　パパの心臓、ドキッってしてるのがちょっと聞こえてきたわ♪」
line = "「あっ！　パパの心臓、ドキッってしてるのがちょっと聞こえてきたわ♪」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「――うん？　恋人になって、あの時よりももっと私のことが好きになっているから？」
line = "「――うん？　恋人になって、あの時よりももっと私のことが好きになっているから？」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「ふふっ♪　私もあの時より、ず～っと大好きよ、パパ<emoji=heart04>　ちゅっ<emoji=heart04>」
line = "「ふふっ♪　私もあの時より、ず～っと大好きよ、パパ<emoji=heart04>　ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 耳元で囁きながら、ヴィーナスは俺の頬っぺたにキスしてくる。
line = "耳元で囁きながら、ヴィーナスは俺の頬っぺたにキスしてくる。"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「――ん～？　そういうことされると、恋人としてイチャイチャしたくなっちゃう？」
line = "「――ん～？　そういうことされると、恋人としてイチャイチャしたくなっちゃう？」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「えへへっ<emoji=heart04>　じゃあこのまま、九浄のお屋敷に泊まってく？　パ～パ<emoji=heart04>」
line = "「えへへっ<emoji=heart04>　じゃあこのまま、九浄のお屋敷に泊まってく？　パ～パ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そう言って、イタズラする子供のように笑ってみせるヴィーナスなのだった。
line = "そう言って、イタズラする子供のように笑ってみせるヴィーナスなのだった。"
