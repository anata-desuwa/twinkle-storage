[[dialogue]]
speaker = "unk"
# せつなの口寄せによって呼び出されたチョコゴーレムと、変身して戦うことになった俺。
line = "せつなの口寄せによって呼び出されたチョコゴーレムと、変身して戦うことになった俺。"

[[dialogue]]
speaker = "unk"
# しかしそのゴーレムは、以前のカフェテリアの時とは比べ物にならない、圧倒的な強さで――
line = "しかしそのゴーレムは、以前のカフェテリアの時とは比べ物にならない、圧倒的な強さで――"

[[dialogue]]
speaker = "ゴーレム"
# 「ゴォォォッレム！」
line = "「ゴォォォッレム！」"

[[dialogue]]
speaker = "unk"
# いや、マジで強いんだけど！？
line = "いや、マジで強いんだけど！？"

[[dialogue]]
speaker = "蘭美"
# 「――御前試合の時に戦った、ヴィーナスお嬢様よりも強いかもって？　ふふふっ♪　そうでしょ！」
line = "「――御前試合の時に戦った、ヴィーナスお嬢様よりも強いかもって？　ふふふっ♪　そうでしょ！」"

[[dialogue]]
speaker = "蘭美"
# 「これが１００回のチョコ作りと破壊を経て生まれた、『チョコゴーレム・レベル１００』の力よ！」
line = "「これが１００回のチョコ作りと破壊を経て生まれた、『チョコゴーレム・レベル１００』の力よ！」"

[[dialogue]]
speaker = "unk"
# ドヤ顔してないで助けてくれません！？
line = "ドヤ顔してないで助けてくれません！？"

[[dialogue]]
speaker = "蘭美"
# 「おっと、チョコの強さを味わって欲しいあまり、つい見物してしまっていたわ。――せつな！」
line = "「おっと、チョコの強さを味わって欲しいあまり、つい見物してしまっていたわ。――せつな！」"

[[dialogue]]
speaker = "せつな"
# 「御意！　主様の忍として、加勢致しまする！」
line = "「御意！　主様の忍として、加勢致しまする！」"

[[dialogue]]
speaker = "せつな"
# 「――変身！」
line = "「――変身！」"

[[dialogue]]
speaker = "せつな"
# 「甲賀流忍者せつな・バレンタインフォーム、参上でござる！」
line = "「甲賀流忍者せつな・バレンタインフォーム、参上でござる！」"

[[dialogue]]
speaker = "せつな"
# 「いざ！　バレンタイン忍法、リボン縛りの術！」
line = "「いざ！　バレンタイン忍法、リボン縛りの術！」"

[[dialogue]]
speaker = "ゴーレム"
# 「ゴォ～レムッ！？」
line = "「ゴォ～レムッ！？」"

[[dialogue]]
speaker = "unk"
# せつながリボンを伸ばして操り、チョコゴーレムの体に巻き付けて動きを封じる。
line = "せつながリボンを伸ばして操り、チョコゴーレムの体に巻き付けて動きを封じる。"

[[dialogue]]
speaker = "unk"
# せつな、その力は！？
line = "せつな、その力は！？"

[[dialogue]]
speaker = "せつな"
# 「実は、今日の為の修業を重ねるうちに、せつなのバレンタイン衣装が突然光って、戦闘服へと覚醒を果たしたのでござる！」
line = "「実は、今日の為の修業を重ねるうちに、せつなのバレンタイン衣装が突然光って、戦闘服へと覚醒を果たしたのでござる！」"

[[dialogue]]
speaker = "せつな"
# 「この衣装はご当主様から頂いたものなのでござるが、どうやら人工戦闘服の試作品としての機能も仕込んであったようで――」
line = "「この衣装はご当主様から頂いたものなのでござるが、どうやら人工戦闘服の試作品としての機能も仕込んであったようで――」"

[[dialogue]]
speaker = "蘭美"
# 「あの方は魂の囁きとやらで天啓を受けたように先を見通すから、今回もこうなるって、なんとなくわかってたんじゃないかしら？」
line = "「あの方は魂の囁きとやらで天啓を受けたように先を見通すから、今回もこうなるって、なんとなくわかってたんじゃないかしら？」"

[[dialogue]]
speaker = "せつな"
# 「そういうわけで、せつなの新たな力、是非お使い下さいませ！」
line = "「そういうわけで、せつなの新たな力、是非お使い下さいませ！」"

[[dialogue]]
speaker = "蘭美"
# 「私も特別に加勢してあげるわ。だから、会長！」
line = "「私も特別に加勢してあげるわ。だから、会長！」"

[[dialogue]]
speaker = "蘭美"
# 「最強のチョコレート、倒してみせなさい！」
line = "「最強のチョコレート、倒してみせなさい！」"

[[dialogue]]
speaker = "unk"
# 俺は２人の力を借りて、チョコゴーレム打倒に挑むのだった――
line = "俺は２人の力を借りて、チョコゴーレム打倒に挑むのだった――"

[[dialogue]]
speaker = "unk"
# そして――
line = "そして――"

[[dialogue]]
speaker = "ゴーレム"
# 「ゴォォォッレム……！」
line = "「ゴォォォッレム……！」"

[[dialogue]]
speaker = "unk"
# 俺が全力を込めた拳を叩き込み、チョコゴーレムはついに倒れて、砕け散った。
line = "俺が全力を込めた拳を叩き込み、チョコゴーレムはついに倒れて、砕け散った。"

[[dialogue]]
speaker = "unk"
# 勝てた……！
line = "勝てた……！"

[[dialogue]]
speaker = "せつな"
# 「主様、お見事にございまする！　これで主様とせつな達、３人で倒すことのできる、ギリギリまで鍛え上げたチョコレートが完成致しまする」
line = "「主様、お見事にございまする！　これで主様とせつな達、３人で倒すことのできる、ギリギリまで鍛え上げたチョコレートが完成致しまする」"

[[dialogue]]
speaker = "せつな"
# 「――バレンタイン忍法、ラッピングの術！」
line = "「――バレンタイン忍法、ラッピングの術！」"

[[dialogue]]
speaker = "unk"
# せつながそう言って印を結ぶと、光のリボンが出現し、チョコゴーレムの体が包まれて小さくなっていく。
line = "せつながそう言って印を結ぶと、光のリボンが出現し、チョコゴーレムの体が包まれて小さくなっていく。"

[[dialogue]]
speaker = "unk"
# やがてそれは、ふわりと浮いて、せつなの手の平の上に移動する。光が消えると――
line = "やがてそれは、ふわりと浮いて、せつなの手の平の上に移動する。光が消えると――"

[[dialogue]]
speaker = "unk"
# そこには可愛くハート型にラッピングされた、チョコが乗せられていた。
line = "そこには可愛くハート型にラッピングされた、チョコが乗せられていた。"

[[dialogue]]
speaker = "せつな"
# 「これが今、せつなにできる渾身のバレンタインチョコにござりまする。主様……ど、どうか――」
line = "「これが今、せつなにできる渾身のバレンタインチョコにござりまする。主様……ど、どうか――」"

[[dialogue]]
speaker = "せつな"
# 「受け取って欲しいでござる……！」
line = "「受け取って欲しいでござる……！」"

[[dialogue]]
speaker = "unk"
# ありがたく受け取らせてもらうよ
line = "ありがたく受け取らせてもらうよ"

[[dialogue]]
speaker = "せつな"
# 「はいっ！　えへへぇ♪　主様にちゃんと、お渡しできたでござる……♪」
line = "「はいっ！　えへへぇ♪　主様にちゃんと、お渡しできたでござる……♪」"

[[dialogue]]
speaker = "蘭美"
# 「やれやれ。色々と苦労したけど、これでバレンタイン成功ね」
line = "「やれやれ。色々と苦労したけど、これでバレンタイン成功ね」"

[[dialogue]]
speaker = "せつな"
# 「――チョコゴーレムが、一体なんだったのか、でござるか？　それは……」
line = "「――チョコゴーレムが、一体なんだったのか、でござるか？　それは……」"

[[dialogue]]
speaker = "unk"
# 俺はせつなから、チョコゴーレムの正体が、せつなの作ったバレンタインチョコが変身したものだと聞かされる。
line = "俺はせつなから、チョコゴーレムの正体が、せつなの作ったバレンタインチョコが変身したものだと聞かされる。"

[[dialogue]]
speaker = "せつな"
# 「――おそらく、主様に手作りチョコを贈りたいという強い気持ちが星術となり、勝手に発動していたんだと思いまする」
line = "「――おそらく、主様に手作りチョコを贈りたいという強い気持ちが星術となり、勝手に発動していたんだと思いまする」"

[[dialogue]]
speaker = "せつな"
# 「このバレンタインフォームが覚醒してからは、チョコのゴーレム化はせつなの意思で選べるようになりました」
line = "「このバレンタインフォームが覚醒してからは、チョコのゴーレム化はせつなの意思で選べるようになりました」"

[[dialogue]]
speaker = "せつな"
# 「それと、倒したゴーレムを再びバレンタインチョコにしたことについては――」
line = "「それと、倒したゴーレムを再びバレンタインチョコにしたことについては――」"

[[dialogue]]
speaker = "蘭美"
# 「私が提案したのよ。チョコゴーレムを次のチョコ作りの素材にしてみようって」
line = "「私が提案したのよ。チョコゴーレムを次のチョコ作りの素材にしてみようって」"

[[dialogue]]
speaker = "蘭美"
# 「失敗は無駄じゃない――それは、チョコゴーレムに関しても言えるんじゃないかと思って、試してみることにしたの」
line = "「失敗は無駄じゃない――それは、チョコゴーレムに関しても言えるんじゃないかと思って、試してみることにしたの」"

[[dialogue]]
speaker = "せつな"
# 「結果、チョコがゴーレムに変化し、そのゴーレムを倒して再びチョコの素材にする、というサイクルを繰り返すうちに……」
line = "「結果、チョコがゴーレムに変化し、そのゴーレムを倒して再びチョコの素材にする、というサイクルを繰り返すうちに……」"

[[dialogue]]
speaker = "せつな"
# 「チョコゴーレムの味が、少しずつ前よりも甘く、深い味わいへと変化していることに気づいたのでござる」
line = "「チョコゴーレムの味が、少しずつ前よりも甘く、深い味わいへと変化していることに気づいたのでござる」"

[[dialogue]]
speaker = "蘭美"
# 「だから、チョコを鍛えることにしたのよ」
line = "「だから、チョコを鍛えることにしたのよ」"

[[dialogue]]
speaker = "蘭美"
# 「何度も叩いて鍛え上げる、日本刀のようにね」
line = "「何度も叩いて鍛え上げる、日本刀のようにね」"

[[dialogue]]
speaker = "せつな"
# 「ただし、チョコゴーレムの味と比例して、強さもどんどん増していったので、倒すのも大変だったでごさるが……」
line = "「ただし、チョコゴーレムの味と比例して、強さもどんどん増していったので、倒すのも大変だったでごさるが……」"

[[dialogue]]
speaker = "蘭美"
# 「その倒せるギリギリの強さまで鍛え上げたのが、今回のチョコゴーレム・レベル１００だったというわけよ」
line = "「その倒せるギリギリの強さまで鍛え上げたのが、今回のチョコゴーレム・レベル１００だったというわけよ」"

[[dialogue]]
speaker = "せつな"
# 「そして、せつなはバレンタインフォームの覚醒によって、チョコゴーレムをチョコの形に戻す星術を手に入れていたので――」
line = "「そして、せつなはバレンタインフォームの覚醒によって、チョコゴーレムをチョコの形に戻す星術を手に入れていたので――」"

[[dialogue]]
speaker = "せつな"
# 「主様にご協力頂いて、最強のチョコゴーレムを倒し、それをバレンタインチョコにしてお渡ししようと決めたのでござる」
line = "「主様にご協力頂いて、最強のチョコゴーレムを倒し、それをバレンタインチョコにしてお渡ししようと決めたのでござる」"

[[dialogue]]
speaker = "蘭美"
# 「ふふっ、会長にとってはサプライズにもなって、一石二鳥のバレンタインチョコでしょ？」
line = "「ふふっ、会長にとってはサプライズにもなって、一石二鳥のバレンタインチョコでしょ？」"

[[dialogue]]
speaker = "unk"
# 死ぬかと思うくらい強かったけどね！？
line = "死ぬかと思うくらい強かったけどね！？"

[[dialogue]]
speaker = "蘭美"
# 「だけど、味はその分だけ凄いって、この私が保証するわよ。期待しておきなさい♪」
line = "「だけど、味はその分だけ凄いって、この私が保証するわよ。期待しておきなさい♪」"

[[dialogue]]
speaker = "せつな"
# 「あの、蘭美殿」
line = "「あの、蘭美殿」"

[[dialogue]]
speaker = "蘭美"
# 「ん？　せつな、どうかした？」
line = "「ん？　せつな、どうかした？」"

[[dialogue]]
speaker = "せつな"
# 「蘭美殿にも、こちら……どうか受け取って欲しいでござる！」
line = "「蘭美殿にも、こちら……どうか受け取って欲しいでござる！」"

[[dialogue]]
speaker = "蘭美"
# 「え？　これ、バレンタインチョコ？　私に？」
line = "「え？　これ、バレンタインチョコ？　私に？」"

[[dialogue]]
speaker = "せつな"
# 「蘭美殿には今回、大変お世話になりました。せつなにとって、どれだけお礼を言っても足らないと思う程に。なので……」
line = "「蘭美殿には今回、大変お世話になりました。せつなにとって、どれだけお礼を言っても足らないと思う程に。なので……」"

[[dialogue]]
speaker = "せつな"
# 「せつな、昨日最後に倒したゴーレムの素材をこっそり分けて取っておいたのでござる！」
line = "「せつな、昨日最後に倒したゴーレムの素材をこっそり分けて取っておいたのでござる！」"

[[dialogue]]
speaker = "蘭美"
# 「ふふっ、最強の義理チョコというわけね♪　ありがとう、せつな」
line = "「ふふっ、最強の義理チョコというわけね♪　ありがとう、せつな」"

[[dialogue]]
speaker = "蘭美"
# 「全く、この私より速くサプライズを仕掛けてくるなんて、大したものだわ」
line = "「全く、この私より速くサプライズを仕掛けてくるなんて、大したものだわ」"

[[dialogue]]
speaker = "蘭美"
# 「はい、せつな。お返しに、私からも義理チョコよ」
line = "「はい、せつな。お返しに、私からも義理チョコよ」"

[[dialogue]]
speaker = "せつな"
# 「え？　蘭美殿も、せつなに用意しておいてくれたのでござるか！？」
line = "「え？　蘭美殿も、せつなに用意しておいてくれたのでござるか！？」"

[[dialogue]]
speaker = "蘭美"
# 「今回頑張ったご褒美に、特別にね。メイド長としての、飴と鞭というやつよ」
line = "「今回頑張ったご褒美に、特別にね。メイド長としての、飴と鞭というやつよ」"

[[dialogue]]
speaker = "蘭美"
# 「光栄に思って、受け取りなさい♪」
line = "「光栄に思って、受け取りなさい♪」"

[[dialogue]]
speaker = "せつな"
# 「ありがとうございまする！　えへへ♪」
line = "「ありがとうございまする！　えへへ♪」"

[[dialogue]]
speaker = "蘭美"
# 「ふふんっ♪」
line = "「ふふんっ♪」"

[[dialogue]]
speaker = "unk"
# ２人は顔を見合わせて、ちょっと照れ臭そうに笑い合うのだった――
line = "２人は顔を見合わせて、ちょっと照れ臭そうに笑い合うのだった――"
