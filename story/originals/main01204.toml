[[dialogue]]
speaker = "unk"
# 第４話,雌伏,B
line = "第４話,雌伏,B"

[[dialogue]]
speaker = "unk"
# フィーニスの塔を脱した私はそれから<ruby=しふく>雌伏</ruby>の期間を過ごした。
line = "フィーニスの塔を脱した私はそれから<ruby>雌伏<rt>しふく</rt></ruby>の期間を過ごした。"

[[dialogue]]
speaker = "unk"
# 表向きは流星の騎士として世を支えながら、本心ではリクリエの訪れを願うようになった。
line = "表向きは流星の騎士として世を支えながら、本心ではリクリエの訪れを願うようになった。"

[[dialogue]]
speaker = "unk"
# しかし、ただその欲望のままに破壊を働くほど私も愚かではない。
line = "しかし、ただその欲望のままに破壊を働くほど私も愚かではない。"

[[dialogue]]
speaker = "unk"
# 女神より簒奪した霊力を使えば──逆に破滅を手繰り寄せるくらい、簡単なことではないか。
line = "女神より簒奪した霊力を使えば──逆に破滅を手繰り寄せるくらい、簡単なことではないか。"

[[dialogue]]
speaker = "unk"
# 新たに設立される学園の長に──私は前もって打診されていた件を引き受けることとした。
line = "新たに設立される学園の長に──私は前もって打診されていた件を引き受けることとした。"

[[dialogue]]
speaker = "unk"
# 星騎士──リクリエを願うにあたって最たるその弊害を排除するには、自ら糸を引くのが得策と考えた。
line = "星騎士──リクリエを願うにあたって最たるその弊害を排除するには、自ら糸を引くのが得策と考えた。"

[[dialogue]]
speaker = "unk"
# 女神の喪失に気づいた守護天使たちもまた<ruby=ゆうりょ>憂慮</ruby>すべき障害だった。
line = "女神の喪失に気づいた守護天使たちもまた<ruby>憂慮<rt>ゆうりょ</rt></ruby>すべき障害だった。"

[[dialogue]]
speaker = "unk"
# 接触してきたアルタイルにおけるリクリエの使徒──星見の長女<b>ではない</b>──と手を組み、六柱の守護天使を封印することに成功した。
line = "接触してきたアルタイルにおけるリクリエの使徒──星見の長女<b>ではない</b>──と手を組み、六柱の守護天使を封印することに成功した。"

[[dialogue]]
speaker = "unk"
# そうして私は、リクリエにまつわるあらゆる権力を掌握することに成功した。
line = "そうして私は、リクリエにまつわるあらゆる権力を掌握することに成功した。"

[[dialogue]]
speaker = "セイファート"
# （星騎士──守護天使──リクリエを阻む者たちはいずれも私の掌中にある。私を止めることは、誰にもできない──）
line = "（星騎士──守護天使──リクリエを阻む者たちはいずれも私の掌中にある。私を止めることは、誰にもできない──）"

[[dialogue]]
speaker = "unk"
# 無論、たまには流星の騎士としての懐かしき本分も果たした。それは所詮、カモフラージュにすぎなかったが。
line = "無論、たまには流星の騎士としての懐かしき本分も果たした。それは所詮、カモフラージュにすぎなかったが。"

[[dialogue]]
speaker = "unk"
# モンスターに襲われがちだという少年を助けたのも、そんな経緯と気まぐれの生んだ偶然にすぎない。
line = "モンスターに襲われがちだという少年を助けたのも、そんな経緯と気まぐれの生んだ偶然にすぎない。"

[[dialogue]]
speaker = "unk"
# すべては妻との再会がため──リクリエという機が訪れるのを祈って……。
line = "すべては妻との再会がため──リクリエという機が訪れるのを祈って……。"

[[dialogue]]
speaker = "unk"
# <b>仕込み</b>はそれで十分だと思っていた。
line = "<b>仕込み</b>はそれで十分だと思っていた。"

[[dialogue]]
speaker = "unk"
# 元より<ruby=ベガ>世界Ａ</ruby>では食い止めきれなかった３０００年越しの大波──こちらの戦力を脆弱化させれば、終焉は不可避なものになるだろうと。
line = "元より<ruby>世界Ａ<rt>ベガ</rt></ruby>では食い止めきれなかった３０００年越しの大波──こちらの戦力を脆弱化させれば、終焉は不可避なものになるだろうと。"

[[dialogue]]
speaker = "unk"
# しかし、イレギュラーが起こった。
line = "しかし、イレギュラーが起こった。"

[[dialogue]]
speaker = "unk"
# フィーニスの塔に何名かの生徒が導かれていた。
line = "フィーニスの塔に何名かの生徒が導かれていた。"

[[dialogue]]
speaker = "unk"
# 無論、いくら立ち入りを禁じているといえど、時には興味本位の学生が近づくことは避けられない。
line = "無論、いくら立ち入りを禁じているといえど、時には興味本位の学生が近づくことは避けられない。"

[[dialogue]]
speaker = "unk"
# しかし、彼らの塔の<b>攻略</b>ぶりは昔日の私を思わせるほどにつつがなかった。
line = "しかし、彼らの塔の<b>攻略</b>ぶりは昔日の私を思わせるほどにつつがなかった。"

[[dialogue]]
speaker = "unk"
# 緋宮クロト──九浄ヴィーナス──そして<ruby=マリウス>流星教皇</ruby>の娘。
line = "緋宮クロト──九浄ヴィーナス──そして<ruby>流星教皇<rt>マリウス</rt></ruby>の娘。"

[[dialogue]]
speaker = "unk"
# 彼らは明らかな異分子だった。
line = "彼らは明らかな異分子だった。"

[[dialogue]]
speaker = "unk"
# とりわけ緋宮クロトが入学して以来、流星市国にはびこるアステラの<ruby=せんめつ>殲滅</ruby>速度は著しく上がっていた。
line = "とりわけ緋宮クロトが入学して以来、流星市国にはびこるアステラの<ruby>殲滅<rt>せんめつ</rt></ruby>速度は著しく上がっていた。"

[[dialogue]]
speaker = "unk"
# 守護天使の封印によってリクリエの侵攻を早めたはずの私にとって、それは大きな誤算だった。
line = "守護天使の封印によってリクリエの侵攻を早めたはずの私にとって、それは大きな誤算だった。"

[[dialogue]]
speaker = "セイファート"
# （御前試合の時に見せた力の片鱗──あれは“塔”で得た知識によれば、やはり魔王の……）
line = "（御前試合の時に見せた力の片鱗──あれは“塔”で得た知識によれば、やはり魔王の……）"

[[dialogue]]
speaker = "ヴィーナス"
# 『ふっふーん。当然よ。私がクロトを導く役目だってのは、日誌に定められてた運命なんだから！』
line = "『ふっふーん。当然よ。私がクロトを導く役目だってのは、日誌に定められてた運命なんだから！』"

[[dialogue]]
speaker = "unk"
# やがて私はその絡繰りの一端に気づく。
line = "やがて私はその絡繰りの一端に気づく。"

[[dialogue]]
speaker = "unk"
# “九浄ヴィーナスはデネブ由来の人間である”──《円環》の守護天使と一時的な契約を交わすことで、その知見を得た。
line = "“九浄ヴィーナスはデネブ由来の人間である”──《円環》の守護天使と一時的な契約を交わすことで、その知見を得た。"

[[dialogue]]
speaker = "unk"
# 平行世界は本来交わらぬ存在。
line = "平行世界は本来交わらぬ存在。"

[[dialogue]]
speaker = "unk"
# だが、彼女は紛れもない<ruby=アルタイル>この世界</ruby>の異分子であり、また当人はそれを自覚できていないという。
line = "だが、彼女は紛れもない<ruby>この世界<rt>アルタイル</rt></ruby>の異分子であり、また当人はそれを自覚できていないという。"

[[dialogue]]
speaker = "セイファート"
# （デネブ……妻の<ruby=さら>拐</ruby>われた先にある世界線から来た存在。何らかの鍵を握っているのは必然）
line = "（デネブ……妻の<ruby>拐<rt>さら</rt></ruby>われた先にある世界線から来た存在。何らかの鍵を握っているのは必然）"

[[dialogue]]
speaker = "unk"
# そして彼女は特異なアイテム──『未来のことが記された日誌』を持っていた。
line = "そして彼女は特異なアイテム──『未来のことが記された日誌』を持っていた。"

[[dialogue]]
speaker = "unk"
# その機構が単なる未来予知でないことはすぐにわかった。
line = "その機構が単なる未来予知でないことはすぐにわかった。"

[[dialogue]]
speaker = "unk"
# デネブの世界を垣間見た私だからこそわかる──あちらはアルタイルよりも、いくらか時計が先に進んでいる。
line = "デネブの世界を垣間見た私だからこそわかる──あちらはアルタイルよりも、いくらか時計が先に進んでいる。"

[[dialogue]]
speaker = "unk"
# よってかの日誌が書き記している未来というのも、すなわち<b>こちら</b>のことではない。
line = "よってかの日誌が書き記している未来というのも、すなわち<b>こちら</b>のことではない。"

[[dialogue]]
speaker = "unk"
# すでに異なる世界で起きた、デネブの筋書きが記されているとみて間違いなかった。
line = "すでに異なる世界で起きた、デネブの筋書きが記されているとみて間違いなかった。"

[[dialogue]]
speaker = "unk"
# 私は当初──あの仮面の使徒と同様の存在なのかと疑った。
line = "私は当初──あの仮面の使徒と同様の存在なのかと疑った。"

[[dialogue]]
speaker = "unk"
# しかし九浄ヴィーナスの行動・言動はとても、リクリエに操られているようには見えない。
line = "しかし九浄ヴィーナスの行動・言動はとても、リクリエに操られているようには見えない。"

[[dialogue]]
speaker = "unk"
# それに、あの仮面の少女とは違い──九浄ヴィーナスにはそもそも<b>元となった人間体が存在していない</b>。
line = "それに、あの仮面の少女とは違い──九浄ヴィーナスにはそもそも<b>元となった人間体が存在していない</b>。"

[[dialogue]]
speaker = "unk"
# 密かに探りを入れて判明したことだが、これは確かだ。本体が失踪したわけでも、長い眠りについたわけでもなく。
line = "密かに探りを入れて判明したことだが、これは確かだ。本体が失踪したわけでも、長い眠りについたわけでもなく。"

[[dialogue]]
speaker = "unk"
# そこでようやく私も受け入れざるをえなくなった。
line = "そこでようやく私も受け入れざるをえなくなった。"

[[dialogue]]
speaker = "unk"
# 九浄ヴィーナスという人間──彼女は、<b>どこからかこちらの世界へやってきた</b>イレギュラーなのだと。
line = "九浄ヴィーナスという人間──彼女は、<b>どこからかこちらの世界へやってきた</b>イレギュラーなのだと。"

[[dialogue]]
speaker = "セイファート"
# （……危険だ）
line = "（……危険だ）"

[[dialogue]]
speaker = "unk"
# 果たして少女が何のための存在なのか──それは不明。
line = "果たして少女が何のための存在なのか──それは不明。"

[[dialogue]]
speaker = "unk"
# だが、少なくとも本来なかったはずの九浄ヴィーナスの干渉によって、こちらのリクリエ侵攻が食い止められているのは事実。
line = "だが、少なくとも本来なかったはずの九浄ヴィーナスの干渉によって、こちらのリクリエ侵攻が食い止められているのは事実。"

[[dialogue]]
speaker = "unk"
# なればどうあれ──黒騎士にとって認めるべくもない存在だ。
line = "なればどうあれ──黒騎士にとって認めるべくもない存在だ。"

[[dialogue]]
speaker = "unk"
# せっかく、策を<ruby=ろう>弄</ruby>して──リクリエを受け入れる準備が整ったというのに。
line = "せっかく、策を<ruby>弄<rt>ろう</rt></ruby>して──リクリエを受け入れる準備が整ったというのに。"

[[dialogue]]
speaker = "セイファート"
# （女神よ──あなたの与えたもうた天啓に感謝する。私はただ己が欲望のため、罪なき娘を手にかけてみせよう──）
line = "（女神よ──あなたの与えたもうた天啓に感謝する。私はただ己が欲望のため、罪なき娘を手にかけてみせよう──）"

[[dialogue]]
speaker = "unk"
# 誘拐の執行に<ruby=ちゅうちょ>躊躇</ruby>は必要なかった。
line = "誘拐の執行に<ruby>躊躇<rt>ちゅうちょ</rt></ruby>は必要なかった。"

[[dialogue]]
speaker = "unk"
# それが、リクリエという希望に魂を売り渡した、<ruby=わたし>黒騎士</ruby>の定めなのだから……。
line = "それが、リクリエという希望に魂を売り渡した、<ruby>黒騎士<rt>わたし</rt></ruby>の定めなのだから……。"
