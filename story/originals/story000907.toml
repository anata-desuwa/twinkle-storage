[[dialogue]]
speaker = "ユーリス"
# 「はぁ、はぁ、はぁ……。ひ、酷い目に遭った……」
line = "「はぁ、はぁ、はぁ……。ひ、酷い目に遭った……」"

[[dialogue]]
speaker = "セーラ"
# 「ふふ、これぞ女ならではの友情の深め合いだよ～。こういうのしたことなかったでしょ？」
line = "「ふふ、これぞ女ならではの友情の深め合いだよ～。こういうのしたことなかったでしょ？」"

[[dialogue]]
speaker = "ユウリ"
# 「すっげえもん見た……あれ普段は潰してごまかしてんのか……」
line = "「すっげえもん見た……あれ普段は潰してごまかしてんのか……」"

[[dialogue]]
speaker = "ユウリ"
# 「マジであたしよりあったし。なんならセーラ先輩よりあったし。男装女子に負けるとは……」
line = "「マジであたしよりあったし。なんならセーラ先輩よりあったし。男装女子に負けるとは……」"

[[dialogue]]
speaker = "unk"
# ユウリも十分大きいと思うけどな
line = "ユウリも十分大きいと思うけどな"

[[dialogue]]
speaker = "ユウリ"
# 「そ、そうか……？　って、どさくさに紛れて谷間覗き込んでんじゃねえよ！？」
line = "「そ、そうか……？　って、どさくさに紛れて谷間覗き込んでんじゃねえよ！？」"

[[dialogue]]
speaker = "ユーリス"
# 「……ふむ。隙あらば女の子の胸を、か。本当に会長の所作は男として生きる上での参考になるよ」
line = "「……ふむ。隙あらば女の子の胸を、か。本当に会長の所作は男として生きる上での参考になるよ」"

[[dialogue]]
speaker = "セーラ"
# 「いや、それは真似しちゃいけないヤツだから。王子はジェントルマンでいておくれ」
line = "「いや、それは真似しちゃいけないヤツだから。王子はジェントルマンでいておくれ」"

[[dialogue]]
speaker = "unk"
# それよりモンスターについてだけど
line = "それよりモンスターについてだけど"

[[dialogue]]
speaker = "ユウリ"
# 「急に真面目な話に戻るなよ」
line = "「急に真面目な話に戻るなよ」"

[[dialogue]]
speaker = "セーラ"
# 「でも妙なモンスターだったことには間違いないよねー？　ヘレナさんの言うとおり、どこからともなく急に現れたし」
line = "「でも妙なモンスターだったことには間違いないよねー？　ヘレナさんの言うとおり、どこからともなく急に現れたし」"

[[dialogue]]
speaker = "ユーリス"
# 「今回も外部から侵入した形跡はなかったよ。つまり、モンスターは最初から店内に隠れ潜んでいたんだ」
line = "「今回も外部から侵入した形跡はなかったよ。つまり、モンスターは最初から店内に隠れ潜んでいたんだ」"

[[dialogue]]
speaker = "ユウリ"
# 「それはそれで不思議だよな。セーラ先輩もユーリスも店内を隅々まで見回ってたんだろ？」
line = "「それはそれで不思議だよな。セーラ先輩もユーリスも店内を隅々まで見回ってたんだろ？」"

[[dialogue]]
speaker = "ユーリス"
# 「ああ。モンスターが現れた場所も見回っていたよ。その時は不審な点は見当たらなかった」
line = "「ああ。モンスターが現れた場所も見回っていたよ。その時は不審な点は見当たらなかった」"

[[dialogue]]
speaker = "セーラ"
# 「そもそもアステラは？　モンスターって普通、アステラから出てくるもんっしょ？　あのモンスター、うちらの常識から外れてるよねー？」
line = "「そもそもアステラは？　モンスターって普通、アステラから出てくるもんっしょ？　あのモンスター、うちらの常識から外れてるよねー？」"

[[dialogue]]
speaker = "unk"
# 新種のモンスターなのかも
line = "新種のモンスターなのかも"

[[dialogue]]
speaker = "ユーリス"
# 「……可能性はあるね。あのカジノに適応したような外見……通常のモンスターじゃないことは確かだ」
line = "「……可能性はあるね。あのカジノに適応したような外見……通常のモンスターじゃないことは確かだ」"

[[dialogue]]
speaker = "セーラ"
# 「めっちゃカードっぽい見た目してたもんね？　なんかそこにヒントがあるのかも」
line = "「めっちゃカードっぽい見た目してたもんね？　なんかそこにヒントがあるのかも」"

[[dialogue]]
speaker = "ユウリ"
# 「そういえばヘレナさんがなんか言ってませんでした？　前にモンスターが暴れた後、カードがなんちゃらって」
line = "「そういえばヘレナさんがなんか言ってませんでした？　前にモンスターが暴れた後、カードがなんちゃらって」"

[[dialogue]]
speaker = "unk"
# 言われてみれば──
line = "言われてみれば──"

[[dialogue]]
speaker = "ヘレナ"
# 「事件に関係あるかどうかはわからないが、私がモンスターを倒した後、妙なものが見つかってな」
line = "「事件に関係あるかどうかはわからないが、私がモンスターを倒した後、妙なものが見つかってな」"

[[dialogue]]
speaker = "ユーリス"
# 「妙なものですか？」
line = "「妙なものですか？」"

[[dialogue]]
speaker = "ヘレナ"
# 「ああ。カードが細切れになって散らばっていたのだ」
line = "「ああ。カードが細切れになって散らばっていたのだ」"

[[dialogue]]
speaker = "ヘレナ"
# 「負けが込んで苛ついた客が捨てた物かとは思ったが。今にして思えば、あそこまでズタズタにするものかとな」
line = "「負けが込んで苛ついた客が捨てた物かとは思ったが。今にして思えば、あそこまでズタズタにするものかとな」"

[[dialogue]]
speaker = "ヘレナ"
# 「そこまでマナーの悪い客がいれば、うちの優秀なスタッフなら気付くであろう。妙な話だ」
line = "「そこまでマナーの悪い客がいれば、うちの優秀なスタッフなら気付くであろう。妙な話だ」"

[[dialogue]]
speaker = "セーラ"
# 「なんか怪しいな～。うちも聞き込みしてる時に、従業員の人からカードの備品が減ってるって愚痴られたし」
line = "「なんか怪しいな～。うちも聞き込みしてる時に、従業員の人からカードの備品が減ってるって愚痴られたし」"

[[dialogue]]
speaker = "ユーリス"
# 「そういえば私も先輩ディーラーがぼやいているのを聞いたね。誰かがデックを無造作に放置してるって」
line = "「そういえば私も先輩ディーラーがぼやいているのを聞いたね。誰かがデックを無造作に放置してるって」"

[[dialogue]]
speaker = "ユウリ"
# 「つまりモンスターがカードを……ん？　いや、まさかそういうことか？」
line = "「つまりモンスターがカードを……ん？　いや、まさかそういうことか？」"

[[dialogue]]
speaker = "unk"
# 店内のカードをかき集めてみよう！
line = "店内のカードをかき集めてみよう！"

[[dialogue]]
speaker = "ユウリ"
# 「ああ、そうと決まれば善は急げだ！」
line = "「ああ、そうと決まれば善は急げだ！」"
