[[dialogue]]
speaker = "unk"
# 第５話,狙われた天界,B
line = "第５話,狙われた天界,B"

[[dialogue]]
speaker = "クロト"
# 「細かい情報はあるが、大まかには以上だ。じゃあアナたちから、アルタイルで起きたことを説明してくれないか？」
line = "「細かい情報はあるが、大まかには以上だ。じゃあアナたちから、アルタイルで起きたことを説明してくれないか？」"

[[dialogue]]
speaker = "アナ"
# 「わかりました。では改めて、天界襲撃について私たちから話を」
line = "「わかりました。では改めて、天界襲撃について私たちから話を」"

[[dialogue]]
speaker = "アナ"
# 「数時間前、新星・流星学園の両校は、ネビュラから連絡を受けました」
line = "「数時間前、新星・流星学園の両校は、ネビュラから連絡を受けました」"

[[dialogue]]
speaker = "アナ"
# 「極星従騎が天界に現れ、各地に存在する守護天使の神殿を襲撃している……と」
line = "「極星従騎が天界に現れ、各地に存在する守護天使の神殿を襲撃している……と」"

[[dialogue]]
speaker = "アナ"
# 「当然、極星学園の狙いはアルタイルを破滅させることでしょう。守護天使の神殿がなくなれば、天使たちの祈りは届かなくなり、守護天使の権能が麻痺します」
line = "「当然、極星学園の狙いはアルタイルを破滅させることでしょう。守護天使の神殿がなくなれば、天使たちの祈りは届かなくなり、守護天使の権能が麻痺します」"

[[dialogue]]
speaker = "アナ"
# 「オペレーション・ペンタグラムの時のように、守護天使の権能が機能しなくなれば、世界の崩壊は免れません」
line = "「オペレーション・ペンタグラムの時のように、守護天使の権能が機能しなくなれば、世界の崩壊は免れません」"

[[dialogue]]
speaker = "マトイ"
# 「さっきも言った通り、流星星徒会のみんなは、ネビュラの世界樹で先に天界に向かったよ」
line = "「さっきも言った通り、流星星徒会のみんなは、ネビュラの世界樹で先に天界に向かったよ」"

[[dialogue]]
speaker = "マトイ"
# 「本当はフィーニスの塔を通りたかったんだけど、またディザスターハンドに遭遇するかもしれないから、世界樹を使わせてもらってる」
line = "「本当はフィーニスの塔を通りたかったんだけど、またディザスターハンドに遭遇するかもしれないから、世界樹を使わせてもらってる」"

[[dialogue]]
speaker = "フィオナ"
# 「私も一緒に天界に行ければよかったのですが……残念ながら入れ違いになってしまいました」
line = "「私も一緒に天界に行ければよかったのですが……残念ながら入れ違いになってしまいました」"

[[dialogue]]
speaker = "マトイ"
# 「でも大丈夫。世界樹の魔力の充填が終わり次第、私たちも天界に向かうことになってるから」
line = "「でも大丈夫。世界樹の魔力の充填が終わり次第、私たちも天界に向かうことになってるから」"

[[dialogue]]
speaker = "サーシャ"
# 「シルヴィや蛍火ちゃんたち、新星の一部のプリマステラも先行してるわ～。私たちもこれから出発するし、一緒に合流しましょう」
line = "「シルヴィや蛍火ちゃんたち、新星の一部のプリマステラも先行してるわ～。私たちもこれから出発するし、一緒に合流しましょう」"

[[dialogue]]
speaker = "フィオナ"
# 「はい、よろしくお願いします」
line = "「はい、よろしくお願いします」"

[[dialogue]]
speaker = "クロト"
# 「ありがとう。状況は把握できたよ」
line = "「ありがとう。状況は把握できたよ」"

[[dialogue]]
speaker = "クロト"
# 「そういえば……俺たちがデネブに飛ばされた後、教皇庁はどうなったんだ？」
line = "「そういえば……俺たちがデネブに飛ばされた後、教皇庁はどうなったんだ？」"

[[dialogue]]
speaker = "アナ"
# 「その報告がまだでしたね」
line = "「その報告がまだでしたね」"

[[dialogue]]
speaker = "アナ"
# 「会長たちが吸い込まれた次元の穴は間もなく消失。会長たちが消えた以外に被害はありませんでした」
line = "「会長たちが吸い込まれた次元の穴は間もなく消失。会長たちが消えた以外に被害はありませんでした」"

[[dialogue]]
speaker = "クロト"
# 「なら教皇庁は無事なんだな……良かった」
line = "「なら教皇庁は無事なんだな……良かった」"

[[dialogue]]
speaker = "unk"
# デネブの教皇庁の惨状を思い出し、アルタイルに被害が及ばなかったことに安堵する。
line = "デネブの教皇庁の惨状を思い出し、アルタイルに被害が及ばなかったことに安堵する。"

[[dialogue]]
speaker = "unk"
# 流星市国の象徴ともいえる教皇庁が壊されるのは、市民として心が痛んだ。
line = "流星市国の象徴ともいえる教皇庁が壊されるのは、市民として心が痛んだ。"

[[dialogue]]
speaker = "ベアトリス"
# 「──！　チナちゃんは！？　チナちゃんはどうなったの？」
line = "「──！　チナちゃんは！？　チナちゃんはどうなったの？」"

[[dialogue]]
speaker = "シノ"
# 「それは私から説明させていただきますね」
line = "「それは私から説明させていただきますね」"

[[dialogue]]
speaker = "マトイ"
# 「学園長！」
line = "「学園長！」"

[[dialogue]]
speaker = "unk"
# レポートらしき書類を抱えながら、シノさんが星徒会室にやってきた。
line = "レポートらしき書類を抱えながら、シノさんが星徒会室にやってきた。"

[[dialogue]]
speaker = "シノ"
# 「チナさんは無力化の上、独房に改造した会議室で拘束させてもらっています」
line = "「チナさんは無力化の上、独房に改造した会議室で拘束させてもらっています」"

[[dialogue]]
speaker = "シノ"
# 「さすがに自由の身にはできませんが、大きな怪我もありませんし、彼女は元気ですよ。最初は頑なでしたけど、数日前から食事も摂ってくれるようになりました」
line = "「さすがに自由の身にはできませんが、大きな怪我もありませんし、彼女は元気ですよ。最初は頑なでしたけど、数日前から食事も摂ってくれるようになりました」"

[[dialogue]]
speaker = "ベアトリス"
# 「よかったぁ……ありがとうございます、学園長さん」
line = "「よかったぁ……ありがとうございます、学園長さん」"

[[dialogue]]
speaker = "シノ"
# 「いえいえ、私もみなさんが無事に帰ってきてくれて安心しています」
line = "「いえいえ、私もみなさんが無事に帰ってきてくれて安心しています」"

[[dialogue]]
speaker = "シノ"
# 「それと……梨緒さんにお渡ししたいものがありまして」
line = "「それと……梨緒さんにお渡ししたいものがありまして」"

[[dialogue]]
speaker = "梨緒"
# 「学園長が私に……？」
line = "「学園長が私に……？」"

[[dialogue]]
speaker = "unk"
# シノはそう言って、クリアファイルに収められた書類を手渡す。
line = "シノはそう言って、クリアファイルに収められた書類を手渡す。"

[[dialogue]]
speaker = "シノ"
# 「こちらはレナーテ・<ruby=ジグ>Ｚ</ruby>・サイフリートさんの資料です。この世界の──ですが」
line = "「こちらはレナーテ・<ruby>Ｚ<rt>ジグ</rt></ruby>・サイフリートさんの資料です。この世界の──ですが」"

[[dialogue]]
speaker = "梨緒"
# 「！　ジグの……」
line = "「！　ジグの……」"

[[dialogue]]
speaker = "unk"
# 梨緒は早速ファイルに目を通すが、その中にある記述を見つけて肩を落とした。
line = "梨緒は早速ファイルに目を通すが、その中にある記述を見つけて肩を落とした。"

[[dialogue]]
speaker = "梨緒"
# 「幼少時にモンスターに襲われて死亡……ジグもなのか」
line = "「幼少時にモンスターに襲われて死亡……ジグもなのか」"

[[dialogue]]
speaker = "シノ"
# 「アルタイルの梨緒さんも、モンスターに襲われて亡くなったとお聞きしました」
line = "「アルタイルの梨緒さんも、モンスターに襲われて亡くなったとお聞きしました」"

[[dialogue]]
speaker = "シノ"
# 「おそらくベガではアルタイルと違う動き方をした勢力がいて、その影響なのでしょう。それが学園か、ネビュラか、それともリクリエかはわかりませんが」
line = "「おそらくベガではアルタイルと違う動き方をした勢力がいて、その影響なのでしょう。それが学園か、ネビュラか、それともリクリエかはわかりませんが」"

[[dialogue]]
speaker = "シノ"
# 「それともうひとつ、気になる内容があります」
line = "「それともうひとつ、気になる内容があります」"

[[dialogue]]
speaker = "unk"
# シノが資料の１ページを指し示す。そこに記されていたのは……
line = "シノが資料の１ページを指し示す。そこに記されていたのは……"

[[dialogue]]
speaker = "梨緒"
# 「一族の能力？」
line = "「一族の能力？」"

[[dialogue]]
speaker = "シノ"
# 「はい。彼女の一族は伝説の英雄ジークフリート、あるいはシグルドの子孫と言われており、特殊な能力を発現することがあるそうです」
line = "「はい。彼女の一族は伝説の英雄ジークフリート、あるいはシグルドの子孫と言われており、特殊な能力を発現することがあるそうです」"

[[dialogue]]
speaker = "unk"
# ジークフリートとは『ニーベルンゲンの歌』で語られる、竜殺しの英雄。
line = "ジークフリートとは『ニーベルンゲンの歌』で語られる、竜殺しの英雄。"

[[dialogue]]
speaker = "unk"
# シグルドも源流を同じくする北欧の英雄で、両者とも邪竜ファフニールを討伐して、特殊な力を得たと伝承されている。
line = "シグルドも源流を同じくする北欧の英雄で、両者とも邪竜ファフニールを討伐して、特殊な力を得たと伝承されている。"

[[dialogue]]
speaker = "シノ"
# 「レナーテさんもまた、竜殺しの英雄の力を受け継いでいるかもしれません」
line = "「レナーテさんもまた、竜殺しの英雄の力を受け継いでいるかもしれません」"

[[dialogue]]
speaker = "アポロ"
# 「なんだそれカッコいいな！」
line = "「なんだそれカッコいいな！」"

[[dialogue]]
speaker = "アポロ"
# 「……なんて言ってられないか。ジグは今は敵だからな」
line = "「……なんて言ってられないか。ジグは今は敵だからな」"

[[dialogue]]
speaker = "梨緒"
# 「確かに昔、能力について言っていたような……詳しくは教えてくれなかったが」
line = "「確かに昔、能力について言っていたような……詳しくは教えてくれなかったが」"

[[dialogue]]
speaker = "梨緒"
# 「『不可能が可能になるような大層な力じゃない』……と言っていた気がする」
line = "「『不可能が可能になるような大層な力じゃない』……と言っていた気がする」"

[[dialogue]]
speaker = "アポロ"
# 「なんだそりゃ、よくわからないな」
line = "「なんだそりゃ、よくわからないな」"

[[dialogue]]
speaker = "ナターシャ"
# 「何かしてくるかも……というか今までもその力を使ってたのかもしれないわけか」
line = "「何かしてくるかも……というか今までもその力を使ってたのかもしれないわけか」"

[[dialogue]]
speaker = "クロト"
# 「ジグの能力については俺たちも気を付けておこう。リクリエの使徒の力に加えて、特殊な力があるのは厄介だな」
line = "「ジグの能力については俺たちも気を付けておこう。リクリエの使徒の力に加えて、特殊な力があるのは厄介だな」"

[[dialogue]]
speaker = "アナ"
# 「ひとまず伝達する事項は以上です。あとは魔力の充填が終わるまで待機ですが……」
line = "「ひとまず伝達する事項は以上です。あとは魔力の充填が終わるまで待機ですが……」"

[[dialogue]]
speaker = "ベアトリス"
# 「あの……みんな、シノ学園長。私、チナちゃんと２人きりで話をしたいんだけど、いいかな？　デネブでわかったことをチナちゃんにも話したいの」
line = "「あの……みんな、シノ学園長。私、チナちゃんと２人きりで話をしたいんだけど、いいかな？　デネブでわかったことをチナちゃんにも話したいの」"

[[dialogue]]
speaker = "unk"
# ベアトリスの意図は理解できる。
line = "ベアトリスの意図は理解できる。"

[[dialogue]]
speaker = "unk"
# しかし彼女は今、複雑な立場にあった。
line = "しかし彼女は今、複雑な立場にあった。"

[[dialogue]]
speaker = "ベアトリス"
# 「私は両方の世界を救いたいと思ってるけど、チナちゃんは今も大事な仲間だよ」
line = "「私は両方の世界を救いたいと思ってるけど、チナちゃんは今も大事な仲間だよ」"

[[dialogue]]
speaker = "ベアトリス"
# 「でもチナちゃんを勝手に逃がしたりしない。約束する」
line = "「でもチナちゃんを勝手に逃がしたりしない。約束する」"

[[dialogue]]
speaker = "シノ"
# 「ベアトリスさんと接触することで、チナさんの態度が軟化する可能性は十分考えられます」
line = "「ベアトリスさんと接触することで、チナさんの態度が軟化する可能性は十分考えられます」"

[[dialogue]]
speaker = "梨緒"
# 「私はベアトを信じる。極星の副会長であろうと、ベアトは私たちの仲間だ」
line = "「私はベアトを信じる。極星の副会長であろうと、ベアトは私たちの仲間だ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうよ。でなければ一緒にアルタイルに戻ってきたりしないんだから」
line = "「そうよ。でなければ一緒にアルタイルに戻ってきたりしないんだから」"

[[dialogue]]
speaker = "アナ"
# 「私たち新星星徒会は、会長に判断を委ねます」
line = "「私たち新星星徒会は、会長に判断を委ねます」"

[[dialogue]]
speaker = "フィオナ"
# 「新星学園のことですし、私が口を挟むことはありません。もちろんベアトリスさんを信じていますけど」
line = "「新星学園のことですし、私が口を挟むことはありません。もちろんベアトリスさんを信じていますけど」"

[[dialogue]]
speaker = "シノ"
# 「あとは私と会長さんが許可を出せば問題ないと思いますが……」
line = "「あとは私と会長さんが許可を出せば問題ないと思いますが……」"

[[dialogue]]
speaker = "クロト"
# 「新星学園の星徒会長として許可します。俺もベアトリスを信じていますから」
line = "「新星学園の星徒会長として許可します。俺もベアトリスを信じていますから」"

[[dialogue]]
speaker = "シノ"
# 「……であればＯＫですね。星徒会長であるあなたがそこまで言うのなら、私から言うことはありません」
line = "「……であればＯＫですね。星徒会長であるあなたがそこまで言うのなら、私から言うことはありません」"

[[dialogue]]
speaker = "ベアトリス"
# 「ありがとうございます！」
line = "「ありがとうございます！」"

[[dialogue]]
speaker = "ナターシャ"
# 「だけど１人で大丈夫？　デネブに行った時、梨緒とはこじれたよね？」
line = "「だけど１人で大丈夫？　デネブに行った時、梨緒とはこじれたよね？」"

[[dialogue]]
speaker = "ベアトリス"
# 「う……それを言われると痛い……」
line = "「う……それを言われると痛い……」"

[[dialogue]]
speaker = "ベアトリス"
# 「でも、ちゃんと話すよ。拒絶されるかもしれないけど、今度は逃げないから」
line = "「でも、ちゃんと話すよ。拒絶されるかもしれないけど、今度は逃げないから」"

[[dialogue]]
speaker = "梨緒"
# 「ああ、任せたぞ、ベアト。君ならきっと大丈夫だ」
line = "「ああ、任せたぞ、ベアト。君ならきっと大丈夫だ」"

[[dialogue]]
speaker = "アポロ"
# 「ま、うっかりには気を付けろよ。デネブで何があったか後で聞かせてもらうからな」
line = "「ま、うっかりには気を付けろよ。デネブで何があったか後で聞かせてもらうからな」"

[[dialogue]]
speaker = "ベアトリス"
# 「うん、ありがとう。それじゃあ行ってくるね！」
line = "「うん、ありがとう。それじゃあ行ってくるね！」"
