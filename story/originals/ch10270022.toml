[[dialogue]]
speaker = "unk"
# 第２話,思わぬ再会,P
line = "第２話,思わぬ再会,P"

[[dialogue]]
speaker = "unk"
# 今日は魔法の指導のために、ネビュラの魔女に来てもらっている。
line = "今日は魔法の指導のために、ネビュラの魔女に来てもらっている。"

[[dialogue]]
speaker = "イニシュ"
# 「では教えたように、目をつぶってみてください」
line = "「では教えたように、目をつぶってみてください」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「……なるほど。魔法なら直接、ドローンと視界を共有できるんですね。今までモニター越しだったから新鮮な感じです」
line = "「……なるほど。魔法なら直接、ドローンと視界を共有できるんですね。今までモニター越しだったから新鮮な感じです」"

[[dialogue]]
speaker = "unk"
# 俺の周りを球体の小型ドローン──通称アイドローンが旋回する。これを通して俺を見ているようだ。
line = "俺の周りを球体の小型ドローン──通称アイドローンが旋回する。これを通して俺を見ているようだ。"

[[dialogue]]
speaker = "unk"
# コハルコさんの覚醒によって、ドローンは魔法にも対応した<ruby=使い魔>ファミリア</ruby>・ドローンとなっていた。
line = "コハルコさんの覚醒によって、ドローンは魔法にも対応した<ruby>ファミリア<rt>使い魔</rt></ruby>・ドローンとなっていた。"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「ふふっ。会長さん、また寝ぐせがついてる。あとで直そうね」
line = "「ふふっ。会長さん、また寝ぐせがついてる。あとで直そうね」"

[[dialogue]]
speaker = "イニシュ"
# 「魔法は応用によって様々なことができます。あなたなら上手く使いこなせるでしょう」
line = "「魔法は応用によって様々なことができます。あなたなら上手く使いこなせるでしょう」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「ありがとうございます。イニシュさんにそう言ってもらえると嬉しいですね」
line = "「ありがとうございます。イニシュさんにそう言ってもらえると嬉しいですね」"

[[dialogue]]
speaker = "unk"
# ふたりは知り合い？
line = "ふたりは知り合い？"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「知り合い、というか常連さんかな。うちのパーツショップのお客さんなんだ」
line = "「知り合い、というか常連さんかな。うちのパーツショップのお客さんなんだ」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「イニシュさんが魔女だって知ったのはけっこう後だったかな。よく来てくれるからプロゲーマーさんかと思った」
line = "「イニシュさんが魔女だって知ったのはけっこう後だったかな。よく来てくれるからプロゲーマーさんかと思った」"

[[dialogue]]
speaker = "イニシュ"
# 「私のゲーミングＰＣは彼女が<ruby=アセン>組立</ruby>したものです。いつも頼りにしています」
line = "「私のゲーミングＰＣは彼女が<ruby>組立<rt>アセン</rt></ruby>したものです。いつも頼りにしています」"

[[dialogue]]
speaker = "イニシュ"
# 「初代光の魔女であるディアナには助けられました。特殊な形とはいえ、あなたもその系譜に連なる者であるならば、ここでその恩を返しましょう」
line = "「初代光の魔女であるディアナには助けられました。特殊な形とはいえ、あなたもその系譜に連なる者であるならば、ここでその恩を返しましょう」"

[[dialogue]]
speaker = "イニシュ"
# 「なので訓練は厳しくします。それがあなたのためになりますから」
line = "「なので訓練は厳しくします。それがあなたのためになりますから」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「はい！　胸を借りるつもりで──行きます！」
line = "「はい！　胸を借りるつもりで──行きます！」"

[[dialogue]]
speaker = "コハルコ"
# 「疲れた～。会長さん、また訓練に付き合わせちゃってごめんね」
line = "「疲れた～。会長さん、また訓練に付き合わせちゃってごめんね」"

[[dialogue]]
speaker = "unk"
# いえ、俺が一緒にいたいだけなので
line = "いえ、俺が一緒にいたいだけなので"

[[dialogue]]
speaker = "コハルコ"
# 「ふふ、ありがとう。会長さんのそういうところ、好きだな」
line = "「ふふ、ありがとう。会長さんのそういうところ、好きだな」"

[[dialogue]]
speaker = "コハルコ"
# 「お腹も空いたし、何か軽く食べようか。すみませーん」
line = "「お腹も空いたし、何か軽く食べようか。すみませーん」"

[[dialogue]]
speaker = "トリュファイナ"
# 「はい、いらっしゃいませ」
line = "「はい、いらっしゃいませ」"

[[dialogue]]
speaker = "コハルコ"
# 「フライドチキンふたつくださ……あぁーーーーーーーっ！」
line = "「フライドチキンふたつくださ……あぁーーーーーーーっ！」"

[[dialogue]]
speaker = "コハルコ"
# 「ト、トリュファイナさん！？　どうしてこんなところに！？」
line = "「ト、トリュファイナさん！？　どうしてこんなところに！？」"

[[dialogue]]
speaker = "トリュファイナ"
# 「ふふふ。実は私、ここで働いているのです。フライドチキンもうまく揚げられるようになったのですよ！」
line = "「ふふふ。実は私、ここで働いているのです。フライドチキンもうまく揚げられるようになったのですよ！」"

[[dialogue]]
speaker = "コハルコ"
# 「いえ、チキンのことは聞いてないんですが……ちょっと、アニマさーん！」
line = "「いえ、チキンのことは聞いてないんですが……ちょっと、アニマさーん！」"

[[dialogue]]
speaker = "アニマ"
# 「おや、コハルコと会長ではないカ。新人店員が何か失礼したなら申し訳ナイ」
line = "「おや、コハルコと会長ではないカ。新人店員が何か失礼したなら申し訳ナイ」"

[[dialogue]]
speaker = "コハルコ"
# 「いや、そうじゃなくて……トリュファイナさん……魔女の偉い人がどうしてここに？」
line = "「いや、そうじゃなくて……トリュファイナさん……魔女の偉い人がどうしてここに？」"

[[dialogue]]
speaker = "アニマ"
# 「彼女は肉体の死後、魂が現世にとどまっていたらしい。アニマは彼女に義体を提供しただけダ。その恩返しとして購買を手伝ってもらっている」
line = "「彼女は肉体の死後、魂が現世にとどまっていたらしい。アニマは彼女に義体を提供しただけダ。その恩返しとして購買を手伝ってもらっている」"

[[dialogue]]
speaker = "コハルコ"
# 「えぇ……魔女の人たちには知られないように気を付けなきゃ」
line = "「えぇ……魔女の人たちには知られないように気を付けなきゃ」"

[[dialogue]]
speaker = "トリュファイナ"
# 「アニマ様、少し休憩をいただいてもよろしいでしょうか？」
line = "「アニマ様、少し休憩をいただいてもよろしいでしょうか？」"

[[dialogue]]
speaker = "アニマ"
# 「構わないトモ。行ってきたまえ」
line = "「構わないトモ。行ってきたまえ」"

[[dialogue]]
speaker = "トリュファイナ"
# 「はい、ありがとうございます。ではコハルコさん、少しお話ししましょうか。魔王様もどうかご一緒に」
line = "「はい、ありがとうございます。ではコハルコさん、少しお話ししましょうか。魔王様もどうかご一緒に」"

[[dialogue]]
speaker = "トリュファイナ"
# 「コハルコさんはあれからお元気でしたか？」
line = "「コハルコさんはあれからお元気でしたか？」"

[[dialogue]]
speaker = "コハルコ"
# 「はい。トリュファイナさんも……あなたは、私が会ったトリュファイナさんでいいんですよね？」
line = "「はい。トリュファイナさんも……あなたは、私が会ったトリュファイナさんでいいんですよね？」"

[[dialogue]]
speaker = "トリュファイナ"
# 「ええ。あなたのことはちゃんと覚えていますよ」
line = "「ええ。あなたのことはちゃんと覚えていますよ」"

[[dialogue]]
speaker = "コハルコ"
# 「いくつか聞きたいことがあって……魔力に目覚めてから変わったことがあるんです」
line = "「いくつか聞きたいことがあって……魔力に目覚めてから変わったことがあるんです」"

[[dialogue]]
speaker = "コハルコ"
# 「お母さんの体調が急に良くなって、たまたまかと思ったんですけど、お父さんも肩こりしなくなったらしくて」
line = "「お母さんの体調が急に良くなって、たまたまかと思ったんですけど、お父さんも肩こりしなくなったらしくて」"

[[dialogue]]
speaker = "トリュファイナ"
# 「私の力だと思います。今のあなたからは微弱な回復の魔力が常に出ているのです」
line = "「私の力だと思います。今のあなたからは微弱な回復の魔力が常に出ているのです」"

[[dialogue]]
speaker = "コハルコ"
# 「私も睡眠時間が短くても平気になったんです。この前なんか徹夜でエ……ゲームしてもへっちゃらで」
line = "「私も睡眠時間が短くても平気になったんです。この前なんか徹夜でエ……ゲームしてもへっちゃらで」"

[[dialogue]]
speaker = "トリュファイナ"
# 「それも私の力ですが、ちゃんと寝てください！　お体に障りますっ！」
line = "「それも私の力ですが、ちゃんと寝てください！　お体に障りますっ！」"

[[dialogue]]
speaker = "コハルコ"
# 「じゃあ、私のみんなを加速させる術も……」
line = "「じゃあ、私のみんなを加速させる術も……」"

[[dialogue]]
speaker = "トリュファイナ"
# 「……何ですか、それ……加速なんて知りません、よ？」
line = "「……何ですか、それ……加速なんて知りません、よ？」"

[[dialogue]]
speaker = "コハルコ"
# 「え」
line = "「え」"

[[dialogue]]
speaker = "unk"
# コハルコさんの星術は味方に最適化を促し、行動速度を上昇させる……のだが、その万能さはもはや最適化の域を遥かに超えている。
line = "コハルコさんの星術は味方に最適化を促し、行動速度を上昇させる……のだが、その万能さはもはや最適化の域を遥かに超えている。"

[[dialogue]]
speaker = "unk"
# もしかすると、無意識のうちに何か魔法を使っていたのではとも思っていたが、そうでもないらしい。
line = "もしかすると、無意識のうちに何か魔法を使っていたのではとも思っていたが、そうでもないらしい。"

[[dialogue]]
speaker = "トリュファイナ"
# 「コハルコさん。人と違う生まれでも、誰かと同じ力を与えられようとも……あなたはあなたなのです。気にすることはありません」
line = "「コハルコさん。人と違う生まれでも、誰かと同じ力を与えられようとも……あなたはあなたなのです。気にすることはありません」"

[[dialogue]]
speaker = "コハルコ"
# 「トリュファイナさん……」
line = "「トリュファイナさん……」"

[[dialogue]]
speaker = "アニマ"
# 「歓談中失礼。少しいいカナ？　コハルコ、ちょうどいい機会だからトリュファイナにＤＩＳＣの使い方を教えてやってくれ。アニマは人に教えるのは苦手でナ」
line = "「歓談中失礼。少しいいカナ？　コハルコ、ちょうどいい機会だからトリュファイナにＤＩＳＣの使い方を教えてやってくれ。アニマは人に教えるのは苦手でナ」"

[[dialogue]]
speaker = "アニマ"
# 「サーシャやシルヴィを始め、多くの天使や魔族にＤＩＳＣの使い方を叩き込んできたキミならできるサ。では頼んだゾ」
line = "「サーシャやシルヴィを始め、多くの天使や魔族にＤＩＳＣの使い方を叩き込んできたキミならできるサ。では頼んだゾ」"

[[dialogue]]
speaker = "コハルコ"
# 「え、そんな急に言われても……」
line = "「え、そんな急に言われても……」"

[[dialogue]]
speaker = "トリュファイナ"
# 「コハルコさんが教えてくださるなら百人力です！　どうかご指導お願いします！」
line = "「コハルコさんが教えてくださるなら百人力です！　どうかご指導お願いします！」"

[[dialogue]]
speaker = "コハルコ"
# 「……はい。私でよければ」
line = "「……はい。私でよければ」"

[[dialogue]]
speaker = "unk"
# 眼をキラキラさせるトリュファイナさんに抗えるはずもなく、つきっきりでＤＩＳＣの使い方を教えるコハルコさんだった。
line = "眼をキラキラさせるトリュファイナさんに抗えるはずもなく、つきっきりでＤＩＳＣの使い方を教えるコハルコさんだった。"

[[dialogue]]
speaker = "トリュファイナ"
# 「コハルコさん、どうしましょう！　画面いっぱいに女の子が……」
line = "「コハルコさん、どうしましょう！　画面いっぱいに女の子が……」"

[[dialogue]]
speaker = "コハルコ"
# 「それはエッチな広告だから踏んじゃダメ～！」
line = "「それはエッチな広告だから踏んじゃダメ～！」"
