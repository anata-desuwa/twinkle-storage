[[dialogue]]
speaker = "unk"
# 初夏に出現した新種モンスターの出現騒動は……果たして、ノヴァフォームに覚醒したマトイの手によって幕が下ろされた。
line = "初夏に出現した新種モンスターの出現騒動は……果たして、ノヴァフォームに覚醒したマトイの手によって幕が下ろされた。"

[[dialogue]]
speaker = "unk"
# 大型モンスターの討伐に成功すると同時に、小型モンスターの大群も消滅。学園エリア一帯の安全が確認された。
line = "大型モンスターの討伐に成功すると同時に、小型モンスターの大群も消滅。学園エリア一帯の安全が確認された。"

[[dialogue]]
speaker = "unk"
# 民間人への被害は……残念ながら怪我をした人たちも多かったが、一方で奇跡的に死者は出なかった。
line = "民間人への被害は……残念ながら怪我をした人たちも多かったが、一方で奇跡的に死者は出なかった。"

[[dialogue]]
speaker = "unk"
# 俺たちの訓練は、ちゃんと人々の命を守る結果に繋がったのである。
line = "俺たちの訓練は、ちゃんと人々の命を守る結果に繋がったのである。"

[[dialogue]]
speaker = "unk"
# 戦闘終了後、各本面への連絡を済ませたあと──
line = "戦闘終了後、各本面への連絡を済ませたあと──"

[[dialogue]]
speaker = "マトイ"
# 「ふぅ……」
line = "「ふぅ……」"

[[dialogue]]
speaker = "unk"
# 近くのベンチに腰かけて休んでいたマトイに、俺は声をかける。
line = "近くのベンチに腰かけて休んでいたマトイに、俺は声をかける。"

[[dialogue]]
speaker = "マトイ"
# 「あ……会長」
line = "「あ……会長」"

[[dialogue]]
speaker = "マトイ"
# 「――大丈夫。体は全然平気。ただちょっと、気が抜けちゃっただけだから……」
line = "「――大丈夫。体は全然平気。ただちょっと、気が抜けちゃっただけだから……」"

[[dialogue]]
speaker = "マトイ"
# 「そうだ、ありがとね、会長。ほら、私のこと信じるって言ってくれたでしょ」
line = "「そうだ、ありがとね、会長。ほら、私のこと信じるって言ってくれたでしょ」"

[[dialogue]]
speaker = "マトイ"
# 「あそこでアルケインコードを使ってくれたから、私は勝つことができた」
line = "「あそこでアルケインコードを使ってくれたから、私は勝つことができた」"

[[dialogue]]
speaker = "unk"
# よく頑張ったな
line = "よく頑張ったな"

[[dialogue]]
speaker = "マトイ"
# 「あ……！　うん♪　えへへ……♪」
line = "「あ……！　うん♪　えへへ……♪」"

[[dialogue]]
speaker = "マハムート"
# 「マトイ」
line = "「マトイ」"

[[dialogue]]
speaker = "マトイ"
# 「マム！」
line = "「マム！」"

[[dialogue]]
speaker = "unk"
# マトイがベンチから立ち上がろうとすると――
line = "マトイがベンチから立ち上がろうとすると――"

[[dialogue]]
speaker = "マハムート"
# 「こら、無理に立ち上がらなくていいから。ぱっと見、体は回復しているように見えるけど、学園に帰ったら１度保健室に行って、診てもらいなさい」
line = "「こら、無理に立ち上がらなくていいから。ぱっと見、体は回復しているように見えるけど、学園に帰ったら１度保健室に行って、診てもらいなさい」"

[[dialogue]]
speaker = "マトイ"
# 「は、はい。じゃなかった……イエス・マム！」
line = "「は、はい。じゃなかった……イエス・マム！」"

[[dialogue]]
speaker = "マハムート"
# 「今はそういうのはいいわ。マトイ――」
line = "「今はそういうのはいいわ。マトイ――」"

[[dialogue]]
speaker = "マハムート"
# 「今日の貴方は私よりも強かった。竜の私が認めてあげるのだから、自信を持って誇りなさい」
line = "「今日の貴方は私よりも強かった。竜の私が認めてあげるのだから、自信を持って誇りなさい」"

[[dialogue]]
speaker = "unk"
# それから、座っているマトイの頭に手を置いて――
line = "それから、座っているマトイの頭に手を置いて――"

[[dialogue]]
speaker = "マハムート"
# 「……よくやったわね。今日だけは特別に褒めてあげるわ」
line = "「……よくやったわね。今日だけは特別に褒めてあげるわ」"

[[dialogue]]
speaker = "unk"
# マムはそっと頭を撫でながら、微笑んだ。
line = "マムはそっと頭を撫でながら、微笑んだ。"

[[dialogue]]
speaker = "マトイ"
# 「……！　マム……！」
line = "「……！　マム……！」"

[[dialogue]]
speaker = "アム"
# 「マトイ先輩～！」
line = "「マトイ先輩～！」"

[[dialogue]]
speaker = "マトイ"
# 「アムちゃん！」
line = "「アムちゃん！」"

[[dialogue]]
speaker = "アム"
# 「みんな、ここにいたんですね！　探してたんですよ～！」
line = "「みんな、ここにいたんですね！　探してたんですよ～！」"

[[dialogue]]
speaker = "アム"
# 「マトイ先輩！　新フォームでの活躍、めっちゃ凄かったです！　カッコよくて、トキめいちゃいました！」
line = "「マトイ先輩！　新フォームでの活躍、めっちゃ凄かったです！　カッコよくて、トキめいちゃいました！」"

[[dialogue]]
speaker = "マトイ"
# 「アムちゃんからそう言ってもらえるなんて、なんか照れちゃうね……」
line = "「アムちゃんからそう言ってもらえるなんて、なんか照れちゃうね……」"

[[dialogue]]
speaker = "アム"
# 「あんなの見せられちゃったら、それはもう！　あたしも頑張るぞって、闘志でメラメラ燃えて来ちゃいますよ！」
line = "「あんなの見せられちゃったら、それはもう！　あたしも頑張るぞって、闘志でメラメラ燃えて来ちゃいますよ！」"

[[dialogue]]
speaker = "アム"
# 「だから、今日からマトイ先輩も、あたしのライバルです！」
line = "「だから、今日からマトイ先輩も、あたしのライバルです！」"

[[dialogue]]
speaker = "マトイ"
# 「え？　私が、アムちゃんの……？」
line = "「え？　私が、アムちゃんの……？」"

[[dialogue]]
speaker = "アム"
# 「はい！　同じ盾使いとして、これからもお互い切磋琢磨して行きましょう！　あと……また一緒におでかけデートもしましょう！」
line = "「はい！　同じ盾使いとして、これからもお互い切磋琢磨して行きましょう！　あと……また一緒におでかけデートもしましょう！」"

[[dialogue]]
speaker = "unk"
# そう言って、アムは開いた手を差し出す。
line = "そう言って、アムは開いた手を差し出す。"

[[dialogue]]
speaker = "マトイ"
# 「……！　うん♪　これからもよろしくね、アムちゃん」
line = "「……！　うん♪　これからもよろしくね、アムちゃん」"

[[dialogue]]
speaker = "アム"
# 「はい♪　マトイ先輩！」
line = "「はい♪　マトイ先輩！」"

[[dialogue]]
speaker = "unk"
# マトイがアムの手を取り、２人は握手を交わす。
line = "マトイがアムの手を取り、２人は握手を交わす。"

[[dialogue]]
speaker = "unk"
# と、その時だった。
line = "と、その時だった。"

[[dialogue]]
speaker = "女の子"
# 「あの……お姉さん！」
line = "「あの……お姉さん！」"

[[dialogue]]
speaker = "マトイ"
# 「あなたはさっきの……」
line = "「あなたはさっきの……」"

[[dialogue]]
speaker = "unk"
# 声をかけて来たのは、マトイが身を呈して守った、星力持ちの女の子であった。
line = "声をかけて来たのは、マトイが身を呈して守った、星力持ちの女の子であった。"

[[dialogue]]
speaker = "マトイ"
# 「あれから大丈夫だった？　怪我はない？」
line = "「あれから大丈夫だった？　怪我はない？」"

[[dialogue]]
speaker = "女の子"
# 「は、はい。さっき救急隊の人が確認してくれて、体のどこにも異常はないって」
line = "「は、はい。さっき救急隊の人が確認してくれて、体のどこにも異常はないって」"

[[dialogue]]
speaker = "マトイ"
# 「そう、無事でよかった」
line = "「そう、無事でよかった」"

[[dialogue]]
speaker = "女の子"
# 「あの……私のこと、助けてくれてありがとうございました！」
line = "「あの……私のこと、助けてくれてありがとうございました！」"

[[dialogue]]
speaker = "マトイ"
# 「どういたしまして。私も、あなたを守ることができてよかった」
line = "「どういたしまして。私も、あなたを守ることができてよかった」"

[[dialogue]]
speaker = "女の子"
# 「それで、私……お姉さんに伝えたいことがあって！」
line = "「それで、私……お姉さんに伝えたいことがあって！」"

[[dialogue]]
speaker = "マトイ"
# 「私に？」
line = "「私に？」"

[[dialogue]]
speaker = "女の子"
# 「私……星力を持っているせいで、これまでもモンスターに狙われることが何度もあって……その度に怖くて、もう嫌だって思ってました」
line = "「私……星力を持っているせいで、これまでもモンスターに狙われることが何度もあって……その度に怖くて、もう嫌だって思ってました」"

[[dialogue]]
speaker = "女の子"
# 「でも……今日のお姉さん、すごくカッコよかった！　私もお姉さんみたいに強くなりたいって、そう思ったんです！」
line = "「でも……今日のお姉さん、すごくカッコよかった！　私もお姉さんみたいに強くなりたいって、そう思ったんです！」"

[[dialogue]]
speaker = "女の子"
# 「私……今日から星騎士を目指します！」
line = "「私……今日から星騎士を目指します！」"

[[dialogue]]
speaker = "マトイ"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "女の子"
# 「だから……お名前を教えてくれませんか？　私、お姉さんを目指して頑張ります！」
line = "「だから……お名前を教えてくれませんか？　私、お姉さんを目指して頑張ります！」"

[[dialogue]]
speaker = "マトイ"
# 「あ、えっと……」
line = "「あ、えっと……」"

[[dialogue]]
speaker = "unk"
# マトイは驚いて動揺している様子だったが、深呼吸をして――
line = "マトイは驚いて動揺している様子だったが、深呼吸をして――"

[[dialogue]]
speaker = "マトイ"
# 「私は、マトイ。詠野マトイ。新星学園星徒会所属の星騎士だよ」
line = "「私は、マトイ。詠野マトイ。新星学園星徒会所属の星騎士だよ」"

[[dialogue]]
speaker = "女の子"
# 「マトイお姉さん……私、新星学園の星騎士になれるように頑張ります！」
line = "「マトイお姉さん……私、新星学園の星騎士になれるように頑張ります！」"

[[dialogue]]
speaker = "女の子"
# 「お姉さんみたいに、勇気を持って誰かを守ってあげられる、強い星騎士に！」
line = "「お姉さんみたいに、勇気を持って誰かを守ってあげられる、強い星騎士に！」"

[[dialogue]]
speaker = "女の子"
# 「それで……あと……その……」
line = "「それで……あと……その……」"

[[dialogue]]
speaker = "マトイ"
# 「？　どうかした？」
line = "「？　どうかした？」"

[[dialogue]]
speaker = "女の子"
# 「も、もしよかったら、連絡先を教えて欲しいです！　その……困った時に、アドバイスとかしてもらえたら……！」
line = "「も、もしよかったら、連絡先を教えて欲しいです！　その……困った時に、アドバイスとかしてもらえたら……！」"

[[dialogue]]
speaker = "アム"
# 「わお！　思っていた以上に積極的……！」
line = "「わお！　思っていた以上に積極的……！」"

[[dialogue]]
speaker = "マハムート"
# 「ふふ、これは将来、大物の星騎士になるかもしれないわね」
line = "「ふふ、これは将来、大物の星騎士になるかもしれないわね」"

[[dialogue]]
speaker = "unk"
# それから、マトイはお互いのＤＩＳＣの連絡先を交換して。
line = "それから、マトイはお互いのＤＩＳＣの連絡先を交換して。"

[[dialogue]]
speaker = "女の子"
# 「それじゃあ、また連絡しますね！　マトイお姉さん！」
line = "「それじゃあ、また連絡しますね！　マトイお姉さん！」"

[[dialogue]]
speaker = "マトイ"
# 「う、うん。またね」
line = "「う、うん。またね」"

[[dialogue]]
speaker = "unk"
# ぺこりとお辞儀をして、嬉しそうに手を振って去って行く女の子。
line = "ぺこりとお辞儀をして、嬉しそうに手を振って去って行く女の子。"

[[dialogue]]
speaker = "マトイ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# それをマトイは、放心したように見つめていた。
line = "それをマトイは、放心したように見つめていた。"

[[dialogue]]
speaker = "マトイ"
# 「私みたいな星騎士になりたいって、そんな風に言ってくれる子が現れるだなんて……」
line = "「私みたいな星騎士になりたいって、そんな風に言ってくれる子が現れるだなんて……」"

[[dialogue]]
speaker = "unk"
# あの子にとって、マトイは『特別』になったんだな
line = "あの子にとって、マトイは『特別』になったんだな"

[[dialogue]]
speaker = "マトイ"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "マトイ"
# 「私が、特別……」
line = "「私が、特別……」"

[[dialogue]]
speaker = "マトイ"
# 「そっか。本当にそうなら――」
line = "「そっか。本当にそうなら――」"

[[dialogue]]
speaker = "マトイ"
# 「新しいフォームに覚醒できたことよりも、ずっと嬉しい」
line = "「新しいフォームに覚醒できたことよりも、ずっと嬉しい」"

[[dialogue]]
speaker = "unk"
# マトイはそう言って、誇らしげな笑顔を浮かべるのだった――
line = "マトイはそう言って、誇らしげな笑顔を浮かべるのだった――"
