[[dialogue]]
speaker = "モネ"
# 「どうでしたか、私のクリスマスの思い出は？　人に語って聞かせるような話でもないですけど、何かの参考になれば……ちょっと恥ずかしいですが」
line = "「どうでしたか、私のクリスマスの思い出は？　人に語って聞かせるような話でもないですけど、何かの参考になれば……ちょっと恥ずかしいですが」"

[[dialogue]]
speaker = "リップル"
# 「と～ってもステキなお話でした♪　モネのおかげでクリスマスのこと、モット詳しくナリました♪」
line = "「と～ってもステキなお話でした♪　モネのおかげでクリスマスのこと、モット詳しくナリました♪」"

[[dialogue]]
speaker = "リップル"
# 「それにワタシ、モネのお話でワカリました……エンドレスサマーの目指すべきシンの姿が……！」
line = "「それにワタシ、モネのお話でワカリました……エンドレスサマーの目指すべきシンの姿が……！」"

[[dialogue]]
speaker = "リップル"
# 「ワタシにとってはヨロコビこそ海……タノシサこそが海でした。ですが、モネのお話で感じたヨロコビは、ワタシの知ってる海と夏にはナイものです」
line = "「ワタシにとってはヨロコビこそ海……タノシサこそが海でした。ですが、モネのお話で感じたヨロコビは、ワタシの知ってる海と夏にはナイものです」"

[[dialogue]]
speaker = "リップル"
# 「ワタシの望みは全ての人を笑顔にするコトです。エンドレスサマーはそのタメの手段であって、目的ではナイのです♪　それをモネが思い出させてクレました♪」
line = "「ワタシの望みは全ての人を笑顔にするコトです。エンドレスサマーはそのタメの手段であって、目的ではナイのです♪　それをモネが思い出させてクレました♪」"

[[dialogue]]
speaker = "モネ"
# 「リップルさん！？」
line = "「リップルさん！？」"

[[dialogue]]
speaker = "リップル"
# 「モネ、見ててクダさい。今度こそワタシのリゾートでモネを喜ばせてミセます……！」
line = "「モネ、見ててクダさい。今度こそワタシのリゾートでモネを喜ばせてミセます……！」"

[[dialogue]]
speaker = "モネ"
# 「ここは……リップルさんのリゾート結界……？」
line = "「ここは……リップルさんのリゾート結界……？」"

[[dialogue]]
speaker = "リップル"
# 「ハイ！　リゾート結界モネバージョンです！」
line = "「ハイ！　リゾート結界モネバージョンです！」"

[[dialogue]]
speaker = "モネ"
# 「モネバージョン！？　わ、私だけの結界ってことですか！？」
line = "「モネバージョン！？　わ、私だけの結界ってことですか！？」"

[[dialogue]]
speaker = "リップル"
# 「そのトーリです！　ここはモネのためにチョウセイしたリゾート結界です！」
line = "「そのトーリです！　ここはモネのためにチョウセイしたリゾート結界です！」"

[[dialogue]]
speaker = "リップル"
# 「紫外線はヨワメで、テキドに明るく、潮風で本がイタムこともナイです！」
line = "「紫外線はヨワメで、テキドに明るく、潮風で本がイタムこともナイです！」"

[[dialogue]]
speaker = "モネ"
# 「本当だ……しかも気温もそんなに高くないどころか、程よく涼しいし……波音が心地いい……」
line = "「本当だ……しかも気温もそんなに高くないどころか、程よく涼しいし……波音が心地いい……」"

[[dialogue]]
speaker = "リップル"
# 「コノ環境ならモネも安心して本を読めるハズです！」
line = "「コノ環境ならモネも安心して本を読めるハズです！」"

[[dialogue]]
speaker = "モネ"
# 「はい、本も喜んでます……！　ありがとうリップルさん！　でも、どうして私のために結界を？」
line = "「はい、本も喜んでます……！　ありがとうリップルさん！　でも、どうして私のために結界を？」"

[[dialogue]]
speaker = "リップル"
# 「ワタシのドリームは、ミンナがハッピーになれるエンドレスサマーの達成です」
line = "「ワタシのドリームは、ミンナがハッピーになれるエンドレスサマーの達成です」"

[[dialogue]]
speaker = "リップル"
# 「ですが、今はワタシのために一緒に悩んでくれたモネにヨロコンデもらいたかったんです♪」
line = "「ですが、今はワタシのために一緒に悩んでくれたモネにヨロコンデもらいたかったんです♪」"

[[dialogue]]
speaker = "リップル"
# 「これがワタシのクリスマスのコタエであり、モネへのクリスマスプレゼントです♪」
line = "「これがワタシのクリスマスのコタエであり、モネへのクリスマスプレゼントです♪」"

[[dialogue]]
speaker = "モネ"
# 「リップルさん、ありがとう！　リップルさんの気持ち……すっごく嬉しいです！」
line = "「リップルさん、ありがとう！　リップルさんの気持ち……すっごく嬉しいです！」"

[[dialogue]]
speaker = "リップル"
# 「トモダチの１人も喜ばせられナクテは、エンドレスサマーなんて夢のまた夢デスから♪」
line = "「トモダチの１人も喜ばせられナクテは、エンドレスサマーなんて夢のまた夢デスから♪」"

[[dialogue]]
speaker = "モネ"
# 「でも本当にすごい結界ですね……とんでもない星力です。でも夏じゃないと結界をいじれないって聞いたことがあるんですけど……」
line = "「でも本当にすごい結界ですね……とんでもない星力です。でも夏じゃないと結界をいじれないって聞いたことがあるんですけど……」"

[[dialogue]]
speaker = "リップル"
# 「いつもならソウなんですが、クリスマスのパワーで少しいじれるようにナリました♪」
line = "「いつもならソウなんですが、クリスマスのパワーで少しいじれるようにナリました♪」"

[[dialogue]]
speaker = "モネ"
# 「クリスマスのパワー……！？　そんなことあるんですか！？」
line = "「クリスマスのパワー……！？　そんなことあるんですか！？」"

[[dialogue]]
speaker = "リップル"
# 「これも全て、モネがクリスマスを教えてクレタおかげで～す♪」
line = "「これも全て、モネがクリスマスを教えてクレタおかげで～す♪」"

[[dialogue]]
speaker = "モネ"
# 「あはは、私はそんな大したことしたつもりはないんですけど……」
line = "「あはは、私はそんな大したことしたつもりはないんですけど……」"

[[dialogue]]
speaker = "リップル"
# 「いえ、モネはしっかり力になってクレました。モネがいなかったら、クリスマスともナカヨクなれませんでした」
line = "「いえ、モネはしっかり力になってクレました。モネがいなかったら、クリスマスともナカヨクなれませんでした」"

[[dialogue]]
speaker = "リップル"
# 「だから、このリゾート結界モネバージョンを存分に楽しんでください♪　そしたら、ワタシもハッピーです♪」
line = "「だから、このリゾート結界モネバージョンを存分に楽しんでください♪　そしたら、ワタシもハッピーです♪」"

[[dialogue]]
speaker = "モネ"
# 「うん、でもせっかくならリップルさんとも一緒に楽しみたいです」
line = "「うん、でもせっかくならリップルさんとも一緒に楽しみたいです」"

[[dialogue]]
speaker = "リップル"
# 「ワタシともですか？」
line = "「ワタシともですか？」"

[[dialogue]]
speaker = "モネ"
# 「こんな素敵なところを作ってもらいましたし、リップルさんとも楽しい思い出を作りたいなって……ダメですか？」
line = "「こんな素敵なところを作ってもらいましたし、リップルさんとも楽しい思い出を作りたいなって……ダメですか？」"

[[dialogue]]
speaker = "リップル"
# 「だったら、モネと一緒に本を読みタイです！　モネの本ともトモダチになりま～す♪」
line = "「だったら、モネと一緒に本を読みタイです！　モネの本ともトモダチになりま～す♪」"

[[dialogue]]
speaker = "モネ"
# 「はい、本たちもリップルさんと友達になりたいって言ってますよ」
line = "「はい、本たちもリップルさんと友達になりたいって言ってますよ」"

[[dialogue]]
speaker = "リップル"
# 「ソーシソーアイですね♪　さっそくお願いしマ～ス♪」
line = "「ソーシソーアイですね♪　さっそくお願いしマ～ス♪」"

[[dialogue]]
speaker = "モネ"
# 「それじゃあ、まずはこのクリスマスの恋愛小説から──」
line = "「それじゃあ、まずはこのクリスマスの恋愛小説から──」"
