[[dialogue]]
speaker = "unk"
# 第３話,レディのお忍び旅行,P
line = "第３話,レディのお忍び旅行,P"

[[dialogue]]
speaker = "クラウディア"
# 「お～～～い！　魔王～～～！！」
line = "「お～～～い！　魔王～～～！！」"

[[dialogue]]
speaker = "クラウディア"
# 「よいところにいたぞ！　余をかくまってくれ。追われておるのだ！」
line = "「よいところにいたぞ！　余をかくまってくれ。追われておるのだ！」"

[[dialogue]]
speaker = "unk"
# あんなに強いクラウディアが？
line = "あんなに強いクラウディアが？"

[[dialogue]]
speaker = "unk"
# 誰に？
line = "誰に？"

[[dialogue]]
speaker = "クラウディア"
# 「うむ。困ったものだ。実はセドナにしつこく追いかけ回されていてのう」
line = "「うむ。困ったものだ。実はセドナにしつこく追いかけ回されていてのう」"

[[dialogue]]
speaker = "クラウディア"
# 「あやつは余の魔法もすぐ見破る上、行動パターンまで把握されておる。だがなんとかここまで逃げおおせたのだ！」
line = "「あやつは余の魔法もすぐ見破る上、行動パターンまで把握されておる。だがなんとかここまで逃げおおせたのだ！」"

[[dialogue]]
speaker = "クラウディア"
# 「外出の日なのか、だと？　いや。今日はただのお忍び旅行だ」
line = "「外出の日なのか、だと？　いや。今日はただのお忍び旅行だ」"

[[dialogue]]
speaker = "unk"
# 怒るのも当然のような……
line = "怒るのも当然のような……"

[[dialogue]]
speaker = "unk"
# ただの家出じゃ……
line = "ただの家出じゃ……"

[[dialogue]]
speaker = "クラウディア"
# 「まあまあ、気にするでない。それより今日は大事な用があってきたのだ。どこか落ち着ける場所はないかのう？」
line = "「まあまあ、気にするでない。それより今日は大事な用があってきたのだ。どこか落ち着ける場所はないかのう？」"

[[dialogue]]
speaker = "クラウディア"
# 「む──ないこともないとな？　おお！　さすがは余の見込んだ人間だ」
line = "「む──ないこともないとな？　おお！　さすがは余の見込んだ人間だ」"

[[dialogue]]
speaker = "クラウディア"
# 「さっそくこのクラウディアを案内するがよいぞ、褒めてつかわす！」
line = "「さっそくこのクラウディアを案内するがよいぞ、褒めてつかわす！」"

[[dialogue]]
speaker = "クラウディア"
# 「ほほう！　お主はここで暮らしておるのか──人間の家に入るなど初めてだ。広くはないが、温かみのようなものを感じるのう！」
line = "「ほほう！　お主はここで暮らしておるのか──人間の家に入るなど初めてだ。広くはないが、温かみのようなものを感じるのう！」"

[[dialogue]]
speaker = "unk"
# ちょっとの間だけだよ
line = "ちょっとの間だけだよ"

[[dialogue]]
speaker = "unk"
# 母さんが帰ってくるまでね
line = "母さんが帰ってくるまでね"

[[dialogue]]
speaker = "クラウディア"
# 「わかっておる。余もあまり『わがまま』を言うつもりはないぞ」
line = "「わかっておる。余もあまり『わがまま』を言うつもりはないぞ」"

[[dialogue]]
speaker = "クラウディア"
# 「何せ今日は大事な用があって来たのだからな。まずはそれがセンケツだ」
line = "「何せ今日は大事な用があって来たのだからな。まずはそれがセンケツだ」"

[[dialogue]]
speaker = "クラウディア"
# 「うむ。お主に聞きたいことがある──実はこれに関しての話だ」
line = "「うむ。お主に聞きたいことがある──実はこれに関しての話だ」"

[[dialogue]]
speaker = "unk"
# 胸？
line = "胸？"

[[dialogue]]
speaker = "クラウディア"
# 「セドナは、立派なないすばでぃをしておる。しかし余は、見ての通りぺったんこである」
line = "「セドナは、立派なないすばでぃをしておる。しかし余は、見ての通りぺったんこである」"

[[dialogue]]
speaker = "クラウディア"
# 「以前お主は、男はがっちりしていて胸も大きくないと言った。もしや余は男なのか！？」
line = "「以前お主は、男はがっちりしていて胸も大きくないと言った。もしや余は男なのか！？」"

[[dialogue]]
speaker = "unk"
# まだ成長してないだけだよ
line = "まだ成長してないだけだよ"

[[dialogue]]
speaker = "unk"
# 魔女なんだから女の子だよ
line = "魔女なんだから女の子だよ"

[[dialogue]]
speaker = "クラウディア"
# 「余はセドナに問うたのだ。なにゆえ、そんなに胸がばいんばいん膨らんでいるのかと。いかにして、そのようなふくよかなメロンを育てているのかと！」
line = "「余はセドナに問うたのだ。なにゆえ、そんなに胸がばいんばいん膨らんでいるのかと。いかにして、そのようなふくよかなメロンを育てているのかと！」"

[[dialogue]]
speaker = "unk"
# セドナさんはなんて？
line = "セドナさんはなんて？"

[[dialogue]]
speaker = "unk"
# ストレートだなあ……
line = "ストレートだなあ……"

[[dialogue]]
speaker = "クラウディア"
# 「うむ。聞いたらば、セドナは何も特別なことはしていないという。気がついたらああなっていたと」
line = "「うむ。聞いたらば、セドナは何も特別なことはしていないという。気がついたらああなっていたと」"

[[dialogue]]
speaker = "クラウディア"
# 「憧れているのか……と？　いや。そういうわけでもない。ないが、気にはなる」
line = "「憧れているのか……と？　いや。そういうわけでもない。ないが、気にはなる」"

[[dialogue]]
speaker = "クラウディア"
# 「余もそろそろ立派なレディとなる頃合いだからの──ずっとこのままでは光の魔女としての威厳にもかかわる」
line = "「余もそろそろ立派なレディとなる頃合いだからの──ずっとこのままでは光の魔女としての威厳にもかかわる」"

[[dialogue]]
speaker = "クラウディア"
# 「お主の連れ合いにも『ぼいん』がいただろう！？　奴らの胸の秘密を聞いたことはないか！？」
line = "「お主の連れ合いにも『ぼいん』がいただろう！？　奴らの胸の秘密を聞いたことはないか！？」"

[[dialogue]]
speaker = "unk"
# ウィステリアさんのことかな
line = "ウィステリアさんのことかな"

[[dialogue]]
speaker = "unk"
# サーシャさんのことかな
line = "サーシャさんのことかな"

[[dialogue]]
speaker = "クラウディア"
# 「体質や食生活？　そんなつまらん答えは求めておらぬ。実はな、余はもうとっくに手がかりを掴んでいるのだ」
line = "「体質や食生活？　そんなつまらん答えは求めておらぬ。実はな、余はもうとっくに手がかりを掴んでいるのだ」"

[[dialogue]]
speaker = "クラウディア"
# 「そのためにはお主の協力が不可欠だ！　何のためにわざわざお主を訪ねたと思っておる？」
line = "「そのためにはお主の協力が不可欠だ！　何のためにわざわざお主を訪ねたと思っておる？」"

[[dialogue]]
speaker = "unk"
# 男に揉まれると大きくなる、とか？
line = "男に揉まれると大きくなる、とか？"

[[dialogue]]
speaker = "unk"
# もしかして……
line = "もしかして……"

[[dialogue]]
speaker = "クラウディア"
# 「そうだ！　わかっておるではないか、魔王──もみもみせよ。迷信だろうと物は試しだ」
line = "「そうだ！　わかっておるではないか、魔王──もみもみせよ。迷信だろうと物は試しだ」"

[[dialogue]]
speaker = "クラウディア"
# 「犯罪？　何を言っておる。ここはお主の住処なのだからお主の好きにすればよい。それが余計に心配？　わからんのう」
line = "「犯罪？　何を言っておる。ここはお主の住処なのだからお主の好きにすればよい。それが余計に心配？　わからんのう」"

[[dialogue]]
speaker = "クラウディア"
# 「よいからとっとと触るのだ。言うことを聞かないのであれば、魔法で無理にでも動かしてしまうぞ──？」
line = "「よいからとっとと触るのだ。言うことを聞かないのであれば、魔法で無理にでも動かしてしまうぞ──？」"

[[dialogue]]
speaker = "クラウディア"
# 「──ぁっ♪」
line = "「──ぁっ♪」"

[[dialogue]]
speaker = "unk"
# ごめん
line = "ごめん"

[[dialogue]]
speaker = "unk"
# ……
line = "……"

[[dialogue]]
speaker = "クラウディア"
# 「ぉ、ぉぉぅ……なんだかくすぐったいのう。妙な声が出てしまった。続けてみる価値はありそうだ」
line = "「ぉ、ぉぉぅ……なんだかくすぐったいのう。妙な声が出てしまった。続けてみる価値はありそうだ」"

[[dialogue]]
speaker = "クラウディア"
# 「腰が引けておるぞ！　もっと！　気合いを入れて余のバストをもみほぐすのだ！　こら、なぜ逃げる！？」
line = "「腰が引けておるぞ！　もっと！　気合いを入れて余のバストをもみほぐすのだ！　こら、なぜ逃げる！？」"

[[dialogue]]
speaker = "セドナ"
# 「──失礼する」
line = "「──失礼する」"

[[dialogue]]
speaker = "クラウディア"
# 「へ……？　わ、わあっ！？　ど──どうしてセドナがこんなところまで余を追ってくるのだ！？」
line = "「へ……？　わ、わあっ！？　ど──どうしてセドナがこんなところまで余を追ってくるのだ！？」"

[[dialogue]]
speaker = "クラウディア"
# 「保護者を呼んでおいた？　よ、余計なことをするでない！」
line = "「保護者を呼んでおいた？　よ、余計なことをするでない！」"

[[dialogue]]
speaker = "セドナ"
# 「連絡感謝する、星徒会長。──さ、基地へ帰りますよ。姫」
line = "「連絡感謝する、星徒会長。──さ、基地へ帰りますよ。姫」"

[[dialogue]]
speaker = "クラウディア"
# 「ま、魔王きさま──余を騙したなぁっ！　余は帰らんぞ！　セドナも『ぼいん』の秘密を余に隠しておるのだろう！」
line = "「ま、魔王きさま──余を騙したなぁっ！　余は帰らんぞ！　セドナも『ぼいん』の秘密を余に隠しておるのだろう！」"

[[dialogue]]
speaker = "セドナ"
# 「ぼ、ぼいん？　また何か余計な知識を仕入れたようですね──どうして変なことばかり吸収してしまうのか」
line = "「ぼ、ぼいん？　また何か余計な知識を仕入れたようですね──どうして変なことばかり吸収してしまうのか」"

[[dialogue]]
speaker = "セドナ"
# 「貴様にも迷惑をかけたな──ん？　なぜ目を逸らすのだ？　まあいい……」
line = "「貴様にも迷惑をかけたな──ん？　なぜ目を逸らすのだ？　まあいい……」"

[[dialogue]]
speaker = "セドナ"
# （……この家に入ることになるとは思わなかったな。しかし今は……さっさと退散するとしよう）
line = "（……この家に入ることになるとは思わなかったな。しかし今は……さっさと退散するとしよう）"

[[dialogue]]
speaker = "クラウディア"
# 「帰りたくないのだー！　余もセドナのように嫌味ったらしく巨乳を見せびらかしたいのだ～！」
line = "「帰りたくないのだー！　余もセドナのように嫌味ったらしく巨乳を見せびらかしたいのだ～！」"

[[dialogue]]
speaker = "セドナ"
# 「誰が嫌味ったらしく見せびらかしていますか……帰ったらお説教ですね」
line = "「誰が嫌味ったらしく見せびらかしていますか……帰ったらお説教ですね」"
