[[dialogue]]
speaker = "パテル"
# 「ひゃっほ～い！」
line = "「ひゃっほ～い！」"

[[dialogue]]
speaker = "unk"
# パテルがバルーンでできた滑り台を滑り、水しぶきを上げて海に突っ込んだ。
line = "パテルがバルーンでできた滑り台を滑り、水しぶきを上げて海に突っ込んだ。"

[[dialogue]]
speaker = "パテル"
# 「アハハハッ、海って気持ちいいね！」
line = "「アハハハッ、海って気持ちいいね！」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「次はアルモたんが滑るのだ！　とうっ！」
line = "「次はアルモたんが滑るのだ！　とうっ！」"

[[dialogue]]
speaker = "unk"
# 幅広い層が楽しめるようにとリップルが新たに設置した海上アスレチックを、早速有効活用していた。
line = "幅広い層が楽しめるようにとリップルが新たに設置した海上アスレチックを、早速有効活用していた。"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「滑り台楽しいのだ♪　リップルに感謝なのだ♪」
line = "「滑り台楽しいのだ♪　リップルに感謝なのだ♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「あ、登ってみると、思ったより高いですね……ちょっとドキドキします……」
line = "「あ、登ってみると、思ったより高いですね……ちょっとドキドキします……」"

[[dialogue]]
speaker = "unk"
# 大丈夫、怖くないよ
line = "大丈夫、怖くないよ"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「会長がそう言うなら私も……え～いっ」
line = "「会長がそう言うなら私も……え～いっ」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「きゃ～っ」
line = "「きゃ～っ」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「ふふっ、会長の言う通り、滑ってみたら怖くなくて、楽しかったです。ありがとうございます～」
line = "「ふふっ、会長の言う通り、滑ってみたら怖くなくて、楽しかったです。ありがとうございます～」"

[[dialogue]]
speaker = "パテル"
# 「おっ、水の中でパテルストーン発見！」
line = "「おっ、水の中でパテルストーン発見！」"

[[dialogue]]
speaker = "パテル"
# 「たくさん見つけて、あたしが一番になるんだ～♪　──って、あたしが一番になってもご褒美ないじゃん！」
line = "「たくさん見つけて、あたしが一番になるんだ～♪　──って、あたしが一番になってもご褒美ないじゃん！」"

[[dialogue]]
speaker = "パテル"
# 「ん？　どしたの？　せっかくの海なのに、あたしのこと見て神妙な顔しちゃってさ」
line = "「ん？　どしたの？　せっかくの海なのに、あたしのこと見て神妙な顔しちゃってさ」"

[[dialogue]]
speaker = "unk"
# パテルは今まで何をしていたんだ？
line = "パテルは今まで何をしていたんだ？"

[[dialogue]]
speaker = "unk"
# 堕天使パテルを倒した後、パテルは一度俺たちの前から姿を消した。
line = "堕天使パテルを倒した後、パテルは一度俺たちの前から姿を消した。"

[[dialogue]]
speaker = "unk"
# その後肉体を得て、オペレーション・ペンタグラムで共闘したことはあったが、俺たちの前に現れることはあまりなく、詳しい動向は不明だった。
line = "その後肉体を得て、オペレーション・ペンタグラムで共闘したことはあったが、俺たちの前に現れることはあまりなく、詳しい動向は不明だった。"

[[dialogue]]
speaker = "パテル"
# 「ああ～……ま、疑問に思うのも無理ないよね」
line = "「ああ～……ま、疑問に思うのも無理ないよね」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「そうなのだ。パテルはどこで何をしていたのだ？　アルモたんたちも聞いていなかったぞ」
line = "「そうなのだ。パテルはどこで何をしていたのだ？　アルモたんたちも聞いていなかったぞ」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「あんまり顔を見せてくれないから、ちょっと心配してたんですよ」
line = "「あんまり顔を見せてくれないから、ちょっと心配してたんですよ」"

[[dialogue]]
speaker = "パテル"
# 「そりゃあ、基本は不干渉主義なのがあたしだし」
line = "「そりゃあ、基本は不干渉主義なのがあたしだし」"

[[dialogue]]
speaker = "パテル"
# 「でもそれだけじゃなくて、あたしなりにちょっとやることがあってさ」
line = "「でもそれだけじゃなくて、あたしなりにちょっとやることがあってさ」"

[[dialogue]]
speaker = "パテル"
# 「あたしはラクシャの力で肉体を得たから、代わりにラクシャに協力してたんだ。アルタイルじゃなくてデネブのラクシャ──あなたたちが知る市倉環にね」
line = "「あたしはラクシャの力で肉体を得たから、代わりにラクシャに協力してたんだ。アルタイルじゃなくてデネブのラクシャ──あなたたちが知る市倉環にね」"

[[dialogue]]
speaker = "パテル"
# 「あの時のラクシャは女神テルルの力を預かっていたから、敵に見つかるわけにはいかなかった。そのためにはあたしの姿を隠す力がうってつけだったんだ」
line = "「あの時のラクシャは女神テルルの力を預かっていたから、敵に見つかるわけにはいかなかった。そのためにはあたしの姿を隠す力がうってつけだったんだ」"

[[dialogue]]
speaker = "パテル"
# 「今はラクシャとは別行動だから、こうして姿を現した──というわけ」
line = "「今はラクシャとは別行動だから、こうして姿を現した──というわけ」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「なるほど……ちゃんとした理由があったのだ」
line = "「なるほど……ちゃんとした理由があったのだ」"

[[dialogue]]
speaker = "パテル"
# 「あたしにはあたしの仕事もあるから、あんまり引っ込んでばかりいられないしね」
line = "「あたしにはあたしの仕事もあるから、あんまり引っ込んでばかりいられないしね」"

[[dialogue]]
speaker = "unk"
# あたしの仕事……？
line = "あたしの仕事……？"

[[dialogue]]
speaker = "パテル"
# 「おっと、また死神トークしちゃうところだった。せっかくのレジャーだし、今のは聞いてなかったことにして」
line = "「おっと、また死神トークしちゃうところだった。せっかくのレジャーだし、今のは聞いてなかったことにして」"

[[dialogue]]
speaker = "パテル"
# 「それよりこれ見てこれ。サメだよサメ」
line = "「それよりこれ見てこれ。サメだよサメ」"

[[dialogue]]
speaker = "パテル"
# 「そして海の死神といえば──シャチ！」
line = "「そして海の死神といえば──シャチ！」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「そこはサメじゃないんですか！？　映画では海の死神ですよ！？」
line = "「そこはサメじゃないんですか！？　映画では海の死神ですよ！？」"

[[dialogue]]
speaker = "パテル"
# 「いや～、人間界においては、サメよりシャチの方が強いのが自然の摂理だからね」
line = "「いや～、人間界においては、サメよりシャチの方が強いのが自然の摂理だからね」"

[[dialogue]]
speaker = "パテル"
# 「大きなクジラを狩ることもあるし、海の死神と表現するならやっぱりシャチじゃないかな」
line = "「大きなクジラを狩ることもあるし、海の死神と表現するならやっぱりシャチじゃないかな」"

[[dialogue]]
speaker = "パテル"
# 「ちなみにこのサメの名前はフカヒレくん。水着の間は、死神の大鎌じゃなくてこの子が相棒だよ」
line = "「ちなみにこのサメの名前はフカヒレくん。水着の間は、死神の大鎌じゃなくてこの子が相棒だよ」"

[[dialogue]]
speaker = "unk"
# サメ好きなの？
line = "サメ好きなの？"

[[dialogue]]
speaker = "パテル"
# 「いや別に。死神的に、特定の生き物に好き嫌いの感情を持つことはないかな。ただの気分だよ」
line = "「いや別に。死神的に、特定の生き物に好き嫌いの感情を持つことはないかな。ただの気分だよ」"

[[dialogue]]
speaker = "パテル"
# 「ねぇねぇ、魔王、一緒に滑り台滑ろうよ？」
line = "「ねぇねぇ、魔王、一緒に滑り台滑ろうよ？」"

[[dialogue]]
speaker = "パテル"
# 「あ、それとも<b>おにーさん</b>って呼んだ方がいい？　あなたも<b>プルちゃん</b>って呼んでいいよ」
line = "「あ、それとも<b>おにーさん</b>って呼んだ方がいい？　あなたも<b>プルちゃん</b>って呼んでいいよ」"

[[dialogue]]
speaker = "パテル"
# 「ほら、こっちこっち。おにーさんは後ろね」
line = "「ほら、こっちこっち。おにーさんは後ろね」"

[[dialogue]]
speaker = "パテル"
# 「いくよ──わ～～っ！」
line = "「いくよ──わ～～っ！」"

[[dialogue]]
speaker = "unk"
# 勢いよく海にダイブし、白い水しぶきが上がった。
line = "勢いよく海にダイブし、白い水しぶきが上がった。"

[[dialogue]]
speaker = "unk"
# すぐに水面に浮かび上がるが──パテルの姿が見えない。
line = "すぐに水面に浮かび上がるが──パテルの姿が見えない。"

[[dialogue]]
speaker = "パテル"
# 「デーデンデーデンデーデン……」
line = "「デーデンデーデンデーデン……」"

[[dialogue]]
speaker = "パテル"
# 「シャーッ！！」
line = "「シャーッ！！」"

[[dialogue]]
speaker = "２人"
# 「わーーっ！？」
line = "「わーーっ！？」"

[[dialogue]]
speaker = "パテル"
# 「アハハ、驚いてる驚いてる♪」
line = "「アハハ、驚いてる驚いてる♪」"

[[dialogue]]
speaker = "unk"
# パテル、後ろ後ろ！
line = "パテル、後ろ後ろ！"

[[dialogue]]
speaker = "パテル"
# 「後ろ？　後ろに何か──」
line = "「後ろ？　後ろに何か──」"

[[dialogue]]
speaker = "サメ"
# 「シャーーーッ！！」
line = "「シャーーーッ！！」"

[[dialogue]]
speaker = "パテル"
# 「サメだーっ！！？」
line = "「サメだーっ！！？」"

[[dialogue]]
speaker = "２人"
# 「きゃーーっ！！？」
line = "「きゃーーっ！！？」"

[[dialogue]]
speaker = "パテル"
# 「サメ対決ならフカヒレくんが受けて立つぞー！　フシャーッ！」
line = "「サメ対決ならフカヒレくんが受けて立つぞー！　フシャーッ！」"

[[dialogue]]
speaker = "サメ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "パテル"
# 「あれ、行っちゃった。何だったんだろ、あれ？」
line = "「あれ、行っちゃった。何だったんだろ、あれ？」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「リップルが用意したアトラクションなのか？　でもあのサメは……」
line = "「リップルが用意したアトラクションなのか？　でもあのサメは……」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「サメは映画とテーマパークでは人気ですからね～」
line = "「サメは映画とテーマパークでは人気ですからね～」"

[[dialogue]]
speaker = "パテル"
# 「あ、パテルストーン発見。あのサメが落としていったのかな？」
line = "「あ、パテルストーン発見。あのサメが落としていったのかな？」"

[[dialogue]]
speaker = "unk"
# 腑に落ちないところがありながらも、パテルストーンの回収は順調に進んだのだった。
line = "腑に落ちないところがありながらも、パテルストーンの回収は順調に進んだのだった。"
