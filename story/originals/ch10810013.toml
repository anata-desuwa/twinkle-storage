[[dialogue]]
speaker = "unk"
# 第３話,グロリア、パンツを買いに行く,P
line = "第３話,グロリア、パンツを買いに行く,P"

[[dialogue]]
speaker = "グロリア"
# 「はい、そうなんです。先日のボランティアの時にも子どもたちが――んっ……！」
line = "「はい、そうなんです。先日のボランティアの時にも子どもたちが――んっ……！」"

[[dialogue]]
speaker = "グロリア"
# 「すみません、また下着がお尻に食い込んでしまって……あの、直しても……？」
line = "「すみません、また下着がお尻に食い込んでしまって……あの、直しても……？」"

[[dialogue]]
speaker = "unk"
# どうぞ、どうぞ
line = "どうぞ、どうぞ"

[[dialogue]]
speaker = "グロリア"
# 「んぅ……んっ、んっしょ……あら……？」
line = "「んぅ……んっ、んっしょ……あら……？」"

[[dialogue]]
speaker = "unk"
# 場所を移すことなく、後ろ手にもぞもぞとお尻の辺りを弄り始めるので、ドキドキしてしまう。
line = "場所を移すことなく、後ろ手にもぞもぞとお尻の辺りを弄り始めるので、ドキドキしてしまう。"

[[dialogue]]
speaker = "unk"
# ちなみに、会話中に食い込みを直すのも、これで３回目だ。
line = "ちなみに、会話中に食い込みを直すのも、これで３回目だ。"

[[dialogue]]
speaker = "unk"
# 下着のサイズ、合ってないんじゃないですか？
line = "下着のサイズ、合ってないんじゃないですか？"

[[dialogue]]
speaker = "グロリア"
# 「うーん……そうかもしれません。最近はちょっと歩いただけでも、お尻の割れ目に挟まってしまって……」
line = "「うーん……そうかもしれません。最近はちょっと歩いただけでも、お尻の割れ目に挟まってしまって……」"

[[dialogue]]
speaker = "グロリア"
# 「子どもの頃から同じパンツをはいていますけど、そろそろ限界なのかもしれませんね」
line = "「子どもの頃から同じパンツをはいていますけど、そろそろ限界なのかもしれませんね」"

[[dialogue]]
speaker = "unk"
# ……子どもの頃から？
line = "……子どもの頃から？"

[[dialogue]]
speaker = "unk"
# 物持ちがいいとかいうレベルじゃない。グロリアさんが子どもの頃は、今みたいなメリハリ体型じゃなかったはずだ。
line = "物持ちがいいとかいうレベルじゃない。グロリアさんが子どもの頃は、今みたいなメリハリ体型じゃなかったはずだ。"

[[dialogue]]
speaker = "グロリア"
# 「母のお下がりをはいたりもしていたのですけど、母は私より細身だったので、やはりサイズが合ってないのでしょうね」
line = "「母のお下がりをはいたりもしていたのですけど、母は私より細身だったので、やはりサイズが合ってないのでしょうね」"

[[dialogue]]
speaker = "unk"
# 下着を買いに行ったりは？
line = "下着を買いに行ったりは？"

[[dialogue]]
speaker = "グロリア"
# 「パンツが破れた時に、慌てて購買で買ったことはありますけど、あえて買いに行ったりとかは……」
line = "「パンツが破れた時に、慌てて購買で買ったことはありますけど、あえて買いに行ったりとかは……」"

[[dialogue]]
speaker = "グロリア"
# 「どういった下着が自分の年齢や体格に合っているかわからないんです。　皆さんはどのような下着を着けているのでしょう……？」
line = "「どういった下着が自分の年齢や体格に合っているかわからないんです。　皆さんはどのような下着を着けているのでしょう……？」"

[[dialogue]]
speaker = "グロリア"
# 「お着替えの際、皆さん、カラフルな下着を身に着けていらっしゃいますけど……じっくり見せてくださいというのも、少々はばかられますし」
line = "「お着替えの際、皆さん、カラフルな下着を身に着けていらっしゃいますけど……じっくり見せてくださいというのも、少々はばかられますし」"

[[dialogue]]
speaker = "グロリア"
# 「あ、でしたら──」
line = "「あ、でしたら──」"

[[dialogue]]
speaker = "グロリア"
# 「会長さんが私の下着を選んでいただけませんか？」
line = "「会長さんが私の下着を選んでいただけませんか？」"

[[dialogue]]
speaker = "unk"
# 俺が下着を……？
line = "俺が下着を……？"

[[dialogue]]
speaker = "グロリア"
# 「はい。普段多くの女性に接しておられる方なら、私に似合うものを選んでくれるでしょうし、会長さんに選んでほしいんです」
line = "「はい。普段多くの女性に接しておられる方なら、私に似合うものを選んでくれるでしょうし、会長さんに選んでほしいんです」"

[[dialogue]]
speaker = "グロリア"
# 「ダメですか？」
line = "「ダメですか？」"

[[dialogue]]
speaker = "unk"
# こうして、グロリアにジャストフィットする下着を買うため、街へと出向くことになったのだった──
line = "こうして、グロリアにジャストフィットする下着を買うため、街へと出向くことになったのだった──"

[[dialogue]]
speaker = "グロリア"
# 「うーん……待ち合わせより、随分と早く着きすぎてしまいました。でも遅刻するよりはいいですよね」
line = "「うーん……待ち合わせより、随分と早く着きすぎてしまいました。でも遅刻するよりはいいですよね」"

[[dialogue]]
speaker = "グロリア"
# 「お買い物はフランさんには秘密と言われましたが、どうしてなのでしょうか……？　不思議ですね」
line = "「お買い物はフランさんには秘密と言われましたが、どうしてなのでしょうか……？　不思議ですね」"

[[dialogue]]
speaker = "グロリア"
# 「しかし会長さんとふたりきりでお出かけだなんて……少し前までの私では考えられませんでした……」
line = "「しかし会長さんとふたりきりでお出かけだなんて……少し前までの私では考えられませんでした……」"

[[dialogue]]
speaker = "グロリア"
# 「……あら？　これはもしかして、デートと呼ぶものなのでしょうか？」
line = "「……あら？　これはもしかして、デートと呼ぶものなのでしょうか？」"

[[dialogue]]
speaker = "グロリア"
# 「違いますよね。デートというのは、好意を寄せている男女同士が行うもの……会長さんは親切心で、私の買い物に付き合ってくださるだけですものね」
line = "「違いますよね。デートというのは、好意を寄せている男女同士が行うもの……会長さんは親切心で、私の買い物に付き合ってくださるだけですものね」"

[[dialogue]]
speaker = "ナンパ男"
# 「ウェーイ！　そこのドチャクソキレイなお姉さん、俺ッチとお茶でもどう～？」
line = "「ウェーイ！　そこのドチャクソキレイなお姉さん、俺ッチとお茶でもどう～？」"

[[dialogue]]
speaker = "グロリア"
# 「……え？　キレイなお姉さん……？　どこにいらっしゃるのでしょうか……」
line = "「……え？　キレイなお姉さん……？　どこにいらっしゃるのでしょうか……」"

[[dialogue]]
speaker = "グロリア"
# 「ハッ──！？　もしかして私のことでしょうか？」
line = "「ハッ──！？　もしかして私のことでしょうか？」"

[[dialogue]]
speaker = "ナンパ男"
# 「モチのロ～ン！　キレイなお姉さんっつったら、お姉さんの他にいないっしょ～、キョロキョロしないでよ～」
line = "「モチのロ～ン！　キレイなお姉さんっつったら、お姉さんの他にいないっしょ～、キョロキョロしないでよ～」"

[[dialogue]]
speaker = "グロリア"
# 「ごめんなさい。人と待ち合わせをしているところでして……」
line = "「ごめんなさい。人と待ち合わせをしているところでして……」"

[[dialogue]]
speaker = "ナンパ男"
# 「またまた～。うっとりした顔で俺ッチの方見てたじゃん。そりゃもう脈アリってことでしょ～」
line = "「またまた～。うっとりした顔で俺ッチの方見てたじゃん。そりゃもう脈アリってことでしょ～」"

[[dialogue]]
speaker = "グロリア"
# 「いいえ、あなたとは初対面ですし、全然そのようなことは……あの、手を離してはいただけないでしょうか？」
line = "「いいえ、あなたとは初対面ですし、全然そのようなことは……あの、手を離してはいただけないでしょうか？」"

[[dialogue]]
speaker = "ナンパ男"
# 「ま、ま、ま。なんならお茶なんてメンドいのはすっ飛ばして、もっと良いことしようぜ～？」
line = "「ま、ま、ま。なんならお茶なんてメンドいのはすっ飛ばして、もっと良いことしようぜ～？」"

[[dialogue]]
speaker = "グロリア"
# 「良いこと……？　それは私と一緒に死んでいただけるということでしょうか……？」
line = "「良いこと……？　それは私と一緒に死んでいただけるということでしょうか……？」"

[[dialogue]]
speaker = "ナンパ男"
# 「……は？　死？」
line = "「……は？　死？」"

[[dialogue]]
speaker = "unk"
# 俺の連れに何の用です？
line = "俺の連れに何の用です？"

[[dialogue]]
speaker = "グロリア"
# 「会長さんっ……！」
line = "「会長さんっ……！」"

[[dialogue]]
speaker = "unk"
# グロリアさんの手を掴んでいた男の手を引き剥がし、代わりに彼女の手を取ってこの場を後にした。
line = "グロリアさんの手を掴んでいた男の手を引き剥がし、代わりに彼女の手を取ってこの場を後にした。"

[[dialogue]]
speaker = "unk"
# 男はなんだか面食らっていたけど、２人の間でどんな会話がされていたのかは想像に難くない。
line = "男はなんだか面食らっていたけど、２人の間でどんな会話がされていたのかは想像に難くない。"

[[dialogue]]
speaker = "unk"
# ああいう輩は放っておいて、さっさと目的地に向かうとしよう。
line = "ああいう輩は放っておいて、さっさと目的地に向かうとしよう。"

[[dialogue]]
speaker = "グロリア"
# （会長さんの手、温かい……あの男の人の手と全然違います……）
line = "（会長さんの手、温かい……あの男の人の手と全然違います……）"

[[dialogue]]
speaker = "グロリア"
# （なんででしょう……会長さんに触れられていると、すごくドキドキしてしまいます。心臓が口から飛び出てしまいそう……）
line = "（なんででしょう……会長さんに触れられていると、すごくドキドキしてしまいます。心臓が口から飛び出てしまいそう……）"

[[dialogue]]
speaker = "グロリア"
# （こんな気持ちは、初めてです……この感情は、一体……？）
line = "（こんな気持ちは、初めてです……この感情は、一体……？）"
