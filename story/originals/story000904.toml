[[dialogue]]
speaker = "セーラ"
# 「もいっちょレーイズ！」
line = "「もいっちょレーイズ！」"

[[dialogue]]
speaker = "ユウリ"
# 「へぇ、いい手でも来てんすか？」
line = "「へぇ、いい手でも来てんすか？」"

[[dialogue]]
speaker = "セーラ"
# 「来てる来てる♪　超いいの来てるよ～？　フォールドした方がいいんじゃない？」
line = "「来てる来てる♪　超いいの来てるよ～？　フォールドした方がいいんじゃない？」"

[[dialogue]]
speaker = "ユウリ"
# 「その手には乗らねえっすよ」
line = "「その手には乗らねえっすよ」"

[[dialogue]]
speaker = "ユウリ"
# （あたしの手札はハートの９とクラブの１０。場にはハートの１１と１０、それにダイヤの１０とハートの８が見えてる）
line = "（あたしの手札はハートの９とクラブの１０。場にはハートの１１と１０、それにダイヤの１０とハートの８が見えてる）"

[[dialogue]]
speaker = "ユウリ"
# （つまり既に１０のスリーカードだ。しかもハートの１２が来りゃストレートフラッシュ昇格──降りるわけがねえ！）
line = "（つまり既に１０のスリーカードだ。しかもハートの１２が来りゃストレートフラッシュ昇格──降りるわけがねえ！）"

[[dialogue]]
speaker = "unk"
# フォールド……
line = "フォールド……"

[[dialogue]]
speaker = "ユウリ"
# （会長さんは降りたか。てことはここであたしが降りたら会長さんが罰ゲームだな）
line = "（会長さんは降りたか。てことはここであたしが降りたら会長さんが罰ゲームだな）"

[[dialogue]]
speaker = "ユウリ"
# （でもそれじゃ面白くねえ。たまにはセーラさんに一泡吹かせてやりてぇし）
line = "（でもそれじゃ面白くねえ。たまにはセーラさんに一泡吹かせてやりてぇし）"

[[dialogue]]
speaker = "ユウリ"
# 「コール」
line = "「コール」"

[[dialogue]]
speaker = "ユーリス"
# 「それでは最後のカードを追加しますね」
line = "「それでは最後のカードを追加しますね」"

[[dialogue]]
speaker = "ユウリ"
# （来た、ハートのクイーン！　ストフラ確定！）
line = "（来た、ハートのクイーン！　ストフラ確定！）"

[[dialogue]]
speaker = "セーラ"
# 「ユウリちゃんは通常ベット？　んじゃうちはさらにレーイズ！」
line = "「ユウリちゃんは通常ベット？　んじゃうちはさらにレーイズ！」"

[[dialogue]]
speaker = "ユウリ"
# 「うわ、あたしを最下位に落とす気満々じゃないっすか。よっぽど勝負手なんすね？」
line = "「うわ、あたしを最下位に落とす気満々じゃないっすか。よっぽど勝負手なんすね？」"

[[dialogue]]
speaker = "セーラ"
# 「どうだろーね～。まぁここでうちが負けても会長さんが最下位だし♪」
line = "「どうだろーね～。まぁここでうちが負けても会長さんが最下位だし♪」"

[[dialogue]]
speaker = "ユウリ"
# 「でも、あたしがさらにレイズして負けたらセーラさんが最下位っすよ？」
line = "「でも、あたしがさらにレイズして負けたらセーラさんが最下位っすよ？」"

[[dialogue]]
speaker = "セーラ"
# 「あれれ、うちに罰ゲームさせたい感じ～？　ケド返り討ちにあったらユウリちゃんが最下位だぜぃ？　降りて会長さんに罰ゲームさせたら～？」
line = "「あれれ、うちに罰ゲームさせたい感じ～？　ケド返り討ちにあったらユウリちゃんが最下位だぜぃ？　降りて会長さんに罰ゲームさせたら～？」"

[[dialogue]]
speaker = "ユウリ"
# 「たまにはあたしもセーラさんを悔しがらせたいもんっすから。つーわけでレイ──」
line = "「たまにはあたしもセーラさんを悔しがらせたいもんっすから。つーわけでレイ──」"

[[dialogue]]
speaker = "ユウリ"
# （っっ、待て。場のカードをよく見ろ！　ハートが１０・１１・１２と続いてるじゃねえか！）
line = "（っっ、待て。場のカードをよく見ろ！　ハートが１０・１１・１２と続いてるじゃねえか！）"

[[dialogue]]
speaker = "ユウリ"
# （万が一セーラさんがハートのエースとキングを持ってたらロイヤルストレートフラッシュ……！　あ、あたしの負けだ！）
line = "（万が一セーラさんがハートのエースとキングを持ってたらロイヤルストレートフラッシュ……！　あ、あたしの負けだ！）"

[[dialogue]]
speaker = "ユウリ"
# （いやでも、んな豪運……！　良くてフラッシュかストレート……！　つか強気のレイズもブラフ臭えし、フォールド誘いのゴミ手って可能性も……！）
line = "（いやでも、んな豪運……！　良くてフラッシュかストレート……！　つか強気のレイズもブラフ臭えし、フォールド誘いのゴミ手って可能性も……！）"

[[dialogue]]
speaker = "セーラ"
# 「ちなみに、うちが考えてるユウリちゃんへの罰ゲームはぁ……ニャリオンちゃんにバニーガール写真を送ることだから♪」
line = "「ちなみに、うちが考えてるユウリちゃんへの罰ゲームはぁ……ニャリオンちゃんにバニーガール写真を送ることだから♪」"

[[dialogue]]
speaker = "ユウリ"
# 「なっ──……！　んなことされたらあたしの人生終わっちまう！？」
line = "「なっ──……！　んなことされたらあたしの人生終わっちまう！？」"

[[dialogue]]
speaker = "セーラ"
# 「どーする？　レイズする～？　降りてうちをトップにして、会長さんに罰ゲーム押しつけた方が安全じゃなーい？」
line = "「どーする？　レイズする～？　降りてうちをトップにして、会長さんに罰ゲーム押しつけた方が安全じゃなーい？」"

[[dialogue]]
speaker = "ユウリ"
# （お、落ち着け……！　あたしのストレートフラッシュが負けるわけがねえ……！　ハートのエースとキングを持ってるなんて奇跡、あるはずがねえ……！）
line = "（お、落ち着け……！　あたしのストレートフラッシュが負けるわけがねえ……！　ハートのエースとキングを持ってるなんて奇跡、あるはずがねえ……！）"

[[dialogue]]
speaker = "ユウリ"
# 「レイズ！　いっそオールインだ、エロ王子！」
line = "「レイズ！　いっそオールインだ、エロ王子！」"

[[dialogue]]
speaker = "ユーリス"
# 「コ、コホン。その呼び方はやめていただけると……」
line = "「コ、コホン。その呼び方はやめていただけると……」"

[[dialogue]]
speaker = "セーラ"
# 「もちろんコール♪」
line = "「もちろんコール♪」"

[[dialogue]]
speaker = "ユーリス"
# 「それではショーダウンです。ユウリさんから役の公開をお願いします」
line = "「それではショーダウンです。ユウリさんから役の公開をお願いします」"

[[dialogue]]
speaker = "ユウリ"
# 「くらえセーラさんっ──神のストレートフラッシュだ！」
line = "「くらえセーラさんっ──神のストレートフラッシュだ！」"

[[dialogue]]
speaker = "セーラ"
# 「残念♪　ロイヤルストレートフラッシュ<emoji=heart04>」
line = "「残念♪　ロイヤルストレートフラッシュ<emoji=heart04>」"

[[dialogue]]
speaker = "ユウリ"
# 「！！？　こ、こんなっ、バカなことがっ……！？」
line = "「！！？　こ、こんなっ、バカなことがっ……！？」"

[[dialogue]]
speaker = "セーラ"
# 「だから言ったでしょ♪　降りた方がいーって♪」
line = "「だから言ったでしょ♪　降りた方がいーって♪」"

[[dialogue]]
speaker = "セーラ"
# 「やっぱりストレートできてたかぁ。でも場のカードでストレートができかけてる時は、他のプレイヤーも狙いやすいってワケ♪」
line = "「やっぱりストレートできてたかぁ。でも場のカードでストレートができかけてる時は、他のプレイヤーも狙いやすいってワケ♪」"

[[dialogue]]
speaker = "セーラ"
# 「てなわけで……うふふ～。ドキドキ撮影ターイム♪」
line = "「てなわけで……うふふ～。ドキドキ撮影ターイム♪」"

[[dialogue]]
speaker = "ユウリ"
# 「ゆ、許してください！　あのクソ猫にこんな姿見られたら、あたし……！」
line = "「ゆ、許してください！　あのクソ猫にこんな姿見られたら、あたし……！」"

[[dialogue]]
speaker = "セーラ"
# 「悲しいけど……これギャンブルなんだよね」
line = "「悲しいけど……これギャンブルなんだよね」"

[[dialogue]]
speaker = "ユウリ"
# 「い、嫌だぁああああっっ～～！！！」
line = "「い、嫌だぁああああっっ～～！！！」"

[[dialogue]]
speaker = "ユーリス"
# 「――ストップ。罰ゲームといえど人の嫌がることはしてはいけませんよ、セーラさん」
line = "「――ストップ。罰ゲームといえど人の嫌がることはしてはいけませんよ、セーラさん」"

[[dialogue]]
speaker = "セーラ"
# 「冗談だよ冗談。もちろんわかってるよ」
line = "「冗談だよ冗談。もちろんわかってるよ」"

[[dialogue]]
speaker = "ユーリス"
# 「もう、本気かと思いましたよ」
line = "「もう、本気かと思いましたよ」"

[[dialogue]]
speaker = "ユウリ"
# 「エロ王子、あんた……」
line = "「エロ王子、あんた……」"

[[dialogue]]
speaker = "ユーリス"
# 「大丈夫ですか、ユウリさん。ああ、恐怖のあまり椅子から転げ落ちてしまって。さぁお手をどうぞ」
line = "「大丈夫ですか、ユウリさん。ああ、恐怖のあまり椅子から転げ落ちてしまって。さぁお手をどうぞ」"

[[dialogue]]
speaker = "ユウリ"
# 「えっ……？　あっ……お……おう……」
line = "「えっ……？　あっ……お……おう……」"

[[dialogue]]
speaker = "セーラ"
# 「うわ、すご。あんな風に自然と女の子に手ぇ差し伸べられるもんなんだ？　さっすが王子だねー……？」
line = "「うわ、すご。あんな風に自然と女の子に手ぇ差し伸べられるもんなんだ？　さっすが王子だねー……？」"

[[dialogue]]
speaker = "unk"
# 輝くような王子っぷり……
line = "輝くような王子っぷり……"

[[dialogue]]
speaker = "セーラ"
# 「会長さん、この後王子と並んで仕事するんでしょ？　なんかご愁傷様」
line = "「会長さん、この後王子と並んで仕事するんでしょ？　なんかご愁傷様」"

[[dialogue]]
speaker = "ユーリス"
# 「さぁユウリさん、お手を」
line = "「さぁユウリさん、お手を」"

[[dialogue]]
speaker = "ユウリ"
# 「～～っっ！　じ、自分で立てるっつの！　つかあんたがあたしにバニースーツなんか着せっからこんなことになってるんだろうが！？」
line = "「～～っっ！　じ、自分で立てるっつの！　つかあんたがあたしにバニースーツなんか着せっからこんなことになってるんだろうが！？」"

[[dialogue]]
speaker = "ユーリス"
# 「あう！？　それについては本当に申し訳ありません……！」
line = "「あう！？　それについては本当に申し訳ありません……！」"

[[dialogue]]
speaker = "unk"
# やっぱりモテモテだったな
line = "やっぱりモテモテだったな"

[[dialogue]]
speaker = "ユーリス"
# 「あはは、そんなことないよ。会長よりカジノに慣れているだけさ。お客さんたちもオーバーだったしね」
line = "「あはは、そんなことないよ。会長よりカジノに慣れているだけさ。お客さんたちもオーバーだったしね」"

[[dialogue]]
speaker = "unk"
# 見事なカード捌きや振る舞いも勇者スキル？
line = "見事なカード捌きや振る舞いも勇者スキル？"

[[dialogue]]
speaker = "ユーリス"
# 「うん。勇者スキル『リフルシャッフル』に『ストリップ』、そして『ピッチング』──ご先祖様の華麗な技術の数々には私も頭が下がる思いだよ」
line = "「うん。勇者スキル『リフルシャッフル』に『ストリップ』、そして『ピッチング』──ご先祖様の華麗な技術の数々には私も頭が下がる思いだよ」"

[[dialogue]]
speaker = "ユーリス"
# 「でも振る舞いまで落ち着いて見えたのなら、それは会長のおかげかな」
line = "「でも振る舞いまで落ち着いて見えたのなら、それは会長のおかげかな」"

[[dialogue]]
speaker = "ユーリス"
# 「実を言うとすごく緊張していたんだ。恥ずかしいから、あまり大きな声では言えないんだけどね？」
line = "「実を言うとすごく緊張していたんだ。恥ずかしいから、あまり大きな声では言えないんだけどね？」"

[[dialogue]]
speaker = "unk"
# そんな風には見えなかったけど
line = "そんな風には見えなかったけど"

[[dialogue]]
speaker = "ユーリス"
# 「会長が隣にいてくれたからだよ。会長が傍にいてくれると不思議と安心するんだ」
line = "「会長が隣にいてくれたからだよ。会長が傍にいてくれると不思議と安心するんだ」"

[[dialogue]]
speaker = "ユーリス"
# 「なんと言えばいいかな……。会長が近くにいてくれるとこう……胸の中が温かくなってね？　肩の力も抜けていつもより自然体でいられるというか……」
line = "「なんと言えばいいかな……。会長が近くにいてくれるとこう……胸の中が温かくなってね？　肩の力も抜けていつもより自然体でいられるというか……」"

[[dialogue]]
speaker = "ユーリス"
# 「うん。やっぱり安心する……。ふふ、なんだか笑顔まで溢れてきちゃうよ……」
line = "「うん。やっぱり安心する……。ふふ、なんだか笑顔まで溢れてきちゃうよ……」"

[[dialogue]]
speaker = "unk"
# そ、そんなに見つめられると……
line = "そ、そんなに見つめられると……"

[[dialogue]]
speaker = "ユーリス"
# 「あっ──ご、ごめんね、つい……！　会長の顔を眺めていたら、もっと近くで見たくなっちゃって……！」
line = "「あっ──ご、ごめんね、つい……！　会長の顔を眺めていたら、もっと近くで見たくなっちゃって……！」"

[[dialogue]]
speaker = "ユーリス"
# 「とにかく会長には感謝してるからっ。きっと私１人だったら、緊張で頭の中が真っ白になってただろうし……！」
line = "「とにかく会長には感謝してるからっ。きっと私１人だったら、緊張で頭の中が真っ白になってただろうし……！」"

[[dialogue]]
speaker = "ユーリス"
# 「休憩明けはセーラさんたちを手伝いにいくんだよねっ？　私のことは気にせず、２人の傍にいてあげてよ！　今は逆に会長が傍にいると……！」
line = "「休憩明けはセーラさんたちを手伝いにいくんだよねっ？　私のことは気にせず、２人の傍にいてあげてよ！　今は逆に会長が傍にいると……！」"

[[dialogue]]
speaker = "ユーリス"
# 「ご、ごめん、ちょっとお手洗いに……！　なんだか顔が妙に熱くなっちゃってるから……！」
line = "「ご、ごめん、ちょっとお手洗いに……！　なんだか顔が妙に熱くなっちゃってるから……！」"

[[dialogue]]
speaker = "ユウリ"
# 「なに堂々と女子トイレ入ろうとしてんだ！？　エロ王子にも程があんぞ！？」
line = "「なに堂々と女子トイレ入ろうとしてんだ！？　エロ王子にも程があんぞ！？」"

[[dialogue]]
speaker = "ユーリス"
# 「ふぇっ！？　これは違うんです～～！！」
line = "「ふぇっ！？　これは違うんです～～！！」"
