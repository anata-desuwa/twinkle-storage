[[dialogue]]
speaker = "unk"
# 第１話,ありのままのキミが好き,P
line = "第１話,ありのままのキミが好き,P"

[[dialogue]]
speaker = "unk"
# 季節は夏。マトイと行動することが多くなっていた俺は、彼女を異性として意識するようになっていた。
line = "季節は夏。マトイと行動することが多くなっていた俺は、彼女を異性として意識するようになっていた。"

[[dialogue]]
speaker = "unk"
# そして今日。俺はマトイに、恋人として付き合って欲しいと、告白することを決めていた――
line = "そして今日。俺はマトイに、恋人として付き合って欲しいと、告白することを決めていた――"

[[dialogue]]
speaker = "マトイ"
# 「会長……き、今日はその、遊びに誘ってくれてありがとう」
line = "「会長……き、今日はその、遊びに誘ってくれてありがとう」"

[[dialogue]]
speaker = "マトイ"
# 「でも……星徒会の他の皆とかも呼ばなくて、本当に良かったの？」
line = "「でも……星徒会の他の皆とかも呼ばなくて、本当に良かったの？」"

[[dialogue]]
speaker = "マトイ"
# 「――う、ううん、私は会長と２人でも嫌じゃないよ！　私も会長と、海で遊びたいって思ってたし……」
line = "「――う、ううん、私は会長と２人でも嫌じゃないよ！　私も会長と、海で遊びたいって思ってたし……」"

[[dialogue]]
speaker = "マトイ"
# 「えへへ……♪　それじゃあ、何して遊ぼっか？」
line = "「えへへ……♪　それじゃあ、何して遊ぼっか？」"

[[dialogue]]
speaker = "マトイ"
# 「――海で水遊び？　うん、やっぱりそこからだよね！」
line = "「――海で水遊び？　うん、やっぱりそこからだよね！」"

[[dialogue]]
speaker = "マトイ"
# 「会長、見ててね！　それ～♪」
line = "「会長、見ててね！　それ～♪」"

[[dialogue]]
speaker = "マトイ"
# 「ふふふ、どう？　密かに水着フォームの訓練続けて、前より大きな波を起こせるようになったんだ～」
line = "「ふふふ、どう？　密かに水着フォームの訓練続けて、前より大きな波を起こせるようになったんだ～」"

[[dialogue]]
speaker = "マトイ"
# 「――凄い？　えへへ♪　じゃあ、今度は会長の番だね！　私が得意な防御を突破できるかな～？」
line = "「――凄い？　えへへ♪　じゃあ、今度は会長の番だね！　私が得意な防御を突破できるかな～？」"

[[dialogue]]
speaker = "マトイ"
# 「きゃっ、冷た～い♪　……なんちゃって！　全部防いじゃいました～♪　そう簡単には行かないよ～！」
line = "「きゃっ、冷た～い♪　……なんちゃって！　全部防いじゃいました～♪　そう簡単には行かないよ～！」"

[[dialogue]]
speaker = "マトイ"
# 「ふぅ……砂浜で少し休憩～」
line = "「ふぅ……砂浜で少し休憩～」"

[[dialogue]]
speaker = "マトイ"
# 「あはは、２人で水の掛け合いっこしてるだけだったのに、子供みたいに凄く楽しんじゃった♪」
line = "「あはは、２人で水の掛け合いっこしてるだけだったのに、子供みたいに凄く楽しんじゃった♪」"

[[dialogue]]
speaker = "マトイ"
# 「その……会長はどうだった？　――楽しめた？　なら良かった。会長も一緒の気持ちで……えへへ♪」
line = "「その……会長はどうだった？　――楽しめた？　なら良かった。会長も一緒の気持ちで……えへへ♪」"

[[dialogue]]
speaker = "unk"
# （良い雰囲気……これなら！）
line = "（良い雰囲気……これなら！）"

[[dialogue]]
speaker = "マトイ"
# 「うん？　どうしたの、会長？　……あっ、もしかして――」
line = "「うん？　どうしたの、会長？　……あっ、もしかして――」"

[[dialogue]]
speaker = "マトイ"
# 「お腹が減ったとか！　いつの間にか、お昼の時間になってるし、海の家に何か買いに行く？」
line = "「お腹が減ったとか！　いつの間にか、お昼の時間になってるし、海の家に何か買いに行く？」"

[[dialogue]]
speaker = "マトイ"
# 「私もお腹空いて来たし……あれ？　ごめん、違った？」
line = "「私もお腹空いて来たし……あれ？　ごめん、違った？」"

[[dialogue]]
speaker = "unk"
# （お腹空いてるなら、後にした方がいいよな）
line = "（お腹空いてるなら、後にした方がいいよな）"

[[dialogue]]
speaker = "マトイ"
# 「合ってる？　良かった♪　じゃあ、行こっか」
line = "「合ってる？　良かった♪　じゃあ、行こっか」"

[[dialogue]]
speaker = "マトイ"
# 「ん～♪　やっぱりリップルの作った焼きそばは最高～♪」
line = "「ん～♪　やっぱりリップルの作った焼きそばは最高～♪」"

[[dialogue]]
speaker = "マトイ"
# 「あっ、会長、頬っぺたに海苔がくっ付いてる。少しじっとしてて。ん……はい、取れた♪」
line = "「あっ、会長、頬っぺたに海苔がくっ付いてる。少しじっとしてて。ん……はい、取れた♪」"

[[dialogue]]
speaker = "マトイ"
# 「って、周りから見られちゃってる……！？　ご、ごめん……会長と２人で居るんだもんね……」
line = "「って、周りから見られちゃってる……！？　ご、ごめん……会長と２人で居るんだもんね……」"

[[dialogue]]
speaker = "マトイ"
# 「こんなことしたら注目されちゃうよ……は、恥ずかしい……。その……気付いたら、手が伸びちゃってて……」
line = "「こんなことしたら注目されちゃうよ……は、恥ずかしい……。その……気付いたら、手が伸びちゃってて……」"

[[dialogue]]
speaker = "unk"
# （良い雰囲気だけど、場所が……！）
line = "（良い雰囲気だけど、場所が……！）"

[[dialogue]]
speaker = "unk"
# そうしてズルズルと告白できないまま、日が落ちてしまった――
line = "そうしてズルズルと告白できないまま、日が落ちてしまった――"

[[dialogue]]
speaker = "マトイ"
# 「もう夜か～。あっという間に時間過ぎちゃったね～」
line = "「もう夜か～。あっという間に時間過ぎちゃったね～」"

[[dialogue]]
speaker = "マトイ"
# 「さすがにもう、暗くて水遊びも出来ないし、今日のところはこれでお開きかな……」
line = "「さすがにもう、暗くて水遊びも出来ないし、今日のところはこれでお開きかな……」"

[[dialogue]]
speaker = "unk"
# そうだな……また今度遊びに――
line = "そうだな……また今度遊びに――"

[[dialogue]]
speaker = "マトイ"
# 「あっ、また一緒に遊びに連れていってくれるの？　そっかぁ――」
line = "「あっ、また一緒に遊びに連れていってくれるの？　そっかぁ――」"

[[dialogue]]
speaker = "マトイ"
# 「何かちょっと嬉しい……えへへ♪」
line = "「何かちょっと嬉しい……えへへ♪」"

[[dialogue]]
speaker = "unk"
# っ……マトイ！
line = "っ……マトイ！"

[[dialogue]]
speaker = "マトイ"
# 「ひゃっ！？　かかか会長、手をいきなり握ったりして、どうしたの！？」
line = "「ひゃっ！？　かかか会長、手をいきなり握ったりして、どうしたの！？」"

[[dialogue]]
speaker = "マトイ"
# 「――話したいことがある？　な、何でしょう……？」
line = "「――話したいことがある？　な、何でしょう……？」"

[[dialogue]]
speaker = "unk"
# ……好きだ。俺と付き合って欲しい
line = "……好きだ。俺と付き合って欲しい"

[[dialogue]]
speaker = "マトイ"
# 「は、はい……って、え？　……ええぇぇぇっ！？」
line = "「は、はい……って、え？　……ええぇぇぇっ！？」"

[[dialogue]]
speaker = "マトイ"
# 「な、何これ……ドッキリ！？　実はヴィーナスとかアナとかサーシャさんが、どこかに隠れて見てたりする！？」
line = "「な、何これ……ドッキリ！？　実はヴィーナスとかアナとかサーシャさんが、どこかに隠れて見てたりする！？」"

[[dialogue]]
speaker = "マトイ"
# 「――違う？　本気で？　真面目に？　そ、そっか……。ごめんね。会長はそんなこと、しないもんね……」
line = "「――違う？　本気で？　真面目に？　そ、そっか……。ごめんね。会長はそんなこと、しないもんね……」"

[[dialogue]]
speaker = "マトイ"
# 「――わ、私がしてくれる色んなことが嬉しくて、気が付いたら好きになっていた……？」
line = "「――わ、私がしてくれる色んなことが嬉しくて、気が付いたら好きになっていた……？」"

[[dialogue]]
speaker = "マトイ"
# 「い、いやでも……私、周りに比べたら、地味で普通だし……！」
line = "「い、いやでも……私、周りに比べたら、地味で普通だし……！」"

[[dialogue]]
speaker = "unk"
# 普通じゃない。マトイは俺にとっての特別だ
line = "普通じゃない。マトイは俺にとっての特別だ"

[[dialogue]]
speaker = "マトイ"
# 「……！　あぅ……！」
line = "「……！　あぅ……！」"

[[dialogue]]
speaker = "マトイ"
# 「私が……会長の、特別……！」
line = "「私が……会長の、特別……！」"

[[dialogue]]
speaker = "マトイ"
# 「その……私も会長のこと……好き、です……」
line = "「その……私も会長のこと……好き、です……」"

[[dialogue]]
speaker = "マトイ"
# 「私でよければ……お付き合い、よろしくお願いします……」
line = "「私でよければ……お付き合い、よろしくお願いします……」"

[[dialogue]]
speaker = "unk"
# やっと告白できた……
line = "やっと告白できた……"

[[dialogue]]
speaker = "マトイ"
# 「えへへ……実は私も……本当はずっと、好きって思ってたから……」
line = "「えへへ……実は私も……本当はずっと、好きって思ってたから……」"

[[dialogue]]
speaker = "マトイ"
# 「気持ちが一緒で、凄く嬉しい……♪」
line = "「気持ちが一緒で、凄く嬉しい……♪」"

[[dialogue]]
speaker = "マトイ"
# 「これから、改めてよろしくね……♪」
line = "「これから、改めてよろしくね……♪」"

[[dialogue]]
speaker = "unk"
# そう言って、マトイは照れ臭そうに、俺の手をそっと握り返すのだった――
line = "そう言って、マトイは照れ臭そうに、俺の手をそっと握り返すのだった――"
