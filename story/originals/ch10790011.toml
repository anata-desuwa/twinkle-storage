[[dialogue]]
speaker = "unk"
# 第１話,死神との再会,P
line = "第１話,死神との再会,P"

[[dialogue]]
speaker = "unk"
# 遊園地での堕天使の一件からしばらく。
line = "遊園地での堕天使の一件からしばらく。"

[[dialogue]]
speaker = "unk"
# 消えたパテルのためにアニマ先輩が義体を用意してくれたものの、適合はできなかった。
line = "消えたパテルのためにアニマ先輩が義体を用意してくれたものの、適合はできなかった。"

[[dialogue]]
speaker = "unk"
# それに守護天使パテルはリクリエに介入する気はないとも言っていた。
line = "それに守護天使パテルはリクリエに介入する気はないとも言っていた。"

[[dialogue]]
speaker = "unk"
# もしかするともう二度と会うことはないかもしれない──
line = "もしかするともう二度と会うことはないかもしれない──"

[[dialogue]]
speaker = "？？？"
# 「ふぅ～～」
line = "「ふぅ～～」"

[[dialogue]]
speaker = "unk"
# 耳に息が！？
line = "耳に息が！？"

[[dialogue]]
speaker = "パテル"
# 「やー、魔王♪　また会ったね！」
line = "「やー、魔王♪　また会ったね！」"

[[dialogue]]
speaker = "パテル"
# 「アハハッ、驚いてる驚いてる。カラスがマシンガン食らったような顔してるよ♪」
line = "「アハハッ、驚いてる驚いてる。カラスがマシンガン食らったような顔してるよ♪」"

[[dialogue]]
speaker = "パテル"
# 「死は音もなく忍び寄るものだからね。魔王に気付かれずに近づくくらい楽勝だよ」
line = "「死は音もなく忍び寄るものだからね。魔王に気付かれずに近づくくらい楽勝だよ」"

[[dialogue]]
speaker = "パテル"
# 「おやおや、どうしてあたしがここにいるんだって言いたそうだね。だけどそれは企業秘密。魔王が相手でも話せないなー」
line = "「おやおや、どうしてあたしがここにいるんだって言いたそうだね。だけどそれは企業秘密。魔王が相手でも話せないなー」"

[[dialogue]]
speaker = "unk"
# それでも会えて嬉しい
line = "それでも会えて嬉しい"

[[dialogue]]
speaker = "パテル"
# 「へー、素直に喜ぶんだね。そういうところちょっとかわいいかも」
line = "「へー、素直に喜ぶんだね。そういうところちょっとかわいいかも」"

[[dialogue]]
speaker = "パテル"
# 「もしかしたら、あたしが敵かもしれないのにね……？」
line = "「もしかしたら、あたしが敵かもしれないのにね……？」"

[[dialogue]]
speaker = "パテル"
# 「アハハッ、ビビらなくてもだいじょーぶだいじょーぶ。ホントに敵だったら後ろからバッサリ切ってるから。安心していーよ」
line = "「アハハッ、ビビらなくてもだいじょーぶだいじょーぶ。ホントに敵だったら後ろからバッサリ切ってるから。安心していーよ」"

[[dialogue]]
speaker = "パテル"
# 「ま、味方とも言い切れないけど。前も言ったけど、あたしは基本的にリクリエ静観派だから」
line = "「ま、味方とも言い切れないけど。前も言ったけど、あたしは基本的にリクリエ静観派だから」"

[[dialogue]]
speaker = "パテル"
# 「あたしは『淘汰』を司る守護天使。つまり死神。命を選別する者」
line = "「あたしは『淘汰』を司る守護天使。つまり死神。命を選別する者」"

[[dialogue]]
speaker = "パテル"
# 「相手が気に入ったからって長生きさせたり、嫌いだからって早死にさせたり、私情を挟むことはあってはならない」
line = "「相手が気に入ったからって長生きさせたり、嫌いだからって早死にさせたり、私情を挟むことはあってはならない」"

[[dialogue]]
speaker = "パテル"
# 「たとえリクリエが起こっても、その後には新しい世界ができる。つまり新しい命が生まれる」
line = "「たとえリクリエが起こっても、その後には新しい世界ができる。つまり新しい命が生まれる」"

[[dialogue]]
speaker = "パテル"
# 「今生きている命と、これから生まれてくる命を、あたしの感情で天秤にかけるわけにはいかないからね」
line = "「今生きている命と、これから生まれてくる命を、あたしの感情で天秤にかけるわけにはいかないからね」"

[[dialogue]]
speaker = "パテル"
# 「──って、こんなつまらない話しに来たんじゃないや。グロリアは元気？　フランはしぶとそうだから別に気にしてないけど」
line = "「──って、こんなつまらない話しに来たんじゃないや。グロリアは元気？　フランはしぶとそうだから別に気にしてないけど」"

[[dialogue]]
speaker = "パテル"
# 「……２人とも元気？　そっかそっか。ならいいんだけど」
line = "「……２人とも元気？　そっかそっか。ならいいんだけど」"

[[dialogue]]
speaker = "パテル"
# 「あたしヒマしててさー、ちょっと遊ばな～い？　魔王だってカワイイあたしと遊びたいでしょ？　今ならこの美少女プルちゃんが付き合ってあげるよっ」
line = "「あたしヒマしててさー、ちょっと遊ばな～い？　魔王だってカワイイあたしと遊びたいでしょ？　今ならこの美少女プルちゃんが付き合ってあげるよっ」"

[[dialogue]]
speaker = "パテル"
# 「ね？　プリチーでキュートなプルちゃんがいいことしてあ・げ・る<emoji=heart04>」
line = "「ね？　プリチーでキュートなプルちゃんがいいことしてあ・げ・る<emoji=heart04>」"

[[dialogue]]
speaker = "パテル"
# 「ねぇ今いやらしいこと考えた？　考えちゃった？　プププッ、魔王ってエッチなんだ～」
line = "「ねぇ今いやらしいこと考えた？　考えちゃった？　プププッ、魔王ってエッチなんだ～」"

[[dialogue]]
speaker = "パテル"
# 「──って、無視して行こうとしないで！？　からかってごめんってば！？」
line = "「──って、無視して行こうとしないで！？　からかってごめんってば！？」"

[[dialogue]]
speaker = "パテル"
# 「んも～、魔王ってばノリが悪いんだから。でもお外で話してるのもなんだしー……お茶するお金もないしー……」
line = "「んも～、魔王ってばノリが悪いんだから。でもお外で話してるのもなんだしー……お茶するお金もないしー……」"

[[dialogue]]
speaker = "パテル"
# 「魔王のおうちにお邪魔するね！」
line = "「魔王のおうちにお邪魔するね！」"

[[dialogue]]
speaker = "パテル"
# 「お～、これが魔王のおうちかー！　でも魔王っていうくらいだから、厳つくて座り心地悪そうな玉座とか、目が光る髑髏の燭台とかあっても面白かったのになー」
line = "「お～、これが魔王のおうちかー！　でも魔王っていうくらいだから、厳つくて座り心地悪そうな玉座とか、目が光る髑髏の燭台とかあっても面白かったのになー」"

[[dialogue]]
speaker = "パテル"
# 「ねぇねぇ、今からでも魔王っぽく改造しない？　マンションごと城にしてさ、バカみたいに広い玉座の間を──」
line = "「ねぇねぇ、今からでも魔王っぽく改造しない？　マンションごと城にしてさ、バカみたいに広い玉座の間を──」"

[[dialogue]]
speaker = "パテル"
# 「あ……」
line = "「あ……」"

[[dialogue]]
speaker = "unk"
# 何か食べる？
line = "何か食べる？"

[[dialogue]]
speaker = "パテル"
# 「ううん、これくらい平気……」
line = "「ううん、これくらい平気……」"

[[dialogue]]
speaker = "パテル"
# 「あぅ……またお腹の音が……」
line = "「あぅ……またお腹の音が……」"

[[dialogue]]
speaker = "unk"
# 大丈夫？
line = "大丈夫？"

[[dialogue]]
speaker = "パテル"
# 「あー……この体になってから全然食べてなくてさ。ていうか食べるって行為がちょっとね」
line = "「あー……この体になってから全然食べてなくてさ。ていうか食べるって行為がちょっとね」"

[[dialogue]]
speaker = "パテル"
# 「マグダレナたちの義体と違って、この体は本物の天使の肉体に近い。でも食べるってことは、命を奪うってことでしょ？　不干渉主義のあたしとしては抵抗があるんだよねー」
line = "「マグダレナたちの義体と違って、この体は本物の天使の肉体に近い。でも食べるってことは、命を奪うってことでしょ？　不干渉主義のあたしとしては抵抗があるんだよねー」"

[[dialogue]]
speaker = "unk"
# でもそれが生きるってことだ
line = "でもそれが生きるってことだ"

[[dialogue]]
speaker = "パテル"
# 「う……わかってはいるんだけど。勢いで体作ってもらうんじゃなかったかなぁ……」
line = "「う……わかってはいるんだけど。勢いで体作ってもらうんじゃなかったかなぁ……」"

[[dialogue]]
speaker = "パテル"
# 「ん？　何それ……お菓子？　あたしにくれるの？」
line = "「ん？　何それ……お菓子？　あたしにくれるの？」"

[[dialogue]]
speaker = "unk"
# 少しでも食べた方がいい
line = "少しでも食べた方がいい"

[[dialogue]]
speaker = "パテル"
# 「食べないとあたしの体が心配？　はぁ……そこまで言われると断れないなぁ」
line = "「食べないとあたしの体が心配？　はぁ……そこまで言われると断れないなぁ」"

[[dialogue]]
speaker = "パテル"
# 「あ～ん。あむあむ……ごくっ」
line = "「あ～ん。あむあむ……ごくっ」"

[[dialogue]]
speaker = "パテル"
# 「……これが食べるってことか。お腹にものが入ると元気出るね」
line = "「……これが食べるってことか。お腹にものが入ると元気出るね」"

[[dialogue]]
speaker = "パテル"
# 「守護天使なのに人間に教えられちゃった気分だよ。なんか敗北感」
line = "「守護天使なのに人間に教えられちゃった気分だよ。なんか敗北感」"

[[dialogue]]
speaker = "パテル"
# 「でも感謝はしてるよ。おいしかった。ありがとね」
line = "「でも感謝はしてるよ。おいしかった。ありがとね」"

[[dialogue]]
speaker = "パテル"
# 「隙あり～っ！　コチョコチョコチョ～！」
line = "「隙あり～っ！　コチョコチョコチョ～！」"

[[dialogue]]
speaker = "パテル"
# 「アハハッ、死神相手に油断しちゃダメだよ♪　死はいつでもあなたを狙ってるんだから」
line = "「アハハッ、死神相手に油断しちゃダメだよ♪　死はいつでもあなたを狙ってるんだから」"

[[dialogue]]
speaker = "パテル"
# 「リクリエから世界を救う魔王であろうと、突然の死は起こりうる。戦いの中で死ねるとは限らない」
line = "「リクリエから世界を救う魔王であろうと、突然の死は起こりうる。戦いの中で死ねるとは限らない」"

[[dialogue]]
speaker = "パテル"
# 「あなたのことは嫌いじゃないけど、直接助けてはあげられないから気を付けてね」
line = "「あなたのことは嫌いじゃないけど、直接助けてはあげられないから気を付けてね」"

[[dialogue]]
speaker = "パテル"
# 「じゃ、おやつもごちそうになったしそろそろ帰るね。シーユーアゲイン♪」
line = "「じゃ、おやつもごちそうになったしそろそろ帰るね。シーユーアゲイン♪」"
