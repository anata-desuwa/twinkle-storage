[[dialogue]]
speaker = "unk"
# 第１２話,ルヴィネの演説,B
line = "第１２話,ルヴィネの演説,B"

[[dialogue]]
speaker = "unk"
# 流星市国において数年ぶりとなる星騎士養成機関──極星学園の開校初日。
line = "流星市国において数年ぶりとなる星騎士養成機関──極星学園の開校初日。"

[[dialogue]]
speaker = "unk"
# 学園内だけでなく、流星市国内全域に、ルヴィネの声は届けられることになっていた。
line = "学園内だけでなく、流星市国内全域に、ルヴィネの声は届けられることになっていた。"

[[dialogue]]
speaker = "ルヴィネ"
# 『星騎士のみんな──極星学園への入学、本当におめでとう。私は星徒会長のルヴィネ』
line = "『星騎士のみんな──極星学園への入学、本当におめでとう。私は星徒会長のルヴィネ』"

[[dialogue]]
speaker = "ルヴィネ"
# 『思えば今日まで本当に長かった。私たちの記憶に刻み込まれたあの惨劇の日……』
line = "『思えば今日まで本当に長かった。私たちの記憶に刻み込まれたあの惨劇の日……』"

[[dialogue]]
speaker = "ルヴィネ"
# 『ニュクス流星群の到来によって、この流星市国はその機能のほとんどを失ったわ』
line = "『ニュクス流星群の到来によって、この流星市国はその機能のほとんどを失ったわ』"

[[dialogue]]
speaker = "ルヴィネ"
# 『市国のシンボルであった流星学園と、新星学園。二校が擁する星騎士も、その尊い命を散らせてしまった』
line = "『市国のシンボルであった流星学園と、新星学園。二校が擁する星騎士も、その尊い命を散らせてしまった』"

[[dialogue]]
speaker = "ルヴィネ"
# 『けれど──デネブの人達は諦めなかった。リクリエを跳ねのける、生き延びるという強い意志でここまで来た』
line = "『けれど──デネブの人達は諦めなかった。リクリエを跳ねのける、生き延びるという強い意志でここまで来た』"

[[dialogue]]
speaker = "ルヴィネ"
# 『この極星学園は、デネブの人々の強い意思によって創設されたもの。この学び舎を見るたびに、そのことを思い出して欲しい』
line = "『この極星学園は、デネブの人々の強い意思によって創設されたもの。この学び舎を見るたびに、そのことを思い出して欲しい』"

[[dialogue]]
speaker = "ルヴィネ"
# 『平和のために、世界のために戦う人々がいたからこそ、この学園はここに生まれたのだということを』
line = "『平和のために、世界のために戦う人々がいたからこそ、この学園はここに生まれたのだということを』"

[[dialogue]]
speaker = "ルヴィネ"
# 『そしてこの学園の扉を叩いた、自分自身を誇って欲しい。あなたたちは騎士よ。自分よりも弱い者を守る使命を抱いた、星の輝きを宿す騎士』
line = "『そしてこの学園の扉を叩いた、自分自身を誇って欲しい。あなたたちは騎士よ。自分よりも弱い者を守る使命を抱いた、星の輝きを宿す騎士』"

[[dialogue]]
speaker = "ルヴィネ"
# 『星力があるから騎士なのではないわ。弱きを助け強きをくじく──その崇高な魂を持つからこそ、あなたたちは騎士なの』
line = "『星力があるから騎士なのではないわ。弱きを助け強きをくじく──その崇高な魂を持つからこそ、あなたたちは騎士なの』"

[[dialogue]]
speaker = "ルヴィネ"
# 『己を誇り、己を高め、未来へ向かって突き進んでほしい。それが未熟ながら星徒会長を任された私、天使ルヴィネのささやかな願い──』
line = "『己を誇り、己を高め、未来へ向かって突き進んでほしい。それが未熟ながら星徒会長を任された私、天使ルヴィネのささやかな願い──』"

[[dialogue]]
speaker = "unk"
# 極星学園には、かつての学園に存在したアリーナはない。９年前の決戦の折、それは破壊されつくされていた。
line = "極星学園には、かつての学園に存在したアリーナはない。９年前の決戦の折、それは破壊されつくされていた。"

[[dialogue]]
speaker = "unk"
# グレイスは中庭に佇みながら、ルヴィネの声に耳を澄ませる。
line = "グレイスは中庭に佇みながら、ルヴィネの声に耳を澄ませる。"

[[dialogue]]
speaker = "ルヴィネ"
# 『楽しい学園生活に胸を躍らせている人も多いと思う。けれど１つだけ、どうしても伝えたいことがあるの』
line = "『楽しい学園生活に胸を躍らせている人も多いと思う。けれど１つだけ、どうしても伝えたいことがあるの』"

[[dialogue]]
speaker = "ルヴィネ"
# 『平行世界──その存在は以前より、私から伝えていたと思う。女神テルル様より賜ったお言葉よ』
line = "『平行世界──その存在は以前より、私から伝えていたと思う。女神テルル様より賜ったお言葉よ』"

[[dialogue]]
speaker = "ルヴィネ"
# 『私たちの世界はデネブ。他にベガと、アルタイルという世界が存在している──』
line = "『私たちの世界はデネブ。他にベガと、アルタイルという世界が存在している──』"

[[dialogue]]
speaker = "ルヴィネ"
# 『３つの平行世界は、本来あり得ない形。最後には１つにならねばならないと、女神様は仰っている』
line = "『３つの平行世界は、本来あり得ない形。最後には１つにならねばならないと、女神様は仰っている』"

[[dialogue]]
speaker = "ルヴィネ"
# 『ベガはすでに滅びた。残るは、デネブとアルタイル──どちらかが滅ぶまで、不安定な世界は続いてしまう』
line = "『ベガはすでに滅びた。残るは、デネブとアルタイル──どちらかが滅ぶまで、不安定な世界は続いてしまう』"

[[dialogue]]
speaker = "ルヴィネ"
# 『だから私は……覚悟を決めた。デネブを守るために、アルタイルと戦うと』
line = "『だから私は……覚悟を決めた。デネブを守るために、アルタイルと戦うと』"

[[dialogue]]
speaker = "ルヴィネ"
# 『アルタイルには、あの卑劣な裏切り者がいる──私たちの世界を捨てて、我が身可愛さに逃げだした偽りの英雄。魔王クロトが』
line = "『アルタイルには、あの卑劣な裏切り者がいる──私たちの世界を捨てて、我が身可愛さに逃げだした偽りの英雄。魔王クロトが』"

[[dialogue]]
speaker = "グレイス"
# 「緋宮……クロト！」
line = "「緋宮……クロト！」"

[[dialogue]]
speaker = "ルヴィネ"
# 『嫌な名前を聞かせてしまってごめんなさい。けれど、あの男は一度、保身のために世界を捨てた男』
line = "『嫌な名前を聞かせてしまってごめんなさい。けれど、あの男は一度、保身のために世界を捨てた男』"

[[dialogue]]
speaker = "ルヴィネ"
# 『いずれ、デネブを滅ぼすために行動を起こすはず』
line = "『いずれ、デネブを滅ぼすために行動を起こすはず』"

[[dialogue]]
speaker = "ルヴィネ"
# 『私たちの敵はモンスターだけではない。平行世界の、魔王が擁する星騎士たちとも戦わなければならない』
line = "『私たちの敵はモンスターだけではない。平行世界の、魔王が擁する星騎士たちとも戦わなければならない』"

[[dialogue]]
speaker = "レティシア"
# 「市国民の反応を見ていて欲しいってルヴィに言われたけれど……予想どおり。みんな驚いてるわね」
line = "「市国民の反応を見ていて欲しいってルヴィに言われたけれど……予想どおり。みんな驚いてるわね」"

[[dialogue]]
speaker = "unk"
# 平行世界は争わねばならない。世界はたった１つにならねばならないというルヴィネの言葉に、デネブ市民に動揺が広がっていく。
line = "平行世界は争わねばならない。世界はたった１つにならねばならないというルヴィネの言葉に、デネブ市民に動揺が広がっていく。"

[[dialogue]]
speaker = "ルヴィネ"
# 『けれど私たちは負けない。デネブは滅びない。あなたたちには、女神がついている』
line = "『けれど私たちは負けない。デネブは滅びない。あなたたちには、女神がついている』"

[[dialogue]]
speaker = "レティシア"
# 「そして──女神の遣い、ルヴィがいるものね。私たちは負けないわ」
line = "「そして──女神の遣い、ルヴィがいるものね。私たちは負けないわ」"

[[dialogue]]
speaker = "ルヴィネ"
# 『デネブは復興を遂げたばかり。失われた技術もたくさんある──けれどアルタイルの後塵を拝すつもりはない』
line = "『デネブは復興を遂げたばかり。失われた技術もたくさんある──けれどアルタイルの後塵を拝すつもりはない』"

[[dialogue]]
speaker = "ルヴィネ"
# 『この放送を聞いているデネブのみんな。隣を見て欲しい。そこには誰がいるかしら？』
line = "『この放送を聞いているデネブのみんな。隣を見て欲しい。そこには誰がいるかしら？』"

[[dialogue]]
speaker = "ルヴィネ"
# 『家族か、友達か──きっと愛しい人がいるはずよ。その人を守るために、奮って欲しい』
line = "『家族か、友達か──きっと愛しい人がいるはずよ。その人を守るために、奮って欲しい』"

[[dialogue]]
speaker = "ルヴィネ"
# 『自らの為でなく、愛しい人の未来を守るため……その強い想いが、あなたたちに宿った星の輝きを、さらに輝かせるわ』
line = "『自らの為でなく、愛しい人の未来を守るため……その強い想いが、あなたたちに宿った星の輝きを、さらに輝かせるわ』"

[[dialogue]]
speaker = "ルヴィネ"
# 『どんな過酷な状況でも、１人でなければ乗り越えられる。私たちはそのことを知っている』
line = "『どんな過酷な状況でも、１人でなければ乗り越えられる。私たちはそのことを知っている』"

[[dialogue]]
speaker = "ルヴィネ"
# 『勝ちましょう。生き延びましょう。私たちの大好きな、この世界を守るために……』
line = "『勝ちましょう。生き延びましょう。私たちの大好きな、この世界を守るために……』"

[[dialogue]]
speaker = "ルヴィネ"
# 『天使ルヴィネは、女神の遣いとして、そして極星学園の星徒会長として──』
line = "『天使ルヴィネは、女神の遣いとして、そして極星学園の星徒会長として──』"

[[dialogue]]
speaker = "ルヴィネ"
# 『これまでに以上に、デネブのために身も心も捧げることを、ここに誓うわ』
line = "『これまでに以上に、デネブのために身も心も捧げることを、ここに誓うわ』"

[[dialogue]]
speaker = "チナ"
# 「アタシも誓うよ、ルヴィ。デネブを守るためなら、命なんてくれてやる」
line = "「アタシも誓うよ、ルヴィ。デネブを守るためなら、命なんてくれてやる」"

[[dialogue]]
speaker = "ルヴィネ"
# 『──今日は私の話を聴いてくれてありがとう。どうかこの極星学園での生活が、楽しく、満ち足りた日々にならんことを』
line = "『──今日は私の話を聴いてくれてありがとう。どうかこの極星学園での生活が、楽しく、満ち足りた日々にならんことを』"

[[dialogue]]
speaker = "ルヴィネ"
# 『真面目な話ばかりでは退屈でしょう。この後、レクリエーションも用意しているわ。さあ、私たちの学園生活を始めましょう！』
line = "『真面目な話ばかりでは退屈でしょう。この後、レクリエーションも用意しているわ。さあ、私たちの学園生活を始めましょう！』"

[[dialogue]]
speaker = "unk"
# ルヴィネが手元にあった通信機のスイッチをオフにすると──わぁっ、と。学園中から生徒たちの歓声の声が上がった。
line = "ルヴィネが手元にあった通信機のスイッチをオフにすると──わぁっ、と。学園中から生徒たちの歓声の声が上がった。"

[[dialogue]]
speaker = "ベアトリス"
# 「お疲れ様、ルヴィ。いい演説だったよ」
line = "「お疲れ様、ルヴィ。いい演説だったよ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……ベアト。あなたが反対しているのを知っていて……ごめんなさい」
line = "「……ベアト。あなたが反対しているのを知っていて……ごめんなさい」"

[[dialogue]]
speaker = "ベアトリス"
# 「ううん。ルヴィの気持ちも分かるから……でも、私は諦めないよ！　絶対にアルタイルと、仲良くなれる道を探してみせる！」
line = "「ううん。ルヴィの気持ちも分かるから……でも、私は諦めないよ！　絶対にアルタイルと、仲良くなれる道を探してみせる！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……そう」
line = "「……そう」"

[[dialogue]]
speaker = "ベアトリス"
# 「星徒会のみんなで集まろっか。お昼まだだし、何か食べよっ」
line = "「星徒会のみんなで集まろっか。お昼まだだし、何か食べよっ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……この後、教皇庁との会合もあるから。ニンニクはなしでお願いね」
line = "「……この後、教皇庁との会合もあるから。ニンニクはなしでお願いね」"

[[dialogue]]
speaker = "ベアトリス"
# 「え～っ！？　せっかくカフェテリアのメニュー、チェックしてたのに～っ！？」
line = "「え～っ！？　せっかくカフェテリアのメニュー、チェックしてたのに～っ！？」"

[[dialogue]]
speaker = "チナ"
# 「え～っと、ルヴィたちは……っと。あ、いたいた！　おーい、ルヴィ──」
line = "「え～っと、ルヴィたちは……っと。あ、いたいた！　おーい、ルヴィ──」"

[[dialogue]]
speaker = "魔族の留学生"
# 「おい、デネブの救世主。どんな奴かと思ったら、あのちっこいやつみたいだぜ」
line = "「おい、デネブの救世主。どんな奴かと思ったら、あのちっこいやつみたいだぜ」"

[[dialogue]]
speaker = "魔族の留学生"
# 「ほんとだ……おいおい、附属に通えるかも怪しい年頃じゃないか？　本当にあれが、リクリエの危機を救ったってのか……？」
line = "「ほんとだ……おいおい、附属に通えるかも怪しい年頃じゃないか？　本当にあれが、リクリエの危機を救ったってのか……？」"

[[dialogue]]
speaker = "チナ"
# （魔界からの留学生か……？　そりゃあルヴィはちっこいけど……）
line = "（魔界からの留学生か……？　そりゃあルヴィはちっこいけど……）"

[[dialogue]]
speaker = "魔族の留学生"
# 「噂じゃあ、星徒会役員は全員、自分の幼なじみを指名したって話だぜ。まあ子供っぽい見た目だしな」
line = "「噂じゃあ、星徒会役員は全員、自分の幼なじみを指名したって話だぜ。まあ子供っぽい見た目だしな」"

[[dialogue]]
speaker = "魔族の留学生"
# 「全員コネってか？　大丈夫かよ。そんなやつが俺たちのリーダー……なんだか不安になってくるぜ」
line = "「全員コネってか？　大丈夫かよ。そんなやつが俺たちのリーダー……なんだか不安になってくるぜ」"

[[dialogue]]
speaker = "チナ"
# （こいつら～っ。ルヴィを小馬鹿にするだなんて……！）
line = "（こいつら～っ。ルヴィを小馬鹿にするだなんて……！）"

[[dialogue]]
speaker = "チナ"
# （でも、外から来た奴にはそう見えるのか……アタシら役員が何か粗相をしたら、それもルヴィのイメージダウンに繋がっちゃうってことだよな）
line = "（でも、外から来た奴にはそう見えるのか……アタシら役員が何か粗相をしたら、それもルヴィのイメージダウンに繋がっちゃうってことだよな）"

[[dialogue]]
speaker = "チナ"
# （アタシたち５人が周りからどう見えるかも、ちゃんと考えなきゃ……一枚岩じゃないと、アルタイルには勝てない）
line = "（アタシたち５人が周りからどう見えるかも、ちゃんと考えなきゃ……一枚岩じゃないと、アルタイルには勝てない）"

[[dialogue]]
speaker = "チナ"
# （……これからはちゃんとした言葉遣いで、役員として恥ずかしくないように、過ごさなきゃだ。戦争を、やるんだから）
line = "（……これからはちゃんとした言葉遣いで、役員として恥ずかしくないように、過ごさなきゃだ。戦争を、やるんだから）"

[[dialogue]]
speaker = "チナ"
# 「お疲れ様です、ルヴィネ会長！　先ほどの演説、聞きほれてしまいました！」
line = "「お疲れ様です、ルヴィネ会長！　先ほどの演説、聞きほれてしまいました！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「──！？」
line = "「──！？」"

[[dialogue]]
speaker = "チナ"
# 「ベアトリス副会長もご苦労様です！」
line = "「ベアトリス副会長もご苦労様です！」"

[[dialogue]]
speaker = "ベアトリス"
# 「えっ、えっ……！？」
line = "「えっ、えっ……！？」"

[[dialogue]]
speaker = "チナ"
# 「お２人とも、これから昼食でしょうか？　よろしければアタシも同席させてください！」
line = "「お２人とも、これから昼食でしょうか？　よろしければアタシも同席させてください！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「チナ？　ど、どうかしたの。頭でも打った……？」
line = "「チナ？　ど、どうかしたの。頭でも打った……？」"

[[dialogue]]
speaker = "チナ"
# 「いえいえ！　アタシはいつもどおりです！　ルヴィネ会長！！」
line = "「いえいえ！　アタシはいつもどおりです！　ルヴィネ会長！！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「？？？　……？？」
line = "「？？？　……？？」"

[[dialogue]]
speaker = "チナ"
# （……ちゃんと覚悟を決めよう。アルタイルを滅ぼすその時まで）
line = "（……ちゃんと覚悟を決めよう。アルタイルを滅ぼすその時まで）"

[[dialogue]]
speaker = "チナ"
# （アタシはデネブを守る星騎士だ。ルヴィネの……ルヴィネ会長の槍として働く、一本の槍だ──！）
line = "（アタシはデネブを守る星騎士だ。ルヴィネの……ルヴィネ会長の槍として働く、一本の槍だ──！）"

[[dialogue]]
speaker = "チナ"
# （仲良しこよしの学園生活なんてしてたら……父さんと母さんがいるかもしれない世界を滅ぼすだなんて、できないだろーが……！）
line = "（仲良しこよしの学園生活なんてしてたら……父さんと母さんがいるかもしれない世界を滅ぼすだなんて、できないだろーが……！）"

[[dialogue]]
speaker = "チナ"
# （やるぞ香堂チナ──お前は、デネブの星騎士だ！！）
line = "（やるぞ香堂チナ──お前は、デネブの星騎士だ！！）"

[[dialogue]]
speaker = "unk"
# 幼なじみと距離を取るような口調に胸がちくりと痛みはしたが、それでもチナはアルタイルを滅ぼす覚悟を示すために、己を矯正し続けた。
line = "幼なじみと距離を取るような口調に胸がちくりと痛みはしたが、それでもチナはアルタイルを滅ぼす覚悟を示すために、己を矯正し続けた。"

[[dialogue]]
speaker = "unk"
# 星徒会役員としてふさわしい態度。目上の者に敬語を使い、折り目正しく、勤勉に過ごす──それはまるで仮面を被るかのよう。
line = "星徒会役員としてふさわしい態度。目上の者に敬語を使い、折り目正しく、勤勉に過ごす──それはまるで仮面を被るかのよう。"

[[dialogue]]
speaker = "unk"
# その態度はチナに、デネブの救世主の部下として戦う覚悟をより強く実感させてくれた。
line = "その態度はチナに、デネブの救世主の部下として戦う覚悟をより強く実感させてくれた。"

[[dialogue]]
speaker = "unk"
# そして同時に──アルタイルを滅ぼす罪悪感を、ほんの少しだけ薄めてもくれたのだった。
line = "そして同時に──アルタイルを滅ぼす罪悪感を、ほんの少しだけ薄めてもくれたのだった。"

[[dialogue]]
speaker = "unk"
# ──それから１年と数ヵ月後。
line = "──それから１年と数ヵ月後。"

[[dialogue]]
speaker = "unk"
# ルヴィネが『女神』から賜ったという、平行世界間を移動する転送装置を手に、チナはアルタイルへの襲撃を開始することになる──
line = "ルヴィネが『女神』から賜ったという、平行世界間を移動する転送装置を手に、チナはアルタイルへの襲撃を開始することになる──"
