[[dialogue]]
speaker = "フラン"
# 「はぁ、はぁ……オレのいないところで余計なこと言うなチビ」
line = "「はぁ、はぁ……オレのいないところで余計なこと言うなチビ」"

[[dialogue]]
speaker = "パテル"
# 「チビチビって言ってくれてるけど、あたしはえら～い守護天使様なんだよ？　そんな口きいちゃっていいのかな～？」
line = "「チビチビって言ってくれてるけど、あたしはえら～い守護天使様なんだよ？　そんな口きいちゃっていいのかな～？」"

[[dialogue]]
speaker = "フラン"
# 「知るか、チビには違いねえだろ。堕天しといて偉そうなこと言ってんじゃねえ」
line = "「知るか、チビには違いねえだろ。堕天しといて偉そうなこと言ってんじゃねえ」"

[[dialogue]]
speaker = "パテル"
# 「アハ、イタイところを突かれちゃったな～」
line = "「アハ、イタイところを突かれちゃったな～」"

[[dialogue]]
speaker = "パテル"
# 「でも堕天使はどうしたの？　そっちにもそれなりの数が行ったはずだけど」
line = "「でも堕天使はどうしたの？　そっちにもそれなりの数が行ったはずだけど」"

[[dialogue]]
speaker = "フラン"
# 「会長に全部押しつけてきた。今頃お前の分身をサンドバッグにしてるぜ」
line = "「会長に全部押しつけてきた。今頃お前の分身をサンドバッグにしてるぜ」"

[[dialogue]]
speaker = "unk"
# グロリアさんのところにはいかせない！
line = "グロリアさんのところにはいかせない！"

[[dialogue]]
speaker = "パテル"
# 「お～、なるほど。ライフハックってやつだね！」
line = "「お～、なるほど。ライフハックってやつだね！」"

[[dialogue]]
speaker = "パテル"
# 「でもさー、あたしの言ってること間違ってる？　間違ってないよね？　フランだって、グロリアの言ってることが欺瞞だってわかってるよね？」
line = "「でもさー、あたしの言ってること間違ってる？　間違ってないよね？　フランだって、グロリアの言ってることが欺瞞だってわかってるよね？」"

[[dialogue]]
speaker = "フラン"
# 「わかってる。グロリアの言ってることが気休めだって」
line = "「わかってる。グロリアの言ってることが気休めだって」"

[[dialogue]]
speaker = "フラン"
# 「でもな、グロリアが自分で理解してるってことも、お前に言われなくてもわかってんだよ」
line = "「でもな、グロリアが自分で理解してるってことも、お前に言われなくてもわかってんだよ」"

[[dialogue]]
speaker = "グロリア"
# 「──！」
line = "「──！」"

[[dialogue]]
speaker = "フラン"
# 「グロリアの言ってることは確かに欺瞞だ。自分で自分にウソついてんだ」
line = "「グロリアの言ってることは確かに欺瞞だ。自分で自分にウソついてんだ」"

[[dialogue]]
speaker = "フラン"
# 「でもグロリアは戦ってんだよ！」
line = "「でもグロリアは戦ってんだよ！」"

[[dialogue]]
speaker = "フラン"
# 「シッシッ。ナンパならよそに行きな。もう顔見せんな！」
line = "「シッシッ。ナンパならよそに行きな。もう顔見せんな！」"

[[dialogue]]
speaker = "グロリア"
# 「ありがとうございます、フランさん。男の方から『一緒に遊ぼう』と何度も声をかけられて、どうしていいかわからなくて……」
line = "「ありがとうございます、フランさん。男の方から『一緒に遊ぼう』と何度も声をかけられて、どうしていいかわからなくて……」"

[[dialogue]]
speaker = "フラン"
# 「グロリアはいつもボーッとしてるからカモだと思われたんだろ。気を付けろよな」
line = "「グロリアはいつもボーッとしてるからカモだと思われたんだろ。気を付けろよな」"

[[dialogue]]
speaker = "グロリア"
# 「フランさんにはお世話になってばかり……感謝してもしきれません」
line = "「フランさんにはお世話になってばかり……感謝してもしきれません」"

[[dialogue]]
speaker = "グロリア"
# 「ところで一緒に死んでいただけませんか？」
line = "「ところで一緒に死んでいただけませんか？」"

[[dialogue]]
speaker = "フラン"
# 「誰が死ぬかァ！」
line = "「誰が死ぬかァ！」"

[[dialogue]]
speaker = "フラン"
# 「ったく、このやりとり何回目だよ。飽きねえなぁ」
line = "「ったく、このやりとり何回目だよ。飽きねえなぁ」"

[[dialogue]]
speaker = "グロリア"
# 「だって私は本当に、フランさんと死にたいんですもの……」
line = "「だって私は本当に、フランさんと死にたいんですもの……」"

[[dialogue]]
speaker = "グロリア"
# 「でもどうしてフランさんは私を助けてくれるのですか？　さっきも守っていただいて……」
line = "「でもどうしてフランさんは私を助けてくれるのですか？　さっきも守っていただいて……」"

[[dialogue]]
speaker = "フラン"
# 「そりゃオレは戦士だからな。困っているやつがいたら守ってやるさ」
line = "「そりゃオレは戦士だからな。困っているやつがいたら守ってやるさ」"

[[dialogue]]
speaker = "フラン"
# 「親父も兄貴も戦士でな、剣も槍も弓も、なんなら拳闘も叩き込まれてるんだ。何が来ても守ってやるぜ」
line = "「親父も兄貴も戦士でな、剣も槍も弓も、なんなら拳闘も叩き込まれてるんだ。何が来ても守ってやるぜ」"

[[dialogue]]
speaker = "グロリア"
# 「守る……」
line = "「守る……」"

[[dialogue]]
speaker = "フラン"
# 「ん？　どうした？」
line = "「ん？　どうした？」"

[[dialogue]]
speaker = "グロリア"
# 「いえ……フランさんのお話で思い出していました」
line = "「いえ……フランさんのお話で思い出していました」"

[[dialogue]]
speaker = "グロリア"
# 「モンスターに襲われた時……父と母は必死に私を守ってくれました」
line = "「モンスターに襲われた時……父と母は必死に私を守ってくれました」"

[[dialogue]]
speaker = "グロリア"
# 「逃げろと何度も叫んで、私に覆いかぶさって、モンスターに爪を突き立てられても私を離すことなく、最期まで……」
line = "「逃げろと何度も叫んで、私に覆いかぶさって、モンスターに爪を突き立てられても私を離すことなく、最期まで……」"

[[dialogue]]
speaker = "フラン"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "フラン"
# 「お前に言われなくたって、グロリアもわかってんだよ」
line = "「お前に言われなくたって、グロリアもわかってんだよ」"

[[dialogue]]
speaker = "フラン"
# 「グロリアは死にたい。でも死んじゃいけない。両親の死を無駄にすることになるからな」
line = "「グロリアは死にたい。でも死んじゃいけない。両親の死を無駄にすることになるからな」"

[[dialogue]]
speaker = "フラン"
# 「だから『いい人は早く死ぬ』なんて言葉を建前に使ってる。死んでも『女神様のお迎え』ってことにできるからな」
line = "「だから『いい人は早く死ぬ』なんて言葉を建前に使ってる。死んでも『女神様のお迎え』ってことにできるからな」"

[[dialogue]]
speaker = "パテル"
# 「それは目を背けてるとは言わないの？」
line = "「それは目を背けてるとは言わないの？」"

[[dialogue]]
speaker = "フラン"
# 「そうかもな。だけどいつか、親の死を直視できるようになる時が来る」
line = "「そうかもな。だけどいつか、親の死を直視できるようになる時が来る」"

[[dialogue]]
speaker = "フラン"
# 「それまで目を背けりゃいい。死にたいって言えばいい。それがグロリアの戦い方だ」
line = "「それまで目を背けりゃいい。死にたいって言えばいい。それがグロリアの戦い方だ」"

[[dialogue]]
speaker = "フラン"
# 「守護天使にも、死神にも邪魔はさせねえ！」
line = "「守護天使にも、死神にも邪魔はさせねえ！」"

[[dialogue]]
speaker = "フラン"
# 「──って全部<ruby=おまえ>パテル</ruby>じゃねえかっ！！」
line = "「──って全部<ruby>パテル<rt>おまえ</rt></ruby>じゃねえかっ！！」"

[[dialogue]]
speaker = "パテル"
# 「てへぺろっ♪」
line = "「てへぺろっ♪」"

[[dialogue]]
speaker = "グロリア"
# 「ぷっ」
line = "「ぷっ」"

[[dialogue]]
speaker = "フラン"
# 「邪魔だ！」
line = "「邪魔だ！」"

[[dialogue]]
speaker = "フラン"
# 「親父からの受け売りだが……生きることは戦いだ」
line = "「親父からの受け売りだが……生きることは戦いだ」"

[[dialogue]]
speaker = "フラン"
# 「生きるのは苦しくて、つらくて、何度もくじけそうになって、泣きそうになって……一番厳しくて、過酷な戦いなんだ」
line = "「生きるのは苦しくて、つらくて、何度もくじけそうになって、泣きそうになって……一番厳しくて、過酷な戦いなんだ」"

[[dialogue]]
speaker = "フラン"
# 「グロリアはな。両親を亡くして、悲しくて、寂しくて、死にたいって想いと、生きなきゃいけないって想いと、その間でずっと戦ってんだよ」
line = "「グロリアはな。両親を亡くして、悲しくて、寂しくて、死にたいって想いと、生きなきゃいけないって想いと、その間でずっと戦ってんだよ」"

[[dialogue]]
speaker = "パテル"
# 「それでいいの？　直視できるようになる前に、ホントに死んじゃうかもしれないよ？」
line = "「それでいいの？　直視できるようになる前に、ホントに死んじゃうかもしれないよ？」"

[[dialogue]]
speaker = "フラン"
# 「それまでオレが守る」
line = "「それまでオレが守る」"

[[dialogue]]
speaker = "フラン"
# 「悩んで、迷って、苦しんで……そんなやつがいたら守ってやる。それが戦士だ！」
line = "「悩んで、迷って、苦しんで……そんなやつがいたら守ってやる。それが戦士だ！」"

[[dialogue]]
speaker = "パテル"
# 「ハハ、かっこいいね。でもそんな話してる間に押し切られそうになってるんだけど！」
line = "「ハハ、かっこいいね。でもそんな話してる間に押し切られそうになってるんだけど！」"

[[dialogue]]
speaker = "フラン"
# 「わかってるよ！　こいつらいい加減うっとうしいな！」
line = "「わかってるよ！　こいつらいい加減うっとうしいな！」"

[[dialogue]]
speaker = "フラン"
# 「グロリアが手伝ってくれりゃあ一気に蹴散らせるんだが……どうする？」
line = "「グロリアが手伝ってくれりゃあ一気に蹴散らせるんだが……どうする？」"

[[dialogue]]
speaker = "グロリア"
# 「──はい。フランさん、私の剣を！」
line = "「──はい。フランさん、私の剣を！」"

[[dialogue]]
speaker = "フラン"
# 「おお！！」
line = "「おお！！」"

[[dialogue]]
speaker = "フラン"
# 「こいつでまとめて──終わりだああぁあっ！！」
line = "「こいつでまとめて──終わりだああぁあっ！！」"
