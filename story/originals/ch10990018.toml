# 「……あ、会長さん、もしかして、私が言ったこと気にしてます？　『実は大丈夫な日じゃないかも』って。ちゃんと大丈夫な日だから、安心してくださいね」
line = "「……あ、会長さん、もしかして、私が言ったこと気にしてます？　『実は大丈夫な日じゃないかも』って。ちゃんと大丈夫な日だから、安心してくださいね」"

[[dialogue]]
