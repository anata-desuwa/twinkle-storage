line = "「うん……」"

[[dialogue]]
speaker = "パルミエ"
# 「こらこら、あんまり落ち込まないの。私たちは今まで通り、私たちにできることをコツコツすればいいだけよ」
line = "「こらこら、あんまり落ち込まないの。私たちは今まで通り、私たちにできることをコツコツすればいいだけよ」"

[[dialogue]]
speaker = "パルミエ"
# 「ほらポストでも見てきたら？　何かお悩み相談が来てるかもしれないわよ？」
line = "「ほらポストでも見てきたら？　何かお悩み相談が来てるかもしれないわよ？」"

[[dialogue]]
speaker = "モナカ"
# 「そう、だね。クヨクヨしてる場合じゃないよね……」
line = "「そう、だね。クヨクヨしてる場合じゃないよね……」"

[[dialogue]]
speaker = "シフォン"
# 「よしっ、やりましょう……！　どんな依頼でもじゃんじゃん解決してみせますよ……！」
line = "「よしっ、やりましょう……！　どんな依頼でもじゃんじゃん解決してみせますよ……！」"

[[dialogue]]
speaker = "パルミエ"
# 「その意気よ。まぁ依頼なんて一件も来てないだろうけど♪」
line = "「その意気よ。まぁ依頼なんて一件も来てないだろうけど♪」"

[[dialogue]]
speaker = "シフォン"
# 「立ち直ろうとしたのに出鼻をくじかないでください！」
line = "「立ち直ろうとしたのに出鼻をくじかないでください！」"

[[dialogue]]
speaker = "モナカ"
# 「あれ……？　でも一通届いてるよ……？」
line = "「あれ……？　でも一通届いてるよ……？」"

[[dialogue]]
speaker = "パルミエ"
# 「え゛っ！？　ホントに来てたの！？　今日はもう働きたくないのに～！」
line = "「え゛っ！？　ホントに来てたの！？　今日はもう働きたくないのに～！」"

[[dialogue]]
speaker = "シフォン"
# 「どんな相談なんですか？　この際宿題の代筆でもやってやりますよ！」
line = "「どんな相談なんですか？　この際宿題の代筆でもやってやりますよ！」"

[[dialogue]]
speaker = "モナカ"
# 「ええと……」
line = "「ええと……」"

[[dialogue]]
speaker = "unk"
# 『指輪を探してもらえないでしょうか。どれだけ探しても見つからないんです』
line = "『指輪を探してもらえないでしょうか。どれだけ探しても見つからないんです』"

[[dialogue]]
speaker = "unk"
# 『母からの大切な形見で。だからどうしても見つけたくて……。手伝っていただけますか？』
line = "『母からの大切な形見で。だからどうしても見つけたくて……。手伝っていただけますか？』"

[[dialogue]]
speaker = "モナカ"
# 「このタイミングで見つからないって、まさか……」
line = "「このタイミングで見つからないって、まさか……」"

[[dialogue]]
speaker = "シフォン"
# 「もしかしてあのモンスターが……？」
line = "「もしかしてあのモンスターが……？」"

[[dialogue]]
speaker = "パルミエ"
# 「あら……？　変ね、そんなわけは……」
line = "「あら……？　変ね、そんなわけは……」"

[[dialogue]]
speaker = "シフォン"
# 「え？　どういうことですか？」
line = "「え？　どういうことですか？」"

[[dialogue]]
speaker = "パルミエ"
# 「あ、ううん。こっちの話よ、こっちの話。それよりどうするの？　これが例のモンスターの仕業だったとしたら」
line = "「あ、ううん。こっちの話よ、こっちの話。それよりどうするの？　これが例のモンスターの仕業だったとしたら」"

[[dialogue]]
speaker = "モナカ"
# 「プリマステラさんたちに任せるしかない、よね……。モナカたちじゃ、この人の力には──」
line = "「プリマステラさんたちに任せるしかない、よね……。モナカたちじゃ、この人の力には──」"

[[dialogue]]
speaker = "シフォン"
# 「窓の外を見て下さい！　さっきのモンスターがいます……！」
line = "「窓の外を見て下さい！　さっきのモンスターがいます……！」"

[[dialogue]]
speaker = "パルミエ"
# 「本当にお菓子の箱を抱えてるわね……。また誰かのお菓子を盗んできたのかしら？」
line = "「本当にお菓子の箱を抱えてるわね……。また誰かのお菓子を盗んできたのかしら？」"

[[dialogue]]
speaker = "シフォン"
# 「とにかくプリマステラの皆さんに……会長さん、ヴィーナスさんに連絡を……！」
line = "「とにかくプリマステラの皆さんに……会長さん、ヴィーナスさんに連絡を……！」"

[[dialogue]]
speaker = "unk"
# 何度もかけてるんだけど……！
line = "何度もかけてるんだけど……！"

[[dialogue]]
speaker = "シフォン"
# 「うっ、そういえばさっき分析班に連絡を取るとか言ってましたっけ……！　どうしましょう、このままだとまた逃げられてしまいます……！」
line = "「うっ、そういえばさっき分析班に連絡を取るとか言ってましたっけ……！　どうしましょう、このままだとまた逃げられてしまいます……！」"

[[dialogue]]
speaker = "パルミエ"
# 「まぁいいじゃない。モンスターには手を出すなって言われてるんでしょ？」
line = "「まぁいいじゃない。モンスターには手を出すなって言われてるんでしょ？」"

[[dialogue]]
speaker = "シフォン"
# 「で、ですが……！」
line = "「で、ですが……！」"

[[dialogue]]
speaker = "モナカ"
# 「ううん……。やっぱり放っておけない。放っておけないよ」
line = "「ううん……。やっぱり放っておけない。放っておけないよ」"

[[dialogue]]
speaker = "シフォン"
# 「モナカ……？」
line = "「モナカ……？」"

[[dialogue]]
speaker = "モナカ"
# 「だって、ここであのモンスターを放っておいたら、誰かがまた悲しい想いをしちゃうかもしれない」
line = "「だって、ここであのモンスターを放っておいたら、誰かがまた悲しい想いをしちゃうかもしれない」"

[[dialogue]]
speaker = "モナカ"
# 「お菓子だけじゃなくて、このお手紙を届けてくれた人みたいに、大切なものをあのモンスターに盗られちゃうかもしれない」
line = "「お菓子だけじゃなくて、このお手紙を届けてくれた人みたいに、大切なものをあのモンスターに盗られちゃうかもしれない」"

[[dialogue]]
speaker = "パルミエ"
# 「けど、また星力の制御に失敗して逃げられちゃうかもしれないわよ？」
line = "「けど、また星力の制御に失敗して逃げられちゃうかもしれないわよ？」"

[[dialogue]]
speaker = "モナカ"
# 「それでもっ……！　見て見ぬ振りなんてできないよっ！」
line = "「それでもっ……！　見て見ぬ振りなんてできないよっ！」"

[[dialogue]]
speaker = "モナカ"
# 「無茶はしないからっ、プリマステラさんたちが駆けつけてくるまで時間を稼ぐだけでいいから……！」
line = "「無茶はしないからっ、プリマステラさんたちが駆けつけてくるまで時間を稼ぐだけでいいから……！」"

[[dialogue]]
speaker = "モナカ"
# 「このままだと悲しむ人が増えるってわかってるのに放っておいてなんかいられない……！　モナカはそんな人を助けたくて、星騎士を目指してきたんだもん……！」
line = "「このままだと悲しむ人が増えるってわかってるのに放っておいてなんかいられない……！　モナカはそんな人を助けたくて、星騎士を目指してきたんだもん……！」"

[[dialogue]]
speaker = "モナカ"
# 「ここで見て見ぬ振りをしたら、モナカは本当の落ちこぼれになっちゃうっ……。そんなの嫌だからっ……」
line = "「ここで見て見ぬ振りをしたら、モナカは本当の落ちこぼれになっちゃうっ……。そんなの嫌だからっ……」"

[[dialogue]]
speaker = "シフォン"
# 「行きましょう、パルミエ。私もモナカと同じ気持ちです」
line = "「行きましょう、パルミエ。私もモナカと同じ気持ちです」"

[[dialogue]]
speaker = "シフォン"
# 「もう考え無しに行動したりしませんから。誰かの大切な物を取り戻してあげたいんです……！」
line = "「もう考え無しに行動したりしませんから。誰かの大切な物を取り戻してあげたいんです……！」"

[[dialogue]]
speaker = "パルミエ"
# 「……ふふ。２人とも相談する相手が違うわよ。部長と副部長がそう言うなら平部員の私は従うだけなんだから」
line = "「……ふふ。２人とも相談する相手が違うわよ。部長と副部長がそう言うなら平部員の私は従うだけなんだから」"

[[dialogue]]
speaker = "パルミエ"
# 「どうかしら、ダーリン？　会長権限で私たちを出動させてくれないかしら？　もしも２人がヘマしそうになったら私がフォローするから」
line = "「どうかしら、ダーリン？　会長権限で私たちを出動させてくれないかしら？　もしも２人がヘマしそうになったら私がフォローするから」"

[[dialogue]]
speaker = "シフォン"
# 「会長さん、どうかお願いします……！」
line = "「会長さん、どうかお願いします……！」"

[[dialogue]]
speaker = "モナカ"
# 「お願い、にぃ様……！」
line = "「お願い、にぃ様……！」"

[[dialogue]]
speaker = "unk"
# ああ、行こう！
line = "ああ、行こう！"
