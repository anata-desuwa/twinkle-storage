speaker = "モナカ"
# 「あ、えと……。実は──……」
line = "「あ、えと……。実は──……」"

[[dialogue]]
speaker = "パルミエ"
# 「ふ～ん。私がサボってる間にそんなことがあったのね」
line = "「ふ～ん。私がサボってる間にそんなことがあったのね」"

[[dialogue]]
speaker = "パルミエ"
# 「まぁでもいいじゃない。モンスターのことはプリマステラに任せたら。私たちの出る幕じゃないのは事実だし」
line = "「まぁでもいいじゃない。モンスターのことはプリマステラに任せたら。私たちの出る幕じゃないのは事実だし」"

