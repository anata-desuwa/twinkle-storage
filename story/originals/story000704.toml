[[dialogue]]
speaker = "unk"
# ソフィアとヴィーナスはカフェテリアに移動し、温かい飲み物を手にしながら向かい合っていた――
line = "ソフィアとヴィーナスはカフェテリアに移動し、温かい飲み物を手にしながら向かい合っていた――"

[[dialogue]]
speaker = "ヴィーナス"
# 「はい、ホットココア。せっかくだし、私も同じものにしちゃった♪」
line = "「はい、ホットココア。せっかくだし、私も同じものにしちゃった♪」"

[[dialogue]]
speaker = "ソフィア"
# 「あ、ありがとうございます……」
line = "「あ、ありがとうございます……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「冷めないうちに飲みましょう。――うん、美味しい♪　温まるわね」
line = "「冷めないうちに飲みましょう。――うん、美味しい♪　温まるわね」"

[[dialogue]]
speaker = "ソフィア"
# 「はい。ホットです……」
line = "「はい。ホットです……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「――ねぇ、ソフィア」
line = "「――ねぇ、ソフィア」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私は学園も違うし、正直、あなたのことをよく知っているわけじゃないわ！」
line = "「私は学園も違うし、正直、あなたのことをよく知っているわけじゃないわ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「だから、見たままを言うだけになっちゃうんだけど……」
line = "「だから、見たままを言うだけになっちゃうんだけど……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ソフィアは、サーシャさんのことが好きよね？　なのに、何故か近づくのを意識して避けている感じがするわ……！」
line = "「ソフィアは、サーシャさんのことが好きよね？　なのに、何故か近づくのを意識して避けている感じがするわ……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「サーシャさんは、ソフィアが反抗期だからって言ってて、妹がいない私は、そういうものなのね～って思っていたけれど……」
line = "「サーシャさんは、ソフィアが反抗期だからって言ってて、妹がいない私は、そういうものなのね～って思っていたけれど……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「実際にサーシャさんの話題を出した時のソフィアを見て、ちょっと違うって思ったの！」
line = "「実際にサーシャさんの話題を出した時のソフィアを見て、ちょっと違うって思ったの！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それで思い出したんだけど……サーシャさんが前に、学園に入学する時、ソフィアとは上手くお別れできないまま人間界にきた、って言っていたのよね」
line = "「それで思い出したんだけど……サーシャさんが前に、学園に入学する時、ソフィアとは上手くお別れできないまま人間界にきた、って言っていたのよね」"

[[dialogue]]
speaker = "ソフィア"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それって、ソフィアがサーシャさんと距離を置いていることに、関係があったりするのかしら？」
line = "「それって、ソフィアがサーシャさんと距離を置いていることに、関係があったりするのかしら？」"

[[dialogue]]
speaker = "ソフィア"
# 「…………姉さんが」
line = "「…………姉さんが」"

[[dialogue]]
speaker = "ソフィア"
# 「３年前、姉さんが新星学園に入学すると言い出した時……」
line = "「３年前、姉さんが新星学園に入学すると言い出した時……」"

[[dialogue]]
speaker = "ソフィア"
# 「私はその瞬間まで、姉さんがそんなことを考えていただなんて、全く知らなかったんです……」
line = "「私はその瞬間まで、姉さんがそんなことを考えていただなんて、全く知らなかったんです……」"

[[dialogue]]
speaker = "ソフィア"
# 「なんの相談もなくて……私はすごいショックで、人生であれほど怒ったことがないってくらいに、喧嘩したんです……」
line = "「なんの相談もなくて……私はすごいショックで、人生であれほど怒ったことがないってくらいに、喧嘩したんです……」"

[[dialogue]]
speaker = "ソフィア"
# 「姉妹なんだから、相談の１つくらいしてくれても、よかったじゃないですか」
line = "「姉妹なんだから、相談の１つくらいしてくれても、よかったじゃないですか」"

[[dialogue]]
speaker = "ソフィア"
# 「それまでずっと、一緒に過ごしてきたんですよ？」
line = "「それまでずっと、一緒に過ごしてきたんですよ？」"

[[dialogue]]
speaker = "ソフィア"
# 「なのに姉さんは、全部自分１人で進めて。私に言う頃には、周りがどう言おうと関係なく、心に決めていたんです」
line = "「なのに姉さんは、全部自分１人で進めて。私に言う頃には、周りがどう言おうと関係なく、心に決めていたんです」"

[[dialogue]]
speaker = "ソフィア"
# 「私が何を言っても、姉さんは困った顔でごめんと謝るだけでした」
line = "「私が何を言っても、姉さんは困った顔でごめんと謝るだけでした」"

[[dialogue]]
speaker = "ソフィア"
# 「人間界に行くその日になっても、涙１つ見せることなく」
line = "「人間界に行くその日になっても、涙１つ見せることなく」"

[[dialogue]]
speaker = "ソフィア"
# 「結局、姉さんにとって妹なんて、その程度の存在だってことです」
line = "「結局、姉さんにとって妹なんて、その程度の存在だってことです」"

[[dialogue]]
speaker = "ソフィア"
# 「会えば嬉しいとか言いますけど、離れたって別に、泣くほど感情が動いたりとかしないんです。姉さんは」
line = "「会えば嬉しいとか言いますけど、離れたって別に、泣くほど感情が動いたりとかしないんです。姉さんは」"

[[dialogue]]
speaker = "ソフィア"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ソフィア"
# 「……だから、私はいつまでも子供みたいにベタベタしてないで、姉さんとは大人の距離で付き合うようにしよう、と思ったまでです」
line = "「……だから、私はいつまでも子供みたいにベタベタしてないで、姉さんとは大人の距離で付き合うようにしよう、と思ったまでです」"

[[dialogue]]
speaker = "ソフィア"
# 「あと、薄情な姉さんには、ちょっと怒っています。自覚もないみたいなので、私からわざわざ指摘するつもりもありませんが」
line = "「あと、薄情な姉さんには、ちょっと怒っています。自覚もないみたいなので、私からわざわざ指摘するつもりもありませんが」"

[[dialogue]]
speaker = "ヴィーナス"
# 「う～～ん……」
line = "「う～～ん……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ソフィアは怒っているというよりも、悲しんでいるみたいね」
line = "「ソフィアは怒っているというよりも、悲しんでいるみたいね」"

[[dialogue]]
speaker = "ソフィア"
# 「え……？」
line = "「え……？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「だって、怒っているだけなら、すぐにでも文句を言いに行けたはずだもの。それができなかったってことは、<b>それだけじゃない</b>感情があったんじゃないかしら？」
line = "「だって、怒っているだけなら、すぐにでも文句を言いに行けたはずだもの。それができなかったってことは、<b>それだけじゃない</b>感情があったんじゃないかしら？」"

[[dialogue]]
speaker = "ソフィア"
# 「そ、それは……っ」
line = "「そ、それは……っ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「もちろん、腹を立てているのだって嘘ではないと思うわ！　だけど……ほら、『怒る』のと『悲しむ』のって、ちょっと似てるじゃない？」
line = "「もちろん、腹を立てているのだって嘘ではないと思うわ！　だけど……ほら、『怒る』のと『悲しむ』のって、ちょっと似てるじゃない？」"

[[dialogue]]
speaker = "ソフィア"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ヴィーナス"
# 「今ここにサーシャさんはいないんだから。思っていたこと、不満だったことを全部、まずは吐き出しちゃいなさい」
line = "「今ここにサーシャさんはいないんだから。思っていたこと、不満だったことを全部、まずは吐き出しちゃいなさい」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それを１つ１つ確認していけば、サーシャさんになんて言ったらいいのか、きっと見つかるんじゃないかしら！」
line = "「それを１つ１つ確認していけば、サーシャさんになんて言ったらいいのか、きっと見つかるんじゃないかしら！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「大丈夫！　あなたなら絶対に、自分の答えを見つけ出せるわ、ソフィア！」
line = "「大丈夫！　あなたなら絶対に、自分の答えを見つけ出せるわ、ソフィア！」"

[[dialogue]]
speaker = "ソフィア"
# 「ヴィーナスさん……」
line = "「ヴィーナスさん……」"

[[dialogue]]
speaker = "ソフィア"
# （ああ、どうしてだろう。今まで姉さんには、何を言っても変わらないって諦めていたのに……）
line = "（ああ、どうしてだろう。今まで姉さんには、何を言っても変わらないって諦めていたのに……）"

[[dialogue]]
speaker = "ソフィア"
# （この人に大丈夫だって言われると、なんだか、本当に変えられそうな気がしてくる）
line = "（この人に大丈夫だって言われると、なんだか、本当に変えられそうな気がしてくる）"

[[dialogue]]
speaker = "ソフィア"
# （正直、星騎士としての強さだけで星徒会長になった人だって、ずっと思っていたけれど……）
line = "（正直、星騎士としての強さだけで星徒会長になった人だって、ずっと思っていたけれど……）"

[[dialogue]]
speaker = "ヴィーナス"
# 「？　ソフィア、私の顔をじっと見て、どうかした？　なにか顔に付いているかしら？」
line = "「？　ソフィア、私の顔をじっと見て、どうかした？　なにか顔に付いているかしら？」"

[[dialogue]]
speaker = "unk"
# むにむにと自分の顔を触るヴィーナスに、ソフィアは首を横に振る。
line = "むにむにと自分の顔を触るヴィーナスに、ソフィアは首を横に振る。"

[[dialogue]]
speaker = "ソフィア"
# 「いいえ。ただ――」
line = "「いいえ。ただ――」"

[[dialogue]]
speaker = "ソフィア"
# 「ヴィーナスさんは、本当に前星徒会長を務めていたんだなって、改めて思っただけです」
line = "「ヴィーナスさんは、本当に前星徒会長を務めていたんだなって、改めて思っただけです」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふっふ～ん♪　なんで褒められたのかはわからないけど、褒められるのは気分がいいわ♪」
line = "「ふっふ～ん♪　なんで褒められたのかはわからないけど、褒められるのは気分がいいわ♪」"

[[dialogue]]
speaker = "unk"
# そう言って笑顔を見せるヴィーナスに。
line = "そう言って笑顔を見せるヴィーナスに。"

[[dialogue]]
speaker = "unk"
# ソフィアのマフラーで隠れた口元もまた、柔らかく微笑むのだった――
line = "ソフィアのマフラーで隠れた口元もまた、柔らかく微笑むのだった――"
