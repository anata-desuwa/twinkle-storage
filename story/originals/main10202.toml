[[dialogue]]
speaker = "unk"
# 第２話,メイド長とガールズトーク☆,B
line = "第２話,メイド長とガールズトーク☆,B"

[[dialogue]]
speaker = "蘭美"
# 「こっちよ。ご当主様は大聖堂にいらっしゃるわ」
line = "「こっちよ。ご当主様は大聖堂にいらっしゃるわ」"

[[dialogue]]
speaker = "美鶴"
# 「メイド長、足早いですね」
line = "「メイド長、足早いですね」"

[[dialogue]]
speaker = "蘭美"
# 「ちっちゃいクセに、ってこと！？」
line = "「ちっちゃいクセに、ってこと！？」"

[[dialogue]]
speaker = "美鶴"
# 「そうは言ってないです」
line = "「そうは言ってないです」"

[[dialogue]]
speaker = "蘭美"
# 「普通に歩いてるだけよ。あなたが遅いの。私より体が大きいんだから、もっとシャキシャキ歩きなさい」
line = "「普通に歩いてるだけよ。あなたが遅いの。私より体が大きいんだから、もっとシャキシャキ歩きなさい」"

[[dialogue]]
speaker = "蘭美"
# 「ちなみに、あなたが大きいのであって、私が小さいわけではないのよ！？」
line = "「ちなみに、あなたが大きいのであって、私が小さいわけではないのよ！？」"

[[dialogue]]
speaker = "美鶴"
# （言ってないのに……自分で言っちゃうんよな、この人……）
line = "（言ってないのに……自分で言っちゃうんよな、この人……）"

[[dialogue]]
speaker = "美鶴"
# （でもさ、こう見えて前代未聞にスゴい人なんだよね。九浄家メイド隊の隊長にして、『歴代最年少のメイド長』だもん）
line = "（でもさ、こう見えて前代未聞にスゴい人なんだよね。九浄家メイド隊の隊長にして、『歴代最年少のメイド長』だもん）"

[[dialogue]]
speaker = "美鶴"
# 「えーと……それで、当主様がうちなんかに何の用なんですかね。お小言じゃないですよね」
line = "「えーと……それで、当主様がうちなんかに何の用なんですかね。お小言じゃないですよね」"

[[dialogue]]
speaker = "蘭美"
# 「お小言を言われる覚えでもあるの？」
line = "「お小言を言われる覚えでもあるの？」"

[[dialogue]]
speaker = "美鶴"
# 「悪いことはしてないすけど……うち、いつもこんな調子じゃないすか」
line = "「悪いことはしてないすけど……うち、いつもこんな調子じゃないすか」"

[[dialogue]]
speaker = "美鶴"
# 「どーもサボってるように思われがちなんですよ。与えられたノルマは、ちゃんとこなしてるんすけど」
line = "「どーもサボってるように思われがちなんですよ。与えられたノルマは、ちゃんとこなしてるんすけど」"

[[dialogue]]
speaker = "蘭美"
# 「ええ、わかってるわ。あなたは自分に与えられた仕事を、しっかりとやっている」
line = "「ええ、わかってるわ。あなたは自分に与えられた仕事を、しっかりとやっている」"

[[dialogue]]
speaker = "蘭美"
# 「ただし、それ以上のことは決してやらない。それがあなたのポリシーよね？」
line = "「ただし、それ以上のことは決してやらない。それがあなたのポリシーよね？」"

[[dialogue]]
speaker = "美鶴"
# 「ご理解いただけてるみたいで、助かります」
line = "「ご理解いただけてるみたいで、助かります」"

[[dialogue]]
speaker = "蘭美"
# 「メイドたちの仕事ぶりを把握するのは、メイド長として当然のことよ」
line = "「メイドたちの仕事ぶりを把握するのは、メイド長として当然のことよ」"

[[dialogue]]
speaker = "蘭美"
# 「あなたは必要最低限のことを過不足なく成し遂げている。そういう意味ではあなたの仕事ぶりを高く評価してるわ」
line = "「あなたは必要最低限のことを過不足なく成し遂げている。そういう意味ではあなたの仕事ぶりを高く評価してるわ」"

[[dialogue]]
speaker = "美鶴"
# 「や、当たり前のことをやってるだけなんすけど」
line = "「や、当たり前のことをやってるだけなんすけど」"

[[dialogue]]
speaker = "蘭美"
# 「でも私はね……あなたが本気を出しさえすれば、いずれ九浄家メイド隊の柱になれる人材だと思っているの」
line = "「でも私はね……あなたが本気を出しさえすれば、いずれ九浄家メイド隊の柱になれる人材だと思っているの」"

[[dialogue]]
speaker = "美鶴"
# 「ハシラ？　うちもメイド長になるってことすか？」
line = "「ハシラ？　うちもメイド長になるってことすか？」"

[[dialogue]]
speaker = "蘭美"
# 「そうね。うかうかしていたら、私の地位はあなたに持っていかれてしまうかもしれないわ」
line = "「そうね。うかうかしていたら、私の地位はあなたに持っていかれてしまうかもしれないわ」"

[[dialogue]]
speaker = "美鶴"
# 「ないない。ないですよ。いくらなんでもそれは買い被りってもんですって」
line = "「ないない。ないですよ。いくらなんでもそれは買い被りってもんですって」"

[[dialogue]]
speaker = "美鶴"
# 「うちみたいな、めんどくさがりなやる気なし子さんがメイド長になったら、みんなに迷惑かけちゃいますよ」
line = "「うちみたいな、めんどくさがりなやる気なし子さんがメイド長になったら、みんなに迷惑かけちゃいますよ」"

[[dialogue]]
speaker = "蘭美"
# 「そんなことないわ！！！」
line = "「そんなことないわ！！！」"

[[dialogue]]
speaker = "美鶴"
# 「うわ。びっくりした」
line = "「うわ。びっくりした」"

[[dialogue]]
speaker = "蘭美"
# 「あなたは生まれ持った力を、最大限に活用していないだけでしょ。力を持っていると自覚していながら、意図的に」
line = "「あなたは生まれ持った力を、最大限に活用していないだけでしょ。力を持っていると自覚していながら、意図的に」"

[[dialogue]]
speaker = "美鶴"
# 「メイドのお仕事をフルパワーでやる必要はなくないすか？　雑魚モンスターを倒すのに、命がけの超必殺技を使う必要はないでしょ？」
line = "「メイドのお仕事をフルパワーでやる必要はなくないすか？　雑魚モンスターを倒すのに、命がけの超必殺技を使う必要はないでしょ？」"

[[dialogue]]
speaker = "蘭美"
# 「つまり、その気になれば、あなたも命がけの超必殺技が打てるってことね？」
line = "「つまり、その気になれば、あなたも命がけの超必殺技が打てるってことね？」"

[[dialogue]]
speaker = "美鶴"
# 「物のたとえっすよ」
line = "「物のたとえっすよ」"

[[dialogue]]
speaker = "蘭美"
# 「いつもそうね。あなたは力を抑えて、一歩引いて、メイド隊の中でも極力目立たないように行動している」
line = "「いつもそうね。あなたは力を抑えて、一歩引いて、メイド隊の中でも極力目立たないように行動している」"

[[dialogue]]
speaker = "美鶴"
# 「んなことないと思うすけど」
line = "「んなことないと思うすけど」"

[[dialogue]]
speaker = "蘭美"
# 「んなことあるわよ！　大有りよ！」
line = "「んなことあるわよ！　大有りよ！」"

[[dialogue]]
speaker = "蘭美"
# 「抑えている力を、ほんの少し表に出すだけで、あなたはもっと高みへと登れるというのに……！」
line = "「抑えている力を、ほんの少し表に出すだけで、あなたはもっと高みへと登れるというのに……！」"

[[dialogue]]
speaker = "蘭美"
# 「類稀な才能の持ち主が、正当な評価を受けていないのが歯がゆくて仕方ないの！」
line = "「類稀な才能の持ち主が、正当な評価を受けていないのが歯がゆくて仕方ないの！」"

[[dialogue]]
speaker = "美鶴"
# 「メイド長、あんましデッカい声出さない。みんな見てますよ」
line = "「メイド長、あんましデッカい声出さない。みんな見てますよ」"

[[dialogue]]
speaker = "蘭美"
# 「はっ……！」
line = "「はっ……！」"

[[dialogue]]
speaker = "蘭美"
# 「……こほん。とにかく、あなたのような有能なメイドを眠らせておくのは、九浄家にとっても大きな損失なのよ」
line = "「……こほん。とにかく、あなたのような有能なメイドを眠らせておくのは、九浄家にとっても大きな損失なのよ」"

[[dialogue]]
speaker = "美鶴"
# 「はは、うちなんかを高く買ってくれるのは嬉しいんすけど困っちゃいますね」
line = "「はは、うちなんかを高く買ってくれるのは嬉しいんすけど困っちゃいますね」"

[[dialogue]]
speaker = "蘭美"
# 「何が困るっていうのよ」
line = "「何が困るっていうのよ」"

[[dialogue]]
speaker = "美鶴"
# 「メイド長が言ってた通り『後ろの方で過不足なく、ローカロリーにこなす』ってのがうちの処世術なもんで」
line = "「メイド長が言ってた通り『後ろの方で過不足なく、ローカロリーにこなす』ってのがうちの処世術なもんで」"

[[dialogue]]
speaker = "美鶴"
# 「すっかり根付いちゃってて、表に出すやり方ってのがよくわからないんすよね」
line = "「すっかり根付いちゃってて、表に出すやり方ってのがよくわからないんすよね」"

[[dialogue]]
speaker = "蘭美"
# 「まあ、そこまで無理強いするつもりはないのだけど……他人には言えない事情だってあるでしょうしね」
line = "「まあ、そこまで無理強いするつもりはないのだけど……他人には言えない事情だってあるでしょうしね」"

[[dialogue]]
speaker = "美鶴"
# 「や、そんな大層なもんじゃないですよ。メイド長はどこまでもうちを買い被ってくれるんですね」
line = "「や、そんな大層なもんじゃないですよ。メイド長はどこまでもうちを買い被ってくれるんですね」"

[[dialogue]]
speaker = "美鶴"
# （ホントにね、ご立派な理由とかないよ）
line = "（ホントにね、ご立派な理由とかないよ）"

[[dialogue]]
speaker = "美鶴"
# （熱くなるのって、カロリー使うじゃん。目立つじゃん。恥ずいじゃん。単にそれだけ）
line = "（熱くなるのって、カロリー使うじゃん。目立つじゃん。恥ずいじゃん。単にそれだけ）"

[[dialogue]]
speaker = "美鶴"
# （面白みのない本心がバレるのも恥ずいし、あえては言わないけど）
line = "（面白みのない本心がバレるのも恥ずいし、あえては言わないけど）"

[[dialogue]]
speaker = "蘭美"
# 「まあ、いいわ。気が変わったら、いつでも相談して。優秀なメイドになるための心得を、骨の髄まで叩きこんであげるから」
line = "「まあ、いいわ。気が変わったら、いつでも相談して。優秀なメイドになるための心得を、骨の髄まで叩きこんであげるから」"

[[dialogue]]
speaker = "美鶴"
# 「そんな機会は一生ないすよ」
line = "「そんな機会は一生ないすよ」"

[[dialogue]]
speaker = "蘭美"
# 「まったく……そういえば、ご当主様があなたを呼び出した用件について、なんだけど」
line = "「まったく……そういえば、ご当主様があなたを呼び出した用件について、なんだけど」"

[[dialogue]]
speaker = "美鶴"
# 「聞いてるんですか？」
line = "「聞いてるんですか？」"

[[dialogue]]
speaker = "蘭美"
# 「お生憎様、私も詳細は聞いてないわ。『美鶴を呼んできて』と命じられただけ」
line = "「お生憎様、私も詳細は聞いてないわ。『美鶴を呼んできて』と命じられただけ」"

[[dialogue]]
speaker = "蘭美"
# 「でも、私の経験則からすると、美鶴には極秘任務が課せられるんじゃないかしら。ご当主様の期待に応えられるよう、気張ることね」
line = "「でも、私の経験則からすると、美鶴には極秘任務が課せられるんじゃないかしら。ご当主様の期待に応えられるよう、気張ることね」"

[[dialogue]]
speaker = "美鶴"
# 「うーわ。お小言の方がマシですね」
line = "「うーわ。お小言の方がマシですね」"
