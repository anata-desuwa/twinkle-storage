[[dialogue]]
speaker = "unk"
# 果たして、附属生とシャドウサチのバトルの行方は――
line = "果たして、附属生とシャドウサチのバトルの行方は――"

[[dialogue]]
speaker = "シャドウサチ"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「――よっし！　ついにやったのじゃ！　見たか！！　サチの幸運を打ち破ってやったのじゃ！！！　ふははははははっ♪」
line = "「――よっし！　ついにやったのじゃ！　見たか！！　サチの幸運を打ち破ってやったのじゃ！！！　ふははははははっ♪」"

[[dialogue]]
speaker = "トレジアンナ"
# 「おお～っ！　プリムラさん渾身のガッツポーズ！　これは記憶魔法でしっかりコレクションしておかないと～☆」
line = "「おお～っ！　プリムラさん渾身のガッツポーズ！　これは記憶魔法でしっかりコレクションしておかないと～☆」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「どうじゃ、妃竜院マハムート！　これが悪の終末兵器にして、サチのライバルである我の力なのじゃ！」
line = "「どうじゃ、妃竜院マハムート！　これが悪の終末兵器にして、サチのライバルである我の力なのじゃ！」"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「――悪くないわね」
line = "「――悪くないわね」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「うえぇっ！？」
line = "「うえぇっ！？」"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「口は悪くて生意気だけど、協調性は想像以上に悪くなかったわ」
line = "「口は悪くて生意気だけど、協調性は想像以上に悪くなかったわ」"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「てっきりスタンドプレーをするものだと思っていたけれど……ちゃんと周りと合わせられていた。あなた、意外と修羅場をくぐって来てるのね」
line = "「てっきりスタンドプレーをするものだと思っていたけれど……ちゃんと周りと合わせられていた。あなた、意外と修羅場をくぐって来てるのね」"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「私が手を貸したとはいえ、今日のところはよくやったと褒めてあげるわ、プリムラ」
line = "「私が手を貸したとはいえ、今日のところはよくやったと褒めてあげるわ、プリムラ」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「なっ……何を言っとるのじゃ貴様！？　そんな褒めたりしても、我は決して服従したりせぬぞ！」
line = "「なっ……何を言っとるのじゃ貴様！？　そんな褒めたりしても、我は決して服従したりせぬぞ！」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「――フヘヘヘ♪」
line = "「――フヘヘヘ♪」"

[[dialogue]]
speaker = "シズハ"
# 「めっちゃ嬉しそう！」
line = "「めっちゃ嬉しそう！」"

[[dialogue]]
speaker = "サチ"
# 「相変わらず、すごくチョロい……」
line = "「相変わらず、すごくチョロい……」"

[[dialogue]]
speaker = "アム"
# 「ふふふっ、それでどうだった、エルゼ？　あたしの水着フォームも、めっちゃ活躍してたでしょ？　これがフォームチェンジの力ってね♪」
line = "「ふふふっ、それでどうだった、エルゼ？　あたしの水着フォームも、めっちゃ活躍してたでしょ？　これがフォームチェンジの力ってね♪」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「ぐぬぬ……悔しいですけれど、強かったですわ……！」
line = "「ぐぬぬ……悔しいですけれど、強かったですわ……！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「でも、私だってすぐに追いついてみせますわ！　ライバルとして！」
line = "「でも、私だってすぐに追いついてみせますわ！　ライバルとして！」"

[[dialogue]]
speaker = "アム"
# 「そう来なくっちゃ！　まあ、エルゼが新フォームを手に入れたとしても、あたしがまた３着目を手に入れて追い抜いちゃうけどね～♪」
line = "「そう来なくっちゃ！　まあ、エルゼが新フォームを手に入れたとしても、あたしがまた３着目を手に入れて追い抜いちゃうけどね～♪」"

[[dialogue]]
speaker = "シズハ"
# 「ねぇねぇ！　みんなで協力して戦って、結構イイ感じになったんじゃない？」
line = "「ねぇねぇ！　みんなで協力して戦って、結構イイ感じになったんじゃない？」"

[[dialogue]]
speaker = "シズハ"
# 「私、思いついたんだけど、今度みんなで本物の遊園地に遊びに行こうよ！」
line = "「私、思いついたんだけど、今度みんなで本物の遊園地に遊びに行こうよ！」"

[[dialogue]]
speaker = "アム"
# 「おっ！　いいね～♪　絶対楽しいよ、それ！」
line = "「おっ！　いいね～♪　絶対楽しいよ、それ！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「はいは～い！　私も行きたいで～す！　素敵な思い出コレクションになりそうですから～♪」
line = "「はいは～い！　私も行きたいで～す！　素敵な思い出コレクションになりそうですから～♪」"

[[dialogue]]
speaker = "トレジアンナ"
# 「というか、あわよくば、アムさんとエルゼさんを新しい魔法少女に勧誘してしまうのも……ふふふ……！」
line = "「というか、あわよくば、アムさんとエルゼさんを新しい魔法少女に勧誘してしまうのも……ふふふ……！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「？　トレジアンナ様、魔法少女とは一体、何のことですの？」
line = "「？　トレジアンナ様、魔法少女とは一体、何のことですの？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「あっ、聞こえちゃいました～？　それはですね～」
line = "「あっ、聞こえちゃいました～？　それはですね～」"

[[dialogue]]
speaker = "サチ"
# 「トレジアンナさん、それ以上は禁止です！！！」
line = "「トレジアンナさん、それ以上は禁止です！！！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「おっといけない、てへぺろ☆」
line = "「おっといけない、てへぺろ☆」"

[[dialogue]]
speaker = "シズハ"
# 「ねぇ、プリムラちゃんもみんなと一緒に来るでしょ？」
line = "「ねぇ、プリムラちゃんもみんなと一緒に来るでしょ？」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「はぁ？　我が遊園地へ遊びになど、行くわけなかろう！」
line = "「はぁ？　我が遊園地へ遊びになど、行くわけなかろう！」"

[[dialogue]]
speaker = "サチ"
# 「もしかしてプリムラ、絶叫マシーンが怖いの～？」
line = "「もしかしてプリムラ、絶叫マシーンが怖いの～？」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「なんじゃと！？　いきなり何を言い出すのじゃ、サチ！」
line = "「なんじゃと！？　いきなり何を言い出すのじゃ、サチ！」"

[[dialogue]]
speaker = "サチ"
# 「別に怖くないっていうなら、私と絶叫マシーンに乗って勝負しない？　どっちが怖がらないか」
line = "「別に怖くないっていうなら、私と絶叫マシーンに乗って勝負しない？　どっちが怖がらないか」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「望むところじゃ！　我が勝って、貴様の『もう勘弁して～』という泣き顔を拝んでやるのじゃ！」
line = "「望むところじゃ！　我が勝って、貴様の『もう勘弁して～』という泣き顔を拝んでやるのじゃ！」"

[[dialogue]]
speaker = "サチ"
# 「ふふっ、じゃあプリムラも参加決定ね♪」
line = "「ふふっ、じゃあプリムラも参加決定ね♪」"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「やれやれ、もう打ち上げみたいにはしゃいじゃって。私は行くから、後は好きになさい」
line = "「やれやれ、もう打ち上げみたいにはしゃいじゃって。私は行くから、後は好きになさい」"

[[dialogue]]
speaker = "シズハ"
# 「そうだ！　せっかくですし、マムも一緒に遊園地行きませんか？」
line = "「そうだ！　せっかくですし、マムも一緒に遊園地行きませんか？」"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「は？　行かないわよ。附属生同士のところに私がいたら、あなた達が畏怖して楽しめないでしょ」
line = "「は？　行かないわよ。附属生同士のところに私がいたら、あなた達が畏怖して楽しめないでしょ」"

[[dialogue]]
speaker = "アム"
# 「でも前にビーチバレー特訓した後、あたしとマトイ先輩と３人でお出かけした時、すごく楽しかったけどな～」
line = "「でも前にビーチバレー特訓した後、あたしとマトイ先輩と３人でお出かけした時、すごく楽しかったけどな～」"

[[dialogue]]
speaker = "サチ"
# 「そんなことあったの！？　ち、ちょっと羨ましいかも……」
line = "「そんなことあったの！？　ち、ちょっと羨ましいかも……」"

[[dialogue]]
speaker = "シズハ"
# 「いいな～！　私もマムとお出かけした～い♪」
line = "「いいな～！　私もマムとお出かけした～い♪」"

[[dialogue]]
speaker = "トレジアンナ"
# 「マムのプライベートな素顔、私もコレクション欲がそそられますね～♪　ふふふ……！」
line = "「マムのプライベートな素顔、私もコレクション欲がそそられますね～♪　ふふふ……！」"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「あなた達、意外と恐れ知らずね……」
line = "「あなた達、意外と恐れ知らずね……」"

[[dialogue]]
speaker = "unk"
# その後、なんだかんだ言いつつも、一緒に遊園地へ出かけることを承諾してしまうマハムートなのであった――
line = "その後、なんだかんだ言いつつも、一緒に遊園地へ出かけることを承諾してしまうマハムートなのであった――"
