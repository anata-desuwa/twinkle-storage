[[dialogue]]
speaker = "unk"
# 第２話,ハナヨメ修行だ！,P
line = "第２話,ハナヨメ修行だ！,P"

[[dialogue]]
speaker = "クラウディア"
# 「──空間移動、終了。ふふん、やはり人間界には、お忍びで来るに限るのう。小うるさいお目付け役がいては、魔王と『いちゃいちゃ』できんからな♪」
line = "「──空間移動、終了。ふふん、やはり人間界には、お忍びで来るに限るのう。小うるさいお目付け役がいては、魔王と『いちゃいちゃ』できんからな♪」"

[[dialogue]]
speaker = "クラウディア"
# 「アイリーンにも認識変異の魔法を強めにかけたから、日が暮れるまではバレないであろう。さて……」
line = "「アイリーンにも認識変異の魔法を強めにかけたから、日が暮れるまではバレないであろう。さて……」"

[[dialogue]]
speaker = "クラウディア"
# 「むぅ。魔王はまだ帰っておらんのか。学園に向かった方がよかったか？」
line = "「むぅ。魔王はまだ帰っておらんのか。学園に向かった方がよかったか？」"

[[dialogue]]
speaker = "クラウディア"
# 「……いや、よいことを思いついたぞ。今日はここで待ち伏せだ。そして──」
line = "「……いや、よいことを思いついたぞ。今日はここで待ち伏せだ。そして──」"

[[dialogue]]
speaker = "クラウディア（黄昏）"
# 「この姿で出迎えてやろう！　ふふふ、驚く顔が目に浮かぶぞ♪」
line = "「この姿で出迎えてやろう！　ふふふ、驚く顔が目に浮かぶぞ♪」"

[[dialogue]]
speaker = "クラウディア（黄昏）"
# 「あやつ、以前に見た時も口をあんぐり開けてのう、キレイキレイとぬかしておったからな。今日も骨抜きにしてくれるわ<emoji=heart04>」
line = "「あやつ、以前に見た時も口をあんぐり開けてのう、キレイキレイとぬかしておったからな。今日も骨抜きにしてくれるわ<emoji=heart04>」"

[[dialogue]]
speaker = "クラウディア（黄昏）"
# 「……そう言えば、可愛いだのなんだのと褒めさせている時に、聞き慣れん単語を言っておったな、なんだったか……」
line = "「……そう言えば、可愛いだのなんだのと褒めさせている時に、聞き慣れん単語を言っておったな、なんだったか……」"

[[dialogue]]
speaker = "クラウディア（黄昏）"
# 「そうだ、ハナヨメだ！　しかしハナヨメとはなんだ……？　ふむ、調べてみるか」
line = "「そうだ、ハナヨメだ！　しかしハナヨメとはなんだ……？　ふむ、調べてみるか」"

[[dialogue]]
speaker = "クラウディア（黄昏）"
# 「ええと、魔王が使っていた、のーとぱそこんが……お、あった！」
line = "「ええと、魔王が使っていた、のーとぱそこんが……お、あった！」"

[[dialogue]]
speaker = "クラウディア（黄昏）"
# 「横で見ていたからな、操作方法くらいわかるのだぞ……検索……ハナヨメ……ほう……ほう……」
line = "「横で見ていたからな、操作方法くらいわかるのだぞ……検索……ハナヨメ……ほう……ほう……」"

[[dialogue]]
speaker = "クラウディア（黄昏）"
# 「ハナヨメ衣装は、結婚式という儀式の際にまとう装いか……ふむ、確かに今の余の格好に似ておる」
line = "「ハナヨメ衣装は、結婚式という儀式の際にまとう装いか……ふむ、確かに今の余の格好に似ておる」"

[[dialogue]]
speaker = "クラウディア（黄昏）"
# 「ふふん♪　余の白き姿を見て、うぇ～でぃんぐどれすとかいうのを想像したのか。気が早い男だの。後でからかってやろう♪」
line = "「ふふん♪　余の白き姿を見て、うぇ～でぃんぐどれすとかいうのを想像したのか。気が早い男だの。後でからかってやろう♪」"

[[dialogue]]
speaker = "クラウディア（黄昏）"
# 「む、何だこの語句は……ハナヨメ修行？　ハナヨメになるには修行がいるのか？」
line = "「む、何だこの語句は……ハナヨメ修行？　ハナヨメになるには修行がいるのか？」"

[[dialogue]]
speaker = "クラウディア（黄昏）"
# 「ふむ、ふむ……『愛され妻になるてくにっく』……炊事と掃除を極めれば、男はオチる……？」
line = "「ふむ、ふむ……『愛され妻になるてくにっく』……炊事と掃除を極めれば、男はオチる……？」"

[[dialogue]]
speaker = "unk"
# ──数時間後。
line = "──数時間後。"

[[dialogue]]
speaker = "unk"
# ただいま～
line = "ただいま～"

[[dialogue]]
speaker = "クラウディア（黄昏）"
# 「やっと帰ってきたか！　待ちわびたぞ、魔王！」
line = "「やっと帰ってきたか！　待ちわびたぞ、魔王！」"

[[dialogue]]
speaker = "unk"
# クラウディア！？
line = "クラウディア！？"

[[dialogue]]
speaker = "クラウディア（黄昏）"
# 「ふふん、どうだ魔王。この部屋を見て気づくことはないかのう？」
line = "「ふふん、どうだ魔王。この部屋を見て気づくことはないかのう？」"

[[dialogue]]
speaker = "unk"
# 部屋中が……ピカピカになってる！？
line = "部屋中が……ピカピカになってる！？"

[[dialogue]]
speaker = "クラウディア（黄昏）"
# 「その通りだ！　余が隅々まで磨いたのだぞ！　どうだ！！　骨抜きになってオチただろう！　ふははははっ！」
line = "「その通りだ！　余が隅々まで磨いたのだぞ！　どうだ！！　骨抜きになってオチただろう！　ふははははっ！」"

[[dialogue]]
speaker = "クラウディア（黄昏）"
# 「そうだ、腹は減っておらんか。喜べ、ぽっとで湯も沸かしておる。かっぷらあめんならばすぐに準備ができるぞ！　凄かろう！」
line = "「そうだ、腹は減っておらんか。喜べ、ぽっとで湯も沸かしておる。かっぷらあめんならばすぐに準備ができるぞ！　凄かろう！」"

[[dialogue]]
speaker = "unk"
# あ、ありがとう？
line = "あ、ありがとう？"

[[dialogue]]
speaker = "unk"
# よくわからないけど……
line = "よくわからないけど……"

[[dialogue]]
speaker = "クラウディア（黄昏）"
# 「うむうむ。ヨメの家事をねぎらう夫は、よい夫だと記事にもあったぞ。お前は将来見込みがありそうだな♪」
line = "「うむうむ。ヨメの家事をねぎらう夫は、よい夫だと記事にもあったぞ。お前は将来見込みがありそうだな♪」"

[[dialogue]]
speaker = "ウェンディ"
# 「失礼します！　会長さん、こちらにクラウディア様が……！」
line = "「失礼します！　会長さん、こちらにクラウディア様が……！」"

[[dialogue]]
speaker = "クラウディア（黄昏）"
# 「おお、ウェンディ」
line = "「おお、ウェンディ」"

[[dialogue]]
speaker = "ウェンディ"
# 「いたーーー！！　しかもまたまずい恰好でいたーーー！！」
line = "「いたーーー！！　しかもまたまずい恰好でいたーーー！！」"

[[dialogue]]
speaker = "ウェンディ"
# 「一体何をしていたんですか！　アイリーンにあんなに強く魔法をかけて！　ちょっとおかしくなっちゃってて、基地は大変だったんですよ！？」
line = "「一体何をしていたんですか！　アイリーンにあんなに強く魔法をかけて！　ちょっとおかしくなっちゃってて、基地は大変だったんですよ！？」"

[[dialogue]]
speaker = "クラウディア（黄昏）"
# 「何をしていたと言われてもの。ハナヨメ修行だ！」
line = "「何をしていたと言われてもの。ハナヨメ修行だ！」"

[[dialogue]]
speaker = "ウェンディ"
# 「は……？」
line = "「は……？」"

[[dialogue]]
speaker = "クラウディア（黄昏）"
# 「炊事と掃除を極めると、男は骨抜きになってオチるのだ。なんだウェンディ、そんなことも知らんのか？」
line = "「炊事と掃除を極めると、男は骨抜きになってオチるのだ。なんだウェンディ、そんなことも知らんのか？」"

[[dialogue]]
speaker = "ウェンディ"
# 「ちょ、ちょっと待ってください！　理解が追い付かないのですが……え、クラウディア様が家事を──！？」
line = "「ちょ、ちょっと待ってください！　理解が追い付かないのですが……え、クラウディア様が家事を──！？」"

[[dialogue]]
speaker = "クラウディア（黄昏）"
# 「うむ！　りびんぐに、こやつの部屋に、風呂場に……そうそう、<ruby=かわや>厠</ruby>もピカピカにしたのだ！　余に抜かりはないぞ、偉いだろう！」
line = "「うむ！　りびんぐに、こやつの部屋に、風呂場に……そうそう、<ruby>厠<rt>かわや</rt></ruby>もピカピカにしたのだ！　余に抜かりはないぞ、偉いだろう！」"

[[dialogue]]
speaker = "ウェンディ"
# 「会長さん！？　ネビュラの至宝、光の魔女にトイレ掃除をさせるだなんて──な、なんてことを！？」
line = "「会長さん！？　ネビュラの至宝、光の魔女にトイレ掃除をさせるだなんて──な、なんてことを！？」"

[[dialogue]]
speaker = "ウェンディ"
# 「流石は今代の魔王ッ……神をも恐れぬ所業ですね！？」
line = "「流石は今代の魔王ッ……神をも恐れぬ所業ですね！？」"

[[dialogue]]
speaker = "unk"
# 俺は何も言ってないよ！？
line = "俺は何も言ってないよ！？"

[[dialogue]]
speaker = "ウェンディ"
# 「ていうかセドナ長官にどう報告すれば！？」
line = "「ていうかセドナ長官にどう報告すれば！？」"

[[dialogue]]
speaker = "unk"
# 内緒にしよう！！
line = "内緒にしよう！！"

[[dialogue]]
speaker = "ウェンディ"
# 「ひどい！！　また秘密が増えていく！！　もういい加減、私でも庇い切れないですよ！？」
line = "「ひどい！！　また秘密が増えていく！！　もういい加減、私でも庇い切れないですよ！？」"

[[dialogue]]
speaker = "クラウディア（黄昏）"
# 「何なのだ、厠掃除をしたくらいで……ウェンディは大げさすぎるぞ」
line = "「何なのだ、厠掃除をしたくらいで……ウェンディは大げさすぎるぞ」"

[[dialogue]]
speaker = "ウェンディ"
# 「大問題なんですってば～！！」
line = "「大問題なんですってば～！！」"

[[dialogue]]
speaker = "unk"
# そのすぐ後に母さんも帰ってきて、光の魔女が自分の家で家政婦の真似事をしたと知って、卒倒しかけたのだった……
line = "そのすぐ後に母さんも帰ってきて、光の魔女が自分の家で家政婦の真似事をしたと知って、卒倒しかけたのだった……"
