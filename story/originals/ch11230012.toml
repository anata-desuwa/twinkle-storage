[[dialogue]]
speaker = "unk"
# 第２話,肉を愛する者,P
line = "第２話,肉を愛する者,P"

[[dialogue]]
speaker = "unk"
# リーエンとの模擬戦が日課のようになってしまった。
line = "リーエンとの模擬戦が日課のようになってしまった。"

[[dialogue]]
speaker = "unk"
# この日もまた、俺たちは激しく拳を交え、心地よい汗を流した。
line = "この日もまた、俺たちは激しく拳を交え、心地よい汗を流した。"

[[dialogue]]
speaker = "リーエン"
# 「はぁっ、はぁっ、はぁっ、僅差であたしの勝利だ、惜しかったな、魔王！」
line = "「はぁっ、はぁっ、はぁっ、僅差であたしの勝利だ、惜しかったな、魔王！」"

[[dialogue]]
speaker = "unk"
# いや、今回は俺の勝ちだよ
line = "いや、今回は俺の勝ちだよ"

[[dialogue]]
speaker = "リーエン"
# 「は？　何を言う。あれほどあたしの攻撃を喰らっておいて！」
line = "「は？　何を言う。あれほどあたしの攻撃を喰らっておいて！」"

[[dialogue]]
speaker = "リーエン"
# 「いや、おまえの防御を打ち崩せなかったのも事実か……」
line = "「いや、おまえの防御を打ち崩せなかったのも事実か……」"

[[dialogue]]
speaker = "リーエン"
# 「つまり、またしても引き分けということかっ？」
line = "「つまり、またしても引き分けということかっ？」"

[[dialogue]]
speaker = "unk"
# 次は俺が勝つ！
line = "次は俺が勝つ！"

[[dialogue]]
speaker = "リーエン"
# 「フンッ、言ってくれる。勝利をもぎ取るのはこのあたしだ！」
line = "「フンッ、言ってくれる。勝利をもぎ取るのはこのあたしだ！」"

[[dialogue]]
speaker = "リーエン"
# 「まあいい、次回を楽しみにしておけ！　それよりあたしは腹が減ったぞ。ついて来い、魔王！」
line = "「まあいい、次回を楽しみにしておけ！　それよりあたしは腹が減ったぞ。ついて来い、魔王！」"

[[dialogue]]
speaker = "リーエン"
# 「おい、肉だ！　肉を頼む！」
line = "「おい、肉だ！　肉を頼む！」"

[[dialogue]]
speaker = "ヨミ"
# 「え、ええーと、ご注文は肉料理、でよろしかったでしょうか？」
line = "「え、ええーと、ご注文は肉料理、でよろしかったでしょうか？」"

[[dialogue]]
speaker = "リーエン"
# 「ああ！　肉ならなんでもいいぞ。好きなだけ持ってこい！」
line = "「ああ！　肉ならなんでもいいぞ。好きなだけ持ってこい！」"

[[dialogue]]
speaker = "ヨミ"
# 「か、かしこまりました～」
line = "「か、かしこまりました～」"

[[dialogue]]
speaker = "unk"
# すっかり常連だね？
line = "すっかり常連だね？"

[[dialogue]]
speaker = "リーエン"
# 「うむ、いい店を教えてもらった。新星学園にはこんな店があって羨ましいぞ」
line = "「うむ、いい店を教えてもらった。新星学園にはこんな店があって羨ましいぞ」"

[[dialogue]]
speaker = "リーエン"
# 「戦場とは異なる活気がここにはある。本能をくすぐる肉と脂の焼ける匂いがたまらん」
line = "「戦場とは異なる活気がここにはある。本能をくすぐる肉と脂の焼ける匂いがたまらん」"

[[dialogue]]
speaker = "リーエン"
# 「しかし肉はまだなのか？　いつも同じ時間に来ているのだから、気を利かせて焼いておくべきだろう」
line = "「しかし肉はまだなのか？　いつも同じ時間に来ているのだから、気を利かせて焼いておくべきだろう」"

[[dialogue]]
speaker = "ヨミ"
# 「お待たせしましたっ、スペシャル山盛り肉プレートになります！」
line = "「お待たせしましたっ、スペシャル山盛り肉プレートになります！」"

[[dialogue]]
speaker = "リーエン"
# 「おお、来たか！　待ちくたびれたぞ！　さあ、魔王も熱いうちに食え」
line = "「おお、来たか！　待ちくたびれたぞ！　さあ、魔王も熱いうちに食え」"

[[dialogue]]
speaker = "リーエン"
# 「はむっ！　ガツガツガツ……」
line = "「はむっ！　ガツガツガツ……」"

[[dialogue]]
speaker = "リーエン"
# 「うまぁーーい！　焼き加減も抜群だぞ！」
line = "「うまぁーーい！　焼き加減も抜群だぞ！」"

[[dialogue]]
speaker = "リーエン"
# 「味もいいが量も素晴らしいな。最初に来た時は盛りが少ないと感じたが、あたしに合わせて増量するとは」
line = "「味もいいが量も素晴らしいな。最初に来た時は盛りが少ないと感じたが、あたしに合わせて増量するとは」"

[[dialogue]]
speaker = "unk"
# 本当に肉が好きなんだね？
line = "本当に肉が好きなんだね？"

[[dialogue]]
speaker = "リーエン"
# 「当然だ、肉があたしの体を作っているんだからな」
line = "「当然だ、肉があたしの体を作っているんだからな」"

[[dialogue]]
speaker = "リーエン"
# 「強くなるには肉を食うべきだ！　魔王ももっと食わないと強くなれないぞ！」
line = "「強くなるには肉を食うべきだ！　魔王ももっと食わないと強くなれないぞ！」"

[[dialogue]]
speaker = "リーエン"
# 「あーっはっはっはっは！　よし、おかわりだ！　もっと肉を頼む！」
line = "「あーっはっはっはっは！　よし、おかわりだ！　もっと肉を頼む！」"

[[dialogue]]
speaker = "リーエン"
# 「…………おい待て、魔王。あれはいったいなんだ？」
line = "「…………おい待て、魔王。あれはいったいなんだ？」"

[[dialogue]]
speaker = "リーエン"
# 「とんでもない肉の塊だぞ！」
line = "「とんでもない肉の塊だぞ！」"

[[dialogue]]
speaker = "ヨミ"
# 「お待たせしました～……っと。ケバブ食べ放題コースでーす！」
line = "「お待たせしました～……っと。ケバブ食べ放題コースでーす！」"

[[dialogue]]
speaker = "アルモタヘル"
# 「感謝する、人の子よ」
line = "「感謝する、人の子よ」"

[[dialogue]]
speaker = "ヨミ"
# 「ごゆっくりどうぞ～」
line = "「ごゆっくりどうぞ～」"

[[dialogue]]
speaker = "アルモタヘル"
# 「ふむ……良き肉の香りだ。では、頂くとしよう」
line = "「ふむ……良き肉の香りだ。では、頂くとしよう」"

[[dialogue]]
speaker = "リーエン"
# 「おい、魔王！　あたしはここの常連だが、あんなの見たことないぞ！」
line = "「おい、魔王！　あたしはここの常連だが、あんなの見たことないぞ！」"

[[dialogue]]
speaker = "unk"
# 守護天使のアルモタヘルだね
line = "守護天使のアルモタヘルだね"

[[dialogue]]
speaker = "リーエン"
# 「なんだと……！？　守護天使があのとんでもない肉料理を喰らうのか……」
line = "「なんだと……！？　守護天使があのとんでもない肉料理を喰らうのか……」"

[[dialogue]]
speaker = "リーエン"
# 「面白い！　守護天使を名乗るだけのことはあるな！」
line = "「面白い！　守護天使を名乗るだけのことはあるな！」"

[[dialogue]]
speaker = "リーエン"
# 「失礼する！　守護天使殿！」
line = "「失礼する！　守護天使殿！」"

[[dialogue]]
speaker = "アルモタヘル"
# 「？？？　もぐもぐもぐ……」
line = "「？？？　もぐもぐもぐ……」"

[[dialogue]]
speaker = "リーエン"
# 「あたしはリーエン！　肉をこよなく愛する者だ！」
line = "「あたしはリーエン！　肉をこよなく愛する者だ！」"

[[dialogue]]
speaker = "アルモタヘル"
# 「もぐもぐもぐ……ごくん。ふぅ……我はアルモタヘルだ、肉を愛する者よ」
line = "「もぐもぐもぐ……ごくん。ふぅ……我はアルモタヘルだ、肉を愛する者よ」"

[[dialogue]]
speaker = "リーエン"
# 「アルモタヘル殿！　お見かけしたところ、あなたも大層肉料理がお好きと見える！」
line = "「アルモタヘル殿！　お見かけしたところ、あなたも大層肉料理がお好きと見える！」"

[[dialogue]]
speaker = "リーエン"
# 「ついてはひとつ質問なのだが……そ、その料理は何なのだ？」
line = "「ついてはひとつ質問なのだが……そ、その料理は何なのだ？」"

[[dialogue]]
speaker = "アルモタヘル"
# 「ケバブだ。まさか、ケバブを知らぬというのか？」
line = "「ケバブだ。まさか、ケバブを知らぬというのか？」"

[[dialogue]]
speaker = "リーエン"
# 「初耳だ。どのような肉なのか、あたしに味見をさせて欲しい」
line = "「初耳だ。どのような肉なのか、あたしに味見をさせて欲しい」"

[[dialogue]]
speaker = "アルモタヘル"
# 「このケバブは我のものだ。譲りはしない」
line = "「このケバブは我のものだ。譲りはしない」"

[[dialogue]]
speaker = "アルモタヘル"
# 「……よし、おかわりだ。ケバブ食べ放題……素晴らしき聖餐よ……」
line = "「……よし、おかわりだ。ケバブ食べ放題……素晴らしき聖餐よ……」"

[[dialogue]]
speaker = "リーエン"
# 「ぐぬぬ……うまそうに食いやがって……。いいだろう！　おい、ウェイトレス！　あたしも注文するぞ！」
line = "「ぐぬぬ……うまそうに食いやがって……。いいだろう！　おい、ウェイトレス！　あたしも注文するぞ！」"

[[dialogue]]
speaker = "ヨミ"
# 「ええと……実はわたし、ウェイトレスではなくて、臨時でお手伝いしてるだけのクエスト受付嬢──」
line = "「ええと……実はわたし、ウェイトレスではなくて、臨時でお手伝いしてるだけのクエスト受付嬢──」"

[[dialogue]]
speaker = "リーエン"
# 「そんなのどっちでもいい！　同じものを持ってこい！」
line = "「そんなのどっちでもいい！　同じものを持ってこい！」"

[[dialogue]]
speaker = "ヨミ"
# 「こやぁっ、大事なことなのに～っ！？　って、同じものっ！？　も、もしかしてあなたもケバブ食べ放題コースを！？」
line = "「こやぁっ、大事なことなのに～っ！？　って、同じものっ！？　も、もしかしてあなたもケバブ食べ放題コースを！？」"

[[dialogue]]
speaker = "リーエン"
# 「当然だ！　肉をこよなく愛する者として、相手が守護天使だろうと決して負けはしない！！」
line = "「当然だ！　肉をこよなく愛する者として、相手が守護天使だろうと決して負けはしない！！」"

[[dialogue]]
speaker = "アルモタヘル"
# 「面白い。ケバブ愛を見せてみるがよい」
line = "「面白い。ケバブ愛を見せてみるがよい」"

[[dialogue]]
speaker = "リーエン"
# 「おお、これがケバブ！　守護天使殿のように食せばいいんだな？」
line = "「おお、これがケバブ！　守護天使殿のように食せばいいんだな？」"

[[dialogue]]
speaker = "リーエン"
# 「もぐもぐもぐ……うまい！　これがケバブか！」
line = "「もぐもぐもぐ……うまい！　これがケバブか！」"

[[dialogue]]
speaker = "アルモタヘル"
# 「そうだろう。ケバブは美味なのだ」
line = "「そうだろう。ケバブは美味なのだ」"

[[dialogue]]
speaker = "リーエン"
# 「確かに！　しかも味だけでなく、量も素晴らしいぞ！」
line = "「確かに！　しかも味だけでなく、量も素晴らしいぞ！」"

[[dialogue]]
speaker = "リーエン"
# 「肉の味が濃い……食感も強いなっ。強者に相応しい料理だ！」
line = "「肉の味が濃い……食感も強いなっ。強者に相応しい料理だ！」"

[[dialogue]]
speaker = "リーエン"
# 「守護天使殿よ、勝負だ！　どちらがより多くケバブを食えるか、とことん競い合おう！」
line = "「守護天使殿よ、勝負だ！　どちらがより多くケバブを食えるか、とことん競い合おう！」"

[[dialogue]]
speaker = "アルモタヘル"
# 「ふっ……ケバブで我に敵うと思ったか？」
line = "「ふっ……ケバブで我に敵うと思ったか？」"

[[dialogue]]
speaker = "リーエン"
# 「肉では絶対負けない！」
line = "「肉では絶対負けない！」"

[[dialogue]]
speaker = "アルモタヘル"
# 「意気や良し。挑んでくるが良い、人の子よ」
line = "「意気や良し。挑んでくるが良い、人の子よ」"

[[dialogue]]
speaker = "リーエン"
# 「うぷっ……もう食えない……」
line = "「うぷっ……もう食えない……」"

[[dialogue]]
speaker = "unk"
# でも、全部食べ切れたね
line = "でも、全部食べ切れたね"

[[dialogue]]
speaker = "リーエン"
# 「薄氷の勝利だ……限界を超えた戦いだったぞ……」
line = "「薄氷の勝利だ……限界を超えた戦いだったぞ……」"

[[dialogue]]
speaker = "リーエン"
# 「それより守護天使殿を見ろ。あたしと同じく完食したのに、涼しい顔をしている……今にもおかわりを注文しそうな顔だ」
line = "「それより守護天使殿を見ろ。あたしと同じく完食したのに、涼しい顔をしている……今にもおかわりを注文しそうな顔だ」"

[[dialogue]]
speaker = "アルモタヘル"
# 「そなたのケバブ愛、見せてもらったぞ。その深きケバブ愛を讃え褒美を進呈しよう」
line = "「そなたのケバブ愛、見せてもらったぞ。その深きケバブ愛を讃え褒美を進呈しよう」"

[[dialogue]]
speaker = "アルモタヘル"
# 「人の子よ、我を『アルモたん』と呼ぶ権利を授ける」
line = "「人の子よ、我を『アルモたん』と呼ぶ権利を授ける」"

[[dialogue]]
speaker = "リーエン"
# 「アルモたん！」
line = "「アルモたん！」"

[[dialogue]]
speaker = "アルモタヘル"
# 「これからもケバブ道に精進するように」
line = "「これからもケバブ道に精進するように」"

[[dialogue]]
speaker = "リーエン"
# 「お、おう！　わかったぞ、アルモたん！」
line = "「お、おう！　わかったぞ、アルモたん！」"

[[dialogue]]
speaker = "unk"
# こうして、リーエンはケバブ道についても極めることを決意するのだった。
line = "こうして、リーエンはケバブ道についても極めることを決意するのだった。"
