[[dialogue]]
speaker = "unk"
# 第４話,たまにはまったりだ！,P
line = "第４話,たまにはまったりだ！,P"

[[dialogue]]
speaker = "アポロ"
# 「よーし！　目当てのバルーンにクラッカーに、飾り付け用の型紙……ぜんぶ買えたな！　へへ、これで入学パーティ？　の準備はばっちりだぜ」
line = "「よーし！　目当てのバルーンにクラッカーに、飾り付け用の型紙……ぜんぶ買えたな！　へへ、これで入学パーティ？　の準備はばっちりだぜ」"

[[dialogue]]
speaker = "アポロ"
# 「魔王と２人でお出かけして買い物なんて、なんか新鮮な感じだったな。たまにはこういうのも悪くないぜ」
line = "「魔王と２人でお出かけして買い物なんて、なんか新鮮な感じだったな。たまにはこういうのも悪くないぜ」"

[[dialogue]]
speaker = "アポロ"
# 「星徒会の買い出しに付き合わせて悪い？　気にしないってのそんなの。つか、あたしから頼んだことだしな！」
line = "「星徒会の買い出しに付き合わせて悪い？　気にしないってのそんなの。つか、あたしから頼んだことだしな！」"

[[dialogue]]
speaker = "アポロ"
# 「にしても……あのデパートってやつは、大層混んでたなあ。今の時期だからか？」
line = "「にしても……あのデパートってやつは、大層混んでたなあ。今の時期だからか？」"

[[dialogue]]
speaker = "アポロ"
# 「つか、こうしてみるとやっぱ……地上って人が多いな。なんか狭っ苦しく思えてきたぜ」
line = "「つか、こうしてみるとやっぱ……地上って人が多いな。なんか狭っ苦しく思えてきたぜ」"

[[dialogue]]
speaker = "unk"
# 大人に囲まれてるから
line = "大人に囲まれてるから"

[[dialogue]]
speaker = "unk"
# 子どもの体だから
line = "子どもの体だから"

[[dialogue]]
speaker = "アポロ"
# 「なるほどな。確かにあたしも、空をぐわーって飛び回ってた頃はこんなこと思わなかったしな」
line = "「なるほどな。確かにあたしも、空をぐわーって飛び回ってた頃はこんなこと思わなかったしな」"

[[dialogue]]
speaker = "アポロ"
# 「にしても──この人混みに揉まれ続けるのは大変だぜ。うー、震えるほど寒いしよ」
line = "「にしても──この人混みに揉まれ続けるのは大変だぜ。うー、震えるほど寒いしよ」"

[[dialogue]]
speaker = "アポロ"
# 「どこかによ、あったかくて、ついでに２人きりになれる場所とか──ねえかな？　魔王……？」
line = "「どこかによ、あったかくて、ついでに２人きりになれる場所とか──ねえかな？　魔王……？」"

[[dialogue]]
speaker = "アポロ"
# 「──あった！　うはは、なんてな！　実は最初からそのつもりだったのさ！」
line = "「──あった！　うはは、なんてな！　実は最初からそのつもりだったのさ！」"

[[dialogue]]
speaker = "unk"
# 今日も泳ぎ？
line = "今日も泳ぎ？"

[[dialogue]]
speaker = "unk"
# 今日もバレー？
line = "今日もバレー？"

[[dialogue]]
speaker = "アポロ"
# 「ん～……いや！　今日はのんびりしよう」
line = "「ん～……いや！　今日はのんびりしよう」"

[[dialogue]]
speaker = "アポロ"
# 「海のレジャーはあらかた遊び尽くしたし、今日は買い出しもこなしたからな。たまにはいいだろ」
line = "「海のレジャーはあらかた遊び尽くしたし、今日は買い出しもこなしたからな。たまにはいいだろ」"

[[dialogue]]
speaker = "アポロ"
# 「それに……今日はちょうど誰もいないみたいだ！　へへ、この機会に２人でまったりするとしようぜ」
line = "「それに……今日はちょうど誰もいないみたいだ！　へへ、この機会に２人でまったりするとしようぜ」"

[[dialogue]]
speaker = "アポロ"
# 「はー……浮き輪でぷかぷか浮かぶだけってのも、いいもんだ……」
line = "「はー……浮き輪でぷかぷか浮かぶだけってのも、いいもんだ……」"

[[dialogue]]
speaker = "アポロ"
# 「トカイのケンソウを離れて、イコク風のビーチでゆったり……ふふ。こういうの、オトナのジョウチョって感じだろ？」
line = "「トカイのケンソウを離れて、イコク風のビーチでゆったり……ふふ。こういうの、オトナのジョウチョって感じだろ？」"

[[dialogue]]
speaker = "unk"
# 無理しなくていいぞ
line = "無理しなくていいぞ"

[[dialogue]]
speaker = "アポロ"
# 「バレたか！　ま、あたしものんびりしたかっただけだ」
line = "「バレたか！　ま、あたしものんびりしたかっただけだ」"

[[dialogue]]
speaker = "アポロ"
# 「今日は休みなんだしよ……気の済むまで、リラックスしてよーぜ……」
line = "「今日は休みなんだしよ……気の済むまで、リラックスしてよーぜ……」"

[[dialogue]]
speaker = "アポロ"
# 「ふーっ……砂浜に戻っても、まだ体が揺れてる気ぃするな」
line = "「ふーっ……砂浜に戻っても、まだ体が揺れてる気ぃするな」"

[[dialogue]]
speaker = "アポロ"
# 「ずっこけないように魔王を支えにするぞ！　ぎゅーって、抱きついて……へへ……<emoji=heart04>」
line = "「ずっこけないように魔王を支えにするぞ！　ぎゅーって、抱きついて……へへ……<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
# 「なんだよ。今は２人きりなんだぜ、誰に遠慮することもないだろ。ほらほら～」
line = "「なんだよ。今は２人きりなんだぜ、誰に遠慮することもないだろ。ほらほら～」"

[[dialogue]]
speaker = "unk"
# アポロは無邪気に笑いながら、両手でこちらに抱きついて、頭をぐりぐりとしてくる。
line = "アポロは無邪気に笑いながら、両手でこちらに抱きついて、頭をぐりぐりとしてくる。"

[[dialogue]]
speaker = "アポロ"
# 「ぎゅーっ……へへ。こうやって密着してると、安心するな。あたし、ずっとこのままでもいいかも」
line = "「ぎゅーっ……へへ。こうやって密着してると、安心するな。あたし、ずっとこのままでもいいかも」"

[[dialogue]]
speaker = "アポロ"
# 「ん～？　くすぐったいって？　そんなこと言うなよ～。へへっ……んじゃ、もっとほっぺですりすりしてやる」
line = "「ん～？　くすぐったいって？　そんなこと言うなよ～。へへっ……んじゃ、もっとほっぺですりすりしてやる」"

[[dialogue]]
speaker = "アポロ"
# 「魔王の体──温かいな。あたしよりずっと大きくて……」
line = "「魔王の体──温かいな。あたしよりずっと大きくて……」"

[[dialogue]]
speaker = "unk"
# すべすべした肌と水着の感触が、こちらの生身に直接伝わる。
line = "すべすべした肌と水着の感触が、こちらの生身に直接伝わる。"

[[dialogue]]
speaker = "unk"
# この状態でぴとっとくっついていられると、なんだか……。
line = "この状態でぴとっとくっついていられると、なんだか……。"

[[dialogue]]
speaker = "アポロ"
# 「んー？　どうしたんだよ、もぞもぞして」
line = "「んー？　どうしたんだよ、もぞもぞして」"

[[dialogue]]
speaker = "unk"
# 体格差が……
line = "体格差が……"

[[dialogue]]
speaker = "unk"
# 罪悪感が……
line = "罪悪感が……"

[[dialogue]]
speaker = "アポロ"
# 「罪悪感？　何を言ってんだ、あたしと魔王は好き好き同士だろ？　好きなやつ同士ひっついて何が悪いんだ」
line = "「罪悪感？　何を言ってんだ、あたしと魔王は好き好き同士だろ？　好きなやつ同士ひっついて何が悪いんだ」"

[[dialogue]]
speaker = "アポロ"
# 「こうして２人でひっついてると……あたしは幸せだぞ。魔王もそうじゃないのか？」
line = "「こうして２人でひっついてると……あたしは幸せだぞ。魔王もそうじゃないのか？」"

[[dialogue]]
speaker = "アポロ"
# 「ん……？　前かがみになってどうしたんだよ。手で水着押さえちゃってさ」
line = "「ん……？　前かがみになってどうしたんだよ。手で水着押さえちゃってさ」"

[[dialogue]]
speaker = "アポロ"
# 「あ！　おいこら、どうして逃げるんだ魔王！　あたしともっといちゃいちゃしようぜ！　おーい……」
line = "「あ！　おいこら、どうして逃げるんだ魔王！　あたしともっといちゃいちゃしようぜ！　おーい……」"

[[dialogue]]
speaker = "unk"
# 素肌の多いアポロとの接触には、まだ邪念を抱いてしまう自分だった……。
line = "素肌の多いアポロとの接触には、まだ邪念を抱いてしまう自分だった……。"
