[[dialogue]]
speaker = "unk"
# 第１５話,極星学園来襲,B
line = "第１５話,極星学園来襲,B"

[[dialogue]]
speaker = "unk"
# 俺がアリーナで全校生徒に話をして一週間後。
line = "俺がアリーナで全校生徒に話をして一週間後。"

[[dialogue]]
speaker = "unk"
# 宣言通りに信任選挙が行われ、開票結果が伝えられた。
line = "宣言通りに信任選挙が行われ、開票結果が伝えられた。"

[[dialogue]]
speaker = "クロト"
# 「結果は信任……か」
line = "「結果は信任……か」"

[[dialogue]]
speaker = "unk"
# 信任の票は９割に近く、反対に投じた人はわずか。
line = "信任の票は９割に近く、反対に投じた人はわずか。"

[[dialogue]]
speaker = "unk"
# だが、反対の票よりも未投票の人数が上回った。
line = "だが、反対の票よりも未投票の人数が上回った。"

[[dialogue]]
speaker = "unk"
# 未投票の人はまだ迷っているのかもしれない。
line = "未投票の人はまだ迷っているのかもしれない。"

[[dialogue]]
speaker = "クロト"
# （信任してくれた生徒を裏切らないように、反対の人たちの信頼を勝ち取れるように……それにまだ迷っている人たちにも信じてもらえるように、頑張らないとな）
line = "（信任してくれた生徒を裏切らないように、反対の人たちの信頼を勝ち取れるように……それにまだ迷っている人たちにも信じてもらえるように、頑張らないとな）"

[[dialogue]]
speaker = "ヴィーナス"
# 「学園長もシノに決まったし、ま、ひとまずイッケンラクチャクね」
line = "「学園長もシノに決まったし、ま、ひとまずイッケンラクチャクね」"

[[dialogue]]
speaker = "アナ"
# 「天才学生社長と呼ばれた<ruby=らつわん>辣腕</ruby>に期待ですね」
line = "「天才学生社長と呼ばれた<ruby>辣腕<rt>らつわん</rt></ruby>に期待ですね」"

[[dialogue]]
speaker = "サーシャ"
# 「どこかの独裁者さんが学園長にならなくてホッとしたわ～。シルヴィも頑張ってくれたのよね」
line = "「どこかの独裁者さんが学園長にならなくてホッとしたわ～。シルヴィも頑張ってくれたのよね」"

[[dialogue]]
speaker = "unk"
# シルヴィ先輩が煌嶺の相手をしたというのは、後から聞いた。
line = "シルヴィ先輩が煌嶺の相手をしたというのは、後から聞いた。"

[[dialogue]]
speaker = "unk"
# 学園上空でアステラが発生したのもそれが関係していたらしく、アステラすら武器にする煌嶺の力には驚いた。
line = "学園上空でアステラが発生したのもそれが関係していたらしく、アステラすら武器にする煌嶺の力には驚いた。"

[[dialogue]]
speaker = "マトイ"
# 「シルヴィさん、すごいよね。私も星徒会の盾としてもっと精進しないと──」
line = "「シルヴィさん、すごいよね。私も星徒会の盾としてもっと精進しないと──」"

[[dialogue]]
speaker = "unk"
# 束の間の平和を切り裂くように、ＤＩＳＣからアラームが鳴り響く。
line = "束の間の平和を切り裂くように、ＤＩＳＣからアラームが鳴り響く。"

[[dialogue]]
speaker = "クロト"
# 「モンスターの出現……？　いや、ガーディアンか……！」
line = "「モンスターの出現……？　いや、ガーディアンか……！」"

[[dialogue]]
speaker = "unk"
# ガーディアンが街を暴れ回る光景がＤＩＳＣに映し出される。
line = "ガーディアンが街を暴れ回る光景がＤＩＳＣに映し出される。"

[[dialogue]]
speaker = "unk"
# 間違いない。以前チナが率いていた、極星従騎と呼ばれるものだ。
line = "間違いない。以前チナが率いていた、極星従騎と呼ばれるものだ。"

[[dialogue]]
speaker = "クロト"
# 「新星星徒会、出動だ！　チナを止めて──そしてデネブに渡る手段を聞き出そう！」
line = "「新星星徒会、出動だ！　チナを止めて──そしてデネブに渡る手段を聞き出そう！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええ、今度はあのちみっ子をふん捕まえてやるわ！」
line = "「ええ、今度はあのちみっ子をふん捕まえてやるわ！」"
