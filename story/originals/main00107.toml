[[dialogue]]
speaker = "unk"
# 第８話,多忙な転入生活,B
line = "第８話,多忙な転入生活,B"

[[dialogue]]
speaker = "unk"
# 転入３日目──
line = "転入３日目──"

[[dialogue]]
speaker = "unk"
# その日以降、恐ろしく多忙な日々が始まった。
line = "その日以降、恐ろしく多忙な日々が始まった。"

[[dialogue]]
speaker = "トワ先生"
# 「はーい。いいですかみなさーん、前回の続き４３ページを開いてくださーい。星体力学において星力とは……」
line = "「はーい。いいですかみなさーん、前回の続き４３ページを開いてくださーい。星体力学において星力とは……」"

[[dialogue]]
speaker = "クラスの女子Ａ"
# 「トワちゃん先生、間違えてまーす。前回は３２ページまでしか進んでませーん」
line = "「トワちゃん先生、間違えてまーす。前回は３２ページまでしか進んでませーん」"

[[dialogue]]
speaker = "トワ先生"
# 「え？　あ、ほんとだ。あはは、みんなごめーん」
line = "「え？　あ、ほんとだ。あはは、みんなごめーん」"

[[dialogue]]
speaker = "クロト"
# 「（この授業は……）」
line = "「（この授業は……）」"

[[dialogue]]
speaker = "unk"
# 慣れない授業に必死で追いつく。
line = "慣れない授業に必死で追いつく。"

[[dialogue]]
speaker = "unk"
# 編入試験を突破したのでやや油断していたが、新星学園は通常カリキュラムまで先進的なものだった。
line = "編入試験を突破したのでやや油断していたが、新星学園は通常カリキュラムまで先進的なものだった。"

[[dialogue]]
speaker = "unk"
# 加えてこの『星体力学』は本学園特有の科目で、一から学ばなければならないため勉強も容易ではなかった。
line = "加えてこの『星体力学』は本学園特有の科目で、一から学ばなければならないため勉強も容易ではなかった。"

[[dialogue]]
speaker = "クラスの女子Ａ"
# 「ねえねえ、緋宮くん！　緋宮くんって星徒会に入ったの？」
line = "「ねえねえ、緋宮くん！　緋宮くんって星徒会に入ったの？」"

[[dialogue]]
speaker = "クロト"
# 「いや……入会はしていない」
line = "「いや……入会はしていない」"

[[dialogue]]
speaker = "クラスの女子Ａ"
# 「なのに会長に勝負申し込んだの？　スゴッ」
line = "「なのに会長に勝負申し込んだの？　スゴッ」"

[[dialogue]]
speaker = "クロト"
# 「俺が望んだわけではないが、成り行き上」
line = "「俺が望んだわけではないが、成り行き上」"

[[dialogue]]
speaker = "クラスの女子Ｂ"
# 「昨日、めっちゃ意味深に呼び出されてたもんね……！　でもこんなことになるなんて思わなかったけど……！」
line = "「昨日、めっちゃ意味深に呼び出されてたもんね……！　でもこんなことになるなんて思わなかったけど……！」"

[[dialogue]]
speaker = "クラスの女子Ａ"
# 「こんなの前代未聞だよ！　どうなるかわかんないけど、応援してるね！」
line = "「こんなの前代未聞だよ！　どうなるかわかんないけど、応援してるね！」"

[[dialogue]]
speaker = "unk"
# 休み時間には、クラスメイトとの交流もはかる。
line = "休み時間には、クラスメイトとの交流もはかる。"

[[dialogue]]
speaker = "unk"
# 本来なら徐々に馴染んでいくはずの過程は、すっかり件の御前試合によって異例なものとなってしまった。
line = "本来なら徐々に馴染んでいくはずの過程は、すっかり件の御前試合によって異例なものとなってしまった。"

[[dialogue]]
speaker = "マトイ"
# 「あっちがアリーナ。こっちが教室棟で、授業の時はここを通っていくと早いわ」
line = "「あっちがアリーナ。こっちが教室棟で、授業の時はここを通っていくと早いわ」"

[[dialogue]]
speaker = "クロト"
# 「ふむふむ……しかし、とんでもない広さだな」
line = "「ふむふむ……しかし、とんでもない広さだな」"

[[dialogue]]
speaker = "unk"
# わずかな隙間時間を使って、広大な学園の敷地を覚える……。
line = "わずかな隙間時間を使って、広大な学園の敷地を覚える……。"

[[dialogue]]
speaker = "クロト"
# 「あの建物は？」
line = "「あの建物は？」"

[[dialogue]]
speaker = "マトイ"
# 「流星学園付属校の校舎。間違えて入らないよう気をつけてね」
line = "「流星学園付属校の校舎。間違えて入らないよう気をつけてね」"

[[dialogue]]
speaker = "マトイ"
# 「向こうへ行くと大聖堂があるけど……ちょっと遠いから、今度紹介するわね」
line = "「向こうへ行くと大聖堂があるけど……ちょっと遠いから、今度紹介するわね」"

[[dialogue]]
speaker = "クロト"
# 「わかった」
line = "「わかった」"

[[dialogue]]
speaker = "unk"
# そして……
line = "そして……"

[[dialogue]]
speaker = "アナ"
# 「今日の特訓をはじめましょ～」
line = "「今日の特訓をはじめましょ～」"

[[dialogue]]
speaker = "unk"
# ──放課後は修業。
line = "──放課後は修業。"

[[dialogue]]
speaker = "unk"
# まさに、ぎちぎちのスケジュールというやつだった。
line = "まさに、ぎちぎちのスケジュールというやつだった。"

[[dialogue]]
speaker = "マトイ"
# 「その……大丈夫？　緋宮くん。疲れてそうだけど」
line = "「その……大丈夫？　緋宮くん。疲れてそうだけど」"

[[dialogue]]
speaker = "クロト"
# 「いや……問題ない。体を動かしたわけじゃないからな」
line = "「いや……問題ない。体を動かしたわけじゃないからな」"

[[dialogue]]
speaker = "unk"
# 疲労があるとすれば、むしろ転入に伴う精神的なあれこれによるもの。直に慣れるだろう。
line = "疲労があるとすれば、むしろ転入に伴う精神的なあれこれによるもの。直に慣れるだろう。"

[[dialogue]]
speaker = "unk"
# それよりもヴィーナスとの御前試合に備えなければ元も子もない。
line = "それよりもヴィーナスとの御前試合に備えなければ元も子もない。"

[[dialogue]]
speaker = "マトイ"
# 「今日はＢランクのモンスターを出してみるね。これ相手に１分が切れたら、Ａランクへの挑戦許可が降りるから」
line = "「今日はＢランクのモンスターを出してみるね。これ相手に１分が切れたら、Ａランクへの挑戦許可が降りるから」"

[[dialogue]]
speaker = "クロト"
# 「格上相手に１分か……厳しそうだが、やってみよう」
line = "「格上相手に１分か……厳しそうだが、やってみよう」"

[[dialogue]]
speaker = "アナ"
# 「今日は私たちも参加する。と言っても、あくまでサポートに徹するけど」
line = "「今日は私たちも参加する。と言っても、あくまでサポートに徹するけど」"

[[dialogue]]
speaker = "マトイ"
# 「そだね。最終的にはソロで１分を切るために……まずは私たちの援護込みでやってみよ」
line = "「そだね。最終的にはソロで１分を切るために……まずは私たちの援護込みでやってみよ」"

[[dialogue]]
speaker = "クロト"
# 「アナも……マトイもか。それは助かる」
line = "「アナも……マトイもか。それは助かる」"

[[dialogue]]
speaker = "アナ"
# 「変身──」
line = "「変身──」"
