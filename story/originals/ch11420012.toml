[[dialogue]]
speaker = "unk"
# 第２話,ステラの悩み,P
line = "第２話,ステラの悩み,P"

[[dialogue]]
speaker = "unk"
# 赤ちゃんクマロボの引き起こした事件が解決してから、数日が過ぎた。
line = "赤ちゃんクマロボの引き起こした事件が解決してから、数日が過ぎた。"

[[dialogue]]
speaker = "unk"
# ステラとラファエロは事件後からしばらく、俺たちの世界で過ごすことになったのだが──
line = "ステラとラファエロは事件後からしばらく、俺たちの世界で過ごすことになったのだが──"

[[dialogue]]
speaker = "ステラ"
# 「うう……困りました。どうすればいいんでしょう……」
line = "「うう……困りました。どうすればいいんでしょう……」"

[[dialogue]]
speaker = "ラファエロ"
# 「おや、頭を抱えているようだけど、何かあったのかい？」
line = "「おや、頭を抱えているようだけど、何かあったのかい？」"

[[dialogue]]
speaker = "ルリエル"
# 「悩み事があるなら、何でもルリエルに相談してください♪」
line = "「悩み事があるなら、何でもルリエルに相談してください♪」"

[[dialogue]]
speaker = "ステラ"
# 「ありがとうございます、実は深刻な問題が発生してしまいまして……」
line = "「ありがとうございます、実は深刻な問題が発生してしまいまして……」"

[[dialogue]]
speaker = "ラファエロ"
# 「深刻な問題？」
line = "「深刻な問題？」"

[[dialogue]]
speaker = "ステラ"
# 「はい……」
line = "「はい……」"

[[dialogue]]
speaker = "ステラ"
# 「赤ちゃんクマロボさんの事件が他の世界でも完全に収束するまで、ボクたちは引き続きこの世界で過ごすことになったじゃないですか」
line = "「赤ちゃんクマロボさんの事件が他の世界でも完全に収束するまで、ボクたちは引き続きこの世界で過ごすことになったじゃないですか」"

[[dialogue]]
speaker = "ラファエロ"
# 「ああ、そうだね」
line = "「ああ、そうだね」"

[[dialogue]]
speaker = "ステラ"
# 「ボクはそのまま、この星徒会室を間借りさせてもらっているんですけど……困ったことが起きた、いえ起きてるんです！」
line = "「ボクはそのまま、この星徒会室を間借りさせてもらっているんですけど……困ったことが起きた、いえ起きてるんです！」"

[[dialogue]]
speaker = "unk"
# 困った事って？
line = "困った事って？"

[[dialogue]]
speaker = "ステラ"
# 「こちらの世界に来てしばらくの間、この部屋はあまり人が訪ねて来ませんでした……」
line = "「こちらの世界に来てしばらくの間、この部屋はあまり人が訪ねて来ませんでした……」"

[[dialogue]]
speaker = "ステラ"
# 「けれど最近になって、徐々に増えて来たんです……来客の方が！」
line = "「けれど最近になって、徐々に増えて来たんです……来客の方が！」"

[[dialogue]]
speaker = "unk"
# あまり仕事が無かったから
line = "あまり仕事が無かったから"

[[dialogue]]
speaker = "unk"
# 偶然あの時期は
line = "偶然あの時期は"

[[dialogue]]
speaker = "unk"
# 星徒会メンバーが諸々の事情で学園を休んでおり、この星徒会室に来ていたのが俺だけだった。
line = "星徒会メンバーが諸々の事情で学園を休んでおり、この星徒会室に来ていたのが俺だけだった。"

[[dialogue]]
speaker = "unk"
# さらに、欠席を見越したみんなが前倒しで仕事を片付けてくれていた。
line = "さらに、欠席を見越したみんなが前倒しで仕事を片付けてくれていた。"

[[dialogue]]
speaker = "unk"
# その影響で赤ちゃんクマロボの事件が起きた時期は星徒会の仕事が少なく、星徒会室を訪ねてくる人も減っていたのだ。
line = "その影響で赤ちゃんクマロボの事件が起きた時期は星徒会の仕事が少なく、星徒会室を訪ねてくる人も減っていたのだ。"

[[dialogue]]
speaker = "ステラ"
# 「どこか安住の地を探したいのですが……なかなか良い場所が見つからなくて」
line = "「どこか安住の地を探したいのですが……なかなか良い場所が見つからなくて」"

[[dialogue]]
speaker = "ラファエロ"
# 「流星寮に貸してもらっている、自分の部屋ではダメなのかい？」
line = "「流星寮に貸してもらっている、自分の部屋ではダメなのかい？」"

[[dialogue]]
speaker = "ラファエロ"
# 「確かに多くの寮生が暮らしているけれど、自分の部屋に引きこもっている分には誰とも顔を合わせずに済むじゃないか」
line = "「確かに多くの寮生が暮らしているけれど、自分の部屋に引きこもっている分には誰とも顔を合わせずに済むじゃないか」"

[[dialogue]]
speaker = "ステラ"
# 「そ、それはそうなんですけど……」
line = "「そ、それはそうなんですけど……」"

[[dialogue]]
speaker = "ステラ"
# 「流星寮には門限がありますよね？　夜の外出が難しいじゃないですか。ボクは夜中に食料を調達しに行くから、それはちょっと困るんです」
line = "「流星寮には門限がありますよね？　夜の外出が難しいじゃないですか。ボクは夜中に食料を調達しに行くから、それはちょっと困るんです」"

[[dialogue]]
speaker = "ステラ"
# 「それに流星寮に住んじゃうと、星徒会室まで来るのが大変ですし……」
line = "「それに流星寮に住んじゃうと、星徒会室まで来るのが大変ですし……」"

[[dialogue]]
speaker = "ルリエル"
# 「ん？　ですが赤ちゃんクマロボさんの事件も解決したので、星徒会室に来る用事もなくなったんじゃないでしょうか？」
line = "「ん？　ですが赤ちゃんクマロボさんの事件も解決したので、星徒会室に来る用事もなくなったんじゃないでしょうか？」"

[[dialogue]]
speaker = "ステラ"
# 「そ、それは……そうなんですけど……」
line = "「そ、それは……そうなんですけど……」"

[[dialogue]]
speaker = "ラファエロ"
# 「ふふっ。なるほど、なるほど」
line = "「ふふっ。なるほど、なるほど」"

[[dialogue]]
speaker = "ラファエロ"
# 「引きこもり生活はしたいけれど、星徒会室に来ないとぼくたちに会えないから寂しい、といったところかな？」
line = "「引きこもり生活はしたいけれど、星徒会室に来ないとぼくたちに会えないから寂しい、といったところかな？」"

[[dialogue]]
speaker = "ステラ"
# 「あうぅ……！」
line = "「あうぅ……！」"

[[dialogue]]
speaker = "unk"
# ステラがそんな風に思ってくれているのは、俺としても嬉しいことだった。
line = "ステラがそんな風に思ってくれているのは、俺としても嬉しいことだった。"

[[dialogue]]
speaker = "ラファエロ"
# 「ぼくに会えないのが寂しい、というだけなら、いつでもきみの部屋へ遊びに行ってあげるのだけどね」
line = "「ぼくに会えないのが寂しい、というだけなら、いつでもきみの部屋へ遊びに行ってあげるのだけどね」"

[[dialogue]]
speaker = "ルリエル"
# 「ルリエルも寮生なので大丈夫ですが……会長さんはそういうわけにはいきませんね～」
line = "「ルリエルも寮生なので大丈夫ですが……会長さんはそういうわけにはいきませんね～」"

[[dialogue]]
speaker = "unk"
# 無理じゃないとは思うけど
line = "無理じゃないとは思うけど"

[[dialogue]]
speaker = "unk"
# 頼み込めばなんとか……
line = "頼み込めばなんとか……"

[[dialogue]]
speaker = "unk"
# あまり外聞のよい行動ではないことは確かだが……。
line = "あまり外聞のよい行動ではないことは確かだが……。"

[[dialogue]]
speaker = "ステラ"
# 「うーん、でも……そうですね……」
line = "「うーん、でも……そうですね……」"

[[dialogue]]
speaker = "ステラ"
# 「ここに住まわせてもらっていたのはボクの我がままですから……」
line = "「ここに住まわせてもらっていたのはボクの我がままですから……」"

[[dialogue]]
speaker = "ステラ"
# 「会長さんたちにもご迷惑かけてることですし、今日から流星寮のお部屋の方で生活しようと思います」
line = "「会長さんたちにもご迷惑かけてることですし、今日から流星寮のお部屋の方で生活しようと思います」"

[[dialogue]]
speaker = "unk"
# ステラ的にはそれでいいの？
line = "ステラ的にはそれでいいの？"

[[dialogue]]
speaker = "ステラ"
# 「はい、大変お世話になりましたっ」
line = "「はい、大変お世話になりましたっ」"

[[dialogue]]
speaker = "ルリエル"
# 「ん～～～」
line = "「ん～～～」"

[[dialogue]]
speaker = "unk"
# どうしたんだ、ルリエル？
line = "どうしたんだ、ルリエル？"

[[dialogue]]
speaker = "unk"
# ん……？
line = "ん……？"

[[dialogue]]
speaker = "ルリエル"
# 「はっ！　そうです、これしかありません！」
line = "「はっ！　そうです、これしかありません！」"

[[dialogue]]
speaker = "ステラ"
# 「えっ？　ど、どうしたんですか……？」
line = "「えっ？　ど、どうしたんですか……？」"

[[dialogue]]
speaker = "ルリエル"
# 「ステラさん的には星徒会室にやってくる人の視線が気になる、ということなんですよね？」
line = "「ステラさん的には星徒会室にやってくる人の視線が気になる、ということなんですよね？」"

[[dialogue]]
speaker = "ルリエル"
# 「でしたらルリエルにお任せください！　妙案を思いつきました♪」
line = "「でしたらルリエルにお任せください！　妙案を思いつきました♪」"

[[dialogue]]
speaker = "ステラ"
# 「ほ、本当ですか？」
line = "「ほ、本当ですか？」"

[[dialogue]]
speaker = "ルリエル"
# 「ふふふ、楽しみにしていてくださいね♪」
line = "「ふふふ、楽しみにしていてくださいね♪」"

[[dialogue]]
speaker = "ラファエロ"
# 「会長……彼女、何やらよからぬことを考えているみたいだけど大丈夫かい？」
line = "「会長……彼女、何やらよからぬことを考えているみたいだけど大丈夫かい？」"

[[dialogue]]
speaker = "unk"
# ど、どうだろう……
line = "ど、どうだろう……"

[[dialogue]]
speaker = "unk"
# ルリエルの計画──それは程なく現実のものとなる。
line = "ルリエルの計画──それは程なく現実のものとなる。"

[[dialogue]]
speaker = "unk"
# 新星星徒会室に設置された謎のテントの噂は、あっという間に学園内に広がった。
line = "新星星徒会室に設置された謎のテントの噂は、あっという間に学園内に広がった。"

[[dialogue]]
speaker = "unk"
# かえって注目を浴びることになってしまうような気もするのだが、当のステラはこのテントを非常に喜んでいるようである。
line = "かえって注目を浴びることになってしまうような気もするのだが、当のステラはこのテントを非常に喜んでいるようである。"

[[dialogue]]
speaker = "unk"
# ……まあ、確かに他人の視線を遮るには十分な設備だし、本人が満足しているならよかった……のかな？
line = "……まあ、確かに他人の視線を遮るには十分な設備だし、本人が満足しているならよかった……のかな？"
