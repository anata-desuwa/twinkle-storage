[[dialogue]]
speaker = "リップル"
# 「あっ──選挙管理委員会の皆さ～ん！」
line = "「あっ──選挙管理委員会の皆さ～ん！」"

[[dialogue]]
speaker = "リップル"
# 「お疲れ様でーす！　クリアおめでとうゴザイまーす！」
line = "「お疲れ様でーす！　クリアおめでとうゴザイまーす！」"

[[dialogue]]
speaker = "梨緒"
# 「紙一重も紙一重、薄氷の勝利だったがな……」
line = "「紙一重も紙一重、薄氷の勝利だったがな……」"

[[dialogue]]
speaker = "ナターシャ"
# 「もう一度戦ったら負ける自信があるよ……。明日は久しぶりに筋肉痛になりそう……」
line = "「もう一度戦ったら負ける自信があるよ……。明日は久しぶりに筋肉痛になりそう……」"

[[dialogue]]
speaker = "ベアトリス"
# 「わわ、ナターシャちゃん、もたれかからないでぇ……。私もヘトヘトなんだからぁ……」
line = "「わわ、ナターシャちゃん、もたれかからないでぇ……。私もヘトヘトなんだからぁ……」"

[[dialogue]]
speaker = "アポロ"
# 「３人揃ってあたしに倒れてくんなっ……！　重い、潰れる～……！」
line = "「３人揃ってあたしに倒れてくんなっ……！　重い、潰れる～……！」"

[[dialogue]]
speaker = "リップル"
# 「アハハ、チョットやりすぎだったかもしれまセンねー……」
line = "「アハハ、チョットやりすぎだったかもしれまセンねー……」"

[[dialogue]]
speaker = "リップル"
# 「でも、ドウでしたか？　楽しかったデスか？」
line = "「でも、ドウでしたか？　楽しかったデスか？」"

[[dialogue]]
speaker = "梨緒"
# 「それは……」
line = "「それは……」"

[[dialogue]]
speaker = "梨緒"
# 「ふふ、もちろんだ。大いに楽しませてもらった」
line = "「ふふ、もちろんだ。大いに楽しませてもらった」"

[[dialogue]]
speaker = "アポロ"
# 「ヤバかったけど、すっげー盛り上がったぞ！」
line = "「ヤバかったけど、すっげー盛り上がったぞ！」"

[[dialogue]]
speaker = "ベアトリス"
# 「おかげで良い思い出になったよ！」
line = "「おかげで良い思い出になったよ！」"

[[dialogue]]
speaker = "ナターシャ"
# 「まぁ終わってみると悪くはなかったかな。虫以外は」
line = "「まぁ終わってみると悪くはなかったかな。虫以外は」"

[[dialogue]]
speaker = "リップル"
# 「ならよかったデス！　ささ、どうぞくつろいでください！　オイシイお料理も、ご用意してま～す！」
line = "「ならよかったデス！　ささ、どうぞくつろいでください！　オイシイお料理も、ご用意してま～す！」"

[[dialogue]]
speaker = "ベアトリス"
# 「わぁ……！　浜焼きだぁ……！　焼きそばもある……！　たこ焼きも、かき氷も……！！」
line = "「わぁ……！　浜焼きだぁ……！　焼きそばもある……！　たこ焼きも、かき氷も……！！」"

[[dialogue]]
speaker = "アポロ"
# 「『新モードクリア者サマへ』って書いてあるぞ！　なんか気分いいなー！」
line = "「『新モードクリア者サマへ』って書いてあるぞ！　なんか気分いいなー！」"

[[dialogue]]
speaker = "ナターシャ"
# 「ＤＩＳＣに保存しておいた方がいいんじゃない？　みんなで記念撮影でもする？」
line = "「ＤＩＳＣに保存しておいた方がいいんじゃない？　みんなで記念撮影でもする？」"

[[dialogue]]
speaker = "梨緒"
# 「しよう！　撮りまくろう！　新星星徒会に私たちの勝利を送りつけてやるんだ！」
line = "「しよう！　撮りまくろう！　新星星徒会に私たちの勝利を送りつけてやるんだ！」"

[[dialogue]]
speaker = "リップル"
# 「お写真ならワタシが撮りますヨ～！　ドゾドゾ、並んでクダさ～い！」
line = "「お写真ならワタシが撮りますヨ～！　ドゾドゾ、並んでクダさ～い！」"

[[dialogue]]
speaker = "リップル"
# 「はい、チーズ、デス～！」
line = "「はい、チーズ、デス～！」"

[[dialogue]]
speaker = "ナターシャ"
# 「いい感じで撮れたんじゃない。こういうの新鮮かも」
line = "「いい感じで撮れたんじゃない。こういうの新鮮かも」"

[[dialogue]]
speaker = "ベアトリス"
# 「写真立てを買いに行かないとね。うんと可愛いやつ！」
line = "「写真立てを買いに行かないとね。うんと可愛いやつ！」"

[[dialogue]]
speaker = "アポロ"
# 「にしても、梨緒の顔、にやけてんなー。ゆるっゆるだぜ」
line = "「にしても、梨緒の顔、にやけてんなー。ゆるっゆるだぜ」"

[[dialogue]]
speaker = "梨緒"
# 「ふふ、どうにも嬉しすぎてな。こうして一番を取ったのはいつぶりだろうか」
line = "「ふふ、どうにも嬉しすぎてな。こうして一番を取ったのはいつぶりだろうか」"

[[dialogue]]
speaker = "リップル"
# 「一番……デスか？」
line = "「一番……デスか？」"

[[dialogue]]
speaker = "梨緒"
# 「ああ。私たちが新モードのクリア者第一号だろう？　ふふふ、一号、一番、なんていい響きなんだ」
line = "「ああ。私たちが新モードのクリア者第一号だろう？　ふふふ、一号、一番、なんていい響きなんだ」"

[[dialogue]]
speaker = "梨緒"
# 「そうだ、ジグにも写真を送ってやろう。あいつも素直に私たちと参加していれば、この感動を分かち合えたのに♪」
line = "「そうだ、ジグにも写真を送ってやろう。あいつも素直に私たちと参加していれば、この感動を分かち合えたのに♪」"

[[dialogue]]
speaker = "リップル"
# 「いえ、一番は──」
line = "「いえ、一番は──」"

[[dialogue]]
speaker = "ジグ"
# 「やぁ、遅かったね」
line = "「やぁ、遅かったね」"

[[dialogue]]
speaker = "梨緒"
# 「ジグ！？　どうしてここに！？」
line = "「ジグ！？　どうしてここに！？」"

[[dialogue]]
speaker = "梨緒"
# 「それに、遅かった……だと？　一体どういう意味だ！？」
line = "「それに、遅かった……だと？　一体どういう意味だ！？」"

[[dialogue]]
speaker = "リップル"
# 「新モードのクリア者第一号はジグなんデスよ～」
line = "「新モードのクリア者第一号はジグなんデスよ～」"

[[dialogue]]
speaker = "リップル"
# 「別のリゾート結界でテストに参加してくれて、１日でソロクリアしてくれマシた」
line = "「別のリゾート結界でテストに参加してくれて、１日でソロクリアしてくれマシた」"

[[dialogue]]
speaker = "梨緒"
# 「１日で！？　ソロクリア！？」
line = "「１日で！？　ソロクリア！？」"

[[dialogue]]
speaker = "ジグ"
# 「昨日、アガサに話を聞いて興味が出てね。リハビリに丁度いいかもと参加してみたんだ」
line = "「昨日、アガサに話を聞いて興味が出てね。リハビリに丁度いいかもと参加してみたんだ」"

[[dialogue]]
speaker = "梨緒"
# 「１人で倒したのか！？　あのボスモンスターも！？」
line = "「１人で倒したのか！？　あのボスモンスターも！？」"

[[dialogue]]
speaker = "ジグ"
# 「だからそう言ってるじゃないか。昼過ぎには終わったよ」
line = "「だからそう言ってるじゃないか。昼過ぎには終わったよ」"

[[dialogue]]
speaker = "ベアトリス"
# 「昨日の昼過ぎって……」
line = "「昨日の昼過ぎって……」"

[[dialogue]]
speaker = "ナターシャ"
# 「私たちが命からがら偽ボスから逃げ出してた頃じゃない？」
line = "「私たちが命からがら偽ボスから逃げ出してた頃じゃない？」"

[[dialogue]]
speaker = "アポロ"
# 「うおおっ、そんな頃にジグはクリアしてたってのか！」
line = "「うおおっ、そんな頃にジグはクリアしてたってのか！」"

[[dialogue]]
speaker = "ジグ"
# 「私がいなくて正解だったろう？　簡単になりすぎてアガサたちもつまらなかっただろうから」
line = "「私がいなくて正解だったろう？　簡単になりすぎてアガサたちもつまらなかっただろうから」"

[[dialogue]]
speaker = "梨緒"
# 「ぐぬっ、ぐぬぬぬっ……！！」
line = "「ぐぬっ、ぐぬぬぬっ……！！」"

[[dialogue]]
speaker = "梨緒"
# 「リップル、相談がある……！」
line = "「リップル、相談がある……！」"

[[dialogue]]
speaker = "リップル"
# 「ハイ？　ソーダンですか？」
line = "「ハイ？　ソーダンですか？」"

[[dialogue]]
speaker = "ナターシャ"
# 「ちょっと梨緒、また負けず嫌い拗らせてないよねっ？」
line = "「ちょっと梨緒、また負けず嫌い拗らせてないよねっ？」"

[[dialogue]]
speaker = "ベアトリス"
# 「私たちはよく頑張ったよ！　こうしてクリアできたんだから！」
line = "「私たちはよく頑張ったよ！　こうしてクリアできたんだから！」"

[[dialogue]]
speaker = "アポロ"
# 「そうだぜ、おいっ。超強化されたボスも倒したじゃねーか！」
line = "「そうだぜ、おいっ。超強化されたボスも倒したじゃねーか！」"

[[dialogue]]
speaker = "梨緒"
# 「いいや、私たちの力はこんなものじゃないはずだ！　思えば、私たちは遊びすぎていた……！」
line = "「いいや、私たちの力はこんなものじゃないはずだ！　思えば、私たちは遊びすぎていた……！」"

[[dialogue]]
speaker = "梨緒"
# 「ジグに遅れを取る私たちじゃないっ！　難易度を上げてくれ、リップル！　私たちはそれを半日でクリアしてみせるっ！！」
line = "「ジグに遅れを取る私たちじゃないっ！　難易度を上げてくれ、リップル！　私たちはそれを半日でクリアしてみせるっ！！」"

[[dialogue]]
speaker = "３人"
# 「え～～～っ！！？」
line = "「え～～～っ！！？」"
