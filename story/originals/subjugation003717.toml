[[dialogue]]
speaker = "unk"
# 第１７話,愛おしい世界の形（後編）,B
line = "第１７話,愛おしい世界の形（後編）,B"

[[dialogue]]
speaker = "クロト"
# 「みんな今頃、ちゃんと話せてるかな……」
line = "「みんな今頃、ちゃんと話せてるかな……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「大丈夫よ！　きっと感動の再会になってるはずだわ！」
line = "「大丈夫よ！　きっと感動の再会になってるはずだわ！」"

[[dialogue]]
speaker = "アナ"
# 「積もる話もあるでしょうし、グレイスさんたちが戻ってくるまでおくつろぎください。お茶のおかわり、いかがです？」
line = "「積もる話もあるでしょうし、グレイスさんたちが戻ってくるまでおくつろぎください。お茶のおかわり、いかがです？」"

[[dialogue]]
speaker = "ベアトリス"
# 「ありがとう、アナちゃん！　いただきますっ♪」
line = "「ありがとう、アナちゃん！　いただきますっ♪」"

[[dialogue]]
speaker = "レティシア"
# 「ん……和菓子に緑茶もたまにはいいものね。極星ではだいたい洋菓子に紅茶だから、新鮮だわ」
line = "「ん……和菓子に緑茶もたまにはいいものね。極星ではだいたい洋菓子に紅茶だから、新鮮だわ」"

[[dialogue]]
speaker = "アナ"
# 「ふっふっふっ。そうでしょう、そうでしょう。極星学園の皆さんのために、流星市国中を駆け回ってチョイスしてきた逸品です」
line = "「ふっふっふっ。そうでしょう、そうでしょう。極星学園の皆さんのために、流星市国中を駆け回ってチョイスしてきた逸品です」"

[[dialogue]]
speaker = "アナ"
# 「むふー。これを機に、和菓子党員の拡充を狙う算段です」
line = "「むふー。これを機に、和菓子党員の拡充を狙う算段です」"

[[dialogue]]
speaker = "サーシャ"
# 「あらあら～♪」
line = "「あらあら～♪」"

[[dialogue]]
speaker = "マトイ"
# 「和菓子党員の拡充って何！？」
line = "「和菓子党員の拡充って何！？」"

[[dialogue]]
speaker = "アナ"
# 「愚問ですね。ベアトリスさんたちが和菓子への審美眼を身に着ければ、次に我々がデネブを訪問する際、レアな和菓子にあたる確率が上昇します」
line = "「愚問ですね。ベアトリスさんたちが和菓子への審美眼を身に着ければ、次に我々がデネブを訪問する際、レアな和菓子にあたる確率が上昇します」"

[[dialogue]]
speaker = "アナ"
# 「きっと素晴らしい平行世界の旅行となるはず……じゅるり」
line = "「きっと素晴らしい平行世界の旅行となるはず……じゅるり」"

[[dialogue]]
speaker = "マトイ"
# 「意外と考えられてる……！？」
line = "「意外と考えられてる……！？」"

[[dialogue]]
speaker = "レティシア"
# 「ふふ。わかったわ。あなた達が遊びに来たときは、とびっきりの和菓子でおもてなししてあげる」
line = "「ふふ。わかったわ。あなた達が遊びに来たときは、とびっきりの和菓子でおもてなししてあげる」"

[[dialogue]]
speaker = "ベアトリス"
# 「任せて！　デネブは１０年も未来だから──もしかしたらこっちにはないスペシャルな和菓子があるかも！」
line = "「任せて！　デネブは１０年も未来だから──もしかしたらこっちにはないスペシャルな和菓子があるかも！」"

[[dialogue]]
speaker = "アナ"
# 「素晴らしい。祝勝会が終わったら早速、デネブ来訪のスケジュールを立てましょう、会長」
line = "「素晴らしい。祝勝会が終わったら早速、デネブ来訪のスケジュールを立てましょう、会長」"

[[dialogue]]
speaker = "サーシャ"
# 「うふふ。アナちゃん、楽しみが増えたわね～♪」
line = "「うふふ。アナちゃん、楽しみが増えたわね～♪」"

[[dialogue]]
speaker = "レティシア"
# 「その代わり、<b>滞在中にモンスターが現れたら</b>。その時はあなた達にも出動してもらうわよ。セレスティアを忘れないようにね？」
line = "「その代わり、<b>滞在中にモンスターが現れたら</b>。その時はあなた達にも出動してもらうわよ。セレスティアを忘れないようにね？」"

[[dialogue]]
speaker = "クロト"
# 「ああ、もちろんだ」
line = "「ああ、もちろんだ」"

[[dialogue]]
speaker = "unk"
# 創造神『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』は確かにこの世から消滅した。<ruby=か>彼</ruby>の神が生み出していた『リクリエの使徒』という忌むべきシステムはもうこの世にはない。
line = "創造神『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』は確かにこの世から消滅した。<ruby>彼<rt>か</rt></ruby>の神が生み出していた『リクリエの使徒』という忌むべきシステムはもうこの世にはない。"

[[dialogue]]
speaker = "ヴィーナス"
# 「全部いっぺんにぶわーって消えちゃったらいいのに！　まだモンスターもアステラも、たまに出てきちゃうのよね」
line = "「全部いっぺんにぶわーって消えちゃったらいいのに！　まだモンスターもアステラも、たまに出てきちゃうのよね」"

[[dialogue]]
speaker = "ベアトリス"
# 「やっぱり、アルタイルでもそうなんだ……？」
line = "「やっぱり、アルタイルでもそうなんだ……？」"

[[dialogue]]
speaker = "アナ"
# 「はい。アステラの発生、モンスターの出現……それらはおそらく、この世界の仕組みに深く根を張り──」
line = "「はい。アステラの発生、モンスターの出現……それらはおそらく、この世界の仕組みに深く根を張り──」"

[[dialogue]]
speaker = "アナ"
# 「『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』の存在とはまったく関係なく、それ単体で稼働してしまっているようです」
line = "「『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』の存在とはまったく関係なく、それ単体で稼働してしまっているようです」"

[[dialogue]]
speaker = "マトイ"
# 「雨が降ったり、雷が鳴ったり──そういう自然現象と同じ感じ……なのかなぁ？」
line = "「雨が降ったり、雷が鳴ったり──そういう自然現象と同じ感じ……なのかなぁ？」"

[[dialogue]]
speaker = "クロト"
# 「ああ。だから『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』がいなくなった今も、俺たち星騎士の役目はなくならない」
line = "「ああ。だから『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』がいなくなった今も、俺たち星騎士の役目はなくならない」"

[[dialogue]]
speaker = "レティシア"
# 「そうね。これからも変わらず、世界を守っていかなくちゃならない……望むところだわ」
line = "「そうね。これからも変わらず、世界を守っていかなくちゃならない……望むところだわ」"

[[dialogue]]
speaker = "アナ"
# 「けれどモンスターの出現総数自体は、大幅に目減りしたことも事実です」
line = "「けれどモンスターの出現総数自体は、大幅に目減りしたことも事実です」"

[[dialogue]]
speaker = "アナ"
# 「今、世界は──平和そのもの。そう言ってよいでしょう」
line = "「今、世界は──平和そのもの。そう言ってよいでしょう」"

[[dialogue]]
speaker = "クロト"
# 「あ──平行世界門の着信だな」
line = "「あ──平行世界門の着信だな」"

[[dialogue]]
speaker = "ルヴィネ"
# 『魔王、こちらの準備は終わったわ。そろそろ私もアルタイルに向かうわね』
line = "『魔王、こちらの準備は終わったわ。そろそろ私もアルタイルに向かうわね』"

[[dialogue]]
speaker = "クロト"
# 「ああ。そのままくぐってきてくれ。歓迎するよ」
line = "「ああ。そのままくぐってきてくれ。歓迎するよ」"

[[dialogue]]
speaker = "ルヴィネ"
# 『ありがとう──』
line = "『ありがとう──』"

[[dialogue]]
speaker = "unk"
# 平行世界門が開き、辺りが輝きに満たされ──
line = "平行世界門が開き、辺りが輝きに満たされ──"

[[dialogue]]
speaker = "ルヴィネ"
# 「──ん。平行世界の移動は、問題なさそうね」
line = "「──ん。平行世界の移動は、問題なさそうね」"

[[dialogue]]
speaker = "ベアトリス"
# 「ルヴィ！　待ってたよ！」
line = "「ルヴィ！　待ってたよ！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「ええ──あら、レティシアも随分とくつろいでいるわね」
line = "「ええ──あら、レティシアも随分とくつろいでいるわね」"

[[dialogue]]
speaker = "レティシア"
# 「おもてなしを無碍にするのは失礼だもの」
line = "「おもてなしを無碍にするのは失礼だもの」"

[[dialogue]]
speaker = "サーシャ"
# 「うふふ。ちょっと前までのレティシアちゃんと大違いね～。お姉ちゃん、嬉しい♪」
line = "「うふふ。ちょっと前までのレティシアちゃんと大違いね～。お姉ちゃん、嬉しい♪」"

[[dialogue]]
speaker = "レティシア"
# 「……はぁ。サーシャのこういうからかいだけはやめて欲しいわ」
line = "「……はぁ。サーシャのこういうからかいだけはやめて欲しいわ」"

[[dialogue]]
speaker = "レティシア"
# 「それでルヴィ、<b>アルタイルの私</b>はどうだった？　迷惑をかけてなければいいのだけれど」
line = "「それでルヴィ、<b>アルタイルの私</b>はどうだった？　迷惑をかけてなければいいのだけれど」"

[[dialogue]]
speaker = "ルヴィネ"
# 「まさか。グレイス以外は手がかからない、とってもいい子よ」
line = "「まさか。グレイス以外は手がかからない、とってもいい子よ」"

[[dialogue]]
speaker = "マトイ"
# 「グレイスちゃんだけ名指し……やっぱり……」
line = "「グレイスちゃんだけ名指し……やっぱり……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「未来の流星市国に目を輝かせて、アポロやリノを振り回していたけれど……あの２人なら大丈夫でしょう」
line = "「未来の流星市国に目を輝かせて、アポロやリノを振り回していたけれど……あの２人なら大丈夫でしょう」"

[[dialogue]]
speaker = "ベアトリス"
# 「あの～……アルタイルの私は？　まさか見つけてもらえるだなんて思ってなかったら、驚いちゃったけど……」
line = "「あの～……アルタイルの私は？　まさか見つけてもらえるだなんて思ってなかったら、驚いちゃったけど……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「ちょっと内気な感じではあるけれど、礼儀正しくていい子だったわ」
line = "「ちょっと内気な感じではあるけれど、礼儀正しくていい子だったわ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……魔王、本当にありがとう。アルタイルのベアトも保護してくれるだなんて」
line = "「……魔王、本当にありがとう。アルタイルのベアトも保護してくれるだなんて」"

[[dialogue]]
speaker = "クロト"
# 「気にしないでくれ。俺たちもずっと気になっていたから」
line = "「気にしないでくれ。俺たちもずっと気になっていたから」"

[[dialogue]]
speaker = "unk"
# アルタイルのベアトリスがどこにいるのか──そのことは、天界襲撃以後からずっと、九浄家と学園が調査を進めていた。
line = "アルタイルのベアトリスがどこにいるのか──そのことは、天界襲撃以後からずっと、九浄家と学園が調査を進めていた。"

[[dialogue]]
speaker = "unk"
# だが、ベアトリス本人に聞いてみても、幼い頃の彼女は魔界の地理にも疎く、故郷の場所は特定できなかった。
line = "だが、ベアトリス本人に聞いてみても、幼い頃の彼女は魔界の地理にも疎く、故郷の場所は特定できなかった。"

[[dialogue]]
speaker = "unk"
# しかし、デネブのセイファート学園長が、１０年前にベアトリスと出会っていたことが判明して、一気に光明が見えた。
line = "しかし、デネブのセイファート学園長が、１０年前にベアトリスと出会っていたことが判明して、一気に光明が見えた。"

[[dialogue]]
speaker = "ルヴィネ"
# 「デネブのジェラルド・セイファートのお陰で、影の一族の住処が特定できた……」
line = "「デネブのジェラルド・セイファートのお陰で、影の一族の住処が特定できた……」"

[[dialogue]]
speaker = "クロト"
# 「ああ。場所がわかったらすぐに、ヘレナちゃんが魔界に人を派遣してくれたんだ」
line = "「ああ。場所がわかったらすぐに、ヘレナちゃんが魔界に人を派遣してくれたんだ」"

[[dialogue]]
speaker = "クロト"
# 「当然だけど、デネブのベアトリスがやってきてから、アルタイルの彼女は昏倒していた……一族は寝たきりの彼女を世話してたよ」
line = "「当然だけど、デネブのベアトリスがやってきてから、アルタイルの彼女は昏倒していた……一族は寝たきりの彼女を世話してたよ」"

[[dialogue]]
speaker = "ベアトリス"
# 「今さらだけど、アルタイルの私、よく捨てられなかったなぁ……」
line = "「今さらだけど、アルタイルの私、よく捨てられなかったなぁ……」"

[[dialogue]]
speaker = "クロト"
# 「眠りに落ちてはいたけれど、星力を発現していたみたいでさ」
line = "「眠りに落ちてはいたけれど、星力を発現していたみたいでさ」"

[[dialogue]]
speaker = "unk"
# デネブからやってきた、自身の同一存在の影響か。
line = "デネブからやってきた、自身の同一存在の影響か。"

[[dialogue]]
speaker = "unk"
# 昏倒している間も、同一存在が見て、聞いていることは体験している──そうアポロは言っていた。
line = "昏倒している間も、同一存在が見て、聞いていることは体験している──そうアポロは言っていた。"

[[dialogue]]
speaker = "アナ"
# 「ベアトリスさんが世界を守るために戦っていた光景を、アルタイルの幼い彼女も夢に見ていた……？」
line = "「ベアトリスさんが世界を守るために戦っていた光景を、アルタイルの幼い彼女も夢に見ていた……？」"

[[dialogue]]
speaker = "クロト"
# 「そう、なのかな？　ただ、アポロのようにハッキリと意識をリンクさせてるわけではないみたいだ」
line = "「そう、なのかな？　ただ、アポロのようにハッキリと意識をリンクさせてるわけではないみたいだ」"

[[dialogue]]
speaker = "unk"
# アルタイルのベアトリスやチナから、多少話の聞き取りは行っている。
line = "アルタイルのベアトリスやチナから、多少話の聞き取りは行っている。"

[[dialogue]]
speaker = "unk"
# 俺たちに対する、薄っすらとした既視感はあるようだが、完全に記憶や意識を共有しているわけではないようだった。
line = "俺たちに対する、薄っすらとした既視感はあるようだが、完全に記憶や意識を共有しているわけではないようだった。"

[[dialogue]]
speaker = "クロト"
# 「それで、アルタイルのベアトリスについてだけど……星力が目覚めた以上はってことで、一族の人達も世話を続けていたらしい」
line = "「それで、アルタイルのベアトリスについてだけど……星力が目覚めた以上はってことで、一族の人達も世話を続けていたらしい」"

[[dialogue]]
speaker = "ベアトリス"
# 「な、なるほど……」
line = "「な、なるほど……」"

[[dialogue]]
speaker = "クロト"
# 「だからベアトリス。アルタイルの君を救ったのは、君自身だ。俺はそう思うよ」
line = "「だからベアトリス。アルタイルの君を救ったのは、君自身だ。俺はそう思うよ」"

[[dialogue]]
speaker = "ベアトリス"
# 「……そう言ってもらえると、嬉しいですっ！」
line = "「……そう言ってもらえると、嬉しいですっ！」"

[[dialogue]]
speaker = "クロト"
# 「アルタイルのベアトリスは今、人間界の九浄家で暮らしてる。一族の人達と話はつけたから、安心して欲しい」
line = "「アルタイルのベアトリスは今、人間界の九浄家で暮らしてる。一族の人達と話はつけたから、安心して欲しい」"

[[dialogue]]
speaker = "クロト"
# 「あと数年もしたら、流星附属校に通う予定だよ」
line = "「あと数年もしたら、流星附属校に通う予定だよ」"

[[dialogue]]
speaker = "ベアトリス"
# 「ありがとうございます……でも、ご迷惑じゃないですか？」
line = "「ありがとうございます……でも、ご迷惑じゃないですか？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ぜーんぜん！　むしろお互いの世界を行き来するなら、アルタイルのあの子の居場所はわかってた方が都合がいいでしょ？」
line = "「ぜーんぜん！　むしろお互いの世界を行き来するなら、アルタイルのあの子の居場所はわかってた方が都合がいいでしょ？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「デネブの皆を呼ぶ時に、ベアトリスだけお留守番なんて寂しいじゃない！」
line = "「デネブの皆を呼ぶ時に、ベアトリスだけお留守番なんて寂しいじゃない！」"

[[dialogue]]
speaker = "ベアトリス"
# 「…………私、こんなに幸せでいいのかなぁ」
line = "「…………私、こんなに幸せでいいのかなぁ」"

[[dialogue]]
speaker = "レティシア"
# 「またベアトがおかしなことを言いだしたわね」
line = "「またベアトがおかしなことを言いだしたわね」"

[[dialogue]]
speaker = "ベアトリス"
# 「ええっ、そんなに変なこと言った！？」
line = "「ええっ、そんなに変なこと言った！？」"

[[dialogue]]
speaker = "クロト"
# 「いいに決まってる。この景色を、平和を掴むために、俺たちは戦ってきたんだから」
line = "「いいに決まってる。この景色を、平和を掴むために、俺たちは戦ってきたんだから」"

[[dialogue]]
speaker = "クロト"
# 「だから楽しもう──ようやく形になった、この『ありふれた普通の日常』を！」
line = "「だから楽しもう──ようやく形になった、この『ありふれた普通の日常』を！」"

[[dialogue]]
speaker = "ベアトリス"
# 「……はいっ♪」
line = "「……はいっ♪」"

[[dialogue]]
speaker = "unk"
# そうして星徒会室でくつろいでいると、チナとグレイスが帰ってきた──
line = "そうして星徒会室でくつろいでいると、チナとグレイスが帰ってきた──"

[[dialogue]]
speaker = "グレイス"
# 「お待たせしましたっ！」
line = "「お待たせしましたっ！」"

[[dialogue]]
speaker = "チナ"
# 「……ありがとな、魔王」
line = "「……ありがとな、魔王」"

[[dialogue]]
speaker = "クロト"
# 「２人とも、早いな。もっとゆっくりしても良かったのに」
line = "「２人とも、早いな。もっとゆっくりしても良かったのに」"

[[dialogue]]
speaker = "グレイス"
# 「大丈夫です！　たくさんお話できましたし……それに祝勝会だって、参加しないわけにはいかないですから！」
line = "「大丈夫です！　たくさんお話できましたし……それに祝勝会だって、参加しないわけにはいかないですから！」"

[[dialogue]]
speaker = "チナ"
# 「ああ。それにパーティーが終わったらすぐデネブに帰るってわけじゃない。アルタイルに滞在してる間は、父さんたちの家で暮らすからさ」
