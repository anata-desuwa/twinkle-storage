[[dialogue]]
speaker = "unk"
# 第３話,天使に光あれ！,P
line = "第３話,天使に光あれ！,P"

[[dialogue]]
speaker = "unk"
# 今日も今日とて、ロロットには流星町の案内をしてもらう予定だ。
line = "今日も今日とて、ロロットには流星町の案内をしてもらう予定だ。"

[[dialogue]]
speaker = "unk"
# でも、１つだけいつもと大きく違う点があって……。
line = "でも、１つだけいつもと大きく違う点があって……。"

[[dialogue]]
speaker = "ロロット"
# 「はて……？　こちらの方は、一体どなたでしょう？　なんとなく、知っているような知らないような……」
line = "「はて……？　こちらの方は、一体どなたでしょう？　なんとなく、知っているような知らないような……」"

[[dialogue]]
speaker = "マグダレナ"
# 「守護天使のマグダレナです！　今日はよろしくね♪（ぶるんぶるん）」
line = "「守護天使のマグダレナです！　今日はよろしくね♪（ぶるんぶるん）」"

[[dialogue]]
speaker = "ロロット"
# 「何やら落ち着きがない方ですねぇ」
line = "「何やら落ち着きがない方ですねぇ」"

[[dialogue]]
speaker = "マグダレナ"
# 「ごめんなさい、ようやく自由時間が出来たから、もう嬉しくって（ぶるんぶるん）」
line = "「ごめんなさい、ようやく自由時間が出来たから、もう嬉しくって（ぶるんぶるん）」"

[[dialogue]]
speaker = "unk"
# 凄く揺れてるね
line = "凄く揺れてるね"

[[dialogue]]
speaker = "ロロット"
# 「そういえば、マグダレナさんは、新星の会長さんたちが元の世界へ帰る準備をされていたのでは？　もう終わったのでしょうか」
line = "「そういえば、マグダレナさんは、新星の会長さんたちが元の世界へ帰る準備をされていたのでは？　もう終わったのでしょうか」"

[[dialogue]]
speaker = "マグダレナ"
# 「あと少しですね。目処がつきましたので、今日は息抜きをしようと思います」
line = "「あと少しですね。目処がつきましたので、今日は息抜きをしようと思います」"

[[dialogue]]
speaker = "ロロット"
# 「おお～、なるほど～。息抜きは大切ですね。ずっと頑張っていては、疲れてしまいますから」
line = "「おお～、なるほど～。息抜きは大切ですね。ずっと頑張っていては、疲れてしまいますから」"

[[dialogue]]
speaker = "マグダレナ"
# 「今日はめいっぱい息抜きさせて下さいね♪（ぶるんぶるん）」
line = "「今日はめいっぱい息抜きさせて下さいね♪（ぶるんぶるん）」"

[[dialogue]]
speaker = "ロロット"
# 「しかし、そんなに胸を躍らせてしまうとは……よほど息抜きが楽しみなのですね～」
line = "「しかし、そんなに胸を躍らせてしまうとは……よほど息抜きが楽しみなのですね～」"

[[dialogue]]
speaker = "ロロット"
# 「守護天使、さま……で、よいのでしょうか？」
line = "「守護天使、さま……で、よいのでしょうか？」"

[[dialogue]]
speaker = "マグダレナ"
# 「そうですよ。なんと守護天使なんです♪」
line = "「そうですよ。なんと守護天使なんです♪」"

[[dialogue]]
speaker = "ロロット"
# 「むむむ……凄い方のはずなのですが、なぜだかちっともそうは見えないのです……」
line = "「むむむ……凄い方のはずなのですが、なぜだかちっともそうは見えないのです……」"

[[dialogue]]
speaker = "マグダレナ"
# 「ふふっ♪　ママと呼んで頂いて構いませんよ」
line = "「ふふっ♪　ママと呼んで頂いて構いませんよ」"

[[dialogue]]
speaker = "ロロット"
# 「ママ……？　どういうことなのでしょう」
line = "「ママ……？　どういうことなのでしょう」"

[[dialogue]]
speaker = "unk"
# マグダレナさんだから
line = "マグダレナさんだから"

[[dialogue]]
speaker = "ロロット"
# 「なるほど～。よく分かりませんが……なんだか、あまり深くは触れない方がよさそうですね」
line = "「なるほど～。よく分かりませんが……なんだか、あまり深くは触れない方がよさそうですね」"

[[dialogue]]
speaker = "ロロット"
# 「ところで、マグダレナさんが同行するとは思っていなかったのですが、本日の予定はどうしましょう？」
line = "「ところで、マグダレナさんが同行するとは思っていなかったのですが、本日の予定はどうしましょう？」"

[[dialogue]]
speaker = "マグダレナ"
# 「予定は変えなくていいですよ。私はあくまでついてきただけですので」
line = "「予定は変えなくていいですよ。私はあくまでついてきただけですので」"

[[dialogue]]
speaker = "unk"
# ロロットの好きにしていいよ
line = "ロロットの好きにしていいよ"

[[dialogue]]
speaker = "ロロット"
# 「そうですか、わかりました。ええと、それでは……」
line = "「そうですか、わかりました。ええと、それでは……」"

[[dialogue]]
speaker = "マグダレナ"
# 「ありましたよ！　空き缶ゲットです♪」
line = "「ありましたよ！　空き缶ゲットです♪」"

[[dialogue]]
speaker = "ロロット"
# 「どうもなのです。では、こちらの袋にお願いしますね」
line = "「どうもなのです。では、こちらの袋にお願いしますね」"

[[dialogue]]
speaker = "ロロット"
# 「それにしても、わたしが普段は何をしているのかと訊かれたので、ゴミ拾いのボランティアをしているとは答えたのですが……」
line = "「それにしても、わたしが普段は何をしているのかと訊かれたので、ゴミ拾いのボランティアをしているとは答えたのですが……」"

[[dialogue]]
speaker = "ロロット"
# 「守護天使さまにゴミ拾いを手伝っていただいて、本当によかったのでしょうか？」
line = "「守護天使さまにゴミ拾いを手伝っていただいて、本当によかったのでしょうか？」"

[[dialogue]]
speaker = "unk"
# ゴミ拾いは立派な善行だから大丈夫
line = "ゴミ拾いは立派な善行だから大丈夫"

[[dialogue]]
speaker = "ロロット"
# 「確かに、それは一理ありますね」
line = "「確かに、それは一理ありますね」"

[[dialogue]]
speaker = "unk"
# ロロットらしくていいと思う
line = "ロロットらしくていいと思う"

[[dialogue]]
speaker = "ロロット"
# 「でも、守護天使さまですよ……？　やはり、ちょっぴり遠い存在というか、恐れ多いというか……」
line = "「でも、守護天使さまですよ……？　やはり、ちょっぴり遠い存在というか、恐れ多いというか……」"

[[dialogue]]
speaker = "マグダレナ"
# 「そんなことありませんよ」
line = "「そんなことありませんよ」"

[[dialogue]]
speaker = "ロロット"
# 「ひゃあっ！？　いきなり現れてびっくりさせるのはずるいですっ」
line = "「ひゃあっ！？　いきなり現れてびっくりさせるのはずるいですっ」"

[[dialogue]]
speaker = "マグダレナ"
# 「驚かせてごめんなさい。でも、普段より意欲的にボランティアを行うあなたの心の美しさに、私は感動しました」
line = "「驚かせてごめんなさい。でも、普段より意欲的にボランティアを行うあなたの心の美しさに、私は感動しました」"

[[dialogue]]
speaker = "マグダレナ"
# 「優しき天使に光あれ～」
line = "「優しき天使に光あれ～」"

[[dialogue]]
speaker = "ロロット"
# 「ひええぇっ、眩しいです～！　いきなり何をするんですか、もう～」
line = "「ひええぇっ、眩しいです～！　いきなり何をするんですか、もう～」"

[[dialogue]]
speaker = "マグダレナ"
# 「あれれ？　祝福の光はお気に召しませんでしたか？」
line = "「あれれ？　祝福の光はお気に召しませんでしたか？」"

[[dialogue]]
speaker = "ロロット"
# 「突然ライブが始まったのかと思ったのです。目がシパシパします～……」
line = "「突然ライブが始まったのかと思ったのです。目がシパシパします～……」"

[[dialogue]]
speaker = "unk"
# 俺もシパシパしてる
line = "俺もシパシパしてる"

[[dialogue]]
speaker = "マグダレナ"
# 「……ごめんなさい、もうしません」
line = "「……ごめんなさい、もうしません」"

[[dialogue]]
speaker = "ロロット"
# 「いえいえ～、怒ったりはしていませんよ。わたしは心が広いですから。それより、マグダレナさんが問題ないなら、このままゴミ拾いを続けましょう」
line = "「いえいえ～、怒ったりはしていませんよ。わたしは心が広いですから。それより、マグダレナさんが問題ないなら、このままゴミ拾いを続けましょう」"

[[dialogue]]
speaker = "マグダレナ"
# 「はい、この世界のあらゆるゴミを駆逐しましょうね」
line = "「はい、この世界のあらゆるゴミを駆逐しましょうね」"

[[dialogue]]
speaker = "ロロット"
# 「意外なお宝に遭遇することもありますから、頑張るのです」
line = "「意外なお宝に遭遇することもありますから、頑張るのです」"

[[dialogue]]
speaker = "ロロット"
# 「おや？　言ったそばからお宝発見なのです。これは……！」
line = "「おや？　言ったそばからお宝発見なのです。これは……！」"

[[dialogue]]
speaker = "マグダレナ"
# 「宝箱ですね！」
line = "「宝箱ですね！」"

[[dialogue]]
speaker = "ロロット"
# 「ふむ……ただのクッキーの空き缶のようです。でも、模様がきれいかも……」
line = "「ふむ……ただのクッキーの空き缶のようです。でも、模様がきれいかも……」"

[[dialogue]]
speaker = "unk"
# 捨てちゃうの？
line = "捨てちゃうの？"

[[dialogue]]
speaker = "ロロット"
# 「わたしの鑑定によりますと……これはなかなかいい缶のようですので、特別に、わたしのコレクションに加えることにしましょう」
line = "「わたしの鑑定によりますと……これはなかなかいい缶のようですので、特別に、わたしのコレクションに加えることにしましょう」"

[[dialogue]]
speaker = "マグダレナ"
# 「こちらはどうですか？　捨ててしまうには惜しい逸品ですよ」
line = "「こちらはどうですか？　捨ててしまうには惜しい逸品ですよ」"

[[dialogue]]
speaker = "ロロット"
# 「ひえ！　そのビン、中身が入ってるじゃないですか。ばっちいのです……」
line = "「ひえ！　そのビン、中身が入ってるじゃないですか。ばっちいのです……」"

[[dialogue]]
speaker = "マグダレナ"
# 「光よ～」
line = "「光よ～」"

[[dialogue]]
speaker = "ロロット"
# 「また眩しいです～！？」
line = "「また眩しいです～！？」"

[[dialogue]]
speaker = "マグダレナ"
# 「ご、ごめんなさい、きれいにしようと思って」
line = "「ご、ごめんなさい、きれいにしようと思って」"

[[dialogue]]
speaker = "ロロット"
# 「いいですか？　ゴミ拾いは、不思議な力に頼ってはいけません。ただ無心で、自らの手足を動かすのです。だってその方が、後で食べるご飯がおいしくなりますからね♪」
line = "「いいですか？　ゴミ拾いは、不思議な力に頼ってはいけません。ただ無心で、自らの手足を動かすのです。だってその方が、後で食べるご飯がおいしくなりますからね♪」"

[[dialogue]]
speaker = "マグダレナ"
# 「はーい♪」
line = "「はーい♪」"

[[dialogue]]
speaker = "ロロット"
# 「さあ、ゴミ拾いを続けますよ～！」
line = "「さあ、ゴミ拾いを続けますよ～！」"

[[dialogue]]
speaker = "unk"
# こうして俺たちは、日が暮れるまで公園のゴミ拾いを続けたのだった。
line = "こうして俺たちは、日が暮れるまで公園のゴミ拾いを続けたのだった。"
