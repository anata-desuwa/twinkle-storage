[[dialogue]]
speaker = "unk"
# 第８話,神聖ヴァジュラ教団,B
line = "第８話,神聖ヴァジュラ教団,B"

[[dialogue]]
speaker = "unk"
# 時刻は深夜の２時──レティシア・オルティースは、静まり返った流星市国を歩いていた。
line = "時刻は深夜の２時──レティシア・オルティースは、静まり返った流星市国を歩いていた。"

[[dialogue]]
speaker = "レティシア"
# 「…………私、何をしているのかしら？」
line = "「…………私、何をしているのかしら？」"

[[dialogue]]
speaker = "unk"
# １０年前にこの地で暮らしていたとは思えないほどに、その足取りには迷いが多い。
line = "１０年前にこの地で暮らしていたとは思えないほどに、その足取りには迷いが多い。"

[[dialogue]]
speaker = "unk"
# 大通りを進んだと思えば、路地に顔を出し、また大通りに戻ってくる──それを繰り返していなければ、彼女の脱走は成功していたかもしれない。
line = "大通りを進んだと思えば、路地に顔を出し、また大通りに戻ってくる──それを繰り返していなければ、彼女の脱走は成功していたかもしれない。"

[[dialogue]]
speaker = "クロト"
# 「──レティシア！」
line = "「──レティシア！」"

[[dialogue]]
speaker = "レティシア"
# 「……あら？」
line = "「……あら？」"

[[dialogue]]
speaker = "サーシャ"
# 「こんばんは。もう……お散歩がしたいのなら、昼間のうちに言ってくれればよかったのに～」
line = "「こんばんは。もう……お散歩がしたいのなら、昼間のうちに言ってくれればよかったのに～」"

[[dialogue]]
speaker = "レティシア"
# 「……バレないように出てきたつもりだったのだけれど。どこでボロが出たのかしら？」
line = "「……バレないように出てきたつもりだったのだけれど。どこでボロが出たのかしら？」"

[[dialogue]]
speaker = "unk"
# 俺たちが渡したＧＰＳ付きの端末は、就寝場所となっている会議室に置かれたまま。そして驚くべきことに現在、極星学園生の誰も、レティシアの不在に気づいていない。
line = "俺たちが渡したＧＰＳ付きの端末は、就寝場所となっている会議室に置かれたまま。そして驚くべきことに現在、極星学園生の誰も、レティシアの不在に気づいていない。"

[[dialogue]]
speaker = "unk"
# 本当に鮮やかな無断外出だったが──
line = "本当に鮮やかな無断外出だったが──"

[[dialogue]]
speaker = "クロト"
# 「……君たちの監視はＧＰＳだけじゃない。他にも手段は講じてあるんだ」
line = "「……君たちの監視はＧＰＳだけじゃない。他にも手段は講じてあるんだ」"

[[dialogue]]
speaker = "クロト"
# 「例えば──忍者の部下に見張りを頼むとかね」
line = "「例えば──忍者の部下に見張りを頼むとかね」"

[[dialogue]]
speaker = "レティシア"
# 「……忍者？　ふふ、面白いのね。そんな子もいるの？」
line = "「……忍者？　ふふ、面白いのね。そんな子もいるの？」"

[[dialogue]]
speaker = "サーシャ"
# 「セレスティアの持ち出しも見事だったわ～。やっぱり優秀なのね、レティシアちゃん」
line = "「セレスティアの持ち出しも見事だったわ～。やっぱり優秀なのね、レティシアちゃん」"

[[dialogue]]
speaker = "レティシア"
# 「訓練中に準備と細工をしておいただけよ。あの小さな先生に、もう少し管理を工夫した方がいいと伝えてあげて？」
line = "「訓練中に準備と細工をしておいただけよ。あの小さな先生に、もう少し管理を工夫した方がいいと伝えてあげて？」"

[[dialogue]]
speaker = "クロト"
# 「……レティシア。無断外出の理由を聞かせてくれ」
line = "「……レティシア。無断外出の理由を聞かせてくれ」"

[[dialogue]]
speaker = "レティシア"
# 「特にないわ。夜風にあたりたかっただけ」
line = "「特にないわ。夜風にあたりたかっただけ」"

[[dialogue]]
speaker = "クロト"
# 「それならセレスティアを持ち出す理由がないだろ？　納得のいく説明をしてくれないと、君を疑わざるを得なくなる……」
line = "「それならセレスティアを持ち出す理由がないだろ？　納得のいく説明をしてくれないと、君を疑わざるを得なくなる……」"

[[dialogue]]
speaker = "レティシア"
# 「別に構わないわ。どうぞ疑って？」
line = "「別に構わないわ。どうぞ疑って？」"

[[dialogue]]
speaker = "レティシア"
# 「それで私の待遇が悪くなるのなら、仕方のないことよ。拘束するなり、地下牢にいれるなりご自由に」
line = "「それで私の待遇が悪くなるのなら、仕方のないことよ。拘束するなり、地下牢にいれるなりご自由に」"

[[dialogue]]
speaker = "サーシャ"
# 「う～ん、困ったわね～」
line = "「う～ん、困ったわね～」"

[[dialogue]]
speaker = "unk"
# レティシアの返答は案の定だった。
line = "レティシアの返答は案の定だった。"

[[dialogue]]
speaker = "unk"
# ……だったらこっちも、多少卑怯な手を使うしかない。
line = "……だったらこっちも、多少卑怯な手を使うしかない。"

[[dialogue]]
speaker = "クロト"
# 「……君がそんな態度を取るのなら、仕方がない。待遇を変えよう」
line = "「……君がそんな態度を取るのなら、仕方がない。待遇を変えよう」"

[[dialogue]]
speaker = "レティシア"
# 「ええ。お好きにどうぞ？」
line = "「ええ。お好きにどうぞ？」"

[[dialogue]]
speaker = "クロト"
# 「君だけじゃない。グレイスやチナの待遇も変える。明日からは彼女たちも外出禁止だ」
line = "「君だけじゃない。グレイスやチナの待遇も変える。明日からは彼女たちも外出禁止だ」"

[[dialogue]]
speaker = "レティシア"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# 俺の発言にきょとんと目を見開くレティシア──やがて、くすくすと笑いだした。
line = "俺の発言にきょとんと目を見開くレティシア──やがて、くすくすと笑いだした。"

[[dialogue]]
speaker = "レティシア"
# 「それは困るわね。私はどうでもいいけれど……あの子たちに可哀想なこと、しないでほしいわ」
line = "「それは困るわね。私はどうでもいいけれど……あの子たちに可哀想なこと、しないでほしいわ」"

[[dialogue]]
speaker = "レティシア"
# 「魔王。あなた、よく見てるのね。私が何をされたら困るのか、ちゃんとわかってる……仕方ないわね。理由を言えばいいんでしょう？」
line = "「魔王。あなた、よく見てるのね。私が何をされたら困るのか、ちゃんとわかってる……仕方ないわね。理由を言えばいいんでしょう？」"

[[dialogue]]
speaker = "レティシア"
# 「……メイドのナミエル。あの子、暗殺者でしょう？」
line = "「……メイドのナミエル。あの子、暗殺者でしょう？」"

[[dialogue]]
speaker = "レティシア"
# 「私、あの子のいた組織に心当たりがあるわ。それで少し、昔のことを思い出してしまったの」
line = "「私、あの子のいた組織に心当たりがあるわ。それで少し、昔のことを思い出してしまったの」"

[[dialogue]]
speaker = "unk"
# 俺とサーシャさんの顔色を見て、レティシアが続ける。
line = "俺とサーシャさんの顔色を見て、レティシアが続ける。"

[[dialogue]]
speaker = "レティシア"
# 「──驚かないのね？　ベアトから聞いたのかしら」
line = "「──驚かないのね？　ベアトから聞いたのかしら」"

[[dialogue]]
speaker = "レティシア"
# 「そうなの。私も、似たような組織で育ったのよ」
line = "「そうなの。私も、似たような組織で育ったのよ」"

[[dialogue]]
speaker = "レティシア"
# 「私、普段は何があってもすぐに眠れるの。でもどういうわけか、今夜はちっとも落ち着かない。昔のことばかりを思い出すわ」
line = "「私、普段は何があってもすぐに眠れるの。でもどういうわけか、今夜はちっとも落ち着かない。昔のことばかりを思い出すわ」"

[[dialogue]]
speaker = "レティシア"
# 「ふふ、グレイスみたいね？　あの子がじっとしていられない気持ちが、少しだけわかったかもしれないわ」
line = "「ふふ、グレイスみたいね？　あの子がじっとしていられない気持ちが、少しだけわかったかもしれないわ」"

[[dialogue]]
speaker = "レティシア"
# 「落ち着かないから外出したの。１人になりたいのに、監視を連れて歩くのも嫌だったから、こっそり抜け出した……それだけよ」
line = "「落ち着かないから外出したの。１人になりたいのに、監視を連れて歩くのも嫌だったから、こっそり抜け出した……それだけよ」"

[[dialogue]]
speaker = "サーシャ"
# 「……それでも、セレスティアを持ち出す理由にはならないでしょう？　アルタイルに翻意ありと思われちゃうわよ～？」
line = "「……それでも、セレスティアを持ち出す理由にはならないでしょう？　アルタイルに翻意ありと思われちゃうわよ～？」"

[[dialogue]]
speaker = "レティシア"
# 「ええ、それもそうね──逆に、聞いてもいいかしら？」
line = "「ええ、それもそうね──逆に、聞いてもいいかしら？」"

[[dialogue]]
speaker = "レティシア"
# 「私……どうしてセレスティアを持ち出したのかしら？」
line = "「私……どうしてセレスティアを持ち出したのかしら？」"

[[dialogue]]
speaker = "サーシャ"
# 「……どうして、って」
line = "「……どうして、って」"

[[dialogue]]
speaker = "レティシア"
# 「無断外出だけなら叱責ですんだかもしれないのに。どうしてこんな行動をとったのかしら……ねえ。なぜだと思う？」
line = "「無断外出だけなら叱責ですんだかもしれないのに。どうしてこんな行動をとったのかしら……ねえ。なぜだと思う？」"

[[dialogue]]
speaker = "クロト"
# 「……それは、君にしかわからないことだ」
line = "「……それは、君にしかわからないことだ」"

[[dialogue]]
speaker = "レティシア"
# 「そうね。でも本当にわからないの。あなたたちには理解しがたいかもしれないけれど……」
line = "「そうね。でも本当にわからないの。あなたたちには理解しがたいかもしれないけれど……」"

[[dialogue]]
speaker = "レティシア"
# 「私ね──『空っぽ』なの」
line = "「私ね──『空っぽ』なの」"

[[dialogue]]
speaker = "unk"
# 普通なら、こんな言い訳にもならない説明は信じなかっただろうが……レティシアに限っては、嘘を言っているようには思えなかった。
line = "普通なら、こんな言い訳にもならない説明は信じなかっただろうが……レティシアに限っては、嘘を言っているようには思えなかった。"

[[dialogue]]
speaker = "unk"
# 彼女は本当に、自分がどうしてセレスティアを持ちだしたのか、わかっていないようだった。
line = "彼女は本当に、自分がどうしてセレスティアを持ちだしたのか、わかっていないようだった。"

[[dialogue]]
speaker = "レティシア"
# 「自分で何かを決めるということができないの。だからいつも、ルヴィの命令だけを聞いて生きてきた」
line = "「自分で何かを決めるということができないの。だからいつも、ルヴィの命令だけを聞いて生きてきた」"

[[dialogue]]
speaker = "サーシャ"
# 「……ルヴィネちゃんが『こうしろ』と言ったことだけを、しているということ？」
line = "「……ルヴィネちゃんが『こうしろ』と言ったことだけを、しているということ？」"

[[dialogue]]
speaker = "レティシア"
# 「ええ。ルヴィは私のこと、よくわかってる。私が指示を入力されないと動けない木偶だって、承知してくれているの」
line = "「ええ。ルヴィは私のこと、よくわかってる。私が指示を入力されないと動けない木偶だって、承知してくれているの」"

[[dialogue]]
speaker = "レティシア"
# 「『デネブのために戦いなさい』。『最年長として、みんなのことを気にかけて、お世話をしなさい』──そんな風にいくつも命じてくれている」
line = "「『デネブのために戦いなさい』。『最年長として、みんなのことを気にかけて、お世話をしなさい』──そんな風にいくつも命じてくれている」"

[[dialogue]]
speaker = "レティシア"
# 「私はルヴィがいない時も、それらの命令に従っている──だから、今の状況を説明できないの」
line = "「私はルヴィがいない時も、それらの命令に従っている──だから、今の状況を説明できないの」"

[[dialogue]]
speaker = "レティシア"
# 「どうしてセレスティアを持ち出したのか……ルヴィはそんな命令をしていないのに、どうして私は……」
line = "「どうしてセレスティアを持ち出したのか……ルヴィはそんな命令をしていないのに、どうして私は……」"

[[dialogue]]
speaker = "サーシャ"
# 「……よかったら聞かせてくれないかしら、あなたの生い立ちを。そしてルヴィネちゃんと、どんな風に出会ったのかを」
line = "「……よかったら聞かせてくれないかしら、あなたの生い立ちを。そしてルヴィネちゃんと、どんな風に出会ったのかを」"

[[dialogue]]
speaker = "レティシア"
# 「そんなこと、聞いてどうするの？」
line = "「そんなこと、聞いてどうするの？」"

[[dialogue]]
speaker = "サーシャ"
# 「あなたを理解したいから。そしてルヴィネちゃん──あなたたちのリーダーのことも」
line = "「あなたを理解したいから。そしてルヴィネちゃん──あなたたちのリーダーのことも」"

[[dialogue]]
speaker = "レティシア"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "サーシャ"
# 「命令がないと動けないのなら、私が命令してあげるわ」
line = "「命令がないと動けないのなら、私が命令してあげるわ」"

[[dialogue]]
speaker = "サーシャ"
# 「レティシアちゃん、あなたの過去を話しなさい」
line = "「レティシアちゃん、あなたの過去を話しなさい」"

[[dialogue]]
speaker = "サーシャ"
# 「選択肢はないのよ？　あなたが話さなければ、グレイスちゃんやチナちゃんがまた、外出禁止の軟禁生活になっちゃうんだから」
line = "「選択肢はないのよ？　あなたが話さなければ、グレイスちゃんやチナちゃんがまた、外出禁止の軟禁生活になっちゃうんだから」"

[[dialogue]]
speaker = "サーシャ"
# 「ルヴィネちゃんの命令で、仲間のお世話をしなければいけないあなたは、私たちに話をするしかない。違うかしら？」
line = "「ルヴィネちゃんの命令で、仲間のお世話をしなければいけないあなたは、私たちに話をするしかない。違うかしら？」"

[[dialogue]]
speaker = "レティシア"
# 「…………それはその通りね」
line = "「…………それはその通りね」"

[[dialogue]]
speaker = "unk"
# レティシア・オルティースはデネブの流星市国で生まれ育った。
line = "レティシア・オルティースはデネブの流星市国で生まれ育った。"

[[dialogue]]
speaker = "unk"
# しかしレティシアは市国の街並みを知らない。友人も学園も知らない。それどころか、太陽の光もまともに知らずに育った。
line = "しかしレティシアは市国の街並みを知らない。友人も学園も知らない。それどころか、太陽の光もまともに知らずに育った。"

[[dialogue]]
speaker = "unk"
# レティシアが生まれたのは病院ではなく、流星市国の地下──複雑怪奇な迷路となっている、地下水路の奥に隠れ潜む『神聖ヴァジュラ教団』のアジト。
line = "レティシアが生まれたのは病院ではなく、流星市国の地下──複雑怪奇な迷路となっている、地下水路の奥に隠れ潜む『神聖ヴァジュラ教団』のアジト。"

[[dialogue]]
speaker = "unk"
# かつてチャカパラ神を信奉し、魔王ラクシスと対立していた『バジュラ教団』の生き残りによって再結成された、反社会組織の元で生を受けた。
line = "かつてチャカパラ神を信奉し、魔王ラクシスと対立していた『バジュラ教団』の生き残りによって再結成された、反社会組織の元で生を受けた。"

[[dialogue]]
speaker = "unk"
# 神聖ヴァジュラ教団にとって、リクリエは招かれるべき救済の象徴であり、女神テルルは偽りの神でしかなく。
line = "神聖ヴァジュラ教団にとって、リクリエは招かれるべき救済の象徴であり、女神テルルは偽りの神でしかなく。"

[[dialogue]]
speaker = "unk"
# そしてレティシアは、教団内において最高位の地位についていた──
line = "そしてレティシアは、教団内において最高位の地位についていた──"

[[dialogue]]
speaker = "教団信者"
# 「レティシア様。どうか我々をお救いください」
line = "「レティシア様。どうか我々をお救いください」"

[[dialogue]]
speaker = "教団信者"
# 「レティシア様。どうか『真なる神』からの<ruby=たくせん>託宣</ruby>をお届けください」
line = "「レティシア様。どうか『真なる神』からの<ruby>託宣<rt>たくせん</rt></ruby>をお届けください」"

[[dialogue]]
speaker = "unk"
# レティシアは天使だったが、その羽は見るも鮮やかな黒一色だった。
line = "レティシアは天使だったが、その羽は見るも鮮やかな黒一色だった。"

[[dialogue]]
speaker = "unk"
# 羽の色に黒味が混じると、不吉の象徴である──そんな根拠のない偏見が生きている地域は多い。
line = "羽の色に黒味が混じると、不吉の象徴である──そんな根拠のない偏見が生きている地域は多い。"

[[dialogue]]
speaker = "unk"
# 事実は、魔族との混血の場合に黒くなるだけという、ただそれだけの理由であるのに──<ruby=もうしゅう>妄執</ruby>に囚われている者たちにとっては、その偏見すらも意味を持つ。
line = "事実は、魔族との混血の場合に黒くなるだけという、ただそれだけの理由であるのに──<ruby>妄執<rt>もうしゅう</rt></ruby>に囚われている者たちにとっては、その偏見すらも意味を持つ。"

[[dialogue]]
speaker = "unk"
# レティシアは特別な少女である。普通とは違う。
line = "レティシアは特別な少女である。普通とは違う。"

[[dialogue]]
speaker = "unk"
# だからこそ、自分たちには聴こえない『真なる神』のお声を拾えるはずだと、教団内で解釈されていた。
line = "だからこそ、自分たちには聴こえない『真なる神』のお声を拾えるはずだと、教団内で解釈されていた。"

[[dialogue]]
speaker = "unk"
# 教団が掲げる象徴として、レティシアは優遇されて育った。衣食住には困らなかった。
line = "教団が掲げる象徴として、レティシアは優遇されて育った。衣食住には困らなかった。"

[[dialogue]]
speaker = "unk"
# ──しかしそのほかは、何もなかった。
line = "──しかしそのほかは、何もなかった。"

[[dialogue]]
speaker = "レティシア"
# 「みんな……お、おはよう。あの……」
line = "「みんな……お、おはよう。あの……」"

[[dialogue]]
speaker = "教団信者"
# 「レティシア様、おやめください。あなた様は選ばれた存在。話すべきお相手は、我らではありません」
line = "「レティシア様、おやめください。あなた様は選ばれた存在。話すべきお相手は、我らではありません」"

[[dialogue]]
speaker = "unk"
# 物心ついた時から、レティシアは教団信者に話しかけることを禁止されていた。
line = "物心ついた時から、レティシアは教団信者に話しかけることを禁止されていた。"

[[dialogue]]
speaker = "教団信者"
# 「レティシア様、あなたは特別なのです。さあ『真なる神』のお声に耳を澄ませるのです」
line = "「レティシア様、あなたは特別なのです。さあ『真なる神』のお声に耳を澄ませるのです」"

[[dialogue]]
speaker = "unk"
# ──誰もレティシアという個人を見ていない。
line = "──誰もレティシアという個人を見ていない。"

[[dialogue]]
speaker = "教団信者"
# 「私共と話しているうちに『真なる神』のお声を聴き逃してしまったらどうするのですか？　さあ、今日も祈りをささげてくださいませ」
line = "「私共と話しているうちに『真なる神』のお声を聴き逃してしまったらどうするのですか？　さあ、今日も祈りをささげてくださいませ」"

[[dialogue]]
speaker = "unk"
# レティシアに許されるのは、生命活動のための食事と睡眠、そしているかどうかもわからない『真なる神』に祈ることのみ。
line = "レティシアに許されるのは、生命活動のための食事と睡眠、そしているかどうかもわからない『真なる神』に祈ることのみ。"

[[dialogue]]
speaker = "unk"
# あなたが話すべき相手は『真なる神』以外にない。心を無にしなさい。己を捨ててまっさらになりなさい──そう言われ続けた。
line = "あなたが話すべき相手は『真なる神』以外にない。心を無にしなさい。己を捨ててまっさらになりなさい──そう言われ続けた。"

[[dialogue]]
speaker = "unk"
# 自分を『レティシア様』と呼ぶこの人達の中に、両親もいるはずなのに、見分けがつかない。全員、同じ表情をして、同じ言葉を喋るからだ。
line = "自分を『レティシア様』と呼ぶこの人達の中に、両親もいるはずなのに、見分けがつかない。全員、同じ表情をして、同じ言葉を喋るからだ。"

[[dialogue]]
speaker = "unk"
# 教団信者たちは、リクリエを成就させるためにあらゆる悪事に手を染めていた。
line = "教団信者たちは、リクリエを成就させるためにあらゆる悪事に手を染めていた。"

[[dialogue]]
speaker = "unk"
# 幼い子供を誘拐して暗殺術を教え込んだり、星騎士たちのセレスティアを盗み出す妨害工作を行ったり──
line = "幼い子供を誘拐して暗殺術を教え込んだり、星騎士たちのセレスティアを盗み出す妨害工作を行ったり──"

[[dialogue]]
speaker = "unk"
# 稀に、人目につかないよう地上に出ることを許された日もあった。しかしそこで許されたのも、天におわすはずの『真なる神』に祈ること。
line = "稀に、人目につかないよう地上に出ることを許された日もあった。しかしそこで許されたのも、天におわすはずの『真なる神』に祈ること。"

[[dialogue]]
speaker = "レティシア"
# （……かみさま。いるのなら、おしえて）
line = "（……かみさま。いるのなら、おしえて）"

[[dialogue]]
speaker = "レティシア"
# （わたしは、なんのために、いきているの？）
line = "（わたしは、なんのために、いきているの？）"

[[dialogue]]
speaker = "unk"
# レティシアの自我は日に日に削れ、すり減り、枯れていく──
line = "レティシアの自我は日に日に削れ、すり減り、枯れていく──"

[[dialogue]]
speaker = "unk"
# そしてとうとう、ニュクス流星群がデネブに降り注いだ。
line = "そしてとうとう、ニュクス流星群がデネブに降り注いだ。"

[[dialogue]]
speaker = "unk"
# リクリエの使徒である『仮面の女』が暴れまわるたびに、教団信者たちは喝采をあげた。
line = "リクリエの使徒である『仮面の女』が暴れまわるたびに、教団信者たちは喝采をあげた。"

[[dialogue]]
speaker = "unk"
# 緋宮クロトがいなくなり、流星市国が謎の見えない壁で覆われたその時に、興奮は最高潮に達した。
line = "緋宮クロトがいなくなり、流星市国が謎の見えない壁で覆われたその時に、興奮は最高潮に達した。"

[[dialogue]]
speaker = "教団信者"
# 「いよいよ『真なる神』が降臨なされる！！」
line = "「いよいよ『真なる神』が降臨なされる！！」"

[[dialogue]]
speaker = "教団信者"
# 「穢れきったこの世界の刷新を！　我らの救済を！！」
line = "「穢れきったこの世界の刷新を！　我らの救済を！！」"

[[dialogue]]
speaker = "レティシア"
# （……なにがうれしいの？　いっぱいひとが、しんだのに）
line = "（……なにがうれしいの？　いっぱいひとが、しんだのに）"

[[dialogue]]
speaker = "レティシア"
# （おかしいのは、このひとたち？　それとも──わたし？）
line = "（おかしいのは、このひとたち？　それとも──わたし？）"

[[dialogue]]
speaker = "レティシア"
# （だれでもいい。だれか、おしえて。ただしいことを、おしえて）
line = "（だれでもいい。だれか、おしえて。ただしいことを、おしえて）"

[[dialogue]]
speaker = "unk"
# その時、レティシアはどうしてそんなことをしたのか。自分でも説明がつかない。
line = "その時、レティシアはどうしてそんなことをしたのか。自分でも説明がつかない。"

[[dialogue]]
speaker = "unk"
# 無意識に、吸い寄せられるようにして……教団信者が盗み出したセレスティアの１つを、手に取った。
line = "無意識に、吸い寄せられるようにして……教団信者が盗み出したセレスティアの１つを、手に取った。"

[[dialogue]]
speaker = "unk"
# 自覚もないままに守護星を得ていたレティシアは、星騎士として覚醒した。してしまった──狂信者たちの前で。
line = "自覚もないままに守護星を得ていたレティシアは、星騎士として覚醒した。してしまった──狂信者たちの前で。"

[[dialogue]]
speaker = "教団信者"
# 「星力……バカな！？　それは、悪神テルル由来の力！！」
line = "「星力……バカな！？　それは、悪神テルル由来の力！！」"

[[dialogue]]
speaker = "教団信者"
# 「偽物だ、こいつは偽物だ！！　テルルの手先だ！！」
line = "「偽物だ、こいつは偽物だ！！　テルルの手先だ！！」"

[[dialogue]]
speaker = "教団信者"
# 「捕まえろ！！　今すぐに──亡き者にしなくては！！　『真なる神』への許しを乞わねば！！！」
line = "「捕まえろ！！　今すぐに──亡き者にしなくては！！　『真なる神』への許しを乞わねば！！！」"

[[dialogue]]
speaker = "unk"
# レティシアは抵抗しなかった。目を血走らせる教団信者に殴られ、蹴られ、生贄に捧げるべく祭壇に拘束される間も、何も抵抗しなかった。
line = "レティシアは抵抗しなかった。目を血走らせる教団信者に殴られ、蹴られ、生贄に捧げるべく祭壇に拘束される間も、何も抵抗しなかった。"

[[dialogue]]
speaker = "unk"
# 何のために生きているのかもわからない。死にたくないという生物としての本能すら抱けないほどに、レティシアは壊れてしまっていた。
line = "何のために生きているのかもわからない。死にたくないという生物としての本能すら抱けないほどに、レティシアは壊れてしまっていた。"

[[dialogue]]
speaker = "unk"
# そうして教団信者が短刀を持ち、レティシアの喉元へと刃を突き付けた。
line = "そうして教団信者が短刀を持ち、レティシアの喉元へと刃を突き付けた。"

[[dialogue]]
speaker = "レティシア"
# （このナイフをもっているおとこのひとは、だれ？　おとうさん？）
line = "（このナイフをもっているおとこのひとは、だれ？　おとうさん？）"

[[dialogue]]
speaker = "レティシア"
# （わたしのからだをおさえるこのおんなのひとは、だれ？　おかあさん？）
line = "（わたしのからだをおさえるこのおんなのひとは、だれ？　おかあさん？）"

[[dialogue]]
speaker = "レティシア"
# （わからない。みんな、おなじかお……）
line = "（わからない。みんな、おなじかお……）"

[[dialogue]]
speaker = "unk"
# 数瞬後、上げられた悲鳴は、レティシアのものではなかった。
line = "数瞬後、上げられた悲鳴は、レティシアのものではなかった。"

[[dialogue]]
speaker = "教団信者"
# 「──ぎゃぁぁあぁあああっ！？」
line = "「──ぎゃぁぁあぁあああっ！？」"

[[dialogue]]
speaker = "unk"
# 教団のアジトに大量のモンスターが押し寄せていた。リクリエの使徒がいなくなったあと、散発的に発生していたアステラから湧き出た怪物たち。
line = "教団のアジトに大量のモンスターが押し寄せていた。リクリエの使徒がいなくなったあと、散発的に発生していたアステラから湧き出た怪物たち。"

[[dialogue]]
speaker = "unk"
# 皮肉なことに、彼らは信奉していた『真なる神』が生み出したモンスターによって、その生涯を終えた。
line = "皮肉なことに、彼らは信奉していた『真なる神』が生み出したモンスターによって、その生涯を終えた。"

[[dialogue]]
speaker = "unk"
# 次々に教団信者は引き裂かれ、とうとうレティシアの番──しかしそこへ白銀の天使の救出が間に合った。
line = "次々に教団信者は引き裂かれ、とうとうレティシアの番──しかしそこへ白銀の天使の救出が間に合った。"

[[dialogue]]
speaker = "天使の少女"
# 「させない──！！」
line = "「させない──！！」"

[[dialogue]]
speaker = "unk"
# 純白の衣装を纏う１人の天使によって、レティシアは九死に一生を得た。
line = "純白の衣装を纏う１人の天使によって、レティシアは九死に一生を得た。"

[[dialogue]]
speaker = "天使の少女"
# 「まさかこんな地下にまで……よかった。あなただけは助けられた」
line = "「まさかこんな地下にまで……よかった。あなただけは助けられた」"

[[dialogue]]
speaker = "天使の少女"
# 「こんなところに長居はしたくないわね。行きましょう？」
line = "「こんなところに長居はしたくないわね。行きましょう？」"

[[dialogue]]
speaker = "unk"
# 天使の少女は、レティシアの手を引きながら──
line = "天使の少女は、レティシアの手を引きながら──"

[[dialogue]]
speaker = "天使の少女"
# 「あなた、名前は……？」
line = "「あなた、名前は……？」"

[[dialogue]]
speaker = "unk"
# ──どくん、と心が震えた。
line = "──どくん、と心が震えた。"

[[dialogue]]
speaker = "unk"
# 自分という『個』を見て、知ろうとしてくれた、生まれて初めての人だったから。
line = "自分という『個』を見て、知ろうとしてくれた、生まれて初めての人だったから。"

[[dialogue]]
speaker = "ルヴィネ"
# 「私はルヴィネ。あなたの名前を、教えてくれる？」
line = "「私はルヴィネ。あなたの名前を、教えてくれる？」"

[[dialogue]]
speaker = "unk"
# 自我を持つなと。まっさらになれと。話しかけるなと言われ続けていたレティシアにとって──その問いかけは、涙が出るほど嬉しかった、と思う。
line = "自我を持つなと。まっさらになれと。話しかけるなと言われ続けていたレティシアにとって──その問いかけは、涙が出るほど嬉しかった、と思う。"

[[dialogue]]
speaker = "unk"
# ……涙は一筋もこぼれなかったが。
line = "……涙は一筋もこぼれなかったが。"

[[dialogue]]
speaker = "レティシア"
# 「……レティシア・オルティース」
line = "「……レティシア・オルティース」"

[[dialogue]]
speaker = "unk"
# 自分の声を久しぶりに聞いた。こんな声だったのかと、驚いた。
line = "自分の声を久しぶりに聞いた。こんな声だったのかと、驚いた。"

[[dialogue]]
speaker = "ルヴィネ"
# 「レティシア──いい名前ね」
line = "「レティシア──いい名前ね」"

[[dialogue]]
speaker = "ルヴィネ"
# 「これからあなたを、私の仲間に会わせてあげる。みんな歳が近いから、すぐに仲良くなれるわ」
line = "「これからあなたを、私の仲間に会わせてあげる。みんな歳が近いから、すぐに仲良くなれるわ」"

[[dialogue]]
speaker = "レティシア"
# 「…………ぁ。…………ぅ」
line = "「…………ぁ。…………ぅ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「──大丈夫よ。何かあったら、私が助けてあげる」
line = "「──大丈夫よ。何かあったら、私が助けてあげる」"

[[dialogue]]
speaker = "ルヴィネ"
# 「安心して。私はあなたの味方よ」
line = "「安心して。私はあなたの味方よ」"

[[dialogue]]
speaker = "unk"
# レティシアは、その時に確信した。
line = "レティシアは、その時に確信した。"

[[dialogue]]
speaker = "unk"
# ルヴィネの言うとおりにすれば何も怖くない。ほっとする。安心できる──
line = "ルヴィネの言うとおりにすれば何も怖くない。ほっとする。安心できる──"

[[dialogue]]
speaker = "unk"
# 誰一人味方のいない世界で、レティシアはようやく<ruby=すが>縋</ruby>ってもいい相手を見つけたのだった。
line = "誰一人味方のいない世界で、レティシアはようやく<ruby>縋<rt>すが</rt></ruby>ってもいい相手を見つけたのだった。"
