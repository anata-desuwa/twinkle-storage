[[dialogue]]
speaker = "unk"
# 第３話,ギャンブラー・レティシア,P
line = "第３話,ギャンブラー・レティシア,P"

[[dialogue]]
speaker = "レティシア"
# 「……私の趣味？」
line = "「……私の趣味？」"

[[dialogue]]
speaker = "サーシャ"
# 「ええ。レティシアちゃんって、休日は何をして過ごしているのか気になって～」
line = "「ええ。レティシアちゃんって、休日は何をして過ごしているのか気になって～」"

[[dialogue]]
speaker = "レティシア"
# 「特に何も。戦闘訓練をするか、極星のみんなと過ごすか……何も予定がない時は寝るだけね」
line = "「特に何も。戦闘訓練をするか、極星のみんなと過ごすか……何も予定がない時は寝るだけね」"

[[dialogue]]
speaker = "サーシャ"
# 「やっぱりそうなのね～。だったら今はちょうどいいんじゃないかしら？」
line = "「やっぱりそうなのね～。だったら今はちょうどいいんじゃないかしら？」"

[[dialogue]]
speaker = "サーシャ"
# 「アルタイルにいる間に探してみましょう。レティシアちゃんが夢中になれる趣味♪」
line = "「アルタイルにいる間に探してみましょう。レティシアちゃんが夢中になれる趣味♪」"

[[dialogue]]
speaker = "レティシア"
# 「必要ないわ──なんて。以前の私ならそう言っていたけれど……」
line = "「必要ないわ──なんて。以前の私ならそう言っていたけれど……」"

[[dialogue]]
speaker = "レティシア"
# 「次にルヴィと出会った時。私の言葉次第で、あの子の未来も変わるかも、だなんて言われたら。切り捨てるわけにもいかないわね」
line = "「次にルヴィと出会った時。私の言葉次第で、あの子の未来も変わるかも、だなんて言われたら。切り捨てるわけにもいかないわね」"

[[dialogue]]
speaker = "チナ"
# 「す、すげえ……ついこの前まで敵対関係だったアルタイル相手に、こんな素直に……レティシア、お前マジで変わったな……！？」
line = "「す、すげえ……ついこの前まで敵対関係だったアルタイル相手に、こんな素直に……レティシア、お前マジで変わったな……！？」"

[[dialogue]]
speaker = "グレイス"
# 「そ、そうですねっ……夢でも見てるみたいです！　サーシャさん、いったいどんな手を……？」
line = "「そ、そうですねっ……夢でも見てるみたいです！　サーシャさん、いったいどんな手を……？」"

[[dialogue]]
speaker = "サーシャ"
# 「うふふ♪　お姉ちゃんパワーで説得したの～♪」
line = "「うふふ♪　お姉ちゃんパワーで説得したの～♪」"

[[dialogue]]
speaker = "アナ"
# 「こうしてお茶の誘いに応じてくれるだけでも、ずいぶんな進歩かと思います。戦いの日々から離れることで、何かが見えてくるかもしれません」
line = "「こうしてお茶の誘いに応じてくれるだけでも、ずいぶんな進歩かと思います。戦いの日々から離れることで、何かが見えてくるかもしれません」"

[[dialogue]]
speaker = "レティシア"
# 「そうは言うけれど、困ったわね」
line = "「そうは言うけれど、困ったわね」"

[[dialogue]]
speaker = "レティシア"
# 「私。趣味どころか、何かへの好奇心もないし……」
line = "「私。趣味どころか、何かへの好奇心もないし……」"

[[dialogue]]
speaker = "チナ"
# 「ま。何でもやってみるといいんじゃないか？　物は試しって言うしさ」
line = "「ま。何でもやってみるといいんじゃないか？　物は試しって言うしさ」"

[[dialogue]]
speaker = "グレイス"
# 「う～ん。だったらデネブにはないような場所に遊びに行きますか？　新鮮なところには、新しい発見があるものです！」
line = "「う～ん。だったらデネブにはないような場所に遊びに行きますか？　新鮮なところには、新しい発見があるものです！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「面白そうね！　レティシアが絶対行かないような所──そうだ、あそこはどうかしら！？」
line = "「面白そうね！　レティシアが絶対行かないような所──そうだ、あそこはどうかしら！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「というわけで、<ruby=くじょうけ>九浄家</ruby>のカジノに来たわよー！」
line = "「というわけで、<ruby>九浄家<rt>くじょうけ</rt></ruby>のカジノに来たわよー！」"

[[dialogue]]
speaker = "チナ"
# 「いや急展開だな！？　てゆーかアタシらって学生だぞ。賭け事なんてしたらダメなんじゃ……」
line = "「いや急展開だな！？　てゆーかアタシらって学生だぞ。賭け事なんてしたらダメなんじゃ……」"

[[dialogue]]
speaker = "サーシャ"
# 「そこは大丈夫。ヴィーナスちゃんに口利きしてもらって、今は私たちの貸し切りだから～♪」
line = "「そこは大丈夫。ヴィーナスちゃんに口利きしてもらって、今は私たちの貸し切りだから～♪」"

[[dialogue]]
speaker = "アナ"
# 「レクリエーション用のチップも用意してもらいました。お金を賭けずとも、カジノの雰囲気は楽しめるはずです」
line = "「レクリエーション用のチップも用意してもらいました。お金を賭けずとも、カジノの雰囲気は楽しめるはずです」"

[[dialogue]]
speaker = "レティシア"
# 「せっかくのお膳立てだし、何かやってみようかしら。種目は何でもいいわ」
line = "「せっかくのお膳立てだし、何かやってみようかしら。種目は何でもいいわ」"

[[dialogue]]
speaker = "unk"
# こうしてレティシアは、人生初めてのカジノを楽しむことになったのだが──
line = "こうしてレティシアは、人生初めてのカジノを楽しむことになったのだが──"

[[dialogue]]
speaker = "レティシア"
# 「ふふふ、ちょうど２１。また私の勝ちね？」
line = "「ふふふ、ちょうど２１。また私の勝ちね？」"

[[dialogue]]
speaker = "unk"
# チップが山と積み上がってる……！？
line = "チップが山と積み上がってる……！？"

[[dialogue]]
speaker = "サーシャ"
# 「すごいわねえ。押し引きの判断が絶妙だわ……これは隠れた才能なのかも……！」
line = "「すごいわねえ。押し引きの判断が絶妙だわ……これは隠れた才能なのかも……！」"

[[dialogue]]
speaker = "レティシア"
# 「命のやり取りと構造は一緒ね。流れがあるみたい。それを見つけて掴んだら、あとは離さなければいいだけね」
line = "「命のやり取りと構造は一緒ね。流れがあるみたい。それを見つけて掴んだら、あとは離さなければいいだけね」"

[[dialogue]]
speaker = "チナ"
# 「歴戦のばくち打ちみたいなこと言ってるぞコイツ……！」
line = "「歴戦のばくち打ちみたいなこと言ってるぞコイツ……！」"

[[dialogue]]
speaker = "ディーラー"
# 「お嬢さん、なかなかの腕前ですね。いかがです、ネクストゲーム？」
line = "「お嬢さん、なかなかの腕前ですね。いかがです、ネクストゲーム？」"

[[dialogue]]
speaker = "レティシア"
# 「もちろんいくわ。カードをちょうだい？」
line = "「もちろんいくわ。カードをちょうだい？」"

[[dialogue]]
speaker = "unk"
# 何度目かのブラックジャック勝負──またレティシアは絶妙な駆け引きで勝利をものにした。
line = "何度目かのブラックジャック勝負──またレティシアは絶妙な駆け引きで勝利をものにした。"

[[dialogue]]
speaker = "unk"
# 負ける時は最小に、勝ち目のある時は厚く張ってしっかりとリターンを得る──お手本のようなゲーム運びで、どんどんチップを得ていく。
line = "負ける時は最小に、勝ち目のある時は厚く張ってしっかりとリターンを得る──お手本のようなゲーム運びで、どんどんチップを得ていく。"

[[dialogue]]
speaker = "チナ"
# 「す、すげぇ……！　これ、本当に賭けてたらとんでもない儲けだったんじゃないか！？」
line = "「す、すげぇ……！　これ、本当に賭けてたらとんでもない儲けだったんじゃないか！？」"

[[dialogue]]
speaker = "グレイス"
# 「……ぐすん。貰ったチップ、全部なくなっちゃいました～……」
line = "「……ぐすん。貰ったチップ、全部なくなっちゃいました～……」"

[[dialogue]]
speaker = "チナ"
# 「んで、こっちは予想通りと。グレイス、お前は学園を卒業しても絶対カジノは行くなよ？」
line = "「んで、こっちは予想通りと。グレイス、お前は学園を卒業しても絶対カジノは行くなよ？」"

[[dialogue]]
speaker = "グレイス"
# 「恐ろしい場所です……でもレティシアは凄いですね！　こんなに勝てるだなんて！」
line = "「恐ろしい場所です……でもレティシアは凄いですね！　こんなに勝てるだなんて！」"

[[dialogue]]
speaker = "グレイス"
# 「もしも実際に換金出来たら──って、そう考えるだけでも夢が広がりますねっ。レティシア、何でも買い放題ですよ！」
line = "「もしも実際に換金出来たら──って、そう考えるだけでも夢が広がりますねっ。レティシア、何でも買い放題ですよ！」"

[[dialogue]]
speaker = "レティシア"
# 「そう言われても……特に欲しいもの、ないのよね」
line = "「そう言われても……特に欲しいもの、ないのよね」"

[[dialogue]]
speaker = "レティシア"
# 「参考までに聞かせてくれる？　グレイスだったら何に使うかしら」
line = "「参考までに聞かせてくれる？　グレイスだったら何に使うかしら」"

[[dialogue]]
speaker = "グレイス"
# 「おいしいものを食べるのに使いますね！　厚切り高級ステーキに、背脂マシマシ豚骨ラーメンっ……毎日食べ放題です！！」
line = "「おいしいものを食べるのに使いますね！　厚切り高級ステーキに、背脂マシマシ豚骨ラーメンっ……毎日食べ放題です！！」"

[[dialogue]]
speaker = "チナ"
# 「メシ代で使い切れる稼ぎじゃねえんだよな……」
line = "「メシ代で使い切れる稼ぎじゃねえんだよな……」"

[[dialogue]]
speaker = "レティシア"
# 「そういうチナは？」
line = "「そういうチナは？」"

[[dialogue]]
speaker = "チナ"
# 「アタシはゲーム機だな！　スターステーション６！」
line = "「アタシはゲーム機だな！　スターステーション６！」"

[[dialogue]]
speaker = "マトイ"
# 「──っ！？　アルタイルのスタステは５が最新機っ……どんなゲーム機なのか、気になる……！」
line = "「──っ！？　アルタイルのスタステは５が最新機っ……どんなゲーム機なのか、気になる……！」"

[[dialogue]]
speaker = "チナ"
# 「ついでにテレビもでっかいやつに新調して、理想的なゲームライフを送るんだ！」
line = "「ついでにテレビもでっかいやつに新調して、理想的なゲームライフを送るんだ！」"

[[dialogue]]
speaker = "マトイ"
# 「でもゲーム機だって、１００台買ってもおつりが来ちゃうような……？」
line = "「でもゲーム機だって、１００台買ってもおつりが来ちゃうような……？」"

[[dialogue]]
speaker = "チナ"
# 「そうなんだよな～……難しいな。大金がどかんと当たっても、どう使うかのイメージ、湧かないかもだ」
line = "「そうなんだよな～……難しいな。大金がどかんと当たっても、どう使うかのイメージ、湧かないかもだ」"

[[dialogue]]
speaker = "レティシア"
# 「みんなでも持て余す額なのね──そうだ。ベアトにも聞いてみましょうか」
line = "「みんなでも持て余す額なのね──そうだ。ベアトにも聞いてみましょうか」"

[[dialogue]]
speaker = "ベアトリス"
# 『レティシアちゃんから通話なんて珍しいね！　どうかしたの？』
line = "『レティシアちゃんから通話なんて珍しいね！　どうかしたの？』"

[[dialogue]]
speaker = "レティシア"
# 「ベアト。もしも１２００万テルスくらい手元にあったら、何に使いたいかしら？」
line = "「ベアト。もしも１２００万テルスくらい手元にあったら、何に使いたいかしら？」"

[[dialogue]]
speaker = "ベアトリス"
# 『いきなりどういうこと！？！？！？』
line = "『いきなりどういうこと！？！？！？』"

[[dialogue]]
speaker = "レティシア"
# 「あ……今、２０００万テルスに増えたわ。困ったわね。欲しいものが思いつかないのに稼ぎばかり大きくなる……」
line = "「あ……今、２０００万テルスに増えたわ。困ったわね。欲しいものが思いつかないのに稼ぎばかり大きくなる……」"

[[dialogue]]
speaker = "ベアトリス"
# 『待って待って！？　何だか怖いよ！　銀行強盗でもしてるの！？』
line = "『待って待って！？　何だか怖いよ！　銀行強盗でもしてるの！？』"

[[dialogue]]
speaker = "アナ"
# 「失礼します──実は、かくかくしかじか、でして」
line = "「失礼します──実は、かくかくしかじか、でして」"

[[dialogue]]
speaker = "ベアトリス"
# 『あ……そ、そういうこと。レクリエーションなんだね……びっくりしたぁ……』
line = "『あ……そ、そういうこと。レクリエーションなんだね……びっくりしたぁ……』"

[[dialogue]]
speaker = "ベアトリス"
# 『私は……旅行、とか？　極星のみんなで、豪華クルーズで世界一周とか、面白そうかも！』
line = "『私は……旅行、とか？　極星のみんなで、豪華クルーズで世界一周とか、面白そうかも！』"

[[dialogue]]
speaker = "レティシア"
# 「あら──それ、いいわね。とても楽しそう」
line = "「あら──それ、いいわね。とても楽しそう」"

[[dialogue]]
speaker = "レティシア"
# 「となると……５人分の長期の旅費が必要ね。もう少し稼いでおこうかしら？」
line = "「となると……５人分の長期の旅費が必要ね。もう少し稼いでおこうかしら？」"

[[dialogue]]
speaker = "ディーラー"
# 「ネクストゲームですね、お嬢さん？」
line = "「ネクストゲームですね、お嬢さん？」"

[[dialogue]]
speaker = "レティシア"
# 「ええ。目標が持てると、ゲームも案外楽しいものね」
line = "「ええ。目標が持てると、ゲームも案外楽しいものね」"

[[dialogue]]
speaker = "unk"
# その後もレティシアは勝ち続け、日も傾いたことでお開きとなった。
line = "その後もレティシアは勝ち続け、日も傾いたことでお開きとなった。"

[[dialogue]]
speaker = "unk"
# チナやグレイスと違って、レティシアに分かりやすい物欲はなかったものの──知見が広がる１日となったみたいだ。
line = "チナやグレイスと違って、レティシアに分かりやすい物欲はなかったものの──知見が広がる１日となったみたいだ。"

[[dialogue]]
speaker = "unk"
# ……しかし。
line = "……しかし。"

[[dialogue]]
speaker = "ディーラー"
# 「……実際に客として来られたら、大変だったな。当主様に連絡して、要注意人物リストに入れておくか……」
line = "「……実際に客として来られたら、大変だったな。当主様に連絡して、要注意人物リストに入れておくか……」"

[[dialogue]]
speaker = "unk"
# 九浄家のカジノが傾きかけるくらいに勝ちを重ねたレティシアの博才に、カードディーラーは戦慄していたのだった。
line = "九浄家のカジノが傾きかけるくらいに勝ちを重ねたレティシアの博才に、カードディーラーは戦慄していたのだった。"
