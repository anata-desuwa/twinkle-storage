[[dialogue]]
speaker = "unk"
# 第１話,曖昧な関係に終止符を,P
line = "第１話,曖昧な関係に終止符を,P"

[[dialogue]]
speaker = "unk"
# 放課後、校舎に背を預けて俺は人を待っていた。
line = "放課後、校舎に背を預けて俺は人を待っていた。"

[[dialogue]]
speaker = "unk"
# 待ち合わせの相手は羽宮蘭美。九浄家のメイド長にして新星学園３年の飛び級天才少女だ。
line = "待ち合わせの相手は羽宮蘭美。九浄家のメイド長にして新星学園３年の飛び級天才少女だ。"

[[dialogue]]
speaker = "unk"
# 彼女とは、デートに誘われたことをきっかけに仲良くなり、バレンタインデーにチョコレートを貰うほどの関係になっていた。
line = "彼女とは、デートに誘われたことをきっかけに仲良くなり、バレンタインデーにチョコレートを貰うほどの関係になっていた。"

[[dialogue]]
speaker = "unk"
# そして今日、彼女のことを校舎の外れに呼び出したのは、俺なりの一大決心を固めてのことだった。
line = "そして今日、彼女のことを校舎の外れに呼び出したのは、俺なりの一大決心を固めてのことだった。"

[[dialogue]]
speaker = "蘭美"
# 「待たせたわね」
line = "「待たせたわね」"

[[dialogue]]
speaker = "unk"
# ごめん、わざわざ呼び出したりして
line = "ごめん、わざわざ呼び出したりして"

[[dialogue]]
speaker = "蘭美"
# 「構わないわ。それでどうしたのかしら、こんな人気のない場所に呼び出したりして？」
line = "「構わないわ。それでどうしたのかしら、こんな人気のない場所に呼び出したりして？」"

[[dialogue]]
speaker = "蘭美"
# 「まあ、何も言わなくても私にはちゃんと分かっているのだけれど……ふふふ」
line = "「まあ、何も言わなくても私にはちゃんと分かっているのだけれど……ふふふ」"

[[dialogue]]
speaker = "蘭美"
# 「ずばり、デートのお誘いでしょう？　予定が埋まってしまう前に、早めに押さえておこうという算段ね！」
line = "「ずばり、デートのお誘いでしょう？　予定が埋まってしまう前に、早めに押さえておこうという算段ね！」"

[[dialogue]]
speaker = "蘭美"
# 「でも心配しなくていいわ。メイド長として忙しい身ではあるけれど、私が貴方の誘いを断ったことなんてあったかしら？」
line = "「でも心配しなくていいわ。メイド長として忙しい身ではあるけれど、私が貴方の誘いを断ったことなんてあったかしら？」"

[[dialogue]]
speaker = "unk"
# 一度もない、ね
line = "一度もない、ね"

[[dialogue]]
speaker = "蘭美"
# 「でしょう？　それよりもデートコースは決めているのかしら？」
line = "「でしょう？　それよりもデートコースは決めているのかしら？」"

[[dialogue]]
speaker = "蘭美"
# 「次のデートは……どこがいいかしら？　渋谷？　六本木？　それともお台場？　一緒に行ってみたい場所がいっぱいで迷うわね」
line = "「次のデートは……どこがいいかしら？　渋谷？　六本木？　それともお台場？　一緒に行ってみたい場所がいっぱいで迷うわね」"

[[dialogue]]
speaker = "蘭美"
# 「えっ、違う？　まさか……会長のお仕事が忙しくなってきたから、しばらくデートは出来ない、とか……？」
line = "「えっ、違う？　まさか……会長のお仕事が忙しくなってきたから、しばらくデートは出来ない、とか……？」"

[[dialogue]]
speaker = "蘭美"
# 「まあ、そういうことなら、仕方ないわね……貴方には貴方の都合があるのだから……」
line = "「まあ、そういうことなら、仕方ないわね……貴方には貴方の都合があるのだから……」"

[[dialogue]]
speaker = "蘭美"
# 「えっ、それも違う？　……だとしたら、どうして私を呼び出したのかしら？」
line = "「えっ、それも違う？　……だとしたら、どうして私を呼び出したのかしら？」"

[[dialogue]]
speaker = "unk"
# ちょっと背伸びをしてくれる？
line = "ちょっと背伸びをしてくれる？"

[[dialogue]]
speaker = "蘭美"
# 「背伸び？　私は背伸びが必要なほど小さくはないけれど……まあいいわよ」
line = "「背伸び？　私は背伸びが必要なほど小さくはないけれど……まあいいわよ」"

[[dialogue]]
speaker = "蘭美"
# 「んーーーーーっ！　こ、これでいいかしら？」
line = "「んーーーーーっ！　こ、これでいいかしら？」"

[[dialogue]]
speaker = "蘭美"
# 「む、無理なんてしていないわ。だけど、あと１０秒で終わりにするわよ！」
line = "「む、無理なんてしていないわ。だけど、あと１０秒で終わりにするわよ！」"

[[dialogue]]
speaker = "unk"
# 俺は目をつぶって背伸びする蘭美の頬に、浅くキスをした。
line = "俺は目をつぶって背伸びする蘭美の頬に、浅くキスをした。"

[[dialogue]]
speaker = "蘭美"
# 「ぴゃっ！！？」
line = "「ぴゃっ！！？」"

[[dialogue]]
speaker = "蘭美"
# 「ほ、ほっぺに、キス！？　ふ、ふふ……いきなりそんなことしてくるなんて思わなかったわ……さすがに驚いたじゃない」
line = "「ほ、ほっぺに、キス！？　ふ、ふふ……いきなりそんなことしてくるなんて思わなかったわ……さすがに驚いたじゃない」"

[[dialogue]]
speaker = "蘭美"
# 「ん……？　ああ、そういえばバレンタインの時に、私の方からやったわね……つまり、その時のお返しということかしら？」
line = "「ん……？　ああ、そういえばバレンタインの時に、私の方からやったわね……つまり、その時のお返しということかしら？」"

[[dialogue]]
speaker = "蘭美"
# 「いい傾向ね。こういったスキンシップを気軽に取れるようになったのは、私たちの仲が深まってきた証拠だわ」
line = "「いい傾向ね。こういったスキンシップを気軽に取れるようになったのは、私たちの仲が深まってきた証拠だわ」"

[[dialogue]]
speaker = "蘭美"
# 「会長からそれを求めてくれるようになったのは、喜ばしいことよ……ふ、ふふふ」
line = "「会長からそれを求めてくれるようになったのは、喜ばしいことよ……ふ、ふふふ」"

[[dialogue]]
speaker = "unk"
# 俺と付き合ってほしい！
line = "俺と付き合ってほしい！"

[[dialogue]]
speaker = "unk"
# 蘭美のことが好きだ！
line = "蘭美のことが好きだ！"

[[dialogue]]
speaker = "蘭美"
# 「ぴゃゃゃゃゃっ！！！？」
line = "「ぴゃゃゃゃゃっ！！！？」"

[[dialogue]]
speaker = "蘭美"
# 「つ、つ、付き合って、って……急に、な、な、何を言い出しちゃってんのかしらっ！？」
line = "「つ、つ、付き合って、って……急に、な、な、何を言い出しちゃってんのかしらっ！？」"

[[dialogue]]
speaker = "蘭美"
# 「そ、それってもしかして……愛の告白、ということ……なの？」
line = "「そ、それってもしかして……愛の告白、ということ……なの？」"

[[dialogue]]
speaker = "蘭美"
# 「そう……曖昧だった関係を、そろそろはっきりさせよう……そういうことなのね？」
line = "「そう……曖昧だった関係を、そろそろはっきりさせよう……そういうことなのね？」"

[[dialogue]]
speaker = "蘭美"
# 「すぅ～～はぁ～～～～ふぅ……」
line = "「すぅ～～はぁ～～～～ふぅ……」"

[[dialogue]]
speaker = "蘭美"
# 「以前も話したことがあるのだけれど、もう一度確認するわ」
line = "「以前も話したことがあるのだけれど、もう一度確認するわ」"

[[dialogue]]
speaker = "蘭美"
# 「私はメイドを目指す条件として、両親から未来の婿候補を探すように言われてる」
line = "「私はメイドを目指す条件として、両親から未来の婿候補を探すように言われてる」"

[[dialogue]]
speaker = "蘭美"
# 「私と付き合うということは、魔界の貴族に婿入りするってことよ。……それも分かった上で告白してくれた、ということでいいのよね？」
line = "「私と付き合うということは、魔界の貴族に婿入りするってことよ。……それも分かった上で告白してくれた、ということでいいのよね？」"

[[dialogue]]
speaker = "蘭美"
# 「そう……貴方なら結婚相手として申し分ないわ……お父様とお母様も、きっと喜んでくれるでしょう」
line = "「そう……貴方なら結婚相手として申し分ないわ……お父様とお母様も、きっと喜んでくれるでしょう」"

[[dialogue]]
speaker = "unk"
# どうかな、蘭美？
line = "どうかな、蘭美？"

[[dialogue]]
speaker = "蘭美"
# 「……嬉しいわ、会長。貴方と恋人になれて。私の答えは、もちろんＯＫよ」
line = "「……嬉しいわ、会長。貴方と恋人になれて。私の答えは、もちろんＯＫよ」"

[[dialogue]]
speaker = "蘭美"
# 「私にしてはゆっくりした進展だったけど、その甲斐があったというものよ」
line = "「私にしてはゆっくりした進展だったけど、その甲斐があったというものよ」"

[[dialogue]]
speaker = "蘭美"
# 「それじゃ会長、晴れて恋人同士になった私たちが、一番最初にしなければならないことは、何かしら？」
line = "「それじゃ会長、晴れて恋人同士になった私たちが、一番最初にしなければならないことは、何かしら？」"

[[dialogue]]
speaker = "蘭美"
# 「ほら、恥ずかしがっていないで……ここまで来たらちゃんときめなさい」
line = "「ほら、恥ずかしがっていないで……ここまで来たらちゃんときめなさい」"

[[dialogue]]
speaker = "unk"
# 目を閉じてくれる？
line = "目を閉じてくれる？"

[[dialogue]]
speaker = "蘭美"
# 「ん<emoji=heart04>　わかったわ」
line = "「ん<emoji=heart04>　わかったわ」"

[[dialogue]]
speaker = "蘭美"
# 「はぁ……ちゅ<emoji=heart04>　ちゅ、んんっ<emoji=heart04>」
line = "「はぁ……ちゅ<emoji=heart04>　ちゅ、んんっ<emoji=heart04>」"

[[dialogue]]
speaker = "蘭美"
# 「ふぁ……。ふふっ、口づけは初めて、ね……」
line = "「ふぁ……。ふふっ、口づけは初めて、ね……」"

[[dialogue]]
speaker = "蘭美"
# 「不思議な感じだったわ……でも、これからは沢山、こういうこともしていって……当たり前のように出来るようになるのかしら」
line = "「不思議な感じだったわ……でも、これからは沢山、こういうこともしていって……当たり前のように出来るようになるのかしら」"

[[dialogue]]
speaker = "蘭美"
# 「会長。今後は恋人として、それから婚約者として、末永くよろしく頼むわよ<emoji=heart04>」
line = "「会長。今後は恋人として、それから婚約者として、末永くよろしく頼むわよ<emoji=heart04>」"
