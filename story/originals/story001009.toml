[[dialogue]]
speaker = "unk"
# 目の前の堕天使パテルを全て倒し、急ぎ駆けつけると──
line = "目の前の堕天使パテルを全て倒し、急ぎ駆けつけると──"

[[dialogue]]
speaker = "フラン"
# 「よぉ、そっちも終わったか。さっきは助かったぜ、サンキュー」
line = "「よぉ、そっちも終わったか。さっきは助かったぜ、サンキュー」"

[[dialogue]]
speaker = "グロリア"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# 何かあった……？
line = "何かあった……？"

[[dialogue]]
speaker = "グロリア"
# 「ああ、いえ……あったといえば、あったのでしょうか……」
line = "「ああ、いえ……あったといえば、あったのでしょうか……」"

[[dialogue]]
speaker = "パテル"
# 「やっほー魔王！　フィーニスの塔ではお世話になったね！」
line = "「やっほー魔王！　フィーニスの塔ではお世話になったね！」"

[[dialogue]]
speaker = "unk"
# プルちゃん！？
line = "プルちゃん！？"

[[dialogue]]
speaker = "フラン"
# 「こいつ、守護天使パテルだったんだってよ。オレたちを騙してやがった」
line = "「こいつ、守護天使パテルだったんだってよ。オレたちを騙してやがった」"

[[dialogue]]
speaker = "パテル"
# 「騙してたって人聞き悪いな～。ま、ホントのことだけど」
line = "「騙してたって人聞き悪いな～。ま、ホントのことだけど」"

[[dialogue]]
speaker = "フラン"
# 「グロリアを囮にしやがったくせに悪びれねえな。しかも余計なことをズケズケ言ってきやがったし」
line = "「グロリアを囮にしやがったくせに悪びれねえな。しかも余計なことをズケズケ言ってきやがったし」"

[[dialogue]]
speaker = "パテル"
# 「うーん、お節介だったかー。高位存在である守護天使が普通のいち天使に接するのは難しいねえ～」
line = "「うーん、お節介だったかー。高位存在である守護天使が普通のいち天使に接するのは難しいねえ～」"

[[dialogue]]
speaker = "フラン"
# 「この期に及んでマウント取ってきてんじゃねえ！」
line = "「この期に及んでマウント取ってきてんじゃねえ！」"

[[dialogue]]
speaker = "パテル"
# 「アハハッ」
line = "「アハハッ」"

[[dialogue]]
speaker = "グロリア"
# 「まぁまぁ、私は無事でしたし、プルちゃんなりに私を想ってのことですから……」
line = "「まぁまぁ、私は無事でしたし、プルちゃんなりに私を想ってのことですから……」"

[[dialogue]]
speaker = "フラン"
# 「フンッ」
line = "「フンッ」"

[[dialogue]]
speaker = "パテル"
# 「ま、グロリアをエサにしたとはいえ、死なせるつもりはなかったんだけどさ」
line = "「ま、グロリアをエサにしたとはいえ、死なせるつもりはなかったんだけどさ」"

[[dialogue]]
speaker = "パテル"
# 「生き物の生き死にに直接関わらないのがあたしのポリシー。だからこそ、堕天使パテルは止めなくちゃいけなかった」
line = "「生き物の生き死にに直接関わらないのがあたしのポリシー。だからこそ、堕天使パテルは止めなくちゃいけなかった」"

[[dialogue]]
speaker = "パテル"
# 「堕天使パテルは死神のくせに……というか自分が死神だからか、生存本能が強いからね。敏感ですぐに逃げる」
line = "「堕天使パテルは死神のくせに……というか自分が死神だからか、生存本能が強いからね。敏感ですぐに逃げる」"

[[dialogue]]
speaker = "パテル"
# 「エサが必要だったんだよ。花の蜜のような、あま～い匂いのエサがね。それがグロリアってわけ」
line = "「エサが必要だったんだよ。花の蜜のような、あま～い匂いのエサがね。それがグロリアってわけ」"

[[dialogue]]
speaker = "パテル"
# 「おかげで堕天使を倒せたけど──間に合わなかったね」
line = "「おかげで堕天使を倒せたけど──間に合わなかったね」"

[[dialogue]]
speaker = "グロリア"
# 「プルちゃん……！？」
line = "「プルちゃん……！？」"

[[dialogue]]
speaker = "フラン"
# 「──！」
line = "「──！」"

[[dialogue]]
speaker = "unk"
# パテルが堕天使になった……！？
line = "パテルが堕天使になった……！？"

[[dialogue]]
speaker = "パテル"
# 「確かに<ruby=あたし>パテル</ruby>は意識を取り戻した。だけど元は堕天使だからね。完全じゃない。一時的なものだ」
line = "「確かに<ruby>パテル<rt>あたし</rt></ruby>は意識を取り戻した。だけど元は堕天使だからね。完全じゃない。一時的なものだ」"

[[dialogue]]
speaker = "パテル"
# 「分裂した堕天使を倒せば何とかなるかと思ったけど……結果はご覧の通り。堕天使に引きずられてこの有様さ」
line = "「分裂した堕天使を倒せば何とかなるかと思ったけど……結果はご覧の通り。堕天使に引きずられてこの有様さ」"

[[dialogue]]
speaker = "パテル"
# 「あたしはもうすぐまた理性を失って、あなたたちを襲う。だからその前に、あなたたちの手であたしを消して」
line = "「あたしはもうすぐまた理性を失って、あなたたちを襲う。だからその前に、あなたたちの手であたしを消して」"

[[dialogue]]
speaker = "グロリア"
# 「そんな……せっかく仲良くなれたと思ったのに……」
line = "「そんな……せっかく仲良くなれたと思ったのに……」"

[[dialogue]]
speaker = "パテル"
# 「仲良くなれたからこそだよ。あなたたちにお願いしたいんだ」
line = "「仲良くなれたからこそだよ。あなたたちにお願いしたいんだ」"

[[dialogue]]
speaker = "グロリア"
# 「また会えます……よね？」
line = "「また会えます……よね？」"

[[dialogue]]
speaker = "パテル"
# 「さあ？　わかんない」
line = "「さあ？　わかんない」"

[[dialogue]]
speaker = "グロリア"
# 「えっ！？　でもマグダレナ様やアルモタヘル様は……」
line = "「えっ！？　でもマグダレナ様やアルモタヘル様は……」"

[[dialogue]]
speaker = "パテル"
# 「義体はもう残ってないかもしれないし、あたしの魂が適合するかもわからない。今回は分裂なんて無茶をやったから、余計に難しいかもね」
line = "「義体はもう残ってないかもしれないし、あたしの魂が適合するかもわからない。今回は分裂なんて無茶をやったから、余計に難しいかもね」"

[[dialogue]]
speaker = "パテル"
# 「それに『淘汰』を司るあたしは、守護天使の中じゃ珍しいリクリエ静観派だから。そもそもあなたたちの前に現れる理由がないかも」
line = "「それに『淘汰』を司るあたしは、守護天使の中じゃ珍しいリクリエ静観派だから。そもそもあなたたちの前に現れる理由がないかも」"

[[dialogue]]
speaker = "グロリア"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "フラン"
# 「ハッ、お前の顔を見なくて済むと思うとせいせいするぜ」
line = "「ハッ、お前の顔を見なくて済むと思うとせいせいするぜ」"

[[dialogue]]
speaker = "パテル"
# 「ハハッ、フランは守護天使が相手でも変わらないね。ホント生意気」
line = "「ハハッ、フランは守護天使が相手でも変わらないね。ホント生意気」"

[[dialogue]]
speaker = "パテル"
# 「皮肉なものだよ。死神であるあたしが、仮初とはいえこうして死を経験するなんて……」
line = "「皮肉なものだよ。死神であるあたしが、仮初とはいえこうして死を経験するなんて……」"

[[dialogue]]
speaker = "パテル"
# 「もうだいぶ眠くなってきた。さぁ……早くあたしを……」
line = "「もうだいぶ眠くなってきた。さぁ……早くあたしを……」"

[[dialogue]]
speaker = "グロリア"
# 「さようなら……プルちゃん」
line = "「さようなら……プルちゃん」"

[[dialogue]]
speaker = "パテル"
# 「あたしも……挨拶しなきゃ……」
line = "「あたしも……挨拶しなきゃ……」"

[[dialogue]]
speaker = "パテル"
# 「縁があったらまた会おうね。シーユー」
line = "「縁があったらまた会おうね。シーユー」"
