[[dialogue]]
speaker = "モネ"
# 「出張図書コンシェルジュ──第２弾です！」
line = "「出張図書コンシェルジュ──第２弾です！」"

[[dialogue]]
speaker = "カティア"
# 「しゅっちょう……としょ……こんしぇるじゅ……？」
line = "「しゅっちょう……としょ……こんしぇるじゅ……？」"

[[dialogue]]
speaker = "モネ"
# 「はい。あなたにぴったりな一冊を図書委員の紙屋敷モネがご紹介します」
line = "「はい。あなたにぴったりな一冊を図書委員の紙屋敷モネがご紹介します」"

[[dialogue]]
speaker = "カティア"
# 「え～、モネ先輩には悪いけど、私本読まないしなー」
line = "「え～、モネ先輩には悪いけど、私本読まないしなー」"

[[dialogue]]
speaker = "モネ"
# 「まぁまぁそうおっしゃらず。カティアさんのお役に立てる本がきっとありますよ。図書館ですから全部無料ですし」
line = "「まぁまぁそうおっしゃらず。カティアさんのお役に立てる本がきっとありますよ。図書館ですから全部無料ですし」"

[[dialogue]]
speaker = "カティア"
# 「そんなこと言って、後でお金取られるんじゃないですか？　うちの村じゃ本は貴重でしたし、読み放題なんて言われても信じられないんですけど」
line = "「そんなこと言って、後でお金取られるんじゃないですか？　うちの村じゃ本は貴重でしたし、読み放題なんて言われても信じられないんですけど」"

[[dialogue]]
speaker = "モネ"
# 「取りませんよ。汚したり破いたりしたら弁償になることはありますが」
line = "「取りませんよ。汚したり破いたりしたら弁償になることはありますが」"

[[dialogue]]
speaker = "カティア"
# 「でも教科書読むのもめんどくさいくらいだし、漫画しか読まないし……」
line = "「でも教科書読むのもめんどくさいくらいだし、漫画しか読まないし……」"

[[dialogue]]
speaker = "モネ"
# 「漫画も図書館にありますよ。さすがに最新の作品まで網羅しているわけではないですけどね」
line = "「漫画も図書館にありますよ。さすがに最新の作品まで網羅しているわけではないですけどね」"

[[dialogue]]
speaker = "カティア"
# 「ほんとに？」
line = "「ほんとに？」"

[[dialogue]]
speaker = "モネ"
# 「はい。ですがカティアさんには他にもおすすめがあって──」
line = "「はい。ですがカティアさんには他にもおすすめがあって──」"

[[dialogue]]
speaker = "イクシリオン"
# 「手が離せないウィステリアさんの代わりに、今日は私が図書館デリバリーです。こんにちは、カティアさん」
line = "「手が離せないウィステリアさんの代わりに、今日は私が図書館デリバリーです。こんにちは、カティアさん」"

[[dialogue]]
speaker = "カティア"
# 「なんでイクシーが？　図書委員だったっけ？」
line = "「なんでイクシーが？　図書委員だったっけ？」"

[[dialogue]]
speaker = "イクシリオン"
# 「保健委員ですがモネさんのお手伝いで。モネさん、こちらがご依頼の本です」
line = "「保健委員ですがモネさんのお手伝いで。モネさん、こちらがご依頼の本です」"

[[dialogue]]
speaker = "モネ"
# 「ありがとうございます、イクシーさん。──というわけで、カティアさんにおすすめしたいのはこの植物図鑑です！」
line = "「ありがとうございます、イクシーさん。──というわけで、カティアさんにおすすめしたいのはこの植物図鑑です！」"

[[dialogue]]
speaker = "カティア"
# 「ずかん？」
line = "「ずかん？」"

[[dialogue]]
speaker = "モネ"
# 「はい。カティアさんは花壇のお世話をされてますし、お花がお好きですよね？　この図鑑は、植物の生態が写真とともに掲載されています」
line = "「はい。カティアさんは花壇のお世話をされてますし、お花がお好きですよね？　この図鑑は、植物の生態が写真とともに掲載されています」"

[[dialogue]]
speaker = "カティア"
# 「へ～……でもそれくらいＤＩＳＣで調べられるし……」
line = "「へ～……でもそれくらいＤＩＳＣで調べられるし……」"

[[dialogue]]
speaker = "モネ"
# 「確かにＤＩＳＣでも調べものはできます。だけどネットの情報って断片的だったり、ブレがあったり、なかなか確度の高い情報に辿りつけないこともあります」
line = "「確かにＤＩＳＣでも調べものはできます。だけどネットの情報って断片的だったり、ブレがあったり、なかなか確度の高い情報に辿りつけないこともあります」"

[[dialogue]]
speaker = "モネ"
# 「そういう時は案外本の方が早く調べられますよ。専門家や出版社が関わっている分、一定の信用性もありますからね」
line = "「そういう時は案外本の方が早く調べられますよ。専門家や出版社が関わっている分、一定の信用性もありますからね」"

[[dialogue]]
speaker = "カティア"
# 「ふ～ん」
line = "「ふ～ん」"

[[dialogue]]
speaker = "イクシリオン"
# （おや、こちらは野草の本ですか。オオイヌノフグリ……あのかわいらしい花はそんな名前なのですね）
line = "（おや、こちらは野草の本ですか。オオイヌノフグリ……あのかわいらしい花はそんな名前なのですね）"

[[dialogue]]
speaker = "イクシリオン"
# （ふむふむ……イヌノフグリという植物に似ているから、“オオ”イヌノフグリと。しかしフグリとは何のことでしょうか？）
line = "（ふむふむ……イヌノフグリという植物に似ているから、“オオ”イヌノフグリと。しかしフグリとは何のことでしょうか？）"

[[dialogue]]
speaker = "イクシリオン"
# （！　フグリとは……なんと……！？）
line = "（！　フグリとは……なんと……！？）"

[[dialogue]]
speaker = "モネ"
# 「それとカティアさんに読んでもらいたいのがこの１冊──『自由な庭づくり』です」
line = "「それとカティアさんに読んでもらいたいのがこの１冊──『自由な庭づくり』です」"

[[dialogue]]
speaker = "モネ"
# 「ガーデニング初心者から上級者まで幅広く対応した本で、さまざまな植物の環境に合わせた育て方が書かれているんですよ」
line = "「ガーデニング初心者から上級者まで幅広く対応した本で、さまざまな植物の環境に合わせた育て方が書かれているんですよ」"

[[dialogue]]
speaker = "カティア"
# 「あ、これ、気になってたやつも載ってる」
line = "「あ、これ、気になってたやつも載ってる」"

[[dialogue]]
speaker = "モネ"
# 「もしお気に召したのなら、図書館にいらしてください。他にもお花の本がたくさんありますよ」
line = "「もしお気に召したのなら、図書館にいらしてください。他にもお花の本がたくさんありますよ」"

[[dialogue]]
speaker = "カティア"
# 「でも図書館に来るのって、真面目な人ばっかりじゃないんですか？」
line = "「でも図書館に来るのって、真面目な人ばっかりじゃないんですか？」"

[[dialogue]]
speaker = "モネ"
# 「大丈夫ですよ。図書館は本好きの人だけの場所ではありませんから」
line = "「大丈夫ですよ。図書館は本好きの人だけの場所ではありませんから」"

[[dialogue]]
speaker = "モネ"
# 「騒いだり本を汚してはいけませんけど、勉強でも休憩でも、気分転換でも、気軽に来てください。もちろん漫画を読みに来るのでもいいです」
line = "「騒いだり本を汚してはいけませんけど、勉強でも休憩でも、気分転換でも、気軽に来てください。もちろん漫画を読みに来るのでもいいです」"

[[dialogue]]
speaker = "モネ"
# 「ぼーっとたくさんの本を眺めて、気が向いたときに本を手に取る。それでも全然いいと思います」
line = "「ぼーっとたくさんの本を眺めて、気が向いたときに本を手に取る。それでも全然いいと思います」"

[[dialogue]]
speaker = "モネ"
# 「司書さんや図書委員がいつでも相談を受け付けます。図書館はただ本があるだけの場所ではないんですから」
line = "「司書さんや図書委員がいつでも相談を受け付けます。図書館はただ本があるだけの場所ではないんですから」"

[[dialogue]]
speaker = "カティア"
# 「そこまで言うなら……行ってあげてもいいです」
line = "「そこまで言うなら……行ってあげてもいいです」"

[[dialogue]]
speaker = "モネ"
# 「はい！　お待ちしています！」
line = "「はい！　お待ちしています！」"

[[dialogue]]
speaker = "イクシリオン"
# 「オオイヌノ……フグリ」
line = "「オオイヌノ……フグリ」"

[[dialogue]]
speaker = "モネ"
# 「オオイヌノフグリがどうされたんですか？」
line = "「オオイヌノフグリがどうされたんですか？」"

[[dialogue]]
speaker = "イクシリオン"
# 「きゃっ！？　モネさんったら大胆な……」
line = "「きゃっ！？　モネさんったら大胆な……」"

[[dialogue]]
speaker = "モネ"
# 「はい？」
line = "「はい？」"

[[dialogue]]
speaker = "カティア"
# 「せっかくだし図書館で調べて何か育ててみようかなー。バタフライピーとかいいかな」
line = "「せっかくだし図書館で調べて何か育ててみようかなー。バタフライピーとかいいかな」"

[[dialogue]]
speaker = "イクシリオン"
# 「！　バタフライピーは熱帯アジア原産のマメ科の多年草。和名はチョウマメ。学名はクリトリア……」
line = "「！　バタフライピーは熱帯アジア原産のマメ科の多年草。和名はチョウマメ。学名はクリトリア……」"

[[dialogue]]
speaker = "カティア"
# 「イクシーはなんでそんなにバタフライピーに詳しいの？」
line = "「イクシーはなんでそんなにバタフライピーに詳しいの？」"

[[dialogue]]
speaker = "イクシリオン"
# 「いえ、以前調べたことがありまして……。あとスッポンタケも調べました！」
line = "「いえ、以前調べたことがありまして……。あとスッポンタケも調べました！」"

[[dialogue]]
speaker = "カティア"
# 「いやキノコの話してないし」
line = "「いやキノコの話してないし」"

[[dialogue]]
speaker = "イクシリオン"
# 「あ……コホン、失礼しました」
line = "「あ……コホン、失礼しました」"

[[dialogue]]
speaker = "カティア"
# 「？　変なイクシー」
line = "「？　変なイクシー」"
