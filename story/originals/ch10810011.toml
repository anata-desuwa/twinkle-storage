line = "「だーかーら、ソレはやめろって言ったろ？」"

[[dialogue]]
speaker = "グロリア"
# 「あっ、ごめんなさい。素敵な方に出会うとどうしても……なんだか口癖になっているみたいで」
line = "「あっ、ごめんなさい。素敵な方に出会うとどうしても……なんだか口癖になっているみたいで」"

[[dialogue]]
speaker = "フラン"
