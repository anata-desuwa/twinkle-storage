line = "「ありがとうございます……！　ですが、私が善い人というのは買い被りですよ」"

[[dialogue]]
speaker = "グロリア"
# 「今までの私は、人々の幸せのために尽くしていたのではなく、一刻も早く両親の元へと赴くために善行を積んでいたんです」
line = "「今までの私は、人々の幸せのために尽くしていたのではなく、一刻も早く両親の元へと赴くために善行を積んでいたんです」"

[[dialogue]]
speaker = "グロリア"
# 「とても利己的な、偽善だったんです。ですから、褒められるようなことは何も……」
line = "「とても利己的な、偽善だったんです。ですから、褒められるようなことは何も……」"

[[dialogue]]
