[[dialogue]]
speaker = "グロリア"
# 「ええ、まあ……ゴミ拾いのボランティアや子ども会のお食事会に参加したり、孤児院に慰問したりとか、ですけど――」
line = "「ええ、まあ……ゴミ拾いのボランティアや子ども会のお食事会に参加したり、孤児院に慰問したりとか、ですけど――」"

