[[dialogue]]
speaker = "unk"
# 第３話,アイドルの沸点,P
line = "第３話,アイドルの沸点,P"

[[dialogue]]
speaker = "unk"
# レミカと仲良くなってから、時間が合った時は、戦闘訓練も一緒にすることが多くなっていた――
line = "レミカと仲良くなってから、時間が合った時は、戦闘訓練も一緒にすることが多くなっていた――"

[[dialogue]]
speaker = "レミカ"
# 「ふぅ……さっきの戦闘時の連携、パーフェクト、かな？」
line = "「ふぅ……さっきの戦闘時の連携、パーフェクト、かな？」"

[[dialogue]]
speaker = "レミカ"
# 「――ん？　アイドルなのに星騎士としても努力してるのは、凄い？」
line = "「――ん？　アイドルなのに星騎士としても努力してるのは、凄い？」"

[[dialogue]]
speaker = "レミカ"
# 「元々は家庭の事情で、星力持ちなら学費がかからないからっていう、現金な入学理由だったんだけどね」
line = "「元々は家庭の事情で、星力持ちなら学費がかからないからっていう、現金な入学理由だったんだけどね」"

[[dialogue]]
speaker = "レミカ"
# 「でも、私が思い描くアイドルは、自分に戦える力があるなら、皆の笑顔の為にリクリエから決して逃げたりしない――」
line = "「でも、私が思い描くアイドルは、自分に戦える力があるなら、皆の笑顔の為にリクリエから決して逃げたりしない――」"

[[dialogue]]
speaker = "レミカ"
# 「だから私は、歌って踊って戦える、完全無欠――最高で最強のトップアイドルを目指してるんだ」
line = "「だから私は、歌って踊って戦える、完全無欠――最高で最強のトップアイドルを目指してるんだ」"

[[dialogue]]
speaker = "unk"
# 俺も歌いながら戦ってみるかな
line = "俺も歌いながら戦ってみるかな"

[[dialogue]]
speaker = "レミカ"
# 「なんで？　――戦闘中の私の歌で、力が湧いた気がするから？」
line = "「なんで？　――戦闘中の私の歌で、力が湧いた気がするから？」"

[[dialogue]]
speaker = "レミカ"
# 「いやそれ、戦闘時の私の歌は星術だし。というか、歌で戦うんじゃなくて、歌いながら殴りかかるって……」
line = "「いやそれ、戦闘時の私の歌は星術だし。というか、歌で戦うんじゃなくて、歌いながら殴りかかるって……」"

[[dialogue]]
speaker = "レミカ"
# 「ぷっ……ふ、ふふっ……！」
line = "「ぷっ……ふ、ふふっ……！」"

[[dialogue]]
speaker = "unk"
# あ、ツボった
line = "あ、ツボった"

[[dialogue]]
speaker = "レミカ"
# 「……すぅ～……はぁ……ふぅ。いや、別に笑ってないから」
line = "「……すぅ～……はぁ……ふぅ。いや、別に笑ってないから」"

[[dialogue]]
speaker = "レミカ"
# 「アイドルはそんな程度で笑ったりしない」
line = "「アイドルはそんな程度で笑ったりしない」"

[[dialogue]]
speaker = "unk"
# レミカって笑いの沸点低いよね
line = "レミカって笑いの沸点低いよね"

[[dialogue]]
speaker = "レミカ"
# 「は？　何言ってんの？　そんなわけないじゃん」
line = "「は？　何言ってんの？　そんなわけないじゃん」"

[[dialogue]]
speaker = "レミカ"
# 「今のはちょっと間が悪く、くしゃみしそうになっただけだから。会長の勘違いだよ」
line = "「今のはちょっと間が悪く、くしゃみしそうになっただけだから。会長の勘違いだよ」"

[[dialogue]]
speaker = "レミカ"
# 「って、何その疑いの眼差しは？　違うから。私の沸点は低くない」
line = "「って、何その疑いの眼差しは？　違うから。私の沸点は低くない」"

[[dialogue]]
speaker = "レミカ"
# 「――え？　何？　ヴィーナスのモノマネをする？　いきなりどういう……」
line = "「――え？　何？　ヴィーナスのモノマネをする？　いきなりどういう……」"

[[dialogue]]
speaker = "unk"
# 困った時のファンこそ、真のファンってことよね！
line = "困った時のファンこそ、真のファンってことよね！"

[[dialogue]]
speaker = "レミカ"
# 「っ……！！！！！！　っ……！！　はぁぁぁ！　くっっ！　ふふっ…………んふぅっっっ！！！」
line = "「っ……！！！！！！　っ……！！　はぁぁぁ！　くっっ！　ふふっ…………んふぅっっっ！！！」"

[[dialogue]]
speaker = "レミカ"
# 「すぅぅ～～～……はぁぁ～～…………。ん、全然似てない」
line = "「すぅぅ～～～……はぁぁ～～…………。ん、全然似てない」"

[[dialogue]]
speaker = "unk"
# ……やっぱり沸点低いよね？
line = "……やっぱり沸点低いよね？"

[[dialogue]]
speaker = "レミカ"
# 「絶対にそんなことない。アイドルはそんな簡単に笑ったりしない」
line = "「絶対にそんなことない。アイドルはそんな簡単に笑ったりしない」"

[[dialogue]]
speaker = "レミカ"
# 「今のは運動した後によくある、脇腹ちょっと痛くなるやつが来ただけから」
line = "「今のは運動した後によくある、脇腹ちょっと痛くなるやつが来ただけから」"

[[dialogue]]
speaker = "unk"
# （歌いながら戦うフリを見せる）
line = "（歌いながら戦うフリを見せる）"

[[dialogue]]
speaker = "レミカ"
# 「ぐふっ……！　ちょっ、またそれ……ぷっ……ふっ……ふふ……ふふふっ……！」
line = "「ぐふっ……！　ちょっ、またそれ……ぷっ……ふっ……ふふ……ふふふっ……！」"

[[dialogue]]
speaker = "レミカ"
# 「い、いや……笑ってない……私は何も見てないから……ふふふっ……！」
line = "「い、いや……笑ってない……私は何も見てないから……ふふふっ……！」"

[[dialogue]]
speaker = "レミカ"
# 「って、まだ続けるの？　シュール過ぎて、そんなの絶対に笑えないから、いくら続けても、む、無駄だから……くっ……ふふっ……ふっ……！」
line = "「って、まだ続けるの？　シュール過ぎて、そんなの絶対に笑えないから、いくら続けても、む、無駄だから……くっ……ふふっ……ふっ……！」"

[[dialogue]]
speaker = "レミカ"
# 「ああもう、とにかくそれ禁止っ、禁止だからっ」
line = "「ああもう、とにかくそれ禁止っ、禁止だからっ」"

[[dialogue]]
speaker = "レミカ"
# 「え～、とか言わない。私をからかって遊んでるでしょ」
line = "「え～、とか言わない。私をからかって遊んでるでしょ」"

[[dialogue]]
speaker = "unk"
# 反応が面白いから、もっと見たかった……
line = "反応が面白いから、もっと見たかった……"

[[dialogue]]
speaker = "レミカ"
# 「いや、面白いとかないから。アイドルはお笑い芸人じゃないんだよ」
line = "「いや、面白いとかないから。アイドルはお笑い芸人じゃないんだよ」"

[[dialogue]]
speaker = "レミカ"
# 「――そこにこだわる必要があるのかって？　だって……私の目指すアイドルはカッコ可愛いものだから」
line = "「――そこにこだわる必要があるのかって？　だって……私の目指すアイドルはカッコ可愛いものだから」"

[[dialogue]]
speaker = "レミカ"
# 「ちょっとしたことですぐツボるとか、カッコよくないし……」
line = "「ちょっとしたことですぐツボるとか、カッコよくないし……」"

[[dialogue]]
speaker = "unk"
# ギャップがあって可愛いと思うけどなぁ
line = "ギャップがあって可愛いと思うけどなぁ"

[[dialogue]]
speaker = "レミカ"
# 「ふ～ん、可愛い……って、はぁ！？」
line = "「ふ～ん、可愛い……って、はぁ！？」"

[[dialogue]]
speaker = "レミカ"
# 「い、いきなり何言ってんの！？　ば、バカじゃないの、会長……っ」
line = "「い、いきなり何言ってんの！？　ば、バカじゃないの、会長……っ」"

[[dialogue]]
speaker = "レミカ"
# 「変なことばかり言うから、恥ずかしくなってきたじゃん。負けてるみたいで、なんか悔しいんだけど……」
line = "「変なことばかり言うから、恥ずかしくなってきたじゃん。負けてるみたいで、なんか悔しいんだけど……」"

[[dialogue]]
speaker = "レミカ"
# 「っ……こうなったら……会長も同じ目にあってもらうから……！」
line = "「っ……こうなったら……会長も同じ目にあってもらうから……！」"

[[dialogue]]
speaker = "レミカ"
# 「――どういうことって……こういうことっ」
line = "「――どういうことって……こういうことっ」"

[[dialogue]]
speaker = "unk"
# ちょっ……くすぐったい！　あははははは！
line = "ちょっ……くすぐったい！　あははははは！"

[[dialogue]]
speaker = "レミカ"
# 「こちょこちょこちょこちょこちょ～」
line = "「こちょこちょこちょこちょこちょ～」"

[[dialogue]]
speaker = "レミカ"
# 「散々笑わせようとしてきた、お返し。簡単には許さないから」
line = "「散々笑わせようとしてきた、お返し。簡単には許さないから」"

[[dialogue]]
speaker = "レミカ"
# 「あ、でも……これちょっと楽しい、かも♪」
line = "「あ、でも……これちょっと楽しい、かも♪」"

[[dialogue]]
speaker = "unk"
# ご、ゴメン、謝るから許して……！
line = "ご、ゴメン、謝るから許して……！"

[[dialogue]]
speaker = "unk"
# その後も楽しそうに、中々くすぐりを止めてくれないレミカなのだった――
line = "その後も楽しそうに、中々くすぐりを止めてくれないレミカなのだった――"
