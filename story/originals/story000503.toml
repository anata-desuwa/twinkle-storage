[[dialogue]]
speaker = "フィオナ"
# 「同じ流星学園といっても、雰囲気は異なるものなのですね。かと思えば似ているところもあって……これが平行世界……！」
line = "「同じ流星学園といっても、雰囲気は異なるものなのですね。かと思えば似ているところもあって……これが平行世界……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「フィオナがいつになく目を輝かせてる気がするわ……」
line = "「フィオナがいつになく目を輝かせてる気がするわ……」"

[[dialogue]]
speaker = "unk"
# この辺りで一度休憩しようか
line = "この辺りで一度休憩しようか"

[[dialogue]]
speaker = "マグダレナ"
# 「そうですね。この世界の話も詳しくお伺いしたいですし」
line = "「そうですね。この世界の話も詳しくお伺いしたいですし」"

[[dialogue]]
speaker = "リア"
# 「ふふ、それじゃあみんなで何か甘い物でも食べよっか」
line = "「ふふ、それじゃあみんなで何か甘い物でも食べよっか」"

[[dialogue]]
speaker = "聖沙"
# 「ところであなた、咲良クンと同じく生徒会長で魔王らしいわね？」
line = "「ところであなた、咲良クンと同じく生徒会長で魔王らしいわね？」"

[[dialogue]]
speaker = "聖沙"
# 「なんでもその立場を利用して、たくさんの女の子にちょっかいを出しているだとか」
line = "「なんでもその立場を利用して、たくさんの女の子にちょっかいを出しているだとか」"

[[dialogue]]
speaker = "unk"
# ちょっかいなんて出してない
line = "ちょっかいなんて出してない"

[[dialogue]]
speaker = "聖沙"
# 「問答無用！　いい？　生徒会長ってのはね、みんなの『期待』と『責任』を背負う大事な役職なの。軟派な人には決して務まらないわ」
line = "「問答無用！　いい？　生徒会長ってのはね、みんなの『期待』と『責任』を背負う大事な役職なの。軟派な人には決して務まらないわ」"

[[dialogue]]
speaker = "unk"
# わかってるつもりだ
line = "わかってるつもりだ"

[[dialogue]]
speaker = "聖沙"
# 「え？　そう？　あなたはずいぶん素直なのね……」
line = "「え？　そう？　あなたはずいぶん素直なのね……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「フッ……心配は無用よ。なんてったって、クロトは御前試合で私に勝ったんだから！」
line = "「フッ……心配は無用よ。なんてったって、クロトは御前試合で私に勝ったんだから！」"

[[dialogue]]
speaker = "聖沙"
# 「御前試合？　何それ？　会長の座をかけて一騎打ち……？」
line = "「御前試合？　何それ？　会長の座をかけて一騎打ち……？」"

[[dialogue]]
speaker = "聖沙"
# 「え～っ、そんなのアリなの！？　そんなことできるなら私だって咲良クンと──ってそうじゃないわ！　会長を決めるのは普通選挙でしょ！　戦闘民族なの！？」
line = "「え～っ、そんなのアリなの！？　そんなことできるなら私だって咲良クンと──ってそうじゃないわ！　会長を決めるのは普通選挙でしょ！　戦闘民族なの！？」"

[[dialogue]]
speaker = "聖沙"
# 「成り行きで会長になったあなたが、本当に会長にふさわしいか、私が試してあげる。いざ尋常に──勝負よ！！」
line = "「成り行きで会長になったあなたが、本当に会長にふさわしいか、私が試してあげる。いざ尋常に──勝負よ！！」"

[[dialogue]]
speaker = "unk"
# しょ、勝負！？
line = "しょ、勝負！？"

[[dialogue]]
speaker = "聖沙"
# 「何も力比べをしようというわけじゃないわ。あなたの器量を測ってあげようってだけ」
line = "「何も力比べをしようというわけじゃないわ。あなたの器量を測ってあげようってだけ」"

[[dialogue]]
speaker = "雑魚魔族"
# 「イー！」
line = "「イー！」"

[[dialogue]]
speaker = "聖沙"
# 「ふふ、そら見なさい。魔族もあなたの器を確かめたがって──」
line = "「ふふ、そら見なさい。魔族もあなたの器を確かめたがって──」"

[[dialogue]]
speaker = "聖沙"
# 「って、魔族ぅ！！？」
line = "「って、魔族ぅ！！？」"

[[dialogue]]
speaker = "unk"
# 大変だ、みんなのお菓子が！
line = "大変だ、みんなのお菓子が！"

[[dialogue]]
speaker = "聖沙"
# 「んもうっ！　お姉さまのお菓子を勝手に食べないで！　ああもう、こんなにたくさん現れて……！！」
line = "「んもうっ！　お姉さまのお菓子を勝手に食べないで！　ああもう、こんなにたくさん現れて……！！」"

[[dialogue]]
speaker = "聖沙"
# 「まぁいいわ、悪さをするならやっつけるだけよ！」
line = "「まぁいいわ、悪さをするならやっつけるだけよ！」"

[[dialogue]]
speaker = "聖沙"
# 「主と共に在り、峻烈の紫光を以て引き裂け迅雷の天使──エクラエル！」
line = "「主と共に在り、峻烈の紫光を以て引き裂け迅雷の天使──エクラエル！」"

[[dialogue]]
speaker = "聖沙"
# 「さぁ、あなたも早く変身しなさい。どちらがより多くの魔族をやっつけられるか勝負よ！」
line = "「さぁ、あなたも早く変身しなさい。どちらがより多くの魔族をやっつけられるか勝負よ！」"

[[dialogue]]
speaker = "聖沙"
# 「私にやっつけられた魔族は挙手ー！」
line = "「私にやっつけられた魔族は挙手ー！」"

[[dialogue]]
speaker = "雑魚魔族"
# 「イー！　イー！」
line = "「イー！　イー！」"

[[dialogue]]
speaker = "聖沙"
# 「ふむふむ。じゃあ彼にやっつけられた魔族は挙手ー！」
line = "「ふむふむ。じゃあ彼にやっつけられた魔族は挙手ー！」"

[[dialogue]]
speaker = "雑魚魔族"
# 「イー！　イー！　イー！　イー！」
line = "「イー！　イー！　イー！　イー！」"

[[dialogue]]
speaker = "聖沙"
# 「う……。ま、負けたわ……」
line = "「う……。ま、負けたわ……」"

[[dialogue]]
speaker = "聖沙"
# 「くぅ～っ！　でもあなたに生徒会長や魔王としての素質が最低限あることはわかったわ。とりあえず……それは認めてあげる」
line = "「くぅ～っ！　でもあなたに生徒会長や魔王としての素質が最低限あることはわかったわ。とりあえず……それは認めてあげる」"

[[dialogue]]
speaker = "聖沙"
# 「だけど油断はしないことね。いつ如何なる時も誰かと真剣勝負をしていると思いなさい」
line = "「だけど油断はしないことね。いつ如何なる時も誰かと真剣勝負をしていると思いなさい」"

[[dialogue]]
speaker = "聖沙"
# 「生徒会長として、魔王として、みんなを率いて立ちたいと思うのなら尚更ね」
line = "「生徒会長として、魔王として、みんなを率いて立ちたいと思うのなら尚更ね」"

[[dialogue]]
speaker = "unk"
# ああ！
line = "ああ！"

[[dialogue]]
speaker = "聖沙"
# 「良い返事よ。ふふ、咲良クンより断然見込みがあるじゃない」
line = "「良い返事よ。ふふ、咲良クンより断然見込みがあるじゃない」"

[[dialogue]]
speaker = "リア"
# 「くすくす。聖沙ちゃんったら、少し見ない間に随分と会長さんと仲良しになっちゃって。シン君にちょっと似てるからかな？」
line = "「くすくす。聖沙ちゃんったら、少し見ない間に随分と会長さんと仲良しになっちゃって。シン君にちょっと似てるからかな？」"

[[dialogue]]
speaker = "聖沙"
# 「ち、違います、お姉さま……！　私はただ彼の器量を測っていただけで……！」
line = "「ち、違います、お姉さま……！　私はただ彼の器量を測っていただけで……！」"

[[dialogue]]
speaker = "リア"
# 「ふふ、相変わらず素直じゃないんだから♪」
line = "「ふふ、相変わらず素直じゃないんだから♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それにしてもモンスターじゃなくて魔族……なのよね。私たちの世界の魔族とは似ても似つかないわ」
line = "「それにしてもモンスターじゃなくて魔族……なのよね。私たちの世界の魔族とは似ても似つかないわ」"

[[dialogue]]
speaker = "フィオナ"
# 「ええ、こちらの世界の魔族はソフィアのように人間に近い姿をしているのですが……」
line = "「ええ、こちらの世界の魔族はソフィアのように人間に近い姿をしているのですが……」"

[[dialogue]]
speaker = "聖沙"
# 「えっと、こっちの世界の魔族も本当はそうなの。でも力のない魔族は人間界に来ると、あんなふうな姿になっちゃうみたい」
line = "「えっと、こっちの世界の魔族も本当はそうなの。でも力のない魔族は人間界に来ると、あんなふうな姿になっちゃうみたい」"

[[dialogue]]
speaker = "聖沙"
# 「逆に言えば、人間界でも姿を保てる魔族は、それだけ強力な魔族ってことなのよ」
line = "「逆に言えば、人間界でも姿を保てる魔族は、それだけ強力な魔族ってことなのよ」"

[[dialogue]]
speaker = "マグダレナ"
# 「なるほど、そのような事情があるのですね。世界の<b>理</b>からして異なる……興味深いです」
line = "「なるほど、そのような事情があるのですね。世界の<b>理</b>からして異なる……興味深いです」"

[[dialogue]]
speaker = "マグダレナ"
# 「しかし申し訳ございません。少し気になる気配が。もしかするとルリエルさまかもしれません」
line = "「しかし申し訳ございません。少し気になる気配が。もしかするとルリエルさまかもしれません」"

[[dialogue]]
speaker = "フィオナ"
# 「っっ。やはりこちらの世界に迷い込んでいたのですね。すぐに向かいましょう」
line = "「っっ。やはりこちらの世界に迷い込んでいたのですね。すぐに向かいましょう」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうね。きっと見知らぬ世界に一人で迷い込んで寂しい想いをしちゃっているはずだわ」
line = "「そうね。きっと見知らぬ世界に一人で迷い込んで寂しい想いをしちゃっているはずだわ」"

[[dialogue]]
speaker = "リア"
# 「なら引き続き案内するね。主要な場所を探した方がいいと思うから」
line = "「なら引き続き案内するね。主要な場所を探した方がいいと思うから」"

[[dialogue]]
speaker = "聖沙"
# 「さっきは少し遅れを取ったけど、次は負けないわ。どちらが先にルリエルさんを見つけられるか──勝負よ！」
line = "「さっきは少し遅れを取ったけど、次は負けないわ。どちらが先にルリエルさんを見つけられるか──勝負よ！」"

[[dialogue]]
speaker = "マグダレナ"
# 「しかしこれは……本当にルリエルさまの気配、なのでしょうか」
line = "「しかしこれは……本当にルリエルさまの気配、なのでしょうか」"

[[dialogue]]
speaker = "マグダレナ"
# 「何か妙なものが混じっているような……」
line = "「何か妙なものが混じっているような……」"
