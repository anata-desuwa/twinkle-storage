[[dialogue]]
speaker = "unk"
# 第３話,剣からビーム,P
line = "第３話,剣からビーム,P"

[[dialogue]]
speaker = "unk"
# バトルフェスタ以来、学園に実装された仮想結界システムにより、周辺環境に気兼ねすることなく、全力を出しての戦闘訓練が可能となった。
line = "バトルフェスタ以来、学園に実装された仮想結界システムにより、周辺環境に気兼ねすることなく、全力を出しての戦闘訓練が可能となった。"

[[dialogue]]
speaker = "unk"
# それにより、ノヴァフォームの練習がしたいと言い出したヴィーナスであったが――
line = "それにより、ノヴァフォームの練習がしたいと言い出したヴィーナスであったが――"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「私、<b>剣</b>の訓練がしたいわ！」
line = "「私、<b>剣</b>の訓練がしたいわ！」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「剣？　あっ、もしかして私が呼ばれたのって、武器が剣だから？」
line = "「剣？　あっ、もしかして私が呼ばれたのって、武器が剣だから？」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「そういうことよ！　マトイには剣の使い方を教えて欲しいの！」
line = "「そういうことよ！　マトイには剣の使い方を教えて欲しいの！」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「ほら、ノヴァフォームになったら、私の武器が剣にフォームチェンジしたじゃない？」
line = "「ほら、ノヴァフォームになったら、私の武器が剣にフォームチェンジしたじゃない？」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「それで、今日はもう１人、剣使いの星騎士にコーチをお願いしているわ！」
line = "「それで、今日はもう１人、剣使いの星騎士にコーチをお願いしているわ！」"

[[dialogue]]
speaker = "メルエル"
# 「は～い♪　会長くん、マトイちゃん、こんにちは～♪」
line = "「は～い♪　会長くん、マトイちゃん、こんにちは～♪」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「メルエルちゃん！　こんにちは♪」
line = "「メルエルちゃん！　こんにちは♪」"

[[dialogue]]
speaker = "メルエル"
# 「でも、私でよかったのかな？　剣使いの星騎士は他にもいるじゃない？　聖剣使いのユーリスくんとか……」
line = "「でも、私でよかったのかな？　剣使いの星騎士は他にもいるじゃない？　聖剣使いのユーリスくんとか……」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「ユーリスにもお願いはしたんだけど、残念ながら今日は用事があるみたいで来れなかったの。それにメルエルは、剣からビームを撃てるじゃない？」
line = "「ユーリスにもお願いはしたんだけど、残念ながら今日は用事があるみたいで来れなかったの。それにメルエルは、剣からビームを撃てるじゃない？」"

[[dialogue]]
speaker = "メルエル"
# 「私の場合、光で剣先を伸ばすみたいな感じだけど……ビームといえばビーム、なのかなぁ？」
line = "「私の場合、光で剣先を伸ばすみたいな感じだけど……ビームといえばビーム、なのかなぁ？」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「あれはビームよ！　私がそう判断したわ！」
line = "「あれはビームよ！　私がそう判断したわ！」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「マトイがノヴァフォームで撃つ必殺技の星術は、間違いなくビームよね！　ほら、リフレクトゴッデスカリバーってやつ！」
line = "「マトイがノヴァフォームで撃つ必殺技の星術は、間違いなくビームよね！　ほら、リフレクトゴッデスカリバーってやつ！」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「え？　あっ、うん、そうだね！　あははは……」
line = "「え？　あっ、うん、そうだね！　あははは……」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# （本当はヴィーナスのゴッデスビームを参考にした技なんだけど、直接言うのは恥ずかしいから、本人には秘密にしてるんだよね……）
line = "（本当はヴィーナスのゴッデスビームを参考にした技なんだけど、直接言うのは恥ずかしいから、本人には秘密にしてるんだよね……）"

[[dialogue]]
speaker = "unk"
# それから、仮想結界を周囲に展開した上で、訓練が始まったのだが――
line = "それから、仮想結界を周囲に展開した上で、訓練が始まったのだが――"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「うーーーん、やっぱり剣を振るとビームが出ちゃうのよね」
line = "「うーーーん、やっぱり剣を振るとビームが出ちゃうのよね」"

[[dialogue]]
speaker = "メルエル"
# 「あとはちょっと剣が大振りかなぁ……？」
line = "「あとはちょっと剣が大振りかなぁ……？」"

[[dialogue]]
speaker = "unk"
# ヴィーナスには『ゴリ押し癖』があるな
line = "ヴィーナスには『ゴリ押し癖』があるな"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「ゴリ押し癖……？」
line = "「ゴリ押し癖……？」"

[[dialogue]]
speaker = "unk"
# ヴィーナスは規格外の星力を有するが故に、そのパワーでゴリ押す戦い方をつい選びがちだと指摘する。
line = "ヴィーナスは規格外の星力を有するが故に、そのパワーでゴリ押す戦い方をつい選びがちだと指摘する。"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「――何故ならそれが１番早く敵を倒せて効率的だから？　うーん、そういえば自分がどうやってビームを出すようになったのか、覚えてないわね」
line = "「――何故ならそれが１番早く敵を倒せて効率的だから？　うーん、そういえば自分がどうやってビームを出すようになったのか、覚えてないわね」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「ヴィーナスの場合、適当に剣を振ってビームを撃ちまくるだけでも勝てちゃうからすごいんだけど――」
line = "「ヴィーナスの場合、適当に剣を振ってビームを撃ちまくるだけでも勝てちゃうからすごいんだけど――」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「確かにプラスで剣術も加わったら、普通じゃない無双の強さを手に入れられるかもね」
line = "「確かにプラスで剣術も加わったら、普通じゃない無双の強さを手に入れられるかもね」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「なんか、剣として使う時に、ビームに代わるかけ声が欲しいのよね」
line = "「なんか、剣として使う時に、ビームに代わるかけ声が欲しいのよね」"

[[dialogue]]
speaker = "メルエル"
# 「かけ声？」
line = "「かけ声？」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「そう！　ゴッデスビームみたいに、しっくり来るやつがいいわ！」
line = "「そう！　ゴッデスビームみたいに、しっくり来るやつがいいわ！」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「それ、重要なの？」
line = "「それ、重要なの？」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「重要よ！　その方が攻撃する時のイメージがはっきりするじゃない」
line = "「重要よ！　その方が攻撃する時のイメージがはっきりするじゃない」"

[[dialogue]]
speaker = "メルエル"
# 「わかる！　攻撃の内容を瞬時にイメージするために、技名はちゃんと決めておいた方がいいって言うもんね♪」
line = "「わかる！　攻撃の内容を瞬時にイメージするために、技名はちゃんと決めておいた方がいいって言うもんね♪」"

[[dialogue]]
speaker = "メルエル"
# 「例えば……なんとかスラ～ッシュ！　とか？」
line = "「例えば……なんとかスラ～ッシュ！　とか？」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「う～ん、それだと普通ね！」
line = "「う～ん、それだと普通ね！」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「普段叫んでるゴッデスビームも、割と普通だと思うけど……」
line = "「普段叫んでるゴッデスビームも、割と普通だと思うけど……」"

[[dialogue]]
speaker = "unk"
# 剣術らしいかけ声……あっ！
line = "剣術らしいかけ声……あっ！"

[[dialogue]]
speaker = "メルエル"
# 「会長くん、何か思いついたの？」
line = "「会長くん、何か思いついたの？」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「チェストォーーーッ！！！」
line = "「チェストォーーーッ！！！」"

[[dialogue]]
speaker = "unk"
# 声と共に伸びた光の刀身が、大地に閃光を走らせ、仮想モンスターを真っ二つにする。
line = "声と共に伸びた光の刀身が、大地に閃光を走らせ、仮想モンスターを真っ二つにする。"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「うん！　いい感じにイメージできるようになったわ！」
line = "「うん！　いい感じにイメージできるようになったわ！」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「いや、普通にビームなのでは……？」
line = "「いや、普通にビームなのでは……？」"

[[dialogue]]
speaker = "メルエル"
# 「まぁ、かけ声と一緒に刀身が伸びる感じだし……」
line = "「まぁ、かけ声と一緒に刀身が伸びる感じだし……」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「チェストォ！！！」
line = "「チェストォ！！！」"

[[dialogue]]
speaker = "unk"
# 今度は光の斬撃が飛んで、敵が木っ端ミジンコに吹き飛ぶ。
line = "今度は光の斬撃が飛んで、敵が木っ端ミジンコに吹き飛ぶ。"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「今のは普通にビームでは！？」
line = "「今のは普通にビームでは！？」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「誤チェストよ！」
line = "「誤チェストよ！」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「これで最後よ……！」
line = "「これで最後よ……！」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「ヴィーナスエクスカリバー・ノヴァ！！」
line = "「ヴィーナスエクスカリバー・ノヴァ！！」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「技名が原点回帰してるんだけど！？」
line = "「技名が原点回帰してるんだけど！？」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「ふぅ～、最後にようやくしっくりくる感じになったわね！」
line = "「ふぅ～、最後にようやくしっくりくる感じになったわね！」"

[[dialogue]]
speaker = "メルエル"
# 「最後、凄い威力だったね、ヴィーナスちゃん！　エクスカリバーも剣の名前だし♪」
line = "「最後、凄い威力だったね、ヴィーナスちゃん！　エクスカリバーも剣の名前だし♪」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「結局ほぼビームだし、今日の特訓は何だったんだってことに目をつぶれば、凄い成果だよ、ヴィーナス」
line = "「結局ほぼビームだし、今日の特訓は何だったんだってことに目をつぶれば、凄い成果だよ、ヴィーナス」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「マトイ、メルエル、訓練に付き合ってくれてありがとね！　おかげで剣での戦い方が少しわかって来たわ！」
line = "「マトイ、メルエル、訓練に付き合ってくれてありがとね！　おかげで剣での戦い方が少しわかって来たわ！」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「まあ……うん。参考になる部分があったなら、良かったけども」
line = "「まあ……うん。参考になる部分があったなら、良かったけども」"

[[dialogue]]
speaker = "メルエル"
# 「力になれたなら嬉しいな♪　私ももっと強くなりたいから、星徒会のみんなと訓練できて、すごく勉強になったよ」
line = "「力になれたなら嬉しいな♪　私ももっと強くなりたいから、星徒会のみんなと訓練できて、すごく勉強になったよ」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「あっ、そうだわ！　２人共、この前言ったことも考えておいてね♪」
line = "「あっ、そうだわ！　２人共、この前言ったことも考えておいてね♪」"

[[dialogue]]
speaker = "unk"
# この前言ったこと？
line = "この前言ったこと？"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「魔王ハーレム建造計画よ！　マトイとメルエルなら、クロトとも私とも仲が良いから、問題ないでしょ？」
line = "「魔王ハーレム建造計画よ！　マトイとメルエルなら、クロトとも私とも仲が良いから、問題ないでしょ？」"

[[dialogue]]
speaker = "unk"
# あれ九浄家の外でも言ってるの！？
line = "あれ九浄家の外でも言ってるの！？"

[[dialogue]]
speaker = "メルエル"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# ２人共！？
line = "２人共！？"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「うん！　こっちの方もいい感じね♪」
line = "「うん！　こっちの方もいい感じね♪」"

[[dialogue]]
speaker = "unk"
# ２人の反応を見て、満足そうに頷くヴィーナスなのであった――
line = "２人の反応を見て、満足そうに頷くヴィーナスなのであった――"
