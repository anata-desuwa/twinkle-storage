[[dialogue]]
speaker = "unk"
# 第１話,ルルカのバレンタイン・前編,P
line = "第１話,ルルカのバレンタイン・前編,P"

[[dialogue]]
speaker = "unk"
# それは、バレンタインより少し前のこと。恋人であるルルカが、星徒会室へ遊びに来ていた。
line = "それは、バレンタインより少し前のこと。恋人であるルルカが、星徒会室へ遊びに来ていた。"

[[dialogue]]
speaker = "ルルカ"
# 「う～ん、今度のルカルカのバレンタイン配信、どうしよっかな～」
line = "「う～ん、今度のルカルカのバレンタイン配信、どうしよっかな～」"

[[dialogue]]
speaker = "unk"
# 今さらだが改めて説明しておくと、ルルカの正体は、チャンネル登録者数６０万人を超える人気Ｖチューバー『ルカルカ』の中の人である。
line = "今さらだが改めて説明しておくと、ルルカの正体は、チャンネル登録者数６０万人を超える人気Ｖチューバー『ルカルカ』の中の人である。"

[[dialogue]]
speaker = "unk"
# サプライズは用意してるんだろう？
line = "サプライズは用意してるんだろう？"

[[dialogue]]
speaker = "ルルカ"
# 「うん。事前告知はしてないけど、クリスマス配信の時みたいに、自分で作詞作曲した新曲のバレンタインソングを、ミュージックビデオで流す予定なんだ」
line = "「うん。事前告知はしてないけど、クリスマス配信の時みたいに、自分で作詞作曲した新曲のバレンタインソングを、ミュージックビデオで流す予定なんだ」"

[[dialogue]]
speaker = "unk"
# 曲を１から全部自分で作り上げられるようになっただけでもすごいと、俺はルルカを褒める。
line = "曲を１から全部自分で作り上げられるようになっただけでもすごいと、俺はルルカを褒める。"

[[dialogue]]
speaker = "ルルカ"
# 「――えへへ、ありがとう、お兄ちゃん♪　まあ、ミュージックビデオの制作はお世話になってるクリエイターさんにお願いしたんだけどね」
line = "「――えへへ、ありがとう、お兄ちゃん♪　まあ、ミュージックビデオの制作はお世話になってるクリエイターさんにお願いしたんだけどね」"

[[dialogue]]
speaker = "ルルカ"
# 「でもね、リスナーさんたちはクリスマスに続いてバレンタインでも、新曲は期待してるはずで……」
line = "「でもね、リスナーさんたちはクリスマスに続いてバレンタインでも、新曲は期待してるはずで……」"

[[dialogue]]
speaker = "ルルカ"
# 「そう考えると、チョコ作りと新曲公開だけだと、ちょっとパンチが足りない気がしてるんだ」
line = "「そう考えると、チョコ作りと新曲公開だけだと、ちょっとパンチが足りない気がしてるんだ」"

[[dialogue]]
speaker = "unk"
# 出会った頃よりも、ルルカは動画配信者として成長しつつあった。その真剣な姿勢が、俺はカッコいいと感じる。
line = "出会った頃よりも、ルルカは動画配信者として成長しつつあった。その真剣な姿勢が、俺はカッコいいと感じる。"

[[dialogue]]
speaker = "ルルカ"
# 「――そ、そうかな？　えへへ<emoji=heart04>　可愛いって言われるのも嬉しいけど、カッコいいって言われるのも、ちょっと誇らしい気分になるね♪」
line = "「――そ、そうかな？　えへへ<emoji=heart04>　可愛いって言われるのも嬉しいけど、カッコいいって言われるのも、ちょっと誇らしい気分になるね♪」"

[[dialogue]]
speaker = "unk"
# と、その時だった。
line = "と、その時だった。"

[[dialogue]]
speaker = "アナ"
# 「会長、お疲れ様です。――おや、ルルカさん、いらっしゃっていたのですね」
line = "「会長、お疲れ様です。――おや、ルルカさん、いらっしゃっていたのですね」"

[[dialogue]]
speaker = "ルルカ"
# 「あっ、アナちゃん！　お邪魔してま～す」
line = "「あっ、アナちゃん！　お邪魔してま～す」"

[[dialogue]]
speaker = "unk"
# そうだ、アナにも相談してみたら？
line = "そうだ、アナにも相談してみたら？"

[[dialogue]]
speaker = "アナ"
# 「相談？　なにかお困りごとでしょうか？」
line = "「相談？　なにかお困りごとでしょうか？」"

[[dialogue]]
speaker = "ルルカ"
# 「えっとね、実は……」
line = "「えっとね、実は……」"

[[dialogue]]
speaker = "リーリア"
# 「――なるほど！　そういうことなら、お任せマジカル☆　ルカルカ配信を毎回チェックしている私が協力しちゃいますよ～♪」
line = "「――なるほど！　そういうことなら、お任せマジカル☆　ルカルカ配信を毎回チェックしている私が協力しちゃいますよ～♪」"

[[dialogue]]
speaker = "ルルカ"
# 「まさか、リーリアちゃんも手伝ってくれるなんて……！」
line = "「まさか、リーリアちゃんも手伝ってくれるなんて……！」"

[[dialogue]]
speaker = "アナ"
# 「ルカルカの正体がルルカさんだということは、リーリアさんも既に知っていますから、相談するなら人数が多い方がいいかと思いまして」
line = "「ルカルカの正体がルルカさんだということは、リーリアさんも既に知っていますから、相談するなら人数が多い方がいいかと思いまして」"

[[dialogue]]
speaker = "リーリア"
# 「お互い秘密を打ち明け合った仲なんだから、困った時は相談してよ♪　私たち、友達でしょ？」
line = "「お互い秘密を打ち明け合った仲なんだから、困った時は相談してよ♪　私たち、友達でしょ？」"

[[dialogue]]
speaker = "ルルカ"
# 「リーリアちゃん、アナちゃん……２人とも、ありがと～！」
line = "「リーリアちゃん、アナちゃん……２人とも、ありがと～！」"

[[dialogue]]
speaker = "アナ"
# 「ノープロブレムです。私も友達ですから」
line = "「ノープロブレムです。私も友達ですから」"

[[dialogue]]
speaker = "リーリア"
# 「それで、ルルカちゃんは今のところ、どんな配信プランを考えてるの？」
line = "「それで、ルルカちゃんは今のところ、どんな配信プランを考えてるの？」"

[[dialogue]]
speaker = "ルルカ"
# 「えっとね、『チョコ作り』をメインにして、完成したらそれを試食しながらリスナーさんのコメントを読んでトークして――」
line = "「えっとね、『チョコ作り』をメインにして、完成したらそれを試食しながらリスナーさんのコメントを読んでトークして――」"

[[dialogue]]
speaker = "ルルカ"
# 「そのあとにサプライズで新曲を公開して、最後に感想トークをして締める、って流れかな」
line = "「そのあとにサプライズで新曲を公開して、最後に感想トークをして締める、って流れかな」"

[[dialogue]]
speaker = "アナ"
# 「王道ですね。ルルカさんらしいサプライズ要素もあるので、構成としてはノープロブレムかと」
line = "「王道ですね。ルルカさんらしいサプライズ要素もあるので、構成としてはノープロブレムかと」"

[[dialogue]]
speaker = "リーリア"
# 「でも、歌だけじゃなくて、チョコ作りの方にも何か『ルカルカらしい色』が欲しいってことだよね？」
line = "「でも、歌だけじゃなくて、チョコ作りの方にも何か『ルカルカらしい色』が欲しいってことだよね？」"

[[dialogue]]
speaker = "ルルカ"
# 「うん。チョコ作りは他のＶチューバーの子たちも沢山やるから、『これぞルカルカ』って感じの工夫をしたくて……」
line = "「うん。チョコ作りは他のＶチューバーの子たちも沢山やるから、『これぞルカルカ』って感じの工夫をしたくて……」"

[[dialogue]]
speaker = "リーリア"
# 「う～ん……フラッシュアイデアだけど、激辛チョコを作って食べるとか？」
line = "「う～ん……フラッシュアイデアだけど、激辛チョコを作って食べるとか？」"

[[dialogue]]
speaker = "ルルカ"
# 「まさかのここで激辛チャレンジ！？　うっ……かつての激辛ラーメンチャレンジの<ruby=から>辛</ruby>い記憶が……！」
line = "「まさかのここで激辛チャレンジ！？　うっ……かつての激辛ラーメンチャレンジの<ruby>辛<rt>から</rt></ruby>い記憶が……！」"

[[dialogue]]
speaker = "ルルカ"
# 「お、面白いとは思うけど、激辛チョコを食べた後で新曲を歌うのはキツいかも……」
line = "「お、面白いとは思うけど、激辛チョコを食べた後で新曲を歌うのはキツいかも……」"

[[dialogue]]
speaker = "リーリア"
# 「あっ、そっか！　それじゃダメか～」
line = "「あっ、そっか！　それじゃダメか～」"

[[dialogue]]
speaker = "アナ"
# 「ふむ……ということはバレンタインソングは生で歌うんですか？」
line = "「ふむ……ということはバレンタインソングは生で歌うんですか？」"

[[dialogue]]
speaker = "ルルカ"
# 「え？　あっ……！」
line = "「え？　あっ……！」"

[[dialogue]]
speaker = "unk"
# ルルカがハッとしたように顔を引きつらせる。
line = "ルルカがハッとしたように顔を引きつらせる。"

[[dialogue]]
speaker = "unk"
# 確か、ＭＶを流すって言ってなかった？
line = "確か、ＭＶを流すって言ってなかった？"

[[dialogue]]
speaker = "ルルカ"
# 「そ、そうだった……」
line = "「そ、そうだった……」"

[[dialogue]]
speaker = "リーリア"
# 「え？　ってことは、激辛チャレンジも行けるじゃん！」
line = "「え？　ってことは、激辛チャレンジも行けるじゃん！」"

[[dialogue]]
speaker = "ルルカ"
# 「う、うぅ～！　でも最初から食べきれないってわかってる激辛チョコを残すのは、ちょっと印象悪い気も……」
line = "「う、うぅ～！　でも最初から食べきれないってわかってる激辛チョコを残すのは、ちょっと印象悪い気も……」"

[[dialogue]]
speaker = "アナ"
# 「では、ひと口サイズのチョコを複数作って、その中の１個だけを激辛仕様にするのはどうでしょう？　ひと口だけなら、残さず食べきることも可能かと」
line = "「では、ひと口サイズのチョコを複数作って、その中の１個だけを激辛仕様にするのはどうでしょう？　ひと口だけなら、残さず食べきることも可能かと」"

[[dialogue]]
speaker = "リーリア"
# 「激辛チョコのロシアンルーレットか！　さすがアナちゃん、頭いい～♪　ナイスマジカル☆」
line = "「激辛チョコのロシアンルーレットか！　さすがアナちゃん、頭いい～♪　ナイスマジカル☆」"

[[dialogue]]
speaker = "ルルカ"
# 「くっ……！　面白そうだけど、それを食べるのはあたしっていうジレンマ……！」
line = "「くっ……！　面白そうだけど、それを食べるのはあたしっていうジレンマ……！」"

[[dialogue]]
speaker = "アナ"
# 「チョコは完成後に見ないようにしながらシャッフルし、その後の試食トークの区切りごとに１つずつ食べていく。そんな形式はいかがでしょう？」
line = "「チョコは完成後に見ないようにしながらシャッフルし、その後の試食トークの区切りごとに１つずつ食べていく。そんな形式はいかがでしょう？」"

[[dialogue]]
speaker = "リーリア"
# 「マジカル完璧じゃん☆　ルルカちゃん、どう？　激辛ロシアンチョコ、よくない？」
line = "「マジカル完璧じゃん☆　ルルカちゃん、どう？　激辛ロシアンチョコ、よくない？」"

[[dialogue]]
speaker = "ルルカ"
# 「ううぅ……わかった！　やるよ！　ルカルカのバレンタイン配信を楽しみにしてくれてる６０万人のお兄ちゃんお姉ちゃんのために！！」
line = "「ううぅ……わかった！　やるよ！　ルカルカのバレンタイン配信を楽しみにしてくれてる６０万人のお兄ちゃんお姉ちゃんのために！！」"

[[dialogue]]
speaker = "unk"
# ――かくして、バレンタイン当日。ルカルカのバレンタイン配信が行われて。
line = "――かくして、バレンタイン当日。ルカルカのバレンタイン配信が行われて。"

[[dialogue]]
speaker = "ルルカ"
# 『う、ウソでしょ……！？　まさか最後の１個まで引かないなんて……！』
line = "『う、ウソでしょ……！？　まさか最後の１個まで引かないなんて……！』"

[[dialogue]]
speaker = "ルルカ"
# 『最後の１個、激辛確定なんですけどぉ～～～っ！？！？』
line = "『最後の１個、激辛確定なんですけどぉ～～～っ！？！？』"

[[dialogue]]
speaker = "ルルカ"
# 『うぅ……激辛とわかって食べるのはキツいよぉ～！　うっ……あっ、ああもう！　いっただきま～すっ！！』
line = "『うぅ……激辛とわかって食べるのはキツいよぉ～！　うっ……あっ、ああもう！　いっただきま～すっ！！』"

[[dialogue]]
speaker = "ルルカ"
# 『もぐっ――――ア゛ッ！？！？　エ゛アアアァァァーーーーーーッ！！！？』
line = "『もぐっ――――ア゛ッ！？！？　エ゛アアアァァァーーーーーーッ！！！？』"

[[dialogue]]
speaker = "unk"
# その夜――汐ルカルカはまたひとつ、ＳＮＳで大バズリする伝説を生み出すのだった。
line = "その夜――汐ルカルカはまたひとつ、ＳＮＳで大バズリする伝説を生み出すのだった。"
