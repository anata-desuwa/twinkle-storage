[[dialogue]]
speaker = "unk"
# 第４話,プリムラとイチャイチャ訓練,P
line = "第４話,プリムラとイチャイチャ訓練,P"

[[dialogue]]
speaker = "unk"
# その日は休日で、プリムラが俺の家へと遊びにやって来ていた。
line = "その日は休日で、プリムラが俺の家へと遊びにやって来ていた。"

[[dialogue]]
speaker = "プリムラ"
# 「さあ、眷族よ！　訓練を始めるのじゃ！」
line = "「さあ、眷族よ！　訓練を始めるのじゃ！」"

[[dialogue]]
speaker = "unk"
# それはいいけど、どうして俺の部屋なんだ？
line = "それはいいけど、どうして俺の部屋なんだ？"

[[dialogue]]
speaker = "プリムラ"
# 「そ、それはじゃな……今日は戦闘訓練ではなく、『精神の訓練』をするからじゃ！」
line = "「そ、それはじゃな……今日は戦闘訓練ではなく、『精神の訓練』をするからじゃ！」"

[[dialogue]]
speaker = "unk"
# 『精神の訓練』という言葉に首を傾げる俺に、プリムラは続ける。
line = "『精神の訓練』という言葉に首を傾げる俺に、プリムラは続ける。"

[[dialogue]]
speaker = "プリムラ"
# 「これまでも人前で、リバースフォームで暴走し……『赤ちゃん化』という恥を晒してきたのじゃ」
line = "「これまでも人前で、リバースフォームで暴走し……『赤ちゃん化』という恥を晒してきたのじゃ」"

[[dialogue]]
speaker = "プリムラ"
# 「だからこそ、暴走しないように精神も鍛える必要がある」
line = "「だからこそ、暴走しないように精神も鍛える必要がある」"

[[dialogue]]
speaker = "プリムラ"
# 「――というわけで、今日はリバースフォームでイチャイチャするのじゃ！」
line = "「――というわけで、今日はリバースフォームでイチャイチャするのじゃ！」"

[[dialogue]]
speaker = "unk"
# なるほど……？
line = "なるほど……？"

[[dialogue]]
speaker = "プリムラ"
# 「あっ！　その顔は、我がイチャイチャしたい口実に訓練を持ち出したと思っておるじゃろ！？」
line = "「あっ！　その顔は、我がイチャイチャしたい口実に訓練を持ち出したと思っておるじゃろ！？」"

[[dialogue]]
speaker = "プリムラ"
# 「そんなわけなかろう！　我はあくまで真面目に――むにゅにゅぅ～……フヘへへぇ<emoji=heart04>」
line = "「そんなわけなかろう！　我はあくまで真面目に――むにゅにゅぅ～……フヘへへぇ<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
# 「って、言い終わる前にほっぺをもちもち触り始めるでない！」
line = "「って、言い終わる前にほっぺをもちもち触り始めるでない！」"

[[dialogue]]
speaker = "unk"
# ごめん、プリムラが可愛くてつい
line = "ごめん、プリムラが可愛くてつい"

[[dialogue]]
speaker = "unk"
# 俺はそのまま、プリムラに顔を近づけて――
line = "俺はそのまま、プリムラに顔を近づけて――"

[[dialogue]]
speaker = "プリムラ"
# 「んっ！？　んむっ……ちゅっ<emoji=heart04>」
line = "「んっ！？　んむっ……ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そっと唇を重ねる。
line = "そっと唇を重ねる。"

[[dialogue]]
speaker = "プリムラ"
# 「こ、こら！　いきなりキスしてよいとは言っておらんぞっ<emoji=heart04>」
line = "「こ、こら！　いきなりキスしてよいとは言っておらんぞっ<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
# 「あっ、ま、待て！　今は暴走しないように、ドキドキをクールダウンしているところで……んむっ<emoji=heart04>」
line = "「あっ、ま、待て！　今は暴走しないように、ドキドキをクールダウンしているところで……んむっ<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
# 「ちゅっ……ちゅっ<emoji=heart04>　んん～っ！？<emoji=heart04><emoji=heart04>」
line = "「ちゅっ……ちゅっ<emoji=heart04>　んん～っ！？<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# キスを続けていると、プリムラの身体から魔力が溢れ、淡く光り出した。
line = "キスを続けていると、プリムラの身体から魔力が溢れ、淡く光り出した。"

[[dialogue]]
speaker = "プリムラ"
# 「……ばぶぅ～っ♪」
line = "「……ばぶぅ～っ♪」"

[[dialogue]]
speaker = "unk"
# すると、プリムラの精神が暴走して『赤ちゃん化』してしまった。
line = "すると、プリムラの精神が暴走して『赤ちゃん化』してしまった。"

[[dialogue]]
speaker = "unk"
# しまった……やり過ぎた……！
line = "しまった……やり過ぎた……！"

[[dialogue]]
speaker = "unk"
# 先週は星徒会が忙しく、ほとんど触れ合えていなかった。その反動で、つい気持ちが高ぶってしまったのだ。
line = "先週は星徒会が忙しく、ほとんど触れ合えていなかった。その反動で、つい気持ちが高ぶってしまったのだ。"

[[dialogue]]
speaker = "プリムラ"
# 「あぁ～いっ<emoji=heart04>　パパぁ～～っ<emoji=heart04>」
line = "「あぁ～いっ<emoji=heart04>　パパぁ～～っ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 赤ちゃん化したプリムラが抱き着いてくる。
line = "赤ちゃん化したプリムラが抱き着いてくる。"

[[dialogue]]
speaker = "プリムラ"
# 「んんぅ～っ<emoji=heart04>　パパ、しゅき～っ<emoji=heart04>」
line = "「んんぅ～っ<emoji=heart04>　パパ、しゅき～っ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ……そういえば、２人きりの状態でプリムラが『赤ちゃん化』するのは初めてだな、と油断していると。
line = "……そういえば、２人きりの状態でプリムラが『赤ちゃん化』するのは初めてだな、と油断していると。"

[[dialogue]]
speaker = "プリムラ"
# 「ん～っ、ちゅ～っ<emoji=heart04>」
line = "「ん～っ、ちゅ～っ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ちょっ……んん～っ！？
line = "ちょっ……んん～っ！？"

[[dialogue]]
speaker = "unk"
# 俺はプリムラから逆に唇を奪われ、キスされてしまった。
line = "俺はプリムラから逆に唇を奪われ、キスされてしまった。"

[[dialogue]]
speaker = "プリムラ"
# 「フへへぇ<emoji=heart04>　パパ、もっとキスぅ～<emoji=heart04>」
line = "「フへへぇ<emoji=heart04>　パパ、もっとキスぅ～<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
# 「ちゅっ<emoji=heart04>　ちゅ～っ<emoji=heart04>」
line = "「ちゅっ<emoji=heart04>　ちゅ～っ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ――だ、ダメだ……これはマズい……！
line = "――だ、ダメだ……これはマズい……！"

[[dialogue]]
speaker = "unk"
# 赤ちゃん化しているプリムラとキスするのは……なんだか非常にいけないことをしている気がする……！
line = "赤ちゃん化しているプリムラとキスするのは……なんだか非常にいけないことをしている気がする……！"

[[dialogue]]
speaker = "プリムラ"
# 「パパ、ぷいむらとキス、イヤ～？」
line = "「パパ、ぷいむらとキス、イヤ～？」"

[[dialogue]]
speaker = "プリムラ"
# 「うぅ～……ぷいむら、パパしゅきなのに～」
line = "「うぅ～……ぷいむら、パパしゅきなのに～」"

[[dialogue]]
speaker = "unk"
# ――そ、そんな瞳をうるうるされてしまうと……！
line = "――そ、そんな瞳をうるうるされてしまうと……！"

[[dialogue]]
speaker = "プリムラ"
# 「――あっ、ふへへへぇ<emoji=heart04>　パパ、キスいいの～？」
line = "「――あっ、ふへへへぇ<emoji=heart04>　パパ、キスいいの～？」"

[[dialogue]]
speaker = "プリムラ"
# 「じゃあもっと……ちゅっちゅ～っ<emoji=heart04>」
line = "「じゃあもっと……ちゅっちゅ～っ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# それからしばらくして、ようやく暴走が収まって。
line = "それからしばらくして、ようやく暴走が収まって。"

[[dialogue]]
speaker = "プリムラ"
# 「うぅ……また暴走してしまったのじゃ……」
line = "「うぅ……また暴走してしまったのじゃ……」"

[[dialogue]]
speaker = "unk"
# う、うん……
line = "う、うん……"

[[dialogue]]
speaker = "プリムラ"
# 「って、何を照れた顔をしとるんじゃ！？　赤ちゃんの我とキスするのはハレンチじゃぞ！？」
line = "「って、何を照れた顔をしとるんじゃ！？　赤ちゃんの我とキスするのはハレンチじゃぞ！？」"

[[dialogue]]
speaker = "unk"
# ――いや、こっちだって、理性を振り絞って頑張ったんだよ！？
line = "――いや、こっちだって、理性を振り絞って頑張ったんだよ！？"

[[dialogue]]
speaker = "プリムラ"
# 「と、とにかく一旦休憩じゃ！」
line = "「と、とにかく一旦休憩じゃ！」"

[[dialogue]]
speaker = "unk"
# ひと息ついたあと、プリムラは咳払いをする。
line = "ひと息ついたあと、プリムラは咳払いをする。"

[[dialogue]]
speaker = "プリムラ"
# 「……眷族よ。今日は訓練の他に、将来のことについても話しておこうと思っておったのじゃ」
line = "「……眷族よ。今日は訓練の他に、将来のことについても話しておこうと思っておったのじゃ」"

[[dialogue]]
speaker = "unk"
# 将来のこと？
line = "将来のこと？"

[[dialogue]]
speaker = "プリムラ"
# 「うむ。この前、将来について考える機会があってな」
line = "「うむ。この前、将来について考える機会があってな」"

[[dialogue]]
speaker = "プリムラ"
# 「眷族とは恋人として付き合っておるのじゃから……」
line = "「眷族とは恋人として付き合っておるのじゃから……」"

[[dialogue]]
speaker = "プリムラ"
# 「我は学園の本校を卒業するまでに、『嫁』になる修業をすると決めたのじゃ！」
line = "「我は学園の本校を卒業するまでに、『嫁』になる修業をすると決めたのじゃ！」"

[[dialogue]]
speaker = "プリムラ"
# 「嫁としても最強になり、眷族が周囲に自慢できるようにしてやらねばな……！」
line = "「嫁としても最強になり、眷族が周囲に自慢できるようにしてやらねばな……！」"

[[dialogue]]
speaker = "unk"
# 照れながらも真剣にそう言うプリムラに、俺は胸が熱くなって。
line = "照れながらも真剣にそう言うプリムラに、俺は胸が熱くなって。"

[[dialogue]]
speaker = "unk"
# プリムラ……好きだ！
line = "プリムラ……好きだ！"

[[dialogue]]
speaker = "プリムラ"
# 「あっ！？　ま、待て！　またキスをする気か……！？」
line = "「あっ！？　ま、待て！　またキスをする気か……！？」"

[[dialogue]]
speaker = "プリムラ"
# 「――暴走しても、恋人として受け止める、じゃと？」
line = "「――暴走しても、恋人として受け止める、じゃと？」"

[[dialogue]]
speaker = "プリムラ"
# 「い、いくら恋人でも、赤ちゃん化するのは恥ずかしいのじゃぞ！？」
line = "「い、いくら恋人でも、赤ちゃん化するのは恥ずかしいのじゃぞ！？」"

[[dialogue]]
speaker = "unk"
# でも、もっとプリムラとイチャイチャしたい
line = "でも、もっとプリムラとイチャイチャしたい"

[[dialogue]]
speaker = "プリムラ"
# 「……っ！　し、仕方のない眷族なのじゃ<emoji=heart04>」
line = "「……っ！　し、仕方のない眷族なのじゃ<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
# 「ならば今度は、我が眷族を暴走させるくらいイチャイチャしてやるのじゃ<emoji=heart04>」
line = "「ならば今度は、我が眷族を暴走させるくらいイチャイチャしてやるのじゃ<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
# 「んっ……ちゅっ<emoji=heart04>」
line = "「んっ……ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
# 「あっ、こら<emoji=heart04>　耳元でそんな、好き好き言うでない<emoji=heart04>」
line = "「あっ、こら<emoji=heart04>　耳元でそんな、好き好き言うでない<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
# 「――我にも愛を囁いて欲しいじゃと？　し、仕方あるまい。これも訓練じゃからな<emoji=heart04>」
line = "「――我にも愛を囁いて欲しいじゃと？　し、仕方あるまい。これも訓練じゃからな<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
# 「……す、好きじゃぞ、眷族<emoji=heart04>」
line = "「……す、好きじゃぞ、眷族<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
# 「んっ……ちゅっ<emoji=heart04>　ちゅっ……<emoji=heart04>」
line = "「んっ……ちゅっ<emoji=heart04>　ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# こうして俺たちは、また暴走してしまいそうなくらいじっくりと、イチャイチャの訓練に励むのだった。
line = "こうして俺たちは、また暴走してしまいそうなくらいじっくりと、イチャイチャの訓練に励むのだった。"
