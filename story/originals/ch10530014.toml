[[dialogue]]
speaker = "unk"
# 第４話,魔女とデート？,P
line = "第４話,魔女とデート？,P"

[[dialogue]]
speaker = "ウェンディ"
# 「こんにちは、会長さん。急にお呼び立てしてすみません」
line = "「こんにちは、会長さん。急にお呼び立てしてすみません」"

[[dialogue]]
speaker = "ウェンディ"
# 「現在、会長さんのような男子学生をペルソナとした商品開発に取り組んでいまして。理解を深めるためにご協力いただきたいのです」
line = "「現在、会長さんのような男子学生をペルソナとした商品開発に取り組んでいまして。理解を深めるためにご協力いただきたいのです」"

[[dialogue]]
speaker = "unk"
# ペルソナ？
line = "ペルソナ？"

[[dialogue]]
speaker = "ウェンディ"
# 「マーケティング用語のペルソナとは、製品・サービスを利用する典型的なユーザー像のことです」
line = "「マーケティング用語のペルソナとは、製品・サービスを利用する典型的なユーザー像のことです」"

[[dialogue]]
speaker = "ウェンディ"
# 「ターゲットが２０代独身女性、３０代男性会社員などと一定の層を想定しているのに対し、より具体的なイメージを深め、架空の人物像としたものです」
line = "「ターゲットが２０代独身女性、３０代男性会社員などと一定の層を想定しているのに対し、より具体的なイメージを深め、架空の人物像としたものです」"

[[dialogue]]
speaker = "ウェンディ"
# 「例えばターゲットが３０代の既婚女性であれば……」
line = "「例えばターゲットが３０代の既婚女性であれば……」"

[[dialogue]]
speaker = "ウェンディ"
# 「そのペルソナは佐藤加奈３３歳、夫と子ども２人の４人暮らし、保険外交員、首都圏在住で趣味は海外旅行……などといったふうに具体的に定めていきます」
line = "「そのペルソナは佐藤加奈３３歳、夫と子ども２人の４人暮らし、保険外交員、首都圏在住で趣味は海外旅行……などといったふうに具体的に定めていきます」"

[[dialogue]]
speaker = "ウェンディ"
# 「そうすることでユーザーに対する理解を深めたり、関係者間の認識のズレをなくしたりすることができます」
line = "「そうすることでユーザーに対する理解を深めたり、関係者間の認識のズレをなくしたりすることができます」"

[[dialogue]]
speaker = "ウェンディ"
# 「今回は偶然会長さんに非常に近いペルソナが定義されたので、会長さんに直接接することで、設定の精度を高めようと思ったわけです」
line = "「今回は偶然会長さんに非常に近いペルソナが定義されたので、会長さんに直接接することで、設定の精度を高めようと思ったわけです」"

[[dialogue]]
speaker = "ウェンディ"
# 「特別なことをしていただく必要はありません。半日ほどお時間頂ければ大丈夫です」
line = "「特別なことをしていただく必要はありません。半日ほどお時間頂ければ大丈夫です」"

[[dialogue]]
speaker = "unk"
# それくらいなら大丈夫
line = "それくらいなら大丈夫"

[[dialogue]]
speaker = "ウェンディ"
# 「ご協力感謝します」
line = "「ご協力感謝します」"

[[dialogue]]
speaker = "ウェンディ"
# 「しかし……こうして会長さんと歩いていると、モンスターを追いかけた時のことを思い出しますね」
line = "「しかし……こうして会長さんと歩いていると、モンスターを追いかけた時のことを思い出しますね」"

[[dialogue]]
speaker = "ウェンディ"
# 「いえ、積極的に思い出したい出来事ではないですが……え？　ネビュラの活動資金の件ですか？」
line = "「いえ、積極的に思い出したい出来事ではないですが……え？　ネビュラの活動資金の件ですか？」"

[[dialogue]]
speaker = "ウェンディ"
# 「それは……えーっと、事業を売却して短期的に資金を得ることに……」
line = "「それは……えーっと、事業を売却して短期的に資金を得ることに……」"

[[dialogue]]
speaker = "ウェンディ"
# 「いえ、何でもありません。頑張って何とかしましたよ」
line = "「いえ、何でもありません。頑張って何とかしましたよ」"

[[dialogue]]
speaker = "ウェンディ"
# 「それより今は会長さんの調査です。会長さんって、いつも何を考えているんですか？」
line = "「それより今は会長さんの調査です。会長さんって、いつも何を考えているんですか？」"

[[dialogue]]
speaker = "ウェンディ"
# 「……って、聞き方が抽象的すぎましたか。会長さんってどんな女性がタイプなんです？」
line = "「……って、聞き方が抽象的すぎましたか。会長さんってどんな女性がタイプなんです？」"

[[dialogue]]
speaker = "ウェンディ"
# 「いたって真面目な質問ですよ？　今回の調査は、会長さんのことを知るのが目的なんですから」
line = "「いたって真面目な質問ですよ？　今回の調査は、会長さんのことを知るのが目的なんですから」"

[[dialogue]]
speaker = "ウェンディ"
# 「あなたの周りにいろんな女性がいることは、ネビュラの調査でわかっています」
line = "「あなたの周りにいろんな女性がいることは、ネビュラの調査でわかっています」"

[[dialogue]]
speaker = "ウェンディ"
# 「新星星徒会の九浄ヴィーナス、奏サーシャ、アナ、詠野マトイ……」
line = "「新星星徒会の九浄ヴィーナス、奏サーシャ、アナ、詠野マトイ……」"

[[dialogue]]
speaker = "ウェンディ"
# 「流星星徒会の星見フィオナ、桐原セーラ、楠葉ユウリ、奏ソフィア、ルリエル」
line = "「流星星徒会の星見フィオナ、桐原セーラ、楠葉ユウリ、奏ソフィア、ルリエル」"

[[dialogue]]
speaker = "ウェンディ"
# 「他にもメイド隊や流星附属などの子がいますよね。どの女の子が好みなんですか？」
line = "「他にもメイド隊や流星附属などの子がいますよね。どの女の子が好みなんですか？」"

[[dialogue]]
speaker = "unk"
# 年上かな
line = "年上かな"

[[dialogue]]
speaker = "ウェンディ"
# 「ほうほう。具体的にはどのくらい上とかありますか？」
line = "「ほうほう。具体的にはどのくらい上とかありますか？」"

[[dialogue]]
speaker = "ウェンディ"
# 「ふむふむ、１００歳くらい──って、１００歳！？　それは年上好きとか熟女好きを通り越してお年寄り──というか、人間はほとんど生きていないのでは？」
line = "「ふむふむ、１００歳くらい──って、１００歳！？　それは年上好きとか熟女好きを通り越してお年寄り──というか、人間はほとんど生きていないのでは？」"

[[dialogue]]
speaker = "ウェンディ"
# 「──って、もしかして私のこと！？」
line = "「──って、もしかして私のこと！？」"

[[dialogue]]
speaker = "ウェンディ"
# 「もうっ、魔女は対象外です。普通の学生の範疇で答えてください」
line = "「もうっ、魔女は対象外です。普通の学生の範疇で答えてください」"

[[dialogue]]
speaker = "ウェンディ"
# 「ではほかにも質問をいくつか。この近くには劇場と美術館、カフェと公園がありますけど、デートに行くならどこがいいですか？」
line = "「ではほかにも質問をいくつか。この近くには劇場と美術館、カフェと公園がありますけど、デートに行くならどこがいいですか？」"

[[dialogue]]
speaker = "unk"
# 公園で
line = "公園で"

[[dialogue]]
speaker = "ウェンディ"
# 「なるほどなるほど。デートの時は楽しさ重視ですか？　雰囲気重視ですか？」
line = "「なるほどなるほど。デートの時は楽しさ重視ですか？　雰囲気重視ですか？」"

[[dialogue]]
speaker = "unk"
# そんなことまで……！？
line = "そんなことまで……！？"

[[dialogue]]
speaker = "ウェンディ"
# 「いえいえ、そこがペルソナ構築に重要なんですってば」
line = "「いえいえ、そこがペルソナ構築に重要なんですってば」"

[[dialogue]]
speaker = "ウェンディ"
# 「貴重な男子学生の生の声、たっぷり聞かせてもらいます♪」
line = "「貴重な男子学生の生の声、たっぷり聞かせてもらいます♪」"

[[dialogue]]
speaker = "ウェンディ"
# 「お疲れ様です、会長さん。今日はここまでで大丈夫ですよ」
line = "「お疲れ様です、会長さん。今日はここまでで大丈夫ですよ」"

[[dialogue]]
speaker = "unk"
# 俺は役に立った？
line = "俺は役に立った？"

[[dialogue]]
speaker = "ウェンディ"
# 「やっぱり会長さんはお人好しですね。私の言ったことをあっさり信じるなんて」
line = "「やっぱり会長さんはお人好しですね。私の言ったことをあっさり信じるなんて」"

[[dialogue]]
speaker = "ウェンディ"
# 「ペルソナなんて口実ですよ。私が会長さんに会いたかっただけです」
line = "「ペルソナなんて口実ですよ。私が会長さんに会いたかっただけです」"

[[dialogue]]
speaker = "ウェンディ"
# 「おや、さすがに照れてますね。年上をからかうからそうなるんですよ。ふふふ」
line = "「おや、さすがに照れてますね。年上をからかうからそうなるんですよ。ふふふ」"

[[dialogue]]
speaker = "ウェンディ"
# 「……最後にひとつ」
line = "「……最後にひとつ」"

[[dialogue]]
speaker = "ウェンディ"
# 「ネビュラにはネビュラの正義があります。星騎士には星騎士の正義があるでしょう」
line = "「ネビュラにはネビュラの正義があります。星騎士には星騎士の正義があるでしょう」"

[[dialogue]]
speaker = "ウェンディ"
# 「だから、あなたはあなたの正義を貫いてください。私も譲る気はありませんから」
line = "「だから、あなたはあなたの正義を貫いてください。私も譲る気はありませんから」"

[[dialogue]]
speaker = "ウェンディ"
# 「今は何のことかわからないでしょうが。いずれわかりますよ、そのうち」
line = "「今は何のことかわからないでしょうが。いずれわかりますよ、そのうち」"

[[dialogue]]
speaker = "ウェンディ"
# 「では私は会社に戻ります。またお会いするかもしれませんね」
line = "「では私は会社に戻ります。またお会いするかもしれませんね」"
