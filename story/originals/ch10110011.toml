[[dialogue]]
speaker = "unk"
# 第１話,普通の女の子,P
line = "第１話,普通の女の子,P"

[[dialogue]]
speaker = "マトイ"
# 「私、最近ずっと考えてたことがあって……」
line = "「私、最近ずっと考えてたことがあって……」"

[[dialogue]]
speaker = "unk"
# どうした、急に？
line = "どうした、急に？"

[[dialogue]]
speaker = "マトイ"
# 「新星星徒会役員たるもの、普通じゃいけないと思うの……！」
line = "「新星星徒会役員たるもの、普通じゃいけないと思うの……！」"

[[dialogue]]
speaker = "unk"
# 本当にどうした！？　急に！？
line = "本当にどうした！？　急に！？"

[[dialogue]]
speaker = "マトイ"
# 「なのに私には、特徴って呼べるものが全然なくて……『ザ・普通』って感じじゃない？　だから、何かキャラ付けが欲しいって思ってるんだけど……」
line = "「なのに私には、特徴って呼べるものが全然なくて……『ザ・普通』って感じじゃない？　だから、何かキャラ付けが欲しいって思ってるんだけど……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「なるほどね。マトイの悩みは完全に理解したわ！」
line = "「なるほどね。マトイの悩みは完全に理解したわ！」"

[[dialogue]]
speaker = "マトイ"
# 「ヴィーナス！？　いつの間に星徒会室に入って来たの！？」
line = "「ヴィーナス！？　いつの間に星徒会室に入って来たの！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私はいつでも、皆を影から支えるフィクサーよ！　それはともかく、安心しなさいマトイ。私たち星徒会メンバーが、マトイを立派に輝く一番星にしてみせるわ！」
line = "「私はいつでも、皆を影から支えるフィクサーよ！　それはともかく、安心しなさいマトイ。私たち星徒会メンバーが、マトイを立派に輝く一番星にしてみせるわ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「アナ！　サーシャさん！　今こそ新しくなった星徒会が力を合わせる時よ！　集合！」
line = "「アナ！　サーシャさん！　今こそ新しくなった星徒会が力を合わせる時よ！　集合！」"

[[dialogue]]
speaker = "マトイ"
# 「へっ？　２人はどこに……」
line = "「へっ？　２人はどこに……」"

[[dialogue]]
speaker = "サーシャ"
# 「はいは～い。なんだか面白そうな話ね～。もちろん協力するわ～♪」
line = "「はいは～い。なんだか面白そうな話ね～。もちろん協力するわ～♪」"

[[dialogue]]
speaker = "アナ"
# 「しゅたっ。面白そう。ちょうど休憩中でしたので、ノープロブレムです」
line = "「しゅたっ。面白そう。ちょうど休憩中でしたので、ノープロブレムです」"

[[dialogue]]
speaker = "マトイ"
# 「なんか下と上から来た！？　どこに隠れてたの！？」
line = "「なんか下と上から来た！？　どこに隠れてたの！？」"

[[dialogue]]
speaker = "マトイ"
# 「というか、そんな大ごとじゃなくて、シンプルな相談のつもりだったんだけど……」
line = "「というか、そんな大ごとじゃなくて、シンプルな相談のつもりだったんだけど……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「個性と言えばやっぱり『ツンデレ』よ、マトイ！　これほど『ザ・個性』と呼べるものはほかにないわ！」
line = "「個性と言えばやっぱり『ツンデレ』よ、マトイ！　これほど『ザ・個性』と呼べるものはほかにないわ！」"

[[dialogue]]
speaker = "マトイ"
# 「え、でも……そもそもツンデレって普通だよね？」
line = "「え、でも……そもそもツンデレって普通だよね？」"

[[dialogue]]
speaker = "unk"
# そ、そうか……？
line = "そ、そうか……？"

[[dialogue]]
speaker = "マトイ"
# 「だって、そんなのテンプレでしょ？　仮に普通じゃないにしても、金髪でツインテールの女の子がやらないと、意味がないような気がするし」
line = "「だって、そんなのテンプレでしょ？　仮に普通じゃないにしても、金髪でツインテールの女の子がやらないと、意味がないような気がするし」"

[[dialogue]]
speaker = "ヴィーナス"
# 「金髪ツインテールにしなさい、マトイ！　私が許可するわ！」
line = "「金髪ツインテールにしなさい、マトイ！　私が許可するわ！」"

[[dialogue]]
speaker = "マトイ"
# 「だ、ダメだって！　髪の毛なんて染めたら不良だって思われちゃうし……そんな普通じゃない姿を見せたら、お父さんとお母さん卒倒しちゃうから……」
line = "「だ、ダメだって！　髪の毛なんて染めたら不良だって思われちゃうし……そんな普通じゃない姿を見せたら、お父さんとお母さん卒倒しちゃうから……」"

[[dialogue]]
speaker = "unk"
# いま普通じゃないって言った？
line = "いま普通じゃないって言った？"

[[dialogue]]
speaker = "サーシャ"
# 「なら『愛が重い』っていうのはどうかしら～？　可愛さも持ち合わせながら、相手に強い印象を残せると思うのよね～」
line = "「なら『愛が重い』っていうのはどうかしら～？　可愛さも持ち合わせながら、相手に強い印象を残せると思うのよね～」"

[[dialogue]]
speaker = "マトイ"
# 「うーん、でも別に、愛が重いのって普通じゃないですか？」
line = "「うーん、でも別に、愛が重いのって普通じゃないですか？」"

[[dialogue]]
speaker = "unk"
# 普通……か？
line = "普通……か？"

[[dialogue]]
speaker = "マトイ"
# 「だって、愛が軽い方がおかしくない？　例えば浮気してるのとかって、愛が軽いってことだよね？」
line = "「だって、愛が軽い方がおかしくない？　例えば浮気してるのとかって、愛が軽いってことだよね？」"

[[dialogue]]
speaker = "マトイ"
# 「連絡が多かったりすると重いって言われがちだけど、そもそも好きな人と連絡を取りたがるなんて、普通じゃないかな？」
line = "「連絡が多かったりすると重いって言われがちだけど、そもそも好きな人と連絡を取りたがるなんて、普通じゃないかな？」"

[[dialogue]]
speaker = "マトイ"
# 「私はそういうタイプだと思うけど、それぐらいじゃ別に個性にはならないっていうか……」
line = "「私はそういうタイプだと思うけど、それぐらいじゃ別に個性にはならないっていうか……」"

[[dialogue]]
speaker = "サーシャ"
# 「あら～♪　マトイちゃんと将来お付き合いする人は、しっかりと大きな愛を受け止めてあげないといけないわね♪」
line = "「あら～♪　マトイちゃんと将来お付き合いする人は、しっかりと大きな愛を受け止めてあげないといけないわね♪」"

[[dialogue]]
speaker = "アナ"
# 「どうやら、ここは私の出番」
line = "「どうやら、ここは私の出番」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうよ、アナならなんとかしてくれるわ！　名案をちょうだい、アナ！」
line = "「そうよ、アナならなんとかしてくれるわ！　名案をちょうだい、アナ！」"

[[dialogue]]
speaker = "アナ"
# 「個性というのは中身だけじゃない。見た目も重要。故に、カツラでいいのでズバリ──髪型を『モヒカン』にしましょう」
line = "「個性というのは中身だけじゃない。見た目も重要。故に、カツラでいいのでズバリ──髪型を『モヒカン』にしましょう」"

[[dialogue]]
speaker = "マトイ"
# 「え、モヒカンって普通じゃない？」
line = "「え、モヒカンって普通じゃない？」"

[[dialogue]]
speaker = "unk"
# それは明らかに普通じゃないよ！？
line = "それは明らかに普通じゃないよ！？"

[[dialogue]]
speaker = "マトイ"
# 「だけど、バンドをしてる友達がモヒカンにしてる姿、見たことあるよ？」
line = "「だけど、バンドをしてる友達がモヒカンにしてる姿、見たことあるよ？」"

[[dialogue]]
speaker = "マトイ"
# 「私、どうしてそんな髪型にしちゃったのか聞いたんだけど、その子はツッパることが私たちにとって『普通のこと』なんだって言ってた！」
line = "「私、どうしてそんな髪型にしちゃったのか聞いたんだけど、その子はツッパることが私たちにとって『普通のこと』なんだって言ってた！」"

[[dialogue]]
speaker = "サーシャ"
# 「いいわね～、なんだか青春って感じがして～」
line = "「いいわね～、なんだか青春って感じがして～」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ぜひ星徒会に欲しい人材ね！　マトイ、今度そのお友達を紹介してちょうだい！」
line = "「ぜひ星徒会に欲しい人材ね！　マトイ、今度そのお友達を紹介してちょうだい！」"

[[dialogue]]
speaker = "アナ"
# 「……会長。マトイ先輩、この星徒会にいるから目立たないだけで、十分普通じゃない気がするんですが」
line = "「……会長。マトイ先輩、この星徒会にいるから目立たないだけで、十分普通じゃない気がするんですが」"

[[dialogue]]
speaker = "unk"
# 天然だこれ……
line = "天然だこれ……"

[[dialogue]]
speaker = "アナ"
# 「そもそも、星徒会役員であるマトイ先輩が、自分のことを普通だと思う理由がわかりません。ここにいる時点で、十分特別だと思いますが？」
line = "「そもそも、星徒会役員であるマトイ先輩が、自分のことを普通だと思う理由がわかりません。ここにいる時点で、十分特別だと思いますが？」"

[[dialogue]]
speaker = "マトイ"
# 「そ、それはそうなんだけど……だってほら、みんな、凄いじゃん……」
line = "「そ、それはそうなんだけど……だってほら、みんな、凄いじゃん……」"

[[dialogue]]
speaker = "マトイ"
# 「アナは１年生なのに星徒会入りしてて、みんなから天才って呼ばれてるような天使だし……」
line = "「アナは１年生なのに星徒会入りしてて、みんなから天才って呼ばれてるような天使だし……」"

[[dialogue]]
speaker = "マトイ"
# 「サーシャさんも去年まで星徒会長だった実力者で、しかも魔族で余裕があって、理想のお姉さんだって言われてるし……」
line = "「サーシャさんも去年まで星徒会長だった実力者で、しかも魔族で余裕があって、理想のお姉さんだって言われてるし……」"

[[dialogue]]
speaker = "マトイ"
# 「ヴィーナスは、ヴィーナスだし……」
line = "「ヴィーナスは、ヴィーナスだし……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私の褒め方だけ凄く雑じゃない！？」
line = "「私の褒め方だけ凄く雑じゃない！？」"

[[dialogue]]
speaker = "アナ"
# 「前会長は存在自体が普通じゃないので」
line = "「前会長は存在自体が普通じゃないので」"

[[dialogue]]
speaker = "マトイ"
# 「あーもう、やっぱり明日からモヒカンにしてくるべき！？　私もツッパったほうがいいってことぉ！？」
line = "「あーもう、やっぱり明日からモヒカンにしてくるべき！？　私もツッパったほうがいいってことぉ！？」"

[[dialogue]]
speaker = "アナ"
# 「あっ、冗談ですごめんなさいやめてください流石の私も罪悪感でトラウマになります」
line = "「あっ、冗談ですごめんなさいやめてください流石の私も罪悪感でトラウマになります」"

[[dialogue]]
speaker = "unk"
# そのままで十分素敵！！！
line = "そのままで十分素敵！！！"

[[dialogue]]
speaker = "unk"
# マトイ可愛い！　超可愛い！
line = "マトイ可愛い！　超可愛い！"

[[dialogue]]
speaker = "マトイ"
# 「やめて止めないで……！　私なんてモヒカンを金髪ツインテールにして、ツンデレお嬢様になるくらいしか、もう生き残る道はないの！」
line = "「やめて止めないで……！　私なんてモヒカンを金髪ツインテールにして、ツンデレお嬢様になるくらいしか、もう生き残る道はないの！」"

[[dialogue]]
speaker = "unk"
# 俺とアナは、錯乱したマトイがモヒカンを止めると言うまで、両側から押さえ込んで必死に説得するのだった。
line = "俺とアナは、錯乱したマトイがモヒカンを止めると言うまで、両側から押さえ込んで必死に説得するのだった。"
