[[dialogue]]
speaker = "unk"
# 第２話,美鶴とショッピング,P
line = "第２話,美鶴とショッピング,P"

[[dialogue]]
speaker = "美鶴"
# 「なんでうちが会長さんと……？」
line = "「なんでうちが会長さんと……？」"

[[dialogue]]
speaker = "unk"
# ヴィーナスが計画を立てた『美鶴の心を開け大作戦』第１弾は、『美鶴と買い物に行ってきなさい！』だった。
line = "ヴィーナスが計画を立てた『美鶴の心を開け大作戦』第１弾は、『美鶴と買い物に行ってきなさい！』だった。"

[[dialogue]]
speaker = "unk"
# ちなみに何を買いに行くのかというと……
line = "ちなみに何を買いに行くのかというと……"

[[dialogue]]
speaker = "美鶴"
# 「手芸店で生地と糸とボタンをしこたま買います。次の衣装を作るのに使うんで」
line = "「手芸店で生地と糸とボタンをしこたま買います。次の衣装を作るのに使うんで」"

[[dialogue]]
speaker = "unk"
# 通販とかじゃダメなの？
line = "通販とかじゃダメなの？"

[[dialogue]]
speaker = "美鶴"
# 「絶対ダメ」
line = "「絶対ダメ」"

[[dialogue]]
speaker = "美鶴"
# 「通販だとどうしても色味に誤差があるし。実物を見ると、全然違うじゃんってなりがち。やっぱり直に自分の目で見ないと、描いてるイメージとの違いが──」
line = "「通販だとどうしても色味に誤差があるし。実物を見ると、全然違うじゃんってなりがち。やっぱり直に自分の目で見ないと、描いてるイメージとの違いが──」"

[[dialogue]]
speaker = "美鶴"
# 「──って、すみません。うち、会長さんに慣れ慣れしい言葉遣いで……服の話になると、つい素が……」
line = "「──って、すみません。うち、会長さんに慣れ慣れしい言葉遣いで……服の話になると、つい素が……」"

[[dialogue]]
speaker = "unk"
# 今の口調が、美鶴の素なのか。確かにこの前、星徒会に来た時よりも自然な感じだった。
line = "今の口調が、美鶴の素なのか。確かにこの前、星徒会に来た時よりも自然な感じだった。"

[[dialogue]]
speaker = "美鶴"
# 「うち、もともとメイドじゃないし、生まれも育ちもそんなに良くはないんで。ですます口調は板についてないってゆーか……あ、またやっちゃった」
line = "「うち、もともとメイドじゃないし、生まれも育ちもそんなに良くはないんで。ですます口調は板についてないってゆーか……あ、またやっちゃった」"

[[dialogue]]
speaker = "unk"
# 話しやすいように話してくれていいよ
line = "話しやすいように話してくれていいよ"

[[dialogue]]
speaker = "美鶴"
# 「でも、会長さんにあまり無礼なのも……お嬢様にも迷惑かかっちゃいますし」
line = "「でも、会長さんにあまり無礼なのも……お嬢様にも迷惑かかっちゃいますし」"

[[dialogue]]
speaker = "unk"
# そんな些細な事を気にするお嬢様じゃなくない？
line = "そんな些細な事を気にするお嬢様じゃなくない？"

[[dialogue]]
speaker = "美鶴"
# 「……確かにそーですね」
line = "「……確かにそーですね」"

[[dialogue]]
speaker = "美鶴"
# 「んじゃ、こっから遠慮はなしで」
line = "「んじゃ、こっから遠慮はなしで」"

[[dialogue]]
speaker = "美鶴"
# 「ふう……ちょっと気が楽になった。ありがと、会長さん。うち、男の人と出かけるなんて初めてだから、実は緊張してて」
line = "「ふう……ちょっと気が楽になった。ありがと、会長さん。うち、男の人と出かけるなんて初めてだから、実は緊張してて」"

[[dialogue]]
speaker = "美鶴"
# 「まったく。当主様もだけど、お嬢様も無茶振りが酷いんすよ。九浄家は無茶振り大好き家系──おっ」
line = "「まったく。当主様もだけど、お嬢様も無茶振りが酷いんすよ。九浄家は無茶振り大好き家系──おっ」"

[[dialogue]]
speaker = "unk"
# 美鶴の視線は、服が立ち並ぶショーウインドウに釘付けになった。
line = "美鶴の視線は、服が立ち並ぶショーウインドウに釘付けになった。"

[[dialogue]]
speaker = "美鶴"
# 「わ、いいカンジの服。丁寧な仕事してるじゃん」
line = "「わ、いいカンジの服。丁寧な仕事してるじゃん」"

[[dialogue]]
speaker = "美鶴"
# 「あの腰回り、どうなってるんだろ。透け感が絶妙……あー、あの辺、次の衣装に活かせるかも。もうちょっと派手めに盛ってもだいじょぶそーかな……」
line = "「あの腰回り、どうなってるんだろ。透け感が絶妙……あー、あの辺、次の衣装に活かせるかも。もうちょっと派手めに盛ってもだいじょぶそーかな……」"

[[dialogue]]
speaker = "美鶴"
# 「……あ、ごめん、良いカンジの服を見かけるとつい見入っちゃうんだ。職業病ってやつかな」
line = "「……あ、ごめん、良いカンジの服を見かけるとつい見入っちゃうんだ。職業病ってやつかな」"

[[dialogue]]
speaker = "美鶴"
# 「新しい服見ると、いろいろ参考になるから面白いよ。まだまだうちも学ばなきゃいけないこといっぱいあるし」
line = "「新しい服見ると、いろいろ参考になるから面白いよ。まだまだうちも学ばなきゃいけないこといっぱいあるし」"

[[dialogue]]
speaker = "美鶴"
# 「っと、寄り道してないで、買い物終わらせなきゃだね」
line = "「っと、寄り道してないで、買い物終わらせなきゃだね」"

[[dialogue]]
speaker = "美鶴"
# 「んー……生地も揃えたし、糸もボタンもＯＫっと……布って結構重いでしょ。会長さん、うちが持つよ」
line = "「んー……生地も揃えたし、糸もボタンもＯＫっと……布って結構重いでしょ。会長さん、うちが持つよ」"

[[dialogue]]
speaker = "unk"
# このくらいなら全然平気
line = "このくらいなら全然平気"

[[dialogue]]
speaker = "美鶴"
# 「そ？　じゃ、お言葉に甘えて──うわ」
line = "「そ？　じゃ、お言葉に甘えて──うわ」"

[[dialogue]]
speaker = "美鶴"
# 「うそ、この映画館『恐怖のデス・ナットー２』やってる。激レアじゃん。やってるの、流星市国らへんじゃここだけなんじゃ？」
line = "「うそ、この映画館『恐怖のデス・ナットー２』やってる。激レアじゃん。やってるの、流星市国らへんじゃここだけなんじゃ？」"

[[dialogue]]
speaker = "美鶴"
# 「タイトルからしてヤバいでしょ。パニック映画なんだけど、大量の納豆が人類に襲い掛かってきてさ。体中の穴という穴に納豆が埋め込まれるってやつ」
line = "「タイトルからしてヤバいでしょ。パニック映画なんだけど、大量の納豆が人類に襲い掛かってきてさ。体中の穴という穴に納豆が埋め込まれるってやつ」"

[[dialogue]]
speaker = "美鶴"
# 「Ｂ級映画どころじゃないよ。もっと酷い。なんで続編作ったんだろーってくらい。ふふふ」
line = "「Ｂ級映画どころじゃないよ。もっと酷い。なんで続編作ったんだろーってくらい。ふふふ」"

[[dialogue]]
speaker = "unk"
# 興味あるなら、観る？
line = "興味あるなら、観る？"

[[dialogue]]
speaker = "美鶴"
# 「え、うちは興味ありありだけど……とてもオススメできないよ。会長さんに悪いって。お金と時間の無駄かも」
line = "「え、うちは興味ありありだけど……とてもオススメできないよ。会長さんに悪いって。お金と時間の無駄かも」"

[[dialogue]]
speaker = "美鶴"
# 「あ、でも、上映期間、今日までなんだ。見逃したら、二度とこんなチャンスなさそーだし……」
line = "「あ、でも、上映期間、今日までなんだ。見逃したら、二度とこんなチャンスなさそーだし……」"

[[dialogue]]
speaker = "美鶴"
# 「あ、ちょ、会長さん、手ぇ引っ張らなくても──」
line = "「あ、ちょ、会長さん、手ぇ引っ張らなくても──」"

[[dialogue]]
speaker = "美鶴"
# 「うちらの貸し切りだったね。誰もいなかった」
line = "「うちらの貸し切りだったね。誰もいなかった」"

[[dialogue]]
speaker = "美鶴"
# 「会長さん、顔色悪いし。だから、言ったじゃん。ホントに酷いんだって。ふふ、ふふふ」
line = "「会長さん、顔色悪いし。だから、言ったじゃん。ホントに酷いんだって。ふふ、ふふふ」"

[[dialogue]]
speaker = "美鶴"
# 「頭空っぽにしたい時、気分転換に映画観るんだ、こーゆー見るからにダメっぽいやつ。いくらなんでも、これはダメすぎたけど」
line = "「頭空っぽにしたい時、気分転換に映画観るんだ、こーゆー見るからにダメっぽいやつ。いくらなんでも、これはダメすぎたけど」"

[[dialogue]]
speaker = "美鶴"
# 「誰かと観ると、後で一緒に笑い飛ばせて、なんか楽しーね」
line = "「誰かと観ると、後で一緒に笑い飛ばせて、なんか楽しーね」"

[[dialogue]]
speaker = "美鶴"
# 「こんな映画に付き合ってくれるの、会長さんくらいだし。良かったら、また行こ」
line = "「こんな映画に付き合ってくれるの、会長さんくらいだし。良かったら、また行こ」"

[[dialogue]]
speaker = "unk"
# 次はもう少し、マシな映画が観たいかな
line = "次はもう少し、マシな映画が観たいかな"

[[dialogue]]
speaker = "美鶴"
# 「そーだね。考えとく。ふふ」
line = "「そーだね。考えとく。ふふ」"

[[dialogue]]
speaker = "unk"
# デス・ナットーの衝撃はしばらく糸を引きそうだったけど、楽しそうな美鶴の笑顔を見れたことだし、良しとしよう。
line = "デス・ナットーの衝撃はしばらく糸を引きそうだったけど、楽しそうな美鶴の笑顔を見れたことだし、良しとしよう。"
