# 「ああっ、あっ、あ……おち○ぽ様……私の中の弱いとこ……ズンズン突いてっ……んっ、あっ、ああぁあっ……！！」
line = "「ああっ、あっ、あ……おち○ぽ様……私の中の弱いとこ……ズンズン突いてっ……んっ、あっ、ああぁあっ……！！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「こんなのっ、ダメになりますわっ<emoji=heart04>　おち○ぽ様に、ダメにされてしまいますわっ<emoji=heart04>　あっ、あ、ああっ、あ、あ、ああああっ！！」
line = "「こんなのっ、ダメになりますわっ<emoji=heart04>　おち○ぽ様に、ダメにされてしまいますわっ<emoji=heart04>　あっ、あ、ああっ、あ、あ、ああああっ！！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「気持ちいいのっ！　いけないこと、気持ちいいのっ！　もっと、してっ、もっともっと、してください、会長様ぁ<emoji=heart04><emoji=heart04>」
line = "「気持ちいいのっ！　いけないこと、気持ちいいのっ！　もっと、してっ、もっともっと、してください、会長様ぁ<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 膣壁が射精を促すように、淫靡な動きを繰り返す。
line = "膣壁が射精を促すように、淫靡な動きを繰り返す。"

[[dialogue]]
speaker = "unk"
# 摩擦と吸引によって生まれる快感に、俺も無心で身体を揺さぶり動かす。
line = "摩擦と吸引によって生まれる快感に、俺も無心で身体を揺さぶり動かす。"

[[dialogue]]
speaker = "エルデリーゼ"
# 「ああっ、あっ、あ、あああっ……や、あ、あああっ……<emoji=heart04><emoji=heart04>　あ、んんっ、ん、あ、あああっ……<emoji=heart04><emoji=heart04><emoji=heart04>」
line = "「ああっ、あっ、あ、あああっ……や、あ、あああっ……<emoji=heart04><emoji=heart04>　あ、んんっ、ん、あ、あああっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「んぅうううっ、そこ、だめぇっ……！　ぐりぐりされると、変な感じになっちゃうのぉっ<emoji=heart04><emoji=heart04>」
line = "「んぅうううっ、そこ、だめぇっ……！　ぐりぐりされると、変な感じになっちゃうのぉっ<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 先端が押している場所は、俺も今まで知らなかった場所だ。
line = "先端が押している場所は、俺も今まで知らなかった場所だ。"

[[dialogue]]
speaker = "unk"
# 新たに見つけた、エルゼの感じる場所を集中的に攻めながら、俺も徐々に絶頂に向かって上りつめていく。
line = "新たに見つけた、エルゼの感じる場所を集中的に攻めながら、俺も徐々に絶頂に向かって上りつめていく。"

[[dialogue]]
speaker = "エルデリーゼ"
# 「やあっ、あっ、あ、んんっ、あ、ああぁあっ……！　だめぇ、だめ、だめ、だめぇ……そこだめぇ……！！」
line = "「やあっ、あっ、あ、んんっ、あ、ああぁあっ……！　だめぇ、だめ、だめ、だめぇ……そこだめぇ……！！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「そんなとこ、ずっとゴリゴリされたらっ！　私、おかしくなっちゃうっ！　絶対我慢できないですわぁっ……！！！」
line = "「そんなとこ、ずっとゴリゴリされたらっ！　私、おかしくなっちゃうっ！　絶対我慢できないですわぁっ……！！！」"

[[dialogue]]
speaker = "unk"
# そんな事を言われたら、徹底的にその部分を刺激して、エルゼを壊してしまいたくなる。
line = "そんな事を言われたら、徹底的にその部分を刺激して、エルゼを壊してしまいたくなる。"

[[dialogue]]
speaker = "エルデリーゼ"
# 「ああぁあっ、わ、わかるっ……んんっ……すごいの、くるっ……ああぁあっ、だめっ、あ、あああぅううっ！」
line = "「ああぁあっ、わ、わかるっ……んんっ……すごいの、くるっ……ああぁあっ、だめっ、あ、あああぅううっ！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「会長、様っ……んんんっ、私、もう、もうっ……ダメ……すごいの……込み上げて来てて……あっ、あ、んんぁああっ……！！」
line = "「会長、様っ……んんんっ、私、もう、もうっ……ダメ……すごいの……込み上げて来てて……あっ、あ、んんぁああっ……！！」"

[[dialogue]]
speaker = "クロト"
# 「そのまま、最後まで……気持ちよくなって……」
line = "「そのまま、最後まで……気持ちよくなって……」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「んんんっ、ぁ……あぁあ……わかり、ましたわ……」
line = "「んんんっ、ぁ……あぁあ……わかり、ましたわ……」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「会長様っ<emoji=heart04>　連れて行ってくださいませっ<emoji=heart04>　私を、最後までっ<emoji=heart04>　あっ<emoji=heart04>　あっ<emoji=heart04>　あ、ああっ<emoji=heart04>　あ、あああっ、や、あ、あああっ<emoji=heart04>」
line = "「会長様っ<emoji=heart04>　連れて行ってくださいませっ<emoji=heart04>　私を、最後までっ<emoji=heart04>　あっ<emoji=heart04>　あっ<emoji=heart04>　あ、ああっ<emoji=heart04>　あ、あああっ、や、あ、あああっ<emoji=heart04>」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「あ、あああっ……んんっ、あっ……！　あ、ああっ！　あっ、ぁ、ぁあぁ、っ、んんぅ……あぁぁ、あっ、や、あ、ああああ……！」
line = "「あ、あああっ……んんっ、あっ……！　あ、ああっ！　あっ、ぁ、ぁあぁ、っ、んんぅ……あぁぁ、あっ、や、あ、ああああ……！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「ふぁ、あぁあああああああああああ～～～～～んっ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」
line = "「ふぁ、あぁあああああああああああ～～～～～んっ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「イグッ！　んんっ、あぁああっ！！！　あ、んんぅううっ！！！！　イグッ、イッでるゥっっっ！！！！！」
line = "「イグッ！　んんっ、あぁああっ！！！　あ、んんぅううっ！！！！　イグッ、イッでるゥっっっ！！！！！」"

[[dialogue]]
speaker = "unk"
# 絶頂叫びと共に、エルゼの膣内で弾けるように精液をぶちまける。
line = "絶頂叫びと共に、エルゼの膣内で弾けるように精液をぶちまける。"

[[dialogue]]
speaker = "unk"
# 同時にエルゼの身体が激しく痙攣し、大量の液体が花びらの内から吐き出された。
line = "同時にエルゼの身体が激しく痙攣し、大量の液体が花びらの内から吐き出された。"

[[dialogue]]
speaker = "エルデリーゼ"
# 「あ゛ぅうううっ！！　出ちゃうっ！　あっ、あ、ああぁああっ！！！」
line = "「あ゛ぅうううっ！！　出ちゃうっ！　あっ、あ、ああぁああっ！！！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「おしっこ、ですのぉっ！！　んんぅううっ！！　私っ、おち○ぽ様にイカされてっ、お漏らししちゃってますのぉっ！！」
line = "「おしっこ、ですのぉっ！！　んんぅううっ！！　私っ、おち○ぽ様にイカされてっ、お漏らししちゃってますのぉっ！！」"

[[dialogue]]
speaker = "unk"
# 絶え間なく吐き出される聖水を浴びながら、欲望の限りをエルゼの中に吐き出していく。
line = "絶え間なく吐き出される聖水を浴びながら、欲望の限りをエルゼの中に吐き出していく。"

[[dialogue]]
speaker = "unk"
# 全てを出し尽くして、エルゼの膣内からペニスを引き抜いた。
line = "全てを出し尽くして、エルゼの膣内からペニスを引き抜いた。"

[[dialogue]]
speaker = "unk"
# 収まりきらなかった精液が膣口からあふれ出し、ビーチチェアに出来上がった温かい水たまりの上にトロリと流れた。
line = "収まりきらなかった精液が膣口からあふれ出し、ビーチチェアに出来上がった温かい水たまりの上にトロリと流れた。"

[[dialogue]]
speaker = "エルデリーゼ"
# 「はぁ、ぅうう……会長様……私……んぅう……」
line = "「はぁ、ぅうう……会長様……私……んぅう……」"

[[dialogue]]
speaker = "unk"
# 未だ快感の余韻に身体を震わせながら、苦しそうな吐息交じりに呟く。
line = "未だ快感の余韻に身体を震わせながら、苦しそうな吐息交じりに呟く。"

[[dialogue]]
speaker = "エルデリーゼ"
# 「で、出ちゃ……ました……おしっこ……」
line = "「で、出ちゃ……ました……おしっこ……」"

[[dialogue]]
speaker = "クロト"
# 「でも、お漏らししちゃうくらい気持ちよかったんだよね……」
line = "「でも、お漏らししちゃうくらい気持ちよかったんだよね……」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「そうですわ……」
line = "「そうですわ……」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「じわじわ何かがこみ上げてきていて……最後の瞬間に何かがはじけたようになって……」
line = "「じわじわ何かがこみ上げてきていて……最後の瞬間に何かがはじけたようになって……」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「気が付いたら、もう……お漏らししていましたわ……」
line = "「気が付いたら、もう……お漏らししていましたわ……」"

[[dialogue]]
speaker = "クロト"
# 「そんなに気持ちよくなれたんだ……」
line = "「そんなに気持ちよくなれたんだ……」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「はぅ……またあなたに……お変態な快感を、植え付けられてしまいましたの……」
line = "「はぅ……またあなたに……お変態な快感を、植え付けられてしまいましたの……」"

[[dialogue]]
speaker = "クロト"
# 「俺はまた、エルゼが感じすぎてお漏らしするところ、見たいな」
line = "「俺はまた、エルゼが感じすぎてお漏らしするところ、見たいな」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「やめてくださいませ、もうっ……」
line = "「やめてくださいませ、もうっ……」"

[[dialogue]]
speaker = "unk"
# 頬を膨らませるエルゼだったが、その表情はむしろ清々しいものの様に思えたのだった。
line = "頬を膨らませるエルゼだったが、その表情はむしろ清々しいものの様に思えたのだった。"
