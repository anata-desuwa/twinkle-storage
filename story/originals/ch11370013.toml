[[dialogue]]
speaker = "unk"
# 第３話,レミカとレジェンドアイドル,P
line = "第３話,レミカとレジェンドアイドル,P"

[[dialogue]]
speaker = "unk"
# あれからレミカは、リトルフォームの姿を元にしたアバターでＶチューバーデビューし、汐ルカルカと『歌ってみた』のコラボ動画を配信。
line = "あれからレミカは、リトルフォームの姿を元にしたアバターでＶチューバーデビューし、汐ルカルカと『歌ってみた』のコラボ動画を配信。"

[[dialogue]]
speaker = "unk"
# 新生Ｖチューバー『<ruby=しどう>詩道</ruby>ミソラ』として、本格的に活動を始めていた。
line = "新生Ｖチューバー『<ruby>詩道<rt>しどう</rt></ruby>ミソラ』として、本格的に活動を始めていた。"

[[dialogue]]
speaker = "ルルカ"
# 「――というわけで♪　今日はレミカ先輩ではなく、新たなＶチューバー及び、妹仲間のミソラちゃんとして……」
line = "「――というわけで♪　今日はレミカ先輩ではなく、新たなＶチューバー及び、妹仲間のミソラちゃんとして……」"

[[dialogue]]
speaker = "ルルカ"
# 「『歌ってみた』コラボ大成功のお祝いだよ～！　ドンドン、パフパフ～♪」
line = "「『歌ってみた』コラボ大成功のお祝いだよ～！　ドンドン、パフパフ～♪」"

[[dialogue]]
speaker = "unk"
# デビューおめでとう！
line = "デビューおめでとう！"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「ありがとう♪　ルカルカと……ルルカと一緒に歌えたことで、自分が目指している『可愛いアイドル』に、また１歩近づけた気がするよ」
line = "「ありがとう♪　ルカルカと……ルルカと一緒に歌えたことで、自分が目指している『可愛いアイドル』に、また１歩近づけた気がするよ」"

[[dialogue]]
speaker = "ルルカ"
# 「こちらこそ♪　あたしも、ミソラちゃんの言葉のおかげで、自分の歌に少し自信が持てるようになったよ！」
line = "「こちらこそ♪　あたしも、ミソラちゃんの言葉のおかげで、自分の歌に少し自信が持てるようになったよ！」"

[[dialogue]]
speaker = "ルルカ"
# 「何より、ミソラちゃんと一緒に歌うの、本当に楽しくて……」
line = "「何より、ミソラちゃんと一緒に歌うの、本当に楽しくて……」"

[[dialogue]]
speaker = "ルルカ"
# 「歌が好きって気持ちを諦めずに、ルカルカとして活動してきてよかったなって、改めて思ったんだ♪　ありがとう！」
line = "「歌が好きって気持ちを諦めずに、ルカルカとして活動してきてよかったなって、改めて思ったんだ♪　ありがとう！」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「私も、すごく楽しかった。だからこれからも、ルルカとＶチューバーのアイドルユニットとして、一緒に歌っていけたら嬉しいな」
line = "「私も、すごく楽しかった。だからこれからも、ルルカとＶチューバーのアイドルユニットとして、一緒に歌っていけたら嬉しいな」"

[[dialogue]]
speaker = "ルルカ"
# 「うん♪　絶対伸びるし、また動画を上げていこう！」
line = "「うん♪　絶対伸びるし、また動画を上げていこう！」"

[[dialogue]]
speaker = "unk"
# ２人はお互い笑顔を浮かべて、握手を交わした。
line = "２人はお互い笑顔を浮かべて、握手を交わした。"

[[dialogue]]
speaker = "unk"
# ――と、そこで、レミカが思い出したように口を開く。
line = "――と、そこで、レミカが思い出したように口を開く。"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「そうだ、ルルカにもう１つ、ぶっちゃけて聞きたいことがあったんだ」
line = "「そうだ、ルルカにもう１つ、ぶっちゃけて聞きたいことがあったんだ」"

[[dialogue]]
speaker = "ルルカ"
# 「聞きたいこと？」
line = "「聞きたいこと？」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「私がルルカの歌声を気に入ったきっかけなんだけど……実は、自分が尊敬してるアイドルに、雰囲気がすごく似てたからなんだ」
line = "「私がルルカの歌声を気に入ったきっかけなんだけど……実は、自分が尊敬してるアイドルに、雰囲気がすごく似てたからなんだ」"

[[dialogue]]
speaker = "ルルカ"
# 「えっ！？」
line = "「えっ！？」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「昔、魔族でありながら、人間界でトップアイドルとして活躍していた――」
line = "「昔、魔族でありながら、人間界でトップアイドルとして活躍していた――」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「<ruby=しおなぎ>汐凪</ruby>シャルル」
line = "「<ruby>汐凪<rt>しおなぎ</rt></ruby>シャルル」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「ルルカは……シャルルさんと、何か関係があったりする？」
line = "「ルルカは……シャルルさんと、何か関係があったりする？」"

[[dialogue]]
speaker = "ルルカ"
# 「ぎくぎくぅっ……！？」
line = "「ぎくぎくぅっ……！？」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「うん。そのわかりやすい反応……やっぱり関係ありそうだね」
line = "「うん。そのわかりやすい反応……やっぱり関係ありそうだね」"

[[dialogue]]
speaker = "ルルカ"
# 「う、うぅ……はい……正直に言います……」
line = "「う、うぅ……はい……正直に言います……」"

[[dialogue]]
speaker = "ルルカ"
# 「汐凪シャルルは……あたしのお母さんなんです……」
line = "「汐凪シャルルは……あたしのお母さんなんです……」"

[[dialogue]]
speaker = "unk"
# それから、ルルカの紹介を通して、レミカは流星市国内の喫茶店で、シャルルさんと顔を合わせることになった。
line = "それから、ルルカの紹介を通して、レミカは流星市国内の喫茶店で、シャルルさんと顔を合わせることになった。"

[[dialogue]]
speaker = "ルルカ"
# 「それじゃあ改めて……こちらがあたしのお母さんです」
line = "「それじゃあ改めて……こちらがあたしのお母さんです」"

[[dialogue]]
speaker = "シャルル"
# 「は～い♪　レミカちゃん、初めまして♪　ルルカちゃんのママをしてます、海野辺シャルルで～す♪」
line = "「は～い♪　レミカちゃん、初めまして♪　ルルカちゃんのママをしてます、海野辺シャルルで～す♪」"

[[dialogue]]
speaker = "unk"
# ルルカの隣に腰かけている女性がにこやかな笑顔で挨拶をする。
line = "ルルカの隣に腰かけている女性がにこやかな笑顔で挨拶をする。"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「は、初めまして。ルルカさんと仲よくさせて頂いております、愛戸レミカです」
line = "「は、初めまして。ルルカさんと仲よくさせて頂いております、愛戸レミカです」"

[[dialogue]]
speaker = "unk"
# 周囲の注目を避けるため、レミカはリトルフォームに変身していた。
line = "周囲の注目を避けるため、レミカはリトルフォームに変身していた。"

[[dialogue]]
speaker = "unk"
# シャルルさんも有名な元アイドルの為、目立たないような変装をして来ていた。
line = "シャルルさんも有名な元アイドルの為、目立たないような変装をして来ていた。"

[[dialogue]]
speaker = "unk"
# ――それでも、彼女の笑顔にはひと目で思わず惹きつけられるような、魅力ある『可愛さ』が溢れていて。
line = "――それでも、彼女の笑顔にはひと目で思わず惹きつけられるような、魅力ある『可愛さ』が溢れていて。"

[[dialogue]]
speaker = "シャルル"
# 「きゃ～っ♪　テレビで見てる現役のトップアイドルと、こうしてお話できるなんて～♪　私、心キラキラしてきちゃうわ～♪」
line = "「きゃ～っ♪　テレビで見てる現役のトップアイドルと、こうしてお話できるなんて～♪　私、心キラキラしてきちゃうわ～♪」"

[[dialogue]]
speaker = "ルルカ"
# 「お母さん、し～っ！　し～っ！　ちょっと声大きいから！」
line = "「お母さん、し～っ！　し～っ！　ちょっと声大きいから！」"

[[dialogue]]
speaker = "シャルル"
# 「あら、ごめんなさ～い♪　てへっ<emoji=heart04>」
line = "「あら、ごめんなさ～い♪　てへっ<emoji=heart04>」"

[[dialogue]]
speaker = "レミカ（幼少）"
# （し、シャルルさん、お母さんになっても変わらず可愛い……！）
line = "（し、シャルルさん、お母さんになっても変わらず可愛い……！）"

[[dialogue]]
speaker = "シャルル"
# 「会長くんも久しぶりね～♪　前のクリスマスの時以来かしら？」
line = "「会長くんも久しぶりね～♪　前のクリスマスの時以来かしら？」"

[[dialogue]]
speaker = "unk"
# シャルルさん、ご無沙汰してます
line = "シャルルさん、ご無沙汰してます"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「……まさかレジェンドアイドルと、こうして直接お会いできるなんて、光栄です」
line = "「……まさかレジェンドアイドルと、こうして直接お会いできるなんて、光栄です」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「ルルカさんがシャルルさんと血縁関係にあるかもしれないと気づいたのは、偶然だったんですが……」
line = "「ルルカさんがシャルルさんと血縁関係にあるかもしれないと気づいたのは、偶然だったんですが……」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「もしお会いできるならと、ルルカさんにお願いさせてもらったんです」
line = "「もしお会いできるならと、ルルカさんにお願いさせてもらったんです」"

[[dialogue]]
speaker = "シャルル"
# 「こちらこそ、今のトップアイドルに会えて、すごく嬉しいわ♪」
line = "「こちらこそ、今のトップアイドルに会えて、すごく嬉しいわ♪」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「私、アイドルとして活動する中で、シャルルさんが現役だった頃のライブ映像を今でも何度も見返していて……ずっと、参考にさせてもらっているんです」
line = "「私、アイドルとして活動する中で、シャルルさんが現役だった頃のライブ映像を今でも何度も見返していて……ずっと、参考にさせてもらっているんです」"

[[dialogue]]
speaker = "シャルル"
# 「それ、知ってるわ♪　インタビューで私の名前が出た時、すごく嬉しかったのよ～♪」
line = "「それ、知ってるわ♪　インタビューで私の名前が出た時、すごく嬉しかったのよ～♪」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「ほ、本当ですか！？　そんなふうに思ってもらえてたなんて……」
line = "「ほ、本当ですか！？　そんなふうに思ってもらえてたなんて……」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「あ、あの！　……シャルルさん、もしよければ、お聞きしたいことがあって――」
line = "「あ、あの！　……シャルルさん、もしよければ、お聞きしたいことがあって――」"

[[dialogue]]
speaker = "シャルル"
# 「ええ♪　なんでも聞いてちょうだい」
line = "「ええ♪　なんでも聞いてちょうだい」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「私、シャルルさんのような『可愛いアイドル』を目指していて……」
line = "「私、シャルルさんのような『可愛いアイドル』を目指していて……」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「現役時代、どんなことを意識してアイドル活動をされていたのか、ぜひお話を聞いてみたかったんです」
line = "「現役時代、どんなことを意識してアイドル活動をされていたのか、ぜひお話を聞いてみたかったんです」"

[[dialogue]]
speaker = "シャルル"
# 「あ～、確かにそういう話って、インタビューとかでも話したことなかったわね」
line = "「あ～、確かにそういう話って、インタビューとかでも話したことなかったわね」"

[[dialogue]]
speaker = "シャルル"
# 「そうね……私、自分がどうなりたいかってことは、デビューしてから、少しずつ考えるようになったの」
line = "「そうね……私、自分がどうなりたいかってことは、デビューしてから、少しずつ考えるようになったの」"

[[dialogue]]
speaker = "シャルル"
# 「私、それまでは魔界の田舎街に住んでいて、アイドルの存在なんて知らなかったから。……それで、子供の頃は、自分の歌を褒められるのが嬉しかったけど――」
line = "「私、それまでは魔界の田舎街に住んでいて、アイドルの存在なんて知らなかったから。……それで、子供の頃は、自分の歌を褒められるのが嬉しかったけど――」"

[[dialogue]]
speaker = "シャルル"
# 「人間界に来てアイドルになって、活動を続けるうちに、私の歌を聴いた人が笑顔になってくれることの方が、もっと嬉しいってことに気づくようになったのよ」
line = "「人間界に来てアイドルになって、活動を続けるうちに、私の歌を聴いた人が笑顔になってくれることの方が、もっと嬉しいってことに気づくようになったのよ」"

[[dialogue]]
speaker = "シャルル"
# 「だから、元アイドルとして、レミカちゃんに伝えるなら……」
line = "「だから、元アイドルとして、レミカちゃんに伝えるなら……」"

[[dialogue]]
speaker = "シャルル"
# 「『可愛いアイドル』を目指すのは素敵だけど、今のレミカちゃんを応援してくれているファンの存在も、忘れないであげて欲しいってことかしら」
line = "「『可愛いアイドル』を目指すのは素敵だけど、今のレミカちゃんを応援してくれているファンの存在も、忘れないであげて欲しいってことかしら」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「……今の、私を……」
line = "「……今の、私を……」"

[[dialogue]]
speaker = "シャルル"
# 「ふふっ♪　少なくとも私は、アイドルとしての輝きを磨き続ける、今のレミカちゃんが大好きよ♪」
line = "「ふふっ♪　少なくとも私は、アイドルとしての輝きを磨き続ける、今のレミカちゃんが大好きよ♪」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「……ありがとうございます。私、ちゃんと考えてみます」
line = "「……ありがとうございます。私、ちゃんと考えてみます」"

[[dialogue]]
speaker = "シャルル"
# 「ねぇ、レミカちゃん。サイン、貰ってもいい？」
line = "「ねぇ、レミカちゃん。サイン、貰ってもいい？」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「えっ！？　シャルルさんが、私のサインを……！？」
line = "「えっ！？　シャルルさんが、私のサインを……！？」"

[[dialogue]]
speaker = "シャルル"
# 「ええ♪　私、今では立派なアイドルオタクだから♪　推している子のサインは欲しいわ！」
line = "「ええ♪　私、今では立派なアイドルオタクだから♪　推している子のサインは欲しいわ！」"

[[dialogue]]
speaker = "unk"
# レジェンドアイドルが、アイドルオタク！？
line = "レジェンドアイドルが、アイドルオタク！？"

[[dialogue]]
speaker = "ルルカ"
# 「うん、実はそうなんだよね～。今日みたいに変装して、よくライブに行ったりしてるし」
line = "「うん、実はそうなんだよね～。今日みたいに変装して、よくライブに行ったりしてるし」"

[[dialogue]]
speaker = "ルルカ"
# 「しかも、お母さん……女の子アイドル推しなんだよ？」
line = "「しかも、お母さん……女の子アイドル推しなんだよ？」"

[[dialogue]]
speaker = "シャルル"
# 「つまり、私もレミカちゃんの大ファンってこと♪」
line = "「つまり、私もレミカちゃんの大ファンってこと♪」"

[[dialogue]]
speaker = "シャルル"
# 「だから――これからも、ずっと応援してるわ♪」
line = "「だから――これからも、ずっと応援してるわ♪」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「光栄です……♪　私、もっと頑張ります！」
line = "「光栄です……♪　私、もっと頑張ります！」"

[[dialogue]]
speaker = "unk"
# その後も、シャルルさんやルルカと一緒に、歌やアイドルの話で盛り上がり――
line = "その後も、シャルルさんやルルカと一緒に、歌やアイドルの話で盛り上がり――"

[[dialogue]]
speaker = "unk"
# レミカはまた１つ、自分の目指す『可愛いアイドル』への手がかりを胸に刻むのだった。
line = "レミカはまた１つ、自分の目指す『可愛いアイドル』への手がかりを胸に刻むのだった。"
