[[dialogue]]
speaker = "unk"
# フニの声は、フェニックスの中から聞こえてきていた。
line = "フニの声は、フェニックスの中から聞こえてきていた。"

[[dialogue]]
speaker = "フェニエル"
# 「ダメだよ！　ホウちゃん！　私の為に消えようとするだなんて！」
line = "「ダメだよ！　ホウちゃん！　私の為に消えようとするだなんて！」"

[[dialogue]]
speaker = "フェニックス"
# 「フニ……もういいのです。私は……」
line = "「フニ……もういいのです。私は……」"

[[dialogue]]
speaker = "フェニックス"
# 「不死の存在として、長い時間をひとりで生きてきました……もう十分に生きたのです」
line = "「不死の存在として、長い時間をひとりで生きてきました……もう十分に生きたのです」"

[[dialogue]]
speaker = "フェニックス"
# 「ですが、私の生の中でもわずかな時間にすぎなかったはずの、あなたと一緒に過ごした時が、もっとも幸福だと思えるのです」
line = "「ですが、私の生の中でもわずかな時間にすぎなかったはずの、あなたと一緒に過ごした時が、もっとも幸福だと思えるのです」"

[[dialogue]]
speaker = "フェニックス"
# 「私は不死故に、家族を持たない存在……」
line = "「私は不死故に、家族を持たない存在……」"

[[dialogue]]
speaker = "フェニックス"
# 「不死鳥という種族は、この世に存在しない。たった一体、私だけなのです。決して死なず、何度もこの身１つで甦り、生き続ける個体だった……」
line = "「不死鳥という種族は、この世に存在しない。たった一体、私だけなのです。決して死なず、何度もこの身１つで甦り、生き続ける個体だった……」"

[[dialogue]]
speaker = "フェニックス"
# 「だからこそ、私はずっとわかっていなかったのです。誰かの為に、強くなれる心の在り方を……」
line = "「だからこそ、私はずっとわかっていなかったのです。誰かの為に、強くなれる心の在り方を……」"

[[dialogue]]
speaker = "フェニックス"
# 「アウクセシアには、腕っぷしの強さだけでなく、賭けにも負けました」
line = "「アウクセシアには、腕っぷしの強さだけでなく、賭けにも負けました」"

[[dialogue]]
speaker = "フェニックス"
# 「たとえ乱世が続かなくとも、リクリエに抗える強き者――クロトやフニのような存在は現れるのだと知りました」
line = "「たとえ乱世が続かなくとも、リクリエに抗える強き者――クロトやフニのような存在は現れるのだと知りました」"

[[dialogue]]
speaker = "フェニックス"
# 「……乱世でこそ『強さ』が生まれるという考えは、決して間違っていないと今でも思っています」
line = "「……乱世でこそ『強さ』が生まれるという考えは、決して間違っていないと今でも思っています」"

[[dialogue]]
speaker = "フェニックス"
# 「しかし、決して正しくもなかった。続いた平和によって育まれる優しき心、その蓄積によって生まれる仲間との絆もまた、重要だったのです」
line = "「しかし、決して正しくもなかった。続いた平和によって育まれる優しき心、その蓄積によって生まれる仲間との絆もまた、重要だったのです」"

[[dialogue]]
speaker = "フェニックス"
# 「心の強さというものを、私は見誤っていた」
line = "「心の強さというものを、私は見誤っていた」"

[[dialogue]]
speaker = "フェニックス"
# 「だって、私自身も今――」
line = "「だって、私自身も今――」"

[[dialogue]]
speaker = "フェニックス"
# 「こうして、フニの為ならばもう２度と甦れなくなっても構わないと、強く想えるようになったのだから」
line = "「こうして、フニの為ならばもう２度と甦れなくなっても構わないと、強く想えるようになったのだから」"

[[dialogue]]
speaker = "フェニエル"
# 「ホウちゃん……」
line = "「ホウちゃん……」"

[[dialogue]]
speaker = "フェニエル"
# 「私ね……ホウちゃんが私の中にいるって知った時、すごく嬉しかったの」
line = "「私ね……ホウちゃんが私の中にいるって知った時、すごく嬉しかったの」"

[[dialogue]]
speaker = "フェニエル"
# 「私を見守ってくれている家族がずっとそばにいたんだって」
line = "「私を見守ってくれている家族がずっとそばにいたんだって」"

[[dialogue]]
speaker = "フェニエル"
# 「だからね、ホウちゃんと一緒なんだよ」
line = "「だからね、ホウちゃんと一緒なんだよ」"

[[dialogue]]
speaker = "フェニエル"
# 「私もこれ以上、大切な家族を失いたくないの」
line = "「私もこれ以上、大切な家族を失いたくないの」"

[[dialogue]]
speaker = "フェニエル"
# 「だから、消滅しても構わないだなんて言わないで！　私、ホウちゃんの力に耐えられるようにけっぱるから！」
line = "「だから、消滅しても構わないだなんて言わないで！　私、ホウちゃんの力に耐えられるようにけっぱるから！」"

[[dialogue]]
speaker = "フェニエル"
# 「今すぐにはダメだとしても、精神が消滅しないようにホウちゃんの中でけっぱり続ける！」
line = "「今すぐにはダメだとしても、精神が消滅しないようにホウちゃんの中でけっぱり続ける！」"

[[dialogue]]
speaker = "フェニエル"
# 「それでいつか必ず、強くなって目覚めてみせるよ！　だって私……お父さんとお母さんの分も生き続けるって、誓ったんだから！」
line = "「それでいつか必ず、強くなって目覚めてみせるよ！　だって私……お父さんとお母さんの分も生き続けるって、誓ったんだから！」"

[[dialogue]]
speaker = "フェニックス"
# 「フニ……！」
line = "「フニ……！」"

[[dialogue]]
speaker = "セシア"
# 「それでこそ、わたくしが見込んだ将来のママよ、フニ」
line = "「それでこそ、わたくしが見込んだ将来のママよ、フニ」"

[[dialogue]]
speaker = "セシア"
# 「だからこそ、あなたを死なせたりしないわ。そして、あなたもよ、ホウちゃんママ」
line = "「だからこそ、あなたを死なせたりしないわ。そして、あなたもよ、ホウちゃんママ」"

[[dialogue]]
speaker = "フェニックス"
# 「私、も……？」
line = "「私、も……？」"

[[dialogue]]
speaker = "セシア"
# 「わたくしはママを愛する守護天使。ならば、せっかく見つけた新たなママを失う選択など、認められるはずがないわ！」
line = "「わたくしはママを愛する守護天使。ならば、せっかく見つけた新たなママを失う選択など、認められるはずがないわ！」"

[[dialogue]]
speaker = "セシア"
# 「だから……今からわたくしと戦いなさい、ホウちゃんママ」
line = "「だから……今からわたくしと戦いなさい、ホウちゃんママ」"

[[dialogue]]
speaker = "フェニックス"
# 「戦う……！？　セシア、あなたは一体何を……」
line = "「戦う……！？　セシア、あなたは一体何を……」"

[[dialogue]]
speaker = "セシア"
# 「あなた、言ったわよね？　この精神世界では、現実よりも時間の進みが遥かに遅いって」
line = "「あなた、言ったわよね？　この精神世界では、現実よりも時間の進みが遥かに遅いって」"

[[dialogue]]
speaker = "セシア"
# 「なら、不可能が可能になるまで、情報を蓄積すればいい」
line = "「なら、不可能が可能になるまで、情報を蓄積すればいい」"

[[dialogue]]
speaker = "セシア"
# 「わたくしは蓄積を司る守護天使セシア。あらゆる経験を積み重ねる程に強くなる。一番手っ取り早いのが、戦闘よ」
line = "「わたくしは蓄積を司る守護天使セシア。あらゆる経験を積み重ねる程に強くなる。一番手っ取り早いのが、戦闘よ」"

[[dialogue]]
speaker = "フェニックス"
# 「正気ですか！？　一体、どれだけの時間がかかると……」
line = "「正気ですか！？　一体、どれだけの時間がかかると……」"

[[dialogue]]
speaker = "セシア"
# 「それでフニと一緒にいられるのなら、諦める理由はない。そうでしょう？」
line = "「それでフニと一緒にいられるのなら、諦める理由はない。そうでしょう？」"

[[dialogue]]
speaker = "フェニックス"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "フェニックス"
# 「……わかりました。それで本当に、フニとの未来が見られるのなら！」
line = "「……わかりました。それで本当に、フニとの未来が見られるのなら！」"

[[dialogue]]
speaker = "unk"
# 俺はセシアの肩に手を置く。
line = "俺はセシアの肩に手を置く。"

[[dialogue]]
speaker = "unk"
# 俺も手伝うぞ
line = "俺も手伝うぞ"

[[dialogue]]
speaker = "unk"
# そしてもう片方の肩も――
line = "そしてもう片方の肩も――"

[[dialogue]]
speaker = "ルルカ"
# 「もちろん、あたしもね！　友達を助ける為だもん！」
line = "「もちろん、あたしもね！　友達を助ける為だもん！」"

[[dialogue]]
speaker = "セシア"
# 「ええ。ありがとう、２人共」
line = "「ええ。ありがとう、２人共」"

[[dialogue]]
speaker = "フェニエル"
# 「みなさん……！」
line = "「みなさん……！」"

[[dialogue]]
speaker = "セシア"
# 「――そういうわけで、ホウちゃんママ、全力で来なさい」
line = "「――そういうわけで、ホウちゃんママ、全力で来なさい」"

[[dialogue]]
speaker = "セシア"
# 「あなたの力、わたくしの中に全て蓄積させてもらうわ！」
line = "「あなたの力、わたくしの中に全て蓄積させてもらうわ！」"

[[dialogue]]
speaker = "フェニックス"
# 「いいでしょう。守護天使セシア……私の想い、あなたに預けます！」
line = "「いいでしょう。守護天使セシア……私の想い、あなたに預けます！」"

[[dialogue]]
speaker = "セシア"
# 「フニ、待ってなさい。わたくしが――いえ、わたくし達みんなで！」
line = "「フニ、待ってなさい。わたくしが――いえ、わたくし達みんなで！」"

[[dialogue]]
speaker = "セシア"
# 「あなたに必ず、未来というプレゼントを届けてみせるわ！」
line = "「あなたに必ず、未来というプレゼントを届けてみせるわ！」"

[[dialogue]]
speaker = "フェニエル"
# 「はい……！　私、みなさんを信じます！」
line = "「はい……！　私、みなさんを信じます！」"

[[dialogue]]
speaker = "セシア"
# 「――いざ、勝負よっ！」
line = "「――いざ、勝負よっ！」"

[[dialogue]]
speaker = "unk"
# 俺たちはフニとホウちゃんの両方を助けるために、戦闘を開始するのだった――
line = "俺たちはフニとホウちゃんの両方を助けるために、戦闘を開始するのだった――"
