[[dialogue]]
speaker = "unk"
# 第１１話,胡乱なささやき,B
line = "第１１話,胡乱なささやき,B"

[[dialogue]]
speaker = "unk"
# ──ネメシス。
line = "──ネメシス。"

[[dialogue]]
speaker = "unk"
# そう謳われた終末の森は、今も混沌の様相を呈していた。
line = "そう謳われた終末の森は、今も混沌の様相を呈していた。"

[[dialogue]]
speaker = "unk"
# そんな終わりと始まりの地で、一人の少女が苦悶にあえぐ──
line = "そんな終わりと始まりの地で、一人の少女が苦悶にあえぐ──"

[[dialogue]]
speaker = "ヴィーナス"
# 「……はあ、はあ……」
line = "「……はあ、はあ……」"

[[dialogue]]
speaker = "ヴィーナス"
# （さすがに……キツくなってきたわね。星力だけで回復し続けるってのも──無理があったかしら……）
line = "（さすがに……キツくなってきたわね。星力だけで回復し続けるってのも──無理があったかしら……）"

[[dialogue]]
speaker = "ヴィーナス"
# （なんとかＤＩＳＣは使えたけど──もう、あんな真似はできそうにないし……）
line = "（なんとかＤＩＳＣは使えたけど──もう、あんな真似はできそうにないし……）"

[[dialogue]]
speaker = "ヴィーナス"
# （ううん──信じなくちゃ……！　みんなならきっと<ruby=こっち>魔界</ruby>へ来て……私のメッセージにも気づいてくれる……！）
line = "（ううん──信じなくちゃ……！　みんなならきっと<ruby>魔界<rt>こっち</rt></ruby>へ来て……私のメッセージにも気づいてくれる……！）"

[[dialogue]]
speaker = "unk"
# ヴィーナスはまだ希望を捨てていなかった。
line = "ヴィーナスはまだ希望を捨てていなかった。"

[[dialogue]]
speaker = "unk"
# 強靭な精神力が彼女を奮い立たせ、さらに金星とのリンクを強めていく。
line = "強靭な精神力が彼女を奮い立たせ、さらに金星とのリンクを強めていく。"

[[dialogue]]
speaker = "ヴィーナス"
# （にしても──妙と言えば、妙よね……）
line = "（にしても──妙と言えば、妙よね……）"

[[dialogue]]
speaker = "ヴィーナス"
# （あの男……一体誰と何を話してるのかしら……？）
line = "（あの男……一体誰と何を話してるのかしら……？）"

[[dialogue]]
speaker = "黒騎士"
# 『……ああ。わかっている。こちらからこれ以上の干渉をする気はない』
line = "『……ああ。わかっている。こちらからこれ以上の干渉をする気はない』"

[[dialogue]]
speaker = "黒騎士"
# 『ジグとの契約通りでいい。事が済めば、お仲間の情報もくれてやる』
line = "『ジグとの契約通りでいい。事が済めば、お仲間の情報もくれてやる』"

[[dialogue]]
speaker = "黒騎士"
# 『私が欲するのはデネブへの経路のみ──もはやアルタイルの末路など、一片の興味もない』
line = "『私が欲するのはデネブへの経路のみ──もはやアルタイルの末路など、一片の興味もない』"

[[dialogue]]
speaker = "？？？"
# 「ＯＫ──それさえ守ってくれるならいいよ。だから、もう──彼に手を出すのはやめてよね」
line = "「ＯＫ──それさえ守ってくれるならいいよ。だから、もう──彼に手を出すのはやめてよね」"

[[dialogue]]
speaker = "？？？"
# 「にしてもあなたは本当に……ジグの言ってた通りの人だね。<ruby=かえり>顧</ruby>みる気もないっていうか」
line = "「にしてもあなたは本当に……ジグの言ってた通りの人だね。<ruby>顧<rt>かえり</rt></ruby>みる気もないっていうか」"

[[dialogue]]
speaker = "黒騎士"
# 『フ。後戻りできぬというなら、貴様も同じことだろう』
line = "『フ。後戻りできぬというなら、貴様も同じことだろう』"

[[dialogue]]
speaker = "？？？"
# 「まーね。僕だって……ハッピーエンドの道があるなら、そっちのが良かったけどさ」
line = "「まーね。僕だって……ハッピーエンドの道があるなら、そっちのが良かったけどさ」"

[[dialogue]]
speaker = "？？？"
# 「誰にだって──譲れない一線ってのがあるじゃん。人間でも、そうじゃなくても」
line = "「誰にだって──譲れない一線ってのがあるじゃん。人間でも、そうじゃなくても」"

[[dialogue]]
speaker = "unk"
# 遠くから響く黒騎士たちの会話──
line = "遠くから響く黒騎士たちの会話──"

[[dialogue]]
speaker = "unk"
# しかし今のヴィーナスに、その内容を<ruby=そしゃく>咀嚼</ruby>する余裕は残っていなかった。
line = "しかし今のヴィーナスに、その内容を<ruby>咀嚼<rt>そしゃく</rt></ruby>する余裕は残っていなかった。"

[[dialogue]]
speaker = "unk"
# 彼女の頭にあるのはただ、一人の──頼るべき相手のことだけ。
line = "彼女の頭にあるのはただ、一人の──頼るべき相手のことだけ。"

[[dialogue]]
speaker = "ヴィーナス"
# （クロト……）
line = "（クロト……）"

[[dialogue]]
speaker = "unk"
# かすれ、弱っていく命のろうそく。
line = "かすれ、弱っていく命のろうそく。"

[[dialogue]]
speaker = "unk"
# 果たして彼女の目論見は──無事に結実するのだろうか。
line = "果たして彼女の目論見は──無事に結実するのだろうか。"
