[[dialogue]]
speaker = "unk"
# 第１話,護衛メイドは見守りたい,P
line = "第１話,護衛メイドは見守りたい,P"

[[dialogue]]
speaker = "unk"
# いつもヴィーナスの後を付いて回っている人物がいる――
line = "いつもヴィーナスの後を付いて回っている人物がいる――"

[[dialogue]]
speaker = "unk"
# そのことに気付いた俺は、意を決して彼女に話しかけてみることにした。
line = "そのことに気付いた俺は、意を決して彼女に話しかけてみることにした。"

[[dialogue]]
speaker = "閃"
# 「……おや？　どうかされましたか、会長さん？」
line = "「……おや？　どうかされましたか、会長さん？」"

[[dialogue]]
speaker = "unk"
# はじめまして。キミは――
line = "はじめまして。キミは――"

[[dialogue]]
speaker = "閃"
# 「ああ、ご挨拶がまだでしたね。失礼しました。存在に気付かれないうちは……と思っていたものですから」
line = "「ああ、ご挨拶がまだでしたね。失礼しました。存在に気付かれないうちは……と思っていたものですから」"

[[dialogue]]
speaker = "閃"
# 「改めまして、私は新星学園２年、<ruby=ふじおか　せん>藤岡閃</ruby>と申します」
line = "「改めまして、私は新星学園２年、<ruby>藤岡閃<rt>ふじおか　せん</rt></ruby>と申します」"

[[dialogue]]
speaker = "閃"
# 「九浄家メイド隊で、ヴィーナスお嬢様の護衛と、学園内の警備を担当させてもらっています」
line = "「九浄家メイド隊で、ヴィーナスお嬢様の護衛と、学園内の警備を担当させてもらっています」"

[[dialogue]]
speaker = "unk"
# 九浄家メイド隊って確か……
line = "九浄家メイド隊って確か……"

[[dialogue]]
speaker = "閃"
# 「九浄家の現当主様が星見家メイド隊に対抗して作った組織です。お屋敷の仕事はもちろんですが、学園運営の手伝いも行っています」
line = "「九浄家の現当主様が星見家メイド隊に対抗して作った組織です。お屋敷の仕事はもちろんですが、学園運営の手伝いも行っています」"

[[dialogue]]
speaker = "閃"
# 「私の場合は、お屋敷の仕事がお嬢様の護衛、学園の仕事が校内警備といった感じです」
line = "「私の場合は、お屋敷の仕事がお嬢様の護衛、学園の仕事が校内警備といった感じです」"

[[dialogue]]
speaker = "unk"
# だからいつも、刀を持ち歩いているんだな
line = "だからいつも、刀を持ち歩いているんだな"

[[dialogue]]
speaker = "閃"
# 「ああ、これですか。日頃から持ち慣れてると、目立つことも忘れがちになってしまいますね」
line = "「ああ、これですか。日頃から持ち慣れてると、目立つことも忘れがちになってしまいますね」"

[[dialogue]]
speaker = "閃"
# 「当主様の権限で、私は学園及び周辺地域で帯刀の許可をもらっているんです。許可証も学生手帳に入れて、持ち歩いてます」
line = "「当主様の権限で、私は学園及び周辺地域で帯刀の許可をもらっているんです。許可証も学生手帳に入れて、持ち歩いてます」"

[[dialogue]]
speaker = "閃"
# 「いつ何時、お嬢様に不埒なことを働く輩が現れるか分かりませんからね」
line = "「いつ何時、お嬢様に不埒なことを働く輩が現れるか分かりませんからね」"

[[dialogue]]
speaker = "unk"
# でも護衛なら隠れる必要はないんじゃ……？
line = "でも護衛なら隠れる必要はないんじゃ……？"

[[dialogue]]
speaker = "閃"
# 「いえいえ！　私なんかが、お嬢様の華麗な日常を邪魔するわけにはいきませんっ」
line = "「いえいえ！　私なんかが、お嬢様の華麗な日常を邪魔するわけにはいきませんっ」"

[[dialogue]]
speaker = "閃"
# 「ほら、写真を撮る時も、撮られていることに気付いていない自然な笑顔がいいと、よく聞くじゃないですか」
line = "「ほら、写真を撮る時も、撮られていることに気付いていない自然な笑顔がいいと、よく聞くじゃないですか」"

[[dialogue]]
speaker = "閃"
# 「それと同じです。お嬢様がありのままに放つ、自然の輝きこそが至高……！」
line = "「それと同じです。お嬢様がありのままに放つ、自然の輝きこそが至高……！」"

[[dialogue]]
speaker = "unk"
# か、輝き……？
line = "か、輝き……？"

[[dialogue]]
speaker = "閃"
# 「ええ、ヴィーナスお嬢様と親しい会長さんならばよくご存じのはずです。お嬢様の一挙一動から放たれる、眩しくも神々しいオーラを！」
line = "「ええ、ヴィーナスお嬢様と親しい会長さんならばよくご存じのはずです。お嬢様の一挙一動から放たれる、眩しくも神々しいオーラを！」"

[[dialogue]]
speaker = "閃"
# 「あちらをご覧ください。ちょうどお嬢様がアナさんに声を掛けているみたいです」
line = "「あちらをご覧ください。ちょうどお嬢様がアナさんに声を掛けているみたいです」"

[[dialogue]]
speaker = "ヴィーナス"
# 「アナ、いいところで会ったわ。実はお願いしたいことがあるのよ」
line = "「アナ、いいところで会ったわ。実はお願いしたいことがあるのよ」"

[[dialogue]]
speaker = "アナ"
# 「前会長……。もしかしてまた書類仕事ですか？」
line = "「前会長……。もしかしてまた書類仕事ですか？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「さすがアナね！　その通りよ！」
line = "「さすがアナね！　その通りよ！」"

[[dialogue]]
speaker = "アナ"
# 「はぁ、たまには自分でやってみては――」
line = "「はぁ、たまには自分でやってみては――」"

[[dialogue]]
speaker = "ヴィーナス"
# 「もちろんこの通り、報酬の和菓子も用意してあるわ！」
line = "「もちろんこの通り、報酬の和菓子も用意してあるわ！」"

[[dialogue]]
speaker = "アナ"
# 「やります。前会長はやはり女神……！」
line = "「やります。前会長はやはり女神……！」"

[[dialogue]]
speaker = "unk"
# （お菓子で釣ってる……！）
line = "（お菓子で釣ってる……！）"

[[dialogue]]
speaker = "閃"
# 「はあぁ……さすがです、お嬢様……<emoji=heart04>　後輩から慕われる人望の厚さ、施しを与える慈愛の深さ……アナさんの言う通り、まさに女神のよう……！」
line = "「はあぁ……さすがです、お嬢様……<emoji=heart04>　後輩から慕われる人望の厚さ、施しを与える慈愛の深さ……アナさんの言う通り、まさに女神のよう……！」"

[[dialogue]]
speaker = "閃"
# 「私もお嬢様に施されたい……！」
line = "「私もお嬢様に施されたい……！」"

[[dialogue]]
speaker = "unk"
# えぇ……
line = "えぇ……"

[[dialogue]]
speaker = "閃"
# 「何ですか会長さん、その疑うような眼差しは！」
line = "「何ですか会長さん、その疑うような眼差しは！」"

[[dialogue]]
speaker = "閃"
# 「お嬢様の言葉には凄い力があるんですよ？　無理だと思えることも、お嬢様から出来ると言われると、本当に出来るようになったりするんですから！」
line = "「お嬢様の言葉には凄い力があるんですよ？　無理だと思えることも、お嬢様から出来ると言われると、本当に出来るようになったりするんですから！」"

[[dialogue]]
speaker = "unk"
# 閃は……ヴィーナスのことが好きなのか？
line = "閃は……ヴィーナスのことが好きなのか？"

[[dialogue]]
speaker = "閃"
# 「す、好きとかそんな、下世話な言い方をしないで下さい！　私はただ、お嬢様を尊敬しているだけです……！」
line = "「す、好きとかそんな、下世話な言い方をしないで下さい！　私はただ、お嬢様を尊敬しているだけです……！」"

[[dialogue]]
speaker = "閃"
# 「ハッ……！」
line = "「ハッ……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「やっぱりクロトじゃない。こんなところでどうしたのよ？　というか、さっきまで誰かと話してなかった？」
line = "「やっぱりクロトじゃない。こんなところでどうしたのよ？　というか、さっきまで誰かと話してなかった？」"

[[dialogue]]
speaker = "unk"
# 実は……って、あれ！？　閃がいない！？
line = "実は……って、あれ！？　閃がいない！？"

[[dialogue]]
speaker = "ヴィーナス"
# 「センちゃんがいたの？　私の護衛を引き受けてくれているから、すぐ戻って来るんじゃないかしら？」
line = "「センちゃんがいたの？　私の護衛を引き受けてくれているから、すぐ戻って来るんじゃないかしら？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「とりあえず一緒に星徒会室に行くわよ！　今日は色々とやりたいことがあるの」
line = "「とりあえず一緒に星徒会室に行くわよ！　今日は色々とやりたいことがあるの」"

[[dialogue]]
speaker = "unk"
# そう言って、ヴィーナスが嬉々として俺の手を取る――その時だった。
line = "そう言って、ヴィーナスが嬉々として俺の手を取る――その時だった。"

[[dialogue]]
speaker = "unk"
# （ハッ……！　殺気……！）
line = "（ハッ……！　殺気……！）"

[[dialogue]]
speaker = "閃"
# 「じーっ……」
line = "「じーっ……」"

[[dialogue]]
speaker = "閃"
# （お嬢様から手を握られるなんて羨ましいです……！　会長さん、距離が近いですよ！　早く離れて下さい！）
line = "（お嬢様から手を握られるなんて羨ましいです……！　会長さん、距離が近いですよ！　早く離れて下さい！）"

[[dialogue]]
speaker = "unk"
# （刀の柄に手を添えてない！？）
line = "（刀の柄に手を添えてない！？）"

[[dialogue]]
speaker = "unk"
# グサグサと刺さるような視線に、ヴィーナスとの距離感をくれぐれも気を付けようと思うのだった。
line = "グサグサと刺さるような視線に、ヴィーナスとの距離感をくれぐれも気を付けようと思うのだった。"
