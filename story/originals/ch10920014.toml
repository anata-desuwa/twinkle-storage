[[dialogue]]
speaker = "unk"
# 第４話,監視は続くよどこまでも,P
line = "第４話,監視は続くよどこまでも,P"

[[dialogue]]
speaker = "ヒヨ"
# 「会長サンってば、中々ハーレムの決定的証拠を押さえさせてくれねぇ」
line = "「会長サンってば、中々ハーレムの決定的証拠を押さえさせてくれねぇ」"

[[dialogue]]
speaker = "ミルフィー"
# 「まだ会長くんの監視を続けてたんだ……」
line = "「まだ会長くんの監視を続けてたんだ……」"

[[dialogue]]
speaker = "ヒヨ"
# 「当たり<ruby=めぇ>前</ruby>よ！　姐さんの安全を守るためなら、いつまででもやってやるぜい！」
line = "「当たり<ruby>前<rt>めぇ</rt></ruby>よ！　姐さんの安全を守るためなら、いつまででもやってやるぜい！」"

[[dialogue]]
speaker = "ミルフィー"
# 「あはは……ごめんね、会長くん。迷惑してない？」
line = "「あはは……ごめんね、会長くん。迷惑してない？」"

[[dialogue]]
speaker = "unk"
# ヒヨと一緒にいるのは楽しいから
line = "ヒヨと一緒にいるのは楽しいから"

[[dialogue]]
speaker = "ヒヨ"
# 「そうやってすぐ、あたしまでハーレムに加えようとしやがるっ。あたしは姐さんにゾッコンなんでい。そう簡単には会長サンになびかないぜ」
line = "「そうやってすぐ、あたしまでハーレムに加えようとしやがるっ。あたしは姐さんにゾッコンなんでい。そう簡単には会長サンになびかないぜ」"

[[dialogue]]
speaker = "ミルフィー"
# 「そう簡単に……ということは、なびく可能性はあるってことだよね？」
line = "「そう簡単に……ということは、なびく可能性はあるってことだよね？」"

[[dialogue]]
speaker = "ヒヨ"
# 「真夏に雪が降るくらいありえねぇ確率だぜい」
line = "「真夏に雪が降るくらいありえねぇ確率だぜい」"

[[dialogue]]
speaker = "ミルフィー"
# 「あはは、ヒヨちゃんは厳しいなぁ」
line = "「あはは、ヒヨちゃんは厳しいなぁ」"

[[dialogue]]
speaker = "地元の住人Ａ"
# 「あら、ヒヨちゃんじゃないかい」
line = "「あら、ヒヨちゃんじゃないかい」"

[[dialogue]]
speaker = "ヒヨ"
# 「おう、おばさん！　元気にしてたかい？」
line = "「おう、おばさん！　元気にしてたかい？」"

[[dialogue]]
speaker = "地元の住人Ａ"
# 「ヒヨちゃんの姿を見たら元気になったよ。ヒヨちゃんはお友達とお散歩かい？」
line = "「ヒヨちゃんの姿を見たら元気になったよ。ヒヨちゃんはお友達とお散歩かい？」"

[[dialogue]]
speaker = "ヒヨ"
# 「まあそんな感じでい」
line = "「まあそんな感じでい」"

[[dialogue]]
speaker = "地元の住人Ｂ"
# 「おうヒヨっ子、こっち来てたのかい！　どうだ、うちのラーメンを食っていかないか？」
line = "「おうヒヨっ子、こっち来てたのかい！　どうだ、うちのラーメンを食っていかないか？」"

[[dialogue]]
speaker = "ヒヨ"
# 「今日は連れがいるからまた今度なっ」
line = "「今日は連れがいるからまた今度なっ」"

[[dialogue]]
speaker = "地元の住人Ｃ"
# 「ヒヨちゃんヒヨちゃん……ほれ、飴でも食べなさい」
line = "「ヒヨちゃんヒヨちゃん……ほれ、飴でも食べなさい」"

[[dialogue]]
speaker = "ヒヨ"
# 「いつもありがとうよ！　いつまでも元気でいてくれよな！」
line = "「いつもありがとうよ！　いつまでも元気でいてくれよな！」"

[[dialogue]]
speaker = "unk"
# すごい人だかりだ……！
line = "すごい人だかりだ……！"

[[dialogue]]
speaker = "ミルフィー"
# 「ヒヨちゃんは地元のアイドルだからね～」
line = "「ヒヨちゃんは地元のアイドルだからね～」"

[[dialogue]]
speaker = "ヒヨ"
# 「そ、そんな大したもんじゃねぇよ……。ただ街のみんなは、あたしにとって家族みたいなもんでい」
line = "「そ、そんな大したもんじゃねぇよ……。ただ街のみんなは、あたしにとって家族みたいなもんでい」"

[[dialogue]]
speaker = "ヒヨ"
# 「そんな家族を怯えさせるリクリエを、モンスターをあたしは許せねぇ。だからあたしは、星騎士を目指して新星に入学したんでい」
line = "「そんな家族を怯えさせるリクリエを、モンスターをあたしは許せねぇ。だからあたしは、星騎士を目指して新星に入学したんでい」"

[[dialogue]]
speaker = "ミルフィー"
# 「故郷のために星騎士を目指すだなんて、ヒヨちゃんは偉いよね」
line = "「故郷のために星騎士を目指すだなんて、ヒヨちゃんは偉いよね」"

[[dialogue]]
speaker = "ヒヨ"
# 「照れるぜい……でも、姐さんのおかげでプリマステラにもなれたし、気に入らないモンスターもぶっ飛ばせるし、大満足でさぁ」
line = "「照れるぜい……でも、姐さんのおかげでプリマステラにもなれたし、気に入らないモンスターもぶっ飛ばせるし、大満足でさぁ」"

[[dialogue]]
speaker = "モンスター"
# 「イーーーーッ！」
line = "「イーーーーッ！」"

[[dialogue]]
speaker = "ミルフィー"
# 「なんて言ってたら、モンスターのお出ましだね！」
line = "「なんて言ってたら、モンスターのお出ましだね！」"

[[dialogue]]
speaker = "ヒヨ"
# 「あたしの前に出てくるとは、いい度胸だぜ！」
line = "「あたしの前に出てくるとは、いい度胸だぜ！」"

[[dialogue]]
speaker = "ミルフィー"
# 「会長くん、ヒヨちゃん……いくよ！」
line = "「会長くん、ヒヨちゃん……いくよ！」"

[[dialogue]]
speaker = "ヒヨ"
# 「おう姐さん！　サポートは任せな！　焔ノ剣紅蓮神楽！」
line = "「おう姐さん！　サポートは任せな！　焔ノ剣紅蓮神楽！」"

[[dialogue]]
speaker = "ミルフィー"
# 「力が溢れてくる……！　これならっ！　光の収束──イノセント・ノヴァ！」
line = "「力が溢れてくる……！　これならっ！　光の収束──イノセント・ノヴァ！」"

[[dialogue]]
speaker = "ヒヨ"
# 「これでトドメでい！　爆輝星壊拳！」
line = "「これでトドメでい！　爆輝星壊拳！」"

[[dialogue]]
speaker = "モンスター"
# 「イ～～……」
line = "「イ～～……」"

[[dialogue]]
speaker = "ヒヨ"
# 「ふぅ、どんなもんだい！」
line = "「ふぅ、どんなもんだい！」"

[[dialogue]]
speaker = "unk"
# いや！　まだだ！！
line = "いや！　まだだ！！"

[[dialogue]]
speaker = "モンスター"
# 「イーーーーッ！」
line = "「イーーーーッ！」"

[[dialogue]]
speaker = "ミルフィー"
# 「ヒヨちゃん！　危ない！」
line = "「ヒヨちゃん！　危ない！」"

[[dialogue]]
speaker = "ヒヨ"
# 「会長サン！」
line = "「会長サン！」"

[[dialogue]]
speaker = "ミルフィー"
# 「よくも会長くんを……！　光よ貫け──シャイニング・ペネトレーター！」
line = "「よくも会長くんを……！　光よ貫け──シャイニング・ペネトレーター！」"

[[dialogue]]
speaker = "モンスター"
# 「イ～～……」
line = "「イ～～……」"

[[dialogue]]
speaker = "ミルフィー"
# 「会長くん、ヒヨちゃん大丈夫！？」
line = "「会長くん、ヒヨちゃん大丈夫！？」"

[[dialogue]]
speaker = "ヒヨ"
# 「あたしは会長サンがかばってくれたおかげで、無傷だぜ……」
line = "「あたしは会長サンがかばってくれたおかげで、無傷だぜ……」"

[[dialogue]]
speaker = "ヒヨ"
# 「……っと、会長サン、回復させるから、じっとしといてくれよな……凪ノ剣泡沫神楽」
line = "「……っと、会長サン、回復させるから、じっとしといてくれよな……凪ノ剣泡沫神楽」"

[[dialogue]]
speaker = "ヒヨ"
# 「すまねぇ会長サン……あたしが油断したばかりに……」
line = "「すまねぇ会長サン……あたしが油断したばかりに……」"

[[dialogue]]
speaker = "ヒヨ"
# 「どうして身を挺してまで、あたしのことを？　あたしは会長サンにキツく当たってばかりなのに」
line = "「どうして身を挺してまで、あたしのことを？　あたしは会長サンにキツく当たってばかりなのに」"

[[dialogue]]
speaker = "unk"
# ヒヨが傷つくと街のみんなも悲しむから
line = "ヒヨが傷つくと街のみんなも悲しむから"

[[dialogue]]
speaker = "ヒヨ"
# 「だ、だからって、会長サンが傷ついていいわけないだろ……！　会長サンが怪我したら、あたしだって……」
line = "「だ、だからって、会長サンが傷ついていいわけないだろ……！　会長サンが怪我したら、あたしだって……」"

[[dialogue]]
speaker = "unk"
# ごめん、もうヒヨを悲しませることはしない
line = "ごめん、もうヒヨを悲しませることはしない"

[[dialogue]]
speaker = "ヒヨ"
# 「いや、あたしの方こそ、助けてくれたのに怒鳴って悪かった……」
line = "「いや、あたしの方こそ、助けてくれたのに怒鳴って悪かった……」"

[[dialogue]]
speaker = "ヒヨ"
# 「あたし、少し会長サンのことを誤解してたみてえだ……助けてくれてありがとうなっ」
line = "「あたし、少し会長サンのことを誤解してたみてえだ……助けてくれてありがとうなっ」"

[[dialogue]]
speaker = "ミルフィー"
# 「じゃあハーレム疑惑は？」
line = "「じゃあハーレム疑惑は？」"

[[dialogue]]
speaker = "ヒヨ"
# 「それはまだ疑惑のままでい」
line = "「それはまだ疑惑のままでい」"

[[dialogue]]
speaker = "ヒヨ"
# 「でも、その……会長サンのこと、少しは認めてやってもいい……」
line = "「でも、その……会長サンのこと、少しは認めてやってもいい……」"

[[dialogue]]
speaker = "ミルフィー"
# 「もう、ヒヨちゃんってば素直じゃないんだから」
line = "「もう、ヒヨちゃんってば素直じゃないんだから」"

[[dialogue]]
speaker = "ヒヨ"
# 「……くぅっ、今はこれで勘弁してくれやいっ」
line = "「……くぅっ、今はこれで勘弁してくれやいっ」"

[[dialogue]]
speaker = "unk"
# ヒヨは可愛いな
line = "ヒヨは可愛いな"

[[dialogue]]
speaker = "ヒヨ"
# 「うるせぇっ、ちょっと気を許したからって調子に乗るんじゃないやい！」
line = "「うるせぇっ、ちょっと気を許したからって調子に乗るんじゃないやい！」"
