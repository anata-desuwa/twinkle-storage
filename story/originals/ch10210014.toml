[[dialogue]]
speaker = "unk"
# 第４話,環とデート,P
line = "第４話,環とデート,P"

[[dialogue]]
speaker = "環"
# 「おーい！　待った～？」
line = "「おーい！　待った～？」"

[[dialogue]]
speaker = "unk"
# 今来たところ
line = "今来たところ"

[[dialogue]]
speaker = "環"
# 「ははっ、お決まりのやつだ。お約束は大事だね」
line = "「ははっ、お決まりのやつだ。お約束は大事だね」"

[[dialogue]]
speaker = "環"
# 「遊びに行く約束してたのに、バイトがあって結局遅くなっちゃった。ごめんね」
line = "「遊びに行く約束してたのに、バイトがあって結局遅くなっちゃった。ごめんね」"

[[dialogue]]
speaker = "unk"
# 環が謝ることじゃない
line = "環が謝ることじゃない"

[[dialogue]]
speaker = "環"
# 「ま、それもそっか。……ていうか忙しかったのはボクだけじゃないよね。今日まで会長には待たされたんだから埋め合わせしてもらわないと」
line = "「ま、それもそっか。……ていうか忙しかったのはボクだけじゃないよね。今日まで会長には待たされたんだから埋め合わせしてもらわないと」"

[[dialogue]]
speaker = "環"
# 「今日はカフェとー、映画とー……あとゲームセンターも行きたいな。久々にクレーンゲームやりたい。どっちがうまく取れるか勝負しようよ！」
line = "「今日はカフェとー、映画とー……あとゲームセンターも行きたいな。久々にクレーンゲームやりたい。どっちがうまく取れるか勝負しようよ！」"

[[dialogue]]
speaker = "環"
# 「……あれ、もしかしてもしかするとなんだけど……これってデートっていうんじゃない？」
line = "「……あれ、もしかしてもしかするとなんだけど……これってデートっていうんじゃない？」"

[[dialogue]]
speaker = "環"
# 「～～っ！　違う違う、これは健全なやつだから！　友達と遊びに行くだけ！　だよね！？」
line = "「～～っ！　違う違う、これは健全なやつだから！　友達と遊びに行くだけ！　だよね！？」"

[[dialogue]]
speaker = "環"
# 「あーっ、もう、とりあえず映画行こっ！　絶対面白いやつだから！」
line = "「あーっ、もう、とりあえず映画行こっ！　絶対面白いやつだから！」"

[[dialogue]]
speaker = "環"
# 「うーん……満足！　あの矢を何本も同時に撃つやつかっこいいなぁ～。ボクも真似してみようかな。武器弓じゃないけど」
line = "「うーん……満足！　あの矢を何本も同時に撃つやつかっこいいなぁ～。ボクも真似してみようかな。武器弓じゃないけど」"

[[dialogue]]
speaker = "環"
# 「ミュージカルシーンもすごかったねー。おっと、どうして歌とダンスがあるのか聞くのはご法度だよ？　あるものはあるんだから」
line = "「ミュージカルシーンもすごかったねー。おっと、どうして歌とダンスがあるのか聞くのはご法度だよ？　あるものはあるんだから」"

[[dialogue]]
speaker = "環"
# 「よーし、次はカフェだね。ほんとにおすすめのお店だから楽しみにしてて」
line = "「よーし、次はカフェだね。ほんとにおすすめのお店だから楽しみにしてて」"

[[dialogue]]
speaker = "環"
# 「──あ、ごめん。ちょっとトイレ」
line = "「──あ、ごめん。ちょっとトイレ」"

[[dialogue]]
speaker = "マグダレナ"
# 「こんにちは、会長さま。先ほどはどなたか一緒にいらっしゃったようですが」
line = "「こんにちは、会長さま。先ほどはどなたか一緒にいらっしゃったようですが」"

[[dialogue]]
speaker = "マグダレナ"
# 「確かシクラさま……いえ、市倉さまでしたか。お話したことはありませんが、溌剌とした方だとみなさまから伺っております」
line = "「確かシクラさま……いえ、市倉さまでしたか。お話したことはありませんが、溌剌とした方だとみなさまから伺っております」"

[[dialogue]]
speaker = "アルモタヘル"
# 「世間話はいいが、店を予約した時間まであと少しだ。行くぞ」
line = "「世間話はいいが、店を予約した時間まであと少しだ。行くぞ」"

[[dialogue]]
speaker = "マグダレナ"
# 「もう、アルモタヘルは食いしん坊さんですね」
line = "「もう、アルモタヘルは食いしん坊さんですね」"

[[dialogue]]
speaker = "アルモタヘル"
# 「だいたいお前は時間の感覚がルーズすぎるんだ。それにＤＩＳＣを使って予約したのは私だぞ」
line = "「だいたいお前は時間の感覚がルーズすぎるんだ。それにＤＩＳＣを使って予約したのは私だぞ」"

[[dialogue]]
speaker = "マグダレナ"
# 「う……それは感謝していますが」
line = "「う……それは感謝していますが」"

[[dialogue]]
speaker = "マグダレナ"
# 「会長さま、それでは我々は失礼いたします」
line = "「会長さま、それでは我々は失礼いたします」"

[[dialogue]]
speaker = "環"
# 「２人とも行った？」
line = "「２人とも行った？」"

[[dialogue]]
speaker = "unk"
# ２人が苦手なのか？
line = "２人が苦手なのか？"

[[dialogue]]
speaker = "環"
# 「そんなことは……いや、実際苦手かな」
line = "「そんなことは……いや、実際苦手かな」"

[[dialogue]]
speaker = "環"
# 「天界には各地に守護天使さまの神殿がある……らしいんだけど、ボク人間界生まれだから、その神殿に行ったことなくて」
line = "「天界には各地に守護天使さまの神殿がある……らしいんだけど、ボク人間界生まれだから、その神殿に行ったことなくて」"

[[dialogue]]
speaker = "環"
# 「だからどんな顔していいかわからないんだよね。畏れ多いし……いつもの調子だと不敬とか思われそうな気がしちゃって」
line = "「だからどんな顔していいかわからないんだよね。畏れ多いし……いつもの調子だと不敬とか思われそうな気がしちゃって」"

[[dialogue]]
speaker = "環"
# 「あ～、何その顔！　ボクにだって苦手なものくらいあるよ！　ボクをなんだと思ってるのさー」
line = "「あ～、何その顔！　ボクにだって苦手なものくらいあるよ！　ボクをなんだと思ってるのさー」"

[[dialogue]]
speaker = "環"
# 「まぁいいや。まだ時間あるし、日が暮れるまで遊ぼう！」
line = "「まぁいいや。まだ時間あるし、日が暮れるまで遊ぼう！」"

[[dialogue]]
speaker = "環"
# 「ふー、まさかカフェでまた守護天使さまとニアミスするとは思わなかったよ～。だけど向こうは気付かなかったからギリギリセーフ！」
line = "「ふー、まさかカフェでまた守護天使さまとニアミスするとは思わなかったよ～。だけど向こうは気付かなかったからギリギリセーフ！」"

[[dialogue]]
speaker = "環"
# 「でもゲーム対決は負けちゃったなぁ……割と自信あったのに。だけどいい勝負だったよね」
line = "「でもゲーム対決は負けちゃったなぁ……割と自信あったのに。だけどいい勝負だったよね」"

[[dialogue]]
speaker = "環"
# 「あ～楽しかった！　会長もちゃんと楽しんでくれてたら嬉しいな」
line = "「あ～楽しかった！　会長もちゃんと楽しんでくれてたら嬉しいな」"

[[dialogue]]
speaker = "環"
# 「だけどもう暗いし、そろそろ帰らないと。楽しい時間はあっという間に過ぎちゃうね」
line = "「だけどもう暗いし、そろそろ帰らないと。楽しい時間はあっという間に過ぎちゃうね」"

[[dialogue]]
speaker = "環"
# 「……ねぇ、今日のってやっぱりデートなのかな？」
line = "「……ねぇ、今日のってやっぱりデートなのかな？」"

[[dialogue]]
speaker = "環"
# 「あのさ。ボク、あんまり女の子っぽくないのはわかってるし、キミがどう思ってるかは知らないけど……」
line = "「あのさ。ボク、あんまり女の子っぽくないのはわかってるし、キミがどう思ってるかは知らないけど……」"

[[dialogue]]
speaker = "環"
# 「ボクだって女の子なんだよ？」
line = "「ボクだって女の子なんだよ？」"

[[dialogue]]
speaker = "unk"
# ──！？
line = "──！？"

[[dialogue]]
speaker = "環"
# 「──ぷっ」
line = "「──ぷっ」"

[[dialogue]]
speaker = "環"
# 「あはははっ、何その顔～！　ボクにドキッとしちゃった？　不純異性交遊はダメだよ？　星徒会長さんなのにいけないんだぁ～」
line = "「あはははっ、何その顔～！　ボクにドキッとしちゃった？　不純異性交遊はダメだよ？　星徒会長さんなのにいけないんだぁ～」"

[[dialogue]]
speaker = "環"
# 「あははっ、ははははは……あ～笑った笑った。人に見せちゃいけない顔になってたよ」
line = "「あははっ、ははははは……あ～笑った笑った。人に見せちゃいけない顔になってたよ」"

[[dialogue]]
speaker = "環"
# 「ずっとこんな日が続けばいいのになぁ……」
line = "「ずっとこんな日が続けばいいのになぁ……」"

[[dialogue]]
speaker = "環"
# 「まぁ、リクリエが迫ってるからそれはありえないんだけど。ただのヒラ星騎士のボクでもそれはわかってるつもり」
line = "「まぁ、リクリエが迫ってるからそれはありえないんだけど。ただのヒラ星騎士のボクでもそれはわかってるつもり」"

[[dialogue]]
speaker = "環"
# 「だからリクリエに勝って、今日みたいななんでもない日を守ろうよ」
line = "「だからリクリエに勝って、今日みたいななんでもない日を守ろうよ」"

[[dialogue]]
speaker = "環"
# 「平和になったら……またボクとデートしてくれる？」
line = "「平和になったら……またボクとデートしてくれる？」"

[[dialogue]]
speaker = "unk"
# その手には乗らないぞ
line = "その手には乗らないぞ"

[[dialogue]]
speaker = "環"
# 「ありゃりゃ、引っかからなかったか。ざーんねん」
line = "「ありゃりゃ、引っかからなかったか。ざーんねん」"

[[dialogue]]
speaker = "環"
# 「じゃ、また明日。学園で会おうね！」
line = "「じゃ、また明日。学園で会おうね！」"
