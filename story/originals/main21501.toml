[[dialogue]]
speaker = "unk"
# 第１話,ホロウ,B
line = "第１話,ホロウ,B"

[[dialogue]]
speaker = "梨緒"
# 「はぁっ、はぁっ……！　くっ……！！」
line = "「はぁっ、はぁっ……！　くっ……！！」"

[[dialogue]]
speaker = "ルヴィネ？"
# 「しぶといわね。梨緒・<ruby=アガサ>Ａ</ruby>・クリステレス──そして流星星徒会」
line = "「しぶといわね。梨緒・<ruby>Ａ<rt>アガサ</rt></ruby>・クリステレス──そして流星星徒会」"

[[dialogue]]
speaker = "セーラ"
# 「何なの……こいつっ！？」
line = "「何なの……こいつっ！？」"

[[dialogue]]
speaker = "ユウリ"
# 「とんだ刺客の登場だな……こいつがルヴィネか！？」
line = "「とんだ刺客の登場だな……こいつがルヴィネか！？」"

[[dialogue]]
speaker = "梨緒"
# 「──わからない。少なくとも、私の知っている彼女とは全く違う……！」
line = "「──わからない。少なくとも、私の知っている彼女とは全く違う……！」"

[[dialogue]]
speaker = "梨緒"
# 「間違いなく、塔の頂上で何かが起こった。一刻も早く、魔王たちと合流しなくては……！」
line = "「間違いなく、塔の頂上で何かが起こった。一刻も早く、魔王たちと合流しなくては……！」"

[[dialogue]]
speaker = "ソフィア"
# 「了解です。打倒しましょう！」
line = "「了解です。打倒しましょう！」"

[[dialogue]]
speaker = "ルリエル"
# 「負けられませんっ、全力でいっちゃいます！！」
line = "「負けられませんっ、全力でいっちゃいます！！」"

[[dialogue]]
speaker = "ルヴィネ？"
# 「女神にかなう道理はない──全員の魂を回収させてもらうわ」
line = "「女神にかなう道理はない──全員の魂を回収させてもらうわ」"

[[dialogue]]
speaker = "梨緒"
# 「誰一人として死なせるものか──ディメンション・エクスウェーブッ！！」
line = "「誰一人として死なせるものか──ディメンション・エクスウェーブッ！！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「これからは私──新しいルヴィネが、リクリエを引き継ぐわ」
line = "「これからは私──新しいルヴィネが、リクリエを引き継ぐわ」"

[[dialogue]]
speaker = "unk"
# リクリエを引き継ぐ『新しいルヴィネ』──頭の中が整理できない。いったい何が起こっているんだ！？
line = "リクリエを引き継ぐ『新しいルヴィネ』──頭の中が整理できない。いったい何が起こっているんだ！？"

[[dialogue]]
speaker = "ルヴィネ"
# 「──まずは回収からね」
line = "「──まずは回収からね」"

[[dialogue]]
speaker = "ルヴィネ"
# 「最後の次元転送装置──これさえあれば、デネブからの増援は思うがままね」
line = "「最後の次元転送装置──これさえあれば、デネブからの増援は思うがままね」"

[[dialogue]]
speaker = "ベアトリス"
# 「ルヴィ！　しっかりしてっ……ルヴィ！！」
line = "「ルヴィ！　しっかりしてっ……ルヴィ！！」"

[[dialogue]]
speaker = "グレイス"
# 「そんな、どうしてっ！？」
line = "「そんな、どうしてっ！？」"

[[dialogue]]
speaker = "レティシア"
# 「ルヴィ、ルヴィっ……あぁあぁっ……！？」
line = "「ルヴィ、ルヴィっ……あぁあぁっ……！？」"

[[dialogue]]
speaker = "チナ"
# 「だめだっ！　血が──血が止まらない！」
line = "「だめだっ！　血が──血が止まらない！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「無駄よ。<ruby=かし>下賜</ruby>されていた霊力はすべて取り上げた」
line = "「無駄よ。<ruby>下賜<rt>かし</rt></ruby>されていた霊力はすべて取り上げた」"

[[dialogue]]
speaker = "ルヴィネ"
# 「<b>それ</b>は今、ただの無力なヒト。どこにでもいる、何の力も持たない天使でしかない」
line = "「<b>それ</b>は今、ただの無力なヒト。どこにでもいる、何の力も持たない天使でしかない」"

[[dialogue]]
speaker = "ルヴィネ"
# 「────ぁ────ぅ──」
line = "「────ぁ────ぅ──」"

[[dialogue]]
speaker = "ルヴィネ"
# 「息を吸えば吸うほどに、自らの血で溺れて苦しむことになる。お父様の期待を裏切った出来損ないには、お似合いの最期だわ」
line = "「息を吸えば吸うほどに、自らの血で溺れて苦しむことになる。お父様の期待を裏切った出来損ないには、お似合いの最期だわ」"

[[dialogue]]
speaker = "クロト"
# 「……マトイ！　ルヴィネに治癒の星術をかけるんだ！　アナとサーシャさんもフォローを！」
line = "「……マトイ！　ルヴィネに治癒の星術をかけるんだ！　アナとサーシャさんもフォローを！」"

[[dialogue]]
speaker = "マトイ"
# 「う、うんっ……やれるだけやってみる！」
line = "「う、うんっ……やれるだけやってみる！」"

[[dialogue]]
speaker = "unk"
# ノヴァフォームを維持できないメンバーに、瀕死のルヴィネを守らせる。
line = "ノヴァフォームを維持できないメンバーに、瀕死のルヴィネを守らせる。"

[[dialogue]]
speaker = "unk"
# そして戦うことしかできない俺の役目は……時間を稼ぐこと！
line = "そして戦うことしかできない俺の役目は……時間を稼ぐこと！"

[[dialogue]]
speaker = "クロト"
# 「お前は──いったい何者なんだ！？」
line = "「お前は──いったい何者なんだ！？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「言ったでしょう、私はルヴィネよ。不出来な<ruby=ルヴィネ>姉</ruby>に代わって製造された、新しい女神の幼体──その２体目」
line = "「言ったでしょう、私はルヴィネよ。不出来な<ruby>姉<rt>ルヴィネ</rt></ruby>に代わって製造された、新しい女神の幼体──その２体目」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「何を言ってるの！？　ルヴィネはママを悪く言うから、あんまり好きじゃなかったけど！」
line = "「何を言ってるの！？　ルヴィネはママを悪く言うから、あんまり好きじゃなかったけど！」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「だからって──あんな酷い目に遭っていいわけがないわ！」
line = "「だからって──あんな酷い目に遭っていいわけがないわ！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「与えられた役目も果たせない愚物は、生かす値打ちもない。それだけのことよ」
line = "「与えられた役目も果たせない愚物は、生かす値打ちもない。それだけのことよ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「──ど、しっ……て。ぉ、と……さ──っ……」
line = "「──ど、しっ……て。ぉ、と……さ──っ……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「役立たず。お前は何度も、お父様に訊ねられたことがあったでしょう。『新世界を創るにあたって、必要なものはあるか？』とね」
line = "「役立たず。お前は何度も、お父様に訊ねられたことがあったでしょう。『新世界を創るにあたって、必要なものはあるか？』とね」"

[[dialogue]]
speaker = "ルヴィネ"
# 「あの質問はすべて、女神の幼体にバグが生まれていないかをチェックするためのもの」
line = "「あの質問はすべて、女神の幼体にバグが生まれていないかをチェックするためのもの」"

[[dialogue]]
speaker = "ルヴィネ"
# 「裏切ったテルルの二の舞とならないよう、折に触れてお父様は、新しい女神が世界の摂理に忠実であるかを試されていたわ」
line = "「裏切ったテルルの二の舞とならないよう、折に触れてお父様は、新しい女神が世界の摂理に忠実であるかを試されていたわ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「お父様はいつだって正しい。お前に、テルルのような強靭な神の器を持たせず、ヒトと同じ肉体と寿命を与えたことも、とても正しい」
line = "「お父様はいつだって正しい。お前に、テルルのような強靭な神の器を持たせず、ヒトと同じ肉体と寿命を与えたことも、とても正しい」"

[[dialogue]]
speaker = "ルヴィネ"
# 「もしも裏切った際に……処分はたやすい方がいいものね？」
line = "「もしも裏切った際に……処分はたやすい方がいいものね？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……ぅ……ぁっ…………！！」
line = "「……ぅ……ぁっ…………！！」"

[[dialogue]]
speaker = "クロト"
# 「裏切っただって！？　ルヴィネはただ『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』と話し合いがしたいという、俺たちの提案に乗ってくれただけで……！」
line = "「裏切っただって！？　ルヴィネはただ『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』と話し合いがしたいという、俺たちの提案に乗ってくれただけで……！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「それが裏切りでなくて何だというの？　女神の器に自我など要らない。不良品は捨てるのが手っ取り早いわ」
line = "「それが裏切りでなくて何だというの？　女神の器に自我など要らない。不良品は捨てるのが手っ取り早いわ」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「……なんて、ひどい」
line = "「……なんて、ひどい」"

[[dialogue]]
speaker = "アポロ"
# 「どこまで冷たいヤツなんだ、お前たちは……！？」
line = "「どこまで冷たいヤツなんだ、お前たちは……！？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「価値観の相違ね。ヒトはとても短い尺度で物事を測る──女神に必要なのは、大局を見据える視点よ」
line = "「価値観の相違ね。ヒトはとても短い尺度で物事を測る──女神に必要なのは、大局を見据える視点よ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「感情なんていうものに左右されてリクリエの本質から目を背けた、故障した駄作。それを正常なものにすげ替えるのは当然のこと」
line = "「感情なんていうものに左右されてリクリエの本質から目を背けた、故障した駄作。それを正常なものにすげ替えるのは当然のこと」"

[[dialogue]]
speaker = "ルヴィネ"
# 「あなたたちもＤＩＳＣが故障したら、新しいものに取り換えるでしょう？　それと何も変わらない」
line = "「あなたたちもＤＩＳＣが故障したら、新しいものに取り換えるでしょう？　それと何も変わらない」"

[[dialogue]]
speaker = "クロト"
# 「──ふざけるなッ！！」
line = "「──ふざけるなッ！！」"

[[dialogue]]
speaker = "クロト"
# 「俺は直接、ルヴィネのことをよく知らない──だけど！」
line = "「俺は直接、ルヴィネのことをよく知らない──だけど！」"

[[dialogue]]
speaker = "クロト"
# 「俺が伝え聞いたルヴィネは、自らが降り立ったデネブと、そこに住む人々のことを、大切に想っていた……！」
line = "「俺が伝え聞いたルヴィネは、自らが降り立ったデネブと、そこに住む人々のことを、大切に想っていた……！」"

[[dialogue]]
speaker = "クロト"
# 「いずれ再構築され、記録にも残らず消えゆく世界であったとしても！　ルヴィネは知ろうとしていた……愛そうとしていた！」
line = "「いずれ再構築され、記録にも残らず消えゆく世界であったとしても！　ルヴィネは知ろうとしていた……愛そうとしていた！」"

[[dialogue]]
speaker = "クロト"
# 「今を学び、次を善くしようとしていた！　だから彼女は、不完全であってもこの世界の女神だった！」
line = "「今を学び、次を善くしようとしていた！　だから彼女は、不完全であってもこの世界の女神だった！」"

[[dialogue]]
speaker = "クロト"
# 「俺はお前を認めない！　お前のような……ひとかけらの愛情もない『<ruby=ホロウ>空っぽな存在</ruby>』に！　俺たちの世界を管理する資格はない！！」
line = "「俺はお前を認めない！　お前のような……ひとかけらの愛情もない『<ruby>空っぽな存在<rt>ホロウ</rt></ruby>』に！　俺たちの世界を管理する資格はない！！」"

[[dialogue]]
speaker = "ジグ"
# 「ホロウ──言い得て妙だね。ルヴィネの偽物につけるには、ちょうど良い呼称だ」
line = "「ホロウ──言い得て妙だね。ルヴィネの偽物につけるには、ちょうど良い呼称だ」"

[[dialogue]]
speaker = "煌嶺"
# 「フン。呼び名なぞどうでもよいわ。どうせすぐにこの世から消える──妾の手によってな！」
line = "「フン。呼び名なぞどうでもよいわ。どうせすぐにこの世から消える──妾の手によってな！」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「大人しく魂を差し出せば、苦しませるつもりはなかったけれど……仕方ないわね」
line = "「大人しく魂を差し出せば、苦しませるつもりはなかったけれど……仕方ないわね」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
# 「──処断しましょう」
line = "「──処断しましょう」"

[[dialogue]]
speaker = "ルヴィネ"
# 「──み、……っ、な。…………逃げ──がふっ！」
line = "「──み、……っ、な。…………逃げ──がふっ！」"

[[dialogue]]
speaker = "unk"
# ルヴィネが大量の血を吐き出す──時間がない。
line = "ルヴィネが大量の血を吐き出す──時間がない。"

[[dialogue]]
speaker = "unk"
# まだか、まだなのか──！
line = "まだか、まだなのか──！"

[[dialogue]]
speaker = "ベアトリス"
# 「会長さんっ！　どうしたらっ……ルヴィが！　ルヴィが死んじゃうっ……！！」
line = "「会長さんっ！　どうしたらっ……ルヴィが！　ルヴィが死んじゃうっ……！！」"

[[dialogue]]
speaker = "クロト"
# 「ベアトリス！　まだ終わっていない！　気持ちを切らずに、声を届けるんだ！」
line = "「ベアトリス！　まだ終わっていない！　気持ちを切らずに、声を届けるんだ！」"

[[dialogue]]
speaker = "煌嶺"
# 「もうよいだろう、捨ておけ。あれではとても助からん」
line = "「もうよいだろう、捨ておけ。あれではとても助からん」"

[[dialogue]]
speaker = "チナ"
# 「ふっ──ふざけんな！！　ルヴィはまだ死んでない！！」
line = "「ふっ──ふざけんな！！　ルヴィはまだ死んでない！！」"

[[dialogue]]
speaker = "グレイス"
# 「マトイさんっ！　何とかなりませんかっ！？」
line = "「マトイさんっ！　何とかなりませんかっ！？」"

[[dialogue]]
speaker = "マトイ"
# 「く、ぅっ……！　私の、付け焼刃の治癒じゃ……お願い、早く……！！」
line = "「く、ぅっ……！　私の、付け焼刃の治癒じゃ……お願い、早く……！！」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「あの死にぞこないに、ここまでかまけてくれるだなんて嬉しい誤算ね」
line = "「あの死にぞこないに、ここまでかまけてくれるだなんて嬉しい誤算ね」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「けれど魔王の対応にはがっかりだわ。潔く切り捨てるでもなく、私に攻撃を仕掛けるでもなく……足を止めて語らうばかり」
line = "「けれど魔王の対応にはがっかりだわ。潔く切り捨てるでもなく、私に攻撃を仕掛けるでもなく……足を止めて語らうばかり」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
# 「突然の事態に頭が真っ白になった？　もう少し骨がある相手だと思っていたのに」
line = "「突然の事態に頭が真っ白になった？　もう少し骨がある相手だと思っていたのに」"

[[dialogue]]
speaker = "？？？"
# 『──魔王様、お待たせしました！　いけます！！』
line = "『──魔王様、お待たせしました！　いけます！！』"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
# 「……っ！？　今の声は──？」
line = "「……っ！？　今の声は──？」"

[[dialogue]]
speaker = "クロト"
# 「予想外の事態ではあったさ。でも、何もしてなかったわけじゃない」
line = "「予想外の事態ではあったさ。でも、何もしてなかったわけじゃない」"

[[dialogue]]
speaker = "unk"
# 刻は稼いだ。フィーニスの塔攻略の時から、ずっと傍にいた彼女を、あえていないものとしてふるまい続けた──それももう終わりだ！
line = "刻は稼いだ。フィーニスの塔攻略の時から、ずっと傍にいた彼女を、あえていないものとしてふるまい続けた──それももう終わりだ！"

[[dialogue]]
speaker = "クロト"
# 「新星星徒会──防御陣形を取れ！　プランＢを実行に移す！！」
line = "「新星星徒会──防御陣形を取れ！　プランＢを実行に移す！！」"

[[dialogue]]
speaker = "unk"
# そして俺は、霊体である彼女の名を叫ぶ──
line = "そして俺は、霊体である彼女の名を叫ぶ──"

[[dialogue]]
speaker = "クロト"
# 「──トリュファイナさん、お願いします！！！」
line = "「──トリュファイナさん、お願いします！！！」"
