[[dialogue]]
speaker = "シアン"
# 「知ってるつっても、前に少し見たきりだったがな。ええと、どこから話すか……」
line = "「知ってるつっても、前に少し見たきりだったがな。ええと、どこから話すか……」"

[[dialogue]]
speaker = "シアン"
# 「ちょいと話は逸れるが、流星・新星両校を卒業した星騎士がどうするか、会長さんは知ってるか？」
line = "「ちょいと話は逸れるが、流星・新星両校を卒業した星騎士がどうするか、会長さんは知ってるか？」"

[[dialogue]]
speaker = "unk"
# 聞いたことはあります
line = "聞いたことはあります"

[[dialogue]]
speaker = "unk"
# すみません。知りません
line = "すみません。知りません"

[[dialogue]]
speaker = "シアン"
# 「まぁついでだ。一応話しておくか」
line = "「まぁついでだ。一応話しておくか」"

[[dialogue]]
speaker = "シアン"
# 「モンスターやアステラが発生するのは何も流星市国じゃない。頻度や規模が小さいとはいえ、モンスターは世界各地に現れる」
line = "「モンスターやアステラが発生するのは何も流星市国じゃない。頻度や規模が小さいとはいえ、モンスターは世界各地に現れる」"

[[dialogue]]
speaker = "シアン"
# 「そこで活躍するのが卒業生だ」
line = "「そこで活躍するのが卒業生だ」"

[[dialogue]]
speaker = "シアン"
# 「星騎士たちは学園を卒業後、故郷に戻ったり、世界各地に飛んだりして、年齢を重ねて星力を失うまでの数年間、モンスターと戦い続ける」
line = "「星騎士たちは学園を卒業後、故郷に戻ったり、世界各地に飛んだりして、年齢を重ねて星力を失うまでの数年間、モンスターと戦い続ける」"

[[dialogue]]
speaker = "シアン"
# 「もちろん全盛期ほどの力は出せないが、モンスターだって流星市国に現れるレベルのやつはそう出てこない。ちょうどいい相手ってわけだ」
line = "「もちろん全盛期ほどの力は出せないが、モンスターだって流星市国に現れるレベルのやつはそう出てこない。ちょうどいい相手ってわけだ」"

[[dialogue]]
speaker = "シアン"
# 「あたしもその卒業生の１人──なわけだが、元々公安委員会にいた延長で、アングラな任務で世界各地を回ることになった」
line = "「あたしもその卒業生の１人──なわけだが、元々公安委員会にいた延長で、アングラな任務で世界各地を回ることになった」"

[[dialogue]]
speaker = "シアン"
# 「イタリア、アフリカ、中東でいろいろあって──その後イギリスにいた時の話だ。あたしは同じく公安出身の同僚とバディを組んでいた」
line = "「イタリア、アフリカ、中東でいろいろあって──その後イギリスにいた時の話だ。あたしは同じく公安出身の同僚とバディを組んでいた」"

[[dialogue]]
speaker = "シアン"
# 「流星学園分校の生徒が襲われる事件があって、それを同僚と追っていたんだが……」
line = "「流星学園分校の生徒が襲われる事件があって、それを同僚と追っていたんだが……」"

[[dialogue]]
speaker = "シアン"
# 「先行していた同僚が何者かと遭遇し、強力な攻撃を受けて戦闘不能。同僚は星騎士として引退を余儀なくされ、犯人も不明のまま」
line = "「先行していた同僚が何者かと遭遇し、強力な攻撃を受けて戦闘不能。同僚は星騎士として引退を余儀なくされ、犯人も不明のまま」"

[[dialogue]]
speaker = "シアン"
# 「あたしは到着するのが一歩遅れて、顔は見えなかったが間違いない。感じた力と殺気はヴァレリー・スチュアートのものだ」
line = "「あたしは到着するのが一歩遅れて、顔は見えなかったが間違いない。感じた力と殺気はヴァレリー・スチュアートのものだ」"

[[dialogue]]
speaker = "シアン"
# 「キサナの件があって、類似した手口から、上もあれがコラプサーに関連した事件だと睨んだんだろう。だから関わったあたしが呼び戻された」
line = "「キサナの件があって、類似した手口から、上もあれがコラプサーに関連した事件だと睨んだんだろう。だから関わったあたしが呼び戻された」"

[[dialogue]]
speaker = "unk"
# 同僚の仇を追って流星市国に……
line = "同僚の仇を追って流星市国に……"

[[dialogue]]
speaker = "シアン"
# 「いや、それは別に」
line = "「いや、それは別に」"

[[dialogue]]
speaker = "せつな"
# 「違うのでござるか！？」
line = "「違うのでござるか！？」"

[[dialogue]]
speaker = "シアン"
# 「別に仲は悪くなかったが、命を懸けて復讐しようと思うほどでもねえよ」
line = "「別に仲は悪くなかったが、命を懸けて復讐しようと思うほどでもねえよ」"

[[dialogue]]
speaker = "シアン"
# 「つかそいつ、戦えなくなっただけで生きてるし。面倒な任務とオサラバできて羨ましいぐらいだ」
line = "「つかそいつ、戦えなくなっただけで生きてるし。面倒な任務とオサラバできて羨ましいぐらいだ」"

[[dialogue]]
speaker = "シアン"
# 「ただあたしが気に入らねえのは、事件が未解決で、犯人がのうのうとその辺ほっつき歩いてるってことだ」
line = "「ただあたしが気に入らねえのは、事件が未解決で、犯人がのうのうとその辺ほっつき歩いてるってことだ」"

[[dialogue]]
speaker = "シアン"
# 「公安委員会の仕事なんざ成り行きで受けただけだし、誇りなんざ持ってねえし、いつも辞めてえと思ってはいるが……」
line = "「公安委員会の仕事なんざ成り行きで受けただけだし、誇りなんざ持ってねえし、いつも辞めてえと思ってはいるが……」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「先輩、ここぞとばかりにボロクソに言うね～」
line = "「先輩、ここぞとばかりにボロクソに言うね～」"

[[dialogue]]
speaker = "シアン"
# 「あたしをあちこち駆け回らせてるクソ野郎の、首根っこ捕まえてふん縛らないと気が済まねえんだよ。それだけだ」
line = "「あたしをあちこち駆け回らせてるクソ野郎の、首根っこ捕まえてふん縛らないと気が済まねえんだよ。それだけだ」"

[[dialogue]]
speaker = "セナリィ"
# 「なるほど。これがハウンドドッグとあだ名されるシアン様の性分ということですか。一度食らいついたら離さない──まさに猟犬ですわ」
line = "「なるほど。これがハウンドドッグとあだ名されるシアン様の性分ということですか。一度食らいついたら離さない──まさに猟犬ですわ」"

[[dialogue]]
speaker = "シアン"
# 「はん、好きに言ってろ」
line = "「はん、好きに言ってろ」"

[[dialogue]]
speaker = "シアン"
# 「あいつは用事があると言っていた。また姿を現すだろう。次に出てきたところを捕まえる」
line = "「あいつは用事があると言っていた。また姿を現すだろう。次に出てきたところを捕まえる」"

[[dialogue]]
speaker = "せつな"
# 「そもそも、ヴァレリーは浅草で何をしていたでござるか？」
line = "「そもそも、ヴァレリーは浅草で何をしていたでござるか？」"

[[dialogue]]
speaker = "シアン"
# 「観光」
line = "「観光」"

[[dialogue]]
speaker = "せつな"
# 「はい？　今なんと……」
line = "「はい？　今なんと……」"

[[dialogue]]
speaker = "シアン"
# 「だから観光だよ、観光」
line = "「だから観光だよ、観光」"

[[dialogue]]
speaker = "セナリィ"
# 「流星市国周辺はコラプサーにとって敵地も同然。悠長に観光などと……余裕をかますにもほどがありますわ！」
line = "「流星市国周辺はコラプサーにとって敵地も同然。悠長に観光などと……余裕をかますにもほどがありますわ！」"

[[dialogue]]
speaker = "シアン"
# 「その時はまだ面も割れてなかったからな。それに、余裕ぶっこくだけの力があるのは知ってんだろ」
line = "「その時はまだ面も割れてなかったからな。それに、余裕ぶっこくだけの力があるのは知ってんだろ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「確かにねー。星騎士の中でも精鋭の蛍火先輩をあれだけボロボロにしちゃうんだから」
line = "「確かにねー。星騎士の中でも精鋭の蛍火先輩をあれだけボロボロにしちゃうんだから」"

[[dialogue]]
speaker = "セナリィ"
# 「星力を打ち消すコラプサーの力がそれだけ厄介ということですわね。せめてその力の正体がわかればよいのですが」
line = "「星力を打ち消すコラプサーの力がそれだけ厄介ということですわね。せめてその力の正体がわかればよいのですが」"

[[dialogue]]
speaker = "シアン"
# 「だが限界があることもわかってる。今度こそ待ち伏せしてフクロにするぞ」
line = "「だが限界があることもわかってる。今度こそ待ち伏せしてフクロにするぞ」"

[[dialogue]]
speaker = "シアン"
# 「んで、ヴァレリーは戦闘中、何度も『美しい』という言葉を使っていた。浅草の雷門を見てた時も、『美しい』と呟いていたと、蛍火から聞いている」
line = "「んで、ヴァレリーは戦闘中、何度も『美しい』という言葉を使っていた。浅草の雷門を見てた時も、『美しい』と呟いていたと、蛍火から聞いている」"

[[dialogue]]
speaker = "シアン"
# 「用事の内容は知らねえが、やつが『美しい』と思うものがあるところに姿を現すだろう。候補を絞るぞ」
line = "「用事の内容は知らねえが、やつが『美しい』と思うものがあるところに姿を現すだろう。候補を絞るぞ」"

[[dialogue]]
speaker = "せつな"
# 「合点招致でありまする！　ところで──」
line = "「合点招致でありまする！　ところで──」"

[[dialogue]]
speaker = "unk"
# シアンさんが卒業生？
line = "シアンさんが卒業生？"

[[dialogue]]
speaker = "シアン"
# 「んなっ！？　いつ誰がそんなこと言って……」
line = "「んなっ！？　いつ誰がそんなこと言って……」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「思いっきり言ってたよ？　あたしも卒業生の１人って」
line = "「思いっきり言ってたよ？　あたしも卒業生の１人って」"

[[dialogue]]
speaker = "シアン"
# 「あっ！？」
line = "「あっ！？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「シアン先輩──ていうかこれ偽名なんだけど、実は流星学園のＯＧで、主に海外で活動してたんだよね。それがコラプサー関連で流星市国に呼び戻されて」
line = "「シアン先輩──ていうかこれ偽名なんだけど、実は流星学園のＯＧで、主に海外で活動してたんだよね。それがコラプサー関連で流星市国に呼び戻されて」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「で、学籍も与えようってことで、年齢ごまかして新星に転入したってワケ。いや、無茶ぶりにもほどがあるよね～」
line = "「で、学籍も与えようってことで、年齢ごまかして新星に転入したってワケ。いや、無茶ぶりにもほどがあるよね～」"

[[dialogue]]
speaker = "シアン"
# 「あ……うぅ……そうだよ！　あたしは卒業生だよ！　３年生じゃなくて、２年前に卒業してるよ！」
line = "「あ……うぅ……そうだよ！　あたしは卒業生だよ！　３年生じゃなくて、２年前に卒業してるよ！」"

[[dialogue]]
speaker = "せつな"
# 「なるほどでござる！」
line = "「なるほどでござる！」"

[[dialogue]]
speaker = "セナリィ"
# 「それは大先輩ですわね」
line = "「それは大先輩ですわね」"

[[dialogue]]
speaker = "unk"
# どうりで……
line = "どうりで……"

[[dialogue]]
speaker = "シアン"
# 「くそ、全員納得した顔してんじゃねえ。誰か『信じられねえ』みたいな反応しろよ」
line = "「くそ、全員納得した顔してんじゃねえ。誰か『信じられねえ』みたいな反応しろよ」"

[[dialogue]]
speaker = "シアン"
# 「……ったく。あたしのことはいいから、ヴァレリーの現れそうなところを絞るぞ」
line = "「……ったく。あたしのことはいいから、ヴァレリーの現れそうなところを絞るぞ」"

[[dialogue]]
speaker = "unk"
# その前にちょっと用事が
line = "その前にちょっと用事が"

[[dialogue]]
speaker = "シアン"
# 「ん？　ああ、あの『妹』か。今頃どうなってるか想像したくないから、そっちはあんたに任せる」
line = "「ん？　ああ、あの『妹』か。今頃どうなってるか想像したくないから、そっちはあんたに任せる」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「なになに～？　ルルカちゃん以外に新しい妹できたの？」
line = "「なになに～？　ルルカちゃん以外に新しい妹できたの？」"

[[dialogue]]
speaker = "せつな"
# 「妹ってそんなに増えるものでござるか……？」
line = "「妹ってそんなに増えるものでござるか……？」"
