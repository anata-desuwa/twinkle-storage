[[dialogue]]
speaker = "unk"
# モンスターだ！
line = "モンスターだ！"

[[dialogue]]
speaker = "モナカ"
# 「み、見て……！　お菓子の箱を抱えてるよ……！」
line = "「み、見て……！　お菓子の箱を抱えてるよ……！」"

[[dialogue]]
speaker = "シフォン"
# 「つまり泥棒事件の犯人はあのモンスターだったというわけですか……！？」
line = "「つまり泥棒事件の犯人はあのモンスターだったというわけですか……！？」"

[[dialogue]]
speaker = "モナカ"
# 「信じられない……モンスターが物を盗むなんて、聞いたことないし……」
line = "「信じられない……モンスターが物を盗むなんて、聞いたことないし……」"

[[dialogue]]
speaker = "シフォン"
# 「とにかく退治しましょう……！　放ってはおけません……！」
line = "「とにかく退治しましょう……！　放ってはおけません……！」"

[[dialogue]]
speaker = "モナカ"
# 「えっ？　でもモナカたちが勝手にモンスターと戦うのは……」
line = "「えっ？　でもモナカたちが勝手にモンスターと戦うのは……」"

[[dialogue]]
speaker = "シフォン"
# 「会長さんがついてくれているのですから大丈夫ですよ……！　上手く倒せばプリマステラにまた一歩近づけるかもしれませんし……！」
line = "「会長さんがついてくれているのですから大丈夫ですよ……！　上手く倒せばプリマステラにまた一歩近づけるかもしれませんし……！」"

[[dialogue]]
speaker = "モナカ"
# 「た、確かにそうだね……！　うんっ……！」
line = "「た、確かにそうだね……！　うんっ……！」"

[[dialogue]]
speaker = "unk"
# ２人ともちょっと待って──
line = "２人ともちょっと待って──"

[[dialogue]]
speaker = "シフォン"
# 「ドッペルシュヴェーアト！」
line = "「ドッペルシュヴェーアト！」"

[[dialogue]]
speaker = "モナカ"
# 「ソニックスワールっ！」
line = "「ソニックスワールっ！」"

[[dialogue]]
speaker = "シフォン"
# 「あっ……！」
line = "「あっ……！」"

[[dialogue]]
speaker = "モナカ"
# 「あっ……！」
line = "「あっ……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「──それで？　許可なくモンスターと戦おうとした挙げ句、星力の制御に失敗して逃げられちゃった、と」
line = "「──それで？　許可なくモンスターと戦おうとした挙げ句、星力の制御に失敗して逃げられちゃった、と」"

[[dialogue]]
speaker = "モナカ"
# 「ご、ごめんなさい……」
line = "「ご、ごめんなさい……」"

[[dialogue]]
speaker = "シフォン"
# 「本当に、すみませんでした……」
line = "「本当に、すみませんでした……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「とりあえず２人に怪我がなくて良かったわ。私もまさか泥棒騒ぎの犯人がモンスターだとは想像もしてなかったから」
line = "「とりあえず２人に怪我がなくて良かったわ。私もまさか泥棒騒ぎの犯人がモンスターだとは想像もしてなかったから」"

[[dialogue]]
speaker = "ヴィーナス"
# 「だけど軽率な行動を取ったのはいただけないわね。せめてクロトと協力してモンスターに立ち向かうべきだった」
line = "「だけど軽率な行動を取ったのはいただけないわね。せめてクロトと協力してモンスターに立ち向かうべきだった」"

[[dialogue]]
speaker = "unk"
# 俺の監督不行き届きだよ
line = "俺の監督不行き届きだよ"

[[dialogue]]
speaker = "ヴィーナス"
# 「庇わなくていいの。叱る時はきっちり叱らないとこの子たちのためにもならないから」
line = "「庇わなくていいの。叱る時はきっちり叱らないとこの子たちのためにもならないから」"

[[dialogue]]
speaker = "ヴィーナス"
# 「モンスターが出ちゃった以上……特別試験も中止ね。２人はもう下がってくれていいわ」
line = "「モンスターが出ちゃった以上……特別試験も中止ね。２人はもう下がってくれていいわ」"

[[dialogue]]
speaker = "モナカ"
# 「で、でも……」
line = "「で、でも……」"

[[dialogue]]
speaker = "シフォン"
# 「私たちも何か手伝います……！　いえ手伝わせてください……！」
line = "「私たちも何か手伝います……！　いえ手伝わせてください……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「気持ちは嬉しいけど、ここから先はプリマステラの仕事よ。あなたたちは大人しく戻りなさい」
line = "「気持ちは嬉しいけど、ここから先はプリマステラの仕事よ。あなたたちは大人しく戻りなさい」"

[[dialogue]]
speaker = "シフォン"
# 「手が回せないからって私たちに頼んでくれたわけですよね……？」
line = "「手が回せないからって私たちに頼んでくれたわけですよね……？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「モンスター騒ぎとあっては話が別よ。プリマステラじゃないあなたたちに対応させるわけにはいかないわ」
line = "「モンスター騒ぎとあっては話が別よ。プリマステラじゃないあなたたちに対応させるわけにはいかないわ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「聞けば、そのモンスターはお菓子を盗む程度のことしかしてないんでしょ？　今までもずっと隠れ潜んでたみたいだし、様子を見ても問題ないわ」
line = "「聞けば、そのモンスターはお菓子を盗む程度のことしかしてないんでしょ？　今までもずっと隠れ潜んでたみたいだし、様子を見ても問題ないわ」"

[[dialogue]]
speaker = "モナカ"
# 「で、でもいつ人を襲い始めるかわからないんじゃ……」
line = "「で、でもいつ人を襲い始めるかわからないんじゃ……」"

[[dialogue]]
speaker = "シフォン"
# 「そうですよ……！　何かあってからでは遅いです……！」
line = "「そうですよ……！　何かあってからでは遅いです……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「だからこそよ。星力の制御もおぼつかないあなたたちに任せて、また取り逃がしちゃったらどうするの？　変に刺激したら凶暴性も増すかもしれないじゃない」
line = "「だからこそよ。星力の制御もおぼつかないあなたたちに任せて、また取り逃がしちゃったらどうするの？　変に刺激したら凶暴性も増すかもしれないじゃない」"

[[dialogue]]
speaker = "シフォン"
# 「それは……」
line = "「それは……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ここで変に足を引っ張られたら困るの。そういうことはちゃんとプリマステラ試験に合格してから言いなさい」
line = "「ここで変に足を引っ張られたら困るの。そういうことはちゃんとプリマステラ試験に合格してから言いなさい」"

[[dialogue]]
speaker = "モナカ"
# 「あ、あう……」
line = "「あ、あう……」"

[[dialogue]]
speaker = "unk"
# 流石に言いすぎだよ
line = "流石に言いすぎだよ"

[[dialogue]]
speaker = "ヴィーナス"
# 「あなたが甘すぎるのよ。ほら帰った帰った。私は分析班に連絡を取らなきゃいけないから」
line = "「あなたが甘すぎるのよ。ほら帰った帰った。私は分析班に連絡を取らなきゃいけないから」"

[[dialogue]]
speaker = "シフォン"
# 「追い出されてしまいましたね……」
line = "「追い出されてしまいましたね……」"

[[dialogue]]
speaker = "モナカ"
# 「ごめんなさい、にぃ様……。モナカたちが勝手なことしたせいで……」
line = "「ごめんなさい、にぃ様……。モナカたちが勝手なことしたせいで……」"

[[dialogue]]
speaker = "シフォン"
# 「モナカは悪くないですよ……。私が功を焦って出しゃばってしまったせいです……」
line = "「モナカは悪くないですよ……。私が功を焦って出しゃばってしまったせいです……」"

[[dialogue]]
speaker = "モナカ"
# 「ううん……。モナカも活躍しなきゃって飛び出して行っちゃったから……」
line = "「ううん……。モナカも活躍しなきゃって飛び出して行っちゃったから……」"

[[dialogue]]
speaker = "unk"
# 誰にでも失敗はあるさ
line = "誰にでも失敗はあるさ"

[[dialogue]]
speaker = "モナカ"
# 「ありがとう、にぃ様……。にぃ様はいつも優しいね……？」
line = "「ありがとう、にぃ様……。にぃ様はいつも優しいね……？」"

[[dialogue]]
speaker = "モナカ"
# 「でもやっぱりモナカ、落ちこぼれだね……。肝心な時に失敗しちゃって……」
line = "「でもやっぱりモナカ、落ちこぼれだね……。肝心な時に失敗しちゃって……」"

[[dialogue]]
speaker = "シフォン"
# 「あの様子じゃ特別試験も落第でしょうね……。パルミエにも迷惑をかけてしまいました……」
line = "「あの様子じゃ特別試験も落第でしょうね……。パルミエにも迷惑をかけてしまいました……」"

[[dialogue]]
speaker = "モナカ"
# 「そうだね、パルちゃんにも謝らなくちゃ……。今どこにいるんだろう……」
line = "「そうだね、パルちゃんにも謝らなくちゃ……。今どこにいるんだろう……」"

[[dialogue]]
speaker = "パルミエ"
# 「きゃああああっっ～！」
line = "「きゃああああっっ～！」"

[[dialogue]]
speaker = "シフォン"
# 「っっ！？　今の悲鳴、パルミエじゃ！？」
line = "「っっ！？　今の悲鳴、パルミエじゃ！？」"

[[dialogue]]
speaker = "モナカ"
# 「お、おなか部の部室の方から聞こえてきたよっ……」
line = "「お、おなか部の部室の方から聞こえてきたよっ……」"

[[dialogue]]
speaker = "シフォン"
# 「まさかさっきのモンスターに……！？」
line = "「まさかさっきのモンスターに……！？」"

[[dialogue]]
speaker = "unk"
# 急ごう！
line = "急ごう！"

[[dialogue]]
speaker = "モナカ"
# 「う、うん！」
line = "「う、うん！」"
