line = "「寒いったらないぜ──おいギエル！　この氷とチビをなんとかしろ！」"

[[dialogue]]
speaker = "ギエル"
# 「は──仰せのままに！」
line = "「は──仰せのままに！」"

[[dialogue]]
speaker = "ソフィア"
# 「っ……！　あなたの方がチビでしょうが──！」
line = "「っ……！　あなたの方がチビでしょうが──！」"

[[dialogue]]
speaker = "サーシャ"
# 「ソフィ──」
