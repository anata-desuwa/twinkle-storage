[[dialogue]]
speaker = "フィオナ"
# 「いいえ……ありえない……あれは……『誰』？」
line = "「いいえ……ありえない……あれは……『誰』？」"

[[dialogue]]
speaker = "ニャリオン"
# 「あ……あれは……ニャン……」
line = "「あ……あれは……ニャン……」"

[[dialogue]]
speaker = "unk"
# その様子に遅れて気づいたのはニャリオンだった。
line = "その様子に遅れて気づいたのはニャリオンだった。"

[[dialogue]]
speaker = "unk"
# そして同時に、主であるフィオナが固まっている理由も知れる。
line = "そして同時に、主であるフィオナが固まっている理由も知れる。"

[[dialogue]]
speaker = "ユウリ"
# 「ありゃ元凶だっつーチビッコだな。まああそこは経験のあるあいつらに任せて、うちらは地上の掃除を……」
line = "「ありゃ元凶だっつーチビッコだな。まああそこは経験のあるあいつらに任せて、うちらは地上の掃除を……」"

[[dialogue]]
speaker = "ルリエル"
# 「ですです！　そうだ、新星のサーシャ先輩って実はソフィアのお姉さんで──」
line = "「ですです！　そうだ、新星のサーシャ先輩って実はソフィアのお姉さんで──」"

[[dialogue]]
speaker = "フィオナ"
# 「……ごめんなさい、ユウリ。あなたに任せる」
line = "「……ごめんなさい、ユウリ。あなたに任せる」"

[[dialogue]]
speaker = "ユウリ"
# 「え……？　どういうこと──お、おいっ！？」
line = "「え……？　どういうこと──お、おいっ！？」"

[[dialogue]]
speaker = "unk"
# <b>らしくない</b>行動と称するのが正しいだろう。
line = "<b>らしくない</b>行動と称するのが正しいだろう。"

[[dialogue]]
speaker = "unk"
# フィオナは返事も聞かずユウリらを跳ね除け、そのままかつてない速度で飛び立っていった。
line = "フィオナは返事も聞かずユウリらを跳ね除け、そのままかつてない速度で飛び立っていった。"

[[dialogue]]
speaker = "フィオナ"
# 「──」
line = "「──」"

[[dialogue]]
speaker = "ニャリオン"
# 「ニャ──ニャニャ！？　き、気持ちはわかるニャンが──無茶ニャン！」
line = "「ニャ──ニャニャ！？　き、気持ちはわかるニャンが──無茶ニャン！」"

[[dialogue]]
speaker = "unk"
# 振り落とされんばかりの勢いでしがみつくニャリオン。
line = "振り落とされんばかりの勢いでしがみつくニャリオン。"

[[dialogue]]
speaker = "unk"
# そのスピード調節もできないほど、今のフィオナは激情に駆られていた。
line = "そのスピード調節もできないほど、今のフィオナは激情に駆られていた。"
