line = "モンスターや堕天使と違い、アポロには意思がある……と感じたのは、あくまで俺の感想でしかない。"

[[dialogue]]
speaker = "unk"
# アポロもリクリエのモンスターと同じ、世界を再構築するためのシステムの一部にすぎないのかもしれない。
line = "アポロもリクリエのモンスターと同じ、世界を再構築するためのシステムの一部にすぎないのかもしれない。"

[[dialogue]]
