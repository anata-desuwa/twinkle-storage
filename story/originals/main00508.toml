[[dialogue]]
speaker = "サーシャ"
# 「クイーンオブアイス……！」
line = "「クイーンオブアイス……！」"

[[dialogue]]
speaker = "サーシャ"
# 「っ……無責任なヒーローもあったものね──正義の味方なら、もっとまともなビジョンが欲しいんじゃない？」
line = "「っ……無責任なヒーローもあったものね──正義の味方なら、もっとまともなビジョンが欲しいんじゃない？」"

[[dialogue]]
speaker = "アポロ"
# 「だってそういうモノだろ！　どんなに悪いやつとっちめたって、来週には次の敵をしばくのが主役ってもんだ！」
line = "「だってそういうモノだろ！　どんなに悪いやつとっちめたって、来週には次の敵をしばくのが主役ってもんだ！」"

[[dialogue]]
speaker = "ソフィア"
# 「そんなの──ただ好きに暴れてるだけじゃないですか！」
line = "「そんなの──ただ好きに暴れてるだけじゃないですか！」"

[[dialogue]]
speaker = "ソフィア"
