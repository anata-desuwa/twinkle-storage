line = "守護星という枠を越えた星屑の暴力が、再び全盛の勢いを取り戻して俺たちを見舞う。"

[[dialogue]]
speaker = "unk"
# 深手を負ったヴィーナスを引き寄せると、俺は治癒の星術で回復させた。
line = "深手を負ったヴィーナスを引き寄せると、俺は治癒の星術で回復させた。"

[[dialogue]]
speaker = "アポロ"
