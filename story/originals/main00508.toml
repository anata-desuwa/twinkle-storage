[[dialogue]]
speaker = "unk"
# 前回はここから流星のストームを巻き起こされて一気に形勢を逆転された。同じ轍は踏まない。
line = "前回はここから流星のストームを巻き起こされて一気に形勢を逆転された。同じ轍は踏まない。"

[[dialogue]]
speaker = "unk"
# 俺は、拳闘でもってアポロへ肉迫しつつ問いかける。
line = "俺は、拳闘でもってアポロへ肉迫しつつ問いかける。"

[[dialogue]]
speaker = "クロト"
# 「君は……君は世界をどうしたいんだ」
line = "「君は……君は世界をどうしたいんだ」"

[[dialogue]]
speaker = "アポロ"
# 「どうしたい？　知らないね！　ヒーローの仕事は戦ってやっつける、それだけだー！」
line = "「どうしたい？　知らないね！　ヒーローの仕事は戦ってやっつける、それだけだー！」"

[[dialogue]]
speaker = "unk"
# 大剣を振り払われ、俺は夜空の果てまで吹き飛ばされそうになる。
line = "大剣を振り払われ、俺は夜空の果てまで吹き飛ばされそうになる。"

[[dialogue]]
speaker = "unk"
# しかし今度は、俺と入れ替わるようにしてサーシャ先輩が追撃を重ねた。
