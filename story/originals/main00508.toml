line = "「ヒーローは敵を倒すもんだ！　でもって、<ruby>魔王<rt>ボス</rt></ruby>を倒したら最終回だ！　先のことなんか考える必要なし！」"

[[dialogue]]
speaker = "クロト"
# 「それが勝手だと言ってるんだ──君の信念はどこにある！？」
line = "「それが勝手だと言ってるんだ──君の信念はどこにある！？」"

[[dialogue]]
speaker = "アポロ"
# 「考えたこともないね！」
line = "「考えたこともないね！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「っつ──！」
line = "「っつ──！」"

[[dialogue]]
speaker = "クロト"
# 「ヴィーナス、こっちだ──」
