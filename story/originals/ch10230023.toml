# ちょっ、大丈夫！？
line = "ちょっ、大丈夫！？"

[[dialogue]]
speaker = "シャロン"
# 「か、会長さま……。ご心配なく、昔からこうなんです……。私、歌を歌おうとするとすぐに貧血を起こしてしまう体質で……」
line = "「か、会長さま……。ご心配なく、昔からこうなんです……。私、歌を歌おうとするとすぐに貧血を起こしてしまう体質で……」"

[[dialogue]]
speaker = "シャロン"
# 「うぅ、無念です。今年こそは聖歌隊の末席に加えていただこうと思っておりましたのに。これでは難しそうですね……」
line = "「うぅ、無念です。今年こそは聖歌隊の末席に加えていただこうと思っておりましたのに。これでは難しそうですね……」"

[[dialogue]]
speaker = "シャロン"
# 「実は私、ずっと聖歌隊に憧れがありまして。一度でいいからクリスマスミサのコーラスに参加したいと思っていたんです」
line = "「実は私、ずっと聖歌隊に憧れがありまして。一度でいいからクリスマスミサのコーラスに参加したいと思っていたんです」"

[[dialogue]]
speaker = "シャロン"
# 「女神様の生誕の日に、女神様への日々の感謝と愛を歌に乗せて捧げることができるなんて、とても素敵なことですから」
line = "「女神様の生誕の日に、女神様への日々の感謝と愛を歌に乗せて捧げることができるなんて、とても素敵なことですから」"

[[dialogue]]
speaker = "シャロン"
# 「しかし、うぅ、だからこそ無念です。星騎士として戦うようにもなって、少しは体力も向上したと思っていたのですが……」
line = "「しかし、うぅ、だからこそ無念です。星騎士として戦うようにもなって、少しは体力も向上したと思っていたのですが……」"

[[dialogue]]
speaker = "シャロン"
# 「い、いえっ、ここで諦めてはシスターの名折れですね！　きっと私の愛が足りないのです！　より愛を込めて歌えば貧血なんて起こしません！」
line = "「い、いえっ、ここで諦めてはシスターの名折れですね！　きっと私の愛が足りないのです！　より愛を込めて歌えば貧血なんて起こしません！」"

[[dialogue]]
speaker = "シャロン"
# 「見ていてください、会長さま！　女神様への愛を以て、私が己の殻を破る瞬間を！」
line = "「見ていてください、会長さま！　女神様への愛を以て、私が己の殻を破る瞬間を！」"

[[dialogue]]
speaker = "シャロン"
# 「ら～ら～ら～ら～──ゴホゴホっ！？」
line = "「ら～ら～ら～ら～──ゴホゴホっ！？」"

[[dialogue]]
speaker = "unk"
# 大丈夫！？
line = "大丈夫！？"

[[dialogue]]
speaker = "シャロン"
# 「はうう……。頭がクラクラいたしますぅ……」
line = "「はうう……。頭がクラクラいたしますぅ……」"

[[dialogue]]
speaker = "シャロン"
# 「なんと無様な……。なんと不出来な……。女神様に愛のひとつも捧げることができないなんて……」
line = "「なんと無様な……。なんと不出来な……。女神様に愛のひとつも捧げることができないなんて……」"

[[dialogue]]
speaker = "シャロン"
# 「い、いえっ。これしきのことで諦めるわけにはいきません……！　きっとこれは女神様の課された試練なのです……！」
line = "「い、いえっ。これしきのことで諦めるわけにはいきません……！　きっとこれは女神様の課された試練なのです……！」"

[[dialogue]]
speaker = "シャロン"
# 「そうと決まればもう一度──」
line = "「そうと決まればもう一度──」"

[[dialogue]]
speaker = "unk"
# ちょっと力みすぎだよ
line = "ちょっと力みすぎだよ"

[[dialogue]]
speaker = "シャロン"
# 「しかし、全力で歌ってこそ祈りも伝わるものだと思いますし……それこそ喉が潰れてしまうくらいめいっぱい張り上げませんと……」
line = "「しかし、全力で歌ってこそ祈りも伝わるものだと思いますし……それこそ喉が潰れてしまうくらいめいっぱい張り上げませんと……」"

[[dialogue]]
speaker = "unk"
# 聖歌はみんなで作り上げるものだから
line = "聖歌はみんなで作り上げるものだから"

[[dialogue]]
speaker = "シャロン"
# 「はぁ……。それは承知しておりますが……」
line = "「はぁ……。それは承知しておりますが……」"

[[dialogue]]
speaker = "シャロン"
# 「いえ、私は真の意味で会長さまの言葉を理解できていないのかもしれません」
line = "「いえ、私は真の意味で会長さまの言葉を理解できていないのかもしれません」"

[[dialogue]]
speaker = "シャロン"
# 「どうかご教授いただけますか？　会長さまが私に一体何をお伝えしたいのかを」
line = "「どうかご教授いただけますか？　会長さまが私に一体何をお伝えしたいのかを」"

[[dialogue]]
speaker = "シャロン・クロト"
# 「ら～ら～ら～ら～ら～……♪」
line = "「ら～ら～ら～ら～ら～……♪」"

[[dialogue]]
speaker = "シャロン"
# 「こ、これは……！　会長さまが仰っていたのは、このことだったのですね……！」
line = "「こ、これは……！　会長さまが仰っていたのは、このことだったのですね……！」"

[[dialogue]]
speaker = "シャロン"
# 「１人で歌っていた時より、会長さまと一緒に歌っている時の方が何倍も大きな声となって響いています……！　先程より声を張り上げておりませんのに……！」
line = "「１人で歌っていた時より、会長さまと一緒に歌っている時の方が何倍も大きな声となって響いています……！　先程より声を張り上げておりませんのに……！」"

[[dialogue]]
speaker = "シャロン"
# 「聖歌はみんなで作り上げるもの──まさに、まさにでございます！」
line = "「聖歌はみんなで作り上げるもの──まさに、まさにでございます！」"

[[dialogue]]
speaker = "シャロン"
# 「どうやら私は聖歌隊に憧れるばかり大切なことを見失っていたようですね……！」
line = "「どうやら私は聖歌隊に憧れるばかり大切なことを見失っていたようですね……！」"

[[dialogue]]
speaker = "シャロン"
# 「たとえ１つ１つは小さな歌声でも、<ruby=いくたり>幾人</ruby>もの歌声が集まれば、それはとても大きな歌となって天へと響く──」
line = "「たとえ１つ１つは小さな歌声でも、<ruby>幾人<rt>いくたり</rt></ruby>もの歌声が集まれば、それはとても大きな歌となって天へと響く──」"

[[dialogue]]
speaker = "シャロン"
# 「まさしく愛……！　愛ではありませんか！　ああ、どうして私はこんな当たり前のことに気づけなかったのでしょう……！」
line = "「まさしく愛……！　愛ではありませんか！　ああ、どうして私はこんな当たり前のことに気づけなかったのでしょう……！」"

[[dialogue]]
speaker = "シャロン"
# 「ありがとうございます、会長さま！　おかげで目が覚めました！」
line = "「ありがとうございます、会長さま！　おかげで目が覚めました！」"

[[dialogue]]
speaker = "シャロン"
# 「貧血を起こすほど１人で頑張る必要はなかったのですね……！　むしろ女神様と会長さまは私に個人の力の小ささをお教えくださって……！」
line = "「貧血を起こすほど１人で頑張る必要はなかったのですね……！　むしろ女神様と会長さまは私に個人の力の小ささをお教えくださって……！」"

[[dialogue]]
speaker = "シャロン"
# 「この啓示を人々に伝えなくてはなりません……！　ああ、燃えてきました……！」
line = "「この啓示を人々に伝えなくてはなりません……！　ああ、燃えてきました……！」"

[[dialogue]]
speaker = "シャロン"
# 「そうと決まれば、皆に声をかけて回りましょう！　今年のクリスマスミサは聖歌隊の方々だけではなく流星市国の民全員で合唱するべきです！」
line = "「そうと決まれば、皆に声をかけて回りましょう！　今年のクリスマスミサは聖歌隊の方々だけではなく流星市国の民全員で合唱するべきです！」"

[[dialogue]]
speaker = "unk"
# それはやり過ぎかもだけど……
line = "それはやり過ぎかもだけど……"

[[dialogue]]
speaker = "シャロン"
# 「そんなことはありません！　皆で女神様へ愛を捧げてこそ、女神様も私たちに愛を返してくださるというものです！」
line = "「そんなことはありません！　皆で女神様へ愛を捧げてこそ、女神様も私たちに愛を返してくださるというものです！」"

[[dialogue]]
speaker = "イレーナ"
# 「はぁー……。つっかれたぁ……。だーからクリスマスは嫌いなのよ……。祈りを捧げに来るやつが多いったらありゃしないわ……」
line = "「はぁー……。つっかれたぁ……。だーからクリスマスは嫌いなのよ……。祈りを捧げに来るやつが多いったらありゃしないわ……」"

[[dialogue]]
speaker = "イレーナ"
# 「ま、今日の仕事はこれで終わりだし♪　あとは部屋でダラダラしながら秘蔵のティラミスでもたーべよっと♪」
line = "「ま、今日の仕事はこれで終わりだし♪　あとは部屋でダラダラしながら秘蔵のティラミスでもたーべよっと♪」"

[[dialogue]]
speaker = "シャロン"
# 「イレーナさま！　丁度いいところに！」
line = "「イレーナさま！　丁度いいところに！」"

[[dialogue]]
speaker = "イレーナ"
# 「ぐべっ！？」
line = "「ぐべっ！？」"

[[dialogue]]
speaker = "シャロン"
# 「共に参りましょう！　女神様に仕える聖職者として、愛の伝道師として！　流星市国を震わせるほどの聖歌を女神様に披露するために！」
line = "「共に参りましょう！　女神様に仕える聖職者として、愛の伝道師として！　流星市国を震わせるほどの聖歌を女神様に披露するために！」"

[[dialogue]]
speaker = "イレーナ"
# 「はぁ！？　急に何言って──あっ、ちょっと、だから引っ張るなってのっ、あたし、一仕事終えてクタクタで──」
line = "「はぁ！？　急に何言って──あっ、ちょっと、だから引っ張るなってのっ、あたし、一仕事終えてクタクタで──」"

[[dialogue]]
speaker = "イレーナ"
# 「こらバカ会長っ！　あんたまたコイツになんか吹き込んだわねっ！？　厄介なパターンに入ってるじゃない！」
line = "「こらバカ会長っ！　あんたまたコイツになんか吹き込んだわねっ！？　厄介なパターンに入ってるじゃない！」"

[[dialogue]]
speaker = "シャロン"
# 「急ぎ街中の人に声をかけねば！　ああ、その前に聖歌隊の方々にもご了承を……！　忙しくなりますよ、イレーナさま！」
line = "「急ぎ街中の人に声をかけねば！　ああ、その前に聖歌隊の方々にもご了承を……！　忙しくなりますよ、イレーナさま！」"

[[dialogue]]
speaker = "イレーナ"
# 「離せっ、離しなさいっ！　あたしはこれから部屋でダラダラしながらティラミスを──」
line = "「離せっ、離しなさいっ！　あたしはこれから部屋でダラダラしながらティラミスを──」"

[[dialogue]]
speaker = "シャロン"
# 「ら～ら～ら～ら～ら～……♪　ら～ら～ら～ら～ら～……♪　さぁイレーナさまもご一緒に！」
line = "「ら～ら～ら～ら～ら～……♪　ら～ら～ら～ら～ら～……♪　さぁイレーナさまもご一緒に！」"

[[dialogue]]
speaker = "イレーナ"
# 「あーもうっ、なんであたしが巻き込まれなきゃなんないのよぉ～！！」
line = "「あーもうっ、なんであたしが巻き込まれなきゃなんないのよぉ～！！」"
