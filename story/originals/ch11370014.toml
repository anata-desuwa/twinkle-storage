[[dialogue]]
speaker = "unk"
# 第４話,歌だけじゃなく言葉でも,P
line = "第４話,歌だけじゃなく言葉でも,P"

[[dialogue]]
speaker = "unk"
# その日は休日で、レミカが俺の家に遊びに来ていた。
line = "その日は休日で、レミカが俺の家に遊びに来ていた。"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「――会長、今日はね。小さな私とイチャイチャする日だよ」
line = "「――会長、今日はね。小さな私とイチャイチャする日だよ」"

[[dialogue]]
speaker = "unk"
# どういうこと？
line = "どういうこと？"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「小さな私と、大きな私。会長はどっちの方が、よりドキドキするのかなって思ってさ。というわけで……よいしょっと」
line = "「小さな私と、大きな私。会長はどっちの方が、よりドキドキするのかなって思ってさ。というわけで……よいしょっと」"

[[dialogue]]
speaker = "unk"
# レミカは、ベッドに腰かけている俺の隣へ座ると、猫みたいに体をすり寄せてくる。
line = "レミカは、ベッドに腰かけている俺の隣へ座ると、猫みたいに体をすり寄せてくる。"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「どう、会長？　すりすり……」
line = "「どう、会長？　すりすり……」"

[[dialogue]]
speaker = "unk"
# 俺は彼女の頭に手を伸ばし、優しく撫でた。
line = "俺は彼女の頭に手を伸ばし、優しく撫でた。"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「ん……♪　――体の大きさは関係なく、目の前にいるのが私なら……ちゃんとドキドキする？」
line = "「ん……♪　――体の大きさは関係なく、目の前にいるのが私なら……ちゃんとドキドキする？」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「ふふっ……本当かな～？」
line = "「ふふっ……本当かな～？」"

[[dialogue]]
speaker = "unk"
# 俺はレミカのことが好きだから
line = "俺はレミカのことが好きだから"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「……！　うん……<emoji=heart04>　顔を見れば、会長が本気かどうか、私にはわかるよ」
line = "「……！　うん……<emoji=heart04>　顔を見れば、会長が本気かどうか、私にはわかるよ」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「私も……会長のことが好きだから。会長の言葉、信じるよ」
line = "「私も……会長のことが好きだから。会長の言葉、信じるよ」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「それに……この小さい体だと、会長がすごく大きく感じられて……ちょっとドキドキするかも……<emoji=heart04>」
line = "「それに……この小さい体だと、会長がすごく大きく感じられて……ちょっとドキドキするかも……<emoji=heart04>」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「ねぇ、会長……キス、してもいい？」
line = "「ねぇ、会長……キス、してもいい？」"

[[dialogue]]
speaker = "unk"
# レミカの照れた表情が可愛くて、俺は言葉を返す代わりに、そっと唇を重ねた。
line = "レミカの照れた表情が可愛くて、俺は言葉を返す代わりに、そっと唇を重ねた。"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「あっ……<emoji=heart04>　ん……ちゅ……<emoji=heart04>」
line = "「あっ……<emoji=heart04>　ん……ちゅ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺がどれくらい好きか、伝わった？
line = "俺がどれくらい好きか、伝わった？"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「はあ……<emoji=heart04>　う、うん……<emoji=heart04>」
line = "「はあ……<emoji=heart04>　う、うん……<emoji=heart04>」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「ねぇ、会長……今度は、ぎゅって強く抱きしめながら……もう１回、キスしてほしい<emoji=heart04>」
line = "「ねぇ、会長……今度は、ぎゅって強く抱きしめながら……もう１回、キスしてほしい<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺はレミカの体をしっかり抱き寄せ、再び唇を重ねる。
line = "俺はレミカの体をしっかり抱き寄せ、再び唇を重ねる。"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「んっ……<emoji=heart04>　ちゅ<emoji=heart04>　んちゅ……<emoji=heart04>」
line = "「んっ……<emoji=heart04>　ちゅ<emoji=heart04>　んちゅ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# それからしばらく、恋人同士のスキンシップを重ねて――落ち着いた頃に、レミカが口を開いた。
line = "それからしばらく、恋人同士のスキンシップを重ねて――落ち着いた頃に、レミカが口を開いた。"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「ねぇ、会長。この前……シャルルさんと会った時のことなんだけど……」
line = "「ねぇ、会長。この前……シャルルさんと会った時のことなんだけど……」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「あの時に言われたこと、ずっと考えててさ。私は、キラキラな笑顔が似合う『可愛いアイドル』になりたいって思ってるけど……」
line = "「あの時に言われたこと、ずっと考えててさ。私は、キラキラな笑顔が似合う『可愛いアイドル』になりたいって思ってるけど……」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「今、私を応援してくれてるファンの人たちが、どう感じるのかって考えたら……わからなくなっちゃって」
line = "「今、私を応援してくれてるファンの人たちが、どう感じるのかって考えたら……わからなくなっちゃって」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「『可愛いアイドル』は大好きだし、理想も追いかけたい。でも……」
line = "「『可愛いアイドル』は大好きだし、理想も追いかけたい。でも……」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「今のファンの人たちが好きになってくれている『愛戸レミカ』とは、私の理想像はかけ離れているかもしれないって……」
line = "「今のファンの人たちが好きになってくれている『愛戸レミカ』とは、私の理想像はかけ離れているかもしれないって……」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「私、応援してくれる人たちには、笑顔になってほしいって本気で思ってるんだ。だから……」
line = "「私、応援してくれる人たちには、笑顔になってほしいって本気で思ってるんだ。だから……」"

[[dialogue]]
speaker = "unk"
# その気持ちを、直接伝えてみたらどう？
line = "その気持ちを、直接伝えてみたらどう？"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「え……？」
line = "「え……？」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「――ファンの人たちに……動画とかで、もっと自分の気持ちを伝えてみたらどうかって……？」
line = "「――ファンの人たちに……動画とかで、もっと自分の気持ちを伝えてみたらどうかって……？」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「歌だけじゃなくて……言葉でも……？」
line = "「歌だけじゃなくて……言葉でも……？」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「たしかに……ちょっと恥ずかしくて、今まで避けてたけど……」
line = "「たしかに……ちょっと恥ずかしくて、今まで避けてたけど……」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「素直に話したら、ファンの人たち、喜んでくれるかな……？」
line = "「素直に話したら、ファンの人たち、喜んでくれるかな……？」"

[[dialogue]]
speaker = "unk"
# 俺は、迷いなく頷いた。
line = "俺は、迷いなく頷いた。"

[[dialogue]]
speaker = "unk"
# ――だって俺は、夢を追いかけて輝くレミカを好きになったのだから。
line = "――だって俺は、夢を追いかけて輝くレミカを好きになったのだから。"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「……！　か、会長……<emoji=heart04>」
line = "「……！　か、会長……<emoji=heart04>」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「ありがとう……♪」
line = "「ありがとう……♪」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「え……？　今の笑顔、すごく可愛かった……？」
line = "「え……？　今の笑顔、すごく可愛かった……？」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「だって……それは、好きな人が応援してくれるから……<emoji=heart04>」
line = "「だって……それは、好きな人が応援してくれるから……<emoji=heart04>」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「会長……<emoji=heart04>　んっ……ちゅっ<emoji=heart04>」
line = "「会長……<emoji=heart04>　んっ……ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 後日。
line = "後日。"

[[dialogue]]
speaker = "レミカ"
# 「えっと……」
line = "「えっと……」"

[[dialogue]]
speaker = "レミカ"
# 「そんなわけで……みんなが好きだって言ってくれてる『カッコいいアイドル』と──」
line = "「そんなわけで……みんなが好きだって言ってくれてる『カッコいいアイドル』と──」"

[[dialogue]]
speaker = "レミカ"
# 「子供の頃からの夢である『可愛いアイドル』、その両立を目指して、これからも頑張っていきたいと思っていますっ！」
line = "「子供の頃からの夢である『可愛いアイドル』、その両立を目指して、これからも頑張っていきたいと思っていますっ！」"

[[dialogue]]
speaker = "レミカ"
# 「なので……よかったら、色々な意見を聞かせてもらえたら嬉しいです……」
line = "「なので……よかったら、色々な意見を聞かせてもらえたら嬉しいです……」"

[[dialogue]]
speaker = "レミカ"
# 「あと……いつも応援してくれて、ありがとうございますっ」
line = "「あと……いつも応援してくれて、ありがとうございますっ」"

[[dialogue]]
speaker = "レミカ"
# 「自分の歌を褒めてもらえると……その、本当に、すごく嬉しくて……」
line = "「自分の歌を褒めてもらえると……その、本当に、すごく嬉しくて……」"

[[dialogue]]
speaker = "レミカ"
# 「……す、素直に言うのは、やっぱり恥ずかしいですね……」
line = "「……す、素直に言うのは、やっぱり恥ずかしいですね……」"

[[dialogue]]
speaker = "レミカ"
# 「コホン……と、とりあえず……これからも、よろしくお願いしますっ！」
line = "「コホン……と、とりあえず……これからも、よろしくお願いしますっ！」"

[[dialogue]]
speaker = "unk"
# その動画がＳＮＳに投稿されると――
line = "その動画がＳＮＳに投稿されると――"

[[dialogue]]
speaker = "unk"
# 『あの愛戸レミカが照れまくってるの、可愛すぎるんだが！？』というコメントが溢れかえり、大きな話題になるのであった。
line = "『あの愛戸レミカが照れまくってるの、可愛すぎるんだが！？』というコメントが溢れかえり、大きな話題になるのであった。"
