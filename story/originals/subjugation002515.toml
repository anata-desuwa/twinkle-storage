[[dialogue]]
speaker = "unk"
# それからも、バトルフェスタ・ペンタグラムは引き続き行われた。
line = "それからも、バトルフェスタ・ペンタグラムは引き続き行われた。"

[[dialogue]]
speaker = "unk"
# 両学園と附属校、守護天使や魔女と様々な星騎士たちが参加し、シャドウとの名勝負はアリーナでも中継され、大いに盛り上がった。
line = "両学園と附属校、守護天使や魔女と様々な星騎士たちが参加し、シャドウとの名勝負はアリーナでも中継され、大いに盛り上がった。"

[[dialogue]]
speaker = "unk"
# そして――
line = "そして――"

[[dialogue]]
speaker = "ヴィーナス"
# 「みんな～！　グラスは持った～？」
line = "「みんな～！　グラスは持った～？」"

[[dialogue]]
speaker = "unk"
# 飲み物は配り終えたぞ！
line = "飲み物は配り終えたぞ！"

[[dialogue]]
speaker = "ヴィーナス"
# 「よ～し、じゃあフィオナ、お願い！」
line = "「よ～し、じゃあフィオナ、お願い！」"

[[dialogue]]
speaker = "フィオナ"
# 「はい。それでは――」
line = "「はい。それでは――」"

[[dialogue]]
speaker = "フィオナ"
# 「みなさん、本日はお疲れ様でした！　そして、両学園の創立記念日を祝しまして！」
line = "「みなさん、本日はお疲れ様でした！　そして、両学園の創立記念日を祝しまして！」"

[[dialogue]]
speaker = "フィオナ"
# 「カンパーイ！！」
line = "「カンパーイ！！」"

[[dialogue]]
speaker = "unk"
# バトルフェスタ終了の打ち上げもとい──（本当は）本日のメインイベントである『両学園創立記念パーティー』がスタートしたのだった。
line = "バトルフェスタ終了の打ち上げもとい──（本当は）本日のメインイベントである『両学園創立記念パーティー』がスタートしたのだった。"

[[dialogue]]
speaker = "プリムラ"
# 「妃竜院マハムート！」
line = "「妃竜院マハムート！」"

[[dialogue]]
speaker = "マハムート"
# 「あなたの方から話しかけて来るとはね、プリムラ。何か用かしら？」
line = "「あなたの方から話しかけて来るとはね、プリムラ。何か用かしら？」"

[[dialogue]]
speaker = "プリムラ"
# 「我は貴様に、宣戦布告に来たのじゃ！」
line = "「我は貴様に、宣戦布告に来たのじゃ！」"

[[dialogue]]
speaker = "マハムート"
# 「へぇ、この竜たる私に、恐れ知らずなことをするじゃない」
line = "「へぇ、この竜たる私に、恐れ知らずなことをするじゃない」"

[[dialogue]]
speaker = "プリムラ"
# 「今日のバトル……貴様がいなければ、正直勝てなかったのじゃ」
line = "「今日のバトル……貴様がいなければ、正直勝てなかったのじゃ」"

[[dialogue]]
speaker = "マハムート"
# 「……それで？」
line = "「……それで？」"

[[dialogue]]
speaker = "プリムラ"
# 「だからこそ、サチの幸運を突破してみせたマム！　我は貴様に、いずれ勝ってみせるのじゃ！」
line = "「だからこそ、サチの幸運を突破してみせたマム！　我は貴様に、いずれ勝ってみせるのじゃ！」"

[[dialogue]]
speaker = "マハムート"
# 「なるほど。……ふっ、そんな不遜なことを言うのは、あなたで２人目ね」
line = "「なるほど。……ふっ、そんな不遜なことを言うのは、あなたで２人目ね」"

[[dialogue]]
speaker = "プリムラ"
# 「２人目？」
line = "「２人目？」"

[[dialogue]]
speaker = "マハムート"
# 「１人目はどこぞの生意気なドリルロールよ。まぁ、本気だと言うなら、せいぜい頑張ってみせなさい」
line = "「１人目はどこぞの生意気なドリルロールよ。まぁ、本気だと言うなら、せいぜい頑張ってみせなさい」"

[[dialogue]]
speaker = "unk"
# ――プリムラの宣言を受けた後、マハムートはその１人目に会いに行っていた。
line = "――プリムラの宣言を受けた後、マハムートはその１人目に会いに行っていた。"

[[dialogue]]
speaker = "マハムート"
# 「ヒルディオーネ。私のシャドウ、倒してみせたそうじゃない」
line = "「ヒルディオーネ。私のシャドウ、倒してみせたそうじゃない」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「マム……！」
line = "「マム……！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「――ええ。次の星霊祭では本物のあなたに勝たなくてはなりませんもの」
line = "「――ええ。次の星霊祭では本物のあなたに勝たなくてはなりませんもの」"

[[dialogue]]
speaker = "マハムート"
# 「そう。なら期待できそうね。けれど――」
line = "「そう。なら期待できそうね。けれど――」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ええ、わかっていますわ。あなたがその時まで、同じ強さでいるはずがない。あなたに勝つ為に、私ももっと強くなってみせますわ」
line = "「ええ、わかっていますわ。あなたがその時まで、同じ強さでいるはずがない。あなたに勝つ為に、私ももっと強くなってみせますわ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「あなたのライバルとして、必ず」
line = "「あなたのライバルとして、必ず」"

[[dialogue]]
speaker = "マハムート"
# 「そう。なら、その時を楽しみにしているわ」
line = "「そう。なら、その時を楽しみにしているわ」"

[[dialogue]]
speaker = "unk"
# ライバルの力強い視線を受けて、マムは不敵な笑みで応えるのだった――
line = "ライバルの力強い視線を受けて、マムは不敵な笑みで応えるのだった――"

[[dialogue]]
speaker = "unk"
# 一方、その頃。
line = "一方、その頃。"

[[dialogue]]
speaker = "フェニエル"
# 「会長さん、ちょっとお時間よろしいでしょうか？」
line = "「会長さん、ちょっとお時間よろしいでしょうか？」"

[[dialogue]]
speaker = "unk"
# フニ、お疲れ様。どうしたんだ？
line = "フニ、お疲れ様。どうしたんだ？"

[[dialogue]]
speaker = "フェニエル"
# 「あの、実は会長さんにお伝えしたいことがあって……」
line = "「あの、実は会長さんにお伝えしたいことがあって……」"

[[dialogue]]
speaker = "フェニエル"
# 「今度の星霊祭……私、会長さんと戦ってみたいです！」
line = "「今度の星霊祭……私、会長さんと戦ってみたいです！」"

[[dialogue]]
speaker = "フェニエル"
# 「マムとヒルディーお姉様みたいに……ライバルとして！」
line = "「マムとヒルディーお姉様みたいに……ライバルとして！」"

[[dialogue]]
speaker = "unk"
# 俺はそんな風に、フェニエルから宣言されるのだった――
line = "俺はそんな風に、フェニエルから宣言されるのだった――"

[[dialogue]]
speaker = "女生徒Ａ"
# 「リーリアちゃん！　マリオンさんのシャドウと戦うところ、中継見てたよ！　めっちゃカッコよくて、感動しちゃった～！」
line = "「リーリアちゃん！　マリオンさんのシャドウと戦うところ、中継見てたよ！　めっちゃカッコよくて、感動しちゃった～！」"

[[dialogue]]
speaker = "女生徒Ｂ"
# 「私もリーリアちゃんのシャドウと戦ったんだけど、魔弾の早撃ち凄すぎて、ビックリしちゃった！」
line = "「私もリーリアちゃんのシャドウと戦ったんだけど、魔弾の早撃ち凄すぎて、ビックリしちゃった！」"

[[dialogue]]
speaker = "リーリア"
# 「みんな、ありがと～♪　褒めてくれて、マジカル嬉しい～☆」
line = "「みんな、ありがと～♪　褒めてくれて、マジカル嬉しい～☆」"

[[dialogue]]
speaker = "ルルカ"
# 「リーリアちゃん、よかったね♪　みんな、ちゃんと見てくれてて！」
line = "「リーリアちゃん、よかったね♪　みんな、ちゃんと見てくれてて！」"

[[dialogue]]
speaker = "ヨミ"
# 「今日のリーリアさんは、爆裂本気で頑張ってましたから♪　私も星騎士として、もっと強くなりたいって思いました！」
line = "「今日のリーリアさんは、爆裂本気で頑張ってましたから♪　私も星騎士として、もっと強くなりたいって思いました！」"

[[dialogue]]
speaker = "メイプル"
# 「早撃ちも驚いたけど、何より融合魔弾！　あれは心躍るカッコよさで痺れたな～！」
line = "「早撃ちも驚いたけど、何より融合魔弾！　あれは心躍るカッコよさで痺れたな～！」"

[[dialogue]]
speaker = "リーリア"
# 「ふふっ、そうでしょ～？　やっぱり可愛い私が学園にいるのはウィンウィンですよね～♪」
line = "「ふふっ、そうでしょ～？　やっぱり可愛い私が学園にいるのはウィンウィンですよね～♪」"

[[dialogue]]
speaker = "アナ"
# 「あまり調子に乗らせ過ぎてもよくないですが……まあ、今日くらいはノープロブレムでしょう」
line = "「あまり調子に乗らせ過ぎてもよくないですが……まあ、今日くらいはノープロブレムでしょう」"

[[dialogue]]
speaker = "ルルカ"
# 「リーリアちゃん、本当に嬉しそうだしね♪」
line = "「リーリアちゃん、本当に嬉しそうだしね♪」"

[[dialogue]]
speaker = "リーリア"
# 「えへへへっ♪」
line = "「えへへへっ♪」"

[[dialogue]]
speaker = "unk"
# カフェテリアの各所で一緒に戦った星騎士たちが和気あいあいと話す中、フィオナは会場を歩いていた。
line = "カフェテリアの各所で一緒に戦った星騎士たちが和気あいあいと話す中、フィオナは会場を歩いていた。"

[[dialogue]]
speaker = "unk"
# そして、１人の星騎士に声をかける。
line = "そして、１人の星騎士に声をかける。"

[[dialogue]]
speaker = "フィオナ"
# 「ヴィーナスさん」
line = "「ヴィーナスさん」"

[[dialogue]]
speaker = "ヴィーナス"
# 「フィオナ！　パーティーは楽しんでる？」
line = "「フィオナ！　パーティーは楽しんでる？」"

[[dialogue]]
speaker = "フィオナ"
# 「はい。会場をひと回りして、みなさんに挨拶してきました」
line = "「はい。会場をひと回りして、みなさんに挨拶してきました」"

[[dialogue]]
speaker = "フィオナ"
# 「それで改めて、ヴィーナスさんにお礼が言いたくて」
line = "「それで改めて、ヴィーナスさんにお礼が言いたくて」"

[[dialogue]]
speaker = "ヴィーナス"
# 「お礼？　もしかして、最後にバトルした時の話？」
line = "「お礼？　もしかして、最後にバトルした時の話？」"

[[dialogue]]
speaker = "フィオナ"
# 「はい。今日はありがとうございました」
line = "「はい。今日はありがとうございました」"

[[dialogue]]
speaker = "ヴィーナス"
# 「フィオナがお礼を言うなら、私も言わなくちゃいけないわね！」
line = "「フィオナがお礼を言うなら、私も言わなくちゃいけないわね！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「今日はフィオナと全力で戦えて嬉しかったわ！　すごく楽しかった！　ありがとう♪」
line = "「今日はフィオナと全力で戦えて嬉しかったわ！　すごく楽しかった！　ありがとう♪」"

[[dialogue]]
speaker = "フィオナ"
# 「あの……実は、ヴィーナスさんにご相談があるのですが……」
line = "「あの……実は、ヴィーナスさんにご相談があるのですが……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「相談？」
line = "「相談？」"

[[dialogue]]
speaker = "unk"
# フィオナは頷いてから、ちょっと恥ずかしそうな顔で――
line = "フィオナは頷いてから、ちょっと恥ずかしそうな顔で――"

[[dialogue]]
speaker = "フィオナ"
# 「その……よければなんですが、<ruby=バトル>模擬戦</ruby>だけじゃなくて、今度から訓練も一緒にやりませんか？」
line = "「その……よければなんですが、<ruby>模擬戦<rt>バトル</rt></ruby>だけじゃなくて、今度から訓練も一緒にやりませんか？」"

[[dialogue]]
speaker = "フィオナ"
# 「私、これを機にヴィーナスさんと、もっと切磋琢磨できたらと思っていて……」
line = "「私、これを機にヴィーナスさんと、もっと切磋琢磨できたらと思っていて……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「えっ、いいの！？　もちろん大歓迎よ！」
line = "「えっ、いいの！？　もちろん大歓迎よ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「フィオナと沢山戦ったら、リクリエなんて目じゃないくらい、絶対に強くなれるわ！」
line = "「フィオナと沢山戦ったら、リクリエなんて目じゃないくらい、絶対に強くなれるわ！」"

[[dialogue]]
speaker = "フィオナ"
# 「バトルももちろんなんですが、普段のトレーニングはどういうことをやってるのかとか、そういうことも……」
line = "「バトルももちろんなんですが、普段のトレーニングはどういうことをやってるのかとか、そういうことも……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「？　バトルを沢山するわ！！！」
line = "「？　バトルを沢山するわ！！！」"

[[dialogue]]
speaker = "unk"
# 一生実戦形式の模擬戦をするだけなんだ……
line = "一生実戦形式の模擬戦をするだけなんだ……"

[[dialogue]]
speaker = "unk"
# フィオナ……ヴィーナスの訓練はその……
line = "フィオナ……ヴィーナスの訓練はその……"

[[dialogue]]
speaker = "unk"
# 俺の補足にフィオナは一瞬顔面蒼白になったような気がしたが──
line = "俺の補足にフィオナは一瞬顔面蒼白になったような気がしたが──"

[[dialogue]]
speaker = "フィオナ"
# 「やりましょう、やってみせます！　何百回かヴィーナスさんと戦えば、私もまだまだ強くなれるはずです！」
line = "「やりましょう、やってみせます！　何百回かヴィーナスさんと戦えば、私もまだまだ強くなれるはずです！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「いいわね、フィオナ！　そういう熱いヤツ、私も大好きだわ！」
line = "「いいわね、フィオナ！　そういう熱いヤツ、私も大好きだわ！」"

[[dialogue]]
speaker = "フィオナ"
# 「ありがとうございます！！　それじゃあ――」
line = "「ありがとうございます！！　それじゃあ――」"

[[dialogue]]
speaker = "unk"
# フィオナは握手を求めて、手を差し出しながら言う。
line = "フィオナは握手を求めて、手を差し出しながら言う。"

[[dialogue]]
speaker = "フィオナ"
# 「これからまた、よろしくお願いします。ヴィーナスさん」
line = "「これからまた、よろしくお願いします。ヴィーナスさん」"

[[dialogue]]
speaker = "unk"
# ヴィーナスは嬉しそうな笑顔で、両手でフィオナの手を取り――
line = "ヴィーナスは嬉しそうな笑顔で、両手でフィオナの手を取り――"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええ！　私たち、これからもっと仲良くなりましょう♪」
line = "「ええ！　私たち、これからもっと仲良くなりましょう♪」"

[[dialogue]]
speaker = "フィオナ"
# 「はい。よろしくお願いします」
line = "「はい。よろしくお願いします」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あとは私、フィオナと２人でどこか遊びに行きたいわ！」
line = "「あとは私、フィオナと２人でどこか遊びに行きたいわ！」"

[[dialogue]]
speaker = "フィオナ"
# 「え？」
line = "「え？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「他にもお泊り会とか！　私たち、そういうのしたことなかったでしょ？」
line = "「他にもお泊り会とか！　私たち、そういうのしたことなかったでしょ？」"

[[dialogue]]
speaker = "フィオナ"
# 「し、知り合ってから結構経つので、改めてそういうことをしようとすると、なんだかちょっと気恥ずかしいですね……」
line = "「し、知り合ってから結構経つので、改めてそういうことをしようとすると、なんだかちょっと気恥ずかしいですね……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうかしら？　私はすごく楽しみよ♪」
line = "「そうかしら？　私はすごく楽しみよ♪」"

[[dialogue]]
speaker = "フィオナ"
# 「……ふふっ」
line = "「……ふふっ」"

[[dialogue]]
speaker = "フィオナ"
# 「やっぱり、ヴィーナスさんには敵いませんね」
line = "「やっぱり、ヴィーナスさんには敵いませんね」"

[[dialogue]]
speaker = "unk"
# こうして、２人は前よりも仲良く、これからの予定について話し合い、盛り上がるのだった――
line = "こうして、２人は前よりも仲良く、これからの予定について話し合い、盛り上がるのだった――"
