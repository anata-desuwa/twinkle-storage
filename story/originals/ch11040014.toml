[[dialogue]]
speaker = "unk"
# 第４話,想いの届け方,P
line = "第４話,想いの届け方,P"

[[dialogue]]
speaker = "unk"
# 『ポラリスプロダクション』にミュージカルのオファーが舞い込んできた。
line = "『ポラリスプロダクション』にミュージカルのオファーが舞い込んできた。"

[[dialogue]]
speaker = "unk"
# 同じ事務所であるトップアイドルのレミカの指導の下、藍は歌唱レッスンを受けているのだが──
line = "同じ事務所であるトップアイドルのレミカの指導の下、藍は歌唱レッスンを受けているのだが──"

[[dialogue]]
speaker = "藍"
# 「はぁ、はぁ、ふぅ……ありがとう、ございました……！」
line = "「はぁ、はぁ、ふぅ……ありがとう、ございました……！」"

[[dialogue]]
speaker = "レミカ"
# 「──うん。随分と声出るようになったね。ほんの数ヶ月で、すごく成長してる。伸びしろはあると思ってたけど、まさかここまでとはね」
line = "「──うん。随分と声出るようになったね。ほんの数ヶ月で、すごく成長してる。伸びしろはあると思ってたけど、まさかここまでとはね」"

[[dialogue]]
speaker = "藍"
# 「ありがとうごさいます。レミカ先輩の指導のおかげです。トップアイドルに直接教えてもらえるなんて、夢みたいです」
line = "「ありがとうごさいます。レミカ先輩の指導のおかげです。トップアイドルに直接教えてもらえるなんて、夢みたいです」"

[[dialogue]]
speaker = "レミカ"
# 「同じ事務所なんだから遠慮しないでいいのに。でも、最近の藍、ちょっと変わったよね？」
line = "「同じ事務所なんだから遠慮しないでいいのに。でも、最近の藍、ちょっと変わったよね？」"

[[dialogue]]
speaker = "藍"
# 「そ、そうでしょうか……？　背は少し伸びたかもしれません……バストも前よりちょっと大きくなったかも……？」
line = "「そ、そうでしょうか……？　背は少し伸びたかもしれません……バストも前よりちょっと大きくなったかも……？」"

[[dialogue]]
speaker = "レミカ"
# 「まだ大きくなってるんだ！？　成長期すごいなぁ……──って、スタイルの話じゃなくて」
line = "「まだ大きくなってるんだ！？　成長期すごいなぁ……──って、スタイルの話じゃなくて」"

[[dialogue]]
speaker = "レミカ"
# 「元から可愛かったけど、今は綺麗になった気がする」
line = "「元から可愛かったけど、今は綺麗になった気がする」"

[[dialogue]]
speaker = "藍"
# 「き、綺麗に、ですか……！？　そ、そんな……レミカ先輩の足元にも及ばないです！　そう言ってもらえるのはすごく嬉しいですけど……特に心当たりは……」
line = "「き、綺麗に、ですか……！？　そ、そんな……レミカ先輩の足元にも及ばないです！　そう言ってもらえるのはすごく嬉しいですけど……特に心当たりは……」"

[[dialogue]]
speaker = "レミカ"
# 「藍さ、もしかして、恋、してない？」
line = "「藍さ、もしかして、恋、してない？」"

[[dialogue]]
speaker = "藍"
# 「こ、こっ、恋ぃっ！？　し、してないです！　してないですよ！　私、男の人、苦手なままですし……」
line = "「こ、こっ、恋ぃっ！？　し、してないです！　してないですよ！　私、男の人、苦手なままですし……」"

[[dialogue]]
speaker = "レミカ"
# 「そう？　当てが外れたかな？」
line = "「そう？　当てが外れたかな？」"

[[dialogue]]
speaker = "藍"
# 「どうして、そんな風に、おっ、思ったんですか……？」
line = "「どうして、そんな風に、おっ、思ったんですか……？」"

[[dialogue]]
speaker = "レミカ"
# 「恋は、女を一番綺麗にするサプリメントだから。それにね、藍のラブソングに想いが乗った瞬間、うっすらと誰かの影が見えたの」
line = "「恋は、女を一番綺麗にするサプリメントだから。それにね、藍のラブソングに想いが乗った瞬間、うっすらと誰かの影が見えたの」"

[[dialogue]]
speaker = "藍"
# 「…………っ！」
line = "「…………っ！」"

[[dialogue]]
speaker = "レミカ"
# 「家族でも、尊敬する人でもない……本当に好きな人を思い浮かべてないと、ああは歌えないよ」
line = "「家族でも、尊敬する人でもない……本当に好きな人を思い浮かべてないと、ああは歌えないよ」"

[[dialogue]]
speaker = "藍"
# 「わ、私が、恋……？　恋しちゃってるんでしょうか……恋しても良いんでしょうか……？」
line = "「わ、私が、恋……？　恋しちゃってるんでしょうか……恋しても良いんでしょうか……？」"

[[dialogue]]
speaker = "レミカ"
# 「あー、無自覚だったんだ？　まあ、初恋ってそういうものかもね」
line = "「あー、無自覚だったんだ？　まあ、初恋ってそういうものかもね」"

[[dialogue]]
speaker = "レミカ"
# 「良いとか悪いとかじゃない。好きって気持ちは、しようと思ってするものじゃないし、止めようと思って止められるものでもないでしょ」
line = "「良いとか悪いとかじゃない。好きって気持ちは、しようと思ってするものじゃないし、止めようと思って止められるものでもないでしょ」"

[[dialogue]]
speaker = "レミカ"
# 「相手も、藍に好かれてるって知ったら嬉しいんじゃないかな」
line = "「相手も、藍に好かれてるって知ったら嬉しいんじゃないかな」"

[[dialogue]]
speaker = "藍"
# 「そ、そうでしょうか……？」
line = "「そ、そうでしょうか……？」"

[[dialogue]]
speaker = "レミカ"
# 「それで？　誰を思い浮かべてたの？」
line = "「それで？　誰を思い浮かべてたの？」"

[[dialogue]]
speaker = "藍"
# 「い、言えませんっ……！　レミカ先輩にも、それだけは……！　私なんかが好きになっちゃ、迷惑だと思いますし……」
line = "「い、言えませんっ……！　レミカ先輩にも、それだけは……！　私なんかが好きになっちゃ、迷惑だと思いますし……」"

[[dialogue]]
speaker = "unk"
# ２人ともお疲れさま
line = "２人ともお疲れさま"

[[dialogue]]
speaker = "レミカ"
# 「あ、会長」
line = "「あ、会長」"

[[dialogue]]
speaker = "藍"
# 「ぴゃっ！？　か、か、会長さんっ！　お疲れさまです」
line = "「ぴゃっ！？　か、か、会長さんっ！　お疲れさまです」"

[[dialogue]]
speaker = "レミカ"
# 「あ～、そういうことかぁ……共演をきっかけに恋仲になるなんてのは珍しい話じゃないけど……」
line = "「あ～、そういうことかぁ……共演をきっかけに恋仲になるなんてのは珍しい話じゃないけど……」"

[[dialogue]]
speaker = "レミカ"
# 「藍を初恋に目覚めさせちゃうなんて、会長ってば罪な男だね」
line = "「藍を初恋に目覚めさせちゃうなんて、会長ってば罪な男だね」"

[[dialogue]]
speaker = "レミカ"
# 「ナイスタイミング、会長。ちょうどレッスン終わったところ。夜道は危ないし、藍を家まで送ってあげて」
line = "「ナイスタイミング、会長。ちょうどレッスン終わったところ。夜道は危ないし、藍を家まで送ってあげて」"

[[dialogue]]
speaker = "藍"
# 「えっ、レミカ先輩は？」
line = "「えっ、レミカ先輩は？」"

[[dialogue]]
speaker = "レミカ"
# 「私はまだやることがあるし、マネージャーに迎えに来てもらうから。会長、藍のこと、よろしくね」
line = "「私はまだやることがあるし、マネージャーに迎えに来てもらうから。会長、藍のこと、よろしくね」"

[[dialogue]]
speaker = "unk"
# レミカに背中を押され、俺は藍を家まで送り届けることになった。
line = "レミカに背中を押され、俺は藍を家まで送り届けることになった。"

[[dialogue]]
speaker = "藍"
# 「レミカ先輩にいっぱい特訓してもらいました。現役トップアイドルにマンツーマンで教えてもらえるなんて、幸せな時間でしたよ」
line = "「レミカ先輩にいっぱい特訓してもらいました。現役トップアイドルにマンツーマンで教えてもらえるなんて、幸せな時間でしたよ」"

[[dialogue]]
speaker = "unk"
# レミカとどんな特訓をしてたの？
line = "レミカとどんな特訓をしてたの？"

[[dialogue]]
speaker = "藍"
# 「声の出し方と、想いを言葉に乗せる練習です。これは台詞でも歌でも応用が利くからって」
line = "「声の出し方と、想いを言葉に乗せる練習です。これは台詞でも歌でも応用が利くからって」"

[[dialogue]]
speaker = "unk"
# どうやるの？
line = "どうやるの？"

[[dialogue]]
speaker = "藍"
# 「やり方は何も難しくないんです。でも、準備と心構えが必要で──会長さん、復習に付き合ってもらえませんか？」
line = "「やり方は何も難しくないんです。でも、準備と心構えが必要で──会長さん、復習に付き合ってもらえませんか？」"

[[dialogue]]
speaker = "藍"
# 「すー、はー、すー、はー……いきます」
line = "「すー、はー、すー、はー……いきます」"

[[dialogue]]
speaker = "藍"
# 「相手の目を見つめて、胸の中を目の前の人のことだけでいっぱいにして──」
line = "「相手の目を見つめて、胸の中を目の前の人のことだけでいっぱいにして──」"

[[dialogue]]
speaker = "藍"
# 「あなたが好き……大好きなんです……愛してます」
line = "「あなたが好き……大好きなんです……愛してます」"

[[dialogue]]
speaker = "unk"
# …………っ！？
line = "…………っ！？"

[[dialogue]]
speaker = "藍"
# 「な、なんて……！　ど、どうですか？　グッと来ましたか？」
line = "「な、なんて……！　ど、どうですか？　グッと来ましたか？」"

[[dialogue]]
speaker = "unk"
# 勘違いしちゃうくらい、グッと来たよ……！
line = "勘違いしちゃうくらい、グッと来たよ……！"

[[dialogue]]
speaker = "藍"
# 「え、えへへ……上手くいきました……！　会長さんへの想いをたっぷり込めましたから……レミカ先輩との特訓大成功です……！」
line = "「え、えへへ……上手くいきました……！　会長さんへの想いをたっぷり込めましたから……レミカ先輩との特訓大成功です……！」"

[[dialogue]]
speaker = "藍"
# 「勘違いしてくれても、いいんですけど……」
line = "「勘違いしてくれても、いいんですけど……」"

[[dialogue]]
speaker = "unk"
# ……え？
line = "……え？"

[[dialogue]]
speaker = "藍"
# 「な、なんでもないです♪　さ、帰りましょう」
line = "「な、なんでもないです♪　さ、帰りましょう」"

[[dialogue]]
speaker = "藍"
# （今の私じゃ、これが精一杯……）
line = "（今の私じゃ、これが精一杯……）"

[[dialogue]]
speaker = "藍"
# （でもいつか、そんな遠くない内に……演技の練習なんかじゃなく、会長さんに好きって伝えさせてくださいね）
line = "（でもいつか、そんな遠くない内に……演技の練習なんかじゃなく、会長さんに好きって伝えさせてくださいね）"
