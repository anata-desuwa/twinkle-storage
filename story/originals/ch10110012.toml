[[dialogue]]
speaker = "unk"
# 第２話,普通のアプローチ,P
line = "第２話,普通のアプローチ,P"

[[dialogue]]
speaker = "女子生徒Ａ"
# 「会長、お疲れさまっ。これ、今日の調理実習で作ったクッキーなんだけど、よかったら食べて！」
line = "「会長、お疲れさまっ。これ、今日の調理実習で作ったクッキーなんだけど、よかったら食べて！」"

[[dialogue]]
speaker = "女子生徒Ｂ"
# 「わ、私も……あ、あんまり美味しくないかもしれないけど、よければ、どうぞ……」
line = "「わ、私も……あ、あんまり美味しくないかもしれないけど、よければ、どうぞ……」"

[[dialogue]]
speaker = "unk"
# ありがとう、どれも美味しそうだ
line = "ありがとう、どれも美味しそうだ"

[[dialogue]]
speaker = "ヴィーナス"
# 「凄いことになってるわね。これが星徒会長効果ってやつなのかしら。両手で持ちきれないくらいクッキーをもらってるじゃない」
line = "「凄いことになってるわね。これが星徒会長効果ってやつなのかしら。両手で持ちきれないくらいクッキーをもらってるじゃない」"

[[dialogue]]
speaker = "ヴィーナス"
# 「なんだか私が星徒会長になった直後を思い出すわね。私も調理実習があった日は、色んな子からお菓子をもらったわ……」
line = "「なんだか私が星徒会長になった直後を思い出すわね。私も調理実習があった日は、色んな子からお菓子をもらったわ……」"

[[dialogue]]
speaker = "マトイ"
# （う、うわぁ……そりゃそうだよね。みんなそうするよね……）
line = "（う、うわぁ……そりゃそうだよね。みんなそうするよね……）"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうするって？」
line = "「そうするって？」"

[[dialogue]]
speaker = "マトイ"
# （作ったもの、会長にプレゼントするってこと！）
line = "（作ったもの、会長にプレゼントするってこと！）"

[[dialogue]]
speaker = "マトイ"
# （御前試合でヴィーナスに勝ってから、みんな気になってるんだよ。やっぱりその、ちょ、ちょっとかっこよかったし……）
line = "（御前試合でヴィーナスに勝ってから、みんな気になってるんだよ。やっぱりその、ちょ、ちょっとかっこよかったし……）"

[[dialogue]]
speaker = "マトイ"
# 「ど、どうしようかな……やっぱりやめておこうかな……」
line = "「ど、どうしようかな……やっぱりやめておこうかな……」"

[[dialogue]]
speaker = "unk"
# ２人は調理実習、何を作ったんだ？
line = "２人は調理実習、何を作ったんだ？"

[[dialogue]]
speaker = "ヴィーナス"
# 「私はグループの子たちに全部任せたわ！　ああいうグラム単位で量を測ったりするものって、苦手なのよ」
line = "「私はグループの子たちに全部任せたわ！　ああいうグラム単位で量を測ったりするものって、苦手なのよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「だからずっと、お皿を出したり片づけたりしてたわね。……あれ？　なんでお皿を出した後、すぐ片づけてたのかしら……？」
line = "「だからずっと、お皿を出したり片づけたりしてたわね。……あれ？　なんでお皿を出した後、すぐ片づけてたのかしら……？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ちなみにできたお菓子は全部アナにあげちゃったから、もうクロトの分はないわ！」
line = "「ちなみにできたお菓子は全部アナにあげちゃったから、もうクロトの分はないわ！」"

[[dialogue]]
speaker = "マトイ"
# 「私も、その……クッキーを作ったんだけど……。会長はそんなにもらってるんだったら、やっぱりもう、クッキーはお腹いっぱいだよね……？」
line = "「私も、その……クッキーを作ったんだけど……。会長はそんなにもらってるんだったら、やっぱりもう、クッキーはお腹いっぱいだよね……？」"

[[dialogue]]
speaker = "マトイ"
# 「あー、わ、私もアナにあげてこよっかな！　アナってお菓子をあげるとすっごく嬉しそうにしてくれるから、渡し甲斐があるんだよねっ」
line = "「あー、わ、私もアナにあげてこよっかな！　アナってお菓子をあげるとすっごく嬉しそうにしてくれるから、渡し甲斐があるんだよねっ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あれ？　でもそのクッキー、疲れてるクロトのために特別甘くしたって言ってなかったかしら？」
line = "「あれ？　でもそのクッキー、疲れてるクロトのために特別甘くしたって言ってなかったかしら？」"

[[dialogue]]
speaker = "マトイ"
# 「ちょっ！？　なに言ってるのヴィーナス！？」
line = "「ちょっ！？　なに言ってるのヴィーナス！？」"

[[dialogue]]
speaker = "マトイ"
# 「か、会長！　ヴィーナスが言ってるのはその、嘘ではないんだけど！　誇張が大いに含まれてるというか……！」
line = "「か、会長！　ヴィーナスが言ってるのはその、嘘ではないんだけど！　誇張が大いに含まれてるというか……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……なるほどね。マトイ、その慌てようで私、何か察しちゃったかもしれないわ」
line = "「……なるほどね。マトイ、その慌てようで私、何か察しちゃったかもしれないわ」"

[[dialogue]]
speaker = "マトイ"
# 「ヴィーナス、ちょっと待っ──」
line = "「ヴィーナス、ちょっと待っ──」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ズバリ！！！　もう全部、誰かにあげちゃったのね！！！」
line = "「ズバリ！！！　もう全部、誰かにあげちゃったのね！！！」"

[[dialogue]]
speaker = "マトイ"
# 「は？」
line = "「は？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「わかるわ。マトイの作ったお菓子ってすっごく美味しいもの。実習の後のお菓子交換のときも、まずみんなマトイのところへ行くわ」
line = "「わかるわ。マトイの作ったお菓子ってすっごく美味しいもの。実習の後のお菓子交換のときも、まずみんなマトイのところへ行くわ」"

[[dialogue]]
speaker = "マトイ"
# 「べ、別に普通レベルだよ。趣味でちょっとお菓子作りしてるくらいだし」
line = "「べ、別に普通レベルだよ。趣味でちょっとお菓子作りしてるくらいだし」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そんなことないわ。私はマトイが作ったお菓子が、今まで食べてきたお菓子の中で１番好きよ」
line = "「そんなことないわ。私はマトイが作ったお菓子が、今まで食べてきたお菓子の中で１番好きよ」"

[[dialogue]]
speaker = "マトイ"
# 「そ、そうなの……？　ん……ありがとう、ヴィーナス」
line = "「そ、そうなの……？　ん……ありがとう、ヴィーナス」"

[[dialogue]]
speaker = "unk"
# マトイの作ったクッキー、食べたかったな
line = "マトイの作ったクッキー、食べたかったな"

[[dialogue]]
speaker = "マトイ"
# 「へっ！？　そ、そうなんだ……」
line = "「へっ！？　そ、そうなんだ……」"

[[dialogue]]
speaker = "unk"
# ──仕事がなかなか片付かず、こんな時間になってしまった。
line = "──仕事がなかなか片付かず、こんな時間になってしまった。"

[[dialogue]]
speaker = "マトイ"
# 「あっ──ま、待って、会長っ！」
line = "「あっ──ま、待って、会長っ！」"

[[dialogue]]
speaker = "マトイ"
# 「お、お疲れさまっ……結構遅くまで仕事してたんだね」
line = "「お、お疲れさまっ……結構遅くまで仕事してたんだね」"

[[dialogue]]
speaker = "unk"
# マトイもこんな時間まで？
line = "マトイもこんな時間まで？"

[[dialogue]]
speaker = "マトイ"
# 「わ、私はその……会長のことを、待ってたっていうか……」
line = "「わ、私はその……会長のことを、待ってたっていうか……」"

[[dialogue]]
speaker = "マトイ"
# 「その……これ。ずっと渡そうと思ってたんだけど、なかなかタイミングが見つけられなくて……」
line = "「その……これ。ずっと渡そうと思ってたんだけど、なかなかタイミングが見つけられなくて……」"

[[dialogue]]
speaker = "マトイ"
# 「調理実習で作ったクッキー……よ、よかったら、食べてもらえたら、嬉しい、かも……」
line = "「調理実習で作ったクッキー……よ、よかったら、食べてもらえたら、嬉しい、かも……」"

[[dialogue]]
speaker = "unk"
# 残ってたんだ！　今、食べていい？
line = "残ってたんだ！　今、食べていい？"

[[dialogue]]
speaker = "マトイ"
# 「へっ、い、今食べるの！？　ちょっと待って、心の準備が……！」
line = "「へっ、い、今食べるの！？　ちょっと待って、心の準備が……！」"

[[dialogue]]
speaker = "マトイ"
# 「すーーー……はーーー…………ど、どうぞ」
line = "「すーーー……はーーー…………ど、どうぞ」"

[[dialogue]]
speaker = "マトイ"
# （普通の味だと思うけど、決してマズくはない……よね？）
line = "（普通の味だと思うけど、決してマズくはない……よね？）"

[[dialogue]]
speaker = "unk"
# 甘くて凄く美味しいよ……！
line = "甘くて凄く美味しいよ……！"

[[dialogue]]
speaker = "マトイ"
# 「ほ、ほんとう……！？　よ、よかったぁ……」
line = "「ほ、ほんとう……！？　よ、よかったぁ……」"

[[dialogue]]
speaker = "マトイ"
# 「え、えへへ……そ、そんなに喜んでくれるなんて思わなかった。頑張って作ってよかったぁ……っ」
line = "「え、えへへ……そ、そんなに喜んでくれるなんて思わなかった。頑張って作ってよかったぁ……っ」"

[[dialogue]]
speaker = "unk"
# 疲れてる俺の為に作ってくれたっていうのは、本当に？
line = "疲れてる俺の為に作ってくれたっていうのは、本当に？"

[[dialogue]]
speaker = "マトイ"
# 「あっ、そ、それは……う、うん。ほら、会長は今日みたいに、いつも夜遅くまで仕事頑張ってるから……。普通の私でも、何か労えたらなって……」
line = "「あっ、そ、それは……う、うん。ほら、会長は今日みたいに、いつも夜遅くまで仕事頑張ってるから……。普通の私でも、何か労えたらなって……」"

[[dialogue]]
speaker = "マトイ"
# 「──そんな、お礼なんていいよっ。私が勝手にやっただけだし……！」
line = "「──そんな、お礼なんていいよっ。私が勝手にやっただけだし……！」"

[[dialogue]]
speaker = "マトイ"
# 「……あの、会長？　その……もし嫌じゃなければ、なんだけど……。またお菓子作ったら、食べてもらってもいい、かな？」
line = "「……あの、会長？　その……もし嫌じゃなければ、なんだけど……。またお菓子作ったら、食べてもらってもいい、かな？」"

[[dialogue]]
speaker = "マトイ"
# 「ほ、ほら私！　お菓子作るのが趣味だって言ったでしょ。でも自分じゃ、美味しいかどうかって、客観的に見れないから……味見役になってくれたらな……って」
line = "「ほ、ほら私！　お菓子作るのが趣味だって言ったでしょ。でも自分じゃ、美味しいかどうかって、客観的に見れないから……味見役になってくれたらな……って」"

[[dialogue]]
speaker = "unk"
# もちろんいいよ！　楽しみにしてる
line = "もちろんいいよ！　楽しみにしてる"

[[dialogue]]
speaker = "マトイ"
# 「あ、ありがとう！　私、会長に美味しいって言ってもらえるように、頑張るからっ。また正直な感想をよろしくお願いしますっ」
line = "「あ、ありがとう！　私、会長に美味しいって言ってもらえるように、頑張るからっ。また正直な感想をよろしくお願いしますっ」"

[[dialogue]]
speaker = "マトイ"
# 「えへへ……♪」
line = "「えへへ……♪」"

[[dialogue]]
speaker = "unk"
# その日からよく、マトイがお菓子を持ってきて、２人でお茶会をするようになるのだった。
line = "その日からよく、マトイがお菓子を持ってきて、２人でお茶会をするようになるのだった。"
