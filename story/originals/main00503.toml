[[dialogue]]
speaker = "unk"
# 第４話,第二階層の主,B
line = "第４話,第二階層の主,B"

[[dialogue]]
speaker = "マグダレナ"
# 「御子、こちらへ！」
line = "「御子、こちらへ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「っ……マグダレナ！？」
line = "「っ……マグダレナ！？」"

[[dialogue]]
speaker = "フィオナ"
# 「緋宮会長！　敵襲です……！」
line = "「緋宮会長！　敵襲です……！」"

[[dialogue]]
speaker = "クロト"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "unk"
# フィオナの冷静な一喝で、すぐに戦闘態勢に入ることができた。
line = "フィオナの冷静な一喝で、すぐに戦闘態勢に入ることができた。"

[[dialogue]]
speaker = "unk"
# しかし、先ほどの攻撃はヴィーナスを庇ったマグダレナさんに直撃……
line = "しかし、先ほどの攻撃はヴィーナスを庇ったマグダレナさんに直撃……"

[[dialogue]]
speaker = "マグダレナ"
# 「ぐぅっ……ご心配なく。元よりこの身は、仮初のもの……。少しばかり、退場の時間が早まっただけです」
line = "「ぐぅっ……ご心配なく。元よりこの身は、仮初のもの……。少しばかり、退場の時間が早まっただけです」"

[[dialogue]]
speaker = "マグダレナ"
# 「しかし、この攻撃は──」
line = "「しかし、この攻撃は──」"

[[dialogue]]
speaker = "クロト"
# 「──させるか！」
line = "「──させるか！」"

[[dialogue]]
speaker = "unk"
# 次いで放たれた二の矢には俺も反応し、振るわれた黄金の刃を逸らす。
line = "次いで放たれた二の矢には俺も反応し、振るわれた黄金の刃を逸らす。"

[[dialogue]]
speaker = "マグダレナ"
# 「アルモタヘル……貴女もでしたか」
line = "「アルモタヘル……貴女もでしたか」"

[[dialogue]]
speaker = "アルモタヘル"
# 「………………」
line = "「………………」"

[[dialogue]]
speaker = "クロト"
# 「なんだ……あれ」
line = "「なんだ……あれ」"

[[dialogue]]
speaker = "フィオナ"
# 「『堕天使』です。アステラに囚われていたマグダレナ様も、あのような姿をされていました」
line = "「『堕天使』です。アステラに囚われていたマグダレナ様も、あのような姿をされていました」"

[[dialogue]]
speaker = "ヴィーナス"
# 「え、ええっ！？　じゃあ、あの見た目で守護天使ってこと……！？」
line = "「え、ええっ！？　じゃあ、あの見た目で守護天使ってこと……！？」"

[[dialogue]]
speaker = "アルモタヘル"
# 「人間。人間……魔族？　天使？　否──何ダ、その血」
line = "「人間。人間……魔族？　天使？　否──何ダ、その血」"

[[dialogue]]
speaker = "アルモタヘル"
# 「なんだ。何者ダ、オマエ。何が混じってイル！」
line = "「なんだ。何者ダ、オマエ。何が混じってイル！」"

[[dialogue]]
speaker = "マグダレナ"
# 「私のことも……覚えていないようですね。仕方ありません……くっ」
line = "「私のことも……覚えていないようですね。仕方ありません……くっ」"

[[dialogue]]
speaker = "マグダレナ"
# 「どうやら、私の体はここまでのようです……」
line = "「どうやら、私の体はここまでのようです……」"

[[dialogue]]
speaker = "マグダレナ"
# 「無様な退場の仕方で、申し訳ございません。どうか……同胞を頼みます」
line = "「無様な退場の仕方で、申し訳ございません。どうか……同胞を頼みます」"

[[dialogue]]
speaker = "フィオナ"
# 「はい。任されました」
line = "「はい。任されました」"

[[dialogue]]
speaker = "unk"
# フィオナが戦闘態勢を維持したままうなずくと、マグダレナさんの体はさらさらと砂のように宙へ消えていった。
line = "フィオナが戦闘態勢を維持したままうなずくと、マグダレナさんの体はさらさらと砂のように宙へ消えていった。"

[[dialogue]]
speaker = "unk"
# 落ち着け。大丈夫だ。
line = "落ち着け。大丈夫だ。"

[[dialogue]]
speaker = "unk"
# マグダレナさんの話を聞く限り、彼女は死んだわけではなく、本体の元へ還っただけだ。
line = "マグダレナさんの話を聞く限り、彼女は死んだわけではなく、本体の元へ還っただけだ。"

[[dialogue]]
speaker = "ヴィーナス"
# 「よくわかんないけど……守護天使っていうなら、マグダレナは仲間だったんじゃないの？」
line = "「よくわかんないけど……守護天使っていうなら、マグダレナは仲間だったんじゃないの？」"

[[dialogue]]
speaker = "アルモタヘル"
# 「仲間……？　知らヌ。邪魔者は消すノミ」
line = "「仲間……？　知らヌ。邪魔者は消すノミ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふーん……なんかあったま来ちゃった。ぶっ飛ばしちゃおうかしら」
line = "「ふーん……なんかあったま来ちゃった。ぶっ飛ばしちゃおうかしら」"

[[dialogue]]
speaker = "フィオナ"
# 「正気ではありませんが、戦闘力はガーディアンの比ではありません。冷静に行きましょう」
line = "「正気ではありませんが、戦闘力はガーディアンの比ではありません。冷静に行きましょう」"

[[dialogue]]
speaker = "クロト"
# 「……了解」
line = "「……了解」"

[[dialogue]]
speaker = "アルモタヘル"
# 「貴様、キサマ、貴様もダ！　ナンだ、その中身……モシヤ生物では、ナイのか？　ア、アァァ。グッ、ヅゥッ……」
line = "「貴様、キサマ、貴様もダ！　ナンだ、その中身……モシヤ生物では、ナイのか？　ア、アァァ。グッ、ヅゥッ……」"

[[dialogue]]
speaker = "クロト"
# 「俺、か……？」
line = "「俺、か……？」"

[[dialogue]]
speaker = "unk"
# 言われている言葉の意味はわからない──
line = "言われている言葉の意味はわからない──"

[[dialogue]]
speaker = "unk"
# が、そんなことは彼女をリクリエの瘴気から解放して、改めて聞けばいいことだ。
line = "が、そんなことは彼女をリクリエの瘴気から解放して、改めて聞けばいいことだ。"

[[dialogue]]
speaker = "クロト"
# 「行こう。彼女だってこんな風になるのは本意じゃないはずだ」
line = "「行こう。彼女だってこんな風になるのは本意じゃないはずだ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふぅぅ……。そう、よね。なるべく早く、解放してあげなくっちゃ」
line = "「ふぅぅ……。そう、よね。なるべく早く、解放してあげなくっちゃ」"

[[dialogue]]
speaker = "フィオナ"
# 「はい。このチームなら、堕天使とだって渡り合えるはずです……！」
line = "「はい。このチームなら、堕天使とだって渡り合えるはずです……！」"
