speaker = "unk"
# それで思いきり火が点いてしまって──その後、俺は何度も何度もアムに中出しをしてしまうのだった。
line = "それで思いきり火が点いてしまって──その後、俺は何度も何度もアムに中出しをしてしまうのだった。"
