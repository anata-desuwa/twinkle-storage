[[dialogue]]
speaker = "unk"
# 第３話,気持ちよくしてあげますね♪,P
line = "第３話,気持ちよくしてあげますね♪,P"

[[dialogue]]
speaker = "unk"
# 今日もまた、シャルレーヌの呼び出しに応じてしまった。いい加減、断らなければいけないと思うのだが──。
line = "今日もまた、シャルレーヌの呼び出しに応じてしまった。いい加減、断らなければいけないと思うのだが──。"

[[dialogue]]
speaker = "シャルレーヌ"
# 「ふふ～、会長さん。いらっしゃ～い♪」
line = "「ふふ～、会長さん。いらっしゃ～い♪」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「それじゃあ、さっそく始めましょうか。と～っても気持ちいい、ア・レ♪」
line = "「それじゃあ、さっそく始めましょうか。と～っても気持ちいい、ア・レ♪」"

[[dialogue]]
speaker = "unk"
# …………頼む
line = "…………頼む"

[[dialogue]]
speaker = "シャルレーヌ"
# 「くふっ──くふふふっ♪」
line = "「くふっ──くふふふっ♪」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「初めてシた時は『恥ずかしいから嫌だ』って抵抗してたのに。もう意見を変えちゃったんですかぁ？　意思、よわよわ～♪」
line = "「初めてシた時は『恥ずかしいから嫌だ』って抵抗してたのに。もう意見を変えちゃったんですかぁ？　意思、よわよわ～♪」"

[[dialogue]]
speaker = "unk"
# だって、シャルレーヌが上手だから……
line = "だって、シャルレーヌが上手だから……"

[[dialogue]]
speaker = "シャルレーヌ"
# 「う～わ♪　今の台詞めっちゃダサ～い♪　自分が弱いだけのくせにぃ、人のせいにするとかありえな～い♪」
line = "「う～わ♪　今の台詞めっちゃダサ～い♪　自分が弱いだけのくせにぃ、人のせいにするとかありえな～い♪」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「そんなかっこ悪い会長さんには罰を与えましょうか。何をして欲しいのか、そのお口でしっかりおねだりしてください？」
line = "「そんなかっこ悪い会長さんには罰を与えましょうか。何をして欲しいのか、そのお口でしっかりおねだりしてください？」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「……ほらぁ。恥ずかしがってないで、言え♪　シャルレーヌに何して欲しいの～？」
line = "「……ほらぁ。恥ずかしがってないで、言え♪　シャルレーヌに何して欲しいの～？」"

[[dialogue]]
speaker = "unk"
# どうか俺に……み、耳かきをしてください……！
line = "どうか俺に……み、耳かきをしてください……！"

[[dialogue]]
speaker = "シャルレーヌ"
# 「よく言えましたぁ♪　ふふん、だいぶ調教が進んできましたね～♪　ほ～ら、私のお膝にその中身空っぽな頭を乗せてください♪」
line = "「よく言えましたぁ♪　ふふん、だいぶ調教が進んできましたね～♪　ほ～ら、私のお膝にその中身空っぽな頭を乗せてください♪」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「ふん、ふん、ふ～ん♪　かき、かき、かきっ♪」
line = "「ふん、ふん、ふ～ん♪　かき、かき、かきっ♪」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「ほぉら、お耳の少し奥……ここが弱いの、わかってるんですよ？　かりかりかりかりかりっ♪」
line = "「ほぉら、お耳の少し奥……ここが弱いの、わかってるんですよ？　かりかりかりかりかりっ♪」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「──くすくす♪　もじもじしちゃって……釣りたてのお魚さんの真似ですかぁ？　お上手ですよ～♪」
line = "「──くすくす♪　もじもじしちゃって……釣りたてのお魚さんの真似ですかぁ？　お上手ですよ～♪」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「ん～、耳かきって本当に面白い……」
line = "「ん～、耳かきって本当に面白い……」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「最初は、話題作りの為にちょっとかじっておこうって思っただけなのになぁ。私もハマっちゃいそう♪」
line = "「最初は、話題作りの為にちょっとかじっておこうって思っただけなのになぁ。私もハマっちゃいそう♪」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「言ってませんでした？　うちの香水をバーチャルＲｙｕＴｕｂｅｒに宣伝してもらおうかと思ってるんですよ」
line = "「言ってませんでした？　うちの香水をバーチャルＲｙｕＴｕｂｅｒに宣伝してもらおうかと思ってるんですよ」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「ディアーブルの香水を人間界で売り出すときのために、アピールの手段は考えておかないといけませんから」
line = "「ディアーブルの香水を人間界で売り出すときのために、アピールの手段は考えておかないといけませんから」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「依頼しようと思ってる子、耳かき配信とかよくやってるんです。だから、話題作り」
line = "「依頼しようと思ってる子、耳かき配信とかよくやってるんです。だから、話題作り」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「相手に親近感を覚えてもらったら、ビジネスは有利ですからね～……かきかき、かき……♪」
line = "「相手に親近感を覚えてもらったら、ビジネスは有利ですからね～……かきかき、かき……♪」"

[[dialogue]]
speaker = "ルルカ"
# 「ぅう～……配信用のメモ、教室に忘れちゃった……！　誰にもバレてないよねっ──」
line = "「ぅう～……配信用のメモ、教室に忘れちゃった……！　誰にもバレてないよねっ──」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「かき、かき、かき……♪」
line = "「かき、かき、かき……♪」"

[[dialogue]]
speaker = "ルルカ"
# 「──なんかエッチなことしてる～～～～！？」
line = "「──なんかエッチなことしてる～～～～！？」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「えっ──？」
line = "「えっ──？」"

[[dialogue]]
speaker = "unk"
# 耳が！？　耳がぁああ！？
line = "耳が！？　耳がぁああ！？"

[[dialogue]]
speaker = "ルルカ"
# 「あ～、びっくりした。膝枕してただけだったんだ……なんかこう、抱き合ってるみたいに見えたから……。かき、かき、かき」
line = "「あ～、びっくりした。膝枕してただけだったんだ……なんかこう、抱き合ってるみたいに見えたから……。かき、かき、かき」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「ふふ。すみません。公共の場でするのは、ちょっぴりはしたなかったかもしれませんね。かき、かき、かき」
line = "「ふふ。すみません。公共の場でするのは、ちょっぴりはしたなかったかもしれませんね。かき、かき、かき」"

[[dialogue]]
speaker = "ルルカ"
# 「あ、お兄ちゃんはジッとして座ってなきゃダメ！　２人で耳かきしやすいように背筋も伸ばして！」
line = "「あ、お兄ちゃんはジッとして座ってなきゃダメ！　２人で耳かきしやすいように背筋も伸ばして！」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「そうですよ？　鼓膜にまた、ぶすっといっちゃったら嫌でしょう？」
line = "「そうですよ？　鼓膜にまた、ぶすっといっちゃったら嫌でしょう？」"

[[dialogue]]
speaker = "ルルカ"
# 「……でも驚いたよ。ビジネスって色んなことするんだね」
line = "「……でも驚いたよ。ビジネスって色んなことするんだね」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「何事も勉強ですから……ルルカ先輩も、ずいぶんと手馴れてますね」
line = "「何事も勉強ですから……ルルカ先輩も、ずいぶんと手馴れてますね」"

[[dialogue]]
speaker = "ルルカ"
# 「まぁね！　お兄ちゃんには、たまに耳かきやってあげてるから」
line = "「まぁね！　お兄ちゃんには、たまに耳かきやってあげてるから」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「──ふぅん？　そうだったんですか。へぇ」
line = "「──ふぅん？　そうだったんですか。へぇ」"

[[dialogue]]
speaker = "シャルレーヌ"
# （海野辺ルルカ。一見すると普通の子だけど、何かヒミツを隠している気がするのよね……勘でしかないのだけど）
line = "（海野辺ルルカ。一見すると普通の子だけど、何かヒミツを隠している気がするのよね……勘でしかないのだけど）"

[[dialogue]]
speaker = "シャルレーヌ"
# （というか、会長さんに耳かきをするほどの仲だなんて……気に食わないわね。ペットの横取りは許さないわよ）
line = "（というか、会長さんに耳かきをするほどの仲だなんて……気に食わないわね。ペットの横取りは許さないわよ）"

[[dialogue]]
speaker = "シャルレーヌ"
# （会長さんを支配するのは私だけで十分よ。全力で耳かきしちゃうんだから）
line = "（会長さんを支配するのは私だけで十分よ。全力で耳かきしちゃうんだから）"

[[dialogue]]
speaker = "ルルカ"
# （シャルレーヌちゃん……良い子だとは思うんだけど、な～んか裏表がある気がするんだよね。いや、全然根拠はないんだけど……）
line = "（シャルレーヌちゃん……良い子だとは思うんだけど、な～んか裏表がある気がするんだよね。いや、全然根拠はないんだけど……）"

[[dialogue]]
speaker = "ルルカ"
# （ていうかお兄ちゃんとこんなに仲良しだなんて初耳だよ！　負けてられない……！）
line = "（ていうかお兄ちゃんとこんなに仲良しだなんて初耳だよ！　負けてられない……！）"

[[dialogue]]
speaker = "ルルカ"
# （ここはシャルレーヌちゃんより上手な耳かきを披露しないとね。Ｖチューバー、汐ルカルカのテクを今こそ……！）
line = "（ここはシャルレーヌちゃんより上手な耳かきを披露しないとね。Ｖチューバー、汐ルカルカのテクを今こそ……！）"

[[dialogue]]
speaker = "ルルカ"
# 「あ、そうだ。そのコラボしようと思ってるＶチューバーって誰なの？　有名な人？」
line = "「あ、そうだ。そのコラボしようと思ってるＶチューバーって誰なの？　有名な人？」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「汐ルカルカって人ですね。なかなか面白い方で──」
line = "「汐ルカルカって人ですね。なかなか面白い方で──」"

[[dialogue]]
speaker = "ルルカ"
# 「ええぇっ！？　あ、手が滑って──」
line = "「ええぇっ！？　あ、手が滑って──」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「きゃっ！？　あ、つい耳の奥まで──」
line = "「きゃっ！？　あ、つい耳の奥まで──」"

[[dialogue]]
speaker = "unk"
# 両耳がぁあああ！？
line = "両耳がぁあああ！？"

[[dialogue]]
speaker = "unk"
# ハマりかけていた耳かきだったが、強烈な挟み撃ちを食らい、しばらくの間トラウマになるのだった……。
line = "ハマりかけていた耳かきだったが、強烈な挟み撃ちを食らい、しばらくの間トラウマになるのだった……。"
