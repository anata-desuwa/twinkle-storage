[[dialogue]]
speaker = "unk"
# 第３話,酒酔いトワイライト・中編,P
line = "第３話,酒酔いトワイライト・中編,P"

[[dialogue]]
speaker = "unk"
# 夜のトレーニング中、酔っ払って千鳥足のトワ先生と遭遇した俺は、先生を休ませる為に家まで連れて来たのだった。
line = "夜のトレーニング中、酔っ払って千鳥足のトワ先生と遭遇した俺は、先生を休ませる為に家まで連れて来たのだった。"

[[dialogue]]
speaker = "トワ先生"
# 「お水ありがと～。先生は特異体質なんれぇ、このまま少し休んでれば、酔いもすぐに回復するから～」
line = "「お水ありがと～。先生は特異体質なんれぇ、このまま少し休んでれば、酔いもすぐに回復するから～」"

[[dialogue]]
speaker = "unk"
# さっきも特異体質だって言ってましたね
line = "さっきも特異体質だって言ってましたね"

[[dialogue]]
speaker = "トワ先生"
# 「うん、そうなの～。えっと、簡単に説明するとぉ……」
line = "「うん、そうなの～。えっと、簡単に説明するとぉ……」"

[[dialogue]]
speaker = "トワ先生"
# 「先生の星力にまつわる話なんらけどぉ……先生は回復が得意なのね？」
line = "「先生の星力にまつわる話なんらけどぉ……先生は回復が得意なのね？」"

[[dialogue]]
speaker = "トワ先生"
# 「ただぁその中でも、先生は更に特殊でぇ……瞬間的な回復は普通くらいなんだけど……継続的な回復能力が突出しているのぉ」
line = "「ただぁその中でも、先生は更に特殊でぇ……瞬間的な回復は普通くらいなんだけど……継続的な回復能力が突出しているのぉ」"

[[dialogue]]
speaker = "トワ先生"
# 「……で、その影響なのか、先生の体はぁ──」
line = "「……で、その影響なのか、先生の体はぁ──」"

[[dialogue]]
speaker = "トワ先生"
# 「勝手にいつも回復し続けててぇ、成長がすご～く遅いんら」
line = "「勝手にいつも回復し続けててぇ、成長がすご～く遅いんら」"

[[dialogue]]
speaker = "unk"
# 若作りじゃなくて体質だったの！？
line = "若作りじゃなくて体質だったの！？"

[[dialogue]]
speaker = "unk"
# 先生のロリ体型って……
line = "先生のロリ体型って……"

[[dialogue]]
speaker = "トワ先生"
# 「ちょっと言い方ぁ！」
line = "「ちょっと言い方ぁ！」"

[[dialogue]]
speaker = "トワ先生"
# 「もう、会長くんたらぁ。先生、ロリ体型の自覚はかなりあるけどぉ……体の成長が遅くて、本当に若いんらから！」
line = "「もう、会長くんたらぁ。先生、ロリ体型の自覚はかなりあるけどぉ……体の成長が遅くて、本当に若いんらから！」"

[[dialogue]]
speaker = "トワ先生"
# 「ともかくぅ……アルコールの酔い程度なら、放っておけば勝手に回復して、治っちゃうってわけぇ……」
line = "「ともかくぅ……アルコールの酔い程度なら、放っておけば勝手に回復して、治っちゃうってわけぇ……」"

[[dialogue]]
speaker = "unk"
# でも、先生がここまで深酔いするのは……
line = "でも、先生がここまで深酔いするのは……"

[[dialogue]]
speaker = "トワ先生"
# 「ヤケ酒してるみたいだ、って？　……そっか。そんな風に見えたんだ」
line = "「ヤケ酒してるみたいだ、って？　……そっか。そんな風に見えたんだ」"

[[dialogue]]
speaker = "トワ先生"
# 「……え～とね。その……ここまで酔った、原因なんだけど──」
line = "「……え～とね。その……ここまで酔った、原因なんだけど──」"

[[dialogue]]
speaker = "トワ先生"
# 「実は、元星徒会メンバーで、仲が良かった友達がね……結婚、したの」
line = "「実は、元星徒会メンバーで、仲が良かった友達がね……結婚、したの」"

[[dialogue]]
speaker = "トワ先生"
# 「ほら、ここに来る前に……結婚式の３次会から帰ってきたって、話したでしょ？」
line = "「ほら、ここに来る前に……結婚式の３次会から帰ってきたって、話したでしょ？」"

[[dialogue]]
speaker = "トワ先生"
# 「それで……な～んか、寂しくなっちゃって。……あ、友達のことはちゃんと祝福してるよ？」
line = "「それで……な～んか、寂しくなっちゃって。……あ、友達のことはちゃんと祝福してるよ？」"

[[dialogue]]
speaker = "トワ先生"
# 「ただ、改めて……先生はそういう、青春とは無縁の人生だったなぁって……思っちゃったらけ」
line = "「ただ、改めて……先生はそういう、青春とは無縁の人生だったなぁって……思っちゃったらけ」"

[[dialogue]]
speaker = "トワ先生"
# 「回復体質で、成長が凄く遅いって話したじゃない？　先生、そのおかげで……今も星力総量が全く衰えてないの。学生時代のままなんだ」
line = "「回復体質で、成長が凄く遅いって話したじゃない？　先生、そのおかげで……今も星力総量が全く衰えてないの。学生時代のままなんだ」"

[[dialogue]]
speaker = "トワ先生"
# 「流星の星徒会だった学生時代は、結局、リクリエの実害は大したことなかったんら……」
line = "「流星の星徒会だった学生時代は、結局、リクリエの実害は大したことなかったんら……」"

[[dialogue]]
speaker = "トワ先生"
# 「でも、世界の終わりが来るかもしれないって、ずっと言われ続けてた……」
line = "「でも、世界の終わりが来るかもしれないって、ずっと言われ続けてた……」"

[[dialogue]]
speaker = "トワ先生"
# 「だから学園を卒業した時、わたしはこの体質らったから……星力が衰えて現役を退く友達の分も、頑張らなくちゃって思ったんらよね……」
line = "「だから学園を卒業した時、わたしはこの体質らったから……星力が衰えて現役を退く友達の分も、頑張らなくちゃって思ったんらよね……」"

[[dialogue]]
speaker = "トワ先生"
# 「それで、恩師の影響もあったし、いつか来るリクリエ本番に備えて、先生になろうって思ったの……」
line = "「それで、恩師の影響もあったし、いつか来るリクリエ本番に備えて、先生になろうって思ったの……」"

[[dialogue]]
speaker = "トワ先生"
# 「生徒のみんなと一緒に世界を守る為に……わたしは先生になったんら」
line = "「生徒のみんなと一緒に世界を守る為に……わたしは先生になったんら」"

[[dialogue]]
speaker = "トワ先生"
# 「そのことに後悔は無いし、今の仕事に誇りを持ってるし……生徒のみんなも大好きらよ？」
line = "「そのことに後悔は無いし、今の仕事に誇りを持ってるし……生徒のみんなも大好きらよ？」"

[[dialogue]]
speaker = "トワ先生"
# 「でも……時々、寂しくなる時があるんだぁ……」
line = "「でも……時々、寂しくなる時があるんだぁ……」"

[[dialogue]]
speaker = "トワ先生"
# 「同級生の友達に彼氏が出来たり……結婚したり……」
line = "「同級生の友達に彼氏が出来たり……結婚したり……」"

[[dialogue]]
speaker = "トワ先生"
# 「わたしはこんな体質だし、リクリエに立ち向かうことに全部捧げて来たから……男の人と恋愛する暇なんてなかった……ぐすっ」
line = "「わたしはこんな体質だし、リクリエに立ち向かうことに全部捧げて来たから……男の人と恋愛する暇なんてなかった……ぐすっ」"

[[dialogue]]
speaker = "unk"
# 先生、まさか泣いて……！？
line = "先生、まさか泣いて……！？"

[[dialogue]]
speaker = "トワ先生"
# 「……大丈夫、酔ってるだけだから。ぐすっ……そのせいで、ちょっと不安な気持ちに、なっちゃった、だけ……」
line = "「……大丈夫、酔ってるだけだから。ぐすっ……そのせいで、ちょっと不安な気持ちに、なっちゃった、だけ……」"

[[dialogue]]
speaker = "トワ先生"
# 「というか、ごめんね……。先生、変なことまで話しちゃった……」
line = "「というか、ごめんね……。先生、変なことまで話しちゃった……」"

[[dialogue]]
speaker = "トワ先生"
# 「こんなこと、今リクリエと戦っているキミに、言うべきじゃなかったよね……」
line = "「こんなこと、今リクリエと戦っているキミに、言うべきじゃなかったよね……」"

[[dialogue]]
speaker = "unk"
# ……先生
line = "……先生"

[[dialogue]]
speaker = "トワ先生"
# 「……うん。なにかな？」
line = "「……うん。なにかな？」"

[[dialogue]]
speaker = "unk"
# ……そうしたら、先生は安心してくれますか？
line = "……そうしたら、先生は安心してくれますか？"

[[dialogue]]
speaker = "unk"
# リクリエは俺が止めます。
line = "リクリエは俺が止めます。"

[[dialogue]]
speaker = "トワ先生"
# 「会長……くん……？」
line = "「会長……くん……？」"

[[dialogue]]
speaker = "トワ先生"
# 「あれ？　なんでわたし……また涙が……」
line = "「あれ？　なんでわたし……また涙が……」"

[[dialogue]]
speaker = "トワ先生"
# 「ごめんっ……えっとえっと……！　なんだろう、嬉しくなったのに、何か急にまた涙が出て来ちゃって……」
line = "「ごめんっ……えっとえっと……！　なんだろう、嬉しくなったのに、何か急にまた涙が出て来ちゃって……」"

[[dialogue]]
speaker = "トワ先生"
# 「……あの……あのね……ごめん。会長くん……」
line = "「……あの……あのね……ごめん。会長くん……」"

[[dialogue]]
speaker = "トワ先生"
# 「また１つだけ、お願い聞いてもらっても、いい、かな……？」
line = "「また１つだけ、お願い聞いてもらっても、いい、かな……？」"

[[dialogue]]
speaker = "トワ先生"
# 「もう少しだけ……キミの胸を、貸してくれる？」
line = "「もう少しだけ……キミの胸を、貸してくれる？」"

[[dialogue]]
speaker = "トワ先生"
# 「ありがとう……涙が止まるまでの間だけで、いいから……」
line = "「ありがとう……涙が止まるまでの間だけで、いいから……」"

[[dialogue]]
speaker = "トワ先生"
# 「温かくて、凄く安心する……」
line = "「温かくて、凄く安心する……」"

[[dialogue]]
speaker = "トワ先生"
# 「こんなに安心したのは、初めてかも……」
line = "「こんなに安心したのは、初めてかも……」"

[[dialogue]]
speaker = "トワ先生"
# 「すぅ……すぅ……。ん……会長……くん……」
line = "「すぅ……すぅ……。ん……会長……くん……」"

[[dialogue]]
speaker = "unk"
# やがて泣き疲れたのか、小さな寝息を立てて、トワ先生は眠りについてしまうのだった。
line = "やがて泣き疲れたのか、小さな寝息を立てて、トワ先生は眠りについてしまうのだった。"
