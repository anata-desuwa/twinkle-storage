[[dialogue]]
speaker = "unk"
# 第３話,２人の距離感,P
line = "第３話,２人の距離感,P"

[[dialogue]]
speaker = "unk"
# とある休日。
line = "とある休日。"

[[dialogue]]
speaker = "フェリシー"
# 「お邪魔しま～す。ここが会長くんの家か～」
line = "「お邪魔しま～す。ここが会長くんの家か～」"

[[dialogue]]
speaker = "フェリシー"
# 「会長くんと２人で遊ぶのは初めてだから、今日はすごく楽しみにしてたんだ～。えへへ♪」
line = "「会長くんと２人で遊ぶのは初めてだから、今日はすごく楽しみにしてたんだ～。えへへ♪」"

[[dialogue]]
speaker = "unk"
# フェリシーがどうして、俺の家に遊びに来ているのかというと――
line = "フェリシーがどうして、俺の家に遊びに来ているのかというと――"

[[dialogue]]
speaker = "unk"
# きっかけは、一緒にトレーニングしていた時の雑談だった。
line = "きっかけは、一緒にトレーニングしていた時の雑談だった。"

[[dialogue]]
speaker = "フェリシー"
# 「へぇ～、会長くんもホラー映画を観たりするんだね！」
line = "「へぇ～、会長くんもホラー映画を観たりするんだね！」"

[[dialogue]]
speaker = "フェリシー"
# 「私、オカルト好きだから、ホラー映画も結構観るんだよね」
line = "「私、オカルト好きだから、ホラー映画も結構観るんだよね」"

[[dialogue]]
speaker = "フェリシー"
# 「怖いんだけど、好奇心がくすぐられるっていうのかな？　あくまで作り物ではあるんだけど、だからこそ純粋にワクワクできるっていうかね」
line = "「怖いんだけど、好奇心がくすぐられるっていうのかな？　あくまで作り物ではあるんだけど、だからこそ純粋にワクワクできるっていうかね」"

[[dialogue]]
speaker = "フェリシー"
# 「実際のオカルト絡みの異変を目の前にすると、好奇心で首を突っ込みすぎると、命に関わることもあるからさ」
line = "「実際のオカルト絡みの異変を目の前にすると、好奇心で首を突っ込みすぎると、命に関わることもあるからさ」"

[[dialogue]]
speaker = "フェリシー"
# 「ほら、日本のことわざで『触らぬ神に祟りなし』ってあるじゃない？　ホラー映画だと、そこで実際に触ったらどうなるかというのを疑似体験できるのが、面白いんだよね～」
line = "「ほら、日本のことわざで『触らぬ神に祟りなし』ってあるじゃない？　ホラー映画だと、そこで実際に触ったらどうなるかというのを疑似体験できるのが、面白いんだよね～」"

[[dialogue]]
speaker = "フェリシー"
# 「そうだ！　今度、一緒に鑑賞会とかしちゃう？」
line = "「そうだ！　今度、一緒に鑑賞会とかしちゃう？」"

[[dialogue]]
speaker = "フェリシー"
# 「流星寮の私の部屋でもいいんだけど……会長くんはどこに住んでるの？」
line = "「流星寮の私の部屋でもいいんだけど……会長くんはどこに住んでるの？」"

[[dialogue]]
speaker = "フェリシー"
# 「なるほど、お母さんとマンション住まいなんだ。じゃあ、遊びに行ってもいい？」
line = "「なるほど、お母さんとマンション住まいなんだ。じゃあ、遊びに行ってもいい？」"

[[dialogue]]
speaker = "フェリシー"
# 「やった♪　じゃあ、今週末とかどうかな？」
line = "「やった♪　じゃあ、今週末とかどうかな？」"

[[dialogue]]
speaker = "フェリシー"
# 「――会長くんのお母さんは今日は出かけてるんだっけ？　そっか、会ってみたかったな～、残念。それはまた、次の機会だね」
line = "「――会長くんのお母さんは今日は出かけてるんだっけ？　そっか、会ってみたかったな～、残念。それはまた、次の機会だね」"

[[dialogue]]
speaker = "フェリシー"
# 「というわけで、じゃ～ん！　オススメのホラー映画を持ってきたよ！」
line = "「というわけで、じゃ～ん！　オススメのホラー映画を持ってきたよ！」"

[[dialogue]]
speaker = "フェリシー"
# 「これ、本物のエクソシストがシナリオ担当なんじゃないかってくらい、リアリティのあるやつで面白いんだ～」
line = "「これ、本物のエクソシストがシナリオ担当なんじゃないかってくらい、リアリティのあるやつで面白いんだ～」"

[[dialogue]]
speaker = "unk"
# そうして、ホラー映画の鑑賞会がスタートしたのだが――
line = "そうして、ホラー映画の鑑賞会がスタートしたのだが――"

[[dialogue]]
speaker = "フェリシー"
# 「わあぁっ！　このシーンとか、何度観てもビックリしちゃう……！」
line = "「わあぁっ！　このシーンとか、何度観てもビックリしちゃう……！」"

[[dialogue]]
speaker = "フェリシー"
# 「あっ、ごめん！　私、驚くとつい、近くの人に抱き着いちゃう癖があって……」
line = "「あっ、ごめん！　私、驚くとつい、近くの人に抱き着いちゃう癖があって……」"

[[dialogue]]
speaker = "unk"
# （相変わらず距離感が近い……）
line = "（相変わらず距離感が近い……）"

[[dialogue]]
speaker = "unk"
# ホラー映画とは無関係に、内心ドキドキしてしまう。
line = "ホラー映画とは無関係に、内心ドキドキしてしまう。"

[[dialogue]]
speaker = "フェリシー"
# 「うわっ、出たぁ！」
line = "「うわっ、出たぁ！」"

[[dialogue]]
speaker = "フェリシー"
# 「や、やっぱり反射的に体が動いて、誰かに触れたくなっちゃう……」
line = "「や、やっぱり反射的に体が動いて、誰かに触れたくなっちゃう……」"

[[dialogue]]
speaker = "フェリシー"
# 「ごめん、会長くん……このまま腕とか貸してもらってもいい？」
line = "「ごめん、会長くん……このまま腕とか貸してもらってもいい？」"

[[dialogue]]
speaker = "フェリシー"
# 「――えへへ、グラッチェ♪」
line = "「――えへへ、グラッチェ♪」"

[[dialogue]]
speaker = "フェリシー"
# 「ふぅ～……久しぶりに見たけど、ドキドキしたぁ……」
line = "「ふぅ～……久しぶりに見たけど、ドキドキしたぁ……」"

[[dialogue]]
speaker = "フェリシー"
# 「会長くんはどうだった？　面白かった？」
line = "「会長くんはどうだった？　面白かった？」"

[[dialogue]]
speaker = "フェリシー"
# 「――うんうん！　実は主人公が悪霊に取り憑かれてて、自覚がないっていうのは、怖くてよくできてたよね～」
line = "「――うんうん！　実は主人公が悪霊に取り憑かれてて、自覚がないっていうのは、怖くてよくできてたよね～」"

[[dialogue]]
speaker = "フェリシー"
# 「――休憩に飲み物を用意してくれるの？　グラッチェ♪　って、あっ……！」
line = "「――休憩に飲み物を用意してくれるの？　グラッチェ♪　って、あっ……！」"

[[dialogue]]
speaker = "フェリシー"
# 「ごめん！　もう観終わったのに、会長くんの手をずっと握ったままになっちゃってたね。安心感があったから、つい……」
line = "「ごめん！　もう観終わったのに、会長くんの手をずっと握ったままになっちゃってたね。安心感があったから、つい……」"

[[dialogue]]
speaker = "フェリシー"
# 「というか私、会長くんが許してくれるからって、距離感近すぎて結構やらかしちゃってるよね。この前もジュエリーに指摘されたし」
line = "「というか私、会長くんが許してくれるからって、距離感近すぎて結構やらかしちゃってるよね。この前もジュエリーに指摘されたし」"

[[dialogue]]
speaker = "フェリシー"
# 「私……昔から心配性で、人に触れてると安心できるみたいなところがあって」
line = "「私……昔から心配性で、人に触れてると安心できるみたいなところがあって」"

[[dialogue]]
speaker = "フェリシー"
# 「悪気はないんだ……でも、私のせいで会長くんに変な気を遣わせちゃってたら、ごめんね？」
line = "「悪気はないんだ……でも、私のせいで会長くんに変な気を遣わせちゃってたら、ごめんね？」"

[[dialogue]]
speaker = "unk"
# 正直ドキドキすることもあるけど、大丈夫だ
line = "正直ドキドキすることもあるけど、大丈夫だ"

[[dialogue]]
speaker = "フェリシー"
# 「ど、ドキドキしちゃうんだ……。そうだよね、会長くんだって男の子だもんね……」
line = "「ど、ドキドキしちゃうんだ……。そうだよね、会長くんだって男の子だもんね……」"

[[dialogue]]
speaker = "フェリシー"
# 「というか、今更気づいたけど、私……男の子の家に遊びに来るのって、初めてかも……」
line = "「というか、今更気づいたけど、私……男の子の家に遊びに来るのって、初めてかも……」"

[[dialogue]]
speaker = "フェリシー"
# 「な、なんかそう思ったら、ちょっと緊張してきちゃった……」
line = "「な、なんかそう思ったら、ちょっと緊張してきちゃった……」"

[[dialogue]]
speaker = "unk"
# 今まで、男友達はいなかったの？
line = "今まで、男友達はいなかったの？"

[[dialogue]]
speaker = "フェリシー"
# 「いなかったわけじゃないけど……でも、こうやって２人で遊ぶのは初めてだから――」
line = "「いなかったわけじゃないけど……でも、こうやって２人で遊ぶのは初めてだから――」"

[[dialogue]]
speaker = "フェリシー"
# 「私にとって、会長くんが今までで１番親しい男友達、ってことになるのかな？」
line = "「私にとって、会長くんが今までで１番親しい男友達、ってことになるのかな？」"

[[dialogue]]
speaker = "フェリシー"
# 「なんてね……えへへ」
line = "「なんてね……えへへ」"

[[dialogue]]
speaker = "unk"
# 今度、一緒にどこか遊びに行こうか
line = "今度、一緒にどこか遊びに行こうか"

[[dialogue]]
speaker = "フェリシー"
# 「え？　それって……私たち２人で？」
line = "「え？　それって……私たち２人で？」"

[[dialogue]]
speaker = "フェリシー"
# 「――う、うん！　会長くんがいいなら、もちろん私はＯＫだよ！」
line = "「――う、うん！　会長くんがいいなら、もちろん私はＯＫだよ！」"

[[dialogue]]
speaker = "フェリシー"
# 「どうせなら……今から具体的な予定も考えちゃおっか？」
line = "「どうせなら……今から具体的な予定も考えちゃおっか？」"

[[dialogue]]
speaker = "フェリシー"
# 「えへへ……♪」
line = "「えへへ……♪」"

[[dialogue]]
speaker = "unk"
# 俺が頷くと、フェリシーは照れたように微笑むのだった――
line = "俺が頷くと、フェリシーは照れたように微笑むのだった――"
