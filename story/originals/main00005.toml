[[dialogue]]
speaker = "unk"
# 星騎士を目指し、新星学園の門を叩いた俺は……
line = "星騎士を目指し、新星学園の門を叩いた俺は……"

[[dialogue]]
speaker = "unk"
# 幾多の試練を乗り越え、仲間と共に世界を救う戦いに身をおいていた。
line = "幾多の試練を乗り越え、仲間と共に世界を救う戦いに身をおいていた。"

[[dialogue]]
speaker = "unk"
# 星徒会の会長としてリクリエ問題の解決に奮闘する日々。
line = "星徒会の会長としてリクリエ問題の解決に奮闘する日々。"

[[dialogue]]
speaker = "unk"
# でもそれはまた、俺の魔王としての運命を紡ぐ物語の始まりでもあった──
line = "でもそれはまた、俺の魔王としての運命を紡ぐ物語の始まりでもあった──"
