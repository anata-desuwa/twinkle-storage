[[dialogue]]
speaker = "unk"
# ようやく仲間とのユニゾンアタックが完成し、今日の目標も無事に達成することが出来た。
line = "ようやく仲間とのユニゾンアタックが完成し、今日の目標も無事に達成することが出来た。"

[[dialogue]]
speaker = "フィオナ"
# 「おめでとうございます。ふふっ」
line = "「おめでとうございます。ふふっ」"

[[dialogue]]
speaker = "クロト"
# 「ありがとう。でもこんなんじゃ、まだまだ修行が足りない……」
line = "「ありがとう。でもこんなんじゃ、まだまだ修行が足りない……」"

[[dialogue]]
speaker = "クロト"
