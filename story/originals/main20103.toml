[[dialogue]]
speaker = "unk"
# 第４話,新たな敵,B
line = "第４話,新たな敵,B"

[[dialogue]]
speaker = "クロト"
# 「アビスインパクト！」
line = "「アビスインパクト！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふふん。こんなの今さら敵じゃないわ！」
line = "「ふふん。こんなの今さら敵じゃないわ！」"

[[dialogue]]
speaker = "マトイ"
# 「ヴィーナス、油断大敵！　……って言いたいところだけど、確かに拍子抜けしちゃうなぁ」
line = "「ヴィーナス、油断大敵！　……って言いたいところだけど、確かに拍子抜けしちゃうなぁ」"

[[dialogue]]
speaker = "unk"
# 俺たちの成長を加味しても、実際モンスターが弱くなっていた。
line = "俺たちの成長を加味しても、実際モンスターが弱くなっていた。"

[[dialogue]]
speaker = "unk"
# 俺が星徒会長になったばかりの頃と比べても、大型モンスターも少ないし、かなり余裕を持って撃破できる。
line = "俺が星徒会長になったばかりの頃と比べても、大型モンスターも少ないし、かなり余裕を持って撃破できる。"

[[dialogue]]
speaker = "アナ"
# 「こちらも撃破しました」
line = "「こちらも撃破しました」"

[[dialogue]]
speaker = "サーシャ"
# 「みんな無事ね～」
line = "「みんな無事ね～」"

[[dialogue]]
speaker = "ヴィーナス"
# 「もちろん。ピンピンしてるわ」
line = "「もちろん。ピンピンしてるわ」"

[[dialogue]]
speaker = "マトイ"
# 「モンスターの強さがずっとこのくらいだったら、まだ平和って言えるかも……？」
line = "「モンスターの強さがずっとこのくらいだったら、まだ平和って言えるかも……？」"

[[dialogue]]
speaker = "クロト"
# 「それはモンスターに慣れ過ぎじゃないか？」
line = "「それはモンスターに慣れ過ぎじゃないか？」"

[[dialogue]]
speaker = "マトイ"
# 「う……そうかも……」
line = "「う……そうかも……」"

[[dialogue]]
speaker = "アナ"
# 「会長、体調に変化はありませんか？」
line = "「会長、体調に変化はありませんか？」"

[[dialogue]]
speaker = "クロト"
# 「ああ、全然。健康体そのものだ」
line = "「ああ、全然。健康体そのものだ」"

[[dialogue]]
speaker = "アナ"
# 「なら良かったです」
line = "「なら良かったです」"

[[dialogue]]
speaker = "unk"
# モンスターやアステラに近づくことで、俺の中のリクリエが目覚めるかもしれないと思っていたけど、今のところ害はない。
line = "モンスターやアステラに近づくことで、俺の中のリクリエが目覚めるかもしれないと思っていたけど、今のところ害はない。"

[[dialogue]]
speaker = "クロト"
# （だけど──本当にそうだろうか？）
line = "（だけど──本当にそうだろうか？）"

[[dialogue]]
speaker = "unk"
# モンスターが現れ続ける原因があるとすれば……俺の中に存在しているリクリエの力じゃないか？
line = "モンスターが現れ続ける原因があるとすれば……俺の中に存在しているリクリエの力じゃないか？"

[[dialogue]]
speaker = "unk"
# 何せ世界を滅ぼすに足る力だ。俺の中に封印されているとしても、周囲に影響を及ぼしている可能性は否定できない。
line = "何せ世界を滅ぼすに足る力だ。俺の中に封印されているとしても、周囲に影響を及ぼしている可能性は否定できない。"

[[dialogue]]
speaker = "unk"
# 俺の中のリクリエを滅さなければ、戦いはずっと続くかもしれない。
line = "俺の中のリクリエを滅さなければ、戦いはずっと続くかもしれない。"

[[dialogue]]
speaker = "unk"
# そんな考えがふと頭をよぎって──
line = "そんな考えがふと頭をよぎって──"

[[dialogue]]
speaker = "ヴィーナス"
# 「クーロート！」
line = "「クーロート！」"

[[dialogue]]
speaker = "クロト"
# 「わっ！？」
line = "「わっ！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「難しい顔してどうしたの？　どっか怪我でもしたの？」
line = "「難しい顔してどうしたの？　どっか怪我でもしたの？」"

[[dialogue]]
speaker = "クロト"
# 「ああいや、大丈夫。ピンピンしてるよ」
line = "「ああいや、大丈夫。ピンピンしてるよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「もう、クロトこそ油断してないでしょうね？　星徒会長なんだからシャキッと──」
line = "「もう、クロトこそ油断してないでしょうね？　星徒会長なんだからシャキッと──」"

[[dialogue]]
speaker = "マトイ"
# 「！　通信……また近くでモンスターが出現！？」
line = "「！　通信……また近くでモンスターが出現！？」"

[[dialogue]]
speaker = "マトイ"
# 「最近だと連続は珍しい……えっ、対応に当たったプリマステラが負傷！？　そんなに強いモンスターなの！？」
line = "「最近だと連続は珍しい……えっ、対応に当たったプリマステラが負傷！？　そんなに強いモンスターなの！？」"

[[dialogue]]
speaker = "unk"
# 連絡の内容に緊張が走る。
line = "連絡の内容に緊張が走る。"

[[dialogue]]
speaker = "unk"
# 近頃のモンスターに強力なものはいなかった。それに俺たちだけじゃなくて、両校のプリマステラも実戦を重ねて成長している。
line = "近頃のモンスターに強力なものはいなかった。それに俺たちだけじゃなくて、両校のプリマステラも実戦を重ねて成長している。"

[[dialogue]]
speaker = "unk"
# にも拘わらず傷を負わせたとなれば、相当強力なモンスターに違いない。
line = "にも拘わらず傷を負わせたとなれば、相当強力なモンスターに違いない。"

[[dialogue]]
speaker = "アナ"
# 「モンスターの反応、高速で接近──来ます！」
line = "「モンスターの反応、高速で接近──来ます！」"

[[dialogue]]
speaker = "ドラケルス"
# 「グルルルッ！！！」
line = "「グルルルッ！！！」"

[[dialogue]]
speaker = "マトイ"
# 「！？　何あれ……本当にモンスターなの？」
line = "「！？　何あれ……本当にモンスターなの？」"

[[dialogue]]
speaker = "unk"
# 俺たちの前に姿を現したのは、有機と無機が入り混じったような異形の怪物だった。
line = "俺たちの前に姿を現したのは、有機と無機が入り混じったような異形の怪物だった。"

[[dialogue]]
speaker = "サーシャ"
# 「今まで見たモンスターはたいてい動物みたいな姿だったけど、あれは違う感じよね～」
line = "「今まで見たモンスターはたいてい動物みたいな姿だったけど、あれは違う感じよね～」"

[[dialogue]]
speaker = "アナ"
# 「攻撃開始──じゅわっ」
line = "「攻撃開始──じゅわっ」"

[[dialogue]]
speaker = "unk"
# アナが弓を構え、<ruby=あやま>過</ruby>たずモンスターの頭部を狙い撃つ。
line = "アナが弓を構え、<ruby>過<rt>あやま</rt></ruby>たずモンスターの頭部を狙い撃つ。"

[[dialogue]]
speaker = "unk"
# 炎の矢が突き刺さり、爆炎が逆巻く。だが──
line = "炎の矢が突き刺さり、爆炎が逆巻く。だが──"

[[dialogue]]
speaker = "ドラケルス"
# 「ガアァッ！！」
line = "「ガアァッ！！」"

[[dialogue]]
speaker = "アナ"
# 「ダメージ軽微。効いていませんね」
line = "「ダメージ軽微。効いていませんね」"

[[dialogue]]
speaker = "マトイ"
# 「ウソ！？　アナの攻撃でも通らないの！？」
line = "「ウソ！？　アナの攻撃でも通らないの！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私がやるわ！　ディバインスフィア！」
line = "「私がやるわ！　ディバインスフィア！」"

[[dialogue]]
speaker = "ドラケルス"
# 「グルル……！」
line = "「グルル……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「なっ──！？　こいつ、めちゃくちゃ硬いわね！」
line = "「なっ──！？　こいつ、めちゃくちゃ硬いわね！」"

[[dialogue]]
speaker = "unk"
# ヴィーナスのロッドから放たれた光条がモンスターを呑み込むが、鋼の体にわずかに傷を刻んだのみで、これも有効打には至らなかった。
line = "ヴィーナスのロッドから放たれた光条がモンスターを呑み込むが、鋼の体にわずかに傷を刻んだのみで、これも有効打には至らなかった。"

[[dialogue]]
speaker = "unk"
# 新種のモンスターは、獲物を探すように周囲を見回すと──
line = "新種のモンスターは、獲物を探すように周囲を見回すと──"

[[dialogue]]
speaker = "ドラケルス"
# 「グルァアア……ッ！！」
line = "「グルァアア……ッ！！」"

[[dialogue]]
speaker = "unk"
# モンスターが唸り声とともに紫色の瘴気を吐き出す。
line = "モンスターが唸り声とともに紫色の瘴気を吐き出す。"

[[dialogue]]
speaker = "unk"
# すると瘴気に包まれた物体が、ジグザグのノイズによって組み換えられ、新たな脅威が現出する。
line = "すると瘴気に包まれた物体が、ジグザグのノイズによって組み換えられ、新たな脅威が現出する。"

[[dialogue]]
speaker = "エレマル"
# 「ガァアァッ！！」
line = "「ガァアァッ！！」"

[[dialogue]]
speaker = "マトイ"
# 「モンスターが増えた……！」
line = "「モンスターが増えた……！」"

[[dialogue]]
speaker = "サーシャ"
# 「このままだと辺りがモンスターだらけになっちゃうわね～」
line = "「このままだと辺りがモンスターだらけになっちゃうわね～」"

[[dialogue]]
speaker = "マトイ"
# 「のんきに言ってる場合じゃないですよサーシャさん！？」
line = "「のんきに言ってる場合じゃないですよサーシャさん！？」"

[[dialogue]]
speaker = "unk"
# 端的に言えば、リクリエとは世界を書き換える現象。
line = "端的に言えば、リクリエとは世界を書き換える現象。"

[[dialogue]]
speaker = "unk"
# 今まで戦ってきたモンスターも大なり小なりその力を持っていたが、この新種のモンスターは改変力が段違いだ。
line = "今まで戦ってきたモンスターも大なり小なりその力を持っていたが、この新種のモンスターは改変力が段違いだ。"

[[dialogue]]
speaker = "unk"
# なんとか倒せたとしても、このままでは一帯がリクリエに蝕まれるだろう。
line = "なんとか倒せたとしても、このままでは一帯がリクリエに蝕まれるだろう。"

[[dialogue]]
speaker = "クロト"
# 「俺がやる！」
line = "「俺がやる！」"

[[dialogue]]
speaker = "unk"
# 自身の中の魔王の力を励起させる。
line = "自身の中の魔王の力を励起させる。"

[[dialogue]]
speaker = "unk"
# 俺が──いや、魔王ラクシスが元来持っていた力は平行世界を超える力。
line = "俺が──いや、魔王ラクシスが元来持っていた力は平行世界を超える力。"

[[dialogue]]
speaker = "unk"
# 女神すら持ちえない力を偶然にも獲得してしまった突然変異。
line = "女神すら持ちえない力を偶然にも獲得してしまった突然変異。"

[[dialogue]]
speaker = "unk"
# その力を以て、平行世界の可能性を束ね、この拳に宿す──！
line = "その力を以て、平行世界の可能性を束ね、この拳に宿す──！"

[[dialogue]]
speaker = "クロト"
# 「フロンティアドライブ──」
line = "「フロンティアドライブ──」"
