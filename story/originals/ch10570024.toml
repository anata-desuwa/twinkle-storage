[[dialogue]]
speaker = "unk"
# 第４話,２人だけの甘酒,P
line = "第４話,２人だけの甘酒,P"

[[dialogue]]
speaker = "unk"
# 初詣のために浅草に到着すると、時間はすっかり夜になっていた。
line = "初詣のために浅草に到着すると、時間はすっかり夜になっていた。"

[[dialogue]]
speaker = "トリシャ"
# 「お昼は人も多かったでしょうが……夜になると幾分か人も少ないですね……人ごみが苦手な私にはちょうどいい塩梅です」
line = "「お昼は人も多かったでしょうが……夜になると幾分か人も少ないですね……人ごみが苦手な私にはちょうどいい塩梅です」"

[[dialogue]]
speaker = "トリシャ"
# 「ですが、今晩は冷え込みますね……私は寒さには強い方ですので……この格好でも問題ありませんが、あなたは……」
line = "「ですが、今晩は冷え込みますね……私は寒さには強い方ですので……この格好でも問題ありませんが、あなたは……」"

[[dialogue]]
speaker = "unk"
# 風が寒ーいっ！
line = "風が寒ーいっ！"

[[dialogue]]
speaker = "トリシャ"
# 「でしょうね……身を裂くほどの北風……レゾフならば氷結ヨーグルトを欲するところですが、今日は温かい物でも……おや……？」
line = "「でしょうね……身を裂くほどの北風……レゾフならば氷結ヨーグルトを欲するところですが、今日は温かい物でも……おや……？」"

[[dialogue]]
speaker = "トリシャ"
# 「あの湯気の出ている屋台は……甘酒？　甘いお酒を、販売しているのですね……？　小さな子どもも口にしているようですが……」
line = "「あの湯気の出ている屋台は……甘酒？　甘いお酒を、販売しているのですね……？　小さな子どもも口にしているようですが……」"

[[dialogue]]
speaker = "unk"
# 甘酒はノンアルコールのもあります
line = "甘酒はノンアルコールのもあります"

[[dialogue]]
speaker = "トリシャ"
# 「そうなのですね……どのような飲み物なのか、興味があります……暖を取りましょう」
line = "「そうなのですね……どのような飲み物なのか、興味があります……暖を取りましょう」"

[[dialogue]]
speaker = "トリシャ"
# 「あ……ここは私がお支払いします……手伝ってもらったお礼と……今日は少しだけお金持ちですから……フフフ」
line = "「あ……ここは私がお支払いします……手伝ってもらったお礼と……今日は少しだけお金持ちですから……フフフ」"

[[dialogue]]
speaker = "トリシャ"
# 「あちち……これが甘酒ですか……白くて、濁っていて、どろりどろりと……どことなくヨーグルトのようにも見えますが……いただきます」
line = "「あちち……これが甘酒ですか……白くて、濁っていて、どろりどろりと……どことなくヨーグルトのようにも見えますが……いただきます」"

[[dialogue]]
speaker = "トリシャ"
# 「ずず──んぅ、熱っ……！　舌……火傷してしまいまひた……」
line = "「ずず──んぅ、熱っ……！　舌……火傷してしまいまひた……」"

[[dialogue]]
speaker = "トリシャ"
# 「ですが、とても美味です……ずずず……どこか氷結ヨーグルトにも通ずるような……？」
line = "「ですが、とても美味です……ずずず……どこか氷結ヨーグルトにも通ずるような……？」"

[[dialogue]]
speaker = "unk"
# ヨーグルトも甘酒も発酵食品だからかな？
line = "ヨーグルトも甘酒も発酵食品だからかな？"

[[dialogue]]
speaker = "トリシャ"
# 「なるほど……はぁぁ……体が内側から、ぽかぽかと温かく……隠し味にジンジャーも入っているのでしょうか……さ、あなたもどうぞ。フフフ」
line = "「なるほど……はぁぁ……体が内側から、ぽかぽかと温かく……隠し味にジンジャーも入っているのでしょうか……さ、あなたもどうぞ。フフフ」"

[[dialogue]]
speaker = "unk"
# トリシャから甘酒を受け取り、一口すする。
line = "トリシャから甘酒を受け取り、一口すする。"

[[dialogue]]
speaker = "unk"
# ずずず……美味しくて温まる！
line = "ずずず……美味しくて温まる！"

[[dialogue]]
speaker = "トリシャ"
# 「はい、とっても……！　甘酒、クセになってしまいそうな美味しさです……まだまだ人間界には美味しいものがいっぱい……」
line = "「はい、とっても……！　甘酒、クセになってしまいそうな美味しさです……まだまだ人間界には美味しいものがいっぱい……」"

[[dialogue]]
speaker = "unk"
# もうもうと湯気が出る熱さと優しい甘さが、<ruby=かじか>悴</ruby>んだ体に染みた。
line = "もうもうと湯気が出る熱さと優しい甘さが、<ruby>悴<rt>かじか</rt></ruby>んだ体に染みた。"

[[dialogue]]
speaker = "トリシャ"
# 「甘酒もいただきましたし、お参りも済ませましたし……ああ、そうです……おみくじを引きましょう」
line = "「甘酒もいただきましたし、お参りも済ませましたし……ああ、そうです……おみくじを引きましょう」"

[[dialogue]]
speaker = "トリシャ"
# 「私は私自身を占うことを、師から禁じられていますので……こちらでおみくじを引かせていただきます……」
line = "「私は私自身を占うことを、師から禁じられていますので……こちらでおみくじを引かせていただきます……」"

[[dialogue]]
speaker = "トリシャ"
# 「あんなにおみくじを引いたのに……ちゃんとしたものを引くのは初めてです……不思議ですね……」
line = "「あんなにおみくじを引いたのに……ちゃんとしたものを引くのは初めてです……不思議ですね……」"

[[dialogue]]
speaker = "トリシャ"
# 「では初穂料をお納めして……カシャ、カシャ……」
line = "「では初穂料をお納めして……カシャ、カシャ……」"

[[dialogue]]
speaker = "トリシャ"
# 「５７番です……えぇと……５７番は小吉、ですね」
line = "「５７番です……えぇと……５７番は小吉、ですね」"

[[dialogue]]
speaker = "トリシャ"
# 「『勉学──やがて実を結ぶ』……『失せ物──根気よく探せば必ず』……『恋愛──じっくり育む時期』……ふむ、ふむ……」
line = "「『勉学──やがて実を結ぶ』……『失せ物──根気よく探せば必ず』……『恋愛──じっくり育む時期』……ふむ、ふむ……」"

[[dialogue]]
speaker = "トリシャ"
# 「いずれも日々の努力を怠るなかれ……ということでしょうか……生き急ぐ必要はありません……」
line = "「いずれも日々の努力を怠るなかれ……ということでしょうか……生き急ぐ必要はありません……」"

[[dialogue]]
speaker = "トリシャ"
# 「おや？　フフフ……ここ、見てください……『金運──大金は縁遠し。小銭は多少の縁あり』」
line = "「おや？　フフフ……ここ、見てください……『金運──大金は縁遠し。小銭は多少の縁あり』」"

[[dialogue]]
speaker = "トリシャ"
# 「よく当たるおみくじですね……ええ、身の丈に合った金額で良いのです……私には小銭くらいでちょうどいい……」
line = "「よく当たるおみくじですね……ええ、身の丈に合った金額で良いのです……私には小銭くらいでちょうどいい……」"

[[dialogue]]
speaker = "トリシャ"
# 「巨万の富を手に入れてしまったばかりに、かえって不幸に見舞われ、身を崩してしまう話を数えたら……<ruby=まいきょ>枚挙</ruby>に<ruby=いとま>暇</ruby>がありません……」
line = "「巨万の富を手に入れてしまったばかりに、かえって不幸に見舞われ、身を崩してしまう話を数えたら……<ruby>枚挙<rt>まいきょ</rt></ruby>に<ruby>暇<rt>いとま</rt></ruby>がありません……」"

[[dialogue]]
speaker = "トリシャ"
# 「ほどほどが一番です……過度な贅沢をせずとも、幸せは味わえるのですから……今、この時間のように」
line = "「ほどほどが一番です……過度な贅沢をせずとも、幸せは味わえるのですから……今、この時間のように」"

[[dialogue]]
speaker = "トリシャ"
# 「あなたとの初詣デート……新年から有意義な時を、過ごせました……」
line = "「あなたとの初詣デート……新年から有意義な時を、過ごせました……」"

[[dialogue]]
speaker = "トリシャ"
# 「ですが人間界の居心地の良さに甘えてしまうと……魔界に帰るのがつらくなってしまいそうですね……」
line = "「ですが人間界の居心地の良さに甘えてしまうと……魔界に帰るのがつらくなってしまいそうですね……」"

[[dialogue]]
speaker = "unk"
# トリシャさん、帰っちゃうんですか？
line = "トリシャさん、帰っちゃうんですか？"

[[dialogue]]
speaker = "トリシャ"
# 「いずれ魔界に帰るのか、このまま人間界に留まるのかは……まだ決めあぐねています」
line = "「いずれ魔界に帰るのか、このまま人間界に留まるのかは……まだ決めあぐねています」"

[[dialogue]]
speaker = "トリシャ"
# 「ですがもうしばらくは……この居心地の甘さに浸っていたいと思います……」
line = "「ですがもうしばらくは……この居心地の甘さに浸っていたいと思います……」"

[[dialogue]]
speaker = "トリシャ"
# 「できうるならば、あなたと<ruby=さだめ>運命</ruby>を共にし続けていたいのですが……ご迷惑でしょうか……？」
line = "「できうるならば、あなたと<ruby>運命<rt>さだめ</rt></ruby>を共にし続けていたいのですが……ご迷惑でしょうか……？」"

[[dialogue]]
speaker = "unk"
# トリシャさんのいるところが俺の居場所です
line = "トリシャさんのいるところが俺の居場所です"

[[dialogue]]
speaker = "トリシャ"
# 「……！　嬉しいです……これからも、末永くよろしくお願いします……」
line = "「……！　嬉しいです……これからも、末永くよろしくお願いします……」"

[[dialogue]]
speaker = "トリシャ"
# 「また来年のお正月も……初詣に赴きたいものです……美味しい甘酒も飲みたいですし……フフ」
line = "「また来年のお正月も……初詣に赴きたいものです……美味しい甘酒も飲みたいですし……フフ」"

[[dialogue]]
speaker = "unk"
# 甘酒ならコンビニでも買えますよ？
line = "甘酒ならコンビニでも買えますよ？"

[[dialogue]]
speaker = "トリシャ"
# 「いえ、それではいけません……違うのです」
line = "「いえ、それではいけません……違うのです」"

[[dialogue]]
speaker = "トリシャ"
# 「私が好きなのは……あなたと共に赴いた初詣で、冷えた体を芯から温めてくれる１杯の甘酒なのですから……にへへ♪」
line = "「私が好きなのは……あなたと共に赴いた初詣で、冷えた体を芯から温めてくれる１杯の甘酒なのですから……にへへ♪」"

[[dialogue]]
speaker = "unk"
# トリシャさんは俺の腕にしがみつくと、前よりもちょっとだけ上手になった笑顔を満面に浮かべるのだった。
line = "トリシャさんは俺の腕にしがみつくと、前よりもちょっとだけ上手になった笑顔を満面に浮かべるのだった。"
