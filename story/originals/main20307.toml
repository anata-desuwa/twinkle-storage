[[dialogue]]
speaker = "unk"
# 第７話,梨緒とベアトリス,B
line = "第７話,梨緒とベアトリス,B"

[[dialogue]]
speaker = "梨緒"
# 「いや、あのだな……！　私は別に、泣いてなんか……っ！」
line = "「いや、あのだな……！　私は別に、泣いてなんか……っ！」"

[[dialogue]]
speaker = "ベアトリス"
# 「泣いてもいいんじゃないかな？　星騎士が泣いちゃいけない理由なんて、ないと思う」
line = "「泣いてもいいんじゃないかな？　星騎士が泣いちゃいけない理由なんて、ないと思う」"

[[dialogue]]
speaker = "unk"
# ベアトリスはそう言って、梨緒の顔をハンカチでぬぐった。
line = "ベアトリスはそう言って、梨緒の顔をハンカチでぬぐった。"

[[dialogue]]
speaker = "梨緒"
# 「あ……ありがとう、ベアト」
line = "「あ……ありがとう、ベアト」"

[[dialogue]]
speaker = "ベアトリス"
# 「な、仲間……だから。これくらい当然だよ」
line = "「な、仲間……だから。これくらい当然だよ」"

[[dialogue]]
speaker = "unk"
# 梨緒の顔を何度も優しくハンカチでぬぐうベアトリス。
line = "梨緒の顔を何度も優しくハンカチでぬぐうベアトリス。"

[[dialogue]]
speaker = "unk"
# その優しさと、友人に思い切り泣き顔を見られた気恥ずかしさも相まって、梨緒の涙はすっかり引っ込んでしまっていた。
line = "その優しさと、友人に思い切り泣き顔を見られた気恥ずかしさも相まって、梨緒の涙はすっかり引っ込んでしまっていた。"

[[dialogue]]
speaker = "梨緒"
# 「ありがとう、本当に……。もう大丈夫だ」
line = "「ありがとう、本当に……。もう大丈夫だ」"

[[dialogue]]
speaker = "ベアトリス"
# 「うん。ならよかった」
line = "「うん。ならよかった」"

[[dialogue]]
speaker = "ベアトリス"
# 「その……梨緒ちゃん。梨緒ちゃんが倒れたのは、あのジグって人のせいなんだよね？」
line = "「その……梨緒ちゃん。梨緒ちゃんが倒れたのは、あのジグって人のせいなんだよね？」"

[[dialogue]]
speaker = "梨緒"
# 「……ああ、そうだ」
line = "「……ああ、そうだ」"

[[dialogue]]
speaker = "unk"
# 本当は認めたくないとばかりに、梨緒が重々しく頷く。
line = "本当は認めたくないとばかりに、梨緒が重々しく頷く。"

[[dialogue]]
speaker = "ベアトリス"
# 「だったらさ……あの人とはもう会わない方がいいんじゃないかな？」
line = "「だったらさ……あの人とはもう会わない方がいいんじゃないかな？」"

[[dialogue]]
speaker = "ベアトリス"
# 「あの人が星徒会長で、梨緒ちゃんは副会長だったって言ってたよね」
line = "「あの人が星徒会長で、梨緒ちゃんは副会長だったって言ってたよね」"

[[dialogue]]
speaker = "ベアトリス"
# 「梨緒ちゃんの仲間だったんでしょ？　なら梨緒ちゃんが戦う必要はないと思う」
line = "「梨緒ちゃんの仲間だったんでしょ？　なら梨緒ちゃんが戦う必要はないと思う」"

[[dialogue]]
speaker = "ベアトリス"
# 「それにあの人は強い。悔しいけど、私や梨緒ちゃんよりも」
line = "「それにあの人は強い。悔しいけど、私や梨緒ちゃんよりも」"

[[dialogue]]
speaker = "ベアトリス"
# 「新星星徒会の人たちがいるし、流星の会長さんもそのうち帰ってくるらしいし、梨緒ちゃんが倒れるくらいなら誰かに任せても──」
line = "「新星星徒会の人たちがいるし、流星の会長さんもそのうち帰ってくるらしいし、梨緒ちゃんが倒れるくらいなら誰かに任せても──」"

[[dialogue]]
speaker = "梨緒"
# 「いや──それはできない」
line = "「いや──それはできない」"

[[dialogue]]
speaker = "ベアトリス"
# 「どうして……？」
line = "「どうして……？」"

[[dialogue]]
speaker = "ベアトリス"
# 「詳しいことまではわからないけど、なんとなくだけど……きっと梨緒ちゃんはこれまで、たくさん頑張ってきたんたと思う」
line = "「詳しいことまではわからないけど、なんとなくだけど……きっと梨緒ちゃんはこれまで、たくさん頑張ってきたんたと思う」"

[[dialogue]]
speaker = "ベアトリス"
# 「すっごくすっごく頑張って、たくさんたくさん傷ついてきた。だから梨緒ちゃんがこれ以上傷つくのを見てられないよ」
line = "「すっごくすっごく頑張って、たくさんたくさん傷ついてきた。だから梨緒ちゃんがこれ以上傷つくのを見てられないよ」"

[[dialogue]]
speaker = "梨緒"
# 「ありがとう、ベアト。君は優しいな」
line = "「ありがとう、ベアト。君は優しいな」"

[[dialogue]]
speaker = "梨緒"
# 「だけど私は、ジグのことを人任せにはできない」
line = "「だけど私は、ジグのことを人任せにはできない」"

[[dialogue]]
speaker = "梨緒"
# 「それは……諦めることになるから」
line = "「それは……諦めることになるから」"

[[dialogue]]
speaker = "ベアトリス"
# 「梨緒ちゃん……」
line = "「梨緒ちゃん……」"

[[dialogue]]
speaker = "梨緒"
# 「うまく言えないが、それじゃダメなんだ……」
line = "「うまく言えないが、それじゃダメなんだ……」"

[[dialogue]]
speaker = "梨緒"
# 「私はジグに何度も負けた。何度も何度も挑んで、その度に負けた。一度も勝ったことがない。それでも──」
line = "「私はジグに何度も負けた。何度も何度も挑んで、その度に負けた。一度も勝ったことがない。それでも──」"

[[dialogue]]
speaker = "梨緒"
# 「何度負けても、いくら傷ついても、諦めたら私が終わってしまう。……そんな気がするんだ」
line = "「何度負けても、いくら傷ついても、諦めたら私が終わってしまう。……そんな気がするんだ」"

[[dialogue]]
speaker = "ベアトリス"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# 手探りで絞り出した梨緒の言葉に、目を丸くするベアトリス。
line = "手探りで絞り出した梨緒の言葉に、目を丸くするベアトリス。"

[[dialogue]]
speaker = "ベアトリス"
# 「……梨緒ちゃんはかっこいいね」
line = "「……梨緒ちゃんはかっこいいね」"

[[dialogue]]
speaker = "梨緒"
# 「かっこいいっ？　私がっ？」
line = "「かっこいいっ？　私がっ？」"

[[dialogue]]
speaker = "ベアトリス"
# 「自分がはっきりしてるというか……私とは全然違って、強いなって」
line = "「自分がはっきりしてるというか……私とは全然違って、強いなって」"

[[dialogue]]
speaker = "梨緒"
# 「はっきりしてるだろうか……？　さっきもうまく言えなかったし……それに私は強くなんて……」
line = "「はっきりしてるだろうか……？　さっきもうまく言えなかったし……それに私は強くなんて……」"

[[dialogue]]
speaker = "ベアトリス"
# 「私はなんていうかこう……行き当たりばったりというか、流されてるというか……そんな感じで」
line = "「私はなんていうかこう……行き当たりばったりというか、流されてるというか……そんな感じで」"

[[dialogue]]
speaker = "ベアトリス"
# 「だから、自分を持ってる梨緒ちゃんがかっこよく見えるんだ」
line = "「だから、自分を持ってる梨緒ちゃんがかっこよく見えるんだ」"

[[dialogue]]
speaker = "梨緒"
# 「…………君がそう言ってくれるなら、素直に誉め言葉として受け取ろう」
line = "「…………君がそう言ってくれるなら、素直に誉め言葉として受け取ろう」"

[[dialogue]]
speaker = "梨緒"
# 「ありがとう、ベアト」
line = "「ありがとう、ベアト」"

[[dialogue]]
speaker = "ベアトリス"
# 「えへへ」
line = "「えへへ」"

[[dialogue]]
speaker = "unk"
# バツの悪そうな梨緒に、ベアトリスが照れ笑いを見せる。
line = "バツの悪そうな梨緒に、ベアトリスが照れ笑いを見せる。"

[[dialogue]]
speaker = "ベアトリス"
# 「梨緒ちゃんが勝つまで諦めないって言うなら、私もお手伝いするよ。そういうちょっと我がままなところ、学ばないといけないなって思ったから」
line = "「梨緒ちゃんが勝つまで諦めないって言うなら、私もお手伝いするよ。そういうちょっと我がままなところ、学ばないといけないなって思ったから」"

[[dialogue]]
speaker = "ベアトリス"
# 「だから……１人で泣かないで欲しいな」
line = "「だから……１人で泣かないで欲しいな」"

[[dialogue]]
speaker = "ベアトリス"
# 「泣くならちゃんと、私の見えるところで泣いて。そうじゃないと、必要な時に助けられなくなっちゃう」
line = "「泣くならちゃんと、私の見えるところで泣いて。そうじゃないと、必要な時に助けられなくなっちゃう」"

[[dialogue]]
speaker = "ベアトリス"
# 「まだ結成して日は浅いかもしれないけど、私たちは同じ、選挙管理委員会の仲間でしょ？」
line = "「まだ結成して日は浅いかもしれないけど、私たちは同じ、選挙管理委員会の仲間でしょ？」"

[[dialogue]]
speaker = "梨緒"
# 「ああ、よろしく──」
line = "「ああ、よろしく──」"

[[dialogue]]
speaker = "梨緒"
# 「い、いや、だから！　私は別に泣いてないっ」
line = "「い、いや、だから！　私は別に泣いてないっ」"

[[dialogue]]
speaker = "ベアトリス"
# 「え……梨緒ちゃん、そこから？　流石にそれはちょっと無理があるんじゃ……」
line = "「え……梨緒ちゃん、そこから？　流石にそれはちょっと無理があるんじゃ……」"

[[dialogue]]
speaker = "梨緒"
# 「だいたい、友達が泣いてたら、見て見ぬふりをするのも優しさじゃないのか！？」
line = "「だいたい、友達が泣いてたら、見て見ぬふりをするのも優しさじゃないのか！？」"

[[dialogue]]
speaker = "ベアトリス"
# 「うわ、開き直っちゃった……！」
line = "「うわ、開き直っちゃった……！」"

[[dialogue]]
speaker = "ベアトリス"
# 「いいよ、わかったよ。今度梨緒ちゃんが泣いてるところ見かけたら、『梨緒ちゃんが泣くわけない！』って言って勝手に顔をハンカチでゴシゴシしちゃうから」
line = "「いいよ、わかったよ。今度梨緒ちゃんが泣いてるところ見かけたら、『梨緒ちゃんが泣くわけない！』って言って勝手に顔をハンカチでゴシゴシしちゃうから」"

[[dialogue]]
speaker = "梨緒"
# 「いや、それはやめてくれ……」
line = "「いや、それはやめてくれ……」"

[[dialogue]]
speaker = "梨緒"
# 「というか、コホンッ、色々とすまない。話を聞いてもらったお陰で、気持ちの整理はついた」
line = "「というか、コホンッ、色々とすまない。話を聞いてもらったお陰で、気持ちの整理はついた」"

[[dialogue]]
speaker = "梨緒"
# 「ひとまず、できる範囲で詳しい話をしておきたい。ここに緋宮クロトと、選管のメンバーを集めてもらえないだろうか？」
line = "「ひとまず、できる範囲で詳しい話をしておきたい。ここに緋宮クロトと、選管のメンバーを集めてもらえないだろうか？」"

[[dialogue]]
speaker = "ベアトリス"
# 「うん、了解♪　人は私が呼んでくるから、梨緒ちゃんはまだ大人しくしててね」
line = "「うん、了解♪　人は私が呼んでくるから、梨緒ちゃんはまだ大人しくしててね」"
