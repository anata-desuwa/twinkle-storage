# 「は、はい……少し前にヘレナさんに呼ばれて、九浄家のお屋敷に行った時にお会いしまして……」
line = "「は、はい……少し前にヘレナさんに呼ばれて、九浄家のお屋敷に行った時にお会いしまして……」"

[[dialogue]]
