[[dialogue]]
speaker = "unk"
# 結界内に突入し、その勢いのままコラプサーのアジトになだれ込む。
line = "結界内に突入し、その勢いのままコラプサーのアジトになだれ込む。"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「あっ、来てくれたんだ、会長さん！」
line = "「あっ、来てくれたんだ、会長さん！」"

[[dialogue]]
speaker = "unk"
# コハルコさん！？　その姿は！？
line = "コハルコさん！？　その姿は！？"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「先輩からご指導ご鞭撻を頂いてね。マリオンさんと……百目騎さんも来てくれたんだ？」
line = "「先輩からご指導ご鞭撻を頂いてね。マリオンさんと……百目騎さんも来てくれたんだ？」"

[[dialogue]]
speaker = "レイラ"
# 「私があなたにしたこと、許されるとは思いません。それでも、一緒に戦わせてください」
line = "「私があなたにしたこと、許されるとは思いません。それでも、一緒に戦わせてください」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「うん、よろしく。パソコン仲間としてもねっ」
line = "「うん、よろしく。パソコン仲間としてもねっ」"

[[dialogue]]
speaker = "マリオン（覚醒）"
# （この魔力、まさしく光の魔女のもの。ああ、あの時の赤ん坊が、本当に大きくなりましたね……）
line = "（この魔力、まさしく光の魔女のもの。ああ、あの時の赤ん坊が、本当に大きくなりましたね……）"

[[dialogue]]
speaker = "イザベラ"
# 『どいつもこいつも邪魔をして……！　この役立たず！　力ずくで押さえつけて、今度こそ生贄にしてやる！』
line = "『どいつもこいつも邪魔をして……！　この役立たず！　力ずくで押さえつけて、今度こそ生贄にしてやる！』"

[[dialogue]]
speaker = "unk"
# ！？　あの姿は……！？
line = "！？　あの姿は……！？"

[[dialogue]]
speaker = "unk"
# かつてフィーニスの塔の中で出会った亡霊と似ている。
line = "かつてフィーニスの塔の中で出会った亡霊と似ている。"

[[dialogue]]
speaker = "unk"
# どうして魔女であるイザベラがあの姿に……？
line = "どうして魔女であるイザベラがあの姿に……？"

[[dialogue]]
speaker = "イザベラ"
# 『邪魔を……するなぁっ！！』
line = "『邪魔を……するなぁっ！！』"

[[dialogue]]
speaker = "レイラ"
# 「くっ！？　今の斬撃は、リーナの星術……？　守護星と一緒に星術までくすねるなんて手癖が悪いですよ！」
line = "「くっ！？　今の斬撃は、リーナの星術……？　守護星と一緒に星術までくすねるなんて手癖が悪いですよ！」"

[[dialogue]]
speaker = "イザベラ"
# 『うるさいうるさいうるさい！　この減らず口がぁっ！』
line = "『うるさいうるさいうるさい！　この減らず口がぁっ！』"

[[dialogue]]
speaker = "レイラ"
# 「ブラックホール・ディバウアー！」
line = "「ブラックホール・ディバウアー！」"

[[dialogue]]
speaker = "イザベラ"
# 『ブラックホール・ディバウアー！』
line = "『ブラックホール・ディバウアー！』"

[[dialogue]]
speaker = "unk"
# ブラックホール同士が激突し、衝撃で天井が吹き飛んだ。とてつもない力と力のぶつかり合いだ。
line = "ブラックホール同士が激突し、衝撃で天井が吹き飛んだ。とてつもない力と力のぶつかり合いだ。"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「会長さん。イザベラさんは……もう助からないと思う」
line = "「会長さん。イザベラさんは……もう助からないと思う」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「私、トリュファイナさんの過去を垣間見たの。だから分かる。ラクシスさんみたいに、イザベラさんの魂は汚染されてる」
line = "「私、トリュファイナさんの過去を垣間見たの。だから分かる。ラクシスさんみたいに、イザベラさんの魂は汚染されてる」"

[[dialogue]]
speaker = "マリオン（覚醒）"
# 「イザベラの肉体はとうに死しているはずなのに、コラプサーの力で動いているのです。けれど、死者を殺す術はありません。何か手があればよいのですが……」
line = "「イザベラの肉体はとうに死しているはずなのに、コラプサーの力で動いているのです。けれど、死者を殺す術はありません。何か手があればよいのですが……」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「私に考えがあります。会長さん、少しだけ時間稼ぎをお願いしていい？　マリオンさんもお願いします」
line = "「私に考えがあります。会長さん、少しだけ時間稼ぎをお願いしていい？　マリオンさんもお願いします」"

[[dialogue]]
speaker = "マリオン（覚醒）"
# 「かしこまりました。お任せください」
line = "「かしこまりました。お任せください」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# （問題はリソースだ。本物の光の魔女でも世界樹のバックアップがあってようやく行使できる禁術。私ひとりじゃ発動できない……）
line = "（問題はリソースだ。本物の光の魔女でも世界樹のバックアップがあってようやく行使できる禁術。私ひとりじゃ発動できない……）"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# （でも、みんなの力を借りられれば……泣いて喚いてでも、助けを求めるんだ）
line = "（でも、みんなの力を借りられれば……泣いて喚いてでも、助けを求めるんだ）"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# （対アポロ戦のアンテナの応用で、なんとかやれるはず……あのシステム組んだの私だし）
line = "（対アポロ戦のアンテナの応用で、なんとかやれるはず……あのシステム組んだの私だし）"

[[dialogue]]
speaker = "unk"
# コハルコさんが、空中に浮かんだコンソールを目にも留まらぬ速度で叩く。
line = "コハルコさんが、空中に浮かんだコンソールを目にも留まらぬ速度で叩く。"

[[dialogue]]
speaker = "unk"
# 同じく空中に投射されたモニターが文字と数字で埋め尽くされていく。
line = "同じく空中に投射されたモニターが文字と数字で埋め尽くされていく。"

[[dialogue]]
speaker = "レイラ"
# 「あのソースコードは……！　私も手伝います！」
line = "「あのソースコードは……！　私も手伝います！」"

[[dialogue]]
speaker = "イザベラ"
# 『させ……ない……！　ヘヴィアウトレイジ……！！』
line = "『させ……ない……！　ヘヴィアウトレイジ……！！』"

[[dialogue]]
speaker = "unk"
# それはこっちの台詞だ！
line = "それはこっちの台詞だ！"

[[dialogue]]
speaker = "unk"
# 闇から生み出された巨大な杭を拳で迎撃する。
line = "闇から生み出された巨大な杭を拳で迎撃する。"

[[dialogue]]
speaker = "unk"
# コハルコさんはやるといえば必ずやる人だ。邪魔はさせない。
line = "コハルコさんはやるといえば必ずやる人だ。邪魔はさせない。"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「よし、できた」
line = "「よし、できた」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「私は新星学園放送委員会委員長、朝比奈コハルコです。みなさん、聞こえますか──」
line = "「私は新星学園放送委員会委員長、朝比奈コハルコです。みなさん、聞こえますか──」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 『緊急の連絡です。戦闘中かもしれませんが、どうか聞いてください』
line = "『緊急の連絡です。戦闘中かもしれませんが、どうか聞いてください』"

[[dialogue]]
speaker = "サーシャ"
# 「コハルコちゃん、無事だったのね！」
line = "「コハルコちゃん、無事だったのね！」"

[[dialogue]]
speaker = "シルヴィ"
# 「よかった～！」
line = "「よかった～！」"

[[dialogue]]
speaker = "unk"
# コハルコと付き合いの長い２人も救出に動いていたが、アステラとモンスターに阻まれ、合流できずにいたのだ。
line = "コハルコと付き合いの長い２人も救出に動いていたが、アステラとモンスターに阻まれ、合流できずにいたのだ。"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 『私は今、先日の学園襲撃を企てたコラプサーの黒幕と対峙しています。ですが、私だけでは力が足りません。みなさんの力を貸してください』
line = "『私は今、先日の学園襲撃を企てたコラプサーの黒幕と対峙しています。ですが、私だけでは力が足りません。みなさんの力を貸してください』"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 『星騎士アプリにボタンを用意しました。これを押すことで、私に星力を送ることができます』
line = "『星騎士アプリにボタンを用意しました。これを押すことで、私に星力を送ることができます』"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 『テストしていないもので、想定していないリスクがあります。それでも、ご協力いただけるならボタンを押してください』
line = "『テストしていないもので、想定していないリスクがあります。それでも、ご協力いただけるならボタンを押してください』"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 『どうか、お願いします！』
line = "『どうか、お願いします！』"

[[dialogue]]
speaker = "シルヴィ"
# 「これを押せばいいんだね！　よっしゃ！」
line = "「これを押せばいいんだね！　よっしゃ！」"

[[dialogue]]
speaker = "サーシャ"
# 「我が守護星エウロパよ」
line = "「我が守護星エウロパよ」"

[[dialogue]]
speaker = "シルヴィ"
# 「我が守護星アヴィオールよ」
line = "「我が守護星アヴィオールよ」"

[[dialogue]]
speaker = "２人"
# 「我らの友に力を！！」
line = "「我らの友に力を！！」"

[[dialogue]]
speaker = "unk"
# 秋葉原の異常事態に呼応して、流星市国各地でアステラが発生。星騎士たち総出で対応に追われている。
line = "秋葉原の異常事態に呼応して、流星市国各地でアステラが発生。星騎士たち総出で対応に追われている。"

[[dialogue]]
speaker = "レミカ"
# 「私たちのライブでは助けてもらったから、今度は私たちの番……！」
line = "「私たちのライブでは助けてもらったから、今度は私たちの番……！」"

[[dialogue]]
speaker = "メルエル"
# 「うん！　届け、私たちの想い！」
line = "「うん！　届け、私たちの想い！」"

[[dialogue]]
speaker = "ルリエル"
# 「いつもお世話になってまーす！　ポチッとな！」
line = "「いつもお世話になってまーす！　ポチッとな！」"

[[dialogue]]
speaker = "星騎士Ａ"
# 「この声、聞いたことある……」
line = "「この声、聞いたことある……」"

[[dialogue]]
speaker = "星騎士Ｂ"
# 「当たり前でしょ、いつもオペレートしてくれる人なんだから！」
line = "「当たり前でしょ、いつもオペレートしてくれる人なんだから！」"

[[dialogue]]
speaker = "紅明"
# 「うっしっし。コハルコ委員長を知らないやつがいたらモグリだぜ！　だって委員長はずっとみんなをサポートしてきたんだからな！！」
line = "「うっしっし。コハルコ委員長を知らないやつがいたらモグリだぜ！　だって委員長はずっとみんなをサポートしてきたんだからな！！」"

[[dialogue]]
speaker = "紅明"
# 「あたしの星力も送るぜ！　ぶちかませ、コハルコ委員長～！！」
line = "「あたしの星力も送るぜ！　ぶちかませ、コハルコ委員長～！！」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「うそ……？　数分で星力がこんなに……みんな、リスクあるってちゃんと聞いてたかな……ちょっと心配になる」
line = "「うそ……？　数分で星力がこんなに……みんな、リスクあるってちゃんと聞いてたかな……ちょっと心配になる」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「うん、でも、みんな……大好き」
line = "「うん、でも、みんな……大好き」"

[[dialogue]]
speaker = "unk"
# コハルコの体が光を帯びた。黄色い光の粒子が降り落ちる。
line = "コハルコの体が光を帯びた。黄色い光の粒子が降り落ちる。"

[[dialogue]]
speaker = "イザベラ"
# 『これは……光の魔法！？　やらせない！　やらせない！　私はあの子と……！』
line = "『これは……光の魔法！？　やらせない！　やらせない！　私はあの子と……！』"

[[dialogue]]
speaker = "レイラ"
# 「いいえ、これで終わりにしましょう！　魔王さん、人形使いさん、私に続いてください！」
line = "「いいえ、これで終わりにしましょう！　魔王さん、人形使いさん、私に続いてください！」"

[[dialogue]]
speaker = "unk"
# ああ、行くぞ！
line = "ああ、行くぞ！"

[[dialogue]]
speaker = "マリオン（覚醒）"
# 「ユニゾン！」
line = "「ユニゾン！」"

[[dialogue]]
speaker = "レイラ"
# 「轟け、星の断末魔！　クライング・クエーサー！！」
line = "「轟け、星の断末魔！　クライング・クエーサー！！」"

[[dialogue]]
speaker = "イザベラ"
# 『ぐあああああっ！！』
line = "『ぐあああああっ！！』"

[[dialogue]]
speaker = "レイラ"
# 「もうやめましょう、イザベラさん。過去にいくら手を伸ばしても、何も掴めはしないんです！　私も、あなたも！」
line = "「もうやめましょう、イザベラさん。過去にいくら手を伸ばしても、何も掴めはしないんです！　私も、あなたも！」"

[[dialogue]]
speaker = "イザベラ"
# 『邪魔をしないで！　私は、あの子を……！』
line = "『邪魔をしないで！　私は、あの子を……！』"

[[dialogue]]
speaker = "イザベラ"
# 『ウェール……っ！！』
line = "『ウェール……っ！！』"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# （正直、イザベラさんの気持ちはちょっと分かっちゃう。私だって家族のいない世界を拒絶しようとしたから……似た者同士なのかも）
line = "（正直、イザベラさんの気持ちはちょっと分かっちゃう。私だって家族のいない世界を拒絶しようとしたから……似た者同士なのかも）"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# （コラプサーの力の代償なのか、リクリエの残滓なのかは分からないけど、もうイザベラさんが汚染から解放されることはないだろう）
line = "（コラプサーの力の代償なのか、リクリエの残滓なのかは分からないけど、もうイザベラさんが汚染から解放されることはないだろう）"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# （禁じられた魔法を、解き放つのは──今！）
line = "（禁じられた魔法を、解き放つのは──今！）"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「光の魔女トリュファイナの名代、朝比奈コハルコが告げる！」
line = "「光の魔女トリュファイナの名代、朝比奈コハルコが告げる！」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「我らに注ぐ星の光よ……再誕の加護を汝に与えん」
line = "「我らに注ぐ星の光よ……再誕の加護を汝に与えん」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「<ruby=レナトゥス>封理再誕</ruby>」
line = "「<ruby>封理再誕<rt>レナトゥス</rt></ruby>」"

[[dialogue]]
speaker = "unk"
# コハルコから放たれた光が、イザベラを包む。
line = "コハルコから放たれた光が、イザベラを包む。"

[[dialogue]]
speaker = "unk"
# これは攻撃ではない。もっと残酷で、温かい祝福。命を始まりの姿に戻す、再誕の魔法。
line = "これは攻撃ではない。もっと残酷で、温かい祝福。命を始まりの姿に戻す、再誕の魔法。"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「ずっと前から、生みの親に会えたら、伝えたいことがあったんです」
line = "「ずっと前から、生みの親に会えたら、伝えたいことがあったんです」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「温かい家族がいて、面白い友達がいて、たくさんの仲間がいて……生まれてきてよかった。私は幸せですって」
line = "「温かい家族がいて、面白い友達がいて、たくさんの仲間がいて……生まれてきてよかった。私は幸せですって」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「私にはもう家族がいるから、こう呼ぶのは最初で最後です」
line = "「私にはもう家族がいるから、こう呼ぶのは最初で最後です」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「お母さん……生んでくれて、命をくれて、ありがとう」
line = "「お母さん……生んでくれて、命をくれて、ありがとう」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「さようなら……おやすみなさい」
line = "「さようなら……おやすみなさい」"

[[dialogue]]
speaker = "イザベラ"
# 「ここは、どこ……？　って私の家じゃない。ひどい寝ぼけ方ね」
line = "「ここは、どこ……？　って私の家じゃない。ひどい寝ぼけ方ね」"

[[dialogue]]
speaker = "イザベラ"
# 「それにしても、とんでもない夢を見ていた気がするわ……訳の分かんない小娘たちを操って、世界を滅ぼすような……」
line = "「それにしても、とんでもない夢を見ていた気がするわ……訳の分かんない小娘たちを操って、世界を滅ぼすような……」"

[[dialogue]]
speaker = "イザベラ"
# 「そして、極めつけはあの子が……いえ、忘れましょう」
line = "「そして、極めつけはあの子が……いえ、忘れましょう」"

[[dialogue]]
speaker = "unk"
# なんといっても、今日は娘が帰ってくる日なのだから。料理は出来ている。好物の果物もある。新しい帽子と杖も用意した。準備は万端だ。
line = "なんといっても、今日は娘が帰ってくる日なのだから。料理は出来ている。好物の果物もある。新しい帽子と杖も用意した。準備は万端だ。"

[[dialogue]]
speaker = "イザベラ"
# 「おかえりなさい……ウェール」
line = "「おかえりなさい……ウェール」"

[[dialogue]]
speaker = "unk"
# 今際に見た、白い夢。愛する娘の笑顔を思い浮かべながら、イザベラは意識を閉じた。
line = "今際に見た、白い夢。愛する娘の笑顔を思い浮かべながら、イザベラは意識を閉じた。"
