[[dialogue]]
speaker = "unk"
# 第２話,バニーセーラのナイト様,P
line = "第２話,バニーセーラのナイト様,P"

[[dialogue]]
speaker = "ヘレナ"
# 「なるほど。そういうことであれば──……」
line = "「なるほど。そういうことであれば──……」"

[[dialogue]]
speaker = "セーラ"
# 「ふむふむ……。そうなると──……」
line = "「ふむふむ……。そうなると──……」"

[[dialogue]]
speaker = "unk"
# 何を話してるんですか？
line = "何を話してるんですか？"

[[dialogue]]
speaker = "セーラ"
# 「あ、会長さん。ちょっとヘレナさんに相談をね～」
line = "「あ、会長さん。ちょっとヘレナさんに相談をね～」"

[[dialogue]]
speaker = "ヘレナ"
# 「将来会社を興したいという彼女にアドバイスをしていたのだ」
line = "「将来会社を興したいという彼女にアドバイスをしていたのだ」"

[[dialogue]]
speaker = "セーラ"
# 「実際に話を聞いてみると、自分の見立ての甘さを痛感するね。ヘレナさんはやっぱりすごいよ」
line = "「実際に話を聞いてみると、自分の見立ての甘さを痛感するね。ヘレナさんはやっぱりすごいよ」"

[[dialogue]]
speaker = "ヘレナ"
# 「私はただ行動を起こしただけに過ぎぬ。何事も始めないことには始まらないからな」
line = "「私はただ行動を起こしただけに過ぎぬ。何事も始めないことには始まらないからな」"

[[dialogue]]
speaker = "ヘレナ"
# 「その点、貴殿も優秀だ。こうして私と話し、繋がりを利用しようとしている」
line = "「その点、貴殿も優秀だ。こうして私と話し、繋がりを利用しようとしている」"

[[dialogue]]
speaker = "セーラ"
# 「利用だなんてそんな。ちょっとしか考えてませんよ～」
line = "「利用だなんてそんな。ちょっとしか考えてませんよ～」"

[[dialogue]]
speaker = "ヘレナ"
# 「その強かさも気に入った。その気があるならもう一度カジノで働いてみるか？　客たちに話を聞いてみるといい」
line = "「その強かさも気に入った。その気があるならもう一度カジノで働いてみるか？　客たちに話を聞いてみるといい」"

[[dialogue]]
speaker = "ヘレナ"
# 「我がカジノには様々な企業の重鎮も出入りする。人脈を作るには申し分ない環境だ。もちろんアルバイト代も出そう」
line = "「我がカジノには様々な企業の重鎮も出入りする。人脈を作るには申し分ない環境だ。もちろんアルバイト代も出そう」"

[[dialogue]]
speaker = "セーラ"
# 「え、いいんですかっ？」
line = "「え、いいんですかっ？」"

[[dialogue]]
speaker = "ヘレナ"
# 「こちらとしても貴殿に給仕を行ってもらえると客入りが良くなるのでな。貴殿もそれを見越して話をしに来たのだろう？」
line = "「こちらとしても貴殿に給仕を行ってもらえると客入りが良くなるのでな。貴殿もそれを見越して話をしに来たのだろう？」"

[[dialogue]]
speaker = "セーラ"
# 「あはは、バレちゃってましたか～。前にバイトさせてもらった時、けっこー手応えあったもんで」
line = "「あはは、バレちゃってましたか～。前にバイトさせてもらった時、けっこー手応えあったもんで」"

[[dialogue]]
speaker = "ヘレナ"
# 「ふ、己を客観的に評価できている点も素晴らしい。我がカジノで良ければいくらでも活用するといい。若き才能に投資して得をするのは私も同じだからな」
line = "「ふ、己を客観的に評価できている点も素晴らしい。我がカジノで良ければいくらでも活用するといい。若き才能に投資して得をするのは私も同じだからな」"

[[dialogue]]
speaker = "セーラ"
# 「てなわけで畏れ多くもカムバックしてきましたよ～。看板バニーセーラちゃんが♪」
line = "「てなわけで畏れ多くもカムバックしてきましたよ～。看板バニーセーラちゃんが♪」"

[[dialogue]]
speaker = "セーラ"
# 「でもでも会長さんまでついてこなくて良かったのに～。あ、ひょっとして、うちがイケメン経営者に口説かれないか心配してくれちゃったり？」
line = "「でもでも会長さんまでついてこなくて良かったのに～。あ、ひょっとして、うちがイケメン経営者に口説かれないか心配してくれちゃったり？」"

[[dialogue]]
speaker = "unk"
# 緊張してるみたいでしたから
line = "緊張してるみたいでしたから"

[[dialogue]]
speaker = "セーラ"
# 「うっ……見抜かれちゃってた？　あはは、やっぱし彼氏に隠し事ってできないもんなんだね～」
line = "「うっ……見抜かれちゃってた？　あはは、やっぱし彼氏に隠し事ってできないもんなんだね～」"

[[dialogue]]
speaker = "セーラ"
# 「恥ずかしながら体が震えちゃってるや。前に来た時はモンスターの調査に集中してて気付かなかったけど、このカジノかなり格式高いよね～……？」
line = "「恥ずかしながら体が震えちゃってるや。前に来た時はモンスターの調査に集中してて気付かなかったけど、このカジノかなり格式高いよね～……？」"

[[dialogue]]
speaker = "セーラ"
# 「パっと見渡しただけでも明らかにお金持ちな人ばっかだし。成功者の風格を漂わせてる大人ばっかってゆーか……」
line = "「パっと見渡しただけでも明らかにお金持ちな人ばっかだし。成功者の風格を漂わせてる大人ばっかってゆーか……」"

[[dialogue]]
speaker = "セーラ"
# 「つい気後れしちゃいそうになるよ。ううん、１人だったら間違いなく日和っちゃってたかも……」
line = "「つい気後れしちゃいそうになるよ。ううん、１人だったら間違いなく日和っちゃってたかも……」"

[[dialogue]]
speaker = "unk"
# 俺がついてますよ
line = "俺がついてますよ"

[[dialogue]]
speaker = "セーラ"
# 「ふふ、ありがと。頼もしいよ。持つべき者はカッコいい彼氏だね♪」
line = "「ふふ、ありがと。頼もしいよ。持つべき者はカッコいい彼氏だね♪」"

[[dialogue]]
speaker = "セーラ"
# 「よーし、んじゃ早速話しかけに行っちゃいますか。せっかくヘレナさんがくれたチャンスだし」
line = "「よーし、んじゃ早速話しかけに行っちゃいますか。せっかくヘレナさんがくれたチャンスだし」"

[[dialogue]]
speaker = "セーラ"
# 「ガンガン喋って、ガンガン連絡先交換して、輝かしい未来のための糧にしちゃおっと♪」
line = "「ガンガン喋って、ガンガン連絡先交換して、輝かしい未来のための糧にしちゃおっと♪」"

[[dialogue]]
speaker = "セーラ"
# 「なるほどなるほど。勉強になります」
line = "「なるほどなるほど。勉強になります」"

[[dialogue]]
speaker = "セーラ"
# 「え、いいんですか？　是非見学させてもらいたいです！　でしたらこの辺りの日でご都合の良い日があれば……」
line = "「え、いいんですか？　是非見学させてもらいたいです！　でしたらこの辺りの日でご都合の良い日があれば……」"

[[dialogue]]
speaker = "セーラ"
# 「ありがとうございます！　お礼に、ふふ、こっそりドリンク一杯サービスしちゃいますね♪」
line = "「ありがとうございます！　お礼に、ふふ、こっそりドリンク一杯サービスしちゃいますね♪」"

[[dialogue]]
speaker = "セーラ"
# 「ふ～。想像以上の大収穫だね～。もう１ヶ月先まで会社の見学やらお食事会やらでスケジュール埋まっちゃったよ♪」
line = "「ふ～。想像以上の大収穫だね～。もう１ヶ月先まで会社の見学やらお食事会やらでスケジュール埋まっちゃったよ♪」"

[[dialogue]]
speaker = "セーラ"
# 「けっこう気さくな人が多いんかね？　成功してる人ってもっと気難しいイメージがあったけど、カジノの空気のおかげかな？」
line = "「けっこう気さくな人が多いんかね？　成功してる人ってもっと気難しいイメージがあったけど、カジノの空気のおかげかな？」"

[[dialogue]]
speaker = "unk"
# セーラさんの人柄のおかげですよ
line = "セーラさんの人柄のおかげですよ"

[[dialogue]]
speaker = "セーラ"
# 「やん、もーこの褒め上手～<emoji=heart04>　嬉しくなっちゃうじゃーん」
line = "「やん、もーこの褒め上手～<emoji=heart04>　嬉しくなっちゃうじゃーん」"

[[dialogue]]
speaker = "セーラ"
# 「でもうちは会長さんのおかげだと思ってるよ？　イケメン彼氏が傍にいてくれるからうちも安心して普段通り喋れるんだよ♪」
line = "「でもうちは会長さんのおかげだと思ってるよ？　イケメン彼氏が傍にいてくれるからうちも安心して普段通り喋れるんだよ♪」"

[[dialogue]]
speaker = "セーラ"
# 「……良かったら会社の見学やらお食事会やらも、ついてきてくれないかな？　時間が合う時だけでも構わないから」
line = "「……良かったら会社の見学やらお食事会やらも、ついてきてくれないかな？　時間が合う時だけでも構わないから」"

[[dialogue]]
speaker = "セーラ"
# 「ふふ、やった♪　向こう１ヶ月デートできないのも嫌だったしね。遠方から来てる社長さんもたくさんいたから旅行気分で行っちゃおう♪」
line = "「ふふ、やった♪　向こう１ヶ月デートできないのも嫌だったしね。遠方から来てる社長さんもたくさんいたから旅行気分で行っちゃおう♪」"

[[dialogue]]
speaker = "セーラ"
# 「ん？　あっ、はーい！　ごめんね、ドリンク頼まれちゃった。ちょっと行ってくる」
line = "「ん？　あっ、はーい！　ごめんね、ドリンク頼まれちゃった。ちょっと行ってくる」"

[[dialogue]]
speaker = "セーラ"
# 「お待たせしました～！　……え？　はい、そうですけど……。あはは、まだまだ起業家なんて名乗れるものじゃないですよ～」
line = "「お待たせしました～！　……え？　はい、そうですけど……。あはは、まだまだ起業家なんて名乗れるものじゃないですよ～」"

[[dialogue]]
speaker = "セーラ"
# 「あーやっぱり資金繰りが一番難しいですよね。うちもこうしてバイトして、起業用の資金を貯めてるつもりではいるんですけど～……」
line = "「あーやっぱり資金繰りが一番難しいですよね。うちもこうしてバイトして、起業用の資金を貯めてるつもりではいるんですけど～……」"

[[dialogue]]
speaker = "セーラ"
# 「……へ？　パトロンにですか？　お兄さんが？」
line = "「……へ？　パトロンにですか？　お兄さんが？」"

[[dialogue]]
speaker = "セーラ"
# 「あはは、嬉しいです。ありがとうございます。でも、うーん。できれば自分の力で頑張りたいって気持ちもあって」
line = "「あはは、嬉しいです。ありがとうございます。でも、うーん。できれば自分の力で頑張りたいって気持ちもあって」"

[[dialogue]]
speaker = "セーラ"
# 「ですよね～。１人では中々難しいですよね～。だけど、だからこそ１人で乗り越えたいって言いますか～」
line = "「ですよね～。１人では中々難しいですよね～。だけど、だからこそ１人で乗り越えたいって言いますか～」"

[[dialogue]]
speaker = "unk"
# 失礼ですが、お客様
line = "失礼ですが、お客様"

[[dialogue]]
speaker = "セーラ"
# 「あちゃー。すみません、彼氏がヤキモチ妬いちゃったみたいで。え？　あ、はい。それではまた～」
line = "「あちゃー。すみません、彼氏がヤキモチ妬いちゃったみたいで。え？　あ、はい。それではまた～」"

[[dialogue]]
speaker = "セーラ"
# 「……ふふ、イケメンムーブしてくれちゃうじゃ～ん。ああいうイケイケな人もいるんだね～。まさかホントに口説かれちゃうとは思わなかったよ」
line = "「……ふふ、イケメンムーブしてくれちゃうじゃ～ん。ああいうイケイケな人もいるんだね～。まさかホントに口説かれちゃうとは思わなかったよ」"

[[dialogue]]
speaker = "セーラ"
# 「でも嬉しかったよ～？　割って入ってきてくれた時、ズッキュンときめいちゃった♪」
line = "「でも嬉しかったよ～？　割って入ってきてくれた時、ズッキュンときめいちゃった♪」"

[[dialogue]]
speaker = "セーラ"
# 「ねね。耳貸して？　いいからいいから♪」
line = "「ねね。耳貸して？　いいからいいから♪」"

[[dialogue]]
speaker = "セーラ"
# 「ん……ちゅっ<emoji=heart04>　ふふ、ありがと<emoji=heart04>　格好良かったよ<emoji=heart04>」
line = "「ん……ちゅっ<emoji=heart04>　ふふ、ありがと<emoji=heart04>　格好良かったよ<emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
# 「これからもよろしくね？　うちのナイトさん<emoji=heart04>」
line = "「これからもよろしくね？　うちのナイトさん<emoji=heart04>」"
