[[dialogue]]
speaker = "unk"
# 犯罪組織ユゴスによるリゾート結界の襲撃事件。
line = "犯罪組織ユゴスによるリゾート結界の襲撃事件。"

[[dialogue]]
speaker = "unk"
# 果たしてそれは、公に知られることがないまま、公安委員会の手によって秘密裏に処理された。
line = "果たしてそれは、公に知られることがないまま、公安委員会の手によって秘密裏に処理された。"

[[dialogue]]
speaker = "unk"
# 確保された主犯の異東ヤハト及びミュータントたちは、公安委員会の地下施設に移送され、これから順次取り調べを行っていくことになるという。
line = "確保された主犯の異東ヤハト及びミュータントたちは、公安委員会の地下施設に移送され、これから順次取り調べを行っていくことになるという。"

[[dialogue]]
speaker = "リコリンフィア"
# 「とまぁ、ユゴスの連中を無事、裏方の職員たちに引き渡し終えたところで――」
line = "「とまぁ、ユゴスの連中を無事、裏方の職員たちに引き渡し終えたところで――」"

[[dialogue]]
speaker = "リコリンフィア"
# 「ひとまず、ここに集っている公安委員会のエージェントたちには、本部長権限をもって、一時の休息を許可する！」
line = "「ひとまず、ここに集っている公安委員会のエージェントたちには、本部長権限をもって、一時の休息を許可する！」"

[[dialogue]]
speaker = "リコリンフィア"
# 「総員、飲み物は持ったか？」
line = "「総員、飲み物は持ったか？」"

[[dialogue]]
speaker = "リコリンフィア"
# 「それでは――乾杯！」
line = "「それでは――乾杯！」"

[[dialogue]]
speaker = "全員"
# 「カンパ～イ！！」
line = "「カンパ～イ！！」"

[[dialogue]]
speaker = "unk"
# そうして、俺たちはリコさんの号令で、任務終了のささやかな打ち上げ会を行うことになった。
line = "そうして、俺たちはリコさんの号令で、任務終了のささやかな打ち上げ会を行うことになった。"

[[dialogue]]
speaker = "unk"
# 俺は公安委員会のメンバーに挨拶とお礼をして回りながら、その中でも一際目立つ人物に声をかける。
line = "俺は公安委員会のメンバーに挨拶とお礼をして回りながら、その中でも一際目立つ人物に声をかける。"

[[dialogue]]
speaker = "ミネコ"
# 「あっ、会長～、お疲れ～♪」
line = "「あっ、会長～、お疲れ～♪」"

[[dialogue]]
speaker = "unk"
# それは、能力の『<ruby=じょうほうかいざん>情報改竄</ruby>』で周囲には怪盗紳士に見えるようにしつつ参加しているミネコであった。
line = "それは、能力の『<ruby>情報改竄<rt>じょうほうかいざん</rt></ruby>』で周囲には怪盗紳士に見えるようにしつつ参加しているミネコであった。"

[[dialogue]]
speaker = "ミネコ"
# 「ちょっと待ってね、会長にだけは姿が見えるようにするから」
line = "「ちょっと待ってね、会長にだけは姿が見えるようにするから」"

[[dialogue]]
speaker = "unk"
# 小声でそう言うと、パチンと指を弾き、ミネコの姿が鮮明になる。
line = "小声でそう言うと、パチンと指を弾き、ミネコの姿が鮮明になる。"

[[dialogue]]
speaker = "ミネコ"
# 「ほいっと♪」
line = "「ほいっと♪」"

[[dialogue]]
speaker = "unk"
# 今回は協力してくれてありがとう
line = "今回は協力してくれてありがとう"

[[dialogue]]
speaker = "ミネコ"
# 「あははっ、別にお礼を言われることじゃないよ。元々は協力する気なんて全然なかったし」
line = "「あははっ、別にお礼を言われることじゃないよ。元々は協力する気なんて全然なかったし」"

[[dialogue]]
speaker = "ミネコ"
# 「さっきも言ってたけど、今回はマインの交渉術にまんまとしてやられちゃっただけだから」
line = "「さっきも言ってたけど、今回はマインの交渉術にまんまとしてやられちゃっただけだから」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「おや？　私のことを呼んだかな～？」
line = "「おや？　私のことを呼んだかな～？」"

[[dialogue]]
speaker = "ミネコ"
# 「おっ、来たな、可愛い子ちゃんな顔して腹黒な小悪魔天使め」
line = "「おっ、来たな、可愛い子ちゃんな顔して腹黒な小悪魔天使め」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひ♪　酷いな～」
line = "「にひひ♪　酷いな～」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ん？　――どんな交渉をして、大怪盗に協力してもらったのかって？　それはね～」
line = "「ん？　――どんな交渉をして、大怪盗に協力してもらったのかって？　それはね～」"

[[dialogue]]
speaker = "unk"
# 以前行われたバトルフェスタ・ペンタグラムで、ミネコと友人になったマイン。
line = "以前行われたバトルフェスタ・ペンタグラムで、ミネコと友人になったマイン。"

[[dialogue]]
speaker = "unk"
# 今回の事件でクロトに声を掛けるよりも先に、彼女はミネコを呼び出して――
line = "今回の事件でクロトに声を掛けるよりも先に、彼女はミネコを呼び出して――"

[[dialogue]]
speaker = "ミネコ"
# 「大怪盗の私が、ユゴスに潜入……？　それ、本気で言ってる？」
line = "「大怪盗の私が、ユゴスに潜入……？　それ、本気で言ってる？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「うん、相手がすごく慎重で、うちの本部長がどうしたもんかと悩んでてさ～」
line = "「うん、相手がすごく慎重で、うちの本部長がどうしたもんかと悩んでてさ～」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「そこで、ミネコのチートな情報改竄能力なら、何とかなるんじゃないと思ったわけ♪」
line = "「そこで、ミネコのチートな情報改竄能力なら、何とかなるんじゃないと思ったわけ♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「で、潜入して敵の情報をこっちに伝えて貰う代わりに、報酬は連中が隠し持ってるポイズナイトでどう？」
line = "「で、潜入して敵の情報をこっちに伝えて貰う代わりに、報酬は連中が隠し持ってるポイズナイトでどう？」"

[[dialogue]]
speaker = "ミネコ"
# 「なるほど、確かにポイズナイトは魅力的なお宝だね――」
line = "「なるほど、確かにポイズナイトは魅力的なお宝だね――」"

[[dialogue]]
speaker = "ミネコ"
# 「でも、断る」
line = "「でも、断る」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ありゃ、それはどうして？」
line = "「ありゃ、それはどうして？」"

[[dialogue]]
speaker = "ミネコ"
# 「私には、大怪盗としての誇りがあるからね。ポイズナイトを盗みこそすれ、公安委員会の手伝いはしない」
line = "「私には、大怪盗としての誇りがあるからね。ポイズナイトを盗みこそすれ、公安委員会の手伝いはしない」"

[[dialogue]]
speaker = "ミネコ"
# 「それは決して、<b>ロマン</b>ある盗みじゃない」
line = "「それは決して、<b>ロマン</b>ある盗みじゃない」"

[[dialogue]]
speaker = "unk"
# ミネコの真っ直ぐな視線を受けて、ネーゼマインは肩をすくめて笑ってみせる。
line = "ミネコの真っ直ぐな視線を受けて、ネーゼマインは肩をすくめて笑ってみせる。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「そうか～、交渉失敗か～。いや～、残念。なら、仕方ないよね～」
line = "「そうか～、交渉失敗か～。いや～、残念。なら、仕方ないよね～」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「――潔く、もう１人の大怪盗、ルパンに頼んでみることにするよ」
line = "「――潔く、もう１人の大怪盗、ルパンに頼んでみることにするよ」"

[[dialogue]]
speaker = "ミネコ"
# 「え」
line = "「え」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「あなたの優秀な娘さんでも無理って言っちゃうくらいの難しい潜入先だから、どうか協力して貰えませんか～、ってね。にひひ♪」
line = "「あなたの優秀な娘さんでも無理って言っちゃうくらいの難しい潜入先だから、どうか協力して貰えませんか～、ってね。にひひ♪」"

[[dialogue]]
speaker = "unk"
# 頬杖をつきながら、楽しそうな笑みを浮かべるマイン。
line = "頬杖をつきながら、楽しそうな笑みを浮かべるマイン。"

[[dialogue]]
speaker = "ミネコ"
# 「……！　マイン、キミは……！」
line = "「……！　マイン、キミは……！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ゴメンね～。ほら、私も仕事だからさ～」
line = "「ゴメンね～。ほら、私も仕事だからさ～」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「断られちゃったら、他を探さなきゃいけないじゃん？」
line = "「断られちゃったら、他を探さなきゃいけないじゃん？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「となると、必然的に……ねぇ？」
line = "「となると、必然的に……ねぇ？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ミネコの家族関係を知っている以上、ルパンのおじ様も交渉相手の１人として、どうしても候補に上がっちゃうんだよね～」
line = "「ミネコの家族関係を知っている以上、ルパンのおじ様も交渉相手の１人として、どうしても候補に上がっちゃうんだよね～」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「だけど、私としてはやっぱり、仲の良い友達の方を贔屓したいじゃん？」
line = "「だけど、私としてはやっぱり、仲の良い友達の方を贔屓したいじゃん？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ルパンよりも、大怪盗フランボウが活躍してくれる方をさ♪」
line = "「ルパンよりも、大怪盗フランボウが活躍してくれる方をさ♪」"

[[dialogue]]
speaker = "ミネコ"
# 「っ…………」
line = "「っ…………」"

[[dialogue]]
speaker = "ミネコ"
# 「ふっ、ふふっ――」
line = "「ふっ、ふふっ――」"

[[dialogue]]
speaker = "ミネコ"
# 「参った……とんだクソゲーだ……！」
line = "「参った……とんだクソゲーだ……！」"

[[dialogue]]
speaker = "ミネコ"
# 「舐めていたよ、立朽ネーゼマイン」
line = "「舐めていたよ、立朽ネーゼマイン」"

[[dialogue]]
speaker = "ミネコ"
# 「キミは私が想像していたよりずっと、恐ろしい<ruby=ネゴシエイター>交渉人</ruby>だ」
line = "「キミは私が想像していたよりずっと、恐ろしい<ruby>交渉人<rt>ネゴシエイター</rt></ruby>だ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「キャハハハ♪　大怪盗に褒められて光栄だよ♪」
line = "「キャハハハ♪　大怪盗に褒められて光栄だよ♪」"

[[dialogue]]
speaker = "ミネコ"
# 「とまぁ、そんな感じで……全く、悪どい正義の味方だよ」
line = "「とまぁ、そんな感じで……全く、悪どい正義の味方だよ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひ♪　それが公安委員会ってやつだからね～」
line = "「にひひ♪　それが公安委員会ってやつだからね～」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「というわけで、また次の機会があったらよろしくね、大怪盗さん♪」
line = "「というわけで、また次の機会があったらよろしくね、大怪盗さん♪」"

[[dialogue]]
speaker = "unk"
# マインが紙コップを差し出しながら言う。
line = "マインが紙コップを差し出しながら言う。"

[[dialogue]]
speaker = "ミネコ"
# 「冗談じゃない。同じクソゲーなら、次は攻略してみせるよ、<ruby=ネゴシエイター>交渉人</ruby>」
line = "「冗談じゃない。同じクソゲーなら、次は攻略してみせるよ、<ruby>交渉人<rt>ネゴシエイター</rt></ruby>」"

[[dialogue]]
speaker = "unk"
# そう言いつつも、ミネコも紙コップを差し出して、コツンと<ruby=ふち>縁</ruby>をぶつけてみせるのだった――
line = "そう言いつつも、ミネコも紙コップを差し出して、コツンと<ruby>縁<rt>ふち</rt></ruby>をぶつけてみせるのだった――"

[[dialogue]]
speaker = "unk"
# それからまた、他の公安委員会の面々に声をかけて周って、その後、母さんを見つけて声をかける。
line = "それからまた、他の公安委員会の面々に声をかけて周って、その後、母さんを見つけて声をかける。"

[[dialogue]]
speaker = "リノ"
# 「――あら、クロト。みんなとは話してきたの？」
line = "「――あら、クロト。みんなとは話してきたの？」"

[[dialogue]]
speaker = "unk"
# 母さんも今回はありがとう
line = "母さんも今回はありがとう"

[[dialogue]]
speaker = "リノ"
# 「ふふっ、可愛い息子を守るのは、母親なら当たり前のことよ」
line = "「ふふっ、可愛い息子を守るのは、母親なら当たり前のことよ」"

[[dialogue]]
speaker = "リノ"
# 「――え？　何かお礼がしたいって？」
line = "「――え？　何かお礼がしたいって？」"

[[dialogue]]
speaker = "リノ"
# 「そうね～。なら、たまにはお母さんと休日に、またデートをして欲しいわ♪」
line = "「そうね～。なら、たまにはお母さんと休日に、またデートをして欲しいわ♪」"

[[dialogue]]
speaker = "リノ"
# 「親子水入らずで。どう？」
line = "「親子水入らずで。どう？」"

[[dialogue]]
speaker = "unk"
# 喜んで
line = "喜んで"

[[dialogue]]
speaker = "unk"
# 俺が頷いて答えると、母さんは嬉しそうに笑って――
line = "俺が頷いて答えると、母さんは嬉しそうに笑って――"

[[dialogue]]
speaker = "リノ"
# 「ふふっ、お母さんとの約束よ♪」
line = "「ふふっ、お母さんとの約束よ♪」"

[[dialogue]]
speaker = "リノ"
# 「あっ！　そうだわ。お母さん、デートの他にも海でしてみたかったことがあって～」
line = "「あっ！　そうだわ。お母さん、デートの他にも海でしてみたかったことがあって～」"

[[dialogue]]
speaker = "リノ"
# 「ほら、マインちゃんがこの前、サンオイルを塗ってたでしょ～？　私、久しぶりにあれをお願いしたいわ♪」
line = "「ほら、マインちゃんがこの前、サンオイルを塗ってたでしょ～？　私、久しぶりにあれをお願いしたいわ♪」"

[[dialogue]]
speaker = "unk"
# それはちょっと恥ずかしいかも……
line = "それはちょっと恥ずかしいかも……"

[[dialogue]]
speaker = "リノ"
# 「え～？　なんで～？　昔、クロトが小さい時に海に出かけて、お母さんに塗ってくれたことあったじゃな～い」
line = "「え～？　なんで～？　昔、クロトが小さい時に海に出かけて、お母さんに塗ってくれたことあったじゃな～い」"

[[dialogue]]
speaker = "リノ"
# 「成長しても、親子なんだから恥ずかしがらなくて大丈夫よ。ねぇ、久しぶりにお願～い♪」
line = "「成長しても、親子なんだから恥ずかしがらなくて大丈夫よ。ねぇ、久しぶりにお願～い♪」"

[[dialogue]]
speaker = "リノ"
# 「――いいの？　ふふっ、優しい息子でお母さん嬉しいわ♪　その時は、お母さんもクロトに塗ってあげるわね♪」
line = "「――いいの？　ふふっ、優しい息子でお母さん嬉しいわ♪　その時は、お母さんもクロトに塗ってあげるわね♪」"

[[dialogue]]
speaker = "リコリンフィア"
# 「全く……相変わらず、恋人のようなイチャイチャっぷりだな、リノ」
line = "「全く……相変わらず、恋人のようなイチャイチャっぷりだな、リノ」"

[[dialogue]]
speaker = "リノ"
# 「あら、リコ。ふふっ、いいでしょ～♪　羨ましい？」
line = "「あら、リコ。ふふっ、いいでしょ～♪　羨ましい？」"

[[dialogue]]
speaker = "unk"
# リコさんも、ありがとうございました
line = "リコさんも、ありがとうございました"

[[dialogue]]
speaker = "リコリンフィア"
# 「こちらこそ協力に感謝する、少年。キミのおかげでユゴスの幹部をついに捕らえることができた」
line = "「こちらこそ協力に感謝する、少年。キミのおかげでユゴスの幹部をついに捕らえることができた」"

[[dialogue]]
speaker = "リコリンフィア"
# 「そして、キミを囮にしたことに関しては、心から謝罪する。申し訳なかった」
line = "「そして、キミを囮にしたことに関しては、心から謝罪する。申し訳なかった」"

[[dialogue]]
speaker = "unk"
# 俺は首を横に振る。自分で協力すると決めたのだから、そこに関して俺は、何も思うところはない。
line = "俺は首を横に振る。自分で協力すると決めたのだから、そこに関して俺は、何も思うところはない。"

[[dialogue]]
speaker = "リコリンフィア"
# 「そうか。ふっ……少年はマインが言っていた通り、本当にお人好しだな」
line = "「そうか。ふっ……少年はマインが言っていた通り、本当にお人好しだな」"

[[dialogue]]
speaker = "unk"
# リコさんも、素敵な大人です
line = "リコさんも、素敵な大人です"

[[dialogue]]
speaker = "リコリンフィア"
# 「ほう、そんな褒め方をすると、お姉さん、ますます少年のことを気に入ってしまうぞ？　ふふっ」
line = "「ほう、そんな褒め方をすると、お姉さん、ますます少年のことを気に入ってしまうぞ？　ふふっ」"

[[dialogue]]
speaker = "リコリンフィア"
# 「まあ、とりあえず、顔見知りになった以上、これから学園で会う機会も増えるだろう。その時は――」
line = "「まあ、とりあえず、顔見知りになった以上、これから学園で会う機会も増えるだろう。その時は――」"

[[dialogue]]
speaker = "リコリンフィア"
# 「附属生の後輩として、リコリンのこともよろしくね、お兄ちゃん♪」
line = "「附属生の後輩として、リコリンのこともよろしくね、お兄ちゃん♪」"

[[dialogue]]
speaker = "リコリンフィア"
# 「てへっ♪」
line = "「てへっ♪」"

[[dialogue]]
speaker = "unk"
# ちょっとだけリコリンになり切ってみせた後、リコさんは再び大人のお姉さんの顔に戻って――
line = "ちょっとだけリコリンになり切ってみせた後、リコさんは再び大人のお姉さんの顔に戻って――"

[[dialogue]]
speaker = "リコリンフィア"
# 「――さてと」
line = "「――さてと」"

[[dialogue]]
speaker = "リコリンフィア"
# 「公安委員会エージェントの諸君、注目～！」
line = "「公安委員会エージェントの諸君、注目～！」"

[[dialogue]]
speaker = "リコリンフィア"
# 「さっき買い出しに行った時、花火を買い込んできたから、みんなでやるぞ～！」
line = "「さっき買い出しに行った時、花火を買い込んできたから、みんなでやるぞ～！」"

[[dialogue]]
speaker = "せつな"
# 「おぉ～～～♪　さすがは本部長殿にござる！」
line = "「おぉ～～～♪　さすがは本部長殿にござる！」"

[[dialogue]]
speaker = "シアン"
# 「花火とか、もう長いことやってないな」
line = "「花火とか、もう長いことやってないな」"

[[dialogue]]
speaker = "セナリィ"
# 「そういえば私も、花火は生まれて１度もやったことがありませんわね」
line = "「そういえば私も、花火は生まれて１度もやったことがありませんわね」"

[[dialogue]]
speaker = "ミネコ"
# 「えっ、そうなの？　ならば、私がやり方を教えてあげよう！」
line = "「えっ、そうなの？　ならば、私がやり方を教えてあげよう！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「きゃはははっ☆　怪盗紳士の姿だと、めっちゃシュールなんだけど！」
line = "「きゃはははっ☆　怪盗紳士の姿だと、めっちゃシュールなんだけど！」"

[[dialogue]]
speaker = "リノ"
# 「ふふっ、お母さんもみんなと一緒にしていいかしら？」
line = "「ふふっ、お母さんもみんなと一緒にしていいかしら？」"

[[dialogue]]
speaker = "ミネコ"
# 「ええ、もちろん！　美しき魔女様、この大怪盗フランボウがエスコート致しましょう。ささ、どうぞこちらへ♪」
line = "「ええ、もちろん！　美しき魔女様、この大怪盗フランボウがエスコート致しましょう。ささ、どうぞこちらへ♪」"

[[dialogue]]
speaker = "リノ"
# 「あら、怪盗紳士さん、お上手♪　よろしくね♪」
line = "「あら、怪盗紳士さん、お上手♪　よろしくね♪」"

[[dialogue]]
speaker = "unk"
# それから、俺は母さんや大怪盗、公安委員会の面々と、楽しく花火で盛り上がるのだった――
line = "それから、俺は母さんや大怪盗、公安委員会の面々と、楽しく花火で盛り上がるのだった――"
