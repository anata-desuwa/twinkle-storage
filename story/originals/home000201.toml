[[dialogue]]
speaker = "メイプル"
# 「にっひっひ……！　魔王マカロン様参上～っ！　待ちくたびれちゃったかな、お兄ちゃんっ♪」
line = "「にっひっひ……！　魔王マカロン様参上～っ！　待ちくたびれちゃったかな、お兄ちゃんっ♪」"

[[dialogue]]
speaker = "ナナカ"
# 「なんでいなんでい！　いきなり出てきて妹ヒロインムーブたぁ、ちょっと目立ち過ぎなんじゃないの？」
line = "「なんでいなんでい！　いきなり出てきて妹ヒロインムーブたぁ、ちょっと目立ち過ぎなんじゃないの？」"

[[dialogue]]
speaker = "ロロット"
# 「そうです！　わたしもかわいい後輩ポジションなので、ちやほやされたいです～！」
line = "「そうです！　わたしもかわいい後輩ポジションなので、ちやほやされたいです～！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ていうか、急にどうしちゃったのよメイプル！　あなた、いつもはもうちょっとだけイタい感じだったじゃない！」
line = "「ていうか、急にどうしちゃったのよメイプル！　あなた、いつもはもうちょっとだけイタい感じだったじゃない！」"

[[dialogue]]
speaker = "フィオナ"
# 「あの……言葉のオブラートを突き破ってますし、さすがに少し失礼なのでは……？」
line = "「あの……言葉のオブラートを突き破ってますし、さすがに少し失礼なのでは……？」"

[[dialogue]]
speaker = "メイプル"
# 「だいぶ失礼だよっ！　この魔王マカロン様に向かって～っ！」
line = "「だいぶ失礼だよっ！　この魔王マカロン様に向かって～っ！」"

[[dialogue]]
speaker = "ロロット"
# 「まあ、おいしそうなお名前だということはわかりました」
line = "「まあ、おいしそうなお名前だということはわかりました」"

[[dialogue]]
speaker = "ナナカ"
# 「へんっ、どっちも甘いって？　アタシもスウィーツには一家言あるんでね。覚悟しな！」
line = "「へんっ、どっちも甘いって？　アタシもスウィーツには一家言あるんでね。覚悟しな！」"

[[dialogue]]
speaker = "メイプル"
# 「ちょっとはあたしの話を聞いてよ～っ！」
line = "「ちょっとはあたしの話を聞いてよ～っ！」"

[[dialogue]]
speaker = "聖沙"
# 「はぁ……他に突っ込むところは、いくらでもあるでしょうに。まったく、緊張感の欠片もないんだからっ」
line = "「はぁ……他に突っ込むところは、いくらでもあるでしょうに。まったく、緊張感の欠片もないんだからっ」"

[[dialogue]]
speaker = "リア"
# 「あはは……ナナカちゃんもロロットちゃんも、不思議な出来事には、意外と順応性があるのかも……？」
line = "「あはは……ナナカちゃんもロロットちゃんも、不思議な出来事には、意外と順応性があるのかも……？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あっ、聖沙！　それにリアさんも！」
line = "「あっ、聖沙！　それにリアさんも！」"

[[dialogue]]
speaker = "フィオナ"
# 「ということはもしかして、あなたたちもクルセイダースの仲間なんですか……!?」
line = "「ということはもしかして、あなたたちもクルセイダースの仲間なんですか……!?」"

[[dialogue]]
speaker = "ナナカ"
# 「おっと、名乗り遅れちゃったね。流星生徒会会計、夕霧ナナカたぁ、アタシのことでい！」
line = "「おっと、名乗り遅れちゃったね。流星生徒会会計、夕霧ナナカたぁ、アタシのことでい！」"

[[dialogue]]
speaker = "ロロット"
# 「同じく、生徒会書記の、ロロット・ローゼンクロイツなのです！」
line = "「同じく、生徒会書記の、ロロット・ローゼンクロイツなのです！」"

[[dialogue]]
speaker = "ルリエル"
# 「おやおや、ご冗談を。わたしこそが、ロロット・ローゼンクロイツです！」
line = "「おやおや、ご冗談を。わたしこそが、ロロット・ローゼンクロイツです！」"

[[dialogue]]
speaker = "ナナカ"
# 「えっ……じゃあ、このロロちゃんは誰？」
line = "「えっ……じゃあ、このロロちゃんは誰？」"

[[dialogue]]
speaker = "ロロット"
# 「はて？　少なくとも、天使ではありません」
line = "「はて？　少なくとも、天使ではありません」"

[[dialogue]]
speaker = "聖沙"
# 「あぁ、この展開、なんだか既視感が……」
line = "「あぁ、この展開、なんだか既視感が……」"

[[dialogue]]
speaker = "フィオナ"
# 「ちょっとルリエル！　あなたまさか、また厄介なことに巻き込まれてしまったのでは……!?」
line = "「ちょっとルリエル！　あなたまさか、また厄介なことに巻き込まれてしまったのでは……!?」"

[[dialogue]]
speaker = "ルリエル"
# 「いえいえ、とても楽しいことですよ～」
line = "「いえいえ、とても楽しいことですよ～」"

[[dialogue]]
speaker = "ロロット"
# 「おお、それはとっても楽しみなのです！」
line = "「おお、それはとっても楽しみなのです！」"

[[dialogue]]
speaker = "ナナカ"
# 「ノリが適当すぎる！　本物！」
line = "「ノリが適当すぎる！　本物！」"

[[dialogue]]
speaker = "メイプル"
# 「んも～っ！　茶番はそこまでだよっ！　み～んなおとなしく、あたしの目的のためにやっつけられちゃってよねっ！」
line = "「んも～っ！　茶番はそこまでだよっ！　み～んなおとなしく、あたしの目的のためにやっつけられちゃってよねっ！」"

[[dialogue]]
speaker = "ナナカ"
# 「えっ、なんか思ってたよりマジっぽかった！　一体全体どうなっちまうんでい！」
line = "「えっ、なんか思ってたよりマジっぽかった！　一体全体どうなっちまうんでい！」"

[[dialogue]]
speaker = "パッキー"
# 「クックック……真相は、三日後に始まる、『ティンクル☆くるせいだーす』コラボ第二弾で、確かめるんだぜ！」
line = "「クックック……真相は、三日後に始まる、『ティンクル☆くるせいだーす』コラボ第二弾で、確かめるんだぜ！」"

[[dialogue]]
speaker = "リア"
# 「あ、また何か企んでるよね、これ……」
line = "「あ、また何か企んでるよね、これ……」"

[[dialogue]]
speaker = "メイプル"
# 「にひひっ♪　ってことで、コラボ開始を楽しみにしててよねっ、お兄ちゃんっ♪」
line = "「にひひっ♪　ってことで、コラボ開始を楽しみにしててよねっ、お兄ちゃんっ♪」"
