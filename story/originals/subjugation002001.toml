[[dialogue]]
speaker = "unk"
# バレンタインデーを数日後に控えた、ある日の放課後──俺は流星星徒会からお誘いを受けた。
line = "バレンタインデーを数日後に控えた、ある日の放課後──俺は流星星徒会からお誘いを受けた。"

[[dialogue]]
speaker = "フィオナ"
# 「あっ、緋宮会長。お待ちしておりました。ご足労いただきありがとうございます」
line = "「あっ、緋宮会長。お待ちしておりました。ご足労いただきありがとうございます」"

[[dialogue]]
speaker = "セーラ"
# 「やっほ～、会長さん♪　どおどお、このカフェテリアの盛り上がり！」
line = "「やっほ～、会長さん♪　どおどお、このカフェテリアの盛り上がり！」"

[[dialogue]]
speaker = "unk"
# みんなチョコレートを作ってるの？
line = "みんなチョコレートを作ってるの？"

[[dialogue]]
speaker = "unk"
# 流星学園の女子でいっぱいだね
line = "流星学園の女子でいっぱいだね"

[[dialogue]]
speaker = "フィオナ"
# 「はい。今日からバレンタイン当日まで、放課後はずっとこんな風に賑やかになると思います」
line = "「はい。今日からバレンタイン当日まで、放課後はずっとこんな風に賑やかになると思います」"

[[dialogue]]
speaker = "セーラ"
# 「新星学園と違って、<ruby=うち>流星</ruby>のバレンタインは本校と附属校が一緒に盛り上げる催しになってるんだ～」
line = "「新星学園と違って、<ruby>流星<rt>うち</rt></ruby>のバレンタインは本校と附属校が一緒に盛り上げる催しになってるんだ～」"

[[dialogue]]
speaker = "セーラ"
# 「流星学園では『エンジェルチョコレート制度』って呼ばれてるんだけど……あ、やっぱり聞いたことない？」
line = "「流星学園では『エンジェルチョコレート制度』って呼ばれてるんだけど……あ、やっぱり聞いたことない？」"

[[dialogue]]
speaker = "セーラ"
# 「それじゃあ説明しちゃうね～。これからしばらく、カフェテリアは貸し切りみたいになっちゃうだろーし」
line = "「それじゃあ説明しちゃうね～。これからしばらく、カフェテリアは貸し切りみたいになっちゃうだろーし」"

[[dialogue]]
speaker = "フィオナ"
# 「エンジェルチョコレート制度は、流星学園の本校生と附属校生を１名ずつ、ランダムで選んでペアとなり、チョコ作りを楽しむ行事です」
line = "「エンジェルチョコレート制度は、流星学園の本校生と附属校生を１名ずつ、ランダムで選んでペアとなり、チョコ作りを楽しむ行事です」"

[[dialogue]]
speaker = "フィオナ"
# 「この時、できる限り委員会も部活動も違う生徒同士が組むルールになってまして、多くの生徒が初対面の先輩と後輩でペアになるんですよ」
line = "「この時、できる限り委員会も部活動も違う生徒同士が組むルールになってまして、多くの生徒が初対面の先輩と後輩でペアになるんですよ」"

[[dialogue]]
speaker = "セーラ"
# 「そうそう♪　そうやって選ばれた２人で協力して、チョコレート作りをエンジョイするの！　制度なんて言ってるけど、ゆる～い学園行事だよ」
line = "「そうそう♪　そうやって選ばれた２人で協力して、チョコレート作りをエンジョイするの！　制度なんて言ってるけど、ゆる～い学園行事だよ」"

[[dialogue]]
speaker = "フィオナ"
# 「確かにゆるい取り組みではありますが、流星市国の冬のイベントとしても有名なんですよ？」
line = "「確かにゆるい取り組みではありますが、流星市国の冬のイベントとしても有名なんですよ？」"

[[dialogue]]
speaker = "セーラ"
# 「そうだねぇ。なにせフィオナちゃんの実家、教皇庁とも連動したイベントだから」
line = "「そうだねぇ。なにせフィオナちゃんの実家、教皇庁とも連動したイベントだから」"

[[dialogue]]
speaker = "セーラ"
# 「ペアになった２人は、バレンタイン当日までにたくさんのミニチョコレートを作るの」
line = "「ペアになった２人は、バレンタイン当日までにたくさんのミニチョコレートを作るの」"

[[dialogue]]
speaker = "フィオナ"
# 「学園生が作ったチョコは大聖堂に集められて、バレンタインデーに一般の方々へ配られるんです」
line = "「学園生が作ったチョコは大聖堂に集められて、バレンタインデーに一般の方々へ配られるんです」"

[[dialogue]]
speaker = "フィオナ"
# 「チョコレートには必ず、微弱な星力を込めておくのが決まりになっています。ちょっとしたおまじないみたいな感じで……」
line = "「チョコレートには必ず、微弱な星力を込めておくのが決まりになっています。ちょっとしたおまじないみたいな感じで……」"

[[dialogue]]
speaker = "セーラ"
# 「うんうん♪　星騎士お手製の星力チョコってことで、ご利益あるかも～とか、とっても甘い～、とか！　毎年評判なんだよね～♪」
line = "「うんうん♪　星騎士お手製の星力チョコってことで、ご利益あるかも～とか、とっても甘い～、とか！　毎年評判なんだよね～♪」"

[[dialogue]]
speaker = "フィオナ"
# 「流星市国に住む方々にとってなじみの深いお祭りなので、とっても盛り上がるんですよ」
line = "「流星市国に住む方々にとってなじみの深いお祭りなので、とっても盛り上がるんですよ」"

[[dialogue]]
speaker = "セーラ"
# 「会長さんを呼び出したのも、イベント内容の説明とお誘いができればと思ってね♪」
line = "「会長さんを呼び出したのも、イベント内容の説明とお誘いができればと思ってね♪」"

[[dialogue]]
speaker = "フィオナ"
# 「当日はぜひ、甘い物が好きな新星学園の方々も誘って、大聖堂にお越しください。流星学園がおもてなしいたします！」
line = "「当日はぜひ、甘い物が好きな新星学園の方々も誘って、大聖堂にお越しください。流星学園がおもてなしいたします！」"

[[dialogue]]
speaker = "unk"
# お誘いありがとう、絶対に行くよ
line = "お誘いありがとう、絶対に行くよ"

[[dialogue]]
speaker = "セーラ"
# 「あ、そうそう。さっきも言ったとおり、バレンタインデーまで放課後のカフェテリアは、チョコ作りの会場になるからね」
line = "「あ、そうそう。さっきも言ったとおり、バレンタインデーまで放課後のカフェテリアは、チョコ作りの会場になるからね」"

[[dialogue]]
speaker = "セーラ"
# 「流星の女の子にも仲良しな子、いっぱいいるでしょ？　その子のところに行けば、味見させてくれるかもよん♪」
line = "「流星の女の子にも仲良しな子、いっぱいいるでしょ？　その子のところに行けば、味見させてくれるかもよん♪」"

[[dialogue]]
speaker = "フィオナ"
# 「レシピをアレンジしたり、一風変わったチョコを作りたがる生徒も多いですから。試食を頼まれたら、付き合ってあげてください」
line = "「レシピをアレンジしたり、一風変わったチョコを作りたがる生徒も多いですから。試食を頼まれたら、付き合ってあげてください」"

[[dialogue]]
speaker = "unk"
# ──あんな風に？
line = "──あんな風に？"

[[dialogue]]
speaker = "ルリエル"
# 「はうう～、このチョコレート、とっっっても美味しいのです<emoji=heart04>　ほっぺが落ちちゃいそうです～。ご馳走様でした！」
line = "「はうう～、このチョコレート、とっっっても美味しいのです<emoji=heart04>　ほっぺが落ちちゃいそうです～。ご馳走様でした！」"

[[dialogue]]
speaker = "ルリエル"
# 「わぁ、こっちのチョコ、マシュマロにとろりとかかっているのです……！　えっ、味見していいんですか？　やった～、いただきます♪」
line = "「わぁ、こっちのチョコ、マシュマロにとろりとかかっているのです……！　えっ、味見していいんですか？　やった～、いただきます♪」"

[[dialogue]]
speaker = "ルリエル"
# 「こっちのホワイトチョコも豪華ですねぇ！　いえいえ、おねだりしてるわけじゃないのですが……わーい♪　くれるならありがたく！」
line = "「こっちのホワイトチョコも豪華ですねぇ！　いえいえ、おねだりしてるわけじゃないのですが……わーい♪　くれるならありがたく！」"

[[dialogue]]
speaker = "ルリエル"
# 「流星学園のバレンタイン……とっても素晴らしいのです！」
line = "「流星学園のバレンタイン……とっても素晴らしいのです！」"

[[dialogue]]
speaker = "ルリエル"
# 「試食をすればおやつ代もかかりませんし……これがパラダイスってやつですか！？」
line = "「試食をすればおやつ代もかかりませんし……これがパラダイスってやつですか！？」"

[[dialogue]]
speaker = "女子生徒"
# 「ルリちゃん、私たちのチョコも試食してもらっていい？」
line = "「ルリちゃん、私たちのチョコも試食してもらっていい？」"

[[dialogue]]
speaker = "ルリエル"
# 「は～い！　チョコの試食は、流星星徒会のルリエルにお任せなのです～っ♪」
line = "「は～い！　チョコの試食は、流星星徒会のルリエルにお任せなのです～っ♪」"

[[dialogue]]
speaker = "セーラ"
# 「あはっ、ヤバ～い♪　あんなに立て続けにチョコ食べちゃって。ルリちー、流石の甘党だね～」
line = "「あはっ、ヤバ～い♪　あんなに立て続けにチョコ食べちゃって。ルリちー、流石の甘党だね～」"

[[dialogue]]
speaker = "フィオナ"
# 「ルリエルったら。あまり食べすぎたらダメとさっき言ったばかり……というか、ペアの附属生が困ってるじゃないですか……！」
line = "「ルリエルったら。あまり食べすぎたらダメとさっき言ったばかり……というか、ペアの附属生が困ってるじゃないですか……！」"

[[dialogue]]
speaker = "フィオナ"
# 「すみません、緋宮会長。ちょっとルリエルにお小言を言ってきます」
line = "「すみません、緋宮会長。ちょっとルリエルにお小言を言ってきます」"

[[dialogue]]
speaker = "セーラ"
# 「あとでうちのチョコの味見にも来てね～。それじゃっ♪」
line = "「あとでうちのチョコの味見にも来てね～。それじゃっ♪」"

[[dialogue]]
speaker = "unk"
# さて──俺も新星の星徒会室に戻る前に、知り合いに声をかけてチョコの１つでも味見させてもらおうかな？
line = "さて──俺も新星の星徒会室に戻る前に、知り合いに声をかけてチョコの１つでも味見させてもらおうかな？"

[[dialogue]]
speaker = "ウズメイア"
# 「あ～！　めっちゃ偶然～！！」
line = "「あ～！　めっちゃ偶然～！！」"

[[dialogue]]
speaker = "unk"
# この声は……！
line = "この声は……！"

[[dialogue]]
speaker = "ウズメイア"
# 「会長くんじゃん！　ちょりっす～<emoji=heart04>」
line = "「会長くんじゃん！　ちょりっす～<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 流星学園に通う友人・<ruby=あめの>雨野</ruby>ウズメイアが、見たことのない可憐な衣装をまとって登場したのだった──
line = "流星学園に通う友人・<ruby>雨野<rt>あめの</rt></ruby>ウズメイアが、見たことのない可憐な衣装をまとって登場したのだった──"
