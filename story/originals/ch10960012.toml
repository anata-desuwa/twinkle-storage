[[dialogue]]
speaker = "unk"
# 第２話,コラプサー襲撃？,P
line = "第２話,コラプサー襲撃？,P"

[[dialogue]]
speaker = "イングリット"
# 「新星学園……ここが魔王の城か。魔王のくせに随分と小奇麗な場所に住んでいるんだな」
line = "「新星学園……ここが魔王の城か。魔王のくせに随分と小奇麗な場所に住んでいるんだな」"

[[dialogue]]
speaker = "イングリット"
# 「まあいい、ひとまずこの校門を破壊して中に入るか」
line = "「まあいい、ひとまずこの校門を破壊して中に入るか」"

[[dialogue]]
speaker = "unk"
# よくないよくない
line = "よくないよくない"

[[dialogue]]
speaker = "イングリット"
# 「魔王。この私を迎えに来るとは殊勝な心掛けだな」
line = "「魔王。この私を迎えに来るとは殊勝な心掛けだな」"

[[dialogue]]
speaker = "unk"
# 不審者が学園の前にいるって通報があったから
line = "不審者が学園の前にいるって通報があったから"

[[dialogue]]
speaker = "イングリット"
# 「不審者？　ヴァレリーならアジトにいたが……あいつのことじゃない？　まぁいい」
line = "「不審者？　ヴァレリーならアジトにいたが……あいつのことじゃない？　まぁいい」"

[[dialogue]]
speaker = "イングリット"
# 「魔王よ。ここに私が来た理由は当然分かっているな？」
line = "「魔王よ。ここに私が来た理由は当然分かっているな？」"

[[dialogue]]
speaker = "イングリット"
# 「──そう、決闘だ。私と再び戦ってもらう。覚悟はいいか」
line = "「──そう、決闘だ。私と再び戦ってもらう。覚悟はいいか」"

[[dialogue]]
speaker = "unk"
# 悪いけど、ここでも戦えない
line = "悪いけど、ここでも戦えない"

[[dialogue]]
speaker = "イングリット"
# 「なんだと？　ここなら存分に暴れても問題ないだろう」
line = "「なんだと？　ここなら存分に暴れても問題ないだろう」"

[[dialogue]]
speaker = "イングリット"
# 「生徒が巻き込まれるのが問題……だと？　ここにいるのは星騎士ばかりなのだろう？　自分の身くらい自分で守れるんじゃないのか」
line = "「生徒が巻き込まれるのが問題……だと？　ここにいるのは星騎士ばかりなのだろう？　自分の身くらい自分で守れるんじゃないのか」"

[[dialogue]]
speaker = "イングリット"
# 「力のない星騎士は犠牲になるかもしれんが、まあ問題あるまい。弱き者は淘汰されて当然だ」
line = "「力のない星騎士は犠牲になるかもしれんが、まあ問題あるまい。弱き者は淘汰されて当然だ」"

[[dialogue]]
speaker = "イングリット"
# 「……フン、誰か１人でも傷つくのは許せないといった顔だな。随分とお優しい魔王だ」
line = "「……フン、誰か１人でも傷つくのは許せないといった顔だな。随分とお優しい魔王だ」"

[[dialogue]]
speaker = "イングリット"
# 「だが貴様の考えなど私には関係ない。最初から貴様に選択権などないのだからな！」
line = "「だが貴様の考えなど私には関係ない。最初から貴様に選択権などないのだからな！」"

[[dialogue]]
speaker = "フラン"
# 「イングリット！！！」
line = "「イングリット！！！」"

[[dialogue]]
speaker = "イングリット"
# 「貴様……ああ、フランか」
line = "「貴様……ああ、フランか」"

[[dialogue]]
speaker = "フラン"
# 「久しぶりだなイングリット！　まさかコラプサーになってやがるとは思いもしなかったぜ！」
line = "「久しぶりだなイングリット！　まさかコラプサーになってやがるとは思いもしなかったぜ！」"

[[dialogue]]
speaker = "イングリット"
# 「フン、更なる力を手に入れたまでだ。貴様も星騎士など辞めてコラプサーになってみるか？」
line = "「フン、更なる力を手に入れたまでだ。貴様も星騎士など辞めてコラプサーになってみるか？」"

[[dialogue]]
speaker = "フラン"
# 「ふざけるな！　コラプサーになんてなるわけないだろ！」
line = "「ふざけるな！　コラプサーになんてなるわけないだろ！」"

[[dialogue]]
speaker = "unk"
# ２人は知り合いなの？
line = "２人は知り合いなの？"

[[dialogue]]
speaker = "フラン"
# 「ああ、オレとイングリットは同じ天界の武闘都市ウリルの出身だ。星騎士になる前はよくいろんな勝負してたんだが……」
line = "「ああ、オレとイングリットは同じ天界の武闘都市ウリルの出身だ。星騎士になる前はよくいろんな勝負してたんだが……」"

[[dialogue]]
speaker = "イングリット"
# 「過去の話だ。私はもうあの頃とは違う」
line = "「過去の話だ。私はもうあの頃とは違う」"

[[dialogue]]
speaker = "フラン"
# 「だろうな。コラプサーなんかになりやがって……！」
line = "「だろうな。コラプサーなんかになりやがって……！」"

[[dialogue]]
speaker = "イングリット"
# 「私もコラプサーになりたくてなったわけではない。元は星騎士になるべく鍛錬をしていたのだからな」
line = "「私もコラプサーになりたくてなったわけではない。元は星騎士になるべく鍛錬をしていたのだからな」"

[[dialogue]]
speaker = "イングリット"
# 「だが……結果としてより強い力を得られたのだから、巡り会わせには感謝すべきかもな」
line = "「だが……結果としてより強い力を得られたのだから、巡り会わせには感謝すべきかもな」"

[[dialogue]]
speaker = "フラン"
# 「けっ、そんなに強さが大事かよ」
line = "「けっ、そんなに強さが大事かよ」"

[[dialogue]]
speaker = "イングリット"
# 「当たり前だ。強さこそが全てに優先される」
line = "「当たり前だ。強さこそが全てに優先される」"

[[dialogue]]
speaker = "フラン"
# 「そういうところは昔から変わんねえな！　この戦闘狂の人格破綻者め！」
line = "「そういうところは昔から変わんねえな！　この戦闘狂の人格破綻者め！」"

[[dialogue]]
speaker = "イングリット"
# 「その通り、戦いこそが私の生きる理由だ！」
line = "「その通り、戦いこそが私の生きる理由だ！」"

[[dialogue]]
speaker = "フラン"
# 「褒めてねえよ！　クソ、調子が狂うな……！」
line = "「褒めてねえよ！　クソ、調子が狂うな……！」"

[[dialogue]]
speaker = "イングリット"
# 「かかってこい、フラン。今の貴様が私に及ぶとは思わんが、魔王の前哨戦くらいにはなるだろう」
line = "「かかってこい、フラン。今の貴様が私に及ぶとは思わんが、魔王の前哨戦くらいにはなるだろう」"

[[dialogue]]
speaker = "フラン"
# 「ケンカ売りやがって……！　後悔させてやる！」
line = "「ケンカ売りやがって……！　後悔させてやる！」"

[[dialogue]]
speaker = "イングリット"
# 「届かんな。貴様の実力はその程度か？」
line = "「届かんな。貴様の実力はその程度か？」"

[[dialogue]]
speaker = "フラン"
# 「まだまだ！　これで終わりじゃねえぞ！」
line = "「まだまだ！　これで終わりじゃねえぞ！」"

[[dialogue]]
speaker = "マトイ"
# 「会長！　なんの騒ぎ！？」
line = "「会長！　なんの騒ぎ！？」"

[[dialogue]]
speaker = "アナ"
# 「何やら学園前で戦闘が起きているようですが」
line = "「何やら学園前で戦闘が起きているようですが」"

[[dialogue]]
speaker = "unk"
# コラプサーが襲撃してきた
line = "コラプサーが襲撃してきた"

[[dialogue]]
speaker = "マトイ"
# 「ええっ！？　コラプサーがカチコミに！？」
line = "「ええっ！？　コラプサーがカチコミに！？」"

[[dialogue]]
speaker = "アナ"
# 「あそこでコラプサーと戦っているのは……フラン先輩ですね」
line = "「あそこでコラプサーと戦っているのは……フラン先輩ですね」"

[[dialogue]]
speaker = "フラン"
# 「はぁはぁ……あの頃よりやるようになったじゃねえか、イングリット……！」
line = "「はぁはぁ……あの頃よりやるようになったじゃねえか、イングリット……！」"

[[dialogue]]
speaker = "イングリット"
# 「貴様も思ったよりはやるようだな。あの頃のままではないようだ」
line = "「貴様も思ったよりはやるようだな。あの頃のままではないようだ」"

[[dialogue]]
speaker = "フラン"
# 「フン、余裕こきやがって！　吠え面をかかせてやる！」
line = "「フン、余裕こきやがって！　吠え面をかかせてやる！」"

[[dialogue]]
speaker = "マトイ"
# 「うわわっ、すごい戦い！　会長どうにかしないと！」
line = "「うわわっ、すごい戦い！　会長どうにかしないと！」"

[[dialogue]]
speaker = "アナ"
# 「このままでは学園が崩壊してしまいます。早急に戦闘を止めましょう」
line = "「このままでは学園が崩壊してしまいます。早急に戦闘を止めましょう」"

[[dialogue]]
speaker = "unk"
# 校門の前で乱戦になるかと思ったその時──
line = "校門の前で乱戦になるかと思ったその時──"

[[dialogue]]
speaker = "キサナ"
# 「テメェ何勝手なことしてやがる！」
line = "「テメェ何勝手なことしてやがる！」"

[[dialogue]]
speaker = "イングリット"
# 「ぐはぁああっ！？」
line = "「ぐはぁああっ！？」"

[[dialogue]]
speaker = "unk"
# 追いかけてきたキサナがイングリットを殴り倒し、彼女を連れ帰ったのだった……
line = "追いかけてきたキサナがイングリットを殴り倒し、彼女を連れ帰ったのだった……"
