[[dialogue]]
speaker = "フラン"
# 「うおおおっ！　ブレイズアサルトッ！」
line = "「うおおおっ！　ブレイズアサルトッ！」"

[[dialogue]]
speaker = "クロト"
# 「サタニックグレイスッ！」
line = "「サタニックグレイスッ！」"

[[dialogue]]
speaker = "unk"
# 俺たちが同時に放った技が激しくぶつかり、轟音を伴って弾けた。
line = "俺たちが同時に放った技が激しくぶつかり、轟音を伴って弾けた。"

[[dialogue]]
speaker = "unk"
# しかし、星術の練度や純粋な攻撃力は俺の方が上だ。
line = "しかし、星術の練度や純粋な攻撃力は俺の方が上だ。"

[[dialogue]]
speaker = "フラン"
# 「いてて……！　あんた、やっぱり強ぇな……前の立ち会いからかなり鍛えたつもりだったけど、まだまだ敵わねえのか」
line = "「いてて……！　あんた、やっぱり強ぇな……前の立ち会いからかなり鍛えたつもりだったけど、まだまだ敵わねえのか」"

[[dialogue]]
speaker = "フラン"
# 「あーあ、オレの負けだ、負け！　約束だ。負けちまったからには、あんたの要求に応えねえとな」
line = "「あーあ、オレの負けだ、負け！　約束だ。負けちまったからには、あんたの要求に応えねえとな」"

[[dialogue]]
speaker = "フラン"
# 「どうする？　星徒会での雑用奉仕？　逆立ちで渋谷一周？　なんでもやってやるよ、女に二言はねえ！」
line = "「どうする？　星徒会での雑用奉仕？　逆立ちで渋谷一周？　なんでもやってやるよ、女に二言はねえ！」"

[[dialogue]]
speaker = "unk"
# 俺の力に屈服し、傷ついたフランを見ていると、そのいろいろを全部差し置いて、不埒な感情がムクムクと湧き上がってきた。
line = "俺の力に屈服し、傷ついたフランを見ていると、そのいろいろを全部差し置いて、不埒な感情がムクムクと湧き上がってきた。"

[[dialogue]]
speaker = "フラン"
# 「……ん？　お、おい、あんたの股間、デッカくなってねえか？」
line = "「……ん？　お、おい、あんたの股間、デッカくなってねえか？」"

[[dialogue]]
speaker = "フラン"
# 「いや、いやいや！　なんでもするとは言ったけどよ。まさか、こんなとこでヤるつもりじゃねえだろうな……！？」
line = "「いや、いやいや！　なんでもするとは言ったけどよ。まさか、こんなとこでヤるつもりじゃねえだろうな……！？」"

[[dialogue]]
speaker = "クロト"
# 「女に二言はないんだよな？」
line = "「女に二言はないんだよな？」"

[[dialogue]]
speaker = "フラン"
# 「ね、ねえけど――うわあぁあああああぁっ！？」
line = "「ね、ねえけど――うわあぁあああああぁっ！？」"

[[dialogue]]
speaker = "フラン"
# 「バ、バカ！　こんなところでち○ぽ出すんじゃねえよ！」
line = "「バ、バカ！　こんなところでち○ぽ出すんじゃねえよ！」"

[[dialogue]]
speaker = "クロト"
# 「なんでもするとか言った上、ボロボロになった戦闘服から肌を見せてるフランのエロさが悪い」
line = "「なんでもするとか言った上、ボロボロになった戦闘服から肌を見せてるフランのエロさが悪い」"

[[dialogue]]
speaker = "フラン"
# 「グロリアじゃあるまいし、オレはエロくねえだろ！　あんたが勝手に、発情してるだけでよ……」
line = "「グロリアじゃあるまいし、オレはエロくねえだろ！　あんたが勝手に、発情してるだけでよ……」"

[[dialogue]]
speaker = "クロト"
# 「負けたんだから、なんでも従わないとな？」
line = "「負けたんだから、なんでも従わないとな？」"

[[dialogue]]
speaker = "フラン"
# 「くっ……卑怯だぞっ……！　今までこんなことしなかったろ！　いつもはもっと優しく抱いてくれるのに……！」
line = "「くっ……卑怯だぞっ……！　今までこんなことしなかったろ！　いつもはもっと優しく抱いてくれるのに……！」"

[[dialogue]]
speaker = "unk"
# フランとは既に何度も肌を重ねているけど、こんな乱暴なシチュエーションは初めてだ。
line = "フランとは既に何度も肌を重ねているけど、こんな乱暴なシチュエーションは初めてだ。"

[[dialogue]]
speaker = "unk"
# 愛撫されるまでもなくガチガチに勃起しているペニスを、フランの股間へとあてがう。
line = "愛撫されるまでもなくガチガチに勃起しているペニスを、フランの股間へとあてがう。"

[[dialogue]]
speaker = "フラン"
# 「んぅっ……！？　お、おい、あんたのち○ぽ、いつもより硬くねえ？　こんなシチュでメチャクチャ興奮してるなんて変態かよ……」
line = "「んぅっ……！？　お、おい、あんたのち○ぽ、いつもより硬くねえ？　こんなシチュでメチャクチャ興奮してるなんて変態かよ……」"

[[dialogue]]
speaker = "unk"
# 変態呼ばわりするフランも、いつも以上にぐしょ濡れだ。
line = "変態呼ばわりするフランも、いつも以上にぐしょ濡れだ。"

[[dialogue]]
speaker = "unk"
# 宛がっているペニスを伝うたっぷりの愛液は、何よりも正直に期待を物語っている。
line = "宛がっているペニスを伝うたっぷりの愛液は、何よりも正直に期待を物語っている。"

[[dialogue]]
speaker = "フラン"
# 「ちょっ、マジで挿れる気マンマンなのかよ……！　会長が外でこんなことしてるなんてバレたら、絶対にヤベえだろ」
line = "「ちょっ、マジで挿れる気マンマンなのかよ……！　会長が外でこんなことしてるなんてバレたら、絶対にヤベえだろ」"

[[dialogue]]
speaker = "フラン"
# 「こんな明るいとこで、セックスしちまうなんて……誰かに見られたらどうすんだよ、言い訳できねえぞ……？」
line = "「こんな明るいとこで、セックスしちまうなんて……誰かに見られたらどうすんだよ、言い訳できねえぞ……？」"

[[dialogue]]
speaker = "unk"
# お互いの体はすっかり交わる準備ができているのに、今更どこかに場所を移すなんて、面倒なことはしてられない。
line = "お互いの体はすっかり交わる準備ができているのに、今更どこかに場所を移すなんて、面倒なことはしてられない。"

[[dialogue]]
speaker = "unk"
# フランの両腕を掴み、体を後ろに引き寄せて……
line = "フランの両腕を掴み、体を後ろに引き寄せて……"

[[dialogue]]
speaker = "フラン"
# 「待て、待てって！　今日のあんた、強引すぎっ……んっ、んぅ、ウソだろ、マジで……！？」
line = "「待て、待てって！　今日のあんた、強引すぎっ……んっ、んぅ、ウソだろ、マジで……！？」"

[[dialogue]]
speaker = "フラン"
# 「んぅっ！　くぁ、はぁあぁぁっ……！　は、挿入って、ち〇ぽっ、挿入ってきちゃうぅっ……」
line = "「んぅっ！　くぁ、はぁあぁぁっ……！　は、挿入って、ち〇ぽっ、挿入ってきちゃうぅっ……」"

[[dialogue]]
speaker = "フラン"
# 「んぁはぁあぁぁっ……！　なんだこのち○ぽ、ぶっとすぎだろっ……！　ま○こ、めちゃくちゃ広がってる……！」
line = "「んぁはぁあぁぁっ……！　なんだこのち○ぽ、ぶっとすぎだろっ……！　ま○こ、めちゃくちゃ広がってる……！」"

[[dialogue]]
speaker = "フラン"
# 「はぁ、ふぁぁっ、バカ……こんな、外で……ち〇ぽっ、挿れちまうなんてぇっ………！」
line = "「はぁ、ふぁぁっ、バカ……こんな、外で……ち〇ぽっ、挿れちまうなんてぇっ………！」"

[[dialogue]]
speaker = "unk"
# ペニスが熱い膣粘膜に包まれた瞬間、今までしてきたセックスと明らかに違う征服感に襲われた。
line = "ペニスが熱い膣粘膜に包まれた瞬間、今までしてきたセックスと明らかに違う征服感に襲われた。"

[[dialogue]]
speaker = "フラン"
# 「も、もういいだろ……？　ここでやめようぜ？　誰にも見られないとこなら、何してもいいからさ。な？」
line = "「も、もういいだろ……？　ここでやめようぜ？　誰にも見られないとこなら、何してもいいからさ。な？」"

[[dialogue]]
speaker = "unk"
# 一度挿れて動き始めてしまったら、途中で止められるわけがない。
line = "一度挿れて動き始めてしまったら、途中で止められるわけがない。"

[[dialogue]]
speaker = "unk"
# フランの胸を張らせるように腕を引き、密着感を増しながら、とろとろになっているフランのおま○こを往復する。
line = "フランの胸を張らせるように腕を引き、密着感を増しながら、とろとろになっているフランのおま○こを往復する。"

[[dialogue]]
speaker = "フラン"
# 「ひぅ、んっ、んぅぐっ……話、聞けってえ……！　猿みたいにち〇ぽパコパコぶつけやがって……オレのま〇こ、そんなに気持ちいいのかよっ……！」
line = "「ひぅ、んっ、んぅぐっ……話、聞けってえ……！　猿みたいにち〇ぽパコパコぶつけやがって……オレのま〇こ、そんなに気持ちいいのかよっ……！」"

[[dialogue]]
speaker = "クロト"
# 「ああ、いつもより締まってすごく気持ちいい。フランはこういうプレイが好きなんだな」
line = "「ああ、いつもより締まってすごく気持ちいい。フランはこういうプレイが好きなんだな」"

[[dialogue]]
speaker = "フラン"
# 「バカ言うんじゃねえっ！　す、好きなわけ――んひゃぅっ！　あっ、んぁっ、くぅぅ、ひぎゅっ！」
line = "「バカ言うんじゃねえっ！　す、好きなわけ――んひゃぅっ！　あっ、んぁっ、くぅぅ、ひぎゅっ！」"

[[dialogue]]
speaker = "フラン"
# 「はぁ、はひぃ……ズリぃ、ぞっ……オレの弱いとこばっか、突きやがってぇ……！」
line = "「はぁ、はひぃ……ズリぃ、ぞっ……オレの弱いとこばっか、突きやがってぇ……！」"

[[dialogue]]
speaker = "unk"
# 伊達に何度も交わっちゃいない。フランの膣内のウィークポイントは既に熟知している。例えば、角度をつけて抉れば――
line = "伊達に何度も交わっちゃいない。フランの膣内のウィークポイントは既に熟知している。例えば、角度をつけて抉れば――"

[[dialogue]]
speaker = "フラン"
# 「んきゃぁあぁぁぁんっ！」
line = "「んきゃぁあぁぁぁんっ！」"

[[dialogue]]
speaker = "unk"
# いつものフランからは考えられないくらい、甲高くて可愛い喘ぎが飛び出る。
line = "いつものフランからは考えられないくらい、甲高くて可愛い喘ぎが飛び出る。"

[[dialogue]]
speaker = "フラン"
# 「はっ……！？　ち、違う、からなっ！　今の声は、気持ちいい、とかじゃなくって……！　ち○ぽがデカすぎるから、無理やり押し出されちまっただけで……」
line = "「はっ……！？　ち、違う、からなっ！　今の声は、気持ちいい、とかじゃなくって……！　ち○ぽがデカすぎるから、無理やり押し出されちまっただけで……」"

[[dialogue]]
speaker = "フラン"
# 「はぁ、はっ、くそぉ……オレは変態プレイで感じたりしねえし……！　絶対あんたのち○ぽになんて負けねえからな……勝負だっ！」
line = "「はぁ、はっ、くそぉ……オレは変態プレイで感じたりしねえし……！　絶対あんたのち○ぽになんて負けねえからな……勝負だっ！」"

[[dialogue]]
speaker = "unk"
# その抵抗は、逆効果だ。敗北フラグだ。
line = "その抵抗は、逆効果だ。敗北フラグだ。"

[[dialogue]]
speaker = "unk"
# 『絶対ち○ぽになんて負けない！』と強く抵抗すればするほど、俺の情欲と意地を煽るだけ。
line = "『絶対ち○ぽになんて負けない！』と強く抵抗すればするほど、俺の情欲と意地を煽るだけ。"

[[dialogue]]
speaker = "フラン"
# 「あっ！　あっ、あっ、はぁあんっ……！　ち○ぽ、また膨れたぁ……どこまでデカくなんだよ……！」
line = "「あっ！　あっ、あっ、はぁあんっ……！　ち○ぽ、また膨れたぁ……どこまでデカくなんだよ……！」"

[[dialogue]]
speaker = "フラン"
# 「初めての時だって、こんなデッカくしなかったクセに……無理やり犯して興奮するなんて、バカ、バカ！」
line = "「初めての時だって、こんなデッカくしなかったクセに……無理やり犯して興奮するなんて、バカ、バカ！」"

[[dialogue]]
speaker = "unk"
# そういうフランの膣内も、膣ひだがきゅっきゅっとキツく締めつけてきて、少しでも早く俺をイかせようとしてくる。
line = "そういうフランの膣内も、膣ひだがきゅっきゅっとキツく締めつけてきて、少しでも早く俺をイかせようとしてくる。"

[[dialogue]]
speaker = "unk"
# 恋人セックスの時より反応が良いけれど、こっちも負けちゃいられない。早いとこ快感で屈服させないと。
line = "恋人セックスの時より反応が良いけれど、こっちも負けちゃいられない。早いとこ快感で屈服させないと。"

[[dialogue]]
speaker = "フラン"
# （見えないし、乱暴だし、いつもよりち○ぽデカいから、知らないヤツに犯されてるみたいなのに……）
line = "（見えないし、乱暴だし、いつもよりち○ぽデカいから、知らないヤツに犯されてるみたいなのに……）"

[[dialogue]]
speaker = "フラン"
# （なんでオレ、いつもより感じちまってんだよ……オレ、もしかして、こいつと同じで、変態なのか……！？）」
line = "（なんでオレ、いつもより感じちまってんだよ……オレ、もしかして、こいつと同じで、変態なのか……！？）」"

[[dialogue]]
speaker = "フラン"
# （違え、絶対に違えし！　んなわけねえ……！　オレは普通だ……乱暴にされるより、ベッドでイチャイチャする方が気持ちいいに決まってる……！）
line = "（違え、絶対に違えし！　んなわけねえ……！　オレは普通だ……乱暴にされるより、ベッドでイチャイチャする方が気持ちいいに決まってる……！）"

[[dialogue]]
speaker = "フラン"
# 「ああ、くそっ……！　どうせ、出すまで収まらねぇんだろ！？　オレのま○こ使っていいから、とっととイッちまえっ……！」
line = "「ああ、くそっ……！　どうせ、出すまで収まらねぇんだろ！？　オレのま○こ使っていいから、とっととイッちまえっ……！」"

[[dialogue]]
speaker = "フラン"
# 「ったく……あんたと愛し合ってるとこなんて、誰かに見られたくねえんだよ……」
line = "「ったく……あんたと愛し合ってるとこなんて、誰かに見られたくねえんだよ……」"

[[dialogue]]
speaker = "フラン"
# 「格好いい応援団で通ってるオレが、ち○ぽで喘いでるとこなんて見られたら、ただの女みたいじゃんか……！」
line = "「格好いい応援団で通ってるオレが、ち○ぽで喘いでるとこなんて見られたら、ただの女みたいじゃんか……！」"

[[dialogue]]
speaker = "unk"
# 強がる彼女が、セックスの快感にあっさり屈してしまうただの女の子であるところをもっと引き出したくなった。
line = "強がる彼女が、セックスの快感にあっさり屈してしまうただの女の子であるところをもっと引き出したくなった。"

[[dialogue]]
speaker = "フラン"
# 「ひぃあっ！？　ひぅぐっ！　んぅふっ……だめだって、そこ――んぁっ！　ぅんうぅぅんっっ……<emoji=heart04>」
line = "「ひぃあっ！？　ひぅぐっ！　んぅふっ……だめだって、そこ――んぁっ！　ぅんうぅぅんっっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 子宮口から膣口まで、角度を付けて膣ひだを抉り、満遍なくフランの膣内を擦ると、脚をわななかせて甘い声を漏らす。
line = "子宮口から膣口まで、角度を付けて膣ひだを抉り、満遍なくフランの膣内を擦ると、脚をわななかせて甘い声を漏らす。"

[[dialogue]]
speaker = "フラン"
# （だめ、だめだ……！　負けるわけいかねえのに……いつものセックスと全然違うのにっ……ち○ぽが気持ちよくなるためだけの<ruby=オナホ>慰み物</ruby>にされちまってるのに……<emoji=heart04>）
line = "（だめ、だめだ……！　負けるわけいかねえのに……いつものセックスと全然違うのにっ……ち○ぽが気持ちよくなるためだけの<ruby>慰み物<rt>オナホ</rt></ruby>にされちまってるのに……<emoji=heart04>）"

[[dialogue]]
speaker = "フラン"
# （オレのま○こ、どうしてこんなに感じちまうんだ……<emoji=heart04>　大好きな会長のち○ぽに勝てねえよっ……！）
line = "（オレのま○こ、どうしてこんなに感じちまうんだ……<emoji=heart04>　大好きな会長のち○ぽに勝てねえよっ……！）"

[[dialogue]]
speaker = "フラン"
# 「んぅいひっ！？　はぁ、ほぁ……はぁ、はーっ、はぁーっ……！　立ってらんなく、なるぅ……デカち○ぽで子宮潰されるぅっ……<emoji=heart04>」
line = "「んぅいひっ！？　はぁ、ほぁ……はぁ、はーっ、はぁーっ……！　立ってらんなく、なるぅ……デカち○ぽで子宮潰されるぅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "フラン"
# 「んぅぐっ！　ふぁ、あ、あっあっあっあぁっ！　激しっ、んぁああぁっ、イクっ、イっちゃっ、あっ、あぁあぁーっ！」
line = "「んぅぐっ！　ふぁ、あ、あっあっあっあぁっ！　激しっ、んぁああぁっ、イクっ、イっちゃっ、あっ、あぁあぁーっ！」"

[[dialogue]]
speaker = "フラン"
# 「はーっ、はーっ……<emoji=heart04>　もう、わかった、わかったからぁっ！　オレの負け、負けでいいからぁっ！」
line = "「はーっ、はーっ……<emoji=heart04>　もう、わかった、わかったからぁっ！　オレの負け、負けでいいからぁっ！」"

[[dialogue]]
speaker = "フラン"
# 「またイクッ、イクイクぅっ、イキすぎて、おかしくなる、ま○こ壊れちゃうからっ！　もう許して、許してぇっ！」
line = "「またイクッ、イクイクぅっ、イキすぎて、おかしくなる、ま○こ壊れちゃうからっ！　もう許して、許してぇっ！」"

[[dialogue]]
speaker = "クロト"
# 「そう言われても、フランのおま○こが、ち○ぽを離してくれないんだけど？」
line = "「そう言われても、フランのおま○こが、ち○ぽを離してくれないんだけど？」"

[[dialogue]]
speaker = "フラン"
# 「し、知らねえって――んぁ、あ゛ぁっ！　あっ、ひぐっ、んぅあっ！　んはぁああああんっ<emoji=heart04>」
line = "「し、知らねえって――んぁ、あ゛ぁっ！　あっ、ひぐっ、んぅあっ！　んはぁああああんっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 快感に耐えきれなくなったフランは、アリーナ中に響き渡るほどの甲高い嬌声を響かせる。
line = "快感に耐えきれなくなったフランは、アリーナ中に響き渡るほどの甲高い嬌声を響かせる。"

[[dialogue]]
