line = "「すっかり日が暮れてしまったわね。今日は付き合ってくれてありがとう」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ううん。なんだかんだ、私たちも楽しかったわ」
line = "「ううん。なんだかんだ、私たちも楽しかったわ」"

[[dialogue]]
speaker = "ルネア"
# 「あ、そうそう、クロト。実はこれを渡そうと思っていたのよ」
line = "「あ、そうそう、クロト。実はこれを渡そうと思っていたのよ」"

[[dialogue]]
speaker = "ルネア"
