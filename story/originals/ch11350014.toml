line = "「ふふっ、冗談よ。わたしは何があっても、シン一筋だもの。心配しなくても、クロトを取ろうだなんて思っていないわ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「べっ、別にっ、そんな心配はしてないけどっ……もうっ、クロトの前で変なこと言わないでよねっ」
line = "「べっ、別にっ、そんな心配はしてないけどっ……もうっ、クロトの前で変なこと言わないでよねっ」"

