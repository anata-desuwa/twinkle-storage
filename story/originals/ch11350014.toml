line = "「……！　そう。それもそうね、ありがとう」"

[[dialogue]]
speaker = "ルネア"
# 「じゃあこれは、ただの気まぐれなお土産、サプライズプレゼントってことで」
line = "「じゃあこれは、ただの気まぐれなお土産、サプライズプレゼントってことで」"

[[dialogue]]
speaker = "unk"
