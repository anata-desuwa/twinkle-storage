line = "それなら……！"

[[dialogue]]
speaker = "ルネア"
# 「え……？　他に行ってみたい場所や、やってみたいこと？」
line = "「え……？　他に行ってみたい場所や、やってみたいこと？」"

[[dialogue]]
speaker = "ルネア"
# 「それを、あなたが叶えてくれるというの？」
line = "「それを、あなたが叶えてくれるというの？」"

[[dialogue]]
speaker = "ルネア"
