line = "期待に応えられるよう、頑張るよ"

[[dialogue]]
speaker = "ルネア"
# 「ええ。あと、ヴィーナスとも仲良くね」
line = "「ええ。あと、ヴィーナスとも仲良くね」"

[[dialogue]]
speaker = "ヴィーナス"
