line = "「だって、シンってば少し鈍感なところがあるし、かといって、わたしから迫るのも恥ずかしいし……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「いや、もっとグイグイいってそうだと思ってたわ。ていうか、普段の調子でいけばいいんじゃないの？」
line = "「いや、もっとグイグイいってそうだと思ってたわ。ていうか、普段の調子でいけばいいんじゃないの？」"

[[dialogue]]
speaker = "ルネア"
