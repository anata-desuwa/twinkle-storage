line = "「まぁ実際、私たちやリアさんたちもそうだったけど、別の世界の景色とかって、新鮮に感じるものよね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「その辺りは、やっぱり女神様でも同じなわけ？」
line = "「その辺りは、やっぱり女神様でも同じなわけ？」"

[[dialogue]]
speaker = "ルネア"
