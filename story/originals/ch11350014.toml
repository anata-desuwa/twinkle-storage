line = "「俺たち……なるほどね。あなた、なかなかクロトに信頼されているのね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「えっ……まあ、それほどでもあるかしらねっ。それに私だって、クロトをとっても信頼しているわ！」
line = "「えっ……まあ、それほどでもあるかしらねっ。それに私だって、クロトをとっても信頼しているわ！」"

[[dialogue]]
speaker = "ルネア"
# 「ふふ……いいと思うわよ」
line = "「ふふ……いいと思うわよ」"

[[dialogue]]
speaker = "ルネア"
# 「それじゃあ今日は、あなたたち２人に、観光のガイドをお願いしようかしら」
line = "「それじゃあ今日は、あなたたち２人に、観光のガイドをお願いしようかしら」"

[[dialogue]]
speaker = "ヴィーナス"
# 「まったく、相変わらず一方的なんだから。でもいいわ、私たちに任せておきなさい！」
line = "「まったく、相変わらず一方的なんだから。でもいいわ、私たちに任せておきなさい！」"

[[dialogue]]
speaker = "ルネア"
# 「もくもく……んふふ、おいしい……！」
line = "「もくもく……んふふ、おいしい……！」"

[[dialogue]]
speaker = "ルネア"
# 「わたし、誰かと買い食いというのをしてみたかったのよね。シンは倹約家だから、無理はさせられないし……」
line = "「わたし、誰かと買い食いというのをしてみたかったのよね。シンは倹約家だから、無理はさせられないし……」"

[[dialogue]]
speaker = "ルネア"
# 「でもやっぱり、見慣れない世界での景色や食べ物を堪能するのは最高ね」
line = "「でもやっぱり、見慣れない世界での景色や食べ物を堪能するのは最高ね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「今日も楽しんでくれてるみたいでよかったわ！」
line = "「今日も楽しんでくれてるみたいでよかったわ！」"

[[dialogue]]
speaker = "ヴィーナス"
