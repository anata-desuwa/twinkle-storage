line = "「あら……それってなんだか、デートのお誘いみたいね。ふふっ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「えっ、ででででっ、デートって、ちょっと……！」
line = "「えっ、ででででっ、デートって、ちょっと……！」"

[[dialogue]]
speaker = "ルネア"
# 「シンとのデートの練習にもなりそうだし……次はどこへ連れて行ってもらおうかしら」
line = "「シンとのデートの練習にもなりそうだし……次はどこへ連れて行ってもらおうかしら」"

[[dialogue]]
speaker = "ヴィーナス"
# 「むぅ～……っ」
line = "「むぅ～……っ」"

[[dialogue]]
speaker = "ルネア"
