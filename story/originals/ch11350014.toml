line = "「もちろんよ。それにせっかくなら、それぞれの世界の良さを楽しまなくては、もったいないわ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それもそうね！」
line = "「それもそうね！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「色々トラブルはあったけれど、思い返せば面白い体験ばっかりだったし……お互いに別の世界を知るきっかけを作ってもらえたのは、良かったのかもって思っちゃうわね」
line = "「色々トラブルはあったけれど、思い返せば面白い体験ばっかりだったし……お互いに別の世界を知るきっかけを作ってもらえたのは、良かったのかもって思っちゃうわね」"

[[dialogue]]
speaker = "ルネア"
# 「あら、やっと気づいたのね。もっと感謝して構わないのよ」
line = "「あら、やっと気づいたのね。もっと感謝して構わないのよ」"

[[dialogue]]
speaker = "unk"
# 結構とんでもない目に遭わされてたけど！？
line = "結構とんでもない目に遭わされてたけど！？"

[[dialogue]]
speaker = "unk"
# いや、丸く収まったからいいものの……
line = "いや、丸く収まったからいいものの……"

[[dialogue]]
speaker = "ルネア"
# 「……こういう誰かと喧嘩したり、仲直りしたり、そういう何気ない普通の営みに、少し憧れていたの」
line = "「……こういう誰かと喧嘩したり、仲直りしたり、そういう何気ない普通の営みに、少し憧れていたの」"

[[dialogue]]
speaker = "ルネア"
# 「こうして普通に過ごせることも、なんだか新鮮だし」
line = "「こうして普通に過ごせることも、なんだか新鮮だし」"

[[dialogue]]
speaker = "ヴィーナス"
# 「え、そうなの？」
line = "「え、そうなの？」"

[[dialogue]]
speaker = "ルネア"
# 「……わたし、こう見えてもね、これまでずっと、誰かの姿を遠くから見守るだけのことが多かったの」
line = "「……わたし、こう見えてもね、これまでずっと、誰かの姿を遠くから見守るだけのことが多かったの」"

[[dialogue]]
speaker = "ルネア"
# 「でも、最近は、シンや彼の仲間たちと一緒に過ごすことができて……」
line = "「でも、最近は、シンや彼の仲間たちと一緒に過ごすことができて……」"

[[dialogue]]
speaker = "ルネア"
# 「それに、あなたたちと、こちらの世界で過ごす時間も増えて……」
line = "「それに、あなたたちと、こちらの世界で過ごす時間も増えて……」"

[[dialogue]]
speaker = "ルネア"
# 「それだけでなんだか、知っていたはずの世界が見違えたように感じているの。だから、そのことについては、お礼を言っておくわ」
line = "「それだけでなんだか、知っていたはずの世界が見違えたように感じているの。だから、そのことについては、お礼を言っておくわ」"

