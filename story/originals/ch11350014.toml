line = "「あら素直……ふふっ、なんだか妬けちゃうわね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それで？　何の用だったの？」
line = "「それで？　何の用だったの？」"

[[dialogue]]
speaker = "ルネア"
# 「あぁ、そうだったわ」
line = "「あぁ、そうだったわ」"

[[dialogue]]
speaker = "ルネア"
# 「先日のパトロールの時に、ついでで街の案内もしてもらったでしょ？　今日はその続きをお願いしようと思って来たの」
line = "「先日のパトロールの時に、ついでで街の案内もしてもらったでしょ？　今日はその続きをお願いしようと思って来たの」"

[[dialogue]]
speaker = "ヴィーナス"
# 「またいきなりなんだから」
line = "「またいきなりなんだから」"

[[dialogue]]
speaker = "ルネア"
# 「いつまでこちらの世界にいるかもわからないし、今の内に見て回っておきたいと思ったのよ」
line = "「いつまでこちらの世界にいるかもわからないし、今の内に見て回っておきたいと思ったのよ」"

[[dialogue]]
speaker = "ルネア"
# 「ほら、この前見られなかった場所もあるし、行ってないご飯屋さんもあるし」
line = "「ほら、この前見られなかった場所もあるし、行ってないご飯屋さんもあるし」"

[[dialogue]]
speaker = "ルネア"
# 「誰に頼んでもよかったのだけれど、なんとなく、クロトが１番信頼できそうだったから」
line = "「誰に頼んでもよかったのだけれど、なんとなく、クロトが１番信頼できそうだったから」"

[[dialogue]]
speaker = "unk"
# 俺たちでよければ案内するよ
line = "俺たちでよければ案内するよ"

[[dialogue]]
speaker = "ルネア"
