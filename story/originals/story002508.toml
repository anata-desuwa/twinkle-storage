[[dialogue]]
speaker = "unk"
# アステラ内部に踏み入れ、奥へと進んでいく。
line = "アステラ内部に踏み入れ、奥へと進んでいく。"

[[dialogue]]
speaker = "エスメラルダ"
# 『アステラ内部に入られると、その動向を観察するのが難しいです』
line = "『アステラ内部に入られると、その動向を観察するのが難しいです』"

[[dialogue]]
speaker = "エスメラルダ"
# 『私は外でモンスターに備えておきますので、学園長の能力についてはきちんと観察しておいてください』
line = "『私は外でモンスターに備えておきますので、学園長の能力についてはきちんと観察しておいてください』"

[[dialogue]]
speaker = "unk"
# 出来るだけ頑張ります
line = "出来るだけ頑張ります"

[[dialogue]]
speaker = "unk"
# （俺に何が分かるわけでもないけど）
line = "（俺に何が分かるわけでもないけど）"

[[dialogue]]
speaker = "ラティエ"
# 「エルデリーゼ嬢、きみはこういった実戦に参加したことはあるのか？」
line = "「エルデリーゼ嬢、きみはこういった実戦に参加したことはあるのか？」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「以前、魔界に封印された守護天使様の解放作戦に参加したことはありますわ」
line = "「以前、魔界に封印された守護天使様の解放作戦に参加したことはありますわ」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「ですが、アステラの内部に侵入しての戦いは初めてですの」
line = "「ですが、アステラの内部に侵入しての戦いは初めてですの」"

[[dialogue]]
speaker = "ラティエ"
# 「では、この景色は恐いだろうな」
line = "「では、この景色は恐いだろうな」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「そ、そんなことはありませんわ！　全然大丈夫ですの！」
line = "「そ、そんなことはありませんわ！　全然大丈夫ですの！」"

[[dialogue]]
speaker = "ラティエ"
# 「強がらなくてもいい。初めては誰でも不安なものだ」
line = "「強がらなくてもいい。初めては誰でも不安なものだ」"

[[dialogue]]
speaker = "ラティエ"
# 「会長くん、エルデリーゼ嬢の手を握ってあげているといい」
line = "「会長くん、エルデリーゼ嬢の手を握ってあげているといい」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「えっ！？　ほ、本当に大丈夫ですのに……」
line = "「えっ！？　ほ、本当に大丈夫ですのに……」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「それに会長様は、学園長様と手をつなぎたいはずですわ！」
line = "「それに会長様は、学園長様と手をつなぎたいはずですわ！」"

[[dialogue]]
speaker = "unk"
# が、学園長……手、繋ぎますか？
line = "が、学園長……手、繋ぎますか？"

[[dialogue]]
speaker = "unk"
# えっ？　あ、それは……
line = "えっ？　あ、それは……"

[[dialogue]]
speaker = "ラティエ"
# 「もう下手な芝居はしなくていい」
line = "「もう下手な芝居はしなくていい」"

[[dialogue]]
speaker = "ラティエ"
# 「デートと言うのは口実。全ては九浄ヘレナの差し金なのだろう？」
line = "「デートと言うのは口実。全ては九浄ヘレナの差し金なのだろう？」"

[[dialogue]]
speaker = "エスメラルダ"
# 『ぜ、全部バレてる！？』
line = "『ぜ、全部バレてる！？』"

[[dialogue]]
speaker = "エスメラルダ"
# 『学園長は全てお見通しだった、ということね……はぁ……』
line = "『学園長は全てお見通しだった、ということね……はぁ……』"

[[dialogue]]
speaker = "ラティエ"
# 「第一、水着をプレゼントしてデートに誘うなど、どう考えてもおかしい。恋愛ごとに疎い私であっても気付かないはずがないだろう」
line = "「第一、水着をプレゼントしてデートに誘うなど、どう考えてもおかしい。恋愛ごとに疎い私であっても気付かないはずがないだろう」"

[[dialogue]]
speaker = "unk"
# ですよね～……
line = "ですよね～……"

[[dialogue]]
speaker = "ラティエ"
# 「つまりだ、エルデリーゼ嬢。きみは何も気にすることなく会長くんの手を取っていい、そういうことだ」
line = "「つまりだ、エルデリーゼ嬢。きみは何も気にすることなく会長くんの手を取っていい、そういうことだ」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「か、会長様……」
line = "「か、会長様……」"

[[dialogue]]
speaker = "unk"
# 手、繋ごうか？
line = "手、繋ごうか？"

[[dialogue]]
speaker = "エルデリーゼ"
# 「お願いしますわ……」
line = "「お願いしますわ……」"

[[dialogue]]
speaker = "ラティエ"
# 「はっはっは、初々しくていいな！　エルデリーゼ嬢も恥じらう様子が可愛いぞ」
line = "「はっはっは、初々しくていいな！　エルデリーゼ嬢も恥じらう様子が可愛いぞ」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「か、からかわないでくださいませ！」
line = "「か、からかわないでくださいませ！」"

[[dialogue]]
speaker = "ラティエ"
# 「ふふふ、すまない……と、そんな話をしていたら最深部に到着だ」
line = "「ふふふ、すまない……と、そんな話をしていたら最深部に到着だ」"

[[dialogue]]
speaker = "ラティエ"
# 「あれがこのアステラを発生させている親玉というわけだ」
line = "「あれがこのアステラを発生させている親玉というわけだ」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「あのモンスターを倒せば、このアステラは消滅するということですわね？」
line = "「あのモンスターを倒せば、このアステラは消滅するということですわね？」"

[[dialogue]]
speaker = "ラティエ"
# 「そういうことだな」
line = "「そういうことだな」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「では、私にお任せくださいっ！」
line = "「では、私にお任せくださいっ！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「キャッスル・ブレイカーっ！！！」
line = "「キャッスル・ブレイカーっ！！！」"

[[dialogue]]
speaker = "unk"
# 勢いよく、モンスターに向かって突進していくエルゼ。
line = "勢いよく、モンスターに向かって突進していくエルゼ。"

[[dialogue]]
speaker = "unk"
# その攻撃は、最強の矛という異名に恥じない鋭い速さを持っていた。
line = "その攻撃は、最強の矛という異名に恥じない鋭い速さを持っていた。"

[[dialogue]]
speaker = "unk"
# しかし──
line = "しかし──"

[[dialogue]]
speaker = "エルデリーゼ"
# 「っ……消えた！？　躱されましたの！？　確かに捉えたはずでしたのに！」
line = "「っ……消えた！？　躱されましたの！？　確かに捉えたはずでしたのに！」"

[[dialogue]]
speaker = "unk"
# モンスターの姿を見失い、動揺から隙を作ってしまう。
line = "モンスターの姿を見失い、動揺から隙を作ってしまう。"

[[dialogue]]
speaker = "unk"
# そこにモンスターの攻撃が襲い掛かった。
line = "そこにモンスターの攻撃が襲い掛かった。"

[[dialogue]]
speaker = "エルデリーゼ"
# 「っ……！！」
line = "「っ……！！」"

[[dialogue]]
speaker = "unk"
# 凶刃がエルゼに届く前に、俺と学園長がその攻撃を弾く。
line = "凶刃がエルゼに届く前に、俺と学園長がその攻撃を弾く。"

[[dialogue]]
speaker = "ラティエ"
# 「焦り過ぎたな、１人で突出するのは最も危険な行為だ」
line = "「焦り過ぎたな、１人で突出するのは最も危険な行為だ」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「あ……」
line = "「あ……」"

[[dialogue]]
speaker = "ラティエ"
# 「会長くん、合わせられるな？」
line = "「会長くん、合わせられるな？」"

[[dialogue]]
speaker = "unk"
# もちろんです！
line = "もちろんです！"

[[dialogue]]
speaker = "unk"
# 学園長の動きに合わせて、俺も攻撃を繰り出す。
line = "学園長の動きに合わせて、俺も攻撃を繰り出す。"

[[dialogue]]
speaker = "unk"
# 反撃を受けたモンスターは怯み、間合いが出来る。
line = "反撃を受けたモンスターは怯み、間合いが出来る。"

[[dialogue]]
speaker = "ラティエ"
# 「バラクィエル──」
line = "「バラクィエル──」"

[[dialogue]]
speaker = "unk"
# 学園長の手にした、美しい剣が翻った。
line = "学園長の手にした、美しい剣が翻った。"

[[dialogue]]
speaker = "ラティエ"
# 「アポカリプティック・ウィンドっ！」
line = "「アポカリプティック・ウィンドっ！」"

[[dialogue]]
speaker = "unk"
# モンスターは学園長の繰り出した攻撃を逃れようとした。
line = "モンスターは学園長の繰り出した攻撃を逃れようとした。"

[[dialogue]]
speaker = "unk"
# だが、学園長の剣はまるで生き物のように伸び、うねり、その急所へと突き刺さる。
line = "だが、学園長の剣はまるで生き物のように伸び、うねり、その急所へと突き刺さる。"

[[dialogue]]
speaker = "unk"
# その瞬間を見逃さず、俺はエルゼの背中を押す。
line = "その瞬間を見逃さず、俺はエルゼの背中を押す。"

[[dialogue]]
speaker = "エルデリーゼ"
# 「ライトニング・ストライクっ！！」
line = "「ライトニング・ストライクっ！！」"

[[dialogue]]
speaker = "unk"
# エルゼの強烈な一撃がモンスターを貫く。
line = "エルゼの強烈な一撃がモンスターを貫く。"

[[dialogue]]
speaker = "エルデリーゼ"
# 「はぁ……はぁ……」
line = "「はぁ……はぁ……」"

[[dialogue]]
speaker = "unk"
# 強く念じるように、モンスターを睨みつけるエルゼ。
line = "強く念じるように、モンスターを睨みつけるエルゼ。"

[[dialogue]]
speaker = "unk"
# やがて、モンスターは徐々に動きを止め、静かに崩れ落ちていく。
line = "やがて、モンスターは徐々に動きを止め、静かに崩れ落ちていく。"

[[dialogue]]
speaker = "エルデリーゼ"
# 「や、やりました……の……？」
line = "「や、やりました……の……？」"

[[dialogue]]
speaker = "unk"
# 張り詰めていた空気が解けていく。
line = "張り詰めていた空気が解けていく。"

[[dialogue]]
speaker = "unk"
# それと同時に、アステラの消滅が始まり周囲の景色が変わっていったのだった。
line = "それと同時に、アステラの消滅が始まり周囲の景色が変わっていったのだった。"
