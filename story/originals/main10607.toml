[[dialogue]]
speaker = "unk"
# 第７話,第７話『そろそろ周知の事実』,B
line = "第７話,第７話『そろそろ周知の事実』,B"

[[dialogue]]
speaker = "マトイ"
# 「──って、そんなことがあって……」
line = "「──って、そんなことがあって……」"

[[dialogue]]
speaker = "セーラ"
# 「あはは、うける。それですりこぎ棒もらったんだ？」
line = "「あはは、うける。それですりこぎ棒もらったんだ？」"

[[dialogue]]
speaker = "ルリエル"
# 「でもでも、面白いです！　クラウディアさんらしいですね！」
line = "「でもでも、面白いです！　クラウディアさんらしいですね！」"

[[dialogue]]
speaker = "ユウリ"
# 「実際、知らなかったしな。あの姫さんの誕生日がクリスマスなんて……」
line = "「実際、知らなかったしな。あの姫さんの誕生日がクリスマスなんて……」"

[[dialogue]]
speaker = "セーラ"
# 「おめでたい日が被っちゃうと、逆に困ることもあるんだね～」
line = "「おめでたい日が被っちゃうと、逆に困ることもあるんだね～」"

[[dialogue]]
speaker = "マトイ"
# 「そうみたい。けど、ちょっとだけ気持ちわかるかも」
line = "「そうみたい。けど、ちょっとだけ気持ちわかるかも」"

[[dialogue]]
speaker = "ルリエル"
# 「いいなー。わたしもクラウディアサンタに会ったら、何かもらえちゃうでしょうか！」
line = "「いいなー。わたしもクラウディアサンタに会ったら、何かもらえちゃうでしょうか！」"

[[dialogue]]
speaker = "マトイ"
# 「それじゃ、私はそろそろ戻るね──」
line = "「それじゃ、私はそろそろ戻るね──」"

[[dialogue]]
speaker = "クラウディア"
# 「──頼もう！」
line = "「──頼もう！」"

[[dialogue]]
speaker = "ユウリ"
# 「うお、噂をすりゃあ」
line = "「うお、噂をすりゃあ」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「お邪魔しま～す」
line = "「お邪魔しま～す」"

[[dialogue]]
speaker = "ユウリ"
# 「一応突っ込んどくと、ここは外部のやつが勝手に入っていい場所じゃないからな……？」
line = "「一応突っ込んどくと、ここは外部のやつが勝手に入っていい場所じゃないからな……？」"

[[dialogue]]
speaker = "クラウディア"
# 「まあまあ。細かいことは気にするでない」
line = "「まあまあ。細かいことは気にするでない」"

[[dialogue]]
speaker = "クラウディア"
# 「１２月２５日は余の記念すべき誕生日！　よって、お主たちにサンタより早くプレゼントを届けてやろう！」
line = "「１２月２５日は余の記念すべき誕生日！　よって、お主たちにサンタより早くプレゼントを届けてやろう！」"

[[dialogue]]
speaker = "ルリエル"
# 「おお、待ってました！」
line = "「おお、待ってました！」"

[[dialogue]]
speaker = "クラウディア"
# 「ほう、待ちわびていたとな？」
line = "「ほう、待ちわびていたとな？」"

[[dialogue]]
speaker = "ルリエル"
# 「はい！　それはもちろん！」
line = "「はい！　それはもちろん！」"

[[dialogue]]
speaker = "クラウディア"
# 「ちぇちゅーりえよ。いよいよ余の誕生日も、人間界に浸透してきたようであるぞ」
line = "「ちぇちゅーりえよ。いよいよ余の誕生日も、人間界に浸透してきたようであるぞ」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「世界に広がる日も遠くないね♪」
line = "「世界に広がる日も遠くないね♪」"

[[dialogue]]
speaker = "クラウディア"
# 「知っていたなら話は早い。お主たち、希望はなんだ？」
line = "「知っていたなら話は早い。お主たち、希望はなんだ？」"

[[dialogue]]
speaker = "ルリエル"
# 「はいはい！　わたし、ここでみんなと遊ぶための新作ボードゲームが欲しいです！」
line = "「はいはい！　わたし、ここでみんなと遊ぶための新作ボードゲームが欲しいです！」"

[[dialogue]]
speaker = "ユウリ"
# 「あたしは──そうだ、駅前で売ってたクリスマス限定マカロン！」
line = "「あたしは──そうだ、駅前で売ってたクリスマス限定マカロン！」"

[[dialogue]]
speaker = "セーラ"
# 「うちはね、美顔スチーマー♪」
line = "「うちはね、美顔スチーマー♪」"

[[dialogue]]
speaker = "クラウディア"
# 「すちーまー？　ってなんだ？　何に使うのだ？」
line = "「すちーまー？　ってなんだ？　何に使うのだ？」"

[[dialogue]]
speaker = "セーラ"
# 「お肌に蒸気をあてる機械のことだよ」
line = "「お肌に蒸気をあてる機械のことだよ」"

[[dialogue]]
speaker = "クラウディア"
# 「肌なんか蒸してどうするのだ」
line = "「肌なんか蒸してどうするのだ」"

[[dialogue]]
speaker = "セーラ"
# 「ミストがお肌にいい～♪　みたいな」
line = "「ミストがお肌にいい～♪　みたいな」"

[[dialogue]]
speaker = "クラウディア"
# 「湿気が欲しいなら、風呂にでも浸かればよいではないか」
line = "「湿気が欲しいなら、風呂にでも浸かればよいではないか」"

[[dialogue]]
speaker = "セーラ"
# 「うーん……でも、リラックス効果もあったりとか」
line = "「うーん……でも、リラックス効果もあったりとか」"

[[dialogue]]
speaker = "クラウディア"
# 「余にはまったく理解できぬぞ！　そもそも肌など放っておいてもすべすべのままではないか──」
line = "「余にはまったく理解できぬぞ！　そもそも肌など放っておいてもすべすべのままではないか──」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「クラウディア様、話が脱線してます」
line = "「クラウディア様、話が脱線してます」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「それに、後半の発言は年頃の女子たちから反感を買いそうな予感」
line = "「それに、後半の発言は年頃の女子たちから反感を買いそうな予感」"

[[dialogue]]
speaker = "クラウディア"
# 「おっと、しまった。プレゼントを『けんえつ』するなどサンタのすることではないな」
line = "「おっと、しまった。プレゼントを『けんえつ』するなどサンタのすることではないな」"

[[dialogue]]
speaker = "クラウディア"
# 「ボードゲームに、マカロンに、すちーまーだな。任せよ。お主らの希望を叶えてやる」
line = "「ボードゲームに、マカロンに、すちーまーだな。任せよ。お主らの希望を叶えてやる」"

[[dialogue]]
speaker = "ルリエル"
# 「おお、超期待です！」
line = "「おお、超期待です！」"

[[dialogue]]
speaker = "クラウディア"
# 「そーれ……メリークラウディアバースデ～！！」
line = "「そーれ……メリークラウディアバースデ～！！」"

[[dialogue]]
speaker = "ルリエル"
# 「これは……えっと、すごろく？」
line = "「これは……えっと、すごろく？」"

[[dialogue]]
speaker = "ユウリ"
# 「あたしはマカロニだ」
line = "「あたしはマカロニだ」"

[[dialogue]]
speaker = "セーラ"
# 「せいろ……確かに蒸すものだけど」
line = "「せいろ……確かに蒸すものだけど」"

[[dialogue]]
speaker = "クラウディア"
# 「ちぇちゅーりえよ。このプレゼントのグレード、もうちょっと上げられんのか？」
line = "「ちぇちゅーりえよ。このプレゼントのグレード、もうちょっと上げられんのか？」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「今の技術では難しいねえ。そもそもほら、相手の願いを聞き入れるだけですごい発明なんだよ？」
line = "「今の技術では難しいねえ。そもそもほら、相手の願いを聞き入れるだけですごい発明なんだよ？」"

[[dialogue]]
speaker = "クラウディア"
# 「それはそうかもしれぬが……」
line = "「それはそうかもしれぬが……」"

[[dialogue]]
speaker = "ルリエル"
# 「ま、まあ……これもお正月にみんなで遊べますから！」
line = "「ま、まあ……これもお正月にみんなで遊べますから！」"

[[dialogue]]
speaker = "ユウリ"
# 「あ、ああ。くれるってんなら感謝するしかないぜ」
line = "「あ、ああ。くれるってんなら感謝するしかないぜ」"

[[dialogue]]
speaker = "セーラ"
# 「そうそう。うちもこれで中華まん作ってみようかな……って思うし」
line = "「そうそう。うちもこれで中華まん作ってみようかな……って思うし」"

[[dialogue]]
speaker = "ユウリ"
# 「マカロンとマカロニは、語感が似てるだけって気もするけど──ありがとな。クラウディア」
line = "「マカロンとマカロニは、語感が似てるだけって気もするけど──ありがとな。クラウディア」"

[[dialogue]]
speaker = "クラウディア"
# 「うーん……あまり心からの感謝とは思えぬ」
line = "「うーん……あまり心からの感謝とは思えぬ」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「まあまあ、ホーリー・ベルが出したんだからきっと正解だよ。本人たちは気づいてなくても」
line = "「まあまあ、ホーリー・ベルが出したんだからきっと正解だよ。本人たちは気づいてなくても」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「顧客が本当に欲しかったものは、ドリルじゃなくて穴だったんだ──ってね」
line = "「顧客が本当に欲しかったものは、ドリルじゃなくて穴だったんだ──ってね」"

[[dialogue]]
speaker = "ルリエル"
# 「おお、なるほど！」
line = "「おお、なるほど！」"

[[dialogue]]
speaker = "ユウリ"
# 「どういうことなんだよ……」
line = "「どういうことなんだよ……」"

[[dialogue]]
speaker = "クラウディア"
# 「まあよい。これでお主たちも覚えたであろう」
line = "「まあよい。これでお主たちも覚えたであろう」"

[[dialogue]]
speaker = "クラウディア"
# 「１２月２５日といえば余の誕生日！　お主ら星徒会も、流星学園中にこの事実を広めるのだぞ～！」
line = "「１２月２５日といえば余の誕生日！　お主ら星徒会も、流星学園中にこの事実を広めるのだぞ～！」"
