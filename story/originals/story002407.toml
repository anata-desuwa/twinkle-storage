[[dialogue]]
speaker = "イレーナ"
# 「こほん、何でもありません。お気になさらず。それよりも、この後どうなさるおつもりですか？」
line = "「こほん、何でもありません。お気になさらず。それよりも、この後どうなさるおつもりですか？」"

[[dialogue]]
speaker = "マトイ"
# 「そ、そうですね、いきなりすぎて、正直頭が追いついてなくて……」
