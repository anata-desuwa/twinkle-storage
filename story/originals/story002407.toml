line = "「なっ……なな、なんということですか！　新郎がさらわれてしまうなんて！」"

[[dialogue]]
speaker = "イレーナ"
# 「いや、正直なところざまあみろと思わなくはないけど……フィオナ会長だけじゃなくて、他の子とも結婚式をしようなんて、むかっ腹が立ってたし」
