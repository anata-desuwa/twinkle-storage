[[dialogue]]
speaker = "unk"
# 第４話,愛の芽生え,P
line = "第４話,愛の芽生え,P"

[[dialogue]]
speaker = "unk"
# ショーウインドーに下着だけを身に着けたマネキンが立ち並ぶお店に到着。
line = "ショーウインドーに下着だけを身に着けたマネキンが立ち並ぶお店に到着。"

[[dialogue]]
speaker = "グロリア"
# 「まあ、ここが下着屋さん……！　マネキンさんの下着はとてもカラフルで、私が持っているのと全然違いますね」
line = "「まあ、ここが下着屋さん……！　マネキンさんの下着はとてもカラフルで、私が持っているのと全然違いますね」"

[[dialogue]]
speaker = "グロリア"
# 「フリフリがついていたり、ベルトがついていたり……まるでドレスのようですね。とても可愛らしいです」
line = "「フリフリがついていたり、ベルトがついていたり……まるでドレスのようですね。とても可愛らしいです」"

[[dialogue]]
speaker = "グロリア"
# 「あのＶの字のようになっている細いヒモは？　えっ、あれも下着なのですか？」
line = "「あのＶの字のようになっている細いヒモは？　えっ、あれも下着なのですか？」"

[[dialogue]]
speaker = "グロリア"
# 「アレで隠せるくらい、お胸が小さな方もいらっしゃるのでしょうか……私だとはみ出てしまいます」
line = "「アレで隠せるくらい、お胸が小さな方もいらっしゃるのでしょうか……私だとはみ出てしまいます」"

[[dialogue]]
speaker = "グロリア"
# 「まあ、あの下着は、乳首とお股の部分に穴が開いているんですね」
line = "「まあ、あの下着は、乳首とお股の部分に穴が開いているんですね」"

[[dialogue]]
speaker = "グロリア"
# 「あれなら母乳をあげたり、おトイレの際に脱がなくてもいいですね。とても機能的です」
line = "「あれなら母乳をあげたり、おトイレの際に脱がなくてもいいですね。とても機能的です」"

[[dialogue]]
speaker = "unk"
# （これはそういう用途じゃないと思う……）
line = "（これはそういう用途じゃないと思う……）"

[[dialogue]]
speaker = "グロリア"
# 「ふふふ、普段こういったお店に来ることがないものですから、見ているだけでも少し楽しくなります」
line = "「ふふふ、普段こういったお店に来ることがないものですから、見ているだけでも少し楽しくなります」"

[[dialogue]]
speaker = "unk"
# 気に入ったのはあります？
line = "気に入ったのはあります？"

[[dialogue]]
speaker = "グロリア"
# 「どれも素敵で迷ってしまいますね……」
line = "「どれも素敵で迷ってしまいますね……」"

[[dialogue]]
speaker = "グロリア"
# 「会長さんはどういった下着がお好きなんですか？」
line = "「会長さんはどういった下着がお好きなんですか？」"

[[dialogue]]
speaker = "unk"
# あ、あれとか……？
line = "あ、あれとか……？"

[[dialogue]]
speaker = "グロリア"
# 「まあ……これ、ですか？　フリルがたくさんついていて、ひらひらしていますね。生地が薄くて少し透けているようですが……」
line = "「まあ……これ、ですか？　フリルがたくさんついていて、ひらひらしていますね。生地が薄くて少し透けているようですが……」"

[[dialogue]]
speaker = "unk"
# 苦し紛れに指差してしまったのは、ボディに自身がないと絶対に着れない、レオタードのようなセクシーランジェリーだった。
line = "苦し紛れに指差してしまったのは、ボディに自身がないと絶対に着れない、レオタードのようなセクシーランジェリーだった。"

[[dialogue]]
speaker = "グロリア"
# 「とても美しいです……まるで女神様のようですけど、私に似合うでしょうか……」
line = "「とても美しいです……まるで女神様のようですけど、私に似合うでしょうか……」"

[[dialogue]]
speaker = "グロリア"
# 「いえ、今日は会長さんに選んでもらうと決めたのですから、会長さんを信じないといけませんね。着こなせるか自信がないですが、ちょっと試着してみます」
line = "「いえ、今日は会長さんに選んでもらうと決めたのですから、会長さんを信じないといけませんね。着こなせるか自信がないですが、ちょっと試着してみます」"

[[dialogue]]
speaker = "グロリア"
# 「わぁ、すごく可愛いです。なんだか私ではないみたい……！」
line = "「わぁ、すごく可愛いです。なんだか私ではないみたい……！」"

[[dialogue]]
speaker = "グロリア"
# 「でも、どうしてでしょう、会長さんにお見せするのが、とても恥ずかしい……！」
line = "「でも、どうしてでしょう、会長さんにお見せするのが、とても恥ずかしい……！」"

[[dialogue]]
speaker = "グロリア"
# 「ご、ごめんなさい、会長さん。その、とても可愛いのですけど……！」
line = "「ご、ごめんなさい、会長さん。その、とても可愛いのですけど……！」"

[[dialogue]]
speaker = "グロリア"
# 「せっかく買ったのに、お見せできませんでした……」
line = "「せっかく買ったのに、お見せできませんでした……」"

[[dialogue]]
speaker = "unk"
# あまりに人に見せるものじゃないからね……
line = "あまりに人に見せるものじゃないからね……"

[[dialogue]]
speaker = "グロリア"
# 「そうなのですか……？　いざという時に彼氏に見せる勝負下着だと店員さんがおっしゃっていたのですけど」
line = "「そうなのですか……？　いざという時に彼氏に見せる勝負下着だと店員さんがおっしゃっていたのですけど」"

[[dialogue]]
speaker = "グロリア"
# 「いざという時……？　勝負下着とはなんなのでしょう……？」
line = "「いざという時……？　勝負下着とはなんなのでしょう……？」"

[[dialogue]]
speaker = "グロリア"
# 「ハッ──きっとフランさんのカツ丼のように願掛けとして着用するのですね！　おそらくフランさんも、応援団の時はこのような下着を着けているのでしょう」
line = "「ハッ──きっとフランさんのカツ丼のように願掛けとして着用するのですね！　おそらくフランさんも、応援団の時はこのような下着を着けているのでしょう」"

[[dialogue]]
speaker = "グロリア"
# 「フランさんがどのような勝負下着を身に着けているか、お聞きしてみたいと思います！」
line = "「フランさんがどのような勝負下着を身に着けているか、お聞きしてみたいと思います！」"

[[dialogue]]
speaker = "グロリア"
# 「フランさんはどんな勝負下着を着けているんですか？」
line = "「フランさんはどんな勝負下着を着けているんですか？」"

[[dialogue]]
speaker = "フラン"
# 「ぶーーーーーーーーっ！！？！？」
line = "「ぶーーーーーーーーっ！！？！？」"

[[dialogue]]
speaker = "フラン"
# 「げほっ！　げほっ！　いきなり何言い出すんだ！　コーラ吹き出しちまったじゃねえか！」
line = "「げほっ！　げほっ！　いきなり何言い出すんだ！　コーラ吹き出しちまったじゃねえか！」"

[[dialogue]]
speaker = "フラン"
# 「そんなこと聞いてくるってことは……会長との間に進展でもあったか？」
line = "「そんなこと聞いてくるってことは……会長との間に進展でもあったか？」"

[[dialogue]]
speaker = "グロリア"
# 「ええと、本当はフランさんにも秘密と言われたのですけど、この前……」
line = "「ええと、本当はフランさんにも秘密と言われたのですけど、この前……」"

[[dialogue]]
speaker = "フラン"
# 「ふんふん……なるほど。会長との買い物デートは大成功だったってわけだ」
line = "「ふんふん……なるほど。会長との買い物デートは大成功だったってわけだ」"

[[dialogue]]
speaker = "グロリア"
# 「デ、デートだなんて、そんな……ただのお買い物ですよ」
line = "「デ、デートだなんて、そんな……ただのお買い物ですよ」"

[[dialogue]]
speaker = "フラン"
# 「普通は男女で下着を買いに行ったりしねえよ。さすがのオレでも、会長と一緒に下着を買いに行く度胸はねえ」
line = "「普通は男女で下着を買いに行ったりしねえよ。さすがのオレでも、会長と一緒に下着を買いに行く度胸はねえ」"

[[dialogue]]
speaker = "グロリア"
# 「そ、そういうものなのですね……さすがの私でも、下着姿を会長さんに見せる度胸はありませんでしたけど……」
line = "「そ、そういうものなのですね……さすがの私でも、下着姿を会長さんに見せる度胸はありませんでしたけど……」"

[[dialogue]]
speaker = "フラン"
# 「天然なグロリアが？　てっきり、その勝負下着とやらを見せちまったのかと思ったぜ」
line = "「天然なグロリアが？　てっきり、その勝負下着とやらを見せちまったのかと思ったぜ」"

[[dialogue]]
speaker = "グロリア"
# 「最初はそのつもりだったのですけど、着替えている最中に無性に恥ずかしくなってしまって……見せられませんでした……」
line = "「最初はそのつもりだったのですけど、着替えている最中に無性に恥ずかしくなってしまって……見せられませんでした……」"

[[dialogue]]
speaker = "フラン"
# 「はーん？　ふーん？　なるほどなー？」
line = "「はーん？　ふーん？　なるほどなー？」"

[[dialogue]]
speaker = "グロリア"
# 「な、なんですか？」
line = "「な、なんですか？」"

[[dialogue]]
speaker = "フラン"
# 「いやあ、オレも色恋沙汰には鈍い方だけど、それでもわかるぜ。そりゃ会長を男として意識してるってことだ」
line = "「いやあ、オレも色恋沙汰には鈍い方だけど、それでもわかるぜ。そりゃ会長を男として意識してるってことだ」"

[[dialogue]]
speaker = "フラン"
# 「グロリア、会長にマジで惚れたんじゃねえの？」
line = "「グロリア、会長にマジで惚れたんじゃねえの？」"

[[dialogue]]
speaker = "グロリア"
# 「惚れ……？　ええ、元から会長さんのことは一緒に死んでもいいくらいに好き……あら？　あらら？」
line = "「惚れ……？　ええ、元から会長さんのことは一緒に死んでもいいくらいに好き……あら？　あらら？」"

[[dialogue]]
speaker = "フラン"
# 「どうした？」
line = "「どうした？」"

[[dialogue]]
speaker = "グロリア"
# 「いえ、その……私、会長さんと一緒に死にたいのは確かなのですが、別の気持ちもあるような気がして……」
line = "「いえ、その……私、会長さんと一緒に死にたいのは確かなのですが、別の気持ちもあるような気がして……」"

[[dialogue]]
speaker = "グロリア"
# 「できることなら、もっと一緒の時間を過ごしたいと思っているような……」
line = "「できることなら、もっと一緒の時間を過ごしたいと思っているような……」"

[[dialogue]]
speaker = "フラン"
# 「はは、それなら決まりじゃねえか。会長とずっと一緒にいたい。一生、添い遂げたいってことだろ」
line = "「はは、それなら決まりじゃねえか。会長とずっと一緒にいたい。一生、添い遂げたいってことだろ」"

[[dialogue]]
speaker = "グロリア"
# 「添い遂げ――あっ、ああ……！？」
line = "「添い遂げ――あっ、ああ……！？」"

[[dialogue]]
speaker = "グロリア"
# 「もしかして、これが愛と呼ぶ感情……！？　なのでしょうか……！？」
line = "「もしかして、これが愛と呼ぶ感情……！？　なのでしょうか……！？」"

[[dialogue]]
speaker = "unk"
# おーい、グロリアさん、フラン
line = "おーい、グロリアさん、フラン"

[[dialogue]]
speaker = "グロリア"
# 「か、会長さんっ……！」
line = "「か、会長さんっ……！」"

[[dialogue]]
speaker = "フラン"
# 「おっと、オレはお邪魔虫になりそうだな。んじゃ、グロリア、上手くやれよ」
line = "「おっと、オレはお邪魔虫になりそうだな。んじゃ、グロリア、上手くやれよ」"

[[dialogue]]
speaker = "グロリア"
# 「ま、待ってください、フランさん！　私、何を話していいか……！」
line = "「ま、待ってください、フランさん！　私、何を話していいか……！」"

[[dialogue]]
speaker = "グロリア"
# 「この感情に気づいてしまったら、会長さんの顔をまっすぐ見られないじゃないですかぁーっ！」
line = "「この感情に気づいてしまったら、会長さんの顔をまっすぐ見られないじゃないですかぁーっ！」"
