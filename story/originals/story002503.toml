[[dialogue]]
speaker = "サラン"
# 「こちらがプールエリア、チェリークルーズです～♪」
line = "「こちらがプールエリア、チェリークルーズです～♪」"

[[dialogue]]
speaker = "unk"
# 新しくできたプールエリア。その広さに思わず感嘆の声を上げてしまう。
line = "新しくできたプールエリア。その広さに思わず感嘆の声を上げてしまう。"

[[dialogue]]
speaker = "unk"
# 元々存在していた遊園地エリアと同じくらいの広さに、大小さまざまなプールが存在している。
line = "元々存在していた遊園地エリアと同じくらいの広さに、大小さまざまなプールが存在している。"

[[dialogue]]
speaker = "unk"
# そしてその中央にある大プールは、おそらく今回の一番の目玉となるプールだろう。
line = "そしてその中央にある大プールは、おそらく今回の一番の目玉となるプールだろう。"

[[dialogue]]
speaker = "サラン"
# 「この間、桜十路家の持っている豪華客船の『チェリークルーズ号』が世界一周の旅に出航したんですよ～」
line = "「この間、桜十路家の持っている豪華客船の『チェリークルーズ号』が世界一周の旅に出航したんですよ～」"

[[dialogue]]
speaker = "サラン"
# 「その船にも甲板に大きなプールがあるんですけど、ここはそれとそっくりに作られてるんです～」
line = "「その船にも甲板に大きなプールがあるんですけど、ここはそれとそっくりに作られてるんです～」"

[[dialogue]]
speaker = "ラティエ"
# 「これは素晴らしいな。まるで本当に巨大な客船に乗っている気分が味わえそうだ」
line = "「これは素晴らしいな。まるで本当に巨大な客船に乗っている気分が味わえそうだ」"

[[dialogue]]
speaker = "サラン"
# 「うふふ、そうなんですよ～」
line = "「うふふ、そうなんですよ～」"

[[dialogue]]
speaker = "unk"
# 売店もたくさんあるね
line = "売店もたくさんあるね"

[[dialogue]]
speaker = "ラティエ"
# 「ふむ、可愛らしいお店でいっぱいだ」
line = "「ふむ、可愛らしいお店でいっぱいだ」"

[[dialogue]]
speaker = "サラン"
# 「お料理もとっても美味しいですよ～。サランもメニュー作りに協力したのです～」
line = "「お料理もとっても美味しいですよ～。サランもメニュー作りに協力したのです～」"

[[dialogue]]
speaker = "ラティエ"
# 「噂には聞いているよ。きみが味を認めた料理は必ず好評を博すとか」
line = "「噂には聞いているよ。きみが味を認めた料理は必ず好評を博すとか」"

[[dialogue]]
speaker = "ラティエ"
# 「お菓子作りに関してはプロ顔負けの腕を持っていて、きみの手がけたスイーツも各所で大人気だとか」
line = "「お菓子作りに関してはプロ顔負けの腕を持っていて、きみの手がけたスイーツも各所で大人気だとか」"

[[dialogue]]
speaker = "サラン"
# 「嬉しいです～。今日もぜひお腹いっぱい食べて行ってください～」
line = "「嬉しいです～。今日もぜひお腹いっぱい食べて行ってください～」"

[[dialogue]]
speaker = "ラティエ"
# 「ありがとう。だがその前にさっそくひと泳ぎといこうか」
line = "「ありがとう。だがその前にさっそくひと泳ぎといこうか」"

[[dialogue]]
speaker = "ラティエ"
# 「ふむ……なかなかいい着心地だ。感想はどうかな？」
line = "「ふむ……なかなかいい着心地だ。感想はどうかな？」"

[[dialogue]]
speaker = "unk"
# と、とても良いと思います
line = "と、とても良いと思います"

[[dialogue]]
speaker = "ラティエ"
# 「はっはっは、ありがとう」
line = "「はっはっは、ありがとう」"

[[dialogue]]
speaker = "ラティエ"
# 「しかし水着フォームというのは、わざわざ着替えに行く手間がかからないから便利だな」
line = "「しかし水着フォームというのは、わざわざ着替えに行く手間がかからないから便利だな」"

[[dialogue]]
speaker = "サラン"
# 「うふふ、それじゃサランたちもここで変身するよ～」
line = "「うふふ、それじゃサランたちもここで変身するよ～」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「了解ですわ」
line = "「了解ですわ」"

[[dialogue]]
speaker = "unk"
# 学園長に続いてサランとエルゼも水着に変身する。
line = "学園長に続いてサランとエルゼも水着に変身する。"

[[dialogue]]
speaker = "ラティエ"
# 「２人とも良く似合っているな。サラン嬢の水着はお菓子をイメージしたものかな？」
line = "「２人とも良く似合っているな。サラン嬢の水着はお菓子をイメージしたものかな？」"

[[dialogue]]
speaker = "サラン"
# 「そうだと思います～。可愛くて美味しそうでとっても気に入ってるの～♪」
line = "「そうだと思います～。可愛くて美味しそうでとっても気に入ってるの～♪」"

[[dialogue]]
speaker = "ラティエ"
# 「エルデリーゼ嬢は白いスクール水着か。確かきみのライバルの白楯アム嬢の水着フォームもスクール水着だったと思うが」
line = "「エルデリーゼ嬢は白いスクール水着か。確かきみのライバルの白楯アム嬢の水着フォームもスクール水着だったと思うが」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「学生にとっての正装は制服ですわ。ならば水着の正装はスクール水着ですの」
line = "「学生にとっての正装は制服ですわ。ならば水着の正装はスクール水着ですの」"

[[dialogue]]
speaker = "ラティエ"
# 「なるほど、その通りかもしれない。うむ、きみはとても真面目な子なんだな」
line = "「なるほど、その通りかもしれない。うむ、きみはとても真面目な子なんだな」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「そ、そんなことはありませんの……」
line = "「そ、そんなことはありませんの……」"

[[dialogue]]
speaker = "unk"
# 知らない人からすれば謙遜に聞こえるかもしれない。
line = "知らない人からすれば謙遜に聞こえるかもしれない。"

[[dialogue]]
speaker = "unk"
# だが、毎晩のように流星寮を抜け出して遊びに出かけていることを知っていると、なんと反応すればいいか困ってしまう。
line = "だが、毎晩のように流星寮を抜け出して遊びに出かけていることを知っていると、なんと反応すればいいか困ってしまう。"

[[dialogue]]
speaker = "ラティエ"
# 「ふふ、我々の水着に見とれてしまう気持ちは分かるが、きみも早く水着に着替えたまえ」
line = "「ふふ、我々の水着に見とれてしまう気持ちは分かるが、きみも早く水着に着替えたまえ」"

[[dialogue]]
speaker = "ラティエ"
# 「開園初日と聞いていたから混雑も覚悟していたが、案外のびのびと泳げるものだな」
line = "「開園初日と聞いていたから混雑も覚悟していたが、案外のびのびと泳げるものだな」"

[[dialogue]]
speaker = "サラン"
# 「お客さんがいっぱい来ても大丈夫なように、出来るだけ広くするってお話してました～」
line = "「お客さんがいっぱい来ても大丈夫なように、出来るだけ広くするってお話してました～」"

[[dialogue]]
speaker = "ラティエ"
# 「ああ、おかげでとても快適だ」
line = "「ああ、おかげでとても快適だ」"

[[dialogue]]
speaker = "サラン"
# 「この甲板のプールは、お船の方のチェリークルーズ号のプールと同じ大きさなんですよ～」
line = "「この甲板のプールは、お船の方のチェリークルーズ号のプールと同じ大きさなんですよ～」"

[[dialogue]]
speaker = "ラティエ"
# 「それは興味深い。今度はその客船の方にもぜひ乗せて欲しいものだ」
line = "「それは興味深い。今度はその客船の方にもぜひ乗せて欲しいものだ」"

[[dialogue]]
speaker = "エスメラルダ"
# 『じょ、冗談じゃないわ！　国外に逃亡されたら追いかけるのも一苦労です！　引き止めてください！』
line = "『じょ、冗談じゃないわ！　国外に逃亡されたら追いかけるのも一苦労です！　引き止めてください！』"

[[dialogue]]
speaker = "unk"
# が、学園長の仕事はどうするんですか？
line = "が、学園長の仕事はどうするんですか？"

[[dialogue]]
speaker = "unk"
# （引き止めてって言われても！）
line = "（引き止めてって言われても！）"

[[dialogue]]
speaker = "ラティエ"
# 「はっはっは、そうだったな」
line = "「はっはっは、そうだったな」"

[[dialogue]]
speaker = "ラティエ"
# 「となると私がその客船に乗れるのは、学園長を退いたあとのことになるか？　ずいぶんと先のことになりそうだ」
line = "「となると私がその客船に乗れるのは、学園長を退いたあとのことになるか？　ずいぶんと先のことになりそうだ」"

[[dialogue]]
speaker = "サラン"
# 「学園長さんは旅がお好きなの？」
line = "「学園長さんは旅がお好きなの？」"

[[dialogue]]
speaker = "ラティエ"
# 「そうだね。私の人生は旅と共にあるといっても過言ではない」
line = "「そうだね。私の人生は旅と共にあるといっても過言ではない」"

[[dialogue]]
speaker = "ラティエ"
# 「人間界、天界、魔界……色々な場所に行ったが、豪華客船で世界一周というのはやったことがないな」
line = "「人間界、天界、魔界……色々な場所に行ったが、豪華客船で世界一周というのはやったことがないな」"

[[dialogue]]
speaker = "ラティエ"
# 「今まで私が旅をしていても、特に学園の運営に大きな影響はなかった。ならば退任を待たず、今からその旅に出ても──」
line = "「今まで私が旅をしていても、特に学園の運営に大きな影響はなかった。ならば退任を待たず、今からその旅に出ても──」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「問題あると思いますわ。今までも学園長様不在で影響が無かったわけではありませんので」
line = "「問題あると思いますわ。今までも学園長様不在で影響が無かったわけではありませんので」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「その分、フィオナ会長を始め色々な方が大変な思いをしてこられたのだと思います」
line = "「その分、フィオナ会長を始め色々な方が大変な思いをしてこられたのだと思います」"

[[dialogue]]
speaker = "エスメラルダ"
# 『そう、その通りよ！　あぁ、エルデリーゼさん、よく言ってくれたわ！！』
line = "『そう、その通りよ！　あぁ、エルデリーゼさん、よく言ってくれたわ！！』"

[[dialogue]]
speaker = "unk"
# エルゼの言葉にエスメラルダ先生が興奮している。
line = "エルゼの言葉にエスメラルダ先生が興奮している。"

[[dialogue]]
speaker = "unk"
# これ以上、負担をかけないでください
line = "これ以上、負担をかけないでください"

[[dialogue]]
speaker = "unk"
# エルゼの言う通りです
line = "エルゼの言う通りです"

[[dialogue]]
speaker = "ラティエ"
# 「うむ……そこまで言われてしまっては仕方ないな、世界一周豪華客船の旅は未来の楽しみとしよう」
line = "「うむ……そこまで言われてしまっては仕方ないな、世界一周豪華客船の旅は未来の楽しみとしよう」"

[[dialogue]]
speaker = "unk"
# 学園長は笑って受け流すが、エルゼは不満げな様子で学園長を見つめている。
line = "学園長は笑って受け流すが、エルゼは不満げな様子で学園長を見つめている。"

[[dialogue]]
speaker = "unk"
# エルゼの様子がおかしいと思っていたが、その理由がだんだん見えてきた。
line = "エルゼの様子がおかしいと思っていたが、その理由がだんだん見えてきた。"

[[dialogue]]
speaker = "unk"
# エルゼはフィオナのことをとても慕っている。
line = "エルゼはフィオナのことをとても慕っている。"

[[dialogue]]
speaker = "unk"
# そんなフィオナに苦労を押し付けて、好き勝手に旅を楽しんでいる学園長が許せない、とそういうことなのだろう。
line = "そんなフィオナに苦労を押し付けて、好き勝手に旅を楽しんでいる学園長が許せない、とそういうことなのだろう。"
