[[dialogue]]
speaker = "unk"
# 第１話,気弱な異世界人ステラ,P
line = "第１話,気弱な異世界人ステラ,P"

[[dialogue]]
speaker = "unk"
# その女の子は、強引に異世界へ召喚された挙げ句、黒ベア子に赤ちゃんクマロボのお世話係を任命されてしまったらしい。
line = "その女の子は、強引に異世界へ召喚された挙げ句、黒ベア子に赤ちゃんクマロボのお世話係を任命されてしまったらしい。"

[[dialogue]]
speaker = "unk"
# 今日は、その召喚があった日の翌日──
line = "今日は、その召喚があった日の翌日──"

[[dialogue]]
speaker = "ステラ"
# 「あ、あの……お部屋にいたら、急に目の前が真っ暗になったんです……」
line = "「あ、あの……お部屋にいたら、急に目の前が真っ暗になったんです……」"

[[dialogue]]
speaker = "ステラ"
# 「それで気が付いたら……ここに来ちゃってて、ビックリしました……」
line = "「それで気が付いたら……ここに来ちゃってて、ビックリしました……」"

[[dialogue]]
speaker = "unk"
# たどたどしい口調で話す彼女の名前はステラ。
line = "たどたどしい口調で話す彼女の名前はステラ。"

[[dialogue]]
speaker = "unk"
# スプリングガーデンという異世界からやってきた<ruby=フラワーナイト>花騎士</ruby>である彼女から、俺たちは転移事件当時の詳しい事情を聴いていた。
line = "スプリングガーデンという異世界からやってきた<ruby>花騎士<rt>フラワーナイト</rt></ruby>である彼女から、俺たちは転移事件当時の詳しい事情を聴いていた。"

[[dialogue]]
speaker = "ルリエル"
# 「いやはや、それは災難でしたね～」
line = "「いやはや、それは災難でしたね～」"

[[dialogue]]
speaker = "ルリエル"
# 「困ったことがあればこのルリエルに、なーんでも相談してくださいねっ！」
line = "「困ったことがあればこのルリエルに、なーんでも相談してくださいねっ！」"

[[dialogue]]
speaker = "ステラ"
# 「は、はい……ありがとう、ございます……」
line = "「は、はい……ありがとう、ございます……」"

[[dialogue]]
speaker = "ルリエル"
# 「うーん、やっぱり不安ですよね～！　そのお気持ち、わかりますよ～」
line = "「うーん、やっぱり不安ですよね～！　そのお気持ち、わかりますよ～」"

[[dialogue]]
speaker = "ルリエル"
# 「実はわたしもステラさんと同じように、異世界に行った経験があるんです。だからこそ、その不安な気持ちに寄り添ったケアが出来るというものです！」
line = "「実はわたしもステラさんと同じように、異世界に行った経験があるんです。だからこそ、その不安な気持ちに寄り添ったケアが出来るというものです！」"

[[dialogue]]
speaker = "ルリエル"
# 「加えて異世界からやって来た人をおもてなしするのも初めてではありません！　お世話係はお手のものと言っていいでしょう！」
line = "「加えて異世界からやって来た人をおもてなしするのも初めてではありません！　お世話係はお手のものと言っていいでしょう！」"

[[dialogue]]
speaker = "ルリエル"
# 「いや～、さすがは会長さん、まさに適材適所なナイス采配なのです♪　というわけでステラさん、大船に乗った気持ちでいてください♪」
line = "「いや～、さすがは会長さん、まさに適材適所なナイス采配なのです♪　というわけでステラさん、大船に乗った気持ちでいてください♪」"

[[dialogue]]
speaker = "ステラ"
# 「あの……はい……」
line = "「あの……はい……」"

[[dialogue]]
speaker = "ルリエル"
# 「ふええっ！？　何だかますます緊張したようなお顔になってしまっているのです！？」
line = "「ふええっ！？　何だかますます緊張したようなお顔になってしまっているのです！？」"

[[dialogue]]
speaker = "unk"
# 圧倒されちゃったんじゃないかな
line = "圧倒されちゃったんじゃないかな"

[[dialogue]]
speaker = "unk"
# ルリエルが一気にしゃべるから
line = "ルリエルが一気にしゃべるから"

[[dialogue]]
speaker = "ルリエル"
# 「す、すみませんでした～っ！　大丈夫ですよ～、恐くないですよ～？」
line = "「す、すみませんでした～っ！　大丈夫ですよ～、恐くないですよ～？」"

[[dialogue]]
speaker = "ステラ"
# 「い、いえ！　元々ボクは、人とおしゃべりするのが、あまり得意じゃないので……」
line = "「い、いえ！　元々ボクは、人とおしゃべりするのが、あまり得意じゃないので……」"

[[dialogue]]
speaker = "ルリエル"
# 「ふむふむ、ステラさんはとっても人見知りさんなんですね」
line = "「ふむふむ、ステラさんはとっても人見知りさんなんですね」"

[[dialogue]]
speaker = "ステラ"
# 「す、すみません……」
line = "「す、すみません……」"

[[dialogue]]
speaker = "unk"
# 大きく<ruby=くく>括</ruby>れば人見知りという事なんだろうけど、ステラの場合は少し違っているようで──
line = "大きく<ruby>括<rt>くく</rt></ruby>れば人見知りという事なんだろうけど、ステラの場合は少し違っているようで──"

[[dialogue]]
speaker = "unk"
# ルリエルの真っ直ぐな視線を受け止められず、身を縮こまらせながらどうにか避けようとしている……と、そんな風に見えた。
line = "ルリエルの真っ直ぐな視線を受け止められず、身を縮こまらせながらどうにか避けようとしている……と、そんな風に見えた。"

[[dialogue]]
speaker = "unk"
# 誰かにじっと見られることが苦手？
line = "誰かにじっと見られることが苦手？"

[[dialogue]]
speaker = "unk"
# もしかしてステラは
line = "もしかしてステラは"

[[dialogue]]
speaker = "ステラ"
# 「えっ？　あ、あの……実は、少し……」
line = "「えっ？　あ、あの……実は、少し……」"

[[dialogue]]
speaker = "ステラ"
# 「昔……とあることで、望まないのにみんなから注目の的になってしまったことがあって……」
line = "「昔……とあることで、望まないのにみんなから注目の的になってしまったことがあって……」"

[[dialogue]]
speaker = "ステラ"
# 「それ以来、誰かから好奇の視線を向けられるのが……ちょっと苦手になってしまったんです……」
line = "「それ以来、誰かから好奇の視線を向けられるのが……ちょっと苦手になってしまったんです……」"

[[dialogue]]
speaker = "ルリエル"
# 「そ、そうだったんですか！　それは失礼しました……」
line = "「そ、そうだったんですか！　それは失礼しました……」"

[[dialogue]]
speaker = "ステラ"
# 「あっ！　だ、大丈夫です……ルリエルさんに悪意がないことは、わかってますから……」
line = "「あっ！　だ、大丈夫です……ルリエルさんに悪意がないことは、わかってますから……」"

[[dialogue]]
speaker = "unk"
# 無理に聞こうとか、そういうのじゃないから
line = "無理に聞こうとか、そういうのじゃないから"

[[dialogue]]
speaker = "unk"
# 辛い過去だったらごめん……
line = "辛い過去だったらごめん……"

[[dialogue]]
speaker = "ステラ"
# 「ああ、いえ！　そこまで壮大な過去っていうわけでもなくて！　ボクの中でも、折り合いはついているので」
line = "「ああ、いえ！　そこまで壮大な過去っていうわけでもなくて！　ボクの中でも、折り合いはついているので」"

[[dialogue]]
speaker = "ステラ"
# 「その、せっかくなので、お二人には説明させてください……」
line = "「その、せっかくなので、お二人には説明させてください……」"

[[dialogue]]
speaker = "ステラ"
# 「ボクの<ruby=フラワーナイト>花騎士</ruby>としての能力が、自分の体や触れたものを発光させたりする能力なんですけど……」
line = "「ボクの<ruby>花騎士<rt>フラワーナイト</rt></ruby>としての能力が、自分の体や触れたものを発光させたりする能力なんですけど……」"

[[dialogue]]
speaker = "ステラ"
# 「昔は、この力を制御できなくて……意図していないのに光ったり、光らせたりしてしまっていたんです」
line = "「昔は、この力を制御できなくて……意図していないのに光ったり、光らせたりしてしまっていたんです」"

[[dialogue]]
speaker = "ステラ"
# 「それが周りの人の注目を引いてしまって……それ以来、注目を浴びることが苦手になってしまいました……」
line = "「それが周りの人の注目を引いてしまって……それ以来、注目を浴びることが苦手になってしまいました……」"

[[dialogue]]
speaker = "ステラ"
# 「以前に比べたら今はだいぶ克服したと思ってるんですけど……それでもまだ、慣れないとちょっと……」
line = "「以前に比べたら今はだいぶ克服したと思ってるんですけど……それでもまだ、慣れないとちょっと……」"

[[dialogue]]
speaker = "ルリエル"
# 「わかりました！　ステラさんとお話する時は、こうして目をつぶってお話することにします！」
line = "「わかりました！　ステラさんとお話する時は、こうして目をつぶってお話することにします！」"

[[dialogue]]
speaker = "ステラ"
# 「そ、そこまでして頂かなくても大丈夫です！　多分、ちょっとずつ慣れていけると思いますから……」
line = "「そ、そこまでして頂かなくても大丈夫です！　多分、ちょっとずつ慣れていけると思いますから……」"

[[dialogue]]
speaker = "ステラ"
# 「ただ、ボクの能力のことについては……できるだけ人に話さないでおいてもらえますか？」
line = "「ただ、ボクの能力のことについては……できるだけ人に話さないでおいてもらえますか？」"

[[dialogue]]
speaker = "ルリエル"
# 「……ステラさんは、ご自分の能力のことがあまり好きではないのですか？」
line = "「……ステラさんは、ご自分の能力のことがあまり好きではないのですか？」"

[[dialogue]]
speaker = "ステラ"
# 「そんなことはないです。一時は嫌だって思ってた時期もありましたけど……」
line = "「そんなことはないです。一時は嫌だって思ってた時期もありましたけど……」"

[[dialogue]]
speaker = "ステラ"
# 「でも……そのことで悩んでた時、パパとママがボクを抱きしめながら言ってくれたんです……」
line = "「でも……そのことで悩んでた時、パパとママがボクを抱きしめながら言ってくれたんです……」"

[[dialogue]]
speaker = "ステラ"
# 「ボクの光は、誰かを助けたいという思いと、困難に立ち向かう勇気……その表れなんだって……」
line = "「ボクの光は、誰かを助けたいという思いと、困難に立ち向かう勇気……その表れなんだって……」"

[[dialogue]]
speaker = "ステラ"
# 「その言葉のおかげで、ボクは自分のこの能力のことを……受け入れることができました」
line = "「その言葉のおかげで、ボクは自分のこの能力のことを……受け入れることができました」"

[[dialogue]]
speaker = "ステラ"
# 「だから、好きではない、ということはありません……けど、それと変に目立ってしまうのは別問題ですから……」
line = "「だから、好きではない、ということはありません……けど、それと変に目立ってしまうのは別問題ですから……」"

[[dialogue]]
speaker = "ルリエル"
# 「わかりました！　ではステラさんの能力は出来るだけ秘密、ということで！」
line = "「わかりました！　ではステラさんの能力は出来るだけ秘密、ということで！」"

[[dialogue]]
speaker = "ステラ"
# 「ありがとうございます、お願いします……」
line = "「ありがとうございます、お願いします……」"

[[dialogue]]
speaker = "unk"
# 話をしている内に、少しずつステラの緊張が解けてきたように思う。
line = "話をしている内に、少しずつステラの緊張が解けてきたように思う。"

[[dialogue]]
speaker = "unk"
# そして秘密にしておきたい能力のことなども話してくれて……ステラなりに打ち解けようとしてくれている気持ちが伝わってくる。
line = "そして秘密にしておきたい能力のことなども話してくれて……ステラなりに打ち解けようとしてくれている気持ちが伝わってくる。"

[[dialogue]]
speaker = "赤ちゃんクマロボ"
# 「ばぶー<emoji=heart04>」
line = "「ばぶー<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
# 「はわわ、いけません！　ルリエルたちばっかりで盛り上がってて、この子も構って欲しいみたいですよ」
line = "「はわわ、いけません！　ルリエルたちばっかりで盛り上がってて、この子も構って欲しいみたいですよ」"

[[dialogue]]
speaker = "ステラ"
# 「そ、そうですよね……よしよし、ごめんね～」
line = "「そ、そうですよね……よしよし、ごめんね～」"

[[dialogue]]
speaker = "unk"
# その子のお世話の方は大丈夫？
line = "その子のお世話の方は大丈夫？"

[[dialogue]]
speaker = "ステラ"
# 「はい、大丈夫です」
line = "「はい、大丈夫です」"

[[dialogue]]
speaker = "ステラ"
# 「最初、急にこの子を渡された時は、赤ちゃんの面倒を見るなんて自分にはとても無理だって思ってたんですけど……」
line = "「最初、急にこの子を渡された時は、赤ちゃんの面倒を見るなんて自分にはとても無理だって思ってたんですけど……」"

[[dialogue]]
speaker = "ステラ"
# 「でもこの子がとってもいい子にしてくれてますから、今のところ何も問題ないです」
line = "「でもこの子がとってもいい子にしてくれてますから、今のところ何も問題ないです」"

[[dialogue]]
speaker = "ステラ"
# 「それに……この子は今、家族と離れ離れなんですよね？　こんなに小さいのに……」
line = "「それに……この子は今、家族と離れ離れなんですよね？　こんなに小さいのに……」"

[[dialogue]]
speaker = "ステラ"
# 「そんな境遇を聞いてしまったら、放っておけないです。ボクにできる事なら何でもやってあげたいって気持ちです」
line = "「そんな境遇を聞いてしまったら、放っておけないです。ボクにできる事なら何でもやってあげたいって気持ちです」"

[[dialogue]]
speaker = "ステラ"
# 「パパ捜しのお手伝いは出来ませんでしたから、せめて今はボクがこの子の家族になって守ってあげなくちゃって思ってます」
line = "「パパ捜しのお手伝いは出来ませんでしたから、せめて今はボクがこの子の家族になって守ってあげなくちゃって思ってます」"

[[dialogue]]
speaker = "ルリエル"
# 「ルリエルも一緒に頑張りますよ～♪」
line = "「ルリエルも一緒に頑張りますよ～♪」"

[[dialogue]]
speaker = "赤ちゃんクマロボ"
# 「ばぶー<emoji=heart04>」
line = "「ばぶー<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 和気あいあいとした空気に包まれる星徒会室だった。
line = "和気あいあいとした空気に包まれる星徒会室だった。"

[[dialogue]]
speaker = "unk"
# しかし、まさか──この数日後、あんな事件が発生してしまうとは、この平和な空気からは到底想像できなかったのだった。
line = "しかし、まさか──この数日後、あんな事件が発生してしまうとは、この平和な空気からは到底想像できなかったのだった。"
