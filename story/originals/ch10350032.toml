[[dialogue]]
speaker = "unk"
# 第２話,娯楽を体験しよう～ボードゲーム編～,P
line = "第２話,娯楽を体験しよう～ボードゲーム編～,P"

[[dialogue]]
speaker = "セナリィ"
# 「……ボードゲーム？　いえ、やったことはありませんわ」
line = "「……ボードゲーム？　いえ、やったことはありませんわ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「あれま。会長の言うとおりだね。本当にお金が絡まない遊びを知らないんだ、セナリィって」
line = "「あれま。会長の言うとおりだね。本当にお金が絡まない遊びを知らないんだ、セナリィって」"

[[dialogue]]
speaker = "セナリィ"
# 「仕方がないでしょう。時間が空けばビジネスのことばかり考える生活だったのですから」
line = "「仕方がないでしょう。時間が空けばビジネスのことばかり考える生活だったのですから」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「でも今は、セナリィにいろんな遊びを経験させたいって思ってくれる優しい彼氏がいるから、考えも変わったってことなのかな？」
line = "「でも今は、セナリィにいろんな遊びを経験させたいって思ってくれる優しい彼氏がいるから、考えも変わったってことなのかな？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「よかったねぇセナリィ。会長に愛されてるね～♪」
line = "「よかったねぇセナリィ。会長に愛されてるね～♪」"

[[dialogue]]
speaker = "セナリィ"
# 「かっ、からかうんじゃありませんわよ！　会長様の気遣いは感謝いたしますが、だからマインを誘うのは嫌だったんですわ……！」
line = "「かっ、からかうんじゃありませんわよ！　会長様の気遣いは感謝いたしますが、だからマインを誘うのは嫌だったんですわ……！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「そう言わずに～♪　ボードゲームは大勢でやった方が楽しいし！　ほらほら、どのゲームにする？」
line = "「そう言わずに～♪　ボードゲームは大勢でやった方が楽しいし！　ほらほら、どのゲームにする？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「会長の家、なんだかすっごいたくさんボドゲが揃ってるし♪　選び放題だよ～」
line = "「会長の家、なんだかすっごいたくさんボドゲが揃ってるし♪　選び放題だよ～」"

[[dialogue]]
speaker = "セナリィ"
# 「──ボドゲカフェでバイトをした時にハマったんですの？　相変わらず無駄に交友関係や趣味の広いお人ですわね……」
line = "「──ボドゲカフェでバイトをした時にハマったんですの？　相変わらず無駄に交友関係や趣味の広いお人ですわね……」"

[[dialogue]]
speaker = "セナリィ"
# 「あら──これは？」
line = "「あら──これは？」"

[[dialogue]]
speaker = "unk"
# ライフ＆マネーゲームだね
line = "ライフ＆マネーゲームだね"

[[dialogue]]
speaker = "セナリィ"
# 「ライフ＆マネー……？　ちょっと想像がつかないですわね」
line = "「ライフ＆マネー……？　ちょっと想像がつかないですわね」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「職業と性別を決めてスタートする<ruby=すごろく>双六</ruby>だよ。マスに止まるたびに、人生の節目のイベントが起こって資産が変動して……」
line = "「職業と性別を決めてスタートする<ruby>双六<rt>すごろく</rt></ruby>だよ。マスに止まるたびに、人生の節目のイベントが起こって資産が変動して……」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「それでゴールした時の総資産が一番多い人が勝ち！　シンプルでしょ？」
line = "「それでゴールした時の総資産が一番多い人が勝ち！　シンプルでしょ？」"

[[dialogue]]
speaker = "セナリィ"
# 「面白そうですわ！　人生という縮図の価値を、資産で測るだなんて！」
line = "「面白そうですわ！　人生という縮図の価値を、資産で測るだなんて！」"

[[dialogue]]
speaker = "セナリィ"
# 「実に私好みのゲームの匂いがいたしますわ！　これにいたしましょう！」
line = "「実に私好みのゲームの匂いがいたしますわ！　これにいたしましょう！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「オッケー。それじゃあ職業選択だね～……お、交渉人ってのがある。私はこれにしよーっと♪」
line = "「オッケー。それじゃあ職業選択だね～……お、交渉人ってのがある。私はこれにしよーっと♪」"

[[dialogue]]
speaker = "セナリィ"
# 「私はもちろん、会社経営者でスタートですわ！　ガッツリ儲けてぶっちぎりの１位を取りますわよ！」
line = "「私はもちろん、会社経営者でスタートですわ！　ガッツリ儲けてぶっちぎりの１位を取りますわよ！」"

[[dialogue]]
speaker = "セナリィ"
# 「ホワイ！？　また株価の暴落ですの！？　あぁ、大枚をはたいて購入した株券がすべて紙クズに……！」
line = "「ホワイ！？　また株価の暴落ですの！？　あぁ、大枚をはたいて購入した株券がすべて紙クズに……！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「あはははっ♪　ゲームの中でまでお金をスっちゃうとか。流石はセナリィ～♪」
line = "「あはははっ♪　ゲームの中でまでお金をスっちゃうとか。流石はセナリィ～♪」"

[[dialogue]]
speaker = "セナリィ"
# 「ゲームの中でまで、は余計です！　しかしまだ順位は２位。会長様より私は資産を持っていますわ！」
line = "「ゲームの中でまで、は余計です！　しかしまだ順位は２位。会長様より私は資産を持っていますわ！」"

[[dialogue]]
speaker = "unk"
# あ、宝くじで１億テルス当たった
line = "あ、宝くじで１億テルス当たった"

[[dialogue]]
speaker = "セナリィ"
# 「ずりぃですわよ！？　私、最下位じゃないですか！？」
line = "「ずりぃですわよ！？　私、最下位じゃないですか！？」"

[[dialogue]]
speaker = "セナリィ"
# 「ここから巻き返さなくては……会社さえ守れていれば、逆転も十分狙える圏内ですわ……！」
line = "「ここから巻き返さなくては……会社さえ守れていれば、逆転も十分狙える圏内ですわ……！」"

[[dialogue]]
speaker = "セナリィ"
# 「止まったのはイベントカードマス。ここでラッキーなものを引くのです──フンッ！　ディスティニードロー！」
line = "「止まったのはイベントカードマス。ここでラッキーなものを引くのです──フンッ！　ディスティニードロー！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「『経営してる会社で部下がクーデターを起こす。代表権を剥奪されてフリーターに転職』……うわ～、ご愁傷様～♪」
line = "「『経営してる会社で部下がクーデターを起こす。代表権を剥奪されてフリーターに転職』……うわ～、ご愁傷様～♪」"

[[dialogue]]
speaker = "セナリィ"
# 「ミウ！？　ヒマワリー！？　そんな！　信じてましたのに……見捨てないでほしいですわ～！？」
line = "「ミウ！？　ヒマワリー！？　そんな！　信じてましたのに……見捨てないでほしいですわ～！？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「あ、ラッキー♪　私も宝くじ当たった！　これで会長の総資産を超えたんじゃない？」
line = "「あ、ラッキー♪　私も宝くじ当たった！　これで会長の総資産を超えたんじゃない？」"

[[dialogue]]
speaker = "セナリィ"
# 「私ばかりバッドイベントを……！　次こそラッキーなものを……ルーレット、頼みますわよ！」
line = "「私ばかりバッドイベントを……！　次こそラッキーなものを……ルーレット、頼みますわよ！」"

[[dialogue]]
speaker = "セナリィ"
# 「──青色マスに止まりましたわ！　何かおめでたいイベントが確定で起こるマスですわよね！？」
line = "「──青色マスに止まりましたわ！　何かおめでたいイベントが確定で起こるマスですわよね！？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「これは──おぉ♪　やったね、結婚イベントだって<emoji=heart04>」
line = "「これは──おぉ♪　やったね、結婚イベントだって<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
# 「結婚！？　誰と！？」
line = "「結婚！？　誰と！？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「異性は１人しかいないから……ひゅ～♪　お相手は会長で～す<emoji=heart04>」
line = "「異性は１人しかいないから……ひゅ～♪　お相手は会長で～す<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
# 「ファ～！？」
line = "「ファ～！？」"

[[dialogue]]
speaker = "unk"
# あ、子供も産まれるみたい
line = "あ、子供も産まれるみたい"

[[dialogue]]
speaker = "セナリィ"
# 「子供！？　会長様と私の！？　それは……め、めでたいですわね……<emoji=heart04>」
line = "「子供！？　会長様と私の！？　それは……め、めでたいですわね……<emoji=heart04>」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「うんうん。ここから毎月、給料日に子育て資金の積み立てが発生するから。１０パーセント天引きね～？」
line = "「うんうん。ここから毎月、給料日に子育て資金の積み立てが発生するから。１０パーセント天引きね～？」"

[[dialogue]]
speaker = "セナリィ"
# 「えっ、お金がかかるんですの！？」
line = "「えっ、お金がかかるんですの！？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「当たり前じゃーん♪　子育てはお金がかかるんだよ、セナリィ？」
line = "「当たり前じゃーん♪　子育てはお金がかかるんだよ、セナリィ？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「でも結婚したから会長と総資産は折半だよ。さっきの１億テルス、半分はセナリィが所持できることになるね～」
line = "「でも結婚したから会長と総資産は折半だよ。さっきの１億テルス、半分はセナリィが所持できることになるね～」"

[[dialogue]]
speaker = "unk"
# 資産を吸われた……！？
line = "資産を吸われた……！？"

[[dialogue]]
speaker = "セナリィ"
# 「やりましたわ！　このままマインを追い抜きますわよ～！」
line = "「やりましたわ！　このままマインを追い抜きますわよ～！」"

[[dialogue]]
speaker = "セナリィ"
# 「追い抜くつもりでしたのに……！？」
line = "「追い抜くつもりでしたのに……！？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「セナリィ、４回目の出産おめでと～♪　積み立て金が増えま～す<emoji=heart04>」
line = "「セナリィ、４回目の出産おめでと～♪　積み立て金が増えま～す<emoji=heart04>」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「てゆーか２人とも、子作りに気合い入れすぎ～♪　私、見せつけられちゃってるー？」
line = "「てゆーか２人とも、子作りに気合い入れすぎ～♪　私、見せつけられちゃってるー？」"

[[dialogue]]
speaker = "unk"
# セナリィが出産マスにばかり止まるから！
line = "セナリィが出産マスにばかり止まるから！"

[[dialogue]]
speaker = "セナリィ"
# 「しょうがねぇですわっ！？　ルーレットなんですから……！」
line = "「しょうがねぇですわっ！？　ルーレットなんですから……！」"

[[dialogue]]
speaker = "セナリィ"
# （愛はあるのにお金はない……会長様と一緒に圧倒的の最下位……で、でも何だか悪くない気がいたしますわ……）
line = "（愛はあるのにお金はない……会長様と一緒に圧倒的の最下位……で、でも何だか悪くない気がいたしますわ……）"

[[dialogue]]
speaker = "セナリィ"
# （愛する夫と、たくさんの可愛い子供に囲まれて……貧乏だけれどきっと温かな家庭が……<emoji=heart04>）
line = "（愛する夫と、たくさんの可愛い子供に囲まれて……貧乏だけれどきっと温かな家庭が……<emoji=heart04>）"

[[dialogue]]
speaker = "セナリィ"
# （──ハッ！？　こんな思考、悪の道から外れていますわ！　この世は金！　金こそ力のはず！）
line = "（──ハッ！？　こんな思考、悪の道から外れていますわ！　この世は金！　金こそ力のはず！）"

[[dialogue]]
speaker = "セナリィ"
# （バンデット・セナリィ、己のポリシィを思い出すのです……ゲームに勝たねば！　敗者には何も残らないのですわ！）
line = "（バンデット・セナリィ、己のポリシィを思い出すのです……ゲームに勝たねば！　敗者には何も残らないのですわ！）"

[[dialogue]]
speaker = "ネーゼマイン"
# 「おーい？　セナリィの番だよ、ルーレット」
line = "「おーい？　セナリィの番だよ、ルーレット」"

[[dialogue]]
speaker = "セナリィ"
# 「え、ええ──分かっていますわ。止まるマスは……？」
line = "「え、ええ──分かっていますわ。止まるマスは……？」"

[[dialogue]]
speaker = "unk"
# 孫が生まれたー！？
line = "孫が生まれたー！？"

[[dialogue]]
speaker = "unk"
# 俺たちの子供の……
line = "俺たちの子供の……"

[[dialogue]]
speaker = "セナリィ"
# 「まさかの３世帯！　で、でも流石に孫のぶんまでの積立金はありませんわよね！？」
line = "「まさかの３世帯！　で、でも流石に孫のぶんまでの積立金はありませんわよね！？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「いやいや。お祖母ちゃんになるんだからお祝いも気合い入れなくちゃ♪　こっからは２０パーセント積み立てに増額されるよ！　めでたしめでたし♪」
line = "「いやいや。お祖母ちゃんになるんだからお祝いも気合い入れなくちゃ♪　こっからは２０パーセント積み立てに増額されるよ！　めでたしめでたし♪」"

[[dialogue]]
speaker = "セナリィ"
# 「めでたくないですわぁ～っ！？」
line = "「めでたくないですわぁ～っ！？」"

[[dialogue]]
speaker = "セナリィ"
# （でも可愛い孫まで産まれて……やっぱり悪くない気がいたしますわ～！？　ああ……私、どうしてしまいましたの～！？）
line = "（でも可愛い孫まで産まれて……やっぱり悪くない気がいたしますわ～！？　ああ……私、どうしてしまいましたの～！？）"

[[dialogue]]
speaker = "ネーゼマイン"
# 「安心しなって～。ゲーム終盤に子供や孫が一発当てるイベントもあるはずだし♪　希望を捨てちゃだめだよセナリィ～？」
line = "「安心しなって～。ゲーム終盤に子供や孫が一発当てるイベントもあるはずだし♪　希望を捨てちゃだめだよセナリィ～？」"

[[dialogue]]
speaker = "unk"
# しかしその後、セナリィに都合のよい儲かるイベントが起きることはなく。結婚イベントで資産を共有した俺たちは揃って最下位に沈むのだった……
line = "しかしその後、セナリィに都合のよい儲かるイベントが起きることはなく。結婚イベントで資産を共有した俺たちは揃って最下位に沈むのだった……"
