[[dialogue]]
speaker = "unk"
# 第４話,妄想天使と甘い触れ合い,P
line = "第４話,妄想天使と甘い触れ合い,P"

[[dialogue]]
speaker = "unk"
# ホワイトデーから少し経った週末。
line = "ホワイトデーから少し経った週末。"

[[dialogue]]
speaker = "unk"
# その日、久しぶりにイクシーが俺の家へ遊びに来ていた。
line = "その日、久しぶりにイクシーが俺の家へ遊びに来ていた。"

[[dialogue]]
speaker = "イクシリオン"
# 「会長、それでは……お口に失礼致しますね。あ、あ～ん<emoji=heart04>」
line = "「会長、それでは……お口に失礼致しますね。あ、あ～ん<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 照れながらも、イクシーは手作りしたチョコレートを指先で摘まみ、そっと俺の口元へ運んでくれる。
line = "照れながらも、イクシーは手作りしたチョコレートを指先で摘まみ、そっと俺の口元へ運んでくれる。"

[[dialogue]]
speaker = "unk"
# うまい！　甘いだけじゃなくて深みがあるな
line = "うまい！　甘いだけじゃなくて深みがあるな"

[[dialogue]]
speaker = "イクシリオン"
# 「ありがとうございます<emoji=heart04>　会長の好みに合うように考えながら作ったので、そう言ってもらえると嬉しいです……えへへ<emoji=heart04>」
line = "「ありがとうございます<emoji=heart04>　会長の好みに合うように考えながら作ったので、そう言ってもらえると嬉しいです……えへへ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# その笑顔や仕草があまりに可愛くて、俺は思わず彼女を抱き寄せてしまう。
line = "その笑顔や仕草があまりに可愛くて、俺は思わず彼女を抱き寄せてしまう。"

[[dialogue]]
speaker = "イクシリオン"
# 「あっ……か、会長……<emoji=heart04>　そんな急にされたら、ドキドキしてしまいます……<emoji=heart04>」
line = "「あっ……か、会長……<emoji=heart04>　そんな急にされたら、ドキドキしてしまいます……<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
# 「――バレンタインフォームが可愛い、ですか？　あ、ありがとうございます……<emoji=heart04>　戦闘で着るのは慣れてきましたが、改めて言われると、ちょっと照れてしまいますね……<emoji=heart04>」
line = "「――バレンタインフォームが可愛い、ですか？　あ、ありがとうございます……<emoji=heart04>　戦闘で着るのは慣れてきましたが、改めて言われると、ちょっと照れてしまいますね……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# その頬がほんのり桜色に染まるのを見て、俺は自然と手を伸ばし、彼女の頬にそっと触れた。
line = "その頬がほんのり桜色に染まるのを見て、俺は自然と手を伸ばし、彼女の頬にそっと触れた。"

[[dialogue]]
speaker = "イクシリオン"
# 「……っ、はぁ……<emoji=heart04>　会長の手、温かいです……<emoji=heart04>」
line = "「……っ、はぁ……<emoji=heart04>　会長の手、温かいです……<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
# （ああっ……会長の手が、私の頬にちょっと触れるだけで、体が敏感に感じて、悦んで震えてしまいます……<emoji=heart04>）
line = "（ああっ……会長の手が、私の頬にちょっと触れるだけで、体が敏感に感じて、悦んで震えてしまいます……<emoji=heart04>）"

[[dialogue]]
speaker = "イクシリオン"
# （はぅ……<emoji=heart04>　そんな正面から真っすぐに見つめちゃダメです<emoji=heart04>　会長の綺麗な瞳に吸い込まれてしまうようで……<emoji=heart04>）
line = "（はぅ……<emoji=heart04>　そんな正面から真っすぐに見つめちゃダメです<emoji=heart04>　会長の綺麗な瞳に吸い込まれてしまうようで……<emoji=heart04>）"

[[dialogue]]
speaker = "イクシリオン"
# （お、思わず私の方から、キスして欲しいって気持ちが溢れてきてしまいます……<emoji=heart04>）
line = "（お、思わず私の方から、キスして欲しいって気持ちが溢れてきてしまいます……<emoji=heart04>）"

[[dialogue]]
speaker = "unk"
# 言葉はいらない――これまでずっと見てきた好きな女の子の表情だ。互いの想いを確かめるように、俺はそっと唇を重ねた。
line = "言葉はいらない――これまでずっと見てきた好きな女の子の表情だ。互いの想いを確かめるように、俺はそっと唇を重ねた。"

[[dialogue]]
speaker = "イクシリオン"
# 「……んっ……<emoji=heart04>　ちゅっ……<emoji=heart04>」
line = "「……んっ……<emoji=heart04>　ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
# 「んむっ……<emoji=heart04>　ちゅっ……はあぁ……<emoji=heart04>」
line = "「んむっ……<emoji=heart04>　ちゅっ……はあぁ……<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
# 「キス……チョコの味がして……すごく甘いです……<emoji=heart04>」
line = "「キス……チョコの味がして……すごく甘いです……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 短くも優しいキスの後、イクシーは名残惜しそうに唇を離し、微笑む。その様子が可愛くて、俺はまた抱きしめたくなる。
line = "短くも優しいキスの後、イクシーは名残惜しそうに唇を離し、微笑む。その様子が可愛くて、俺はまた抱きしめたくなる。"

[[dialogue]]
speaker = "unk"
# そういえばイクシーは、チョコ好きだったよね
line = "そういえばイクシーは、チョコ好きだったよね"

[[dialogue]]
speaker = "イクシリオン"
# 「はい。以前、アルモタヘル様と出かけた時に食べたチョコバナナがとても美味しくて……それ以来、すっかりハマってしまって……<emoji=heart04>」
line = "「はい。以前、アルモタヘル様と出かけた時に食べたチョコバナナがとても美味しくて……それ以来、すっかりハマってしまって……<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
# 「人間界では昔、チョコは媚薬として扱われていたとも聞きますし……<emoji=heart04>　食べていると、少しだけ想像が膨らんでしまうといいますか……<emoji=heart04>」
line = "「人間界では昔、チョコは媚薬として扱われていたとも聞きますし……<emoji=heart04>　食べていると、少しだけ想像が膨らんでしまうといいますか……<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
# 「――ハッ！？　い、いえっ！　別にいやらしい妄想をしているわけではなくてですね……！」
line = "「――ハッ！？　い、いえっ！　別にいやらしい妄想をしているわけではなくてですね……！」"

[[dialogue]]
speaker = "unk"
# チョコが媚薬か……じゃあ、これは知ってる？
line = "チョコが媚薬か……じゃあ、これは知ってる？"

[[dialogue]]
speaker = "イクシリオン"
# 「え？　――チョコを恋人同士で食べさせ合うと、キスよりも興奮する……！？」
line = "「え？　――チョコを恋人同士で食べさせ合うと、キスよりも興奮する……！？」"

[[dialogue]]
speaker = "イクシリオン"
# 「しかも、舌の上で溶ける瞬間は……普通のキスの４倍も感じる、って……！？　そ、そんなことが本当に……？」
line = "「しかも、舌の上で溶ける瞬間は……普通のキスの４倍も感じる、って……！？　そ、そんなことが本当に……？」"

[[dialogue]]
speaker = "イクシリオン"
# （か、会長とキスするだけでもあんなに胸が高鳴ってしまうのに……！）
line = "（か、会長とキスするだけでもあんなに胸が高鳴ってしまうのに……！）"

[[dialogue]]
speaker = "イクシリオン"
# （もしそれにチョコを重ねたら、一体どれほどの……！？）
line = "（もしそれにチョコを重ねたら、一体どれほどの……！？）"

[[dialogue]]
speaker = "イクシリオン"
# （ああっ……だめです……！　そんな話を聞いたら、ドキドキして……<emoji=heart04>　はしたないと分かっているのに、試したくなってしまいます……！）
line = "（ああっ……だめです……！　そんな話を聞いたら、ドキドキして……<emoji=heart04>　はしたないと分かっているのに、試したくなってしまいます……！）"

[[dialogue]]
speaker = "イクシリオン"
# （で、でも……もし会長が望むのなら、私は……<emoji=heart04>）
line = "（で、でも……もし会長が望むのなら、私は……<emoji=heart04>）"

[[dialogue]]
speaker = "unk"
# 期待と戸惑いの混ざった瞳が、そっと俺を見上げてくる。
line = "期待と戸惑いの混ざった瞳が、そっと俺を見上げてくる。"

[[dialogue]]
speaker = "unk"
# チョコを食べながらのキス、試してみる？
line = "チョコを食べながらのキス、試してみる？"

[[dialogue]]
speaker = "イクシリオン"
# 「～～～っ……<emoji=heart04>　は、はい……<emoji=heart04>」
line = "「～～～っ……<emoji=heart04>　は、はい……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 頬を真っ赤に染め、小さく頷くイクシー。どうやら、彼女の想像は俺の思った通りだったようだ。
line = "頬を真っ赤に染め、小さく頷くイクシー。どうやら、彼女の想像は俺の思った通りだったようだ。"

[[dialogue]]
speaker = "unk"
# 俺は彼女の作ったチョコをひとつ取り、言う。
line = "俺は彼女の作ったチョコをひとつ取り、言う。"

[[dialogue]]
speaker = "unk"
# イクシー、口を開けて？
line = "イクシー、口を開けて？"

[[dialogue]]
speaker = "イクシリオン"
# 「ひゃ、ひゃい……<emoji=heart04>　あ、あ～ん……あむっ……<emoji=heart04>　もぐ……んっ……<emoji=heart04>」
line = "「ひゃ、ひゃい……<emoji=heart04>　あ、あ～ん……あむっ……<emoji=heart04>　もぐ……んっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺もチョコを口に含んで、舌の上でゆっくりと溶かしながら、そっと彼女に顔を近づけた。
line = "俺もチョコを口に含んで、舌の上でゆっくりと溶かしながら、そっと彼女に顔を近づけた。"

[[dialogue]]
speaker = "イクシリオン"
# （あっ……もう、胸が高鳴って……息が詰まりそう……<emoji=heart04>）
line = "（あっ……もう、胸が高鳴って……息が詰まりそう……<emoji=heart04>）"

[[dialogue]]
speaker = "イクシリオン"
# 「ふぁ……んっ……<emoji=heart04>　んむ……<emoji=heart04>　んんっ……<emoji=heart04>」
line = "「ふぁ……んっ……<emoji=heart04>　んむ……<emoji=heart04>　んんっ……<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
# 「んちゅ……っ……れろ……<emoji=heart04>　んむ……<emoji=heart04>　はぁ……っ……<emoji=heart04>」
line = "「んちゅ……っ……れろ……<emoji=heart04>　んむ……<emoji=heart04>　はぁ……っ……<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
# 「ぷは……っ……<emoji=heart04>　はぁ……っ……これ……だめです……<emoji=heart04>　キス……甘すぎて……頭の中、とろけちゃいそうで……<emoji=heart04>」
line = "「ぷは……っ……<emoji=heart04>　はぁ……っ……これ……だめです……<emoji=heart04>　キス……甘すぎて……頭の中、とろけちゃいそうで……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# イクシー、好きだ
line = "イクシー、好きだ"

[[dialogue]]
speaker = "イクシリオン"
# 「あっ……会長……<emoji=heart04>　私も……好きです……<emoji=heart04>　ん……ちゅっ……<emoji=heart04>」
line = "「あっ……会長……<emoji=heart04>　私も……好きです……<emoji=heart04>　ん……ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 互いの想いを唇で確かめ合うように――俺たちは何度も、何度も、甘いキスを重ねていった。
line = "互いの想いを唇で確かめ合うように――俺たちは何度も、何度も、甘いキスを重ねていった。"

[[dialogue]]
speaker = "イクシリオン"
# 「す、すみません……部屋を散らかしたままにしてきてしまって……<emoji=heart04>」
line = "「す、すみません……部屋を散らかしたままにしてきてしまって……<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
# 「それに、わざわざ送ってくださって……ありがとうございます……<emoji=heart04>」
line = "「それに、わざわざ送ってくださって……ありがとうございます……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ２人で過ごした甘い時間に夢中になっていたせいで、気づけば夜になってしまっていた。
line = "２人で過ごした甘い時間に夢中になっていたせいで、気づけば夜になってしまっていた。"

[[dialogue]]
speaker = "unk"
# 俺はイクシーの手を握りながら、新星寮への道を歩く。
line = "俺はイクシーの手を握りながら、新星寮への道を歩く。"

[[dialogue]]
speaker = "unk"
# 気にしなくていいよ。俺が送りたいだけだから
line = "気にしなくていいよ。俺が送りたいだけだから"

[[dialogue]]
speaker = "イクシリオン"
# 「……私が帰り道で、変な人に声をかけられないように、ですか？」
line = "「……私が帰り道で、変な人に声をかけられないように、ですか？」"

[[dialogue]]
speaker = "unk"
# 俺は頷く。触れ合っていた余韻がまだ残っていて、頬を火照らせたままの彼女を、１人で帰らせるわけにはいかなかった。
line = "俺は頷く。触れ合っていた余韻がまだ残っていて、頬を火照らせたままの彼女を、１人で帰らせるわけにはいかなかった。"

[[dialogue]]
speaker = "unk"
# そんなのは嫌だから、俺が守る
line = "そんなのは嫌だから、俺が守る"

[[dialogue]]
speaker = "イクシリオン"
# 「……会長……<emoji=heart04>　えへへ……<emoji=heart04>」
line = "「……会長……<emoji=heart04>　えへへ……<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
# 「あの……今度遊びに来る時は、もっとたくさんチョコを作ってきますね……<emoji=heart04>」
line = "「あの……今度遊びに来る時は、もっとたくさんチョコを作ってきますね……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 繋いでいない方の手でそっと唇をなぞりながら、柔らかく微笑むイクシー。
line = "繋いでいない方の手でそっと唇をなぞりながら、柔らかく微笑むイクシー。"

[[dialogue]]
speaker = "unk"
# 俺たちは今日の余韻を噛みしめるように、恋人繋ぎの手をゆっくり擦り合わせて歩いていくのだった。
line = "俺たちは今日の余韻を噛みしめるように、恋人繋ぎの手をゆっくり擦り合わせて歩いていくのだった。"
