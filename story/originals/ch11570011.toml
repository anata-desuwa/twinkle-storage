[[dialogue]]
speaker = "unk"
# 第１話,プリムラの眷属,P
line = "第１話,プリムラの眷属,P"

[[dialogue]]
speaker = "unk"
# 『悪魔のロストアイテム』を寄生型悪魔から引きはがすため、オムニスと陽彩は元の世界へ転移した。
line = "『悪魔のロストアイテム』を寄生型悪魔から引きはがすため、オムニスと陽彩は元の世界へ転移した。"

[[dialogue]]
speaker = "unk"
# その２人の帰りを待つまでの間、異世界からやってきた魔法少女たちは、こちらの世界で数日を過ごすことになった。
line = "その２人の帰りを待つまでの間、異世界からやってきた魔法少女たちは、こちらの世界で数日を過ごすことになった。"

[[dialogue]]
speaker = "unk"
# そして──
line = "そして──"

[[dialogue]]
speaker = "プリムラ"
# 「ここあ。貴様は我の眷属となるのじゃ！」
line = "「ここあ。貴様は我の眷属となるのじゃ！」"

[[dialogue]]
speaker = "ここあ"
# 「おけまる～♪　今日からプリちんはここあのご主人様ね～♪」
line = "「おけまる～♪　今日からプリちんはここあのご主人様ね～♪」"

[[dialogue]]
speaker = "unk"
# ──ここあはプリムラの眷属となった。
line = "──ここあはプリムラの眷属となった。"

[[dialogue]]
speaker = "プリムラ"
# 「では学園に向かうとするかの。ついてくるのじゃ、眷属４号」
line = "「では学園に向かうとするかの。ついてくるのじゃ、眷属４号」"

[[dialogue]]
speaker = "ここあ"
# 「あいあいさー！」
line = "「あいあいさー！」"

[[dialogue]]
speaker = "いろは"
# 「ここにゃん、本当にプリちゃんの眷属になっちゃったんだ？」
line = "「ここにゃん、本当にプリちゃんの眷属になっちゃったんだ？」"

[[dialogue]]
speaker = "ここあ"
# 「そだよ～。オモシロそーだし、こっちの世界にいる間はプリちんの眷属でいいかなーって♪」
line = "「そだよ～。オモシロそーだし、こっちの世界にいる間はプリちんの眷属でいいかなーって♪」"

[[dialogue]]
speaker = "花織"
# 「軽すぎですって！　第一、そういう契約って簡単に解除できたりするんですか？　元の世界に戻る時どうするんです？」
line = "「軽すぎですって！　第一、そういう契約って簡単に解除できたりするんですか？　元の世界に戻る時どうするんです？」"

[[dialogue]]
speaker = "ここあ"
# 「あ～、その辺は大丈夫なんだって。そんなちゃんとした契約じゃないし、こっちにいる間だけでいいってプリちんもいってくれたから」
line = "「あ～、その辺は大丈夫なんだって。そんなちゃんとした契約じゃないし、こっちにいる間だけでいいってプリちんもいってくれたから」"

[[dialogue]]
speaker = "プリムラ"
# 「そういうことじゃ。ちょうど我の第一の眷属が遠くに出かけておってな、代わりとなる眷属が欲しいと思っておったところなのじゃ♪」
line = "「そういうことじゃ。ちょうど我の第一の眷属が遠くに出かけておってな、代わりとなる眷属が欲しいと思っておったところなのじゃ♪」"

[[dialogue]]
speaker = "プリムラ"
# 「ここあは優秀じゃぞ～。夜は我が眠くなるまで退屈せぬよう話し相手になってくれるし、朝は着替えや歯磨きを手伝ってくれてラクチンなのじゃ♪」
line = "「ここあは優秀じゃぞ～。夜は我が眠くなるまで退屈せぬよう話し相手になってくれるし、朝は着替えや歯磨きを手伝ってくれてラクチンなのじゃ♪」"

[[dialogue]]
speaker = "サチ"
# 「どこまで世話を焼かせてるのよ！　この人たちに迷惑かけちゃダメでしょ！」
line = "「どこまで世話を焼かせてるのよ！　この人たちに迷惑かけちゃダメでしょ！」"

[[dialogue]]
speaker = "ここあ"
# 「にゃはは、いーのいーの。プリちんカワイイし、ちっちゃいコの面倒見るの好きなんだ～」
line = "「にゃはは、いーのいーの。プリちんカワイイし、ちっちゃいコの面倒見るの好きなんだ～」"

[[dialogue]]
speaker = "プリムラ"
# 「うむ！　つまり主に仕える喜びを感じておるということじゃな！」
line = "「うむ！　つまり主に仕える喜びを感じておるということじゃな！」"

[[dialogue]]
speaker = "サチ"
# 「ぜんぜん違うと思うんですけどっ！」
line = "「ぜんぜん違うと思うんですけどっ！」"

[[dialogue]]
speaker = "プリムラ"
# 「なんじゃサチ、さっきからプリプリしおって。さては我が優秀な眷属を手に入れたことが、羨ましくて仕方ないのじゃな？」
line = "「なんじゃサチ、さっきからプリプリしおって。さては我が優秀な眷属を手に入れたことが、羨ましくて仕方ないのじゃな？」"

[[dialogue]]
speaker = "プリムラ"
# 「ふふ～ん♪　ならばサチも頑張って眷属を探せばよいのじゃ。もっとも、我ほど優秀な眷属を見つけられるとは思わぬが……じゃあの♪」
line = "「ふふ～ん♪　ならばサチも頑張って眷属を探せばよいのじゃ。もっとも、我ほど優秀な眷属を見つけられるとは思わぬが……じゃあの♪」"

[[dialogue]]
speaker = "ここあ"
# 「は～い、ご主人さま～♪」
line = "「は～い、ご主人さま～♪」"

[[dialogue]]
speaker = "サチ"
# 「……はぁ。ごめんなさい、ご迷惑をおかけしてしまって」
line = "「……はぁ。ごめんなさい、ご迷惑をおかけしてしまって」"

[[dialogue]]
speaker = "いろは"
# 「本人楽しんでるみたいだから、いーと思うよ？」
line = "「本人楽しんでるみたいだから、いーと思うよ？」"

[[dialogue]]
speaker = "花織"
# 「実際、ここあさんは小さい子の相手をするのは慣れてるし、好きだからね……」
line = "「実際、ここあさんは小さい子の相手をするのは慣れてるし、好きだからね……」"

[[dialogue]]
speaker = "サチ"
# 「そんなに慣れてるんですか？」
line = "「そんなに慣れてるんですか？」"

[[dialogue]]
speaker = "花織"
# 「うん。双子の弟さんがいて、ずーっと面倒を見てるみたい」
line = "「うん。双子の弟さんがいて、ずーっと面倒を見てるみたい」"

[[dialogue]]
speaker = "いろは"
# 「めっちゃ可愛がってるし、大事にしてる感じだよね～」
line = "「めっちゃ可愛がってるし、大事にしてる感じだよね～」"

[[dialogue]]
speaker = "サチ"
# 「なるほど、そうでしたか……」
line = "「なるほど、そうでしたか……」"

[[dialogue]]
speaker = "プリムラ"
# 「ここまででよい、見送りご苦労なのじゃ！」
line = "「ここまででよい、見送りご苦労なのじゃ！」"

[[dialogue]]
speaker = "ここあ"
# 「おっけ～。んじゃお勉強、頑張ってきてね～」
line = "「おっけ～。んじゃお勉強、頑張ってきてね～」"

[[dialogue]]
speaker = "プリムラ"
# 「うーむ、勉強か……どうにも気が乗らんのじゃ……」
line = "「うーむ、勉強か……どうにも気が乗らんのじゃ……」"

[[dialogue]]
speaker = "プリムラ"
# 「せっかくここあという眷属がいるのじゃから、この際、授業をサボって遊びに出かけるのはどうじゃ？」
line = "「せっかくここあという眷属がいるのじゃから、この際、授業をサボって遊びに出かけるのはどうじゃ？」"

[[dialogue]]
speaker = "プリムラ"
# 「よし、決めたのじゃ！　これから街に繰り出すぞ、付き合うのじゃ、ここあ！」
line = "「よし、決めたのじゃ！　これから街に繰り出すぞ、付き合うのじゃ、ここあ！」"

[[dialogue]]
speaker = "ここあ"
# 「え～、それはダメ」
line = "「え～、それはダメ」"

[[dialogue]]
speaker = "プリムラ"
# 「なんじゃと！？　眷属なのに我に意見するのじゃ！？」
line = "「なんじゃと！？　眷属なのに我に意見するのじゃ！？」"

[[dialogue]]
speaker = "プリムラ"
# 「もう一度命ずる、ここあよ、我に付き合うのじゃ」
line = "「もう一度命ずる、ここあよ、我に付き合うのじゃ」"

[[dialogue]]
speaker = "ここあ"
# 「ざんね～ん、その命令には従えません♪」
line = "「ざんね～ん、その命令には従えません♪」"

[[dialogue]]
speaker = "プリムラ"
# 「なんでなのじゃ……眷属なのに……。黙って言うことを聞くのじゃ……」
line = "「なんでなのじゃ……眷属なのに……。黙って言うことを聞くのじゃ……」"

[[dialogue]]
speaker = "ここあ"
# 「眷属になるって約束はしたけど、言うこと全部に従うって約束はしてないでしょ？」
line = "「眷属になるって約束はしたけど、言うこと全部に従うって約束はしてないでしょ？」"

[[dialogue]]
speaker = "ここあ"
# 「ここあはプリちんのお願いなら出来るだけ聞いてあげたいけど、プリちんのためにならないようなお願いは聞けないな～」
line = "「ここあはプリちんのお願いなら出来るだけ聞いてあげたいけど、プリちんのためにならないようなお願いは聞けないな～」"

[[dialogue]]
speaker = "プリムラ"
# 「むぅぅ……従順な眷属じゃと思ったのに……」
line = "「むぅぅ……従順な眷属じゃと思ったのに……」"

[[dialogue]]
speaker = "ここあ"
# 「ごめんね、プリちん。その代わりに学園が終わったら思いっきり遊ぼーよ。それならいくらでも付き合ってあげる♪」
line = "「ごめんね、プリちん。その代わりに学園が終わったら思いっきり遊ぼーよ。それならいくらでも付き合ってあげる♪」"

[[dialogue]]
speaker = "ここあ"
# 「美味しいチョコパフェのお店があるって情報をキャッチしたから、一緒に食べにいこーよ♪」
line = "「美味しいチョコパフェのお店があるって情報をキャッチしたから、一緒に食べにいこーよ♪」"

[[dialogue]]
speaker = "プリムラ"
# 「チョコパフェ、じゃと！？　し、仕方あるまい……それで手を打つのじゃ……」
line = "「チョコパフェ、じゃと！？　し、仕方あるまい……それで手を打つのじゃ……」"

[[dialogue]]
speaker = "ここあ"
# 「にゃはは♪　そんじゃ放課後、ここに迎えに来るからね～♪」
line = "「にゃはは♪　そんじゃ放課後、ここに迎えに来るからね～♪」"

[[dialogue]]
speaker = "プリムラ"
# 「うむ！　行ってきますなのじゃ♪」
line = "「うむ！　行ってきますなのじゃ♪」"

[[dialogue]]
speaker = "サチ"
# 「う……上手い……」
line = "「う……上手い……」"

[[dialogue]]
speaker = "いろは"
# 「プリちゃん、ここにゃんの手の上でころっころだ～」
line = "「プリちゃん、ここにゃんの手の上でころっころだ～」"

[[dialogue]]
speaker = "花織"
# 「流石というか何というか……。とりあえずここあさんの事は心配なさそうだね」
line = "「流石というか何というか……。とりあえずここあさんの事は心配なさそうだね」"

[[dialogue]]
speaker = "unk"
# 甘やかしつつも、締めるべきところではきちんと締めている。
line = "甘やかしつつも、締めるべきところではきちんと締めている。"

[[dialogue]]
speaker = "unk"
# そんなここあのテクニックに、３人はただただ感嘆の声を漏らすばかりだった。
line = "そんなここあのテクニックに、３人はただただ感嘆の声を漏らすばかりだった。"
