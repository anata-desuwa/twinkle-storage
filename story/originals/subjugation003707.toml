[[dialogue]]
speaker = "unk"
# 第７話,ＶＳ星喰らいシャドウ・アポロ戦闘前,B
line = "第７話,ＶＳ星喰らいシャドウ・アポロ戦闘前,B"

[[dialogue]]
speaker = "unk"
# 星喰らいの拠点、その３つ目は聖庭園。
line = "星喰らいの拠点、その３つ目は聖庭園。"

[[dialogue]]
speaker = "アポロ"
# 「世界は間違っている……全部、やり直さなくちゃいけないんだ……」
line = "「世界は間違っている……全部、やり直さなくちゃいけないんだ……」"

[[dialogue]]
speaker = "unk"
# 全て壊れてしまえばいい。こんな歪な世界はやり直すしかない。
line = "全て壊れてしまえばいい。こんな歪な世界はやり直すしかない。"

[[dialogue]]
speaker = "unk"
# だから、この世界を存続させようとする輩は皆、敵だ──
line = "だから、この世界を存続させようとする輩は皆、敵だ──"

[[dialogue]]
speaker = "ＸＥＬＯＳ"
# 「──────ッ！？！？」
line = "「──────ッ！？！？」"

[[dialogue]]
speaker = "アポロ"
# 「どうしたんだ、真なる神……アルタイルの奴らが来たのか？」
line = "「どうしたんだ、真なる神……アルタイルの奴らが来たのか？」"

[[dialogue]]
speaker = "ＸＥＬＯＳ"
# 「ギ──ィ────ィィィ！！！」
line = "「ギ──ィ────ィィィ！！！」"

[[dialogue]]
speaker = "アポロ"
# 「…………？」
line = "「…………？」"

[[dialogue]]
speaker = "unk"
# 自らを創造した主の、尋常ではない怯えぶりに眉をしかめるアポロの影。意識を集中して、神の声を言語化すると──
line = "自らを創造した主の、尋常ではない怯えぶりに眉をしかめるアポロの影。意識を集中して、神の声を言語化すると──"

[[dialogue]]
speaker = "unk"
# ──奴ラガ来ル。ココニ向カッテイル！！
line = "──奴ラガ来ル。ココニ向カッテイル！！"

[[dialogue]]
speaker = "アポロ"
# 「問題ない。あたしが全員、消せばいいだけだろ……敵は誰だ？」
line = "「問題ない。あたしが全員、消せばいいだけだろ……敵は誰だ？」"

[[dialogue]]
speaker = "unk"
# ──ウサギ。
line = "──ウサギ。"

[[dialogue]]
speaker = "アポロ"
# 「…………は？」
line = "「…………は？」"

[[dialogue]]
speaker = "unk"
# ──ミコ。
line = "──ミコ。"

[[dialogue]]
speaker = "アポロ"
# 「……おい？」
line = "「……おい？」"

[[dialogue]]
speaker = "unk"
# ──ミズギ。チャイナ。
line = "──ミズギ。チャイナ。"

[[dialogue]]
speaker = "アポロ"
# 「…………何を言ってるんだ？」
line = "「…………何を言ってるんだ？」"

[[dialogue]]
speaker = "unk"
# アルタイルから逐次投入されている戦力に手を焼いているのか。各地で混戦していて、だからおかしな情報が届いているのか？
line = "アルタイルから逐次投入されている戦力に手を焼いているのか。各地で混戦していて、だからおかしな情報が届いているのか？"

[[dialogue]]
speaker = "unk"
# ──ソシテ、オ前！！！
line = "──ソシテ、オ前！！！"

[[dialogue]]
speaker = "アポロ（大人）"
# 「うぉぉおぉぉぉおおっ──！！！」
line = "「うぉぉおぉぉぉおおっ──！！！」"

[[dialogue]]
speaker = "アポロ"
# 「────ッ！？」
line = "「────ッ！？」"

[[dialogue]]
speaker = "アポロ"
# 「ちぃっ……お前は！　わざわざデネブから呼んできたのか……！」
line = "「ちぃっ……お前は！　わざわざデネブから呼んできたのか……！」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「全力で斬りかかったんだがな……なかなか反応がいいじゃないか！」
line = "「全力で斬りかかったんだがな……なかなか反応がいいじゃないか！」"

[[dialogue]]
speaker = "アポロ"
# 「同一存在は、同じ世界で意識を保てないはず……」
line = "「同一存在は、同じ世界で意識を保てないはず……」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「アルタイルのあたしは持久戦が苦手だからな。交代でベガに入れば何も問題ないってことだ！」
line = "「アルタイルのあたしは持久戦が苦手だからな。交代でベガに入れば何も問題ないってことだ！」"

[[dialogue]]
speaker = "アポロ"
# 「はっ……だからって、もうあがりも近い方のあたしが来るだなんてな……随分と舐められたもんだ」
line = "「はっ……だからって、もうあがりも近い方のあたしが来るだなんてな……随分と舐められたもんだ」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「それはどうかな？　あたしは１人じゃない……頼りになる仲間がいる！！」
line = "「それはどうかな？　あたしは１人じゃない……頼りになる仲間がいる！！」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「──流星星徒会、出番だッ！！！」
line = "「──流星星徒会、出番だッ！！！」"

[[dialogue]]
speaker = "セーラ"
# 「おっまかせー！　アポロちゃんの背中は、ウチが守るよん♪」
line = "「おっまかせー！　アポロちゃんの背中は、ウチが守るよん♪」"

[[dialogue]]
speaker = "ソフィア"
# 「はい！　行きましょう、アポロさん！！」
line = "「はい！　行きましょう、アポロさん！！」"

[[dialogue]]
speaker = "ルリエル"
# 「早速手に入れた戦闘服！　ルリエルも思いっきりいっちゃうのです！　でんでん♪」
line = "「早速手に入れた戦闘服！　ルリエルも思いっきりいっちゃうのです！　でんでん♪」"

[[dialogue]]
speaker = "ユウリ"
# 「…………いっそ殺してくれ」
line = "「…………いっそ殺してくれ」"

[[dialogue]]
speaker = "アポロ"
# 「………………は？」
line = "「………………は？」"

[[dialogue]]
speaker = "アポロ"
# 「な、何なんだオマエたち……頭が沸いてるのか！？」
line = "「な、何なんだオマエたち……頭が沸いてるのか！？」"

[[dialogue]]
speaker = "セーラ"
# 「おっ。奇襲の効果アリかな？　敵さん、混乱してるみたいだね～♪」
line = "「おっ。奇襲の効果アリかな？　敵さん、混乱してるみたいだね～♪」"

[[dialogue]]
speaker = "ソフィア"
# 「見た目こそ統一感はありませんが、今はこれが一番強いので仕方がありません」
line = "「見た目こそ統一感はありませんが、今はこれが一番強いので仕方がありません」"

[[dialogue]]
speaker = "ユウリ"
# 「ちくしょうっ……何が幹内世界だ！！　向こうのあたしは何でこんな衣装を──イカれてんのか！？！？」
line = "「ちくしょうっ……何が幹内世界だ！！　向こうのあたしは何でこんな衣装を──イカれてんのか！？！？」"

[[dialogue]]
speaker = "アポロ"
# 「……………………」
line = "「……………………」"

[[dialogue]]
speaker = "ユウリ"
# 「めちゃくちゃドン引きされてるじゃねえか！？　敵からこんな目で見られたの初めてだぞ！？」
line = "「めちゃくちゃドン引きされてるじゃねえか！？　敵からこんな目で見られたの初めてだぞ！？」"

[[dialogue]]
speaker = "セーラ"
# 「まぁまぁ。ウチも同じ格好じゃん♪　ユウリちゃんも腹くくっちゃいなよー♪」
line = "「まぁまぁ。ウチも同じ格好じゃん♪　ユウリちゃんも腹くくっちゃいなよー♪」"

[[dialogue]]
speaker = "ユウリ"
# 「できたら苦労しませんって！！　他の戦闘服に変更もできないし……最悪だ！！！」
line = "「できたら苦労しませんって！！　他の戦闘服に変更もできないし……最悪だ！！！」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「だけど普段の時よりずっと星力は高くなってるはずだ。魔王の力で今だけ使える戦闘服……期待してるぞ！　背中は任せた！！」
line = "「だけど普段の時よりずっと星力は高くなってるはずだ。魔王の力で今だけ使える戦闘服……期待してるぞ！　背中は任せた！！」"

[[dialogue]]
speaker = "ユウリ"
# 「まともな格好の時に聞きたかった、その言葉……！！」
line = "「まともな格好の時に聞きたかった、その言葉……！！」"

[[dialogue]]
speaker = "ルリエル"
# 「大丈夫なのです、ユウリ先輩！　バニーのお仲間はまだまだたくさんいるのですっ！　ほら、あちらにも！」
line = "「大丈夫なのです、ユウリ先輩！　バニーのお仲間はまだまだたくさんいるのですっ！　ほら、あちらにも！」"

[[dialogue]]
speaker = "セナリィ"
# 「──ホワイ！？　どうして<ruby=エンプレス>女帝</ruby>フォームが起動しませんの！？　何度試しても、バニーガールになってしまいますわぁ！？」
line = "「──ホワイ！？　どうして<ruby>女帝<rt>エンプレス</rt></ruby>フォームが起動しませんの！？　何度試しても、バニーガールになってしまいますわぁ！？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「たゆまぬ努力で身に着けた覚醒衣装より……なぜかこちらの方が優先されて……発現できる星力も多くて──納得いきませんわ！！」
line = "「たゆまぬ努力で身に着けた覚醒衣装より……なぜかこちらの方が優先されて……発現できる星力も多くて──納得いきませんわ！！」"

[[dialogue]]
speaker = "アポロ"
# 「こっちにも！？　神が言ってた『ウサギ』って、このことなのか……！？　馬鹿にしやがって！！」
line = "「こっちにも！？　神が言ってた『ウサギ』って、このことなのか……！？　馬鹿にしやがって！！」"

[[dialogue]]
speaker = "アポロ"
# 「どんな経緯があったら、そんなもん着るハメになるんだ！！」
line = "「どんな経緯があったら、そんなもん着るハメになるんだ！！」"

[[dialogue]]
speaker = "セナリィ"
# 「どんな経緯と言われても──」
line = "「どんな経緯と言われても──」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「この衣装を手に入れたのは、幹内世界の私……実際にその場に居合わせたわけではないのに──」
line = "「この衣装を手に入れたのは、幹内世界の私……実際にその場に居合わせたわけではないのに──」"

[[dialogue]]
speaker = "unk"
# セナリィとヒルディオーネの記憶に鮮烈に噴き上がる、どこかの枝葉の世界の、流星市国のカジノ──
line = "セナリィとヒルディオーネの記憶に鮮烈に噴き上がる、どこかの枝葉の世界の、流星市国のカジノ──"

[[dialogue]]
speaker = "unk"
# そして────１人の怪人の姿。
line = "そして────１人の怪人の姿。"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「うぅっ！　頭がっ……！！」
line = "「うぅっ！　頭がっ……！！」"

[[dialogue]]
speaker = "セナリィ"
# 「存在しない記憶が確かに今、私の中にっ──おぇ！　すげぇ嫌な気分ですわ……！！」
line = "「存在しない記憶が確かに今、私の中にっ──おぇ！　すげぇ嫌な気分ですわ……！！」"

[[dialogue]]
speaker = "アポロ"
# 「勝手にダメージ受けてるし……何なんだオマエら……」
line = "「勝手にダメージ受けてるし……何なんだオマエら……」"

[[dialogue]]
speaker = "マハムート"
# 「背を曲げてだらしないわね、２人とも。もっと胸を張りなさい。これは世界を守る戦いなのよ！」
line = "「背を曲げてだらしないわね、２人とも。もっと胸を張りなさい。これは世界を守る戦いなのよ！」"

[[dialogue]]
speaker = "アポロ"
# 「いや、水着のオマエも大概だぞ！？」
line = "「いや、水着のオマエも大概だぞ！？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「マムはあのヘンタイをご存じないからそんな呑気なことが言えるんですわ！　大変だったんですのよ！？」
line = "「マムはあのヘンタイをご存じないからそんな呑気なことが言えるんですわ！　大変だったんですのよ！？」"

[[dialogue]]
speaker = "セナリィ"
# 「ぴょんぴょん言いながら給仕をさせられた記憶が止まりませんっ……最悪ですわ！！」
line = "「ぴょんぴょん言いながら給仕をさせられた記憶が止まりませんっ……最悪ですわ！！」"

[[dialogue]]
speaker = "マハムート"
# 「フロンティアドライブ・オーバーロード……場合によっては副作用もありそうね。主にメンタル面で」
line = "「フロンティアドライブ・オーバーロード……場合によっては副作用もありそうね。主にメンタル面で」"

[[dialogue]]
speaker = "マハムート"
# 「──じゃあどうするの、２人とも？　後ろに下がって見学でもしておく？」
line = "「──じゃあどうするの、２人とも？　後ろに下がって見学でもしておく？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「まさか！　敵を前に下がるだなんて、千園寺家の名折れ！　誰よりも果敢に前へ出て、あの使徒を粉砕いたしましてよ！？」
line = "「まさか！　敵を前に下がるだなんて、千園寺家の名折れ！　誰よりも果敢に前へ出て、あの使徒を粉砕いたしましてよ！？」"

[[dialogue]]
speaker = "セナリィ"
# 「会長様に報酬をたんまり貰う約束をしておりますっ……あのヘンタイへの恨み、気の毒ですが全て眼前の敵にぶつけてやりますわ！」
line = "「会長様に報酬をたんまり貰う約束をしておりますっ……あのヘンタイへの恨み、気の毒ですが全て眼前の敵にぶつけてやりますわ！」"

[[dialogue]]
speaker = "マハムート"
# 「その意気よ。私と肩を並べる以上、不甲斐ない戦いは許されないわ」
line = "「その意気よ。私と肩を並べる以上、不甲斐ない戦いは許されないわ」"

[[dialogue]]
speaker = "リーエン"
# 「……あたしは煌嶺陛下から２つの命を受けている」
line = "「……あたしは煌嶺陛下から２つの命を受けている」"

[[dialogue]]
speaker = "サーシャ"
# 「あら～、そうなの？」
line = "「あら～、そうなの？」"

[[dialogue]]
speaker = "リーエン"
# 「１つは、キュリオスの兵として誰よりも戦果をあげてくること」
line = "「１つは、キュリオスの兵として誰よりも戦果をあげてくること」"

[[dialogue]]
speaker = "サーシャ"
# 「うんうん♪」
line = "「うんうん♪」"

[[dialogue]]
speaker = "リーエン"
# 「そしてもう１つは……アルタイルの星騎士たちが、どのような可能性を掴んだのかを見極め、報告しろと」
line = "「そしてもう１つは……アルタイルの星騎士たちが、どのような可能性を掴んだのかを見極め、報告しろと」"

[[dialogue]]
speaker = "サーシャ"
# 「あらあら、うふふ～♪」
line = "「あらあら、うふふ～♪」"

[[dialogue]]
speaker = "リーエン"
# 「こんなの、どう伝えろというんだ！　バニーガールに水着にハロウィンに変身ヒーロー……魔界の原生生物だってもう少し秩序があるぞ！？」
line = "「こんなの、どう伝えろというんだ！　バニーガールに水着にハロウィンに変身ヒーロー……魔界の原生生物だってもう少し秩序があるぞ！？」"

[[dialogue]]
speaker = "サーシャ"
# 「私は晴れ着だから、それもちゃーんと伝えてあげてね～<emoji=heart04>」
line = "「私は晴れ着だから、それもちゃーんと伝えてあげてね～<emoji=heart04>」"

[[dialogue]]
speaker = "リーエン"
# 「──陛下。あたしは未熟者です……戦場とは常に予想の上を行くものとわかっていながら──今、非常に取り乱してしまっています！！」
line = "「──陛下。あたしは未熟者です……戦場とは常に予想の上を行くものとわかっていながら──今、非常に取り乱してしまっています！！」"

[[dialogue]]
speaker = "アポロ"
# 「こんな奴らに、すでに２拠点で敗北を喫している、だって……？」
line = "「こんな奴らに、すでに２拠点で敗北を喫している、だって……？」"

[[dialogue]]
speaker = "アポロ"
# 「……やっぱりだ。この世界は間違ってる──こんなめちゃくちゃな世界は、滅びなくちゃいけないんだ！」
line = "「……やっぱりだ。この世界は間違ってる──こんなめちゃくちゃな世界は、滅びなくちゃいけないんだ！」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「──ここに派遣されて、あたしは嬉しいぞ」
line = "「──ここに派遣されて、あたしは嬉しいぞ」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「使徒だった頃の自分に、直接引導を渡せるんだからな！！」
line = "「使徒だった頃の自分に、直接引導を渡せるんだからな！！」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「滅びていい世界なんて存在しない！　いつだってヒトは、成長と進化を続けていけるんだ！！」
line = "「滅びていい世界なんて存在しない！　いつだってヒトは、成長と進化を続けていけるんだ！！」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「そのことを──今からあたしたちが教えてやる！！」
line = "「そのことを──今からあたしたちが教えてやる！！」"

[[dialogue]]
speaker = "アポロ"
# 「かかって来い、アルタイルの星騎士たち……ベガの地球を喰い潰す前に、オマエたちから消してやる──！！」
line = "「かかって来い、アルタイルの星騎士たち……ベガの地球を喰い潰す前に、オマエたちから消してやる──！！」"
