[[dialogue]]
speaker = "カティア"
# 「みんなが繋いだバトン！　絶対っ、絶対っ、私が勝ってゴールに持ち帰るんだぁっ！」
line = "「みんなが繋いだバトン！　絶対っ、絶対っ、私が勝ってゴールに持ち帰るんだぁっ！」"

[[dialogue]]
speaker = "シノ"
# 『速い、速い、速いっ！　大玉転がしの雪辱を果たすため、そして、新星学園の勝利のため！　カティア選手、ミネコ選手を猛追っ！』
line = "『速い、速い、速いっ！　大玉転がしの雪辱を果たすため、そして、新星学園の勝利のため！　カティア選手、ミネコ選手を猛追っ！』"

[[dialogue]]
speaker = "ミネコ"
# 「後ろから凄い圧……！　確かに速いけど……だから楽しい！　アンカーになった甲斐があったよ！」
line = "「後ろから凄い圧……！　確かに速いけど……だから楽しい！　アンカーになった甲斐があったよ！」"

[[dialogue]]
speaker = "ミネコ"
# 「アンカーっていいよね……みんなの期待と信頼を背負って、みんなの頑張りを無にするかもしれないプレシャーがのしかかって……あぁ、ゾクゾク来るっ」
line = "「アンカーっていいよね……みんなの期待と信頼を背負って、みんなの頑張りを無にするかもしれないプレシャーがのしかかって……あぁ、ゾクゾク来るっ」"

[[dialogue]]
speaker = "ミネコ"
# 「でも私、追われるのは得意だから、逃げ足には自信があるんだよねー☆」
line = "「でも私、追われるのは得意だから、逃げ足には自信があるんだよねー☆」"

[[dialogue]]
speaker = "カティア"
# 「なっ……！」
line = "「なっ……！」"

[[dialogue]]
speaker = "シノ"
# 『なんということでしょうっ！　追いつくかと思ったカティア選手の加速よりも更に速く！　ミネコ選手、ドンドン突き放していきますっ！』
line = "『なんということでしょうっ！　追いつくかと思ったカティア選手の加速よりも更に速く！　ミネコ選手、ドンドン突き放していきますっ！』"

[[dialogue]]
speaker = "マグダレナ"
# 『残りはトラック半周ですね。これは勝負あったでしょうか……？』
line = "『残りはトラック半周ですね。これは勝負あったでしょうか……？』"

[[dialogue]]
speaker = "カティア"
# 「まだ、まだっ、まだまだーっ！」
line = "「まだ、まだっ、まだまだーっ！」"

[[dialogue]]
speaker = "カティア"
# （私は星騎士としてはヨワヨワで、大玉転がしじゃ恥ずかしいところを見せて……このままじゃ本当にダメダメなままだ！）
line = "（私は星騎士としてはヨワヨワで、大玉転がしじゃ恥ずかしいところを見せて……このままじゃ本当にダメダメなままだ！）"

[[dialogue]]
speaker = "カティア"
# （戦いで役に立てない私をリレーの選手に選んでくれて、アンカーまで任されたんだ……！）
line = "（戦いで役に立てない私をリレーの選手に選んでくれて、アンカーまで任されたんだ……！）"

[[dialogue]]
speaker = "カティア"
# 「応援してくれてるみんなのためにも！　絶対に、勝ぁつっ！」
line = "「応援してくれてるみんなのためにも！　絶対に、勝ぁつっ！」"

[[dialogue]]
speaker = "美鶴"
# 「別に競技に負けたからって死ぬわけでもないしさ、勝ったからって億万長者になれるわけでもないじゃん」
line = "「別に競技に負けたからって死ぬわけでもないしさ、勝ったからって億万長者になれるわけでもないじゃん」"

[[dialogue]]
speaker = "美鶴"
# 「それでもみんなはこの勝負に真剣になって、全力で挑んで、魂を燃やす……どうしてそこまですんだろ？」
line = "「それでもみんなはこの勝負に真剣になって、全力で挑んで、魂を燃やす……どうしてそこまですんだろ？」"

[[dialogue]]
speaker = "ミルフィー"
# 「そんなの決まってる──それが青春だからだよっ！」
line = "「そんなの決まってる──それが青春だからだよっ！」"

[[dialogue]]
speaker = "美鶴"
# 「青春……」
line = "「青春……」"

[[dialogue]]
speaker = "ミルフィー"
# 「なんでも真剣に挑む人は、とっても格好いいんだよ！　美鶴ちゃんもカティアちゃんが走る姿に、心を動かされてるんでしょ！？」
line = "「なんでも真剣に挑む人は、とっても格好いいんだよ！　美鶴ちゃんもカティアちゃんが走る姿に、心を動かされてるんでしょ！？」"

[[dialogue]]
speaker = "美鶴"
# 「ん、まあ……今のカティア、チョー格好いい」
line = "「ん、まあ……今のカティア、チョー格好いい」"

[[dialogue]]
speaker = "ミルフィー"
# 「だったら一緒に、その想いを声にしよ！　カティアちゃんに伝えてあげてっ！」
line = "「だったら一緒に、その想いを声にしよ！　カティアちゃんに伝えてあげてっ！」"

[[dialogue]]
speaker = "美鶴"
# 「がんばれ……がんばれ……カティアっ！」
line = "「がんばれ……がんばれ……カティアっ！」"

[[dialogue]]
speaker = "ミルフィー"
# 「がんばれ、がんばれ、カ・ティ・ア！」
line = "「がんばれ、がんばれ、カ・ティ・ア！」"

[[dialogue]]
speaker = "フラン"
# 「勝てるぞ、勝てるぞ、し・ん・せ・い！」
line = "「勝てるぞ、勝てるぞ、し・ん・せ・い！」"

[[dialogue]]
speaker = "美鶴"
# 「勝てるぞ、勝てるぞ、新星っ！　絶対っ、絶対に勝てるっ……もうちょっと……！」
line = "「勝てるぞ、勝てるぞ、新星っ！　絶対っ、絶対に勝てるっ……もうちょっと……！」"

[[dialogue]]
speaker = "ミルフィー"
# 「イケるよ、カティアちゃんっ！　あと、ほんのちょっとだよーっ！」
line = "「イケるよ、カティアちゃんっ！　あと、ほんのちょっとだよーっ！」"

[[dialogue]]
speaker = "カティア"
# 「はぁっ！　はぁっ、はぁっ、はぁっ、はぁっ！」
line = "「はぁっ！　はぁっ、はぁっ、はぁっ、はぁっ！」"

[[dialogue]]
speaker = "カティア"
# （苦しいっ！　疲れたっ！　もう限界！　ちゃんと走れてるのかもよくわかんないっ！）
line = "（苦しいっ！　疲れたっ！　もう限界！　ちゃんと走れてるのかもよくわかんないっ！）"

[[dialogue]]
speaker = "カティア"
# （でも、でもでも！　みんなに応援されると、まだまだ頑張れる！　胸の奥から力が湧いてくるっ！）
line = "（でも、でもでも！　みんなに応援されると、まだまだ頑張れる！　胸の奥から力が湧いてくるっ！）"

[[dialogue]]
speaker = "カティア"
# （みんなの期待は、苦しくて重いけど──）
line = "（みんなの期待は、苦しくて重いけど──）"

[[dialogue]]
speaker = "カティア"
# 「絶対、絶対っ！　絶対に負けないワーーーーーンっ！」
line = "「絶対、絶対っ！　絶対に負けないワーーーーーンっ！」"

[[dialogue]]
speaker = "カティア"
# 「あたしの星力、全部、全部くれてやるっ！　だから、だからっ！　この一瞬だけでいい、眩しく輝きたいっ！」
line = "「あたしの星力、全部、全部くれてやるっ！　だから、だからっ！　この一瞬だけでいい、眩しく輝きたいっ！」"

[[dialogue]]
speaker = "カティア"
# 「私がっ！　勝つんだぁあぁあぁぁぁぁぁっ！！」
line = "「私がっ！　勝つんだぁあぁあぁぁぁぁぁっ！！」"

[[dialogue]]
speaker = "ミネコ"
# 「え、なにっ！？」
line = "「え、なにっ！？」"

[[dialogue]]
speaker = "カティア"
# 「うぅうぅうぅぅぅぅぅぅっ！」
line = "「うぅうぅうぅぅぅぅぅぅっ！」"

[[dialogue]]
speaker = "マグダレナ"
# 『まあまあ、すごいです！　カティア選手、すごい追い上げです！　まだこれだけの力が残っていたんですね』
line = "『まあまあ、すごいです！　カティア選手、すごい追い上げです！　まだこれだけの力が残っていたんですね』"

[[dialogue]]
speaker = "ミネコ"
# 「ウソでしょーっ！？　私の逃げ足より速いなんてっ！？」
line = "「ウソでしょーっ！？　私の逃げ足より速いなんてっ！？」"

[[dialogue]]
speaker = "unk"
# カティアの絞り出したスピードとパワーは、流れ星をも上回る──！
line = "カティアの絞り出したスピードとパワーは、流れ星をも上回る──！"

[[dialogue]]
speaker = "フェニエル"
# 「ミネコさん、ふんばってくださーい！」
line = "「ミネコさん、ふんばってくださーい！」"

[[dialogue]]
speaker = "ミネコ"
# 「くぅうううううぅぅぅぅぅぅぅっ！」
line = "「くぅうううううぅぅぅぅぅぅぅっ！」"

[[dialogue]]
speaker = "カティア"
# 「うぅわぁあぁああぁぁぁぁぁっ！」
line = "「うぅわぁあぁああぁぁぁぁぁっ！」"

[[dialogue]]
speaker = "unk"
# ゴールテープまで、あと１ｍ。
