line = "「血のにじむような努力、決して無駄にはしないわ。決勝戦で流星学園を完膚なきまでに叩きのめしてあげる！」"

[[dialogue]]
speaker = "カティア"
# 「イ、イエス・マム！　よろしくお願いします！」
line = "「イ、イエス・マム！　よろしくお願いします！」"

[[dialogue]]
speaker = "unk"
# 流星への対抗心を燃やすマムへと、最後のバトンは託されたのだった。
line = "流星への対抗心を燃やすマムへと、最後のバトンは託されたのだった。"
