line = "「へへ……あたしもつい見入っちまったぜ。よくやった、ワン公！」"

[[dialogue]]
speaker = "美鶴"
# 「めっちゃカッコよかったよ」
line = "「めっちゃカッコよかったよ」"

[[dialogue]]
speaker = "美鶴"
# 「うん。うちのチア服に何が足りてなかったのか。カティアのおかげでわかった気がする」
line = "「うん。うちのチア服に何が足りてなかったのか。カティアのおかげでわかった気がする」"

[[dialogue]]
speaker = "ミルフィー"
# 「ずびっ……何が、足りてなかったの～……？」
line = "「ずびっ……何が、足りてなかったの～……？」"

[[dialogue]]
speaker = "美鶴"
# 「チアガールの服ってさ、頑張る人を本気で応援してる時に花開いて、眩しいくらいに輝くんだよね」
line = "「チアガールの服ってさ、頑張る人を本気で応援してる時に花開いて、眩しいくらいに輝くんだよね」"

[[dialogue]]
speaker = "美鶴"
# 「だから、練習じゃしっくり来なかったってわけ。こんなの本番じゃなきゃ気づけないよ」
line = "「だから、練習じゃしっくり来なかったってわけ。こんなの本番じゃなきゃ気づけないよ」"

[[dialogue]]
speaker = "美鶴"
# 「それがうちの感じてた物足りなさの正体かな。同じ服なのに、今じゃ最高に輝いて見える」
line = "「それがうちの感じてた物足りなさの正体かな。同じ服なのに、今じゃ最高に輝いて見える」"

[[dialogue]]
speaker = "フラン"
# 「ああ、最高のチア衣装だぜ！」
line = "「ああ、最高のチア衣装だぜ！」"

[[dialogue]]
speaker = "ミルフィー"
# 「アオハルの輝き、だねっ！」
line = "「アオハルの輝き、だねっ！」"

[[dialogue]]
speaker = "美鶴"
# 「悪くないね、アオハル」
line = "「悪くないね、アオハル」"

[[dialogue]]
speaker = "ミネコ"
# 「あー、くやしーっ！」
line = "「あー、くやしーっ！」"

[[dialogue]]
speaker = "ミネコ"
# 「でも追いつかれそうな時は最高にゾクゾクしたなぁ……いやぁ、たまらないね」
line = "「でも追いつかれそうな時は最高にゾクゾクしたなぁ……いやぁ、たまらないね」"

[[dialogue]]
speaker = "マグダレナ"
# 『学園対抗リレーは見事、新星学園の勝利です。全競技を終え、新星学園が大きくリードとなりました』
line = "『学園対抗リレーは見事、新星学園の勝利です。全競技を終え、新星学園が大きくリードとなりました』"

[[dialogue]]
speaker = "シノ"
# 『しかし、全ては明日の舞闘会決勝戦で決まります』
line = "『しかし、全ては明日の舞闘会決勝戦で決まります』"

[[dialogue]]
speaker = "美鶴"
# 「えーと、決勝戦で戦うのは──」
line = "「えーと、決勝戦で戦うのは──」"

[[dialogue]]
speaker = "？？？"
# 「カティア、最高の走りだったわよ」
line = "「カティア、最高の走りだったわよ」"

[[dialogue]]
speaker = "カティア"
# 「マム……！」
line = "「マム……！」"

[[dialogue]]
speaker = "マハムート"
# 「新星有利の状況、よく作り出してくれたわ。ここまでお膳立てされたら、無様を晒すわけにはいかないわね」
line = "「新星有利の状況、よく作り出してくれたわ。ここまでお膳立てされたら、無様を晒すわけにはいかないわね」"

[[dialogue]]
speaker = "マハムート"
# 「アナタたちからのバトンは確かに受け取ったわ。あとは私に任せておきなさい」
line = "「アナタたちからのバトンは確かに受け取ったわ。あとは私に任せておきなさい」"

[[dialogue]]
speaker = "マハムート"
