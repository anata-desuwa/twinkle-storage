line = "「～～～～～ッッッッッ！！！」"

[[dialogue]]
speaker = "ヒヨ"
# 「やりやがった！　やりやがったなぁ、ワン公！」
line = "「やりやがった！　やりやがったなぁ、ワン公！」"

[[dialogue]]
speaker = "カティア"
# 「はぁっ！　はぁっ！　はぁっ！　はぁっ！　あ、あれ……私っ、か、勝った……ワン？」
line = "「はぁっ！　はぁっ！　はぁっ！　はぁっ！　あ、あれ……私っ、か、勝った……ワン？」"

[[dialogue]]
speaker = "ミネコ"
# 「あれれぇ……負けちゃったかぁ……」
line = "「あれれぇ……負けちゃったかぁ……」"

[[dialogue]]
speaker = "カティア"
# 「はぁっ……や、やったぁ……はぁ、はぁっ、はぁっ！　もう、一歩も、動け、ないっ……！」
line = "「はぁっ……や、やったぁ……はぁ、はぁっ、はぁっ！　もう、一歩も、動け、ないっ……！」"

[[dialogue]]
speaker = "カティア"
# 「トラック１周だけなのに、フルマラソンでも走り切ったみたいですぅ……」
line = "「トラック１周だけなのに、フルマラソンでも走り切ったみたいですぅ……」"

[[dialogue]]
speaker = "ミネコ"
# 「追いつかれちゃうとは思わなかったなぁ……凄かったよ、キミの走り」
line = "「追いつかれちゃうとは思わなかったなぁ……凄かったよ、キミの走り」"

[[dialogue]]
speaker = "カティア"
# 「へへ……私もやればできる子だったワン……」
line = "「へへ……私もやればできる子だったワン……」"

[[dialogue]]
speaker = "unk"
# 最高の走りだったよ
line = "最高の走りだったよ"

[[dialogue]]
speaker = "unk"
# よくやったな、カティア
line = "よくやったな、カティア"

[[dialogue]]
speaker = "カティア"
# 「あ……ありがとうございます。魔王様にカッコいいとこ見せられて、良かったですガオ……♪」
line = "「あ……ありがとうございます。魔王様にカッコいいとこ見せられて、良かったですガオ……♪」"

[[dialogue]]
speaker = "ミルフィー"
# 「カティアちゃんの追い上げ、ずごがっだよぉ～！　私、感動しぢゃっだぁ～～！」
line = "「カティアちゃんの追い上げ、ずごがっだよぉ～！　私、感動しぢゃっだぁ～～！」"

[[dialogue]]
speaker = "ヒヨ"
