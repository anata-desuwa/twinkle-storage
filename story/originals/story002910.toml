[[dialogue]]
speaker = "unk"
# そこでミネコとカティアの体は交差し──
line = "そこでミネコとカティアの体は交差し──"

[[dialogue]]
speaker = "シノ"
# 『ゴーール、インッッッ！！！　勝者は──』
line = "『ゴーール、インッッッ！！！　勝者は──』"

[[dialogue]]
speaker = "unk"
# カティアだ！！！
line = "カティアだ！！！"

[[dialogue]]
speaker = "ミルフィー"
