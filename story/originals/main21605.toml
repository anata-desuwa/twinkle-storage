[[dialogue]]
speaker = "unk"
# 第５話,ブレイク・ボーダー,B
line = "第５話,ブレイク・ボーダー,B"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
# 「本当に、忌々しいっ……！」
line = "「本当に、忌々しいっ……！」"

[[dialogue]]
speaker = "unk"
# セイファート学園長が『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』に楔を打ち込むたびに、ホロウの複製体たちはその数を増やしていく。
line = "セイファート学園長が『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』に楔を打ち込むたびに、ホロウの複製体たちはその数を増やしていく。"

[[dialogue]]
speaker = "unk"
# 無限に湧き出るホロウたちを薙ぎ払うのが、俺たちの役目！
line = "無限に湧き出るホロウたちを薙ぎ払うのが、俺たちの役目！"

[[dialogue]]
speaker = "梨緒"
# 「ベアト──！！」
line = "「ベアト──！！」"

[[dialogue]]
speaker = "ベアトリス"
# 「うん、梨緒ちゃん！！」
line = "「うん、梨緒ちゃん！！」"

[[dialogue]]
speaker = "ラクシャ"
# 「やっぱり親子だから似てるね、戦い方も！」
line = "「やっぱり親子だから似てるね、戦い方も！」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「ふっふーん！　当然でしょ！！」
line = "「ふっふーん！　当然でしょ！！」"

[[dialogue]]
speaker = "煌嶺"
# 「ほう。<b>あがり</b>の近い星騎士にしては良い動きだ！　クク、後で貴様も味見してやろう──アポロとやら！」
line = "「ほう。<b>あがり</b>の近い星騎士にしては良い動きだ！　クク、後で貴様も味見してやろう──アポロとやら！」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「そういう話は、戦いが終わった後でしろ！！　行くぞ！」
line = "「そういう話は、戦いが終わった後でしろ！！　行くぞ！」"

[[dialogue]]
speaker = "unk"
# 数多のコンビネーションにより、遂に『ＸＥＬＯＳ』への道が切り開かれる！
line = "数多のコンビネーションにより、遂に『ＸＥＬＯＳ』への道が切り開かれる！"

[[dialogue]]
speaker = "セイファート"
# 「残すはあと一太刀──少年！　合わせろッ！」
line = "「残すはあと一太刀──少年！　合わせろッ！」"

[[dialogue]]
speaker = "クロト"
# 「はい！　学園長──！！」
line = "「はい！　学園長──！！」"

[[dialogue]]
speaker = "セイファート"
# 「ムゥゥウゥゥウンッ──！！！」
line = "「ムゥゥウゥゥウンッ──！！！」"

[[dialogue]]
speaker = "unk"
# 大上段から放たれた英雄の一撃が『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』に食い込む──！
line = "大上段から放たれた英雄の一撃が『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』に食い込む──！"

[[dialogue]]
speaker = "ＸＥＬＯＳ"
# 「────ギ、ギギギィッ！？！？！？！？」
line = "「────ギ、ギギギィッ！？！？！？！？」"

[[dialogue]]
speaker = "unk"
# あの無機質だった創造神が、声にも音にもならない、確かな悲鳴を上げた。
line = "あの無機質だった創造神が、声にも音にもならない、確かな悲鳴を上げた。"

[[dialogue]]
speaker = "unk"
# そして──
line = "そして──"

[[dialogue]]
speaker = "unk"
# 学園長の持っていた、女神テルルが授けた剣が、砕け散り──
line = "学園長の持っていた、女神テルルが授けた剣が、砕け散り──"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「────ママ」
line = "「────ママ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「────テルル」
line = "「────テルル」"

[[dialogue]]
speaker = "unk"
# ヴィーナスとルヴィネの小さな呟きが、聴こえた気がした──
line = "ヴィーナスとルヴィネの小さな呟きが、聴こえた気がした──"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「…………ここは？」
line = "「…………ここは？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「テルルが見せている、精神世界のようね。招かれたのは、私と貴女だけみたい……」
line = "「テルルが見せている、精神世界のようね。招かれたのは、私と貴女だけみたい……」"

[[dialogue]]
speaker = "テルル"
# 『……ええ。剣が折れれば、それは私が消える時……最期の語らいをしておきたいと思い、呼ばせていただきました……』
line = "『……ええ。剣が折れれば、それは私が消える時……最期の語らいをしておきたいと思い、呼ばせていただきました……』"

[[dialogue]]
speaker = "テルル"
# 『私の授けた策を、手筈通りに進めてくれましたね……これで“<ruby=ゼロス>ＸＥＬＯＳ</ruby>”を守る高次元の壁はもうありません』
line = "『私の授けた策を、手筈通りに進めてくれましたね……これで“<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>”を守る高次元の壁はもうありません』"

[[dialogue]]
speaker = "テルル"
# 『３次元存在のあなたたちでも、その刃を創造神に届けることができるはず……私の役目も、ここまでです……』
line = "『３次元存在のあなたたちでも、その刃を創造神に届けることができるはず……私の役目も、ここまでです……』"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「……もっと他の方法はなかったの、ママ？」
line = "「……もっと他の方法はなかったの、ママ？」"

[[dialogue]]
speaker = "テルル"
# 『……ごめんなさい、ヴィーナス。見つけられるものなら、私もそうしたかった……』
line = "『……ごめんなさい、ヴィーナス。見つけられるものなら、私もそうしたかった……』"

[[dialogue]]
speaker = "テルル"
# 『けれど“<ruby=ゼロス>ＸＥＬＯＳ</ruby>”を倒せる可能性は、これしかなかったのです……』
line = "『けれど“<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>”を倒せる可能性は、これしかなかったのです……』"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ルヴィネ"
# 「テルル。死を待つだけだった私に、あなたは声を届けてくれた……その恩に報いさせて」
line = "「テルル。死を待つだけだった私に、あなたは声を届けてくれた……その恩に報いさせて」"

[[dialogue]]
speaker = "ルヴィネ"
# 「大役ではあるし、担えるかどうかもわからない──けれど貴女の申し出通り、女神の役目は、私が受け継ぐ……」
line = "「大役ではあるし、担えるかどうかもわからない──けれど貴女の申し出通り、女神の役目は、私が受け継ぐ……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……だから安心して、逝って頂戴」
line = "「……だから安心して、逝って頂戴」"

[[dialogue]]
speaker = "テルル"
# 『……よかった。“<ruby=ゼロス>ＸＥＬＯＳ</ruby>”の支配から解き放たれた今、世界の管理者を任せるにあたり、あなた以上の存在はいませんから……』
line = "『……よかった。“<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>”の支配から解き放たれた今、世界の管理者を任せるにあたり、あなた以上の存在はいませんから……』"

[[dialogue]]
speaker = "テルル"
# 『けれど……すぐに女神の位を継がせるわけにはいきませんよ？』
line = "『けれど……すぐに女神の位を継がせるわけにはいきませんよ？』"

[[dialogue]]
speaker = "テルル"
# 『あなたはまだ、この世界に生まれたばかり。もう少し、１人の天使として見聞を広めてもらいましょう』
line = "『あなたはまだ、この世界に生まれたばかり。もう少し、１人の天使として見聞を広めてもらいましょう』"

[[dialogue]]
speaker = "テルル"
# 『いわば修行の期間です。そうですね──あなたが天使として、天寿を全うするまで──としましょう』
line = "『いわば修行の期間です。そうですね──あなたが天使として、天寿を全うするまで──としましょう』"

[[dialogue]]
speaker = "テルル"
# 『今から数十年の世界の管理は、六柱の守護天使に一時的に委任します。よいですか。その間に、多くのことを学ぶのです』
line = "『今から数十年の世界の管理は、六柱の守護天使に一時的に委任します。よいですか。その間に、多くのことを学ぶのです』"

[[dialogue]]
speaker = "ルヴィネ"
# 「…………はい」
line = "「…………はい」"

[[dialogue]]
speaker = "ルヴィネ"
# 「<b>温情</b>に感謝いたします、女神テルル……いいえ」
line = "「<b>温情</b>に感謝いたします、女神テルル……いいえ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「────姉さん」
line = "「────姉さん」"

[[dialogue]]
speaker = "テルル"
# 『ええ……ヴィーナスも、もう泣いてはだめですよ？　パパを支えてあげてください』
line = "『ええ……ヴィーナスも、もう泣いてはだめですよ？　パパを支えてあげてください』"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「…………うんっ！　ママ、約束するわ！」
line = "「…………うんっ！　ママ、約束するわ！」"

[[dialogue]]
speaker = "テルル"
# 『強い子たち。あなたたちのおかげで、心穏やかに逝くことができます……』
line = "『強い子たち。あなたたちのおかげで、心穏やかに逝くことができます……』"

[[dialogue]]
speaker = "テルル"
# 『さあ──お戻りなさい。未来を掴むための戦いに──』
line = "『さあ──お戻りなさい。未来を掴むための戦いに──』"

[[dialogue]]
speaker = "クロト"
# （……今、はっきりと感じた）
line = "（……今、はっきりと感じた）"

[[dialogue]]
speaker = "unk"
# テルルがこの世界から──跡形もなく消えたことを。
line = "テルルがこの世界から──跡形もなく消えたことを。"

[[dialogue]]
speaker = "クロト"
# （……………………テルル）
line = "（……………………テルル）"

[[dialogue]]
speaker = "unk"
# つい先刻──アルタイルの塔の頂上、ホロウたちとの戦いに勝利した直後のことを思い出す。
line = "つい先刻──アルタイルの塔の頂上、ホロウたちとの戦いに勝利した直後のことを思い出す。"

[[dialogue]]
speaker = "テルル"
# 『そしてもう１つ、あなたたちに伝えたいことがあります。よく、聞いてください──』
line = "『そしてもう１つ、あなたたちに伝えたいことがあります。よく、聞いてください──』"

[[dialogue]]
speaker = "テルル"
# 『創造神“<ruby=ゼロス>ＸＥＬＯＳ</ruby>”は、高次元──正確には、１１次元に存在する神です』
line = "『創造神“<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>”は、高次元──正確には、１１次元に存在する神です』"

[[dialogue]]
speaker = "テルル"
# 『ゆえに３次元存在のあなたたちでは、触れることすら叶いません』
line = "『ゆえに３次元存在のあなたたちでは、触れることすら叶いません』"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「そんな……テルル様。そのような相手、どうすれば……！？」
line = "「そんな……テルル様。そのような相手、どうすれば……！？」"

[[dialogue]]
speaker = "テルル"
# 『策があります。私はこの日のために、１０年前──デネブで、人間の九浄テルルとして敗北したその日から、準備をしてきました……』
line = "『策があります。私はこの日のために、１０年前──デネブで、人間の九浄テルルとして敗北したその日から、準備をしてきました……』"

[[dialogue]]
speaker = "テルル"
# 『“<ruby=ゼロス>ＸＥＬＯＳ</ruby>”の次元の壁を突破する武器を、私の全存在と引き換えに創造しています……それはじきに完成を見るでしょう』
line = "『“<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>”の次元の壁を突破する武器を、私の全存在と引き換えに創造しています……それはじきに完成を見るでしょう』"

[[dialogue]]
speaker = "テルル"
# 『この武器があれば、高次元存在の“<ruby=ゼロス>ＸＥＬＯＳ</ruby>”に<ruby=くさび>楔</ruby>を打ち込むことができます』
line = "『この武器があれば、高次元存在の“<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>”に<ruby>楔<rt>くさび</rt></ruby>を打ち込むことができます』"

[[dialogue]]
speaker = "テルル"
# 『１度の攻撃を通すたび、１次元ぶんの境界を破壊することが可能です……この武器の錬成と引き換えに、私は消滅してしまいますが……』
line = "『１度の攻撃を通すたび、１次元ぶんの境界を破壊することが可能です……この武器の錬成と引き換えに、私は消滅してしまいますが……』"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「……っ！？　そ、そんな……嫌よ、そんなの！！」
line = "「……っ！？　そ、そんな……嫌よ、そんなの！！」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「そうです、テルル様……。あなたがいなくなるだなんて、私たちはどうすればいいのですか！？」
line = "「そうです、テルル様……。あなたがいなくなるだなんて、私たちはどうすればいいのですか！？」"

[[dialogue]]
speaker = "テルル"
# 『私がいなくなった後のことは、守護天使たちと……ルヴィネに託してあります。心配はいりません』
line = "『私がいなくなった後のことは、守護天使たちと……ルヴィネに託してあります。心配はいりません』"

[[dialogue]]
speaker = "ルヴィネ"
# 「…………ええ」
line = "「…………ええ」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「そんな、ママ……！」
line = "「そんな、ママ……！」"

[[dialogue]]
speaker = "テルル"
# 『他に方法はないのです……さぁ、デネブに向かってください。頼もしい増援にこの武器を持たせます。よいですね──』
line = "『他に方法はないのです……さぁ、デネブに向かってください。頼もしい増援にこの武器を持たせます。よいですね──』"

[[dialogue]]
speaker = "unk"
# テルルから授かった『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』打倒の計画を聞いた時、他に方法はないのかと考えた。
line = "テルルから授かった『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』打倒の計画を聞いた時、他に方法はないのかと考えた。"

[[dialogue]]
speaker = "unk"
# 実際に『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』と相対した時も、あらゆる攻撃を試し、有効打となる方法を探した……けれど、その全ては高次元存在の『神』には無力だった。
line = "実際に『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』と相対した時も、あらゆる攻撃を試し、有効打となる方法を探した……けれど、その全ては高次元存在の『神』には無力だった。"

[[dialogue]]
speaker = "クロト"
# （ヴィーナスに、二度目になる母親との別れを経験させたくなかった……）
line = "（ヴィーナスに、二度目になる母親との別れを経験させたくなかった……）"

[[dialogue]]
speaker = "クロト"
# （そして──テルル。できればあなたに、ずっとこの世界を見守っていて欲しかった……）
line = "（そして──テルル。できればあなたに、ずっとこの世界を見守っていて欲しかった……）"

[[dialogue]]
speaker = "unk"
# 幾重にも重なった悔しさに歯噛みする……けれど、立ち止まってはいられない！
line = "幾重にも重なった悔しさに歯噛みする……けれど、立ち止まってはいられない！"

[[dialogue]]
speaker = "セイファート"
# 「行け──少年！！　次元の境界を超えろ──！！」
line = "「行け──少年！！　次元の境界を超えろ──！！」"

[[dialogue]]
speaker = "unk"
# 俺は３次元存在にまで堕ちた『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』に接近し──全力の一撃を見舞う！
line = "俺は３次元存在にまで堕ちた『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』に接近し──全力の一撃を見舞う！"

[[dialogue]]
speaker = "クロト"
# 「──ディマイズ・ブレイカーッ！！！」
line = "「──ディマイズ・ブレイカーッ！！！」"

[[dialogue]]
speaker = "ＸＥＬＯＳ"
# 「────────ギ、ガ──ッ！！？？」
line = "「────────ギ、ガ──ッ！！？？」"

[[dialogue]]
speaker = "unk"
# 拳に伝わる確かな手応え。『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』の<ruby=コア>核</ruby>とも言える部分を打ち貫いた感触に全身が震える。
line = "拳に伝わる確かな手応え。『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』の<ruby>核<rt>コア</rt></ruby>とも言える部分を打ち貫いた感触に全身が震える。"

[[dialogue]]
speaker = "グレイス"
# 「──やりましたか！？」
line = "「──やりましたか！？」"

[[dialogue]]
speaker = "チナ"
# 「頼む、これで通ってくれ……！！」
line = "「頼む、これで通ってくれ……！！」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
# 「ぁ──ぁぁぁあ──お父様……！？」
line = "「ぁ──ぁぁぁあ──お父様……！？」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
# 「真の姿を、御見せになる──そんな！？」
line = "「真の姿を、御見せになる──そんな！？」"

[[dialogue]]
speaker = "unk"
# 無機質な立方体だった『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』に亀裂が走り、割れて──
line = "無機質な立方体だった『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』に亀裂が走り、割れて──"

[[dialogue]]
speaker = "クロト"
# 「ようやく背中に火が点いたか……『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』」
line = "「ようやく背中に火が点いたか……『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「……私も、この御姿を見るのは、初めてよ」
line = "「……私も、この御姿を見るのは、初めてよ」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「──お父様の御言葉を伝えましょう」
line = "「──お父様の御言葉を伝えましょう」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「『緋宮クロト──創造神の全霊を持って、お前を消滅させる』」
line = "「『緋宮クロト──創造神の全霊を持って、お前を消滅させる』」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「『……厄災の両腕を揃えるなどと、それを望むこと自体が誤りであった。そんなものは、付け入られる隙でしかない……』」
line = "「『……厄災の両腕を揃えるなどと、それを望むこと自体が誤りであった。そんなものは、付け入られる隙でしかない……』」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「『お前を壊す。滅ぼすこと──それは、世界の破滅と同義である──』」
line = "「『お前を壊す。滅ぼすこと──それは、世界の破滅と同義である──』」"

[[dialogue]]
speaker = "クロト"
# 「俺たちはもうお前に触れられる……『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』！　今のお前は、殺すことができる程度の『神』でしかない！！」
line = "「俺たちはもうお前に触れられる……『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』！　今のお前は、殺すことができる程度の『神』でしかない！！」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「『神』に触れられるようになった。…………そう。だから、何だというの？」
line = "「『神』に触れられるようになった。…………そう。だから、何だというの？」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
# 「ヒトの子を見守り続けた女神は死んだ……！　邪魔な障害はもはや存在しないわ！！」
line = "「ヒトの子を見守り続けた女神は死んだ……！　邪魔な障害はもはや存在しないわ！！」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
# 「私よ……もっと増えなさい！　もっと励みなさい！　デネブを刷新するのよ！！」
line = "「私よ……もっと増えなさい！　もっと励みなさい！　デネブを刷新するのよ！！」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「滅ぼす、滅ぼす、滅ぼす──」
line = "「滅ぼす、滅ぼす、滅ぼす──」"

[[dialogue]]
speaker = "極星学園の星騎士"
