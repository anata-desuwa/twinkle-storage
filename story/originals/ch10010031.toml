[[dialogue]]
speaker = "unk"
# 第１話,フィオナのお弁当,P
line = "第１話,フィオナのお弁当,P"

[[dialogue]]
speaker = "フィオナ"
# 『今日のお昼なんですけど、カフェテリアに来ていただけませんか？　お渡ししたいものがありまして……』
line = "『今日のお昼なんですけど、カフェテリアに来ていただけませんか？　お渡ししたいものがありまして……』"

[[dialogue]]
speaker = "unk"
# フィオナに言われた通り、カフェテリアに行くと──
line = "フィオナに言われた通り、カフェテリアに行くと──"

[[dialogue]]
speaker = "フィオナ"
# 「こんにちは、緋宮会長。この前の一件ではお世話になりました」
line = "「こんにちは、緋宮会長。この前の一件ではお世話になりました」"

[[dialogue]]
speaker = "フィオナ"
# 「まさか戦闘服がウェディングドレスになるなんて思いませんでした。お恥ずかしいところをたくさんお見せしてしまいましたし……」
line = "「まさか戦闘服がウェディングドレスになるなんて思いませんでした。お恥ずかしいところをたくさんお見せしてしまいましたし……」"

[[dialogue]]
speaker = "フィオナ"
# 「……少しニヤニヤしていませんか、緋宮会長？」
line = "「……少しニヤニヤしていませんか、緋宮会長？」"

[[dialogue]]
speaker = "フィオナ"
# 「かわいいフィオナが見られた……？　もう、緋宮会長ってばイジワルです……」
line = "「かわいいフィオナが見られた……？　もう、緋宮会長ってばイジワルです……」"

[[dialogue]]
speaker = "フィオナ"
# 「ですが今日はその話をしに来たのではありません。実は緋宮会長にお弁当を作ってきたんです」
line = "「ですが今日はその話をしに来たのではありません。実は緋宮会長にお弁当を作ってきたんです」"

[[dialogue]]
speaker = "フィオナ"
# 「せっかく花嫁修業で料理を学んだんですから、もっと上手になりたいと思って練習しました。私のお弁当、食べてもらえますか？」
line = "「せっかく花嫁修業で料理を学んだんですから、もっと上手になりたいと思って練習しました。私のお弁当、食べてもらえますか？」"

[[dialogue]]
speaker = "unk"
# もちろん。嬉しいよ
line = "もちろん。嬉しいよ"

[[dialogue]]
speaker = "フィオナ"
# 「ありがとうございます。自分の分も作ってきましたから、一緒に食べましょう」
line = "「ありがとうございます。自分の分も作ってきましたから、一緒に食べましょう」"

[[dialogue]]
speaker = "フィオナ"
# 「最初なので、オーソドックスなおかずにしてみました。卵焼きと、唐揚げと、ポテトサラダと、あときんぴらごぼうです」
line = "「最初なので、オーソドックスなおかずにしてみました。卵焼きと、唐揚げと、ポテトサラダと、あときんぴらごぼうです」"

[[dialogue]]
speaker = "フィオナ"
# 「それじゃ卵焼きから……あーん」
line = "「それじゃ卵焼きから……あーん」"

[[dialogue]]
speaker = "unk"
# ！？
line = "！？"

[[dialogue]]
speaker = "フィオナ"
# 「そ、そんなに驚かなくてもいいじゃないですか。せっかく自分で作ったお弁当なんですし、私が食べさせてあげたいんです」
line = "「そ、そんなに驚かなくてもいいじゃないですか。せっかく自分で作ったお弁当なんですし、私が食べさせてあげたいんです」"

[[dialogue]]
speaker = "フィオナ"
# 「もちろん緋宮会長が嫌ならしませんけど……。ダメ……ですか？」
line = "「もちろん緋宮会長が嫌ならしませんけど……。ダメ……ですか？」"

[[dialogue]]
speaker = "フィオナ"
# 「ダメじゃない……？　じゃ、じゃあいいですよね。……あ、あ～ん」
line = "「ダメじゃない……？　じゃ、じゃあいいですよね。……あ、あ～ん」"

[[dialogue]]
speaker = "フィオナ"
# 「お味はどうでしょうか……？」
line = "「お味はどうでしょうか……？」"

[[dialogue]]
speaker = "unk"
# 美味しい！
line = "美味しい！"

[[dialogue]]
speaker = "フィオナ"
# 「ふふ、嬉しいです。なかなか綺麗に焼けなくて、たくさん作ったんですから」
line = "「ふふ、嬉しいです。なかなか綺麗に焼けなくて、たくさん作ったんですから」"

[[dialogue]]
speaker = "フィオナ"
# 「じゃあ唐揚げも……あーん」
line = "「じゃあ唐揚げも……あーん」"

[[dialogue]]
speaker = "フィオナ"
# 「美味しいですか？　なら良かった。冷めても美味しいレシピをキリカに教わったんですよ」
line = "「美味しいですか？　なら良かった。冷めても美味しいレシピをキリカに教わったんですよ」"

[[dialogue]]
speaker = "フィオナ"
# 「緋宮会長が喜んでくれて、朝早起きして作った甲斐がありました」
line = "「緋宮会長が喜んでくれて、朝早起きして作った甲斐がありました」"

[[dialogue]]
speaker = "フィオナ"
# 「慣れないことをするのは少し苦労しましたけど……緋宮会長が食べてくれるのを想像したら、むしろ楽しかったです。お嫁さんって、こんな気持ちなんでしょうか」
line = "「慣れないことをするのは少し苦労しましたけど……緋宮会長が食べてくれるのを想像したら、むしろ楽しかったです。お嫁さんって、こんな気持ちなんでしょうか」"

[[dialogue]]
speaker = "フィオナ"
# 「……なんて、恥ずかしいこと言ってますね、私。あはは……」
line = "「……なんて、恥ずかしいこと言ってますね、私。あはは……」"

[[dialogue]]
speaker = "ルリエル"
# 「あ～、フィオナ会長と新星の会長さんがイチャイチャしてます！」
line = "「あ～、フィオナ会長と新星の会長さんがイチャイチャしてます！」"

[[dialogue]]
speaker = "ソフィア"
# 「こら、ルリ。大声出さない」
line = "「こら、ルリ。大声出さない」"

[[dialogue]]
speaker = "ルリエル"
# 「だって星徒会長同士のビッグカップルですよ！　騒がない方がどうかしてます！」
line = "「だって星徒会長同士のビッグカップルですよ！　騒がない方がどうかしてます！」"

[[dialogue]]
speaker = "ソフィア"
# 「そういう問題じゃないってば。まぁ、フィオナ会長は人前ではもっと控える人だと思ってたけど」
line = "「そういう問題じゃないってば。まぁ、フィオナ会長は人前ではもっと控える人だと思ってたけど」"

[[dialogue]]
speaker = "ソフィア"
# 「でも、学生のプライベートとして問題があるほどではないので、そっとしておきましょう」
line = "「でも、学生のプライベートとして問題があるほどではないので、そっとしておきましょう」"

[[dialogue]]
speaker = "フィオナ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "フィオナ"
# 「ほ、ほら、もっと食べてください。まだお弁当はありますから」
line = "「ほ、ほら、もっと食べてください。まだお弁当はありますから」"

[[dialogue]]
speaker = "フィオナ"
# 「場所を移さなくていいのかって？　いいんです。むしろもっと見せつけましょう。流星・新星両校で噂になるくらいに」
line = "「場所を移さなくていいのかって？　いいんです。むしろもっと見せつけましょう。流星・新星両校で噂になるくらいに」"

[[dialogue]]
speaker = "フィオナ"
# 「きんぴらも、ポテトサラダも食べてくださいね。はい、あーん」
line = "「きんぴらも、ポテトサラダも食べてくださいね。はい、あーん」"

[[dialogue]]
speaker = "unk"
# ごちそうさま
line = "ごちそうさま"

[[dialogue]]
speaker = "フィオナ"
# 「お粗末様でした。ちなみに、どのおかずが一番緋宮会長のお口に合いましたか？」
line = "「お粗末様でした。ちなみに、どのおかずが一番緋宮会長のお口に合いましたか？」"

[[dialogue]]
speaker = "フィオナ"
# 「卵焼き？　ふむふむ、なるほど……緋宮会長は和食がお好みですか。参考にさせてもらいます」
line = "「卵焼き？　ふむふむ、なるほど……緋宮会長は和食がお好みですか。参考にさせてもらいます」"

[[dialogue]]
speaker = "フィオナ"
# 「もっと美味しいお弁当を作れるよう頑張りますね」
line = "「もっと美味しいお弁当を作れるよう頑張りますね」"

[[dialogue]]
speaker = "unk"
# 一週間後──
line = "一週間後──"

[[dialogue]]
speaker = "フィオナ"
# 「こんにちは、緋宮会長。今日もお弁当を作ってきました」
line = "「こんにちは、緋宮会長。今日もお弁当を作ってきました」"

[[dialogue]]
speaker = "フィオナ"
# 「ふふ、遠慮しないでください。私が好きでしていることなんですから」
line = "「ふふ、遠慮しないでください。私が好きでしていることなんですから」"

[[dialogue]]
speaker = "フィオナ"
# 「今日は鰹節と昆布から出汁をとって、ふわふわのだし巻き卵にしてみました。自信作なんです♪」
line = "「今日は鰹節と昆布から出汁をとって、ふわふわのだし巻き卵にしてみました。自信作なんです♪」"

[[dialogue]]
speaker = "キリカ"
# 「フィオナお嬢様は、あれから卵焼きの研究を始められまして……」
line = "「フィオナお嬢様は、あれから卵焼きの研究を始められまして……」"

[[dialogue]]
speaker = "フィオナ"
# 「だし巻き卵の出汁の割合は……ふむふむ、なるほど……」
line = "「だし巻き卵の出汁の割合は……ふむふむ、なるほど……」"

[[dialogue]]
speaker = "フィオナ"
# 「昆布は水に漬けておいて、沸騰寸前で取り出す……沸騰したら火を止めて、鰹節を加えて……」
line = "「昆布は水に漬けておいて、沸騰寸前で取り出す……沸騰したら火を止めて、鰹節を加えて……」"

[[dialogue]]
speaker = "キリカ"
# 「卵や醤油、油の種類、玉子焼き器の大きさや材質に至るまで、ずいぶんお詳しくなられてしまいました」
line = "「卵や醤油、油の種類、玉子焼き器の大きさや材質に至るまで、ずいぶんお詳しくなられてしまいました」"

[[dialogue]]
speaker = "unk"
# フィオナってけっこう凝り性？
line = "フィオナってけっこう凝り性？"

[[dialogue]]
speaker = "フィオナ"
# 「へ……！？　そ、そうでしょうか……？」
line = "「へ……！？　そ、そうでしょうか……？」"

[[dialogue]]
speaker = "キリカ"
# 「言われてみますと……いつの間にかサーフィンの技や道具についても細かく知っておられましたし」
line = "「言われてみますと……いつの間にかサーフィンの技や道具についても細かく知っておられましたし」"

[[dialogue]]
speaker = "キリカ"
# 「昔から、興味や関心があることは自分でよく調べておられました。一度夢中になると他のことが目に入らないところもあります」
line = "「昔から、興味や関心があることは自分でよく調べておられました。一度夢中になると他のことが目に入らないところもあります」"

[[dialogue]]
speaker = "キリカ"
# 「ヒーローのアニメや漫画についてもよくご存じで──」
line = "「ヒーローのアニメや漫画についてもよくご存じで──」"

[[dialogue]]
speaker = "フィオナ"
# 「そ、それはいいってば！」
line = "「そ、それはいいってば！」"

[[dialogue]]
speaker = "フィオナ"
# 「うぅ、言われてみると確かにそんな気が……私、オタク気質なのかもしれません……」
line = "「うぅ、言われてみると確かにそんな気が……私、オタク気質なのかもしれません……」"

[[dialogue]]
speaker = "unk"
# そんなフィオナもかわいいよ
line = "そんなフィオナもかわいいよ"

[[dialogue]]
speaker = "フィオナ"
# 「え──！？」
line = "「え──！？」"

[[dialogue]]
speaker = "フィオナ"
# 「もう……ずるいです。そんなこと言われたら、あなたのこと、もっと好きになっちゃうじゃないですか……」
line = "「もう……ずるいです。そんなこと言われたら、あなたのこと、もっと好きになっちゃうじゃないですか……」"

[[dialogue]]
speaker = "フィオナ"
# 「こんな私でもよろしくお願いしますね、緋宮会長」
line = "「こんな私でもよろしくお願いしますね、緋宮会長」"
