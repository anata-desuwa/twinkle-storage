[[dialogue]]
speaker = "unk"
# 第３話,力の使い方,P
line = "第３話,力の使い方,P"

[[dialogue]]
speaker = "unk"
# 星徒会室に場所を移すと──
line = "星徒会室に場所を移すと──"

[[dialogue]]
speaker = "エンジュ"
# 「なあ、星騎士ってのは、弱いやつをモンスターから守ってくれるもんなんだろ？」
line = "「なあ、星騎士ってのは、弱いやつをモンスターから守ってくれるもんなんだろ？」"

[[dialogue]]
speaker = "unk"
# ああ、そうだよ
line = "ああ、そうだよ"

[[dialogue]]
speaker = "エンジュ"
# 「……！　だけどあいつは──あいつは──」
line = "「……！　だけどあいつは──あいつは──」"

[[dialogue]]
speaker = "エンジュ"
# 「あいつは町を捨てて、流星市国に逃げ出したんだ……！」
line = "「あいつは町を捨てて、流星市国に逃げ出したんだ……！」"

[[dialogue]]
speaker = "unk"
# 逃げ出した……？
line = "逃げ出した……？"

[[dialogue]]
speaker = "サーシャ"
# 「どういうことなの……？」
line = "「どういうことなの……？」"

[[dialogue]]
speaker = "エンジュ"
# 「ある日、あたしたちの町にモンスターが押し寄せた」
line = "「ある日、あたしたちの町にモンスターが押し寄せた」"

[[dialogue]]
speaker = "エンジュ"
# 「だけどあいつは、あたしたちを、町を……守らなかった」
line = "「だけどあいつは、あたしたちを、町を……守らなかった」"

[[dialogue]]
speaker = "エンジュ"
# 「あいつが守ったのは自分の屋敷だけ。町のやつらがどうなろうが、素知らぬ顔で見捨てやがった……！」
line = "「あいつが守ったのは自分の屋敷だけ。町のやつらがどうなろうが、素知らぬ顔で見捨てやがった……！」"

[[dialogue]]
speaker = "エンジュ"
# 「何人もの住民がモンスターの餌食になった」
line = "「何人もの住民がモンスターの餌食になった」"

[[dialogue]]
speaker = "エンジュ"
# 「あたしの両親も、あたしをかばって、大怪我を負った。医者に診せることもできず、悶えながら死んだ」
line = "「あたしの両親も、あたしをかばって、大怪我を負った。医者に診せることもできず、悶えながら死んだ」"

[[dialogue]]
speaker = "エンジュ"
# 「だからあたしは、１人であいつの屋敷に乗り込んだ。屈辱を晴らすために……そして町のみんなの痛みを味わわせるために……！」
line = "「だからあたしは、１人であいつの屋敷に乗り込んだ。屈辱を晴らすために……そして町のみんなの痛みを味わわせるために……！」"

[[dialogue]]
speaker = "unk"
# そんな無謀な……！
line = "そんな無謀な……！"

[[dialogue]]
speaker = "エンジュ"
# 「でも、あたしが屋敷に踏み込んだ時には既に遅かった。もぬけの殻だったんだ。新星学園に入学した、とか言ってな」
line = "「でも、あたしが屋敷に踏み込んだ時には既に遅かった。もぬけの殻だったんだ。新星学園に入学した、とか言ってな」"

[[dialogue]]
speaker = "エンジュ"
# 「ついでに屋敷の用心棒どもと出くわして、ボコボコにされて……気付いたら<b>力</b>に目覚めていた」
line = "「ついでに屋敷の用心棒どもと出くわして、ボコボコにされて……気付いたら<b>力</b>に目覚めていた」"

[[dialogue]]
speaker = "サーシャ"
# 「……それがエンジュちゃんの覚醒のきっかけだったのね」
line = "「……それがエンジュちゃんの覚醒のきっかけだったのね」"

[[dialogue]]
speaker = "エンジュ"
# 「コラプサーの力を手に入れたあたしは、用心棒のやつらを逆にブッ倒して、屋敷をぶっ壊した」
line = "「コラプサーの力を手に入れたあたしは、用心棒のやつらを逆にブッ倒して、屋敷をぶっ壊した」"

[[dialogue]]
speaker = "エンジュ"
# 「それからモンスターにボロボロにされた町から人がいなくなっていって、最後は町がなくなった」
line = "「それからモンスターにボロボロにされた町から人がいなくなっていって、最後は町がなくなった」"

[[dialogue]]
speaker = "エンジュ"
# 「そしてあたしは、魔界を彷徨ってたところをコラプサーに拾われた」
line = "「そしてあたしは、魔界を彷徨ってたところをコラプサーに拾われた」"

[[dialogue]]
speaker = "エンジュ"
# 「さぁ、あいつを出せ！　あいつに復讐するためにあたしはここに来たんだ！」
line = "「さぁ、あいつを出せ！　あいつに復讐するためにあたしはここに来たんだ！」"

[[dialogue]]
speaker = "unk"
# エンジュから聞いた『あいつ』の名前を、データベースで検索すると──
line = "エンジュから聞いた『あいつ』の名前を、データベースで検索すると──"

[[dialogue]]
speaker = "サーシャ"
# 「あ、見つけたわ～」
line = "「あ、見つけたわ～」"

[[dialogue]]
speaker = "エンジュ"
# 「──！！」
line = "「──！！」"

[[dialogue]]
speaker = "サーシャ"
# 「でもその子、入学して４カ月後に問題を起こして退学処分になってるわね～」
line = "「でもその子、入学して４カ月後に問題を起こして退学処分になってるわね～」"

[[dialogue]]
speaker = "エンジュ"
# 「……は？」
line = "「……は？」"

[[dialogue]]
speaker = "サーシャ"
# 「一般人に星術を使って、怪我を負わせたの～。重大な校則違反よ～。当然、星騎士になる資格はなくなっちゃったわ」
line = "「一般人に星術を使って、怪我を負わせたの～。重大な校則違反よ～。当然、星騎士になる資格はなくなっちゃったわ」"

[[dialogue]]
speaker = "エンジュ"
# 「どうなってる？　そんなのありかよ？　またあたしから逃げんのか……？」
line = "「どうなってる？　そんなのありかよ？　またあたしから逃げんのか……？」"

[[dialogue]]
speaker = "エンジュ"
# 「おい、あいつは今どこにいる！？　教えろ！　あたしはあいつに復讐するために来たんだ！」
line = "「おい、あいつは今どこにいる！？　教えろ！　あたしはあいつに復讐するために来たんだ！」"

[[dialogue]]
speaker = "サーシャ"
# 「わからないわ～。大交流で魔界に帰ったと記録されているけど、その後の足取りは不明ね～」
line = "「わからないわ～。大交流で魔界に帰ったと記録されているけど、その後の足取りは不明ね～」"

[[dialogue]]
speaker = "エンジュ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "エンジュ"
# 「はは……ははははははっ！　あははっ、あははははははっ！」
line = "「はは……ははははははっ！　あははっ、あははははははっ！」"

[[dialogue]]
speaker = "エンジュ"
# 「とんだ間抜けじゃねえか、あたしは……はは、ははは……何のために、流星市国まで……」
line = "「とんだ間抜けじゃねえか、あたしは……はは、ははは……何のために、流星市国まで……」"

[[dialogue]]
speaker = "エンジュ"
# 「これまでやってきたことは、全部無駄だったってことか……はは……バカじゃねえか、あたし……」
line = "「これまでやってきたことは、全部無駄だったってことか……はは……バカじゃねえか、あたし……」"

[[dialogue]]
speaker = "サーシャ"
# 「エンジュちゃん……」
line = "「エンジュちゃん……」"

[[dialogue]]
speaker = "unk"
# 無駄じゃなかったよ
line = "無駄じゃなかったよ"

[[dialogue]]
speaker = "エンジュ"
# 「は……？」
line = "「は……？」"

[[dialogue]]
speaker = "unk"
# 流星市国の人々を守ってくれた
line = "流星市国の人々を守ってくれた"

[[dialogue]]
speaker = "エンジュ"
# 「いや、それは……成り行きで……」
line = "「いや、それは……成り行きで……」"

[[dialogue]]
speaker = "サーシャ"
# 「成り行きなんかじゃないわ～。あなたは自分の意志で、モンスターと戦って、人を助けた」
line = "「成り行きなんかじゃないわ～。あなたは自分の意志で、モンスターと戦って、人を助けた」"

[[dialogue]]
speaker = "サーシャ"
# 「コラプサーとして私たちと戦いはしたけれど、あなたの言う『あいつ』よりよっぽど星騎士みたいだわ～」
line = "「コラプサーとして私たちと戦いはしたけれど、あなたの言う『あいつ』よりよっぽど星騎士みたいだわ～」"

[[dialogue]]
speaker = "エンジュ"
# 「なんだ、それ……励ましてるつもりか？」
line = "「なんだ、それ……励ましてるつもりか？」"

[[dialogue]]
speaker = "unk"
# 復讐以外の目的を持ってみたら？
line = "復讐以外の目的を持ってみたら？"

[[dialogue]]
speaker = "エンジュ"
# 「はぁ？　まさかあたしに人を守れって言いたいのかよ？」
line = "「はぁ？　まさかあたしに人を守れって言いたいのかよ？」"

[[dialogue]]
speaker = "エンジュ"
# 「あいつは必ず見つけて復讐する。必ずだ」
line = "「あいつは必ず見つけて復讐する。必ずだ」"

[[dialogue]]
speaker = "エンジュ"
# 「だけどあたしはあいつと同じにはならない」
line = "「だけどあたしはあいつと同じにはならない」"

[[dialogue]]
speaker = "エンジュ"
# 「だからモンスターも倒す！　リクリエの好きにはさせない！」
line = "「だからモンスターも倒す！　リクリエの好きにはさせない！」"

[[dialogue]]
speaker = "サーシャ"
# 「ふふふ、心強いわね～」
line = "「ふふふ、心強いわね～」"
