[[dialogue]]
speaker = "unk"
# 第２話,梨緒ＶＳジグ再び,P
line = "第２話,梨緒ＶＳジグ再び,P"

[[dialogue]]
speaker = "unk"
# ある日、カフェテリアに行ってみると、選挙管理委員会の４人──とジグがいた。
line = "ある日、カフェテリアに行ってみると、選挙管理委員会の４人──とジグがいた。"

[[dialogue]]
speaker = "ジグ"
# 「やぁ、魔王じゃないか。こんにちは」
line = "「やぁ、魔王じゃないか。こんにちは」"

[[dialogue]]
speaker = "unk"
# ジグは選挙管理委員会に入ったんだ？
line = "ジグは選挙管理委員会に入ったんだ？"

[[dialogue]]
speaker = "ジグ"
# 「ああ、そうなんだ。とはいえアガサとの付き合いで入っただけだから、気にしなくていいよ」
line = "「ああ、そうなんだ。とはいえアガサとの付き合いで入っただけだから、気にしなくていいよ」"

[[dialogue]]
speaker = "梨緒"
# 「こら、真面目に魔王を監視しろ」
line = "「こら、真面目に魔王を監視しろ」"

[[dialogue]]
speaker = "ジグ"
# 「え～、今さら監視しなくてもよくない？　ラクシスの力は一旦封印したんだし、魔王は堕ちたりしないだろう？」
line = "「え～、今さら監視しなくてもよくない？　ラクシスの力は一旦封印したんだし、魔王は堕ちたりしないだろう？」"

[[dialogue]]
speaker = "梨緒"
# 「魔王の力は強大だ。油断は禁物だぞ」
line = "「魔王の力は強大だ。油断は禁物だぞ」"

[[dialogue]]
speaker = "梨緒"
# 「それに魔王の力に関わらず、星徒会長として品位を損なう行為に及ぶ可能性もある。監視の目は必要だ」
line = "「それに魔王の力に関わらず、星徒会長として品位を損なう行為に及ぶ可能性もある。監視の目は必要だ」"

[[dialogue]]
speaker = "ジグ"
# 「はいはい、アガサは相変わらず真面目だね」
line = "「はいはい、アガサは相変わらず真面目だね」"

[[dialogue]]
speaker = "unk"
# 今何してるところ？
line = "今何してるところ？"

[[dialogue]]
speaker = "ジグ"
# 「それが、アガサにまた勝負を挑まれてしまってね」
line = "「それが、アガサにまた勝負を挑まれてしまってね」"

[[dialogue]]
speaker = "ナターシャ"
# 「あ～あ、これで何回目だろ。どうせ梨緒が負けるんだろうなー」
line = "「あ～あ、これで何回目だろ。どうせ梨緒が負けるんだろうなー」"

[[dialogue]]
speaker = "アポロ"
# 「ジグが正気に戻ってから、毎日のように勝負してるな……」
line = "「ジグが正気に戻ってから、毎日のように勝負してるな……」"

[[dialogue]]
speaker = "ベアトリス"
# 「あははは……梨緒ちゃん、ほんとに何度負けてもくじけないね……」
line = "「あははは……梨緒ちゃん、ほんとに何度負けてもくじけないね……」"

[[dialogue]]
speaker = "unk"
# （そんなに何度も勝負してるんだ……）
line = "（そんなに何度も勝負してるんだ……）"

[[dialogue]]
speaker = "ジグ"
# 「だいたい、アガサはリクリエの使徒だった私に勝ったんじゃなかったのかい？　今さら私と勝負して意味あるの？」
line = "「だいたい、アガサはリクリエの使徒だった私に勝ったんじゃなかったのかい？　今さら私と勝負して意味あるの？」"

[[dialogue]]
speaker = "梨緒"
# 「天界のあの戦いで、確かに私は君に勝った」
line = "「天界のあの戦いで、確かに私は君に勝った」"

[[dialogue]]
speaker = "梨緒"
# 「だがあの時の君は使徒だった。だから正気の君にも勝ちたいんだ」
line = "「だがあの時の君は使徒だった。だから正気の君にも勝ちたいんだ」"

[[dialogue]]
speaker = "ジグ"
# 「ああ、そういうこと。アガサらしいといえばアガサらしいね」
line = "「ああ、そういうこと。アガサらしいといえばアガサらしいね」"

[[dialogue]]
speaker = "ジグ"
# 「別に勝負をするのはいいけど、いったい何の勝負をするんだい？」
line = "「別に勝負をするのはいいけど、いったい何の勝負をするんだい？」"

[[dialogue]]
speaker = "ジグ"
# 「今までアガサとは、モンスター討伐からテストの成績、教室の掃除に至るまで、いろいろなもので勝負をしたはずだけど」
line = "「今までアガサとは、モンスター討伐からテストの成績、教室の掃除に至るまで、いろいろなもので勝負をしたはずだけど」"

[[dialogue]]
speaker = "梨緒"
# 「ここでする勝負なら決まっている……料理で勝負だ！」
line = "「ここでする勝負なら決まっている……料理で勝負だ！」"

[[dialogue]]
speaker = "ジグ"
# 「私とアガサが？　構わないけど、君、料理なんてできるのかい？」
line = "「私とアガサが？　構わないけど、君、料理なんてできるのかい？」"

[[dialogue]]
speaker = "梨緒"
# 「私を舐めるな。こちらの世界で成長したんだ。審査員は……私とジグ以外の選管の３人、そして魔王だ」
line = "「私を舐めるな。こちらの世界で成長したんだ。審査員は……私とジグ以外の選管の３人、そして魔王だ」"

[[dialogue]]
speaker = "unk"
# え、俺も！？
line = "え、俺も！？"

[[dialogue]]
speaker = "ナターシャ"
# 「旅は道連れってやつだね。まともなやつが出てくるのを祈ろっか」
line = "「旅は道連れってやつだね。まともなやつが出てくるのを祈ろっか」"

[[dialogue]]
speaker = "梨緒"
# 「ではカフェテリアの厨房を借りて、さっそく調理を行う。私が作るのは、この勝負のためにキリカさんに教わったローストビーフだ」
line = "「ではカフェテリアの厨房を借りて、さっそく調理を行う。私が作るのは、この勝負のためにキリカさんに教わったローストビーフだ」"

[[dialogue]]
speaker = "アポロ"
# 「うわ、わざわざキリカに聞いてくるとか大人げないぞ……」
line = "「うわ、わざわざキリカに聞いてくるとか大人げないぞ……」"

[[dialogue]]
speaker = "梨緒"
# 「勝負するからには全力で戦わないと意味がない。それにローストビーフはイギリス料理だし、母国の料理を作っても問題ないだろう」
line = "「勝負するからには全力で戦わないと意味がない。それにローストビーフはイギリス料理だし、母国の料理を作っても問題ないだろう」"

[[dialogue]]
speaker = "ジグ"
# 「私は何を作ろうか。せっかくだから、ドイツで食べられている料理がいいかな」
line = "「私は何を作ろうか。せっかくだから、ドイツで食べられている料理がいいかな」"

[[dialogue]]
speaker = "ジグ"
# 「……うん、決めた。では始めようか」
line = "「……うん、決めた。では始めようか」"

[[dialogue]]
speaker = "梨緒"
# 「よし、できたぞ。なかなかうまくできたと思う」
line = "「よし、できたぞ。なかなかうまくできたと思う」"

[[dialogue]]
speaker = "ジグ"
# 「こっちもできたよ。私が作ったのはシュニッツェルだ」
line = "「こっちもできたよ。私が作ったのはシュニッツェルだ」"

[[dialogue]]
speaker = "アポロ"
# 「へぇ、これがシュニッツェルか。薄いトンカツみたいだな。んじゃ……いただきまーす！」
line = "「へぇ、これがシュニッツェルか。薄いトンカツみたいだな。んじゃ……いただきまーす！」"

[[dialogue]]
speaker = "unk"
# シュニッツェル美味しい！
line = "シュニッツェル美味しい！"

[[dialogue]]
speaker = "アポロ"
# 「だな！　特にキノコのソースがサクサクの肉とよく合ってる！」
line = "「だな！　特にキノコのソースがサクサクの肉とよく合ってる！」"

[[dialogue]]
speaker = "ジグ"
# 「シュニッツェルにキノコのソースをかけたものを、イェーガーシュニッツェルというんだ」
line = "「シュニッツェルにキノコのソースをかけたものを、イェーガーシュニッツェルというんだ」"

[[dialogue]]
speaker = "ジグ"
# 「イェーガーとは狩人のこと。狩人は山に入ることが多いから、キノコを使うことで、狩人風のシュニッツェルになるというわけだね」
line = "「イェーガーとは狩人のこと。狩人は山に入ることが多いから、キノコを使うことで、狩人風のシュニッツェルになるというわけだね」"

[[dialogue]]
speaker = "unk"
# へぇ、勉強になった
line = "へぇ、勉強になった"

[[dialogue]]
speaker = "梨緒"
# 「わ、私のローストビーフはどうだ……？」
line = "「わ、私のローストビーフはどうだ……？」"

[[dialogue]]
speaker = "アポロ"
# 「うまいのはうまいんだけど……キリカのローストビーフの味を知ってると、惜しいところが目立つんだよな……」
line = "「うまいのはうまいんだけど……キリカのローストビーフの味を知ってると、惜しいところが目立つんだよな……」"

[[dialogue]]
speaker = "梨緒"
# 「なにっ、キリカさんのレシピを使ったのが裏目に出たのか……！？　ベアトとナターシャはどう感じた……？」
line = "「なにっ、キリカさんのレシピを使ったのが裏目に出たのか……！？　ベアトとナターシャはどう感じた……？」"

[[dialogue]]
speaker = "ナターシャ"
# 「私は美味しいって思うことほとんどないからなー。でもしいて言うなら、ジグの方が完成度は上な気がする」
line = "「私は美味しいって思うことほとんどないからなー。でもしいて言うなら、ジグの方が完成度は上な気がする」"

[[dialogue]]
speaker = "ベアトリス"
# 「ごめん、梨緒ちゃん。どっちも美味しいけど、ジグさんのシュニッツェルの方が好きかも……。あとニンニク欲しい」
line = "「ごめん、梨緒ちゃん。どっちも美味しいけど、ジグさんのシュニッツェルの方が好きかも……。あとニンニク欲しい」"

[[dialogue]]
speaker = "梨緒"
# 「くぅぅ～～～～～っ！　ま、負けた……。あとベアトは何にでもニンニクを入れようとするのは直した方がいいと思うぞ」
line = "「くぅぅ～～～～～っ！　ま、負けた……。あとベアトは何にでもニンニクを入れようとするのは直した方がいいと思うぞ」"

[[dialogue]]
speaker = "梨緒"
# 「しかしジグの料理はそんなに美味しいのか……？　私もいただこう」
line = "「しかしジグの料理はそんなに美味しいのか……？　私もいただこう」"

[[dialogue]]
speaker = "梨緒"
# 「あむ……──ッ！　くっ……確かに美味しい……私の完敗だ……」
line = "「あむ……──ッ！　くっ……確かに美味しい……私の完敗だ……」"

[[dialogue]]
speaker = "ジグ"
# 「ははは、これでまた私の勝ちだね」
line = "「ははは、これでまた私の勝ちだね」"

[[dialogue]]
speaker = "ナターシャ"
# 「ジグがそんなに料理できるようには見えないけど、これも星眼の力？」
line = "「ジグがそんなに料理できるようには見えないけど、これも星眼の力？」"

[[dialogue]]
speaker = "ジグ"
# 「まぁね。食材をこの眼で見ると、最適な調理法も見えるんだ」
line = "「まぁね。食材をこの眼で見ると、最適な調理法も見えるんだ」"

[[dialogue]]
speaker = "ベアトリス"
# 「すごい！　その力があれば私も料理上手になれるかも……」
line = "「すごい！　その力があれば私も料理上手になれるかも……」"

[[dialogue]]
speaker = "ジグ"
# 「まぁ、この眼がなくてもアガサに負ける気はしないけど。実際、アガサとの勝負で星眼を使ったことはほとんどなかったし」
line = "「まぁ、この眼がなくてもアガサに負ける気はしないけど。実際、アガサとの勝負で星眼を使ったことはほとんどなかったし」"

[[dialogue]]
speaker = "梨緒"
# 「ぐ……ぐぬぬぬ……次は勝つ！」
line = "「ぐ……ぐぬぬぬ……次は勝つ！」"

[[dialogue]]
speaker = "ジグ"
# 「ああ、再挑戦を待ってるよ」
line = "「ああ、再挑戦を待ってるよ」"

[[dialogue]]
speaker = "ジグ"
# 「そうだ。魔王に聞きたいんだけど、美少女２人の手料理を食べた気分はどうだい？」
line = "「そうだ。魔王に聞きたいんだけど、美少女２人の手料理を食べた気分はどうだい？」"

[[dialogue]]
speaker = "unk"
# 自分で美少女って言った！？
line = "自分で美少女って言った！？"

[[dialogue]]
speaker = "ジグ"
# 「事実なんだから問題ないだろう？」
line = "「事実なんだから問題ないだろう？」"

[[dialogue]]
speaker = "ジグ"
# 「で、どう思ったんだい？　男の子としてはときめくところなのかな？　身近に同年代の異性がいなかったから、そういった機微がよくわからなくてね」
line = "「で、どう思ったんだい？　男の子としてはときめくところなのかな？　身近に同年代の異性がいなかったから、そういった機微がよくわからなくてね」"

[[dialogue]]
speaker = "梨緒"
# 「こら、からかうな。魔王が困っているだろう」
line = "「こら、からかうな。魔王が困っているだろう」"

[[dialogue]]
speaker = "ジグ"
# 「ふふ、失礼。リクリエの使徒から解放されて浮かれていたみたいだ」
line = "「ふふ、失礼。リクリエの使徒から解放されて浮かれていたみたいだ」"

[[dialogue]]
speaker = "ジグ"
# 「だけどアガサとまた料理勝負をする時は、魔王も食べに来るといいよ。腕によりをかけて作るからさ」
line = "「だけどアガサとまた料理勝負をする時は、魔王も食べに来るといいよ。腕によりをかけて作るからさ」"
