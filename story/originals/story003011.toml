[[dialogue]]
speaker = "unk"
# クリスマスパーティーも終盤にさしかかり、ビンゴ大会が賑やかに行われていた。
line = "クリスマスパーティーも終盤にさしかかり、ビンゴ大会が賑やかに行われていた。"

[[dialogue]]
speaker = "フェニエル"
# 「つ、次の番号は３７ですっ。ビンゴの方、いませんかー？」
line = "「つ、次の番号は３７ですっ。ビンゴの方、いませんかー？」"

[[dialogue]]
speaker = "アニュラス"
# 「…………っっ！？」
line = "「…………っっ！？」"

[[dialogue]]
speaker = "舞亜"
# 「アニュラス？　もしかしてビンゴだったの？」
line = "「アニュラス？　もしかしてビンゴだったの？」"

[[dialogue]]
speaker = "アニュラス"
# 「いや……」
line = "「いや……」"

[[dialogue]]
speaker = "舞亜"
# 「ちょっと貸して。あ、やっぱりビンゴだ！」
line = "「ちょっと貸して。あ、やっぱりビンゴだ！」"

[[dialogue]]
speaker = "舞亜"
# 「おーい、こっちビンゴ！　アニュラスがビンゴだからーっ！」
line = "「おーい、こっちビンゴ！　アニュラスがビンゴだからーっ！」"

[[dialogue]]
speaker = "フェニエル"
# 「わぁ、初ビンゴですね！　お、おめでとうございますっ。ビンゴの方はこちらに来て下さい」
line = "「わぁ、初ビンゴですね！　お、おめでとうございますっ。ビンゴの方はこちらに来て下さい」"

[[dialogue]]
speaker = "unk"
# 早く景品もらいに行かないと
line = "早く景品もらいに行かないと"

[[dialogue]]
speaker = "unk"
# 行かないの？
line = "行かないの？"

[[dialogue]]
speaker = "アニュラス"
# 「いや、私はいい。今回は主催側だからな。ゲストを前にして私がプレゼントをもらうわけにはいかないだろう」
line = "「いや、私はいい。今回は主催側だからな。ゲストを前にして私がプレゼントをもらうわけにはいかないだろう」"

[[dialogue]]
speaker = "舞亜"
# 「言いたいことはわかるよ。でも貰いに行って」
line = "「言いたいことはわかるよ。でも貰いに行って」"

[[dialogue]]
speaker = "アニュラス"
# 「私が辞退すれば、もらえる人が増える。その方がみんな幸せになるはずだ」
line = "「私が辞退すれば、もらえる人が増える。その方がみんな幸せになるはずだ」"

[[dialogue]]
speaker = "舞亜"
# 「それは違うよ」
line = "「それは違うよ」"

[[dialogue]]
speaker = "unk"
# 俺も舞亜と同じ意見だよ
line = "俺も舞亜と同じ意見だよ"

[[dialogue]]
speaker = "unk"
# うん、違うね
line = "うん、違うね"

[[dialogue]]
speaker = "舞亜"
# 「みんなの中に、アニュラスも入ってるんだから。そんなムスッとした顔で終わらせるなんて私が嫌なの」
line = "「みんなの中に、アニュラスも入ってるんだから。そんなムスッとした顔で終わらせるなんて私が嫌なの」"

[[dialogue]]
speaker = "アニュラス"
# 「舞亜……」
line = "「舞亜……」"

[[dialogue]]
speaker = "舞亜"
# 「いいから行って。ほら、行かないなら無理矢理背中を押すよ？」
line = "「いいから行って。ほら、行かないなら無理矢理背中を押すよ？」"

[[dialogue]]
speaker = "アニュラス"
# 「わ、わかった！　行く！　行くからグリグリするなっ」
line = "「わ、わかった！　行く！　行くからグリグリするなっ」"

[[dialogue]]
speaker = "フェニエル"
# 「ビンゴおめでとうございます！　えっと、プレゼントをこちらから選べますが、どれにしますか？」
line = "「ビンゴおめでとうございます！　えっと、プレゼントをこちらから選べますが、どれにしますか？」"

[[dialogue]]
speaker = "アニュラス"
# 「む……うむむ……そ、そうだな……最も金銭的な価値がないものを頼む……」
line = "「む……うむむ……そ、そうだな……最も金銭的な価値がないものを頼む……」"

[[dialogue]]
speaker = "フェニエル"
# 「ここまで来て遠慮しなくても、とは思うのですが……」
line = "「ここまで来て遠慮しなくても、とは思うのですが……」"

[[dialogue]]
speaker = "フェニエル"
# 「金銭的な価値がないものであれば、これはもしかすると全てのプレゼントの中で最も価値があるものかもしれないですよ？」
line = "「金銭的な価値がないものであれば、これはもしかすると全てのプレゼントの中で最も価値があるものかもしれないですよ？」"

[[dialogue]]
speaker = "アニュラス"
# 「なに……？」
line = "「なに……？」"

[[dialogue]]
speaker = "フェニエル"
# 「ということで、アニュラスさんには新星学園の星徒会長さんから、お姫さまだっこの権利を進呈します」
line = "「ということで、アニュラスさんには新星学園の星徒会長さんから、お姫さまだっこの権利を進呈します」"

[[dialogue]]
speaker = "アニュラス"
# 「……は？　なんだそれは？　いや、聞いてないぞ！」
line = "「……は？　なんだそれは？　いや、聞いてないぞ！」"

[[dialogue]]
speaker = "unk"
# 誰の仕業だ？
line = "誰の仕業だ？"

[[dialogue]]
speaker = "unk"
# 俺も聞いてないんだけど
line = "俺も聞いてないんだけど"

[[dialogue]]
speaker = "フェニエル"
# 「匿名希望、となってますね……ちなみにキャンセルはＮＧだそうです」
line = "「匿名希望、となってますね……ちなみにキャンセルはＮＧだそうです」"

[[dialogue]]
speaker = "フェニエル"
# 「では会長さん、おねがいしてもいいですか？」
line = "「では会長さん、おねがいしてもいいですか？」"

[[dialogue]]
speaker = "unk"
# それじゃ行くよ、アニュラス
line = "それじゃ行くよ、アニュラス"

[[dialogue]]
speaker = "unk"
# 仕方ないか
line = "仕方ないか"

[[dialogue]]
speaker = "アニュラス"
# 「ま、待ってくれ。あらかじめ警告しておくが、私は重いぞ？」
line = "「ま、待ってくれ。あらかじめ警告しておくが、私は重いぞ？」"

[[dialogue]]
speaker = "アニュラス"
# 「いや、あくまで比較の話だ。そこまで重いわけではないんだが……おい、会長！　ちょっと待って！　早まるんじゃない！」
line = "「いや、あくまで比較の話だ。そこまで重いわけではないんだが……おい、会長！　ちょっと待って！　早まるんじゃない！」"

[[dialogue]]
speaker = "アニュラス"
# 「うわぁぁ～～～～っ！　なんだこれはっ！　屈辱すぎるぞ～～～っ！！」
line = "「うわぁぁ～～～～っ！　なんだこれはっ！　屈辱すぎるぞ～～～っ！！」"

[[dialogue]]
speaker = "アポロ"
# 「あー、楽しかった！　こんなに楽しかったのは久し振りかもな！」
line = "「あー、楽しかった！　こんなに楽しかったのは久し振りかもな！」"

[[dialogue]]
speaker = "unk"
# やがてクリスマスパーティーも幕を下ろし、実行委員のみんなで外の空気を吸いに出た。
line = "やがてクリスマスパーティーも幕を下ろし、実行委員のみんなで外の空気を吸いに出た。"

[[dialogue]]
speaker = "舞亜"
# 「さすがに疲れたね。今夜はぐっすり眠れそう」
line = "「さすがに疲れたね。今夜はぐっすり眠れそう」"

[[dialogue]]
speaker = "アポロ"
# 「あたしは逆に興奮して眠れないぞ！」
line = "「あたしは逆に興奮して眠れないぞ！」"

[[dialogue]]
speaker = "舞亜"
# 「って言いながら、横になったら一瞬で寝ちゃうんだろうね」
line = "「って言いながら、横になったら一瞬で寝ちゃうんだろうね」"

[[dialogue]]
speaker = "アポロ"
