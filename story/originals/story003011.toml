line = "「え……アポロちゃん？」"

[[dialogue]]
speaker = "アニュラス"
# 「いや、いいんだ。今更隠すことでもないしな。それに２人のことは大切な仲間だと思っている。だから何でも話したい」
line = "「いや、いいんだ。今更隠すことでもないしな。それに２人のことは大切な仲間だと思っている。だから何でも話したい」"

[[dialogue]]
speaker = "アニュラス"
# 「確かに私は、心に傷を受けていた。眠れぬ夜も幾度となくあった。でも、それは決して恥じることではないと、今なら言える」
line = "「確かに私は、心に傷を受けていた。眠れぬ夜も幾度となくあった。でも、それは決して恥じることではないと、今なら言える」"

[[dialogue]]
speaker = "アニュラス"
# 「すべてはアニュラス・セイファートを形作っているものだから。それをなかったことにしてしまったら、私は私でなくなってしまう」
line = "「すべてはアニュラス・セイファートを形作っているものだから。それをなかったことにしてしまったら、私は私でなくなってしまう」"

[[dialogue]]
