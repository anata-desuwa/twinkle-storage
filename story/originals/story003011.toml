line = "「なんとなくね。そんな感じするし」"

[[dialogue]]
speaker = "アポロ"
# 「ううっ、夜になるとすぐ眠たくなってしまうこの体が憎いぞ……」
line = "「ううっ、夜になるとすぐ眠たくなってしまうこの体が憎いぞ……」"

[[dialogue]]
speaker = "アニュラス"
# 「健康な証拠だ。心に不調を来たしていると、なかなか快眠は難しいものだからな」
line = "「健康な証拠だ。心に不調を来たしていると、なかなか快眠は難しいものだからな」"

[[dialogue]]
speaker = "アポロ"
