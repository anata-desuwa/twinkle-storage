line = "「それを嫌だ、と思う程度には……今の自分を気に入っているみたいだしな」"

[[dialogue]]
speaker = "アポロ"
# 「……そっか。なら、アニュラスは健康だな。怪人に堕ちることもないぞ！　このあたしが保証する！」
line = "「……そっか。なら、アニュラスは健康だな。怪人に堕ちることもないぞ！　このあたしが保証する！」"

