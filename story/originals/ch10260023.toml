[[dialogue]]
speaker = "unk"
# 第３話,後輩彼女はじゃれ合いたい,P
line = "第３話,後輩彼女はじゃれ合いたい,P"

[[dialogue]]
speaker = "unk"
# とある休日。リーリアが俺の家に遊びに来ていたのだが――
line = "とある休日。リーリアが俺の家に遊びに来ていたのだが――"

[[dialogue]]
speaker = "リーリア"
# 「センパイはもっと、私のこと雑に扱って下さい！」
line = "「センパイはもっと、私のこと雑に扱って下さい！」"

[[dialogue]]
speaker = "unk"
# いきなりどういうこと！？
line = "いきなりどういうこと！？"

[[dialogue]]
speaker = "リーリア"
# 「私、気づいたんです。最近のセンパイ……私のことを全然イジってくれないじゃないですか！」
line = "「私、気づいたんです。最近のセンパイ……私のことを全然イジってくれないじゃないですか！」"

[[dialogue]]
speaker = "リーリア"
# 「２度目の告白する前はもっと、私が構ってアピールしたら、適当にあしらったり、可愛いアピールしたら容赦ない毒舌ツッコミを入れるのが定番だったのに！」
line = "「２度目の告白する前はもっと、私が構ってアピールしたら、適当にあしらったり、可愛いアピールしたら容赦ない毒舌ツッコミを入れるのが定番だったのに！」"

[[dialogue]]
speaker = "unk"
# 今は前よりも距離感が近くなったし
line = "今は前よりも距離感が近くなったし"

[[dialogue]]
speaker = "unk"
# いや、それは……
line = "いや、それは……"

[[dialogue]]
speaker = "リーリア"
# 「そう、それです！　確かに私は、センパイに好きって思ったら、素直に口にするようになりました！」
line = "「そう、それです！　確かに私は、センパイに好きって思ったら、素直に口にするようになりました！」"

[[dialogue]]
speaker = "リーリア"
# 「ですが！　私としては、前のイジりイジられる関係も楽しかったっていうか……」
line = "「ですが！　私としては、前のイジりイジられる関係も楽しかったっていうか……」"

[[dialogue]]
speaker = "リーリア"
# 「それに、距離感が近くなったはずなのに、センパイ、２度目の告白以降、私に全然キスしてくれないじゃないですか！」
line = "「それに、距離感が近くなったはずなのに、センパイ、２度目の告白以降、私に全然キスしてくれないじゃないですか！」"

[[dialogue]]
speaker = "unk"
# う……それは……
line = "う……それは……"

[[dialogue]]
speaker = "リーリア"
# 「私がセンパイに秘密を作らないようにしてるんですから、センパイも秘密にしないで、ちゃんと言って下さい！」
line = "「私がセンパイに秘密を作らないようにしてるんですから、センパイも秘密にしないで、ちゃんと言って下さい！」"

[[dialogue]]
speaker = "unk"
# 観念した俺は、リーリアに事情を話すことにした。
line = "観念した俺は、リーリアに事情を話すことにした。"

[[dialogue]]
speaker = "リーリア"
# 「――なるほど。キスできなかったのは、センパイが私のことをもっと大切にしたいと思っているからだと……つまり――」
line = "「――なるほど。キスできなかったのは、センパイが私のことをもっと大切にしたいと思っているからだと……つまり――」"

[[dialogue]]
speaker = "リーリア"
# 「私が可愛すぎる故に、センパイが惚れ直しちゃったってことですね♪」
line = "「私が可愛すぎる故に、センパイが惚れ直しちゃったってことですね♪」"

[[dialogue]]
speaker = "unk"
# 仰る通りです
line = "仰る通りです"

[[dialogue]]
speaker = "リーリア"
# 「いや、そこは前みたいな、『はいはい、そうだね、可愛いねー』って雑なツッコミをして欲しかったんですけど！」
line = "「いや、そこは前みたいな、『はいはい、そうだね、可愛いねー』って雑なツッコミをして欲しかったんですけど！」"

[[dialogue]]
speaker = "リーリア"
# 「……そんなに素直に頷かれてしまうと、むしろリアクションに困るというか……寂しいというか……」
line = "「……そんなに素直に頷かれてしまうと、むしろリアクションに困るというか……寂しいというか……」"

[[dialogue]]
speaker = "リーリア"
# 「う～ん……やっぱりここは１つ、テコ入れをすべきですね」
line = "「う～ん……やっぱりここは１つ、テコ入れをすべきですね」"

[[dialogue]]
speaker = "unk"
# 彼女はしばし考えるような顔をして――
line = "彼女はしばし考えるような顔をして――"

[[dialogue]]
speaker = "リーリア"
# 「よし！　じゃあ、こうしましょう。え～いっ☆」
line = "「よし！　じゃあ、こうしましょう。え～いっ☆」"

[[dialogue]]
speaker = "unk"
# うわっ！？　リーリア、一体何を……！？
line = "うわっ！？　リーリア、一体何を……！？"

[[dialogue]]
speaker = "unk"
# 俺は彼女と並んでソファーに座っていたのだが、彼女から押し倒されてしまう。
line = "俺は彼女と並んでソファーに座っていたのだが、彼女から押し倒されてしまう。"

[[dialogue]]
speaker = "リーリア"
# 「センパイ、私……今からセンパイを襲っちゃいます<emoji=heart04>」
line = "「センパイ、私……今からセンパイを襲っちゃいます<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
# 「なので、嫌な時は嫌だって、ちゃんと言って下さいね？　そうしたら、すぐに止めますから」
line = "「なので、嫌な時は嫌だって、ちゃんと言って下さいね？　そうしたら、すぐに止めますから」"

[[dialogue]]
speaker = "リーリア"
# 「セ～ンパイ<emoji=heart04>　大好きです……ちゅっ……ちゅっ……<emoji=heart04>」
line = "「セ～ンパイ<emoji=heart04>　大好きです……ちゅっ……ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# リーリアは頬っぺたにキスをしてくる。
line = "リーリアは頬っぺたにキスをしてくる。"

[[dialogue]]
speaker = "リーリア"
# 「次は首筋に行っちゃいますよ～……ん～……ちゅっ<emoji=heart04>」
line = "「次は首筋に行っちゃいますよ～……ん～……ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
# 「好き……ちゅっ……<emoji=heart04>」
line = "「好き……ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そんな風に繰り返され続けて、俺は我慢できず――
line = "そんな風に繰り返され続けて、俺は我慢できず――"

[[dialogue]]
speaker = "unk"
# っ……リーリア！
line = "っ……リーリア！"

[[dialogue]]
speaker = "リーリア"
# 「きゃっ！　あっ……センパイ<emoji=heart04>　んっ……<emoji=heart04>」
line = "「きゃっ！　あっ……センパイ<emoji=heart04>　んっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺は起き上がると、今度は彼女を押し倒して、唇を奪う。
line = "俺は起き上がると、今度は彼女を押し倒して、唇を奪う。"

[[dialogue]]
speaker = "リーリア"
# 「んむっ……ちゅっ……<emoji=heart04>　ちゅっ……<emoji=heart04>」
line = "「んむっ……ちゅっ……<emoji=heart04>　ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
# 「んっ……ぷはぁ……！　ふぅ……はあぁ……<emoji=heart04>　やっと、キスしてくれましたね……センパイ……<emoji=heart04>」
line = "「んっ……ぷはぁ……！　ふぅ……はあぁ……<emoji=heart04>　やっと、キスしてくれましたね……センパイ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ごめん……俺……
line = "ごめん……俺……"

[[dialogue]]
speaker = "リーリア"
# 「謝らなくて大丈夫ですよ。私……センパイが思っているよりもずっと、センパイのこと、大好きですから」
line = "「謝らなくて大丈夫ですよ。私……センパイが思っているよりもずっと、センパイのこと、大好きですから」"

[[dialogue]]
speaker = "リーリア"
# 「センパイが紳士的に、私を大切にしようとしてくれるのは嬉しいですけど……私はもっと、センパイとじゃれ合いたいです」
line = "「センパイが紳士的に、私を大切にしようとしてくれるのは嬉しいですけど……私はもっと、センパイとじゃれ合いたいです」"

[[dialogue]]
speaker = "unk"
# じゃれ合う……？
line = "じゃれ合う……？"

[[dialogue]]
speaker = "リーリア"
# 「そうです。今みたいにキスして欲しいから、わざと唇以外にキスして挑発してみたり……そういうじゃれ合いです」
line = "「そうです。今みたいにキスして欲しいから、わざと唇以外にキスして挑発してみたり……そういうじゃれ合いです」"

[[dialogue]]
speaker = "リーリア"
# 「時には、じゃれ合いの加減に失敗して、喧嘩してしまうこともあるかもしれません。でも、その時はまた、話し合えばいいんです」
line = "「時には、じゃれ合いの加減に失敗して、喧嘩してしまうこともあるかもしれません。でも、その時はまた、話し合えばいいんです」"

[[dialogue]]
speaker = "リーリア"
# 「もう少しこうして欲しいって、素直に気持ちを伝えれば、きっと仲直りできます。だって――私たち、お互い好き同士なんですから♪」
line = "「もう少しこうして欲しいって、素直に気持ちを伝えれば、きっと仲直りできます。だって――私たち、お互い好き同士なんですから♪」"

[[dialogue]]
speaker = "リーリア"
# 「あと……今みたいに強引に押し倒されちゃう感じも、正直に言うと、嫌じゃないっていうか……むしろ、ドキドキしちゃいますし……<emoji=heart04>」
line = "「あと……今みたいに強引に押し倒されちゃう感じも、正直に言うと、嫌じゃないっていうか……むしろ、ドキドキしちゃいますし……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
# 「だから、もっと……センパイの『好き』を、私に教えて欲しいです<emoji=heart04>」
line = "「だから、もっと……センパイの『好き』を、私に教えて欲しいです<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そう言って、包み込むように優しく笑うリーリア。俺はそんな彼女が、すごく愛おしくなって――
line = "そう言って、包み込むように優しく笑うリーリア。俺はそんな彼女が、すごく愛おしくなって――"

[[dialogue]]
speaker = "リーリア"
# 「あ……<emoji=heart04>　センパイ……力強く抱き締めるの、ドキドキしちゃいます……<emoji=heart04>」
line = "「あ……<emoji=heart04>　センパイ……力強く抱き締めるの、ドキドキしちゃいます……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# リーリア、愛してる
line = "リーリア、愛してる"

[[dialogue]]
speaker = "リーリア"
# 「ん……<emoji=heart04>　私も愛してます……<emoji=heart04>　センパイ……<emoji=heart04>」
line = "「ん……<emoji=heart04>　私も愛してます……<emoji=heart04>　センパイ……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
# 「ちゅっ……<emoji=heart04>」
line = "「ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# その日、俺は数え切れないくらい、彼女への好きを伝えるのだった――
line = "その日、俺は数え切れないくらい、彼女への好きを伝えるのだった――"
