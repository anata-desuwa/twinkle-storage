line = "「お、お邪魔しま～す……」"

[[dialogue]]
speaker = "トワ先生"
# 「わぁぁ～～。会長くんのお家、久しぶりに来ちゃったなぁ。……あっ、これ手土産です。お母さんと一緒に食べてね！」
line = "「わぁぁ～～。会長くんのお家、久しぶりに来ちゃったなぁ。……あっ、これ手土産です。お母さんと一緒に食べてね！」"

[[dialogue]]
speaker = "unk"
# ちょっと高級なクッキーが入った紙袋を渡すと、会長くんは「ありがとうございます」と言って受け取ってくれた。
line = "ちょっと高級なクッキーが入った紙袋を渡すと、会長くんは「ありがとうございます」と言って受け取ってくれた。"

[[dialogue]]
speaker = "unk"
# ちなみに母さんは出張中で数日は留守です
line = "ちなみに母さんは出張中で数日は留守です"

[[dialogue]]
speaker = "トワ先生"
# 「あ、あははっ。そうなんだぁ～。というかわたし、そんなにキョロキョロしてたかな……？」
line = "「あ、あははっ。そうなんだぁ～。というかわたし、そんなにキョロキョロしてたかな……？」"

[[dialogue]]
speaker = "トワ先生"
# 「うぐぅ、そりゃあ付き合ってる教え子の家に遊びに行くってなったら、お母さんになんて挨拶……というか、なんて名乗るべきか、悩んじゃうに決まってるよ！」
line = "「うぐぅ、そりゃあ付き合ってる教え子の家に遊びに行くってなったら、お母さんになんて挨拶……というか、なんて名乗るべきか、悩んじゃうに決まってるよ！」"

[[dialogue]]
speaker = "トワ先生"
# 「えっ？　母さんが出張で留守なのは事前に説明してた？　はわわっ、わたしがお家デートに舞い上がって、聞いてなかっただけ……？」
line = "「えっ？　母さんが出張で留守なのは事前に説明してた？　はわわっ、わたしがお家デートに舞い上がって、聞いてなかっただけ……？」"

[[dialogue]]
speaker = "トワ先生"
# 「そ、それもそっか……お母さんの目があったら、せっかくのお家デートなのに、イチャイチャできないもんね」
line = "「そ、それもそっか……お母さんの目があったら、せっかくのお家デートなのに、イチャイチャできないもんね」"

[[dialogue]]
speaker = "トワ先生"
# 「って、何言ってるんだろうね、わたし！　別にイチャイチャするのが目的でお家デートってわけでもないよねっ。あはは、あはははぁ～！」
line = "「って、何言ってるんだろうね、わたし！　別にイチャイチャするのが目的でお家デートってわけでもないよねっ。あはは、あはははぁ～！」"

[[dialogue]]
speaker = "unk"
# 俺はいつだってもっとイチャイチャしたいよ
line = "俺はいつだってもっとイチャイチャしたいよ"

[[dialogue]]
speaker = "unk"
# トワちゃんが嫌じゃなければ
line = "トワちゃんが嫌じゃなければ"

[[dialogue]]
speaker = "トワ先生"
# （あわわわわわっ！？　いつになく会長くんが積極的だ……！　こ、これがお家デートの効果ってやつなのかなっ）
line = "（あわわわわわっ！？　いつになく会長くんが積極的だ……！　こ、これがお家デートの効果ってやつなのかなっ）"

[[dialogue]]
speaker = "トワ先生"
# （でもでも！　いきなりはダメだよっ！　だってわたしの心の準備ができてないしっ）
line = "（でもでも！　いきなりはダメだよっ！　だってわたしの心の準備ができてないしっ）"

[[dialogue]]
speaker = "トワ先生"
# 「そ、そう言ってもらえるのは嬉しいけどぉ！　真昼間から恋人同士がただ見つめ合ってるだけっていうのも、先生は不健全だと思うな……！」
line = "「そ、そう言ってもらえるのは嬉しいけどぉ！　真昼間から恋人同士がただ見つめ合ってるだけっていうのも、先生は不健全だと思うな……！」"

[[dialogue]]
speaker = "トワ先生"
# 「はいっ、というわけでお家デートの定番……じゃじゃ～ん、映画をレンタルしてきたよ！」
line = "「はいっ、というわけでお家デートの定番……じゃじゃ～ん、映画をレンタルしてきたよ！」"

[[dialogue]]
speaker = "トワ先生"
