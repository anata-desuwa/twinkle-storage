line = "（よ、よ～しっ。前回の映画館では周りに人もいたし、あの時はまだ初手繋ぎも済ませてなかったけど、今日のわたしはもうあの頃のわたしとは違うよ！）"

[[dialogue]]
speaker = "トワ先生"
# （今日は何と言っても２人きり！　それに、この間のデートで手も繋いじゃったわけで、もう何も怖くないよ……！）
line = "（今日は何と言っても２人きり！　それに、この間のデートで手も繋いじゃったわけで、もう何も怖くないよ……！）"

[[dialogue]]
