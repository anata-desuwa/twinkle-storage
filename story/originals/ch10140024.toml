line = "「この間のデートの恋愛映画が良かったから、友達にオススメを聞いて借りてきちゃった」"

[[dialogue]]
speaker = "トワ先生"
# 「うんっ。映画自体も良かったし、観終わった後で会長くんと作品の感想を語りあえたのが、すっごく楽しかったんだぁ。だから今日もできたらいいなって」
line = "「うんっ。映画自体も良かったし、観終わった後で会長くんと作品の感想を語りあえたのが、すっごく楽しかったんだぁ。だから今日もできたらいいなって」"

[[dialogue]]
speaker = "トワ先生"
# 「ほんと！？　会長くんも同じこと思っててくれたなら、嬉しいよぉ。じゃあ早速、再生機にセットして、２人で鑑賞会、しちゃおっか♪」
line = "「ほんと！？　会長くんも同じこと思っててくれたなら、嬉しいよぉ。じゃあ早速、再生機にセットして、２人で鑑賞会、しちゃおっか♪」"

[[dialogue]]
speaker = "unk"
# そしてリビングで映画を観始めて、３０分ほど経過して──
line = "そしてリビングで映画を観始めて、３０分ほど経過して──"

[[dialogue]]
