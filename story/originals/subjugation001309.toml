[[dialogue]]
speaker = "ユウリ"
# 「そらよ、イグニッションアサルト！」
line = "「そらよ、イグニッションアサルト！」"

[[dialogue]]
speaker = "セーラ"
# 「外さないよ……クライマックスボルト！」
line = "「外さないよ……クライマックスボルト！」"

[[dialogue]]
speaker = "ユウリ"
# 「倒しても倒してもモンスターが湧いてきやがる。空が黒くなってんの、あれ全部モンスターかよ」
line = "「倒しても倒してもモンスターが湧いてきやがる。空が黒くなってんの、あれ全部モンスターかよ」"

[[dialogue]]
speaker = "セーラ"
# 「うっひゃ～……一生分のモンスター見たかも。向こうもそんだけマジってことかな」
line = "「うっひゃ～……一生分のモンスター見たかも。向こうもそんだけマジってことかな」"

[[dialogue]]
speaker = "ウィステリア"
# 「ちょっと伏せてね。──シャドウメイルストラム！」
line = "「ちょっと伏せてね。──シャドウメイルストラム！」"

[[dialogue]]
speaker = "ウィステリア"
# 「ふぅ、肩慣らしにはなったかしら」
line = "「ふぅ、肩慣らしにはなったかしら」"

[[dialogue]]
speaker = "ユウリ"
# 「！？　モンスターがまとめて消えちまった……。なんだありゃ……てかあの人、新星学園の司書さんじゃなかったのかよ」
line = "「！？　モンスターがまとめて消えちまった……。なんだありゃ……てかあの人、新星学園の司書さんじゃなかったのかよ」"

[[dialogue]]
speaker = "セーラ"
# 「あ～、ユウリちゃんの学年は知らないか～。ウィステリアさん、<ruby=うち>流星学園</ruby>のＯＧで、“千年に一度の英雄”とか言われてて──」
line = "「あ～、ユウリちゃんの学年は知らないか～。ウィステリアさん、<ruby>流星学園<rt>うち</rt></ruby>のＯＧで、“千年に一度の英雄”とか言われてて──」"

[[dialogue]]
speaker = "ウィステリア"
# 「今、何か言った？」
line = "「今、何か言った？」"

[[dialogue]]
speaker = "セーラ"
# 「い～え、何も言ってないですよ」
line = "「い～え、何も言ってないですよ」"

[[dialogue]]
speaker = "ウィステリア"
# 「そうよね。千年に一度の英雄とか知らないわよね」
line = "「そうよね。千年に一度の英雄とか知らないわよね」"

[[dialogue]]
speaker = "ユウリ"
# 「めっちゃ聞こえてんじゃん」
line = "「めっちゃ聞こえてんじゃん」"

[[dialogue]]
speaker = "ウィステリア"
# 「だいたい、千年に一度の英雄とか誰が言ったのよ！　本当に千年生きてからそういう評価してほしいわ」
line = "「だいたい、千年に一度の英雄とか誰が言ったのよ！　本当に千年生きてからそういう評価してほしいわ」"

[[dialogue]]
speaker = "コハルコ"
# 『私もその気持ちわかるなぁ……。ジャスティスなんとかって聞くとつい反応しちゃうし……』
line = "『私もその気持ちわかるなぁ……。ジャスティスなんとかって聞くとつい反応しちゃうし……』"

[[dialogue]]
speaker = "セーラ"
# 「コハルコちゃーん、心の声漏れてるよー」
line = "「コハルコちゃーん、心の声漏れてるよー」"

[[dialogue]]
speaker = "コハルコ"
# 『ハッ！？　すみません！』
line = "『ハッ！？　すみません！』"

[[dialogue]]
speaker = "ウィステリア"
# 「今日はこれからロールケーキ買いに行くところだったのに、世界の危機とかで呼びつけられて、昔のあだ名を擦られて、踏んだり蹴ったりだわ！」
line = "「今日はこれからロールケーキ買いに行くところだったのに、世界の危機とかで呼びつけられて、昔のあだ名を擦られて、踏んだり蹴ったりだわ！」"

[[dialogue]]
speaker = "マリオン"
# 「相変わらずの不運ぶりですね、ウィステリアさん。でも実際、千年に一度の英雄と呼ばれるだけの力はあると思いますけどね」
line = "「相変わらずの不運ぶりですね、ウィステリアさん。でも実際、千年に一度の英雄と呼ばれるだけの力はあると思いますけどね」"

[[dialogue]]
speaker = "ウィステリア"
# 「……まさかあなたが魔女だったなんて驚きましたよ、メイド長。……いえ、今はキリカがメイド長だから、ただのマリオンさんですね」
line = "「……まさかあなたが魔女だったなんて驚きましたよ、メイド長。……いえ、今はキリカがメイド長だから、ただのマリオンさんですね」"

[[dialogue]]
speaker = "マリオン"
# 「驚いたのは<ruby=わたくし>私</ruby>の方ですよ。キリカさんがあなたを連れてきた時は冷や汗をかきました」
line = "「驚いたのは<ruby>私<rt>わたくし</rt></ruby>の方ですよ。キリカさんがあなたを連れてきた時は冷や汗をかきました」"

[[dialogue]]
speaker = "マリオン"
# 「魔界の<ruby=ふる>旧</ruby>き血を継ぐ者。星騎士でありながら、魔導書の呪いによって魔力も操る例外。魔女の中でもあれだけの魔力を扱える者はそういません」
line = "「魔界の<ruby>旧<rt>ふる</rt></ruby>き血を継ぐ者。星騎士でありながら、魔導書の呪いによって魔力も操る例外。魔女の中でもあれだけの魔力を扱える者はそういません」"

[[dialogue]]
speaker = "キリカ"
# 「マリオンさん。……いえ、マリオン」
line = "「マリオンさん。……いえ、マリオン」"

[[dialogue]]
speaker = "マリオン"
# 「おや。今にも<ruby=くび>縊</ruby>り殺さんとする殺気ですね」
line = "「おや。今にも<ruby>縊<rt>くび</rt></ruby>り殺さんとする殺気ですね」"

[[dialogue]]
speaker = "キリカ"
# 「やはりあなたは星見家とお嬢様を探っていたのですね。実害がなければ泳がせておこうかと思いましたが……上月キリカ、一生の不覚でした」
line = "「やはりあなたは星見家とお嬢様を探っていたのですね。実害がなければ泳がせておこうかと思いましたが……上月キリカ、一生の不覚でした」"

[[dialogue]]
speaker = "キリカ"
# 「お嬢様と星見家に害を為すなら……刺し違えてでも<ruby=ほふ>屠</ruby>ります」
line = "「お嬢様と星見家に害を為すなら……刺し違えてでも<ruby>屠<rt>ほふ</rt></ruby>ります」"

[[dialogue]]
speaker = "マリオン"
# 「ご心配には及びません。流星ライダー・アポロとの戦いの終結を以て、私が星見家に関わる理由はなくなりましたので」
line = "「ご心配には及びません。流星ライダー・アポロとの戦いの終結を以て、私が星見家に関わる理由はなくなりましたので」"

[[dialogue]]
speaker = "マリオン"
# 「ですが……いい気迫です。成長を感じます。やはりあなたがメイド長で正解でしたね」
line = "「ですが……いい気迫です。成長を感じます。やはりあなたがメイド長で正解でしたね」"

[[dialogue]]
speaker = "キリカ"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "エスメラルダ"
# 「あの～、そういうのは後にした方がいいんじゃないかしら？」
line = "「あの～、そういうのは後にした方がいいんじゃないかしら？」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「そうですよ～。今は世界の危機なんですから、仲良くしましょう。ね？」
line = "「そうですよ～。今は世界の危機なんですから、仲良くしましょう。ね？」"

[[dialogue]]
speaker = "キリカ"
# 「……ええ、時分をわきまえるべきでした。頭を冷やします」
line = "「……ええ、時分をわきまえるべきでした。頭を冷やします」"

[[dialogue]]
speaker = "マリオン"
# 「本当に嫌われましたね。自業自得ではありますが……その分働きで返すとしましょう！」
line = "「本当に嫌われましたね。自業自得ではありますが……その分働きで返すとしましょう！」"

[[dialogue]]
speaker = "ウィステリア"
# 「さて、それじゃ後輩のために露払いといくわよ。……キリカ」
line = "「さて、それじゃ後輩のために露払いといくわよ。……キリカ」"

[[dialogue]]
speaker = "キリカ"
# 「言われずともわかっています。近づくものは私が倒しますから、あなたは攻撃に集中してください」
line = "「言われずともわかっています。近づくものは私が倒しますから、あなたは攻撃に集中してください」"

[[dialogue]]
speaker = "エスメラルダ"
# 「相変わらず仲がいいのね～」
line = "「相変わらず仲がいいのね～」"

[[dialogue]]
speaker = "ウィステリア"
# 「よくないです！」
line = "「よくないです！」"

[[dialogue]]
speaker = "キリカ"
# 「エスメラルダ先輩と言えど心外です」
line = "「エスメラルダ先輩と言えど心外です」"

[[dialogue]]
speaker = "エスメラルダ"
# 「うふふふ♪　やっぱり仲いいじゃない。それじゃ私もサポートするわね。第五楽章──風花」
line = "「うふふふ♪　やっぱり仲いいじゃない。それじゃ私もサポートするわね。第五楽章──風花」"

[[dialogue]]
speaker = "キリカ"
# 「上月神闘流──<ruby=えんげつ>偃月</ruby>」
line = "「上月神闘流──<ruby>偃月<rt>えんげつ</rt></ruby>」"

[[dialogue]]
speaker = "ウィステリア"
# 「暗闇に飲まれなさい──ネイムレスグレイヴ！」
line = "「暗闇に飲まれなさい──ネイムレスグレイヴ！」"

[[dialogue]]
speaker = "セーラ"
# 「ひょえ～。なんかモンスターの方がかわいそうになってきたかも」
line = "「ひょえ～。なんかモンスターの方がかわいそうになってきたかも」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「ふふふ、とっても頼もしいです。今のうちに堕天使を倒しましょう」
line = "「ふふふ、とっても頼もしいです。今のうちに堕天使を倒しましょう」"

[[dialogue]]
speaker = "トワ先生"
# 「でもその前に体勢を整えないとね」
line = "「でもその前に体勢を整えないとね」"

[[dialogue]]
speaker = "セーラ"
# 「ヒールありがとうございますっ。そういえば、トワちゃん先生ってうちらの大先輩なんですよね？」
line = "「ヒールありがとうございますっ。そういえば、トワちゃん先生ってうちらの大先輩なんですよね？」"

[[dialogue]]
speaker = "トワ先生"
# 「大はつけなくていいよ！？　普通の先輩だよ！？」
line = "「大はつけなくていいよ！？　普通の先輩だよ！？」"

[[dialogue]]
speaker = "ユウリ"
# 「っと、危ねぇ！　敵の方からお出ましなすったな」
line = "「っと、危ねぇ！　敵の方からお出ましなすったな」"

[[dialogue]]
speaker = "ラクシャ"
# 「輪廻の円環も無に還る……」
line = "「輪廻の円環も無に還る……」"

[[dialogue]]
speaker = "トワ先生"
# 「環ちゃん、先生が今元に戻してあげるね」
line = "「環ちゃん、先生が今元に戻してあげるね」"

[[dialogue]]
speaker = "トワ先生"
# 「この戦い、負けられない……ノヴァフォーム！」
line = "「この戦い、負けられない……ノヴァフォーム！」"

[[dialogue]]
speaker = "トワ先生（覚醒）"
# 「ふふん。もう後ろから回復してるだけの私じゃないんだから！」
line = "「ふふん。もう後ろから回復してるだけの私じゃないんだから！」"

[[dialogue]]
speaker = "マリオン"
# 「あら、初めて見る姿ですね。かれこれ１０年以上の付き合いですのに」
line = "「あら、初めて見る姿ですね。かれこれ１０年以上の付き合いですのに」"

[[dialogue]]
speaker = "トワ先生（覚醒）"
# 「だから１０年以上とか言わなくていいってば！？」
line = "「だから１０年以上とか言わなくていいってば！？」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「ふふふ～、守護天使にとっては１０年も１００年も些細な年月ですよ～」
line = "「ふふふ～、守護天使にとっては１０年も１００年も些細な年月ですよ～」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「ですから先生だって魔女だって、ママダレナに甘えていいんですよ？」
line = "「ですから先生だって魔女だって、ママダレナに甘えていいんですよ？」"

[[dialogue]]
speaker = "トワ先生（覚醒）"
# 「ママ……ゴクリ……──ハッ！？　危ない、ちっちゃいのに大きな母性に呑まれるところだった！？」
line = "「ママ……ゴクリ……──ハッ！？　危ない、ちっちゃいのに大きな母性に呑まれるところだった！？」"

[[dialogue]]
speaker = "セーラ"
# 「あはははっ、甘えるのは戦いの後だね！」
line = "「あはははっ、甘えるのは戦いの後だね！」"

[[dialogue]]
speaker = "ユウリ"
# 「ここでしくじれば世界が終わる。負けられねえ！」
line = "「ここでしくじれば世界が終わる。負けられねえ！」"
