[[dialogue]]
speaker = "マリオン"
# 「トワ。今日この後、一緒に飲みに行きましょう」
line = "「トワ。今日この後、一緒に飲みに行きましょう」"

[[dialogue]]
speaker = "トワ先生"
# 「え……？」
line = "「え……？」"

[[dialogue]]
speaker = "unk"
# トワが声をかけられたのは、メイプルと面談をした翌日。勤務を終えて、家に帰ろうとした時のことだった。
line = "トワが声をかけられたのは、メイプルと面談をした翌日。勤務を終えて、家に帰ろうとした時のことだった。"

[[dialogue]]
speaker = "トワ先生"
# 「マリオン、こんなところで待ってたりして、どうしたの？」
line = "「マリオン、こんなところで待ってたりして、どうしたの？」"

[[dialogue]]
speaker = "unk"
# 彼女は星見家メイド隊の１人、マリオン・ネイマール。
line = "彼女は星見家メイド隊の１人、マリオン・ネイマール。"

[[dialogue]]
speaker = "unk"
# トワの友人で、かつて流星学園に通っていた際の元同級生である。
line = "トワの友人で、かつて流星学園に通っていた際の元同級生である。"

[[dialogue]]
speaker = "unk"
# そして当時、トワと共に流星星徒会に所属し、『ドールズマスター』と二つ名で最強無敗を誇った、元星徒会長の肩書きを持つ人物でもある。
line = "そして当時、トワと共に流星星徒会に所属し、『ドールズマスター』と二つ名で最強無敗を誇った、元星徒会長の肩書きを持つ人物でもある。"

[[dialogue]]
speaker = "マリオン"
# 「聞きました。居候のメイプル様との間でトラブルがあったのでしょう？」
line = "「聞きました。居候のメイプル様との間でトラブルがあったのでしょう？」"

[[dialogue]]
speaker = "トワ先生"
# 「どこでそれを……」
line = "「どこでそれを……」"

[[dialogue]]
speaker = "マリオン"
# 「会長様が、トワのことを心配して、私に相談して下さったんですよ」
line = "「会長様が、トワのことを心配して、私に相談して下さったんですよ」"

[[dialogue]]
speaker = "トワ先生"
# 「会長くんが……」
line = "「会長くんが……」"

[[dialogue]]
speaker = "unk"
# それからトワは、マリオンに連れられて、よく行く近所の飲み屋に入る。座敷で向かい合って、しばらく事情を話すと――
line = "それからトワは、マリオンに連れられて、よく行く近所の飲み屋に入る。座敷で向かい合って、しばらく事情を話すと――"

[[dialogue]]
speaker = "マリオン"
# 「――なるほど。それは確かに失言でしたね」
line = "「――なるほど。それは確かに失言でしたね」"

[[dialogue]]
speaker = "トワ先生"
# 「……うん。私は、メイプルちゃんの家庭事情を詳しく知っているわけじゃない。それに、メイプルちゃんの気持ちを軽々しく考えてしまった……」
line = "「……うん。私は、メイプルちゃんの家庭事情を詳しく知っているわけじゃない。それに、メイプルちゃんの気持ちを軽々しく考えてしまった……」"

[[dialogue]]
speaker = "トワ先生"
# 「そりゃあ、私の注意を聞いてくれるわけないよね。上辺だけの言葉なんだもん」
line = "「そりゃあ、私の注意を聞いてくれるわけないよね。上辺だけの言葉なんだもん」"

[[dialogue]]
speaker = "マリオン"
# 「トワは、彼女の夢に対しては、どう思っているんですか？　応援したくないのか、応援してあげたいのか」
line = "「トワは、彼女の夢に対しては、どう思っているんですか？　応援したくないのか、応援してあげたいのか」"

[[dialogue]]
speaker = "トワ先生"
# 「夢……メイプルちゃんが、魔王になりたいっていう話……？」
line = "「夢……メイプルちゃんが、魔王になりたいっていう話……？」"

[[dialogue]]
speaker = "マリオン"
# 「ええ、『夢』でしょう？　メイプル様にとっては、自身の追い求める理想――憧れの英雄なのですから」
line = "「ええ、『夢』でしょう？　メイプル様にとっては、自身の追い求める理想――憧れの英雄なのですから」"

[[dialogue]]
speaker = "トワ先生"
# 「……正直、魔王を目指すって夢は荒唐無稽だと思ってる」
line = "「……正直、魔王を目指すって夢は荒唐無稽だと思ってる」"

[[dialogue]]
speaker = "トワ先生"
# 「でも、それを本気で叶える為に、メイプルちゃんがここに来たんだってことはよくわかった」
line = "「でも、それを本気で叶える為に、メイプルちゃんがここに来たんだってことはよくわかった」"

[[dialogue]]
speaker = "トワ先生"
# 「その諦めないで夢を追う気持ちを、私は応援してあげたい」
line = "「その諦めないで夢を追う気持ちを、私は応援してあげたい」"

[[dialogue]]
speaker = "トワ先生"
# 「だけど先生として……彼女の背中を押すことが本当に正しいのか、わからない」
line = "「だけど先生として……彼女の背中を押すことが本当に正しいのか、わからない」"

[[dialogue]]
speaker = "トワ先生"
# 「だって、今のメイプルちゃんは……昔の――あの時の私と被るんだもん」
line = "「だって、今のメイプルちゃんは……昔の――あの時の私と被るんだもん」"

[[dialogue]]
speaker = "マリオン"
# 「なるほど。だから、学園に入学させることを躊躇っていたんですね」
line = "「なるほど。だから、学園に入学させることを躊躇っていたんですね」"

[[dialogue]]
speaker = "トワ先生"
# 「潜在能力は、すごいよ。クルセイダースの子孫だって言われて、納得しちゃった。現状でも、すぐプリマステラになれるだけの力がある」
line = "「潜在能力は、すごいよ。クルセイダースの子孫だって言われて、納得しちゃった。現状でも、すぐプリマステラになれるだけの力がある」"

[[dialogue]]
speaker = "トワ先生"
# 「だけど、心持ちが……危う過ぎる。メイプルちゃんを見ていて、よくわかったよ。あの時の自分が、マリオンたちからどう見えていたのか」
line = "「だけど、心持ちが……危う過ぎる。メイプルちゃんを見ていて、よくわかったよ。あの時の自分が、マリオンたちからどう見えていたのか」"

[[dialogue]]
speaker = "トワ先生"
# 「……マリオンだったら、きっと実力で言うことを聞かせるんだろうね。あの時みたいに」
line = "「……マリオンだったら、きっと実力で言うことを聞かせるんだろうね。あの時みたいに」"

[[dialogue]]
speaker = "トワ先生"
# 「自分に勝てたら好きにすればいい。でも自分が勝ったら、言うことをちゃんと聞くこと――ってさ」
line = "「自分に勝てたら好きにすればいい。でも自分が勝ったら、言うことをちゃんと聞くこと――ってさ」"

[[dialogue]]
speaker = "マリオン"
# 「そうでしたね。ただ――」
line = "「そうでしたね。ただ――」"

[[dialogue]]
speaker = "マリオン"
# 「仮に、トワが私と同じ力を持っていたとしても、そうはしないでしょう？」
line = "「仮に、トワが私と同じ力を持っていたとしても、そうはしないでしょう？」"

[[dialogue]]
speaker = "トワ先生"
# 「え……？」
line = "「え……？」"

[[dialogue]]
speaker = "マリオン"
# 「トワ、あなたは賢い。そして、心優しい」
line = "「トワ、あなたは賢い。そして、心優しい」"

[[dialogue]]
speaker = "マリオン"
# 「当時、人形のように無機質な性格だった私に、他人と関わる楽しさを、誰かを思いやる心を教えくれたのは、あなたです」
line = "「当時、人形のように無機質な性格だった私に、他人と関わる楽しさを、誰かを思いやる心を教えくれたのは、あなたです」"

[[dialogue]]
speaker = "マリオン"
# 「言うことを聞かせられるだけの力を本当は持っている。今はあの時よりも、更に強くなっていることでしょう」
line = "「言うことを聞かせられるだけの力を本当は持っている。今はあの時よりも、更に強くなっていることでしょう」"

[[dialogue]]
speaker = "マリオン"
# 「それでも力を使わないのは、私や周りを悲しませない為でしょう？」
line = "「それでも力を使わないのは、私や周りを悲しませない為でしょう？」"

[[dialogue]]
speaker = "トワ先生"
# 「……マリオン、もしかして気づいてたの？」
line = "「……マリオン、もしかして気づいてたの？」"

[[dialogue]]
speaker = "マリオン"
# 「気づきますよ。親友ですから。隠れながらも、いつかの為に星力制御の鍛練を欠かさず続けてきたのでしょう？」
line = "「気づきますよ。親友ですから。隠れながらも、いつかの為に星力制御の鍛練を欠かさず続けてきたのでしょう？」"

[[dialogue]]
speaker = "トワ先生"
# 「……ごめん、約束を破って」
line = "「……ごめん、約束を破って」"

[[dialogue]]
speaker = "マリオン"
# 「いいえ。私にも隠しごとはありますから。トワだって、気づいているでしょう？」
line = "「いいえ。私にも隠しごとはありますから。トワだって、気づいているでしょう？」"

[[dialogue]]
speaker = "トワ先生"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "マリオン"
# 「だから、おあいこです」
line = "「だから、おあいこです」"

[[dialogue]]
speaker = "トワ先生"
# 「……結局、私自身が半端なんだよね」
line = "「……結局、私自身が半端なんだよね」"

[[dialogue]]
speaker = "トワ先生"
# 「だから、メイプルちゃんにちゃんとした言葉を言えないんだ」
line = "「だから、メイプルちゃんにちゃんとした言葉を言えないんだ」"

[[dialogue]]
speaker = "トワ先生"
# 「私が、大人になりきれていないから」
line = "「私が、大人になりきれていないから」"

[[dialogue]]
speaker = "マリオン"
# 「みんな、そういうものですよ。矛盾を抱えながらも、大人になろうと、大人のフリをして。そうやって取捨選択しながら、大人になっていくんです」
line = "「みんな、そういうものですよ。矛盾を抱えながらも、大人になろうと、大人のフリをして。そうやって取捨選択しながら、大人になっていくんです」"

[[dialogue]]
speaker = "マリオン"
# 「だから、トワが今、なりたいと思う先生になればいいと、私は思います」
line = "「だから、トワが今、なりたいと思う先生になればいいと、私は思います」"

[[dialogue]]
speaker = "トワ先生"
# 「私がなりたいと思う先生……？」
line = "「私がなりたいと思う先生……？」"

[[dialogue]]
speaker = "マリオン"
# 「私は、トワに出会えたから、今の自分があるのだと思っています」
line = "「私は、トワに出会えたから、今の自分があるのだと思っています」"

[[dialogue]]
speaker = "マリオン"
# 「だから、自信を持って下さい。昔、星徒会のみんなとよく冗談で言ってましたけど――」
line = "「だから、自信を持って下さい。昔、星徒会のみんなとよく冗談で言ってましたけど――」"

[[dialogue]]
speaker = "マリオン"
# 「トワならいい先生になれるって、今は心から信じていますよ」
line = "「トワならいい先生になれるって、今は心から信じていますよ」"

[[dialogue]]
speaker = "unk"
# そう言って、親友は昔よりも柔らかな笑顔を浮かべるのだった。
line = "そう言って、親友は昔よりも柔らかな笑顔を浮かべるのだった。"
