[[dialogue]]
speaker = "ヘレナ"
# 「水着商品を展開するにおいて、様々なニーズに応えられるデザインを用意しておく必要がある。そのために、実際のビーチの様子を見に来ようと思ってな」
line = "「水着商品を展開するにおいて、様々なニーズに応えられるデザインを用意しておく必要がある。そのために、実際のビーチの様子を見に来ようと思ってな」"

[[dialogue]]
speaker = "ヘレナ"
# 「ここへ来れば若い女子の水着姿が拝み放題。フフ……参考にもしつつ、眼福にもなるというわけだ」
line = "「ここへ来れば若い女子の水着姿が拝み放題。フフ……参考にもしつつ、眼福にもなるというわけだ」"

