[[dialogue]]
speaker = "ヘレナ"
# 「無論、焼きそばくらい食べたことはある。だが──ヴィーナスいわく、海で食すそれはまた別物だという」
line = "「無論、焼きそばくらい食べたことはある。だが──ヴィーナスいわく、海で食すそれはまた別物だという」"

[[dialogue]]
speaker = "ヘレナ"
# 「そうした夏の粋もまた、肌で感じることが風流と言えよう。馴染みある食べ物であっても、また違った色合いを<ruby=かも>醸</ruby>すはずだ」
line = "「そうした夏の粋もまた、肌で感じることが風流と言えよう。馴染みある食べ物であっても、また違った色合いを<ruby>醸<rt>かも</rt></ruby>すはずだ」"

[[dialogue]]
speaker = "ヘレナ"
# 「縁側で聞く風鈴の<ruby=ね>音</ruby>や、蚊取り線香の匂いのように……その時にしか味わえないのが風物詩というものだ」
line = "「縁側で聞く風鈴の<ruby>音<rt>ね</rt></ruby>や、蚊取り線香の匂いのように……その時にしか味わえないのが風物詩というものだ」"

[[dialogue]]
speaker = "ヘレナ"
# 「というわけでこのヘレナ、ラムネに焼きそば、最後にかき氷イチゴ味をオーダーだっ！　共に<b>しぇあ</b>しようぞ、魔王♪」
line = "「というわけでこのヘレナ、ラムネに焼きそば、最後にかき氷イチゴ味をオーダーだっ！　共に<b>しぇあ</b>しようぞ、魔王♪」"

[[dialogue]]
speaker = "ヘレナ"
# 「ふう──なかなか悪くない体験であった。これで腹ごしらえも済んだというもの」
line = "「ふう──なかなか悪くない体験であった。これで腹ごしらえも済んだというもの」"

[[dialogue]]
speaker = "ヘレナ"
# 「ん？　本当は、泳いで疲れた後が一番おいしい……？　なるほど、そこまでは考慮していなかったな。まだ真の風流を理解したとは言えぬか」
line = "「ん？　本当は、泳いで疲れた後が一番おいしい……？　なるほど、そこまでは考慮していなかったな。まだ真の風流を理解したとは言えぬか」"

[[dialogue]]
speaker = "ヘレナ"
# 「だが、実のところ今日は泳ぎに来たのではない」
