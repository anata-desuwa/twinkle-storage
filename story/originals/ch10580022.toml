line = "「さっそくだが魔王よ。私はあの、海の家のフードが気になるぞ」"

[[dialogue]]
speaker = "ヘレナ"
# 「そうだ。焼きそばやら、かき氷やら……『ザ・夏の定番！』といったラインナップがいろいろ並んでいるだろう」
line = "「そうだ。焼きそばやら、かき氷やら……『ザ・夏の定番！』といったラインナップがいろいろ並んでいるだろう」"

[[dialogue]]
speaker = "unk"
