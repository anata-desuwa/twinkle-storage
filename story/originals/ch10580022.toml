line = "「ふむ……セパレートの有無のみならず、パンツタイプ……パレオ……フリル……スク水もいるか。水着とひと口に言っても、やはり種類は多いな」"

[[dialogue]]
speaker = "ヘレナ"
# 「男子と違って女子の水着には様々なニーズが生じる。そこにどう寄り添っていくかがセールスのポイントとなる」
line = "「男子と違って女子の水着には様々なニーズが生じる。そこにどう寄り添っていくかがセールスのポイントとなる」"

[[dialogue]]
speaker = "ヘレナ"
# 「やはり各々の体型をどう活かすかが肝だろうか。自分のスタイルにあった水着をセレクトできるようになれば一番よいが……」
