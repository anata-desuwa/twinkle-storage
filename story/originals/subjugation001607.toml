[[dialogue]]
speaker = "unk"
# 戦いの中で、決して傷つけるようなことをしなかったヒトリからは、ジャクリーヌに対して何かを訴えかけているような感じがした。
line = "戦いの中で、決して傷つけるようなことをしなかったヒトリからは、ジャクリーヌに対して何かを訴えかけているような感じがした。"

[[dialogue]]
speaker = "ヒトリ"
# 「はぁ、はぁ……これでわかって、くれましたか？」
line = "「はぁ、はぁ……これでわかって、くれましたか？」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「はぁ、はぁ……わからないの……ヒトリはどうして余にここまで……」
line = "「はぁ、はぁ……わからないの……ヒトリはどうして余にここまで……」"

[[dialogue]]
speaker = "ヒトリ"
# 「ジャクリーヌさん、お菓子って……ハロウィンの日以外でも、いつでも食べられるんですよ？」
line = "「ジャクリーヌさん、お菓子って……ハロウィンの日以外でも、いつでも食べられるんですよ？」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「そんなの余は知らないゆ……あんなにたくさんお菓子が食べられるのは、ハロウィンだけなの！」
line = "「そんなの余は知らないゆ……あんなにたくさんお菓子が食べられるのは、ハロウィンだけなの！」"

[[dialogue]]
speaker = "ヒトリ"
# 「だからといって、何度も同じハロウィンを繰り返していたら、いつか全部のお菓子を食べ尽くしちゃいますよ」
line = "「だからといって、何度も同じハロウィンを繰り返していたら、いつか全部のお菓子を食べ尽くしちゃいますよ」"

[[dialogue]]
speaker = "ヒトリ"
# 「お菓子は作ってくれる人や、売ってくれる人がいてこそ、美味しく食べられるんです」
line = "「お菓子は作ってくれる人や、売ってくれる人がいてこそ、美味しく食べられるんです」"

[[dialogue]]
speaker = "ヒトリ"
# 「そういう人たちに迷惑をかけたら……ダメです」
line = "「そういう人たちに迷惑をかけたら……ダメです」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「そ、それは……」
line = "「そ、それは……」"

[[dialogue]]
speaker = "ヒトリ"
# 「言ってくれれば、わたしでも簡単なのだったら作れますし……毎日だって作ってあげるよ……？」
line = "「言ってくれれば、わたしでも簡単なのだったら作れますし……毎日だって作ってあげるよ……？」"

[[dialogue]]
speaker = "ヒトリ"
# 「それにね……迷惑をかけるんじゃなくて、ジャクリーヌさんがみんなの手助けをしてくれるなら……」
line = "「それにね……迷惑をかけるんじゃなくて、ジャクリーヌさんがみんなの手助けをしてくれるなら……」"

[[dialogue]]
speaker = "ヒトリ"
# 「わたしたちと一緒に……新星学園へ通うことだって、出来るんだよ」
line = "「わたしたちと一緒に……新星学園へ通うことだって、出来るんだよ」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ヒトリ……」
line = "「ヒトリ……」"

[[dialogue]]
speaker = "unk"
# 実は、ハロウィンがループし始めるよりも前──
line = "実は、ハロウィンがループし始めるよりも前──"

[[dialogue]]
speaker = "unk"
# 最初のハロウィンパーティーが終わった後、俺はヒトリから相談を受けていた。
line = "最初のハロウィンパーティーが終わった後、俺はヒトリから相談を受けていた。"

[[dialogue]]
speaker = "ヒトリ"
# 「会長さん……ちょっといいでしょうか？」
line = "「会長さん……ちょっといいでしょうか？」"

[[dialogue]]
speaker = "ヒトリ"
# 「あ、ありがとうございます。実は相談したいことが……ジャクリーヌさんのこと、なんですけど……」
line = "「あ、ありがとうございます。実は相談したいことが……ジャクリーヌさんのこと、なんですけど……」"

[[dialogue]]
speaker = "ヒトリ"
# 「ジャクリーヌさんを……新星学園に転入させることって、出来ないでしょうか？」
line = "「ジャクリーヌさんを……新星学園に転入させることって、出来ないでしょうか？」"

[[dialogue]]
speaker = "ヒトリ"
# 「む、無理なお願いをしてるってわかってるんですけど……どうしてもそうしてあげたくて……」
line = "「む、無理なお願いをしてるってわかってるんですけど……どうしてもそうしてあげたくて……」"

[[dialogue]]
speaker = "ヒトリ"
# 「ジャクリーヌさん、言ってました。ハロウィンパワーが満ちるその時まで、パンプキンファントムは魔界の奥地で、眠ったように過ごすんだそうです」
line = "「ジャクリーヌさん、言ってました。ハロウィンパワーが満ちるその時まで、パンプキンファントムは魔界の奥地で、眠ったように過ごすんだそうです」"

[[dialogue]]
speaker = "ヒトリ"
# 「現世に干渉できるほどの力が得られるのは、ハロウィンへの信仰心が満ちる、１年の間でも少しの間なんだとか」
line = "「現世に干渉できるほどの力が得られるのは、ハロウィンへの信仰心が満ちる、１年の間でも少しの間なんだとか」"

[[dialogue]]
speaker = "ヒトリ"
# 「で、でも、どうやらわたしのハロウィンフォームは、その力を多少なりとも増幅させる能力があるみたいなんです」
line = "「で、でも、どうやらわたしのハロウィンフォームは、その力を多少なりとも増幅させる能力があるみたいなんです」"

[[dialogue]]
speaker = "ヒトリ"
# 「わたしが他の幽霊さんたちにしているみたいに、ジャクリーヌさんにも力を分けることで、きっと人間界で普通の魔族みたいに活動できるようになるはずです」
line = "「わたしが他の幽霊さんたちにしているみたいに、ジャクリーヌさんにも力を分けることで、きっと人間界で普通の魔族みたいに活動できるようになるはずです」"

[[dialogue]]
speaker = "ヒトリ"
# 「だから、ジャクリーヌさんが望むなら……新星学園で、もっと彼女と一緒に過ごしてみたいって……ダ、ダメでしょうか？」
line = "「だから、ジャクリーヌさんが望むなら……新星学園で、もっと彼女と一緒に過ごしてみたいって……ダ、ダメでしょうか？」"

[[dialogue]]
speaker = "ヒトリ"
# 「い、いいんですか？　あ、あああ、ありがとうございますぅ……っ！」
line = "「い、いいんですか？　あ、あああ、ありがとうございますぅ……っ！」"

[[dialogue]]
speaker = "unk"
# そんなお願いをされた俺は、急いでヘレナちゃんに話を通し、無事転入できる手はずが整ったことをヒトリに伝える。
line = "そんなお願いをされた俺は、急いでヘレナちゃんに話を通し、無事転入できる手はずが整ったことをヒトリに伝える。"

[[dialogue]]
speaker = "ヒトリ"
# 「ほ、ほほほ、本当ですか！？」
line = "「ほ、ほほほ、本当ですか！？」"

[[dialogue]]
speaker = "ヒトリ"
# 「本当にありがとうございます……っ！　きっとうまくいくはず……いえ、そうしてみせます……！」
line = "「本当にありがとうございます……っ！　きっとうまくいくはず……いえ、そうしてみせます……！」"

[[dialogue]]
speaker = "ヒトリ"
# 「会長さんにお願いしたんです……ジャクリーヌさんと一緒に、学園に通いたいって……」
line = "「会長さんにお願いしたんです……ジャクリーヌさんと一緒に、学園に通いたいって……」"

[[dialogue]]
speaker = "ヒトリ"
# 「どうかな？　ジャクリーヌさんは、わたしと一緒に……」
line = "「どうかな？　ジャクリーヌさんは、わたしと一緒に……」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ヒ、ヒトリは……」
line = "「ヒ、ヒトリは……」"

[[dialogue]]
speaker = "ヒトリ"
# 「？　どうしたの……？」
line = "「？　どうしたの……？」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ヒトリは怒らないゆ……？　余が自分のためだけにしたイタズラで、こんなことになったのに……」
line = "「ヒトリは怒らないゆ……？　余が自分のためだけにしたイタズラで、こんなことになったのに……」"

[[dialogue]]
speaker = "ヒトリ"
# 「えっとね……今回みたいに悪いことをしたら、叱るかもしれない……」
line = "「えっとね……今回みたいに悪いことをしたら、叱るかもしれない……」"

[[dialogue]]
speaker = "ヒトリ"
# 「でもね……ジャクリーヌさんはもう、わたしのお友達、ですから……」
line = "「でもね……ジャクリーヌさんはもう、わたしのお友達、ですから……」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ヒトリ……」
line = "「ヒトリ……」"

[[dialogue]]
speaker = "ヒトリ"
# 「だから……これからもわたしと……一緒にいてくれたら、嬉しい……です」
line = "「だから……これからもわたしと……一緒にいてくれたら、嬉しい……です」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ありがとうなの、ヒトリ……」
line = "「ありがとうなの、ヒトリ……」"

[[dialogue]]
speaker = "ヒトリ"
# 「じ、じゃあ……」
line = "「じ、じゃあ……」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「もう悪いことはしないから……余も、これからヒトリと一緒に居たいの！」
line = "「もう悪いことはしないから……余も、これからヒトリと一緒に居たいの！」"

[[dialogue]]
speaker = "ヒトリ"
# 「が、学園にも、一緒に通いたいってこと……？」
line = "「が、学園にも、一緒に通いたいってこと……？」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「もちろんなの！　こんなに楽しい場所、ヒトリと一緒ならずっと居たいに決まってゆ！」
line = "「もちろんなの！　こんなに楽しい場所、ヒトリと一緒ならずっと居たいに決まってゆ！」"

[[dialogue]]
speaker = "unk"
# よかったな、ヒトリ
line = "よかったな、ヒトリ"

[[dialogue]]
speaker = "ヒトリ"
# 「う、うぅぅ……会長さんもいろいろしてくれて……ぐすっ……こんなの、今までで一番うれしいです……！」
line = "「う、うぅぅ……会長さんもいろいろしてくれて……ぐすっ……こんなの、今までで一番うれしいです……！」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「そんなに嬉しいゆ？」
line = "「そんなに嬉しいゆ？」"

[[dialogue]]
speaker = "ヒトリ"
# 「うん……うん……っ！」
line = "「うん……うん……っ！」"

[[dialogue]]
speaker = "ゆーちゃん"
# 「ゆー！　ゆー！」
line = "「ゆー！　ゆー！」"

[[dialogue]]
speaker = "unk"
# こうして、恥ずかしがり屋でおとなしいヒトリに、ジャクリーヌというかけがえのない友達が出来た。
line = "こうして、恥ずかしがり屋でおとなしいヒトリに、ジャクリーヌというかけがえのない友達が出来た。"

[[dialogue]]
speaker = "unk"
# そんな様子を見ていると、こっちまで嬉しくなるのだった。
line = "そんな様子を見ていると、こっちまで嬉しくなるのだった。"
