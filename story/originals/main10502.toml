[[dialogue]]
speaker = "unk"
# 第２話,第二次サンタ計画だぴょん！,B
line = "第２話,第二次サンタ計画だぴょん！,B"

[[dialogue]]
speaker = "蘭美"
# 「さて……と。有言実行、急がなければならないわね……」
line = "「さて……と。有言実行、急がなければならないわね……」"

[[dialogue]]
speaker = "蘭美"
# （せっかくこんなに素敵な戦闘服を頂いたのだから、速やかに使いこなせるようになりたいものだけれど）
line = "（せっかくこんなに素敵な戦闘服を頂いたのだから、速やかに使いこなせるようになりたいものだけれど）"

[[dialogue]]
speaker = "蘭美"
# （『テーマ』……）
line = "（『テーマ』……）"

[[dialogue]]
speaker = "蘭美"
# （人工戦闘服の力を引き出すためには、その戦闘服に込められたテーマにアクセスする必要があるわ）
line = "（人工戦闘服の力を引き出すためには、その戦闘服に込められたテーマにアクセスする必要があるわ）"

[[dialogue]]
speaker = "蘭美"
# （それが出来なければ、戦闘服として起動することすらできない）
line = "（それが出来なければ、戦闘服として起動することすらできない）"

[[dialogue]]
speaker = "蘭美"
# （人によっては身に着けてすぐに機能することもあるという話だけど……どうやら私の場合、上手くはいかなかったようね）
line = "（人によっては身に着けてすぐに機能することもあるという話だけど……どうやら私の場合、上手くはいかなかったようね）"

[[dialogue]]
speaker = "蘭美"
# 「ふっ、いいじゃない……燃えてきたわ！　このクリスマスフォーム、必ず自分のものにしてしてやるんだから！！」
line = "「ふっ、いいじゃない……燃えてきたわ！　このクリスマスフォーム、必ず自分のものにしてしてやるんだから！！」"

[[dialogue]]
speaker = "蘭美"
# 「テーマは当然『クリスマス』よね。だとしたら、クリスマスへのアプローチ……うーん……」
line = "「テーマは当然『クリスマス』よね。だとしたら、クリスマスへのアプローチ……うーん……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あれ、あなた蘭美？　誰かと思ったじゃない」
line = "「あれ、あなた蘭美？　誰かと思ったじゃない」"

[[dialogue]]
speaker = "蘭美"
# 「あ、お嬢様。お戻りになられていたのね？」
line = "「あ、お嬢様。お戻りになられていたのね？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええ、ついさっき帰ったばかりよ。そんなことよりどうしたの、その可愛すぎる格好？　もしかして……」
line = "「ええ、ついさっき帰ったばかりよ。そんなことよりどうしたの、その可愛すぎる格好？　もしかして……」"

[[dialogue]]
speaker = "蘭美"
# 「人工戦闘服のクリスマスフォーム、つい先ほどヘレナ様から頂いたばかりよ」
line = "「人工戦闘服のクリスマスフォーム、つい先ほどヘレナ様から頂いたばかりよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふーん、そうなんだ。去年のヨミヨミのも可愛かったけど、蘭美のも可愛いわね～」
line = "「ふーん、そうなんだ。去年のヨミヨミのも可愛かったけど、蘭美のも可愛いわね～」"

[[dialogue]]
speaker = "蘭美"
# 「それは至極当然ね。ヘレナ様の作る可愛い服に、私の可愛さが合わされば、それ即ち最強だから！」
line = "「それは至極当然ね。ヘレナ様の作る可愛い服に、私の可愛さが合わされば、それ即ち最強だから！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「最強ねぇ……ふふ、そうなってくると今度は強さの方が気になってくるわ」
line = "「最強ねぇ……ふふ、そうなってくると今度は強さの方が気になってくるわ」"

[[dialogue]]
speaker = "蘭美"
# 「残念ながらまだ戦闘服を起動するには至っていないの。ちょうど今、そのことについて考えていたところよ」
line = "「残念ながらまだ戦闘服を起動するには至っていないの。ちょうど今、そのことについて考えていたところよ」"

[[dialogue]]
speaker = "蘭美"
# 「けれど心配には及ばないわ！　だって私は光速のメイドマスター！　戦闘服の覚醒だって一瞬なんだから！」
line = "「けれど心配には及ばないわ！　だって私は光速のメイドマスター！　戦闘服の覚醒だって一瞬なんだから！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「その意気よ、蘭美！　……あ、そうだ、だったら私も協力するわ！」
line = "「その意気よ、蘭美！　……あ、そうだ、だったら私も協力するわ！」"

[[dialogue]]
speaker = "蘭美"
# 「あら？　お嬢様には何か良い考えがあるのかしら？」
line = "「あら？　お嬢様には何か良い考えがあるのかしら？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええ、任せてちょうだい！」
line = "「ええ、任せてちょうだい！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「人工戦闘服を覚醒させるためには、テーマに対する精神的なアプローチが必要になってくるのよね？」
line = "「人工戦闘服を覚醒させるためには、テーマに対する精神的なアプローチが必要になってくるのよね？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「だったらつまり……クリスマスの気持ちになって、クリスマスっぽいことをすればいいのよ！」
line = "「だったらつまり……クリスマスの気持ちになって、クリスマスっぽいことをすればいいのよ！」"

[[dialogue]]
speaker = "蘭美"
# 「！！？」
line = "「！！？」"

[[dialogue]]
speaker = "蘭美"
# 「ふっふっふ……お嬢様、私にもピーンと来たわ。ズバリ、私がこの服を着て、みんなにクリスマスプレゼントを配ればいいのね？」
line = "「ふっふっふ……お嬢様、私にもピーンと来たわ。ズバリ、私がこの服を着て、みんなにクリスマスプレゼントを配ればいいのね？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「さすがは蘭美ね、理解が速くてビックリしちゃった」
line = "「さすがは蘭美ね、理解が速くてビックリしちゃった」"

[[dialogue]]
speaker = "蘭美"
# 「このくらい当然よ。スピードで私の右に出る者なんていないんだから」
line = "「このくらい当然よ。スピードで私の右に出る者なんていないんだから」"

[[dialogue]]
speaker = "蘭美"
# 「そうと決まったら早速、プレゼントを考えないといけないわね」
line = "「そうと決まったら早速、プレゼントを考えないといけないわね」"

[[dialogue]]
speaker = "蘭美"
# 「せっかくプレゼントを渡すのだから、ちゃんと喜んでもらえるものにしたいわ」
line = "「せっかくプレゼントを渡すのだから、ちゃんと喜んでもらえるものにしたいわ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふふっ♪　去年はプレゼント配りに参加できなかったからね。リベンジ出来ると思うと楽しみで仕方がないんだけど♪」
line = "「ふふっ♪　去年はプレゼント配りに参加できなかったからね。リベンジ出来ると思うと楽しみで仕方がないんだけど♪」"

[[dialogue]]
speaker = "蘭美"
# 「……お嬢様、もしかして去年もこんなノリで、あの大騒ぎを起こしたのかしら……？」
line = "「……お嬢様、もしかして去年もこんなノリで、あの大騒ぎを起こしたのかしら……？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「安心して！　マムにこってり叱られて、さすがに反省したから！　新星寮に手は出さないでおくわ！」
line = "「安心して！　マムにこってり叱られて、さすがに反省したから！　新星寮に手は出さないでおくわ！」"

[[dialogue]]
speaker = "蘭美"
# 「あのお嬢様に反省させるなんて……なんて恐ろしい人なのかしら」
line = "「あのお嬢様に反省させるなんて……なんて恐ろしい人なのかしら」"

[[dialogue]]
speaker = "ヴィーナス"
# 「今回は九浄家のお屋敷に勤めている人たちをターゲットにしましょう、それなら問題ないでしょう？」
line = "「今回は九浄家のお屋敷に勤めている人たちをターゲットにしましょう、それなら問題ないでしょう？」"

[[dialogue]]
speaker = "蘭美"
# 「ええ、問題ないわ。それじゃ何をプレゼントするかについて作戦会議を始めましょう」
line = "「ええ、問題ないわ。それじゃ何をプレゼントするかについて作戦会議を始めましょう」"

[[dialogue]]
speaker = "ヴィーナス"
# 「まずは考えやすいところからメイド隊のメンバーからいってみる？」
line = "「まずは考えやすいところからメイド隊のメンバーからいってみる？」"

[[dialogue]]
speaker = "蘭美"
# 「ヨミ、閃、せつな、美鶴…………美鶴についてはアイデアがあるわ。美鶴は──」
line = "「ヨミ、閃、せつな、美鶴…………美鶴についてはアイデアがあるわ。美鶴は──」"

[[dialogue]]
speaker = "ヴィーナス"
# 「いいわね！　それならヨミヨミはこういうのでどうかしら──」
line = "「いいわね！　それならヨミヨミはこういうのでどうかしら──」"

[[dialogue]]
speaker = "ヘレナ"
# 「……ふふふ」
line = "「……ふふふ」"

[[dialogue]]
speaker = "ヘレナ"
# 「さて……今年は何事も起こらなければ良いが……果たしてどうなるかな……？」
line = "「さて……今年は何事も起こらなければ良いが……果たしてどうなるかな……？」"
