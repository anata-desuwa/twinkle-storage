[[dialogue]]
speaker = "unk"
# 第３話,終末兵器の弱点,P
line = "第３話,終末兵器の弱点,P"

[[dialogue]]
speaker = "unk"
# 校内美化の日。俺はトワ先生と一緒に、新星学園の廊下を清掃していた――
line = "校内美化の日。俺はトワ先生と一緒に、新星学園の廊下を清掃していた――"

[[dialogue]]
speaker = "プリムラ"
# 「フハハハハ！　<ruby=けんぞく>眷族</ruby>よ、今日こそ貴様に、我を主として認めさせてみせるのじゃ！　……って、何をしておるのじゃ？」
line = "「フハハハハ！　<ruby>眷族<rt>けんぞく</rt></ruby>よ、今日こそ貴様に、我を主として認めさせてみせるのじゃ！　……って、何をしておるのじゃ？」"

[[dialogue]]
speaker = "トワ先生"
# 「あっ、プリムラちゃんだ～！　こんにちは～♪」
line = "「あっ、プリムラちゃんだ～！　こんにちは～♪」"

[[dialogue]]
speaker = "unk"
# 校内美化の日だから、皆で清掃をしてるんだ
line = "校内美化の日だから、皆で清掃をしてるんだ"

[[dialogue]]
speaker = "プリムラ"
# 「ああ、うちの附属校でも何度かあった、あの面倒な日か。ご苦労なことじゃ」
line = "「ああ、うちの附属校でも何度かあった、あの面倒な日か。ご苦労なことじゃ」"

[[dialogue]]
speaker = "プリムラ"
# 「サチから更正の一環じゃと言われ、散々こき使われた記憶が甦る……」
line = "「サチから更正の一環じゃと言われ、散々こき使われた記憶が甦る……」"

[[dialogue]]
speaker = "トワ先生"
# 「――う～ん、そうだ！」
line = "「――う～ん、そうだ！」"

[[dialogue]]
speaker = "トワ先生"
# 「よかったら、プリムラちゃんも私達と一緒に掃除しない？」
line = "「よかったら、プリムラちゃんも私達と一緒に掃除しない？」"

[[dialogue]]
speaker = "プリムラ"
# 「はぁ！？　なぜ我がそんな面倒なことをしなければならぬ。我は悪の終末兵器じゃぞ！」
line = "「はぁ！？　なぜ我がそんな面倒なことをしなければならぬ。我は悪の終末兵器じゃぞ！」"

[[dialogue]]
speaker = "トワ先生"
# 「手伝ってくれたら、先生からご褒美をあげちゃうよ～♪」
line = "「手伝ってくれたら、先生からご褒美をあげちゃうよ～♪」"

[[dialogue]]
speaker = "プリムラ"
# 「愚か者め、そんな甘言で我を釣ろうなどと――」
line = "「愚か者め、そんな甘言で我を釣ろうなどと――」"

[[dialogue]]
speaker = "トワ先生"
# 「最近、海外の美味しい高級チョコレートを手に入れたんだよね～」
line = "「最近、海外の美味しい高級チョコレートを手に入れたんだよね～」"

[[dialogue]]
speaker = "プリムラ"
# 「フハハハハ！　仕方あるまい！　我の力を見せてやろう！」
line = "「フハハハハ！　仕方あるまい！　我の力を見せてやろう！」"

[[dialogue]]
speaker = "unk"
# 急に手の平返した！
line = "急に手の平返した！"

[[dialogue]]
speaker = "トワ先生"
# 「……ふふっ、プリムラちゃん、チョコレートに目がないから♪」
line = "「……ふふっ、プリムラちゃん、チョコレートに目がないから♪」"

[[dialogue]]
speaker = "トワ先生"
# 「それに先生、プリムラちゃんが少しでも、皆と掃除するのも悪くないな、って感じてくれたらいいなと思うんだよね」
line = "「それに先生、プリムラちゃんが少しでも、皆と掃除するのも悪くないな、って感じてくれたらいいなと思うんだよね」"

[[dialogue]]
speaker = "トワ先生"
# 「面倒で嫌な思い出だけだと、なんか寂しいじゃない？」
line = "「面倒で嫌な思い出だけだと、なんか寂しいじゃない？」"

[[dialogue]]
speaker = "プリムラ"
# 「眷族よ、何を話しておる。さっさと我に変身の許可をよこすがよい！　変形の能力を使用するのじゃ！」
line = "「眷族よ、何を話しておる。さっさと我に変身の許可をよこすがよい！　変形の能力を使用するのじゃ！」"

[[dialogue]]
speaker = "unk"
# わかった。変身承認！
line = "わかった。変身承認！"

[[dialogue]]
speaker = "プリムラ"
# 「――我には、学園側からの監視と行動制限を目的として、星の鎖とは別に、首と両腕に拘束具が取りつけられておる」
line = "「――我には、学園側からの監視と行動制限を目的として、星の鎖とは別に、首と両腕に拘束具が取りつけられておる」"

[[dialogue]]
speaker = "プリムラ"
# 「これによって、管理者であるサチの承認なくしては、変身ができぬはずじゃったが……フフフ」
line = "「これによって、管理者であるサチの承認なくしては、変身ができぬはずじゃったが……フフフ」"

[[dialogue]]
speaker = "プリムラ"
# 「しかし、眷属の契約を結んだ影響で、貴様からも変身承認が受けられるようになったのは、大きな進歩なのじゃ！」
line = "「しかし、眷属の契約を結んだ影響で、貴様からも変身承認が受けられるようになったのは、大きな進歩なのじゃ！」"

[[dialogue]]
speaker = "プリムラ"
# 「貴様を我の支配下におけば、いつでも変身ができるようになるわけじゃからな！」
line = "「貴様を我の支配下におけば、いつでも変身ができるようになるわけじゃからな！」"

[[dialogue]]
speaker = "プリムラ"
# 「さあ、眷族よ。我のすごさをとくと目に焼きつけるがよい！　汚れなど指一本触れずに、一掃してくれるわ！」
line = "「さあ、眷族よ。我のすごさをとくと目に焼きつけるがよい！　汚れなど指一本触れずに、一掃してくれるわ！」"

[[dialogue]]
speaker = "メルエル"
# 「わぁ～、すごいね、プリムラちゃん！　手が届かない教室の天井までピカピカになっていくよ～！」
line = "「わぁ～、すごいね、プリムラちゃん！　手が届かない教室の天井までピカピカになっていくよ～！」"

[[dialogue]]
speaker = "プリムラ"
# 「ふふん、この程度、造作もないわ！　終末兵器である我は、体の一部を複数に切り離し、端末として操ることができるのじゃ」
line = "「ふふん、この程度、造作もないわ！　終末兵器である我は、体の一部を複数に切り離し、端末として操ることができるのじゃ」"

[[dialogue]]
speaker = "プリムラ"
# 「その端末はもちろん、賢者の石でできておるから、触れた汚れを分解し、自らの活動エネルギーとして吸収することで、自動で掃除を続けられるという仕組みじゃ」
line = "「その端末はもちろん、賢者の石でできておるから、触れた汚れを分解し、自らの活動エネルギーとして吸収することで、自動で掃除を続けられるという仕組みじゃ」"

[[dialogue]]
speaker = "メルエル"
# 「ありがとね、私達の掃除しにくい場所を手伝ってくれて。はいこれ、私からもチョコあげるね♪」
line = "「ありがとね、私達の掃除しにくい場所を手伝ってくれて。はいこれ、私からもチョコあげるね♪」"

[[dialogue]]
speaker = "プリムラ"
# 「全く、どいつもこいつもチョコを渡してきおって。それで我に言うことを聞かせられると思ったら大間違いじゃぞ！　……もぐもぐ」
line = "「全く、どいつもこいつもチョコを渡してきおって。それで我に言うことを聞かせられると思ったら大間違いじゃぞ！　……もぐもぐ」"

[[dialogue]]
speaker = "unk"
# （言いつつも、チョコ食べてる……）
line = "（言いつつも、チョコ食べてる……）"

[[dialogue]]
speaker = "メルエル"
# 「ふふっ、それにしても、この分離したスライムちゃん達、銀色の金属みたいな見た目なのに、ぷるぷるしてて可愛い～♪　つんつん♪」
line = "「ふふっ、それにしても、この分離したスライムちゃん達、銀色の金属みたいな見た目なのに、ぷるぷるしてて可愛い～♪　つんつん♪」"

[[dialogue]]
speaker = "プリムラ"
# 「こら、つんつんして遊ぶでない！　というか、可愛いとか貴様、馬鹿にしとるじゃろ！　我は悪の終末兵器なのじゃぞ、フヘへへ♪」
line = "「こら、つんつんして遊ぶでない！　というか、可愛いとか貴様、馬鹿にしとるじゃろ！　我は悪の終末兵器なのじゃぞ、フヘへへ♪」"

[[dialogue]]
speaker = "unk"
# （めっちゃ喜んでる……）
line = "（めっちゃ喜んでる……）"

[[dialogue]]
speaker = "紅明"
# 「ヤバッ、プリムラっちの作った掃除機、自動で動くしペットみたいじゃん！　ウケる～☆」
line = "「ヤバッ、プリムラっちの作った掃除機、自動で動くしペットみたいじゃん！　ウケる～☆」"

[[dialogue]]
speaker = "プリムラ"
# 「誰がペットじゃ！　馬鹿にしとるのか貴様！」
line = "「誰がペットじゃ！　馬鹿にしとるのか貴様！」"

[[dialogue]]
speaker = "紅明"
# 「いやいや、褒めてるんだって～。おー、よしよし♪」
line = "「いやいや、褒めてるんだって～。おー、よしよし♪」"

[[dialogue]]
speaker = "プリムラ"
# 「ちょっ……気安く頭をなでるでない！」
line = "「ちょっ……気安く頭をなでるでない！」"

[[dialogue]]
speaker = "unk"
# プリムラ、捻くれてるけど実はいい子だよね
line = "プリムラ、捻くれてるけど実はいい子だよね"

[[dialogue]]
speaker = "紅明"
# 「わかる～☆　プリムラっち、めっちゃいい子だよね♪」
line = "「わかる～☆　プリムラっち、めっちゃいい子だよね♪」"

[[dialogue]]
speaker = "紅明"
# 「掃除できて、偉い偉い♪　ほらほら、お姉さん、いっぱい褒めちゃうぞ～♪」
line = "「掃除できて、偉い偉い♪　ほらほら、お姉さん、いっぱい褒めちゃうぞ～♪」"

[[dialogue]]
speaker = "プリムラ"
# 「たわけ！　我にお姉さんぶるなど、１０万年早いのじゃ！　子供扱いするでない！」
line = "「たわけ！　我にお姉さんぶるなど、１０万年早いのじゃ！　子供扱いするでない！」"

[[dialogue]]
speaker = "プリムラ"
# 「そんな犬猫みたいになでられても、全然嬉しくないわ！　フヘへへへへ♪」
line = "「そんな犬猫みたいになでられても、全然嬉しくないわ！　フヘへへへへ♪」"

[[dialogue]]
speaker = "unk"
# う～ん、チョロい……
line = "う～ん、チョロい……"

[[dialogue]]
speaker = "unk"
# こんな感じで、チョコレートと、褒められることには、滅法弱い終末兵器なのであった。
line = "こんな感じで、チョコレートと、褒められることには、滅法弱い終末兵器なのであった。"
