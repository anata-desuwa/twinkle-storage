[[dialogue]]
speaker = "ウズメイア"
# 「何だかめっちゃ久しぶりな感じ！？　ちょうどよかった～、後で新星学園に会いに行こうと思ってたんだ～♪」
line = "「何だかめっちゃ久しぶりな感じ！？　ちょうどよかった～、後で新星学園に会いに行こうと思ってたんだ～♪」"

[[dialogue]]
speaker = "unk"
# 彼女は<ruby=あめの>雨野</ruby>ウズメイア。天界からはるばるやってきた留学生であり、卓越した薙刀術の腕前を誇る星騎士である。
line = "彼女は<ruby>雨野<rt>あめの</rt></ruby>ウズメイア。天界からはるばるやってきた留学生であり、卓越した薙刀術の腕前を誇る星騎士である。"

[[dialogue]]
speaker = "unk"
# そんなウズメは、普段はギャルファッションに身を包んでいる女の子だ（留学した当初は清楚な見た目だったらしい）。
line = "そんなウズメは、普段はギャルファッションに身を包んでいる女の子だ（留学した当初は清楚な見た目だったらしい）。"

[[dialogue]]
speaker = "unk"
# 武術や時代劇といった和の文化にとどまらず、アニメやオタク文化にも<ruby=ぞうけい>造詣</ruby>が深い、ジャパニーズ文化ラブなオタクのギャル天使である。
line = "武術や時代劇といった和の文化にとどまらず、アニメやオタク文化にも<ruby>造詣<rt>ぞうけい</rt></ruby>が深い、ジャパニーズ文化ラブなオタクのギャル天使である。"

[[dialogue]]
speaker = "ウズメイア"
# 「ねぇねぇ、この衣装どうかな～♪　大正ロマンって感じで、めっちゃ可愛くない！？」
line = "「ねぇねぇ、この衣装どうかな～♪　大正ロマンって感じで、めっちゃ可愛くない！？」"

[[dialogue]]
speaker = "unk"
# コスプレ？　よく似合ってるね
line = "コスプレ？　よく似合ってるね"

[[dialogue]]
speaker = "ウズメイア"
# 「そうそう！　コスプレも立派な日本の文化だし──って、違う違う！」
line = "「そうそう！　コスプレも立派な日本の文化だし──って、違う違う！」"

[[dialogue]]
speaker = "ウズメイア"
# 「これはヘレナちゃんに作ってもらった、２着目の人工戦闘服だよ。その名もバレンタインフォームだし！」
line = "「これはヘレナちゃんに作ってもらった、２着目の人工戦闘服だよ。その名もバレンタインフォームだし！」"

[[dialogue]]
speaker = "unk"
# バレンタインフォーム！？
line = "バレンタインフォーム！？"

[[dialogue]]
speaker = "ウズメイア"
# 「ふふ～ん♪　実は昨日渡されたばっかりの衣装なんだ～。晴れ着フォームに続いて、また和風な衣装だからすっごく嬉しいし！」
line = "「ふふ～ん♪　実は昨日渡されたばっかりの衣装なんだ～。晴れ着フォームに続いて、また和風な衣装だからすっごく嬉しいし！」"

[[dialogue]]
speaker = "unk"
# 清楚な感じのウズメも新鮮で素敵だね
line = "清楚な感じのウズメも新鮮で素敵だね"

[[dialogue]]
speaker = "unk"
# ギャルファッションも可愛いけど
line = "ギャルファッションも可愛いけど"

[[dialogue]]
speaker = "ウズメイア"
# 「え──えへへっ<emoji=heart04>　そお？　ギャップってやつ、見せつけちゃった感じ？」
line = "「え──えへへっ<emoji=heart04>　そお？　ギャップってやつ、見せつけちゃった感じ？」"

[[dialogue]]
speaker = "ウズメイア"
# 「会長くんにそう言ってもらえて嬉しいな～♪　採寸もなしでいきなり渡された衣装だったから、似合ってるか不安だったんだ～」
line = "「会長くんにそう言ってもらえて嬉しいな～♪　採寸もなしでいきなり渡された衣装だったから、似合ってるか不安だったんだ～」"

[[dialogue]]
speaker = "ウズメイア"
# 「あ……その顔。あたしがヘレナちゃんにおねだりして作ってもらったと思ってる感じ？　違うんだな～、これが」
line = "「あ……その顔。あたしがヘレナちゃんにおねだりして作ってもらったと思ってる感じ？　違うんだな～、これが」"

[[dialogue]]
speaker = "ウズメイア"
# 「あたしはついでに作ってもらっただけなの。流星学園のエンジェルチョコレート制度って言って……あ、わかる感じ？」
line = "「あたしはついでに作ってもらっただけなの。流星学園のエンジェルチョコレート制度って言って……あ、わかる感じ？」"

[[dialogue]]
speaker = "ウズメイア"
# 「あたしのペアの附属の子がね、ヘレナちゃんにバレンタインフォームの製作を発注してたみたいでね～」
line = "「あたしのペアの附属の子がね、ヘレナちゃんにバレンタインフォームの製作を発注してたみたいでね～」"

[[dialogue]]
speaker = "ウズメイア"
# 「せっかくのペアだからついでに作ってやったぞ、なんて言われて！　ヘレナちゃん、マジ神だし！」
line = "「せっかくのペアだからついでに作ってやったぞ、なんて言われて！　ヘレナちゃん、マジ神だし！」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「ふふっ、盛り上がってるみたいですね。ウズメイア先輩に、新星の会長さん♪」
line = "「ふふっ、盛り上がってるみたいですね。ウズメイア先輩に、新星の会長さん♪」"

[[dialogue]]
speaker = "ウズメイア"
# 「あ、シャルレーヌちゃん♪　会長くん、この子があたしのペアの附属生ちゃんだよ！　えっと～……２人は知り合い？」
line = "「あ、シャルレーヌちゃん♪　会長くん、この子があたしのペアの附属生ちゃんだよ！　えっと～……２人は知り合い？」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「はい♪　会長さんにはいつも、と～ってもお世話になってます。本日もお会いできてすごく嬉しいです♪」
line = "「はい♪　会長さんにはいつも、と～ってもお世話になってます。本日もお会いできてすごく嬉しいです♪」"

[[dialogue]]
speaker = "unk"
# 彼女の名はシャルレーヌ・ディアーブル──魔界にあるシャリオン地方の十貴族が一柱であり、文字通りの貴族令嬢だ。
line = "彼女の名はシャルレーヌ・ディアーブル──魔界にあるシャリオン地方の十貴族が一柱であり、文字通りの貴族令嬢だ。"

[[dialogue]]
speaker = "unk"
# 魔界において『魔王の血縁』を自称して家名の箔付けを行っている、ちょっぴりしたたかな貴族なのだが……それが嘘であることを知る者は少ない。
line = "魔界において『魔王の血縁』を自称して家名の箔付けを行っている、ちょっぴりしたたかな貴族なのだが……それが嘘であることを知る者は少ない。"

[[dialogue]]
speaker = "unk"
# しかしその実態は──
line = "しかしその実態は──"

[[dialogue]]
speaker = "シャルレーヌ"
# 「──あっ、会長さん。ネクタイがちょっぴり曲がってますよ？　直してさしあげますね」
line = "「──あっ、会長さん。ネクタイがちょっぴり曲がってますよ？　直してさしあげますね」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「身だしなみは人となりを映す鏡。星徒会長であり、魔王でもあるのですから、きちんとしていただかないと♪」
line = "「身だしなみは人となりを映す鏡。星徒会長であり、魔王でもあるのですから、きちんとしていただかないと♪」"

[[dialogue]]
speaker = "ウズメイア"
# 「お～。手際がいい……流石はシャリオンのお嬢様だし！」
line = "「お～。手際がいい……流石はシャリオンのお嬢様だし！」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「くふふ<emoji=heart04>　会長さぁん、さっきから視線がいやらしくないですかぁ？」
line = "「くふふ<emoji=heart04>　会長さぁん、さっきから視線がいやらしくないですかぁ？」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「挨拶をした時から私の胸元をチラチラと見てきて～……バレバレですよ？」
line = "「挨拶をした時から私の胸元をチラチラと見てきて～……バレバレですよ？」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「まぁ見るなとは言いませんよ？　会長さんが性欲に勝てない、弱～いワンちゃんなことは、百も承知ですからね～<emoji=heart04>」
line = "「まぁ見るなとは言いませんよ？　会長さんが性欲に勝てない、弱～いワンちゃんなことは、百も承知ですからね～<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ──その実態は、こんな風に裏表のあるお嬢様である。ドＳであり、小生意気であり、何かにつけて俺をからかってくる、所謂『メスガキ』……！
line = "──その実態は、こんな風に裏表のあるお嬢様である。ドＳであり、小生意気であり、何かにつけて俺をからかってくる、所謂『メスガキ』……！"

[[dialogue]]
speaker = "unk"
# いずれは俺を支配下に置き、ディア―ブル家に正式に魔王の血を取り込んでやろうと画策する、油断のならない女の子だったりする……
line = "いずれは俺を支配下に置き、ディア―ブル家に正式に魔王の血を取り込んでやろうと画策する、油断のならない女の子だったりする……"

[[dialogue]]
speaker = "シャルレーヌ"
# 「あ。言うまでもないと思いますけど、ウズメイア先輩に私の『素』は隠してますから。バレンタインが終わるまで、他言無用でお願いしますね？」
line = "「あ。言うまでもないと思いますけど、ウズメイア先輩に私の『素』は隠してますから。バレンタインが終わるまで、他言無用でお願いしますね？」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「ところで、私のバレンタインフォームはいかがです？」
line = "「ところで、私のバレンタインフォームはいかがです？」"

[[dialogue]]
speaker = "unk"
# よ……よく似合ってるよ
line = "よ……よく似合ってるよ"

[[dialogue]]
speaker = "シャルレーヌ"
# 「まあ♪　ありがとうございます。会長さんにお褒めいただけるか、とっても不安だったので嬉しいです♪」
line = "「まあ♪　ありがとうございます。会長さんにお褒めいただけるか、とっても不安だったので嬉しいです♪」"

[[dialogue]]
speaker = "ウズメイア"
# 「ぜんっぜん心配することないよ～。あたしも最初に見た時、キュートすぎてビビったし！」
line = "「ぜんっぜん心配することないよ～。あたしも最初に見た時、キュートすぎてビビったし！」"

[[dialogue]]
speaker = "ウズメイア"
# 「知ってる会長くん？　シャルレーヌちゃんのお家って代々、香水で有名なんだって！」
line = "「知ってる会長くん？　シャルレーヌちゃんのお家って代々、香水で有名なんだって！」"

[[dialogue]]
speaker = "ウズメイア"
# 「このバレンタインフォームも、販売戦略？　の一環で、ヘレナちゃんに直々に制作を依頼したらしいよ！」
line = "「このバレンタインフォームも、販売戦略？　の一環で、ヘレナちゃんに直々に制作を依頼したらしいよ！」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「はい。せっかく人間界へ来たのですから、家業の香水をたくさんの方に届けたいと思いまして」
line = "「はい。せっかく人間界へ来たのですから、家業の香水をたくさんの方に届けたいと思いまして」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「冬の新作の香水に、私の星力を込めたチョコレートをオマケでつけてみるのも面白いかなって」
line = "「冬の新作の香水に、私の星力を込めたチョコレートをオマケでつけてみるのも面白いかなって」"

[[dialogue]]
speaker = "ウズメイア"
# 「こんなに可愛いシャルレーヌちゃんの手作りチョコが付いてくるとか、爆売れ確定だし！」
line = "「こんなに可愛いシャルレーヌちゃんの手作りチョコが付いてくるとか、爆売れ確定だし！」"

[[dialogue]]
speaker = "ウズメイア"
# 「じゃあ早速だけどチョコ作り、やっちゃおっか？」
line = "「じゃあ早速だけどチョコ作り、やっちゃおっか？」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「はい。よろしくお願いします、ウズメイア先輩。会長さんもぜひ、味見していってくださいね」
line = "「はい。よろしくお願いします、ウズメイア先輩。会長さんもぜひ、味見していってくださいね」"

[[dialogue]]
speaker = "ウズメイア"
# 「というわけで、試作したブラウニーの完成だしっ♪　会長くん、早速食べてみて！」
line = "「というわけで、試作したブラウニーの完成だしっ♪　会長くん、早速食べてみて！」"

[[dialogue]]
speaker = "unk"
# すごくおいしい！
line = "すごくおいしい！"

[[dialogue]]
speaker = "ウズメイア"
# 「ほんと！？　よかったぁ♪　チョコレートのお菓子作りって初めてだったけど、上手くいっちゃった感じ？」
line = "「ほんと！？　よかったぁ♪　チョコレートのお菓子作りって初めてだったけど、上手くいっちゃった感じ？」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「ウズメイア先輩ってお料理が得意なんですね。初めてのレシピだったのに、とても手際が良くって驚きました」
line = "「ウズメイア先輩ってお料理が得意なんですね。初めてのレシピだったのに、とても手際が良くって驚きました」"

[[dialogue]]
speaker = "ウズメイア"
# 「えへへ、まあ自炊とかそれなりにやるしね～♪　それじゃあ今度は、シャルレーヌちゃんの番だね！」
line = "「えへへ、まあ自炊とかそれなりにやるしね～♪　それじゃあ今度は、シャルレーヌちゃんの番だね！」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「はい。どうぞ会長さん。私の方はトリュフチョコレートにしてみました」
line = "「はい。どうぞ会長さん。私の方はトリュフチョコレートにしてみました」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「丸めたガナッシュを、溶かしたチョコでコーティングして、ココアパウダーをまぶしたものです」
line = "「丸めたガナッシュを、溶かしたチョコでコーティングして、ココアパウダーをまぶしたものです」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「隠し味にお酒を使っているので、香りが良く出ていたらいいんですけれど……♪」
line = "「隠し味にお酒を使っているので、香りが良く出ていたらいいんですけれど……♪」"

[[dialogue]]
speaker = "unk"
# （ものすごく──辛い！？！？）
line = "（ものすごく──辛い！？！？）"

[[dialogue]]
speaker = "unk"
# もぐっ……んんん！？
line = "もぐっ……んんん！？"

[[dialogue]]
speaker = "ウズメイア"
# 「わっ、会長くん、お顔真っ赤……！　のどに詰まらせちゃった！？　お水取って来るし！」
line = "「わっ、会長くん、お顔真っ赤……！　のどに詰まらせちゃった！？　お水取って来るし！」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「も～、会長さん？　いくらご主人様の手作りチョコだからって、喉に引っかけちゃうくらいの勢いで食べなくても～♪」
line = "「も～、会長さん？　いくらご主人様の手作りチョコだからって、喉に引っかけちゃうくらいの勢いで食べなくても～♪」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「チョコも満足にゴックンできないだなんて、困ったワンちゃんですね。ほ～ら、シャルレーヌが背中トントンしてあげます♪」
line = "「チョコも満足にゴックンできないだなんて、困ったワンちゃんですね。ほ～ら、シャルレーヌが背中トントンしてあげます♪」"

[[dialogue]]
speaker = "unk"
# うう……辛い……
line = "うう……辛い……"

[[dialogue]]
speaker = "シャルレーヌ"
# 「……え？　辛い？」
line = "「……え？　辛い？」"

[[dialogue]]
speaker = "unk"
# あんまりなイタズラだよ、シャルレーヌ……
line = "あんまりなイタズラだよ、シャルレーヌ……"

[[dialogue]]
speaker = "unk"
# 激辛チョコを騙して食べさせるだなんて
line = "激辛チョコを騙して食べさせるだなんて"

[[dialogue]]
speaker = "シャルレーヌ"
# 「そんな。いくら私でも、口に運ぶものにイタズラはしませんよ。そんな品が良くないこと……」
line = "「そんな。いくら私でも、口に運ぶものにイタズラはしませんよ。そんな品が良くないこと……」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「それに、私のトリュフチョコが辛いですって？　もぐもぐ……んんっ！？」
line = "「それに、私のトリュフチョコが辛いですって？　もぐもぐ……んんっ！？」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「な、なんなの、この辛さっ……！？」
line = "「な、なんなの、この辛さっ……！？」"
