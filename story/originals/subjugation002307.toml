[[dialogue]]
speaker = "unk"
# アステラの最奥に辿り着き、そこに座している大型モンスターを目にして、前世の父親の名を口にする紅明――
line = "アステラの最奥に辿り着き、そこに座している大型モンスターを目にして、前世の父親の名を口にする紅明――"

[[dialogue]]
speaker = "クーシェン"
# 「ねーねー、どういうこと？」
line = "「ねーねー、どういうこと？」"

[[dialogue]]
speaker = "クーシェン"
# 「あのモンスターが、ねーねーのお父さん――『牛魔王』って……」
line = "「あのモンスターが、ねーねーのお父さん――『牛魔王』って……」"

[[dialogue]]
speaker = "unk"
# モンスターの方は、まだこちらの存在に気づいていないようだった。そこに飾られた彫像のように玉座から動く気配はない。
line = "モンスターの方は、まだこちらの存在に気づいていないようだった。そこに飾られた彫像のように玉座から動く気配はない。"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「……いや、本物の親父殿ってわけじゃない。あれは恐らく……親父殿の姿だけを模したモンスターだと思う」
line = "「……いや、本物の親父殿ってわけじゃない。あれは恐らく……親父殿の姿だけを模したモンスターだと思う」"

[[dialogue]]
speaker = "クーシェン"
# 「姿を模した……？」
line = "「姿を模した……？」"

[[dialogue]]
speaker = "unk"
# 紅明、親父さんって確か……
line = "紅明、親父さんって確か……"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「うん。親父殿は２０００年前、人間界に侵攻して、三界を魔族の手で支配しようという野望を抱いていた」
line = "「うん。親父殿は２０００年前、人間界に侵攻して、三界を魔族の手で支配しようという野望を抱いていた」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「その為に力を求めて……リクリエを自らの中に取り込み、あの怪物の姿に変身して、『牛魔王』を名乗ったんだ」
line = "「その為に力を求めて……リクリエを自らの中に取り込み、あの怪物の姿に変身して、『牛魔王』を名乗ったんだ」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「『我こそは魔王の後継者である』、と称してね」
line = "「『我こそは魔王の後継者である』、と称してね」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「しかし結局は……リクリエを制御できるはずもなく、時間と共に親父殿の方が取り込まれてしまった。……自我まで怪物に変貌してしまったんだよ」
line = "「しかし結局は……リクリエを制御できるはずもなく、時間と共に親父殿の方が取り込まれてしまった。……自我まで怪物に変貌してしまったんだよ」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「本物の親父殿は、アタシと悟空たちで２０００年前に介錯してる。だから……あれは多分、かつてリクリエが取り込んだ牛魔王を模倣したもの」
line = "「本物の親父殿は、アタシと悟空たちで２０００年前に介錯してる。だから……あれは多分、かつてリクリエが取り込んだ牛魔王を模倣したもの」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「……愚かな男が招いた、自業自得の結果だよ」
line = "「……愚かな男が招いた、自業自得の結果だよ」"

[[dialogue]]
speaker = "クーシェン"
# 「……許せない」
line = "「……許せない」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「え……？」
line = "「え……？」"

[[dialogue]]
speaker = "クーシェン"
# 「死んだヒトの力を悪用するだなんて……！」
line = "「死んだヒトの力を悪用するだなんて……！」"

[[dialogue]]
speaker = "クーシェン"
# 「確かに、牛魔王は悪い奴だったのかもしれない。でも、死んだ後にこうやって利用されるのは、違うでしょ！？」
line = "「確かに、牛魔王は悪い奴だったのかもしれない。でも、死んだ後にこうやって利用されるのは、違うでしょ！？」"

[[dialogue]]
speaker = "クーシェン"
# 「死んだヒトの力を利用して世界を滅ぼそうとするだなんて……そんなの、尊厳を踏みにじる行為じゃないか！」
line = "「死んだヒトの力を利用して世界を滅ぼそうとするだなんて……そんなの、尊厳を踏みにじる行為じゃないか！」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「クーちん……」
line = "「クーちん……」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「仕方ないよ。リクリエにそんなこと言ったって、意味はない」
line = "「仕方ないよ。リクリエにそんなこと言ったって、意味はない」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「地震とか台風とかの災害――天災と同じなんだ。リクリエに言葉は通じないんだよ」
line = "「地震とか台風とかの災害――天災と同じなんだ。リクリエに言葉は通じないんだよ」"

[[dialogue]]
speaker = "クーシェン"
# 「関係ない！」
line = "「関係ない！」"

[[dialogue]]
speaker = "クーシェン"
# 「たとえそれが天に決められたことだったとしても……ボクが許せないと思うから怒るんだ！」
line = "「たとえそれが天に決められたことだったとしても……ボクが許せないと思うから怒るんだ！」"

[[dialogue]]
speaker = "クーシェン"
# 「仕方ないことだとしても、許せないことにはちゃんと怒らなくちゃ！　じゃなきゃ、いざ怒らなくちゃいけない時に怒れなくなっちゃう！」
line = "「仕方ないことだとしても、許せないことにはちゃんと怒らなくちゃ！　じゃなきゃ、いざ怒らなくちゃいけない時に怒れなくなっちゃう！」"

[[dialogue]]
speaker = "クーシェン"
# 「ボクはまだ学園に入学して、プリマステラの資格を貰ったばかりだけど……」
line = "「ボクはまだ学園に入学して、プリマステラの資格を貰ったばかりだけど……」"

[[dialogue]]
speaker = "クーシェン"
# 「でも！　その仕方のないこと――世界の不条理に抗うのが、星騎士なんじゃないの！？」
line = "「でも！　その仕方のないこと――世界の不条理に抗うのが、星騎士なんじゃないの！？」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「ああ、そっか。……そうだね、クーちん」
line = "「ああ、そっか。……そうだね、クーちん」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「仕方のないことだからって……全部が全部、割り切ってみせる必要はないんだ」
line = "「仕方のないことだからって……全部が全部、割り切ってみせる必要はないんだ」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「ありがと、クーちん……アタシはまた、昔みたいに諦めちゃうところだった」
line = "「ありがと、クーちん……アタシはまた、昔みたいに諦めちゃうところだった」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「親父殿の偽物が現れたなら、元娘として、ちゃんと怒らなくちゃね……！」
line = "「親父殿の偽物が現れたなら、元娘として、ちゃんと怒らなくちゃね……！」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「かつて、怒りを伝えられずに後悔して、アタシにこの芭蕉扇を託した――お袋殿の為にも！」
line = "「かつて、怒りを伝えられずに後悔して、アタシにこの芭蕉扇を託した――お袋殿の為にも！」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「でも、クーちん、キミはやっぱり――『アタシの<ruby=リーダー>孫悟空</ruby>』だ」
line = "「でも、クーちん、キミはやっぱり――『アタシの<ruby>孫悟空<rt>リーダー</rt></ruby>』だ」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「たとえ記憶が無くても……生まれ変わっても、キミの中にはちゃんと受け継がれているものがある」
line = "「たとえ記憶が無くても……生まれ変わっても、キミの中にはちゃんと受け継がれているものがある」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「かつて親父殿を止めることを諦めてしまっていたアタシを、同じ言葉で救ってくれた、『<ruby=せいてんたいせい>斉天大聖</ruby>』の心が」
line = "「かつて親父殿を止めることを諦めてしまっていたアタシを、同じ言葉で救ってくれた、『<ruby>斉天大聖<rt>せいてんたいせい</rt></ruby>』の心が」"

[[dialogue]]
speaker = "クーシェン"
# 「せーてんたいせー……？」
line = "「せーてんたいせー……？」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「『天にも<ruby=ひと>斉</ruby>しい大聖者』って意味の言葉で、孫悟空が名乗っていた称号さ。今風に言うと、二つ名ってやつかな」
line = "「『天にも<ruby>斉<rt>ひと</rt></ruby>しい大聖者』って意味の言葉で、孫悟空が名乗っていた称号さ。今風に言うと、二つ名ってやつかな」"

[[dialogue]]
speaker = "クーシェン"
# 「天にも等しい……うん、カッコいい！」
line = "「天にも等しい……うん、カッコいい！」"

[[dialogue]]
speaker = "クーシェン"
# 「ボクには前世の記憶はないから、自分はやっぱり、孫悟空とは別人だと思ってしまうけど……」
line = "「ボクには前世の記憶はないから、自分はやっぱり、孫悟空とは別人だと思ってしまうけど……」"

[[dialogue]]
speaker = "クーシェン"
# 「でも、ねーねーがそう言ってくれるのなら、ボクはその二つ名を名乗るよ！」
line = "「でも、ねーねーがそう言ってくれるのなら、ボクはその二つ名を名乗るよ！」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「ふふっ、そっか♪」
line = "「ふふっ、そっか♪」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「――よし、じゃあ、気を取り直して、２０００年ぶりの牛魔王退治と行きますか！」
line = "「――よし、じゃあ、気を取り直して、２０００年ぶりの牛魔王退治と行きますか！」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「ダーリン、指示をお願い！」
line = "「ダーリン、指示をお願い！」"

[[dialogue]]
speaker = "unk"
# ああ、行こう、２人共！
line = "ああ、行こう、２人共！"

[[dialogue]]
speaker = "クーシェン"
# 「うん、にーにー！」
line = "「うん、にーにー！」"

[[dialogue]]
speaker = "unk"
# それから、俺たちはアステラの奥へと進み、牛魔王の前へと立つ。
line = "それから、俺たちはアステラの奥へと進み、牛魔王の前へと立つ。"

[[dialogue]]
speaker = "牛魔王"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "クーシェン"
# 「――さあさあ、リクリエ！　その偽物を通して、よ～く聞け！」
line = "「――さあさあ、リクリエ！　その偽物を通して、よ～く聞け！」"

[[dialogue]]
speaker = "クーシェン"
# 「ボクの名は、斉天大聖クーシェン！　現代に生まれ変わりし、孫悟空だ！」
line = "「ボクの名は、斉天大聖クーシェン！　現代に生まれ変わりし、孫悟空だ！」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「同じく、我こそは善財童子、牛紅明！　前世の名は、紅孩児！　牛魔王の元娘だぜ！」
line = "「同じく、我こそは善財童子、牛紅明！　前世の名は、紅孩児！　牛魔王の元娘だぜ！」"

[[dialogue]]
speaker = "クーシェン"
# 「――それが悪人であろうとも、死んだヒトの力を悪用するその冒涜……たとえ女神様が許しても、このボクが許さない！」
line = "「――それが悪人であろうとも、死んだヒトの力を悪用するその冒涜……たとえ女神様が許しても、このボクが許さない！」"

[[dialogue]]
speaker = "クーシェン"
# 「さあ、好きな行き先を選べ――」
line = "「さあ、好きな行き先を選べ――」"

[[dialogue]]
speaker = "クーシェン"
# 「天国がいいか、地獄がいいか！！」
line = "「天国がいいか、地獄がいいか！！」"

[[dialogue]]
speaker = "牛魔王"
# 「――グオオオォォォッ！」
line = "「――グオオオォォォッ！」"

[[dialogue]]
speaker = "unk"
# 牛魔王が玉座から立ち上がり、雄叫びを上げる。
line = "牛魔王が玉座から立ち上がり、雄叫びを上げる。"

[[dialogue]]
speaker = "クーシェン"
# 「うりゃあぁぁぁーーーっ！」
line = "「うりゃあぁぁぁーーーっ！」"

[[dialogue]]
speaker = "unk"
# 先陣を切るクーシェンのかけ声と共に、俺たちと牛魔王の戦いが始まるのだった――
line = "先陣を切るクーシェンのかけ声と共に、俺たちと牛魔王の戦いが始まるのだった――"
