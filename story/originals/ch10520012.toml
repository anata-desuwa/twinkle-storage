[[dialogue]]
speaker = "unk"
# 第２話,上官のお仕事,P
line = "第２話,上官のお仕事,P"

[[dialogue]]
speaker = "セドナ"
# 「──よく来た。我々の巣へようこそ」
line = "「──よく来た。我々の巣へようこそ」"

[[dialogue]]
speaker = "セドナ"
# 「前回は奇しくも滅多な流れに巻き込まれてしまったが……ここでならそんな過ちも起こらない。私の本来の姿を目に焼きつけておけ」
line = "「前回は奇しくも滅多な流れに巻き込まれてしまったが……ここでならそんな過ちも起こらない。私の本来の姿を目に焼きつけておけ」"

[[dialogue]]
speaker = "unk"
# 前回って……
line = "前回って……"

[[dialogue]]
speaker = "セドナ"
# 「学園視察の件だ。私としたことが学生どもの甘ったれた雰囲気に流され、か……買い食いなどをしてしまった」
line = "「学園視察の件だ。私としたことが学生どもの甘ったれた雰囲気に流され、か……買い食いなどをしてしまった」"

[[dialogue]]
speaker = "セドナ"
# 「べ、別に悪いとか言っているわけではない。ただ──ネビュラ統制管理官としての示しがつかんだろう、示しが」
line = "「べ、別に悪いとか言っているわけではない。ただ──ネビュラ統制管理官としての示しがつかんだろう、示しが」"

[[dialogue]]
speaker = "unk"
# 統制管理官？
line = "統制管理官？"

[[dialogue]]
speaker = "セドナ"
# 「私の職務上の肩書きだ。主にこの本部の指揮から人員の運用、物資の管理までを任されている」
line = "「私の職務上の肩書きだ。主にこの本部の指揮から人員の運用、物資の管理までを任されている」"

[[dialogue]]
speaker = "アイリーン"
# 「──失礼します！　セドナ長官、先日の特別訓練のデータ詳細が出ました。こちらのファイルは……？」
line = "「──失礼します！　セドナ長官、先日の特別訓練のデータ詳細が出ました。こちらのファイルは……？」"

[[dialogue]]
speaker = "セドナ"
# 「そこに置いておけ。後のアナライズは私が済ませておく」
line = "「そこに置いておけ。後のアナライズは私が済ませておく」"

[[dialogue]]
speaker = "ネビュラ隊員Ａ"
# 「──セドナ上官。市国の郊外でモンスターの目撃情報が相次いでいます──いかがいたしましょう？」
line = "「──セドナ上官。市国の郊外でモンスターの目撃情報が相次いでいます──いかがいたしましょう？」"

[[dialogue]]
speaker = "セドナ"
# 「実働部隊を派遣しておけ。星騎士の介入が確認できた場合は、手を引いていい」
line = "「実働部隊を派遣しておけ。星騎士の介入が確認できた場合は、手を引いていい」"

[[dialogue]]
speaker = "ネビュラ隊員Ｂ"
# 「──緊急のご報告です。天界の支部より連絡があり、情報交換に参りたいとのこと」
line = "「──緊急のご報告です。天界の支部より連絡があり、情報交換に参りたいとのこと」"

[[dialogue]]
speaker = "ネビュラ隊員Ｂ"
# 「ただ、その面会場所としてこちらの基地を望まれているのですが……」
line = "「ただ、その面会場所としてこちらの基地を望まれているのですが……」"

[[dialogue]]
speaker = "セドナ"
# 「早急に直近の活動報告を用意しろ。一時間後、私が対応する」
line = "「早急に直近の活動報告を用意しろ。一時間後、私が対応する」"

[[dialogue]]
speaker = "ネビュラ隊員Ｂ"
# 「上官自ら……！？　か、かしこまりました。至急、レポートを用意します！」
line = "「上官自ら……！？　か、かしこまりました。至急、レポートを用意します！」"

[[dialogue]]
speaker = "セドナ"
# 「……ふぅ。悪いな、わざわざ招いたのに手持ち無沙汰にさせてしまって」
line = "「……ふぅ。悪いな、わざわざ招いたのに手持ち無沙汰にさせてしまって」"

[[dialogue]]
speaker = "unk"
# いつもこんな仕事を？
line = "いつもこんな仕事を？"

[[dialogue]]
speaker = "セドナ"
# 「まあな。本来、こんな場面は外部の者に見せるべきではないのだが──こほん。今回は私の面目回復のためにもな」
line = "「まあな。本来、こんな場面は外部の者に見せるべきではないのだが──こほん。今回は私の面目回復のためにもな」"

[[dialogue]]
speaker = "セドナ"
# 「貴様ら星騎士が常に人員を補充しているのと同様──我々ネビュラの魔女もまた、来たるべき有事に備えて研鑽を行っている」
line = "「貴様ら星騎士が常に人員を補充しているのと同様──我々ネビュラの魔女もまた、来たるべき有事に備えて研鑽を行っている」"

[[dialogue]]
speaker = "セドナ"
# 「学園側が探知し損ねているアステラの駆除などもな。もっとも、これは利害関係の一致であって、恩義を売っているわけではないぞ」
line = "「学園側が探知し損ねているアステラの駆除などもな。もっとも、これは利害関係の一致であって、恩義を売っているわけではないぞ」"

[[dialogue]]
speaker = "unk"
# お礼は言っておく
line = "お礼は言っておく"

[[dialogue]]
speaker = "unk"
# 知らなかった
line = "知らなかった"

[[dialogue]]
speaker = "セドナ"
# 「知らなくていいんだ。我々は魔女──人間界で表立って活動すべき存在ではない」
line = "「知らなくていいんだ。我々は魔女──人間界で表立って活動すべき存在ではない」"

[[dialogue]]
speaker = "セドナ"
# 「あくまでも表の秩序は星騎士が守る。我々が行うのはその観察と、来たる終末を確実に乗り越える術を探すことのみ」
line = "「あくまでも表の秩序は星騎士が守る。我々が行うのはその観察と、来たる終末を確実に乗り越える術を探すことのみ」"

[[dialogue]]
speaker = "unk"
# 少しは休んだほうが
line = "少しは休んだほうが"

[[dialogue]]
speaker = "unk"
# 疲れたりしない？
line = "疲れたりしない？"

[[dialogue]]
speaker = "セドナ"
# 「疲れ……？　さあな。意識したことはないし、私個人がいくら疲弊しようと組織のビジョンに影響はないさ」
line = "「疲れ……？　さあな。意識したことはないし、私個人がいくら疲弊しようと組織のビジョンに影響はないさ」"

[[dialogue]]
speaker = "セドナ"
# 「リクリエによる世界の破滅──それを今度こそ防ぐのが、我々魔女の本懐なのだからな」
line = "「リクリエによる世界の破滅──それを今度こそ防ぐのが、我々魔女の本懐なのだからな」"

[[dialogue]]
speaker = "unk"
# 同志だ
line = "同志だ"

[[dialogue]]
speaker = "unk"
# 仲間ですね
line = "仲間ですね"

[[dialogue]]
speaker = "セドナ"
# 「同志……ね。ま、最初にそう告げたのは私だが……鵜呑みにしていいかどうかはまた別だ」
line = "「同志……ね。ま、最初にそう告げたのは私だが……鵜呑みにしていいかどうかはまた別だ」"

[[dialogue]]
speaker = "セドナ"
# 「甘い蜜を吸うために──口吻を差し込む生物もいれば、殻を砕いて割る生物もいる」
line = "「甘い蜜を吸うために──口吻を差し込む生物もいれば、殻を砕いて割る生物もいる」"

[[dialogue]]
speaker = "セドナ"
# 「目的ばかりが同じだからと言って、軽々しく信用を置くのはどうかと思うがな。──ま、過ぎた忠言か」
line = "「目的ばかりが同じだからと言って、軽々しく信用を置くのはどうかと思うがな。──ま、過ぎた忠言か」"

[[dialogue]]
speaker = "unk"
# 警戒はしてる
line = "警戒はしてる"

[[dialogue]]
speaker = "unk"
# ためになる
line = "ためになる"

[[dialogue]]
speaker = "セドナ"
# 「フ。ならいい。我々も我々のビジョンがため、せいぜい貴様のことも利用させてもらうだけだ」
line = "「フ。ならいい。我々も我々のビジョンがため、せいぜい貴様のことも利用させてもらうだけだ」"

[[dialogue]]
speaker = "セドナ"
# 「しかし……ふう。どうやら貴様の言う通り、私も少しは疲れているようだ。よもや学生相手にこんな無駄話をしてしまうとはな」
line = "「しかし……ふう。どうやら貴様の言う通り、私も少しは疲れているようだ。よもや学生相手にこんな無駄話をしてしまうとはな」"

[[dialogue]]
speaker = "セドナ"
# 「……ん？　疲れたなら──って、なんだ。おい……」
line = "「……ん？　疲れたなら──って、なんだ。おい……」"

[[dialogue]]
speaker = "セドナ"
# 「って……！？　な、なんのつもりだ。肩揉みだと？　そんなの頼んでいないぞ！」
line = "「って……！？　な、なんのつもりだ。肩揉みだと？　そんなの頼んでいないぞ！」"

[[dialogue]]
speaker = "セドナ"
# 「嫌か──って、別に嫌というわけではないが。むずがゆいだろうが、こんなの……」
line = "「嫌か──って、別に嫌というわけではないが。むずがゆいだろうが、こんなの……」"

[[dialogue]]
speaker = "セドナ"
# （そもそも、私たちの体の造りからして人間とは似て非なるものなのだが……はあ。言っても聞くようには見えんな）
line = "（そもそも、私たちの体の造りからして人間とは似て非なるものなのだが……はあ。言っても聞くようには見えんな）"

[[dialogue]]
speaker = "セドナ"
# 「わかったわかった。気の済むまで好きにしろ。まったく──貴様といると調子が狂う。私を誰だと思っているんだ」
line = "「わかったわかった。気の済むまで好きにしろ。まったく──貴様といると調子が狂う。私を誰だと思っているんだ」"

[[dialogue]]
speaker = "unk"
# セドナさんは悪い人じゃない
line = "セドナさんは悪い人じゃない"

[[dialogue]]
speaker = "セドナ"
# 「だからって、気軽に信用していいわけじゃ……はあ。もう、今さら暖簾に腕押しか」
line = "「だからって、気軽に信用していいわけじゃ……はあ。もう、今さら暖簾に腕押しか」"

[[dialogue]]
speaker = "セドナ"
# （というか、逆に悪い人だと思っていたのか……？　そっちの方が気にかかってしまうが──まあいい）
line = "（というか、逆に悪い人だと思っていたのか……？　そっちの方が気にかかってしまうが──まあいい）"

[[dialogue]]
speaker = "セドナ"
# 「む……なるほど。確かに、少しばかり肩が軽くなった気はするな。何、十分だ。気の持ちようということもある」
line = "「む……なるほど。確かに、少しばかり肩が軽くなった気はするな。何、十分だ。気の持ちようということもある」"

[[dialogue]]
speaker = "クラウディア"
# 「お～い！　セドナよ～！　あやとりのヒモが絡まって解けんようになったぞ、助けてくれ～～！」
line = "「お～い！　セドナよ～！　あやとりのヒモが絡まって解けんようになったぞ、助けてくれ～～！」"

[[dialogue]]
speaker = "セドナ"
# 「ふう……どうやら姫がまた面倒を起こしているようだ。悪いが、貴様もそろそろ学園へ帰るのだな」
line = "「ふう……どうやら姫がまた面倒を起こしているようだ。悪いが、貴様もそろそろ学園へ帰るのだな」"

[[dialogue]]
speaker = "セドナ"
# 「ああ、適度に休息は取るようにするよ。貴様のほうは──むしろ血反吐を吐いて修練に励めよ。魔王」
line = "「ああ、適度に休息は取るようにするよ。貴様のほうは──むしろ血反吐を吐いて修練に励めよ。魔王」"
