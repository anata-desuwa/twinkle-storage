[[dialogue]]
speaker = "unk"
# 説明を求められた俺は、ここまでの経緯を簡単にかいつまんで話す。……とはいえ、俺たちも状況はよく分かっていないのだが。
line = "説明を求められた俺は、ここまでの経緯を簡単にかいつまんで話す。……とはいえ、俺たちも状況はよく分かっていないのだが。"

[[dialogue]]
speaker = "unk"
# 『よく分からない奴に絡まれて、よく分からないことが起こっている』ことだけは伝わったようだった。
line = "『よく分からない奴に絡まれて、よく分からないことが起こっている』ことだけは伝わったようだった。"

[[dialogue]]
speaker = "unk"
# そこに見知らぬ女性を連れた、リーリアとアイリーンさんが指令室に入ってくる。
line = "そこに見知らぬ女性を連れた、リーリアとアイリーンさんが指令室に入ってくる。"

[[dialogue]]
speaker = "セドナ"
# 「こちらが<ruby=くだん>件</ruby>の女性、ノルトハウゼン殿だ」
line = "「こちらが<ruby>件<rt>くだん</rt></ruby>の女性、ノルトハウゼン殿だ」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「初めまして。ハルツの魔法使い、ノルトハウゼンですわ」
line = "「初めまして。ハルツの魔法使い、ノルトハウゼンですわ」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「わたくしのことを捜して頂いたと伺っています。この度はいろいろとご迷惑をおかけしました」
line = "「わたくしのことを捜して頂いたと伺っています。この度はいろいろとご迷惑をおかけしました」"

[[dialogue]]
speaker = "フィオナ"
# 「ご迷惑をおかけしたのはこちらです。ノルトハウゼンさんは別世界から来た魔法使い、と伺ったのですが」
line = "「ご迷惑をおかけしたのはこちらです。ノルトハウゼンさんは別世界から来た魔法使い、と伺ったのですが」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「はい。わたくしはイリスクラウドという大陸の北方に位置する国、アイゼングラートから参りました」
line = "「はい。わたくしはイリスクラウドという大陸の北方に位置する国、アイゼングラートから参りました」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「こちらに来てからどうにも魔法の調子が良くて、違和感を感じていたのですが……」
line = "「こちらに来てからどうにも魔法の調子が良くて、違和感を感じていたのですが……」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「みなさんからイリスクラウドという大陸やアイゼングラートという国は存在しないと教えていただいて、ようやくこれが噂に聞く異世界転生ではないかと思い至りましたの」
line = "「みなさんからイリスクラウドという大陸やアイゼングラートという国は存在しないと教えていただいて、ようやくこれが噂に聞く異世界転生ではないかと思い至りましたの」"

[[dialogue]]
speaker = "リーリア"
# 「……『転生』ではないのでは？」
line = "「……『転生』ではないのでは？」"

[[dialogue]]
speaker = "フィオナ"
# 「緋宮会長、イリスクラウドと言えば……」
line = "「緋宮会長、イリスクラウドと言えば……」"

[[dialogue]]
speaker = "unk"
# そうだね。プトラの世界だ
line = "そうだね。プトラの世界だ"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「プトラさんをご存知なのですか？」
line = "「プトラさんをご存知なのですか？」"

[[dialogue]]
speaker = "フィオナ"
# 「はい、彼女も以前、こちらの世界に呼び出されてしまったことがあります」
line = "「はい、彼女も以前、こちらの世界に呼び出されてしまったことがあります」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「まあ、そうでしたの。ふふ、彼女は元気にしていますわよ。ヴィヴィアンさんと一緒にいるところを、よくお見かけしますわ」
line = "「まあ、そうでしたの。ふふ、彼女は元気にしていますわよ。ヴィヴィアンさんと一緒にいるところを、よくお見かけしますわ」"

[[dialogue]]
speaker = "フィオナ"
# 「そうですか！　お元気ならよかったです。プトラさん、なんだかもう懐かしいですね」
line = "「そうですか！　お元気ならよかったです。プトラさん、なんだかもう懐かしいですね」"

[[dialogue]]
speaker = "マハムート"
# 「ふむ、どうやら彼女が黒ベア子の召喚した女性ということで間違いないようね？」
line = "「ふむ、どうやら彼女が黒ベア子の召喚した女性ということで間違いないようね？」"

[[dialogue]]
speaker = "フィオナ"
# 「はい、間違いないと思います」
line = "「はい、間違いないと思います」"

[[dialogue]]
speaker = "マハムート"
# 「では戻るわよ。星徒会室に残してきた２人が気がかりだわ」
line = "「では戻るわよ。星徒会室に残してきた２人が気がかりだわ」"

[[dialogue]]
speaker = "unk"
# セドナさん、ありがとうございました
line = "セドナさん、ありがとうございました"

[[dialogue]]
speaker = "セドナ"
# 「ああ、貴様も色々大変そうだが……まあ、頑張れ」
line = "「ああ、貴様も色々大変そうだが……まあ、頑張れ」"

[[dialogue]]
speaker = "unk"
# こうして俺たちはノルトハウゼンさんを連れて、ネビュラの基地を後にしたのだった。
line = "こうして俺たちはノルトハウゼンさんを連れて、ネビュラの基地を後にしたのだった。"
