[[dialogue]]
speaker = "unk"
# その日の夜、みんなで学園に再集合した。
line = "その日の夜、みんなで学園に再集合した。"

[[dialogue]]
speaker = "unk"
# 異世界からやってきた２人のことを歓迎するため、カフェテリアで盛大にパーティーを開くことになったのだ。
line = "異世界からやってきた２人のことを歓迎するため、カフェテリアで盛大にパーティーを開くことになったのだ。"

[[dialogue]]
speaker = "unk"
# 料理の方は蛍火にお願いして用意してもらっていた。
line = "料理の方は蛍火にお願いして用意してもらっていた。"

[[dialogue]]
speaker = "アルテ"
# 「お昼に行ったお店も素晴らしかったですが、こちらの料理も素晴らしいですね」
line = "「お昼に行ったお店も素晴らしかったですが、こちらの料理も素晴らしいですね」"

[[dialogue]]
speaker = "unk"
# また肉料理で良かったの？
line = "また肉料理で良かったの？"

[[dialogue]]
speaker = "unk"
# お昼も肉料理だったけど
line = "お昼も肉料理だったけど"

[[dialogue]]
speaker = "アルテ"
# 「ええ、１日３食、全てお肉でも私は一向に構いませんよ」
line = "「ええ、１日３食、全てお肉でも私は一向に構いませんよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「どこかの守護天使みたいなこと言うわね……」
line = "「どこかの守護天使みたいなこと言うわね……」"

[[dialogue]]
speaker = "アルテ"
# 「そんな方がいるのですか？　ぜひ一度語り合ってみたいものです」
line = "「そんな方がいるのですか？　ぜひ一度語り合ってみたいものです」"

[[dialogue]]
speaker = "ヴィーナス"
# 「アルテって藝術家なんでしょう？　そこはまず、絵について語り合いたいって言葉が先に欲しかったわ」
line = "「アルテって藝術家なんでしょう？　そこはまず、絵について語り合いたいって言葉が先に欲しかったわ」"

[[dialogue]]
speaker = "アルテ"
# 「言葉で語れるようなら絵は必要ないでしょう？」
line = "「言葉で語れるようなら絵は必要ないでしょう？」"

[[dialogue]]
speaker = "アポロ"
# 「うわ、アルテが藝術家っぽいこと言った！」
line = "「うわ、アルテが藝術家っぽいこと言った！」"

[[dialogue]]
speaker = "アポロ"
# 「ふふ、なるほど。語りたいことは全て筆とキャンバスで語るってことだな？」
line = "「ふふ、なるほど。語りたいことは全て筆とキャンバスで語るってことだな？」"

[[dialogue]]
speaker = "アルテ"
# 「ぽい、じゃなくて正真正銘の藝術家なんですけどね。ま、そういうことです」
line = "「ぽい、じゃなくて正真正銘の藝術家なんですけどね。ま、そういうことです」"

[[dialogue]]
speaker = "プトラ"
# 「すっごく美味しい～～～っ！　これ、なんてお魚なんだろ？」
line = "「すっごく美味しい～～～っ！　これ、なんてお魚なんだろ？」"

[[dialogue]]
speaker = "蛍火"
# 「は、はい、こちらのお刺身はマグロの赤身、中トロ、タイ、ブリ、カツオ、イカ、ホタテ。煮物がカレイ。てんぷらがタラ、エビ、タコですね」
line = "「は、はい、こちらのお刺身はマグロの赤身、中トロ、タイ、ブリ、カツオ、イカ、ホタテ。煮物がカレイ。てんぷらがタラ、エビ、タコですね」"

[[dialogue]]
speaker = "プトラ"
# 「そうなんだ～、色んなお魚がいっぱいだ～♪」
line = "「そうなんだ～、色んなお魚がいっぱいだ～♪」"

[[dialogue]]
speaker = "蛍火"
# 「プトラさんは、お魚がお好きだと聞いています」
line = "「プトラさんは、お魚がお好きだと聞いています」"

[[dialogue]]
speaker = "プトラ"
# 「そうだよ～。あたしの育ったところが漁の盛んなところなんだ～」
line = "「そうだよ～。あたしの育ったところが漁の盛んなところなんだ～」"

[[dialogue]]
speaker = "プトラ"
# 「あたしのお父さんも漁師さんでね、小さい頃からお魚料理を食べて育ったんだよ」
line = "「あたしのお父さんも漁師さんでね、小さい頃からお魚料理を食べて育ったんだよ」"

[[dialogue]]
speaker = "蛍火"
# 「それは……素敵なところですね……」
line = "「それは……素敵なところですね……」"

[[dialogue]]
speaker = "プトラ"
# 「そうなの！　海の上に家が並んで建っててね、すぐにぴょーんて海に飛び込めるんだよ！」
line = "「そうなの！　海の上に家が並んで建っててね、すぐにぴょーんて海に飛び込めるんだよ！」"

[[dialogue]]
speaker = "プトラ"
# 「お魚さんもいっぱい泳いでるし、貝さんとかカニさんとかも採り放題なんだ」
line = "「お魚さんもいっぱい泳いでるし、貝さんとかカニさんとかも採り放題なんだ」"

[[dialogue]]
speaker = "プトラ"
# 「起きたらまず最初に海に入って、朝ごはんを捕まえてくるのが小さい頃からの毎日だったな～」
line = "「起きたらまず最初に海に入って、朝ごはんを捕まえてくるのが小さい頃からの毎日だったな～」"

[[dialogue]]
speaker = "unk"
# 生粋の海人だ……
line = "生粋の海人だ……"

[[dialogue]]
speaker = "プトラ"
# 「うみんちゅ？」
line = "「うみんちゅ？」"

[[dialogue]]
speaker = "フィオナ"
# 「まさに海の女ってことですよ」
line = "「まさに海の女ってことですよ」"

[[dialogue]]
speaker = "プトラ"
# 「えへへ……なんか嬉しいな」
line = "「えへへ……なんか嬉しいな」"

[[dialogue]]
speaker = "プトラ"
# 「あっ、ごめんね！　なんだかあたしのことばっかり一方的に話しちゃって」
line = "「あっ、ごめんね！　なんだかあたしのことばっかり一方的に話しちゃって」"

[[dialogue]]
speaker = "蛍火"
# 「いえ、そんなことは……」
line = "「いえ、そんなことは……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「蛍火は緊張すると無口になっちゃうのよ。怖い顔してるけど、怒ってるわけじゃないのよ」
line = "「蛍火は緊張すると無口になっちゃうのよ。怖い顔してるけど、怒ってるわけじゃないのよ」"

[[dialogue]]
speaker = "アルテ"
# 「引っ込み思案な人というのはどこにでもいるものですね。私の仲間にも１人困ったのがいますよ」
line = "「引っ込み思案な人というのはどこにでもいるものですね。私の仲間にも１人困ったのがいますよ」"

[[dialogue]]
speaker = "アルテ"
# 「いつもナメクジみたいにうじうじしてるから、私がいつも優しく背中を押してあげてるんです」
line = "「いつもナメクジみたいにうじうじしてるから、私がいつも優しく背中を押してあげてるんです」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あなたの場合、お尻をひっぱたいてるイメージだけど」
line = "「あなたの場合、お尻をひっぱたいてるイメージだけど」"

[[dialogue]]
speaker = "アルテ"
# 「多少は強引でないと、この手のタイプはなかなか動いてくれませんからね。否定はしません」
line = "「多少は強引でないと、この手のタイプはなかなか動いてくれませんからね。否定はしません」"

[[dialogue]]
speaker = "フィオナ"
# 「アルテさん、なんだかんだ言って面倒見良さそうですもんね」
line = "「アルテさん、なんだかんだ言って面倒見良さそうですもんね」"

[[dialogue]]
speaker = "アルテ"
# 「それは大いに誤解がありますね。他人の世話を焼くなんて面倒なことは御免です」
line = "「それは大いに誤解がありますね。他人の世話を焼くなんて面倒なことは御免です」"

[[dialogue]]
speaker = "プトラ"
# 「またまた～、そんなこと言って～♪」
line = "「またまた～、そんなこと言って～♪」"

[[dialogue]]
speaker = "アルテ"
# 「そういうあなたの周りには、話のネタになる面白い友人はいないんですか？」
line = "「そういうあなたの周りには、話のネタになる面白い友人はいないんですか？」"

[[dialogue]]
speaker = "プトラ"
# 「いっぱいいるよ～♪　すっごく美人なんだけど魔法ゴリラなエルフとか、機械いじりが得意でなんでも作っちゃうキツネちゃんとか」
line = "「いっぱいいるよ～♪　すっごく美人なんだけど魔法ゴリラなエルフとか、機械いじりが得意でなんでも作っちゃうキツネちゃんとか」"

[[dialogue]]
speaker = "アルテ"
# 「……個性が溢れすぎて、想像がつかないですね」
line = "「……個性が溢れすぎて、想像がつかないですね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「サーシャさんかアナがそちらの世界で会っていたら、どんな感じだったか教えてもらいましょ！」
line = "「サーシャさんかアナがそちらの世界で会っていたら、どんな感じだったか教えてもらいましょ！」"

[[dialogue]]
speaker = "プトラ"
# 「そっか～、こっちの世界からあたしたちの世界に行った人もいるかもなんだね」
line = "「そっか～、こっちの世界からあたしたちの世界に行った人もいるかもなんだね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「まあ、あの黒ベア子の口ぶりだと、１人きりで放り出されてる、ということはないでしょう」
line = "「まあ、あの黒ベア子の口ぶりだと、１人きりで放り出されてる、ということはないでしょう」"

[[dialogue]]
speaker = "プトラ"
# 「そうだね。車掌さんに出会えていたら、きっとよくしてくれてるはずだよ！」
line = "「そうだね。車掌さんに出会えていたら、きっとよくしてくれてるはずだよ！」"

[[dialogue]]
speaker = "アルテ"
# 「とはいえ、みんな私がいなくて困っているでしょうし、早く帰ってあげないととは思っていますよ。特に館長は頼りないですからね」
line = "「とはいえ、みんな私がいなくて困っているでしょうし、早く帰ってあげないととは思っていますよ。特に館長は頼りないですからね」"

[[dialogue]]
speaker = "プトラ"
# 「あたしも特鉄隊のみんなが心配してるだろうし、元気な顔見せたいな」
line = "「あたしも特鉄隊のみんなが心配してるだろうし、元気な顔見せたいな」"

[[dialogue]]
speaker = "フィオナ"
# 「そうですね、お二人を早く元の世界に帰してあげたいです。でも焦っても仕方ないですし、落ち着いていきましょう」
line = "「そうですね、お二人を早く元の世界に帰してあげたいです。でも焦っても仕方ないですし、落ち着いていきましょう」"
