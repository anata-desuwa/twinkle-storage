[[dialogue]]
speaker = "unk"
# 第３話,星徒会のお姉ちゃん、再び,P
line = "第３話,星徒会のお姉ちゃん、再び,P"

[[dialogue]]
speaker = "unk"
# その日は、星徒会のみんなでお正月遊びをしよう、ということで、安倍野神社の境内を借りて楽しんでいた。
line = "その日は、星徒会のみんなでお正月遊びをしよう、ということで、安倍野神社の境内を借りて楽しんでいた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「この前の初詣でやってた『星術羽根突き』、私もやりたいわ！」
line = "「この前の初詣でやってた『星術羽根突き』、私もやりたいわ！」"

[[dialogue]]
speaker = "unk"
# ヴィーナスのひと言をきっかけに、みんなで羽根突きのリーグ戦をすることに。その結果、見事に優勝を勝ち取ったのは――サーシャさんだった。
line = "ヴィーナスのひと言をきっかけに、みんなで羽根突きのリーグ戦をすることに。その結果、見事に優勝を勝ち取ったのは――サーシャさんだった。"

[[dialogue]]
speaker = "サーシャ"
# 「あらあら、うふふっ。私の優勝ね～♪」
line = "「あらあら、うふふっ。私の優勝ね～♪」"

[[dialogue]]
speaker = "サーシャ"
# 「というわけでさっそく、みんなには向こう１ヵ月、私のことを『お姉ちゃん』って呼んでもらおうかしら～」
line = "「というわけでさっそく、みんなには向こう１ヵ月、私のことを『お姉ちゃん』って呼んでもらおうかしら～」"

[[dialogue]]
speaker = "マトイ"
# 「なんか昔に比べて、罰ゲームの期間が妙に長くないですか！？」
line = "「なんか昔に比べて、罰ゲームの期間が妙に長くないですか！？」"

[[dialogue]]
speaker = "アナ"
# 「ちょっと懐かしいですね。わかりました、<b>姉さま</b>。ルール通り、その罰ゲームでノープロブレムです」
line = "「ちょっと懐かしいですね。わかりました、<b>姉さま</b>。ルール通り、その罰ゲームでノープロブレムです」"

[[dialogue]]
speaker = "サーシャ"
# 「あ～ん<emoji=heart04>　アナちゃんからのその呼ばれ方、久しぶり～！　お姉ちゃん、キュンキュンしちゃうわ～♪　ぎゅ～っ<emoji=heart04>」
line = "「あ～ん<emoji=heart04>　アナちゃんからのその呼ばれ方、久しぶり～！　お姉ちゃん、キュンキュンしちゃうわ～♪　ぎゅ～っ<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
# 「おぼふ……！　姉さま、ハグは嬉しいのですが、息ができないので、ホールドの加減をお願いします……」
line = "「おぼふ……！　姉さま、ハグは嬉しいのですが、息ができないので、ホールドの加減をお願いします……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私も全然構わないわよ、<b>姉さん</b>！　あとハグの勝負なら、バッチコイよ！」
line = "「私も全然構わないわよ、<b>姉さん</b>！　あとハグの勝負なら、バッチコイよ！」"

[[dialogue]]
speaker = "サーシャ"
# 「ありがと～♪　ヴィーナスちゃんも、ぎゅ～っ<emoji=heart04>　あと、頭よしよしもしてあげるわね～♪　ほ～ら、よしよ～し♪」
line = "「ありがと～♪　ヴィーナスちゃんも、ぎゅ～っ<emoji=heart04>　あと、頭よしよしもしてあげるわね～♪　ほ～ら、よしよ～し♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「えへへっ♪　姉さんのなでなで、くすぐったいわ♪」
line = "「えへへっ♪　姉さんのなでなで、くすぐったいわ♪」"

[[dialogue]]
speaker = "サーシャ"
# 「あ～ん！　ヴィーナスちゃんが甘えてくれるの、可愛い～<emoji=heart04>　ほら、次はマトイちゃんの番よ～♪」
line = "「あ～ん！　ヴィーナスちゃんが甘えてくれるの、可愛い～<emoji=heart04>　ほら、次はマトイちゃんの番よ～♪」"

[[dialogue]]
speaker = "マトイ"
# 「うぇっ！？　そ、その……<b>お姉ちゃん</b>……お手柔らかに、お願いします……」
line = "「うぇっ！？　そ、その……<b>お姉ちゃん</b>……お手柔らかに、お願いします……」"

[[dialogue]]
speaker = "サーシャ"
# 「は～い♪　お姉ちゃんですよ～♪　お手柔らかに、普通のぎゅ～っ<emoji=heart04>」
line = "「は～い♪　お姉ちゃんですよ～♪　お手柔らかに、普通のぎゅ～っ<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
# 「わぷっ！？　ん、んむぅ～～っ！？」
line = "「わぷっ！？　ん、んむぅ～～っ！？」"

[[dialogue]]
speaker = "マトイ"
# （普通じゃない！　全然お手柔らかじゃないです、お姉ちゃん……！　というか、スーパー晴れ着フォームのせいで、ハグの威力が上昇してますっ！）
line = "（普通じゃない！　全然お手柔らかじゃないです、お姉ちゃん……！　というか、スーパー晴れ着フォームのせいで、ハグの威力が上昇してますっ！）"

[[dialogue]]
speaker = "サーシャ"
# 「はふぅ～<emoji=heart04>　堪能したわ～♪　これで後は、会長くんだけね～」
line = "「はふぅ～<emoji=heart04>　堪能したわ～♪　これで後は、会長くんだけね～」"

[[dialogue]]
speaker = "マトイ"
# 「ぷはぁっ！？　い、色んな意味でちょっと、天国が見えた……！」
line = "「ぷはぁっ！？　い、色んな意味でちょっと、天国が見えた……！」"

[[dialogue]]
speaker = "unk"
# えっと……お、お姉ちゃん……
line = "えっと……お、お姉ちゃん……"

[[dialogue]]
speaker = "マトイ"
# 「あれ？　意外……。会長ってサーシャさんのこと『お姉ちゃん』って呼ぶの、まだ恥ずかしいんだ……」
line = "「あれ？　意外……。会長ってサーシャさんのこと『お姉ちゃん』って呼ぶの、まだ恥ずかしいんだ……」"

[[dialogue]]
speaker = "unk"
# いや、『まだ』って何！？
line = "いや、『まだ』って何！？"

[[dialogue]]
speaker = "アナ"
# 「確かに。お２人だけの時は、そう呼んでイチャイチャしてそうなものですが」
line = "「確かに。お２人だけの時は、そう呼んでイチャイチャしてそうなものですが」"

[[dialogue]]
speaker = "ヴィーナス"
# 「この間、クロトがサーシャさんのこと、間違って『お姉ちゃん』って呼んでたところ、私、見かけたわよ！」
line = "「この間、クロトがサーシャさんのこと、間違って『お姉ちゃん』って呼んでたところ、私、見かけたわよ！」"

[[dialogue]]
speaker = "unk"
# …………
line = "…………"

[[dialogue]]
speaker = "マトイ"
# 「耳まで真っ赤になってるし！　絶対普段からお姉ちゃんプレイしてるやつじゃん！」
line = "「耳まで真っ赤になってるし！　絶対普段からお姉ちゃんプレイしてるやつじゃん！」"

[[dialogue]]
speaker = "サーシャ"
# 「あら～、みんな、もしかして聞いてくれるの～？」
line = "「あら～、みんな、もしかして聞いてくれるの～？」"

[[dialogue]]
speaker = "サーシャ"
# 「実は会長くん、最近ようやくお姉ちゃんに甘えるのが上手になってきてね～♪」
line = "「実は会長くん、最近ようやくお姉ちゃんに甘えるのが上手になってきてね～♪」"

[[dialogue]]
speaker = "unk"
# ちょっ、サーシャさん！？
line = "ちょっ、サーシャさん！？"

[[dialogue]]
speaker = "サーシャ"
# 「あらあら、うふふっ♪　会長くん、ちゃんと『お姉ちゃん』って呼ばなきゃダメよ～？」
line = "「あらあら、うふふっ♪　会長くん、ちゃんと『お姉ちゃん』って呼ばなきゃダメよ～？」"

[[dialogue]]
speaker = "サーシャ"
# 「そうそう、それでね？　普段は会長くんも恥ずかしがるんだけど～、とっても疲れてるときとかは、『お姉ちゃん』って甘えてきてくれるようになったの～♪」
line = "「そうそう、それでね？　普段は会長くんも恥ずかしがるんだけど～、とっても疲れてるときとかは、『お姉ちゃん』って甘えてきてくれるようになったの～♪」"

[[dialogue]]
speaker = "サーシャ"
# 「そういう時は耳かきをしてあげたり～、あと最近はおっぱいの谷間に顔をうずめてもらって、パフパフをしてあげるのがブームなのよ～」
line = "「そういう時は耳かきをしてあげたり～、あと最近はおっぱいの谷間に顔をうずめてもらって、パフパフをしてあげるのがブームなのよ～」"

[[dialogue]]
speaker = "マトイ"
# 「えっ……そ、そのパフパフというのは、まさか……」
line = "「えっ……そ、そのパフパフというのは、まさか……」"

[[dialogue]]
speaker = "サーシャ"
# 「もちろん、おっぱいの谷間に会長くんの顔を挟んで、左右の胸で頭をマッサージすることよ～♪」
line = "「もちろん、おっぱいの谷間に会長くんの顔を挟んで、左右の胸で頭をマッサージすることよ～♪」"

[[dialogue]]
speaker = "サーシャ"
# 「で、そうすると、会長くんの声がだんだん甘くなってきて、『お姉ちゃん、好き』って言って、後でたくさんキスしてくれるの～<emoji=heart04>」
line = "「で、そうすると、会長くんの声がだんだん甘くなってきて、『お姉ちゃん、好き』って言って、後でたくさんキスしてくれるの～<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# あ゛あ゛あ゛あ゛あ゛あ゛あ゛っ！？
line = "あ゛あ゛あ゛あ゛あ゛あ゛あ゛っ！？"

[[dialogue]]
speaker = "マトイ"
# 「会長……２人きりの時はそんななんだ……」
line = "「会長……２人きりの時はそんななんだ……」"

[[dialogue]]
speaker = "アナ"
# 「ちょっと引く」
line = "「ちょっと引く」"

[[dialogue]]
speaker = "unk"
# いっそ殺してくれ！！　と思いながら、熱くなった顔面を両手で抑えてうずくまる俺。
line = "いっそ殺してくれ！！　と思いながら、熱くなった顔面を両手で抑えてうずくまる俺。"

[[dialogue]]
speaker = "サーシャ"
# 「あ、もちろん星徒会室では、服の上からしかやってないから安心してね♪」
line = "「あ、もちろん星徒会室では、服の上からしかやってないから安心してね♪」"

[[dialogue]]
speaker = "マトイ"
# 「そういう問題……？」
line = "「そういう問題……？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロトばっかりずるい！　私も姉さんにパフパフしてほしいわ！」
line = "「クロトばっかりずるい！　私も姉さんにパフパフしてほしいわ！」"

[[dialogue]]
speaker = "サーシャ"
# 「うふふっ、もちろんいいわよ～♪」
line = "「うふふっ、もちろんいいわよ～♪」"

[[dialogue]]
speaker = "サーシャ"
# 「は～い、ヴィーナスちゃん、いらっしゃ～い♪　お胸に、ぎゅ～っ<emoji=heart04>」
line = "「は～い、ヴィーナスちゃん、いらっしゃ～い♪　お胸に、ぎゅ～っ<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
# 「わぁ～っ♪　これ、すごいわ！　本当に顔全体がパフパフしてる！！」
line = "「わぁ～っ♪　これ、すごいわ！　本当に顔全体がパフパフしてる！！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「マトイ、アナ！　あなたたちも絶対やってもらった方がいいわ！　これを体験しないなんて損よ！」
line = "「マトイ、アナ！　あなたたちも絶対やってもらった方がいいわ！　これを体験しないなんて損よ！」"

[[dialogue]]
speaker = "unk"
# そこで、はっとなるマトイとアナの２人。
line = "そこで、はっとなるマトイとアナの２人。"

[[dialogue]]
speaker = "マトイ"
# （そ、そうか……！　サーシャさんのベアーハグは、おっぱいで息ができなくなるのが問題なのであって……）
line = "（そ、そうか……！　サーシャさんのベアーハグは、おっぱいで息ができなくなるのが問題なのであって……）"

[[dialogue]]
speaker = "アナ"
# （それをパフパフ……マッサージにすることで、強烈なハグはなくなり、柔らか天国がノープロブレムで堪能できる！）
line = "（それをパフパフ……マッサージにすることで、強烈なハグはなくなり、柔らか天国がノープロブレムで堪能できる！）"

[[dialogue]]
speaker = "マトイ＆アナ"
# 「ごくり……」
line = "「ごくり……」"

[[dialogue]]
speaker = "サーシャ"
# 「マトイちゃん、アナちゃん、遠慮せずにいらっしゃ～い<emoji=heart04>」
line = "「マトイちゃん、アナちゃん、遠慮せずにいらっしゃ～い<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
# 「姉さま！　パフパフ１つ、お願いします～」
line = "「姉さま！　パフパフ１つ、お願いします～」"

[[dialogue]]
speaker = "マトイ"
# 「アナ、抜け駆けはよくないよ！？　お姉ちゃん、私にも！！」
line = "「アナ、抜け駆けはよくないよ！？　お姉ちゃん、私にも！！」"

[[dialogue]]
speaker = "unk"
# その後、星徒会メンバーは全員、お姉ちゃんのパフパフに、まんまと骨抜きにされてしまうのであった。
line = "その後、星徒会メンバーは全員、お姉ちゃんのパフパフに、まんまと骨抜きにされてしまうのであった。"

[[dialogue]]
speaker = "unk"
# ……そして俺は、敷地の隅で恥ずかしくて泣いた。
line = "……そして俺は、敷地の隅で恥ずかしくて泣いた。"
