[[dialogue]]
speaker = "unk"
# 第１話,会長たちのウワサ,P
line = "第１話,会長たちのウワサ,P"

[[dialogue]]
speaker = "フィオナ"
# 「ふう……ひと仕事終えた後のティータイムは格別ですね。緋宮会長」
line = "「ふう……ひと仕事終えた後のティータイムは格別ですね。緋宮会長」"

[[dialogue]]
speaker = "unk"
# もっと格別だよ
line = "もっと格別だよ"

[[dialogue]]
speaker = "unk"
# フィオナと一緒だから
line = "フィオナと一緒だから"

[[dialogue]]
speaker = "フィオナ"
# 「あら。ふふ、お上手ですね。全くもう」
line = "「あら。ふふ、お上手ですね。全くもう」"

[[dialogue]]
speaker = "unk"
# 俺はフィオナとの定例会議を終え、いつものように和やかな放課後のひとときを過ごしていた。
line = "俺はフィオナとの定例会議を終え、いつものように和やかな放課後のひとときを過ごしていた。"

[[dialogue]]
speaker = "unk"
# だが……最近、困ったことがある。
line = "だが……最近、困ったことがある。"

[[dialogue]]
speaker = "噂する生徒"
# （ねえねえ……見て、あそこ）
line = "（ねえねえ……見て、あそこ）"

[[dialogue]]
speaker = "噂する生徒"
# （……やっぱり！　それならさ……）
line = "（……やっぱり！　それならさ……）"

[[dialogue]]
speaker = "フィオナ"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "フィオナ"
# （やはり……感じますね。視線を）
line = "（やはり……感じますね。視線を）"

[[dialogue]]
speaker = "unk"
# ２人でいると妙に視線を感じたり、ひそひそ話を囁かれたりすることが増えているのだった。
line = "２人でいると妙に視線を感じたり、ひそひそ話を囁かれたりすることが増えているのだった。"

[[dialogue]]
speaker = "unk"
# 俺たちが注目の的なのは以前からもそうだったが、ここ最近の視線はなんだか今までと毛色が違って……。
line = "俺たちが注目の的なのは以前からもそうだったが、ここ最近の視線はなんだか今までと毛色が違って……。"

[[dialogue]]
speaker = "フィオナ"
# （私たちが交際していることは、一部じゃ伝わっているとはいえ……最近は特に好奇の目線を感じます）
line = "（私たちが交際していることは、一部じゃ伝わっているとはいえ……最近は特に好奇の目線を感じます）"

[[dialogue]]
speaker = "フィオナ"
# （堂々とイチャイチャしすぎたのでしょうか？　いえ、ですが恋人としてあれくらいは当然と考えます）
line = "（堂々とイチャイチャしすぎたのでしょうか？　いえ、ですが恋人としてあれくらいは当然と考えます）"

[[dialogue]]
speaker = "フィオナ"
# （うまく言えませんが……妙な温度の視線、なんですよね……）
line = "（うまく言えませんが……妙な温度の視線、なんですよね……）"

[[dialogue]]
speaker = "フィオナ"
# （ルリエルにからかわれたりする分には、何も思わなかったのですが。陰ながら噂されるというのは、なんだかモヤモヤしますね）
line = "（ルリエルにからかわれたりする分には、何も思わなかったのですが。陰ながら噂されるというのは、なんだかモヤモヤしますね）"

[[dialogue]]
speaker = "unk"
# 注意してこようか
line = "注意してこようか"

[[dialogue]]
speaker = "unk"
# 有名税ってやつか
line = "有名税ってやつか"

[[dialogue]]
speaker = "フィオナ"
# 「あ、それほどでは──あくまで少々気になる程度のことですので」
line = "「あ、それほどでは──あくまで少々気になる程度のことですので」"

[[dialogue]]
speaker = "フィオナ"
# 「むしろ、私たちのほうこそ節度を守るべきなのかもしれません。会長同士として、生徒たちの模範になるような」
line = "「むしろ、私たちのほうこそ節度を守るべきなのかもしれません。会長同士として、生徒たちの模範になるような」"

[[dialogue]]
speaker = "フィオナ"
# 「……ですが、元々そのようにしていましたよね？　不思議です」
line = "「……ですが、元々そのようにしていましたよね？　不思議です」"

[[dialogue]]
speaker = "フィオナ"
# 「ちょっとドレスを着たり、プロポーズをしたり、旦那さんって呼んだり、期間限定で同居していただけなのに……こんな悪目立ちしてしまうなんて」
line = "「ちょっとドレスを着たり、プロポーズをしたり、旦那さんって呼んだり、期間限定で同居していただけなのに……こんな悪目立ちしてしまうなんて」"

[[dialogue]]
speaker = "unk"
# 俺が守るよ
line = "俺が守るよ"

[[dialogue]]
speaker = "unk"
# 気にしなくていい
line = "気にしなくていい"

[[dialogue]]
speaker = "フィオナ"
# 「緋宮会長……ふふ。ありがとうございます。そうですよね。大切な方が隣にいてくれるのなら、何も怖いものはありません」
line = "「緋宮会長……ふふ。ありがとうございます。そうですよね。大切な方が隣にいてくれるのなら、何も怖いものはありません」"

[[dialogue]]
speaker = "フィオナ"
# 「むしろ腕を組んで見せつけてやる？　そ、そこまでは──と言いつつ……アリなのかも、なんて……」
line = "「むしろ腕を組んで見せつけてやる？　そ、そこまでは──と言いつつ……アリなのかも、なんて……」"

[[dialogue]]
speaker = "フィオナ"
# 「──はっ！　だ、だめですだめです。節度ある行動を心がけると誓ったばかりですのに」
line = "「──はっ！　だ、だめですだめです。節度ある行動を心がけると誓ったばかりですのに」"

[[dialogue]]
speaker = "フィオナ"
# 「男女交際かくあるべしと──学生らしく、清らかな関係をアピールしましょう。ね、緋宮会長」
line = "「男女交際かくあるべしと──学生らしく、清らかな関係をアピールしましょう。ね、緋宮会長」"

[[dialogue]]
speaker = "フィオナ"
# 「──ふふ、久しぶりにこちらへやって来ましたね」
line = "「──ふふ、久しぶりにこちらへやって来ましたね」"

[[dialogue]]
speaker = "フィオナ"
# 「お目当て？　ふふ、バレましたか。今日は例の漫画から、新作アクリルキーホルダーが発売されるみたいなんです」
line = "「お目当て？　ふふ、バレましたか。今日は例の漫画から、新作アクリルキーホルダーが発売されるみたいなんです」"

[[dialogue]]
speaker = "フィオナ"
# 「私もお気に入りのキャラクターですので、これはぜひゲットせねばと思いまして♪」
line = "「私もお気に入りのキャラクターですので、これはぜひゲットせねばと思いまして♪」"

[[dialogue]]
speaker = "フィオナ"
# 「──はっ」
line = "「──はっ」"

[[dialogue]]
speaker = "unk"
# 何かあった？
line = "何かあった？"

[[dialogue]]
speaker = "unk"
# どうした？
line = "どうした？"

[[dialogue]]
speaker = "フィオナ"
# 「いえ……またなんだか、視線を感じたような気がしてしまって」
line = "「いえ……またなんだか、視線を感じたような気がしてしまって」"

[[dialogue]]
speaker = "フィオナ"
# 「よく考えれば──放課後に男子生徒とデートをして、というのも、悪目立ちする行為ではないでしょうか」
line = "「よく考えれば──放課後に男子生徒とデートをして、というのも、悪目立ちする行為ではないでしょうか」"

[[dialogue]]
speaker = "フィオナ"
# 「このままだとまた、良からぬ噂が立ってしまうのでは……と考えてしまって……」
line = "「このままだとまた、良からぬ噂が立ってしまうのでは……と考えてしまって……」"

[[dialogue]]
speaker = "unk"
# 変装でもする？
line = "変装でもする？"

[[dialogue]]
speaker = "フィオナ"
# 「……変装？　ふふっ、それも面白いですね！」
line = "「……変装？　ふふっ、それも面白いですね！」"

[[dialogue]]
speaker = "フィオナ"
# 「緋宮会長といると、小さな悩みはいつも吹き飛んでしまう気がします。さすがですね」
line = "「緋宮会長といると、小さな悩みはいつも吹き飛んでしまう気がします。さすがですね」"

[[dialogue]]
speaker = "フィオナ"
# 「さ……気にせず私たちらしく参りましょうか」
line = "「さ……気にせず私たちらしく参りましょうか」"
