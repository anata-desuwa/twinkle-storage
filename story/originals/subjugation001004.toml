[[dialogue]]
speaker = "unk"
# ドタバタしつつも翌日。附属校生活２日目迎えた俺たちは、大聖堂カフェテリアで一緒に昼食をすることになった。
line = "ドタバタしつつも翌日。附属校生活２日目迎えた俺たちは、大聖堂カフェテリアで一緒に昼食をすることになった。"

[[dialogue]]
speaker = "セシア"
# 「クロトママ～♪　セシアにまた、あ～んってご飯を食べさせて欲しいの♪」
line = "「クロトママ～♪　セシアにまた、あ～んってご飯を食べさせて欲しいの♪」"

[[dialogue]]
speaker = "unk"
# 仕方ないな～。はい、あ～ん
line = "仕方ないな～。はい、あ～ん"

[[dialogue]]
speaker = "セシア"
# 「あむっ♪　んふふ～♪」
line = "「あむっ♪　んふふ～♪」"

[[dialogue]]
speaker = "セシア"
# 「――え？　頬っぺたにご飯が付いてるって？　んっ♪　えへへ、取ってくれてありがと～♪」
line = "「――え？　頬っぺたにご飯が付いてるって？　んっ♪　えへへ、取ってくれてありがと～♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「ぐぬぬ……」
line = "「ぐぬぬ……」"

[[dialogue]]
speaker = "ナミエル"
# （緋宮会長、満更でもない顔をしてますね……セシア様がちょっと羨まし――）
line = "（緋宮会長、満更でもない顔をしてますね……セシア様がちょっと羨まし――）"

[[dialogue]]
speaker = "ナミエル"
# （い、いやいや！　何を考えているんですか、私！　見た目がかわいい女の子でも、中身は男！　緋宮会長は男ですから！）
line = "（い、いやいや！　何を考えているんですか、私！　見た目がかわいい女の子でも、中身は男！　緋宮会長は男ですから！）"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「はぁ……まさか、セシアからもママダレナと呼ばれなくなってしまうだなんて……」
line = "「はぁ……まさか、セシアからもママダレナと呼ばれなくなってしまうだなんて……」"

[[dialogue]]
speaker = "ナミエル"
# 「あ、その……マグダレナ様、元気を出して下さい」
line = "「あ、その……マグダレナ様、元気を出して下さい」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「ナミエルさま、ありがとうございます……」
line = "「ナミエルさま、ありがとうございます……」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「マグダレナ、落ち込んでいる時は、お肉を食べるのだ、お肉！　お腹がいっぱいになれば、嫌なことも忘れてしまうぞ！　もぐもぐ♪」
line = "「マグダレナ、落ち込んでいる時は、お肉を食べるのだ、お肉！　お腹がいっぱいになれば、嫌なことも忘れてしまうぞ！　もぐもぐ♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「いやそれは、やけ食いというものでは？」
line = "「いやそれは、やけ食いというものでは？」"

[[dialogue]]
speaker = "unk"
# というか、前の体より食欲増してない！？
line = "というか、前の体より食欲増してない！？"

[[dialogue]]
speaker = "ナミエル"
# 「お、おかわりした食器の枚数が、すごいことになっていますね……」
line = "「お、おかわりした食器の枚数が、すごいことになっていますね……」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「うむ！　体が小さくなったせいか、お腹がよく空くのだ！」
line = "「うむ！　体が小さくなったせいか、お腹がよく空くのだ！」"

[[dialogue]]
speaker = "ナミエル"
# 「普通は逆のような……」
line = "「普通は逆のような……」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「そうなのか？」
line = "「そうなのか？」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「でも、美味しいお肉を前より沢山食べられるようになったのは、お得だな♪　もぐもぐ♪」
line = "「でも、美味しいお肉を前より沢山食べられるようになったのは、お得だな♪　もぐもぐ♪」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「あ、そうだ！　みんな、今日の放課後は時間あるか？」
line = "「あ、そうだ！　みんな、今日の放課後は時間あるか？」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「アルモたんは学生らしく、みんなでできる遊びがしてみたいのだ！」
line = "「アルモたんは学生らしく、みんなでできる遊びがしてみたいのだ！」"

[[dialogue]]
speaker = "ナミエル"
# 「遊び、ですか……？」
line = "「遊び、ですか……？」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「そう――鬼ごっことか！」
line = "「そう――鬼ごっことか！」"

[[dialogue]]
speaker = "ナミエル"
# 「お、鬼ごっこ？」
line = "「お、鬼ごっこ？」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「ん？　ナミエル、会長、なんでそんな意外そうな顔をしているのだ？」
line = "「ん？　ナミエル、会長、なんでそんな意外そうな顔をしているのだ？」"

[[dialogue]]
speaker = "unk"
# 附属生でも鬼ごっこはあまりしないかな……
line = "附属生でも鬼ごっこはあまりしないかな……"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「えっ、そうなのか！？」
line = "「えっ、そうなのか！？」"

[[dialogue]]
speaker = "ナミエル"
# 「は、はい。特に今時だとは……かなり小さな子がする遊びかと……」
line = "「は、はい。特に今時だとは……かなり小さな子がする遊びかと……」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「むむ……そうなのか。学生になったら体験できるかもと思っていたのだが、残念なのだ……」
line = "「むむ……そうなのか。学生になったら体験できるかもと思っていたのだが、残念なのだ……」"

[[dialogue]]
speaker = "unk"
# しゅんとした顔をするアルモたん。俺はそれを見て――
line = "しゅんとした顔をするアルモたん。俺はそれを見て――"

[[dialogue]]
speaker = "unk"
# やろっか、鬼ごっこ
line = "やろっか、鬼ごっこ"

[[dialogue]]
speaker = "ナミエル"
# 「えっ？」
line = "「えっ？」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「会長……？」
line = "「会長……？」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「――アルモたんと遊んでくれるのか？　えへへ♪」
line = "「――アルモたんと遊んでくれるのか？　えへへ♪」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「ありがとうなのだ、会長♪　ぎゅ～っ♪」
line = "「ありがとうなのだ、会長♪　ぎゅ～っ♪」"

[[dialogue]]
speaker = "セシア"
# 「あ～！　アルモタヘル、割り込みはダメよ。クロトママはセシアを構ってくれてたんだから」
line = "「あ～！　アルモタヘル、割り込みはダメよ。クロトママはセシアを構ってくれてたんだから」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「ふふ～ん♪　独り占めはよくないぞ、セシア。アルモたんもたまには、会長に甘えたい時があるのだ♪」
line = "「ふふ～ん♪　独り占めはよくないぞ、セシア。アルモたんもたまには、会長に甘えたい時があるのだ♪」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「あっ……えへへ♪　頭撫でるのくすぐったいぞ、人の子よ♪」
line = "「あっ……えへへ♪　頭撫でるのくすぐったいぞ、人の子よ♪」"

[[dialogue]]
speaker = "unk"
# そんなわけで、放課後――
line = "そんなわけで、放課後――"

[[dialogue]]
speaker = "ナミエル"
# 「まさか、本当に鬼ごっこをすることになるなんて……」
line = "「まさか、本当に鬼ごっこをすることになるなんて……」"

[[dialogue]]
speaker = "ナミエル"
# 「しかも――」
line = "「しかも――」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「よ～し、それじゃあみんなで、鬼ごっこをするのだ～！」
line = "「よ～し、それじゃあみんなで、鬼ごっこをするのだ～！」"

[[dialogue]]
speaker = "クラスメイト達"
# 「お～！！！」
line = "「お～！！！」"

[[dialogue]]
speaker = "ナミエル"
# 「クラスの皆さまがこんなに沢山、参加したいと言い出すなんて……」
line = "「クラスの皆さまがこんなに沢山、参加したいと言い出すなんて……」"

[[dialogue]]
speaker = "セシア"
# 「セシアもクロトママと一緒に参加するわ♪」
line = "「セシアもクロトママと一緒に参加するわ♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「ふふっ、これは楽しくなりそうですね♪」
line = "「ふふっ、これは楽しくなりそうですね♪」"

[[dialogue]]
speaker = "unk"
# こうして、賑やかな鬼ごっこが開催されることになったのだった――
line = "こうして、賑やかな鬼ごっこが開催されることになったのだった――"
