[[dialogue]]
speaker = "unk"
# 俺たちはリゾート結界での特訓を活かし、新種モンスターと戦闘を繰り広げていた。
line = "俺たちはリゾート結界での特訓を活かし、新種モンスターと戦闘を繰り広げていた。"

[[dialogue]]
speaker = "モンスター"
# 「ギギギ……！」
line = "「ギギギ……！」"

[[dialogue]]
speaker = "アム"
# 「とりゃあぁぁぁっ！」
line = "「とりゃあぁぁぁっ！」"

[[dialogue]]
speaker = "unk"
# アムが重力操作で盾をホバークラフトのように浮かせて、モンスター群に突撃する。
line = "アムが重力操作で盾をホバークラフトのように浮かせて、モンスター群に突撃する。"

[[dialogue]]
speaker = "unk"
# 逃げ遅れた人達の前に割って入り、シールドバッシュで敵を蹴散らす。
line = "逃げ遅れた人達の前に割って入り、シールドバッシュで敵を蹴散らす。"

[[dialogue]]
speaker = "アム"
# （考えるのを止めるな。周りをちゃんと見て、次にどこの人を助けるべきか考えて動け、あたし……！）
line = "（考えるのを止めるな。周りをちゃんと見て、次にどこの人を助けるべきか考えて動け、あたし……！）"

[[dialogue]]
speaker = "unk"
# ホバークラフト移動の機動力を活かして、アムはエリア内を縦横無尽に立ち回って行く。
line = "ホバークラフト移動の機動力を活かして、アムはエリア内を縦横無尽に立ち回って行く。"

[[dialogue]]
speaker = "unk"
# その一方、マトイは――
line = "その一方、マトイは――"

[[dialogue]]
speaker = "マトイ"
# （焦るな、私。アムちゃんみたいな動きは、私にはできない。目の前の敵に集中しろ。目立つ星術でヘイトを集めて、訓練通りの状況を作り出せ）
line = "（焦るな、私。アムちゃんみたいな動きは、私にはできない。目の前の敵に集中しろ。目立つ星術でヘイトを集めて、訓練通りの状況を作り出せ）"

[[dialogue]]
speaker = "マトイ"
# 「エレキハイドランジア！」
line = "「エレキハイドランジア！」"

[[dialogue]]
speaker = "エレマル"
# 「……！　ギギ！」
line = "「……！　ギギ！」"

[[dialogue]]
speaker = "マトイ"
# （よし、モンスター群の注意がこちらに向いた。あとは普通に、対処すればいいだけ）
line = "（よし、モンスター群の注意がこちらに向いた。あとは普通に、対処すればいいだけ）"

[[dialogue]]
speaker = "マトイ"
# 「……インパルスアイリス！」
line = "「……インパルスアイリス！」"

[[dialogue]]
speaker = "マトイ"
# 「よし……次！」
line = "「よし……次！」"

[[dialogue]]
speaker = "unk"
# 迫り来るモンスターの群れの攻撃を盾で捌きながら、１体１体着実に倒して行く。
line = "迫り来るモンスターの群れの攻撃を盾で捌きながら、１体１体着実に倒して行く。"

[[dialogue]]
speaker = "マハムート"
# 「２人共、ちゃんと訓練の成果が出ているようね。ところで、さっきから思っていたのだけれど――」
line = "「２人共、ちゃんと訓練の成果が出ているようね。ところで、さっきから思っていたのだけれど――」"

[[dialogue]]
speaker = "モンスター"
# 「ギギギ！」
line = "「ギギギ！」"

[[dialogue]]
speaker = "マハムート"
# 「貴方たち、頭が高いわよ。全員畏怖を持って、跪きなさい」
line = "「貴方たち、頭が高いわよ。全員畏怖を持って、跪きなさい」"

[[dialogue]]
speaker = "エレマル"
# 「ギッ……！？」
line = "「ギッ……！？」"

[[dialogue]]
speaker = "unk"
# マムの言葉を受けた、次の瞬間。周囲を飛び回っていたモンスター群は１匹残らず地上に落下、地面にめり込んで動けなくなる。そして――
line = "マムの言葉を受けた、次の瞬間。周囲を飛び回っていたモンスター群は１匹残らず地上に落下、地面にめり込んで動けなくなる。そして――"

[[dialogue]]
speaker = "マハムート"
# 「さあ、私のサーブを受けてみなさい」
line = "「さあ、私のサーブを受けてみなさい」"

[[dialogue]]
speaker = "マハムート"
# 「グラビトンサーブ！」
line = "「グラビトンサーブ！」"

[[dialogue]]
speaker = "モンスター"
# 「ギーーーッ！！？」
line = "「ギーーーッ！！？」"

[[dialogue]]
speaker = "unk"
# モンスター群は竜の洗礼を浴びることになるのだった。
line = "モンスター群は竜の洗礼を浴びることになるのだった。"

[[dialogue]]
speaker = "unk"
# エリア内の新種モンスターが数を減らしつつある中、マトイはとある女の子を助けていた。
line = "エリア内の新種モンスターが数を減らしつつある中、マトイはとある女の子を助けていた。"

[[dialogue]]
speaker = "マトイ"
# 「よし、ひとまず周りのモンスターは倒せた。……怪我はない？」
line = "「よし、ひとまず周りのモンスターは倒せた。……怪我はない？」"

[[dialogue]]
speaker = "女の子"
# 「あ、ありがとうございます……お姉さん……！」
line = "「あ、ありがとうございます……お姉さん……！」"

[[dialogue]]
speaker = "マトイ"
# 「やたらモンスターに狙われてるから何かと思ったけど、あなた、星力を持っているのね」
line = "「やたらモンスターに狙われてるから何かと思ったけど、あなた、星力を持っているのね」"

[[dialogue]]
speaker = "女の子"
# 「は、はい」
line = "「は、はい」"

[[dialogue]]
speaker = "マトイ"
# 「でも、もう大丈夫。これから私たちがモンスターの囲いを突破して、脱出できる道を作るから。安心して」
line = "「でも、もう大丈夫。これから私たちがモンスターの囲いを突破して、脱出できる道を作るから。安心して」"

[[dialogue]]
speaker = "女の子"
# 「はい……！　って、あれ……？」
line = "「はい……！　って、あれ……？」"

[[dialogue]]
speaker = "マトイ"
# 「どうしたの？　空に何か……？」
line = "「どうしたの？　空に何か……？」"

[[dialogue]]
speaker = "unk"
# 女の子が見上げた先に、マトイが視線を向けると――
line = "女の子が見上げた先に、マトイが視線を向けると――"

[[dialogue]]
speaker = "マトイ"
# 「あれは……！？」
line = "「あれは……！？」"

[[dialogue]]
speaker = "モンスター"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# エリア上空に巨大なモンスターの姿があった。
line = "エリア上空に巨大なモンスターの姿があった。"

[[dialogue]]
speaker = "unk"
# そして、モンスターが大きく口を開くと――
line = "そして、モンスターが大きく口を開くと――"

[[dialogue]]
speaker = "モンスター"
# 「ギギギ……！」
line = "「ギギギ……！」"

[[dialogue]]
speaker = "unk"
# なんと、口の中からモンスターが大量に吐き出されて行く。
line = "なんと、口の中からモンスターが大量に吐き出されて行く。"

[[dialogue]]
speaker = "unk"
# 減らしたはずの新種モンスターが、むしろ最初よりも数を増し始めていた――
line = "減らしたはずの新種モンスターが、むしろ最初よりも数を増し始めていた――"

[[dialogue]]
speaker = "マハムート"
# 「……ヒルディオーネからの報告を聞いた時、アステラが出現したわけじゃないのに、一体どこから大量のモンスターが出現したのか疑問だった」
line = "「……ヒルディオーネからの報告を聞いた時、アステラが出現したわけじゃないのに、一体どこから大量のモンスターが出現したのか疑問だった」"

[[dialogue]]
speaker = "マハムート"
# 「だけど、これではっきりしたわ。１体の大型モンスターがアステラの代わりに、大量のモンスターを収納していたというわけね」
line = "「だけど、これではっきりしたわ。１体の大型モンスターがアステラの代わりに、大量のモンスターを収納していたというわけね」"

[[dialogue]]
speaker = "マハムート"
# 「――会長！　気を引き締め直しなさい」
line = "「――会長！　気を引き締め直しなさい」"

[[dialogue]]
speaker = "マハムート"
# 「ここからは、厳しい戦場になるわよ」
line = "「ここからは、厳しい戦場になるわよ」"

[[dialogue]]
speaker = "unk"
# 俺たちは再び、大量の新種モンスターを相手に戦闘を開始するのだった。
line = "俺たちは再び、大量の新種モンスターを相手に戦闘を開始するのだった。"
