[[dialogue]]
speaker = "キサナ"
# 「あぁ？　どうした！？　かかってこいっつってんだろうが！」
line = "「あぁ？　どうした！？　かかってこいっつってんだろうが！」"

[[dialogue]]
speaker = "ミア"
# 「きゃふっ！？　くっ……！！」
line = "「きゃふっ！？　くっ……！！」"

[[dialogue]]
speaker = "キサナ"
# 「デカい口叩いたクセに逃げてんじゃねえぞ、このガキ！　星騎士ってのはどいつもこいつも逃げるしか能がねえのかよ？」
line = "「デカい口叩いたクセに逃げてんじゃねえぞ、このガキ！　星騎士ってのはどいつもこいつも逃げるしか能がねえのかよ？」"

[[dialogue]]
speaker = "ミア"
# 「きゃっ！　な、なんて滅茶苦茶な相手なの……！　周りに人がたくさんいるっていうのに……！」
line = "「きゃっ！　な、なんて滅茶苦茶な相手なの……！　周りに人がたくさんいるっていうのに……！」"

[[dialogue]]
speaker = "ミア"
# 「とにかく今は人のいない場所までアイツを誘導しなくちゃ……！　こんな場所で戦って誰かが巻き込まれでもしたら……！」
line = "「とにかく今は人のいない場所までアイツを誘導しなくちゃ……！　こんな場所で戦って誰かが巻き込まれでもしたら……！」"

[[dialogue]]
speaker = "ミア"
# 「はぁはぁっ、ここなら……！」
line = "「はぁはぁっ、ここなら……！」"

[[dialogue]]
speaker = "キサナ"
# 「ようやく串刺しになる覚悟ができたか？　それとも膝が震えすぎてもう動けませんってか？」
line = "「ようやく串刺しになる覚悟ができたか？　それとも膝が震えすぎてもう動けませんってか？」"

[[dialogue]]
speaker = "ミア"
# 「だ、黙りなさいっ。あんたなんか怖くもなんともないんだからっ……！」
line = "「だ、黙りなさいっ。あんたなんか怖くもなんともないんだからっ……！」"

[[dialogue]]
speaker = "ミア"
# （落ち着くのよ、ミア。少しでも隙を見せたらきっと一瞬でやられる。救援を呼んでいる暇はない。こうなったからには私が一人でコイツを倒すしかない……！）
line = "（落ち着くのよ、ミア。少しでも隙を見せたらきっと一瞬でやられる。救援を呼んでいる暇はない。こうなったからには私が一人でコイツを倒すしかない……！）"

[[dialogue]]
speaker = "ミア"
# （私のバカっ……！　バカバカバカっ！　素直にエリス先輩の言うことを聞いていれば……会長さんと一緒にいれば、こんな事態にはならなかったのに……！）
line = "（私のバカっ……！　バカバカバカっ！　素直にエリス先輩の言うことを聞いていれば……会長さんと一緒にいれば、こんな事態にはならなかったのに……！）"

[[dialogue]]
speaker = "ミア"
# （私に、倒せるのかしら……。エリス先輩を一方的に打ちのめした敵を……。エリス先輩より弱くて未熟な私が一人で……）
line = "（私に、倒せるのかしら……。エリス先輩を一方的に打ちのめした敵を……。エリス先輩より弱くて未熟な私が一人で……）"

[[dialogue]]
speaker = "キサナ"
# 「どこ見てやがる。敵の前でぼさっとしてんじゃねえ！」
line = "「どこ見てやがる。敵の前でぼさっとしてんじゃねえ！」"

[[dialogue]]
speaker = "ミア"
# 「きゃあっ！？　はぁはぁっ、うぐっ……！」
line = "「きゃあっ！？　はぁはぁっ、うぐっ……！」"

[[dialogue]]
speaker = "キサナ"
# 「ハッ、正義の味方が戦ってる時にビビってんじゃねえよ。それともなんだ？　星騎士ってのはヒーローショーの真似事しかできねえのか？」
line = "「ハッ、正義の味方が戦ってる時にビビってんじゃねえよ。それともなんだ？　星騎士ってのはヒーローショーの真似事しかできねえのか？」"

[[dialogue]]
speaker = "キサナ"
# 「プチプチプチプチ雑魚モンスター潰して回って拍手喝采キャー素敵ってか？　いいご身分だなぁ！　羨ましいぜ！」
line = "「プチプチプチプチ雑魚モンスター潰して回って拍手喝采キャー素敵ってか？　いいご身分だなぁ！　羨ましいぜ！」"

[[dialogue]]
speaker = "ミア"
# 「くっ！　ひゃっ……！」
line = "「くっ！　ひゃっ……！」"

[[dialogue]]
speaker = "キサナ"
# 「んだよ、避けんじゃねえよ。結局逃げんじゃねえか。これなら昨日の金髪女の方がいくぶんか上等な獲物だったぜ」
line = "「んだよ、避けんじゃねえよ。結局逃げんじゃねえか。これなら昨日の金髪女の方がいくぶんか上等な獲物だったぜ」"

[[dialogue]]
speaker = "キサナ"
# 「もう──殺すか」
line = "「もう──殺すか」"

[[dialogue]]
speaker = "ミア"
# 「あうっ……！」
line = "「あうっ……！」"

[[dialogue]]
speaker = "ミア"
# （怖い……！　怖い怖い怖い……！　本物の殺意を向けられることが、こんなにも怖いことだったなんて……！）
line = "（怖い……！　怖い怖い怖い……！　本物の殺意を向けられることが、こんなにも怖いことだったなんて……！）"

[[dialogue]]
speaker = "ミア"
# （だけど、逃げるわけにはいかない……！　ここで逃げたら、立ち向かえなかったら──）
line = "（だけど、逃げるわけにはいかない……！　ここで逃げたら、立ち向かえなかったら──）"

[[dialogue]]
speaker = "ミア"
# 「私は一生ママとパパみたいな立派な星騎士になんてなれないもんっ！」
line = "「私は一生ママとパパみたいな立派な星騎士になんてなれないもんっ！」"

[[dialogue]]
speaker = "キサナ"
# 「あぁ……その目、イライラする。自分が正しいことを疑ってねえ、正義に燃えてますって目。アタシの嫌いな目だ」
line = "「あぁ……その目、イライラする。自分が正しいことを疑ってねえ、正義に燃えてますって目。アタシの嫌いな目だ」"

[[dialogue]]
speaker = "ミア"
# （恐れないで、ミア……！　相手は私を子どもだと思って舐めてる……！　その油断を突くの……！）
line = "（恐れないで、ミア……！　相手は私を子どもだと思って舐めてる……！　その油断を突くの……！）"

[[dialogue]]
speaker = "ミア"
# （私だって何も闇雲に逃げ回っていたわけじゃない。私の力は『燃焼』。体に熱を溜めれば溜めるほど私は星力を高められる……！）
line = "（私だって何も闇雲に逃げ回っていたわけじゃない。私の力は『燃焼』。体に熱を溜めれば溜めるほど私は星力を高められる……！）"

[[dialogue]]
speaker = "ミア"
# （体はもう十分温まってるわ。あとはこの溜めに溜めた全熱量を一気に解放してぶつけに行くだけ……！）
line = "（体はもう十分温まってるわ。あとはこの溜めに溜めた全熱量を一気に解放してぶつけに行くだけ……！）"

[[dialogue]]
speaker = "ミア"
# （この技だけは絶対の自信がある……！　たとえ相手がエリス先輩を打ちのめした相手でも、避けられない限り勝機はある……！）
line = "（この技だけは絶対の自信がある……！　たとえ相手がエリス先輩を打ちのめした相手でも、避けられない限り勝機はある……！）"

[[dialogue]]
speaker = "ミア"
# （だけどこれは全星力を込めた一度きりの大技。一度熱を放出してしまえばろくに動けなくなってしまう諸刃の剣）
line = "（だけどこれは全星力を込めた一度きりの大技。一度熱を放出してしまえばろくに動けなくなってしまう諸刃の剣）"

[[dialogue]]
speaker = "ミア"
# （そして、万が一外してしまえば私は──）
line = "（そして、万が一外してしまえば私は──）"

[[dialogue]]
speaker = "キサナ"
# 「ちょうどいい。その目玉、抉り抜いてやるか」
line = "「ちょうどいい。その目玉、抉り抜いてやるか」"

[[dialogue]]
speaker = "ミア"
# 「っっ──！！」
line = "「っっ──！！」"

[[dialogue]]
speaker = "ミア"
# （震えないで、私の足……！　今動かないでいつ動くのよ……！）
line = "（震えないで、私の足……！　今動かないでいつ動くのよ……！）"

[[dialogue]]
speaker = "ミア"
# （勇気を出すのっ！　この技だけは──エリス先輩にだって褒めてもらえたんだからっ！）
line = "（勇気を出すのっ！　この技だけは──エリス先輩にだって褒めてもらえたんだからっ！）"

[[dialogue]]
speaker = "ミア"
# 「食らいなさいっ──バーニング・エクスプロージョン！！」
line = "「食らいなさいっ──バーニング・エクスプロージョン！！」"

[[dialogue]]
speaker = "ミア"
# （灼熱をまとって突進するだけの単純な攻撃。でもこの速度は、威力は、エリス先輩にだって負けない──！！）
line = "（灼熱をまとって突進するだけの単純な攻撃。でもこの速度は、威力は、エリス先輩にだって負けない──！！）"

[[dialogue]]
speaker = "キサナ"
# 「ハッ……」
line = "「ハッ……」"

[[dialogue]]
speaker = "ミア"
# 「え…………？」
line = "「え…………？」"

[[dialogue]]
speaker = "キサナ"
# 「貧相な見た目の割には大した星力だが、所詮こんなもんか。腹の半分にも足りねえ」
line = "「貧相な見た目の割には大した星力だが、所詮こんなもんか。腹の半分にも足りねえ」"

[[dialogue]]
speaker = "ミア"
# 「な、なんでこんなあっさり止められて…………──きゃあっ！？」
line = "「な、なんでこんなあっさり止められて…………──きゃあっ！？」"

[[dialogue]]
speaker = "キサナ"
# 「あぁ……羨ましいなぁ、星騎士ってやつは。弱くてもなれて、ヒーロー気取りでチヤホヤされんだからよ」
line = "「あぁ……羨ましいなぁ、星騎士ってやつは。弱くてもなれて、ヒーロー気取りでチヤホヤされんだからよ」"

[[dialogue]]
speaker = "ミア"
# 「あうっ……！　はっ、はああああっっ……！！」
line = "「あうっ……！　はっ、はああああっっ……！！」"

[[dialogue]]
speaker = "キサナ"
# 「アハハハッ！　なんだ、その苦し紛れの攻撃は。ロウソクに火でもつける気か？」
line = "「アハハハッ！　なんだ、その苦し紛れの攻撃は。ロウソクに火でもつける気か？」"

[[dialogue]]
speaker = "ミア"
# 「なっ──……！？　わ、私の星力が打ち消されて……！？」
line = "「なっ──……！？　わ、私の星力が打ち消されて……！？」"

[[dialogue]]
speaker = "キサナ"
# 「いいだろ、この力。星力に頼り切りの星騎士サマの素顔を嫌でも曝け出させてやれる」
line = "「いいだろ、この力。星力に頼り切りの星騎士サマの素顔を嫌でも曝け出させてやれる」"

[[dialogue]]
speaker = "キサナ"
# 「どうした、もう終わりか？　アタシを倒すんだろ？　アタシが許せねえんだろ？　あぁ？　正義の味方さんよぉ？」
line = "「どうした、もう終わりか？　アタシを倒すんだろ？　アタシが許せねえんだろ？　あぁ？　正義の味方さんよぉ？」"

[[dialogue]]
speaker = "ミア"
# 「くっ…………」
line = "「くっ…………」"

[[dialogue]]
speaker = "ミア"
# （ダメ、もう体に力が……。星力を、使い切っちゃって……）
line = "（ダメ、もう体に力が……。星力を、使い切っちゃって……）"

[[dialogue]]
speaker = "キサナ"
# 「……んだよ。マジで終わりかよ。やっぱガキはガキだな……」
line = "「……んだよ。マジで終わりかよ。やっぱガキはガキだな……」"

[[dialogue]]
speaker = "キサナ"
# 「じゃ、死ね」
line = "「じゃ、死ね」"

[[dialogue]]
speaker = "ミア"
# 「きゃっ──きゃあああああああっっ～～！！」
line = "「きゃっ──きゃあああああああっっ～～！！」"
