[[dialogue]]
speaker = "unk"
# リップルに誘われて、フィオナと俺はサーフィン体験をしてみることになった――
line = "リップルに誘われて、フィオナと俺はサーフィン体験をしてみることになった――"

[[dialogue]]
speaker = "リップル"
# 「フィオナ！　ボードの上に腹這いに乗ったら、パドリングして、ゆっくりでいいのでスープを見つけてクダさい！」
line = "「フィオナ！　ボードの上に腹這いに乗ったら、パドリングして、ゆっくりでいいのでスープを見つけてクダさい！」"

[[dialogue]]
speaker = "フィオナ"
# 「えっと……スープというのは……」
line = "「えっと……スープというのは……」"

[[dialogue]]
speaker = "リップル"
# 「波のことです！　白い波が立っているところでテイクオフ……ボードから立ち上がって、波に乗るんで～す♪」
line = "「波のことです！　白い波が立っているところでテイクオフ……ボードから立ち上がって、波に乗るんで～す♪」"

[[dialogue]]
speaker = "フィオナ"
# 「わ、分かりました。白い波が立っているところで、ボードから立ち……きゃっ！？」
line = "「わ、分かりました。白い波が立っているところで、ボードから立ち……きゃっ！？」"

[[dialogue]]
speaker = "フィオナ"
# 「海に落ちてしまいました……やはり、そう簡単には上手く行きませんね……」
line = "「海に落ちてしまいました……やはり、そう簡単には上手く行きませんね……」"

[[dialogue]]
speaker = "フィオナ"
# 「ユウリなら、もっと上手くできるかもしれません。んっ……バランス感覚的には、ソフィアの方が向いてるかも……」
line = "「ユウリなら、もっと上手くできるかもしれません。んっ……バランス感覚的には、ソフィアの方が向いてるかも……」"

[[dialogue]]
speaker = "リップル"
# 「ドンマイ、フィオナ！　ワタシも最初は数え切れないくらい落っこちて、波に乗れるようにナリました！」
line = "「ドンマイ、フィオナ！　ワタシも最初は数え切れないくらい落っこちて、波に乗れるようにナリました！」"

[[dialogue]]
speaker = "リップル"
# 「繰り返して、波に乗る感覚を体に覚えサセルのが、サーフィンの１つ目のポイントです！」
line = "「繰り返して、波に乗る感覚を体に覚えサセルのが、サーフィンの１つ目のポイントです！」"

[[dialogue]]
speaker = "フィオナ"
# 「波に乗る感覚……はい、分かりました。やってみます！」
line = "「波に乗る感覚……はい、分かりました。やってみます！」"

[[dialogue]]
speaker = "リップル"
# 「じゃあ同じように、カイチョーもやってみましょう……って、ワオ！？」
line = "「じゃあ同じように、カイチョーもやってみましょう……って、ワオ！？」"

[[dialogue]]
speaker = "フィオナ"
# 「えっ！？　緋宮会長……ボードの上に立ててる！？　まさかサーフィンの経験者だったんですか！？」
line = "「えっ！？　緋宮会長……ボードの上に立ててる！？　まさかサーフィンの経験者だったんですか！？」"

[[dialogue]]
speaker = "unk"
# 実はライフセーバーのバイトで――
line = "実はライフセーバーのバイトで――"

[[dialogue]]
speaker = "フィオナ"
# 「――サーフィンを教わったことがある？　……サバイバル経験といい、緋宮会長のバイト経歴が凄く気になるんですが……！」
line = "「――サーフィンを教わったことがある？　……サバイバル経験といい、緋宮会長のバイト経歴が凄く気になるんですが……！」"

[[dialogue]]
speaker = "リップル"
# 「カイチョー、スゴいで～す！　――少しカジっただけの初心者？　確かにまだフラついてはいますが、ボードの上に立ててるのは波の感覚を掴めている証拠で～す！」
line = "「カイチョー、スゴいで～す！　――少しカジっただけの初心者？　確かにまだフラついてはいますが、ボードの上に立ててるのは波の感覚を掴めている証拠で～す！」"

[[dialogue]]
speaker = "フィオナ"
# 「わ、私も……波に乗る感覚を身に着けて、ボードの上に……きゃっ！？」
line = "「わ、私も……波に乗る感覚を身に着けて、ボードの上に……きゃっ！？」"

[[dialogue]]
speaker = "リップル"
# 「フィオナ、今だとちょっと、ボードにノルのが遅過ぎます！」
line = "「フィオナ、今だとちょっと、ボードにノルのが遅過ぎます！」"

[[dialogue]]
speaker = "フィオナ"
# 「ぷはっ！　は、はい。分かりました……」
line = "「ぷはっ！　は、はい。分かりました……」"

[[dialogue]]
speaker = "unk"
# フィオナは普段、スポーツしたりするの？
line = "フィオナは普段、スポーツしたりするの？"

[[dialogue]]
speaker = "フィオナ"
# 「あはは。残念ながら、訓練やトレーニングはしても、スポーツは全然で……」
line = "「あはは。残念ながら、訓練やトレーニングはしても、スポーツは全然で……」"

[[dialogue]]
speaker = "フィオナ"
# 「せいぜいニャリオンと散歩して、一緒に公園で遊んだりとか……家で流星ライダーのポーズを真似したりとか……」
line = "「せいぜいニャリオンと散歩して、一緒に公園で遊んだりとか……家で流星ライダーのポーズを真似したりとか……」"

[[dialogue]]
speaker = "リップル"
# 「ポーズ？」
line = "「ポーズ？」"

[[dialogue]]
speaker = "フィオナ"
# 「あっ！？　いえ、全然話す程のことじゃなくて……！　れ、練習を続けましょう！」
line = "「あっ！？　いえ、全然話す程のことじゃなくて……！　れ、練習を続けましょう！」"

[[dialogue]]
speaker = "フィオナ"
# 「波を感じて……白い波が立っている辺りで……今！　きゃあっ！？」
line = "「波を感じて……白い波が立っている辺りで……今！　きゃあっ！？」"

[[dialogue]]
speaker = "リップル"
# 「惜しい！　今のだとちょっと、ボードにノるタイミングが早いで～す」
line = "「惜しい！　今のだとちょっと、ボードにノるタイミングが早いで～す」"

[[dialogue]]
speaker = "フィオナ"
# 「今のだと早過ぎ……分かりました！」
line = "「今のだと早過ぎ……分かりました！」"

[[dialogue]]
speaker = "リップル"
# 「焦らず、じっくり波のピークを見極めてクダさい。最初は大きな波にこだわる必要はナイので！」
line = "「焦らず、じっくり波のピークを見極めてクダさい。最初は大きな波にこだわる必要はナイので！」"

[[dialogue]]
speaker = "フィオナ"
# 「はい！」
line = "「はい！」"

[[dialogue]]
speaker = "フィオナ"
# 「波の感覚に身を任せて……今！　っ……ボードの上でバランスを……お、おぉぉ……！」
line = "「波の感覚に身を任せて……今！　っ……ボードの上でバランスを……お、おぉぉ……！」"

[[dialogue]]
speaker = "フィオナ"
# 「あっ……ダメッ……落ちる！　きゃんっ！？」
line = "「あっ……ダメッ……落ちる！　きゃんっ！？」"

[[dialogue]]
speaker = "フィオナ"
# 「ぷはっ……！　はぁ……はぁ……また失敗……！」
line = "「ぷはっ……！　はぁ……はぁ……また失敗……！」"

[[dialogue]]
speaker = "リップル"
# 「カイチョーはもう、すっかり波にノれるようにナリましたね～！　波の感覚を既に掴んでいたのが、やはり大きいです」
line = "「カイチョーはもう、すっかり波にノれるようにナリましたね～！　波の感覚を既に掴んでいたのが、やはり大きいです」"

[[dialogue]]
speaker = "unk"
# 大きい波に乗れると気持ちいいな！
line = "大きい波に乗れると気持ちいいな！"

[[dialogue]]
speaker = "リップル"
# 「カイチョーがサーフィン好きになってクレたみたいで、ワタシとってもハッピーで～す♪　趣味ナカマ出来て嬉しい♪」
line = "「カイチョーがサーフィン好きになってクレたみたいで、ワタシとってもハッピーで～す♪　趣味ナカマ出来て嬉しい♪」"

[[dialogue]]
speaker = "リップル"
# 「フィオナもナイスガッツで～す！　今一瞬だけ、ボードの上に立ててました。一日だけでＢＩＧウマくなってるとオモいます！」
line = "「フィオナもナイスガッツで～す！　今一瞬だけ、ボードの上に立ててました。一日だけでＢＩＧウマくなってるとオモいます！」"

[[dialogue]]
speaker = "フィオナ"
# 「はぁ……ふぅ……ありがとうございます」
line = "「はぁ……ふぅ……ありがとうございます」"

[[dialogue]]
speaker = "リップル"
# 「皆でサーフィン出来るの楽しくて、休憩なしで練習ツヅケてしまいました。気付けば、日も大分落ちてキテいますし……」
line = "「皆でサーフィン出来るの楽しくて、休憩なしで練習ツヅケてしまいました。気付けば、日も大分落ちてキテいますし……」"

[[dialogue]]
speaker = "リップル"
# 「今日はそろそろ、練習キリ上げましょうか。２人とも疲れてマスよね？」
line = "「今日はそろそろ、練習キリ上げましょうか。２人とも疲れてマスよね？」"

[[dialogue]]
speaker = "unk"
# そうだな。今日のところは……
line = "そうだな。今日のところは……"

[[dialogue]]
speaker = "フィオナ"
# 「……いえ、まだ行けます！」
line = "「……いえ、まだ行けます！」"

[[dialogue]]
speaker = "リップル"
# 「オゥ？」
line = "「オゥ？」"

[[dialogue]]
speaker = "フィオナ"
# 「今、惜しいところまで来ているんです。あと少しで感覚が掴めそうな……届きそうなところまで……！」
line = "「今、惜しいところまで来ているんです。あと少しで感覚が掴めそうな……届きそうなところまで……！」"

[[dialogue]]
speaker = "フィオナ"
# 「感覚が研ぎ澄まされている、今この瞬間、逃したくないんです。何より――」
line = "「感覚が研ぎ澄まされている、今この瞬間、逃したくないんです。何より――」"

[[dialogue]]
speaker = "フィオナ"
# 「緋宮会長が既にボードに乗れているのに、私も負けていられません……！」
line = "「緋宮会長が既にボードに乗れているのに、私も負けていられません……！」"

[[dialogue]]
speaker = "unk"
# （い、意外と負けず嫌いなのか……？）
line = "（い、意外と負けず嫌いなのか……？）"

[[dialogue]]
speaker = "フィオナ"
# 「だからリップルさん、お願いします！　このまま練習を続けさせて下さい！　私は、このまま諦めたくないんです……！」
line = "「だからリップルさん、お願いします！　このまま練習を続けさせて下さい！　私は、このまま諦めたくないんです……！」"

[[dialogue]]
speaker = "リップル"
# 「フィオナ、瞳に闘志の炎がメラメラ燃えてイルのが見えます……！」
line = "「フィオナ、瞳に闘志の炎がメラメラ燃えてイルのが見えます……！」"

[[dialogue]]
speaker = "リップル"
# 「ソウですよね！　ワタシにはその気持ち、よく分かります！　ワタシも上手く行かなくても、リゾート結界の完成を諦めたりはデキませんでしたから！」
line = "「ソウですよね！　ワタシにはその気持ち、よく分かります！　ワタシも上手く行かなくても、リゾート結界の完成を諦めたりはデキませんでしたから！」"

[[dialogue]]
speaker = "リップル"
# 「そういうことなら、フィオナの納得がユクまで、ワタシ練習に付き合います！　波に乗る感覚、掴んでみせてクダさい！」
line = "「そういうことなら、フィオナの納得がユクまで、ワタシ練習に付き合います！　波に乗る感覚、掴んでみせてクダさい！」"

[[dialogue]]
speaker = "フィオナ"
# 「リップルさん、ありがとうございます！　緋宮会長も、どうかお願いします！　私にサーフィンの感覚を教えて下さい！」
line = "「リップルさん、ありがとうございます！　緋宮会長も、どうかお願いします！　私にサーフィンの感覚を教えて下さい！」"

[[dialogue]]
speaker = "unk"
# えっ！？　俺！？
line = "えっ！？　俺！？"

[[dialogue]]
speaker = "フィオナ"
# 「――まだ自分も教わるレベルだから無理？　いえ、そんなことありません！　私にとっては現在進行形で上達している緋宮会長の感覚も教えて欲しいんです！」
line = "「――まだ自分も教わるレベルだから無理？　いえ、そんなことありません！　私にとっては現在進行形で上達している緋宮会長の感覚も教えて欲しいんです！」"

[[dialogue]]
speaker = "リップル"
# 「フィオナの熱いオモイに、ワタシも何だか燃えてキました！　こうなったら、今日はとことん３人でサーフィンしましょう！」
line = "「フィオナの熱いオモイに、ワタシも何だか燃えてキました！　こうなったら、今日はとことん３人でサーフィンしましょう！」"

[[dialogue]]
speaker = "フィオナ"
# 「はい！　２人共ご指導、よろしくお願いします！」
line = "「はい！　２人共ご指導、よろしくお願いします！」"

[[dialogue]]
speaker = "unk"
# え……ええぇぇぇ～～～っ！？
line = "え……ええぇぇぇ～～～っ！？"

[[dialogue]]
speaker = "unk"
# その日の練習は、夜中まで続いた――
line = "その日の練習は、夜中まで続いた――"

[[dialogue]]
speaker = "unk"
# 翌日。合宿６日目――
line = "翌日。合宿６日目――"

[[dialogue]]
speaker = "フィオナ"
# 「……いい波が来てるのが分かります！　行きます！　テイクオフ！」
line = "「……いい波が来てるのが分かります！　行きます！　テイクオフ！」"

[[dialogue]]
speaker = "フィオナ"
# 「はあぁっ！　エアリアル！」
line = "「はあぁっ！　エアリアル！」"

[[dialogue]]
speaker = "フィオナ"
# 「ふぅっ！　やりました！」
line = "「ふぅっ！　やりました！」"

[[dialogue]]
speaker = "フィオナ"
# 「リップルさん、波の高い部分からジャンプする技『エアリアル』、成功しましたよ！」
line = "「リップルさん、波の高い部分からジャンプする技『エアリアル』、成功しましたよ！」"

[[dialogue]]
speaker = "リップル"
# 「スゴい！　本当に、ＢＩＧスゴいです、フィオナ！」
line = "「スゴい！　本当に、ＢＩＧスゴいです、フィオナ！」"

[[dialogue]]
speaker = "リップル"
# 「ワタシ、感動しました！　ボードに立てるようになるだけでなく、１日でエアリアルまで出来るようになるなんて……！」
line = "「ワタシ、感動しました！　ボードに立てるようになるだけでなく、１日でエアリアルまで出来るようになるなんて……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「昨日、サーフィンの練習を始めたっていうのは聞いてたけど……とんでもない学習能力ね！　さすがフィオナだわ！」
line = "「昨日、サーフィンの練習を始めたっていうのは聞いてたけど……とんでもない学習能力ね！　さすがフィオナだわ！」"

[[dialogue]]
speaker = "マトイ"
# 「凄い……！　流星学園最強の星徒会長は、やっぱり普通じゃないね……！」
line = "「凄い……！　流星学園最強の星徒会長は、やっぱり普通じゃないね……！」"

[[dialogue]]
speaker = "サーシャ"
# 「ふふっ♪　今のフィオナちゃん、何だか活き活きしてるわ。とっても楽しそう♪」
line = "「ふふっ♪　今のフィオナちゃん、何だか活き活きしてるわ。とっても楽しそう♪」"

[[dialogue]]
speaker = "アナ"
# 「確かに。雰囲気が明るくなったような気がします」
line = "「確かに。雰囲気が明るくなったような気がします」"

[[dialogue]]
speaker = "フィオナ"
# 「緋宮会長も、見てくれましたか？　私もサーフィンが出来るようになりましたよ！」
line = "「緋宮会長も、見てくれましたか？　私もサーフィンが出来るようになりましたよ！」"

[[dialogue]]
speaker = "フィオナ"
# 「ですから今日は、更なるテクニックの習得に挑戦したいと思っています！　さあ、緋宮会長も一緒に練習しましょう！」
line = "「ですから今日は、更なるテクニックの習得に挑戦したいと思っています！　さあ、緋宮会長も一緒に練習しましょう！」"

[[dialogue]]
speaker = "unk"
# ま、まだやれる……だと……？
line = "ま、まだやれる……だと……？"

[[dialogue]]
speaker = "マトイ"
# 「……って、会長！？　何か海に沈んでない！？」
line = "「……って、会長！？　何か海に沈んでない！？」"

[[dialogue]]
speaker = "フィオナ"
# 「え！？」
line = "「え！？」"

[[dialogue]]
speaker = "unk"
# フィオナ、恐ろしい子……ガクリ
line = "フィオナ、恐ろしい子……ガクリ"

[[dialogue]]
speaker = "フィオナ"
# 「緋宮会長！？　大丈夫ですか、緋宮会長～！？」
line = "「緋宮会長！？　大丈夫ですか、緋宮会長～！？」"

[[dialogue]]
speaker = "unk"
# 俺はハードな練習で先に力尽きたものの、フィオナはサーフィンという新しい趣味に目覚めたようで、その後も楽しそうに練習を続けるのだった――
line = "俺はハードな練習で先に力尽きたものの、フィオナはサーフィンという新しい趣味に目覚めたようで、その後も楽しそうに練習を続けるのだった――"
