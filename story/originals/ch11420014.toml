[[dialogue]]
speaker = "unk"
# 第４話,最後の夜に,P
line = "第４話,最後の夜に,P"

[[dialogue]]
speaker = "unk"
# その知らせは、やはり突然だった。
line = "その知らせは、やはり突然だった。"

[[dialogue]]
speaker = "ラファエロ"
# 「そうか……それは吉報だね。いよいよアテネスに帰還する日がやってくるというわけだ」
line = "「そうか……それは吉報だね。いよいよアテネスに帰還する日がやってくるというわけだ」"

[[dialogue]]
speaker = "ステラ"
# 「思い返してみるとずいぶん長い間、この世界に居た気がしますね……」
line = "「思い返してみるとずいぶん長い間、この世界に居た気がしますね……」"

[[dialogue]]
speaker = "unk"
# 昨日の夜、ようやく全ての世界で事件が落ち着いたから、２人を元の世界に戻せるとベア子たちから知らせが来たのだった。
line = "昨日の夜、ようやく全ての世界で事件が落ち着いたから、２人を元の世界に戻せるとベア子たちから知らせが来たのだった。"

[[dialogue]]
speaker = "ステラ"
# 「ここで過ごすのも今日が最後……。明日には黒ベア子さんたちが、ボクたちを送り返しに来るんですよね？」
line = "「ここで過ごすのも今日が最後……。明日には黒ベア子さんたちが、ボクたちを送り返しに来るんですよね？」"

[[dialogue]]
speaker = "unk"
# 多分大丈夫だよ！
line = "多分大丈夫だよ！"

[[dialogue]]
speaker = "unk"
# 黒くない方が言ってたから
line = "黒くない方が言ってたから"

[[dialogue]]
speaker = "ルリエル"
# 「なるほど！　黒ベア子さんの方だと、今一つ信用に欠けましたが、黒くないベア子さんなら大丈夫そうですね～」
line = "「なるほど！　黒ベア子さんの方だと、今一つ信用に欠けましたが、黒くないベア子さんなら大丈夫そうですね～」"

[[dialogue]]
speaker = "ルリエル"
# 「とにかく今日で流星市国ともお別れですから、心残りの無いように楽しんでいってください♪」
line = "「とにかく今日で流星市国ともお別れですから、心残りの無いように楽しんでいってください♪」"

[[dialogue]]
speaker = "ラファエロ"
# 「さて、忙しくなりそうだ。やり残したことを全てやり尽くさないとね」
line = "「さて、忙しくなりそうだ。やり残したことを全てやり尽くさないとね」"

[[dialogue]]
speaker = "ステラ"
# 「やり残したこと？　ラファエロさんは何かあるんですか？」
line = "「やり残したこと？　ラファエロさんは何かあるんですか？」"

[[dialogue]]
speaker = "ラファエロ"
# 「大作を作っている最中なんだ。あと一息というところまでは来ているから、何としても今夜までに完成させてみせるよ」
line = "「大作を作っている最中なんだ。あと一息というところまでは来ているから、何としても今夜までに完成させてみせるよ」"

[[dialogue]]
speaker = "ステラ"
# 「ラファエロさんって、本当に藝術家なんですね……」
line = "「ラファエロさんって、本当に藝術家なんですね……」"

[[dialogue]]
speaker = "ラファエロ"
# 「ふふ、いまさら何を言っているんだい？　もしかしてステラはぼくが藝術家だと信じてなかったのかな？」
line = "「ふふ、いまさら何を言っているんだい？　もしかしてステラはぼくが藝術家だと信じてなかったのかな？」"

[[dialogue]]
speaker = "ステラ"
# 「あっ！　ご、ごめんなさい……そういう意味じゃなくて……」
line = "「あっ！　ご、ごめんなさい……そういう意味じゃなくて……」"

[[dialogue]]
speaker = "ラファエロ"
# 「分かっているよ。まさにきみの言う通り、ぼくはどこまでも、根っからの藝術家なんだ」
line = "「分かっているよ。まさにきみの言う通り、ぼくはどこまでも、根っからの藝術家なんだ」"

[[dialogue]]
speaker = "ラファエロ"
# 「だから、ひとつでも多くの作品を残すことで証を残し、そして……楽しい時間をくれたこの世界に、感謝の気持ちを示したいと思っている」
line = "「だから、ひとつでも多くの作品を残すことで証を残し、そして……楽しい時間をくれたこの世界に、感謝の気持ちを示したいと思っている」"

[[dialogue]]
speaker = "ステラ"
# 「ラファエロさん……」
line = "「ラファエロさん……」"

[[dialogue]]
speaker = "ラファエロ"
# 「そういうきみは、残された時間をどうやって過ごすつもりなんだい？」
line = "「そういうきみは、残された時間をどうやって過ごすつもりなんだい？」"

[[dialogue]]
speaker = "ステラ"
# 「うーん、そうですね……」
line = "「うーん、そうですね……」"

[[dialogue]]
speaker = "ステラ"
# 「えへへ。会長さんにルリエルさん、ボクのわがままを聞いてくれてありがとうございます」
line = "「えへへ。会長さんにルリエルさん、ボクのわがままを聞いてくれてありがとうございます」"

[[dialogue]]
speaker = "ルリエル"
# 「いえいえ、ちっとも構わないのです！　むしろとってもワクワクしています♪」
line = "「いえいえ、ちっとも構わないのです！　むしろとってもワクワクしています♪」"

[[dialogue]]
speaker = "ルリエル"
# 「それにしてもまさか、新星学園の星徒会室でお泊りすることになるなんて、思ってもみませんでした♪」
line = "「それにしてもまさか、新星学園の星徒会室でお泊りすることになるなんて、思ってもみませんでした♪」"

[[dialogue]]
speaker = "ルリエル"
# 「こうしてテントに入るとキャンプしてるみたいで、とっても新感覚なのです！」
line = "「こうしてテントに入るとキャンプしてるみたいで、とっても新感覚なのです！」"

[[dialogue]]
speaker = "ルリエル"
# 「会長さんも恥ずかしがってないで、中に入ってきてくださいよ～♪」
line = "「会長さんも恥ずかしがってないで、中に入ってきてくださいよ～♪」"

[[dialogue]]
speaker = "unk"
# 遠慮しとくよ
line = "遠慮しとくよ"

[[dialogue]]
speaker = "unk"
# いや、それはさすがに……
line = "いや、それはさすがに……"

[[dialogue]]
speaker = "ステラ"
# 「ふふふ……♪」
line = "「ふふふ……♪」"

[[dialogue]]
speaker = "ルリエル"
# 「でもどうして、こんなことをしようと思ったんですか？」
line = "「でもどうして、こんなことをしようと思ったんですか？」"

[[dialogue]]
speaker = "ステラ"
# 「この世界で過ごすのも今日が最後って言われて、その後ラファエロさんとお話して……」
line = "「この世界で過ごすのも今日が最後って言われて、その後ラファエロさんとお話して……」"

[[dialogue]]
speaker = "ステラ"
# 「それで、ラファエロさんは残りの時間をどうやって過ごすのか、聞いてみたんです」
line = "「それで、ラファエロさんは残りの時間をどうやって過ごすのか、聞いてみたんです」"

[[dialogue]]
speaker = "ステラ"
# 「ラファエロさんは藝術家として、ひとつでも作品を残して……楽しい時間をくれたこの世界に感謝の気持ちを示したいって言ってました」
line = "「ラファエロさんは藝術家として、ひとつでも作品を残して……楽しい時間をくれたこの世界に感謝の気持ちを示したいって言ってました」"

[[dialogue]]
speaker = "ステラ"
# 「それで考えてみたんです。ボクがこの世界に示すことができる、感謝の気持ちって何なのかなって……」
line = "「それで考えてみたんです。ボクがこの世界に示すことができる、感謝の気持ちって何なのかなって……」"

[[dialogue]]
speaker = "ルリエル"
# 「なるほど！　ステラさんはこうして引きこもることで、世界への感謝を示そうというわけですねっ！」
line = "「なるほど！　ステラさんはこうして引きこもることで、世界への感謝を示そうというわけですねっ！」"

[[dialogue]]
speaker = "ステラ"
# 「違いますっ！　そんなわけないじゃないですか！」
line = "「違いますっ！　そんなわけないじゃないですか！」"

[[dialogue]]
speaker = "ステラ"
# 「……ボクには、ラファエロさんのような特技はないから、この世界に何かを残していくことはできません」
line = "「……ボクには、ラファエロさんのような特技はないから、この世界に何かを残していくことはできません」"

[[dialogue]]
speaker = "ステラ"
# 「だからせめて……感謝の気持ちは、ちゃんと示していきたいと思ったんですっ」
line = "「だからせめて……感謝の気持ちは、ちゃんと示していきたいと思ったんですっ」"

[[dialogue]]
speaker = "ステラ"
# 「会長さん、ルリエルさん……短い間でしたけど、本当に楽しい時間をありがとうございました……」
line = "「会長さん、ルリエルさん……短い間でしたけど、本当に楽しい時間をありがとうございました……」"

[[dialogue]]
speaker = "ステラ"
# 「今夜はこうやってゴロゴロしながら、お世話になった２人にいっぱいありがとうを言わせてください」
line = "「今夜はこうやってゴロゴロしながら、お世話になった２人にいっぱいありがとうを言わせてください」"

[[dialogue]]
speaker = "ルリエル"
# 「ステラさん……」
line = "「ステラさん……」"

[[dialogue]]
speaker = "ステラ"
# 「本当はラファエロさんも誘いたかったんですけど……ラファエロさんの残された時間を邪魔するわけにはいかないですから」
line = "「本当はラファエロさんも誘いたかったんですけど……ラファエロさんの残された時間を邪魔するわけにはいかないですから」"

[[dialogue]]
speaker = "ルリエル"
# 「わかりました！　ラファエロさんの分まで、いっぱいゴロゴロしながら語り合いましょう♪」
line = "「わかりました！　ラファエロさんの分まで、いっぱいゴロゴロしながら語り合いましょう♪」"

[[dialogue]]
speaker = "ステラ"
# 「はいっ」
line = "「はいっ」"

[[dialogue]]
speaker = "unk"
# こうして俺たちは夜空が白み始めるまで、初めて会ったあの日からの思い出を語り合うのだった。
line = "こうして俺たちは夜空が白み始めるまで、初めて会ったあの日からの思い出を語り合うのだった。"
