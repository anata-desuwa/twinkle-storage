line = "「ええ。ちょっと照れくさいけど……散々みんなを振り回しちゃったお詫びに、言っておかなきゃなって」"

[[dialogue]]
speaker = "セーラ"
# 「なになに、告白？」
line = "「なになに、告白？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あはは。似たようなものかも」
line = "「あはは。似たようなものかも」"

[[dialogue]]
speaker = "ヴィーナス"
# 「えっとね。私って今まで、クロトにばかりこだわってきたじゃない？」
line = "「えっとね。私って今まで、クロトにばかりこだわってきたじゃない？」"

[[dialogue]]
speaker = "マトイ"
# 「うん。自覚あったんだ」
line = "「うん。自覚あったんだ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私もねえ、それが自分の中でも謎だったんだけど。この間──ちょっとしたきっかけでわかったの！」
line = "「私もねえ、それが自分の中でも謎だったんだけど。この間──ちょっとしたきっかけでわかったの！」"

[[dialogue]]
speaker = "セーラ"
# （……え。あ、あれ？　マジの告白？）
line = "（……え。あ、あれ？　マジの告白？）"

[[dialogue]]
speaker = "フィオナ"
# （拝聴しましょう）
line = "（拝聴しましょう）"

[[dialogue]]
speaker = "ヴィーナス"
# 「私にとって、クロトが特別なのは──」
line = "「私にとって、クロトが特別なのは──」"

[[dialogue]]
speaker = "unk"
# ヴィーナスが胸を張って、宣言する。
line = "ヴィーナスが胸を張って、宣言する。"

[[dialogue]]
speaker = "unk"
# その瞬間だった。
line = "その瞬間だった。"

[[dialogue]]
speaker = "セーラ"
# 「────」
line = "「────」"

[[dialogue]]
speaker = "unk"
# 刺すような気配がよぎる。
line = "刺すような気配がよぎる。"

[[dialogue]]
speaker = "unk"
# 気づき、目をやり、構えた時にはもう遅かった。
line = "気づき、目をやり、構えた時にはもう遅かった。"

[[dialogue]]
speaker = "unk"
# 斬撃が、<b>塔を割った</b>。
line = "斬撃が、<b>塔を割った</b>。"

[[dialogue]]
speaker = "ヴィーナス"
# 「──！？」
line = "「──！？」"

[[dialogue]]
speaker = "アナ"
# 「──！？」
line = "「──！？」"

[[dialogue]]
speaker = "フィオナ"
# 「──！？」
line = "「──！？」"

[[dialogue]]
speaker = "マトイ"
# 「────ッ！　何────っ！？」
line = "「────ッ！　何────っ！？」"

[[dialogue]]
speaker = "unk"
# それは信じられない光景だった。
line = "それは信じられない光景だった。"

[[dialogue]]
speaker = "unk"
# 何者かによる介入。それだけではない。
line = "何者かによる介入。それだけではない。"

[[dialogue]]
speaker = "unk"
# 『外』から撃ち込まれた攻撃が──この、フィーニスの塔内部にまで貫通している！！
line = "『外』から撃ち込まれた攻撃が──この、フィーニスの塔内部にまで貫通している！！"

[[dialogue]]
speaker = "ニャリオン"
# 「ニャアアアア──ッ！？」
line = "「ニャアアアア──ッ！？」"

[[dialogue]]
speaker = "ユウリ"
# 「下がれ、全員──ッ！！」
line = "「下がれ、全員──ッ！！」"

[[dialogue]]
speaker = "unk"
# その斬撃は大地を割った。
line = "その斬撃は大地を割った。"

[[dialogue]]
speaker = "unk"
# 滅んだ世界をさらに破滅させかねないほど、甚大で強力無比な一閃だった。
line = "滅んだ世界をさらに破滅させかねないほど、甚大で強力無比な一閃だった。"

[[dialogue]]
speaker = "unk"
# 俺とユウリが全員を弾き飛ばしたことで、かろうじて致命傷をまぬがれる。
line = "俺とユウリが全員を弾き飛ばしたことで、かろうじて致命傷をまぬがれる。"

[[dialogue]]
speaker = "unk"
# そして──
line = "そして──"

[[dialogue]]
speaker = "？？？"
# 『────』
line = "『────』"

[[dialogue]]
speaker = "クロト"
# 「な──ん…………」
line = "「な──ん…………」"

[[dialogue]]
speaker = "ソフィア"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "マトイ"
# 「……何──あれは…………？」
line = "「……何──あれは…………？」"

[[dialogue]]
speaker = "ニャリオン"
# 「ボス戦は──終わったはずじゃ、なかったのかニャ……！？」
line = "「ボス戦は──終わったはずじゃ、なかったのかニャ……！？」"

[[dialogue]]
speaker = "unk"
# 異形の影がそこに立っていた。
line = "異形の影がそこに立っていた。"

[[dialogue]]
speaker = "unk"
# 黒き甲冑をまとったそのシルエットは、深淵を思わせるほどに暗くよどんでいる。
line = "黒き甲冑をまとったそのシルエットは、深淵を思わせるほどに暗くよどんでいる。"

[[dialogue]]
speaker = "unk"
# この世界の住人──では、ありえない。
line = "この世界の住人──では、ありえない。"

[[dialogue]]
speaker = "unk"
# なぜなら奴の背後には……次元の大穴が虚空に<ruby=うが>穿</ruby>たれていた。
line = "なぜなら奴の背後には……次元の大穴が虚空に<ruby>穿<rt>うが</rt></ruby>たれていた。"

[[dialogue]]
speaker = "unk"
# あれは塔の外から、直接、この地へ踏み入ってきたのだ。
line = "あれは塔の外から、直接、この地へ踏み入ってきたのだ。"

[[dialogue]]
speaker = "unk"
# そして、問答無用でこちらへ仕掛けてきた攻撃からしても──話の通じる相手ではない。
line = "そして、問答無用でこちらへ仕掛けてきた攻撃からしても──話の通じる相手ではない。"

[[dialogue]]
speaker = "ヴィーナス"
# 「──ッ、づ……くっ……！」
line = "「──ッ、づ……くっ……！」"

[[dialogue]]
speaker = "マトイ"
# 「ヴィーナスッ──大丈夫！？」
line = "「ヴィーナスッ──大丈夫！？」"

[[dialogue]]
speaker = "ユウリ"
# 「チッ──不意打ちなんて、卑怯な野郎がよ──！」
line = "「チッ──不意打ちなんて、卑怯な野郎がよ──！」"

[[dialogue]]
speaker = "unk"
# 輪の中心にいたヴィーナスは──深刻なダメージをもらっていた。
line = "輪の中心にいたヴィーナスは──深刻なダメージをもらっていた。"

[[dialogue]]
speaker = "？？？"
# 『────』
line = "『────』"

[[dialogue]]
speaker = "クロト"
# 「──なんだ。何者だ……おまえは」
line = "「──なんだ。何者だ……おまえは」"

[[dialogue]]
speaker = "unk"
# 俺は、そんな彼女をかばうように立ち──異形の影と対峙する。
line = "俺は、そんな彼女をかばうように立ち──異形の影と対峙する。"

[[dialogue]]
speaker = "unk"
# 黒い戦兜が頭部までを覆っており、正体どころか性別すらも判然としない。
line = "黒い戦兜が頭部までを覆っており、正体どころか性別すらも判然としない。"

[[dialogue]]
speaker = "アナ"
# 「会長。これは……」
line = "「会長。これは……」"

[[dialogue]]
speaker = "クロト"
# 「イレギュラーだ。気を緩めるな。反撃する」
line = "「イレギュラーだ。気を緩めるな。反撃する」"

[[dialogue]]
speaker = "unk"
# 塔のギミックではない・知った相手でもない・攻撃こそが最善の一手──要点のみの指令を簡潔に下した。
line = "塔のギミックではない・知った相手でもない・攻撃こそが最善の一手──要点のみの指令を簡潔に下した。"

[[dialogue]]
speaker = "unk"
# 状況の判断は追いついていないが……先んじて仕掛けなければ、こちらがやられると直感した。
line = "状況の判断は追いついていないが……先んじて仕掛けなければ、こちらがやられると直感した。"

[[dialogue]]
speaker = "ユウリ"
# 「誰だか知らねえけど──無礼者には違いねえな！」
line = "「誰だか知らねえけど──無礼者には違いねえな！」"

[[dialogue]]
speaker = "ルリエル"
