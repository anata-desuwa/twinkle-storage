[[dialogue]]
speaker = "unk"
# 緩急織り交ぜた俺たちの攻め手に対し──影の対処はあまりにも的確すぎた。
line = "緩急織り交ぜた俺たちの攻め手に対し──影の対処はあまりにも的確すぎた。"

[[dialogue]]
speaker = "unk"
# アナの炎矢を逸らすことでサーシャさん達の氷撃を溶かし、裏から回り込んでいたマトイと俺がかち合うように立ち位置をコントロールされる。
line = "アナの炎矢を逸らすことでサーシャさん達の氷撃を溶かし、裏から回り込んでいたマトイと俺がかち合うように立ち位置をコントロールされる。"

[[dialogue]]
speaker = "unk"
# まるで、こちらの呼吸を熟知しているかのように……
