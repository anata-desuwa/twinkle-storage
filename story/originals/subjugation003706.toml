line = "「は～い！　それじゃあ順番に並んで、ママダレナのところまで来てください！　い～っぱい、よしよししてあげますからね～<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「ほらセシアも！　ママですよ～<emoji=heart04>」
line = "「ほらセシアも！　ママですよ～<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
