[[dialogue]]
speaker = "unk"
# 第２話,スタンドバイユー,P
line = "第２話,スタンドバイユー,P"

[[dialogue]]
speaker = "シフォン"
# 「おおう……。相変わらず流星市国は人通りがすごいですね……。うちの田舎町とは比べものになりません……」
line = "「おおう……。相変わらず流星市国は人通りがすごいですね……。うちの田舎町とは比べものになりません……」"

[[dialogue]]
speaker = "シフォン"
# 「流石に緊張しますね……。さっきから視線も突き刺さりまくりですし……」
line = "「流石に緊張しますね……。さっきから視線も突き刺さりまくりですし……」"

[[dialogue]]
speaker = "シフォン"
# 「ですが日和っていては始まりません……！　と、とにかく勇気を出してブラついてみましょうっ……！」
line = "「ですが日和っていては始まりません……！　と、とにかく勇気を出してブラついてみましょうっ……！」"

[[dialogue]]
speaker = "unk"
# そんな格好で何してるんだ？
line = "そんな格好で何してるんだ？"

[[dialogue]]
speaker = "シフォン"
# 「ひゃっ！？　か、会長さんですか。急に声をかけないでくださいよ。心臓に悪いですね……！」
line = "「ひゃっ！？　か、会長さんですか。急に声をかけないでくださいよ。心臓に悪いですね……！」"

[[dialogue]]
speaker = "シフォン"
# 「ちょっと訓練がてら散歩しているだけですよ。お陰様でプリマステラにはなれましたが、未だに注目を浴びることが苦手なものでして……」
line = "「ちょっと訓練がてら散歩しているだけですよ。お陰様でプリマステラにはなれましたが、未だに注目を浴びることが苦手なものでして……」"

[[dialogue]]
speaker = "シフォン"
# 「特にこの天使らしくない戦闘服を見られるとつい畏縮してしまうんです。でも戦闘中にいちいち竦んでいては洒落になりませんからね」
line = "「特にこの天使らしくない戦闘服を見られるとつい畏縮してしまうんです。でも戦闘中にいちいち竦んでいては洒落になりませんからね」"

[[dialogue]]
speaker = "シフォン"
# 「だからこうして戦闘服で人通りの多い場所を練り歩いて、少しでも人目に慣れようと思ったわけです。ちょっと荒療治ですが」
line = "「だからこうして戦闘服で人通りの多い場所を練り歩いて、少しでも人目に慣れようと思ったわけです。ちょっと荒療治ですが」"

[[dialogue]]
speaker = "シフォン"
# 「もっと天使らしい衣装を着られたら解決するんですけどね。ですが適正属性が闇ということもあって何度調整しても黒っぽいデザインになっちゃうんですよ」
line = "「もっと天使らしい衣装を着られたら解決するんですけどね。ですが適正属性が闇ということもあって何度調整しても黒っぽいデザインになっちゃうんですよ」"

[[dialogue]]
speaker = "シフォン"
# 「羽根も黒で戦闘服も黒……仕方ないとはいえ、どうしても気になってしまって……」
line = "「羽根も黒で戦闘服も黒……仕方ないとはいえ、どうしても気になってしまって……」"

[[dialogue]]
speaker = "unk"
# ダークエンジェルって感じで格好いい
line = "ダークエンジェルって感じで格好いい"

[[dialogue]]
speaker = "シフォン"
# 「か、格好いいって。また会長さんは適当なことを。天使のくせして黒っぽいっていうアベコベっぷりがコンプレックスだって話ですのに」
line = "「か、格好いいって。また会長さんは適当なことを。天使のくせして黒っぽいっていうアベコベっぷりがコンプレックスだって話ですのに」"

[[dialogue]]
speaker = "シフォン"
# 「もしかして、とりあえず褒めておけば私が喜ぶとでも思ってます？　言っておきますけど、私はそこまでチョロくありませんよ！」
line = "「もしかして、とりあえず褒めておけば私が喜ぶとでも思ってます？　言っておきますけど、私はそこまでチョロくありませんよ！」"

[[dialogue]]
speaker = "シフォン"
# 「……ち、ちなみにですが、本当に格好いいと思ってくれてるんですか？」
line = "「……ち、ちなみにですが、本当に格好いいと思ってくれてるんですか？」"

[[dialogue]]
speaker = "シフォン"
# 「……そ、そうなんですか。えへへ……」
line = "「……そ、そうなんですか。えへへ……」"

[[dialogue]]
speaker = "シフォン"
# 「って！　今のは違いますよ！　別に喜んでいたわけでは……！　ただ──……って」
line = "「って！　今のは違いますよ！　別に喜んでいたわけでは……！　ただ──……って」"

[[dialogue]]
speaker = "シフォン"
# 「あの女の子……どうしたんでしょうか。ほら、あの子ですよ。交差点の向こうにいる……」
line = "「あの女の子……どうしたんでしょうか。ほら、あの子ですよ。交差点の向こうにいる……」"

[[dialogue]]
speaker = "シフォン"
# 「信号が変わったのに歩き出そうとすらしません。ずっと俯いたまま立ち尽くしていて……」
line = "「信号が変わったのに歩き出そうとすらしません。ずっと俯いたまま立ち尽くしていて……」"

[[dialogue]]
speaker = "シフォン"
# 「ちょっと行ってきます……！　放っておけませんから……！」
line = "「ちょっと行ってきます……！　放っておけませんから……！」"

[[dialogue]]
speaker = "シフォン"
# 「どうしたんですか？　そんなにしょんぼりした顔をして」
line = "「どうしたんですか？　そんなにしょんぼりした顔をして」"

[[dialogue]]
speaker = "シフォン"
# 「ふふ、そんなに警戒しないでください。元気のなさそうな顔をしていたので気になっただけです」
line = "「ふふ、そんなに警戒しないでください。元気のなさそうな顔をしていたので気になっただけです」"

[[dialogue]]
speaker = "シフォン"
# 「良かったらこれからお姉さんと遊びに行きませんか？　何か悩み事があるなら、パーッと遊んだ方が気晴らしになりますよ？」
line = "「良かったらこれからお姉さんと遊びに行きませんか？　何か悩み事があるなら、パーッと遊んだ方が気晴らしになりますよ？」"

[[dialogue]]
speaker = "シフォン"
# 「木登りとかどうです？　虫取りや水遊びとかも楽しいですよ？　あ、なんなら山菜採りとかも──」
line = "「木登りとかどうです？　虫取りや水遊びとかも楽しいですよ？　あ、なんなら山菜採りとかも──」"

[[dialogue]]
speaker = "unk"
# 遊びのチョイスが田舎基準すぎるのでは……
line = "遊びのチョイスが田舎基準すぎるのでは……"

[[dialogue]]
speaker = "シフォン"
# 「～～っっ。う、うるさいですね！　今のはジョークですよ、ジョーク！　まずは場を和ませるのが肝要なんです……！」
line = "「～～っっ。う、うるさいですね！　今のはジョークですよ、ジョーク！　まずは場を和ませるのが肝要なんです……！」"

[[dialogue]]
speaker = "シフォン"
# 「というか会長さんもしゃがんでくださいっ。女の子が怖がっちゃったらどうするんですかっ」
line = "「というか会長さんもしゃがんでくださいっ。女の子が怖がっちゃったらどうするんですかっ」"

[[dialogue]]
speaker = "シフォン"
# 「あっ、うるさくしちゃってすみませんね。この人はデリカシーってものがどうも不足しちゃってるみたいで」
line = "「あっ、うるさくしちゃってすみませんね。この人はデリカシーってものがどうも不足しちゃってるみたいで」"

[[dialogue]]
speaker = "シフォン"
# 「ともかく、そんなに俯いていたらせっかくの美人も台無しです。涙も零れやすくなっちゃいますしね？」
line = "「ともかく、そんなに俯いていたらせっかくの美人も台無しです。涙も零れやすくなっちゃいますしね？」"

[[dialogue]]
speaker = "シフォン"
# 「何か悲しい出来事があったのなら、遊んだ後でもいいので私に話してみてください。１人で抱えていると辛いだけですから」
line = "「何か悲しい出来事があったのなら、遊んだ後でもいいので私に話してみてください。１人で抱えていると辛いだけですから」"

[[dialogue]]
speaker = "シフォン"
# 「こんな黒いナリですが、私も一応星騎士ですからね。安心して頼ってくれていいんですよ──」
line = "「こんな黒いナリですが、私も一応星騎士ですからね。安心して頼ってくれていいんですよ──」"

[[dialogue]]
speaker = "シフォン"
# 「元気出ましたか？　ふふ、それなら良かったです」
line = "「元気出ましたか？　ふふ、それなら良かったです」"

[[dialogue]]
speaker = "シフォン"
# 「もしまた辛いことがあったらいつでも連絡してくださいね？　おなか部にも是非遊びに来てください」
line = "「もしまた辛いことがあったらいつでも連絡してくださいね？　おなか部にも是非遊びに来てください」"

[[dialogue]]
speaker = "unk"
# 笑顔で帰って行ったね
line = "笑顔で帰って行ったね"

[[dialogue]]
speaker = "シフォン"
# 「ええ、本当に良かったです」
line = "「ええ、本当に良かったです」"

[[dialogue]]
speaker = "シフォン"
# 「どうやらあの子、地方から引っ越してきたばかりらしいですね。地元の方言がクラスで浮いちゃって馴染めずにいるみたいです」
line = "「どうやらあの子、地方から引っ越してきたばかりらしいですね。地元の方言がクラスで浮いちゃって馴染めずにいるみたいです」"

[[dialogue]]
speaker = "unk"
# でもシフォンに方言を褒められてあの子すごく喜んでたよ
line = "でもシフォンに方言を褒められてあの子すごく喜んでたよ"

[[dialogue]]
speaker = "シフォン"
# 「ふふ、実際すごく可愛い喋り方でしたからね。本人はまだまだ気にしている様子でしたが」
line = "「ふふ、実際すごく可愛い喋り方でしたからね。本人はまだまだ気にしている様子でしたが」"

[[dialogue]]
speaker = "シフォン"
# 「私の励ましが少しでも彼女の支えになってくれたら嬉しいです。私はああいう子の味方に、居場所になりたくて星騎士を志しましたから」
line = "「私の励ましが少しでも彼女の支えになってくれたら嬉しいです。私はああいう子の味方に、居場所になりたくて星騎士を志しましたから」"

[[dialogue]]
speaker = "シフォン"
# 「独りぼっちで俯いているのは寂しくて辛いことですからね。だけど傍にいてくれる人や自分を認めてくれる人がいたらとても救われるんですよ」
line = "「独りぼっちで俯いているのは寂しくて辛いことですからね。だけど傍にいてくれる人や自分を認めてくれる人がいたらとても救われるんですよ」"

[[dialogue]]
speaker = "シフォン"
# 「私はそれを身を以て知っていますから。パルミエやモナカと出会う前は引きこもりもいいところでしたし……。独りぼっちで俯いてばっかりでしたからね……」
line = "「私はそれを身を以て知っていますから。パルミエやモナカと出会う前は引きこもりもいいところでしたし……。独りぼっちで俯いてばっかりでしたからね……」"

[[dialogue]]
speaker = "シフォン"
# 「って、何を感心した顔してるんですか？　私がしようとしてること、会長さんは自然にやってますよ？」
line = "「って、何を感心した顔してるんですか？　私がしようとしてること、会長さんは自然にやってますよ？」"

[[dialogue]]
speaker = "シフォン"
# 「さっき私の戦闘服を格好いいって褒めてくれたじゃないですか。あの一言だけでも……私、結構救われちゃいましたもん」
line = "「さっき私の戦闘服を格好いいって褒めてくれたじゃないですか。あの一言だけでも……私、結構救われちゃいましたもん」"

[[dialogue]]
speaker = "シフォン"
# 「言葉って不思議ですよね。何気ない一言が心を抉るナイフにもなれば、心を救ってくれる抱擁にもなる」
line = "「言葉って不思議ですよね。何気ない一言が心を抉るナイフにもなれば、心を救ってくれる抱擁にもなる」"

[[dialogue]]
speaker = "シフォン"
# 「私はどんな人の心でも抱き締めてあげられる人になりたいんです。どんなコンプレックスや悩みを抱えていても肯定してあげられる人に」
line = "「私はどんな人の心でも抱き締めてあげられる人になりたいんです。どんなコンプレックスや悩みを抱えていても肯定してあげられる人に」"

[[dialogue]]
speaker = "シフォン"
# 「会長さんも誰かに心を傷つけられた時は私に話してみてください。どんな事情があっても私は全力で抱き締めてあげますよ」
line = "「会長さんも誰かに心を傷つけられた時は私に話してみてください。どんな事情があっても私は全力で抱き締めてあげますよ」"

[[dialogue]]
speaker = "シフォン"
# 「ただ傍にいてほしいってだけでも大歓迎です。あなたは独りじゃありません。私はどんな時でもあなたの味方です」
line = "「ただ傍にいてほしいってだけでも大歓迎です。あなたは独りじゃありません。私はどんな時でもあなたの味方です」"

[[dialogue]]
speaker = "シフォン"
# 「って……あはは。柄にもなく天使っぽいこと言っちゃってますね。魔族の血も半分入ってるなんちゃって天使ですのに」
line = "「って……あはは。柄にもなく天使っぽいこと言っちゃってますね。魔族の血も半分入ってるなんちゃって天使ですのに」"

[[dialogue]]
speaker = "シフォン"
# 「でも、独りじゃないってことは覚えておいてください。辛い時や誰かに傍にいてもらいたい時は気軽に私を呼んでくれていいです」
line = "「でも、独りじゃないってことは覚えておいてください。辛い時や誰かに傍にいてもらいたい時は気軽に私を呼んでくれていいです」"

[[dialogue]]
speaker = "シフォン"
# 「一緒にゴロゴロしたり、ゲームしたり、なんなら山菜採りに行ったりしましょう。俯いてる暇なんか、与えてあげませんから」
line = "「一緒にゴロゴロしたり、ゲームしたり、なんなら山菜採りに行ったりしましょう。俯いてる暇なんか、与えてあげませんから」"
