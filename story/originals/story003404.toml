[[dialogue]]
speaker = "unk"
# こちらの世界に来てからずっと、ステラは星徒会室に引きこもって生活している。
line = "こちらの世界に来てからずっと、ステラは星徒会室に引きこもって生活している。"

[[dialogue]]
speaker = "unk"
# 人と接するのが苦手という話なので、あまり干渉するつもりはなかったのだが──
line = "人と接するのが苦手という話なので、あまり干渉するつもりはなかったのだが──"

[[dialogue]]
speaker = "unk"
# ここまで星徒会室に閉じこもったままだと流石に不健康だと思い、ラファエロに相談してステラを散歩に連れ出すことにした。
line = "ここまで星徒会室に閉じこもったままだと流石に不健康だと思い、ラファエロに相談してステラを散歩に連れ出すことにした。"

[[dialogue]]
speaker = "unk"
# というわけで、本日はルリエルと赤ちゃんクマロボも交えて５人（？）で秋葉原まで連れ立ってきていた。
line = "というわけで、本日はルリエルと赤ちゃんクマロボも交えて５人（？）で秋葉原まで連れ立ってきていた。"

[[dialogue]]
speaker = "unk"
# たまには外に出てみるのもいいだろ？
line = "たまには外に出てみるのもいいだろ？"

[[dialogue]]
speaker = "unk"
# ステラ、どう？
line = "ステラ、どう？"

[[dialogue]]
speaker = "ステラ"
# 「……人がいっぱいで怖いです」
line = "「……人がいっぱいで怖いです」"

[[dialogue]]
speaker = "ラファエロ"
# 「そうだね。思っていた以上に大勢の人であふれているよ」
line = "「そうだね。思っていた以上に大勢の人であふれているよ」"

[[dialogue]]
speaker = "ラファエロ"
# 「けれど、みんな忙しなく先を急いでいる様子だ。きみに奇異の目を向ける者はいないようだよ？」
line = "「けれど、みんな忙しなく先を急いでいる様子だ。きみに奇異の目を向ける者はいないようだよ？」"

[[dialogue]]
speaker = "ステラ"
# 「そ、そうですね……」
line = "「そ、そうですね……」"

[[dialogue]]
speaker = "ラファエロ"
# 「それにしても圧巻だね！　巨大な建物が立ち並んでいて……とても興味深い街だ」
line = "「それにしても圧巻だね！　巨大な建物が立ち並んでいて……とても興味深い街だ」"

[[dialogue]]
speaker = "ステラ"
# 「はい……それに、変な乗り物がたくさん走ってます……」
line = "「はい……それに、変な乗り物がたくさん走ってます……」"

[[dialogue]]
speaker = "ラファエロ"
# 「ぼくの知るどんな都市とも様子が違っているよ」
line = "「ぼくの知るどんな都市とも様子が違っているよ」"

[[dialogue]]
speaker = "unk"
# 以前にアルテがこの世界にやってきた時、１番興味を示していたのがこの秋葉原だった。
line = "以前にアルテがこの世界にやってきた時、１番興味を示していたのがこの秋葉原だった。"

[[dialogue]]
speaker = "unk"
# だから同じ藝術家であるラファエロも興味を示してくれるのではないか。お出かけ先に秋葉原を選んだのは、そういった理由からだった。
line = "だから同じ藝術家であるラファエロも興味を示してくれるのではないか。お出かけ先に秋葉原を選んだのは、そういった理由からだった。"

[[dialogue]]
speaker = "unk"
# その時のことをラファエロに話すと、納得したように頷く。
line = "その時のことをラファエロに話すと、納得したように頷く。"

[[dialogue]]
speaker = "ラファエロ"
# 「そうだったんだね、ありがとう。確かに創作意欲を刺激されるような面白い絵が街のあちこちに飾られている。目を輝かせているアルテの姿が浮かんでくるよ」
line = "「そうだったんだね、ありがとう。確かに創作意欲を刺激されるような面白い絵が街のあちこちに飾られている。目を輝かせているアルテの姿が浮かんでくるよ」"

[[dialogue]]
speaker = "ラファエロ"
# 「中々にすごい街ではあるが……１点だけ欠けているものがある」
line = "「中々にすごい街ではあるが……１点だけ欠けているものがある」"

[[dialogue]]
speaker = "ルリエル"
# 「ほうほう、それは何でしょう？」
line = "「ほうほう、それは何でしょう？」"

[[dialogue]]
speaker = "ラファエロ"
# 「決まっているじゃないか、ぼくの絵だよ！」
line = "「決まっているじゃないか、ぼくの絵だよ！」"

[[dialogue]]
speaker = "ラファエロ"
# 「この華やかな街並みに天才藝術家たるぼくの絵を加えれば完璧なものになる。そうは思わないかい？」
line = "「この華やかな街並みに天才藝術家たるぼくの絵を加えれば完璧なものになる。そうは思わないかい？」"

[[dialogue]]
speaker = "ルリエル"
# 「ラファエロさんの絵って、あの流星寮のロビーに新しく飾られた絵ですよね？」
line = "「ラファエロさんの絵って、あの流星寮のロビーに新しく飾られた絵ですよね？」"

[[dialogue]]
speaker = "ラファエロ"
# 「その通りさ！」
line = "「その通りさ！」"

[[dialogue]]
speaker = "ルリエル"
# 「きれいな絵だなーって思いますけど、秋葉原の街には合わないんじゃないでしょうか？」
line = "「きれいな絵だなーって思いますけど、秋葉原の街には合わないんじゃないでしょうか？」"

[[dialogue]]
speaker = "ラファエロ"
# 「そんな事はない。そうだね……あの高い建物の壁辺りなんかはどうだろう？」
line = "「そんな事はない。そうだね……あの高い建物の壁辺りなんかはどうだろう？」"

[[dialogue]]
speaker = "ルリエル"
# 「ラファエロさん、そんなことをしたら、お金がたくさんかかっちゃうのです！」
line = "「ラファエロさん、そんなことをしたら、お金がたくさんかかっちゃうのです！」"

[[dialogue]]
speaker = "ラファエロ"
# 「そうだね、天才ラファエロの絵を飾るのだから、それなりのお金はかかるかもしれない」
line = "「そうだね、天才ラファエロの絵を飾るのだから、それなりのお金はかかるかもしれない」"

[[dialogue]]
speaker = "ラファエロ"
# 「だが今回は、ぼくの名をこの世界に売り込むという意味もある。無料で作品を提供してもいいと思っているよ」
line = "「だが今回は、ぼくの名をこの世界に売り込むという意味もある。無料で作品を提供してもいいと思っているよ」"

[[dialogue]]
speaker = "unk"
# あ～、そうじゃなくてですね……
line = "あ～、そうじゃなくてですね……"

[[dialogue]]
speaker = "ルリエル"
# 「人間界で学んだことを、ルリエルが教えてあげるのです！！」
line = "「人間界で学んだことを、ルリエルが教えてあげるのです！！」"

[[dialogue]]
speaker = "ルリエル"
# 「街のああいったところに絵を貼りだすには、貼りたい人がたくさんお金を払わないといけないのです！」
