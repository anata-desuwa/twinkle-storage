line = "「いえ、赤ちゃんクマロボさんはお腹が空いただけみたいなのです！」"

[[dialogue]]
speaker = "赤ちゃんクマロボ"
# 「ばぶー<emoji=heart04>」
line = "「ばぶー<emoji=heart04>」"

[[dialogue]]
