# 「ふふっ……この子にはまだ難しい話だったかな」
line = "「ふふっ……この子にはまだ難しい話だったかな」"

[[dialogue]]
speaker = "unk"
# とりあえず何か食べようか
line = "とりあえず何か食べようか"

[[dialogue]]
speaker = "unk"
