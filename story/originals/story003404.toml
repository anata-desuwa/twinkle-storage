[[dialogue]]
speaker = "ルリエル"
# 「ルリエルも最初はびっくりしたのです！　でも人間界では、絵を勝手に貼ったり飾ったりしたらダメなのですよ！」
line = "「ルリエルも最初はびっくりしたのです！　でも人間界では、絵を勝手に貼ったり飾ったりしたらダメなのですよ！」"

[[dialogue]]
