# 「ばぶー<emoji=heart04>」
line = "「ばぶー<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# まあ、気にすることでもないか……
line = "まあ、気にすることでもないか……"

[[dialogue]]
speaker = "unk"
# 赤ちゃんクマロボは元気だし、それをお世話している３人も楽しそうだし……特に問題が起きていないのならそれで──
line = "赤ちゃんクマロボは元気だし、それをお世話している３人も楽しそうだし……特に問題が起きていないのならそれで──"

