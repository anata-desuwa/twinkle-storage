[[dialogue]]
speaker = "unk"
# 第２話,追跡開始,B
line = "第２話,追跡開始,B"

[[dialogue]]
speaker = "幼い梨緒"
# 『うぅ……ぐす……ひくっ……』
line = "『うぅ……ぐす……ひくっ……』"

[[dialogue]]
speaker = "幼い梨緒"
# 『どうして……？　どうして私、何もできないの？　算数も運動もできなくて……絵もぐちゃぐちゃだし、歌もダメで……』
line = "『どうして……？　どうして私、何もできないの？　算数も運動もできなくて……絵もぐちゃぐちゃだし、歌もダメで……』"

[[dialogue]]
speaker = "梨緒"
# （私は弱くて、何もできない人間だった）
line = "（私は弱くて、何もできない人間だった）"

[[dialogue]]
speaker = "梨緒"
# （勉強も運動も得意じゃなくて、誰にも勝てなくて、そんな自分が嫌で……いつも泣きながら、死に物狂いで努力していた）
line = "（勉強も運動も得意じゃなくて、誰にも勝てなくて、そんな自分が嫌で……いつも泣きながら、死に物狂いで努力していた）"

[[dialogue]]
speaker = "幼い梨緒"
# 『私が星騎士になれる……！？　こんな私でも……？』
line = "『私が星騎士になれる……！？　こんな私でも……？』"

[[dialogue]]
speaker = "幼い梨緒"
# 『星騎士になれば、私は──』
line = "『星騎士になれば、私は──』"

[[dialogue]]
speaker = "梨緒"
# （そうだ。星騎士になれば、誰かの役に立てると思った）
line = "（そうだ。星騎士になれば、誰かの役に立てると思った）"

[[dialogue]]
speaker = "梨緒"
# （私には何の取柄もないと思っていたけど、強い星力があることがわかった。だから、こんな私でも誰かを守れるのが嬉しくて──）
line = "（私には何の取柄もないと思っていたけど、強い星力があることがわかった。だから、こんな私でも誰かを守れるのが嬉しくて──）"

[[dialogue]]
speaker = "幼い梨緒"
# 『負けない』
line = "『負けない』"

[[dialogue]]
speaker = "梨緒"
# （──！？）
line = "（──！？）"

[[dialogue]]
speaker = "幼い梨緒"
# 『星騎士になれば、私は負けない。もうあんな惨めな思いをしなくていいんだ』
line = "『星騎士になれば、私は負けない。もうあんな惨めな思いをしなくていいんだ』"

[[dialogue]]
speaker = "幼い梨緒"
# 『私はもう負けない。一番になるんだ……！』
line = "『私はもう負けない。一番になるんだ……！』"

[[dialogue]]
speaker = "梨緒"
# 「夢……か」
line = "「夢……か」"

[[dialogue]]
speaker = "梨緒"
# 「ベアトの昔の話を聞いたからか？　随分前の夢を見たような……」
line = "「ベアトの昔の話を聞いたからか？　随分前の夢を見たような……」"

[[dialogue]]
speaker = "梨緒"
# 「私は罪のない人々を守り、世界を救うために星騎士になった。そのはずだ。だが──」
line = "「私は罪のない人々を守り、世界を救うために星騎士になった。そのはずだ。だが──」"

[[dialogue]]
speaker = "梨緒"
# 「……いや、今はするべきことをしよう」
line = "「……いや、今はするべきことをしよう」"

[[dialogue]]
speaker = "unk"
# 梨緒は手早く身支度を整え、部屋を出た。
line = "梨緒は手早く身支度を整え、部屋を出た。"

[[dialogue]]
speaker = "unk"
# 一番手としてルヴィネの尾行を始めた梨緒とナターシャ。
line = "一番手としてルヴィネの尾行を始めた梨緒とナターシャ。"

[[dialogue]]
speaker = "unk"
# リノに透明化と隠蔽の魔法をかけてもらい、視力強化の星術を使って、空からルヴィネを追跡する。
line = "リノに透明化と隠蔽の魔法をかけてもらい、視力強化の星術を使って、空からルヴィネを追跡する。"

[[dialogue]]
speaker = "ナターシャ"
# 「あ、いたいた。ベアトに聞いてた通りの登校時間だ」
line = "「あ、いたいた。ベアトに聞いてた通りの登校時間だ」"

[[dialogue]]
speaker = "ナターシャ"
# 「校舎に入っていったね。さぁて、ルヴィネが出てくるまでは退屈な時間かな」
line = "「校舎に入っていったね。さぁて、ルヴィネが出てくるまでは退屈な時間かな」"

[[dialogue]]
speaker = "ナターシャ"
# 「監視は私がやるから、梨緒はもしもの時のために周囲に警戒を──」
line = "「監視は私がやるから、梨緒はもしもの時のために周囲に警戒を──」"

[[dialogue]]
speaker = "梨緒"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ナターシャ"
# 「おや、顔が暗いね。ベアトが戻ってきて安心したんじゃなかったの？」
line = "「おや、顔が暗いね。ベアトが戻ってきて安心したんじゃなかったの？」"

[[dialogue]]
speaker = "梨緒"
# 「もちろん、ベアトが戻ってきたことは嬉しい。ベアトは私たちの仲間だ」
line = "「もちろん、ベアトが戻ってきたことは嬉しい。ベアトは私たちの仲間だ」"

[[dialogue]]
speaker = "梨緒"
# 「だが……」
line = "「だが……」"

[[dialogue]]
speaker = "ナターシャ"
# 「だが？」
line = "「だが？」"

[[dialogue]]
speaker = "梨緒"
# 「……ナターシャ、君は何のために戦っている？」
line = "「……ナターシャ、君は何のために戦っている？」"

[[dialogue]]
speaker = "ナターシャ"
# 「おや、突然聞いてくるね」
line = "「おや、突然聞いてくるね」"

[[dialogue]]
speaker = "梨緒"
# 「ベアトはデネブとアルタイル、両方の世界を救いたいと言っていた。ナターシャもそういった理由があるのか？」
line = "「ベアトはデネブとアルタイル、両方の世界を救いたいと言っていた。ナターシャもそういった理由があるのか？」"

[[dialogue]]
speaker = "ナターシャ"
# 「あんまり考えたことないなぁ、そういうの。私は聖庭園のエージェントとして与えられた任務をこなすだけだし」
line = "「あんまり考えたことないなぁ、そういうの。私は聖庭園のエージェントとして与えられた任務をこなすだけだし」"

[[dialogue]]
speaker = "ナターシャ"
# 「つまりは聖庭園のため？　でも聖庭園が三界を守るために動いているなら、世界のためってことになるのかな？」
line = "「つまりは聖庭園のため？　でも聖庭園が三界を守るために動いているなら、世界のためってことになるのかな？」"

[[dialogue]]
speaker = "梨緒"
# 「ならばもし、聖庭園が世界の覇権を握ろうとして、人間界や魔界に侵攻を企てたとしたらどうする？　君は従うのか？」
line = "「ならばもし、聖庭園が世界の覇権を握ろうとして、人間界や魔界に侵攻を企てたとしたらどうする？　君は従うのか？」"

[[dialogue]]
speaker = "ナターシャ"
# 「どうだろうね？　その可能性は考えてなかったから、すぐには答えられないや」
line = "「どうだろうね？　その可能性は考えてなかったから、すぐには答えられないや」"

[[dialogue]]
speaker = "unk"
# ナターシャは極星学園の校舎を遠くに眺めながら、いつもの薄笑いを浮かべながら返す。
line = "ナターシャは極星学園の校舎を遠くに眺めながら、いつもの薄笑いを浮かべながら返す。"

[[dialogue]]
speaker = "ナターシャ"
# 「まぁ、今は普通に聖庭園の任務が優先だよ。このままじゃ本来の任務を遂行できないし、早くアルタイルに戻らないと」
line = "「まぁ、今は普通に聖庭園の任務が優先だよ。このままじゃ本来の任務を遂行できないし、早くアルタイルに戻らないと」"

[[dialogue]]
speaker = "梨緒"
# 「本来の任務？　魔王の監視が君の任務じゃなかったのか？」
line = "「本来の任務？　魔王の監視が君の任務じゃなかったのか？」"

[[dialogue]]
speaker = "ナターシャ"
# 「そうだよ。だからこのままは困るんだよね」
line = "「そうだよ。だからこのままは困るんだよね」"

[[dialogue]]
speaker = "梨緒"
# 「……？」
line = "「……？」"

[[dialogue]]
speaker = "unk"
# 梨緒はナターシャの横顔を覗くが、相変わらず彼女の考えは読み取れない。
line = "梨緒はナターシャの横顔を覗くが、相変わらず彼女の考えは読み取れない。"

[[dialogue]]
speaker = "unk"
# ナターシャとは短くない付き合いになるが、未だに分からない部分も多い。
line = "ナターシャとは短くない付き合いになるが、未だに分からない部分も多い。"

[[dialogue]]
speaker = "ナターシャ"
# 「おや？」
line = "「おや？」"

[[dialogue]]
speaker = "unk"
# ナターシャの視線の先。そろそろ午前の授業が始まるというのに、校舎からルヴィネが出てきた。
line = "ナターシャの視線の先。そろそろ午前の授業が始まるというのに、校舎からルヴィネが出てきた。"

[[dialogue]]
speaker = "unk"
# ルヴィネはそのまま校門をくぐり、極星学園の敷地を出ていった。
line = "ルヴィネはそのまま校門をくぐり、極星学園の敷地を出ていった。"

[[dialogue]]
speaker = "unk"
# 梨緒とナターシャが空から追いかけると──
line = "梨緒とナターシャが空から追いかけると──"

[[dialogue]]
speaker = "ルヴィネ"
# 「新作コスメ、いかがですか？　新色も取り揃えております」
line = "「新作コスメ、いかがですか？　新色も取り揃えております」"

[[dialogue]]
speaker = "ナターシャ"
# 「ベアトから聞いてはいたけど、ほんとに授業出ずにバイトしてるんだ。授業受けなくていいくらい賢いらしいけど……星徒会長としてアリなのかな？」
line = "「ベアトから聞いてはいたけど、ほんとに授業出ずにバイトしてるんだ。授業受けなくていいくらい賢いらしいけど……星徒会長としてアリなのかな？」"

[[dialogue]]
speaker = "梨緒"
# 「選挙管理委員会としては問い質したいところだな……」
line = "「選挙管理委員会としては問い質したいところだな……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「お客様にはこちらの色が合うかと思います」
line = "「お客様にはこちらの色が合うかと思います」"

[[dialogue]]
speaker = "ルヴィネ"
# 「試しにどうでしょう？　……どうぞ、鏡をご覧ください」
line = "「試しにどうでしょう？　……どうぞ、鏡をご覧ください」"

[[dialogue]]
speaker = "梨緒"
# 「的確だな。……接客にしてはいささか愛想が足りない気がするが」
line = "「的確だな。……接客にしてはいささか愛想が足りない気がするが」"

[[dialogue]]
speaker = "梨緒"
# 「しかし何のためだ？　まさか彼女の立場で金銭のためとは思えないが……親しみやすさをアピールして人心掌握するためか？」
line = "「しかし何のためだ？　まさか彼女の立場で金銭のためとは思えないが……親しみやすさをアピールして人心掌握するためか？」"

[[dialogue]]
speaker = "ナターシャ"
# 「単なる趣味かもよ？」
line = "「単なる趣味かもよ？」"

[[dialogue]]
speaker = "梨緒"
# 「だとすれば問題だろう。星徒会長が授業に出席せずに趣味に興じているんだから」
line = "「だとすれば問題だろう。星徒会長が授業に出席せずに趣味に興じているんだから」"

[[dialogue]]
speaker = "ナターシャ"
# 「ま、当分はルヴィネがバイトしてるところを眺めることになるね。ちょっと暇になりそうだ」
line = "「ま、当分はルヴィネがバイトしてるところを眺めることになるね。ちょっと暇になりそうだ」"

[[dialogue]]
speaker = "ナターシャ"
# 「さっき何のために戦うって聞いてきたけどさ、そう言う梨緒はどうなの？　せっかくだから聞かせてよ」
line = "「さっき何のために戦うって聞いてきたけどさ、そう言う梨緒はどうなの？　せっかくだから聞かせてよ」"

[[dialogue]]
speaker = "梨緒"
# 「……意外だな。君がそんなことを言うなんて」
line = "「……意外だな。君がそんなことを言うなんて」"

[[dialogue]]
speaker = "ナターシャ"
# 「選挙管理委員会に入ってそれなりに経ったのに、梨緒とじっくり話す機会がなかったからね」
line = "「選挙管理委員会に入ってそれなりに経ったのに、梨緒とじっくり話す機会がなかったからね」"

[[dialogue]]
speaker = "ナターシャ"
# 「それにルヴィネのバイトまだ終わりそうにないし、暇潰しがてらにいいかなって。空中だから誰かに聞かれる心配もないし」
line = "「それにルヴィネのバイトまだ終わりそうにないし、暇潰しがてらにいいかなって。空中だから誰かに聞かれる心配もないし」"

[[dialogue]]
speaker = "梨緒"
# 「私の話は暇潰しか……」
line = "「私の話は暇潰しか……」"

[[dialogue]]
speaker = "梨緒"
# 「だが確かに、話をするには丁度いいか」
line = "「だが確かに、話をするには丁度いいか」"
