[[dialogue]]
speaker = "unk"
# 第２話,Ｖチューバーは大変,P
line = "第２話,Ｖチューバーは大変,P"

[[dialogue]]
speaker = "ルルカ"
# 「ねーねー。お兄ちゃん。くしゃみをするとね、配信のコメントで『くしゃみ助かる』って言われるんだけど、くしゃみって助かるのかな？」
line = "「ねーねー。お兄ちゃん。くしゃみをするとね、配信のコメントで『くしゃみ助かる』って言われるんだけど、くしゃみって助かるのかな？」"

[[dialogue]]
speaker = "ルルカ"
# 「面白いよね～。舌打ちしても『投げキッス助かる』って言われるし、激辛企画で鼻水ズルズルになっちゃった時も『鼻水助かる』って言われるし」
line = "「面白いよね～。舌打ちしても『投げキッス助かる』って言われるし、激辛企画で鼻水ズルズルになっちゃった時も『鼻水助かる』って言われるし」"

[[dialogue]]
speaker = "ルルカ"
# 「もしかして、Ｖチューバーのリスナーさんって汚いのが好きなのかな……？」
line = "「もしかして、Ｖチューバーのリスナーさんって汚いのが好きなのかな……？」"

[[dialogue]]
speaker = "ルルカ"
# 「う～ん……今まで芸人さんみたいなこと沢山してきたから、そういう路線に行ってもおかしいとは思われないだろうけど……まだ清楚路線の可能性を捨てたくないなぁ……」
line = "「う～ん……今まで芸人さんみたいなこと沢山してきたから、そういう路線に行ってもおかしいとは思われないだろうけど……まだ清楚路線の可能性を捨てたくないなぁ……」"

[[dialogue]]
speaker = "ルルカ"
# 「……汚いのが好きなわけじゃない？　ギャップ？」
line = "「……汚いのが好きなわけじゃない？　ギャップ？」"

[[dialogue]]
speaker = "ルルカ"
# 「あたしみたいな見た目の子が、くしゃみしたり鼻水ズルズルになってるのがいいの？　な、なるほど……お兄ちゃん、意外と詳しいんだね」
line = "「あたしみたいな見た目の子が、くしゃみしたり鼻水ズルズルになってるのがいいの？　な、なるほど……お兄ちゃん、意外と詳しいんだね」"

[[dialogue]]
speaker = "ルルカ"
# 「な、なんかちょっとヘンタイっぽくない……？」
line = "「な、なんかちょっとヘンタイっぽくない……？」"

[[dialogue]]
speaker = "unk"
# ヘンタイと罵られるのもまたギャップかも
line = "ヘンタイと罵られるのもまたギャップかも"

[[dialogue]]
speaker = "ルルカ"
# 「言葉って難しいね……あたしがなんとなしに言った言葉とかで、コメントしてるみんながざわざわするんだもん」
line = "「言葉って難しいね……あたしがなんとなしに言った言葉とかで、コメントしてるみんながざわざわするんだもん」"

[[dialogue]]
speaker = "ルルカ"
# 「例えば……あたしがホラーゲームで悲鳴を上げたりすると、それがなんか……え、えっちな声に聞こえるとか言われるんだよ……」
line = "「例えば……あたしがホラーゲームで悲鳴を上げたりすると、それがなんか……え、えっちな声に聞こえるとか言われるんだよ……」"

[[dialogue]]
speaker = "ルルカ"
# 「『正直興奮した』とかコメントされるの。だから、なんかあたしも調子に乗ってそれっぽい声を出してみたりするんだけど……」
line = "「『正直興奮した』とかコメントされるの。だから、なんかあたしも調子に乗ってそれっぽい声を出してみたりするんだけど……」"

[[dialogue]]
speaker = "ルルカ"
# 「……その、わざとえっちっぽい声を出そうとすると、『無理すんな』とか『キッツ』とか言われるんだよ！！」
line = "「……その、わざとえっちっぽい声を出そうとすると、『無理すんな』とか『キッツ』とか言われるんだよ！！」"

[[dialogue]]
speaker = "ルルカ"
# 「どっちがいいのか全然わかんなくない！？！？　頑張って勇気出してえっちっぽい声出したのに！　『キッツ』って酷いよね！？」
line = "「どっちがいいのか全然わかんなくない！？！？　頑張って勇気出してえっちっぽい声出したのに！　『キッツ』って酷いよね！？」"

[[dialogue]]
speaker = "unk"
# 自然体でいるのが１番いいってことだ
line = "自然体でいるのが１番いいってことだ"

[[dialogue]]
speaker = "ルルカ"
# 「ううん、自然体過ぎるのもよくないんだよ……前に、あたしのままがいいのかなって思って、配信中にお菓子とかぱりぱり音を立てて食べてたんだけど……」
line = "「ううん、自然体過ぎるのもよくないんだよ……前に、あたしのままがいいのかなって思って、配信中にお菓子とかぱりぱり音を立てて食べてたんだけど……」"

[[dialogue]]
speaker = "ルルカ"
# 「アカウントのＤＭで、『プロ意識が足りないんじゃないですか』とか『中の人感全開で見てられない』とか、すっごい色々言われたんだよ……」
line = "「アカウントのＤＭで、『プロ意識が足りないんじゃないですか』とか『中の人感全開で見てられない』とか、すっごい色々言われたんだよ……」"

[[dialogue]]
speaker = "ルルカ"
# 「む～～！　思い出したらなんかムカムカしてきたかも！」
line = "「む～～！　思い出したらなんかムカムカしてきたかも！」"

[[dialogue]]
speaker = "ルルカ"
# 「更新も毎日してたし、コメントにもなるべく反応するようにしてたし、プロ意識だったら誰にも負けない自信があったのに、なんであんなこと言われなきゃいけないんだろ～！」
line = "「更新も毎日してたし、コメントにもなるべく反応するようにしてたし、プロ意識だったら誰にも負けない自信があったのに、なんであんなこと言われなきゃいけないんだろ～！」"

[[dialogue]]
speaker = "ルルカ"
# 「お兄ちゃんもそう思うよね！？」
line = "「お兄ちゃんもそう思うよね！？」"

[[dialogue]]
speaker = "ルルカ"
# 「…………待って。今、いいこと思いついたかも」
line = "「…………待って。今、いいこと思いついたかも」"

[[dialogue]]
speaker = "ルルカ"
# 「これをネタにして、ルカルカに来た記憶に残ったコメントランキングの動画とか作るのはどうかな！？　ランキング系の動画って強いし、なんか再生数稼げそうな気がする！」
line = "「これをネタにして、ルカルカに来た記憶に残ったコメントランキングの動画とか作るのはどうかな！？　ランキング系の動画って強いし、なんか再生数稼げそうな気がする！」"

[[dialogue]]
speaker = "ルルカ"
# 「よーし、帰って動画の編集しよ！　ふっふっふ……いつか何かに使ってやろうと思って、全部スクショして保存してるんだから……！」
line = "「よーし、帰って動画の編集しよ！　ふっふっふ……いつか何かに使ってやろうと思って、全部スクショして保存してるんだから……！」"

[[dialogue]]
speaker = "ルルカ"
# 「初期の頃のコメント、懐かしいなぁ……変な人も多かったけど、優しい人もたくさんいたもんね……まだあたしの配信見てくれてるのかなぁ……」
line = "「初期の頃のコメント、懐かしいなぁ……変な人も多かったけど、優しい人もたくさんいたもんね……まだあたしの配信見てくれてるのかなぁ……」"

[[dialogue]]
speaker = "ルルカ"
# 「ん……？　これ、どういう意味だろ。『オフパコ』？　オフパコってなに……？」
line = "「ん……？　これ、どういう意味だろ。『オフパコ』？　オフパコってなに……？」"

[[dialogue]]
speaker = "ルルカ"
# 「リーリアちゃんに聞いてみよっかな。こういうのきっと詳しいだろうし……」
line = "「リーリアちゃんに聞いてみよっかな。こういうのきっと詳しいだろうし……」"

[[dialogue]]
speaker = "ルルカ"
# 「えっと……『オフパコってどういう意味か知ってる？』……っと」
line = "「えっと……『オフパコってどういう意味か知ってる？』……っと」"

[[dialogue]]
speaker = "ルルカ"
# 「わっ、もう返信きた。えっと、なになに……」
line = "「わっ、もう返信きた。えっと、なになに……」"

[[dialogue]]
speaker = "アナ"
# 「会長、今日はルルカさんが来るらしいです」
line = "「会長、今日はルルカさんが来るらしいです」"

[[dialogue]]
speaker = "アナ"
# 「はい。クラスメイトなので。会長に用事があると言ってました。もう少ししたらここにやって来る──」
line = "「はい。クラスメイトなので。会長に用事があると言ってました。もう少ししたらここにやって来る──」"

[[dialogue]]
speaker = "ルルカ"
# 「お兄ちゃん、お待たせ！　アナちゃんもお疲れ様～！」
line = "「お兄ちゃん、お待たせ！　アナちゃんもお疲れ様～！」"

[[dialogue]]
speaker = "ルルカ"
# 「お兄ちゃんってもう、今日は星徒会の用事はない感じ？」
line = "「お兄ちゃんってもう、今日は星徒会の用事はない感じ？」"

[[dialogue]]
speaker = "アナ"
# 「ちょうど終わった。今からオフ」
line = "「ちょうど終わった。今からオフ」"

[[dialogue]]
speaker = "ルルカ"
# 「良かったー！　ナイスタイミング。それじゃー、お兄ちゃん！」
line = "「良かったー！　ナイスタイミング。それじゃー、お兄ちゃん！」"

[[dialogue]]
speaker = "ルルカ"
# 「今からあたしと──オフパコしよ！！」
line = "「今からあたしと──オフパコしよ！！」"

[[dialogue]]
speaker = "unk"
# は！？！？！？！？！？！？
line = "は！？！？！？！？！？！？"

[[dialogue]]
speaker = "アナ"
# 「──！？」
line = "「──！？」"

[[dialogue]]
speaker = "ルルカ"
# 「お兄ちゃん、お仕事で疲れてるだろうし。あたしと一緒にリフレッシュしよーよ！　ねっ♪」
line = "「お兄ちゃん、お仕事で疲れてるだろうし。あたしと一緒にリフレッシュしよーよ！　ねっ♪」"

[[dialogue]]
speaker = "ルルカ"
# 「昨日、リーリアちゃんに教えてもらったんだけど、オフパコって凄く良いらしいよ！　疲れも吹き飛ぶって！　どう？　オフパコしよお兄ちゃん！」
line = "「昨日、リーリアちゃんに教えてもらったんだけど、オフパコって凄く良いらしいよ！　疲れも吹き飛ぶって！　どう？　オフパコしよお兄ちゃん！」"

[[dialogue]]
speaker = "アナ"
# 「会長……流石に引く……」
line = "「会長……流石に引く……」"

[[dialogue]]
speaker = "ルルカ"
# 「あ、そうだ。アナちゃんもご一緒する？　オフパコ！」
line = "「あ、そうだ。アナちゃんもご一緒する？　オフパコ！」"

[[dialogue]]
speaker = "アナ"
# 「私も！？」
line = "「私も！？」"

[[dialogue]]
speaker = "ルルカ"
# 「うん、みんなでオフパコしたらきっと何倍も楽しいよ！」
line = "「うん、みんなでオフパコしたらきっと何倍も楽しいよ！」"

[[dialogue]]
speaker = "アナ"
# 「……ルルカさん、あまりその言葉はみだりに口にしないほうが良いかと。会長、ちょっと奥まで来てください。説教」
line = "「……ルルカさん、あまりその言葉はみだりに口にしないほうが良いかと。会長、ちょっと奥まで来てください。説教」"

[[dialogue]]
speaker = "アナ"
# 「抵抗は無理。きりきり歩く」
line = "「抵抗は無理。きりきり歩く」"

[[dialogue]]
speaker = "ルルカ"
# 「…………あれ？　も、もしかして言っちゃいけない言葉だったのかな」
line = "「…………あれ？　も、もしかして言っちゃいけない言葉だったのかな」"

[[dialogue]]
speaker = "ルルカ"
# 「オフパコって……『オフにパフェを食べに行こ』の略だって……リーリアちゃんは言ってたんだけどな……？」
line = "「オフパコって……『オフにパフェを食べに行こ』の略だって……リーリアちゃんは言ってたんだけどな……？」"
