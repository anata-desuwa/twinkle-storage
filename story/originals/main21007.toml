[[dialogue]]
speaker = "unk"
# 第７話,レティシアとの戦い,B
line = "第７話,レティシアとの戦い,B"

[[dialogue]]
speaker = "unk"
# ガーディアンの自爆の際、運よく巻き込まれなかった者もいた。
line = "ガーディアンの自爆の際、運よく巻き込まれなかった者もいた。"

[[dialogue]]
speaker = "unk"
# 仲間を助けに向かおうとするアポロとベアトリスの前に、極星星徒会のレティシアが立ちはだかる。
line = "仲間を助けに向かおうとするアポロとベアトリスの前に、極星星徒会のレティシアが立ちはだかる。"

[[dialogue]]
speaker = "アポロ"
# 「みんなを助けに行きたいのに、邪魔するなっての！」
line = "「みんなを助けに行きたいのに、邪魔するなっての！」"

[[dialogue]]
speaker = "ベアトリス"
# 「レティシアちゃん！　せめて今だけでも戦いをやめて、みんなを助けに行こうよ！」
line = "「レティシアちゃん！　せめて今だけでも戦いをやめて、みんなを助けに行こうよ！」"

[[dialogue]]
speaker = "レティシア"
# 「グレイスなら大丈夫よ。あの子はちょっと抜けたところもあるけれど、とても優秀な子だもの」
line = "「グレイスなら大丈夫よ。あの子はちょっと抜けたところもあるけれど、とても優秀な子だもの」"

[[dialogue]]
speaker = "レティシア"
# 「それよりも敵が分散した今は好機。各個撃破も可能ね。一時的にベアトの救出を優先しましょう」
line = "「それよりも敵が分散した今は好機。各個撃破も可能ね。一時的にベアトの救出を優先しましょう」"

[[dialogue]]
speaker = "アポロ"
# 「あたし１人なら倒せるってか！　そうはさせるか！」
line = "「あたし１人なら倒せるってか！　そうはさせるか！」"

[[dialogue]]
speaker = "unk"
# アポロの大剣とレティシアの刀がぶつかり、力と力の衝突が天界の空を震わせる。
line = "アポロの大剣とレティシアの刀がぶつかり、力と力の衝突が天界の空を震わせる。"

[[dialogue]]
speaker = "アポロ"
# 「コイツ、強いな……！」
line = "「コイツ、強いな……！」"

[[dialogue]]
speaker = "ベアトリス"
# 「レティシアちゃんはルヴィの次に強いから……」
line = "「レティシアちゃんはルヴィの次に強いから……」"

[[dialogue]]
speaker = "アポロ"
# 「ベアトは副会長なのに二番目じゃないのかよ！」
line = "「ベアトは副会長なのに二番目じゃないのかよ！」"

[[dialogue]]
speaker = "レティシア"
# 「アルタイルには魔王の力を持つ者がいると聞いていたけれど、あなたがそうなのかしら。油断ならない相手みたい」
line = "「アルタイルには魔王の力を持つ者がいると聞いていたけれど、あなたがそうなのかしら。油断ならない相手みたい」"

[[dialogue]]
speaker = "レティシア"
# 「だけど、このままなら私が勝つわね。あなた、持久力には自信がないんでしょう？」
line = "「だけど、このままなら私が勝つわね。あなた、持久力には自信がないんでしょう？」"

[[dialogue]]
speaker = "アポロ"
# 「くっ……」
line = "「くっ……」"

[[dialogue]]
speaker = "unk"
# アポロはレティシアの攻撃が直撃しないように捌いているが、刀に宿った紫炎が乗り移り、呪いのようにアポロを蝕む。
line = "アポロはレティシアの攻撃が直撃しないように捌いているが、刀に宿った紫炎が乗り移り、呪いのようにアポロを蝕む。"

[[dialogue]]
speaker = "unk"
# 炎は着実に体力を削り、アポロの小さな体にダメージを与え続けていた。
line = "炎は着実に体力を削り、アポロの小さな体にダメージを与え続けていた。"

[[dialogue]]
speaker = "レティシア"
# 「アルタイルは敵だけど、ベアトにとってあなたはお友達？」
line = "「アルタイルは敵だけど、ベアトにとってあなたはお友達？」"

[[dialogue]]
speaker = "レティシア"
# 「だったらベアトの前で傷つけたくないわね。おとなしく退いてくれないかしら？」
line = "「だったらベアトの前で傷つけたくないわね。おとなしく退いてくれないかしら？」"

[[dialogue]]
speaker = "アポロ"
# 「そしたら神殿が破壊されるだろうが！」
line = "「そしたら神殿が破壊されるだろうが！」"

[[dialogue]]
speaker = "ベアトリス"
# 「待って、レティシアちゃん！　私の話を聞いて！」
line = "「待って、レティシアちゃん！　私の話を聞いて！」"

[[dialogue]]
speaker = "レティシア"
# 「今はベアトの話を聞く気はないと、さっきも言ったはずよ。また後で──デネブに戻ってからゆっくりと聞かせてちょうだい？」
line = "「今はベアトの話を聞く気はないと、さっきも言ったはずよ。また後で──デネブに戻ってからゆっくりと聞かせてちょうだい？」"

[[dialogue]]
speaker = "ベアトリス"
# 「それでも、私は何度でも話すよ！　レティシアちゃんが信じてくれるまで！」
line = "「それでも、私は何度でも話すよ！　レティシアちゃんが信じてくれるまで！」"

[[dialogue]]
speaker = "ベアトリス"
# 「それにレティシアちゃんには、特に聞いてほしいことがあるの……！」
line = "「それにレティシアちゃんには、特に聞いてほしいことがあるの……！」"

[[dialogue]]
speaker = "ベアトリス"
# 「創造神『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』は時代を超えて三界に影響を与えていた……！」
line = "「創造神『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』は時代を超えて三界に影響を与えていた……！」"

[[dialogue]]
speaker = "ベアトリス"
# 「３０００年前にバジュラ教団が信仰していたチャカパラ神だけじゃない」
line = "「３０００年前にバジュラ教団が信仰していたチャカパラ神だけじゃない」"

[[dialogue]]
speaker = "ベアトリス"
# 「魔界の辺境で信じられていたペンテラ様……天界の記録にあったジャミール神……いろんな名前を持ってて……！」
line = "「魔界の辺境で信じられていたペンテラ様……天界の記録にあったジャミール神……いろんな名前を持ってて……！」"

[[dialogue]]
speaker = "ベアトリス"
# 「その教えは、リクリエを『天啓』と呼び、女神テルルと異なる神の降臨を<ruby=ことほ>言祝</ruby>ぐこと──！」
line = "「その教えは、リクリエを『天啓』と呼び、女神テルルと異なる神の降臨を<ruby>言祝<rt>ことほ</rt></ruby>ぐこと──！」"

[[dialogue]]
speaker = "レティシア"
# 「あら。ずいぶんと懐かしい話題ね」
line = "「あら。ずいぶんと懐かしい話題ね」"

[[dialogue]]
speaker = "アポロ"
# 「懐かしいって……お前ら、いったい何の話をしてるんだ！？」
line = "「懐かしいって……お前ら、いったい何の話をしてるんだ！？」"

[[dialogue]]
speaker = "ベアトリス"
# 「えっと、それは……」
line = "「えっと、それは……」"

[[dialogue]]
speaker = "レティシア"
# 「別に隠す必要はないわ。私はそういう教団で生まれ育った信者だったというだけ。ルヴィやベアトたちに会うまで、ずっとね」
line = "「別に隠す必要はないわ。私はそういう教団で生まれ育った信者だったというだけ。ルヴィやベアトたちに会うまで、ずっとね」"

[[dialogue]]
speaker = "アポロ"
# 「……何だって！？」
line = "「……何だって！？」"

[[dialogue]]
speaker = "アポロ"
# （リクリエを信仰し、星騎士と対立する教団……！）
line = "（リクリエを信仰し、星騎士と対立する教団……！）"

[[dialogue]]
speaker = "アポロ"
# （リクリエはあたしみたいな使徒を作るだけじゃなくて、他のところでもヒトの人生をめちゃくちゃにしているんだな……）
line = "（リクリエはあたしみたいな使徒を作るだけじゃなくて、他のところでもヒトの人生をめちゃくちゃにしているんだな……）"

[[dialogue]]
speaker = "アポロ"
# （星見家メイド隊のナミエルも、元はフィオナを暗殺しようとしていた暗殺者だったって聞いたな……）
line = "（星見家メイド隊のナミエルも、元はフィオナを暗殺しようとしていた暗殺者だったって聞いたな……）"

[[dialogue]]
speaker = "アポロ"
# （ナミエルを送り込んだのも、もしかすると同じような教団の連中だったのかもしれない）
line = "（ナミエルを送り込んだのも、もしかすると同じような教団の連中だったのかもしれない）"

[[dialogue]]
speaker = "ベアトリス"
# 「レティシアちゃんがいた教団にも、きっと『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』が関係してる……！」
line = "「レティシアちゃんがいた教団にも、きっと『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』が関係してる……！」"

[[dialogue]]
speaker = "ベアトリス"
# 「存在しない神様を信じる、怖い人達だと思ってたけど……そうじゃないの！　『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』は本当に、私たちの世界に……『いる』の！」
line = "「存在しない神様を信じる、怖い人達だと思ってたけど……そうじゃないの！　『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』は本当に、私たちの世界に……『いる』の！」"

[[dialogue]]
speaker = "ベアトリス"
# 「だから一緒に戦おう！？　ルヴィに本当のことを聞いて、一緒に……！」
line = "「だから一緒に戦おう！？　ルヴィに本当のことを聞いて、一緒に……！」"

[[dialogue]]
speaker = "レティシア"
# 「それはできないわ」
line = "「それはできないわ」"

[[dialogue]]
speaker = "アポロ"
# 「オマエ、どうしてっ……教団でひどい目に遭ったんじゃないのか！？」
line = "「オマエ、どうしてっ……教団でひどい目に遭ったんじゃないのか！？」"

[[dialogue]]
speaker = "レティシア"
# 「それはそれ。これはこれ。今の状況にまったく関係のない話だわ」
line = "「それはそれ。これはこれ。今の状況にまったく関係のない話だわ」"

[[dialogue]]
speaker = "レティシア"
# 「ベアト。あなたが頑固なこと、私はよく知っている。だから逆もまた然りだとは思わない？」
line = "「ベアト。あなたが頑固なこと、私はよく知っている。だから逆もまた然りだとは思わない？」"

[[dialogue]]
speaker = "レティシア"
# 「私がどういう性格なのか──知らないわけじゃないでしょう？」
line = "「私がどういう性格なのか──知らないわけじゃないでしょう？」"

[[dialogue]]
speaker = "レティシア"
# 「私が敵地で、敵かもしれないヒトの言葉を聞いて……ルヴィからの指令を反故にすると思うのかしら？」
line = "「私が敵地で、敵かもしれないヒトの言葉を聞いて……ルヴィからの指令を反故にすると思うのかしら？」"

[[dialogue]]
speaker = "ベアトリス"
# 「……っ！」
line = "「……っ！」"

[[dialogue]]
speaker = "レティシア"
# 「ごめんなさいね。どれだけ言葉を積もらせても、今はあなたのことを信じてあげられない」
line = "「ごめんなさいね。どれだけ言葉を積もらせても、今はあなたのことを信じてあげられない」"

[[dialogue]]
speaker = "レティシア"
# 「私を止めたいなら、言葉での説得はやめなさい。そんなもので私は止まったりしない」
line = "「私を止めたいなら、言葉での説得はやめなさい。そんなもので私は止まったりしない」"

[[dialogue]]
speaker = "ベアトリス"
# 「レティシアちゃん、そんな……」
line = "「レティシアちゃん、そんな……」"

[[dialogue]]
speaker = "アポロ"
# 「どうして聞く耳を持たないんだ……！？　ベアトは、オマエと戦いたくないから、こうして……！」
line = "「どうして聞く耳を持たないんだ……！？　ベアトは、オマエと戦いたくないから、こうして……！」"

[[dialogue]]
speaker = "レティシア"
# 「言葉だけで相手が止まると本気で思っているのなら、それは覚悟が足りないと言うしかないわね」
line = "「言葉だけで相手が止まると本気で思っているのなら、それは覚悟が足りないと言うしかないわね」"

[[dialogue]]
speaker = "レティシア"
# 「敵対すると決めたのなら、相手を殺すことも視野に入れなさい。私はルヴィが所有する中でも最強の戦力──そう自負しているわ」
line = "「敵対すると決めたのなら、相手を殺すことも視野に入れなさい。私はルヴィが所有する中でも最強の戦力──そう自負しているわ」"

[[dialogue]]
speaker = "レティシア"
# 「デネブの救世主の<ruby=ふところがたな>懐刀</ruby>が、たやすい説得で矛を収めたりはしないの。残念だけど」
line = "「デネブの救世主の<ruby>懐刀<rt>ふところがたな</rt></ruby>が、たやすい説得で矛を収めたりはしないの。残念だけど」"

[[dialogue]]
speaker = "レティシア"
# 「安心してちょうだい、ベアト。あなたは絶対に殺さない。ルヴィの指令だし、大切な幼なじみだもの」
line = "「安心してちょうだい、ベアト。あなたは絶対に殺さない。ルヴィの指令だし、大切な幼なじみだもの」"

[[dialogue]]
speaker = "レティシア"
# 「でも、そっちの魔王の血を引く子は別ね。邪魔するようなら容赦はしない。死んでもらうわ」
line = "「でも、そっちの魔王の血を引く子は別ね。邪魔するようなら容赦はしない。死んでもらうわ」"

[[dialogue]]
speaker = "ベアトリス"
# 「レティシアちゃんっ──！」
line = "「レティシアちゃんっ──！」"

[[dialogue]]
speaker = "アポロ"
# 「この分からず屋っ……上等だっ！　かかってこい！！」
line = "「この分からず屋っ……上等だっ！　かかってこい！！」"
