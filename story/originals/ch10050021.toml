[[dialogue]]
speaker = "unk"
# 第１話,新春おみくじデート,P
line = "第１話,新春おみくじデート,P"

[[dialogue]]
speaker = "unk"
# 今日は１月３日──三が日の最後の日だ。
line = "今日は１月３日──三が日の最後の日だ。"

[[dialogue]]
speaker = "unk"
# 元旦は星徒会で初詣に行って、２日目は母さんとゆっくり過ごして、ようやくお互いのスケジュールを合わせられた３日目。
line = "元旦は星徒会で初詣に行って、２日目は母さんとゆっくり過ごして、ようやくお互いのスケジュールを合わせられた３日目。"

[[dialogue]]
speaker = "unk"
# もちろん俺の隣にいるのは──
line = "もちろん俺の隣にいるのは──"

[[dialogue]]
speaker = "ソフィア"
# 「あ、わ、わっ……ちょ、ちょっと待ってください。会長さん。こういう履き物は慣れてなくって……」
line = "「あ、わ、わっ……ちょ、ちょっと待ってください。会長さん。こういう履き物は慣れてなくって……」"

[[dialogue]]
speaker = "ソフィア"
# 「……っと、ふぅ。オーケーです。ご心配をおかけしました」
line = "「……っと、ふぅ。オーケーです。ご心配をおかけしました」"

[[dialogue]]
speaker = "unk"
# 歩くの速かったかな？
line = "歩くの速かったかな？"

[[dialogue]]
speaker = "ソフィア"
# 「い、いいえ。会長さんはゆっくり歩いてくださっています。躓きそうになったのは、私が周りを見ていたからで……」
line = "「い、いいえ。会長さんはゆっくり歩いてくださっています。躓きそうになったのは、私が周りを見ていたからで……」"

[[dialogue]]
speaker = "ソフィア"
# 「人間界のお正月はやっぱり華やかです。みなさん綺麗な着物姿ですし、おみくじや露店もたくさん並んでいて目移りしてしまって」
line = "「人間界のお正月はやっぱり華やかです。みなさん綺麗な着物姿ですし、おみくじや露店もたくさん並んでいて目移りしてしまって」"

[[dialogue]]
speaker = "ソフィア"
# 「躓いて転ぶだなんてフィギュアスケーターとしてあってはならないことです。気を引き締めないと……」
line = "「躓いて転ぶだなんてフィギュアスケーターとしてあってはならないことです。気を引き締めないと……」"

[[dialogue]]
speaker = "unk"
# じゃあ手を繋ごうか
line = "じゃあ手を繋ごうか"

[[dialogue]]
speaker = "ソフィア"
# 「あっ……はい♪　通行人の方がたくさんいらっしゃいますから、ちょっぴり恥ずかしいですけれど……恋人同士なら普通、ですよね？」
line = "「あっ……はい♪　通行人の方がたくさんいらっしゃいますから、ちょっぴり恥ずかしいですけれど……恋人同士なら普通、ですよね？」"

[[dialogue]]
speaker = "ソフィア"
# 「それじゃあ会長さん。エスコート、よろしくお願いします<emoji=heart04>」
line = "「それじゃあ会長さん。エスコート、よろしくお願いします<emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
# 「なるほど。この桐箪笥のような引き出しに、おみくじが入っているんですね」
line = "「なるほど。この桐箪笥のような引き出しに、おみくじが入っているんですね」"

[[dialogue]]
speaker = "ソフィア"
# 「何だかおしゃれですね。ではでは……あ、私が開けるのはこの引き出しみたいです。では、えいっ……！」
line = "「何だかおしゃれですね。ではでは……あ、私が開けるのはこの引き出しみたいです。では、えいっ……！」"

[[dialogue]]
speaker = "ソフィア"
# 「運勢は──」
line = "「運勢は──」"

[[dialogue]]
speaker = "ソフィア"
# 「きょ、凶ッ……！？　そそそ、そんなっ……！」
line = "「きょ、凶ッ……！？　そそそ、そんなっ……！」"

[[dialogue]]
speaker = "unk"
# あ、俺も凶だ
line = "あ、俺も凶だ"

[[dialogue]]
speaker = "ソフィア"
# 「会長さんまで！？　さ、幸先が良くないような……これってあれですか、私たち２人してアンラッキーイヤーってことなのでしょうか……」
line = "「会長さんまで！？　さ、幸先が良くないような……これってあれですか、私たち２人してアンラッキーイヤーってことなのでしょうか……」"

[[dialogue]]
speaker = "ソフィア"
# 「……でも、考えようによっては、凶の方が良いかもしれませんね」
line = "「……でも、考えようによっては、凶の方が良いかもしれませんね」"

[[dialogue]]
speaker = "ソフィア"
# 「運勢が悪いですよと言われた方が、一日一日を注意深く過ごそうと思えますし」
line = "「運勢が悪いですよと言われた方が、一日一日を注意深く過ごそうと思えますし」"

[[dialogue]]
speaker = "ソフィア"
# 「学問……現状に満足せず励むべし。願望……叶いにくい、日々の積み重ねが第一歩……」
line = "「学問……現状に満足せず励むべし。願望……叶いにくい、日々の積み重ねが第一歩……」"

[[dialogue]]
speaker = "ソフィア"
# 「ふふ、努力ならば望むところです。よぉし、頑張っちゃいますよ……！」
line = "「ふふ、努力ならば望むところです。よぉし、頑張っちゃいますよ……！」"

[[dialogue]]
speaker = "ソフィア"
# 「あ、そうです。会長さんのおみくじも見せて欲しいです。何が書いてあったんですか？」
line = "「あ、そうです。会長さんのおみくじも見せて欲しいです。何が書いてあったんですか？」"

[[dialogue]]
speaker = "ソフィア"
# 「え～っと……だいたい私と同じですね。頑張らないと叶えられないというシビアなアドバイスが……むむっ？」
line = "「え～っと……だいたい私と同じですね。頑張らないと叶えられないというシビアなアドバイスが……むむっ？」"

[[dialogue]]
speaker = "ソフィア"
# 「恋愛……女性関係で波乱の傾向あり。浮気心は捨てよ」
line = "「恋愛……女性関係で波乱の傾向あり。浮気心は捨てよ」"

[[dialogue]]
speaker = "ソフィア"
# 「じぃ～っ……」
line = "「じぃ～っ……」"

[[dialogue]]
speaker = "unk"
# 俺はソフィ一筋だから！？
line = "俺はソフィ一筋だから！？"

[[dialogue]]
speaker = "ソフィア"
# 「本当でしょうか～？　会長さんのことを狙っている女性はたくさんいらっしゃいますよね。両学園で心当たりがたくさんあります」
line = "「本当でしょうか～？　会長さんのことを狙っている女性はたくさんいらっしゃいますよね。両学園で心当たりがたくさんあります」"

[[dialogue]]
speaker = "ソフィア"
# 「星徒会の方々は、綺麗でグラマラスな方ばかりですし。私なんて学年どころか学校も違いますし。色々ちっちゃいですし」
line = "「星徒会の方々は、綺麗でグラマラスな方ばかりですし。私なんて学年どころか学校も違いますし。色々ちっちゃいですし」"

[[dialogue]]
speaker = "ソフィア"
# 「この前も姉さんにむぎゅ～っと抱き着かれて、デレデレしてましたよね。知ってるんですからね？」
line = "「この前も姉さんにむぎゅ～っと抱き着かれて、デレデレしてましたよね。知ってるんですからね？」"

[[dialogue]]
speaker = "ソフィア"
# 「何よりおみくじに書かれている言葉は、神様の言葉です。浮気心は捨てた方がいいと思いますが……」
line = "「何よりおみくじに書かれている言葉は、神様の言葉です。浮気心は捨てた方がいいと思いますが……」"

[[dialogue]]
speaker = "ソフィア"
# 「……なーんて。冗談ですよ、ふふっ。会長さんが一途な方だって、私はよく知っています」
line = "「……なーんて。冗談ですよ、ふふっ。会長さんが一途な方だって、私はよく知っています」"

[[dialogue]]
speaker = "ソフィア"
# 「ぁ……後ろが混んできてますね。移動しましょうか」
line = "「ぁ……後ろが混んできてますね。移動しましょうか」"

[[dialogue]]
speaker = "ソフィア"
# 「元旦でなくとも凄い混み方ですね。おみくじも引けましたし、そろそろ移動しましょうか」
line = "「元旦でなくとも凄い混み方ですね。おみくじも引けましたし、そろそろ移動しましょうか」"

[[dialogue]]
speaker = "ソフィア"
# 「あ、あわわ。油断したらはぐれちゃいそうですっ……」
line = "「あ、あわわ。油断したらはぐれちゃいそうですっ……」"

[[dialogue]]
speaker = "unk"
# （ソフィアの手を握って引き寄せる）
line = "（ソフィアの手を握って引き寄せる）"

[[dialogue]]
speaker = "ソフィア"
# 「あっ……<emoji=heart04>　ふふ、ありがとうございます。そうですね。今日は一日、ずっと手を繋いでいた方がいいかもしれません」
line = "「あっ……<emoji=heart04>　ふふ、ありがとうございます。そうですね。今日は一日、ずっと手を繋いでいた方がいいかもしれません」"

[[dialogue]]
speaker = "ソフィア"
# 「はぐれないように、という意味ももちろんありますが……」
line = "「はぐれないように、という意味ももちろんありますが……」"

[[dialogue]]
speaker = "ソフィア"
# 「会長さんの手のひら、いつ握ってもあったかい……ソーホットですから♪」
line = "「会長さんの手のひら、いつ握ってもあったかい……ソーホットですから♪」"

[[dialogue]]
speaker = "ソフィア"
# 「会長さん、次は街の方に行きましょう。人間界には『初売りセール』というのがあるんですよね♪」
line = "「会長さん、次は街の方に行きましょう。人間界には『初売りセール』というのがあるんですよね♪」"

[[dialogue]]
speaker = "unk"
# 人混みではぐれないよう、ソフィとぎゅっと手を握りあいながら、俺たちは神社を後にするのだった──
line = "人混みではぐれないよう、ソフィとぎゅっと手を握りあいながら、俺たちは神社を後にするのだった──"
