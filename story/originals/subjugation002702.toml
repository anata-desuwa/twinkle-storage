[[dialogue]]
speaker = "ヨミ"
# 「無事に……着いたみたいですね……」
line = "「無事に……着いたみたいですね……」"

[[dialogue]]
speaker = "unk"
# ここが紫桜の里？
line = "ここが紫桜の里？"

[[dialogue]]
speaker = "unk"
# 本当に転移したんだ……
line = "本当に転移したんだ……"

[[dialogue]]
speaker = "せつな"
# 「おお～、ここはまさしく紫桜の里にござる！　転移は大成功でござるよ～！」
line = "「おお～、ここはまさしく紫桜の里にござる！　転移は大成功でござるよ～！」"

[[dialogue]]
speaker = "ヨミ"
# 「体調は大丈夫ですか？　具合が悪かったりしませんか？」
line = "「体調は大丈夫ですか？　具合が悪かったりしませんか？」"

[[dialogue]]
speaker = "せつな"
# 「特に問題は無さそうでござるな、せつなは元気いっぱいでござる！」
line = "「特に問題は無さそうでござるな、せつなは元気いっぱいでござる！」"

[[dialogue]]
speaker = "ウズメイア"
# 「うぷっ……あたしはちょっち気持ち悪いかも……」
line = "「うぷっ……あたしはちょっち気持ち悪いかも……」"

[[dialogue]]
speaker = "unk"
# 少し休んだ方がいい？
line = "少し休んだ方がいい？"

[[dialogue]]
speaker = "unk"
# 大丈夫？
line = "大丈夫？"

[[dialogue]]
speaker = "ウズメイア"
# 「へーきへーき、そんなことよりほら！　忍者の里だよ、忍者の里！　め～～っちゃアガるっしょ～！」
line = "「へーきへーき、そんなことよりほら！　忍者の里だよ、忍者の里！　め～～っちゃアガるっしょ～！」"

[[dialogue]]
speaker = "せつな"
# 「アゲアゲでござるな！」
line = "「アゲアゲでござるな！」"

[[dialogue]]
speaker = "ウズメイア"
# 「ありがとね、ござるちゃん！　あたしも誘ってくれて、感謝してもしきれないっしょ！」
line = "「ありがとね、ござるちゃん！　あたしも誘ってくれて、感謝してもしきれないっしょ！」"

[[dialogue]]
speaker = "せつな"
# 「時代劇をこよなく愛するウズメ殿は、是非ご招待したいと思っていたでござる！　喜んでもらえているようで何よりでござるよ！」
line = "「時代劇をこよなく愛するウズメ殿は、是非ご招待したいと思っていたでござる！　喜んでもらえているようで何よりでござるよ！」"

[[dialogue]]
speaker = "ヨミ"
# 「……とは言っても、見た感じは普通ののどかな山里って感じでしょうか？」
line = "「……とは言っても、見た感じは普通ののどかな山里って感じでしょうか？」"

[[dialogue]]
speaker = "ウズメイア"
# 「甘いよっ、ヨミヨミ！　それは世を忍ぶ仮の姿！　その実態は……ほらそこ！　忍の罠が！」
line = "「甘いよっ、ヨミヨミ！　それは世を忍ぶ仮の姿！　その実態は……ほらそこ！　忍の罠が！」"

[[dialogue]]
speaker = "ヨミ"
# 「ええ～、そんなことあるはず……」
line = "「ええ～、そんなことあるはず……」"

[[dialogue]]
speaker = "ヨミ"
# 「こやぁぁぁ～～～～～っ！！」
line = "「こやぁぁぁ～～～～～っ！！」"

[[dialogue]]
speaker = "unk"
# いきなり宙吊りに！？
line = "いきなり宙吊りに！？"

[[dialogue]]
speaker = "unk"
# ヨミヨミ～～っ！！
line = "ヨミヨミ～～っ！！"

[[dialogue]]
speaker = "せつな"
# 「油断大敵でござる、はあっ！！！」
line = "「油断大敵でござる、はあっ！！！」"

[[dialogue]]
speaker = "ヨミ"
# 「あぅぅ……ひどい目に遭いました……」
line = "「あぅぅ……ひどい目に遭いました……」"

[[dialogue]]
speaker = "ウズメイア"
# 「おおー、これがシノビ・トラップ！　さっすが忍の里！」
line = "「おおー、これがシノビ・トラップ！　さっすが忍の里！」"

[[dialogue]]
speaker = "せつな"
# 「至るところに罠が仕掛けられてるから、気軽にその辺を触らない方がいいでござるよ」
line = "「至るところに罠が仕掛けられてるから、気軽にその辺を触らない方がいいでござるよ」"

[[dialogue]]
speaker = "ヨミ"
# 「それを先に言って下さいよ～」
line = "「それを先に言って下さいよ～」"

[[dialogue]]
speaker = "ウズメイア"
# 「ってことは、もしかしてあっちにいる村人ちゃんも、ただの女の子じゃないとか？」
line = "「ってことは、もしかしてあっちにいる村人ちゃんも、ただの女の子じゃないとか？」"

[[dialogue]]
speaker = "村の女の子"
# 「曲者っ！！」
line = "「曲者っ！！」"

[[dialogue]]
speaker = "ヨミ"
# 「え？　あ、ちょっと！？　これってヤバくないですか？」
line = "「え？　あ、ちょっと！？　これってヤバくないですか？」"

[[dialogue]]
speaker = "ウズメイア"
# 「わ～お！　さっそく面白そうな展開になってきたし♪」
line = "「わ～お！　さっそく面白そうな展開になってきたし♪」"

[[dialogue]]
speaker = "村の女の子"
# 「たぁっ！！」
line = "「たぁっ！！」"

[[dialogue]]
speaker = "せつな"
# 「甘い！」
line = "「甘い！」"

[[dialogue]]
speaker = "ヨミ"
# 「こやぁぁぁん！　いきなり何なんですか～！　着いて早々、死んじゃうとこでしたよ～！」
line = "「こやぁぁぁん！　いきなり何なんですか～！　着いて早々、死んじゃうとこでしたよ～！」"

[[dialogue]]
speaker = "ウズメイア"
# 「手裏剣！？　今の手裏剣だよね？　おおお～、マジ手裏剣きたっしょ～～～～っ！！」
line = "「手裏剣！？　今の手裏剣だよね？　おおお～、マジ手裏剣きたっしょ～～～～っ！！」"

[[dialogue]]
speaker = "ヨミ"
# 「興奮してる場合じゃないですよ！　いきなり手裏剣を投げつけてくるなんて、完全に侵入者を排除するモードになってるじゃないですか～」
line = "「興奮してる場合じゃないですよ！　いきなり手裏剣を投げつけてくるなんて、完全に侵入者を排除するモードになってるじゃないですか～」"

[[dialogue]]
speaker = "せつな"
# 「心配ご無用でござるよ。これも里の歓迎みたいなもの……で、ござるな、さつき？」
line = "「心配ご無用でござるよ。これも里の歓迎みたいなもの……で、ござるな、さつき？」"

[[dialogue]]
speaker = "さつき"
# 「うん。お帰り、せつな。久し振りだね」
line = "「うん。お帰り、せつな。久し振りだね」"

[[dialogue]]
speaker = "せつな"
# 「にんにん！」
line = "「にんにん！」"

[[dialogue]]
speaker = "さつき"
# 「にんにん！」
line = "「にんにん！」"

[[dialogue]]
speaker = "ウズメイア"
# 「忍者同士の謎の挨拶はじまった！　クールすぎでしょ～！」
line = "「忍者同士の謎の挨拶はじまった！　クールすぎでしょ～！」"

[[dialogue]]
speaker = "村の女の子"
# 「せつな～っ、おっかえり～！！」
line = "「せつな～っ、おっかえり～！！」"

[[dialogue]]
speaker = "せつな"
# 「おお、ちとせも！　ただいまでござる～！」
line = "「おお、ちとせも！　ただいまでござる～！」"

[[dialogue]]
speaker = "ちとせ"
# 「にんにん、お土産は買ってきてくれた？」
line = "「にんにん、お土産は買ってきてくれた？」"

[[dialogue]]
speaker = "せつな"
# 「もちろんでござるよ。後で渡すから待っているでござる」
line = "「もちろんでござるよ。後で渡すから待っているでござる」"

[[dialogue]]
speaker = "ちとせ"
# 「オッケー、楽しみにしてるね。じゃひとまず、退散！」
line = "「オッケー、楽しみにしてるね。じゃひとまず、退散！」"

[[dialogue]]
speaker = "さつき"
# 「せつな、私も行くね。後で色々聞かせてもらうから覚悟してて」
line = "「せつな、私も行くね。後で色々聞かせてもらうから覚悟してて」"

[[dialogue]]
speaker = "ウズメイア"
# 「２人とも消えたし！？　か、かっこいい……」
line = "「２人とも消えたし！？　か、かっこいい……」"

[[dialogue]]
speaker = "せつな"
# 「皆に紹介しようとおもったのに、さっさと消えてしまうとは。本当に困った２人でござる……」
line = "「皆に紹介しようとおもったのに、さっさと消えてしまうとは。本当に困った２人でござる……」"

[[dialogue]]
speaker = "せつな"
# 「ともあれ、ここがせつなの故郷、紫桜の里でござるよ。みんなにも気に入ってもらえると嬉しいでござる」
line = "「ともあれ、ここがせつなの故郷、紫桜の里でござるよ。みんなにも気に入ってもらえると嬉しいでござる」"

[[dialogue]]
speaker = "ウズメイア"
# 「もうのっけから気に入りまくりだよっ！　忍者の里、最高～っ！」
line = "「もうのっけから気に入りまくりだよっ！　忍者の里、最高～っ！」"

[[dialogue]]
speaker = "ヨミ"
# 「はい、最初はビックリしましたけど慣れれば楽しいかもです」
line = "「はい、最初はビックリしましたけど慣れれば楽しいかもです」"

[[dialogue]]
speaker = "せつな"
# 「それは何よりでござった。では、これからせつなの師匠にご挨拶するでござるよ～！」
line = "「それは何よりでござった。では、これからせつなの師匠にご挨拶するでござるよ～！」"
