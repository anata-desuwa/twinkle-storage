[[dialogue]]
speaker = "unk"
# 第３話,どうしてあなたは,P
line = "第３話,どうしてあなたは,P"

[[dialogue]]
speaker = "カヤ"
# 「はぁああああっっ！！！」
line = "「はぁああああっっ！！！」"

[[dialogue]]
speaker = "カヤ"
# 「きゃっ！？　しまっ──」
line = "「きゃっ！？　しまっ──」"

[[dialogue]]
speaker = "unk"
# 危ないっ！
line = "危ないっ！"

[[dialogue]]
speaker = "カヤ"
# 「なっ！？　どうして──っっ、これで、トドメっっ！！」
line = "「なっ！？　どうして──っっ、これで、トドメっっ！！」"

[[dialogue]]
speaker = "カヤ"
# 「はぁ、はぁ、はぁ……！」
line = "「はぁ、はぁ、はぁ……！」"

[[dialogue]]
speaker = "カヤ"
# 「排除、完了……」
line = "「排除、完了……」"

[[dialogue]]
speaker = "カヤ"
# 「危ないところ、だった……。まさか中にあのレベルのモンスターいる、なんて……」
line = "「危ないところ、だった……。まさか中にあのレベルのモンスターいる、なんて……」"

[[dialogue]]
speaker = "カヤ"
# 「でも、どうして庇った？　どうしてアステラ乗り込んできた？」
line = "「でも、どうして庇った？　どうしてアステラ乗り込んできた？」"

[[dialogue]]
speaker = "カヤ"
# 「一人で問題ない、言ったはず。苦戦はしたけど、私だけで十分勝てる相手だった」
line = "「一人で問題ない、言ったはず。苦戦はしたけど、私だけで十分勝てる相手だった」"

[[dialogue]]
speaker = "カヤ"
# 「そもそも私はあなたの護衛を命令されてる。勝手に危険地帯に入ってこられても困る」
line = "「そもそも私はあなたの護衛を命令されてる。勝手に危険地帯に入ってこられても困る」"

[[dialogue]]
speaker = "カヤ"
# 「挙げ句……私のこと庇ったり。一体どういうつもり？」
line = "「挙げ句……私のこと庇ったり。一体どういうつもり？」"

[[dialogue]]
speaker = "unk"
# カヤのことが心配で
line = "カヤのことが心配で"

[[dialogue]]
speaker = "カヤ"
# 「……心配する必要はない。前にも言った。私はネビュラが持つ一振りの剣」
line = "「……心配する必要はない。前にも言った。私はネビュラが持つ一振りの剣」"

[[dialogue]]
speaker = "カヤ"
# 「仮に私が任務に失敗しても代わりはいる。あなたを敵に渡さないことが何よりも大事」
line = "「仮に私が任務に失敗しても代わりはいる。あなたを敵に渡さないことが何よりも大事」"

[[dialogue]]
speaker = "カヤ"
# 「だから身を挺して私を庇う必要はなかった。アステラに乗り込む必要もなかった」
line = "「だから身を挺して私を庇う必要はなかった。アステラに乗り込む必要もなかった」"

[[dialogue]]
speaker = "カヤ"
# 「あなたは外で待っているだけで良かったのに」
line = "「あなたは外で待っているだけで良かったのに」"

[[dialogue]]
speaker = "カヤ"
# 「あなたはいつもそう……。無駄話やめろって言っても、いつも話しかけてくる。食料要らないって言っても、いつも美味しいもの食べさせてくる」
line = "「あなたはいつもそう……。無駄話やめろって言っても、いつも話しかけてくる。食料要らないって言っても、いつも美味しいもの食べさせてくる」"

[[dialogue]]
speaker = "カヤ"
# 「私と戦った時は反撃の一つもしてこなかったくせに……モンスターとの戦闘の時は率先して前に出ようとする」
line = "「私と戦った時は反撃の一つもしてこなかったくせに……モンスターとの戦闘の時は率先して前に出ようとする」"

[[dialogue]]
speaker = "カヤ"
# 「やっぱり……私のこと舐めてる？　年下だから、見た目幼いから、下に見てる？」
line = "「やっぱり……私のこと舐めてる？　年下だから、見た目幼いから、下に見てる？」"

[[dialogue]]
speaker = "unk"
# 友達だからってだけだよ
line = "友達だからってだけだよ"

[[dialogue]]
speaker = "カヤ"
# 「とも……だち？」
line = "「とも……だち？」"

[[dialogue]]
speaker = "カヤ"
# 「わ、わからない。言ってること、全然……」
line = "「わ、わからない。言ってること、全然……」"

[[dialogue]]
speaker = "カヤ"
# 「私、ともだち……？　いつそんなのなった……？　えっ……？　えっ……？」
line = "「私、ともだち……？　いつそんなのなった……？　えっ……？　えっ……？」"

[[dialogue]]
speaker = "カヤ"
# 「そういうの、私、あまりよくわからない……。ネビュラの仲間以外の知り合い、あなたが初めて……だから」
line = "「そういうの、私、あまりよくわからない……。ネビュラの仲間以外の知り合い、あなたが初めて……だから」"

[[dialogue]]
speaker = "カヤ"
# 「でも、急にともだち言われても……困る。私はあくまであなたの護衛。任務が終われば、もう話すこともない……」
line = "「でも、急にともだち言われても……困る。私はあくまであなたの護衛。任務が終われば、もう話すこともない……」"

[[dialogue]]
speaker = "unk"
# 任務でしか話しちゃいけない命令なのか？
line = "任務でしか話しちゃいけない命令なのか？"

[[dialogue]]
speaker = "カヤ"
# 「そ、そんな命令、受けてない……けど……」
line = "「そ、そんな命令、受けてない……けど……」"

[[dialogue]]
speaker = "カヤ"
# 「でも、そもそも私とともだちなりたい理由、わからない……！」
line = "「でも、そもそも私とともだちなりたい理由、わからない……！」"

[[dialogue]]
speaker = "カヤ"
# 「私、ともだちと思われるようなこと何もしてない。いつも素っ気なくして、あなたのこと嫌い言って、すぐ怒って……」
line = "「私、ともだちと思われるようなこと何もしてない。いつも素っ気なくして、あなたのこと嫌い言って、すぐ怒って……」"

[[dialogue]]
speaker = "カヤ"
# 「……やっぱり、ともだち、違う。なる理由わからない。一緒にいてもつまらないはず……。なんなら面倒なはず……」
line = "「……やっぱり、ともだち、違う。なる理由わからない。一緒にいてもつまらないはず……。なんなら面倒なはず……」"

[[dialogue]]
speaker = "unk"
# カヤはここ数日楽しくなかった？
line = "カヤはここ数日楽しくなかった？"

[[dialogue]]
speaker = "カヤ"
# 「……そんなの、考えたこともない。任務中に他の事考えるなんて以ての外。エージェントとして致命的」
line = "「……そんなの、考えたこともない。任務中に他の事考えるなんて以ての外。エージェントとして致命的」"

[[dialogue]]
speaker = "カヤ"
# 「でも……。いま思い返してみる……と……」
line = "「でも……。いま思い返してみる……と……」"

[[dialogue]]
speaker = "カヤ"
# 「っっ……！！　や、やっぱり楽しいことなんてなかった。あなたの意味不明な行動に振り回され続けただけ……！」
line = "「っっ……！！　や、やっぱり楽しいことなんてなかった。あなたの意味不明な行動に振り回され続けただけ……！」"

[[dialogue]]
speaker = "カヤ"
# 「変なこと言って私を戸惑わせるのやめる……！　私はただの剣……！　任務の遂行だけ考えていればいい……！」
line = "「変なこと言って私を戸惑わせるのやめる……！　私はただの剣……！　任務の遂行だけ考えていればいい……！」"

[[dialogue]]
speaker = "カヤ"
# 「そもそも、この護衛任務の本当の目的は……！　私がアステラ乗り込んだのだって例の何者かがいると思ったからで──」
line = "「そもそも、この護衛任務の本当の目的は……！　私がアステラ乗り込んだのだって例の何者かがいると思ったからで──」"

[[dialogue]]
speaker = "unk"
# 事情はわからないけど俺は楽しかった
line = "事情はわからないけど俺は楽しかった"

[[dialogue]]
speaker = "カヤ"
# 「なっ……！　そ、そんな真面目な顔で言われても……！」
line = "「なっ……！　そ、そんな真面目な顔で言われても……！」"

[[dialogue]]
speaker = "カヤ"
# 「そんなこと言われたら、私……も……。私、だって……」
line = "「そんなこと言われたら、私……も……。私、だって……」"

[[dialogue]]
speaker = "カヤ"
# 「あなたと一緒に街歩くのも……。手、繋ぐのも……。パンやアイスクリーム食べるのも……」
line = "「あなたと一緒に街歩くのも……。手、繋ぐのも……。パンやアイスクリーム食べるのも……」"

[[dialogue]]
speaker = "カヤ"
# 「た、たのし──……」
line = "「た、たのし──……」"

[[dialogue]]
speaker = "カヤ"
# 「～～っっ。や、やっぱり、なんでもない……！」
line = "「～～っっ。や、やっぱり、なんでもない……！」"

[[dialogue]]
speaker = "カヤ"
# 「今日の任務はこれでおしまい……！　くれぐれも気を付けて帰るっ……！！」
line = "「今日の任務はこれでおしまい……！　くれぐれも気を付けて帰るっ……！！」"

[[dialogue]]
speaker = "カヤ"
# 「はぁ、はぁ……。どうして私、自分から護衛対象と離れて……」
line = "「はぁ、はぁ……。どうして私、自分から護衛対象と離れて……」"

[[dialogue]]
speaker = "カヤ"
# 「一体なにしてる……。余計なことまで口走って……。こんなの全然、私らしくない……」
line = "「一体なにしてる……。余計なことまで口走って……。こんなの全然、私らしくない……」"

[[dialogue]]
speaker = "カヤ"
# 「…………。とも、だち……」
line = "「…………。とも、だち……」"

[[dialogue]]
speaker = "カヤ"
# 「そういえば……お礼言ってない。庇ってもらった……のに」
line = "「そういえば……お礼言ってない。庇ってもらった……のに」"

[[dialogue]]
speaker = "カヤ"
# 「今度、ちゃんと言わないと……」
line = "「今度、ちゃんと言わないと……」"
