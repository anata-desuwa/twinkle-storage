[[dialogue]]
speaker = "unk"
# 第１５話,愛すべき世界へ,B
line = "第１５話,愛すべき世界へ,B"

[[dialogue]]
speaker = "unk"
# ──闇。
line = "──闇。"

[[dialogue]]
speaker = "unk"
# 闇。闇。闇──
line = "闇。闇。闇──"

[[dialogue]]
speaker = "unk"
# 音もない。温度もない。香りもない。四肢の感覚すらが曖昧だ……ここが、時空の裂け目の中？
line = "音もない。温度もない。香りもない。四肢の感覚すらが曖昧だ……ここが、時空の裂け目の中？"

[[dialogue]]
speaker = "クロト"
# （確かに『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』を掴んで飛び込んだはずなのに……）
line = "（確かに『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』を掴んで飛び込んだはずなのに……）"

[[dialogue]]
speaker = "unk"
# 入った瞬間に五感がぐちゃぐちゃになり、上も下もわからなくなって──今はこのざま。
line = "入った瞬間に五感がぐちゃぐちゃになり、上も下もわからなくなって──今はこのざま。"

[[dialogue]]
speaker = "unk"
# 星の破壊という最悪の事態は免れたけれど、早くデネブに帰らないとまずい……！
line = "星の破壊という最悪の事態は免れたけれど、早くデネブに帰らないとまずい……！"

[[dialogue]]
speaker = "unk"
# ホロウは無限の試行錯誤で、アルタイルへの経路を割り出していた。ということは、俺がいなくなった後のデネブへ再侵攻を図っているはず……！
line = "ホロウは無限の試行錯誤で、アルタイルへの経路を割り出していた。ということは、俺がいなくなった後のデネブへ再侵攻を図っているはず……！"

[[dialogue]]
speaker = "unk"
# ラクシスの平行世界間を移動する権能を自在に使えればいいのだけど……生憎、俺はまだそれをモノにしていない。
line = "ラクシスの平行世界間を移動する権能を自在に使えればいいのだけど……生憎、俺はまだそれをモノにしていない。"

[[dialogue]]
speaker = "クロト"
# （どうすれば……いいんだ……！？）
line = "（どうすれば……いいんだ……！？）"

[[dialogue]]
speaker = "？？？"
# 『……無茶をしましたね、緋宮クロト』
line = "『……無茶をしましたね、緋宮クロト』"

[[dialogue]]
speaker = "クロト"
# 「テルル……！！？」
line = "「テルル……！！？」"

[[dialogue]]
speaker = "テルル"
# 『……ええ。ヴィーナスとルヴィネには別れを告げましたが……貴方にはまだでしたから』
line = "『……ええ。ヴィーナスとルヴィネには別れを告げましたが……貴方にはまだでしたから』"

[[dialogue]]
speaker = "テルル"
# 『もはや世界の誰にも感知できないほどに、存在が薄まった私ですが……最期に、あなたと話をしたかったのです』
line = "『もはや世界の誰にも感知できないほどに、存在が薄まった私ですが……最期に、あなたと話をしたかったのです』"

[[dialogue]]
speaker = "テルル"
# 『緋宮クロト、貴方は本当によくやってくれました……』
line = "『緋宮クロト、貴方は本当によくやってくれました……』"

[[dialogue]]
speaker = "テルル"
# 『貴方のおかげで“<ruby=ゼロス>ＸＥＬＯＳ</ruby>”は深手を負いました。真なる魔王がデネブやアルタイルに留まる限り、きっと手出しはできないでしょう……』
line = "『貴方のおかげで“<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>”は深手を負いました。真なる魔王がデネブやアルタイルに留まる限り、きっと手出しはできないでしょう……』"

[[dialogue]]
speaker = "クロト"
# 「そうは言うけれど……今の俺は、こんな状況です……」
line = "「そうは言うけれど……今の俺は、こんな状況です……」"

[[dialogue]]
speaker = "テルル"
# 『ええ。しかし、忘れてはいませんか？　貴方は厄災の力だけではない。星の輝きを宿した騎士であることを』
line = "『ええ。しかし、忘れてはいませんか？　貴方は厄災の力だけではない。星の輝きを宿した騎士であることを』"

[[dialogue]]
speaker = "テルル"
# 『守護星が地球であったことも、きっとこの時のため……大丈夫。きっと帰ることができますよ』
line = "『守護星が地球であったことも、きっとこの時のため……大丈夫。きっと帰ることができますよ』"

[[dialogue]]
speaker = "テルル"
# 『守護星とのリンクを可能な限り開き──耳を澄ませてみてください』
line = "『守護星とのリンクを可能な限り開き──耳を澄ませてみてください』"

[[dialogue]]
speaker = "テルル"
# 『貴方の帰るべき場所で、帰りを待ち望む星々の声が聴こえるはずです──』
line = "『貴方の帰るべき場所で、帰りを待ち望む星々の声が聴こえるはずです──』"

[[dialogue]]
speaker = "unk"
# ──耳を澄ませてみる。
line = "──耳を澄ませてみる。"

[[dialogue]]
speaker = "unk"
# 完全な『無』の世界。果たして本当に、女神テルルの言う『声』は聴こえるのか──？
line = "完全な『無』の世界。果たして本当に、女神テルルの言う『声』は聴こえるのか──？"

[[dialogue]]
speaker = "unk"
# …………
line = "…………"

[[dialogue]]
speaker = "unk"
# ……
line = "……"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 『クロトーーーーーー！！！！！』
line = "『クロトーーーーーー！！！！！』"

[[dialogue]]
speaker = "クロト"
# 「…………ははっ」
line = "「…………ははっ」"

[[dialogue]]
speaker = "テルル"
# 『ふふふ……私たちの娘は、元気いっぱいですね？』
line = "『ふふふ……私たちの娘は、元気いっぱいですね？』"

[[dialogue]]
speaker = "unk"
# ありがとう、ヴィーナス。君はいつだってそうだ。
line = "ありがとう、ヴィーナス。君はいつだってそうだ。"

[[dialogue]]
speaker = "unk"
# いつだって俺の尻を叩いて、導いてくれる──
line = "いつだって俺の尻を叩いて、導いてくれる──"

[[dialogue]]
speaker = "テルル"
# 『方角はわかりましたね？　迷わず、まっすぐ。最短距離で向かってください』
line = "『方角はわかりましたね？　迷わず、まっすぐ。最短距離で向かってください』"

[[dialogue]]
speaker = "テルル"
# 『不出来な女神で申し訳ありませんでした……そして、この後の世界の行く末を、すべて押し付けてしまうことを、お許しください』
line = "『不出来な女神で申し訳ありませんでした……そして、この後の世界の行く末を、すべて押し付けてしまうことを、お許しください』"

[[dialogue]]
speaker = "クロト"
# 「不出来だなんてとんでもない。あなたが俺たちの味方だったからこそ、ここまで来れたんです」
line = "「不出来だなんてとんでもない。あなたが俺たちの味方だったからこそ、ここまで来れたんです」"

[[dialogue]]
speaker = "テルル"
# 『私が亡くなった後の世界のことは……ルヴィネと話をしてあります』
line = "『私が亡くなった後の世界のことは……ルヴィネと話をしてあります』"

[[dialogue]]
speaker = "テルル"
# 『あの子は今、一介の天使ですが……天寿を全うした後に、魂の位を神格にまで高め、私の後任の女神となります』
line = "『あの子は今、一介の天使ですが……天寿を全うした後に、魂の位を神格にまで高め、私の後任の女神となります』"

[[dialogue]]
speaker = "テルル"
# 『ルヴィネは……妹は、快く応えてくれました。きっと私よりも優れた、ヒトの子に寄り添う女神になることでしょう』
line = "『ルヴィネは……妹は、快く応えてくれました。きっと私よりも優れた、ヒトの子に寄り添う女神になることでしょう』"

[[dialogue]]
speaker = "クロト"
# 「……俺たちも、あなたが人類に注いでくれた愛を後世に伝えていきます」
line = "「……俺たちも、あなたが人類に注いでくれた愛を後世に伝えていきます」"

[[dialogue]]
speaker = "クロト"
# 「流星教の女神は……これからもずっと、あなたを置いて他にいないのですから」
line = "「流星教の女神は……これからもずっと、あなたを置いて他にいないのですから」"

[[dialogue]]
speaker = "テルル"
# 『…………ありがとう』
line = "『…………ありがとう』"

[[dialogue]]
speaker = "テルル"
# 『じゃあ最後に……ねえ──クロト？』
line = "『じゃあ最後に……ねえ──クロト？』"

[[dialogue]]
speaker = "クロト"
# 「──っ！」
line = "「──っ！」"

[[dialogue]]
speaker = "unk"
# テルルの声のトーンが変わった。
line = "テルルの声のトーンが変わった。"

[[dialogue]]
speaker = "unk"
# これはきっと、悠久の時を過ごした女神の人格ではなく──デネブで短い時を過ごした、人間の器に注がれていた時の人格。
line = "これはきっと、悠久の時を過ごした女神の人格ではなく──デネブで短い時を過ごした、人間の器に注がれていた時の人格。"

[[dialogue]]
speaker = "unk"
# 消えゆくその最期の時を、テルルは──『デネブの緋宮クロト』と運命を共にした、九浄テルルでいることを選んだ。
line = "消えゆくその最期の時を、テルルは──『デネブの緋宮クロト』と運命を共にした、九浄テルルでいることを選んだ。"

[[dialogue]]
speaker = "クロト"
# 「ああ、なんだ？」
line = "「ああ、なんだ？」"

[[dialogue]]
speaker = "テルル"
# 『ヴィーナスを……私たちの娘を守ってくれてありがとねっ！　流石はあなただわ！』
line = "『ヴィーナスを……私たちの娘を守ってくれてありがとねっ！　流石はあなただわ！』"

[[dialogue]]
speaker = "テルル"
# 『それと……それとね…………！』
line = "『それと……それとね…………！』"

[[dialogue]]
speaker = "テルル"
# 『愛してるわ、クロト！！　これからも、ずーーーーーーっと！！！』
line = "『愛してるわ、クロト！！　これからも、ずーーーーーーっと！！！』"

[[dialogue]]
speaker = "unk"
# ……そうして、今度こそ。
line = "……そうして、今度こそ。"

[[dialogue]]
speaker = "unk"
# ……テルルは跡形もなく──消えた。
line = "……テルルは跡形もなく──消えた。"

[[dialogue]]
speaker = "クロト"
# 「テルル……お疲れ様。デネブの俺と、末永く。幸せに──」
line = "「テルル……お疲れ様。デネブの俺と、末永く。幸せに──」"

[[dialogue]]
speaker = "unk"
# ──女神なき世界は、これからきっと大変だろう。
line = "──女神なき世界は、これからきっと大変だろう。"

[[dialogue]]
speaker = "unk"
# けれど……守り抜く。何があっても──
line = "けれど……守り抜く。何があっても──"

[[dialogue]]
speaker = "クロト"
# 「俺も……帰ろう。みんなのところに──！！」
line = "「俺も……帰ろう。みんなのところに──！！」"

[[dialogue]]
speaker = "unk"
# ヴィーナスの声がした方向を目指す。
line = "ヴィーナスの声がした方向を目指す。"

[[dialogue]]
speaker = "unk"
# 暗闇の中を泳ぐように。少しずつ、少しずつ──近づいていこう。
line = "暗闇の中を泳ぐように。少しずつ、少しずつ──近づいていこう。"

[[dialogue]]
speaker = "グレイス"
# 「わ、私が！　私が行きますっ！！　絶対に魔王さんを見つけてきますからーっ！！」
line = "「わ、私が！　私が行きますっ！！　絶対に魔王さんを見つけてきますからーっ！！」"

[[dialogue]]
speaker = "チナ"
# 「バカヤロー！　無茶言うな！　落ち着けって！！」
line = "「バカヤロー！　無茶言うな！　落ち着けって！！」"

[[dialogue]]
speaker = "グレイス"
# 「でもこんなのあんまりですっ！　魔王さんがいない世界なんて、絶対に──」
line = "「でもこんなのあんまりですっ！　魔王さんがいない世界なんて、絶対に──」"

[[dialogue]]
speaker = "クロト"
# 「…………いてて」
line = "「…………いてて」"

[[dialogue]]
speaker = "グレイス"
# 「魔王さんっ！？」
line = "「魔王さんっ！？」"

[[dialogue]]
speaker = "チナ"
# 「魔王──！？」
line = "「魔王──！？」"

[[dialogue]]
speaker = "クロト"
# 「みんな、ただいま──」
line = "「みんな、ただいま──」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「クロトーーーーーーーーーッ！！！！」
line = "「クロトーーーーーーーーーッ！！！！」"

[[dialogue]]
speaker = "クロト"
# 「があぁぁああぁあっ──！？」
line = "「があぁぁああぁあっ──！？」"

[[dialogue]]
speaker = "unk"
# ロケットみたいに突っ込んできた……！！
line = "ロケットみたいに突っ込んできた……！！"

[[dialogue]]
speaker = "クロト"
# 「ヴィーナス……お、落ち着け、傷が……うげっ！？」
line = "「ヴィーナス……お、落ち着け、傷が……うげっ！？」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「よかったぁ……もう、会えないかもって……ぐすっ、パパぁ！！」
line = "「よかったぁ……もう、会えないかもって……ぐすっ、パパぁ！！」"

[[dialogue]]
speaker = "unk"
# ヴィーナスに押し倒されたまま、晴れ渡ったデネブの空を見る。
line = "ヴィーナスに押し倒されたまま、晴れ渡ったデネブの空を見る。"

[[dialogue]]
speaker = "クロト"
# （……リクリエの脅威は、去った）
line = "（……リクリエの脅威は、去った）"

[[dialogue]]
speaker = "unk"
# 森羅歴上、３度目となるリクリエ防衛──その成功を、俺は確かに実感するのだった。
line = "森羅歴上、３度目となるリクリエ防衛──その成功を、俺は確かに実感するのだった。"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「…………恐ろしい」
line = "「…………恐ろしい」"

[[dialogue]]
speaker = "unk"
# あの男は、本当にどうなっている？
line = "あの男は、本当にどうなっている？"

[[dialogue]]
speaker = "unk"
# 時空のはざまに放逐したにも関わらず……大した<ruby=いとま>暇</ruby>もなく戻ってきた。
line = "時空のはざまに放逐したにも関わらず……大した<ruby>暇<rt>いとま</rt></ruby>もなく戻ってきた。"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
# 「……お父様？　今、なんと……？」
line = "「……お父様？　今、なんと……？」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
# 「……彼が生きている間は、リクリエの活動を停止する──ですか？」
line = "「……彼が生きている間は、リクリエの活動を停止する──ですか？」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
# 「……はい。私も、賛成です。あの者には、まともな計算が通用しません……」
line = "「……はい。私も、賛成です。あの者には、まともな計算が通用しません……」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
# 「次のリクリエを起こすのは……緋宮クロトが寿命を迎え、死亡した後……承知いたしました」
line = "「次のリクリエを起こすのは……緋宮クロトが寿命を迎え、死亡した後……承知いたしました」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
# 「はい。それまで、我々は身を隠しましょう──」
line = "「はい。それまで、我々は身を隠しましょう──」"

[[dialogue]]
speaker = "梨緒"
# 「……魔王？　今、なんと言った？」
line = "「……魔王？　今、なんと言った？」"

[[dialogue]]
speaker = "クロト"
# 「リクリエ防衛は成功した。だけど、ここで手は休めない」
line = "「リクリエ防衛は成功した。だけど、ここで手は休めない」"

[[dialogue]]
speaker = "クロト"
# 「時空のはざまには『ＸＥＬＯＳ』たちも飛び込んでいるが……あそこは完全な“無”の空間だ」
line = "「時空のはざまには『ＸＥＬＯＳ』たちも飛び込んでいるが……あそこは完全な“無”の空間だ」"

[[dialogue]]
speaker = "クロト"
# 「……追撃する方法はまだ見えていない。けれど力を合わせれば、きっと『ＸＥＬＯＳ』の居場所を特定できるはずだ」
line = "「……追撃する方法はまだ見えていない。けれど力を合わせれば、きっと『ＸＥＬＯＳ』の居場所を特定できるはずだ」"

[[dialogue]]
speaker = "煌嶺"
# 「やるのならば徹底的に叩かねばな。決着をつけぬなどあり得ぬ」
line = "「やるのならば徹底的に叩かねばな。決着をつけぬなどあり得ぬ」"

[[dialogue]]
speaker = "クロト"
# 「そうだ。俺のこの力も……いつまでもあるものとは思えないからな」
line = "「そうだ。俺のこの力も……いつまでもあるものとは思えないからな」"

[[dialogue]]
speaker = "unk"
# そう遠くない未来に『ベガの俺』の力は失われる──そんな予感があった。
line = "そう遠くない未来に『ベガの俺』の力は失われる──そんな予感があった。"

[[dialogue]]
speaker = "unk"
# だからこそ……この力があるうちに創造神を確実に滅ぼす。
line = "だからこそ……この力があるうちに創造神を確実に滅ぼす。"

[[dialogue]]
speaker = "unk"
# 防衛はもうここまで──さあ、今度こそ本当に幕を下ろそう。
line = "防衛はもうここまで──さあ、今度こそ本当に幕を下ろそう。"

[[dialogue]]
speaker = "クロト"
# 「傷が癒え次第──掃討戦を開始する」
line = "「傷が癒え次第──掃討戦を開始する」"

[[dialogue]]
speaker = "クロト"
# 「『オペレーション・ペンタグラム』に比する規模の総力戦を始める──今度は俺たちが攻め込む番だ！！」
line = "「『オペレーション・ペンタグラム』に比する規模の総力戦を始める──今度は俺たちが攻め込む番だ！！」"

[[dialogue]]
speaker = "unk"
# 【To be continued…】
line = "【To be continued…】"
