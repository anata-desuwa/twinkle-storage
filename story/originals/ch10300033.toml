[[dialogue]]
speaker = "unk"
# 第３話,ナミエルとアフタークリスマス①,P
line = "第３話,ナミエルとアフタークリスマス①,P"

[[dialogue]]
speaker = "unk"
# 俺――緋宮クロトはその日、ナミエルとデートにやってきていた。
line = "俺――緋宮クロトはその日、ナミエルとデートにやってきていた。"

[[dialogue]]
speaker = "unk"
# 今回のクリスマスは、クリスマスフォームの一件で２人で過ごすことができなかった。その為、埋め合わせをしようと、改めてデートをすることになったのだ。
line = "今回のクリスマスは、クリスマスフォームの一件で２人で過ごすことができなかった。その為、埋め合わせをしようと、改めてデートをすることになったのだ。"

[[dialogue]]
speaker = "ナミエル"
# 「――久しぶりに一緒に出かけると、回りたいところが沢山ありますね」
line = "「――久しぶりに一緒に出かけると、回りたいところが沢山ありますね」"

[[dialogue]]
speaker = "ナミエル"
# 「とはいえ、結構歩き回りましたし、近くのスイーツカフェで可愛いスイーツを食べながら、少し休憩にしませんか？」
line = "「とはいえ、結構歩き回りましたし、近くのスイーツカフェで可愛いスイーツを食べながら、少し休憩にしませんか？」"

[[dialogue]]
speaker = "ナミエル"
# 「実は今日、会長に話しておきたいこともあったので……」
line = "「実は今日、会長に話しておきたいこともあったので……」"

[[dialogue]]
speaker = "unk"
# それからスイーツカフェで、俺はナミエルから『実は今までクリスマスが苦手だった』という話を聞かされることになった。
line = "それからスイーツカフェで、俺はナミエルから『実は今までクリスマスが苦手だった』という話を聞かされることになった。"

[[dialogue]]
speaker = "ナミエル"
# 「――といった感じで、私の両親がクリスマスの交通事故で亡くなったという話を、アム先輩に話したんです」
line = "「――といった感じで、私の両親がクリスマスの交通事故で亡くなったという話を、アム先輩に話したんです」"

[[dialogue]]
speaker = "ナミエル"
# 「なので、恋人としてお付き合いしている会長にも、ちゃんと話しておきたいと思いまして……」
line = "「なので、恋人としてお付き合いしている会長にも、ちゃんと話しておきたいと思いまして……」"

[[dialogue]]
speaker = "unk"
# わざわざ話してくれてありがとう
line = "わざわざ話してくれてありがとう"

[[dialogue]]
speaker = "ナミエル"
# 「いえ……こうして話そうと思えたのは、アム先輩のおかげです。指摘してもらえなければ、私はいつまでも胸の内に抱えたまま、今も話せずにいたかもしれません」
line = "「いえ……こうして話そうと思えたのは、アム先輩のおかげです。指摘してもらえなければ、私はいつまでも胸の内に抱えたまま、今も話せずにいたかもしれません」"

[[dialogue]]
speaker = "unk"
# クリスマス期間中に、ナミエルが浮かない顔をしていたことにアムが気づいて、それで事情を尋ねたのだという。
line = "クリスマス期間中に、ナミエルが浮かない顔をしていたことにアムが気づいて、それで事情を尋ねたのだという。"

[[dialogue]]
speaker = "unk"
# 本当は俺が先に気づかなきゃいけなかったな
line = "本当は俺が先に気づかなきゃいけなかったな"

[[dialogue]]
speaker = "unk"
# ナミエル、ごめん
line = "ナミエル、ごめん"

[[dialogue]]
speaker = "ナミエル"
# 「いえ、会長。そんな顔をしないで下さい。至らないところがあるのは、私の方も一緒ですから」
line = "「いえ、会長。そんな顔をしないで下さい。至らないところがあるのは、私の方も一緒ですから」"

[[dialogue]]
speaker = "unk"
# ――なら、彼氏として、これからはクリスマスのいい思い出を沢山を作っていかないとな。
line = "――なら、彼氏として、これからはクリスマスのいい思い出を沢山を作っていかないとな。"

[[dialogue]]
speaker = "unk"
# 俺はそう伝えながら、持ってきた物を鞄から取り出して、ナミエルに手渡す。
line = "俺はそう伝えながら、持ってきた物を鞄から取り出して、ナミエルに手渡す。"

[[dialogue]]
speaker = "ナミエル"
# 「あっ……約束していたクリスマスプレゼントの交換、ですね。では私も――こちらをどうぞ」
line = "「あっ……約束していたクリスマスプレゼントの交換、ですね。では私も――こちらをどうぞ」"

[[dialogue]]
speaker = "unk"
# ナミエルからもプレゼントを渡される。俺が先に開けさせてもらうと、そこに入っていたのは――ベージュ色の『マフラー』だった。
line = "ナミエルからもプレゼントを渡される。俺が先に開けさせてもらうと、そこに入っていたのは――ベージュ色の『マフラー』だった。"

[[dialogue]]
speaker = "ナミエル"
# 「料理は苦手ですが……メイドとして編み物は学んでいますので、作ってみました。まぁ、その……恋人として定番のプレゼントというか……」
line = "「料理は苦手ですが……メイドとして編み物は学んでいますので、作ってみました。まぁ、その……恋人として定番のプレゼントというか……」"

[[dialogue]]
speaker = "ナミエル"
# 「色と柄は会長に似合いそうな――可愛いけど、中性的で落ち着いた物を考えて選んでみました」
line = "「色と柄は会長に似合いそうな――可愛いけど、中性的で落ち着いた物を考えて選んでみました」"

[[dialogue]]
speaker = "ナミエル"
# 「会長、少し前にマフラーをボロボロにしてしまったと言って、それからは使ってませんでしたよね？」
line = "「会長、少し前にマフラーをボロボロにしてしまったと言って、それからは使ってませんでしたよね？」"

[[dialogue]]
speaker = "unk"
# 実は少し前に、街でモンスターが現れた際、マフラーと荷物を置いて戦っていたら、それがモンスターの攻撃に巻き込まれてしまったのだ。
line = "実は少し前に、街でモンスターが現れた際、マフラーと荷物を置いて戦っていたら、それがモンスターの攻撃に巻き込まれてしまったのだ。"

[[dialogue]]
speaker = "ナミエル"
# 「ですから、よければその代わりにと思いまして……」
line = "「ですから、よければその代わりにと思いまして……」"

[[dialogue]]
speaker = "unk"
# ボロボロにならないよう、大切にするから
line = "ボロボロにならないよう、大切にするから"

[[dialogue]]
speaker = "unk"
# ありがとう。これは絶対――
line = "ありがとう。これは絶対――"

[[dialogue]]
speaker = "ナミエル"
# 「いえ、そんな大切にしなくてもいいです」
line = "「いえ、そんな大切にしなくてもいいです」"

[[dialogue]]
speaker = "unk"
# えっ、と俺が驚いていると、ナミエルはちょっと気恥ずかしそうに、そっぽを向きながら続ける。
line = "えっ、と俺が驚いていると、ナミエルはちょっと気恥ずかしそうに、そっぽを向きながら続ける。"

[[dialogue]]
speaker = "ナミエル"
# 「ボロボロになってしまったら……また作り直しますから」
line = "「ボロボロになってしまったら……また作り直しますから」"

[[dialogue]]
speaker = "unk"
# 彼女への愛おしさが溢れてきて、俺はつい頭を撫でてしまう。
line = "彼女への愛おしさが溢れてきて、俺はつい頭を撫でてしまう。"

[[dialogue]]
speaker = "ナミエル"
# 「ん……<emoji=heart04>　か、会長……周りに人がいて、恥ずかしいですから……」
line = "「ん……<emoji=heart04>　か、会長……周りに人がいて、恥ずかしいですから……」"

[[dialogue]]
speaker = "unk"
# 今度は俺のプレゼントを開けて欲しいとナミエルに言う。
line = "今度は俺のプレゼントを開けて欲しいとナミエルに言う。"

[[dialogue]]
speaker = "ナミエル"
# 「あっ……これは……！？　この『ぬいぐるみ』、会長が作ったんですか……？」
line = "「あっ……これは……！？　この『ぬいぐるみ』、会長が作ったんですか……？」"

[[dialogue]]
speaker = "ナミエル"
# 「――昔、ぬいぐるみ作りのバイトをした時の経験を活かして作った？　それで、ぬいぐるみのモチーフの『白鳥』は、愛を示すシンボルとして選んだもの……？」
line = "「――昔、ぬいぐるみ作りのバイトをした時の経験を活かして作った？　それで、ぬいぐるみのモチーフの『白鳥』は、愛を示すシンボルとして選んだもの……？」"

[[dialogue]]
speaker = "ナミエル"
# 「……ちょっと驚きました。昔、なくしてしまった<b>アヒル</b>のぬいぐるみに雰囲気が似てて……」
line = "「……ちょっと驚きました。昔、なくしてしまった<b>アヒル</b>のぬいぐるみに雰囲気が似てて……」"

[[dialogue]]
speaker = "unk"
# デフォルメに失敗した！？
line = "デフォルメに失敗した！？"

[[dialogue]]
speaker = "ナミエル"
# 「可愛くしようと思って、デフォルメに挑戦したんですか？　ふふっ……なるほど」
line = "「可愛くしようと思って、デフォルメに挑戦したんですか？　ふふっ……なるほど」"

[[dialogue]]
speaker = "ナミエル"
# 「でも、すごく可愛いです。――大切にします♪」
line = "「でも、すごく可愛いです。――大切にします♪」"

[[dialogue]]
speaker = "unk"
# ナミエルは嬉しそうに、ぎゅっとぬいぐるみを抱き締めるのだった。
line = "ナミエルは嬉しそうに、ぎゅっとぬいぐるみを抱き締めるのだった。"

[[dialogue]]
speaker = "unk"
# その後、デートを再開したが――あっという間に時間は過ぎて。
line = "その後、デートを再開したが――あっという間に時間は過ぎて。"

[[dialogue]]
speaker = "ナミエル"
# 「もうすっかり辺りが暗くなってしまいましたね……」
line = "「もうすっかり辺りが暗くなってしまいましたね……」"

[[dialogue]]
speaker = "unk"
# 残念だけど、今日はこのくらいにしとこうか
line = "残念だけど、今日はこのくらいにしとこうか"

[[dialogue]]
speaker = "ナミエル"
# 「はい……」
line = "「はい……」"

[[dialogue]]
speaker = "unk"
# と、その時だった。
line = "と、その時だった。"

[[dialogue]]
speaker = "ナミエル"
# 「え……？　どうして勝手にクリスマスフォームに……！？」
line = "「え……？　どうして勝手にクリスマスフォームに……！？」"

[[dialogue]]
speaker = "unk"
# 何故か突然、その場でクリスマスフォームに変身してしまったナミエルは、驚いたように目をぱちくりさせるのだった。
line = "何故か突然、その場でクリスマスフォームに変身してしまったナミエルは、驚いたように目をぱちくりさせるのだった。"
