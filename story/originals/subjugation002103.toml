[[dialogue]]
speaker = "unk"
# 事故に巻き込まれた人は幸いにも命に別状はなく、救急車で運ばれていった。
line = "事故に巻き込まれた人は幸いにも命に別状はなく、救急車で運ばれていった。"

[[dialogue]]
speaker = "unk"
# そこに──
line = "そこに──"

[[dialogue]]
speaker = "？？？"
# 「おーい、メテオラー！　どこだー！」
line = "「おーい、メテオラー！　どこだー！」"

[[dialogue]]
speaker = "メテオラ"
# 「この声は！　お～い、エンジュ～！　こっちだぞ～！」
line = "「この声は！　お～い、エンジュ～！　こっちだぞ～！」"

[[dialogue]]
speaker = "エンジュ"
# 「やっぱりここにいたか……勝手にいなくなるなよ」
line = "「やっぱりここにいたか……勝手にいなくなるなよ」"

[[dialogue]]
speaker = "メテオラ"
# 「だって～……」
line = "「だって～……」"

[[dialogue]]
speaker = "エンジュ"
# 「『だって』じゃない。あたしから離れるなって、口が酸っぱくなるほど言っただろ！」
line = "「『だって』じゃない。あたしから離れるなって、口が酸っぱくなるほど言っただろ！」"

[[dialogue]]
speaker = "メテオラ"
# 「エンジュ、お口酸っぱいのか？」
line = "「エンジュ、お口酸っぱいのか？」"

[[dialogue]]
speaker = "エンジュ"
# 「そういう例えだ！　まったく、お前ときたら、いつも手間ばかり……ん？　くんくん……なんだか良い匂いがするな」
line = "「そういう例えだ！　まったく、お前ときたら、いつも手間ばかり……ん？　くんくん……なんだか良い匂いがするな」"

[[dialogue]]
speaker = "メテオラ"
# 「エンジュの大好きなドーナツ買ってきたんだぞ！　甘いドーナツで、酸っぱいお口を甘くしろー！」
line = "「エンジュの大好きなドーナツ買ってきたんだぞ！　甘いドーナツで、酸っぱいお口を甘くしろー！」"

[[dialogue]]
speaker = "エンジュ"
# 「ド、ドーナツ……！？　あたしのためにわざわざドーナツを……！？」
line = "「ド、ドーナツ……！？　あたしのためにわざわざドーナツを……！？」"

[[dialogue]]
speaker = "メテオラ"
# 「だぞ！　いらないかー？」
line = "「だぞ！　いらないかー？」"

[[dialogue]]
speaker = "エンジュ"
# 「い、いる！　いるに決まってるだろ！」
line = "「い、いる！　いるに決まってるだろ！」"

[[dialogue]]
speaker = "メテオラ"
# 「だよなー！　できたての内に食べるぞ！」
line = "「だよなー！　できたての内に食べるぞ！」"

[[dialogue]]
speaker = "メテオラ"
# 「ドーナツ屋を教えてくれたお礼に、おまえも一緒にどうだー？」
line = "「ドーナツ屋を教えてくれたお礼に、おまえも一緒にどうだー？」"

[[dialogue]]
speaker = "エンジュ"
# 「ん？　メテオラ、そいつは？」
line = "「ん？　メテオラ、そいつは？」"

[[dialogue]]
speaker = "メテオラ"
# 「あたしをドーナツ屋に連れてってくれたんだぞ。いいやつだぞ！」
line = "「あたしをドーナツ屋に連れてってくれたんだぞ。いいやつだぞ！」"

[[dialogue]]
speaker = "エンジュ"
# 「それは面倒かけさせて悪か──ッ！？　メテオラ、そいつから離れろ！」
line = "「それは面倒かけさせて悪か──ッ！？　メテオラ、そいつから離れろ！」"

[[dialogue]]
speaker = "メテオラ"
# 「え？　おっ、おう、離れるぞ！　どうしたんだ？」
line = "「え？　おっ、おう、離れるぞ！　どうしたんだ？」"

[[dialogue]]
speaker = "エンジュ"
# 「『どうしたんだ』はこっちの台詞だ。なんでお前は星騎士の──しかも魔王の世話になってんだよ！？」
line = "「『どうしたんだ』はこっちの台詞だ。なんでお前は星騎士の──しかも魔王の世話になってんだよ！？」"

[[dialogue]]
speaker = "メテオラ"
# 「魔王……？　あっ！　言われてみれば、見たことある顔だぞ！」
line = "「魔王……？　あっ！　言われてみれば、見たことある顔だぞ！」"

[[dialogue]]
speaker = "エンジュ"
# 「そいつは要注意リストに入っていただろう！　何を見ていたんだ！」
line = "「そいつは要注意リストに入っていただろう！　何を見ていたんだ！」"

[[dialogue]]
speaker = "メテオラ"
# 「ドーナツ！」
line = "「ドーナツ！」"

[[dialogue]]
speaker = "エンジュ"
# 「ドーナツはもういい！　いや、必ず美味しくいただくが、こいつを片づけた後だ！」
line = "「ドーナツはもういい！　いや、必ず美味しくいただくが、こいつを片づけた後だ！」"

[[dialogue]]
speaker = "unk"
# 星騎士に恨みでもあるのか？
line = "星騎士に恨みでもあるのか？"

[[dialogue]]
speaker = "unk"
# 俺を片付ける？
line = "俺を片付ける？"

[[dialogue]]
speaker = "メテオラ"
# 「エンジュは星騎士が大っ嫌いなんだぞ！　あたしも嫌いだ！　悪いやつだからな！」
line = "「エンジュは星騎士が大っ嫌いなんだぞ！　あたしも嫌いだ！　悪いやつだからな！」"

[[dialogue]]
speaker = "コハルコ"
# 『会長さん、モンスター発生です！　会長さんの現在地からすぐ近くなので、連絡させてもらいました！』
line = "『会長さん、モンスター発生です！　会長さんの現在地からすぐ近くなので、連絡させてもらいました！』"

[[dialogue]]
speaker = "コハルコ"
# 『敵の数、戦力ともに計測中です。多数のモンスターがいる可能性があるので、注意してください！』
line = "『敵の数、戦力ともに計測中です。多数のモンスターがいる可能性があるので、注意してください！』"

[[dialogue]]
speaker = "unk"
# 仕方ない、急行する！
line = "仕方ない、急行する！"

[[dialogue]]
speaker = "unk"
# よりによって、こんな時に！
line = "よりによって、こんな時に！"

[[dialogue]]
speaker = "メテオラ"
# 「どこに行くー！　逃げるのかー！　あたしたちにおそれをなしたかー！　ふははは！」
line = "「どこに行くー！　逃げるのかー！　あたしたちにおそれをなしたかー！　ふははは！」"

[[dialogue]]
speaker = "unk"
# エンジュとメテオラに背を向け、全速力でモンスターの出現場所に駆けつける。
line = "エンジュとメテオラに背を向け、全速力でモンスターの出現場所に駆けつける。"

[[dialogue]]
speaker = "モンスター"
# 「イ～～～～～ッ！」
line = "「イ～～～～～ッ！」"

[[dialogue]]
speaker = "unk"
# 全部片づけるのは骨が折れそうだな……
line = "全部片づけるのは骨が折れそうだな……"

[[dialogue]]
speaker = "unk"
# 想像以上の数だ
line = "想像以上の数だ"

[[dialogue]]
speaker = "？？？"
# 「そいつはあたしらの獲物だ！　お前にはやらせないっ！」
line = "「そいつはあたしらの獲物だ！　お前にはやらせないっ！」"

[[dialogue]]
speaker = "unk"
# この声は──！？
line = "この声は──！？"

[[dialogue]]
speaker = "エンジュ"
# 「屈辱を味わえ、ヴェンジフル・エクリプス！」
line = "「屈辱を味わえ、ヴェンジフル・エクリプス！」"

[[dialogue]]
speaker = "モンスター"
# 「イ～～～～ッ！？」
line = "「イ～～～～ッ！？」"

[[dialogue]]
speaker = "エンジュ"
# 「今だ、ぶっ放せっ、メテオラっ！」
line = "「今だ、ぶっ放せっ、メテオラっ！」"

[[dialogue]]
speaker = "メテオラ"
# 「よっしゃいっくぞーっ！　どっかんミサイル１億万発ーっ！」
line = "「よっしゃいっくぞーっ！　どっかんミサイル１億万発ーっ！」"

[[dialogue]]
speaker = "モンスター"
# 「イ～～～～～～～ッッ！！？」
line = "「イ～～～～～～～ッッ！！？」"

[[dialogue]]
speaker = "unk"
# 突如現れたエンジュとメテオラによって、多数のモンスターがあっという間に撃滅され──
line = "突如現れたエンジュとメテオラによって、多数のモンスターがあっという間に撃滅され──"

[[dialogue]]
speaker = "メテオラ"
# 「どーだ、魔王っ！　あたしたちは最強なんだぞ！」
line = "「どーだ、魔王っ！　あたしたちは最強なんだぞ！」"

[[dialogue]]
speaker = "unk"
# 間違いない、２人はコラプサー……！
line = "間違いない、２人はコラプサー……！"

[[dialogue]]
speaker = "unk"
# あれだけいたモンスターが一瞬で……
line = "あれだけいたモンスターが一瞬で……"

[[dialogue]]
speaker = "エンジュ"
# 「星騎士なんかに世界は任せられない。世界を救うのは、あたしたちコラプサーだ」
line = "「星騎士なんかに世界は任せられない。世界を救うのは、あたしたちコラプサーだ」"

[[dialogue]]
speaker = "メテオラ"
# 「ふひぃ、今のはちょっと頑張りすぎたなー。チョー疲れたぞー！」
line = "「ふひぃ、今のはちょっと頑張りすぎたなー。チョー疲れたぞー！」"

[[dialogue]]
speaker = "エンジュ"
# 「余計なことを言うな！　……ったく、今日は退くぞ、メテオラ」
line = "「余計なことを言うな！　……ったく、今日は退くぞ、メテオラ」"

[[dialogue]]
speaker = "エンジュ"
# 「次に会った時が、お前ら星騎士どもの最期だ。首を洗って待っているんだな！」
line = "「次に会った時が、お前ら星騎士どもの最期だ。首を洗って待っているんだな！」"

[[dialogue]]
speaker = "メテオラ"
# 「そうだぞ！　ちゃんとお風呂に入っておけー！　わ、わ、わ、エンジュ、待つんだぞー！」
line = "「そうだぞ！　ちゃんとお風呂に入っておけー！　わ、わ、わ、エンジュ、待つんだぞー！」"

[[dialogue]]
speaker = "メテオラ"
# 「魔王、おまえは悪いやつだけど、ドーナツはありがとな！　次は絶対やっつけてやるからな！　イーッだ！」
line = "「魔王、おまえは悪いやつだけど、ドーナツはありがとな！　次は絶対やっつけてやるからな！　イーッだ！」"

[[dialogue]]
speaker = "unk"
# エンジュとメテオラ、２人の姿は夜闇の中へと消えていった。
line = "エンジュとメテオラ、２人の姿は夜闇の中へと消えていった。"
