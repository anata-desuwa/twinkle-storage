line = "「場合によっては新たな学園長の出現で、ラティエも少しはまともになるかもしれんな、はっはっは！」"

[[dialogue]]
speaker = "unk"
# どんな人を新しい学園長にと考えているのか想像もつかないが、ヘレナちゃんが認めた人ならば間違いないだろう。
line = "どんな人を新しい学園長にと考えているのか想像もつかないが、ヘレナちゃんが認めた人ならば間違いないだろう。"

[[dialogue]]
speaker = "unk"
