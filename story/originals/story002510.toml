line = "「旅の成果として、加齢と星力に関するメカニズムを持ち帰ることもある。それはそれで貴重な情報だ」"

[[dialogue]]
speaker = "ヘレナ"
# 「だが、あやつ自身の抱える『特異な性質』については、依然として謎に包まれたままなのだ」
line = "「だが、あやつ自身の抱える『特異な性質』については、依然として謎に包まれたままなのだ」"

[[dialogue]]
