# 「もしこの謎が解ける日が来るとしたら──星騎士たちにとっても、大きな意味を持つことになるのかもしれぬな」
line = "「もしこの謎が解ける日が来るとしたら──星騎士たちにとっても、大きな意味を持つことになるのかもしれぬな」"

[[dialogue]]
