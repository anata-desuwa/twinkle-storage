line = "しかし、ひとつだけ俺は確信を持って言えることがある。"

[[dialogue]]
speaker = "unk"
# それは──ラティエ学園長のあの良くも悪くも自由なスタンスが、誰かの影響を受けて変わることはないだろう、という事だった。
line = "それは──ラティエ学園長のあの良くも悪くも自由なスタンスが、誰かの影響を受けて変わることはないだろう、という事だった。"
