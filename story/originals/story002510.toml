# 「そのためにも、学園長にはもっと研究に協力していただかないと！」
line = "「そのためにも、学園長にはもっと研究に協力していただかないと！」"

[[dialogue]]
speaker = "unk"
# ほどほどにしておいてあげてください
line = "ほどほどにしておいてあげてください"

[[dialogue]]
