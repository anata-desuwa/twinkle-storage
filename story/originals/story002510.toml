line = "「これはあくまで緊急措置、いつまでもこのままにはしておけぬ。早く新たな学園長を捕まえなければな」"

[[dialogue]]
speaker = "unk"
# 確かに今後、新たに危険に見舞われた時、ラティエ学園長１人で新星、流星の全星騎士の指揮を執るのは大変だろう。
line = "確かに今後、新たに危険に見舞われた時、ラティエ学園長１人で新星、流星の全星騎士の指揮を執るのは大変だろう。"

[[dialogue]]
speaker = "ヘレナ"
# 「なに、そんな深刻な顔をするな。目星は既に付けている。私も太鼓判を押す優秀な人材だから楽しみに待っているがよい」
line = "「なに、そんな深刻な顔をするな。目星は既に付けている。私も太鼓判を押す優秀な人材だから楽しみに待っているがよい」"

[[dialogue]]
