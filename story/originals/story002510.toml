[[dialogue]]
speaker = "ヘレナ"
# 「ご苦労だったな」
line = "「ご苦労だったな」"

[[dialogue]]
speaker = "unk"
# 事後処理を済ませた後、俺は今日の報告をするため九浄家へと向かった。
line = "事後処理を済ませた後、俺は今日の報告をするため九浄家へと向かった。"

[[dialogue]]
speaker = "unk"
# 部屋には、先に戻ってきていたエスメラルダ先生の姿もある。
line = "部屋には、先に戻ってきていたエスメラルダ先生の姿もある。"

[[dialogue]]
speaker = "unk"
# 本当に大変でした……
line = "本当に大変でした……"

[[dialogue]]
speaker = "エスメラルダ"
# 「申し訳ありません。学園長には今回の件の裏に理事長が居ることを見抜かれてしまいました」
line = "「申し訳ありません。学園長には今回の件の裏に理事長が居ることを見抜かれてしまいました」"

[[dialogue]]
speaker = "ヘレナ"
# 「それも仕方なかろう。あやつの事だ、取り立てて気にもしていないはずだ」
line = "「それも仕方なかろう。あやつの事だ、取り立てて気にもしていないはずだ」"

[[dialogue]]
speaker = "ヘレナ"
# 「それにあやつを１日、ひと所に留め、結果十分な情報を入手することが出来たのだ。作戦は大成功である」
line = "「それにあやつを１日、ひと所に留め、結果十分な情報を入手することが出来たのだ。作戦は大成功である」"

[[dialogue]]
speaker = "エスメラルダ"
# 「あの……ずっと気になっていたことがあるのですが……」
line = "「あの……ずっと気になっていたことがあるのですが……」"

[[dialogue]]
speaker = "ヘレナ"
# 「うむ、何か？」
line = "「うむ、何か？」"

[[dialogue]]
speaker = "エスメラルダ"
# 「人工戦闘服と学園長の星力のデータは集められました」
line = "「人工戦闘服と学園長の星力のデータは集められました」"

[[dialogue]]
speaker = "エスメラルダ"
# 「ですが、学園長の放浪癖を矯正するという計画はどうなったのでしょう？」
line = "「ですが、学園長の放浪癖を矯正するという計画はどうなったのでしょう？」"

[[dialogue]]
speaker = "unk"
# それは俺も気になっていた事だった。
line = "それは俺も気になっていた事だった。"

[[dialogue]]
speaker = "unk"
# 今日１日の出来事を振り返っても、それに当たるようなことは無かったように思える。
line = "今日１日の出来事を振り返っても、それに当たるようなことは無かったように思える。"

[[dialogue]]
speaker = "unk"
# そして遊園地を出ると、いつのまにか何も言わずに姿を消してしまっていた。
line = "そして遊園地を出ると、いつのまにか何も言わずに姿を消してしまっていた。"

[[dialogue]]
speaker = "unk"
# つまり、学園長の放浪癖は全く改善されていない。
line = "つまり、学園長の放浪癖は全く改善されていない。"

[[dialogue]]
speaker = "ヘレナ"
# 「そのことか……」
line = "「そのことか……」"

[[dialogue]]
speaker = "ヘレナ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ヘレナ"
# 「そんな策など初めから無い！」
line = "「そんな策など初めから無い！」"

[[dialogue]]
speaker = "unk"
# えええええええええええ！！！！？？
line = "えええええええええええ！！！！？？"

[[dialogue]]
speaker = "ヘレナ"
# 「考えてもみよ……あやつは根っからの自由人。矯正しようなどと考えるだけ無駄なのだ」
line = "「考えてもみよ……あやつは根っからの自由人。矯正しようなどと考えるだけ無駄なのだ」"

[[dialogue]]
speaker = "エスメラルダ"
# 「ではどうしてこんな事を……」
line = "「ではどうしてこんな事を……」"

[[dialogue]]
speaker = "ヘレナ"
# 「一番の目的は水着フォームの性能を確かめるためだ」
line = "「一番の目的は水着フォームの性能を確かめるためだ」"

[[dialogue]]
speaker = "ヘレナ"
# 「人工戦闘服を着ることで、あやつの特異な性質に何か影響を及ぼすのか──」
line = "「人工戦闘服を着ることで、あやつの特異な性質に何か影響を及ぼすのか──」"

[[dialogue]]
speaker = "ヘレナ"
# 「その情報を得ることができれば成果は十分だろう」
line = "「その情報を得ることができれば成果は十分だろう」"

[[dialogue]]
speaker = "unk"
# そんなに特殊なんですか？
line = "そんなに特殊なんですか？"

[[dialogue]]
speaker = "unk"
# 学園長の性質って
line = "学園長の性質って"

[[dialogue]]
speaker = "エスメラルダ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "エスメラルダ"
# 「特殊よ……異常、と言ってもいいわ」
line = "「特殊よ……異常、と言ってもいいわ」"

[[dialogue]]
speaker = "unk"
# そんなに！？
line = "そんなに！？"

[[dialogue]]
speaker = "エスメラルダ"
# 「いい機会だから説明するわね」
line = "「いい機会だから説明するわね」"

[[dialogue]]
speaker = "エスメラルダ"
# 「通常、星騎士というのは全盛期にあたる１０代後半を過ぎると、その星力は徐々に衰えていくの」
line = "「通常、星騎士というのは全盛期にあたる１０代後半を過ぎると、その星力は徐々に衰えていくの」"

[[dialogue]]
speaker = "エスメラルダ"
# 「私だってそう、ヘレナ理事長だってそう。個人差はあるものの、加齢と共に確実にその力は落ちていく」
line = "「私だってそう、ヘレナ理事長だってそう。個人差はあるものの、加齢と共に確実にその力は落ちていく」"

[[dialogue]]
speaker = "エスメラルダ"
# 「ところが唯一、それに当てはまらない人物がいるわ。それがラティエ学園長よ」
line = "「ところが唯一、それに当てはまらない人物がいるわ。それがラティエ学園長よ」"

[[dialogue]]
speaker = "unk"
# トワ先生はどうなんですか？
line = "トワ先生はどうなんですか？"

[[dialogue]]
speaker = "unk"
# 唯一、って……
line = "唯一、って……"

[[dialogue]]
speaker = "エスメラルダ"
# 「そうね。トワ先生も唯一無二の性質をもつ特別な存在と言えるわ」
line = "「そうね。トワ先生も唯一無二の性質をもつ特別な存在と言えるわ」"

[[dialogue]]
speaker = "エスメラルダ"
# 「彼女の場合、その原因は回復に特化した『特異体質』に依るものだということが分かっているのだけど……」
line = "「彼女の場合、その原因は回復に特化した『特異体質』に依るものだということが分かっているのだけど……」"

[[dialogue]]
speaker = "unk"
# 本人の意思とは関係なく、常時発動しているトワ先生の『自動回復』。
line = "本人の意思とは関係なく、常時発動しているトワ先生の『自動回復』。"

[[dialogue]]
speaker = "unk"
# その影響でトワ先生は現在も、星力総量的に全く衰えがないという話だった。
line = "その影響でトワ先生は現在も、星力総量的に全く衰えがないという話だった。"

[[dialogue]]
speaker = "エスメラルダ"
# 「けれど、学園長は違うの」
line = "「けれど、学園長は違うの」"

[[dialogue]]
speaker = "unk"
# どう違うんですか？
line = "どう違うんですか？"

[[dialogue]]
speaker = "エスメラルダ"
# 「<b>何も理由が無いの</b>」
line = "「<b>何も理由が無いの</b>」"

[[dialogue]]
speaker = "エスメラルダ"
# 「……現象には何らかの原因がある」
line = "「……現象には何らかの原因がある」"

[[dialogue]]
speaker = "エスメラルダ"
# 「特異な現象には必ず何らかの原因があり、それは大なり小なり痕跡が存在するはず」
line = "「特異な現象には必ず何らかの原因があり、それは大なり小なり痕跡が存在するはず」"

[[dialogue]]
speaker = "エスメラルダ"
# 「けれど……学園長には、<b>それが全くない</b>」
line = "「けれど……学園長には、<b>それが全くない</b>」"

[[dialogue]]
speaker = "エスメラルダ"
# 「加齢による影響を受けないこと以外、学園長はごく平均的な能力を持った星騎士なのよ」
line = "「加齢による影響を受けないこと以外、学園長はごく平均的な能力を持った星騎士なのよ」"

[[dialogue]]
speaker = "エスメラルダ"
# 「<b>ありえないことが</b>、<b>ただ存在する</b>。それがどれだけ異常なことか分かってもらえるかしら？」
line = "「<b>ありえないことが</b>、<b>ただ存在する</b>。それがどれだけ異常なことか分かってもらえるかしら？」"

[[dialogue]]
speaker = "unk"
# 現象の原因を究明するための手がかり。
line = "現象の原因を究明するための手がかり。"

[[dialogue]]
speaker = "unk"
# それが全く存在しないとなると、謎の解き明かしようがない。
line = "それが全く存在しないとなると、謎の解き明かしようがない。"

[[dialogue]]
