[[dialogue]]
speaker = "unk"
# 第２話,３０００年前の雪辱を,B
line = "第２話,３０００年前の雪辱を,B"

[[dialogue]]
speaker = "unk"
# あれはしばらく前のこと──
line = "あれはしばらく前のこと──"

[[dialogue]]
speaker = "アナ"
# 「会長、いかがでしたか。トリュファイナさんへの応援要請は」
line = "「会長、いかがでしたか。トリュファイナさんへの応援要請は」"

[[dialogue]]
speaker = "クロト"
# 「……快諾してもらえた。ルヴィネが重傷を負った時に備えて、目視できない霊体の姿でついてきてくれる」
line = "「……快諾してもらえた。ルヴィネが重傷を負った時に備えて、目視できない霊体の姿でついてきてくれる」"

[[dialogue]]
speaker = "クロト"
# 「３０００年前に、ラクシスを癒すことができなかった雪辱を果たす、ってさ」
line = "「３０００年前に、ラクシスを癒すことができなかった雪辱を果たす、ってさ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「よかったじゃない！　これなら万が一の時にも安心ねっ」
line = "「よかったじゃない！　これなら万が一の時にも安心ねっ」"

[[dialogue]]
speaker = "unk"
# これはある意味、現実的すぎて非情とさえ言えるプラン。
line = "これはある意味、現実的すぎて非情とさえ言えるプラン。"

[[dialogue]]
speaker = "unk"
# ルヴィネ死亡の未来が変えられなかった時に備えて──『<b>重傷を負ってから蘇生の魔法を施す</b>』という力技だ。
line = "ルヴィネ死亡の未来が変えられなかった時に備えて──『<b>重傷を負ってから蘇生の魔法を施す</b>』という力技だ。"

[[dialogue]]
speaker = "unk"
# 死に瀕した者を救う奇蹟を起こせるのは、クラウディアと同等の魔力を持つ光の魔女、トリュファイナさんを置いて他にいない。
line = "死に瀕した者を救う奇蹟を起こせるのは、クラウディアと同等の魔力を持つ光の魔女、トリュファイナさんを置いて他にいない。"

[[dialogue]]
speaker = "unk"
# トリュファイナさんは、俺が魔王ラクシスの生まれ変わりであることを自覚したその時に、現代への奇蹟の再誕を果たした魔女。
line = "トリュファイナさんは、俺が魔王ラクシスの生まれ変わりであることを自覚したその時に、現代への奇蹟の再誕を果たした魔女。"

[[dialogue]]
speaker = "unk"
# 普段は特殊な義体に収まって生活しているが、決して受肉したわけではなく、本質的には守護天使に近しい存在だ。ひとたび義体を脱ぎ去れば、彼女自身は霊体として存在している。
line = "普段は特殊な義体に収まって生活しているが、決して受肉したわけではなく、本質的には守護天使に近しい存在だ。ひとたび義体を脱ぎ去れば、彼女自身は霊体として存在している。"

[[dialogue]]
speaker = "unk"
# その霊体も、『縁を結んだ相手にしか見えない』という特性を持っている……それが今回の強みになる。
line = "その霊体も、『縁を結んだ相手にしか見えない』という特性を持っている……それが今回の強みになる。"

[[dialogue]]
speaker = "サーシャ"
# 「作戦どおり、すべてを承知してもらえたのかしら～？」
line = "「作戦どおり、すべてを承知してもらえたのかしら～？」"

[[dialogue]]
speaker = "クロト"
# 「ええ。癒し手のあの人には酷な頼みでしたけど……」
line = "「ええ。癒し手のあの人には酷な頼みでしたけど……」"

[[dialogue]]
speaker = "unk"
# 霊体の強みを生かすために、彼女の存在は徹底して隠す必要がある。ただでさえ、ルヴィネの力は未知数だ。
line = "霊体の強みを生かすために、彼女の存在は徹底して隠す必要がある。ただでさえ、ルヴィネの力は未知数だ。"

[[dialogue]]
speaker = "unk"
# 霊力を扱う彼女には、一目で看破されてしまうかも──そうなれば、戦闘力に特化していないヒーラーは格好の餌食。
line = "霊力を扱う彼女には、一目で看破されてしまうかも──そうなれば、戦闘力に特化していないヒーラーは格好の餌食。"

[[dialogue]]
speaker = "unk"
# だから徹底して息をひそめてもらう。俺たちがどんなに傷ついても、影から魔法で癒すことはあってはならない。
line = "だから徹底して息をひそめてもらう。俺たちがどんなに傷ついても、影から魔法で癒すことはあってはならない。"

[[dialogue]]
speaker = "unk"
# ディザスターハンド戦の間は何があっても傍観し──ルヴィネが致命傷を負った時にのみ、魔法を行使してくれと伝えたのだ。
line = "ディザスターハンド戦の間は何があっても傍観し──ルヴィネが致命傷を負った時にのみ、魔法を行使してくれと伝えたのだ。"

[[dialogue]]
speaker = "アナ"
# 「しかし会長、顔色が優れませんね。何か懸念でも？」
line = "「しかし会長、顔色が優れませんね。何か懸念でも？」"

[[dialogue]]
speaker = "クロト"
# 「……瀕死の者を治癒する大魔法の準備に、時間がひどくかかるらしい」
line = "「……瀕死の者を治癒する大魔法の準備に、時間がひどくかかるらしい」"

[[dialogue]]
speaker = "クロト"
# 「だから、いざ準備を始めたとしても、間に合わないかもしれないと言われた」
line = "「だから、いざ準備を始めたとしても、間に合わないかもしれないと言われた」"

[[dialogue]]
speaker = "マトイ"
# 「……そう、なんだ」
line = "「……そう、なんだ」"

[[dialogue]]
speaker = "クロト"
# 「みんな。これは極星学園生にもジグたちにも秘密の作戦になる。いざという時は、死力を尽くして時間を稼ぐことになる──覚悟しておいてくれ」
line = "「みんな。これは極星学園生にもジグたちにも秘密の作戦になる。いざという時は、死力を尽くして時間を稼ぐことになる──覚悟しておいてくれ」"

[[dialogue]]
speaker = "チナ"
# 「……っ！？　なんだ、急に空気があったかく……？」
line = "「……っ！？　なんだ、急に空気があったかく……？」"

[[dialogue]]
speaker = "グレイス"
# 「回復の星術……いえ。星力じゃありませんっ──これは！？」
line = "「回復の星術……いえ。星力じゃありませんっ──これは！？」"

[[dialogue]]
speaker = "クロト"
# 「トリュファイナさん！　ルヴィネをお願いします！！」
line = "「トリュファイナさん！　ルヴィネをお願いします！！」"

[[dialogue]]
speaker = "レティシア"
# 「……トリュ、ファイナ？」
line = "「……トリュ、ファイナ？」"

[[dialogue]]
speaker = "クロト"
# 「君たちの目の前にいる──光の魔女だ！　彼女がルヴィネを治療する！！」
line = "「君たちの目の前にいる──光の魔女だ！　彼女がルヴィネを治療する！！」"

[[dialogue]]
speaker = "ベアトリス"
# 「私たちの目の前って…………ぁあっ！？」
line = "「私たちの目の前って…………ぁあっ！？」"

[[dialogue]]
speaker = "トリュファイナ"
# 「お待たせして申し訳ございません……！　光の魔女トリュファイナ！　ここに！」
line = "「お待たせして申し訳ございません……！　光の魔女トリュファイナ！　ここに！」"

[[dialogue]]
speaker = "チナ"
# 「ひかりのまじょ……光の魔女って、あの！？　おとぎ話に出てくる！？」
line = "「ひかりのまじょ……光の魔女って、あの！？　おとぎ話に出てくる！？」"

[[dialogue]]
speaker = "グレイス"
# 「え、えっ！？　貴女は購買部の店員さん──そんなすごい御方だったんですか！？」
line = "「え、えっ！？　貴女は購買部の店員さん──そんなすごい御方だったんですか！？」"

[[dialogue]]
speaker = "レティシア"
# 「世界の各地で言い伝えの残る──伝説の魔女！？」
line = "「世界の各地で言い伝えの残る──伝説の魔女！？」"

[[dialogue]]
speaker = "ベアトリス"
# 「で、できるんですか！？　ルヴィを、助けてもらえるんですかっ！？」
line = "「で、できるんですか！？　ルヴィを、助けてもらえるんですかっ！？」"

[[dialogue]]
speaker = "トリュファイナ"
# 「お任せください！　再生の奇蹟を今ここに──ウルティマ・リプロダクション！！」
line = "「お任せください！　再生の奇蹟を今ここに──ウルティマ・リプロダクション！！」"

[[dialogue]]
speaker = "ジグ"
# 「驚いたね。まさか光の魔女とも知り合いだったとは」
line = "「驚いたね。まさか光の魔女とも知り合いだったとは」"

[[dialogue]]
speaker = "ジグ"
# 「……君から未来を訊ねられるたび、心苦しかった。ルヴィネが死を避けられない致命傷を負う未来は、何を準備しても変わらなかったからね」
line = "「……君から未来を訊ねられるたび、心苦しかった。ルヴィネが死を避けられない致命傷を負う未来は、何を準備しても変わらなかったからね」"

[[dialogue]]
speaker = "クロト"
# 「奥の手を隠していたのは申し訳ない……」
line = "「奥の手を隠していたのは申し訳ない……」"

[[dialogue]]
speaker = "クロト"
# 「ただ──それを逆手に取ったのがプランＢだ。未来が変えられない時に敢えて備えた保険──ここから先の結末は、俺も君も知らない」
line = "「ただ──それを逆手に取ったのがプランＢだ。未来が変えられない時に敢えて備えた保険──ここから先の結末は、俺も君も知らない」"

[[dialogue]]
speaker = "ジグ"
# 「詳しく説明してくれれば、重傷を負ったそのもう少し先を、意識して覗くこともできたと思うよ？」
line = "「詳しく説明してくれれば、重傷を負ったそのもう少し先を、意識して覗くこともできたと思うよ？」"

[[dialogue]]
speaker = "ジグ"
# 「そうすれば魔女の奇蹟が実るかどうかも確認できたはず──どうしてしなかったんだい？」
line = "「そうすれば魔女の奇蹟が実るかどうかも確認できたはず──どうしてしなかったんだい？」"

[[dialogue]]
speaker = "クロト"
# 「視えないからこそ希望が持てる……全ての可能性が閉ざされてしまうと、後に残るのは絶望だけだ」
line = "「視えないからこそ希望が持てる……全ての可能性が閉ざされてしまうと、後に残るのは絶望だけだ」"

[[dialogue]]
speaker = "unk"
# もしもルヴィネが致命傷を負わない未来が視えたら、それで万々歳だったが──今日までそのビジョンは現れなかった。
line = "もしもルヴィネが致命傷を負わない未来が視えたら、それで万々歳だったが──今日までそのビジョンは現れなかった。"

[[dialogue]]
speaker = "クロト"
# 「トリュファイナさんは俺が切れる最後のジョーカー。もしも、あの人でも蘇生が不可能という未来を知ってしまったら──」
line = "「トリュファイナさんは俺が切れる最後のジョーカー。もしも、あの人でも蘇生が不可能という未来を知ってしまったら──」"

[[dialogue]]
speaker = "ジグ"
# 「もう打つ手がないから、訊かなかった。そういうことか」
line = "「もう打つ手がないから、訊かなかった。そういうことか」"

[[dialogue]]
speaker = "ジグ"
# 「……君は意外としたたかというか、リアリストなんだね。見直したよ」
line = "「……君は意外としたたかというか、リアリストなんだね。見直したよ」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「……話を聞いていなかったの？　あの木偶は助からない。光の魔女だなんて隠し玉は驚きだったけれど、それでどうにかできる負傷ではないわ」
line = "「……話を聞いていなかったの？　あの木偶は助からない。光の魔女だなんて隠し玉は驚きだったけれど、それでどうにかできる負傷ではないわ」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「よしんば復活できたとして、あれはもう霊力を扱えない。戦う術もない置物にすぎないのに。不合理ね」
line = "「よしんば復活できたとして、あれはもう霊力を扱えない。戦う術もない置物にすぎないのに。不合理ね」"

[[dialogue]]
speaker = "クロト"
# 「──お前にはわからないだろうな。命を摘むということを、何とも思わない虚ろなお前には！」
line = "「──お前にはわからないだろうな。命を摘むということを、何とも思わない虚ろなお前には！」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「私、あんたのことすっごく嫌いだわ！　ビームで黒焦げにしてやるから覚悟しなさい！！」
line = "「私、あんたのことすっごく嫌いだわ！　ビームで黒焦げにしてやるから覚悟しなさい！！」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「いきましょう姉さん。決着をつけます！」
line = "「いきましょう姉さん。決着をつけます！」"

[[dialogue]]
speaker = "アポロ"
# 「ああ！　気合い十分だ、行くぞっ！」
line = "「ああ！　気合い十分だ、行くぞっ！」"

[[dialogue]]
speaker = "煌嶺"
# 「やれやれ。たかが１人の天使が生きるの死ぬので大騒ぎ……痒くてかなわん」
line = "「やれやれ。たかが１人の天使が生きるの死ぬので大騒ぎ……痒くてかなわん」"

[[dialogue]]
speaker = "煌嶺"
# 「──が。ルヴィネの複製とやらにはひどくそそられる。本物の代わりに味見といくか！」
line = "「──が。ルヴィネの複製とやらにはひどくそそられる。本物の代わりに味見といくか！」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「──お父様に仇なす魔王、緋宮クロト。その目障りな血統に、女神の搾りカス。そして……」
line = "「──お父様に仇なす魔王、緋宮クロト。その目障りな血統に、女神の搾りカス。そして……」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
# 「<ruby=レナトゥス>封理再誕</ruby>によって『近似世界』が複数生まれるきっかけを作った、光の魔女──」
line = "「<ruby>封理再誕<rt>レナトゥス</rt></ruby>によって『近似世界』が複数生まれるきっかけを作った、光の魔女──」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
# 「全員、処断するわ。今──この場で！！！」
line = "「全員、処断するわ。今──この場で！！！」"
