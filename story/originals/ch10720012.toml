[[dialogue]]
speaker = "unk"
# 第２話,正義に燃えるお年頃,P
line = "第２話,正義に燃えるお年頃,P"

[[dialogue]]
speaker = "セーラ"
# 「ん？　新星の会長さんじゃ～ん。もしかして、そっちも今帰り～？　軽くなんか食べに来た的な～？」
line = "「ん？　新星の会長さんじゃ～ん。もしかして、そっちも今帰り～？　軽くなんか食べに来た的な～？」"

[[dialogue]]
speaker = "セーラ"
# 「ならなら一緒に行こうよ♪　１人より２人の方が楽しいし♪　実はついさっき友達が先に帰っちゃってさ～」
line = "「ならなら一緒に行こうよ♪　１人より２人の方が楽しいし♪　実はついさっき友達が先に帰っちゃってさ～」"

[[dialogue]]
speaker = "ミア"
# 「コラーっ！　そこの２人ーっ！」
line = "「コラーっ！　そこの２人ーっ！」"

[[dialogue]]
speaker = "セーラ"
# 「おやおや？　この声は……」
line = "「おやおや？　この声は……」"

[[dialogue]]
speaker = "ミア"
# 「下校中の寄り道はいけないわよっ。買い食いなんて以ての外！　遅くなる前に早くお家に帰りなさーいっ！」
line = "「下校中の寄り道はいけないわよっ。買い食いなんて以ての外！　遅くなる前に早くお家に帰りなさーいっ！」"

[[dialogue]]
speaker = "セーラ"
# 「やっぱミアちじゃーん。今日も見回り頑張ってて偉いね～。よしよし、ご褒美にこれあげちゃう♪」
line = "「やっぱミアちじゃーん。今日も見回り頑張ってて偉いね～。よしよし、ご褒美にこれあげちゃう♪」"

[[dialogue]]
speaker = "ミア"
# 「あっ、これ新発売のお団子……！　えへへ、あんこたっぷりで美味しい～。あまぁ～い。ありがとうございます～！」
line = "「あっ、これ新発売のお団子……！　えへへ、あんこたっぷりで美味しい～。あまぁ～い。ありがとうございます～！」"

[[dialogue]]
speaker = "ミア"
# 「じゃなくて！　買い食いはダメって言ったところでしょっ！　何を食べさせてるのよ！」
line = "「じゃなくて！　買い食いはダメって言ったところでしょっ！　何を食べさせてるのよ！」"

[[dialogue]]
speaker = "セーラ"
# 「あはは、相変わらずミアちはかわい～なぁ。一緒に食べ歩き行かない？　プリプリしてるより、美味しいもの食べてる顔の方がよっぽど愛らしいよ～？」
line = "「あはは、相変わらずミアちはかわい～なぁ。一緒に食べ歩き行かない？　プリプリしてるより、美味しいもの食べてる顔の方がよっぽど愛らしいよ～？」"

[[dialogue]]
speaker = "ミア"
# 「よ、余計なお世話です。私は２つの学園の風紀を守るためにこうして見回りをしてるんだからっ」
line = "「よ、余計なお世話です。私は２つの学園の風紀を守るためにこうして見回りをしてるんだからっ」"

[[dialogue]]
speaker = "ミア"
# 「それより２人ともなんのつもりですか？　新星学園と流星学園の星徒会メンバーともあろう人たちが寄り道なんて不良行為をしちゃって」
line = "「それより２人ともなんのつもりですか？　新星学園と流星学園の星徒会メンバーともあろう人たちが寄り道なんて不良行為をしちゃって」"

[[dialogue]]
speaker = "unk"
# 不良行為ってこれまたオーバーな
line = "不良行為ってこれまたオーバーな"

[[dialogue]]
speaker = "ミア"
# 「オーバーじゃないもんっ。寄り道はダメだって、ママに教わらなかったのっ？」
line = "「オーバーじゃないもんっ。寄り道はダメだって、ママに教わらなかったのっ？」"

[[dialogue]]
speaker = "セーラ"
# 「あはは、ミアちはちょっと生真面目すぎるってば。別に校則でも寄り道が絶対ダメってわけじゃないんだし。ほどほどにしときなさいって感じっしょ？」
line = "「あはは、ミアちはちょっと生真面目すぎるってば。別に校則でも寄り道が絶対ダメってわけじゃないんだし。ほどほどにしときなさいって感じっしょ？」"

[[dialogue]]
speaker = "ミア"
# 「たとえ禁止されてなくても守らなきゃいけない規律ってものがありますっ。特に２人は学園のトップなんだから。みんなの模範になってもらわないと困りますっ」
line = "「たとえ禁止されてなくても守らなきゃいけない規律ってものがありますっ。特に２人は学園のトップなんだから。みんなの模範になってもらわないと困りますっ」"

[[dialogue]]
speaker = "セーラ"
# 「まま落ち着いて。肩に力が入り過ぎちゃってるよ。ほらほらお団子のおかわりでも食べて」
line = "「まま落ち着いて。肩に力が入り過ぎちゃってるよ。ほらほらお団子のおかわりでも食べて」"

[[dialogue]]
speaker = "ミア"
# 「わっ……！　さっきとまた違う味だ……！　はむはむ──んんっ～！　こっちも美味しい～！　抹茶味のあんこだ～！」
line = "「わっ……！　さっきとまた違う味だ……！　はむはむ──んんっ～！　こっちも美味しい～！　抹茶味のあんこだ～！」"

[[dialogue]]
speaker = "ミア"
# 「じゃなくて！　事あるごとに餌付けしようとしないでってばぁ～！　人のこと子ども扱いしてぇ～！」
line = "「じゃなくて！　事あるごとに餌付けしようとしないでってばぁ～！　人のこと子ども扱いしてぇ～！」"

[[dialogue]]
speaker = "セーラ"
# 「あはは、ミアちはホント甘いものに目がないね～。そういうところも可愛いんだけど♪」
line = "「あはは、ミアちはホント甘いものに目がないね～。そういうところも可愛いんだけど♪」"

[[dialogue]]
speaker = "ミア"
# 「人をからかうのもいい加減にしてくださいっ。私は真面目に注意してるんですからねっ？」
line = "「人をからかうのもいい加減にしてくださいっ。私は真面目に注意してるんですからねっ？」"

[[dialogue]]
speaker = "unk"
# でも時には羽根を伸ばすことも大事だよ
line = "でも時には羽根を伸ばすことも大事だよ"

[[dialogue]]
speaker = "ミア"
# 「そ、それはわかってるけど……！」
line = "「そ、それはわかってるけど……！」"

[[dialogue]]
speaker = "セーラ"
# 「むしろミアちは羽根を伸ばさなすぎなんだよ。ふふふ、ここはひとつ、うちでミアちの羽根をバッチリ伸ばさせてあげようじゃん」
line = "「むしろミアちは羽根を伸ばさなすぎなんだよ。ふふふ、ここはひとつ、うちでミアちの羽根をバッチリ伸ばさせてあげようじゃん」"

[[dialogue]]
speaker = "ミア"
# 「ちょっ、その手は何っ？　わ、私は行きませんからねっ。不良行為に手を染めるつもりは一切ないから……！」
line = "「ちょっ、その手は何っ？　わ、私は行きませんからねっ。不良行為に手を染めるつもりは一切ないから……！」"

[[dialogue]]
speaker = "セーラ"
# 「そっか残念だなー。実は丁度さっきコスメの試供品もらったんだよね～。ミアちに合いそうな感じのヤツだったんだけどな～」
line = "「そっか残念だなー。実は丁度さっきコスメの試供品もらったんだよね～。ミアちに合いそうな感じのヤツだったんだけどな～」"

[[dialogue]]
speaker = "ミア"
# 「け、化粧なんて不良行為の最たるものじゃないですかっ。学生は化粧なんてしなくていーんですっ。そういうのは大人になってからですっ」
line = "「け、化粧なんて不良行為の最たるものじゃないですかっ。学生は化粧なんてしなくていーんですっ。そういうのは大人になってからですっ」"

[[dialogue]]
speaker = "セーラ"
# 「あれ？　つまりミアちはまだ子どもってこと？」
line = "「あれ？　つまりミアちはまだ子どもってこと？」"

[[dialogue]]
speaker = "ミア"
# 「～～っっ！　ち、違うもんっ。私は大人だもんっ！」
line = "「～～っっ！　ち、違うもんっ。私は大人だもんっ！」"

[[dialogue]]
speaker = "セーラ"
# 「ならいいじゃん♪　うちに化粧させてくれたら、ぐーんと大人っぽくしてあげるよ～？」
line = "「ならいいじゃん♪　うちに化粧させてくれたら、ぐーんと大人っぽくしてあげるよ～？」"

[[dialogue]]
speaker = "ミア"
# 「ぐ、ぐーんと大人っぽく……！？」
line = "「ぐ、ぐーんと大人っぽく……！？」"

[[dialogue]]
speaker = "セーラ"
# 「どうどう？　興味出てきた？」
line = "「どうどう？　興味出てきた？」"

[[dialogue]]
speaker = "ミア"
# 「あうっ……！　で、でもでも、お化粧はやっぱり不良なイメージが強くて──」
line = "「あうっ……！　で、でもでも、お化粧はやっぱり不良なイメージが強くて──」"

[[dialogue]]
speaker = "セーラ"
# 「問答無用～！」
line = "「問答無用～！」"

[[dialogue]]
speaker = "ミア"
# 「きゃああああああっっ～！！？」
line = "「きゃああああああっっ～！！？」"

[[dialogue]]
speaker = "セーラ"
# 「はーい完成。どう？　大人っぽくなったっしょ？」
line = "「はーい完成。どう？　大人っぽくなったっしょ？」"

[[dialogue]]
speaker = "ミア"
# 「っっ……！　た、確かにぐんと大人っぽくなったかも……。化粧ってすごい。眉や目元を少し弄っただけなのに、こんなに変わるものなんだ……」
line = "「っっ……！　た、確かにぐんと大人っぽくなったかも……。化粧ってすごい。眉や目元を少し弄っただけなのに、こんなに変わるものなんだ……」"

[[dialogue]]
speaker = "セーラ"
# 「会長さんから見てもどう？　ミアち、大人っぽくなったと思わない？」
line = "「会長さんから見てもどう？　ミアち、大人っぽくなったと思わない？」"

[[dialogue]]
speaker = "unk"
# かわいいより美人って感じかも
line = "かわいいより美人って感じかも"

[[dialogue]]
speaker = "ミア"
# 「え、えへへ、ホント……？　会長さんの目から見てもそう見える……？」
line = "「え、えへへ、ホント……？　会長さんの目から見てもそう見える……？」"

[[dialogue]]
speaker = "ミア"
# 「お化粧って、意外と悪くないかも……。思ってたより簡単にできそうな感じだったし……」
line = "「お化粧って、意外と悪くないかも……。思ってたより簡単にできそうな感じだったし……」"

[[dialogue]]
speaker = "ミア"
# 「それでこんなに大人っぽく見えるのなら割と有りなんじゃ……。風紀委員としての威厳も出るかもしれないし……。子ども扱いされなくなるかもしれないし……」
line = "「それでこんなに大人っぽく見えるのなら割と有りなんじゃ……。風紀委員としての威厳も出るかもしれないし……。子ども扱いされなくなるかもしれないし……」"

[[dialogue]]
speaker = "セーラ"
# 「だったら今から本格的に見に行く？　うちがミアちに似合うコスメ、見繕ってあげるよ～？」
line = "「だったら今から本格的に見に行く？　うちがミアちに似合うコスメ、見繕ってあげるよ～？」"

[[dialogue]]
speaker = "ミア"
# 「ホ、ホントっ？　じゃあ、お願い──……」
line = "「ホ、ホントっ？　じゃあ、お願い──……」"

[[dialogue]]
speaker = "ミア"
# 「って！　あ、危ないところだったわっ。私としたことが不良の道に自ら足を踏み入れるところだった……！」
line = "「って！　あ、危ないところだったわっ。私としたことが不良の道に自ら足を踏み入れるところだった……！」"

[[dialogue]]
speaker = "ミア"
# 「やっぱりダメよっ、こんなのダメ！　化粧は大人になってからってママにも言われてるもんっ！　そもそもこのまま買い物に行ったら寄り道になっちゃうしっ！」
line = "「やっぱりダメよっ、こんなのダメ！　化粧は大人になってからってママにも言われてるもんっ！　そもそもこのまま買い物に行ったら寄り道になっちゃうしっ！」"

[[dialogue]]
speaker = "ミア"
# 「セーラ先輩の気持ちは有り難いけど、寄り道はダメ！　２人もそろそろ帰りなさいっ。これは風紀委員命令よっ！」
line = "「セーラ先輩の気持ちは有り難いけど、寄り道はダメ！　２人もそろそろ帰りなさいっ。これは風紀委員命令よっ！」"

[[dialogue]]
speaker = "セーラ"
# 「ところがどっこい二度目の問答無用～！」
line = "「ところがどっこい二度目の問答無用～！」"

[[dialogue]]
speaker = "ミア"
# 「きゃああああああっっ！？　離してっ、離してってばっ！　行かないっ、私はお化粧品なんて買いに行かないもんっ！」
line = "「きゃああああああっっ！？　離してっ、離してってばっ！　行かないっ、私はお化粧品なんて買いに行かないもんっ！」"

[[dialogue]]
speaker = "ミア"
# 「私を不良の道に引きずり込まないでぇ～！！」
line = "「私を不良の道に引きずり込まないでぇ～！！」"
