[[dialogue]]
speaker = "unk"
# 第１話,美味しいカヌレを作りましょう,P
line = "第１話,美味しいカヌレを作りましょう,P"

[[dialogue]]
speaker = "unk"
# 微かに漂ってくる甘い匂いに釣られ、カフェを訪れると──
line = "微かに漂ってくる甘い匂いに釣られ、カフェを訪れると──"

[[dialogue]]
speaker = "シャロン"
# 「うんしょっと……！　これで準備ＯＫですっ」
line = "「うんしょっと……！　これで準備ＯＫですっ」"

[[dialogue]]
speaker = "unk"
# バレンタイン戦闘服を身にまとったシャロンの前には、大量の牛乳や砂糖や卵が積まれていた。
line = "バレンタイン戦闘服を身にまとったシャロンの前には、大量の牛乳や砂糖や卵が積まれていた。"

[[dialogue]]
speaker = "unk"
# お菓子でも作るの？
line = "お菓子でも作るの？"

[[dialogue]]
speaker = "シャロン"
# 「あっ、会長さま。そうなんです。また子ども会のボランティアに参加することになりまして」
line = "「あっ、会長さま。そうなんです。また子ども会のボランティアに参加することになりまして」"

[[dialogue]]
speaker = "シャロン"
# 「美味しく作れるようになったカヌレを配ろうと思ってるんですっ！」
line = "「美味しく作れるようになったカヌレを配ろうと思ってるんですっ！」"

[[dialogue]]
speaker = "シャロン"
# 「カヌレって難しそうに見えますけど、生地を作ったら後は型に入れて焼くだけですから、わりと簡単なんですよ」
line = "「カヌレって難しそうに見えますけど、生地を作ったら後は型に入れて焼くだけですから、わりと簡単なんですよ」"

[[dialogue]]
speaker = "シャロン"
# 「ですがたくさん作るには人手が欲しくて……」
line = "「ですがたくさん作るには人手が欲しくて……」"

[[dialogue]]
speaker = "シャロン"
# 「あの……会長さま。よろしかったら、お手伝いをお願いしても……？」
line = "「あの……会長さま。よろしかったら、お手伝いをお願いしても……？」"

[[dialogue]]
speaker = "unk"
# 俺でよければ是非
line = "俺でよければ是非"

[[dialogue]]
speaker = "シャロン"
# 「わぁ！　ありがとうございます！　会長さまがいてくれれば、百人力ですねっ」
line = "「わぁ！　ありがとうございます！　会長さまがいてくれれば、百人力ですねっ」"

[[dialogue]]
speaker = "シャロン"
# 「ところで……会長さまはカヌレについて、ご存じですか？」
line = "「ところで……会長さまはカヌレについて、ご存じですか？」"

[[dialogue]]
speaker = "unk"
# 形が特徴的なくらいかな
line = "形が特徴的なくらいかな"

[[dialogue]]
speaker = "シャロン"
# 「ふふ、そうでしたか。でしたら、カヌレの長～い歴史を知りながら作りましょうっ！　その方が絶対美味しくなりますからねっ」
line = "「ふふ、そうでしたか。でしたら、カヌレの長～い歴史を知りながら作りましょうっ！　その方が絶対美味しくなりますからねっ」"

[[dialogue]]
speaker = "unk"
# 手際よく材料を用意しながら、シャロンはカヌレの歴史について語り始めた。
line = "手際よく材料を用意しながら、シャロンはカヌレの歴史について語り始めた。"

[[dialogue]]
speaker = "シャロン"
# 「こほん。今回カヌレを作る際に調べたのですが、その歴史は古く、起源は数百年前に<ruby=さかのぼ>遡る</ruby>そうです」
line = "「こほん。今回カヌレを作る際に調べたのですが、その歴史は古く、起源は数百年前に<ruby>遡る<rt>さかのぼ</rt></ruby>そうです」"

[[dialogue]]
speaker = "シャロン"
# 「そんな昔からあるなんて、びっくりですよね！　カヌレと略していますけど、本当はカヌレ・ド・ボルドーという名前でして」
line = "「そんな昔からあるなんて、びっくりですよね！　カヌレと略していますけど、本当はカヌレ・ド・ボルドーという名前でして」"

[[dialogue]]
speaker = "シャロン"
# 「名前の通り、フランスのボルドー地方発祥の伝統的な焼き菓子で、女子修道院で生まれたと言われているんです」
line = "「名前の通り、フランスのボルドー地方発祥の伝統的な焼き菓子で、女子修道院で生まれたと言われているんです」"

[[dialogue]]
speaker = "シャロン"
# 「ワインの不純物を取る際に卵白を使っていて、余った卵黄を使って作ったのが始まりだそうですよ」
line = "「ワインの不純物を取る際に卵白を使っていて、余った卵黄を使って作ったのが始まりだそうですよ」"

[[dialogue]]
speaker = "シャロン"
# 「私が所属する修道院でもしばしばカヌレを作っていましたが、修道院でカヌレを作るのはそういう理由があったんですね」
line = "「私が所属する修道院でもしばしばカヌレを作っていましたが、修道院でカヌレを作るのはそういう理由があったんですね」"

[[dialogue]]
speaker = "シャロン"
# 「そしてカヌレの特徴はなんといっても、独特な形と、外はカリカリ、中はしっとりもちもちな独特な食感ですよね」
line = "「そしてカヌレの特徴はなんといっても、独特な形と、外はカリカリ、中はしっとりもちもちな独特な食感ですよね」"

[[dialogue]]
speaker = "シャロン"
# 「そもそも『カヌレ』とは『溝のついた』という意味がありまして……銅でできた、専用のカヌレ型に入れて焼くことであの特徴的な形になるんです」
line = "「そもそも『カヌレ』とは『溝のついた』という意味がありまして……銅でできた、専用のカヌレ型に入れて焼くことであの特徴的な形になるんです」"

[[dialogue]]
speaker = "シャロン"
# 「では、こちらのカヌレ生地を、この型に流し込みまして──」
line = "「では、こちらのカヌレ生地を、この型に流し込みまして──」"

[[dialogue]]
speaker = "シャロン"
# 「くんくん……はぁぁ……ラム酒とバニラビーンズのいい香りが……♪」
line = "「くんくん……はぁぁ……ラム酒とバニラビーンズのいい香りが……♪」"

[[dialogue]]
speaker = "シャロン"
# 「でも、ラム酒はアルコール度数が高いですからね。取り扱い注意です」
line = "「でも、ラム酒はアルコール度数が高いですからね。取り扱い注意です」"

[[dialogue]]
speaker = "シャロン"
# 「小さい子でも食べられるようにアルコールを飛ばさないと──ひっく……酔っぱらっちゃいましゅからね～」
line = "「小さい子でも食べられるようにアルコールを飛ばさないと──ひっく……酔っぱらっちゃいましゅからね～」"

[[dialogue]]
speaker = "シャロン"
# 「あれれ、目の前がふわふわしましゅね……でぁ、生地を型に流し入れていきま～す。こぼさないように気をつけてくらさいね～」
line = "「あれれ、目の前がふわふわしましゅね……でぁ、生地を型に流し入れていきま～す。こぼさないように気をつけてくらさいね～」"

[[dialogue]]
speaker = "シャロン"
# 「そうれす、そうれす～♪　会長さま、とってもお上手れすよ～♪　いい子いい子してあげますね～、なでなで」
line = "「そうれす、そうれす～♪　会長さま、とってもお上手れすよ～♪　いい子いい子してあげますね～、なでなで」"

[[dialogue]]
speaker = "シャロン"
# 「あとはオーブンに入れて～、ゆ～っくり１時間くらい焼けば完成れす～」
line = "「あとはオーブンに入れて～、ゆ～っくり１時間くらい焼けば完成れす～」"

[[dialogue]]
speaker = "unk"
# 糖が焦げる香ばしい匂いが漂う。
line = "糖が焦げる香ばしい匂いが漂う。"

[[dialogue]]
speaker = "unk"
# ほのかに香るラム酒が、カヌレの特徴的なアクセントではあるけれど──
line = "ほのかに香るラム酒が、カヌレの特徴的なアクセントではあるけれど──"

[[dialogue]]
speaker = "シャロン"
# 「んふふふ、こんなすぐにできちゃうなんて～、会長さまのおかげれすよ～。えらいえら～い」
line = "「んふふふ、こんなすぐにできちゃうなんて～、会長さまのおかげれすよ～。えらいえら～い」"

[[dialogue]]
speaker = "シャロン"
# 「焼いてる間に、会長さまをい～っぱい褒め褒めしないとれす～。撫で撫でさせてくだひゃぁい♪」
line = "「焼いてる間に、会長さまをい～っぱい褒め褒めしないとれす～。撫で撫でさせてくだひゃぁい♪」"

[[dialogue]]
speaker = "unk"
# 明らかに様子がおかしいーっ！
line = "明らかに様子がおかしいーっ！"

[[dialogue]]
speaker = "イレーナ"
# 「くんくん、お菓子を焼いてるいい匂い……このラム酒の風味は……カヌレかしら？」
line = "「くんくん、お菓子を焼いてるいい匂い……このラム酒の風味は……カヌレかしら？」"

[[dialogue]]
speaker = "イレーナ"
# 「焼きあがったら御相伴に──って、あんたたち何してんの！？」
line = "「焼きあがったら御相伴に──って、あんたたち何してんの！？」"

[[dialogue]]
speaker = "unk"
# 助けて、イレーナ！
line = "助けて、イレーナ！"

[[dialogue]]
speaker = "unk"
# 撫で撫で地獄から逃げ出し、やってきたイレーナに助けを求めた。
line = "撫で撫で地獄から逃げ出し、やってきたイレーナに助けを求めた。"

[[dialogue]]
speaker = "シャロン"
# 「やぁん、逃げちゃやれすぅ！　会長さまぁ、もっと撫で撫で～。撫で撫でさせてくださいよぉう～。褒め褒めするんれしゅうぅ～♪」
line = "「やぁん、逃げちゃやれすぅ！　会長さまぁ、もっと撫で撫で～。撫で撫でさせてくださいよぉう～。褒め褒めするんれしゅうぅ～♪」"

[[dialogue]]
speaker = "イレーナ"
# 「シャロン、落ち着きなさいっての！　って、力強っ！？　まるで暴れ馬だわ！　どうどう！」
line = "「シャロン、落ち着きなさいっての！　って、力強っ！？　まるで暴れ馬だわ！　どうどう！」"

[[dialogue]]
speaker = "unk"
# イレーナの静止により、シャロンは動きを止める。危うく毛髪と頭皮がすり減ってしまうところだった。
line = "イレーナの静止により、シャロンは動きを止める。危うく毛髪と頭皮がすり減ってしまうところだった。"

[[dialogue]]
speaker = "シャロン"
# 「すぴー……すぴょー……ＺＺＺ」
line = "「すぴー……すぴょー……ＺＺＺ」"

[[dialogue]]
speaker = "unk"
# 酔いが回ったのか、シャロンは机に突っ伏して寝てしまった。
line = "酔いが回ったのか、シャロンは机に突っ伏して寝てしまった。"

[[dialogue]]
speaker = "イレーナ"
# 「泣き上戸だとかキス魔なんて酒癖は聞いたことあるけど、褒め魔ってのはあまり聞いたことないわね」
line = "「泣き上戸だとかキス魔なんて酒癖は聞いたことあるけど、褒め魔ってのはあまり聞いたことないわね」"

[[dialogue]]
speaker = "イレーナ"
# 「酔っぱらうとテンションが上がって、本性が出るっていうけど……会長さんを褒めまくりたいのが、シャロンの本心だったのかしら」
line = "「酔っぱらうとテンションが上がって、本性が出るっていうけど……会長さんを褒めまくりたいのが、シャロンの本心だったのかしら」"

[[dialogue]]
speaker = "イレーナ"
# 「そんなに迷惑がかかるわけじゃないからいいけど……この程度のラム酒の匂いだけで酔っぱらっちゃうってのは……ちょっと弱すぎよね」
line = "「そんなに迷惑がかかるわけじゃないからいいけど……この程度のラム酒の匂いだけで酔っぱらっちゃうってのは……ちょっと弱すぎよね」"

[[dialogue]]
speaker = "イレーナ"
# 「ほら、シャロン、そろそろ起きなさい」
line = "「ほら、シャロン、そろそろ起きなさい」"

[[dialogue]]
speaker = "シャロン"
# 「んふぇ……？　イレーナさま……？」
line = "「んふぇ……？　イレーナさま……？」"

[[dialogue]]
speaker = "イレーナ"
# 「カヌレ、焼けてるわよ。焼くのに時間がかかるお菓子でよかったわね」
line = "「カヌレ、焼けてるわよ。焼くのに時間がかかるお菓子でよかったわね」"

[[dialogue]]
speaker = "シャロン"
# 「わぁっ！？　あれれ……なんだか記憶が曖昧なんですけど……わ、私、何かやっちゃいましたかー……？」
line = "「わぁっ！？　あれれ……なんだか記憶が曖昧なんですけど……わ、私、何かやっちゃいましたかー……？」"

[[dialogue]]
speaker = "unk"
# 大丈夫……だったかな
line = "大丈夫……だったかな"

[[dialogue]]
speaker = "シャロン"
# 「そ、そうですか……それならよいのですけど……」
line = "「そ、そうですか……それならよいのですけど……」"

[[dialogue]]
speaker = "シャロン"
# 「あちち……はい、会長さま。焼きたてのカヌレです。まだお熱いので、火傷しないように気をつけてくださいね」
line = "「あちち……はい、会長さま。焼きたてのカヌレです。まだお熱いので、火傷しないように気をつけてくださいね」"

[[dialogue]]
speaker = "シャロン"
# 「もちろんイレーナさまもどうぞ！　私も失礼して──ぁむっ」
line = "「もちろんイレーナさまもどうぞ！　私も失礼して──ぁむっ」"

[[dialogue]]
speaker = "シャロン"
# 「うんっ、とっても美味しいっ<emoji=heart04>　会長さまにお手伝いしてもらったおかけですねっ<emoji=heart04>」
line = "「うんっ、とっても美味しいっ<emoji=heart04>　会長さまにお手伝いしてもらったおかけですねっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 上手に焼きあがったカヌレは、甘くて、ほろ苦くて、カリカリのモチモチで、とっても美味しい最高の出来栄えだった。
line = "上手に焼きあがったカヌレは、甘くて、ほろ苦くて、カリカリのモチモチで、とっても美味しい最高の出来栄えだった。"
