[[dialogue]]
speaker = "unk"
# 第５話,女帝の懐刀,B
line = "第５話,女帝の懐刀,B"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「リフレクトゴッデスカリバー！」
line = "「リフレクトゴッデスカリバー！」"

[[dialogue]]
speaker = "unk"
# 紫電をまとった長剣を横一文字に振るい、ガーディアンを両断した。
line = "紫電をまとった長剣を横一文字に振るい、ガーディアンを両断した。"

[[dialogue]]
speaker = "unk"
# だが無辜の民を襲う脅威は、極星従騎ばかりではない。
line = "だが無辜の民を襲う脅威は、極星従騎ばかりではない。"

[[dialogue]]
speaker = "マキナ・スクアルス"
# 「シャァアアアッ！！」
line = "「シャァアアアッ！！」"

[[dialogue]]
speaker = "unk"
# 鋼の鎧で身を固めた機械のモンスターが、頭の刃で地面を引き裂き、牙をコンクリートに突き立て、街を瓦礫に変えていく。
line = "鋼の鎧で身を固めた機械のモンスターが、頭の刃で地面を引き裂き、牙をコンクリートに突き立て、街を瓦礫に変えていく。"

[[dialogue]]
speaker = "アナ（覚醒）"
# 「ボルカニック・イプシロン──！」
line = "「ボルカニック・イプシロン──！」"

[[dialogue]]
speaker = "マキナ・スクアルス"
# 「シャアアアッ……！」
line = "「シャアアアッ……！」"

[[dialogue]]
speaker = "unk"
# 炎の矢がサメの口内を貫き、モンスターが内側から爆散する。
line = "炎の矢がサメの口内を貫き、モンスターが内側から爆散する。"

[[dialogue]]
speaker = "マトイ"
# 「はぁ、はぁ……トドメを刺す時だけノヴァフォームになってるけど、これはこれでキツい……」
line = "「はぁ、はぁ……トドメを刺す時だけノヴァフォームになってるけど、これはこれでキツい……」"

[[dialogue]]
speaker = "アナ"
# 「ノヴァフォームを維持するよりはマシですが、消耗は激しいですね。もっと長くノヴァフォームを維持できればいいのですが……」
line = "「ノヴァフォームを維持するよりはマシですが、消耗は激しいですね。もっと長くノヴァフォームを維持できればいいのですが……」"

[[dialogue]]
speaker = "unk"
# 流星市国に襲来したのは数百体の極星従騎。モンスターに至っては数もわからない。
line = "流星市国に襲来したのは数百体の極星従騎。モンスターに至っては数もわからない。"

[[dialogue]]
speaker = "unk"
# ノヴァフォームでも戦力を覆すには及ばず、今も星騎士たちが傷つき倒れ、街が廃墟と化していた。
line = "ノヴァフォームでも戦力を覆すには及ばず、今も星騎士たちが傷つき倒れ、街が廃墟と化していた。"

[[dialogue]]
speaker = "ドラケルス"
# 「ガアゥゥ！」
line = "「ガアゥゥ！」"

[[dialogue]]
speaker = "アナ"
# 「マトイ先輩、１２時の方向からモンスター来ます！」
line = "「マトイ先輩、１２時の方向からモンスター来ます！」"

[[dialogue]]
speaker = "マトイ"
# 「くっ……また機械のモンスター……すごく硬いやつ……」
line = "「くっ……また機械のモンスター……すごく硬いやつ……」"

[[dialogue]]
speaker = "マトイ"
# （もう手の感覚がほとんどない……星力も残り少なくて、頭がくらくらする……）
line = "（もう手の感覚がほとんどない……星力も残り少なくて、頭がくらくらする……）"

[[dialogue]]
speaker = "マトイ"
# （でも弱気になっちゃダメ……極星従騎やあの新しいモンスターを倒せる星騎士は少ないんだから、星徒会が先頭に立たないと……！）
line = "（でも弱気になっちゃダメ……極星従騎やあの新しいモンスターを倒せる星騎士は少ないんだから、星徒会が先頭に立たないと……！）"

[[dialogue]]
speaker = "マトイ"
# 「この世界は──流星市国は私たちが守るんだから！」
line = "「この世界は──流星市国は私たちが守るんだから！」"

[[dialogue]]
speaker = "マキナ・スクアルス"
# 「シャーッ！！」
line = "「シャーッ！！」"

[[dialogue]]
speaker = "スレイプニル"
# 「ブルルル……！」
line = "「ブルルル……！」"

[[dialogue]]
speaker = "ホルン"
# 「クルルーーッ！」
line = "「クルルーーッ！」"

[[dialogue]]
speaker = "マトイ"
# 「！？　敵がこんなに……！？」
line = "「！？　敵がこんなに……！？」"

[[dialogue]]
speaker = "アナ"
# 「これはさすがに……まずいかもしれませんね……」
line = "「これはさすがに……まずいかもしれませんね……」"

[[dialogue]]
speaker = "unk"
# モンスターとガーディアンが同時に襲い来るその刹那──
line = "モンスターとガーディアンが同時に襲い来るその刹那──"

[[dialogue]]
speaker = "？？？"
# 「破ッ！」
line = "「破ッ！」"

[[dialogue]]
speaker = "unk"
# 炎をまとった影がマトイたちと敵の間に飛び込み、その拳でモンスターの<ruby=あぎと>顎</ruby>を打ち抜いた。
line = "炎をまとった影がマトイたちと敵の間に飛び込み、その拳でモンスターの<ruby>顎<rt>あぎと</rt></ruby>を打ち抜いた。"

[[dialogue]]
speaker = "unk"
# モンスターの巨体が地面に叩きつけられ、衝撃で地鳴りが響く。
line = "モンスターの巨体が地面に叩きつけられ、衝撃で地鳴りが響く。"

[[dialogue]]
speaker = "マトイ"
# 「だ、誰……！？」
line = "「だ、誰……！？」"

[[dialogue]]
speaker = "アナ"
# 「新星学園や流星学園の星騎士ではなさそうですが……」
line = "「新星学園や流星学園の星騎士ではなさそうですが……」"

[[dialogue]]
speaker = "？？？"
# 「フン」
line = "「フン」"

[[dialogue]]
speaker = "unk"
# いきなり現れた魔族の戦士は、マトイとアナを一瞥すると、空を舞うガーディアンに飛び掛かり、強烈な蹴りで剣を砕く。
line = "いきなり現れた魔族の戦士は、マトイとアナを一瞥すると、空を舞うガーディアンに飛び掛かり、強烈な蹴りで剣を砕く。"

[[dialogue]]
speaker = "？？？"
# 「はぁっ！」
line = "「はぁっ！」"

[[dialogue]]
speaker = "デネブ・カイトス"
# 「オオオーーーッ」
line = "「オオオーーーッ」"

[[dialogue]]
speaker = "マトイ"
# 「こっちにもモンスター！？　でも最近出る機械のやつじゃないような……」
line = "「こっちにもモンスター！？　でも最近出る機械のやつじゃないような……」"

[[dialogue]]
speaker = "マトイ"
# 「しかもモンスターとモンスターが戦ってる……？　どういうこと……？」
line = "「しかもモンスターとモンスターが戦ってる……？　どういうこと……？」"

[[dialogue]]
speaker = "アナ"
# 「モンスターを従えているとなると、まさか……」
line = "「モンスターを従えているとなると、まさか……」"

[[dialogue]]
speaker = "マトイ"
# 「あ、聞いたことあるかも……もしかしてあの人が煌嶺！？」
line = "「あ、聞いたことあるかも……もしかしてあの人が煌嶺！？」"

[[dialogue]]
speaker = "？？？"
# 「何……？」
line = "「何……？」"

[[dialogue]]
speaker = "マトイ"
# 「怒ってる！？　なんで！？」
line = "「怒ってる！？　なんで！？」"

[[dialogue]]
speaker = "？？？"
# 「勘違いするな。モンスターは陛下から<ruby=かし>下賜</ruby>されたものにすぎん」
line = "「勘違いするな。モンスターは陛下から<ruby>下賜<rt>かし</rt></ruby>されたものにすぎん」"

[[dialogue]]
speaker = "リーエン"
# 「あたしはリーエン。煌嶺陛下の懐刀だ」
line = "「あたしはリーエン。煌嶺陛下の懐刀だ」"

[[dialogue]]
speaker = "ドラケルス"
# 「グァア……」
line = "「グァア……」"

[[dialogue]]
speaker = "スレイプニル"
# 「ブルルル……」
line = "「ブルルル……」"

[[dialogue]]
speaker = "リーエン"
# 「叩き伏せたつもりだが、頑丈さだけはあるようだな。ならば陛下から賜った力を見せてやる」
line = "「叩き伏せたつもりだが、頑丈さだけはあるようだな。ならば陛下から賜った力を見せてやる」"

[[dialogue]]
speaker = "リーエン"
# 「煌け新星──ノヴァフォーム！」
line = "「煌け新星──ノヴァフォーム！」"

[[dialogue]]
speaker = "マトイ"
# 「！？」
line = "「！？」"

[[dialogue]]
speaker = "リーエン"
# 「破ァッ！」
line = "「破ァッ！」"

[[dialogue]]
speaker = "unk"
# 手にした<ruby=げき>戟</ruby>を薙ぎ払うと、炎の奔流がモンスターとガーデイアンをまとめて切り裂き、残骸すら業火が焼き尽くした。
line = "手にした<ruby>戟<rt>げき</rt></ruby>を薙ぎ払うと、炎の奔流がモンスターとガーデイアンをまとめて切り裂き、残骸すら業火が焼き尽くした。"

[[dialogue]]
speaker = "マトイ"
# 「どうして私たち以外にノヴァフォームが……？」
line = "「どうして私たち以外にノヴァフォームが……？」"

[[dialogue]]
speaker = "リーエン"
# 「おまえたちだけの専売特許だと思ったか？」
line = "「おまえたちだけの専売特許だと思ったか？」"

[[dialogue]]
speaker = "リーエン"
# 「アルケインコードは元々キュリオスで伝承されていたもの。そして煌嶺陛下は魔王の血を継ぐ者。こちらにも使える者がいて当然だろう」
line = "「アルケインコードは元々キュリオスで伝承されていたもの。そして煌嶺陛下は魔王の血を継ぐ者。こちらにも使える者がいて当然だろう」"

[[dialogue]]
speaker = "マキナ・スクアルス"
# 「シャーッ！」
line = "「シャーッ！」"

[[dialogue]]
speaker = "スレイプニル"
# 「ブルル！」
line = "「ブルル！」"

[[dialogue]]
speaker = "リーエン"
# 「次から次へと……邪魔だ！」
line = "「次から次へと……邪魔だ！」"

[[dialogue]]
speaker = "unk"
# 戟の一撃でモンスターをかち割り、ガーディアンを真っ二つにし、次々と蹴散らしていく。
line = "戟の一撃でモンスターをかち割り、ガーディアンを真っ二つにし、次々と蹴散らしていく。"

[[dialogue]]
speaker = "マトイ"
# 「あの人、強い……！」
line = "「あの人、強い……！」"

[[dialogue]]
speaker = "アナ"
# 「しかも私たちより洗練されていますね……星力の循環に無駄がありません」
line = "「しかも私たちより洗練されていますね……星力の循環に無駄がありません」"

[[dialogue]]
speaker = "リーエン"
# 「おまえたちのような付け焼刃ではないのだ。おまえたちこそ、ノヴァフォームを使いこなせていないことを恥じるべきではないか？」
line = "「おまえたちのような付け焼刃ではないのだ。おまえたちこそ、ノヴァフォームを使いこなせていないことを恥じるべきではないか？」"

[[dialogue]]
speaker = "マトイ"
# 「……！　ノヴァフォームを、使いこなせてない……」
line = "「……！　ノヴァフォームを、使いこなせてない……」"

[[dialogue]]
speaker = "アナ"
# 「マトイ先輩……」
line = "「マトイ先輩……」"

[[dialogue]]
speaker = "マトイ"
# 「あはは……ちょっとショックだったけど、大丈夫」
line = "「あはは……ちょっとショックだったけど、大丈夫」"

[[dialogue]]
speaker = "マトイ"
# 「だって、私たちはもっと強くなれるってことだから……！」
line = "「だって、私たちはもっと強くなれるってことだから……！」"

[[dialogue]]
speaker = "アナ"
# 「……ええ、そうですね」
line = "「……ええ、そうですね」"

[[dialogue]]
speaker = "リーエン"
# 「フン、根性はそれなりにあるようだな。足を引っ張るなよ」
line = "「フン、根性はそれなりにあるようだな。足を引っ張るなよ」"

[[dialogue]]
speaker = "エレマル"
# 「ビビビビ！」
line = "「ビビビビ！」"

[[dialogue]]
speaker = "アナ"
# 「モンスターの大群が接近。こちらを包囲しようとしています」
line = "「モンスターの大群が接近。こちらを包囲しようとしています」"

[[dialogue]]
speaker = "？？？"
# 「させませんよ」
line = "「させませんよ」"

[[dialogue]]
speaker = "unk"
# 銃撃の雨がモンスターに降り注ぎ、軍隊のような容赦ない攻撃が敵を瓦礫に変えていく。
line = "銃撃の雨がモンスターに降り注ぎ、軍隊のような容赦ない攻撃が敵を瓦礫に変えていく。"

[[dialogue]]
speaker = "エレマル"
# 「ビビビ……」
line = "「ビビビ……」"

[[dialogue]]
speaker = "シノ"
# 「ふぅ……この辺りは落ち着きましたかね」
line = "「ふぅ……この辺りは落ち着きましたかね」"

[[dialogue]]
speaker = "マトイ"
# 「あなたは……新しい学園長先生！？　変身できたんですか！？」
line = "「あなたは……新しい学園長先生！？　変身できたんですか！？」"

[[dialogue]]
speaker = "シノ"
# 「はい。ヘレナさんの勧めで適性検査を受けてみたら……この通り、私にも星力があったようで」
line = "「はい。ヘレナさんの勧めで適性検査を受けてみたら……この通り、私にも星力があったようで」"

[[dialogue]]
speaker = "シノ"
# 「護身も兼ねて訓練したので、戦闘もこなせるようになりました。<ruby=前任の方>セイファート元学園長</ruby>ほどでありませんが、私も戦いますよ」
line = "「護身も兼ねて訓練したので、戦闘もこなせるようになりました。<ruby>セイファート元学園長<rt>前任の方</rt></ruby>ほどでありませんが、私も戦いますよ」"

[[dialogue]]
speaker = "マトイ"
# 「天才っているものなんですね……」
line = "「天才っているものなんですね……」"

[[dialogue]]
speaker = "リーエン"
# 「シノといったな。今はおまえの命令に従えと煌嶺陛下に仰せつかっている。陛下の懐刀、上手く使ってみせろ」
line = "「シノといったな。今はおまえの命令に従えと煌嶺陛下に仰せつかっている。陛下の懐刀、上手く使ってみせろ」"

[[dialogue]]
speaker = "シノ"
# 「思いのほか高く買ってくれてるんですね、あの人。戦闘指揮は勉強中ですが、頑張って期待に応えるとしましょう！」
line = "「思いのほか高く買ってくれてるんですね、あの人。戦闘指揮は勉強中ですが、頑張って期待に応えるとしましょう！」"
