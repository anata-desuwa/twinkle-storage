[[dialogue]]
speaker = "ネーゼマイン"
# 「これでトドメ──！」
line = "「これでトドメ──！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ユニゾンアタック、いきますわよっ！」
line = "「ユニゾンアタック、いきますわよっ！」"

[[dialogue]]
speaker = "セナリィ"
# 「──ベットショット・ハイローラー！！」
line = "「──ベットショット・ハイローラー！！」"

[[dialogue]]
speaker = "ダッチ"
# 「う、うぐぅぅうぅっ──！？」
line = "「う、うぐぅぅうぅっ──！？」"

[[dialogue]]
speaker = "ダッチ"
# 「み、見事です……私の子ウサギたち……！」
line = "「み、見事です……私の子ウサギたち……！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「もう貴方の虜囚ではありませんのよ！」
line = "「もう貴方の虜囚ではありませんのよ！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「流石にここまで痛めつければ限界みたいだね？」
line = "「流石にここまで痛めつければ限界みたいだね？」"

[[dialogue]]
speaker = "ダッチ"
# 「うぅ……改造アステラを維持するだけの力がもう……本日限りでラビットガーデンは閉店ですね……」
line = "「うぅ……改造アステラを維持するだけの力がもう……本日限りでラビットガーデンは閉店ですね……」"

[[dialogue]]
speaker = "セナリィ"
# 「アステラカジノがどんどん壊れていってますわ……！」
line = "「アステラカジノがどんどん壊れていってますわ……！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「これにて解決ですわね！　早く一般の方々を連れて脱出しましょう！」
line = "「これにて解決ですわね！　早く一般の方々を連れて脱出しましょう！」"

[[dialogue]]
speaker = "ダッチ"
# 「それには及びません……ここが壊れれば、中にいる人々は皆、自動的に九浄家のカジノへ戻るでしょう……ご安心くださいませ……」
line = "「それには及びません……ここが壊れれば、中にいる人々は皆、自動的に九浄家のカジノへ戻るでしょう……ご安心くださいませ……」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「じゃあ私たちはダッチを仕留めることだけ考えればいいってわけだね？」
line = "「じゃあ私たちはダッチを仕留めることだけ考えればいいってわけだね？」"

[[dialogue]]
speaker = "ダッチ"
# 「フフ……それだけはお断りです！　どこかで傷を癒し、いずれまた理想のバニーであふれた世界を、私は作らねばならないのですから！」
line = "「フフ……それだけはお断りです！　どこかで傷を癒し、いずれまた理想のバニーであふれた世界を、私は作らねばならないのですから！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「うぅっ！？　急に眩しくっ──前が見えませんわ……！」
line = "「うぅっ！？　急に眩しくっ──前が見えませんわ……！」"

[[dialogue]]
speaker = "セナリィ"
# 「逃げるんじゃねぇですわ！　戻ってきなさい！」
line = "「逃げるんじゃねぇですわ！　戻ってきなさい！」"

[[dialogue]]
speaker = "ダッチ"
# 「フフ。可愛いセナリィウサギ様の頼みでも、こればかりは聞けませんよ」
line = "「フフ。可愛いセナリィウサギ様の頼みでも、こればかりは聞けませんよ」"

[[dialogue]]
speaker = "ダッチ"
# 「今回は私の完敗ですが……いずれまたお会いすることもあるでしょう。この『欲望』が尽きぬ限り、私は不滅なのです！」
line = "「今回は私の完敗ですが……いずれまたお会いすることもあるでしょう。この『欲望』が尽きぬ限り、私は不滅なのです！」"

[[dialogue]]
speaker = "ダッチ"
# 「さて──お別れの前に１つだけよろしいですか？　緋宮会長、語尾に『ぴょん』を付けて私の名前を呼んでいただけませんか？」
line = "「さて──お別れの前に１つだけよろしいですか？　緋宮会長、語尾に『ぴょん』を付けて私の名前を呼んでいただけませんか？」"

[[dialogue]]
speaker = "unk"
# 呼ぶわけないだろ！　この野郎！！
line = "呼ぶわけないだろ！　この野郎！！"

[[dialogue]]
speaker = "ダッチ"
# 「フハハハハ！　では、そちらも次の楽しみに取っておきましょう！」
line = "「フハハハハ！　では、そちらも次の楽しみに取っておきましょう！」"

[[dialogue]]
speaker = "ダッチ"
# 「さらばです、皆様！　また会う日まで──！！」
line = "「さらばです、皆様！　また会う日まで──！！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「本当に二度と会いたくないですわ……！？」
line = "「本当に二度と会いたくないですわ……！？」"

[[dialogue]]
speaker = "ダッチ"
# 「ああ、そうです。勝者には敬意を表して……その服はプレゼントいたしますよ」
line = "「ああ、そうです。勝者には敬意を表して……その服はプレゼントいたしますよ」"

[[dialogue]]
speaker = "ダッチ"
# 「どうか日々の戦闘で着てあげてくださいませ。退屈な世界を彩るバニーガールは、いくらあってもよいものですから！　では、お達者で！」
line = "「どうか日々の戦闘で着てあげてくださいませ。退屈な世界を彩るバニーガールは、いくらあってもよいものですから！　では、お達者で！」"

[[dialogue]]
speaker = "unk"
# 最後まで自分勝手な欲望を押し付けて、ダッチはどこかへ消えて行った。
line = "最後まで自分勝手な欲望を押し付けて、ダッチはどこかへ消えて行った。"

[[dialogue]]
speaker = "unk"
# そしてラビットガーデンは主人を失ったことで崩壊。俺たちは、懐かしい元の世界へと帰還を果たした──
line = "そしてラビットガーデンは主人を失ったことで崩壊。俺たちは、懐かしい元の世界へと帰還を果たした──"
