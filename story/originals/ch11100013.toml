[[dialogue]]
speaker = "unk"
# 第３話,クレーンゲーム一本釣り！,P
line = "第３話,クレーンゲーム一本釣り！,P"

[[dialogue]]
speaker = "unk"
# 今日はプトラ、フィオナと一緒に渋谷へ買い物にやってきた。
line = "今日はプトラ、フィオナと一緒に渋谷へ買い物にやってきた。"

[[dialogue]]
speaker = "プトラ"
# 「みんなへのお土産、何買おっかな～♪」
line = "「みんなへのお土産、何買おっかな～♪」"

[[dialogue]]
speaker = "フィオナ"
# 「特鉄隊のみなさんは、どんなものがお好きなんですか？」
line = "「特鉄隊のみなさんは、どんなものがお好きなんですか？」"

[[dialogue]]
speaker = "プトラ"
# 「ヴィヴィアンはやっぱりおしゃれ！　香水とか化粧品がよさそうだね」
line = "「ヴィヴィアンはやっぱりおしゃれ！　香水とか化粧品がよさそうだね」"

[[dialogue]]
speaker = "プトラ"
# 「ヨシノには工具とか……あ、お裁縫の道具もいいかも！」
line = "「ヨシノには工具とか……あ、お裁縫の道具もいいかも！」"

[[dialogue]]
speaker = "プトラ"
# 「ヤクーツクは……鞭……はやめとこ。けっこう読書してるから、本にしようっと」
line = "「ヤクーツクは……鞭……はやめとこ。けっこう読書してるから、本にしようっと」"

[[dialogue]]
speaker = "プトラ"
# 「クインズウェイには何がいいかな。勉強してる時につまめるお菓子とか喜ぶかも！」
line = "「クインズウェイには何がいいかな。勉強してる時につまめるお菓子とか喜ぶかも！」"

[[dialogue]]
speaker = "フィオナ"
# 「ふふふ。仲間のことが大好きなんですね」
line = "「ふふふ。仲間のことが大好きなんですね」"

[[dialogue]]
speaker = "プトラ"
# 「うん、大好き！　ん？　あれは……」
line = "「うん、大好き！　ん？　あれは……」"

[[dialogue]]
speaker = "プトラ"
# 「ねえねえ、中に人形がいっぱい詰まったおっきなケースが並んでるけど、あれは何なの？」
line = "「ねえねえ、中に人形がいっぱい詰まったおっきなケースが並んでるけど、あれは何なの？」"

[[dialogue]]
speaker = "フィオナ"
# 「ああ、あれはクレーンゲームですよ」
line = "「ああ、あれはクレーンゲームですよ」"

[[dialogue]]
speaker = "プトラ"
# 「クレーンゲーム？」
line = "「クレーンゲーム？」"

[[dialogue]]
speaker = "フィオナ"
# 「ケースの上のところに何かぶら下がってるでしょ？」
line = "「ケースの上のところに何かぶら下がってるでしょ？」"

[[dialogue]]
speaker = "プトラ"
# 「うん」
line = "「うん」"

[[dialogue]]
speaker = "フィオナ"
# 「あれを操作して下に積まれている人形を持ち上げるんです」
line = "「あれを操作して下に積まれている人形を持ち上げるんです」"

[[dialogue]]
speaker = "プトラ"
# 「へ～、面白そー！」
line = "「へ～、面白そー！」"

[[dialogue]]
speaker = "unk"
# 折角だから遊んでみる？
line = "折角だから遊んでみる？"

[[dialogue]]
speaker = "プトラ"
# 「いいの？　やりたいやりたい！」
line = "「いいの？　やりたいやりたい！」"

[[dialogue]]
speaker = "unk"
# プトラが選んだのは、ゲームセンター前のクレーンゲーム。ケースの中には──
line = "プトラが選んだのは、ゲームセンター前のクレーンゲーム。ケースの中には──"

[[dialogue]]
speaker = "プトラ"
# 「見て見て！　お魚さんのぬいぐるみがあるよ！　よーし、あの子を狙っちゃおうかなー♪」
line = "「見て見て！　お魚さんのぬいぐるみがあるよ！　よーし、あの子を狙っちゃおうかなー♪」"

[[dialogue]]
speaker = "プトラ"
# 「ふむふむ、このボタンを押してクレーンを操作するんだね」
line = "「ふむふむ、このボタンを押してクレーンを操作するんだね」"

[[dialogue]]
speaker = "プトラ"
# 「まず右ボタンでこの辺まで移動するでしょ？　それからこの辺まで奥に移動させるでしょ？」
line = "「まず右ボタンでこの辺まで移動するでしょ？　それからこの辺まで奥に移動させるでしょ？」"

[[dialogue]]
speaker = "プトラ"
# 「戻ってきたら穴に落っこちてー……ゲット！　うん、だいたい分かった！」
line = "「戻ってきたら穴に落っこちてー……ゲット！　うん、だいたい分かった！」"

[[dialogue]]
speaker = "unk"
# （しっかり位置を確認してる）
line = "（しっかり位置を確認してる）"

[[dialogue]]
speaker = "unk"
# （考え無しに操作するんじゃなくて）
line = "（考え無しに操作するんじゃなくて）"

[[dialogue]]
speaker = "プトラ"
# 「よし、行けそうだよ！　レッツゴー！　一本釣りだー！」
line = "「よし、行けそうだよ！　レッツゴー！　一本釣りだー！」"

[[dialogue]]
speaker = "プトラ"
# 「オーライ、オーライ……ストップ！　次は奥だよ、オーライ、オーライ……ここっ！」
line = "「オーライ、オーライ……ストップ！　次は奥だよ、オーライ、オーライ……ここっ！」"

[[dialogue]]
speaker = "フィオナ"
# 「すごいです、狙い通りの位置にクレーンを下ろしました！」
line = "「すごいです、狙い通りの位置にクレーンを下ろしました！」"

[[dialogue]]
speaker = "unk"
# 操作は完璧だ。けど……
line = "操作は完璧だ。けど……"

[[dialogue]]
speaker = "プトラ"
# 「あれっ、掴めなかったよ？　うーん、狙う位置が悪かったのかな……」
line = "「あれっ、掴めなかったよ？　うーん、狙う位置が悪かったのかな……」"

[[dialogue]]
speaker = "フィオナ"
# 「大丈夫ですよ。まだクレジットは残ってますから」
line = "「大丈夫ですよ。まだクレジットは残ってますから」"

[[dialogue]]
speaker = "プトラ"
# 「そうだね！　うーん……あ、ここ、クレーンが引っ掛かりそう！　次はここを狙ってみよう！」
line = "「そうだね！　うーん……あ、ここ、クレーンが引っ掛かりそう！　次はここを狙ってみよう！」"

[[dialogue]]
speaker = "プトラ"
# 「今度こそ逃がさないよ～……ってあーっ！　ちょっとだけ持ち上がったのに落ちちゃったぁ……」
line = "「今度こそ逃がさないよ～……ってあーっ！　ちょっとだけ持ち上がったのに落ちちゃったぁ……」"

[[dialogue]]
speaker = "unk"
# 目のつけどころはいいんだけど
line = "目のつけどころはいいんだけど"

[[dialogue]]
speaker = "unk"
# うーん、惜しい……
line = "うーん、惜しい……"

[[dialogue]]
speaker = "プトラ"
# 「えっ、どういうこと？」
line = "「えっ、どういうこと？」"

[[dialogue]]
speaker = "フィオナ"
# 「クレーンゲームのアームは力があまり強くないんです」
line = "「クレーンゲームのアームは力があまり強くないんです」"

[[dialogue]]
speaker = "フィオナ"
# 「だから、普通に持ち上げて取ろうとしても、なかなか上手くいかないんですよ」
line = "「だから、普通に持ち上げて取ろうとしても、なかなか上手くいかないんですよ」"

[[dialogue]]
speaker = "プトラ"
# 「そうなんだ……じゃあ、どうすればいいんだろ」
line = "「そうなんだ……じゃあ、どうすればいいんだろ」"

[[dialogue]]
speaker = "unk"
# １回で取ろうと思わくていい
line = "１回で取ろうと思わくていい"

[[dialogue]]
speaker = "プトラ"
# 「あ……！　そういうことなんだ！　ありがとう、分かっちゃったかも！　ちょっとやってみるね！」
line = "「あ……！　そういうことなんだ！　ありがとう、分かっちゃったかも！　ちょっとやってみるね！」"

[[dialogue]]
speaker = "プトラ"
# 「わっ！　取れた！　やったー、取れたよー♪」
line = "「わっ！　取れた！　やったー、取れたよー♪」"

[[dialogue]]
speaker = "unk"
# お見事！
line = "お見事！"

[[dialogue]]
speaker = "フィオナ"
# 「残りクレジットをしっかり使い切っての成功ですね」
line = "「残りクレジットをしっかり使い切っての成功ですね」"

[[dialogue]]
speaker = "プトラ"
# 「一回で釣ろうとせずに、何回かで釣ることを考えればよかったんだね！　クレーンゲーム、面白いよ！」
line = "「一回で釣ろうとせずに、何回かで釣ることを考えればよかったんだね！　クレーンゲーム、面白いよ！」"

[[dialogue]]
speaker = "フィオナ"
# 「ふふ……プトラさんはクレーンゲームの才能があると思います」
line = "「ふふ……プトラさんはクレーンゲームの才能があると思います」"

[[dialogue]]
speaker = "プトラ"
# 「えへへ、そうかな～。もしかしたらあたしに流れる漁師の血が目覚めたのかもだよ」
line = "「えへへ、そうかな～。もしかしたらあたしに流れる漁師の血が目覚めたのかもだよ」"

[[dialogue]]
speaker = "unk"
# 慣れてきたらもっと大きいのも取れるよ
line = "慣れてきたらもっと大きいのも取れるよ"

[[dialogue]]
speaker = "プトラ"
# 「ホント？　よーし、頑張るぞ～！」
line = "「ホント？　よーし、頑張るぞ～！」"

[[dialogue]]
speaker = "unk"
# プトラは手に入れたサバのぬいぐるみを抱きしめながら、『次は大物を獲るぞ！』と笑顔で意気込むのだった。
line = "プトラは手に入れたサバのぬいぐるみを抱きしめながら、『次は大物を獲るぞ！』と笑顔で意気込むのだった。"
