[[dialogue]]
speaker = "unk"
# 第９話,梨緒・Ａ・クリステレス,B
line = "第９話,梨緒・Ａ・クリステレス,B"

[[dialogue]]
speaker = "梨緒"
# （ああ……暗い……何も見えない……）
line = "（ああ……暗い……何も見えない……）"

[[dialogue]]
speaker = "梨緒"
# （深く……沈んでいく……寒くて冷たい、闇の中に……）
line = "（深く……沈んでいく……寒くて冷たい、闇の中に……）"

[[dialogue]]
speaker = "ジグ"
# 「私の勝ちだよ、アガサ。これで次の星徒会長は私だね」
line = "「私の勝ちだよ、アガサ。これで次の星徒会長は私だね」"

[[dialogue]]
speaker = "梨緒"
# 「くっ……私の……負けだ」
line = "「くっ……私の……負けだ」"

[[dialogue]]
speaker = "ジグ"
# 「新星学園へ通信連絡。こちらレナーテ・Ｚ・サイフリート」
line = "「新星学園へ通信連絡。こちらレナーテ・Ｚ・サイフリート」"

[[dialogue]]
speaker = "ジグ"
# 「うん、モンスターの討伐は完了したよ。星徒会に被害はない。だけど──」
line = "「うん、モンスターの討伐は完了したよ。星徒会に被害はない。だけど──」"

[[dialogue]]
speaker = "梨緒"
# 「うぅっ……間に合わなかった……」
line = "「うぅっ……間に合わなかった……」"

[[dialogue]]
speaker = "ジグ"
# 「一般人と、初期対応にあたった星騎士に犠牲者が出た。保健委員も懸命に救護しようとしてくれたが……手の施しようがなかった」
line = "「一般人と、初期対応にあたった星騎士に犠牲者が出た。保健委員も懸命に救護しようとしてくれたが……手の施しようがなかった」"

[[dialogue]]
speaker = "梨緒"
# 「また、救えなかった……！　私は、弱い……っ」
line = "「また、救えなかった……！　私は、弱い……っ」"

[[dialogue]]
speaker = "梨緒"
# 「……流星市国以外にもモンスターが現れるのが当たり前になり、各地で大きな被害が出ている。関東だけでもいくつもの都市が壊滅した」
line = "「……流星市国以外にもモンスターが現れるのが当たり前になり、各地で大きな被害が出ている。関東だけでもいくつもの都市が壊滅した」"

[[dialogue]]
speaker = "梨緒"
# 「人類の生存圏は刻一刻と狭まり、今もどこかで犠牲が出ている……」
line = "「人類の生存圏は刻一刻と狭まり、今もどこかで犠牲が出ている……」"

[[dialogue]]
speaker = "ジグ"
# 「ロンドンが壊滅した。巨大なアステラに呑み込まれたそうだ」
line = "「ロンドンが壊滅した。巨大なアステラに呑み込まれたそうだ」"

[[dialogue]]
speaker = "梨緒"
# 「ロンドンには、家族がいるんだ……祖父と祖母が住んでいて……幼い頃一緒に遊んだ友達も……」
line = "「ロンドンには、家族がいるんだ……祖父と祖母が住んでいて……幼い頃一緒に遊んだ友達も……」"

[[dialogue]]
speaker = "梨緒"
# 「ぐすっ……ひぐっ、うぅっ……何も、できなかった……」
line = "「ぐすっ……ひぐっ、うぅっ……何も、できなかった……」"

[[dialogue]]
speaker = "梨緒"
# 「私たちが……私が弱いせいで……うぅ、ぅっ……ううぅっ……！」
line = "「私たちが……私が弱いせいで……うぅ、ぅっ……ううぅっ……！」"

[[dialogue]]
speaker = "ジグ"
# 「アガサ、ディザスターハンドとの決戦前にすまない。残念な知らせだ」
line = "「アガサ、ディザスターハンドとの決戦前にすまない。残念な知らせだ」"

[[dialogue]]
speaker = "ジグ"
# 「エリシアが死んだ」
line = "「エリシアが死んだ」"

[[dialogue]]
speaker = "梨緒"
# 「ああ……ああぁああああっ……！！」
line = "「ああ……ああぁああああっ……！！」"

[[dialogue]]
speaker = "梨緒"
# 「そんな……そんなことって……うぅ、ううぅっ……うっ……」
line = "「そんな……そんなことって……うぅ、ううぅっ……うっ……」"

[[dialogue]]
speaker = "梨緒"
# 「フィオ……ナ……あぁ……うぅ……」
line = "「フィオ……ナ……あぁ……うぅ……」"

[[dialogue]]
speaker = "ジグ"
# 「やぁ生きてるかい、アガサ」
line = "「やぁ生きてるかい、アガサ」"

[[dialogue]]
speaker = "梨緒"
# 「ジグ！？　まだ生きて……！？」
line = "「ジグ！？　まだ生きて……！？」"

[[dialogue]]
speaker = "ジグ"
# 「すまない、少し気を失っていたようだ。だけど私はまだ戦えるよ」
line = "「すまない、少し気を失っていたようだ。だけど私はまだ戦えるよ」"

[[dialogue]]
speaker = "梨緒"
# 「私も……まだ、諦めていない……！　この世界を、守るんだ……！」
line = "「私も……まだ、諦めていない……！　この世界を、守るんだ……！」"

[[dialogue]]
speaker = "ジグ"
# 「ああ、それでこそアガサだ。倒れていったみんなの分まで頑張ろう」
line = "「ああ、それでこそアガサだ。倒れていったみんなの分まで頑張ろう」"

[[dialogue]]
speaker = "ジグ"
# 「──！」
line = "「──！」"

[[dialogue]]
speaker = "梨緒"
# （ベガの最期の瞬間、『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』が現れた）
line = "（ベガの最期の瞬間、『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』が現れた）"

[[dialogue]]
speaker = "梨緒"
# （私はただ、ジグがリクリエの使徒に作り変えられるのを見ているだけだった）
line = "（私はただ、ジグがリクリエの使徒に作り変えられるのを見ているだけだった）"

[[dialogue]]
speaker = "梨緒"
# （負けてばかりの人生だった）
line = "（負けてばかりの人生だった）"

[[dialogue]]
speaker = "梨緒"
# （失くしてばかりの人生だった）
line = "（失くしてばかりの人生だった）"

[[dialogue]]
speaker = "梨緒"
# （それに恥の多い人生だった）
line = "（それに恥の多い人生だった）"

[[dialogue]]
speaker = "梨緒"
# （自分の弱さを突き付けられたくないばかりに勝ちにこだわって、世界を救うためなんて言って自分を騙していた）
line = "（自分の弱さを突き付けられたくないばかりに勝ちにこだわって、世界を救うためなんて言って自分を騙していた）"

[[dialogue]]
speaker = "梨緒"
# （性懲りもなく何度もジグに挑んで、その度に負けて）
line = "（性懲りもなく何度もジグに挑んで、その度に負けて）"

[[dialogue]]
speaker = "梨緒"
# （何も守れず、全てを失って）
line = "（何も守れず、全てを失って）"

[[dialogue]]
speaker = "梨緒"
# （挙句の果てに『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』の存在に心折れ、共に戦っていたジグまで見捨てて、それすら忘れてしまった）
line = "（挙句の果てに『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』の存在に心折れ、共に戦っていたジグまで見捨てて、それすら忘れてしまった）"

[[dialogue]]
speaker = "梨緒"
# （私は弱くて、泣き虫で、無価値で……）
line = "（私は弱くて、泣き虫で、無価値で……）"

[[dialogue]]
speaker = "梨緒"
# （全てをなかったことにして、やり直すことができたら、どんなにいいか──）
line = "（全てをなかったことにして、やり直すことができたら、どんなにいいか──）"

[[dialogue]]
speaker = "梨緒"
# 「いいわけないだろう」
line = "「いいわけないだろう」"

[[dialogue]]
speaker = "梨緒"
# 「リクリエを受け入れて、使徒になって、弱い自分を捨てれば、私は強くなれるのか？」
line = "「リクリエを受け入れて、使徒になって、弱い自分を捨てれば、私は強くなれるのか？」"

[[dialogue]]
speaker = "梨緒"
# 「私は自分の弱さにすら負けるのか？」
line = "「私は自分の弱さにすら負けるのか？」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「過ちも、失敗も、誰だって持ってる弱さだ。だからその弱さを許してやれ」
line = "「過ちも、失敗も、誰だって持ってる弱さだ。だからその弱さを許してやれ」"

[[dialogue]]
speaker = "梨緒"
# 「弱さを……許す……」
line = "「弱さを……許す……」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「弱いことは罪じゃない。恥ずかしいことでもない。誰だってそうなんだから」
line = "「弱いことは罪じゃない。恥ずかしいことでもない。誰だってそうなんだから」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「でもありがとな。それが弱さを許すってことだ。ちゃんとできてるじゃないか」
line = "「でもありがとな。それが弱さを許すってことだ。ちゃんとできてるじゃないか」"

[[dialogue]]
speaker = "梨緒"
# 「そ、そうなのか……？」
line = "「そ、そうなのか……？」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「そうだよ。ま、偉そうに言ってるあたしもまだまだヒーローになろうとしてる途中だけどな」
line = "「そうだよ。ま、偉そうに言ってるあたしもまだまだヒーローになろうとしてる途中だけどな」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「そしてヒーローは弱さを強さに変えるものだ」
line = "「そしてヒーローは弱さを強さに変えるものだ」"

[[dialogue]]
speaker = "梨緒"
# 「弱さを……強さに……」
line = "「弱さを……強さに……」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「ああ。強くなりたいなら、弱さと向き合わなくちゃいけない」
line = "「ああ。強くなりたいなら、弱さと向き合わなくちゃいけない」"

[[dialogue]]
speaker = "梨緒"
# 「それが『許す』ことなのか？」
line = "「それが『許す』ことなのか？」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「ああ、そういうことだ」
line = "「ああ、そういうことだ」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「誰かを『赦す』ってことは、もちろん口で言うほど簡単なことじゃない。だけどそこまでわかってるなら大丈夫だろ」
line = "「誰かを『赦す』ってことは、もちろん口で言うほど簡単なことじゃない。だけどそこまでわかってるなら大丈夫だろ」"

[[dialogue]]
speaker = "梨緒"
# 「私は負けるのが嫌だった」
line = "「私は負けるのが嫌だった」"

[[dialogue]]
speaker = "梨緒"
# 「何もできない自分が嫌いで、自分の弱さを突き付けられるから」
line = "「何もできない自分が嫌いで、自分の弱さを突き付けられるから」"

[[dialogue]]
speaker = "梨緒"
# 「だから世界を救うためなんて自分を騙して、星騎士になった」
line = "「だから世界を救うためなんて自分を騙して、星騎士になった」"

[[dialogue]]
speaker = "梨緒"
# 「今でも負けるのは嫌いだ。負け続けるのはもっと嫌いだ」
line = "「今でも負けるのは嫌いだ。負け続けるのはもっと嫌いだ」"

[[dialogue]]
speaker = "梨緒"
# 「それでも昔に比べて、負けを認められるようになった」
line = "「それでも昔に比べて、負けを認められるようになった」"

[[dialogue]]
speaker = "梨緒"
# 「ベアトやナターシャ、２人のアポロと出会って、自分が弱くていいと、少しずつ思えるようになった」
line = "「ベアトやナターシャ、２人のアポロと出会って、自分が弱くていいと、少しずつ思えるようになった」"

[[dialogue]]
speaker = "梨緒"
# 「何度も負けて、負け続けて、絶望して、世界を滅ぼされた。一度は何もかも失った」
line = "「何度も負けて、負け続けて、絶望して、世界を滅ぼされた。一度は何もかも失った」"

[[dialogue]]
speaker = "梨緒"
# 「そんな私でも、手に入れたものがあった。教えてくれた仲間がいた」
line = "「そんな私でも、手に入れたものがあった。教えてくれた仲間がいた」"

[[dialogue]]
speaker = "梨緒"
# 「弱さから目を背けた自分も、何も守れない無力な自分も、絶望して仲間を見捨てた自分も──」
line = "「弱さから目を背けた自分も、何も守れない無力な自分も、絶望して仲間を見捨てた自分も──」"

[[dialogue]]
speaker = "梨緒"
# 「負けず嫌いな自分も、ここまで戦ってきた自分も、仲間に支えられてきた自分も、全部が私なんだ」
line = "「負けず嫌いな自分も、ここまで戦ってきた自分も、仲間に支えられてきた自分も、全部が私なんだ」"

[[dialogue]]
speaker = "梨緒"
# 「だからなかったことにはさせない」
line = "「だからなかったことにはさせない」"

[[dialogue]]
speaker = "梨緒"
# 「負けたのならまた挑戦すればいい」
line = "「負けたのならまた挑戦すればいい」"

[[dialogue]]
speaker = "梨緒"
# 「絶望したのならまた立ち上がればいい」
line = "「絶望したのならまた立ち上がればいい」"

[[dialogue]]
speaker = "梨緒"
# 「新しい仲間を得て、あがいて、もがいて、前に進む」
line = "「新しい仲間を得て、あがいて、もがいて、前に進む」"

[[dialogue]]
speaker = "梨緒"
# 「それが梨緒・Ａ・クリステレスの戦いだ！！」
line = "「それが梨緒・Ａ・クリステレスの戦いだ！！」"

[[dialogue]]
speaker = "ジグ"
# 「──ッ！？　何故だ！？　何故、我が神の声を拒める……！？」
line = "「──ッ！？　何故だ！？　何故、我が神の声を拒める……！？」"

[[dialogue]]
speaker = "梨緒"
# 「言ったはずだ。私は君を救うと」
line = "「言ったはずだ。私は君を救うと」"

[[dialogue]]
speaker = "梨緒"
# 「さぁ、今日こそその仮面を剥がさせてもらうぞ、ジグ！！」
line = "「さぁ、今日こそその仮面を剥がさせてもらうぞ、ジグ！！」"
