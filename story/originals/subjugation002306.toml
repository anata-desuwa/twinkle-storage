[[dialogue]]
speaker = "unk"
# クーシェンが学園にやって来てから１週間ほど経った休日。
line = "クーシェンが学園にやって来てから１週間ほど経った休日。"

[[dialogue]]
speaker = "unk"
# 紅明の発案で、クーシェンと一緒に街へ遊びに行くことなった。
line = "紅明の発案で、クーシェンと一緒に街へ遊びに行くことなった。"

[[dialogue]]
speaker = "？？？"
# 「えへへっ、だ～れだ？」
line = "「えへへっ、だ～れだ？」"

[[dialogue]]
speaker = "unk"
# 後ろから目隠しをされて、俺がクーシェンの名前を呼ぶと――
line = "後ろから目隠しをされて、俺がクーシェンの名前を呼ぶと――"

[[dialogue]]
speaker = "クーシェン"
# 「ふふっ、せいか～い♪　ボクだよ～♪」
line = "「ふふっ、せいか～い♪　ボクだよ～♪」"

[[dialogue]]
speaker = "クーシェン"
# 「じゃ～ん☆　にーにー、ボクの制服姿、どうどう？　カッコ可愛いでしょ～？」
line = "「じゃ～ん☆　にーにー、ボクの制服姿、どうどう？　カッコ可愛いでしょ～？」"

[[dialogue]]
speaker = "クーシェン"
# 「附属校に通うことになったから、作ってもらったんだ～♪」
line = "「附属校に通うことになったから、作ってもらったんだ～♪」"

[[dialogue]]
speaker = "unk"
# よく似合ってる
line = "よく似合ってる"

[[dialogue]]
speaker = "クーシェン"
# 「えへへへ～っ♪　まぁ、ボクなら当然だけどね～♪　にーにー、もっと褒めてくれてもいいんだよ～？」
line = "「えへへへ～っ♪　まぁ、ボクなら当然だけどね～♪　にーにー、もっと褒めてくれてもいいんだよ～？」"

[[dialogue]]
speaker = "紅明"
# 「うしし☆　クーちん、ダーリンから褒めてもらえてよかったね～♪」
line = "「うしし☆　クーちん、ダーリンから褒めてもらえてよかったね～♪」"

[[dialogue]]
speaker = "クーシェン"
# 「あっ、紅明ねーねー！　おはよ～♪」
line = "「あっ、紅明ねーねー！　おはよ～♪」"

[[dialogue]]
speaker = "クーシェン"
# 「ねーねーも見て見て！　どう？　ボクの制服、似合ってるでしょ～？」
line = "「ねーねーも見て見て！　どう？　ボクの制服、似合ってるでしょ～？」"

[[dialogue]]
speaker = "紅明"
# 「お～！　めっちゃ似合ってるじゃん！　カッコ可愛いぞ～♪　よしよし☆」
line = "「お～！　めっちゃ似合ってるじゃん！　カッコ可愛いぞ～♪　よしよし☆」"

[[dialogue]]
speaker = "クーシェン"
# 「んっ♪　えへへへぇ♪　ねーねー、ちょっと～！　ボク、そんな頭ナデナデされる程小さい子供じゃないんだから、やめてよね～！」
line = "「んっ♪　えへへへぇ♪　ねーねー、ちょっと～！　ボク、そんな頭ナデナデされる程小さい子供じゃないんだから、やめてよね～！」"

[[dialogue]]
speaker = "unk"
# この前のアリーナで、御前試合の後に行われた紅明とクーシェンのエキシビションマッチは、紅明が勝利した。
line = "この前のアリーナで、御前試合の後に行われた紅明とクーシェンのエキシビションマッチは、紅明が勝利した。"

[[dialogue]]
speaker = "unk"
# クーシェンが消耗していたのも勿論あるが、芭蕉扇を使いこなした紅明の強さは圧倒的だった。
line = "クーシェンが消耗していたのも勿論あるが、芭蕉扇を使いこなした紅明の強さは圧倒的だった。"

[[dialogue]]
speaker = "unk"
# その後は、俺の時と似たようなやり取りがあって、紅明のことも『ねーねー』と呼ぶようになったというわけだった。
line = "その後は、俺の時と似たようなやり取りがあって、紅明のことも『ねーねー』と呼ぶようになったというわけだった。"

[[dialogue]]
speaker = "紅明"
# 「よ～し、それじゃあクーちんの制服お披露目も終わったことだし、早速アキバへとレッツゴ～☆」
line = "「よ～し、それじゃあクーちんの制服お披露目も終わったことだし、早速アキバへとレッツゴ～☆」"

[[dialogue]]
speaker = "クーシェン"
# 「お～っ♪」
line = "「お～っ♪」"

[[dialogue]]
speaker = "クーシェン"
# 「わぁ～♪　ここが秋葉原か～！　知らないものがいっぱいで、すっごくウキウキする～♪」
line = "「わぁ～♪　ここが秋葉原か～！　知らないものがいっぱいで、すっごくウキウキする～♪」"

[[dialogue]]
speaker = "クーシェン"
# 「それでそれで？　ねーねーはどこ案内してくれるの？」
line = "「それでそれで？　ねーねーはどこ案内してくれるの？」"

[[dialogue]]
speaker = "紅明"
# 「秋葉原といえば、日本のサブカルチャーの聖地！　というわけで、アニメショップに行くっきゃないっしょ☆」
line = "「秋葉原といえば、日本のサブカルチャーの聖地！　というわけで、アニメショップに行くっきゃないっしょ☆」"

[[dialogue]]
speaker = "クーシェン"
# 「さぶかる……？　あにめ……？」
line = "「さぶかる……？　あにめ……？」"

[[dialogue]]
speaker = "unk"
# そっか、クーシェンは知りようもないか
line = "そっか、クーシェンは知りようもないか"

[[dialogue]]
speaker = "unk"
# 俺は漫画やアニメのことを説明する。
line = "俺は漫画やアニメのことを説明する。"

[[dialogue]]
speaker = "クーシェン"
# 「まんが……？　ボク、本で字を読むのはあんまり好きじゃないんだけど……」
line = "「まんが……？　ボク、本で字を読むのはあんまり好きじゃないんだけど……」"

[[dialogue]]
speaker = "紅明"
# 「百聞は一見に如かず。そこは実際に見れば、すぐにわかるっしょ♪」
line = "「百聞は一見に如かず。そこは実際に見れば、すぐにわかるっしょ♪」"

[[dialogue]]
speaker = "unk"
# 俺たちはアニメショップへと向かう前に、ＤＩＳＣの電子書籍で漫画がどういうものか見せる。
line = "俺たちはアニメショップへと向かう前に、ＤＩＳＣの電子書籍で漫画がどういうものか見せる。"

[[dialogue]]
speaker = "クーシェン"
# 「す、すごいっ！！　これが漫画……！　文字も書いてあるけど、絵がいっぱいでわかりやすい！　これならボクでも読めそう♪」
line = "「す、すごいっ！！　これが漫画……！　文字も書いてあるけど、絵がいっぱいでわかりやすい！　これならボクでも読めそう♪」"

[[dialogue]]
speaker = "紅明"
# 「ふふふっ、これとかクーちんの好きな、強い奴らがハチャメチャスパーキングにバトルする漫画なんだぜ～？」
line = "「ふふふっ、これとかクーちんの好きな、強い奴らがハチャメチャスパーキングにバトルする漫画なんだぜ～？」"

[[dialogue]]
speaker = "クーシェン"
# 「わっ！？　絵なのにすごい迫力……！　激しいバトルの動きが伝わって来るよ！」
line = "「わっ！？　絵なのにすごい迫力……！　激しいバトルの動きが伝わって来るよ！」"

[[dialogue]]
speaker = "unk"
# 今度は、クーシェンに見せたバトル漫画のアニメ版をＤＩＳＣの画面に流す。
line = "今度は、クーシェンに見せたバトル漫画のアニメ版をＤＩＳＣの画面に流す。"

[[dialogue]]
speaker = "クーシェン"
# 「えっ、すごっ！？　絵が動いてる！？　何かそういう星術があるってこと！？」
line = "「えっ、すごっ！？　絵が動いてる！？　何かそういう星術があるってこと！？」"

[[dialogue]]
speaker = "紅明"
# 「ちっちっちっ。甘いな、クーちん。これには種も仕掛けもない、全部ヒトが描いて作ってるんだぜ☆」
line = "「ちっちっちっ。甘いな、クーちん。これには種も仕掛けもない、全部ヒトが描いて作ってるんだぜ☆」"

[[dialogue]]
speaker = "unk"
# それから俺たちはアニメショップへと入り、クーシェンにオススメのバトル漫画を紹介しながら周っていたのだが――
line = "それから俺たちはアニメショップへと入り、クーシェンにオススメのバトル漫画を紹介しながら周っていたのだが――"

[[dialogue]]
speaker = "クーシェン"
# 「ん……？　ちょっと待って、にーにー！　ねーねー！」
line = "「ん……？　ちょっと待って、にーにー！　ねーねー！」"

[[dialogue]]
speaker = "クーシェン"
# 「この漫画、なんかすごく……エッチなやつじゃない！？」
line = "「この漫画、なんかすごく……エッチなやつじゃない！？」"

[[dialogue]]
speaker = "クーシェン"
# 「ほら、これとか――女の子のパンツがチラッと見えてるし！　服の露出度もすごいし！　これじゃまるで――星騎士の戦闘服だよ！？」
line = "「ほら、これとか――女の子のパンツがチラッと見えてるし！　服の露出度もすごいし！　これじゃまるで――星騎士の戦闘服だよ！？」"

[[dialogue]]
speaker = "unk"
# それは言っちゃダメなやつ！
line = "それは言っちゃダメなやつ！"

[[dialogue]]
speaker = "クーシェン"
# 「え？　そうなの？」
line = "「え？　そうなの？」"

[[dialogue]]
speaker = "クーシェン"
# 「でも、漫画とかアニメって、こういうエッチなやつもあるんだね～！」
line = "「でも、漫画とかアニメって、こういうエッチなやつもあるんだね～！」"

[[dialogue]]
speaker = "クーシェン"
# 「ウキキっ♪　実はにーにーもこういうの、結構好きなんじゃな～い？」
line = "「ウキキっ♪　実はにーにーもこういうの、結構好きなんじゃな～い？」"

[[dialogue]]
speaker = "クーシェン"
# 「――あっ、やっぱり読んだことあるんだ～？　ん？　この作品は物語もしっかりしてるって？」
line = "「――あっ、やっぱり読んだことあるんだ～？　ん？　この作品は物語もしっかりしてるって？」"

[[dialogue]]
speaker = "クーシェン"
# 「もう、にーにーのムッツリスケベ～♪　言い訳もカッコ悪いよ～？　そんなの、よわっちぃ奴の言う台詞みたいじゃ～ん」
line = "「もう、にーにーのムッツリスケベ～♪　言い訳もカッコ悪いよ～？　そんなの、よわっちぃ奴の言う台詞みたいじゃ～ん」"

[[dialogue]]
speaker = "クーシェン"
# 「ふふ～ん♪　その点、ボクはもうほとんど大人だからね～！　エッチなものに興味があるのは、隠したりしないんだよ？」
line = "「ふふ～ん♪　その点、ボクはもうほとんど大人だからね～！　エッチなものに興味があるのは、隠したりしないんだよ？」"

[[dialogue]]
speaker = "クーシェン"
# 「まあ？　さすがのボクも、まだ『大人ゲージ』は溜まり切ってないけど～」
line = "「まあ？　さすがのボクも、まだ『大人ゲージ』は溜まり切ってないけど～」"

[[dialogue]]
speaker = "unk"
# ん？
line = "ん？"

[[dialogue]]
speaker = "クーシェン"
# 「もうすぐ大人に進化して、ねーねーみたいなボンキュッボンになっちゃうから、にーにーは覚悟しておいてよね～！」
line = "「もうすぐ大人に進化して、ねーねーみたいなボンキュッボンになっちゃうから、にーにーは覚悟しておいてよね～！」"

[[dialogue]]
speaker = "unk"
# えっと、進化？　それにゲージ……とは？
line = "えっと、進化？　それにゲージ……とは？"

[[dialogue]]
speaker = "クーシェン"
# 「あっ、やっぱりにーにーも、まだ進化前なんだ～？」
line = "「あっ、やっぱりにーにーも、まだ進化前なんだ～？」"

[[dialogue]]
speaker = "クーシェン"
# 「ほら、ヒトって『大人ゲージ』が溜まることで、進化するでしょ？」
line = "「ほら、ヒトって『大人ゲージ』が溜まることで、進化するでしょ？」"

[[dialogue]]
speaker = "クーシェン"
# 「ねーねーはどう見ても、進化後だよね！　おっぱいが滅茶苦茶おっきいし！」
line = "「ねーねーはどう見ても、進化後だよね！　おっぱいが滅茶苦茶おっきいし！」"

[[dialogue]]
speaker = "紅明"
# 「ふっ……その通り！　アタシは大人だぜ！」
line = "「ふっ……その通り！　アタシは大人だぜ！」"

[[dialogue]]
speaker = "unk"
# ちょっ、紅明！？
line = "ちょっ、紅明！？"

[[dialogue]]
speaker = "クーシェン"
# 「いいな～！　でも、ボクだってすぐに、大人に進化してみせちゃうから！」
line = "「いいな～！　でも、ボクだってすぐに、大人に進化してみせちゃうから！」"

[[dialogue]]
speaker = "クーシェン"
# 「あっ、そうだ！　にーにー、２人で手っ取り早く大人ゲージを貯める為に――」
line = "「あっ、そうだ！　にーにー、２人で手っ取り早く大人ゲージを貯める為に――」"

[[dialogue]]
speaker = "クーシェン"
# 「ボクと、キスしちゃう？」
line = "「ボクと、キスしちゃう？」"

[[dialogue]]
speaker = "unk"
# 俺は思わず、何もないところでむせてしまった。
line = "俺は思わず、何もないところでむせてしまった。"

[[dialogue]]
speaker = "クーシェン"
# 「にーにーがどうしてもって言うなら～、ボク、キスしてあげてもいいよ～？」
line = "「にーにーがどうしてもって言うなら～、ボク、キスしてあげてもいいよ～？」"

[[dialogue]]
speaker = "unk"
# そういうのは恋人同士じゃないとダメ！
line = "そういうのは恋人同士じゃないとダメ！"

[[dialogue]]
speaker = "クーシェン"
# 「ウキキ♪　にーにー、まさか知らないの～？　たとえキスしたとしても――」
line = "「ウキキ♪　にーにー、まさか知らないの～？　たとえキスしたとしても――」"

[[dialogue]]
speaker = "クーシェン"
# 「お互い『好きゲージ』が貯まってなければ、妊娠したりしないんだよ？」
line = "「お互い『好きゲージ』が貯まってなければ、妊娠したりしないんだよ？」"

[[dialogue]]
speaker = "unk"
# まさかのゲージ２本目！？
line = "まさかのゲージ２本目！？"

[[dialogue]]
speaker = "クーシェン"
# 「あ～っ！　さてはにーにー、ボクがカッコ可愛いから……実はもう好きになっちゃってるとか～？」
line = "「あ～っ！　さてはにーにー、ボクがカッコ可愛いから……実はもう好きになっちゃってるとか～？」"

[[dialogue]]
speaker = "クーシェン"
# 「も～～♪　にーにーは腕っぷしは強い癖に、そういうところチョロ弱で雑魚なんだから～♪」
line = "「も～～♪　にーにーは腕っぷしは強い癖に、そういうところチョロ弱で雑魚なんだから～♪」"

[[dialogue]]
speaker = "クーシェン"
# 「大丈夫、大丈夫♪　そうだとしても、恋人として付き合い始めてなければセーフだから！」
line = "「大丈夫、大丈夫♪　そうだとしても、恋人として付き合い始めてなければセーフだから！」"

[[dialogue]]
speaker = "クーシェン"
# 「好きゲージっていうのは、お互い『付き合おう』って伝え合って、恋人関係にならないと、貯まり始めないから――」
line = "「好きゲージっていうのは、お互い『付き合おう』って伝え合って、恋人関係にならないと、貯まり始めないから――」"

[[dialogue]]
speaker = "クーシェン"
# 「手を繋ぐみたいな<b>エッチなこと</b>でも、やり放題なんだよ！」
line = "「手を繋ぐみたいな<b>エッチなこと</b>でも、やり放題なんだよ！」"

[[dialogue]]
speaker = "unk"
# えええぇぇぇ～～～っ！？！？
line = "えええぇぇぇ～～～っ！？！？"

[[dialogue]]
speaker = "紅明"
# 「ちっちっちっ。甘い、甘いぜ、クーちん。この世にはもっとエロくて、興奮することが沢山あるんだぜ！」
line = "「ちっちっちっ。甘い、甘いぜ、クーちん。この世にはもっとエロくて、興奮することが沢山あるんだぜ！」"

[[dialogue]]
speaker = "クーシェン"
# 「もっとエッチなこと！？　恋人同士で手を繋いだり、キスすることよりも！？」
line = "「もっとエッチなこと！？　恋人同士で手を繋いだり、キスすることよりも！？」"

[[dialogue]]
speaker = "unk"
# 紅明さん！？　公共の場ですからね……！！
line = "紅明さん！？　公共の場ですからね……！！"

[[dialogue]]
speaker = "紅明"
# 「んモー♪　ダーリンってば、そんなことわかってるって☆」
line = "「んモー♪　ダーリンってば、そんなことわかってるって☆」"

[[dialogue]]
speaker = "クーシェン"
# 「──ボクには後日、正しい性教育の場を設けるから、今日はこの話はおしまい……？」
line = "「──ボクには後日、正しい性教育の場を設けるから、今日はこの話はおしまい……？」"

[[dialogue]]
speaker = "クーシェン"
# 「え～、ヤダヤダ！　勉強きら～い！」
line = "「え～、ヤダヤダ！　勉強きら～い！」"

[[dialogue]]
speaker = "unk"
# ワガママ言わない！
line = "ワガママ言わない！"

[[dialogue]]
speaker = "unk"
# エッチな話も教えてあげるから！
line = "エッチな話も教えてあげるから！"

[[dialogue]]
speaker = "クーシェン"
# 「ウキキっ♪　だいたい、にーにーがボクにエッチなことを教えるなんて、むりむり～！」
line = "「ウキキっ♪　だいたい、にーにーがボクにエッチなことを教えるなんて、むりむり～！」"

[[dialogue]]
speaker = "クーシェン"
# 「むしろボクの方が、女の子の扱い方を教えてあげるけど～？」
line = "「むしろボクの方が、女の子の扱い方を教えてあげるけど～？」"

[[dialogue]]
speaker = "unk"
# 大人ゲージとか言ってるお子様から習う女の子扱い方なんてあるか！！
line = "大人ゲージとか言ってるお子様から習う女の子扱い方なんてあるか！！"

[[dialogue]]
speaker = "紅明"
# 「――ぷっ……あははははははっ！　ダメだ、ダーリンが子供扱いされてるの、面白くて……あははははははっ☆」
line = "「――ぷっ……あははははははっ！　ダメだ、ダーリンが子供扱いされてるの、面白くて……あははははははっ☆」"

[[dialogue]]
speaker = "unk"
# ツボに入ったらしく、それからしばらくお腹を抱えて爆笑する紅明なのであった――
line = "ツボに入ったらしく、それからしばらくお腹を抱えて爆笑する紅明なのであった――"

[[dialogue]]
speaker = "unk"
# その後、俺たちはまた移動して、今度は渋谷の街を散策していた。
line = "その後、俺たちはまた移動して、今度は渋谷の街を散策していた。"

[[dialogue]]
speaker = "クーシェン"
# 「わぁ～っ♪　すごい！　こんなに沢山の人が集まっている街、始めて見た！　ウキウキ♪」
line = "「わぁ～っ♪　すごい！　こんなに沢山の人が集まっている街、始めて見た！　ウキウキ♪」"

[[dialogue]]
speaker = "紅明"
# 「クーちん、はしゃぐのはいいけど、ヒトにぶつからないように気を付けるんだぞ～？」
line = "「クーちん、はしゃぐのはいいけど、ヒトにぶつからないように気を付けるんだぞ～？」"

[[dialogue]]
speaker = "クーシェン"
# 「うん！　大丈夫大丈夫～♪　よっと☆」
line = "「うん！　大丈夫大丈夫～♪　よっと☆」"

[[dialogue]]
speaker = "紅明"
# 「ん？　どうかした、ダーリン？　アタシの顔をじ～っと見つめちゃって……」
line = "「ん？　どうかした、ダーリン？　アタシの顔をじ～っと見つめちゃって……」"

[[dialogue]]
speaker = "紅明"
# 「さては、アタシの可愛さを再確認して、惚れ直しちゃった？　んモー、ダーリンてば～☆」
line = "「さては、アタシの可愛さを再確認して、惚れ直しちゃった？　んモー、ダーリンてば～☆」"

[[dialogue]]
speaker = "unk"
# 悟空の記憶が戻らなくて、本当は寂しかったりしないか？
line = "悟空の記憶が戻らなくて、本当は寂しかったりしないか？"

[[dialogue]]
speaker = "紅明"
# 「ダーリン……心配、してくれてたんだ」
line = "「ダーリン……心配、してくれてたんだ」"

[[dialogue]]
speaker = "紅明"
# 「まあ、確かに。寂しい気持ちがないと言ったら、嘘になるけど……」
line = "「まあ、確かに。寂しい気持ちがないと言ったら、嘘になるけど……」"

[[dialogue]]
speaker = "unk"
# と、その時だった。
line = "と、その時だった。"

[[dialogue]]
speaker = "紅明"
# 「アステラ出現のアラーム……！」
line = "「アステラ出現のアラーム……！」"

[[dialogue]]
speaker = "unk"
# アステラが出現したのは、渋谷近くのエリアだった。その為、１番近くにいた俺たちが先に突入して対処することになったのだが――
line = "アステラが出現したのは、渋谷近くのエリアだった。その為、１番近くにいた俺たちが先に突入して対処することになったのだが――"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「あれは……」
line = "「あれは……」"

[[dialogue]]
speaker = "クーシェン"
# 「ねーねー？　あのモンスターを知ってるの……？」
line = "「ねーねー？　あのモンスターを知ってるの……？」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「牛魔王……！」
line = "「牛魔王……！」"

[[dialogue]]
speaker = "unk"
# 彼女は、アステラの最奥に鎮座するモンスターを見据えながら、いつになく真剣な表情で呟くのだった――
line = "彼女は、アステラの最奥に鎮座するモンスターを見据えながら、いつになく真剣な表情で呟くのだった――"
