[[dialogue]]
speaker = "unk"
# ――某日、東京の渋谷エリアにてアステライトが出現。
line = "――某日、東京の渋谷エリアにてアステライトが出現。"

[[dialogue]]
speaker = "unk"
# その連絡を受けて、俺たち新星学園星徒会は出動し、アステラ内部に突入。
line = "その連絡を受けて、俺たち新星学園星徒会は出動し、アステラ内部に突入。"

[[dialogue]]
speaker = "unk"
# ボスモンスターと思われる個体と交戦を開始していたのだが――
line = "ボスモンスターと思われる個体と交戦を開始していたのだが――"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロト！　気を付けて！　こいつ、いつもの奴より強いわ！」
line = "「クロト！　気を付けて！　こいつ、いつもの奴より強いわ！」"

[[dialogue]]
speaker = "アナ"
# 「リクリエが近づいている影響かもしれません」
line = "「リクリエが近づいている影響かもしれません」"

[[dialogue]]
speaker = "アナ"
# 「会長、Ｓランクモンスター『ガルア・ネルア』、来ます」
line = "「会長、Ｓランクモンスター『ガルア・ネルア』、来ます」"

[[dialogue]]
speaker = "マトイ"
# 「私が攻撃を防ぎつつ引きつけるから、みんなはその隙に攻撃して！」
line = "「私が攻撃を防ぎつつ引きつけるから、みんなはその隙に攻撃して！」"

[[dialogue]]
speaker = "サーシャ"
# 「わかったわ、お願いマトイちゃん！　行くわよ～！」
line = "「わかったわ、お願いマトイちゃん！　行くわよ～！」"

[[dialogue]]
speaker = "ガルア・ネルア"
# 「グオオォォォッ！」
line = "「グオオォォォッ！」"

[[dialogue]]
speaker = "unk"
# 強敵相手に戦闘が激しさを増していく――と、その時だった。
line = "強敵相手に戦闘が激しさを増していく――と、その時だった。"

[[dialogue]]
speaker = "？？？"
# 「ふっふっふ、待たせたな」
line = "「ふっふっふ、待たせたな」"

[[dialogue]]
speaker = "ヴィーナス"
# 「えっ？」
line = "「えっ？」"

[[dialogue]]
speaker = "？？？"
# 「真打ち登場！」
line = "「真打ち登場！」"

[[dialogue]]
speaker = "マトイ"
# 「だ、誰……！？」
line = "「だ、誰……！？」"

[[dialogue]]
speaker = "？？？"
# 「邪悪なる者よ、我が闇に抱かれて、無に還るがいい！　――必殺奥義！！」
line = "「邪悪なる者よ、我が闇に抱かれて、無に還るがいい！　――必殺奥義！！」"

[[dialogue]]
speaker = "？？？"
# 「暗・黒・滅・竜・波ッ！！！」
line = "「暗・黒・滅・竜・波ッ！！！」"

[[dialogue]]
speaker = "ガルア・ネルア"
# 「！？」
line = "「！？」"

[[dialogue]]
speaker = "ガルア・ネルア"
# 「グオオォォォ――ッ！！？」
line = "「グオオォォォ――ッ！！？」"

[[dialogue]]
speaker = "アナ"
# 「――敵の消滅を確認しました。今の技は一体……！？」
line = "「――敵の消滅を確認しました。今の技は一体……！？」"

[[dialogue]]
speaker = "？？？"
# 「ふふふ、これがあたしの……我がモノクラウン家に伝わる、必殺の星術『ドラゴンバスター』！」
line = "「ふふふ、これがあたしの……我がモノクラウン家に伝わる、必殺の星術『ドラゴンバスター』！」"

[[dialogue]]
speaker = "？？？"
# 「もとい、それをカッコよく改名した『暗黒滅竜波』だよ！」
line = "「もとい、それをカッコよく改名した『暗黒滅竜波』だよ！」"

[[dialogue]]
speaker = "マトイ"
# 「技自体は同じなんだ……」
line = "「技自体は同じなんだ……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「でも、すごい威力のビームだったわ！　私たちが消耗させた後とはいえ、決めきれてなかった相手にトドメを刺す一撃だもの！」
line = "「でも、すごい威力のビームだったわ！　私たちが消耗させた後とはいえ、決めきれてなかった相手にトドメを刺す一撃だもの！」"

[[dialogue]]
speaker = "unk"
# 助かったよ。ところで、キミは一体……？
line = "助かったよ。ところで、キミは一体……？"

[[dialogue]]
speaker = "サーシャ"
# 「学園では見たことない子よね～？」
line = "「学園では見たことない子よね～？」"

[[dialogue]]
speaker = "？？？"
# 「ふっ、よくぞ聞いた！　我が名は――」
line = "「ふっ、よくぞ聞いた！　我が名は――」"

[[dialogue]]
speaker = "トワ先生"
# 「メイプルちゃーん！」
line = "「メイプルちゃーん！」"

[[dialogue]]
speaker = "トワ先生"
# 「――あっ、いた！　もう！　メイプルちゃん、先生と一緒に進まないとダメだって言ったのに！」
line = "「――あっ、いた！　もう！　メイプルちゃん、先生と一緒に進まないとダメだって言ったのに！」"

[[dialogue]]
speaker = "メイプル"
# 「ちょっと、トワちゃん！　いいところだったのに、ネタバレしないでよ！？」
line = "「ちょっと、トワちゃん！　いいところだったのに、ネタバレしないでよ！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「トワちゃん先生！　この子と知り合いなの？」
line = "「トワちゃん先生！　この子と知り合いなの？」"

[[dialogue]]
speaker = "トワ先生"
# 「よかった、ボスモンスターは倒したんだね！　えっと……彼女はちょっと事情があって、私の家で預かってる子で……」
line = "「よかった、ボスモンスターは倒したんだね！　えっと……彼女はちょっと事情があって、私の家で預かってる子で……」"

[[dialogue]]
speaker = "メイプル"
# 「――我が名は『メイプル・モノクラウン』！」
line = "「――我が名は『メイプル・モノクラウン』！」"

[[dialogue]]
speaker = "メイプル"
# 「魔界よりやってきた、『クルセイダース』の子孫にして、来たるリクリエを打ち倒し、新たなる魔王となる者！」
line = "「魔界よりやってきた、『クルセイダース』の子孫にして、来たるリクリエを打ち倒し、新たなる魔王となる者！」"

[[dialogue]]
speaker = "unk"
# ま、魔王……！？
line = "ま、魔王……！？"

[[dialogue]]
speaker = "メイプル"
# 「ふっふっふ、その通り。お前のことは聞いているぞ。新星学園の会長――緋宮クロト！」
line = "「ふっふっふ、その通り。お前のことは聞いているぞ。新星学園の会長――緋宮クロト！」"

[[dialogue]]
speaker = "メイプル"
# 「人間界で魔王と噂されている存在。この目で実際に会って、確かめようと思っていたけど……じ～っ」
line = "「人間界で魔王と噂されている存在。この目で実際に会って、確かめようと思っていたけど……じ～っ」"

[[dialogue]]
speaker = "メイプル"
# 「――うん、悪くない。魔王の座を譲る気はないけど……」
line = "「――うん、悪くない。魔王の座を譲る気はないけど……」"

[[dialogue]]
speaker = "メイプル"
# 「あたしの『お兄ちゃん』としてなら、認めてあげてもいいかな」
line = "「あたしの『お兄ちゃん』としてなら、認めてあげてもいいかな」"

[[dialogue]]
speaker = "トワ先生"
# 「え……なんて？」
line = "「え……なんて？」"

[[dialogue]]
speaker = "メイプル"
# 「というわけで、これからよろしくね！　お兄ちゃん♪」
line = "「というわけで、これからよろしくね！　お兄ちゃん♪」"

[[dialogue]]
speaker = "unk"
# どういうこと！？
line = "どういうこと！？"

[[dialogue]]
speaker = "サーシャ"
# 「あら～♪」
line = "「あら～♪」"

[[dialogue]]
speaker = "アナ"
# 「ルルカさんが知ったら、黙ってなさそうですね」
line = "「ルルカさんが知ったら、黙ってなさそうですね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「妹なんていたの？　私、初耳なんだけど！」
line = "「妹なんていたの？　私、初耳なんだけど！」"

[[dialogue]]
speaker = "マトイ"
# 「いや、多分違うと思う……」
line = "「いや、多分違うと思う……」"

[[dialogue]]
speaker = "メイプル"
# 「にへへ♪」
line = "「にへへ♪」"

[[dialogue]]
speaker = "unk"
# そんなわけで、俺は謎の女の子・メイプルと新たに出会ったのだった――
line = "そんなわけで、俺は謎の女の子・メイプルと新たに出会ったのだった――"
