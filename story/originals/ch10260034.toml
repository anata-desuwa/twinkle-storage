[[dialogue]]
speaker = "unk"
# 第４話,後輩とマジカルドリーム,P
line = "第４話,後輩とマジカルドリーム,P"

[[dialogue]]
speaker = "unk"
# その日、俺はリーリアと共にネビュラの基地へと足を運んでいた。
line = "その日、俺はリーリアと共にネビュラの基地へと足を運んでいた。"

[[dialogue]]
speaker = "リーリア"
# 「ふぅ、これでセドナ長官への報告終わりで～す♪」
line = "「ふぅ、これでセドナ長官への報告終わりで～す♪」"

[[dialogue]]
speaker = "リーリア"
# 「これで私、ネビュラの魔女であると同時に、『正式に』星騎士にもなったわけですね☆」
line = "「これで私、ネビュラの魔女であると同時に、『正式に』星騎士にもなったわけですね☆」"

[[dialogue]]
speaker = "unk"
# リーリアはアルカンシェルフォームに覚醒したことで、俺を通じて星力が供給されるようになり、魔力と合わせて戦うことができるようになった。
line = "リーリアはアルカンシェルフォームに覚醒したことで、俺を通じて星力が供給されるようになり、魔力と合わせて戦うことができるようになった。"

[[dialogue]]
speaker = "unk"
# それによって、彼女は『魔女の星騎士』として学園から正式に認められたのである。今日はそのことをセドナさんに伝えに来たというわけだった。
line = "それによって、彼女は『魔女の星騎士』として学園から正式に認められたのである。今日はそのことをセドナさんに伝えに来たというわけだった。"

[[dialogue]]
speaker = "リーリア"
# 「センパイ、それじゃあ、学園に帰りましょうか♪」
line = "「センパイ、それじゃあ、学園に帰りましょうか♪」"

[[dialogue]]
speaker = "unk"
# 俺とリーリアは手を恋人繋ぎにして、基地を後にする。
line = "俺とリーリアは手を恋人繋ぎにして、基地を後にする。"

[[dialogue]]
speaker = "リーリア"
# 「えへへ♪」
line = "「えへへ♪」"

[[dialogue]]
speaker = "unk"
# 学園に戻った後、俺は星徒会の仕事がまだ残っており、リーリアが手伝ってくれることになった――のだが。
line = "学園に戻った後、俺は星徒会の仕事がまだ残っており、リーリアが手伝ってくれることになった――のだが。"

[[dialogue]]
speaker = "リーリア"
# 「ねぇ、センパ～イ<emoji=heart04>　今日はもう、お疲れじゃないですか～？」
line = "「ねぇ、センパ～イ<emoji=heart04>　今日はもう、お疲れじゃないですか～？」"

[[dialogue]]
speaker = "unk"
# 日も暮れてしまったところで、彼女は俺の膝の上に乗って来て、囁く。
line = "日も暮れてしまったところで、彼女は俺の膝の上に乗って来て、囁く。"

[[dialogue]]
speaker = "unk"
# リーリア、これだと集中が……
line = "リーリア、これだと集中が……"

[[dialogue]]
speaker = "リーリア"
# 「え～？　もう夜遅いですし、仕事はまた明日にしましょうよ～」
line = "「え～？　もう夜遅いですし、仕事はまた明日にしましょうよ～」"

[[dialogue]]
speaker = "リーリア"
# 「今日はネビュラ基地にも出向いたわけですし、十分仕事したと思いますよ～？」
line = "「今日はネビュラ基地にも出向いたわけですし、十分仕事したと思いますよ～？」"

[[dialogue]]
speaker = "リーリア"
# 「そ・れ・に☆　可愛い後輩を構うのも、彼氏としての仕事のうち……じゃないですか？」
line = "「そ・れ・に☆　可愛い後輩を構うのも、彼氏としての仕事のうち……じゃないですか？」"

[[dialogue]]
speaker = "unk"
# そこまで言われてしまっては、従うしかない。
line = "そこまで言われてしまっては、従うしかない。"

[[dialogue]]
speaker = "unk"
# 俺はボールペンを机の上に置く。
line = "俺はボールペンを机の上に置く。"

[[dialogue]]
speaker = "リーリア"
# 「あっ……えへへ♪　さすがセンパイ、可愛い後輩の優先順位がわかってますね～☆」
line = "「あっ……えへへ♪　さすがセンパイ、可愛い後輩の優先順位がわかってますね～☆」"

[[dialogue]]
speaker = "リーリア"
# 「は～い、それじゃあ今日は、マジカルお疲れ様でした～♪　センパイ、よく頑張りましたね～。よしよし<emoji=heart04>」
line = "「は～い、それじゃあ今日は、マジカルお疲れ様でした～♪　センパイ、よく頑張りましたね～。よしよし<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# リーリアが俺の髪を優しく撫でる。
line = "リーリアが俺の髪を優しく撫でる。"

[[dialogue]]
speaker = "リーリア"
# 「ねぇ、センパイ？　今日、ネビュラに行った時のことなんですけど……」
line = "「ねぇ、センパイ？　今日、ネビュラに行った時のことなんですけど……」"

[[dialogue]]
speaker = "リーリア"
# 「センパイ、もしかして私が学園を離れたりするかもしれないとか、ちょっと不安に思ってたりしました？」
line = "「センパイ、もしかして私が学園を離れたりするかもしれないとか、ちょっと不安に思ってたりしました？」"

[[dialogue]]
speaker = "unk"
# 俺は驚いて彼女の顔を見やる。
line = "俺は驚いて彼女の顔を見やる。"

[[dialogue]]
speaker = "リーリア"
# 「ふふっ、わかるに決まっているじゃないですか～。私、センパイの彼女なんですから♪」
line = "「ふふっ、わかるに決まっているじゃないですか～。私、センパイの彼女なんですから♪」"

[[dialogue]]
speaker = "リーリア"
# 「それで、ちゃんと伝えておきたいんですけど……私はセンパイのそばから離れたりしませんから、安心して下さい」
line = "「それで、ちゃんと伝えておきたいんですけど……私はセンパイのそばから離れたりしませんから、安心して下さい」"

[[dialogue]]
speaker = "リーリア"
# 「もし、星騎士になることをセドナ長官から反対されて、戻って来いとか言われてたら、大喧嘩になってましたよ」
line = "「もし、星騎士になることをセドナ長官から反対されて、戻って来いとか言われてたら、大喧嘩になってましたよ」"

[[dialogue]]
speaker = "リーリア"
# 「だって……私はもう、とっくの昔に、新星学園の星騎士、渋谷リーリアになっちゃってたんですから」
line = "「だって……私はもう、とっくの昔に、新星学園の星騎士、渋谷リーリアになっちゃってたんですから」"

[[dialogue]]
speaker = "リーリア"
# 「センパイに恋する１人の乙女にも、ね？　ふふっ<emoji=heart04>」
line = "「センパイに恋する１人の乙女にも、ね？　ふふっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そう言って笑ってみせるリーリアを、俺は思わず抱き締める。
line = "そう言って笑ってみせるリーリアを、俺は思わず抱き締める。"

[[dialogue]]
speaker = "リーリア"
# 「んっ……<emoji=heart04>　もう、センパイってば、私のことがそんなに可愛くて仕方なくなっちゃいました？　しょうがないですね～<emoji=heart04>」
line = "「んっ……<emoji=heart04>　もう、センパイってば、私のことがそんなに可愛くて仕方なくなっちゃいました？　しょうがないですね～<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# リーリアも俺の背中に手を回して来て、お互いに抱き合う。
line = "リーリアも俺の背中に手を回して来て、お互いに抱き合う。"

[[dialogue]]
speaker = "unk"
# そのまま、彼女は続ける。
line = "そのまま、彼女は続ける。"

[[dialogue]]
speaker = "リーリア"
# 「私、この学園に来てから、星騎士として戦う以外にも、やりたいことができたんです」
line = "「私、この学園に来てから、星騎士として戦う以外にも、やりたいことができたんです」"

[[dialogue]]
speaker = "unk"
# やりたいこと？
line = "やりたいこと？"

[[dialogue]]
speaker = "リーリア"
# 「はい。現状、私はあくまでも特殊な例――『星力を使える魔女』として、特別に星騎士として認められた状態です」
line = "「はい。現状、私はあくまでも特殊な例――『星力を使える魔女』として、特別に星騎士として認められた状態です」"

[[dialogue]]
speaker = "リーリア"
# 「なので、私以外の魔女が新星学園に入学したいと言っても、簡単には許可されないと思うんですよね」
line = "「なので、私以外の魔女が新星学園に入学したいと言っても、簡単には許可されないと思うんですよね」"

[[dialogue]]
speaker = "リーリア"
# 「ですが、私という前例が出来たんですから……これからは少しずつ『魔女の星騎士』も増えて行って欲しいと思っています」
line = "「ですが、私という前例が出来たんですから……これからは少しずつ『魔女の星騎士』も増えて行って欲しいと思っています」"

[[dialogue]]
speaker = "リーリア"
# 「私、魔女と人間界の橋渡しができる『魔女の友好大使』になりたいんです」
line = "「私、魔女と人間界の橋渡しができる『魔女の友好大使』になりたいんです」"

[[dialogue]]
speaker = "リーリア"
# 「今後、未来に生まれて来る魔女が望むなら……自由に人間界へ来て、見聞を広めて行けるように」
line = "「今後、未来に生まれて来る魔女が望むなら……自由に人間界へ来て、見聞を広めて行けるように」"

[[dialogue]]
speaker = "リーリア"
# 「私は人間界に来て、自分のやりたいことや、大切なものを見つけられましたから」
line = "「私は人間界に来て、自分のやりたいことや、大切なものを見つけられましたから」"

[[dialogue]]
speaker = "リーリア"
# 「今はまだ、セドナ長官も首を縦には振らないでしょうけど、私がこれからメリットを示し続けることで、いつか必ず説得してみせます」
line = "「今はまだ、セドナ長官も首を縦には振らないでしょうけど、私がこれからメリットを示し続けることで、いつか必ず説得してみせます」"

[[dialogue]]
speaker = "リーリア"
# 「魔女と人間界が真にウィンウィンな関係を築くこと……それが、私の目指すところですから♪」
line = "「魔女と人間界が真にウィンウィンな関係を築くこと……それが、私の目指すところですから♪」"

[[dialogue]]
speaker = "unk"
# 素敵な夢だな
line = "素敵な夢だな"

[[dialogue]]
speaker = "リーリア"
# 「ふふっ、そうでしょ？　まさにマジカルドリームです♪」
line = "「ふふっ、そうでしょ？　まさにマジカルドリームです♪」"

[[dialogue]]
speaker = "リーリア"
# 「なのでセンパイ、人間界側の友好大使として、これからも私と末永く仲良くして下さいね♪」
line = "「なのでセンパイ、人間界側の友好大使として、これからも私と末永く仲良くして下さいね♪」"

[[dialogue]]
speaker = "unk"
# リーリアと一緒にいる
line = "リーリアと一緒にいる"

[[dialogue]]
speaker = "unk"
# ああ、何があってもずっと
line = "ああ、何があってもずっと"

[[dialogue]]
speaker = "リーリア"
# 「えへへ♪　約束ですよ？」
line = "「えへへ♪　約束ですよ？」"

[[dialogue]]
speaker = "リーリア"
# 「ん～……<emoji=heart04>」
line = "「ん～……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
# 「ちゅっ<emoji=heart04>」
line = "「ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# それから俺たちは、仲良く甘い夜の時間を過ごすのだった――
line = "それから俺たちは、仲良く甘い夜の時間を過ごすのだった――"
