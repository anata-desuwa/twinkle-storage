[[dialogue]]
speaker = "unk"
# 第３話,第３話『姫様流』,B
line = "第３話,第３話『姫様流』,B"

[[dialogue]]
speaker = "アイリーン"
# 「～♪」
line = "「～♪」"

[[dialogue]]
speaker = "アイリーン"
# 「この季節はなんだかわくわくしちゃうな～。街も活気づいてて、ついテンションが上がっちゃう……」
line = "「この季節はなんだかわくわくしちゃうな～。街も活気づいてて、ついテンションが上がっちゃう……」"

[[dialogue]]
speaker = "クラウディア"
# 「──おい！　アイリーン！　１２月２５日は何の日だ！？」
line = "「──おい！　アイリーン！　１２月２５日は何の日だ！？」"

[[dialogue]]
speaker = "アイリーン"
# 「──って、うわ！　クラウディア様！？」
line = "「──って、うわ！　クラウディア様！？」"

[[dialogue]]
speaker = "アイリーン"
# 「１２月２５日って言ったら……あはは、そんなの決まってますよー！　メリークリスマスです♪」
line = "「１２月２５日って言ったら……あはは、そんなの決まってますよー！　メリークリスマスです♪」"

[[dialogue]]
speaker = "クラウディア"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "アイリーン"
# 「……あれ？　なんで睨まれてるの？」
line = "「……あれ？　なんで睨まれてるの？」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「地雷、踏んだね。思っきり」
line = "「地雷、踏んだね。思っきり」"

[[dialogue]]
speaker = "アイリーン"
# 「ツェツィまで！？」
line = "「ツェツィまで！？」"

[[dialogue]]
speaker = "クラウディア"
# 「……まあよい。魔女までこのような認識とは、やはり事態は深刻といえる」
line = "「……まあよい。魔女までこのような認識とは、やはり事態は深刻といえる」"

[[dialogue]]
speaker = "アイリーン"
# 「えーと……あ！　待って、いや待ってください！　思い出しました！　１２月２５日はクラウディア様の──」
line = "「えーと……あ！　待って、いや待ってください！　思い出しました！　１２月２５日はクラウディア様の──」"

[[dialogue]]
speaker = "クラウディア"
# 「みなまで言うな！」
line = "「みなまで言うな！」"

[[dialogue]]
speaker = "クラウディア"
# 「アイリーン……お主、サンタにはどんなプレゼントを願っておる？」
line = "「アイリーン……お主、サンタにはどんなプレゼントを願っておる？」"

[[dialogue]]
speaker = "アイリーン"
# 「へ？　プレゼント……ですか？」
line = "「へ？　プレゼント……ですか？」"

[[dialogue]]
speaker = "アイリーン"
# 「サンタさんまではさすがに信じてないですけど……そーですねぇ……もしサンタさんが来てくれるなら……」
line = "「サンタさんまではさすがに信じてないですけど……そーですねぇ……もしサンタさんが来てくれるなら……」"

[[dialogue]]
speaker = "アイリーン"
# 「あ、こないだデパートで見た、くまの抱きまくらが欲しいです！　ミーちゃんも止まれそうなくらい大っきいやつ♪」
line = "「あ、こないだデパートで見た、くまの抱きまくらが欲しいです！　ミーちゃんも止まれそうなくらい大っきいやつ♪」"

[[dialogue]]
speaker = "クラウディア"
# 「ふむ。抱きまくらか。なるほどな」
line = "「ふむ。抱きまくらか。なるほどな」"

[[dialogue]]
speaker = "クラウディア"
# 「ちぇちゅーりえよ。確かこの杖には、プレゼント用の機能もあると言ったな」
line = "「ちぇちゅーりえよ。確かこの杖には、プレゼント用の機能もあると言ったな」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「やっぱ言えてないけど……まいっか、呼びやすいように呼べば。そ、ロッドを振ると、相手の願いに応じた品物が飛び出してくるんだよん♪」
line = "「やっぱ言えてないけど……まいっか、呼びやすいように呼べば。そ、ロッドを振ると、相手の願いに応じた品物が飛び出してくるんだよん♪」"

[[dialogue]]
speaker = "アイリーン"
# 「ええ！？　すごすぎない！？」
line = "「ええ！？　すごすぎない！？」"

[[dialogue]]
speaker = "クラウディア"
# 「はっはっは！　そうだろうそうだろう」
line = "「はっはっは！　そうだろうそうだろう」"

[[dialogue]]
speaker = "アイリーン"
# 「ていうか今気づいたけど、クラウディア様の格好はサンタさんを意識して……？」
line = "「ていうか今気づいたけど、クラウディア様の格好はサンタさんを意識して……？」"

[[dialogue]]
speaker = "クラウディア"
# 「ふ。余はサンタを超える者だ。サンタなぞより早く、余がアイリーンの望みを叶えてやる」
line = "「ふ。余はサンタを超える者だ。サンタなぞより早く、余がアイリーンの望みを叶えてやる」"

[[dialogue]]
speaker = "クラウディア"
# 「そーれ……メリークラウディアバースデー～～！」
line = "「そーれ……メリークラウディアバースデー～～！」"

[[dialogue]]
speaker = "クラウディア"
# 「──さあ、プレゼントだ！」
line = "「──さあ、プレゼントだ！」"

[[dialogue]]
speaker = "アイリーン"
# 「これは！？　私の欲しかった抱きまくら──じゃなくて、湯たんぽ……？」
line = "「これは！？　私の欲しかった抱きまくら──じゃなくて、湯たんぽ……？」"

[[dialogue]]
speaker = "アイリーン"
# 「一応、くまのイラストは描かれてるみたいだけど……」
line = "「一応、くまのイラストは描かれてるみたいだけど……」"

[[dialogue]]
speaker = "クラウディア"
# 「おい、希望通りじゃないみたいだぞ」
line = "「おい、希望通りじゃないみたいだぞ」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「まあ、なんでも欲しいものがそのまま手に入ると思うのは考えが甘いっていうか～」
line = "「まあ、なんでも欲しいものがそのまま手に入ると思うのは考えが甘いっていうか～」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「大体、望んだものの２ランク下くらいのアイテムが出てくる感じかな」
line = "「大体、望んだものの２ランク下くらいのアイテムが出てくる感じかな」"

[[dialogue]]
speaker = "クラウディア"
# 「抱きまくらの２ランク下って、湯たんぽなのか……？」
line = "「抱きまくらの２ランク下って、湯たんぽなのか……？」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「うーん……オリジナルのクリスマスフォームは望んだものがそのまま出てきてたんだけどねぇ。思うようにはいかないねぇ」
line = "「うーん……オリジナルのクリスマスフォームは望んだものがそのまま出てきてたんだけどねぇ。思うようにはいかないねぇ」"

[[dialogue]]
speaker = "クラウディア"
# 「まあよい！　どちらも安眠に役立つという点では、似たようなものであろう！　余のプレゼントに感謝するがよいぞ！」
line = "「まあよい！　どちらも安眠に役立つという点では、似たようなものであろう！　余のプレゼントに感謝するがよいぞ！」"

[[dialogue]]
speaker = "アイリーン"
# 「え、えーっと……ありがとうございます！　クラウディア様！」
line = "「え、えーっと……ありがとうございます！　クラウディア様！」"

[[dialogue]]
speaker = "クラウディア"
# 「１２月２５日は？」
line = "「１２月２５日は？」"

[[dialogue]]
speaker = "アイリーン"
# 「クラウディア様の誕生日です！」
line = "「クラウディア様の誕生日です！」"

[[dialogue]]
speaker = "クラウディア"
# 「わーっはっはっは！　そうだ、それでよい。サンタよりクラウディア！　世の常識だな！」
line = "「わーっはっはっは！　そうだ、それでよい。サンタよりクラウディア！　世の常識だな！」"

[[dialogue]]
speaker = "クラウディア"
# 「ちぇちゅーりえ。余は決めたぞ！　この調子で、世間の連中にもサンタより早くプレゼントを届けてやるのだ！」
line = "「ちぇちゅーりえ。余は決めたぞ！　この調子で、世間の連中にもサンタより早くプレゼントを届けてやるのだ！」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「おお！　……って、なんで？」
line = "「おお！　……って、なんで？」"

[[dialogue]]
speaker = "クラウディア"
# 「そうすればきっと皆が余の誕生日を覚えるであろう」
line = "「そうすればきっと皆が余の誕生日を覚えるであろう」"

[[dialogue]]
speaker = "クラウディア"
# 「先にプレゼントを配られては……サンタといえどももはや用なし！　わっはっは、サンタが涙でトナカイを濡らす姿が目に浮かぶようだ！」
line = "「先にプレゼントを配られては……サンタといえどももはや用なし！　わっはっは、サンタが涙でトナカイを濡らす姿が目に浮かぶようだ！」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「常人ではまるで及びもしない発想……さすがはクラウディア様！」
line = "「常人ではまるで及びもしない発想……さすがはクラウディア様！」"

[[dialogue]]
speaker = "クラウディア"
# 「よーし！　みなにプレゼントを届けるため……出発だ～！」
line = "「よーし！　みなにプレゼントを届けるため……出発だ～！」"

[[dialogue]]
speaker = "アイリーン"
# 「あっ！　ちょっと──セドナ長官の許可は取ったんですか～！？」
line = "「あっ！　ちょっと──セドナ長官の許可は取ったんですか～！？」"
