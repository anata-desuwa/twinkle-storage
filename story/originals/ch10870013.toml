[[dialogue]]
speaker = "unk"
# 第３話,不死鳥の覚醒め,P
line = "第３話,不死鳥の覚醒め,P"

[[dialogue]]
speaker = "ヴァレリー"
# 「さて、どこから話したものか。差し当たって私の略歴から始めましょうか」
line = "「さて、どこから話したものか。差し当たって私の略歴から始めましょうか」"

[[dialogue]]
speaker = "unk"
# そういうのって機密事項じゃないの？
line = "そういうのって機密事項じゃないの？"

[[dialogue]]
speaker = "ヴァレリー"
# 「いえいえ、何も包み隠すものなどありませんよ。組織はともかく、私のことについてはね」
line = "「いえいえ、何も包み隠すものなどありませんよ。組織はともかく、私のことについてはね」"

[[dialogue]]
speaker = "ヴァレリー"
# 「事前に調べ上げてあなたのことを知っているのと同様に、あなたにも私のことを知っていただきたいのです」
line = "「事前に調べ上げてあなたのことを知っているのと同様に、あなたにも私のことを知っていただきたいのです」"

[[dialogue]]
speaker = "ヴァレリー"
# 「いわゆる『推しに認知される』というヤツですかね、フフフ」
line = "「いわゆる『推しに認知される』というヤツですかね、フフフ」"

[[dialogue]]
speaker = "ヴァレリー"
# 「では、ご静聴ください。私、ヴァレリーが<ruby=めざ>覚醒</ruby>めに至る物語を」
line = "「では、ご静聴ください。私、ヴァレリーが<ruby>覚醒<rt>めざ</rt></ruby>めに至る物語を」"

[[dialogue]]
speaker = "ヴァレリー"
# 「私はイギリスにある屋敷で産声をあげました」
line = "「私はイギリスにある屋敷で産声をあげました」"

[[dialogue]]
speaker = "ヴァレリー"
# 「使用人を幾人も抱えた広い屋敷、クリケットができるほどの広い庭。今思えば、非常に裕福な家庭でしたね」
line = "「使用人を幾人も抱えた広い屋敷、クリケットができるほどの広い庭。今思えば、非常に裕福な家庭でしたね」"

[[dialogue]]
speaker = "ヴァレリー"
# 「日々の食事に困ったこともありません――などというとキサナに『嫌味か』と怒られてしまうのですが」
line = "「日々の食事に困ったこともありません――などというとキサナに『嫌味か』と怒られてしまうのですが」"

[[dialogue]]
speaker = "ヴァレリー"
# 「両親からは惜しみない愛情と教育を与えられ、『美しい物は心を豊かにするから』と、美術については特に熱心に教わりました」
line = "「両親からは惜しみない愛情と教育を与えられ、『美しい物は心を豊かにするから』と、美術については特に熱心に教わりました」"

[[dialogue]]
speaker = "ヴァレリー"
# 「世界の名だたる美術館を訪れたのはもちろん、我が家にも多数の美術品がありましてね、寝ても覚めても美しい物に囲まれている環境で育ったのです」
line = "「世界の名だたる美術館を訪れたのはもちろん、我が家にも多数の美術品がありましてね、寝ても覚めても美しい物に囲まれている環境で育ったのです」"

[[dialogue]]
speaker = "ヴァレリー"
# 「裕福自慢が鼻につきますかね？　まあ、もう少しお耳汚しにお付き合いください。スッとする瞬間が訪れますから」
line = "「裕福自慢が鼻につきますかね？　まあ、もう少しお耳汚しにお付き合いください。スッとする瞬間が訪れますから」"

[[dialogue]]
speaker = "ヴァレリー"
# 「美術に囲まれ、美術を愛し、すくすくと育った私に大きな転機が訪れます。とある冬の夜のことです」
line = "「美術に囲まれ、美術を愛し、すくすくと育った私に大きな転機が訪れます。とある冬の夜のことです」"

[[dialogue]]
speaker = "ヴァレリー"
# 「その冬一番の寒波が訪れたその日、私の住む屋敷は、火災に見舞われました」
line = "「その冬一番の寒波が訪れたその日、私の住む屋敷は、火災に見舞われました」"

[[dialogue]]
speaker = "ヴァレリー"
# 「暖炉の火が燃え移ったのか、使用人の火の不始末か、はたまた何者かの放火か……数年経った今も、原因は定かではありませんが」
line = "「暖炉の火が燃え移ったのか、使用人の火の不始末か、はたまた何者かの放火か……数年経った今も、原因は定かではありませんが」"

[[dialogue]]
speaker = "ヴァレリー"
# 「私は身を焼くほどの業火に囲まれ、灰色の煙に視界を塞がれ、命の危険に晒されました」
line = "「私は身を焼くほどの業火に囲まれ、灰色の煙に視界を塞がれ、命の危険に晒されました」"

[[dialogue]]
speaker = "ヴァレリー"
# 「右も左もわからず、咄嗟に逃げ込んだその先は、数多の美術品を保管していた倉庫でした」
line = "「右も左もわからず、咄嗟に逃げ込んだその先は、数多の美術品を保管していた倉庫でした」"

[[dialogue]]
speaker = "ヴァレリー"
# 「残念ながら、そこにも火の手は回ってました。そんな絶体絶命の窮地に、私は見てしまったのです」
line = "「残念ながら、そこにも火の手は回ってました。そんな絶体絶命の窮地に、私は見てしまったのです」"

[[dialogue]]
speaker = "ヴァレリー"
# 「数百年もの年月、人の手を渡り、時代を紡いできた絵画が燃え朽ちる瞬間を」
line = "「数百年もの年月、人の手を渡り、時代を紡いできた絵画が燃え朽ちる瞬間を」"

[[dialogue]]
speaker = "ヴァレリー"
# 「白磁の彫刻が折り重なって崩れ、青磁の壺が砕け、豪奢な鎧がひしゃげ、等しく炎の赤に染まる」
line = "「白磁の彫刻が折り重なって崩れ、青磁の壺が砕け、豪奢な鎧がひしゃげ、等しく炎の赤に染まる」"

[[dialogue]]
speaker = "ヴァレリー"
# 「私や両親が愛した時価総額で数百億はくだらない美術品が、ものの数分で灰塵と化したのです」
line = "「私や両親が愛した時価総額で数百億はくだらない美術品が、ものの数分で灰塵と化したのです」"

[[dialogue]]
speaker = "ヴァレリー"
# 「やがて、屋敷までもが骨組みを残すだけの炭となりました……はぁ、はぁっ……あの凄惨な光景は今でも夢に見るんです。夢に見る度……くぅうぅ……！」
line = "「やがて、屋敷までもが骨組みを残すだけの炭となりました……はぁ、はぁっ……あの凄惨な光景は今でも夢に見るんです。夢に見る度……くぅうぅ……！」"

[[dialogue]]
speaker = "unk"
# 辛いなら、それ以上話さなくても……
line = "辛いなら、それ以上話さなくても……"

[[dialogue]]
speaker = "ヴァレリー"
# 「はぁ……はぁっ……お恥ずかしい限りなのですがね、興奮、してしまうんですよ……！」
line = "「はぁ……はぁっ……お恥ずかしい限りなのですがね、興奮、してしまうんですよ……！」"

[[dialogue]]
speaker = "ヴァレリー"
# 「事細かに思い出すだけで、劣情を、抑えきれなく……はぁぁぁんっ……<emoji=heart04>　し、失礼……しばしお待ちいただけますか……」
line = "「事細かに思い出すだけで、劣情を、抑えきれなく……はぁぁぁんっ……<emoji=heart04>　し、失礼……しばしお待ちいただけますか……」"

[[dialogue]]
speaker = "ヴァレリー"
# 「はぁっ、はぁ、はぁっ……私の胸の奥に眠っていた本性が目覚めたのは、そういった一件からです」
line = "「はぁっ、はぁ、はぁっ……私の胸の奥に眠っていた本性が目覚めたのは、そういった一件からです」"

[[dialogue]]
speaker = "ヴァレリー"
# 「美しい作品が世から永遠に失われ、無惨に壊されていく喪失感……ただ美術品を鑑賞しているだけでは決して得られない仄暗い感動……！」
line = "「美しい作品が世から永遠に失われ、無惨に壊されていく喪失感……ただ美術品を鑑賞しているだけでは決して得られない仄暗い感動……！」"

[[dialogue]]
speaker = "ヴァレリー"
# 「業火に包まれて死にかけましたが、あの日、私は転生したかのような衝撃を覚えたんです……！」
line = "「業火に包まれて死にかけましたが、あの日、私は転生したかのような衝撃を覚えたんです……！」"

[[dialogue]]
speaker = "ヴァレリー"
# 「同時に私は能力に<ruby=めざ>覚醒</ruby>め、生存しました。生命を司る力を得たのも、陥った窮地によるものかもしれません」
line = "「同時に私は能力に<ruby>覚醒<rt>めざ</rt></ruby>め、生存しました。生命を司る力を得たのも、陥った窮地によるものかもしれません」"

[[dialogue]]
speaker = "unk"
# まるでフェニックスだ……
line = "まるでフェニックスだ……"

[[dialogue]]
speaker = "ヴァレリー"
# 「フフフ、いいですね。幾度滅んでも蘇る……不変の肉体と魂……禁忌の美しさです……！」
line = "「フフフ、いいですね。幾度滅んでも蘇る……不変の肉体と魂……禁忌の美しさです……！」"

[[dialogue]]
speaker = "ヴァレリー"
# 「ちなみに屋敷は燃えてしまいましたが、私の家族や使用人たちに人的被害はなく、皆、健在のようです」
line = "「ちなみに屋敷は燃えてしまいましたが、私の家族や使用人たちに人的被害はなく、皆、健在のようです」"

[[dialogue]]
speaker = "unk"
# ……不幸中の幸いだったね
line = "……不幸中の幸いだったね"

[[dialogue]]
speaker = "ヴァレリー"
# 「それ以後、ほとんど顔を合わせてはいませんがね。拾われる形で組織に加わったものですから」
line = "「それ以後、ほとんど顔を合わせてはいませんがね。拾われる形で組織に加わったものですから」"

[[dialogue]]
speaker = "ヴァレリー"
# 「……ええ。あまりにも都合の良いタイミングでの組織への加入です」
line = "「……ええ。あまりにも都合の良いタイミングでの組織への加入です」"

[[dialogue]]
speaker = "ヴァレリー"
# 「屋敷に火を放ったのが、首領である可能性も否めませんが……今ではどうでもいいことです。むしろ、感謝すべきところですね」
line = "「屋敷に火を放ったのが、首領である可能性も否めませんが……今ではどうでもいいことです。むしろ、感謝すべきところですね」"

[[dialogue]]
speaker = "ヴァレリー"
# 「あのような機会がなければ、私が無上の恍惚を知ることはなかったのですから……<emoji=heart04>」
line = "「あのような機会がなければ、私が無上の恍惚を知ることはなかったのですから……<emoji=heart04>」"

[[dialogue]]
speaker = "ヴァレリー"
# 「はぁ、はぁっ……己の過去を曝け出すのも、なかなかの快感……これはちょっとした露出プレイですね……はぁん……<emoji=heart04>」
line = "「はぁ、はぁっ……己の過去を曝け出すのも、なかなかの快感……これはちょっとした露出プレイですね……はぁん……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# やっぱり変態だ―っ！！
line = "やっぱり変態だ―っ！！"

[[dialogue]]
speaker = "ヴァレリー"
# 「褒め言葉、ありがとうございます」
line = "「褒め言葉、ありがとうございます」"

[[dialogue]]
speaker = "ヴァレリー"
# 「何と言われようと、どう思われようと、改めるつもりはありません。私を更生させるつもりでしたら、それは愚考というもの」
line = "「何と言われようと、どう思われようと、改めるつもりはありません。私を更生させるつもりでしたら、それは愚考というもの」"

[[dialogue]]
speaker = "ヴァレリー"
# 「あなたが私にこれ以上の恍惚を教えてくれるのであれば、或いは――ですけどね、フフフ」
line = "「あなたが私にこれ以上の恍惚を教えてくれるのであれば、或いは――ですけどね、フフフ」"
