[[dialogue]]
speaker = "unk"
# 第３話,ナターシャとマリンデート,P
line = "第３話,ナターシャとマリンデート,P"

[[dialogue]]
speaker = "ナターシャ"
# 「じー……」
line = "「じー……」"

[[dialogue]]
speaker = "ナターシャ"
# 「じじじ～～……」
line = "「じじじ～～……」"

[[dialogue]]
speaker = "ナターシャ"
# 「……はぁ、退屈だなぁ。最近、会長さんの監視が面白くないよ。すっかり私に見られることに慣れてきてない？」
line = "「……はぁ、退屈だなぁ。最近、会長さんの監視が面白くないよ。すっかり私に見られることに慣れてきてない？」"

[[dialogue]]
speaker = "ナターシャ"
# 「というか、さっきからずっと砂浜に寝転がって何してるの。ベアトじゃあるまいし、日光浴？」
line = "「というか、さっきからずっと砂浜に寝転がって何してるの。ベアトじゃあるまいし、日光浴？」"

[[dialogue]]
speaker = "unk"
# 日光浴もたまにはいいものだよ
line = "日光浴もたまにはいいものだよ"

[[dialogue]]
speaker = "ナターシャ"
# 「真夏の太陽の下、ピクリとも動かない対象を監視し続けるこっちの身にもなってよ」
line = "「真夏の太陽の下、ピクリとも動かない対象を監視し続けるこっちの身にもなってよ」"

[[dialogue]]
speaker = "ナターシャ"
# 「そうだ。どうせ暇ならさ──」
line = "「そうだ。どうせ暇ならさ──」"

[[dialogue]]
speaker = "ナターシャ"
# 「私とデートでもしない？」
line = "「私とデートでもしない？」"

[[dialogue]]
speaker = "ナターシャ"
# 「いっくよ～っ！！」
line = "「いっくよ～っ！！」"

[[dialogue]]
speaker = "ナターシャ"
# 「それっ！！」
line = "「それっ！！」"

[[dialogue]]
speaker = "ナターシャ"
# 「おっとっ……！！　良い動きするじゃん。でも──」
line = "「おっとっ……！！　良い動きするじゃん。でも──」"

[[dialogue]]
speaker = "ナターシャ"
# 「そこ！！」
line = "「そこ！！」"

[[dialogue]]
speaker = "ナターシャ"
# 「ふふ、私の勝ちだね♪」
line = "「ふふ、私の勝ちだね♪」"

[[dialogue]]
speaker = "unk"
# 今、一瞬ナターシャが２人重なって見えたような……
line = "今、一瞬ナターシャが２人重なって見えたような……"

[[dialogue]]
speaker = "ナターシャ"
# 「この水着フォームは特に動きやすいからね♪　分身したように見せる程度なら、ちょちょいのちょいだよ♪」
line = "「この水着フォームは特に動きやすいからね♪　分身したように見せる程度なら、ちょちょいのちょいだよ♪」"

[[dialogue]]
speaker = "ナターシャ"
# 「それより次はサーフィンに付き合ってよ。波乗り勝負でもしよ♪」
line = "「それより次はサーフィンに付き合ってよ。波乗り勝負でもしよ♪」"

[[dialogue]]
speaker = "ナターシャ"
# 「先に体勢を崩して、海に落ちた方の負けだからね？　あの大波に乗った時点から勝負スタートだよ？」
line = "「先に体勢を崩して、海に落ちた方の負けだからね？　あの大波に乗った時点から勝負スタートだよ？」"

[[dialogue]]
speaker = "ナターシャ"
# 「来た、大波っ……！　ほいっと……！！」
line = "「来た、大波っ……！　ほいっと……！！」"

[[dialogue]]
speaker = "ナターシャ"
# 「へぇ、サーフィンって初めてやったけど、んんっ。結構バランス取るの難しいんだねっ」
line = "「へぇ、サーフィンって初めてやったけど、んんっ。結構バランス取るの難しいんだねっ」"

[[dialogue]]
speaker = "ナターシャ"
# 「油断したらすぐ落ちちゃいそう──って、わわっ！？」
line = "「油断したらすぐ落ちちゃいそう──って、わわっ！？」"

[[dialogue]]
speaker = "unk"
# 勝った！
line = "勝った！"

[[dialogue]]
speaker = "ナターシャ"
# 「いいや、まだだよっ！」
line = "「いいや、まだだよっ！」"

[[dialogue]]
speaker = "unk"
# ナターシャが波の上を走って！？
line = "ナターシャが波の上を走って！？"

[[dialogue]]
speaker = "ナターシャ"
# 「こっちばっかり見てると足を掬われるよ？」
line = "「こっちばっかり見てると足を掬われるよ？」"

[[dialogue]]
speaker = "unk"
# なっ──！？
line = "なっ──！？"

[[dialogue]]
speaker = "ナターシャ"
# 「あ、会長さん落ちちゃった」
line = "「あ、会長さん落ちちゃった」"

[[dialogue]]
speaker = "ナターシャ"
# 「よし、会長さんの負け～」
line = "「よし、会長さんの負け～」"

[[dialogue]]
speaker = "ナターシャ"
# 「何その不服そうな顔。先に言っておいたでしょ？　海に落ちた方の負けだって」
line = "「何その不服そうな顔。先に言っておいたでしょ？　海に落ちた方の負けだって」"

[[dialogue]]
speaker = "ナターシャ"
# 「波の上を走る分には海に落ちてないから♪　ま、私の粘り勝ちだね♪」
line = "「波の上を走る分には海に落ちてないから♪　ま、私の粘り勝ちだね♪」"

[[dialogue]]
speaker = "ナターシャ"
# 「あ、まだ不服そうな顔して。ならもう一度勝負する？」
line = "「あ、まだ不服そうな顔して。ならもう一度勝負する？」"

[[dialogue]]
speaker = "ナターシャ"
# 「ふふ、負けず嫌いだね。まぁデートに誘ったのは私だし、いくらでも付き合うよ♪」
line = "「ふふ、負けず嫌いだね。まぁデートに誘ったのは私だし、いくらでも付き合うよ♪」"

[[dialogue]]
speaker = "ナターシャ"
# 「その代わり……今度は２人で、ね♪」
line = "「その代わり……今度は２人で、ね♪」"

[[dialogue]]
speaker = "ナターシャ"
# 「いいじゃない、デートなんだから♪」
line = "「いいじゃない、デートなんだから♪」"

[[dialogue]]
speaker = "unk"
# それからナターシャといろんなレジャーを楽しんで……
line = "それからナターシャといろんなレジャーを楽しんで……"

[[dialogue]]
speaker = "ナターシャ"
# 「はぁー、遊んだ遊んだ」
line = "「はぁー、遊んだ遊んだ」"

[[dialogue]]
speaker = "ナターシャ"
# 「会長さんの言うとおり日光浴もたまにはいいね？　運動した後だからって言うのもあるけど」
line = "「会長さんの言うとおり日光浴もたまにはいいね？　運動した後だからって言うのもあるけど」"

[[dialogue]]
speaker = "unk"
# 良い気分転換になった？
line = "良い気分転換になった？"

[[dialogue]]
speaker = "ナターシャ"
# 「……あはは、お陰様でね。やっぱりどうも最近、心の中がモヤモヤしてて」
line = "「……あはは、お陰様でね。やっぱりどうも最近、心の中がモヤモヤしてて」"

[[dialogue]]
speaker = "ナターシャ"
# 「会長さんが付き合ってくれたおかげで、少しは気が晴れたよ」
line = "「会長さんが付き合ってくれたおかげで、少しは気が晴れたよ」"

[[dialogue]]
speaker = "ナターシャ"
# 「でも……本音を言えば、もう少しドキドキさせて欲しいかな」
line = "「でも……本音を言えば、もう少しドキドキさせて欲しいかな」"

[[dialogue]]
speaker = "ナターシャ"
# 「心のモヤモヤが全部、吹き飛んじゃうような……。そんな刺激が欲しくって……」
line = "「心のモヤモヤが全部、吹き飛んじゃうような……。そんな刺激が欲しくって……」"

[[dialogue]]
speaker = "unk"
# そういうことなら──
line = "そういうことなら──"

[[dialogue]]
speaker = "ナターシャ"
# 「あ──……」
line = "「あ──……」"

[[dialogue]]
speaker = "unk"
# もぞ……
line = "もぞ……"

[[dialogue]]
speaker = "ナターシャ"
# 「……もぞ？」
line = "「……もぞ？」"

[[dialogue]]
speaker = "ナターシャ"
# 「ひぃああああっ！？　むむむ、虫ぃ～～～！！？」
line = "「ひぃああああっ！？　むむむ、虫ぃ～～～！！？」"

[[dialogue]]
speaker = "ナターシャ"
# 「って──何を人の腕に乗せてくれてるの！？」
line = "「って──何を人の腕に乗せてくれてるの！？」"

[[dialogue]]
speaker = "unk"
# 刺激が欲しいって言うから
line = "刺激が欲しいって言うから"

[[dialogue]]
speaker = "ナターシャ"
# 「心臓が飛び出るかと思ったよ、まったく……！」
line = "「心臓が飛び出るかと思ったよ、まったく……！」"

[[dialogue]]
speaker = "ナターシャ"
# 「でも、あはは。確かにモヤモヤは吹っ飛んだかも」
line = "「でも、あはは。確かにモヤモヤは吹っ飛んだかも」"

[[dialogue]]
speaker = "ナターシャ"
# 「ありがと、会長さん。デートに誘って良かったよ」
line = "「ありがと、会長さん。デートに誘って良かったよ」"

[[dialogue]]
speaker = "ナターシャ"
# 「あ、そうだ。それと──」
line = "「あ、そうだ。それと──」"

[[dialogue]]
speaker = "ナターシャ"
# 「ん……ちゅっ<emoji=heart04>」
line = "「ん……ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
# 「ふふ、驚かせてくれたお返しだよ<emoji=heart04>」
line = "「ふふ、驚かせてくれたお返しだよ<emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
# 「どうかな？　けっこー刺激的だったでしょ<emoji=heart04>」
line = "「どうかな？　けっこー刺激的だったでしょ<emoji=heart04>」"
