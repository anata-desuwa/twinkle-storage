[[dialogue]]
speaker = "unk"
# 次の課題は船に乗って標的を水鉄砲で撃つアトラクション。
line = "次の課題は船に乗って標的を水鉄砲で撃つアトラクション。"

[[dialogue]]
speaker = "unk"
# ある程度得点を稼げばいいだけなので、同じグループで競争する必要はないのだが、フランとプルちゃんが張り合い出して──
line = "ある程度得点を稼げばいいだけなので、同じグループで競争する必要はないのだが、フランとプルちゃんが張り合い出して──"

[[dialogue]]
speaker = "プルちゃん"
# 「わーい、勝った勝ったー♪　フランおねーさん、射撃もできるって言ってたくせにカッコ悪いんじゃな～い？」
line = "「わーい、勝った勝ったー♪　フランおねーさん、射撃もできるって言ってたくせにカッコ悪いんじゃな～い？」"

[[dialogue]]
speaker = "フラン"
# 「オレが撃とうとする度に『わっ』とか声上げて邪魔してきやがったくせに！　そのせいでスタンプ押せる得点ギリギリだっただろ！！」
line = "「オレが撃とうとする度に『わっ』とか声上げて邪魔してきやがったくせに！　そのせいでスタンプ押せる得点ギリギリだっただろ！！」"

[[dialogue]]
speaker = "プルちゃん"
# 「ハーッハッハッハ！　勝てばいいのだよ！」
line = "「ハーッハッハッハ！　勝てばいいのだよ！」"

[[dialogue]]
speaker = "プルちゃん"
# 「ていうかあたしだって、おねーさん邪魔するのに神経使ったから、邪魔してなかったらもっとポイント稼げてたよ！」
line = "「ていうかあたしだって、おねーさん邪魔するのに神経使ったから、邪魔してなかったらもっとポイント稼げてたよ！」"

[[dialogue]]
speaker = "フラン"
# 「なら最初からそうしろ！」
line = "「なら最初からそうしろ！」"

[[dialogue]]
speaker = "グロリア"
# 「ふふ、まるで姉妹ゲンカのようですね」
line = "「ふふ、まるで姉妹ゲンカのようですね」"

[[dialogue]]
speaker = "フラン"
# 「こんな妹いらねー！」
line = "「こんな妹いらねー！」"

[[dialogue]]
speaker = "プルちゃん"
# 「あたしだって、こんなおっかないお姉ちゃんいらないもん！　お姉ちゃんにするなら～……」
line = "「あたしだって、こんなおっかないお姉ちゃんいらないもん！　お姉ちゃんにするなら～……」"

[[dialogue]]
speaker = "グロリア"
# 「きゃっ」
line = "「きゃっ」"

[[dialogue]]
speaker = "プルちゃん"
# 「こっちのおねーさんの方がいいもんっ」
line = "「こっちのおねーさんの方がいいもんっ」"

[[dialogue]]
speaker = "グロリア"
# 「あん、くすぐったいです」
line = "「あん、くすぐったいです」"

[[dialogue]]
speaker = "プルちゃん"
# 「うお……でっか……やわらか……」
line = "「うお……でっか……やわらか……」"

[[dialogue]]
speaker = "フラン"
# 「おい離れやがれ！　なんか言い方がいやらしいぞ！」
line = "「おい離れやがれ！　なんか言い方がいやらしいぞ！」"

[[dialogue]]
speaker = "プルちゃん"
# 「わー！　おねーさんがいじめるよー！」
line = "「わー！　おねーさんがいじめるよー！」"

[[dialogue]]
speaker = "フラン"
# 「待てー！」
line = "「待てー！」"

[[dialogue]]
speaker = "グロリア"
# 「ふふふ……おふたりとも楽しそうですね」
line = "「ふふふ……おふたりとも楽しそうですね」"

[[dialogue]]
speaker = "unk"
# グロリアさんも楽しんでるみたいで良かった
line = "グロリアさんも楽しんでるみたいで良かった"

[[dialogue]]
speaker = "グロリア"
# 「私が？　そうなのでしょうか……？　いつもは大聖堂で祈ってばかりですから、楽しいことというのはよくわからなくて……」
line = "「私が？　そうなのでしょうか……？　いつもは大聖堂で祈ってばかりですから、楽しいことというのはよくわからなくて……」"

[[dialogue]]
speaker = "グロリア"
# 「でも少し……普段より心が軽い気がします」
line = "「でも少し……普段より心が軽い気がします」"

[[dialogue]]
speaker = "グロリア"
# 「遊園地の存在は知っていたものの、来たのは今日が初めてでして……何もかもが新鮮な体験です」
line = "「遊園地の存在は知っていたものの、来たのは今日が初めてでして……何もかもが新鮮な体験です」"

[[dialogue]]
speaker = "グロリア"
# 「とても賑やかで、人々の笑い声が聞こえて、アトラクションも驚きの連続で……」
line = "「とても賑やかで、人々の笑い声が聞こえて、アトラクションも驚きの連続で……」"

[[dialogue]]
speaker = "グロリア"
# 「……アトラクションで事故が起きたら死ねるでしょうか？」
line = "「……アトラクションで事故が起きたら死ねるでしょうか？」"

[[dialogue]]
speaker = "フラン"
# 「縁起でもねえからマジでやめろ」
line = "「縁起でもねえからマジでやめろ」"

[[dialogue]]
speaker = "プルちゃん"
# 「ねーねー、グロリアおねーさんって死にたいの？」
line = "「ねーねー、グロリアおねーさんって死にたいの？」"

[[dialogue]]
speaker = "グロリア"
# 「だって、善い人から天に召されるのでしょう？」
line = "「だって、善い人から天に召されるのでしょう？」"

[[dialogue]]
speaker = "プルちゃん"
# 「ほえ？」
line = "「ほえ？」"

[[dialogue]]
speaker = "グロリア"
# 「両親が死んだ時、そう言っていた方がいました」
line = "「両親が死んだ時、そう言っていた方がいました」"

[[dialogue]]
speaker = "グロリア"
# 「ですが私がまだ生きているということは、きっと私はまだ善い人ではないのでしょうね……」
line = "「ですが私がまだ生きているということは、きっと私はまだ善い人ではないのでしょうね……」"

[[dialogue]]
speaker = "プルちゃん"
# 「ふーん、なるほどー」
line = "「ふーん、なるほどー」"

[[dialogue]]
speaker = "フラン"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "フラン"
# 「よし、次はジェットコースター行くぞ！　ここの遊園地で一番人気なんだってよ！」
line = "「よし、次はジェットコースター行くぞ！　ここの遊園地で一番人気なんだってよ！」"

[[dialogue]]
speaker = "プルちゃん"
# 「あのたっかいジェットコースター乗るの？　わー、天界に帰れちゃいそー、天使だけに」
line = "「あのたっかいジェットコースター乗るの？　わー、天界に帰れちゃいそー、天使だけに」"

[[dialogue]]
speaker = "フラン"
# 「そんな簡単に帰れてたまるか。てかお前身長足りてるか？」
line = "「そんな簡単に帰れてたまるか。てかお前身長足りてるか？」"

[[dialogue]]
speaker = "プルちゃん"
# 「そんなにちっちゃくないもん！　レモン１５個分だもん！」
line = "「そんなにちっちゃくないもん！　レモン１５個分だもん！」"

[[dialogue]]
speaker = "フラン"
# 「ビタミンＣか」
line = "「ビタミンＣか」"

[[dialogue]]
speaker = "グロリア"
# 「ふふっ」
line = "「ふふっ」"

[[dialogue]]
speaker = "フラン"
# 「もちろんグロリアと会長も一緒な！」
line = "「もちろんグロリアと会長も一緒な！」"

[[dialogue]]
speaker = "グロリア"
# 「ええ！？」
line = "「ええ！？」"

[[dialogue]]
speaker = "unk"
# 俺はいいけど、グロリアさんは大丈夫？
line = "俺はいいけど、グロリアさんは大丈夫？"

[[dialogue]]
speaker = "グロリア"
# 「コーヒーカップでもフラフラしていたのに、あんな速くて高いアトラクションなんて……」
line = "「コーヒーカップでもフラフラしていたのに、あんな速くて高いアトラクションなんて……」"

[[dialogue]]
speaker = "フラン"
# 「んなもん星騎士だから平気だろ。戦闘訓練の方がキツいっての」
line = "「んなもん星騎士だから平気だろ。戦闘訓練の方がキツいっての」"

[[dialogue]]
speaker = "プルちゃん"
# 「観念しなって。旅は道連れ世は情け、毒食らわばサラマンダーってね♪」
line = "「観念しなって。旅は道連れ世は情け、毒食らわばサラマンダーってね♪」"

[[dialogue]]
speaker = "グロリア"
# 「フ、フランさんもプルちゃんも、ちょっと待ってくださいっ、心の準備が──」
line = "「フ、フランさんもプルちゃんも、ちょっと待ってくださいっ、心の準備が──」"

[[dialogue]]
speaker = "グロリア"
# 「きゃぁ～～～～～～～っ！！？」
line = "「きゃぁ～～～～～～～っ！！？」"

[[dialogue]]
speaker = "グロリア"
# 「はぁ、はぁ……これが、ジェットコースター……」
line = "「はぁ、はぁ……これが、ジェットコースター……」"

[[dialogue]]
speaker = "グロリア"
# 「確かに訓練も厳しいですが、また違う激しさがありました……。しかしこれで両親に近づけると思えば……」
line = "「確かに訓練も厳しいですが、また違う激しさがありました……。しかしこれで両親に近づけると思えば……」"

[[dialogue]]
speaker = "フラン"
# 「いや死なねーよ」
line = "「いや死なねーよ」"

[[dialogue]]
speaker = "フラン"
# 「これでスタンプも最後……じゃねえ。ジェットコースターはスタンプラリー関係なかったわ」
line = "「これでスタンプも最後……じゃねえ。ジェットコースターはスタンプラリー関係なかったわ」"

[[dialogue]]
speaker = "グロリア"
# 「う～っ……」
line = "「う～っ……」"

[[dialogue]]
speaker = "フラン"
# 「はっはっは、わりぃわりぃ。今度なんか埋め合わせするって」
line = "「はっはっは、わりぃわりぃ。今度なんか埋め合わせするって」"

[[dialogue]]
speaker = "グロリア"
# 「む～……」
line = "「む～……」"

[[dialogue]]
speaker = "プルちゃん"
# 「ハハッ、拗ねてるグロリアおねーさんかわい～♪」
line = "「ハハッ、拗ねてるグロリアおねーさんかわい～♪」"

[[dialogue]]
speaker = "グロリア"
# 「えっ、私は拗ねているわけでは……違いますぅ……」
line = "「えっ、私は拗ねているわけでは……違いますぅ……」"

[[dialogue]]
speaker = "unk"
# スタンプラリーで集めるスタンプはあと１つ。
line = "スタンプラリーで集めるスタンプはあと１つ。"

[[dialogue]]
speaker = "unk"
# しかし『死神』が現れる気配はないのだった……
line = "しかし『死神』が現れる気配はないのだった……"
