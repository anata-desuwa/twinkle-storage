[[dialogue]]
speaker = "ヴァレリー"
# 「美しい。見事な太刀捌き。噂に違わぬ実力です」
line = "「美しい。見事な太刀捌き。噂に違わぬ実力です」"

[[dialogue]]
speaker = "ヴァレリー"
# 「私はとても幸運です。この国に到着して早々、あなたのような星騎士と出会えるなんて」
line = "「私はとても幸運です。この国に到着して早々、あなたのような星騎士と出会えるなんて」"

[[dialogue]]
speaker = "蛍火"
# 「私としては不運でしたが……あなたと出会ったのが他の星騎士でなかったことは、不幸中の幸いでしょう」
line = "「私としては不運でしたが……あなたと出会ったのが他の星騎士でなかったことは、不幸中の幸いでしょう」"

[[dialogue]]
speaker = "蛍火"
# 「東雲流包丁術、壱の型──<ruby=きえんてんしょう>鬼炎天焼</ruby>！」
line = "「東雲流包丁術、壱の型──<ruby>鬼炎天焼<rt>きえんてんしょう</rt></ruby>！」"

[[dialogue]]
speaker = "ヴァレリー"
# 「ああ、美しい一閃でした……この身で素晴らしい技を受けることができて幸せです」
line = "「ああ、美しい一閃でした……この身で素晴らしい技を受けることができて幸せです」"

[[dialogue]]
speaker = "蛍火"
# 「ダメージは通っているはずなのに倒れない……！　やはりこの力は──」
line = "「ダメージは通っているはずなのに倒れない……！　やはりこの力は──」"

[[dialogue]]
speaker = "ヴァレリー"
# 「ええ。すでにあなた方と交戦したキサナと同様、私は星力を吸収することができます。それが我々コラプサーの証といっていいでしょう」
line = "「ええ。すでにあなた方と交戦したキサナと同様、私は星力を吸収することができます。それが我々コラプサーの証といっていいでしょう」"

[[dialogue]]
speaker = "ヴァレリー"
# 「あなたは星騎士の中でも選りすぐり。この力がなくては勝負にならなかったでしょうね」
line = "「あなたは星騎士の中でも選りすぐり。この力がなくては勝負にならなかったでしょうね」"

[[dialogue]]
speaker = "蛍火"
# 「敵ながらそれは訂正させていただきます。あなたの剣技も卓越したものです」
line = "「敵ながらそれは訂正させていただきます。あなたの剣技も卓越したものです」"

[[dialogue]]
speaker = "ヴァレリー"
# 「あなたに褒めていただけるとは光栄です。非才なれど、剣の腕を磨いてきた甲斐がありますとも」
line = "「あなたに褒めていただけるとは光栄です。非才なれど、剣の腕を磨いてきた甲斐がありますとも」"

[[dialogue]]
speaker = "ヴァレリー"
# 「しかしあなたはそろそろ限界なのでは？　ダメージが蓄積しているのはあなたも同じでしょう？」
line = "「しかしあなたはそろそろ限界なのでは？　ダメージが蓄積しているのはあなたも同じでしょう？」"

[[dialogue]]
speaker = "蛍火"
# 「くっ──！」
line = "「くっ──！」"

[[dialogue]]
speaker = "ヴァレリー"
# 「もっと戦いを楽しんでいたいのですが、私も用事の途中でして。残念ながらそろそろ決着を付けなくてはなりません」
line = "「もっと戦いを楽しんでいたいのですが、私も用事の途中でして。残念ながらそろそろ決着を付けなくてはなりません」"

[[dialogue]]
speaker = "ヴァレリー"
# 「あなたは本当に美しい星騎士でした。それでは──さようなら」
line = "「あなたは本当に美しい星騎士でした。それでは──さようなら」"

[[dialogue]]
speaker = "シアン"
# 「ブラックドッグファング！」
line = "「ブラックドッグファング！」"

[[dialogue]]
speaker = "ヴァレリー"
# 「──！」
line = "「──！」"

[[dialogue]]
speaker = "ヴァレリー"
# 「蛍火さんとの戦いに熱中しすぎましたね。寸前まで気が付きませんでした」
line = "「蛍火さんとの戦いに熱中しすぎましたね。寸前まで気が付きませんでした」"

[[dialogue]]
speaker = "シアン"
# 「チッ、しっかり反応しといてよく言うぜ」
line = "「チッ、しっかり反応しといてよく言うぜ」"

[[dialogue]]
speaker = "ヴァレリー"
# 「蛍火さんほどではありませんが、あなたも見事な一撃でした。闇に溶け込む黒もまた美しい」
line = "「蛍火さんほどではありませんが、あなたも見事な一撃でした。闇に溶け込む黒もまた美しい」"

[[dialogue]]
speaker = "シアン"
# 「キサナじゃねえが、こいつもコラプサーか。もしかすると、こいつがあの時の──」
line = "「キサナじゃねえが、こいつもコラプサーか。もしかすると、こいつがあの時の──」"

[[dialogue]]
speaker = "蛍火"
# 「あなたも星騎士ですか？　失礼ながら、学園でお見かけした覚えはないのですが……」
line = "「あなたも星騎士ですか？　失礼ながら、学園でお見かけした覚えはないのですが……」"

[[dialogue]]
speaker = "シアン"
# 「ああ、今は新星だからあんたの先輩だよ」
line = "「ああ、今は新星だからあんたの先輩だよ」"

[[dialogue]]
speaker = "蛍火"
# 「今は……？」
line = "「今は……？」"

[[dialogue]]
speaker = "シアン"
# 「細かいことはいい。助けに入ったはいいが、２人がかりでもやつの相手はきついぞ」
line = "「細かいことはいい。助けに入ったはいいが、２人がかりでもやつの相手はきついぞ」"

[[dialogue]]
speaker = "シアン"
# 「キサナの時は、星徒会長と風紀委員２人を相手にして大暴れだ。あんたの実力はケチのつけようがないが、単純に人手が足りない」
line = "「キサナの時は、星徒会長と風紀委員２人を相手にして大暴れだ。あんたの実力はケチのつけようがないが、単純に人手が足りない」"

[[dialogue]]
speaker = "蛍火"
# 「同感です。彼女の脅威はこの身で理解しました。ですが退くわけにはいきません」
line = "「同感です。彼女の脅威はこの身で理解しました。ですが退くわけにはいきません」"

[[dialogue]]
speaker = "蛍火"
# 「すでに増援も要請しているのでしょう？　ならば私たちで持ちこたえましょう」
line = "「すでに増援も要請しているのでしょう？　ならば私たちで持ちこたえましょう」"

[[dialogue]]
speaker = "シアン"
# 「まぁそれしかないか。話が早いぜ」
line = "「まぁそれしかないか。話が早いぜ」"

[[dialogue]]
speaker = "ヴァレリー"
# 「私としてもありがたい展開です。輝かしい星術を、美しい技を、私にもっと見せてください……！」
line = "「私としてもありがたい展開です。輝かしい星術を、美しい技を、私にもっと見せてください……！」"

[[dialogue]]
speaker = "シアン"
# 「うるせえ。輝かしいだの美しいだのはどうでもいいから、人様に迷惑かけずにとっとお縄につきやがれ」
line = "「うるせえ。輝かしいだの美しいだのはどうでもいいから、人様に迷惑かけずにとっとお縄につきやがれ」"

[[dialogue]]
speaker = "リーナ"
# 「リーナにはどんなお洋服が似合うかな～？　お兄ちゃんはフリフリのかわいいのと、大人っぽくてかっこいいのどっちが好み？」
line = "「リーナにはどんなお洋服が似合うかな～？　お兄ちゃんはフリフリのかわいいのと、大人っぽくてかっこいいのどっちが好み？」"

[[dialogue]]
speaker = "リーナ"
# 「リーナはかわいい方が好きだけど、お兄ちゃんが好きならどんな服でも──」
line = "「リーナはかわいい方が好きだけど、お兄ちゃんが好きならどんな服でも──」"

[[dialogue]]
speaker = "コハルコ"
# 『ごめんなさい、会長さん。緊急事態です』
line = "『ごめんなさい、会長さん。緊急事態です』"

[[dialogue]]
speaker = "unk"
# コハルコさん！
line = "コハルコさん！"

[[dialogue]]
speaker = "リーナ"
# 「も～、今いいところだったのにー」
line = "「も～、今いいところだったのにー」"

[[dialogue]]
speaker = "コハルコ"
# 『浅草で蛍火さんがコラプサーと思われる敵と戦闘中です。至急現場に急行してください』
line = "『浅草で蛍火さんがコラプサーと思われる敵と戦闘中です。至急現場に急行してください』"

[[dialogue]]
speaker = "unk"
# ごめん、リーナ。行かないといけないんだ
line = "ごめん、リーナ。行かないといけないんだ"

[[dialogue]]
speaker = "リーナ"
# 「なになに、用事？　じゃあリーナも一緒に行く！」
line = "「なになに、用事？　じゃあリーナも一緒に行く！」"

[[dialogue]]
speaker = "unk"
# 危ないからダメ
line = "危ないからダメ"

[[dialogue]]
speaker = "リーナ"
# 「え～。リーナ、お兄ちゃんの邪魔しないよ？　ちゃんとおとなしくしてるよ？　それでもダメ？」
line = "「え～。リーナ、お兄ちゃんの邪魔しないよ？　ちゃんとおとなしくしてるよ？　それでもダメ？」"

[[dialogue]]
speaker = "リーナ"
# 「お兄ちゃん……リーナを捨てちゃうの？」
line = "「お兄ちゃん……リーナを捨てちゃうの？」"

[[dialogue]]
speaker = "unk"
# リーナに怪我させたくないから
line = "リーナに怪我させたくないから"

[[dialogue]]
speaker = "リーナ"
# 「！　お兄ちゃん……」
line = "「！　お兄ちゃん……」"

[[dialogue]]
speaker = "リーナ"
# 「うん、わかった。行ってきて。お兄ちゃんも怪我しちゃダメだから」
line = "「うん、わかった。行ってきて。お兄ちゃんも怪我しちゃダメだから」"

[[dialogue]]
speaker = "リーナ"
# 「ちゃんと戻ってきてね。リーナとの約束だよ」
line = "「ちゃんと戻ってきてね。リーナとの約束だよ」"

[[dialogue]]
speaker = "リーナ"
# 「お兄ちゃん……寂しいよ……」
line = "「お兄ちゃん……寂しいよ……」"

[[dialogue]]
speaker = "リーナ"
# 「でも、どうしても行かなきゃいけない用事なら仕方ないよね。妹だもん、こういう時はちゃんと行ってらっしゃいって言ってあげないと」
line = "「でも、どうしても行かなきゃいけない用事なら仕方ないよね。妹だもん、こういう時はちゃんと行ってらっしゃいって言ってあげないと」"

[[dialogue]]
speaker = "リーナ"
# 「も～、またモンスター？　いい加減うっとうしいなぁ～」
line = "「も～、またモンスター？　いい加減うっとうしいなぁ～」"

[[dialogue]]
speaker = "リーナ"
# 「ジャマ！」
line = "「ジャマ！」"

[[dialogue]]
speaker = "リーナ"
# 「早く帰ってきてね……お兄ちゃん」
line = "「早く帰ってきてね……お兄ちゃん」"
