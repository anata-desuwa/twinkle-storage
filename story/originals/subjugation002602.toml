[[dialogue]]
speaker = "ヴィーナス"
# 「ヘレナちゃんじゃない！　こんなところで何してるのよ！」
line = "「ヘレナちゃんじゃない！　こんなところで何してるのよ！」"

[[dialogue]]
speaker = "ヘレナ"
# 「フフ……決まっているだろう、リゾートを満喫しているのだ」
line = "「フフ……決まっているだろう、リゾートを満喫しているのだ」"

[[dialogue]]
speaker = "ヘレナ"
# 「しかし、学園から常夏の楽園へひとっ飛びとは……フ。夏への扉、というわけか」
line = "「しかし、学園から常夏の楽園へひとっ飛びとは……フ。夏への扉、というわけか」"

[[dialogue]]
speaker = "ルリエル"
# 「おお……なんとなく風流です！」
line = "「おお……なんとなく風流です！」"

[[dialogue]]
speaker = "ヘレナ"
# 「それで、どうした？　貴殿ら、だんまりと私を見つめて」
line = "「それで、どうした？　貴殿ら、だんまりと私を見つめて」"

[[dialogue]]
speaker = "アナ"
# 「スイカだ……スイカがある……」
line = "「スイカだ……スイカがある……」"

[[dialogue]]
speaker = "マトイ"
# 「ごくっ……いいなあ……私もあんなふうに……」
line = "「ごくっ……いいなあ……私もあんなふうに……」"

[[dialogue]]
speaker = "アポロ"
# 「なるほどな──これがナイスバディってやつか！」
line = "「なるほどな──これがナイスバディってやつか！」"

[[dialogue]]
speaker = "ヘレナ"
# 「ふふふ。九浄家当主たるもの、スタイルの維持は怠っていない。どうだ魔王、私の水着姿は？」
line = "「ふふふ。九浄家当主たるもの、スタイルの維持は怠っていない。どうだ魔王、私の水着姿は？」"

[[dialogue]]
speaker = "unk"
# おみそれしました
line = "おみそれしました"

[[dialogue]]
speaker = "unk"
# すごい
line = "すごい"

[[dialogue]]
speaker = "ヘレナ"
# 「はっはっはっ！　そうであろうそうであろう」
line = "「はっはっはっ！　そうであろうそうであろう」"

[[dialogue]]
speaker = "ヴィーナス"
# 「もう！　あなたも調子のいいこと言ってないで」
line = "「もう！　あなたも調子のいいこと言ってないで」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それより──ヘレナちゃんがここにいるってのは、もしかして……」
line = "「それより──ヘレナちゃんがここにいるってのは、もしかして……」"

[[dialogue]]
speaker = "リップル"
# 「そうデース！　何を隠そう、ヘレナちゃんこそ今回の特別イベントのスポンサーサンなのデース！」
line = "「そうデース！　何を隠そう、ヘレナちゃんこそ今回の特別イベントのスポンサーサンなのデース！」"

[[dialogue]]
speaker = "マトイ"
# 「えええええ！？」
line = "「えええええ！？」"

[[dialogue]]
speaker = "ルリエル"
# 「驚きです！」
line = "「驚きです！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「どういうことなのよ！？」
line = "「どういうことなのよ！？」"

[[dialogue]]
speaker = "ヘレナ"
# 「聞いての通りだ。今度の水着コンテストは、我が九浄家が全面的にバックアップさせていただく」
line = "「聞いての通りだ。今度の水着コンテストは、我が九浄家が全面的にバックアップさせていただく」"

[[dialogue]]
speaker = "ヘレナ"
# 「今はその準備段階。というわけで調査隊の諸君、リサーチをよろしく頼んだぞ」
line = "「今はその準備段階。というわけで調査隊の諸君、リサーチをよろしく頼んだぞ」"

[[dialogue]]
speaker = "せつな"
# 「はい！　でござる！」
line = "「はい！　でござる！」"

[[dialogue]]
speaker = "閃"
# 「承知しました、当主様」
line = "「承知しました、当主様」"

[[dialogue]]
speaker = "ヴィーナス"
# 「せつな、センちゃんまで！？」
line = "「せつな、センちゃんまで！？」"

[[dialogue]]
speaker = "ヘレナ"
# 「水着コンテストの本番へ向けて、ここのビーチの実地リサーチを行ってもらう」
line = "「水着コンテストの本番へ向けて、ここのビーチの実地リサーチを行ってもらう」"

[[dialogue]]
speaker = "ソフィア"
# 「せっかくのリゾートなのに……」
line = "「せっかくのリゾートなのに……」"

[[dialogue]]
speaker = "せつな"
# 「これも任務でござる！　当主様のご命令とあらば、海の果てまでもでござる！」
line = "「これも任務でござる！　当主様のご命令とあらば、海の果てまでもでござる！」"

[[dialogue]]
speaker = "閃"
# （お嬢様の水着をまじまじと拝める格好のチャンスを逃すことだけは、少々もったいないところではありますが……）
line = "（お嬢様の水着をまじまじと拝める格好のチャンスを逃すことだけは、少々もったいないところではありますが……）"

[[dialogue]]
speaker = "unk"
# メイド隊の子たちは砂浜を駆けていってしまった。
line = "メイド隊の子たちは砂浜を駆けていってしまった。"

[[dialogue]]
speaker = "ソフィア"
# 「なんだか可哀想な気もしてきました……」
line = "「なんだか可哀想な気もしてきました……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「何を企んでるの？　ヘレナちゃん」
line = "「何を企んでるの？　ヘレナちゃん」"

[[dialogue]]
speaker = "ヘレナ"
# 「企んでなどいない。先日、偶然このビーチをうかがった時に、水着コンテストを行うか行わぬかという話が聞こえてきたのだ」
line = "「企んでなどいない。先日、偶然このビーチをうかがった時に、水着コンテストを行うか行わぬかという話が聞こえてきたのだ」"

[[dialogue]]
speaker = "ヘレナ"
# 「一流のイベンターである私としては、協力せざるをえまい？」
line = "「一流のイベンターである私としては、協力せざるをえまい？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そういう嗅覚だけは鋭いんだから……」
line = "「そういう嗅覚だけは鋭いんだから……」"

[[dialogue]]
speaker = "ヘレナ"
# 「知っているか？　このリップルは海の家を経営する夫婦に拾われ、以来、人々のハッピーな顔を見たくてこのリゾート結界を作ったのだ」
line = "「知っているか？　このリップルは海の家を経営する夫婦に拾われ、以来、人々のハッピーな顔を見たくてこのリゾート結界を作ったのだ」"

[[dialogue]]
speaker = "ソフィア"
# 「はい。心打たれる想いです」
line = "「はい。心打たれる想いです」"

[[dialogue]]
speaker = "ヘレナ"
# 「くっ……泣かせるではないか。この九浄ヘレナ、リップルの心意気にいたく感動した！　雲の上のご夫婦も、このリゾートの発展を見守ってくれているであろう──」
line = "「くっ……泣かせるではないか。この九浄ヘレナ、リップルの心意気にいたく感動した！　雲の上のご夫婦も、このリゾートの発展を見守ってくれているであろう──」"

[[dialogue]]
speaker = "リップル"
# 「Ｏｈ、シショーはまだ生きてマース」
line = "「Ｏｈ、シショーはまだ生きてマース」"

[[dialogue]]
speaker = "ヴィーナス"
# 「なんか、全体的にすっごくうさんくさいんですけど……」
line = "「なんか、全体的にすっごくうさんくさいんですけど……」"

[[dialogue]]
speaker = "ヘレナ"
# 「人聞きの悪い。ただ、私の海よりも深い厚意によるものだ」
line = "「人聞きの悪い。ただ、私の海よりも深い厚意によるものだ」"

[[dialogue]]
speaker = "ヘレナ"
# 「ただの催し物ではなく、より大々的な水着コンテストを！　我が九浄家のサポートがあれば、このリゾートをより盛況にするお手伝いができるだろう……と」
line = "「ただの催し物ではなく、より大々的な水着コンテストを！　我が九浄家のサポートがあれば、このリゾートをより盛況にするお手伝いができるだろう……と」"

[[dialogue]]
speaker = "リップル"
# 「ヘレナちゃんはたいへん心優しいお方デース！」
line = "「ヘレナちゃんはたいへん心優しいお方デース！」"

[[dialogue]]
speaker = "ヘレナ"
# 「さ、リップル。この不肖の娘は放っておいて、イベントのミーティングといこうではないか」
line = "「さ、リップル。この不肖の娘は放っておいて、イベントのミーティングといこうではないか」"

[[dialogue]]
speaker = "リップル"
# 「ハーイ、デース！」
line = "「ハーイ、デース！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「嫌な予感しかしないわ……」
line = "「嫌な予感しかしないわ……」"

[[dialogue]]
speaker = "unk"
# 何やら引っかかりを覚えつつも、その日はビーチを満喫するのだった……。
line = "何やら引っかかりを覚えつつも、その日はビーチを満喫するのだった……。"
