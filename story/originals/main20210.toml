[[dialogue]]
speaker = "unk"
# 第１０話,監視者,B
line = "第１０話,監視者,B"

[[dialogue]]
speaker = "アポロ"
# 「なあなあ、あたしたちは何ブロックなんだ？」
line = "「なあなあ、あたしたちは何ブロックなんだ？」"

[[dialogue]]
speaker = "梨緒"
# 「ＤＩＳＣで確認しよう。……これか。私たちはＧブロックのようだな」
line = "「ＤＩＳＣで確認しよう。……これか。私たちはＧブロックのようだな」"

[[dialogue]]
speaker = "ナターシャ"
# 「ふーん、なるほど。人間界の機械は便利だね」
line = "「ふーん、なるほど。人間界の機械は便利だね」"

[[dialogue]]
speaker = "ベアトリス"
# 「もうすぐ始まるんですね……ドキドキ……」
line = "「もうすぐ始まるんですね……ドキドキ……」"

[[dialogue]]
speaker = "梨緒"
# 「で……ナターシャ。君の目的は何だ？」
line = "「で……ナターシャ。君の目的は何だ？」"

[[dialogue]]
speaker = "アポロ"
# 「ん？　どうしたんだ、急に？」
line = "「ん？　どうしたんだ、急に？」"

[[dialogue]]
speaker = "ナターシャ"
# 「そうそう、これからお楽しみだってのに、野暮な話はやめようよ」
line = "「そうそう、これからお楽しみだってのに、野暮な話はやめようよ」"

[[dialogue]]
speaker = "梨緒"
# 「こんな時だからこそ、だ」
line = "「こんな時だからこそ、だ」"

[[dialogue]]
speaker = "ナターシャ"
# 「ふーん、ま、いいけどね。前にも言った通り、魔王の監視だよ」
line = "「ふーん、ま、いいけどね。前にも言った通り、魔王の監視だよ」"

[[dialogue]]
speaker = "梨緒"
# 「それは事実だろう。だが、ただの監視ではない」
line = "「それは事実だろう。だが、ただの監視ではない」"

[[dialogue]]
speaker = "梨緒"
# 「やむを得ない時は魔王を消せと命令されている……違うか？」
line = "「やむを得ない時は魔王を消せと命令されている……違うか？」"

[[dialogue]]
speaker = "ナターシャ"
# 「へぇ……」
line = "「へぇ……」"

[[dialogue]]
speaker = "ベアトリス"
# 「え……？　それって……暗殺者ってこと！？」
line = "「え……？　それって……暗殺者ってこと！？」"

[[dialogue]]
speaker = "アポロ"
# 「暗殺者！？」
line = "「暗殺者！？」"

[[dialogue]]
speaker = "ベアトリス"
# 「ど、どうして嬉しそうなんですか……？」
line = "「ど、どうして嬉しそうなんですか……？」"

[[dialogue]]
speaker = "アポロ"
# 「しまった。暗殺者と聞いて、ついワクワクしてしまったぞ」
line = "「しまった。暗殺者と聞いて、ついワクワクしてしまったぞ」"

[[dialogue]]
speaker = "アポロ"
# 「だが、もし隠れて悪いことをしようとしているなら、この流星ライダーアポロが見逃さないぞ！」
line = "「だが、もし隠れて悪いことをしようとしているなら、この流星ライダーアポロが見逃さないぞ！」"

[[dialogue]]
speaker = "ナターシャ"
# 「プルプル、私、悪い暗殺者じゃないよ～」
line = "「プルプル、私、悪い暗殺者じゃないよ～」"

[[dialogue]]
speaker = "ベアトリス"
# 「わわっ、さっそく内部監査官のお仕事を果たしてます」
line = "「わわっ、さっそく内部監査官のお仕事を果たしてます」"

[[dialogue]]
speaker = "アポロ"
# 「そういうことだ！　あたしの目が<ruby=あか>緋</ruby>いうちは、選挙管理委員会の中でのズルや悪事は許さないからな」
line = "「そういうことだ！　あたしの目が<ruby>緋<rt>あか</rt></ruby>いうちは、選挙管理委員会の中でのズルや悪事は許さないからな」"

[[dialogue]]
speaker = "梨緒"
# 「ありがとう、アポロ。ただここは、委員長である私に任せて欲しい」
line = "「ありがとう、アポロ。ただここは、委員長である私に任せて欲しい」"

[[dialogue]]
speaker = "アポロ"
# 「むむ……まあ、そうか。ボスに花を持たせるのも、エースの役割ってことだよな！」
line = "「むむ……まあ、そうか。ボスに花を持たせるのも、エースの役割ってことだよな！」"

[[dialogue]]
speaker = "ナターシャ"
# 「なるほど……梨緒はいろいろ知ってるみたいだね。もしかして聖庭園に知り合いでもいるの？」
line = "「なるほど……梨緒はいろいろ知ってるみたいだね。もしかして聖庭園に知り合いでもいるの？」"

[[dialogue]]
speaker = "梨緒"
# 「まぁな。以前、少々世話になった」
line = "「まぁな。以前、少々世話になった」"

[[dialogue]]
speaker = "ベアトリス"
# 「せ、聖庭園ってそんなに怖いところなんですね……」
line = "「せ、聖庭園ってそんなに怖いところなんですね……」"

[[dialogue]]
speaker = "梨緒"
# 「是非はともかくとして、国家なら敵対する要人の暗殺を行うこともある。天界は１つの国家であり、聖庭園はその中枢。それくらいしてもおかしくない」
line = "「是非はともかくとして、国家なら敵対する要人の暗殺を行うこともある。天界は１つの国家であり、聖庭園はその中枢。それくらいしてもおかしくない」"

[[dialogue]]
speaker = "ナターシャ"
# 「ま、命令を受けてるのは否定はしないけどね。選管を選んだのは利害の一致ってやつだよ」
line = "「ま、命令を受けてるのは否定はしないけどね。選管を選んだのは利害の一致ってやつだよ」"

[[dialogue]]
speaker = "梨緒"
# 「理由はもう１つあるだろう。私の監視だ」
line = "「理由はもう１つあるだろう。私の監視だ」"

[[dialogue]]
speaker = "ナターシャ"
# 「うん。だってあなた怪しいし。見張っとかないとね」
line = "「うん。だってあなた怪しいし。見張っとかないとね」"

[[dialogue]]
speaker = "梨緒"
# 「ならお互い様だな。魔王は──緋宮クロトは勝手にやらせない」
line = "「ならお互い様だな。魔王は──緋宮クロトは勝手にやらせない」"

[[dialogue]]
speaker = "ナターシャ"
# 「おや？　彼にはいなくなってほしいんじゃなかったの？　御前試合で退学にしようとしたんじゃなかったっけ？」
line = "「おや？　彼にはいなくなってほしいんじゃなかったの？　御前試合で退学にしようとしたんじゃなかったっけ？」"

[[dialogue]]
speaker = "梨緒"
# 「あくまで彼が闇に堕ちるなら、の話だ。彼が正しい道を歩む限りは、排除の必要はない」
line = "「あくまで彼が闇に堕ちるなら、の話だ。彼が正しい道を歩む限りは、排除の必要はない」"

[[dialogue]]
speaker = "梨緒"
# 「それに魔王を止めるのは……私だ」
line = "「それに魔王を止めるのは……私だ」"

[[dialogue]]
speaker = "ナターシャ"
# 「言うねぇ。独占欲ってやつ？」
line = "「言うねぇ。独占欲ってやつ？」"

[[dialogue]]
speaker = "梨緒"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "ナターシャ"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "ベアトリス"
# 「な、仲良くしましょうよーっ」
line = "「な、仲良くしましょうよーっ」"

[[dialogue]]
speaker = "アポロ"
# 「いやいや、こういう序盤のぶつかり合いこそが、チームの結束を高め、終盤の熱い展開に繋がるんだぞ！」
line = "「いやいや、こういう序盤のぶつかり合いこそが、チームの結束を高め、終盤の熱い展開に繋がるんだぞ！」"

[[dialogue]]
speaker = "ベアトリス"
# 「いったい何の話をしてるんですかぁ！？」
line = "「いったい何の話をしてるんですかぁ！？」"

[[dialogue]]
speaker = "アポロ"
# 「流星ライダーのお約束の展開って奴だ！　序盤に仲が悪い組み合わせほど、最後には深い友情で結ばれるんだ」
line = "「流星ライダーのお約束の展開って奴だ！　序盤に仲が悪い組み合わせほど、最後には深い友情で結ばれるんだ」"

[[dialogue]]
speaker = "梨緒"
# 「ふぅ……まあいい。聖庭園の目的も、意味はわかる」
line = "「ふぅ……まあいい。聖庭園の目的も、意味はわかる」"

[[dialogue]]
speaker = "梨緒"
# 「性急な判断だけはしないでもらいたいところだが……今はナターシャも同じ選管だ。お互いに協力し合おう」
line = "「性急な判断だけはしないでもらいたいところだが……今はナターシャも同じ選管だ。お互いに協力し合おう」"

[[dialogue]]
speaker = "ナターシャ"
# 「了解。私としても余計な仕事は増やしたくないから、穏便にことが進むことを祈ってるよ」
line = "「了解。私としても余計な仕事は増やしたくないから、穏便にことが進むことを祈ってるよ」"

[[dialogue]]
speaker = "ベアトリス"
# 「あのあの！　ところでなんですけど、ニューヨークって何です！？」
line = "「あのあの！　ところでなんですけど、ニューヨークって何です！？」"

[[dialogue]]
speaker = "ベアトリス"
# 「ああいえ、アメリカの都市ってことは知ってるんですけど……『行きたいか？』って聞かれても……」
line = "「ああいえ、アメリカの都市ってことは知ってるんですけど……『行きたいか？』って聞かれても……」"

[[dialogue]]
speaker = "ナターシャ"
# 「さぁ？　ニューヨークってそんなに人気なの？」
line = "「さぁ？　ニューヨークってそんなに人気なの？」"

[[dialogue]]
speaker = "アポロ"
# 「昔そういうのがあったみたいだぞ。流星ライダーの『守れ、クイズ名人！』の回でも、同じようなことやってたからな！」
line = "「昔そういうのがあったみたいだぞ。流星ライダーの『守れ、クイズ名人！』の回でも、同じようなことやってたからな！」"

[[dialogue]]
speaker = "梨緒"
# 「外国でいうなら、私はむしろロンドンの方が馴染みがあるな。昔住んでいたし」
line = "「外国でいうなら、私はむしろロンドンの方が馴染みがあるな。昔住んでいたし」"

[[dialogue]]
speaker = "ナターシャ"
# 「ロンドンって、霧の都とか言われてるんだよね。いかにも仕事がしやすそうだ」
line = "「ロンドンって、霧の都とか言われてるんだよね。いかにも仕事がしやすそうだ」"

[[dialogue]]
speaker = "ベアトリス"
# 「ひっ」
line = "「ひっ」"

[[dialogue]]
speaker = "梨緒"
# 「ベアトリスを脅かすな、暗殺者」
line = "「ベアトリスを脅かすな、暗殺者」"

[[dialogue]]
speaker = "ナターシャ"
# 「はーい」
line = "「はーい」"

[[dialogue]]
speaker = "紅明"
# 『おーし、みんな自分のブロックがわかったか～？　不具合があるなら今のうちに言ってくれよな』
line = "『おーし、みんな自分のブロックがわかったか～？　不具合があるなら今のうちに言ってくれよな』"

[[dialogue]]
speaker = "unk"
# そうこうしているうちに、司会の紅明が再びマイクを握り、クイズ大会が本格的に始まるのだった。
line = "そうこうしているうちに、司会の紅明が再びマイクを握り、クイズ大会が本格的に始まるのだった。"
