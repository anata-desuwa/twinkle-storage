[[dialogue]]
speaker = "unk"
# 第６話,最後の階,B
line = "第６話,最後の階,B"

[[dialogue]]
speaker = "敗残の亡霊"
# 『グ……ガ……ガァァッ……貴、様…………！』
line = "『グ……ガ……ガァァッ……貴、様…………！』"

[[dialogue]]
speaker = "敗残の亡霊"
# 『俺ハ……俺ハ決して滅びぬ……！　リクリエの到来と共に……チャカパラ様の誕生を見届けるまで……！』
line = "『俺ハ……俺ハ決して滅びぬ……！　リクリエの到来と共に……チャカパラ様の誕生を見届けるまで……！』"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふーんだ！　あんたなんか魔王に敵いっこないんだから！」
line = "「ふーんだ！　あんたなんか魔王に敵いっこないんだから！」"

[[dialogue]]
speaker = "ニャリオン"
# 「そうニャそうニャ。まったくしつこい野郎ニャン」
line = "「そうニャそうニャ。まったくしつこい野郎ニャン」"

[[dialogue]]
speaker = "unk"
# 瘴気の薄まっていくなかで、亡霊は最後に俺へ言葉を遺した。
line = "瘴気の薄まっていくなかで、亡霊は最後に俺へ言葉を遺した。"

[[dialogue]]
speaker = "敗残の亡霊"
# 『血は受け継がれるものだ……貴様がそうだったように──』
line = "『血は受け継がれるものだ……貴様がそうだったように──』"

[[dialogue]]
speaker = "クロト"
# 「！」
line = "「！」"

[[dialogue]]
speaker = "敗残の亡霊"
# 『故ニ、俺は……何度でも……よみがえ、る……ォォォォーン…………！』
line = "『故ニ、俺は……何度でも……よみがえ、る……ォォォォーン…………！』"

[[dialogue]]
speaker = "unk"
# うめくような断末魔を残して──バジュラ教団の亡霊は消え去っていった。
line = "うめくような断末魔を残して──バジュラ教団の亡霊は消え去っていった。"

[[dialogue]]
speaker = "マトイ"
# 「ほ……やっと消えてくれた。怖かったー」
line = "「ほ……やっと消えてくれた。怖かったー」"

[[dialogue]]
speaker = "ソフィア"
# 「あ……オーブも無くなりましたね」
line = "「あ……オーブも無くなりましたね」"

[[dialogue]]
speaker = "ユウリ"
# 「完全討伐ってことだな」
line = "「完全討伐ってことだな」"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロトもフィオナも最高潮じゃない──ここをサクッと通過できたのは大きいわよ！」
line = "「クロトもフィオナも最高潮じゃない──ここをサクッと通過できたのは大きいわよ！」"

[[dialogue]]
speaker = "フィオナ"
# 「あの黒騎士に比べれば……まだ易しい相手でしたね」
line = "「あの黒騎士に比べれば……まだ易しい相手でしたね」"

[[dialogue]]
speaker = "クロト"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# 亡霊からの呪言を浴びて、俺にも先代魔王の苦悩がなんとなくわかった気がした。
line = "亡霊からの呪言を浴びて、俺にも先代魔王の苦悩がなんとなくわかった気がした。"

[[dialogue]]
speaker = "クロト"
# （リクリエを救った英雄と言っても──みんなから支持されてたわけじゃない。色んなものを抱えていたんだろう）
line = "（リクリエを救った英雄と言っても──みんなから支持されてたわけじゃない。色んなものを抱えていたんだろう）"

[[dialogue]]
speaker = "unk"
# 過去の因縁も気になるところだったが……ひとまず今は門番の突破を喜びたい。
line = "過去の因縁も気になるところだったが……ひとまず今は門番の突破を喜びたい。"

[[dialogue]]
speaker = "サーシャ"
# 「この層の主を倒せた──ってことなら、もしかして……」
line = "「この層の主を倒せた──ってことなら、もしかして……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「！　見て、階段が現れたわ！」
line = "「！　見て、階段が現れたわ！」"

[[dialogue]]
speaker = "ユウリ"
# 「ってことは、もしかして──」
line = "「ってことは、もしかして──」"

[[dialogue]]
speaker = "マトイ"
# 「この先に……人間界が！」
line = "「この先に……人間界が！」"

[[dialogue]]
speaker = "unk"
# 無機質な空間の最奥に、輝く<ruby=きざはし>階</ruby>が出現した。
line = "無機質な空間の最奥に、輝く<ruby>階<rt>きざはし</rt></ruby>が出現した。"

[[dialogue]]
speaker = "クロト"
# 「行こう。出口は近い」
line = "「行こう。出口は近い」"

[[dialogue]]
speaker = "unk"
# そうして、俺たちはフィーニスの塔・第零層を踏破する──
line = "そうして、俺たちはフィーニスの塔・第零層を踏破する──"

[[dialogue]]
speaker = "unk"
# その直前で、俺は初めて直に<b>彼女</b>の囁きを聞いた。
line = "その直前で、俺は初めて直に<b>彼女</b>の囁きを聞いた。"

[[dialogue]]
speaker = "テルル"
# 『聞こえますか？　緋宮クロト』
line = "『聞こえますか？　緋宮クロト』"

[[dialogue]]
speaker = "テルル"
# 『これは……私に許された最後の伝言。あなたへと捧げる──魔王の運命の記録です』
line = "『これは……私に許された最後の伝言。あなたへと捧げる──魔王の運命の記録です』"
