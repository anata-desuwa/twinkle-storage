[[dialogue]]
speaker = "unk"
# 第２話,あざといメロウメロン,P
line = "第２話,あざといメロウメロン,P"

[[dialogue]]
speaker = "unk"
# リーリアと知り合ってから、１ヵ月程が経ったある日──
line = "リーリアと知り合ってから、１ヵ月程が経ったある日──"

[[dialogue]]
speaker = "リーリア"
# 「セ～ンパイ♪　今日も遊びに来ちゃいました☆」
line = "「セ～ンパイ♪　今日も遊びに来ちゃいました☆」"

[[dialogue]]
speaker = "リーリア"
# 「おや、どうしました？　物言いたげな顔をして。遠慮などせず、私の可愛さを存分に褒め称えてくれてもいいんですよ？」
line = "「おや、どうしました？　物言いたげな顔をして。遠慮などせず、私の可愛さを存分に褒め称えてくれてもいいんですよ？」"

[[dialogue]]
speaker = "unk"
# 全然変わりないなと思って
line = "全然変わりないなと思って"

[[dialogue]]
speaker = "unk"
# いや、一目惚れが嘘だとバレたのに、
line = "いや、一目惚れが嘘だとバレたのに、"

[[dialogue]]
speaker = "unk"
# ──リーリアの言動があざといので、つい先日、一目惚れは嘘だったのではとツッコんだら、「バレちゃいました？　てへぺろ☆」とあっさり認めたのだった。
line = "──リーリアの言動があざといので、つい先日、一目惚れは嘘だったのではとツッコんだら、「バレちゃいました？　てへぺろ☆」とあっさり認めたのだった。"

[[dialogue]]
speaker = "リーリア"
# 「いや～、だって今更じゃないですか？　私はもう、センパイの可愛い後輩なわけですし♪」
line = "「いや～、だって今更じゃないですか？　私はもう、センパイの可愛い後輩なわけですし♪」"

[[dialogue]]
speaker = "リーリア"
# 「私はセンパイとお近づきになりたい。センパイは可愛い私を享受できる」
line = "「私はセンパイとお近づきになりたい。センパイは可愛い私を享受できる」"

[[dialogue]]
speaker = "リーリア"
# 「──これってまさに、利害一致した美しい『ウィンウィン』の関係というやつですよね♪」
line = "「──これってまさに、利害一致した美しい『ウィンウィン』の関係というやつですよね♪」"

[[dialogue]]
speaker = "リーリア"
# 「というわけで、え～い☆」
line = "「というわけで、え～い☆」"

[[dialogue]]
speaker = "リーリア"
# 「センパ～イ、可愛い後輩と遊んで下さい～♪」
line = "「センパ～イ、可愛い後輩と遊んで下さい～♪」"

[[dialogue]]
speaker = "unk"
# あー、はいはい、そういうあざといのはいいから
line = "あー、はいはい、そういうあざといのはいいから"

[[dialogue]]
speaker = "リーリア"
# 「真顔でスルー！？」
line = "「真顔でスルー！？」"

[[dialogue]]
speaker = "リーリア"
# 「センパイ最近、私の扱い雑になってません！？」
line = "「センパイ最近、私の扱い雑になってません！？」"

[[dialogue]]
speaker = "リーリア"
# 「というか、私のような美少女にボディータッチされてるのに、どうして喜ばないんですか！？　利害一致してますよね！？」
line = "「というか、私のような美少女にボディータッチされてるのに、どうして喜ばないんですか！？　利害一致してますよね！？」"

[[dialogue]]
speaker = "unk"
# 素の性格を見せるようになったよね
line = "素の性格を見せるようになったよね"

[[dialogue]]
speaker = "unk"
# リーリアの方はいつの間にか、
line = "リーリアの方はいつの間にか、"

[[dialogue]]
speaker = "リーリア"
# 「センパイが面倒臭いせいです！　普通の男性は、美少女がこうやって腕に抱き付いて来たら、もっとデレデレするもんでしょう！？」
line = "「センパイが面倒臭いせいです！　普通の男性は、美少女がこうやって腕に抱き付いて来たら、もっとデレデレするもんでしょう！？」"

[[dialogue]]
speaker = "リーリア"
# 「って、センパイ、なに平然と仕事しちゃってるんですか！　せめて可愛い後輩とイチャイチャトークくらいして下さいよ～！」
line = "「って、センパイ、なに平然と仕事しちゃってるんですか！　せめて可愛い後輩とイチャイチャトークくらいして下さいよ～！」"

[[dialogue]]
speaker = "サーシャ"
# 「お疲れ様～……って、あら～？」
line = "「お疲れ様～……って、あら～？」"

[[dialogue]]
speaker = "サーシャ"
# 「あらあら♪　会長くんとリーリアちゃん、何だか楽しそうなことしてるわね～♪」
line = "「あらあら♪　会長くんとリーリアちゃん、何だか楽しそうなことしてるわね～♪」"

[[dialogue]]
speaker = "サーシャ"
# 「お姉ちゃんも混ぜて～♪」
line = "「お姉ちゃんも混ぜて～♪」"

[[dialogue]]
speaker = "unk"
# ちょっ、サーシャさん！？
line = "ちょっ、サーシャさん！？"

[[dialogue]]
speaker = "リーリア"
# 「まさかの乱入！？」
line = "「まさかの乱入！？」"

[[dialogue]]
speaker = "サーシャ"
# 「あらあら、会長くん？　もしかしてお姉ちゃんに抱き着かれて、照れてるのかしら♪　うふふ、顔が赤くなってるわよ～？」
line = "「あらあら、会長くん？　もしかしてお姉ちゃんに抱き着かれて、照れてるのかしら♪　うふふ、顔が赤くなってるわよ～？」"

[[dialogue]]
speaker = "unk"
# 胸が当たってるので、あんまり密着されると、その……
line = "胸が当たってるので、あんまり密着されると、その……"

[[dialogue]]
speaker = "リーリア"
# 「いや、なんでサーシャさんの時だけそういう反応！？　理不尽なんですけど！」
line = "「いや、なんでサーシャさんの時だけそういう反応！？　理不尽なんですけど！」"

[[dialogue]]
speaker = "リーリア"
# 「やはりおっぱいですか！？　おっぱいの大きさが問題なんですか！？」
line = "「やはりおっぱいですか！？　おっぱいの大きさが問題なんですか！？」"

[[dialogue]]
speaker = "unk"
# 天然でやってて不意打ちっていうか……
line = "天然でやってて不意打ちっていうか……"

[[dialogue]]
speaker = "unk"
# サーシャさんの場合、
line = "サーシャさんの場合、"

[[dialogue]]
speaker = "リーリア"
# 「天然！？　天然って、はっ……！」
line = "「天然！？　天然って、はっ……！」"

[[dialogue]]
speaker = "リーリア"
# 「ま、まさかセンパイ──」
line = "「ま、まさかセンパイ──」"

[[dialogue]]
speaker = "リーリア"
# 「私の胸が……<ruby=パッド入り>偽乳</ruby>だって、気付いてたんですか！？」
line = "「私の胸が……<ruby>偽乳<rt>パッド入り</rt></ruby>だって、気付いてたんですか！？」"

[[dialogue]]
speaker = "サーシャ"
# 「えっ？　そうだったの……？」
line = "「えっ？　そうだったの……？」"

[[dialogue]]
speaker = "unk"
# スルーしてたのに……
line = "スルーしてたのに……"

[[dialogue]]
speaker = "unk"
# 実はそうかなって思ってたけど、
line = "実はそうかなって思ってたけど、"

[[dialogue]]
speaker = "リーリア"
# 「ぬあぁぁぁ！　まさかの自爆カミングアウトだったぁぁぁ！」
line = "「ぬあぁぁぁ！　まさかの自爆カミングアウトだったぁぁぁ！」"

[[dialogue]]
speaker = "リーリア"
# 「センパイのバカ！　鬼畜！」
line = "「センパイのバカ！　鬼畜！」"

[[dialogue]]
speaker = "unk"
# 俺のせいじゃなくない！？
line = "俺のせいじゃなくない！？"

[[dialogue]]
speaker = "リーリア"
# 「センパイのおっぱい星人～！！！」
line = "「センパイのおっぱい星人～！！！」"

[[dialogue]]
speaker = "サーシャ"
# 「あらあら。リーリアちゃん、逃げちゃったわね～」
line = "「あらあら。リーリアちゃん、逃げちゃったわね～」"

[[dialogue]]
speaker = "サーシャ"
# 「……ねぇ、会長くん。本当はリーリアちゃんにくっ付かれて、ドキドキしてたんじゃない？」
line = "「……ねぇ、会長くん。本当はリーリアちゃんにくっ付かれて、ドキドキしてたんじゃない？」"

[[dialogue]]
speaker = "サーシャ"
# 「うふふ～♪　誤魔化してても、お姉ちゃんには分かっちゃうんだから。……意地になるリーリアちゃんが可愛いから、何でもないフリしてからかっちゃうんでしょう？」
line = "「うふふ～♪　誤魔化してても、お姉ちゃんには分かっちゃうんだから。……意地になるリーリアちゃんが可愛いから、何でもないフリしてからかっちゃうんでしょう？」"

[[dialogue]]
speaker = "サーシャ"
# 「でも、たまにはちゃんとフォローしてあげなきゃダメよ？　口にしなきゃ伝わらないこともあるってことは、会長くんが私に教えてくれたことでしょう？」
line = "「でも、たまにはちゃんとフォローしてあげなきゃダメよ？　口にしなきゃ伝わらないこともあるってことは、会長くんが私に教えてくれたことでしょう？」"

[[dialogue]]
speaker = "unk"
# （確かに、今回はやりすぎたかも……）
line = "（確かに、今回はやりすぎたかも……）"

[[dialogue]]
speaker = "unk"
# 後でリーリアに何かお詫びをしよう、と俺は考え始めるのだった。
line = "後でリーリアに何かお詫びをしよう、と俺は考え始めるのだった。"
