[[dialogue]]
speaker = "unk"
# 次の休日。
line = "次の休日。"

[[dialogue]]
speaker = "unk"
# イレーナとシャロンと一緒に、子どもたちへのクリスマスプレゼントを買い求めて街を巡った。
line = "イレーナとシャロンと一緒に、子どもたちへのクリスマスプレゼントを買い求めて街を巡った。"

[[dialogue]]
speaker = "unk"
# その後──
line = "その後──"

[[dialogue]]
speaker = "シャロン"
# 「パーティー開始までここに置かせていただきますね。ふふ、イレーナさまと会長さまのおかげでいいプレゼントを購入できました！」
line = "「パーティー開始までここに置かせていただきますね。ふふ、イレーナさまと会長さまのおかげでいいプレゼントを購入できました！」"

[[dialogue]]
speaker = "イレーナ"
# 「はぁはぁ……それは何よりですけど、流石に買い込みすぎでは……。それにこの大量のクリスマスカードは……？」
line = "「はぁはぁ……それは何よりですけど、流石に買い込みすぎでは……。それにこの大量のクリスマスカードは……？」"

[[dialogue]]
speaker = "シャロン"
# 「プレゼントに女神様のありがたいお言葉を添えてお渡しできればと思いまして。女神様のお言葉は心の支えになりますから！」
line = "「プレゼントに女神様のありがたいお言葉を添えてお渡しできればと思いまして。女神様のお言葉は心の支えになりますから！」"

[[dialogue]]
speaker = "イレーナ"
# 「え？　まさかその量を１枚ずつ書くおつもりですか？」
line = "「え？　まさかその量を１枚ずつ書くおつもりですか？」"

[[dialogue]]
speaker = "シャロン"
# 「はい、そうですが……あ、クリスマスカード作りに没頭していては、肝心の準備が進められませんね」
line = "「はい、そうですが……あ、クリスマスカード作りに没頭していては、肝心の準備が進められませんね」"

[[dialogue]]
speaker = "イレーナ"
# 「そうではなくて。一旦、休憩を入れた方が……。散々街中を走り回ったわけですし……」
line = "「そうではなくて。一旦、休憩を入れた方が……。散々街中を走り回ったわけですし……」"

[[dialogue]]
speaker = "シャロン"
# 「いえいえ、休んでいる暇なんてありませんよ！　子どもたちがとびきりの笑顔になれるよう頑張らなくては！」
line = "「いえいえ、休んでいる暇なんてありませんよ！　子どもたちがとびきりの笑顔になれるよう頑張らなくては！」"

[[dialogue]]
speaker = "シャロン"
# 「これからも子どもたちが女神様のご加護を、愛を賜れるように、聖誕祭を言祝ぐのです。それがシスターたる私の務めでございますので！」
line = "「これからも子どもたちが女神様のご加護を、愛を賜れるように、聖誕祭を言祝ぐのです。それがシスターたる私の務めでございますので！」"

[[dialogue]]
speaker = "イレーナ"
# 「……女神様のご加護、ねぇ……」
line = "「……女神様のご加護、ねぇ……」"

[[dialogue]]
speaker = "シャロン"
# 「？？？　どうかなさいましたか？」
line = "「？？？　どうかなさいましたか？」"

[[dialogue]]
speaker = "イレーナ"
# 「ああ、いえ。だとしてもご無理をなさるのは如何なものかと……」
line = "「ああ、いえ。だとしてもご無理をなさるのは如何なものかと……」"

[[dialogue]]
speaker = "シャロン"
# 「ふふ、お気遣いありがとうございます。しかしご心配無用です。私はまだまだ元気ですから！」
line = "「ふふ、お気遣いありがとうございます。しかしご心配無用です。私はまだまだ元気ですから！」"

[[dialogue]]
speaker = "シャロン"
# 「イレーナさまはクリスマスカードの制作をお願いいたします！　私は飾り付けやお料理の準備を手伝ってきますね！」
line = "「イレーナさまはクリスマスカードの制作をお願いいたします！　私は飾り付けやお料理の準備を手伝ってきますね！」"

[[dialogue]]
speaker = "イレーナ"
# 「あっ、ちょっと──はぁ、ホント忙しないわね……」
line = "「あっ、ちょっと──はぁ、ホント忙しないわね……」"

[[dialogue]]
speaker = "イレーナ"
# 「張り切るなとは言わないけど大丈夫なのかしら……。ここのところずっと働きっぱなしみたいだし」
line = "「張り切るなとは言わないけど大丈夫なのかしら……。ここのところずっと働きっぱなしみたいだし」"

[[dialogue]]
speaker = "イレーナ"
# 「あの子、貧血持ちでしょ？　小さい頃に重い病気にかかったとも聞いたわ。今もちょくちょくダウンしてるし……頑張りすぎてまた倒れなきゃいいけど」
line = "「あの子、貧血持ちでしょ？　小さい頃に重い病気にかかったとも聞いたわ。今もちょくちょくダウンしてるし……頑張りすぎてまた倒れなきゃいいけど」"

[[dialogue]]
speaker = "unk"
# シャロンのことが心配？
line = "シャロンのことが心配？"

[[dialogue]]
speaker = "イレーナ"
# 「別に心配なんかしてないわよ。下手に倒れられたら仕事が増えて面倒ってだけ」
line = "「別に心配なんかしてないわよ。下手に倒れられたら仕事が増えて面倒ってだけ」"

[[dialogue]]
speaker = "イレーナ"
# 「まったくもう、シャロンってば女神サマとやらがそんなに大事なのかしら。意味わかんないわ」
line = "「まったくもう、シャロンってば女神サマとやらがそんなに大事なのかしら。意味わかんないわ」"

[[dialogue]]
speaker = "イレーナ"
# 「ていうか、女神サマってのが本当にいるのなら、どうしてあたしなんかにこんな力をよこしたのよ。どう考えても人選ミスでしょうが」
line = "「ていうか、女神サマってのが本当にいるのなら、どうしてあたしなんかにこんな力をよこしたのよ。どう考えても人選ミスでしょうが」"

[[dialogue]]
speaker = "イレーナ"
# 「──って、こんなこと考えてても疲れるだけね。ん～……やっと解放してもらえたわけだし、ちょっと休憩しましょ♪」
line = "「──って、こんなこと考えてても疲れるだけね。ん～……やっと解放してもらえたわけだし、ちょっと休憩しましょ♪」"

[[dialogue]]
speaker = "イレーナ"
# 「あ、このソファいいじゃない。このところ書類仕事が溜まってて寝不足だったのよねー。じゃああたし、仮眠するから。クリスマスカード作るのは任せたわよ♪」
line = "「あ、このソファいいじゃない。このところ書類仕事が溜まってて寝不足だったのよねー。じゃああたし、仮眠するから。クリスマスカード作るのは任せたわよ♪」"

[[dialogue]]
speaker = "unk"
# ちょっと用事を思い出し──
line = "ちょっと用事を思い出し──"

[[dialogue]]
speaker = "イレーナ"
# 「──逃がすと思う？　いいから誰も教室に入ってこないように見張ってなさいってば」
line = "「──逃がすと思う？　いいから誰も教室に入ってこないように見張ってなさいってば」"

[[dialogue]]
speaker = "イレーナ"
# 「あたしは、その……。あんたと２人きりの時くらいしか気を抜けないんだから……」
line = "「あたしは、その……。あんたと２人きりの時くらいしか気を抜けないんだから……」"

[[dialogue]]
speaker = "イレーナ"
# 「ん……？　なんか騒がしいわね……。目が覚めちゃったじゃない……」
line = "「ん……？　なんか騒がしいわね……。目が覚めちゃったじゃない……」"

[[dialogue]]
speaker = "unk"
# 何かあったのかな
line = "何かあったのかな"

[[dialogue]]
speaker = "サラン"
# 「あ～、イレーナさん見つけたぁ……！　悪いけど、すぐ来て～！」
line = "「あ～、イレーナさん見つけたぁ……！　悪いけど、すぐ来て～！」"

[[dialogue]]
speaker = "イレーナ"
# 「サランさん？　どうかされましたか？」
line = "「サランさん？　どうかされましたか？」"

[[dialogue]]
speaker = "サラン"
# 「シャロンさんが倒れちゃったの～～！」
line = "「シャロンさんが倒れちゃったの～～！」"

[[dialogue]]
speaker = "イレーナ"
# 「！」
line = "「！」"

[[dialogue]]
speaker = "イレーナ"
# 「……軽い貧血ですね。ですから言ったではありませんか」
line = "「……軽い貧血ですね。ですから言ったではありませんか」"

[[dialogue]]
speaker = "シャロン"
# 「うぅ、返す言葉もございません……」
line = "「うぅ、返す言葉もございません……」"

[[dialogue]]
speaker = "イレーナ"
# 「これに懲りたらあまり無理をしないでください。貧血といえど倒れる場所によっては命に関わりますから」
line = "「これに懲りたらあまり無理をしないでください。貧血といえど倒れる場所によっては命に関わりますから」"

[[dialogue]]
speaker = "シャロン"
# 「はい。本当にありがとうございました。女神様にも感謝いたしませんと」
line = "「はい。本当にありがとうございました。女神様にも感謝いたしませんと」"

[[dialogue]]
speaker = "イレーナ"
# 「……女神様に？」
line = "「……女神様に？」"

[[dialogue]]
speaker = "シャロン"
# 「ええ。幸運にも近くに人がいる状況で倒れることができたわけですから」
line = "「ええ。幸運にも近くに人がいる状況で倒れることができたわけですから」"

[[dialogue]]
speaker = "シャロン"
# 「全ては女神様が惜しみのない愛で私を包んでくださっているおかげです。ご加護に感謝しなければ」
line = "「全ては女神様が惜しみのない愛で私を包んでくださっているおかげです。ご加護に感謝しなければ」"

[[dialogue]]
speaker = "イレーナ"
# 「私があなたを癒したのも女神様の思し召しだと？」
line = "「私があなたを癒したのも女神様の思し召しだと？」"

[[dialogue]]
speaker = "シャロン"
# 「ふふ、もちろんですっ。きっと女神様が聖女さまを遣わせてくださったのですよ！　多くの人を救うイレーナさまの力は、女神様の愛の<ruby=あらわ>顕</ruby>れなのです！」
line = "「ふふ、もちろんですっ。きっと女神様が聖女さまを遣わせてくださったのですよ！　多くの人を救うイレーナさまの力は、女神様の愛の<ruby>顕<rt>あらわ</rt></ruby>れなのです！」"

[[dialogue]]
speaker = "イレーナ"
# 「そう。じゃあ女神様は私を愛しておられないのね」
line = "「そう。じゃあ女神様は私を愛しておられないのね」"

[[dialogue]]
speaker = "シャロン"
# 「え──？」
line = "「え──？」"

[[dialogue]]
speaker = "イレーナ"
# 「だってそうでしょ？　女神様があたしを愛しておられたなら、こんなうざったい力を与えはしないわ」
line = "「だってそうでしょ？　女神様があたしを愛しておられたなら、こんなうざったい力を与えはしないわ」"

[[dialogue]]
speaker = "イレーナ"
# 「この力のおかげで聖女って呼ばれて、あたしはうんざりしてるのよ。ボランティアで人助けさせられて、神官までさせられて、遊ぶ暇もないっての」
line = "「この力のおかげで聖女って呼ばれて、あたしはうんざりしてるのよ。ボランティアで人助けさせられて、神官までさせられて、遊ぶ暇もないっての」"

[[dialogue]]
speaker = "シャロン"
# 「え？　え？　え？」
line = "「え？　え？　え？」"

[[dialogue]]
speaker = "イレーナ"
# 「人を女神の使いっ走りみたいに言わないで！　こちとら迷惑してるのよ、勝手に聖女なんかに仕立て上げられてね！」
line = "「人を女神の使いっ走りみたいに言わないで！　こちとら迷惑してるのよ、勝手に聖女なんかに仕立て上げられてね！」"

[[dialogue]]
speaker = "イレーナ"
# 「大体、女神に愛されてるって何？　あんたの言う女神なんて本当にいるの？　惜しみのない愛なんて本当に注いでるの？」
line = "「大体、女神に愛されてるって何？　あんたの言う女神なんて本当にいるの？　惜しみのない愛なんて本当に注いでるの？」"

[[dialogue]]
speaker = "イレーナ"
# 「ならどうしてあんたは病気に罹ったのよ？　むしろ女神のせいで病気になったんじゃないの！？」
line = "「ならどうしてあんたは病気に罹ったのよ？　むしろ女神のせいで病気になったんじゃないの！？」"

[[dialogue]]
speaker = "シャロン"
# 「──！」
line = "「──！」"

[[dialogue]]
speaker = "イレーナ"
# 「この力をくれたのが女神なら、女神はあたしに嫌がらせしたいに違いないわ」
line = "「この力をくれたのが女神なら、女神はあたしに嫌がらせしたいに違いないわ」"

[[dialogue]]
speaker = "イレーナ"
# 「本当に女神が人を愛しているのなら、あたしを聖女なんかに選ばずに、普通の女の子のままで──」
line = "「本当に女神が人を愛しているのなら、あたしを聖女なんかに選ばずに、普通の女の子のままで──」"

[[dialogue]]
speaker = "シャロン"
# 「イレーナ、さま……？」
line = "「イレーナ、さま……？」"

[[dialogue]]
speaker = "イレーナ"
# 「あっ──……！　っ……！」
line = "「あっ──……！　っ……！」"

[[dialogue]]
speaker = "unk"
# イレーナ！！
line = "イレーナ！！"

[[dialogue]]
speaker = "シャロン"
# 「イレーナさま……」
line = "「イレーナさま……」"
