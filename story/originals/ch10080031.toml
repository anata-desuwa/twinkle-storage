[[dialogue]]
speaker = "unk"
# 第１話,ノヴァしちゃってるアナ,P
line = "第１話,ノヴァしちゃってるアナ,P"

[[dialogue]]
speaker = "unk"
# 先日のギガンドムの一件で、アナは遂にノヴァフォームに覚醒することができた。
line = "先日のギガンドムの一件で、アナは遂にノヴァフォームに覚醒することができた。"

[[dialogue]]
speaker = "unk"
# 俺の恋人で、新星星徒会の副会長でもあるアナ。
line = "俺の恋人で、新星星徒会の副会長でもあるアナ。"

[[dialogue]]
speaker = "unk"
# ノヴァフォーム覚醒を経て、さらにお互いの絆の強さを実感した俺たちは、常に一緒にいることが日常となっていた――
line = "ノヴァフォーム覚醒を経て、さらにお互いの絆の強さを実感した俺たちは、常に一緒にいることが日常となっていた――"

[[dialogue]]
speaker = "アナ（覚醒）"
# 「模擬戦闘、ノープロブレム。会長、今日も訓練に付き合っていただけて嬉しいです」
line = "「模擬戦闘、ノープロブレム。会長、今日も訓練に付き合っていただけて嬉しいです」"

[[dialogue]]
speaker = "アナ（覚醒）"
# 「……恋人として当然のことをしているだけ、ですか？　ふふ、ありがとうございます」
line = "「……恋人として当然のことをしているだけ、ですか？　ふふ、ありがとうございます」"

[[dialogue]]
speaker = "アナ（覚醒）"
# 「ノヴァフォーム。この力を手に入れられたのは、他ならぬ会長のおかげです。これからもお役に立てるよう、精進します」
line = "「ノヴァフォーム。この力を手に入れられたのは、他ならぬ会長のおかげです。これからもお役に立てるよう、精進します」"

[[dialogue]]
speaker = "アナ（覚醒）"
# 「ですが、残念。活動限界が……」
line = "「ですが、残念。活動限界が……」"

[[dialogue]]
speaker = "アナ"
# 「……やはりノヴァフォームは、活動時間が極端に制限されますね。瞬間火力は凄まじいですが、長期戦には不向き」
line = "「……やはりノヴァフォームは、活動時間が極端に制限されますね。瞬間火力は凄まじいですが、長期戦には不向き」"

[[dialogue]]
speaker = "アナ"
# 「変身した直後からタイマーがスタートするような感覚です。３分しか動けない某ヒーローを彷彿とさせます……じゅわっ」
line = "「変身した直後からタイマーがスタートするような感覚です。３分しか動けない某ヒーローを彷彿とさせます……じゅわっ」"

[[dialogue]]
speaker = "unk"
# ノヴァフォームも万能じゃないんだな
line = "ノヴァフォームも万能じゃないんだな"

[[dialogue]]
speaker = "アナ"
# 「はい。モンスターは幸い知能がほとんどないようですが、新しいリクリエの使徒が現れた場合、この弱点は無視できません」
line = "「はい。モンスターは幸い知能がほとんどないようですが、新しいリクリエの使徒が現れた場合、この弱点は無視できません」"

[[dialogue]]
speaker = "アナ"
# 「強力なモンスターを少しずつ小出しにされるなどすれば、ノヴァフォームでもさばき切れない可能性が出てくるでしょう」
line = "「強力なモンスターを少しずつ小出しにされるなどすれば、ノヴァフォームでもさばき切れない可能性が出てくるでしょう」"

[[dialogue]]
speaker = "アナ"
# 「今のところ、私がノヴァフォームに感じている懸念点は以上です。会長の目から見て、気になるところや残念なところはありますか？」
line = "「今のところ、私がノヴァフォームに感じている懸念点は以上です。会長の目から見て、気になるところや残念なところはありますか？」"

[[dialogue]]
speaker = "unk"
# そうだな、強いて言えば……
line = "そうだな、強いて言えば……"

[[dialogue]]
speaker = "アナ"
# 「何でもどうぞ。データにまとめておきますので」
line = "「何でもどうぞ。データにまとめておきますので」"

[[dialogue]]
speaker = "unk"
# すぐに変身が終わっちゃうのが残念
line = "すぐに変身が終わっちゃうのが残念"

[[dialogue]]
speaker = "unk"
# アナの新衣装、すごく可愛いのに
line = "アナの新衣装、すごく可愛いのに"

[[dialogue]]
speaker = "アナ"
# 「なっ……！？」
line = "「なっ……！？」"

[[dialogue]]
speaker = "アナ"
# 「こ、こほん……会長、その、可愛いと言っていただけるのは嬉しいですが、今は真面目な話をしていたはず」
line = "「こ、こほん……会長、その、可愛いと言っていただけるのは嬉しいですが、今は真面目な話をしていたはず」"

[[dialogue]]
speaker = "アナ"
# 「あまり深刻に考えるのもよくないから、場を和ませようとしたんですか？　まったくもう……」
line = "「あまり深刻に考えるのもよくないから、場を和ませようとしたんですか？　まったくもう……」"

[[dialogue]]
speaker = "アナ"
# 「……せ、せっかくです。話を蒸し返しましょう。あの……そんなに、可愛いですか？　ノヴァフォームの私は」
line = "「……せ、せっかくです。話を蒸し返しましょう。あの……そんなに、可愛いですか？　ノヴァフォームの私は」"

[[dialogue]]
speaker = "unk"
# すごく可愛いと思う！
line = "すごく可愛いと思う！"

[[dialogue]]
speaker = "アナ"
# 「会長はまたそうやってストレートな褒めを……人たらしのご自覚、ちゃんと持ってくれないと困ります」
line = "「会長はまたそうやってストレートな褒めを……人たらしのご自覚、ちゃんと持ってくれないと困ります」"

[[dialogue]]
speaker = "アナ"
# 「ですが、ありがとうございます。お付き合いしている方から『可愛い』と評価されるのは、何度味わっても気分がいいものです」
line = "「ですが、ありがとうございます。お付き合いしている方から『可愛い』と評価されるのは、何度味わっても気分がいいものです」"

[[dialogue]]
speaker = "アナ"
# 「……あ、そうです。いいことを思いつきました」
line = "「……あ、そうです。いいことを思いつきました」"

[[dialogue]]
speaker = "unk"
# 翌日の放課後、新星学園の星徒会室――
line = "翌日の放課後、新星学園の星徒会室――"

[[dialogue]]
speaker = "アナ（覚醒）"
# 「会長、こちらの資料。チェックをお願いします」
line = "「会長、こちらの資料。チェックをお願いします」"

[[dialogue]]
speaker = "マトイ"
# 「え、え～っと……？」
line = "「え、え～っと……？」"

[[dialogue]]
speaker = "アナ（覚醒）"
# 「会長、ここの数字に抜けがあります……いえ、ミスはお気になさらず。会長の補佐が副会長の仕事ですので」
line = "「会長、ここの数字に抜けがあります……いえ、ミスはお気になさらず。会長の補佐が副会長の仕事ですので」"

[[dialogue]]
speaker = "サーシャ"
# 「ね～、アナちゃん？　ちょっと聞きたいことがあるんだけど、いいかしら～♪」
line = "「ね～、アナちゃん？　ちょっと聞きたいことがあるんだけど、いいかしら～♪」"

[[dialogue]]
speaker = "アナ（覚醒）"
# 「はい。なんでしょう、サーシャ先輩」
line = "「はい。なんでしょう、サーシャ先輩」"

[[dialogue]]
speaker = "サーシャ"
# 「どうしてアナちゃん、ノヴァフォームにお着替えしてお仕事をしてるの？」
line = "「どうしてアナちゃん、ノヴァフォームにお着替えしてお仕事をしてるの？」"

[[dialogue]]
speaker = "アナ（覚醒）"
# 「なるほど。戦闘時でもないのに、私がノヴァしちゃってる理由。疑問に思うのも無理からぬお話です」
line = "「なるほど。戦闘時でもないのに、私がノヴァしちゃってる理由。疑問に思うのも無理からぬお話です」"

[[dialogue]]
speaker = "マトイ"
# 「ノヴァしちゃってるって何！？」
line = "「ノヴァしちゃってるって何！？」"

[[dialogue]]
speaker = "アナ（覚醒）"
# 「お答えしましょう。会長の膝の上から離れるのは名残惜しいですが――」
line = "「お答えしましょう。会長の膝の上から離れるのは名残惜しいですが――」"

[[dialogue]]
speaker = "アナ（覚醒）"
# 「――しゅわっち。簡単に言えば、変身時間延長の訓練です」
line = "「――しゅわっち。簡単に言えば、変身時間延長の訓練です」"

[[dialogue]]
speaker = "アナ（覚醒）"
# 「ご存じのとおり、ノヴァフォームは短時間しかその状態を保てないことがネック。場合によっては通常戦闘服の方が有利なケースもあるでしょう」
line = "「ご存じのとおり、ノヴァフォームは短時間しかその状態を保てないことがネック。場合によっては通常戦闘服の方が有利なケースもあるでしょう」"

[[dialogue]]
speaker = "マトイ"
# 「う、うん。そうだよね。だからトワ先生も、細かい仕組みを解明しようって頑張ってるし……」
line = "「う、うん。そうだよね。だからトワ先生も、細かい仕組みを解明しようって頑張ってるし……」"

[[dialogue]]
speaker = "アナ（覚醒）"
# 「ですが私たちは星騎士。学業だけでなく訓練も大切なお仕事です。鍛えることで、活動限界を伸ばすことも可能なのではと考えました」
line = "「ですが私たちは星騎士。学業だけでなく訓練も大切なお仕事です。鍛えることで、活動限界を伸ばすことも可能なのではと考えました」"

[[dialogue]]
speaker = "サーシャ"
# 「なるほど～。それで普段からノヴァフォームで過ごして、体を慣らそうとしているのね」
line = "「なるほど～。それで普段からノヴァフォームで過ごして、体を慣らそうとしているのね」"

[[dialogue]]
speaker = "アナ（覚醒）"
# 「その通りです」
line = "「その通りです」"

[[dialogue]]
speaker = "マトイ"
# 「なぁんだ。てっきり会長が『ノヴァフォームのアナも可愛いね』って言うから、もっと見てほしいって思って変身してるのかと思っちゃった」
line = "「なぁんだ。てっきり会長が『ノヴァフォームのアナも可愛いね』って言うから、もっと見てほしいって思って変身してるのかと思っちゃった」"

[[dialogue]]
speaker = "サーシャ"
# 「奇遇ねマトイちゃん。私もよ～」
line = "「奇遇ねマトイちゃん。私もよ～」"

[[dialogue]]
speaker = "アナ（覚醒）"
# 「いえ。会長に可愛い私をもっと見せたかった……その気持ちも否定はしません」
line = "「いえ。会長に可愛い私をもっと見せたかった……その気持ちも否定はしません」"

[[dialogue]]
speaker = "アナ（覚醒）"
# 「昨日たっぷり褒められたので、あわよくば今日も褒めてもらおうと思った次第です」
line = "「昨日たっぷり褒められたので、あわよくば今日も褒めてもらおうと思った次第です」"

[[dialogue]]
speaker = "マトイ"
# 「絶対そっちが目的の大部分だったよね！？」
line = "「絶対そっちが目的の大部分だったよね！？」"

[[dialogue]]
speaker = "サーシャ"
# 「あらあら、うふふ～♪」
line = "「あらあら、うふふ～♪」"

[[dialogue]]
speaker = "アナ（覚醒）"
# 「というわけで、再度膝上にしゅわっち──ん。やっぱり会長の膝の上はベストプレイス。フィット感が違う」
line = "「というわけで、再度膝上にしゅわっち──ん。やっぱり会長の膝の上はベストプレイス。フィット感が違う」"

[[dialogue]]
speaker = "アナ（覚醒）"
# 「さぁ会長。可愛い私を見てやる気を出し、バリバリお仕事を片付けていきましょう」
line = "「さぁ会長。可愛い私を見てやる気を出し、バリバリお仕事を片付けていきましょう」"

[[dialogue]]
speaker = "unk"
# よ～し、やるぞ！
line = "よ～し、やるぞ！"

[[dialogue]]
speaker = "アナ（覚醒）"
# 「ちなみにちょっと残念な情報です。体感ですが、今日の変身はあと数分で解けるかと。悔いを残さぬよう、ぎゅーっとハグするのを推奨です」
line = "「ちなみにちょっと残念な情報です。体感ですが、今日の変身はあと数分で解けるかと。悔いを残さぬよう、ぎゅーっとハグするのを推奨です」"

[[dialogue]]
speaker = "unk"
# ぎゅーっ……！
line = "ぎゅーっ……！"

[[dialogue]]
speaker = "アナ（覚醒）"
# 「あっ……<emoji=heart04>　もう、会長……ぎゅーっとハグを推奨はしましたが、ちょっと強すぎです。書類がうまくめくれません……<emoji=heart04>」
line = "「あっ……<emoji=heart04>　もう、会長……ぎゅーっとハグを推奨はしましたが、ちょっと強すぎです。書類がうまくめくれません……<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
# 「お付き合いを始めてから、会長もアナもどんどん人目を気にせずイチャイチャするようになってる気が……」
line = "「お付き合いを始めてから、会長もアナもどんどん人目を気にせずイチャイチャするようになってる気が……」"

[[dialogue]]
speaker = "サーシャ"
# 「うふふ、微笑ましくって素敵ね～♪　もうすぐヴィーナスちゃんもやってくるだろうし、お茶でも淹れておきましょう♪」
line = "「うふふ、微笑ましくって素敵ね～♪　もうすぐヴィーナスちゃんもやってくるだろうし、お茶でも淹れておきましょう♪」"

[[dialogue]]
speaker = "マトイ"
# 「ヴィーナスが『アナばっかりずるい、私もパパの膝に座るわ！』って言う未来が見えます、私……」
line = "「ヴィーナスが『アナばっかりずるい、私もパパの膝に座るわ！』って言う未来が見えます、私……」"

[[dialogue]]
speaker = "サーシャ"
# 「またまた奇遇ねマトイちゃん。私もよ～<emoji=heart04>」
line = "「またまた奇遇ねマトイちゃん。私もよ～<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 強力なモンスターが現れたり、新たな力を得たりと慌ただしい日常を過ごす俺たちだけど。
line = "強力なモンスターが現れたり、新たな力を得たりと慌ただしい日常を過ごす俺たちだけど。"

[[dialogue]]
speaker = "unk"
# アナとは何があっても、変わらず仲良しの関係が続いているのだった──
line = "アナとは何があっても、変わらず仲良しの関係が続いているのだった──"
