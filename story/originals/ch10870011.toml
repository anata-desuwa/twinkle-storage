[[dialogue]]
speaker = "unk"
# 第１話,意外な一面,P
line = "第１話,意外な一面,P"

[[dialogue]]
speaker = "シアン"
# 「よし。会長さん、ここからは手分けして探そう。発見したら連絡してくれ」
line = "「よし。会長さん、ここからは手分けして探そう。発見したら連絡してくれ」"

[[dialogue]]
speaker = "unk"
# ヴァレリーに遭遇したコラプサー襲撃事件から数日、俺たちは浅草をパトロールしていた。
line = "ヴァレリーに遭遇したコラプサー襲撃事件から数日、俺たちは浅草をパトロールしていた。"

[[dialogue]]
speaker = "unk"
# 『犯人は必ず再び現場に訪れる』というシアン先輩の経験に基づいての探索だったけれど――
line = "『犯人は必ず再び現場に訪れる』というシアン先輩の経験に基づいての探索だったけれど――"

[[dialogue]]
speaker = "ヴァレリー"
# 「ご婦人、そこには段差がありますよ。足元にお気をつけて」
line = "「ご婦人、そこには段差がありますよ。足元にお気をつけて」"

[[dialogue]]
speaker = "お婆さん"
# 「荷物まで持ってくれて……ご親切にありがとうねえ、綺麗なお嬢ちゃん」
line = "「荷物まで持ってくれて……ご親切にありがとうねえ、綺麗なお嬢ちゃん」"

[[dialogue]]
speaker = "ヴァレリー"
# 「いえいえ、お役に立てたのなら何よりです。それに私などより、あなたの方がずっとお美しい」
line = "「いえいえ、お役に立てたのなら何よりです。それに私などより、あなたの方がずっとお美しい」"

[[dialogue]]
speaker = "お婆さん"
# 「まあ、こんなお婆ちゃんにお上手ね。うふふふ」
line = "「まあ、こんなお婆ちゃんにお上手ね。うふふふ」"

[[dialogue]]
speaker = "ヴァレリー"
# 「それでは、失礼します。良い観光を」
line = "「それでは、失礼します。良い観光を」"

[[dialogue]]
speaker = "ヴァレリー"
# 「……おや、新星の会長さん、こんなところでお会いするとはなんとも奇遇ですね」
line = "「……おや、新星の会長さん、こんなところでお会いするとはなんとも奇遇ですね」"

[[dialogue]]
speaker = "unk"
# 何をしていた？
line = "何をしていた？"

[[dialogue]]
speaker = "ヴァレリー"
# 「ご覧になっていた通りですよ。お美しいご婦人が道に迷っていたのでね。ご案内してました」
line = "「ご覧になっていた通りですよ。お美しいご婦人が道に迷っていたのでね。ご案内してました」"

[[dialogue]]
speaker = "ヴァレリー"
# 「この辺りは幾度も巡り巡っていますからね。道や観光名所にもすっかり詳しくなってしまいましたよ」
line = "「この辺りは幾度も巡り巡っていますからね。道や観光名所にもすっかり詳しくなってしまいましたよ」"

[[dialogue]]
speaker = "ヴァレリー"
# 「何度訪れても、ここは大変美しい。来る度に新たな発見が得られます」
line = "「何度訪れても、ここは大変美しい。来る度に新たな発見が得られます」"

[[dialogue]]
speaker = "ヴァレリー"
# 「会長さんも素晴らしい文化に触れるべく、浅草観光……というわけではなさそうですね」
line = "「会長さんも素晴らしい文化に触れるべく、浅草観光……というわけではなさそうですね」"

[[dialogue]]
speaker = "ヴァレリー"
# 「大方、公安のワンちゃんとともに私を探していたのでしょうが……どうです、この場は休戦しませんか」
line = "「大方、公安のワンちゃんとともに私を探していたのでしょうが……どうです、この場は休戦しませんか」"

[[dialogue]]
speaker = "ヴァレリー"
# 「ここでやり合うつもりはありません。<ruby=むこ>無辜</ruby>の民を巻き込むのは、あなたも望むところではないでしょう？」
line = "「ここでやり合うつもりはありません。<ruby>無辜<rt>むこ</rt></ruby>の民を巻き込むのは、あなたも望むところではないでしょう？」"

[[dialogue]]
speaker = "ヴァレリー"
# 「――ふむ、殺気は感じられません。どうやら要求を呑んでいただけるようですね。やはりあなたは、私が見込んだ通りの方です」
line = "「――ふむ、殺気は感じられません。どうやら要求を呑んでいただけるようですね。やはりあなたは、私が見込んだ通りの方です」"

[[dialogue]]
speaker = "ヴァレリー"
# 「あなたがそのつもりだったなら、厄介なワンちゃんをすぐにでも呼び寄せるでしょうからね」
line = "「あなたがそのつもりだったなら、厄介なワンちゃんをすぐにでも呼び寄せるでしょうからね」"

[[dialogue]]
speaker = "unk"
# 信じていいんだな
line = "信じていいんだな"

[[dialogue]]
speaker = "ヴァレリー"
# 「信じる信じないはあなたの勝手ですけどね。私はＯＮとＯＦＦをハッキリさせてまして」
line = "「信じる信じないはあなたの勝手ですけどね。私はＯＮとＯＦＦをハッキリさせてまして」"

[[dialogue]]
speaker = "ヴァレリー"
# 「純粋に観光を楽しんでいる今日は、オフなんです」
line = "「純粋に観光を楽しんでいる今日は、オフなんです」"

[[dialogue]]
speaker = "ヴァレリー"
# 「休戦中の今でしたら、あなたと腕を組んで街を歩くのも、そこのカフェで仲良くティータイムに興じるのも、やぶさかではありませんよ」
line = "「休戦中の今でしたら、あなたと腕を組んで街を歩くのも、そこのカフェで仲良くティータイムに興じるのも、やぶさかではありませんよ」"

[[dialogue]]
speaker = "ヴァレリー"
# 「もっとも、敵対勢力と仲睦まじくしている決定的瞬間を、あなたの同僚に見られたら、どう思われるかまでは保証いたしかねますけどね」
line = "「もっとも、敵対勢力と仲睦まじくしている決定的瞬間を、あなたの同僚に見られたら、どう思われるかまでは保証いたしかねますけどね」"

[[dialogue]]
speaker = "ヴァレリー"
# 「フフ、無理をせずとも結構です。私の審美眼は、人の心の機微にも敏感でして」
line = "「フフ、無理をせずとも結構です。私の審美眼は、人の心の機微にも敏感でして」"

[[dialogue]]
speaker = "ヴァレリー"
# 「ここでやり合うつもりはないが、まだまだ私に対する抵抗感もある。学園の誰かに見られたら疑念が生じてしまう不安も抱えている……」
line = "「ここでやり合うつもりはないが、まだまだ私に対する抵抗感もある。学園の誰かに見られたら疑念が生じてしまう不安も抱えている……」"

[[dialogue]]
speaker = "ヴァレリー"
# 「私があなた方、星騎士の天敵であるコラプサーの一員である事実は変わりません。警戒を解かない方が賢明ですよ」
line = "「私があなた方、星騎士の天敵であるコラプサーの一員である事実は変わりません。警戒を解かない方が賢明ですよ」"

[[dialogue]]
speaker = "ヴァレリー"
# 「とはいえ、無抵抗な私を、独断で処分できるようなあなたではないことも、私は知っています」
line = "「とはいえ、無抵抗な私を、独断で処分できるようなあなたではないことも、私は知っています」"

[[dialogue]]
speaker = "ヴァレリー"
# 「フフフ、なんで、そんなことまでわかるのかって顔ですね。以前、言いませんでしたか？」
line = "「フフフ、なんで、そんなことまでわかるのかって顔ですね。以前、言いませんでしたか？」"

[[dialogue]]
speaker = "ヴァレリー"
# 「私はあなたのファンなんですよ。ファンならば好きな相手のことを調べ尽くすのが当然でしょう」
line = "「私はあなたのファンなんですよ。ファンならば好きな相手のことを調べ尽くすのが当然でしょう」"

[[dialogue]]
speaker = "ヴァレリー"
# 「誕生日、血液型、出身地、現在の住所、好きな食べ物、嫌いな食べ物、血縁関係や交際遍歴――思考パターンまで」
line = "「誕生日、血液型、出身地、現在の住所、好きな食べ物、嫌いな食べ物、血縁関係や交際遍歴――思考パターンまで」"

[[dialogue]]
speaker = "ヴァレリー"
# 「プライバシーの侵害、などとお思いでしょうか」
line = "「プライバシーの侵害、などとお思いでしょうか」"

[[dialogue]]
speaker = "ヴァレリー"
# 「直接面識もないのに誕生日には花を贈り、熱愛や結婚や離婚は連日のように報じられ、『きっとあの子はこう思っているに違いない』と推測する」
line = "「直接面識もないのに誕生日には花を贈り、熱愛や結婚や離婚は連日のように報じられ、『きっとあの子はこう思っているに違いない』と推測する」"

[[dialogue]]
speaker = "ヴァレリー"
# 「芸能人相手なら当然のようにやっている行為なのに、個々人となると突如、恐れを抱くのもおかしな話だと思いませんか？」
line = "「芸能人相手なら当然のようにやっている行為なのに、個々人となると突如、恐れを抱くのもおかしな話だと思いませんか？」"

[[dialogue]]
speaker = "ヴァレリー"
# 「なんといっても、あなたは私にとって唯一無二の<ruby=アイドル>偶像</ruby>なのですから」
line = "「なんといっても、あなたは私にとって唯一無二の<ruby>偶像<rt>アイドル</rt></ruby>なのですから」"

[[dialogue]]
speaker = "ヴァレリー"
# 「もっと深い仲になりたいと、心より望んでおります」
line = "「もっと深い仲になりたいと、心より望んでおります」"

[[dialogue]]
speaker = "ヴァレリー"
# 「――おっと、楽しい時間も束の間。今日はここでお開きですかね」
line = "「――おっと、楽しい時間も束の間。今日はここでお開きですかね」"

[[dialogue]]
speaker = "ヴァレリー"
# 「では、デートはまた日を改めてということで。心置きなく楽しめる日を心待ちにしています」
line = "「では、デートはまた日を改めてということで。心置きなく楽しめる日を心待ちにしています」"

[[dialogue]]
speaker = "unk"
# ヴァレリーはその身を翻し、颯爽と去っていった。
line = "ヴァレリーはその身を翻し、颯爽と去っていった。"

[[dialogue]]
speaker = "シアン"
# 「おい、会長さん！　今のは――チッ、逃げられたか」
line = "「おい、会長さん！　今のは――チッ、逃げられたか」"

[[dialogue]]
speaker = "シアン"
# 「あたしの接近に気付いて退いたか……気配は消してたはずなんだがな」
line = "「あたしの接近に気付いて退いたか……気配は消してたはずなんだがな」"

[[dialogue]]
speaker = "シアン"
# 「おい、なんであいつに遭遇したのに、とっととあたしに連絡をよこさなかった？　隙がなかったわけじゃねえだろ」
line = "「おい、なんであいつに遭遇したのに、とっととあたしに連絡をよこさなかった？　隙がなかったわけじゃねえだろ」"

[[dialogue]]
speaker = "シアン"
# 「もしかして、戦場で会った時とは様子が違うから、実は良い人――とでも思ったか？」
line = "「もしかして、戦場で会った時とは様子が違うから、実は良い人――とでも思ったか？」"

[[dialogue]]
speaker = "シアン"
# 「あいつが何をやらかしたか、忘れちゃいねえよな。油断禁物だ……隙を見せた瞬間に、頭から喰われるぜ」
line = "「あいつが何をやらかしたか、忘れちゃいねえよな。油断禁物だ……隙を見せた瞬間に、頭から喰われるぜ」"

[[dialogue]]
speaker = "シアン"
# 「気を引き締めろよ、会長さん」
line = "「気を引き締めろよ、会長さん」"
