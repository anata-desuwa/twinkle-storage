# ヴィーナスは俺のお嫁さんだとしても
line = "ヴィーナスは俺のお嫁さんだとしても"

[[dialogue]]
speaker = "ヴィーナス"
# 「それに、『パパ』って呼んで甘えてくる時の私も可愛いから、そのままでいい……？」
line = "「それに、『パパ』って呼んで甘えてくる時の私も可愛いから、そのままでいい……？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「えへへぇ～<emoji=heart04>　そんなに嬉しいこと言われちゃったら、たくさん甘えちゃうわよ、パーパ<emoji=heart04>」
line = "「えへへぇ～<emoji=heart04>　そんなに嬉しいこと言われちゃったら、たくさん甘えちゃうわよ、パーパ<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
# 「パパ<emoji=heart04>　私、もっとキスしてほしい。パパとたくさん、イチャイチャしたい<emoji=heart04>」
line = "「パパ<emoji=heart04>　私、もっとキスしてほしい。パパとたくさん、イチャイチャしたい<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あっ……<emoji=heart04>　見つめ合ったまま、右手を恋人繋ぎになんて……<emoji=heart04>」
line = "「あっ……<emoji=heart04>　見つめ合ったまま、右手を恋人繋ぎになんて……<emoji=heart04>」"

