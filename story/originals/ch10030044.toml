line = "もちろん"

[[dialogue]]
speaker = "ヴィーナス"
# 「そりゃあ、毎日これだけ愛してもらってるんだから、好きって気持ちは疑いようもないわ」
line = "「そりゃあ、毎日これだけ愛してもらってるんだから、好きって気持ちは疑いようもないわ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ただ、前に『嫁を名乗るのはちょっと待って』って、言ってたじゃない……？」
line = "「ただ、前に『嫁を名乗るのはちょっと待って』って、言ってたじゃない……？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「色々準備は進めてくれてたけど、それでも改めてとなれば、もうちょっと悩んだり、考えたりすることもあるのかなって……」
line = "「色々準備は進めてくれてたけど、それでも改めてとなれば、もうちょっと悩んだり、考えたりすることもあるのかなって……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私とどうなりたいかなんて、毎日毎晩考えてたから今更……？　そ、そうなのね……」
line = "「私とどうなりたいかなんて、毎日毎晩考えてたから今更……？　そ、そうなのね……」"

[[dialogue]]
