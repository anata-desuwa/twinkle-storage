[[dialogue]]
speaker = "ヴィーナス"
# 「はぁぁ……<emoji=heart04>　んふふっ。パパしか目に入らないくらい、くっついちゃってる<emoji=heart04>」
line = "「はぁぁ……<emoji=heart04>　んふふっ。パパしか目に入らないくらい、くっついちゃってる<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ちゅっ……<emoji=heart04>　んっ……ちゅっ<emoji=heart04>　ちゅっ<emoji=heart04>　はぁぁ……」
line = "「ちゅっ……<emoji=heart04>　んっ……ちゅっ<emoji=heart04>　ちゅっ<emoji=heart04>　はぁぁ……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「もっと、頭撫でて……私の体に触れて……？　はぁぁ、安心するのに、ドキドキしてて……不思議<emoji=heart04>」
line = "「もっと、頭撫でて……私の体に触れて……？　はぁぁ、安心するのに、ドキドキしてて……不思議<emoji=heart04>」"

