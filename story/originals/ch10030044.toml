line = "「パパ、クロト……んふっ<emoji=heart04>　だぁい好き<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そうして俺たちは、日が暮れて夜になるまで、ず～～っとイチャイチャして休日を過ごすのだった。
line = "そうして俺たちは、日が暮れて夜になるまで、ず～～っとイチャイチャして休日を過ごすのだった。"
