[[dialogue]]
speaker = "unk"
# 第４話,パパのお嫁さん,P
line = "第４話,パパのお嫁さん,P"

[[dialogue]]
speaker = "ヴィーナス"
# 「パーパ、頭撫でて～♪」
line = "「パーパ、頭撫でて～♪」"

[[dialogue]]
speaker = "unk"
# おいで、ヴィーナス
line = "おいで、ヴィーナス"

[[dialogue]]
speaker = "ヴィーナス"
# 「えっへへ～。ついでに膝枕もしてもらっちゃお～、ごろごろごろ～」
line = "「えっへへ～。ついでに膝枕もしてもらっちゃお～、ごろごろごろ～」"

[[dialogue]]
speaker = "unk"
# 恋人であり娘、という関係性が判明してから、ヴィーナスは時折こうやって露骨に甘えてくるようになった。
line = "恋人であり娘、という関係性が判明してから、ヴィーナスは時折こうやって露骨に甘えてくるようになった。"

[[dialogue]]
speaker = "unk"
# ヴィーナスにとって「魔王の娘」と「魔王の恋人」という立場は矛盾するものではないらしく、むしろ運命の運命の結びつきが際立った程度の認識らしい。
line = "ヴィーナスにとって「魔王の娘」と「魔王の恋人」という立場は矛盾するものではないらしく、むしろ運命の運命の結びつきが際立った程度の認識らしい。"

[[dialogue]]
speaker = "ヴィーナス"
# 「あっ、なんか撫で方が優しくなった。ま～た何か難しいこと考えてるでしょ～」
line = "「あっ、なんか撫で方が優しくなった。ま～た何か難しいこと考えてるでしょ～」"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロトは私を甘やかして可愛がることだけ、考えてればいいのよ！　それだけで私は、世界を守れてよかったって思えるくらい、幸せになれちゃうんだから」
line = "「クロトは私を甘やかして可愛がることだけ、考えてればいいのよ！　それだけで私は、世界を守れてよかったって思えるくらい、幸せになれちゃうんだから」"

[[dialogue]]
speaker = "unk"
# 了解、お姫様
line = "了解、お姫様"

[[dialogue]]
speaker = "ヴィーナス"
# 「えへへ～♪　クロトのそういうストレートなところ、私、本当に好きよ」
line = "「えへへ～♪　クロトのそういうストレートなところ、私、本当に好きよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あのね……？　色んな人たちから話を聞いて、娘と父親が恋人になったり、子供を作ったりすることは、普通のことじゃないっていうのは、私も改めて理解したわ」
line = "「あのね……？　色んな人たちから話を聞いて、娘と父親が恋人になったり、子供を作ったりすることは、普通のことじゃないっていうのは、私も改めて理解したわ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「うん、私だってちゃんと勉強してるのよ？　周りの人たちの反応が見えてないわけじゃないわ」
line = "「うん、私だってちゃんと勉強してるのよ？　周りの人たちの反応が見えてないわけじゃないわ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「だから……晴れ着フォームの時のおみくじ結果、『恋の運命は最悪』『今世で結ばれることなし、誰にも祝福されず、過酷な運命が待つ』の意味も、今ならわかるわ」
line = "「だから……晴れ着フォームの時のおみくじ結果、『恋の運命は最悪』『今世で結ばれることなし、誰にも祝福されず、過酷な運命が待つ』の意味も、今ならわかるわ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「普通なら、父親と娘の結婚なんて認められるものじゃない。それはよくわかったの」
line = "「普通なら、父親と娘の結婚なんて認められるものじゃない。それはよくわかったの」"

[[dialogue]]
speaker = "ヴィーナス"
# 「でもね……？　私たちは最初から普通じゃないわ。そうでしょう？」
line = "「でもね……？　私たちは最初から普通じゃないわ。そうでしょう？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロトは最強の魔王だし、私は平行世界からやってきた。星騎士としても、私たち２人合わされば三界どころか、平行世界最強なんだから！」
line = "「クロトは最強の魔王だし、私は平行世界からやってきた。星騎士としても、私たち２人合わされば三界どころか、平行世界最強なんだから！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「要するに、私たちは世界や常識を変えちゃうような力を持ってるってこと！」
line = "「要するに、私たちは世界や常識を変えちゃうような力を持ってるってこと！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それに、おみくじ結果の『誰にも祝福されず』なんて冗談じゃないわ。私の仲間や家族は、そんな器の小さいヒトたちじゃないもの」
line = "「それに、おみくじ結果の『誰にも祝福されず』なんて冗談じゃないわ。私の仲間や家族は、そんな器の小さいヒトたちじゃないもの」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……あとはたった一つのことだけ確かめられれば、私はこれからも揺らがないって確信できるわ」
line = "「……あとはたった一つのことだけ確かめられれば、私はこれからも揺らがないって確信できるわ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「だからね……クロト」
line = "「だからね……クロト」"

[[dialogue]]
speaker = "unk"
# 結婚しよう
line = "結婚しよう"

[[dialogue]]
speaker = "unk"
# ああ、ヴィーナス
line = "ああ、ヴィーナス"

[[dialogue]]
speaker = "ヴィーナス"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ヴィーナス"
# 「いいの……？」
line = "「いいの……？」"

[[dialogue]]
speaker = "unk"
# ヴィーナスだって答えはわかってただろ？
line = "ヴィーナスだって答えはわかってただろ？"

[[dialogue]]
