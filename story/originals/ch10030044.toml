[[dialogue]]
speaker = "ヴィーナス"
# 「えへへ♪　なんかこういうの、思ってたより照れちゃうけど、嬉しいわねっ」
line = "「えへへ♪　なんかこういうの、思ってたより照れちゃうけど、嬉しいわねっ」"

[[dialogue]]
