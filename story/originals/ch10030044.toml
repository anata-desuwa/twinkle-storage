[[dialogue]]
speaker = "ヴィーナス"
# 「すっごく嬉しいわ。……そうだ、クロトは私にしてほしいこととか、ないのかしら？」
line = "「すっごく嬉しいわ。……そうだ、クロトは私にしてほしいこととか、ないのかしら？」"

[[dialogue]]
