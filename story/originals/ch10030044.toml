# 「これからは自称じゃなくて正式にお嫁さんになったわけだし、もうちょっとちゃんとした方がいい？」
line = "「これからは自称じゃなくて正式にお嫁さんになったわけだし、もうちょっとちゃんとした方がいい？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「例えば……今日みたいに『パパ』って呼んだりして甘えるのは、はしたないかしら？」
line = "「例えば……今日みたいに『パパ』って呼んだりして甘えるのは、はしたないかしら？」"

[[dialogue]]
