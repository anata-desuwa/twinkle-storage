[[dialogue]]
speaker = "unk"
# 第２話,駄菓子、気になりますわ……！,P
line = "第２話,駄菓子、気になりますわ……！,P"

[[dialogue]]
speaker = "unk"
# 夜も更けて、さぁ後は眠るだけ──そんな折に空腹が気になってしまった。しかし自宅のキッチンで食べていたら、母さんを起こしてしまうかも。
line = "夜も更けて、さぁ後は眠るだけ──そんな折に空腹が気になってしまった。しかし自宅のキッチンで食べていたら、母さんを起こしてしまうかも。"

[[dialogue]]
speaker = "unk"
# そう考えた俺はコンビニでも行こうかと思いながら、繁華街まで足を伸ばすことにしたのだった。
line = "そう考えた俺はコンビニでも行こうかと思いながら、繁華街まで足を伸ばすことにしたのだった。"

[[dialogue]]
speaker = "エルデリーゼ"
# 「ささっ……！」
line = "「ささっ……！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「ささささっ……！」
line = "「ささささっ……！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「一体どこにありますの……どこに……うぅ……」
line = "「一体どこにありますの……どこに……うぅ……」"

[[dialogue]]
speaker = "unk"
# ……エルゼ？
line = "……エルゼ？"

[[dialogue]]
speaker = "エルデリーゼ"
# 「──きゃっ！？　会長様……！？」
line = "「──きゃっ！？　会長様……！？」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「き、奇遇ですわねっ。まさかこんなところでお会いするとは……」
line = "「き、奇遇ですわねっ。まさかこんなところでお会いするとは……」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「私は……あの。ちょっと夜のお散歩を……しておりまして……！」
line = "「私は……あの。ちょっと夜のお散歩を……しておりまして……！」"

[[dialogue]]
speaker = "unk"
# 学生寮って門限があるよね……？
line = "学生寮って門限があるよね……？"

[[dialogue]]
speaker = "エルデリーゼ"
# 「ぁ──う。そう……です。はい……お察しのとおりです。流星学園の寮を、こっそりと抜け出してきたのですわ」
line = "「ぁ──う。そう……です。はい……お察しのとおりです。流星学園の寮を、こっそりと抜け出してきたのですわ」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「お願いします、会長様！　どうか夜間外出のことは、寮長にはご内密に……！」
line = "「お願いします、会長様！　どうか夜間外出のことは、寮長にはご内密に……！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「ぇ……構わない、のですか？　良かったですわ……会長様はお優しいのですね」
line = "「ぇ……構わない、のですか？　良かったですわ……会長様はお優しいのですね」"

[[dialogue]]
speaker = "unk"
# でも外出の理由は知りたいかな
line = "でも外出の理由は知りたいかな"

[[dialogue]]
speaker = "エルデリーゼ"
# 「あ、はい……実は今日のお昼に──」
line = "「あ、はい……実は今日のお昼に──」"

[[dialogue]]
speaker = "フィオナ"
# 「アムさん。その鞄に付いているキーホルダーはもしかして？」
line = "「アムさん。その鞄に付いているキーホルダーはもしかして？」"

[[dialogue]]
speaker = "アム"
# 「これですか？　はい、この間買った駄菓子のおまけなんです。カッコいいからあたしにぴったりかな～って」
line = "「これですか？　はい、この間買った駄菓子のおまけなんです。カッコいいからあたしにぴったりかな～って」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「……だがし？　おまけ……？」
line = "「……だがし？　おまけ……？」"

[[dialogue]]
speaker = "アム"
# 「でもこれ、フィオナ会長、良く知ってましたね？　これって少年誌の漫画が原作なのに」
line = "「でもこれ、フィオナ会長、良く知ってましたね？　これって少年誌の漫画が原作なのに」"

[[dialogue]]
speaker = "フィオナ"
# 「えぇ私も大ファンで──ぁ、いえっ！　そのー……一般教養ですから！　お買い物してる時にちらっと見たことがあって」
line = "「えぇ私も大ファンで──ぁ、いえっ！　そのー……一般教養ですから！　お買い物してる時にちらっと見たことがあって」"

[[dialogue]]
speaker = "アム"
# 「ふーん、そうなんですか。ねぇエルゼはこの漫画知ってる？　最近めっちゃ熱いんだけど──」
line = "「ふーん、そうなんですか。ねぇエルゼはこの漫画知ってる？　最近めっちゃ熱いんだけど──」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「アム。その前に、駄菓子とは一体何なのです？」
line = "「アム。その前に、駄菓子とは一体何なのです？」"

[[dialogue]]
speaker = "アム"
# 「え」
line = "「え」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「お菓子とはケーキやクッキーなどを指すはずですわ。主体はスイーツそのもの。それなのに、キーホルダーが付くとは……一体？」
line = "「お菓子とはケーキやクッキーなどを指すはずですわ。主体はスイーツそのもの。それなのに、キーホルダーが付くとは……一体？」"

[[dialogue]]
speaker = "アム"
# 「あ～。そこからつまずく？　流石はエルゼ……」
line = "「あ～。そこからつまずく？　流石はエルゼ……」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「気になりますわ……！　一体、駄菓子とはどんなスイーツなんですの？」
line = "「気になりますわ……！　一体、駄菓子とはどんなスイーツなんですの？」"

[[dialogue]]
speaker = "フィオナ"
# 「エルゼ。駄菓子と言うのは……」
line = "「エルゼ。駄菓子と言うのは……」"

[[dialogue]]
speaker = "アム"
# 「あ、待って待って。フィオナ会長。詳しく教えない方が面白そう」
line = "「あ、待って待って。フィオナ会長。詳しく教えない方が面白そう」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「もう。意地悪しないでください、アム！　駄菓子とはどこのパティスリーで売っていますの？　それだけでも……」
line = "「もう。意地悪しないでください、アム！　駄菓子とはどこのパティスリーで売っていますの？　それだけでも……」"

[[dialogue]]
speaker = "アム"
# 「パティスリーって……！　あはは！　あはははっ！」
line = "「パティスリーって……！　あはは！　あはははっ！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「笑ってないで答えてくださいませ！　駄菓子って、どんなものなんですのっ？　興味津々、ですわ～っ！」
line = "「笑ってないで答えてくださいませ！　駄菓子って、どんなものなんですのっ？　興味津々、ですわ～っ！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「結局、アムは最後まで教えてくれませんでしたの。私が常識はずれなことを言うといつもこうなんです」
line = "「結局、アムは最後まで教えてくれませんでしたの。私が常識はずれなことを言うといつもこうなんです」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「でも流星市国のスイーツショップは網羅しております。すでに１０件回って収穫はゼロですが諦めませんわ」
line = "「でも流星市国のスイーツショップは網羅しております。すでに１０件回って収穫はゼロですが諦めませんわ」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「夜の外出は初めてではありませんので、まだまだ当てはありますの……！」
line = "「夜の外出は初めてではありませんので、まだまだ当てはありますの……！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「ぁ──こ、これもご内密にお願いいたします。私、夜間にこっそり抜け出すのが、その……趣味、と言いますか」
line = "「ぁ──こ、これもご内密にお願いいたします。私、夜間にこっそり抜け出すのが、その……趣味、と言いますか」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「実家がとても厳しかったのです。娯楽は遠ざけられ、分刻みで学業と鍛錬のスケジュールを組まれ……」
line = "「実家がとても厳しかったのです。娯楽は遠ざけられ、分刻みで学業と鍛錬のスケジュールを組まれ……」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「社会勉強の一貫、ということで流星寮で暮らし始めてからというもの……」
line = "「社会勉強の一貫、ということで流星寮で暮らし始めてからというもの……」"

[[dialogue]]
speaker = "unk"
# 羽目を外す機会が増えたんだ？
line = "羽目を外す機会が増えたんだ？"

[[dialogue]]
speaker = "エルデリーゼ"
# 「はい……。飲食店や映画館など、興味があっても手が出せなかったことを、夜間外出しながら経験しているのです」
line = "「はい……。飲食店や映画館など、興味があっても手が出せなかったことを、夜間外出しながら経験しているのです」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「今日の外出のテーマは『駄菓子を探せ！』なのですわ。アムは『心当たりのあるパティスリーをめぐってみたら？』と言うばかりで」
line = "「今日の外出のテーマは『駄菓子を探せ！』なのですわ。アムは『心当たりのあるパティスリーをめぐってみたら？』と言うばかりで」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「……え？　会長様、ご存じなのですか？　流石は新星学園の会長様です。ご慧眼をお持ちですのね！」
line = "「……え？　会長様、ご存じなのですか？　流石は新星学園の会長様です。ご慧眼をお持ちですのね！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「はい、付いて行きます……って。コンビニへ向かうのですか？　駄菓子はパティスリーにあるのでは……」
line = "「はい、付いて行きます……って。コンビニへ向かうのですか？　駄菓子はパティスリーにあるのでは……」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「アム……許しません……許しませんわ……！　今日伺ったパティスリー、恥ずかしくて当分行けないではないですか……！」
line = "「アム……許しません……許しませんわ……！　今日伺ったパティスリー、恥ずかしくて当分行けないではないですか……！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「でも会長様には感謝いたします。おかげ様で私、駄菓子とは何なのか、学ぶことができました」
line = "「でも会長様には感謝いたします。おかげ様で私、駄菓子とは何なのか、学ぶことができました」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「会席や贈答の場で嗜むことを目的としない、子どもに向けて製造される安価なお菓子。はい──覚えました」
line = "「会席や贈答の場で嗜むことを目的としない、子どもに向けて製造される安価なお菓子。はい──覚えました」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「しかし悔しいですわ……アムに何か仕返しはできないでしょうか」
line = "「しかし悔しいですわ……アムに何か仕返しはできないでしょうか」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「……あれ。おまけのキーホルダー、金色ですね。外箱に記載のないようですが……？」
line = "「……あれ。おまけのキーホルダー、金色ですね。外箱に記載のないようですが……？」"

[[dialogue]]
speaker = "unk"
# 後日。エルデリーゼが当てたシークレットの激レアキーホルダーを見たアムは、羨ましいやら悔しいやらで呻いたらしい──
line = "後日。エルデリーゼが当てたシークレットの激レアキーホルダーを見たアムは、羨ましいやら悔しいやらで呻いたらしい──"
