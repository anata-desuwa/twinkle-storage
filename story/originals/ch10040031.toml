[[dialogue]]
speaker = "unk"
# 第１話,アポロが目覚めて,P
line = "第１話,アポロが目覚めて,P"

[[dialogue]]
speaker = "unk"
# 森羅暦において二度目となるリクリエ危機を乗り越えた俺たちは、教皇庁の一室に集まっていた。
line = "森羅暦において二度目となるリクリエ危機を乗り越えた俺たちは、教皇庁の一室に集まっていた。"

[[dialogue]]
speaker = "unk"
# 世界を跨いでやってきた、デネブ世界のアポロが帰った今……待ちわびたその時が近づいていたから。
line = "世界を跨いでやってきた、デネブ世界のアポロが帰った今……待ちわびたその時が近づいていたから。"

[[dialogue]]
speaker = "unk"
# そう──俺たちの暮らすアルタイル世界の『アポロ』。本来の星見家の長女、フィオナの双子の姉が目を覚ます時なんだ──
line = "そう──俺たちの暮らすアルタイル世界の『アポロ』。本来の星見家の長女、フィオナの双子の姉が目を覚ます時なんだ──"

[[dialogue]]
speaker = "unk"
# ５年の時を経ての覚醒を星見家全体へ周知するため、駆け出そうとする俺たちを止めたのは、他ならぬアポロ本人だった。
line = "５年の時を経ての覚醒を星見家全体へ周知するため、駆け出そうとする俺たちを止めたのは、他ならぬアポロ本人だった。"

[[dialogue]]
speaker = "unk"
# まずはお前たちと話がしたい──彼女はそう言った。
line = "まずはお前たちと話がしたい──彼女はそう言った。"

[[dialogue]]
speaker = "アポロ"
# 「……っと。すまない、着替えに手間取った」
line = "「……っと。すまない、着替えに手間取った」"

[[dialogue]]
speaker = "アポロ"
# 「ふぅ……やっぱりまだフラフラするな……」
line = "「ふぅ……やっぱりまだフラフラするな……」"

[[dialogue]]
speaker = "フィオナ"
# 「姉さん、無理はしないでください。５年も寝たきりだったんですから……」
line = "「姉さん、無理はしないでください。５年も寝たきりだったんですから……」"

[[dialogue]]
speaker = "アポロ"
# 「いい、大丈夫だ。体の方はなまっているが……頭はしゃんとしてる。話ができないほどじゃない」
line = "「いい、大丈夫だ。体の方はなまっているが……頭はしゃんとしてる。話ができないほどじゃない」"

[[dialogue]]
speaker = "アポロ"
# 「人を呼べば落ち着いて話もできないだろ？　それは困るんだ。魔王……それにエリシア。他のみんなにも、伝えておきたい」
line = "「人を呼べば落ち着いて話もできないだろ？　それは困るんだ。魔王……それにエリシア。他のみんなにも、伝えておきたい」"

[[dialogue]]
speaker = "アポロ"
# 「今のあたしがどんな状態になっているのか。これからどうしようと思っているのか……迷惑をかけてきたお前たちにまず、伝えたいんだ」
line = "「今のあたしがどんな状態になっているのか。これからどうしようと思っているのか……迷惑をかけてきたお前たちにまず、伝えたいんだ」"

[[dialogue]]
speaker = "unk"
# その場にいる全員──新星学園と流星学園の星徒会メンバーたちが頷く。
line = "その場にいる全員──新星学園と流星学園の星徒会メンバーたちが頷く。"

[[dialogue]]
speaker = "フィオナ"
# 「わかりました。では姉さん、今までのことの説明から……」
line = "「わかりました。では姉さん、今までのことの説明から……」"

[[dialogue]]
speaker = "アポロ"
# 「いや、その必要はない。あたしが眠ってからの５年間……流星市国で何が起き、先日のリクリエ防衛にまで至ったのか」
line = "「いや、その必要はない。あたしが眠ってからの５年間……流星市国で何が起き、先日のリクリエ防衛にまで至ったのか」"

[[dialogue]]
speaker = "アポロ"
# 「<b>全て見聞きして、知っている</b>からな」
line = "「<b>全て見聞きして、知っている</b>からな」"

[[dialogue]]
speaker = "unk"
# 精神が同調していた……？
line = "精神が同調していた……？"

[[dialogue]]
speaker = "unk"
# きみはデネブ世界のアポロと
line = "きみはデネブ世界のアポロと"

[[dialogue]]
speaker = "アポロ"
# 「そうだ。アルタイルのあたしと、デネブからやってきて、リクリエの使徒としてお前たちと相対したアポロ」
line = "「そうだ。アルタイルのあたしと、デネブからやってきて、リクリエの使徒としてお前たちと相対したアポロ」"

[[dialogue]]
speaker = "アポロ"
# 「存在は異なっても本質は同じだ。デネブのアポロが見聞きしたことは全て、あたしの記憶に刻まれている」
line = "「存在は異なっても本質は同じだ。デネブのアポロが見聞きしたことは全て、あたしの記憶に刻まれている」"

[[dialogue]]
speaker = "アポロ"
# 「みんな……すまなかった。こんなことになったのは全てあたしの責任だ」
line = "「みんな……すまなかった。こんなことになったのは全てあたしの責任だ」"

[[dialogue]]
speaker = "アポロ"
# 「デネブのアポロがリクリエの使徒として現れたのも、アルタイルのあたしが共鳴してしまったからだ」
line = "「デネブのアポロがリクリエの使徒として現れたのも、アルタイルのあたしが共鳴してしまったからだ」"

[[dialogue]]
speaker = "アポロ"
# 「星見家長女の重責……誰にも相談できないと思い込んで自棄になり……こんな世界はなくなってしまえばいいと、リクリエを望んでしまったから」
line = "「星見家長女の重責……誰にも相談できないと思い込んで自棄になり……こんな世界はなくなってしまえばいいと、リクリエを望んでしまったから」"

[[dialogue]]
speaker = "アポロ"
# 「心の弱さを突かれた結果がこれだ。魔王にエリシア、それに世界中の人達にどんな顔を向ければいいのか……」
line = "「心の弱さを突かれた結果がこれだ。魔王にエリシア、それに世界中の人達にどんな顔を向ければいいのか……」"

[[dialogue]]
speaker = "アポロ"
# 「償う方法も、目覚めるまでに色々考えた。家名に泥を塗った身だ。流星市国から姿を消すか。そうでなくとも星見家からは去るべきか……とな」
line = "「償う方法も、目覚めるまでに色々考えた。家名に泥を塗った身だ。流星市国から姿を消すか。そうでなくとも星見家からは去るべきか……とな」"

[[dialogue]]
speaker = "フィオナ"
# 「姉さん……！？」
line = "「姉さん……！？」"

[[dialogue]]
speaker = "アポロ"
# 「でも──それは逃げだよな。だからもう１人のあたしが語ったあの言葉を、アルタイルのあたしからも誓わせてもらいたい」
line = "「でも──それは逃げだよな。だからもう１人のあたしが語ったあの言葉を、アルタイルのあたしからも誓わせてもらいたい」"

[[dialogue]]
speaker = "アポロ"
# 「たくさん迷惑かけて……悪かったな。今度こそ、本物のヒーローになれるよう、頑張ってみるさ」
line = "「たくさん迷惑かけて……悪かったな。今度こそ、本物のヒーローになれるよう、頑張ってみるさ」"

[[dialogue]]
speaker = "アポロ"
# 「あたしには星の力も、あの戦いで目覚めた<ruby=まおう>星見家</ruby>の力もある。使徒としての再創生の力は当然失ったが、役に立てるはずだ」
line = "「あたしには星の力も、あの戦いで目覚めた<ruby>星見家<rt>まおう</rt></ruby>の力もある。使徒としての再創生の力は当然失ったが、役に立てるはずだ」"

[[dialogue]]
speaker = "アポロ"
# 「あたしは……今度こそ本当の流星ライダーになりたい。だから引き続き、あたしのことは『アポロ』と呼んでくれ。『フィオナ』の名前はエリシアに譲ったからな」
line = "「あたしは……今度こそ本当の流星ライダーになりたい。だから引き続き、あたしのことは『アポロ』と呼んでくれ。『フィオナ』の名前はエリシアに譲ったからな」"

[[dialogue]]
speaker = "アポロ"
# 「もちろん、どれもこれも、お前たちが受け入れてくれればの話だけど……」
line = "「もちろん、どれもこれも、お前たちが受け入れてくれればの話だけど……」"

[[dialogue]]
speaker = "unk"
# アポロの戦いはみんなが見ていたんだから
line = "アポロの戦いはみんなが見ていたんだから"

[[dialogue]]
speaker = "unk"
# 反対する人はいないよ
line = "反対する人はいないよ"

[[dialogue]]
speaker = "アポロ"
# 「うん……ありがとう」
line = "「うん……ありがとう」"

[[dialogue]]
speaker = "アポロ"
# 「他にも何か手土産の情報でもあれば、お前たちの役に立てたんだろうが……」
line = "「他にも何か手土産の情報でもあれば、お前たちの役に立てたんだろうが……」"

[[dialogue]]
speaker = "アポロ"
# 「デネブのアポロが知らなかったことは、あたしにもわからないんだ。例えば『使徒を誰が生み出しているのか』なんかだな」
line = "「デネブのアポロが知らなかったことは、あたしにもわからないんだ。例えば『使徒を誰が生み出しているのか』なんかだな」"

[[dialogue]]
speaker = "アポロ"
# 「私があの仮面に飲み込まれていた時……頭の中にあったのは、ただただリクリエを遂行しようとする使命感だけだった」
line = "「私があの仮面に飲み込まれていた時……頭の中にあったのは、ただただリクリエを遂行しようとする使命感だけだった」"

[[dialogue]]
speaker = "アポロ"
# 「リクリエにまつわる再創生の力がなぜ使えたのか。どうやってモンスターを生み出していたのか……その仕組みすら……」
line = "「リクリエにまつわる再創生の力がなぜ使えたのか。どうやってモンスターを生み出していたのか……その仕組みすら……」"

[[dialogue]]
speaker = "unk"
# 直感的にわかるような感じか
line = "直感的にわかるような感じか"

[[dialogue]]
speaker = "unk"
# 力の使い方だけが
line = "力の使い方だけが"

[[dialogue]]
speaker = "アポロ"
# 「そういうことだ。力になれなくて、すまない」
line = "「そういうことだ。力になれなくて、すまない」"

[[dialogue]]
speaker = "アポロ"
# 「だがあたしにできることがあれば何でも言ってくれ。期待に添えるよう、応えるつもりだ」
line = "「だがあたしにできることがあれば何でも言ってくれ。期待に添えるよう、応えるつもりだ」"

[[dialogue]]
speaker = "フィオナ"
# 「何でも、ですか。では姉さん。まず１つ……あまり無理な喋り方はしないでください」
line = "「何でも、ですか。では姉さん。まず１つ……あまり無理な喋り方はしないでください」"

[[dialogue]]
speaker = "アポロ"
# 「……無理な喋り方？」
line = "「……無理な喋り方？」"

[[dialogue]]
speaker = "フィオナ"
# 「名前だけではなく、星見家の『フィオナ』の役回りは私が継いでいます」
line = "「名前だけではなく、星見家の『フィオナ』の役回りは私が継いでいます」"

[[dialogue]]
speaker = "フィオナ"
# 「姉さんは、眠りに就く前の……その体に見合った、背伸びをしない喋り方をして欲しいんです」
line = "「姉さんは、眠りに就く前の……その体に見合った、背伸びをしない喋り方をして欲しいんです」"

[[dialogue]]
speaker = "フィオナ"
# 「姉さんは元々わんぱくで、ジッとしていられない性格だったでしょう？」
line = "「姉さんは元々わんぱくで、ジッとしていられない性格だったでしょう？」"

[[dialogue]]
speaker = "unk"
# 言われて俺も思い出す──初めてアポロと出会ったのは、流星教皇の説教から抜け出して、走ってきた彼女とぶつかったんだっけ。
line = "言われて俺も思い出す──初めてアポロと出会ったのは、流星教皇の説教から抜け出して、走ってきた彼女とぶつかったんだっけ。"

[[dialogue]]
speaker = "unk"
# ──あれが元々のアポロ。フィオナのお姉さんの性格だったな。
line = "──あれが元々のアポロ。フィオナのお姉さんの性格だったな。"

[[dialogue]]
speaker = "フィオナ"
# 「無理をせず、自然体のままで大丈夫です。今のような真面目な喋り方はしないでいいんですよ、姉さん」
line = "「無理をせず、自然体のままで大丈夫です。今のような真面目な喋り方はしないでいいんですよ、姉さん」"

[[dialogue]]
speaker = "アポロ"
# 「──うん。ありがとな……『フィオナ』」
line = "「──うん。ありがとな……『フィオナ』」"

[[dialogue]]
speaker = "フィオナ"
# 「はい。姉さんはアポロ。私はフィオナと、これまで通り名乗っていきましょう──でも」
line = "「はい。姉さんはアポロ。私はフィオナと、これまで通り名乗っていきましょう──でも」"

[[dialogue]]
speaker = "アポロ"
# 「……でも？」
line = "「……でも？」"

[[dialogue]]
speaker = "フィオナ"
# 「誰もいない時。姉妹２人だけの時は、エリシア、と呼んでいただければ」
line = "「誰もいない時。姉妹２人だけの時は、エリシア、と呼んでいただければ」"

[[dialogue]]
speaker = "アポロ"
# 「……ああ。わかった。約束だ」
line = "「……ああ。わかった。約束だ」"

[[dialogue]]
speaker = "unk"
# この後、星見家の長女が目を覚ましたことが、ごくごくわずかな人へのみ伝えられた。
line = "この後、星見家の長女が目を覚ましたことが、ごくごくわずかな人へのみ伝えられた。"

[[dialogue]]
speaker = "unk"
# 表向き、アポロは星見家の養子ということで、フィオナの暮らす屋敷へ居候をするということで落ち着いたのだった──
line = "表向き、アポロは星見家の養子ということで、フィオナの暮らす屋敷へ居候をするということで落ち着いたのだった──"
