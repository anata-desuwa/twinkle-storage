[[dialogue]]
speaker = "unk"
# 第１話,ノヴァフォームのお姉ちゃん♪,P
line = "第１話,ノヴァフォームのお姉ちゃん♪,P"

[[dialogue]]
speaker = "unk"
# ロストアイテムをめぐる一件を経て、サーシャさんは新たな可能性──ノヴァフォームを獲得した。
line = "ロストアイテムをめぐる一件を経て、サーシャさんは新たな可能性──ノヴァフォームを獲得した。"

[[dialogue]]
speaker = "unk"
# 学園の先輩として、星騎士として、そして俺の恋人として。サーシャさんはとても心強いパートナーとなってくれた……のはいいのだけど。
line = "学園の先輩として、星騎士として、そして俺の恋人として。サーシャさんはとても心強いパートナーとなってくれた……のはいいのだけど。"

[[dialogue]]
speaker = "unk"
# 実はサーシャさんがノヴァフォームを得てからというもの、ちょっとだけ困った事になっていて……
line = "実はサーシャさんがノヴァフォームを得てからというもの、ちょっとだけ困った事になっていて……"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「は～い、会長くん。お姉ちゃんの膝枕から逃げちゃダ～メ♪　ぎゅ～うっ<emoji=heart04>」
line = "「は～い、会長くん。お姉ちゃんの膝枕から逃げちゃダ～メ♪　ぎゅ～うっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 誰か来るかも……！
line = "誰か来るかも……！"

[[dialogue]]
speaker = "unk"
# 星徒会室で膝枕はまずいです……！
line = "星徒会室で膝枕はまずいです……！"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「え～？　でもでも、こうやってイチャイチャするのも大切なお仕事のうちでしょう？」
line = "「え～？　でもでも、こうやってイチャイチャするのも大切なお仕事のうちでしょう？」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「トワちゃん先生からのお願いなんだから、しっかり励まないとね～♪　というわけでー、なでなでも継続～♪　よしよ～し、よしよ～し<emoji=heart04>」
line = "「トワちゃん先生からのお願いなんだから、しっかり励まないとね～♪　というわけでー、なでなでも継続～♪　よしよ～し、よしよ～し<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「あ～ん。やっぱり会長くん、とっても可愛い～。このまま寮までお持ち帰りしたくなっちゃうわ～<emoji=heart04>」
line = "「あ～ん。やっぱり会長くん、とっても可愛い～。このまま寮までお持ち帰りしたくなっちゃうわ～<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「あら、お客さんかしら？　は～い、どうぞ～♪」
line = "「あら、お客さんかしら？　は～い、どうぞ～♪」"

[[dialogue]]
speaker = "unk"
# まだ膝枕をしたままなのに──！
line = "まだ膝枕をしたままなのに──！"

[[dialogue]]
speaker = "unk"
# ──ちょっと待ってください！？
line = "──ちょっと待ってください！？"

[[dialogue]]
speaker = "ソフィア"
# 「失礼します。流星学園星徒会より、次回の合同訓練の資料を──」
line = "「失礼します。流星学園星徒会より、次回の合同訓練の資料を──」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「あら～、ソフィ。いらっしゃ～い♪」
line = "「あら～、ソフィ。いらっしゃ～い♪」"

[[dialogue]]
speaker = "ソフィア"
# 「──って！？　なな、何をしているんですか姉さんっ！？」
line = "「──って！？　なな、何をしているんですか姉さんっ！？」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「何って、もちろん星騎士のお仕事よ～♪」
line = "「何って、もちろん星騎士のお仕事よ～♪」"

[[dialogue]]
speaker = "ソフィア"
# 「どこの世界に、膝枕で頭を撫でるお仕事があるんですか！　訪ねてきたのが私で良かったです……はやく離れてくださいっ！」
line = "「どこの世界に、膝枕で頭を撫でるお仕事があるんですか！　訪ねてきたのが私で良かったです……はやく離れてくださいっ！」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「あ～ん。せっかくごねる会長くんをお膝に捕まえてたのに～……」
line = "「あ～ん。せっかくごねる会長くんをお膝に捕まえてたのに～……」"

[[dialogue]]
speaker = "ソフィア"
# 「お２人はお付き合いしてるんですから、仲良くするなとは言いません。けれど分別は付けてください！　妹として恥ずかしいです」
line = "「お２人はお付き合いしてるんですから、仲良くするなとは言いません。けれど分別は付けてください！　妹として恥ずかしいです」"

[[dialogue]]
speaker = "ソフィア"
# 「ただでさえカフェやら図書館やらで、イチャイチャしてる姉さんたちの話、友達から聞かされてるんですから……！」
line = "「ただでさえカフェやら図書館やらで、イチャイチャしてる姉さんたちの話、友達から聞かされてるんですから……！」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「あらあら、うふふ♪　とっても有名になっちゃってるのね～<emoji=heart04>」
line = "「あらあら、うふふ♪　とっても有名になっちゃってるのね～<emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
# 「笑ってる場合じゃありません！　まったくもう……」
line = "「笑ってる場合じゃありません！　まったくもう……」"

[[dialogue]]
speaker = "ソフィア"
# 「というかどうして、戦闘訓練でもないのにノヴァフォームになっているんです？」
line = "「というかどうして、戦闘訓練でもないのにノヴァフォームになっているんです？」"

[[dialogue]]
speaker = "ソフィア"
# 「あれですか。会長さんからコスプレでも頼まれたんですか？　だったらちょっと引いちゃうかもしれません……」
line = "「あれですか。会長さんからコスプレでも頼まれたんですか？　だったらちょっと引いちゃうかもしれません……」"

[[dialogue]]
speaker = "unk"
# ひどい！？
line = "ひどい！？"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「あ～ん。さっきも言ったでしょう？　星騎士のお仕事をしてたの～」
line = "「あ～ん。さっきも言ったでしょう？　星騎士のお仕事をしてたの～」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「変身をしてるのも、膝枕をしてたのも、頭をナデナデしてたのも、ぜ～んぶお仕事に必要だったからなのよ～？」
line = "「変身をしてるのも、膝枕をしてたのも、頭をナデナデしてたのも、ぜ～んぶお仕事に必要だったからなのよ～？」"

[[dialogue]]
speaker = "ソフィア"
# 「そんなおバカな話があるわけないでしょう。信じませんよ、私は」
line = "「そんなおバカな話があるわけないでしょう。信じませんよ、私は」"

[[dialogue]]
speaker = "unk"
# いや、それが実は──
line = "いや、それが実は──"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「覚醒条件も曖昧だし、戦闘能力は上がるけれど燃費は悪いしー……」
line = "「覚醒条件も曖昧だし、戦闘能力は上がるけれど燃費は悪いしー……」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「目覚めたノヴァフォームの能力をさらに引き上げる方法も、手探り状態と来ているわ」
line = "「目覚めたノヴァフォームの能力をさらに引き上げる方法も、手探り状態と来ているわ」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「だから少しでもデータを集める必要があって、お姉ちゃんがお願いされたってわけね～♪」
line = "「だから少しでもデータを集める必要があって、お姉ちゃんがお願いされたってわけね～♪」"

[[dialogue]]
speaker = "ソフィア"
# 「でも、スキンシップをする必要はないじゃないですか！」
line = "「でも、スキンシップをする必要はないじゃないですか！」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「いいえソフィ、それは違うわ。精神的な成長や満足が、星力に影響を及ぼすっていう説を聞いたことはあるでしょう？」
line = "「いいえソフィ、それは違うわ。精神的な成長や満足が、星力に影響を及ぼすっていう説を聞いたことはあるでしょう？」"

[[dialogue]]
speaker = "ソフィア"
# 「それは……はい。私たち星騎士はメンタルの影響を強く受けます」
line = "「それは……はい。私たち星騎士はメンタルの影響を強く受けます」"

[[dialogue]]
speaker = "ソフィア"
# 「太陽フレアの際、フィオナ会長がウェンディングドレスに変身してしまったことも、そのせいだと聞いていますし……」
line = "「太陽フレアの際、フィオナ会長がウェンディングドレスに変身してしまったことも、そのせいだと聞いていますし……」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「ね～？　その常識がノヴァフォームに当てはまるのかも、検証しなくちゃいけないの」
line = "「ね～？　その常識がノヴァフォームに当てはまるのかも、検証しなくちゃいけないの」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「ノヴァフォームを得ていることに加えて、会長くんという異性のパートナーがいる私は、データ収集にぴったりみたいでね♪」
line = "「ノヴァフォームを得ていることに加えて、会長くんという異性のパートナーがいる私は、データ収集にぴったりみたいでね♪」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「恋愛感情がどの程度新しい戦闘服に影響を与えるかも測定したいから、できるかぎり変身して過ごして、って言われちゃってるというわけなの～<emoji=heart04>」
line = "「恋愛感情がどの程度新しい戦闘服に影響を与えるかも測定したいから、できるかぎり変身して過ごして、って言われちゃってるというわけなの～<emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
# 「むむむ……そういう事情があったんですか……」
line = "「むむむ……そういう事情があったんですか……」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「そうなのよ～……本当はお姉ちゃんもすっっっごく恥ずかしいんだけど～。先生に言われちゃったなら、仕方ないでしょう？」
line = "「そうなのよ～……本当はお姉ちゃんもすっっっごく恥ずかしいんだけど～。先生に言われちゃったなら、仕方ないでしょう？」"

[[dialogue]]
speaker = "ソフィア"
# 「絶対に嘘です。姉さんはそんなことで恥ずかしがるようなタイプじゃありません」
line = "「絶対に嘘です。姉さんはそんなことで恥ずかしがるようなタイプじゃありません」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「あ～ん、ひどーい♪」
line = "「あ～ん、ひどーい♪」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「でもこれでわかってくれたでしょう？　これも立派なお仕事なのよ」
line = "「でもこれでわかってくれたでしょう？　これも立派なお仕事なのよ」"

[[dialogue]]
speaker = "ソフィア"
# 「会長さんも大変ですね……先生からそんなお願いをされるだなんて。お察しします」
line = "「会長さんも大変ですね……先生からそんなお願いをされるだなんて。お察しします」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「うふふ<emoji=heart04>　というわけで～、イチャイチャ再開～<emoji=heart04>　ぎゅ～う～っ<emoji=heart04>」
line = "「うふふ<emoji=heart04>　というわけで～、イチャイチャ再開～<emoji=heart04>　ぎゅ～う～っ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# むぎゅうぅ……！
line = "むぎゅうぅ……！"

[[dialogue]]
speaker = "ソフィア"
# 「まあ星騎士のお仕事ならしょうがありません……」
line = "「まあ星騎士のお仕事ならしょうがありません……」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「うふふ♪　ソフィの誤解も解けたことだし、いっぱいイチャイチャしましょうね～？」
line = "「うふふ♪　ソフィの誤解も解けたことだし、いっぱいイチャイチャしましょうね～？」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「ほっぺにちゅ～<emoji=heart04>　うふふ、照れちゃってる～、可愛いわ～っ<emoji=heart04>」
line = "「ほっぺにちゅ～<emoji=heart04>　うふふ、照れちゃってる～、可愛いわ～っ<emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
# 「これは姉さんが楽しんでいるわけではなく……学術研究のために必要なことで……」
line = "「これは姉さんが楽しんでいるわけではなく……学術研究のために必要なことで……」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「あ～ん<emoji=heart04>　頭もなでなで～、おでこにもちゅっちゅっ、ちゅ～っ<emoji=heart04>」
line = "「あ～ん<emoji=heart04>　頭もなでなで～、おでこにもちゅっちゅっ、ちゅ～っ<emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
# 「や──やっぱりダメです！　死ぬほど恥ずかしいです！！　姉さんっ、人前でベタベタするのはやめてくださいっ……！　お願いですからっ！」
line = "「や──やっぱりダメです！　死ぬほど恥ずかしいです！！　姉さんっ、人前でベタベタするのはやめてくださいっ……！　お願いですからっ！」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「止めないでソフィ！　お姉ちゃん、星体力学の発展のために一生懸命なの！　これは三界の平和のためなのよ～！」
line = "「止めないでソフィ！　お姉ちゃん、星体力学の発展のために一生懸命なの！　これは三界の平和のためなのよ～！」"

[[dialogue]]
speaker = "ソフィア"
# 「認められません！　離れてください～っ！」
line = "「認められません！　離れてください～っ！」"

[[dialogue]]
speaker = "unk"
# ノヴァフォームはまだ不明瞭な点が多いから、様々な観点からアプローチしていかなくてはならない──それはわかる。
line = "ノヴァフォームはまだ不明瞭な点が多いから、様々な観点からアプローチしていかなくてはならない──それはわかる。"

[[dialogue]]
speaker = "unk"
# だけどスキンシップ大好きのサーシャさんが大義名分を得てしまったことで、俺の日常はこんな風に、隙あらば抱きしめられてしまう羽目になったのだった──
line = "だけどスキンシップ大好きのサーシャさんが大義名分を得てしまったことで、俺の日常はこんな風に、隙あらば抱きしめられてしまう羽目になったのだった──"
