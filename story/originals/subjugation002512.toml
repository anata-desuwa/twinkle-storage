[[dialogue]]
speaker = "unk"
# シャドウフィオナに勝負を挑んだ俺たち。その激戦の末――
line = "シャドウフィオナに勝負を挑んだ俺たち。その激戦の末――"

[[dialogue]]
speaker = "シャドウフィオナ"
# 「っ……！」
line = "「っ……！」"

[[dialogue]]
speaker = "unk"
# ついに、倒した……！
line = "ついに、倒した……！"

[[dialogue]]
speaker = "ウズメイア"
# 「やった～！　すっごーいっ！　会長くん、さっきの技って何！？」
line = "「やった～！　すっごーいっ！　会長くん、さっきの技って何！？」"

[[dialogue]]
speaker = "舞亜"
# 「ビックリしちゃった。あんなに強かったフィオナ会長のシャドウを倒しちゃうなんて」
line = "「ビックリしちゃった。あんなに強かったフィオナ会長のシャドウを倒しちゃうなんて」"

[[dialogue]]
speaker = "unk"
# 今の俺にできる最大の新必殺技だ
line = "今の俺にできる最大の新必殺技だ"

[[dialogue]]
speaker = "ソフィア"
# 「なるほど……魔王の力が使えないからこそ、技を磨き上げる。クールです」
line = "「なるほど……魔王の力が使えないからこそ、技を磨き上げる。クールです」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「これはご褒美に、後で労ってあげないといけませんね～。くふふっ♪」
line = "「これはご褒美に、後で労ってあげないといけませんね～。くふふっ♪」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆーゆっゆっゆ♪　余も大活躍したの！　感謝して、後でお菓子を沢山持って来るといいゆ♪」
line = "「ゆーゆっゆっゆ♪　余も大活躍したの！　感謝して、後でお菓子を沢山持って来るといいゆ♪」"

[[dialogue]]
speaker = "トリシャ"
# 「はい。ジャクリーヌさんにはすごく感謝しています。おかげで、戦いに勝てただけでなく、ヒトリさんが棺桶から出て来てくれましたから」
line = "「はい。ジャクリーヌさんにはすごく感謝しています。おかげで、戦いに勝てただけでなく、ヒトリさんが棺桶から出て来てくれましたから」"

[[dialogue]]
speaker = "トリシャ"
# 「それでヒトリさん、改めてなのですが……」
line = "「それでヒトリさん、改めてなのですが……」"

[[dialogue]]
speaker = "ヒトリ"
# 「は、はい。なんでしょう……？」
line = "「は、はい。なんでしょう……？」"

[[dialogue]]
speaker = "トリシャ"
# 「私と、どうか友達になって頂けませんか？　もちろん、ゆーさんも」
line = "「私と、どうか友達になって頂けませんか？　もちろん、ゆーさんも」"

[[dialogue]]
speaker = "ヒトリ"
# 「わ、私でよければ……ゆーちゃんのことが見えるヒトは少ないので、ありがたいです」
line = "「わ、私でよければ……ゆーちゃんのことが見えるヒトは少ないので、ありがたいです」"

[[dialogue]]
speaker = "トリシャ"
# 「よかった……前から仲良くなれたらと機会を窺っていたので、友達になれて嬉しいです。ふへへ♪」
line = "「よかった……前から仲良くなれたらと機会を窺っていたので、友達になれて嬉しいです。ふへへ♪」"

[[dialogue]]
speaker = "ヒトリ"
# 「そうだったんですね。その……私もトリシャさんと知り合えて嬉しいです。え、えへへへへ♪」
line = "「そうだったんですね。その……私もトリシャさんと知り合えて嬉しいです。え、えへへへへ♪」"

[[dialogue]]
speaker = "ゆーちゃん"
# 「てーてー♪」
line = "「てーてー♪」"

[[dialogue]]
speaker = "ウズメイア"
# 「というか、トリシャさんとのやり取り、邪魔しないように見守ってたけど――」
line = "「というか、トリシャさんとのやり取り、邪魔しないように見守ってたけど――」"

[[dialogue]]
speaker = "ウズメイア"
# 「あたしもヒトリちゃんと仲良くなりたいし！　もち、ジャクリーヌちゃんとも！」
line = "「あたしもヒトリちゃんと仲良くなりたいし！　もち、ジャクリーヌちゃんとも！」"

[[dialogue]]
speaker = "ヒトリ"
# 「ひゃあっ！？」
line = "「ひゃあっ！？」"

[[dialogue]]
speaker = "unk"
# ヒトリが再び棺桶に隠れてしまう。
line = "ヒトリが再び棺桶に隠れてしまう。"

[[dialogue]]
speaker = "舞亜"
# 「あっ、驚いてまた隠れちゃった」
line = "「あっ、驚いてまた隠れちゃった」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「余と仲良くなりたいの？　お菓子をくれたら、考えてあげてもいいゆ♪」
line = "「余と仲良くなりたいの？　お菓子をくれたら、考えてあげてもいいゆ♪」"

[[dialogue]]
speaker = "ウズメイア"
# 「それだけでいいの？　お安い御用じゃん♪　そしたら今度、一緒にオススメのスイーツのお店に食べに行こ～！　絶対に美味しいから。奢るし♪」
line = "「それだけでいいの？　お安い御用じゃん♪　そしたら今度、一緒にオススメのスイーツのお店に食べに行こ～！　絶対に美味しいから。奢るし♪」"

[[dialogue]]
speaker = "舞亜"
# 「ヒトリさ～ん、ゆっくりでいいから、出て来なよ。同じ１年生なんだし、気を遣わなくてもいいからさ」
line = "「ヒトリさ～ん、ゆっくりでいいから、出て来なよ。同じ１年生なんだし、気を遣わなくてもいいからさ」"

[[dialogue]]
speaker = "ヒトリ"
# 「し、失礼しました……。つい癖で……」
line = "「し、失礼しました……。つい癖で……」"

[[dialogue]]
speaker = "unk"
# 棺桶からおずおずと出て来ながら言うヒトリ。
line = "棺桶からおずおずと出て来ながら言うヒトリ。"

[[dialogue]]
speaker = "ソフィア"
# 「ヒトリさんのことは前から知っていました。カフェテリアでよく、私たち３人を見ていましたよね？　声を掛けようとすると、逃げられてしまっていましたが……」
line = "「ヒトリさんのことは前から知っていました。カフェテリアでよく、私たち３人を見ていましたよね？　声を掛けようとすると、逃げられてしまっていましたが……」"

[[dialogue]]
speaker = "ヒトリ"
# 「そ、それは……ごめんなさい」
line = "「そ、それは……ごめんなさい」"

[[dialogue]]
speaker = "ヒトリ"
# 「３人がすごく、てーてー関係に見えたので……邪魔したくなくて」
line = "「３人がすごく、てーてー関係に見えたので……邪魔したくなくて」"

[[dialogue]]
speaker = "ソフィア"
# 「てーてー？」
line = "「てーてー？」"

[[dialogue]]
speaker = "ウズメイア"
# 「もしかしてそれ、『尊い』ってこと？　あたし、日本文化好きだから聞いたことあるし！」
line = "「もしかしてそれ、『尊い』ってこと？　あたし、日本文化好きだから聞いたことあるし！」"

[[dialogue]]
speaker = "ヒトリ"
# 「は、はい。最近は更に、３人の輪にシャルレーヌさんも加わって、てーてーにより深みが増して……」
line = "「は、はい。最近は更に、３人の輪にシャルレーヌさんも加わって、てーてーにより深みが増して……」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「えっ、私もですか？　それってどういう……」
line = "「えっ、私もですか？　それってどういう……」"

[[dialogue]]
speaker = "ヒトリ"
# 「はぅ……ごめんなさい！　これ以上は、てーてー関係に余計な邪魔をしてしまうので、言えません……！」
line = "「はぅ……ごめんなさい！　これ以上は、てーてー関係に余計な邪魔をしてしまうので、言えません……！」"

[[dialogue]]
speaker = "unk"
# そこまで口にすると、ヒトリは三度棺桶に隠れてしまった。
line = "そこまで口にすると、ヒトリは三度棺桶に隠れてしまった。"

[[dialogue]]
speaker = "ウズメイア"
# 「ちょっ、どういうこと？　あたし、めっちゃ気になるんだけど～！」
line = "「ちょっ、どういうこと？　あたし、めっちゃ気になるんだけど～！」"

[[dialogue]]
speaker = "舞亜"
# 「ふふっ、これは後でみんなでスイーツ食べに行くのが楽しみだね～」
line = "「ふふっ、これは後でみんなでスイーツ食べに行くのが楽しみだね～」"

[[dialogue]]
speaker = "ソフィア"
# 「よろしければ、トリシャさんも一緒にいかがですか？」
line = "「よろしければ、トリシャさんも一緒にいかがですか？」"

[[dialogue]]
speaker = "トリシャ"
# 「私もいいんですか……？」
line = "「私もいいんですか……？」"

[[dialogue]]
speaker = "ソフィア"
# 「もちろんです。友達ですから」
line = "「もちろんです。友達ですから」"

[[dialogue]]
speaker = "トリシャ"
# 「……！　ありがとうございます。占星術で今日はとてもいいことがあると出ていましたが、大当たりです。ふへへ♪」
line = "「……！　ありがとうございます。占星術で今日はとてもいいことがあると出ていましたが、大当たりです。ふへへ♪」"

[[dialogue]]
speaker = "unk"
# そうして、トリシャは嬉しそうな笑顔を咲かせるのだった――
line = "そうして、トリシャは嬉しそうな笑顔を咲かせるのだった――"

[[dialogue]]
speaker = "unk"
# その後。
line = "その後。"

[[dialogue]]
speaker = "unk"
# シャドウフィオナが１度撃破されてから、俺たちが仮想空間を退出し、しばらくして。
line = "シャドウフィオナが１度撃破されてから、俺たちが仮想空間を退出し、しばらくして。"

[[dialogue]]
speaker = "シャドウフィオナ"
# 「――――」
line = "「――――」"

[[dialogue]]
speaker = "unk"
# もう１度、シャドウフィオナを倒してみせる星騎士が現れた。それは――
line = "もう１度、シャドウフィオナを倒してみせる星騎士が現れた。それは――"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「よし！　確かに強かったけど、何とか勝てたわ！」
line = "「よし！　確かに強かったけど、何とか勝てたわ！」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「だけど、う～ん……」
line = "「だけど、う～ん……」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「な～んかちょっと……違うのよね～」
line = "「な～んかちょっと……違うのよね～」"

[[dialogue]]
speaker = "unk"
# 新星学園最強の星騎士と称される彼女は、思案するように呟くのだった――
line = "新星学園最強の星騎士と称される彼女は、思案するように呟くのだった――"
