[[dialogue]]
speaker = "モネ"
# 「調べものと言えば、やはり図書館ですからね」
line = "「調べものと言えば、やはり図書館ですからね」"

[[dialogue]]
speaker = "リップル"
# 「オ～！　本がイッパイです！　図書館久しぶりにキマシた！」
line = "「オ～！　本がイッパイです！　図書館久しぶりにキマシた！」"

[[dialogue]]
speaker = "モネ"
# 「あ、リップルさん図書館では静かにお願いしますね」
line = "「あ、リップルさん図書館では静かにお願いしますね」"

[[dialogue]]
speaker = "リップル"
# 「あう、ゴメンなさい……静かにシャベリま～す……」
line = "「あう、ゴメンなさい……静かにシャベリま～す……」"

[[dialogue]]
speaker = "モネ"
# 「はぁ……それにしても、やはり図書館は最高ですね……紙とインクの<ruby=ふくいく>馥郁</ruby>たる香りに包まれて、ついヨダレが出そうになります」
line = "「はぁ……それにしても、やはり図書館は最高ですね……紙とインクの<ruby>馥郁<rt>ふくいく</rt></ruby>たる香りに包まれて、ついヨダレが出そうになります」"

[[dialogue]]
speaker = "リップル"
# 「モネは本を食べるんデスか？」
line = "「モネは本を食べるんデスか？」"

[[dialogue]]
speaker = "モネ"
# 「そんな！　食べたりなんてしませんよ。ちょっと匂いをハスハスしたりスリスリしたり…………いえ、何でもないです。忘れてください……」
line = "「そんな！　食べたりなんてしませんよ。ちょっと匂いをハスハスしたりスリスリしたり…………いえ、何でもないです。忘れてください……」"

[[dialogue]]
speaker = "リップル"
# 「モネは本当に本がダイスキなんですねっ」
line = "「モネは本当に本がダイスキなんですねっ」"

[[dialogue]]
speaker = "モネ"
# 「そうですね、大好きです。ずっと本に囲まれて生きてきましたから……本はもう、私の体の一部みたいなものです」
line = "「そうですね、大好きです。ずっと本に囲まれて生きてきましたから……本はもう、私の体の一部みたいなものです」"

[[dialogue]]
speaker = "リップル"
# 「ふふっ……モネにとっての本は、ワタシにとってのサマーなんですね。ワタシたち似た者ドウシですっ」
line = "「ふふっ……モネにとっての本は、ワタシにとってのサマーなんですね。ワタシたち似た者ドウシですっ」"

[[dialogue]]
speaker = "モネ"
# 「あまり考えたことはなかったですけど……そうかもしれないですね。陽のリップルさんと陰の私が似た者同士……なんだか不思議な気持ちです」
line = "「あまり考えたことはなかったですけど……そうかもしれないですね。陽のリップルさんと陰の私が似た者同士……なんだか不思議な気持ちです」"

[[dialogue]]
speaker = "リップル"
# 「ワタシは嬉シイです♪　モネのこと、もっとチカクに感じま～す♪」
line = "「ワタシは嬉シイです♪　モネのこと、もっとチカクに感じま～す♪」"

[[dialogue]]
speaker = "モネ"
# 「そう言われると、少し照れちゃいますね……」
line = "「そう言われると、少し照れちゃいますね……」"

[[dialogue]]
speaker = "リップル"
# 「照れてるモネもカワイイで～す♪　思わずハグしたくナリます♪」
line = "「照れてるモネもカワイイで～す♪　思わずハグしたくナリます♪」"

[[dialogue]]
speaker = "モネ"
# 「も、もうしてるっ……！　ハグされちゃってますから……！」
line = "「も、もうしてるっ……！　ハグされちゃってますから……！」"

[[dialogue]]
speaker = "リップル"
# 「えへへ、体が勝手に動いてシマイました♪　許してクダさ～い♪」
line = "「えへへ、体が勝手に動いてシマイました♪　許してクダさ～い♪」"

[[dialogue]]
speaker = "モネ"
# 「ふぅ……そういえばリップルさんは普段本を読まれますか？」
line = "「ふぅ……そういえばリップルさんは普段本を読まれますか？」"

[[dialogue]]
speaker = "リップル"
# 「本デスか？　ウーン、あんまり読まナイです」
line = "「本デスか？　ウーン、あんまり読まナイです」"

[[dialogue]]
speaker = "モネ"
# 「でしたら、私が図書館を案内しますね。図書館は私のテリトリーなので」
line = "「でしたら、私が図書館を案内しますね。図書館は私のテリトリーなので」"

[[dialogue]]
speaker = "リップル"
# 「オオッ、モネも頼もシイですっ」
line = "「オオッ、モネも頼もシイですっ」"

[[dialogue]]
speaker = "モネ"
# 「ふふっ、とりあえずクリスマス関連の本を探してみましょうか。ここの近くですと……クリスマスの恋愛小説がありますね」
line = "「ふふっ、とりあえずクリスマス関連の本を探してみましょうか。ここの近くですと……クリスマスの恋愛小説がありますね」"

[[dialogue]]
speaker = "リップル"
# 「クリスマスとレンアイって、何か関係があるんデスか？」
line = "「クリスマスとレンアイって、何か関係があるんデスか？」"

[[dialogue]]
speaker = "モネ"
# 「クリスマスは恋人たちにとっても特別な日なんです」
line = "「クリスマスは恋人たちにとっても特別な日なんです」"

[[dialogue]]
speaker = "モネ"
# 「例えばこの本は、余命幾ばくかの少女が、大切な恋人と永遠に忘れられないクリスマスを過ごす……短いお話ですが、とても切なくて素敵なお話なんです」
line = "「例えばこの本は、余命幾ばくかの少女が、大切な恋人と永遠に忘れられないクリスマスを過ごす……短いお話ですが、とても切なくて素敵なお話なんです」"

[[dialogue]]
speaker = "リップル"
# 「モネも今年のクリスマスはコイビトと過ごすんデスか？」
line = "「モネも今年のクリスマスはコイビトと過ごすんデスか？」"

[[dialogue]]
speaker = "モネ"
# 「ええっ！？　予定なんてありませんよ……！　でも私も女の子ですし、クリスマスデートとか憧れちゃいますが……」
line = "「ええっ！？　予定なんてありませんよ……！　でも私も女の子ですし、クリスマスデートとか憧れちゃいますが……」"

[[dialogue]]
speaker = "モネ"
# （うぅ、会長のことが頭に浮かんで……私なんかじゃ不釣り合いってわかってるけど、でもぉ……）
line = "（うぅ、会長のことが頭に浮かんで……私なんかじゃ不釣り合いってわかってるけど、でもぉ……）"

[[dialogue]]
speaker = "リップル"
# 「モネ、顔がマッカですよ？　ダイジョーブですか？」
line = "「モネ、顔がマッカですよ？　ダイジョーブですか？」"

[[dialogue]]
speaker = "モネ"
# 「だ、大丈夫です……！　私は孤高の戦士！　クリぼっちの烙印を押されたって構いません……！」
line = "「だ、大丈夫です……！　私は孤高の戦士！　クリぼっちの烙印を押されたって構いません……！」"

[[dialogue]]
speaker = "リップル"
# 「クリボッチ？　また知らないコトバが出てキマした」
line = "「クリボッチ？　また知らないコトバが出てキマした」"

[[dialogue]]
speaker = "モネ"
# 「ええと、クリぼっちっていうのは……クリスマスに恋人がいなくて１人で過ごす人のことで……」
line = "「ええと、クリぼっちっていうのは……クリスマスに恋人がいなくて１人で過ごす人のことで……」"

[[dialogue]]
speaker = "リップル"
# 「だったらクリスマスは私と過ごしまショー！　２人でクリスマスを過ごせばボッチじゃなくナリま～す！」
line = "「だったらクリスマスは私と過ごしまショー！　２人でクリスマスを過ごせばボッチじゃなくナリま～す！」"

[[dialogue]]
speaker = "モネ"
# 「で、でもリップルさんには、私より大切な人とかがいるんじゃ……」
line = "「で、でもリップルさんには、私より大切な人とかがいるんじゃ……」"

[[dialogue]]
speaker = "リップル"
# 「モネもワタシにとってタイセツなトモダチで～す♪　モネとクリスマスを過ごせたら、きっとハッピーになれます♪」
line = "「モネもワタシにとってタイセツなトモダチで～す♪　モネとクリスマスを過ごせたら、きっとハッピーになれます♪」"

[[dialogue]]
speaker = "モネ"
# 「リップルさん……うん、ありがとう。クリスマスは一緒にいましょうね」
line = "「リップルさん……うん、ありがとう。クリスマスは一緒にいましょうね」"

[[dialogue]]
speaker = "リップル"
# 「やりマシた♪　これでクリスマスがタノシクなりま～す♪」
line = "「やりマシた♪　これでクリスマスがタノシクなりま～す♪」"

[[dialogue]]
speaker = "モネ"
# 「ふふ、それじゃあ次の本を探しに行きましょうか」
line = "「ふふ、それじゃあ次の本を探しに行きましょうか」"

[[dialogue]]
speaker = "リップル"
# 「ハイ♪　ついていきマース♪」
line = "「ハイ♪　ついていきマース♪」"

[[dialogue]]
speaker = "リップル"
# 「フムフム……クリスマスに食べるのはチキンだったり七面鳥だったりスルんですね。女神様はどっちが好きナンデしょーか？」
line = "「フムフム……クリスマスに食べるのはチキンだったり七面鳥だったりスルんですね。女神様はどっちが好きナンデしょーか？」"

[[dialogue]]
speaker = "モネ"
# 「ええと、チキンや七面鳥を食べるのは女神様とは関係ないですかね……」
line = "「ええと、チキンや七面鳥を食べるのは女神様とは関係ないですかね……」"

[[dialogue]]
speaker = "リップル"
# 「女神様と関係ナイのですか？　だったらビーフやポークを食べてもイイんです？」
line = "「女神様と関係ナイのですか？　だったらビーフやポークを食べてもイイんです？」"

[[dialogue]]
speaker = "モネ"
# 「普通に好きなものを食べていいんですよ。あくまでも習慣の１つなので」
line = "「普通に好きなものを食べていいんですよ。あくまでも習慣の１つなので」"

[[dialogue]]
speaker = "リップル"
# 「ウ～ン、クリスマスのことがワカったよーな、ワカらなくなったよーな……」
line = "「ウ～ン、クリスマスのことがワカったよーな、ワカらなくなったよーな……」"

[[dialogue]]
speaker = "モネ"
# 「クリスマスの習慣は天界や魔界でも大きく異なるらしいので……」
line = "「クリスマスの習慣は天界や魔界でも大きく異なるらしいので……」"

[[dialogue]]
speaker = "リップル"
# 「３つの世界のクリスマスなんてヤヤコシすぎま～す……もっとトーイツしてほしいです」
line = "「３つの世界のクリスマスなんてヤヤコシすぎま～す……もっとトーイツしてほしいです」"

[[dialogue]]
speaker = "モネ"
# 「各世界にも歴史があるから難しいですね……どの世界も女神様の誕生を祝う日っていうのは共通してるんですけど……」
line = "「各世界にも歴史があるから難しいですね……どの世界も女神様の誕生を祝う日っていうのは共通してるんですけど……」"

[[dialogue]]
speaker = "リップル"
# 「だったら、モネにとってのクリスマスってどんな日ナンです？」
line = "「だったら、モネにとってのクリスマスってどんな日ナンです？」"

[[dialogue]]
speaker = "モネ"
# 「私にとってのクリスマスですか……？」
line = "「私にとってのクリスマスですか……？」"

[[dialogue]]
speaker = "リップル"
# 「ハイ♪　モネにとってのクリスマスも気にナリます♪　モネのクリスマスのオモイデも知りたいで～す♪」
line = "「ハイ♪　モネにとってのクリスマスも気にナリます♪　モネのクリスマスのオモイデも知りたいで～す♪」"

[[dialogue]]
speaker = "モネ"
# 「私のクリスマスの思い出……」
line = "「私のクリスマスの思い出……」"

[[dialogue]]
speaker = "モネ"
# （私にとってのクリスマスって何なんだろう……）
line = "（私にとってのクリスマスって何なんだろう……）"
