[[dialogue]]
speaker = "unk"
# 第１話,愛は理屈じゃ測れない,P
line = "第１話,愛は理屈じゃ測れない,P"

[[dialogue]]
speaker = "unk"
# ジュエリーと恋人になり、怪盗事件があってからしばらく経った、ある日のこと。
line = "ジュエリーと恋人になり、怪盗事件があってからしばらく経った、ある日のこと。"

[[dialogue]]
speaker = "unk"
# 俺は彼女と大聖堂カフェテリアで、いつも通りの昼食の時間を過ごしていた。
line = "俺は彼女と大聖堂カフェテリアで、いつも通りの昼食の時間を過ごしていた。"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「助手、トマトスープをふーふーして、食べさせてくれるかい？」
line = "「助手、トマトスープをふーふーして、食べさせてくれるかい？」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「――ふふっ、大丈夫だ。日傘で周りの視界を遮るから、その間にこっそりとお願いするよ♪」
line = "「――ふふっ、大丈夫だ。日傘で周りの視界を遮るから、その間にこっそりとお願いするよ♪」"

[[dialogue]]
speaker = "unk"
# ふー、ふー
line = "ふー、ふー"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「ん♪　あ～ん<emoji=heart04>」
line = "「ん♪　あ～ん<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「――あむっ♪　んむんむ……♪」
line = "「――あむっ♪　んむんむ……♪」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「はあぁ……<emoji=heart04>　やはり、助手にふーふーして食べさせてもらうのは格別だね。愛の味がするよ<emoji=heart04>　ふふっ♪」
line = "「はあぁ……<emoji=heart04>　やはり、助手にふーふーして食べさせてもらうのは格別だね。愛の味がするよ<emoji=heart04>　ふふっ♪」"

[[dialogue]]
speaker = "ミネコ"
# 「……ちょっと名探偵？　一応、私も同席してるんだけど？」
line = "「……ちょっと名探偵？　一応、私も同席してるんだけど？」"

[[dialogue]]
speaker = "unk"
# 彼女は、ジュエリーのクラスメイトである『ミネコ・フランボワーズ』。
line = "彼女は、ジュエリーのクラスメイトである『ミネコ・フランボワーズ』。"

[[dialogue]]
speaker = "unk"
# 詳しい説明はまたの機会にするが、その正体はジュエリーと同じ選星者の１人――『大怪盗』だったりする。
line = "詳しい説明はまたの機会にするが、その正体はジュエリーと同じ選星者の１人――『大怪盗』だったりする。"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「なんだミネコ、見ていたのかい？」
line = "「なんだミネコ、見ていたのかい？」"

[[dialogue]]
speaker = "ミネコ"
# 「いや、日傘の角度的に、私から丸見えなのわかってやってるでしょ！？」
line = "「いや、日傘の角度的に、私から丸見えなのわかってやってるでしょ！？」"

[[dialogue]]
speaker = "ミネコ"
# 「というか、会長にあ～んしてもらうだけじゃなくて、ふーふーしてもらうとか、見ているこっちまで恥ずかしくなってくるんだけど！？」
line = "「というか、会長にあ～んしてもらうだけじゃなくて、ふーふーしてもらうとか、見ているこっちまで恥ずかしくなってくるんだけど！？」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「実は、私は猫舌でね。いつも助手にはふーふーしてから食べさせてもらっているんだ」
line = "「実は、私は猫舌でね。いつも助手にはふーふーしてから食べさせてもらっているんだ」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「以前は面倒な欠点だと思っていたが、そのおかげで助手の愛ある一手間を味わえると考えると、今は悪くないと思っているよ。ふふっ♪」
line = "「以前は面倒な欠点だと思っていたが、そのおかげで助手の愛ある一手間を味わえると考えると、今は悪くないと思っているよ。ふふっ♪」"

[[dialogue]]
speaker = "ミネコ"
# 「あー、はいはい、ご馳走様です。ていうか、前から思ってたけど、よくもまぁ恥ずかしげもなく、『愛』とか口に出せるね」
line = "「あー、はいはい、ご馳走様です。ていうか、前から思ってたけど、よくもまぁ恥ずかしげもなく、『愛』とか口に出せるね」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「論理的に考えて、好きな相手には好きだと、素直に好意を伝えた方がいい」
line = "「論理的に考えて、好きな相手には好きだと、素直に好意を伝えた方がいい」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「そうすれば相手も嬉しいし、好きな人を喜ばせれば、もっと自分のことを好きになってくれるだろう」
line = "「そうすれば相手も嬉しいし、好きな人を喜ばせれば、もっと自分のことを好きになってくれるだろう」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「つまりは理屈上、『やり得』ということだ」
line = "「つまりは理屈上、『やり得』ということだ」"

[[dialogue]]
speaker = "unk"
# 結構恥じらってるのが可愛いんだ
line = "結構恥じらってるのが可愛いんだ"

[[dialogue]]
speaker = "unk"
# と口では言いつつも内心では……
line = "と口では言いつつも内心では……"

[[dialogue]]
speaker = "ミネコ"
# 「ほうほう？」
line = "「ほうほう？」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「助手！？　ミネコに何を耳打ちしているんだい……！？」
line = "「助手！？　ミネコに何を耳打ちしているんだい……！？」"

[[dialogue]]
speaker = "ミネコ"
# 「――なになに？　理屈上『やり得』であることと、恥ずかしさや照れ臭さという感情は別物……？」
line = "「――なになに？　理屈上『やり得』であることと、恥ずかしさや照れ臭さという感情は別物……？」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「なっ……！？」
line = "「なっ……！？」"

[[dialogue]]
speaker = "ミネコ"
# 「ジュエリーは性格上、理屈を重視するので『やり得』な行動をよく取ろうとするけど、それはそれとして、内心ではめちゃくちゃドキドキしていたりする……か」
line = "「ジュエリーは性格上、理屈を重視するので『やり得』な行動をよく取ろうとするけど、それはそれとして、内心ではめちゃくちゃドキドキしていたりする……か」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「っ……！　じょ、助手ぅ～」
line = "「っ……！　じょ、助手ぅ～」"

[[dialogue]]
speaker = "ミネコ"
# 「ふふふ♪　そっか～、なるほどね♪　さすが会長、ジュエリーの彼氏をしているだけはあるね～」
line = "「ふふふ♪　そっか～、なるほどね♪　さすが会長、ジュエリーの彼氏をしているだけはあるね～」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「うぅぅ。まさか助手に裏切られるとは……」
line = "「うぅぅ。まさか助手に裏切られるとは……」"

[[dialogue]]
speaker = "unk"
# ごめんごめん、素の反応が見たくてつい
line = "ごめんごめん、素の反応が見たくてつい"

[[dialogue]]
speaker = "unk"
# 俺が頭を撫でてると、彼女はむぅ～っと頬を膨らませながら──
line = "俺が頭を撫でてると、彼女はむぅ～っと頬を膨らませながら──"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「そういうのは、２人きりの時にたっぷり見ればいいだろう？　まったく……」
line = "「そういうのは、２人きりの時にたっぷり見ればいいだろう？　まったく……」"

[[dialogue]]
speaker = "ミネコ"
# 「確かに、ジュエリーが素で恥ずかしがってるの、めちゃくちゃ可愛いかも♪　うふふっ♪」
line = "「確かに、ジュエリーが素で恥ずかしがってるの、めちゃくちゃ可愛いかも♪　うふふっ♪」"

[[dialogue]]
speaker = "unk"
# でしょ？
line = "でしょ？"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「ふ、２人してからかうんじゃない……」
line = "「ふ、２人してからかうんじゃない……」"

[[dialogue]]
speaker = "unk"
# 赤くなった顔を日傘で隠そうとするジュエリーに、俺とミネコは顔を見合わせて、つい笑ってしまう。
line = "赤くなった顔を日傘で隠そうとするジュエリーに、俺とミネコは顔を見合わせて、つい笑ってしまう。"

[[dialogue]]
speaker = "ミネコ"
# 「そういえば気になってたんだけど、２人ってどういう感じで付き合い始めたの？」
line = "「そういえば気になってたんだけど、２人ってどういう感じで付き合い始めたの？」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「それは……２人だけの秘密だ」
line = "「それは……２人だけの秘密だ」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「助手も、これ以上は言ってはダメだからな……！」
line = "「助手も、これ以上は言ってはダメだからな……！」"

[[dialogue]]
speaker = "unk"
# その言葉に、俺は彼女と付き合い始めた日のことを思い出す。
line = "その言葉に、俺は彼女と付き合い始めた日のことを思い出す。"

[[dialogue]]
speaker = "ジュエリー"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ジュエリー"
# 「助手……その、私は……」
line = "「助手……その、私は……」"

[[dialogue]]
speaker = "unk"
# 俺はジュエリーが好きだ
line = "俺はジュエリーが好きだ"

[[dialogue]]
speaker = "ジュエリー"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "unk"
# 心の準備が出来るまでそばにいるよ
line = "心の準備が出来るまでそばにいるよ"

[[dialogue]]
speaker = "unk"
# だから、慌てなくていい。
line = "だから、慌てなくていい。"

[[dialogue]]
speaker = "ジュエリー"
# 「…………私は、情けないな。これまでずっと、わたしの方からキミに愛していると言い続けていたのに」
line = "「…………私は、情けないな。これまでずっと、わたしの方からキミに愛していると言い続けていたのに」"

[[dialogue]]
speaker = "ジュエリー"
# 「いざ恋愛感情を自覚すると、逆に全然言えなくなってしまうだなんて……」
line = "「いざ恋愛感情を自覚すると、逆に全然言えなくなってしまうだなんて……」"

[[dialogue]]
speaker = "ジュエリー"
# 「だけど……その代わりに今度はキミが、『好きだ』『愛してる』と何度も伝えてくれるようになって──」
line = "「だけど……その代わりに今度はキミが、『好きだ』『愛してる』と何度も伝えてくれるようになって──」"

[[dialogue]]
speaker = "ジュエリー"
# 「そんなキミだから、私も……ちゃんと勇気を出そうと思ったんだ」
line = "「そんなキミだから、私も……ちゃんと勇気を出そうと思ったんだ」"

[[dialogue]]
speaker = "ジュエリー"
# 「助手……今日、この場で伝えるよ」
line = "「助手……今日、この場で伝えるよ」"

[[dialogue]]
speaker = "ジュエリー"
# 「私も、キミのことが好きだ」
line = "「私も、キミのことが好きだ」"

[[dialogue]]
speaker = "ジュエリー"
# 「私を――キミの恋人にして欲しい」
line = "「私を――キミの恋人にして欲しい」"

[[dialogue]]
speaker = "ミネコ"
# 「え～？　いいじゃん、教えてよ～。さっきはふーふーからのあ～んを見せつけてたじゃ～ん♪」
line = "「え～？　いいじゃん、教えてよ～。さっきはふーふーからのあ～んを見せつけてたじゃ～ん♪」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「さて？　なんのことだか分からないな」
line = "「さて？　なんのことだか分からないな」"

[[dialogue]]
speaker = "unk"
# 彼女はぷいっとそっぽを向きながら、何事もなかったかのように自分でトマトスープを食べ始めようとする。
line = "彼女はぷいっとそっぽを向きながら、何事もなかったかのように自分でトマトスープを食べ始めようとする。"

[[dialogue]]
speaker = "unk"
# 待って、ジュエリー
line = "待って、ジュエリー"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「助手？」
line = "「助手？」"

[[dialogue]]
speaker = "unk"
# 俺はトマトスープをスプーンですくって、ふーふーしてから彼女の口元に差し出す。
line = "俺はトマトスープをスプーンですくって、ふーふーしてから彼女の口元に差し出す。"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「あっ……」
line = "「あっ……」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「ふふっ♪　あ～ん<emoji=heart04>」
line = "「ふふっ♪　あ～ん<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ジュエリーはそれを、嬉しそうに笑って食べてくれるのだった。
line = "ジュエリーはそれを、嬉しそうに笑って食べてくれるのだった。"
