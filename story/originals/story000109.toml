[[dialogue]]
speaker = "unk"
# 果たして、寮長の最強タッグチームにより、アステライト内部のコア破壊に成功。
line = "果たして、寮長の最強タッグチームにより、アステライト内部のコア破壊に成功。"

[[dialogue]]
speaker = "unk"
# アステラは他の星徒会メンバーが駆け付ける前に、消滅が確認された。
line = "アステラは他の星徒会メンバーが駆け付ける前に、消滅が確認された。"

[[dialogue]]
speaker = "unk"
# その翌日。俺たちはバトルウィークの結果発表のために、カフェテリアへと集合していた――
line = "その翌日。俺たちはバトルウィークの結果発表のために、カフェテリアへと集合していた――"

[[dialogue]]
speaker = "フェニエル"
# 「――では、以上になりまして、ポイント差は変わらず、Ｓクラスモンスター１体分のスコア差で、<ruby=イルソーレ>流星寮</ruby>……ひいては流星学園の勝利、となります」
line = "「――では、以上になりまして、ポイント差は変わらず、Ｓクラスモンスター１体分のスコア差で、<ruby>流星寮<rt>イルソーレ</rt></ruby>……ひいては流星学園の勝利、となります」"

[[dialogue]]
speaker = "マハムート"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "フェニエル"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "マハムート"
# 「会長？　そういうわけだから、明日から<ruby=ラルーナ>新星寮</ruby>にあなたの部屋はないわ」
line = "「会長？　そういうわけだから、明日から<ruby>新星寮<rt>ラルーナ</rt></ruby>にあなたの部屋はないわ」"

[[dialogue]]
speaker = "unk"
# 俺もともと実家住みなんですけど！？
line = "俺もともと実家住みなんですけど！？"

[[dialogue]]
speaker = "マハムート"
# 「少し寂しいけど、流星学園生になっても、あなたのことは忘れないわ……」
line = "「少し寂しいけど、流星学園生になっても、あなたのことは忘れないわ……」"

[[dialogue]]
speaker = "unk"
# いや寂しがる前に、焦ったり交渉したり、もっとすることあるんじゃないですかね！？
line = "いや寂しがる前に、焦ったり交渉したり、もっとすることあるんじゃないですかね！？"

[[dialogue]]
speaker = "フェニエル"
# 「や、やりましたか……！？　もしかして会長さん、イルソーレにいただける感じでしょうか……っ」
line = "「や、やりましたか……！？　もしかして会長さん、イルソーレにいただける感じでしょうか……っ」"

[[dialogue]]
speaker = "unk"
# ほら、フニが本気にしちゃってる！
line = "ほら、フニが本気にしちゃってる！"

[[dialogue]]
speaker = "マハムート"
# 「確かに、フニが相手だと、私の存在しないはずの良心が痛むわね。ここは竜の頭も下げ時かしら？」
line = "「確かに、フニが相手だと、私の存在しないはずの良心が痛むわね。ここは竜の頭も下げ時かしら？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「…………ませんわ」
line = "「…………ませんわ」"

[[dialogue]]
speaker = "マハムート"
# 「ん？　何か言った？　ヒルディオーネ」
line = "「ん？　何か言った？　ヒルディオーネ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「納得できません、と言ったのですわ……！」
line = "「納得できません、と言ったのですわ……！」"

[[dialogue]]
speaker = "フェニエル"
# 「ひぅ！？　……お、お姉様？」
line = "「ひぅ！？　……お、お姉様？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「そもそも最終日前日とスコアが一緒なのは、昨日のアステラ攻略が流星と新星で、まったくの同ポイントが入っているからですのよ！？」
line = "「そもそも最終日前日とスコアが一緒なのは、昨日のアステラ攻略が流星と新星で、まったくの同ポイントが入っているからですのよ！？」"

[[dialogue]]
speaker = "マハムート"
# 「それはそうよ。そういうルールだもの」
line = "「それはそうよ。そういうルールだもの」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「それが納得いかないと言っていますの！」
line = "「それが納得いかないと言っていますの！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「認めたくはありませんが、昨日のアステラ攻略で目立った戦果をあげていたのは、緋宮会長とマムですわっ！」
line = "「認めたくはありませんが、昨日のアステラ攻略で目立った戦果をあげていたのは、緋宮会長とマムですわっ！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「緋宮会長のアステラ内部のルートマッピングは見事な手腕でしたし、全体を見回しての指示は実にエレガントなものでしたわ！」
line = "「緋宮会長のアステラ内部のルートマッピングは見事な手腕でしたし、全体を見回しての指示は実にエレガントなものでしたわ！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「それにマム！　ボス戦において、敵を怯ませ大技を叩き込む隙を作ったのも、ラストアタックして仕留めたのも、あなたですのよ！？」
line = "「それにマム！　ボス戦において、敵を怯ませ大技を叩き込む隙を作ったのも、ラストアタックして仕留めたのも、あなたですのよ！？」"

[[dialogue]]
speaker = "マハムート"
# 「その通りだけれど、そこはスコアに影響しないってルールでしょう？　私たちは学園対抗杯のルールに則って勝負をしていたのだし」
line = "「その通りだけれど、そこはスコアに影響しないってルールでしょう？　私たちは学園対抗杯のルールに則って勝負をしていたのだし」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「正論ですわ。正論ですけれど……それでも！」
line = "「正論ですわ。正論ですけれど……それでも！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「マハムート！　あなたは少し、泥臭さが足りないのではなくって！？」
line = "「マハムート！　あなたは少し、泥臭さが足りないのではなくって！？」"

[[dialogue]]
speaker = "マハムート"
# 「む……どういう意味よ」
line = "「む……どういう意味よ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「勝負の世界は確かに結果が全てですわ……ですが！」
line = "「勝負の世界は確かに結果が全てですわ……ですが！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「私たち星騎士にとって本当の勝利とは、リクリエに打ち勝つことのはずですわ！」
line = "「私たち星騎士にとって本当の勝利とは、リクリエに打ち勝つことのはずですわ！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「学園対抗杯は確かに重要な指標ではありますが、手段と目的を履き違えてはいけませんの」
line = "「学園対抗杯は確かに重要な指標ではありますが、手段と目的を履き違えてはいけませんの」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「リクリエへの勝利に繋がる戦果をあげたのなら、きちんと主張なさいな！」
line = "「リクリエへの勝利に繋がる戦果をあげたのなら、きちんと主張なさいな！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「私は事前のルールブックになかったからと言って、その功績を無視するほど、器は小さくありませんことよ！」
line = "「私は事前のルールブックになかったからと言って、その功績を無視するほど、器は小さくありませんことよ！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「私達は共に競い、戦うライバルでしょう！？」
line = "「私達は共に競い、戦うライバルでしょう！？」"

[[dialogue]]
speaker = "マハムート"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "マハムート"
# 「……コホン。まあ、そうね。あなたの言うことも一理あるわ」
line = "「……コホン。まあ、そうね。あなたの言うことも一理あるわ」"

[[dialogue]]
speaker = "マハムート"
# 「ただ、細やかな功績なんて主張し合っていたら、キリがないでしょう？」
line = "「ただ、細やかな功績なんて主張し合っていたら、キリがないでしょう？」"

[[dialogue]]
speaker = "マハムート"
# 「成績の数値化は重要な指標だし、そのためには捨象される要素はどうしたって生まれるものだわ」
line = "「成績の数値化は重要な指標だし、そのためには捨象される要素はどうしたって生まれるものだわ」"

[[dialogue]]
speaker = "マハムート"
# 「というわけで、今回は私の負け１よ。会長を取られてしまうのはさすがに困るから、それ以外の何かで補填させてもらえないかしら？」
line = "「というわけで、今回は私の負け１よ。会長を取られてしまうのはさすがに困るから、それ以外の何かで補填させてもらえないかしら？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「いーえ、そんなの許しませんわ！　妃竜院マハムートは、そんな簡単に他人に負けを認めたりしないんですの！」
line = "「いーえ、そんなの許しませんわ！　妃竜院マハムートは、そんな簡単に他人に負けを認めたりしないんですの！」"

[[dialogue]]
speaker = "unk"
# なんか面倒臭いこと言い出した！？
line = "なんか面倒臭いこと言い出した！？"

[[dialogue]]
speaker = "マハムート"
# 「私がせっかく負けでいいって言ってるんだから、ごちゃごちゃ言ってないで有難く受け取りなさい！」
line = "「私がせっかく負けでいいって言ってるんだから、ごちゃごちゃ言ってないで有難く受け取りなさい！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「い・や・で・す・わ～～～っ！」
line = "「い・や・で・す・わ～～～っ！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「私は正々堂々あなたと勝負して、完膚なきまでに勝利したいのですわ！」
line = "「私は正々堂々あなたと勝負して、完膚なきまでに勝利したいのですわ！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「こんなお情けでもらったみたいな、試合で勝って勝負に負けた～、みたいなおこぼれの勝利など、要りませんの！」
line = "「こんなお情けでもらったみたいな、試合で勝って勝負に負けた～、みたいなおこぼれの勝利など、要りませんの！」"

[[dialogue]]
speaker = "マハムート"
# 「ああもう、面倒臭い女ね！　私に勝っておいて、素直に喜ばないなんて生意気よ！　この捻じれドリル！」
line = "「ああもう、面倒臭い女ね！　私に勝っておいて、素直に喜ばないなんて生意気よ！　この捻じれドリル！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「あなたにだけは言われたくありませんわ！　捻くれドラゴン！」
line = "「あなたにだけは言われたくありませんわ！　捻くれドラゴン！」"

[[dialogue]]
speaker = "unk"
# そこから、マムと千園寺先輩はグダグダな揚げ足取りとマウント合戦に移行していった――
line = "そこから、マムと千園寺先輩はグダグダな揚げ足取りとマウント合戦に移行していった――"

[[dialogue]]
speaker = "フェニエル"
# 「……なんだか私、少しだけわかった気がします」
line = "「……なんだか私、少しだけわかった気がします」"

[[dialogue]]
speaker = "unk"
# フニ、わかったって……何を？
line = "フニ、わかったって……何を？"

[[dialogue]]
speaker = "フェニエル"
# 「会長さんが、最初に言っていたこと……お姉様とマムにとって、喧嘩は挨拶みたいなもの、っていうお話のことです」
line = "「会長さんが、最初に言っていたこと……お姉様とマムにとって、喧嘩は挨拶みたいなもの、っていうお話のことです」"

[[dialogue]]
speaker = "フェニエル"
# 「私には今まで、年の近い友達や、何かを競い合えるライバルなんて、いませんでした……」
line = "「私には今まで、年の近い友達や、何かを競い合えるライバルなんて、いませんでした……」"

[[dialogue]]
speaker = "フェニエル"
# 「だから私にとって……喧嘩っていうのは、嫌いな人とするお別れのことなんだって、思っていました」
line = "「だから私にとって……喧嘩っていうのは、嫌いな人とするお別れのことなんだって、思っていました」"

[[dialogue]]
speaker = "フェニエル"
# 「でも、人と人との関係には色々あって……仲良く喧嘩するっていう、素敵な関係があることを知ったんです」
line = "「でも、人と人との関係には色々あって……仲良く喧嘩するっていう、素敵な関係があることを知ったんです」"

[[dialogue]]
speaker = "フェニエル"
# 「会長さん……私にもいつか、仲良く喧嘩してくれるようなライバルが、できるでしょうか？」
line = "「会長さん……私にもいつか、仲良く喧嘩してくれるようなライバルが、できるでしょうか？」"

[[dialogue]]
speaker = "unk"
# 俺達だって、もう競い合ったライバルだろ？
line = "俺達だって、もう競い合ったライバルだろ？"

[[dialogue]]
speaker = "フェニエル"
# 「あ……！」
line = "「あ……！」"

[[dialogue]]
speaker = "フェニエル"
# 「はいっ、会長さん♪」
line = "「はいっ、会長さん♪」"

[[dialogue]]
speaker = "フェニエル"
# 「あの……私、もっと強くなりますっ」
line = "「あの……私、もっと強くなりますっ」"

[[dialogue]]
speaker = "フェニエル"
# 「そしていつか……お姉様やマムにも、喧嘩してもらうんです！」
line = "「そしていつか……お姉様やマムにも、喧嘩してもらうんです！」"

[[dialogue]]
speaker = "フェニエル"
# 「そのときはきっと、会長さんも一緒に、ですよ？」
line = "「そのときはきっと、会長さんも一緒に、ですよ？」"

[[dialogue]]
speaker = "unk"
# フニはそう言って、嬉しそうに微笑むのだった――
line = "フニはそう言って、嬉しそうに微笑むのだった――"
