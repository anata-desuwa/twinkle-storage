[[dialogue]]
speaker = "unk"
# 第２話,変わった好きでも分け合いたい,P
line = "第２話,変わった好きでも分け合いたい,P"

[[dialogue]]
speaker = "unk"
# その日、俺たちは以前にも訪れた激辛ラーメン店『ボルケーノ』へとやって来ていた。
line = "その日、俺たちは以前にも訪れた激辛ラーメン店『ボルケーノ』へとやって来ていた。"

[[dialogue]]
speaker = "unk"
# ＳＮＳで新たなチャレンジメニューの告知を見たマインに誘われ、食べに来たのだ。
line = "ＳＮＳで新たなチャレンジメニューの告知を見たマインに誘われ、食べに来たのだ。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「こんにちは～♪　大将～、食べに来ました～」
line = "「こんにちは～♪　大将～、食べに来ました～」"

[[dialogue]]
speaker = "ラーメン店主"
# 「いらっしゃいやせェ！　おっ、ラーメンキングの嬢ちゃんと、会長の兄ちゃん！　来てくれると思ってたぜ！」
line = "「いらっしゃいやせェ！　おっ、ラーメンキングの嬢ちゃんと、会長の兄ちゃん！　来てくれると思ってたぜ！」"

[[dialogue]]
speaker = "unk"
# 『ラーメンキング』とは、この店の早食いチャレンジ１位に与えられる称号で、現在はマインが保持していた。
line = "『ラーメンキング』とは、この店の早食いチャレンジ１位に与えられる称号で、現在はマインが保持していた。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひ♪　今日は早速、新メニューにチャレンジしに来たよ」
line = "「にひひ♪　今日は早速、新メニューにチャレンジしに来たよ」"

[[dialogue]]
speaker = "ラーメン店主"
# 「ありがとな。ただ、心苦しいんだが、今回から早食いで順位を決めるのはやめようと思ってな」
line = "「ありがとな。ただ、心苦しいんだが、今回から早食いで順位を決めるのはやめようと思ってな」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ありゃ、そうなの？」
line = "「ありゃ、そうなの？」"

[[dialogue]]
speaker = "ラーメン店主"
# 「ああ。『ラーメンプリンセス』の食べっぷりを見て、大事なことを思い出しちまったんでなァ」
line = "「ああ。『ラーメンプリンセス』の食べっぷりを見て、大事なことを思い出しちまったんでなァ」"

[[dialogue]]
speaker = "unk"
# ラーメンプリンセス……？
line = "ラーメンプリンセス……？"

[[dialogue]]
speaker = "ラーメン店主"
# 「俺が勝手に付けた称号さ。ほら、あそこで食べてるあの嬢ちゃんだ」
line = "「俺が勝手に付けた称号さ。ほら、あそこで食べてるあの嬢ちゃんだ」"

[[dialogue]]
speaker = "モネ"
# 「はあぁ……とても素晴らしい激辛ラーメンでした……♪　よいしょっと」
line = "「はあぁ……とても素晴らしい激辛ラーメンでした……♪　よいしょっと」"

[[dialogue]]
speaker = "unk"
# そう言って、満足げに席を立ち上がったのは、知っている人物だった。
line = "そう言って、満足げに席を立ち上がったのは、知っている人物だった。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「図書委員の、モネ先輩？」
line = "「図書委員の、モネ先輩？」"

[[dialogue]]
speaker = "モネ"
# 「あれ？　会長と……ネーゼマインさん？」
line = "「あれ？　会長と……ネーゼマインさん？」"

[[dialogue]]
speaker = "unk"
# 彼女は新星学園２年、『紙屋敷モネ』。いつも本を持ち歩いているくらい本好きな、名物図書委員である。
line = "彼女は新星学園２年、『紙屋敷モネ』。いつも本を持ち歩いているくらい本好きな、名物図書委員である。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「いや～、モネ先輩が激辛好きっていうのは、会長から聞いてたけど……まさかここのチャレンジメニューを完食できる程とはね～」
line = "「いや～、モネ先輩が激辛好きっていうのは、会長から聞いてたけど……まさかここのチャレンジメニューを完食できる程とはね～」"

[[dialogue]]
speaker = "モネ"
# 「私も驚きました。ネーゼマインさんがまさかラーメンキングだったなんて……」
line = "「私も驚きました。ネーゼマインさんがまさかラーメンキングだったなんて……」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「で、先輩の『ラーメンプリンセス』っていうのは？」
line = "「で、先輩の『ラーメンプリンセス』っていうのは？」"

[[dialogue]]
speaker = "モネ"
# 「ああ、それは……今回の新チャレンジメニューを作るきっかけになったのが、お恥ずかしながら私みたいで……」
line = "「ああ、それは……今回の新チャレンジメニューを作るきっかけになったのが、お恥ずかしながら私みたいで……」"

[[dialogue]]
speaker = "ラーメン店主"
# 「プリンセスの嬢ちゃんはな、チャレンジメニューでも全然早食いはしねェんだ」
line = "「プリンセスの嬢ちゃんはな、チャレンジメニューでも全然早食いはしねェんだ」"

[[dialogue]]
speaker = "モネ"
# 「私、早食いは苦手なんですけど、激辛料理は大好きなんです♪」
line = "「私、早食いは苦手なんですけど、激辛料理は大好きなんです♪」"

[[dialogue]]
speaker = "ラーメン店主"
# 「そんで、うちのボルケーノラーメン１００倍をよ、それはもう美味そうに食べてくれてな。しかも感想まで丁寧に伝えてくれて……それで思い出したのさ」
line = "「そんで、うちのボルケーノラーメン１００倍をよ、それはもう美味そうに食べてくれてな。しかも感想まで丁寧に伝えてくれて……それで思い出したのさ」"

[[dialogue]]
speaker = "ラーメン店主"
# 「辛けりゃいいってわけじゃねェ。俺はもともと『辛くて美味いラーメン』を食べてもらいたくて、この店を始めたんだってな」
line = "「辛けりゃいいってわけじゃねェ。俺はもともと『辛くて美味いラーメン』を食べてもらいたくて、この店を始めたんだってな」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「なるほどね。それで新メニューの『ノヴァボルケーノラーメン』を作ったってわけだ」
line = "「なるほどね。それで新メニューの『ノヴァボルケーノラーメン』を作ったってわけだ」"

[[dialogue]]
speaker = "モネ"
# 「とても素晴らしかったです♪　辛さと旨味の調和がさらに洗練されていて……まるで、口の中で新星爆発が起きるような……！」
line = "「とても素晴らしかったです♪　辛さと旨味の調和がさらに洗練されていて……まるで、口の中で新星爆発が起きるような……！」"

[[dialogue]]
speaker = "モネ"
# 「激辛好きなら、きっと唸る美味しさだと思います♪」
line = "「激辛好きなら、きっと唸る美味しさだと思います♪」"

[[dialogue]]
speaker = "ラーメン店主"
# 「あんがとよ！　そういうわけで、キングの嬢ちゃんも、ぜひ食べてくれぃ！」
line = "「あんがとよ！　そういうわけで、キングの嬢ちゃんも、ぜひ食べてくれぃ！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「辛いだけじゃない激辛ラーメン、ね……それじゃあ――いただきま～す♪」
line = "「辛いだけじゃない激辛ラーメン、ね……それじゃあ――いただきま～す♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「……ふぅ」
line = "「……ふぅ」"

[[dialogue]]
speaker = "unk"
# マインはしばらく静かに食べ続けた後、ひと息つく。
line = "マインはしばらく静かに食べ続けた後、ひと息つく。"

[[dialogue]]
speaker = "ラーメン店主"
# 「……どうだい、キングの嬢ちゃん？」
line = "「……どうだい、キングの嬢ちゃん？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「――正直、もっと辛いラーメンを求めるなら、他にもあると思う」
line = "「――正直、もっと辛いラーメンを求めるなら、他にもあると思う」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「でも……ここまで辛さと旨味が引き立て合ってる味のラーメンは、初めてだよ」
line = "「でも……ここまで辛さと旨味が引き立て合ってる味のラーメンは、初めてだよ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「うん。今まで私が食べてきた激辛ラーメンで、これが１番美味しい。――気に入った♪」
line = "「うん。今まで私が食べてきた激辛ラーメンで、これが１番美味しい。――気に入った♪」"

[[dialogue]]
speaker = "ラーメン店主"
# 「よっし！　やったぜ！」
line = "「よっし！　やったぜ！」"

[[dialogue]]
speaker = "unk"
# こっちの新メニューも、すごく美味しいです！
line = "こっちの新メニューも、すごく美味しいです！"

[[dialogue]]
speaker = "ラーメン店主"
# 「あんがとよ、会長の兄ちゃん！　激辛が食べられない人向けに『旨辛ボルケーノラーメン』も改めて作ってみたんだ！」
line = "「あんがとよ、会長の兄ちゃん！　激辛が食べられない人向けに『旨辛ボルケーノラーメン』も改めて作ってみたんだ！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「……でも、なんかモネ先輩には負けた気分だな～」
line = "「……でも、なんかモネ先輩には負けた気分だな～」"

[[dialogue]]
speaker = "モネ"
# 「え？　私にですか？」
line = "「え？　私にですか？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「うん。私、最近は激辛の刺激ばっかり追ってた気がするからさ」
line = "「うん。私、最近は激辛の刺激ばっかり追ってた気がするからさ」"

[[dialogue]]
speaker = "モネ"
# 「私は本を読むみたいに、激辛料理もじっくり味わうのが好きなんです」
line = "「私は本を読むみたいに、激辛料理もじっくり味わうのが好きなんです」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「……なるほどね。私もちょっと見直さないとな～」
line = "「……なるほどね。私もちょっと見直さないとな～」"

[[dialogue]]
speaker = "モネ"
# 「あの……よかったら今度、一緒に他の激辛料理も食べに行きませんか？」
line = "「あの……よかったら今度、一緒に他の激辛料理も食べに行きませんか？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「え？　私と？」
line = "「え？　私と？」"

[[dialogue]]
speaker = "モネ"
# 「はい。自分と同じレベルで激辛のを食べられる人が、周りにはなかなかいなくて……」
line = "「はい。自分と同じレベルで激辛のを食べられる人が、周りにはなかなかいなくて……」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「……じゃあとりあえず、連絡先交換しときます？」
line = "「……じゃあとりあえず、連絡先交換しときます？」"

[[dialogue]]
speaker = "モネ"
# 「はいっ♪　ありがとうございます！」
line = "「はいっ♪　ありがとうございます！」"

[[dialogue]]
speaker = "unk"
# そうしてラーメンを食べ終え、店を出たところでモネと別れてから、俺たちは街を歩くことにした。
line = "そうしてラーメンを食べ終え、店を出たところでモネと別れてから、俺たちは街を歩くことにした。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「モネ先輩か～……大人しそうな性格の人だけど、私と合うかな～」
line = "「モネ先輩か～……大人しそうな性格の人だけど、私と合うかな～」"

[[dialogue]]
speaker = "unk"
# 意外と合うと思うぞ
line = "意外と合うと思うぞ"

[[dialogue]]
speaker = "ネーゼマイン"
# 「え？　――本がオールジャンル行ける人だから、意外と誰とでも話せるって？　ふ～ん、それがマジなら、面白そうだけど……」
line = "「え？　――本がオールジャンル行ける人だから、意外と誰とでも話せるって？　ふ～ん、それがマジなら、面白そうだけど……」"

[[dialogue]]
speaker = "unk"
# と、そこで少し間を置いた後、マインは俺の目を見てから言う。
line = "と、そこで少し間を置いた後、マインは俺の目を見てから言う。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「あのさ、会長。さっきのことで思ったんだけど……」
line = "「あのさ、会長。さっきのことで思ったんだけど……」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「会長もさ、無理に私に合わせて、激辛料理を食べようとしなくてもいいからね」
line = "「会長もさ、無理に私に合わせて、激辛料理を食べようとしなくてもいいからね」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「私はつい刺激的なことを求めちゃうけど……そこが自分の悪いところだって自覚してるからさ」
line = "「私はつい刺激的なことを求めちゃうけど……そこが自分の悪いところだって自覚してるからさ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「無理な時は、遠慮せずに無理って言ってくれていいから」
line = "「無理な時は、遠慮せずに無理って言ってくれていいから」"

[[dialogue]]
speaker = "unk"
# 大丈夫。無理はしてないよ
line = "大丈夫。無理はしてないよ"

[[dialogue]]
speaker = "unk"
# 俺は、自分が好きな子の『好きなもの』を、一緒に楽しみたいと思っているだけだ。
line = "俺は、自分が好きな子の『好きなもの』を、一緒に楽しみたいと思っているだけだ。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「私の『好きなもの』を、分かろうとしてくれてるってこと……？」
line = "「私の『好きなもの』を、分かろうとしてくれてるってこと……？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「……そっか。じゃあ――これからもオススメを教えるね♪」
line = "「……そっか。じゃあ――これからもオススメを教えるね♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「今度はモネ先輩も誘って、激辛巡りでもする？」
line = "「今度はモネ先輩も誘って、激辛巡りでもする？」"

[[dialogue]]
speaker = "unk"
# できれば『旨辛』もある店で
line = "できれば『旨辛』もある店で"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひ♪　わかってるって♪」
line = "「にひひ♪　わかってるって♪」"

[[dialogue]]
speaker = "unk"
# マインはそう言って、晴れやかな笑みを浮かべるのだった。
line = "マインはそう言って、晴れやかな笑みを浮かべるのだった。"
