[[dialogue]]
speaker = "unk"
# 第二幕、第二場。
line = "第二幕、第二場。"

[[dialogue]]
speaker = "ロクサーナ"
# 「お待ちかねのキャピュレット家の庭園で、愛を囁き、誓うシーンだ」
line = "「お待ちかねのキャピュレット家の庭園で、愛を囁き、誓うシーンだ」"

[[dialogue]]
speaker = "ジュリエット"
# 「ああ、ロミオ……どうしてあなたはロミオなの」
line = "「ああ、ロミオ……どうしてあなたはロミオなの」"

[[dialogue]]
speaker = "ジュリエット"
# 「あなたのお父様を、お父様ではないといい、あなたの家名をお捨てになって！」
line = "「あなたのお父様を、お父様ではないといい、あなたの家名をお捨てになって！」"

[[dialogue]]
speaker = "ジュリエット"
# 「それとも、それがお嫌なら、せめて私を愛すると誓っていただきたいの！」
line = "「それとも、それがお嫌なら、せめて私を愛すると誓っていただきたいの！」"

[[dialogue]]
speaker = "ジュリエット"
# 「さすれば、私もキャピュレットの名を捨ててみせますわ！」
line = "「さすれば、私もキャピュレットの名を捨ててみせますわ！」"

[[dialogue]]
speaker = "unk"
# こんな塀など恋の翼で飛び越えました
石の壁などでは私の恋を閉め出せません
line = "こんな塀など恋の翼で飛び越えました\n石の壁などでは私の恋を閉め出せません"

[[dialogue]]
speaker = "ジュリエット"
# 「誰の案内でこの場所がお分かりになりましたの？」
line = "「誰の案内でこの場所がお分かりになりましたの？」"

[[dialogue]]
speaker = "unk"
# 恋が案内をしてくれました
line = "恋が案内をしてくれました"

[[dialogue]]
speaker = "メイプル"
# 「きゃ～っ♪　お兄ちゃん、カッコいい～♪」
line = "「きゃ～っ♪　お兄ちゃん、カッコいい～♪」"

[[dialogue]]
speaker = "ロクサーナ"
# 「まったく、全身がむず痒くなるシーンだ。台詞を書いていて、<ruby=じんましん>蕁麻疹</ruby>が出るかと思ったぞ」
line = "「まったく、全身がむず痒くなるシーンだ。台詞を書いていて、<ruby>蕁麻疹<rt>じんましん</rt></ruby>が出るかと思ったぞ」"

[[dialogue]]
speaker = "ジュリエット"
# 「──ああ、口説いてくださいませ、愛しいモンタギュー」
line = "「──ああ、口説いてくださいませ、愛しいモンタギュー」"

[[dialogue]]
speaker = "unk"
# 愛しいジュリエット。月にかけて私は誓う
line = "愛しいジュリエット。月にかけて私は誓う"

[[dialogue]]
speaker = "ジュリエット"
# 「──今夜はこれでお別れしましょう。この恋の蕾が、今度お会いする時には美しい花となっておりますように」
line = "「──今夜はこれでお別れしましょう。この恋の蕾が、今度お会いする時には美しい花となっておりますように」"

[[dialogue]]
speaker = "unk"
# 満たされぬ私の心を見捨てて別れるだなんて
line = "満たされぬ私の心を見捨てて別れるだなんて"

[[dialogue]]
speaker = "ジュリエット"
# 「どうやったら満たされるとお考えなのでしょう？」
line = "「どうやったら満たされるとお考えなのでしょう？」"

[[dialogue]]
speaker = "unk"
# 真心の篭った愛の誓いを交わしたいのです
line = "真心の篭った愛の誓いを交わしたいのです"

[[dialogue]]
speaker = "ロクサーナ"
# 「そして、ロミオの愛を欲したジュリエットはバルコニーから長い金髪を垂らす」
line = "「そして、ロミオの愛を欲したジュリエットはバルコニーから長い金髪を垂らす」"

[[dialogue]]
speaker = "メイプル"
# 「……あれ？　ロミジュリに、そんなシーンあったっけ？」
line = "「……あれ？　ロミジュリに、そんなシーンあったっけ？」"

[[dialogue]]
speaker = "ロクサーナ"
# 「金を紡いだような長い髪を辿り、ロミオはジュリエットの部屋に忍び込むと、愛し合う２人は情熱的な一夜を──」
line = "「金を紡いだような長い髪を辿り、ロミオはジュリエットの部屋に忍び込むと、愛し合う２人は情熱的な一夜を──」"

[[dialogue]]
speaker = "藍"
# 「『髪長姫』のラプンツェルと混ざってますぅ！」
line = "「『髪長姫』のラプンツェルと混ざってますぅ！」"

[[dialogue]]
speaker = "unk"
# 隙あらば濡れ場展開に持っていこうとする！
line = "隙あらば濡れ場展開に持っていこうとする！"

[[dialogue]]
speaker = "ロクサーナ"
# 「ちっ、バレたか」
line = "「ちっ、バレたか」"

[[dialogue]]
speaker = "ロクサーナ"
# 「ちなみにラプンツェルの原典では、毎晩、王子を塔へと招き入れ、やがて妊娠するという描写がある。そんな童話は子供の寝物語に聞かせられんな、くっくっく」
line = "「ちなみにラプンツェルの原典では、毎晩、王子を塔へと招き入れ、やがて妊娠するという描写がある。そんな童話は子供の寝物語に聞かせられんな、くっくっく」"

[[dialogue]]
speaker = "ロクサーナ"
# 「しかしだな、恋の翼で石の壁を飛び越えるような男ならば、危険を承知でバルコニーまで昇るくらいはやってのけるだろう」
line = "「しかしだな、恋の翼で石の壁を飛び越えるような男ならば、危険を承知でバルコニーまで昇るくらいはやってのけるだろう」"

[[dialogue]]
speaker = "ロクサーナ"
# 「本当に愛し合う者同士ならば、そのくらいの暴挙に及ぶのも当然ではないか？」
line = "「本当に愛し合う者同士ならば、そのくらいの暴挙に及ぶのも当然ではないか？」"

[[dialogue]]
speaker = "藍"
# 「ジュリエットの気持ちになって考えれば、愛する人と結ばれたいというのは、とても自然な流れですよね……」
line = "「ジュリエットの気持ちになって考えれば、愛する人と結ばれたいというのは、とても自然な流れですよね……」"

[[dialogue]]
speaker = "メイプル"
# 「言われてみれば、そんな気がしてきた……」
line = "「言われてみれば、そんな気がしてきた……」"

[[dialogue]]
speaker = "ロクサーナ"
# 「これまで読んだ限り、聞いた限り、観た限り、恋愛物の道筋は、スラスラ進んだ試しがない」
line = "「これまで読んだ限り、聞いた限り、観た限り、恋愛物の道筋は、スラスラ進んだ試しがない」"

[[dialogue]]
speaker = "ロクサーナ"
# 「私の脚本の中でくらい、ロミオとジュリエットには愛する者と結ばれる悦びを教えてやりたいと──」
line = "「私の脚本の中でくらい、ロミオとジュリエットには愛する者と結ばれる悦びを教えてやりたいと──」"

[[dialogue]]
speaker = "unk"
# みんな、騙されそうになってる！
会長権限で上演禁止！
line = "みんな、騙されそうになってる！\n会長権限で上演禁止！"

[[dialogue]]
speaker = "メイプル"
# 「はっ！？　部長の説得力にやられるとこだった！」
line = "「はっ！？　部長の説得力にやられるとこだった！」"

[[dialogue]]
speaker = "ロクサーナ"
# 「ちっ、つまらん。だがな、大衆はそういった過激な表現を望んでいるのだぞ」
line = "「ちっ、つまらん。だがな、大衆はそういった過激な表現を望んでいるのだぞ」"

[[dialogue]]
speaker = "ロクサーナ"
# 「エロとグロは大衆文化の骨頂だ。どんなに低俗であっても、声を大にして言わずとも、どいつもこいつも目を覆った両手の指の隙間から覗いている」
line = "「エロとグロは大衆文化の骨頂だ。どんなに低俗であっても、声を大にして言わずとも、どいつもこいつも目を覆った両手の指の隙間から覗いている」"

[[dialogue]]
speaker = "ロクサーナ"
# 「でなければ、演劇という文化が生まれて幾星霜。愛を語らうエロと、無惨に命を奪われるグロを題材に取り扱ったものが長く評価され、残り続けるものか」
line = "「でなければ、演劇という文化が生まれて幾星霜。愛を語らうエロと、無惨に命を奪われるグロを題材に取り扱ったものが長く評価され、残り続けるものか」"

[[dialogue]]
speaker = "藍"
# 「尊い純愛も、エ、エロと言い切ってしまうのは、その……あまりよくないと思います……」
line = "「尊い純愛も、エ、エロと言い切ってしまうのは、その……あまりよくないと思います……」"

[[dialogue]]
speaker = "ロクサーナ"
# 「私に意見するとはいい度胸だ。恋愛なんてのは詰まるところ、繁殖行為に及びたい男女の初期衝動だろう」
line = "「私に意見するとはいい度胸だ。恋愛なんてのは詰まるところ、繁殖行為に及びたい男女の初期衝動だろう」"

[[dialogue]]
speaker = "ロクサーナ"
# 「ああ、そうだな。藍、会長、いっそ恋仲になってしまったらどうだ？」
line = "「ああ、そうだな。藍、会長、いっそ恋仲になってしまったらどうだ？」"

[[dialogue]]
speaker = "藍"
# 「ほにぇ！？」
line = "「ほにぇ！？」"

[[dialogue]]
speaker = "unk"
# 無茶言わんでください！
line = "無茶言わんでください！"

[[dialogue]]
speaker = "ロクサーナ"
# 「カップルになった演者同士が、舞台後に恋仲になった話など、なんら珍しくない。そのくらい本気の方が、演技にも熱が入るというものだ」
line = "「カップルになった演者同士が、舞台後に恋仲になった話など、なんら珍しくない。そのくらい本気の方が、演技にも熱が入るというものだ」"

[[dialogue]]
speaker = "藍"
# 「わ、私と会長さんが、カ、カ、カップル……なんて、そんな……会長さんにご迷惑が……！」
line = "「わ、私と会長さんが、カ、カ、カップル……なんて、そんな……会長さんにご迷惑が……！」"

[[dialogue]]
speaker = "ロクサーナ"
# 「身持ちの固い女優と、頭の固い会長だ。だが、公演中止を盾にされては濡れ場の削除は受け入れるより他ない」
line = "「身持ちの固い女優と、頭の固い会長だ。だが、公演中止を盾にされては濡れ場の削除は受け入れるより他ない」"

[[dialogue]]
speaker = "ロクサーナ"
# 「だが、２人の愛を伝えるため、キスシーンだけは必ずやってもらう。いいな？」
line = "「だが、２人の愛を伝えるため、キスシーンだけは必ずやってもらう。いいな？」"

[[dialogue]]
speaker = "藍"
# 「うぅ、ファーストキスもまだなのに……」
line = "「うぅ、ファーストキスもまだなのに……」"

[[dialogue]]
speaker = "ロクサーナ"
# 「よし、会長、さくっと藍の唇を奪え」
line = "「よし、会長、さくっと藍の唇を奪え」"

[[dialogue]]
speaker = "unk"
# できるか！
line = "できるか！"

[[dialogue]]
speaker = "ロクサーナ"
# 「ジョークだ。実際に舞台上でキスしろとまでは言わん。情熱的なキスをしているように見せるだけでいい」
line = "「ジョークだ。実際に舞台上でキスしろとまでは言わん。情熱的なキスをしているように見せるだけでいい」"

[[dialogue]]
speaker = "ロクサーナ"
# 「最大限に譲歩して、キスと見せかけるほどの顔の接近だ。それすらないようでは観客も白けて、公演も大失敗に終わるだろう」
line = "「最大限に譲歩して、キスと見せかけるほどの顔の接近だ。それすらないようでは観客も白けて、公演も大失敗に終わるだろう」"

[[dialogue]]
speaker = "ロクサーナ"
# 「その程度のスキンシップなら構わないだろう？」
line = "「その程度のスキンシップなら構わないだろう？」"

[[dialogue]]
speaker = "unk"
# ギリギリ、なんとか……
line = "ギリギリ、なんとか……"

[[dialogue]]
speaker = "ロクサーナ"
# 「よし、決定だ。では、稽古を続ける！」
line = "「よし、決定だ。では、稽古を続ける！」"
