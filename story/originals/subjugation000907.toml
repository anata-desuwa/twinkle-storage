[[dialogue]]
speaker = "unk"
# ソフレの偽物との激しい戦闘が繰り広げられ、そして――
line = "ソフレの偽物との激しい戦闘が繰り広げられ、そして――"

[[dialogue]]
speaker = "ソフレ"
# 「今なのだわ！」
line = "「今なのだわ！」"

[[dialogue]]
speaker = "フェリシー"
# 「はあぁっ！」
line = "「はあぁっ！」"

[[dialogue]]
speaker = "偽物"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "フェリシー"
# 「よし！　倒した！」
line = "「よし！　倒した！」"

[[dialogue]]
speaker = "ソフレ"
# 「ふぅ……姿だけでなく、戦闘力までコピーするなんて、厄介だったのだわ」
line = "「ふぅ……姿だけでなく、戦闘力までコピーするなんて、厄介だったのだわ」"

[[dialogue]]
speaker = "フェリシー"
# 「でも、私たちの友情コンビネーションで倒せたね！」
line = "「でも、私たちの友情コンビネーションで倒せたね！」"

[[dialogue]]
speaker = "ソフレ"
# 「ふん、友情とか、何を言って……」
line = "「ふん、友情とか、何を言って……」"

[[dialogue]]
speaker = "ソフレ"
# 「っ！　フェリシー！」
line = "「っ！　フェリシー！」"

[[dialogue]]
speaker = "フェリシー"
# 「え？　きゃっ！？」
line = "「え？　きゃっ！？」"

[[dialogue]]
speaker = "unk"
# ソフレが突然、フェリシーを突き飛ばす。次の瞬間――
line = "ソフレが突然、フェリシーを突き飛ばす。次の瞬間――"

[[dialogue]]
speaker = "ソフレ"
# 「ぐっ……！」
line = "「ぐっ……！」"

[[dialogue]]
speaker = "unk"
# 天井近くに仕掛けられた雷雲から放たれた落雷が、ソフレに直撃した。
line = "天井近くに仕掛けられた雷雲から放たれた落雷が、ソフレに直撃した。"

[[dialogue]]
speaker = "フェリシー"
# 「ソフレ！？」
line = "「ソフレ！？」"

[[dialogue]]
speaker = "ソフレ"
# 「抜かったのだわ……。偽物は、保健室に現れる際にも気配をまるで感じさせなかった……！」
line = "「抜かったのだわ……。偽物は、保健室に現れる際にも気配をまるで感じさせなかった……！」"

[[dialogue]]
speaker = "ソフレ"
# 「いつの間にか……周りを取り囲まれてる……！」
line = "「いつの間にか……周りを取り囲まれてる……！」"

[[dialogue]]
speaker = "偽物"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "偽物"
# 「実験体は山程用意してあるのだわ。逃がしはしないのよ」
line = "「実験体は山程用意してあるのだわ。逃がしはしないのよ」"

[[dialogue]]
speaker = "フェリシー"
# 「なっ……ソフレのコピーがこんなに沢山……！？　こんなこと、これまで１度もなかったのに……！」
line = "「なっ……ソフレのコピーがこんなに沢山……！？　こんなこと、これまで１度もなかったのに……！」"

[[dialogue]]
speaker = "偽物"
# 「――捕縛術式、一斉に展開」
line = "「――捕縛術式、一斉に展開」"

[[dialogue]]
speaker = "ソフレ"
# 「くっ！？」
line = "「くっ！？」"

[[dialogue]]
speaker = "unk"
# 偽物が放った星術――雷の鎖が本物のソフレの手足に巻き付いて、拘束する。
line = "偽物が放った星術――雷の鎖が本物のソフレの手足に巻き付いて、拘束する。"

[[dialogue]]
speaker = "ソフレ"
# 「鎖の数が多すぎて、動けないのだわ……！」
line = "「鎖の数が多すぎて、動けないのだわ……！」"

[[dialogue]]
speaker = "フェリシー"
# 「ソフレ！　今助けるから！」
line = "「ソフレ！　今助けるから！」"

[[dialogue]]
speaker = "偽物"
# 「お前は邪魔よ。排除する」
line = "「お前は邪魔よ。排除する」"

[[dialogue]]
speaker = "unk"
# 偽物の半数が、ソフレに近付こうとするフェリシーに向かって、攻撃を放つ。その間に――
line = "偽物の半数が、ソフレに近付こうとするフェリシーに向かって、攻撃を放つ。その間に――"

[[dialogue]]
speaker = "偽物"
# 「本体を異空間に転移、確保する」
line = "「本体を異空間に転移、確保する」"

[[dialogue]]
speaker = "unk"
# 保健室の時のような眩い光が辺りを覆って――
line = "保健室の時のような眩い光が辺りを覆って――"

[[dialogue]]
speaker = "unk"
# 収まった後には、ソフレの姿は消えてしまっていた。
line = "収まった後には、ソフレの姿は消えてしまっていた。"

[[dialogue]]
speaker = "フェリシー"
# 「ソフレーーーッ！！！」
line = "「ソフレーーーッ！！！」"

[[dialogue]]
speaker = "ソフレ"
# 「ここは……？」
line = "「ここは……？」"

[[dialogue]]
speaker = "偽物"
# 「お前を隔離しておく為の異空間よ」
line = "「お前を隔離しておく為の異空間よ」"

[[dialogue]]
speaker = "ソフレ"
# 「くっ……！　星術が使えないのだわ……！」
line = "「くっ……！　星術が使えないのだわ……！」"

[[dialogue]]
speaker = "偽物"
# 「無駄よ。守護星とのリンクは、ここでは完全に遮断されている。大人しくしているのだわ」
line = "「無駄よ。守護星とのリンクは、ここでは完全に遮断されている。大人しくしているのだわ」"

[[dialogue]]
speaker = "ソフレ"
# 「お前たちの目的は、一体何なの……？　ソフレを捕まえて、どうする気……？」
line = "「お前たちの目的は、一体何なの……？　ソフレを捕まえて、どうする気……？」"

[[dialogue]]
speaker = "偽物"
# 「説明する必要はないのだわ。お前は黙って、サンプルとして記録されていればいい」
line = "「説明する必要はないのだわ。お前は黙って、サンプルとして記録されていればいい」"

[[dialogue]]
speaker = "ソフレ"
# （サンプル……？　何の……？）
line = "（サンプル……？　何の……？）"

[[dialogue]]
speaker = "偽物"
# 「封印術式の解析を開始――」
line = "「封印術式の解析を開始――」"

[[dialogue]]
speaker = "偽物"
# 「封印による行動範囲を解除する条件は――星騎士として善行を積むこと……」
line = "「封印による行動範囲を解除する条件は――星騎士として善行を積むこと……」"

[[dialogue]]
speaker = "ソフレ"
# （封印術式……？　それって、ソフレにかけられた３０００年の封印のこと？）
line = "（封印術式……？　それって、ソフレにかけられた３０００年の封印のこと？）"

[[dialogue]]
speaker = "ソフレ"
# （星騎士として活躍すれば、その分刑期が短くなるって、フェリシーの言っていたこととも一致する）
line = "（星騎士として活躍すれば、その分刑期が短くなるって、フェリシーの言っていたこととも一致する）"

[[dialogue]]
speaker = "ソフレ"
# （こいつらは、その封印を調べる為にソフレを捕まえたってこと……？　でも、封印を調べて何をする気なの？）
line = "（こいつらは、その封印を調べる為にソフレを捕まえたってこと……？　でも、封印を調べて何をする気なの？）"

[[dialogue]]
speaker = "ソフレ"
# （……って、考えたところで、星術が使えなければ、ソフレにはどうにもならないのだわ……）
line = "（……って、考えたところで、星術が使えなければ、ソフレにはどうにもならないのだわ……）"

[[dialogue]]
speaker = "ソフレ"
# 「……偽物、教えて欲しいのだわ。解析とやらにはどれくらい時間がかかるの？　それが終われば、ソフレはここから出られるのかしら？」
line = "「……偽物、教えて欲しいのだわ。解析とやらにはどれくらい時間がかかるの？　それが終われば、ソフレはここから出られるのかしら？」"

[[dialogue]]
speaker = "偽物"
# 「時間は未定よ。解放するかも未定。貴重なサンプルは確保しておきたいのだわ」
line = "「時間は未定よ。解放するかも未定。貴重なサンプルは確保しておきたいのだわ」"

[[dialogue]]
speaker = "ソフレ"
# 「……そう、時間がかかるのね。なら――」
line = "「……そう、時間がかかるのね。なら――」"

[[dialogue]]
speaker = "ソフレ"
# 「ソフレは寝て待つのだわ……」
line = "「ソフレは寝て待つのだわ……」"

[[dialogue]]
speaker = "ソフレ"
# （別に、構わない。これまでもそうだった）
line = "（別に、構わない。これまでもそうだった）"

[[dialogue]]
speaker = "ソフレ"
# （３０００年という長い封印に、絶望した）
line = "（３０００年という長い封印に、絶望した）"

[[dialogue]]
speaker = "ソフレ"
# （時間と共に心は諦めに支配されて、かつてのプライドは風化していった）
line = "（時間と共に心は諦めに支配されて、かつてのプライドは風化していった）"

[[dialogue]]
speaker = "ソフレ"
# （だから今更、何も変わらない）
line = "（だから今更、何も変わらない）"

[[dialogue]]
speaker = "ソフレ"
# （今回も嫌なことなんて忘れて、眠ってしまえばいいのだわ）
line = "（今回も嫌なことなんて忘れて、眠ってしまえばいいのだわ）"

[[dialogue]]
speaker = "ソフレ"
# （そうすれば、ソフレは……幸福なのだから）
line = "（そうすれば、ソフレは……幸福なのだから）"

[[dialogue]]
speaker = "unk"
# そうして、ソフレは目を閉じる。
line = "そうして、ソフレは目を閉じる。"

[[dialogue]]
speaker = "unk"
# 眠るのは得意だ。すぐに意識は旅立って――
line = "眠るのは得意だ。すぐに意識は旅立って――"

[[dialogue]]
speaker = "unk"
# また、１００年前の夢を見た。
line = "また、１００年前の夢を見た。"

[[dialogue]]
speaker = "ソフレ"
# 「――もういい加減、諦めたらどうなのかしら？　フェリーチェ」
line = "「――もういい加減、諦めたらどうなのかしら？　フェリーチェ」"

[[dialogue]]
speaker = "フェリーチェ"
# 「はぁ……はぁ……！」
line = "「はぁ……はぁ……！」"

[[dialogue]]
speaker = "ソフレ"
# 「確かに人間としては、お前はこれまで戦ってきた奴の中で一番手応えを感じるのだわ」
line = "「確かに人間としては、お前はこれまで戦ってきた奴の中で一番手応えを感じるのだわ」"

[[dialogue]]
speaker = "ソフレ"
# 「だけど、ソフレは吸血鬼の中でも、更に上位種のデイマスター。どれだけ攻撃を受けたところで、体はすぐに再生する」
line = "「だけど、ソフレは吸血鬼の中でも、更に上位種のデイマスター。どれだけ攻撃を受けたところで、体はすぐに再生する」"

[[dialogue]]
speaker = "ソフレ"
# 「お前の星術では、ソフレを殺し切ることは不可能よ」
line = "「お前の星術では、ソフレを殺し切ることは不可能よ」"

[[dialogue]]
speaker = "ソフレ"
# 「さっさと諦めて、せいぜい楽に死ねることを祈るといいのだわ」
line = "「さっさと諦めて、せいぜい楽に死ねることを祈るといいのだわ」"

[[dialogue]]
speaker = "フェリーチェ"
# 「……へっ」
line = "「……へっ」"

[[dialogue]]
speaker = "フェリーチェ"
# 「そんなダセェ祈り方なんて、できるわけねぇだろうが……！」
line = "「そんなダセェ祈り方なんて、できるわけねぇだろうが……！」"

[[dialogue]]
speaker = "フェリーチェ"
# 「いいか？　祈りってのは本来、他者への想いを願い、込めること。だからアタシは、エクソシストとして、自分が救われる為に祈ったりはしない……！」
line = "「いいか？　祈りってのは本来、他者への想いを願い、込めること。だからアタシは、エクソシストとして、自分が救われる為に祈ったりはしない……！」"

[[dialogue]]
speaker = "フェリーチェ"
# 「何より、そいつはテメェのプライドが許さねぇ――」
line = "「何より、そいつはテメェのプライドが許さねぇ――」"

[[dialogue]]
speaker = "フェリーチェ"
# 「よく聞け、吸血鬼。アタシはなぁ！」
line = "「よく聞け、吸血鬼。アタシはなぁ！」"

[[dialogue]]
speaker = "unk"
# フェリーチェは武器を構え直すと、言った。
line = "フェリーチェは武器を構え直すと、言った。"

[[dialogue]]
speaker = "フェリーチェ"
# 「アンタの為に、ここへ祈りに来たんだぜッ！！」
line = "「アンタの為に、ここへ祈りに来たんだぜッ！！」"

[[dialogue]]
speaker = "？？？"
# 「ソフレーーーーーーッ！！！」
line = "「ソフレーーーーーーッ！！！」"

[[dialogue]]
speaker = "ソフレ"
# 「フェリーチェ……？」
line = "「フェリーチェ……？」"

[[dialogue]]
speaker = "unk"
# 名前を呼ばれてソフレが目を開けた、次の瞬間。
line = "名前を呼ばれてソフレが目を開けた、次の瞬間。"

[[dialogue]]
speaker = "フェリシー"
# 「私の友達を、返せぇぇぇーーーーーーーーーッ！！！」
line = "「私の友達を、返せぇぇぇーーーーーーーーーッ！！！」"

[[dialogue]]
speaker = "unk"
# 眩い光と共に、暗闇が砕けて、フェリシーが飛び込んできた。
line = "眩い光と共に、暗闇が砕けて、フェリシーが飛び込んできた。"

[[dialogue]]
speaker = "フェリシー"
# 「ソフレ！　無事！？」
line = "「ソフレ！　無事！？」"

[[dialogue]]
speaker = "ソフレ"
# 「フェリシー……！　お前、どうやって……」
line = "「フェリシー……！　お前、どうやって……」"

[[dialogue]]
speaker = "フェリシー"
# 「ただ、ソフレを助けたいって強く祈ったんだよ」
line = "「ただ、ソフレを助けたいって強く祈ったんだよ」"

[[dialogue]]
speaker = "フェリシー"
# 「祈りを星術に変えて、奇跡を起こす。それが選星者『<ruby=エクソシスト>祓魔師</ruby>』の力だから」
line = "「祈りを星術に変えて、奇跡を起こす。それが選星者『<ruby>祓魔師<rt>エクソシスト</rt></ruby>』の力だから」"

[[dialogue]]
speaker = "ソフレ"
# 「ソフレの、為に……？」
line = "「ソフレの、為に……？」"

[[dialogue]]
speaker = "フェリシー"
# 「私にとって、ソフレは大切な友達だから」
line = "「私にとって、ソフレは大切な友達だから」"

[[dialogue]]
speaker = "ソフレ"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "ソフレ"
# 「……私のことで、そこまで本気になれるなんて」
line = "「……私のことで、そこまで本気になれるなんて」"

[[dialogue]]
speaker = "ソフレ"
# （正直、コイツにいい感情なんてなかったのだわ）
line = "（正直、コイツにいい感情なんてなかったのだわ）"

[[dialogue]]
speaker = "ソフレ"
# （なにせ、私を封印したムカつくヤツの子孫だし。だけど……）
line = "（なにせ、私を封印したムカつくヤツの子孫だし。だけど……）"

[[dialogue]]
speaker = "ソフレ"
# 「お前はやっぱり、距離感がバグってて、変なやつなのだわ……」
line = "「お前はやっぱり、距離感がバグってて、変なやつなのだわ……」"

[[dialogue]]
speaker = "フェリシー"
# 「えへへ、ゴメン」
line = "「えへへ、ゴメン」"

[[dialogue]]
speaker = "フェリシー"
# 「でも、友達になりたいって思っちゃったから、仕方がないよ」
line = "「でも、友達になりたいって思っちゃったから、仕方がないよ」"

[[dialogue]]
speaker = "フェリシー"
# 「その気持ちだけは本当のことだって、私は自信を持って言うことができる」
line = "「その気持ちだけは本当のことだって、私は自信を持って言うことができる」"

[[dialogue]]
speaker = "フェリシー"
# 「行こう、ソフレ！」
line = "「行こう、ソフレ！」"

[[dialogue]]
speaker = "unk"
# フェリシーがソフレに手を差し伸べる。
line = "フェリシーがソフレに手を差し伸べる。"

[[dialogue]]
speaker = "ソフレ"
# 「やれやれ……」
line = "「やれやれ……」"

[[dialogue]]
speaker = "ソフレ"
# 「やっと安眠できると思ってたけど、仕方ないわね」
line = "「やっと安眠できると思ってたけど、仕方ないわね」"

[[dialogue]]
speaker = "ソフレ"
# 「貸し借りを清算するためにも、乗ってあげるのだわ！」
line = "「貸し借りを清算するためにも、乗ってあげるのだわ！」"

[[dialogue]]
speaker = "unk"
# ソフレはフェリシーの手を取って、一緒に異空間から脱出するのだった――
line = "ソフレはフェリシーの手を取って、一緒に異空間から脱出するのだった――"

[[dialogue]]
speaker = "unk"
# 異空間から脱出し、地下図書館に戻ってきたソフレとフェリシー。
line = "異空間から脱出し、地下図書館に戻ってきたソフレとフェリシー。"

[[dialogue]]
speaker = "偽物"
# 「またも不可解な術式で干渉を……これが選星者の力……！」
line = "「またも不可解な術式で干渉を……これが選星者の力……！」"

[[dialogue]]
speaker = "ソフレ"
# 「――ピンチから抜け出せたと思ったら、またピンチで最悪なのだわ。コピーの数、少なく見積もっても５０体以上はいるんじゃないかしら？」
line = "「――ピンチから抜け出せたと思ったら、またピンチで最悪なのだわ。コピーの数、少なく見積もっても５０体以上はいるんじゃないかしら？」"

[[dialogue]]
speaker = "フェリシー"
# 「だけど、こうなったらやるしかないよ！　友達を助ける為なら、何度だって奇跡を起こしてみせる！」
line = "「だけど、こうなったらやるしかないよ！　友達を助ける為なら、何度だって奇跡を起こしてみせる！」"

[[dialogue]]
speaker = "ソフレ"
# 「ふん、言うじゃない。なら、ソフレも――」
line = "「ふん、言うじゃない。なら、ソフレも――」"

[[dialogue]]
speaker = "unk"
# ソフレ！　フェリシー！
line = "ソフレ！　フェリシー！"

[[dialogue]]
speaker = "偽物"
# 「っ！？　増援……！？」
line = "「っ！？　増援……！？」"

[[dialogue]]
speaker = "フェリシー"
# 「会長くん！　助けに来てくれたの！？」
line = "「会長くん！　助けに来てくれたの！？」"

[[dialogue]]
speaker = "フェリシー"
# 「それじゃあ、もしかして――」
line = "「それじゃあ、もしかして――」"

[[dialogue]]
speaker = "ウィステリア"
# 「――術式凍結解除」
line = "「――術式凍結解除」"

[[dialogue]]
speaker = "ウィステリア"
# 「シャドウメイルストラム！」
line = "「シャドウメイルストラム！」"

[[dialogue]]
speaker = "偽物"
# 「っ……！　この攻撃……！」
line = "「っ……！　この攻撃……！」"

[[dialogue]]
speaker = "ウィステリア"
# 「どうやら間に合ったみたいね」
line = "「どうやら間に合ったみたいね」"

[[dialogue]]
speaker = "偽物"
# 「ウィステリア……！」
line = "「ウィステリア……！」"

[[dialogue]]
speaker = "ウィステリア"
# 「２人共、無事？」
line = "「２人共、無事？」"

[[dialogue]]
speaker = "ソフレ"
# 「全く……来るのが遅いのだわ」
line = "「全く……来るのが遅いのだわ」"

[[dialogue]]
speaker = "ウィステリア"
# 「いや、真夜中だし！　会長くんから連絡受けて、家から慌てて飛んで来たんだから、少しは感謝しなさいよ！」
line = "「いや、真夜中だし！　会長くんから連絡受けて、家から慌てて飛んで来たんだから、少しは感謝しなさいよ！」"

[[dialogue]]
speaker = "unk"
# 偽物が『図書館』って言ってたから
line = "偽物が『図書館』って言ってたから"

[[dialogue]]
speaker = "unk"
# ウィステリアさんなら何か分かるかもと思い、連絡したのだ。
line = "ウィステリアさんなら何か分かるかもと思い、連絡したのだ。"

[[dialogue]]
speaker = "フェリシー"
# 「そうだったんだ！　会長くんのおかげで助かったよ！　グラッチェ♪　ありがとう！」
line = "「そうだったんだ！　会長くんのおかげで助かったよ！　グラッチェ♪　ありがとう！」"

[[dialogue]]
speaker = "ソフレ"
# 「やるじゃない。少しは見直してあげなくもないのだわ」
line = "「やるじゃない。少しは見直してあげなくもないのだわ」"

[[dialogue]]
speaker = "フェリシー"
# 「敵の数が多くても、会長くんとウィステリアさんの力があれば、いけるかも！」
line = "「敵の数が多くても、会長くんとウィステリアさんの力があれば、いけるかも！」"

[[dialogue]]
speaker = "ソフレ"
# 「ソフレも少し、本気を出すのだわ」
line = "「ソフレも少し、本気を出すのだわ」"

[[dialogue]]
speaker = "ソフレ"
# 「――変身」
line = "「――変身」"

[[dialogue]]
speaker = "ソフレ"
# 「……ソフレの姿を使って、随分と好き勝手してくれたのだわ。そのお返しに――」
line = "「……ソフレの姿を使って、随分と好き勝手してくれたのだわ。そのお返しに――」"

[[dialogue]]
speaker = "ソフレ"
# 「本物の『暴虐の吸血鬼』の力を、見せてあげるのだわ！」
line = "「本物の『暴虐の吸血鬼』の力を、見せてあげるのだわ！」"

[[dialogue]]
speaker = "unk"
# フェリシーは手を合わせると、
line = "フェリシーは手を合わせると、"

[[dialogue]]
speaker = "フェリシー"
# 「どうか上手く行きますように――」
line = "「どうか上手く行きますように――」"

[[dialogue]]
speaker = "unk"
# そう呟いてから、パイルバンカーを構え直す。
line = "そう呟いてから、パイルバンカーを構え直す。"

[[dialogue]]
speaker = "フェリシー"
# 「……よしっ、それじゃあ――」
line = "「……よしっ、それじゃあ――」"

[[dialogue]]
speaker = "フェリシー"
# 「全力で、お祈り開始だよ！」
line = "「全力で、お祈り開始だよ！」"

[[dialogue]]
speaker = "unk"
# ソフレとフェリシーは並び立ち、防衛システムに立ち向かうのだった――
line = "ソフレとフェリシーは並び立ち、防衛システムに立ち向かうのだった――"
