[[dialogue]]
speaker = "unk"
# 第３話,破滅の記憶,B
line = "第３話,破滅の記憶,B"

[[dialogue]]
speaker = "梨緒"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# その頃、梨緒・Ａ・クリステレスは、流星市国の中心──流星教皇庁に来ていた。
line = "その頃、梨緒・Ａ・クリステレスは、流星市国の中心──流星教皇庁に来ていた。"

[[dialogue]]
speaker = "梨緒"
# 「エリシアによれば、私はここで倒れていたそうだが……」
line = "「エリシアによれば、私はここで倒れていたそうだが……」"

[[dialogue]]
speaker = "梨緒"
# 「……何度足を運んでも、ジグの姿も手掛かりもなし、か」
line = "「……何度足を運んでも、ジグの姿も手掛かりもなし、か」"

[[dialogue]]
speaker = "梨緒"
# （この異常な状況が発生する直前、私はジグと一緒にいた……いた、はずだ……）
line = "（この異常な状況が発生する直前、私はジグと一緒にいた……いた、はずだ……）"

[[dialogue]]
speaker = "梨緒"
# （もし私がリクリエにまつわる何らかの事象に巻き込まれたのなら、あの時一緒にいたジグも同じ状況にあると思ったのだが……）
line = "（もし私がリクリエにまつわる何らかの事象に巻き込まれたのなら、あの時一緒にいたジグも同じ状況にあると思ったのだが……）"

[[dialogue]]
speaker = "梨緒"
# 「っ……な、なんだ。頭が、痛い……」
line = "「っ……な、なんだ。頭が、痛い……」"

[[dialogue]]
speaker = "unk"
# 『ジグを探さなければならない』。
line = "『ジグを探さなければならない』。"

[[dialogue]]
speaker = "unk"
# 仲間と状況を共有しなければならない以上、梨緒にとっては自明のことではあるのだが……
line = "仲間と状況を共有しなければならない以上、梨緒にとっては自明のことではあるのだが……"

[[dialogue]]
speaker = "unk"
# なぜかそれだけではない、どうしてもジグに再会しなければならない、という焦燥感のような想いが沸きあがって来て、心臓が痛いほどに胸の内を叩いていた。
line = "なぜかそれだけではない、どうしてもジグに再会しなければならない、という焦燥感のような想いが沸きあがって来て、心臓が痛いほどに胸の内を叩いていた。"

[[dialogue]]
speaker = "梨緒"
# （ここに来て、もう数ヶ月……。情報を収集すれば、生きて仲間からの連絡を待てば、自ずと何かがわかるだろうと思っていた）
line = "（ここに来て、もう数ヶ月……。情報を収集すれば、生きて仲間からの連絡を待てば、自ずと何かがわかるだろうと思っていた）"

[[dialogue]]
speaker = "梨緒"
# （だが、数ヶ月の時間を過ごしてなお、わかったことは何一つない。……いや、<b>説明は受けた</b>。だが、彼らの言葉をただ鵜呑みにすることなど、私には到底……）
line = "（だが、数ヶ月の時間を過ごしてなお、わかったことは何一つない。……いや、<b>説明は受けた</b>。だが、彼らの言葉をただ鵜呑みにすることなど、私には到底……）"

[[dialogue]]
speaker = "unk"
# 梨緒が置かれている状況について、彼女に説明をしたのは３人。
line = "梨緒が置かれている状況について、彼女に説明をしたのは３人。"

[[dialogue]]
speaker = "unk"
# そのうちの１人は、守護天使・ラクシャと名乗った。
line = "そのうちの１人は、守護天使・ラクシャと名乗った。"

[[dialogue]]
speaker = "梨緒"
# （守護天使とは、女神が創造した六柱の高位存在であり、三界の摂理の守護者だ）
line = "（守護天使とは、女神が創造した六柱の高位存在であり、三界の摂理の守護者だ）"

[[dialogue]]
speaker = "梨緒"
# （本来、私たちのような<ruby=じょうみょう>定命</ruby>の者と直接関わるような存在ではないのだが……）
line = "（本来、私たちのような<ruby>定命<rt>じょうみょう</rt></ruby>の者と直接関わるような存在ではないのだが……）"

[[dialogue]]
speaker = "梨緒"
# （しかし、そんな高位存在が、新星学園の制服を着て私の前に現れた──）
line = "（しかし、そんな高位存在が、新星学園の制服を着て私の前に現れた──）"

[[dialogue]]
speaker = "梨緒"
# （あれはそう、緋宮クロトに御前試合で敗れた直後の出来事だった……）
line = "（あれはそう、緋宮クロトに御前試合で敗れた直後の出来事だった……）"

[[dialogue]]
speaker = "ラクシャ"
# 「ボクは守護天使《円環》のラクシャ。わけあって新星学園の制服を着てるけど、コスプレみたいなものだから」
line = "「ボクは守護天使《円環》のラクシャ。わけあって新星学園の制服を着てるけど、コスプレみたいなものだから」"

[[dialogue]]
speaker = "梨緒"
# 「守護天使がいったいどうして……？　私に用なのか？」
line = "「守護天使がいったいどうして……？　私に用なのか？」"

[[dialogue]]
speaker = "unk"
# 通常であれば、自身のことを『守護天使』だなどと名乗る者の言葉を信用することはできないはずなのだが……
line = "通常であれば、自身のことを『守護天使』だなどと名乗る者の言葉を信用することはできないはずなのだが……"

[[dialogue]]
speaker = "unk"
# お気楽な口調に反して、その者──ラクシャが放つただならぬ存在感が、彼女の言葉に妙な説得力を持たせていた。
line = "お気楽な口調に反して、その者──ラクシャが放つただならぬ存在感が、彼女の言葉に妙な説得力を持たせていた。"

[[dialogue]]
speaker = "ラクシャ"
# 「うん、キミに興味があってね。みんなが知らないこといろいろ知ってそうだし……ちょ～っとお話聞かせてもらえるかな？」
line = "「うん、キミに興味があってね。みんなが知らないこといろいろ知ってそうだし……ちょ～っとお話聞かせてもらえるかな？」"

[[dialogue]]
speaker = "梨緒"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ラクシャ"
# 「おっとっと、ボクが怪しいからって、そんなにあからさまに警戒しないでってばーっ。キミが何か知ってそうだから、ちょっと情報交換しようと思っただけ」
line = "「おっとっと、ボクが怪しいからって、そんなにあからさまに警戒しないでってばーっ。キミが何か知ってそうだから、ちょっと情報交換しようと思っただけ」"

[[dialogue]]
speaker = "ラクシャ"
# 「知ってるんでしょ？　緋宮クロトが<b>アレ</b>になるってこと」
line = "「知ってるんでしょ？　緋宮クロトが<b>アレ</b>になるってこと」"

[[dialogue]]
speaker = "梨緒"
# 「！　君も見たのか？」
line = "「！　君も見たのか？」"

[[dialogue]]
speaker = "ラクシャ"
# 「ああいや、ボクは人伝に聞いた感じなんだけどさ」
line = "「ああいや、ボクは人伝に聞いた感じなんだけどさ」"

[[dialogue]]
speaker = "ラクシャ"
# 「アレは世界を滅ぼすに足る脅威だ。……なんて、キミには言うまでもないか」
line = "「アレは世界を滅ぼすに足る脅威だ。……なんて、キミには言うまでもないか」"

[[dialogue]]
speaker = "梨緒"
# 「ああ、知っているとも。この目で見たからな」
line = "「ああ、知っているとも。この目で見たからな」"

[[dialogue]]
speaker = "ラクシャ"
# 「そう、<b>キミは見たはずだ</b>。この世の終わり、リクリエが遂行される、まさにその瞬間を」
line = "「そう、<b>キミは見たはずだ</b>。この世の終わり、リクリエが遂行される、まさにその瞬間を」"

[[dialogue]]
speaker = "ラクシャ"
# 「だからボクに……いや、この世界の緋宮クロトに、伝えて欲しいんだ」
line = "「だからボクに……いや、この世界の緋宮クロトに、伝えて欲しいんだ」"

[[dialogue]]
speaker = "ラクシャ"
# 「世界が滅び、すべてが無に帰す時、<b>そこに現れたモノ</b>がなんだったのかを」
line = "「世界が滅び、すべてが無に帰す時、<b>そこに現れたモノ</b>がなんだったのかを」"

[[dialogue]]
speaker = "梨緒"
# 「ま、待て！　何の話だ！？」
line = "「ま、待て！　何の話だ！？」"

[[dialogue]]
speaker = "梨緒"
# 「私が最後に見たのは、緋宮クロトだったモノが大地を壊し、空を壊し、あらゆる物質を無に帰す終焉世界を作り上げた光景だった」
line = "「私が最後に見たのは、緋宮クロトだったモノが大地を壊し、空を壊し、あらゆる物質を無に帰す終焉世界を作り上げた光景だった」"

[[dialogue]]
speaker = "ラクシャ"
# 「それだけ？　本当に？」
line = "「それだけ？　本当に？」"

[[dialogue]]
speaker = "ラクシャ"
# 「いいや、違うね。キミは<b>その後</b>を見ているはずだ。リクリエは単純な世界の破滅じゃない。あれは世界の再創生が行われる前兆なんだ」
line = "「いいや、違うね。キミは<b>その後</b>を見ているはずだ。リクリエは単純な世界の破滅じゃない。あれは世界の再創生が行われる前兆なんだ」"

[[dialogue]]
speaker = "ラクシャ"
# 「だからこそ、その『終わりであり、始まりの時』には、必ず何かが起こる。守護天使でさえも知覚できないその地点に、摂理さえも超越した、宇宙の理が現れるはずなんだ」
line = "「だからこそ、その『終わりであり、始まりの時』には、必ず何かが起こる。守護天使でさえも知覚できないその地点に、摂理さえも超越した、宇宙の理が現れるはずなんだ」"

[[dialogue]]
speaker = "梨緒"
# 「い、いったい、何の話をしている……私は、そんなものは見ていない！」
line = "「い、いったい、何の話をしている……私は、そんなものは見ていない！」"

[[dialogue]]
speaker = "ラクシャ"
# 「いーや、絶対に見てる。そうじゃなければ、キミはこっちの世界に存在しているはずがないんだ。それが何であったのかは、ボクにもまだハッキリとはわからないけれど……」
line = "「いーや、絶対に見てる。そうじゃなければ、キミはこっちの世界に存在しているはずがないんだ。それが何であったのかは、ボクにもまだハッキリとはわからないけれど……」"

[[dialogue]]
speaker = "ラクシャ"
# 「もしキミが<b>それ</b>を覚えていないというのなら、きっとキミ自身が記憶に蓋をしてしまっているんだろうね」
line = "「もしキミが<b>それ</b>を覚えていないというのなら、きっとキミ自身が記憶に蓋をしてしまっているんだろうね」"

[[dialogue]]
speaker = "梨緒"
# 「いい加減にしろ！　私は何も見ていないと言っている！！」
line = "「いい加減にしろ！　私は何も見ていないと言っている！！」"

[[dialogue]]
speaker = "ラクシャ"
# 「ごめんごめん、怒らせる気はなかったんだ」
line = "「ごめんごめん、怒らせる気はなかったんだ」"

[[dialogue]]
speaker = "ラクシャ"
# 「ただ──そうだね。キミにも自分と向き合う時間が必要なんだろう」
line = "「ただ──そうだね。キミにも自分と向き合う時間が必要なんだろう」"

[[dialogue]]
speaker = "ラクシャ"
# 「時間の猶予がどれほどあるのかはわからないけれど、今すぐ思い出す必要はないよ。それでも、いつかは向かい合ってほしい」
line = "「時間の猶予がどれほどあるのかはわからないけれど、今すぐ思い出す必要はないよ。それでも、いつかは向かい合ってほしい」"

[[dialogue]]
speaker = "ラクシャ"
# 「ボクの言っていることは、半分以上が推論に推論を重ねただけのものだ。だから証拠はないし、ボク自身もキミが『何を見た』のかを知らない」
line = "「ボクの言っていることは、半分以上が推論に推論を重ねただけのものだ。だから証拠はないし、ボク自身もキミが『何を見た』のかを知らない」"

[[dialogue]]
speaker = "ラクシャ"
# 「ただ恐らく、それは本来、ヒトの身で相対するような存在じゃないんだ。怖かっただろうし、今こうしてキミが廃人にならずに活動できていること自体、奇跡みたいなものだ」
line = "「ただ恐らく、それは本来、ヒトの身で相対するような存在じゃないんだ。怖かっただろうし、今こうしてキミが廃人にならずに活動できていること自体、奇跡みたいなものだ」"

[[dialogue]]
speaker = "ラクシャ"
# 「それでも……ボクたちが勝利するには、キミが記憶の底に沈めてしまったものが、どうしても必要なんだ」
line = "「それでも……ボクたちが勝利するには、キミが記憶の底に沈めてしまったものが、どうしても必要なんだ」"

[[dialogue]]
speaker = "梨緒"
# 「くっ……だから、何を言って……っ、頭が、痛い……」
line = "「くっ……だから、何を言って……っ、頭が、痛い……」"

[[dialogue]]
speaker = "ラクシャ"
# 「本当にごめんね。優しくしてあげられたら良かったんだけど、ボクの方にもあんまり余裕がなくてさ」
line = "「本当にごめんね。優しくしてあげられたら良かったんだけど、ボクの方にもあんまり余裕がなくてさ」"

[[dialogue]]
speaker = "梨緒"
# 「…………っ」
line = "「…………っ」"

[[dialogue]]
speaker = "ラクシャ"
# 「そう睨まないでよ。これでも一応、ボクもキミたちの味方のつもりなんだ」
line = "「そう睨まないでよ。これでも一応、ボクもキミたちの味方のつもりなんだ」"

[[dialogue]]
speaker = "ラクシャ"
# 「ただそうだね……キミが現状、最も重要なことを思い出せない、というのなら──」
line = "「ただそうだね……キミが現状、最も重要なことを思い出せない、というのなら──」"

[[dialogue]]
speaker = "ラクシャ"
# 「最初のお願いと真逆で申し訳ないんだけど、『緋宮クロトの末路』については、一旦彼には秘密にしておいてもらえるかな？」
line = "「最初のお願いと真逆で申し訳ないんだけど、『緋宮クロトの末路』については、一旦彼には秘密にしておいてもらえるかな？」"

[[dialogue]]
speaker = "梨緒"
# 「それは……くっ、いいのか？　危機を告げることで、回避できる未来もあるんじゃないか？」
line = "「それは……くっ、いいのか？　危機を告げることで、回避できる未来もあるんじゃないか？」"

[[dialogue]]
speaker = "ラクシャ"
# 「彼には最終的に、知った上で乗り越えてもらう必要があるのは間違いないよ」
line = "「彼には最終的に、知った上で乗り越えてもらう必要があるのは間違いないよ」"

[[dialogue]]
speaker = "ラクシャ"
# 「それでも、タイミングは結構重要だ……」
line = "「それでも、タイミングは結構重要だ……」"

[[dialogue]]
speaker = "ラクシャ"
# 「アルタイルのクロトは、ヴィーナスによって自身が魔王に至ることを知った。その後、ヴィーナスとの御前試合で限定的に魔王として覚醒している」
line = "「アルタイルのクロトは、ヴィーナスによって自身が魔王に至ることを知った。その後、ヴィーナスとの御前試合で限定的に魔王として覚醒している」"

[[dialogue]]
speaker = "ラクシャ"
# 「可能性を知ることで、その未来を招き寄せる──って場合もある」
line = "「可能性を知ることで、その未来を招き寄せる──って場合もある」"

[[dialogue]]
speaker = "ラクシャ"
# 「ていうか、ボクはそれで一度失敗してるんだよねー。ああいや、失敗っていうかどうかは微妙だけど、知ってるからこそ起きることもある」
line = "「ていうか、ボクはそれで一度失敗してるんだよねー。ああいや、失敗っていうかどうかは微妙だけど、知ってるからこそ起きることもある」"

[[dialogue]]
speaker = "ラクシャ"
# 「ボクの知ってる緋宮クロトは──」
line = "「ボクの知ってる緋宮クロトは──」"

[[dialogue]]
speaker = "梨緒"
# 「──ッ！？」
line = "「──ッ！？」"

[[dialogue]]
speaker = "ラクシャ"
# 「って感じで、知ったら知ったでまた問題があるんだよね。それに今の魔王はリクリエの力をその身に封じ込めている。ちょっとした爆弾だね」
line = "「って感じで、知ったら知ったでまた問題があるんだよね。それに今の魔王はリクリエの力をその身に封じ込めている。ちょっとした爆弾だね」"

[[dialogue]]
speaker = "ラクシャ"
# 「そんな状態で自身の末路を知れば彼は……って可能性もあるから、今のところ秘密でお願い」
line = "「そんな状態で自身の末路を知れば彼は……って可能性もあるから、今のところ秘密でお願い」"

[[dialogue]]
speaker = "梨緒"
# 「……わかった。ひとまずはな」
line = "「……わかった。ひとまずはな」"

[[dialogue]]
speaker = "ラクシャ"
# 「でもまぁ、キミが具体的なところまで、全部言わなくて助かったかもしれない。魔王の末路を知ったら、緋宮クロトを排除しようとする勢力が出てきてもおかしくないから」
line = "「でもまぁ、キミが具体的なところまで、全部言わなくて助かったかもしれない。魔王の末路を知ったら、緋宮クロトを排除しようとする勢力が出てきてもおかしくないから」"

[[dialogue]]
speaker = "ラクシャ"
# 「悪しき魔王になって世界を滅ぼす──までは言ったけど。太陽の壁画絡みで耳馴染みのあるフレーズだったし、周囲もキミの言葉を真に受けなかった」
line = "「悪しき魔王になって世界を滅ぼす──までは言ったけど。太陽の壁画絡みで耳馴染みのあるフレーズだったし、周囲もキミの言葉を真に受けなかった」"

[[dialogue]]
speaker = "ラクシャ"
# 「良くも悪くも、現状キミの言葉で状況が変化した様子は見受けられない」
line = "「良くも悪くも、現状キミの言葉で状況が変化した様子は見受けられない」"

[[dialogue]]
speaker = "梨緒"
# 「……すまない。改めて考えれば、軽率な行動だった」
line = "「……すまない。改めて考えれば、軽率な行動だった」"

[[dialogue]]
speaker = "ラクシャ"
# 「キミの立場を考えれば、致し方ないところはあったと思うよ。最善を尽くそうとした結果だったってことは、わかってる」
line = "「キミの立場を考えれば、致し方ないところはあったと思うよ。最善を尽くそうとした結果だったってことは、わかってる」"

[[dialogue]]
speaker = "ラクシャ"
# 「ただ今後は、魔王の動向を見守るにしても、やり方は考えて欲しいかな」
line = "「ただ今後は、魔王の動向を見守るにしても、やり方は考えて欲しいかな」"

[[dialogue]]
speaker = "梨緒"
# 「その点は承知した。……緋宮クロトの動向を監視するという方針に変更はないが、今後は下手に騒ぎ立てたりせず、自分のやり方で監視を続けることにする」
line = "「その点は承知した。……緋宮クロトの動向を監視するという方針に変更はないが、今後は下手に騒ぎ立てたりせず、自分のやり方で監視を続けることにする」"

[[dialogue]]
speaker = "ラクシャ"
# 「うん。その言葉が聞けて、ボクも安心したよ」
line = "「うん。その言葉が聞けて、ボクも安心したよ」"

[[dialogue]]
speaker = "ラクシャ"
# 「あ、そうそう。彼に１つ、伝言を頼めるかな？」
line = "「あ、そうそう。彼に１つ、伝言を頼めるかな？」"

[[dialogue]]
speaker = "ラクシャ"
# 「『魔王は他の世界で敗北しているから、その可能性を収束させれば、同じ末路を辿ることが確定してしまう』」
line = "「『魔王は他の世界で敗北しているから、その可能性を収束させれば、同じ末路を辿ることが確定してしまう』」"

[[dialogue]]
speaker = "ラクシャ"
# 「要するに、今はまだ魔王の力を全力で使うなって意味なんだけど、まあそこまでは言わなくても、彼ならわかってくれるから」
line = "「要するに、今はまだ魔王の力を全力で使うなって意味なんだけど、まあそこまでは言わなくても、彼ならわかってくれるから」"

[[dialogue]]
speaker = "梨緒"
# 「伝言は構わないが、同じ学園だろう。自分で言ったらどうなんだ」
line = "「伝言は構わないが、同じ学園だろう。自分で言ったらどうなんだ」"

[[dialogue]]
speaker = "ラクシャ"
# 「あっはは～。制服こそ着てるけど、ボクはもう学園に通ってないからね～」
line = "「あっはは～。制服こそ着てるけど、ボクはもう学園に通ってないからね～」"

[[dialogue]]
speaker = "ラクシャ"
# 「守護天使も結構しがらみが多くてさ？　今はまだ自由に動けないんだよ。というわけで、伝言は頼めるかな？」
line = "「守護天使も結構しがらみが多くてさ？　今はまだ自由に動けないんだよ。というわけで、伝言は頼めるかな？」"

[[dialogue]]
speaker = "梨緒"
# 「大事なことなんだな？　言葉の意味はよくわからないから、そのまま伝えるぞ」
line = "「大事なことなんだな？　言葉の意味はよくわからないから、そのまま伝えるぞ」"

[[dialogue]]
speaker = "ラクシャ"
# 「ありがとう～。助かるよ！」
line = "「ありがとう～。助かるよ！」"

[[dialogue]]
speaker = "ラクシャ"
# 「それで……彼にはどうにかして、魔王の力のコントロールを取り戻してもらわなきゃなんだけど……」
line = "「それで……彼にはどうにかして、魔王の力のコントロールを取り戻してもらわなきゃなんだけど……」"

[[dialogue]]
speaker = "unk"
# ラクシャはそこで考え込むように顎に手を当てて、数秒間沈黙した。
line = "ラクシャはそこで考え込むように顎に手を当てて、数秒間沈黙した。"

[[dialogue]]
speaker = "ラクシャ"
# 「……話は少し変わるんだけど、キミ出身は？」
line = "「……話は少し変わるんだけど、キミ出身は？」"

[[dialogue]]
speaker = "梨緒"
# 「？　イングランドだが」
line = "「？　イングランドだが」"

[[dialogue]]
speaker = "ラクシャ"
# 「種族は？」
line = "「種族は？」"

[[dialogue]]
speaker = "梨緒"
# 「見ての通り、人間だ」
line = "「見ての通り、人間だ」"

[[dialogue]]
speaker = "ラクシャ"
# 「う～ん……だよねー」
line = "「う～ん……だよねー」"

[[dialogue]]
speaker = "梨緒"
# 「私の生まれがどうかしたのか？」
line = "「私の生まれがどうかしたのか？」"

[[dialogue]]
speaker = "ラクシャ"
# 「ああいや、生まれがどうこうっていうより、近しいものを感じるっていうか……」
line = "「ああいや、生まれがどうこうっていうより、近しいものを感じるっていうか……」"

[[dialogue]]
speaker = "梨緒"
# 「近しいもの……？　守護天使と私が？　そもそも、君たち六柱以外に守護天使が存在するのか？」
line = "「近しいもの……？　守護天使と私が？　そもそも、君たち六柱以外に守護天使が存在するのか？」"

[[dialogue]]
speaker = "ラクシャ"
# 「いるよ。いや、<b>いた</b>って言った方が正確かな」
line = "「いるよ。いや、<b>いた</b>って言った方が正確かな」"

[[dialogue]]
speaker = "ラクシャ"
# 「うーん、これはもしかして……まぁいいや。よくないけど」
line = "「うーん、これはもしかして……まぁいいや。よくないけど」"

[[dialogue]]
speaker = "梨緒"
# 「？」
line = "「？」"

[[dialogue]]
speaker = "ラクシャ"
# 「じゃあボクから最後のお願い。彼から目を離さないであげて。ヤバくなったら止めてあげて」
line = "「じゃあボクから最後のお願い。彼から目を離さないであげて。ヤバくなったら止めてあげて」"

[[dialogue]]
speaker = "ラクシャ"
# 「ついでに彼の力を伸ばしてあげて。彼が運命に立ち向かうには、まだまだ彼自身が強くならないといけない」
line = "「ついでに彼の力を伸ばしてあげて。彼が運命に立ち向かうには、まだまだ彼自身が強くならないといけない」"

[[dialogue]]
speaker = "梨緒"
# 「彼と競う形でもいいなら、構わないが」
line = "「彼と競う形でもいいなら、構わないが」"

[[dialogue]]
speaker = "ラクシャ"
# 「それはちょうどいいんじゃない？　キミ自身ももっと強くなる必要があるだろうしね」
line = "「それはちょうどいいんじゃない？　キミ自身ももっと強くなる必要があるだろうしね」"

[[dialogue]]
speaker = "ラクシャ"
# 「じゃあボクはこれで──」
line = "「じゃあボクはこれで──」"

[[dialogue]]
speaker = "梨緒"
# 「待ってくれ。君は私が何者か知っているのか？」
line = "「待ってくれ。君は私が何者か知っているのか？」"

[[dialogue]]
speaker = "ラクシャ"
# 「ぜんぜん」
line = "「ぜんぜん」"

[[dialogue]]
speaker = "梨緒"
# 「は？」
line = "「は？」"

[[dialogue]]
speaker = "ラクシャ"
# 「キミは色んな例外、偶然、奇跡の結晶──その正体は誰にもわからないのさ」
line = "「キミは色んな例外、偶然、奇跡の結晶──その正体は誰にもわからないのさ」"

[[dialogue]]
speaker = "梨緒"
# 「どういう意味だ……！」
line = "「どういう意味だ……！」"

[[dialogue]]
speaker = "ラクシャ"
# 「その答えはむしろ、キミ自身が持っているはずなんだけど……まあいいさ。さっきも話した通り、キミにも時間が必要だろうからね」
line = "「その答えはむしろ、キミ自身が持っているはずなんだけど……まあいいさ。さっきも話した通り、キミにも時間が必要だろうからね」"

[[dialogue]]
speaker = "ラクシャ"
# 「もちろん推測で良ければ、キミの辿った結末を語ることはできるよ」
line = "「もちろん推測で良ければ、キミの辿った結末を語ることはできるよ」"

[[dialogue]]
speaker = "梨緒"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "ラクシャ"
# 「聞きたいなら聞かせてあげるけど、あまりお勧めはしないかな。……特に今はまだ、ね」
line = "「聞きたいなら聞かせてあげるけど、あまりお勧めはしないかな。……特に今はまだ、ね」"

[[dialogue]]
speaker = "ラクシャ"
# 「覚悟ができたら聞いて欲しいな。──じゃ、今度こそボクは行くよ。また会おうね」
line = "「覚悟ができたら聞いて欲しいな。──じゃ、今度こそボクは行くよ。また会おうね」"

[[dialogue]]
speaker = "梨緒"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# ラクシャが去っていく背中を、梨緒は無言で見送った。
line = "ラクシャが去っていく背中を、梨緒は無言で見送った。"

[[dialogue]]
speaker = "unk"
# 何かをはぐらかすような喋りは気に食わなかったが……同時に、彼女がはぐらかした『結末』とやらを聞くのが怖かったのだ。だから、それ以上踏み込むことができなかった。
line = "何かをはぐらかすような喋りは気に食わなかったが……同時に、彼女がはぐらかした『結末』とやらを聞くのが怖かったのだ。だから、それ以上踏み込むことができなかった。"

[[dialogue]]
speaker = "梨緒"
# 「っと、誰からだ……？」
line = "「っと、誰からだ……？」"

[[dialogue]]
speaker = "unk"
# エリシアから与えられていたＤＩＳＣの通知には、あらかじめ登録されていた連絡先が表示されていた。
line = "エリシアから与えられていたＤＩＳＣの通知には、あらかじめ登録されていた連絡先が表示されていた。"

[[dialogue]]
speaker = "unk"
# 『緋宮クロト』。
line = "『緋宮クロト』。"

[[dialogue]]
speaker = "unk"
# 『改めて、大事な話がある。新星の星徒会室まで来てもらえないだろうか？』。
line = "『改めて、大事な話がある。新星の星徒会室まで来てもらえないだろうか？』。"

[[dialogue]]
speaker = "unk"
# ＤＩＳＣの画面には、飾り気のない文章でそう書かれていた。
line = "ＤＩＳＣの画面には、飾り気のない文章でそう書かれていた。"
