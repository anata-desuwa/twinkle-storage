[[dialogue]]
speaker = "unk"
# 第３話,煩悩ＶＳ彼氏,P
line = "第３話,煩悩ＶＳ彼氏,P"

[[dialogue]]
speaker = "unk"
# その日、マトイは浅草安倍野神社へ来て、巫女の力の自主練を行っていた。
line = "その日、マトイは浅草安倍野神社へ来て、巫女の力の自主練を行っていた。"

[[dialogue]]
speaker = "unk"
# ミヤハルは用事があるとのことで、マトイ１人で訓練をしているところへ――
line = "ミヤハルは用事があるとのことで、マトイ１人で訓練をしているところへ――"

[[dialogue]]
speaker = "unk"
# やあ、マトイ。訓練頑張っているね
line = "やあ、マトイ。訓練頑張っているね"

[[dialogue]]
speaker = "マトイ"
# 「あれ、会長？　どうしてここに……？」
line = "「あれ、会長？　どうしてここに……？」"

[[dialogue]]
speaker = "unk"
# 目を丸くするマトイに歩み寄り、手で頬に触れる。
line = "目を丸くするマトイに歩み寄り、手で頬に触れる。"

[[dialogue]]
speaker = "マトイ"
# 「ひゃっ！？　な、何！？　突然どうしたの！？」
line = "「ひゃっ！？　な、何！？　突然どうしたの！？」"

[[dialogue]]
speaker = "マトイ"
# 「――え？　巫女の力で私に召喚された影？」
line = "「――え？　巫女の力で私に召喚された影？」"

[[dialogue]]
speaker = "マトイ"
# 「――それで、私の煩悩を叶えたいから、なんでも言って欲しいって？」
line = "「――それで、私の煩悩を叶えたいから、なんでも言って欲しいって？」"

[[dialogue]]
speaker = "マトイ"
# 「いやいやいや、本物の会長だよね！？　どういうこと！？」
line = "「いやいやいや、本物の会長だよね！？　どういうこと！？」"

[[dialogue]]
speaker = "unk"
# バレたか……
line = "バレたか……"

[[dialogue]]
speaker = "マトイ"
# 「普通にそれくらい分かるよ！　だって――」
line = "「普通にそれくらい分かるよ！　だって――」"

[[dialogue]]
speaker = "マトイ"
# 「だ、大好きな彼氏の、ことなんだし……」
line = "「だ、大好きな彼氏の、ことなんだし……」"

[[dialogue]]
speaker = "マトイ"
# 「――ん？　ミヤハルから、巫女修業で煩悩解放した時の話を聞いたって？」
line = "「――ん？　ミヤハルから、巫女修業で煩悩解放した時の話を聞いたって？」"

[[dialogue]]
speaker = "マトイ"
# 「あ、あいつ～」
line = "「あ、あいつ～」"

[[dialogue]]
speaker = "マトイ"
# 「でも会長……私たち、その、恋人なんだしっ。わざわざそんな、カッコつけなくたって……」
line = "「でも会長……私たち、その、恋人なんだしっ。わざわざそんな、カッコつけなくたって……」"

[[dialogue]]
speaker = "unk"
# 嫉妬しちゃったんだ
line = "嫉妬しちゃったんだ"

[[dialogue]]
speaker = "マトイ"
# 「え？」
line = "「え？」"

[[dialogue]]
speaker = "unk"
# 俺はマトイに理由を打ち明ける。
line = "俺はマトイに理由を打ち明ける。"

[[dialogue]]
speaker = "マトイ"
# 「――私の煩悩で会長の影が出てきたって話を聞いて、それで嫉妬を……？」
line = "「――私の煩悩で会長の影が出てきたって話を聞いて、それで嫉妬を……？」"

[[dialogue]]
speaker = "unk"
# 『壁ドン』とか……
line = "『壁ドン』とか……"

[[dialogue]]
speaker = "マトイ"
# 「た、確かにされたけども……！」
line = "「た、確かにされたけども……！」"

[[dialogue]]
speaker = "マトイ"
# 「で、でも、私――唇とかは許してないから！」
line = "「で、でも、私――唇とかは許してないから！」"

[[dialogue]]
speaker = "マトイ"
# 「それに、お姫様抱っこだって……！」
line = "「それに、お姫様抱っこだって……！」"

[[dialogue]]
speaker = "unk"
# お姫様抱っこ……？
line = "お姫様抱っこ……？"

[[dialogue]]
speaker = "マトイ"
# 「あっ、いや、なんでもないです……っ！」
line = "「あっ、いや、なんでもないです……っ！」"

[[dialogue]]
speaker = "unk"
# そこで顔を赤くして、視線を逸らすマトイ。
line = "そこで顔を赤くして、視線を逸らすマトイ。"

[[dialogue]]
speaker = "マトイ"
# 「――って、会長！？　きゃっ！？」
line = "「――って、会長！？　きゃっ！？」"

[[dialogue]]
speaker = "マトイ"
# 「こ、これって……お姫様抱っこ！？」
line = "「こ、これって……お姫様抱っこ！？」"

[[dialogue]]
speaker = "unk"
# 俺はマトイの体を抱き上げながら、耳元で囁く。
line = "俺はマトイの体を抱き上げながら、耳元で囁く。"

[[dialogue]]
speaker = "unk"
# 愛しているよ、マトイ
line = "愛しているよ、マトイ"

[[dialogue]]
speaker = "マトイ"
# 「ふあぁっ<emoji=heart04>　そんな急に言われたら……<emoji=heart04>」
line = "「ふあぁっ<emoji=heart04>　そんな急に言われたら……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺はそのまま正面から向き直ると、彼女に顔を寄せて――
line = "俺はそのまま正面から向き直ると、彼女に顔を寄せて――"

[[dialogue]]
speaker = "マトイ"
# 「あぅぅっ……<emoji=heart04>　んっ<emoji=heart04>」
line = "「あぅぅっ……<emoji=heart04>　んっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そっと唇を奪う。
line = "そっと唇を奪う。"

[[dialogue]]
speaker = "マトイ"
# 「ちゅっ……<emoji=heart04>　んっ……はあぁぁ<emoji=heart04>」
line = "「ちゅっ……<emoji=heart04>　んっ……はあぁぁ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ……影の時と、どっちがドキドキした？
line = "……影の時と、どっちがドキドキした？"

[[dialogue]]
speaker = "マトイ"
# 「そ、そんなの……」
line = "「そ、そんなの……」"

[[dialogue]]
speaker = "マトイ"
# 「本物の会長の方に決まってるでしょ……<emoji=heart04>」
line = "「本物の会長の方に決まってるでしょ……<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
# 「世界で１番……大好きな彼氏だもん<emoji=heart04>」
line = "「世界で１番……大好きな彼氏だもん<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
# 「あっ……んっ<emoji=heart04>　ちゅっ……<emoji=heart04>」
line = "「あっ……んっ<emoji=heart04>　ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
# 「ん……<emoji=heart04>　会長、もっと……<emoji=heart04>」
line = "「ん……<emoji=heart04>　会長、もっと……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# と、その時。少し離れたところから物音がした。
line = "と、その時。少し離れたところから物音がした。"

[[dialogue]]
speaker = "マトイ"
# 「ふぇっ！？」
line = "「ふぇっ！？」"

[[dialogue]]
speaker = "unk"
# 視線を向けると、建物の影に隠れて、こちらを覗いている人物が１人。
line = "視線を向けると、建物の影に隠れて、こちらを覗いている人物が１人。"

[[dialogue]]
speaker = "ミヤハル"
# 「アカン、つい身を乗り出してもうたわぁ……<emoji=heart04>」
line = "「アカン、つい身を乗り出してもうたわぁ……<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
# 「ミヤハル！？　ちょっ、なに覗いてんの！？」
line = "「ミヤハル！？　ちょっ、なに覗いてんの！？」"

[[dialogue]]
speaker = "マトイ"
# 「というか、今日は用事があるから、夜まで家を空けるって言ってなかった！？」
line = "「というか、今日は用事があるから、夜まで家を空けるって言ってなかった！？」"

[[dialogue]]
speaker = "ミヤハル"
# 「ん～、それなぁ……」
line = "「ん～、それなぁ……」"

[[dialogue]]
speaker = "ミヤハル"
# 「実はウソなんや<emoji=heart04>　友達カップルの情事を見て、うちも恋愛を学ぼうと思うてな？」
line = "「実はウソなんや<emoji=heart04>　友達カップルの情事を見て、うちも恋愛を学ぼうと思うてな？」"

[[dialogue]]
speaker = "マトイ"
# 「情事じゃない！　そこまで行ってないから！！」
line = "「情事じゃない！　そこまで行ってないから！！」"

[[dialogue]]
speaker = "ミヤハル"
# 「ほんまゴメンなぁ？　どうぞうちのことは気にせんと、そのままゆっくり続きをしてくれて構わへんから<emoji=heart04>　どうぞどうぞ～<emoji=heart04>」
line = "「ほんまゴメンなぁ？　どうぞうちのことは気にせんと、そのままゆっくり続きをしてくれて構わへんから<emoji=heart04>　どうぞどうぞ～<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
# 「できるかぁーーーっ！！！」
line = "「できるかぁーーーっ！！！」"

[[dialogue]]
speaker = "unk"
# お姫様抱っこされたまま、赤い顔で叫ぶマトイなのであった――
line = "お姫様抱っこされたまま、赤い顔で叫ぶマトイなのであった――"
