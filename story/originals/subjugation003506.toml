[[dialogue]]
speaker = "unk"
# ミルフィーとトリシャさんの活躍により、演劇部にいたゾンビ型幽霊は無事駆逐された。
line = "ミルフィーとトリシャさんの活躍により、演劇部にいたゾンビ型幽霊は無事駆逐された。"

[[dialogue]]
speaker = "ミルフィー"
# 「会長くん、何か言うことは？」
line = "「会長くん、何か言うことは？」"

[[dialogue]]
speaker = "unk"
# 反省してます
line = "反省してます"

[[dialogue]]
speaker = "unk"
# ごめんなさい
line = "ごめんなさい"

[[dialogue]]
speaker = "ミルフィー"
# 「うん、じゃあ許す。会長くんも不可抗力だったよね。トリシャさんがあんなにぴょんぴょんするとは思わなかったもん」
line = "「うん、じゃあ許す。会長くんも不可抗力だったよね。トリシャさんがあんなにぴょんぴょんするとは思わなかったもん」"

[[dialogue]]
speaker = "トリシャ"
# 「ご安心ください、ミルフィーさんのことも見ていました。じっくりと……欲望に満ちた眼差しで……」
line = "「ご安心ください、ミルフィーさんのことも見ていました。じっくりと……欲望に満ちた眼差しで……」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆ！　それは余も見てたゆ♪」
line = "「ゆ！　それは余も見てたゆ♪」"

[[dialogue]]
speaker = "ミルフィー"
# 「全然安心じゃないよ……も、もうっ！　会長くんのエッチっ！」
line = "「全然安心じゃないよ……も、もうっ！　会長くんのエッチっ！」"

[[dialogue]]
speaker = "unk"
# マトイから連絡だ
line = "マトイから連絡だ"

[[dialogue]]
speaker = "unk"
# ちょっと待った！
line = "ちょっと待った！"

[[dialogue]]
speaker = "マトイ"
# 『ついさっき、大量のゾンビ型幽霊が出現したっていう報告が舞亜ちゃんから入ったよ』
line = "『ついさっき、大量のゾンビ型幽霊が出現したっていう報告が舞亜ちゃんから入ったよ』"

[[dialogue]]
speaker = "ミルフィー"
# 「すぐ行くよ！　場所はどこ？」
line = "「すぐ行くよ！　場所はどこ？」"

[[dialogue]]
speaker = "マトイ"
# 『購買部。なんでもお菓子コーナーに大群が押し寄せてきたって……』
line = "『購買部。なんでもお菓子コーナーに大群が押し寄せてきたって……』"

[[dialogue]]
speaker = "ミルフィー"
# 「お菓子コーナー？　どういうことかな？」
line = "「お菓子コーナー？　どういうことかな？」"

[[dialogue]]
speaker = "トリシャ"
# 「フフ……邪霊はジャクリーヌさんが召喚したものですから……召喚主に似るのかもしれませんね……」
line = "「フフ……邪霊はジャクリーヌさんが召喚したものですから……召喚主に似るのかもしれませんね……」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆ！　余に似ているということは案外いいやつらかもしれないの♪」
line = "「ゆ！　余に似ているということは案外いいやつらかもしれないの♪」"

[[dialogue]]
speaker = "ミルフィー"
# 「思いっきり騒動を起こしてるのに……？」
line = "「思いっきり騒動を起こしてるのに……？」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆゆっ！　前言撤回ゆ！　余には全然似てない連中ゆ！」
line = "「ゆゆっ！　前言撤回ゆ！　余には全然似てない連中ゆ！」"

[[dialogue]]
speaker = "マトイ"
# 『ごめんね！　別の報告が入ったよ。今度はトレーニング施設だって！』
line = "『ごめんね！　別の報告が入ったよ。今度はトレーニング施設だって！』"

[[dialogue]]
speaker = "ミルフィー"
# 「トレーニング施設……なにかジャクリーヌさんの興味を惹くものがあったかな？」
line = "「トレーニング施設……なにかジャクリーヌさんの興味を惹くものがあったかな？」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ないゆ！　余は幽霊だからトレーニングなんてしないゆ～♪」
line = "「ないゆ！　余は幽霊だからトレーニングなんてしないゆ～♪」"

[[dialogue]]
speaker = "ミルフィー"
# 「だよねぇ。ってことは、ゾンビ型幽霊はジャクリーヌさんの嗜好とは関係ないのかも」
line = "「だよねぇ。ってことは、ゾンビ型幽霊はジャクリーヌさんの嗜好とは関係ないのかも」"

[[dialogue]]
speaker = "マトイ"
# 『わわっ！　またもう１件報告！　今度は大聖堂に大量出現したみたい！』
line = "『わわっ！　またもう１件報告！　今度は大聖堂に大量出現したみたい！』"

[[dialogue]]
speaker = "unk"
# これはまずいな……
line = "これはまずいな……"

[[dialogue]]
speaker = "unk"
# 一度にこんなにたくさん
line = "一度にこんなにたくさん"

[[dialogue]]
speaker = "ミルフィー"
# 「どうしよう？　このままじゃ全然追いつかないよ……」
line = "「どうしよう？　このままじゃ全然追いつかないよ……」"

[[dialogue]]
speaker = "トリシャ"
# 「全部で何体の幽霊ゾンビが現世に召喚されているのでしょうか……？」
line = "「全部で何体の幽霊ゾンビが現世に召喚されているのでしょうか……？」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「わかんないゆ。でも、いっぱいいるゆ」
line = "「わかんないゆ。でも、いっぱいいるゆ」"

[[dialogue]]
speaker = "ミルフィー"
# 「今のペースで駆除していても追いつかないよね。なにかいい作戦があればいいんだけど……」
line = "「今のペースで駆除していても追いつかないよね。なにかいい作戦があればいいんだけど……」"

[[dialogue]]
speaker = "ミルフィー"
# 「うーん…………映画の中にヒントはないかな？　たくさんのゾンビ型幽霊と戦う時どうしてた、とか」
line = "「うーん…………映画の中にヒントはないかな？　たくさんのゾンビ型幽霊と戦う時どうしてた、とか」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ミルフィーたちと同じゆ。剣とかお札とか、鏡も使ってたゆ」
line = "「ミルフィーたちと同じゆ。剣とかお札とか、鏡も使ってたゆ」"

[[dialogue]]
speaker = "トリシャ"
# 「フフ……それだけでしたか？　よく思い出してください、ジャクリーヌさん」
line = "「フフ……それだけでしたか？　よく思い出してください、ジャクリーヌさん」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆゆっ！？」
line = "「ゆゆっ！？」"

[[dialogue]]
speaker = "トリシャ"
# 「彼女たちは幽霊ゾンビを一網打尽にするような秘策を……使ってはいませんでしたか……？」
line = "「彼女たちは幽霊ゾンビを一網打尽にするような秘策を……使ってはいませんでしたか……？」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆっ！？　そ、そうだったゆ！」
line = "「ゆっ！？　そ、そうだったゆ！」"

[[dialogue]]
speaker = "トリシャ"
# 「そうです。さあ、ミルフィーさん。邪霊を引き寄せるあの霊具を……」
line = "「そうです。さあ、ミルフィーさん。邪霊を引き寄せるあの霊具を……」"

[[dialogue]]
speaker = "ミルフィー"
# 「って言われても私は映画を見てないですし……分からないですよ……」
line = "「って言われても私は映画を見てないですし……分からないですよ……」"

[[dialogue]]
speaker = "ミルフィー"
# 「あ、でも……もしかして……その霊具ってこれの事かな？」
line = "「あ、でも……もしかして……その霊具ってこれの事かな？」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「それだゆ！　映画だとそのベルを鳴らすと、幽霊ゾンビがワラワラと寄ってきてたゆ！」
line = "「それだゆ！　映画だとそのベルを鳴らすと、幽霊ゾンビがワラワラと寄ってきてたゆ！」"

[[dialogue]]
speaker = "ミルフィー"
# 「なんとなくそれっぽいって思ったけど、やっぱりそうなんだ」
line = "「なんとなくそれっぽいって思ったけど、やっぱりそうなんだ」"

[[dialogue]]
speaker = "トリシャ"
# 「それはミルフィーさんの人工戦闘服の装備の１つで、幽霊が好きな音色を鳴らすことができるのです」
line = "「それはミルフィーさんの人工戦闘服の装備の１つで、幽霊が好きな音色を鳴らすことができるのです」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆ～、確かにいつまでも聴いていたくなる音ゆ～」
line = "「ゆ～、確かにいつまでも聴いていたくなる音ゆ～」"

[[dialogue]]
speaker = "ミルフィー"
# 「それじゃこれを使ってゾンビ型幽霊をひとつに集めればいいんだ」
line = "「それじゃこれを使ってゾンビ型幽霊をひとつに集めればいいんだ」"

[[dialogue]]
speaker = "トリシャ"
# 「ミルフィーさんには幽霊ゾンビをその剣にて祓っていただく役目がありますから、集める役は私が務めましょう……」
line = "「ミルフィーさんには幽霊ゾンビをその剣にて祓っていただく役目がありますから、集める役は私が務めましょう……」"

[[dialogue]]
speaker = "ミルフィー"
# 「いいんですか、トリシャさん？」
line = "「いいんですか、トリシャさん？」"

[[dialogue]]
speaker = "トリシャ"
# 「私はミルフィーさんのオトモですから……お安い御用です……」
line = "「私はミルフィーさんのオトモですから……お安い御用です……」"

[[dialogue]]
speaker = "ミルフィー"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ミルフィー"
# 「えっと……ずっと気になってたんですが『オトモ』というのはやめませんか？」
line = "「えっと……ずっと気になってたんですが『オトモ』というのはやめませんか？」"

[[dialogue]]
speaker = "トリシャ"
# 「ガーーーン……！！　そ、そんな……ミルフィーさんにとって私はオトモたりえない存在……」
line = "「ガーーーン……！！　そ、そんな……ミルフィーさんにとって私はオトモたりえない存在……」"

[[dialogue]]
speaker = "ミルフィー"
# 「そ、そうじゃなくてですね！　なんかオトモっていうと、主従みたいな感じになっちゃいますし……」
line = "「そ、そうじゃなくてですね！　なんかオトモっていうと、主従みたいな感じになっちゃいますし……」"

[[dialogue]]
speaker = "トリシャ"
# 「ですが……ですが……オトモでなくなると……ミルフィーさんとオトモダチでもなくなってしまいます……」
line = "「ですが……ですが……オトモでなくなると……ミルフィーさんとオトモダチでもなくなってしまいます……」"

[[dialogue]]
speaker = "ミルフィー"
# 「そんなことないですよ！　オトモじゃなくてもトリシャさんは大切なお友達ですっ！」
line = "「そんなことないですよ！　オトモじゃなくてもトリシャさんは大切なお友達ですっ！」"

[[dialogue]]
speaker = "トリシャ"
# 「…………本当、ですか？」
line = "「…………本当、ですか？」"

[[dialogue]]
speaker = "ミルフィー"
# 「だからオトモではなくて、普通に……お友達になってくれませんか？」
line = "「だからオトモではなくて、普通に……お友達になってくれませんか？」"

[[dialogue]]
speaker = "トリシャ"
# 「っ……！！」
line = "「っ……！！」"

[[dialogue]]
speaker = "トリシャ"
# 「にへへ……嬉しい……その言葉を聞いたら……やる気が漲ってきました……」
line = "「にへへ……嬉しい……その言葉を聞いたら……やる気が漲ってきました……」"

[[dialogue]]
speaker = "トリシャ"
# 「貴方のオトモダチとして……私にやらせて下さい……見事、幽霊ゾンビたちを引き連れてみせます」
line = "「貴方のオトモダチとして……私にやらせて下さい……見事、幽霊ゾンビたちを引き連れてみせます」"

[[dialogue]]
speaker = "ミルフィー"
# 「トリシャさん……」
line = "「トリシャさん……」"

[[dialogue]]
speaker = "ミルフィー"
# 「うん、それじゃ誘導役は任せるね！　一緒に頑張ろう！」
line = "「うん、それじゃ誘導役は任せるね！　一緒に頑張ろう！」"

[[dialogue]]
speaker = "unk"
# う、美しい友情だ……
line = "う、美しい友情だ……"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「これがヒトリの言ってた……てぇてぇ気持ちゆ……」
line = "「これがヒトリの言ってた……てぇてぇ気持ちゆ……」"

[[dialogue]]
speaker = "unk"
# まるで映画のワンシーンのように手を取り合い、確かな友情を結ぶミルフィーとトリシャさん。
line = "まるで映画のワンシーンのように手を取り合い、確かな友情を結ぶミルフィーとトリシャさん。"

[[dialogue]]
speaker = "unk"
# そして、ゾンビ型幽霊を一ヶ所に集めて一網打尽にするという作戦が始まったのだった。
line = "そして、ゾンビ型幽霊を一ヶ所に集めて一網打尽にするという作戦が始まったのだった。"
