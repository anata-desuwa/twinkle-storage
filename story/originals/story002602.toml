[[dialogue]]
speaker = "unk"
# 公安委員会――それは、新星・流星学園の星徒会では扱えないような星術絡みの犯罪者を、グレーな方法で秘密裏に処理する学園組織である。
line = "公安委員会――それは、新星・流星学園の星徒会では扱えないような星術絡みの犯罪者を、グレーな方法で秘密裏に処理する学園組織である。"

[[dialogue]]
speaker = "unk"
# その為、表向きには組織として公表されていない。俺もマインと出会うまではその存在を知らなかった。
line = "その為、表向きには組織として公表されていない。俺もマインと出会うまではその存在を知らなかった。"

[[dialogue]]
speaker = "unk"
# そんな公安委員会の協力者として現れた母さんに、俺は驚きを隠せなかった。
line = "そんな公安委員会の協力者として現れた母さんに、俺は驚きを隠せなかった。"

[[dialogue]]
speaker = "unk"
# どうして母さんが……？
line = "どうして母さんが……？"

[[dialogue]]
speaker = "リノ"
# 「クロトはお母さんがどこに務めているかは知っているわよね？」
line = "「クロトはお母さんがどこに務めているかは知っているわよね？」"

[[dialogue]]
speaker = "リノ"
# 「流星市国教皇庁直属の研究機関『ヘキサグラム』。私はそこの研究主任として働かせてもらっているわけだけど……」
line = "「流星市国教皇庁直属の研究機関『ヘキサグラム』。私はそこの研究主任として働かせてもらっているわけだけど……」"

[[dialogue]]
speaker = "リノ"
# 「実はそのヘキサグラムは、公安委員会と組織的な繋がりがあるのよ」
line = "「実はそのヘキサグラムは、公安委員会と組織的な繋がりがあるのよ」"

[[dialogue]]
speaker = "リコリンフィア"
# 「公安委員会の正式名称は『流星市国星騎士公安委員会』という。表向きには存在していないが、実はこちらも教皇庁直属でな」
line = "「公安委員会の正式名称は『流星市国星騎士公安委員会』という。表向きには存在していないが、実はこちらも教皇庁直属でな」"

[[dialogue]]
speaker = "リコリンフィア"
# 「私の上司――公安委員会のトップである委員長も、流星市国教皇庁の役人が務めているんだ」
line = "「私の上司――公安委員会のトップである委員長も、流星市国教皇庁の役人が務めているんだ」"

[[dialogue]]
speaker = "リコリンフィア"
# 「本部長の私は、公安委員会のリーダーとして組織を動かしてはいるが、組織図的にはナンバー２に当たる」
line = "「本部長の私は、公安委員会のリーダーとして組織を動かしてはいるが、組織図的にはナンバー２に当たる」"

[[dialogue]]
speaker = "リコリンフィア"
# 「そして、リノには公安委員会からヘキサグラムに依頼して、星術の解析を担当する外部協力員になってもらっているというわけだ」
line = "「そして、リノには公安委員会からヘキサグラムに依頼して、星術の解析を担当する外部協力員になってもらっているというわけだ」"

[[dialogue]]
speaker = "リノ"
# 「リコとはその関係で知り合って、友達になったのよね～」
line = "「リコとはその関係で知り合って、友達になったのよね～」"

[[dialogue]]
speaker = "リノ"
# 「リコにはこれまでも影で随分と助けてもらったわ。前にフィーニスの塔で使った『シエルの<ruby=はこ>筐</ruby>』や『<ruby=せいがいふ>星骸布</ruby>』の情報は、リコが提供してくれたものなのよ」
line = "「リコにはこれまでも影で随分と助けてもらったわ。前にフィーニスの塔で使った『シエルの<ruby>筐<rt>はこ</rt></ruby>』や『<ruby>星骸布<rt>せいがいふ</rt></ruby>』の情報は、リコが提供してくれたものなのよ」"

[[dialogue]]
speaker = "unk"
# リコさん、ありがとうございます
line = "リコさん、ありがとうございます"

[[dialogue]]
speaker = "unk"
# そうだったんだ……！
line = "そうだったんだ……！"

[[dialogue]]
speaker = "リコリンフィア"
# 「礼には及ばない。裏から平和を守るのが公安委員会だ」
line = "「礼には及ばない。裏から平和を守るのが公安委員会だ」"

[[dialogue]]
speaker = "リコリンフィア"
# 「その為ならば、使えるものは何でも使う。たとえそれが、合法的な手段ではなくてもな」
line = "「その為ならば、使えるものは何でも使う。たとえそれが、合法的な手段ではなくてもな」"

[[dialogue]]
speaker = "リコリンフィア"
# 「故に、私はリノが魔女であるなどとは知らないし、ただ友人であるから、協力した――」
line = "「故に、私はリノが魔女であるなどとは知らないし、ただ友人であるから、協力した――」"

[[dialogue]]
speaker = "unk"
# リコリンフィアはそこまで言ってから、小さな笑みを浮かべて。
line = "リコリンフィアはそこまで言ってから、小さな笑みを浮かべて。"

[[dialogue]]
speaker = "リコリンフィア"
# 「そういうことで１つ、よろしく頼むぞ、少年」
line = "「そういうことで１つ、よろしく頼むぞ、少年」"

[[dialogue]]
speaker = "リコリンフィア"
# 「あとは私が公安委員会の本部長、リーダーであることもな。外で話す時は――」
line = "「あとは私が公安委員会の本部長、リーダーであることもな。外で話す時は――」"

[[dialogue]]
speaker = "リコリンフィア"
# 「附属生のリコリンとして仲良くしてね、お兄ちゃん☆　てへっ♪」
line = "「附属生のリコリンとして仲良くしてね、お兄ちゃん☆　てへっ♪」"

[[dialogue]]
speaker = "unk"
# えっ……本当に附属生なんですか！？
line = "えっ……本当に附属生なんですか！？"

[[dialogue]]
speaker = "unk"
# 附属校の制服！？
line = "附属校の制服！？"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひ♪　実はそうなんだよね～」
line = "「にひひ♪　実はそうなんだよね～」"

[[dialogue]]
speaker = "リコリンフィア"
# 「――学生という肩書きは情報収集に何かと便利でな。特に附属生だと尚更だ」
line = "「――学生という肩書きは情報収集に何かと便利でな。特に附属生だと尚更だ」"

[[dialogue]]
speaker = "リコリンフィア"
# 「私はこの大人になっても小さなままの体型を活かし、普段は附属生のリコリンとして諜報活動を行っているというわけだ」
line = "「私はこの大人になっても小さなままの体型を活かし、普段は附属生のリコリンとして諜報活動を行っているというわけだ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「そこまであざとくキャラ付けしなくてもいいのにね～」
line = "「そこまであざとくキャラ付けしなくてもいいのにね～」"

[[dialogue]]
speaker = "リコリンフィア"
# 「何を言っている？　リコリンはこれまで数多の大人を騙して来た完璧な附属生の姿だぞ」
line = "「何を言っている？　リコリンはこれまで数多の大人を騙して来た完璧な附属生の姿だぞ」"

[[dialogue]]
speaker = "リコリンフィア"
# 「さて……自己紹介も済んだところで、本題に入るとしよう」
line = "「さて……自己紹介も済んだところで、本題に入るとしよう」"

[[dialogue]]
speaker = "リコリンフィア"
# 「公安委員会では今、リゾート結界のとある噂を調査していてな」
line = "「公安委員会では今、リゾート結界のとある噂を調査していてな」"

[[dialogue]]
speaker = "リコリンフィア"
# 「最近、流星市国や東京周辺で、『ヴェノマイザー』と呼ばれる薬が出回るようになっているんだ」
line = "「最近、流星市国や東京周辺で、『ヴェノマイザー』と呼ばれる薬が出回るようになっているんだ」"

[[dialogue]]
speaker = "リコリンフィア"
# 「それは二の腕に付ける腕輪型の装置で体内に注入するもので、その薬を使うと――」
line = "「それは二の腕に付ける腕輪型の装置で体内に注入するもので、その薬を使うと――」"

[[dialogue]]
speaker = "リコリンフィア"
# 「<b>怪人</b>の姿へと変身することができるようになる」
line = "「<b>怪人</b>の姿へと変身することができるようになる」"

[[dialogue]]
speaker = "リコリンフィア"
# 「そして、公安委員会で『ミュータント』と名づけたその怪人姿へ変身すると、魔力を操ることができるようになる」
line = "「そして、公安委員会で『ミュータント』と名づけたその怪人姿へ変身すると、魔力を操ることができるようになる」"

[[dialogue]]
speaker = "unk"
# 魔力を！？　その薬は一体……
line = "魔力を！？　その薬は一体……"

[[dialogue]]
speaker = "リコリンフィア"
# 「今から１３年前、魔界である魔獣が復活し、討伐された」
line = "「今から１３年前、魔界である魔獣が復活し、討伐された」"

[[dialogue]]
speaker = "リコリンフィア"
# 「その魔獣の名は『マンティコア』。獅子の頭と、サソリの尾を持ち、強力な毒を持つ怪物だ」
line = "「その魔獣の名は『マンティコア』。獅子の頭と、サソリの尾を持ち、強力な毒を持つ怪物だ」"

[[dialogue]]
speaker = "リコリンフィア"
# 「その際にマンティコアの毒を生成する体内器官である『ポイズナイト』が何者かに盗まれ、行方不明になる事件があった」
line = "「その際にマンティコアの毒を生成する体内器官である『ポイズナイト』が何者かに盗まれ、行方不明になる事件があった」"

[[dialogue]]
speaker = "リノ"
# 「ヴェノマイザーっていうのは、そのポイズナイトが生み出すマンティコアの毒を元に作り出した薬だと、成分を調べて判明したの」
line = "「ヴェノマイザーっていうのは、そのポイズナイトが生み出すマンティコアの毒を元に作り出した薬だと、成分を調べて判明したの」"

[[dialogue]]
speaker = "リノ"
# 「マンティコアは毒を相手に注入し、自らの眷族へと変貌させる能力があった。それを利用して、怪人へと変身する仕組みというわけね」
line = "「マンティコアは毒を相手に注入し、自らの眷族へと変貌させる能力があった。それを利用して、怪人へと変身する仕組みというわけね」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「それでね、最近、そのヴェノマイザーの受け渡しが、リゾート結界で行われているという噂が流れて来たんだよ」
line = "「それでね、最近、そのヴェノマイザーの受け渡しが、リゾート結界で行われているという噂が流れて来たんだよ」"

[[dialogue]]
speaker = "unk"
# じゃあ、俺はその捜査に協力すれば？
line = "じゃあ、俺はその捜査に協力すれば？"

[[dialogue]]
speaker = "リコリンフィア"
# 「ああ、内容は――」
line = "「ああ、内容は――」"

[[dialogue]]
speaker = "リコリンフィア"
# 「私たちと思いっきり海を<b>エンジョイ</b>することだ」
line = "「私たちと思いっきり海を<b>エンジョイ</b>することだ」"

[[dialogue]]
speaker = "unk"
# え？
line = "え？"

[[dialogue]]
speaker = "リコリンフィア"
# 「これは冗談ではなく真面目な話でな。作戦として、犯人に我々が油断しているように見せたい。協力お願いすることはできるか？」
line = "「これは冗談ではなく真面目な話でな。作戦として、犯人に我々が油断しているように見せたい。協力お願いすることはできるか？」"

[[dialogue]]
speaker = "unk"
# 俺は頷いてみせる。
line = "俺は頷いてみせる。"

[[dialogue]]
speaker = "リコリンフィア"
# 「ふっ……即決か。いわゆる囮捜査は表向きには違法なのだが……なるほど、確かに肝が据わっているな」
line = "「ふっ……即決か。いわゆる囮捜査は表向きには違法なのだが……なるほど、確かに肝が据わっているな」"

[[dialogue]]
speaker = "unk"
# マインと母さんを信じてるので
line = "マインと母さんを信じてるので"

[[dialogue]]
speaker = "リコリンフィア"
# 「リノはともかく、マインもか。そこまで信頼を獲得しているとは、大したものだな」
line = "「リノはともかく、マインもか。そこまで信頼を獲得しているとは、大したものだな」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひ♪　私は悪寄りだって、会長もわかっているはずなんですけどね～」
line = "「にひひ♪　私は悪寄りだって、会長もわかっているはずなんですけどね～」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「なんか信頼されちゃってるんですよ。会長は眩しいくらいのお人好しなんで♪」
line = "「なんか信頼されちゃってるんですよ。会長は眩しいくらいのお人好しなんで♪」"

[[dialogue]]
speaker = "リノ"
# 「ふふっ、それにうちの息子は、私が心配して反対しても星騎士になっちゃった子だからね」
line = "「ふふっ、それにうちの息子は、私が心配して反対しても星騎士になっちゃった子だからね」"

[[dialogue]]
speaker = "リノ"
# 「事件が起きるって話を聞いて、見て見ぬフリなんかできないのよ」
line = "「事件が起きるって話を聞いて、見て見ぬフリなんかできないのよ」"

[[dialogue]]
speaker = "リコリンフィア"
# 「……そうか。ならば、その意思を裏切らないように、私も誠実に応えねばな。作戦の詳細については、後で話すが――」
line = "「……そうか。ならば、その意思を裏切らないように、私も誠実に応えねばな。作戦の詳細については、後で話すが――」"

[[dialogue]]
speaker = "リコリンフィア"
# 「どうか、公安委員会にキミの力を貸してくれ、少年」
line = "「どうか、公安委員会にキミの力を貸してくれ、少年」"

[[dialogue]]
speaker = "unk"
# 俺は彼女に再び、頷いてみせる。
line = "俺は彼女に再び、頷いてみせる。"

[[dialogue]]
speaker = "unk"
# こうして、公安委員会の２人と母さんと共に、俺は夏の海を<b>楽しむ</b>ことになるのだった――
line = "こうして、公安委員会の２人と母さんと共に、俺は夏の海を<b>楽しむ</b>ことになるのだった――"
