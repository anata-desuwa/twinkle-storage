[[dialogue]]
speaker = "unk"
# 第３話,最強のモフモフ,P
line = "第３話,最強のモフモフ,P"

[[dialogue]]
speaker = "ヨミ"
# 「会長、いらっしゃいませ♪」
line = "「会長、いらっしゃいませ♪」"

[[dialogue]]
speaker = "せつな"
# 「おや、主様もこちらに？　奇遇でござるな。今日の日替わりケーキはレモンタルトでござるよ」
line = "「おや、主様もこちらに？　奇遇でござるな。今日の日替わりケーキはレモンタルトでござるよ」"

[[dialogue]]
speaker = "unk"
# 息抜きにカフェテリアに寄ると、ヨミが出迎えてくれた。
line = "息抜きにカフェテリアに寄ると、ヨミが出迎えてくれた。"

[[dialogue]]
speaker = "unk"
# せつなもここでお茶をしていたようだ。
line = "せつなもここでお茶をしていたようだ。"

[[dialogue]]
speaker = "煌嶺"
# 「ふむ。ここが学園のカフェテリアか。面白みのある場所ではなさそうだな」
line = "「ふむ。ここが学園のカフェテリアか。面白みのある場所ではなさそうだな」"

[[dialogue]]
speaker = "ヨミ"
# 「こ、こ、煌嶺さん！？」
line = "「こ、こ、煌嶺さん！？」"

[[dialogue]]
speaker = "煌嶺"
# 「なぜ驚く？　妾は学園の理事だ。学園の施設を見に来て何が悪い？」
line = "「なぜ驚く？　妾は学園の理事だ。学園の施設を見に来て何が悪い？」"

[[dialogue]]
speaker = "せつな"
# 「それはそうでござるが……」
line = "「それはそうでござるが……」"

[[dialogue]]
speaker = "unk"
# そういえば……
line = "そういえば……"

[[dialogue]]
speaker = "煌嶺"
# 「む？」
line = "「む？」"

[[dialogue]]
speaker = "unk"
# せつなの師匠であるシズルさんも、九尾の狐の魔族だった。
line = "せつなの師匠であるシズルさんも、九尾の狐の魔族だった。"

[[dialogue]]
speaker = "unk"
# 九尾の狐は大変稀少な存在と聞くが、シズルさんと何か関係があるのだろうか？
line = "九尾の狐は大変稀少な存在と聞くが、シズルさんと何か関係があるのだろうか？"

[[dialogue]]
speaker = "煌嶺"
# 「忍びの里にも九尾の狐の魔族がいる……？　知らぬな。妾とは関係ない。キュリオスの皇帝に嫁いだ初代煌嶺が、九尾の魔族だっただけのこと」
line = "「忍びの里にも九尾の狐の魔族がいる……？　知らぬな。妾とは関係ない。キュリオスの皇帝に嫁いだ初代煌嶺が、九尾の魔族だっただけのこと」"

[[dialogue]]
speaker = "煌嶺"
# 「九尾がいくら稀少な存在だからといって、それだけで結び付けられては迷惑というものだ」
line = "「九尾がいくら稀少な存在だからといって、それだけで結び付けられては迷惑というものだ」"

[[dialogue]]
speaker = "せつな"
# 「本当にただの偶然でござったか」
line = "「本当にただの偶然でござったか」"

[[dialogue]]
speaker = "せつな"
# 「しかし九尾の魔族は長寿でござる。師匠は見かけによらずものすごく長生きでござるが、煌嶺殿もそうなのでござるか？」
line = "「しかし九尾の魔族は長寿でござる。師匠は見かけによらずものすごく長生きでござるが、煌嶺殿もそうなのでござるか？」"

[[dialogue]]
speaker = "煌嶺"
# 「無礼な猫娘だな。妾の齢は貴様らとそう変わらん。妾がその師匠とやらのように歳を重ねていると、そう想像しているのなら……処すぞ？」
line = "「無礼な猫娘だな。妾の齢は貴様らとそう変わらん。妾がその師匠とやらのように歳を重ねていると、そう想像しているのなら……処すぞ？」"

[[dialogue]]
speaker = "せつな"
# 「ひぃぃっ！？　ごめんなさいでござるーっ！！」
line = "「ひぃぃっ！？　ごめんなさいでござるーっ！！」"

[[dialogue]]
speaker = "煌嶺"
# 「だが長く生きた九尾だろうと、妾には遠く及ばぬ。なぜなら──」
line = "「だが長く生きた九尾だろうと、妾には遠く及ばぬ。なぜなら──」"

[[dialogue]]
speaker = "煌嶺"
# 「妾の尻尾こそ至高だからだ！！」
line = "「妾の尻尾こそ至高だからだ！！」"

[[dialogue]]
speaker = "unk"
# そこ！？
line = "そこ！？"

[[dialogue]]
speaker = "せつな"
# 「確かに師匠は小柄な分、毛量では負けるでござるな……。尻尾が本体かと思うほどの大ボリュームでござる」
line = "「確かに師匠は小柄な分、毛量では負けるでござるな……。尻尾が本体かと思うほどの大ボリュームでござる」"

[[dialogue]]
speaker = "煌嶺"
# 「妾は気前が良い。今ならこの尻尾、モフらせてやってもよいぞ、魔王？」
line = "「妾は気前が良い。今ならこの尻尾、モフらせてやってもよいぞ、魔王？」"

[[dialogue]]
speaker = "unk"
# なんだって……！？
line = "なんだって……！？"

[[dialogue]]
speaker = "煌嶺"
# 「たとえ尾の１本で比較しても、そこな狐娘よりも上。それが九尾だぞ」
line = "「たとえ尾の１本で比較しても、そこな狐娘よりも上。それが九尾だぞ」"

[[dialogue]]
speaker = "ヨミ"
# 「むむ……別に張り合うつもりはないですけど、なんか悔しいです……」
line = "「むむ……別に張り合うつもりはないですけど、なんか悔しいです……」"

[[dialogue]]
speaker = "煌嶺"
# 「ほれ、どうする？　妾がモフらせてやると言っているのだ、躊躇する理由がどこにある？」
line = "「ほれ、どうする？　妾がモフらせてやると言っているのだ、躊躇する理由がどこにある？」"

[[dialogue]]
speaker = "煌嶺"
# 「柔らかくて温い、ふさふさの尻尾が９本」
line = "「柔らかくて温い、ふさふさの尻尾が９本」"

[[dialogue]]
speaker = "煌嶺"
# 「当然手入れも欠かさぬ。妾のために用意させた特別な油を使っている。そんじょそこらの獣人系魔族とは毛並みが違うぞ」
line = "「当然手入れも欠かさぬ。妾のために用意させた特別な油を使っている。そんじょそこらの獣人系魔族とは毛並みが違うぞ」"

[[dialogue]]
speaker = "煌嶺"
# 「この九尾の極上のモフモフに包まれたいと思わんのか？　んん？　ん～？」
line = "「この九尾の極上のモフモフに包まれたいと思わんのか？　んん？　ん～？」"

[[dialogue]]
speaker = "unk"
# くっ……誘惑に抗えない……！
line = "くっ……誘惑に抗えない……！"

[[dialogue]]
speaker = "煌嶺"
# 「ふふ……どうだ、妾の尾は？　極上の九尾に包まれた心地は？」
line = "「ふふ……どうだ、妾の尾は？　極上の九尾に包まれた心地は？」"

[[dialogue]]
speaker = "unk"
# モフモフに包まれて……昇天しそう……
line = "モフモフに包まれて……昇天しそう……"

[[dialogue]]
speaker = "せつな"
# 「ああ！？　主様の顔がすっかり蕩けているでござる！？」
line = "「ああ！？　主様の顔がすっかり蕩けているでござる！？」"

[[dialogue]]
speaker = "ヨミ"
# 「正気を保ってください！　相手はあの大欲の女帝ですよ！」
line = "「正気を保ってください！　相手はあの大欲の女帝ですよ！」"

[[dialogue]]
speaker = "unk"
# 煌嶺の尻尾に埋もれながら、もっとモフモフを味わいたくて、もがくように手を動かすと──
line = "煌嶺の尻尾に埋もれながら、もっとモフモフを味わいたくて、もがくように手を動かすと──"

[[dialogue]]
speaker = "煌嶺"
# 「ひあぁんっ！？　もう、くすぐったいってば～」
line = "「ひあぁんっ！？　もう、くすぐったいってば～」"

[[dialogue]]
speaker = "せつな"
# 「なんかかわいい声が出たでござる！？」
line = "「なんかかわいい声が出たでござる！？」"

[[dialogue]]
speaker = "unk"
# そっちの姿でその声出せるんだ……
line = "そっちの姿でその声出せるんだ……"

[[dialogue]]
speaker = "煌嶺"
# 「そりゃ出せるよ。気分でやってるだけだし」
line = "「そりゃ出せるよ。気分でやってるだけだし」"

[[dialogue]]
speaker = "煌嶺"
# 「あんっ<emoji=heart04>　んんっ<emoji=heart04>　はあぁん<emoji=heart04>　魔王さんってば、触り方がエッチだよ～」
line = "「あんっ<emoji=heart04>　んんっ<emoji=heart04>　はあぁん<emoji=heart04>　魔王さんってば、触り方がエッチだよ～」"

[[dialogue]]
speaker = "煌嶺"
# 「ふふ、魔王さん、私の尻尾に夢中になってかわいいな～。リーエンちゃんも私の尻尾好きだけど、魔王さんも気に入ったみたいだね♪」
line = "「ふふ、魔王さん、私の尻尾に夢中になってかわいいな～。リーエンちゃんも私の尻尾好きだけど、魔王さんも気に入ったみたいだね♪」"

[[dialogue]]
speaker = "せつな"
# 「主様が女帝の虜になったでござる……」
line = "「主様が女帝の虜になったでござる……」"

[[dialogue]]
speaker = "ヨミ"
# 「ですね……すっかりメロメロです……」
line = "「ですね……すっかりメロメロです……」"

[[dialogue]]
speaker = "煌嶺"
# 「あなたたち羨ましいの？　私の尻尾は９本あるからまだ余裕あるし、２人もモフモフさせてあげるね♪」
line = "「あなたたち羨ましいの？　私の尻尾は９本あるからまだ余裕あるし、２人もモフモフさせてあげるね♪」"

[[dialogue]]
speaker = "ヨミ"
# 「ええっ！？　そんなこと言ってませ──ひゃあっ！？」
line = "「ええっ！？　そんなこと言ってませ──ひゃあっ！？」"

[[dialogue]]
speaker = "せつな"
# 「ちょ、ちょっと待つでござ──あぁ～っ！？」
line = "「ちょ、ちょっと待つでござ──あぁ～っ！？」"

[[dialogue]]
speaker = "美鶴"
# 「ヨミー、せつな、いるー？」
line = "「ヨミー、せつな、いるー？」"

[[dialogue]]
speaker = "美鶴"
# 「──って、何？　あの毛の塊」
line = "「──って、何？　あの毛の塊」"

[[dialogue]]
speaker = "unk"
# モフモフに癒される～……
line = "モフモフに癒される～……"

[[dialogue]]
speaker = "せつな"
# 「ふわふわでござる～……」
line = "「ふわふわでござる～……」"

[[dialogue]]
speaker = "ヨミ"
# 「ダメになっちゃいます～……」
line = "「ダメになっちゃいます～……」"

[[dialogue]]
speaker = "煌嶺"
# 「あなたもこっち来る？　モフモフさせてあげるよ？」
line = "「あなたもこっち来る？　モフモフさせてあげるよ？」"

[[dialogue]]
speaker = "美鶴"
# 「いや、ダメになりたくないんで遠慮しときます」
line = "「いや、ダメになりたくないんで遠慮しときます」"

[[dialogue]]
speaker = "美鶴"
# 「やれやれ……３人して何やってんだか」
line = "「やれやれ……３人して何やってんだか」"
