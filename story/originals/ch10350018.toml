# 「会長様はその……私として、気持ちよかったですの？」
line = "「会長様はその……私として、気持ちよかったですの？」"

[[dialogue]]
speaker = "セナリィ"
# 「ん……っ<emoji=heart04>　そ、そこで褒めながら、頭撫でるのは反則ですわ<emoji=heart04>　わ、私、変な気持ちになってしまいます……」
line = "「ん……っ<emoji=heart04>　そ、そこで褒めながら、頭撫でるのは反則ですわ<emoji=heart04>　わ、私、変な気持ちになってしまいます……」"

[[dialogue]]
speaker = "セナリィ"
# 「変な気持ちというのは、つまり……私らしくないということですわ。私、形のないものは信じない主義ですのに……」
line = "「変な気持ちというのは、つまり……私らしくないということですわ。私、形のないものは信じない主義ですのに……」"

[[dialogue]]
speaker = "セナリィ"
# 「い、今だけは契約のことなんて忘れて、会長様と……単純な恋人になりたいとか、ちょっとだけ……」
line = "「い、今だけは契約のことなんて忘れて、会長様と……単純な恋人になりたいとか、ちょっとだけ……」"

[[dialogue]]
speaker = "セナリィ"
# 「って、わ、笑わないで下さいな！　自分でもわかってますから！」
line = "「って、わ、笑わないで下さいな！　自分でもわかってますから！」"

[[dialogue]]
speaker = "セナリィ"
# 「……え？　そもそも単純な恋人でしかない？　それってどういう……」
line = "「……え？　そもそも単純な恋人でしかない？　それってどういう……」"

[[dialogue]]
speaker = "クロト"
# 「――俺は、小難しいこと抜きにして、セナリィのこと……好きだよ。セナリィはどう？」
line = "「――俺は、小難しいこと抜きにして、セナリィのこと……好きだよ。セナリィはどう？」"

[[dialogue]]
speaker = "セナリィ"
# 「っ……そ、それは……」
line = "「っ……そ、それは……」"

[[dialogue]]
speaker = "セナリィ"
# 「嫌でしたら……恋愛パートナーの契約なんて、持ちかけておりませんわ……た、単純に言うなら……」
line = "「嫌でしたら……恋愛パートナーの契約なんて、持ちかけておりませんわ……た、単純に言うなら……」"

[[dialogue]]
speaker = "セナリィ"
# 「私も会長様のこと……好きですわ……」
line = "「私も会長様のこと……好きですわ……」"

[[dialogue]]
speaker = "セナリィ"
# 「あんっ<emoji=heart04>　か、会長様、おち○ちんが、おま○こに当たって……！」
line = "「あんっ<emoji=heart04>　か、会長様、おち○ちんが、おま○こに当たって……！」"

[[dialogue]]
speaker = "セナリィ"
# 「――おま○こで、今度は本番をしたい？　ふあぁっ<emoji=heart04>　おち○ちん、あんなに射精したばかりなのに、もう大きく……<emoji=heart04>」
line = "「――おま○こで、今度は本番をしたい？　ふあぁっ<emoji=heart04>　おち○ちん、あんなに射精したばかりなのに、もう大きく……<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
# 「そ、そんなおねだりしながら、先っぽ押しつけちゃダメですわ<emoji=heart04>　おま○こもイキまくって、トロトロにほぐれちゃってるんですから<emoji=heart04>」
line = "「そ、そんなおねだりしながら、先っぽ押しつけちゃダメですわ<emoji=heart04>　おま○こもイキまくって、トロトロにほぐれちゃってるんですから<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
# 「い、嫌かどうか聞くなんて、ずるいですわよ<emoji=heart04>　あんな気持ちいいの知ってしまった後で、そんなおねだりの仕方されたら……<emoji=heart04>」
line = "「い、嫌かどうか聞くなんて、ずるいですわよ<emoji=heart04>　あんな気持ちいいの知ってしまった後で、そんなおねだりの仕方されたら……<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
# 「こ、断れるわけありませんわ……あっ――<emoji=heart04>」
line = "「こ、断れるわけありませんわ……あっ――<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
# 「ふあぁぁっ……<emoji=heart04>　会長様ぁ<emoji=heart04>　あぁぁんっ……<emoji=heart04>」
line = "「ふあぁぁっ……<emoji=heart04>　会長様ぁ<emoji=heart04>　あぁぁんっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# その後、俺たちは余計なことを考えられなくなるくらい、夢中で甘い快楽を貪り合うのだった。
line = "その後、俺たちは余計なことを考えられなくなるくらい、夢中で甘い快楽を貪り合うのだった。"
