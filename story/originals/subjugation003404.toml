[[dialogue]]
speaker = "黒ベア子"
# 「やっと帰ってきたくま！　まったく待たせすぎくま！」
line = "「やっと帰ってきたくま！　まったく待たせすぎくま！」"

[[dialogue]]
speaker = "unk"
# でも案内人は見つかったから
line = "でも案内人は見つかったから"

[[dialogue]]
speaker = "unk"
# ごめんね
line = "ごめんね"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「案内人……？」
line = "「案内人……？」"

[[dialogue]]
speaker = "フィオナ"
# 「ごめんなさい、その辺りの説明をまだしていませんでしたね」
line = "「ごめんなさい、その辺りの説明をまだしていませんでしたね」"

[[dialogue]]
speaker = "unk"
# 俺たちはノルトハウゼンさんにも、これまでの経緯を説明する。
line = "俺たちはノルトハウゼンさんにも、これまでの経緯を説明する。"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「……つまり、この赤ちゃんクマロボさんの父親が車掌さまかもしれない、ということですか？」
line = "「……つまり、この赤ちゃんクマロボさんの父親が車掌さまかもしれない、ということですか？」"

[[dialogue]]
speaker = "黒ベア子"
# 「そういうことくま！」
line = "「そういうことくま！」"

[[dialogue]]
speaker = "マハムート"
# 「その案内人としてあなたは呼び出されたのだけれど、ここではなく少し離れた場所に召喚されてしまった、というわけね」
line = "「その案内人としてあなたは呼び出されたのだけれど、ここではなく少し離れた場所に召喚されてしまった、というわけね」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「事情は理解しました」
line = "「事情は理解しました」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「わたくし、この子の力になりたいですわ！　一刻も早く、お父さまを見つけてあげませんと！」
line = "「わたくし、この子の力になりたいですわ！　一刻も早く、お父さまを見つけてあげませんと！」"

[[dialogue]]
speaker = "フィオナ"
# （すごい、疑うパートがなかった……）
line = "（すごい、疑うパートがなかった……）"

[[dialogue]]
speaker = "マハムート"
# （あっさり信じたわね……）
line = "（あっさり信じたわね……）"

[[dialogue]]
speaker = "ルルゥ"
# （とっても純粋なヒト、なの……）
line = "（とっても純粋なヒト、なの……）"

[[dialogue]]
speaker = "マハムート"
# 「ところで……ずっと気になっていたのだけれど、あなたはどうして新星学園の制服を着ているのかしら？」
line = "「ところで……ずっと気になっていたのだけれど、あなたはどうして新星学園の制服を着ているのかしら？」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「あら……いけませんわ、わたくしリーリアさんに制服をお借りしたんですの。それをそのまま着てきてしまいました」
line = "「あら……いけませんわ、わたくしリーリアさんに制服をお借りしたんですの。それをそのまま着てきてしまいました」"

[[dialogue]]
speaker = "unk"
# リーリアの制服なんですか、それ？
line = "リーリアの制服なんですか、それ？"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「はい、なんでも潜入用に用意していた、予備の制服だとか」
line = "「はい、なんでも潜入用に用意していた、予備の制服だとか」"

[[dialogue]]
speaker = "マハムート"
# 「予備なら大丈夫よ、記念にもらっておきなさい。けれど……あの子の制服だと、胸の辺りがサイズ的に厳しくないかしら？」
line = "「予備なら大丈夫よ、記念にもらっておきなさい。けれど……あの子の制服だと、胸の辺りがサイズ的に厳しくないかしら？」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「いえ、そんなことはありませんよ。むしろ丁度いいですわ」
line = "「いえ、そんなことはありませんよ。むしろ丁度いいですわ」"

[[dialogue]]
speaker = "マハムート"
# 「そうかしら？　おかしいわね……」
line = "「そうかしら？　おかしいわね……」"

[[dialogue]]
speaker = "フィオナ"
# 「あの、マム……それ以上はやめてあげてください……」
line = "「あの、マム……それ以上はやめてあげてください……」"

[[dialogue]]
speaker = "unk"
# 友達以外にはバレてないつもりなんです
line = "友達以外にはバレてないつもりなんです"

[[dialogue]]
speaker = "unk"
# リーリアの胸パッド……
line = "リーリアの胸パッド……"

[[dialogue]]
speaker = "マハムート"
# 「そのわりにはあの子、この私に豊胸パッドをオススメしてきたわよ……？」
line = "「そのわりにはあの子、この私に豊胸パッドをオススメしてきたわよ……？」"

[[dialogue]]
speaker = "unk"
# あの後輩、無敵か？　もしマムが胸のサイズを気にしていたら、今頃命は無かったぞ……
line = "あの後輩、無敵か？　もしマムが胸のサイズを気にしていたら、今頃命は無かったぞ……"

[[dialogue]]
speaker = "マハムート"
# 「まあ、そんなことはどうでもいいわ。それで、どうしてあなたがリーリアの制服を？」
line = "「まあ、そんなことはどうでもいいわ。それで、どうしてあなたがリーリアの制服を？」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「わたくしがハルツの魔法使いだと名乗ると、実際に魔法を見せて欲しいといわれまして」
line = "「わたくしがハルツの魔法使いだと名乗ると、実際に魔法を見せて欲しいといわれまして」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「『虹を見たい』というリクエストを頂いたので、それに応えようとしたのですが、失敗してずぶ濡れになってしまいましたわ」
line = "「『虹を見たい』というリクエストを頂いたので、それに応えようとしたのですが、失敗してずぶ濡れになってしまいましたわ」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「花火が上手くいったものですから、もしかしたら、と思ったのですが……世の中そう上手くはいかないものですね」
line = "「花火が上手くいったものですから、もしかしたら、と思ったのですが……世の中そう上手くはいかないものですね」"

[[dialogue]]
speaker = "マハムート"
# 「制服についてはわかったわ……もうひとついいかしら？」
line = "「制服についてはわかったわ……もうひとついいかしら？」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「はい、なんでしょう？」
line = "「はい、なんでしょう？」"

[[dialogue]]
speaker = "マハムート"
# 「次に向かう世界はイリスクラウド、ということね。そこはどういう場所なのかしら？」
line = "「次に向かう世界はイリスクラウド、ということね。そこはどういう場所なのかしら？」"

[[dialogue]]
speaker = "ルルゥ"
# 「そ、そうなの……それは知っておいた方がいいことだと思う、なの……」
line = "「そ、そうなの……それは知っておいた方がいいことだと思う、なの……」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「イリスクラウドは『アイゼングラート』『セントイリス』『ヴェルフォレット』『フレイマリン』『ニシキ』の五ヵ国から成る大陸ですの」
line = "「イリスクラウドは『アイゼングラート』『セントイリス』『ヴェルフォレット』『フレイマリン』『ニシキ』の五ヵ国から成る大陸ですの」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「各国は共同で開発された『ミストトレイン』によって行き来されますわ」
line = "「各国は共同で開発された『ミストトレイン』によって行き来されますわ」"

[[dialogue]]
speaker = "フィオナ"
# 「『霧』はどうなったのでしょうか……？」
line = "「『霧』はどうなったのでしょうか……？」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「『<ruby=げんむ>幻霧</ruby>』のことをご存知ですのね？　<ruby=げんむ>幻霧</ruby>は……変わらず大陸全土を覆っています」
line = "「『<ruby>幻霧<rt>げんむ</rt></ruby>』のことをご存知ですのね？　<ruby>幻霧<rt>げんむ</rt></ruby>は……変わらず大陸全土を覆っています」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「わたくしもプトラさんと同じく特鉄隊に所属していますから、幻霧から生まれるミストモンスターと今も戦っていますわ」
line = "「わたくしもプトラさんと同じく特鉄隊に所属していますから、幻霧から生まれるミストモンスターと今も戦っていますわ」"

[[dialogue]]
speaker = "ルルゥ"
# 「次はそんな大変な世界に行く、なの……？」
line = "「次はそんな大変な世界に行く、なの……？」"

[[dialogue]]
speaker = "黒ベア子"
# 「パパを見つけるためなら、どんな危険な世界でも行くしかないくま！」
line = "「パパを見つけるためなら、どんな危険な世界でも行くしかないくま！」"

[[dialogue]]
speaker = "赤ちゃんクマロボ"
# 「ばぶー<emoji=heart04>」
line = "「ばぶー<emoji=heart04>」"

[[dialogue]]
speaker = "黒ベア子"
# 「ではそろそろ出発するくま！」
line = "「ではそろそろ出発するくま！」"

[[dialogue]]
speaker = "フィオナ"
# 「待ってください！」
line = "「待ってください！」"

[[dialogue]]
speaker = "黒ベア子"
# 「ん？　どうしたくま？」
line = "「ん？　どうしたくま？」"

[[dialogue]]
speaker = "フィオナ"
# 「私も……一緒に連れて行ってもらえませんか？」
line = "「私も……一緒に連れて行ってもらえませんか？」"

[[dialogue]]
speaker = "unk"
# フィオナ……？
line = "フィオナ……？"

[[dialogue]]
speaker = "フィオナ"
# 「緋宮会長、少しの間、流星市国の留守をお願いできないでしょうか？　私も、この子の父親を見つけてあげたいんです」
line = "「緋宮会長、少しの間、流星市国の留守をお願いできないでしょうか？　私も、この子の父親を見つけてあげたいんです」"

[[dialogue]]
speaker = "unk"
# 気持ちはわかるけど……
line = "気持ちはわかるけど……"

[[dialogue]]
speaker = "マハムート"
# 「手伝うのはいいわ。けれど、私の時のようにちゃんと元の世界に戻してもらえるのよね？」
line = "「手伝うのはいいわ。けれど、私の時のようにちゃんと元の世界に戻してもらえるのよね？」"

[[dialogue]]
speaker = "黒ベア子"
# 「それは大丈夫くま。用件が終わったら、ちゃんと送り返すくま！」
line = "「それは大丈夫くま。用件が終わったら、ちゃんと送り返すくま！」"

[[dialogue]]
speaker = "マハムート"
# 「そう、ならいいわ。後は任せたわよ、フィオナ」
line = "「そう、ならいいわ。後は任せたわよ、フィオナ」"

[[dialogue]]
speaker = "フィオナ"
# 「はい、お任せください！」
line = "「はい、お任せください！」"

[[dialogue]]
speaker = "ルルゥ"
# 「あ、あの！　ルルゥもそろそろ、ゲシュペンス島に帰りたい、なの」
line = "「あ、あの！　ルルゥもそろそろ、ゲシュペンス島に帰りたい、なの」"

[[dialogue]]
speaker = "マハムート"
# 「そうね、その方がいいわ。あなたのご主人様もきっと心配しているでしょうし」
line = "「そうね、その方がいいわ。あなたのご主人様もきっと心配しているでしょうし」"

[[dialogue]]
speaker = "ルルゥ"
# 「えへへっ……そうかもなの」
line = "「えへへっ……そうかもなの」"

[[dialogue]]
speaker = "黒ベア子"
# 「ちゃんと帰すくま！　だけど、赤ちゃんの父親探しは一刻を争うくま！！」
line = "「ちゃんと帰すくま！　だけど、赤ちゃんの父親探しは一刻を争うくま！！」"

[[dialogue]]
speaker = "マハムート"
# 「本当にそうだったかしら……？」
line = "「本当にそうだったかしら……？」"

[[dialogue]]
speaker = "黒ベア子"
# 「まずはこの子のパパを見つけてあげて、それからみんなを元の世界に帰すくま！　くまは約束を破らないくま！！」
line = "「まずはこの子のパパを見つけてあげて、それからみんなを元の世界に帰すくま！　くまは約束を破らないくま！！」"

[[dialogue]]
speaker = "ルルゥ"
# 「あ、あの……ちゃんと帰してもらえるなら、ルルゥは急がない、なのっ」
line = "「あ、あの……ちゃんと帰してもらえるなら、ルルゥは急がない、なのっ」"

[[dialogue]]
speaker = "マハムート"
# 「まあ、あなたがそう言うのなら、構わないけれど」
line = "「まあ、あなたがそう言うのなら、構わないけれど」"

[[dialogue]]
speaker = "ベア子"
# 「それじゃあ、イリスクラウドに向かうのはあたしと黒ベア子、ノルトハウゼンさんにフィオナさんくまね？」
line = "「それじゃあ、イリスクラウドに向かうのはあたしと黒ベア子、ノルトハウゼンさんにフィオナさんくまね？」"

[[dialogue]]
speaker = "黒ベア子"
# 「次の世界へ、レッツゴーくまーっ♪」
line = "「次の世界へ、レッツゴーくまーっ♪」"

[[dialogue]]
speaker = "unk"
# 黒ベア子の元気な声と共に、またしてもあの黒い穴が宙に浮かび上がる。
line = "黒ベア子の元気な声と共に、またしてもあの黒い穴が宙に浮かび上がる。"

[[dialogue]]
speaker = "unk"
# その中に、４人の姿が消えていく。
line = "その中に、４人の姿が消えていく。"

[[dialogue]]
speaker = "unk"
# 果たして赤ちゃんクマロボの父親なる存在は見つかるのか──
line = "果たして赤ちゃんクマロボの父親なる存在は見つかるのか──"

[[dialogue]]
speaker = "unk"
# 可能性は薄そうだな、などと思いつつも、俺たちはその背中を見送ったのだった。
line = "可能性は薄そうだな、などと思いつつも、俺たちはその背中を見送ったのだった。"
