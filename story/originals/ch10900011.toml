[[dialogue]]
speaker = "unk"
# 第１話,魔王の妹,P
line = "第１話,魔王の妹,P"

[[dialogue]]
speaker = "unk"
# ある日の昼休み、昼食をしにカフェテリアへ来ていると、声をかけられた。
line = "ある日の昼休み、昼食をしにカフェテリアへ来ていると、声をかけられた。"

[[dialogue]]
speaker = "メイプル"
# 「あっ、いたいた！　お兄ちゃ～ん♪」
line = "「あっ、いたいた！　お兄ちゃ～ん♪」"

[[dialogue]]
speaker = "メイプル"
# 「今日は１人？　あたしも一緒に食べていい？」
line = "「今日は１人？　あたしも一緒に食べていい？」"

[[dialogue]]
speaker = "メイプル"
# 「――にへへ♪　ありがとう♪　実はあたし、お兄ちゃんのこと探してたんだ～。あのね、ついにあたし、新星学園への転入日が決まったの！」
line = "「――にへへ♪　ありがとう♪　実はあたし、お兄ちゃんのこと探してたんだ～。あのね、ついにあたし、新星学園への転入日が決まったの！」"

[[dialogue]]
speaker = "ルルカ"
# 「あれ？　お兄ちゃん！」
line = "「あれ？　お兄ちゃん！」"

[[dialogue]]
speaker = "メイプル"
# 「――それで、お兄ちゃんに直接会って報告したくて！」
line = "「――それで、お兄ちゃんに直接会って報告したくて！」"

[[dialogue]]
speaker = "ルルカ"
# 「え？」
line = "「え？」"

[[dialogue]]
speaker = "メイプル"
# 「ん？」
line = "「ん？」"

[[dialogue]]
speaker = "２人"
# 「誰……？」
line = "「誰……？」"

[[dialogue]]
speaker = "unk"
# 出会ってしまったか……
line = "出会ってしまったか……"

[[dialogue]]
speaker = "unk"
# 俺はルルカに、メイプルと知り合った経緯について説明した。
line = "俺はルルカに、メイプルと知り合った経緯について説明した。"

[[dialogue]]
speaker = "ルルカ"
# 「――なるほど。つい最近、魔界から家出してきた子で、トワちゃん先生に拾われて、居候することになったと……」
line = "「――なるほど。つい最近、魔界から家出してきた子で、トワちゃん先生に拾われて、居候することになったと……」"

[[dialogue]]
speaker = "ルルカ"
# 「何となく事情はわかったよ。つまりは――」
line = "「何となく事情はわかったよ。つまりは――」"

[[dialogue]]
speaker = "ルルカ"
# 「あたしの知らない間に、新しい妹ができていたってことだね……！？」
line = "「あたしの知らない間に、新しい妹ができていたってことだね……！？」"

[[dialogue]]
speaker = "unk"
# 浮気したみたいな言い方はやめて！
line = "浮気したみたいな言い方はやめて！"

[[dialogue]]
speaker = "メイプル"
# 「ふっふっふ……まさか、我以外にも、お兄ちゃんのことをお兄ちゃんと呼ぶ者が存在していたとは……！　つまりこれは、『妹ライバル』ということ！」
line = "「ふっふっふ……まさか、我以外にも、お兄ちゃんのことをお兄ちゃんと呼ぶ者が存在していたとは……！　つまりこれは、『妹ライバル』ということ！」"

[[dialogue]]
speaker = "メイプル"
# 「ならば、改めて名乗らせてもらおう！　我が名は『メイプル・モノクラウン』！」
line = "「ならば、改めて名乗らせてもらおう！　我が名は『メイプル・モノクラウン』！」"

[[dialogue]]
speaker = "メイプル"
# 「魔界の<ruby=たいはい>頽廃</ruby>都市『キュリオス』にて、王家を代々守護してきた『モノクラウン家』が娘！」
line = "「魔界の<ruby>頽廃<rt>たいはい</rt></ruby>都市『キュリオス』にて、王家を代々守護してきた『モノクラウン家』が娘！」"

[[dialogue]]
speaker = "メイプル"
# 「しかしてその正体は、３０００年前、魔王の片腕として、共にリクリエから世界を救った『クルセイダース』の末裔！」
line = "「しかしてその正体は、３０００年前、魔王の片腕として、共にリクリエから世界を救った『クルセイダース』の末裔！」"

[[dialogue]]
speaker = "メイプル"
# 「そして、現世の新たなる魔王にして、新星学園星徒会長であるお兄ちゃんと魂の契りを結んだ――『魔王の妹』である！」
line = "「そして、現世の新たなる魔王にして、新星学園星徒会長であるお兄ちゃんと魂の契りを結んだ――『魔王の妹』である！」"

[[dialogue]]
speaker = "ルルカ"
# 「ちょっと待って、情報が多くて頭が追いつかないけど……とりあえず、その眼帯はなんなの！？　なんか急に口調も変わってるし！」
line = "「ちょっと待って、情報が多くて頭が追いつかないけど……とりあえず、その眼帯はなんなの！？　なんか急に口調も変わってるし！」"

[[dialogue]]
speaker = "メイプル"
# 「これは我の中に眠る魔王の力を呼び起こす闇のアイテム！　装備することで、『魔王モード』に切り替わるのだ！」
line = "「これは我の中に眠る魔王の力を呼び起こす闇のアイテム！　装備することで、『魔王モード』に切り替わるのだ！」"

[[dialogue]]
speaker = "ルルカ"
# 「えっと……つまりは、Ｖチューバ―のキャラ付けみたいな……？　思春期こじらせ系の妹キャラってこと……？」
line = "「えっと……つまりは、Ｖチューバ―のキャラ付けみたいな……？　思春期こじらせ系の妹キャラってこと……？」"

[[dialogue]]
speaker = "メイプル"
# 「ぶいちゅーばー……？　それはよくわからないけど、我はお兄ちゃんと共にいずれ必ず、新たな魔王として世界に名を刻んでみせる！」
line = "「ぶいちゅーばー……？　それはよくわからないけど、我はお兄ちゃんと共にいずれ必ず、新たな魔王として世界に名を刻んでみせる！」"

[[dialogue]]
speaker = "メイプル"
# 「今はただの自称であっても……『魔王の妹』と名乗る気持ちに、一片の曇りもない！」
line = "「今はただの自称であっても……『魔王の妹』と名乗る気持ちに、一片の曇りもない！」"

[[dialogue]]
speaker = "ルルカ"
# 「う……！　なんて真っ直ぐな瞳……！」
line = "「う……！　なんて真っ直ぐな瞳……！」"

[[dialogue]]
speaker = "メイプル"
# 「ふっ……どうやら我の本気は伝わったようだな。さあ、次はそなたが名乗る番だ！」
line = "「ふっ……どうやら我の本気は伝わったようだな。さあ、次はそなたが名乗る番だ！」"

[[dialogue]]
speaker = "ルルカ"
# 「あ、あたしは……海野辺ルルカ！　新星学園の１年生で、お兄ちゃんとの関係は……！　えっと……星徒会所属の友達を通して知り合った……先輩後輩……って感じかな」
line = "「あ、あたしは……海野辺ルルカ！　新星学園の１年生で、お兄ちゃんとの関係は……！　えっと……星徒会所属の友達を通して知り合った……先輩後輩……って感じかな」"

[[dialogue]]
speaker = "ルルカ"
# （い、言いたいけど、言えない……！　本当は、お兄ちゃんにＶチューバ―活動しているのがバレて、それ以来色々と相談に乗ってもらっているだなんて……！）
line = "（い、言いたいけど、言えない……！　本当は、お兄ちゃんにＶチューバ―活動しているのがバレて、それ以来色々と相談に乗ってもらっているだなんて……！）"

[[dialogue]]
speaker = "メイプル"
# 「…………それだけか？　お兄ちゃんと呼ぶようになった理由は？」
line = "「…………それだけか？　お兄ちゃんと呼ぶようになった理由は？」"

[[dialogue]]
speaker = "ルルカ"
# 「え？　いや、それはつい癖で……」
line = "「え？　いや、それはつい癖で……」"

[[dialogue]]
speaker = "メイプル"
# 「癖？」
line = "「癖？」"

[[dialogue]]
speaker = "ルルカ"
# 「年上の人を、つい『お兄ちゃん』、『お姉ちゃん』と呼んじゃうというか……」
line = "「年上の人を、つい『お兄ちゃん』、『お姉ちゃん』と呼んじゃうというか……」"

[[dialogue]]
speaker = "ルルカ"
# （配信している時のリスナーさんを、普段そういう風に呼んでいるからなんだけども……！）
line = "（配信している時のリスナーさんを、普段そういう風に呼んでいるからなんだけども……！）"

[[dialogue]]
speaker = "メイプル"
# 「ん～、なんか……隠してないか？」
line = "「ん～、なんか……隠してないか？」"

[[dialogue]]
speaker = "ルルカ"
# 「へ！？　な、なんでそう思うの……！？」
line = "「へ！？　な、なんでそう思うの……！？」"

[[dialogue]]
speaker = "メイプル"
# 「我はそなたから、確かに『妹』としてのライバル意識を感じた。にも関わらず、今の自己紹介からは気迫が感じられない」
line = "「我はそなたから、確かに『妹』としてのライバル意識を感じた。にも関わらず、今の自己紹介からは気迫が感じられない」"

[[dialogue]]
speaker = "メイプル"
# 「つまり……お兄ちゃんとの絆に自信がありながらも、何か言えない秘密があるのではないか……！？」
line = "「つまり……お兄ちゃんとの絆に自信がありながらも、何か言えない秘密があるのではないか……！？」"

[[dialogue]]
speaker = "ルルカ"
# 「ぐっ……！？」
line = "「ぐっ……！？」"

[[dialogue]]
speaker = "ルルカ"
# （み、見抜かれてる～～～っ！　いや、でも言えないし！）
line = "（み、見抜かれてる～～～っ！　いや、でも言えないし！）"

[[dialogue]]
speaker = "アナ"
# 「おや？　ルルカさん。それに、メイプルさんではありませんか。もしかしなくても、ついに出会ってしまった感じですか」
line = "「おや？　ルルカさん。それに、メイプルさんではありませんか。もしかしなくても、ついに出会ってしまった感じですか」"

[[dialogue]]
speaker = "メイプル"
# 「アナか。ふふふ……その通り！　今は互いにライバルとして、名を名乗っていたところだ！」
line = "「アナか。ふふふ……その通り！　今は互いにライバルとして、名を名乗っていたところだ！」"

[[dialogue]]
speaker = "アナ"
# 「そういえば、ＤＩＳＣのチャット見ましたよ。転入日が明日って決まったんですよね。おめでとうございます。そして、ウェルカムです」
line = "「そういえば、ＤＩＳＣのチャット見ましたよ。転入日が明日って決まったんですよね。おめでとうございます。そして、ウェルカムです」"

[[dialogue]]
speaker = "アナ"
# 「クラスメイトとして、これからよろしくお願いします」
line = "「クラスメイトとして、これからよろしくお願いします」"

[[dialogue]]
speaker = "ルルカ"
# 「へ？　クラスメイト？」
line = "「へ？　クラスメイト？」"

[[dialogue]]
speaker = "アナ"
# 「あれ？　そこまで自己紹介で言ってなかった感じですか？　メイプルさんは私たちと同じ１年生で――」
line = "「あれ？　そこまで自己紹介で言ってなかった感じですか？　メイプルさんは私たちと同じ１年生で――」"

[[dialogue]]
speaker = "アナ"
# 「私たちと同じクラスに転入するんですよ」
line = "「私たちと同じクラスに転入するんですよ」"

[[dialogue]]
speaker = "メイプル"
# 「なんと！？　アナとルルカは同じクラスだったのか！」
line = "「なんと！？　アナとルルカは同じクラスだったのか！」"

[[dialogue]]
speaker = "ルルカ"
# 「えぇ～～～っ！？」
line = "「えぇ～～～っ！？」"

[[dialogue]]
speaker = "unk"
# ２人は顔を見合わせて、驚きの声を上げるのだった――
line = "２人は顔を見合わせて、驚きの声を上げるのだった――"
