[[dialogue]]
speaker = "unk"
# 私──愛戸レミカが、初めてアイドルのライブを見たのは、物心がついてすぐの頃だった。
line = "私──愛戸レミカが、初めてアイドルのライブを見たのは、物心がついてすぐの頃だった。"

[[dialogue]]
speaker = "unk"
# 『流星スターピース』。当時、大ブレイクしていた２人組のアイドルユニット。
line = "『流星スターピース』。当時、大ブレイクしていた２人組のアイドルユニット。"

[[dialogue]]
speaker = "unk"
# 会社経営をしている父は、アイドルをプロデュースする芸能事務所とも多くの繋がりがあって。そのツテでライブに招待されたのだった。
line = "会社経営をしている父は、アイドルをプロデュースする芸能事務所とも多くの繋がりがあって。そのツテでライブに招待されたのだった。"

[[dialogue]]
speaker = "レミカ"
# 「わぁあぁあっ……！」
line = "「わぁあぁあっ……！」"

[[dialogue]]
speaker = "unk"
# 幼かった私は一目見て虜になってしまった。
line = "幼かった私は一目見て虜になってしまった。"

[[dialogue]]
speaker = "unk"
# ライブ会場全体を埋め尽くすサイリウム。歌って踊って、笑顔を振りまく２人のアイドルのキラキラした姿……全てが眩しくて。
line = "ライブ会場全体を埋め尽くすサイリウム。歌って踊って、笑顔を振りまく２人のアイドルのキラキラした姿……全てが眩しくて。"

[[dialogue]]
speaker = "レミカ"
# 「あっ……ちかくに、くる……？」
line = "「あっ……ちかくに、くる……？」"

[[dialogue]]
speaker = "unk"
# 最前列で見上げていた私は、よほど目立っていたのだろうか。間奏の最中に流星スターピースの２人が近づいて、ウィンクと共にハイタッチをしてくれたのだ。
line = "最前列で見上げていた私は、よほど目立っていたのだろうか。間奏の最中に流星スターピースの２人が近づいて、ウィンクと共にハイタッチをしてくれたのだ。"

[[dialogue]]
speaker = "unk"
# その瞬間が始まりだったのだと思う。色とりどりの照明を背負い、フリルやリボンでいっぱいの可愛い衣装を着て、観客を虜にする太陽みたいな存在。
line = "その瞬間が始まりだったのだと思う。色とりどりの照明を背負い、フリルやリボンでいっぱいの可愛い衣装を着て、観客を虜にする太陽みたいな存在。"

[[dialogue]]
speaker = "レミカ"
# 「わたしも……あいどるになりたい！」
line = "「わたしも……あいどるになりたい！」"

[[dialogue]]
speaker = "unk"
# そう。流星スターピースの２人のような──『可愛い』を突き詰めた存在に……
line = "そう。流星スターピースの２人のような──『可愛い』を突き詰めた存在に……"

[[dialogue]]
speaker = "unk"
# とある日の夜──星徒会の業務で居残りをしていた俺は、学園のカフェを目指していた。
line = "とある日の夜──星徒会の業務で居残りをしていた俺は、学園のカフェを目指していた。"

[[dialogue]]
speaker = "unk"
# 今はちょうど新星学園が慌ただしい時期だし、母さんには夕食はいらないと伝えてある。席が空いているといいのだけど……！
line = "今はちょうど新星学園が慌ただしい時期だし、母さんには夕食はいらないと伝えてある。席が空いているといいのだけど……！"

[[dialogue]]
speaker = "unk"
# 夜なのに席が埋まってるな……
line = "夜なのに席が埋まってるな……"

[[dialogue]]
speaker = "unk"
# なんとか定食は買えたけど
line = "なんとか定食は買えたけど"

[[dialogue]]
speaker = "メルエル"
# 「あ、会長くん！　席を探してるなら、一緒にどうかな！」
line = "「あ、会長くん！　席を探してるなら、一緒にどうかな！」"

[[dialogue]]
speaker = "unk"
# メルエル！　助かるよ、ありがとう！
line = "メルエル！　助かるよ、ありがとう！"

[[dialogue]]
speaker = "メルエル"
# 「えへへ、お礼なんていいよ～。はいここ、座って座って！」
line = "「えへへ、お礼なんていいよ～。はいここ、座って座って！」"

[[dialogue]]
speaker = "unk"
# 彼女の名前は姫咲メルエル。見た目どおりの明るく可愛い天使の女の子だ。
line = "彼女の名前は姫咲メルエル。見た目どおりの明るく可愛い天使の女の子だ。"

[[dialogue]]
speaker = "unk"
# 俺とメルエルは、昔一緒に遊んでいた幼なじみらしいのだが……魔王として転生した影響か、俺は幼い頃の記憶が曖昧な時期がある。
line = "俺とメルエルは、昔一緒に遊んでいた幼なじみらしいのだが……魔王として転生した影響か、俺は幼い頃の記憶が曖昧な時期がある。"

[[dialogue]]
speaker = "unk"
# 昔のことを思い出せないのは申し訳なく、歯がゆいのだけど、メルエルはいつもフレンドリーに接してくれるのだった。
line = "昔のことを思い出せないのは申し訳なく、歯がゆいのだけど、メルエルはいつもフレンドリーに接してくれるのだった。"

[[dialogue]]
speaker = "メルエル"
# 「星徒会のお仕事、お疲れ様。私もボランティア部の用事で居残りしてて……ちょうどいいタイミングだったね♪」
line = "「星徒会のお仕事、お疲れ様。私もボランティア部の用事で居残りしてて……ちょうどいいタイミングだったね♪」"

[[dialogue]]
speaker = "メルエル"
# 「うん！　もうすぐ新星学園のオープンキャンパスだもん。どの部活動も、盛り上げようって張り切ってるみたい」
line = "「うん！　もうすぐ新星学園のオープンキャンパスだもん。どの部活動も、盛り上げようって張り切ってるみたい」"

[[dialogue]]
speaker = "unk"
# ここのところハードだよ
line = "ここのところハードだよ"

[[dialogue]]
speaker = "unk"
# にぎやかなのは嬉しいけど
line = "にぎやかなのは嬉しいけど"

[[dialogue]]
speaker = "メルエル"
# 「たしかにキミのお顔、お疲れモードって感じだねぇ。……ん？　私は疲れてる時、どんなことをするのかって？」
line = "「たしかにキミのお顔、お疲れモードって感じだねぇ。……ん？　私は疲れてる時、どんなことをするのかって？」"

[[dialogue]]
speaker = "メルエル"
# 「私は猫ちゃんと遊んだり、カラオケで歌ったり……あとはアイドルのライブとか見るよ！」
line = "「私は猫ちゃんと遊んだり、カラオケで歌ったり……あとはアイドルのライブとか見るよ！」"

[[dialogue]]
speaker = "メルエル"
# 「可愛い女の子の笑顔と歌。動画で見るだけでも元気がもらえるよね♪」
line = "「可愛い女の子の笑顔と歌。動画で見るだけでも元気がもらえるよね♪」"

[[dialogue]]
speaker = "メルエル"
# 「そうだ、アイドルと言えば──会長くんはこの動画見た？　レミカちゃんが、街頭インタビュー受けてるやつなんだけど……」
line = "「そうだ、アイドルと言えば──会長くんはこの動画見た？　レミカちゃんが、街頭インタビュー受けてるやつなんだけど……」"

[[dialogue]]
speaker = "インタビュアー"
# 『──本日はクールな眼差しで私たちを魅了するアイドル、愛戸レミカさんの学園帰りに密着しています！　さっそく色々聞いてみましょう！』
line = "『──本日はクールな眼差しで私たちを魅了するアイドル、愛戸レミカさんの学園帰りに密着しています！　さっそく色々聞いてみましょう！』"

[[dialogue]]
speaker = "レミカ"
# 『いつも応援してくださってありがとうございます。こちらこそよろしくお願いします』
line = "『いつも応援してくださってありがとうございます。こちらこそよろしくお願いします』"

[[dialogue]]
speaker = "unk"
# レミカは星騎士でありながら、大手芸能事務所『ポラリスプロダクション』に所属する現役のアイドルでもある。
line = "レミカは星騎士でありながら、大手芸能事務所『ポラリスプロダクション』に所属する現役のアイドルでもある。"

[[dialogue]]
speaker = "unk"
# 天性の歌唱センスとそのクールな印象から、アイドルというよりもアーティスティックなシンガーとして絶大な人気を得ている存在だ。
line = "天性の歌唱センスとそのクールな印象から、アイドルというよりもアーティスティックなシンガーとして絶大な人気を得ている存在だ。"

[[dialogue]]
speaker = "レミカ"
# 『──そうですね。曲を考える時はこうやって街を歩くことが多いです。やっぱり体を動かした方がインスピレーションが湧くので』
line = "『──そうですね。曲を考える時はこうやって街を歩くことが多いです。やっぱり体を動かした方がインスピレーションが湧くので』"

[[dialogue]]
speaker = "レミカ"
# 『星騎士とアイドルの両立は確かに大変ですけど、楽しいから苦じゃないかな？　それに手を抜くのって苦手で』
line = "『星騎士とアイドルの両立は確かに大変ですけど、楽しいから苦じゃないかな？　それに手を抜くのって苦手で』"

[[dialogue]]
speaker = "レミカ"
# 『……今後の展開ですか？　ふふっ、それについては今はあんまり言えないんですけど。ちょっと面白いことを考えてます』
line = "『……今後の展開ですか？　ふふっ、それについては今はあんまり言えないんですけど。ちょっと面白いことを考えてます』"

[[dialogue]]
speaker = "レミカ"
# 『新鮮な私を見せられたらいいなって思ってますから。期待しててください』
line = "『新鮮な私を見せられたらいいなって思ってますから。期待しててください』"

[[dialogue]]
speaker = "メルエル"
# 「かっこいいなぁ～レミカちゃん。ワールドクラスのアイドルなのに、まだ新しいことにチャレンジしようとしてるなんて凄いよね」
line = "「かっこいいなぁ～レミカちゃん。ワールドクラスのアイドルなのに、まだ新しいことにチャレンジしようとしてるなんて凄いよね」"

[[dialogue]]
speaker = "メルエル"
# 「一緒にカラオケへ行って遊んだりするお友達が、世界的に有名なアイドルっていうの、何だかヘンな感じかも」
line = "「一緒にカラオケへ行って遊んだりするお友達が、世界的に有名なアイドルっていうの、何だかヘンな感じかも」"

[[dialogue]]
speaker = "unk"
# レミカにアイドル勧誘されてたよね
line = "レミカにアイドル勧誘されてたよね"

[[dialogue]]
speaker = "unk"
# そういえばメルエルって
line = "そういえばメルエルって"

[[dialogue]]
speaker = "メルエル"
# 「あはは……あったね、そんなことも。私の鼻歌と笑顔に才能を感じたー、なんて言われて……」
line = "「あはは……あったね、そんなことも。私の鼻歌と笑顔に才能を感じたー、なんて言われて……」"

[[dialogue]]
speaker = "メルエル"
# 「『ユニットを組んでみない？』って言われて困っちゃった。まあでも、あのことがきっかけでレミカちゃんとは仲良くなれたんだけど」
line = "「『ユニットを組んでみない？』って言われて困っちゃった。まあでも、あのことがきっかけでレミカちゃんとは仲良くなれたんだけど」"

[[dialogue]]
speaker = "メルエル"
# 「……ユニットを組みたがる理由？　えっとー……確かレミカちゃんって、元々は今の自分とは違う路線のアイドルが好きだったんだって」
line = "「……ユニットを組みたがる理由？　えっとー……確かレミカちゃんって、元々は今の自分とは違う路線のアイドルが好きだったんだって」"

[[dialogue]]
speaker = "メルエル"
# 「可愛さに全振りした感じの、いわゆる『アイドル！』って感じのやつ。しかも、その憧れだったアイドルもユニットだったらしくて」
line = "「可愛さに全振りした感じの、いわゆる『アイドル！』って感じのやつ。しかも、その憧れだったアイドルもユニットだったらしくて」"

[[dialogue]]
speaker = "unk"
# 動画で言ってた『新鮮な私』って……
line = "動画で言ってた『新鮮な私』って……"

[[dialogue]]
speaker = "メルエル"
# 「あ、そっか！　もしかしたらユニットを組んでくれる相棒が見つかったのかも！」
line = "「あ、そっか！　もしかしたらユニットを組んでくれる相棒が見つかったのかも！」"

[[dialogue]]
speaker = "メルエル"
# 「フリフリの可愛い衣装を着たレミカちゃん、見れちゃうのかなぁ。楽しみだな～♪」
line = "「フリフリの可愛い衣装を着たレミカちゃん、見れちゃうのかなぁ。楽しみだな～♪」"

[[dialogue]]
speaker = "unk"
# またメルエルが誘われたりして
line = "またメルエルが誘われたりして"

[[dialogue]]
speaker = "メルエル"
# 「あはは、まさか～。ちゃんとお断りしたし、レミカちゃんもとっくに、プロのアイドル友達を誘ってるんじゃないかな？」
line = "「あはは、まさか～。ちゃんとお断りしたし、レミカちゃんもとっくに、プロのアイドル友達を誘ってるんじゃないかな？」"

[[dialogue]]
speaker = "メルエル"
# 「うん。だから、ないない。私をまた誘ってくるだなんて、そんなことあるわけないってば～♪」
line = "「うん。だから、ないない。私をまた誘ってくるだなんて、そんなことあるわけないってば～♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「──時は満ちたわ！」
line = "「──時は満ちたわ！」"

[[dialogue]]
speaker = "レミカ"
# 「ありがとう、ヴィーナス。ヘレナさんに話を通してくれたおかげで、パーフェクトな衣装が完成しそうだよ」
line = "「ありがとう、ヴィーナス。ヘレナさんに話を通してくれたおかげで、パーフェクトな衣装が完成しそうだよ」"

[[dialogue]]
speaker = "レミカ"
# 「今さらだけど本当に衣装代、タダでいいの？　ちゃんと依頼料を払いたいんだけど」
line = "「今さらだけど本当に衣装代、タダでいいの？　ちゃんと依頼料を払いたいんだけど」"

[[dialogue]]
speaker = "ヴィーナス"
# 「いいのいいの。これは新フォームの起動テストも兼ねてるんだから。気にしないで！」
line = "「いいのいいの。これは新フォームの起動テストも兼ねてるんだから。気にしないで！」"

[[dialogue]]
speaker = "レミカ"
# 「──わかった。代わりに最高のパフォーマンス、見せるからね」
line = "「──わかった。代わりに最高のパフォーマンス、見せるからね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええ！　それじゃあ明日の放課後、いよいよ決行よ！　アイドルユニットを組むには、最後の１ピースが欠かせないんだから！」
line = "「ええ！　それじゃあ明日の放課後、いよいよ決行よ！　アイドルユニットを組むには、最後の１ピースが欠かせないんだから！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「待ってなさい！　メルエル～～～！」
line = "「待ってなさい！　メルエル～～～！」"
