[[dialogue]]
speaker = "unk"
# バトルウィーク最終日。
line = "バトルウィーク最終日。"

[[dialogue]]
speaker = "unk"
# <ruby=ラルーナ>新星寮</ruby>と<ruby=イルソーレ>流星寮</ruby>の寮生達は、早朝から各地にパトロールを開始。お互いにスコアを伸ばし合っていた。
line = "<ruby>新星寮<rt>ラルーナ</rt></ruby>と<ruby>流星寮<rt>イルソーレ</rt></ruby>の寮生達は、早朝から各地にパトロールを開始。お互いにスコアを伸ばし合っていた。"

[[dialogue]]
speaker = "unk"
# しかしそんな中で、学園の分析室から流星市国内にモンスター増加の傾向あり、との連絡が入る――
line = "しかしそんな中で、学園の分析室から流星市国内にモンスター増加の傾向あり、との連絡が入る――"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「おーっほっほっほっ！　ごきげんよう、妃竜院マハムート。そちらの調子はいかがかしら？」
line = "「おーっほっほっほっ！　ごきげんよう、妃竜院マハムート。そちらの調子はいかがかしら？」"

[[dialogue]]
speaker = "マハムート"
# 「とても順調よ。もうＳクラスモンスターを、３万体くらい狩ってきたもの」
line = "「とても順調よ。もうＳクラスモンスターを、３万体くらい狩ってきたもの」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「負け確ですわ……！？」
line = "「負け確ですわ……！？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「い、いいえ！　決して諦めませんことよ！　今からこちらも３万体狩り尽くせばいいだけのこと！」
line = "「い、いいえ！　決して諦めませんことよ！　今からこちらも３万体狩り尽くせばいいだけのこと！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「私が、その不可能を打ち砕いてみせますわ！」
line = "「私が、その不可能を打ち砕いてみせますわ！」"

[[dialogue]]
speaker = "マハムート"
# 「３万は嘘よ」
line = "「３万は嘘よ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ムッキィィィ――ッ！！！　どうしてそう下らない嘘をついて、私を騙そうとするんですの！？」
line = "「ムッキィィィ――ッ！！！　どうしてそう下らない嘘をついて、私を騙そうとするんですの！？」"

[[dialogue]]
speaker = "マハムート"
# 「Ｓクラス３万体なんて、そのまま人間界が滅んでるわよ。わざとあり得ない数字で冗談にしてるんだから、いちいちマジレスしないで頂戴」
line = "「Ｓクラス３万体なんて、そのまま人間界が滅んでるわよ。わざとあり得ない数字で冗談にしてるんだから、いちいちマジレスしないで頂戴」"

[[dialogue]]
speaker = "マハムート"
# 「……これ、自分のボケを解説させられてるみたいで、非常に腹立たしいわね？」
line = "「……これ、自分のボケを解説させられてるみたいで、非常に腹立たしいわね？」"

[[dialogue]]
speaker = "unk"
# マム、不機嫌な顔で俺を見ないでください
line = "マム、不機嫌な顔で俺を見ないでください"

[[dialogue]]
speaker = "フェニエル"
# 「お姉様っ。マムは『３万体倒せるくらい絶好調よ。今日はいい勝負をしましょうね』と言いたいんだと思います」
line = "「お姉様っ。マムは『３万体倒せるくらい絶好調よ。今日はいい勝負をしましょうね』と言いたいんだと思います」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「まあ、そういうこと……？」
line = "「まあ、そういうこと……？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ふふんっ。結果が出る前に己が全力、本調子であることを明かすなんて、意外と潔いですわね！」
line = "「ふふんっ。結果が出る前に己が全力、本調子であることを明かすなんて、意外と潔いですわね！」"

[[dialogue]]
speaker = "マハムート"
# 「この姉妹、名誉棄損で訴えてやろうかしら……」
line = "「この姉妹、名誉棄損で訴えてやろうかしら……」"

[[dialogue]]
speaker = "フェニエル"
# 「お姉様もこの１週間、マムと競い合えるってことで、とても気合いが入ってましたもんねっ」
line = "「お姉様もこの１週間、マムと競い合えるってことで、とても気合いが入ってましたもんねっ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「そ、そんなことはナイですワヨ……！？」
line = "「そ、そんなことはナイですワヨ……！？」"

[[dialogue]]
speaker = "unk"
# マムも燃えてたんじゃないですか？
line = "マムも燃えてたんじゃないですか？"

[[dialogue]]
speaker = "マハムート"
# 「……何を言ってるのかしら。竜はウサギを狩るにも全力を尽くすというだけよ」
line = "「……何を言ってるのかしら。竜はウサギを狩るにも全力を尽くすというだけよ」"

[[dialogue]]
speaker = "マハムート"
# 「ヒルディオーネが相手だろうと、会長をしごく時だろうと、私の調子には一切影響なんてないわ」
line = "「ヒルディオーネが相手だろうと、会長をしごく時だろうと、私の調子には一切影響なんてないわ」"

[[dialogue]]
speaker = "マハムート"
# 「そんなことより、あなたたちも分析室の連絡を受けて戻ってきたのでしょう？」
line = "「そんなことより、あなたたちも分析室の連絡を受けて戻ってきたのでしょう？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ええ。流星市国にモンスター増加の傾向あり、だとか」
line = "「ええ。流星市国にモンスター増加の傾向あり、だとか」"

[[dialogue]]
speaker = "フェニエル"
# 「ええっと……モンスターが増えてるってことは、どこかにその巣がある……ということでしょうか？」
line = "「ええっと……モンスターが増えてるってことは、どこかにその巣がある……ということでしょうか？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「その通りですわ！　過去の傾向から言って、この手の連絡はアステライトの出現、発見の前触れと考えられますの」
line = "「その通りですわ！　過去の傾向から言って、この手の連絡はアステライトの出現、発見の前触れと考えられますの」"

[[dialogue]]
speaker = "マハムート"
# 「どうやら……来たようね」
line = "「どうやら……来たようね」"

[[dialogue]]
speaker = "分析官"
# 『流星市国市街地に、新たなアステライトの出現を確認しました』
line = "『流星市国市街地に、新たなアステライトの出現を確認しました』"

[[dialogue]]
speaker = "分析官"
# 『出動中のプリマステラは至急現地に向かい、市民の安全を確保しつつ、モンスターの討伐を行ってください』
line = "『出動中のプリマステラは至急現地に向かい、市民の安全を確保しつつ、モンスターの討伐を行ってください』"

[[dialogue]]
speaker = "分析官"
# 『流星及び新星の両星徒会はアステライト攻略班を編成し、速やかに巣の破壊をお願いします。繰り返します――』
line = "『流星及び新星の両星徒会はアステライト攻略班を編成し、速やかに巣の破壊をお願いします。繰り返します――』"

[[dialogue]]
speaker = "マハムート"
# 「というわけで、本来の仕事の時間のようね、星徒会長」
line = "「というわけで、本来の仕事の時間のようね、星徒会長」"

[[dialogue]]
speaker = "unk"
# 星徒会室に戻ると初動が遅れる。だから――
line = "星徒会室に戻ると初動が遅れる。だから――"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ここにいるメンバーで攻略班を編成、ですわね！　緋宮会長の指示に従いますわ！　久しぶりのアステラ攻略、腕が鳴りますの」
line = "「ここにいるメンバーで攻略班を編成、ですわね！　緋宮会長の指示に従いますわ！　久しぶりのアステラ攻略、腕が鳴りますの」"

[[dialogue]]
speaker = "マハムート"
# 「妥当な判断ね。いつものメンバーを探し回るようなら、お説教ものだったわよ」
line = "「妥当な判断ね。いつものメンバーを探し回るようなら、お説教ものだったわよ」"

[[dialogue]]
speaker = "フェニエル"
# 「あ、あの……！」
line = "「あ、あの……！」"

[[dialogue]]
speaker = "フェニエル"
# 「わ、私も、アステラに連れて行って、もらえませんかっ……！」
line = "「わ、私も、アステラに連れて行って、もらえませんかっ……！」"

[[dialogue]]
speaker = "マハムート"
# 「フニを……？」
line = "「フニを……？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「私からも、お願いいたしますわ。緋宮会長」
line = "「私からも、お願いいたしますわ。緋宮会長」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「フェニエルはまだ入学したばかりで、単独出撃可能なプリマステラの資格すら持っていませんわ」
line = "「フェニエルはまだ入学したばかりで、単独出撃可能なプリマステラの資格すら持っていませんわ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ですが、この１週間見て来た私が保証しますわ。フニはプリマステラの中でも極めて強大な――」
line = "「ですが、この１週間見て来た私が保証しますわ。フニはプリマステラの中でも極めて強大な――」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「それこそ……次世代の寮長となれる程の、才能と可能性を秘めていますの！」
line = "「それこそ……次世代の寮長となれる程の、才能と可能性を秘めていますの！」"

[[dialogue]]
speaker = "フェニエル"
# 「お、お姉様……！」
line = "「お、お姉様……！」"

[[dialogue]]
speaker = "マハムート"
# 「ヒルディオーネ、まさかあなたがそこまで言うとはね……」
line = "「ヒルディオーネ、まさかあなたがそこまで言うとはね……」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ですから、フニがアステラのモンスターやボスと相まみえることは、きっと彼女の大きな糧となりますわ」
line = "「ですから、フニがアステラのモンスターやボスと相まみえることは、きっと彼女の大きな糧となりますわ」"

[[dialogue]]
speaker = "フェニエル"
# 「お、お願いします！　足は引っ張りませんっ。今はまだ、未熟な星騎士の雛でしかありませんが……」
line = "「お、お願いします！　足は引っ張りませんっ。今はまだ、未熟な星騎士の雛でしかありませんが……」"

[[dialogue]]
speaker = "フェニエル"
# 「私も、たった１人でみんなの命を背負った時に……マムに『戦ってこい』って言ってもらえる、一騎当千のエースになりたいんです！」
line = "「私も、たった１人でみんなの命を背負った時に……マムに『戦ってこい』って言ってもらえる、一騎当千のエースになりたいんです！」"

[[dialogue]]
speaker = "マハムート"
# 「……いいんじゃないかしら？」
line = "「……いいんじゃないかしら？」"

[[dialogue]]
speaker = "マハムート"
# 「見た目以上に根性があるってことはわかったわ。寮長が２人もいるチームなら、戦力だって申し分ないだろうし」
line = "「見た目以上に根性があるってことはわかったわ。寮長が２人もいるチームなら、戦力だって申し分ないだろうし」"

[[dialogue]]
speaker = "マハムート"
# 「あとは星徒会長である、あなたの決断次第よ」
line = "「あとは星徒会長である、あなたの決断次第よ」"

[[dialogue]]
speaker = "unk"
# よし、フニも一緒に行こう！
line = "よし、フニも一緒に行こう！"

[[dialogue]]
speaker = "フェニエル"
# 「あ、ありがとうございます……っ！」
line = "「あ、ありがとうございます……っ！」"

[[dialogue]]
speaker = "unk"
# そうして俺たちは、寮長の最強タッグと共に、アステライト攻略を開始するのだった――
line = "そうして俺たちは、寮長の最強タッグと共に、アステライト攻略を開始するのだった――"
