[[dialogue]]
speaker = "unk"
# 光が消え、イザベラだった赤ん坊をマリオンが受け止める。
line = "光が消え、イザベラだった赤ん坊をマリオンが受け止める。"

[[dialogue]]
speaker = "マリオン（覚醒）"
# （ああ、なんて小さいのでしょう……でも、こんなにも重い）
line = "（ああ、なんて小さいのでしょう……でも、こんなにも重い）"

[[dialogue]]
speaker = "unk"
# イザベラの罪も穢れもこの世にはもうない。無垢な、生まれたての命だけがここにある。
line = "イザベラの罪も穢れもこの世にはもうない。無垢な、生まれたての命だけがここにある。"

[[dialogue]]
speaker = "レイラ"
# 「うっ……」
line = "「うっ……」"

[[dialogue]]
speaker = "unk"
# 胸を押さえて倒れそうになるレイラを支える。
line = "胸を押さえて倒れそうになるレイラを支える。"

[[dialogue]]
speaker = "レイラ"
# 「はぁ、はぁ、はぁ……無理をしすぎたよう、ですね……私は、もう、長く、ありません……」
line = "「はぁ、はぁ、はぁ……無理をしすぎたよう、ですね……私は、もう、長く、ありません……」"

[[dialogue]]
speaker = "unk"
# レイラの体から急速に体温が失われていく。まるで海にでも入っていたかのように冷たい。
line = "レイラの体から急速に体温が失われていく。まるで海にでも入っていたかのように冷たい。"

[[dialogue]]
speaker = "レイラ"
# 「さっきの結界の影響で、私たちコラプサーとブラックホールのリンクは、途切れかけています……このままでは……」
line = "「さっきの結界の影響で、私たちコラプサーとブラックホールのリンクは、途切れかけています……このままでは……」"

[[dialogue]]
speaker = "レイラ"
# 「朝比奈さん、どうか、コラプサーのみんなを助けて、くださ、い。……みんなは、あなたを犠牲にすることは、知らないんです」
line = "「朝比奈さん、どうか、コラプサーのみんなを助けて、くださ、い。……みんなは、あなたを犠牲にすることは、知らないんです」"

[[dialogue]]
speaker = "レイラ"
# 「悪いのは、私です。私はどうなってもいい、だから、みんなを、助け……」
line = "「悪いのは、私です。私はどうなってもいい、だから、みんなを、助け……」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「え、ヤダ」
line = "「え、ヤダ」"

[[dialogue]]
speaker = "レイラ"
# 「っ…………そうですよね。自分を犠牲にしようとした相手を、助けるはずないですよね……」
line = "「っ…………そうですよね。自分を犠牲にしようとした相手を、助けるはずないですよね……」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「レイラだけ見捨てたりしないよ。ちゃんとみんな助けるから安心して」
line = "「レイラだけ見捨てたりしないよ。ちゃんとみんな助けるから安心して」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「まずは、はい」
line = "「まずは、はい」"

[[dialogue]]
speaker = "レイラ"
# 「え？　あ、だいぶ楽になりました」
line = "「え？　あ、だいぶ楽になりました」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「応急処置だけど、上手くいったみたい。会長さんとマリオンさんも」
line = "「応急処置だけど、上手くいったみたい。会長さんとマリオンさんも」"

[[dialogue]]
speaker = "マリオン（覚醒）"
# 「ありがとうございます」
line = "「ありがとうございます」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「今からネビュラ基地に行くのは……ちょっと時間がもったいないかも」
line = "「今からネビュラ基地に行くのは……ちょっと時間がもったいないかも」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「よし、システム乗っ取っちゃお。レイラの作ったバックドア使わせてもらうね」
line = "「よし、システム乗っ取っちゃお。レイラの作ったバックドア使わせてもらうね」"

[[dialogue]]
speaker = "レイラ"
# 「……え？」
line = "「……え？」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「あれ？　基地にハッキングしてたのレイラじゃないの？」
line = "「あれ？　基地にハッキングしてたのレイラじゃないの？」"

[[dialogue]]
speaker = "レイラ"
# 「いやまあ、そうなんですけど……気付かれていたとは」
line = "「いやまあ、そうなんですけど……気付かれていたとは」"

[[dialogue]]
speaker = "レイラ"
# 「でも、一体何をするつもりなんです……？」
line = "「でも、一体何をするつもりなんです……？」"

[[dialogue]]
speaker = "ウェンディ"
# 『だ、だ、誰ですか！？　ネビュラの基地にハッキングをしかけているのは！？』
line = "『だ、だ、誰ですか！？　ネビュラの基地にハッキングをしかけているのは！？』"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「すみません、私です！」
line = "「すみません、私です！」"

[[dialogue]]
speaker = "ウェンディ"
# 『あ、あなたはジャスティスウィザード──じゃなくて朝比奈コハルコさん！？』
line = "『あ、あなたはジャスティスウィザード──じゃなくて朝比奈コハルコさん！？』"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「時間がなかったのでシステムを掌握させてもらいました。用件が済んだらすぐ返すので、ちょっと協力お願いします」
line = "「時間がなかったのでシステムを掌握させてもらいました。用件が済んだらすぐ返すので、ちょっと協力お願いします」"

[[dialogue]]
speaker = "ウェンディ"
# 『協力って言ったって、完全にコントロールを奪われちゃってるじゃないですか！　もうさっさとやっちゃってくださいっ！』
line = "『協力って言ったって、完全にコントロールを奪われちゃってるじゃないですか！　もうさっさとやっちゃってくださいっ！』"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「ありがとうございます。これで一応許可も得たね」
line = "「ありがとうございます。これで一応許可も得たね」"

[[dialogue]]
speaker = "レイラ"
# 「ネビュラの基地を乗っ取って、いったい何をするんですかっ！？」
line = "「ネビュラの基地を乗っ取って、いったい何をするんですかっ！？」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「ネビュラ基地を施設ごと使って、巨大な治療装置にするの。基地にも世界樹の末端が通ってるから、私の魔法を送れるはず」
line = "「ネビュラ基地を施設ごと使って、巨大な治療装置にするの。基地にも世界樹の末端が通ってるから、私の魔法を送れるはず」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「コラプサー各員、バイタル確認。危険域だね。早く助けないと」
line = "「コラプサー各員、バイタル確認。危険域だね。早く助けないと」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「実際に使ってみて分かったけど、<ruby=レナトゥス>封理再誕</ruby>は、雑に言ってしまうと若返り。赤ん坊への巻き戻し」
line = "「実際に使ってみて分かったけど、<ruby>封理再誕<rt>レナトゥス</rt></ruby>は、雑に言ってしまうと若返り。赤ん坊への巻き戻し」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「トワちゃん先生の回復も同じだけど、先生の回復を受けて記憶や精神が逆行したなんて話、聞いたことない。なら……」
line = "「トワちゃん先生の回復も同じだけど、先生の回復を受けて記憶や精神が逆行したなんて話、聞いたことない。なら……」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「解析開始……致命箇所、特定！」
line = "「解析開始……致命箇所、特定！」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「<ruby=レナトゥス>封理再誕</ruby>・<ruby=ハードウェア>肉体限定</ruby>！」
line = "「<ruby>封理再誕<rt>レナトゥス</rt></ruby>・<ruby>肉体限定<rt>ハードウェア</rt></ruby>！」"

[[dialogue]]
speaker = "レイラ"
# 「！　バイタルデータが……みんなが回復していく……！　本当に、本当に、よかった……」
line = "「！　バイタルデータが……みんなが回復していく……！　本当に、本当に、よかった……」"

[[dialogue]]
speaker = "unk"
# コラプサーたちの命の危機はあっという間に回避された。
line = "コラプサーたちの命の危機はあっという間に回避された。"

[[dialogue]]
speaker = "unk"
# さすがなんでもできるコハルコさんだ。
line = "さすがなんでもできるコハルコさんだ。"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「じゃあ私行くね」
line = "「じゃあ私行くね」"

[[dialogue]]
speaker = "レイラ"
# 「え？」
line = "「え？」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「妹たちの晩ごはん用意しないと……あ、今日はお母さんが作ってくれるんだっけ」
line = "「妹たちの晩ごはん用意しないと……あ、今日はお母さんが作ってくれるんだっけ」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「晩ごはんの時間だから、私、帰るね」
line = "「晩ごはんの時間だから、私、帰るね」"

[[dialogue]]
speaker = "リーリア"
# 「コハルコ先輩、お帰りなさ～い！」
line = "「コハルコ先輩、お帰りなさ～い！」"

[[dialogue]]
speaker = "コハルコ"
# 「本当にごめんなさい、リーリアさん。私……」
line = "「本当にごめんなさい、リーリアさん。私……」"

[[dialogue]]
speaker = "リーリア"
# 「いいんですよ、そんなこと！　それより、ご家族も待ってますよ！　早く！」
line = "「いいんですよ、そんなこと！　それより、ご家族も待ってますよ！　早く！」"

[[dialogue]]
speaker = "コハルコ"
# 「うん、ありがとう」
line = "「うん、ありがとう」"

[[dialogue]]
speaker = "リーリア"
# 「へへ。じゃあ、私はこれで失礼しますね」
line = "「へへ。じゃあ、私はこれで失礼しますね」"

[[dialogue]]
speaker = "コハルコ"
# （秋葉原の片隅にあるパーツショップ。ここが私の家。私たち家族の家だ）
line = "（秋葉原の片隅にあるパーツショップ。ここが私の家。私たち家族の家だ）"

[[dialogue]]
speaker = "コハルコ父"
# 「おかえり、コハルコ」
line = "「おかえり、コハルコ」"

[[dialogue]]
speaker = "コハルコ母"
# 「おかえり。すぐご飯にする？　シチューできてるわよ」
line = "「おかえり。すぐご飯にする？　シチューできてるわよ」"

[[dialogue]]
speaker = "ナツコ"
# 「おかえり、おねえちゃん！」
line = "「おかえり、おねえちゃん！」"

[[dialogue]]
speaker = "トウコ"
# 「おかえりなさい、お姉ちゃん」
line = "「おかえりなさい、お姉ちゃん」"

[[dialogue]]
speaker = "コハルコ"
# （ここには、パーツショップを営む夫婦がいて、２人の可愛い妹と）
line = "（ここには、パーツショップを営む夫婦がいて、２人の可愛い妹と）"

[[dialogue]]
speaker = "コハルコ"
# （そして、私がいる）
line = "（そして、私がいる）"

[[dialogue]]
speaker = "コハルコ"
# 「ただいま！」
line = "「ただいま！」"
