[[dialogue]]
speaker = "unk"
# 第３話,聖沙先輩の乙女事情,P
line = "第３話,聖沙先輩の乙女事情,P"

[[dialogue]]
speaker = "聖沙"
# 「これが学園の図書室ぅ！！？」
line = "「これが学園の図書室ぅ！！？」"

[[dialogue]]
speaker = "聖沙"
# 「と、とんでもない規模ね。うちの学園の図書室も大きい方だけどスケールが違うわ……」
line = "「と、とんでもない規模ね。うちの学園の図書室も大きい方だけどスケールが違うわ……」"

[[dialogue]]
speaker = "聖沙"
# 「ともかく案内してくれてありがとう。もう戻ってもらっても大丈夫よ」
line = "「ともかく案内してくれてありがとう。もう戻ってもらっても大丈夫よ」"

[[dialogue]]
speaker = "unk"
# 本を探すなら手伝うよ
line = "本を探すなら手伝うよ"

[[dialogue]]
speaker = "聖沙"
# 「い、いえ、必要ないわ！　ひどく個人的な用事だし、付き合わせるのも悪いもの……！」
line = "「い、いえ、必要ないわ！　ひどく個人的な用事だし、付き合わせるのも悪いもの……！」"

[[dialogue]]
speaker = "unk"
# どんな本を探してるの？
line = "どんな本を探してるの？"

[[dialogue]]
speaker = "聖沙"
# 「だからいいってば！　単なる読み物よ、読み物……！　こっちの世界の少女小せ──じゃなくて文学に興味があるものだから……！」
line = "「だからいいってば！　単なる読み物よ、読み物……！　こっちの世界の少女小せ──じゃなくて文学に興味があるものだから……！」"

[[dialogue]]
speaker = "ウィステリア"
# 「なるほど。文学作品ね。もちろん蔵書があるわよ」
line = "「なるほど。文学作品ね。もちろん蔵書があるわよ」"

[[dialogue]]
speaker = "聖沙"
# 「わわっ！？　どなたですかっ？」
line = "「わわっ！？　どなたですかっ？」"

[[dialogue]]
speaker = "ウィステリア"
# 「ここの司書をしているウィステリアよ。クルセイダースの聖沙さんよね？　お噂は伺ってるわ。星徒会のみんなと一緒に騒動を解決してくれたとか」
line = "「ここの司書をしているウィステリアよ。クルセイダースの聖沙さんよね？　お噂は伺ってるわ。星徒会のみんなと一緒に騒動を解決してくれたとか」"

[[dialogue]]
speaker = "ウィステリア"
# 「特別に入れるように手続きしたから、どうぞ、ゆっくり見ていって？　文学作品の棚ならあちら──に゛ぃっ！？」
line = "「特別に入れるように手続きしたから、どうぞ、ゆっくり見ていって？　文学作品の棚ならあちら──に゛ぃっ！？」"

[[dialogue]]
speaker = "聖沙"
# 「ああっ！？　突然、書架の本が崩れ落ちて！！　ものの見事に下敷きに！！　け、怪我はありませんか！？」
line = "「ああっ！？　突然、書架の本が崩れ落ちて！！　ものの見事に下敷きに！！　け、怪我はありませんか！？」"

[[dialogue]]
speaker = "ウィステリア"
# 「うぅ、今日もついてないわ……。やっぱり呪われてる……。昨日も帰る途中で獰猛な野犬に絡まれちゃうし……」
line = "「うぅ、今日もついてないわ……。やっぱり呪われてる……。昨日も帰る途中で獰猛な野犬に絡まれちゃうし……」"

[[dialogue]]
speaker = "聖沙"
# 「な、なんだか幸薄そうな司書さんね……」
line = "「な、なんだか幸薄そうな司書さんね……」"

[[dialogue]]
speaker = "聖沙"
# 「でもどことなくメリロットさんに雰囲気が似てるような……。ただ者ではない気配を感じるわ……」
line = "「でもどことなくメリロットさんに雰囲気が似てるような……。ただ者ではない気配を感じるわ……」"

[[dialogue]]
speaker = "モネ"
# 「だだだ、大丈夫ですかっ？　すごい音がしましたよ……！」
line = "「だだだ、大丈夫ですかっ？　すごい音がしましたよ……！」"

[[dialogue]]
speaker = "ウィステリア"
# 「ああ、紙屋敷さん。いいところに。私は本を片付けないといけないから、代わりに彼女を案内してもらえないかしら。文学作品を見たいそうなんだけど」
line = "「ああ、紙屋敷さん。いいところに。私は本を片付けないといけないから、代わりに彼女を案内してもらえないかしら。文学作品を見たいそうなんだけど」"

[[dialogue]]
speaker = "モネ"
# 「文学作品、ですか？　色々とジャンルがありますけど……」
line = "「文学作品、ですか？　色々とジャンルがありますけど……」"

[[dialogue]]
speaker = "聖沙"
# 「い、いえ、本当に一人で大丈夫よ。お手間を取らせるのも申し訳ないしね」
line = "「い、いえ、本当に一人で大丈夫よ。お手間を取らせるのも申し訳ないしね」"

[[dialogue]]
speaker = "ウィステリア"
# 「そう言わずに、好みを言ってもらえればお勧めも紹介するわよ。ここは純文学から少女漫画まで、なんでもござれだから」
line = "「そう言わずに、好みを言ってもらえればお勧めも紹介するわよ。ここは純文学から少女漫画まで、なんでもござれだから」"

[[dialogue]]
speaker = "聖沙"
# 「！！　しょ、少女漫画も置いてあるの！？」
line = "「！！　しょ、少女漫画も置いてあるの！？」"

[[dialogue]]
speaker = "ウィステリア"
# 「あなたも興味ある？　よかったら借りていく？」
line = "「あなたも興味ある？　よかったら借りていく？」"

[[dialogue]]
speaker = "聖沙"
# 「ぜ、是非──」
line = "「ぜ、是非──」"

[[dialogue]]
speaker = "unk"
# 聖沙が少女漫画を……？
line = "聖沙が少女漫画を……？"

[[dialogue]]
speaker = "聖沙"
# 「と言いたいところだけど、やめておくわ！　そういった漫画は読まないの。私は複雑で難解な、それはもう１行読むだけで眠気を誘われかねない純文学しか嗜まないものだから」
line = "「と言いたいところだけど、やめておくわ！　そういった漫画は読まないの。私は複雑で難解な、それはもう１行読むだけで眠気を誘われかねない純文学しか嗜まないものだから」"

[[dialogue]]
speaker = "ウィステリア"
# 「あら、それは残念ね。実写化やアニメ化もした、累計売上１０００万部突破のおすすめ作品があったんだけど。原作は小説だけどね」
line = "「あら、それは残念ね。実写化やアニメ化もした、累計売上１０００万部突破のおすすめ作品があったんだけど。原作は小説だけどね」"

[[dialogue]]
speaker = "聖沙"
# 「！！　そ、そこまで言うなら読んでみてもいいかもしれないわ。それに小説の方がむしろありがた──」
line = "「！！　そ、そこまで言うなら読んでみてもいいかもしれないわ。それに小説の方がむしろありがた──」"

[[dialogue]]
speaker = "ウィステリア"
# 「いえいえ、本は無理に勧めるものじゃないから。ね、会長くん」
line = "「いえいえ、本は無理に勧めるものじゃないから。ね、会長くん」"

[[dialogue]]
speaker = "unk"
# その通りかと
line = "その通りかと"

[[dialogue]]
speaker = "聖沙"
# 「！！　そ、そうね。まぁでも一応タイトルくらいは教えてもらえないかしら。べ、別に興味はないんだけどね！」
line = "「！！　そ、そうね。まぁでも一応タイトルくらいは教えてもらえないかしら。べ、別に興味はないんだけどね！」"

[[dialogue]]
speaker = "ウィステリア"
# 「それなら複雑で難解な眠気を誘う純文学作品の方を紹介するわね♪　聖沙さんもそちらの方が嬉しいでしょうし♪」
line = "「それなら複雑で難解な眠気を誘う純文学作品の方を紹介するわね♪　聖沙さんもそちらの方が嬉しいでしょうし♪」"

[[dialogue]]
speaker = "聖沙"
# 「ぐっ……！　て、手強い……」
line = "「ぐっ……！　て、手強い……」"

[[dialogue]]
speaker = "モネ"
# 「あ、あの。とりあえず案内、しますね？」
line = "「あ、あの。とりあえず案内、しますね？」"

[[dialogue]]
speaker = "聖沙"
# 「ああいえ、やっぱり私は一人で──」
line = "「ああいえ、やっぱり私は一人で──」"

[[dialogue]]
speaker = "モネ"
# 「まぁそう仰らずに。少女小説の置いてある書架にこっそり案内しますから」
line = "「まぁそう仰らずに。少女小説の置いてある書架にこっそり案内しますから」"

[[dialogue]]
speaker = "聖沙"
# 「！！　あ、あなた、どうして」
line = "「！！　あ、あなた、どうして」"

[[dialogue]]
speaker = "モネ"
# 「え？　本当は少女小説が読みたいけど、恥ずかしいからごまかしている……ということじゃなかったんですか？」
line = "「え？　本当は少女小説が読みたいけど、恥ずかしいからごまかしている……ということじゃなかったんですか？」"

[[dialogue]]
speaker = "聖沙"
# 「全部バレてる！？」
line = "「全部バレてる！？」"

[[dialogue]]
speaker = "モネ"
# 「こちらの『Ｇ線上のトライアングル　～姉妹の輪舞～』なんかどうでしょう。女子校の寮で、平凡な主人公が氷の姫と呼ばれる生徒会長と出会うお話なんですが」
line = "「こちらの『Ｇ線上のトライアングル　～姉妹の輪舞～』なんかどうでしょう。女子校の寮で、平凡な主人公が氷の姫と呼ばれる生徒会長と出会うお話なんですが」"

[[dialogue]]
speaker = "聖沙"
# 「ペラペラペラ──っっ！！　確かに私の好みドストライクだわ……！　よ、読みたい……！　でも傍に会長さんが（チラチラ）」
line = "「ペラペラペラ──っっ！！　確かに私の好みドストライクだわ……！　よ、読みたい……！　でも傍に会長さんが（チラチラ）」"

[[dialogue]]
speaker = "モネ"
# 「大丈夫ですよ。会長は今ウィステリアさんのお手伝いで忙しいでしょうし。たとえそれが終わっても──」
line = "「大丈夫ですよ。会長は今ウィステリアさんのお手伝いで忙しいでしょうし。たとえそれが終わっても──」"

[[dialogue]]
speaker = "ウィステリア"
# 「きゃああああっっ！？　どうして書架に本を入れたら、他の本が落っこちてくるの～！？」
line = "「きゃああああっっ！？　どうして書架に本を入れたら、他の本が落っこちてくるの～！？」"

[[dialogue]]
speaker = "モネ"
# 「ああしてまた何かしら不幸が起こるはずなので、会長もしばらく動けないと思います」
line = "「ああしてまた何かしら不幸が起こるはずなので、会長もしばらく動けないと思います」"

[[dialogue]]
speaker = "聖沙"
# 「わ、笑わないの……？　私が少女小説が好きなこと……。この歳になっても、その。白馬の王子様に憧れていても……」
line = "「わ、笑わないの……？　私が少女小説が好きなこと……。この歳になっても、その。白馬の王子様に憧れていても……」"

[[dialogue]]
speaker = "モネ"
# 「図書委員ですから。本を好きな人の気持ちを笑ったりしません」
line = "「図書委員ですから。本を好きな人の気持ちを笑ったりしません」"

[[dialogue]]
speaker = "モネ"
# 「それに私だって自分の妄想を小説にしているくらいで……あはは」
line = "「それに私だって自分の妄想を小説にしているくらいで……あはは」"

[[dialogue]]
speaker = "聖沙"
# 「っっ。あなたとは良いお友達になれそう……。良ければ、お勧めの小説を貸してもらえないかしら。あ、でも私、近いうちに元の世界に戻らなくちゃいけなくて……」
line = "「っっ。あなたとは良いお友達になれそう……。良ければ、お勧めの小説を貸してもらえないかしら。あ、でも私、近いうちに元の世界に戻らなくちゃいけなくて……」"

[[dialogue]]
speaker = "モネ"
# 「な、なら一緒に買いに行きませんか？　それなら持って帰れますし。わたしも、その。色々見ながら少女小説について聖沙さんと語り合いたいなぁ、なんて……」
line = "「な、なら一緒に買いに行きませんか？　それなら持って帰れますし。わたしも、その。色々見ながら少女小説について聖沙さんと語り合いたいなぁ、なんて……」"

[[dialogue]]
speaker = "聖沙"
# 「～～っっ。すごく嬉しいわ。迷惑じゃなければそのままモネさんのお部屋にお泊まりしてもいい……？　り、理想のシチュエーションについて語り明かしたいの……」
line = "「～～っっ。すごく嬉しいわ。迷惑じゃなければそのままモネさんのお部屋にお泊まりしてもいい……？　り、理想のシチュエーションについて語り明かしたいの……」"

[[dialogue]]
speaker = "モネ"
# 「え、えへへ、わかります……。ぜひぜひ、です……」
line = "「え、えへへ、わかります……。ぜひぜひ、です……」"

[[dialogue]]
speaker = "unk"
# なんだか少し見ない間に
line = "なんだか少し見ない間に"

[[dialogue]]
speaker = "ウィステリア"
# 「２人とも随分と仲良しになったみたいね。ふふ、これぞ青春ってやつなのかしら♪」
line = "「２人とも随分と仲良しになったみたいね。ふふ、これぞ青春ってやつなのかしら♪」"
