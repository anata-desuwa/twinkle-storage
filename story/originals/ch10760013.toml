[[dialogue]]
speaker = "unk"
# 第３話,人見知りモナカと帰り道,P
line = "第３話,人見知りモナカと帰り道,P"

[[dialogue]]
speaker = "モナカ"
# 「えへへ、今日はありがとう、にぃ様。おなか部の備品の買い出しに付き合ってもらっちゃって」
line = "「えへへ、今日はありがとう、にぃ様。おなか部の備品の買い出しに付き合ってもらっちゃって」"

[[dialogue]]
speaker = "モナカ"
# 「あ……荷物重くない？　やっぱりモナカが持つよ？　あう、本当にいいの……？」
line = "「あ……荷物重くない？　やっぱりモナカが持つよ？　あう、本当にいいの……？」"

[[dialogue]]
speaker = "モナカ"
# 「にぃ様って本当に優しい……。それにすっごく力持ちで……。か、格好いいな……」
line = "「にぃ様って本当に優しい……。それにすっごく力持ちで……。か、格好いいな……」"

[[dialogue]]
speaker = "モナカ"
# 「あっ……ううんっ。なんでもないよ。それにしても、えとっ。やっぱり流星市国って人が多いね？」
line = "「あっ……ううんっ。なんでもないよ。それにしても、えとっ。やっぱり流星市国って人が多いね？」"

[[dialogue]]
speaker = "モナカ"
# 「モナカの地元はすごく田舎だから。こうして街へ出かける度に人の多さにクラクラしちゃうもん」
line = "「モナカの地元はすごく田舎だから。こうして街へ出かける度に人の多さにクラクラしちゃうもん」"

[[dialogue]]
speaker = "モナカ"
# 「お店に入る時なんかも心の中で、よぉーし頑張るぞ～……って意気込んでからじゃないと入れないくらいで」
line = "「お店に入る時なんかも心の中で、よぉーし頑張るぞ～……って意気込んでからじゃないと入れないくらいで」"

[[dialogue]]
speaker = "モナカ"
# 「きっと今日もにぃ様がいてくれなかったらお店の前でずっと立ち往生しちゃってたや……。本当にありがとね、にぃ様……？」
line = "「きっと今日もにぃ様がいてくれなかったらお店の前でずっと立ち往生しちゃってたや……。本当にありがとね、にぃ様……？」"

[[dialogue]]
speaker = "モナカ"
# 「こういう人見知りなところも直していきたいなぁ……。モナカ、俯いて過ごすことがクセになっちゃってて……」
line = "「こういう人見知りなところも直していきたいなぁ……。モナカ、俯いて過ごすことがクセになっちゃってて……」"

[[dialogue]]
speaker = "モナカ"
# 「おなか部の部長さんとしてダメだよね。モナカがビクビクしてたら相談しに来てくれた人も不安になっちゃうかもしれないし」
line = "「おなか部の部長さんとしてダメだよね。モナカがビクビクしてたら相談しに来てくれた人も不安になっちゃうかもしれないし」"

[[dialogue]]
speaker = "モナカ"
# 「最近は部室へ直接お悩み相談しに来てくれる人も増えてきたから。少しでも人の目を見て話せるようにならないと……」
line = "「最近は部室へ直接お悩み相談しに来てくれる人も増えてきたから。少しでも人の目を見て話せるようにならないと……」"

[[dialogue]]
speaker = "unk"
# なら俺で練習してみる？
line = "なら俺で練習してみる？"

[[dialogue]]
speaker = "モナカ"
# 「にぃ様で……？　確かにモナカもにぃ様のお顔なら緊張しないで見られるかも……」
line = "「にぃ様で……？　確かにモナカもにぃ様のお顔なら緊張しないで見られるかも……」"

[[dialogue]]
speaker = "モナカ"
# 「試してみてもいい……？　じー……。じー……」
line = "「試してみてもいい……？　じー……。じー……」"

[[dialogue]]
speaker = "モナカ"
# 「～～っっ。ダ、ダメ、にぃ様のお顔が一番見られないかも……！　か、体が熱くなってきちゃう……」
line = "「～～っっ。ダ、ダメ、にぃ様のお顔が一番見られないかも……！　か、体が熱くなってきちゃう……」"

[[dialogue]]
speaker = "モナカ"
# 「う、ううん、にぃ様が悪いわけじゃないの。モナカが、その、変なだけで」
line = "「う、ううん、にぃ様が悪いわけじゃないの。モナカが、その、変なだけで」"

[[dialogue]]
speaker = "モナカ"
# 「そういえば、にぃ様は人見知りしないよね……？　初めてにぃ様と出会った時も、にぃ様から話しかけてきてくれたし……」
line = "「そういえば、にぃ様は人見知りしないよね……？　初めてにぃ様と出会った時も、にぃ様から話しかけてきてくれたし……」"

[[dialogue]]
speaker = "モナカ"
# 「やっぱり色々な人とたくさんお喋りするのが一番なのかな……。でもモナカ、あんまりハキハキ喋れないタイプで……」
line = "「やっぱり色々な人とたくさんお喋りするのが一番なのかな……。でもモナカ、あんまりハキハキ喋れないタイプで……」"

[[dialogue]]
speaker = "モナカ"
# 「姉様たちにもよく叱られちゃってたな……。オドオドせずにもっと目を見て話せって……。人の顔色窺うなって……」
line = "「姉様たちにもよく叱られちゃってたな……。オドオドせずにもっと目を見て話せって……。人の顔色窺うなって……」"

[[dialogue]]
speaker = "unk"
# そういえばモナカの地元ってどんな場所なの？
line = "そういえばモナカの地元ってどんな場所なの？"

[[dialogue]]
speaker = "モナカ"
# 「え？　ええと、本当に田舎だよ……？　山の中にある小さな田舎町で……」
line = "「え？　ええと、本当に田舎だよ……？　山の中にある小さな田舎町で……」"

[[dialogue]]
speaker = "モナカ"
# 「すごく水と空気が綺麗な場所でね？　人も少ないからとっても静かで。夜になると星がすっごくピカピカ輝いて見えるんだぁ」
line = "「すごく水と空気が綺麗な場所でね？　人も少ないからとっても静かで。夜になると星がすっごくピカピカ輝いて見えるんだぁ」"

[[dialogue]]
speaker = "モナカ"
# 「山の中にある湖がモナカのお気に入りの場所でね？　モナカはお家のお稽古に混ざれなかったから、そこでこっそり星術の練習をしたりもして」
line = "「山の中にある湖がモナカのお気に入りの場所でね？　モナカはお家のお稽古に混ざれなかったから、そこでこっそり星術の練習をしたりもして」"

[[dialogue]]
speaker = "モナカ"
# 「パルちゃんやシフォンちゃんと出会ってからは毎日その湖に集まって一緒に遊んでたの」
line = "「パルちゃんやシフォンちゃんと出会ってからは毎日その湖に集まって一緒に遊んでたの」"

[[dialogue]]
speaker = "モナカ"
# 「ああ見えてもパルちゃんは遊ぶときはパワフルでね？　野球とかサッカーとかサバゲーとか色々やったなぁ」
line = "「ああ見えてもパルちゃんは遊ぶときはパワフルでね？　野球とかサッカーとかサバゲーとか色々やったなぁ」"

[[dialogue]]
speaker = "モナカ"
# 「パルちゃんは昔から星力の扱いも上手でね？　星騎士ごっこって言って、モナカとシフォンちゃんに稽古を付けてくれたりもして」
line = "「パルちゃんは昔から星力の扱いも上手でね？　星騎士ごっこって言って、モナカとシフォンちゃんに稽古を付けてくれたりもして」"

[[dialogue]]
speaker = "モナカ"
# 「シフォンちゃんとはよく山菜採りをしてたんだよ？　一時期は一攫千金を狙って、みんなでトリュフ採りもしたっけ」
line = "「シフォンちゃんとはよく山菜採りをしてたんだよ？　一時期は一攫千金を狙って、みんなでトリュフ採りもしたっけ」"

[[dialogue]]
speaker = "モナカ"
# 「みんな泥んこになるまで探してね。終わったら湖で水浴びして。えへへ、楽しかったなぁ」
line = "「みんな泥んこになるまで探してね。終わったら湖で水浴びして。えへへ、楽しかったなぁ」"

[[dialogue]]
speaker = "モナカ"
# 「そういえば、シフォンちゃんが森の中でお肉を見つけたことがあってね？　ついて行ったら、本当に大きなステーキ肉が置いてあったの」
line = "「そういえば、シフォンちゃんが森の中でお肉を見つけたことがあってね？　ついて行ったら、本当に大きなステーキ肉が置いてあったの」"

[[dialogue]]
speaker = "モナカ"
# 「でもシフォンちゃんがそれを掴んだ瞬間、ずざざざーって宙吊りにされちゃって……！　猟師さんの仕掛けた動物用の罠だったんだって」
line = "「でもシフォンちゃんがそれを掴んだ瞬間、ずざざざーって宙吊りにされちゃって……！　猟師さんの仕掛けた動物用の罠だったんだって」"

[[dialogue]]
speaker = "モナカ"
# 「あの時は焦ったなぁ。パルちゃんは大笑いするし、シフォンちゃんは頑なにお肉を手放さないし、モナカの身長じゃ縄まで届かなくて」
line = "「あの時は焦ったなぁ。パルちゃんは大笑いするし、シフォンちゃんは頑なにお肉を手放さないし、モナカの身長じゃ縄まで届かなくて」"

[[dialogue]]
speaker = "モナカ"
# 「あ、他にもね。シフォンちゃんが毒キノコを間違えて食べちゃった時があって──」
line = "「あ、他にもね。シフォンちゃんが毒キノコを間違えて食べちゃった時があって──」"

[[dialogue]]
speaker = "unk"
# しっかり喋れてるじゃないか
line = "しっかり喋れてるじゃないか"

[[dialogue]]
speaker = "モナカ"
# 「え？　あっ……本当だ。モナカ、いつの間にかたくさん喋ってて……」
line = "「え？　あっ……本当だ。モナカ、いつの間にかたくさん喋ってて……」"

[[dialogue]]
speaker = "モナカ"
# 「もしかしてにぃ様、モナカに練習させようとしてお話振ってくれたの……？」
line = "「もしかしてにぃ様、モナカに練習させようとしてお話振ってくれたの……？」"

[[dialogue]]
speaker = "モナカ"
# 「そんなことないって……ふふ。にぃ様の嘘つき」
line = "「そんなことないって……ふふ。にぃ様の嘘つき」"

[[dialogue]]
speaker = "unk"
# でも２人とも本当に仲良しだね
line = "でも２人とも本当に仲良しだね"

[[dialogue]]
speaker = "モナカ"
# 「パルちゃんとシフォンちゃんのこと？　ふふ、うん。子どもの頃からずっと一緒だから」
line = "「パルちゃんとシフォンちゃんのこと？　ふふ、うん。子どもの頃からずっと一緒だから」"

[[dialogue]]
speaker = "モナカ"
# 「でもね、その。最近は、にぃ様ともパルちゃんやシフォンちゃんたちと同じくらい仲良しになってると思うよ……？」
line = "「でもね、その。最近は、にぃ様ともパルちゃんやシフォンちゃんたちと同じくらい仲良しになってると思うよ……？」"

[[dialogue]]
speaker = "モナカ"
# 「本当のお兄様みたいに思ってるというか……。だから、その、モナカも緊張せずにお話することができて……」
line = "「本当のお兄様みたいに思ってるというか……。だから、その、モナカも緊張せずにお話することができて……」"

[[dialogue]]
speaker = "モナカ"
# 「モナカだけ……かな？　そんな風に思ってるの……？」
line = "「モナカだけ……かな？　そんな風に思ってるの……？」"

[[dialogue]]
speaker = "unk"
# 俺も可愛い妹ができた気持ちだよ
line = "俺も可愛い妹ができた気持ちだよ"

[[dialogue]]
speaker = "モナカ"
# 「ふ、ふぇ。ひ、一言余計だよ。モナカ全然可愛くないからっ」
line = "「ふ、ふぇ。ひ、一言余計だよ。モナカ全然可愛くないからっ」"

[[dialogue]]
speaker = "モナカ"
# 「あう、ダメ。今モナカのお顔見ちゃ。ますますにぃ様のお顔見て話せなくなっちゃうからっ」
line = "「あう、ダメ。今モナカのお顔見ちゃ。ますますにぃ様のお顔見て話せなくなっちゃうからっ」"

[[dialogue]]
speaker = "モナカ"
# 「でも、えへへ、良かった。にぃ様もモナカのこと、そんな風に思ってくれていて……」
line = "「でも、えへへ、良かった。にぃ様もモナカのこと、そんな風に思ってくれていて……」"

[[dialogue]]
speaker = "モナカ"
# 「う、ううん、なんでもない。それとやっぱりモナカも荷物持つよ。にぃ様にばかり持たせるのは悪いもん」
line = "「う、ううん、なんでもない。それとやっぱりモナカも荷物持つよ。にぃ様にばかり持たせるのは悪いもん」"

[[dialogue]]
speaker = "モナカ"
# 「ビニール袋の手を１本ずつ持って歩こう？　これなら、その、にぃ様のお顔を見ながらお話しできるかもしれないし」
line = "「ビニール袋の手を１本ずつ持って歩こう？　これなら、その、にぃ様のお顔を見ながらお話しできるかもしれないし」"

[[dialogue]]
speaker = "モナカ"
# 「部室に戻るまで、もう少しだけモナカのお喋りの練習に付き合って欲しいな……」
line = "「部室に戻るまで、もう少しだけモナカのお喋りの練習に付き合って欲しいな……」"

[[dialogue]]
speaker = "モナカ"
# 「ちゃんと、その……にぃ様のおめめ見て話せるようになりたいから」
line = "「ちゃんと、その……にぃ様のおめめ見て話せるようになりたいから」"

[[dialogue]]
speaker = "モナカ"
# 「ダメ、かな……？」
line = "「ダメ、かな……？」"
