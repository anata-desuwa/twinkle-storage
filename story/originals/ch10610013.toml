[[dialogue]]
speaker = "unk"
# 第3話,マリオン無双,P
line = "第3話,マリオン無双,P"

[[dialogue]]
speaker = "unk"
# マリオンさんが新星学園へ頻繁に出入りするようになったことで、１つ思わぬ弊害が生まれていた。
line = "マリオンさんが新星学園へ頻繁に出入りするようになったことで、１つ思わぬ弊害が生まれていた。"

[[dialogue]]
speaker = "マリオン"
# 「まあまあ、うふふっ♪　そんな警戒なさらなくとも、よろしいのに……」
line = "「まあまあ、うふふっ♪　そんな警戒なさらなくとも、よろしいのに……」"

[[dialogue]]
speaker = "閃"
# 「そうはいきません。マリオンさん、あなたがここ最近、新星学園の女子生徒達を口説き回っていることは知っていますよ？」
line = "「そうはいきません。マリオンさん、あなたがここ最近、新星学園の女子生徒達を口説き回っていることは知っていますよ？」"

[[dialogue]]
speaker = "unk"
# あの……マリオンさん……？
line = "あの……マリオンさん……？"

[[dialogue]]
speaker = "マリオン"
# 「まあ、会長様。そんなジト目で見ないで下さいまし。お可愛らしくて私、胸がキュンとしてしまいます……<emoji=heart04>」
line = "「まあ、会長様。そんなジト目で見ないで下さいまし。お可愛らしくて私、胸がキュンとしてしまいます……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ダメだこのメイド……！　まるで効いてない……！
line = "ダメだこのメイド……！　まるで効いてない……！"

[[dialogue]]
speaker = "せつな"
# 「マリオン殿のことはメイドとして尊敬しているでござるが……しかし、九浄家メイド隊の仲間まで口説こうとするのであれば、見過ごすわけには参りませぬ！」
line = "「マリオン殿のことはメイドとして尊敬しているでござるが……しかし、九浄家メイド隊の仲間まで口説こうとするのであれば、見過ごすわけには参りませぬ！」"

[[dialogue]]
speaker = "閃"
# 「ましてや、その相手が純真なヨミとなれば、尚更です。星見家メイド隊の好きにさせるわけにはいきません」
line = "「ましてや、その相手が純真なヨミとなれば、尚更です。星見家メイド隊の好きにさせるわけにはいきません」"

[[dialogue]]
speaker = "ヨミ"
# 「えっと……私はマリオンさんから普通に挨拶されただけなんですけど、なんでこんな一触即発の状況に……？」
line = "「えっと……私はマリオンさんから普通に挨拶されただけなんですけど、なんでこんな一触即発の状況に……？」"

[[dialogue]]
speaker = "unk"
# 閃、せつな、ヨミは、九浄家メイド隊に所属する３人だ。マリオンの所属する星見家メイド隊とは、何故か組織的に対立意識が強いらしいと、俺はヴィーナスから聞いていた。
line = "閃、せつな、ヨミは、九浄家メイド隊に所属する３人だ。マリオンの所属する星見家メイド隊とは、何故か組織的に対立意識が強いらしいと、俺はヴィーナスから聞いていた。"

[[dialogue]]
speaker = "マリオン"
# 「ヨミ様の仰る通りですよ。私はただ、ヨミ様がお可愛らしいので声をおかけしただけです」
line = "「ヨミ様の仰る通りですよ。私はただ、ヨミ様がお可愛らしいので声をおかけしただけです」"

[[dialogue]]
speaker = "ヨミ"
# 「こやっ！？　そんな……私が可愛いだなんて……照れちゃいます……」
line = "「こやっ！？　そんな……私が可愛いだなんて……照れちゃいます……」"

[[dialogue]]
speaker = "マリオン"
# 「ふふっ、お世辞ではありませんよ。私はいつだって本気でお可愛いと思って口にしていますので」
line = "「ふふっ、お世辞ではありませんよ。私はいつだって本気でお可愛いと思って口にしていますので」"

[[dialogue]]
speaker = "ヨミ"
# 「ありがとうございます。でも、マリオンさんの方が美人で仕事ができて、素敵だと思いますよ？」
line = "「ありがとうございます。でも、マリオンさんの方が美人で仕事ができて、素敵だと思いますよ？」"

[[dialogue]]
speaker = "マリオン"
# 「まあまあ、うふふっ♪　そんなお褒めいただけるなんて、ヨミ様、思わずお持ち帰りしたくなってしまうお可愛さですこと……<emoji=heart04>」
line = "「まあまあ、うふふっ♪　そんなお褒めいただけるなんて、ヨミ様、思わずお持ち帰りしたくなってしまうお可愛さですこと……<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
# 「えっと……？　お持ち帰り……の意味はよくわかりませんが、褒め言葉ってことですよね？　ありがとうございます♪」
line = "「えっと……？　お持ち帰り……の意味はよくわかりませんが、褒め言葉ってことですよね？　ありがとうございます♪」"

[[dialogue]]
speaker = "せつな"
# 「さすがヨミ殿でござる！　持ち前の純真さで、マリオン殿の色仕掛けを見事に跳ね除けておりまする！」
line = "「さすがヨミ殿でござる！　持ち前の純真さで、マリオン殿の色仕掛けを見事に跳ね除けておりまする！」"

[[dialogue]]
speaker = "閃"
# 「どうやら我々、九浄家メイド隊の勝ちみたいですね。今日のところはこれで鞘に納めて――」
line = "「どうやら我々、九浄家メイド隊の勝ちみたいですね。今日のところはこれで鞘に納めて――」"

[[dialogue]]
speaker = "マリオン"
# 「あら？　お２人は私の相手をして下さらないのですか？　せっかくこうしてお会いできたのですから……」
line = "「あら？　お２人は私の相手をして下さらないのですか？　せっかくこうしてお会いできたのですから……」"

[[dialogue]]
speaker = "マリオン"
# 「私、お２人とも仲良くしたいです。うふふっ<emoji=heart04>」
line = "「私、お２人とも仲良くしたいです。うふふっ<emoji=heart04>」"

[[dialogue]]
speaker = "せつな"
# 「なっ！？　いつの間にせつなの近くに！？　いや、マリオン殿が２人！？　これは分身の術でござるか！？」
line = "「なっ！？　いつの間にせつなの近くに！？　いや、マリオン殿が２人！？　これは分身の術でござるか！？」"

[[dialogue]]
speaker = "マリオン"
# 「ふふっ、そのようなものです。私、人形使いですので♪」
line = "「ふふっ、そのようなものです。私、人形使いですので♪」"

[[dialogue]]
speaker = "マリオン"
# 「さて、せつな様。私、前からあなたのお耳と尻尾がすごくお可愛くて触ってみたいと思っていたんです<emoji=heart04>」
line = "「さて、せつな様。私、前からあなたのお耳と尻尾がすごくお可愛くて触ってみたいと思っていたんです<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
# 「なでなでしても、よろしいですか？」
line = "「なでなでしても、よろしいですか？」"

[[dialogue]]
speaker = "せつな"
# 「ほわぁぁぁ<emoji=heart04>　そんな、耳に息を優しく吹きかけるように囁いちゃダメでござるぅ……<emoji=heart04>」
line = "「ほわぁぁぁ<emoji=heart04>　そんな、耳に息を優しく吹きかけるように囁いちゃダメでござるぅ……<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
# 「なでなでしても、よろしいですよね<emoji=heart04>」
line = "「なでなでしても、よろしいですよね<emoji=heart04>」"

[[dialogue]]
speaker = "せつな"
# 「ああ、マリオン殿……なんだか、甘くていい匂いがするでござるぅ……お、恐るべき色香に……体が勝手に……！」
line = "「ああ、マリオン殿……なんだか、甘くていい匂いがするでござるぅ……お、恐るべき色香に……体が勝手に……！」"

[[dialogue]]
speaker = "マリオン"
# 「あ、今頷きましたよね？　なでなでしちゃいますね<emoji=heart04>」
line = "「あ、今頷きましたよね？　なでなでしちゃいますね<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
# 「はい、なでなで～<emoji=heart04>　うふっ<emoji=heart04>　お耳と尻尾、ピクピク反応してお可愛らしいですこと……<emoji=heart04>」
line = "「はい、なでなで～<emoji=heart04>　うふっ<emoji=heart04>　お耳と尻尾、ピクピク反応してお可愛らしいですこと……<emoji=heart04>」"

[[dialogue]]
speaker = "せつな"
# 「ほわぁぁぁっ<emoji=heart04>　大人のお触りテクニックで、体がふにゃふにゃになってしまうでござるぅぅぅ<emoji=heart04>　ふにゃあ……ごろごろ……<emoji=heart04>」
line = "「ほわぁぁぁっ<emoji=heart04>　大人のお触りテクニックで、体がふにゃふにゃになってしまうでござるぅぅぅ<emoji=heart04>　ふにゃあ……ごろごろ……<emoji=heart04>」"

[[dialogue]]
speaker = "閃"
# 「せ、せつなぁぁぁっ！？　はっ……！」
line = "「せ、せつなぁぁぁっ！？　はっ……！」"

[[dialogue]]
speaker = "マリオン"
# 「うふふっ<emoji=heart04>　次は閃様、あなたの番ですよ<emoji=heart04>」
line = "「うふふっ<emoji=heart04>　次は閃様、あなたの番ですよ<emoji=heart04>」"

[[dialogue]]
speaker = "閃"
# 「３人目の人形！？　しまった、人形は１体だと思い込んで……！　いやでも、予測の星眼でも察知できないなんて、そんなこと……！？」
line = "「３人目の人形！？　しまった、人形は１体だと思い込んで……！　いやでも、予測の星眼でも察知できないなんて、そんなこと……！？」"

[[dialogue]]
speaker = "マリオン"
# 「私、こう見えても一時期、流星学園の星徒会長をやっていましたので♪」
line = "「私、こう見えても一時期、流星学園の星徒会長をやっていましたので♪」"

[[dialogue]]
speaker = "マリオン"
# 「――閃様、あなたは護衛メイドとして、とても優秀な方ですね。私がヨミ様と挨拶しようとしたら、即反応して駆けつけた」
line = "「――閃様、あなたは護衛メイドとして、とても優秀な方ですね。私がヨミ様と挨拶しようとしたら、即反応して駆けつけた」"

[[dialogue]]
speaker = "閃"
# 「む、無駄です。私は色仕掛けに屈したりしません。私には、ヴィーナスお嬢様という心に決めた絶対の主が――」
line = "「む、無駄です。私は色仕掛けに屈したりしません。私には、ヴィーナスお嬢様という心に決めた絶対の主が――」"

[[dialogue]]
speaker = "マリオン"
# 「ああ、その健気な忠誠心がまた、実にお可愛い<emoji=heart04>　大丈夫ですよ。私はそんな百合の花を摘むようなことを致しません。外側からちょっと、優しく愛でるだけです<emoji=heart04>」
line = "「ああ、その健気な忠誠心がまた、実にお可愛い<emoji=heart04>　大丈夫ですよ。私はそんな百合の花を摘むようなことを致しません。外側からちょっと、優しく愛でるだけです<emoji=heart04>」"

[[dialogue]]
speaker = "閃"
# 「な、何を言って……ふあっ！？　あ、頭をなでられて……」
line = "「な、何を言って……ふあっ！？　あ、頭をなでられて……」"

[[dialogue]]
speaker = "マリオン"
# 「閃様、メイドとして頑張っていて、偉い偉い<emoji=heart04>　本当は閃様も、星見家メイド隊に対立心があるわけではありませんよね？」
line = "「閃様、メイドとして頑張っていて、偉い偉い<emoji=heart04>　本当は閃様も、星見家メイド隊に対立心があるわけではありませんよね？」"

[[dialogue]]
speaker = "マリオン"
# 「九浄家メイド隊として、ヴィーナス様に忠誠を誓うからこそ、星見家メイド隊の私と一定の距離を保とうとした。違いますか？」
line = "「九浄家メイド隊として、ヴィーナス様に忠誠を誓うからこそ、星見家メイド隊の私と一定の距離を保とうとした。違いますか？」"

[[dialogue]]
speaker = "閃"
# 「そ、それは……！」
line = "「そ、それは……！」"

[[dialogue]]
speaker = "マリオン"
# 「私相手に、そんな肩肘は張らなくてよいのです。あなたが立派なメイドだと、私はもう知っていますから」
line = "「私相手に、そんな肩肘は張らなくてよいのです。あなたが立派なメイドだと、私はもう知っていますから」"

[[dialogue]]
speaker = "マリオン"
# 「だから、これからは同じメイドとして、仲良く致しましょう<emoji=heart04>　……ね？」
line = "「だから、これからは同じメイドとして、仲良く致しましょう<emoji=heart04>　……ね？」"

[[dialogue]]
speaker = "閃"
# 「ああっ……マリオン……お姉様……<emoji=heart04>」
line = "「ああっ……マリオン……お姉様……<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
# 「まあまあ、うふふっ♪　お２人とも、実にお可愛いらしい反応ですこと<emoji=heart04>　これは私が責任を持って、お持ち帰――いえ、介抱せねばなりませんね<emoji=heart04>」
line = "「まあまあ、うふふっ♪　お２人とも、実にお可愛いらしい反応ですこと<emoji=heart04>　これは私が責任を持って、お持ち帰――いえ、介抱せねばなりませんね<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
# 「せつなさんだけでなく、閃先輩までふにゃふにゃに……！　そんな……！」
line = "「せつなさんだけでなく、閃先輩までふにゃふにゃに……！　そんな……！」"

[[dialogue]]
speaker = "ヨミ"
# 「――すごいです！　これが、メイドを極めたマリオンさんの力なんですねっ」
line = "「――すごいです！　これが、メイドを極めたマリオンさんの力なんですねっ」"

[[dialogue]]
speaker = "unk"
# いやちょっと違うと思う……
line = "いやちょっと違うと思う……"

[[dialogue]]
speaker = "unk"
# 純真に憧れの眼差しを向けるヨミに、思わずツッコミを入れてしまう俺なのだった。
line = "純真に憧れの眼差しを向けるヨミに、思わずツッコミを入れてしまう俺なのだった。"

[[dialogue]]
speaker = "unk"
# そして後日、マリオンさんに対して、九浄家メイド隊の警戒レベルがまた１つ上がったという。
line = "そして後日、マリオンさんに対して、九浄家メイド隊の警戒レベルがまた１つ上がったという。"
