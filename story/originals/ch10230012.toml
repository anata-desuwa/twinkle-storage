[[dialogue]]
speaker = "unk"
# 第２話,神出鬼没シスター,P
line = "第２話,神出鬼没シスター,P"

[[dialogue]]
speaker = "シャロン"
# 「おはようございます。会長さま、本日の体調はいかがですか？」
line = "「おはようございます。会長さま、本日の体調はいかがですか？」"

[[dialogue]]
speaker = "シャロン"
# 「おはようございますっ。お風邪など引いていませんか？」
line = "「おはようございますっ。お風邪など引いていませんか？」"

[[dialogue]]
speaker = "シャロン"
# 「おはようございます！　お元気ですか！？」
line = "「おはようございます！　お元気ですか！？」"

[[dialogue]]
speaker = "マトイ"
# 「シャロンさん、だんだん抑えられなくなってくるんだろうね……」
line = "「シャロンさん、だんだん抑えられなくなってくるんだろうね……」"

[[dialogue]]
speaker = "シャロン"
# 「お手伝いできることはありませんか？　炊事、洗濯、料理、修道院の生活で全て身につけておりますよ！」
line = "「お手伝いできることはありませんか？　炊事、洗濯、料理、修道院の生活で全て身につけておりますよ！」"

[[dialogue]]
speaker = "シャロン"
# 「喉は渇いていませんか？　お腹は空いていませんか？　ハンカチは忘れていませんか？」
line = "「喉は渇いていませんか？　お腹は空いていませんか？　ハンカチは忘れていませんか？」"

[[dialogue]]
speaker = "マトイ"
# （会長のお母さんかな？）
line = "（会長のお母さんかな？）"

[[dialogue]]
speaker = "unk"
# どうしてそんなに世話を焼くんだ？
line = "どうしてそんなに世話を焼くんだ？"

[[dialogue]]
speaker = "シャロン"
# 「おや。もしかしてご遠慮なされているのですか？」
line = "「おや。もしかしてご遠慮なされているのですか？」"

[[dialogue]]
speaker = "シャロン"
# 「女神様の加護は、この世界の生きとし生けるものに与えられるべきもの。そして私はシスター、女神様に仕える者」
line = "「女神様の加護は、この世界の生きとし生けるものに与えられるべきもの。そして私はシスター、女神様に仕える者」"

[[dialogue]]
speaker = "シャロン"
# 「つまり女神様に代わって、シスターである私が皆さまをお助けしているのです！」
line = "「つまり女神様に代わって、シスターである私が皆さまをお助けしているのです！」"

[[dialogue]]
speaker = "マトイ"
# 「そういうもの……？」
line = "「そういうもの……？」"

[[dialogue]]
speaker = "シャロン"
# 「マトイさまも何かお悩みなどありますか？　私が解決いたしますよ！」
line = "「マトイさまも何かお悩みなどありますか？　私が解決いたしますよ！」"

[[dialogue]]
speaker = "マトイ"
# 「え、私！？　う～ん……そうだなぁ……」
line = "「え、私！？　う～ん……そうだなぁ……」"

[[dialogue]]
speaker = "unk"
# 休日――
line = "休日――"

[[dialogue]]
speaker = "unk"
# 新星学園に転入してからずっと忙しいので、今日は落ち着いて勉強を……
line = "新星学園に転入してからずっと忙しいので、今日は落ち着いて勉強を……"

[[dialogue]]
speaker = "シャロン"
# 「おはようございます！」
line = "「おはようございます！」"

[[dialogue]]
speaker = "unk"
# 鍵は！？
line = "鍵は！？"

[[dialogue]]
speaker = "シャロン"
# 「会長さまのお母さまのお許しはいただきました！」
line = "「会長さまのお母さまのお許しはいただきました！」"

[[dialogue]]
speaker = "シャロン"
# 「ふっふっふ。この私に、そして女神様の愛に死角はありません。何かお力になれることはありませんかっ？」
line = "「ふっふっふ。この私に、そして女神様の愛に死角はありません。何かお力になれることはありませんかっ？」"

[[dialogue]]
speaker = "unk"
# じゃあ復習を手伝ってほしい
line = "じゃあ復習を手伝ってほしい"

[[dialogue]]
speaker = "シャロン"
# 「なるほど、転入する前と新星学園では進み方が違いますものね。私に任せてくださいっ」
line = "「なるほど、転入する前と新星学園では進み方が違いますものね。私に任せてくださいっ」"

[[dialogue]]
speaker = "シャロン"
# 「前の学校ではどの程度進んだのですか？　……ふむふむ、なるほど。新星学園ではここまでですね」
line = "「前の学校ではどの程度進んだのですか？　……ふむふむ、なるほど。新星学園ではここまでですね」"

[[dialogue]]
speaker = "シャロン"
# 「いえいえ、礼には及びません。このぐらいお安い御用です」
line = "「いえいえ、礼には及びません。このぐらいお安い御用です」"

[[dialogue]]
speaker = "シャロン"
# 「ところで……先日、フィーニスの塔に近づかれる会長さまとヴィーナスさま、それに流星学園のフィオナさまをお見かけしたのですが」
line = "「ところで……先日、フィーニスの塔に近づかれる会長さまとヴィーナスさま、それに流星学園のフィオナさまをお見かけしたのですが」"

[[dialogue]]
speaker = "シャロン"
# 「フィーニスの塔は、生徒はもちろん、何人も立ち入ることのできない聖地。シスターとして狼藉は見過ごせません」
line = "「フィーニスの塔は、生徒はもちろん、何人も立ち入ることのできない聖地。シスターとして狼藉は見過ごせません」"

[[dialogue]]
speaker = "シャロン"
# 「それに御前試合の際、前会長──ヴィーナスさまは会長さまのことを魔王だと仰っていました」
line = "「それに御前試合の際、前会長──ヴィーナスさまは会長さまのことを魔王だと仰っていました」"

[[dialogue]]
speaker = "シャロン"
# 「担当直入にお聞きします。会長さまは魔王なのですか？」
line = "「担当直入にお聞きします。会長さまは魔王なのですか？」"

[[dialogue]]
speaker = "unk"
# わからない
line = "わからない"

[[dialogue]]
speaker = "シャロン"
# 「わからないのですかっ！？」
line = "「わからないのですかっ！？」"

[[dialogue]]
speaker = "シャロン"
# 「まさか本人にもわからないとは思ってもみませんでした……。つまり魔王の自覚はないのですね？」
line = "「まさか本人にもわからないとは思ってもみませんでした……。つまり魔王の自覚はないのですね？」"

[[dialogue]]
speaker = "シャロン"
# 「ヴィーナスさまはどうして会長さまが魔王だと仰ったのでしょう？　そもそも魔王は古代の人物では？　謎ですね……」
line = "「ヴィーナスさまはどうして会長さまが魔王だと仰ったのでしょう？　そもそも魔王は古代の人物では？　謎ですね……」"

[[dialogue]]
speaker = "シャロン"
# 「ではフィーニスの塔では何をされていたのでしょう？　フィオナさまといえど、塔には簡単に踏み入れられないはずですが」
line = "「ではフィーニスの塔では何をされていたのでしょう？　フィオナさまといえど、塔には簡単に踏み入れられないはずですが」"

[[dialogue]]
speaker = "unk"
# 悪いことはしていない
line = "悪いことはしていない"

[[dialogue]]
speaker = "シャロン"
# 「ふむふむ……恥じ入ることは何もないと」
line = "「ふむふむ……恥じ入ることは何もないと」"

[[dialogue]]
speaker = "シャロン"
# 「わかりました。会長さまの真っ直ぐな目を信じましょう。シスターとしては問題ですが、会長さま方には何か理由があるのだと推察します」
line = "「わかりました。会長さまの真っ直ぐな目を信じましょう。シスターとしては問題ですが、会長さま方には何か理由があるのだと推察します」"

[[dialogue]]
speaker = "シャロン"
# 「しかしあなたが悪しき魔王であるならば、この私が女神様に代わって討ち果たします。よろしいですね？」
line = "「しかしあなたが悪しき魔王であるならば、この私が女神様に代わって討ち果たします。よろしいですね？」"

[[dialogue]]
speaker = "unk"
# その時はよろしく
line = "その時はよろしく"

[[dialogue]]
speaker = "シャロン"
# 「おや、ずいぶんと潔いご様子。悪に堕ちぬという自信の表れなのでしょうか」
line = "「おや、ずいぶんと潔いご様子。悪に堕ちぬという自信の表れなのでしょうか」"

[[dialogue]]
speaker = "シャロン"
# 「ええ、きっとそうなのでしょう。会長さまが世界を滅ぼすなんて、私には想像もできませんから」
line = "「ええ、きっとそうなのでしょう。会長さまが世界を滅ぼすなんて、私には想像もできませんから」"

[[dialogue]]
speaker = "シャロン"
# 「おっと、私ばかり質問してしまいましたね。会長さまも気になることがあればご質問ください」
line = "「おっと、私ばかり質問してしまいましたね。会長さまも気になることがあればご質問ください」"

[[dialogue]]
speaker = "シャロン"
# 「体重でもスリーサイズでも、私に隠し立てすることはありません。ちなみに好きな食べ物はシェパーズパイです！」
line = "「体重でもスリーサイズでも、私に隠し立てすることはありません。ちなみに好きな食べ物はシェパーズパイです！」"

[[dialogue]]
speaker = "シャロン"
# 「よければお台所をお借りして何かお作りしますが……今はお腹は空いてない？　さようですか。ちょっと残念です」
line = "「よければお台所をお借りして何かお作りしますが……今はお腹は空いてない？　さようですか。ちょっと残念です」"

[[dialogue]]
speaker = "シャロン"
# 「では勉強に戻りましょうか。せっかくですから、このままテスト対策もしてしまいましょう！」
line = "「では勉強に戻りましょうか。せっかくですから、このままテスト対策もしてしまいましょう！」"
