[[dialogue]]
speaker = "unk"
# 第１話,トワ先生と初めてのバレンタイン,P
line = "第１話,トワ先生と初めてのバレンタイン,P"

[[dialogue]]
speaker = "unk"
# トワちゃん先生と恋人になってから、初めて迎えるバレンタイン。
line = "トワちゃん先生と恋人になってから、初めて迎えるバレンタイン。"

[[dialogue]]
speaker = "unk"
# 俺は約束通り、その夜、星徒会室で彼女を待っていた。
line = "俺は約束通り、その夜、星徒会室で彼女を待っていた。"

[[dialogue]]
speaker = "トワ先生"
# 「失礼します。会長くん、お疲れ様♪」
line = "「失礼します。会長くん、お疲れ様♪」"

[[dialogue]]
speaker = "unk"
# お疲れ様。待ってたよ
line = "お疲れ様。待ってたよ"

[[dialogue]]
speaker = "トワ先生"
# 「う、うん。それじゃあ……今日はバレンタインということで――」
line = "「う、うん。それじゃあ……今日はバレンタインということで――」"

[[dialogue]]
speaker = "トワ先生"
# 「じゃ……じゃ～ん♪　なんとトワ先生も今回、バレンタインフォームに覚醒しちゃいました～」
line = "「じゃ……じゃ～ん♪　なんとトワ先生も今回、バレンタインフォームに覚醒しちゃいました～」"

[[dialogue]]
speaker = "unk"
# えぇっ！？　いつの間に！？
line = "えぇっ！？　いつの間に！？"

[[dialogue]]
speaker = "トワ先生"
# 「実は、イクシーちゃんたちと色々あってね～。そ、それで……どうかな？　ちょっとフリフリが多くて、少女趣味が強いかもしれないけど……」
line = "「実は、イクシーちゃんたちと色々あってね～。そ、それで……どうかな？　ちょっとフリフリが多くて、少女趣味が強いかもしれないけど……」"

[[dialogue]]
speaker = "unk"
# そんなことない！　めちゃくちゃ可愛いよ！
line = "そんなことない！　めちゃくちゃ可愛いよ！"

[[dialogue]]
speaker = "トワ先生"
# 「はわわっ！？　か、会長くん、そんなに力強く……！　あ、ありがとう<emoji=heart04>　嬉しいな……えへへへぇ<emoji=heart04>」
line = "「はわわっ！？　か、会長くん、そんなに力強く……！　あ、ありがとう<emoji=heart04>　嬉しいな……えへへへぇ<emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
# 「それでね……はい<emoji=heart04>　私、バレンタインチョコを作ってきたんだ。会長くん、受け取ってくださいっ……！」
line = "「それでね……はい<emoji=heart04>　私、バレンタインチョコを作ってきたんだ。会長くん、受け取ってくださいっ……！」"

[[dialogue]]
speaker = "unk"
# 緊張した様子で、彼女は可愛くラッピングされた小箱を差し出してくる。俺はそれを受け取り、お礼を言った。
line = "緊張した様子で、彼女は可愛くラッピングされた小箱を差し出してくる。俺はそれを受け取り、お礼を言った。"

[[dialogue]]
speaker = "トワ先生"
# 「う、うん……どういたしまして<emoji=heart04>　えへへ……<emoji=heart04>」
line = "「う、うん……どういたしまして<emoji=heart04>　えへへ……<emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
# 「――あっ、うん♪　もちろん食べて大丈夫だよ！」
line = "「――あっ、うん♪　もちろん食べて大丈夫だよ！」"

[[dialogue]]
speaker = "unk"
# 包装を開けると、中には小さなハート型のチョコがいくつも並んでいた。それを見て、トワちゃんは恥ずかしそうに指先をもじもじさせる。
line = "包装を開けると、中には小さなハート型のチョコがいくつも並んでいた。それを見て、トワちゃんは恥ずかしそうに指先をもじもじさせる。"

[[dialogue]]
speaker = "トワ先生"
# 「形は最初、ハート型ってあざと過ぎるかなぁって思ったんだけど……でも、恋人になってから初めてのバレンタインだし……思いっきり気持ち込めてみちゃった<emoji=heart04>」
line = "「形は最初、ハート型ってあざと過ぎるかなぁって思ったんだけど……でも、恋人になってから初めてのバレンタインだし……思いっきり気持ち込めてみちゃった<emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
# 「え？　――本命チョコって感じがして嬉しい？　えへへ……それなら、勇気出してよかった<emoji=heart04>」
line = "「え？　――本命チョコって感じがして嬉しい？　えへへ……それなら、勇気出してよかった<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺はそのうちの１つを手に取り、口に運ぶ。
line = "俺はそのうちの１つを手に取り、口に運ぶ。"

[[dialogue]]
speaker = "トワ先生"
# 「ど、どうかな……？　美味しくできてる……？」
line = "「ど、どうかな……？　美味しくできてる……？」"

[[dialogue]]
speaker = "unk"
# うん、うまいっ！　幸せな甘さだ
line = "うん、うまいっ！　幸せな甘さだ"

[[dialogue]]
speaker = "トワ先生"
# 「えへへ、よかったぁ～<emoji=heart04>　実はね、私、男の子にチョコを作るのはこれが初めてで……<emoji=heart04>　学生の頃は、友チョコを作って交換するくらいだったんだ」
line = "「えへへ、よかったぁ～<emoji=heart04>　実はね、私、男の子にチョコを作るのはこれが初めてで……<emoji=heart04>　学生の頃は、友チョコを作って交換するくらいだったんだ」"

[[dialogue]]
speaker = "トワ先生"
# 「――って、はわわっ！？　会長くん！？」
line = "「――って、はわわっ！？　会長くん！？」"

[[dialogue]]
speaker = "unk"
# 俺はそっと近づき、彼女の頬に手を添えて言う。
line = "俺はそっと近づき、彼女の頬に手を添えて言う。"

[[dialogue]]
speaker = "unk"
# 今日のトワちゃん、すごく可愛い
line = "今日のトワちゃん、すごく可愛い"

[[dialogue]]
speaker = "トワ先生"
# 「はうぅ……<emoji=heart04>　会長くん……<emoji=heart04>」
line = "「はうぅ……<emoji=heart04>　会長くん……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 頬を撫でながら顔を寄せると、トワちゃんは瞳を細め、小さく唇を突き出してくれた。俺はその唇に自分の唇を重ねる。
line = "頬を撫でながら顔を寄せると、トワちゃんは瞳を細め、小さく唇を突き出してくれた。俺はその唇に自分の唇を重ねる。"

[[dialogue]]
speaker = "トワ先生"
# 「んっ……<emoji=heart04>　ちゅっ……んちゅっ……<emoji=heart04>」
line = "「んっ……<emoji=heart04>　ちゅっ……んちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
# 「……はあぁ<emoji=heart04>　キス、チョコの味がする……<emoji=heart04>」
line = "「……はあぁ<emoji=heart04>　キス、チョコの味がする……<emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
# 「え……？　――バレンタインフォームが初々しくて可愛い……？　も、もしかすると、私の恋愛経験が初めてなのが反映されてたりするのかな……？」
line = "「え……？　――バレンタインフォームが初々しくて可愛い……？　も、もしかすると、私の恋愛経験が初めてなのが反映されてたりするのかな……？」"

[[dialogue]]
speaker = "トワ先生"
# 「先生としてはちょっと恥ずかしいけど……１人の女の子として好きな男の子にチョコを渡すって意味では、よかったかも……えへへ<emoji=heart04>」
line = "「先生としてはちょっと恥ずかしいけど……１人の女の子として好きな男の子にチョコを渡すって意味では、よかったかも……えへへ<emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
# 「――今日はもっとイチャイチャしたい……？　う、うん……私も……<emoji=heart04>」
line = "「――今日はもっとイチャイチャしたい……？　う、うん……私も……<emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
# 「先生ももう仕事は終わってるし、夜に２人きりだから……このまま、もう少しだけ……ね<emoji=heart04>」
line = "「先生ももう仕事は終わってるし、夜に２人きりだから……このまま、もう少しだけ……ね<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 彼女をそっと抱き寄せると、トワちゃんの小さな体が温かく震えた。
line = "彼女をそっと抱き寄せると、トワちゃんの小さな体が温かく震えた。"

[[dialogue]]
speaker = "トワ先生"
# 「ふあっ……<emoji=heart04>　恋人になってからしばらく経つのに、会長くんに抱き締められると、今でもドキドキしちゃう……<emoji=heart04>」
line = "「ふあっ……<emoji=heart04>　恋人になってからしばらく経つのに、会長くんに抱き締められると、今でもドキドキしちゃう……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺でドキドキしてくれて嬉しい
line = "俺でドキドキしてくれて嬉しい"

[[dialogue]]
speaker = "トワ先生"
# 「――男として、ちゃんと意識してもらえてるって思うから……？」
line = "「――男として、ちゃんと意識してもらえてるって思うから……？」"

[[dialogue]]
speaker = "トワ先生"
# 「じゃあ、会長くんも……ちゃんと私のこと、女の子として見てくれてるんだね<emoji=heart04>」
line = "「じゃあ、会長くんも……ちゃんと私のこと、女の子として見てくれてるんだね<emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
# 「こうして抱き合ってると、会長くんの心臓のドキドキが、私にも伝わってきてるから……<emoji=heart04>」
line = "「こうして抱き合ってると、会長くんの心臓のドキドキが、私にも伝わってきてるから……<emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
# 「ふふっ……そう思ったら、私もすごく嬉しくなっちゃう……<emoji=heart04>」
line = "「ふふっ……そう思ったら、私もすごく嬉しくなっちゃう……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# トワちゃんのこと、好きだから
line = "トワちゃんのこと、好きだから"

[[dialogue]]
speaker = "トワ先生"
# 「私も……<emoji=heart04>　ちゅっ<emoji=heart04>」
line = "「私も……<emoji=heart04>　ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# トワちゃんは俺の耳元にキスをして、そっと囁く。
line = "トワちゃんは俺の耳元にキスをして、そっと囁く。"

[[dialogue]]
speaker = "トワ先生"
# 「会長くん……大好き……<emoji=heart04>」
line = "「会長くん……大好き……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ……っ！！
line = "……っ！！"

[[dialogue]]
speaker = "unk"
# そんなふうに囁かれたら、男として抑えきれるはずもなく――
line = "そんなふうに囁かれたら、男として抑えきれるはずもなく――"

[[dialogue]]
speaker = "トワ先生"
# 「あっ<emoji=heart04>　会長くん……んっ……<emoji=heart04>　ちゅっ……んちゅっ……<emoji=heart04>」
line = "「あっ<emoji=heart04>　会長くん……んっ……<emoji=heart04>　ちゅっ……んちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# その日、俺たちは遅くまで、星徒会室に居残り続けてしまうのだった。
line = "その日、俺たちは遅くまで、星徒会室に居残り続けてしまうのだった。"
