[[dialogue]]
speaker = "ジュエリー"
# 「どうだい？　私と助手の愛の結晶、血染めのトマトパスタの味は」
line = "「どうだい？　私と助手の愛の結晶、血染めのトマトパスタの味は」"

[[dialogue]]
speaker = "unk"
# 美味しいけどネーミングが物騒！
line = "美味しいけどネーミングが物騒！"

[[dialogue]]
speaker = "ジュエリー"
# 「ふむ、言われてみればそうかもしれない」
line = "「ふむ、言われてみればそうかもしれない」"

[[dialogue]]
speaker = "ジュエリー"
# 「だけど愛する助手のために、不器用なりに頑張らせてもらったよ。……さて、次はイレーナさんの番だ」
line = "「だけど愛する助手のために、不器用なりに頑張らせてもらったよ。……さて、次はイレーナさんの番だ」"

[[dialogue]]
speaker = "イレーナ"
# 「はい。ですがジュエリーさん、いいのですか？」
line = "「はい。ですがジュエリーさん、いいのですか？」"

[[dialogue]]
speaker = "ジュエリー"
# 「ん？」
line = "「ん？」"

[[dialogue]]
speaker = "イレーナ"
# 「あなたにとって会長さんは愛しの存在。それは２人が仲睦まじく料理をしている姿からも見て取れました」
line = "「あなたにとって会長さんは愛しの存在。それは２人が仲睦まじく料理をしている姿からも見て取れました」"

[[dialogue]]
speaker = "イレーナ"
# 「そんな会長さん相手に、ふりとはいえ私が花嫁になるのは、あまりいい気がしないのではありませんか？」
line = "「そんな会長さん相手に、ふりとはいえ私が花嫁になるのは、あまりいい気がしないのではありませんか？」"

[[dialogue]]
speaker = "ジュエリー"
# 「ああ、遠慮することはないよ。今回はやむを得ない事態だし、私は理解のある妻だからね」
line = "「ああ、遠慮することはないよ。今回はやむを得ない事態だし、私は理解のある妻だからね」"

[[dialogue]]
speaker = "ジュエリー"
# 「それに、助手なら最後は私の隣に帰ってきてくれると信じているよ」
line = "「それに、助手なら最後は私の隣に帰ってきてくれると信じているよ」"

[[dialogue]]
speaker = "イレーナ"
# 「そ、そうですか……では──」
line = "「そ、そうですか……では──」"

[[dialogue]]
speaker = "unk"
# ジュエリーに代わって、今度はイレーナがキッチンに立つ。
line = "ジュエリーに代わって、今度はイレーナがキッチンに立つ。"

[[dialogue]]
speaker = "イレーナ"
# （あたしは教皇庁の宿舎で１人暮らししてるし、そこそこのものだったら普通にできちゃうけど……これ、花嫁修業なのよね）
line = "（あたしは教皇庁の宿舎で１人暮らししてるし、そこそこのものだったら普通にできちゃうけど……これ、花嫁修業なのよね）"

[[dialogue]]
speaker = "イレーナ"
# （あたしは花嫁で──いつもみたいな感じじゃなくて──花嫁が愛する旦那に振舞う料理として最適なものは……）
line = "（あたしは花嫁で──いつもみたいな感じじゃなくて──花嫁が愛する旦那に振舞う料理として最適なものは……）"

[[dialogue]]
speaker = "ジュエリー"
# 「悩んでいるようだね。助手に助けてもらわなくていいのかい？」
line = "「悩んでいるようだね。助手に助けてもらわなくていいのかい？」"

[[dialogue]]
speaker = "イレーナ"
# 「大丈夫ですよ。会長さんはソファに座ってゆっくりくつろいでいてください」
line = "「大丈夫ですよ。会長さんはソファに座ってゆっくりくつろいでいてください」"

[[dialogue]]
speaker = "unk"
# イレーナは微笑むと早速料理に取り掛かる。
line = "イレーナは微笑むと早速料理に取り掛かる。"

[[dialogue]]
speaker = "ジュエリー"
# 「慣れた手つきだ。もしかして料理は得意なのかい？」
line = "「慣れた手つきだ。もしかして料理は得意なのかい？」"

[[dialogue]]
speaker = "イレーナ"
# 「得意というほどでもありません。それこそ会長さんの料理の腕には敵わないと思います」
line = "「得意というほどでもありません。それこそ会長さんの料理の腕には敵わないと思います」"

[[dialogue]]
speaker = "イレーナ"
# 「それでも、お口に合うかどうかはわかりませんが頑張って作りますね」
line = "「それでも、お口に合うかどうかはわかりませんが頑張って作りますね」"

[[dialogue]]
speaker = "ジュエリー"
# 「なんとも甲斐甲斐しい新妻だね。夫冥利に尽きるというものじゃないかい？」
line = "「なんとも甲斐甲斐しい新妻だね。夫冥利に尽きるというものじゃないかい？」"

[[dialogue]]
speaker = "イレーナ"
# （……まったく、どうしてあたしがこんなことしなくちゃいけないのかしら）
line = "（……まったく、どうしてあたしがこんなことしなくちゃいけないのかしら）"

[[dialogue]]
speaker = "イレーナ"
# （っと、変なことは考えない方がいいわね。フィオナ会長やトワ先生の例から考えると、花嫁の気持ちも影響するみたいだから）
line = "（っと、変なことは考えない方がいいわね。フィオナ会長やトワ先生の例から考えると、花嫁の気持ちも影響するみたいだから）"

[[dialogue]]
speaker = "イレーナ"
# （あたしは花嫁……愛しの旦那様に美味しい料理を食べてもらいたい……喜んでる顔が見たい、と……）
line = "（あたしは花嫁……愛しの旦那様に美味しい料理を食べてもらいたい……喜んでる顔が見たい、と……）"

[[dialogue]]
speaker = "イレーナ"
# 「お待たせしました。どうぞお召し上がりください」
line = "「お待たせしました。どうぞお召し上がりください」"

[[dialogue]]
speaker = "ジュエリー"
# 「ほう、ティラミスか。食後のデザートというわけだね。これは美味しそうだ」
line = "「ほう、ティラミスか。食後のデザートというわけだね。これは美味しそうだ」"

[[dialogue]]
speaker = "unk"
# いただきます！
line = "いただきます！"

[[dialogue]]
speaker = "イレーナ"
# 「……お味の方は、いかがでしょうか？」
line = "「……お味の方は、いかがでしょうか？」"

[[dialogue]]
speaker = "unk"
# すごく美味しい！
line = "すごく美味しい！"

[[dialogue]]
speaker = "イレーナ"
# 「ふふ、それなら良かったです」
line = "「ふふ、それなら良かったです」"

[[dialogue]]
speaker = "ジュエリー"
# 「ふむ……」
line = "「ふむ……」"

[[dialogue]]
speaker = "イレーナ"
# 「……どうかなさいましたか？」
line = "「……どうかなさいましたか？」"

[[dialogue]]
speaker = "ジュエリー"
# 「なぜイレーナさんは立ったままなのか、と思ってね。せっかくだから助手の隣に座ればいいのに」
line = "「なぜイレーナさんは立ったままなのか、と思ってね。せっかくだから助手の隣に座ればいいのに」"

[[dialogue]]
speaker = "イレーナ"
# 「えっ……！？」
line = "「えっ……！？」"

[[dialogue]]
speaker = "ジュエリー"
# 「先ほども言ったが私に遠慮することはない。何なら助手にあーんして食べさせてあげればいい」
line = "「先ほども言ったが私に遠慮することはない。何なら助手にあーんして食べさせてあげればいい」"

[[dialogue]]
speaker = "イレーナ"
# （ちょ、何言い出すのよこの子！？）
line = "（ちょ、何言い出すのよこの子！？）"

[[dialogue]]
speaker = "ジュエリー"
# 「そういったことも花嫁修業の一環だと私は思うよ。愛しの助手よ、キミもそう思うだろう？」
line = "「そういったことも花嫁修業の一環だと私は思うよ。愛しの助手よ、キミもそう思うだろう？」"

[[dialogue]]
speaker = "unk"
# え、ええと……
line = "え、ええと……"

[[dialogue]]
speaker = "イレーナ"
# （ちょっと、そこであんたが照れたら余計に意識しちゃうじゃない！）
line = "（ちょっと、そこであんたが照れたら余計に意識しちゃうじゃない！）"

[[dialogue]]
speaker = "イレーナ"
# （でも、そうなのよね……これは花嫁修業……ウェディングフォームを解除するために、そういう事も必要なのかもしれないわ……）
line = "（でも、そうなのよね……これは花嫁修業……ウェディングフォームを解除するために、そういう事も必要なのかもしれないわ……）"

[[dialogue]]
speaker = "イレーナ"
# 「で、ではどうぞ……あーん」
line = "「で、ではどうぞ……あーん」"

[[dialogue]]
speaker = "イレーナ"
# 「……ど、どうですか？」
line = "「……ど、どうですか？」"

[[dialogue]]
speaker = "ジュエリー"
# 「うーん、やはり表情が硬いね……」
line = "「うーん、やはり表情が硬いね……」"

[[dialogue]]
speaker = "イレーナ"
