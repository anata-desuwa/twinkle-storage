line = "「だってそうでしょう？　本当のあたしはこんな感じだから」"

[[dialogue]]
speaker = "イレーナ"
# 「みんなが知ってるのは聖女のあたし。聖女じゃないあたしと結婚したいやつなんていないわよ」
line = "「みんなが知ってるのは聖女のあたし。聖女じゃないあたしと結婚したいやつなんていないわよ」"

[[dialogue]]
speaker = "unk"
