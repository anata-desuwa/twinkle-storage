[[dialogue]]
speaker = "イレーナ"
# 「ちょっと、ね……あたし、あの子ちょっと苦手かもしれないわ……」
line = "「ちょっと、ね……あたし、あの子ちょっと苦手かもしれないわ……」"

[[dialogue]]
speaker = "イレーナ"
