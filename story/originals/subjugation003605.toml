line = "「ジュエリーさんの思っているような素顔などありません。私の素顔と言うなら、今お見せしている私が素顔の私ですよ」"

[[dialogue]]
speaker = "ジュエリー"
# 「そうか……」
line = "「そうか……」"

[[dialogue]]
speaker = "ジュエリー"
