line = "「そんな神妙な顔をして、何を話していたんだい？」"

[[dialogue]]
speaker = "イレーナ"
# 「い、いえ……何でもありませんよ」
line = "「い、いえ……何でもありませんよ」"

[[dialogue]]
speaker = "ジュエリー"
# 「ふむ……」
line = "「ふむ……」"

[[dialogue]]
