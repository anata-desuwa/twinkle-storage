line = "「疑問……？　どういうことでしょう？」"

[[dialogue]]
speaker = "ジュエリー"
# 「キミは慈しみ深く、誰に対しても優しい、完璧な聖女だと思われている」
line = "「キミは慈しみ深く、誰に対しても優しい、完璧な聖女だと思われている」"

[[dialogue]]
speaker = "ジュエリー"
# 「だがキミには、まだ人に見せていない意外な一面があるんじゃないかと思っていてね」
line = "「だがキミには、まだ人に見せていない意外な一面があるんじゃないかと思っていてね」"

[[dialogue]]
speaker = "ジュエリー"
# 「キミの花嫁修業の様子をずっと見させてもらっていたのだけど……どうにもぎこちなさを感じてならないんだ」
line = "「キミの花嫁修業の様子をずっと見させてもらっていたのだけど……どうにもぎこちなさを感じてならないんだ」"

[[dialogue]]
speaker = "ジュエリー"
# 「結婚とは互いの真実をさらけ出すもの」
line = "「結婚とは互いの真実をさらけ出すもの」"

[[dialogue]]
speaker = "ジュエリー"
