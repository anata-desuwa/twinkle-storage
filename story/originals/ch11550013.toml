line = "「違うの！？　うう～っ、残念すぎるよ！　こんな可愛いのに、魔法少女じゃないなんて！」"

[[dialogue]]
speaker = "いろは"
# 「はっ、待って！　トレちぇりにいた！　魔法少女じゃないけど、いつもちえりちゃんと一緒にいて、戦いの記録を撮影している女の子！」
line = "「はっ、待って！　トレちぇりにいた！　魔法少女じゃないけど、いつもちえりちゃんと一緒にいて、戦いの記録を撮影している女の子！」"

