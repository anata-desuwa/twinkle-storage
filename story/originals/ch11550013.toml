speaker = "いろは"
# 「はっ？　う、うん……冷静になる……」
line = "「はっ？　う、うん……冷静になる……」"

[[dialogue]]
speaker = "トマル"
# 「大変紛らわしくて、申し訳ございません……」
line = "「大変紛らわしくて、申し訳ございません……」"

[[dialogue]]
speaker = "いろは"
# 「ううん、こんだけ可愛かったら大したものだよ！」
line = "「ううん、こんだけ可愛かったら大したものだよ！」"

