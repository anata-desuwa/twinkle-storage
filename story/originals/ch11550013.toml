speaker = "いろは"
# 「触ってみた感じ、やわらかモチモチ、女の子のお尻って感じだね」
line = "「触ってみた感じ、やわらかモチモチ、女の子のお尻って感じだね」"

[[dialogue]]
speaker = "シズハ"
# 「そうなんですよ。男の子のお尻というには少々、柔らかすぎる揉み心地……いやもちろん、男子のお尻にはそれ独自の美しさと良さがあるんですけどね？」
line = "「そうなんですよ。男の子のお尻というには少々、柔らかすぎる揉み心地……いやもちろん、男子のお尻にはそれ独自の美しさと良さがあるんですけどね？」"

[[dialogue]]
speaker = "トマル"
# 「あぅ……！　シズハさままで……お尻を、揉まないで……」
line = "「あぅ……！　シズハさままで……お尻を、揉まないで……」"

[[dialogue]]
speaker = "いろは"
# 「トマルちゃん、今なら間に合うよ！　実は女の子でしたってことにしとこう！」
line = "「トマルちゃん、今なら間に合うよ！　実は女の子でしたってことにしとこう！」"

[[dialogue]]
speaker = "トマル"
# 「間に合うって何ですか！　意味がわかりませんっ」
line = "「間に合うって何ですか！　意味がわかりませんっ」"

[[dialogue]]
speaker = "シズハ"
# 「お姉さんみたいな素敵な女の子になるのが夢なんでしょう？」
line = "「お姉さんみたいな素敵な女の子になるのが夢なんでしょう？」"

[[dialogue]]
speaker = "トマル"
# 「そ、それはそうなんですけどっ！　本当に私は男なんですっ！！」
line = "「そ、それはそうなんですけどっ！　本当に私は男なんですっ！！」"

[[dialogue]]
speaker = "いろは"
# 「そこまで言うなら仕方がないね。最後の方法で確認するしかないよ……」
line = "「そこまで言うなら仕方がないね。最後の方法で確認するしかないよ……」"

[[dialogue]]
speaker = "シズハ"
# 「ごくり……最後の方法？　それって、まさか……」
line = "「ごくり……最後の方法？　それって、まさか……」"

[[dialogue]]
speaker = "いろは"
# 「前を触って確かめる！」
line = "「前を触って確かめる！」"

[[dialogue]]
