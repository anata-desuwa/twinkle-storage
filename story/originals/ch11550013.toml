line = "「何をしてるんですか、こんなところでハレンチな！」"

[[dialogue]]
speaker = "いろは"
# 「ええと、トマルちゃんが本当に男の子なのか触って確かめようと……」
line = "「ええと、トマルちゃんが本当に男の子なのか触って確かめようと……」"

[[dialogue]]
speaker = "サチ"
