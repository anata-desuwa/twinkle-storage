speaker = "トマル"
# 「そんなことはありませんよ。私はまぎれもなく男子です」
line = "「そんなことはありませんよ。私はまぎれもなく男子です」"

[[dialogue]]
speaker = "いろは"
# 「…………えいっ」
line = "「…………えいっ」"

[[dialogue]]
speaker = "トマル"
# 「きゃっ！！」
