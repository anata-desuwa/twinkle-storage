# 「え……サチちゃんは見たことあるの？」
line = "「え……サチちゃんは見たことあるの？」"

[[dialogue]]
speaker = "サチ"
# 「見たこと、は……ありませんけど……トマルくんのお姉さんのマトイ先輩がそう言ってるんですから、間違いありません！」
line = "「見たこと、は……ありませんけど……トマルくんのお姉さんのマトイ先輩がそう言ってるんですから、間違いありません！」"

[[dialogue]]
speaker = "いろは"
# 「自分の目で確かめたわけじゃないんだ。だったら絶対に間違いないって言い切れないよね？」
line = "「自分の目で確かめたわけじゃないんだ。だったら絶対に間違いないって言い切れないよね？」"

[[dialogue]]
speaker = "サチ"
# 「そ、それは……」
line = "「そ、それは……」"

[[dialogue]]
speaker = "シズハ"
# 「サチちゃん、ここは真実をはっきりさせておこうよ！　トマルくんだってその方がいいよね？」
line = "「サチちゃん、ここは真実をはっきりさせておこうよ！　トマルくんだってその方がいいよね？」"

[[dialogue]]
