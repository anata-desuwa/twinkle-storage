line = "「あの……トモカではなくトマルです。それに私は──」"

[[dialogue]]
speaker = "いろは"
# 「このおしとやかで上品な感じ、サチちゃんやプリちゃん、シズシズやアンナちゃんとも違って新鮮だな～」
line = "「このおしとやかで上品な感じ、サチちゃんやプリちゃん、シズシズやアンナちゃんとも違って新鮮だな～」"

