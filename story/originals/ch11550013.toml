line = "「ええええええええええええええっ！！！！！！？？？」"

[[dialogue]]
speaker = "いろは"
# 「男の子？　こんなに可愛いのに？」
line = "「男の子？　こんなに可愛いのに？」"

[[dialogue]]
speaker = "いろは"
# 「ううん、こんなに可愛いからこそ、女の子であるはずがないのかも……え？　あれ、あたし何を言ってるの？」
line = "「ううん、こんなに可愛いからこそ、女の子であるはずがないのかも……え？　あれ、あたし何を言ってるの？」"

[[dialogue]]
speaker = "シズハ"
# 「いろはさーん、冷静になってくださーい」
line = "「いろはさーん、冷静になってくださーい」"

