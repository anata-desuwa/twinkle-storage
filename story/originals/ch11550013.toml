speaker = "シズハ"
# 「トマルくん、実は自分のことを男の子だって思い込んでるだけの、ただの美少女だったりしない？」
line = "「トマルくん、実は自分のことを男の子だって思い込んでるだけの、ただの美少女だったりしない？」"

