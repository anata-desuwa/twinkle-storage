line = "「か、可愛いすぎるんですけど……！」"

[[dialogue]]
speaker = "シズハ"
# 「正直私も、まだトマルくんのこと男の子だって信じられないんだよね。だってこんなに可愛いんだもん」
line = "「正直私も、まだトマルくんのこと男の子だって信じられないんだよね。だってこんなに可愛いんだもん」"

