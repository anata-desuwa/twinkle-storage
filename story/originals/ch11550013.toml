# 「お願いサチちゃん！　もう気になって気になって、確かめないではいられないんだよ！」
line = "「お願いサチちゃん！　もう気になって気になって、確かめないではいられないんだよ！」"

[[dialogue]]
speaker = "サチ"
# 「いくら頼み込まれたってダメです！　エッチなことはぜぇーーーーったい、許しませんっ！！！」
line = "「いくら頼み込まれたってダメです！　エッチなことはぜぇーーーーったい、許しませんっ！！！」"

[[dialogue]]
speaker = "unk"
# それでも好奇心を抑えられずに、トマルの性別を確かめようとする懲りないいろは。
line = "それでも好奇心を抑えられずに、トマルの性別を確かめようとする懲りないいろは。"

[[dialogue]]
speaker = "unk"
# そんないろはを、声が枯れるまでサチはお説教し続けることになったのだった。
line = "そんないろはを、声が枯れるまでサチはお説教し続けることになったのだった。"
