[[dialogue]]
speaker = "unk"
# 第２話,失望,B
line = "第２話,失望,B"

[[dialogue]]
speaker = "ギエル"
# 「──ふぅ」
line = "「──ふぅ」"

[[dialogue]]
speaker = "ギエル"
# （ここへ来ると……少々、昔を思い出してしまいますね）
line = "（ここへ来ると……少々、昔を思い出してしまいますね）"

[[dialogue]]
speaker = "unk"
# 希崎レイトとして生を受けた青年は、ギエルという名を<ruby=たまわ>賜</ruby>って生まれ変わった。
line = "希崎レイトとして生を受けた青年は、ギエルという名を<ruby>賜<rt>たまわ</rt></ruby>って生まれ変わった。"

[[dialogue]]
speaker = "unk"
# アポロの従者として『新月』の星力を分け与えられた彼は、ようやく念願の何者かたる力を手にした。
line = "アポロの従者として『新月』の星力を分け与えられた彼は、ようやく念願の何者かたる力を手にした。"

[[dialogue]]
speaker = "ギエル"
# （アポロ様……あなたに出会えたことが、私にとって唯一の幸運）
line = "（アポロ様……あなたに出会えたことが、私にとって唯一の幸運）"

[[dialogue]]
speaker = "unk"
# 青年のアイデンティティはいつしかギエルそのものに染まった。
line = "青年のアイデンティティはいつしかギエルそのものに染まった。"

[[dialogue]]
speaker = "unk"
# 主アポロが野望へ向かって突き進む限り──その身が尽き果てようとも、執事として永劫仕えることを誓っていた。
line = "主アポロが野望へ向かって突き進む限り──その身が尽き果てようとも、執事として永劫仕えることを誓っていた。"

[[dialogue]]
speaker = "避難する女性"
# 「はぁっ、はぁっ……ッ……も、もうダメ──っ……！」
line = "「はぁっ、はぁっ……ッ……も、もうダメ──っ……！」"

[[dialogue]]
speaker = "エリス"
# 「諦めないで──！　私たちが最後まで、皆さんを守り抜きますから──！」
line = "「諦めないで──！　私たちが最後まで、皆さんを守り抜きますから──！」"

[[dialogue]]
speaker = "ギエル"
# 「さて……宴も佳境と言ったところですが」
line = "「さて……宴も佳境と言ったところですが」"

[[dialogue]]
speaker = "ギエル"
# 「ふふ……粘りますねえ。ですが無駄ですよ、星騎士の皆さん──くくくっ！」
line = "「ふふ……粘りますねえ。ですが無駄ですよ、星騎士の皆さん──くくくっ！」"

[[dialogue]]
speaker = "馬人型モンスター"
# 「──ヒヒイイイイイィィィィン────！！」
line = "「──ヒヒイイイイイィィィィン────！！」"

[[dialogue]]
speaker = "unk"
# ギエルは生まれくるモンスターたちを操り、破壊の狂想曲を奏でていた。
line = "ギエルは生まれくるモンスターたちを操り、破壊の狂想曲を奏でていた。"

[[dialogue]]
speaker = "教皇庁の衛兵Ａ"
# 「──あいつだ！　あいつがモンスターたちを指揮してるぞ！」
line = "「──あいつだ！　あいつがモンスターたちを指揮してるぞ！」"

[[dialogue]]
speaker = "教皇庁の衛兵Ｂ"
# 「あの男は……仮面の少女ほど強くない！　抑えろ──！」
line = "「あの男は……仮面の少女ほど強くない！　抑えろ──！」"

[[dialogue]]
speaker = "ギエル"
# 「やれやれ……舐められたものですねえ。死ぬがよろしい」
line = "「やれやれ……舐められたものですねえ。死ぬがよろしい」"

[[dialogue]]
speaker = "教皇庁の衛兵Ｂ"
# 「がはっ────！？」
line = "「がはっ────！？」"

[[dialogue]]
speaker = "教皇庁の衛兵Ａ"
# 「ひ……ひいい────！？」
line = "「ひ……ひいい────！？」"

[[dialogue]]
speaker = "エリス"
# 「あなた──！」
line = "「あなた──！」"

[[dialogue]]
speaker = "ギエル"
# 「──ふはははは！　ご安心めされよ人の子よ、じきに全ての命はゼロへ還るのですから！」
line = "「──ふはははは！　ご安心めされよ人の子よ、じきに全ての命はゼロへ還るのですから！」"

[[dialogue]]
speaker = "unk"
# 『新月』の星術をふるい──ギエルは街を蹂躙していく。
line = "『新月』の星術をふるい──ギエルは街を蹂躙していく。"

[[dialogue]]
speaker = "unk"
# すべては魂をも捧げた主のために。
line = "すべては魂をも捧げた主のために。"

[[dialogue]]
speaker = "unk"
# だが……そんな彼の愉悦も、長くは続かなかった。
line = "だが……そんな彼の愉悦も、長くは続かなかった。"

[[dialogue]]
speaker = "ギエル"
# 「え……？」
line = "「え……？」"

[[dialogue]]
speaker = "喜ぶ市民"
# 「空が……空が戻ったぞ！」
line = "「空が……空が戻ったぞ！」"

[[dialogue]]
speaker = "エリス"
# 「建物も元に戻って……！」
line = "「建物も元に戻って……！」"

[[dialogue]]
speaker = "ウィステリア"
# 「星術のコンディションも完全に復活したようね──これなら不足はないわ！」
line = "「星術のコンディションも完全に復活したようね──これなら不足はないわ！」"

[[dialogue]]
speaker = "unk"
# 天を覆っていた異色の空が、晴れやかな蒼穹へと変わった。
line = "天を覆っていた異色の空が、晴れやかな蒼穹へと変わった。"

[[dialogue]]
speaker = "unk"
# 立ちどころに戻っていく異変に、市民らは歓喜に湧いた。
line = "立ちどころに戻っていく異変に、市民らは歓喜に湧いた。"

[[dialogue]]
speaker = "unk"
# ギエルは天を仰いだ。
line = "ギエルは天を仰いだ。"

[[dialogue]]
speaker = "unk"
# フィーニスの塔の頂上で生じた異変──
line = "フィーニスの塔の頂上で生じた異変──"

[[dialogue]]
speaker = "ギエル"
# 「アポロ……様……？」
line = "「アポロ……様……？」"

[[dialogue]]
speaker = "unk"
# 同時に『天蓋』の解除をも察したギエルは、主に何が起きたのかを理解してしまった。
line = "同時に『天蓋』の解除をも察したギエルは、主に何が起きたのかを理解してしまった。"

[[dialogue]]
speaker = "unk"
# 誰よりもアポロの近くで仕えてきた彼だからこそ──その波動の変質に、気づかずにはいられない。
line = "誰よりもアポロの近くで仕えてきた彼だからこそ──その波動の変質に、気づかずにはいられない。"

[[dialogue]]
speaker = "unk"
# そして、希崎レイト青年の胸に去来したのは、あの日ぶりに味わう絶望の色だった。
line = "そして、希崎レイト青年の胸に去来したのは、あの日ぶりに味わう絶望の色だった。"

[[dialogue]]
speaker = "ギエル"
# （……ああ）
line = "（……ああ）"

[[dialogue]]
speaker = "ギエル"
# （残念です……アポロ様。あなたこそ、我が永劫の主であると信じていたのに）
line = "（残念です……アポロ様。あなたこそ、我が永劫の主であると信じていたのに）"

[[dialogue]]
speaker = "unk"
# それは新月のごとき澄んだ暗さだった。
line = "それは新月のごとき澄んだ暗さだった。"

[[dialogue]]
speaker = "unk"
# ぽつりとこの世に落ちたひと粒の影が、フィーニスの塔へ向けて飛び立った。
line = "ぽつりとこの世に落ちたひと粒の影が、フィーニスの塔へ向けて飛び立った。"
