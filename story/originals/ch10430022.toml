[[dialogue]]
speaker = "unk"
# 第２話,遊園地ノスタルジー,P
line = "第２話,遊園地ノスタルジー,P"

[[dialogue]]
speaker = "unk"
# とある週末。
line = "とある週末。"

[[dialogue]]
speaker = "unk"
# 俺はサチと遊園地へデートにやって来ていた――
line = "俺はサチと遊園地へデートにやって来ていた――"

[[dialogue]]
speaker = "サチ"
# 「わぁ～♪　懐かしい。この遊園地へ来るの、すごく久しぶりです♪」
line = "「わぁ～♪　懐かしい。この遊園地へ来るの、すごく久しぶりです♪」"

[[dialogue]]
speaker = "サチ"
# 「それじゃあ、お兄さん。早速、決めておいた通りに行きましょうか♪」
line = "「それじゃあ、お兄さん。早速、決めておいた通りに行きましょうか♪」"

[[dialogue]]
speaker = "unk"
# そう言って、サチはちょっと照れ臭そうに、俺の手を握ってくる。
line = "そう言って、サチはちょっと照れ臭そうに、俺の手を握ってくる。"

[[dialogue]]
speaker = "サチ"
# 「んっ♪　えへへ<emoji=heart04>」
line = "「んっ♪　えへへ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 先週のある日。
line = "先週のある日。"

[[dialogue]]
speaker = "サチ"
# 「お兄さん、次のデートに当たって、今まで<b>ふわっと</b>していたところを、決めておきたいと思います！」
line = "「お兄さん、次のデートに当たって、今まで<b>ふわっと</b>していたところを、決めておきたいと思います！」"

[[dialogue]]
speaker = "サチ"
# 「それは――デート中に手を握って良いのか、悪いのかということです！」
line = "「それは――デート中に手を握って良いのか、悪いのかということです！」"

[[dialogue]]
speaker = "unk"
# 普通に握っても大丈夫だよ？
line = "普通に握っても大丈夫だよ？"

[[dialogue]]
speaker = "サチ"
# 「そ、それは恋人ですから、わかってますけど……いざ握ろうかなと思うと、ちょっとエッチかも……とか思っちゃうものなんです！」
line = "「そ、それは恋人ですから、わかってますけど……いざ握ろうかなと思うと、ちょっとエッチかも……とか思っちゃうものなんです！」"

[[dialogue]]
speaker = "unk"
# エッチ？？？
line = "エッチ？？？"

[[dialogue]]
speaker = "サチ"
# 「だ、だって……一応その、肌を合わせる行為ですし……とにかく！　次のデートは――最初から手を繋いでも大丈夫でしょうか！？」
line = "「だ、だって……一応その、肌を合わせる行為ですし……とにかく！　次のデートは――最初から手を繋いでも大丈夫でしょうか！？」"

[[dialogue]]
speaker = "unk"
# と、そんなサチらしい面白いやり取りがあって、今日は彼女の方から手を繋いでくれている。
line = "と、そんなサチらしい面白いやり取りがあって、今日は彼女の方から手を繋いでくれている。"

[[dialogue]]
speaker = "unk"
# それだけでも、十分に嬉しいのだが――
line = "それだけでも、十分に嬉しいのだが――"

[[dialogue]]
speaker = "サチ"
# 「って、どうしました、お兄さん？　……えっ？　恋人繋ぎはしても良いのか悪いのか、決めてなかった？」
line = "「って、どうしました、お兄さん？　……えっ？　恋人繋ぎはしても良いのか悪いのか、決めてなかった？」"

[[dialogue]]
speaker = "サチ"
# 「そ、それは、さすがに……エッチだから禁止です！」
line = "「そ、それは、さすがに……エッチだから禁止です！」"

[[dialogue]]
speaker = "サチ"
# 「だって、指を絡めるとか……人前だと、恥ずかし過ぎるじゃないですか……」
line = "「だって、指を絡めるとか……人前だと、恥ずかし過ぎるじゃないですか……」"

[[dialogue]]
speaker = "unk"
# ２人だけの時はいいんだ？
line = "２人だけの時はいいんだ？"

[[dialogue]]
speaker = "サチ"
# 「う……も、もう、お兄さんってば！　そういうことを言わせようとするなんて、エッチですよ……！」
line = "「う……も、もう、お兄さんってば！　そういうことを言わせようとするなんて、エッチですよ……！」"

[[dialogue]]
speaker = "unk"
# 恥ずかしそうに顔を赤くするサチが可愛くて、俺はつい顔が綻んでしまうのだった。
line = "恥ずかしそうに顔を赤くするサチが可愛くて、俺はつい顔が綻んでしまうのだった。"

[[dialogue]]
speaker = "unk"
# それから、俺たちはまずジェットコースターに乗ることになり――
line = "それから、俺たちはまずジェットコースターに乗ることになり――"

[[dialogue]]
speaker = "サチ"
# 「わぁ～っ！　すごいです、お兄さん！　星力なしでこんなにスピードが出て！」
line = "「わぁ～っ！　すごいです、お兄さん！　星力なしでこんなにスピードが出て！」"

[[dialogue]]
speaker = "サチ"
# 「子供の時は乗れなかったけど、ジェットコースターってこんな面白いんですね！」
line = "「子供の時は乗れなかったけど、ジェットコースターってこんな面白いんですね！」"

[[dialogue]]
speaker = "サチ"
# 「高い所の景色は見慣れたものですけど……余裕がある分、スピードを全力で楽しめるっていうか～！　きゃ～っ♪」
line = "「高い所の景色は見慣れたものですけど……余裕がある分、スピードを全力で楽しめるっていうか～！　きゃ～っ♪」"

[[dialogue]]
speaker = "サチ"
# 「急カーブすご～い！　あはははっ♪　あはははっ♪」
line = "「急カーブすご～い！　あはははっ♪　あはははっ♪」"

[[dialogue]]
speaker = "unk"
# （子供みたいにはしゃいで可愛いな……）
line = "（子供みたいにはしゃいで可愛いな……）"

[[dialogue]]
speaker = "サチ"
# 「あっ！　お兄さん、すごいアップダウンが来ますよ！　――きゃあ～っ♪　あはははははっ♪」
line = "「あっ！　お兄さん、すごいアップダウンが来ますよ！　――きゃあ～っ♪　あはははははっ♪」"

[[dialogue]]
speaker = "unk"
# そうして、いくつもの絶叫マシーンに乗って楽しんだ後……
line = "そうして、いくつもの絶叫マシーンに乗って楽しんだ後……"

[[dialogue]]
speaker = "unk"
# 俺たちは休憩も兼ねて、観覧車に乗ることにした。
line = "俺たちは休憩も兼ねて、観覧車に乗ることにした。"

[[dialogue]]
speaker = "unk"
# 手を繋ぎながら、横に並んで席に座っていると――
line = "手を繋ぎながら、横に並んで席に座っていると――"

[[dialogue]]
speaker = "サチ"
# 「……なんだかこうして観覧車に乗っていると、昔、両親と一緒にここへ来た時のことを思い出します」
line = "「……なんだかこうして観覧車に乗っていると、昔、両親と一緒にここへ来た時のことを思い出します」"

[[dialogue]]
speaker = "unk"
# ふと、サチが外の景色を眺めながら言った。
line = "ふと、サチが外の景色を眺めながら言った。"

[[dialogue]]
speaker = "unk"
# 両親はずっと流星市国に住んでるんだっけ？
line = "両親はずっと流星市国に住んでるんだっけ？"

[[dialogue]]
speaker = "サチ"
# 「はい。お父さんは流星市国出身の人間で、お母さんは魔族で……元星騎士なんです」
line = "「はい。お父さんは流星市国出身の人間で、お母さんは魔族で……元星騎士なんです」"

[[dialogue]]
speaker = "サチ"
# 「……昔は、両親と休日によくお出かけしたりもしたんですけど、私が附属校に入学してから、色々忙しくなって――」
line = "「……昔は、両親と休日によくお出かけしたりもしたんですけど、私が附属校に入学してから、色々忙しくなって――」"

[[dialogue]]
speaker = "サチ"
# 「星騎士としての訓練に、生徒会や魔法少女の活動……やるべきことが増えて、私、家族と過ごす時間が少なくなっちゃってました」
line = "「星騎士としての訓練に、生徒会や魔法少女の活動……やるべきことが増えて、私、家族と過ごす時間が少なくなっちゃってました」"

[[dialogue]]
speaker = "サチ"
# 「今日、遊園地に来たおかげで、そのことを思い出せました。今度一緒にどこか出かけようって誘ってみるのも、いいかもしれませんね」
line = "「今日、遊園地に来たおかげで、そのことを思い出せました。今度一緒にどこか出かけようって誘ってみるのも、いいかもしれませんね」"

[[dialogue]]
speaker = "サチ"
# 「え？　――せっかくだから、遊園地に誘ってみるのはどうか……ですか？　でも……」
line = "「え？　――せっかくだから、遊園地に誘ってみるのはどうか……ですか？　でも……」"

[[dialogue]]
speaker = "サチ"
# 「一緒に遊園地に行きたいなんて……小さい子みたいで、お父さんお母さん、変に思わないでしょうか？」
line = "「一緒に遊園地に行きたいなんて……小さい子みたいで、お父さんお母さん、変に思わないでしょうか？」"

[[dialogue]]
speaker = "unk"
# その時は俺も協力するよ
line = "その時は俺も協力するよ"

[[dialogue]]
speaker = "サチ"
# 「お兄さん……。ありがとうございます」
line = "「お兄さん……。ありがとうございます」"

[[dialogue]]
speaker = "サチ"
# 「でも、１つ問題があって……」
line = "「でも、１つ問題があって……」"

[[dialogue]]
speaker = "サチ"
# 「実は……お父さんお母さんには、お兄さんと付き合っていること、まだ話してないんです」
line = "「実は……お父さんお母さんには、お兄さんと付き合っていること、まだ話してないんです」"

[[dialogue]]
speaker = "unk"
# う……そっか。まずはそこからか……
line = "う……そっか。まずはそこからか……"

[[dialogue]]
speaker = "サチ"
# 「なので……よかったら今度、うちに挨拶とか――来てくれたりしますか？」
line = "「なので……よかったら今度、うちに挨拶とか――来てくれたりしますか？」"

[[dialogue]]
speaker = "unk"
# 可愛い彼女から期待のこもった上目遣いでそんな風に言われれば、男として頑張りますと答えざるを得ない。
line = "可愛い彼女から期待のこもった上目遣いでそんな風に言われれば、男として頑張りますと答えざるを得ない。"

[[dialogue]]
speaker = "サチ"
# 「ふふっ♪　その顔。リクリエを退けちゃうお兄さんも、こういうことは苦手なんですね♪」
line = "「ふふっ♪　その顔。リクリエを退けちゃうお兄さんも、こういうことは苦手なんですね♪」"

[[dialogue]]
speaker = "サチ"
# 「大丈夫ですよ。私も協力します」
line = "「大丈夫ですよ。私も協力します」"

[[dialogue]]
speaker = "サチ"
# 「私は――お兄さんの彼女ですから♪」
line = "「私は――お兄さんの彼女ですから♪」"

[[dialogue]]
speaker = "unk"
# そう言って、サチは繋いだ手を１度放して――それから指を絡めて、恋人繋ぎにし直す。
line = "そう言って、サチは繋いだ手を１度放して――それから指を絡めて、恋人繋ぎにし直す。"

[[dialogue]]
speaker = "サチ"
# 「今は２人きりなので……ちょっとだけ解禁です♪」
line = "「今は２人きりなので……ちょっとだけ解禁です♪」"

[[dialogue]]
speaker = "サチ"
# 「えへへ<emoji=heart04>」
line = "「えへへ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 耳元で囁きながら、照れながらも笑うサチなのだった――
line = "耳元で囁きながら、照れながらも笑うサチなのだった――"
