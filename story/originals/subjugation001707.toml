[[dialogue]]
speaker = "unk"
# 俺がいない間も、当然、演劇部で稽古は続いていた。
line = "俺がいない間も、当然、演劇部で稽古は続いていた。"

[[dialogue]]
speaker = "unk"
# お疲れさまです
line = "お疲れさまです"

[[dialogue]]
speaker = "メイプル"
# 「やっと、お兄ちゃんが来てくれた～！」
line = "「やっと、お兄ちゃんが来てくれた～！」"

[[dialogue]]
speaker = "藍"
# 「あっ……か、会長さん……お疲れさまです」
line = "「あっ……か、会長さん……お疲れさまです」"

[[dialogue]]
speaker = "ロクサーナ"
# 「いいところに来た。ウチの主演女優はモブの男性部員が相手だと、どうしてもぎこちなくなってしまうんでな。早速だが、すぐに入ってくれ、ロミオ」
line = "「いいところに来た。ウチの主演女優はモブの男性部員が相手だと、どうしてもぎこちなくなってしまうんでな。早速だが、すぐに入ってくれ、ロミオ」"

[[dialogue]]
speaker = "藍"
# 「あっ……♪　よ、よろしくお願いします、会長さん」
line = "「あっ……♪　よ、よろしくお願いします、会長さん」"

[[dialogue]]
speaker = "ロクサーナ"
# 「おっ……？」
line = "「おっ……？」"

[[dialogue]]
speaker = "メイプル"
# 「あれれ……？」
line = "「あれれ……？」"

[[dialogue]]
speaker = "ロクサーナ"
# 「では、先ほどの続きから行くぞ。第一幕第五場。仮面舞踏会での出会い、そして、キスシーンだ！　アクション！」
line = "「では、先ほどの続きから行くぞ。第一幕第五場。仮面舞踏会での出会い、そして、キスシーンだ！　アクション！」"

[[dialogue]]
speaker = "unk"
# 私の罪はあなたの唇によって清められました
line = "私の罪はあなたの唇によって清められました"

[[dialogue]]
speaker = "ジュリエット"
# 「──んっ……どうしましょう、私の唇はあなたの罪で穢れてしまいました」
line = "「──んっ……どうしましょう、私の唇はあなたの罪で穢れてしまいました」"

[[dialogue]]
speaker = "unk"
# では、その罪を私に戻してもらいましょう
line = "では、その罪を私に戻してもらいましょう"

[[dialogue]]
speaker = "ジュリエット"
# 「──んぅ……お上手な接吻ですこと」
line = "「──んぅ……お上手な接吻ですこと」"

[[dialogue]]
speaker = "メイプル"
# 「ひゃあっ……！　え、本当にはキスしてないよね？」
line = "「ひゃあっ……！　え、本当にはキスしてないよね？」"

[[dialogue]]
speaker = "ロクサーナ"
# 「本当にしてしまったのではと見間違うほどの熱の入り方だ。よし、これで欠けていたピースが埋まった！」
line = "「本当にしてしまったのではと見間違うほどの熱の入り方だ。よし、これで欠けていたピースが埋まった！」"

[[dialogue]]
speaker = "ロクサーナ"
# 「会長！　正式にロミオ役に採用だ」
line = "「会長！　正式にロミオ役に採用だ」"

[[dialogue]]
speaker = "unk"
# 正式採用！？
話が違う！
line = "正式採用！？
話が違う！"

[[dialogue]]
speaker = "ロクサーナ"
# 「我が演劇部の誇る女優が、会長でなければ熱の入った演技ができないと言うのだ。ならば、そうするしかあるまい？」
line = "「我が演劇部の誇る女優が、会長でなければ熱の入った演技ができないと言うのだ。ならば、そうするしかあるまい？」"

[[dialogue]]
speaker = "ロクサーナ"
# 「何か意見があるなら言ってみろ。少しくらい怒鳴られたところでヒビの入るような耳ではない」
line = "「何か意見があるなら言ってみろ。少しくらい怒鳴られたところでヒビの入るような耳ではない」"

[[dialogue]]
speaker = "unk"
# 演劇部でもないし、ほぼ素人なのに……
line = "演劇部でもないし、ほぼ素人なのに……"

[[dialogue]]
speaker = "ロクサーナ"
# 「なぁに、元よりこの世界は広大な舞台だ！　老若男女、誰もがここでは一役を演じねばならん」
line = "「なぁに、元よりこの世界は広大な舞台だ！　老若男女、誰もがここでは一役を演じねばならん」"

[[dialogue]]
speaker = "ロクサーナ"
# 「その世界で星徒会長などという大任を演じてるお前が、たかが演劇部の、たかが文化祭の主役程度で、尻尾を丸めて逃げたりはすまい？」
line = "「その世界で星徒会長などという大任を演じてるお前が、たかが演劇部の、たかが文化祭の主役程度で、尻尾を丸めて逃げたりはすまい？」"

[[dialogue]]
speaker = "メイプル"
# 「ほらほら、藍からもなんか一言言ってあげて！」
line = "「ほらほら、藍からもなんか一言言ってあげて！」"

[[dialogue]]
speaker = "藍"
# 「ロミオ様は私を捨てて、遠い海の向こうへと去ってしまいますの？」
line = "「ロミオ様は私を捨てて、遠い海の向こうへと去ってしまいますの？」"

[[dialogue]]
speaker = "ロクサーナ"
# 「ははっ！　だそうだ、ロミオ。愛するジュリエットからのたっての願いだぞ」
line = "「ははっ！　だそうだ、ロミオ。愛するジュリエットからのたっての願いだぞ」"

[[dialogue]]
speaker = "藍"
# 「ごめんなさい、会長さん。でも会長さんとなら、今まで知らなかった新しい演劇の世界が見えそうな気がするんです」
line = "「ごめんなさい、会長さん。でも会長さんとなら、今まで知らなかった新しい演劇の世界が見えそうな気がするんです」"

[[dialogue]]
speaker = "藍"
# 「だから、今だけはわがままを言わせてください、ロミオ役、お願いします」
line = "「だから、今だけはわがままを言わせてください、ロミオ役、お願いします」"

[[dialogue]]
speaker = "unk"
# ズルいなぁ……！
やればいいんですよね、やれば
line = "ズルいなぁ……！
やればいいんですよね、やれば"

[[dialogue]]
speaker = "ロクサーナ"
# 「物分かりが良くて助かる。さぁ、文化祭まで残り期日はわずかだ。皆に発破でもかけてやれ、主演女優」
line = "「物分かりが良くて助かる。さぁ、文化祭まで残り期日はわずかだ。皆に発破でもかけてやれ、主演女優」"

[[dialogue]]
speaker = "藍"
# 「わ、私がですか……え、えっと……！」
line = "「わ、私がですか……え、えっと……！」"

[[dialogue]]
speaker = "藍"
# 「え、演劇部ーっ、ファイト、オーッ！」
line = "「え、演劇部ーっ、ファイト、オーッ！」"

[[dialogue]]
speaker = "メイプル"
# 「おーーーーっ！」
line = "「おーーーーっ！」"

[[dialogue]]
speaker = "unk"
# それから、文化祭まで稽古の毎日。
line = "それから、文化祭まで稽古の毎日。"

[[dialogue]]
speaker = "ロクサーナ"
# 「他人の視線を気にするんじゃない！　お前が見ていいのは、愛するジュリエットただ１人だ！」
line = "「他人の視線を気にするんじゃない！　お前が見ていいのは、愛するジュリエットただ１人だ！」"

[[dialogue]]
speaker = "unk"
# 仮の時とは比べ物にならないほど、容赦なくロクサーナに扱かれつつも──
line = "仮の時とは比べ物にならないほど、容赦なくロクサーナに扱かれつつも──"

[[dialogue]]
speaker = "unk"
# この毒の杯を、我が恋人のために！
……乾杯！
line = "この毒の杯を、我が恋人のために！
……乾杯！"

[[dialogue]]
speaker = "ジュリエット"
# 「──ロミオ様の残してくださったこの短剣、私の胸こそがお前の鞘なのよ……ぐっ……！」
line = "「──ロミオ様の残してくださったこの短剣、私の胸こそがお前の鞘なのよ……ぐっ……！」"

[[dialogue]]
speaker = "ジュリエット"
# 「さぁ、そのまま。私を死なせて……」
line = "「さぁ、そのまま。私を死なせて……」"

[[dialogue]]
speaker = "unk"
# 新星学園演劇部の『ロミオとジュリエット』は確実に仕上がっていったのである。
line = "新星学園演劇部の『ロミオとジュリエット』は確実に仕上がっていったのである。"

[[dialogue]]
speaker = "unk"
# そして、文化祭前日。
line = "そして、文化祭前日。"

[[dialogue]]
speaker = "ロクサーナ"
# 「遅い時間までご苦労。本公演の全稽古は、ここで終了だ。やれることは全てやった。厳しい期日の中、お前たちはよくやってくれた」
line = "「遅い時間までご苦労。本公演の全稽古は、ここで終了だ。やれることは全てやった。厳しい期日の中、お前たちはよくやってくれた」"

[[dialogue]]
speaker = "ロクサーナ"
# 「本番の明日に向け、がっつりと美味い物を食い、しっかりと眠り、休養を取れ。体調不良を失敗の言い訳にはさせん」
line = "「本番の明日に向け、がっつりと美味い物を食い、しっかりと眠り、休養を取れ。体調不良を失敗の言い訳にはさせん」"

[[dialogue]]
speaker = "ロクサーナ"
# 「お前らは成功の一瞬に辿り着くべく、藻掻いて、足掻いて、今の今まで頑張ってきたのだろう？」
line = "「お前らは成功の一瞬に辿り着くべく、藻掻いて、足掻いて、今の今まで頑張ってきたのだろう？」"

[[dialogue]]
speaker = "ロクサーナ"
# 「明日は今日まで培った全てを十全に振り絞れ。そうすれば、億が一にも失敗などありえん！」
line = "「明日は今日まで培った全てを十全に振り絞れ。そうすれば、億が一にも失敗などありえん！」"

[[dialogue]]
speaker = "ロクサーナ"
# 「以上だ、解散！」
line = "「以上だ、解散！」"
