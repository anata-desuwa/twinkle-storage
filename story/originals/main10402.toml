[[dialogue]]
speaker = "unk"
# 第２話,ネビュラ崩壊？,B
line = "第２話,ネビュラ崩壊？,B"

[[dialogue]]
speaker = "unk"
# クラウディア・イルゼ・フォン・ゴットフリート。
line = "クラウディア・イルゼ・フォン・ゴットフリート。"

[[dialogue]]
speaker = "unk"
# 全ての魔女の上に君臨する『光の魔女』であり、ネビュラの一大プロジェクト『グレートウォール計画』の中心人物である。
line = "全ての魔女の上に君臨する『光の魔女』であり、ネビュラの一大プロジェクト『グレートウォール計画』の中心人物である。"

[[dialogue]]
speaker = "unk"
# 結果、グレートウォール計画自体は実行に移されなかった。
line = "結果、グレートウォール計画自体は実行に移されなかった。"

[[dialogue]]
speaker = "unk"
# しかし、光の巨大結界を張ることで星騎士たちを助け、世界を救う偉業の一端を担った。
line = "しかし、光の巨大結界を張ることで星騎士たちを助け、世界を救う偉業の一端を担った。"

[[dialogue]]
speaker = "unk"
# そしてリクリエを凌いだ後、束の間の平和が訪れると──厄介化した。
line = "そしてリクリエを凌いだ後、束の間の平和が訪れると──厄介化した。"

[[dialogue]]
speaker = "unk"
# ネビュラの財政問題。収まらないモンスターの出現。組織の解体を迫る元老会──
line = "ネビュラの財政問題。収まらないモンスターの出現。組織の解体を迫る元老会──"

[[dialogue]]
speaker = "unk"
# 他にもセドナを悩ませる問題は山積みだった。
line = "他にもセドナを悩ませる問題は山積みだった。"

[[dialogue]]
speaker = "unk"
# それに加えてリクリエ以後、クラウディアが幾度となく抗議活動を起こすようになったのだった。
line = "それに加えてリクリエ以後、クラウディアが幾度となく抗議活動を起こすようになったのだった。"

[[dialogue]]
speaker = "セドナ"
# 「ふぅ……今回は手こずったが、何とか鎮圧は完了したな」
line = "「ふぅ……今回は手こずったが、何とか鎮圧は完了したな」"

[[dialogue]]
speaker = "カヤ"
# 「ありがとうございます。クラウディア様が相手となると、私たちでは抑えきれませんから」
line = "「ありがとうございます。クラウディア様が相手となると、私たちでは抑えきれませんから」"

[[dialogue]]
speaker = "セドナ"
# 「基地への被害も軽微で済んだ。よく持ち堪えてくれたな」
line = "「基地への被害も軽微で済んだ。よく持ち堪えてくれたな」"

[[dialogue]]
speaker = "セドナ"
# 「それで、姫様はいまどうしている？」
line = "「それで、姫様はいまどうしている？」"

[[dialogue]]
speaker = "カヤ"
# 「反省室に入って頂いています。今回は前回のものより数倍は強固な防壁の部屋です」
line = "「反省室に入って頂いています。今回は前回のものより数倍は強固な防壁の部屋です」"

[[dialogue]]
speaker = "セドナ"
# 「そうか。だが、まあ……もって数日だろうな」
line = "「そうか。だが、まあ……もって数日だろうな」"

[[dialogue]]
speaker = "ウェンディ"
# 「監視には誰がついているのですか？」
line = "「監視には誰がついているのですか？」"

[[dialogue]]
speaker = "カヤ"
# 「リーリアがその任に」
line = "「リーリアがその任に」"

[[dialogue]]
speaker = "セドナ"
# 「リーリアか……」
line = "「リーリアか……」"

[[dialogue]]
speaker = "リーリア"
# 「あの～、そのリーリアなんですが……」
line = "「あの～、そのリーリアなんですが……」"

[[dialogue]]
speaker = "ウェンディ"
# 「な！？　リーリア、クラウディア様の監視はどうしたのですか！」
line = "「な！？　リーリア、クラウディア様の監視はどうしたのですか！」"

[[dialogue]]
speaker = "リーリア"
# 「ええと、逃げたり暴れたりしないから余の要求を伝えて来いと仰っておりまして……」
line = "「ええと、逃げたり暴れたりしないから余の要求を伝えて来いと仰っておりまして……」"

[[dialogue]]
speaker = "セドナ"
# 「ほう……」
line = "「ほう……」"

[[dialogue]]
speaker = "リーリア"
# 「う……！　そんな怖い顔しないでくださいってばぁ～」
line = "「う……！　そんな怖い顔しないでくださいってばぁ～」"

[[dialogue]]
speaker = "セドナ"
# 「聞こう。姫様は何と言っている」
line = "「聞こう。姫様は何と言っている」"

[[dialogue]]
speaker = "リーリア"
# 「え～、コホン……」
line = "「え～、コホン……」"

[[dialogue]]
speaker = "リーリア"
# 「開国ぞ！！！！！」
line = "「開国ぞ！！！！！」"

[[dialogue]]
speaker = "セドナ"
# 「……（イラッ）」
line = "「……（イラッ）」"

[[dialogue]]
speaker = "ウェンディ"
# 「……（イラッ）」
line = "「……（イラッ）」"

[[dialogue]]
speaker = "リーリア"
# 「グレートウォール計画も終了し、魔界と人間界、魔女とヒトとを隔てる理由も無くなった！」
line = "「グレートウォール計画も終了し、魔界と人間界、魔女とヒトとを隔てる理由も無くなった！」"

[[dialogue]]
speaker = "リーリア"
# 「魔女が魔女だけの世界に閉じこもる、そんな時代はもう終わったのだ！」
line = "「魔女が魔女だけの世界に閉じこもる、そんな時代はもう終わったのだ！」"

[[dialogue]]
speaker = "リーリア"
# 「今こそ広い世界に目を向け、人間たちとの交流を深め、手と手を取り合って共に歩むべきであるっ！」
line = "「今こそ広い世界に目を向け、人間たちとの交流を深め、手と手を取り合って共に歩むべきであるっ！」"

[[dialogue]]
speaker = "リーリア"
# 「まずは余、光の魔女たるクラウディアが導き手となろう！」
line = "「まずは余、光の魔女たるクラウディアが導き手となろう！」"

[[dialogue]]
speaker = "リーリア"
# 「そのために余に、人間たちと自由に交流する権利を与えよ！」
line = "「そのために余に、人間たちと自由に交流する権利を与えよ！」"

[[dialogue]]
speaker = "リーリア"
# 「余自らが人間たちと仲良くすることで、森に住む魔女たちの良き手本となるのだ！」
line = "「余自らが人間たちと仲良くすることで、森に住む魔女たちの良き手本となるのだ！」"

[[dialogue]]
speaker = "リーリア"
# 「それからもうひとつ！　ウェンディ、以前に比べておやつの量が減っている！」
line = "「それからもうひとつ！　ウェンディ、以前に比べておやつの量が減っている！」"

[[dialogue]]
speaker = "リーリア"
# 「どれほど財政が厳しかろうと、余のおやつを減らすことはまかりならぬ！　何よりも最優先させよ！」
line = "「どれほど財政が厳しかろうと、余のおやつを減らすことはまかりならぬ！　何よりも最優先させよ！」"

[[dialogue]]
speaker = "リーリア"
# 「……だそうです」
line = "「……だそうです」"

[[dialogue]]
speaker = "セドナ"
# 「はぁ……本当に困ったお人だ」
line = "「はぁ……本当に困ったお人だ」"

[[dialogue]]
speaker = "リーリア"
# 「まあ、おやつのことはともかくとして、主張としては一理あるのかな～って思いますけどね」
line = "「まあ、おやつのことはともかくとして、主張としては一理あるのかな～って思いますけどね」"

[[dialogue]]
speaker = "リーリア"
# 「ともに苦楽を乗り越えた仲じゃないですか。魔女とヒトは分かり合えるのかな～って……」
line = "「ともに苦楽を乗り越えた仲じゃないですか。魔女とヒトは分かり合えるのかな～って……」"

[[dialogue]]
speaker = "ウェンディ"
# 「何をやってるんですか！　監視役であるあなたがほだされてどうするんです！」
line = "「何をやってるんですか！　監視役であるあなたがほだされてどうするんです！」"

[[dialogue]]
speaker = "リーリア"
# 「ふえっ、だ、だって……」
line = "「ふえっ、だ、だって……」"

[[dialogue]]
speaker = "ウェンディ"
# 「リーリア……今、最も優先すべきことが何なのか、あなたにだって判断はつくでしょう」
line = "「リーリア……今、最も優先すべきことが何なのか、あなたにだって判断はつくでしょう」"

[[dialogue]]
speaker = "ウェンディ"
# 「その主張自体は私だって、長官だって理解しています。けれど、そのためにもネビュラという組織を存続させなくてはならないんです」
line = "「その主張自体は私だって、長官だって理解しています。けれど、そのためにもネビュラという組織を存続させなくてはならないんです」"

[[dialogue]]
speaker = "ウェンディ"
# 「長官が何のために、元老会の分からず屋どもを説得しに出向いていると思うんですか？」
line = "「長官が何のために、元老会の分からず屋どもを説得しに出向いていると思うんですか？」"

[[dialogue]]
speaker = "ウェンディ"
# 「ネビュラが解体してしまったら、そもそも人間界との交流が途絶えてしまうんです」
line = "「ネビュラが解体してしまったら、そもそも人間界との交流が途絶えてしまうんです」"

[[dialogue]]
speaker = "ウェンディ"
# 「その為にも、一刻も早く問題を解決して、ネビュラの財政を立て直さなければならない……そうでしょう？」
line = "「その為にも、一刻も早く問題を解決して、ネビュラの財政を立て直さなければならない……そうでしょう？」"

[[dialogue]]
speaker = "ウェンディ"
# 「なのに、こうも度々問題を起こして長官の手を煩わせてどうするんですか！」
line = "「なのに、こうも度々問題を起こして長官の手を煩わせてどうするんですか！」"

[[dialogue]]
speaker = "ウェンディ"
# 「それにクラウディア様が暴れる度に大切なお金が浪費されていくんですよ！　建物の修繕費とか、鎮圧部隊を動かすための費用とかっ！！」
line = "「それにクラウディア様が暴れる度に大切なお金が浪費されていくんですよ！　建物の修繕費とか、鎮圧部隊を動かすための費用とかっ！！」"

[[dialogue]]
speaker = "リーリア"
# 「クラウディア様に言ってくださいよ～！　私が問題を起こしてるわけじゃないんですから～」
line = "「クラウディア様に言ってくださいよ～！　私が問題を起こしてるわけじゃないんですから～」"

[[dialogue]]
speaker = "ウェンディ"
# 「はっ！？　す、すみません……つい興奮して我を忘れてしまいました」
line = "「はっ！？　す、すみません……つい興奮して我を忘れてしまいました」"

[[dialogue]]
speaker = "セドナ"
# 「ともかく今はウェンディの言ったような理由で姫様の要求を呑むことができない。そう伝えろ」
line = "「ともかく今はウェンディの言ったような理由で姫様の要求を呑むことができない。そう伝えろ」"

[[dialogue]]
speaker = "リーリア"
# 「わ、わかりました」
line = "「わ、わかりました」"

[[dialogue]]
speaker = "セドナ"
# 「姫様には何度も事情を説明しているのだがな……まあ理解はしてもらえないようだ」
line = "「姫様には何度も事情を説明しているのだがな……まあ理解はしてもらえないようだ」"

[[dialogue]]
speaker = "ウェンディ"
# 「また数日としないうちに暴れ始めますよね？」
line = "「また数日としないうちに暴れ始めますよね？」"

[[dialogue]]
speaker = "セドナ"
# 「ああ。カヤ、お前も警戒しておくように」
line = "「ああ。カヤ、お前も警戒しておくように」"

[[dialogue]]
speaker = "カヤ"
# 「了解です、長官」
line = "「了解です、長官」"

[[dialogue]]
speaker = "セドナ"
# 「すまない、私は少し休ませてもらう。ウェンディ、後のことは任せるぞ」
line = "「すまない、私は少し休ませてもらう。ウェンディ、後のことは任せるぞ」"

[[dialogue]]
speaker = "ウェンディ"
# 「わかりました、ゆっくりと身体をお休めください！」
line = "「わかりました、ゆっくりと身体をお休めください！」"
