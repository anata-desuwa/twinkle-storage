[[dialogue]]
speaker = "ソフィア"
# 「──寒い」
line = "「──寒い」"

[[dialogue]]
speaker = "ソフィア"
# 「寒い寒い寒い寒い寒い…………寒すぎます！！　一体どうなっているんですか！？」
line = "「寒い寒い寒い寒い寒い…………寒すぎます！！　一体どうなっているんですか！？」"

[[dialogue]]
speaker = "セーラ"
# 「ね～？　寒いのも含めて冬の風情なんだけどさ──今年はいつもよりだいぶキビシー感じだし」
line = "「ね～？　寒いのも含めて冬の風情なんだけどさ──今年はいつもよりだいぶキビシー感じだし」"

[[dialogue]]
speaker = "ソフィア"
# 「本当です！　せっかく人間界の冬にも慣れてきたと思っていたのに……ぶるぶる」
line = "「本当です！　せっかく人間界の冬にも慣れてきたと思っていたのに……ぶるぶる」"

[[dialogue]]
speaker = "ルリエル"
# 「まあまあ。それでもソフィアのふるさとよりは過ごしやすいんじゃないですか？」
line = "「まあまあ。それでもソフィアのふるさとよりは過ごしやすいんじゃないですか？」"

[[dialogue]]
speaker = "ニャリオン"
# 「そうニャ。ワガハイもあそこの寒さはもう御免だニャン」
line = "「そうニャ。ワガハイもあそこの寒さはもう御免だニャン」"

[[dialogue]]
speaker = "ソフィア"
# 「確かにレゾフよりはマシですが……それでも<ruby=こっち>人間界</ruby>は<ruby=こっち>人間界</ruby>特有の寒さがあるんですぅ」
line = "「確かにレゾフよりはマシですが……それでも<ruby>人間界<rt>こっち</rt></ruby>は<ruby>人間界<rt>こっち</rt></ruby>特有の寒さがあるんですぅ」"

[[dialogue]]
speaker = "ユウリ"
# 「そういや、サーシャさんが言ってたけど……ソフィアは南国の写真を見て、人間界丸ごとそんなとこだって思い込んでたらしいな」
line = "「そういや、サーシャさんが言ってたけど……ソフィアは南国の写真を見て、人間界丸ごとそんなとこだって思い込んでたらしいな」"

[[dialogue]]
speaker = "アポロ"
# 「なんだ。ソフィアも案外抜けてるとこあるんだな！」
line = "「なんだ。ソフィアも案外抜けてるとこあるんだな！」"

[[dialogue]]
speaker = "ソフィア"
# 「む……昔の話です！　それに、全部がそうと思ってたわけじゃありませんからっ」
line = "「む……昔の話です！　それに、全部がそうと思ってたわけじゃありませんからっ」"

[[dialogue]]
speaker = "セーラ"
# 「あはは。<ruby=うちら>星徒会メンバー</ruby>ともすっかり馴染んじゃってんね～、アポロちゃん」
line = "「あはは。<ruby>星徒会メンバー<rt>うちら</rt></ruby>ともすっかり馴染んじゃってんね～、アポロちゃん」"

[[dialogue]]
speaker = "アポロ"
# 「ふっ──妹の友達はあたしの友達も同然だからな！」
line = "「ふっ──妹の友達はあたしの友達も同然だからな！」"

[[dialogue]]
speaker = "ルリエル"
# 「はい、ソフィア。わたしのぽかぽかカイロをおすそわけです♪」
line = "「はい、ソフィア。わたしのぽかぽかカイロをおすそわけです♪」"

[[dialogue]]
speaker = "ソフィア"
# 「ありがとう、ルリ………………おかわり」
line = "「ありがとう、ルリ………………おかわり」"

[[dialogue]]
speaker = "ルリエル"
# 「まだですか！？」
line = "「まだですか！？」"

[[dialogue]]
speaker = "セーラ"
# 「ま、うちもさすがに生足厳しくなってきたなーって思ったけど」
line = "「ま、うちもさすがに生足厳しくなってきたなーって思ったけど」"

[[dialogue]]
speaker = "アポロ"
# 「そーだな。いくら四季っても限度があるぞ──どこかにアチアチなスポットはないのか、フィオナ！」
line = "「そーだな。いくら四季っても限度があるぞ──どこかにアチアチなスポットはないのか、フィオナ！」"

[[dialogue]]
speaker = "フィオナ"
# 「そうですね──……」
line = "「そうですね──……」"

[[dialogue]]
speaker = "ユウリ"
# 「ないだろ～、そんな都合のいい場所」
line = "「ないだろ～、そんな都合のいい場所」"

[[dialogue]]
speaker = "ルリエル"
# 「冬は寒いものですからね」
line = "「冬は寒いものですからね」"

[[dialogue]]
speaker = "フィオナ"
# 「んー……そうでもないかもしれませんよ？　<b>あそこ</b>なら……」
line = "「んー……そうでもないかもしれませんよ？　<b>あそこ</b>なら……」"

[[dialogue]]
speaker = "ニャリオン"
# 「まさか……ニャ！」
line = "「まさか……ニャ！」"

[[dialogue]]
speaker = "アポロ"
# 「おおおお～～～～～～っっ！！」
line = "「おおおお～～～～～～っっ！！」"

[[dialogue]]
speaker = "ソフィア"
# 「す……すごいです……この気温……この日差し……まさに常夏の楽園……」
line = "「す……すごいです……この気温……この日差し……まさに常夏の楽園……」"

[[dialogue]]
speaker = "セーラ"
# 「へー！　うち、初めて来たけど──もう夏のまんまじゃん！」
line = "「へー！　うち、初めて来たけど──もう夏のまんまじゃん！」"

[[dialogue]]
speaker = "ユウリ"
# 「すげ──想像以上だな。こんなのが学園に繋がってるのかよ！」
line = "「すげ──想像以上だな。こんなのが学園に繋がってるのかよ！」"

[[dialogue]]
speaker = "アポロ"
# 「すごいな、この格好でも全然寒くないぞ！」
line = "「すごいな、この格好でも全然寒くないぞ！」"

[[dialogue]]
speaker = "フィオナ"
# 「姉さん、その水着はどうしたんですか？　見たことがありませんけど……」
line = "「姉さん、その水着はどうしたんですか？　見たことがありませんけど……」"

[[dialogue]]
speaker = "アポロ"
# 「なんかここに来たらいきなり水着に変身しちまってたんだ」
line = "「なんかここに来たらいきなり水着に変身しちまってたんだ」"

[[dialogue]]
speaker = "フィオナ"
# 「えええっ！？」
line = "「えええっ！？」"

[[dialogue]]
speaker = "ユウリ"
# 「驚くのはまだ早いぜ、フィオナ」
line = "「驚くのはまだ早いぜ、フィオナ」"

[[dialogue]]
speaker = "セーラ"
# 「そーいうこと♪　うちらからもサプライズがあるんだよね～」
line = "「そーいうこと♪　うちらからもサプライズがあるんだよね～」"

[[dialogue]]
speaker = "ソフィア"
# 「はい、では行きますよ」
line = "「はい、では行きますよ」"

[[dialogue]]
speaker = "フィオナ"
# 「みんなも水着フォームを！？」
line = "「みんなも水着フォームを！？」"

[[dialogue]]
speaker = "ルリエル"
# 「セーラさん！　水着が麗し～です！」
line = "「セーラさん！　水着が麗し～です！」"

[[dialogue]]
speaker = "セーラ"
# 「あはは、あんがと♪　ルリちーの水着もめっちゃ可愛いね！」
line = "「あはは、あんがと♪　ルリちーの水着もめっちゃ可愛いね！」"

[[dialogue]]
speaker = "ルリエル"
# 「えへへ、ありがとうございます♪」
line = "「えへへ、ありがとうございます♪」"

[[dialogue]]
speaker = "アポロ"
# 「あたしは！？　あたしのはどーなんだ！？」
line = "「あたしは！？　あたしのはどーなんだ！？」"

[[dialogue]]
speaker = "ルリエル"
# 「もちろんめっかわです！」
line = "「もちろんめっかわです！」"

[[dialogue]]
speaker = "ユウリ"
# 「なんつーか、さっきまで厚着だったのにいきなり水着ってのはなんか……照れるな……」
line = "「なんつーか、さっきまで厚着だったのにいきなり水着ってのはなんか……照れるな……」"

[[dialogue]]
speaker = "フィオナ"
# 「ふふっ、ここは常夏のビーチなんですから、厚着のままでいる方が不自然ですよ」
line = "「ふふっ、ここは常夏のビーチなんですから、厚着のままでいる方が不自然ですよ」"

[[dialogue]]
speaker = "アポロ"
# 「だったらフィオナもさっさと着替えちまえよ！」
line = "「だったらフィオナもさっさと着替えちまえよ！」"

[[dialogue]]
speaker = "フィオナ"
# 「ええ、そうですね」
line = "「ええ、そうですね」"

[[dialogue]]
speaker = "フィオナ"
# 「私も準備完了です」
line = "「私も準備完了です」"

[[dialogue]]
speaker = "ユウリ"
# 「よーし、それじゃ夏気分に思いっきり浸らせてもらうぜ！」
line = "「よーし、それじゃ夏気分に思いっきり浸らせてもらうぜ！」"

[[dialogue]]
speaker = "フィオナ"
# 「今回はリップルさんから、プライベートビーチの方に招待してもらいました」
line = "「今回はリップルさんから、プライベートビーチの方に招待してもらいました」"

[[dialogue]]
speaker = "フィオナ"
# 「私たち以外は誰もいませんし、好きに遊んでいいそうですよ。星徒会業務の息抜きに……と」
line = "「私たち以外は誰もいませんし、好きに遊んでいいそうですよ。星徒会業務の息抜きに……と」"

[[dialogue]]
speaker = "アポロ"
# 「今はこの海ぜーんぶあたしたちで独り占めってことか！　サイコーだな！」
line = "「今はこの海ぜーんぶあたしたちで独り占めってことか！　サイコーだな！」"

[[dialogue]]
speaker = "アポロ"
# 「って……およ？　なあフィオナ、向こうから誰か来るぞ──」
line = "「って……およ？　なあフィオナ、向こうから誰か来るぞ──」"

[[dialogue]]
speaker = "フィオナ"
# 「あら……？」
line = "「あら……？」"

[[dialogue]]
speaker = "unk"
# 見覚えのある面々がぞろそろぞと……
line = "見覚えのある面々がぞろそろぞと……"

[[dialogue]]
speaker = "ヴィーナス"
# 「水着に着替えて準備は万全ってところね！　せっかくだから私たちも参加させてもらうわ！」
line = "「水着に着替えて準備は万全ってところね！　せっかくだから私たちも参加させてもらうわ！」"
