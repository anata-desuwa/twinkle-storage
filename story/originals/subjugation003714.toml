[[dialogue]]
speaker = "unk"
# 第１４話,創造神の消滅,B
line = "第１４話,創造神の消滅,B"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
# 「『だめだ──だめだ──だめだ──』」
line = "「『だめだ──だめだ──だめだ──』」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
# 「『わたしをけしてはならない──せいちょうする、せかいの、ゆくすえを──』」
line = "「『わたしをけしてはならない──せいちょうする、せかいの、ゆくすえを──』」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
# 「『かんりしなければ──わたしが、わたしが────』」
line = "「『かんりしなければ──わたしが、わたしが────』」"

[[dialogue]]
speaker = "unk"
# 俺たちを苦しめ続けたホロウ・ルヴィネ。その最後の１体が消滅する。そして──
line = "俺たちを苦しめ続けたホロウ・ルヴィネ。その最後の１体が消滅する。そして──"

[[dialogue]]
speaker = "ＸＥＬＯＳ"
# 「ギ────────ィィィィ────────！？」
line = "「ギ────────ィィィィ────────！？」"

[[dialogue]]
speaker = "クロト"
# 「おぉおぉぉおぉぉおぉぉおおお────ッ！！！」
line = "「おぉおぉぉおぉぉおぉぉおおお────ッ！！！」"

[[dialogue]]
speaker = "unk"
# イメージするのは、強大な創造神を掴める掌。
line = "イメージするのは、強大な創造神を掴める掌。"

[[dialogue]]
speaker = "unk"
# 握り、搾り、潰すことのできる巨大な暴力。
line = "握り、搾り、潰すことのできる巨大な暴力。"

[[dialogue]]
speaker = "unk"
# 俺が知りうる、最も強力な力を具現化させる──！！
line = "俺が知りうる、最も強力な力を具現化させる──！！"

[[dialogue]]
speaker = "クロト"
# 「インフィニット・ディザスター────！！！！」
line = "「インフィニット・ディザスター────！！！！」"

[[dialogue]]
speaker = "unk"
# 厄災の右腕の力を解放し、顕現させたディザスターハンドで『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』を拘束する──
line = "厄災の右腕の力を解放し、顕現させたディザスターハンドで『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』を拘束する──"

[[dialogue]]
speaker = "ＸＥＬＯＳ"
# 「ガ────ギャ──────ギギギギイィィィィ！？」
line = "「ガ────ギャ──────ギギギギイィィィィ！？」"

[[dialogue]]
speaker = "クロト"
# 「砕けろぉぉぉおぉぉおおおおッ────！！！！」
line = "「砕けろぉぉぉおぉぉおおおおッ────！！！！」"

[[dialogue]]
speaker = "unk"
# この世界の全てを創りし神──創造神『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』は。
line = "この世界の全てを創りし神──創造神『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』は。"

[[dialogue]]
speaker = "unk"
# 跡形もなく……消滅した。
line = "跡形もなく……消滅した。"

[[dialogue]]
speaker = "チナ"
# 「…………終わったな」
line = "「…………終わったな」"

[[dialogue]]
speaker = "グレイス"
# 「はい。これでもう……」
line = "「はい。これでもう……」"

[[dialogue]]
speaker = "レティシア"
# 「リクリエが起こらない世界が、来るのね」
line = "「リクリエが起こらない世界が、来るのね」"

[[dialogue]]
speaker = "ベアトリス"
# 「よかった……デネブも、アルタイルも……全部守れたんだね、私たち……！」
line = "「よかった……デネブも、アルタイルも……全部守れたんだね、私たち……！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……ええ。これからはみんな、ずっと一緒よ。ベアト」
line = "「……ええ。これからはみんな、ずっと一緒よ。ベアト」"

[[dialogue]]
speaker = "クロト"
# 「────っ！」
line = "「────っ！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……魔王、どうかした？」
line = "「……魔王、どうかした？」"

[[dialogue]]
speaker = "クロト"
# 「感覚でしかないんだけど……冥界の視座にいるベガの『俺』が……消えていってるみたいだ……」
line = "「感覚でしかないんだけど……冥界の視座にいるベガの『俺』が……消えていってるみたいだ……」"

[[dialogue]]
speaker = "unk"
# 厄災の右腕を、２つのアルケインカオスクエーサーで制御してから──うっすらと感じ続けていた『彼』の存在。
line = "厄災の右腕を、２つのアルケインカオスクエーサーで制御してから──うっすらと感じ続けていた『彼』の存在。"

[[dialogue]]
speaker = "unk"
# それが薄れている──どんどん『彼』の存在がかき消えていくのが、分かった。
line = "それが薄れている──どんどん『彼』の存在がかき消えていくのが、分かった。"

[[dialogue]]
speaker = "ルヴィネ"
# 「……安心してくれたのかしら。全てを守ることができたから」
line = "「……安心してくれたのかしら。全てを守ることができたから」"

[[dialogue]]
speaker = "クロト"
# 「ああ……そうだと思う。俺に魂を渡してくれた後も、ずっとあの暗闇に佇んで、見守ってくれていたみたいだ──」
line = "「ああ……そうだと思う。俺に魂を渡してくれた後も、ずっとあの暗闇に佇んで、見守ってくれていたみたいだ──」"

[[dialogue]]
speaker = "ラクシャ"
# （…………さて、と）
line = "（…………さて、と）"

[[dialogue]]
speaker = "unk"
# 俺は、遠い暗黒の世界にいる『彼』に向かって、黙祷をささげた。
line = "俺は、遠い暗黒の世界にいる『彼』に向かって、黙祷をささげた。"

[[dialogue]]
speaker = "クロト"
# 「ありがとう──ベガの『俺』。君のおかげで、世界を守ることができた……」
line = "「ありがとう──ベガの『俺』。君のおかげで、世界を守ることができた……」"

[[dialogue]]
speaker = "unk"
# こうして森羅歴──３度目のリクリエ防衛は成功した。
line = "こうして森羅歴──３度目のリクリエ防衛は成功した。"

[[dialogue]]
speaker = "unk"
# 俺たちは“神”による保険を失ったが──必ず、世界を良い方向へ動かしていくと誓おう。
line = "俺たちは“神”による保険を失ったが──必ず、世界を良い方向へ動かしていくと誓おう。"

[[dialogue]]
speaker = "クロト"
# 「みんな、帰ろう」
line = "「みんな、帰ろう」"

[[dialogue]]
speaker = "unk"
# 上手くいく保証はない。だけど、『ＸＥＬＯＳ』を憎しみから滅ぼすのではなく……
line = "上手くいく保証はない。だけど、『ＸＥＬＯＳ』を憎しみから滅ぼすのではなく……"

[[dialogue]]
speaker = "unk"
# 「お父様が成し得なかったことを引き継ぐ」と宣言して見せたルヴィネと一緒なら、きっと上手く行くと確信していた。
line = "「お父様が成し得なかったことを引き継ぐ」と宣言して見せたルヴィネと一緒なら、きっと上手く行くと確信していた。"

[[dialogue]]
speaker = "クロト"
# 「俺たちが守った世界に……！」
line = "「俺たちが守った世界に……！」"

[[dialogue]]
speaker = "ベガのクロト"
# （…………ありがとう、アルタイルの『俺』）
line = "（…………ありがとう、アルタイルの『俺』）"

[[dialogue]]
speaker = "ベガのクロト"
# （『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』を倒すって約束、果たしてくれて──）
line = "（『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』を倒すって約束、果たしてくれて──）"

[[dialogue]]
speaker = "ベガのクロト"
# （今度こそ、守ることができた……）
line = "（今度こそ、守ることができた……）"

[[dialogue]]
speaker = "unk"
# ……手遅れではあったけれど。
line = "……手遅れではあったけれど。"

[[dialogue]]
speaker = "unk"
# ……もう何も取り返しなんてつかないけれど。
line = "……もう何も取り返しなんてつかないけれど。"

[[dialogue]]
speaker = "unk"
# それでも世界を守ることができた──そして、アルタイルとデネブで暮らす、愛しい家族のみんなのことも。
line = "それでも世界を守ることができた──そして、アルタイルとデネブで暮らす、愛しい家族のみんなのことも。"

[[dialogue]]
speaker = "ベガのクロト"
# （……だから、思い残すことはもう、何もない）
line = "（……だから、思い残すことはもう、何もない）"

[[dialogue]]
speaker = "ベガのクロト"
# （…………俺も、逝こう）
line = "（…………俺も、逝こう）"

[[dialogue]]
speaker = "unk"
# 闇の世界を掻いて、前へ進む。
line = "闇の世界を掻いて、前へ進む。"

[[dialogue]]
speaker = "unk"
# 奥の奥、底の底──<ruby=とがにん>咎人</ruby>が向かうべき、地獄と呼べる場所を目指して。
line = "奥の奥、底の底──<ruby>咎人<rt>とがにん</rt></ruby>が向かうべき、地獄と呼べる場所を目指して。"

[[dialogue]]
speaker = "unk"
# 進む──進む──進む──
line = "進む──進む──進む──"

[[dialogue]]
speaker = "unk"
# 恐怖で竦む足を叱咤して、さらに深淵を目指して──
line = "恐怖で竦む足を叱咤して、さらに深淵を目指して──"

[[dialogue]]
speaker = "？？？"
# 「──そっちじゃないですよ、魔王様？」
line = "「──そっちじゃないですよ、魔王様？」"

[[dialogue]]
speaker = "unk"
# 不意に誰かが──俺の右手を掴んだ。
line = "不意に誰かが──俺の右手を掴んだ。"

[[dialogue]]
speaker = "unk"
# 呪いと血にまみれていた俺の右手を。慈しむように、そっと優しく、包んでくれた──
line = "呪いと血にまみれていた俺の右手を。慈しむように、そっと優しく、包んでくれた──"

[[dialogue]]
speaker = "ベガのクロト"
# （……………………リノ？）
line = "（……………………リノ？）"

[[dialogue]]
speaker = "unk"
# 振り向いた先にいたのは、愛しい恋人の姿──それだけじゃない。
line = "振り向いた先にいたのは、愛しい恋人の姿──それだけじゃない。"

[[dialogue]]
speaker = "ベガのクロト"
# （……母さんに、リーリアも？）
line = "（……母さんに、リーリアも？）"

[[dialogue]]
speaker = "リーリア"
# 「兄さんはおっちょこちょいですね～。手間がかかる兄を導くのも、妹の務めですけど♪」
line = "「兄さんはおっちょこちょいですね～。手間がかかる兄を導くのも、妹の務めですけど♪」"

[[dialogue]]
speaker = "ベガのクロト"
# （──なんで）
line = "（──なんで）"

[[dialogue]]
speaker = "セドナ"
# 「昔を思い出すな。お前はすぐにふらっとどこかへ行ってしまうから、手を焼いたものだ」
line = "「昔を思い出すな。お前はすぐにふらっとどこかへ行ってしまうから、手を焼いたものだ」"

[[dialogue]]
speaker = "ベガのクロト"
# （────どう、して）
line = "（────どう、して）"

[[dialogue]]
speaker = "クラウディア"
# 「頑張ったではないか、お兄！　その頑張り、余が褒めてやろう！！」
line = "「頑張ったではないか、お兄！　その頑張り、余が褒めてやろう！！」"

[[dialogue]]
speaker = "トリュファイナ"
# 「魔王様。永きに渡るお勤め、ご苦労様でした」
line = "「魔王様。永きに渡るお勤め、ご苦労様でした」"

[[dialogue]]
speaker = "アイリーン"
# 「私たちの仇討ち、ありがとうございます！　お兄さん♪」
line = "「私たちの仇討ち、ありがとうございます！　お兄さん♪」"

[[dialogue]]
speaker = "カヤ"
# 「ん。おにぃ、がんばった」
line = "「ん。おにぃ、がんばった」"

[[dialogue]]
speaker = "ウェンディ"
# 「手を貸すことができず、歯がゆい思いでしたが──ずっと見ていましたよ！」
line = "「手を貸すことができず、歯がゆい思いでしたが──ずっと見ていましたよ！」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「魔王ちゃん、お疲れ様～♪」
line = "「魔王ちゃん、お疲れ様～♪」"

[[dialogue]]
speaker = "ベガのクロト"
# （ネビュラの、みんな────）
line = "（ネビュラの、みんな────）"

[[dialogue]]
speaker = "unk"
# 俺自身が手にかけてしまった、最愛の家族たち。
line = "俺自身が手にかけてしまった、最愛の家族たち。"

[[dialogue]]
speaker = "リノ"
# 「いきましょう──魔王様。今度こそ、私たちと一緒に」
line = "「いきましょう──魔王様。今度こそ、私たちと一緒に」"

[[dialogue]]
speaker = "unk"
# ──これは夢なのか。幻なのか。
line = "──これは夢なのか。幻なのか。"

[[dialogue]]
speaker = "unk"
# 罪と向き合いきれない俺自身が生み出した、<ruby=うたかた>泡沫</ruby>の……？
line = "罪と向き合いきれない俺自身が生み出した、<ruby>泡沫<rt>うたかた</rt></ruby>の……？"

[[dialogue]]
speaker = "ラクシャ"
# 「──違うよ。これは夢でも幻でもない。キミの大切な恋人と、母親と、家族さ」
line = "「──違うよ。これは夢でも幻でもない。キミの大切な恋人と、母親と、家族さ」"

[[dialogue]]
speaker = "unk"
# …………ラクシャ？
line = "…………ラクシャ？"

[[dialogue]]
speaker = "ラクシャ"
# 「守護天使の目から見て、キミには温情を与えるべきと判断した。犯してしまった罪は消えないけれど……それでもキミは、救われるべきだ」
line = "「守護天使の目から見て、キミには温情を与えるべきと判断した。犯してしまった罪は消えないけれど……それでもキミは、救われるべきだ」"

[[dialogue]]
speaker = "ラクシャ"
# 「……あんまりこういう特別扱いはよくないから、内緒だよ。パテルに知られたら、ボクが怒られちゃうからね？」
line = "「……あんまりこういう特別扱いはよくないから、内緒だよ。パテルに知られたら、ボクが怒られちゃうからね？」"

[[dialogue]]
speaker = "リノ"
# 「さぁ、魔王様っ」
line = "「さぁ、魔王様っ」"

[[dialogue]]
speaker = "リーリア"
# 「兄さんっ」
line = "「兄さんっ」"

[[dialogue]]
speaker = "セドナ"
# 「ぼうっとするな。早く来い」
line = "「ぼうっとするな。早く来い」"

[[dialogue]]
speaker = "unk"
# ──守護天使ラクシャ。
line = "──守護天使ラクシャ。"

[[dialogue]]
speaker = "unk"
# ────本当に、ありがとう。
line = "────本当に、ありがとう。"

[[dialogue]]
speaker = "ラクシャ"
# 「どういたしまして、ベガのラクシス──ううん」
line = "「どういたしまして、ベガのラクシス──ううん」"

[[dialogue]]
speaker = "ラクシャ"
# 「──緋宮クロト」
line = "「──緋宮クロト」"

[[dialogue]]
speaker = "ラクシャ"
# 「来世では、愛しい人たちに囲まれて、幸せに満ち満ちた……『普通』の人生が送れるように願ってるよ」
line = "「来世では、愛しい人たちに囲まれて、幸せに満ち満ちた……『普通』の人生が送れるように願ってるよ」"

[[dialogue]]
speaker = "unk"
# こうしてベガの世界で戦い続け、リクリエによって堕とされた──１人の少年の物語にも、幕は下りたのだった。
line = "こうしてベガの世界で戦い続け、リクリエによって堕とされた──１人の少年の物語にも、幕は下りたのだった。"
