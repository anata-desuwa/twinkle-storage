[[dialogue]]
speaker = "unk"
# 第１１話,厄災の暴走,B
line = "第１１話,厄災の暴走,B"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「よーっし！　これにて一件落着ね！」
line = "「よーっし！　これにて一件落着ね！」"

[[dialogue]]
speaker = "unk"
# ルヴィネを説得することができた。ジグの視た惨劇の未来を回避することができた。
line = "ルヴィネを説得することができた。ジグの視た惨劇の未来を回避することができた。"

[[dialogue]]
speaker = "unk"
# 俺たちが安堵に包まれたその時だった──
line = "俺たちが安堵に包まれたその時だった──"

[[dialogue]]
speaker = "クロト"
# 「っ──！？　みんな、避けろ！！」
line = "「っ──！？　みんな、避けろ！！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「っ！？　待ちなさい、もう戦いは終わった……！　く、ぅっ──！？」
line = "「っ！？　待ちなさい、もう戦いは終わった……！　く、ぅっ──！？」"

[[dialogue]]
speaker = "アナ（覚醒）"
# 「まずいです──暴走しています！」
line = "「まずいです──暴走しています！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「私が霊力を消耗したから……！？　どうして──まだコントロールする分は残っているはずなのに……！」
line = "「私が霊力を消耗したから……！？　どうして──まだコントロールする分は残っているはずなのに……！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「みんな、下がりなさい！　私が何とかする──！」
line = "「みんな、下がりなさい！　私が何とかする──！」"

[[dialogue]]
speaker = "クロト"
# 「──ッ！？　待て、ルヴィネ！！」
line = "「──ッ！？　待て、ルヴィネ！！」"

[[dialogue]]
speaker = "unk"
# ルヴィネ死亡の未来を回避したと思っていたが──ジグが視た光景は、もしかしなくてもこの瞬間なのではないか？
line = "ルヴィネ死亡の未来を回避したと思っていたが──ジグが視た光景は、もしかしなくてもこの瞬間なのではないか？"

[[dialogue]]
speaker = "unk"
# 強大な霊力を持つルヴィネが死亡するような事態……ディザスターハンドはこれ以上ない『答え合わせ』だ……！
line = "強大な霊力を持つルヴィネが死亡するような事態……ディザスターハンドはこれ以上ない『答え合わせ』だ……！"

[[dialogue]]
speaker = "クロト"
# 「ルヴィネ、下がれ！！　こいつの相手は俺たちがする！！」
line = "「ルヴィネ、下がれ！！　こいつの相手は俺たちがする！！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「何を言っているの、あなたたちでは敵わない！　こいつは私が連れてきた……私が止めるわ！」
line = "「何を言っているの、あなたたちでは敵わない！　こいつは私が連れてきた……私が止めるわ！」"

[[dialogue]]
speaker = "レティシア"
# 「それはだめ。ここでルヴィがやられたら、私たちがしてきたことが無駄になっちゃうもの……！」
line = "「それはだめ。ここでルヴィがやられたら、私たちがしてきたことが無駄になっちゃうもの……！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「レティシア！？　放しなさい、私でないと無理よ……魔王、あなたが死んでしまう！」
line = "「レティシア！？　放しなさい、私でないと無理よ……魔王、あなたが死んでしまう！」"

[[dialogue]]
speaker = "クロト"
# 「ルヴィネ！　君は霊力を練り上げることに集中しろ──弱らせれば制御を取り戻せるかもしれない！」
line = "「ルヴィネ！　君は霊力を練り上げることに集中しろ──弱らせれば制御を取り戻せるかもしれない！」"

[[dialogue]]
speaker = "クロト"
# 「極星のみんなでルヴィネを守れ！！　新星星徒会──いくぞ！！」
line = "「極星のみんなでルヴィネを守れ！！　新星星徒会──いくぞ！！」"

[[dialogue]]
speaker = "クロト"
# 「──うぉぉおぉおッ！！」
line = "「──うぉぉおぉおッ！！」"

[[dialogue]]
speaker = "unk"
# アルケインカオスクエーサー──渦巻くリクリエの力を拳に乗せて、渾身の打撃を放つ！
line = "アルケインカオスクエーサー──渦巻くリクリエの力を拳に乗せて、渾身の打撃を放つ！"

[[dialogue]]
speaker = "アナ（覚醒）"
# 「……っ！？　ダメです、損傷が見られません！」
line = "「……っ！？　ダメです、損傷が見られません！」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「くうぅっ……！　凍結させても、１秒も止められないなんて！」
line = "「くうぅっ……！　凍結させても、１秒も止められないなんて！」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「──きゃぁあぁっ！？」
line = "「──きゃぁあぁっ！？」"

[[dialogue]]
speaker = "unk"
# 埃を払うようななんてことない指の動き一つで、塔の頂上を破壊の嵐が包み込む。
line = "埃を払うようななんてことない指の動き一つで、塔の頂上を破壊の嵐が包み込む。"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「だめっ──シールドが持たないっ！？」
line = "「だめっ──シールドが持たないっ！？」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「くっ、なんて力なの……！」
line = "「くっ、なんて力なの……！」"

[[dialogue]]
speaker = "アナ"
# 「ノヴァフォームが、もう……！」
line = "「ノヴァフォームが、もう……！」"

[[dialogue]]
speaker = "マトイ"
# 「こんなところで……！」
line = "「こんなところで……！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「ベアト！　どきなさい、私が出る──！」
line = "「ベアト！　どきなさい、私が出る──！」"

[[dialogue]]
speaker = "ベアトリス"
# 「で、でもっ……！」
line = "「で、でもっ……！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「このままでは新星星徒会がやられてしまう……！　援護しないと……！！」
line = "「このままでは新星星徒会がやられてしまう……！　援護しないと……！！」"

[[dialogue]]
speaker = "unk"
# 厄災の右腕が、大きく腕を振りかぶる。
line = "厄災の右腕が、大きく腕を振りかぶる。"

[[dialogue]]
speaker = "unk"
# マトイたちが狙われている──防御が間に合わない！
line = "マトイたちが狙われている──防御が間に合わない！"

[[dialogue]]
speaker = "？？？"
# 「──灼炎大皇」
line = "「──灼炎大皇」"

[[dialogue]]
speaker = "unk"
# 瞬間、ディザスターハンドの全身が炎に包まれた──ノヴァ星騎士、いやフィオナの魔王フォームにも比する絶大な業火。
line = "瞬間、ディザスターハンドの全身が炎に包まれた──ノヴァ星騎士、いやフィオナの魔王フォームにも比する絶大な業火。"

[[dialogue]]
speaker = "煌嶺"
# 「──ほう？　妾の大炎を受けて、怯むだけとは……！」
line = "「──ほう？　妾の大炎を受けて、怯むだけとは……！」"

[[dialogue]]
speaker = "クロト"
# 「煌嶺……！！」
line = "「煌嶺……！！」"

[[dialogue]]
speaker = "煌嶺"
# 「随分と手こずっているな魔王！　まあ無理もない。３０００年も生きたご老体には、酷な相手よ！」
line = "「随分と手こずっているな魔王！　まあ無理もない。３０００年も生きたご老体には、酷な相手よ！」"

[[dialogue]]
speaker = "煌嶺"
# 「それに……まだ１人も死んでいないとは。察するに、まだ<b>始まったばかり</b>と言ったところか？」
line = "「それに……まだ１人も死んでいないとは。察するに、まだ<b>始まったばかり</b>と言ったところか？」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「何てこと言うのよ！？　大変だったんだから！！」
line = "「何てこと言うのよ！？　大変だったんだから！！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……キュリオスの煌嶺」
line = "「……キュリオスの煌嶺」"

[[dialogue]]
speaker = "煌嶺"
# 「お前が──ルヴィネか？　ほう……凄まじい力を秘めている。後で味見をするも面白いが……」
line = "「お前が──ルヴィネか？　ほう……凄まじい力を秘めている。後で味見をするも面白いが……」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「緋宮会長……！　よかった、間に合いましたね！」
line = "「緋宮会長……！　よかった、間に合いましたね！」"

[[dialogue]]
speaker = "アポロ"
# 「助太刀に来たぞ、魔王！！」
line = "「助太刀に来たぞ、魔王！！」"

[[dialogue]]
speaker = "クロト"
# 「フィオナ！　アポロ！　それに……ジグまで！　地上は大丈夫なのか！？」
line = "「フィオナ！　アポロ！　それに……ジグまで！　地上は大丈夫なのか！？」"

[[dialogue]]
speaker = "ジグ"
# 「アガサが１人で引き受けるって張り切っていてね。今しばらくは持つだろう」
line = "「アガサが１人で引き受けるって張り切っていてね。今しばらくは持つだろう」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「地上はプリマステラを総動員して防衛に当たっています！　この厄災の化身の相手は、魔王の力を持つ者が１人でも多く必要かと……！」
line = "「地上はプリマステラを総動員して防衛に当たっています！　この厄災の化身の相手は、魔王の力を持つ者が１人でも多く必要かと……！」"

[[dialogue]]
speaker = "クロト"
# 「すまない、助かる……！　ディザスターハンドを少しでも弱らせてくれ！　そうすればルヴィネがコントロールを取り戻せる！」
line = "「すまない、助かる……！　ディザスターハンドを少しでも弱らせてくれ！　そうすればルヴィネがコントロールを取り戻せる！」"

[[dialogue]]
speaker = "アポロ"
# 「任せろ！　ヒーローの一撃、見せてやるぜ！」
line = "「任せろ！　ヒーローの一撃、見せてやるぜ！」"

[[dialogue]]
speaker = "煌嶺"
# 「──フン。<ruby=かしま>姦</ruby>しくなってきたな」
line = "「──フン。<ruby>姦<rt>かしま</rt></ruby>しくなってきたな」"

[[dialogue]]
speaker = "煌嶺"
# 「魔王、ここからは争奪戦だ。よもや異論はあるまい？」
line = "「魔王、ここからは争奪戦だ。よもや異論はあるまい？」"

[[dialogue]]
speaker = "クロト"
# 「争奪戦……？」
line = "「争奪戦……？」"

[[dialogue]]
speaker = "煌嶺"
# 「貴様たちがコントロールを取り戻すか。それとも妾が、あの腕を傀儡にするか──奪い合うのだ」
line = "「貴様たちがコントロールを取り戻すか。それとも妾が、あの腕を傀儡にするか──奪い合うのだ」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「そ、そんなことを言っている場合では……！」
line = "「そ、そんなことを言っている場合では……！」"

[[dialogue]]
speaker = "アポロ"
# 「そうだぞお前！　ちゃんと協力しろ！！」
line = "「そうだぞお前！　ちゃんと協力しろ！！」"

[[dialogue]]
speaker = "煌嶺"
# 「協力だと……？　くだらんことを聞かせるな、耳が腐る」
line = "「協力だと……？　くだらんことを聞かせるな、耳が腐る」"

[[dialogue]]
speaker = "煌嶺"
# 「構わぬな──魔王？」
line = "「構わぬな──魔王？」"

[[dialogue]]
speaker = "クロト"
# 「競い合うのが望みなら。でも、勝つのは俺たちだ」
line = "「競い合うのが望みなら。でも、勝つのは俺たちだ」"

[[dialogue]]
speaker = "煌嶺"
# 「それでよい！」
line = "「それでよい！」"

[[dialogue]]
speaker = "煌嶺"
# 「さぁ──死合いだ、厄災。その力、妾にとくと見せてみよ！！」
line = "「さぁ──死合いだ、厄災。その力、妾にとくと見せてみよ！！」"
