[[dialogue]]
speaker = "unk"
# 第４話,ルリエルと海デート～深夜編～,P
line = "第４話,ルリエルと海デート～深夜編～,P"

[[dialogue]]
speaker = "unk"
# 今日はルリエルと海デートした後、最後にバーベキューをしていた。
line = "今日はルリエルと海デートした後、最後にバーベキューをしていた。"

[[dialogue]]
speaker = "ルリエル"
# 「会長さん、会長さん、お肉焼けましたよ～！　ほーら、お口開けてくださーい。あーんしてあげますから」
line = "「会長さん、会長さん、お肉焼けましたよ～！　ほーら、お口開けてくださーい。あーんしてあげますから」"

[[dialogue]]
speaker = "ルリエル"
# 「えへへ、恥ずかしがらなくていいじゃないですかぁ。わたしたちの他にもう誰もいないんですし、イチャイチャしちゃいましょうよ～」
line = "「えへへ、恥ずかしがらなくていいじゃないですかぁ。わたしたちの他にもう誰もいないんですし、イチャイチャしちゃいましょうよ～」"

[[dialogue]]
speaker = "ルリエル"
# 「ルリエルにも食べさせてくださいですぅ。ほーりゃ、あーん……」
line = "「ルリエルにも食べさせてくださいですぅ。ほーりゃ、あーん……」"

[[dialogue]]
speaker = "ルリエル"
# 「はむぅん、もぐもぐ。ふへへ、美味し～♪」
line = "「はむぅん、もぐもぐ。ふへへ、美味し～♪」"

[[dialogue]]
speaker = "ルリエル"
# 「でもでも言ってみるものですね？　本当に朝から晩まで海デートしてくださるなんて」
line = "「でもでも言ってみるものですね？　本当に朝から晩まで海デートしてくださるなんて」"

[[dialogue]]
speaker = "ルリエル"
# 「ワガママ言いすぎかなって思いましたけど……えへへ、二つ返事で叶えてくれてとっても嬉しかったです。とっても贅沢な一日でした」
line = "「ワガママ言いすぎかなって思いましたけど……えへへ、二つ返事で叶えてくれてとっても嬉しかったです。とっても贅沢な一日でした」"

[[dialogue]]
speaker = "unk"
# 俺もルリエルと一日中海デートしたかったから
line = "俺もルリエルと一日中海デートしたかったから"

[[dialogue]]
speaker = "ルリエル"
# 「ふふ、会長さんってば、ルリエルの水着姿の虜ですもんね～？　彼女冥利に尽きちゃいますぅ。ほら、お口開けてください。もう一度、あーんしてあげますから」
line = "「ふふ、会長さんってば、ルリエルの水着姿の虜ですもんね～？　彼女冥利に尽きちゃいますぅ。ほら、お口開けてください。もう一度、あーんしてあげますから」"

[[dialogue]]
speaker = "ルリエル"
# 「そのままですよー、そのままそのまま……んっ、ちゅっ<emoji=heart04>　えへへっ、お肉を食べさせてあげるとはひと言も言ってないじゃないですかぁ<emoji=heart04>」
line = "「そのままですよー、そのままそのまま……んっ、ちゅっ<emoji=heart04>　えへへっ、お肉を食べさせてあげるとはひと言も言ってないじゃないですかぁ<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
# 「夜のビーチって不思議ですね？　波の音を聞いてるだけでも、ちゅっ……んっ、甘えたくなってきちゃいます……<emoji=heart04>」
line = "「夜のビーチって不思議ですね？　波の音を聞いてるだけでも、ちゅっ……んっ、甘えたくなってきちゃいます……<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
# 「勝手に顔が、えへへぇ～、にやけてきちゃいますもん……<emoji=heart04>　すーりすり……ぎゅ～<emoji=heart04>　わたしのこの想い、どうしたら伝わるんでしょうか～」
line = "「勝手に顔が、えへへぇ～、にやけてきちゃいますもん……<emoji=heart04>　すーりすり……ぎゅ～<emoji=heart04>　わたしのこの想い、どうしたら伝わるんでしょうか～」"

[[dialogue]]
speaker = "unk"
# 十分すぎるほど伝わってるよ
line = "十分すぎるほど伝わってるよ"

[[dialogue]]
speaker = "ルリエル"
# 「まだまだ伝え足りませんよぉ～。時間はたーっぷりあるので、これからゆっくりゆっくり伝えていくつもりですけど♪」
line = "「まだまだ伝え足りませんよぉ～。時間はたーっぷりあるので、これからゆっくりゆっくり伝えていくつもりですけど♪」"

[[dialogue]]
speaker = "ルリエル"
# 「おじいちゃんおばあちゃんになる頃には伝え切れてるといいんですが。えへへ、自信ありません。それくらい大好きなので」
line = "「おじいちゃんおばあちゃんになる頃には伝え切れてるといいんですが。えへへ、自信ありません。それくらい大好きなので」"

[[dialogue]]
speaker = "ルリエル"
# 「一緒にいるだけでどんどん好きが膨れあがっていきますもん。見てください、わたしの羽。こーんなにバタバタ羽ばたいちゃってますぅ」
line = "「一緒にいるだけでどんどん好きが膨れあがっていきますもん。見てください、わたしの羽。こーんなにバタバタ羽ばたいちゃってますぅ」"

[[dialogue]]
speaker = "ルリエル"
# 「ルリエルは本当に幸せ者なのです。会長さんみたいな素敵な彼氏さんと恋人になれて。人間界に留学してきた甲斐がありました」
line = "「ルリエルは本当に幸せ者なのです。会長さんみたいな素敵な彼氏さんと恋人になれて。人間界に留学してきた甲斐がありました」"

[[dialogue]]
speaker = "unk"
# オーバーだな
line = "オーバーだな"

[[dialogue]]
speaker = "ルリエル"
# 「本音ですよぉ？　言ったじゃないですか、会長さんとはウソじゃなくて本音を言い合いたいって」
line = "「本音ですよぉ？　言ったじゃないですか、会長さんとはウソじゃなくて本音を言い合いたいって」"

[[dialogue]]
speaker = "ルリエル"
# 「人間界に来てからたくさん楽しいことがありましたけど……会長さんの彼女さんになってからは、楽しいことしかなくなっちゃいましたもん」
line = "「人間界に来てからたくさん楽しいことがありましたけど……会長さんの彼女さんになってからは、楽しいことしかなくなっちゃいましたもん」"

[[dialogue]]
speaker = "ルリエル"
# 「好きな人と一緒だと、なんだって楽しくなっちゃうと言いますか……。こうしてくっついてるだけでも幸せな気持ちになっちゃうんです」
line = "「好きな人と一緒だと、なんだって楽しくなっちゃうと言いますか……。こうしてくっついてるだけでも幸せな気持ちになっちゃうんです」"

[[dialogue]]
speaker = "ルリエル"
# 「愛って素晴らしいですね？　何気ない日常が天にも昇る幸せな時間に変わっちゃうんですから」
line = "「愛って素晴らしいですね？　何気ない日常が天にも昇る幸せな時間に変わっちゃうんですから」"

[[dialogue]]
speaker = "unk"
# さてはまだ何かおねだりする気だな
line = "さてはまだ何かおねだりする気だな"

[[dialogue]]
speaker = "ルリエル"
# 「そんなつもりで言ってませんよ～。おねだりしようとしてたのは、えへへ、当たってますけど♪」
line = "「そんなつもりで言ってませんよ～。おねだりしようとしてたのは、えへへ、当たってますけど♪」"

[[dialogue]]
speaker = "ルリエル"
# 「じゃーんっ。実は花火を買っておいたんです～！　一緒にやりませんかっ？　恋人って夏の深夜に砂浜で花火をするものなんですよねっ？」
line = "「じゃーんっ。実は花火を買っておいたんです～！　一緒にやりませんかっ？　恋人って夏の深夜に砂浜で花火をするものなんですよねっ？」"

[[dialogue]]
speaker = "ルリエル"
# 「あ、テンション上がっちゃいました？　ふふん、ルリエルのワガママもたまにはいいものでしょう？　ではでは早速、火を点けて──」
line = "「あ、テンション上がっちゃいました？　ふふん、ルリエルのワガママもたまにはいいものでしょう？　ではでは早速、火を点けて──」"

[[dialogue]]
speaker = "ルリエル"
# 「ふぇっ！？　つ、点きませんっ！？　ワクワクしすぎて袋から出しちゃってたのがいけなかったみたいですぅ。潮風でぜーんぶ湿気っちゃって……」
line = "「ふぇっ！？　つ、点きませんっ！？　ワクワクしすぎて袋から出しちゃってたのがいけなかったみたいですぅ。潮風でぜーんぶ湿気っちゃって……」"

[[dialogue]]
speaker = "ルリエル"
# 「うう、せっかく会長さんと花火するの楽しみにしてたのに……。初めての花火は会長さんとって思って今朝から心待ちにしてたのにぃ……」
line = "「うう、せっかく会長さんと花火するの楽しみにしてたのに……。初めての花火は会長さんとって思って今朝から心待ちにしてたのにぃ……」"

[[dialogue]]
speaker = "ルリエル"
# 「ほえ……？　どうしたんですか、会長さん。急に鞄の中をゴソゴソして……」
line = "「ほえ……？　どうしたんですか、会長さん。急に鞄の中をゴソゴソして……」"

[[dialogue]]
speaker = "ルリエル"
# 「あっ、それ花火じゃないですかぁ！　もしかして会長さんもわたしと花火するために買っておいてくれてっ……？」
line = "「あっ、それ花火じゃないですかぁ！　もしかして会長さんもわたしと花火するために買っておいてくれてっ……？」"

[[dialogue]]
speaker = "ルリエル"
# 「えへ、えへへへぇ～。どれだけわたしを惚れさせれば気が済むんですかぁ～。好感度爆上がりですよぉ～！」
line = "「えへ、えへへへぇ～。どれだけわたしを惚れさせれば気が済むんですかぁ～。好感度爆上がりですよぉ～！」"

[[dialogue]]
speaker = "ルリエル"
# 「じゃあじゃあ、どれからやりましょうか。いっぱいありすぎて迷っちゃいますね～？」
line = "「じゃあじゃあ、どれからやりましょうか。いっぱいありすぎて迷っちゃいますね～？」"

[[dialogue]]
speaker = "ルリエル"
# 「きゃあああああっっ～～！！？　なんですか、この花火っ！！　ねずみみたいに足下で這い回ってっ！？　こんなもの投げてこないでくださいよぉ～！！？」
line = "「きゃあああああっっ～～！！？　なんですか、この花火っ！！　ねずみみたいに足下で這い回ってっ！？　こんなもの投げてこないでくださいよぉ～！！？」"

[[dialogue]]
speaker = "ルリエル"
# 「大切な彼女にそんなことするなら──えいっ！　花火二刀流っ！」
line = "「大切な彼女にそんなことするなら──えいっ！　花火二刀流っ！」"

[[dialogue]]
speaker = "ルリエル"
# 「あははっ、逃げないでくださいよぉっ！　花火は人に向けちゃダメ？　先に変なの投げ込んできたのは会長さんの方じゃないですかぁ～！　そーら待て待て待て～！」
line = "「あははっ、逃げないでくださいよぉっ！　花火は人に向けちゃダメ？　先に変なの投げ込んできたのは会長さんの方じゃないですかぁ～！　そーら待て待て待て～！」"

[[dialogue]]
speaker = "ルリエル"
# 「──はぶっ！？　転んじゃいましたぁ～……。両手が塞がってたせーで砂浜に顔面ダイブ、顔中砂だらけですよぉ～……！」
line = "「──はぶっ！？　転んじゃいましたぁ～……。両手が塞がってたせーで砂浜に顔面ダイブ、顔中砂だらけですよぉ～……！」"

[[dialogue]]
speaker = "ルリエル"
# 「えへへ……でもでもやっぱり、なんだって楽しいですね？　顔から砂浜にダイブしちゃっても会長さんと一緒だとついつい笑顔になっちゃいます」
line = "「えへへ……でもでもやっぱり、なんだって楽しいですね？　顔から砂浜にダイブしちゃっても会長さんと一緒だとついつい笑顔になっちゃいます」"

[[dialogue]]
speaker = "ルリエル"
# 「よーし、最後は線香花火で締めましょう！　これなら会長さんとくっつきながらできちゃいますし♪」
line = "「よーし、最後は線香花火で締めましょう！　これなら会長さんとくっつきながらできちゃいますし♪」"

[[dialogue]]
speaker = "ルリエル"
# 「あ、さっきみたいに人の花火に息をふーってかけて、火種を落とすのはなしですよぉ～？　これが最後の二本なんですから」
line = "「あ、さっきみたいに人の花火に息をふーってかけて、火種を落とすのはなしですよぉ～？　これが最後の二本なんですから」"

[[dialogue]]
speaker = "ルリエル"
# 「ほーら、ん。もっと近くに寄ってください。えへへ、それじゃ一緒に火を点けますよ？　せーの」
line = "「ほーら、ん。もっと近くに寄ってください。えへへ、それじゃ一緒に火を点けますよ？　せーの」"

[[dialogue]]
speaker = "ルリエル"
# 「わぁー……。何度見ても綺麗ですね～。ルリエル、線香花火が一番好きかもですぅ」
line = "「わぁー……。何度見ても綺麗ですね～。ルリエル、線香花火が一番好きかもですぅ」"

[[dialogue]]
speaker = "ルリエル"
# 「でも……これで最後だと思うとちょっぴり寂しいですね？　明日も明後日もこんな毎日が続くとはわかっているのですが……」
line = "「でも……これで最後だと思うとちょっぴり寂しいですね？　明日も明後日もこんな毎日が続くとはわかっているのですが……」"

[[dialogue]]
speaker = "ルリエル"
# 「少しだけ……ふと不安になっちゃう時があるんです。楽しいからこそ、幸せだからこそ、この幸せが失われちゃったらどうしようって……」
line = "「少しだけ……ふと不安になっちゃう時があるんです。楽しいからこそ、幸せだからこそ、この幸せが失われちゃったらどうしようって……」"

[[dialogue]]
speaker = "ルリエル"
# 「って、あっ。花火が……。あはは、変なこと話しちゃったからですかね……？　今のが最後でしたのに……」
line = "「って、あっ。花火が……。あはは、変なこと話しちゃったからですかね……？　今のが最後でしたのに……」"

[[dialogue]]
speaker = "ルリエル"
# 「うう～、笑わないでくださいよぉ。それだけ会長さんのことが好きってことじゃないですかぁ」
line = "「うう～、笑わないでくださいよぉ。それだけ会長さんのことが好きってことじゃないですかぁ」"

[[dialogue]]
speaker = "ルリエル"
# 「わたしも似合わないこと考えてるってわかってます。でもでも恋って人を成長させちゃうものなんですね。考えなくていいことまで考えちゃって……」
line = "「わたしも似合わないこと考えてるってわかってます。でもでも恋って人を成長させちゃうものなんですね。考えなくていいことまで考えちゃって……」"

[[dialogue]]
speaker = "unk"
# 絶対に失わせないから安心してよ
line = "絶対に失わせないから安心してよ"

[[dialogue]]
speaker = "ルリエル"
# 「ほえ……？　なんですか、また鞄の中をゴソゴソして……。あっ、もう一袋花火買っておいてくれたんですかっ？」
line = "「ほえ……？　なんですか、また鞄の中をゴソゴソして……。あっ、もう一袋花火買っておいてくれたんですかっ？」"

[[dialogue]]
speaker = "ルリエル"
# 「えへへっ、確かにつまらないこと考えちゃってましたね！　会長さんと一緒にいる限り、この幸せがなくなっちゃうことなんて有り得ないですもんっ！」
line = "「えへへっ、確かにつまらないこと考えちゃってましたね！　会長さんと一緒にいる限り、この幸せがなくなっちゃうことなんて有り得ないですもんっ！」"

[[dialogue]]
speaker = "ルリエル"
# 「大好きですよ、会長さん。これからも２人で毎日、幸せいーっぱいに過ごしましょうねっ？」
line = "「大好きですよ、会長さん。これからも２人で毎日、幸せいーっぱいに過ごしましょうねっ？」"

[[dialogue]]
speaker = "ルリエル"
# 「来年の夏も、再来年の夏も、えへへ、また一緒に海へ花火をしに来ましょうっ！」
line = "「来年の夏も、再来年の夏も、えへへ、また一緒に海へ花火をしに来ましょうっ！」"
