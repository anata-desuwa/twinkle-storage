[[dialogue]]
speaker = "unk"
# 第３話,ソフィアとサーシャ,P
line = "第３話,ソフィアとサーシャ,P"

[[dialogue]]
speaker = "ソフィア"
# 「うー……」
line = "「うー……」"

[[dialogue]]
speaker = "unk"
# 不機嫌っぽい？
line = "不機嫌っぽい？"

[[dialogue]]
speaker = "ソフィア"
# 「聞いてくださいよ、会長さん！　私の憤りがトゥーホットです！」
line = "「聞いてくださいよ、会長さん！　私の憤りがトゥーホットです！」"

[[dialogue]]
speaker = "ソフィア"
# 「会長さんと一緒にパトロールしていることを流星星徒会のみなさんに話したら──」
line = "「会長さんと一緒にパトロールしていることを流星星徒会のみなさんに話したら──」"

[[dialogue]]
speaker = "ユウリ"
# 「へぇ、ソフィアって新星の会長さんと仲いいんだな」
line = "「へぇ、ソフィアって新星の会長さんと仲いいんだな」"

[[dialogue]]
speaker = "ルリエル"
# 「仲良きことはいいことだと思いますっ」
line = "「仲良きことはいいことだと思いますっ」"

[[dialogue]]
speaker = "セーラ"
# 「ほぉほぉ、これはこれは……ソフィアちゃん、頑張ってね～♪」
line = "「ほぉほぉ、これはこれは……ソフィアちゃん、頑張ってね～♪」"

[[dialogue]]
speaker = "ソフィア"
# 「むー……」
line = "「むー……」"

[[dialogue]]
speaker = "ソフィア"
# 「──って、まるで私が遊んでるみたいに！　私は真面目にパトロールしてるんですよ」
line = "「──って、まるで私が遊んでるみたいに！　私は真面目にパトロールしてるんですよ」"

[[dialogue]]
speaker = "ソフィア"
# 「みなさん能力が高いことは確かなんですが、なんであんなに奔放なんですか。星徒会役員は全生徒の規範となるべき存在なのに……」
line = "「みなさん能力が高いことは確かなんですが、なんであんなに奔放なんですか。星徒会役員は全生徒の規範となるべき存在なのに……」"

[[dialogue]]
speaker = "ソフィア"
# 「私が遊んでいないことを証明するためにも、今日はこの辺りをパトロールしましょう」
line = "「私が遊んでいないことを証明するためにも、今日はこの辺りをパトロールしましょう」"

[[dialogue]]
speaker = "ソフィア"
# 「まったくもうっ、フィオナ会長が選んだのに、どうしてああなるんでしょうか」
line = "「まったくもうっ、フィオナ会長が選んだのに、どうしてああなるんでしょうか」"

[[dialogue]]
speaker = "unk"
# 近くに新しいパンケーキのお店があるらしい
line = "近くに新しいパンケーキのお店があるらしい"

[[dialogue]]
speaker = "ソフィア"
# 「そうなんですか？　じゃあパトロールが終わったら──」
line = "「そうなんですか？　じゃあパトロールが終わったら──」"

[[dialogue]]
speaker = "ソフィア"
# 「って、そうじゃありません！　言ったじゃないですか、遊びじゃないって」
line = "「って、そうじゃありません！　言ったじゃないですか、遊びじゃないって」"

[[dialogue]]
speaker = "ソフィア"
# 「露骨にがっかりしないでください。パンケーキ食べに来たんじゃないんですから」
line = "「露骨にがっかりしないでください。パンケーキ食べに来たんじゃないんですから」"

[[dialogue]]
speaker = "ソフィア"
# 「その……私のために調べてきてくれたことはありがとうございます。会長さんのそういうところ、嫌いではありません。ですがマイペース過ぎます」
line = "「その……私のために調べてきてくれたことはありがとうございます。会長さんのそういうところ、嫌いではありません。ですがマイペース過ぎます」"

[[dialogue]]
speaker = "ソフィア"
# 「では行きましょう。今こうしている間にもモンスターが出現しているかもしれません」
line = "「では行きましょう。今こうしている間にもモンスターが出現しているかもしれません」"

[[dialogue]]
speaker = "ソフィア"
# 「こっちもモンスター、いませんね。……無言で巡回するのもなんですし、少しお話しましょうか」
line = "「こっちもモンスター、いませんね。……無言で巡回するのもなんですし、少しお話しましょうか」"

[[dialogue]]
speaker = "ソフィア"
# 「そちらの星徒会はどんなご様子ですか？　やはり星徒会らしく落ち着いていて、理路整然としていて……なわけないですよね。姉さんや前会長がいるんですし」
line = "「そちらの星徒会はどんなご様子ですか？　やはり星徒会らしく落ち着いていて、理路整然としていて……なわけないですよね。姉さんや前会長がいるんですし」"

[[dialogue]]
speaker = "ソフィア"
# 「こちらはよくゲーム大会になってます。この前はＵＭＯをしていましたし」
line = "「こちらはよくゲーム大会になってます。この前はＵＭＯをしていましたし」"

[[dialogue]]
speaker = "ソフィア"
# 「会長さん、部活は？　……あ、新星学園に入ったばかりで星徒会長になったんですし、それどころじゃなかったですね」
line = "「会長さん、部活は？　……あ、新星学園に入ったばかりで星徒会長になったんですし、それどころじゃなかったですね」"

[[dialogue]]
speaker = "ソフィア"
# 「私はフィギュアスケート部に所属しています」
line = "「私はフィギュアスケート部に所属しています」"

[[dialogue]]
speaker = "ソフィア"
# 「だから、パトロールができるのはフィギュアスケート部や星徒会の活動がない時だけです」
line = "「だから、パトロールができるのはフィギュアスケート部や星徒会の活動がない時だけです」"

[[dialogue]]
speaker = "ソフィア"
# 「近々大会があって、それに向けて練習しているんです。もちろん星徒会も大事ですが、フィギュアを諦めるつもりはありません」
line = "「近々大会があって、それに向けて練習しているんです。もちろん星徒会も大事ですが、フィギュアを諦めるつもりはありません」"

[[dialogue]]
speaker = "ソフィア"
# 「寒くないのって言いたそうな顔ですね。……なぜか滑っている時だけは寒さが気にならないんです。自分でもなぜかはわからないですが」
line = "「寒くないのって言いたそうな顔ですね。……なぜか滑っている時だけは寒さが気にならないんです。自分でもなぜかはわからないですが」"

[[dialogue]]
speaker = "ソフィア"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# サーシャさんのことは嫌い？
line = "サーシャさんのことは嫌い？"

[[dialogue]]
speaker = "ソフィア"
# 「嫌いなわけではありません。でなければ、姉に会うかもしれないのに人間界に来て星騎士になったりなんかしません」
line = "「嫌いなわけではありません。でなければ、姉に会うかもしれないのに人間界に来て星騎士になったりなんかしません」"

[[dialogue]]
speaker = "ソフィア"
# 「ただなんというか……合わないんです、性格的に。私はこんな感じで、姉はぽわぽわしてますから」
line = "「ただなんというか……合わないんです、性格的に。私はこんな感じで、姉はぽわぽわしてますから」"

[[dialogue]]
speaker = "ソフィア"
# 「いつまでも猫かわいがりしてくるのはやめてほしいです。もう子どもじゃないんですから」
line = "「いつまでも猫かわいがりしてくるのはやめてほしいです。もう子どもじゃないんですから」"

[[dialogue]]
speaker = "ソフィア"
# 「流星の星徒会のみなさんだってそうです。嫌いではありませんよ、もっと真面目に仕事してほしいと思っていますが」
line = "「流星の星徒会のみなさんだってそうです。嫌いではありませんよ、もっと真面目に仕事してほしいと思っていますが」"

[[dialogue]]
speaker = "ソフィア"
# 「一回りしましたし、今日はこのくらいにしておきましょうか。結局何もありませんでしたが、何もないのはそれはそれでいいことです」
line = "「一回りしましたし、今日はこのくらいにしておきましょうか。結局何もありませんでしたが、何もないのはそれはそれでいいことです」"

[[dialogue]]
speaker = "ソフィア"
# 「あ……ホットのミルクティー、ありがとうございます」
line = "「あ……ホットのミルクティー、ありがとうございます」"

[[dialogue]]
speaker = "ソフィア"
# 「ふわ～……あったか～い……」
line = "「ふわ～……あったか～い……」"

[[dialogue]]
speaker = "unk"
# （すごく幸せそう）
line = "（すごく幸せそう）"

[[dialogue]]
speaker = "ソフィア"
# 「ハッ！　今のは何でもありません。気の緩みとかではありませんからねっ」
line = "「ハッ！　今のは何でもありません。気の緩みとかではありませんからねっ」"

[[dialogue]]
speaker = "ソフィア"
# 「うー……なんですか、その微笑ましいと言わんばかりの顔は……」
line = "「うー……なんですか、その微笑ましいと言わんばかりの顔は……」"

[[dialogue]]
speaker = "ソフィア"
# 「……パンケーキ？　そういえば、パトロールの前に言っていましたね。会長さんが行きたいなら、一緒に行くのはやぶさかではありませんが……」
line = "「……パンケーキ？　そういえば、パトロールの前に言っていましたね。会長さんが行きたいなら、一緒に行くのはやぶさかではありませんが……」"

[[dialogue]]
speaker = "unk"
# ソフィアと一緒に行きたい
line = "ソフィアと一緒に行きたい"

[[dialogue]]
speaker = "ソフィア"
# 「……わかりました。そこまで言うなら行きましょう」
line = "「……わかりました。そこまで言うなら行きましょう」"

[[dialogue]]
speaker = "ソフィア"
# 「でも一緒にお店に行ったことは他の人には秘密です。遊びに来たわけではありませんからね」
line = "「でも一緒にお店に行ったことは他の人には秘密です。遊びに来たわけではありませんからね」"
