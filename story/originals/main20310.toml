[[dialogue]]
speaker = "unk"
# 第１０話,選挙管理委員会の幕間,B
line = "第１０話,選挙管理委員会の幕間,B"

[[dialogue]]
speaker = "unk"
# 極星学園の襲撃と、ジグの出現から３日が経過した。
line = "極星学園の襲撃と、ジグの出現から３日が経過した。"

[[dialogue]]
speaker = "unk"
# 選挙管理委員会のメンバーは、梨緒が保健室から出られるようになったことを祝して、カフェテリアに集合していた。
line = "選挙管理委員会のメンバーは、梨緒が保健室から出られるようになったことを祝して、カフェテリアに集合していた。"

[[dialogue]]
speaker = "梨緒"
# 「すまない、みんな。心配をかけたな」
line = "「すまない、みんな。心配をかけたな」"

[[dialogue]]
speaker = "ベアトリス"
# 「ううん、梨緒ちゃんが元気になって良かった」
line = "「ううん、梨緒ちゃんが元気になって良かった」"

[[dialogue]]
speaker = "アポロ"
# 「あのままじゃ張り合いがなかったからな。多少はマシな顔になったぞ！」
line = "「あのままじゃ張り合いがなかったからな。多少はマシな顔になったぞ！」"

[[dialogue]]
speaker = "ナターシャ"
# 「まぁ落ち着いたなら何より。で、選挙管理委員会として、今後の方針は？」
line = "「まぁ落ち着いたなら何より。で、選挙管理委員会として、今後の方針は？」"

[[dialogue]]
speaker = "梨緒"
# 「……ジグがリクリエの使徒として立ちはだかるなら戦う。それは変わらない」
line = "「……ジグがリクリエの使徒として立ちはだかるなら戦う。それは変わらない」"

[[dialogue]]
speaker = "梨緒"
# 「だが最善は──」
line = "「だが最善は──」"

[[dialogue]]
speaker = "紅明"
# 「オーッス、選管のみんな！」
line = "「オーッス、選管のみんな！」"

[[dialogue]]
speaker = "梨緒"
# 「わあっ！？」
line = "「わあっ！？」"

[[dialogue]]
speaker = "梨緒"
# 「ど、どうしたんだ紅明？　私たちに用か？」
line = "「ど、どうしたんだ紅明？　私たちに用か？」"

[[dialogue]]
speaker = "紅明"
# 「おうよ！　クイズ大会の表彰式がこの前のゴタゴタでまだだったろ？　そんで賞品を渡しそびれちゃってさ」
line = "「おうよ！　クイズ大会の表彰式がこの前のゴタゴタでまだだったろ？　そんで賞品を渡しそびれちゃってさ」"

[[dialogue]]
speaker = "紅明"
# 「はい、賞品の商品券！　準優勝おめでと～！」
line = "「はい、賞品の商品券！　準優勝おめでと～！」"

[[dialogue]]
speaker = "紅明"
# 「商品券はカフェテリアでも使えるから、パーッと使っちゃうのもアリだぜ！　じゃ～な～♪」
line = "「商品券はカフェテリアでも使えるから、パーッと使っちゃうのもアリだぜ！　じゃ～な～♪」"

[[dialogue]]
speaker = "梨緒"
# 「あ、ああ……」
line = "「あ、ああ……」"

[[dialogue]]
speaker = "unk"
# それだけ伝えると、紅明は元気に駆けだしていった。
line = "それだけ伝えると、紅明は元気に駆けだしていった。"

[[dialogue]]
speaker = "unk"
# いつも通り嵐のような勢いだった。
line = "いつも通り嵐のような勢いだった。"

[[dialogue]]
speaker = "梨緒"
# 「準……優勝……」
line = "「準……優勝……」"

[[dialogue]]
speaker = "梨緒"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ベアトリス"
# 「梨緒ちゃん……？」
line = "「梨緒ちゃん……？」"

[[dialogue]]
speaker = "梨緒"
# 「選挙管理委員会で力を合わせて、準優勝を勝ち取ることができた。これは大きな成果だ」
line = "「選挙管理委員会で力を合わせて、準優勝を勝ち取ることができた。これは大きな成果だ」"

[[dialogue]]
speaker = "梨緒"
# 「だが私の気は収まらない……！　次は星徒会に勝つぞ！」
line = "「だが私の気は収まらない……！　次は星徒会に勝つぞ！」"

[[dialogue]]
speaker = "アポロ"
# 「ああ、その通りだぜ！　目指すは優勝、完全勝利だ！」
line = "「ああ、その通りだぜ！　目指すは優勝、完全勝利だ！」"

[[dialogue]]
speaker = "ベアトリス"
# 「あははは……」
line = "「あははは……」"

[[dialogue]]
speaker = "ナターシャ"
# 「あ～あ、せっかくしおらしくしてたのに、いつもの調子に戻っちゃった」
line = "「あ～あ、せっかくしおらしくしてたのに、いつもの調子に戻っちゃった」"

[[dialogue]]
speaker = "unk"
# アポロはリベンジする気満々で、ベアトリスは苦笑し、ナターシャは呆れて肩を竦める。
line = "アポロはリベンジする気満々で、ベアトリスは苦笑し、ナターシャは呆れて肩を竦める。"

[[dialogue]]
speaker = "unk"
# 梨緒と一番気が合うのは、案外最後に加わったアポロなのかもしれない。
line = "梨緒と一番気が合うのは、案外最後に加わったアポロなのかもしれない。"

[[dialogue]]
speaker = "梨緒"
# 「コホン。話を戻そう」
line = "「コホン。話を戻そう」"

[[dialogue]]
speaker = "梨緒"
# 「今後、私たちも戦い続けるのなら、新しい『リクリエの使徒』……ジグとの戦闘は避けられないだろう」
line = "「今後、私たちも戦い続けるのなら、新しい『リクリエの使徒』……ジグとの戦闘は避けられないだろう」"

[[dialogue]]
speaker = "梨緒"
# 「だが同じ星徒会で戦った者として、彼女をリクリエの呪縛から救いたい。それにジグを解放することができれば、大きな戦力となるはずだ」
line = "「だが同じ星徒会で戦った者として、彼女をリクリエの呪縛から救いたい。それにジグを解放することができれば、大きな戦力となるはずだ」"

[[dialogue]]
speaker = "アポロ"
# 「おう！　絶対に取り戻すぞ！」
line = "「おう！　絶対に取り戻すぞ！」"

[[dialogue]]
speaker = "アポロ"
# 「よし、ここでおさらいだ！　この間はあんまり詳しく話せなかったところも含めて、改めてあたしから説明するぞ！」
line = "「よし、ここでおさらいだ！　この間はあんまり詳しく話せなかったところも含めて、改めてあたしから説明するぞ！」"

[[dialogue]]
speaker = "ベアトリス"
# 「それって、アポロちゃんにとっては辛い話になるんじゃ……」
line = "「それって、アポロちゃんにとっては辛い話になるんじゃ……」"

[[dialogue]]
speaker = "アポロ"
# 「楽しい話じゃないのはその通りだけど、流星ライダーはいつだってトラウマを克服して強くなるんだ！」
line = "「楽しい話じゃないのはその通りだけど、流星ライダーはいつだってトラウマを克服して強くなるんだ！」"

[[dialogue]]
speaker = "アポロ"
# 「それにあたしは、今度こそヒーローになるって誓ったからな。あたしの経験で誰かを助けられるなら、やらない理由はないぜ！」
line = "「それにあたしは、今度こそヒーローになるって誓ったからな。あたしの経験で誰かを助けられるなら、やらない理由はないぜ！」"

[[dialogue]]
speaker = "アポロ"
# 「……というわけで前に話した通り、リクリエの使徒だったのは、肉体的にはデネブのあたしってことになるな」
line = "「……というわけで前に話した通り、リクリエの使徒だったのは、肉体的にはデネブのあたしってことになるな」"

[[dialogue]]
speaker = "unk"
# アポロの口から、彼女がリクリエの使徒になり、そして<ruby=フィオナ>妹</ruby>たちによって救われた一部始終が語られる。
line = "アポロの口から、彼女がリクリエの使徒になり、そして<ruby>妹<rt>フィオナ</rt></ruby>たちによって救われた一部始終が語られる。"

[[dialogue]]
speaker = "unk"
# 平行世界デネブとアルタイルの関わりや、緋宮クロトの体にリクリエが封じられていることも、改めてアポロの視点から補足された。
line = "平行世界デネブとアルタイルの関わりや、緋宮クロトの体にリクリエが封じられていることも、改めてアポロの視点から補足された。"

[[dialogue]]
speaker = "ベアトリス"
# 「うぅ……話が難しくて、まだ理解できた気がしないよぉ……」
line = "「うぅ……話が難しくて、まだ理解できた気がしないよぉ……」"

[[dialogue]]
speaker = "梨緒"
# 「ありがとう、アポロ。何が起こったのか改めて理解できた」
line = "「ありがとう、アポロ。何が起こったのか改めて理解できた」"

[[dialogue]]
speaker = "梨緒"
# 「だが、緋宮クロトも言っていた通り、ジグは魔王の血統ではない。アポロと同じ手は使えないだろう」
line = "「だが、緋宮クロトも言っていた通り、ジグは魔王の血統ではない。アポロと同じ手は使えないだろう」"

[[dialogue]]
speaker = "アポロ"
# 「星騎士だって以前よりもみんなパワーアップしてるんだ！　あたしの時よりももっといい方法だって見つかるはずだぜ」
line = "「星騎士だって以前よりもみんなパワーアップしてるんだ！　あたしの時よりももっといい方法だって見つかるはずだぜ」"

[[dialogue]]
speaker = "梨緒"
# 「ああ。すぐには見つからなくても、諦めずに模索していこう」
line = "「ああ。すぐには見つからなくても、諦めずに模索していこう」"

[[dialogue]]
speaker = "ナターシャ"
# 「あとは……ジグが本当に平行世界から来たって根拠がもう少し欲しいかな」
line = "「あとは……ジグが本当に平行世界から来たって根拠がもう少し欲しいかな」"

[[dialogue]]
speaker = "ナターシャ"
# 「星徒会も嘘は言ってないと思うんだけど、彼らが前提を間違えていた場合、全部の話がひっくり返っちゃうからね」
line = "「星徒会も嘘は言ってないと思うんだけど、彼らが前提を間違えていた場合、全部の話がひっくり返っちゃうからね」"

[[dialogue]]
speaker = "ベアトリス"
# 「そ、そうだね……やっぱり情報が多い方がいいと思う」
line = "「そ、そうだね……やっぱり情報が多い方がいいと思う」"

[[dialogue]]
speaker = "梨緒"
# （私とジグは平行世界から来た可能性が高い。だが──）
line = "（私とジグは平行世界から来た可能性が高い。だが──）"

[[dialogue]]
speaker = "梨緒"
# （アルタイル、デネブ、ベガ……平行世界は３つあるという。ここはアルタイル。極星学園はデネブにあるらしい）
line = "（アルタイル、デネブ、ベガ……平行世界は３つあるという。ここはアルタイル。極星学園はデネブにあるらしい）"

[[dialogue]]
speaker = "梨緒"
# （そうなれば、緋宮クロトの推測通り、私の故郷はベガということになる……）
line = "（そうなれば、緋宮クロトの推測通り、私の故郷はベガということになる……）"

[[dialogue]]
speaker = "梨緒"
# （ここは私の生まれた次元ではない……そう考えれば、私を知らないフィオナとエリシア、緋宮クロトの立場の違い、ヴィーナスの存在……様々な違和感に合点がいく）
line = "（ここは私の生まれた次元ではない……そう考えれば、私を知らないフィオナとエリシア、緋宮クロトの立場の違い、ヴィーナスの存在……様々な違和感に合点がいく）"

[[dialogue]]
speaker = "梨緒"
# （ラクシャが言っていた、『覚悟ができたら聞いて』とは……そういう意味なのか？）
line = "（ラクシャが言っていた、『覚悟ができたら聞いて』とは……そういう意味なのか？）"

[[dialogue]]
speaker = "ベアトリス"
# 「梨緒ちゃん？」
line = "「梨緒ちゃん？」"

[[dialogue]]
speaker = "梨緒"
# 「あ、いや……何でもない。ジグのことを少し考えていただけだ」
line = "「あ、いや……何でもない。ジグのことを少し考えていただけだ」"

[[dialogue]]
speaker = "梨緒"
# 「私の仲間はもうみんな死んだと思っていた。ジグが生きていたのは……喜ぶべきことだ」
line = "「私の仲間はもうみんな死んだと思っていた。ジグが生きていたのは……喜ぶべきことだ」"

[[dialogue]]
speaker = "梨緒"
# 「だが…………」
line = "「だが…………」"

[[dialogue]]
speaker = "ベアトリス"
# 「梨緒ちゃん……」
line = "「梨緒ちゃん……」"

[[dialogue]]
speaker = "ベアトリス"
# 「梨緒ちゃんだけは、彼女が生きてたことを喜んでいいと思う」
line = "「梨緒ちゃんだけは、彼女が生きてたことを喜んでいいと思う」"

[[dialogue]]
speaker = "ベアトリス"
# 「だって、あのジグって人を知ってるのはもう梨緒ちゃんだけなんでしょ？　だから梨緒ちゃんだけはあの人の味方でいてあげて」
line = "「だって、あのジグって人を知ってるのはもう梨緒ちゃんだけなんでしょ？　だから梨緒ちゃんだけはあの人の味方でいてあげて」"

[[dialogue]]
speaker = "梨緒"
# 「……ありがとう、ベアト」
line = "「……ありがとう、ベアト」"

[[dialogue]]
speaker = "unk"
# 包み込むように優しく微笑むベアトリスに、梨緒の表情も自然と柔らかくなっていた。
line = "包み込むように優しく微笑むベアトリスに、梨緒の表情も自然と柔らかくなっていた。"

[[dialogue]]
speaker = "アポロ"
# 「そういえば、どうしてレナーテじゃなくてジグなんだ？　ミドルネームだろ、それ」
line = "「そういえば、どうしてレナーテじゃなくてジグなんだ？　ミドルネームだろ、それ」"

[[dialogue]]
speaker = "ナターシャ"
# 「凄くどうでもいいところを突っ込んだね？」
line = "「凄くどうでもいいところを突っ込んだね？」"

[[dialogue]]
speaker = "アポロ"
# 「いや、気になるだろ！」
line = "「いや、気になるだろ！」"

[[dialogue]]
speaker = "ナターシャ"
# 「まあ、確かにちょっと気になってたけどさ」
line = "「まあ、確かにちょっと気になってたけどさ」"

[[dialogue]]
speaker = "梨緒"
# 「……初めて会った時、やつの方からアガサと呼んできたんだ。私たち２人で『ＡｔｏＺ』だと面白がってな。それ以来、ミドルネームで呼び合うようになった」
line = "「……初めて会った時、やつの方からアガサと呼んできたんだ。私たち２人で『ＡｔｏＺ』だと面白がってな。それ以来、ミドルネームで呼び合うようになった」"

[[dialogue]]
speaker = "梨緒"
# 「当人は忘れた様子で、つゆも知らないといった感じだったがな」
line = "「当人は忘れた様子で、つゆも知らないといった感じだったがな」"

[[dialogue]]
speaker = "アポロ"
# 「へ～、ジグって変わったやつなんだな。何度も勝負したって言ってたけど、どんくらい勝負したんだ？」
line = "「へ～、ジグって変わったやつなんだな。何度も勝負したって言ってたけど、どんくらい勝負したんだ？」"

[[dialogue]]
speaker = "梨緒"
# 「９９７回。全て負けた」
line = "「９９７回。全て負けた」"

[[dialogue]]
speaker = "アポロ"
# 「────」
line = "「────」"

[[dialogue]]
speaker = "梨緒"
# 「いや、９９８連敗か。先日は軽くあしらわれてしまった」
line = "「いや、９９８連敗か。先日は軽くあしらわれてしまった」"

[[dialogue]]
speaker = "アポロ"
# 「いくら何でも勝負しすぎだろ！　そんだけ負けたらいい加減諦めろって！？」
line = "「いくら何でも勝負しすぎだろ！　そんだけ負けたらいい加減諦めろって！？」"

[[dialogue]]
speaker = "梨緒"
# 「いいや、負けたままでは終われない。いつか必ず勝つ……！」
line = "「いいや、負けたままでは終われない。いつか必ず勝つ……！」"

[[dialogue]]
speaker = "アポロ"
# 「筋金入りだなぁ……」
line = "「筋金入りだなぁ……」"

[[dialogue]]
speaker = "ベアトリス"
# 「梨緒ちゃん……」
line = "「梨緒ちゃん……」"

[[dialogue]]
speaker = "ナターシャ"
# 「いや～、とんでもない委員長についてきちゃったのかもね、私たち」
line = "「いや～、とんでもない委員長についてきちゃったのかもね、私たち」"

[[dialogue]]
speaker = "ナターシャ"
# 「ところでベアト、身の上話ついでというか、私も前から気になってたことがあるんだけど……」
line = "「ところでベアト、身の上話ついでというか、私も前から気になってたことがあるんだけど……」"

[[dialogue]]
speaker = "ベアトリス"
# 「ん？　なになに？」
line = "「ん？　なになに？」"

[[dialogue]]
speaker = "ナターシャ"
# 「とても今更な話なんだけど、ベアトって吸血鬼なんでしょ？　なんで日中も問題なく活動できてるのかなって」
line = "「とても今更な話なんだけど、ベアトって吸血鬼なんでしょ？　なんで日中も問題なく活動できてるのかなって」"

[[dialogue]]
speaker = "ナターシャ"
# 「吸血鬼がニンニク弱点なのは都市伝説だけど、日の光を浴びるのがダメなのは本当だって話じゃない？」
line = "「吸血鬼がニンニク弱点なのは都市伝説だけど、日の光を浴びるのがダメなのは本当だって話じゃない？」"

[[dialogue]]
speaker = "ナターシャ"
# 「もしかして太陽を克服した希少種ってやつ？　デイマスターっていうんだっけ？」
line = "「もしかして太陽を克服した希少種ってやつ？　デイマスターっていうんだっけ？」"

[[dialogue]]
speaker = "アポロ"
# 「デイマスター！？　なんだそれ、カッコイイな！」
line = "「デイマスター！？　なんだそれ、カッコイイな！」"

[[dialogue]]
speaker = "ベアトリス"
# 「ううん、私、デイマスターじゃないよ」
line = "「ううん、私、デイマスターじゃないよ」"

[[dialogue]]
speaker = "梨緒"
# 「え？　それなら、日の光を浴びるのはよくないのか？」
line = "「え？　それなら、日の光を浴びるのはよくないのか？」"

[[dialogue]]
speaker = "ベアトリス"
# 「私の場合、星力がある間だけ大丈夫なの。だからそのうち魔界の故郷に帰らなくちゃいけないんだ」
line = "「私の場合、星力がある間だけ大丈夫なの。だからそのうち魔界の故郷に帰らなくちゃいけないんだ」"

[[dialogue]]
speaker = "ベアトリス"
# 「星力がなくなるまで多分あと数年、かな。それまでに人間界の美味しいものいっぱい食べるんだぁ～」
line = "「星力がなくなるまで多分あと数年、かな。それまでに人間界の美味しいものいっぱい食べるんだぁ～」"

[[dialogue]]
speaker = "梨緒"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "ナターシャ"
# 「へー、なるほど。じゃあ帰るまでに、悔いが残らないようにしないとね」
line = "「へー、なるほど。じゃあ帰るまでに、悔いが残らないようにしないとね」"

[[dialogue]]
speaker = "ベアトリス"
# 「うん。やりたいこと全部やってから帰るつもり」
line = "「うん。やりたいこと全部やってから帰るつもり」"

