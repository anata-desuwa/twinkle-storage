[[dialogue]]
speaker = "unk"
# 第１話,サーファーフィオナ？,P
line = "第１話,サーファーフィオナ？,P"

[[dialogue]]
speaker = "フィオナ"
# 「今日は私のわがままにお付き合いいただいてありがとうございます、緋宮会長」
line = "「今日は私のわがままにお付き合いいただいてありがとうございます、緋宮会長」"

[[dialogue]]
speaker = "unk"
# 『サーフィンについてもっと知りたい』というフィオナの希望で、俺たちはサーフィン用品を見に来ていた。
line = "『サーフィンについてもっと知りたい』というフィオナの希望で、俺たちはサーフィン用品を見に来ていた。"

[[dialogue]]
speaker = "フィオナ"
# 「ボードに塗るワックスに、ボードと体を繋ぐリーシュ、ウェットスーツ……ボード以外でもサーフィンに関連したものがたくさんあるんですね」
line = "「ボードに塗るワックスに、ボードと体を繋ぐリーシュ、ウェットスーツ……ボード以外でもサーフィンに関連したものがたくさんあるんですね」"

[[dialogue]]
speaker = "フィオナ"
# 「ウェットスーツだけでも種類があって……具体的にどう違うんでしょうか？」
line = "「ウェットスーツだけでも種類があって……具体的にどう違うんでしょうか？」"

[[dialogue]]
speaker = "フィオナ"
# 「ふむふむ……フルスーツやセミドライなど、季節や地域で使い分けるんですね。きちんと装備を揃えれば冬でもサーフィンが楽しめる、と」
line = "「ふむふむ……フルスーツやセミドライなど、季節や地域で使い分けるんですね。きちんと装備を揃えれば冬でもサーフィンが楽しめる、と」"

[[dialogue]]
speaker = "フィオナ"
# 「冬のサーフィンというととても寒いイメージなのですが……冬だから海水浴客がいなくてサーフィンしやすい？　なるほど、そんなメリットもあるんですね」
line = "「冬のサーフィンというととても寒いイメージなのですが……冬だから海水浴客がいなくてサーフィンしやすい？　なるほど、そんなメリットもあるんですね」"

[[dialogue]]
speaker = "unk"
# フィオナならかっこよく着こなせそう
line = "フィオナならかっこよく着こなせそう"

[[dialogue]]
speaker = "フィオナ"
# 「そうですかね？　サーファー・フィオナ、鮮烈デビュー！　……なんて、調子に乗りすぎでしょうか」
line = "「そうですかね？　サーファー・フィオナ、鮮烈デビュー！　……なんて、調子に乗りすぎでしょうか」"

[[dialogue]]
speaker = "フィオナ"
# 「あ、あっちにサーフボードがあるので見てみましょう」
line = "「あ、あっちにサーフボードがあるので見てみましょう」"

[[dialogue]]
speaker = "フィオナ"
# 「サーフボードにも大きさや形で性能の違いがあるって、サーフィンをやってみて初めて知りました」
line = "「サーフボードにも大きさや形で性能の違いがあるって、サーフィンをやってみて初めて知りました」"

[[dialogue]]
speaker = "フィオナ"
# 「リップルさんに教わりましたが、初心者には大きくて重いロングボードの方が扱いやすいんですよね」
line = "「リップルさんに教わりましたが、初心者には大きくて重いロングボードの方が扱いやすいんですよね」"

[[dialogue]]
speaker = "フィオナ"
# 「むしろ軽くて短いショートボードの方が、扱いづらいけど小回りが利いて上級者向きなんだとか」
line = "「むしろ軽くて短いショートボードの方が、扱いづらいけど小回りが利いて上級者向きなんだとか」"

[[dialogue]]
speaker = "フィオナ"
# 「私も自分のサーフボードを持つなら、ロングボードの方がいいでしょうか？」
line = "「私も自分のサーフボードを持つなら、ロングボードの方がいいでしょうか？」"

[[dialogue]]
speaker = "unk"
# フィオナはもう初心者じゃないよ
line = "フィオナはもう初心者じゃないよ"

[[dialogue]]
speaker = "フィオナ"
# 「ありがとうございます。そうですね、お気に入りを見つけて、乗りこなすつもりでいきましょう」
line = "「ありがとうございます。そうですね、お気に入りを見つけて、乗りこなすつもりでいきましょう」"

[[dialogue]]
speaker = "フィオナ"
# 「あ、このサーフボード、かっこいいですね。これで波に乗れたら絶対に気持ちいいです。お値段は……」
line = "「あ、このサーフボード、かっこいいですね。これで波に乗れたら絶対に気持ちいいです。お値段は……」"

[[dialogue]]
speaker = "フィオナ"
# 「２０万……！？　結界内ではリップルさんに貸してもらえましたが、軽い気持ちで買えるものではないんですね……」
line = "「２０万……！？　結界内ではリップルさんに貸してもらえましたが、軽い気持ちで買えるものではないんですね……」"

[[dialogue]]
speaker = "フィオナ"
# 「星見家なら買えるというのはそうなんですが……買っていいかどうかは別問題です」
line = "「星見家なら買えるというのはそうなんですが……買っていいかどうかは別問題です」"

[[dialogue]]
speaker = "フィオナ"
# 「本格的に始めるならまだしも、現実的に考えると、私がサーフィンできる時間はそう多くありません」
line = "「本格的に始めるならまだしも、現実的に考えると、私がサーフィンできる時間はそう多くありません」"

[[dialogue]]
speaker = "フィオナ"
# 「それに少なくないお金を出すのは、無駄遣いと言われても仕方ありません。マイボードに憧れはあったのですが……」
line = "「それに少なくないお金を出すのは、無駄遣いと言われても仕方ありません。マイボードに憧れはあったのですが……」"

[[dialogue]]
speaker = "フィオナ"
# 「え……？　入門用や中古もある？　でしたらそちらも見てみましょう。どれどれ……」
line = "「え……？　入門用や中古もある？　でしたらそちらも見てみましょう。どれどれ……」"

[[dialogue]]
speaker = "フィオナ"
# 「うーん……良さそうなものはやはりそれなりのお値段で……これというものは見つかりませんね……」
line = "「うーん……良さそうなものはやはりそれなりのお値段で……これというものは見つかりませんね……」"

[[dialogue]]
speaker = "unk"
# じゃあいろんなお店を見てみよう
line = "じゃあいろんなお店を見てみよう"

[[dialogue]]
speaker = "フィオナ"
# 「いいんですか？　しかし緋宮会長にご迷惑をかけてしまうのでは……」
line = "「いいんですか？　しかし緋宮会長にご迷惑をかけてしまうのでは……」"

[[dialogue]]
speaker = "unk"
# 納得いくまでとことん探そう
line = "納得いくまでとことん探そう"

[[dialogue]]
speaker = "フィオナ"
# 「！　はい、お願いします」
line = "「！　はい、お願いします」"

[[dialogue]]
speaker = "unk"
# それからサーフボードを取り扱っているスポーツ用品店をいくつか見て回ったのだが……
line = "それからサーフボードを取り扱っているスポーツ用品店をいくつか見て回ったのだが……"

[[dialogue]]
speaker = "フィオナ"
# 「価格が低めでも、フィンなど他のものを揃えるとそれなりの額になりますね……」
line = "「価格が低めでも、フィンなど他のものを揃えるとそれなりの額になりますね……」"

[[dialogue]]
speaker = "フィオナ"
# 「安いものをつなぎとして購入するのも、買い直すことを考えるとお金の無駄になりかねないですし……」
line = "「安いものをつなぎとして購入するのも、買い直すことを考えるとお金の無駄になりかねないですし……」"

[[dialogue]]
speaker = "フィオナ"
# 「うぅ、考えれば考えるほどまとまらない……正直、このままだとサーフボードを買っても買わなくても後悔するような……」
line = "「うぅ、考えれば考えるほどまとまらない……正直、このままだとサーフボードを買っても買わなくても後悔するような……」"

[[dialogue]]
speaker = "unk"
# あともう一軒だけ！
line = "あともう一軒だけ！"

[[dialogue]]
speaker = "フィオナ"
# 「少し遠いけど知り合いのお店がある……？　さすが緋宮会長、顔が広いです」
line = "「少し遠いけど知り合いのお店がある……？　さすが緋宮会長、顔が広いです」"

[[dialogue]]
speaker = "フィオナ"
# 「ですが緋宮会長にこれ以上ご迷惑をかけるわけにはいかないので……そうですね、そちらでよいのがなければ諦めましょう」
line = "「ですが緋宮会長にこれ以上ご迷惑をかけるわけにはいかないので……そうですね、そちらでよいのがなければ諦めましょう」"

[[dialogue]]
speaker = "フィオナ"
# 「とても幸運でした。最初に見たサーフボードと同じメーカーの、少し古いものが処分品になっていて、とてもお安く購入できました」
line = "「とても幸運でした。最初に見たサーフボードと同じメーカーの、少し古いものが処分品になっていて、とてもお安く購入できました」"

[[dialogue]]
speaker = "フィオナ"
# 「ところどころ違う部分はありますけど、スタイリッシュさは健在で、とてもかっこいいボードです」
line = "「ところどころ違う部分はありますけど、スタイリッシュさは健在で、とてもかっこいいボードです」"

[[dialogue]]
speaker = "フィオナ"
# 「それに緋宮会長の知り合いだからと店長さんがいろいろおまけしてくれて、至れり尽くせりでした」
line = "「それに緋宮会長の知り合いだからと店長さんがいろいろおまけしてくれて、至れり尽くせりでした」"

[[dialogue]]
speaker = "フィオナ"
# 「緋宮会長のおかげで、諦めずに満足いくものが選べました。ありがとうございます」
line = "「緋宮会長のおかげで、諦めずに満足いくものが選べました。ありがとうございます」"

[[dialogue]]
speaker = "フィオナ"
# 「これが私のマイボード……」
line = "「これが私のマイボード……」"

[[dialogue]]
speaker = "フィオナ"
# 「忙しいですけど、このボードを使いこなしていっぱい波に乗りたいです」
line = "「忙しいですけど、このボードを使いこなしていっぱい波に乗りたいです」"

[[dialogue]]
speaker = "フィオナ"
# 「その時は……緋宮会長も一緒にサーフィンしてくれますか？」
line = "「その時は……緋宮会長も一緒にサーフィンしてくれますか？」"

[[dialogue]]
speaker = "unk"
# もちろん！
line = "もちろん！"

[[dialogue]]
speaker = "フィオナ"
# 「ふふ、ありがとうございます。緋宮会長や店長さんに恥ずかしくないよう、かっこいいサーフィンをしてみせますね♪」
line = "「ふふ、ありがとうございます。緋宮会長や店長さんに恥ずかしくないよう、かっこいいサーフィンをしてみせますね♪」"
