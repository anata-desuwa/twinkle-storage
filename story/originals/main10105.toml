[[dialogue]]
speaker = "unk"
# 第５話,マトイＶＳヴィーナス,B
line = "第５話,マトイＶＳヴィーナス,B"

[[dialogue]]
speaker = "ヴィーナス"
# 『う～～～ん』
line = "『う～～～ん』"

[[dialogue]]
speaker = "マトイ"
# 『どうしたんです、ヴィーナス会長』
line = "『どうしたんです、ヴィーナス会長』"

[[dialogue]]
speaker = "ヴィーナス"
# 『まだ足りないわ！』
line = "『まだ足りないわ！』"

[[dialogue]]
speaker = "マトイ"
# 『希望通りに花火大会までやるのに、まだ足りないんですか？　十分に満足してもらえると思いますけど』
line = "『希望通りに花火大会までやるのに、まだ足りないんですか？　十分に満足してもらえると思いますけど』"

[[dialogue]]
speaker = "ヴィーナス"
# 『血沸き肉躍るサーカスがないじゃない！』
line = "『血沸き肉躍るサーカスがないじゃない！』"

[[dialogue]]
speaker = "ヴィーナス"
# 『そうだわ！　マトイ、私と戦ってちょうだい！』
line = "『そうだわ！　マトイ、私と戦ってちょうだい！』"

[[dialogue]]
speaker = "マトイ"
# 『えーっ！？　模擬戦がサーカス代わりですか！？』
line = "『えーっ！？　模擬戦がサーカス代わりですか！？』"

[[dialogue]]
speaker = "サーシャ"
# 「この模擬戦は私、星徒会副会長兼会計の奏サーシャが取り仕切らせてもらいま～す」
line = "「この模擬戦は私、星徒会副会長兼会計の奏サーシャが取り仕切らせてもらいま～す」"

[[dialogue]]
speaker = "サーシャ"
# 「ヴィーナスちゃんＶＳマトイちゃん。星徒会役員同士のドリームマッチ、見逃しちゃダメダメよ～」
line = "「ヴィーナスちゃんＶＳマトイちゃん。星徒会役員同士のドリームマッチ、見逃しちゃダメダメよ～」"

[[dialogue]]
speaker = "サーシャ"
# 「いざ尋常に～……スタ～ト！」
line = "「いざ尋常に～……スタ～ト！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「行くわよ、マトイ！」
line = "「行くわよ、マトイ！」"

[[dialogue]]
speaker = "マトイ"
# 「胸を借りるつもりで……行きます！」
line = "「胸を借りるつもりで……行きます！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「おっぱいをもぎ取るつもりで来なさい！」
line = "「おっぱいをもぎ取るつもりで来なさい！」"

[[dialogue]]
speaker = "マトイ"
# 「新入生たちの前で、何言ってるんです！？」
line = "「新入生たちの前で、何言ってるんです！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ディバインスフィア！」
line = "「ディバインスフィア！」"

[[dialogue]]
speaker = "マトイ"
# 「ぐうっ！？」
line = "「ぐうっ！？」"

[[dialogue]]
speaker = "マトイ"
# （攻撃を盾で防ぐたびに、腕にとんでもない負荷がかかってる）
line = "（攻撃を盾で防ぐたびに、腕にとんでもない負荷がかかってる）"

[[dialogue]]
speaker = "マトイ"
# （あんなに軽やかに放たれてる星術なのに、一発一発がハンマーで思いっきり殴られているみたいに重いっ！）
line = "（あんなに軽やかに放たれてる星術なのに、一発一発がハンマーで思いっきり殴られているみたいに重いっ！）"

[[dialogue]]
speaker = "ヴィーナス"
# 「守ってるだけじゃ、私は倒せないわよ！」
line = "「守ってるだけじゃ、私は倒せないわよ！」"

[[dialogue]]
speaker = "マトイ"
# 「つけ入る隙くらい、見せてくださいよ！」
line = "「つけ入る隙くらい、見せてくださいよ！」"

[[dialogue]]
speaker = "新入生Ａ"
# 「ヴィーナス先輩の息をもつかせぬ攻撃、素敵……！　まるで踊っているようだわ！」
line = "「ヴィーナス先輩の息をもつかせぬ攻撃、素敵……！　まるで踊っているようだわ！」"

[[dialogue]]
speaker = "新入生Ｂ"
# 「あのヴィーナス先輩の攻撃を受け止めてる人だって……えっと、マトイさんだっけ？　彼女も、すごいよ！」
line = "「あのヴィーナス先輩の攻撃を受け止めてる人だって……えっと、マトイさんだっけ？　彼女も、すごいよ！」"

[[dialogue]]
speaker = "新入生Ａ"
# 「どっちもがんばってー！」
line = "「どっちもがんばってー！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「いいわよ、マトイ！　私たち、注目の的よ！」
line = "「いいわよ、マトイ！　私たち、注目の的よ！」"

[[dialogue]]
speaker = "マトイ"
# 「そうですね。新入生歓迎会は大成功です！　良かったですねー！」
line = "「そうですね。新入生歓迎会は大成功です！　良かったですねー！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「まだまだ、これからよ！　もっともーっと盛り上げていくんだから！」
line = "「まだまだ、これからよ！　もっともーっと盛り上げていくんだから！」"

[[dialogue]]
speaker = "マトイ"
# 「もう支えてるだけで精いっぱいなんですってばぁっ！」
line = "「もう支えてるだけで精いっぱいなんですってばぁっ！」"

[[dialogue]]
speaker = "マトイ"
# （でも……ヴィーナス会長の攻撃のリズムは掴めてきた）
line = "（でも……ヴィーナス会長の攻撃のリズムは掴めてきた）"

[[dialogue]]
speaker = "マトイ"
# （次の次──右から４発、左から３発の光弾が放たれた後、わずかに下方向に抜ける隙間ができるはず）
line = "（次の次──右から４発、左から３発の光弾が放たれた後、わずかに下方向に抜ける隙間ができるはず）"

[[dialogue]]
speaker = "マトイ"
# （狙うなら、そのタイミング。体を屈めて、一気に距離を詰めて反撃を──）
line = "（狙うなら、そのタイミング。体を屈めて、一気に距離を詰めて反撃を──）"

[[dialogue]]
speaker = "ヴィーナス"
# 「よーし、そろそろクライマックスね！　パワーＭＡＸで行っくわよー！　準備はいいわね、マトイっ？」
line = "「よーし、そろそろクライマックスね！　パワーＭＡＸで行っくわよー！　準備はいいわね、マトイっ？」"

[[dialogue]]
speaker = "マトイ"
# 「ウソッ！？　まだここからギアを上げるつもりなの！？」
line = "「ウソッ！？　まだここからギアを上げるつもりなの！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「シャーイニングぅ……ゴッデスぅ──」
line = "「シャーイニングぅ……ゴッデスぅ──」"

[[dialogue]]
speaker = "ヴィーナス"
# 「──ビーーーーーィンムゥゥゥッ！！！」
line = "「──ビーーーーーィンムゥゥゥッ！！！」"

[[dialogue]]
speaker = "マトイ"
# 「ぐぅううぅぅぅっ！！？」
line = "「ぐぅううぅぅぅっ！！？」"

[[dialogue]]
speaker = "マトイ"
# 「はーっ、はーっ……！　死ぬかと思った……！」
line = "「はーっ、はーっ……！　死ぬかと思った……！」"

[[dialogue]]
speaker = "アナ"
# 「おお……今のを止めた……？」
line = "「おお……今のを止めた……？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「さすがマトイ。それでこそ私の見込んだ星徒会役員だわ！」
line = "「さすがマトイ。それでこそ私の見込んだ星徒会役員だわ！」"

[[dialogue]]
speaker = "マトイ"
# 「お褒めの言葉、ありがとうございます……！」
line = "「お褒めの言葉、ありがとうございます……！」"

[[dialogue]]
speaker = "マトイ"
# （直撃は避けたものの、盾の耐久力はギリギリ。受け止めただけで精いっぱい）
line = "（直撃は避けたものの、盾の耐久力はギリギリ。受け止めただけで精いっぱい）"

[[dialogue]]
speaker = "マトイ"
# （足腰はもうフラフラだし、手だってビリビリ痺れてるし、さすがにこれ以上は――）
line = "（足腰はもうフラフラだし、手だってビリビリ痺れてるし、さすがにこれ以上は――）"

[[dialogue]]
speaker = "サーシャ"
# 「は～い、ストップストッ～プ。ヴィーナスちゃん、ハッスルしすぎ～」
line = "「は～い、ストップストッ～プ。ヴィーナスちゃん、ハッスルしすぎ～」"

[[dialogue]]
speaker = "サーシャ"
# 「もう時間も押しちゃってるし～、２人とも決定的なダメージはないし………この勝負、引き分けってことでいいかしら～？」
line = "「もう時間も押しちゃってるし～、２人とも決定的なダメージはないし………この勝負、引き分けってことでいいかしら～？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「はーい、ドローゲームね」
line = "「はーい、ドローゲームね」"

[[dialogue]]
speaker = "マトイ"
# 「異論なし、です……というか、止めてくれて助かりました……」
line = "「異論なし、です……というか、止めてくれて助かりました……」"

[[dialogue]]
speaker = "マトイ"
# （助かった、のに……なんだろう、この気持ち……）
line = "（助かった、のに……なんだろう、この気持ち……）"

[[dialogue]]
speaker = "マトイ"
# （引き分けにはしてもらったけど、今の勝負は誰の目から見ても勝者は明らかだった）
line = "（引き分けにはしてもらったけど、今の勝負は誰の目から見ても勝者は明らかだった）"

[[dialogue]]
speaker = "マトイ"
# （あのままサーシャさんが止めることなく続いていたら、確実に私の負けだった……）
line = "（あのままサーシャさんが止めることなく続いていたら、確実に私の負けだった……）"

[[dialogue]]
speaker = "ヴィーナス"
# 「こういうの、ドラマとか漫画でよくあるわよね」
line = "「こういうの、ドラマとか漫画でよくあるわよね」"

[[dialogue]]
speaker = "マトイ"
# 「……え？」
line = "「……え？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「言葉ではなく拳で語る熱い展開よ。戦うことでお互いを認め合い、ライバルになったりとか」
line = "「言葉ではなく拳で語る熱い展開よ。戦うことでお互いを認め合い、ライバルになったりとか」"

[[dialogue]]
speaker = "マトイ"
# 「少年漫画っぽいですね」
line = "「少年漫画っぽいですね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そ！　これで私とマトイは、引き分けたライバルってことよ！」
line = "「そ！　これで私とマトイは、引き分けたライバルってことよ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「また今度、続きやりましょ！」
line = "「また今度、続きやりましょ！」"

[[dialogue]]
speaker = "マトイ"
# ２人で握手を交わすと、アリーナのボルテージがより一層上がる。
line = "２人で握手を交わすと、アリーナのボルテージがより一層上がる。"

[[dialogue]]
speaker = "マトイ"
# 割れんばかりの喝采の声が、私の耳にもようやく届いた。
line = "割れんばかりの喝采の声が、私の耳にもようやく届いた。"

[[dialogue]]
speaker = "マトイ"
# 正直、もうヴィーナス会長と戦うのは御免こうむりたい、という気持ちではある。
line = "正直、もうヴィーナス会長と戦うのは御免こうむりたい、という気持ちではある。"

[[dialogue]]
speaker = "マトイ"
# けれど少しだけ……力をつけて、もう一度挑んでみたい――そんな気持ちが心の隅に生まれていることも認めざるを得なかった。
line = "けれど少しだけ……力をつけて、もう一度挑んでみたい――そんな気持ちが心の隅に生まれていることも認めざるを得なかった。"
