[[dialogue]]
speaker = "unk"
# <size=40>第一章『新星学園星徒会』</size>
line = "<size=40>第一章『新星学園星徒会』</size>"

[[dialogue]]
speaker = "unk"
# <size=40>一日前──</size>
line = "<size=40>一日前──</size>"

[[dialogue]]
speaker = "クロト"
# 「──よし」
line = "「──よし」"

[[dialogue]]
speaker = "unk"
# 引き締まったネクタイを確認する。
line = "引き締まったネクタイを確認する。"

[[dialogue]]
speaker = "unk"
# 白い雲の浮かぶ青空は、まるで俺の新しい門出を祝うかのように晴れ渡っていた。
line = "白い雲の浮かぶ青空は、まるで俺の新しい門出を祝うかのように晴れ渡っていた。"

[[dialogue]]
speaker = "クロト"
# 「（転入初日か……緊張するな。でも心地いい緊張だ）」
line = "「（転入初日か……緊張するな。でも心地いい緊張だ）」"

[[dialogue]]
speaker = "unk"
# 今日は<ruby=こうじゃく>黄雀</ruby>ノ月・三日。
line = "今日は<ruby>黄雀<rt>こうじゃく</rt></ruby>ノ月・三日。"

[[dialogue]]
speaker = "unk"
# 春はとうに過ぎ去り、もうすぐ本格的な夏が始まろうとしている今日が、俺の初登校日だ。
line = "春はとうに過ぎ去り、もうすぐ本格的な夏が始まろうとしている今日が、俺の初登校日だ。"

[[dialogue]]
speaker = "unk"
# まだ新鮮なこの風景も、いつかは慣れ親しんだ通学路になっているのかもしれない。
line = "まだ新鮮なこの風景も、いつかは慣れ親しんだ通学路になっているのかもしれない。"

[[dialogue]]
speaker = "クロト"
# 「（転入生挨拶なんかもあるんだろうし……しっかり考えておかないとな）」
line = "「（転入生挨拶なんかもあるんだろうし……しっかり考えておかないとな）」"

[[dialogue]]
speaker = "unk"
# と、万感の思いを巡らせながら進んでいると……
line = "と、万感の思いを巡らせながら進んでいると……"

[[dialogue]]
speaker = "叫ぶ女性"
# 「きゃあああああ──っ！　だーれーかーっ！」
line = "「きゃあああああ──っ！　だーれーかーっ！」"

[[dialogue]]
speaker = "クロト"
# 「っ──この声は──」
line = "「っ──この声は──」"

[[dialogue]]
speaker = "unk"
# 突如、閑静な住宅街を悲鳴がつんざいた。
line = "突如、閑静な住宅街を悲鳴がつんざいた。"

[[dialogue]]
speaker = "unk"
# 俺はすぐ声の元へと向かった。
line = "俺はすぐ声の元へと向かった。"

[[dialogue]]
speaker = "フワッチ"
# 「イ～ッ！」
line = "「イ～ッ！」"

[[dialogue]]
speaker = "フワッチ"
# 「ィィィ──！」
line = "「ィィィ──！」"

[[dialogue]]
speaker = "叫ぶ女性"
# 「こ、子どもたちのバスがかじられてる──こ、このままじゃっ……！」
line = "「こ、子どもたちのバスがかじられてる──こ、このままじゃっ……！」"

[[dialogue]]
speaker = "クロト"
# 「やっぱり──モンスター……っ！」
line = "「やっぱり──モンスター……っ！」"

[[dialogue]]
speaker = "unk"
# 現場では、何匹もの小型モンスターがスクールバスをガジガジと食い破っていた。
line = "現場では、何匹もの小型モンスターがスクールバスをガジガジと食い破っていた。"

[[dialogue]]
speaker = "unk"
# あれは、確か近所の子ども園の……
line = "あれは、確か近所の子ども園の……"

[[dialogue]]
speaker = "取り残された子"
# 「ふええぇーーん……！　だれかぁー……たすけてぇぇー……！」
line = "「ふええぇーーん……！　だれかぁー……たすけてぇぇー……！」"

[[dialogue]]
speaker = "クロト"
# 「（中に子どもが取り残されてる──危険だ）」
line = "「（中に子どもが取り残されてる──危険だ）」"

[[dialogue]]
speaker = "unk"
# モンスター。
line = "モンスター。"

[[dialogue]]
speaker = "unk"
# それは、世界中に湧いては混乱をもたらす謎の生命体のこと。
line = "それは、世界中に湧いては混乱をもたらす謎の生命体のこと。"

[[dialogue]]
speaker = "unk"
# あれだけの数が密集していては、バスごと子どもたちがやられてしまいかねない。
line = "あれだけの数が密集していては、バスごと子どもたちがやられてしまいかねない。"

[[dialogue]]
speaker = "unk"
# なら……
line = "なら……"

[[dialogue]]
speaker = "クロト"
# 「……っ、やめろ、モンスター！　おまえ達の餌はこっちにいるぞ──俺が相手になってやる！」
line = "「……っ、やめろ、モンスター！　おまえ達の餌はこっちにいるぞ──俺が相手になってやる！」"

[[dialogue]]
speaker = "unk"
# はやる心臓を抑えて、俺は大きな声でモンスターの注意を引く。
line = "はやる心臓を抑えて、俺は大きな声でモンスターの注意を引く。"

[[dialogue]]
speaker = "unk"
# 大丈夫、あれくらいの相手なら、今までだって何度も相手にしてきた。
line = "大丈夫、あれくらいの相手なら、今までだって何度も相手にしてきた。"

[[dialogue]]
speaker = "フワッチ"
# 「イーッ！」
line = "「イーッ！」"

[[dialogue]]
speaker = "フワッチ"
# 「ィィィィ！」
line = "「ィィィィ！」"

[[dialogue]]
speaker = "unk"
# 俺の姿を見つけるやいなや、示し合わせたようにこちらへ向かってくるモンスターの一群。
line = "俺の姿を見つけるやいなや、示し合わせたようにこちらへ向かってくるモンスターの一群。"

[[dialogue]]
speaker = "unk"
# そう。俺は不幸なことに……彼らを引き寄せやすいという体質を持っていた。
line = "そう。俺は不幸なことに……彼らを引き寄せやすいという体質を持っていた。"

[[dialogue]]
speaker = "叫ぶ女性"
# 「あ、あなたは……！？」
line = "「あ、あなたは……！？」"

[[dialogue]]
speaker = "クロト"
# 「俺は慣れてるから大丈夫です！　今のうちにバスの避難を」
line = "「俺は慣れてるから大丈夫です！　今のうちにバスの避難を」"

[[dialogue]]
speaker = "unk"
# 大好物の俺を見つけたことでモンスターたちの興味が子どもたちから逸れた。
line = "大好物の俺を見つけたことでモンスターたちの興味が子どもたちから逸れた。"

[[dialogue]]
speaker = "unk"
# 後は、俺が奴らを相手すればいいだけだ。
line = "後は、俺が奴らを相手すればいいだけだ。"

[[dialogue]]
speaker = "クロト"
# 「（弱い個体だが、数が多い……でも弱気になっちゃいけない）」
line = "「（弱い個体だが、数が多い……でも弱気になっちゃいけない）」"

[[dialogue]]
speaker = "unk"
# 俺はこういう悲劇を救うために<ruby=せいきし>星騎士</ruby>を志したのだ。
line = "俺はこういう悲劇を救うために<ruby>星騎士<rt>せいきし</rt></ruby>を志したのだ。"

[[dialogue]]
speaker = "unk"
# 今日から<ruby=しんせい>新星</ruby>学園の一員になる者として、奴らを撃退する役目がある。
line = "今日から<ruby>新星<rt>しんせい</rt></ruby>学園の一員になる者として、奴らを撃退する役目がある。"

[[dialogue]]
speaker = "クロト"
# 「来い。正確にはまだ入学前だけど……一人前になったところを見せてやる」
line = "「来い。正確にはまだ入学前だけど……一人前になったところを見せてやる」"

[[dialogue]]
speaker = "フワッチ"
# 「イーッ！」
line = "「イーッ！」"

[[dialogue]]
speaker = "unk"
# <ruby=たんでん>丹田</ruby>に気を集中させ、拳に力を込める。
line = "<ruby>丹田<rt>たんでん</rt></ruby>に気を集中させ、拳に力を込める。"

[[dialogue]]
speaker = "unk"
# いざ、せめて時間稼ぎにはなるよう戦闘開始──
line = "いざ、せめて時間稼ぎにはなるよう戦闘開始──"

[[dialogue]]
speaker = "unk"
# ──と。
line = "──と。"

[[dialogue]]
speaker = "クロト"
# 「ん……？」
line = "「ん……？」"

[[dialogue]]
speaker = "unk"
# どこからか聞こえる音──そして。
line = "どこからか聞こえる音──そして。"

[[dialogue]]
speaker = "アナ"
# 「しゅわっち」
line = "「しゅわっち」"

[[dialogue]]
speaker = "クロト"
# 「！？　君は──」
line = "「！？　君は──」"

[[dialogue]]
speaker = "unk"
# 突然、空から小さな女の子が降ってきた。
line = "突然、空から小さな女の子が降ってきた。"

[[dialogue]]
speaker = "アナ"
# 「ん、間に合った。ハイこれ」
line = "「ん、間に合った。ハイこれ」"

[[dialogue]]
speaker = "クロト"
# 「これって──え──？」
line = "「これって──え──？」"

[[dialogue]]
speaker = "unk"
# 少女から手渡された道具を受け取る。
line = "少女から手渡された道具を受け取る。"

[[dialogue]]
speaker = "unk"
# これは……？
line = "これは……？"

[[dialogue]]
speaker = "アナ"
# 「話は後で。とにかくそれで変身して」
line = "「話は後で。とにかくそれで変身して」"

[[dialogue]]
speaker = "クロト"
# 「変身……？　よくわからないが──悩んでる暇はなさそうだなっ！」
line = "「変身……？　よくわからないが──悩んでる暇はなさそうだなっ！」"

[[dialogue]]
speaker = "フワッチ"
# 「ィ──ッ！」
line = "「ィ──ッ！」"
