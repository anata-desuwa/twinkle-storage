[[dialogue]]
speaker = "unk"
# 第８話,《光の魔女》クラウディア,B
line = "第８話,《光の魔女》クラウディア,B"

[[dialogue]]
speaker = "クラウディア"
# 「──もうよかろう。狙いがどう、思惑がどうだの、まどろっこしい」
line = "「──もうよかろう。狙いがどう、思惑がどうだの、まどろっこしい」"

[[dialogue]]
speaker = "unk"
# 沈黙を破ったのはクラウディアだった。
line = "沈黙を破ったのはクラウディアだった。"

[[dialogue]]
speaker = "unk"
# 彼女はご自慢のロッドを地に突きつけ、威風堂々と宣言する。
line = "彼女はご自慢のロッドを地に突きつけ、威風堂々と宣言する。"

[[dialogue]]
speaker = "クラウディア"
# 「魔女か！　人の子か！　どちらかがこのリクリエを対処し、世界の命運を分ける権利を得る！　それだけのこと！」
line = "「魔女か！　人の子か！　どちらかがこのリクリエを対処し、世界の命運を分ける権利を得る！　それだけのこと！」"

[[dialogue]]
speaker = "クラウディア"
# 「意見が違えたのなら──古来よりやり方は決まっておろう」
line = "「意見が違えたのなら──古来よりやり方は決まっておろう」"

[[dialogue]]
speaker = "クロト"
# 「ああ──その通りだ。互いに譲れないものがある」
line = "「ああ──その通りだ。互いに譲れないものがある」"

[[dialogue]]
speaker = "unk"
# ネビュラの現実主義は決して頭ごなしに否定していいものじゃないんだろう。
line = "ネビュラの現実主義は決して頭ごなしに否定していいものじゃないんだろう。"

[[dialogue]]
speaker = "unk"
# だけど今の俺たちだって、決して譲れない理想がある。
line = "だけど今の俺たちだって、決して譲れない理想がある。"

[[dialogue]]
speaker = "クラウディア"
# 「結集だ」
line = "「結集だ」"

[[dialogue]]
speaker = "アイリーン"
# 「──はっ。<ruby=アルファ>α</ruby>から<ruby=デルタ>δ</ruby>まで本隊に合流されたし」
line = "「──はっ。<ruby>α<rt>アルファ</rt></ruby>から<ruby>δ<rt>デルタ</rt></ruby>まで本隊に合流されたし」"

[[dialogue]]
speaker = "カヤ"
# 「ん。ステルス部隊も、全員集合」
line = "「ん。ステルス部隊も、全員集合」"

[[dialogue]]
speaker = "ソフィア"
# 「！　いつの間に──」
line = "「！　いつの間に──」"

[[dialogue]]
speaker = "クロト"
# 「学園そのものが包囲されていた──ってところか」
line = "「学園そのものが包囲されていた──ってところか」"

[[dialogue]]
speaker = "unk"
# クラウディアの一声と同時に、どこからか多数の魔女たちが馳せ参じていた。
line = "クラウディアの一声と同時に、どこからか多数の魔女たちが馳せ参じていた。"

[[dialogue]]
speaker = "unk"
# その全員がネビュラのエージェント。そして、その中には……
line = "その全員がネビュラのエージェント。そして、その中には……"

[[dialogue]]
speaker = "リーリア"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "アナ"
# 「……！　リーリアさん……？」
line = "「……！　リーリアさん……？」"

[[dialogue]]
speaker = "リーリア"
# 「あー……なんていうか……一身上の都合？　みたいな。うん、黙っててごめん、アナちゃん」
line = "「あー……なんていうか……一身上の都合？　みたいな。うん、黙っててごめん、アナちゃん」"

[[dialogue]]
speaker = "アナ"
# 「ふう。本心を隠すのがうまいとは思っていましたが……まあ、しおらしいのはあなたらしくありませんね」
line = "「ふう。本心を隠すのがうまいとは思っていましたが……まあ、しおらしいのはあなたらしくありませんね」"

[[dialogue]]
speaker = "リーリア"
# 「……なんかほんとーにごめんね？　正直、長官たちに従うの、全然気乗りしないんだけどさ。こんなの全然『ウィンウィン』じゃないし。ただ……」
line = "「……なんかほんとーにごめんね？　正直、長官たちに従うの、全然気乗りしないんだけどさ。こんなの全然『ウィンウィン』じゃないし。ただ……」"

[[dialogue]]
speaker = "クロト"
# 「リーリア……？」
line = "「リーリア……？」"

[[dialogue]]
speaker = "リーリア"
# 「こうしないとセンパイが死んじゃうかも、って思ったら、私１人が<ruby=ヤーガ>はぐれ魔女</ruby>になればいいって問題でもない気がして」
line = "「こうしないとセンパイが死んじゃうかも、って思ったら、私１人が<ruby>はぐれ魔女<rt>ヤーガ</rt></ruby>になればいいって問題でもない気がして」"

[[dialogue]]
speaker = "リーリア"
# 「私は星騎士じゃないから、人間界とか、三界の平穏みたいなのって、実は言うほど興味ないんだ。うん。だから本当にごめん」
line = "「私は星騎士じゃないから、人間界とか、三界の平穏みたいなのって、実は言うほど興味ないんだ。うん。だから本当にごめん」"

[[dialogue]]
speaker = "リーリア"
# 「恨んでくれていいよ。よくも騙したな、って。……だけど私は、センパイやアナちゃんたちが生きててさえくれれば、それで納得できちゃったから」
line = "「恨んでくれていいよ。よくも騙したな、って。……だけど私は、センパイやアナちゃんたちが生きててさえくれれば、それで納得できちゃったから」"

[[dialogue]]
speaker = "リーリア"
# 「……そういうわけなんで、今回は君たちの敵に回るよ」
line = "「……そういうわけなんで、今回は君たちの敵に回るよ」"

[[dialogue]]
speaker = "マリオン"
# 「はーい、そういうわけですので、<ruby=わたくし>私</ruby>もこちら側から失礼いたしますね<emoji=heart04>」
line = "「はーい、そういうわけですので、<ruby>私<rt>わたくし</rt></ruby>もこちら側から失礼いたしますね<emoji=heart04>」"

[[dialogue]]
speaker = "フィオナ"
# 「マ、マリオンさん……！？」
line = "「マ、マリオンさん……！？」"

[[dialogue]]
speaker = "マリオン"
# 「はい、お嬢様。星見家メイド隊、マリオン・ネイマールこと……」
line = "「はい、お嬢様。星見家メイド隊、マリオン・ネイマールこと……」"

[[dialogue]]
speaker = "マリオン"
# 「ネビュラの人形使いにして人間界の連絡役、魔女・マリオンでございます♪」
line = "「ネビュラの人形使いにして人間界の連絡役、魔女・マリオンでございます♪」"

[[dialogue]]
speaker = "マリオン"
# 「皆さまとの蜜月は大変楽しかったですが、リクリエの<ruby=ほんぱ>本波</ruby>となれば、流石に働かないわけには参りません」
line = "「皆さまとの蜜月は大変楽しかったですが、リクリエの<ruby>本波<rt>ほんぱ</rt></ruby>となれば、流石に働かないわけには参りません」"

[[dialogue]]
speaker = "マリオン"
# 「正直、キリカさんには泳がされていたような気も致しますが……」
line = "「正直、キリカさんには泳がされていたような気も致しますが……」"

[[dialogue]]
speaker = "マリオン"
# 「今はお嬢様を倒すことが、そのお命を守るのに直結する事態」
line = "「今はお嬢様を倒すことが、そのお命を守るのに直結する事態」"

[[dialogue]]
speaker = "マリオン"
# 「今回ばかりはきっと、メイド長もお許し下さるはずですよね♪」
line = "「今回ばかりはきっと、メイド長もお許し下さるはずですよね♪」"

[[dialogue]]
speaker = "unk"
# リーリアにマリオンさん。今まで世話になってきた学園の関係者の正体が、ネビュラのスパイだった──ということらしい。
line = "リーリアにマリオンさん。今まで世話になってきた学園の関係者の正体が、ネビュラのスパイだった──ということらしい。"

[[dialogue]]
speaker = "unk"
# ネビュラは星騎士たちの動向まで視野に入れて動いていた──その目が学園の内部に光っていたとしても、不思議ではなく。
line = "ネビュラは星騎士たちの動向まで視野に入れて動いていた──その目が学園の内部に光っていたとしても、不思議ではなく。"

[[dialogue]]
speaker = "アイリーン"
# 「──動揺しているようですね」
line = "「──動揺しているようですね」"

[[dialogue]]
speaker = "クロト"
# 「さすがにな。けど、<b>通じてる</b>のはそっちばかりじゃない」
line = "「さすがにな。けど、<b>通じてる</b>のはそっちばかりじゃない」"

[[dialogue]]
speaker = "アイリーン"
# 「え……？」
line = "「え……？」"

[[dialogue]]
speaker = "クロト"
# 「クラウディア」
line = "「クラウディア」"

[[dialogue]]
speaker = "クラウディア"
# 「なんだ？　魔王よ」
line = "「なんだ？　魔王よ」"

[[dialogue]]
speaker = "クロト"
# 「さっきの話を聞いての通りだ。俺は先代魔王の魂を継ぐもの──だからこそ今の俺には、彼女の想いもこもってるんだ」
line = "「さっきの話を聞いての通りだ。俺は先代魔王の魂を継ぐもの──だからこそ今の俺には、彼女の想いもこもってるんだ」"

[[dialogue]]
speaker = "クラウディア"
# 「彼女……？」
line = "「彼女……？」"

[[dialogue]]
speaker = "クロト"
# 「ああ。俺に再誕の魔法をかけた光の魔女──トリュファイナからの」
line = "「ああ。俺に再誕の魔法をかけた光の魔女──トリュファイナからの」"

[[dialogue]]
speaker = "クラウディア"
# 「……ほう！」
line = "「……ほう！」"

[[dialogue]]
speaker = "unk"
# 俺がその名を告げると、魔女たちは一様に目を丸くした。
line = "俺がその名を告げると、魔女たちは一様に目を丸くした。"

[[dialogue]]
speaker = "セドナ"
# 「なぜその名を……リノ、貴様か？」
line = "「なぜその名を……リノ、貴様か？」"

[[dialogue]]
speaker = "リノ"
# 「いいえ。私もびっくりしてる」
line = "「いいえ。私もびっくりしてる」"

[[dialogue]]
speaker = "クラウディア"
# 「くくく……実に面白きことだ！　よもや人の子から先代の名を聞くことになろうとはな」
line = "「くくく……実に面白きことだ！　よもや人の子から先代の名を聞くことになろうとはな」"

[[dialogue]]
speaker = "クロト"
# 「トリュファイナは──ラクシスの無謀な願いを引き受けて、再誕の魔法をかけた」
line = "「トリュファイナは──ラクシスの無謀な願いを引き受けて、再誕の魔法をかけた」"

[[dialogue]]
speaker = "クロト"
# 「すべては次のリクリエに対処するためだ。ラクシスも、トリュファイナも、それが最後の希望だと信じた」
line = "「すべては次のリクリエに対処するためだ。ラクシスも、トリュファイナも、それが最後の希望だと信じた」"

[[dialogue]]
speaker = "クロト"
# 「だから俺は……この時代の、今回のリクリエを背負ってみせる。それが緋宮クロトの意志だ！」
line = "「だから俺は……この時代の、今回のリクリエを背負ってみせる。それが緋宮クロトの意志だ！」"

[[dialogue]]
speaker = "リノ"
# 「クロト……」
line = "「クロト……」"

[[dialogue]]
speaker = "リーリア"
# 「引いてはくれないんですね、センパイ。私もあんまり戦いたくないっていうか──」
line = "「引いてはくれないんですね、センパイ。私もあんまり戦いたくないっていうか──」"

[[dialogue]]
speaker = "アイリーン"
# 「いくら地脈による補助があろうと──星騎士たちが弱体化していることに変わりはないはず」
line = "「いくら地脈による補助があろうと──星騎士たちが弱体化していることに変わりはないはず」"

[[dialogue]]
speaker = "サーシャ"
# 「確かに……魔女たち全員の相手はなかなか厳しいわね……」
line = "「確かに……魔女たち全員の相手はなかなか厳しいわね……」"

[[dialogue]]
speaker = "リノ"
# 「──いいえ。まだ手はあるわ」
line = "「──いいえ。まだ手はあるわ」"

[[dialogue]]
speaker = "クロト"
# 「母さん……？」
line = "「母さん……？」"

[[dialogue]]
speaker = "リノ"
# 「地脈を使って地球の裏側からも星と交信する──悪くないわね、クロト。でも、それならまだ活かせる一手があるわ」
line = "「地脈を使って地球の裏側からも星と交信する──悪くないわね、クロト。でも、それならまだ活かせる一手があるわ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「こ、今度は何……？」
line = "「こ、今度は何……？」"

[[dialogue]]
speaker = "unk"
# 母さんの左手から──得体のしれない闇のオーラがあふれるように炸裂した。
line = "母さんの左手から──得体のしれない闇のオーラがあふれるように炸裂した。"

[[dialogue]]
speaker = "unk"
# そして、一帯に流れ出した闇の<ruby=とばり>帳</ruby>にはなぜか、きらめく星々たちが写し込まれている。
line = "そして、一帯に流れ出した闇の<ruby>帳<rt>とばり</rt></ruby>にはなぜか、きらめく星々たちが写し込まれている。"

[[dialogue]]
speaker = "ユウリ"
# 「ん──待て、力が湧くぞ……！」
line = "「ん──待て、力が湧くぞ……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「星術が、使える……！？」
line = "「星術が、使える……！？」"

[[dialogue]]
speaker = "クロト"
# 「母さん、これは──？」
line = "「母さん、これは──？」"

[[dialogue]]
speaker = "リノ"
# 「これもちょっとしたアイテムでね。このマントは、人工的に夜空を覗かせてくれるのよ」
line = "「これもちょっとしたアイテムでね。このマントは、人工的に夜空を覗かせてくれるのよ」"

[[dialogue]]
speaker = "unk"
# 母さんがヒラヒラと舞わせていたのは、擦り切れた長い布切れだった。
line = "母さんがヒラヒラと舞わせていたのは、擦り切れた長い布切れだった。"

[[dialogue]]
speaker = "unk"
# その禍々しくも妖麗な様子を見て、ソフィアちゃんがつぶやく。
line = "その禍々しくも妖麗な様子を見て、ソフィアちゃんがつぶやく。"

[[dialogue]]
speaker = "ソフィア"
# 「星骸布……！」
line = "「星骸布……！」"

[[dialogue]]
speaker = "リノ"
# 「そ。魔族の子なら流石にわかるかな」
line = "「そ。魔族の子なら流石にわかるかな」"

[[dialogue]]
speaker = "ニャリオン"
# 「また知らニャいのが出てきたニャン、いったい何なのニャン……！？」
line = "「また知らニャいのが出てきたニャン、いったい何なのニャン……！？」"

[[dialogue]]
speaker = "サーシャ"
# 「魔界三大魔具のひとつ──それも、どこかの独裁者さんが独占していたものね」
line = "「魔界三大魔具のひとつ──それも、どこかの独裁者さんが独占していたものね」"

[[dialogue]]
speaker = "リノ"
# 「これは<ruby=キュリオス>頽廃都市</ruby>の皇妃、<ruby=コウレイ>煌嶺</ruby>様から賜ったもの。星骸布は──広げた一帯に、異界の夜空を映すことができる」
line = "「これは<ruby>頽廃都市<rt>キュリオス</rt></ruby>の皇妃、<ruby>煌嶺<rt>コウレイ</rt></ruby>様から賜ったもの。星骸布は──広げた一帯に、異界の夜空を映すことができる」"

[[dialogue]]
speaker = "リノ"
# 「つまり今のあなた達は──人間界じゃなく、魔界を迂回して星との交信を繋げてる。星術に支障はないはずよ」
line = "「つまり今のあなた達は──人間界じゃなく、魔界を迂回して星との交信を繋げてる。星術に支障はないはずよ」"

[[dialogue]]
speaker = "ユウリ"
# 「つーことはこの夜は……魔界の星空ってことか……！」
line = "「つーことはこの夜は……魔界の星空ってことか……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「なるほどね。なんか見覚えある気がしたのよ」
line = "「なるほどね。なんか見覚えある気がしたのよ」"

[[dialogue]]
speaker = "ソフィア"
# 「私……いつもより力がみなぎっている気がします！」
line = "「私……いつもより力がみなぎっている気がします！」"

[[dialogue]]
speaker = "マトイ"
# 「うん！　これならいけるよ！」
line = "「うん！　これならいけるよ！」"

[[dialogue]]
speaker = "unk"
# 真上の天こそ塞がれているものの、多面的な空との連絡によって俺たちは従来以上の出力を獲得していた。
line = "真上の天こそ塞がれているものの、多面的な空との連絡によって俺たちは従来以上の出力を獲得していた。"

[[dialogue]]
speaker = "リノ"
# 「でも、今だけよ。持続時間はもって数十分──布がたたまれてしまわないうちに、けりをつけましょう」
line = "「でも、今だけよ。持続時間はもって数十分──布がたたまれてしまわないうちに、けりをつけましょう」"

[[dialogue]]
speaker = "クロト"
# 「わかった。恩に着る、母さん」
line = "「わかった。恩に着る、母さん」"

[[dialogue]]
speaker = "unk"
# 一帯を取り巻くように展開された魔界の星空。これによって、俺たちは全員が星とのリンクを取り戻す。
line = "一帯を取り巻くように展開された魔界の星空。これによって、俺たちは全員が星とのリンクを取り戻す。"

[[dialogue]]
speaker = "クラウディア"
# 「くくく……そうでなくては面白くない。やはり懸けるのは全力でなくてはな」
line = "「くくく……そうでなくては面白くない。やはり懸けるのは全力でなくてはな」"

[[dialogue]]
speaker = "クラウディア"
# 「セドナよ。今日だけは、いつもの禁を破ってもよいな？」
line = "「セドナよ。今日だけは、いつもの禁を破ってもよいな？」"

[[dialogue]]
speaker = "セドナ"
# 「ええ。ネビュラとのおやくそく第二十二条──『お外で魔法は使わない』を解禁します。私ともども」
line = "「ええ。ネビュラとのおやくそく第二十二条──『お外で魔法は使わない』を解禁します。私ともども」"

[[dialogue]]
speaker = "セドナ"
# 「もっとも……姫はいつだって無視していたでしょうが」
line = "「もっとも……姫はいつだって無視していたでしょうが」"

[[dialogue]]
speaker = "クラウディア"
# 「言うでない」
line = "「言うでない」"

[[dialogue]]
speaker = "クロト"
# 「これは……」
line = "「これは……」"

[[dialogue]]
speaker = "ニャリオン"
# 「なんニャ──変身……！？」
line = "「なんニャ──変身……！？」"

[[dialogue]]
speaker = "unk"
# <ruby=こんこん>滾々</ruby>と湧き上がる光の魔力が、クラウディアの全身を変じさせていく。
line = "<ruby>滾々<rt>こんこん</rt></ruby>と湧き上がる光の魔力が、クラウディアの全身を変じさせていく。"

[[dialogue]]
speaker = "unk"
# それはさながら、俺たち星騎士にとっての変身──
line = "それはさながら、俺たち星騎士にとっての変身──"

[[dialogue]]
speaker = "クラウディア"
# 「魔の森に舞いし黄昏の、咲いて唄うは繚乱の蝶々──」
line = "「魔の森に舞いし黄昏の、咲いて唄うは繚乱の蝶々──」"

[[dialogue]]
speaker = "クロト"
# （魔力の奔流──この波動に、どこか懐かしさを覚えるのは……<ruby=ラクシス>前世</ruby>も浴びたからなのか──）
line = "（魔力の奔流──この波動に、どこか懐かしさを覚えるのは……<ruby>前世<rt>ラクシス</rt></ruby>も浴びたからなのか──）"

[[dialogue]]
speaker = "クラウディア（黄昏）"
# 「いつの世も──人の子と<ruby=たたか>闘</ruby>わねばならぬのはおかしきことだ。共に目指す地平は変わらぬというのに」
line = "「いつの世も──人の子と<ruby>闘<rt>たたか</rt></ruby>わねばならぬのはおかしきことだ。共に目指す地平は変わらぬというのに」"

[[dialogue]]
speaker = "クラウディア（黄昏）"
# 「生まれや立ち場といったしがらみがなければ、余もお主らと遊んでやりたかったのだが。仕方あるまい。これも<b>さだめ</b>だ」
line = "「生まれや立ち場といったしがらみがなければ、余もお主らと遊んでやりたかったのだが。仕方あるまい。これも<b>さだめ</b>だ」"

[[dialogue]]
speaker = "unk"
# 茜色の蝶々が舞う。聖なる波動がクラウディアの全身を満たしていく。
line = "茜色の蝶々が舞う。聖なる波動がクラウディアの全身を満たしていく。"

[[dialogue]]
speaker = "unk"
# 黄昏をまとう光の魔女──その圧倒的な存在感にはもはや、神々しささえ感じて。
line = "黄昏をまとう光の魔女──その圧倒的な存在感にはもはや、神々しささえ感じて。"

[[dialogue]]
speaker = "クラウディア（黄昏）"
# 「セドナのことも恨んでやるな。冷血そうに見えるやもしれんが、ネビュラの決断とて苦しき妥協の結果なのだ」
line = "「セドナのことも恨んでやるな。冷血そうに見えるやもしれんが、ネビュラの決断とて苦しき妥協の結果なのだ」"

[[dialogue]]
speaker = "クラウディア（黄昏）"
# 「ゆえに、分かり合うなら力を置いて他になし。その全身。その全霊。余にぶつけてみるがいい」
line = "「ゆえに、分かり合うなら力を置いて他になし。その全身。その全霊。余にぶつけてみるがいい」"

[[dialogue]]
speaker = "ソフィア"
# 「っ……綺麗……」
line = "「っ……綺麗……」"

[[dialogue]]
speaker = "フィオナ"
# 「こんなにも──聖なる魔力があったなんて……」
line = "「こんなにも──聖なる魔力があったなんて……」"

[[dialogue]]
speaker = "セドナ"
# 「光の魔女は通常、数千年に一度の間隔でしか生まれない。指し示すべき予兆もない」
line = "「光の魔女は通常、数千年に一度の間隔でしか生まれない。指し示すべき予兆もない」"

[[dialogue]]
speaker = "セドナ"
# 「だが、最大のリクリエが迫る今になって、姫が誕生なされたのは……それもまた運命と言うべきなのかもしれないな」
line = "「だが、最大のリクリエが迫る今になって、姫が誕生なされたのは……それもまた運命と言うべきなのかもしれないな」"

[[dialogue]]
speaker = "unk"
# 自嘲気味に笑うセドナさん。
line = "自嘲気味に笑うセドナさん。"

[[dialogue]]
speaker = "unk"
# ネビュラの全員を鼓舞するように、暗黒の<ruby=ほむら>焔</ruby>が気炎を上げる。
line = "ネビュラの全員を鼓舞するように、暗黒の<ruby>焔<rt>ほむら</rt></ruby>が気炎を上げる。"

[[dialogue]]
speaker = "クラウディア（黄昏）"
# 「より強いものがこの場を制する。獣にも等しい単純な図式だが余は好きだ」
line = "「より強いものがこの場を制する。獣にも等しい単純な図式だが余は好きだ」"

[[dialogue]]
speaker = "クラウディア（黄昏）"
# 「余も、余の晴れ舞台がために死力を尽くそう。目覚めし魔王よ、せいぜい余を楽しませてくれ」
line = "「余も、余の晴れ舞台がために死力を尽くそう。目覚めし魔王よ、せいぜい余を楽しませてくれ」"

[[dialogue]]
speaker = "クロト"
# 「ッッ────」
line = "「ッッ────」"

[[dialogue]]
speaker = "ユウリ"
# 「っ……！　なんつうオーラ……！」
line = "「っ……！　なんつうオーラ……！」"

[[dialogue]]
speaker = "アナ"
# 「《光の魔女》──やはり別格ですね……！」
line = "「《光の魔女》──やはり別格ですね……！」"

[[dialogue]]
speaker = "unk"
# 凄絶なる光の覇気が拡散する。
line = "凄絶なる光の覇気が拡散する。"

[[dialogue]]
speaker = "unk"
# そこに、いつかの『試し』の時のような手加減は一切なかった。
line = "そこに、いつかの『試し』の時のような手加減は一切なかった。"

[[dialogue]]
speaker = "リノ"
# 「魔王クロトが目覚めたあの日──世界は３つに分かたれた。デネブ、ベガ、そしてアルタイル」
line = "「魔王クロトが目覚めたあの日──世界は３つに分かたれた。デネブ、ベガ、そしてアルタイル」"

[[dialogue]]
speaker = "リノ"
# 「全部を救うことはできなかった。だけど、この世界はまだ間に合うわ」
line = "「全部を救うことはできなかった。だけど、この世界はまだ間に合うわ」"

[[dialogue]]
speaker = "リノ"
# 「不出来な母親でごめんね、クロト。本当なら──私だけでなんとかできればよかったんだけど。結局頼ることになっちゃった」
line = "「不出来な母親でごめんね、クロト。本当なら──私だけでなんとかできればよかったんだけど。結局頼ることになっちゃった」"

[[dialogue]]
speaker = "クロト"
# 「今さら何を言ってるんだよ。母さん」
line = "「今さら何を言ってるんだよ。母さん」"

[[dialogue]]
speaker = "クロト"
# 「おかげで仲間と出会えた。そして、世界を救える。これ以上に幸福なことはないんだから」
line = "「おかげで仲間と出会えた。そして、世界を救える。これ以上に幸福なことはないんだから」"

[[dialogue]]
speaker = "リノ"
# 「クロト……もう。ほんと立派になっちゃって」
line = "「クロト……もう。ほんと立派になっちゃって」"

[[dialogue]]
speaker = "unk"
# 偽りのない本心だった。みんなだってここに立ったことを後悔しちゃいないだろう。
line = "偽りのない本心だった。みんなだってここに立ったことを後悔しちゃいないだろう。"

[[dialogue]]
speaker = "unk"
# 懸けるは幾代にも及ぶ一族の宿願と、家族と世界を救いたいと祈る心。
line = "懸けるは幾代にも及ぶ一族の宿願と、家族と世界を救いたいと祈る心。"

[[dialogue]]
speaker = "フィオナ"
# 「私からも──お願いします。皆さん。力を貸してください」
line = "「私からも──お願いします。皆さん。力を貸してください」"

[[dialogue]]
speaker = "クロト"
# 「当然だ。新星、流星、両星徒会──全開でいく！　ネビュラの魔女たちを制圧するぞ！」
line = "「当然だ。新星、流星、両星徒会──全開でいく！　ネビュラの魔女たちを制圧するぞ！」"

[[dialogue]]
speaker = "みんな"
# 「おう！」
line = "「おう！」"

[[dialogue]]
speaker = "セドナ"
# 「総員集結──姫様を援護し、星騎士たちを今度こそ無力化する！　各員、配置につけ！」
line = "「総員集結──姫様を援護し、星騎士たちを今度こそ無力化する！　各員、配置につけ！」"

[[dialogue]]
speaker = "ネビュラ"
# 「──イエス、マム！」
line = "「──イエス、マム！」"

[[dialogue]]
speaker = "クラウディア（黄昏）"
# 「真祖ディアナの血を継ぎし、第八代《光の魔女》──クラウディア・イルゼ・フォン・ゴットフリートが宣告する」
line = "「真祖ディアナの血を継ぎし、第八代《光の魔女》──クラウディア・イルゼ・フォン・ゴットフリートが宣告する」"

[[dialogue]]
speaker = "クラウディア（黄昏）"
# 「来るがよい。星騎士、<ruby=ヤーガ>はぐれ魔女</ruby>、そして二柱の魔王。互いの尊厳を懸け──終末の前哨戦と参ろうではないか！」
line = "「来るがよい。星騎士、<ruby>はぐれ魔女<rt>ヤーガ</rt></ruby>、そして二柱の魔王。互いの尊厳を懸け──終末の前哨戦と参ろうではないか！」"

[[dialogue]]
speaker = "フィオナ"
# 「参ります──命に代えても、守りたいものがあるから」
line = "「参ります──命に代えても、守りたいものがあるから」"

[[dialogue]]
speaker = "フィオナ"
# 「姉さんのことも、この世界の命運も。私たちに背負わせていただきます──邪魔はさせない！」
line = "「姉さんのことも、この世界の命運も。私たちに背負わせていただきます──邪魔はさせない！」"
