[[dialogue]]
speaker = "unk"
# その日、俺は魔法少女たちと共に、因縁の相手と対峙していた――
line = "その日、俺は魔法少女たちと共に、因縁の相手と対峙していた――"

[[dialogue]]
speaker = "ディーラック"
# 「サチちゃん……キミたちもしつこいね、毎度毎度ボクの邪魔をしてサァッ！」
line = "「サチちゃん……キミたちもしつこいね、毎度毎度ボクの邪魔をしてサァッ！」"

[[dialogue]]
speaker = "サチ"
# 「ディーラックさん、今日こそ決着をつけます！」
line = "「ディーラックさん、今日こそ決着をつけます！」"

[[dialogue]]
speaker = "unk"
# 『幸運』の能力で高い戦闘力を持ち、流星学園附属校の生徒会長を務める魔法少女『白詰サチ』。
line = "『幸運』の能力で高い戦闘力を持ち、流星学園附属校の生徒会長を務める魔法少女『白詰サチ』。"

[[dialogue]]
speaker = "ディーラック"
# 「無理だね！　くらうのサッ！！」
line = "「無理だね！　くらうのサッ！！」"

[[dialogue]]
speaker = "unk"
# 『ロストアイテム』を暴走させることができ、これまで暗躍し続けてきたエネルギー生命体『ディーラック』。
line = "『ロストアイテム』を暴走させることができ、これまで暗躍し続けてきたエネルギー生命体『ディーラック』。"

[[dialogue]]
speaker = "シズハ"
# 「ディーちゃん！　これ以上の悪さはもう止めて！」
line = "「ディーちゃん！　これ以上の悪さはもう止めて！」"

[[dialogue]]
speaker = "unk"
# 以前、ディーラックと一緒に過ごしていたことがあり、体内の『聖杯』を力の源とする魔法少女『染井シズハ』。
line = "以前、ディーラックと一緒に過ごしていたことがあり、体内の『聖杯』を力の源とする魔法少女『染井シズハ』。"

[[dialogue]]
speaker = "ディーラック"
# 「シズハちゃん、悪いけど今のキミに用はないのサ！」
line = "「シズハちゃん、悪いけど今のキミに用はないのサ！」"

[[dialogue]]
speaker = "トマル"
# 「逃がしません！　一本集中！」
line = "「逃がしません！　一本集中！」"

[[dialogue]]
speaker = "unk"
# サチの友人で、新星学園星徒会書記のマトイの『<b>弟</b>』である『詠野トマル』。
line = "サチの友人で、新星学園星徒会書記のマトイの『<b>弟</b>』である『詠野トマル』。"

[[dialogue]]
speaker = "ディーラック"
# 「くっ……！？」
line = "「くっ……！？」"

[[dialogue]]
speaker = "unk"
# トマルが矢を放ち、ディーラックはそれを弾くが――矢に触れたことでトマルの星力が帯電、体が痺れて動きが鈍くなる。
line = "トマルが矢を放ち、ディーラックはそれを弾くが――矢に触れたことでトマルの星力が帯電、体が痺れて動きが鈍くなる。"

[[dialogue]]
speaker = "ディーラック"
# 「トマルちゃんの『星力を留める』能力、敵に回すとここまで厄介とはね……！　エネルギー生命体のボクには、相性最悪サ！」
line = "「トマルちゃんの『星力を留める』能力、敵に回すとここまで厄介とはね……！　エネルギー生命体のボクには、相性最悪サ！」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「隙ができた！　サチ、今じゃ！」
line = "「隙ができた！　サチ、今じゃ！」"

[[dialogue]]
speaker = "unk"
# かつてディーラックによって作り出された『悪の終末兵器』であり、今はサチの相棒として共に戦う魔法少女『プリムラ』が、支援砲撃を撃ちながら叫ぶ。
line = "かつてディーラックによって作り出された『悪の終末兵器』であり、今はサチの相棒として共に戦う魔法少女『プリムラ』が、支援砲撃を撃ちながら叫ぶ。"

[[dialogue]]
speaker = "サチ"
# 「トレジアンナさん！　ルーレットロッド、フルスロットルでお願いします！」
line = "「トレジアンナさん！　ルーレットロッド、フルスロットルでお願いします！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「はい！　ディーラックさん、行きますよ～！　ルーレットスタート！」
line = "「はい！　ディーラックさん、行きますよ～！　ルーレットスタート！」"

[[dialogue]]
speaker = "unk"
# サチの武器である杖から声がする。その声の主は、ロストアイテムに封印されている自称・先代魔法少女で、サチを魔法少女に任命した『トレジアンナ』さんだ。
line = "サチの武器である杖から声がする。その声の主は、ロストアイテムに封印されている自称・先代魔法少女で、サチを魔法少女に任命した『トレジアンナ』さんだ。"

[[dialogue]]
speaker = "トレジアンナ"
# 「――ジャックポットです！　サチさん！」
line = "「――ジャックポットです！　サチさん！」"

[[dialogue]]
speaker = "サチ"
# 「タイダルフィーバーッ！！」
line = "「タイダルフィーバーッ！！」"

[[dialogue]]
speaker = "ディーラック"
# 「ぐうぅ――っ！？」
line = "「ぐうぅ――っ！？」"

[[dialogue]]
speaker = "ディーラック"
# 「かはっ……！」
line = "「かはっ……！」"

[[dialogue]]
speaker = "unk"
# サチの星術がクリティカルヒットし、ディーラックは口から<b>ある物</b>を吐き出し、本来の姿へと戻る。それは――
line = "サチの星術がクリティカルヒットし、ディーラックは口から<b>ある物</b>を吐き出し、本来の姿へと戻る。それは――"

[[dialogue]]
speaker = "サチ"
# 「解放のロストアイテム……！」
line = "「解放のロストアイテム……！」"

[[dialogue]]
speaker = "ディーラック"
# 「っ……！　簡単には渡さないのサ！」
line = "「っ……！　簡単には渡さないのサ！」"

[[dialogue]]
speaker = "unk"
# サチとディーラックがそれを回収しようと、同時に飛び出す。
line = "サチとディーラックがそれを回収しようと、同時に飛び出す。"

[[dialogue]]
speaker = "unk"
# 先に解放のロストアイテムを手にしたのは――
line = "先に解放のロストアイテムを手にしたのは――"

[[dialogue]]
speaker = "サチ"
# 「獲りました！　――きゃっ！？」
line = "「獲りました！　――きゃっ！？」"

[[dialogue]]
speaker = "unk"
# ディーラックのタックルを受けて、サチが吹っ飛ばされる。
line = "ディーラックのタックルを受けて、サチが吹っ飛ばされる。"

[[dialogue]]
speaker = "unk"
# サチ！
line = "サチ！"

[[dialogue]]
speaker = "unk"
# 俺は全速力で駆けて、彼女の体をキャッチする。
line = "俺は全速力で駆けて、彼女の体をキャッチする。"

[[dialogue]]
speaker = "サチ"
# 「えっ！？　あ、ありがとうございます、お兄さん……！」
line = "「えっ！？　あ、ありがとうございます、お兄さん……！」"

[[dialogue]]
speaker = "ディーラック"
# 「どうやら、今回はここまでみたいだネ。……解放のロストアイテムは、預けておくよ」
line = "「どうやら、今回はここまでみたいだネ。……解放のロストアイテムは、預けておくよ」"

[[dialogue]]
speaker = "unk"
# ディーラックは別のロストアイテムを使ったのか、幻が消え行くように姿が薄れて、またどこかへ逃げ去ってしまった。
line = "ディーラックは別のロストアイテムを使ったのか、幻が消え行くように姿が薄れて、またどこかへ逃げ去ってしまった。"

[[dialogue]]
speaker = "シズハ"
# 「ディーちゃん……」
line = "「ディーちゃん……」"

[[dialogue]]
speaker = "プリムラ"
# 「ディーラックにはまた逃げられてしまったが――やっと取り戻したのじゃ」
line = "「ディーラックにはまた逃げられてしまったが――やっと取り戻したのじゃ」"

[[dialogue]]
speaker = "トマル"
# 「これが、解放のロストアイテム……。これでついに……」
line = "「これが、解放のロストアイテム……。これでついに……」"

[[dialogue]]
speaker = "サチ"
# 「はい。トレジアンナさんの封印を解いて、元の姿を取り戻すことができます」
line = "「はい。トレジアンナさんの封印を解いて、元の姿を取り戻すことができます」"

[[dialogue]]
speaker = "unk"
# サチの髪飾りが点滅して、そこからトレジアンナさんの声が響く。
line = "サチの髪飾りが点滅して、そこからトレジアンナさんの声が響く。"

[[dialogue]]
speaker = "トレジアンナ"
# 「いや～、ついにこの時がやって来ましたね～♪　ここまで長かったから、感慨深いですよ～」
line = "「いや～、ついにこの時がやって来ましたね～♪　ここまで長かったから、感慨深いですよ～」"

[[dialogue]]
speaker = "トレジアンナ"
# 「では、皆さんお待ちかね、私の本当の姿をお披露目しちゃいますよ～！」
line = "「では、皆さんお待ちかね、私の本当の姿をお披露目しちゃいますよ～！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「いざ――解放です！」
line = "「いざ――解放です！」"

[[dialogue]]
speaker = "unk"
# これが……！
line = "これが……！"

[[dialogue]]
speaker = "トレジアンナ"
# 「じゃじゃ～ん☆　それでは、改めまして！」
line = "「じゃじゃ～ん☆　それでは、改めまして！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「マジにマジカル☆　凛とリリカル！　華麗にカレイド♪」
line = "「マジにマジカル☆　凛とリリカル！　華麗にカレイド♪」"

[[dialogue]]
speaker = "トレジアンナ"
# 「トレジアンナこと、『<ruby=しゅうしゅう>蒐集</ruby>の魔法少女』トレジャー☆アンナ、ここにふっか～つ♪　素敵にステッキ、決めちゃいますよ～！」
line = "「トレジアンナこと、『<ruby>蒐集<rt>しゅうしゅう</rt></ruby>の魔法少女』トレジャー☆アンナ、ここにふっか～つ♪　素敵にステッキ、決めちゃいますよ～！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「キラッ☆」
line = "「キラッ☆」"

[[dialogue]]
speaker = "unk"
# 復活した先代魔法少女は、そうして華麗に決めポーズで、ウィンクしてみせるのだった――
line = "復活した先代魔法少女は、そうして華麗に決めポーズで、ウィンクしてみせるのだった――"
