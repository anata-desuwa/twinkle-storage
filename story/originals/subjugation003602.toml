[[dialogue]]
speaker = "unk"
# イレーナもウェディングフォームが発現し、他の戦闘服に変身できなくなったらしい。
line = "イレーナもウェディングフォームが発現し、他の戦闘服に変身できなくなったらしい。"

[[dialogue]]
speaker = "unk"
# この状態を解除するには、結婚式を挙げる必要があるのだが──
line = "この状態を解除するには、結婚式を挙げる必要があるのだが──"

[[dialogue]]
speaker = "イレーナ"
# 「言っておくけど、別にあんたと結婚したいってわけじゃないから！」
line = "「言っておくけど、別にあんたと結婚したいってわけじゃないから！」"

[[dialogue]]
speaker = "イレーナ"
# 「でもあんたなら事情も知ってるし、何度か式を挙げてて慣れてるだろうし……あたしが知ってる男の中じゃあんたが一番マシだから……」
line = "「でもあんたなら事情も知ってるし、何度か式を挙げてて慣れてるだろうし……あたしが知ってる男の中じゃあんたが一番マシだから……」"

[[dialogue]]
speaker = "イレーナ"
# 「と、とにかく協力しなさいっ！！」
line = "「と、とにかく協力しなさいっ！！」"

[[dialogue]]
speaker = "unk"
# わかった、協力するよ
line = "わかった、協力するよ"

[[dialogue]]
speaker = "イレーナ"
# 「当然よ。元を辿ればあんたのせいみたいなもんだし」
line = "「当然よ。元を辿ればあんたのせいみたいなもんだし」"

[[dialogue]]
speaker = "イレーナ"
# 「ひとまず新郎は確保したわ。だけど問題は──」
line = "「ひとまず新郎は確保したわ。だけど問題は──」"

[[dialogue]]
speaker = "シャロン"
# 「イレーナさま！　そのお姿は！！」
line = "「イレーナさま！　そのお姿は！！」"

[[dialogue]]
speaker = "イレーナ"
# 「げ……」
line = "「げ……」"

[[dialogue]]
speaker = "シャロン"
# 「お、お美しいです、イレーナさま……」
line = "「お、お美しいです、イレーナさま……」"

[[dialogue]]
speaker = "シャロン"
# 「お相手はどなたですか？　って聞くまでもありませんね、会長さま！」
line = "「お相手はどなたですか？　って聞くまでもありませんね、会長さま！」"

[[dialogue]]
speaker = "unk"
# あ……ええと……
line = "あ……ええと……"

[[dialogue]]
speaker = "シャロン"
# 「式はいつですか？　私も絶対に参列します！」
line = "「式はいつですか？　私も絶対に参列します！」"

[[dialogue]]
speaker = "シャロン"
# 「あぁ、イレーナさまと会長さまが結婚なさったら……きっと素敵なご家庭を築かれることでしょう！」
line = "「あぁ、イレーナさまと会長さまが結婚なさったら……きっと素敵なご家庭を築かれることでしょう！」"

[[dialogue]]
speaker = "シャロン"
# 「２人のお子様なら聡明でお可愛らしい子がお生まれになるでしょうね……その時は私にもぜひ抱っこさせてください！」
line = "「２人のお子様なら聡明でお可愛らしい子がお生まれになるでしょうね……その時は私にもぜひ抱っこさせてください！」"

[[dialogue]]
speaker = "イレーナ"
# 「あーっ、そこまで！　妄想で勝手に話を進めるんじゃないわよ！」
line = "「あーっ、そこまで！　妄想で勝手に話を進めるんじゃないわよ！」"

[[dialogue]]
speaker = "イレーナ"
# 「いい？　こんな格好してるけど、あたしは結婚するわけでも何でもないの！　あのね──」
line = "「いい？　こんな格好してるけど、あたしは結婚するわけでも何でもないの！　あのね──」"

[[dialogue]]
speaker = "シャロン"
# 「はぅ……では戦闘服がウェディングドレスに変化して戻らなくなっただけだと……」
line = "「はぅ……では戦闘服がウェディングドレスに変化して戻らなくなっただけだと……」"

[[dialogue]]
speaker = "イレーナ"
# 「どうしてそんなにがっかりしてるのよ」
line = "「どうしてそんなにがっかりしてるのよ」"

[[dialogue]]
speaker = "シャロン"
# 「だって、イレーナさまと会長さまが結婚するって、想像しただけで素敵なことじゃありませんか」
line = "「だって、イレーナさまと会長さまが結婚するって、想像しただけで素敵なことじゃありませんか」"

[[dialogue]]
speaker = "イレーナ"
# 「冗談はやめてよ。こんなのと結婚なんて……」
line = "「冗談はやめてよ。こんなのと結婚なんて……」"

[[dialogue]]
speaker = "unk"
# ひ、ひどい……
line = "ひ、ひどい……"

[[dialogue]]
speaker = "シャロン"
# 「でも、そのウェディングフォームを解除するために、結婚式は挙げなくちゃいけないんですよね？」
line = "「でも、そのウェディングフォームを解除するために、結婚式は挙げなくちゃいけないんですよね？」"

[[dialogue]]
speaker = "イレーナ"
# 「そうなんだけど……１つ大きな問題があるのよね」
line = "「そうなんだけど……１つ大きな問題があるのよね」"

[[dialogue]]
speaker = "シャロン"
# 「問題、ですか？」
line = "「問題、ですか？」"

[[dialogue]]
speaker = "イレーナ"
# 「これまではあたしが神官として結婚式を挙げてきたけど、さすがに自分で自分の結婚式を挙げるわけにはいかないわ」
line = "「これまではあたしが神官として結婚式を挙げてきたけど、さすがに自分で自分の結婚式を挙げるわけにはいかないわ」"

[[dialogue]]
speaker = "イレーナ"
# 「誰かに神官役を頼む必要があるんだけど、誰に頼むべきか……」
line = "「誰かに神官役を頼む必要があるんだけど、誰に頼むべきか……」"

[[dialogue]]
speaker = "シャロン"
# 「私──じゃ、ダメですよね……」
line = "「私──じゃ、ダメですよね……」"

[[dialogue]]
speaker = "イレーナ"
# 「そうね。あんたにお願いできれば良かったんだけど、あんたはシスターであって神官じゃない。だからこの役目をお願いすることは出来ないわ」
line = "「そうね。あんたにお願いできれば良かったんだけど、あんたはシスターであって神官じゃない。だからこの役目をお願いすることは出来ないわ」"

[[dialogue]]
speaker = "イレーナ"
# 「教皇庁の他の神官にお願いして、話が広がるのもイヤだし……そもそも偽りの結婚式の神官なんて引き受けてくれる人はいなさそうだし……」
line = "「教皇庁の他の神官にお願いして、話が広がるのもイヤだし……そもそも偽りの結婚式の神官なんて引き受けてくれる人はいなさそうだし……」"

[[dialogue]]
speaker = "unk"
# １人心当たりがあるかも
line = "１人心当たりがあるかも"

[[dialogue]]
speaker = "unk"
# 俺はＤＩＳＣを取り出すと、早速その相手に連絡する。
line = "俺はＤＩＳＣを取り出すと、早速その相手に連絡する。"

[[dialogue]]
speaker = "ジュエリー"
# 『やあ、我が愛しの助手よ。キミの方から連絡をしてくれるとは嬉しいね』
line = "『やあ、我が愛しの助手よ。キミの方から連絡をしてくれるとは嬉しいね』"

[[dialogue]]
speaker = "ジュエリー"
# 『ちょうど私もキミに相談したいことがあったんだ。至急、結婚式場まで来てくれないか』
line = "『ちょうど私もキミに相談したいことがあったんだ。至急、結婚式場まで来てくれないか』"

[[dialogue]]
speaker = "ジュエリー"
# 『ではまた後ほど』
line = "『ではまた後ほど』"

[[dialogue]]
speaker = "unk"
# あ、ちょっと待っ──
line = "あ、ちょっと待っ──"

[[dialogue]]
speaker = "イレーナ"
# 「どうだったの？　引き受けてもらえなかったの？」
line = "「どうだったの？　引き受けてもらえなかったの？」"

[[dialogue]]
speaker = "unk"
# そうじゃないけど、結婚式場に来てくれって
line = "そうじゃないけど、結婚式場に来てくれって"

[[dialogue]]
speaker = "シャロン"
# 「結婚式場？　なんだかタイムリーな場所ですね」
line = "「結婚式場？　なんだかタイムリーな場所ですね」"

[[dialogue]]
speaker = "イレーナ"
# 「……すごく嫌な予感がしてきたわ」
line = "「……すごく嫌な予感がしてきたわ」"

[[dialogue]]
speaker = "ジュエリー"
# 「やあ、待っていたよ」
line = "「やあ、待っていたよ」"

[[dialogue]]
speaker = "ジュエリー"
# 「おや、一緒にいるのはイレーナさんじゃないか？　どうして我が助手と一緒にいるんだい？」
line = "「おや、一緒にいるのはイレーナさんじゃないか？　どうして我が助手と一緒にいるんだい？」"

[[dialogue]]
speaker = "イレーナ"
# 「実は少々困ったことになってしまって……会長さんに相談に乗ってもらっていたんです」
line = "「実は少々困ったことになってしまって……会長さんに相談に乗ってもらっていたんです」"

[[dialogue]]
speaker = "unk"
# 実はその事で頼みがあるんだ
line = "実はその事で頼みがあるんだ"

[[dialogue]]
speaker = "ジュエリー"
# 「頼みごとかい？　私で力になれることがあるならば協力は惜しまないよ」
line = "「頼みごとかい？　私で力になれることがあるならば協力は惜しまないよ」"

[[dialogue]]
speaker = "イレーナ"
# 「ありがとうございます。実は──」
line = "「ありがとうございます。実は──」"

[[dialogue]]
speaker = "unk"
# イレーナは突然ウェディングフォームが発現したこと、それを解除するために結婚式を挙げなければならなくなったことを説明した。
line = "イレーナは突然ウェディングフォームが発現したこと、それを解除するために結婚式を挙げなければならなくなったことを説明した。"

[[dialogue]]
speaker = "ジュエリー"
# 「ふむ……事情はわかったよ。それなら助手が私に連絡してきた理由も推察できる。神官役を頼みたい、そういう事だろう？」
line = "「ふむ……事情はわかったよ。それなら助手が私に連絡してきた理由も推察できる。神官役を頼みたい、そういう事だろう？」"

[[dialogue]]
speaker = "ジュエリー"
# 「私はブラウン神父の子孫だ。結婚式の作法は理解しているし、真似事くらいなら務まるだろう」
line = "「私はブラウン神父の子孫だ。結婚式の作法は理解しているし、真似事くらいなら務まるだろう」"

[[dialogue]]
speaker = "ジュエリー"
# 「だが、今回の件に関してはキミたちの力にはなれそうにないね」
line = "「だが、今回の件に関してはキミたちの力にはなれそうにないね」"

[[dialogue]]
speaker = "イレーナ"
# 「そうですか……すみません、無理を言ってしまって」
line = "「そうですか……すみません、無理を言ってしまって」"

[[dialogue]]
speaker = "ジュエリー"
# 「ああ、神官役を引き受けるのが嫌だというわけではないよ。ただ、引き受けられない事情があるんだ」
line = "「ああ、神官役を引き受けるのが嫌だというわけではないよ。ただ、引き受けられない事情があるんだ」"

[[dialogue]]
speaker = "ジュエリー"
# 「論より証拠、その目で見てもらった方が理解は早いだろう」
line = "「論より証拠、その目で見てもらった方が理解は早いだろう」"

[[dialogue]]
speaker = "ジュエリー"
# 「明解に換言するならば──」
line = "「明解に換言するならば──」"

[[dialogue]]
speaker = "ジュエリー"
# 「私も花嫁なんだ」
line = "「私も花嫁なんだ」"
