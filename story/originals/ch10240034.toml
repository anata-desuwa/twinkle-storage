[[dialogue]]
speaker = "unk"
# 第４話,いつまでもはんぶんこ,P
line = "第４話,いつまでもはんぶんこ,P"

[[dialogue]]
speaker = "unk"
# ヨミにプロポーズした夜から、数日が経った。
line = "ヨミにプロポーズした夜から、数日が経った。"

[[dialogue]]
speaker = "unk"
# 元々恋人同士だったこともあって、表面上は特に大きな変化もない。
line = "元々恋人同士だったこともあって、表面上は特に大きな変化もない。"

[[dialogue]]
speaker = "unk"
# ただ、２人の意識は明らかに変わった。結婚について、より深く考えるようになっていたんだ。
line = "ただ、２人の意識は明らかに変わった。結婚について、より深く考えるようになっていたんだ。"

[[dialogue]]
speaker = "ヨミ"
# 「お、お邪魔しまぁーす……」
line = "「お、お邪魔しまぁーす……」"

[[dialogue]]
speaker = "ヨミ"
# 「えへへ、会長の家、来ちゃった……何度か来てますけど、今回は特別な感じがします」
line = "「えへへ、会長の家、来ちゃった……何度か来てますけど、今回は特別な感じがします」"

[[dialogue]]
speaker = "ヨミ"
# 「だって今日はいつもと違う、特別な理由でお邪魔したんですから」
line = "「だって今日はいつもと違う、特別な理由でお邪魔したんですから」"

[[dialogue]]
speaker = "unk"
# そうだね。いつもと違う理由だ
line = "そうだね。いつもと違う理由だ"

[[dialogue]]
speaker = "ヨミ"
# 「そう……」
line = "「そう……」"

[[dialogue]]
speaker = "ヨミ"
# 「ズバリ、花嫁修業のやり直し、です！」
line = "「ズバリ、花嫁修業のやり直し、です！」"

[[dialogue]]
speaker = "ヨミ"
# 「この前はメイド長とトワ先生もいて、わちゃわちゃしちゃいましたからね。あれで花嫁修業をしたとは、とても言えません」
line = "「この前はメイド長とトワ先生もいて、わちゃわちゃしちゃいましたからね。あれで花嫁修業をしたとは、とても言えません」"

[[dialogue]]
speaker = "ヨミ"
# 「もちろん、普段からメイドとして家事の腕は磨いてますけど、お嫁さんのスキルはまたちょっと異なりますし」
line = "「もちろん、普段からメイドとして家事の腕は磨いてますけど、お嫁さんのスキルはまたちょっと異なりますし」"

[[dialogue]]
speaker = "ヨミ"
# 「あの夜、情熱的なプロポーズをして頂きましたから……私も、会長のお嫁さんになるつもりで、もっと勉強したいんです」
line = "「あの夜、情熱的なプロポーズをして頂きましたから……私も、会長のお嫁さんになるつもりで、もっと勉強したいんです」"

[[dialogue]]
speaker = "ヨミ"
# 「特に私はお料理があまり得意ではないので、料理上手な会長に、是非教えて頂けたらな～、と」
line = "「特に私はお料理があまり得意ではないので、料理上手な会長に、是非教えて頂けたらな～、と」"

[[dialogue]]
speaker = "unk"
# じゃあ、一緒に料理しよう
line = "じゃあ、一緒に料理しよう"

[[dialogue]]
speaker = "ヨミ"
# 「はいっ、よろしくお願いしますね、会長！」
line = "「はいっ、よろしくお願いしますね、会長！」"

[[dialogue]]
speaker = "ヨミ"
# 「あ、そうです。いいことを思いつきました。雰囲気を出すためにこういうのはどうでしょう？」
line = "「あ、そうです。いいことを思いつきました。雰囲気を出すためにこういうのはどうでしょう？」"

[[dialogue]]
speaker = "ヨミ"
# 「お料理、いっぱい教えて下さいね……あ・な・た<emoji=heart04>」
line = "「お料理、いっぱい教えて下さいね……あ・な・た<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# かわいすぎて抱き締めたい！
line = "かわいすぎて抱き締めたい！"

[[dialogue]]
speaker = "ヨミ"
# 「きゃん<emoji=heart04>　もう、急に抱き締めないで下さいよぉ。ちゃんと最初に言ってくれたら、好きなだけぎゅうってさせてあげるので……」
line = "「きゃん<emoji=heart04>　もう、急に抱き締めないで下さいよぉ。ちゃんと最初に言ってくれたら、好きなだけぎゅうってさせてあげるので……」"

[[dialogue]]
speaker = "ヨミ"
# 「って、何言ってんだろ、私。えへへ～、少し調子に乗りすぎちゃいましたね」
line = "「って、何言ってんだろ、私。えへへ～、少し調子に乗りすぎちゃいましたね」"

[[dialogue]]
speaker = "ヨミ"
# 「今はお料理の修業です♪　未来の花嫁さんとして、精いっぱいあなた好みの料理が作れるよう、頑張りますね<emoji=heart04>」
line = "「今はお料理の修業です♪　未来の花嫁さんとして、精いっぱいあなた好みの料理が作れるよう、頑張りますね<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
# 「で、できましたぁ～♪」
line = "「で、できましたぁ～♪」"

[[dialogue]]
speaker = "ヨミ"
# 「一緒に作ったのに、かなり時間かかっちゃいましたね」
line = "「一緒に作ったのに、かなり時間かかっちゃいましたね」"

[[dialogue]]
speaker = "ヨミ"
# 「でも、どうしておいなりさん？　私はあなたの好物を作りたかったのに」
line = "「でも、どうしておいなりさん？　私はあなたの好物を作りたかったのに」"

[[dialogue]]
