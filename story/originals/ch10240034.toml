line = "「でも、一緒においなりさん作るの楽しかったです。作ったり、作ってもらったりじゃなくて、こういう共同作業も仲良し夫婦って感じがしていいですね」"

[[dialogue]]
speaker = "ヨミ"
# 「次は……あなたが好きなものを一緒に作りましょう<emoji=heart04>　ハンバーグ？　それとも餃子がいいかな？　ふふっ、一緒に作れたら、楽しい花嫁修業になりそうです♪」
line = "「次は……あなたが好きなものを一緒に作りましょう<emoji=heart04>　ハンバーグ？　それとも餃子がいいかな？　ふふっ、一緒に作れたら、楽しい花嫁修業になりそうです♪」"

[[dialogue]]
speaker = "ヨミ"
# 「ということで、次の約束も決めたところで、おいなりさんを食べましょう♪」
