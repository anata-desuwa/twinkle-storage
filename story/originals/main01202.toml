[[dialogue]]
speaker = "unk"
# 第２話,流星の騎士,B
line = "第２話,流星の騎士,B"

[[dialogue]]
speaker = "クロト"
# （っ……）
line = "（っ……）"

[[dialogue]]
speaker = "クロト"
# （ここは──一体、なんだ……？）
line = "（ここは──一体、なんだ……？）"

[[dialogue]]
speaker = "unk"
# 白い光に包まれて、呑まれて、そして……
line = "白い光に包まれて、呑まれて、そして……"

[[dialogue]]
speaker = "unk"
# 困惑する俺の意識に──人間界の様子が映し出された。
line = "困惑する俺の意識に──人間界の様子が映し出された。"

[[dialogue]]
speaker = "警官Ａ"
# 「最近はアステラの発生が多いな。国外も似たような状況らしい」
line = "「最近はアステラの発生が多いな。国外も似たような状況らしい」"

[[dialogue]]
speaker = "警官Ｂ"
# 「ああ。だが……それもあって学園の星騎士たちも大層な人手不足と聞く。あの要員はそう簡単に増やせんし、参ったな」
line = "「ああ。だが……それもあって学園の星騎士たちも大層な人手不足と聞く。あの要員はそう簡単に増やせんし、参ったな」"

[[dialogue]]
speaker = "unk"
# 街の一角で２人の警察官が話をしていた。
line = "街の一角で２人の警察官が話をしていた。"

[[dialogue]]
speaker = "unk"
# 彼らの前には巨大なアステライトが浮かび上がっており、すでに近隣の住民たちは急いで避難を開始している。
line = "彼らの前には巨大なアステライトが浮かび上がっており、すでに近隣の住民たちは急いで避難を開始している。"

[[dialogue]]
speaker = "unk"
# そこへ、大剣をたずさえた一人の男が通りかかる。
line = "そこへ、大剣をたずさえた一人の男が通りかかる。"

[[dialogue]]
speaker = "セイファート"
# 「──六号級の未確認アステラとお見受けする。処理に当たるが、構わないか？」
line = "「──六号級の未確認アステラとお見受けする。処理に当たるが、構わないか？」"

[[dialogue]]
speaker = "警官Ｂ"
# 「おっと──あんたが噂の──教皇庁のトラブルシューターか」
line = "「おっと──あんたが噂の──教皇庁のトラブルシューターか」"

[[dialogue]]
speaker = "警官Ａ"
# 「助かるぜ。確か、流星の騎士だったか」
line = "「助かるぜ。確か、流星の騎士だったか」"

[[dialogue]]
speaker = "セイファート"
# 「自分で名乗っているわけではないがな」
line = "「自分で名乗っているわけではないがな」"

[[dialogue]]
speaker = "unk"
# その街並みは俺の知る流星市国とどことなく違っていた。
line = "その街並みは俺の知る流星市国とどことなく違っていた。"

[[dialogue]]
speaker = "unk"
# これは……過去だ。俺が物心つくより前の、昔の光景だった。
line = "これは……過去だ。俺が物心つくより前の、昔の光景だった。"

[[dialogue]]
speaker = "unk"
# でも、どうして……
line = "でも、どうして……"

[[dialogue]]
speaker = "セイファート"
# 「私は英雄ではない。だが、厄災に抗する手立てを失ったわけではない」
line = "「私は英雄ではない。だが、厄災に抗する手立てを失ったわけではない」"

[[dialogue]]
speaker = "セイファート"
# 「学園に属さなくなった今も──こうして、人里に巣食うリクリエの余波から人々を守ることで」
line = "「学園に属さなくなった今も──こうして、人里に巣食うリクリエの余波から人々を守ることで」"

[[dialogue]]
speaker = "クロト"
# （これ──は──……）
line = "（これ──は──……）"

[[dialogue]]
speaker = "unk"
# 馴染みある声音でようやく気づく。
line = "馴染みある声音でようやく気づく。"

[[dialogue]]
speaker = "unk"
# これは……セイファート学園長の歩んできた、人生の軌跡だ。
line = "これは……セイファート学園長の歩んできた、人生の軌跡だ。"

[[dialogue]]
speaker = "unk"
# そこからさらに意識が埋没していき、やがて俺の視界は若かりし学園長のそれと一体となった。
line = "そこからさらに意識が埋没していき、やがて俺の視界は若かりし学園長のそれと一体となった。"

[[dialogue]]
speaker = "セイファート"
# （リクリエ。３０００年越しに世界を襲う、終焉の<ruby=だいやくさい>大厄災</ruby>。私の使命は、常にその迎撃にあった）
line = "（リクリエ。３０００年越しに世界を襲う、終焉の<ruby>大厄災<rt>だいやくさい</rt></ruby>。私の使命は、常にその迎撃にあった）"

[[dialogue]]
speaker = "セイファート"
# （<ruby=スターナイト>星騎士</ruby>としての責務を終えた後も……ひとりでに各地を巡り、街や人々を守っていた）
line = "（<ruby>星騎士<rt>スターナイト</rt></ruby>としての責務を終えた後も……ひとりでに各地を巡り、街や人々を守っていた）"

[[dialogue]]
speaker = "セイファート"
# （流星の騎士──そう、むずがゆくなるような名で呼ばれながらも）
line = "（流星の騎士──そう、むずがゆくなるような名で呼ばれながらも）"

[[dialogue]]
speaker = "unk"
# リクリエ現象にまつわるアステラやモンスターといった被害は、日を追うごとに増していた。
line = "リクリエ現象にまつわるアステラやモンスターといった被害は、日を追うごとに増していた。"

[[dialogue]]
speaker = "unk"
# 流星学園の星騎士たちが懸命にその対処へ当たっていたが限界はある。
line = "流星学園の星騎士たちが懸命にその対処へ当たっていたが限界はある。"

[[dialogue]]
speaker = "unk"
# とりわけ、流星市国の外で発生するイレギュラーなアステラについては、星騎士の出動による対処が極めて難しくなっていた。
line = "とりわけ、流星市国の外で発生するイレギュラーなアステラについては、星騎士の出動による対処が極めて難しくなっていた。"

[[dialogue]]
speaker = "unk"
# よって……そんな星騎士たちの<ruby=てのひら>掌</ruby>からこぼれ落ちた範囲をカバーするのが、私の役目だった。
line = "よって……そんな星騎士たちの<ruby>掌<rt>てのひら</rt></ruby>からこぼれ落ちた範囲をカバーするのが、私の役目だった。"

[[dialogue]]
speaker = "流星教皇"
# 「──さすがだ。ジェラルド。たびたび無理を言ってすまないな」
line = "「──さすがだ。ジェラルド。たびたび無理を言ってすまないな」"

[[dialogue]]
speaker = "セイファート"
# 「好き好んでやっていることだ。そちらこそ、こんな根無し草の支援を引き受けてくれて感謝する」
line = "「好き好んでやっていることだ。そちらこそ、こんな根無し草の支援を引き受けてくれて感謝する」"

[[dialogue]]
speaker = "unk"
# 次期流星教皇──マリウスとは旧知の仲だった。
line = "次期流星教皇──マリウスとは旧知の仲だった。"

[[dialogue]]
speaker = "unk"
# 彼は昨今の情勢を鑑み、表立って動けないような事件・騒動の後処理を決まって私に頼んできた。
line = "彼は昨今の情勢を鑑み、表立って動けないような事件・騒動の後処理を決まって私に頼んできた。"

[[dialogue]]
speaker = "unk"
# 流星の騎士の名を知る者はごく少数に限られた。
line = "流星の騎士の名を知る者はごく少数に限られた。"

[[dialogue]]
speaker = "unk"
# 私には地位も名声もなく、ただ西へ東へ駆けずり回った。
line = "私には地位も名声もなく、ただ西へ東へ駆けずり回った。"

[[dialogue]]
speaker = "unk"
# 私の旅路は、時に人間界をも飛び出した。
line = "私の旅路は、時に人間界をも飛び出した。"

[[dialogue]]
speaker = "マルキア"
# 「──変な人ね。わざわざ魔界まできて、身を<ruby=なげう>擲</ruby>ってくれるなんて」
line = "「──変な人ね。わざわざ魔界まできて、身を<ruby>擲<rt>なげう</rt></ruby>ってくれるなんて」"

[[dialogue]]
speaker = "unk"
# 魔界の果てで妻と出会った。
line = "魔界の果てで妻と出会った。"

[[dialogue]]
speaker = "unk"
# 当時、その地は過酷なリクリエの煽りを受けて、破滅の郷と化していた。
line = "当時、その地は過酷なリクリエの煽りを受けて、破滅の郷と化していた。"

[[dialogue]]
speaker = "unk"
# 彼女──マルキアはそこで『戦姫』と称され、日夜終わりなきモンスター達との闘争を続けていた。
line = "彼女──マルキアはそこで『戦姫』と称され、日夜終わりなきモンスター達との闘争を続けていた。"

[[dialogue]]
speaker = "unk"
# そうすることでしか村や家族を守れなかったのだという。
line = "そうすることでしか村や家族を守れなかったのだという。"

[[dialogue]]
speaker = "セイファート"
# 「力は大切だ。私もずっと、あまねく総てを守れる力を渇望している」
line = "「力は大切だ。私もずっと、あまねく総てを守れる力を渇望している」"

[[dialogue]]
speaker = "セイファート"
# 「だが……常に己一人を頼る必要は、どこにもない」
line = "「だが……常に己一人を頼る必要は、どこにもない」"

[[dialogue]]
speaker = "セイファート"
# 「あなたが鬼神なら、私は奇人でよい。共にこの終わりなき闘争を終わらせよう」
line = "「あなたが鬼神なら、私は奇人でよい。共にこの終わりなき闘争を終わらせよう」"

[[dialogue]]
speaker = "unk"
# 私たちは互いの力を合わせ、<ruby=わざわ>禍</ruby>いの根を断つことに成功した。
line = "私たちは互いの力を合わせ、<ruby>禍<rt>わざわ</rt></ruby>いの根を断つことに成功した。"

[[dialogue]]
speaker = "unk"
# 私たちは運命的に恋に落ち、やがて流星市国へと帰って穏やかな日々を過ごすこととなった。
line = "私たちは運命的に恋に落ち、やがて流星市国へと帰って穏やかな日々を過ごすこととなった。"

[[dialogue]]
speaker = "マルキア"
# 「いい子ね、アニュラス──しっかりパパを見習うのよ」
line = "「いい子ね、アニュラス──しっかりパパを見習うのよ」"

[[dialogue]]
speaker = "unk"
# そして娘が生まれた。
line = "そして娘が生まれた。"

[[dialogue]]
speaker = "unk"
# 後にして思えば、あれこそ幸福というものだったのだろう。
line = "後にして思えば、あれこそ幸福というものだったのだろう。"

[[dialogue]]
speaker = "unk"
# なにせ私はその後の人生において、かの一瞬の輝きを永劫追い求めることになるのだから。
line = "なにせ私はその後の人生において、かの一瞬の輝きを永劫追い求めることになるのだから。"

[[dialogue]]
speaker = "流星教皇"
# 「……マルキア殿が失踪した？」
line = "「……マルキア殿が失踪した？」"

[[dialogue]]
speaker = "unk"
# ある日。妻が原因不明の失踪を遂げた。
line = "ある日。妻が原因不明の失踪を遂げた。"

[[dialogue]]
speaker = "unk"
# 私が国外のアステラ駆除へ出ている間の、ほんの数時間の出来事だった。
line = "私が国外のアステラ駆除へ出ている間の、ほんの数時間の出来事だった。"
