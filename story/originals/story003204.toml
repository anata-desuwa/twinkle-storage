[[dialogue]]
speaker = "unk"
# 教皇庁主催のバレンタインイベント開催まであと数日……
line = "教皇庁主催のバレンタインイベント開催まであと数日……"

[[dialogue]]
speaker = "シャロン"
# 「ウルスラさまのヘルプはとっても有難いですけど、３人がかりでも厳しくないですかーっ？」
line = "「ウルスラさまのヘルプはとっても有難いですけど、３人がかりでも厳しくないですかーっ？」"

[[dialogue]]
speaker = "ウルスラ"
# 「う～ん、今のペースだとギリギリですね。できればあと２、３人、お手伝いしてくださる方が欲しいところです」
line = "「う～ん、今のペースだとギリギリですね。できればあと２、３人、お手伝いしてくださる方が欲しいところです」"

[[dialogue]]
speaker = "イレーナ"
# 「頼れる味方を連れてくると会長さんがおっしゃっていましたけど……遅いですね。大丈夫でしょうか」
line = "「頼れる味方を連れてくると会長さんがおっしゃっていましたけど……遅いですね。大丈夫でしょうか」"

[[dialogue]]
speaker = "unk"
# チョコレート三銃士を連れてきたよ
line = "チョコレート三銃士を連れてきたよ"

[[dialogue]]
speaker = "シャロン"
# 「チョコレート三銃士ですか！？」
line = "「チョコレート三銃士ですか！？」"

[[dialogue]]
speaker = "ウズメイア"
# 「ウズメイア、バレンタイン仕様ー♪　会長くんの頼みなら断るわけにはいかないよねー。うちにも手伝わせろしー♪」
line = "「ウズメイア、バレンタイン仕様ー♪　会長くんの頼みなら断るわけにはいかないよねー。うちにも手伝わせろしー♪」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「美味しさを決定づけるのは、気高く広がるフレーバー。香りの魔術師シャルレーヌです♪」
line = "「美味しさを決定づけるのは、気高く広がるフレーバー。香りの魔術師シャルレーヌです♪」"

[[dialogue]]
speaker = "せつな"
# 「呼ばれて飛び出てバレンタイン忍者、せつな推参！　チョコゴーレムなら任せるでござる！」
line = "「呼ばれて飛び出てバレンタイン忍者、せつな推参！　チョコゴーレムなら任せるでござる！」"

[[dialogue]]
speaker = "イレーナ"
# （いやいや、チョコゴーレムは明らかに人選ミスでしょ！　トラブルの予感しかしないわよ！）
line = "（いやいや、チョコゴーレムは明らかに人選ミスでしょ！　トラブルの予感しかしないわよ！）"

[[dialogue]]
speaker = "unk"
# こうしてチョコ作りの経験がある生徒たちもヘルプに呼びつつ──
line = "こうしてチョコ作りの経験がある生徒たちもヘルプに呼びつつ──"

[[dialogue]]
speaker = "ウズメイア"
# 「急がなきゃいけないのはわかるけど、ラブも入れなきゃダメっしょ。美味しくな～れ、美味しくな～れ、ラブラブキュン<emoji=heart04>」
line = "「急がなきゃいけないのはわかるけど、ラブも入れなきゃダメっしょ。美味しくな～れ、美味しくな～れ、ラブラブキュン<emoji=heart04>」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「一口頬張っただけで、お口の中で甘～い恋の香りが弾けるんです。はい、会長さん、あ～ん<emoji=heart04>」
line = "「一口頬張っただけで、お口の中で甘～い恋の香りが弾けるんです。はい、会長さん、あ～ん<emoji=heart04>」"

[[dialogue]]
speaker = "せつな"
# 「さぁ<ruby=い>出</ruby>でよ！　愛の結晶、チョコゴーレムっ！」
line = "「さぁ<ruby>出<rt>い</rt></ruby>でよ！　愛の結晶、チョコゴーレムっ！」"

[[dialogue]]
speaker = "シャロン"
# 「<ruby=い>出</ruby>でさせちゃダメですよーっ！　みんなでやっつけましょうっ！」
line = "「<ruby>出<rt>い</rt></ruby>でさせちゃダメですよーっ！　みんなでやっつけましょうっ！」"

[[dialogue]]
speaker = "ウルスラ"
# 「はい、<ruby=バラ>解体</ruby>して溶かして固めて配ります」
line = "「はい、<ruby>解体<rt>バラ</rt></ruby>して溶かして固めて配ります」"

[[dialogue]]
speaker = "unk"
# そんなこんなありつつも、無事（？）イベント当日までに必要な数を完成させたのだった。
line = "そんなこんなありつつも、無事（？）イベント当日までに必要な数を完成させたのだった。"

[[dialogue]]
speaker = "unk"
# そして教皇庁によるバレンタインイベント開催日。
line = "そして教皇庁によるバレンタインイベント開催日。"

[[dialogue]]
speaker = "unk"
# 大聖堂には、開始時間前から大混雑必至の行列ができていた。
line = "大聖堂には、開始時間前から大混雑必至の行列ができていた。"

[[dialogue]]
speaker = "せつな"
# 「最前列は３日前から並んでいたそうでござるよ！」
line = "「最前列は３日前から並んでいたそうでござるよ！」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「それはもはや不審者では？」
line = "「それはもはや不審者では？」"

[[dialogue]]
speaker = "ウルスラ"
# 「イレーナさんの熱狂的ファン、ですかね」
line = "「イレーナさんの熱狂的ファン、ですかね」"

[[dialogue]]
speaker = "イレーナ"
# 「私のファン……ですか？」
line = "「私のファン……ですか？」"

[[dialogue]]
speaker = "ウズメイア"
# 「こんなにおっきなイベントするのって初めてなんでしょ？　憧れの聖女様からの手渡しで、手作りチョコがもらえるってのが話題になってるみたい～」
line = "「こんなにおっきなイベントするのって初めてなんでしょ？　憧れの聖女様からの手渡しで、手作りチョコがもらえるってのが話題になってるみたい～」"

[[dialogue]]
speaker = "ウルスラ"
# 「想定以上の盛り上がりです。個数制限や転売防止策も取り入れないといけませんね」
line = "「想定以上の盛り上がりです。個数制限や転売防止策も取り入れないといけませんね」"

[[dialogue]]
speaker = "イレーナ"
# 「まあまあ、それはそれは……」
line = "「まあまあ、それはそれは……」"

[[dialogue]]
speaker = "イレーナ"
# （はぁ……アイドルのイベントじゃないんだから……。でも人が集まるのはきっと教皇庁の思惑通りなのよね……ちょっとムカつくわ）
line = "（はぁ……アイドルのイベントじゃないんだから……。でも人が集まるのはきっと教皇庁の思惑通りなのよね……ちょっとムカつくわ）"

[[dialogue]]
speaker = "シャルレーヌ"
# 「じーっ……」
line = "「じーっ……」"

[[dialogue]]
speaker = "イレーナ"
# 「……あら、シャルレーヌさん？　どうかなさいました？」
line = "「……あら、シャルレーヌさん？　どうかなさいました？」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「いえ、なんとなく、なんですけどぉ……イレーナ先輩から、私と似たような匂いを感じたもので」
line = "「いえ、なんとなく、なんですけどぉ……イレーナ先輩から、私と似たような匂いを感じたもので」"

[[dialogue]]
speaker = "イレーナ"
# 「似たような、匂い……ですか？」
line = "「似たような、匂い……ですか？」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「あっ！　清廉な聖女様と私が似ているだなんて、そんなはずないですよね。不快に感じちゃったらすみません」
line = "「あっ！　清廉な聖女様と私が似ているだなんて、そんなはずないですよね。不快に感じちゃったらすみません」"

[[dialogue]]
speaker = "イレーナ"
# 「いえいえ、シャルレーヌさんのような可愛らしい方と似ているだなんて言われて、不快に思うはずもありません」
line = "「いえいえ、シャルレーヌさんのような可愛らしい方と似ているだなんて言われて、不快に思うはずもありません」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「うふふ<emoji=heart04>　イレーナ先輩のようなお美しい方にそう言ってもらえるなんて、とっても嬉しいですぅ<emoji=heart04>」
line = "「うふふ<emoji=heart04>　イレーナ先輩のようなお美しい方にそう言ってもらえるなんて、とっても嬉しいですぅ<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
# （この子、どんな匂いを感じ取ったのかしら……？　もしかして、エセ聖女だってバレてる……！？　まさか……ね……？）
line = "（この子、どんな匂いを感じ取ったのかしら……？　もしかして、エセ聖女だってバレてる……！？　まさか……ね……？）"

[[dialogue]]
speaker = "イレーナ"
# 「さ、そろそろ始まる時間ですよ。惜しみなく愛を込めて、皆さんに笑顔でお配りしましょうね」
line = "「さ、そろそろ始まる時間ですよ。惜しみなく愛を込めて、皆さんに笑顔でお配りしましょうね」"

[[dialogue]]
speaker = "ウズメイア"
# 「イレーナさんが大人気な理由、そういうとこだし☆」
line = "「イレーナさんが大人気な理由、そういうとこだし☆」"

[[dialogue]]
speaker = "せつな"
# 「そういうとこでござるなぁ。聖女ってなんだかえっちな響きでござるよなぁ」
line = "「そういうとこでござるなぁ。聖女ってなんだかえっちな響きでござるよなぁ」"

[[dialogue]]
speaker = "イレーナ"
# 「えっち……？」
line = "「えっち……？」"

[[dialogue]]
speaker = "unk"
# それからチョコの配布が始まって……
line = "それからチョコの配布が始まって……"

[[dialogue]]
speaker = "イレーナ"
# 「どうぞ。愛しき人と安らぎの時間を過ごせますように」
line = "「どうぞ。愛しき人と安らぎの時間を過ごせますように」"

[[dialogue]]
speaker = "シャロン"
# 「愛を込めたハートのチョコクッキーです<emoji=heart04>」
line = "「愛を込めたハートのチョコクッキーです<emoji=heart04>」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「辛くないので、お子様も安心ですよー<emoji=heart04>」
line = "「辛くないので、お子様も安心ですよー<emoji=heart04>」"

[[dialogue]]
speaker = "せつな"
# 「チョコゴーレムにもならないでござるよー<emoji=heart04>」
line = "「チョコゴーレムにもならないでござるよー<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
# （かつての反省を踏まえてるんだろうけど、余計な情報を付与されると、かえって不安になるわね……）
line = "（かつての反省を踏まえてるんだろうけど、余計な情報を付与されると、かえって不安になるわね……）"

[[dialogue]]
speaker = "ウルスラ"
# 「大好評ですね。特にイレーナさんがお渡ししたチョコレートは、聖女様からの手渡しにご利益がありそうだと」
line = "「大好評ですね。特にイレーナさんがお渡ししたチョコレートは、聖女様からの手渡しにご利益がありそうだと」"

[[dialogue]]
speaker = "老信者"
# 「聖女様が手ずからお作りになられたチョコレートだなんてのう。食べたら大層なご利益がありそうじゃ」
line = "「聖女様が手ずからお作りになられたチョコレートだなんてのう。食べたら大層なご利益がありそうじゃ」"

[[dialogue]]
speaker = "男性信者"
# 「ありがたや、ありがたや。女神像に奉納し、毎朝祈らせていただきます」
line = "「ありがたや、ありがたや。女神像に奉納し、毎朝祈らせていただきます」"

[[dialogue]]
speaker = "イレーナ"
# 「女神様は貴重な食物を無駄にするのを厭われます。ちゃんと賞味期限までに召し上がってくださいね」
line = "「女神様は貴重な食物を無駄にするのを厭われます。ちゃんと賞味期限までに召し上がってくださいね」"

[[dialogue]]
speaker = "男性信者"
# 「はい、もったいないですけど、きちんと食べます！」
line = "「はい、もったいないですけど、きちんと食べます！」"

[[dialogue]]
speaker = "シャロン"
# 「ふふ、さすがはイレーナさまです」
line = "「ふふ、さすがはイレーナさまです」"

[[dialogue]]
speaker = "イレーナ"
# （上に命じられて仕方なく、苦い顔しながら作ってたとは、口が裂けても言えないわね……）
line = "（上に命じられて仕方なく、苦い顔しながら作ってたとは、口が裂けても言えないわね……）"

[[dialogue]]
speaker = "イレーナ"
# 「ハッピーバレンタイン。美味しく召し上がってくださいね」
line = "「ハッピーバレンタイン。美味しく召し上がってくださいね」"

[[dialogue]]
speaker = "unk"
# イレーナが最後の１人にお菓子を手渡し、イベントは終了を迎えた。
line = "イレーナが最後の１人にお菓子を手渡し、イベントは終了を迎えた。"

[[dialogue]]
speaker = "ウルスラ"
# 「これで用意した１０００人分、全て配り終えました。皆さん、大変喜ばれていましたね」
line = "「これで用意した１０００人分、全て配り終えました。皆さん、大変喜ばれていましたね」"

[[dialogue]]
speaker = "シャロン"
# 「イベントは大成功ですねっ！　みなさま満足そうにされていて、私たちも幸せな気分になれました」
line = "「イベントは大成功ですねっ！　みなさま満足そうにされていて、私たちも幸せな気分になれました」"

[[dialogue]]
speaker = "イレーナ"
# 「ええ、信徒の皆様にも喜んでいただけて良かったです。安らかな時間を過ごせるよう祈りましょう」
line = "「ええ、信徒の皆様にも喜んでいただけて良かったです。安らかな時間を過ごせるよう祈りましょう」"

[[dialogue]]
speaker = "シャロン"
# 「ウルスラさまのおっしゃってたバレンタインの波動？　も、とても高まったんじゃないですか？」
line = "「ウルスラさまのおっしゃってたバレンタインの波動？　も、とても高まったんじゃないですか？」"

[[dialogue]]
speaker = "ウルスラ"
# 「はい、非常に昂って……いえ、高まっています。ちょっと触れられただけで溢れてしまいそうなくらい……<emoji=heart04>」
line = "「はい、非常に昂って……いえ、高まっています。ちょっと触れられただけで溢れてしまいそうなくらい……<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
# （教皇庁が思いつきで始めたんじゃないかと思ってたけど……結果的には大成功だったわね）
line = "（教皇庁が思いつきで始めたんじゃないかと思ってたけど……結果的には大成功だったわね）"

[[dialogue]]
speaker = "イレーナ"
# （でもいつも以上に取り繕ってたから、心身ともにバテバテよ……こんなイベント、今回限りにして欲しいわ……）
line = "（でもいつも以上に取り繕ってたから、心身ともにバテバテよ……こんなイベント、今回限りにして欲しいわ……）"

[[dialogue]]
speaker = "ウルスラ"
# 「あら、バレンタインの波動に乱れが──イレーナさん、息抜きにはまだ早いようですよ」
line = "「あら、バレンタインの波動に乱れが──イレーナさん、息抜きにはまだ早いようですよ」"

[[dialogue]]
speaker = "イレーナ"
# 「えっ……！？」
line = "「えっ……！？」"

[[dialogue]]
speaker = "unk"
# モンスターの反応だ！
line = "モンスターの反応だ！"

[[dialogue]]
speaker = "せつな"
# 「このタイミングでござるかーっ？」
line = "「このタイミングでござるかーっ？」"

[[dialogue]]
speaker = "ウズメイア"
# 「そこは空気読んでほしいしー」
line = "「そこは空気読んでほしいしー」"

[[dialogue]]
speaker = "unk"
# みんな、力を貸してくれ！
line = "みんな、力を貸してくれ！"

[[dialogue]]
speaker = "シャロン"
# 「もちろん、了解ですっ！　幸せなバレンタインをめちゃくちゃになんてさせませんよっ！」
line = "「もちろん、了解ですっ！　幸せなバレンタインをめちゃくちゃになんてさせませんよっ！」"

[[dialogue]]
speaker = "ウズメイア"
# 「バレンタインフォームが戦えるショコラティエってとこ、見せてあげるし！」
line = "「バレンタインフォームが戦えるショコラティエってとこ、見せてあげるし！」"

[[dialogue]]
speaker = "ウルスラ"
# 「まあ、なんて頼もしい。皆さんのお手並み、拝見させていただきますね<emoji=heart04>」
line = "「まあ、なんて頼もしい。皆さんのお手並み、拝見させていただきますね<emoji=heart04>」"
