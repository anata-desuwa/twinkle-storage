[[dialogue]]
speaker = "unk"
# 第３話,ご褒美バニー撮影会,P
line = "第３話,ご褒美バニー撮影会,P"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「緋宮会長……今、なんと言いまして？」
line = "「緋宮会長……今、なんと言いまして？」"

[[dialogue]]
speaker = "unk"
# テストでいい点を取りました
line = "テストでいい点を取りました"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ええ、そのようですわね。忙しい会長業の傍ら、トップクラスの成績をたたき出した……本当にお見事です。恋人として誇らしいですわ」
line = "「ええ、そのようですわね。忙しい会長業の傍ら、トップクラスの成績をたたき出した……本当にお見事です。恋人として誇らしいですわ」"

[[dialogue]]
speaker = "unk"
# ご褒美をくれる約束でしたよね
line = "ご褒美をくれる約束でしたよね"

[[dialogue]]
speaker = "unk"
# いい点をとったら
line = "いい点をとったら"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ええ、そうですわね。会長の励みになるならと、そのような提案をしておりました。遠慮や隠し事はしない、が私たちのルールですし」
line = "「ええ、そうですわね。会長の励みになるならと、そのような提案をしておりました。遠慮や隠し事はしない、が私たちのルールですし」"

[[dialogue]]
speaker = "unk"
# だから先輩のバニー姿を見せて！
line = "だから先輩のバニー姿を見せて！"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「明らかにラインを超えているのではなくて！？　というか、アステラカジノで散々に見たでしょう！？」
line = "「明らかにラインを超えているのではなくて！？　というか、アステラカジノで散々に見たでしょう！？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「あの時はロストアイテムとの戦いで、それどころじゃなかったって……」
line = "「あの時はロストアイテムとの戦いで、それどころじゃなかったって……」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「うぅ……そんな真剣な目を……し、仕方ありませんわね！」
line = "「うぅ……そんな真剣な目を……し、仕方ありませんわね！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「こ、これでよろしいですの……！？」
line = "「こ、これでよろしいですの……！？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「まったくもう……お付き合いを始めて仲良くなってから、エッチなおねだりが増えている気がいたしますわよ、会長？」
line = "「まったくもう……お付き合いを始めて仲良くなってから、エッチなおねだりが増えている気がいたしますわよ、会長？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「って、あっ……もう<emoji=heart04>　言ってるそばからキスのおねだりですの……？」
line = "「って、あっ……もう<emoji=heart04>　言ってるそばからキスのおねだりですの……？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「んっ……ちゅっ<emoji=heart04>　んちゅ……ちゅっ<emoji=heart04>」
line = "「んっ……ちゅっ<emoji=heart04>　んちゅ……ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ふぁ……<emoji=heart04>　会長とキスするの、ドキドキいたしますわ……こ、こんなハレンチな格好でするのも初めてですし……」
line = "「ふぁ……<emoji=heart04>　会長とキスするの、ドキドキいたしますわ……こ、こんなハレンチな格好でするのも初めてですし……」"

[[dialogue]]
speaker = "unk"
# わがままを聞いてくれて
line = "わがままを聞いてくれて"

[[dialogue]]
speaker = "unk"
# ありがとう、先輩
line = "ありがとう、先輩"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「そ、そりゃあ……あれだけのハードトレーニングをしながら、成績まで上げたのですから。少しくらいはおねだりも聞いて差し上げますわよ」
line = "「そ、そりゃあ……あれだけのハードトレーニングをしながら、成績まで上げたのですから。少しくらいはおねだりも聞いて差し上げますわよ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「で、でも。もうよろしいでしょう！？　変身、解除しますからね？」
line = "「で、でも。もうよろしいでしょう！？　変身、解除しますからね？」"

[[dialogue]]
speaker = "unk"
# 写真も撮らせてほしいです
line = "写真も撮らせてほしいです"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ですわぁ！？　だ、ダメに決まっています！　えっ──待ち受けにしたいんですの！？　無理無理、無理ですわっ！」
line = "「ですわぁ！？　だ、ダメに決まっています！　えっ──待ち受けにしたいんですの！？　無理無理、無理ですわっ！」"

[[dialogue]]
speaker = "unk"
# お願いですから！　写真をください！
line = "お願いですから！　写真をください！"

[[dialogue]]
speaker = "unk"
# 先輩、可愛い！　最高に可愛い！
line = "先輩、可愛い！　最高に可愛い！"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「う、ぅうぅっ……そ、そこまで食い下がられては……す、少しだけですわよ……？」
line = "「う、ぅうぅっ……そ、そこまで食い下がられては……す、少しだけですわよ……？」"

[[dialogue]]
speaker = "unk"
# 先輩は厳しい人だけど、真っすぐお願いすると実は大抵のことは聞いてくれる。成績を上げて本当によかった。
line = "先輩は厳しい人だけど、真っすぐお願いすると実は大抵のことは聞いてくれる。成績を上げて本当によかった。"

[[dialogue]]
speaker = "unk"
# 許しを得たのをいいことに、俺は恋人の可愛いバニー姿をＤＩＳＣにしっかり収めていったのだが──
line = "許しを得たのをいいことに、俺は恋人の可愛いバニー姿をＤＩＳＣにしっかり収めていったのだが──"

[[dialogue]]
speaker = "リノ"
# 「ただいま～♪　予定より早くお買い物が終わっちゃった──」
line = "「ただいま～♪　予定より早くお買い物が終わっちゃった──」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ですわぁ！？」
line = "「ですわぁ！？」"

[[dialogue]]
speaker = "リノ"
# 「お──お邪魔しました～……♪」
line = "「お──お邪魔しました～……♪」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ままま、待ってください！　リノお母様～！？」
line = "「ままま、待ってください！　リノお母様～！？」"

[[dialogue]]
speaker = "unk"
# バニー姿の先輩を激写していたところを、母さんに見つかってしまうのだった……
line = "バニー姿の先輩を激写していたところを、母さんに見つかってしまうのだった……"

[[dialogue]]
speaker = "unk"
# それからしばらく経ったある日。
line = "それからしばらく経ったある日。"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「今月の学園対抗杯……めでたく流星が勝利いたしましたわ！」
line = "「今月の学園対抗杯……めでたく流星が勝利いたしましたわ！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「フフ……マム率いる新星学園に勝利できたら、何でも１つお願いを聞いてもらう約束をしておりましたわよね？」
line = "「フフ……マム率いる新星学園に勝利できたら、何でも１つお願いを聞いてもらう約束をしておりましたわよね？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「会長には今までお伝えするのを忘れていたのですが……私、実は細マッチョの男性が好みですの」
line = "「会長には今までお伝えするのを忘れていたのですが……私、実は細マッチョの男性が好みですの」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「特に会長みたいな、シュッと締まって線は細く、けれど筋肉質なボディーにメロメロですの！　そこで……お願いがありますわ！」
line = "「特に会長みたいな、シュッと締まって線は細く、けれど筋肉質なボディーにメロメロですの！　そこで……お願いがありますわ！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「──シャツを脱いで筋肉をお見せなさい！！」
line = "「──シャツを脱いで筋肉をお見せなさい！！」"

[[dialogue]]
speaker = "unk"
# ライン超えてませんか！？
line = "ライン超えてませんか！？"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「いいえ！　私だってバニー衣装で散々辱められましたわ！　あの日の意趣返しも含んでおりましてよ！！」
line = "「いいえ！　私だってバニー衣装で散々辱められましたわ！　あの日の意趣返しも含んでおりましてよ！！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「さぁ脱ぐのですわ！　上腕二頭筋と腹筋と背筋──その他もろもろ、たっぷり堪能させていただきますわよ！」
line = "「さぁ脱ぐのですわ！　上腕二頭筋と腹筋と背筋──その他もろもろ、たっぷり堪能させていただきますわよ！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「もちろん写真撮影もいたしますから、覚悟なさい！」
line = "「もちろん写真撮影もいたしますから、覚悟なさい！」"

[[dialogue]]
speaker = "unk"
# わーっ！　ちょっと待って先輩！？
line = "わーっ！　ちょっと待って先輩！？"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「お～っほっほっほ！　会長のステキな写真がどんどん増えていきますわー！」
line = "「お～っほっほっほ！　会長のステキな写真がどんどん増えていきますわー！」"

[[dialogue]]
speaker = "リノ"
# 「き、気づいてないわね～２人とも……お母さん、実はちょっと前から帰ってきてるんだけど～……」
line = "「き、気づいてないわね～２人とも……お母さん、実はちょっと前から帰ってきてるんだけど～……」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「いいですわ！　そこでぐっと力をこめて！　キープですわ！　──あッ<emoji=heart04>　すごくイイ！　最高ですわ～！」
line = "「いいですわ！　そこでぐっと力をこめて！　キープですわ！　──あッ<emoji=heart04>　すごくイイ！　最高ですわ～！」"

[[dialogue]]
speaker = "リノ"
# 「だ、大丈夫なのかしら……うちの息子のカップル……」
line = "「だ、大丈夫なのかしら……うちの息子のカップル……」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「素敵でしてよ、緋宮会長！　おーっほっほっほ！」
line = "「素敵でしてよ、緋宮会長！　おーっほっほっほ！」"

[[dialogue]]
speaker = "リノ"
# 「ま、まあ～……仲がいいのは、いいことよね……？」
line = "「ま、まあ～……仲がいいのは、いいことよね……？」"
