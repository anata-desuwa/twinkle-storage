[[dialogue]]
speaker = "unk"
# 第４話,ヒメと浅草街歩き,P
line = "第４話,ヒメと浅草街歩き,P"

[[dialogue]]
speaker = "unk"
# 今日は落語を見に行きたいというヒメの付き添いで、浅草にやってきた。
line = "今日は落語を見に行きたいというヒメの付き添いで、浅草にやってきた。"

[[dialogue]]
speaker = "unk"
# 門の辺りで待ち合わせをしていたのだが──
line = "門の辺りで待ち合わせをしていたのだが──"

[[dialogue]]
speaker = "オオヒメ"
# 「ふたりきりで出かけるなどまるで逢瀬……今風に言うとデートではないか？　いやいやいや、魔王はただの親切心で付いてきてくれるだけだ。勘違いするな」
line = "「ふたりきりで出かけるなどまるで逢瀬……今風に言うとデートではないか？　いやいやいや、魔王はただの親切心で付いてきてくれるだけだ。勘違いするな」"

[[dialogue]]
speaker = "オオヒメ"
# 「そうだ、服は乱れていないだろうか？　髪に寝ぐせは付いていないだろうか？　みすぼらしい姿を魔王に見られたら、生きていけない──」
line = "「そうだ、服は乱れていないだろうか？　髪に寝ぐせは付いていないだろうか？　みすぼらしい姿を魔王に見られたら、生きていけない──」"

[[dialogue]]
speaker = "unk"
# ヒメ、待った？
line = "ヒメ、待った？"

[[dialogue]]
speaker = "オオヒメ"
# 「ひぅっ！？　……す、すまない、変な声を上げてしまった」
line = "「ひぅっ！？　……す、すまない、変な声を上げてしまった」"

[[dialogue]]
speaker = "オオヒメ"
# 「私もさっき来たところだ。大丈夫、３０分前に到着しようとして早めに出たら、１時間前に着いたなどということはない」
line = "「私もさっき来たところだ。大丈夫、３０分前に到着しようとして早めに出たら、１時間前に着いたなどということはない」"

[[dialogue]]
speaker = "unk"
# そんなに早く来たんだ
line = "そんなに早く来たんだ"

[[dialogue]]
speaker = "オオヒメ"
# 「うっ……！？　いやだって、あなたを待たせるのは申し訳ないし、楽しみで待ち切れなくて──」
line = "「うっ……！？　いやだって、あなたを待たせるのは申し訳ないし、楽しみで待ち切れなくて──」"

[[dialogue]]
speaker = "オオヒメ"
# 「コホン。魔王だって待ち合わせより早く来ただろう。約束の１０分前だ。<ruby=よせ>寄席</ruby>が始まる時間にはまだ早い」
line = "「コホン。魔王だって待ち合わせより早く来ただろう。約束の１０分前だ。<ruby>寄席<rt>よせ</rt></ruby>が始まる時間にはまだ早い」"

[[dialogue]]
speaker = "オオヒメ"
# 「……その分、周りを歩きたい？　そ、それはいいかもしれないな」
line = "「……その分、周りを歩きたい？　そ、それはいいかもしれないな」"

[[dialogue]]
speaker = "オオヒメ"
# 「ひゃっ！？　散歩するのはいいが、ち、近くないか……？」
line = "「ひゃっ！？　散歩するのはいいが、ち、近くないか……？」"

[[dialogue]]
speaker = "オオヒメ"
# 「……一緒に歩くならこのくらいは普通？　そ、そうか……なら仕方ないか」
line = "「……一緒に歩くならこのくらいは普通？　そ、そうか……なら仕方ないか」"

[[dialogue]]
speaker = "オオヒメ"
# （落ち着け……落ち着け……これはデートではない、デートではない……）
line = "（落ち着け……落ち着け……これはデートではない、デートではない……）"

[[dialogue]]
speaker = "オオヒメ"
# （守護天使ともあろう者が、人の子相手に何を心乱されている。リクリエはまだ終わっていないというのに、浮かれている場合では……）
line = "（守護天使ともあろう者が、人の子相手に何を心乱されている。リクリエはまだ終わっていないというのに、浮かれている場合では……）"

[[dialogue]]
speaker = "オオヒメ"
# （！？　待て、私は浮かれているのか？　彼との逢瀬を楽しんでいる……？）
line = "（！？　待て、私は浮かれているのか？　彼との逢瀬を楽しんでいる……？）"

[[dialogue]]
speaker = "unk"
# ヒメはこの門は見た？
line = "ヒメはこの門は見た？"

[[dialogue]]
speaker = "オオヒメ"
# 「ひやんっ！？　すまない、また妙な声を上げてしまった……」
line = "「ひやんっ！？　すまない、また妙な声を上げてしまった……」"

[[dialogue]]
speaker = "オオヒメ"
# 「ああ、門なら待っている間に見させてもらった」
line = "「ああ、門なら待っている間に見させてもらった」"

[[dialogue]]
speaker = "オオヒメ"
# 「構えは壮観で、見る者を圧倒する。それでいて浅草の日常に溶け込んでおり、まるでこの地の人々を見守っているかのようだ」
line = "「構えは壮観で、見る者を圧倒する。それでいて浅草の日常に溶け込んでおり、まるでこの地の人々を見守っているかのようだ」"

[[dialogue]]
speaker = "オオヒメ"
# 「そして阿吽の風神・雷神像の迫力たるや。まさしく嵐のごとき荒ましさ。風雨を操る私もここまでは──」
line = "「そして阿吽の風神・雷神像の迫力たるや。まさしく嵐のごとき荒ましさ。風雨を操る私もここまでは──」"

[[dialogue]]
speaker = "オオヒメ"
# 「……すまない。つい熱く語ってしまった」
line = "「……すまない。つい熱く語ってしまった」"

[[dialogue]]
speaker = "unk"
# 大丈夫、気にしてないよ
line = "大丈夫、気にしてないよ"

[[dialogue]]
speaker = "オオヒメ"
# 「そ、そうか……ならよいのだが」
line = "「そ、そうか……ならよいのだが」"

[[dialogue]]
speaker = "オオヒメ"
# （語っている私を、魔王はむしろ楽しそうに見ているような……ありがたいが、気恥ずかしい……）
line = "（語っている私を、魔王はむしろ楽しそうに見ているような……ありがたいが、気恥ずかしい……）"

[[dialogue]]
speaker = "オオヒメ"
# 「……む。そろそろ寄席の時間か。席が埋まる前に行かねば」
line = "「……む。そろそろ寄席の時間か。席が埋まる前に行かねば」"

[[dialogue]]
speaker = "オオヒメ"
# 「ん？　どうして私は芸が好きなのか……か。永い時を生きてきたが、その理由を問われたのは初めてか」
line = "「ん？　どうして私は芸が好きなのか……か。永い時を生きてきたが、その理由を問われたのは初めてか」"

[[dialogue]]
speaker = "オオヒメ"
# 「美しいもの、優れたものに心惹かれるのに理由はいらない……とは思うが、特に言うなら、私にはないものだからかもしれない」
line = "「美しいもの、優れたものに心惹かれるのに理由はいらない……とは思うが、特に言うなら、私にはないものだからかもしれない」"

[[dialogue]]
speaker = "オオヒメ"
# 「もちろん努力は必要だが、芸には才能が不可欠だ。誰でもできるものは芸にはならない」
line = "「もちろん努力は必要だが、芸には才能が不可欠だ。誰でもできるものは芸にはならない」"

[[dialogue]]
speaker = "オオヒメ"
# 「そして才能は普遍とは反対にあるもの。だから憧れるのかもしれないな」
line = "「そして才能は普遍とは反対にあるもの。だから憧れるのかもしれないな」"

[[dialogue]]
speaker = "unk"
# 昼から夜まで、開演から閉幕まで２人でずっと興行を見ていた。
line = "昼から夜まで、開演から閉幕まで２人でずっと興行を見ていた。"

[[dialogue]]
speaker = "unk"
# まさにどっぷり落語漬けの一日だった。
line = "まさにどっぷり落語漬けの一日だった。"

[[dialogue]]
speaker = "オオヒメ"
# 「これが落語か。まさしく名人芸。時間も忘れて没頭していたよ」
line = "「これが落語か。まさしく名人芸。時間も忘れて没頭していたよ」"

[[dialogue]]
speaker = "オオヒメ"
# 「そこは高座であるにもかかわらず、江戸の町の情景が思い浮かぶ。古典だけでなく新作も愉快なものばかりだった」
line = "「そこは高座であるにもかかわらず、江戸の町の情景が思い浮かぶ。古典だけでなく新作も愉快なものばかりだった」"

[[dialogue]]
speaker = "オオヒメ"
# 「……そして愉快なばかりではなく、男女の情念を語った<ruby=はなし>噺</ruby>もあった。愛とはなんと儚いものよ」
line = "「……そして愉快なばかりではなく、男女の情念を語った<ruby>噺<rt>はなし</rt></ruby>もあった。愛とはなんと儚いものよ」"

[[dialogue]]
speaker = "オオヒメ"
# 「魔王には感謝する。あなたが付き添ってくれたおかげで本場の落語を堪能することができた」
line = "「魔王には感謝する。あなたが付き添ってくれたおかげで本場の落語を堪能することができた」"

[[dialogue]]
speaker = "オオヒメ"
# 「しかし思いのほか遅くなってしまったな。あまり一緒にいると逢瀬と間違われる。早く戻らねば──」
line = "「しかし思いのほか遅くなってしまったな。あまり一緒にいると逢瀬と間違われる。早く戻らねば──」"

[[dialogue]]
speaker = "unk"
# ちなみに俺はデートのつもりだったよ
line = "ちなみに俺はデートのつもりだったよ"

[[dialogue]]
speaker = "オオヒメ"
# 「んなっ！？」
line = "「んなっ！？」"

[[dialogue]]
speaker = "オオヒメ"
# 「まさか待ち合わせの時の……！？　聞こえていたのか！？　人が悪いぞ！？」
line = "「まさか待ち合わせの時の……！？　聞こえていたのか！？　人が悪いぞ！？」"

[[dialogue]]
speaker = "オオヒメ"
# 「だが、聞こえていたなら仕方ない。……それなら、その……デートなら手を繋ぐくらいはいいだろうか？」
line = "「だが、聞こえていたなら仕方ない。……それなら、その……デートなら手を繋ぐくらいはいいだろうか？」"

[[dialogue]]
speaker = "unk"
# もちろん
line = "もちろん"

[[dialogue]]
speaker = "オオヒメ"
# 「で、では失礼して……」
line = "「で、では失礼して……」"

[[dialogue]]
speaker = "オオヒメ"
# 「夜は冷えるが、手を繋ぐと温かいな……」
line = "「夜は冷えるが、手を繋ぐと温かいな……」"

[[dialogue]]
speaker = "オオヒメ"
# 「守護天使たる私が、こうして男性とともに歩き、手を繋ぐことになるとは思わなかった」
line = "「守護天使たる私が、こうして男性とともに歩き、手を繋ぐことになるとは思わなかった」"

[[dialogue]]
speaker = "オオヒメ"
# 「今は仮初の体だが、だからこそ、あなたと同じ時間を過ごすことができる」
line = "「今は仮初の体だが、だからこそ、あなたと同じ時間を過ごすことができる」"

[[dialogue]]
speaker = "オオヒメ"
# 「こういう気持ち抱くのは初めてだから、表現が正しいかわからないが……きっと私はあなたが好きだ」
line = "「こういう気持ち抱くのは初めてだから、表現が正しいかわからないが……きっと私はあなたが好きだ」"

[[dialogue]]
speaker = "オオヒメ"
# 「これからよろしく頼む。できれば末永く……な」
line = "「これからよろしく頼む。できれば末永く……な」"
