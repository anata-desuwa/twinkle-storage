[[dialogue]]
speaker = "unk"
# 第１０話,最後の魔王,B
line = "第１０話,最後の魔王,B"

[[dialogue]]
speaker = "アポロ"
# 「──おおおおおおっっ！！」
line = "「──おおおおおおっっ！！」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
# 「──はあああああァァァッ！！」
line = "「──はあああああァァァッ！！」"

[[dialogue]]
speaker = "unk"
# 激戦。肉薄。猛攻に継ぐ猛攻。
line = "激戦。肉薄。猛攻に継ぐ猛攻。"

[[dialogue]]
speaker = "unk"
# アポロの仮面はすでに幾度も破壊と再生を繰り返し、かつてない強度に達していた。それでも俺たちは食らいつく。
line = "アポロの仮面はすでに幾度も破壊と再生を繰り返し、かつてない強度に達していた。それでも俺たちは食らいつく。"

[[dialogue]]
speaker = "クロト"
# （この拮抗状態が続けば──）
line = "（この拮抗状態が続けば──）"

[[dialogue]]
speaker = "アナ"
# （ええ、こちらが先に破滅します──）
line = "（ええ、こちらが先に破滅します──）"

[[dialogue]]
speaker = "unk"
# 無限の強化再生を繰り返すアポロに真っ当な勝ち目はない。
line = "無限の強化再生を繰り返すアポロに真っ当な勝ち目はない。"

[[dialogue]]
speaker = "アポロ"
# 「──ぐっ……また……しつこい！」
line = "「──ぐっ……また……しつこい！」"

[[dialogue]]
speaker = "ルリエル"
# 「仮面が壊れました！　一時退却します──！」
line = "「仮面が壊れました！　一時退却します──！」"

[[dialogue]]
speaker = "unk"
# 幾度目かの仮面の崩壊を迎える。
line = "幾度目かの仮面の崩壊を迎える。"

[[dialogue]]
speaker = "unk"
# この時、アポロには再生するための莫大な瘴気が集中する。
line = "この時、アポロには再生するための莫大な瘴気が集中する。"

[[dialogue]]
speaker = "unk"
# この機に乗じて、俺たちも戦線を整える──というやり方でいつか大きな隙が生まれるのを待っていた。
line = "この機に乗じて、俺たちも戦線を整える──というやり方でいつか大きな隙が生まれるのを待っていた。"

[[dialogue]]
speaker = "unk"
# しかし。
line = "しかし。"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
# 「ごめんなさい、皆さん──ここで決めますっ！」
line = "「ごめんなさい、皆さん──ここで決めますっ！」"

[[dialogue]]
speaker = "ユウリ"
# 「！？　フィオナ──！？」
line = "「！？　フィオナ──！？」"

[[dialogue]]
speaker = "アナ"
# 「無謀です──それ以上近づいたらっ！」
line = "「無謀です──それ以上近づいたらっ！」"

[[dialogue]]
speaker = "unk"
# その、瘴気がアポロをより強く創り変えているまさに最中──フィオナはその身ひとつで飛び込んでいく！
line = "その、瘴気がアポロをより強く創り変えているまさに最中──フィオナはその身ひとつで飛び込んでいく！"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
# 「姉さんは……一瞬でも、正気に戻って──私へ呼びかけてくれました」
line = "「姉さんは……一瞬でも、正気に戻って──私へ呼びかけてくれました」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
# 「だから今度は……お返しです」
line = "「だから今度は……お返しです」"

[[dialogue]]
speaker = "アポロ"
# 「っ、何のつもりだ──ッ」
line = "「っ、何のつもりだ──ッ」"

[[dialogue]]
speaker = "unk"
# 破壊と再生の間隙。刹那だけでも、アポロの素顔があらわになる瞬間。
line = "破壊と再生の間隙。刹那だけでも、アポロの素顔があらわになる瞬間。"

[[dialogue]]
speaker = "unk"
# フィオナは、自身が大量の瘴気に包まれながらも──叫んだ。
line = "フィオナは、自身が大量の瘴気に包まれながらも──叫んだ。"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
# 「私を──私たちを──助けてください、姉さんっ！」
line = "「私を──私たちを──助けてください、姉さんっ！」"

[[dialogue]]
speaker = "アポロ"
# 「──！？」
line = "「──！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「今のって、もしかして──」
line = "「今のって、もしかして──」"

[[dialogue]]
speaker = "クロト"
# 「フィオナ──まさか──」
line = "「フィオナ──まさか──」"

[[dialogue]]
speaker = "unk"
# 戦っている最中の相手に助けを求める。本来ありえないはずの行為。
line = "戦っている最中の相手に助けを求める。本来ありえないはずの行為。"

[[dialogue]]
speaker = "unk"
# それは理外の──フィオナからアポロへと伝える、逆転のオーダーだった。
line = "それは理外の──フィオナからアポロへと伝える、逆転のオーダーだった。"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
# 「私たちはリクリエを退けて──世界を救う。それが、魔王だけじゃない、<ruby=スターナイト>星騎士</ruby>の定め」
line = "「私たちはリクリエを退けて──世界を救う。それが、魔王だけじゃない、<ruby>星騎士<rt>スターナイト</rt></ruby>の定め」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
# 「その運命に──あなたが必要なんです！　姉さんっ！」
line = "「その運命に──あなたが必要なんです！　姉さんっ！」"

[[dialogue]]
speaker = "アポロ"
# 「っ──あたしが……？」
line = "「っ──あたしが……？」"

[[dialogue]]
speaker = "unk"
# 虚をつかれたアポロの再生が停滞する。
line = "虚をつかれたアポロの再生が停滞する。"

[[dialogue]]
speaker = "unk"
# そして、妹の心からの叫びは、使徒なんかじゃない姉の心に突き刺さる。
line = "そして、妹の心からの叫びは、使徒なんかじゃない姉の心に突き刺さる。"

[[dialogue]]
speaker = "フィオナ"
# 『緋宮会長を目覚めさせたのは、ヴィーナスさんの切なる願いでした』
line = "『緋宮会長を目覚めさせたのは、ヴィーナスさんの切なる願いでした』"

[[dialogue]]
speaker = "フィオナ"
# 『なら私にとっての最後の鍵はきっと──姉さんなのだと思います』
line = "『なら私にとっての最後の鍵はきっと──姉さんなのだと思います』"

[[dialogue]]
speaker = "フィオナ"
# 『そして、もしかしたら……姉さんが、姉さんの殻を破れるなら、それはきっと……』
line = "『そして、もしかしたら……姉さんが、姉さんの殻を破れるなら、それはきっと……』"

[[dialogue]]
speaker = "アポロ"
# （あた──しは──あたしは、誰だ──）
line = "（あた──しは──あたしは、誰だ──）"

[[dialogue]]
speaker = "アポロ"
# （星見──フィオナ──リクリエの──使徒──流星──ライダー──）
line = "（星見──フィオナ──リクリエの──使徒──流星──ライダー──）"

[[dialogue]]
speaker = "アポロ"
# （エリシア──そうだ──あたしは、妹と、遊んで……でも……魔王になるために、修行しなくちゃ、いけなくて──）
line = "（エリシア──そうだ──あたしは、妹と、遊んで……でも……魔王になるために、修行しなくちゃ、いけなくて──）"

[[dialogue]]
speaker = "アポロ"
# （なら、あたしは──何者だ──本当にやりたいことって、なんだ……？）
line = "（なら、あたしは──何者だ──本当にやりたいことって、なんだ……？）"

[[dialogue]]
speaker = "unk"
# 宇宙を壊せ。創り変えろ。パーフェクト・ワールドへ至るんだって。
line = "宇宙を壊せ。創り変えろ。パーフェクト・ワールドへ至るんだって。"

[[dialogue]]
speaker = "unk"
# でも──でも──
line = "でも──でも──"

[[dialogue]]
speaker = "アポロ"
# （他の誰でもない──<ruby=エリシア>妹</ruby>があたしを──呼んでるっ！）
line = "（他の誰でもない──<ruby>妹<rt>エリシア</rt></ruby>があたしを──呼んでるっ！）"

[[dialogue]]
speaker = "アポロ"
# 「あああっ……あああああああああああああ──────っっ！！！」
line = "「あああっ……あああああああああああああ──────っっ！！！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「アポロッ──！？」
line = "「アポロッ──！？」"

[[dialogue]]
speaker = "クロト"
# 「手は出せない──アポロを打ち破れるのはアポロだけだ。見守るしかない！」
line = "「手は出せない──アポロを打ち破れるのはアポロだけだ。見守るしかない！」"

[[dialogue]]
speaker = "unk"
# 星見の長女としての己と──リクリエの使徒としての己──
line = "星見の長女としての己と──リクリエの使徒としての己──"

[[dialogue]]
speaker = "unk"
# 二柱の強烈な自我が今、仮面の奥でせめぎ合っている！
line = "二柱の強烈な自我が今、仮面の奥でせめぎ合っている！"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
# 「お願いします──姉さん。あなたの殻を破れるのは、あなただけなんです……！」
line = "「お願いします──姉さん。あなたの殻を破れるのは、あなただけなんです……！」"

[[dialogue]]
speaker = "unk"
# あの小さい体の中で、極限の対決を強いるのは大きな賭けだった。
line = "あの小さい体の中で、極限の対決を強いるのは大きな賭けだった。"

[[dialogue]]
speaker = "クロト"
# （それでもフィオナは信じた──『姉』と『使徒』は、決して交わらないものなんだって──）
line = "（それでもフィオナは信じた──『姉』と『使徒』は、決して交わらないものなんだって──）"

[[dialogue]]
speaker = "アポロ"
# 「うううう──あああああああ──────ッッッ！！」
line = "「うううう──あああああああ──────ッッッ！！」"

[[dialogue]]
speaker = "unk"
# 周囲を一掃する強烈な閃光が爆散し、そして……
line = "周囲を一掃する強烈な閃光が爆散し、そして……"

[[dialogue]]
speaker = "マトイ"
# 「あ……仮面が……」
line = "「あ……仮面が……」"

[[dialogue]]
speaker = "unk"
# 仮面が砕け散る。
line = "仮面が砕け散る。"

[[dialogue]]
speaker = "unk"
# アポロをアポロたらしめていた使徒の仮面が、ついに。
line = "アポロをアポロたらしめていた使徒の仮面が、ついに。"

[[dialogue]]
speaker = "unk"
# グレート・ウォールよりもさらに狭い──アポロ個人という器の中で。
line = "グレート・ウォールよりもさらに狭い──アポロ個人という器の中で。"

[[dialogue]]
speaker = "unk"
# リクリエの全力が巡り、狂い、果て……そして、壊れた。
line = "リクリエの全力が巡り、狂い、果て……そして、壊れた。"

[[dialogue]]
speaker = "unk"
# そして、その先で現れていたのは……
line = "そして、その先で現れていたのは……"

[[dialogue]]
speaker = "アポロ"
# 「────」
line = "「────」"

[[dialogue]]
speaker = "マトイ"
# 「うそ……こんな、ことって……」
line = "「うそ……こんな、ことって……」"

[[dialogue]]
speaker = "アナ"
# 「この波動──星見会長と似ていて……」
line = "「この波動──星見会長と似ていて……」"

[[dialogue]]
speaker = "クロト"
# 「ああ──同じだ。俺や、フィオナと」
line = "「ああ──同じだ。俺や、フィオナと」"

[[dialogue]]
speaker = "unk"
# 星力の波動。魔力の波動。そして霊力の波動。
line = "星力の波動。魔力の波動。そして霊力の波動。"

[[dialogue]]
speaker = "unk"
# ３種の力を統べて、操る──紛れもない覇者の器がそこにあった。
line = "３種の力を統べて、操る──紛れもない覇者の器がそこにあった。"

[[dialogue]]
speaker = "アポロ"
# 「あたしは……何を、してたんだ」
line = "「あたしは……何を、してたんだ」"

[[dialogue]]
speaker = "アポロ"
# 「今まで、ずっと──仮面に操られて、でも、それは己の弱さのせいで……」
line = "「今まで、ずっと──仮面に操られて、でも、それは己の弱さのせいで……」"

[[dialogue]]
speaker = "アポロ"
# 「ああ……うまく整理できない。なんだか……遠くへきてしまった、気がする」
line = "「ああ……うまく整理できない。なんだか……遠くへきてしまった、気がする」"

[[dialogue]]
speaker = "unk"
# アポロは──正気を取り戻していた。
line = "アポロは──正気を取り戻していた。"

[[dialogue]]
speaker = "unk"
# 仮面をなくしてなお<ruby=りゅうちょう>流暢</ruby>に語るその姿は、今までじゃ決してありえなかったもの。
line = "仮面をなくしてなお<ruby>流暢<rt>りゅうちょう</rt></ruby>に語るその姿は、今までじゃ決してありえなかったもの。"

[[dialogue]]
speaker = "unk"
# そして今の彼女を見れば、何が起きたのか──その現象は明白だった。
line = "そして今の彼女を見れば、何が起きたのか──その現象は明白だった。"

[[dialogue]]
speaker = "クロト"
# 「アポロが──魔王になったんだ」
line = "「アポロが──魔王になったんだ」"

[[dialogue]]
speaker = "unk"
# 魔王としての<ruby=めざ>覚醒</ruby>めは彼女を仮面の支配からも解き放った。
line = "魔王としての<ruby>覚醒<rt>めざ</rt></ruby>めは彼女を仮面の支配からも解き放った。"

[[dialogue]]
speaker = "unk"
# 星見の長女としてではない。
line = "星見の長女としてではない。"

[[dialogue]]
speaker = "unk"
# 誰よりもかけがえない妹からの願いによって──その資質がついに花開いたのだ。
line = "誰よりもかけがえない妹からの願いによって──その資質がついに花開いたのだ。"

[[dialogue]]
speaker = "ニャリオン"
# 「き……奇蹟ニャン……姉妹どちらも、魔王として目覚めるニャンて……！」
line = "「き……奇蹟ニャン……姉妹どちらも、魔王として目覚めるニャンて……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「やっぱり魔王ってやつは──リクリエに打ち克つ運命だったのよ！」
line = "「やっぱり魔王ってやつは──リクリエに打ち克つ運命だったのよ！」"

[[dialogue]]
speaker = "unk"
# 彼女は元より星見の長女。
line = "彼女は元より星見の長女。"

[[dialogue]]
speaker = "unk"
# 女神も告げた、最も色濃い魔王の血を引く人間。
line = "女神も告げた、最も色濃い魔王の血を引く人間。"

[[dialogue]]
speaker = "unk"
# <ruby=エリシア>妹</ruby>も覚醒に至れたというのなら──姉がやってやれない道理はない。
line = "<ruby>妹<rt>エリシア</rt></ruby>も覚醒に至れたというのなら──姉がやってやれない道理はない。"

[[dialogue]]
speaker = "ルリエル"
# 「あ……あはは……こんなことも、あるのですね……」
line = "「あ……あはは……こんなことも、あるのですね……」"

[[dialogue]]
speaker = "unk"
# 思いがけない戦いの終幕。
line = "思いがけない戦いの終幕。"

[[dialogue]]
speaker = "unk"
# ようやく凪いだ空気にしばらく酔って、ついぞ駆け出したのはフィオナだった。
line = "ようやく凪いだ空気にしばらく酔って、ついぞ駆け出したのはフィオナだった。"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
# 「姉さん……姉さんっ──！」
line = "「姉さん……姉さんっ──！」"

[[dialogue]]
speaker = "アポロ"
# 「あ……エリシア……」
line = "「あ……エリシア……」"

[[dialogue]]
speaker = "アポロ"
# 「ごめん──ごめんな。ずっと……迷惑かけて。あたしの代わり、してもらって」
line = "「ごめん──ごめんな。ずっと……迷惑かけて。あたしの代わり、してもらって」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
# 「いいんですっ……！　ずっと会いたかった──本当は……私がまた、遊びたかったんです……！」
line = "「いいんですっ……！　ずっと会いたかった──本当は……私がまた、遊びたかったんです……！」"

[[dialogue]]
speaker = "アポロ"
# 「ははっ……どっちが姉だかわかんないな。見ない間に……こんな立派に、成長しちゃって……」
line = "「ははっ……どっちが姉だかわかんないな。見ない間に……こんな立派に、成長しちゃって……」"

[[dialogue]]
speaker = "unk"
# 泣きつくフィオナの頭を撫でるアポロ。
line = "泣きつくフィオナの頭を撫でるアポロ。"

[[dialogue]]
speaker = "unk"
# ２人の背丈とはまるで逆の関係性が、なんだかおかしかった。
line = "２人の背丈とはまるで逆の関係性が、なんだかおかしかった。"

[[dialogue]]
speaker = "ユウリ"
# （はは……昔は、あんな感じだったのかもな）
line = "（はは……昔は、あんな感じだったのかもな）"

[[dialogue]]
speaker = "サーシャ"
# （ええ。昔のあなたみたいね、ソフィ？）
line = "（ええ。昔のあなたみたいね、ソフィ？）"

[[dialogue]]
speaker = "ソフィア"
# （わ、私はあんな風に甘えませんから！）
line = "（わ、私はあんな風に甘えませんから！）"

[[dialogue]]
speaker = "unk"
# 仮面の呪縛から解き放たれたアポロは──もう『使徒』ではなくなっていた。
line = "仮面の呪縛から解き放たれたアポロは──もう『使徒』ではなくなっていた。"

[[dialogue]]
speaker = "unk"
# そして……地表に起きた変化はそれだけではなかった。
line = "そして……地表に起きた変化はそれだけではなかった。"

[[dialogue]]
speaker = "マトイ"
# 「あっ……」
line = "「あっ……」"

[[dialogue]]
speaker = "ルリエル"
# 「お空が……晴れていきますっ！？」
line = "「お空が……晴れていきますっ！？」"

[[dialogue]]
speaker = "逃げ惑う市民Ａ"
# 「──な、なんだ……？　急に空が晴れて……？」
line = "「──な、なんだ……？　急に空が晴れて……？」"

[[dialogue]]
speaker = "逃げ惑う市民Ｂ"
# 「戻った──過ぎ去った、の……？」
line = "「戻った──過ぎ去った、の……？」"

[[dialogue]]
speaker = "アニュラス（覚醒）"
# 「終わった──のか？　もしかして……」
line = "「終わった──のか？　もしかして……」"

[[dialogue]]
speaker = "キリカ"
# 「モンスターも──消滅しています……」
line = "「モンスターも──消滅しています……」"

[[dialogue]]
speaker = "エリス"
# 「建物が……元に……」
line = "「建物が……元に……」"

[[dialogue]]
speaker = "ウィステリア"
# 「ひと安心……でいいのかしら？　すぐ学園に連絡しないと──」
line = "「ひと安心……でいいのかしら？　すぐ学園に連絡しないと──」"

[[dialogue]]
speaker = "unk"
# 全天を覆っていたアポロの空が、晴れていく。
line = "全天を覆っていたアポロの空が、晴れていく。"

[[dialogue]]
speaker = "unk"
# 地表に出現していた無数のアステライトが、溶けるように消えていく。
line = "地表に出現していた無数のアステライトが、溶けるように消えていく。"

[[dialogue]]
speaker = "ソフィア"
# 「リクリエ現象が……全部……」
line = "「リクリエ現象が……全部……」"

[[dialogue]]
speaker = "マトイ"
# 「すごい……流星群も、やんじゃった……」
line = "「すごい……流星群も、やんじゃった……」"

[[dialogue]]
speaker = "アポロ"
# 「……あたしが、あたしじゃなくなったからだ」
line = "「……あたしが、あたしじゃなくなったからだ」"

[[dialogue]]
speaker = "クロト"
# 「アポロ……」
line = "「アポロ……」"

[[dialogue]]
speaker = "アポロ"
# 「あたしはリクリエの使徒だった。それは、リクリエという現象にとっても、指向性を持たせるのに人間体が都合よかったからだ」
line = "「あたしはリクリエの使徒だった。それは、リクリエという現象にとっても、指向性を持たせるのに人間体が都合よかったからだ」"

[[dialogue]]
speaker = "アポロ"
# 「あたしっていう指揮官がいなくなったら……リクリエのエネルギーは、消滅していく」
line = "「あたしっていう指揮官がいなくなったら……リクリエのエネルギーは、消滅していく」"

[[dialogue]]
speaker = "unk"
# アポロは淡々と語った。俺たちにも理解できるように。そして、己の罪を悔いるように。
line = "アポロは淡々と語った。俺たちにも理解できるように。そして、己の罪を悔いるように。"

[[dialogue]]
speaker = "アポロ"
# 「──緋宮クロト」
line = "「──緋宮クロト」"

[[dialogue]]
speaker = "クロト"
# 「……何かな」
line = "「……何かな」"

[[dialogue]]
speaker = "アポロ"
# 「……すまなかった。今まで、ずっと……敵だとか勝手なこと言って、追いかけ回して」
line = "「……すまなかった。今まで、ずっと……敵だとか勝手なこと言って、追いかけ回して」"

[[dialogue]]
speaker = "アポロ"
# 「本当に悪党だったのは……あたしの方だったのにな」
line = "「本当に悪党だったのは……あたしの方だったのにな」"

[[dialogue]]
speaker = "クロト"
# 「気にすることはない。君の事情は知ってる──恨もうとは思わないよ。ま、事後処理は手伝ってほしいけどな」
line = "「気にすることはない。君の事情は知ってる──恨もうとは思わないよ。ま、事後処理は手伝ってほしいけどな」"

[[dialogue]]
speaker = "クロト"
# 「それに俺たちは……君以外にも、そうなってしまったケースを知っている」
line = "「それに俺たちは……君以外にも、そうなってしまったケースを知っている」"

[[dialogue]]
speaker = "アポロ"
# 「そう……なのか？　だが、そうか。他の平行世界にも、あたしと同様に……」
line = "「そう……なのか？　だが、そうか。他の平行世界にも、あたしと同様に……」"

[[dialogue]]
speaker = "unk"
# マルキアさんのことはアポロも知らないようだった。
line = "マルキアさんのことはアポロも知らないようだった。"

[[dialogue]]
speaker = "unk"
# 平行世界は交わらぬ可能性同士──それはそれ、という話なのだろう。
line = "平行世界は交わらぬ可能性同士──それはそれ、という話なのだろう。"

[[dialogue]]
speaker = "アポロ"
# 「それから……他の奴らも。本当に……悪かった」
line = "「それから……他の奴らも。本当に……悪かった」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
# 「姉さん……」
line = "「姉さん……」"

[[dialogue]]
speaker = "アポロ"
# 「全部は……あたしの、心の弱さが招いたことだ。オマエたちみたいな立派な魔王に、なれなかった」
line = "「全部は……あたしの、心の弱さが招いたことだ。オマエたちみたいな立派な魔王に、なれなかった」"

[[dialogue]]
speaker = "ルリエル"
# 「そ、そんなことありません！　最後は紛れもなく大・大・大覚醒だったじゃないですか！」
line = "「そ、そんなことありません！　最後は紛れもなく大・大・大覚醒だったじゃないですか！」"

[[dialogue]]
speaker = "サーシャ"
# 「ええ。個人でリクリエに勝っちゃうなんて──それこそ、真の魔王って感じじゃない？」
line = "「ええ。個人でリクリエに勝っちゃうなんて──それこそ、真の魔王って感じじゃない？」"

[[dialogue]]
speaker = "アポロ"
# 「オマエたち……そうか。いや、オマエたちなんて呼ぶべきじゃないのかもしれないが」
line = "「オマエたち……そうか。いや、オマエたちなんて呼ぶべきじゃないのかもしれないが」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
# 「ふふ……アポロ口調が抜けませんね。姉さん」
line = "「ふふ……アポロ口調が抜けませんね。姉さん」"

[[dialogue]]
speaker = "セーラ"
# 「それくらい支配が強かったってことで」
line = "「それくらい支配が強かったってことで」"

[[dialogue]]
speaker = "ソフィア"
# 「ええ。悪いのは仮面であって、お姉さんではありませんから」
line = "「ええ。悪いのは仮面であって、お姉さんではありませんから」"

[[dialogue]]
speaker = "unk"
# アポロを囲んでみんなで笑い合う。
line = "アポロを囲んでみんなで笑い合う。"

[[dialogue]]
speaker = "unk"
# 俺たちが初めて掴んだ、ひとつの運命の結末だった。
line = "俺たちが初めて掴んだ、ひとつの運命の結末だった。"
