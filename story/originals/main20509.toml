[[dialogue]]
speaker = "unk"
# 第９話,破滅の拳,B
line = "第９話,破滅の拳,B"

[[dialogue]]
speaker = "チナ"
# 「吹き飛べーーーっ！！」
line = "「吹き飛べーーーっ！！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「きゃああっ！？」
line = "「きゃああっ！？」"

[[dialogue]]
speaker = "unk"
# 嵐をまとったチナの槍が、鎖ごとヴィーナスを薙ぎ払う。
line = "嵐をまとったチナの槍が、鎖ごとヴィーナスを薙ぎ払う。"

[[dialogue]]
speaker = "クロト"
# 「ヴィーナス！」
line = "「ヴィーナス！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「大丈夫、まだ戦えるわ！　でも、ちょっとどころじゃないくらい強くなってるわよね……どういう理屈──」
line = "「大丈夫、まだ戦えるわ！　でも、ちょっとどころじゃないくらい強くなってるわよね……どういう理屈──」"

[[dialogue]]
speaker = "チナ"
# 「かはっ……！」
line = "「かはっ……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「血っ！？　ちょっと、血を吐いてるわよ！？」
line = "「血っ！？　ちょっと、血を吐いてるわよ！？」"

[[dialogue]]
speaker = "チナ"
# 「はぁ、はぁ……言っただろ、会長から力をもらったって……」
line = "「はぁ、はぁ……言っただろ、会長から力をもらったって……」"

[[dialogue]]
speaker = "unk"
# チナの口から赤い血がこぼれてポタポタと垂れていく。
line = "チナの口から赤い血がこぼれてポタポタと垂れていく。"

[[dialogue]]
speaker = "unk"
# 俺たちとの戦いで負った傷ではないはずだ。
line = "俺たちとの戦いで負った傷ではないはずだ。"

[[dialogue]]
speaker = "チナ"
# 「アタシは……デネブを守るためならなんだってする……アルタイルを滅ぼすのだって……」
line = "「アタシは……デネブを守るためならなんだってする……アルタイルを滅ぼすのだって……」"

[[dialogue]]
speaker = "チナ"
# 「アタシはどうなってもいい……だから……だから……！」
line = "「アタシはどうなってもいい……だから……だから……！」"

[[dialogue]]
speaker = "unk"
# 極星の会長から与えられたという力の反動か、チナの顔から生気が失われ、どんどん青ざめていく。
line = "極星の会長から与えられたという力の反動か、チナの顔から生気が失われ、どんどん青ざめていく。"

[[dialogue]]
speaker = "ヴィーナス"
# 「このままじゃあなたが持たないわよ！？」
line = "「このままじゃあなたが持たないわよ！？」"

[[dialogue]]
speaker = "チナ"
# 「ああ、だからアタシの道連れになれ、アルタイル！！　魔王！！」
line = "「ああ、だからアタシの道連れになれ、アルタイル！！　魔王！！」"

[[dialogue]]
speaker = "クロト"
# 「くぅっ……！」
line = "「くぅっ……！」"

[[dialogue]]
speaker = "unk"
# チナの攻撃を正面から受け止めるが、衝撃に全身が悲鳴を上げる。
line = "チナの攻撃を正面から受け止めるが、衝撃に全身が悲鳴を上げる。"

[[dialogue]]
speaker = "unk"
# そして俺が傷つけば傷つくほど、古傷が疼くように、俺の中のリクリエが暴れようとしていた。
line = "そして俺が傷つけば傷つくほど、古傷が疼くように、俺の中のリクリエが暴れようとしていた。"

[[dialogue]]
speaker = "クロト"
# （また俺を乗っ取ろうとして……くっ……）
line = "（また俺を乗っ取ろうとして……くっ……）"

[[dialogue]]
speaker = "unk"
# 俺の中でヘビがのたうち、暴れているような感覚。
line = "俺の中でヘビがのたうち、暴れているような感覚。"

[[dialogue]]
speaker = "unk"
# そのヘビが内側から俺を食い破ろうとしている。
line = "そのヘビが内側から俺を食い破ろうとしている。"

[[dialogue]]
speaker = "unk"
# ジグに注がれたリクリエの力は、梨緒によって焼かれたが、一度目覚めた厄災はそう簡単に静まってはくれなかった。
line = "ジグに注がれたリクリエの力は、梨緒によって焼かれたが、一度目覚めた厄災はそう簡単に静まってはくれなかった。"

[[dialogue]]
speaker = "チナ"
# 「どうした……？　つらそうだな……？　なら──」
line = "「どうした……？　つらそうだな……？　なら──」"

[[dialogue]]
speaker = "チナ"
# 「このまま押し切って串刺しにしてやる！！」
line = "「このまま押し切って串刺しにしてやる！！」"

[[dialogue]]
speaker = "クロト"
# 「ぐああああっ！！？」
line = "「ぐああああっ！！？」"

[[dialogue]]
speaker = "unk"
# 大槍を中心にして渦巻く嵐が、ドリルのように俺を削っていく。
line = "大槍を中心にして渦巻く嵐が、ドリルのように俺を削っていく。"

[[dialogue]]
speaker = "unk"
# このままでは良くて風穴が開くか、悪くて細切れか、それともリクリエに呑まれる方が早いか。
line = "このままでは良くて風穴が開くか、悪くて細切れか、それともリクリエに呑まれる方が早いか。"

[[dialogue]]
speaker = "クロト"
# （せめて俺の中のリクリエを制御することができれば……そんなことできるのか……？）
line = "（せめて俺の中のリクリエを制御することができれば……そんなことできるのか……？）"

[[dialogue]]
speaker = "クロト"
# （いや──）
line = "（いや──）"

[[dialogue]]
speaker = "unk"
# それを可能にする存在なら知っている。
line = "それを可能にする存在なら知っている。"

[[dialogue]]
speaker = "unk"
# 煌嶺はリクリエによって生み出されたモンスターを支配し、駒として扱うことができた。
line = "煌嶺はリクリエによって生み出されたモンスターを支配し、駒として扱うことができた。"

[[dialogue]]
speaker = "unk"
# リクリエの力は、御せないものではない……！
line = "リクリエの力は、御せないものではない……！"

[[dialogue]]
speaker = "クロト"
# （煌嶺にできるなら、俺にもできるはずだ……！）
line = "（煌嶺にできるなら、俺にもできるはずだ……！）"

[[dialogue]]
speaker = "クロト"
# （破滅の力を、俺が支配する……！　俺が従える……！）
line = "（破滅の力を、俺が支配する……！　俺が従える……！）"

[[dialogue]]
speaker = "unk"
# 俺の中で暴れるならいっそ解き放ってしまえばいい。
line = "俺の中で暴れるならいっそ解き放ってしまえばいい。"

[[dialogue]]
speaker = "unk"
# リクリエの力を、この拳に乗せる──！
line = "リクリエの力を、この拳に乗せる──！"

[[dialogue]]
speaker = "チナ"
# 「！？」
line = "「！？」"

[[dialogue]]
speaker = "unk"
# 瞬間、幾重にも重なった破壊の波が俺を中心に迸った。
line = "瞬間、幾重にも重なった破壊の波が俺を中心に迸った。"

[[dialogue]]
speaker = "クロト"
# 「はーっ……はーっ……」
line = "「はーっ……はーっ……」"

[[dialogue]]
speaker = "unk"
# 全身が痛む。まるで体を流れる血が酸になったみたいに熱い。
line = "全身が痛む。まるで体を流れる血が酸になったみたいに熱い。"

[[dialogue]]
speaker = "unk"
# それでも今、リクリエに侵されることなく、その力だけを解き放つことができた。
line = "それでも今、リクリエに侵されることなく、その力だけを解き放つことができた。"

[[dialogue]]
speaker = "チナ"
# 「くっ……はぁ、はぁ……今、何をした……？」
line = "「くっ……はぁ、はぁ……今、何をした……？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「今の感じ、もしかしてリクリエの……？　自分の中に封印されたリクリエの力を使ったっていうの！？」
line = "「今の感じ、もしかしてリクリエの……？　自分の中に封印されたリクリエの力を使ったっていうの！？」"

[[dialogue]]
speaker = "クロト"
# 「ああ……出たとこ勝負だったけどな。体がバラバラになるかと思った」
line = "「ああ……出たとこ勝負だったけどな。体がバラバラになるかと思った」"

[[dialogue]]
speaker = "ヴィーナス"
# 「でもできたじゃない！　さっすがクロトね！」
line = "「でもできたじゃない！　さっすがクロトね！」"

[[dialogue]]
speaker = "チナ"
# 「なっ、リクリエの……！？　やっぱり魔王は破滅の化身じゃねえか！」
line = "「なっ、リクリエの……！？　やっぱり魔王は破滅の化身じゃねえか！」"

[[dialogue]]
speaker = "チナ"
# 「だが──時間切れだ」
line = "「だが──時間切れだ」"

[[dialogue]]
speaker = "クロト"
# 「！　それは……？」
line = "「！　それは……？」"

[[dialogue]]
speaker = "チナ"
# 「アタシがどうやってデネブから来てるか、気になってたんだろ？」
line = "「アタシがどうやってデネブから来てるか、気になってたんだろ？」"

[[dialogue]]
speaker = "チナ"
# 「その答えがこれだ。会長から賜ったこいつを使うことで、アタシはアルタイルへの転移が可能になった」
line = "「その答えがこれだ。会長から賜ったこいつを使うことで、アタシはアルタイルへの転移が可能になった」"

[[dialogue]]
speaker = "クロト"
# （気配でわかる。あれから発せられるのは、俺──魔王ラクシスと同じ力）
line = "（気配でわかる。あれから発せられるのは、俺──魔王ラクシスと同じ力）"

[[dialogue]]
speaker = "クロト"
# （ラクシスの世界を渡る力を、何らかの方法で抽出したもの。だがどうやってそんな真似を……？）
line = "（ラクシスの世界を渡る力を、何らかの方法で抽出したもの。だがどうやってそんな真似を……？）"

[[dialogue]]
speaker = "unk"
# いずれ解明せねばならないことだが、重要なのは今ここでチナが何をしようとしているか──
line = "いずれ解明せねばならないことだが、重要なのは今ここでチナが何をしようとしているか──"

[[dialogue]]
speaker = "チナ"
# 「この装置には世界を行き来するほかに、もう１つ使い方がある」
line = "「この装置には世界を行き来するほかに、もう１つ使い方がある」"

[[dialogue]]
speaker = "チナ"
# 「限界を超えてブーストさせることで、すでに滅びたベガに接続し、次元を歪ませて空間を崩壊させる。これで流星市国は消し飛ぶ」
line = "「限界を超えてブーストさせることで、すでに滅びたベガに接続し、次元を歪ませて空間を崩壊させる。これで流星市国は消し飛ぶ」"

[[dialogue]]
speaker = "チナ"
# 「アタシも極星従騎も、こいつを臨界させるための時間稼ぎだよ。つまりアタシたちの勝ちだ」
line = "「アタシも極星従騎も、こいつを臨界させるための時間稼ぎだよ。つまりアタシたちの勝ちだ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「空間を崩壊……？　よくわからないけど、すっごく危ないってことよね！？　あなた最初からそのつもりで！？」
line = "「空間を崩壊……？　よくわからないけど、すっごく危ないってことよね！？　あなた最初からそのつもりで！？」"

[[dialogue]]
speaker = "チナ"
# 「デネブを守るためなら、アタシの命なんてどうだっていい！」
line = "「デネブを守るためなら、アタシの命なんてどうだっていい！」"

[[dialogue]]
speaker = "unk"
# まるで闇を凝固させたような、暗黒の球体。
line = "まるで闇を凝固させたような、暗黒の球体。"

[[dialogue]]
speaker = "unk"
# 放出されるエネルギーは尋常ではなく、仕組みを理解しない俺でも臨界に達しつつあるのが見てとれた。
line = "放出されるエネルギーは尋常ではなく、仕組みを理解しない俺でも臨界に達しつつあるのが見てとれた。"

[[dialogue]]
speaker = "ジグ"
# 「君が私にいろいろ言うのは構わないんだけど、付き合ってあげられるかは別でね。そろそろ終わりに──」
line = "「君が私にいろいろ言うのは構わないんだけど、付き合ってあげられるかは別でね。そろそろ終わりに──」"

[[dialogue]]
speaker = "梨緒"
# 「ディメンションエクスウェーブ！」
line = "「ディメンションエクスウェーブ！」"

[[dialogue]]
speaker = "ジグ"
# 「！？」
line = "「！？」"

[[dialogue]]
speaker = "梨緒"
# 「くぅ……はぁっ……はぁっ……」
line = "「くぅ……はぁっ……はぁっ……」"

[[dialogue]]
speaker = "ベアトリス"
# 「梨緒ちゃん！　よかった……」
line = "「梨緒ちゃん！　よかった……」"

[[dialogue]]
speaker = "unk"
# 梨緒はジグに斬られる間際、翼を展開して威力を相殺していた。
line = "梨緒はジグに斬られる間際、翼を展開して威力を相殺していた。"

[[dialogue]]
speaker = "unk"
# ギリギリのタイミングだったが、間に合わなければ無惨に両断されていただろう。
line = "ギリギリのタイミングだったが、間に合わなければ無惨に両断されていただろう。"

[[dialogue]]
speaker = "ジグ"
# 「く……」
line = "「く……」"

[[dialogue]]
speaker = "unk"
# そして、不意を突いた一撃によりジグの仮面が砕けた。
line = "そして、不意を突いた一撃によりジグの仮面が砕けた。"

[[dialogue]]
speaker = "unk"
# 今まで余裕を崩さなかったジグが、苦悶の表情を浮かべながら、手で隠すように顔を押さえる。
line = "今まで余裕を崩さなかったジグが、苦悶の表情を浮かべながら、手で隠すように顔を押さえる。"

[[dialogue]]
speaker = "梨緒"
# 「リクリエの使徒の力は、仮面に宿ると聞いている。だからその仮面を剥いでやった」
line = "「リクリエの使徒の力は、仮面に宿ると聞いている。だからその仮面を剥いでやった」"

[[dialogue]]
speaker = "梨緒"
# 「思い出せ！　君はレナーテ・<ruby=ジグ>Ｚ</ruby>・サイフリート！　星騎士で、新星学園の星徒会長で、私と共にリクリエと戦っていた！」
line = "「思い出せ！　君はレナーテ・<ruby>Ｚ<rt>ジグ</rt></ruby>・サイフリート！　星騎士で、新星学園の星徒会長で、私と共にリクリエと戦っていた！」"

[[dialogue]]
speaker = "ジグ"
# 「アガ……サ……」
line = "「アガ……サ……」"

[[dialogue]]
speaker = "梨緒"
# 「そうだ、アガサだ！　副会長の、梨緒・Ａ・クリステレスだ！」
line = "「そうだ、アガサだ！　副会長の、梨緒・Ａ・クリステレスだ！」"

[[dialogue]]
speaker = "梨緒"
# 「戻ってこい、ジグ！　私と一緒に、今度こそ世界を救おう！」
line = "「戻ってこい、ジグ！　私と一緒に、今度こそ世界を救おう！」"

[[dialogue]]
speaker = "ジグ"
# 「世界を……救う……」
line = "「世界を……救う……」"

[[dialogue]]
speaker = "ジグ"
# 「いいや、それは無理だ」
line = "「いいや、それは無理だ」"

[[dialogue]]
speaker = "梨緒"
# 「──！？」
line = "「──！？」"

[[dialogue]]
speaker = "ジグ"
# 「私は可能性を見た。だけど世界を救える未来なんてどこにもなかった」
line = "「私は可能性を見た。だけど世界を救える未来なんてどこにもなかった」"

[[dialogue]]
speaker = "梨緒"
# 「可能性……？　君は何を言って……？」
line = "「可能性……？　君は何を言って……？」"

[[dialogue]]
speaker = "unk"
# 先ほど割れた仮面が瘴気に変わり、再びジグに取り憑く。
line = "先ほど割れた仮面が瘴気に変わり、再びジグに取り憑く。"

[[dialogue]]
speaker = "unk"
# そして新たな仮面がジグの顔を覆い、使徒であった時の軽薄さを取り戻す。
line = "そして新たな仮面がジグの顔を覆い、使徒であった時の軽薄さを取り戻す。"

[[dialogue]]
speaker = "ジグ"
# 「レナーテ・Ｚ・サイフリート……ふむ、確かに私はそう呼ばれていたこともあったようだ。君が正しかったみたいだね、そこは謝ろう」
line = "「レナーテ・Ｚ・サイフリート……ふむ、確かに私はそう呼ばれていたこともあったようだ。君が正しかったみたいだね、そこは謝ろう」"

[[dialogue]]
speaker = "ジグ"
# 「でも今の私には、遠い昔……まるで前世のことのように感じるよ」
line = "「でも今の私には、遠い昔……まるで前世のことのように感じるよ」"

[[dialogue]]
speaker = "ジグ"
# 「もう一度言おう。私は“真なる神の騎士”。かつてベガで戦っていた星騎士とは別の存在だ」
line = "「もう一度言おう。私は“真なる神の騎士”。かつてベガで戦っていた星騎士とは別の存在だ」"

[[dialogue]]
speaker = "ジグ"
# 「だけどそろそろタイムアップかな。巻き込まれたくないから、私は退散させてもらうよ」
line = "「だけどそろそろタイムアップかな。巻き込まれたくないから、私は退散させてもらうよ」"

[[dialogue]]
speaker = "unk"
# 転送装置の臨界を察知し、即座に撤退を選ぶジグ。
line = "転送装置の臨界を察知し、即座に撤退を選ぶジグ。"

[[dialogue]]
speaker = "梨緒"
# 「待て！　逃げるな、ジグ……！」
line = "「待て！　逃げるな、ジグ……！」"

[[dialogue]]
speaker = "ナターシャ"
# 「ちょっと待った。教皇庁がヤバいことになってるよ」
line = "「ちょっと待った。教皇庁がヤバいことになってるよ」"

[[dialogue]]
speaker = "梨緒"
# 「何……！？」
line = "「何……！？」"

[[dialogue]]
speaker = "クロト"
# 「俺は──俺たちはアルタイルを守る。君の思い通りにはさせない」
line = "「俺は──俺たちはアルタイルを守る。君の思い通りにはさせない」"

[[dialogue]]
speaker = "チナ"
# 「いいや、アタシの意地は通させてもらう！　アルタイルとともに消えろ、魔王！！」
line = "「いいや、アタシの意地は通させてもらう！　アルタイルとともに消えろ、魔王！！」"

[[dialogue]]
speaker = "unk"
# 装置を破壊しようと拳を振りかぶる俺に、幾度も受けたチナの槍が迫る。
line = "装置を破壊しようと拳を振りかぶる俺に、幾度も受けたチナの槍が迫る。"

[[dialogue]]
speaker = "unk"
# 吹き荒れる嵐は、巻き込まれれば細切れにされる暴風のミキサー。
line = "吹き荒れる嵐は、巻き込まれれば細切れにされる暴風のミキサー。"

[[dialogue]]
speaker = "unk"
# バチバチと弾ける紫電は、敵を焼き焦がす破壊の閃光。
line = "バチバチと弾ける紫電は、敵を焼き焦がす破壊の閃光。"

[[dialogue]]
speaker = "クロト"
# （<ruby=リクリエ>破滅</ruby>の力よ、俺に従え──！）
line = "（<ruby>破滅<rt>リクリエ</rt></ruby>の力よ、俺に従え──！）"

[[dialogue]]
speaker = "unk"
# チナは俺たちと同じ──いやそれ以上の覚悟を持ってこの戦いに臨んだ。
line = "チナは俺たちと同じ──いやそれ以上の覚悟を持ってこの戦いに臨んだ。"

[[dialogue]]
speaker = "unk"
# 彼女は俺たちの世界を滅ぼそうとする敵だ。それでも。
line = "彼女は俺たちの世界を滅ぼそうとする敵だ。それでも。"

[[dialogue]]
speaker = "unk"
# 自分の世界を守るために命を捨てる彼女を──死なせたくない！
line = "自分の世界を守るために命を捨てる彼女を──死なせたくない！"

[[dialogue]]
speaker = "unk"
# 俺は多くを望んでいるのだろう。我がままで欲張りなのかもしれない。
line = "俺は多くを望んでいるのだろう。我がままで欲張りなのかもしれない。"

[[dialogue]]
speaker = "unk"
# でも──
line = "でも──"

[[dialogue]]
speaker = "クロト"
# 「俺はこの道を往く！」
line = "「俺はこの道を往く！」"

[[dialogue]]
speaker = "チナ"
# 「カラミティ──」
line = "「カラミティ──」"

[[dialogue]]
speaker = "クロト"
# 「デッドリー──」
line = "「デッドリー──」"

[[dialogue]]
speaker = "チナ"
# 「バスタァーーーーーーッッ！！！」
line = "「バスタァーーーーーーッッ！！！」"

[[dialogue]]
speaker = "クロト"
# 「クラスターーーーーーッ！！！」
line = "「クラスターーーーーーッ！！！」"

[[dialogue]]
speaker = "unk"
# 破滅の力を宿した拳が、暴風をまとった槍とぶつかる。
line = "破滅の力を宿した拳が、暴風をまとった槍とぶつかる。"

[[dialogue]]
speaker = "チナ"
# 「うおおおおーーーーーーっ！！！」
line = "「うおおおおーーーーーーっ！！！」"

[[dialogue]]
speaker = "クロト"
# 「おおおおおおおおっ！！！」
line = "「おおおおおおおおっ！！！」"

[[dialogue]]
speaker = "unk"
# 体が千切れそうになりながら放つ、今の全てを込めた一撃。
line = "体が千切れそうになりながら放つ、今の全てを込めた一撃。"

[[dialogue]]
speaker = "unk"
# そしてチナの槍がひび割れていって──
line = "そしてチナの槍がひび割れていって──"

[[dialogue]]
speaker = "チナ"
# 「く──あああああっ！！？」
line = "「く──あああああっ！！？」"

[[dialogue]]
speaker = "unk"
# 槍が先端から砕け散り、拳撃を受けたチナが地面に打ち付けられた。
line = "槍が先端から砕け散り、拳撃を受けたチナが地面に打ち付けられた。"

[[dialogue]]
speaker = "unk"
# 同時にチナのセレスティアが砕け、変身が解ける。
line = "同時にチナのセレスティアが砕け、変身が解ける。"

[[dialogue]]
speaker = "クロト"
# 「装置を止めないと！」
line = "「装置を止めないと！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「任せて！　とりあえず壊しちゃうわよ！」
line = "「任せて！　とりあえず壊しちゃうわよ！」"

[[dialogue]]
speaker = "unk"
# デネブへと渡る装置は必要だが、今は無理やりにでも止めるしかない。
line = "デネブへと渡る装置は必要だが、今は無理やりにでも止めるしかない。"

[[dialogue]]
speaker = "unk"
# 放り出された装置を破壊しようと、ヴィーナスが星術を繰り出す。
line = "放り出された装置を破壊しようと、ヴィーナスが星術を繰り出す。"

[[dialogue]]
speaker = "ヴィーナス"
# 「！？　星術が飲み込まれた！？」
line = "「！？　星術が飲み込まれた！？」"

[[dialogue]]
speaker = "unk"
# だがヴィーナスが放った光条は装置を破壊することなく、暗黒に呑まれ、虚空へと消えた。
line = "だがヴィーナスが放った光条は装置を破壊することなく、暗黒に呑まれ、虚空へと消えた。"

[[dialogue]]
speaker = "梨緒"
# 「いったい何が起こっている！？」
line = "「いったい何が起こっている！？」"

[[dialogue]]
speaker = "フィオナ"
# 「異常な気配を察知しましたが、一体なにが……！？」
line = "「異常な気配を察知しましたが、一体なにが……！？」"

[[dialogue]]
speaker = "unk"
# それぞれ別々の方向から、梨緒たち選挙管理委員会と、フィオナが降り立つ。
line = "それぞれ別々の方向から、梨緒たち選挙管理委員会と、フィオナが降り立つ。"

[[dialogue]]
speaker = "unk"
# それぞれ状況がどうなったのかを確認したかったが、今は装置を止める方が先だ！
line = "それぞれ状況がどうなったのかを確認したかったが、今は装置を止める方が先だ！"

[[dialogue]]
speaker = "クロト"
# 「チナが転送装置を暴走させて、流星市国を消し飛ばそうとしてるんだ。装置を壊さないと！」
line = "「チナが転送装置を暴走させて、流星市国を消し飛ばそうとしてるんだ。装置を壊さないと！」"

[[dialogue]]
speaker = "梨緒"
# 「何！？　なら私が──！」
line = "「何！？　なら私が──！」"

[[dialogue]]
speaker = "unk"
# 梨緒が矢を撃つが、やはりあの装置に呑み込まれるだけだ。
line = "梨緒が矢を撃つが、やはりあの装置に呑み込まれるだけだ。"

[[dialogue]]
speaker = "クロト"
# 「くっ……！」
line = "「くっ……！」"

[[dialogue]]
speaker = "unk"
# 俺がやっても同じこと。拳から放った闇の波動は、装置が繋げた異次元へと吸い込まれる。
line = "俺がやっても同じこと。拳から放った闇の波動は、装置が繋げた異次元へと吸い込まれる。"

[[dialogue]]
speaker = "チナ"
# 「ほんの一瞬だけ、遅かったな……もうこうなったら誰にも止められない……」
line = "「ほんの一瞬だけ、遅かったな……もうこうなったら誰にも止められない……」"

[[dialogue]]
speaker = "チナ"
# 「アタシと一緒に消えるんだよ、オマエらは。諦めな……」
line = "「アタシと一緒に消えるんだよ、オマエらは。諦めな……」"

[[dialogue]]
speaker = "梨緒"
# 「何か……あれを破壊、ないし消滅させる手段は……──！」
line = "「何か……あれを破壊、ないし消滅させる手段は……──！」"

[[dialogue]]
speaker = "梨緒"
# 「ナターシャ！　シエルの鍵を！」
line = "「ナターシャ！　シエルの鍵を！」"

[[dialogue]]
speaker = "ナターシャ"
# 「あ、そゆこと。じゃあ……一番近くにいる魔王にパスっ」
line = "「あ、そゆこと。じゃあ……一番近くにいる魔王にパスっ」"

[[dialogue]]
speaker = "クロト"
# 「ああ、受け取った！」
line = "「ああ、受け取った！」"

[[dialogue]]
speaker = "unk"
# ナターシャから光の球──シエルの鍵を受け取る。
line = "ナターシャから光の球──シエルの鍵を受け取る。"

[[dialogue]]
speaker = "unk"
# これは対象を完全に消滅させるプログラム。
line = "これは対象を完全に消滅させるプログラム。"

[[dialogue]]
speaker = "unk"
# 効くかどうかはわからないが、これを試すしかない……！
line = "効くかどうかはわからないが、これを試すしかない……！"

[[dialogue]]
speaker = "クロト"
# 「これで──どうだ！？」
line = "「これで──どうだ！？」"

[[dialogue]]
speaker = "クロト"
# 「よし、消滅した！」
line = "「よし、消滅した！」"

[[dialogue]]
speaker = "クロト"
# 「！？」
line = "「！？」"

[[dialogue]]
speaker = "unk"
# 目の前が真っ暗に染まる。
line = "目の前が真っ暗に染まる。"

[[dialogue]]
speaker = "unk"
# 先を見通せない深淵がそこに広がっていた。
line = "先を見通せない深淵がそこに広がっていた。"

[[dialogue]]
speaker = "フィオナ"
# 「ひ、人を吸い込むほどの風が、あの穴から……！」
line = "「ひ、人を吸い込むほどの風が、あの穴から……！」"

[[dialogue]]
speaker = "クロト"
# 「くっ……吸い込まれる……！」
line = "「くっ……吸い込まれる……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロト……！　きゃぁあああっ！？」
line = "「クロト……！　きゃぁあああっ！？」"

[[dialogue]]
speaker = "フィオナ"
# 「緋宮会長……！　ヴィーナスさん！！　きゃぁあああっ！？」
line = "「緋宮会長……！　ヴィーナスさん！！　きゃぁあああっ！？」"

[[dialogue]]
speaker = "ナターシャ"
# 「うわー……これが空間の裂け目ってやつ？　装置は壊したけど、開けた穴は残っちゃったわけか」
line = "「うわー……これが空間の裂け目ってやつ？　装置は壊したけど、開けた穴は残っちゃったわけか」"

[[dialogue]]
speaker = "ナターシャ"
# 「あ、ダメだこれ──」
line = "「あ、ダメだこれ──」"

[[dialogue]]
speaker = "ベアトリス"
# 「ナターシャちゃん！？　わわっ、吸い込まれる～っ！？」
line = "「ナターシャちゃん！？　わわっ、吸い込まれる～っ！？」"

[[dialogue]]
speaker = "チナ"
# 「副会長！？　どうしてここに！？」
line = "「副会長！？　どうしてここに！？」"

[[dialogue]]
speaker = "ベアトリス"
# 「……！　チナちゃんっ！」
line = "「……！　チナちゃんっ！」"

[[dialogue]]
speaker = "チナ"
# 「うわっ！？」
line = "「うわっ！？」"

[[dialogue]]
speaker = "unk"
# ベアトリスの槍が、暗黒へと吸い込まれそうになるチナを弾き飛ばす。
line = "ベアトリスの槍が、暗黒へと吸い込まれそうになるチナを弾き飛ばす。"

[[dialogue]]
speaker = "ベアトリス"
# 「きゃぁああっ！？」
line = "「きゃぁああっ！？」"

[[dialogue]]
speaker = "unk"
# だがベアトリスもナターシャを追うように、時空の彼方に消える。
line = "だがベアトリスもナターシャを追うように、時空の彼方に消える。"

[[dialogue]]
speaker = "梨緒"
# 「副会長……！？　ベアトが……極星の……！？」
line = "「副会長……！？　ベアトが……極星の……！？」"

[[dialogue]]
speaker = "梨緒"
# 「くっ……うぁああっ……！？」
line = "「くっ……うぁああっ……！？」"

[[dialogue]]
speaker = "unk"
# ベアトリスとチナの反応に混乱したまま、梨緒も虚空に呑み込まれていった。
line = "ベアトリスとチナの反応に混乱したまま、梨緒も虚空に呑み込まれていった。"

[[dialogue]]
speaker = "チナ"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# そして空間の穴が閉じ、その場には戦う力を失ったチナだけが残された。
line = "そして空間の穴が閉じ、その場には戦う力を失ったチナだけが残された。"

[[dialogue]]
speaker = "クロト"
# 「く……うぅ……」
line = "「く……うぅ……」"

[[dialogue]]
speaker = "unk"
# 全身の痛みをこらえながら身を起こす。
line = "全身の痛みをこらえながら身を起こす。"

[[dialogue]]
speaker = "unk"
# 俺たちはチナと戦って、装置を破壊して……時空の穴に吸い込まれて……
line = "俺たちはチナと戦って、装置を破壊して……時空の穴に吸い込まれて……"

[[dialogue]]
speaker = "クロト"
# 「みんな、無事か！？」
line = "「みんな、無事か！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私も平気よ！　でも──」
line = "「私も平気よ！　でも──」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ここ、どこ？」
line = "「ここ、どこ？」"

[[dialogue]]
speaker = "unk"
# 見覚えのない近未来のビル群を見上げる。
line = "見覚えのない近未来のビル群を見上げる。"

[[dialogue]]
speaker = "unk"
# 俺たちは知らない世界に来たのだと、否が応でも思い知らされたのだった。
line = "俺たちは知らない世界に来たのだと、否が応でも思い知らされたのだった。"
