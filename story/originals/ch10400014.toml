[[dialogue]]
speaker = "unk"
# 第４話,アイリーンの想い,P
line = "第４話,アイリーンの想い,P"

[[dialogue]]
speaker = "アイリーン"
# 「デートしよっ、会長さん♪」
line = "「デートしよっ、会長さん♪」"

[[dialogue]]
speaker = "unk"
# いきなり……！？
line = "いきなり……！？"

[[dialogue]]
speaker = "アイリーン"
# 「デートって、仲のいい男の人と行くって聞いたよ。とっても楽しいんでしょ？　ならしない理由ないでしょっ」
line = "「デートって、仲のいい男の人と行くって聞いたよ。とっても楽しいんでしょ？　ならしない理由ないでしょっ」"

[[dialogue]]
speaker = "アイリーン"
# 「デートしたい～っ、したいしたいしたい～っ！」
line = "「デートしたい～っ、したいしたいしたい～っ！」"

[[dialogue]]
speaker = "アイリーン"
# 「…………ダメ？」
line = "「…………ダメ？」"

[[dialogue]]
speaker = "unk"
# わかった、デートしよう！
line = "わかった、デートしよう！"

[[dialogue]]
speaker = "アイリーン"
# 「やったー！　じゃあ今度のお休みはデートだねっ」
line = "「やったー！　じゃあ今度のお休みはデートだねっ」"

[[dialogue]]
speaker = "アイリーン"
# 「会長さーんっ、こっちこっちー！」
line = "「会長さーんっ、こっちこっちー！」"

[[dialogue]]
speaker = "アイリーン"
# 「それじゃ……えいっ♪　おてて、ぎゅ～っと♪」
line = "「それじゃ……えいっ♪　おてて、ぎゅ～っと♪」"

[[dialogue]]
speaker = "アイリーン"
# 「どうして手を繋ぐんだって……だってデートでしょ？　デートでは男の人と女の人がこうするって聞いたよ？」
line = "「どうして手を繋ぐんだって……だってデートでしょ？　デートでは男の人と女の人がこうするって聞いたよ？」"

[[dialogue]]
speaker = "アイリーン"
# 「えへへ……こうしてると不思議な気持ちになるね。会長さんもなるよね？　うんうん、会長さんも一緒だよね～っ♪」
line = "「えへへ……こうしてると不思議な気持ちになるね。会長さんもなるよね？　うんうん、会長さんも一緒だよね～っ♪」"

[[dialogue]]
speaker = "アイリーン"
# 「よーしっ、じゃあレッツゴー！」
line = "「よーしっ、じゃあレッツゴー！」"

[[dialogue]]
speaker = "ミネルバ"
# 「ホー！」
line = "「ホー！」"

[[dialogue]]
speaker = "アイリーン"
# 「ん～？　何あれ？　アイスをひっくり返して――そんなことしたら落ちちゃうっ！？　あれ、落ちない……？」
line = "「ん～？　何あれ？　アイスをひっくり返して――そんなことしたら落ちちゃうっ！？　あれ、落ちない……？」"

[[dialogue]]
speaker = "アイリーン"
# 「へぇ～、トルコアイスっていうんだ！　そんなのもあるんだね。おじさーん、アイス２つくださーい」
line = "「へぇ～、トルコアイスっていうんだ！　そんなのもあるんだね。おじさーん、アイス２つくださーい」"

[[dialogue]]
speaker = "アイリーン"
# 「ありがとうございまーすっ。えへへっ、ちょっと多めにおまけしてもらっちゃった～♪」
line = "「ありがとうございまーすっ。えへへっ、ちょっと多めにおまけしてもらっちゃった～♪」"

[[dialogue]]
speaker = "アイリーン"
# 「ぺろっ。ん～っ、甘くておいしーっ♪　はい、ミーちゃん」
line = "「ぺろっ。ん～っ、甘くておいしーっ♪　はい、ミーちゃん」"

[[dialogue]]
speaker = "ミネルバ"
# 「ホー♪」
line = "「ホー♪」"

[[dialogue]]
speaker = "unk"
# 学校はどう？
line = "学校はどう？"

[[dialogue]]
speaker = "アイリーン"
# 「すっごく楽しい！　知らないことばっかりだし、ご飯はおいしいし、クラスのみんなも優しくしてくれるし」
line = "「すっごく楽しい！　知らないことばっかりだし、ご飯はおいしいし、クラスのみんなも優しくしてくれるし」"

[[dialogue]]
speaker = "アイリーン"
# 「魔女とかネビュラのことは知ってる人にしか言えないから、秘密にしてるけど。遠い外国の人って設定なんだ♪」
line = "「魔女とかネビュラのことは知ってる人にしか言えないから、秘密にしてるけど。遠い外国の人って設定なんだ♪」"

[[dialogue]]
speaker = "アイリーン"
# 「ぺろ、ぺろぺろ……あ～んっ♪　ごちそうさまー。アイスってすごくおいしいけど、魔女の森にはないんだよね。魔法で作れないかな？」
line = "「ぺろ、ぺろぺろ……あ～んっ♪　ごちそうさまー。アイスってすごくおいしいけど、魔女の森にはないんだよね。魔法で作れないかな？」"

[[dialogue]]
speaker = "アイリーン"
# 「よーし、次はお買い物！　あとは映画とー、水族館とー、観覧車とー、あと夜景も見たいな～。……え、一日じゃそんなに回れない～？」
line = "「よーし、次はお買い物！　あとは映画とー、水族館とー、観覧車とー、あと夜景も見たいな～。……え、一日じゃそんなに回れない～？」"

[[dialogue]]
speaker = "アイリーン"
# 「あ、それならまたデートすればいいねっ。会長さんといっぱいデートしたいな～<emoji=heart04>」
line = "「あ、それならまたデートすればいいねっ。会長さんといっぱいデートしたいな～<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# やりたいことたくさんだ
line = "やりたいことたくさんだ"

[[dialogue]]
speaker = "アイリーン"
# 「うん。お母さんがネビュラに所属してて、こっちの世界のことをいっぱいお話してくれたから、知ってるけど知らないことがたくさんあるんだ」
line = "「うん。お母さんがネビュラに所属してて、こっちの世界のことをいっぱいお話してくれたから、知ってるけど知らないことがたくさんあるんだ」"

[[dialogue]]
speaker = "アイリーン"
# 「だからお母さんが教えてくれたものを自分で見てみたい。行きたいところ、食べたいもの、やってみたいことばっかり」
line = "「だからお母さんが教えてくれたものを自分で見てみたい。行きたいところ、食べたいもの、やってみたいことばっかり」"

[[dialogue]]
speaker = "アイリーン"
# 「デートだってそう。魔女は女しかいないから、森じゃ男の人とデートなんかできなかったもん」
line = "「デートだってそう。魔女は女しかいないから、森じゃ男の人とデートなんかできなかったもん」"

[[dialogue]]
speaker = "アイリーン"
# 「自由の女神に、ピラミッドに、コロッセオに……地上絵も見たいな」
line = "「自由の女神に、ピラミッドに、コロッセオに……地上絵も見たいな」"

[[dialogue]]
speaker = "アイリーン"
# 「人間界だけじゃなくて魔界にも行ってみたい。お母さんが言ってたんだけど、魔界ってとってもメチャクチャらしいよ。きっとすごく楽しいよっ」
line = "「人間界だけじゃなくて魔界にも行ってみたい。お母さんが言ってたんだけど、魔界ってとってもメチャクチャらしいよ。きっとすごく楽しいよっ」"

[[dialogue]]
speaker = "unk"
# お母さんが大好きなんだな
line = "お母さんが大好きなんだな"

[[dialogue]]
speaker = "アイリーン"
# 「うん、大好き！」
line = "「うん、大好き！」"

[[dialogue]]
speaker = "アイリーン"
# 「ネビュラは撤退しろって命令したけど、お母さんはこの世界をたくさん見てきたから、守りたくなったんだと思う」
line = "「ネビュラは撤退しろって命令したけど、お母さんはこの世界をたくさん見てきたから、守りたくなったんだと思う」"

[[dialogue]]
speaker = "アイリーン"
# 「私はお母さんが守ろうとした世界を見たいんだ。ね、ミーちゃん」
line = "「私はお母さんが守ろうとした世界を見たいんだ。ね、ミーちゃん」"

[[dialogue]]
speaker = "ミネルバ"
# 「ホー」
line = "「ホー」"

[[dialogue]]
speaker = "アイリーン"
# 「いろんなものを見て回ったら、お母さんが最期に見たものを私も見に行くの。その時は一緒に来てくれないかな、会長さん？」
line = "「いろんなものを見て回ったら、お母さんが最期に見たものを私も見に行くの。その時は一緒に来てくれないかな、会長さん？」"

[[dialogue]]
speaker = "unk"
# うん、きっと
line = "うん、きっと"

[[dialogue]]
speaker = "アイリーン"
# 「ありがとう！」
line = "「ありがとう！」"

[[dialogue]]
speaker = "アイリーン"
# 「じゃあデートの続きだね。……あ、あのお城みたいな建物は何？　入ってみたいな～」
line = "「じゃあデートの続きだね。……あ、あのお城みたいな建物は何？　入ってみたいな～」"

[[dialogue]]
speaker = "アイリーン"
# 「なんでそんなに慌ててるの？　アイリーンには早い？　もーっ、子ども扱いしないでってばー！」
line = "「なんでそんなに慌ててるの？　アイリーンには早い？　もーっ、子ども扱いしないでってばー！」"

[[dialogue]]
speaker = "アイリーン"
# 「じゃああれ買って、あれ。指輪。キラキラしてるやつ！」
line = "「じゃああれ買って、あれ。指輪。キラキラしてるやつ！」"

[[dialogue]]
speaker = "アイリーン"
# 「それもアイリーンには早い？　え～っ、会長さんのイジワルっ」
line = "「それもアイリーンには早い？　え～っ、会長さんのイジワルっ」"

[[dialogue]]
speaker = "アイリーン"
# 「なーんて、ウソウソ。指輪って大好きな人にあげるものなんでしょ？」
line = "「なーんて、ウソウソ。指輪って大好きな人にあげるものなんでしょ？」"

[[dialogue]]
speaker = "アイリーン"
# 「だから指輪はまた今度。会長さんが私のこと大好きになったら、その時はプレゼントしてもらうからねっ！」
line = "「だから指輪はまた今度。会長さんが私のこと大好きになったら、その時はプレゼントしてもらうからねっ！」"
