[[dialogue]]
speaker = "unk"
# 第３話,デネブで得たもの,B
line = "第３話,デネブで得たもの,B"

[[dialogue]]
speaker = "unk"
# デネブから帰ってきた俺たちがまず聞かされたのは、天界が襲撃されたという知らせだった。
line = "デネブから帰ってきた俺たちがまず聞かされたのは、天界が襲撃されたという知らせだった。"

[[dialogue]]
speaker = "unk"
# 手狭な保健室から星徒会室に場所を移して、マトイたちから話を聞く。
line = "手狭な保健室から星徒会室に場所を移して、マトイたちから話を聞く。"

[[dialogue]]
speaker = "クロト"
# 「天界が襲撃されたって、どういうことなんだ？」
line = "「天界が襲撃されたって、どういうことなんだ？」"

[[dialogue]]
speaker = "マトイ"
# 「ええとその、言葉通りの意味で……天界の各地で極星従騎が暴れてるって、天界を監視してたネビュラから連絡があって」
line = "「ええとその、言葉通りの意味で……天界の各地で極星従騎が暴れてるって、天界を監視してたネビュラから連絡があって」"

[[dialogue]]
speaker = "マトイ"
# 「流星星徒会と一部のプリマステラには、ネビュラの世界樹を使って、先に天界に向かってもらったよ」
line = "「流星星徒会と一部のプリマステラには、ネビュラの世界樹を使って、先に天界に向かってもらったよ」"

[[dialogue]]
speaker = "アナ"
# 「本当はフィーニスの塔も使いたかったのですが、ディザスターハンドの件もあって、それは見合わせました」
line = "「本当はフィーニスの塔も使いたかったのですが、ディザスターハンドの件もあって、それは見合わせました」"

[[dialogue]]
speaker = "サーシャ"
# 「今は世界樹の魔力の充填中よ～。準備が整い次第、私たちも出発するところだったの～」
line = "「今は世界樹の魔力の充填中よ～。準備が整い次第、私たちも出発するところだったの～」"

[[dialogue]]
speaker = "サーシャ"
# 「魔力の充填が完了するまでもう少しかかるし、その間に、今まで何があったか聞かせてほしいわ～」
line = "「魔力の充填が完了するまでもう少しかかるし、その間に、今まで何があったか聞かせてほしいわ～」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうね、私も話さなきゃって思ってたわ」
line = "「そうね、私も話さなきゃって思ってたわ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私たち、デネブに行って、おばあちゃんやちみっこ女神に会ったんだから！」
line = "「私たち、デネブに行って、おばあちゃんやちみっこ女神に会ったんだから！」"

[[dialogue]]
speaker = "マトイ"
# 「え？　おばあちゃん……？　女神……？」
line = "「え？　おばあちゃん……？　女神……？」"

[[dialogue]]
speaker = "フィオナ"
# 「本当にいろいろあって、どこから話せばいいか……」
line = "「本当にいろいろあって、どこから話せばいいか……」"

[[dialogue]]
speaker = "クロト"
# 「俺たちもまだ整理しきれてないけど、できるだけ手短に話すよ」
line = "「俺たちもまだ整理しきれてないけど、できるだけ手短に話すよ」"

[[dialogue]]
speaker = "unk"
# デネブで起きた出来事、得た情報は数多い。
line = "デネブで起きた出来事、得た情報は数多い。"

[[dialogue]]
speaker = "unk"
# 転送装置の暴走に巻き込まれ、デネブの流星市国に飛ばされたこと。
line = "転送装置の暴走に巻き込まれ、デネブの流星市国に飛ばされたこと。"

[[dialogue]]
speaker = "unk"
# そこで極星学園の星徒会長・ルヴィネに襲われたこと。
line = "そこで極星学園の星徒会長・ルヴィネに襲われたこと。"

[[dialogue]]
speaker = "unk"
# レジスタンスをしているデネブのアポロと母さんに助けられたこと。
line = "レジスタンスをしているデネブのアポロと母さんに助けられたこと。"

[[dialogue]]
speaker = "unk"
# 俺たちが知る市倉環──守護天使ラクシャが、実はデネブから来たラクシャであったこと。
line = "俺たちが知る市倉環──守護天使ラクシャが、実はデネブから来たラクシャであったこと。"

[[dialogue]]
speaker = "unk"
# ラクシャから聞いたヴィーナスの生い立ちと、梨緒が語ったディザスターハンドの正体。
line = "ラクシャから聞いたヴィーナスの生い立ちと、梨緒が語ったディザスターハンドの正体。"

[[dialogue]]
speaker = "unk"
# ベアトリスが極星学園の星徒会副会長で、アルタイルとデネブを救う道を探してこちらに来たこと。
line = "ベアトリスが極星学園の星徒会副会長で、アルタイルとデネブを救う道を探してこちらに来たこと。"

[[dialogue]]
speaker = "unk"
# 女神の上に創造神『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』が存在し、新たな女神であるルヴィネを生み出したこと。
line = "女神の上に創造神『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』が存在し、新たな女神であるルヴィネを生み出したこと。"

[[dialogue]]
speaker = "unk"
# そしてアポロと母さんの助けで、俺たちはデネブから帰還できたことなど……
line = "そしてアポロと母さんの助けで、俺たちはデネブから帰還できたことなど……"

[[dialogue]]
speaker = "unk"
# デネブで起きた出来事や、知りえた情報の一部始終を新星星徒会のみんなに共有した。
line = "デネブで起きた出来事や、知りえた情報の一部始終を新星星徒会のみんなに共有した。"

[[dialogue]]
speaker = "ベアトリス"
# 「えと、その……私が極星の副会長だってこと、黙っていてすみませんでした！」
line = "「えと、その……私が極星の副会長だってこと、黙っていてすみませんでした！」"

[[dialogue]]
speaker = "アポロ"
# 「ベアトって副会長だったのか！　あんまり副会長っぽくないけどな」
line = "「ベアトって副会長だったのか！　あんまり副会長っぽくないけどな」"

[[dialogue]]
speaker = "サーシャ"
# 「アルタイルとデネブを救うためだったんでしょう？　だったらいいのよ～」
line = "「アルタイルとデネブを救うためだったんでしょう？　だったらいいのよ～」"

[[dialogue]]
speaker = "マトイ"
# 「で、でも本当にいろいろありすぎて、理解が追いつかないよ……」
line = "「で、でも本当にいろいろありすぎて、理解が追いつかないよ……」"

[[dialogue]]
speaker = "アナ"
# 「ディザスターハンドがベガの緋宮会長の成れの果てだったとは……あの強大過ぎる力にも納得がいきます」
line = "「ディザスターハンドがベガの緋宮会長の成れの果てだったとは……あの強大過ぎる力にも納得がいきます」"

[[dialogue]]
speaker = "梨緒"
# 「正体を知りながら、黙っていたことはすまないと思っている。だがアルタイルの緋宮クロトがディザスターハンドになる可能性を少しでも減らすためだったんだ」
line = "「正体を知りながら、黙っていたことはすまないと思っている。だがアルタイルの緋宮クロトがディザスターハンドになる可能性を少しでも減らすためだったんだ」"

[[dialogue]]
speaker = "アナ"
# 「なるほど、それは止むを得ないでしょう。知っていたからといって何か手が打てるわけではありませんでしたし」
line = "「なるほど、それは止むを得ないでしょう。知っていたからといって何か手が打てるわけではありませんでしたし」"

[[dialogue]]
speaker = "サーシャ"
# 「でも今は大丈夫なのよね～？」
line = "「でも今は大丈夫なのよね～？」"

[[dialogue]]
speaker = "クロト"
# 「ああ、今は俺の中の魔王ラクシスの力は封印されている。今は暴走はしないよ」
line = "「ああ、今は俺の中の魔王ラクシスの力は封印されている。今は暴走はしないよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「その封印を解く鍵を持っているのが私ってわけ。ママの力のおかげだわ」
line = "「その封印を解く鍵を持っているのが私ってわけ。ママの力のおかげだわ」"

[[dialogue]]
speaker = "サーシャ"
# 「ヴィーナスちゃんはやっぱり女神様の娘だったのね～」
line = "「ヴィーナスちゃんはやっぱり女神様の娘だったのね～」"

[[dialogue]]
speaker = "アナ"
# 「それに創造神『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』の存在も驚きです。女神テルル様の上に、さらに上位の存在がいたとは思いませんでした」
line = "「それに創造神『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』の存在も驚きです。女神テルル様の上に、さらに上位の存在がいたとは思いませんでした」"

[[dialogue]]
speaker = "アナ"
# 「そして、その『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』に生み出された新たな女神──ルヴィネ。彼女は極星学園の星徒会長でもある、と」
line = "「そして、その『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』に生み出された新たな女神──ルヴィネ。彼女は極星学園の星徒会長でもある、と」"

[[dialogue]]
speaker = "アナ"
# 「事実が明らかになったのは大きな進展ですが、極星学園と力を合わせるのは難しくなってしまったかもしれませんね」
line = "「事実が明らかになったのは大きな進展ですが、極星学園と力を合わせるのは難しくなってしまったかもしれませんね」"

[[dialogue]]
speaker = "マトイ"
# 「でも、アルタイルとデネブのどちらかが滅びないといけないっていうのは嘘だったんだね。平行世界が争う必要なんてなかったんだ……！」
line = "「でも、アルタイルとデネブのどちらかが滅びないといけないっていうのは嘘だったんだね。平行世界が争う必要なんてなかったんだ……！」"

[[dialogue]]
speaker = "unk"
# ルヴィネが明確に敵であった反面、平行世界同士の生存競争という面は否定された。
line = "ルヴィネが明確に敵であった反面、平行世界同士の生存競争という面は否定された。"

[[dialogue]]
speaker = "unk"
# アルタイルもデネブも救うという方針を打ち出した俺たちにとって、それは大きな前進だ。
line = "アルタイルもデネブも救うという方針を打ち出した俺たちにとって、それは大きな前進だ。"

[[dialogue]]
speaker = "アナ"
# 「ところで──そちらの方は？」
line = "「ところで──そちらの方は？」"

[[dialogue]]
speaker = "アポロ"
# 「ああ、アタシもさっきから気になってたんだ」
line = "「ああ、アタシもさっきから気になってたんだ」"

[[dialogue]]
speaker = "unk"
# アナとアポロの視線がエステルに向けられる。
line = "アナとアポロの視線がエステルに向けられる。"

[[dialogue]]
speaker = "unk"
# するとエステルは緊張しながらも、姿勢を正して<ruby=うやうや>恭</ruby>しく頭を下げた。
line = "するとエステルは緊張しながらも、姿勢を正して<ruby>恭<rt>うやうや</rt></ruby>しく頭を下げた。"

[[dialogue]]
speaker = "エステル"
# 「極星学園１年生、エステル・ミルフォードと申します」
line = "「極星学園１年生、エステル・ミルフォードと申します」"

[[dialogue]]
speaker = "アポロ"
# 「極星の……？　どうして極星の生徒がこっちにいるんだ？」
line = "「極星の……？　どうして極星の生徒がこっちにいるんだ？」"

[[dialogue]]
speaker = "クロト"
# 「エステルは極星学園の生徒だけど、俺たちを助けてくれたんだ。デネブに残してくるのは危険だから、一緒にアルタイルに来てもらった」
line = "「エステルは極星学園の生徒だけど、俺たちを助けてくれたんだ。デネブに残してくるのは危険だから、一緒にアルタイルに来てもらった」"

[[dialogue]]
speaker = "エステル"
# 「はい。緋宮クロト様の仰る通りです」
line = "「はい。緋宮クロト様の仰る通りです」"

[[dialogue]]
speaker = "エステル"
# 「私たちの世界では、『魔王クロトはデネブを裏切ってアルタイルに逃げた』と伝えられていましたが……そうではないと知って驚きました」
line = "「私たちの世界では、『魔王クロトはデネブを裏切ってアルタイルに逃げた』と伝えられていましたが……そうではないと知って驚きました」"

[[dialogue]]
speaker = "アナ"
# 「……なるほど。チナさんと話が噛み合わないのはそのせいだったんですね」
line = "「……なるほど。チナさんと話が噛み合わないのはそのせいだったんですね」"

[[dialogue]]
speaker = "エステル"
# 「私もベアトリス副会長と同じく、アルタイルを滅ぼすことは望んでおりません」
line = "「私もベアトリス副会長と同じく、アルタイルを滅ぼすことは望んでおりません」"

[[dialogue]]
speaker = "エステル"
# 「お邪魔かと思いますが、どうかしばらくの間、こちらの世界に置いていただけますと幸いです」
line = "「お邪魔かと思いますが、どうかしばらくの間、こちらの世界に置いていただけますと幸いです」"

[[dialogue]]
speaker = "ベアトリス"
# 「そ、そうなの！　エステルちゃんはすっごくいい子で、スパイとかじゃないから！」
line = "「そ、そうなの！　エステルちゃんはすっごくいい子で、スパイとかじゃないから！」"

[[dialogue]]
speaker = "ナターシャ"
# 「そう言うと逆にスパイっぽいよ？」
line = "「そう言うと逆にスパイっぽいよ？」"

[[dialogue]]
speaker = "ベアトリス"
# 「ええっ！？　じゃあどうしたらいいの！？」
line = "「ええっ！？　じゃあどうしたらいいの！？」"

[[dialogue]]
speaker = "梨緒"
# 「こら、茶化すなナターシャ」
line = "「こら、茶化すなナターシャ」"

[[dialogue]]
speaker = "梨緒"
# 「デネブで極星従騎から逃げる時、エステルが私たちを先導してくれたんだ。彼女がいなければデネブから脱出できなかったかもしれない」
line = "「デネブで極星従騎から逃げる時、エステルが私たちを先導してくれたんだ。彼女がいなければデネブから脱出できなかったかもしれない」"

[[dialogue]]
speaker = "フィオナ"
# 「そうですね。もしエステルさんが私たちの敵なら、いつでも私たちの背中を攻撃できたはずです。私はエステルさんを信じています」
line = "「そうですね。もしエステルさんが私たちの敵なら、いつでも私たちの背中を攻撃できたはずです。私はエステルさんを信じています」"

[[dialogue]]
speaker = "サーシャ"
# 「なるほど～。なら大丈夫そうね～」
line = "「なるほど～。なら大丈夫そうね～」"

[[dialogue]]
speaker = "マトイ"
# 「うん、私も信じるよ。エステルさん、見るからに清楚で、嘘をついたり騙したりって感じじゃないしね」
line = "「うん、私も信じるよ。エステルさん、見るからに清楚で、嘘をついたり騙したりって感じじゃないしね」"

[[dialogue]]
speaker = "マトイ"
# 「それに私たちは極星学園と一緒にリクリエと戦いたいって考えてたんだから、その第一歩だよ」
line = "「それに私たちは極星学園と一緒にリクリエと戦いたいって考えてたんだから、その第一歩だよ」"

[[dialogue]]
speaker = "エステル"
# 「ありがとうございます、皆様」
line = "「ありがとうございます、皆様」"

[[dialogue]]
speaker = "フィオナ"
# 「エステルさんはこちらに住まいがありませんし、アルタイルにいる間、星見家に滞在していただこうと思います。姉さんもいいですよね？」
line = "「エステルさんはこちらに住まいがありませんし、アルタイルにいる間、星見家に滞在していただこうと思います。姉さんもいいですよね？」"

[[dialogue]]
speaker = "アポロ"
# 「もちろんだ。うちは広いからな！」
line = "「もちろんだ。うちは広いからな！」"

[[dialogue]]
speaker = "エステル"
# 「ではお言葉に甘えさせていただきますね。よろしくお願いいたします」
line = "「ではお言葉に甘えさせていただきますね。よろしくお願いいたします」"

[[dialogue]]
speaker = "アポロ"
# 「ああ、こっちこそよろしくなっ」
line = "「ああ、こっちこそよろしくなっ」"

[[dialogue]]
speaker = "unk"
# また深々と頭を下げるエステル。
line = "また深々と頭を下げるエステル。"

[[dialogue]]
speaker = "unk"
# 成り行きでエステルを巻き込んでしまったけど、行き場がないことにならなくてひとまず安心したのだった。
line = "成り行きでエステルを巻き込んでしまったけど、行き場がないことにならなくてひとまず安心したのだった。"
