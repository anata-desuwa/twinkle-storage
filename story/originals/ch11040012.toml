[[dialogue]]
speaker = "unk"
# 第２話,憑依型女優の真骨頂（後編）,P
line = "第２話,憑依型女優の真骨頂（後編）,P"

[[dialogue]]
speaker = "レミカ"
# 「うーん……ちょっとヤバいかも……？　ぶっちゃけ、藍の役ってストーリーに密接に関わるわけじゃないから、いなくてもあまり問題ないし……」
line = "「うーん……ちょっとヤバいかも……？　ぶっちゃけ、藍の役ってストーリーに密接に関わるわけじゃないから、いなくてもあまり問題ないし……」"

[[dialogue]]
speaker = "レミカ"
# 「撮影時間も限られてるから、監督さんもいっそ外しちゃおうかなんて話も出てる。藍にはどうにか本領を発揮してもらいたいんだけど……」
line = "「撮影時間も限られてるから、監督さんもいっそ外しちゃおうかなんて話も出てる。藍にはどうにか本領を発揮してもらいたいんだけど……」"

[[dialogue]]
speaker = "藍"
# 「その方が、いいですよね……私１人のために、皆さんに迷惑をかけちゃいますし……」
line = "「その方が、いいですよね……私１人のために、皆さんに迷惑をかけちゃいますし……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「もうっ、何をやってるのよ、藍！　いっそ私が出てやろうかしら！」
line = "「もうっ、何をやってるのよ、藍！　いっそ私が出てやろうかしら！」"

[[dialogue]]
speaker = "レミカ"
# 「あはは……ヴィ―ナス、メンタル強すぎでしょ。ヴィーナスの心臓に生えてる毛を、藍に分けてあげられたらいいのにね」
line = "「あはは……ヴィ―ナス、メンタル強すぎでしょ。ヴィーナスの心臓に生えてる毛を、藍に分けてあげられたらいいのにね」"

[[dialogue]]
speaker = "unk"
# それだ！
line = "それだ！"

[[dialogue]]
speaker = "ヴィーナス"
# 「私の毛を、藍に植えるの？」
line = "「私の毛を、藍に植えるの？」"

[[dialogue]]
speaker = "unk"
# そうじゃなくて！　藍！
line = "そうじゃなくて！　藍！"

[[dialogue]]
speaker = "藍"
# 「は、はいっ！　な、なんでしょう？」
line = "「は、はいっ！　な、なんでしょう？」"

[[dialogue]]
speaker = "unk"
# その上でドラマの役になるんだ！
line = "その上でドラマの役になるんだ！"

[[dialogue]]
speaker = "unk"
# 豪胆なヴィーナスになりきれ！
line = "豪胆なヴィーナスになりきれ！"

[[dialogue]]
speaker = "藍"
# 「ヴィーナス先輩にですか！？　そ、そそ、そんな、恐れ多いです……！」
line = "「ヴィーナス先輩にですか！？　そ、そそ、そんな、恐れ多いです……！」"

[[dialogue]]
speaker = "レミカ"
# 「無茶言うね、会長。ヴィーナスに扮した上にドラマの役まで演じる二重演技なんて──」
line = "「無茶言うね、会長。ヴィーナスに扮した上にドラマの役まで演じる二重演技なんて──」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ナイスアイデアじゃない！　全然構わないわ！　むしろ、私のモノマネなんて是非見てみたいわね！」
line = "「ナイスアイデアじゃない！　全然構わないわ！　むしろ、私のモノマネなんて是非見てみたいわね！」"

[[dialogue]]
speaker = "藍"
# 「そうですか……？　ヴィーナス先輩さえ構わないのでしたら、あの……少しお話を伺っても……？」
line = "「そうですか……？　ヴィーナス先輩さえ構わないのでしたら、あの……少しお話を伺っても……？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええ、スリーサイズからお風呂ではどこから洗うかまで、なんでも教えてあげるわ！」
line = "「ええ、スリーサイズからお風呂ではどこから洗うかまで、なんでも教えてあげるわ！」"

[[dialogue]]
speaker = "レミカ"
# 「……藍、できるの？」
line = "「……藍、できるの？」"

[[dialogue]]
speaker = "藍"
# 「えっ？　はい、少し時間はかかってしまうと思いますけど、やってやれないことはないと思います……」
line = "「えっ？　はい、少し時間はかかってしまうと思いますけど、やってやれないことはないと思います……」"

[[dialogue]]
speaker = "レミカ"
# 「そっか……そうなんだ。藍って期待してた通り、凄い子なんだね。藍の準備できるまで、ちょっとだけ時間稼いであげる」
line = "「そっか……そうなんだ。藍って期待してた通り、凄い子なんだね。藍の準備できるまで、ちょっとだけ時間稼いであげる」"

[[dialogue]]
speaker = "unk"
# レミカが稼いでくれている出番待ちの間に、藍は開けっぴろげなヴィーナスに聞き取りをした。
line = "レミカが稼いでくれている出番待ちの間に、藍は開けっぴろげなヴィーナスに聞き取りをした。"

[[dialogue]]
speaker = "unk"
# ２人の間でどんな話がされていたのかはわからないけど──
line = "２人の間でどんな話がされていたのかはわからないけど──"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふぅ……すごい質問責めだったわ！」
line = "「ふぅ……すごい質問責めだったわ！」"

[[dialogue]]
speaker = "藍"
# 「私はヴィーナス先輩……私はヴィーナス……九浄ヴィーナス……！」
line = "「私はヴィーナス先輩……私はヴィーナス……九浄ヴィーナス……！」"

[[dialogue]]
speaker = "レミカ"
# 「藍、そろそろ出番だけど大丈夫？」
line = "「藍、そろそろ出番だけど大丈夫？」"

[[dialogue]]
speaker = "藍"
# 「──ええ、大丈夫よ、レミカ！」
line = "「──ええ、大丈夫よ、レミカ！」"

[[dialogue]]
speaker = "レミカ"
# 「えっ……！？　藍だよね！？」
line = "「えっ……！？　藍だよね！？」"

[[dialogue]]
speaker = "藍"
# 「あはは、おかしなこと言うのね！　さ、行きましょ！」
line = "「あはは、おかしなこと言うのね！　さ、行きましょ！」"

[[dialogue]]
speaker = "unk"
# そして、藍とレミカのシーンが再開された。
line = "そして、藍とレミカのシーンが再開された。"

[[dialogue]]
speaker = "レミカ"
# 「──ごめんなさい。いきなりアイドルグループになんて勧誘されても困るよね」
line = "「──ごめんなさい。いきなりアイドルグループになんて勧誘されても困るよね」"

[[dialogue]]
speaker = "藍"
# 「そんなことないわ！　でも、私にはグループなんて絶対に無理よ！」
line = "「そんなことないわ！　でも、私にはグループなんて絶対に無理よ！」"

[[dialogue]]
speaker = "藍"
# 「だって──私が目指すのは、夜空に燦然と輝く一番星！　そのためにもアイドル活動はソロでやらなきゃ、でしょ？」
line = "「だって──私が目指すのは、夜空に燦然と輝く一番星！　そのためにもアイドル活動はソロでやらなきゃ、でしょ？」"

[[dialogue]]
speaker = "レミカ"
# 「ちょっ、めちゃくちゃアドリブ──ぷっ、ふふ、あは、あはは、あははははははっ！」
line = "「ちょっ、めちゃくちゃアドリブ──ぷっ、ふふ、あは、あはは、あははははははっ！」"

[[dialogue]]
speaker = "レミカ"
# 「つまり、私とあなたは宇宙最高のアイドルを競うライバルということだね！　面白いじゃない！」
line = "「つまり、私とあなたは宇宙最高のアイドルを競うライバルということだね！　面白いじゃない！」"

[[dialogue]]
speaker = "藍"
# 「そうよ！　宇宙最高のアイドルの座は、絶対に譲ってあげないんだから！　覚悟しなさい！」
line = "「そうよ！　宇宙最高のアイドルの座は、絶対に譲ってあげないんだから！　覚悟しなさい！」"

[[dialogue]]
speaker = "監督"
# 「おいおい、あの子、本当にさっきと同じ子？　あんなイカした演技できるんなら最初からやってよぉ！」
line = "「おいおい、あの子、本当にさっきと同じ子？　あんなイカした演技できるんなら最初からやってよぉ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あははっ！　全然違う話になってるけど、こっちの方が断然面白いわね！」
line = "「あははっ！　全然違う話になってるけど、こっちの方が断然面白いわね！」"

[[dialogue]]
speaker = "unk"
# ヴィーナス、なんかしたの？
line = "ヴィーナス、なんかしたの？"

[[dialogue]]
speaker = "ヴィーナス"
# 「特に何もしてないわ。１０分くらい、藍とお話しただけよ」
line = "「特に何もしてないわ。１０分くらい、藍とお話しただけよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私のプロフィールや口調を教えただけで、性格をトレースしたみたいね。あの子、面白いわ！　ますます気に入っちゃった！」
line = "「私のプロフィールや口調を教えただけで、性格をトレースしたみたいね。あの子、面白いわ！　ますます気に入っちゃった！」"

[[dialogue]]
speaker = "unk"
# 物怖じしないヴィーナスのメンタルを宿し、アドリブまみれな改変をやらかしながらも、藍は現場を乗り切ったのである。
line = "物怖じしないヴィーナスのメンタルを宿し、アドリブまみれな改変をやらかしながらも、藍は現場を乗り切ったのである。"

[[dialogue]]
speaker = "藍"
# 「あっ、会長さん、おはようございます。ドラマ、観てくれてますか？」
line = "「あっ、会長さん、おはようございます。ドラマ、観てくれてますか？」"

[[dialogue]]
speaker = "unk"
# 毎週、楽しみにしてるよ
line = "毎週、楽しみにしてるよ"

[[dialogue]]
speaker = "藍"
# 「あの撮影のおかげで、チョイ役だったはずが、準レギュラーに昇格したんです」
line = "「あの撮影のおかげで、チョイ役だったはずが、準レギュラーに昇格したんです」"

[[dialogue]]
speaker = "藍"
# 「私が目立ったせいで、ドラマの脚本は大幅変更になっちゃったみたいですけど、大好評だから結果オーライだそうで」
line = "「私が目立ったせいで、ドラマの脚本は大幅変更になっちゃったみたいですけど、大好評だから結果オーライだそうで」"

[[dialogue]]
speaker = "藍"
# 「次の収録はレミカ先輩と直接対決なんです。実際に本気で戦って、結果次第で結末が変わるかもしれないんです。頑張ってきますね！」
line = "「次の収録はレミカ先輩と直接対決なんです。実際に本気で戦って、結果次第で結末が変わるかもしれないんです。頑張ってきますね！」"

[[dialogue]]
speaker = "unk"
# 陰ながら応援してるね！
line = "陰ながら応援してるね！"

[[dialogue]]
speaker = "藍"
# 「ありがとうございます。でも、陰ながらじゃなくて、大っぴらに応援してくれていいんですよ？」
line = "「ありがとうございます。でも、陰ながらじゃなくて、大っぴらに応援してくれていいんですよ？」"

[[dialogue]]
speaker = "unk"
# 藍とレミカの出演したドラマは高視聴率をマークした。
line = "藍とレミカの出演したドラマは高視聴率をマークした。"

[[dialogue]]
speaker = "unk"
# 主役のレミカと並ぶ存在感を見せつけた藍の名は瞬く間に広がり、所属事務所『ポラリスプロダクション』の名はまた大きく広まったのだった。
line = "主役のレミカと並ぶ存在感を見せつけた藍の名は瞬く間に広がり、所属事務所『ポラリスプロダクション』の名はまた大きく広まったのだった。"
