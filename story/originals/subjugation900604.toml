[[dialogue]]
speaker = "シャロン"
# 「住宅街でモンスターが出現したようです。行きましょう、会長さまっ！」
line = "「住宅街でモンスターが出現したようです。行きましょう、会長さまっ！」"

[[dialogue]]
speaker = "イレーナ"
# 「待って、あたしも……！」
line = "「待って、あたしも……！」"

[[dialogue]]
speaker = "シャロン"
# 「いえ、イレーナさまの手を煩わせはしません。私と会長さまで対処いたしますから」
line = "「いえ、イレーナさまの手を煩わせはしません。私と会長さまで対処いたしますから」"

[[dialogue]]
speaker = "イレーナ"
# 「でも──」
line = "「でも──」"

[[dialogue]]
speaker = "シャロン"
# 「聖女なんてやりたくないと仰っていたではありませんか。良いのですよ。イレーナさまはもう、ご無理をなさる必要はないんです」
line = "「聖女なんてやりたくないと仰っていたではありませんか。良いのですよ。イレーナさまはもう、ご無理をなさる必要はないんです」"

[[dialogue]]
speaker = "シャロン"
# 「イレーナさまは今までご立派に聖女としての務めを果たしておられました。女神様もきっとお咎めはしないでしょう」
line = "「イレーナさまは今までご立派に聖女としての務めを果たしておられました。女神様もきっとお咎めはしないでしょう」"

[[dialogue]]
speaker = "シャロン"
# 「──ですがひとつだけお伝えしたいことがあります」
line = "「──ですがひとつだけお伝えしたいことがあります」"

[[dialogue]]
speaker = "シャロン"
# 「たとえ立場ゆえの行いだったとしても、私はイレーナさまに助けていただいて感謝しています。とても嬉しかったです」
line = "「たとえ立場ゆえの行いだったとしても、私はイレーナさまに助けていただいて感謝しています。とても嬉しかったです」"

[[dialogue]]
speaker = "シャロン"
# 「イレーナさまがご自身を偽りの聖女だと仰っても、私の気持ちはかわりません。決して怒ってなどいませんよ」
line = "「イレーナさまがご自身を偽りの聖女だと仰っても、私の気持ちはかわりません。決して怒ってなどいませんよ」"

[[dialogue]]
speaker = "イレーナ"
# 「──！」
line = "「──！」"

[[dialogue]]
speaker = "シャロン"
# 「では今度こそ参りましょう、会長さま」
line = "「では今度こそ参りましょう、会長さま」"

[[dialogue]]
speaker = "unk"
# ああ、急ごうっ！
line = "ああ、急ごうっ！"

[[dialogue]]
speaker = "イレーナ"
# 「あ、ちょっ……」
line = "「あ、ちょっ……」"

[[dialogue]]
speaker = "イレーナ"
# 「行っちゃった……」
line = "「行っちゃった……」"

[[dialogue]]
speaker = "イレーナ"
# 「ま、もう戦わなくていいって言うならそうさせてもらうけど。痛い目に遭うのも懲り懲りだし」
line = "「ま、もう戦わなくていいって言うならそうさせてもらうけど。痛い目に遭うのも懲り懲りだし」"

[[dialogue]]
speaker = "イレーナ"
# 「そうよ、戦いなんてやりたいやつがやればいいのよ。シャロンのことなんてどうでも……」
line = "「そうよ、戦いなんてやりたいやつがやればいいのよ。シャロンのことなんてどうでも……」"

[[dialogue]]
speaker = "イレーナ"
# 「どうでも……」
line = "「どうでも……」"

[[dialogue]]
speaker = "シャロン"
# 「はぁぁぁああああーっっ！！」
line = "「はぁぁぁああああーっっ！！」"

[[dialogue]]
speaker = "シャロン"
# 「はぁっ、はぁっ。想像以上に敵の数が多いですね……」
line = "「はぁっ、はぁっ。想像以上に敵の数が多いですね……」"

[[dialogue]]
speaker = "子どもＡ"
# 「助けてー！」
line = "「助けてー！」"

[[dialogue]]
speaker = "シャロン"
# 「！？　子どもたちが巻き込まれて……一刻も早くお助けしなくては……！」
line = "「！？　子どもたちが巻き込まれて……一刻も早くお助けしなくては……！」"

[[dialogue]]
speaker = "シャロン"
# 「ですがあの大型モンスター……」
line = "「ですがあの大型モンスター……」"

[[dialogue]]
speaker = "シャロン"
# 「何度も攻撃を入れているのにビクともしていません……。どうやら私の力では、あのモンスターは……」
line = "「何度も攻撃を入れているのにビクともしていません……。どうやら私の力では、あのモンスターは……」"

[[dialogue]]
speaker = "unk"
# とにかく今はできることをしよう
line = "とにかく今はできることをしよう"

[[dialogue]]
speaker = "シャロン"
# 「はいっ。子どもたちの保護と避難を優先いたしましょう」
line = "「はいっ。子どもたちの保護と避難を優先いたしましょう」"

[[dialogue]]
speaker = "シャロン"
# 「モンスターは私が引きつけますっ。会長さまは子どもたちの避難を──！！」
line = "「モンスターは私が引きつけますっ。会長さまは子どもたちの避難を──！！」"

[[dialogue]]
speaker = "unk"
# さぁみんなこっちだ！
line = "さぁみんなこっちだ！"

[[dialogue]]
speaker = "子どもＡ"
# 「ふえ～ん、怖かったよ～」
line = "「ふえ～ん、怖かったよ～」"

[[dialogue]]
speaker = "子どもＢ"
# 「星騎士のお兄さん、ありがとー！」
line = "「星騎士のお兄さん、ありがとー！」"

[[dialogue]]
speaker = "シャロン"
# 「くっ……！　やはり私の攻撃が効いておりません……！」
line = "「くっ……！　やはり私の攻撃が効いておりません……！」"

[[dialogue]]
speaker = "シャロン"
# 「会長さまっ、子どもたちは……！」
line = "「会長さまっ、子どもたちは……！」"

[[dialogue]]
speaker = "unk"
# みんな無事だ！
line = "みんな無事だ！"

[[dialogue]]
speaker = "シャロン"
# 「良かった！　ならば我々もこのまま少しずつ後退いたしましょう！　退路を確保しながら救援を待って──」
line = "「良かった！　ならば我々もこのまま少しずつ後退いたしましょう！　退路を確保しながら救援を待って──」"

[[dialogue]]
speaker = "子どもＣ"
# 「ふえ～んっ。行かないで、シスターさまぁ～」
line = "「ふえ～んっ。行かないで、シスターさまぁ～」"

[[dialogue]]
speaker = "シャロン"
# 「！　女の子が一人取り残されてっ──」
line = "「！　女の子が一人取り残されてっ──」"

[[dialogue]]
speaker = "子どもＣ"
# 「きゃああああああっっ！！？」
line = "「きゃああああああっっ！！？」"

[[dialogue]]
speaker = "シャロン"
# 「いけませんっっ！！」
line = "「いけませんっっ！！」"

[[dialogue]]
speaker = "unk"
# シャロン、危ない！
line = "シャロン、危ない！"

[[dialogue]]
speaker = "イレーナ"
# 「このバカっ！！」
line = "「このバカっ！！」"

[[dialogue]]
speaker = "シャロン"
# 「えっ？　──きゃあっ！！？」
line = "「えっ？　──きゃあっ！！？」"

[[dialogue]]
speaker = "イレーナ"
# 「ぐぅっ……！！」
line = "「ぐぅっ……！！」"

[[dialogue]]
speaker = "シャロン"
# 「イレーナさまっ！？　どうしてここへ……！？　それに私たちを庇って……！？」
line = "「イレーナさまっ！？　どうしてここへ……！？　それに私たちを庇って……！？」"

[[dialogue]]
speaker = "イレーナ"
# 「うっさいわね……！　子どもごとあんたがやられたら、ぐっ、無駄に怪我人が増えるだけじゃない……！」
line = "「うっさいわね……！　子どもごとあんたがやられたら、ぐっ、無駄に怪我人が増えるだけじゃない……！」"

[[dialogue]]
speaker = "イレーナ"
# 「それよりさっさとコイツを倒しなさいよ……！　このままだと３人ともマジでやられちゃうでしょっ……！」
line = "「それよりさっさとコイツを倒しなさいよ……！　このままだと３人ともマジでやられちゃうでしょっ……！」"

[[dialogue]]
speaker = "シャロン"
# 「ですが私の力ではこの敵は──」
line = "「ですが私の力ではこの敵は──」"

[[dialogue]]
speaker = "イレーナ"
# 「四の五の言わずにやりなさい！　あんたがやらなきゃ誰がやるのよっ！」
line = "「四の五の言わずにやりなさい！　あんたがやらなきゃ誰がやるのよっ！」"

[[dialogue]]
speaker = "イレーナ"
# 「それとも何っ？　あんたが信じる女神様ってのは、こんな時に力のひとつも貸してくれないクソ野郎なのっ！？」
line = "「それとも何っ？　あんたが信じる女神様ってのは、こんな時に力のひとつも貸してくれないクソ野郎なのっ！？」"

[[dialogue]]
speaker = "シャロン"
# 「っ……！！　いいえ、そのようなことは決してっ……」
line = "「っ……！！　いいえ、そのようなことは決してっ……」"

[[dialogue]]
speaker = "シャロン"
# 「決して──ありませんっっ！！」
line = "「決して──ありませんっっ！！」"

[[dialogue]]
speaker = "シャロン"
# 「ああ──感じます。女神様の確かな愛を。お力を」
line = "「ああ──感じます。女神様の確かな愛を。お力を」"

[[dialogue]]
speaker = "シャロン"
# 「見ていてください、イレーナさま。私が今ここで証明してみせます」
line = "「見ていてください、イレーナさま。私が今ここで証明してみせます」"

[[dialogue]]
speaker = "シャロン"
# 「女神様の愛の実在を。私たちは皆、女神様に愛されているのだということを──！！」
line = "「女神様の愛の実在を。私たちは皆、女神様に愛されているのだということを──！！」"

[[dialogue]]
speaker = "シャロン"
# 「セレスティアルキャレス！！」
line = "「セレスティアルキャレス！！」"

[[dialogue]]
speaker = "イレーナ"
# 「はぁ、はぁ。やれば、できるじゃない……。ちゃんと撃退できた、ようね……」
line = "「はぁ、はぁ。やれば、できるじゃない……。ちゃんと撃退できた、ようね……」"

[[dialogue]]
speaker = "シャロン"
# 「イレーナ、さま……？　っっ！！　しっかりしてください、イレーナさまっっ！！」
line = "「イレーナ、さま……？　っっ！！　しっかりしてください、イレーナさまっっ！！」"

[[dialogue]]
speaker = "シャロン"
# 「イレーナさまぁああああ～～っ！！」
line = "「イレーナさまぁああああ～～っ！！」"
