[[dialogue]]
speaker = "unk"
# 第４話,妄想天使でもいいですか？,P
line = "第４話,妄想天使でもいいですか？,P"

[[dialogue]]
speaker = "unk"
# 最近、（いろんな意味で）イクシーから目が離せなくなっていた。
line = "最近、（いろんな意味で）イクシーから目が離せなくなっていた。"

[[dialogue]]
speaker = "イクシリオン"
# 「すみません、ブレンドコーヒーとクリームパイを──」
line = "「すみません、ブレンドコーヒーとクリームパイを──」"

[[dialogue]]
speaker = "イクシリオン"
# 「クリームパイ……期間限定とろとろクリームパイ……とろとろのクリーム……」
line = "「クリームパイ……期間限定とろとろクリームパイ……とろとろのクリーム……」"

[[dialogue]]
speaker = "ヨミ"
# （どうしてクリームパイを凝視しているんでしょうか？　ハッ──まさかそういう意味で……？）
line = "（どうしてクリームパイを凝視しているんでしょうか？　ハッ──まさかそういう意味で……？）"

[[dialogue]]
speaker = "ヨミ"
# （前々から思っていたのですけれど……イクシーさんって何だかとってもむっつりさんのような……？）
line = "（前々から思っていたのですけれど……イクシーさんって何だかとってもむっつりさんのような……？）"

[[dialogue]]
speaker = "ヨミ"
# （いやいやいや！　きっとわたしの心が汚れてるからそう感じるだけ……真面目なイクシーさんに限ってそんなことありません！　心頭滅却、邪念必滅……！）
line = "（いやいやいや！　きっとわたしの心が汚れてるからそう感じるだけ……真面目なイクシーさんに限ってそんなことありません！　心頭滅却、邪念必滅……！）"

[[dialogue]]
speaker = "イクシリオン"
# （とろとろクリームパイがエッチに感じてしまったなんて、とても言えません……！）
line = "（とろとろクリームパイがエッチに感じてしまったなんて、とても言えません……！）"

[[dialogue]]
speaker = "unk"
# 他にも……
line = "他にも……"

[[dialogue]]
speaker = "イクシリオン"
# 「刹那的な出会いをした若い男女……きっと２人はこの後ホテルに入ってあんなことやこんなことを……」
line = "「刹那的な出会いをした若い男女……きっと２人はこの後ホテルに入ってあんなことやこんなことを……」"

[[dialogue]]
speaker = "イクシリオン"
# 「いえいえ、そんなこと小説に書いてないのに勝手に想像してはいけません。爽やかな青春を描いた作品なのですから……」
line = "「いえいえ、そんなこと小説に書いてないのに勝手に想像してはいけません。爽やかな青春を描いた作品なのですから……」"

[[dialogue]]
speaker = "イクシリオン"
# 「ムフフ……」
line = "「ムフフ……」"

[[dialogue]]
speaker = "モネ"
# 「イクシーさん」
line = "「イクシーさん」"

[[dialogue]]
speaker = "イクシリオン"
# 「ひゃわっ！？　どうされましたか？」
line = "「ひゃわっ！？　どうされましたか？」"

[[dialogue]]
speaker = "モネ"
# 「読書に夢中になっているところ邪魔をしてすみません。イクシーさんがこの前読みたい本と言っていた本が図書館に入ったので、その報告に」
line = "「読書に夢中になっているところ邪魔をしてすみません。イクシーさんがこの前読みたい本と言っていた本が図書館に入ったので、その報告に」"

[[dialogue]]
speaker = "イクシリオン"
# 「本当ですかっ、ありがとうございますっ」
line = "「本当ですかっ、ありがとうございますっ」"

[[dialogue]]
speaker = "モネ"
# 「あ、イクシーさんは今その小説を読んでるんですね。私も前に読んだんですけど、素敵なお話でした。淡泊ながら奥の深い描写に想像力が刺激されます」
line = "「あ、イクシーさんは今その小説を読んでるんですね。私も前に読んだんですけど、素敵なお話でした。淡泊ながら奥の深い描写に想像力が刺激されます」"

[[dialogue]]
speaker = "イクシリオン"
# 「ですよね。熱く退廃的な夜が目に浮かぶようで──」
line = "「ですよね。熱く退廃的な夜が目に浮かぶようで──」"

[[dialogue]]
speaker = "モネ"
# 「え？」
line = "「え？」"

[[dialogue]]
speaker = "イクシリオン"
# 「はえ？」
line = "「はえ？」"

[[dialogue]]
speaker = "イクシリオン"
# 「会長、ごきげんよう。私に何かご用ですか？」
line = "「会長、ごきげんよう。私に何かご用ですか？」"

[[dialogue]]
speaker = "unk"
# 校舎裏でちょっと話そう
line = "校舎裏でちょっと話そう"

[[dialogue]]
speaker = "イクシリオン"
# 「はい、わかりました──って、ぇええっ、校舎裏！？」
line = "「はい、わかりました──って、ぇええっ、校舎裏！？」"

[[dialogue]]
speaker = "イクシリオン"
# 「そんな人目に付かない場所に呼び出すだなんて……昼間でも薄暗くって、声を出さなきゃバレない絶好のシチュエーション……！」
line = "「そんな人目に付かない場所に呼び出すだなんて……昼間でも薄暗くって、声を出さなきゃバレない絶好のシチュエーション……！」"

[[dialogue]]
speaker = "イクシリオン"
# 「そそそっ、そんないやらしいところ、いけませ～んっ！」
line = "「そそそっ、そんないやらしいところ、いけませ～んっ！」"

[[dialogue]]
speaker = "unk"
# ………………
line = "………………"

[[dialogue]]
speaker = "イクシリオン"
# 「ハッ！？　その、いやらしいというのは、エッチという意味ではなくて──」
line = "「ハッ！？　その、いやらしいというのは、エッチという意味ではなくて──」"

[[dialogue]]
speaker = "unk"
# エッチな意味なんだよな？
line = "エッチな意味なんだよな？"

[[dialogue]]
speaker = "イクシリオン"
# 「あ……うぅ……そうです。私はエッチなことばかり……あと食べることしか考えていない、いやらしい女なんです……」
line = "「あ……うぅ……そうです。私はエッチなことばかり……あと食べることしか考えていない、いやらしい女なんです……」"

[[dialogue]]
speaker = "イクシリオン"
# 「自分で言うのもなんですけど、人間界に来た頃は真面目な天使だったんです。ですが流星市国で偶然手にした少女漫画が……その、とても過激で」
line = "「自分で言うのもなんですけど、人間界に来た頃は真面目な天使だったんです。ですが流星市国で偶然手にした少女漫画が……その、とても過激で」"

[[dialogue]]
speaker = "イクシリオン"
# 「それがきっかけで性的なものへの興味がどんどん強くなっていって……エッチな作品を集めるようになって……今ではよく妄想にふけるようになりました」
line = "「それがきっかけで性的なものへの興味がどんどん強くなっていって……エッチな作品を集めるようになって……今ではよく妄想にふけるようになりました」"

[[dialogue]]
speaker = "イクシリオン"
# 「お願いです、このことは誰にも言わないで──」
line = "「お願いです、このことは誰にも言わないで──」"

[[dialogue]]
speaker = "イクシリオン"
# 「ハッ！？　これは会長に弱みを握られて、エッチな要求をされる流れでは！？」
line = "「ハッ！？　これは会長に弱みを握られて、エッチな要求をされる流れでは！？」"

[[dialogue]]
speaker = "イクシリオン"
# 「言うことを聞かないと秘密をバラすと脅されて、会長に命令されるまま服を脱いだり、ご奉仕をしたり……ごくり」
line = "「言うことを聞かないと秘密をバラすと脅されて、会長に命令されるまま服を脱いだり、ご奉仕をしたり……ごくり」"

[[dialogue]]
speaker = "unk"
# そういうことしてみたい？
line = "そういうことしてみたい？"

[[dialogue]]
speaker = "イクシリオン"
# 「へ……？」
line = "「へ……？」"

[[dialogue]]
speaker = "イクシリオン"
# 「とてもお恥ずかしい話なんですが……本心で言うと……」
line = "「とてもお恥ずかしい話なんですが……本心で言うと……」"

[[dialogue]]
speaker = "イクシリオン"
# 「してみたい……です」
line = "「してみたい……です」"

[[dialogue]]
speaker = "イクシリオン"
# 「お外で裸になったり、エッチな命令をされたり、大人のおもちゃを使ったり……したいです」
line = "「お外で裸になったり、エッチな命令をされたり、大人のおもちゃを使ったり……したいです」"

[[dialogue]]
speaker = "unk"
# なら俺がイクシーの相手をする！
line = "なら俺がイクシーの相手をする！"

[[dialogue]]
speaker = "イクシリオン"
# 「えええぇ～～～～～っ！！？」
line = "「えええぇ～～～～～っ！！？」"

[[dialogue]]
speaker = "イクシリオン"
