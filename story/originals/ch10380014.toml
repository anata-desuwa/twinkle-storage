line = "「会長が、私の……それは、その……嬉しいです。ありがとうございます……」"

[[dialogue]]
speaker = "イクシリオン"
# 「でもいいんですか？　私、とってもいやらしい女の子ですから、会長が付き合いきれなくなってしまうかもしれませんよ？」
line = "「でもいいんですか？　私、とってもいやらしい女の子ですから、会長が付き合いきれなくなってしまうかもしれませんよ？」"

