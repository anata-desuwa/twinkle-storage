speaker = "unk"
# 悪戯っぽく舌を出して笑ってから、俺の唇に小さくキスをするミヤハルなのだった――
line = "悪戯っぽく舌を出して笑ってから、俺の唇に小さくキスをするミヤハルなのだった――"
