line = "「はあぁぁっ……<emoji=heart04>　見られながらのセックス、気持ちよかったわぁ～……<emoji=heart04>」"

[[dialogue]]
speaker = "ミヤハル"
# 「んっ……<emoji=heart04>　会長はんの精液、入りきらなくて、おま○こから溢れて来てもうた……<emoji=heart04>」
line = "「んっ……<emoji=heart04>　会長はんの精液、入りきらなくて、おま○こから溢れて来てもうた……<emoji=heart04>」"

[[dialogue]]
speaker = "ミヤハル"
# 「ふふふっ<emoji=heart04>　さすがはうちの惚れたおち○ぽ様やね<emoji=heart04>　いっぱい出してもろうて、女の幸せ感じてまうわぁ……<emoji=heart04>」
line = "「ふふふっ<emoji=heart04>　さすがはうちの惚れたおち○ぽ様やね<emoji=heart04>　いっぱい出してもろうて、女の幸せ感じてまうわぁ……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
# 「うぅぅ……この後、あの２人にどういう顔して会えば……？」
line = "「うぅぅ……この後、あの２人にどういう顔して会えば……？」"

[[dialogue]]
speaker = "unk"
# 射精を終えて冷静さが戻って来た俺は、ルリエルとマトイに見られてしまったことを思い返し、頭を抱える。
line = "射精を終えて冷静さが戻って来た俺は、ルリエルとマトイに見られてしまったことを思い返し、頭を抱える。"

[[dialogue]]
speaker = "ミヤハル"
# 「でも、本当に人に見られながらの青姦セックス、堪らんかったわぁ<emoji=heart04>」
line = "「でも、本当に人に見られながらの青姦セックス、堪らんかったわぁ<emoji=heart04>」"

[[dialogue]]
speaker = "ミヤハル"
# 「アカンのにうち、またしたくなってまうかも……<emoji=heart04>」
line = "「アカンのにうち、またしたくなってまうかも……<emoji=heart04>」"

[[dialogue]]
speaker = "ミヤハル"
# 「定期的にセックスを鑑賞してもらえないか、２人に相談してもええやろか……？」
line = "「定期的にセックスを鑑賞してもらえないか、２人に相談してもええやろか……？」"

[[dialogue]]
speaker = "クロト"
# 「セクハラなんて次元じゃないから、絶対にやめてくれ……！」
line = "「セクハラなんて次元じゃないから、絶対にやめてくれ……！」"

[[dialogue]]
speaker = "ミヤハル"
# 「ふふっ<emoji=heart04>　冗談やよ<emoji=heart04>　……２人には後でちゃんと謝っておくさかい、堪忍な？」
line = "「ふふっ<emoji=heart04>　冗談やよ<emoji=heart04>　……２人には後でちゃんと謝っておくさかい、堪忍な？」"

[[dialogue]]
speaker = "ミヤハル"
# 「んっ<emoji=heart04>　ちゅっ……<emoji=heart04>」
line = "「んっ<emoji=heart04>　ちゅっ……<emoji=heart04>」"

