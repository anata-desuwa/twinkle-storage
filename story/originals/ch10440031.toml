[[dialogue]]
speaker = "unk"
# 第１話,反転の白き力,P
line = "第１話,反転の白き力,P"

[[dialogue]]
speaker = "unk"
# 『反転のロストアイテム』の騒動から数週間後――。
line = "『反転のロストアイテム』の騒動から数週間後――。"

[[dialogue]]
speaker = "unk"
# 街に出現したモンスターを前に、俺はプリムラや他の星騎士たちと共に戦っていた。
line = "街に出現したモンスターを前に、俺はプリムラや他の星騎士たちと共に戦っていた。"

[[dialogue]]
speaker = "プリムラ"
# 「眷族たちよ！　我の力を受け、存分に暴れるがよい！」
line = "「眷族たちよ！　我の力を受け、存分に暴れるがよい！」"

[[dialogue]]
speaker = "プリムラ"
# 「放出供給！　ボルテージリレイザー！！」
line = "「放出供給！　ボルテージリレイザー！！」"

[[dialogue]]
speaker = "unk"
# よし！　ディマイズブレイカーッ！！
line = "よし！　ディマイズブレイカーッ！！"

[[dialogue]]
speaker = "モンスター"
# 「――！？」
line = "「――！？」"

[[dialogue]]
speaker = "unk"
# プリムラの新たな能力でエネルギーを受け取った俺は、渾身の一撃を放つ。その光が、目の前のモンスターたちを一掃した。
line = "プリムラの新たな能力でエネルギーを受け取った俺は、渾身の一撃を放つ。その光が、目の前のモンスターたちを一掃した。"

[[dialogue]]
speaker = "プリムラ"
# 「フハハハ！　見たか！　これが我の『リバースフォーム』の力なのじゃ♪」
line = "「フハハハ！　見たか！　これが我の『リバースフォーム』の力なのじゃ♪」"

[[dialogue]]
speaker = "クーシェン"
# 「いや、倒したのは『にーにー』だし！」
line = "「いや、倒したのは『にーにー』だし！」"

[[dialogue]]
speaker = "プリムラ"
# 「ふふん、我が供給してやったエネルギーのおかげじゃ。つまり我が倒したも同然なのじゃ♪」
line = "「ふふん、我が供給してやったエネルギーのおかげじゃ。つまり我が倒したも同然なのじゃ♪」"

[[dialogue]]
speaker = "プリムラ"
# 「ほれ、クーシェン、貴様にもエネルギーを分けてやる。それをもって、我の眷族のごとく戦うのじゃ！」
line = "「ほれ、クーシェン、貴様にもエネルギーを分けてやる。それをもって、我の眷族のごとく戦うのじゃ！」"

[[dialogue]]
speaker = "クーシェン"
# 「もう、しょうがないな～。よっと！」
line = "「もう、しょうがないな～。よっと！」"

[[dialogue]]
speaker = "unk"
# その後、プリムラの支援もあり、戦闘は無事に終了した。
line = "その後、プリムラの支援もあり、戦闘は無事に終了した。"

[[dialogue]]
speaker = "プリムラ"
# 「どうじゃ、眷族よ？　リバースフォームの回復能力、だいぶ扱えるようになってきたじゃろう？」
line = "「どうじゃ、眷族よ？　リバースフォームの回復能力、だいぶ扱えるようになってきたじゃろう？」"

[[dialogue]]
speaker = "unk"
# ああ、プリムラのおかげで助かった
line = "ああ、プリムラのおかげで助かった"

[[dialogue]]
speaker = "プリムラ"
# 「当然じゃ♪　我にかかれば、後方支援など造作もないのじゃ！」
line = "「当然じゃ♪　我にかかれば、後方支援など造作もないのじゃ！」"

[[dialogue]]
speaker = "unk"
# 俺はそのまま、プリムラの頭をぽんぽんと撫でる。
line = "俺はそのまま、プリムラの頭をぽんぽんと撫でる。"

[[dialogue]]
speaker = "プリムラ"
# 「あっ……こら！　我は頭を撫でていいなどと、許可した覚えはないぞ！　……フヘへへぇ<emoji=heart04>」
line = "「あっ……こら！　我は頭を撫でていいなどと、許可した覚えはないぞ！　……フヘへへぇ<emoji=heart04>」"

[[dialogue]]
speaker = "クーシェン"
# 「あ～、プリムラだけずるい～！　ボクも頑張って戦ったんだから、撫でてよ、にーにー♪」
line = "「あ～、プリムラだけずるい～！　ボクも頑張って戦ったんだから、撫でてよ、にーにー♪」"

[[dialogue]]
speaker = "プリムラ"
# 「ダメじゃ！　眷族は我と付き合っている『恋人』なのじゃからな！　目の前で浮気など認めん！」
line = "「ダメじゃ！　眷族は我と付き合っている『恋人』なのじゃからな！　目の前で浮気など認めん！」"

[[dialogue]]
speaker = "クーシェン"
# 「む～、ケチ～！」
line = "「む～、ケチ～！」"

[[dialogue]]
speaker = "クーシェン"
# 「そういえばさ、前から気になってたんだけど～」
line = "「そういえばさ、前から気になってたんだけど～」"

[[dialogue]]
speaker = "クーシェン"
# 「プリムラがにーにーと付き合ってるなら――『エッチなこと』ってもうしたの？」
line = "「プリムラがにーにーと付き合ってるなら――『エッチなこと』ってもうしたの？」"

[[dialogue]]
speaker = "プリムラ"
# 「はぁっ！？　ま、また何を言い出すんじゃ貴様は！？」
line = "「はぁっ！？　ま、また何を言い出すんじゃ貴様は！？」"

[[dialogue]]
speaker = "クーシェン"
# 「ウキキ♪　だって気になるじゃん！　恋人ならエッチなことはするものでしょ？」
line = "「ウキキ♪　だって気になるじゃん！　恋人ならエッチなことはするものでしょ？」"

[[dialogue]]
speaker = "プリムラ"
# 「ししし、しとらんわ！　まだ！」
line = "「ししし、しとらんわ！　まだ！」"

[[dialogue]]
speaker = "クーシェン"
# 「え～？　ウッソだ～！　プリムラ、恥ずかしがってるけど、絶対エッチなこと好きそうだし～！」
line = "「え～？　ウッソだ～！　プリムラ、恥ずかしがってるけど、絶対エッチなこと好きそうだし～！」"

[[dialogue]]
speaker = "プリムラ"
# 「誰がじゃ！　サチと一緒にするでない！」
line = "「誰がじゃ！　サチと一緒にするでない！」"

[[dialogue]]
speaker = "クーシェン"
# 「じゃあ、にーにーと全然エッチなことしてないの？　それが本当なら、まだまだお子ちゃまだな～」
line = "「じゃあ、にーにーと全然エッチなことしてないの？　それが本当なら、まだまだお子ちゃまだな～」"

[[dialogue]]
speaker = "プリムラ"
# 「はぁ！？　子供扱いするでないわ！　言っとくが、我はもう眷族とキスまで済ませとるんじゃからな！」
line = "「はぁ！？　子供扱いするでないわ！　言っとくが、我はもう眷族とキスまで済ませとるんじゃからな！」"

[[dialogue]]
speaker = "クーシェン"
# 「えっ、キス！？　本当に！？」
line = "「えっ、キス！？　本当に！？」"

[[dialogue]]
speaker = "クーシェン"
# 「じゃあ、キスの味ってどんな感じなの！？　やっぱりエッチな味！？　教えて教えて！」
line = "「じゃあ、キスの味ってどんな感じなの！？　やっぱりエッチな味！？　教えて教えて！」"

[[dialogue]]
speaker = "プリムラ"
# 「はぁ！？　そ、そんな恥ずかしいこと、誰が言うか！」
line = "「はぁ！？　そ、そんな恥ずかしいこと、誰が言うか！」"

[[dialogue]]
speaker = "クーシェン"
# 「あ～、本当はキスしたとかウソなんじゃないの～？」
line = "「あ～、本当はキスしたとかウソなんじゃないの～？」"

[[dialogue]]
speaker = "プリムラ"
# 「ウソではない！　初対面の時に、我は眷族とキスしたんじゃからな！？」
line = "「ウソではない！　初対面の時に、我は眷族とキスしたんじゃからな！？」"

[[dialogue]]
speaker = "クーシェン"
# 「じゃあ今、ここでやってみせてよ！　そうしたら信じてあげてもいいよ～？」
line = "「じゃあ今、ここでやってみせてよ！　そうしたら信じてあげてもいいよ～？」"

[[dialogue]]
speaker = "プリムラ"
# 「ぬっ……！　ひ、人前でなどと、ハレンチなこと……！」
line = "「ぬっ……！　ひ、人前でなどと、ハレンチなこと……！」"

[[dialogue]]
speaker = "クーシェン"
# 「できないんだ～？　恋人なのに～？」
line = "「できないんだ～？　恋人なのに～？」"

[[dialogue]]
speaker = "プリムラ"
# 「ぐぬぬ……よかろう！　見ておれよ！？」
line = "「ぐぬぬ……よかろう！　見ておれよ！？」"

[[dialogue]]
speaker = "プリムラ"
# 「眷族！　今からキスするのじゃ！」
line = "「眷族！　今からキスするのじゃ！」"

[[dialogue]]
speaker = "unk"
# ぷ、プリムラ、落ち着いて……！
line = "ぷ、プリムラ、落ち着いて……！"

[[dialogue]]
speaker = "プリムラ"
# 「こやつをギャフンと言わせてやるのじゃ！　ほら……ん～っ<emoji=heart04>」
line = "「こやつをギャフンと言わせてやるのじゃ！　ほら……ん～っ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 恥ずかしさで顔を真っ赤にしながら、目を閉じ、唇を突き出してくるプリムラ。
line = "恥ずかしさで顔を真っ赤にしながら、目を閉じ、唇を突き出してくるプリムラ。"

[[dialogue]]
speaker = "クーシェン"
# 「じ～っ♪」
line = "「じ～っ♪」"

[[dialogue]]
speaker = "プリムラ"
# 「ん～～っ……！」
line = "「ん～～っ……！」"

[[dialogue]]
speaker = "クーシェン"
# 「ウキウキ♪　ワクワク♪」
line = "「ウキウキ♪　ワクワク♪」"

[[dialogue]]
speaker = "unk"
# 俺はどうするか一瞬迷い――。
line = "俺はどうするか一瞬迷い――。"

[[dialogue]]
speaker = "クーシェン"
# 「あっ！？　ちょっ、にーにー！？　見えないよ！？」
line = "「あっ！？　ちょっ、にーにー！？　見えないよ！？」"

[[dialogue]]
speaker = "unk"
# 俺はさっとクーシェンの目を手で覆い、その隙に。
line = "俺はさっとクーシェンの目を手で覆い、その隙に。"

[[dialogue]]
speaker = "プリムラ"
# 「んっ――ちゅっ<emoji=heart04>」
line = "「んっ――ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 素早く、プリムラの唇にキスをしてみせた。
line = "素早く、プリムラの唇にキスをしてみせた。"

[[dialogue]]
speaker = "unk"
# ちゃんとしたぞ
line = "ちゃんとしたぞ"

[[dialogue]]
speaker = "プリムラ"
# 「う、うむ……<emoji=heart04>　本当にキスしたのじゃ……<emoji=heart04>」
line = "「う、うむ……<emoji=heart04>　本当にキスしたのじゃ……<emoji=heart04>」"

[[dialogue]]
speaker = "クーシェン"
# 「あぁ～っ！？　ちょっ、やられたぁ～！？　キスを間近で観察できるチャンスだと思ったのに～！」
line = "「あぁ～っ！？　ちょっ、やられたぁ～！？　キスを間近で観察できるチャンスだと思ったのに～！」"

[[dialogue]]
speaker = "クーシェン"
# 「せ、せめて……『味』は！？　キスの味はどうだったの！？」
line = "「せ、せめて……『味』は！？　キスの味はどうだったの！？」"

[[dialogue]]
speaker = "プリムラ"
# 「それは……秘密じゃ<emoji=heart04>」
line = "「それは……秘密じゃ<emoji=heart04>」"

[[dialogue]]
speaker = "クーシェン"
# 「ムキーーッ！　なんか悔しーーーっ！！」
line = "「ムキーーッ！　なんか悔しーーーっ！！」"

[[dialogue]]
speaker = "プリムラ"
# 「フヘへ……<emoji=heart04>」
line = "「フヘへ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺と目を合わせながら、照れた笑顔を浮かべるプリムラなのだった。
line = "俺と目を合わせながら、照れた笑顔を浮かべるプリムラなのだった。"
