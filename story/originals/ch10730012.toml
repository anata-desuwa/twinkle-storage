[[dialogue]]
speaker = "unk"
# 第２話,彼女ができた！？,P
line = "第２話,彼女ができた！？,P"

[[dialogue]]
speaker = "unk"
# 学園生活を送っていると様々なうわさを耳にするものだ。誰が誰と付き合ってるだとか、そういう噂は特に多いのだけど──
line = "学園生活を送っていると様々なうわさを耳にするものだ。誰が誰と付き合ってるだとか、そういう噂は特に多いのだけど──"

[[dialogue]]
speaker = "リノ"
# 「ええっ！？　クロトに彼女ができたのっ？　どどどっ、どんな子っ？　お母さん、ご挨拶に行った方がいいんじゃないかしら！？」
line = "「ええっ！？　クロトに彼女ができたのっ？　どどどっ、どんな子っ？　お母さん、ご挨拶に行った方がいいんじゃないかしら！？」"

[[dialogue]]
speaker = "unk"
# だから、ただの噂だってば！
line = "だから、ただの噂だってば！"

[[dialogue]]
speaker = "リノ"
# 「あっ……そ、そうだったわね。息子にとうとう春が来たのかと思って舞い上がっちゃったわ……」
line = "「あっ……そ、そうだったわね。息子にとうとう春が来たのかと思って舞い上がっちゃったわ……」"

[[dialogue]]
speaker = "リノ"
# 「ふぅん、学園のお友達に、お付き合いしてる人がいるのかって聞かれたのね。でも……？」
line = "「ふぅん、学園のお友達に、お付き合いしてる人がいるのかって聞かれたのね。でも……？」"

[[dialogue]]
speaker = "unk"
# 心当たりがないんだ
line = "心当たりがないんだ"

[[dialogue]]
speaker = "リノ"
# 「妙な話ねぇ。でもあなたの周り、女の子が多いし……」
line = "「妙な話ねぇ。でもあなたの周り、女の子が多いし……」"

[[dialogue]]
speaker = "リノ"
# 「女の子と２人きりで、一緒に街を歩いてたところでも見られたんじゃないの？　親しくない人から見たらカップルに見えた、みたいな」
line = "「女の子と２人きりで、一緒に街を歩いてたところでも見られたんじゃないの？　親しくない人から見たらカップルに見えた、みたいな」"

[[dialogue]]
speaker = "リノ"
# 「あ～、ちょっと待って。クロト、そこの服屋さん、寄って行きましょ？」
line = "「あ～、ちょっと待って。クロト、そこの服屋さん、寄って行きましょ？」"

[[dialogue]]
speaker = "unk"
# まだ買うの？
line = "まだ買うの？"

[[dialogue]]
speaker = "リノ"
# 「いいじゃない。たまの休みの、親子水入らずのお出かけなんだから～」
line = "「いいじゃない。たまの休みの、親子水入らずのお出かけなんだから～」"

[[dialogue]]
speaker = "リノ"
# 「ふふっ、いつ可愛い彼女ができてもいいように、かっこいいやつを見立ててあげるから。行くわよ？」
line = "「ふふっ、いつ可愛い彼女ができてもいいように、かっこいいやつを見立ててあげるから。行くわよ？」"

[[dialogue]]
speaker = "unk"
# 母さんは休日にまとめて買い物をする癖がある。そんな時、俺はよく荷物持ちに駆り出されるのだ。
line = "母さんは休日にまとめて買い物をする癖がある。そんな時、俺はよく荷物持ちに駆り出されるのだ。"

[[dialogue]]
speaker = "unk"
# もちろん買い物ついでに、俺の欲しいものなんかも買ってもらえるので、同行するのはやぶさかじゃない。
line = "もちろん買い物ついでに、俺の欲しいものなんかも買ってもらえるので、同行するのはやぶさかじゃない。"

[[dialogue]]
speaker = "リノ"
# 「あ、この抹茶アイスおいしい。クロトも一口食べる？　あーん♪」
line = "「あ、この抹茶アイスおいしい。クロトも一口食べる？　あーん♪」"

[[dialogue]]
speaker = "リノ"
# 「ねー、おいしいでしょ？　あ、そっちのバニラも一口ちょうだい。ん～♪　シンプルだけどいい味ね」
line = "「ねー、おいしいでしょ？　あ、そっちのバニラも一口ちょうだい。ん～♪　シンプルだけどいい味ね」"

[[dialogue]]
speaker = "リノ"
# 「うんうん。やっぱり力持ちの息子がいる時こそ、分厚い学術本は買うべきよね。頼りになるわ～♪」
line = "「うんうん。やっぱり力持ちの息子がいる時こそ、分厚い学術本は買うべきよね。頼りになるわ～♪」"

[[dialogue]]
speaker = "リノ"
# 「もー。そんな不機嫌そうにしないの。荷物持ってくれる代わりに、今日は外食していきましょ？　ねっ♪」
line = "「もー。そんな不機嫌そうにしないの。荷物持ってくれる代わりに、今日は外食していきましょ？　ねっ♪」"

[[dialogue]]
speaker = "unk"
# そうして母さんとの休日はあっという間にすぎて──
line = "そうして母さんとの休日はあっという間にすぎて──"

[[dialogue]]
speaker = "リノ"
# 「うん。お買い物も一通りすんだし、そろそろご飯食べに行こっか」
line = "「うん。お買い物も一通りすんだし、そろそろご飯食べに行こっか」"

[[dialogue]]
speaker = "リノ"
# 「私の古い友人が贔屓にしてるラーメン屋があってね、たまにはジャンクなのもいいでしょ？」
line = "「私の古い友人が贔屓にしてるラーメン屋があってね、たまにはジャンクなのもいいでしょ？」"

[[dialogue]]
speaker = "サーシャ"
# 「あら？　そこにいるのは……会長くんとリノさん？」
line = "「あら？　そこにいるのは……会長くんとリノさん？」"

[[dialogue]]
speaker = "リノ"
# 「サーシャちゃん！　久しぶりね。いつも息子がお世話になってます～」
line = "「サーシャちゃん！　久しぶりね。いつも息子がお世話になってます～」"

[[dialogue]]
speaker = "サーシャ"
# 「いえいえ、こちらこそ。会長くんには助けてもらってばっかりですから～」
line = "「いえいえ、こちらこそ。会長くんには助けてもらってばっかりですから～」"

[[dialogue]]
speaker = "リノ"
# 「あ、そう言えばサーシャちゃん。ちょっと聞きたいことがあるの。何だかうちのクロトが誰かとお付き合いしてるって噂があるらしくって……」
line = "「あ、そう言えばサーシャちゃん。ちょっと聞きたいことがあるの。何だかうちのクロトが誰かとお付き合いしてるって噂があるらしくって……」"

[[dialogue]]
speaker = "サーシャ"
# 「あ～……最近、新星学園で流れてるやつかしら？　会長くんが年上のお姉さんとお付き合いしてるっていう噂だったような～」
line = "「あ～……最近、新星学園で流れてるやつかしら？　会長くんが年上のお姉さんとお付き合いしてるっていう噂だったような～」"

[[dialogue]]
speaker = "サーシャ"
# 「確か噂では、包容力のありそうな年上のお姉さんで、年齢感や髪の長さはちょうどリノさんくらい……って、んん～？」
line = "「確か噂では、包容力のありそうな年上のお姉さんで、年齢感や髪の長さはちょうどリノさんくらい……って、んん～？」"

[[dialogue]]
speaker = "リノ"
# 「ん……どうしたのかしら？」
line = "「ん……どうしたのかしら？」"

[[dialogue]]
speaker = "サーシャ"
# 「リノさんは、会長くんとはよくお出かけするんですか？」
line = "「リノさんは、会長くんとはよくお出かけするんですか？」"

[[dialogue]]
speaker = "リノ"
# 「そうね。毎週ってわけじゃないけど、時間が合えば、よくお買い物をするわよ～」
line = "「そうね。毎週ってわけじゃないけど、時間が合えば、よくお買い物をするわよ～」"

[[dialogue]]
speaker = "サーシャ"
# 「それで荷物を持ってもらったり……？」
line = "「それで荷物を持ってもらったり……？」"

[[dialogue]]
speaker = "リノ"
# 「男の子だもの！　やっぱり力持ちの息子は頼りになるのよね～」
line = "「男の子だもの！　やっぱり力持ちの息子は頼りになるのよね～」"

[[dialogue]]
speaker = "サーシャ"
# 「アイスの食べさせ合いっこをしたり……？」
line = "「アイスの食べさせ合いっこをしたり……？」"

[[dialogue]]
speaker = "リノ"
# 「２人でおやつを食べる時は、違うフレーバーを選んでシェア。それが緋宮家のルールなの。ふふ、お得でしょ？」
line = "「２人でおやつを食べる時は、違うフレーバーを選んでシェア。それが緋宮家のルールなの。ふふ、お得でしょ？」"

[[dialogue]]
speaker = "サーシャ"
# 「あー……ねぇ会長くん。たぶんだけど噂されてる彼女って……リノさんじゃない？」
line = "「あー……ねぇ会長くん。たぶんだけど噂されてる彼女って……リノさんじゃない？」"

[[dialogue]]
speaker = "unk"
# えええっ！？
line = "えええっ！？"

[[dialogue]]
speaker = "リノ"
# 「いやいや、だって私はこの子のお母さんで……年だって、ねぇ？」
line = "「いやいや、だって私はこの子のお母さんで……年だって、ねぇ？」"

[[dialogue]]
speaker = "サーシャ"
# 「でも傍から見たらデートそのものですし、それにリノさん、とってもお若く見えるからー……ふふ、仲良しなのはいいことね♪」
line = "「でも傍から見たらデートそのものですし、それにリノさん、とってもお若く見えるからー……ふふ、仲良しなのはいいことね♪」"

[[dialogue]]
speaker = "リノ"
# 「そ、そういうことだったのね……まさか息子との仲を噂されてるだなんて」
line = "「そ、そういうことだったのね……まさか息子との仲を噂されてるだなんて」"

[[dialogue]]
speaker = "リノ"
# 「でもクロト。良かったわね～。お母さん、クロトみたいな学生とお付き合いしてるくらい若く見えるんだって！」
line = "「でもクロト。良かったわね～。お母さん、クロトみたいな学生とお付き合いしてるくらい若く見えるんだって！」"

[[dialogue]]
speaker = "リノ"
# 「あなたも息子として鼻が高いでしょ？」
line = "「あなたも息子として鼻が高いでしょ？」"

[[dialogue]]
speaker = "unk"
# よくなーーーい！！！
line = "よくなーーーい！！！"

[[dialogue]]
speaker = "unk"
# まさか母親と出かけてるところを見られて、年上のお姉さんと交際している噂を流されるだなんて。
line = "まさか母親と出かけてるところを見られて、年上のお姉さんと交際している噂を流されるだなんて。"

[[dialogue]]
speaker = "unk"
# まあ確かに母さんは、めちゃくちゃ若く見えるけど……
line = "まあ確かに母さんは、めちゃくちゃ若く見えるけど……"

[[dialogue]]
speaker = "リノ"
# 「クロトに恋人ができなかったら、お母さんが貰ってあげようかしら。なんてね、ふふふ♪」
line = "「クロトに恋人ができなかったら、お母さんが貰ってあげようかしら。なんてね、ふふふ♪」"

[[dialogue]]
speaker = "unk"
# 軽口をたたく母さんを尻目に、早いところ本当の恋人を見つけなくちゃ──そう思う俺なのであった。
line = "軽口をたたく母さんを尻目に、早いところ本当の恋人を見つけなくちゃ──そう思う俺なのであった。"
