[[dialogue]]
speaker = "unk"
# 第４話,シスターの看病,P
line = "第４話,シスターの看病,P"

[[dialogue]]
speaker = "unk"
# あれは子ども会の手伝いの後──
line = "あれは子ども会の手伝いの後──"

[[dialogue]]
speaker = "シャロン"
# 「椅子も綺麗に拭いて……と。ふぅ、これでお掃除も終わりですね。お借りするときは、使う前よりも美しく。お疲れ様でした！」
line = "「椅子も綺麗に拭いて……と。ふぅ、これでお掃除も終わりですね。お借りするときは、使う前よりも美しく。お疲れ様でした！」"

[[dialogue]]
speaker = "シャロン"
# 「会長さま。今日はお手伝いいただきありがとうございました。おかげさまで子どもたちにも満足していただけたと思います」
line = "「会長さま。今日はお手伝いいただきありがとうございました。おかげさまで子どもたちにも満足していただけたと思います」"

[[dialogue]]
speaker = "シャロン"
# 「あ、会長さまがこけて──」
line = "「あ、会長さまがこけて──」"

[[dialogue]]
speaker = "シャロン"
# 「会長さまがバケツの水を被って……！？　大丈夫ですかっ！？」
line = "「会長さまがバケツの水を被って……！？　大丈夫ですかっ！？」"

[[dialogue]]
speaker = "unk"
# へくしょんっ！
line = "へくしょんっ！"

[[dialogue]]
speaker = "ヴィーナス"
# 「なるほど、それで風邪を引いたと。気が抜けてたわね」
line = "「なるほど、それで風邪を引いたと。気が抜けてたわね」"

[[dialogue]]
speaker = "アナ"
# 「おお、会長よ、熱を出してしまうとは情けない」
line = "「おお、会長よ、熱を出してしまうとは情けない」"

[[dialogue]]
speaker = "マトイ"
# 「いや情けなくはないけど……大丈夫？　ほんとに顔赤いね……」
line = "「いや情けなくはないけど……大丈夫？　ほんとに顔赤いね……」"

[[dialogue]]
speaker = "サーシャ"
# 「最近忙しかったものね。たまにはゆっくりお休みしてね～」
line = "「最近忙しかったものね。たまにはゆっくりお休みしてね～」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうよ。お休みしてる間くらい、星徒会は私たちで何とかするわ。主にアナが！」
line = "「そうよ。お休みしてる間くらい、星徒会は私たちで何とかするわ。主にアナが！」"

[[dialogue]]
speaker = "アナ"
# 「任されました。会長の判子が必要な書類だけ残しておきます」
line = "「任されました。会長の判子が必要な書類だけ残しておきます」"

[[dialogue]]
speaker = "マトイ"
# 「それ、学園に行きたくなくなりそう……」
line = "「それ、学園に行きたくなくなりそう……」"

[[dialogue]]
speaker = "マトイ"
# 「じゃ、うるさくしても悪いし、私たちそろそろ帰るから。もし何かあったら連絡してね」
line = "「じゃ、うるさくしても悪いし、私たちそろそろ帰るから。もし何かあったら連絡してね」"

[[dialogue]]
speaker = "シャロン"
# 「お目覚めになりましたか？」
line = "「お目覚めになりましたか？」"

[[dialogue]]
speaker = "シャロン"
# 「……はい、お薬を飲んだ後眠られていたようです。おかげで熱もすっかり下がったみたいですね」
line = "「……はい、お薬を飲んだ後眠られていたようです。おかげで熱もすっかり下がったみたいですね」"

[[dialogue]]
speaker = "unk"
# 頭に柔らかいものが当たってるような
line = "頭に柔らかいものが当たってるような"

[[dialogue]]
speaker = "シャロン"
# 「お邪魔でしたか？　頭のところがお硬いと心苦しいかと思って、膝枕をさせていただいているのですが」
line = "「お邪魔でしたか？　頭のところがお硬いと心苦しいかと思って、膝枕をさせていただいているのですが」"

[[dialogue]]
speaker = "シャロン"
# 「あ、急に動かないでください。クラッとしてしまいますよ」
line = "「あ、急に動かないでください。クラッとしてしまいますよ」"

[[dialogue]]
speaker = "シャロン"
# 「ほら、今はじっとしていてください」
line = "「ほら、今はじっとしていてください」"

[[dialogue]]
speaker = "シャロン"
# 「ふふっ、この前とは介抱するのが逆になってしまいましたね。どうです、私の太ももは。なかなか肉付きはいいので硬くはないと思うのですが」
line = "「ふふっ、この前とは介抱するのが逆になってしまいましたね。どうです、私の太ももは。なかなか肉付きはいいので硬くはないと思うのですが」"

[[dialogue]]
speaker = "unk"
# 気持ちいいよ
line = "気持ちいいよ"

[[dialogue]]
speaker = "シャロン"
# 「なら良かったです。石の方がマシだと言われてしまっては立つ瀬がありませんから」
line = "「なら良かったです。石の方がマシだと言われてしまっては立つ瀬がありませんから」"

[[dialogue]]
speaker = "unk"
# ありがとう
line = "ありがとう"

[[dialogue]]
speaker = "シャロン"
# 「いえいえ、お礼などいりませんよ。私は女神様の代わりに手を差し伸べているに過ぎませんから」
line = "「いえいえ、お礼などいりませんよ。私は女神様の代わりに手を差し伸べているに過ぎませんから」"

[[dialogue]]
speaker = "シャロン"
# 「……こうして見つめ合うと、恥ずかしくなってしまいますね。あっ、大丈夫ですっ。目を逸らさなくて大丈夫ですよっ」
line = "「……こうして見つめ合うと、恥ずかしくなってしまいますね。あっ、大丈夫ですっ。目を逸らさなくて大丈夫ですよっ」"

[[dialogue]]
speaker = "シャロン"
# 「会長さまの看病をしているだけですから、シスターとして何もやましいことはありません。……ありません！」
line = "「会長さまの看病をしているだけですから、シスターとして何もやましいことはありません。……ありません！」"

[[dialogue]]
speaker = "シャロン"
# 「そうですね……何かお話を――」
line = "「そうですね……何かお話を――」"

[[dialogue]]
speaker = "unk"
# シャロンはどうして人の世話を焼くんだ？
line = "シャロンはどうして人の世話を焼くんだ？"

[[dialogue]]
speaker = "シャロン"
# 「それは……女神様の愛を世にあまねく届かせるためです」
line = "「それは……女神様の愛を世にあまねく届かせるためです」"

[[dialogue]]
speaker = "unk"
# 愛？
line = "愛？"

[[dialogue]]
speaker = "シャロン"
# 「はい、愛です。女神様はこの世界を、この世に生きる命を愛しておられます。だってこんな私をお救いになられたのですから」
line = "「はい、愛です。女神様はこの世界を、この世に生きる命を愛しておられます。だってこんな私をお救いになられたのですから」"

[[dialogue]]
speaker = "シャロン"
# 「しかし皆が救われるわけではありません。望まぬ形で命を落とす人々は大勢います」
line = "「しかし皆が救われるわけではありません。望まぬ形で命を落とす人々は大勢います」"

[[dialogue]]
speaker = "シャロン"
# 「誰に言われずとも知っています。この世界は厳しい。理不尽なことはたくさんあります」
line = "「誰に言われずとも知っています。この世界は厳しい。理不尽なことはたくさんあります」"

[[dialogue]]
speaker = "シャロン"
# 「不敬虔と言われるかもしれませんが……女神様の愛が届かないこともあるでしょう」
line = "「不敬虔と言われるかもしれませんが……女神様の愛が届かないこともあるでしょう」"

[[dialogue]]
speaker = "シャロン"
# 「女神様にもきっと何らかのご事情があるのでしょう。今迫っているリクリエもきっとそうです」
line = "「女神様にもきっと何らかのご事情があるのでしょう。今迫っているリクリエもきっとそうです」"

[[dialogue]]
speaker = "シャロン"
# 「女神様だけではどうしようもない、何らかの力がリクリエには働いている。でなければ世界が滅ぶなどありえません」
line = "「女神様だけではどうしようもない、何らかの力がリクリエには働いている。でなければ世界が滅ぶなどありえません」"

[[dialogue]]
speaker = "シャロン"
# 「だからこそ私が世界の果てまで届かせるのです。私をお救いになった女神様の愛を」
line = "「だからこそ私が世界の果てまで届かせるのです。私をお救いになった女神様の愛を」"

[[dialogue]]
speaker = "シャロン"
# 「私が女神様に救われたように、私がこの世界に生きる誰かを救います。私はそのためにシスターとなりました」
line = "「私が女神様に救われたように、私がこの世界に生きる誰かを救います。私はそのためにシスターとなりました」"

[[dialogue]]
speaker = "シャロン"
# 「だから私のする善き行いは全て、女神様の愛なのです」
line = "「だから私のする善き行いは全て、女神様の愛なのです」"

[[dialogue]]
speaker = "シャロン"
# 「女神様の愛、感じておられますか？」
line = "「女神様の愛、感じておられますか？」"

[[dialogue]]
speaker = "シャロン"
# 「……感じておられるようですね。とても安らかな顔をされています」
line = "「……感じておられるようですね。とても安らかな顔をされています」"

[[dialogue]]
speaker = "シャロン"
# 「眠くなったらそのままお眠りください。私がついておりますので」
line = "「眠くなったらそのままお眠りください。私がついておりますので」"

[[dialogue]]
speaker = "シャロン"
# 「……おやすみなさい、会長さま」
line = "「……おやすみなさい、会長さま」"
