[[dialogue]]
speaker = "unk"
# 第１話,フィーニスを巡り,B
line = "第１話,フィーニスを巡り,B"

[[dialogue]]
speaker = "unk"
# 『グレート・ウォール』計画を推し進めようとしていたネビュラ達を撃破した俺たち。
line = "『グレート・ウォール』計画を推し進めようとしていたネビュラ達を撃破した俺たち。"

[[dialogue]]
speaker = "unk"
# フィオナの固い誓いを共有し、俺たちはフィーニスの塔の頂上に座すアポロのもとへ向かった……。
line = "フィオナの固い誓いを共有し、俺たちはフィーニスの塔の頂上に座すアポロのもとへ向かった……。"

[[dialogue]]
speaker = "ヴィーナス"
# 「第一層──懐かしいわね。初めて入ったのがうんと昔のことみたいだわ」
line = "「第一層──懐かしいわね。初めて入ったのがうんと昔のことみたいだわ」"

[[dialogue]]
speaker = "クロト"
# 「確かにな。あの時は、右も左もわからなかった」
line = "「確かにな。あの時は、右も左もわからなかった」"

[[dialogue]]
speaker = "マトイ"
# 「中って、こんな風になってたんだ……」
line = "「中って、こんな風になってたんだ……」"

[[dialogue]]
speaker = "ルリエル"
# 「ルリエルの知っているフィーニスの塔の内部とは、全然違う趣でありますね！」
line = "「ルリエルの知っているフィーニスの塔の内部とは、全然違う趣でありますね！」"

[[dialogue]]
speaker = "フィオナ"
# 「フィーニスの塔は──階層によって全く装いが変わりますから」
line = "「フィーニスの塔は──階層によって全く装いが変わりますから」"

[[dialogue]]
speaker = "セーラ"
# 「うちらが入ったあの滅亡ッポイ世界はー……第三層だっけ？」
line = "「うちらが入ったあの滅亡ッポイ世界はー……第三層だっけ？」"

[[dialogue]]
speaker = "リノ"
# 「ここは変わらないわね。瘴気の蔓延が少し増した気はするけれど」
line = "「ここは変わらないわね。瘴気の蔓延が少し増した気はするけれど」"

[[dialogue]]
speaker = "クロト"
# 「母さん、立ち入ったことがあるのか？」
line = "「母さん、立ち入ったことがあるのか？」"

[[dialogue]]
speaker = "リノ"
# 「昔にね。と言っても、最初の方だけよ。あなた達とは違って」
line = "「昔にね。と言っても、最初の方だけよ。あなた達とは違って」"

[[dialogue]]
speaker = "unk"
# 母さんは、俺たちの無茶をややたしなめるように言った。
line = "母さんは、俺たちの無茶をややたしなめるように言った。"

[[dialogue]]
speaker = "ソフィア"
# 「お姉さんがいるのは、この塔の頂上──」
line = "「お姉さんがいるのは、この塔の頂上──」"

[[dialogue]]
speaker = "ニャリオン"
# 「そうニャ。ニャから、頂上目指して全部ぶち抜いていく必要ありニャ！　気張っていくニャンよ！」
line = "「そうニャ。ニャから、頂上目指して全部ぶち抜いていく必要ありニャ！　気張っていくニャンよ！」"

[[dialogue]]
speaker = "ユウリ"
# 「全部か……そりゃ気張るけど、間に合うのかよ？」
line = "「全部か……そりゃ気張るけど、間に合うのかよ？」"

[[dialogue]]
speaker = "サーシャ"
# 「魔界横断に比べたら、距離自体は大したものじゃないけどー……」
line = "「魔界横断に比べたら、距離自体は大したものじゃないけどー……」"

[[dialogue]]
speaker = "アナ"
# 「さすがに一階一階昇っていたら──キリがないかもしれませんね」
line = "「さすがに一階一階昇っていたら──キリがないかもしれませんね」"

[[dialogue]]
speaker = "リノ"
# 「ふーむ……」
line = "「ふーむ……」"

[[dialogue]]
speaker = "リノ"
# 「じゃ……やるしかないわね」
line = "「じゃ……やるしかないわね」"

[[dialogue]]
speaker = "クロト"
# 「母さん？」
line = "「母さん？」"

[[dialogue]]
speaker = "unk"
# どうにかして早急にこのフィーニスの塔を駆け上がらなくてはならない。
line = "どうにかして早急にこのフィーニスの塔を駆け上がらなくてはならない。"

[[dialogue]]
speaker = "unk"
# その問題に対して、母さんは気安い調子で天井を指差した。
line = "その問題に対して、母さんは気安い調子で天井を指差した。"

[[dialogue]]
speaker = "リノ"
# 「──ぶち抜きなさい、クロト。今なら女神さまも許してくれるわ」
line = "「──ぶち抜きなさい、クロト。今なら女神さまも許してくれるわ」"

[[dialogue]]
speaker = "マトイ"
# 「ぶ、ぶち抜くって……」
line = "「ぶ、ぶち抜くって……」"

[[dialogue]]
speaker = "ルリエル"
# 「物理的にでありますかっ！？」
line = "「物理的にでありますかっ！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「なるほど──さすがクロトのママ！　いちいち階段なんて昇ってられないものね！」
line = "「なるほど──さすがクロトのママ！　いちいち階段なんて昇ってられないものね！」"

[[dialogue]]
speaker = "ユウリ"
# 「いやいや、すげー無茶に聞こえるんだが」
line = "「いやいや、すげー無茶に聞こえるんだが」"

[[dialogue]]
speaker = "アナ"
# 「とはいえ……手荒ですが、それしかないかもしれません」
line = "「とはいえ……手荒ですが、それしかないかもしれません」"

[[dialogue]]
speaker = "サーシャ"
# 「迷ってる時間もないものねえ」
line = "「迷ってる時間もないものねえ」"

[[dialogue]]
speaker = "クロト"
# 「……やってみるか。フィオナ、支援を頼めるか」
line = "「……やってみるか。フィオナ、支援を頼めるか」"

[[dialogue]]
speaker = "フィオナ"
# 「はい」
line = "「はい」"

[[dialogue]]
speaker = "unk"
# 俺はフィオナに霊力の<ruby=パス>経路</ruby>を繋げてもらい、拳へ神経を集中させた。
line = "俺はフィオナに霊力の<ruby>経路<rt>パス</rt></ruby>を繋げてもらい、拳へ神経を集中させた。"

[[dialogue]]
speaker = "クロト"
# （今の俺なら──この塔の構造がよくわかる。最大効率で突破するには……ここだ！）
line = "（今の俺なら──この塔の構造がよくわかる。最大効率で突破するには……ここだ！）"

[[dialogue]]
speaker = "unk"
# そして──
line = "そして──"

[[dialogue]]
speaker = "クロト"
# 「──はあああああああっっ！！」
line = "「──はあああああああっっ！！」"

[[dialogue]]
speaker = "マトイ"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "ルリエル"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "リノ"
# 「うんうん、いい感じね♪」
line = "「うんうん、いい感じね♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「これが魔王ビームよ！　裏技ってやつだわ！」
line = "「これが魔王ビームよ！　裏技ってやつだわ！」"

[[dialogue]]
speaker = "ニャリオン"
# 「うーむ……すごすぎるニャンね……」
line = "「うーむ……すごすぎるニャンね……」"

[[dialogue]]
speaker = "unk"
# 俺の放った極大の閃撃は──もののみごとにこの階層の天井へ風穴を開けていた。
line = "俺の放った極大の閃撃は──もののみごとにこの階層の天井へ風穴を開けていた。"

[[dialogue]]
speaker = "unk"
# 後はここを通って飛んでいけば、またある程度の高みへ出られるはずだ。
line = "後はここを通って飛んでいけば、またある程度の高みへ出られるはずだ。"

[[dialogue]]
speaker = "クロト"
# 「これで時間は大きく短縮できるはずだ。一刻も早く頂上へ向かうぞ！」
line = "「これで時間は大きく短縮できるはずだ。一刻も早く頂上へ向かうぞ！」"

[[dialogue]]
speaker = "ユウリ"
# 「っし！　覚悟決めっか！」
line = "「っし！　覚悟決めっか！」"

[[dialogue]]
speaker = "ソフィア"
# 「はい。行きましょう！」
line = "「はい。行きましょう！」"

[[dialogue]]
speaker = "unk"
# そうして、立ちはだかるガーディアンを蹴散らしながら駆け上がっていく俺たち。
line = "そうして、立ちはだかるガーディアンを蹴散らしながら駆け上がっていく俺たち。"

[[dialogue]]
speaker = "unk"
# 初めて入った頃と比べれば、こちらの戦力も段違いでレベルアップしていたようで……
line = "初めて入った頃と比べれば、こちらの戦力も段違いでレベルアップしていたようで……"

[[dialogue]]
speaker = "unk"
# 『ボス』が不在なことも相まって、速やかに昇っていくことができた。
line = "『ボス』が不在なことも相まって、速やかに昇っていくことができた。"

[[dialogue]]
speaker = "ユウリ"
# 「──うおっ！？　また急に雰囲気が変わったな」
line = "「──うおっ！？　また急に雰囲気が変わったな」"

[[dialogue]]
speaker = "クロト"
# 「第二階層だ」
line = "「第二階層だ」"

[[dialogue]]
speaker = "ソフィア"
# 「遺跡のようですね……」
line = "「遺跡のようですね……」"

[[dialogue]]
speaker = "ニャリオン"
# 「そういえば、こっちには入ったことなかったニャン」
line = "「そういえば、こっちには入ったことなかったニャン」"

[[dialogue]]
speaker = "フィオナ"
# 「あの時は……ニャリオンを呼ぼうとはしたのですが、なぜか呼び出せなかったんですよ」
line = "「あの時は……ニャリオンを呼ぼうとはしたのですが、なぜか呼び出せなかったんですよ」"

[[dialogue]]
speaker = "クロト"
# 「召喚の経路が断たれてる、とか言ってたか」
line = "「召喚の経路が断たれてる、とか言ってたか」"

[[dialogue]]
speaker = "アナ"
# 「それほどまでに別世界──ということですね」
line = "「それほどまでに別世界──ということですね」"

[[dialogue]]
speaker = "サーシャ"
# 「色んな絵がたくさんあるわね」
line = "「色んな絵がたくさんあるわね」"

[[dialogue]]
speaker = "ルリエル"
# 「ですです。何やら遺跡っぽい雰囲気ですね！」
line = "「ですです。何やら遺跡っぽい雰囲気ですね！」"

[[dialogue]]
speaker = "unk"
# 通路の脇に立ち並ぶ古き壁画の数々。
line = "通路の脇に立ち並ぶ古き壁画の数々。"

[[dialogue]]
speaker = "unk"
# そこには人間が、天使が、魔族が……そして様々な文明世界が描かれていた。
line = "そこには人間が、天使が、魔族が……そして様々な文明世界が描かれていた。"

[[dialogue]]
speaker = "セーラ"
# 「滅んで、栄えて、また滅んで……ふむふむ。これがアレって感じかな？」
line = "「滅んで、栄えて、また滅んで……ふむふむ。これがアレって感じかな？」"

[[dialogue]]
speaker = "クロト"
# 「ええ。これらは今までに築かれてきた過去──リクリエが回帰させてきた<ruby=こよみ>暦</ruby>の歴史です」
line = "「ええ。これらは今までに築かれてきた過去──リクリエが回帰させてきた<ruby>暦<rt>こよみ</rt></ruby>の歴史です」"

[[dialogue]]
speaker = "ヴィーナス"
# 「マグダレナが教えてくれたんだったわね」
line = "「マグダレナが教えてくれたんだったわね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「後は……そっか。ここは確か、奥にアルモタヘルがいたところよ」
line = "「後は……そっか。ここは確か、奥にアルモタヘルがいたところよ」"

[[dialogue]]
speaker = "ユウリ"
# 「んじゃ、ここの層もボスはもう不在ってことだな」
line = "「んじゃ、ここの層もボスはもう不在ってことだな」"

[[dialogue]]
speaker = "リノ"
# 「まだまだ先は長いものね。次の階層を目指して急ぎましょう」
line = "「まだまだ先は長いものね。次の階層を目指して急ぎましょう」"

[[dialogue]]
speaker = "ユウリ"
# 「ち……道がけっこう複雑だな。フィオナ、次の道はどっちだ？」
line = "「ち……道がけっこう複雑だな。フィオナ、次の道はどっちだ？」"

[[dialogue]]
speaker = "フィオナ"
# 「最初に来た時と構造がやや変わっていますね。どちらが正しいのか……」
line = "「最初に来た時と構造がやや変わっていますね。どちらが正しいのか……」"

[[dialogue]]
speaker = "セーラ"
# 「えぇー。そんなのアリー？」
line = "「えぇー。そんなのアリー？」"

[[dialogue]]
speaker = "unk"
# 第二階層の<ruby=ギャラリー>壁画群</ruby>はあまりに膨大で、そのルートも前回と大きく組み替えられていた。
line = "第二階層の<ruby>壁画群<rt>ギャラリー</rt></ruby>はあまりに膨大で、そのルートも前回と大きく組み替えられていた。"

[[dialogue]]
speaker = "unk"
# ガーディアンには手こずらないというのに、ここで迷っていては時間のロスになる。
line = "ガーディアンには手こずらないというのに、ここで迷っていては時間のロスになる。"

[[dialogue]]
speaker = "unk"
# しかし……
line = "しかし……"

[[dialogue]]
speaker = "ヴィーナス"
# 「うーん…………」
line = "「うーん…………」"

[[dialogue]]
speaker = "ヴィーナス"
# 「──こっちね！　それから、次は右！　それから左！　その先に階段があるから！」
line = "「──こっちね！　それから、次は右！　それから左！　その先に階段があるから！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そんでもって、そこの天井をぶち破ればうんと上まで昇れるはずよ！」
line = "「そんでもって、そこの天井をぶち破ればうんと上まで昇れるはずよ！」"

[[dialogue]]
speaker = "マトイ"
# 「ほ、ほんと？　ヴィーナス」
line = "「ほ、ほんと？　ヴィーナス」"

[[dialogue]]
speaker = "ニャリオン"
# 「あっ──でもホントに見えてきたニャン！　やるニャン！」
line = "「あっ──でもホントに見えてきたニャン！　やるニャン！」"

[[dialogue]]
speaker = "unk"
# なぜかズバズバと正解の道を言い当てていくヴィーナス。
line = "なぜかズバズバと正解の道を言い当てていくヴィーナス。"

[[dialogue]]
speaker = "unk"
# 俄然いきいきとしながら、俺たちをぐんぐん先導していく。
line = "俄然いきいきとしながら、俺たちをぐんぐん先導していく。"

[[dialogue]]
speaker = "ヴィーナス"
# 「そっちじゃないわクロト！　こっちが近道よ！」
line = "「そっちじゃないわクロト！　こっちが近道よ！」"

[[dialogue]]
speaker = "クロト"
# 「了解──」
line = "「了解──」"

[[dialogue]]
speaker = "ニャリオン"
# 「どうしてわかるのニャ、九浄の娘！」
line = "「どうしてわかるのニャ、九浄の娘！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「知らない！　けど、なんとなく！」
line = "「知らない！　けど、なんとなく！」"

[[dialogue]]
speaker = "ニャリオン"
# 「ニャんとニャくでいいのかニャ……！？」
line = "「ニャんとニャくでいいのかニャ……！？」"

[[dialogue]]
speaker = "リノ"
# 「でも、さっきから一度も行き止まりにはなってないわね」
line = "「でも、さっきから一度も行き止まりにはなってないわね」"

[[dialogue]]
speaker = "クロト"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "クロト"
# 「ヴィーナス──もしかして、またあの声が聞こえたのか？」
line = "「ヴィーナス──もしかして、またあの声が聞こえたのか？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ううん。今回は違う。けど、なんとなく──教えられてる気がするの。こっちだ、って」
line = "「ううん。今回は違う。けど、なんとなく──教えられてる気がするの。こっちだ、って」"

[[dialogue]]
speaker = "フィオナ"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# 俺たちには、初めてここへ立ち入った時のことがよみがえった。
line = "俺たちには、初めてここへ立ち入った時のことがよみがえった。"

[[dialogue]]
speaker = "テルル"
# 『よく来たわね……ヴィーナス……いい子……おいでなさい……こちらへ……』
line = "『よく来たわね……ヴィーナス……いい子……おいでなさい……こちらへ……』"

[[dialogue]]
speaker = "unk"
# ヴィーナスを呼んでいた謎の『声』。
line = "ヴィーナスを呼んでいた謎の『声』。"

[[dialogue]]
speaker = "unk"
# あの声に導かれるようにして、俺たちは第二階層の最奥へと到達した……。
line = "あの声に導かれるようにして、俺たちは第二階層の最奥へと到達した……。"

[[dialogue]]
speaker = "フィオナ"
# （……緋宮会長）
line = "（……緋宮会長）"

[[dialogue]]
speaker = "unk"
# その時、ふと。
line = "その時、ふと。"

[[dialogue]]
speaker = "unk"
# 隣を走っていたフィオナが、そっと俺にだけ聞こえるように囁いてきた。
line = "隣を走っていたフィオナが、そっと俺にだけ聞こえるように囁いてきた。"

[[dialogue]]
speaker = "フィオナ"
# 「……気になっていたことを少し。よいですか？」
line = "「……気になっていたことを少し。よいですか？」"

[[dialogue]]
speaker = "クロト"
# 「なんだ？」
line = "「なんだ？」"

[[dialogue]]
speaker = "フィオナ"
# 「フィーニスの塔では何度か……誰とも知れぬ『声』が響きました。特に、ヴィーナスさんへ語りかけていましたね」
line = "「フィーニスの塔では何度か……誰とも知れぬ『声』が響きました。特に、ヴィーナスさんへ語りかけていましたね」"

[[dialogue]]
speaker = "フィオナ"
# 「あの『声』は──セイファート学園長の記憶にあった女神の声と、同じものではありませんでしたか？」
line = "「あの『声』は──セイファート学園長の記憶にあった女神の声と、同じものではありませんでしたか？」"

[[dialogue]]
speaker = "クロト"
# 「ああ。俺もそう思う」
line = "「ああ。俺もそう思う」"

[[dialogue]]
speaker = "フィオナ"
# 「ヴィーナスさんを呼んでいたのは……女神の声」
line = "「ヴィーナスさんを呼んでいたのは……女神の声」"

[[dialogue]]
speaker = "フィオナ"
# 「マグダレナさんは……そんなヴィーナスさんのことを『御子』と称していました。なら……」
line = "「マグダレナさんは……そんなヴィーナスさんのことを『御子』と称していました。なら……」"

[[dialogue]]
speaker = "クロト"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# 俺とヴィーナスの関係は、もうみんなに知れ渡っていることだ。
line = "俺とヴィーナスの関係は、もうみんなに知れ渡っていることだ。"

[[dialogue]]
speaker = "unk"
# その先の推理もまた、俺とフィオナで結論に違いはないだろう。
line = "その先の推理もまた、俺とフィオナで結論に違いはないだろう。"

[[dialogue]]
speaker = "フィオナ"
# 「……わかりました。今はこれ以上、掘り下げる時でもありませんね」
line = "「……わかりました。今はこれ以上、掘り下げる時でもありませんね」"

[[dialogue]]
speaker = "フィオナ"
