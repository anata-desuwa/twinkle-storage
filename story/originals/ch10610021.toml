[[dialogue]]
speaker = "unk"
# 第１話,星見家、再雇用,P
line = "第１話,星見家、再雇用,P"

[[dialogue]]
speaker = "フィオナ"
# 「この前新しくメイドを２人採用したの。新人メイドの指導、お願いね、キリカ」
line = "「この前新しくメイドを２人採用したの。新人メイドの指導、お願いね、キリカ」"

[[dialogue]]
speaker = "キリカ"
# 「はい、お任せください、お嬢様」
line = "「はい、お任せください、お嬢様」"

[[dialogue]]
speaker = "キリカ"
# 「どのような出自の者であっても、星見家のメイドとして正しい振る舞いができるよう指導してみせます」
line = "「どのような出自の者であっても、星見家のメイドとして正しい振る舞いができるよう指導してみせます」"

[[dialogue]]
speaker = "フィオナ"
# 「流石はメイド長。そう言ってくれるなら心強いね。早速、その内の１人を連れてきたから」
line = "「流石はメイド長。そう言ってくれるなら心強いね。早速、その内の１人を連れてきたから」"

[[dialogue]]
speaker = "フィオナ"
# 「入って、マリオン」
line = "「入って、マリオン」"

[[dialogue]]
speaker = "マリオン"
# 「はい、フィオナお嬢様」
line = "「はい、フィオナお嬢様」"

[[dialogue]]
speaker = "キリカ"
# 「マ、マリオン……！？」
line = "「マ、マリオン……！？」"

[[dialogue]]
speaker = "マリオン"
# 「改めまして、星見家メイド隊として復帰いたしました、マリオン・ネイマールと申します。至らぬ身ですが、何卒よろしくお願いいたしますね」
line = "「改めまして、星見家メイド隊として復帰いたしました、マリオン・ネイマールと申します。至らぬ身ですが、何卒よろしくお願いいたしますね」"

[[dialogue]]
speaker = "キリカ"
# 「おっ、お嬢様！？　何故、星見家に砂をかけたマリオンを再雇用など……！」
line = "「おっ、お嬢様！？　何故、星見家に砂をかけたマリオンを再雇用など……！」"

[[dialogue]]
speaker = "フィオナ"
# 「星見家とネビュラの連絡役としてね。過去はどうあれ、今はネビュラと星騎士は協力関係だし、パイプはあった方がいいから」
line = "「星見家とネビュラの連絡役としてね。過去はどうあれ、今はネビュラと星騎士は協力関係だし、パイプはあった方がいいから」"

[[dialogue]]
speaker = "マリオン"
# 「その点において、私はうってつけではないですか？　ネビュラとの仲介もお任せください♪　もちろんメイドのお仕事も誠心誠意させていただきます♪」
line = "「その点において、私はうってつけではないですか？　ネビュラとの仲介もお任せください♪　もちろんメイドのお仕事も誠心誠意させていただきます♪」"

[[dialogue]]
speaker = "キリカ"
# 「し、しかし、私は賛成いたしかねます。いつまた反旗を翻すか……」
line = "「し、しかし、私は賛成いたしかねます。いつまた反旗を翻すか……」"

[[dialogue]]
speaker = "マリオン"
# 「そう思われるのも無理はないでしょう。失ってしまった信頼は、献身的な働きによって取り戻すしかありません」
line = "「そう思われるのも無理はないでしょう。失ってしまった信頼は、献身的な働きによって取り戻すしかありません」"

[[dialogue]]
speaker = "マリオン"
# 「私が怪しい動きをしていないか、キリカさんが一番近くで見張っていればよろしいのでは？　なんなら寝食やお風呂も共に──」
line = "「私が怪しい動きをしていないか、キリカさんが一番近くで見張っていればよろしいのでは？　なんなら寝食やお風呂も共に──」"

[[dialogue]]
speaker = "キリカ"
# 「入りません。お嬢様が決定したならば、星見家メイド隊のメイド長として、粛々と従うのみです」
line = "「入りません。お嬢様が決定したならば、星見家メイド隊のメイド長として、粛々と従うのみです」"

[[dialogue]]
speaker = "フィオナ"
# 「じゃあ、マリオンさんはキリカの下で指導を受けてね。復帰する前とさほど変わってもいないけれど」
line = "「じゃあ、マリオンさんはキリカの下で指導を受けてね。復帰する前とさほど変わってもいないけれど」"

[[dialogue]]
speaker = "マリオン"
# 「かしこまりました、お嬢様」
line = "「かしこまりました、お嬢様」"

[[dialogue]]
speaker = "マリオン"
# 「キリカさん、『元メイド長』などという大層な肩書は忘れていただいて、平のメイドの１人としてたっぷりコキ使ってくださいませ♪」
line = "「キリカさん、『元メイド長』などという大層な肩書は忘れていただいて、平のメイドの１人としてたっぷりコキ使ってくださいませ♪」"

[[dialogue]]
speaker = "キリカ"
# 「……よろしくお願いします。至らぬ点があったら、厳しく指導していきますので」
line = "「……よろしくお願いします。至らぬ点があったら、厳しく指導していきますので」"

[[dialogue]]
speaker = "マリオン"
# 「ふふ、キリカさんの厳しい指導……楽しみです」
line = "「ふふ、キリカさんの厳しい指導……楽しみです」"

[[dialogue]]
speaker = "マリオン"
# 「ですがそんな苦虫を噛み潰したような顔をしないでくださいな。せっかくのお可愛らしい顔立ちが台無しになってしまいます」
line = "「ですがそんな苦虫を噛み潰したような顔をしないでくださいな。せっかくのお可愛らしい顔立ちが台無しになってしまいます」"

[[dialogue]]
speaker = "キリカ"
# 「はぁ……まったく、この人は……！」
line = "「はぁ……まったく、この人は……！」"

[[dialogue]]
speaker = "unk"
# メイド隊に出戻りメイド（他、新人１名）が加わったことで、メイド長・キリカの心労が増すかと思われたが──
line = "メイド隊に出戻りメイド（他、新人１名）が加わったことで、メイド長・キリカの心労が増すかと思われたが──"

[[dialogue]]
speaker = "新人メイド"
# 「あっ、ごめんなさい、マリオンさん。わたし、花瓶の水替えを忘れてしまって──」
line = "「あっ、ごめんなさい、マリオンさん。わたし、花瓶の水替えを忘れてしまって──」"

[[dialogue]]
speaker = "マリオン"
# 「ホールのですか？　それでしたら、先ほど替えておきましたよ」
line = "「ホールのですか？　それでしたら、先ほど替えておきましたよ」"

[[dialogue]]
speaker = "新人メイド"
# 「あ、ありがとうございます！」
line = "「あ、ありがとうございます！」"

[[dialogue]]
speaker = "マリオン"
# 「ついでに床拭きと窓拭きも終えてますので、厨房のお手伝いをお願いしますね」
line = "「ついでに床拭きと窓拭きも終えてますので、厨房のお手伝いをお願いしますね」"

[[dialogue]]
speaker = "新人メイド"
# 「そこまで終わってるんですか！？　同じ新人なのに、マリオンさん、スゴいです……わたしも頑張らなきゃ……！」
line = "「そこまで終わってるんですか！？　同じ新人なのに、マリオンさん、スゴいです……わたしも頑張らなきゃ……！」"

[[dialogue]]
speaker = "キリカ"
# 「私が新人に教えることがなくなってしまうではないですか」
line = "「私が新人に教えることがなくなってしまうではないですか」"

[[dialogue]]
speaker = "フィオナ"
# 「マリオンさん１人でメイド１０人分の仕事をこなしてくれてるね。キリカも仕事が楽になったんじゃない？」
line = "「マリオンさん１人でメイド１０人分の仕事をこなしてくれてるね。キリカも仕事が楽になったんじゃない？」"

[[dialogue]]
speaker = "キリカ"
# 「ええ……人形による圧倒的な物量に加えて、個々の能力も非常に優秀で……」
line = "「ええ……人形による圧倒的な物量に加えて、個々の能力も非常に優秀で……」"

[[dialogue]]
speaker = "キリカ"
# 「やはり彼女は最高峰のメイドです。少々悔しいですが、そればかりは認めざるを得ません」
line = "「やはり彼女は最高峰のメイドです。少々悔しいですが、そればかりは認めざるを得ません」"

[[dialogue]]
speaker = "新人メイド"
# 「どうやったら、マリオンさんみたいなすごいメイドさんになれますか？」
line = "「どうやったら、マリオンさんみたいなすごいメイドさんになれますか？」"

[[dialogue]]
speaker = "マリオン"
# 「まあまあ、なんてお可愛いらしい……♪　初々しさがまた庇護欲を刺激します」
line = "「まあまあ、なんてお可愛いらしい……♪　初々しさがまた庇護欲を刺激します」"

[[dialogue]]
speaker = "マリオン"
# 「そうですね、では、私が手取り足取り、ちょっと過剰なくらいにスキンシップを交えながら……」
line = "「そうですね、では、私が手取り足取り、ちょっと過剰なくらいにスキンシップを交えながら……」"

[[dialogue]]
speaker = "新人メイド"
# 「えっ、あの、あのっ……」
line = "「えっ、あの、あのっ……」"

[[dialogue]]
speaker = "マリオン"
# 「マンツーマンでメイドの極意、お教えいたしますね。今晩、私の部屋にいらして──」
line = "「マンツーマンでメイドの極意、お教えいたしますね。今晩、私の部屋にいらして──」"

[[dialogue]]
speaker = "キリカ"
# 「マリオン！　他のメイドを口説くのは厳禁です！」
line = "「マリオン！　他のメイドを口説くのは厳禁です！」"

[[dialogue]]
speaker = "マリオン"
# 「まあまあ、残念。メイド長に怒られちゃうのでこれくらいにしておきましょうね」
line = "「まあまあ、残念。メイド長に怒られちゃうのでこれくらいにしておきましょうね」"

[[dialogue]]
speaker = "キリカ"
# 「まったく……アレさえなければ、完璧なメイドなのですが……」
line = "「まったく……アレさえなければ、完璧なメイドなのですが……」"

[[dialogue]]
speaker = "新人メイド"
# 「マリオンさん、素敵……キュン<emoji=heart04>」
line = "「マリオンさん、素敵……キュン<emoji=heart04>」"

[[dialogue]]
speaker = "キリカ"
# 「あの人のせいで、メイド隊の風紀が乱れてしまいます……！」
line = "「あの人のせいで、メイド隊の風紀が乱れてしまいます……！」"

[[dialogue]]
speaker = "unk"
# やはりキリカの気苦労は絶えなさそうで、平穏だった星見家メイド隊に一匙のスパイスが加わったのだった。
line = "やはりキリカの気苦労は絶えなさそうで、平穏だった星見家メイド隊に一匙のスパイスが加わったのだった。"
