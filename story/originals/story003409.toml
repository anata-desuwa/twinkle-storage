[[dialogue]]
speaker = "黒ベア子"
# 「この変な生き物がクマロボたちを、赤ちゃんクマロボに変身させていた原因くまね」
line = "「この変な生き物がクマロボたちを、赤ちゃんクマロボに変身させていた原因くまね」"

[[dialogue]]
speaker = "ラファエロ"
# 「ああ、やっぱりそうなんだね」
line = "「ああ、やっぱりそうなんだね」"

[[dialogue]]
speaker = "ステラ"
# 「何なんですか、これ？」
line = "「何なんですか、これ？」"

[[dialogue]]
speaker = "黒ベア子"
# 「正体はよくわからないくま。謎の宇宙生命体くま。わかってるのはクマロボに寄生することで、赤ちゃん化させてしまうことくらいくま」
line = "「正体はよくわからないくま。謎の宇宙生命体くま。わかってるのはクマロボに寄生することで、赤ちゃん化させてしまうことくらいくま」"

[[dialogue]]
speaker = "unk"
# 結局、黒ベア子にも何も分からない、ということらしかった。
line = "結局、黒ベア子にも何も分からない、ということらしかった。"

[[dialogue]]
speaker = "黒ベア子"
# 「ひとまずこの世界はもう安全だけど、他の世界では事件が続いてるくま」
line = "「ひとまずこの世界はもう安全だけど、他の世界では事件が続いてるくま」"

[[dialogue]]
speaker = "黒ベア子"
# 「これからわたしは、それを解決しに行かなくちゃいけないくま」
line = "「これからわたしは、それを解決しに行かなくちゃいけないくま」"

[[dialogue]]
speaker = "unk"
# た、大変だな……
line = "た、大変だな……"

[[dialogue]]
speaker = "黒ベア子"
# 「まったくその通りくま！　少しは人の迷惑というものを考えて欲しいくま！」
line = "「まったくその通りくま！　少しは人の迷惑というものを考えて欲しいくま！」"

[[dialogue]]
speaker = "unk"
# …………
line = "…………"

[[dialogue]]
speaker = "黒ベア子"
# 「ん、何で黙るくま？」
line = "「ん、何で黙るくま？」"

[[dialogue]]
speaker = "ステラ"
# 「あ、あの……ボクたちはどうなるんですか？」
line = "「あ、あの……ボクたちはどうなるんですか？」"

[[dialogue]]
speaker = "黒ベア子"
# 「さっきも言った通り、まだ他の世界では事件が解決していないくま」
line = "「さっきも言った通り、まだ他の世界では事件が解決していないくま」"

[[dialogue]]
speaker = "黒ベア子"
# 「だから２人は、すべての事件が解決するまで、この世界でゆっくりしてて欲しいくま」
line = "「だから２人は、すべての事件が解決するまで、この世界でゆっくりしてて欲しいくま」"

[[dialogue]]
speaker = "ラファエロ"
# 「おっと、どうやらすぐには帰れないみたいだね」
line = "「おっと、どうやらすぐには帰れないみたいだね」"

[[dialogue]]
speaker = "ラファエロ"
# 「まあ、そういうことなら仕方がない。もうしばらく、この世界を堪能させてもらうとしようか」
line = "「まあ、そういうことなら仕方がない。もうしばらく、この世界を堪能させてもらうとしようか」"

[[dialogue]]
speaker = "ステラ"
# 「ごめんなさい、会長さん、ルリエルさん……もう少しだけお世話になります……」
line = "「ごめんなさい、会長さん、ルリエルさん……もう少しだけお世話になります……」"

[[dialogue]]
speaker = "ルリエル"
# 「全然構わないのです！　ゆっくり楽しんでいってください♪」
line = "「全然構わないのです！　ゆっくり楽しんでいってください♪」"

[[dialogue]]
speaker = "unk"
# それからしばらくして──
line = "それからしばらくして──"

[[dialogue]]
speaker = "unk"
# どうやら他の世界のトラブルもすべて解決したらしく、ステラとラファエロも元の世界に帰れることになった。
line = "どうやら他の世界のトラブルもすべて解決したらしく、ステラとラファエロも元の世界に帰れることになった。"

[[dialogue]]
speaker = "ステラ"
# 「いろいろお世話になりました……ありがとうございます、会長さん」
line = "「いろいろお世話になりました……ありがとうございます、会長さん」"

[[dialogue]]
speaker = "ルリエル"
# 「ステラさんはずっと新星学園の星徒会室で過ごしてましたからね。すっかり会長さんとも仲良しになれたようで何よりです」
line = "「ステラさんはずっと新星学園の星徒会室で過ごしてましたからね。すっかり会長さんとも仲良しになれたようで何よりです」"

[[dialogue]]
speaker = "ラファエロ"
# 「というか、ステラが星徒会室以外の場所にいる姿がほとんど記憶にないんだが……もしかして本当にずっと引きこもっていたのかい？」
line = "「というか、ステラが星徒会室以外の場所にいる姿がほとんど記憶にないんだが……もしかして本当にずっと引きこもっていたのかい？」"

[[dialogue]]
speaker = "ステラ"
# 「そ、そんなことありませんよ！　会長さんやルリエルさんともお出かけしましたし……」
line = "「そ、そんなことありませんよ！　会長さんやルリエルさんともお出かけしましたし……」"

[[dialogue]]
speaker = "ステラ"
# 「そう言うラファエロさんは、大いに満喫してたみたいですね」
line = "「そう言うラファエロさんは、大いに満喫してたみたいですね」"

[[dialogue]]
speaker = "ラファエロ"
# 「ふふ、こちらの世界にも大勢のファンを作ってしまったよ……これも天才藝術家の宿命かな」
line = "「ふふ、こちらの世界にも大勢のファンを作ってしまったよ……これも天才藝術家の宿命かな」"

[[dialogue]]
speaker = "ラファエロ"
# 「名残惜しい気持ちもあるが、ぼくには帰らなければならない場所があるからね」
line = "「名残惜しい気持ちもあるが、ぼくには帰らなければならない場所があるからね」"

[[dialogue]]
speaker = "ステラ"
# 「ボクもです。早く戻って家族のみんなや仲間……それから団長さんに無事を伝えてあげなくちゃ」
line = "「ボクもです。早く戻って家族のみんなや仲間……それから団長さんに無事を伝えてあげなくちゃ」"

[[dialogue]]
speaker = "ラファエロ"
# 「そうだね……館長も心配していると思うから、戻ったら彼にもちゃんと伝えに行くとしよう」
line = "「そうだね……館長も心配していると思うから、戻ったら彼にもちゃんと伝えに行くとしよう」"

[[dialogue]]
speaker = "黒ベア子"
# 「それでは準備はいいくまか？　よければ２人を元の世界に戻すくま」
line = "「それでは準備はいいくまか？　よければ２人を元の世界に戻すくま」"

[[dialogue]]
speaker = "ステラ"
# 「ボクは大丈夫です。ラファエロさんは大丈夫ですか？」
line = "「ボクは大丈夫です。ラファエロさんは大丈夫ですか？」"

[[dialogue]]
speaker = "ラファエロ"
# 「ああ、大丈夫だ」
line = "「ああ、大丈夫だ」"

[[dialogue]]
speaker = "黒ベア子"
# 「では、行くくま！」
line = "「では、行くくま！」"

[[dialogue]]
speaker = "ステラ"
# 「ありがとうございます、本当にお世話になりました！」
line = "「ありがとうございます、本当にお世話になりました！」"

[[dialogue]]
speaker = "ラファエロ"
# 「こちらの世界か、それともぼくたちの世界か、また会うことがあったらよろしく頼むよ」
line = "「こちらの世界か、それともぼくたちの世界か、また会うことがあったらよろしく頼むよ」"

[[dialogue]]
speaker = "ルリエル"
# 「はいっ！　その時はお願いします！」
line = "「はいっ！　その時はお願いします！」"

[[dialogue]]
speaker = "unk"
# ──こうしてラファエロとステラは、彼女たちそれぞれの世界へと帰って行った。
line = "──こうしてラファエロとステラは、彼女たちそれぞれの世界へと帰って行った。"

[[dialogue]]
speaker = "unk"
# それと入れ替わるようにして、フィオナもこちらの世界へ戻ってきた。
line = "それと入れ替わるようにして、フィオナもこちらの世界へ戻ってきた。"

[[dialogue]]
speaker = "unk"
# 実はフィオナだけではなく、ヴィーナスとメルエルもそれぞれ黒ベア子が行き来していた世界でお世話になっていたことがわかり、俺は彼女たちから色々な土産話を聞くのだった。
line = "実はフィオナだけではなく、ヴィーナスとメルエルもそれぞれ黒ベア子が行き来していた世界でお世話になっていたことがわかり、俺は彼女たちから色々な土産話を聞くのだった。"
