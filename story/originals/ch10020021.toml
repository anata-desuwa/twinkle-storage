[[dialogue]]
speaker = "unk"
# 第１話,お姉ちゃんな彼女,P
line = "第１話,お姉ちゃんな彼女,P"

[[dialogue]]
speaker = "unk"
# サーシャさんと恋人になってから、彼女は前よりも更に世話を焼いてくれるようになっていた――
line = "サーシャさんと恋人になってから、彼女は前よりも更に世話を焼いてくれるようになっていた――"

[[dialogue]]
speaker = "サーシャ"
# 「会長くん、そこの数式は途中まで解いたら、違うやり方……そう、さっきまでとは逆パターンで答えが見えて来るはずよ」
line = "「会長くん、そこの数式は途中まで解いたら、違うやり方……そう、さっきまでとは逆パターンで答えが見えて来るはずよ」"

[[dialogue]]
speaker = "unk"
# ああ、なるほど！
line = "ああ、なるほど！"

[[dialogue]]
speaker = "サーシャ"
# 「解けそう？　なら、良かったわ～♪」
line = "「解けそう？　なら、良かったわ～♪」"

[[dialogue]]
speaker = "サーシャ"
# 「――うふふ♪　お礼なんていいのよ。私が好きで勉強を見ているだけだから♪」
line = "「――うふふ♪　お礼なんていいのよ。私が好きで勉強を見ているだけだから♪」"

[[dialogue]]
speaker = "サーシャ"
# 「あら？　どうしたの、落ち着かない顔をして？」
line = "「あら？　どうしたの、落ち着かない顔をして？」"

[[dialogue]]
speaker = "サーシャ"
# 「――周りの視線が気になる？　ああ、こうして私が、会長くんとぴったりくっ付いているからかしら？」
line = "「――周りの視線が気になる？　ああ、こうして私が、会長くんとぴったりくっ付いているからかしら？」"

[[dialogue]]
speaker = "unk"
# 嬉しいけど、ちょっと恥ずかしいです
line = "嬉しいけど、ちょっと恥ずかしいです"

[[dialogue]]
speaker = "サーシャ"
# 「ふふっ♪　そうなのね～。でも、周りの人って言っても、ちらほらとしかいない感じだし……」
line = "「ふふっ♪　そうなのね～。でも、周りの人って言っても、ちらほらとしかいない感じだし……」"

[[dialogue]]
speaker = "サーシャ"
# 「何より、恋人ならこれくらい、普通の距離じゃない？」
line = "「何より、恋人ならこれくらい、普通の距離じゃない？」"

[[dialogue]]
speaker = "サーシャ"
# 「それに２人きりの時はもっと――」
line = "「それに２人きりの時はもっと――」"

[[dialogue]]
speaker = "サーシャ"
# 「……お姉ちゃんと色々密着して、イチャイチャしてるじゃない？」
line = "「……お姉ちゃんと色々密着して、イチャイチャしてるじゃない？」"

[[dialogue]]
speaker = "unk"
# こ、ここは学園なので……！
line = "こ、ここは学園なので……！"

[[dialogue]]
speaker = "サーシャ"
# 「は～い<emoji=heart04>　公共の場では、あくまで先輩と後輩として、よね？　分かってるわ」
line = "「は～い<emoji=heart04>　公共の場では、あくまで先輩と後輩として、よね？　分かってるわ」"

[[dialogue]]
speaker = "サーシャ"
# 「でも、勉強を教えるにあたって、少～しだけ距離が近くなっちゃうのは仕方ないわよね？　うふふっ<emoji=heart04>」
line = "「でも、勉強を教えるにあたって、少～しだけ距離が近くなっちゃうのは仕方ないわよね？　うふふっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# それから引き続き勉強を見て貰って、問題を解いて行くのだが――
line = "それから引き続き勉強を見て貰って、問題を解いて行くのだが――"

[[dialogue]]
speaker = "サーシャ"
# 「――うん、よく出来ました♪　会長くんにはまた、正解のご褒美をあげないとね～♪」
line = "「――うん、よく出来ました♪　会長くんにはまた、正解のご褒美をあげないとね～♪」"

[[dialogue]]
speaker = "サーシャ"
# 「お姉ちゃんが頭をナデナデしちゃうわ♪　よしよし、いいこいいこ～♪」
line = "「お姉ちゃんが頭をナデナデしちゃうわ♪　よしよし、いいこいいこ～♪」"

[[dialogue]]
speaker = "サーシャ"
# 「――残念、今度は惜しいけど、不正解よ。会長くんには罰として……」
line = "「――残念、今度は惜しいけど、不正解よ。会長くんには罰として……」"

[[dialogue]]
speaker = "サーシャ"
# 「お姉ちゃんの膝枕の刑よ。はい、いらっしゃ～い♪」
line = "「お姉ちゃんの膝枕の刑よ。はい、いらっしゃ～い♪」"

[[dialogue]]
speaker = "unk"
# えっと……どっちもご褒美では？
line = "えっと……どっちもご褒美では？"

[[dialogue]]
speaker = "サーシャ"
# 「そう？　不正解の時は、次は頑張りましょうね～って叱咤激励のつもりなんだけど……」
line = "「そう？　不正解の時は、次は頑張りましょうね～って叱咤激励のつもりなんだけど……」"

[[dialogue]]
speaker = "サーシャ"
# 「――どっちにしても甘々過ぎて、先輩と後輩の関係を超えちゃってる？」
line = "「――どっちにしても甘々過ぎて、先輩と後輩の関係を超えちゃってる？」"

[[dialogue]]
speaker = "サーシャ"
# 「う～ん、恋人になってから、会長くんがますます可愛く思えて、ついつい甘えさせたくなっちゃうのよね～」
line = "「う～ん、恋人になってから、会長くんがますます可愛く思えて、ついつい甘えさせたくなっちゃうのよね～」"

[[dialogue]]
speaker = "unk"
# 恋人というより、姉と弟のような……
line = "恋人というより、姉と弟のような……"

[[dialogue]]
speaker = "サーシャ"
# 「そこは……だって、お姉ちゃんしたくなっちゃうんだもの♪」
line = "「そこは……だって、お姉ちゃんしたくなっちゃうんだもの♪」"

[[dialogue]]
speaker = "サーシャ"
# 「それに、会長くんの弟君成分を補給しないと、お姉ちゃん生きていけないわ～」
line = "「それに、会長くんの弟君成分を補給しないと、お姉ちゃん生きていけないわ～」"

[[dialogue]]
speaker = "サーシャ"
# 「それとも……私がお姉ちゃんみたいな接し方をするの、会長くんは嫌だった……？」
line = "「それとも……私がお姉ちゃんみたいな接し方をするの、会長くんは嫌だった……？」"

[[dialogue]]
speaker = "unk"
# サーシャお姉ちゃんは、好きですよ
line = "サーシャお姉ちゃんは、好きですよ"

[[dialogue]]
speaker = "サーシャ"
# 「～～～<emoji=heart04>　そんなこと言われたら、お姉ちゃん、胸がキュンってなっちゃうわ<emoji=heart04>」
line = "「～～～<emoji=heart04>　そんなこと言われたら、お姉ちゃん、胸がキュンってなっちゃうわ<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
# 「会長くん、ありがとう。そんな優しい会長くんだから、私、自然体でいられるの」
line = "「会長くん、ありがとう。そんな優しい会長くんだから、私、自然体でいられるの」"

[[dialogue]]
speaker = "サーシャ"
# 「凄く感謝してるのよ？　だから会長くんも遠慮せず、お姉ちゃんにいっぱい甘えて頂戴<emoji=heart04>」
line = "「凄く感謝してるのよ？　だから会長くんも遠慮せず、お姉ちゃんにいっぱい甘えて頂戴<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
# 「それに――」
line = "「それに――」"

[[dialogue]]
speaker = "サーシャ"
# 「付き合い始めたばかりの頃は、確かに可愛い弟が出来たようにも感じてたけれど……今はちゃんと、恋人だって実感してるのよ？」
line = "「付き合い始めたばかりの頃は、確かに可愛い弟が出来たようにも感じてたけれど……今はちゃんと、恋人だって実感してるのよ？」"

[[dialogue]]
speaker = "サーシャ"
# 「実際に、こうして人前でも気持ちを抑えきれないくらいだもの……<emoji=heart04>」
line = "「実際に、こうして人前でも気持ちを抑えきれないくらいだもの……<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
# 「ほら、耳に息吹きかけて……ふぅ～っ……<emoji=heart04>　うふっ……ぴくって反応した……<emoji=heart04>」
line = "「ほら、耳に息吹きかけて……ふぅ～っ……<emoji=heart04>　うふっ……ぴくって反応した……<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
# 「それからこうして、太ももスリスリしたり……顔も赤くなって……ふふっ、会長くん、ドキドキしてる？　かわいい～♪」
line = "「それからこうして、太ももスリスリしたり……顔も赤くなって……ふふっ、会長くん、ドキドキしてる？　かわいい～♪」"

[[dialogue]]
speaker = "サーシャ"
# 「うん？　な～に、どうしたの……？　お姉ちゃんに甘えたい気分になって来ちゃった……？　じゃあ――」
line = "「うん？　な～に、どうしたの……？　お姉ちゃんに甘えたい気分になって来ちゃった……？　じゃあ――」"

[[dialogue]]
speaker = "サーシャ"
# 「勉強終わったら、そのあと私のお部屋でイチャイチャしちゃう？」
line = "「勉強終わったら、そのあと私のお部屋でイチャイチャしちゃう？」"

[[dialogue]]
speaker = "unk"
# 頑張って勉強終わらせます！
line = "頑張って勉強終わらせます！"

[[dialogue]]
speaker = "サーシャ"
# 「あらあら、うふふ♪　男の子ね～」
line = "「あらあら、うふふ♪　男の子ね～」"

[[dialogue]]
speaker = "サーシャ"
# 「……いっぱい正解したら、お姉ちゃんもっと凄いご褒美あげちゃうから、頑張って<emoji=heart04>」
line = "「……いっぱい正解したら、お姉ちゃんもっと凄いご褒美あげちゃうから、頑張って<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 甘々なご褒美につられて、めちゃくちゃ勉強が進んでしまう俺なのだった――
line = "甘々なご褒美につられて、めちゃくちゃ勉強が進んでしまう俺なのだった――"
