[[dialogue]]
speaker = "unk"
# ジュエリーとミネコの対決がついに始まり、俺もジュエリーの助手として加勢しようとした――のだが。
line = "ジュエリーとミネコの対決がついに始まり、俺もジュエリーの助手として加勢しようとした――のだが。"

[[dialogue]]
speaker = "unk"
# ミネコが指を弾いて音が鳴った瞬間、俺は北海道──人間界の『<ruby=ラーゴ・シエロ>鏡界の湖</ruby>』付近の森へと飛ばされてしまっていた。
line = "ミネコが指を弾いて音が鳴った瞬間、俺は北海道──人間界の『<ruby>鏡界の湖<rt>ラーゴ・シエロ</rt></ruby>』付近の森へと飛ばされてしまっていた。"

[[dialogue]]
speaker = "unk"
# やられた……！
line = "やられた……！"

[[dialogue]]
speaker = "unk"
# 俺はすぐさま空中へと飛躍し、東京方面――流星市国に向かって飛行を開始した。
line = "俺はすぐさま空中へと飛躍し、東京方面――流星市国に向かって飛行を開始した。"

[[dialogue]]
speaker = "unk"
# 同時刻、流星学園の敷地内にて。
line = "同時刻、流星学園の敷地内にて。"

[[dialogue]]
speaker = "unk"
# ジュエリーはミネコとの戦闘を開始していた。
line = "ジュエリーはミネコとの戦闘を開始していた。"

[[dialogue]]
speaker = "ミネコ"
# 「――そういうわけで、厄介なキミの助手には一旦、北海道まで退場してもらったよ♪」
line = "「――そういうわけで、厄介なキミの助手には一旦、北海道まで退場してもらったよ♪」"

[[dialogue]]
speaker = "ジュエリー"
# 「<ruby=ラーゴ・シエロ>鏡界の湖</ruby>……ということは、推測するに、土地に流れる龍脈を利用した『転送星術』か。用意周到なことだ」
line = "「<ruby>鏡界の湖<rt>ラーゴ・シエロ</rt></ruby>……ということは、推測するに、土地に流れる龍脈を利用した『転送星術』か。用意周到なことだ」"

[[dialogue]]
speaker = "ミネコ"
# 「すぐにそこまで考えが至るとは。恐れ入るよ、名探偵」
line = "「すぐにそこまで考えが至るとは。恐れ入るよ、名探偵」"

[[dialogue]]
speaker = "ミネコ"
# 「準備にすごく時間はかかるけど、こういうトラップ系の手品みたいな星術を仕込んでおくのは得意なんだ。キミも何度か味わったことがあるでしょ？」
line = "「準備にすごく時間はかかるけど、こういうトラップ系の手品みたいな星術を仕込んでおくのは得意なんだ。キミも何度か味わったことがあるでしょ？」"

[[dialogue]]
speaker = "ジュエリー"
# 「ああ。しかし、キミは我が助手を甘くみている。彼は１度リクリエを退けた『魔王』だ」
line = "「ああ。しかし、キミは我が助手を甘くみている。彼は１度リクリエを退けた『魔王』だ」"

[[dialogue]]
speaker = "ジュエリー"
# 「最強格の星騎士である助手なら、その程度の距離を飛ばしたところで、１０分もあれば戻ってくるよ？」
line = "「最強格の星騎士である助手なら、その程度の距離を飛ばしたところで、１０分もあれば戻ってくるよ？」"

[[dialogue]]
speaker = "ミネコ"
# 「ははは♪　甘くみているのは、ジュエリー、キミの方じゃないかな？」
line = "「ははは♪　甘くみているのは、ジュエリー、キミの方じゃないかな？」"

[[dialogue]]
speaker = "ミネコ"
# 「――私が盗み終わるのに、１０分もかかると思ってる？」
line = "「――私が盗み終わるのに、１０分もかかると思ってる？」"

[[dialogue]]
speaker = "unk"
# ミネコがパチンと指を鳴らす。すると――
line = "ミネコがパチンと指を鳴らす。すると――"

[[dialogue]]
speaker = "unk"
# 彼女の影から立ち上がるように、『長身の紳士』のような大きな影が姿を現した。
line = "彼女の影から立ち上がるように、『長身の紳士』のような大きな影が姿を現した。"

[[dialogue]]
speaker = "ミネコ"
# 「スティールファントム」
line = "「スティールファントム」"

[[dialogue]]
speaker = "ジュエリー"
# 「出したね、キミの影――『大怪盗』の幻影を」
line = "「出したね、キミの影――『大怪盗』の幻影を」"

[[dialogue]]
speaker = "unk"
# それは、大怪盗フランボウがメディアに写真や映像で取り沙汰されている姿。
line = "それは、大怪盗フランボウがメディアに写真や映像で取り沙汰されている姿。"

[[dialogue]]
speaker = "ミネコ"
# 「この『変装』についても、大体予測がついているみたいだね」
line = "「この『変装』についても、大体予測がついているみたいだね」"

[[dialogue]]
speaker = "ジュエリー"
# 「ああ。これまでその幻影とは、何度も手合わせしてきた。情報改竄によって見せているただの幻でないことは、もうわかっている」
line = "「ああ。これまでその幻影とは、何度も手合わせしてきた。情報改竄によって見せているただの幻でないことは、もうわかっている」"

[[dialogue]]
speaker = "ミネコ"
# 「ならこの状況、どっちが有利かもわかっているよね？　私の変装は――」
line = "「ならこの状況、どっちが有利かもわかっているよね？　私の変装は――」"

[[dialogue]]
speaker = "unk"
# 大怪盗の幻影がジュエリーに向かって、素早く拳を握って振り下ろす。
line = "大怪盗の幻影がジュエリーに向かって、素早く拳を握って振り下ろす。"

[[dialogue]]
speaker = "ジュエリー"
# 「っ……！」
line = "「っ……！」"

[[dialogue]]
speaker = "unk"
# 後ろに飛んで避けるジュエリー。彼女がそれまで立っていた場所には――
line = "後ろに飛んで避けるジュエリー。彼女がそれまで立っていた場所には――"

[[dialogue]]
speaker = "unk"
# 地面が大きく陥没する程のクレーターが出来上がっていた。
line = "地面が大きく陥没する程のクレーターが出来上がっていた。"

[[dialogue]]
speaker = "ミネコ"
# 「近接戦において、星騎士を真正面から殴り倒せる程のパワーを持っている」
line = "「近接戦において、星騎士を真正面から殴り倒せる程のパワーを持っている」"

[[dialogue]]
speaker = "ミネコ"
# 「果たして戦闘に不向きな能力しかないキミ１人で、これを倒せるかな？　ジュエリー・ブラウン」
line = "「果たして戦闘に不向きな能力しかないキミ１人で、これを倒せるかな？　ジュエリー・ブラウン」"

[[dialogue]]
speaker = "unk"
# 怪盗の幻影は、再びジュエリーに向けて拳を構えるのだった。
line = "怪盗の幻影は、再びジュエリーに向けて拳を構えるのだった。"

[[dialogue]]
speaker = "unk"
# それから変装したミネコとの戦闘が始まり――
line = "それから変装したミネコとの戦闘が始まり――"

[[dialogue]]
speaker = "ミネコ"
# 「ラッシュオブイリュージョンッ！」
line = "「ラッシュオブイリュージョンッ！」"

[[dialogue]]
speaker = "ジュエリー"
# 「くっ……！」
line = "「くっ……！」"

[[dialogue]]
speaker = "unk"
# 素早くもパワーある拳のラッシュにジュエリーは圧倒され、苦戦を強いられていた。
line = "素早くもパワーある拳のラッシュにジュエリーは圧倒され、苦戦を強いられていた。"

[[dialogue]]
speaker = "ジュエリー"
# 「やはり、他の星騎士は呼べないか……！」
line = "「やはり、他の星騎士は呼べないか……！」"

[[dialogue]]
speaker = "ミネコ"
# 「残念だけど対策済みだよ。ルパンの一族は代々、機械いじりも得意でね――」
line = "「残念だけど対策済みだよ。ルパンの一族は代々、機械いじりも得意でね――」"

[[dialogue]]
speaker = "ミネコ"
# 「事前に仕掛けておいた、ＤＩＳＣの電波と大聖堂周辺の音をかき消す装置をオンにしてある。キミが叫んだり連絡しようとしても、大聖堂まで届きはしないよ」
line = "「事前に仕掛けておいた、ＤＩＳＣの電波と大聖堂周辺の音をかき消す装置をオンにしてある。キミが叫んだり連絡しようとしても、大聖堂まで届きはしないよ」"

[[dialogue]]
speaker = "ミネコ"
# 「今頃大聖堂の方では、私が仕掛けてきてると勘違いして、守りをガチガチに固めているんじゃないかな？　配置を離れて、わざわざこの場所に来たりしないよ」
line = "「今頃大聖堂の方では、私が仕掛けてきてると勘違いして、守りをガチガチに固めているんじゃないかな？　配置を離れて、わざわざこの場所に来たりしないよ」"

[[dialogue]]
speaker = "ミネコ"
# 「――さあ、会長が戻って来る前に、そろそろ倒させてもらおうか、名探偵！」
line = "「――さあ、会長が戻って来る前に、そろそろ倒させてもらおうか、名探偵！」"

[[dialogue]]
speaker = "ジュエリー"
# 「……ああ、そうだね。そろそろ――」
line = "「……ああ、そうだね。そろそろ――」"

[[dialogue]]
speaker = "ジュエリー"
# 「私も反撃を始めるとしよう」
line = "「私も反撃を始めるとしよう」"

[[dialogue]]
speaker = "ジュエリー"
# 「チェンジ――『エクリプスフォーム』！」
line = "「チェンジ――『エクリプスフォーム』！」"

[[dialogue]]
speaker = "unk"
# 眩い光が辺りを包む。
line = "眩い光が辺りを包む。"

[[dialogue]]
speaker = "ミネコ"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "unk"
# 光が収まると、そこには――
line = "光が収まると、そこには――"

[[dialogue]]
speaker = "unk"
# 新フォームへと変身した、ジュエリーの姿があった。
line = "新フォームへと変身した、ジュエリーの姿があった。"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「……フランボウ、今日まででキミの能力は十分に見させてもらった」
line = "「……フランボウ、今日まででキミの能力は十分に見させてもらった」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「故に、ここからは私の番だ。この新たな力『エクリプスフォーム』で、キミを批評させてもらおう」
line = "「故に、ここからは私の番だ。この新たな力『エクリプスフォーム』で、キミを批評させてもらおう」"

[[dialogue]]
speaker = "unk"
# 日傘を差した『名探偵』は、純白の輝きを放つ星力を纏いながら、怪盗の幻影の前に立つ。
line = "日傘を差した『名探偵』は、純白の輝きを放つ星力を纏いながら、怪盗の幻影の前に立つ。"

[[dialogue]]
speaker = "ミネコ"
# 「エクリプスフォーム……？　ノヴァフォームじゃなくて？」
line = "「エクリプスフォーム……？　ノヴァフォームじゃなくて？」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「そこも下調べをしていたようだね。確かにこれは、ノヴァフォームに近い力だ。しかし調べてみて、厳密には違うということがわかった」
line = "「そこも下調べをしていたようだね。確かにこれは、ノヴァフォームに近い力だ。しかし調べてみて、厳密には違うということがわかった」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「これには、別の力が混じっている。アルケインノヴァエクストリームは、魔王と絆を結んだ相手の潜在能力を覚醒させるという技だ」
line = "「これには、別の力が混じっている。アルケインノヴァエクストリームは、魔王と絆を結んだ相手の潜在能力を覚醒させるという技だ」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「故に私の場合、『選星者』の力が引き出された。過去のとある『名探偵』が培ってきた能力が、今の私には宿っている」
line = "「故に私の場合、『選星者』の力が引き出された。過去のとある『名探偵』が培ってきた能力が、今の私には宿っている」"

[[dialogue]]
speaker = "ミネコ"
# 「とある名探偵……？」
line = "「とある名探偵……？」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「私の先祖――世界三大探偵の１人『ブラウン神父』」
line = "「私の先祖――世界三大探偵の１人『ブラウン神父』」"

[[dialogue]]
speaker = "ミネコ"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「不思議な感覚だよ。彼の活躍が描かれた小説を読んだ時にも感じていたが、私たちは思考がよく似ている」
line = "「不思議な感覚だよ。彼の活躍が描かれた小説を読んだ時にも感じていたが、私たちは思考がよく似ている」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「だからこそ、客観的にわかる。何をどうすれば、自身が更なる思考の先へ辿り着けるのか」
line = "「だからこそ、客観的にわかる。何をどうすれば、自身が更なる思考の先へ辿り着けるのか」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「さあ、どうする？　大怪盗フランボウ。私の計算では、もう間もなく愛しの助手が帰って来るよ」
line = "「さあ、どうする？　大怪盗フランボウ。私の計算では、もう間もなく愛しの助手が帰って来るよ」"

[[dialogue]]
speaker = "ミネコ"
# 「その前に、拳で眠らせる！」
line = "「その前に、拳で眠らせる！」"

[[dialogue]]
speaker = "unk"
# 名探偵と大怪盗の本気の戦いが始まるのだった――
line = "名探偵と大怪盗の本気の戦いが始まるのだった――"
