[[dialogue]]
speaker = "unk"
# 第１話,ユーリスと恋人外出デート,P
line = "第１話,ユーリスと恋人外出デート,P"

[[dialogue]]
speaker = "ユーリス"
# 「あっ……ふふ、待ってたよ会長。突然呼び出しちゃってごめんね？」
line = "「あっ……ふふ、待ってたよ会長。突然呼び出しちゃってごめんね？」"

[[dialogue]]
speaker = "unk"
# ユーリスから外出に誘われるなんて珍しい
line = "ユーリスから外出に誘われるなんて珍しい"

[[dialogue]]
speaker = "ユーリス"
# 「そうかな？　……いや、そうかも。いつもは私の秘密がバレないように、大抵どちらかの部屋で過ごしてるもんね？」
line = "「そうかな？　……いや、そうかも。いつもは私の秘密がバレないように、大抵どちらかの部屋で過ごしてるもんね？」"

[[dialogue]]
speaker = "ユーリス"
# 「そう思うと窮屈な思いをさせちゃってたかな……？　私の都合ばかり優先して、ろくに外に遊びに出ることもできなくて……」
line = "「そう思うと窮屈な思いをさせちゃってたかな……？　私の都合ばかり優先して、ろくに外に遊びに出ることもできなくて……」"

[[dialogue]]
speaker = "unk"
# 恋人と一緒にいられるならどこでも楽しいよ
line = "恋人と一緒にいられるならどこでも楽しいよ"

[[dialogue]]
speaker = "ユーリス"
# 「恋び──～～っっ。あ、ありがとう……。でも人目のある場所でそういうセリフは……」
line = "「恋び──～～っっ。あ、ありがとう……。でも人目のある場所でそういうセリフは……」"

[[dialogue]]
speaker = "ユーリス"
# 「ううんっ、嫌なわけじゃなくて……！　今の世の中、男同士で付き合っていてもおかしくはないし、誤魔化せるかもしれないけど……！」
line = "「ううんっ、嫌なわけじゃなくて……！　今の世の中、男同士で付き合っていてもおかしくはないし、誤魔化せるかもしれないけど……！」"

[[dialogue]]
speaker = "ユーリス"
# 「単純に、その……照れてしまうよ。あんまり恋人扱いされると、ユリアーナの自分が顔を出しちゃうというか……」
line = "「単純に、その……照れてしまうよ。あんまり恋人扱いされると、ユリアーナの自分が顔を出しちゃうというか……」"

[[dialogue]]
speaker = "ユーリス"
# 「キ……キスとかも、したくなっちゃう」
line = "「キ……キスとかも、したくなっちゃう」"

[[dialogue]]
speaker = "ユーリス"
# 「会長……」
line = "「会長……」"

[[dialogue]]
speaker = "ユーリス"
# 「ハッ──！　わ、私はこんな大通りで何を……！」
line = "「ハッ──！　わ、私はこんな大通りで何を……！」"

[[dialogue]]
speaker = "ユーリス"
# 「とりあえず行こうっ……。なんだか居たたまれないからっ……。話は歩きながらするよっ……！」
line = "「とりあえず行こうっ……。なんだか居たたまれないからっ……。話は歩きながらするよっ……！」"

[[dialogue]]
speaker = "ユーリス"
# 「実はセーラさんやユウリさんから叱られちゃってね。少しは自分のためにもお金を使えって」
line = "「実はセーラさんやユウリさんから叱られちゃってね。少しは自分のためにもお金を使えって」"

[[dialogue]]
speaker = "ユーリス"
# 「両親にも同じことを言われちゃったよ。送金したカジノのバイト代も半分くらい戻ってきちゃってさ」
line = "「両親にも同じことを言われちゃったよ。送金したカジノのバイト代も半分くらい戻ってきちゃってさ」"

[[dialogue]]
speaker = "ユーリス"
# 「それで金銭的にもちょっと余裕ができたものだから。今日は会長に何か奢ってあげようかなって」
line = "「それで金銭的にもちょっと余裕ができたものだから。今日は会長に何か奢ってあげようかなって」"

[[dialogue]]
speaker = "ユーリス"
# 「ふふ、なんでも好きなものを言ってよ。今日の私はフルコースでも耐えられるよ？」
line = "「ふふ、なんでも好きなものを言ってよ。今日の私はフルコースでも耐えられるよ？」"

[[dialogue]]
speaker = "unk"
# それじゃ王子様からのキスを
line = "それじゃ王子様からのキスを"

[[dialogue]]
speaker = "ユーリス"
# 「なっ──！！？　お、お金で買えるものにしてよっ……！　なんでもとは言ったけど、そういうのは……！」
line = "「なっ──！！？　お、お金で買えるものにしてよっ……！　なんでもとは言ったけど、そういうのは……！」"

[[dialogue]]
speaker = "ユーリス"
# 「どうしてもと言うなら、その……お部屋に戻ってからしてあげるけど。でもせっかくこうして外にも出てきたわけだし……」
line = "「どうしてもと言うなら、その……お部屋に戻ってからしてあげるけど。でもせっかくこうして外にも出てきたわけだし……」"

[[dialogue]]
speaker = "ユーリス"
# 「私としては奢りを理由に、普段しない外出デートを楽しみたいと思って──……。そ、そもそもキスなんか無料でいくらでも──……」
line = "「私としては奢りを理由に、普段しない外出デートを楽しみたいと思って──……。そ、そもそもキスなんか無料でいくらでも──……」"

[[dialogue]]
speaker = "ユーリス"
# 「あっ、何をくすくす笑ってるんだいっ？　もしかしなくても、私をからかったねっ？　い、意地悪だよっ」
line = "「あっ、何をくすくす笑ってるんだいっ？　もしかしなくても、私をからかったねっ？　い、意地悪だよっ」"

[[dialogue]]
speaker = "ユーリス"
# 「ひゃっ！？　ちょっ、ちょっと外で抱き締めるのは……！　こここ、こんなところ誰かに見られたら……！」
line = "「ひゃっ！？　ちょっ、ちょっと外で抱き締めるのは……！　こここ、こんなところ誰かに見られたら……！」"

[[dialogue]]
speaker = "ユーリス"
# 「肩を組んでるだけって、んんっ……。あ、明らかに正面から抱き締めてるじゃないかっ……！」
line = "「肩を組んでるだけって、んんっ……。あ、明らかに正面から抱き締めてるじゃないかっ……！」"

[[dialogue]]
speaker = "ユーリス"
# 「嫌じゃないけど。嫌なわけないけどっ。でも恥ずかしすぎて──」
line = "「嫌じゃないけど。嫌なわけないけどっ。でも恥ずかしすぎて──」"

[[dialogue]]
speaker = "マトイ"
# 「──あれ？　会長とユーリスくん？」
line = "「──あれ？　会長とユーリスくん？」"

[[dialogue]]
speaker = "ユーリス"
# 「きゃっ……！！？」
line = "「きゃっ……！！？」"

[[dialogue]]
speaker = "マトイ"
# 「２人してお出かけ？　男同士仲良いね～」
line = "「２人してお出かけ？　男同士仲良いね～」"

[[dialogue]]
speaker = "ユーリス"
# 「マ、マトイさん。ちょっと臨時収入があったものだから２人で何か食べに行こうかって話になりまして」
line = "「マ、マトイさん。ちょっと臨時収入があったものだから２人で何か食べに行こうかって話になりまして」"

[[dialogue]]
speaker = "マトイ"
# 「ヘレナさんのカジノでバイトしてたんだっけ？　色々と大変だったらしいね～。新種のモンスターが出たとか」
line = "「ヘレナさんのカジノでバイトしてたんだっけ？　色々と大変だったらしいね～。新種のモンスターが出たとか」"

[[dialogue]]
speaker = "ユーリス"
# （っっ。バ、バレてない……？　会長とイチャイチャしちゃってたこと……。も、もし見られてたら……！）
line = "（っっ。バ、バレてない……？　会長とイチャイチャしちゃってたこと……。も、もし見られてたら……！）"

[[dialogue]]
speaker = "マトイ"
# 「ところで……その。さっき２人で抱き合ってなかった？」
line = "「ところで……その。さっき２人で抱き合ってなかった？」"

[[dialogue]]
speaker = "ユーリス"
# 「へっ！？」
line = "「へっ！？」"

[[dialogue]]
speaker = "マトイ"
# 「遠目からだったし見間違いかもしれないんだけど。すっごく距離が近かったような……」
line = "「遠目からだったし見間違いかもしれないんだけど。すっごく距離が近かったような……」"

[[dialogue]]
speaker = "ユーリス"
# 「それは、えとっ、そのっ……」
line = "「それは、えとっ、そのっ……」"

[[dialogue]]
speaker = "ユーリス"
# 「ひゃっ！？」
line = "「ひゃっ！？」"

[[dialogue]]
speaker = "unk"
# 俺とユーリスの仲だからな
line = "俺とユーリスの仲だからな"

[[dialogue]]
speaker = "ユーリス"
# 「か、会長……！　こんなにくっついたら……！」
line = "「か、会長……！　こんなにくっついたら……！」"

[[dialogue]]
speaker = "マトイ"
# 「あはは、ホントに仲良しなんだね♪　なんだか羨ましいなぁ。気の置けない親友同士って感じで」
line = "「あはは、ホントに仲良しなんだね♪　なんだか羨ましいなぁ。気の置けない親友同士って感じで」"

[[dialogue]]
speaker = "マトイ"
# 「それじゃ２人のデートを邪魔するのも悪いし、私は行くね～。私もこれからアナとデートだから♪　会長みたいにアナのこと抱き締めてあげちゃおっと♪」
line = "「それじゃ２人のデートを邪魔するのも悪いし、私は行くね～。私もこれからアナとデートだから♪　会長みたいにアナのこと抱き締めてあげちゃおっと♪」"

[[dialogue]]
speaker = "ユーリス"
# 「い……行っちゃった。意外と、その……誤魔化せちゃうものなんだね？　もっとこう……騒ぎ立てられちゃうものだと思ったよ」
line = "「い……行っちゃった。意外と、その……誤魔化せちゃうものなんだね？　もっとこう……騒ぎ立てられちゃうものだと思ったよ」"

[[dialogue]]
speaker = "ユーリス"
# 「みんなから見たら男同士でベタベタしているように見えるわけだし、会長にも迷惑かかっちゃうかもって……」
line = "「みんなから見たら男同士でベタベタしているように見えるわけだし、会長にも迷惑かかっちゃうかもって……」"

[[dialogue]]
speaker = "ユーリス"
# 「でも……嬉しかった。私はマトイさんが来て、つい身を離しちゃったのに……。会長はぐっと私を抱き寄せてくれて……」
line = "「でも……嬉しかった。私はマトイさんが来て、つい身を離しちゃったのに……。会長はぐっと私を抱き寄せてくれて……」"

[[dialogue]]
speaker = "unk"
# こそこそする必要なんて何もないからね
line = "こそこそする必要なんて何もないからね"

[[dialogue]]
speaker = "ユーリス"
# 「うん……そうだったんだね。私は他人の目を気にしすぎていたみたいだ」
line = "「うん……そうだったんだね。私は他人の目を気にしすぎていたみたいだ」"

[[dialogue]]
speaker = "ユーリス"
# 「たとえ私が男でも女でも、私と会長の仲が良いのは、その、確かなことなんだから…………」
line = "「たとえ私が男でも女でも、私と会長の仲が良いのは、その、確かなことなんだから…………」"

[[dialogue]]
speaker = "ユーリス"
# 「えへへ、なんだか吹っ切れた気がするよ。これからは出先でも心置きなくイチャイチャしちゃうことにする」
line = "「えへへ、なんだか吹っ切れた気がするよ。これからは出先でも心置きなくイチャイチャしちゃうことにする」"

[[dialogue]]
speaker = "ユーリス"
# 「本当はずっとこんな風に君とイチャイチャしたかったんだ。いつでもどこでもベタベタしたり、普通のカップルみたいに一緒に買い食いや寄り道したり……」
line = "「本当はずっとこんな風に君とイチャイチャしたかったんだ。いつでもどこでもベタベタしたり、普通のカップルみたいに一緒に買い食いや寄り道したり……」"

[[dialogue]]
speaker = "ユーリス"
# 「しても……良かったんだね？　私が怖がってただけで、こそこそする必要なんて最初からなかったんだ」
line = "「しても……良かったんだね？　私が怖がってただけで、こそこそする必要なんて最初からなかったんだ」"

[[dialogue]]
speaker = "ユーリス"
# 「ん、ちゅっ──。えへへ、それじゃあ行こっか会長。思いっきりデートしちゃおうっ？」
line = "「ん、ちゅっ──。えへへ、それじゃあ行こっか会長。思いっきりデートしちゃおうっ？」"

[[dialogue]]
speaker = "ユーリス"
# 「私、会長としたいことたくさんあるんだ。今日はとことん付き合ってもらっちゃうからねっ？」
line = "「私、会長としたいことたくさんあるんだ。今日はとことん付き合ってもらっちゃうからねっ？」"
