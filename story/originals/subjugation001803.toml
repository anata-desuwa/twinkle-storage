[[dialogue]]
speaker = "リップル"
# 「さあ、トーチャクです！　ここがワタシのサンクチュアリ！　リゾート結界で～す！」
line = "「さあ、トーチャクです！　ここがワタシのサンクチュアリ！　リゾート結界で～す！」"

[[dialogue]]
speaker = "モネ"
# 「すごい……本当にリゾートだ……」
line = "「すごい……本当にリゾートだ……」"

[[dialogue]]
speaker = "リップル"
# 「フフフ……どうデスか、ハジメてリゾート結界に来た感想は♪」
line = "「フフフ……どうデスか、ハジメてリゾート結界に来た感想は♪」"

[[dialogue]]
speaker = "モネ"
# 「うぅ、日差しがキツい……潮風と紫外線で本が傷んじゃう……」
line = "「うぅ、日差しがキツい……潮風と紫外線で本が傷んじゃう……」"

[[dialogue]]
speaker = "リップル"
# 「ガーン！　モネ、テンション低いです！　リゾート結界、ダメでしたか……？」
line = "「ガーン！　モネ、テンション低いです！　リゾート結界、ダメでしたか……？」"

[[dialogue]]
speaker = "モネ"
# 「ご、ごめんなさい、リップルさん。私って根っからのインドア派だから……それに本のことを考えたら、海は控えたいかなって……」
line = "「ご、ごめんなさい、リップルさん。私って根っからのインドア派だから……それに本のことを考えたら、海は控えたいかなって……」"

[[dialogue]]
speaker = "リップル"
# 「ソウだったんですね……だったら、モネはどうして水着を着てイルんです？　プールで泳ぐのデスか？」
line = "「ソウだったんですね……だったら、モネはどうして水着を着てイルんです？　プールで泳ぐのデスか？」"

[[dialogue]]
speaker = "モネ"
# 「えと、話せば長いんですけど……私、人工戦闘服のテスターになったんです」
line = "「えと、話せば長いんですけど……私、人工戦闘服のテスターになったんです」"

[[dialogue]]
speaker = "リップル"
# 「ジンコーセントーフク？　テスター？」
line = "「ジンコーセントーフク？　テスター？」"

[[dialogue]]
speaker = "モネ"
# 「う～ん説明が難しいんですけど、要するにこの水着を着て、使いこなせるようにならないといけないんです」
line = "「う～ん説明が難しいんですけど、要するにこの水着を着て、使いこなせるようにならないといけないんです」"

[[dialogue]]
speaker = "リップル"
# 「オー……つまりモネはソーダイなミッションを受けてるんデスね！　理解しマシた！」
line = "「オー……つまりモネはソーダイなミッションを受けてるんデスね！　理解しマシた！」"

[[dialogue]]
speaker = "モネ"
# 「あはは、そんな大袈裟なことじゃないんですけど……とにかく、リゾート結界に来たくて水着に変身したわけじゃないんです」
line = "「あはは、そんな大袈裟なことじゃないんですけど……とにかく、リゾート結界に来たくて水着に変身したわけじゃないんです」"

[[dialogue]]
speaker = "リップル"
# 「それならゴメンなさいです。モネのコトをムリヤリ連れて来てシマイました……」
line = "「それならゴメンなさいです。モネのコトをムリヤリ連れて来てシマイました……」"

[[dialogue]]
speaker = "モネ"
# 「いえ、私も誤解させるような格好しててごめんなさい」
line = "「いえ、私も誤解させるような格好しててごめんなさい」"

[[dialogue]]
speaker = "リップル"
# 「ところで、モネの水着はちょっと変わってマスね？　何かのコスプレです？」
line = "「ところで、モネの水着はちょっと変わってマスね？　何かのコスプレです？」"

[[dialogue]]
speaker = "モネ"
# 「こ、これはその……サンタクロースのコスプレというか水着というか……」
line = "「こ、これはその……サンタクロースのコスプレというか水着というか……」"

[[dialogue]]
speaker = "リップル"
# 「サンタクロース！？　サンタクロースも水着を着るんデスか！？」
line = "「サンタクロース！？　サンタクロースも水着を着るんデスか！？」"

[[dialogue]]
speaker = "モネ"
# 「一応南半球は夏がクリスマスですから、サンタクロースも水着を着ることがあるらしいです。サーフィンもするとか」
line = "「一応南半球は夏がクリスマスですから、サンタクロースも水着を着ることがあるらしいです。サーフィンもするとか」"

[[dialogue]]
speaker = "リップル"
# 「オー、サンタクロースは夏にもやってくるんデスね！　しかもサーフィンまで！　親近感がわきマス！」
line = "「オー、サンタクロースは夏にもやってくるんデスね！　しかもサーフィンまで！　親近感がわきマス！」"

[[dialogue]]
speaker = "リップル"
# 「つまりサンタはワタシの仲間……これでクリスマスの謎にイッポ近づきマシた！」
line = "「つまりサンタはワタシの仲間……これでクリスマスの謎にイッポ近づきマシた！」"

[[dialogue]]
speaker = "モネ"
# 「クリスマスの謎……？」
line = "「クリスマスの謎……？」"

[[dialogue]]
speaker = "リップル"
# 「サンタクロースはクリスマスの謎を解き明かすキーパーソンです！　こうなったら、ワタシもサンタクロースにヘンシンです！」
line = "「サンタクロースはクリスマスの謎を解き明かすキーパーソンです！　こうなったら、ワタシもサンタクロースにヘンシンです！」"

[[dialogue]]
speaker = "モネ"
# 「サンタクロースに変身！？　そんなことができるんですか！？」
line = "「サンタクロースに変身！？　そんなことができるんですか！？」"

[[dialogue]]
speaker = "リップル"
# 「サンタが水着にナレルなら、ワタシもきっとサンタにナレます♪　サンタと衣装をコウカンで～す！」
line = "「サンタが水着にナレルなら、ワタシもきっとサンタにナレます♪　サンタと衣装をコウカンで～す！」"

[[dialogue]]
speaker = "モネ"
# 「そんな理屈で！？」
line = "「そんな理屈で！？」"

[[dialogue]]
speaker = "リップル"
# 「それでは……へ～ンシン！」
line = "「それでは……へ～ンシン！」"

[[dialogue]]
speaker = "リップル"
# 「──リップル・クリスマスサンタバージョンです！　イェーイです☆」
line = "「──リップル・クリスマスサンタバージョンです！　イェーイです☆」"

[[dialogue]]
speaker = "モネ"
# 「────」
line = "「────」"

[[dialogue]]
speaker = "リップル"
# 「？？？　モネ、どうかしましたか？　ワタシ、何か変です？」
line = "「？？？　モネ、どうかしましたか？　ワタシ、何か変です？」"

[[dialogue]]
speaker = "モネ"
# 「……ろ」
line = "「……ろ」"

[[dialogue]]
speaker = "リップル"
# 「ロ……？」
line = "「ロ……？」"

[[dialogue]]
speaker = "モネ"
# 「露出ーーーーーーーーーーーーーーーーー！！！」
line = "「露出ーーーーーーーーーーーーーーーーー！！！」"

[[dialogue]]
speaker = "リップル"
# 「ワオ！　ＢＩＧボイスです！」
line = "「ワオ！　ＢＩＧボイスです！」"

[[dialogue]]
speaker = "モネ"
# 「リップルさん、その格好はダメですよ！　水着とかそういう次元を超えています！」
line = "「リップルさん、その格好はダメですよ！　水着とかそういう次元を超えています！」"

[[dialogue]]
speaker = "モネ"
# 「水着を超えてヒモ！　ほとんどヒモじゃないですか！！」
line = "「水着を超えてヒモ！　ほとんどヒモじゃないですか！！」"

[[dialogue]]
speaker = "リップル"
# 「チッチッチ、ヒモじゃなくてリボンでーす♪　クリスマスとプレゼントのイメージを反映してみマシた♪」
line = "「チッチッチ、ヒモじゃなくてリボンでーす♪　クリスマスとプレゼントのイメージを反映してみマシた♪」"

[[dialogue]]
speaker = "モネ"
# 「リップルさんのクリスマスのイメージおかしくないですか！？」
line = "「リップルさんのクリスマスのイメージおかしくないですか！？」"

[[dialogue]]
speaker = "リップル"
# 「コウメイからクリスマスはウェーイ♪　イェーイ☆　って教わりマシた！　さらにクリスマスといえばクリスマスプレゼント！　コレがそのコタエで～す！」
line = "「コウメイからクリスマスはウェーイ♪　イェーイ☆　って教わりマシた！　さらにクリスマスといえばクリスマスプレゼント！　コレがそのコタエで～す！」"

[[dialogue]]
speaker = "モネ"
# 「意味が分からないです！？　というか戦闘服を自力で変えられるなんて……リップルさんが特別な天使だから……？」
line = "「意味が分からないです！？　というか戦闘服を自力で変えられるなんて……リップルさんが特別な天使だから……？」"

[[dialogue]]
speaker = "リップル"
# 「ふっふっふ……サマーパワーに不可能はナイので～す！」
line = "「ふっふっふ……サマーパワーに不可能はナイので～す！」"

[[dialogue]]
speaker = "モネ"
# 「リップルさん、ルール無用すぎますよ……本当に私とはパワーも元気も大違いで……」
line = "「リップルさん、ルール無用すぎますよ……本当に私とはパワーも元気も大違いで……」"

[[dialogue]]
speaker = "リップル"
# 「モネにはモネのスゴイところがアリます！」
line = "「モネにはモネのスゴイところがアリます！」"

[[dialogue]]
speaker = "モネ"
# 「わ、私なんかに誇れることなんて全然……」
line = "「わ、私なんかに誇れることなんて全然……」"

[[dialogue]]
speaker = "リップル"
# 「そんなコトありませーん。モネにはたくさんの本から得た知識がアリます。それはとってもスゴイことです！」
line = "「そんなコトありませーん。モネにはたくさんの本から得た知識がアリます。それはとってもスゴイことです！」"

[[dialogue]]
speaker = "リップル"
# 「それに、ワタシは今モネの力を必要とシテいまーす。クリスマスでリゾートがピンチなんです！」
line = "「それに、ワタシは今モネの力を必要とシテいまーす。クリスマスでリゾートがピンチなんです！」"

[[dialogue]]
speaker = "リップル"
# 「クリスマスが近づいているセイでリゾートのお客さんが減ってキテます……だからワタシはクリスマスのことをモット知りたいです！」
line = "「クリスマスが近づいているセイでリゾートのお客さんが減ってキテます……だからワタシはクリスマスのことをモット知りたいです！」"

[[dialogue]]
speaker = "モネ"
# 「つまり、私にクリスマスのことを詳しく教えてほしいってことですか？」
line = "「つまり、私にクリスマスのことを詳しく教えてほしいってことですか？」"

[[dialogue]]
speaker = "リップル"
# 「ソウです！　ワタシにクリスマスのゴクイを教えてクダさ～い！」
line = "「ソウです！　ワタシにクリスマスのゴクイを教えてクダさ～い！」"

[[dialogue]]
speaker = "モネ"
# 「極意なんて大層なことは教えられないですけど、一般的なことなら……」
line = "「極意なんて大層なことは教えられないですけど、一般的なことなら……」"

[[dialogue]]
speaker = "モネ"
# 「まず、クリスマスは女神様の誕生日ってことは知ってますか？」
line = "「まず、クリスマスは女神様の誕生日ってことは知ってますか？」"

[[dialogue]]
speaker = "リップル"
# 「イイエ、知らなかったです！　合言葉はメリ～クルシミマス！　ってことはシッテます！」
line = "「イイエ、知らなかったです！　合言葉はメリ～クルシミマス！　ってことはシッテます！」"

[[dialogue]]
speaker = "モネ"
# 「クルシミマスじゃなくて、クリスマスです……合言葉じゃなくてクリスマスを祝う言葉なんですけどね」
line = "「クルシミマスじゃなくて、クリスマスです……合言葉じゃなくてクリスマスを祝う言葉なんですけどね」"

[[dialogue]]
speaker = "リップル"
# 「つまりオメデタイ言葉なんデスね！　コングラチュレーションズ！」
line = "「つまりオメデタイ言葉なんデスね！　コングラチュレーションズ！」"

[[dialogue]]
speaker = "モネ"
# 「クリスマスという行事は、本来は宗教的な意味合いが強いもので……諸説ありますけど女神信仰や各地の慣習が習合した──」
line = "「クリスマスという行事は、本来は宗教的な意味合いが強いもので……諸説ありますけど女神信仰や各地の慣習が習合した──」"

[[dialogue]]
speaker = "リップル"
# 「？？？？？？？？？？？」
line = "「？？？？？？？？？？？」"

[[dialogue]]
speaker = "モネ"
# 「ごめんなさい……こんな説明じゃ何も分からないですよね……」
line = "「ごめんなさい……こんな説明じゃ何も分からないですよね……」"

[[dialogue]]
speaker = "リップル"
# 「え～と……女神様のハッピーバースデーをミンナでお祝いシヨウ！　って感じデスか？」
line = "「え～と……女神様のハッピーバースデーをミンナでお祝いシヨウ！　って感じデスか？」"

[[dialogue]]
speaker = "モネ"
# 「現代だとそういうイベントになってますね。地域や文化によっては、もう少し本格的な降誕祭をすると思うんですけど……」
line = "「現代だとそういうイベントになってますね。地域や文化によっては、もう少し本格的な降誕祭をすると思うんですけど……」"

[[dialogue]]
speaker = "リップル"
# 「なら、どうしてパーティーをするんデスか？　ケーキを食べる意味もよくワカリませ～ん」
line = "「なら、どうしてパーティーをするんデスか？　ケーキを食べる意味もよくワカリませ～ん」"

[[dialogue]]
speaker = "リップル"
# 「ソレにサンタクロースも謎のキャラクターです！　サンタは女神様のナンなんですか？」
line = "「ソレにサンタクロースも謎のキャラクターです！　サンタは女神様のナンなんですか？」"

[[dialogue]]
speaker = "モネ"
# 「え、ええと……パーティーをしたりケーキを食べるのは色んな慣習が混ざり合った結果で……」
line = "「え、ええと……パーティーをしたりケーキを食べるのは色んな慣習が混ざり合った結果で……」"

[[dialogue]]
speaker = "モネ"
# 「女神様とサンタクロースの関係は……えーと……そう聞かれても……」
line = "「女神様とサンタクロースの関係は……えーと……そう聞かれても……」"

[[dialogue]]
speaker = "モネ"
# 「ダメ、私もクリスマスがわからなくなってきたかも……ごめんなさい、リップルさん……」
line = "「ダメ、私もクリスマスがわからなくなってきたかも……ごめんなさい、リップルさん……」"

[[dialogue]]
speaker = "リップル"
# 「ダイジョウブです！　ワカらないことは一緒に調べましょう！　クリスマスの謎をトキ明かすのです！」
line = "「ダイジョウブです！　ワカらないことは一緒に調べましょう！　クリスマスの謎をトキ明かすのです！」"

[[dialogue]]
speaker = "モネ"
# 「リップルさん……はい、一緒に調べましょう……！」
line = "「リップルさん……はい、一緒に調べましょう……！」"

[[dialogue]]
speaker = "リップル"
# 「それじゃあ、サッソク結界の外へゴーです！」
line = "「それじゃあ、サッソク結界の外へゴーです！」"

[[dialogue]]
speaker = "モネ"
# 「ままま待って！　その前に変身を解いてください！　その格好はマズいですから～！！」
line = "「ままま待って！　その前に変身を解いてください！　その格好はマズいですから～！！」"
