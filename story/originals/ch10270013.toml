[[dialogue]]
speaker = "unk"
# 第３話,コハルコの正体,P
line = "第３話,コハルコの正体,P"

[[dialogue]]
speaker = "マトイ"
# 「大変大変大変～！？」
line = "「大変大変大変～！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「どうしたの突然。ネッシーの求愛動画でも見た？」
line = "「どうしたの突然。ネッシーの求愛動画でも見た？」"

[[dialogue]]
speaker = "マトイ"
# 「それはそれで大変だけど！　そうじゃなくて！」
line = "「それはそれで大変だけど！　そうじゃなくて！」"

[[dialogue]]
speaker = "マトイ"
# 「ジャスティスウィザードっていうハッカーが新星学園を攻撃するって宣言したんだって！」
line = "「ジャスティスウィザードっていうハッカーが新星学園を攻撃するって宣言したんだって！」"

[[dialogue]]
speaker = "マトイ"
# 「何でも、『流星・新星両学園は星力という神秘の力を不当に独占している。システムを完全に停止させ、真実を白日の下に暴き出す』──とか言ってるらしいの」
line = "「何でも、『流星・新星両学園は星力という神秘の力を不当に独占している。システムを完全に停止させ、真実を白日の下に暴き出す』──とか言ってるらしいの」"

[[dialogue]]
speaker = "ヴィーナス"
# 「何それ。そもそも星力が使えるかどうかは適性の問題じゃないの」
line = "「何それ。そもそも星力が使えるかどうかは適性の問題じゃないの」"

[[dialogue]]
speaker = "サーシャ"
# 「でもほんとに攻撃されたら厄介ねぇ。パソコンとか使えなくなるのかしら～？」
line = "「でもほんとに攻撃されたら厄介ねぇ。パソコンとか使えなくなるのかしら～？」"

[[dialogue]]
speaker = "マトイ"
# 「そんなものじゃ済まない思いますよ……」
line = "「そんなものじゃ済まない思いますよ……」"

[[dialogue]]
speaker = "アナ"
# 「今のところ打つ手なし。モンスターやアステラなら対処できますが、相手がハッカーでは星術で倒すわけにはいきませんし、どこにいるかもわかりません」
line = "「今のところ打つ手なし。モンスターやアステラなら対処できますが、相手がハッカーでは星術で倒すわけにはいきませんし、どこにいるかもわかりません」"

[[dialogue]]
speaker = "コハルコ"
# 「こんにちは。放送委員会の書類を持ってきたんだけど……」
line = "「こんにちは。放送委員会の書類を持ってきたんだけど……」"

[[dialogue]]
speaker = "マトイ"
# 「コハルコさん、今大変なことになってるんですけど！　ジャスティンハザードってハッカーが──」
line = "「コハルコさん、今大変なことになってるんですけど！　ジャスティンハザードってハッカーが──」"

[[dialogue]]
speaker = "コハルコ"
# 「ああ、その話」
line = "「ああ、その話」"

[[dialogue]]
speaker = "ヴィーナス"
# 「落ち着いてる場合じゃないでしょ、新星学園が乗っ取られるかもしれないのよ！」
line = "「落ち着いてる場合じゃないでしょ、新星学園が乗っ取られるかもしれないのよ！」"

[[dialogue]]
speaker = "コハルコ"
# 「それならもう解決したよ」
line = "「それならもう解決したよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「へ？」
line = "「へ？」"

[[dialogue]]
speaker = "コハルコ"
# 「新星学園のシステムに不正に侵入しようとしてたから、攻撃元を突き止めて逆にクラックしたよ。警察に通報したし、もう捕まってるんじゃないかな」
line = "「新星学園のシステムに不正に侵入しようとしてたから、攻撃元を突き止めて逆にクラックしたよ。警察に通報したし、もう捕まってるんじゃないかな」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そんなあっさり……正義の魔法使いとやらもコハルコさんの前には形無しね」
line = "「そんなあっさり……正義の魔法使いとやらもコハルコさんの前には形無しね」"

[[dialogue]]
speaker = "サーシャ"
# 「前はいいことをしていたのに残念だわ～」
line = "「前はいいことをしていたのに残念だわ～」"

[[dialogue]]
speaker = "コハルコ"
# 「そうだね……」
line = "「そうだね……」"

[[dialogue]]
speaker = "コハルコ"
# 「で、本題なんだけど……」
line = "「で、本題なんだけど……」"

[[dialogue]]
speaker = "unk"
# 書類受け取ります
line = "書類受け取ります"

[[dialogue]]
speaker = "コハルコ"
# 「うん、お願いね」
line = "「うん、お願いね」"

[[dialogue]]
speaker = "コハルコ"
# 「さてと。今日は卵がお買い得な日──あ、会長さんも今帰り？」
line = "「さてと。今日は卵がお買い得な日──あ、会長さんも今帰り？」"

[[dialogue]]
speaker = "unk"
# ジャスティス──
line = "ジャスティス──"

[[dialogue]]
speaker = "コハルコ"
# 「！？」
line = "「！？」"

[[dialogue]]
speaker = "コハルコ"
# 「も、もう、またジャスティスウィザードの話？　意外と人気者なんだね。同じハッカーとして妬いちゃうなぁ～」
line = "「も、もう、またジャスティスウィザードの話？　意外と人気者なんだね。同じハッカーとして妬いちゃうなぁ～」"

[[dialogue]]
speaker = "unk"
# コハルコさんが本物なんですよね？
line = "コハルコさんが本物なんですよね？"

[[dialogue]]
speaker = "コハルコ"
# 「ひゃいっ！？　な、なんのことかな？　私はジャスティスウィザードなんて関係ないけど……」
line = "「ひゃいっ！？　な、なんのことかな？　私はジャスティスウィザードなんて関係ないけど……」"

[[dialogue]]
speaker = "コハルコ"
# 「う……その目は確信してる目だね……」
line = "「う……その目は確信してる目だね……」"

[[dialogue]]
speaker = "コハルコ"
# 「そうです。私がジャスティスウィザードです。本物の──だけど」
line = "「そうです。私がジャスティスウィザードです。本物の──だけど」"

[[dialogue]]
speaker = "unk"
# じゃあ捕まったのは偽物？
line = "じゃあ捕まったのは偽物？"

[[dialogue]]
speaker = "コハルコ"
# 「うん。彼は私がいなくなった後、私の名前を勝手に使ってただけ」
line = "「うん。彼は私がいなくなった後、私の名前を勝手に使ってただけ」"

[[dialogue]]
speaker = "コハルコ"
# 「そもそも私はジャスティスウィザードなんて名乗った覚えはないの。好きでそんなダサい名前名乗らないから。マトイさんもしれっと間違えてたし」
line = "「そもそも私はジャスティスウィザードなんて名乗った覚えはないの。好きでそんなダサい名前名乗らないから。マトイさんもしれっと間違えてたし」"

[[dialogue]]
speaker = "コハルコ"
# 「ハッカーになったのは……えーと……どこから話そうかな。うち、お母さんが病気で手術のお金が必要になってね」
line = "「ハッカーになったのは……えーと……どこから話そうかな。うち、お母さんが病気で手術のお金が必要になってね」"

[[dialogue]]
speaker = "コハルコ"
# 「お父さんにプログラミングを少し教えてもらってたから、何とか役立てられないかなと思って……必死になってるうちになんやかんやでハッカーになって」
line = "「お父さんにプログラミングを少し教えてもらってたから、何とか役立てられないかなと思って……必死になってるうちになんやかんやでハッカーになって」"

[[dialogue]]
speaker = "unk"
# （なんやかんやが大雑把すぎる）
line = "（なんやかんやが大雑把すぎる）"

[[dialogue]]
speaker = "コハルコ"
# 「セキュリティの穴を見つけて賞金をもらって、お母さんの手術の費用は稼げたんだけど……」
line = "「セキュリティの穴を見つけて賞金をもらって、お母さんの手術の費用は稼げたんだけど……」"

[[dialogue]]
speaker = "コハルコ"
# 「ハッカーの世界に首を突っ込んでみたら、悪い人に苦しめられてる人たちがいるのを知っちゃって」
line = "「ハッカーの世界に首を突っ込んでみたら、悪い人に苦しめられてる人たちがいるのを知っちゃって」"

[[dialogue]]
speaker = "コハルコ"
# 「なんとか助けられないかなと思って、ちょーっと裏でこそこそやってたら、いつの間にか変な異名で呼ばれてたの」
line = "「なんとか助けられないかなと思って、ちょーっと裏でこそこそやってたら、いつの間にか変な異名で呼ばれてたの」"

[[dialogue]]
speaker = "コハルコ"
# 「でも誰かに身辺を探られてる気がして、表の仕事の伝で知り合った九浄ヘレナさんに相談したんだ」
line = "「でも誰かに身辺を探られてる気がして、表の仕事の伝で知り合った九浄ヘレナさんに相談したんだ」"

[[dialogue]]
speaker = "コハルコ"
# 「で、身を守ってもらうために新星学園のシステム担当として採用してもらって。しかも星騎士の素質があったから生徒として入学したってわけ」
line = "「で、身を守ってもらうために新星学園のシステム担当として採用してもらって。しかも星騎士の素質があったから生徒として入学したってわけ」"

[[dialogue]]
speaker = "コハルコ"
# 「そういうわけで非合法なハッカー活動からはもう足を洗ったの」
line = "「そういうわけで非合法なハッカー活動からはもう足を洗ったの」"

[[dialogue]]
speaker = "コハルコ"
# 「だから今はしてない……よ？」
line = "「だから今はしてない……よ？」"

[[dialogue]]
speaker = "unk"
# 本当に？
line = "本当に？"

[[dialogue]]
speaker = "コハルコ"
# 「時々……たま～に……見過ごせないなーって案件はちょーっとだけ手を出してるけど。ほんとにちょこっとだけ」
line = "「時々……たま～に……見過ごせないなーって案件はちょーっとだけ手を出してるけど。ほんとにちょこっとだけ」"

[[dialogue]]
speaker = "コハルコ"
# 「このことはみんなには秘密にしておいてね？　あははは……」
line = "「このことはみんなには秘密にしておいてね？　あははは……」"
