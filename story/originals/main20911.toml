[[dialogue]]
speaker = "unk"
# 第１２話,あなたのことを教えて,B
line = "第１２話,あなたのことを教えて,B"

[[dialogue]]
speaker = "unk"
# クロトたちが天界へ出発した後、新星学園では──
line = "クロトたちが天界へ出発した後、新星学園では──"

[[dialogue]]
speaker = "チナ"
# 「これで……よかったのか……？」
line = "「これで……よかったのか……？」"

[[dialogue]]
speaker = "チナ"
# 「もし作戦が失敗したらアタシのせいだ……でもリクリエに利用されるわけには……」
line = "「もし作戦が失敗したらアタシのせいだ……でもリクリエに利用されるわけには……」"

[[dialogue]]
speaker = "シノ"
# 「やはり気になりますか？」
line = "「やはり気になりますか？」"

[[dialogue]]
speaker = "チナ"
# 「！　何しに来た？」
line = "「！　何しに来た？」"

[[dialogue]]
speaker = "シノ"
# 「きっと悩んでおられるだろうなと思いまして。お菓子もありますし、少しお茶しませんか？」
line = "「きっと悩んでおられるだろうなと思いまして。お菓子もありますし、少しお茶しませんか？」"

[[dialogue]]
speaker = "チナ"
# 「……お前は何がしたいんだ？　アタシがアルタイルに味方するよう誘導してるのか？」
line = "「……お前は何がしたいんだ？　アタシがアルタイルに味方するよう誘導してるのか？」"

[[dialogue]]
speaker = "シノ"
# 「いいえ。意に沿わない決定はいずれ撤回される可能性が高いので、あまり意味がありません」
line = "「いいえ。意に沿わない決定はいずれ撤回される可能性が高いので、あまり意味がありません」"

[[dialogue]]
speaker = "シノ"
# 「私はあなたを応援したいんです。あなたがやりたいことを成し遂げてほしいと思っているんですよ」
line = "「私はあなたを応援したいんです。あなたがやりたいことを成し遂げてほしいと思っているんですよ」"

[[dialogue]]
speaker = "チナ"
# 「はぁ？　アタシはお前の世界を滅ぼそうとしたんだぞ？」
line = "「はぁ？　アタシはお前の世界を滅ぼそうとしたんだぞ？」"

[[dialogue]]
speaker = "シノ"
# 「ええ、わかっていますよ。しかしあなたが本当に成し遂げたいのは、デネブを守ることでしょう？」
line = "「ええ、わかっていますよ。しかしあなたが本当に成し遂げたいのは、デネブを守ることでしょう？」"

[[dialogue]]
speaker = "チナ"
# 「ぅ……」
line = "「ぅ……」"

[[dialogue]]
speaker = "シノ"
# 「実は私、自分の夢がないんですよ。今のところは、ですが」
line = "「実は私、自分の夢がないんですよ。今のところは、ですが」"

[[dialogue]]
speaker = "チナ"
# 「……は？」
line = "「……は？」"

[[dialogue]]
speaker = "シノ"
# 「私の実家は小さな会社を営んでいたんですが、父が亡くなって、急遽私が跡を継ぐことになりまして」
line = "「私の実家は小さな会社を営んでいたんですが、父が亡くなって、急遽私が跡を継ぐことになりまして」"

[[dialogue]]
speaker = "チナ"
# 「……それは災難だったな」
line = "「……それは災難だったな」"

[[dialogue]]
speaker = "シノ"
# 「ええ。まだ学生なのに経営を勉強して、必死に会社を立て直して……本当に大変でした」
line = "「ええ。まだ学生なのに経営を勉強して、必死に会社を立て直して……本当に大変でした」"

[[dialogue]]
speaker = "シノ"
# 「それから実家の事業を離れたんですけど、その経験からいくつかの会社で雇われ社長になって……」
line = "「それから実家の事業を離れたんですけど、その経験からいくつかの会社で雇われ社長になって……」"

[[dialogue]]
speaker = "シノ"
# 「その手腕を買われたみたいで、新星学園の学園長にスカウトされて今に至ります」
line = "「その手腕を買われたみたいで、新星学園の学園長にスカウトされて今に至ります」"

[[dialogue]]
speaker = "チナ"
# 「なんかめちゃくちゃな人生だな……」
line = "「なんかめちゃくちゃな人生だな……」"

[[dialogue]]
speaker = "シノ"
# 「はは。そうですね。少なくとも普通とはかけ離れた人生です」
line = "「はは。そうですね。少なくとも普通とはかけ離れた人生です」"

[[dialogue]]
speaker = "シノ"
# 「だけど今の学園長の仕事も、割と気に入ってるんです。誰かの夢を応援できる仕事ですから」
line = "「だけど今の学園長の仕事も、割と気に入ってるんです。誰かの夢を応援できる仕事ですから」"

[[dialogue]]
speaker = "シノ"
# 「先ほども言いましたが、私には自分の夢がありません。だからこそ、人の夢を応援したいと思うんです」
line = "「先ほども言いましたが、私には自分の夢がありません。だからこそ、人の夢を応援したいと思うんです」"

[[dialogue]]
speaker = "シノ"
# 「チナさんにも、自分の夢を叶えてほしいって思っていますよ」
line = "「チナさんにも、自分の夢を叶えてほしいって思っていますよ」"

[[dialogue]]
speaker = "チナ"
# 「アタシは敵だってわかっててもか？」
line = "「アタシは敵だってわかっててもか？」"

[[dialogue]]
speaker = "シノ"
# 「はい。アルタイルを襲撃したのは、デネブを守るためですから。その選択を否定はしません」
line = "「はい。アルタイルを襲撃したのは、デネブを守るためですから。その選択を否定はしません」"

[[dialogue]]
speaker = "シノ"
# 「『平行世界は滅ぼし合わないといけない』と言われたら、そうするのも自然なことだと思います」
line = "「『平行世界は滅ぼし合わないといけない』と言われたら、そうするのも自然なことだと思います」"

[[dialogue]]
speaker = "シノ"
# 「私だって、緋宮会長がデネブと戦うことを選んでいれば、背中を押していたかもしれませんから」
line = "「私だって、緋宮会長がデネブと戦うことを選んでいれば、背中を押していたかもしれませんから」"

[[dialogue]]
speaker = "unk"
# シノはあくまでチナを責めることはしない。
line = "シノはあくまでチナを責めることはしない。"

[[dialogue]]
speaker = "unk"
# アルタイルを守るために戦いはするが、その選択を間違いだと<ruby=ただ>糺</ruby>す立場でもなければ、糾弾する資格があるわけでもない。
line = "アルタイルを守るために戦いはするが、その選択を間違いだと<ruby>糺<rt>ただ</rt></ruby>す立場でもなければ、糾弾する資格があるわけでもない。"

[[dialogue]]
speaker = "シノ"
# 「私のことをお話したんですし、チナさんのことも教えていただけませんか？」
line = "「私のことをお話したんですし、チナさんのことも教えていただけませんか？」"

[[dialogue]]
speaker = "チナ"
# 「は？」
line = "「は？」"

[[dialogue]]
speaker = "シノ"
# 「私たちは、自分たちで思っている以上に、お互いの世界のことを知らない。ですからそのギャップを埋めるために情報交換をしませんか？」
line = "「私たちは、自分たちで思っている以上に、お互いの世界のことを知らない。ですからそのギャップを埋めるために情報交換をしませんか？」"

[[dialogue]]
speaker = "シノ"
# 「もちろん私もアルタイルのことをお話します。それならチナさんも情報を得られてウィンウィンでしょう？」
line = "「もちろん私もアルタイルのことをお話します。それならチナさんも情報を得られてウィンウィンでしょう？」"

[[dialogue]]
speaker = "シノ"
# 「ですが──」
line = "「ですが──」"

[[dialogue]]
speaker = "シノ"
# 「私はあなたのことを知りたいんです。今私の目の前にいる、デネブの香堂チナさんのことを」
line = "「私はあなたのことを知りたいんです。今私の目の前にいる、デネブの香堂チナさんのことを」"

[[dialogue]]
speaker = "unk"
# シノが微笑みながら、チナを真っ直ぐ見つめる。
line = "シノが微笑みながら、チナを真っ直ぐ見つめる。"

[[dialogue]]
speaker = "unk"
# その視線に、チナは居心地悪そうに眉をひそめて……
line = "その視線に、チナは居心地悪そうに眉をひそめて……"

[[dialogue]]
speaker = "チナ"
# 「……何度も言うが、デネブを売るつもりはない」
line = "「……何度も言うが、デネブを売るつもりはない」"

[[dialogue]]
speaker = "チナ"
# 「でもアタシのことなら……少しくらい話してもいい」
line = "「でもアタシのことなら……少しくらい話してもいい」"

[[dialogue]]
speaker = "unk"
# そしてチナは、亡くした家族の思い出や、昔よく食べた好物など、自分のことを少しずつ語り出したのだった。
line = "そしてチナは、亡くした家族の思い出や、昔よく食べた好物など、自分のことを少しずつ語り出したのだった。"
