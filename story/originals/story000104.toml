[[dialogue]]
speaker = "unk"
# バトルウィーク開幕初日の早朝──
line = "バトルウィーク開幕初日の早朝──"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ようこそいらっしゃいました、緋宮会長。ここが流星寮『イルソーレ』の共有ロビーですわ！」
line = "「ようこそいらっしゃいました、緋宮会長。ここが流星寮『イルソーレ』の共有ロビーですわ！」"

[[dialogue]]
speaker = "unk"
# 王宮のラウンジかな……？
line = "王宮のラウンジかな……？"

[[dialogue]]
speaker = "フェニエル"
# 「あはは……。最初に見ると、やっぱりそういう感想になっちゃいますよね」
line = "「あはは……。最初に見ると、やっぱりそういう感想になっちゃいますよね」"

[[dialogue]]
speaker = "フェニエル"
# 「私も、最初にここに住んでいいって言われた時は、何かの間違いかと思っちゃいました……」
line = "「私も、最初にここに住んでいいって言われた時は、何かの間違いかと思っちゃいました……」"

[[dialogue]]
speaker = "unk"
# 外観もだけど、明らかに新星寮と設備が違う
line = "外観もだけど、明らかに新星寮と設備が違う"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ふふっ。高貴な精神は、優雅な生活に裏打ちされてこそ、ですわ♪」
line = "「ふふっ。高貴な精神は、優雅な生活に裏打ちされてこそ、ですわ♪」"

[[dialogue]]
speaker = "フェニエル"
# 「<ruby=イルソーレ>流星寮</ruby>の挨拶は『ごきげんよう』ですし、休日の午後はアフタヌーンティーをしたりするんです」
line = "「<ruby>流星寮<rt>イルソーレ</rt></ruby>の挨拶は『ごきげんよう』ですし、休日の午後はアフタヌーンティーをしたりするんです」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「緋宮会長はアフタヌーンティーの経験はございませんの？　いけませんわよ。首長たるもの、社交の場におけるマナーくらい、身に着けておきませんと」
line = "「緋宮会長はアフタヌーンティーの経験はございませんの？　いけませんわよ。首長たるもの、社交の場におけるマナーくらい、身に着けておきませんと」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「イルソーレでは、そうした教養や高貴な精神を重視しておりますわ。『清楚・上品・優雅』がこの寮のモットーですの」
line = "「イルソーレでは、そうした教養や高貴な精神を重視しておりますわ。『清楚・上品・優雅』がこの寮のモットーですの」"

[[dialogue]]
speaker = "フェニエル"
# 「あっ、もちろんお姉様はそういうことを強制はしてないんですよっ」
line = "「あっ、もちろんお姉様はそういうことを強制はしてないんですよっ」"

[[dialogue]]
speaker = "フェニエル"
# 「ただ、流星寮には昔からそういう伝統があったみたいなのと、何より今の寮生は、お姉様を慕っている方々が多いので……」
line = "「ただ、流星寮には昔からそういう伝統があったみたいなのと、何より今の寮生は、お姉様を慕っている方々が多いので……」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「おーっほっほっほ！　私が高貴すぎるが故に、ですわね」
line = "「おーっほっほっほ！　私が高貴すぎるが故に、ですわね」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「私は流星学園の長い歴史においても、最強の星騎士を目指している者ですわ。だから後輩たちは、迷うことなく私が作った道に続けばよいのです」
line = "「私は流星学園の長い歴史においても、最強の星騎士を目指している者ですわ。だから後輩たちは、迷うことなく私が作った道に続けばよいのです」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「そうすれば私が必ずや、リクリエをも打ち破れる強き星騎士へと導いてみせますわ！」
line = "「そうすれば私が必ずや、リクリエをも打ち破れる強き星騎士へと導いてみせますわ！」"

[[dialogue]]
speaker = "フェニエル"
# 「お姉様の訓練の量は、なまら凄いんですっ。あんなに自分を追い込める人を、私は見たことがありません」
line = "「お姉様の訓練の量は、なまら凄いんですっ。あんなに自分を追い込める人を、私は見たことがありません」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「こ、こらフニ。そういうことはあまり大きな声で言うものではありませんわ」
line = "「こ、こらフニ。そういうことはあまり大きな声で言うものではありませんわ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「強者は結果で語るべきであって、トレーニングの量を誇るものではないのです」
line = "「強者は結果で語るべきであって、トレーニングの量を誇るものではないのです」"

[[dialogue]]
speaker = "unk"
# よければ今度、自主トレをご一緒したいです
line = "よければ今度、自主トレをご一緒したいです"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「確かに、緋宮会長が普段どのようなトレーニングをされているのかは、興味がありますわね」
line = "「確かに、緋宮会長が普段どのようなトレーニングをされているのかは、興味がありますわね」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「あなたの勤勉さ、素直さを私は高く評価しておりますの。だからこそ、イルソーレにスカウトしたわけですから」
line = "「あなたの勤勉さ、素直さを私は高く評価しておりますの。だからこそ、イルソーレにスカウトしたわけですから」"

[[dialogue]]
speaker = "unk"
# そうだった！　なんで朝から俺――
line = "そうだった！　なんで朝から俺――"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「新星寮側の人間なのに、流星寮に呼び出した理由、ですの？」
line = "「新星寮側の人間なのに、流星寮に呼び出した理由、ですの？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「おーっほっほっほ！　あなたはいずれ私のものになるんですもの。早いうちにイルソーレの文化にも馴染んでもらおうと思っただけですわ♪」
line = "「おーっほっほっほ！　あなたはいずれ私のものになるんですもの。早いうちにイルソーレの文化にも馴染んでもらおうと思っただけですわ♪」"

[[dialogue]]
speaker = "フェニエル"
# 「私たち、今日から毎朝ミーティングをして、学園が始まるまで周辺地域をパトロールをすることになったんです」
line = "「私たち、今日から毎朝ミーティングをして、学園が始まるまで周辺地域をパトロールをすることになったんです」"

[[dialogue]]
speaker = "フェニエル"
# 「お姉様の声掛けで、寮生のほとんどが参加すると手を挙げたんですよっ。すごい人望ですっ」
line = "「お姉様の声掛けで、寮生のほとんどが参加すると手を挙げたんですよっ。すごい人望ですっ」"

[[dialogue]]
speaker = "unk"
# 俺に作戦をバラしちゃっていいんですか？
line = "俺に作戦をバラしちゃっていいんですか？"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「フッ……これしきのこと、マムならとっくに同じことを手配済みのはず」
line = "「フッ……これしきのこと、マムならとっくに同じことを手配済みのはず」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ラルーナはいわゆる体育会系ですから、勝負事には目がありませんの」
line = "「ラルーナはいわゆる体育会系ですから、勝負事には目がありませんの」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「朝練みたいなものですし、早朝パトロールともなれば、もしかするとイルソーレより参加率が高いくらいかもしれませんわね」
line = "「朝練みたいなものですし、早朝パトロールともなれば、もしかするとイルソーレより参加率が高いくらいかもしれませんわね」"

[[dialogue]]
speaker = "フェニエル"
# 「えっ！？　こっちはびっくりするくらい人が集まってて、たぶん９割くらいの寮生が参加してるんですよ？　流石にそれはないんじゃ……」
line = "「えっ！？　こっちはびっくりするくらい人が集まってて、たぶん９割くらいの寮生が参加してるんですよ？　流石にそれはないんじゃ……」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「フニ。私の宿敵である、妃竜院マハムートを甘く見てはいけませんわ」
line = "「フニ。私の宿敵である、妃竜院マハムートを甘く見てはいけませんわ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「……不本意ですが、現時点では、あの方は私よりも実力が上ですのよ」
line = "「……不本意ですが、現時点では、あの方は私よりも実力が上ですのよ」"

[[dialogue]]
speaker = "フェニエル"
# 「お姉様よりも、上……！？」
line = "「お姉様よりも、上……！？」"

[[dialogue]]
speaker = "unk"
# （そこは素直に認めてるのか……凄いな）
line = "（そこは素直に認めてるのか……凄いな）"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ラルーナの暑苦しいノリには付いていけませんけれど、マハムートのカリスマによる統率力は本物ですわ」
line = "「ラルーナの暑苦しいノリには付いていけませんけれど、マハムートのカリスマによる統率力は本物ですわ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「それに加えて、彼女を始めとした個人戦力、エース級プリマステラの力は……ええ、認めざるを得ませんわ。イルソーレの平均を大きく上回っているでしょうね」
line = "「それに加えて、彼女を始めとした個人戦力、エース級プリマステラの力は……ええ、認めざるを得ませんわ。イルソーレの平均を大きく上回っているでしょうね」"

[[dialogue]]
speaker = "フェニエル"
# 「そ、そんな……」
line = "「そ、そんな……」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ですが……戦場における、最も重要な要素とは『優雅さ』――」
line = "「ですが……戦場における、最も重要な要素とは『優雅さ』――」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「つまりは『連携力』ですわ」
line = "「つまりは『連携力』ですわ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「新星学園の生徒は、九浄家の積極的なスカウトによって集められた尖った才能の者達が多い……それ故に、チームとしての完成度は粗削りな面が否めませんの」
line = "「新星学園の生徒は、九浄家の積極的なスカウトによって集められた尖った才能の者達が多い……それ故に、チームとしての完成度は粗削りな面が否めませんの」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「一方でチームの完成度という点において、流星寮には先輩方が連綿と積み重ねてきた歴史――ノウハウがありますわ」
line = "「一方でチームの完成度という点において、流星寮には先輩方が連綿と積み重ねてきた歴史――ノウハウがありますわ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「そして、そんな私たち流星寮の絆とチーム力は、新星寮にも、リクリエにも、決して負けたりはしませんわ！」
line = "「そして、そんな私たち流星寮の絆とチーム力は、新星寮にも、リクリエにも、決して負けたりはしませんわ！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「その証拠に、私たちは３年間、学園対抗杯で勝利し続けているのだから！」
line = "「その証拠に、私たちは３年間、学園対抗杯で勝利し続けているのだから！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「さあ、みなさん。参りますわよ……！　三界にはびこるモンスターというモンスター共を狩り尽くし、我らが誇るイルソーレに勝利をもたらすのですわっ！」
line = "「さあ、みなさん。参りますわよ……！　三界にはびこるモンスターというモンスター共を狩り尽くし、我らが誇るイルソーレに勝利をもたらすのですわっ！」"

[[dialogue]]
speaker = "イルソーレ寮生"
# 「はいっ、お姉様……！」
line = "「はいっ、お姉様……！」"

[[dialogue]]
speaker = "unk"
# 流星寮……確かに、これは強敵だ
line = "流星寮……確かに、これは強敵だ"

[[dialogue]]
speaker = "unk"
# それから、集まってきた寮生たちに的確な指示を出す、千園寺先輩の手腕を見せつけられる。
line = "それから、集まってきた寮生たちに的確な指示を出す、千園寺先輩の手腕を見せつけられる。"

[[dialogue]]
speaker = "unk"
# 俺は今日、このミーティングに参加できたこと、ライバルの強さをしっかりと実感できたことに、感謝するのだった――
line = "俺は今日、このミーティングに参加できたこと、ライバルの強さをしっかりと実感できたことに、感謝するのだった――"
