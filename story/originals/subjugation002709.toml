[[dialogue]]
speaker = "せつな"
# 「あ……師匠……！！」
line = "「あ……師匠……！！」"

[[dialogue]]
speaker = "unk"
# かつて紫桜の里を恐怖に陥れたモンスターの出現に混乱しているのはせつなだけではなかった。
line = "かつて紫桜の里を恐怖に陥れたモンスターの出現に混乱しているのはせつなだけではなかった。"

[[dialogue]]
speaker = "unk"
# 村の人たちを何とか犠牲者を出さずに誘導して、比較的安全と思われる場所へと辿り着く。
line = "村の人たちを何とか犠牲者を出さずに誘導して、比較的安全と思われる場所へと辿り着く。"

[[dialogue]]
speaker = "unk"
# と、そこで待っていたのはシズルさんだった。
line = "と、そこで待っていたのはシズルさんだった。"

[[dialogue]]
speaker = "せつな"
# 「よかったでござる……こんな所にいたのでござるな……」
line = "「よかったでござる……こんな所にいたのでござるな……」"

[[dialogue]]
speaker = "せつな"
# 「はっ……！　ホッとしてる場合ではござらん！　あいつが現れたでござる！　紫桜の里を襲ったあのモンスターでござる！」
line = "「はっ……！　ホッとしてる場合ではござらん！　あいつが現れたでござる！　紫桜の里を襲ったあのモンスターでござる！」"

[[dialogue]]
speaker = "せつな"
# 「急がないとまた村が壊滅してしまうでござる！　お願いでござる！　師匠のお力であれを何とかして欲しいでござる！」
line = "「急がないとまた村が壊滅してしまうでござる！　お願いでござる！　師匠のお力であれを何とかして欲しいでござる！」"

[[dialogue]]
speaker = "せつな"
# 「せつなたちでは敵わないあのモンスターも、師匠の手にかかればイチコロでござる！」
line = "「せつなたちでは敵わないあのモンスターも、師匠の手にかかればイチコロでござる！」"

[[dialogue]]
speaker = "シズル"
# 「……あなたの戦いを見ていました」
line = "「……あなたの戦いを見ていました」"

[[dialogue]]
speaker = "せつな"
# 「え……？」
line = "「え……？」"

[[dialogue]]
speaker = "シズル"
# 「心の奥深くに恐怖という楔を打ち込んだ相手……そんな敵にあなたがどう立ち向かうのかを」
line = "「心の奥深くに恐怖という楔を打ち込んだ相手……そんな敵にあなたがどう立ち向かうのかを」"

[[dialogue]]
speaker = "シズル"
# 「あなたがそれでいいと言うなら……私があのモンスターを討ち果たしましょう……ですが、本当にそれでいいのですか？」
line = "「あなたがそれでいいと言うなら……私があのモンスターを討ち果たしましょう……ですが、本当にそれでいいのですか？」"

[[dialogue]]
speaker = "せつな"
# 「師匠……」
line = "「師匠……」"

[[dialogue]]
speaker = "シズル"
# 「あのモンスターは十数年前、あなたがまだ小さかったころ、突然この紫桜の里に現れ、暴れまわりました」
line = "「あのモンスターは十数年前、あなたがまだ小さかったころ、突然この紫桜の里に現れ、暴れまわりました」"

[[dialogue]]
speaker = "シズル"
# 「折り悪く、私も含めた里の戦える者は全て任務のために出払っており、残っていたのは未熟な見習いの忍者だけでした」
line = "「折り悪く、私も含めた里の戦える者は全て任務のために出払っており、残っていたのは未熟な見習いの忍者だけでした」"

[[dialogue]]
speaker = "シズル"
# 「一方的な蹂躙を受け、里は壊滅。多くの者が深手を負いました」
line = "「一方的な蹂躙を受け、里は壊滅。多くの者が深手を負いました」"

[[dialogue]]
speaker = "シズル"
# 「せつなも……ちとせもさつきも……今、村にいる者たちは、あの恐怖の一夜を経験した者たちです」
line = "「せつなも……ちとせもさつきも……今、村にいる者たちは、あの恐怖の一夜を経験した者たちです」"

[[dialogue]]
speaker = "シズル"
# 「一度刻まれた恐怖は、なかなか拭い去れるものではないでしょう……」
line = "「一度刻まれた恐怖は、なかなか拭い去れるものではないでしょう……」"

[[dialogue]]
speaker = "シズル"
# 「しかし、いつかは克服しなければなりません。紫桜の忍として、いつまでも怯え竦んでいてはならないのです」
line = "「しかし、いつかは克服しなければなりません。紫桜の忍として、いつまでも怯え竦んでいてはならないのです」"

[[dialogue]]
speaker = "シズル"
# 「せつな……あなたの覚悟を聞かせてください」
line = "「せつな……あなたの覚悟を聞かせてください」"

[[dialogue]]
speaker = "シズル"
# 「恐怖と向き合い、戦うことが出来ますか？　護るべき者のために、己の命を投げ出すことができますか？」
line = "「恐怖と向き合い、戦うことが出来ますか？　護るべき者のために、己の命を投げ出すことができますか？」"

[[dialogue]]
speaker = "せつな"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "シズル"
# 「……そうですね。簡単に答えが出るなら、あなたの足は竦んだりしません」
line = "「……そうですね。簡単に答えが出るなら、あなたの足は竦んだりしません」"

[[dialogue]]
speaker = "せつな"
# 「師匠……どちらへ……？」
line = "「師匠……どちらへ……？」"

[[dialogue]]
speaker = "シズル"
# 「あなたが覚悟を固めるまでの間、私があれの相手をします。星騎士の皆さんには、あれ以外のモンスターの相手をお願いできますか？」
line = "「あなたが覚悟を固めるまでの間、私があれの相手をします。星騎士の皆さんには、あれ以外のモンスターの相手をお願いできますか？」"

[[dialogue]]
speaker = "ウズメイア"
# 「それは大丈夫だけど……もしかして……」
line = "「それは大丈夫だけど……もしかして……」"

[[dialogue]]
speaker = "せつな"
# 「師匠１人であれと戦うつもりでござるか！？　危険でござるよ！！」
line = "「師匠１人であれと戦うつもりでござるか！？　危険でござるよ！！」"

[[dialogue]]
speaker = "シズル"
# 「私の心配よりも自分の心配をした方がいいですよ」
line = "「私の心配よりも自分の心配をした方がいいですよ」"

[[dialogue]]
speaker = "シズル"
# 「あなたに、これを渡しておきます。それは命を賭しても護るという覚悟の証。心が決まったならその装束に袖を通しなさい。……いいですね？」
line = "「あなたに、これを渡しておきます。それは命を賭しても護るという覚悟の証。心が決まったならその装束に袖を通しなさい。……いいですね？」"

[[dialogue]]
speaker = "せつな"
# 「し、師匠……！」
line = "「し、師匠……！」"

[[dialogue]]
speaker = "シズル"
# 「では星騎士の皆さん、ご協力をお願いします」
line = "「では星騎士の皆さん、ご協力をお願いします」"

[[dialogue]]
speaker = "せつな"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ヨミ"
# 「大丈夫ですよ。ゆっくり気持ちを固めて来てください」
line = "「大丈夫ですよ。ゆっくり気持ちを固めて来てください」"

[[dialogue]]
speaker = "ウズメイア"
# 「そーそー、それまではあたしらが村を守ってるから」
line = "「そーそー、それまではあたしらが村を守ってるから」"

[[dialogue]]
speaker = "せつな"
# 「ありがとう、でござる……」
line = "「ありがとう、でござる……」"

[[dialogue]]
speaker = "unk"
# せつな、大丈夫か？
line = "せつな、大丈夫か？"

[[dialogue]]
speaker = "せつな"
# 「主様……せつなは……」
line = "「主様……せつなは……」"

[[dialogue]]
speaker = "せつな"
# 「……あの日、何も出来なかった未熟な自分をずっと悔やんでいたでござる」
line = "「……あの日、何も出来なかった未熟な自分をずっと悔やんでいたでござる」"

[[dialogue]]
speaker = "せつな"
# 「厳しい修練に耐えてこれたのも、強い忍になって大切な人たちを守れるようになりたかったためでござった……」
line = "「厳しい修練に耐えてこれたのも、強い忍になって大切な人たちを守れるようになりたかったためでござった……」"

[[dialogue]]
speaker = "せつな"
# 「それなのに……こんな不甲斐ない姿を見せてしまって……」
line = "「それなのに……こんな不甲斐ない姿を見せてしまって……」"

[[dialogue]]
speaker = "せつな"
# 「きっと師匠も呆れてしまっているでござる……せつなは……せつなは……忍者失格でござるよ……」
line = "「きっと師匠も呆れてしまっているでござる……せつなは……せつなは……忍者失格でござるよ……」"

[[dialogue]]
speaker = "unk"
# せつなの主で居られなくなるのか？
line = "せつなの主で居られなくなるのか？"

[[dialogue]]
speaker = "unk"
# 俺は……
line = "俺は……"

[[dialogue]]
speaker = "せつな"
# 「っ……！！？」
line = "「っ……！！？」"

[[dialogue]]
speaker = "せつな"
# 「それは……嫌でござる……。せつなは……主様の忍で在りたい……」
line = "「それは……嫌でござる……。せつなは……主様の忍で在りたい……」"

[[dialogue]]
speaker = "せつな"
# 「ですが、こんな情けない忍は……必要ないでござるな……。こんな弱い忍は……主様に相応しくないでござる……」
line = "「ですが、こんな情けない忍は……必要ないでござるな……。こんな弱い忍は……主様に相応しくないでござる……」"

[[dialogue]]
speaker = "せつな"
# 「主様……ごめんなさい……せつなは……」
line = "「主様……ごめんなさい……せつなは……」"

[[dialogue]]
speaker = "unk"
# 俺もせつなの主でありたい！
line = "俺もせつなの主でありたい！"

[[dialogue]]
speaker = "unk"
# せつなは俺の忍だ！
line = "せつなは俺の忍だ！"

[[dialogue]]
speaker = "せつな"
# 「あ……主様……」
line = "「あ……主様……」"

[[dialogue]]
speaker = "unk"
# 俺が背中を支えるから！
line = "俺が背中を支えるから！"

[[dialogue]]
speaker = "unk"
# 恐怖に立ち向かおう！
line = "恐怖に立ち向かおう！"

[[dialogue]]
speaker = "せつな"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "せつな"
# 「こんなせつなに……もったいないお言葉でござる……」
line = "「こんなせつなに……もったいないお言葉でござる……」"

[[dialogue]]
speaker = "せつな"
# 「主様にそこまで言わせてしまったら、弱音を吐いてばかりではいられないでござるな……」
line = "「主様にそこまで言わせてしまったら、弱音を吐いてばかりではいられないでござるな……」"

[[dialogue]]
speaker = "せつな"
# 「ここで頑張らなければ、きっとずっと後悔し続けることになるでござろう」
line = "「ここで頑張らなければ、きっとずっと後悔し続けることになるでござろう」"

[[dialogue]]
speaker = "せつな"
# 「せつなは後悔したくない……だから、主様……共に戦って……せつなに勇気を与えてくださいまするか……？」
line = "「せつなは後悔したくない……だから、主様……共に戦って……せつなに勇気を与えてくださいまするか……？」"

[[dialogue]]
speaker = "unk"
# もちろん！
line = "もちろん！"

[[dialogue]]
speaker = "せつな"
# 「感謝いたします……」
line = "「感謝いたします……」"

[[dialogue]]
speaker = "せつな"
# 「では参りましょう、師匠の元へ！　いかな師匠と言えど、あのモンスターには手こずるやもしれませぬ！」
line = "「では参りましょう、師匠の元へ！　いかな師匠と言えど、あのモンスターには手こずるやもしれませぬ！」"

[[dialogue]]
speaker = "さつき"
# 「せつな、私たちも行く！」
line = "「せつな、私たちも行く！」"

[[dialogue]]
speaker = "ちとせ"
# 「成長しなきゃいけないのは私たちも同じだもんね！　一緒に戦わせて！」
line = "「成長しなきゃいけないのは私たちも同じだもんね！　一緒に戦わせて！」"

[[dialogue]]
speaker = "せつな"
# 「さつき……ちとせ……。ありがとうでござる、２人の助けがあれば百人力でござる！」
line = "「さつき……ちとせ……。ありがとうでござる、２人の助けがあれば百人力でござる！」"

[[dialogue]]
speaker = "せつな"
# 「せつなはもう恐れませぬ！　あの日の恐怖に打ち勝って、新たなる紫桜忍者の力を示すでござるっ！」
line = "「せつなはもう恐れませぬ！　あの日の恐怖に打ち勝って、新たなる紫桜忍者の力を示すでござるっ！」"

[[dialogue]]
speaker = "ケルウス"
# 「ケェエーーーーーーーッ！！！！」
line = "「ケェエーーーーーーーッ！！！！」"

[[dialogue]]
speaker = "シズル"
# 「っ……！！」
line = "「っ……！！」"

[[dialogue]]
speaker = "シズル"
# 「この程度の相手をするのにも苦労するようになって……まったく……私も歳を取りましたね……」
line = "「この程度の相手をするのにも苦労するようになって……まったく……私も歳を取りましたね……」"

[[dialogue]]
speaker = "シズル"
# 「ですが……食い止めてみせましょう。せつなが覚悟を固めるまで、これ以上、先には進ませませんっ！」
line = "「ですが……食い止めてみせましょう。せつなが覚悟を固めるまで、これ以上、先には進ませませんっ！」"

[[dialogue]]
speaker = "シズル"
# 「信じていますよ……せつな……！」
line = "「信じていますよ……せつな……！」"

[[dialogue]]
speaker = "せつな（覚醒）"
# 「師匠ーーーーっ！！！」
line = "「師匠ーーーーっ！！！」"

[[dialogue]]
speaker = "シズル"
# 「っ、せつな……その忍装束……覚悟は決まったのですね……？」
line = "「っ、せつな……その忍装束……覚悟は決まったのですね……？」"

[[dialogue]]
speaker = "せつな（覚醒）"
# 「はいっ！」
line = "「はいっ！」"

[[dialogue]]
speaker = "シズル"
# 「せつなだけではなく、みんなも……」
line = "「せつなだけではなく、みんなも……」"

[[dialogue]]
speaker = "ちとせ"
# 「もちろんですっ！」
line = "「もちろんですっ！」"

[[dialogue]]
speaker = "さつき"
# 「私たちみんなで紫桜の里を守ってみせますっ！」
line = "「私たちみんなで紫桜の里を守ってみせますっ！」"

[[dialogue]]
speaker = "シズル"
# 「ふふ……では見せてもらいます。紫桜の誇りを……開花する新たな力の芽吹きを……！！」
line = "「ふふ……では見せてもらいます。紫桜の誇りを……開花する新たな力の芽吹きを……！！」"

[[dialogue]]
speaker = "せつな（覚醒）"
# 「おおおおおおおおっ！　――――目覚めるでござる！　《開花》フォーーーームっ！！！」
line = "「おおおおおおおおっ！　――――目覚めるでござる！　《開花》フォーーーームっ！！！」"

[[dialogue]]
speaker = "さつき"
# 「っ……！！？　せつなの忍装束が……光り輝いて……！？」
line = "「っ……！！？　せつなの忍装束が……光り輝いて……！？」"

[[dialogue]]
speaker = "ケルウス"
# 「ケェエーーーーーーーッ！！！！」
line = "「ケェエーーーーーーーッ！！！！」"

[[dialogue]]
speaker = "せつな（覚醒）"
# 「……もう、恐れはないでござるっ！　いざ、勝負っ！　先鋒はこのせつなが務めるでござるっ！！」
line = "「……もう、恐れはないでござるっ！　いざ、勝負っ！　先鋒はこのせつなが務めるでござるっ！！」"

[[dialogue]]
speaker = "unk"
# 新たな戦闘服を覚醒させたせつなが、因縁深いモンスターと対峙する。
line = "新たな戦闘服を覚醒させたせつなが、因縁深いモンスターと対峙する。"

[[dialogue]]
speaker = "unk"
# その足に震えはない。その眼差しに怯えはない。
line = "その足に震えはない。その眼差しに怯えはない。"

[[dialogue]]
speaker = "unk"
# せつなに満ちた力は彼女の後ろに控える紫桜の忍や俺たちにも伝播して──
line = "せつなに満ちた力は彼女の後ろに控える紫桜の忍や俺たちにも伝播して──"

[[dialogue]]
speaker = "unk"
# そして、里の存亡をかけた戦いがの火ぶたが切って落とされたのだった。
line = "そして、里の存亡をかけた戦いがの火ぶたが切って落とされたのだった。"
