[[dialogue]]
speaker = "unk"
# 翌日の、クリスマス当日。
line = "翌日の、クリスマス当日。"

[[dialogue]]
speaker = "附属生Ａ"
# 「メリ～クリスマス♪」
line = "「メリ～クリスマス♪」"

[[dialogue]]
speaker = "附属生Ｂ"
# 「今日のパーティー、楽しみだね～♪」
line = "「今日のパーティー、楽しみだね～♪」"

[[dialogue]]
speaker = "ナミエル"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# 学園生たちの盛り上がる様子を横目に１人、いつも以上にクールな表情のナミエル。
line = "学園生たちの盛り上がる様子を横目に１人、いつも以上にクールな表情のナミエル。"

[[dialogue]]
speaker = "アム"
# 「……ねぇ、ナミエル。ちょっといいかな？」
line = "「……ねぇ、ナミエル。ちょっといいかな？」"

[[dialogue]]
speaker = "unk"
# そんな彼女に、アムは意を決して声をかける。
line = "そんな彼女に、アムは意を決して声をかける。"

[[dialogue]]
speaker = "ナミエル"
# 「え？　あっ、はい……」
line = "「え？　あっ、はい……」"

[[dialogue]]
speaker = "ナミエル"
# 「それで、どうしたんですか？　わざわざ空き教室にまで移動して、話したいことって……」
line = "「それで、どうしたんですか？　わざわざ空き教室にまで移動して、話したいことって……」"

[[dialogue]]
speaker = "アム"
# 「うん……ナミエルはさ、クリスマスって、実はあんまり好きじゃなかったりする？」
line = "「うん……ナミエルはさ、クリスマスって、実はあんまり好きじゃなかったりする？」"

[[dialogue]]
speaker = "ナミエル"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "アム"
# 「最近ずっと一緒にいたから、なんとなくそうかなって感じたんだけど……」
line = "「最近ずっと一緒にいたから、なんとなくそうかなって感じたんだけど……」"

[[dialogue]]
speaker = "スノーマン"
# 「ナミエルはクリスマス、嫌いなの……？」
line = "「ナミエルはクリスマス、嫌いなの……？」"

[[dialogue]]
speaker = "ナミエル"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "アム"
# 「理由とか、聞いてもいい？　ほら、悩み相談みたいな感じでさ！」
line = "「理由とか、聞いてもいい？　ほら、悩み相談みたいな感じでさ！」"

[[dialogue]]
speaker = "ナミエル"
# 「……アム先輩って、やっぱりデリカシー足りてないところがありますよね」
line = "「……アム先輩って、やっぱりデリカシー足りてないところがありますよね」"

[[dialogue]]
speaker = "アム"
# 「あれ！？　もしかして聞いちゃダメなやつだった……！？」
line = "「あれ！？　もしかして聞いちゃダメなやつだった……！？」"

[[dialogue]]
speaker = "ナミエル"
# 「まあ……好奇心とかで言い出したんじゃなくて、本当に心配してくれてるんでしょうけど……」
line = "「まあ……好奇心とかで言い出したんじゃなくて、本当に心配してくれてるんでしょうけど……」"

[[dialogue]]
speaker = "ナミエル"
# 「…………私の両親が昔、クリスマスに事故で亡くなったんです」
line = "「…………私の両親が昔、クリスマスに事故で亡くなったんです」"

[[dialogue]]
speaker = "アム"
# 「え……」
line = "「え……」"

[[dialogue]]
speaker = "スノーマン"
# 「ナミエルの、お父さんと、お母さんが……？」
line = "「ナミエルの、お父さんと、お母さんが……？」"

[[dialogue]]
speaker = "ナミエル"
# 「クリスマスで、私と両親が車で外出していた時……交通事故に遭ったんです。大通りの交差点で、信号無視した車が突っ込んで来て……」
line = "「クリスマスで、私と両親が車で外出していた時……交通事故に遭ったんです。大通りの交差点で、信号無視した車が突っ込んで来て……」"

[[dialogue]]
speaker = "ナミエル"
# 「……私はそれ以来、クリスマスの時期が来るとそのことを思い出すので、苦手になってしまったんです」
line = "「……私はそれ以来、クリスマスの時期が来るとそのことを思い出すので、苦手になってしまったんです」"

[[dialogue]]
speaker = "アム"
# 「っ……ナミエル、ごめん！」
line = "「っ……ナミエル、ごめん！」"

[[dialogue]]
speaker = "unk"
# アムはその場で、深く頭を下げて謝罪した。
line = "アムはその場で、深く頭を下げて謝罪した。"

[[dialogue]]
speaker = "アム"
# 「本当に、ごめん！　確かにあたし、デリカシーが全然足りてなかった……！　ナミエルにそんな過去があるなんて、想像もしてなかった……！」
line = "「本当に、ごめん！　確かにあたし、デリカシーが全然足りてなかった……！　ナミエルにそんな過去があるなんて、想像もしてなかった……！」"

[[dialogue]]
speaker = "ナミエル"
# 「いえ……仕方ないです。私の部屋には、両親のことがわかるものなんて、何１つ飾っていませんでしたし……」
line = "「いえ……仕方ないです。私の部屋には、両親のことがわかるものなんて、何１つ飾っていませんでしたし……」"

[[dialogue]]
speaker = "ナミエル"
# 「……私、いつからか、両親と一緒に写っている写真を見ると、幸せな思い出が蘇ってくるのが辛くなって……」
line = "「……私、いつからか、両親と一緒に写っている写真を見ると、幸せな思い出が蘇ってくるのが辛くなって……」"

[[dialogue]]
speaker = "ナミエル"
# 「胸が締め付けられるような気持ちになるのが嫌で、そのうちに直視できなくなってしまったんです……」
line = "「胸が締め付けられるような気持ちになるのが嫌で、そのうちに直視できなくなってしまったんです……」"

[[dialogue]]
speaker = "ナミエル"
# 「だから、今では両親の写真はクローゼットの奥にしまって……もう長いこと取り出していません」
line = "「だから、今では両親の写真はクローゼットの奥にしまって……もう長いこと取り出していません」"

[[dialogue]]
speaker = "ナミエル"
# 「……でも、そこまで気にしなくても大丈夫です。むしろ、今まで誰にも言えなかったことだったので……こうしてちょっと吐き出して、気持ちが楽になりました」
line = "「……でも、そこまで気にしなくても大丈夫です。むしろ、今まで誰にも言えなかったことだったので……こうしてちょっと吐き出して、気持ちが楽になりました」"

[[dialogue]]
speaker = "アム"
# 「……そんなことがあったら、クリスマスが好きになれなくても仕方ないよね……」
line = "「……そんなことがあったら、クリスマスが好きになれなくても仕方ないよね……」"

[[dialogue]]
speaker = "スノーマン"
# 「ナミエル……家族、いなかったんだ……」
line = "「ナミエル……家族、いなかったんだ……」"

[[dialogue]]
speaker = "unk"
# と、そんな時だった。
line = "と、そんな時だった。"

[[dialogue]]
speaker = "アム"
# 「えっ……！？　今のって……？」
line = "「えっ……！？　今のって……？」"

[[dialogue]]
speaker = "ナミエル"
# 「アステラが一瞬、頭の中に見えたような……？」
line = "「アステラが一瞬、頭の中に見えたような……？」"

[[dialogue]]
speaker = "スノーマンL"
# 「ボクも気配、感じた……！　２人とも、こっち！」
line = "「ボクも気配、感じた……！　２人とも、こっち！」"

[[dialogue]]
speaker = "ナミエル"
# 「あっ、スノーマン、一体どこに……！？」
line = "「あっ、スノーマン、一体どこに……！？」"

[[dialogue]]
speaker = "unk"
# ２人はスノーマンに案内されて、屋外に出て、市街地へと向かう。すると――
line = "２人はスノーマンに案内されて、屋外に出て、市街地へと向かう。すると――"

[[dialogue]]
speaker = "ナミエル"
# 「これは……？　どうして――」
line = "「これは……？　どうして――」"

[[dialogue]]
speaker = "unk"
# 流星市国の街並みは、クリスマス当日ということで、普段よりも沢山の人たちで賑わっていた。
line = "流星市国の街並みは、クリスマス当日ということで、普段よりも沢山の人たちで賑わっていた。"

[[dialogue]]
speaker = "アム"
# 「上空にあんな大きなアステラが発生しているのに、どうして誰も気づかないの……！？」
line = "「上空にあんな大きなアステラが発生しているのに、どうして誰も気づかないの……！？」"

[[dialogue]]
speaker = "スノーマンL"
# 「……あの中から、強い気配、感じる」
line = "「……あの中から、強い気配、感じる」"

[[dialogue]]
speaker = "unk"
# スノーマンはアステラを見上げながら、そう呟くのだった。
line = "スノーマンはアステラを見上げながら、そう呟くのだった。"
