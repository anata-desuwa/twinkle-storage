[[dialogue]]
speaker = "unk"
# 第４話,勇気を出してにぃ様と,P
line = "第４話,勇気を出してにぃ様と,P"

[[dialogue]]
speaker = "モナカ"
# 「すーはーすーはー……。大丈夫、大丈夫だから……。自然に、自然に……」
line = "「すーはーすーはー……。大丈夫、大丈夫だから……。自然に、自然に……」"

[[dialogue]]
speaker = "モナカ"
# 「よ、よぉーし……！」
line = "「よ、よぉーし……！」"

[[dialogue]]
speaker = "unk"
# 誰か探してるの？
line = "誰か探してるの？"

[[dialogue]]
speaker = "モナカ"
# 「ひゃっ、にぃ様……！？　ど、どうして後ろからっ……」
line = "「ひゃっ、にぃ様……！？　ど、どうして後ろからっ……」"

[[dialogue]]
speaker = "モナカ"
# 「あの、そのっ、用事があるのはにぃ様になのっ……」
line = "「あの、そのっ、用事があるのはにぃ様になのっ……」"

[[dialogue]]
speaker = "モナカ"
# 「モナカね、クッキーをね、焼いたんだっ。それでにぃ様を誘いたいなぁって思ってっ」
line = "「モナカね、クッキーをね、焼いたんだっ。それでにぃ様を誘いたいなぁって思ってっ」"

[[dialogue]]
speaker = "モナカ"
# 「あっ、誘いたいって言うのはお茶会にって意味でっ……。部室で一緒にお茶でもどうかなって意味でっ……」
line = "「あっ、誘いたいって言うのはお茶会にって意味でっ……。部室で一緒にお茶でもどうかなって意味でっ……」"

[[dialogue]]
speaker = "モナカ"
# 「もちろん、にぃ様がお暇ならでいいんだけどっ……。迷惑だったら全然断ってもらってよくてっ……」
line = "「もちろん、にぃ様がお暇ならでいいんだけどっ……。迷惑だったら全然断ってもらってよくてっ……」"

[[dialogue]]
speaker = "モナカ"
# 「って……ご、ごめんなさい。１人でわーわー言っちゃって……」
line = "「って……ご、ごめんなさい。１人でわーわー言っちゃって……」"

[[dialogue]]
speaker = "モナカ"
# 「つまり、その……クッキーを焼いたから、にぃ様とお茶会したいなって……」
line = "「つまり、その……クッキーを焼いたから、にぃ様とお茶会したいなって……」"

[[dialogue]]
speaker = "モナカ"
# 「あ、クッキーは苦手だったかな……？　チョコレートとか、プリンとか、ケーキとかの方が良かった……？」
line = "「あ、クッキーは苦手だったかな……？　チョコレートとか、プリンとか、ケーキとかの方が良かった……？」"

[[dialogue]]
speaker = "モナカ"
# 「にぃ様のお口に合うように作ったつもりだけど……。ヴィーナスさんやマトイさんたちに、にぃ様の味の好みを聞いたりして……」
line = "「にぃ様のお口に合うように作ったつもりだけど……。ヴィーナスさんやマトイさんたちに、にぃ様の味の好みを聞いたりして……」"

[[dialogue]]
speaker = "モナカ"
# 「それともやっぱり忙しい……？」
line = "「それともやっぱり忙しい……？」"

[[dialogue]]
speaker = "unk"
# 是非お邪魔させてもらうよ
line = "是非お邪魔させてもらうよ"

[[dialogue]]
speaker = "モナカ"
# 「ホ、ホントっ？　えへへ……！　じゃあモナカについてきてくれる？　準備はもうしてあるから」
line = "「ホ、ホントっ？　えへへ……！　じゃあモナカについてきてくれる？　準備はもうしてあるから」"

[[dialogue]]
speaker = "モナカ"
# 「どうぞ座って座って？　今、お茶を淹れるね？」
line = "「どうぞ座って座って？　今、お茶を淹れるね？」"

[[dialogue]]
speaker = "モナカ"
# 「にぃ様はどんな紅茶が好きかな？　パルちゃんが紅茶好きだから色々と取り揃えてはいるんだけど」
line = "「にぃ様はどんな紅茶が好きかな？　パルちゃんが紅茶好きだから色々と取り揃えてはいるんだけど」"

[[dialogue]]
speaker = "モナカ"
# 「モナカのおすすめは、このローズティー。薄目に淹れた紅茶にね、直接バラの花びらを浮かせて飲むの」
line = "「モナカのおすすめは、このローズティー。薄目に淹れた紅茶にね、直接バラの花びらを浮かせて飲むの」"

[[dialogue]]
speaker = "モナカ"
# 「バラの香りと甘い渋みが紅茶に広がって、とっても落ち着く味になるんだよ。クッキーにもすごく合って──……」
line = "「バラの香りと甘い渋みが紅茶に広がって、とっても落ち着く味になるんだよ。クッキーにもすごく合って──……」"

[[dialogue]]
speaker = "モナカ"
# 「って、にぃ様？　どうしたの、キョロキョロして……？」
line = "「って、にぃ様？　どうしたの、キョロキョロして……？」"

[[dialogue]]
speaker = "unk"
# ２人で始めちゃっていいのかと思って
line = "２人で始めちゃっていいのかと思って"

[[dialogue]]
speaker = "モナカ"
# 「え……？　いいも何も最初から２人だけのつもりだよ……？　今日はモナカが個人的に、その、にぃ様をお誘いしただけだから……」
line = "「え……？　いいも何も最初から２人だけのつもりだよ……？　今日はモナカが個人的に、その、にぃ様をお誘いしただけだから……」"

[[dialogue]]
speaker = "モナカ"
# 「もしかして、おなか部のみんなでって思ってた？　ご、ごめんね、モナカの言葉足らずで勘違いさせちゃって」
line = "「もしかして、おなか部のみんなでって思ってた？　ご、ごめんね、モナカの言葉足らずで勘違いさせちゃって」"

[[dialogue]]
speaker = "モナカ"
# 「その、ね。一度でいいからモナカ、にぃ様と２人きりでゆっくり過ごしてみたくって……」
line = "「その、ね。一度でいいからモナカ、にぃ様と２人きりでゆっくり過ごしてみたくって……」"

[[dialogue]]
speaker = "モナカ"
# 「にぃ様ともっともっと、その……。仲良くなりたかったから……」
line = "「にぃ様ともっともっと、その……。仲良くなりたかったから……」"

[[dialogue]]
speaker = "unk"
# じゃあ俺のためにクッキーや紅茶を……
line = "じゃあ俺のためにクッキーや紅茶を……"

[[dialogue]]
speaker = "モナカ"
# 「そ、そんな大袈裟なものじゃなくて。にぃ様には普段からお世話になってるから、そのお礼というか……」
line = "「そ、そんな大袈裟なものじゃなくて。にぃ様には普段からお世話になってるから、そのお礼というか……」"

[[dialogue]]
speaker = "モナカ"
# 「……ううん。やっぱり、にぃ様のためかも……。にぃ様に喜んでもらいたくてモナカなりに頑張ったから……」
line = "「……ううん。やっぱり、にぃ様のためかも……。にぃ様に喜んでもらいたくてモナカなりに頑張ったから……」"

[[dialogue]]
speaker = "モナカ"
# 「モナカね……？　にぃ様の笑顔を見ると、お胸がドキドキしちゃうの……」
line = "「モナカね……？　にぃ様の笑顔を見ると、お胸がドキドキしちゃうの……」"

[[dialogue]]
speaker = "モナカ"
# 「にぃ様が隣にいてくれるだけで、すごく心がうきうきしちゃって……。嬉しくなっちゃって……」
line = "「にぃ様が隣にいてくれるだけで、すごく心がうきうきしちゃって……。嬉しくなっちゃって……」"

[[dialogue]]
speaker = "モナカ"
# 「にぃ様に喜んでもらえるならって思うと勇気も出て……。ヴィーナスさんやマトイさんにもにぃ様のこと聞きに行けたりできて……」
line = "「にぃ様に喜んでもらえるならって思うと勇気も出て……。ヴィーナスさんやマトイさんにもにぃ様のこと聞きに行けたりできて……」"

[[dialogue]]
speaker = "モナカ"
# 「だからその……是非、食べて欲しいな。モナカのクッキーや紅茶で笑顔になってもらえるかはわからないけど……」
line = "「だからその……是非、食べて欲しいな。モナカのクッキーや紅茶で笑顔になってもらえるかはわからないけど……」"

[[dialogue]]
speaker = "モナカ"
# 「でも、そのっ。モナカなりに一生懸命作ったつもりだからっ……。こ、こういうお菓子作りだけは小さい頃から得意なのっ……」
line = "「でも、そのっ。モナカなりに一生懸命作ったつもりだからっ……。こ、こういうお菓子作りだけは小さい頃から得意なのっ……」"

[[dialogue]]
speaker = "モナカ"
# 「あっ──……ど、どう？　お口に合う、かな……？」
line = "「あっ──……ど、どう？　お口に合う、かな……？」"

[[dialogue]]
speaker = "unk"
# クッキーも紅茶もすごく美味しいよ
line = "クッキーも紅茶もすごく美味しいよ"

[[dialogue]]
speaker = "モナカ"
# 「え、えへへ……。やっぱりお胸がトクントクンしちゃう……。にぃ様の笑顔見ると……」
line = "「え、えへへ……。やっぱりお胸がトクントクンしちゃう……。にぃ様の笑顔見ると……」"

[[dialogue]]
speaker = "モナカ"
# 「ね、にぃ様……。ちょっとだけワガママも言ってもいい……？」
line = "「ね、にぃ様……。ちょっとだけワガママも言ってもいい……？」"

[[dialogue]]
speaker = "モナカ"
# 「お、お膝の上にね、座らせてもらいたいなって。にぃ様のお顔、その、もっと間近で見たいから……」
line = "「お、お膝の上にね、座らせてもらいたいなって。にぃ様のお顔、その、もっと間近で見たいから……」"

[[dialogue]]
speaker = "モナカ"
# 「い、嫌だったらいいの。モナカもおかしなこと頼んじゃってるってわかってるから。だけど、えと、その──……」
line = "「い、嫌だったらいいの。モナカもおかしなこと頼んじゃってるってわかってるから。だけど、えと、その──……」"

[[dialogue]]
speaker = "モナカ"
# 「きゃっ……！　～～っっ！　に、にぃ様…………」
line = "「きゃっ……！　～～っっ！　に、にぃ様…………」"

[[dialogue]]
speaker = "モナカ"
# 「え、えへへ、心臓爆発しちゃいそう……。見上げたらすぐそこに、にぃ様のお顔があって……」
line = "「え、えへへ、心臓爆発しちゃいそう……。見上げたらすぐそこに、にぃ様のお顔があって……」"

[[dialogue]]
speaker = "モナカ"
# 「モナカの俯き癖も治っちゃいそうかも……。にぃ様のお顔から目が離せないもん……」
line = "「モナカの俯き癖も治っちゃいそうかも……。にぃ様のお顔から目が離せないもん……」"

[[dialogue]]
speaker = "モナカ"
# 「なんだか不思議な気分……。どうしてこんなにドキドキしちゃうのかな……？」
line = "「なんだか不思議な気分……。どうしてこんなにドキドキしちゃうのかな……？」"

[[dialogue]]
speaker = "モナカ"
# 「最初はね？　ただ嬉しかっただけなんだ。モナカ、あんまり姉様たちと仲良くないから、優しいにぃ様ができたみたいで……」
line = "「最初はね？　ただ嬉しかっただけなんだ。モナカ、あんまり姉様たちと仲良くないから、優しいにぃ様ができたみたいで……」"

[[dialogue]]
speaker = "モナカ"
# 「でも最近はね？　嬉しいだけじゃなくて……。にぃ様の笑顔が見たくて見たくてたまらなくて……」
line = "「でも最近はね？　嬉しいだけじゃなくて……。にぃ様の笑顔が見たくて見たくてたまらなくて……」"

[[dialogue]]
speaker = "モナカ"
# 「モナカ、たくさんの人に笑顔になってもらいたくて星騎士になろうと思ったんだけど……。それともまた違って……」
line = "「モナカ、たくさんの人に笑顔になってもらいたくて星騎士になろうと思ったんだけど……。それともまた違って……」"

[[dialogue]]
speaker = "モナカ"
# 「あ、あう、ごめんねっ。訳のわからないこと言っちゃって。モナカ、あんまり喋るの得意じゃないから気持ちを言葉にするのも苦手でっ……」
line = "「あ、あう、ごめんねっ。訳のわからないこと言っちゃって。モナカ、あんまり喋るの得意じゃないから気持ちを言葉にするのも苦手でっ……」"

[[dialogue]]
speaker = "モナカ"
# 「でも、その……いつかちゃんと言葉にできるといいな。この気持ちをちゃんと形にして、にぃ様に伝えたい……」
line = "「でも、その……いつかちゃんと言葉にできるといいな。この気持ちをちゃんと形にして、にぃ様に伝えたい……」"

[[dialogue]]
speaker = "モナカ"
# 「待っててくれる……？　モナカ、落ちこぼれだから……ちょっぴり時間かかっちゃうかもしれないけど」
line = "「待っててくれる……？　モナカ、落ちこぼれだから……ちょっぴり時間かかっちゃうかもしれないけど」"

[[dialogue]]
speaker = "モナカ"
# 「……えへへ。ありがとうにぃ様。ん、ぎゅ～、大好き……」
line = "「……えへへ。ありがとうにぃ様。ん、ぎゅ～、大好き……」"
