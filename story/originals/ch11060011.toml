[[dialogue]]
speaker = "unk"
# 第１話,臨時メンバー,P
line = "第１話,臨時メンバー,P"

[[dialogue]]
speaker = "unk"
# 元の世界に戻れるようになるまでの間、こっちの世界を案内してもらうことになった。
line = "元の世界に戻れるようになるまでの間、こっちの世界を案内してもらうことになった。"

[[dialogue]]
speaker = "unk"
# 今日はナナカにあちこち連れて行ってもらう予定だ。
line = "今日はナナカにあちこち連れて行ってもらう予定だ。"

[[dialogue]]
speaker = "ナナカ"
# 「って言っても、この辺りは一度、案内してもらったことがあるって話だったでしょ？」
line = "「って言っても、この辺りは一度、案内してもらったことがあるって話だったでしょ？」"

[[dialogue]]
speaker = "ナナカ"
# 「だからさ、そんなみんなにも、ちゃ～んと楽しんでもらえるように、趣向を凝らしてみようかなって思うわけよ」
line = "「だからさ、そんなみんなにも、ちゃ～んと楽しんでもらえるように、趣向を凝らしてみようかなって思うわけよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「楽しみね！　前はゆっくり見て回る時間が取れなかったから、期待してるわよ！」
line = "「楽しみね！　前はゆっくり見て回る時間が取れなかったから、期待してるわよ！」"

[[dialogue]]
speaker = "ロロット"
# 「わくわく……一体どんな趣向で案内してもらえるのでしょう！」
line = "「わくわく……一体どんな趣向で案内してもらえるのでしょう！」"

[[dialogue]]
speaker = "ナナカ"
# 「今日はなんと……アタシが会長を務める、<b>スウィーツ</b>同好会の活動に同行してもらいますっ！」
line = "「今日はなんと……アタシが会長を務める、<b>スウィーツ</b>同好会の活動に同行してもらいますっ！」"

[[dialogue]]
speaker = "ナナカ"
# 「まずはここ！　今、話題沸騰中のパティスリーだよ！」
line = "「まずはここ！　今、話題沸騰中のパティスリーだよ！」"

[[dialogue]]
speaker = "ロロット"
# 「ほほう～。ここは、会計さんが今一番注目していると言っていたお店ですね」
line = "「ほほう～。ここは、会計さんが今一番注目していると言っていたお店ですね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「前に来た時、こんなお店あったかしら？」
line = "「前に来た時、こんなお店あったかしら？」"

[[dialogue]]
speaker = "ナナカ"
# 「実は、先週オープンしたばっかりなんだよね」
line = "「実は、先週オープンしたばっかりなんだよね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「おー、そうなんだ。どうりで見覚えがないはずだわ」
line = "「おー、そうなんだ。どうりで見覚えがないはずだわ」"

[[dialogue]]
speaker = "ナナカ"
# 「ふふ～ん♪　流星町は日々進化してるんでい！」
line = "「ふふ～ん♪　流星町は日々進化してるんでい！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「こちらは何がおすすめなのかしら？」
line = "「こちらは何がおすすめなのかしら？」"

[[dialogue]]
speaker = "ナナカ"
# 「そこももちろん抜かりなし！　ちゃ～んとリサーチしてあるからねっ」
line = "「そこももちろん抜かりなし！　ちゃ～んとリサーチしてあるからねっ」"

[[dialogue]]
speaker = "ナナカ"
# 「そんじゃ、パパっと買ってくるんで、ちょっと待ってて！　突撃ーっ！」
line = "「そんじゃ、パパっと買ってくるんで、ちょっと待ってて！　突撃ーっ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「よかったの？　みんなで買いに行ってもよかったのに」
line = "「よかったの？　みんなで買いに行ってもよかったのに」"

[[dialogue]]
speaker = "ロロット"
# 「人気のお店だそうですから、大勢で押しかけて邪魔にならないよう、代表して買いに行かれたのではないかと」
line = "「人気のお店だそうですから、大勢で押しかけて邪魔にならないよう、代表して買いに行かれたのではないかと」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふむふむ、さすがスイーツ同好会だわ……その辺りもちゃんとしてるのね」
line = "「ふむふむ、さすがスイーツ同好会だわ……その辺りもちゃんとしてるのね」"

[[dialogue]]
speaker = "ロロット"
# 「おや、もう戻ってきましたよ」
line = "「おや、もう戻ってきましたよ」"

[[dialogue]]
speaker = "ナナカ"
# 「へいお待ちぃ！　店員さんが、焼きたてだから早めに食べた方がいいですよ～、ってさ」
line = "「へいお待ちぃ！　店員さんが、焼きたてだから早めに食べた方がいいですよ～、ってさ」"

[[dialogue]]
speaker = "ナナカ"
# 「ほい、じゃあみんな、１個ずつ受け取ってー」
line = "「ほい、じゃあみんな、１個ずつ受け取ってー」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あつあつね。これって……」
line = "「あつあつね。これって……」"

[[dialogue]]
speaker = "unk"
# ワッフルだね
line = "ワッフルだね"

[[dialogue]]
speaker = "ナナカ"
# 「その通り！　ただしっ、このアタシが紹介するってんだから、ただのワッフルだとは侮るなかれ！」
line = "「その通り！　ただしっ、このアタシが紹介するってんだから、ただのワッフルだとは侮るなかれ！」"

[[dialogue]]
speaker = "ロロット"
# 「それは、もしや……」
line = "「それは、もしや……」"

[[dialogue]]
speaker = "ナナカ"
# 「あーっと！　ロロちゃん、ネタバレ禁止ってことでよろしく」
line = "「あーっと！　ロロちゃん、ネタバレ禁止ってことでよろしく」"

[[dialogue]]
speaker = "ロロット"
# 「仕方ありませんね～」
line = "「仕方ありませんね～」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ま、食べてみればわかるでしょ。では、いただきまーす」
line = "「ま、食べてみればわかるでしょ。では、いただきまーす」"

[[dialogue]]
speaker = "ヴィーナス"
# 「はむっ、もぐもぐもぐ……ほぉ、これは……」
line = "「はむっ、もぐもぐもぐ……ほぉ、これは……」"

[[dialogue]]
speaker = "ロロット"
# 「もちもちしていて、とってもおいしいのです～♪」
line = "「もちもちしていて、とってもおいしいのです～♪」"

[[dialogue]]
speaker = "ナナカ"
# 「うんうん、評判通りの味だね。値段も手頃だし、こりゃあ繁盛するのも納得だわ」
line = "「うんうん、評判通りの味だね。値段も手頃だし、こりゃあ繁盛するのも納得だわ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「でもこれ、どうやってもちもちさせてるのかしらね。クロト、わかる？」
line = "「でもこれ、どうやってもちもちさせてるのかしらね。クロト、わかる？」"

[[dialogue]]
speaker = "ナナカ"
# 「いやいや、そこんとこは企業秘密なんだから、簡単にわかるわけ……」
line = "「いやいや、そこんとこは企業秘密なんだから、簡単にわかるわけ……」"

[[dialogue]]
speaker = "unk"
# だいたいわかったけど
line = "だいたいわかったけど"

[[dialogue]]
speaker = "ナナカ"
# 「えぇっ、ほんとにぃ！？」
line = "「えぇっ、ほんとにぃ！？」"

[[dialogue]]
speaker = "ロロット"
# 「わたしもわかってしまいました！　これはお餅を使っています！」
line = "「わたしもわかってしまいました！　これはお餅を使っています！」"

[[dialogue]]
speaker = "unk"
# お餅じゃないみたいだよ
line = "お餅じゃないみたいだよ"

[[dialogue]]
speaker = "ナナカ"
# 「うそぉ！？　アタシもロロちゃんと同じで、お餅かなって思ってたのに……」
line = "「うそぉ！？　アタシもロロちゃんと同じで、お餅かなって思ってたのに……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふふーん、うちのクロトはそんじょそこらのクロトじゃないんだから」
line = "「ふふーん、うちのクロトはそんじょそこらのクロトじゃないんだから」"

[[dialogue]]
speaker = "ナナカ"
# 「ま、まさか……原材料だけじゃなくて、作り方までわかっちゃったりとかは、さすがに……」
line = "「ま、まさか……原材料だけじゃなくて、作り方までわかっちゃったりとかは、さすがに……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロトならわかっちゃうんだな～、これが」
line = "「クロトならわかっちゃうんだな～、これが」"

[[dialogue]]
speaker = "ロロット"
# 「ほほう～、新星の会長さんは、そんなことまでわかってしまうのですね」
line = "「ほほう～、新星の会長さんは、そんなことまでわかってしまうのですね」"

[[dialogue]]
speaker = "ナナカ"
# 「なるほどねぇ……お菓子を作るとは聞いてたけど、ちょっと舐めてたわ。やるじゃん」
line = "「なるほどねぇ……お菓子を作るとは聞いてたけど、ちょっと舐めてたわ。やるじゃん」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それにしてもこのワッフル、ほんとにおいしいわね。流星市国にはない味だから、余計に気になっちゃう」
line = "「それにしてもこのワッフル、ほんとにおいしいわね。流星市国にはない味だから、余計に気になっちゃう」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ねえクロト、作り方がわかるなら、向こうに帰っても作れるんじゃない？」
line = "「ねえクロト、作り方がわかるなら、向こうに帰っても作れるんじゃない？」"

[[dialogue]]
speaker = "unk"
# 難しいけど出来ると思う
line = "難しいけど出来ると思う"

[[dialogue]]
speaker = "ヴィーナス"
# 「やったぁ！　それじゃよろしく頼むわねっ」
line = "「やったぁ！　それじゃよろしく頼むわねっ」"

[[dialogue]]
speaker = "ナナカ"
# 「うむむ……こいつぁ想像以上の逸材とみた……！」
line = "「うむむ……こいつぁ想像以上の逸材とみた……！」"

[[dialogue]]
speaker = "ナナカ"
# 「よし決めた！　緋宮クロト、あなたをスウィーツ同好会の臨時メンバーに任命します！」
line = "「よし決めた！　緋宮クロト、あなたをスウィーツ同好会の臨時メンバーに任命します！」"

[[dialogue]]
speaker = "unk"
# ええっ！　俺が！？
line = "ええっ！　俺が！？"

[[dialogue]]
speaker = "ナナカ"
# 「あっちに帰れるようになるまででいいからさ、アタシに付き合ってよ、お願いっ！　アンタの能力が必要なの！」
line = "「あっちに帰れるようになるまででいいからさ、アタシに付き合ってよ、お願いっ！　アンタの能力が必要なの！」"

[[dialogue]]
speaker = "ナナカ"
# 「お願いお願いお願いーーーっ！　再現して欲しい気になるスウィーツが、いっぱいあるんだから～っ！」
line = "「お願いお願いお願いーーーっ！　再現して欲しい気になるスウィーツが、いっぱいあるんだから～っ！」"

[[dialogue]]
speaker = "unk"
# こうして俺はナナカのお願いを断り切れず、スイーツ同好会の臨時メンバーになるのだった。
line = "こうして俺はナナカのお願いを断り切れず、スイーツ同好会の臨時メンバーになるのだった。"
