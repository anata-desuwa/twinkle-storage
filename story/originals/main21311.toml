line = "「うぅぅっ……くぅっ……！　なんでだよ……なんで、こんな……」"

[[dialogue]]
speaker = "クロト"
# 「……チナ」
line = "「……チナ」"

[[dialogue]]
speaker = "チナ"
# 「会いたくなかった……会ったら、絶対にアルタイルを滅ぼせなくなるって……アタシ……」
line = "「会いたくなかった……会ったら、絶対にアルタイルを滅ぼせなくなるって……アタシ……」"

