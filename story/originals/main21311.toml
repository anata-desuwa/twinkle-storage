line = "「だけどチナはちゃんと聞く耳を持ってくれた。交渉の余地はあるって歩み寄ってくれた……天界襲撃の時だって、助太刀してくれたじゃないか」"

[[dialogue]]
speaker = "クロト"
# 「全員が生き残る道を掴む──全部を都合よく解決できたら最高だ。力を合わせれば、可能性は開ける……！」
line = "「全員が生き残る道を掴む──全部を都合よく解決できたら最高だ。力を合わせれば、可能性は開ける……！」"

[[dialogue]]
speaker = "クロト"
# 「ハッピーエンドを掴み取るんだ、俺たちの手で！」
line = "「ハッピーエンドを掴み取るんだ、俺たちの手で！」"

[[dialogue]]
speaker = "チナ"
