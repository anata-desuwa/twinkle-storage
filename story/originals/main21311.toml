line = "「だ、大丈夫です！　すみませんっ、前を見てなくって……！」"

[[dialogue]]
speaker = "アナ"
# 「……ご無沙汰しております。香堂さん。偶然、ですね」
line = "「……ご無沙汰しております。香堂さん。偶然、ですね」"

[[dialogue]]
speaker = "チナの母"
# 「あ……新星星徒会のアナさん！　あなた、アナさんですよ。ほら、チナの入院の時に、学園長さんと一緒に便宜をはかってくださった……」
line = "「あ……新星星徒会のアナさん！　あなた、アナさんですよ。ほら、チナの入院の時に、学園長さんと一緒に便宜をはかってくださった……」"

[[dialogue]]
speaker = "チナの父"
# 「ああ！　その節は本当にありがとうございました。すみません、自分は出撃していたので、連絡は妻に任せきりで……」
line = "「ああ！　その節は本当にありがとうございました。すみません、自分は出撃していたので、連絡は妻に任せきりで……」"

[[dialogue]]
speaker = "アナ"
# 「いいえ。こちらこそお世話になっております。私たち現役も、ＯＢ・ＯＧの星騎士の方から学ぶことばかりで……」
line = "「いいえ。こちらこそお世話になっております。私たち現役も、ＯＢ・ＯＧの星騎士の方から学ぶことばかりで……」"

[[dialogue]]
speaker = "unk"
# 学園卒業後も、星力の衰え方には個人差がある──チナの父親は、未だに現役の星騎士みたいだ。
line = "学園卒業後も、星力の衰え方には個人差がある──チナの父親は、未だに現役の星騎士みたいだ。"

[[dialogue]]
speaker = "チナの父"
# 「しかし私ももうすっかり星力が弱くなってしまって……そろそろあがりも近いかなと。足を引っ張っていないか心配ですが……」
line = "「しかし私ももうすっかり星力が弱くなってしまって……そろそろあがりも近いかなと。足を引っ張っていないか心配ですが……」"

[[dialogue]]
speaker = "チナの父"
# 「ああ、アナさんと一緒にいるということは、あなたが──」
line = "「ああ、アナさんと一緒にいるということは、あなたが──」"

[[dialogue]]
speaker = "クロト"
# 「はい、新星学園の現星徒会長、緋宮クロトです。そしてこちらの彼女も……同じ星騎士です」
line = "「はい、新星学園の現星徒会長、緋宮クロトです。そしてこちらの彼女も……同じ星騎士です」"

[[dialogue]]
speaker = "チナ"
# 「こ、こん、にちは……」
line = "「こ、こん、にちは……」"

[[dialogue]]
speaker = "チナの父"
# 「そうでしたか。平和が守られているのは、君たち後輩のおかげだよ。本当にありがとう」
line = "「そうでしたか。平和が守られているのは、君たち後輩のおかげだよ。本当にありがとう」"

[[dialogue]]
speaker = "チナ"
# 「い、いえ……でも、あ、あのっ……その……」
line = "「い、いえ……でも、あ、あのっ……その……」"

[[dialogue]]
speaker = "チナの母"
# 「……？　どうかしましたか」
line = "「……？　どうかしましたか」"

[[dialogue]]
speaker = "チナ"
# 「娘さん、あの……入院、してるって……」
line = "「娘さん、あの……入院、してるって……」"

[[dialogue]]
speaker = "チナの母"
# 「あ……心配してくださって、ありがとうございます。でも大丈夫ですよ。新星学園の方々に、とてもよくしていただいていますから」
line = "「あ……心配してくださって、ありがとうございます。でも大丈夫ですよ。新星学園の方々に、とてもよくしていただいていますから」"

[[dialogue]]
speaker = "チナの父"
# 「以前にも似たようなことがあったからね。あの時はすぐに目が覚めたんだが……まあ今回もきっと、すぐによくなる」
line = "「以前にも似たようなことがあったからね。あの時はすぐに目が覚めたんだが……まあ今回もきっと、すぐによくなる」"

[[dialogue]]
speaker = "チナの母"
# 「学園長さんからもまめに連絡をいただいていますし、優秀なスタッフに看ていただいています」
line = "「学園長さんからもまめに連絡をいただいていますし、優秀なスタッフに看ていただいています」"

[[dialogue]]
speaker = "チナの父"
