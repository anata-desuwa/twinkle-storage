line = "「……いい、のか？　アタシは……ずっとデネブとアルタイルを、天秤にかけて……故郷のためならお前らとも戦うって、言い続けてたんだぞ……？」"

[[dialogue]]
speaker = "クロト"
# 「虫がいいって？　それの何が問題なんだ。俺たちだってチナに、虫のいいことばかり言っている」
line = "「虫がいいって？　それの何が問題なんだ。俺たちだってチナに、虫のいいことばかり言っている」"

[[dialogue]]
speaker = "クロト"
