line = "「もう──そうなんですよアナさん！　この人ったら、買い物は帰りにしようって言うのに、聞かなくて」"

[[dialogue]]
speaker = "チナの父"
# 「仕方ないだろう、善は急げって言うし……」
line = "「仕方ないだろう、善は急げって言うし……」"

[[dialogue]]
speaker = "unk"
