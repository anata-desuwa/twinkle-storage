line = "「無理だよ、ルヴィ……アルタイルを滅ぼすだなんて、アタシにはもう、できない……」"

[[dialogue]]
speaker = "チナ"
# 「全部、守りたい……父さんも、母さんも……アタシのきょうだいもっ……」
line = "「全部、守りたい……父さんも、母さんも……アタシのきょうだいもっ……」"

[[dialogue]]
speaker = "チナ"
