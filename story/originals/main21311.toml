[[dialogue]]
speaker = "チナの母"
# 「ごめんなさい。私たちの名前を呼ばれたとばかり……」
line = "「ごめんなさい。私たちの名前を呼ばれたとばかり……」"

[[dialogue]]
speaker = "チナの父"
# 「君、大丈夫だったかい？　ケガとかしてないかな？」
line = "「君、大丈夫だったかい？　ケガとかしてないかな？」"

