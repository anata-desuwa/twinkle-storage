[[dialogue]]
speaker = "チナの母"
# 「つい先日、わかったんです。チナったら、早く起きてくれないかしら」
line = "「つい先日、わかったんです。チナったら、早く起きてくれないかしら」"

[[dialogue]]
speaker = "チナの母"
