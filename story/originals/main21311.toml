line = "「ええ。どうかあなたたちは、リクリエとの戦いに集中してください」"

[[dialogue]]
speaker = "チナ"
# 「……………そう、ですか」
line = "「……………そう、ですか」"

[[dialogue]]
speaker = "チナの母"
# 「どうかお気になさらず。大丈夫です、うちの娘は本当にわんぱくな子ですから！」
line = "「どうかお気になさらず。大丈夫です、うちの娘は本当にわんぱくな子ですから！」"

[[dialogue]]
speaker = "チナの母"
# 「今日にでも目を覚ますんじゃないかって話してるんですよ。ねえ、あなた？」
line = "「今日にでも目を覚ますんじゃないかって話してるんですよ。ねえ、あなた？」"

[[dialogue]]
speaker = "チナの父"
# 「ああ。チナなら大丈夫さ。きっと目が覚めたら『お腹が空いた』って言ってくれるよ」
line = "「ああ。チナなら大丈夫さ。きっと目が覚めたら『お腹が空いた』って言ってくれるよ」"

[[dialogue]]
speaker = "チナの母"
# 「ふふ。だからお見舞いに行く前に、必ずここの肉まんを買っていくんです。あの子は本当に、これに目がないから」
line = "「ふふ。だからお見舞いに行く前に、必ずここの肉まんを買っていくんです。あの子は本当に、これに目がないから」"

[[dialogue]]
speaker = "チナ"
# 「お見舞いって……こんな平日に？　お仕事とか、あるんじゃ……」
line = "「お見舞いって……こんな平日に？　お仕事とか、あるんじゃ……」"

[[dialogue]]
speaker = "チナの母"
# 「ええ。でも反省してるんです。私たち、あの子が文句を言わないから、それに甘えてしまって……」
line = "「ええ。でも反省してるんです。私たち、あの子が文句を言わないから、それに甘えてしまって……」"

[[dialogue]]
speaker = "チナの父"
# 「仕事ばかりで寂しい思いをさせていたって、今さら気づいて。親失格ですよ……今度あの子が目を覚ましたら、うんと遊んでやるつもりなんです」
line = "「仕事ばかりで寂しい思いをさせていたって、今さら気づいて。親失格ですよ……今度あの子が目を覚ましたら、うんと遊んでやるつもりなんです」"

[[dialogue]]
speaker = "チナの母"
# 「世界の平和も大切ですが……あの子は、私たちにとって全てですから。私も夫も、家族の時間を増やそうって話をしているんです」
line = "「世界の平和も大切ですが……あの子は、私たちにとって全てですから。私も夫も、家族の時間を増やそうって話をしているんです」"

