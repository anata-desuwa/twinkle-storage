line = "「……今まで、魔王は理想論ばかり言うって、思ってた」"

[[dialogue]]
speaker = "チナ"
# 「欲張って全部を取ろうとすれば、きっと何かを取りこぼす。本当に手に入れられるものはちょっぴりなのに、夢ばっかり見やがって、って……」
line = "「欲張って全部を取ろうとすれば、きっと何かを取りこぼす。本当に手に入れられるものはちょっぴりなのに、夢ばっかり見やがって、って……」"

[[dialogue]]
speaker = "チナ"
# 「……１０年前のことが、あったから。あの時デネブは、全部を守ろうとして、全部失ったから……」
line = "「……１０年前のことが、あったから。あの時デネブは、全部を守ろうとして、全部失ったから……」"

[[dialogue]]
speaker = "チナ"
# 「だから大切なものの中から、選ぶべきだって。切り捨てなきゃって、欲張っちゃダメだって、ずっと思ってたんだ……」
line = "「だから大切なものの中から、選ぶべきだって。切り捨てなきゃって、欲張っちゃダメだって、ずっと思ってたんだ……」"

[[dialogue]]
speaker = "チナ"
# 「…………だけどアタシには、無理だ。ぜんぶ……ぜんぶ大切なんだ……これ以上、何も失いたくないんだ……」
line = "「…………だけどアタシには、無理だ。ぜんぶ……ぜんぶ大切なんだ……これ以上、何も失いたくないんだ……」"

[[dialogue]]
speaker = "チナ"
# 「……頼む。アタシは大切なものを、すべて守りたい！」
line = "「……頼む。アタシは大切なものを、すべて守りたい！」"

[[dialogue]]
speaker = "チナ"
# 「だから──力を貸してくれ、魔王……！！」
line = "「だから──力を貸してくれ、魔王……！！」"

[[dialogue]]
speaker = "unk"
# その後、香堂夫妻と別れを告げて戻ってきたアナもまじえて、全員で肉まんを食べた。
line = "その後、香堂夫妻と別れを告げて戻ってきたアナもまじえて、全員で肉まんを食べた。"

[[dialogue]]
speaker = "unk"
# ものを食べながら伝えるのも不謹慎かとも思ったけれど……このくらい砕けていた方が、今のチナには受け入れやすいと思った。
line = "ものを食べながら伝えるのも不謹慎かとも思ったけれど……このくらい砕けていた方が、今のチナには受け入れやすいと思った。"

[[dialogue]]
speaker = "unk"
# 俺とアナは、ジグの星眼のこと、ルヴィネに起きうる未来……そのすべてをチナに打ち明けた。
line = "俺とアナは、ジグの星眼のこと、ルヴィネに起きうる未来……そのすべてをチナに打ち明けた。"

