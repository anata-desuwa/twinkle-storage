speaker = "チナ"
# 「……………………母さん？」
line = "「……………………母さん？」"

[[dialogue]]
speaker = "unk"
# チナは確かに『母さん』と言った。それならば、隣に立つ男性は父親か。
line = "チナは確かに『母さん』と言った。それならば、隣に立つ男性は父親か。"

[[dialogue]]
speaker = "unk"
