[[dialogue]]
speaker = "カティア"
# 「すみませんっ、魔王様。ちょっとお手洗い行ってきまーすっ」
line = "「すみませんっ、魔王様。ちょっとお手洗い行ってきまーすっ」"

[[dialogue]]
speaker = "カティア"
# 「ふー……間に合った……」
line = "「ふー……間に合った……」"

[[dialogue]]
speaker = "カティア"
# 「でも犯人の手がかり、なかなか見つからないなぁ……」
line = "「でも犯人の手がかり、なかなか見つからないなぁ……」"

[[dialogue]]
speaker = "カティア"
# 「いや、弱気になっちゃダメだ。こういう時こそ頑張らないと」
line = "「いや、弱気になっちゃダメだ。こういう時こそ頑張らないと」"

[[dialogue]]
speaker = "カティア"
# 「もし私が犯人を見つけたら……むふふ……きっと魔王様が頭をなでなでして、わふわふしてくれてぇ……」
line = "「もし私が犯人を見つけたら……むふふ……きっと魔王様が頭をなでなでして、わふわふしてくれてぇ……」"

[[dialogue]]
speaker = "カティア"
# 「ふふふ、こうしちゃおけない！　早く魔王様と合流しなくては……！」
line = "「ふふふ、こうしちゃおけない！　早く魔王様と合流しなくては……！」"

[[dialogue]]
speaker = "イングリット"
# 「おい、そこの貴様」
line = "「おい、そこの貴様」"

[[dialogue]]
speaker = "カティア"
# 「はい？」
line = "「はい？」"

[[dialogue]]
speaker = "カティア"
# （はっ！？　日本刀を持ってる天使！　犯人の特徴と一致する！　ていうか見るからにヤバいヤツ！）
line = "（はっ！？　日本刀を持ってる天使！　犯人の特徴と一致する！　ていうか見るからにヤバいヤツ！）"

[[dialogue]]
speaker = "カティア"
# 「こ、ここは撤退します……！　逃げるが勝ちです！」
line = "「こ、ここは撤退します……！　逃げるが勝ちです！」"

[[dialogue]]
speaker = "イングリット"
# 「貴様！　この私から逃げられると思うなよ！」
line = "「貴様！　この私から逃げられると思うなよ！」"

[[dialogue]]
speaker = "カティア"
# 「わふ～っ！　追いかけてこないでください～！」
line = "「わふ～っ！　追いかけてこないでください～！」"

[[dialogue]]
speaker = "イングリット"
# 「貴様が逃げるからだ！」
line = "「貴様が逃げるからだ！」"

[[dialogue]]
speaker = "カティア"
# 「わふ～っ！　追いかけてこないでください～！」
line = "「わふ～っ！　追いかけてこないでください～！」"

[[dialogue]]
speaker = "カティア"
# （ヤバいヤバいヤバいっ！　このままじゃ追いつかれちゃう！）
line = "（ヤバいヤバいヤバいっ！　このままじゃ追いつかれちゃう！）"

[[dialogue]]
speaker = "カティア"
# （追いつかれる前に奇襲をかける？　ダメっ！　絶対負けちゃう！）
line = "（追いつかれる前に奇襲をかける？　ダメっ！　絶対負けちゃう！）"

[[dialogue]]
speaker = "カティア"
# 「わふっ！　アステラが目の前に！？」
line = "「わふっ！　アステラが目の前に！？」"

[[dialogue]]
speaker = "カティア"
# 「ど、どどどどうしよう！　もうあの人にも追いつかれそうだし！　ええい、こうなったらイチかバチか！　アステラに突っ込む！」
line = "「ど、どどどどうしよう！　もうあの人にも追いつかれそうだし！　ええい、こうなったらイチかバチか！　アステラに突っ込む！」"

[[dialogue]]
speaker = "カティア"
# 「コラプサーに捕まるくらいなら、アステラの方がマシだ！　ええーい！」
line = "「コラプサーに捕まるくらいなら、アステラの方がマシだ！　ええーい！」"

[[dialogue]]
speaker = "カティア"
# 「はぁはぁっ……！　なんとか逃げ切れた……！」
line = "「はぁはぁっ……！　なんとか逃げ切れた……！」"

[[dialogue]]
speaker = "イングリット"
# 「誰から逃げ切れたんだ？」
line = "「誰から逃げ切れたんだ？」"

[[dialogue]]
speaker = "カティア"
# 「ひええええ！？　コラプサー！？」
line = "「ひええええ！？　コラプサー！？」"

[[dialogue]]
speaker = "イングリット"
# 「ほう、私がコラプサーということを知っているのか」
line = "「ほう、私がコラプサーということを知っているのか」"

[[dialogue]]
speaker = "カティア"
# （ほ、本当にコラプサーだった……！　私、事件の犯人と２人きりになっちゃってる！）
line = "（ほ、本当にコラプサーだった……！　私、事件の犯人と２人きりになっちゃってる！）"

[[dialogue]]
speaker = "イングリット"
# 「私はイングリット。強者を求めるコラプサーだ」
line = "「私はイングリット。強者を求めるコラプサーだ」"

[[dialogue]]
speaker = "カティア"
# （今までのコラプサーとは違う名前……新しいコラプサー！）
line = "（今までのコラプサーとは違う名前……新しいコラプサー！）"

[[dialogue]]
speaker = "イングリット"
# 「さて、そろそろ問わせてもらおう。貴様はプリマステラか？」
line = "「さて、そろそろ問わせてもらおう。貴様はプリマステラか？」"

[[dialogue]]
speaker = "カティア"
# 「ち、違う……！　私はプリマステラじゃないワン！」
line = "「ち、違う……！　私はプリマステラじゃないワン！」"

[[dialogue]]
speaker = "イングリット"
# 「なんだ、プリマステラではないのか。無駄骨だったな」
line = "「なんだ、プリマステラではないのか。無駄骨だったな」"

[[dialogue]]
speaker = "カティア"
# 「う、うるさいワン……！　プリマステラじゃなくても立派な星騎士だガオ！」
line = "「う、うるさいワン……！　プリマステラじゃなくても立派な星騎士だガオ！」"

[[dialogue]]
speaker = "イングリット"
# 「貴様のような有象無象には興味がない。やはり狙うべきは魔王か……」
line = "「貴様のような有象無象には興味がない。やはり狙うべきは魔王か……」"

[[dialogue]]
speaker = "カティア"
# 「──！？　魔王様に手を出すのは許さないぞ！」
line = "「──！？　魔王様に手を出すのは許さないぞ！」"

[[dialogue]]
speaker = "イングリット"
# 「魔王を襲うのに、なぜ貴様の許可がいる？　弱者に口を開く権利はない」
line = "「魔王を襲うのに、なぜ貴様の許可がいる？　弱者に口を開く権利はない」"

[[dialogue]]
speaker = "カティア"
# 「私は魔王様の忠実なしもべだワン！」
line = "「私は魔王様の忠実なしもべだワン！」"

[[dialogue]]
speaker = "イングリット"
# 「ほう、貴様が魔王様の下僕だと？」
line = "「ほう、貴様が魔王様の下僕だと？」"

[[dialogue]]
speaker = "カティア"
# 「そうだワン！　どうだ恐れ入ったか！」
line = "「そうだワン！　どうだ恐れ入ったか！」"

[[dialogue]]
speaker = "イングリット"
# 「なるほどな。だったら、貴様を血祭りに上げれば、魔王を釣る餌になるか」
line = "「なるほどな。だったら、貴様を血祭りに上げれば、魔王を釣る餌になるか」"

[[dialogue]]
speaker = "カティア"
# 「ち、血祭り……！？」
line = "「ち、血祭り……！？」"

[[dialogue]]
speaker = "イングリット"
# 「下僕がなぶり殺しにされれば、魔王も戦う気になるだろう」
line = "「下僕がなぶり殺しにされれば、魔王も戦う気になるだろう」"

[[dialogue]]
speaker = "カティア"
# 「ま、魔王様は冷酷なお方だから、そんなことでは動かないワン……！」
line = "「ま、魔王様は冷酷なお方だから、そんなことでは動かないワン……！」"

[[dialogue]]
speaker = "イングリット"
# 「ほう。さすがは魔王と呼ばれるだけあるな。ますます興味が湧いてくる」
line = "「ほう。さすがは魔王と呼ばれるだけあるな。ますます興味が湧いてくる」"

[[dialogue]]
speaker = "カティア"
# 「私に協力するなら、魔王様に話をつけてやってもいいガオ」
line = "「私に協力するなら、魔王様に話をつけてやってもいいガオ」"

[[dialogue]]
speaker = "イングリット"
# 「本当か？」
line = "「本当か？」"

[[dialogue]]
speaker = "カティア"
# 「もちろんだワン。その代わりこのアステラを出るまで、私の護衛をしてもらうガオ」
line = "「もちろんだワン。その代わりこのアステラを出るまで、私の護衛をしてもらうガオ」"

[[dialogue]]
speaker = "イングリット"
# 「ふむ。いいだろう」
line = "「ふむ。いいだろう」"

[[dialogue]]
speaker = "カティア"
# （やった！　これでアステラを出るまで安全になれた！）
line = "（やった！　これでアステラを出るまで安全になれた！）"

[[dialogue]]
speaker = "カティア"
# （そしてあわよくば、アステラのモンスターと相打ちにさせて、弱ったところを確保してやる！）
line = "（そしてあわよくば、アステラのモンスターと相打ちにさせて、弱ったところを確保してやる！）"

[[dialogue]]
speaker = "イングリット"
# 「そうと決まれば早くアステラを出るぞ、犬」
line = "「そうと決まれば早くアステラを出るぞ、犬」"

[[dialogue]]
speaker = "カティア"
# 「私は犬じゃないワン！　カティアっていう立派な名前があるワン！」
line = "「私は犬じゃないワン！　カティアっていう立派な名前があるワン！」"

[[dialogue]]
speaker = "イングリット"
# 「覚えられない。犬でいいだろう」
line = "「覚えられない。犬でいいだろう」"

[[dialogue]]
speaker = "カティア"
# 「むかーっ！　そんな難しい名前じゃないガオ！」
line = "「むかーっ！　そんな難しい名前じゃないガオ！」"

[[dialogue]]
speaker = "イングリット"
# 「戦いに関係ないことに興味はない」
line = "「戦いに関係ないことに興味はない」"

[[dialogue]]
speaker = "カティア"
# （な、なんだこいつ……！　いくらコラプサーでも言ってることめちゃくちゃだ……！）
line = "（な、なんだこいつ……！　いくらコラプサーでも言ってることめちゃくちゃだ……！）"
