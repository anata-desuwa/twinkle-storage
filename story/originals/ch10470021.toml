[[dialogue]]
speaker = "unk"
# 出迎えなきゃと思うのだけど、日付けが変わるまで星徒会の仕事を片付けていた手前……非常に眠い。
line = "出迎えなきゃと思うのだけど、日付けが変わるまで星徒会の仕事を片付けていた手前……非常に眠い。"

