# 第３話,ダイエットだなんて、とんでもない,P
line = "第３話,ダイエットだなんて、とんでもない,P"

[[dialogue]]
speaker = "unk"
# １００勝メモリアルレース、勝者のカティアの望みは──
line = "１００勝メモリアルレース、勝者のカティアの望みは──"

[[dialogue]]
speaker = "カティア"
# 「ミルフィー先輩のお肌を、むにむにしたいです！」
line = "「ミルフィー先輩のお肌を、むにむにしたいです！」"

[[dialogue]]
speaker = "ミルフィー"
# 「えええっ！？」
line = "「えええっ！？」"

[[dialogue]]
speaker = "ヒヨ"
# 「姐さんに破廉恥なことしようってのかい！？　会長さんじゃあるめえに！」
line = "「姐さんに破廉恥なことしようってのかい！？　会長さんじゃあるめえに！」"

[[dialogue]]
speaker = "unk"
# 破廉恥してないから！
line = "破廉恥してないから！"

[[dialogue]]
speaker = "カティア"
# 「破廉恥じゃないです！　前々からミルフィー先輩のもちもちお肌が気になってて、触ってみたかったんです」
line = "「破廉恥じゃないです！　前々からミルフィー先輩のもちもちお肌が気になってて、触ってみたかったんです」"

[[dialogue]]
speaker = "カティア"
# 「私だって女の子なんですから……ミルフィー先輩みたいなつやもち肌に憧れちゃいますよー」
line = "「私だって女の子なんですから……ミルフィー先輩みたいなつやもち肌に憧れちゃいますよー」"

[[dialogue]]
speaker = "ミルフィー"
# 「そ、そう？　そう言われると悪い気しないね、えへへへ」
line = "「そ、そう？　そう言われると悪い気しないね、えへへへ」"

[[dialogue]]
speaker = "カティア"
# 「ヒヨとミルフィー先輩のチームに勝ったんだし、ミルフィー先輩に命令してもＯＫですよね？　もちろん嫌だったら、無理にとは言わないです」
line = "「ヒヨとミルフィー先輩のチームに勝ったんだし、ミルフィー先輩に命令してもＯＫですよね？　もちろん嫌だったら、無理にとは言わないです」"

[[dialogue]]
speaker = "ヒヨ"
# 「あたしじゃなくって姐さんに手を出そうたぁいい度胸じゃねえか。くっ……これが『ねとられ』ってヤツかい？」
line = "「あたしじゃなくって姐さんに手を出そうたぁいい度胸じゃねえか。くっ……これが『ねとられ』ってヤツかい？」"

[[dialogue]]
speaker = "ミルフィー"
# 「う～ん……ちょっと触るくらいなら、いいよ？　負けちゃったんだし、女の子同士だし……」
line = "「う～ん……ちょっと触るくらいなら、いいよ？　負けちゃったんだし、女の子同士だし……」"

[[dialogue]]
speaker = "ミルフィー"
# 「でも、その……あまり変なとこは触らないでね……？　会長くんも見てるし……」
