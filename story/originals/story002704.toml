[[dialogue]]
speaker = "unk"
# その後、マトイの煩悩は一旦満たされたようで、会長の影は気づけば消え去っていた――
line = "その後、マトイの煩悩は一旦満たされたようで、会長の影は気づけば消え去っていた――"

[[dialogue]]
speaker = "ミヤハル"
# 「それじゃあ、次はルリエルはんの煩悩を解放する番やね<emoji=heart04>」
line = "「それじゃあ、次はルリエルはんの煩悩を解放する番やね<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
# 「はい！　何が起こるか楽しみでワクワクするのです♪」
line = "「はい！　何が起こるか楽しみでワクワクするのです♪」"

[[dialogue]]
speaker = "ミヤハル"
# 「ふふっ<emoji=heart04>　煩悩を楽しめるなんて、ルリエルはん、巫女の素質あるわぁ<emoji=heart04>」
line = "「ふふっ<emoji=heart04>　煩悩を楽しめるなんて、ルリエルはん、巫女の素質あるわぁ<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
# 「ちょ、ちょっと待って！　ミヤハルさん、ストップ！」
line = "「ちょ、ちょっと待って！　ミヤハルさん、ストップ！」"

[[dialogue]]
speaker = "ミヤハル"
# 「あら、どないしたん、マトイはん？　もしかして、煩悩おかわり？　ふふっ、ええよ<emoji=heart04>　うちも会長はんの影ともっと遊びたかったし～」
line = "「あら、どないしたん、マトイはん？　もしかして、煩悩おかわり？　ふふっ、ええよ<emoji=heart04>　うちも会長はんの影ともっと遊びたかったし～」"

[[dialogue]]
speaker = "マトイ"
# 「いや、やらないよ！？　そうじゃなくて、一旦クールダウンさせて！　あんなの休憩せずに連発されたら、普通にキャパオーバーだから！」
line = "「いや、やらないよ！？　そうじゃなくて、一旦クールダウンさせて！　あんなの休憩せずに連発されたら、普通にキャパオーバーだから！」"

[[dialogue]]
speaker = "ミヤハル"
# 「え～、ルリエルはんの煩悩、早く見せてもらいたいのに～<emoji=heart04>」
line = "「え～、ルリエルはんの煩悩、早く見せてもらいたいのに～<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
# 「ミヤハルさん、完全に楽しんでるよね！？」
line = "「ミヤハルさん、完全に楽しんでるよね！？」"

[[dialogue]]
speaker = "unk"
# そうして、４人で縁側に座り休憩していると、トマルが口を開く。
line = "そうして、４人で縁側に座り休憩していると、トマルが口を開く。"

[[dialogue]]
speaker = "トマル"
# 「――そういえば、マトイ姉さまとルリエルさまの巫女フォームの力は、どんな感じなのでしょうか？」
line = "「――そういえば、マトイ姉さまとルリエルさまの巫女フォームの力は、どんな感じなのでしょうか？」"

[[dialogue]]
speaker = "マトイ"
# 「ああ、トマルにはまだ見せてなかったよね。えっとね……」
line = "「ああ、トマルにはまだ見せてなかったよね。えっとね……」"

[[dialogue]]
speaker = "マトイ"
# 「私の新しい武器は、『二刀流の刀』なんだ」
line = "「私の新しい武器は、『二刀流の刀』なんだ」"

[[dialogue]]
speaker = "トマル"
# 「カッコいいです♪　<b>両利き</b>の姉さまにはピッタリの武器ですね」
line = "「カッコいいです♪　<b>両利き</b>の姉さまにはピッタリの武器ですね」"

[[dialogue]]
speaker = "ミヤハル"
# 「あら、マトイはん、手が両利きなん？　それはえろう便利そうやねぇ」
line = "「あら、マトイはん、手が両利きなん？　それはえろう便利そうやねぇ」"

[[dialogue]]
speaker = "マトイ"
# 「実はそうなんだ。今まで戦闘に役立てようとは思ったことなかったんだけど、この機会に二刀流のスタイルも試してみようかと思って」
line = "「実はそうなんだ。今まで戦闘に役立てようとは思ったことなかったんだけど、この機会に二刀流のスタイルも試してみようかと思って」"

[[dialogue]]
speaker = "ルリエル"
# 「わたしの方はですね～、『太鼓』なのですよ♪　でんでん♪」
line = "「わたしの方はですね～、『太鼓』なのですよ♪　でんでん♪」"

[[dialogue]]
speaker = "トマル"
# 「ルリエルさまの楽器が、巫女らしく変化したのですね。可愛らしくて素敵です♪」
line = "「ルリエルさまの楽器が、巫女らしく変化したのですね。可愛らしくて素敵です♪」"

[[dialogue]]
speaker = "ルリエル"
# 「えへへ♪　この太鼓を叩くと、なんと天気を操ることができるのです！　まあ、今は全然上手く行かなくて、自分も巻き込む嵐ばっかり起きちゃうんですけど……」
line = "「えへへ♪　この太鼓を叩くと、なんと天気を操ることができるのです！　まあ、今は全然上手く行かなくて、自分も巻き込む嵐ばっかり起きちゃうんですけど……」"

[[dialogue]]
speaker = "ミヤハル"
# 「せや、ちょうどいいタイミングやし、軽く巫女フォームでの戦い方を確認でもしとこか？」
line = "「せや、ちょうどいいタイミングやし、軽く巫女フォームでの戦い方を確認でもしとこか？」"

[[dialogue]]
speaker = "ミヤハル"
# 「星力を巫女の力に変化させて使う『巫術』がどういうものなのかも、はんなりと見せられるしな<emoji=heart04>」
line = "「星力を巫女の力に変化させて使う『巫術』がどういうものなのかも、はんなりと見せられるしな<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そうして、マトイとルリエルは、ミヤハルと戦闘訓練を行うことになった――のだが。
line = "そうして、マトイとルリエルは、ミヤハルと戦闘訓練を行うことになった――のだが。"

[[dialogue]]
speaker = "ミヤハル"
# 「巫術二十三式――<ruby=じょうかせん>浄火閃</ruby>！」
line = "「巫術二十三式――<ruby>浄火閃<rt>じょうかせん</rt></ruby>！」"

[[dialogue]]
speaker = "ルリエル"
# 「きゅ～……ま、参りましたなのです……！」
line = "「きゅ～……ま、参りましたなのです……！」"

[[dialogue]]
speaker = "ミヤハル"
# 「ふぅ～、ルリエルはん、お疲れ様どすえ<emoji=heart04>」
line = "「ふぅ～、ルリエルはん、お疲れ様どすえ<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
# 「はぁ……はぁ……！」
line = "「はぁ……はぁ……！」"

[[dialogue]]
speaker = "ミヤハル"
# 「マトイはんの方は、盾役やっとるだけあって、倒れへんねぇ。まだ続けなはります？」
line = "「マトイはんの方は、盾役やっとるだけあって、倒れへんねぇ。まだ続けなはります？」"

[[dialogue]]
speaker = "マトイ"
# 「……ううん、ギブアップ。ミヤハルさん、手合わせありがとうございました」
line = "「……ううん、ギブアップ。ミヤハルさん、手合わせありがとうございました」"

[[dialogue]]
speaker = "ミヤハル"
# 「いえいえ、こちらこそおおきに。でも、さすがは２人共、星徒会メンバーなだけあるねぇ。力のコントロールがまだ出来てないにしても、強くて驚いたわぁ<emoji=heart04>」
line = "「いえいえ、こちらこそおおきに。でも、さすがは２人共、星徒会メンバーなだけあるねぇ。力のコントロールがまだ出来てないにしても、強くて驚いたわぁ<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
# 「ミヤハルさん、今の戦いって……陰陽術は一切使ってなかったんだよね？」
line = "「ミヤハルさん、今の戦いって……陰陽術は一切使ってなかったんだよね？」"

[[dialogue]]
speaker = "ミヤハル"
# 「うん。使ったのは巫女の力だけ。巫術と陰陽術っていうのは、完全に別物なんよ」
line = "「うん。使ったのは巫女の力だけ。巫術と陰陽術っていうのは、完全に別物なんよ」"

[[dialogue]]
speaker = "ミヤハル"
# 「陰陽術は選星者『陰陽師』としての能力。大気中の<b>魔力</b>――マナって呼んどるものを使って発動する、特殊な『<b>魔法</b>』の一種なんよ」
line = "「陰陽術は選星者『陰陽師』としての能力。大気中の<b>魔力</b>――マナって呼んどるものを使って発動する、特殊な『<b>魔法</b>』の一種なんよ」"

[[dialogue]]
speaker = "ミヤハル"
# 「魔女の人たちが使ってる魔法は、おそらく体内の魔力を消費してるんやろね。陰陽術が分類上では魔法に属するってことも、わりと最近わかってきたことなんよ」
line = "「魔女の人たちが使ってる魔法は、おそらく体内の魔力を消費してるんやろね。陰陽術が分類上では魔法に属するってことも、わりと最近わかってきたことなんよ」"

[[dialogue]]
speaker = "ミヤハル"
# 「一方で、巫術は星力を変化させて使う巫女の力。うちはその２つを使い分けながら戦う、手札の多さが強みの星騎士ってわけやね<emoji=heart04>」
line = "「一方で、巫術は星力を変化させて使う巫女の力。うちはその２つを使い分けながら戦う、手札の多さが強みの星騎士ってわけやね<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
# （私とルリエルちゃん、２人まとめてかかっても、一撃も与えることができなかった……）
line = "（私とルリエルちゃん、２人まとめてかかっても、一撃も与えることができなかった……）"

[[dialogue]]
speaker = "マトイ"
# （陰陽術なしでも、ミヤハルさんの強さは体感、私のノヴァフォームと同じくらい強い……！）
line = "（陰陽術なしでも、ミヤハルさんの強さは体感、私のノヴァフォームと同じくらい強い……！）"

[[dialogue]]
speaker = "マトイ"
# 「ミヤハルさん、前線で戦っている姿を全然見かけなかったから、こんなに強いなんて知らなかったよ」
line = "「ミヤハルさん、前線で戦っている姿を全然見かけなかったから、こんなに強いなんて知らなかったよ」"

[[dialogue]]
speaker = "ミヤハル"
# 「ん？　ああ、うちは家の事情で『積極的に戦うな』って言われとるしな」
line = "「ん？　ああ、うちは家の事情で『積極的に戦うな』って言われとるしな」"

[[dialogue]]
speaker = "マトイ"
# 「え？」
line = "「え？」"

[[dialogue]]
speaker = "ミヤハル"
# 「マトイはんは『魔獣』って、聞いたことある？」
line = "「マトイはんは『魔獣』って、聞いたことある？」"

[[dialogue]]
speaker = "マトイ"
# 「それは……うん。流星学園にフェニエルちゃんって子がいて、その中に『不死鳥』って魔獣が宿ってるのを知ってるけど……」
line = "「それは……うん。流星学園にフェニエルちゃんって子がいて、その中に『不死鳥』って魔獣が宿ってるのを知ってるけど……」"

[[dialogue]]
speaker = "ミヤハル"
# 「そう。それの同類で『<ruby=きりん>麒麟</ruby>』って魔獣がおってな？」
line = "「そう。それの同類で『<ruby>麒麟<rt>きりん</rt></ruby>』って魔獣がおってな？」"

[[dialogue]]
speaker = "ミヤハル"
# 「うちの先祖――有名な陰陽師の安倍晴明はんが１１００年前、そいつとこの流星市国でやり合って、封印したんよ」
line = "「うちの先祖――有名な陰陽師の安倍晴明はんが１１００年前、そいつとこの流星市国でやり合って、封印したんよ」"

[[dialogue]]
speaker = "ミヤハル"
# 「この浅草安倍野神社の、ちょうど地下にな」
line = "「この浅草安倍野神社の、ちょうど地下にな」"

[[dialogue]]
speaker = "トマル"
# 「この神社の下に魔獣が……！？」
line = "「この神社の下に魔獣が……！？」"

[[dialogue]]
speaker = "unk"
# 一緒に聞いていたトマルが、驚きの声を上げる。
line = "一緒に聞いていたトマルが、驚きの声を上げる。"

[[dialogue]]
speaker = "ミヤハル"
# 「麒麟は、晴明はんでも退治できん程の化け物だったらしくてな。封印することしかできんかったそうや」
line = "「麒麟は、晴明はんでも退治できん程の化け物だったらしくてな。封印することしかできんかったそうや」"

[[dialogue]]
speaker = "ミヤハル"
# 「ほんで、封印を維持し続ける為に、追加で２つの<ruby=くさび>楔</ruby>を打つことにした」
line = "「ほんで、封印を維持し続ける為に、追加で２つの<ruby>楔<rt>くさび</rt></ruby>を打つことにした」"

[[dialogue]]
speaker = "マトイ"
# 「楔……？」
line = "「楔……？」"

[[dialogue]]
speaker = "ミヤハル"
# 「１つは封印の上に社を立てて、結界を張ること」
line = "「１つは封印の上に社を立てて、結界を張ること」"

[[dialogue]]
speaker = "ミヤハル"
# 「この神社に、星力持ってる者しか出入りできない結界が張られてるのはその為や。麒麟の封印がもし解けた時、中に閉じ込めておく保険としてな」
line = "「この神社に、星力持ってる者しか出入りできない結界が張られてるのはその為や。麒麟の封印がもし解けた時、中に閉じ込めておく保険としてな」"

[[dialogue]]
speaker = "ミヤハル"
# 「もう１つは、選星者自身」
line = "「もう１つは、選星者自身」"

[[dialogue]]
speaker = "ミヤハル"
# 「晴明はんは、選星者『陰陽師』という存在自体を封印の楔としたんよ」
line = "「晴明はんは、選星者『陰陽師』という存在自体を封印の楔としたんよ」"

[[dialogue]]
speaker = "トマル"
# 「それでは、ミヤハルさまが……？」
line = "「それでは、ミヤハルさまが……？」"

[[dialogue]]
speaker = "ミヤハル"
# 「そう。陰陽師と安倍野家は代々、その封印の役目も一緒に受け継いできた」
line = "「そう。陰陽師と安倍野家は代々、その封印の役目も一緒に受け継いできた」"

[[dialogue]]
speaker = "ミヤハル"
# 「だから、うちが万が一モンスターと戦って死んでしまうと、麒麟の封印に綻びが生じ、目覚めてしまう可能性があるっていうわけや」
line = "「だから、うちが万が一モンスターと戦って死んでしまうと、麒麟の封印に綻びが生じ、目覚めてしまう可能性があるっていうわけや」"

[[dialogue]]
speaker = "ミヤハル"
# 「で、そのことは学園側も知っていて、前線に出なくていいって言われとるんよ」
line = "「で、そのことは学園側も知っていて、前線に出なくていいって言われとるんよ」"

[[dialogue]]
speaker = "ミヤハル"
# 「まあ、うちの性格的にも、別に戦うことは好きやないし、ええんやけど」
line = "「まあ、うちの性格的にも、別に戦うことは好きやないし、ええんやけど」"

[[dialogue]]
speaker = "ミヤハル"
# 「もう分かってると思うけど、うちは人よりスケベぇなことが好きな、煩悩で生きとる女なんでな<emoji=heart04>」
line = "「もう分かってると思うけど、うちは人よりスケベぇなことが好きな、煩悩で生きとる女なんでな<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
# 「――残念なのです。ミヤハルさんが一緒にリクリエと戦ってくれたら、すごく心強いのですが……」
line = "「――残念なのです。ミヤハルさんが一緒にリクリエと戦ってくれたら、すごく心強いのですが……」"

[[dialogue]]
speaker = "unk"
# 話を聞いていたらしいルリエルが、起き上がりながら言う。
line = "話を聞いていたらしいルリエルが、起き上がりながら言う。"

[[dialogue]]
speaker = "ミヤハル"
# 「別に、ルリエルはんやマトイはんが巫女の力を使いこなせるようになったら、うち１人くらい居なくても変わらへんやろ？」
line = "「別に、ルリエルはんやマトイはんが巫女の力を使いこなせるようになったら、うち１人くらい居なくても変わらへんやろ？」"

[[dialogue]]
speaker = "ミヤハル"
# 「とりあえず、今日は久しぶりに戦って疲れてもうたし、修業の続きはまた明日にしまひょか<emoji=heart04>」
line = "「とりあえず、今日は久しぶりに戦って疲れてもうたし、修業の続きはまた明日にしまひょか<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 数日後。
line = "数日後。"

[[dialogue]]
speaker = "unk"
# マトイ、ルリエル、トマルは連日神社におもむき、巫女修行を続けていた――
line = "マトイ、ルリエル、トマルは連日神社におもむき、巫女修行を続けていた――"

[[dialogue]]
speaker = "ミヤハル"
# 「さて、それじゃあ今日は、ルリエルはんの煩悩を解放していきますえ<emoji=heart04>」
line = "「さて、それじゃあ今日は、ルリエルはんの煩悩を解放していきますえ<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
# 「はいなのです！」
line = "「はいなのです！」"

[[dialogue]]
speaker = "マトイ"
# 「と、とりあえず、心の準備はして来たけど……」
line = "「と、とりあえず、心の準備はして来たけど……」"

[[dialogue]]
speaker = "トマル"
# （ま、また会長さまが出て来たら、どうしましょう……）
line = "（ま、また会長さまが出て来たら、どうしましょう……）"

[[dialogue]]
speaker = "ミヤハル"
# 「ほんなら行きますえ<emoji=heart04>　<ruby=きゅうきゅうにょりつりょう>急急如律令</ruby>、<ruby=しんえいとうしゃ>心影投射</ruby>――」
line = "「ほんなら行きますえ<emoji=heart04>　<ruby>急急如律令<rt>きゅうきゅうにょりつりょう</rt></ruby>、<ruby>心影投射<rt>しんえいとうしゃ</rt></ruby>――」"

[[dialogue]]
speaker = "？？？"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ルリエル"
# 「わたしのドッペルゲンガーなのです！？」
line = "「わたしのドッペルゲンガーなのです！？」"

[[dialogue]]
speaker = "unk"
# 現れたのは、ルリエルの影であった。
line = "現れたのは、ルリエルの影であった。"

[[dialogue]]
speaker = "ドッペルリエル"
# 「こんにちはなのです、本物のわたし！」
line = "「こんにちはなのです、本物のわたし！」"

[[dialogue]]
speaker = "ルリエル"
# 「あっ、はいなのです！　偽物のわたし！」
line = "「あっ、はいなのです！　偽物のわたし！」"

[[dialogue]]
speaker = "ドッペルリエル"
# 「わたしのしたいことは――」
line = "「わたしのしたいことは――」"

[[dialogue]]
speaker = "ドッペルリエル"
# 「ズバリ、<b>遊ぶこと</b>なのです！」
line = "「ズバリ、<b>遊ぶこと</b>なのです！」"

[[dialogue]]
speaker = "ドッペルリエル"
# 「というわけで、ミヤハルさん！　街に遊びに行きましょう！」
line = "「というわけで、ミヤハルさん！　街に遊びに行きましょう！」"

[[dialogue]]
speaker = "ミヤハル"
# 「えっ、うち？」
line = "「えっ、うち？」"

[[dialogue]]
speaker = "ドッペルリエル"
# 「レディー・ゴー！　陰陽師なのです♪」
line = "「レディー・ゴー！　陰陽師なのです♪」"

[[dialogue]]
speaker = "ミヤハル"
# 「ちょっ、どういうことなん！？　わっ――」
line = "「ちょっ、どういうことなん！？　わっ――」"

[[dialogue]]
speaker = "unk"
# ルリエルの影がミヤハルの手を引っ張り、勢い良く神社を飛び出して行く。
line = "ルリエルの影がミヤハルの手を引っ張り、勢い良く神社を飛び出して行く。"

[[dialogue]]
speaker = "ルリエル"
# 「あっ、待って下さ～い！　ずるいのです！　本物のわたしも遊びたいのです～！」
line = "「あっ、待って下さ～い！　ずるいのです！　本物のわたしも遊びたいのです～！」"

[[dialogue]]
speaker = "unk"
# 本物のルリエルとマトイ達もその後を追いかけて、街へと繰り出すのだった――
line = "本物のルリエルとマトイ達もその後を追いかけて、街へと繰り出すのだった――"
