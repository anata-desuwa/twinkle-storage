[[dialogue]]
speaker = "unk"
# 第４話,ふわふわスキンシップ,P
line = "第４話,ふわふわスキンシップ,P"

[[dialogue]]
speaker = "unk"
# 最近、サランのスキンシップがどんどん激しくなっている。
line = "最近、サランのスキンシップがどんどん激しくなっている。"

[[dialogue]]
speaker = "サラン"
# 「ね～、会長ちゃん♪　サラン、もっとハグしたいな～<emoji=heart04>　ダメ～？」
line = "「ね～、会長ちゃん♪　サラン、もっとハグしたいな～<emoji=heart04>　ダメ～？」"

[[dialogue]]
speaker = "サラン"
# 「えへへ、やった～♪　ぎゅ～<emoji=heart04>　こうしてると、安心できてふわふわ～<emoji=heart04>」
line = "「えへへ、やった～♪　ぎゅ～<emoji=heart04>　こうしてると、安心できてふわふわ～<emoji=heart04>」"

[[dialogue]]
speaker = "サラン"
# 「ぽよ？　どうしたの、会長ちゃん？　大事な話ってなに～？」
line = "「ぽよ？　どうしたの、会長ちゃん？　大事な話ってなに～？」"

[[dialogue]]
speaker = "unk"
# 言いづらいことなんだけど……
line = "言いづらいことなんだけど……"

[[dialogue]]
speaker = "サラン"
# 「――今日は２人きりだからいいけど、最近、学園でもスキンシップが多い？　……確かに、言われてみると、ハグとキスは多かったかも～」
line = "「――今日は２人きりだからいいけど、最近、学園でもスキンシップが多い？　……確かに、言われてみると、ハグとキスは多かったかも～」"

[[dialogue]]
speaker = "サラン"
# 「ぽよ！？　スキンシップ制限！？　な、なんでなんで～っ！？」
line = "「ぽよ！？　スキンシップ制限！？　な、なんでなんで～っ！？」"

[[dialogue]]
speaker = "サラン"
# 「――恋人でも学園では自制しないと、周りから悪く思われちゃう……？　そっか……サラン、会長ちゃんがみんなから悪く言われちゃうのは嫌だなぁ……」
line = "「――恋人でも学園では自制しないと、周りから悪く思われちゃう……？　そっか……サラン、会長ちゃんがみんなから悪く言われちゃうのは嫌だなぁ……」"

[[dialogue]]
speaker = "サラン"
# 「うん……わかった！　サラン、なるべくスキンシップ、我慢するようにするにするねっ」
line = "「うん……わかった！　サラン、なるべくスキンシップ、我慢するようにするにするねっ」"

[[dialogue]]
speaker = "サラン"
# 「――ハグは２人きりになった時で～……ぽよ！？　き、キスは１日１回までなの～！？　う～……会長ちゃんとのキス、すっごくふわふわして、サラン好きなのに……」
line = "「――ハグは２人きりになった時で～……ぽよ！？　き、キスは１日１回までなの～！？　う～……会長ちゃんとのキス、すっごくふわふわして、サラン好きなのに……」"

[[dialogue]]
speaker = "unk"
# そうして、次の日からスキンシップ制限が始まったのだが――
line = "そうして、次の日からスキンシップ制限が始まったのだが――"

[[dialogue]]
speaker = "ヴィーナス"
# 「えっと……なんか大丈夫？　ここ１週間くらい、星徒会の仕事が忙しくて、サランと全然会えてないみたいだけど……」
line = "「えっと……なんか大丈夫？　ここ１週間くらい、星徒会の仕事が忙しくて、サランと全然会えてないみたいだけど……」"

[[dialogue]]
speaker = "unk"
# ふわふわ成分が、足りない……！
line = "ふわふわ成分が、足りない……！"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふわふわ成分って何！？　……とにかく、今日は一旦仕事を休みなさい！　そして、サランに会ってきなさい！　これはフィクサー命令よ！」
line = "「ふわふわ成分って何！？　……とにかく、今日は一旦仕事を休みなさい！　そして、サランに会ってきなさい！　これはフィクサー命令よ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「――自分からスキンシップ制限を言い出した手前、サランも我慢してるのに、合わせる顔がない……？　あのね、よく聞きなさい！」
line = "「――自分からスキンシップ制限を言い出した手前、サランも我慢してるのに、合わせる顔がない……？　あのね、よく聞きなさい！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「今のままじゃダメだって気付いたなら、２人でちゃんと話し合う！　恋人だからこそ、気持ちは素直に伝え合うべきでしょう！？」
line = "「今のままじゃダメだって気付いたなら、２人でちゃんと話し合う！　恋人だからこそ、気持ちは素直に伝え合うべきでしょう！？」"

[[dialogue]]
speaker = "unk"
# ヴィーナスに背中を押されてサランに会いにいくと、サランは調理室から出てくるところだった。
line = "ヴィーナスに背中を押されてサランに会いにいくと、サランは調理室から出てくるところだった。"

[[dialogue]]
speaker = "サラン"
# 「これでよしっと……あれ？　会長ちゃん！？　久しぶり～♪」
line = "「これでよしっと……あれ？　会長ちゃん！？　久しぶり～♪」"

[[dialogue]]
speaker = "サラン"
# 「やっと会えた～♪　最近、星徒会の仕事が忙しかったんだよね？　ずっと会えてなかったけど、大丈夫だった～？」
line = "「やっと会えた～♪　最近、星徒会の仕事が忙しかったんだよね？　ずっと会えてなかったけど、大丈夫だった～？」"

[[dialogue]]
speaker = "サラン"
# 「って、きゃっ！？　か、会長ちゃん、いきなりハグしたりして、どうしたの～？」
line = "「って、きゃっ！？　か、会長ちゃん、いきなりハグしたりして、どうしたの～？」"

[[dialogue]]
speaker = "サラン"
# 「い、一応今は、廊下に人は見えなくて２人きりだけど、学園だし～。これってセーフなのかな……？」
line = "「い、一応今は、廊下に人は見えなくて２人きりだけど、学園だし～。これってセーフなのかな……？」"

[[dialogue]]
speaker = "unk"
# サラン、ごめん。俺が悪かった
line = "サラン、ごめん。俺が悪かった"

[[dialogue]]
speaker = "サラン"
# 「ぽよ？　どうして会長ちゃんが謝るの？　――気づかないうちにサランに依存してた？　え～と、それってどういう……？」
line = "「ぽよ？　どうして会長ちゃんが謝るの？　――気づかないうちにサランに依存してた？　え～と、それってどういう……？」"

[[dialogue]]
speaker = "サラン"
# 「――付き合い始めてから、サランのこと、もっと好きになってたみたい？　そうなんだ～♪　なんか、すごく嬉しいかも～♪」
line = "「――付き合い始めてから、サランのこと、もっと好きになってたみたい？　そうなんだ～♪　なんか、すごく嬉しいかも～♪」"

[[dialogue]]
speaker = "サラン"
# 「サランもね～、会長ちゃんのこと、前よりも好きになってたから、この１週間は少し寂しかったよ？」
line = "「サランもね～、会長ちゃんのこと、前よりも好きになってたから、この１週間は少し寂しかったよ？」"

[[dialogue]]
speaker = "サラン"
# 「でもね、離れてたから気付いたこともあるの。サランね、自分よりも会長ちゃんに、ふわふわでいて欲しいんだ～」
line = "「でもね、離れてたから気付いたこともあるの。サランね、自分よりも会長ちゃんに、ふわふわでいて欲しいんだ～」"

[[dialogue]]
speaker = "サラン"
# 「だから忙しくて会えない時でも、ふわふわな気持ちでいられるように、会長ちゃんへの差し入れで、お菓子を作ってたの～」
line = "「だから忙しくて会えない時でも、ふわふわな気持ちでいられるように、会長ちゃんへの差し入れで、お菓子を作ってたの～」"

[[dialogue]]
speaker = "サラン"
# 「――うん♪　もちろん食べていいよ～。はいこれ、サランのふわふわをいっぱい込めた、スペシャルケーキだよ～♪」
line = "「――うん♪　もちろん食べていいよ～。はいこれ、サランのふわふわをいっぱい込めた、スペシャルケーキだよ～♪」"

[[dialogue]]
speaker = "サラン"
# 「フォークあるから、サランが食べさせてあげるね♪　はい、会長ちゃん、あ～ん♪　――どう？　美味しい？」
line = "「フォークあるから、サランが食べさせてあげるね♪　はい、会長ちゃん、あ～ん♪　――どう？　美味しい？」"

[[dialogue]]
speaker = "unk"
# すごく美味しくて、ふわふわだ
line = "すごく美味しくて、ふわふわだ"

[[dialogue]]
speaker = "サラン"
# 「えへへ～♪　元気出た？　なら、よかった～♪」
line = "「えへへ～♪　元気出た？　なら、よかった～♪」"

[[dialogue]]
speaker = "サラン"
# 「会長ちゃん。サランね、会長ちゃんのこともっとふわふわにできる、素敵な女の子になるから！」
line = "「会長ちゃん。サランね、会長ちゃんのこともっとふわふわにできる、素敵な女の子になるから！」"

[[dialogue]]
speaker = "unk"
# 俺もサランのこと、もっと大切にする
line = "俺もサランのこと、もっと大切にする"

[[dialogue]]
speaker = "サラン"
# 「じゃあ、両想いだね～♪　――会長ちゃん、キスしたいの？　うん、いいよ～<emoji=heart04>」
line = "「じゃあ、両想いだね～♪　――会長ちゃん、キスしたいの？　うん、いいよ～<emoji=heart04>」"

[[dialogue]]
speaker = "サラン"
# 「……んっ<emoji=heart04>　ちゅっ……<emoji=heart04>」
line = "「……んっ<emoji=heart04>　ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "サラン"
# 「……えへへ～<emoji=heart04>　久しぶりのキス、すっごくふわふわ～<emoji=heart04>」
line = "「……えへへ～<emoji=heart04>　久しぶりのキス、すっごくふわふわ～<emoji=heart04>」"

[[dialogue]]
speaker = "サラン"
# 「ねぇ、会長ちゃん……もっとしてもいい？」
line = "「ねぇ、会長ちゃん……もっとしてもいい？」"

[[dialogue]]
speaker = "unk"
# サランはその後、何度もキスを交わすのだった。
line = "サランはその後、何度もキスを交わすのだった。"

[[dialogue]]
speaker = "unk"
# それからしばらく経った、ある日の放課後。
line = "それからしばらく経った、ある日の放課後。"

[[dialogue]]
speaker = "サラン"
# 「あっ、会長ちゃん♪　今日も星徒会に行く前に、サランに会いにきてくれたの～？　忙しいのに、ありがと～♪」
line = "「あっ、会長ちゃん♪　今日も星徒会に行く前に、サランに会いにきてくれたの～？　忙しいのに、ありがと～♪」"

[[dialogue]]
speaker = "サラン"
# 「うん、サランはこの後、星騎士として訓練に行ってこようと思ってるの～。会長ちゃんと一緒に戦えるように、強くなりたいんだ～♪」
line = "「うん、サランはこの後、星騎士として訓練に行ってこようと思ってるの～。会長ちゃんと一緒に戦えるように、強くなりたいんだ～♪」"

[[dialogue]]
speaker = "サラン"
# 「じゃあ、今日もお互い頑張れるように、ふわふわ成分補給しておく～？」
line = "「じゃあ、今日もお互い頑張れるように、ふわふわ成分補給しておく～？」"

[[dialogue]]
speaker = "サラン"
# 「えへへ～♪　行ってらっしゃいのハグ～<emoji=heart04>　ぎゅ～っ<emoji=heart04>」
line = "「えへへ～♪　行ってらっしゃいのハグ～<emoji=heart04>　ぎゅ～っ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 行ってきます！
line = "行ってきます！"

[[dialogue]]
speaker = "サラン"
# 「うん！　行ってらっしゃい、会長ちゃん♪」
line = "「うん！　行ってらっしゃい、会長ちゃん♪」"

[[dialogue]]
speaker = "unk"
# 俺は愛しい彼女からもらった元気を胸に、今日も星徒会の仕事に向かうのだった。
line = "俺は愛しい彼女からもらった元気を胸に、今日も星徒会の仕事に向かうのだった。"
