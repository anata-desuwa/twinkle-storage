[[dialogue]]
speaker = "unk"
# 第３話,ファースト手繋ぎ,P
line = "第３話,ファースト手繋ぎ,P"

[[dialogue]]
speaker = "トワ先生"
# 「お待たせ～、会長くん。待たせちゃったかな？」
line = "「お待たせ～、会長くん。待たせちゃったかな？」"

[[dialogue]]
speaker = "unk"
# 今来たところだよ、トワちゃん
line = "今来たところだよ、トワちゃん"

[[dialogue]]
speaker = "トワ先生"
# 「えっへへぇ～。お決まりのやり取りだよね、こういうの！　でもでも、ちょっと憧れてたんだ～」
line = "「えっへへぇ～。お決まりのやり取りだよね、こういうの！　でもでも、ちょっと憧れてたんだ～」"

[[dialogue]]
speaker = "トワ先生"
# 「って、浮かれすぎちゃってバカみたいだよね……集合時間まで、まだ３０分もあるのに」
line = "「って、浮かれすぎちゃってバカみたいだよね……集合時間まで、まだ３０分もあるのに」"

[[dialogue]]
speaker = "unk"
# 予定より早く出てきちゃった
line = "予定より早く出てきちゃった"

[[dialogue]]
speaker = "unk"
# 俺もトワちゃんに会いたくて
line = "俺もトワちゃんに会いたくて"

[[dialogue]]
speaker = "トワ先生"
# 「本当だよぉ～。たまには年上らしいところを見せようと思って、会長くんを待つつもりで来たのに！」
line = "「本当だよぉ～。たまには年上らしいところを見せようと思って、会長くんを待つつもりで来たのに！」"

[[dialogue]]
speaker = "トワ先生"
# 「でもそれだけ……今日のデートを楽しみにしててくれてた、ってことだよね？」
line = "「でもそれだけ……今日のデートを楽しみにしててくれてた、ってことだよね？」"

[[dialogue]]
speaker = "トワ先生"
# 「あはっ♪　もちろん先生もだよ！　っとと、しまった。今日は１日、先生はお休みするんだった」
line = "「あはっ♪　もちろん先生もだよ！　っとと、しまった。今日は１日、先生はお休みするんだった」"

[[dialogue]]
speaker = "トワ先生"
# 「う、うん……初デート、誘ってくれて嬉しかったよ。なんかわたしからだと、がっついてるみたいで正直誘いづらかったし……」
line = "「う、うん……初デート、誘ってくれて嬉しかったよ。なんかわたしからだと、がっついてるみたいで正直誘いづらかったし……」"

[[dialogue]]
speaker = "トワ先生"
# 「学園の中で公私を弁えずにイチャイチャするのはダメだと思うけど、オフの日に先生からキミの恋人になるのは……ありだと思うから」
line = "「学園の中で公私を弁えずにイチャイチャするのはダメだと思うけど、オフの日に先生からキミの恋人になるのは……ありだと思うから」"

[[dialogue]]
speaker = "トワ先生"
# 「うんっ。今日は一日、キミの彼女として、思いっきりデートを楽しんじゃおうかなっ」
line = "「うんっ。今日は一日、キミの彼女として、思いっきりデートを楽しんじゃおうかなっ」"

[[dialogue]]
speaker = "トワ先生"
# （というわけで、デートの定番、映画鑑賞……！　しかもがっつりベタベタに恋愛映画だよ！）
line = "（というわけで、デートの定番、映画鑑賞……！　しかもがっつりベタベタに恋愛映画だよ！）"

[[dialogue]]
speaker = "トワ先生"
# （これなら初デートでも会話の間が持たない、なんて心配もないし、観終わった後は２人で感想を言い合うっていう話題も提供してくれる、まさに鉄板のチョイスだねっ）
line = "（これなら初デートでも会話の間が持たない、なんて心配もないし、観終わった後は２人で感想を言い合うっていう話題も提供してくれる、まさに鉄板のチョイスだねっ）"

[[dialogue]]
speaker = "トワ先生"
# （って、思ってたんだけどぉ……）
line = "（って、思ってたんだけどぉ……）"

[[dialogue]]
speaker = "トワ先生"
# （映画の内容が思っていた以上にベタ甘で……隣にいるのが彼氏だと思うと、なぜか勝手に恥ずかしくなってきちゃうかもぉ……！？）
line = "（映画の内容が思っていた以上にベタ甘で……隣にいるのが彼氏だと思うと、なぜか勝手に恥ずかしくなってきちゃうかもぉ……！？）"

[[dialogue]]
speaker = "トワ先生"
# （あっあっあっ、違うんですっ。年下の彼氏に強引に求められて、所かまわずキスでメロメロになっちゃうヒロインに憧れたりなんて……全くしてないと言ったら嘘になるけど！！）
line = "（あっあっあっ、違うんですっ。年下の彼氏に強引に求められて、所かまわずキスでメロメロになっちゃうヒロインに憧れたりなんて……全くしてないと言ったら嘘になるけど！！）"

[[dialogue]]
speaker = "トワ先生"
# （というか、事前に予習してきた雑誌によると、世のカップルは映画館の暗闇の中で、良い雰囲気のシーンになるとこっそり手を繋いだりするらしいんだけどぉ……）
line = "（というか、事前に予習してきた雑誌によると、世のカップルは映画館の暗闇の中で、良い雰囲気のシーンになるとこっそり手を繋いだりするらしいんだけどぉ……）"

[[dialogue]]
speaker = "トワ先生"
# （……チラッ）
line = "（……チラッ）"

[[dialogue]]
speaker = "トワ先生"
# （ムリムリムリ……！　いくら暗くて見えないって言っても、周囲にこんなに人がいる状況で、自分から年下の彼氏に甘えて擦り寄るなんて破廉恥なこと、できないよ！？）
line = "（ムリムリムリ……！　いくら暗くて見えないって言っても、周囲にこんなに人がいる状況で、自分から年下の彼氏に甘えて擦り寄るなんて破廉恥なこと、できないよ！？）"

[[dialogue]]
speaker = "トワ先生"
# （それにそれに！　会長くんは映画に集中してるかもしれないわけで、そこで空気を読まずにボディタッチなんてしてきたら『うわ……ウザ』ってなるカモしれないじゃん！？）
line = "（それにそれに！　会長くんは映画に集中してるかもしれないわけで、そこで空気を読まずにボディタッチなんてしてきたら『うわ……ウザ』ってなるカモしれないじゃん！？）"

[[dialogue]]
speaker = "トワ先生"
# （いや、会長くんは絶対そんな酷いこと言わないけどね……！？）
line = "（いや、会長くんは絶対そんな酷いこと言わないけどね……！？）"

[[dialogue]]
speaker = "unk"
# そんなことをモンモンと考えているうちに、映画はあっという間に終わってしまった。
line = "そんなことをモンモンと考えているうちに、映画はあっという間に終わってしまった。"

[[dialogue]]
speaker = "unk"
# 結構面白いですね！
line = "結構面白いですね！"

[[dialogue]]
speaker = "unk"
# 恋愛映画はあまり見てきませんでしたが
line = "恋愛映画はあまり見てきませんでしたが"

[[dialogue]]
speaker = "トワ先生"
# 「そっかそっか！　面白かったならよかったよぉ。結構甘口だったから、苦手な人だと胸焼けしちゃうかなって心配だったから」
line = "「そっかそっか！　面白かったならよかったよぉ。結構甘口だったから、苦手な人だと胸焼けしちゃうかなって心配だったから」"

[[dialogue]]
speaker = "unk"
# 甘口と言えば、さっきの映画のシーンで……
line = "甘口と言えば、さっきの映画のシーンで……"

[[dialogue]]
speaker = "トワ先生"
# （……ほっ。見てる最中はドキドキしすぎてどうなることかと思ったけど、会長くんも楽しんでくれたみたいだし、定番の感想語り合いもできてるし、結構いい感じかも！）
line = "（……ほっ。見てる最中はドキドキしすぎてどうなることかと思ったけど、会長くんも楽しんでくれたみたいだし、定番の感想語り合いもできてるし、結構いい感じかも！）"

[[dialogue]]
speaker = "unk"
# それから、わたしと会長くんはデパートへショッピングに出かけた。
line = "それから、わたしと会長くんはデパートへショッピングに出かけた。"

[[dialogue]]
speaker = "unk"
# 男物と女物の服屋さんをそれぞれ覗いたり、文房具コーナーでおすすめのアイテムを贈り合いっこしたり……
line = "男物と女物の服屋さんをそれぞれ覗いたり、文房具コーナーでおすすめのアイテムを贈り合いっこしたり……"

[[dialogue]]
speaker = "unk"
# ただ買い物をしてるだけなのに、それがびっくりするくらい楽しくて、ふと気が付いたらもう夜になってしまっているほどだった。
line = "ただ買い物をしてるだけなのに、それがびっくりするくらい楽しくて、ふと気が付いたらもう夜になってしまっているほどだった。"

[[dialogue]]
speaker = "トワ先生"
# 「ふぅ～、今日は楽しかったぁ。買い物してるだけでも、会長くんの知らなかった好みをたくさん聞けちゃった気がする！」
line = "「ふぅ～、今日は楽しかったぁ。買い物してるだけでも、会長くんの知らなかった好みをたくさん聞けちゃった気がする！」"

[[dialogue]]
speaker = "unk"
# 俺もトワちゃんのこと沢山知れてよかった
line = "俺もトワちゃんのこと沢山知れてよかった"

[[dialogue]]
speaker = "トワ先生"
# 「えへへぇ～。なんか照れくさいね、こういうの……」
line = "「えへへぇ～。なんか照れくさいね、こういうの……」"

[[dialogue]]
speaker = "トワ先生"
# 「でも、さすがに今日はもうおしまいかなぁ～。夜の繁華街に、生徒を連れまわすわけにはいかないもん」
line = "「でも、さすがに今日はもうおしまいかなぁ～。夜の繁華街に、生徒を連れまわすわけにはいかないもん」"

[[dialogue]]
speaker = "unk"
# 今日はオフだから先生じゃないのでは？
line = "今日はオフだから先生じゃないのでは？"

[[dialogue]]
speaker = "トワ先生"
# 「ダーメ。会長くんとお付き合いするって決めたけど、わたしはキミの先生って立場を捨てたわけじゃありませんからねっ」
line = "「ダーメ。会長くんとお付き合いするって決めたけど、わたしはキミの先生って立場を捨てたわけじゃありませんからねっ」"

[[dialogue]]
speaker = "トワ先生"
# 「というわけで、一緒に居足りない分はまた今度のデートにとっておこ！」
line = "「というわけで、一緒に居足りない分はまた今度のデートにとっておこ！」"

[[dialogue]]
speaker = "unk"
# でもトワちゃんを家まで送るのはあり？
line = "でもトワちゃんを家まで送るのはあり？"

[[dialogue]]
speaker = "unk"
# わかりました、先生……
line = "わかりました、先生……"

[[dialogue]]
speaker = "トワ先生"
# 「はぅぅ……。またそうやってかっこいいこと言って、先生を惑わせる……」
line = "「はぅぅ……。またそうやってかっこいいこと言って、先生を惑わせる……」"

[[dialogue]]
speaker = "トワ先生"
# 「そんなの……もちろん、いいに決まってるじゃん……」
line = "「そんなの……もちろん、いいに決まってるじゃん……」"

[[dialogue]]
speaker = "トワ先生"
# 「って、ひゃうぅぅっ！？　も、ものすごく自然に手まで繋いできたぁ！？」
line = "「って、ひゃうぅぅっ！？　も、ものすごく自然に手まで繋いできたぁ！？」"

[[dialogue]]
speaker = "トワ先生"
# 「えっ！？　そ、そんなの……だって……嫌なわけ、ないよぉ……<emoji=heart04>」
line = "「えっ！？　そ、そんなの……だって……嫌なわけ、ないよぉ……<emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
# 「う、うん……嬉しいっ。もう暗くなってるし、こっそり手を繋いで歩くくらいは、あり、かな……」
line = "「う、うん……嬉しいっ。もう暗くなってるし、こっそり手を繋いで歩くくらいは、あり、かな……」"

[[dialogue]]
speaker = "トワ先生"
# 「えへへ。大好きだよ、会長くん」
line = "「えへへ。大好きだよ、会長くん」"
