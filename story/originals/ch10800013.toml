[[dialogue]]
speaker = "unk"
# 第３話,女子力全開、メイクアップ！,P
line = "第３話,女子力全開、メイクアップ！,P"

[[dialogue]]
speaker = "フラン"
# 「じーーーっ……」
line = "「じーーーっ……」"

[[dialogue]]
speaker = "グロリア"
# 「ど、どうしたんですか、フランさん。私の顔に何かついてます……？」
line = "「ど、どうしたんですか、フランさん。私の顔に何かついてます……？」"

[[dialogue]]
speaker = "フラン"
# 「いや、何もついてねえ。綺麗なもんだ。だけど何もついてねえのが気になるんだよ」
line = "「いや、何もついてねえ。綺麗なもんだ。だけど何もついてねえのが気になるんだよ」"

[[dialogue]]
speaker = "グロリア"
# 「何もついていないなら良いことなのではないですか？」
line = "「何もついていないなら良いことなのではないですか？」"

[[dialogue]]
speaker = "フラン"
# 「世の中には、ついてて当たり前のものもあるんだよ。グロリアは化粧っ気なさすぎだ」
line = "「世の中には、ついてて当たり前のものもあるんだよ。グロリアは化粧っ気なさすぎだ」"

[[dialogue]]
speaker = "グロリア"
# 「お化粧……ですか？　したことがありませんね」
line = "「お化粧……ですか？　したことがありませんね」"

[[dialogue]]
speaker = "フラン"
# 「マジかよ！　スキンケアもか？」
line = "「マジかよ！　スキンケアもか？」"

[[dialogue]]
speaker = "グロリア"
# 「毎朝、石鹸で顔を洗うくらいです。必要なことなのでしょうか？」
line = "「毎朝、石鹸で顔を洗うくらいです。必要なことなのでしょうか？」"

[[dialogue]]
speaker = "フラン"
# 「あー……そっか……」
line = "「あー……そっか……」"

[[dialogue]]
speaker = "unk"
# （グロリアのお母さんは、小さい頃に……）
line = "（グロリアのお母さんは、小さい頃に……）"

[[dialogue]]
speaker = "フラン"
# 「よし、ならオレが化粧の仕方を教えてやる！」
line = "「よし、ならオレが化粧の仕方を教えてやる！」"

[[dialogue]]
speaker = "グロリア"
# 「フランさん？」
line = "「フランさん？」"

[[dialogue]]
speaker = "フラン"
# 「グロリアだって年頃の女なんだからな。化粧のひとつも覚えておいて損はねえ。いや、覚えておかなきゃダメだ」
line = "「グロリアだって年頃の女なんだからな。化粧のひとつも覚えておいて損はねえ。いや、覚えておかなきゃダメだ」"

[[dialogue]]
speaker = "unk"
# フラン、化粧できるのか？
line = "フラン、化粧できるのか？"

[[dialogue]]
speaker = "フラン"
# 「おいおい、オレを見くびってるみてえだな？　とくと見ろよ、オレのメイクアップテクをな！」
line = "「おいおい、オレを見くびってるみてえだな？　とくと見ろよ、オレのメイクアップテクをな！」"

[[dialogue]]
speaker = "グロリア"
# 「あの……お化粧は大人がするものでは……？」
line = "「あの……お化粧は大人がするものでは……？」"

[[dialogue]]
speaker = "フラン"
# 「デカい体しといて何言ってんだ。グロリアは十分に大人だろ」
line = "「デカい体しといて何言ってんだ。グロリアは十分に大人だろ」"

[[dialogue]]
speaker = "フラン"
# 「んー……コンシーラーとリキッドファンデ……あとはアイブロウくらいでいいか。トドメにリップを塗れば印象がグッと変わるはずだ」
line = "「んー……コンシーラーとリキッドファンデ……あとはアイブロウくらいでいいか。トドメにリップを塗れば印象がグッと変わるはずだ」"

[[dialogue]]
speaker = "フラン"
# 「グロリアは元が抜群にいいからな。派手になり過ぎないようナチュラルメイクで仕上げるぜ」
line = "「グロリアは元が抜群にいいからな。派手になり過ぎないようナチュラルメイクで仕上げるぜ」"

[[dialogue]]
speaker = "グロリア"
# 「フランさん、手際がいいですね」
line = "「フランさん、手際がいいですね」"

[[dialogue]]
speaker = "フラン"
# 「そりゃほぼ毎日やってっからな。自然に上手くもなるってもんだ。んじゃ、行くぜ」
line = "「そりゃほぼ毎日やってっからな。自然に上手くもなるってもんだ。んじゃ、行くぜ」"

[[dialogue]]
speaker = "フラン"
# 「うお……グロリアの肌、化粧ノリがすっげえいいな……羨ましいくらいだぜ」
line = "「うお……グロリアの肌、化粧ノリがすっげえいいな……羨ましいくらいだぜ」"

[[dialogue]]
speaker = "グロリア"
# 「んっ……！　ちょっとくすぐったいです……」
line = "「んっ……！　ちょっとくすぐったいです……」"

[[dialogue]]
speaker = "フラン"
# 「それは我慢しろ。もうちっと元気良さそうな色味にするかな。ほっぺに少しピンクを足して……」
line = "「それは我慢しろ。もうちっと元気良さそうな色味にするかな。ほっぺに少しピンクを足して……」"

[[dialogue]]
speaker = "グロリア"
# 「んふっ、ふふ、んふふふっ……！」
line = "「んふっ、ふふ、んふふふっ……！」"

[[dialogue]]
speaker = "フラン"
# 「だからじっとしてろって！　ジタバタすんな、このくすぐったがり！」
line = "「だからじっとしてろって！　ジタバタすんな、このくすぐったがり！」"

[[dialogue]]
speaker = "フラン"
# 「おっ、いい感じじゃねえ？　どうよ、会長」
line = "「おっ、いい感じじゃねえ？　どうよ、会長」"

[[dialogue]]
speaker = "unk"
# 上手いもんだな
line = "上手いもんだな"

[[dialogue]]
speaker = "フラン"
# 「サンキュー。……って、オレの化粧の腕じゃなくて、グロリアを褒めてやれよ」
line = "「サンキュー。……って、オレの化粧の腕じゃなくて、グロリアを褒めてやれよ」"

[[dialogue]]
speaker = "グロリア"
# 「フランさんはお化粧もお上手だなんて、正直に言って意外でした」
line = "「フランさんはお化粧もお上手だなんて、正直に言って意外でした」"

[[dialogue]]
speaker = "フラン"
# 「はは、応援団仲間にもよく言われるんだよな。オレってガサツに見えるだろ」
line = "「はは、応援団仲間にもよく言われるんだよな。オレってガサツに見えるだろ」"

[[dialogue]]
speaker = "フラン"
# 「こう見えて……いや、違ぇな、こう見えるからこそ、身だしなみには気をつけてるんだよ」
line = "「こう見えて……いや、違ぇな、こう見えるからこそ、身だしなみには気をつけてるんだよ」"

[[dialogue]]
speaker = "フラン"
# 「見た目がだらしねえやつよりは、ちゃんとしてるやつに応援される方が気分良いだろ？」
line = "「見た目がだらしねえやつよりは、ちゃんとしてるやつに応援される方が気分良いだろ？」"

[[dialogue]]
speaker = "グロリア"
# 「そうでしょうか？　真心や熱意があれば伝わると思いますが……」
line = "「そうでしょうか？　真心や熱意があれば伝わると思いますが……」"

[[dialogue]]
speaker = "フラン"
# 「熱意が必要ならなおさらだ。みすぼらしい格好じゃ本気に見えねえだろ」
line = "「熱意が必要ならなおさらだ。みすぼらしい格好じゃ本気に見えねえだろ」"

[[dialogue]]
speaker = "unk"
# 俺もフランみたいに綺麗な子に応援されたいな
line = "俺もフランみたいに綺麗な子に応援されたいな"

[[dialogue]]
speaker = "フラン"
# 「はあ！？　いきなり何言い出すんだよ！　手元が狂っちまうだろうが！」
line = "「はあ！？　いきなり何言い出すんだよ！　手元が狂っちまうだろうが！」"

[[dialogue]]
speaker = "グロリア"
# 「あの、フランさん？　口紅がほっぺの方をなぞった気がするんですけど……」
line = "「あの、フランさん？　口紅がほっぺの方をなぞった気がするんですけど……」"

[[dialogue]]
speaker = "フラン"
# 「わ、悪ぃ、悪ぃ。すぐに直すよ」
line = "「わ、悪ぃ、悪ぃ。すぐに直すよ」"

[[dialogue]]
speaker = "フラン"
# 「ったく……会長よぉ、不意打ちとかズリぃぞ……」
line = "「ったく……会長よぉ、不意打ちとかズリぃぞ……」"

[[dialogue]]
speaker = "フラン"
# 「格好いいとかは言われ慣れてるけどよ……き、綺麗とか……そんなのオレに使う言葉じゃねえだろ」
line = "「格好いいとかは言われ慣れてるけどよ……き、綺麗とか……そんなのオレに使う言葉じゃねえだろ」"

[[dialogue]]
speaker = "フラン"
# 「ハッ！？　これが会長の人たらしスキルか……！」
line = "「ハッ！？　これが会長の人たらしスキルか……！」"

[[dialogue]]
speaker = "フラン"
# 「オレはチョロい女じゃねえからな。簡単に騙されたりしねえぞ、騙されねえからな……」
line = "「オレはチョロい女じゃねえからな。簡単に騙されたりしねえぞ、騙されねえからな……」"

[[dialogue]]
speaker = "グロリア"
# 「あ、あの、フランさん？　そこはほっぺではないのですけど……」
line = "「あ、あの、フランさん？　そこはほっぺではないのですけど……」"

[[dialogue]]
speaker = "フラン"
# 「ハッ！？　クソ、会長のせいだ！　ちょっと待ってろ……」
line = "「ハッ！？　クソ、会長のせいだ！　ちょっと待ってろ……」"

[[dialogue]]
speaker = "フラン"
# 「よし、いろいろあったけど完成だ！　どうだ、グロリア。綺麗になったろ！」
line = "「よし、いろいろあったけど完成だ！　どうだ、グロリア。綺麗になったろ！」"

[[dialogue]]
speaker = "グロリア"
# 「わぁ……ありがとうございます……！」
line = "「わぁ……ありがとうございます……！」"

[[dialogue]]
speaker = "フラン"
# 「もののついでだしよ、会長も化粧するか？　最近は男のメイクも流行ってんだぜ」
line = "「もののついでだしよ、会長も化粧するか？　最近は男のメイクも流行ってんだぜ」"

[[dialogue]]
speaker = "フラン"
# 「その……もっとイケメンにしてやるよ」
line = "「その……もっとイケメンにしてやるよ」"

[[dialogue]]
speaker = "フラン"
# 「別にいい？　そ、そっか。それ以上格好よくなっちまったら、学園の女連中が放っておかねえもんな。んじゃ必要になったら、声かけてくれよな」
line = "「別にいい？　そ、そっか。それ以上格好よくなっちまったら、学園の女連中が放っておかねえもんな。んじゃ必要になったら、声かけてくれよな」"

[[dialogue]]
speaker = "フラン"
# 「よーし！　グロリアが綺麗になったところで、カツ丼でも食いに行こうぜ！」
line = "「よーし！　グロリアが綺麗になったところで、カツ丼でも食いに行こうぜ！」"

[[dialogue]]
speaker = "unk"
# メイク後にカツ丼！？
line = "メイク後にカツ丼！？"

[[dialogue]]
speaker = "フラン"
# 「ん？　飯食いに行くっつったら、カツ丼に決まってるだろ。勝負前のゲン担ぎだよ」
line = "「ん？　飯食いに行くっつったら、カツ丼に決まってるだろ。勝負前のゲン担ぎだよ」"

[[dialogue]]
speaker = "グロリア"
# 「ふふ、やっぱり、フランさんはフランさんですね」
line = "「ふふ、やっぱり、フランさんはフランさんですね」"

[[dialogue]]
speaker = "フラン"
# 「そりゃオレはオレだろ。何言ってんだ」
line = "「そりゃオレはオレだろ。何言ってんだ」"

[[dialogue]]
speaker = "unk"
# 美味しい店、教えてくれ
line = "美味しい店、教えてくれ"

[[dialogue]]
speaker = "フラン"
# 「ああ、もちろんだ！　ほっぺた落ちても知らねえぞ」
line = "「ああ、もちろんだ！　ほっぺた落ちても知らねえぞ」"

[[dialogue]]
speaker = "グロリア"
# 「まあ、それは怖いです」
line = "「まあ、それは怖いです」"

[[dialogue]]
speaker = "フラン"
# 「ま、心配すんな。ほっぺの化粧が落ちたら、また直してやるからさ！」
line = "「ま、心配すんな。ほっぺの化粧が落ちたら、また直してやるからさ！」"
