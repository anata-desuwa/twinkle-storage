[[dialogue]]
speaker = "unk"
# 第３話,勝利する未来,B
line = "第３話,勝利する未来,B"

[[dialogue]]
speaker = "ジグ"
# 「極星学園星徒会長、ルヴィネの最期を視た。ハッキリとね」
line = "「極星学園星徒会長、ルヴィネの最期を視た。ハッキリとね」"

[[dialogue]]
speaker = "梨緒"
# 「なんだって……！？」
line = "「なんだって……！？」"

[[dialogue]]
speaker = "ジグ"
# 「誰がトドメを刺したのかはわからない。私の星眼は、未来のとある瞬間を断片的に切り取ることしかできない」
line = "「誰がトドメを刺したのかはわからない。私の星眼は、未来のとある瞬間を断片的に切り取ることしかできない」"

[[dialogue]]
speaker = "ジグ"
# 「その前後に何が起こったのかは不明瞭だけれど……致命の重傷を負って、声を発することもできず倒れ伏すルヴィネを視た」
line = "「その前後に何が起こったのかは不明瞭だけれど……致命の重傷を負って、声を発することもできず倒れ伏すルヴィネを視た」"

[[dialogue]]
speaker = "ジグ"
# 「血の海で横たわるルヴィネにすがって声をかける、極星学園の４人の姿もね」
line = "「血の海で横たわるルヴィネにすがって声をかける、極星学園の４人の姿もね」"

[[dialogue]]
speaker = "梨緒"
# 「血の海って……ルヴィネは女神の幼体なんだろう？　そもそも出血で死ぬような生物なのか？」
line = "「血の海って……ルヴィネは女神の幼体なんだろう？　そもそも出血で死ぬような生物なのか？」"

[[dialogue]]
speaker = "ジグ"
# 「『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』がどんな考えで設計し、創造した生命体かはわからない。でも彼女は、食事や睡眠をとる必要があるのはわかっている」
line = "「『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』がどんな考えで設計し、創造した生命体かはわからない。でも彼女は、食事や睡眠をとる必要があるのはわかっている」"

[[dialogue]]
speaker = "ジグ"
# 「使徒だった頃に何度かデネブで顔を合わせたことがあるんだ。強大な霊力を操ってこそいるが、体の造りが特殊なわけじゃない」
line = "「使徒だった頃に何度かデネブで顔を合わせたことがあるんだ。強大な霊力を操ってこそいるが、体の造りが特殊なわけじゃない」"

[[dialogue]]
speaker = "ジグ"
# 「ルヴィネは負傷させ、殺害することが可能な敵であり……それを成し遂げる未来は確かに存在する」
line = "「ルヴィネは負傷させ、殺害することが可能な敵であり……それを成し遂げる未来は確かに存在する」"

[[dialogue]]
speaker = "クロト"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ジグ"
# 「やはり浮かない顔だね。アルタイルにとっては朗報だと思うんだけど」
line = "「やはり浮かない顔だね。アルタイルにとっては朗報だと思うんだけど」"

[[dialogue]]
speaker = "アポロ"
# 「朗報って、オマエな……」
line = "「朗報って、オマエな……」"

[[dialogue]]
speaker = "ナターシャ"
# 「まあ……喜ばしい未来ではある、のかな。ルヴィネは死ぬ。イコール、リクリエは防げるってことでしょ？」
line = "「まあ……喜ばしい未来ではある、のかな。ルヴィネは死ぬ。イコール、リクリエは防げるってことでしょ？」"

[[dialogue]]
speaker = "ジグ"
# 「そうだね。女神テルルの後釜に据えるはずだった少女を打倒する。リクリエの<ruby=ほんぱ>本波</ruby>はこの世界を覆わない……アルタイル世界の勝ちだ」
line = "「そうだね。女神テルルの後釜に据えるはずだった少女を打倒する。リクリエの<ruby>本波<rt>ほんぱ</rt></ruby>はこの世界を覆わない……アルタイル世界の勝ちだ」"

[[dialogue]]
speaker = "アポロ"
# 「あ、あたしはイヤだぞ！　そんなの、ベアトが悲しむに決まってる……！」
line = "「あ、あたしはイヤだぞ！　そんなの、ベアトが悲しむに決まってる……！」"

[[dialogue]]
speaker = "ナターシャ"
# 「でも、ルヴィネが死なない場合は……」
line = "「でも、ルヴィネが死なない場合は……」"

[[dialogue]]
speaker = "ジグ"
# 「世界の刷新が起きて、アルタイルはベガと同じ結末をたどる。三界は破滅し、森羅歴はリセットされる」
line = "「世界の刷新が起きて、アルタイルはベガと同じ結末をたどる。三界は破滅し、森羅歴はリセットされる」"

[[dialogue]]
speaker = "ジグ"
# 「非情と<ruby=そし>謗</ruby>られるかもしれないが……私はこのことを前向きに捉えているよ」
line = "「非情と<ruby>謗<rt>そし</rt></ruby>られるかもしれないが……私はこのことを前向きに捉えているよ」"

[[dialogue]]
speaker = "ジグ"
# 「いつも私は、１つの未来しか視ることが出来なかった……」
line = "「いつも私は、１つの未来しか視ることが出来なかった……」"

[[dialogue]]
speaker = "ジグ"
# 「何か新しい技を覚えた時。大交流で星騎士の戦力拡充が出来た時。強力なモンスターを打倒した時……」
line = "「何か新しい技を覚えた時。大交流で星騎士の戦力拡充が出来た時。強力なモンスターを打倒した時……」"

[[dialogue]]
speaker = "ジグ"
# 「折に触れて星眼を使った。使って、使って、使い倒した。どれだけ覗き見ても、視える未来は１つしかありえなかった」
line = "「折に触れて星眼を使った。使って、使って、使い倒した。どれだけ覗き見ても、視える未来は１つしかありえなかった」"

[[dialogue]]
speaker = "ジグ"
# 「けれど今は違う──確かにあるんだ、破滅する以外の未来がね」
line = "「けれど今は違う──確かにあるんだ、破滅する以外の未来がね」"

[[dialogue]]
speaker = "クロト"
# 「ジグが使徒から解放された……その影響で、未来が変わった？」
line = "「ジグが使徒から解放された……その影響で、未来が変わった？」"

[[dialogue]]
speaker = "ジグ"
# 「おそらくは。私は使徒でなくなり、アガサはノルンの力に目覚めた。極星学園の女の子たちも、ルヴィネに疑心を抱き始めている」
line = "「おそらくは。私は使徒でなくなり、アガサはノルンの力に目覚めた。極星学園の女の子たちも、ルヴィネに疑心を抱き始めている」"

[[dialogue]]
speaker = "ジグ"
# 「今のアルタイルには希望がある。ラクシスの生まれ変わりである君、魔王クロト。そして女神テルルの<ruby=みこ>御子</ruby>である、九浄ヴィーナス」
line = "「今のアルタイルには希望がある。ラクシスの生まれ変わりである君、魔王クロト。そして女神テルルの<ruby>御子<rt>みこ</rt></ruby>である、九浄ヴィーナス」"

[[dialogue]]
speaker = "ジグ"
# 「それに星見家の双子。頽廃都市の長、煌嶺……魔王ラクシスの血統も集結している」
line = "「それに星見家の双子。頽廃都市の長、煌嶺……魔王ラクシスの血統も集結している」"

[[dialogue]]
speaker = "ジグ"
# 「ああ、そうだ──姫咲メルエル。彼女もいたね？」
line = "「ああ、そうだ──姫咲メルエル。彼女もいたね？」"

[[dialogue]]
speaker = "ナターシャ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ジグ"
# 「間違いなく今のアルタイルは、新旧の森羅歴を合わせても、最大最高の戦力となっている──その影響だろう」
line = "「間違いなく今のアルタイルは、新旧の森羅歴を合わせても、最大最高の戦力となっている──その影響だろう」"

[[dialogue]]
speaker = "ジグ"
# 「不安定でこそあれ……勝利する未来への道は確かにある。それを魔王に伝えたかった」
line = "「不安定でこそあれ……勝利する未来への道は確かにある。それを魔王に伝えたかった」"

[[dialogue]]
speaker = "梨緒"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ジグ"
# 「アガサも魔王と同じく苦い顔をしているね」
line = "「アガサも魔王と同じく苦い顔をしているね」"

[[dialogue]]
speaker = "梨緒"
# 「あまり軽い態度をとるな、ジグ」
line = "「あまり軽い態度をとるな、ジグ」"

[[dialogue]]
speaker = "梨緒"
# 「……だが、ベアトへの気遣いは感謝する。彼女をこの場に呼ぶなと言った意味はよくわかった」
line = "「……だが、ベアトへの気遣いは感謝する。彼女をこの場に呼ぶなと言った意味はよくわかった」"

[[dialogue]]
speaker = "ジグ"
# 「あんな可愛い女の子を悲しませる趣味はないからね」
line = "「あんな可愛い女の子を悲しませる趣味はないからね」"

[[dialogue]]
speaker = "ジグ"
# 「──私の話は終わりだよ。さて、会議室に行こうか。極星学園生と話をして、少しでもルヴィネの情報を集めておかないと」
line = "「──私の話は終わりだよ。さて、会議室に行こうか。極星学園生と話をして、少しでもルヴィネの情報を集めておかないと」"

[[dialogue]]
speaker = "クロト"
# 「……待ってくれ。梨緒、少しいいか？」
line = "「……待ってくれ。梨緒、少しいいか？」"

[[dialogue]]
speaker = "梨緒"
# 「なんだ？」
line = "「なんだ？」"

[[dialogue]]
speaker = "クロト"
# 「守護天使ノルンの力も、ジグと同じように未来を観測できると聞いた……ジグと同じ未来が、梨緒にも視えるんだろうか？」
line = "「守護天使ノルンの力も、ジグと同じように未来を観測できると聞いた……ジグと同じ未来が、梨緒にも視えるんだろうか？」"

[[dialogue]]
speaker = "梨緒"
# 「……すまないが、私の力はジグと違う。ノルンの力は、あくまで因果の繋がりを視ることができるだけだ」
line = "「……すまないが、私の力はジグと違う。ノルンの力は、あくまで因果の繋がりを視ることができるだけだ」"

[[dialogue]]
speaker = "梨緒"
# 「何日も、何週間も先の未来を視通すのは、守護天使の力でも不可能だ」
line = "「何日も、何週間も先の未来を視通すのは、守護天使の力でも不可能だ」"

[[dialogue]]
speaker = "クロト"
# 「……そうか。ありがとう」
line = "「……そうか。ありがとう」"

[[dialogue]]
speaker = "クロト"
# 「いま聞いたことは、ひとまずこの場にいる者たちの胸にしまっておいてくれ。他の皆には、タイミングを見て俺から伝える」
line = "「いま聞いたことは、ひとまずこの場にいる者たちの胸にしまっておいてくれ。他の皆には、タイミングを見て俺から伝える」"

[[dialogue]]
speaker = "ナターシャ"
# 「了解。だいぶ待たせてるし、ちょっと急ごうか」
line = "「了解。だいぶ待たせてるし、ちょっと急ごうか」"

[[dialogue]]
speaker = "アポロ"
# 「…………ベアト」
line = "「…………ベアト」"

[[dialogue]]
speaker = "unk"
# アルタイルはデネブと共存の道を模索する──俺はずっとそのスタンスを掲げてきた。
line = "アルタイルはデネブと共存の道を模索する──俺はずっとそのスタンスを掲げてきた。"

[[dialogue]]
speaker = "unk"
# それを変えるつもりはない。けれど……まさかこんな事実を聞くことになるだなんて。
line = "それを変えるつもりはない。けれど……まさかこんな事実を聞くことになるだなんて。"

[[dialogue]]
speaker = "unk"
# この世界を守るためには、本当にルヴィネを討たなければならないのだろうか……？
line = "この世界を守るためには、本当にルヴィネを討たなければならないのだろうか……？"
