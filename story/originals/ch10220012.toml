[[dialogue]]
speaker = "unk"
# 第２話,図書委員の仕事,P
line = "第２話,図書委員の仕事,P"

[[dialogue]]
speaker = "サーシャ"
# 「おつかれさま。今日のモンスターは大して強くなかったわね～」
line = "「おつかれさま。今日のモンスターは大して強くなかったわね～」"

[[dialogue]]
speaker = "モネ"
# 「失礼します」
line = "「失礼します」"

[[dialogue]]
speaker = "サーシャ"
# 「いらっしゃ～い。来ると思ってたわ～」
line = "「いらっしゃ～い。来ると思ってたわ～」"

[[dialogue]]
speaker = "サーシャ"
# 「ふふ、どうしてって顔してるわね～。星徒会もそうだけど、新星や流星の委員会は普通の学園にはない仕事があるの～」
line = "「ふふ、どうしてって顔してるわね～。星徒会もそうだけど、新星や流星の委員会は普通の学園にはない仕事があるの～」"

[[dialogue]]
speaker = "モネ"
# 「図書委員は星騎士がモンスターやアステラに対応した際、どんな状況だったか、どんな対応を取ったか、レポートにまとめているんです」
line = "「図書委員は星騎士がモンスターやアステラに対応した際、どんな状況だったか、どんな対応を取ったか、レポートにまとめているんです」"

[[dialogue]]
speaker = "モネ"
# 「会長が以前閲覧していた記録も、今までの図書委員が記録して製本したものなんです」
line = "「会長が以前閲覧していた記録も、今までの図書委員が記録して製本したものなんです」"

[[dialogue]]
speaker = "サーシャ"
# 「モンスターやアステラからリクリエのことがわかるかもしれないから。倒して終わりじゃもったいないもの」
line = "「モンスターやアステラからリクリエのことがわかるかもしれないから。倒して終わりじゃもったいないもの」"

[[dialogue]]
speaker = "サーシャ"
# 「モネちゃんはきちんとレポートにまとめてくれるから、星徒会としては助かってるわ～」
line = "「モネちゃんはきちんとレポートにまとめてくれるから、星徒会としては助かってるわ～」"

[[dialogue]]
speaker = "モネ"
# 「いえ、そんな……恐縮です。では今日の戦闘に関して聞かせていただきますね」
line = "「いえ、そんな……恐縮です。では今日の戦闘に関して聞かせていただきますね」"

[[dialogue]]
speaker = "モネ"
# 「……ふむふむ、はい、なるほど。大型のモンスターが３体……獣型をした小型モンスターが十数体、正確な数は不明、と」
line = "「……ふむふむ、はい、なるほど。大型のモンスターが３体……獣型をした小型モンスターが十数体、正確な数は不明、と」"

[[dialogue]]
speaker = "モネ"
# 「民間人の被害を出すことなく、滞りなく撃破。さすが星徒会役員のみなさんです」
line = "「民間人の被害を出すことなく、滞りなく撃破。さすが星徒会役員のみなさんです」"

[[dialogue]]
speaker = "モネ"
# 「会長はこの前新星学園に入ったばかりなのに、こんなに活躍していて……うぅ、自分が恥ずかしいです……」
line = "「会長はこの前新星学園に入ったばかりなのに、こんなに活躍していて……うぅ、自分が恥ずかしいです……」"

[[dialogue]]
speaker = "モネ"
# 「私なんてこうして話を聞いているだけでプルプル震えそうですよぉ……」
line = "「私なんてこうして話を聞いているだけでプルプル震えそうですよぉ……」"

[[dialogue]]
speaker = "サーシャ"
# 「ううん、レポートを作るのも立派な仕事よ～」
line = "「ううん、レポートを作るのも立派な仕事よ～」"

[[dialogue]]
speaker = "モネ"
# 「そう言ってもらえるとありがたいです……」
line = "「そう言ってもらえるとありがたいです……」"

[[dialogue]]
speaker = "unk"
# そういえば初日のは……
line = "そういえば初日のは……"

[[dialogue]]
speaker = "モネ"
# 「会長が登校初日に戦った日のことですよね。それならアナさんからレポートが出ていますよ」
line = "「会長が登校初日に戦った日のことですよね。それならアナさんからレポートが出ていますよ」"

[[dialogue]]
speaker = "サーシャ"
# 「今は図書委員の仕事になっているけど、元々は戦った星騎士がそれぞれレポートを出すものだったらしいわ。だから自分で出してる子もいるのよ～」
line = "「今は図書委員の仕事になっているけど、元々は戦った星騎士がそれぞれレポートを出すものだったらしいわ。だから自分で出してる子もいるのよ～」"

[[dialogue]]
speaker = "モネ"
# 「アナさんはいつもご自分でレポートを出されてます。ご自分で研究もされているだけあって、データが正確です」
line = "「アナさんはいつもご自分でレポートを出されてます。ご自分で研究もされているだけあって、データが正確です」"

[[dialogue]]
speaker = "モネ"
# 「さて……と。レポート書けました。確認お願いできますか？」
line = "「さて……と。レポート書けました。確認お願いできますか？」"

[[dialogue]]
speaker = "サーシャ"
# 「どれどれ……緋宮クロトと奏サーシャ、駆け付けた２人が見たのは破滅の使者――跋扈するモンスターたちだった」
line = "「どれどれ……緋宮クロトと奏サーシャ、駆け付けた２人が見たのは破滅の使者――跋扈するモンスターたちだった」"

[[dialogue]]
speaker = "サーシャ"
# 「今まさに<ruby=むこ>無辜</ruby>の人々に牙を突き立てようとするモンスター。しかしクロトは電光石火のごとく肉薄し、漆黒の星力を宿した拳で獣の顎を叩き割る――！」
line = "「今まさに<ruby>無辜<rt>むこ</rt></ruby>の人々に牙を突き立てようとするモンスター。しかしクロトは電光石火のごとく肉薄し、漆黒の星力を宿した拳で獣の顎を叩き割る――！」"

[[dialogue]]
speaker = "サーシャ"
# 「そしてサーシャの絶対零度の刃が背後から忍び寄り、死神のごとく巨躯のモンスターの首を刈り取った──」
line = "「そしてサーシャの絶対零度の刃が背後から忍び寄り、死神のごとく巨躯のモンスターの首を刈り取った──」"

[[dialogue]]
speaker = "unk"
# 小説みたいだ
line = "小説みたいだ"

[[dialogue]]
speaker = "モネ"
# 「ああっ、すみませ～んっ！　つい手癖というか、勢いというか、すぐ書き直しますっ」
line = "「ああっ、すみませ～んっ！　つい手癖というか、勢いというか、すぐ書き直しますっ」"

[[dialogue]]
speaker = "モネ"
# 「はぁ……はぁ……こ、これでどうですか……？」
line = "「はぁ……はぁ……こ、これでどうですか……？」"

[[dialogue]]
speaker = "サーシャ"
# 「うん、問題ないわね。でもさっきのも素敵だったと思うわよ～」
line = "「うん、問題ないわね。でもさっきのも素敵だったと思うわよ～」"

[[dialogue]]
speaker = "モネ"
# 「いえいえそんな、恥ずかしいですぅ～っ」
line = "「いえいえそんな、恥ずかしいですぅ～っ」"

[[dialogue]]
speaker = "モネ"
# 「レポートは私から提出しておきますね。それでは失礼しま――」
line = "「レポートは私から提出しておきますね。それでは失礼しま――」"

[[dialogue]]
speaker = "unk"
# この前借りた本、読んだよ
line = "この前借りた本、読んだよ"

[[dialogue]]
speaker = "モネ"
# 「！」
line = "「！」"

[[dialogue]]
speaker = "モネ"
# 「ど、どうでしたか……」
line = "「ど、どうでしたか……」"

[[dialogue]]
speaker = "unk"
# すごく泣けた
line = "すごく泣けた"

[[dialogue]]
speaker = "モネ"
# 「ですよね～！」
line = "「ですよね～！」"

[[dialogue]]
speaker = "モネ"
# 「まさか主人公だけではなくヒロインにもあんな秘密があるなんて……真実が明かされた時は頭が真っ白になるほどの衝撃でした」
line = "「まさか主人公だけではなくヒロインにもあんな秘密があるなんて……真実が明かされた時は頭が真っ白になるほどの衝撃でした」"

[[dialogue]]
speaker = "モネ"
# 「それでもつらいとか悲しいとか全然表に出さないんですよ。むしろ苦しい時こそいつもどおりで、そこが余計に切ないんですよ～」
line = "「それでもつらいとか悲しいとか全然表に出さないんですよ。むしろ苦しい時こそいつもどおりで、そこが余計に切ないんですよ～」"

[[dialogue]]
speaker = "サーシャ"
# 「すっごい勢いで頷いてるわ～。え～と、なんて言うんだっけ……そう、ヘッドバンギングみたいね～」
line = "「すっごい勢いで頷いてるわ～。え～と、なんて言うんだっけ……そう、ヘッドバンギングみたいね～」"

[[dialogue]]
speaker = "モネ"
# 「会長のお気に入りの描写とか……あ、２回目のデートのシーン！　いいですよね～、あの初々しさとじれったさがもうたまりません……！」
line = "「会長のお気に入りの描写とか……あ、２回目のデートのシーン！　いいですよね～、あの初々しさとじれったさがもうたまりません……！」"

[[dialogue]]
speaker = "モネ"
# 「誕生日プレゼントを選ぶところも……うんうん、好きって感情がどんどん強くなってるのがあそこでよくわかるんですよね」
line = "「誕生日プレゼントを選ぶところも……うんうん、好きって感情がどんどん強くなってるのがあそこでよくわかるんですよね」"

[[dialogue]]
speaker = "モネ"
# 「はぁ～、語っているだけで目がうるうるしちゃいます……」
line = "「はぁ～、語っているだけで目がうるうるしちゃいます……」"

[[dialogue]]
speaker = "サーシャ"
# 「ふふふ、２人とも楽しそうね～。私もその本借りてみようかしら～？」
line = "「ふふふ、２人とも楽しそうね～。私もその本借りてみようかしら～？」"

[[dialogue]]
speaker = "モネ"
# 「ぜひぜひ！　まだ借りられていないのがあると思うので、今ならすぐに借りられますよ」
line = "「ぜひぜひ！　まだ借りられていないのがあると思うので、今ならすぐに借りられますよ」"

[[dialogue]]
speaker = "モネ"
# 「会長に読んでほしい本は他にも……いえ、まだまだたくさんあるんです。良かったら星徒会の後図書館に……」
line = "「会長に読んでほしい本は他にも……いえ、まだまだたくさんあるんです。良かったら星徒会の後図書館に……」"

[[dialogue]]
speaker = "unk"
# ぜひ
line = "ぜひ"

[[dialogue]]
speaker = "モネ"
# 「いいんですか！？　ではとびっきりのおすすめを用意してお待ちしていますね！」
line = "「いいんですか！？　ではとびっきりのおすすめを用意してお待ちしていますね！」"
