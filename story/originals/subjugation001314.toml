[[dialogue]]
speaker = "ミルフィー"
# 「あれ……生きて、る……？」
line = "「あれ……生きて、る……？」"

[[dialogue]]
speaker = "ヒヨ"
# 「はぁ、はぁ……死ぬかと思ったぜ……」
line = "「はぁ、はぁ……死ぬかと思ったぜ……」"

[[dialogue]]
speaker = "ミルフィー"
# 「ヒヨちゃん！？　どうしてここに！？」
line = "「ヒヨちゃん！？　どうしてここに！？」"

[[dialogue]]
speaker = "ヒヨ"
# 「そりゃ姐さんを助けるためでい！　姐さん今ヤバかったじゃねえか！」
line = "「そりゃ姐さんを助けるためでい！　姐さん今ヤバかったじゃねえか！」"

[[dialogue]]
speaker = "ヒヨ"
# 「姐さんにはプリマステラにしてもらった恩があるんでい！　恩を返す前に死なれちゃ困るってんだ！　無茶すんなって言ったろうが！」
line = "「姐さんにはプリマステラにしてもらった恩があるんでい！　恩を返す前に死なれちゃ困るってんだ！　無茶すんなって言ったろうが！」"

[[dialogue]]
speaker = "ミルフィー"
# 「ご、ごめんなさい……」
line = "「ご、ごめんなさい……」"

[[dialogue]]
speaker = "ヒヨ"
# 「こんなにボロボロになっちまって……今治してやるからな。──焔ノ剣紅蓮神楽！」
line = "「こんなにボロボロになっちまって……今治してやるからな。──焔ノ剣紅蓮神楽！」"

[[dialogue]]
speaker = "ミルフィー"
# 「ありがとう。でもどうやって魔界に……？」
line = "「ありがとう。でもどうやって魔界に……？」"

[[dialogue]]
speaker = "ヒヨ"
# 「そりゃこっちの魔女の姉ちゃんに連れてきてもらったのさ！」
line = "「そりゃこっちの魔女の姉ちゃんに連れてきてもらったのさ！」"

[[dialogue]]
speaker = "ウェンディ"
# 「ええ、彼女がどうしてもこちらに来たいと言ったもので」
line = "「ええ、彼女がどうしてもこちらに来たいと言ったもので」"

[[dialogue]]
speaker = "ウェンディ"
# 「尊敬する人の力になりたいと言われたら、その、何とかしてあげたくなるじゃないですか。気持ちはわかりますし」
line = "「尊敬する人の力になりたいと言われたら、その、何とかしてあげたくなるじゃないですか。気持ちはわかりますし」"

[[dialogue]]
speaker = "ミルフィー"
# 「ウェンディさん！？」
line = "「ウェンディさん！？」"

[[dialogue]]
speaker = "ウェンディ"
# 「はぁ、またセドナ長官に怒られる……。私にこんなことさせたんですから、ちゃんと戦ってくださいね！」
line = "「はぁ、またセドナ長官に怒られる……。私にこんなことさせたんですから、ちゃんと戦ってくださいね！」"

[[dialogue]]
speaker = "ヒヨ"
# 「おうよ！　任せなぁ！」
line = "「おうよ！　任せなぁ！」"

[[dialogue]]
speaker = "ヒヨ"
# 「そんで──ついでに助っ人も連れてきたぜぃ！」
line = "「そんで──ついでに助っ人も連れてきたぜぃ！」"

[[dialogue]]
speaker = "unk"
# 助っ人？
line = "助っ人？"

[[dialogue]]
speaker = "？？？"
# 「フッフッフ……真のヒーローはピンチにやってくる……」
line = "「フッフッフ……真のヒーローはピンチにやってくる……」"

[[dialogue]]
speaker = "アポロ"
# 「闇夜に煌めく正義の一閃！　流星ライダーアポロ、見参！」
line = "「闇夜に煌めく正義の一閃！　流星ライダーアポロ、見参！」"

[[dialogue]]
speaker = "フィオナ"
# 「姉さん！？」
line = "「姉さん！？」"

[[dialogue]]
speaker = "アポロ"
# 「あたしも戦うぞ、フィオナ！　今度こそ世界を救う正義の味方としてな！」
line = "「あたしも戦うぞ、フィオナ！　今度こそ世界を救う正義の味方としてな！」"

[[dialogue]]
speaker = "フィオナ"
# 「姉さんも一緒なら心強いです。でもここに繋がる世界樹の根が細くて、数人しか通れないはずだったんじゃ……」
line = "「姉さんも一緒なら心強いです。でもここに繋がる世界樹の根が細くて、数人しか通れないはずだったんじゃ……」"

[[dialogue]]
speaker = "アポロ"
# 「その辺はウェンディが何とかしてくれた！　魔力の消費とかめちゃくちゃ大変らしいけどな！」
line = "「その辺はウェンディが何とかしてくれた！　魔力の消費とかめちゃくちゃ大変らしいけどな！」"

[[dialogue]]
speaker = "イニシュ"
# 「っ……ダメージ増大……」
line = "「っ……ダメージ増大……」"

[[dialogue]]
speaker = "？？？"
# 「インパルスストリーム！」
line = "「インパルスストリーム！」"

[[dialogue]]
speaker = "イニシュ"
# 「！　支援感謝します」
line = "「！　支援感謝します」"

[[dialogue]]
speaker = "ヴィーナス"
# 「この雷は──」
line = "「この雷は──」"

[[dialogue]]
speaker = "梨緒"
# 「みんな、無事か？」
line = "「みんな、無事か？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「やっぱり梨緒ね！　当然こっちは全員生きてるわ！」
line = "「やっぱり梨緒ね！　当然こっちは全員生きてるわ！」"

[[dialogue]]
speaker = "unk"
# 梨緒も来たんだな
line = "梨緒も来たんだな"

[[dialogue]]
speaker = "梨緒"
# 「世界の危機ならば私が戦わない理由はない。それに魔王から目を離すわけにはいかないからな」
line = "「世界の危機ならば私が戦わない理由はない。それに魔王から目を離すわけにはいかないからな」"

[[dialogue]]
speaker = "梨緒"
# 「すー、はー……私は強い、私ならできる……」
line = "「すー、はー……私は強い、私ならできる……」"

[[dialogue]]
speaker = "アポロ"
# 「？　どうした、大丈夫か？」
line = "「？　どうした、大丈夫か？」"

[[dialogue]]
speaker = "梨緒"
# 「だだ、大丈夫だ、気にするなっ」
line = "「だだ、大丈夫だ、気にするなっ」"

[[dialogue]]
speaker = "梨緒"
# 「フィオナが小さくなっているのは未だに戸惑うが……そんなことを言っている場合ではないな」
line = "「フィオナが小さくなっているのは未だに戸惑うが……そんなことを言っている場合ではないな」"

[[dialogue]]
speaker = "梨緒"
# 「梨緒・Ａ・クリステレス、魔女を支援し、モンスターを駆逐する！」
line = "「梨緒・Ａ・クリステレス、魔女を支援し、モンスターを駆逐する！」"

[[dialogue]]
speaker = "アポロ"
# 「正義の味方にふさわしい舞台だ。大暴れするぞ！　いくぞフィオナ！」
line = "「正義の味方にふさわしい舞台だ。大暴れするぞ！　いくぞフィオナ！」"

[[dialogue]]
speaker = "フィオナ"
# 「はい、共に世界を救いましょう！」
line = "「はい、共に世界を救いましょう！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「新星学園も負けてられないわね！　行くわよ、クロト、ミルフィー、ヒヨ！」
line = "「新星学園も負けてられないわね！　行くわよ、クロト、ミルフィー、ヒヨ！」"

[[dialogue]]
speaker = "unk"
# ミルフィー、いけるか？
line = "ミルフィー、いけるか？"

[[dialogue]]
speaker = "ミルフィー"
# 「うん、もう大丈夫。ヒヨちゃんに回復させてもらったから」
line = "「うん、もう大丈夫。ヒヨちゃんに回復させてもらったから」"

[[dialogue]]
speaker = "ヒヨ"
# 「へへん！　どんなもんだい！」
line = "「へへん！　どんなもんだい！」"

[[dialogue]]
speaker = "マグダレナ"
# 「世界は１つになる……３つの世界が溶けて、ひとつに……」
line = "「世界は１つになる……３つの世界が溶けて、ひとつに……」"

[[dialogue]]
speaker = "ヒヨ"
# 「守護天使さんよ、あんたがど偉い存在だってことは聞いてるが、姐さんは渡せねえ」
line = "「守護天使さんよ、あんたがど偉い存在だってことは聞いてるが、姐さんは渡せねえ」"

[[dialogue]]
speaker = "ヒヨ"
# 「姐さんとやりたいこと、行きたいとこ、たくさんあるんだ。あたしらの新星学園に連れて帰らせてもらうぜぃ！」
line = "「姐さんとやりたいこと、行きたいとこ、たくさんあるんだ。あたしらの新星学園に連れて帰らせてもらうぜぃ！」"

[[dialogue]]
speaker = "ミルフィー"
# 「うん、一緒に帰ろう、ヒヨちゃん！　またたい焼き食べよう！」
line = "「うん、一緒に帰ろう、ヒヨちゃん！　またたい焼き食べよう！」"

[[dialogue]]
speaker = "unk"
# みんなで世界を守るぞ！
line = "みんなで世界を守るぞ！"

[[dialogue]]
speaker = "ヒヨ"
# 「おうさ！」
line = "「おうさ！」"

[[dialogue]]
speaker = "ミルフィー"
# 「私たちの領域を──世界を守るために、いきますっ！」
line = "「私たちの領域を──世界を守るために、いきますっ！」"
