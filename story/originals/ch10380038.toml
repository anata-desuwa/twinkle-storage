line = "「幸せで心も体も悦んじゃってますぅっ<emoji=heart04>　あっ<emoji=heart04>　んっ<emoji=heart04>　はあぁっ<emoji=heart04>　んあぁっ<emoji=heart04>　おま○こ気持ちいいっ<emoji=heart04>　んうぅっ<emoji=heart04>　はあぁっ<emoji=heart04>　ふあぁっ<emoji=heart04>　はああぁんっ<emoji=heart04>」"

