[[dialogue]]
speaker = "イクシリオン"
# 「ふあぁっ<emoji=heart04>　奥のいちばん気持ちいいところ、一発で当たってぇ<emoji=heart04>　頭までバチッってすごい刺激、登って来ますぅ～～っ<emoji=heart04><emoji=heart04>」
line = "「ふあぁっ<emoji=heart04>　奥のいちばん気持ちいいところ、一発で当たってぇ<emoji=heart04>　頭までバチッってすごい刺激、登って来ますぅ～～っ<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
