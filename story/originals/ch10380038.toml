line = "「あっ<emoji=heart04>　あんっ<emoji=heart04>　はあぁっ<emoji=heart04>　ふああぁんっ<emoji=heart04>　気持ちいいっ<emoji=heart04>　おち○ちん気持ちいいですぅ～っ<emoji=heart04>　あっ<emoji=heart04>　あっ<emoji=heart04>　あんっ<emoji=heart04>　はぁんっ<emoji=heart04>　んああぁんっ<emoji=heart04><emoji=heart04>」"

[[dialogue]]
