[[dialogue]]
speaker = "unk"
# ホワイトデーの後日。恋人のイクシーと街でデートをしていた時のこと。
line = "ホワイトデーの後日。恋人のイクシーと街でデートをしていた時のこと。"

[[dialogue]]
speaker = "イクシリオン"
# 「あ、辺りが暗くなってきてしまいましたね……」
line = "「あ、辺りが暗くなってきてしまいましたね……」"

[[dialogue]]
speaker = "unk"
# 手を繋ぎながら歩いていると、イクシーがちらちらと期待するような視線を向けてくる。
line = "手を繋ぎながら歩いていると、イクシーがちらちらと期待するような視線を向けてくる。"

[[dialogue]]
speaker = "クロト"
# 「もうそろそろ寮に帰る？」
line = "「もうそろそろ寮に帰る？」"

[[dialogue]]
speaker = "イクシリオン"
# 「あっ、え、えっと……その……<emoji=heart04>」
line = "「あっ、え、えっと……その……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# もじもじと恥ずかしそうにしているイクシーを可愛いと思いつつ、俺は彼女にそっと耳打ちをする。
line = "もじもじと恥ずかしそうにしているイクシーを可愛いと思いつつ、俺は彼女にそっと耳打ちをする。"

[[dialogue]]
speaker = "クロト"
# 「それとも……ホテルに行く？」
line = "「それとも……ホテルに行く？」"

[[dialogue]]
speaker = "イクシリオン"
# 「……！　は、はい……<emoji=heart04>」
line = "「……！　は、はい……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 顔を赤くしながらも嬉しそうに頷くイクシー。
line = "顔を赤くしながらも嬉しそうに頷くイクシー。"

[[dialogue]]
speaker = "クロト"
# 「実は今日の為に、サプライズを用意してたんだ」
line = "「実は今日の為に、サプライズを用意してたんだ」"

[[dialogue]]
speaker = "イクシリオン"
# 「え？　サプライズ……？」
line = "「え？　サプライズ……？」"

[[dialogue]]
speaker = "unk"
# それからラブホテルに移動し、部屋に入ると、イクシーはバレンタインフォームに変身してみせる。
line = "それからラブホテルに移動し、部屋に入ると、イクシーはバレンタインフォームに変身してみせる。"

[[dialogue]]
speaker = "イクシリオン"
# 「会長、本日はこちらの衣装で私のことを召し上がって頂ければと……<emoji=heart04>」
line = "「会長、本日はこちらの衣装で私のことを召し上がって頂ければと……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
# 「じゃあ、俺も――」
line = "「じゃあ、俺も――」"

[[dialogue]]
speaker = "unk"
# 今度は俺が用意してきたサプライズを披露してみせると、イクシーは驚いたように顔を赤くする。
line = "今度は俺が用意してきたサプライズを披露してみせると、イクシーは驚いたように顔を赤くする。"

[[dialogue]]
speaker = "イクシリオン"
# 「えっ！？　えぇっ……！？」
line = "「えっ！？　えぇっ……！？」"

[[dialogue]]
speaker = "イクシリオン"
# 「はああぁっ……<emoji=heart04>　まさか、こんなぁ……<emoji=heart04>」
line = "「はああぁっ……<emoji=heart04>　まさか、こんなぁ……<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
# 「会長が、<b>３人に分裂</b>してしまうなんてぇ……<emoji=heart04>」
line = "「会長が、<b>３人に分裂</b>してしまうなんてぇ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そう、俺はアニマ先輩が作った『分裂薬』を飲んで、自分の分身を作り出していた。
line = "そう、俺はアニマ先輩が作った『分裂薬』を飲んで、自分の分身を作り出していた。"

[[dialogue]]
speaker = "クロト"
# 「前にエッチした時、イクシーが読んでる漫画みたいに、女の子が大勢の男子に輪姦されちゃうのはどう思うって聞いたでしょ？」
line = "「前にエッチした時、イクシーが読んでる漫画みたいに、女の子が大勢の男子に輪姦されちゃうのはどう思うって聞いたでしょ？」"

[[dialogue]]
speaker = "クロト"
# 「そうしたら、『俺としかいやらしいことはしたくない』って言ってくれたけど、それはそれとして輪姦はちょっと興味ありそうだったし」
line = "「そうしたら、『俺としかいやらしいことはしたくない』って言ってくれたけど、それはそれとして輪姦はちょっと興味ありそうだったし」"

[[dialogue]]
speaker = "クロト"
# 「それなら、俺が複数に増えたら、どうかなって思ったんだけど……」
line = "「それなら、俺が複数に増えたら、どうかなって思ったんだけど……」"

[[dialogue]]
speaker = "unk"
# イクシーが嫌そうな雰囲気なら、俺は無理にせずにやめておくつもりではいたのだが――
line = "イクシーが嫌そうな雰囲気なら、俺は無理にせずにやめておくつもりではいたのだが――"

[[dialogue]]
speaker = "イクシリオン"
# 「はあぁっ……<emoji=heart04>　会長の逞しいおち○ちんが３本も……<emoji=heart04>　ふうぅっ……こんなのエッチ過ぎます……<emoji=heart04>」
line = "「はあぁっ……<emoji=heart04>　会長の逞しいおち○ちんが３本も……<emoji=heart04>　ふうぅっ……こんなのエッチ過ぎます……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺が何も言っていないのに、彼女は興奮して、両手で左右に立っている分身のペニスを触り始めていた。
line = "俺が何も言っていないのに、彼女は興奮して、両手で左右に立っている分身のペニスを触り始めていた。"

[[dialogue]]
speaker = "クロト"
# 「……普通に嬉しそうだな、うん」
line = "「……普通に嬉しそうだな、うん」"

[[dialogue]]
speaker = "unk"
# 大丈夫そうなので、俺はイクシーの秘部にペニスを擦り付け始める。
line = "大丈夫そうなので、俺はイクシーの秘部にペニスを擦り付け始める。"

[[dialogue]]
speaker = "イクシリオン"
# 「あっ<emoji=heart04>　おち○ちんが、おま○こに擦れてぇ……んっ<emoji=heart04>　はあぁっ……ふあぁっ……<emoji=heart04>」
line = "「あっ<emoji=heart04>　おち○ちんが、おま○こに擦れてぇ……んっ<emoji=heart04>　はあぁっ……ふあぁっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# イクシーのおま○こは既に準備不要なくらいに愛液が溢れて、ぬるぬるになっていた。そのことを指摘すると、彼女は恥ずかしそうに言う。
line = "イクシーのおま○こは既に準備不要なくらいに愛液が溢れて、ぬるぬるになっていた。そのことを指摘すると、彼女は恥ずかしそうに言う。"

[[dialogue]]
speaker = "イクシリオン"
# 「じ、実は前に、漫画で同じような逆ハーレムのシチュエーションを見たことがありまして……<emoji=heart04>」
line = "「じ、実は前に、漫画で同じような逆ハーレムのシチュエーションを見たことがありまして……<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
# 「それで、会長がもし同じように増えたらどうなっちゃうのかって、妄想しながらオナニーを……<emoji=heart04>　あっ……んふぅっ……<emoji=heart04>」
line = "「それで、会長がもし同じように増えたらどうなっちゃうのかって、妄想しながらオナニーを……<emoji=heart04>　あっ……んふぅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
# 「その時は、気持ち良くイけた？」
line = "「その時は、気持ち良くイけた？」"

[[dialogue]]
speaker = "イクシリオン"
# 「は、はい……<emoji=heart04>　会長の精液を全身に浴びながら、何度も繰り返しするのを想像して……イキまくっちゃいました……<emoji=heart04>」
line = "「は、はい……<emoji=heart04>　会長の精液を全身に浴びながら、何度も繰り返しするのを想像して……イキまくっちゃいました……<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
# 「大好きな会長に囲まれての逆ハーレムエッチなんて……ふうぅっ<emoji=heart04>　夢みたいで、すごく興奮しちゃいます……<emoji=heart04>」
line = "「大好きな会長に囲まれての逆ハーレムエッチなんて……ふうぅっ<emoji=heart04>　夢みたいで、すごく興奮しちゃいます……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
# 「なら、イクシー」
