# いちばん奥にペニスを突き入れた瞬間、溜め込んでいた射精欲が一気に弾け、俺は勢いよくぶちまけた。
line = "いちばん奥にペニスを突き入れた瞬間、溜め込んでいた射精欲が一気に弾け、俺は勢いよくぶちまけた。"

[[dialogue]]
speaker = "イクシリオン"
# 「はあああぁんっ<emoji=heart04><emoji=heart04><emoji=heart04>　会長の熱い精液、いっぱい出てますぅ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」
line = "「はあああぁんっ<emoji=heart04><emoji=heart04><emoji=heart04>　会長の熱い精液、いっぱい出てますぅ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# もちろん、子宮の中だけでなく、左右のペニスからも射精し、彼女の美しい肢体にぶっかけていく。
line = "もちろん、子宮の中だけでなく、左右のペニスからも射精し、彼女の美しい肢体にぶっかけていく。"

[[dialogue]]
speaker = "イクシリオン"
# 「ふああぁ～～っ<emoji=heart04><emoji=heart04>　精液、全身にいっぱいぃっ……<emoji=heart04><emoji=heart04>　会長のオスの匂いで全身包まれて、はあぁっ……<emoji=heart04>　幸せぇ……<emoji=heart04>」
line = "「ふああぁ～～っ<emoji=heart04><emoji=heart04>　精液、全身にいっぱいぃっ……<emoji=heart04><emoji=heart04>　会長のオスの匂いで全身包まれて、はあぁっ……<emoji=heart04>　幸せぇ……<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
# 「あんっ<emoji=heart04>　すごいっ……<emoji=heart04>　射精、まだ続いて……<emoji=heart04>　男らしくて、素敵ですぅ……<emoji=heart04>　はあぁっ……<emoji=heart04>　んふぅ……<emoji=heart04>」
line = "「あんっ<emoji=heart04>　すごいっ……<emoji=heart04>　射精、まだ続いて……<emoji=heart04>　男らしくて、素敵ですぅ……<emoji=heart04>　はあぁっ……<emoji=heart04>　んふぅ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# やがて射精が終わり、しばらく絶頂の余韻に浸った後、俺はゆっくりとペニスを引き抜く。
line = "やがて射精が終わり、しばらく絶頂の余韻に浸った後、俺はゆっくりとペニスを引き抜く。"

[[dialogue]]
speaker = "イクシリオン"
# 「んっ……<emoji=heart04>　はあぁ……ふうぅ……<emoji=heart04>　会長の本気ピストンで、全力イキしちゃいましたぁ……<emoji=heart04>　気持ちよかったですぅ……<emoji=heart04>」
line = "「んっ……<emoji=heart04>　はあぁ……ふうぅ……<emoji=heart04>　会長の本気ピストンで、全力イキしちゃいましたぁ……<emoji=heart04>　気持ちよかったですぅ……<emoji=heart04>」"

[[dialogue]]
