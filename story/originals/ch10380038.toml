speaker = "unk"
# 俺は彼女の愛液でぬるぬるになったペニスの先端を膣穴に押し当て、ゆっくりと挿入する。
line = "俺は彼女の愛液でぬるぬるになったペニスの先端を膣穴に押し当て、ゆっくりと挿入する。"

