[[dialogue]]
speaker = "イクシリオン"
# 「～～っ<emoji=heart04>　は、はいぃ……<emoji=heart04>　お願いします……<emoji=heart04>」
line = "「～～っ<emoji=heart04>　は、はいぃ……<emoji=heart04>　お願いします……<emoji=heart04>」"

