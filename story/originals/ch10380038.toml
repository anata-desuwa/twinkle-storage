line = "「あっ<emoji=heart04>　はいぃ<emoji=heart04>　ごめんなさい<emoji=heart04>　左右のおち○ちんも、ちゃんと気持ち良くしますぅっ<emoji=heart04>　んっ<emoji=heart04>　はあぁっ……ふうぅっ……<emoji=heart04>」"

[[dialogue]]
