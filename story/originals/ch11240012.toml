[[dialogue]]
speaker = "unk"
# 第２話,再びアルタイルへ,P
line = "第２話,再びアルタイルへ,P"

[[dialogue]]
speaker = "unk"
# 『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』との決戦準備のために、アルタイルへ移動した俺たち。
line = "『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』との決戦準備のために、アルタイルへ移動した俺たち。"

[[dialogue]]
speaker = "unk"
# しかし、まだデネブ防衛戦での傷が癒えていないため、今日は休養日──ということで、俺と環は遊園地デートに訪れていた。
line = "しかし、まだデネブ防衛戦での傷が癒えていないため、今日は休養日──ということで、俺と環は遊園地デートに訪れていた。"

[[dialogue]]
speaker = "ラクシャ"
# 「ほらほら、次はあっちのコースター！　休んでる暇はないよ、会長！」
line = "「ほらほら、次はあっちのコースター！　休んでる暇はないよ、会長！」"

[[dialogue]]
speaker = "unk"
# ああ！！
line = "ああ！！"

[[dialogue]]
speaker = "ラクシャ"
# 「今日はぜーんぶキミの奢りだからね。目指せ、全アトラクション制覇！　行っくよー！」
line = "「今日はぜーんぶキミの奢りだからね。目指せ、全アトラクション制覇！　行っくよー！」"

[[dialogue]]
speaker = "スタッフの女性"
# 「２名様ですね──って、あれ！？　市倉さんに、緋宮くんじゃないですか！？」
line = "「２名様ですね──って、あれ！？　市倉さんに、緋宮くんじゃないですか！？」"

[[dialogue]]
speaker = "ラクシャ"
# 「やっほー。久しぶりだね。まだここでバイトしてたんだ？」
line = "「やっほー。久しぶりだね。まだここでバイトしてたんだ？」"

[[dialogue]]
speaker = "スタッフの女性"
# 「ええ。ありがたいことに先月から正社員になって……って。２人はもしかして──」
line = "「ええ。ありがたいことに先月から正社員になって……って。２人はもしかして──」"

[[dialogue]]
speaker = "ラクシャ"
# 「うん。デートしてるんだ。会長が全部奢ってくれる約束しててさ♪」
line = "「うん。デートしてるんだ。会長が全部奢ってくれる約束しててさ♪」"

[[dialogue]]
speaker = "スタッフの女性"
# 「へぇ～！　びっくり──でもないですね。２人とも、アルバイトしてた時から息がぴったりでしたし」
line = "「へぇ～！　びっくり──でもないですね。２人とも、アルバイトしてた時から息がぴったりでしたし」"

[[dialogue]]
speaker = "スタッフの女性"
# 「もしかして……ふふ♪　ここで働いてた時からお付き合いしてました？」
line = "「もしかして……ふふ♪　ここで働いてた時からお付き合いしてました？」"

[[dialogue]]
speaker = "ラクシャ"
# 「ううん。会長と付き合いだしたのは、新星学園で再会してからだよ。付き合い始めてからは、まだそんなに時間が経ってなくてさ」
line = "「ううん。会長と付き合いだしたのは、新星学園で再会してからだよ。付き合い始めてからは、まだそんなに時間が経ってなくてさ」"

[[dialogue]]
speaker = "ラクシャ"
# 「今日は楽しませてもらうよ。頑張ってね！」
line = "「今日は楽しませてもらうよ。頑張ってね！」"

[[dialogue]]
speaker = "unk"
# 古巣のバイト先だからもしかしたらと思ったけれど、ちらほらと顔見知りを見つけた俺と環。
line = "古巣のバイト先だからもしかしたらと思ったけれど、ちらほらと顔見知りを見つけた俺と環。"

[[dialogue]]
speaker = "unk"
# 今さらだけど、俺には『環をただの天使だ』と思っていた時の思い出もたくさん存在している。
line = "今さらだけど、俺には『環をただの天使だ』と思っていた時の思い出もたくさん存在している。"

[[dialogue]]
speaker = "unk"
# 黒騎士となった学園長との戦いを機に環の正体を知り、離ればなれになっていたけれど──
line = "黒騎士となった学園長との戦いを機に環の正体を知り、離ればなれになっていたけれど──"

[[dialogue]]
speaker = "unk"
# そう思うと、今こうして一緒に遊べていることが、よりかけがえのないものに感じるのだった──
line = "そう思うと、今こうして一緒に遊べていることが、よりかけがえのないものに感じるのだった──"

[[dialogue]]
speaker = "ラクシャ"
# 「はー、遊んだ、遊んだ♪　戦い続きでフラストレーション溜まってたから、いい気分転換になったよ」
line = "「はー、遊んだ、遊んだ♪　戦い続きでフラストレーション溜まってたから、いい気分転換になったよ」"

[[dialogue]]
speaker = "ラクシャ"
# 「うん……それじゃあへそを曲げるのも、このくらいにしておいてあげよっかな。会長、迎えに来なかった件はこれでチャラね♪」
line = "「うん……それじゃあへそを曲げるのも、このくらいにしておいてあげよっかな。会長、迎えに来なかった件はこれでチャラね♪」"

[[dialogue]]
speaker = "ラクシャ"
# 「──なんて。もうとっくに怒ってなんていないんだけど。会長がやけにオマケしてくれるから、ガラにもなく引きずったふりしちゃった」
line = "「──なんて。もうとっくに怒ってなんていないんだけど。会長がやけにオマケしてくれるから、ガラにもなく引きずったふりしちゃった」"

[[dialogue]]
speaker = "ラクシャ"
# 「お詫びに今日からしばらく、ボクがお返しするよ。遊びでもご飯でも、何でもリクエストどうぞ～！」
line = "「お詫びに今日からしばらく、ボクがお返しするよ。遊びでもご飯でも、何でもリクエストどうぞ～！」"

[[dialogue]]
speaker = "unk"
# 大丈夫だよ。環には世話になってるから
line = "大丈夫だよ。環には世話になってるから"

[[dialogue]]
speaker = "ラクシャ"
# 「世話になってるって……そうかなぁ？」
line = "「世話になってるって……そうかなぁ？」"

[[dialogue]]
speaker = "unk"
# ヴィーナスが無事に成長できたのも……
line = "ヴィーナスが無事に成長できたのも……"

[[dialogue]]
speaker = "unk"
# 昔から俺のバイト先に現れてたのだって……
line = "昔から俺のバイト先に現れてたのだって……"

[[dialogue]]
speaker = "ラクシャ"
# 「ああ、そういうこと？　気にしないでよ。アルタイルのキミとヴィーナスを見守ることは、テルルからのお願いだったからね」
line = "「ああ、そういうこと？　気にしないでよ。アルタイルのキミとヴィーナスを見守ることは、テルルからのお願いだったからね」"

[[dialogue]]
speaker = "ラクシャ"
# 「『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』から３つの世界を守るためだったんだ──気にしないで」
line = "「『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』から３つの世界を守るためだったんだ──気にしないで」"

[[dialogue]]
speaker = "ラクシャ"
# 「むしろ、不愉快に思ってない？　仕方なかったとはいえ、ボクはずっと嘘を吐いてたわけだし……」
line = "「むしろ、不愉快に思ってない？　仕方なかったとはいえ、ボクはずっと嘘を吐いてたわけだし……」"

[[dialogue]]
speaker = "ラクシャ"
# 「実際、キミに告白された時だって、ボクは真実を明かさないでＯＫしたわけだしね──」
line = "「実際、キミに告白された時だって、ボクは真実を明かさないでＯＫしたわけだしね──」"

[[dialogue]]
speaker = "unk"
# ──あれは、俺が会長に就任して間もない頃だったか。
line = "──あれは、俺が会長に就任して間もない頃だったか。"

[[dialogue]]
speaker = "環"
# 「おーっす。どしたの、急に呼び出して？」
line = "「おーっす。どしたの、急に呼び出して？」"

[[dialogue]]
speaker = "unk"
# ようやく入学できた新星学園で、かつてのバイト仲間である環と再会を果たした俺。
line = "ようやく入学できた新星学園で、かつてのバイト仲間である環と再会を果たした俺。"

[[dialogue]]
speaker = "環"
# 「もしかして──愛の告白とか？　なんちゃって」
line = "「もしかして──愛の告白とか？　なんちゃって」"

[[dialogue]]
speaker = "unk"
# 苦楽を共にした友人とばかり思っていた。
line = "苦楽を共にした友人とばかり思っていた。"

[[dialogue]]
speaker = "unk"
# けれど俺は、環と再会してから、どんどん彼女のことを異性として意識するようになっていった──
line = "けれど俺は、環と再会してから、どんどん彼女のことを異性として意識するようになっていった──"

[[dialogue]]
speaker = "unk"
# 俺と付き合ってくれないか？
line = "俺と付き合ってくれないか？"

[[dialogue]]
speaker = "環"
# 「えっ……！？　あー、本当にそういう呼び出しだったんだ？」
line = "「えっ……！？　あー、本当にそういう呼び出しだったんだ？」"

[[dialogue]]
speaker = "環"
# 「……本当にいいの？　ボク、キミが思ってるような女の子じゃないかもしれないよ？」
line = "「……本当にいいの？　ボク、キミが思ってるような女の子じゃないかもしれないよ？」"

[[dialogue]]
speaker = "unk"
# 環は環だろ？　君のことが好きなんだ
line = "環は環だろ？　君のことが好きなんだ"

[[dialogue]]
speaker = "環"
# 「…………そっか」
line = "「…………そっか」"

[[dialogue]]
speaker = "環"
# 「──うん。ボクもキミのこと……好きだよ。これは、本当の本当。嘘じゃないからね」
line = "「──うん。ボクもキミのこと……好きだよ。これは、本当の本当。嘘じゃないからね」"

[[dialogue]]
speaker = "unk"
# あの時は何を言っているのかわからなかったけれど──今なら分かる。
line = "あの時は何を言っているのかわからなかったけれど──今なら分かる。"

[[dialogue]]
speaker = "ラクシャ"
# 「ボクが守護天使だって真実を知ってから、キミの気持ちを確認するの、怖かったんだ」
line = "「ボクが守護天使だって真実を知ってから、キミの気持ちを確認するの、怖かったんだ」"

[[dialogue]]
speaker = "ラクシャ"
# 「なのに例の件で拗ねたら、キミは『機嫌を直してくれー』ってあたふたしてくれて……だから、嬉しくて引っ張っちゃったんだ。ごめんね」
line = "「なのに例の件で拗ねたら、キミは『機嫌を直してくれー』ってあたふたしてくれて……だから、嬉しくて引っ張っちゃったんだ。ごめんね」"

[[dialogue]]
speaker = "unk"
# 真実を知っても俺の気持ちは変わらない
line = "真実を知っても俺の気持ちは変わらない"

[[dialogue]]
speaker = "ラクシャ"
# 「…………会長」
line = "「…………会長」"

[[dialogue]]
speaker = "unk"
# 環はずっと俺を見守ってくれていた
line = "環はずっと俺を見守ってくれていた"

[[dialogue]]
speaker = "ラクシャ"
# 「……うん。キミ、しょっちゅう色んなアルバイトを始めるから、追いかけるの大変だったな」
line = "「……うん。キミ、しょっちゅう色んなアルバイトを始めるから、追いかけるの大変だったな」"

[[dialogue]]
speaker = "ラクシャ"
# 「星騎士として戦えないのに、モンスターを惹きつけちゃうし……」
line = "「星騎士として戦えないのに、モンスターを惹きつけちゃうし……」"

[[dialogue]]
speaker = "ラクシャ"
# 「でも──大変だったけど、キミと一緒に過ごした時間は、すごく楽しかった。本当の本当に。嘘じゃないよ」
line = "「でも──大変だったけど、キミと一緒に過ごした時間は、すごく楽しかった。本当の本当に。嘘じゃないよ」"

[[dialogue]]
speaker = "unk"
# 何があっても、その想いは変わらない
line = "何があっても、その想いは変わらない"

[[dialogue]]
speaker = "unk"
# 君のことが好きだ、環
line = "君のことが好きだ、環"

[[dialogue]]
speaker = "ラクシャ"
# 「……うん」
line = "「……うん」"

[[dialogue]]
speaker = "ラクシャ"
# 「ボクも同じ気持ちだよ、会長──キミのことが、大好き」
line = "「ボクも同じ気持ちだよ、会長──キミのことが、大好き」"

[[dialogue]]
speaker = "ラクシャ"
# 「──んちゅっ<emoji=heart04>」
line = "「──んちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 全てを知って、その上で──俺たちは改めて、恋人同士になったのだった。
line = "全てを知って、その上で──俺たちは改めて、恋人同士になったのだった。"
