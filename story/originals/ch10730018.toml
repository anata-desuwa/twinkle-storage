[[dialogue]]
speaker = "リノ"
# 「（『空間の魔女』──私はかつてそう呼ばれていた）」
line = "「（『空間の魔女』──私はかつてそう呼ばれていた）」"

[[dialogue]]
speaker = "リノ"
# 「（その力は非常に複雑で説明が難しいけれど、つまるところは『世界の境界を超越し、観測する』ことができるというもの）」
line = "「（その力は非常に複雑で説明が難しいけれど、つまるところは『世界の境界を超越し、観測する』ことができるというもの）」"

[[dialogue]]
speaker = "リノ"
# 「（隔たって存在する世界を観測する理由は１つ。今代の魔王である息子のクロトが生き残る術を探すこと。それこそが私の悲願だ）」
line = "「（隔たって存在する世界を観測する理由は１つ。今代の魔王である息子のクロトが生き残る術を探すこと。それこそが私の悲願だ）」"

[[dialogue]]
speaker = "リノ"
# 「（そのために私はこの力を使い倒す。あらゆる世界で見聞きした情報が私の力となるからだ）」
line = "「（そのために私はこの力を使い倒す。あらゆる世界で見聞きした情報が私の力となるからだ）」"

[[dialogue]]
speaker = "リノ"
# 「（しかしこの力には厄介な点もある）」
line = "「（しかしこの力には厄介な点もある）」"

[[dialogue]]
speaker = "unk"
# ……例えば私の眠っている時などに、異なる世界の記憶のカケラが、意思とは無関係に流れ込んで来てしまうことがある。
line = "……例えば私の眠っている時などに、異なる世界の記憶のカケラが、意思とは無関係に流れ込んで来てしまうことがある。"

[[dialogue]]
speaker = "unk"
# だから今から始まるのは存在しないエピソード。『クロトの母である緋宮リノ』とは、何の関係もない出来事なのだ──
line = "だから今から始まるのは存在しないエピソード。『クロトの母である緋宮リノ』とは、何の関係もない出来事なのだ──"

[[dialogue]]
speaker = "リノ"
# 「ふぅ……これはまた、懐かしい場所ね」
line = "「ふぅ……これはまた、懐かしい場所ね」"

[[dialogue]]
speaker = "unk"
# かつての古巣であるネビュラ本部。しかしこの世界に旧友であるセドナがいるかどうかも不明。
line = "かつての古巣であるネビュラ本部。しかしこの世界に旧友であるセドナがいるかどうかも不明。"

[[dialogue]]
speaker = "unk"
# 私の名前が『緋宮リノ』でない可能性もあるのだから、当然と言える。それにしても──
line = "私の名前が『緋宮リノ』でない可能性もあるのだから、当然と言える。それにしても──"

[[dialogue]]
speaker = "リノ"
# 「……さっきから変な気分。体の芯が熱くて、うずくような感じ……何なのかしら？」
line = "「……さっきから変な気分。体の芯が熱くて、うずくような感じ……何なのかしら？」"

[[dialogue]]
speaker = "unk"
# この並行世界の私は風邪でも引いているのだろうか？　心臓がうるさいほどに高鳴っている。
line = "この並行世界の私は風邪でも引いているのだろうか？　心臓がうるさいほどに高鳴っている。"

[[dialogue]]
speaker = "unk"
# そして──かつん、と。私の背後で靴音が聞こえた。
line = "そして──かつん、と。私の背後で靴音が聞こえた。"

[[dialogue]]
speaker = "？？？"
# 「驚いた。もう来てたんだな、リノ」
line = "「驚いた。もう来てたんだな、リノ」"

[[dialogue]]
speaker = "リノ"
# 「えっ……？　クロ、ト……？」
line = "「えっ……？　クロ、ト……？」"

[[dialogue]]
speaker = "？？？"
# 「おいおい、一体誰と間違えてるんだ？　自分が仕える魔王の名前を忘れないでくれよ」
line = "「おいおい、一体誰と間違えてるんだ？　自分が仕える魔王の名前を忘れないでくれよ」"

[[dialogue]]
speaker = "？？？"
# 「今日は皆が出払っているから、２人の時間が欲しいってリノが言ったんだろ？」
line = "「今日は皆が出払っているから、２人の時間が欲しいってリノが言ったんだろ？」"

[[dialogue]]
speaker = "リノ"
# 「────ぁ」
line = "「────ぁ」"

[[dialogue]]
speaker = "unk"
# 言われて理解した──この世界の私は、魔女である私は、魔王である彼と恋仲だった。
line = "言われて理解した──この世界の私は、魔女である私は、魔王である彼と恋仲だった。"

[[dialogue]]
speaker = "unk"
# 今日はちょうど、ネビュラの本部から多くの魔女がいなくなる日で……私は今から彼と……
line = "今日はちょうど、ネビュラの本部から多くの魔女がいなくなる日で……私は今から彼と……"

[[dialogue]]
speaker = "リノ"
# 「ぁっ……あっ……はぁあっ……そんな、いきなり、脱がせるだなんて……」
line = "「ぁっ……あっ……はぁあっ……そんな、いきなり、脱がせるだなんて……」"

[[dialogue]]
speaker = "？？？"
# 「今日のリノは何だか変だな。別に今さら恥ずかしがるようなことじゃないだろ」
line = "「今日のリノは何だか変だな。別に今さら恥ずかしがるようなことじゃないだろ」"

[[dialogue]]
speaker = "リノ"
# 「だ、だって……あ、あなたの顔が……」
line = "「だ、だって……あ、あなたの顔が……」"

[[dialogue]]
speaker = "？？？"
# 「俺の顔？　え……何か変かな」
line = "「俺の顔？　え……何か変かな」"

[[dialogue]]
speaker = "unk"
# クロトに……最愛の息子に、そっくりなんだもの。
line = "クロトに……最愛の息子に、そっくりなんだもの。"

[[dialogue]]
speaker = "リノ"
# 「（ううう、嘘でしょ！？　本当に許されるの、こんなこと！？　で、でも、この並行世界では、私と彼は親子なんかじゃなくって……！）」
line = "「（ううう、嘘でしょ！？　本当に許されるの、こんなこと！？　で、でも、この並行世界では、私と彼は親子なんかじゃなくって……！）」"

[[dialogue]]
speaker = "unk"
# 胸の中で渦巻く感情の整理がつかない。
line = "胸の中で渦巻く感情の整理がつかない。"

[[dialogue]]
speaker = "unk"
# 記憶のカケラから流れ込んだ『私』は、彼のことを恋人と認識している。けれども同時に私は『母親である緋宮リノ』の記憶も持っていて……
line = "記憶のカケラから流れ込んだ『私』は、彼のことを恋人と認識している。けれども同時に私は『母親である緋宮リノ』の記憶も持っていて……"

[[dialogue]]
speaker = "リノ"
# 「（ど、動揺していても仕方がないわ。これは夢よ。それにこの世界では、彼の名前はクロトじゃない！）」
line = "「（ど、動揺していても仕方がないわ。これは夢よ。それにこの世界では、彼の名前はクロトじゃない！）」"

[[dialogue]]
speaker = "リノ"
# 「（いくら顔と声と性格がそっくりでも……別人……別人、で……）」
line = "「（いくら顔と声と性格がそっくりでも……別人……別人、で……）」"

[[dialogue]]
speaker = "リノ"
# 「って、無理よぉっ！？　だって、そっくりじゃない！！」
line = "「って、無理よぉっ！？　だって、そっくりじゃない！！」"

[[dialogue]]
speaker = "？？？"
# 「え、えーっと……リノ？　何だか慌ててるところ、悪いんだけどさ」
line = "「え、えーっと……リノ？　何だか慌ててるところ、悪いんだけどさ」"

[[dialogue]]
speaker = "リノ"
# 「は、はい！？」
line = "「は、はい！？」"

[[dialogue]]
speaker = "？？？"
# 「恋人の裸を前にお預けってのも辛いって言うか……入れてもいいのかな」
line = "「恋人の裸を前にお預けってのも辛いって言うか……入れてもいいのかな」"

[[dialogue]]
speaker = "リノ"
# 「え……そ、それは──」
line = "「え……そ、それは──」"

[[dialogue]]
speaker = "リノ"
# 「（断らなきゃ……<emoji=heart04>　私たちは、親子なんだもの。おち○ちんは入れちゃダメって、言わなきゃ……<emoji=heart04>）」
line = "「（断らなきゃ……<emoji=heart04>　私たちは、親子なんだもの。おち○ちんは入れちゃダメって、言わなきゃ……<emoji=heart04>）」"

[[dialogue]]
speaker = "unk"
# でも、その気持ちは声に出すことはできなかった。代わりにこぼれ出たのは──
line = "でも、その気持ちは声に出すことはできなかった。代わりにこぼれ出たのは──"

[[dialogue]]
speaker = "リノ"
# 「は、はい……どうぞっ<emoji=heart04>」
line = "「は、はい……どうぞっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 恋人としての『私』の感情が、母親の声よりも前に出た。目の前の彼を、愛しい魔王様だと思って仕方がない自分が確かにいる。
line = "恋人としての『私』の感情が、母親の声よりも前に出た。目の前の彼を、愛しい魔王様だと思って仕方がない自分が確かにいる。"

[[dialogue]]
speaker = "unk"
# 彼は頷いて、大きく反りかえったおち○ちんを、私の中に──
line = "彼は頷いて、大きく反りかえったおち○ちんを、私の中に──"

[[dialogue]]
speaker = "リノ"
# 「んぅうぅッ──はぁ、あ、あぁあ～～～っ！？<emoji=heart04>」
line = "「んぅうぅッ──はぁ、あ、あぁあ～～～っ！？<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 挿入された瞬間に体がびくりと痙攣し、私は軽く達してしまっていた。
line = "挿入された瞬間に体がびくりと痙攣し、私は軽く達してしまっていた。"

[[dialogue]]
speaker = "リノ"
# 「（あっ、あぁぁああぁぁぁっ<emoji=heart04>　……はぁぁぁんっ<emoji=heart04>　き、気持ちいいっ……！）」
line = "「（あっ、あぁぁああぁぁぁっ<emoji=heart04>　……はぁぁぁんっ<emoji=heart04>　き、気持ちいいっ……！）」"

[[dialogue]]
speaker = "リノ"
# 「（あぁぁ……息子と同じ顔をして、同じ声をして、同じような喋り方をしていても──恋人のおち○ちんだもの<emoji=heart04>）」
line = "「（あぁぁ……息子と同じ顔をして、同じ声をして、同じような喋り方をしていても──恋人のおち○ちんだもの<emoji=heart04>）」"

[[dialogue]]
speaker = "リノ"
# 「ふうぁっ……あっ、ぁあ、ぁっ……！？<emoji=heart04>　あ、や、やぁあっ……き、気持ち、いいっ……んんぅっ<emoji=heart04>」
line = "「ふうぁっ……あっ、ぁあ、ぁっ……！？<emoji=heart04>　あ、や、やぁあっ……き、気持ち、いいっ……んんぅっ<emoji=heart04>」"

[[dialogue]]
speaker = "リノ"
# 「（あっ、あっ、あぁぁっ<emoji=heart04>　間違いない。この世界の私は彼と……あぁぁ<emoji=heart04>　数えきれないくらい、セックスをしている。はぁぁ、だってこんなにも馴染んで、抵抗がない<emoji=heart04>）」
line = "「（あっ、あっ、あぁぁっ<emoji=heart04>　間違いない。この世界の私は彼と……あぁぁ<emoji=heart04>　数えきれないくらい、セックスをしている。はぁぁ、だってこんなにも馴染んで、抵抗がない<emoji=heart04>）」"

[[dialogue]]
speaker = "？？？"
# 「っ……リノ、どうしたんだ？　今日はその、いつもよりすごく濡れてっ……締め付けも……」
line = "「っ……リノ、どうしたんだ？　今日はその、いつもよりすごく濡れてっ……締め付けも……」"

[[dialogue]]
speaker = "リノ"
# 「ぁ、い、いぇっ……な、何でもないです、<b>魔王様</b>ぁっ……<emoji=heart04>」
line = "「ぁ、い、いぇっ……な、何でもないです、<b>魔王様</b>ぁっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 自然と口をついて出る呼称。この世界の私は、彼のことを『魔王様』と呼んでいる。
line = "自然と口をついて出る呼称。この世界の私は、彼のことを『魔王様』と呼んでいる。"

[[dialogue]]
speaker = "リノ"
# 「き、きっ……気持ち、良くてっ……魔王様の、お、おち○ちん、がぁっ……<emoji=heart04>　んんんっ<emoji=heart04>」
line = "「き、きっ……気持ち、良くてっ……魔王様の、お、おち○ちん、がぁっ……<emoji=heart04>　んんんっ<emoji=heart04>」"

[[dialogue]]
speaker = "？？？"
# 「──リノっ！」
line = "「──リノっ！」"

[[dialogue]]
speaker = "リノ"
# 「はあ、ぁ、あぁあっ<emoji=heart04>　んっんんぅっ……ふうぅ、うぅうっ<emoji=heart04>」
line = "「はあ、ぁ、あぁあっ<emoji=heart04>　んっんんぅっ……ふうぅ、うぅうっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 私の返答で火が点いたのか、息子とそっくりの彼のおち○ちんが、私の中を何度も往復していく──
line = "私の返答で火が点いたのか、息子とそっくりの彼のおち○ちんが、私の中を何度も往復していく──"

[[dialogue]]
speaker = "リノ"
# 「んんぁっ……は、ぁあっ<emoji=heart04>　んぅ、ふぅ、んんっ<emoji=heart04>　魔王様っ、んぁ、はぁっ……あぁあっ<emoji=heart04>」
line = "「んんぁっ……は、ぁあっ<emoji=heart04>　んぅ、ふぅ、んんっ<emoji=heart04>　魔王様っ、んぁ、はぁっ……あぁあっ<emoji=heart04>」"

[[dialogue]]
speaker = "リノ"
# 「きっ……急に激しいっ……は、あ、ぅっ……<emoji=heart04>　そんな、おち○ちん、強くしたら……は、ぅあっ、あっ<emoji=heart04>」
line = "「きっ……急に激しいっ……は、あ、ぅっ……<emoji=heart04>　そんな、おち○ちん、強くしたら……は、ぅあっ、あっ<emoji=heart04>」"

[[dialogue]]
speaker = "？？？"
# 「そうか？　いつもと同じ感じだと思うけど……」
line = "「そうか？　いつもと同じ感じだと思うけど……」"

[[dialogue]]
speaker = "リノ"
# 「そ、そう、なんですかっ……は、ぁあ、んぅ、うっ……んんっ……くっふぅ、うう、ぁ、ああっ……<emoji=heart04>」
line = "「そ、そう、なんですかっ……は、ぁあ、んぅ、うっ……んんっ……くっふぅ、うう、ぁ、ああっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 自分でもほとんどいじらない穴を、穿たれている。しかも息子と同じ顔をした恋人に。
line = "自分でもほとんどいじらない穴を、穿たれている。しかも息子と同じ顔をした恋人に。"

[[dialogue]]
speaker = "unk"
# 深くまで突き刺さっている彼のおち○ちんは、私のことを愛おしいと思ってくれているのが良くわかる、熱くて硬い勃起で……
line = "深くまで突き刺さっている彼のおち○ちんは、私のことを愛おしいと思ってくれているのが良くわかる、熱くて硬い勃起で……"

[[dialogue]]
speaker = "リノ"
# 「な、なんだか今日は、いつもより感じてしまう、みたいでっ……は、ぁっ……ふうぅっ<emoji=heart04>」
line = "「な、なんだか今日は、いつもより感じてしまう、みたいでっ……は、ぁっ……ふうぅっ<emoji=heart04>」"

[[dialogue]]
speaker = "？？？"
# 「──嬉しいな。真面目なリノがそんなに乱れてくれるだなんて」
line = "「──嬉しいな。真面目なリノがそんなに乱れてくれるだなんて」"

[[dialogue]]
speaker = "unk"
# 彼の腕が伸びて、私のおっぱいを揉み始めた。
line = "彼の腕が伸びて、私のおっぱいを揉み始めた。"

[[dialogue]]
speaker = "リノ"
# 「はぁ、あぁ<emoji=heart04>　おっぱい、そんなに、ぎゅうって揉んだら、だ、ダメっ、ダメですっ……<emoji=heart04>」
line = "「はぁ、あぁ<emoji=heart04>　おっぱい、そんなに、ぎゅうって揉んだら、だ、ダメっ、ダメですっ……<emoji=heart04>」"

[[dialogue]]
speaker = "？？？"
# 「いつもなら、もっと揉んでって言うのに」
line = "「いつもなら、もっと揉んでって言うのに」"

[[dialogue]]
speaker = "リノ"
# 「ふぅううっ！？<emoji=heart04>　わ、私、そんなことを、あなたに、ぃっ……？<emoji=heart04>」
line = "「ふぅううっ！？<emoji=heart04>　わ、私、そんなことを、あなたに、ぃっ……？<emoji=heart04>」"

[[dialogue]]
speaker = "？？？"
# 「うん。よくおねだりしてくるけど？」
line = "「うん。よくおねだりしてくるけど？」"

[[dialogue]]
speaker = "リノ"
# 「はぁああ、んぅうっ、そんな、そんなぁっ──んんっ<emoji=heart04>」
line = "「はぁああ、んぅうっ、そんな、そんなぁっ──んんっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ２つの意識が私の中でバグを起こしている。愛しい恋人の魔王様に抱かれる喜びと、息子と繋がっているような背徳感──
line = "２つの意識が私の中でバグを起こしている。愛しい恋人の魔王様に抱かれる喜びと、息子と繋がっているような背徳感──"

[[dialogue]]
speaker = "？？？"
# 「そうだ。いつもみたいにおねだりしてみなよ」
line = "「そうだ。いつもみたいにおねだりしてみなよ」"

[[dialogue]]
speaker = "リノ"
# 「えっ──えっ……！？」
line = "「えっ──えっ……！？」"

[[dialogue]]
speaker = "unk"
# 混乱する私に、彼が耳打ちしてきた言葉。唾を飲み込んで、私は──
line = "混乱する私に、彼が耳打ちしてきた言葉。唾を飲み込んで、私は──"

[[dialogue]]
speaker = "リノ"
# 「んっ……んんっ……<emoji=heart04>　わ、私の乳首、いっぱい、コリコリって、いじってくださいっ……魔王、様ぁっ……<emoji=heart04>」
line = "「んっ……んんっ……<emoji=heart04>　わ、私の乳首、いっぱい、コリコリって、いじってくださいっ……魔王、様ぁっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 口をついて勝手に出てくるおねだりの言葉に、母親の私が赤面してこの場から逃げたがる。
line = "口をついて勝手に出てくるおねだりの言葉に、母親の私が赤面してこの場から逃げたがる。"

[[dialogue]]
speaker = "リノ"
# 「んんんぅっ！？<emoji=heart04>　ひ、ひぁぁあ、ああっ……！<emoji=heart04>　乳首、乳首ぃっ……んんぁあっ……！<emoji=heart04>」
line = "「んんんぅっ！？<emoji=heart04>　ひ、ひぁぁあ、ああっ……！<emoji=heart04>　乳首、乳首ぃっ……んんぁあっ……！<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 息子とそっくりの指先が、私の膨れ上がった乳首をいじり始める。あまりに気持ちがよくて背中が反りかえってしまう。
line = "息子とそっくりの指先が、私の膨れ上がった乳首をいじり始める。あまりに気持ちがよくて背中が反りかえってしまう。"

[[dialogue]]
speaker = "リノ"
# 「あ、あああ、ぅ、んんんっ<emoji=heart04>　そ、それ、ダメです、感じすぎちゃう……！」
line = "「あ、あああ、ぅ、んんんっ<emoji=heart04>　そ、それ、ダメです、感じすぎちゃう……！」"

[[dialogue]]
speaker = "？？？"
# 「もっとしてってこと？」
line = "「もっとしてってこと？」"

[[dialogue]]
speaker = "unk"
# くりくりくりくり──指の腹でこね回すような動きがあまりに気持ちが良くて、背徳感もすごくて──
line = "くりくりくりくり──指の腹でこね回すような動きがあまりに気持ちが良くて、背徳感もすごくて──"

