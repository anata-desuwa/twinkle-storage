line = "煌嶺の九尾から、以前にも見た火球──機械型モンスターを包み込んだ──が姿を現す。大きさは、あの時と比べるべくもない極大サイズだ。"

[[dialogue]]
speaker = "unk"
# そのままディザスターハンドを包み込むが……
line = "そのままディザスターハンドを包み込むが……"

[[dialogue]]
speaker = "煌嶺"
# 「ほう、拒むか──」
line = "「ほう、拒むか──」"

[[dialogue]]
