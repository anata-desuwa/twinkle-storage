[[dialogue]]
speaker = "ルヴィネ"
# 「命令するわ、厄災の右腕……！　あなたに目的を与えてあげる──一直線で向かいなさい！！」
line = "「命令するわ、厄災の右腕……！　あなたに目的を与えてあげる──一直線で向かいなさい！！」"

[[dialogue]]
speaker = "unk"
