[[dialogue]]
speaker = "unk"
# きわめて高密度で、凄まじい重力を持つ。物質だけでなく光すらも飲み込む漆黒の天体。
line = "きわめて高密度で、凄まじい重力を持つ。物質だけでなく光すらも飲み込む漆黒の天体。"

[[dialogue]]
speaker = "unk"
# コラプサーと言えば俺たちになじみが深い──その名を、ブラックホール。
