line = "（知性のない、意思を持たぬモンスターならばこれで意のままだが──そうか）"

[[dialogue]]
speaker = "煌嶺"
# 「ククク……貴様──その<ruby=なり>形</ruby>でまだ生きておるのか？　……興味が尽きん！」
line = "「ククク……貴様──その<ruby>形<rt>なり</rt></ruby>でまだ生きておるのか？　……興味が尽きん！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「離れなさい──霊力の鎖をかける！！」
line = "「離れなさい──霊力の鎖をかける！！」"

[[dialogue]]
speaker = "unk"
# ルヴィネの霊力による拘束で、厄災の右腕ははっきりとその動きを鈍らせている。
line = "ルヴィネの霊力による拘束で、厄災の右腕ははっきりとその動きを鈍らせている。"

[[dialogue]]
speaker = "unk"
# だが──
line = "だが──"

[[dialogue]]
speaker = "ルヴィネ"
# 「命令系統は、復活させた……！　でも、くっ……長くは持たない……！」
line = "「命令系統は、復活させた……！　でも、くっ……長くは持たない……！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「こいつは何かを破壊する以外は、激しい抵抗をする……！　その場で大人しくしろというのは、もう難しい……！！」
line = "「こいつは何かを破壊する以外は、激しい抵抗をする……！　その場で大人しくしろというのは、もう難しい……！！」"

[[dialogue]]
speaker = "ベアトリス"
# 「そ、そうだっ……！　転送装置でベガに送るのはどうかな！？」
line = "「そ、そうだっ……！　転送装置でベガに送るのはどうかな！？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「いいえ。それは無意味……平行世界の移動はラクシスの持つ、お父様さえ自由にはできない権能……！」
line = "「いいえ。それは無意味……平行世界の移動はラクシスの持つ、お父様さえ自由にはできない権能……！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「転送装置の力も、ディザスターハンドから抽出したものを利用している……ベガに送っても自身の力ですぐに戻ってくるわ！」
line = "「転送装置の力も、ディザスターハンドから抽出したものを利用している……ベガに送っても自身の力ですぐに戻ってくるわ！」"

[[dialogue]]
speaker = "unk"
# この暴れ狂う怪物を拘束できる空間さえあれば……そんな場所、この地球には……
line = "この暴れ狂う怪物を拘束できる空間さえあれば……そんな場所、この地球には……"

[[dialogue]]
speaker = "unk"
# ──いや！
line = "──いや！"

[[dialogue]]
speaker = "クロト"
