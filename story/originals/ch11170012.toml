[[dialogue]]
speaker = "unk"
# 第２話,故郷の記憶,P
line = "第２話,故郷の記憶,P"

[[dialogue]]
speaker = "unk"
# 今日はサーシャさん、そして──
line = "今日はサーシャさん、そして──"

[[dialogue]]
speaker = "エンジュ"
# 「なんで、あたしがお前たちと行動を共にしなきゃならない……」
line = "「なんで、あたしがお前たちと行動を共にしなきゃならない……」"

[[dialogue]]
speaker = "unk"
# エンジュと一緒に街をパトロール。
line = "エンジュと一緒に街をパトロール。"

[[dialogue]]
speaker = "unk"
# エンジュは以前モンスターから市民を守ったことに鑑み、監視付きで外出が認められることになったのだ。
line = "エンジュは以前モンスターから市民を守ったことに鑑み、監視付きで外出が認められることになったのだ。"

[[dialogue]]
speaker = "サーシャ"
# 「エンジュちゃんと仲良くなりたいな～って思って、私が会長くんにお願いしたの～。きっと私と同じ、魔界のズヴィエダ地方の出身でしょう？」
line = "「エンジュちゃんと仲良くなりたいな～って思って、私が会長くんにお願いしたの～。きっと私と同じ、魔界のズヴィエダ地方の出身でしょう？」"

[[dialogue]]
speaker = "エンジュ"
# 「どこ出身とか言ってないのに、なんでわかるんだよ」
line = "「どこ出身とか言ってないのに、なんでわかるんだよ」"

[[dialogue]]
speaker = "サーシャ"
# 「なんとなく見たらわかるわ～」
line = "「なんとなく見たらわかるわ～」"

[[dialogue]]
speaker = "エンジュ"
# 「……ふん、同郷のよしみだ。今回は付き合ってやる。あたしの足を引っ張るなよ」
line = "「……ふん、同郷のよしみだ。今回は付き合ってやる。あたしの足を引っ張るなよ」"

[[dialogue]]
speaker = "モンスター"
# 「イ～～ッ！」
line = "「イ～～ッ！」"

[[dialogue]]
speaker = "女の子"
# 「ひゃーっ！　お化けー！？」
line = "「ひゃーっ！　お化けー！？」"

[[dialogue]]
speaker = "エンジュ"
# 「危ないっ！」
line = "「危ないっ！」"

[[dialogue]]
speaker = "unk"
# 俺たちが動くよりも早く駆け出したエンジュは、女の子をかばいながら、モンスターを瞬時に仕留めてみせた。
line = "俺たちが動くよりも早く駆け出したエンジュは、女の子をかばいながら、モンスターを瞬時に仕留めてみせた。"

[[dialogue]]
speaker = "エンジュ"
# 「間に合ってよかった。あいつらは神出鬼没だからな。気をつけて帰れよ」
line = "「間に合ってよかった。あいつらは神出鬼没だからな。気をつけて帰れよ」"

[[dialogue]]
speaker = "女の子"
# 「うんっ、ありがとう！　お姉ちゃんも気をつけてね！」
line = "「うんっ、ありがとう！　お姉ちゃんも気をつけてね！」"

[[dialogue]]
speaker = "サーシャ"
# 「頼れるお姉ちゃんね～、偉いわ♪」
line = "「頼れるお姉ちゃんね～、偉いわ♪」"

[[dialogue]]
speaker = "エンジュ"
# 「うるさい。あんな小さい子に目の前で死なれたら夢見が悪いだろうが」
line = "「うるさい。あんな小さい子に目の前で死なれたら夢見が悪いだろうが」"

[[dialogue]]
speaker = "unk"
# 一般人のためには戦うんだね
line = "一般人のためには戦うんだね"

[[dialogue]]
speaker = "エンジュ"
# 「あたしが嫌いなのは星騎士だけだよ。力のないやつらは守らねえと……あいつと一緒になっちまう」
line = "「あたしが嫌いなのは星騎士だけだよ。力のないやつらは守らねえと……あいつと一緒になっちまう」"

[[dialogue]]
speaker = "サーシャ"
# 「あいつ？」
line = "「あいつ？」"

[[dialogue]]
speaker = "エンジュ"
# 「あいつっつったらあいつだよ……忌々しい、あの女……！」
line = "「あいつっつったらあいつだよ……忌々しい、あの女……！」"

[[dialogue]]
speaker = "unk"
# 何があったのか教えて欲しい
line = "何があったのか教えて欲しい"

[[dialogue]]
speaker = "unk"
# あいつじゃわからないから
line = "あいつじゃわからないから"

[[dialogue]]
speaker = "サーシャ"
# 「私たちも嫌い嫌いって言われてるだけじゃ、どうすればいいのかわからないし、歩み寄る努力もできないでしょ～？」
line = "「私たちも嫌い嫌いって言われてるだけじゃ、どうすればいいのかわからないし、歩み寄る努力もできないでしょ～？」"

[[dialogue]]
speaker = "エンジュ"
# 「……あたしが生まれたのは、ズヴィエダ地方でも果ての方の、小さな町だった」
line = "「……あたしが生まれたのは、ズヴィエダ地方でも果ての方の、小さな町だった」"

[[dialogue]]
speaker = "エンジュ"
# 「その町には『星騎士』がいた。<b>あいつ</b>は町の有力者の娘で、ずいぶん偉そうにふんぞり返ってやがった」
line = "「その町には『星騎士』がいた。<b>あいつ</b>は町の有力者の娘で、ずいぶん偉そうにふんぞり返ってやがった」"

[[dialogue]]
speaker = "サーシャ"
# 「でも正式な星騎士じゃないわよね～？　まだ新星学園にも流星学園にも入学してないんだし」
line = "「でも正式な星騎士じゃないわよね～？　まだ新星学園にも流星学園にも入学してないんだし」"

[[dialogue]]
speaker = "エンジュ"
# 「正式とかそうじゃないとか、お前らのルールなんざ知らねえよ」
line = "「正式とかそうじゃないとか、お前らのルールなんざ知らねえよ」"

[[dialogue]]
speaker = "エンジュ"
# 「だけどそいつには確かに星力があって、『自分は特別な存在だ』とかほざいてやがった」
line = "「だけどそいつには確かに星力があって、『自分は特別な存在だ』とかほざいてやがった」"

[[dialogue]]
speaker = "エンジュ"
# 「権力者の娘で、わずかとはいえ特別な力が宿ってりゃ、調子に乗るのは目に見えるだろ？」
line = "「権力者の娘で、わずかとはいえ特別な力が宿ってりゃ、調子に乗るのは目に見えるだろ？」"

[[dialogue]]
speaker = "エンジュ"
# 「果ても果ての田舎町じゃ、その横暴を止められるヤツなんていやしない。あいつは同年代の子どもをまるで家来や奴隷のように扱い、遊び半分でいたぶりやがった」
line = "「果ても果ての田舎町じゃ、その横暴を止められるヤツなんていやしない。あいつは同年代の子どもをまるで家来や奴隷のように扱い、遊び半分でいたぶりやがった」"

[[dialogue]]
speaker = "エンジュ"
# 「だけどあたしは生まれた時から、こんな性格だったからな。あんなやつに死んでも媚びるつもりはなかった」
line = "「だけどあたしは生まれた時から、こんな性格だったからな。あんなやつに死んでも媚びるつもりはなかった」"

[[dialogue]]
speaker = "エンジュ"
# 「そんなあたしが気に入らなかったんだろうな。星騎士様には毎日のように難癖をつけられ、体のいいオモチャにされたよ」
line = "「そんなあたしが気に入らなかったんだろうな。星騎士様には毎日のように難癖をつけられ、体のいいオモチャにされたよ」"

[[dialogue]]
speaker = "エンジュ"
# 「最初はあたしと同じように反抗していた子どもたちもいたけど、１人、また１人とあたしの周りからいなくなった」
line = "「最初はあたしと同じように反抗していた子どもたちもいたけど、１人、また１人とあたしの周りからいなくなった」"

[[dialogue]]
speaker = "エンジュ"
# 「それでもあたしは屈することなく、抵抗を続けた」
line = "「それでもあたしは屈することなく、抵抗を続けた」"

[[dialogue]]
speaker = "unk"
# …………
line = "…………"

[[dialogue]]
speaker = "エンジュ"
# 「そしたらあいつは、あたしだけじゃなく、うちの家族にまで手を出しやがった」
line = "「そしたらあいつは、あたしだけじゃなく、うちの家族にまで手を出しやがった」"

[[dialogue]]
speaker = "エンジュ"
# 「あいつは権力で家族を脅し、星力を使って痛めつけて、抵抗できないあたしの頭を踏みつけながら、心ゆくまでなじった」
line = "「あいつは権力で家族を脅し、星力を使って痛めつけて、抵抗できないあたしの頭を踏みつけながら、心ゆくまでなじった」"

[[dialogue]]
speaker = "エンジュ"
# 「そしてあたしは、町中の皆の前で土下座させられ、言わされた。『もう、あなた様には逆らいません』って心にもないことをな」
line = "「そしてあたしは、町中の皆の前で土下座させられ、言わされた。『もう、あなた様には逆らいません』って心にもないことをな」"

[[dialogue]]
speaker = "サーシャ"
# 「エンジュちゃんは何も悪くないのに……」
line = "「エンジュちゃんは何も悪くないのに……」"

[[dialogue]]
speaker = "エンジュ"
# 「慰めの言葉なんかいらない。この屈辱こそがあたしの復讐心の原点で、力の源泉だからな」
line = "「慰めの言葉なんかいらない。この屈辱こそがあたしの復讐心の原点で、力の源泉だからな」"

[[dialogue]]
speaker = "unk"
# 星騎士を嫌う理由がよくわかったよ
line = "星騎士を嫌う理由がよくわかったよ"

[[dialogue]]
speaker = "エンジュ"
# 「……フン」
line = "「……フン」"

[[dialogue]]
speaker = "サーシャ"
# 「もしかして、星騎士が嫌いな理由がまだあるの？」
line = "「もしかして、星騎士が嫌いな理由がまだあるの？」"

[[dialogue]]
speaker = "エンジュ"
# 「そりゃあるさ。とびっきりのがな」
line = "「そりゃあるさ。とびっきりのがな」"

[[dialogue]]
speaker = "エンジュ"
# 「そんなに聞きたきゃ聞かせてやる。お前ら星騎士の、情けなくてかっこ悪い話をな」
line = "「そんなに聞きたきゃ聞かせてやる。お前ら星騎士の、情けなくてかっこ悪い話をな」"

[[dialogue]]
speaker = "unk"
# 顔を見合わせた俺とサーシャさんは、エンジュを腰を落ち着けられる新星星徒会室へと案内した。
line = "顔を見合わせた俺とサーシャさんは、エンジュを腰を落ち着けられる新星星徒会室へと案内した。"
