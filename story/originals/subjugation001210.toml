[[dialogue]]
speaker = "unk"
# 新星学園、オープンキャンパスの夜──急遽開催が決定された、学園生のアイドルユニット『アーネスト』のライブは、超満員での幕開けとなった。
line = "新星学園、オープンキャンパスの夜──急遽開催が決定された、学園生のアイドルユニット『アーネスト』のライブは、超満員での幕開けとなった。"

[[dialogue]]
speaker = "レミカ"
# 「みんな、今日は私たちのライブを観に来てくれて……ありがとうっ……！！」
line = "「みんな、今日は私たちのライブを観に来てくれて……ありがとうっ……！！」"

[[dialogue]]
speaker = "メルエル"
# 「オープンキャンパス、楽しんでもらえたかな……！？　少しでも新星学園を受けてみたいって思ってくれたら、嬉しいな！」
line = "「オープンキャンパス、楽しんでもらえたかな……！？　少しでも新星学園を受けてみたいって思ってくれたら、嬉しいな！」"

[[dialogue]]
speaker = "レミカ"
# 「私たちは『アーネスト』！　新星学園生で結成した、今夜だけのアイドルユニットです！」
line = "「私たちは『アーネスト』！　新星学園生で結成した、今夜だけのアイドルユニットです！」"

[[dialogue]]
speaker = "メルエル"
# 「新星学園は、モンスターとリクリエに対抗するために設立された星騎士育成機関！　だけど……戦うだけじゃないんだよ！」
line = "「新星学園は、モンスターとリクリエに対抗するために設立された星騎士育成機関！　だけど……戦うだけじゃないんだよ！」"

[[dialogue]]
speaker = "レミカ"
# 「学生らしく恋愛をしたり！　遊んだり！　歌ったり！　青春を過ごす場所で……！」
line = "「学生らしく恋愛をしたり！　遊んだり！　歌ったり！　青春を過ごす場所で……！」"

[[dialogue]]
speaker = "メルエル"
# 「私たちはこの学園が大好きです！　一緒に通う友達も、先生も、みんなが大好き！！」
line = "「私たちはこの学園が大好きです！　一緒に通う友達も、先生も、みんなが大好き！！」"

[[dialogue]]
speaker = "レミカ"
# 「私たちが歌っているところ、踊っているところを見て……ああ、この学園はこんなにも楽しい場所なんだって思ってもらえたら……！」
line = "「私たちが歌っているところ、踊っているところを見て……ああ、この学園はこんなにも楽しい場所なんだって思ってもらえたら……！」"

[[dialogue]]
speaker = "メルエル"
# 「この会場に来てくれたみんなに、この学園を好きになってもらえたら……とっても嬉しいです！！」
line = "「この会場に来てくれたみんなに、この学園を好きになってもらえたら……とっても嬉しいです！！」"

[[dialogue]]
speaker = "レミカ"
# 「キラキラの学園生活は、新星学園とアーネストにお任せ！！」
line = "「キラキラの学園生活は、新星学園とアーネストにお任せ！！」"

[[dialogue]]
speaker = "メルエル"
# 「それじゃあ、いっくよー！　ライブスタート！！」
line = "「それじゃあ、いっくよー！　ライブスタート！！」"

[[dialogue]]
speaker = "レミカ"
# 「アーネストの最初の曲名は──」
line = "「アーネストの最初の曲名は──」"

[[dialogue]]
speaker = "メルエル"
# 「『アイドルスターナイト・フィーバー！』」
line = "「『アイドルスターナイト・フィーバー！』」"

[[dialogue]]
speaker = "unk"
# ──１日限りの、アーネストのライブは大盛況で幕を閉じた。
line = "──１日限りの、アーネストのライブは大盛況で幕を閉じた。"

[[dialogue]]
speaker = "unk"
# 洪水のように慌ただしい日々はようやく終わり、俺は普段通りの穏やかな生活に──
line = "洪水のように慌ただしい日々はようやく終わり、俺は普段通りの穏やかな生活に──"

[[dialogue]]
speaker = "アナ"
# 「戻れると思っていたのですか、会長。各部活動からの申請書類をどうぞ」
line = "「戻れると思っていたのですか、会長。各部活動からの申請書類をどうぞ」"

[[dialogue]]
speaker = "unk"
# 何だこの書類の束……！？
line = "何だこの書類の束……！？"

[[dialogue]]
speaker = "アナ"
# 「先日のアーネストの貸し切りライブを受けて、どこもかしこも羨ましがってる。アリーナの使用申請がわんさか」
line = "「先日のアーネストの貸し切りライブを受けて、どこもかしこも羨ましがってる。アリーナの使用申請がわんさか」"

[[dialogue]]
speaker = "アナ"
# 「そちらの、ラメ加工と七色のマーカーで目立ってるのは薙刀部。どうしても使いたいそうです」
line = "「そちらの、ラメ加工と七色のマーカーで目立ってるのは薙刀部。どうしても使いたいそうです」"

[[dialogue]]
speaker = "マトイ"
# 「また薙刀部！？　いったい何をするの、アリーナで！」
line = "「また薙刀部！？　いったい何をするの、アリーナで！」"

[[dialogue]]
speaker = "サーシャ"
# 「購買部から箱詰めのドリンクが届いてるわよ～♪　朝昼晩と１本ずつ飲んで、性別が変わった時は連絡をちょうだい、だって♪」
line = "「購買部から箱詰めのドリンクが届いてるわよ～♪　朝昼晩と１本ずつ飲んで、性別が変わった時は連絡をちょうだい、だって♪」"

[[dialogue]]
speaker = "unk"
# 今後不定期で女の子化するの！？
line = "今後不定期で女の子化するの！？"

[[dialogue]]
speaker = "unk"
# ええええぇ！？
line = "ええええぇ！？"

[[dialogue]]
speaker = "マトイ"
# 「だ、大丈夫だよ会長。私、可愛い男の娘の相手は慣れてるから……！」
line = "「だ、大丈夫だよ会長。私、可愛い男の娘の相手は慣れてるから……！」"

[[dialogue]]
speaker = "アナ"
# 「マトイ先輩、そういう問題では……」
line = "「マトイ先輩、そういう問題では……」"

[[dialogue]]
speaker = "unk"
# そんなことをしていると――
line = "そんなことをしていると――"

[[dialogue]]
speaker = "unk"
# ちょっと失礼！
line = "ちょっと失礼！"

[[dialogue]]
speaker = "unk"
# あ、レミカたちから連絡だ……！
line = "あ、レミカたちから連絡だ……！"

[[dialogue]]
speaker = "unk"
# や、２人とも
line = "や、２人とも"

[[dialogue]]
speaker = "メルエル"
# 「あっ、会長くん！　お疲れ様……！　昨日は本当にありがとう！　改めてお礼を言おうってレミカちゃんと話してたんだ！」
line = "「あっ、会長くん！　お疲れ様……！　昨日は本当にありがとう！　改めてお礼を言おうってレミカちゃんと話してたんだ！」"

[[dialogue]]
speaker = "レミカ"
# 「あんなに素敵なステージで踊れたのも、会長のおかげだよ……ありがとう！」
line = "「あんなに素敵なステージで踊れたのも、会長のおかげだよ……ありがとう！」"

[[dialogue]]
speaker = "unk"
# 俺はアーネストのプロデューサーだから
line = "俺はアーネストのプロデューサーだから"

[[dialogue]]
speaker = "unk"
# 気にしないでいいよ
line = "気にしないでいいよ"

[[dialogue]]
speaker = "レミカ"
# 「ぷっ……ぷふっ……ふふっ……！」
line = "「ぷっ……ぷふっ……ふふっ……！」"

[[dialogue]]
speaker = "unk"
# 何で笑うんだ！？
line = "何で笑うんだ！？"

[[dialogue]]
speaker = "メルエル"
# 「あはは……２人で話してたの。ありがとうって言ったら、会長くんは何て返してくるかなって」
line = "「あはは……２人で話してたの。ありがとうって言ったら、会長くんは何て返してくるかなって」"

[[dialogue]]
speaker = "レミカ"
# 「ふふっ……よ、予想通りの返事だったから、つい……いや、うんっ……ふふっ……笑ってなんか、ないんだけど……！」
line = "「ふふっ……よ、予想通りの返事だったから、つい……いや、うんっ……ふふっ……笑ってなんか、ないんだけど……！」"

[[dialogue]]
speaker = "メルエル"
# 「その言い訳は無理があるような……ねえレミカちゃん、会長くんにお願いしたいことがあるんじゃないの？」
line = "「その言い訳は無理があるような……ねえレミカちゃん、会長くんにお願いしたいことがあるんじゃないの？」"

[[dialogue]]
speaker = "レミカ"
# 「ん、んんっ、そうだった。会長、メルエルの説得を手伝ってくれない？　アーネストの再結成をしたいんだけど、うんって言ってくれないんだよね」
line = "「ん、んんっ、そうだった。会長、メルエルの説得を手伝ってくれない？　アーネストの再結成をしたいんだけど、うんって言ってくれないんだよね」"

[[dialogue]]
speaker = "メルエル"
# 「ええっ、そんな相談をするつもりだったの！？　というか、私をアイドルのしがらみに巻き込まないための１日限定ユニットだって、かっこよく言ってたよね！？」
line = "「ええっ、そんな相談をするつもりだったの！？　というか、私をアイドルのしがらみに巻き込まないための１日限定ユニットだって、かっこよく言ってたよね！？」"

[[dialogue]]
speaker = "レミカ"
# 「そんな昔のこと、ライブの熱気で全部忘れちゃったよ」
line = "「そんな昔のこと、ライブの熱気で全部忘れちゃったよ」"

[[dialogue]]
speaker = "メルエル"
# 「私は星騎士の訓練もあるし、本格的にアイドルを始めたら、会長くんと会う時間も少なくなっちゃうからダメって……！」
line = "「私は星騎士の訓練もあるし、本格的にアイドルを始めたら、会長くんと会う時間も少なくなっちゃうからダメって……！」"

[[dialogue]]
speaker = "レミカ"
# 「こんな感じで、なかなかＯＫしてくれないんだよね」
line = "「こんな感じで、なかなかＯＫしてくれないんだよね」"

[[dialogue]]
speaker = "メルエル"
# 「私の意見は変わらないよっ！　……って、ああっ、なんか恥ずかしいことを言っちゃった気がする！？」
line = "「私の意見は変わらないよっ！　……って、ああっ、なんか恥ずかしいことを言っちゃった気がする！？」"

[[dialogue]]
speaker = "メルエル"
# 「そ、そうだ～、そろそろボランティア部のお仕事の時間だったような……！　それじゃあね会長くん。また今度！」
line = "「そ、そうだ～、そろそろボランティア部のお仕事の時間だったような……！　それじゃあね会長くん。また今度！」"

[[dialogue]]
speaker = "レミカ"
# 「あ、行っちゃった……はぁ、残念。メルエルとなら絶対にカワイイ系アイドルのてっぺんを取れる気がするんだけどな」
line = "「あ、行っちゃった……はぁ、残念。メルエルとなら絶対にカワイイ系アイドルのてっぺんを取れる気がするんだけどな」"

[[dialogue]]
speaker = "レミカ"
# 「……わかってるよ、会長。本人が嫌がってるのに無理は言わないから」
line = "「……わかってるよ、会長。本人が嫌がってるのに無理は言わないから」"

[[dialogue]]
speaker = "レミカ"
# 「──改めて今回の件はありがとう。会長には本当にお世話になっちゃったね」
line = "「──改めて今回の件はありがとう。会長には本当にお世話になっちゃったね」"

[[dialogue]]
speaker = "レミカ"
# 「私のアイドルフォーム、戦闘服として安定して覚醒するようになったから。力になれそうな時はいつでも呼んで」
line = "「私のアイドルフォーム、戦闘服として安定して覚醒するようになったから。力になれそうな時はいつでも呼んで」"

[[dialogue]]
speaker = "レミカ"
# 「あと……これ、受け取ってくれるかな。今度うちの事務所でやるライブのチケット。２席とっておいたから、メルエル誘って見に来てよ」
line = "「あと……これ、受け取ってくれるかな。今度うちの事務所でやるライブのチケット。２席とっておいたから、メルエル誘って見に来てよ」"

[[dialogue]]
speaker = "レミカ"
# 「そ。あの子、すごく頑張ってくれたから。打ち上げ感覚でデートに誘ってあげて。きっと喜ぶと思うから」
line = "「そ。あの子、すごく頑張ってくれたから。打ち上げ感覚でデートに誘ってあげて。きっと喜ぶと思うから」"

[[dialogue]]
speaker = "レミカ"
# 「うん。それじゃあ、また……！」
line = "「うん。それじゃあ、また……！」"

[[dialogue]]
speaker = "unk"
# アイドルらしい満面の笑みを浮かべて、レミカは去って行った。
line = "アイドルらしい満面の笑みを浮かべて、レミカは去って行った。"

[[dialogue]]
speaker = "unk"
# アーネストが１日かぎりで解散してしまうのは残念だけれど、未来はどうなるかはわからない。
line = "アーネストが１日かぎりで解散してしまうのは残念だけれど、未来はどうなるかはわからない。"

[[dialogue]]
speaker = "unk"
# 数年後に思い出話となるのか、はたまたメルエルとレミカのユニットライブを再び見られる日が来るのか……
line = "数年後に思い出話となるのか、はたまたメルエルとレミカのユニットライブを再び見られる日が来るのか……"

[[dialogue]]
speaker = "unk"
# ２人の素敵なアイドルからもらったパワーで今日も頑張ろう。
line = "２人の素敵なアイドルからもらったパワーで今日も頑張ろう。"

[[dialogue]]
speaker = "unk"
# とりあえず書類をびしばし片付けて、スケジュールを空けて。もらったチケットでメルエルをデートに誘おうと思うのだった──
line = "とりあえず書類をびしばし片付けて、スケジュールを空けて。もらったチケットでメルエルをデートに誘おうと思うのだった──"
