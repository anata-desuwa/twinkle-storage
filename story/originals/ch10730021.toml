[[dialogue]]
speaker = "unk"
# 第１話,緋宮リノの初恋,P
line = "第１話,緋宮リノの初恋,P"

[[dialogue]]
speaker = "unk"
# ある朝。私――緋宮リノは起床してきた息子に声をかける。
line = "ある朝。私――緋宮リノは起床してきた息子に声をかける。"

[[dialogue]]
speaker = "リノ"
# 「あっ、クロト……お、おはよう」
line = "「あっ、クロト……お、おはよう」"

[[dialogue]]
speaker = "unk"
# う、うん。おはよう、母さん
line = "う、うん。おはよう、母さん"

[[dialogue]]
speaker = "unk"
# ぎこちない返事をして、クロトは顔を洗いにそそくさとリビングを離れていってしまう。
line = "ぎこちない返事をして、クロトは顔を洗いにそそくさとリビングを離れていってしまう。"

[[dialogue]]
speaker = "リノ"
# （ああ……気まずいことになっちゃったわ……）
line = "（ああ……気まずいことになっちゃったわ……）"

[[dialogue]]
speaker = "unk"
# クロトの変な反応の原因は分かっている。少し前に見てしまった『夢』だ。
line = "クロトの変な反応の原因は分かっている。少し前に見てしまった『夢』だ。"

[[dialogue]]
speaker = "リノ"
# （私は魔女として、『空間魔法』に最も適性がある）
line = "（私は魔女として、『空間魔法』に最も適性がある）"

[[dialogue]]
speaker = "リノ"
# （その中でも、私だけに可能なのが『世界の境界を超越し、平行世界を観測する』ことができる『平行観測』という固有の魔法だ）
line = "（その中でも、私だけに可能なのが『世界の境界を超越し、平行世界を観測する』ことができる『平行観測』という固有の魔法だ）"

[[dialogue]]
speaker = "リノ"
# （でも、その魔法には厄介な点がある）
line = "（でも、その魔法には厄介な点がある）"

[[dialogue]]
speaker = "リノ"
# （制御が非常に難しい魔法で、時折、私の意思とは無関係に発動してしまうことがあるのだ）
line = "（制御が非常に難しい魔法で、時折、私の意思とは無関係に発動してしまうことがあるのだ）"

[[dialogue]]
speaker = "リノ"
# （例えばそう……私の意識が離れた、眠っている時などに、異なる世界の記憶を観測し、『夢』として勝手に流れ込んで来てしまうことがある）
line = "（例えばそう……私の意識が離れた、眠っている時などに、異なる世界の記憶を観測し、『夢』として勝手に流れ込んで来てしまうことがある）"

[[dialogue]]
speaker = "リノ"
# （それで今回、クロトが以前よりも魔王の力を覚醒させた影響か、<b>事故</b>が起きてしまった――）
line = "（それで今回、クロトが以前よりも魔王の力を覚醒させた影響か、<b>事故</b>が起きてしまった――）"

[[dialogue]]
speaker = "リノ"
# （私が見た夢を、クロトも同じく見てしまったのだ）
line = "（私が見た夢を、クロトも同じく見てしまったのだ）"

[[dialogue]]
speaker = "リノ"
# （そのことがなんとなく、私にも感覚的に伝わって来てしまっている。そして、それはクロトも同様）
line = "（そのことがなんとなく、私にも感覚的に伝わって来てしまっている。そして、それはクロトも同様）"

[[dialogue]]
speaker = "リノ"
# （『同じ夢を見た』ということが、お互いに伝わってしまっているのだ）
line = "（『同じ夢を見た』ということが、お互いに伝わってしまっているのだ）"

[[dialogue]]
speaker = "リノ"
# （その夢の内容が、一体何だったのかといえば――）
line = "（その夢の内容が、一体何だったのかといえば――）"

[[dialogue]]
speaker = "リノ"
# （それは……平行世界で、私と、クロトと同一存在である魔王――ラクシスが<b>恋人</b>として寄り添い、触れ合っている記憶だ）
line = "（それは……平行世界で、私と、クロトと同一存在である魔王――ラクシスが<b>恋人</b>として寄り添い、触れ合っている記憶だ）"

[[dialogue]]
speaker = "リノ"
# （私の観測した平行世界では、クロトは魔王ラクシスとして目覚めて成長しているようだった。おそらく、私とは後から違う形で知り合ったのだろう）
line = "（私の観測した平行世界では、クロトは魔王ラクシスとして目覚めて成長しているようだった。おそらく、私とは後から違う形で知り合ったのだろう）"

[[dialogue]]
speaker = "リノ"
# （その結果、親子ではなく、男女として仲良くなり、恋愛関係になった――）
line = "（その結果、親子ではなく、男女として仲良くなり、恋愛関係になった――）"

[[dialogue]]
speaker = "unk"
# 夢で見た記憶を思い出し、私は顔が熱くなってしまう。
line = "夢で見た記憶を思い出し、私は顔が熱くなってしまう。"

[[dialogue]]
speaker = "リノ"
# （そして、クロトとあんなことやこんなことを……）
line = "（そして、クロトとあんなことやこんなことを……）"

[[dialogue]]
speaker = "リノ"
# （って、いけないいけない！　何を考えているの私！　相手は血が繋がっていないとはいえ、これまで本当の息子のように思って育てて来た子なのよ！？）
line = "（って、いけないいけない！　何を考えているの私！　相手は血が繋がっていないとはいえ、これまで本当の息子のように思って育てて来た子なのよ！？）"

[[dialogue]]
speaker = "unk"
# 私はぶんぶんと首を横に振って、クロトがリビングに戻って来る前に、変な考えを振り払うのだった――
line = "私はぶんぶんと首を横に振って、クロトがリビングに戻って来る前に、変な考えを振り払うのだった――"

[[dialogue]]
speaker = "unk"
# それから数日後のこと。
line = "それから数日後のこと。"

[[dialogue]]
speaker = "unk"
# ただいま、母さん
line = "ただいま、母さん"

[[dialogue]]
speaker = "リノ"
# 「あっ……お帰りなさい」
line = "「あっ……お帰りなさい」"

[[dialogue]]
speaker = "リノ"
# 「ちょうど緑茶を淹れたばっかりなんだけど……クロトも飲む？」
line = "「ちょうど緑茶を淹れたばっかりなんだけど……クロトも飲む？」"

[[dialogue]]
speaker = "unk"
# あのさ……夢の話なんだけど
line = "あのさ……夢の話なんだけど"

[[dialogue]]
speaker = "リノ"
# 「！？　ごほっ……ごほごほっ！」
line = "「！？　ごほっ……ごほごほっ！」"

[[dialogue]]
speaker = "unk"
# 私は緑茶を飲んでいた途中で言われて、むせてしまう。
line = "私は緑茶を飲んでいた途中で言われて、むせてしまう。"

[[dialogue]]
speaker = "unk"
# 母さん、大丈夫！？
line = "母さん、大丈夫！？"

[[dialogue]]
speaker = "リノ"
# 「え、ええ。……やっぱり、クロトも同じ夢を見ちゃったのよね」
line = "「え、ええ。……やっぱり、クロトも同じ夢を見ちゃったのよね」"

[[dialogue]]
speaker = "unk"
# クロトは頷く。
line = "クロトは頷く。"

[[dialogue]]
speaker = "リノ"
# 「その……夢を見たのは、お母さんの魔法のせいなの」
line = "「その……夢を見たのは、お母さんの魔法のせいなの」"

[[dialogue]]
speaker = "unk"
# 私はそれから『平行観測』の魔法について説明をして――
line = "私はそれから『平行観測』の魔法について説明をして――"

[[dialogue]]
speaker = "リノ"
# 「つまりは、意図しない事故で……。だから、今回のことは忘れてくれるとありがたいわ」
line = "「つまりは、意図しない事故で……。だから、今回のことは忘れてくれるとありがたいわ」"

[[dialogue]]
speaker = "リノ"
# 「でも、お母さんの変なところを見せちゃって、気持ち悪かったわよね……ごめんなさい」
line = "「でも、お母さんの変なところを見せちゃって、気持ち悪かったわよね……ごめんなさい」"

[[dialogue]]
speaker = "unk"
# 気持ち悪いわけない！
line = "気持ち悪いわけない！"

[[dialogue]]
speaker = "unk"
# クロトはそう言うと、両手で私の手を取る。
line = "クロトはそう言うと、両手で私の手を取る。"

[[dialogue]]
speaker = "リノ"
# 「へ！？　く、クロト……！？」
line = "「へ！？　く、クロト……！？」"

[[dialogue]]
speaker = "unk"
# クロトの顔を見ると……そこには私が大切にして来た最愛の男の子の、真剣な眼差しがあって。
line = "クロトの顔を見ると……そこには私が大切にして来た最愛の男の子の、真剣な眼差しがあって。"

[[dialogue]]
speaker = "リノ"
# （あ、あの夢を見たせいか、クロトの顔がいつもの２００％増しくらいで、イケメンに見えちゃう……！）
line = "（あ、あの夢を見たせいか、クロトの顔がいつもの２００％増しくらいで、イケメンに見えちゃう……！）"

[[dialogue]]
speaker = "unk"
# 母さんは、俺のこと――
line = "母さんは、俺のこと――"

[[dialogue]]
speaker = "リノ"
# 「お、お母さん、今思い出しちゃったわっ！」
line = "「お、お母さん、今思い出しちゃったわっ！」"

[[dialogue]]
speaker = "unk"
# え？
line = "え？"

[[dialogue]]
speaker = "unk"
# ばっと手を引っ込めて、立ち上がる私。
line = "ばっと手を引っ込めて、立ち上がる私。"

[[dialogue]]
speaker = "リノ"
# 「晩ご飯の買い物、すっかり忘れちゃってた！　ちょっとスーパーまでダッシュで行ってくるわね！！」
line = "「晩ご飯の買い物、すっかり忘れちゃってた！　ちょっとスーパーまでダッシュで行ってくるわね！！」"

[[dialogue]]
speaker = "unk"
# ちょっ、母さん？
line = "ちょっ、母さん？"

[[dialogue]]
speaker = "リノ"
# 「行ってきまぁぁぁ～～～す！！！」
line = "「行ってきまぁぁぁ～～～す！！！」"

[[dialogue]]
speaker = "unk"
# そのまま、私は家から逃げるように飛び出して来てしまった。
line = "そのまま、私は家から逃げるように飛び出して来てしまった。"

[[dialogue]]
speaker = "リノ"
# （ああ……マズい……。本当に、マズいわ……！）
line = "（ああ……マズい……。本当に、マズいわ……！）"

[[dialogue]]
speaker = "リノ"
# （クロトは息子なのに――）
line = "（クロトは息子なのに――）"

[[dialogue]]
speaker = "unk"
# 自身の胸に手を当てる。
line = "自身の胸に手を当てる。"

[[dialogue]]
speaker = "リノ"
# （私、今この瞬間、生まれていちばんドキドキしちゃってる……）
line = "（私、今この瞬間、生まれていちばんドキドキしちゃってる……）"

[[dialogue]]
speaker = "unk"
# 高鳴る心臓の鼓動に、私はどうしようもなく戸惑ってしまうのだった――
line = "高鳴る心臓の鼓動に、私はどうしようもなく戸惑ってしまうのだった――"
