[[dialogue]]
speaker = "unk"
# 第２話,暴走,B
line = "第２話,暴走,B"

[[dialogue]]
speaker = "クロト"
# 「くっ……はぁ……はぁ……」
line = "「くっ……はぁ……はぁ……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「くぅ……今の、クロトがやったの……？」
line = "「くぅ……今の、クロトがやったの……？」"

[[dialogue]]
speaker = "梨緒"
# 「ヴィーナス、何があった！？」
line = "「ヴィーナス、何があった！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私にもわかんないわ！　突然クロトが苦しみ出したと思ったら、衝撃波がドカーンってなって！」
line = "「私にもわかんないわ！　突然クロトが苦しみ出したと思ったら、衝撃波がドカーンってなって！」"

[[dialogue]]
speaker = "梨緒"
# 「苦しみ出して……？　まさか──」
line = "「苦しみ出して……？　まさか──」"

[[dialogue]]
speaker = "梨緒"
# 「以前ジグが現れた時、やつが魔王に何かしていた」
line = "「以前ジグが現れた時、やつが魔王に何かしていた」"

[[dialogue]]
speaker = "梨緒"
# 「ギリギリで阻止できたものと思っていたが、甘かったか……！」
line = "「ギリギリで阻止できたものと思っていたが、甘かったか……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ジグが……！？　何それ、あいつのせいでクロトがあんなになっちゃったってこと！？」
line = "「ジグが……！？　何それ、あいつのせいでクロトがあんなになっちゃったってこと！？」"

[[dialogue]]
speaker = "unk"
# ヴィーナスたちの視線の先には、幽鬼のように佇む緋宮クロトの姿があった。
line = "ヴィーナスたちの視線の先には、幽鬼のように佇む緋宮クロトの姿があった。"

[[dialogue]]
speaker = "unk"
# さらにクロトはその腕を振りかぶって──
line = "さらにクロトはその腕を振りかぶって──"

[[dialogue]]
speaker = "クロト"
# 「ク……オオオ……ッ！」
line = "「ク……オオオ……ッ！」"

[[dialogue]]
speaker = "unk"
# 獣じみた呻きとともに、瘴気を帯びた拳を繰り出した。
line = "獣じみた呻きとともに、瘴気を帯びた拳を繰り出した。"

[[dialogue]]
speaker = "unk"
# ヴィーナスは咄嗟に杖に星力を宿し、拳撃の威力を相殺しながら受け止めた。
line = "ヴィーナスは咄嗟に杖に星力を宿し、拳撃の威力を相殺しながら受け止めた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロト──！」
line = "「クロト──！」"

[[dialogue]]
speaker = "梨緒"
# 「この……！」
line = "「この……！」"

[[dialogue]]
speaker = "unk"
# 梨緒が彼を止めようと矢を放つが、クロトがまとう紫の瘴気に呑まれて消える。
line = "梨緒が彼を止めようと矢を放つが、クロトがまとう紫の瘴気に呑まれて消える。"

[[dialogue]]
speaker = "ヴィーナス"
# 「この力……リクリエの……！？」
line = "「この力……リクリエの……！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「まさか自分に封印してたリクリエの力に操られてるってこと！？　今まで抑えられてたのに！？」
line = "「まさか自分に封印してたリクリエの力に操られてるってこと！？　今まで抑えられてたのに！？」"

[[dialogue]]
speaker = "クロト"
# 「オオオッ……！」
line = "「オオオッ……！」"

[[dialogue]]
speaker = "梨緒"
# 「くっ……」
line = "「くっ……」"

[[dialogue]]
speaker = "unk"
# クロトが低い叫びを上げて迫り、梨緒とヴィーナスが左右に散開して回避する。
line = "クロトが低い叫びを上げて迫り、梨緒とヴィーナスが左右に散開して回避する。"

[[dialogue]]
speaker = "unk"
# 次の瞬間、２人が元居た場所に拳が叩きつけられ、地鳴りとともにアスファルトが抉れて大穴を開けた。
line = "次の瞬間、２人が元居た場所に拳が叩きつけられ、地鳴りとともにアスファルトが抉れて大穴を開けた。"

[[dialogue]]
speaker = "梨緒"
# 「インパルスストリーム！」
line = "「インパルスストリーム！」"

[[dialogue]]
speaker = "クロト"
# 「ウウッ……！」
line = "「ウウッ……！」"

[[dialogue]]
speaker = "unk"
# モンスターを焼き焦がす稲妻の奔流も、拳の一薙ぎでかき消される。
line = "モンスターを焼き焦がす稲妻の奔流も、拳の一薙ぎでかき消される。"

[[dialogue]]
speaker = "ナターシャ"
# 「うひゃー、さすが魔王ってところかな」
line = "「うひゃー、さすが魔王ってところかな」"

[[dialogue]]
speaker = "梨緒"
# 「魔王の真の力はこんなものじゃない。彼が本気なら、私たちはとっくに倒されている」
line = "「魔王の真の力はこんなものじゃない。彼が本気なら、私たちはとっくに倒されている」"

[[dialogue]]
speaker = "梨緒"
# 「おそらく今表に出ているのは、ジグに暴走させられたリクリエの力だけ。彼はまだ世界を滅ぼすまいと抗っているんだ」
line = "「おそらく今表に出ているのは、ジグに暴走させられたリクリエの力だけ。彼はまだ世界を滅ぼすまいと抗っているんだ」"

[[dialogue]]
speaker = "ナターシャ"
# 「じゃあ、まだ暴走しかけってところか。でもこのままだと、完全に暴走するのも時間の問題じゃない？」
line = "「じゃあ、まだ暴走しかけってところか。でもこのままだと、完全に暴走するのも時間の問題じゃない？」"

[[dialogue]]
speaker = "ナターシャ"
# 「残念ながら私の出番かな。今回は手を汚さず終わると思ってたんだけど、早すぎるお別れだったね」
line = "「残念ながら私の出番かな。今回は手を汚さず終わると思ってたんだけど、早すぎるお別れだったね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「まさか、クロトを消すってこと！？　そんなことさせないわよ！」
line = "「まさか、クロトを消すってこと！？　そんなことさせないわよ！」"

[[dialogue]]
speaker = "梨緒"
# 「魔王を抹殺する……最悪の選択肢として、それもあり得るかもしれない。だが一介のエージェントでしかない君にそれが可能なのか？」
line = "「魔王を抹殺する……最悪の選択肢として、それもあり得るかもしれない。だが一介のエージェントでしかない君にそれが可能なのか？」"

[[dialogue]]
speaker = "unk"
# “どうやって魔王を消すのか”──問われたナターシャは軽薄な笑みを消して、あるものを差し出した。
line = "“どうやって魔王を消すのか”──問われたナターシャは軽薄な笑みを消して、あるものを差し出した。"

[[dialogue]]
speaker = "unk"
# ナターシャの手のひらの上に浮かぶ、小さな光。
line = "ナターシャの手のひらの上に浮かぶ、小さな光。"

[[dialogue]]
speaker = "unk"
# その正体は……
line = "その正体は……"

[[dialogue]]
speaker = "ナターシャ"
# 「シエルの鍵。天界で新たに発掘された秘宝だよ」
line = "「シエルの鍵。天界で新たに発掘された秘宝だよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「鍵？　ただ光ってるようにしか見えないんだけど……」
line = "「鍵？　ただ光ってるようにしか見えないんだけど……」"

[[dialogue]]
speaker = "ナターシャ"
# 「まぁね。鍵っていっても形のないプログラムのようなものだから」
line = "「まぁね。鍵っていっても形のないプログラムのようなものだから」"

[[dialogue]]
speaker = "unk"
# かつてリクリエの力を封印しようとして失われた天界の秘宝“シエルの<ruby=はこ>筐</ruby>”。
line = "かつてリクリエの力を封印しようとして失われた天界の秘宝“シエルの<ruby>筐<rt>はこ</rt></ruby>”。"

[[dialogue]]
speaker = "unk"
# これはそれと対になるものだとナターシャは言う。
line = "これはそれと対になるものだとナターシャは言う。"

[[dialogue]]
speaker = "ナターシャ"
# 「この鍵は、筐を開けるためのものじゃない。シエルの鍵の機能は、対象を跡形もなく消滅させること」
line = "「この鍵は、筐を開けるためのものじゃない。シエルの鍵の機能は、対象を跡形もなく消滅させること」"

[[dialogue]]
speaker = "ナターシャ"
# 「つまり、筐ごと綺麗さっぱり消し飛ばすのが本来の使い方ってワケ。“シエル”が誰か知らないけど面白いこと考えるよね」
line = "「つまり、筐ごと綺麗さっぱり消し飛ばすのが本来の使い方ってワケ。“シエル”が誰か知らないけど面白いこと考えるよね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「じゃああの戦いの時にそれがあれば、クロトはリクリエの力を自分に封印しなくてよかったってこと！？」
line = "「じゃああの戦いの時にそれがあれば、クロトはリクリエの力を自分に封印しなくてよかったってこと！？」"

[[dialogue]]
speaker = "ナターシャ"
# 「かもね。でも仕方ないじゃん、あの時は鍵が見つかってなかったんだから」
line = "「かもね。でも仕方ないじゃん、あの時は鍵が見つかってなかったんだから」"

[[dialogue]]
speaker = "ナターシャ"
# 「ただし、この鍵は１回使ったら消える。かつ消滅させられるのは筐と同サイズのものだけ。魔王を消すなら、しっかり近づいて心臓を消さなきゃ」
line = "「ただし、この鍵は１回使ったら消える。かつ消滅させられるのは筐と同サイズのものだけ。魔王を消すなら、しっかり近づいて心臓を消さなきゃ」"

[[dialogue]]
speaker = "ナターシャ"
# 「効果範囲は限定的だけど、その分確実だよ。この鍵なら魔王をやれる。……どうする？」
line = "「効果範囲は限定的だけど、その分確実だよ。この鍵なら魔王をやれる。……どうする？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「どうするって、そんなの許すわけないでしょ！？」
line = "「どうするって、そんなの許すわけないでしょ！？」"

[[dialogue]]
speaker = "unk"
# 声を荒げるヴィーナスを意に介さず、ナターシャの冷たい目が梨緒を見つめる。
line = "声を荒げるヴィーナスを意に介さず、ナターシャの冷たい目が梨緒を見つめる。"

[[dialogue]]
speaker = "unk"
# 差し出した手は、“これを使え”と言外に告げていた。
line = "差し出した手は、“これを使え”と言外に告げていた。"

[[dialogue]]
speaker = "梨緒"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "梨緒"
# （魔王が堕ちるなら、私が討つ──そう決めたはずだ。ならこの鍵は私が使うべき……）
line = "（魔王が堕ちるなら、私が討つ──そう決めたはずだ。ならこの鍵は私が使うべき……）"

[[dialogue]]
speaker = "梨緒"
# （いや、これがジグの策略か。魔王が堕ちるのを指を咥えて見ているか、それとも魔王を討つか選べと）
line = "（いや、これがジグの策略か。魔王が堕ちるのを指を咥えて見ているか、それとも魔王を討つか選べと）"

[[dialogue]]
speaker = "梨緒"
# （ならば私はどちらも選ばない。魔王は止める。そして彼をやらせはしない……！）
line = "（ならば私はどちらも選ばない。魔王は止める。そして彼をやらせはしない……！）"

[[dialogue]]
speaker = "梨緒"
# 「いや、まだだ。まだできることはあるはずだ」
line = "「いや、まだだ。まだできることはあるはずだ」"

[[dialogue]]
speaker = "ナターシャ"
# 「ほんとに？　手遅れにならない？」
line = "「ほんとに？　手遅れにならない？」"

[[dialogue]]
speaker = "梨緒"
# 「さっき言った通り、魔王の力はまだ抑えられている。まだ魔王は止められる。私が止める」
line = "「さっき言った通り、魔王の力はまだ抑えられている。まだ魔王は止められる。私が止める」"

[[dialogue]]
speaker = "梨緒"
# 「だから──私がやられたら魔王を消してくれ」
line = "「だから──私がやられたら魔王を消してくれ」"

[[dialogue]]
speaker = "ナターシャ"
# 「……ＯＫ。じゃあ任せたよ、委員長。私は極星従騎の相手してるから」
line = "「……ＯＫ。じゃあ任せたよ、委員長。私は極星従騎の相手してるから」"

[[dialogue]]
speaker = "梨緒"
# 「ああ、私がやられる前にくたばるなよ」
line = "「ああ、私がやられる前にくたばるなよ」"

[[dialogue]]
speaker = "ナターシャ"
# 「ふふっ、言うねぇ」
line = "「ふふっ、言うねぇ」"

[[dialogue]]
speaker = "クロト"
# 「オオッ……！」
line = "「オオッ……！」"

[[dialogue]]
speaker = "ベアトリス"
# 「させません！」
line = "「させません！」"

[[dialogue]]
speaker = "unk"
# リクリエの力を帯びた拳を、鮮血色の槍で迎え撃つ。
line = "リクリエの力を帯びた拳を、鮮血色の槍で迎え撃つ。"

[[dialogue]]
speaker = "unk"
# 紫色の瘴気と膨大な星力がぶつかり合い、嵐のような衝撃とともに爆ぜた。
line = "紫色の瘴気と膨大な星力がぶつかり合い、嵐のような衝撃とともに爆ぜた。"

[[dialogue]]
speaker = "ベアトリス"
# 「くっ……！」
line = "「くっ……！」"

[[dialogue]]
speaker = "梨緒"
# 「魔王を押さえてくれてありがとう、ベアト。続きは私が受け持つ。ベアトはナターシャを援護してくれ」
line = "「魔王を押さえてくれてありがとう、ベアト。続きは私が受け持つ。ベアトはナターシャを援護してくれ」"

[[dialogue]]
speaker = "ベアトリス"
# 「うん、わかった」
line = "「うん、わかった」"

[[dialogue]]
speaker = "ベアトリス"
# 「頑張って、梨緒ちゃん」
line = "「頑張って、梨緒ちゃん」"

[[dialogue]]
speaker = "梨緒"
# 「ありがとう。やってみせるよ」
line = "「ありがとう。やってみせるよ」"

[[dialogue]]
speaker = "unk"
# ベアトリスとナターシャがガーディアンに向かい、梨緒とヴィーナスの２人がクロトに対峙する。
line = "ベアトリスとナターシャがガーディアンに向かい、梨緒とヴィーナスの２人がクロトに対峙する。"

[[dialogue]]
speaker = "unk"
# ここでクロトを止められなければ、彼はナターシャに討たれるか、さもなくば世界を滅ぼすことになる。
line = "ここでクロトを止められなければ、彼はナターシャに討たれるか、さもなくば世界を滅ぼすことになる。"

[[dialogue]]
speaker = "梨緒"
# 「奇しくも彼に御前試合で敗れた者同士。リベンジといこうか」
line = "「奇しくも彼に御前試合で敗れた者同士。リベンジといこうか」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私は別に悔しくとも何ともないんだけど……でも、そうね。新星星徒会のフィクサーとして、今のクロトには負けられないわ！」
line = "「私は別に悔しくとも何ともないんだけど……でも、そうね。新星星徒会のフィクサーとして、今のクロトには負けられないわ！」"

[[dialogue]]
speaker = "クロト"
# 「クッ……オオッ……！」
line = "「クッ……オオッ……！」"

[[dialogue]]
speaker = "unk"
# 俺の喉から、低い地鳴りのような声が響いた。
line = "俺の喉から、低い地鳴りのような声が響いた。"

[[dialogue]]
speaker = "unk"
# 汚泥にまみれたように全身に瘴気が絡みつき、振り払うようにもがく。
line = "汚泥にまみれたように全身に瘴気が絡みつき、振り払うようにもがく。"

[[dialogue]]
speaker = "unk"
# いや、もがいているつもりなのに……
line = "いや、もがいているつもりなのに……"

[[dialogue]]
speaker = "クロト"
# 「ウオオッ……！」
line = "「ウオオッ……！」"

[[dialogue]]
speaker = "unk"
# 俺の中に巣食う<ruby=リクリエ>破滅</ruby>に命じられるままに、拳を振るう。
line = "俺の中に巣食う<ruby>破滅<rt>リクリエ</rt></ruby>に命じられるままに、拳を振るう。"

[[dialogue]]
speaker = "ヴィーナス"
# 「きゃっ……！？」
line = "「きゃっ……！？」"

[[dialogue]]
speaker = "クロト"
# （俺は……何をしているんだ……？　何をしていたんだっけ……？）
line = "（俺は……何をしているんだ……？　何をしていたんだっけ……？）"

[[dialogue]]
speaker = "unk"
# 意識が朦朧としている。
line = "意識が朦朧としている。"

[[dialogue]]
speaker = "unk"
# 俺でない何かが、俺の中に根を張り、俺を塗り変えていく。
line = "俺でない何かが、俺の中に根を張り、俺を塗り変えていく。"

[[dialogue]]
speaker = "クロト"
# （やめ……ろ……！）
line = "（やめ……ろ……！）"

[[dialogue]]
speaker = "unk"
# 俺の中に宿る魔王の因子を我が物にせんと、破滅の種子が根を伸ばす。
line = "俺の中に宿る魔王の因子を我が物にせんと、破滅の種子が根を伸ばす。"

[[dialogue]]
speaker = "unk"
# もし魔王の力までリクリエに奪われれば一巻の終わりだ。これだけは侵させてなるものかと歯を食いしばる。
line = "もし魔王の力までリクリエに奪われれば一巻の終わりだ。これだけは侵させてなるものかと歯を食いしばる。"

[[dialogue]]
speaker = "ヴィーナス"
# 「くぅ～、いったいわね……！　でも本気のクロトならこんなもんじゃないわ！　ヘのパンダよ！」
line = "「くぅ～、いったいわね……！　でも本気のクロトならこんなもんじゃないわ！　ヘのパンダよ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私が止めてあげるわ、クロト！」
line = "「私が止めてあげるわ、クロト！」"

[[dialogue]]
speaker = "unk"
# ヴィーナスの鎖が絡みつき──
line = "ヴィーナスの鎖が絡みつき──"

[[dialogue]]
speaker = "梨緒"
# 「そこ！」
line = "「そこ！」"

[[dialogue]]
speaker = "unk"
# 雷光の矢が俺の体を射貫いた。
line = "雷光の矢が俺の体を射貫いた。"

[[dialogue]]
speaker = "unk"
# 痛い──はずなのに痛くない。
line = "痛い──はずなのに痛くない。"

[[dialogue]]
speaker = "unk"
# 全身の感覚がなくなっていく。俺の体が俺でなくなる。
line = "全身の感覚がなくなっていく。俺の体が俺でなくなる。"

[[dialogue]]
speaker = "unk"
# まるで幽霊になって、暴れる俺を後ろから眺めているみたいだ。
line = "まるで幽霊になって、暴れる俺を後ろから眺めているみたいだ。"

[[dialogue]]
speaker = "クロト"
# （俺を……止めてくれ……！）
line = "（俺を……止めてくれ……！）"
