[[dialogue]]
speaker = "unk"
# 第３話,イクシーとアルモタヘル,P
line = "第３話,イクシーとアルモタヘル,P"

[[dialogue]]
speaker = "イクシリオン"
# 「アルモタヘル様！　ケバブのお味はいかがでしょうか」
line = "「アルモタヘル様！　ケバブのお味はいかがでしょうか」"

[[dialogue]]
speaker = "アルモタヘル"
# 「うむ……！　見事なり。危うく爆発するところであったぞ」
line = "「うむ……！　見事なり。危うく爆発するところであったぞ」"

[[dialogue]]
speaker = "アルモタヘル"
# 「イクシリオン、お前の慧眼には感謝するぞ。今後も良き店があらば必ず声をかけよ」
line = "「イクシリオン、お前の慧眼には感謝するぞ。今後も良き店があらば必ず声をかけよ」"

[[dialogue]]
speaker = "イクシリオン"
# 「はいっ！　かしこまりました！」
line = "「はいっ！　かしこまりました！」"

[[dialogue]]
speaker = "unk"
# やあ、２人とも
line = "やあ、２人とも"

[[dialogue]]
speaker = "イクシリオン"
# 「あっ、会長。こんなところで会うだなんて奇遇ですね」
line = "「あっ、会長。こんなところで会うだなんて奇遇ですね」"

[[dialogue]]
speaker = "アルモタヘル"
# 「息災のようだな。人の子よ」
line = "「息災のようだな。人の子よ」"

[[dialogue]]
speaker = "unk"
# ２人は知り合いだったんだな
line = "２人は知り合いだったんだな"

[[dialogue]]
speaker = "イクシリオン"
# 「知り合いも何も！　私の家は、代々アルモタヘル様を祀る神殿を管理する一族なんですよ」
line = "「知り合いも何も！　私の家は、代々アルモタヘル様を祀る神殿を管理する一族なんですよ」"

[[dialogue]]
speaker = "アルモタヘル"
# 「然り。故にこうして世話を焼かれているのだ」
line = "「然り。故にこうして世話を焼かれているのだ」"

[[dialogue]]
speaker = "イクシリオン"
# 「本当に感激です。敬愛する守護天使様とお出かけができるだなんて」
line = "「本当に感激です。敬愛する守護天使様とお出かけができるだなんて」"

[[dialogue]]
speaker = "アルモタヘル"
# 「我も満足だ。お前の案内は実に適切である。美味いものをどこで食えるか、すぐに答えが返ってくるのだからな」
line = "「我も満足だ。お前の案内は実に適切である。美味いものをどこで食えるか、すぐに答えが返ってくるのだからな」"

[[dialogue]]
speaker = "イクシリオン"
# 「私も食べるのは好きですから。気が付くとお腹が減っています」
line = "「私も食べるのは好きですから。気が付くとお腹が減っています」"

[[dialogue]]
speaker = "アルモタヘル"
# 「お前は良き従者だな。さて──塩気のある物を食した後は、甘い物が欲しくなるな？」
line = "「お前は良き従者だな。さて──塩気のある物を食した後は、甘い物が欲しくなるな？」"

[[dialogue]]
speaker = "イクシリオン"
# 「はいっ！　お任せください、徒歩３分圏内に、極上のクレープを出すお店がございます！」
line = "「はいっ！　お任せください、徒歩３分圏内に、極上のクレープを出すお店がございます！」"

[[dialogue]]
speaker = "アルモタヘル"
# 「うむ。素晴らしいぞ、イクシリオン」
line = "「うむ。素晴らしいぞ、イクシリオン」"

[[dialogue]]
speaker = "イクシリオン"
# 「ありがたき幸せ！　ですっ！」
line = "「ありがたき幸せ！　ですっ！」"

[[dialogue]]
speaker = "アルモタヘル"
# 「人の子よ、お前も来い。気分が良い故、馳走してやろう」
line = "「人の子よ、お前も来い。気分が良い故、馳走してやろう」"

[[dialogue]]
speaker = "unk"
# ありがたき幸せ！
line = "ありがたき幸せ！"

[[dialogue]]
speaker = "アルモタヘル"
# 「クレープは……中に詰める具材を客が選ぶのか。これは非常に重要な選択であるな」
line = "「クレープは……中に詰める具材を客が選ぶのか。これは非常に重要な選択であるな」"

[[dialogue]]
speaker = "アルモタヘル"
# 「ふむ。このバナナは良い。実に太くて食いでがありそうだ」
line = "「ふむ。このバナナは良い。実に太くて食いでがありそうだ」"

[[dialogue]]
speaker = "イクシリオン"
# 「――ッ！？」
line = "「――ッ！？」"

[[dialogue]]
speaker = "イクシリオン"
# （太いからという理由でバナナを……ひゃ、ひゃぁあ……！）
line = "（太いからという理由でバナナを……ひゃ、ひゃぁあ……！）"

[[dialogue]]
speaker = "アルモタヘル"
# 「ほう。チョコレート。これも良い。貰おう」
line = "「ほう。チョコレート。これも良い。貰おう」"

[[dialogue]]
speaker = "イクシリオン"
# （チョコレート……かつて媚薬として重宝されていたと聞きます……それをバナナに……！？）
line = "（チョコレート……かつて媚薬として重宝されていたと聞きます……それをバナナに……！？）"

[[dialogue]]
speaker = "アルモタヘル"
# 「さらに甘味が欲しいな。よし、トッピングに練乳を足すがよい」
line = "「さらに甘味が欲しいな。よし、トッピングに練乳を足すがよい」"

[[dialogue]]
speaker = "イクシリオン"
# 「練乳までっ！？　あぁ、ドロドロの白い液体が太いバナナにたっぷりと……」
line = "「練乳までっ！？　あぁ、ドロドロの白い液体が太いバナナにたっぷりと……」"

[[dialogue]]
speaker = "アルモタヘル"
# 「ではいただくとしよう。あーん……」
line = "「ではいただくとしよう。あーん……」"

[[dialogue]]
speaker = "イクシリオン"
# 「あわわ、はわわわ……」
line = "「あわわ、はわわわ……」"

[[dialogue]]
speaker = "アルモタヘル"
# 「どうした？　何かまずいことがあるのか？」
line = "「どうした？　何かまずいことがあるのか？」"

[[dialogue]]
speaker = "イクシリオン"
# 「いえっ、クレープはおいしいのですが！　その、ええと……」
line = "「いえっ、クレープはおいしいのですが！　その、ええと……」"

[[dialogue]]
speaker = "アルモタヘル"
# 「変なやつだな、お前は。そんなに欲しいならくれてやろう」
line = "「変なやつだな、お前は。そんなに欲しいならくれてやろう」"

[[dialogue]]
speaker = "イクシリオン"
# 「ええっ！？　そういう意味ではないのですが……いただきます……」
line = "「ええっ！？　そういう意味ではないのですが……いただきます……」"

[[dialogue]]
speaker = "イクシリオン"
# 「太いバナナ……気持ちを高ぶらせるチョコレート……白くてドロドロの練乳……ごくり」
line = "「太いバナナ……気持ちを高ぶらせるチョコレート……白くてドロドロの練乳……ごくり」"

[[dialogue]]
speaker = "イクシリオン"
# 「それでは……あ、あーん……」
line = "「それでは……あ、あーん……」"

[[dialogue]]
speaker = "unk"
# なぜかいけないものを見ている気が……
line = "なぜかいけないものを見ている気が……"

[[dialogue]]
speaker = "イクシリオン"
# 「あむっ」
line = "「あむっ」"

[[dialogue]]
speaker = "イクシリオン"
# 「ん～っ！　とっても甘くておいしいです！　甘味の三重奏ですね♪」
line = "「ん～っ！　とっても甘くておいしいです！　甘味の三重奏ですね♪」"

[[dialogue]]
speaker = "アルモタヘル"
# 「であろう。店主よ、同じものをもう１つ頼む。人の子は……苺とカスタードか。ふむそれも良いな。これも２つもらおう」
line = "「であろう。店主よ、同じものをもう１つ頼む。人の子は……苺とカスタードか。ふむそれも良いな。これも２つもらおう」"

[[dialogue]]
speaker = "アルモタヘル"
# 「もぐもぐ……うむ、美味である」
line = "「もぐもぐ……うむ、美味である」"

[[dialogue]]
speaker = "イクシリオン"
# 「ところでアルモタヘル様。アルモタヘル様を祀るものとして、以前から気になっていたことがあるのですが」
line = "「ところでアルモタヘル様。アルモタヘル様を祀るものとして、以前から気になっていたことがあるのですが」"

[[dialogue]]
speaker = "アルモタヘル"
# 「む？」
line = "「む？」"

[[dialogue]]
speaker = "イクシリオン"
# 「アルモタヘル様は子作りが得意なのでしょうか」
line = "「アルモタヘル様は子作りが得意なのでしょうか」"

[[dialogue]]
speaker = "unk"
# ぶふーーっ！？
line = "ぶふーーっ！？"

[[dialogue]]
speaker = "アルモタヘル"
# 「こら、人の子よ。食べ物を粗末にするな」
line = "「こら、人の子よ。食べ物を粗末にするな」"

[[dialogue]]
speaker = "アルモタヘル"
# 「イクシリオンよ、どうしてそう考えたのだ？」
line = "「イクシリオンよ、どうしてそう考えたのだ？」"

[[dialogue]]
speaker = "イクシリオン"
# 「《命脈》のアルモタヘル様が守護する摂理は種族──つまり血や命を司るお方」
line = "「《命脈》のアルモタヘル様が守護する摂理は種族──つまり血や命を司るお方」"

[[dialogue]]
speaker = "イクシリオン"
# 「であれば、血と命を紡ぐ行為──子作りがお上手であらせられるのかと」
line = "「であれば、血と命を紡ぐ行為──子作りがお上手であらせられるのかと」"

[[dialogue]]
speaker = "アルモタヘル"
# 「ふむ、なるほど。論理の飛躍はあるが全くの的外れとは言うまい」
line = "「ふむ、なるほど。論理の飛躍はあるが全くの的外れとは言うまい」"

[[dialogue]]
speaker = "アルモタヘル"
# 「だが命を司る守護天使は我だけではない。《円環》のラクシャ──ヤツもそうだ」
line = "「だが命を司る守護天使は我だけではない。《円環》のラクシャ──ヤツもそうだ」"

[[dialogue]]
speaker = "アルモタヘル"
# 「ヤツが守護する摂理は『流転』。土が樹を育て、樹は朽ちてまた土となる……そうした世界の循環を司るのがラクシャだ」
line = "「ヤツが守護する摂理は『流転』。土が樹を育て、樹は朽ちてまた土となる……そうした世界の循環を司るのがラクシャだ」"

[[dialogue]]
speaker = "アルモタヘル"
# 「そして魂の輪廻もヤツの領分。再誕の守護天使と言ってもいいだろう」
line = "「そして魂の輪廻もヤツの領分。再誕の守護天使と言ってもいいだろう」"

[[dialogue]]
speaker = "イクシリオン"
# 「なるほど……」
line = "「なるほど……」"

[[dialogue]]
speaker = "イクシリオン"
# 「つまりラクシャ様も子作りがお上手ということですね！」
line = "「つまりラクシャ様も子作りがお上手ということですね！」"

[[dialogue]]
speaker = "アルモタヘル"
# 「お前は子作りから離れろ！」
line = "「お前は子作りから離れろ！」"
