[[dialogue]]
speaker = "美鶴"
# 「着てみたけどさ。会長さん、ど？」
line = "「着てみたけどさ。会長さん、ど？」"

[[dialogue]]
speaker = "unk"
# 似合ってるね
line = "似合ってるね"

[[dialogue]]
speaker = "unk"
# かわいいよ
line = "かわいいよ"

[[dialogue]]
speaker = "美鶴"
# 「ふぇ。おかしいとこないか聞いてみたつもりなんだけど……ありがと」
line = "「ふぇ。おかしいとこないか聞いてみたつもりなんだけど……ありがと」"

[[dialogue]]
speaker = "美鶴"
# 「ま、別に変なとこはなさそうだよね」
line = "「ま、別に変なとこはなさそうだよね」"

[[dialogue]]
speaker = "美鶴"
# 「じゃ、このモヤりはなんなんだろ。どうすれば晴れんのかな……」
line = "「じゃ、このモヤりはなんなんだろ。どうすれば晴れんのかな……」"

[[dialogue]]
speaker = "フラン"
# 「おっ、美鶴！　その衣装は、うちのチア衣装だな！　チアガールに参加してくれるのか！？」
line = "「おっ、美鶴！　その衣装は、うちのチア衣装だな！　チアガールに参加してくれるのか！？」"

[[dialogue]]
speaker = "美鶴"
# 「やらんし。てか、さっきまでアリーナで練習してたじゃん。どこから出てきたの」
line = "「やらんし。てか、さっきまでアリーナで練習してたじゃん。どこから出てきたの」"

[[dialogue]]
speaker = "フラン"
# 「この教室からとてつもないチア・オーラを感じたからな！　来てみれば案の定、チアガールがいたってわけだ」
line = "「この教室からとてつもないチア・オーラを感じたからな！　来てみれば案の定、チアガールがいたってわけだ」"

[[dialogue]]
speaker = "美鶴"
# 「チア・オーラってなにそれ知らんし。怖」
line = "「チア・オーラってなにそれ知らんし。怖」"

[[dialogue]]
speaker = "フラン"
# 「応援する心から湧き上がる無限のパワーだぜ！」
line = "「応援する心から湧き上がる無限のパワーだぜ！」"

[[dialogue]]
speaker = "美鶴"
# 「知らんし。未知のパワー捏造すんなし」
line = "「知らんし。未知のパワー捏造すんなし」"

[[dialogue]]
speaker = "フラン"
# 「つまり、美鶴にはチアガール……いや、チアリーダーにすらなれる素質があるってことだ！」
line = "「つまり、美鶴にはチアガール……いや、チアリーダーにすらなれる素質があるってことだ！」"

[[dialogue]]
speaker = "美鶴"
# 「うちの話聞けって。やる気なし子さんのうちにそんな素質ないでしょ。スカウターぶっ壊れてるって。うちがこれを着たのは──」
line = "「うちの話聞けって。やる気なし子さんのうちにそんな素質ないでしょ。スカウターぶっ壊れてるって。うちがこれを着たのは──」"

[[dialogue]]
speaker = "フラン"
# 「ふんふん……美鶴が納品したチア衣装がなんかしっくりこねえと」
line = "「ふんふん……美鶴が納品したチア衣装がなんかしっくりこねえと」"

[[dialogue]]
speaker = "フラン"
# 「じゃあ、オレらと一緒にチアやらねぇか？」
line = "「じゃあ、オレらと一緒にチアやらねぇか？」"

[[dialogue]]
speaker = "美鶴"
# 「なんでそーなるの。やらんし。うち、貰ってる給金以上は働かない主義なんで」
line = "「なんでそーなるの。やらんし。うち、貰ってる給金以上は働かない主義なんで」"

[[dialogue]]
speaker = "フラン"
# 「美鶴の作ったチアガール衣装、オレの目から見れば十分、よくできてると思うんだ」
line = "「美鶴の作ったチアガール衣装、オレの目から見れば十分、よくできてると思うんだ」"

[[dialogue]]
speaker = "フラン"
# 「実際、チアのみんなからも『過去イチかわいい』『めちゃ動きやすい』って大好評だぜ！」
line = "「実際、チアのみんなからも『過去イチかわいい』『めちゃ動きやすい』って大好評だぜ！」"

[[dialogue]]
speaker = "美鶴"
# 「そりゃどーも」
line = "「そりゃどーも」"

[[dialogue]]
speaker = "フラン"
# 「でも、美鶴は自分の作ったチアガール衣装に納得いってないんだろ？」
line = "「でも、美鶴は自分の作ったチアガール衣装に納得いってないんだろ？」"

[[dialogue]]
speaker = "美鶴"
# 「まーね。うちなら、もっと上手いことやれる気がしてるんだけど……」
line = "「まーね。うちなら、もっと上手いことやれる気がしてるんだけど……」"

[[dialogue]]
speaker = "フラン"
# 「っていうことはだ！　美鶴は給金通りの仕事をやりきれてない、って思ってるんじゃないか？」
line = "「っていうことはだ！　美鶴は給金通りの仕事をやりきれてない、って思ってるんじゃないか？」"

[[dialogue]]
speaker = "美鶴"
# 「……ぐっ。痛いトコ突くね」
line = "「……ぐっ。痛いトコ突くね」"

[[dialogue]]
speaker = "フラン"
# 「オレも経験あるからな！　自分らしい応援をやりきれないとスッキリしないし、それは結果に出る！」
line = "「オレも経験あるからな！　自分らしい応援をやりきれないとスッキリしないし、それは結果に出る！」"

[[dialogue]]
speaker = "フラン"
# 「なにより、応援する人は多ければ多いほどいい！」
line = "「なにより、応援する人は多ければ多いほどいい！」"

[[dialogue]]
speaker = "美鶴"
# 「本音はそこでしょ」
line = "「本音はそこでしょ」"

[[dialogue]]
speaker = "フラン"
# 「まーな！　美鶴みたいな美人チアガールに応援されたら、みんなの士気もグンと上がる！」
line = "「まーな！　美鶴みたいな美人チアガールに応援されたら、みんなの士気もグンと上がる！」"

[[dialogue]]
speaker = "美鶴"
# 「美人チアて。おだて上手め」
line = "「美人チアて。おだて上手め」"

[[dialogue]]
speaker = "フラン"
# 「いいじゃねえか。<ruby=うち>応援団</ruby>は人が欲しい。美鶴は応援を経験することで何か掴めるかもしれない」
line = "「いいじゃねえか。<ruby>応援団<rt>うち</rt></ruby>は人が欲しい。美鶴は応援を経験することで何か掴めるかもしれない」"

[[dialogue]]
speaker = "フラン"
# 「つまり、ＷＩＮ・ＷＩＮの関係ってわけだ！　オレの大好きな言葉だぜ！」
line = "「つまり、ＷＩＮ・ＷＩＮの関係ってわけだ！　オレの大好きな言葉だぜ！」"

[[dialogue]]
speaker = "美鶴"
# 「……流石は応援団。人を乗せるのがお上手」
line = "「……流石は応援団。人を乗せるのがお上手」"

[[dialogue]]
speaker = "美鶴"
# 「んー……乗せられるのはちょーっと癪だけど、実際やらないとわからないこともあるかもしれないしなー……」
line = "「んー……乗せられるのはちょーっと癪だけど、実際やらないとわからないこともあるかもしれないしなー……」"

[[dialogue]]
speaker = "美鶴"
# 「なーんかモヤってるし、衣装を完璧にするためならやむなし、かな。会長さんはどう思う？」
line = "「なーんかモヤってるし、衣装を完璧にするためならやむなし、かな。会長さんはどう思う？」"

[[dialogue]]
speaker = "unk"
# 美鶴に応援されたいな！
line = "美鶴に応援されたいな！"

[[dialogue]]
speaker = "unk"
# いいと思うよ
line = "いいと思うよ"

[[dialogue]]
speaker = "美鶴"
# 「そか。んじゃま、参加するよ、チア。ちょっとだけね」
line = "「そか。んじゃま、参加するよ、チア。ちょっとだけね」"

[[dialogue]]
speaker = "フラン"
# 「本当か！？　団員のみんなも喜ぶぜ！」
line = "「本当か！？　団員のみんなも喜ぶぜ！」"

[[dialogue]]
speaker = "美鶴"
# 「でも、うちは衣装の完成度に納得したら、そこでやめる」
line = "「でも、うちは衣装の完成度に納得したら、そこでやめる」"

[[dialogue]]
speaker = "美鶴"
# 「どうやっても納得できないことが判明しても、そこでやめる。それでもいい？」
line = "「どうやっても納得できないことが判明しても、そこでやめる。それでもいい？」"

[[dialogue]]
speaker = "フラン"
# 「ああ、全然構わないぜ！　歓迎する！」
line = "「ああ、全然構わないぜ！　歓迎する！」"

[[dialogue]]
speaker = "フラン"
# 「でも、やめる前に人を応援する喜びを教えてやるよ！　クセになっちまうくらいにな！」
line = "「でも、やめる前に人を応援する喜びを教えてやるよ！　クセになっちまうくらいにな！」"

[[dialogue]]
speaker = "美鶴"
# 「うっへ。あんま毒されないように気をつけよっと」
line = "「うっへ。あんま毒されないように気をつけよっと」"

[[dialogue]]
speaker = "unk"
# こうして応援団は新たに──やる気なし子さんな人員を確保したのである。
line = "こうして応援団は新たに──やる気なし子さんな人員を確保したのである。"
