[[dialogue]]
speaker = "レイラ"
# （イングリットとは、武闘都市ウリルの近くの平原で出会った。その時はヴァレリーも一緒だった）
line = "（イングリットとは、武闘都市ウリルの近くの平原で出会った。その時はヴァレリーも一緒だった）"

[[dialogue]]
speaker = "レイラ"
# （イザベラさんの魔法で感知したところによると、イングリットは星力も持たずにモンスターと戦い、致命傷を負ってコラプサーの力に目覚めた）
line = "（イザベラさんの魔法で感知したところによると、イングリットは星力も持たずにモンスターと戦い、致命傷を負ってコラプサーの力に目覚めた）"

[[dialogue]]
speaker = "レイラ"
# （そのままモンスターを全滅させたイングリットは、ウリルの戦士もみんな倒して、あてもなく彷徨っていて……）
line = "（そのままモンスターを全滅させたイングリットは、ウリルの戦士もみんな倒して、あてもなく彷徨っていて……）"

[[dialogue]]
speaker = "イングリット"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "レイラ"
# （初めて見たイングリットはボロボロで、幽霊みたいだった。でもあの鋭い眼光は、よく覚えてる）
line = "（初めて見たイングリットはボロボロで、幽霊みたいだった。でもあの鋭い眼光は、よく覚えてる）"

[[dialogue]]
speaker = "レイラ"
# 「あなたがイングリットさんですね。私は……」
line = "「あなたがイングリットさんですね。私は……」"

[[dialogue]]
speaker = "イングリット"
# 「斬る」
line = "「斬る」"

[[dialogue]]
speaker = "レイラ"
# 「なに、今の！？　いきなり斬りかかられた！？」
line = "「なに、今の！？　いきなり斬りかかられた！？」"

[[dialogue]]
speaker = "ヴァレリー"
# 「レイラ、無事ですか！？」
line = "「レイラ、無事ですか！？」"

[[dialogue]]
speaker = "レイラ"
# 「大丈夫！　ヴァレリーは危ないから下がってて！」
line = "「大丈夫！　ヴァレリーは危ないから下がってて！」"

[[dialogue]]
speaker = "レイラ"
# 「私は百目騎レイラ！　ブラックホールと契約する星騎士コラプサーの首領です！　敵ではありません！」
line = "「私は百目騎レイラ！　ブラックホールと契約する星騎士コラプサーの首領です！　敵ではありません！」"

[[dialogue]]
speaker = "イングリット"
# 「……星騎士と言ったな？」
line = "「……星騎士と言ったな？」"

[[dialogue]]
speaker = "イングリット"
# 「ハハハハ！　私は運がいい！　これほど早く星騎士と戦う機会に巡り合えるとはな！」
line = "「ハハハハ！　私は運がいい！　これほど早く星騎士と戦う機会に巡り合えるとはな！」"

[[dialogue]]
speaker = "イングリット"
# 「ちょうどいい。モンスターやウリルの出涸らしどもでは退屈していたところだ」
line = "「ちょうどいい。モンスターやウリルの出涸らしどもでは退屈していたところだ」"

[[dialogue]]
speaker = "イングリット"
# 「私と──」
line = "「私と──」"

[[dialogue]]
speaker = "イングリット"
# 「戦え！！」
line = "「戦え！！」"

[[dialogue]]
speaker = "レイラ"
# 「くっ……！」
line = "「くっ……！」"

[[dialogue]]
speaker = "イングリット"
# 「そらそら、逃げ回ってばかりでは勝てんぞ！　得意の星術とやらを見せてみろ！」
line = "「そらそら、逃げ回ってばかりでは勝てんぞ！　得意の星術とやらを見せてみろ！」"

[[dialogue]]
speaker = "ヴァレリー"
# 「錯乱しているようですね。戦って無力化するしかありません」
line = "「錯乱しているようですね。戦って無力化するしかありません」"

[[dialogue]]
speaker = "レイラ"
# 「無力化って言われてもブラックホールは手加減できないよ！　ヴァレリーも手伝って！」
line = "「無力化って言われてもブラックホールは手加減できないよ！　ヴァレリーも手伝って！」"

[[dialogue]]
speaker = "ヴァレリー"
# 「回復星術を持つ私まで斬られては共倒れです。私はここで観てますから頑張ってください」
line = "「回復星術を持つ私まで斬られては共倒れです。私はここで観てますから頑張ってください」"

[[dialogue]]
speaker = "レイラ"
# 「えー！　私が斬られるとこ見たいだけでしょー！」
line = "「えー！　私が斬られるとこ見たいだけでしょー！」"

[[dialogue]]
speaker = "レイラ"
# 「ちくせうちくせう、どうしてこんなことに……とりあえず地面にエルゴフォースブラスター！」
line = "「ちくせうちくせう、どうしてこんなことに……とりあえず地面にエルゴフォースブラスター！」"

[[dialogue]]
speaker = "イングリット"
# 「くっ……！？　何だ、今の黒い塊は？　大地が消えただと！？」
line = "「くっ……！？　何だ、今の黒い塊は？　大地が消えただと！？」"

[[dialogue]]
speaker = "レイラ"
# 「今のは警告です。私は星術でブラックホールを生み出すことができます。だからこれ以上の戦闘は……」
line = "「今のは警告です。私は星術でブラックホールを生み出すことができます。だからこれ以上の戦闘は……」"

[[dialogue]]
speaker = "イングリット"
# 「ぶらっくほーる？　なんだそれは？」
line = "「ぶらっくほーる？　なんだそれは？」"

[[dialogue]]
speaker = "レイラ"
# 「え？　……ええと、ブラックホールというのは、何でも吸い込む穴のようなものと思われていますが、実際には星が生命活動を終え、自らの質量によって──」
line = "「え？　……ええと、ブラックホールというのは、何でも吸い込む穴のようなものと思われていますが、実際には星が生命活動を終え、自らの質量によって──」"

[[dialogue]]
speaker = "イングリット"
# 「ごちゃごちゃうるさい！」
line = "「ごちゃごちゃうるさい！」"

[[dialogue]]
speaker = "レイラ"
# 「うっそ！　自分から聞いてきたのに！？　ダメ、全く話が通じないっ！」
line = "「うっそ！　自分から聞いてきたのに！？　ダメ、全く話が通じないっ！」"

[[dialogue]]
speaker = "イングリット"
# 「本気で戦う気がないのか？　ならその気にさせてやる。──ドゥーム・エクスキューション！」
line = "「本気で戦う気がないのか？　ならその気にさせてやる。──ドゥーム・エクスキューション！」"

[[dialogue]]
speaker = "レイラ"
# 「くっ、本当に本気だ……！　でもヴァレリーは当てにならないし……ここで死ぬわけにもいかない……！」
line = "「くっ、本当に本気だ……！　でもヴァレリーは当てにならないし……ここで死ぬわけにもいかない……！」"

[[dialogue]]
speaker = "レイラ"
# 「それならこっちも──デッドエンド・コラプサァーッ！！」
line = "「それならこっちも──デッドエンド・コラプサァーッ！！」"

[[dialogue]]
speaker = "イングリット"
# 「ぐわああぁっ！！」
line = "「ぐわああぁっ！！」"

[[dialogue]]
speaker = "レイラ"
# （私のブラックホールは吸い込んだものを圧縮、消滅させる。モンスターも、魔獣も、そしておそらく星騎士も。星力の護りもコラプサーの力で無力化されてしまう）
line = "（私のブラックホールは吸い込んだものを圧縮、消滅させる。モンスターも、魔獣も、そしておそらく星騎士も。星力の護りもコラプサーの力で無力化されてしまう）"

[[dialogue]]
speaker = "レイラ"
# （でも、コラプサー同士なら多少の耐性がある。ソースは私。練習中に自爆してイザベラさんに爆笑されたことあるし！）
line = "（でも、コラプサー同士なら多少の耐性がある。ソースは私。練習中に自爆してイザベラさんに爆笑されたことあるし！）"

[[dialogue]]
speaker = "レイラ"
# （一瞬。一瞬だけ当てることができれば……）
line = "（一瞬。一瞬だけ当てることができれば……）"

[[dialogue]]
speaker = "イングリット"
# 「…………きゅう」
line = "「…………きゅう」"

[[dialogue]]
speaker = "レイラ"
# 「よかった。生きてる……」
line = "「よかった。生きてる……」"

[[dialogue]]
speaker = "イングリット"
# 「……すー」
line = "「……すー」"

[[dialogue]]
speaker = "レイラ"
# 「本当に変わらないね、あなたは……」
line = "「本当に変わらないね、あなたは……」"

[[dialogue]]
speaker = "レイラ"
# 「変わらないでいてくれてよかった。あなたは知らないだろうけど、私はあなたに憧れているんだよ」
line = "「変わらないでいてくれてよかった。あなたは知らないだろうけど、私はあなたに憧れているんだよ」"

[[dialogue]]
speaker = "レイラ"
# 「お父様もお母様も亡くなって、会社も奪われて、星騎士にもなれなくて……全てを諦めて、投げ出して、私はコラプサーになった。でもあなたは違う」
line = "「お父様もお母様も亡くなって、会社も奪われて、星騎士にもなれなくて……全てを諦めて、投げ出して、私はコラプサーになった。でもあなたは違う」"

[[dialogue]]
speaker = "レイラ"
# 「あなたは星騎士になれなくても、自分を信じて、戦って力を得た。どんなに無謀で愚かでも、それが私には眩しいんだ」
line = "「あなたは星騎士になれなくても、自分を信じて、戦って力を得た。どんなに無謀で愚かでも、それが私には眩しいんだ」"

[[dialogue]]
speaker = "レイラ"
# 「だからこれからもよろしくね、イングリット」
line = "「だからこれからもよろしくね、イングリット」"
