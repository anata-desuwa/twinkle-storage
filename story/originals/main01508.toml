[[dialogue]]
speaker = "unk"
# 第１０話,奥の手,B
line = "第１０話,奥の手,B"

[[dialogue]]
speaker = "クラウディア（黄昏）"
# 「──っふ」
line = "「──っふ」"

[[dialogue]]
speaker = "クラウディア（黄昏）"
# 「ここまで……か……」
line = "「ここまで……か……」"

[[dialogue]]
speaker = "フィオナ"
# 「ふぅ、ふぅ……っ……！　なんとか──」
line = "「ふぅ、ふぅ……っ……！　なんとか──」"

[[dialogue]]
speaker = "アナ"
# 「強すぎでした……覚醒した会長もいて、これとは……！」
line = "「強すぎでした……覚醒した会長もいて、これとは……！」"

[[dialogue]]
speaker = "クロト"
# 「ああ──ようやく超えられた……って感じだな」
line = "「ああ──ようやく超えられた……って感じだな」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ほんと……なんで負けた側が、満足げにしちゃってんのよ……」
line = "「ほんと……なんで負けた側が、満足げにしちゃってんのよ……」"

[[dialogue]]
speaker = "クラウディア（黄昏）"
# 「わはは……よいではないか。余も、久方ぶりに全力を出せて満足したのだ」
line = "「わはは……よいではないか。余も、久方ぶりに全力を出せて満足したのだ」"

[[dialogue]]
speaker = "unk"
# クラウディアは諸手を広げて、そのままバタリと後ろに倒れ込んだ。
line = "クラウディアは諸手を広げて、そのままバタリと後ろに倒れ込んだ。"

[[dialogue]]
speaker = "セドナ"
# 「だが……どうするつもりだ。貴様らの作戦が──何もかもうまくいかなかったとしたら……？」
line = "「だが……どうするつもりだ。貴様らの作戦が──何もかもうまくいかなかったとしたら……？」"

[[dialogue]]
speaker = "リノ"
# 「それは──」
line = "「それは──」"

[[dialogue]]
speaker = "unk"
# つまり、アポロの仮面を剥がせなかった場合。
line = "つまり、アポロの仮面を剥がせなかった場合。"

[[dialogue]]
speaker = "unk"
# もしくは、覚醒した魔王２人でもっても、アポロに敵わなかった場合。
line = "もしくは、覚醒した魔王２人でもっても、アポロに敵わなかった場合。"

[[dialogue]]
speaker = "unk"
# あるいは、すべてがうまく運んだとしても、シエルの筐に仮面を封印できなかった場合。
line = "あるいは、すべてがうまく運んだとしても、シエルの筐に仮面を封印できなかった場合。"

[[dialogue]]
speaker = "unk"
# 失敗する恐れはいくらだってある。でも──
line = "失敗する恐れはいくらだってある。でも──"

[[dialogue]]
speaker = "クロト"
# 「いや……大丈夫だ。俺にも案がある」
line = "「いや……大丈夫だ。俺にも案がある」"

[[dialogue]]
speaker = "クロト"
# 「もし最悪の事態になっても、リクリエだけは食い止めてみせる。それが、<ruby=あなた>魔女</ruby>たちを超えていく者の責任のはずだから」
line = "「もし最悪の事態になっても、リクリエだけは食い止めてみせる。それが、<ruby>魔女<rt>あなた</rt></ruby>たちを超えていく者の責任のはずだから」"

[[dialogue]]
speaker = "セドナ"
# 「ほう……」
line = "「ほう……」"

[[dialogue]]
speaker = "アナ"
# 「会長……？」
line = "「会長……？」"

[[dialogue]]
speaker = "マトイ"
# 「それってどういう──」
line = "「それってどういう──」"

[[dialogue]]
speaker = "クロト"
# 「まだ明かせない。今はまだ、アポロをどうにかするのが理想で先決だ」
line = "「まだ明かせない。今はまだ、アポロをどうにかするのが理想で先決だ」"

[[dialogue]]
speaker = "unk"
# 俺のルーツと、シエルの筐という道具と、リクリエの使徒の特性と。
line = "俺のルーツと、シエルの筐という道具と、リクリエの使徒の特性と。"

[[dialogue]]
speaker = "unk"
# これまでの情報をまとめて判断した結果だ。うまくいく保証はないが、最悪の場合はなんとかする──してみせる。
line = "これまでの情報をまとめて判断した結果だ。うまくいく保証はないが、最悪の場合はなんとかする──してみせる。"

[[dialogue]]
speaker = "フィオナ"
# 「──いえ」
line = "「──いえ」"

[[dialogue]]
speaker = "フィオナ"
# 「それには及びません。緋宮会長。あなたが考えているプランは、代わりに私が実行します」
line = "「それには及びません。緋宮会長。あなたが考えているプランは、代わりに私が実行します」"

[[dialogue]]
speaker = "クロト"
# 「……フィオナ。でも」
line = "「……フィオナ。でも」"

[[dialogue]]
speaker = "フィオナ"
# 「お互い様でしょう。それに……お母様の前で、そんな宣言はさせられません」
line = "「お互い様でしょう。それに……お母様の前で、そんな宣言はさせられません」"

[[dialogue]]
speaker = "unk"
# 目線だけでたしなめられてしまった。
line = "目線だけでたしなめられてしまった。"

[[dialogue]]
speaker = "unk"
# 考えることはお互い一緒、というわけか……。
line = "考えることはお互い一緒、というわけか……。"

[[dialogue]]
speaker = "ルリエル"
# 「……？　何やらわかりませんが──奥の手があるってことは……いいこと、ですよね？」
line = "「……？　何やらわかりませんが──奥の手があるってことは……いいこと、ですよね？」"

[[dialogue]]
speaker = "フィオナ"
# 「……ええ。私たちのなすべきは変わりません」
line = "「……ええ。私たちのなすべきは変わりません」"

[[dialogue]]
speaker = "ニャリオン"
# 「フィオナ嬢がそう言うのなら安心ニャン！　そうと決まればさっそく塔を昇るのニャン！」
line = "「フィオナ嬢がそう言うのなら安心ニャン！　そうと決まればさっそく塔を昇るのニャン！」"

[[dialogue]]
speaker = "ソフィア"
# 「た、高すぎて目まいがするほどですが……ふぅ。気合を入れますよ」
line = "「た、高すぎて目まいがするほどですが……ふぅ。気合を入れますよ」"

[[dialogue]]
speaker = "クロト"
# 「母さんは……」
line = "「母さんは……」"

[[dialogue]]
speaker = "リノ"
# 「当然向かうわ。組織に背いた責任は、最後まで取らせてもらわないとね」
line = "「当然向かうわ。組織に背いた責任は、最後まで取らせてもらわないとね」"

[[dialogue]]
speaker = "アナ"
# 「これでフルメンバーですね」
line = "「これでフルメンバーですね」"

[[dialogue]]
speaker = "マトイ"
# 「フィーニスの塔のてっぺんまで……よ、よし！　頑張るよ！」
line = "「フィーニスの塔のてっぺんまで……よ、よし！　頑張るよ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええ、入るわよ──一刻も早く、アポロのところへ向かうために！」
line = "「ええ、入るわよ──一刻も早く、アポロのところへ向かうために！」"

[[dialogue]]
speaker = "ユウリ"
# 「おう！　今度こそわからせてやんねえとな！」
line = "「おう！　今度こそわからせてやんねえとな！」"

[[dialogue]]
speaker = "unk"
# 目指すはフィーニスの頂上──
line = "目指すはフィーニスの頂上──"

[[dialogue]]
speaker = "unk"
# 決戦の時は、刻一刻と近づいていた。
line = "決戦の時は、刻一刻と近づいていた。"
