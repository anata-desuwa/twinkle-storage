[[dialogue]]
speaker = "unk"
# 第３話,離れていても、つながっているもの,P
line = "第３話,離れていても、つながっているもの,P"

[[dialogue]]
speaker = "unk"
# 中間テストが迫っていた、ある日のこと──
line = "中間テストが迫っていた、ある日のこと──"

[[dialogue]]
speaker = "サーシャ"
# 「あら、会長くん。図書館で勉強なんて珍しいわね？」
line = "「あら、会長くん。図書館で勉強なんて珍しいわね？」"

[[dialogue]]
speaker = "サーシャ"
# 「ああ、そっか～。もうテスト前だものね。どうりで今日は図書館に人が多いと思ったわ～」
line = "「ああ、そっか～。もうテスト前だものね。どうりで今日は図書館に人が多いと思ったわ～」"

[[dialogue]]
speaker = "unk"
# サーシャさんも勉強ですか？
line = "サーシャさんも勉強ですか？"

[[dialogue]]
speaker = "サーシャ"
# 「私、テスト勉強はしないタイプなのよ～。授業を真面目に聞いてたら、大体の問題は解けるでしょ？」
line = "「私、テスト勉強はしないタイプなのよ～。授業を真面目に聞いてたら、大体の問題は解けるでしょ？」"

[[dialogue]]
speaker = "サーシャ"
# 「ただ、勉強は好きよ。得たひとつの知識が、また別の知識に広がっていくじゃない？　それが凄く面白いと感じるの～」
line = "「ただ、勉強は好きよ。得たひとつの知識が、また別の知識に広がっていくじゃない？　それが凄く面白いと感じるの～」"

[[dialogue]]
speaker = "サーシャ"
# 「私が人間界に来たのも、そういう理由からだもの。ほら、この本は読んだことある？」
line = "「私が人間界に来たのも、そういう理由からだもの。ほら、この本は読んだことある？」"

[[dialogue]]
speaker = "サーシャ"
# 「『異界探訪』っていう本で、三界のことについて広くまとめてくれてる本なの。魔界の学校で読んだ本なのだけど、こっちでも見つけられるとは思わなかったわ～」
line = "「『異界探訪』っていう本で、三界のことについて広くまとめてくれてる本なの。魔界の学校で読んだ本なのだけど、こっちでも見つけられるとは思わなかったわ～」"

[[dialogue]]
speaker = "サーシャ"
# 「凄いのよ、この本。ほら、魔界のことも天界のことも、人間界のことも、全部載ってるの。しかもところどころ写真付き♪」
line = "「凄いのよ、この本。ほら、魔界のことも天界のことも、人間界のことも、全部載ってるの。しかもところどころ写真付き♪」"

[[dialogue]]
speaker = "unk"
# この本を読んで、人間界に興味が？
line = "この本を読んで、人間界に興味が？"

[[dialogue]]
speaker = "サーシャ"
# 「そうね。今のところ魔界から天界に直接行く手段はないし、行けなくても人間界には天使もいるって書いてあったから、人間界がいいなって思ったのよ」
line = "「そうね。今のところ魔界から天界に直接行く手段はないし、行けなくても人間界には天使もいるって書いてあったから、人間界がいいなって思ったのよ」"

[[dialogue]]
speaker = "サーシャ"
# 「ワクワクしない？　人間もいて、魔族もいて、天使もいる。そんな土地、魔界じゃどこを探してもないわ」
line = "「ワクワクしない？　人間もいて、魔族もいて、天使もいる。そんな土地、魔界じゃどこを探してもないわ」"

[[dialogue]]
speaker = "サーシャ"
# 「だから、どうしてもこの世界を見てみたくて……そんな時に、ちょうどよく新星学園への留学の話があったから、頑張っちゃった♪」
line = "「だから、どうしてもこの世界を見てみたくて……そんな時に、ちょうどよく新星学園への留学の話があったから、頑張っちゃった♪」"

[[dialogue]]
speaker = "サーシャ"
# 「……勉強はしないタイプって言ったけれど、思い返すと新星学園への留学試験だけは大変だったわね。人間界の常識やマナーの問題とか、覚えるの大変だったわ～」
line = "「……勉強はしないタイプって言ったけれど、思い返すと新星学園への留学試験だけは大変だったわね。人間界の常識やマナーの問題とか、覚えるの大変だったわ～」"

[[dialogue]]
speaker = "サーシャ"
# 「でも、本当に来れてよかったわ。星徒会のみんなや、会長くんとも出会えたし、人間界でのお勉強もとっても楽しいし」
line = "「でも、本当に来れてよかったわ。星徒会のみんなや、会長くんとも出会えたし、人間界でのお勉強もとっても楽しいし」"

[[dialogue]]
speaker = "サーシャ"
# 「……ソフィには、留学は反対されたんだけれど。結果的にこっちで会えるようになったし、本当によかったわ」
line = "「……ソフィには、留学は反対されたんだけれど。結果的にこっちで会えるようになったし、本当によかったわ」"

[[dialogue]]
speaker = "unk"
# 反対を押し切って、留学を？
line = "反対を押し切って、留学を？"

[[dialogue]]
speaker = "サーシャ"
# 「押し切った……というよりも、特に誰にも相談しない間に決まっちゃってたって感じね～」
line = "「押し切った……というよりも、特に誰にも相談しない間に決まっちゃってたって感じね～」"

[[dialogue]]
speaker = "サーシャ"
# 「お父さんやお母さんは喜んで送り出してくれたけど……ソフィはね。怒らせちゃったし、泣かせちゃったわ」
line = "「お父さんやお母さんは喜んで送り出してくれたけど……ソフィはね。怒らせちゃったし、泣かせちゃったわ」"

[[dialogue]]
speaker = "サーシャ"
# 「どうしてかしらね～。ソフィもきっと喜んでくれると思ってたから、私、あの時どうしていいかわからなくて……」
line = "「どうしてかしらね～。ソフィもきっと喜んでくれると思ってたから、私、あの時どうしていいかわからなくて……」"

[[dialogue]]
speaker = "サーシャ"
# 「ちゃんとしたお別れも言えないまま、こっちに来ちゃったのよね～」
line = "「ちゃんとしたお別れも言えないまま、こっちに来ちゃったのよね～」"

[[dialogue]]
speaker = "unk"
# ソフィアと別れることは、寂しくなかったんですか？
line = "ソフィアと別れることは、寂しくなかったんですか？"

[[dialogue]]
speaker = "サーシャ"
# 「私とソフィは家族なんだから。たとえ離れ離れになってしまったとしても、心の奥は繋がったままだと思うのよ」
line = "「私とソフィは家族なんだから。たとえ離れ離れになってしまったとしても、心の奥は繋がったままだと思うのよ」"

[[dialogue]]
speaker = "サーシャ"
# 「その繋がりを大事に思っている限り、寂しくはないわ。……あまりピンと来ないかしら？」
line = "「その繋がりを大事に思っている限り、寂しくはないわ。……あまりピンと来ないかしら？」"

[[dialogue]]
speaker = "サーシャ"
# 「例えばそうね……私は星徒会のみんなのことも、家族だと思ってるわ。人間界でできた、大切な……本当に大切な人たち」
line = "「例えばそうね……私は星徒会のみんなのことも、家族だと思ってるわ。人間界でできた、大切な……本当に大切な人たち」"

[[dialogue]]
speaker = "サーシャ"
# 「私が新星学園を卒業したら、きっと今のように集まってお仕事するようなことも、なくなるでしょう？」
line = "「私が新星学園を卒業したら、きっと今のように集まってお仕事するようなことも、なくなるでしょう？」"

[[dialogue]]
speaker = "サーシャ"
# 「もしかしたら、私は魔界に帰って二度と会えないってこともあるかもしれない」
line = "「もしかしたら、私は魔界に帰って二度と会えないってこともあるかもしれない」"

[[dialogue]]
speaker = "サーシャ"
# 「でも、みんなとの心の繋がりを大切にしていれば……離れ離れになったとしても、寂しくない。そう思わない？」
line = "「でも、みんなとの心の繋がりを大切にしていれば……離れ離れになったとしても、寂しくない。そう思わない？」"

[[dialogue]]
speaker = "unk"
# 俺は、少し寂しいです
line = "俺は、少し寂しいです"

[[dialogue]]
speaker = "サーシャ"
# 「あら……？　そう、なの？」
line = "「あら……？　そう、なの？」"

[[dialogue]]
speaker = "サーシャ"
# 「……今の会長くん、あの時のソフィと同じ顔してる」
line = "「……今の会長くん、あの時のソフィと同じ顔してる」"

[[dialogue]]
speaker = "サーシャ"
# 「いえ、違うわね。あの時のソフィが、今の会長くんと同じ気持ちだったってことかしら」
line = "「いえ、違うわね。あの時のソフィが、今の会長くんと同じ気持ちだったってことかしら」"

[[dialogue]]
speaker = "unk"
# だから、勝手にいなくならないで下さいね
line = "だから、勝手にいなくならないで下さいね"

[[dialogue]]
speaker = "unk"
# 他の皆も同じです。
line = "他の皆も同じです。"

[[dialogue]]
speaker = "サーシャ"
# 「……ふふっ。なんだか、ちょっと恥ずかしくなるくらい熱烈な引き留めね～」
line = "「……ふふっ。なんだか、ちょっと恥ずかしくなるくらい熱烈な引き留めね～」"

[[dialogue]]
speaker = "サーシャ"
# 「別に今、どこかに行く予定があるわけじゃないわ。でも、私にはまだまだ、知りたい世界が沢山あるのよ」
line = "「別に今、どこかに行く予定があるわけじゃないわ。でも、私にはまだまだ、知りたい世界が沢山あるのよ」"

[[dialogue]]
speaker = "サーシャ"
# 「人間界だってそうだし、まだ天界には行ったこともないじゃない？　どこかに落ち着くのは、全部の世界を見てからでもいいと思わない？」
line = "「人間界だってそうだし、まだ天界には行ったこともないじゃない？　どこかに落ち着くのは、全部の世界を見てからでもいいと思わない？」"

[[dialogue]]
speaker = "サーシャ"
# 「それとも……」
line = "「それとも……」"

[[dialogue]]
speaker = "サーシャ"
# 「会長くんは、お姉ちゃんに一緒にいて欲しいのかしら？」
line = "「会長くんは、お姉ちゃんに一緒にいて欲しいのかしら？」"

[[dialogue]]
speaker = "unk"
# できれば、一緒にいて欲しいです
line = "できれば、一緒にいて欲しいです"

[[dialogue]]
speaker = "サーシャ"
# 「あらあらあら♪　そんなにストレートに言われちゃうと、お姉ちゃんもちょっと嬉しくなっちゃうわね～♪」
line = "「あらあらあら♪　そんなにストレートに言われちゃうと、お姉ちゃんもちょっと嬉しくなっちゃうわね～♪」"

[[dialogue]]
speaker = "サーシャ"
# 「離れ離れになっても寂しくない……とは言っても、別に離れなくて済むのなら、私だって自分から離れたいわけじゃないもの」
line = "「離れ離れになっても寂しくない……とは言っても、別に離れなくて済むのなら、私だって自分から離れたいわけじゃないもの」"

[[dialogue]]
speaker = "サーシャ"
# 「でも、私だって自分の夢を諦めたりはしないわ。すべての世界をこの目で見るまで、ひとつの場所に留まっているなんて、私にはできないから」
line = "「でも、私だって自分の夢を諦めたりはしないわ。すべての世界をこの目で見るまで、ひとつの場所に留まっているなんて、私にはできないから」"

[[dialogue]]
speaker = "unk"
# だったら、俺もサーシャさんについて行きます
line = "だったら、俺もサーシャさんについて行きます"

[[dialogue]]
speaker = "サーシャ"
# 「え？　それって──」
line = "「え？　それって──」"

[[dialogue]]
speaker = "サーシャ"
# 「ふふっ、そっかぁ♪　私、卒業したら１人旅でもしようかと思ってたけれど……会長くんが一緒についてきてくれるなら、凄く楽しいかも♪」
line = "「ふふっ、そっかぁ♪　私、卒業したら１人旅でもしようかと思ってたけれど……会長くんが一緒についてきてくれるなら、凄く楽しいかも♪」"

[[dialogue]]
speaker = "サーシャ"
# 「そうだわ、ソフィもついてきてくれないかしら？　１年は無理でも、半年くらいなら学園をお休みしても、大丈夫よね？」
line = "「そうだわ、ソフィもついてきてくれないかしら？　１年は無理でも、半年くらいなら学園をお休みしても、大丈夫よね？」"

[[dialogue]]
speaker = "サーシャ"
# 「あ～、会長くんが付いて来てくれるって思ったら、なんだか急に待ち遠しくになってきたわ～。どこまで行こうかしら？」
line = "「あ～、会長くんが付いて来てくれるって思ったら、なんだか急に待ち遠しくになってきたわ～。どこまで行こうかしら？」"

[[dialogue]]
speaker = "サーシャ"
# 「天界に行けるようになってたら天界に行きたいけれども……あっ、逆に会長くんを魔界に連れていくのも楽しそうね～」
line = "「天界に行けるようになってたら天界に行きたいけれども……あっ、逆に会長くんを魔界に連れていくのも楽しそうね～」"

[[dialogue]]
speaker = "サーシャ"
# 「会長くんが行きたいところはある？　私、まだ人間界を制覇したわけじゃないから、人間界はあなたに案内して欲しいかも♪」
line = "「会長くんが行きたいところはある？　私、まだ人間界を制覇したわけじゃないから、人間界はあなたに案内して欲しいかも♪」"

[[dialogue]]
speaker = "サーシャ"
# 「ねぇ、きっと──ううん、必ずよ？　会長くん」
line = "「ねぇ、きっと──ううん、必ずよ？　会長くん」"

[[dialogue]]
speaker = "unk"
# はい。約束します
line = "はい。約束します"

[[dialogue]]
speaker = "サーシャ"
# 「うんっ、お姉ちゃんとの約束ねっ♪」
line = "「うんっ、お姉ちゃんとの約束ねっ♪」"

[[dialogue]]
speaker = "unk"
# 差し出された小指に指きりをすると、サーシャさんはとても嬉しそうに微笑むのだった。
line = "差し出された小指に指きりをすると、サーシャさんはとても嬉しそうに微笑むのだった。"
