[[dialogue]]
speaker = "unk"
# 第１話,さらわれた金星,B
line = "第１話,さらわれた金星,B"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロト──────ッッッ！！！」
line = "「クロト──────ッッッ！！！」"

[[dialogue]]
speaker = "クロト"
# 「ヴィーナス──────ッッッ！！！」
line = "「ヴィーナス──────ッッッ！！！」"

[[dialogue]]
speaker = "unk"
# ──あれから。
line = "──あれから。"

[[dialogue]]
speaker = "unk"
# 俺たちはなすすべなく光に包まれ、フィーニスの塔を追い出された。
line = "俺たちはなすすべなく光に包まれ、フィーニスの塔を追い出された。"

[[dialogue]]
speaker = "unk"
# あの層の主である煌竜ヴィライアは打ち倒した──それをもって、俺たちは『クリア』と判定されたのだろう。
line = "あの層の主である煌竜ヴィライアは打ち倒した──それをもって、俺たちは『クリア』と判定されたのだろう。"

[[dialogue]]
speaker = "unk"
# しかし、最後に空間を引き裂いてやってきたあの<ruby=ちんにゅうしゃ>闖入者</ruby>──
line = "しかし、最後に空間を引き裂いてやってきたあの<ruby>闖入者<rt>ちんにゅうしゃ</rt></ruby>──"

[[dialogue]]
speaker = "unk"
# 奴の圧倒的な力を前に俺たちは抗えず、ヴィーナスはさらわれてしまった……。
line = "奴の圧倒的な力を前に俺たちは抗えず、ヴィーナスはさらわれてしまった……。"

[[dialogue]]
speaker = "unk"
# そうして敗走した俺たちは、打つ手のないまま一日が経過した──
line = "そうして敗走した俺たちは、打つ手のないまま一日が経過した──"

[[dialogue]]
speaker = "エスメラルダ"
# 「極めて由々しき事態です──そんなことになっていたなんて……！」
line = "「極めて由々しき事態です──そんなことになっていたなんて……！」"

[[dialogue]]
speaker = "トワ先生"
# 「ヴィーナスちゃん、どうか無事でいて……！」
line = "「ヴィーナスちゃん、どうか無事でいて……！」"

[[dialogue]]
speaker = "セイファート"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "セイファート"
# 「本来、フィーニスの塔は立ち入りが禁止されている──が。今、その是非を問うている場合ではないな」
line = "「本来、フィーニスの塔は立ち入りが禁止されている──が。今、その是非を問うている場合ではないな」"

[[dialogue]]
speaker = "セイファート"
# 「九浄ヴィーナスくんの身柄を奪還するため──その『黒き騎士』という存在を調査するのだ」
line = "「九浄ヴィーナスくんの身柄を奪還するため──その『黒き騎士』という存在を調査するのだ」"

[[dialogue]]
speaker = "クロト"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "マトイ"
# 「……緋宮くん。ＤＩＳＣは……」
line = "「……緋宮くん。ＤＩＳＣは……」"

[[dialogue]]
speaker = "クロト"
# 「……通信不能だ。昨日から、ずっと」
line = "「……通信不能だ。昨日から、ずっと」"

[[dialogue]]
speaker = "アナ"
# 「……ＤＩＳＣは、アステラ内部でさえ電波が届くはずなのですが……」
line = "「……ＤＩＳＣは、アステラ内部でさえ電波が届くはずなのですが……」"

[[dialogue]]
speaker = "unk"
# 何度も何度もかけ直した。
line = "何度も何度もかけ直した。"

[[dialogue]]
speaker = "unk"
# しかしあれ以来、ヴィーナスとは一切交信が取れていない。
line = "しかしあれ以来、ヴィーナスとは一切交信が取れていない。"

[[dialogue]]
speaker = "クロト"
# （今どこにいるんだ──あの影に何をされているんだ──何もわからない──くそっ！）
line = "（今どこにいるんだ──あの影に何をされているんだ──何もわからない──くそっ！）"

[[dialogue]]
speaker = "unk"
# やり場のない怒りをぶつける。<ruby=はや>逸</ruby>る気持ちが抑えられず、みっともない姿を<ruby=さら>晒</ruby>してしまっていた。
line = "やり場のない怒りをぶつける。<ruby>逸<rt>はや</rt></ruby>る気持ちが抑えられず、みっともない姿を<ruby>晒<rt>さら</rt></ruby>してしまっていた。"

[[dialogue]]
speaker = "ユウリ"
# 「ありえねえ……！　ちくしょう、あたしがしっかり守れてりゃ──」
line = "「ありえねえ……！　ちくしょう、あたしがしっかり守れてりゃ──」"

[[dialogue]]
speaker = "ソフィア"
# 「……ユウリ先輩のせいじゃありませんよ」
line = "「……ユウリ先輩のせいじゃありませんよ」"

[[dialogue]]
speaker = "セーラ"
# 「そだねー……見たことないカンジの力まで操ってたし」
line = "「そだねー……見たことないカンジの力まで操ってたし」"

[[dialogue]]
speaker = "フィオナ"
# 「緋宮会長……大丈夫ですか？　昨日から、一睡もしていないのでしょう」
line = "「緋宮会長……大丈夫ですか？　昨日から、一睡もしていないのでしょう」"

[[dialogue]]
speaker = "アナ"
# 「会長はあれから、塔の探索や聞き込みを夜明けまで行っていましたから……」
line = "「会長はあれから、塔の探索や聞き込みを夜明けまで行っていましたから……」"

[[dialogue]]
speaker = "ルリエル"
# 「あ、あの激戦の後にでありますか！？　今にもぶっ倒れそうでありますよ！」
line = "「あ、あの激戦の後にでありますか！？　今にもぶっ倒れそうでありますよ！」"

[[dialogue]]
speaker = "クロト"
# 「……大丈夫だ。このくらい、あいつの苦難に比べたらなんでもないし、それに──」
line = "「……大丈夫だ。このくらい、あいつの苦難に比べたらなんでもないし、それに──」"

[[dialogue]]
speaker = "クロト"
# 「じっとしていられないんだ。今この瞬間にも、ヴィーナスがどうなってるのかと思うと」
line = "「じっとしていられないんだ。今この瞬間にも、ヴィーナスがどうなってるのかと思うと」"

[[dialogue]]
speaker = "マトイ"
# 「緋宮くん……」
line = "「緋宮くん……」"

[[dialogue]]
speaker = "フィオナ"
# （今の緋宮会長も、心配になってしまいますが……）
line = "（今の緋宮会長も、心配になってしまいますが……）"

[[dialogue]]
speaker = "unk"
# 血が出るほどに強く拳を握る。
line = "血が出るほどに強く拳を握る。"

[[dialogue]]
speaker = "unk"
# ヴィーナスは今も──素性の知れぬ敵に囚われている。それを思えば……
line = "ヴィーナスは今も──素性の知れぬ敵に囚われている。それを思えば……"

[[dialogue]]
speaker = "黒騎士"
# 『不穏である。デネブか、ベガか……あるべきでない世界線から混入した異分子。排除せねばならない』
line = "『不穏である。デネブか、ベガか……あるべきでない世界線から混入した異分子。排除せねばならない』"

[[dialogue]]
speaker = "unk"
# ──俺たちの前に現れた漆黒の騎士。
line = "──俺たちの前に現れた漆黒の騎士。"

[[dialogue]]
speaker = "unk"
# 奴がヴィーナスにかけていた言葉の意味も、俺たちは計りかねている。
line = "奴がヴィーナスにかけていた言葉の意味も、俺たちは計りかねている。"

[[dialogue]]
speaker = "ニャリオン"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "フィオナ"
# （ニャリオンの様子があれからおかしいのも──気になるところですが……）
line = "（ニャリオンの様子があれからおかしいのも──気になるところですが……）"

[[dialogue]]
speaker = "サーシャ"
# 「アナちゃん。何か手がかりは掴めたかしら」
line = "「アナちゃん。何か手がかりは掴めたかしら」"

[[dialogue]]
speaker = "アナ"
# 「未だ不明。しかし、解析は続けています」
line = "「未だ不明。しかし、解析は続けています」"

[[dialogue]]
speaker = "アナ"
# 「それと会長の指示で──新星学園中のリソースを前会長の捜索にあてています。あの黒い存在が残した痕跡も含めて」
line = "「それと会長の指示で──新星学園中のリソースを前会長の捜索にあてています。あの黒い存在が残した痕跡も含めて」"

[[dialogue]]
speaker = "サーシャ"
# 「助かるわ。私もいくらだって手伝うから」
line = "「助かるわ。私もいくらだって手伝うから」"

[[dialogue]]
speaker = "ユウリ"
# 「ああ。何が何でもあの野郎を見つけ出して、落とし前つけさせねえと……！」
line = "「ああ。何が何でもあの野郎を見つけ出して、落とし前つけさせねえと……！」"

[[dialogue]]
speaker = "マトイ"
# 「っ……でも──もし、あれとまた遭うことになったら……勝てるのかな……？」
line = "「っ……でも──もし、あれとまた遭うことになったら……勝てるのかな……？」"

[[dialogue]]
speaker = "ソフィア"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# あの影が俺たちに刻んでいった爪痕は、あまりにも大きかった……。
line = "あの影が俺たちに刻んでいった爪痕は、あまりにも大きかった……。"
