[[dialogue]]
speaker = "unk"
# 第２話,デキる苦労人シアン,P
line = "第２話,デキる苦労人シアン,P"

[[dialogue]]
speaker = "シアン"
# 「ったく、ネーゼマインのヤツ、あたしをなんだと思ってんだ。ちっとは目上を敬うとかよ……」
line = "「ったく、ネーゼマインのヤツ、あたしをなんだと思ってんだ。ちっとは目上を敬うとかよ……」"

[[dialogue]]
speaker = "unk"
# マインと何かありました？
line = "マインと何かありました？"

[[dialogue]]
speaker = "シアン"
# 「よぉ、会長さん……まぁ、ちょっと前に、あいつと組んだ一仕事があってよ──」
line = "「よぉ、会長さん……まぁ、ちょっと前に、あいつと組んだ一仕事があってよ──」"

[[dialogue]]
speaker = "シアン"
# 「会長さんも知っての通り、星術を悪用する犯罪者を秘密裏に処理するのが、表向きには存在しないあたしらの組織『公安委員会』だ」
line = "「会長さんも知っての通り、星術を悪用する犯罪者を秘密裏に処理するのが、表向きには存在しないあたしらの組織『公安委員会』だ」"

[[dialogue]]
speaker = "シアン"
# 「任務の内容はこう。──『国際的な犯罪組織のメンバーが、<ruby=ピエロ>道化師</ruby>に扮して遊園地に潜んでいる。可能ならば、無傷で捕縛。最悪、生死は問わない』」
line = "「任務の内容はこう。──『国際的な犯罪組織のメンバーが、<ruby>道化師<rt>ピエロ</rt></ruby>に扮して遊園地に潜んでいる。可能ならば、無傷で捕縛。最悪、生死は問わない』」"

[[dialogue]]
speaker = "シアン"
# 「それで、今回の任務に白羽の矢が立ったのがあたしとネーゼマインだったんだが──」
line = "「それで、今回の任務に白羽の矢が立ったのがあたしとネーゼマインだったんだが──」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ふあ～あ……シアンせんぱ～い？　ここに隠れて、もう８時間だよ。もう丸ごとドッカーンってふっ飛ばしちゃえばよくな～い？」
line = "「ふあ～あ……シアンせんぱ～い？　ここに隠れて、もう８時間だよ。もう丸ごとドッカーンってふっ飛ばしちゃえばよくな～い？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「最悪、生死は問わない――でしょ？」
line = "「最悪、生死は問わない――でしょ？」"

[[dialogue]]
speaker = "シアン"
# 「初っ端から最悪を想定するんじゃねえよ。そいつは全て尽くした後の奥の手だ」
line = "「初っ端から最悪を想定するんじゃねえよ。そいつは全て尽くした後の奥の手だ」"

[[dialogue]]
speaker = "シアン"
# 「疲れたんなら、そこの飯でも食って休んでろ。食える時に食っておくのも仕事の内だからな」
line = "「疲れたんなら、そこの飯でも食って休んでろ。食える時に食っておくのも仕事の内だからな」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ありがと、先輩。それじゃ、お先にいっただっきまーす。はむっ」
line = "「ありがと、先輩。それじゃ、お先にいっただっきまーす。はむっ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「んーっ<emoji=heart04>　チリソースた～っぷりのチリドッグ、刺激的ぃ♪　先輩、私が辛いの大好きって覚えててくれてたんだ～」
line = "「んーっ<emoji=heart04>　チリソースた～っぷりのチリドッグ、刺激的ぃ♪　先輩、私が辛いの大好きって覚えててくれてたんだ～」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「はむはむ、はぐはぐ。んーっ♪　眠気もぶっとぶ辛さ、最＆高☆」
line = "「はむはむ、はぐはぐ。んーっ♪　眠気もぶっとぶ辛さ、最＆高☆」"

[[dialogue]]
speaker = "シアン"
# 「大量にチリソースぶっかけたのを、そんな美味そうに食えるもんかね。どんな舌してんだよ、おっかねえな」
line = "「大量にチリソースぶっかけたのを、そんな美味そうに食えるもんかね。どんな舌してんだよ、おっかねえな」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「はー、美味しかった。ごちそうさまー。お腹いっぱいになったし、目も冴えたし、もうちょい頑張ろっと」
line = "「はー、美味しかった。ごちそうさまー。お腹いっぱいになったし、目も冴えたし、もうちょい頑張ろっと」"

[[dialogue]]
speaker = "シアン"
# 「そりゃ何よりだ。あたしも腹ごしらえする。監視、変わってくれ」
line = "「そりゃ何よりだ。あたしも腹ごしらえする。監視、変わってくれ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「はいはーい。ターゲット、依然動きありませーん。いつになったら動いてくれるんだろうね？」
line = "「はいはーい。ターゲット、依然動きありませーん。いつになったら動いてくれるんだろうね？」"

[[dialogue]]
speaker = "シアン"
# 「まあ、あと２０分は動かねえだろうな……ぁむ、もぐもぐ……」
line = "「まあ、あと２０分は動かねえだろうな……ぁむ、もぐもぐ……」"

[[dialogue]]
speaker = "シアン"
# 「んむっ……！？　このチリドッグ、何もかけなくても、かなり辛いじゃねえか……！　水っ、水っ……！」
line = "「んむっ……！？　このチリドッグ、何もかけなくても、かなり辛いじゃねえか……！　水っ、水っ……！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「シアン先輩って、真面目だよね～。なんでも器用にこなしちゃうし、デキる女って感じ」
line = "「シアン先輩って、真面目だよね～。なんでも器用にこなしちゃうし、デキる女って感じ」"

[[dialogue]]
speaker = "シアン"
# 「んぐ、んぐ……ぷぁ？　なんだよ、いきなり。一応、褒め言葉として受け取っておくけどよ」
line = "「んぐ、んぐ……ぷぁ？　なんだよ、いきなり。一応、褒め言葉として受け取っておくけどよ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「もちろん、褒めてるよ～？　でも、真面目な人って貧乏クジ引きがちだなーって」
line = "「もちろん、褒めてるよ～？　でも、真面目な人って貧乏クジ引きがちだなーって」"

[[dialogue]]
speaker = "シアン"
# 「……悪かったな。こなすのは器用でも、生きるのは不器用なんだよ」
line = "「……悪かったな。こなすのは器用でも、生きるのは不器用なんだよ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「私なら理由つけてスルーするようなのも安請け合いしちゃうんだもん。さすがだよね～」
line = "「私なら理由つけてスルーするようなのも安請け合いしちゃうんだもん。さすがだよね～」"

[[dialogue]]
speaker = "シアン"
# 「おまえみたいのがいるから、あたしに面倒なのばかり回ってくんだよな……おかげさまで、そろそろ地球上で行ってない国の方が少なくなってきたよ」
line = "「おまえみたいのがいるから、あたしに面倒なのばかり回ってくんだよな……おかげさまで、そろそろ地球上で行ってない国の方が少なくなってきたよ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「この前だって、地球の裏側まで行ってたんでしょ？　ワールドワイド～☆」
line = "「この前だって、地球の裏側まで行ってたんでしょ？　ワールドワイド～☆」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「それでもちゃんとクリアして帰ってくるんだから、先輩ってホント凄いよね～」
line = "「それでもちゃんとクリアして帰ってくるんだから、先輩ってホント凄いよね～」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「今回のだって、先輩と一緒だから受けたしね。『毎回生き残ってる』ってことは『先輩と一緒なら安全』ってことだもん」
line = "「今回のだって、先輩と一緒だから受けたしね。『毎回生き残ってる』ってことは『先輩と一緒なら安全』ってことだもん」"

[[dialogue]]
speaker = "シアン"
# 「毎回、安全とは限らねえよ。たった１回の失敗で終わっちまう仕事だ。その『たった１回』が今回になる可能性だってあるんだぜ」
line = "「毎回、安全とは限らねえよ。たった１回の失敗で終わっちまう仕事だ。その『たった１回』が今回になる可能性だってあるんだぜ」"

[[dialogue]]
speaker = "シアン"
# 「は～ぁ……たまにゃ温泉旅行にでも行って、ゆっくり疲れを癒してえんだけどな……」
line = "「は～ぁ……たまにゃ温泉旅行にでも行って、ゆっくり疲れを癒してえんだけどな……」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「あっ、それいいかもー！　社員旅行みたいに公安のみんなで温泉旅行行こうよ。会長も誘って♪」
line = "「あっ、それいいかもー！　社員旅行みたいに公安のみんなで温泉旅行行こうよ。会長も誘って♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「みんなで背中流しっこしよ。先輩の体、隅々までマッサージしてあげちゃうよ～？」
line = "「みんなで背中流しっこしよ。先輩の体、隅々までマッサージしてあげちゃうよ～？」"

[[dialogue]]
speaker = "シアン"
# 「やめろ。かえって気疲れしそうだから、ひとりで行かせてくれ。あと、なんでそこに会長さんが出てくるんだよ」
line = "「やめろ。かえって気疲れしそうだから、ひとりで行かせてくれ。あと、なんでそこに会長さんが出てくるんだよ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「だって、そういう時こそ刺激が必要でしょ？　男女交えたしっぽり温泉旅行……体を火照らせた夜に、何もないはずがなく――みたいな♪」
line = "「だって、そういう時こそ刺激が必要でしょ？　男女交えたしっぽり温泉旅行……体を火照らせた夜に、何もないはずがなく――みたいな♪」"

[[dialogue]]
speaker = "シアン"
# 「あ、あのなあ……！　任務中になんつー話を……」
line = "「あ、あのなあ……！　任務中になんつー話を……」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「顔真っ赤～♪　シアン先輩、こういうの苦手なの？　私、先輩みたいな初心な人、好きだな～、にひひ♪」
line = "「顔真っ赤～♪　シアン先輩、こういうの苦手なの？　私、先輩みたいな初心な人、好きだな～、にひひ♪」"

[[dialogue]]
speaker = "シアン"
# 「……あたしはおまえみたいなヤツは苦手だよ」
line = "「……あたしはおまえみたいなヤツは苦手だよ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「やぁん、先輩ってばツンデレ～」
line = "「やぁん、先輩ってばツンデレ～」"

[[dialogue]]
speaker = "シアン"
# 「本気で言ってるつもりなんだけどな……ったく、公安委員会の人選も随分と変わったな――ッ！」
line = "「本気で言ってるつもりなんだけどな……ったく、公安委員会の人選も随分と変わったな――ッ！」"

[[dialogue]]
speaker = "シアン"
# 「ターゲット動いた。ネーゼマイン、ボムの用意だ」
line = "「ターゲット動いた。ネーゼマイン、ボムの用意だ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「わ、きっかり２０分だし。先輩、すっご」
line = "「わ、きっかり２０分だし。先輩、すっご」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「でも、ざーんねん。もうちょっと先輩とお喋りしてたかったのになー」
line = "「でも、ざーんねん。もうちょっと先輩とお喋りしてたかったのになー」"

[[dialogue]]
speaker = "シアン"
# 「近いうちに茶飲むくらいの時間は作ってやるよ」
line = "「近いうちに茶飲むくらいの時間は作ってやるよ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「やった☆　約束ですよー！　んじゃ、サクッとヤッちゃいましょ～♪」
line = "「やった☆　約束ですよー！　んじゃ、サクッとヤッちゃいましょ～♪」"

[[dialogue]]
speaker = "シアン"
# 「行くぜ。狩りの時間だ」
line = "「行くぜ。狩りの時間だ」"

[[dialogue]]
speaker = "シアン"
# 「──とまぁ、一応はターゲットも生け捕りにしたけどさ。なんなんだよ、あいつは。自由すぎんだろ」
line = "「──とまぁ、一応はターゲットも生け捕りにしたけどさ。なんなんだよ、あいつは。自由すぎんだろ」"

[[dialogue]]
speaker = "シアン"
# 「会長さんも手ぇ焼いてんじゃねえか？　ウチの後輩が迷惑かけてんなら、あたしの方から謝るよ」
line = "「会長さんも手ぇ焼いてんじゃねえか？　ウチの後輩が迷惑かけてんなら、あたしの方から謝るよ」"

[[dialogue]]
speaker = "unk"
# マインといいコンビなんですね
line = "マインといいコンビなんですね"

[[dialogue]]
speaker = "シアン"
# 「はあ！？　今の話を聞いて、どこをどうしたらそうなんだよ。いや、結論だけなら、確かに成功はしてっけど……」
line = "「はあ！？　今の話を聞いて、どこをどうしたらそうなんだよ。いや、結論だけなら、確かに成功はしてっけど……」"

[[dialogue]]
speaker = "シアン"
# 「っと、悪ぃ、そのネーゼマインに呼び出されてんだ」
line = "「っと、悪ぃ、そのネーゼマインに呼び出されてんだ」"

[[dialogue]]
speaker = "シアン"
# 「『約束のティータイムに付き合って☆』だとよ。たまたま時間が空いてたからいいものの、急すぎなんだよ」
line = "「『約束のティータイムに付き合って☆』だとよ。たまたま時間が空いてたからいいものの、急すぎなんだよ」"

[[dialogue]]
speaker = "シアン"
# 「先輩を振り回すのも、いい加減にしてほしいもんだぜ。じゃ、またな、会長さん」
line = "「先輩を振り回すのも、いい加減にしてほしいもんだぜ。じゃ、またな、会長さん」"
