[[dialogue]]
speaker = "unk"
# 第１話,二つ名の由来,P
line = "第１話,二つ名の由来,P"

[[dialogue]]
speaker = "unk"
# 先日の事件で魔女として目覚めたコハルコさんは、魔法を使いこなすために訓練を行っていた。
line = "先日の事件で魔女として目覚めたコハルコさんは、魔法を使いこなすために訓練を行っていた。"

[[dialogue]]
speaker = "unk"
# 今日はリップルのリゾート結界の一部を借りての模擬戦だ。
line = "今日はリップルのリゾート結界の一部を借りての模擬戦だ。"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「付き添いありがとう、会長さん。レイラがついでで来てるのは……まぁいいけど」
line = "「付き添いありがとう、会長さん。レイラがついでで来てるのは……まぁいいけど」"

[[dialogue]]
speaker = "レイラ"
# 「これがリゾート結界……すんすん、リア充の香りがしますね」
line = "「これがリゾート結界……すんすん、リア充の香りがしますね」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「潮の香りだよ、これは」
line = "「潮の香りだよ、これは」"

[[dialogue]]
speaker = "レイラ"
# 「コハルコさんと魔王さんは付き合っているからリア充なのでは。レイラは訝しんだ」
line = "「コハルコさんと魔王さんは付き合っているからリア充なのでは。レイラは訝しんだ」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「訝しまないで。……ていうか、会長さんと付き合ってるってレイラに言ったっけ？」
line = "「訝しまないで。……ていうか、会長さんと付き合ってるってレイラに言ったっけ？」"

[[dialogue]]
speaker = "レイラ"
# 「ここに来るまでも肩が当たるか当たらないかの距離感だったじゃないですか。付き合ってなかったら逆にびっくりですよ」
line = "「ここに来るまでも肩が当たるか当たらないかの距離感だったじゃないですか。付き合ってなかったら逆にびっくりですよ」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「……えぇ」
line = "「……えぇ」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「レイラにバレてるなら、学園のみんなにも当然バレてるよね。噂になってないかなぁ……」
line = "「レイラにバレてるなら、学園のみんなにも当然バレてるよね。噂になってないかなぁ……」"

[[dialogue]]
speaker = "unk"
# レイラの言う通り、俺たちは恋人として付き合っている。
line = "レイラの言う通り、俺たちは恋人として付き合っている。"

[[dialogue]]
speaker = "unk"
# コハルコさんが恥ずかしいというので、学園ではまだ明かしていなかったが、無意味だったようだ。
line = "コハルコさんが恥ずかしいというので、学園ではまだ明かしていなかったが、無意味だったようだ。"

[[dialogue]]
speaker = "レイラ"
# 「ほら、その距離感ですよ！　リア充ディスタンス！」
line = "「ほら、その距離感ですよ！　リア充ディスタンス！」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「ええ、今のが！？　普通の距離感だったでしょ！　ね、会長さん？」
line = "「ええ、今のが！？　普通の距離感だったでしょ！　ね、会長さん？」"

[[dialogue]]
speaker = "レイラ"
# 「いーえ！　絶対イチャイチャしてました！　ですよね魔王さん？」
line = "「いーえ！　絶対イチャイチャしてました！　ですよね魔王さん？」"

[[dialogue]]
speaker = "unk"
# 俺的にはイチャイチャがいいです
line = "俺的にはイチャイチャがいいです"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「んひゃっ！？　そ、そう言うこと聞いてるんじゃないってば！？」
line = "「んひゃっ！？　そ、そう言うこと聞いてるんじゃないってば！？」"

[[dialogue]]
speaker = "レイラ"
# 「ほ～ら、やっぱりイチャイチャじゃないですかー。私の目は正しかったんです」
line = "「ほ～ら、やっぱりイチャイチャじゃないですかー。私の目は正しかったんです」"

[[dialogue]]
speaker = "ウィステリア"
# 「ごめんなさい、遅れちゃって。ちょっとトラブルがあって……あら？　取り込み中だったかしら？」
line = "「ごめんなさい、遅れちゃって。ちょっとトラブルがあって……あら？　取り込み中だったかしら？」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「い、いえ、何でもないです！　魔法のご指導お願いします！」
line = "「い、いえ、何でもないです！　魔法のご指導お願いします！」"

[[dialogue]]
speaker = "ウィステリア"
# 「そう、ならいいけど。そちらの子は初めましてね。私はウィステリア。新星学園の図書館で司書をしているわ」
line = "「そう、ならいいけど。そちらの子は初めましてね。私はウィステリア。新星学園の図書館で司書をしているわ」"

[[dialogue]]
speaker = "レイラ"
# 「申し遅れました。私は百目騎レイラと申します。どうぞお見知りおきくださ……え、今、ウィステリアさんと仰いました！？」
line = "「申し遅れました。私は百目騎レイラと申します。どうぞお見知りおきくださ……え、今、ウィステリアさんと仰いました！？」"

[[dialogue]]
speaker = "レイラ"
# 「あの『<ruby=ミレニアム・ワン>千年に一度の英雄</ruby>』の！？」
line = "「あの『<ruby>千年に一度の英雄<rt>ミレニアム・ワン</rt></ruby>』の！？」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「みれにあむ……」
line = "「みれにあむ……」"

[[dialogue]]
speaker = "ウィステリア"
# 「わん？」
line = "「わん？」"

[[dialogue]]
speaker = "レイラ"
# 「千年に一度の英雄だから、ミレニアム・ワンです。私が考えました！」
line = "「千年に一度の英雄だから、ミレニアム・ワンです。私が考えました！」"

[[dialogue]]
speaker = "レイラ"
# 「イザベラさんが言ってました。魔界の厄ネタ、歩く危険物だって。実際にお会いできて光栄です！」
line = "「イザベラさんが言ってました。魔界の厄ネタ、歩く危険物だって。実際にお会いできて光栄です！」"

[[dialogue]]
speaker = "ウィステリア"
# 「私が何したっていうのよ！？　とにかくそれ絶対に他の人に言わないでね。広まっちゃうから！」
line = "「私が何したっていうのよ！？　とにかくそれ絶対に他の人に言わないでね。広まっちゃうから！」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「もう、勝手に人の二つ名を増やさないの」
line = "「もう、勝手に人の二つ名を増やさないの」"

[[dialogue]]
speaker = "レイラ"
# 「え～、かっこいいのに……ジャスティスウィザードだって私が考えたんですよ？」
line = "「え～、かっこいいのに……ジャスティスウィザードだって私が考えたんですよ？」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「──は？」
line = "「──は？」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「……レイラ、説明して。私は今、冷静さを欠こうとしているよ」
line = "「……レイラ、説明して。私は今、冷静さを欠こうとしているよ」"

[[dialogue]]
speaker = "unk"
# ジャスティスウィザード。模倣犯が出るほど裏社会では伝説的なハッカーであり、コハルコさんの異名である。
line = "ジャスティスウィザード。模倣犯が出るほど裏社会では伝説的なハッカーであり、コハルコさんの異名である。"

[[dialogue]]
speaker = "unk"
# が、コハルコさんはそう呼ばれることにめちゃくちゃうんざりしているのだ。
line = "が、コハルコさんはそう呼ばれることにめちゃくちゃうんざりしているのだ。"

[[dialogue]]
speaker = "レイラ"
# 「私、両親が亡くなってから親戚をたらい回しにされてて……」
line = "「私、両親が亡くなってから親戚をたらい回しにされてて……」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「レイラ……」
line = "「レイラ……」"

[[dialogue]]
speaker = "レイラ"
# 「その間、ネットで匿名掲示板に入り浸ってたんです。何を隠そう、ネラーだったんですね」
line = "「その間、ネットで匿名掲示板に入り浸ってたんです。何を隠そう、ネラーだったんですね」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「いや、それは隠そう？　ご両親も天国から見守ってるよ？」
line = "「いや、それは隠そう？　ご両親も天国から見守ってるよ？」"

[[dialogue]]
speaker = "レイラ"
# 「そこで、悪と戦う正義のハッカーがいるって話題になって……まさにジャスティスウィザードだって書き込んだらそれが定着しちゃったんですよ」
line = "「そこで、悪と戦う正義のハッカーがいるって話題になって……まさにジャスティスウィザードだって書き込んだらそれが定着しちゃったんですよ」"

[[dialogue]]
speaker = "レイラ"
# 「そのジャスティスウィザードとこうしてリアルで会えたんだから、世間って狭いですよねー」
line = "「そのジャスティスウィザードとこうしてリアルで会えたんだから、世間って狭いですよねー」"

[[dialogue]]
speaker = "ウィステリア"
# 「コハルコさん、ジャスティスウィザードなんて呼ばれてるの？　それはまた……かわいそうに」
line = "「コハルコさん、ジャスティスウィザードなんて呼ばれてるの？　それはまた……かわいそうに」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "レイラ"
# 「って、あれ？　私、また何か言っちゃいました？」
line = "「って、あれ？　私、また何か言っちゃいました？」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「お・ま・え・かーーーーーーーーっ！！！！」
line = "「お・ま・え・かーーーーーーーーっ！！！！」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「いつか犯人を見つけ出してやろうと思ってたけど、こんな形で見つかるとはね。いやぁ、ホント、世間って狭いね」
line = "「いつか犯人を見つけ出してやろうと思ってたけど、こんな形で見つかるとはね。いやぁ、ホント、世間って狭いね」"

[[dialogue]]
speaker = "レイラ"
# 「……もしかして私、墓穴掘っちゃいました？」
line = "「……もしかして私、墓穴掘っちゃいました？」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「私がこのクソダサネームにどれだけ苦しめられてきたか、少しは思い知れー！」
line = "「私がこのクソダサネームにどれだけ苦しめられてきたか、少しは思い知れー！」"

[[dialogue]]
speaker = "レイラ"
# 「アイキャンフラーーーーーイ！！」
line = "「アイキャンフラーーーーーイ！！」"

[[dialogue]]
speaker = "unk"
# レイラはコハルコさんのドローンに括り付けられ、超高速飛行を楽しんだのだった。
line = "レイラはコハルコさんのドローンに括り付けられ、超高速飛行を楽しんだのだった。"
