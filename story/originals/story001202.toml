[[dialogue]]
speaker = "unk"
# フイオナからＤＩＳＣで「大事な話がある」と言われ、星見家に行くと──
line = "フイオナからＤＩＳＣで「大事な話がある」と言われ、星見家に行くと──"

[[dialogue]]
speaker = "フィオナ"
# 「お待ちしていました、緋宮会長。ご足労いただきありがとうございます」
line = "「お待ちしていました、緋宮会長。ご足労いただきありがとうございます」"

[[dialogue]]
speaker = "unk"
# フィオナ！？
line = "フィオナ！？"

[[dialogue]]
speaker = "キリカ"
# 「いらっしゃいませ。紅茶をお持ちしました」
line = "「いらっしゃいませ。紅茶をお持ちしました」"

[[dialogue]]
speaker = "ナミエル"
# 「うぅ……こんな姿を見られるなんて……」
line = "「うぅ……こんな姿を見られるなんて……」"

[[dialogue]]
speaker = "unk"
# 師匠とナミエルまで！？
line = "師匠とナミエルまで！？"

[[dialogue]]
speaker = "フィオナ"
# 「実は、戦闘服が突如としてウェディングドレスに変わってしまったんです。しかもなぜか元の戦闘服に戻すことができなくて……」
line = "「実は、戦闘服が突如としてウェディングドレスに変わってしまったんです。しかもなぜか元の戦闘服に戻すことができなくて……」"

[[dialogue]]
speaker = "キリカ"
# 「私たちも同様です。いつの間にか、ウェディングドレスにしか変身できないようになっていました」
line = "「私たちも同様です。いつの間にか、ウェディングドレスにしか変身できないようになっていました」"

[[dialogue]]
speaker = "フィオナ"
# 「幸い、戦闘力は落ちていないようですけど。この前のアステラにも対処できましたし」
line = "「幸い、戦闘力は落ちていないようですけど。この前のアステラにも対処できましたし」"

[[dialogue]]
speaker = "？？？"
# 「あ、会長くんも来たね。これで役者が揃ったかな」
line = "「あ、会長くんも来たね。これで役者が揃ったかな」"

[[dialogue]]
speaker = "unk"
# その声は──
line = "その声は──"

[[dialogue]]
speaker = "トワ先生"
# 「星見家で会うなんて珍しいよね。ちょっと変な気分かな」
line = "「星見家で会うなんて珍しいよね。ちょっと変な気分かな」"

[[dialogue]]
speaker = "unk"
# トワ先生はドレスじゃないんですね
line = "トワ先生はドレスじゃないんですね"

[[dialogue]]
speaker = "トワ先生"
# 「そうだよ！　私も着たかったけど！」
line = "「そうだよ！　私も着たかったけど！」"

[[dialogue]]
speaker = "トワ先生"
# 「私は星体力学の専門家として呼ばれたの。戦闘服が固定されて他の形態に変身できないなんて、どう考えても星力が関わってるからね」
line = "「私は星体力学の専門家として呼ばれたの。戦闘服が固定されて他の形態に変身できないなんて、どう考えても星力が関わってるからね」"

[[dialogue]]
speaker = "トワ先生"
# 「フィオナちゃんたちから話を聞いて、原因はだいたいわかったよ。概ね予想通りかな」
line = "「フィオナちゃんたちから話を聞いて、原因はだいたいわかったよ。概ね予想通りかな」"

[[dialogue]]
speaker = "フィオナ"
# 「本当ですか！？　どうしてこんなことに？」
line = "「本当ですか！？　どうしてこんなことに？」"

[[dialogue]]
speaker = "トワ先生"
# 「うん。まず、フィオナちゃんの守護星は太陽だよね？」
line = "「うん。まず、フィオナちゃんの守護星は太陽だよね？」"

[[dialogue]]
speaker = "トワ先生"
# 「それで、この前太陽フレアが起こったでしょ？　おそらくその瞬間、太陽の星力が爆発的に増大したの。戦闘服が変化したのはその影響だね」
line = "「それで、この前太陽フレアが起こったでしょ？　おそらくその瞬間、太陽の星力が爆発的に増大したの。戦闘服が変化したのはその影響だね」"

[[dialogue]]
speaker = "トワ先生"
# 「過去の文献にも近い例はあってね。珍しい現象ではあるけど、地球と守護星の距離の変化で戦闘服が変わったり、星力が上下することもあるんだ」
line = "「過去の文献にも近い例はあってね。珍しい現象ではあるけど、地球と守護星の距離の変化で戦闘服が変わったり、星力が上下することもあるんだ」"

[[dialogue]]
speaker = "トワ先生"
# 「キリカちゃんやナミエルちゃんは近くにいたから、その余波を受けたんだと思う。フィオナちゃんの星力はそれだけ強大だから」
line = "「キリカちゃんやナミエルちゃんは近くにいたから、その余波を受けたんだと思う。フィオナちゃんの星力はそれだけ強大だから」"

[[dialogue]]
speaker = "トワ先生"
# 「つまりみんなの戦闘服の変化の原因は、フィオナちゃんの星力の暴走に結論付けられる」
line = "「つまりみんなの戦闘服の変化の原因は、フィオナちゃんの星力の暴走に結論付けられる」"

[[dialogue]]
speaker = "フィオナ"
# 「星力の暴走……まさかそんなことが。私のせいでごめんなさい、キリカ、ナミエル」
line = "「星力の暴走……まさかそんなことが。私のせいでごめんなさい、キリカ、ナミエル」"

[[dialogue]]
speaker = "ナミエル"
# 「いえ、お嬢様が謝る必要はございません」
line = "「いえ、お嬢様が謝る必要はございません」"

[[dialogue]]
speaker = "トワ先生"
# 「うん、フィオナちゃんのせいじゃないよ。外的な要因で星力が瞬間的に増大するなんて、そうそうないからね」
line = "「うん、フィオナちゃんのせいじゃないよ。外的な要因で星力が瞬間的に増大するなんて、そうそうないからね」"

[[dialogue]]
speaker = "ナミエル"
# 「戦闘服の変化が起こった理由はわかりました。ですがどうしてウェディングドレスなのでしょう。ジューンブライドの季節ですし、時期的な要素でしょうか」
line = "「戦闘服の変化が起こった理由はわかりました。ですがどうしてウェディングドレスなのでしょう。ジューンブライドの季節ですし、時期的な要素でしょうか」"

[[dialogue]]
speaker = "トワ先生"
# 「うーん、半分当たりで半分違うんじゃないかな。一番の原因はフィオナちゃんが──」
line = "「うーん、半分当たりで半分違うんじゃないかな。一番の原因はフィオナちゃんが──」"

[[dialogue]]
speaker = "フィオナ"
# 「あああ～～～っ！！」
line = "「あああ～～～っ！！」"

[[dialogue]]
speaker = "ナミエル"
# 「お嬢様！？　どうされましたか！？」
line = "「お嬢様！？　どうされましたか！？」"

[[dialogue]]
speaker = "フィオナ"
# 「ああいえ、何でもないです、何でもっ」
line = "「ああいえ、何でもないです、何でもっ」"

[[dialogue]]
speaker = "トワ先生"
# 「じゃあ話を続けるね。ウェディングドレスに変化したのは、フィオナちゃんが結婚──」
line = "「じゃあ話を続けるね。ウェディングドレスに変化したのは、フィオナちゃんが結婚──」"

[[dialogue]]
speaker = "フィオナ"
# 「うああ～～っ！！？」
line = "「うああ～～っ！！？」"

[[dialogue]]
speaker = "ナミエル"
# 「フィオナお嬢様？　ご気分が優れないようでしたらお休みされても……」
line = "「フィオナお嬢様？　ご気分が優れないようでしたらお休みされても……」"

[[dialogue]]
speaker = "フィオナ"
# 「う、ううんっ、大丈夫なのっ！　大丈夫だからっ！」
line = "「う、ううんっ、大丈夫なのっ！　大丈夫だからっ！」"

[[dialogue]]
speaker = "トワ先生"
# 「フィオナちゃん。みんな薄々わかってるから覚悟決めようね？」
line = "「フィオナちゃん。みんな薄々わかってるから覚悟決めようね？」"

[[dialogue]]
speaker = "トワ先生"
# 「戦闘服がウェディングドレスに変化したのは──ズバリ！　フィオナちゃんが結婚したいと思ったからだよ！」
line = "「戦闘服がウェディングドレスに変化したのは──ズバリ！　フィオナちゃんが結婚したいと思ったからだよ！」"

[[dialogue]]
speaker = "フィオナ"
# 「キャーーーーーーッ！！？」
line = "「キャーーーーーーッ！！？」"

[[dialogue]]
speaker = "トワ先生"
# 「星見家メイド隊の人が１人、結婚して退職したって聞いてね。きっとフィオナちゃんも精神的な影響を受けたんじゃないかなって」
line = "「星見家メイド隊の人が１人、結婚して退職したって聞いてね。きっとフィオナちゃんも精神的な影響を受けたんじゃないかなって」"

[[dialogue]]
speaker = "キリカ"
# 「お嬢様……」
line = "「お嬢様……」"

[[dialogue]]
speaker = "ナミエル"
# 「お嬢様……本当なのですか……？」
line = "「お嬢様……本当なのですか……？」"

[[dialogue]]
speaker = "フィオナ"
# 「あ、いや、その……結婚したいというか、つい考えちゃったというか……」
line = "「あ、いや、その……結婚したいというか、つい考えちゃったというか……」"

[[dialogue]]
speaker = "フィオナ"
# 「結婚っていいな、って思っちゃって……」
line = "「結婚っていいな、って思っちゃって……」"

[[dialogue]]
speaker = "unk"
# トワちゃん先生の言う通りだ……！
line = "トワちゃん先生の言う通りだ……！"

[[dialogue]]
speaker = "フィオナ"
# 「ああ～～っ！？　恥ずかしいっ！！　恥ずかしいですぅ～～っ！！」
line = "「ああ～～っ！？　恥ずかしいっ！！　恥ずかしいですぅ～～っ！！」"

[[dialogue]]
speaker = "トワ先生"
# 「うんうん、わかるなその気持ち。わたしも同期の子から年賀状とか来るんだけど、写真に写ってる子どもが年々大きくなってて……」
line = "「うんうん、わかるなその気持ち。わたしも同期の子から年賀状とか来るんだけど、写真に写ってる子どもが年々大きくなってて……」"

[[dialogue]]
speaker = "キリカ"
# 「トワ先生、そこまでにしておきましょう」
line = "「トワ先生、そこまでにしておきましょう」"

[[dialogue]]
speaker = "トワ先生"
# 「ハッ──！？　そうだった、悲しみが増えるところだった！？」
line = "「ハッ──！？　そうだった、悲しみが増えるところだった！？」"

[[dialogue]]
speaker = "ナミエル"
# 「原因はわかりました。ではどうすれば元の戦闘服に戻ることができるのでしょう？　それに緋宮会長はどうして呼ばれたのでしょうか……？」
line = "「原因はわかりました。ではどうすれば元の戦闘服に戻ることができるのでしょう？　それに緋宮会長はどうして呼ばれたのでしょうか……？」"

[[dialogue]]
speaker = "トワ先生"
# 「戦闘服を元に戻すには、フィオナちゃんの『結婚っていいな』欲を満たすしかない」
line = "「戦闘服を元に戻すには、フィオナちゃんの『結婚っていいな』欲を満たすしかない」"

[[dialogue]]
speaker = "フィオナ"
# 「うぅ～～っ……そんな言い方しなくても……」
line = "「うぅ～～っ……そんな言い方しなくても……」"

[[dialogue]]
speaker = "トワ先生"
# 「そのために──フィオナちゃんと会長くんには結婚してもらいます！」
line = "「そのために──フィオナちゃんと会長くんには結婚してもらいます！」"

[[dialogue]]
speaker = "フィオナ"
# 「えええ～～～～～～っ！！？？」
line = "「えええ～～～～～～っ！！？？」"
