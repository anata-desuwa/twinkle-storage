[[dialogue]]
speaker = "unk"
# 第１１話,帰路,B
line = "第１１話,帰路,B"

[[dialogue]]
speaker = "アイリーン"
# 「……『世界樹のうろ』を再び停止しました。流星学園・新星学園一行は、無事に送られたものと思われます」
line = "「……『世界樹のうろ』を再び停止しました。流星学園・新星学園一行は、無事に送られたものと思われます」"

[[dialogue]]
speaker = "セドナ"
# 「ご苦労。今日はもう上がっていいぞ」
line = "「ご苦労。今日はもう上がっていいぞ」"

[[dialogue]]
speaker = "アイリーン"
# 「は。ステーションへ戻ります」
line = "「は。ステーションへ戻ります」"

[[dialogue]]
speaker = "カヤ"
# 「じゃ……私は見張りに戻ろっかな」
line = "「じゃ……私は見張りに戻ろっかな」"

[[dialogue]]
speaker = "unk"
# 組織『ネビュラ』基地・指令室──
line = "組織『ネビュラ』基地・指令室──"

[[dialogue]]
speaker = "unk"
# すでに零時を回った夜半、残されたアイリーンはもやもやした気持ちを抱えていた。
line = "すでに零時を回った夜半、残されたアイリーンはもやもやした気持ちを抱えていた。"

[[dialogue]]
speaker = "アイリーン"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "アイリーン"
# 「……その。本当によかったのでしょうか」
line = "「……その。本当によかったのでしょうか」"

[[dialogue]]
speaker = "セドナ"
# 「何がだ？」
line = "「何がだ？」"

[[dialogue]]
speaker = "アイリーン"
# 「彼ら──魔女でない人間や魔族たちに、我々の『世界樹』を通させてしまって」
line = "「彼ら──魔女でない人間や魔族たちに、我々の『世界樹』を通させてしまって」"

[[dialogue]]
speaker = "アイリーン"
# 「も、もちろんっ。彼らののっぴきならない事情は理解していますが……」
line = "「も、もちろんっ。彼らののっぴきならない事情は理解していますが……」"

[[dialogue]]
speaker = "カヤ"
# 「上官が許可を出した。私たちエージェントが口を挟むことじゃない」
line = "「上官が許可を出した。私たちエージェントが口を挟むことじゃない」"

[[dialogue]]
speaker = "アイリーン"
# 「そ、そうですけどっ。こんなことは数千年間、一度もなかったんですよね……！」
line = "「そ、そうですけどっ。こんなことは数千年間、一度もなかったんですよね……！」"

[[dialogue]]
speaker = "セドナ"
# 「フ。まあ確かにそうだが、仕方あるまい。姫が興じてしまったのだから」
line = "「フ。まあ確かにそうだが、仕方あるまい。姫が興じてしまったのだから」"

[[dialogue]]
speaker = "アイリーン"
# 「クラウディア様……確かに」
line = "「クラウディア様……確かに」"

[[dialogue]]
speaker = "unk"
# 納得しようとするアイリーン──
line = "納得しようとするアイリーン──"

[[dialogue]]
speaker = "unk"
# そこへ、カヤが思い出したようにつぶやいた。
line = "そこへ、カヤが思い出したようにつぶやいた。"

[[dialogue]]
speaker = "カヤ"
# 「……あ。でも私、疑問があるな」
line = "「……あ。でも私、疑問があるな」"

[[dialogue]]
speaker = "アイリーン"
# 「疑問？」
line = "「疑問？」"

[[dialogue]]
speaker = "カヤ"
# 「うん。あの人たち──帰り道はどうするの？」
line = "「うん。あの人たち──帰り道はどうするの？」"

[[dialogue]]
speaker = "アイリーン"
# 「あ……」
line = "「あ……」"

[[dialogue]]
speaker = "セドナ"
# 「ハハッ。よい着眼点だ──魔女でない彼らに、うろを再び開く<ruby=すべ>術</ruby>はないのだからな」
line = "「ハハッ。よい着眼点だ──魔女でない彼らに、うろを再び開く<ruby>術<rt>すべ</rt></ruby>はないのだからな」"

[[dialogue]]
speaker = "unk"
# それは当然といえば当然の疑問だった。
line = "それは当然といえば当然の疑問だった。"

[[dialogue]]
speaker = "unk"
# 対してセドナは、どこか晴れ晴れとした様子で告げる。
line = "対してセドナは、どこか晴れ晴れとした様子で告げる。"

[[dialogue]]
speaker = "セドナ"
# 「──<b>帰り道などない</b>よ、カヤ。彼らはそのままでいいんだ」
line = "「──<b>帰り道などない</b>よ、カヤ。彼らはそのままでいいんだ」"

[[dialogue]]
speaker = "アイリーン"
# 「……！？」
line = "「……！？」"

[[dialogue]]
speaker = "カヤ"
# 「ん。上官が許可した理由、なんとなくわかった」
line = "「ん。上官が許可した理由、なんとなくわかった」"

[[dialogue]]
speaker = "unk"
# 驚くアイリーンに対して、カヤは今度こそ納得の表情を浮かべた。
line = "驚くアイリーンに対して、カヤは今度こそ納得の表情を浮かべた。"

[[dialogue]]
speaker = "unk"
# 彼ら『ネビュラ』の行動原理に基づけば──その判断は<b>合理的</b>なものだったからだ。
line = "彼ら『ネビュラ』の行動原理に基づけば──その判断は<b>合理的</b>なものだったからだ。"

[[dialogue]]
speaker = "セドナ"
# 「流星・新星星徒会──彼らにはまとめて魔界へ退避していてもらう。その方が、我々にとって好都合だ」
line = "「流星・新星星徒会──彼らにはまとめて魔界へ退避していてもらう。その方が、我々にとって好都合だ」"

[[dialogue]]
speaker = "アイリーン"
# 「それは、つまり……」
line = "「それは、つまり……」"

[[dialogue]]
speaker = "セドナ"
# 「計画の始動は近い──ゆめゆめ目的を忘れるなよ、おまえ達」
line = "「計画の始動は近い──ゆめゆめ目的を忘れるなよ、おまえ達」"

[[dialogue]]
speaker = "unk"
# 夜空へうそぶくセドナ。
line = "夜空へうそぶくセドナ。"

[[dialogue]]
speaker = "unk"
# 魔女という種の積年の願いが、今まさに開花しようとしていた。
line = "魔女という種の積年の願いが、今まさに開花しようとしていた。"
