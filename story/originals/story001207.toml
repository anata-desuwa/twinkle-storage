[[dialogue]]
speaker = "キリカ"
# 「次は私との花婿修行に参りましょう──<b>旦那様</b>」
line = "「次は私との花婿修行に参りましょう──<b>旦那様</b>」"

[[dialogue]]
speaker = "フィオナ"
# 「旦那様！？」
line = "「旦那様！？」"

[[dialogue]]
speaker = "キリカ"
# 「今は夫婦なのですから、そうお呼びするのが自然でしょう」
line = "「今は夫婦なのですから、そうお呼びするのが自然でしょう」"

[[dialogue]]
speaker = "フィオナ"
# 「う、うん。そうだよね……」
line = "「う、うん。そうだよね……」"

[[dialogue]]
speaker = "フィオナ"
# （でもキリカが旦那様って言うと……ううん、緋宮会長が旦那様って呼ばれると、胸がモヤモヤするような……）
line = "（でもキリカが旦那様って言うと……ううん、緋宮会長が旦那様って呼ばれると、胸がモヤモヤするような……）"

[[dialogue]]
speaker = "キリカ"
# 「私の花婿修行は子育てです」
line = "「私の花婿修行は子育てです」"

[[dialogue]]
speaker = "unk"
# 子育て！？
line = "子育て！？"

[[dialogue]]
speaker = "ナミエル"
# 「こ、こ、子作りなんてハレンチです！」
line = "「こ、こ、子作りなんてハレンチです！」"

[[dialogue]]
speaker = "キリカ"
# 「子作りではなく子育てですよ、ナミエル」
line = "「子作りではなく子育てですよ、ナミエル」"

[[dialogue]]
speaker = "ナミエル"
# 「あ……。コホン、失礼いたしました」
line = "「あ……。コホン、失礼いたしました」"

[[dialogue]]
speaker = "キリカ"
# 「もちろん、本当に伴侶となるのであれば、子作りについても学びが必要でしょうが」
line = "「もちろん、本当に伴侶となるのであれば、子作りについても学びが必要でしょうが」"

[[dialogue]]
speaker = "ナミエル"
# 「ぴやっ！？」
line = "「ぴやっ！？」"

[[dialogue]]
speaker = "フィオナ"
# 「ナミエルが真っ赤になってる！？　キリカ、ちょっと冗談が過ぎるよ……」
line = "「ナミエルが真っ赤になってる！？　キリカ、ちょっと冗談が過ぎるよ……」"

[[dialogue]]
speaker = "キリカ"
# 「冗談ではなかったのですが……失礼しました。言葉には気を付けます」
line = "「冗談ではなかったのですが……失礼しました。言葉には気を付けます」"

[[dialogue]]
speaker = "フィオナ"
# 「でもどうして子育てなの？」
line = "「でもどうして子育てなの？」"

[[dialogue]]
speaker = "キリカ"
# 「上月家は代々星見家に仕えてきました。つまり跡取りが必要です。よって私の伴侶となる者には、子育ても担っていただかなくてはなりません」
line = "「上月家は代々星見家に仕えてきました。つまり跡取りが必要です。よって私の伴侶となる者には、子育ても担っていただかなくてはなりません」"

[[dialogue]]
speaker = "キリカ"
# 「私も知識こそあれ、実際に育児の経験はありません。共に学びましょう、旦那様」
line = "「私も知識こそあれ、実際に育児の経験はありません。共に学びましょう、旦那様」"

[[dialogue]]
speaker = "unk"
# は、はい……
line = "は、はい……"

[[dialogue]]
speaker = "キリカ"
# 「子育てとはいえ、子どもが生まれる前から夫は責務を負います。妊娠中の妻を支えなくてはいけません」
line = "「子育てとはいえ、子どもが生まれる前から夫は責務を負います。妊娠中の妻を支えなくてはいけません」"

[[dialogue]]
speaker = "キリカ"
# 「女性は妊娠すると、日に日にお腹が大きくなっていきます。当然、お腹の中にいる子どもが育てば育つほど、妊婦は動きが取りづらくなります」
line = "「女性は妊娠すると、日に日にお腹が大きくなっていきます。当然、お腹の中にいる子どもが育てば育つほど、妊婦は動きが取りづらくなります」"

[[dialogue]]
speaker = "キリカ"
# 「それにつわりや食欲の増減、匂いに敏感になるなど、体に様々な変化が訪れます。初めての子でしたら、不安はなおさら大きいでしょう」
line = "「それにつわりや食欲の増減、匂いに敏感になるなど、体に様々な変化が訪れます。初めての子でしたら、不安はなおさら大きいでしょう」"

[[dialogue]]
speaker = "キリカ"
# 「そんな時、一番近くにいて妻を支えられるのが、夫であるあなたなのです」
line = "「そんな時、一番近くにいて妻を支えられるのが、夫であるあなたなのです」"

[[dialogue]]
speaker = "キリカ"
# 「男性は妊娠しないので、女性の悩みを完全に理解することはできません。それでも妻の心情を想像し、気遣えるかが、良い夫の分れ目なのでしょう」
line = "「男性は妊娠しないので、女性の悩みを完全に理解することはできません。それでも妻の心情を想像し、気遣えるかが、良い夫の分れ目なのでしょう」"

[[dialogue]]
speaker = "unk"
# たとえば代わりに家事をしたりとか
line = "たとえば代わりに家事をしたりとか"

[[dialogue]]
speaker = "キリカ"
# 「そうですね。元々自分の分担でなくとも、食器を洗う、掃除をするなど、小さな気遣いの積み重ねも大事なのだと思います」
line = "「そうですね。元々自分の分担でなくとも、食器を洗う、掃除をするなど、小さな気遣いの積み重ねも大事なのだと思います」"

[[dialogue]]
speaker = "ナミエル"
# （緋宮会長と子どもを……うぅ……想像するだけで頭が爆発しそうです……）
line = "（緋宮会長と子どもを……うぅ……想像するだけで頭が爆発しそうです……）"

[[dialogue]]
speaker = "フィオナ"
# （真面目な内容なのに、子どもができたらっていう話をしてると、なぜか恥ずかしくなっちゃう……）
line = "（真面目な内容なのに、子どもができたらっていう話をしてると、なぜか恥ずかしくなっちゃう……）"

[[dialogue]]
speaker = "フィオナ"
# （緋宮会長は……いや緋宮会長と結婚するとは決まってないけど……もし私が妊娠したら、何をしてくれるかな……？）
line = "（緋宮会長は……いや緋宮会長と結婚するとは決まってないけど……もし私が妊娠したら、何をしてくれるかな……？）"

[[dialogue]]
speaker = "フィオナ"
# 「でもさすがキリカだね。恥ずかしがらずに──」
line = "「でもさすがキリカだね。恥ずかしがらずに──」"

[[dialogue]]
speaker = "キリカ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "フィオナ"
# 「本当は恥ずかしい？」
line = "「本当は恥ずかしい？」"

[[dialogue]]
speaker = "キリカ"
# 「い、いえ。必要なことを伝えているだけですから、恥ずかしがることなど……」
line = "「い、いえ。必要なことを伝えているだけですから、恥ずかしがることなど……」"

[[dialogue]]
speaker = "フィオナ"
# 「キリカの子どもだったら、きっと美人になるんだろうなぁ～」
line = "「キリカの子どもだったら、きっと美人になるんだろうなぁ～」"

[[dialogue]]
speaker = "キリカ"
# 「──！？」
line = "「──！？」"

[[dialogue]]
speaker = "unk"
# （顔がもっと赤くなった……！）
line = "（顔がもっと赤くなった……！）"

[[dialogue]]
speaker = "キリカ"
# 「お、お嬢様、からかわないでください……」
line = "「お、お嬢様、からかわないでください……」"

[[dialogue]]
speaker = "フィオナ"
# 「ごめんごめん。顔を赤くしてるキリカが珍しかったから、ついね」
line = "「ごめんごめん。顔を赤くしてるキリカが珍しかったから、ついね」"

[[dialogue]]
speaker = "キリカ"
# 「コホン。ここに育児の練習用の人形を用意しました。標準的な新生児の大きさをしています。こちらで着替えやオムツを替える練習をしましょう」
line = "「コホン。ここに育児の練習用の人形を用意しました。標準的な新生児の大きさをしています。こちらで着替えやオムツを替える練習をしましょう」"

[[dialogue]]
speaker = "キリカ"
# 「……そうです。やはり手際がいいですね。旦那様は良い父親になりそうです」
line = "「……そうです。やはり手際がいいですね。旦那様は良い父親になりそうです」"

[[dialogue]]
speaker = "キリカ"
# 「私と緋宮会長の子はどんな子になるのでしょうか。あなたと私の子ですから、星騎士になったらきっと拳で戦うのでしょうね。上月神闘流も継承させなくては」
line = "「私と緋宮会長の子はどんな子になるのでしょうか。あなたと私の子ですから、星騎士になったらきっと拳で戦うのでしょうね。上月神闘流も継承させなくては」"

[[dialogue]]
speaker = "unk"
# それも子育てに入るんですか！？
line = "それも子育てに入るんですか！？"

[[dialogue]]
speaker = "キリカ"
# 「星見家の方々の護衛も必要ですから。もちろん、私たちの子どもに才があればの話ですが」
line = "「星見家の方々の護衛も必要ですから。もちろん、私たちの子どもに才があればの話ですが」"

[[dialogue]]
speaker = "キリカ"
# 「でもきっと大丈夫でしょう。私と旦那様の子どもですから」
line = "「でもきっと大丈夫でしょう。私と旦那様の子どもですから」"

[[dialogue]]
speaker = "キリカ"
# 「次はミルクです。哺乳瓶はよく洗って消毒してください。粉ミルクを入れ、沸騰後少し冷ましたお湯を注ぎます」
line = "「次はミルクです。哺乳瓶はよく洗って消毒してください。粉ミルクを入れ、沸騰後少し冷ましたお湯を注ぎます」"

[[dialogue]]
speaker = "キリカ"
# 「そのままでは熱いですから、必ず人肌くらいに冷ましてください。飲ませ方も人形で練習してみましょうか」
line = "「そのままでは熱いですから、必ず人肌くらいに冷ましてください。飲ませ方も人形で練習してみましょうか」"

[[dialogue]]
speaker = "キリカ"
# 「赤ちゃんを横抱きにして……そうです、その抱き方です。ふふ。なんだか優しい手つきですね」
line = "「赤ちゃんを横抱きにして……そうです、その抱き方です。ふふ。なんだか優しい手つきですね」"

[[dialogue]]
speaker = "unk"
# この子は俺とキリカ師匠の子どもですから
line = "この子は俺とキリカ師匠の子どもですから"

[[dialogue]]
speaker = "キリカ"
# 「──！？　そ、そうですね……私たちの子ども……」
line = "「──！？　そ、そうですね……私たちの子ども……」"

[[dialogue]]
speaker = "キリカ"
# 「これなら子どもが生まれても大丈夫ですね。頼もしいです、旦那様」
line = "「これなら子どもが生まれても大丈夫ですね。頼もしいです、旦那様」"
