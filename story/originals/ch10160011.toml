[[dialogue]]
speaker = "unk"
# 第１話,不知火ヒトリは幽霊が見える,P
line = "第１話,不知火ヒトリは幽霊が見える,P"

[[dialogue]]
speaker = "アナ"
# 「……お疲れ様です。美術部の活動計画、確かに受け取りました」
line = "「……お疲れ様です。美術部の活動計画、確かに受け取りました」"

[[dialogue]]
speaker = "ヒトリ"
# 「あ、ありがとうございます……問題とか、ありませんでしたか？」
line = "「あ、ありがとうございます……問題とか、ありませんでしたか？」"

[[dialogue]]
speaker = "アナ"
# 「特には。ノープロブレムです」
line = "「特には。ノープロブレムです」"

[[dialogue]]
speaker = "ヒトリ"
# 「そ、そうですか……」
line = "「そ、そうですか……」"

[[dialogue]]
speaker = "アナ"
# 「……それよりも、相変わらず不知火さんは物々しい」
line = "「……それよりも、相変わらず不知火さんは物々しい」"

[[dialogue]]
speaker = "ヒトリ"
# 「へっ……？」
line = "「へっ……？」"

[[dialogue]]
speaker = "unk"
# まあ……確かに？
line = "まあ……確かに？"

[[dialogue]]
speaker = "ヒトリ"
# 「ひあっ！？　お、男の人っ！？」
line = "「ひあっ！？　お、男の人っ！？」"

[[dialogue]]
speaker = "アナ"
# 「……後ろの棺桶の中に隠れてしまいました」
line = "「……後ろの棺桶の中に隠れてしまいました」"

[[dialogue]]
speaker = "ヒトリ"
# 「す、すみません……直そうとは思ってるんですけど、まだその、お、男の人、得意じゃなくて……」
line = "「す、すみません……直そうとは思ってるんですけど、まだその、お、男の人、得意じゃなくて……」"

[[dialogue]]
speaker = "アナ"
# 「会長が驚かすからです。３歩後ろにバック」
line = "「会長が驚かすからです。３歩後ろにバック」"

[[dialogue]]
speaker = "unk"
# 普通に話しかけただけなんだけど！？
line = "普通に話しかけただけなんだけど！？"

[[dialogue]]
speaker = "ヒトリ"
# 「い、いえ……会長さんは何も悪くないです……。か、会長さんが優しい方だっていうのは、わかってますから……」
line = "「い、いえ……会長さんは何も悪くないです……。か、会長さんが優しい方だっていうのは、わかってますから……」"

[[dialogue]]
speaker = "ヒトリ"
# 「ん、しょっと……」
line = "「ん、しょっと……」"

[[dialogue]]
speaker = "ヒトリ"
# 「す、すみません、話の腰を折ってしまって……。それで、わたしが物々しいっていうのは……」
line = "「す、すみません、話の腰を折ってしまって……。それで、わたしが物々しいっていうのは……」"

[[dialogue]]
speaker = "アナ"
# 「その棺桶と、不知火さんにいつもついてる霊もそう。見えない人には見えないだろうけど、見える人は驚く」
line = "「その棺桶と、不知火さんにいつもついてる霊もそう。見えない人には見えないだろうけど、見える人は驚く」"

[[dialogue]]
speaker = "ヒトリ"
# 「ゆーちゃんのことですか……？　だ、大丈夫ですよ？　ゆーちゃんは悪い霊じゃありませんから」
line = "「ゆーちゃんのことですか……？　だ、大丈夫ですよ？　ゆーちゃんは悪い霊じゃありませんから」"

[[dialogue]]
speaker = "アナ"
# 「その棺桶の中にも、たくさんいる」
line = "「その棺桶の中にも、たくさんいる」"

[[dialogue]]
speaker = "ヒトリ"
# 「あ、うぅ……で、でも、みんな、本当にいい幽霊さんたちなんです……だ、だから、迷惑とか、かけないので……」
line = "「あ、うぅ……で、でも、みんな、本当にいい幽霊さんたちなんです……だ、だから、迷惑とか、かけないので……」"

[[dialogue]]
speaker = "アナ"
# 「別に、連れてくるなと言ってるわけじゃない。……勘違いさせたのなら、謝罪します」
line = "「別に、連れてくるなと言ってるわけじゃない。……勘違いさせたのなら、謝罪します」"

[[dialogue]]
speaker = "unk"
# ゆーちゃんは、ヒトリの友達なんだよな？
line = "ゆーちゃんは、ヒトリの友達なんだよな？"

[[dialogue]]
speaker = "ヒトリ"
# 「は、はいっ……。わたしが子供の頃からのお友達ですっ。星力のことも、この学園のことも、全部ゆーちゃんから教えてもらったんですよ」
line = "「は、はいっ……。わたしが子供の頃からのお友達ですっ。星力のことも、この学園のことも、全部ゆーちゃんから教えてもらったんですよ」"

[[dialogue]]
speaker = "アナ"
# 「随分博識な幽霊。生前は星騎士？」
line = "「随分博識な幽霊。生前は星騎士？」"

[[dialogue]]
speaker = "ヒトリ"
# 「言われてみれば……。そうだったの、ゆーちゃん？」
line = "「言われてみれば……。そうだったの、ゆーちゃん？」"

[[dialogue]]
speaker = "ゆーちゃん"
# 「ゆー……」
line = "「ゆー……」"

[[dialogue]]
speaker = "ヒトリ"
# 「違うって言ってます」
line = "「違うって言ってます」"

[[dialogue]]
speaker = "unk"
# 幽霊の言葉がわかるの！？
line = "幽霊の言葉がわかるの！？"

[[dialogue]]
speaker = "ヒトリ"
# 「は、はい。霊感が強いおかげで、姿もくっきり見えますし、言葉も話せますよ？」
line = "「は、はい。霊感が強いおかげで、姿もくっきり見えますし、言葉も話せますよ？」"

[[dialogue]]
speaker = "アナ"
# 「天使の私ですら、人間界の霊的存在の姿は朧気に確認できても、言葉までわからない。不知火さんは相当強い霊感の持ち主。凄い」
line = "「天使の私ですら、人間界の霊的存在の姿は朧気に確認できても、言葉までわからない。不知火さんは相当強い霊感の持ち主。凄い」"

[[dialogue]]
speaker = "ゆーちゃん"
# 「ゆー！」
line = "「ゆー！」"

[[dialogue]]
speaker = "ヒトリ"
# 「そ、そんなに凄いことじゃないと思いますけど……え、えへへ」
line = "「そ、そんなに凄いことじゃないと思いますけど……え、えへへ」"

[[dialogue]]
speaker = "アナ"
# 「とは言え、他の人を驚かせてしまうのも事実。普段はゆーちゃんをどこかに隠しておくことを提案」
line = "「とは言え、他の人を驚かせてしまうのも事実。普段はゆーちゃんをどこかに隠しておくことを提案」"

[[dialogue]]
speaker = "ヒトリ"
# 「な、なるほどです……ゆーちゃん、どうする？」
line = "「な、なるほどです……ゆーちゃん、どうする？」"

[[dialogue]]
speaker = "unk"
# この棺桶の中とかはどうだ？
line = "この棺桶の中とかはどうだ？"

[[dialogue]]
speaker = "ヒトリ"
# 「ひうっ！？　ち、近いです！？」
line = "「ひうっ！？　ち、近いです！？」"

[[dialogue]]
speaker = "アナ"
# 「……あなたが隠れてどうするんですか」
line = "「……あなたが隠れてどうするんですか」"

[[dialogue]]
speaker = "ヒトリ"
# 「す、すみません～～！」
line = "「す、すみません～～！」"

[[dialogue]]
speaker = "アナ"
# 「会長も。今度は５歩後ろにバック」
line = "「会長も。今度は５歩後ろにバック」"

[[dialogue]]
speaker = "ヒトリ"
# 「すすす、すみませんっ、すみませんっ……恥ずかしいだけで、会長さんが優しい人だとは、ちゃんとわかってますから……！」
line = "「すすす、すみませんっ、すみませんっ……恥ずかしいだけで、会長さんが優しい人だとは、ちゃんとわかってますから……！」"

[[dialogue]]
speaker = "アナ"
# 「初心な少女の乙女心をもてあそんだ。会長、反省」
line = "「初心な少女の乙女心をもてあそんだ。会長、反省」"

[[dialogue]]
speaker = "unk"
# 人をプレイボーイみたいに言わないでくれる！？
line = "人をプレイボーイみたいに言わないでくれる！？"

[[dialogue]]
speaker = "アナ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ヒトリ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# そこは否定して！？
line = "そこは否定して！？"

[[dialogue]]
speaker = "ヒトリ"
# 「わ、わたし、そろそろお暇しますねっ。会長さんも、できれば気にしないでくださいっ。失礼します～～！」
line = "「わ、わたし、そろそろお暇しますねっ。会長さんも、できれば気にしないでくださいっ。失礼します～～！」"

[[dialogue]]
speaker = "アナ"
# 「会長、また不知火さんにフラれてしまいましたね。前途多難」
line = "「会長、また不知火さんにフラれてしまいましたね。前途多難」"

[[dialogue]]
speaker = "unk"
# もうちょっと仲良くしたいんだけどなぁ……
line = "もうちょっと仲良くしたいんだけどなぁ……"

[[dialogue]]
speaker = "unk"
# ──後日、ヒトリに一言謝ろうとしたが、結局また逃げられてしまうのだった。
line = "──後日、ヒトリに一言謝ろうとしたが、結局また逃げられてしまうのだった。"
