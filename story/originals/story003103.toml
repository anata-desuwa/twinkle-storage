[[dialogue]]
speaker = "unk"
# 晴れ着フォームの力を手に入れる為、獅子舞と羽根突き勝負をすることになった星騎士たち。
line = "晴れ着フォームの力を手に入れる為、獅子舞と羽根突き勝負をすることになった星騎士たち。"

[[dialogue]]
speaker = "unk"
# ソフィア、ウズメイア、舞亜の３人も加勢するが、しかし――
line = "ソフィア、ウズメイア、舞亜の３人も加勢するが、しかし――"

[[dialogue]]
speaker = "獅子舞"
# 「食らうがいい。<ruby=しちさい>七彩</ruby>流羽根突き術・壱ノ型『<ruby=あか>赤</ruby>』！」
line = "「食らうがいい。<ruby>七彩<rt>しちさい</rt></ruby>流羽根突き術・壱ノ型『<ruby>赤<rt>あか</rt></ruby>』！」"

[[dialogue]]
speaker = "ウズメイア"
# 「うわっ！？　ダメだ、取れないし！　獅子舞さんの技、強過ぎなんだけど～！」
line = "「うわっ！？　ダメだ、取れないし！　獅子舞さんの技、強過ぎなんだけど～！」"

[[dialogue]]
speaker = "ソフィア"
# 「あっという間に負けてしまいました。これで私たち全員、ストレート負け……」
line = "「あっという間に負けてしまいました。これで私たち全員、ストレート負け……」"

[[dialogue]]
speaker = "アナ"
# 「まさか、ただの羽根突きではなく、晴れ着の武器や術を使って、羽根を落とさないように打ち合う『星術羽根突き』とは……」
line = "「まさか、ただの羽根突きではなく、晴れ着の武器や術を使って、羽根を落とさないように打ち合う『星術羽根突き』とは……」"

[[dialogue]]
speaker = "unk"
# 獅子舞は正月の力で作り出した宙に浮く羽子板１つで、自身は１度も羽根を落とさず、星騎士たちに全勝してみせていた。
line = "獅子舞は正月の力で作り出した宙に浮く羽子板１つで、自身は１度も羽根を落とさず、星騎士たちに全勝してみせていた。"

[[dialogue]]
speaker = "舞亜"
# 「獅子舞さん、とんでもない腕前だね。世界レベルのスケーターを目の前で見ているような、輝く星が見えたよ」
line = "「獅子舞さん、とんでもない腕前だね。世界レベルのスケーターを目の前で見ているような、輝く星が見えたよ」"

[[dialogue]]
speaker = "獅子舞"
# 「ふふん、当然だ。お前ら小娘共とは年季が違う。何より、今日は元旦というこの上なく縁起の良き日」
line = "「ふふん、当然だ。お前ら小娘共とは年季が違う。何より、今日は元旦というこの上なく縁起の良き日」"

[[dialogue]]
speaker = "獅子舞"
# 「朝の流星市国ニュース番組『もにスタ』でも、元旦生まれ山羊座の吾輩の運勢は、１位だったのだからな！」
line = "「朝の流星市国ニュース番組『もにスタ』でも、元旦生まれ山羊座の吾輩の運勢は、１位だったのだからな！」"

[[dialogue]]
speaker = "サーシャ"
# 「獅子舞さんも、ニュースの占いコーナーを見たりするのね～♪」
line = "「獅子舞さんも、ニュースの占いコーナーを見たりするのね～♪」"

[[dialogue]]
speaker = "獅子舞"
# 「ふん、無論。縁起は大事だからな」
line = "「ふん、無論。縁起は大事だからな」"

[[dialogue]]
speaker = "リーリア"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "シズハ"
# 「リーリア先輩？　どうかしました？」
line = "「リーリア先輩？　どうかしました？」"

[[dialogue]]
speaker = "リーリア"
# 「え？　あっ、ううん、獅子舞さんの技がすごく綺麗だったから、思わず見惚れちゃって……」
line = "「え？　あっ、ううん、獅子舞さんの技がすごく綺麗だったから、思わず見惚れちゃって……」"

[[dialogue]]
speaker = "獅子舞"
# 「ふむ……」
line = "「ふむ……」"

[[dialogue]]
speaker = "リーリア"
# 「って、わっ！？　な、なんですか？　獅子舞さんもじ～っと見てきたりして……私の顔になんか付いてます？」
line = "「って、わっ！？　な、なんですか？　獅子舞さんもじ～っと見てきたりして……私の顔になんか付いてます？」"

[[dialogue]]
speaker = "獅子舞"
# 「魔女の星騎士……渋谷リーリアといったか。吾輩は――」
line = "「魔女の星騎士……渋谷リーリアといったか。吾輩は――」"

[[dialogue]]
speaker = "獅子舞"
# 「特に、お前を認めん！」
line = "「特に、お前を認めん！」"

[[dialogue]]
speaker = "リーリア"
# 「えええぇっ！？　突然なんなんですかぁ！？」
line = "「えええぇっ！？　突然なんなんですかぁ！？」"

[[dialogue]]
speaker = "獅子舞"
# 「それだけお前が晴れ着を着こなせていない、ということだ」
line = "「それだけお前が晴れ着を着こなせていない、ということだ」"

[[dialogue]]
speaker = "獅子舞"
# 「他の者たちも、これではまるで相手にならん。星騎士ならば、もっと晴れ着の力を使いこなしてみせよ！　故に――」
line = "「他の者たちも、これではまるで相手にならん。星騎士ならば、もっと晴れ着の力を使いこなしてみせよ！　故に――」"

[[dialogue]]
speaker = "獅子舞"
# 「これより各自、吾輩が用意したくじ引きで２人ずつの組に分かれ、羽根突きの練習をするがいい！」
line = "「これより各自、吾輩が用意したくじ引きで２人ずつの組に分かれ、羽根突きの練習をするがいい！」"

[[dialogue]]
speaker = "シズハ"
# 「こ、これはちょっと、思っていたより大変そうかも……」
line = "「こ、これはちょっと、思っていたより大変そうかも……」"

[[dialogue]]
speaker = "ディーラック"
# 「やれやれ、予想していた通り、面倒な展開になったのサ」
line = "「やれやれ、予想していた通り、面倒な展開になったのサ」"

[[dialogue]]
speaker = "unk"
# それから獅子舞の指示通り、羽根突きの練習を開始することになった。
line = "それから獅子舞の指示通り、羽根突きの練習を開始することになった。"

[[dialogue]]
speaker = "unk"
# 結界内は広く使えるということで、チーム別に練習場所を変えようと、シズハとリーリアは大門前へと移動してきた。
line = "結界内は広く使えるということで、チーム別に練習場所を変えようと、シズハとリーリアは大門前へと移動してきた。"

[[dialogue]]
speaker = "リーリア"
# 「なんか変なことになっちゃったけど、シズハちゃん、よろしくね～☆」
line = "「なんか変なことになっちゃったけど、シズハちゃん、よろしくね～☆」"

[[dialogue]]
speaker = "シズハ"
# 「はい！　リーリア先輩、こちらこそよろしくお願いします」
line = "「はい！　リーリア先輩、こちらこそよろしくお願いします」"

[[dialogue]]
speaker = "リーリア"
# 「それじゃあ、行きますよ～？　えいっ☆」
line = "「それじゃあ、行きますよ～？　えいっ☆」"

[[dialogue]]
speaker = "シズハ"
# 「おっと！　先輩、鋭い打ち込み……！」
line = "「おっと！　先輩、鋭い打ち込み……！」"

[[dialogue]]
speaker = "シズハ"
# 「先輩って、羽根突きを前にもやったこと、あったりするんですか？　すごく上手ですっ」
line = "「先輩って、羽根突きを前にもやったこと、あったりするんですか？　すごく上手ですっ」"

[[dialogue]]
speaker = "リーリア"
# 「ううん、私は羽根突きするの、今日が初めてだよ～っ」
line = "「ううん、私は羽根突きするの、今日が初めてだよ～っ」"

[[dialogue]]
speaker = "シズハ"
# 「えっ、そうなんですか！？」
line = "「えっ、そうなんですか！？」"

[[dialogue]]
speaker = "リーリア"
# 「うん。私、目で見て覚えるのは得意なんだよね～☆　えいっ！」
line = "「うん。私、目で見て覚えるのは得意なんだよね～☆　えいっ！」"

[[dialogue]]
speaker = "シズハ"
# 「すごい！　バトルフェスタの戦いを見てた時も思いましたけど、リーリア先輩って、やっぱりすごい魔女なんですね！」
line = "「すごい！　バトルフェスタの戦いを見てた時も思いましたけど、リーリア先輩って、やっぱりすごい魔女なんですね！」"

[[dialogue]]
speaker = "リーリア"
# 「ふっふ～ん、強くて可愛い先輩でしょ～？」
line = "「ふっふ～ん、強くて可愛い先輩でしょ～？」"

[[dialogue]]
speaker = "unk"
# 羽根突きを続けたまま、ウインクして見せるリーリア。
line = "羽根突きを続けたまま、ウインクして見せるリーリア。"

[[dialogue]]
speaker = "リーリア"
# 「そういえばシズハちゃんに、聞きたかったことあるんだけど～っ」
line = "「そういえばシズハちゃんに、聞きたかったことあるんだけど～っ」"

[[dialogue]]
speaker = "シズハ"
# 「はい、なんでしょう？」
line = "「はい、なんでしょう？」"

[[dialogue]]
speaker = "リーリア"
# 「獅子舞さんがロストアイテムだって名乗った時、シズハちゃん、何か知ってるみたいだったじゃない？」
line = "「獅子舞さんがロストアイテムだって名乗った時、シズハちゃん、何か知ってるみたいだったじゃない？」"

[[dialogue]]
speaker = "シズハ"
# 「……！　えっと～、それはなんていうか……」
line = "「……！　えっと～、それはなんていうか……」"

[[dialogue]]
speaker = "リーリア"
# 「実は私も魔女の森にある文献で、ロストアイテムっていうものが存在していることは、読んだことがあって――」
line = "「実は私も魔女の森にある文献で、ロストアイテムっていうものが存在していることは、読んだことがあって――」"

[[dialogue]]
speaker = "リーリア"
# 「その中には、大昔の魔女が作り出した物も多くあるって……」
line = "「その中には、大昔の魔女が作り出した物も多くあるって……」"

[[dialogue]]
speaker = "シズハ"
# （どうしよう、トレジアンナさんからロストアイテムの回収については、特にネビュラの人たちには話さないようにって口止めされてるんだよね……）
line = "（どうしよう、トレジアンナさんからロストアイテムの回収については、特にネビュラの人たちには話さないようにって口止めされてるんだよね……）"

[[dialogue]]
speaker = "リーリア"
# 「あと、シズハちゃんのそばにずっとくっ付いてる、その『ディーちゃん』って子も気になるし……」
line = "「あと、シズハちゃんのそばにずっとくっ付いてる、その『ディーちゃん』って子も気になるし……」"

[[dialogue]]
speaker = "ディーラック"
# 「あん？　ボクかい？」
line = "「あん？　ボクかい？」"

[[dialogue]]
speaker = "シズハ"
# （ディーちゃんに関することも話さないように言われてる。ネビュラに知られると面倒だからって……）
line = "（ディーちゃんに関することも話さないように言われてる。ネビュラに知られると面倒だからって……）"

[[dialogue]]
speaker = "ディーラック"
# 「……はぁ、仕方ないなぁ～。簡単に説明すると、ボクはシズハちゃんの使い魔みたいなものサ」
line = "「……はぁ、仕方ないなぁ～。簡単に説明すると、ボクはシズハちゃんの使い魔みたいなものサ」"

[[dialogue]]
speaker = "ディーラック"
# 「で、ロストアイテムのことを知っているのは、元々病気だったシズハちゃんを治したのが、ロストアイテムの力によるものだからサ」
line = "「で、ロストアイテムのことを知っているのは、元々病気だったシズハちゃんを治したのが、ロストアイテムの力によるものだからサ」"

[[dialogue]]
speaker = "ディーラック"
# 「そこから先は、プライベートな話になるから、ボクもシズハちゃんもあまり話したくない。そんなところサ」
line = "「そこから先は、プライベートな話になるから、ボクもシズハちゃんもあまり話したくない。そんなところサ」"

[[dialogue]]
speaker = "リーリア"
# 「なるほど！　何やら訳アリってことだね、了解了解～☆」
line = "「なるほど！　何やら訳アリってことだね、了解了解～☆」"

[[dialogue]]
speaker = "リーリア"
# 「それじゃあ、これ以上は深くは聞かないことにして、別の話題で仲良くなりましょう♪」
line = "「それじゃあ、これ以上は深くは聞かないことにして、別の話題で仲良くなりましょう♪」"

[[dialogue]]
speaker = "シズハ"
# 「え……？」
line = "「え……？」"

[[dialogue]]
speaker = "リーリア"
# 「誰しも人に言えないことって、多かれ少なかれあるじゃないですか～？　だから、それはシズハちゃんが話したいなって思った時でいいです」
line = "「誰しも人に言えないことって、多かれ少なかれあるじゃないですか～？　だから、それはシズハちゃんが話したいなって思った時でいいです」"

[[dialogue]]
speaker = "リーリア"
# 「ほら私も、元々ネビュラのスパイとして学園に潜入していた身ですから☆」
line = "「ほら私も、元々ネビュラのスパイとして学園に潜入していた身ですから☆」"

[[dialogue]]
speaker = "リーリア"
# 「なので私は、言えないことがあったとしても、今目の前にいるシズハちゃんのことを見て仲良くするよ♪」
line = "「なので私は、言えないことがあったとしても、今目の前にいるシズハちゃんのことを見て仲良くするよ♪」"

[[dialogue]]
speaker = "シズハ"
# 「リーリア先輩……！　ありがとうございます」
line = "「リーリア先輩……！　ありがとうございます」"

[[dialogue]]
speaker = "リーリア"
# 「マジカルな晴れ着の星騎士同士、ウィンウィンな友達になりましょう☆」
line = "「マジカルな晴れ着の星騎士同士、ウィンウィンな友達になりましょう☆」"

[[dialogue]]
speaker = "シズハ"
# 「はいっ♪　それじゃあ、お近づきの印になんですけど――お尻を触ってもいいでしょうか？」
line = "「はいっ♪　それじゃあ、お近づきの印になんですけど――お尻を触ってもいいでしょうか？」"

[[dialogue]]
speaker = "リーリア"
# 「ん？　なんて？」
line = "「ん？　なんて？」"

[[dialogue]]
speaker = "シズハ"
# 「お尻です、お尻！　リーリア先輩ともっと仲良くなる為に、その可愛くてプリプリなお尻と触れ合いたいなと！！！」
line = "「お尻です、お尻！　リーリア先輩ともっと仲良くなる為に、その可愛くてプリプリなお尻と触れ合いたいなと！！！」"

[[dialogue]]
speaker = "リーリア"
# 「聞き間違いじゃなかった！？」
line = "「聞き間違いじゃなかった！？」"

[[dialogue]]
speaker = "シズハ"
# 「もちろん、先輩も私のお尻を揉みしだいちゃって大丈夫なので！！」
line = "「もちろん、先輩も私のお尻を揉みしだいちゃって大丈夫なので！！」"

[[dialogue]]
speaker = "リーリア"
# 「何も大丈夫じゃないけどどういうことなのかな！？」
line = "「何も大丈夫じゃないけどどういうことなのかな！？」"

[[dialogue]]
speaker = "シズハ"
# 「私にとってはお尻を触ることが、仲良くなる為のファーストステップなんです！」
line = "「私にとってはお尻を触ることが、仲良くなる為のファーストステップなんです！」"

[[dialogue]]
speaker = "シズハ"
# 「邪な気持ちは一切ありません！！　この曇りなき眼を見てください、先輩！！！」
line = "「邪な気持ちは一切ありません！！　この曇りなき眼を見てください、先輩！！！」"

[[dialogue]]
speaker = "リーリア"
# 「食い気味でただただ怖いよ！？」
line = "「食い気味でただただ怖いよ！？」"

[[dialogue]]
speaker = "リーリア"
# 「え、えっと～。とりあえず、獅子舞さんに羽根突きで勝たないといけないじゃない？　だから、それが終わった後にしたいかな～？」
line = "「え、えっと～。とりあえず、獅子舞さんに羽根突きで勝たないといけないじゃない？　だから、それが終わった後にしたいかな～？」"

[[dialogue]]
speaker = "シズハ"
# 「つまり獅子舞さんに勝てば、リーリア先輩のお尻を私の好きにしていいということですね！？」
line = "「つまり獅子舞さんに勝てば、リーリア先輩のお尻を私の好きにしていいということですね！？」"

[[dialogue]]
speaker = "リーリア"
# 「そこまでは言ってない……！」
line = "「そこまでは言ってない……！」"

[[dialogue]]
speaker = "シズハ"
# 「そういうことなら私、頑張ります！　てぇーいっ！」
line = "「そういうことなら私、頑張ります！　てぇーいっ！」"

[[dialogue]]
speaker = "リーリア"
# 「ちょっ！？　急にマジカル強い羽根突きスマッシュが炸裂！？　私のお尻でそんなにやる気が出るの！？」
line = "「ちょっ！？　急にマジカル強い羽根突きスマッシュが炸裂！？　私のお尻でそんなにやる気が出るの！？」"

[[dialogue]]
speaker = "シズハ"
# 「はい！　獅子舞さんとの羽根突き、次は絶対に勝ちますっ！　いけいけゴーゴー！」
line = "「はい！　獅子舞さんとの羽根突き、次は絶対に勝ちますっ！　いけいけゴーゴー！」"

[[dialogue]]
speaker = "リーリア"
# （う、迂闊に適当なことを口にするんじゃなかった……！）
line = "（う、迂闊に適当なことを口にするんじゃなかった……！）"

[[dialogue]]
speaker = "unk"
# やる気に火が点いた<ruby=シズハ>後輩</ruby>の気迫に押されて、後でどう誤魔化そうかと困る<ruby=リーリア>先輩</ruby>なのであった。
line = "やる気に火が点いた<ruby>後輩<rt>シズハ</rt></ruby>の気迫に押されて、後でどう誤魔化そうかと困る<ruby>先輩<rt>リーリア</rt></ruby>なのであった。"
