line = "「緋宮会長……大丈夫ですか？」"

[[dialogue]]
speaker = "クロト"
# 「……ああ。大丈夫だ。少し、気持ちの整理をしていた」
line = "「……ああ。大丈夫だ。少し、気持ちの整理をしていた」"

[[dialogue]]
speaker = "unk"
# 学園長の件については──俺にとって、失ったものも大きかった。
line = "学園長の件については──俺にとって、失ったものも大きかった。"

[[dialogue]]
speaker = "unk"
# それでも、俺たちは無事に目的を達成することができた。
line = "それでも、俺たちは無事に目的を達成することができた。"

[[dialogue]]
speaker = "unk"
# 俺は、改めて隣を翔けるヴィーナスを見る。
line = "俺は、改めて隣を翔けるヴィーナスを見る。"

[[dialogue]]
speaker = "ヴィーナス"
# 「みんな……助けに来てくれてほんとにありがと！」
line = "「みんな……助けに来てくれてほんとにありがと！」"

[[dialogue]]
speaker = "ヴィーナス"
