line = "『星徒会長と選挙管理委員会として、適切な距離を保つべきだ』と言って、恋人にはなっていないものの、休日出かけたり、家に行ったりと、誰より近い関係になっていた。"

[[dialogue]]
speaker = "梨緒"
# 「だけど、その……」
line = "「だけど、その……」"

[[dialogue]]
speaker = "クロト"
# 「梨緒？」
line = "「梨緒？」"

[[dialogue]]
speaker = "unk"
