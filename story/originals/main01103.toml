[[dialogue]]
speaker = "unk"
# 第３話,大いなる冬,B
line = "第３話,大いなる冬,B"

[[dialogue]]
speaker = "unk"
# ──あれから。
line = "──あれから。"

[[dialogue]]
speaker = "unk"
# 俺たちは『森』への突入作戦へ向けて準備を推し進めた。
line = "俺たちは『森』への突入作戦へ向けて準備を推し進めた。"

[[dialogue]]
speaker = "unk"
# レゾフの街全体を大凍結から守れるよう結界を強化し──
line = "レゾフの街全体を大凍結から守れるよう結界を強化し──"

[[dialogue]]
speaker = "unk"
# 俺たち星騎士は、そんな『冬』においても行動が取れるよう『耐氷雪の装衣』のさらなる増産に励んだ。
line = "俺たち星騎士は、そんな『冬』においても行動が取れるよう『耐氷雪の装衣』のさらなる増産に励んだ。"

[[dialogue]]
speaker = "unk"
# さらには『ネメシス』という未知の地への進行ルートとプラン立案──
line = "さらには『ネメシス』という未知の地への進行ルートとプラン立案──"

[[dialogue]]
speaker = "unk"
# 金星の反応監視も含めて、トリシャさんには最後まで協力してもらった。
line = "金星の反応監視も含めて、トリシャさんには最後まで協力してもらった。"

[[dialogue]]
speaker = "unk"
# それらの度重なる準備を終えて──
line = "それらの度重なる準備を終えて──"

[[dialogue]]
speaker = "unk"
# 魔界にはやがて、『大いなる冬』が訪れる。
line = "魔界にはやがて、『大いなる冬』が訪れる。"

[[dialogue]]
speaker = "ユウリ"
# 「ッ……とんでもねえな」
line = "「ッ……とんでもねえな」"

[[dialogue]]
speaker = "フィオナ"
# 「大いなる冬──なるほど。これは確かに、ただの異常気象というレベルではないですね」
line = "「大いなる冬──なるほど。これは確かに、ただの異常気象というレベルではないですね」"

[[dialogue]]
speaker = "unk"
# 何もかも凍てつく極寒の猛吹雪。
line = "何もかも凍てつく極寒の猛吹雪。"

[[dialogue]]
speaker = "unk"
# 加えて暴風が各所で荒れ狂っており、家々でさえ凍って砕けては吹き飛ばされていた。
line = "加えて暴風が各所で荒れ狂っており、家々でさえ凍って砕けては吹き飛ばされていた。"

[[dialogue]]
speaker = "レゾフの住人"
# 「西区の全面凍結を確認──！　早急に南へ避難しろ──！」
line = "「西区の全面凍結を確認──！　早急に南へ避難しろ──！」"

[[dialogue]]
speaker = "リタおばさん"
# 「家に入っても油断すんじゃないよ──なるべく地下へ潜るんだ！」
line = "「家に入っても油断すんじゃないよ──なるべく地下へ潜るんだ！」"

[[dialogue]]
speaker = "マトイ"
# 「っ……！？　あっちの方は全部凍ってるの……！？」
line = "「っ……！？　あっちの方は全部凍ってるの……！？」"

[[dialogue]]
speaker = "ソフィア"
# 「ここも危ないでしょう。生身で外に出るのは完全な自殺行為です」
line = "「ここも危ないでしょう。生身で外に出るのは完全な自殺行為です」"

[[dialogue]]
speaker = "ソフィア"
# 「うう……クールやコールドなんてレベルではありません……ブリザード、アブソリュートゼロ……」
line = "「うう……クールやコールドなんてレベルではありません……ブリザード、アブソリュートゼロ……」"

[[dialogue]]
speaker = "unk"
# わずかでも外気に触れればたちまち凍りついてしまう。
line = "わずかでも外気に触れればたちまち凍りついてしまう。"

[[dialogue]]
speaker = "unk"
# 凄まじいパニックに陥ったレゾフの街からは人気が消え失せ、やがて残っているのは俺たち星騎士だけとなった。
line = "凄まじいパニックに陥ったレゾフの街からは人気が消え失せ、やがて残っているのは俺たち星騎士だけとなった。"

[[dialogue]]
speaker = "サーシャ"
# 「やっぱり例年よりも数段激しい模様ね──みんな、ユウリちゃんの近くに避難して」
line = "「やっぱり例年よりも数段激しい模様ね──みんな、ユウリちゃんの近くに避難して」"

[[dialogue]]
speaker = "ユウリ"
# 「ああ。あたしの傍にいりゃ、肌寒いくらいで済むはずだ」
line = "「ああ。あたしの傍にいりゃ、肌寒いくらいで済むはずだ」"

[[dialogue]]
speaker = "ソフィア"
# 「スーパーホット……！　ユウリ先輩、グッジョブです」
line = "「スーパーホット……！　ユウリ先輩、グッジョブです」"

[[dialogue]]
speaker = "フィオナ"
# 「それにしても──この『耐氷雪の装衣』は驚きですね。体に粉雪がつくこともないなんて」
line = "「それにしても──この『耐氷雪の装衣』は驚きですね。体に粉雪がつくこともないなんて」"

[[dialogue]]
speaker = "サーシャ"
# 「うんうん♪　レゾフ民からしたら衝撃的ね──これもマトイちゃん達のおかげかしら？」
line = "「うんうん♪　レゾフ民からしたら衝撃的ね──これもマトイちゃん達のおかげかしら？」"

[[dialogue]]
speaker = "マトイ"
# 「リタおばさんから話を聞いて、なんとか間に合わせました……！」
line = "「リタおばさんから話を聞いて、なんとか間に合わせました……！」"

[[dialogue]]
speaker = "マトイ"
# 「アナがいてくれたら、もっと効率のいい装備を作れたと思うんですけど……」
line = "「アナがいてくれたら、もっと効率のいい装備を作れたと思うんですけど……」"

[[dialogue]]
speaker = "クロト"
# 「いや──十分すぎるさ。これなら街の外へ出ても、予定通り作戦を実行できる」
line = "「いや──十分すぎるさ。これなら街の外へ出ても、予定通り作戦を実行できる」"

[[dialogue]]
speaker = "ニャリオン"
# 「そうニャ！　この大凍結に乗じて──ネメシスとかいう森へ向かうニャ！」
line = "「そうニャ！　この大凍結に乗じて──ネメシスとかいう森へ向かうニャ！」"

[[dialogue]]
speaker = "unk"
# 一致団結。
line = "一致団結。"

[[dialogue]]
speaker = "unk"
# そんなところへ──
line = "そんなところへ──"

[[dialogue]]
speaker = "トリシャ"
# 「──油断してはいけない」
line = "「──油断してはいけない」"

[[dialogue]]
speaker = "クロト"
# 「トリシャさん──外は危険です。どうかしましたか？」
line = "「トリシャさん──外は危険です。どうかしましたか？」"

[[dialogue]]
speaker = "トリシャ"
# 「今朝方、金星の方角に新たなる凶兆が<ruby=み>視</ruby>えた。今度の作戦……一筋縄ではいかないはず」
line = "「今朝方、金星の方角に新たなる凶兆が<ruby>視<rt>み</rt></ruby>えた。今度の作戦……一筋縄ではいかないはず」"

[[dialogue]]
speaker = "マトイ"
# 「これ以上の何か──ってこと……！？」
line = "「これ以上の何か──ってこと……！？」"

[[dialogue]]
speaker = "ニャリオン"
# 「ニャとしても──ワガハイたちは突き進むっきゃないニャン！」
line = "「ニャとしても──ワガハイたちは突き進むっきゃないニャン！」"

[[dialogue]]
speaker = "フィオナ"
# （あの格好、寒くないのでしょうか……？　私が言えたことではありませんが……）
line = "（あの格好、寒くないのでしょうか……？　私が言えたことではありませんが……）"

[[dialogue]]
speaker = "unk"
# トリシャさんにも今日まで俺たちの動きに協力してもらっていた。
line = "トリシャさんにも今日まで俺たちの動きに協力してもらっていた。"

[[dialogue]]
speaker = "unk"
# その上で、邪悪な気配があると彼女は言う。
line = "その上で、邪悪な気配があると彼女は言う。"

[[dialogue]]
speaker = "トリシャ"
# 「──クロトさん」
line = "「──クロトさん」"

[[dialogue]]
speaker = "クロト"
# 「！　……はい」
line = "「！　……はい」"

[[dialogue]]
speaker = "トリシャ"
# 「この先のあなたの行動が……アルタイルの命運を大きく変える。星はそう語っています」
line = "「この先のあなたの行動が……アルタイルの命運を大きく変える。星はそう語っています」"

[[dialogue]]
speaker = "クロト"
# 「アルタイル──以前もお聞きした単語ですね」
line = "「アルタイル──以前もお聞きした単語ですね」"

[[dialogue]]
speaker = "トリシャ"
# 「この世界そのものを指します。魔界も、天界も、人間界も、私たちの知る世界はアルタイルの運命相にあります」
line = "「この世界そのものを指します。魔界も、天界も、人間界も、私たちの知る世界はアルタイルの運命相にあります」"

[[dialogue]]
speaker = "クロト"
# 「わかるような、わからないような……」
line = "「わかるような、わからないような……」"

[[dialogue]]
speaker = "トリシャ"
# 「世界を織りなす三構造の<ruby=いち>一</ruby>。私も師から教わった概念だけに、正しく伝えるのは難しいですが……」
line = "「世界を織りなす三構造の<ruby>一<rt>いち</rt></ruby>。私も師から教わった概念だけに、正しく伝えるのは難しいですが……」"

[[dialogue]]
speaker = "トリシャ"
# 「あなたという人間は極めて特異な<ruby=ほし>運命</ruby>を持つ存在。その軌道は他の星々にも影響を与えると、予告しておきます」
line = "「あなたという人間は極めて特異な<ruby>運命<rt>ほし</rt></ruby>を持つ存在。その軌道は他の星々にも影響を与えると、予告しておきます」"

[[dialogue]]
speaker = "クロト"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "マトイ"
# （ま、まあ……占い師さんの言うことだし、完璧に理解できなくても……）
line = "（ま、まあ……占い師さんの言うことだし、完璧に理解できなくても……）"

[[dialogue]]
speaker = "クロト"
# 「いや……気に留めておこう。ありがとうございます、トリシャさん」
line = "「いや……気に留めておこう。ありがとうございます、トリシャさん」"

[[dialogue]]
speaker = "トリシャ"
# 「ふふふ。お役に立てたなら何より」
line = "「ふふふ。お役に立てたなら何より」"

[[dialogue]]
speaker = "トリシャ"
# 「冥森林への入り口は──今も混沌の侵食により蝕まれています。ひと度立ち入れば、どんなものでも組み替えられてしまうでしょう」
line = "「冥森林への入り口は──今も混沌の侵食により蝕まれています。ひと度立ち入れば、どんなものでも組み替えられてしまうでしょう」"

[[dialogue]]
speaker = "トリシャ"
# 「しかし、『大いなる冬』が押し寄せている今なら……その機構にも変化が生じているかもしれません」
line = "「しかし、『大いなる冬』が押し寄せている今なら……その機構にも変化が生じているかもしれません」"

[[dialogue]]
speaker = "クロト"
# 「ヴィーナスを信じるしかないな──」
line = "「ヴィーナスを信じるしかないな──」"

[[dialogue]]
speaker = "フィオナ"
# 「ええ。その侵食すらも凍っていることを祈りましょう」
line = "「ええ。その侵食すらも凍っていることを祈りましょう」"

[[dialogue]]
speaker = "ニャリオン"
# 「ニャら、改めて出発ニャン──！」
line = "「ニャら、改めて出発ニャン──！」"

[[dialogue]]
speaker = "ニャリオン"
# 「ニャ──！？」
line = "「ニャ──！？」"

[[dialogue]]
speaker = "ユウリ"
# 「なんだ……今の音？」
line = "「なんだ……今の音？」"

[[dialogue]]
speaker = "ソフィア"
# （これは、まさか──）
line = "（これは、まさか──）"

[[dialogue]]
speaker = "unk"
# 一瞬──レゾフの街を鈍い震動が襲った。
line = "一瞬──レゾフの街を鈍い震動が襲った。"

[[dialogue]]
speaker = "unk"
# そして……
line = "そして……"

[[dialogue]]
speaker = "狼型の魔獣"
# 『ガルル……グラアアァァァァッ──！！』
line = "『ガルル……グラアアァァァァッ──！！』"

[[dialogue]]
speaker = "雪男の魔獣"
# 『グラアアアアアアアアオ！』
line = "『グラアアアアアアアアオ！』"

[[dialogue]]
speaker = "サーシャ"
# 「っ……あれは──！？」
line = "「っ……あれは──！？」"

[[dialogue]]
speaker = "レゾフの住人"
# 「ま──魔獣だあ！　大型の魔獣が襲ってきたぞ──！」
line = "「ま──魔獣だあ！　大型の魔獣が襲ってきたぞ──！」"

[[dialogue]]
speaker = "unk"
# 街の北西から聞こえてくる無数の足音、それに地響き──
line = "街の北西から聞こえてくる無数の足音、それに地響き──"

[[dialogue]]
speaker = "unk"
# そうして姿を現したのは、見たことのない強大な魔獣の群れだった。
line = "そうして姿を現したのは、見たことのない強大な魔獣の群れだった。"

[[dialogue]]
speaker = "マトイ"
# 「ど、どういうこと……！？　あんな大きな魔獣がどこに隠れてたの……！？」
line = "「ど、どういうこと……！？　あんな大きな魔獣がどこに隠れてたの……！？」"

[[dialogue]]
speaker = "ソフィア"
# 「これは……まさか、スタンピード──！？」
line = "「これは……まさか、スタンピード──！？」"

[[dialogue]]
speaker = "マトイ"
# 「ス、スタンピード──って……？」
line = "「ス、スタンピード──って……？」"

[[dialogue]]
speaker = "クロト"
# 「魔獣たちの侵攻──それも、この時期にまで<b>夏眠</b>していた大型種たちの──だったか」
line = "「魔獣たちの侵攻──それも、この時期にまで<b>夏眠</b>していた大型種たちの──だったか」"

[[dialogue]]
speaker = "マトイ"
# 「……！？　じゃあ今まで、巣にこもってた魔獣たちってこと……！？」
line = "「……！？　じゃあ今まで、巣にこもってた魔獣たちってこと……！？」"

[[dialogue]]
speaker = "狼型の魔獣"
# 『ガルル……グルルルルルゥッ……！』
line = "『ガルル……グルルルルルゥッ……！』"

[[dialogue]]
speaker = "ソフィア"
# 「どうやら例年よりもお腹を空かせて──降りてきてしまったようですね」
line = "「どうやら例年よりもお腹を空かせて──降りてきてしまったようですね」"

[[dialogue]]
speaker = "unk"
# レゾフを襲う魔獣たちの群れはあまりに膨大だった。
line = "レゾフを襲う魔獣たちの群れはあまりに膨大だった。"

[[dialogue]]
speaker = "unk"
# 百を超える大群──それも荒野で遭遇してきた敵より、遥かに脅威度が高い。
line = "百を超える大群──それも荒野で遭遇してきた敵より、遥かに脅威度が高い。"

[[dialogue]]
speaker = "トリシャ"
# 「これが恐らく第二の凶兆……本来ありえぬ魔獣たちの侵攻、ですか」
line = "「これが恐らく第二の凶兆……本来ありえぬ魔獣たちの侵攻、ですか」"

[[dialogue]]
speaker = "クロト"
# 「駆除するしかないな。このままじゃ街も、住人も壊滅する」
line = "「駆除するしかないな。このままじゃ街も、住人も壊滅する」"

[[dialogue]]
speaker = "トリシャ"
# 「……なるほど。星騎士の皆さんは、戦いに慣れているのですね。フフフ、頼もしい」
line = "「……なるほど。星騎士の皆さんは、戦いに慣れているのですね。フフフ、頼もしい」"

[[dialogue]]
speaker = "クロト"
# 「囲まれてる……来るぞっ！」
line = "「囲まれてる……来るぞっ！」"

[[dialogue]]
speaker = "フィオナ"
# 「速攻で片をつけます──」
line = "「速攻で片をつけます──」"

[[dialogue]]
speaker = "狼型の魔獣"
# 『──ガルルルルルルルルルッ！！』
line = "『──ガルルルルルルルルルッ！！』"
