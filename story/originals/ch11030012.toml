[[dialogue]]
speaker = "unk"
# 第２話,脚本家は面倒くさい（前編）,P
line = "第２話,脚本家は面倒くさい（前編）,P"

[[dialogue]]
speaker = "藍"
# 「あっ……！　お会いできて良かったです、会長さん。演劇部に来ていただけないでしょうか……？　部長を止められるのは、会長さんしかいないんです……」
line = "「あっ……！　お会いできて良かったです、会長さん。演劇部に来ていただけないでしょうか……？　部長を止められるのは、会長さんしかいないんです……」"

[[dialogue]]
speaker = "unk"
# 藍にすがるように頼まれ、演劇部室へと向かうと──
line = "藍にすがるように頼まれ、演劇部室へと向かうと──"

[[dialogue]]
speaker = "ロクサーナ"
# 「あああ、違う、違う、違う！　語彙が足りん！　もっと内から滲み出る感情を伝える言葉はないものか！」
line = "「あああ、違う、違う、違う！　語彙が足りん！　もっと内から滲み出る感情を伝える言葉はないものか！」"

[[dialogue]]
speaker = "unk"
# ロクサーナが頭を抱えながら、脚本執筆と向き合っていた。
line = "ロクサーナが頭を抱えながら、脚本執筆と向き合っていた。"

[[dialogue]]
speaker = "ロクサーナ"
# 「藍、コーヒーをよこせ！　悪魔のように黒く、地獄のように熱いヤツをな！」
line = "「藍、コーヒーをよこせ！　悪魔のように黒く、地獄のように熱いヤツをな！」"

[[dialogue]]
speaker = "藍"
# 「は、はい、ただいま～！」
line = "「は、はい、ただいま～！」"

[[dialogue]]
speaker = "藍"
# 「部長は会長さんに取材した後から、アイデアが降臨したみたいで……あれから毎日、部室に籠って、家にも戻らず、脚本を書き続けているんです」
line = "「部長は会長さんに取材した後から、アイデアが降臨したみたいで……あれから毎日、部室に籠って、家にも戻らず、脚本を書き続けているんです」"

[[dialogue]]
speaker = "unk"
# あれから３日経ってるよ！？
line = "あれから３日経ってるよ！？"

[[dialogue]]
speaker = "藍"
# 「はい、今晩で３徹だったと思います。部長は脚本執筆に夢中になってる間は、身の回りの一切合切が雑になっちゃうんです」
line = "「はい、今晩で３徹だったと思います。部長は脚本執筆に夢中になってる間は、身の回りの一切合切が雑になっちゃうんです」"

[[dialogue]]
speaker = "藍"
# 「放っておいたら、ご飯も食べなかったり……昔からよくあることなんだそうです。一度スイッチが入っちゃうと、完成するまで<ruby=てこ>梃子</ruby>でも動かないし、授業にも出ないんです」
line = "「放っておいたら、ご飯も食べなかったり……昔からよくあることなんだそうです。一度スイッチが入っちゃうと、完成するまで<ruby>梃子<rt>てこ</rt></ruby>でも動かないし、授業にも出ないんです」"

[[dialogue]]
speaker = "藍"
# 「１年生の演劇部員が部長の脚本執筆のサポートをするんですけど、今回は部長が私を指名しまして……」
line = "「１年生の演劇部員が部長の脚本執筆のサポートをするんですけど、今回は部長が私を指名しまして……」"

[[dialogue]]
speaker = "ロクサーナ"
# 「──ん？　藍、誰と話して……ああ、いつの間にやら会長が来ていたのか。すまない、今、手が離せなくてな」
line = "「──ん？　藍、誰と話して……ああ、いつの間にやら会長が来ていたのか。すまない、今、手が離せなくてな」"

[[dialogue]]
speaker = "ロクサーナ"
# 「礼を言うぞ、この前の取材のおかげで、激しいインスピレーションを受けてしまってな」
line = "「礼を言うぞ、この前の取材のおかげで、激しいインスピレーションを受けてしまってな」"

[[dialogue]]
speaker = "ロクサーナ"
# 「書いても書いても手が止まらん。これは後世の演劇部にまで受け継がれる大作になるぞ！」
line = "「書いても書いても手が止まらん。これは後世の演劇部にまで受け継がれる大作になるぞ！」"

[[dialogue]]
speaker = "藍"
# 「あの、部長、ひとまず休まれた方がいいと思いますけど……体に毒ですよ？」
line = "「あの、部長、ひとまず休まれた方がいいと思いますけど……体に毒ですよ？」"

[[dialogue]]
speaker = "unk"
# 会長権限で、執筆活動を一時的に──
line = "会長権限で、執筆活動を一時的に──"

[[dialogue]]
speaker = "ロクサーナ"
# 「湧き出るアイデアの源泉を止めようとする行為は罪と呼ぶ他ない。神であろうが、会長であろうが、私の執筆の手を止めさせようとする者は全て敵だ！」
line = "「湧き出るアイデアの源泉を止めようとする行為は罪と呼ぶ他ない。神であろうが、会長であろうが、私の執筆の手を止めさせようとする者は全て敵だ！」"

[[dialogue]]
speaker = "ロクサーナ"
# 「そもそも今現在、私が缶詰めになっているのは、会長のせいだ。となれば、会長も私の脚本執筆に協力するのが筋ではないか？」
line = "「そもそも今現在、私が缶詰めになっているのは、会長のせいだ。となれば、会長も私の脚本執筆に協力するのが筋ではないか？」"

[[dialogue]]
speaker = "藍"
# 「それは、さすがに無理筋ですよぉ！」
line = "「それは、さすがに無理筋ですよぉ！」"

[[dialogue]]
speaker = "unk"
# そうかも……
line = "そうかも……"

[[dialogue]]
speaker = "unk"
# そうかな……
line = "そうかな……"

[[dialogue]]
speaker = "藍"
# 「会長さんが説得されかかってますぅ！？」
line = "「会長さんが説得されかかってますぅ！？」"

[[dialogue]]
speaker = "ロクサーナ"
# 「確実に今晩中に書き上がるのだ。頼む、このままあと半日、書かせてくれ。掴んだ発想の尻尾を逃がしてしまったら再び掴めるかは、私にもわからんのだ」
line = "「確実に今晩中に書き上がるのだ。頼む、このままあと半日、書かせてくれ。掴んだ発想の尻尾を逃がしてしまったら再び掴めるかは、私にもわからんのだ」"

[[dialogue]]
speaker = "unk"
# 今晩までだからね？
line = "今晩までだからね？"

[[dialogue]]
speaker = "ロクサーナ"
# 「恩に着る。確実に仕上げみせよう」
line = "「恩に着る。確実に仕上げみせよう」"

[[dialogue]]
speaker = "unk"
# そして、ロクサーナの執筆サポートが始まった。
line = "そして、ロクサーナの執筆サポートが始まった。"

[[dialogue]]
speaker = "藍"
# 「部長が執筆中に飲むのは、濃いめに入れたブラックコーヒーだけです」
line = "「部長が執筆中に飲むのは、濃いめに入れたブラックコーヒーだけです」"

[[dialogue]]
speaker = "藍"
# 「砂糖もミルクもなしです。甘いカフェオレを差し出したら、すっごく怒られました……」
line = "「砂糖もミルクもなしです。甘いカフェオレを差し出したら、すっごく怒られました……」"

[[dialogue]]
speaker = "藍"
# 「甘いお菓子も常に補充してください。フルーツグミやブドウ糖の塊のラムネなんかがいいそうです。脳に糖分を巡らせて、頭をフル回転させるんだそうです」
line = "「甘いお菓子も常に補充してください。フルーツグミやブドウ糖の塊のラムネなんかがいいそうです。脳に糖分を巡らせて、頭をフル回転させるんだそうです」"

[[dialogue]]
speaker = "unk"
# それなのに甘いコーヒーはダメなんだ……
line = "それなのに甘いコーヒーはダメなんだ……"

[[dialogue]]
speaker = "藍"
# 「そうなんです。糖分を苦い珈琲で流し込むからいいんだそうです。難しいですよね。天才は変わった人が多いって言いますから」
line = "「そうなんです。糖分を苦い珈琲で流し込むからいいんだそうです。難しいですよね。天才は変わった人が多いって言いますから」"

[[dialogue]]
speaker = "ロクサーナ"
# 「ああ、そうだ、いいぞ、いいぞ……死んだと思っていたアイツがここで颯爽と──！」
line = "「ああ、そうだ、いいぞ、いいぞ……死んだと思っていたアイツがここで颯爽と──！」"

[[dialogue]]
speaker = "ロクサーナ"
# 「むうう……違う、安っぽい。こんなセリフならば誰にだって書ける」
line = "「むうう……違う、安っぽい。こんなセリフならば誰にだって書ける」"

[[dialogue]]
speaker = "unk"
# 行き詰まってない？
line = "行き詰まってない？"

[[dialogue]]
speaker = "ロクサーナ"
# 「問題ない。極めて順調だ。邪魔をするな」
line = "「問題ない。極めて順調だ。邪魔をするな」"

[[dialogue]]
speaker = "藍"
# 「ふああ……もうこんな時間ですね……部長、ホントに終わるんでしょうか……」
line = "「ふああ……もうこんな時間ですね……部長、ホントに終わるんでしょうか……」"

[[dialogue]]
speaker = "unk"
# ロクサーナには俺から上手いこと言っておく
line = "ロクサーナには俺から上手いこと言っておく"

[[dialogue]]
speaker = "unk"
# あとは俺がやるから帰っていいよ
line = "あとは俺がやるから帰っていいよ"

[[dialogue]]
speaker = "藍"
# 「会長さんは演劇部員ではないのに、いいんですか？　それでは、お言葉に甘えて……お疲れさまでした」
line = "「会長さんは演劇部員ではないのに、いいんですか？　それでは、お言葉に甘えて……お疲れさまでした」"

[[dialogue]]
speaker = "unk"
# ぺこりと頭を下げて申し訳なさそうに帰宅する藍を見送る。演劇部室には俺とロクサーナだけが残った。
line = "ぺこりと頭を下げて申し訳なさそうに帰宅する藍を見送る。演劇部室には俺とロクサーナだけが残った。"

[[dialogue]]
speaker = "ロクサーナ"
# 「なんだ、藍は帰らせたのか。残っているのは会長だけか？　会長様はご多忙だろうに、私のわがままに付き合ってくれるとはな」
line = "「なんだ、藍は帰らせたのか。残っているのは会長だけか？　会長様はご多忙だろうに、私のわがままに付き合ってくれるとはな」"

[[dialogue]]
speaker = "ロクサーナ"
# 「もうひと踏ん張りで終わる目途もついたので、腹ごしらえでもしようと思ってな」
line = "「もうひと踏ん張りで終わる目途もついたので、腹ごしらえでもしようと思ってな」"

[[dialogue]]
speaker = "ロクサーナ"
# 「カップ麺の買い置きがあったと思うが……会長も食わないか？」
line = "「カップ麺の買い置きがあったと思うが……会長も食わないか？」"

[[dialogue]]
speaker = "unk"
# 差し出されたシーフードのカップ麺を受け取り、お湯を注いで３分後。
line = "差し出されたシーフードのカップ麺を受け取り、お湯を注いで３分後。"

[[dialogue]]
speaker = "ロクサーナ"
# 「ふーっ、ふーっ、ふーっ……ずぞぞぞぞ」
line = "「ふーっ、ふーっ、ふーっ……ずぞぞぞぞ」"

[[dialogue]]
speaker = "unk"
# 会長と部長、長同士がカップ麺をすする音が演劇部室に響いた。
line = "会長と部長、長同士がカップ麺をすする音が演劇部室に響いた。"

[[dialogue]]
speaker = "unk"
# 長い夜は、まだ続く。
line = "長い夜は、まだ続く。"
