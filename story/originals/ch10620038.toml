[[dialogue]]
speaker = "ジュエリー"
# 「助手が愛をもって……してくれたおかげで……お尻で……こんなに気持ちよくなることができたよ……<emoji=heart04>」
line = "「助手が愛をもって……してくれたおかげで……お尻で……こんなに気持ちよくなることができたよ……<emoji=heart04>」"

[[dialogue]]
