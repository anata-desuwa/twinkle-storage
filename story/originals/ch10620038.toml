line = "「あぁああ、あっ……あぁあ……<emoji=heart04><emoji=heart04><emoji=heart04>　んんっ……潮噴き……<emoji=heart04><emoji=heart04>　んんっ……潮、噴いちゃってるっ……<emoji=heart04><emoji=heart04>　んんっ……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
