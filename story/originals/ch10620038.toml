[[dialogue]]
speaker = "ジュエリー"
# 「そうか……ふふっ……<emoji=heart04>　なら……これで将来、私が妊娠した時も安心だね……<emoji=heart04>」
line = "「そうか……ふふっ……<emoji=heart04>　なら……これで将来、私が妊娠した時も安心だね……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 息を乱しながらも、ジュエリーは微笑んでくれる。
line = "息を乱しながらも、ジュエリーは微笑んでくれる。"

[[dialogue]]
speaker = "ジュエリー"
