[[dialogue]]
speaker = "unk"
# おま○こから透明な愛液が弾けるように噴き出した。
line = "おま○こから透明な愛液が弾けるように噴き出した。"

[[dialogue]]
speaker = "ジュエリー"
# 「アナルで……気持ちよくなって……<emoji=heart04>　んんっ……こんな、はしたなく……<emoji=heart04>　あ、あぁああっ……<emoji=heart04>」
line = "「アナルで……気持ちよくなって……<emoji=heart04>　んんっ……こんな、はしたなく……<emoji=heart04>　あ、あぁああっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 初めてのアナルセックスで、ここまで感じてくれている――その事実に喜びと興奮が重なり、ペニスはさらに強く脈動する。
line = "初めてのアナルセックスで、ここまで感じてくれている――その事実に喜びと興奮が重なり、ペニスはさらに強く脈動する。"

[[dialogue]]
speaker = "ジュエリー"
# 「あぁあ……んんっ…<emoji=heart04>　お腹の、なかぁ……まだビュクビュクしてる……<emoji=heart04>　んんっ、あ、あああ……<emoji=heart04>」
line = "「あぁあ……んんっ…<emoji=heart04>　お腹の、なかぁ……まだビュクビュクしてる……<emoji=heart04>　んんっ、あ、あああ……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
