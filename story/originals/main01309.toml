[[dialogue]]
speaker = "unk"
# 第１０話,ルーツ,B
line = "第１０話,ルーツ,B"

[[dialogue]]
speaker = "ガーディアン"
# 「ピ──ピ──ピ、ガァァ………………！」
line = "「ピ──ピ──ピ、ガァァ………………！」"

[[dialogue]]
speaker = "unk"
# もう何体目かもわからないガーディアンを撃退する。
line = "もう何体目かもわからないガーディアンを撃退する。"

[[dialogue]]
speaker = "ユウリ"
# 「代わり映えしねえと思ってたけど──進んでくうちに、なんか敵も手強くなってきやがったな」
line = "「代わり映えしねえと思ってたけど──進んでくうちに、なんか敵も手強くなってきやがったな」"

[[dialogue]]
speaker = "ソフィア"
# 「周りの景観も、殺風景なのは変わりませんが、一応変化はしているんですよね」
line = "「周りの景観も、殺風景なのは変わりませんが、一応変化はしているんですよね」"

[[dialogue]]
speaker = "フィオナ"
# 「順調に進んではいる──と思ってよいのでしょうか」
line = "「順調に進んではいる──と思ってよいのでしょうか」"

[[dialogue]]
speaker = "サーシャ"
# 「本当に人間界に出れればいいけど……こればっかりは信じるしかないわね～」
line = "「本当に人間界に出れればいいけど……こればっかりは信じるしかないわね～」"

[[dialogue]]
speaker = "ニャリオン"
# 「大丈夫ニャ。大賢者たるワガハイの勘も訴えているニャ、この塔は大昔から三界を貫いているとニャ」
line = "「大丈夫ニャ。大賢者たるワガハイの勘も訴えているニャ、この塔は大昔から三界を貫いているとニャ」"

[[dialogue]]
speaker = "ユウリ"
# 「その大賢者ってのが信用しづらいんだが」
line = "「その大賢者ってのが信用しづらいんだが」"

[[dialogue]]
speaker = "ニャリオン"
# 「嘆かわしいニャン。まだワガハイの威光がわからぬとはニャ……」
line = "「嘆かわしいニャン。まだワガハイの威光がわからぬとはニャ……」"

[[dialogue]]
speaker = "ソフィア"
# 「その大賢者さんは、先代の魔王に仕えていたんですよね」
line = "「その大賢者さんは、先代の魔王に仕えていたんですよね」"

[[dialogue]]
speaker = "ニャリオン"
# 「そうニャ」
line = "「そうニャ」"

[[dialogue]]
speaker = "ソフィア"
# 「具体的には何をどうしていたんですか？」
line = "「具体的には何をどうしていたんですか？」"

[[dialogue]]
speaker = "ニャリオン"
# 「そ、そりゃ……色々大活躍してたのニャ。大賢者は魔王を補佐するものと相場が決まってるのニャン！」
line = "「そ、そりゃ……色々大活躍してたのニャ。大賢者は魔王を補佐するものと相場が決まってるのニャン！」"

[[dialogue]]
speaker = "ユウリ"
# 「聞いたこともねえけど」
line = "「聞いたこともねえけど」"

[[dialogue]]
speaker = "ソフィア"
# 「それに、大活躍の割にはあの『壁画』にも描かれていなかったような……」
line = "「それに、大活躍の割にはあの『壁画』にも描かれていなかったような……」"

[[dialogue]]
speaker = "ニャリオン"
# 「う……！　ど、どこかにはワガハイのクールな絵も残されていたはずニャン！　猫の壁画が──」
line = "「う……！　ど、どこかにはワガハイのクールな絵も残されていたはずニャン！　猫の壁画が──」"

[[dialogue]]
speaker = "マトイ"
# 「３０００年前のことって言われても……誰も証明できないもんね」
line = "「３０００年前のことって言われても……誰も証明できないもんね」"

[[dialogue]]
speaker = "クロト"
# 「……いや」
line = "「……いや」"

[[dialogue]]
speaker = "クロト"
# 「ニャリオンの言うことは──本当だと思うよ」
line = "「ニャリオンの言うことは──本当だと思うよ」"

[[dialogue]]
speaker = "マトイ"
# 「え！」
line = "「え！」"

[[dialogue]]
speaker = "ユウリ"
# 「なんでだ？」
line = "「なんでだ？」"

[[dialogue]]
speaker = "クロト"
# 「なんとなく……だけど。真実味があるっていうか」
line = "「なんとなく……だけど。真実味があるっていうか」"

[[dialogue]]
speaker = "ニャリオン"
# 「ニャーッニャッニャッ！　さすがはワガハイのソウルフレンドニャン！　ワガハイを信じてくれるのニャンね……！」
line = "「ニャーッニャッニャッ！　さすがはワガハイのソウルフレンドニャン！　ワガハイを信じてくれるのニャンね……！」"

[[dialogue]]
speaker = "unk"
# ──男は大賢者と呼ばれる使い魔を従え、厄災の最前線へ立ち向かった。
line = "──男は大賢者と呼ばれる使い魔を従え、厄災の最前線へ立ち向かった。"

[[dialogue]]
speaker = "unk"
# 今さっき垣間見えた……先代魔王にまつわる幻影によれば、そう語られていた。
line = "今さっき垣間見えた……先代魔王にまつわる幻影によれば、そう語られていた。"

[[dialogue]]
speaker = "フィオナ"
# 「ふーむ……ですが、もしニャリオンがそんな存在だとすれば歴史的にも大発見です」
line = "「ふーむ……ですが、もしニャリオンがそんな存在だとすれば歴史的にも大発見です」"

[[dialogue]]
speaker = "フィオナ"
# 「『月の壁画』どころではなく、歴史の生き証人となるわけですから」
line = "「『月の壁画』どころではなく、歴史の生き証人となるわけですから」"

[[dialogue]]
speaker = "ニャリオン"
# 「フ。そんなワガハイを召喚したフィオナ嬢も、誇っていいのニャンよ」
line = "「フ。そんなワガハイを召喚したフィオナ嬢も、誇っていいのニャンよ」"

[[dialogue]]
speaker = "ソフィア"
# 「ますます調子に乗って……」
line = "「ますます調子に乗って……」"

[[dialogue]]
speaker = "サーシャ"
# 「星見家は先代魔王から続く一族～、ってことだから、一応つじつまは合ってるのかしら？」
line = "「星見家は先代魔王から続く一族～、ってことだから、一応つじつまは合ってるのかしら？」"

[[dialogue]]
speaker = "マトイ"
# 「なんか、壮大なスケールって感じ……」
line = "「なんか、壮大なスケールって感じ……」"

[[dialogue]]
speaker = "unk"
# 星見家が正当な魔王の後継者──それはきっと事実だろう。なぜならそれは塔の『声』も告げていたことだからだ。
line = "星見家が正当な魔王の後継者──それはきっと事実だろう。なぜならそれは塔の『声』も告げていたことだからだ。"

[[dialogue]]
speaker = "unk"
# 先代魔王──ラクシス──の血を最も色濃く引く人間は星見フィオナだと。
line = "先代魔王──ラクシス──の血を最も色濃く引く人間は星見フィオナだと。"

[[dialogue]]
speaker = "ヴィーナス"
# 「く……！　となるとやっぱり、クロトにもいかつい使い魔が必要ね……！」
line = "「く……！　となるとやっぱり、クロトにもいかつい使い魔が必要ね……！」"

[[dialogue]]
speaker = "クロト"
# 「張り合うところはそこじゃないよ。ヴィーナス」
line = "「張り合うところはそこじゃないよ。ヴィーナス」"

[[dialogue]]
speaker = "unk"
# ただ……一旦、ニャリオンの言うことが真実だとすると、余計に謎が深くなる。
line = "ただ……一旦、ニャリオンの言うことが真実だとすると、余計に謎が深くなる。"

[[dialogue]]
speaker = "クロト"
# （ニャリオンは３０００年前も大賢者だった。それが時代を超えて、フィオナによって召喚された）
line = "（ニャリオンは３０００年前も大賢者だった。それが時代を超えて、フィオナによって召喚された）"

[[dialogue]]
speaker = "クロト"
# （そのニャリオンが──俺のことを『先代魔王に近い』と称した。ヴィーナスも、あの絵が俺に瓜二つと言っている）
line = "（そのニャリオンが──俺のことを『先代魔王に近い』と称した。ヴィーナスも、あの絵が俺に瓜二つと言っている）"

[[dialogue]]
speaker = "クロト"
# （だったら……俺は何者なんだ？　フィオナの次の二番手なのか──それもしっくりこない）
line = "（だったら……俺は何者なんだ？　フィオナの次の二番手なのか──それもしっくりこない）"

[[dialogue]]
speaker = "クロト"
# （俺は──俺は魔王として覚醒した。霊力だって使えた。守護天使たちだって認めてくれた）
line = "（俺は──俺は魔王として覚醒した。霊力だって使えた。守護天使たちだって認めてくれた）"

[[dialogue]]
speaker = "クロト"
# （なのに……なんだ？　この、拭えない違和感は）
line = "（なのに……なんだ？　この、拭えない違和感は）"

[[dialogue]]
speaker = "unk"
# ふと、足元が崩れていくような感覚に襲われた。
line = "ふと、足元が崩れていくような感覚に襲われた。"

[[dialogue]]
speaker = "unk"
# 魔王の血統──今まで済ませていたその言葉だけじゃ、全部に説明がつけられない気がする。
line = "魔王の血統──今まで済ませていたその言葉だけじゃ、全部に説明がつけられない気がする。"

[[dialogue]]
speaker = "unk"
# ニャリオンがルーツを自覚したように。
line = "ニャリオンがルーツを自覚したように。"

[[dialogue]]
speaker = "unk"
# 俺にもまた、何か気づくべき根源があるのではないかと。
line = "俺にもまた、何か気づくべき根源があるのではないかと。"

[[dialogue]]
speaker = "unk"
# そして、その答えは──この場にいる誰でもなく、３０００年前の『彼』が持っているような気がしてならなかった。
line = "そして、その答えは──この場にいる誰でもなく、３０００年前の『彼』が持っているような気がしてならなかった。"

[[dialogue]]
speaker = "クロト"
# （……知りたい。いや、知らなくちゃいけない気がする。彼のことを）
line = "（……知りたい。いや、知らなくちゃいけない気がする。彼のことを）"

[[dialogue]]
speaker = "クロト"
# （ラクシス──あなたは一体、どんな軌跡を歩んできたんだ？）
line = "（ラクシス──あなたは一体、どんな軌跡を歩んできたんだ？）"

[[dialogue]]
speaker = "unk"
# 俺は塔を昇るにつれ、自身のルーツに思いを馳せるようになっていた。
line = "俺は塔を昇るにつれ、自身のルーツに思いを馳せるようになっていた。"

[[dialogue]]
speaker = "unk"
# 雨滴のように降りてくる『彼』の幻影を手探りで拾っているうちに、俺は気づいた。
line = "雨滴のように降りてくる『彼』の幻影を手探りで拾っているうちに、俺は気づいた。"

[[dialogue]]
speaker = "unk"
# 今回、フィーニスの塔が語りかけてきたのはヴィーナスじゃない──緋宮クロトに対してなんだと。
line = "今回、フィーニスの塔が語りかけてきたのはヴィーナスじゃない──緋宮クロトに対してなんだと。"
