[[dialogue]]
speaker = "unk"
# 第２話,乙女心とニンニクと,P
line = "第２話,乙女心とニンニクと,P"

[[dialogue]]
speaker = "ベアトリス"
# 「はぁー、美味しい～♪　どれもこれも絶品だよ～♪　お箸がとまらな～いっ♪」
line = "「はぁー、美味しい～♪　どれもこれも絶品だよ～♪　お箸がとまらな～いっ♪」"

[[dialogue]]
speaker = "梨緒"
# 「ベアトは本当に美味しそうに食事をするな。見ていてほっこりするよ」
line = "「ベアトは本当に美味しそうに食事をするな。見ていてほっこりするよ」"

[[dialogue]]
speaker = "ベアトリス"
# 「梨緒ちゃんは食べないの？　二人前頼んであるから、浜焼きも、焼きそばも、たこ焼きも、食べてくれていいんだよ？」
line = "「梨緒ちゃんは食べないの？　二人前頼んであるから、浜焼きも、焼きそばも、たこ焼きも、食べてくれていいんだよ？」"

[[dialogue]]
speaker = "ベアトリス"
# 「どれもニンニクマシマシ、超モリモリで頼んであるから♪　オススメは、この黒ニンニクのホイル焼き♪　あ、デザートにニンニクソースたっぷりのかき氷も注文してあるよ♪」
line = "「どれもニンニクマシマシ、超モリモリで頼んであるから♪　オススメは、この黒ニンニクのホイル焼き♪　あ、デザートにニンニクソースたっぷりのかき氷も注文してあるよ♪」"

[[dialogue]]
speaker = "梨緒"
# 「あ、あはは……。ベアトと食事をする時は、他の人と会うのを控える覚悟をしないといけないな」
line = "「あ、あはは……。ベアトと食事をする時は、他の人と会うのを控える覚悟をしないといけないな」"

[[dialogue]]
speaker = "ベアトリス"
# 「会うのを控えるって……そんなに気になるものなの？　ニンニクを食べた後の匂いって」
line = "「会うのを控えるって……そんなに気になるものなの？　ニンニクを食べた後の匂いって」"

[[dialogue]]
speaker = "梨緒"
# 「そうだな……こうして共に食事をしていれば気にならないだろうが、他の相手からするとかなりのもの……だとは思う」
line = "「そうだな……こうして共に食事をしていれば気にならないだろうが、他の相手からするとかなりのもの……だとは思う」"

[[dialogue]]
speaker = "ベアトリス"
# 「気にしすぎだと思うけどなぁ。くんくん、うーん、わからない」
line = "「気にしすぎだと思うけどなぁ。くんくん、うーん、わからない」"

[[dialogue]]
speaker = "ベアトリス"
# 「でも、そっか。普通はそんなに気になるものなんだ。まぁ今日は特に会う予定もないし……」
line = "「でも、そっか。普通はそんなに気になるものなんだ。まぁ今日は特に会う予定もないし……」"

[[dialogue]]
speaker = "梨緒"
# 「そういえば最近、魔王とはどうなんだ？」
line = "「そういえば最近、魔王とはどうなんだ？」"

[[dialogue]]
speaker = "ベアトリス"
# 「──ぶふっ。コホ、コホっ、どうして急に会長さんの名前が出てくるのっ。特になんでもないよっ」
line = "「──ぶふっ。コホ、コホっ、どうして急に会長さんの名前が出てくるのっ。特になんでもないよっ」"

[[dialogue]]
speaker = "梨緒"
# 「そうなのか？　てっきり付き合っているものかと思っていたが」
line = "「そうなのか？　てっきり付き合っているものかと思っていたが」"

[[dialogue]]
speaker = "ベアトリス"
# 「な、ないない。いつかデネブに帰らなくちゃいけないんだから、それはないって」
line = "「な、ないない。いつかデネブに帰らなくちゃいけないんだから、それはないって」"

[[dialogue]]
speaker = "梨緒"
# 「しかし先日も波打ち際で２人仲良く遊んでいたんだろう？　魔王も最近は親しげにベアトと呼んでいるじゃないか」
line = "「しかし先日も波打ち際で２人仲良く遊んでいたんだろう？　魔王も最近は親しげにベアトと呼んでいるじゃないか」"

[[dialogue]]
speaker = "ベアトリス"
# 「どうしてそれを──じゃなくて！？　あれはそうじゃなくて……！」
line = "「どうしてそれを──じゃなくて！？　あれはそうじゃなくて……！」"

[[dialogue]]
speaker = "unk"
# ベアトと梨緒？
line = "ベアトと梨緒？"

[[dialogue]]
speaker = "ベアトリス"
# 「ひゃっ！？　か、会長さん！？　どうしてここに……！？」
line = "「ひゃっ！？　か、会長さん！？　どうしてここに……！？」"

[[dialogue]]
speaker = "unk"
# さっきまで星徒会のみんなと遊んでて
line = "さっきまで星徒会のみんなと遊んでて"

[[dialogue]]
speaker = "ベアトリス"
# 「え、他の女の子と遊んでたんですか？　ふ、ふーん、そうですか、そうなんですか、ふ～～ん……！」
line = "「え、他の女の子と遊んでたんですか？　ふ、ふーん、そうですか、そうなんですか、ふ～～ん……！」"

[[dialogue]]
speaker = "梨緒"
# 「……ヤキモチを焼いてるじゃないか」
line = "「……ヤキモチを焼いてるじゃないか」"

[[dialogue]]
speaker = "ベアトリス"
# 「や、焼いてないよっ」
line = "「や、焼いてないよっ」"

[[dialogue]]
speaker = "unk"
# せっかくだから一緒していい？
line = "せっかくだから一緒していい？"

[[dialogue]]
speaker = "ベアトリス"
# 「ひゃっ、ダメです。近づかないでくださいっ」
line = "「ひゃっ、ダメです。近づかないでくださいっ」"

[[dialogue]]
speaker = "ベアトリス"
# 「それ以上、絶対に近づかないでくださいっ。少しでも近づいたら、怒っちゃいますからねっ！」
line = "「それ以上、絶対に近づかないでくださいっ。少しでも近づいたら、怒っちゃいますからねっ！」"

[[dialogue]]
speaker = "梨緒"
# 「魔王、気を悪くしないでくれ。ちょうど食事を取っていたところなんだ。恐らくベアトは自分の匂いを気にして──」
line = "「魔王、気を悪くしないでくれ。ちょうど食事を取っていたところなんだ。恐らくベアトは自分の匂いを気にして──」"

[[dialogue]]
speaker = "ベアトリス"
# 「わー、わー、わー、余計なこと言わなくていいから！」
line = "「わー、わー、わー、余計なこと言わなくていいから！」"

[[dialogue]]
speaker = "unk"
# バクバクバクっ！
line = "バクバクバクっ！"

[[dialogue]]
speaker = "ベアトリス"
# 「えっ！？　な、なんでいきなりニンニク料理にがっついて……」
line = "「えっ！？　な、なんでいきなりニンニク料理にがっついて……」"

[[dialogue]]
speaker = "unk"
# これでベアトと一緒だ
line = "これでベアトと一緒だ"

[[dialogue]]
speaker = "ベアトリス"
# 「か、会長さん……。私のために……」
line = "「か、会長さん……。私のために……」"

[[dialogue]]
speaker = "ベアトリス"
# 「そこまでして一緒にいようとしてくれるんですか？　別に会おうと思えばいつだって会えるのに……」
line = "「そこまでして一緒にいようとしてくれるんですか？　別に会おうと思えばいつだって会えるのに……」"

[[dialogue]]
speaker = "ベアトリス"
# 「そんなにニンニク食べたら、きっと星徒会の皆さんにも渋い顔されちゃいますよ……？」
line = "「そんなにニンニク食べたら、きっと星徒会の皆さんにも渋い顔されちゃいますよ……？」"

[[dialogue]]
speaker = "ベアトリス"
# 「会う人、会う人、会長さんを避けちゃうかもしれないのに……」
line = "「会う人、会う人、会長さんを避けちゃうかもしれないのに……」"

[[dialogue]]
speaker = "unk"
# ベアトといられるなら気にしないよ
line = "ベアトといられるなら気にしないよ"

[[dialogue]]
speaker = "ベアトリス"
# 「会長さん……<emoji=heart04>」
line = "「会長さん……<emoji=heart04>」"

[[dialogue]]
speaker = "ベアトリス"
# 「えへへ、嬉しいです。会長さんと美味しいもの２人でたくさん食べたいって思ってたから」
line = "「えへへ、嬉しいです。会長さんと美味しいもの２人でたくさん食べたいって思ってたから」"

[[dialogue]]
speaker = "ベアトリス"
# 「いっぱい頼んであるので、一緒に食べませんか？　ああほら、黒ニンニクのホイル焼きが食べ頃になりましたよ！」
line = "「いっぱい頼んであるので、一緒に食べませんか？　ああほら、黒ニンニクのホイル焼きが食べ頃になりましたよ！」"

[[dialogue]]
speaker = "ベアトリス"
# 「デザートにはニンニクソースたっぷりのかき氷も用意してあるんです」
line = "「デザートにはニンニクソースたっぷりのかき氷も用意してあるんです」"

[[dialogue]]
speaker = "ベアトリス"
# 「１つは梨緒ちゃんのなので、えと、その、私の分を分け合うことになりますけど……」
line = "「１つは梨緒ちゃんのなので、えと、その、私の分を分け合うことになりますけど……」"

[[dialogue]]
speaker = "ベアトリス"
# 「え？　それは恥ずかしいんですか？　ふふふ、照れなくていいじゃないですか」
line = "「え？　それは恥ずかしいんですか？　ふふふ、照れなくていいじゃないですか」"

[[dialogue]]
speaker = "ベアトリス"
# 「ほーら、お口開けてください<emoji=heart04>　あーんしてあげますよ<emoji=heart04>　あはは、だから照れないでください<emoji=heart04>　ほら、あーん<emoji=heart04>」
line = "「ほーら、お口開けてください<emoji=heart04>　あーんしてあげますよ<emoji=heart04>　あはは、だから照れないでください<emoji=heart04>　ほら、あーん<emoji=heart04>」"

[[dialogue]]
speaker = "梨緒"
# 「はぁ……もう付き合えばいいだろう」
line = "「はぁ……もう付き合えばいいだろう」"

[[dialogue]]
speaker = "ベアトリス"
# 「ハっ！？　ち、違うの、梨緒ちゃん、これは……！」
line = "「ハっ！？　ち、違うの、梨緒ちゃん、これは……！」"

[[dialogue]]
speaker = "梨緒"
# 「ご馳走様。すまないが急用を思い出した。ジグにスイカ割り勝負を挑む予定があったんだった」
line = "「ご馳走様。すまないが急用を思い出した。ジグにスイカ割り勝負を挑む予定があったんだった」"

[[dialogue]]
speaker = "梨緒"
# 「ベアトは魔王とゆっくり食事をしているといい。ああ、かき氷だけは自分の分を食べきっておいた方がよさそうかな？」
line = "「ベアトは魔王とゆっくり食事をしているといい。ああ、かき氷だけは自分の分を食べきっておいた方がよさそうかな？」"

[[dialogue]]
speaker = "ベアトリス"
# 「へ、変な気の利かせ方しなくていいからっ。急用なんて嘘でしょっ。一緒にいてくれていいよっ」
line = "「へ、変な気の利かせ方しなくていいからっ。急用なんて嘘でしょっ。一緒にいてくれていいよっ」"

[[dialogue]]
speaker = "梨緒"
# 「言っておくが魔王、くれぐれもベアトを泣かせるんじゃないぞ。もし彼女を泣かせるような真似をすれば、必ず君に引導を渡してやる」
line = "「言っておくが魔王、くれぐれもベアトを泣かせるんじゃないぞ。もし彼女を泣かせるような真似をすれば、必ず君に引導を渡してやる」"

[[dialogue]]
speaker = "ベアトリス"
# 「だから、誤解だってば……！　会長さんも何を頷いてるんですかっ……！　恥ずかしい、恥ずかしいですってば……！」
line = "「だから、誤解だってば……！　会長さんも何を頷いてるんですかっ……！　恥ずかしい、恥ずかしいですってば……！」"

[[dialogue]]
speaker = "梨緒"
# 「そういえば、ナターシャたちも遊びに来ているらしい。ふふ、２人の邪魔をしないようによーく言い聞かせておくよ」
line = "「そういえば、ナターシャたちも遊びに来ているらしい。ふふ、２人の邪魔をしないようによーく言い聞かせておくよ」"

[[dialogue]]
speaker = "ベアトリス"
# 「だから、余計な気を利かせないで～～っっ！！」
line = "「だから、余計な気を利かせないで～～っっ！！」"
