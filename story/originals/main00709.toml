line = "「いい穴場を知ってるんだ。郊外まで出る必要があるんだけど──イワナとかヤマメもわんさか釣れるんだ。楽しいぞ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「んー、今はそんな気分じゃないっていうか……なんで釣り？」
line = "「んー、今はそんな気分じゃないっていうか……なんで釣り？」"

[[dialogue]]
speaker = "クロト"
# 「たまには息抜きもいいかと思ってさ。ダメか？」
line = "「たまには息抜きもいいかと思ってさ。ダメか？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ダメじゃないけど……まだ、アポロの件が解決してないじゃない。遊ぶ気分になんてなれないわ！」
line = "「ダメじゃないけど……まだ、アポロの件が解決してないじゃない。遊ぶ気分になんてなれないわ！」"

[[dialogue]]
speaker = "クロト"
# 「それについては同感──だけど。平和な日々ってやつは、ちゃんと享受しないと意味がない。あと藪からステッキって何？」
line = "「それについては同感──だけど。平和な日々ってやつは、ちゃんと享受しないと意味がない。あと藪からステッキって何？」"

[[dialogue]]
speaker = "unk"
# 俺は、みんなからも諭されたように適度な息抜きの重要さを説いた。
line = "俺は、みんなからも諭されたように適度な息抜きの重要さを説いた。"

[[dialogue]]
speaker = "クロト"
# 「釣り堀の気分じゃないならサバゲーでもいいぞ。後は家電屋巡りとか……」
line = "「釣り堀の気分じゃないならサバゲーでもいいぞ。後は家電屋巡りとか……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あのねえ。私はレディよ！　こういう時はフツー、もっとお洒落なとこに誘うもんでしょ」
line = "「あのねえ。私はレディよ！　こういう時はフツー、もっとお洒落なとこに誘うもんでしょ」"

[[dialogue]]
speaker = "クロト"
# 「む……そうなのか。難しいな」
line = "「む……そうなのか。難しいな」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうよ。別に、釣り堀も楽しそーではあるけど」
line = "「そうよ。別に、釣り堀も楽しそーではあるけど」"

[[dialogue]]
speaker = "unk"
# 今日、用意していた俺のレパートリーにそんなスポットはなかった。
line = "今日、用意していた俺のレパートリーにそんなスポットはなかった。"

[[dialogue]]
speaker = "unk"
