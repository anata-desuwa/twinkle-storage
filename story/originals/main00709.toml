[[dialogue]]
speaker = "unk"
# 第９話,和やかホリデー,B
line = "第９話,和やかホリデー,B"

[[dialogue]]
speaker = "unk"
# ──と、いうわけで……。
line = "──と、いうわけで……。"

[[dialogue]]
speaker = "クロト"
# 「ヴィーナス、釣り堀に行こう」
line = "「ヴィーナス、釣り堀に行こう」"

[[dialogue]]
speaker = "ヴィーナス"
# 「…………何よ、藪からステッキに」
line = "「…………何よ、藪からステッキに」"

[[dialogue]]
speaker = "クロト"
