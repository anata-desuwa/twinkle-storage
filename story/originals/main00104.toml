[[dialogue]]
speaker = "unk"
# 第４話,決闘の約束,B
line = "第４話,決闘の約束,B"

[[dialogue]]
speaker = "ヴィーナス"
# 「あなたを今日付けでここ、新星学園星徒会──星徒会長に任命するわ。そして」
line = "「あなたを今日付けでここ、新星学園星徒会──星徒会長に任命するわ。そして」"

[[dialogue]]
speaker = "ヴィーナス"
# 「緋宮クロト──あなたは魔王となって、この世界を救うのよ！」
line = "「緋宮クロト──あなたは魔王となって、この世界を救うのよ！」"

[[dialogue]]
speaker = "クロト"
# 「…………………………え？」
line = "「…………………………え？」"

[[dialogue]]
speaker = "マトイ"
# 「へ？」
line = "「へ？」"

[[dialogue]]
speaker = "サーシャ"
# 「きゃあ」
line = "「きゃあ」"

[[dialogue]]
speaker = "アナ"
# 「ぱおーん」
line = "「ぱおーん」"

[[dialogue]]
speaker = "unk"
# その場でたっぷり３０秒は固まってしまった。
line = "その場でたっぷり３０秒は固まってしまった。"

[[dialogue]]
speaker = "unk"
# しばらくして、俺が口火を切ることで再び時は動き出す。
line = "しばらくして、俺が口火を切ることで再び時は動き出す。"

[[dialogue]]
speaker = "クロト"
# 「ま、待ってください。さすがに話が読めません。ええと──」
line = "「ま、待ってください。さすがに話が読めません。ええと──」"

[[dialogue]]
speaker = "ヴィーナス"
# 「九浄ヴィーナス。新星学園へ入ったのなら、私の名前くらい覚えておくべきね」
line = "「九浄ヴィーナス。新星学園へ入ったのなら、私の名前くらい覚えておくべきね」"

[[dialogue]]
speaker = "クロト"
# 「九浄ヴィーナス会長。状況がよく飲み込めないのですが」
line = "「九浄ヴィーナス会長。状況がよく飲み込めないのですが」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ヴィーナスでいいわ。もう星徒会長じゃないもの」
line = "「ヴィーナスでいいわ。もう星徒会長じゃないもの」"

[[dialogue]]
speaker = "クロト"
# 「わかった、ヴィーナス。でも君の言っていることは理解できない」
line = "「わかった、ヴィーナス。でも君の言っていることは理解できない」"

[[dialogue]]
speaker = "マトイ"
# 「順応早っ」
line = "「順応早っ」"

[[dialogue]]
speaker = "クロト"
# 「知っての通り俺は昨日入ってきたばかりの転入生だ。そんな俺をどうして待っていたんだ？」
line = "「知っての通り俺は昨日入ってきたばかりの転入生だ。そんな俺をどうして待っていたんだ？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「どうしてって──」
line = "「どうしてって──」"

[[dialogue]]
speaker = "unk"
# ヴィーナスは、きょとんとした顔を浮かべると、机から一冊の本を取り出した。
line = "ヴィーナスは、きょとんとした顔を浮かべると、机から一冊の本を取り出した。"

[[dialogue]]
speaker = "ヴィーナス"
# 「これに書かれてるからに決まってるじゃない！」
line = "「これに書かれてるからに決まってるじゃない！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「緋宮クロト──あなたが今年新星学園に来ることも含め、私には全ての運命が見えていたわ！」
line = "「緋宮クロト──あなたが今年新星学園に来ることも含め、私には全ての運命が見えていたわ！」"

[[dialogue]]
speaker = "クロト"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# 急に占い師みたいなことを言い始めた。
line = "急に占い師みたいなことを言い始めた。"

[[dialogue]]
speaker = "unk"
# 隣では、マトイも俺以上に困惑の顔を浮かべている。
line = "隣では、マトイも俺以上に困惑の顔を浮かべている。"

[[dialogue]]
speaker = "マトイ"
# 「もしかして、昨日の出動も……」
line = "「もしかして、昨日の出動も……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふふん、モチロンよ。だからちゃんとアナにセレスティアを持たせていたでしょう？」
line = "「ふふん、モチロンよ。だからちゃんとアナにセレスティアを持たせていたでしょう？」"

[[dialogue]]
speaker = "マトイ"
# 「私は何も聞いてなかったんですけど！」
line = "「私は何も聞いてなかったんですけど！」"

[[dialogue]]
speaker = "アナ"
# 「話すと長くなりそうだったので」
line = "「話すと長くなりそうだったので」"

[[dialogue]]
speaker = "unk"
# どうやら昨日の朝、マトイたちが駆けつけてくれたのも彼女の差し金らしかった。
line = "どうやら昨日の朝、マトイたちが駆けつけてくれたのも彼女の差し金らしかった。"

[[dialogue]]
speaker = "クロト"
# 「君が俺を任命しようとしてくれているのは光栄だ。けど、入ってすぐ星徒会長なんて聞いたこともない」
line = "「君が俺を任命しようとしてくれているのは光栄だ。けど、入ってすぐ星徒会長なんて聞いたこともない」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふーん。会長の任命を拒否するというのなら──仕方ないわ。退学ね」
line = "「ふーん。会長の任命を拒否するというのなら──仕方ないわ。退学ね」"

[[dialogue]]
speaker = "クロト"
# 「な……」
line = "「な……」"

[[dialogue]]
speaker = "unk"
# 退学──ここへきて突きつけられたその二文字は、俺にとって何より重いものだった。
line = "退学──ここへきて突きつけられたその二文字は、俺にとって何より重いものだった。"

[[dialogue]]
speaker = "クロト"
# 「退学なんて、そんな……」
line = "「退学なんて、そんな……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「これも決まりなの。星徒会長による人事は絶対──従えないのなら学園を去ってもらうことになるわ」
line = "「これも決まりなの。星徒会長による人事は絶対──従えないのなら学園を去ってもらうことになるわ」"

[[dialogue]]
speaker = "unk"
# 星徒会長の権力は絶大。
line = "星徒会長の権力は絶大。"

[[dialogue]]
speaker = "unk"
# 昨日聞かされていた現実を、こうもむざむざと味わうことになるなんて。
line = "昨日聞かされていた現実を、こうもむざむざと味わうことになるなんて。"

[[dialogue]]
speaker = "マトイ"
# 「──あの、会長。決まりなのはわかりますけど……いくらなんでも常識はずれなんじゃ」
line = "「──あの、会長。決まりなのはわかりますけど……いくらなんでも常識はずれなんじゃ」"

[[dialogue]]
speaker = "サーシャ"
# 「そうねえ。通例なら会長の交代は３ヶ月近く前だもの」
line = "「そうねえ。通例なら会長の交代は３ヶ月近く前だもの」"

[[dialogue]]
speaker = "unk"
# 惑う俺を見かねてか、マトイと、もう１人の星徒会役員が助け舟を出してくれる。
line = "惑う俺を見かねてか、マトイと、もう１人の星徒会役員が助け舟を出してくれる。"

[[dialogue]]
speaker = "unk"
# 俺の転入時期と同じく、今は組織編成にしたって半端な時期に違いない。
line = "俺の転入時期と同じく、今は組織編成にしたって半端な時期に違いない。"

[[dialogue]]
speaker = "ヴィーナス"
# 「……マトイとサーシャさんの言うことも一理あるわ。このままじゃ新星学園の生徒たちが納得しないでしょう」
line = "「……マトイとサーシャさんの言うことも一理あるわ。このままじゃ新星学園の生徒たちが納得しないでしょう」"

[[dialogue]]
speaker = "ヴィーナス"
# 「──だから！　あなたは全校生徒の前で、力を示しなさい！」
line = "「──だから！　あなたは全校生徒の前で、力を示しなさい！」"

[[dialogue]]
speaker = "マトイ"
# 「力を……？」
line = "「力を……？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そう！」
line = "「そう！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「緋宮クロト──あなたは私と戦って勝ち、その真の力をみんなに知らしめるのよ！」
line = "「緋宮クロト──あなたは私と戦って勝ち、その真の力をみんなに知らしめるのよ！」"

[[dialogue]]
speaker = "マトイ"
# 「戦うって……会長と！？　無茶です、それこそ──」
line = "「戦うって……会長と！？　無茶です、それこそ──」"

[[dialogue]]
speaker = "アナ"
# 「星徒会長に任命されるより、無理ゲ～」
line = "「星徒会長に任命されるより、無理ゲ～」"

[[dialogue]]
speaker = "unk"
# 気づけば当人である俺以上に、ヴィーナス以外の女子生徒のほうが慌てふためいていた。
line = "気づけば当人である俺以上に、ヴィーナス以外の女子生徒のほうが慌てふためいていた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「大丈夫よ２人とも。だってこれは──私から彼へのお願いだもの」
line = "「大丈夫よ２人とも。だってこれは──私から彼へのお願いだもの」"

[[dialogue]]
speaker = "ヴィーナス"
# 「彼はそれを裏切るような人じゃないわ。そうよね、緋宮クロト？」
line = "「彼はそれを裏切るような人じゃないわ。そうよね、緋宮クロト？」"

[[dialogue]]
speaker = "クロト"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# 初対面で何を──と普通なら思うだろう。
line = "初対面で何を──と普通なら思うだろう。"

[[dialogue]]
speaker = "unk"
# でも、そう真っ直ぐに俺を見つめる彼女の瞳は、どこか悲しげなようにも見えて……。
line = "でも、そう真っ直ぐに俺を見つめる彼女の瞳は、どこか悲しげなようにも見えて……。"

[[dialogue]]
speaker = "ヴィーナス"
# 「──学園長にも話を通してあるわ。もし合意が得られたら、全生徒の前で『御前試合』を行うってね」
line = "「──学園長にも話を通してあるわ。もし合意が得られたら、全生徒の前で『御前試合』を行うってね」"

[[dialogue]]
speaker = "マトイ"
# 「御前試合……！？」
line = "「御前試合……！？」"

[[dialogue]]
speaker = "サーシャ"
# 「──ってなんだっけ」
line = "「──ってなんだっけ」"

[[dialogue]]
speaker = "アナ"
# 「昔、<b>流星</b>学園にあった一騎打ち制度。でも……ここ数十年、実施された記録は一切ない」
line = "「昔、<b>流星</b>学園にあった一騎打ち制度。でも……ここ数十年、実施された記録は一切ない」"

[[dialogue]]
speaker = "クロト"
# 「……わかった」
line = "「……わかった」"

[[dialogue]]
speaker = "マトイ"
# 「緋宮くん……？」
line = "「緋宮くん……？」"

[[dialogue]]
speaker = "unk"
# 退学を天秤にかけられているなら仕方がない。
line = "退学を天秤にかけられているなら仕方がない。"

[[dialogue]]
speaker = "unk"
# もし彼女が俺に目をかけてくれているというなら、少なくともその厚意には応えるべきだろう。
line = "もし彼女が俺に目をかけてくれているというなら、少なくともその厚意には応えるべきだろう。"

[[dialogue]]
speaker = "unk"
# だから──
line = "だから──"

[[dialogue]]
speaker = "クロト"
# 「九浄ヴィーナス──俺は君に勝って、星徒会長の座を貰い受けよう」
line = "「九浄ヴィーナス──俺は君に勝って、星徒会長の座を貰い受けよう」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうこなくっちゃ」
line = "「そうこなくっちゃ」"

[[dialogue]]
speaker = "unk"
# 俺の学園生活は、いきなりの急展開を迎えることになった。
line = "俺の学園生活は、いきなりの急展開を迎えることになった。"
