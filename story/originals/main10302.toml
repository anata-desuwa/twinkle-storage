[[dialogue]]
speaker = "unk"
# 第２話,先代星徒会,B
line = "第２話,先代星徒会,B"

[[dialogue]]
speaker = "シルヴィ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "シルヴィ"
# 「……ただいま、サーシャ」
line = "「……ただいま、サーシャ」"

[[dialogue]]
speaker = "サーシャ"
# 「ええ。本当に久しぶり」
line = "「ええ。本当に久しぶり」"

[[dialogue]]
speaker = "シルヴィ"
# 「サーシャが目の前にいるの、不思議な感じする」
line = "「サーシャが目の前にいるの、不思議な感じする」"

[[dialogue]]
speaker = "サーシャ"
# 「……ふふっ」
line = "「……ふふっ」"

[[dialogue]]
speaker = "シルヴィ"
# 「あははっ」
line = "「あははっ」"

[[dialogue]]
speaker = "サーシャ"
# （何もしてないのに、笑っちゃう。懐かしいわ、この感じ）
line = "（何もしてないのに、笑っちゃう。懐かしいわ、この感じ）"

[[dialogue]]
speaker = "シルヴィ"
# 「あの、その、さ……」
line = "「あの、その、さ……」"

[[dialogue]]
speaker = "サーシャ"
# 「どうしたの、歯切れ悪そうな感じで？　柄にもないわよ？」
line = "「どうしたの、歯切れ悪そうな感じで？　柄にもないわよ？」"

[[dialogue]]
speaker = "シルヴィ"
# 「だって、だってぇ……言いたいこと、たくさんあって……」
line = "「だって、だってぇ……言いたいこと、たくさんあって……」"

[[dialogue]]
speaker = "サーシャ"
# 「そうね。私も同じよ」
line = "「そうね。私も同じよ」"

[[dialogue]]
speaker = "サーシャ"
# 「……少し歩きましょうか。時間ならたっぷりあるわ」
line = "「……少し歩きましょうか。時間ならたっぷりあるわ」"

[[dialogue]]
speaker = "unk"
# 学園を離れて、街へ繰り出すふたり。
line = "学園を離れて、街へ繰り出すふたり。"

[[dialogue]]
speaker = "unk"
# リクリエの爪痕は残るけれど、それでも市民は以前の生活を取り戻していた。
line = "リクリエの爪痕は残るけれど、それでも市民は以前の生活を取り戻していた。"

[[dialogue]]
speaker = "unk"
# 若者向けの通りには、カラフルな看板の飲食店が軒を連ねている。
line = "若者向けの通りには、カラフルな看板の飲食店が軒を連ねている。"

[[dialogue]]
speaker = "シルヴィ"
# 「あたしがいないうちにまた変わったね。知らないお店けっこうある！」
line = "「あたしがいないうちにまた変わったね。知らないお店けっこうある！」"

[[dialogue]]
speaker = "サーシャ"
# 「この辺りは気付くと変わってるのよね～。あ、１６色ケーキですって。どんな味がするのかしら？」
line = "「この辺りは気付くと変わってるのよね～。あ、１６色ケーキですって。どんな味がするのかしら？」"

[[dialogue]]
speaker = "シルヴィ"
# 「美味しいのかすら分かんない！　あ、あっちはから揚げドーナツだって！」
line = "「美味しいのかすら分かんない！　あ、あっちはから揚げドーナツだって！」"

[[dialogue]]
speaker = "サーシャ"
# 「すごく太っちゃいそう～。でも美味しそうだわ～。そっちの天界カレーも美味しそう～」
line = "「すごく太っちゃいそう～。でも美味しそうだわ～。そっちの天界カレーも美味しそう～」"

[[dialogue]]
speaker = "シルヴィ"
# 「サーシャは本当、なんでも気になるねー」
line = "「サーシャは本当、なんでも気になるねー」"

[[dialogue]]
speaker = "サーシャ"
# 「シルヴィだってそうでしょ？　気になったら一直線、好奇心の塊だもんね～」
line = "「シルヴィだってそうでしょ？　気になったら一直線、好奇心の塊だもんね～」"

[[dialogue]]
speaker = "シルヴィ"
# 「えへへ～、まあね」
line = "「えへへ～、まあね」"

[[dialogue]]
speaker = "サーシャ"
# 「まあ、私もソフィにもよく言われるんだけどね～。『フラフラしないでください。危なっかしいです』って」
line = "「まあ、私もソフィにもよく言われるんだけどね～。『フラフラしないでください。危なっかしいです』って」"

[[dialogue]]
speaker = "シルヴィ"
# 「あはははっ！　そういえば今は妹ちゃんも流星市国にいるんだっけ！　会ってみたいなー」
line = "「あはははっ！　そういえば今は妹ちゃんも流星市国にいるんだっけ！　会ってみたいなー」"

[[dialogue]]
speaker = "サーシャ"
# 「機会があったら紹介するわね。すっごく可愛いんだから～」
line = "「機会があったら紹介するわね。すっごく可愛いんだから～」"

[[dialogue]]
speaker = "シルヴィ"
# 「楽しみにしてる！　あ」
line = "「楽しみにしてる！　あ」"

[[dialogue]]
speaker = "シルヴィ"
# 「チキン！　フライドチキンがあるよ！　入ろう！」
line = "「チキン！　フライドチキンがあるよ！　入ろう！」"

[[dialogue]]
speaker = "サーシャ"
# 「どこにでもあるお店よ～？」
line = "「どこにでもあるお店よ～？」"

[[dialogue]]
speaker = "シルヴィ"
# 「天界にはなかったの！　あたしめちゃくちゃ恋しかったんだから！」
line = "「天界にはなかったの！　あたしめちゃくちゃ恋しかったんだから！」"

[[dialogue]]
speaker = "サーシャ"
# 「それもそうね～。うん、入りましょうか～」
line = "「それもそうね～。うん、入りましょうか～」"

[[dialogue]]
speaker = "シルヴィ"
# 「座るのにこんな時間かかると思わなかったよ。久々で忘れてた。人間界ホントひと多い！」
line = "「座るのにこんな時間かかると思わなかったよ。久々で忘れてた。人間界ホントひと多い！」"

[[dialogue]]
speaker = "サーシャ"
# 「私もこんなに並ぶの久しぶりだわ～」
line = "「私もこんなに並ぶの久しぶりだわ～」"

[[dialogue]]
speaker = "シルヴィ"
# 「よし！　じゃあいただきます！」
line = "「よし！　じゃあいただきます！」"

[[dialogue]]
speaker = "サーシャ"
# 「いただきます」
line = "「いただきます」"

[[dialogue]]
speaker = "シルヴィ"
# 「おいし～～っ！！　皮がパリパリで、スパイシーで、ジューシーで、何本でも食べられる！」
line = "「おいし～～っ！！　皮がパリパリで、スパイシーで、ジューシーで、何本でも食べられる！」"

[[dialogue]]
speaker = "サーシャ"
# 「本当に美味しそうに食べるわね～」
line = "「本当に美味しそうに食べるわね～」"

[[dialogue]]
speaker = "シルヴィ"
# 「だっておいしいからね！」
line = "「だっておいしいからね！」"

[[dialogue]]
speaker = "サーシャ"
# 「ふふっ。元気そうで安心したわ」
line = "「ふふっ。元気そうで安心したわ」"

[[dialogue]]
speaker = "シルヴィ"
# 「サーシャもねっ！」
line = "「サーシャもねっ！」"

[[dialogue]]
speaker = "シルヴィ"
# 「……サーシャは今も星徒会なんだっけ」
line = "「……サーシャは今も星徒会なんだっけ」"

[[dialogue]]
speaker = "サーシャ"
# 「ええ。シルヴィが天界に帰ってから、ヴィーナスちゃんを会長に指名して、そのヴィーナスちゃんが今の会長くんを指名？　して……まぁいろいろあったわ～」
line = "「ええ。シルヴィが天界に帰ってから、ヴィーナスちゃんを会長に指名して、そのヴィーナスちゃんが今の会長くんを指名？　して……まぁいろいろあったわ～」"

[[dialogue]]
speaker = "シルヴィ"
# 「あたしもいろいろあったな～。副会長だったのもずいぶん前のことみたいに感じるし」
line = "「あたしもいろいろあったな～。副会長だったのもずいぶん前のことみたいに感じるし」"

[[dialogue]]
speaker = "サーシャ"
# 「私が会長になったとき、副会長を引き受けてくれたのよね～」
line = "「私が会長になったとき、副会長を引き受けてくれたのよね～」"

[[dialogue]]
speaker = "シルヴィ"
# 「そうそう、サーシャが会長なんだから、あたしも何かやらなきゃって思ったんだよ！」
line = "「そうそう、サーシャが会長なんだから、あたしも何かやらなきゃって思ったんだよ！」"

[[dialogue]]
speaker = "サーシャ"
# 「あのときは本当に助かってたわ～」
line = "「あのときは本当に助かってたわ～」"

[[dialogue]]
speaker = "シルヴィ"
# 「うん！　なんてったって、あたし、強いからね！」
line = "「うん！　なんてったって、あたし、強いからね！」"

[[dialogue]]
speaker = "シルヴィ"
# 「……まぁ強いからこそ天界に帰ることになったんだけど」
line = "「……まぁ強いからこそ天界に帰ることになったんだけど」"

[[dialogue]]
speaker = "サーシャ"
# 「仕方ないわ～。生まれ故郷を守るためだもの」
line = "「仕方ないわ～。生まれ故郷を守るためだもの」"

[[dialogue]]
speaker = "シルヴィ"
# 「天界の田舎町だからね。リクリエが近付いてモンスターは強くなるのに、ちゃんと戦える星騎士がいなかったから」
line = "「天界の田舎町だからね。リクリエが近付いてモンスターは強くなるのに、ちゃんと戦える星騎士がいなかったから」"

[[dialogue]]
speaker = "シルヴィ"
# 「でももう大丈夫。あたしがばっちり鍛えてきたから！」
line = "「でももう大丈夫。あたしがばっちり鍛えてきたから！」"

[[dialogue]]
speaker = "シルヴィ"
# 「あたしの後輩たちが故郷を守ってくれる！　こんなに嬉しいことはないよ！」
line = "「あたしの後輩たちが故郷を守ってくれる！　こんなに嬉しいことはないよ！」"

[[dialogue]]
speaker = "シルヴィ"
# 「ぼべばばば、ぶっぼびんべいびびばべぶばばべ！」
line = "「ぼべばばば、ぶっぼびんべいびびばべぶばばべ！」"

[[dialogue]]
speaker = "サーシャ"
# 「ぷっ、ふふふふ」
line = "「ぷっ、ふふふふ」"

[[dialogue]]
speaker = "シルヴィ"
# 「ごっくん。ん？　何かおかしなことあった？」
line = "「ごっくん。ん？　何かおかしなことあった？」"

[[dialogue]]
speaker = "サーシャ"
# 「今のシルヴィ、チキンを口いっぱいに頬張って、ハムスターみたいだったから、つい。ぷっ」
line = "「今のシルヴィ、チキンを口いっぱいに頬張って、ハムスターみたいだったから、つい。ぷっ」"

[[dialogue]]
speaker = "シルヴィ"
# 「あー、また笑った！」
line = "「あー、また笑った！」"

[[dialogue]]
speaker = "サーシャ"
# 「ふふふふ……だって、あははははっ！」
line = "「ふふふふ……だって、あははははっ！」"

[[dialogue]]
speaker = "unk"
# それから、笑いが収まるまでしばらく時間を要したのだった。
line = "それから、笑いが収まるまでしばらく時間を要したのだった。"
