[[dialogue]]
speaker = "シャロン"
# 「イレーナさま……！　お気を確かに、イレーナさま……！　どうか目をっ、目を開けてくださいっっ……！！」
line = "「イレーナさま……！　お気を確かに、イレーナさま……！　どうか目をっ、目を開けてくださいっっ……！！」"

[[dialogue]]
speaker = "シャロン"
# 「どうしてこんなっ！！　イレーナさま、イレーナさま、イレーナさまぁああああっっ～～！！！」
line = "「どうしてこんなっ！！　イレーナさま、イレーナさま、イレーナさまぁああああっっ～～！！！」"

[[dialogue]]
speaker = "イレーナ"
# 「うっさいわね！！　聞こえてるわよ！！」
line = "「うっさいわね！！　聞こえてるわよ！！」"

[[dialogue]]
speaker = "シャロン"
# 「ひゃふっ！！？」
line = "「ひゃふっ！！？」"

[[dialogue]]
speaker = "イレーナ"
# 「ったくもう……。目を閉じて星力を集中してただけよ……。痛いから揺らさないでもらえるかしら」
line = "「ったくもう……。目を閉じて星力を集中してただけよ……。痛いから揺らさないでもらえるかしら」"

[[dialogue]]
speaker = "シャロン"
# 「ご、ご無事なのですかっ？　お身体は大丈夫なんですかっ！？」
line = "「ご、ご無事なのですかっ？　お身体は大丈夫なんですかっ！？」"

[[dialogue]]
speaker = "イレーナ"
# 「痛い痛い痛いっ！　だから揺らさないでってば！　ご無事じゃないから治療してるんでしょうに！？」
line = "「痛い痛い痛いっ！　だから揺らさないでってば！　ご無事じゃないから治療してるんでしょうに！？」"

[[dialogue]]
speaker = "シャロン"
# 「そ、そうですよね！　申し訳ございません！！」
line = "「そ、そうですよね！　申し訳ございません！！」"

[[dialogue]]
speaker = "unk"
# おかげで子どもも無事だ
line = "おかげで子どもも無事だ"

[[dialogue]]
speaker = "イレーナ"
# 「それはいいけど、あんたは何してたのよ。本当なら会長のあんたがバシッとモンスターを倒すところでしょうが。どうしてあたしがシャロンを庇うハメになってんの？」
line = "「それはいいけど、あんたは何してたのよ。本当なら会長のあんたがバシッとモンスターを倒すところでしょうが。どうしてあたしがシャロンを庇うハメになってんの？」"

[[dialogue]]
speaker = "unk"
# う……ごめん……
line = "う……ごめん……"

[[dialogue]]
speaker = "シャロン"
# 「か、会長さまには子どもたちを守っていただいていたので……」
line = "「か、会長さまには子どもたちを守っていただいていたので……」"

[[dialogue]]
speaker = "イレーナ"
# 「もう、まったく……あんたには１つ貸しだからね」
line = "「もう、まったく……あんたには１つ貸しだからね」"

[[dialogue]]
speaker = "シャロン"
# 「それよりも、どうしてここへ……。あんなにも普通の女の子に戻りたいと仰っていたのに……」
line = "「それよりも、どうしてここへ……。あんなにも普通の女の子に戻りたいと仰っていたのに……」"

[[dialogue]]
speaker = "イレーナ"
# 「あたしがどこに来ようがあたしの勝手でしょ」
line = "「あたしがどこに来ようがあたしの勝手でしょ」"

[[dialogue]]
speaker = "イレーナ"
# 「ていうか、あんたたちに何かあったら誰がクリスマスパーティーの準備するのよ」
line = "「ていうか、あんたたちに何かあったら誰がクリスマスパーティーの準備するのよ」"

[[dialogue]]
speaker = "イレーナ"
# 「あんたたちがボロボロになって、パーティーの準備全部押し付けられるくらいなら、自分で戦って怪我人減らした方がマシだわ」
line = "「あんたたちがボロボロになって、パーティーの準備全部押し付けられるくらいなら、自分で戦って怪我人減らした方がマシだわ」"

[[dialogue]]
speaker = "イレーナ"
# 「助けてあげた分キリキリ働いてあたしに楽させなさい。いいわね」
line = "「助けてあげた分キリキリ働いてあたしに楽させなさい。いいわね」"

[[dialogue]]
speaker = "シャロン"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "シャロン"
# 「……ふふっ。くすくすっ」
line = "「……ふふっ。くすくすっ」"

[[dialogue]]
speaker = "イレーナ"
# 「な、なに笑ってるのよ！」
line = "「な、なに笑ってるのよ！」"

[[dialogue]]
speaker = "シャロン"
# 「くすくす、失礼しました。こんなにも愛らしいイレーナさまを拝見したのは初めてだったもので」
line = "「くすくす、失礼しました。こんなにも愛らしいイレーナさまを拝見したのは初めてだったもので」"

[[dialogue]]
speaker = "イレーナ"
# 「は？」
line = "「は？」"

[[dialogue]]
speaker = "シャロン"
# 「やはりイレーナさまはイレーナさまでした。お言葉遣いこそいささか乱暴ですが、私のよく知る、高潔で崇高な魂をお持ちの聖女様です」
line = "「やはりイレーナさまはイレーナさまでした。お言葉遣いこそいささか乱暴ですが、私のよく知る、高潔で崇高な魂をお持ちの聖女様です」"

[[dialogue]]
speaker = "イレーナ"
# 「はぁ～？　あんた人の話聞いてたの？　あたしは聖女じゃないってさんざん言ってんでしょうが」
line = "「はぁ～？　あんた人の話聞いてたの？　あたしは聖女じゃないってさんざん言ってんでしょうが」"

[[dialogue]]
speaker = "シャロン"
# 「ええ。ですがそれでも、イレーナさまは聖女なのです」
line = "「ええ。ですがそれでも、イレーナさまは聖女なのです」"

[[dialogue]]
speaker = "イレーナ"
# 「はぁ～っ？　聖女じゃないって何度言えばわかるのよ。話通じないわね……」
line = "「はぁ～っ？　聖女じゃないって何度言えばわかるのよ。話通じないわね……」"

[[dialogue]]
speaker = "unk"
# 俺もイレーナは聖女だと思う
line = "俺もイレーナは聖女だと思う"

[[dialogue]]
speaker = "イレーナ"
# 「うるさいわねっ。あんたも笑ってんじゃないわよ、エロ会長」
line = "「うるさいわねっ。あんたも笑ってんじゃないわよ、エロ会長」"

[[dialogue]]
speaker = "イレーナ"
# 「ともかく、さっさと行くわよ！　せっかくパーティーの準備してたってのに、これ以上ぶち壊しにされたら堪ったもんじゃないわ！」
line = "「ともかく、さっさと行くわよ！　せっかくパーティーの準備してたってのに、これ以上ぶち壊しにされたら堪ったもんじゃないわ！」"

[[dialogue]]
speaker = "シャロン"
# 「ええ、参りましょう。子どもたちを泣かせた罪を<ruby=あがな>贖</ruby>っていただかなくてはいけませんから」
line = "「ええ、参りましょう。子どもたちを泣かせた罪を<ruby>贖<rt>あがな</rt></ruby>っていただかなくてはいけませんから」"

[[dialogue]]
speaker = "unk"
# 行くってまさか
line = "行くってまさか"

[[dialogue]]
speaker = "イレーナ"
# 「もちろん、あのモンスターにトドメを刺しによ」
line = "「もちろん、あのモンスターにトドメを刺しによ」"

[[dialogue]]
speaker = "シャロン"
# 「アステラの中へ逃げ込んだのはしかと見ていましたから」
line = "「アステラの中へ逃げ込んだのはしかと見ていましたから」"

[[dialogue]]
speaker = "イレーナ"
# 「まさか援軍を待とうだなんて悠長なこと言わないわよね？」
line = "「まさか援軍を待とうだなんて悠長なこと言わないわよね？」"

[[dialogue]]
speaker = "シャロン"
# 「ご安心を。女神様のご加護を受けた今、二度と遅れは取りません。イレーナさまと会長さまが共に戦ってくださるのであれば尚更です」
line = "「ご安心を。女神様のご加護を受けた今、二度と遅れは取りません。イレーナさまと会長さまが共に戦ってくださるのであれば尚更です」"

[[dialogue]]
speaker = "unk"
# よし──行こう！
line = "よし──行こう！"
