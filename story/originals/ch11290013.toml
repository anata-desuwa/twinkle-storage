[[dialogue]]
speaker = "unk"
# 第３話,強火魔王信者,P
line = "第３話,強火魔王信者,P"

[[dialogue]]
speaker = "unk"
# エステルの様子を見に星見家にやってきた。
line = "エステルの様子を見に星見家にやってきた。"

[[dialogue]]
speaker = "エステル"
# 「ありがとうございます、魔王様。わざわざ会いに来てくださるなんて」
line = "「ありがとうございます、魔王様。わざわざ会いに来てくださるなんて」"

[[dialogue]]
speaker = "unk"
# ここでの生活も慣れた？
line = "ここでの生活も慣れた？"

[[dialogue]]
speaker = "エステル"
# 「はい。お屋敷の方々がとても良くしてくださいます」
line = "「はい。お屋敷の方々がとても良くしてくださいます」"

[[dialogue]]
speaker = "エステル"
# 「特にメイドのナミエルさんとはとても仲良くなりました」
line = "「特にメイドのナミエルさんとはとても仲良くなりました」"

[[dialogue]]
speaker = "エステル"
# 「とても可愛らしくて、それなのにしっかりしていて、私、大好きになってしまいました」
line = "「とても可愛らしくて、それなのにしっかりしていて、私、大好きになってしまいました」"

[[dialogue]]
speaker = "ナミエル"
# 「コホン……そのように持ち上げられると恥ずかしいのですが」
line = "「コホン……そのように持ち上げられると恥ずかしいのですが」"

[[dialogue]]
speaker = "unk"
# こんにちは、ナミエル
line = "こんにちは、ナミエル"

[[dialogue]]
speaker = "ナミエル"
# 「ようこそおいでくださいました……と言いたいところですが」
line = "「ようこそおいでくださいました……と言いたいところですが」"

[[dialogue]]
speaker = "ナミエル"
# 「エステルさまに会いに来る頻度が、少しずつ上がってきているように思うのは気のせいですか？」
line = "「エステルさまに会いに来る頻度が、少しずつ上がってきているように思うのは気のせいですか？」"

[[dialogue]]
speaker = "unk"
# 純粋に心配してなんだけど
line = "純粋に心配してなんだけど"

[[dialogue]]
speaker = "unk"
# そうかな？
line = "そうかな？"

[[dialogue]]
speaker = "ナミエル"
# 「純粋に、ね……」
line = "「純粋に、ね……」"

[[dialogue]]
speaker = "ナミエル"
# 「そんな事を言って、もしかしてエステルさまに気があるんじゃないでしょうね？」
line = "「そんな事を言って、もしかしてエステルさまに気があるんじゃないでしょうね？」"

[[dialogue]]
speaker = "ナミエル"
# 「エステルさまに手を出そうとしたら、私が許しませんから！」
line = "「エステルさまに手を出そうとしたら、私が許しませんから！」"

[[dialogue]]
speaker = "エステル"
# 「大丈夫ですよ、ナミエルさん。そんなに警戒しなくても魔王様が私に手を出そうなどと考えるはずがありませんから」
line = "「大丈夫ですよ、ナミエルさん。そんなに警戒しなくても魔王様が私に手を出そうなどと考えるはずがありませんから」"

[[dialogue]]
speaker = "ナミエル"
# 「え……そうですか？」
line = "「え……そうですか？」"

[[dialogue]]
speaker = "ナミエル"
# 「いえいえ、油断はできませんよ。緋宮会長だって男なんですから。心のうちにどんな邪な感情を抱いてるか分かったものではありません」
line = "「いえいえ、油断はできませんよ。緋宮会長だって男なんですから。心のうちにどんな邪な感情を抱いてるか分かったものではありません」"

[[dialogue]]
speaker = "unk"
# 酷い言われようだ
line = "酷い言われようだ"

[[dialogue]]
speaker = "エステル"
# 「ふふっ、本当に大丈夫ですよ。魔王様がそんな邪な考えなど抱くはずがありません」
line = "「ふふっ、本当に大丈夫ですよ。魔王様がそんな邪な考えなど抱くはずがありません」"

[[dialogue]]
speaker = "ナミエル"
# 「う……どうしてそんなにきっぱり言い切れるんです？」
line = "「う……どうしてそんなにきっぱり言い切れるんです？」"

[[dialogue]]
speaker = "エステル"
# 「だって魔王様は公明正大で正義感にあふれる素晴らしい方ですから」
line = "「だって魔王様は公明正大で正義感にあふれる素晴らしい方ですから」"

[[dialogue]]
speaker = "エステル"
# 「今、私がこちらの世界に居るという状況も、私１人を置いてくると危機に晒されてしまうだろうと慮ってくださったからです」
line = "「今、私がこちらの世界に居るという状況も、私１人を置いてくると危機に晒されてしまうだろうと慮ってくださったからです」"

[[dialogue]]
speaker = "エステル"
# 「そんな風に私の身を案じてくださった魔王様が、私に手を出そうなどと考えるでしょうか？　そうですよね、魔王様」
line = "「そんな風に私の身を案じてくださった魔王様が、私に手を出そうなどと考えるでしょうか？　そうですよね、魔王様」"

[[dialogue]]
speaker = "unk"
# ええと……
line = "ええと……"

[[dialogue]]
speaker = "ナミエル"
# 「なぜ緋宮会長を信用しているのか、理由は伺いましたが……それでもそこまで無条件に信じられるものでしょうか？」
line = "「なぜ緋宮会長を信用しているのか、理由は伺いましたが……それでもそこまで無条件に信じられるものでしょうか？」"

[[dialogue]]
speaker = "ナミエル"
# 「エステルさまとは色々な点で共感するところも多いのですが、この点だけは相容れることはなさそうです」
line = "「エステルさまとは色々な点で共感するところも多いのですが、この点だけは相容れることはなさそうです」"

[[dialogue]]
speaker = "ナミエル"
# 「第一、あなたを救った緋宮会長と、ここにいる緋宮会長とは別人なのでしょう？」
line = "「第一、あなたを救った緋宮会長と、ここにいる緋宮会長とは別人なのでしょう？」"

[[dialogue]]
speaker = "エステル"
# 「別人であったとしても魔王様は魔王様です。どうやらこちらの世界でも同じ事が起こり、同じように私を救い出してくださったと聞きます」
line = "「別人であったとしても魔王様は魔王様です。どうやらこちらの世界でも同じ事が起こり、同じように私を救い出してくださったと聞きます」"

[[dialogue]]
speaker = "エステル"
# 「それは私のことを救って下さった……そう言ってしまってもいいのではないでしょうか？」
line = "「それは私のことを救って下さった……そう言ってしまってもいいのではないでしょうか？」"

[[dialogue]]
speaker = "ナミエル"
# 「ぅ……」
line = "「ぅ……」"

[[dialogue]]
speaker = "エステル"
# 「それに普段の行いを見ていても、魔王様が素晴らしい人であるということは聡明なナミエルさんになら分かるのでは？」
line = "「それに普段の行いを見ていても、魔王様が素晴らしい人であるということは聡明なナミエルさんになら分かるのでは？」"

[[dialogue]]
speaker = "ナミエル"
# 「そ、そんな迷いのない笑顔で言い切られると……緋宮会長が素晴らしい人物であるように思えてきます……」
line = "「そ、そんな迷いのない笑顔で言い切られると……緋宮会長が素晴らしい人物であるように思えてきます……」"

[[dialogue]]
speaker = "ナミエル"
# 「確かに緋宮会長は紳士的で、私やお嬢様に対して気配りも行き届いていますし、人格として問題となるところはありません」
line = "「確かに緋宮会長は紳士的で、私やお嬢様に対して気配りも行き届いていますし、人格として問題となるところはありません」"

[[dialogue]]
speaker = "ナミエル"
# 「男性だからという理由で、きつく当たっていましたが……もしかして私の今までの行為は全て誤りだったのでは……？」
line = "「男性だからという理由で、きつく当たっていましたが……もしかして私の今までの行為は全て誤りだったのでは……？」"

[[dialogue]]
speaker = "エステル"
# 「大丈夫ですよ。魔王様は懐の広い方ですから、きちんと謝れば許してくれるはずです」
line = "「大丈夫ですよ。魔王様は懐の広い方ですから、きちんと謝れば許してくれるはずです」"

[[dialogue]]
speaker = "ナミエル"
# 「ごめんなさい！　私、今まで緋宮会長にとんでもない扱いを……！！」
line = "「ごめんなさい！　私、今まで緋宮会長にとんでもない扱いを……！！」"

[[dialogue]]
speaker = "unk"
# 正気に戻って！
line = "正気に戻って！"

[[dialogue]]
speaker = "unk"
# しっかりして！
line = "しっかりして！"

[[dialogue]]
speaker = "ナミエル"
# 「はっ！？」
line = "「はっ！？」"

[[dialogue]]
speaker = "ナミエル"
# 「そうですっ！　どうして私があなたに謝らなければならないのですか！　いい加減にしてください！」
line = "「そうですっ！　どうして私があなたに謝らなければならないのですか！　いい加減にしてください！」"

[[dialogue]]
speaker = "unk"
# 俺に怒らないで……
line = "俺に怒らないで……"

[[dialogue]]
speaker = "ナミエル"
# 「まったく……エステルさまは口が上手いんですから。あなたと話していると私まで緋宮会長信者になってしまいそうで怖いです」
line = "「まったく……エステルさまは口が上手いんですから。あなたと話していると私まで緋宮会長信者になってしまいそうで怖いです」"

[[dialogue]]
speaker = "エステル"
# 「ふふふ、そんなそんな……」
line = "「ふふふ、そんなそんな……」"

[[dialogue]]
speaker = "unk"
# 笑って流すエステル。
line = "笑って流すエステル。"

[[dialogue]]
speaker = "unk"
# けれどあのナミエルさえもおかしくさせてしまうエステルの魔王信奉者ぶりは、少し恐ろしいもののように感じてしまうのだった。
line = "けれどあのナミエルさえもおかしくさせてしまうエステルの魔王信奉者ぶりは、少し恐ろしいもののように感じてしまうのだった。"
