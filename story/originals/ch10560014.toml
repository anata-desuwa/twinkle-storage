[[dialogue]]
speaker = "unk"
# 第４話,夢に向かって全速力！,P
line = "第４話,夢に向かって全速力！,P"

[[dialogue]]
speaker = "unk"
# 最近、アムの姿を地下訓練施設で見かけない。
line = "最近、アムの姿を地下訓練施設で見かけない。"

[[dialogue]]
speaker = "unk"
# その原因には心当たりがある。だから俺はアムを探すことにした。
line = "その原因には心当たりがある。だから俺はアムを探すことにした。"

[[dialogue]]
speaker = "unk"
# 教室やカフェテリアをしらみつぶしに駆けまわって、日が暮れた頃にアムをようやく見つけた。
line = "教室やカフェテリアをしらみつぶしに駆けまわって、日が暮れた頃にアムをようやく見つけた。"

[[dialogue]]
speaker = "アム"
# 「あ……会長。どうしたの、そんなに息を切らして。もしかしてあたしを探してた……？」
line = "「あ……会長。どうしたの、そんなに息を切らして。もしかしてあたしを探してた……？」"

[[dialogue]]
speaker = "アム"
# 「……ほんとに？　そっか、そうなんだ……」
line = "「……ほんとに？　そっか、そうなんだ……」"

[[dialogue]]
speaker = "アム"
# 「ちなみにあたしのこと、心配してくれてたりー……とか？」
line = "「ちなみにあたしのこと、心配してくれてたりー……とか？」"

[[dialogue]]
speaker = "unk"
# 当たり前だ
line = "当たり前だ"

[[dialogue]]
speaker = "アム"
# 「……そっか。あれだよね。最近あたしが訓練していないから、でしょ？」
line = "「……そっか。あれだよね。最近あたしが訓練していないから、でしょ？」"

[[dialogue]]
speaker = "アム"
# 「うん……スランプ、なのかな。会長も知ってるんでしょ。ここのところエルゼにずっと負けっぱなしなんだー」
line = "「うん……スランプ、なのかな。会長も知ってるんでしょ。ここのところエルゼにずっと負けっぱなしなんだー」"

[[dialogue]]
speaker = "アム"
# 「流星附属に入学して、知り合って。お互いライバル視するようになってから、ず～っと五分の関係だったのに」
line = "「流星附属に入学して、知り合って。お互いライバル視するようになってから、ず～っと五分の関係だったのに」"

[[dialogue]]
speaker = "アム"
# 「６連敗だよ？　こんなの初めて。サボってるつもりもないし、戦い方も工夫してるのに全然勝てなくなっちゃった」
line = "「６連敗だよ？　こんなの初めて。サボってるつもりもないし、戦い方も工夫してるのに全然勝てなくなっちゃった」"

[[dialogue]]
speaker = "アム"
# 「エルゼは流星学園のフィオナ会長に憧れてて……あたしはヴィーナス前会長が目標だったから、お互い、目指すところが似てるじゃない？」
line = "「エルゼは流星学園のフィオナ会長に憧れてて……あたしはヴィーナス前会長が目標だったから、お互い、目指すところが似てるじゃない？」"

[[dialogue]]
speaker = "アム"
# 「模擬戦をやってもこれ以上の相手はいなくて。競い合うの、楽しかったんだけど……あはは」
line = "「模擬戦をやってもこれ以上の相手はいなくて。競い合うの、楽しかったんだけど……あはは」"

[[dialogue]]
speaker = "アム"
# 「最近は自信も無くしちゃったっていうか……訓練してても楽しくないんだ～……」
line = "「最近は自信も無くしちゃったっていうか……訓練してても楽しくないんだ～……」"

[[dialogue]]
speaker = "アム"
# 「あたし、つまずいちゃう前は、どんな気持ちで戦ってたんだっけ……」
line = "「あたし、つまずいちゃう前は、どんな気持ちで戦ってたんだっけ……」"

[[dialogue]]
speaker = "アム"
# 「ねぇ、会長はいつも何を思って戦ってるの？」
line = "「ねぇ、会長はいつも何を思って戦ってるの？」"

[[dialogue]]
speaker = "unk"
# 昔、モンスターにさらわれたんだ
line = "昔、モンスターにさらわれたんだ"

[[dialogue]]
speaker = "アム"
# 「ええ！？　何それ、こわ……」
line = "「ええ！？　何それ、こわ……」"

[[dialogue]]
speaker = "アム"
# 「……うん……うん。会長を助けてくれた人がいたんだね」
line = "「……うん……うん。会長を助けてくれた人がいたんだね」"

[[dialogue]]
speaker = "アム"
# 「会長はその人に憧れて……そして他の人を自分みたいに怖い目にあわせたくなくて……それで星騎士になったんだね」
line = "「会長はその人に憧れて……そして他の人を自分みたいに怖い目にあわせたくなくて……それで星騎士になったんだね」"

[[dialogue]]
speaker = "アム"
# 「わかる、その気持ち。あたしだって……あれ？　あたし──」
line = "「わかる、その気持ち。あたしだって……あれ？　あたし──」"

[[dialogue]]
speaker = "若い女性"
# 「きゃあああーっ！　誰かー！」
line = "「きゃあああーっ！　誰かー！」"

[[dialogue]]
speaker = "アム"
# 「──悲鳴！？」
line = "「──悲鳴！？」"

[[dialogue]]
speaker = "アム"
# 「あっ、向こうにモンスターが！　大変だよ会長！　急いで助けに行かなきゃ！」
line = "「あっ、向こうにモンスターが！　大変だよ会長！　急いで助けに行かなきゃ！」"

[[dialogue]]
speaker = "アム"
# 「すっかり遅くなっちゃったね、会長。でもケガ人も出なかったし、本当に良かった！」
line = "「すっかり遅くなっちゃったね、会長。でもケガ人も出なかったし、本当に良かった！」"

[[dialogue]]
speaker = "unk"
# 本当にスランプ？　いい動きだった
line = "本当にスランプ？　いい動きだった"

[[dialogue]]
speaker = "アム"
# 「あ……言われてみれば。あの人を助けるのに夢中だったから自分がスランプなこと、すっかり忘れてたかも」
line = "「あ……言われてみれば。あの人を助けるのに夢中だったから自分がスランプなこと、すっかり忘れてたかも」"

[[dialogue]]
speaker = "アム"
# 「……そっか。あたし、ここのところ勝ち負けばっかり気にして、大事なことをおろそかにしてたのかも……」
line = "「……そっか。あたし、ここのところ勝ち負けばっかり気にして、大事なことをおろそかにしてたのかも……」"

[[dialogue]]
speaker = "アム"
# 「昔。今よりずーっと弱かった頃、あたしのピンチを助けてくれたのがヴィーナス前会長で……」
line = "「昔。今よりずーっと弱かった頃、あたしのピンチを助けてくれたのがヴィーナス前会長で……」"

[[dialogue]]
speaker = "アム"
# 「もう大丈夫よ──そう言って、颯爽と現れて庇ってくれたあの時に……ああ、こんな風になりたいって思ったんだっけ」
line = "「もう大丈夫よ──そう言って、颯爽と現れて庇ってくれたあの時に……ああ、こんな風になりたいって思ったんだっけ」"

[[dialogue]]
speaker = "アム"
# 「どんなに強敵が相手でも、誰かを守るために最前線で踏ん張る。１人も死なせない、その覚悟を持ったカッコイイ星騎士」
line = "「どんなに強敵が相手でも、誰かを守るために最前線で踏ん張る。１人も死なせない、その覚悟を持ったカッコイイ星騎士」"

[[dialogue]]
speaker = "アム"
# 「そうだよ、模擬戦に負け続けたことよりも、この気持ちを忘れてた方が問題じゃん……！」
line = "「そうだよ、模擬戦に負け続けたことよりも、この気持ちを忘れてた方が問題じゃん……！」"

[[dialogue]]
speaker = "アム"
# 「…………よし！　連敗がなんだ！　次こそ勝つ！　勝てなかったらその次こそ勝つ！　やるぞーっ！！」
line = "「…………よし！　連敗がなんだ！　次こそ勝つ！　勝てなかったらその次こそ勝つ！　やるぞーっ！！」"

[[dialogue]]
speaker = "unk"
# 俺もヴィーナスにボコボコにされた
line = "俺もヴィーナスにボコボコにされた"

[[dialogue]]
speaker = "アム"
# 「そういえばそうだったね。会長だって諦めなかったんだから、あたしも諦めてられない！」
line = "「そういえばそうだったね。会長だって諦めなかったんだから、あたしも諦めてられない！」"

[[dialogue]]
speaker = "アム"
# 「にひひ。あたしたち、似た者同士だったのかもね。ありがと、会長。おかげで色々吹っ切れた感じ」
line = "「にひひ。あたしたち、似た者同士だったのかもね。ありがと、会長。おかげで色々吹っ切れた感じ」"

[[dialogue]]
speaker = "unk"
# 俺は何もしてないよ
line = "俺は何もしてないよ"

[[dialogue]]
speaker = "アム"
# 「え～、そんなことないよ！　あたしのこと、走り回って探してくれたじゃん！」
line = "「え～、そんなことないよ！　あたしのこと、走り回って探してくれたじゃん！」"

[[dialogue]]
speaker = "アム"
# 「……その、嬉しかった。ありがとね会長」
line = "「……その、嬉しかった。ありがとね会長」"

[[dialogue]]
speaker = "アム"
# 「見てて。もうふてくされたりしない。あたし、これからどんどん強くなってみせる」
line = "「見てて。もうふてくされたりしない。あたし、これからどんどん強くなってみせる」"

[[dialogue]]
speaker = "アム"
# 「ヴィーナス前会長と同じくらい、会長にも認めて欲しいもん」
line = "「ヴィーナス前会長と同じくらい、会長にも認めて欲しいもん」"

[[dialogue]]
speaker = "アム"
# 「これ以上ないってくらい強くなったらー……にひ。会長の座、貰いに行くから！」
line = "「これ以上ないってくらい強くなったらー……にひ。会長の座、貰いに行くから！」"

[[dialogue]]
speaker = "アム"
# 「新星学園で待ってて！　その時まで負けちゃダメなんだからね！」
line = "「新星学園で待ってて！　その時まで負けちゃダメなんだからね！」"
