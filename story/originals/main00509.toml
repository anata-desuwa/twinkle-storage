[[dialogue]]
speaker = "unk"
# 第１２話,昏き太陽,B
line = "第１２話,昏き太陽,B"

[[dialogue]]
speaker = "unk"
# もう何度目かわからない剣と拳の応酬を終える。
line = "もう何度目かわからない剣と拳の応酬を終える。"

[[dialogue]]
speaker = "クロト"
# 「はああああああっっっ────！」
line = "「はああああああっっっ────！」"

[[dialogue]]
speaker = "unk"
# 正拳を繰り出すもかわされる。
line = "正拳を繰り出すもかわされる。"

[[dialogue]]
speaker = "unk"
# しかし、反撃はない。霞と闘っているような手応えだ。
line = "しかし、反撃はない。霞と闘っているような手応えだ。"

[[dialogue]]
speaker = "ギエル"
# 「フフフ──その拳はもう見切りましたよ。さあ、次の一手はなんですか？」
line = "「フフフ──その拳はもう見切りましたよ。さあ、次の一手はなんですか？」"

[[dialogue]]
speaker = "クロト"
# 「っ……！」
line = "「っ……！」"

[[dialogue]]
speaker = "unk"
# ギエルは先ほどから徹底した回避戦法を取っていた。
line = "ギエルは先ほどから徹底した回避戦法を取っていた。"

[[dialogue]]
speaker = "unk"
# こちらがダメージを負うこともないが、代わりに全くスキを晒さない戦闘スタイル。
line = "こちらがダメージを負うこともないが、代わりに全くスキを晒さない戦闘スタイル。"

[[dialogue]]
speaker = "unk"
# 露骨な時間稼ぎであり、こうしている間にもアポロが遠くでアステラとモンスターを撒いているだろう。
line = "露骨な時間稼ぎであり、こうしている間にもアポロが遠くでアステラとモンスターを撒いているだろう。"

[[dialogue]]
speaker = "unk"
# ヴィーナスたちも次々と湧き出る底なしのモンスターに手を焼いている。
line = "ヴィーナスたちも次々と湧き出る底なしのモンスターに手を焼いている。"

[[dialogue]]
speaker = "unk"
# 姑息な防衛戦線によって、事態は千日手の様相を呈していたが……
line = "姑息な防衛戦線によって、事態は千日手の様相を呈していたが……"

[[dialogue]]
speaker = "unk"
# しかし、そこへ。
line = "しかし、そこへ。"

[[dialogue]]
speaker = "フィオナ"
# 「邪魔です──」
line = "「邪魔です──」"

[[dialogue]]
speaker = "フィオナ"
# 「──」
line = "「──」"

[[dialogue]]
speaker = "ギエル"
# 「っ！　ぬぅ──っ！？」
line = "「っ！　ぬぅ──っ！？」"

[[dialogue]]
speaker = "クロト"
# 「っ……フィオナ！？」
line = "「っ……フィオナ！？」"

[[dialogue]]
speaker = "unk"
# 突如、俺たちの間に割って入った影と攻撃。
line = "突如、俺たちの間に割って入った影と攻撃。"

[[dialogue]]
speaker = "unk"
# 完全なる不意打ちとなったそれは、ギエルのフォームを大きく崩すことに成功していた。
line = "完全なる不意打ちとなったそれは、ギエルのフォームを大きく崩すことに成功していた。"

[[dialogue]]
speaker = "ギエル"
# 「っ……！？　なんです、あなたこそ男同士の語らいを邪魔するとは、無粋な──」
line = "「っ……！？　なんです、あなたこそ男同士の語らいを邪魔するとは、無粋な──」"

[[dialogue]]
speaker = "フィオナ"
# 「退いてください。あなたに用はありませんので」
line = "「退いてください。あなたに用はありませんので」"

[[dialogue]]
speaker = "ギエル"
# 「づっ──ぐぅぁっっ！？」
line = "「づっ──ぐぅぁっっ！？」"

[[dialogue]]
speaker = "クロト"
# 「っ──！？」
line = "「っ──！？」"

[[dialogue]]
speaker = "unk"
# 攻撃をまともに受けたギエルは浮遊に割く星力すら尽き、そのまま街中へ吸い込まれるように墜落していった。
line = "攻撃をまともに受けたギエルは浮遊に割く星力すら尽き、そのまま街中へ吸い込まれるように墜落していった。"

[[dialogue]]
speaker = "クロト"
# 「フィオ……ナ……？」
line = "「フィオ……ナ……？」"

[[dialogue]]
speaker = "unk"
# その威力。その出力。
line = "その威力。その出力。"

[[dialogue]]
speaker = "unk"
# 命の斟酌すら感じられない危険の領域で、手加減の余地を微塵も感じなかった。
line = "命の斟酌すら感じられない危険の領域で、手加減の余地を微塵も感じなかった。"

[[dialogue]]
speaker = "フィオナ"
# 「お訊ねします緋宮会長。仮面の少女はどこへ行きましたか」
line = "「お訊ねします緋宮会長。仮面の少女はどこへ行きましたか」"

[[dialogue]]
speaker = "クロト"
# 「あっちだけど……ってフィオナ！？　せめて一緒に──」
line = "「あっちだけど……ってフィオナ！？　せめて一緒に──」"

[[dialogue]]
speaker = "unk"
# 方角を聞くやいなや、独りでに疾駆していってしまうフィオナ。
line = "方角を聞くやいなや、独りでに疾駆していってしまうフィオナ。"

[[dialogue]]
speaker = "unk"
# 数ではこちらが優勢の状況を作れたにも関わらず、独断専行する理由なんて……
line = "数ではこちらが優勢の状況を作れたにも関わらず、独断専行する理由なんて……"

[[dialogue]]
speaker = "ソフィア"
# 「ようやくモンスターが収まりました……フィオナ会長は！？」
line = "「ようやくモンスターが収まりました……フィオナ会長は！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ど、どうしちゃったのフィオナ──追わなきゃ！」
line = "「ど、どうしちゃったのフィオナ──追わなきゃ！」"

[[dialogue]]
speaker = "クロト"
# 「ああ……！」
line = "「ああ……！」"

[[dialogue]]
speaker = "unk"
# 俺たちも状況をわからぬまま、アポロ──を追うフィオナ──を追う。
line = "俺たちも状況をわからぬまま、アポロ──を追うフィオナ──を追う。"

[[dialogue]]
speaker = "クロト"
# （そういえば──いつか、言ってたな──）
line = "（そういえば──いつか、言ってたな──）"

[[dialogue]]
speaker = "unk"
# 彼女の星力は太陽。
line = "彼女の星力は太陽。"

[[dialogue]]
speaker = "unk"
# ゆえにその全力は、熱しすぎるから使えないと。
line = "ゆえにその全力は、熱しすぎるから使えないと。"

[[dialogue]]
speaker = "unk"
# しかし今の彼女は、明らかにその領域に達していた。
line = "しかし今の彼女は、明らかにその領域に達していた。"

[[dialogue]]
speaker = "unk"
# 計り知れぬ想いが……彼女を突き動かしているようだった。
line = "計り知れぬ想いが……彼女を突き動かしているようだった。"

[[dialogue]]
speaker = "アポロ"
# 「わーっはっはっはっは！　ウム、さすがにこれだけ広げればアイツらの処理も追いつくまい！　愉快痛快だ」
line = "「わーっはっはっはっは！　ウム、さすがにこれだけ広げればアイツらの処理も追いつくまい！　愉快痛快だ」"

[[dialogue]]
speaker = "unk"
# 流星市国の全景を眼下に収めるアポロ。
line = "流星市国の全景を眼下に収めるアポロ。"

[[dialogue]]
speaker = "unk"
# 各地のアステラが破壊をもたらす様を<ruby=ちょうかん>鳥瞰</ruby>しながら、腕を組んで豪快に笑っていた。
line = "各地のアステラが破壊をもたらす様を<ruby>鳥瞰<rt>ちょうかん</rt></ruby>しながら、腕を組んで豪快に笑っていた。"

[[dialogue]]
speaker = "unk"
# そこへ──
line = "そこへ──"

[[dialogue]]
speaker = "アポロ"
# 「んっ──おぉっと。もう追いついたのか？」
line = "「んっ──おぉっと。もう追いついたのか？」"

[[dialogue]]
speaker = "unk"
# 挨拶代わりの一撃をいなして、アポロは笑いながら振り返る。
line = "挨拶代わりの一撃をいなして、アポロは笑いながら振り返る。"

[[dialogue]]
speaker = "unk"
# そこに浮かんでいたのはフィオナと──
line = "そこに浮かんでいたのはフィオナと──"

[[dialogue]]
speaker = "unk"
# その肩に必死でしがみつくニャリオンだった。
line = "その肩に必死でしがみつくニャリオンだった。"

[[dialogue]]
speaker = "アポロ"
# 「んっんー？　なんだ、魔王かと思ったら初めて見る顔だな！」
line = "「んっんー？　なんだ、魔王かと思ったら初めて見る顔だな！」"

[[dialogue]]
speaker = "フィオナ"
# 「ええ。始めまして、<b>アポロ</b>さん」
line = "「ええ。始めまして、<b>アポロ</b>さん」"

[[dialogue]]
speaker = "ニャリオン"
# 「フィ、フィオナ嬢……」
line = "「フィ、フィオナ嬢……」"

[[dialogue]]
speaker = "unk"
# 口調こそ落ち着いているものの、フィオナの眼光に余裕は微塵もない。
line = "口調こそ落ち着いているものの、フィオナの眼光に余裕は微塵もない。"

[[dialogue]]
speaker = "unk"
# そしてニャリオンもまた、彼女から感じる熱の理由をわかっていた。
line = "そしてニャリオンもまた、彼女から感じる熱の理由をわかっていた。"

[[dialogue]]
speaker = "アポロ"
# 「わっはっは、苦しゅうない！　このアポロ様が直々に相手をしてやろう」
line = "「わっはっは、苦しゅうない！　このアポロ様が直々に相手をしてやろう」"

[[dialogue]]
speaker = "フィオナ"
# 「光栄ですね。邪魔も入りません」
line = "「光栄ですね。邪魔も入りません」"

[[dialogue]]
speaker = "unk"
# 臨戦態勢へ移行するアポロ。
line = "臨戦態勢へ移行するアポロ。"

[[dialogue]]
speaker = "unk"
# アステラを数十足しても及ばないほどの瘴気が、彼女の大剣に集約されていく。
line = "アステラを数十足しても及ばないほどの瘴気が、彼女の大剣に集約されていく。"

[[dialogue]]
speaker = "unk"
# フィオナもまた、真っ向からその脅威に受けて立とうとし……
line = "フィオナもまた、真っ向からその脅威に受けて立とうとし……"

[[dialogue]]
speaker = "ニャリオン"
# 「ま……待つニャン、フィオナ嬢！　何か得体の知れない力を持っているかもしれないニャン、一人で戦うのは無茶ニャン！」
line = "「ま……待つニャン、フィオナ嬢！　何か得体の知れない力を持っているかもしれないニャン、一人で戦うのは無茶ニャン！」"

[[dialogue]]
speaker = "フィオナ"
# 「ありえません」
line = "「ありえません」"

[[dialogue]]
speaker = "フィオナ"
# 「<b>知らない</b>なんてことは」
line = "「<b>知らない</b>なんてことは」"

[[dialogue]]
speaker = "unk"
# 瞬間。
line = "瞬間。"

[[dialogue]]
speaker = "unk"
# その脅威に呼応するかのように、フィオナの星力もまた爆発を遂げた。
line = "その脅威に呼応するかのように、フィオナの星力もまた爆発を遂げた。"

[[dialogue]]
speaker = "アポロ"
# 「へえ……こりゃ……！」
line = "「へえ……こりゃ……！」"

[[dialogue]]
speaker = "unk"
# アポロを挟むようにして召喚の魔法陣が展開される。
line = "アポロを挟むようにして召喚の魔法陣が展開される。"

[[dialogue]]
speaker = "アポロ"
# 「なーるほどっ！　直接ケンカ売ってくるだけあってそれなりの──んおぉっ！？」
line = "「なーるほどっ！　直接ケンカ売ってくるだけあってそれなりの──んおぉっ！？」"

[[dialogue]]
speaker = "unk"
# アポロの言葉を待つまでもなく。
line = "アポロの言葉を待つまでもなく。"

[[dialogue]]
speaker = "unk"
# 神速の踏み込みをもって、フィオナ本体による追撃が彼女を襲った。
line = "神速の踏み込みをもって、フィオナ本体による追撃が彼女を襲った。"

[[dialogue]]
speaker = "アポロ"
# 「オ、オマエ──ヒーローのセリフ中は攻撃しないのが礼儀──」
line = "「オ、オマエ──ヒーローのセリフ中は攻撃しないのが礼儀──」"

[[dialogue]]
speaker = "フィオナ"
# 「だったら、なんです？」
line = "「だったら、なんです？」"

[[dialogue]]
speaker = "unk"
# 燃え、滾り、熱し立ち昇る太陽の星力。
line = "燃え、滾り、熱し立ち昇る太陽の星力。"

[[dialogue]]
speaker = "unk"
# どんなピンチに陥った時も、アルモタヘルの奇襲をいなした際も……
line = "どんなピンチに陥った時も、アルモタヘルの奇襲をいなした際も……"

[[dialogue]]
speaker = "unk"
# いつだとて冷静さを欠かさなかった彼女。
line = "いつだとて冷静さを欠かさなかった彼女。"

[[dialogue]]
speaker = "unk"
# しかし今、その瞳にあったものは……激情。
line = "しかし今、その瞳にあったものは……激情。"

[[dialogue]]
speaker = "unk"
# 彼女を包み込む闇のオーラが、その心を表すかのように<ruby=かくやく>赫灼</ruby>と猛っていた。
line = "彼女を包み込む闇のオーラが、その心を表すかのように<ruby>赫灼<rt>かくやく</rt></ruby>と猛っていた。"

[[dialogue]]
speaker = "アポロ"
# 「づっ──ちいっ──<b>興</b>を知らないヤツめ！　このアポロ様が成敗してくれる！」
line = "「づっ──ちいっ──<b>興</b>を知らないヤツめ！　このアポロ様が成敗してくれる！」"

[[dialogue]]
speaker = "フィオナ"
# 「どうぞ、やれるものなら」
line = "「どうぞ、やれるものなら」"

[[dialogue]]
speaker = "unk"
# 息もつかせぬ怒涛の攻めがアポロを追い詰める。
line = "息もつかせぬ怒涛の攻めがアポロを追い詰める。"

[[dialogue]]
speaker = "ニャリオン"
# 「や──やりすぎニャン、フィオナ嬢！　こんなに星力を消耗したらスッカラカンで……しばらく戦えなくなってしまうニャンよ！」
line = "「や──やりすぎニャン、フィオナ嬢！　こんなに星力を消耗したらスッカラカンで……しばらく戦えなくなってしまうニャンよ！」"

[[dialogue]]
speaker = "フィオナ"
# 「構いません。ニャリオン、リミッターを外してくれる？」
line = "「構いません。ニャリオン、リミッターを外してくれる？」"

[[dialogue]]
speaker = "ニャリオン"
# 「ニャ、ニャぁ……も、もうどうとでもなれニャン！」
line = "「ニャ、ニャぁ……も、もうどうとでもなれニャン！」"

[[dialogue]]
speaker = "unk"
# ニャリオンの存在までがフィオナの中へ還っていき、最後の一線までもを解放する。
line = "ニャリオンの存在までがフィオナの中へ還っていき、最後の一線までもを解放する。"

[[dialogue]]
speaker = "unk"
# すると彼女の星力はさらに限度を越えて膨れ上がり、そのまま連続に継ぐ連続の詠唱へと移行した。
line = "すると彼女の星力はさらに限度を越えて膨れ上がり、そのまま連続に継ぐ連続の詠唱へと移行した。"

[[dialogue]]
speaker = "フィオナ"
# 「なぜ──」
line = "「なぜ──」"

[[dialogue]]
speaker = "アポロ"
# 「ん──！？」
line = "「ん──！？」"

[[dialogue]]
speaker = "フィオナ"
# 「なぜあなたは、その仮面を被るのですか？」
line = "「なぜあなたは、その仮面を被るのですか？」"

[[dialogue]]
speaker = "unk"
# 射出された闇の剣を、アポロの大剣が叩き割って潰した。
line = "射出された闇の剣を、アポロの大剣が叩き割って潰した。"

[[dialogue]]
speaker = "unk"
# 激化の一途を辿る戦闘とは正反対に、フィオナの口調は重く静かに沈んでいく。
line = "激化の一途を辿る戦闘とは正反対に、フィオナの口調は重く静かに沈んでいく。"

[[dialogue]]
speaker = "アポロ"
# 「さあ、な……！　でも──ヒーローっつったら仮面を着けるもんだ、それで十分だろ！？」
line = "「さあ、な……！　でも──ヒーローっつったら仮面を着けるもんだ、それで十分だろ！？」"

[[dialogue]]
speaker = "unk"
# 流星ライダーアポロ。
line = "流星ライダーアポロ。"

[[dialogue]]
speaker = "unk"
# かつて流れていたその番組を模して、彼女は<b>そういう存在</b>と相成った。
line = "かつて流れていたその番組を模して、彼女は<b>そういう存在</b>と相成った。"

[[dialogue]]
speaker = "unk"
# その由縁は、クロト達からも聞かされているものだったが……
line = "その由縁は、クロト達からも聞かされているものだったが……"

[[dialogue]]
speaker = "フィオナ"
# 「十分ではありません。知らないのなら、教えてあげます──私が」
line = "「十分ではありません。知らないのなら、教えてあげます──私が」"

[[dialogue]]
speaker = "unk"
# 鮮烈なる光芒がアポロへと降り注ぐ。
line = "鮮烈なる光芒がアポロへと降り注ぐ。"

[[dialogue]]
speaker = "unk"
# 大剣を振ろうとモンスターを生もうと、その全てが聖なる光に包まれては消されていった。
line = "大剣を振ろうとモンスターを生もうと、その全てが聖なる光に包まれては消されていった。"

[[dialogue]]
speaker = "フィオナ"
# 「先ほど──塔の内部で『月の壁画』を見ました。覚えがあるはずです、あなたも」
line = "「先ほど──塔の内部で『月の壁画』を見ました。覚えがあるはずです、あなたも」"

[[dialogue]]
speaker = "アポロ"
# 「へ、壁画だ……？　あたしはそんなの知らないぞ！」
line = "「へ、壁画だ……？　あたしはそんなの知らないぞ！」"

[[dialogue]]
speaker = "unk"
# 終わりなきフィオナの召喚と連撃。
line = "終わりなきフィオナの召喚と連撃。"

[[dialogue]]
speaker = "unk"
# モンスターの対処に手間取っていたクロトたちさながら、アポロは無限に等しい召喚獣たちを相手にしなければならなかった。
line = "モンスターの対処に手間取っていたクロトたちさながら、アポロは無限に等しい召喚獣たちを相手にしなければならなかった。"

[[dialogue]]
speaker = "unk"
# そしてついに、彼女の防戦も限界に達する。
line = "そしてついに、彼女の防戦も限界に達する。"

[[dialogue]]
speaker = "アポロ"
# 「いい加減にしろ、いつまでも粘着してきやがって！　うざいんだよ！」
line = "「いい加減にしろ、いつまでも粘着してきやがって！　うざいんだよ！」"

[[dialogue]]
speaker = "アポロ"
# 「流星…………ストーーーーーム！！！」
line = "「流星…………ストーーーーーム！！！」"

[[dialogue]]
speaker = "フィオナ"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "unk"
# 天へ掲げた大剣の切っ先へ流星の力が集い──拡散する。
line = "天へ掲げた大剣の切っ先へ流星の力が集い──拡散する。"

[[dialogue]]
speaker = "unk"
# “星読事変”の際、ヴィーナスの日誌を書き換え、世界のリクリエ侵攻を加速させた混沌の旋風が巻き起こる。
line = "“星読事変”の際、ヴィーナスの日誌を書き換え、世界のリクリエ侵攻を加速させた混沌の旋風が巻き起こる。"

[[dialogue]]
speaker = "アポロ"
# 「ふっふ──もう手加減してやらないからな！　オマエみたいなしつこいヤツはこの場で星にしてやる！」
line = "「ふっふ──もう手加減してやらないからな！　オマエみたいなしつこいヤツはこの場で星にしてやる！」"

[[dialogue]]
speaker = "unk"
# さらに今度の嵐は指向性を持たされていた。
line = "さらに今度の嵐は指向性を持たされていた。"

[[dialogue]]
speaker = "unk"
# 命尽きた星々のきらめきが、フィオナただ一人を目がけて襲う──！
line = "命尽きた星々のきらめきが、フィオナただ一人を目がけて襲う──！"

[[dialogue]]
speaker = "unk"
# ──が。
line = "──が。"

[[dialogue]]
speaker = "フィオナ"
# 「燃えろ……」
line = "「燃えろ……」"

[[dialogue]]
speaker = "アポロ"
# 「ぇ──ん、なっ…………！？」
line = "「ぇ──ん、なっ…………！？」"

[[dialogue]]
speaker = "unk"
# 彼女の守護星は太陽。
line = "彼女の守護星は太陽。"

[[dialogue]]
speaker = "unk"
# その力を象徴するかのごとく、フィオナの頭上には太陽──を模した闇の大球体が召喚された。
line = "その力を象徴するかのごとく、フィオナの頭上には太陽──を模した闇の大球体が召喚された。"

[[dialogue]]
speaker = "unk"
# 星力が燃え盛るプロミネンスのように溢れ出し、触れたそばから襲いくる流星たちを浄化してゆく。
line = "星力が燃え盛るプロミネンスのように溢れ出し、触れたそばから襲いくる流星たちを浄化してゆく。"

[[dialogue]]
speaker = "unk"
# それはあたかも、死した星々が天に召されていくかのように。
line = "それはあたかも、死した星々が天に召されていくかのように。"

[[dialogue]]
speaker = "アポロ"
# 「な……なんで、だ……」
line = "「な……なんで、だ……」"

[[dialogue]]
speaker = "フィオナ"
# 「今からその仮面を剥ぎます。眩しいので注意してください」
line = "「今からその仮面を剥ぎます。眩しいので注意してください」"
