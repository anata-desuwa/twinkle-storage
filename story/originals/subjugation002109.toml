[[dialogue]]
speaker = "unk"
# アステラで戦ったコラプサーたち、そしてエンジュとメテオラは、気を失っているうちに拘束され、ネビュラ基地に護送された。
line = "アステラで戦ったコラプサーたち、そしてエンジュとメテオラは、気を失っているうちに拘束され、ネビュラ基地に護送された。"

[[dialogue]]
speaker = "unk"
# 星力を吸収するコラプサーだが、魔力を扱う魔女ならば対処も可能だ。
line = "星力を吸収するコラプサーだが、魔力を扱う魔女ならば対処も可能だ。"

[[dialogue]]
speaker = "unk"
# クラウディアやセドナという強大な戦力を擁しておることもあり、当面はネビュラ基地で身柄を預かることとなった。
line = "クラウディアやセドナという強大な戦力を擁しておることもあり、当面はネビュラ基地で身柄を預かることとなった。"

[[dialogue]]
speaker = "unk"
# だがコラプサーたちの暗躍はこれで終わりではない。
line = "だがコラプサーたちの暗躍はこれで終わりではない。"

[[dialogue]]
speaker = "？？？"
# 「──作戦は失敗のようね。惜しいところまで行ったのだけど、残念だわ」
line = "「──作戦は失敗のようね。惜しいところまで行ったのだけど、残念だわ」"

[[dialogue]]
speaker = "？？？"
# 「だけど問題ないわ。計画は必ず成就する」
line = "「だけど問題ないわ。計画は必ず成就する」"

[[dialogue]]
speaker = "？？？"
# 「最後のコラプサーであるあなたがいれば大丈夫よ、レイラ」
line = "「最後のコラプサーであるあなたがいれば大丈夫よ、レイラ」"

[[dialogue]]
speaker = "？？？"
# 「世界を救うのは私たちコラプサー──そうでしょう？」
line = "「世界を救うのは私たちコラプサー──そうでしょう？」"
