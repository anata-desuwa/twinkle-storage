[[dialogue]]
speaker = "unk"
# 第１話,寮生たちと買い出しに,P
line = "第１話,寮生たちと買い出しに,P"

[[dialogue]]
speaker = "unk"
# それは、マムと恋人関係になってから、しばらく経ったある日のこと。
line = "それは、マムと恋人関係になってから、しばらく経ったある日のこと。"

[[dialogue]]
speaker = "unk"
# 新星寮で月に１回開催されているという『おやつ交流会』の買い出しに、俺も付き添っていたのだが――
line = "新星寮で月に１回開催されているという『おやつ交流会』の買い出しに、俺も付き添っていたのだが――"

[[dialogue]]
speaker = "クーシェン"
# 「ねぇねぇ、ミウ、ヒマワリ！　このお菓子とかどうかな？　ヘンテコな味で盛り上がりそうじゃない？　ウキウキ♪」
line = "「ねぇねぇ、ミウ、ヒマワリ！　このお菓子とかどうかな？　ヘンテコな味で盛り上がりそうじゃない？　ウキウキ♪」"

[[dialogue]]
speaker = "ミウ"
# 「クーシェンちゃん、し～。というか、その桃饅、どこで見つけて来たんですか？」
line = "「クーシェンちゃん、し～。というか、その桃饅、どこで見つけて来たんですか？」"

[[dialogue]]
speaker = "ヒマワリ"
# 「とりあえず、マムにバレないように上手くやらないと……」
line = "「とりあえず、マムにバレないように上手くやらないと……」"

[[dialogue]]
speaker = "マハムート"
# 「そこの附属２年生組……あなた達、この私に隠れてこそこそと悪戯の相談とは、いい度胸ね」
line = "「そこの附属２年生組……あなた達、この私に隠れてこそこそと悪戯の相談とは、いい度胸ね」"

[[dialogue]]
speaker = "ミウ"
# 「ひぇっ、マム！？」
line = "「ひぇっ、マム！？」"

[[dialogue]]
speaker = "ヒマワリ"
# 「こ、これはその～」
line = "「こ、これはその～」"

[[dialogue]]
speaker = "クーシェン"
# 「いつの間に！？　このボクが、声を掛けられるまで全然気づかないなんて……！」
line = "「いつの間に！？　このボクが、声を掛けられるまで全然気づかないなんて……！」"

[[dialogue]]
speaker = "マハムート"
# 「竜たるこの私が、気配を消して背後を取る程度のことができないとでも？」
line = "「竜たるこの私が、気配を消して背後を取る程度のことができないとでも？」"

[[dialogue]]
speaker = "マハムート"
# 「全く……畏怖が足りてないようね」
line = "「全く……畏怖が足りてないようね」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「おうおう、新人共！　マムの前で勝手なことをするんじゃないゆ！」
line = "「おうおう、新人共！　マムの前で勝手なことをするんじゃないゆ！」"

[[dialogue]]
speaker = "クーシェン"
# 「ジャクリーヌ！？　どうしちゃったの？　今日は何か、いつもと違くない？」
line = "「ジャクリーヌ！？　どうしちゃったの？　今日は何か、いつもと違くない？」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「それは<ruby=ゆ>余</ruby>が新星寮ではナンバー２で、マムの配下だからなの！」
line = "「それは<ruby>余<rt>ゆ</rt></ruby>が新星寮ではナンバー２で、マムの配下だからなの！」"

[[dialogue]]
speaker = "マハムート"
# 「あなた、誰の許可を得てナンバー２を名乗っているのかしら？」
line = "「あなた、誰の許可を得てナンバー２を名乗っているのかしら？」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「それは早い者勝ちだからですゆ！　誰も名乗らないから、余がマムに次ぐナンバー２を名乗ることにしたんですゆ！」
line = "「それは早い者勝ちだからですゆ！　誰も名乗らないから、余がマムに次ぐナンバー２を名乗ることにしたんですゆ！」"

[[dialogue]]
speaker = "ミウ"
# 「あのジャクリーヌ先輩が敬語を……！？」
line = "「あのジャクリーヌ先輩が敬語を……！？」"

[[dialogue]]
speaker = "ヒマワリ"
# 「なんか三下感がすごい！！」
line = "「なんか三下感がすごい！！」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「誰が三下ゆ！　とにかく、マムに許可なく悪戯することは許されないの！」
line = "「誰が三下ゆ！　とにかく、マムに許可なく悪戯することは許されないの！」"

[[dialogue]]
speaker = "クーシェン"
# 「バレちゃったなら仕方ないか……。だったら、ここは……マム！　ボクと勝負してよ！」
line = "「バレちゃったなら仕方ないか……。だったら、ここは……マム！　ボクと勝負してよ！」"

[[dialogue]]
speaker = "マハムート"
# 「勝負ですって……？」
line = "「勝負ですって……？」"

[[dialogue]]
speaker = "クーシェン"
# 「うん！　ボク、前から１度、マムと戦ってみたかったんだよね♪」
line = "「うん！　ボク、前から１度、マムと戦ってみたかったんだよね♪」"

[[dialogue]]
speaker = "クーシェン"
# 「それで、バトルしてボクが勝ったら、今回のおやつ交流会はヘンテコな味のお菓子の食べ比べ会をする！　どう？」
line = "「それで、バトルしてボクが勝ったら、今回のおやつ交流会はヘンテコな味のお菓子の食べ比べ会をする！　どう？」"

[[dialogue]]
speaker = "マハムート"
# 「……あなたの言うバトルは、星力を使っての実力勝負という意味かしら？」
line = "「……あなたの言うバトルは、星力を使っての実力勝負という意味かしら？」"

[[dialogue]]
speaker = "クーシェン"
# 「そう！　戦う場所は空の上でいいよ！　それなら街に被害が出ないし、相手に参ったって言わせたら勝ちってことで――」
line = "「そう！　戦う場所は空の上でいいよ！　それなら街に被害が出ないし、相手に参ったって言わせたら勝ちってことで――」"

[[dialogue]]
speaker = "マハムート"
# 「クーシェン、あなた……」
line = "「クーシェン、あなた……」"

[[dialogue]]
speaker = "マハムート"
# 「この私と軽く喧嘩しようみたいなノリ、頭が高いわよ？」
line = "「この私と軽く喧嘩しようみたいなノリ、頭が高いわよ？」"

[[dialogue]]
speaker = "クーシェン"
# 「えっ――痛だだだだっ！？」
line = "「えっ――痛だだだだっ！？」"

[[dialogue]]
speaker = "マハムート"
# 「あなた、西遊記の孫悟空と同じ斉天大聖を名乗っているんだったわね？　だったら、覚えておきなさい」
line = "「あなた、西遊記の孫悟空と同じ斉天大聖を名乗っているんだったわね？　だったら、覚えておきなさい」"

[[dialogue]]
speaker = "マハムート"
# 「私は孫悟空の師匠である三蔵法師と同じように、こうやって手を使わずとも、あなたの頭に付けている金の輪っかを締め付けることができる。引力操作でね」
line = "「私は孫悟空の師匠である三蔵法師と同じように、こうやって手を使わずとも、あなたの頭に付けている金の輪っかを締め付けることができる。引力操作でね」"

[[dialogue]]
speaker = "クーシェン"
# 「こ、これ、アニメでも見た孫悟空がお仕置きされるやつ……！　あっ――痛だだだだっ！？」
line = "「こ、これ、アニメでも見た孫悟空がお仕置きされるやつ……！　あっ――痛だだだだっ！？」"

[[dialogue]]
speaker = "マハムート"
# 「で？　なんだったかしら？　私にバトルで勝ったら、ヘンテコなお菓子の食べ比べ会をしたいって？」
line = "「で？　なんだったかしら？　私にバトルで勝ったら、ヘンテコなお菓子の食べ比べ会をしたいって？」"

[[dialogue]]
speaker = "クーシェン"
# 「ご、ごめんなさいぃ！　やっぱ無しでいいですっ！　降参！！　ボクの負けですぅ～～～！！！」
line = "「ご、ごめんなさいぃ！　やっぱ無しでいいですっ！　降参！！　ボクの負けですぅ～～～！！！」"

[[dialogue]]
speaker = "マハムート"
# 「よろしい」
line = "「よろしい」"

[[dialogue]]
speaker = "クーシェン"
# 「ふにゃあ～……」
line = "「ふにゃあ～……」"

[[dialogue]]
speaker = "unk"
# マハムートは引力操作を解放したようで、クーシェンが脱力してその場にへたり込む。
line = "マハムートは引力操作を解放したようで、クーシェンが脱力してその場にへたり込む。"

[[dialogue]]
speaker = "マハムート"
# 「次はあなた達よ、ミウ、ヒマワリ」
line = "「次はあなた達よ、ミウ、ヒマワリ」"

[[dialogue]]
speaker = "ミウ"
# 「わ、私たちもですか！？　とんでもないです！」
line = "「わ、私たちもですか！？　とんでもないです！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「ちゃんとマムの言うことに従います！」
line = "「ちゃんとマムの言うことに従います！」"

[[dialogue]]
speaker = "マハムート"
# 「お利巧だこと。でもあなた達、<b>舐めている</b>わね」
line = "「お利巧だこと。でもあなた達、<b>舐めている</b>わね」"

[[dialogue]]
speaker = "ミウ"
# 「えっ！？」
line = "「えっ！？」"

[[dialogue]]
speaker = "ヒマワリ"
# 「そ、そんなことは……」
line = "「そ、そんなことは……」"

[[dialogue]]
speaker = "マハムート"
# 「私はビジネスには詳しくないけれど、権力争いには慣れているから言っておくわ」
line = "「私はビジネスには詳しくないけれど、権力争いには慣れているから言っておくわ」"

[[dialogue]]
speaker = "マハムート"
# 「頭のいい子は好きだけど、他人を値踏みするようなその目は気に入らないわ」
line = "「頭のいい子は好きだけど、他人を値踏みするようなその目は気に入らないわ」"

[[dialogue]]
speaker = "マハムート"
# 「今後は改めなさい。相手に誠意が伝わらないわよ」
line = "「今後は改めなさい。相手に誠意が伝わらないわよ」"

[[dialogue]]
speaker = "ミウ"
# 「っ……！　は、はい……」
line = "「っ……！　は、はい……」"

[[dialogue]]
speaker = "ヒマワリ"
# 「すみませんでした！　肝に命じます……！」
line = "「すみませんでした！　肝に命じます……！」"

[[dialogue]]
speaker = "クーシェン"
# 「う～、ヘンテコな味のお菓子が山ほどあれば、みんなと話が弾んで仲良くなれると思ったんだけどな～」
line = "「う～、ヘンテコな味のお菓子が山ほどあれば、みんなと話が弾んで仲良くなれると思ったんだけどな～」"

[[dialogue]]
speaker = "unk"
# マムに叱られて、シュンとなってしまう３人。
line = "マムに叱られて、シュンとなってしまう３人。"

[[dialogue]]
speaker = "マハムート"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "マハムート"
# 「やれやれ……仕方ないわね」
line = "「やれやれ……仕方ないわね」"

[[dialogue]]
speaker = "マハムート"
# 「１人１つずつなら、好きな物を買っていいわよ」
line = "「１人１つずつなら、好きな物を買っていいわよ」"

[[dialogue]]
speaker = "クーシェン"
# 「え……？」
line = "「え……？」"

[[dialogue]]
speaker = "マハムート"
# 「買い出しを手伝ってもらっているわけだし、そのお駄賃としてね」
line = "「買い出しを手伝ってもらっているわけだし、そのお駄賃としてね」"

[[dialogue]]
speaker = "マハムート"
# 「ただし、買った物はヘンテコな味でも責任を持って食べ切ること。他はちゃんとみんなが喜びそうなお菓子を選ぶこと。その２つが条件よ。いいわね？」
line = "「ただし、買った物はヘンテコな味でも責任を持って食べ切ること。他はちゃんとみんなが喜びそうなお菓子を選ぶこと。その２つが条件よ。いいわね？」"

[[dialogue]]
speaker = "ミウ"
# 「マム……！」
line = "「マム……！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「厳しいけど優しい……！」
line = "「厳しいけど優しい……！」"

[[dialogue]]
speaker = "マハムート"
# 「その代わり、やるならちゃんとおやつ交流会を盛り上げてみせなさい」
line = "「その代わり、やるならちゃんとおやつ交流会を盛り上げてみせなさい」"

[[dialogue]]
speaker = "クーシェン"
# 「やった！　わ～い♪」
line = "「やった！　わ～い♪」"

[[dialogue]]
speaker = "クーシェン"
# 「マム！　ボク、マムがみんなから慕われている理由がなんだかわかった気がするよ！」
line = "「マム！　ボク、マムがみんなから慕われている理由がなんだかわかった気がするよ！」"

[[dialogue]]
speaker = "マハムート"
# 「やれやれ、大げさね……」
line = "「やれやれ、大げさね……」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆーっゆっゆっゆ♪　さすがマムですゆ！　飴をくれるのなら、ジャクリーヌはどこまでも付いて行きますゆ♪」
line = "「ゆーっゆっゆっゆ♪　さすがマムですゆ！　飴をくれるのなら、ジャクリーヌはどこまでも付いて行きますゆ♪」"

[[dialogue]]
speaker = "マハムート"
# 「ジャクリーヌ、あなたは勝手にナンバー２を名乗った件で、後でお仕置きよ」
line = "「ジャクリーヌ、あなたは勝手にナンバー２を名乗った件で、後でお仕置きよ」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「何故ですゆ！？」
line = "「何故ですゆ！？」"

[[dialogue]]
speaker = "unk"
# （俺にもあんな時代があったなぁ……）
line = "（俺にもあんな時代があったなぁ……）"

[[dialogue]]
speaker = "マハムート"
# 「さて、寮生たちへの指導が終わったところで――」
line = "「さて、寮生たちへの指導が終わったところで――」"

[[dialogue]]
speaker = "マハムート"
# 「いつからかずっと後方腕組みで『俺にもあんな時代があった』みたいな顔してうんうんと頷いているそこの会長。言っておくけど、貴方も他人事じゃないわよ？」
line = "「いつからかずっと後方腕組みで『俺にもあんな時代があった』みたいな顔してうんうんと頷いているそこの会長。言っておくけど、貴方も他人事じゃないわよ？」"

[[dialogue]]
speaker = "unk"
# 心が読まれている！？
line = "心が読まれている！？"

[[dialogue]]
speaker = "マハムート"
# 「会長としてまだまだ後輩への躾が出来てなかったわけだし、そこのところわかっているわよね？」
line = "「会長としてまだまだ後輩への躾が出来てなかったわけだし、そこのところわかっているわよね？」"

[[dialogue]]
speaker = "マハムート"
# 「後でお仕置きよ」
line = "「後でお仕置きよ」"

[[dialogue]]
speaker = "unk"
# 鉄球以外でお願いします！
line = "鉄球以外でお願いします！"

[[dialogue]]
speaker = "マハムート"
# 「ふふっ、さてどうしようかしら」
line = "「ふふっ、さてどうしようかしら」"

[[dialogue]]
speaker = "マハムート"
# 「買い物の荷物持ちを頑張ったら、減刑も考えてあげなくもないわよ？」
line = "「買い物の荷物持ちを頑張ったら、減刑も考えてあげなくもないわよ？」"

[[dialogue]]
speaker = "unk"
# 喜んで！
line = "喜んで！"

[[dialogue]]
speaker = "unk"
# その後、全力で荷物持ちをやらせて頂く俺なのであった――
line = "その後、全力で荷物持ちをやらせて頂く俺なのであった――"
