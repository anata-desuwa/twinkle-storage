[[dialogue]]
speaker = "unk"
# 第４話,君に惹かれて,P
line = "第４話,君に惹かれて,P"

[[dialogue]]
speaker = "シルヴィ"
# 「おはよっ、会長くん！　今日もいい天気だねっ！」
line = "「おはよっ、会長くん！　今日もいい天気だねっ！」"

[[dialogue]]
speaker = "unk"
# おはようございます
line = "おはようございます"

[[dialogue]]
speaker = "unk"
# シルヴィ先輩はいつも元気だ。元気でないところを見たことがない。
line = "シルヴィ先輩はいつも元気だ。元気でないところを見たことがない。"

[[dialogue]]
speaker = "シルヴィ"
# 「ん？　何かいいたそう」
line = "「ん？　何かいいたそう」"

[[dialogue]]
speaker = "unk"
# 今日の放課後、時間ありますか？
line = "今日の放課後、時間ありますか？"

[[dialogue]]
speaker = "シルヴィ"
# 「放課後？　いいよ！」
line = "「放課後？　いいよ！」"

[[dialogue]]
speaker = "unk"
# 俺とデートしましょう
line = "俺とデートしましょう"

[[dialogue]]
speaker = "シルヴィ"
# 「うん、デートだね！　もちろんオッケー──」
line = "「うん、デートだね！　もちろんオッケー──」"

[[dialogue]]
speaker = "シルヴィ"
# 「って、デート！？　いや、えっと、でも、いいよって言っちゃったし……」
line = "「って、デート！？　いや、えっと、でも、いいよって言っちゃったし……」"

[[dialogue]]
speaker = "シルヴィ"
# 「女に二言はない！　よし、分かった！　デートしよう！」
line = "「女に二言はない！　よし、分かった！　デートしよう！」"

[[dialogue]]
speaker = "シルヴィ"
# 「お待たせ。待った？　……今来たとこ？　そ、そっか」
line = "「お待たせ。待った？　……今来たとこ？　そ、そっか」"

[[dialogue]]
speaker = "シルヴィ"
# 「何か用事があるんだよね？　女の子と一緒じゃないと頼めないメニューがあるとか、星徒会の誰かにプレゼントを買うとか……」
line = "「何か用事があるんだよね？　女の子と一緒じゃないと頼めないメニューがあるとか、星徒会の誰かにプレゼントを買うとか……」"

[[dialogue]]
speaker = "シルヴィ"
# 「……そういうのじゃない？　ふ、ふ～ん……」
line = "「……そういうのじゃない？　ふ、ふ～ん……」"

[[dialogue]]
speaker = "シルヴィ"
# 「えっと、じゃあ、どこか行く？　チキンは……え、ダメ？」
line = "「えっと、じゃあ、どこか行く？　チキンは……え、ダメ？」"

[[dialogue]]
speaker = "unk"
# それから俺たちは繁華街に向かって──
line = "それから俺たちは繁華街に向かって──"

[[dialogue]]
speaker = "シルヴィ"
# 「これが１６色ケーキか～。えへへ、前に話したの覚えててくれたんだ」
line = "「これが１６色ケーキか～。えへへ、前に話したの覚えててくれたんだ」"

[[dialogue]]
speaker = "シルヴィ"
# 「どれどれ、味は……ん～？　美味しい、気はする……」
line = "「どれどれ、味は……ん～？　美味しい、気はする……」"

[[dialogue]]
speaker = "シルヴィ"
# 「スポンジもクリームも色で味が違って……甘い、酸っぱい、苦い、また甘い？」
line = "「スポンジもクリームも色で味が違って……甘い、酸っぱい、苦い、また甘い？」"

[[dialogue]]
speaker = "シルヴィ"
# 「分かんない。美味しいってなんだったっけ……」
line = "「分かんない。美味しいってなんだったっけ……」"

[[dialogue]]
speaker = "unk"
# 気を取り直して、気になっていた別のお店へ。
line = "気を取り直して、気になっていた別のお店へ。"

[[dialogue]]
speaker = "シルヴィ"
# 「次はから揚げドーナツだよ！　一度揚げたドーナツに衣をつけて、また揚げてるんだって！」
line = "「次はから揚げドーナツだよ！　一度揚げたドーナツに衣をつけて、また揚げてるんだって！」"

[[dialogue]]
speaker = "シルヴィ"
# 「絶対カロリーえげつないよこれ！　でも味には期待できそう。ハイカロリー・イズ・デリシャスだからね！」
line = "「絶対カロリーえげつないよこれ！　でも味には期待できそう。ハイカロリー・イズ・デリシャスだからね！」"

[[dialogue]]
speaker = "シルヴィ"
# 「あ～……んっ」
line = "「あ～……んっ」"

[[dialogue]]
speaker = "シルヴィ"
# 「外はサクサク、中はしっとり！　そしてめっちゃ甘い！　美味しいよコレ！」
line = "「外はサクサク、中はしっとり！　そしてめっちゃ甘い！　美味しいよコレ！」"

[[dialogue]]
speaker = "シルヴィ"
# 「会長くん、半分残ってるけど食べないの？　食べないならもらっちゃうけど」
line = "「会長くん、半分残ってるけど食べないの？　食べないならもらっちゃうけど」"

[[dialogue]]
speaker = "シルヴィ"
# 「……ケーキの後で苦しい？　じゃあ会長くんのも食べちゃうよ？」
line = "「……ケーキの後で苦しい？　じゃあ会長くんのも食べちゃうよ？」"

[[dialogue]]
speaker = "シルヴィ"
# 「いいの？　ありがとっ！　んー、美味しー！」
line = "「いいの？　ありがとっ！　んー、美味しー！」"

[[dialogue]]
speaker = "unk"
# それから俺もから揚げドーナツにチャレンジしてみたのだが──
line = "それから俺もから揚げドーナツにチャレンジしてみたのだが──"

[[dialogue]]
speaker = "unk"
# く、くるしい……
line = "く、くるしい……"

[[dialogue]]
speaker = "シルヴィ"
# 「会長くん、大丈夫？　もしかして甘いもの苦手だった？　無理させちゃってごめんね」
line = "「会長くん、大丈夫？　もしかして甘いもの苦手だった？　無理させちゃってごめんね」"

[[dialogue]]
speaker = "シルヴィ"
# 「グレープフルーツジュース飲む？　口がスッキリするよ」
line = "「グレープフルーツジュース飲む？　口がスッキリするよ」"

[[dialogue]]
speaker = "シルヴィ"
# 「……落ち着いてきた？　ならよかった」
line = "「……落ち着いてきた？　ならよかった」"

[[dialogue]]
speaker = "シルヴィ"
# 「じゃあそろそろ……聞いてもいいかな？」
line = "「じゃあそろそろ……聞いてもいいかな？」"

[[dialogue]]
speaker = "シルヴィ"
# 「デートに誘うってことは、会長くんはあたしのこと……その……」
line = "「デートに誘うってことは、会長くんはあたしのこと……その……」"

[[dialogue]]
speaker = "unk"
# 好きです
line = "好きです"

[[dialogue]]
speaker = "シルヴィ"
# 「言い切った！？　めっちゃストレートに言うね！？」
line = "「言い切った！？　めっちゃストレートに言うね！？」"

[[dialogue]]
speaker = "シルヴィ"
# 「でもその……うん。あたしもね、君のこと、いいなって思ってる。惹かれてるんだと思う」
line = "「でもその……うん。あたしもね、君のこと、いいなって思ってる。惹かれてるんだと思う」"

[[dialogue]]
speaker = "シルヴィ"
# 「あたしのこと、守りたいって言ってくれたのも、本当はすごく嬉しかった」
line = "「あたしのこと、守りたいって言ってくれたのも、本当はすごく嬉しかった」"

[[dialogue]]
speaker = "シルヴィ"
# 「でもね、君があたしのこと守りたいって思うのと同じくらい、あたしも君を守りたい」
line = "「でもね、君があたしのこと守りたいって思うのと同じくらい、あたしも君を守りたい」"

[[dialogue]]
speaker = "シルヴィ"
# 「会長くんの方がずっと強いけど、それでも、この気持ちは本当なんだ」
line = "「会長くんの方がずっと強いけど、それでも、この気持ちは本当なんだ」"

[[dialogue]]
speaker = "シルヴィ"
# 「あたしの気持ち、受け取ってくれる？」
line = "「あたしの気持ち、受け取ってくれる？」"

[[dialogue]]
speaker = "unk"
# おずおずと差し出された手を握る。思っていたより小さい、けれど温かい手だ。
line = "おずおずと差し出された手を握る。思っていたより小さい、けれど温かい手だ。"

[[dialogue]]
speaker = "シルヴィ"
# 「隙あり！」
line = "「隙あり！」"

[[dialogue]]
speaker = "unk"
# 手を強く引かれ、顔がすぐそばに近づいて。
line = "手を強く引かれ、顔がすぐそばに近づいて。"

[[dialogue]]
speaker = "シルヴィ"
# 「ちゅっ」
line = "「ちゅっ」"

[[dialogue]]
speaker = "シルヴィ"
# 「えへへ、キスしちゃった♪」
line = "「えへへ、キスしちゃった♪」"

[[dialogue]]
speaker = "unk"
# 夕陽にシルヴィ先輩の笑顔が映える。
line = "夕陽にシルヴィ先輩の笑顔が映える。"

[[dialogue]]
speaker = "unk"
# これが俺たちの最初のキスになったのだった。
line = "これが俺たちの最初のキスになったのだった。"
