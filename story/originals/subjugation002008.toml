[[dialogue]]
speaker = "unk"
# 女の子の手作りチョコを食べ荒らすダークカイザーチョコッチを成敗した翌日。大聖堂では──
line = "女の子の手作りチョコを食べ荒らすダークカイザーチョコッチを成敗した翌日。大聖堂では──"

[[dialogue]]
speaker = "フィオナ"
# 「この度はありがとうございました、緋宮会長。おかげさまで無事にバレンタインのイベントを開催できました」
line = "「この度はありがとうございました、緋宮会長。おかげさまで無事にバレンタインのイベントを開催できました」"

[[dialogue]]
speaker = "フィオナ"
# 「セーラさんやルリエルから、大変お世話になったと聞いています……あの、こちら、よろしければ」
line = "「セーラさんやルリエルから、大変お世話になったと聞いています……あの、こちら、よろしければ」"

[[dialogue]]
speaker = "unk"
# フィオナからのチョコレート……！
line = "フィオナからのチョコレート……！"

[[dialogue]]
speaker = "フィオナ"
# 「キリカから教えてもらったレシピなので、味は保証しますよ。デスクワークのお供にでも♪」
line = "「キリカから教えてもらったレシピなので、味は保証しますよ。デスクワークのお供にでも♪」"

[[dialogue]]
speaker = "unk"
# ありがとう、大切に食べるよ
line = "ありがとう、大切に食べるよ"

[[dialogue]]
speaker = "フィオナ"
# 「もちろんここで配られているチョコも貰っていってくださいね。それでは！」
line = "「もちろんここで配られているチョコも貰っていってくださいね。それでは！」"

[[dialogue]]
speaker = "セーラ"
# 「おっ、早速チョコ貰ってる。色男だね～会長さん？　はいこれ、うちからもチョコレート♪」
line = "「おっ、早速チョコ貰ってる。色男だね～会長さん？　はいこれ、うちからもチョコレート♪」"

[[dialogue]]
speaker = "ルリエル"
# 「試食にお熱のルリエルでしたが、ちゃーんと会長さんへのチョコは用意していたのです！　はい、どうぞっ！」
line = "「試食にお熱のルリエルでしたが、ちゃーんと会長さんへのチョコは用意していたのです！　はい、どうぞっ！」"

[[dialogue]]
speaker = "unk"
# ２人とも、ありがとう
line = "２人とも、ありがとう"

[[dialogue]]
speaker = "ジュエリー"
# 「やあ助手。今回はすまなかったね……もっと早くにモンスターの仕業であると見抜けていれば、対策も打てたんだが」
line = "「やあ助手。今回はすまなかったね……もっと早くにモンスターの仕業であると見抜けていれば、対策も打てたんだが」"

[[dialogue]]
speaker = "ジュエリー"
# 「……ふふ。励ましてくれてありがとう。これは私からのチョコだ。受け取ってくれるかい？」
line = "「……ふふ。励ましてくれてありがとう。これは私からのチョコだ。受け取ってくれるかい？」"

[[dialogue]]
speaker = "unk"
# もちろん
line = "もちろん"

[[dialogue]]
speaker = "ジュエリー"
# 「うん……こうやって贈り物を受け取ってもらえるというのは、存外嬉しいものだね」
line = "「うん……こうやって贈り物を受け取ってもらえるというのは、存外嬉しいものだね」"

[[dialogue]]
speaker = "ジュエリー"
# 「また機会があればお茶でもしよう。キミと語らう時間は楽しいからね。それじゃあ」
line = "「また機会があればお茶でもしよう。キミと語らう時間は楽しいからね。それじゃあ」"

[[dialogue]]
speaker = "ウズメイア"
# 「わ～、会長くん。やっと見つけたと思ったら、両手いっぱいにチョコ持ってるし！　出遅れた～！」
line = "「わ～、会長くん。やっと見つけたと思ったら、両手いっぱいにチョコ持ってるし！　出遅れた～！」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「そんなにいっぱい貰えたのでしたら、私たちのチョコは持てないかもしれませんね。残念ですがこれはなかったことに……」
line = "「そんなにいっぱい貰えたのでしたら、私たちのチョコは持てないかもしれませんね。残念ですがこれはなかったことに……」"

[[dialogue]]
speaker = "unk"
# ２人からも欲しいよ……！
line = "２人からも欲しいよ……！"

[[dialogue]]
speaker = "unk"
# 待って待って！？
line = "待って待って！？"

[[dialogue]]
speaker = "ウズメイア"
# 「あははっ♪　もー、シャルレーヌちゃん。イジワルは駄目だし！　ちゃんと渡そ？」
line = "「あははっ♪　もー、シャルレーヌちゃん。イジワルは駄目だし！　ちゃんと渡そ？」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「くすくす♪　言ってみただけです。会長さんには今回、とってもお世話になりましたから」
line = "「くすくす♪　言ってみただけです。会長さんには今回、とってもお世話になりましたから」"

[[dialogue]]
speaker = "ウズメイア"
# 「は～い、雨野ウズメイア特製！　ガトーショコラだよ！　受け取って<emoji=heart04>」
line = "「は～い、雨野ウズメイア特製！　ガトーショコラだよ！　受け取って<emoji=heart04>」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「シャルレーヌお手製のトリュフチョコレートです♪　あ、ちなみに本命ですから<emoji=heart04>　また感想、教えてくださいね～？」
line = "「シャルレーヌお手製のトリュフチョコレートです♪　あ、ちなみに本命ですから<emoji=heart04>　また感想、教えてくださいね～？」"

[[dialogue]]
speaker = "ウズメイア"
# 「えっ、本命！？　シャルレーヌちゃん、それ本命なの！？」
line = "「えっ、本命！？　シャルレーヌちゃん、それ本命なの！？」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「はい♪　会長さんには前から言ってますよね？」
line = "「はい♪　会長さんには前から言ってますよね？」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「いずれ魔王の血をディアーブル家に取り込ませていただくと……くふふっ。これはその根回しみたいな感じです♪」
line = "「いずれ魔王の血をディアーブル家に取り込ませていただくと……くふふっ。これはその根回しみたいな感じです♪」"

[[dialogue]]
speaker = "ウズメイア"
# 「あ、なんか急に政治っぽい話になったし」
line = "「あ、なんか急に政治っぽい話になったし」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「あれ？　あれあれあれ～<emoji=heart04>　もしかしてぇ、本当に私の想いが詰まったチョコだと思っちゃいましたぁ？　くふふふっ<emoji=heart04>」
line = "「あれ？　あれあれあれ～<emoji=heart04>　もしかしてぇ、本当に私の想いが詰まったチョコだと思っちゃいましたぁ？　くふふふっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# またからかわれた……！
line = "またからかわれた……！"

[[dialogue]]
speaker = "ウズメイア"
# 「ど～んまい、会長くん……あっ、向こうの女の子たちが呼んでるみたいだよ？　行って来たら？」
line = "「ど～んまい、会長くん……あっ、向こうの女の子たちが呼んでるみたいだよ？　行って来たら？」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「くふふ♪　ホワイトデーのお返し、楽しみにしてますね～。それじゃあ～<emoji=heart04>」
line = "「くふふ♪　ホワイトデーのお返し、楽しみにしてますね～。それじゃあ～<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
# 「ふ～。楽しかったバレンタインもこれで終わりかぁ。でもシャルレーヌちゃんとペアが組めて楽しかったかも♪」
line = "「ふ～。楽しかったバレンタインもこれで終わりかぁ。でもシャルレーヌちゃんとペアが組めて楽しかったかも♪」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「私もです。普段あまり話さない人と交流できるのも楽しかったですし……」
line = "「私もです。普段あまり話さない人と交流できるのも楽しかったですし……」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「私の素を見てもちゃんと受け入れてくれて……ウズメイア先輩とペアで良かったって思います」
line = "「私の素を見てもちゃんと受け入れてくれて……ウズメイア先輩とペアで良かったって思います」"

[[dialogue]]
speaker = "ウズメイア"
# 「あ、ほんとに～？　えへ、そう言ってくれるとすっごく嬉しいし！」
line = "「あ、ほんとに～？　えへ、そう言ってくれるとすっごく嬉しいし！」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「それで、あの……お礼と言っては何なのですが。実は先輩にもチョコを作ってて……」
line = "「それで、あの……お礼と言っては何なのですが。実は先輩にもチョコを作ってて……」"

[[dialogue]]
speaker = "ウズメイア"
# 「あはっ♪　気が合うね！　シャルレーヌちゃん。あたしも可愛い後輩に贈る、友チョコを用意してたり～？」
line = "「あはっ♪　気が合うね！　シャルレーヌちゃん。あたしも可愛い後輩に贈る、友チョコを用意してたり～？」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「くふふっ♪　じゃあ交換しましょうか？　ハッピーバレンタインです、ウズメイア先輩♪」
line = "「くふふっ♪　じゃあ交換しましょうか？　ハッピーバレンタインです、ウズメイア先輩♪」"

[[dialogue]]
speaker = "ウズメイア"
# 「うん♪　これからも仲良くしよーねっ、シャルレーヌちゃん！　ハッピーバレンタインっ♪」
line = "「うん♪　これからも仲良くしよーねっ、シャルレーヌちゃん！　ハッピーバレンタインっ♪」"

[[dialogue]]
speaker = "unk"
# こうして、ドタバタなトラブルを抱えつつも、流星学園のバレンタインは大盛況のうちに幕を下ろしたのだった──
line = "こうして、ドタバタなトラブルを抱えつつも、流星学園のバレンタインは大盛況のうちに幕を下ろしたのだった──"
