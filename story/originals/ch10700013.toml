[[dialogue]]
speaker = "unk"
# 第３話,親友じゃない？,P
line = "第３話,親友じゃない？,P"

[[dialogue]]
speaker = "unk"
# ウズメと知り合ってからしばらく経ったある日のこと。俺は彼女と街へ遊びに出かけていた――
line = "ウズメと知り合ってからしばらく経ったある日のこと。俺は彼女と街へ遊びに出かけていた――"

[[dialogue]]
speaker = "ウズメイア"
# 「さて、到着～♪　今日はどこから見てまわろっか？」
line = "「さて、到着～♪　今日はどこから見てまわろっか？」"

[[dialogue]]
speaker = "ウズメイア"
# 「ん？　――最近、よく一緒に遊ぶよねって？　確かに～」
line = "「ん？　――最近、よく一緒に遊ぶよねって？　確かに～」"

[[dialogue]]
speaker = "ウズメイア"
# 「お正月から１ヶ月くらいしか経ってないのにね～。なんか昔から仲良い男友達って感じがするし♪」
line = "「お正月から１ヶ月くらいしか経ってないのにね～。なんか昔から仲良い男友達って感じがするし♪」"

[[dialogue]]
speaker = "ウズメイア"
# 「ていうか、これもう親友じゃない？　――なんて♪　えへへへ♪」
line = "「ていうか、これもう親友じゃない？　――なんて♪　えへへへ♪」"

[[dialogue]]
speaker = "unk"
# と、周囲に異変が起こったのは、その時だった。
line = "と、周囲に異変が起こったのは、その時だった。"

[[dialogue]]
speaker = "ウズメイア"
# 「えっ、この感じ……まさか！？」
line = "「えっ、この感じ……まさか！？」"

[[dialogue]]
speaker = "ウズメイア"
# 「周囲が『バグ化』してる！　あっ！　会長くん見て、正面のビル！」
line = "「周囲が『バグ化』してる！　あっ！　会長くん見て、正面のビル！」"

[[dialogue]]
speaker = "ウズメイア"
# 「あれ、アステライトがビルを飲み込んでる！　今日は休日だし、中に沢山人がいるんじゃないの！？」
line = "「あれ、アステライトがビルを飲み込んでる！　今日は休日だし、中に沢山人がいるんじゃないの！？」"

[[dialogue]]
speaker = "unk"
# ……俺が突入して、救助する！
line = "……俺が突入して、救助する！"

[[dialogue]]
speaker = "ウズメイア"
# 「――私はほかの星徒会メンバーがくるまで、ここで待機？　会長くんはそれまで１人で戦う気なの？　ダメだよ！」
line = "「――私はほかの星徒会メンバーがくるまで、ここで待機？　会長くんはそれまで１人で戦う気なの？　ダメだよ！」"

[[dialogue]]
speaker = "ウズメイア"
# 「あたしだってプリマステラなんだから、戦うなら２人でっしょ！　――少数での突入は危険？　でも、会長くんは中の人たちを放っておけないんでしょ？」
line = "「あたしだってプリマステラなんだから、戦うなら２人でっしょ！　――少数での突入は危険？　でも、会長くんは中の人たちを放っておけないんでしょ？」"

[[dialogue]]
speaker = "ウズメイア"
# 「だったら、あたしだって一緒に戦うし！　危険な時こそ、お互いの背中を守るのが友達じゃん！」
line = "「だったら、あたしだって一緒に戦うし！　危険な時こそ、お互いの背中を守るのが友達じゃん！」"

[[dialogue]]
speaker = "unk"
# わかった……ウズメ、頼む！
line = "わかった……ウズメ、頼む！"

[[dialogue]]
speaker = "ウズメイア"
# 「うんっ！　勇猛果敢に薙ぎ払っちゃうし！」
line = "「うんっ！　勇猛果敢に薙ぎ払っちゃうし！」"

[[dialogue]]
speaker = "unk"
# 俺たちは変身して、ビルを飲み込んでしまったアステライト内に突入。外へ避難しようとする人達を守りながら、戦闘を開始した――
line = "俺たちは変身して、ビルを飲み込んでしまったアステライト内に突入。外へ避難しようとする人達を守りながら、戦闘を開始した――"

[[dialogue]]
speaker = "ウズメイア"
# 「はぁ……はぁ……！　やっぱ、めっちゃモンスター多いんだけど……！」
line = "「はぁ……はぁ……！　やっぱ、めっちゃモンスター多いんだけど……！」"

[[dialogue]]
speaker = "ウズメイア"
# 「っ……避難してる人たちのところへは、１匹も通さないっ！　はあぁぁぁっ！」
line = "「っ……避難してる人たちのところへは、１匹も通さないっ！　はあぁぁぁっ！」"

[[dialogue]]
speaker = "ウズメイア"
# （本当はこの階ごと得意の横一閃で吹き飛ばしちゃいたいけど、避難が完了するまではビルが崩れちゃうかもだから、それはできない……！）
line = "（本当はこの階ごと得意の横一閃で吹き飛ばしちゃいたいけど、避難が完了するまではビルが崩れちゃうかもだから、それはできない……！）"

[[dialogue]]
speaker = "ウズメイア"
# （でも、本気を出さないでこの数を相手にするのは厳しいかも……！）
line = "（でも、本気を出さないでこの数を相手にするのは厳しいかも……！）"

[[dialogue]]
speaker = "ウズメイア"
# 「だとしても、逃げるわけにはいかないしっ！　てえぇぇぇいっ！」
line = "「だとしても、逃げるわけにはいかないしっ！　てえぇぇぇいっ！」"

[[dialogue]]
speaker = "ウズメイア"
# 「っ……！　他のモンスターを盾にして、１匹かわされた！？」
line = "「っ……！　他のモンスターを盾にして、１匹かわされた！？」"

[[dialogue]]
speaker = "ウズメイア"
# （こっちに向けて攻撃してくる！　ダメ、かわせない……！）
line = "（こっちに向けて攻撃してくる！　ダメ、かわせない……！）"

[[dialogue]]
speaker = "unk"
# ウズメ！　させるかっ！！
line = "ウズメ！　させるかっ！！"

[[dialogue]]
speaker = "unk"
# 俺は戦っていた周りのモンスターをすぐさま殴り飛ばして、ウズメの前に飛び込んだ。
line = "俺は戦っていた周りのモンスターをすぐさま殴り飛ばして、ウズメの前に飛び込んだ。"

[[dialogue]]
speaker = "ウズメイア"
# 「会長くん！？　あたしを庇って、攻撃をくらって……！」
line = "「会長くん！？　あたしを庇って、攻撃をくらって……！」"

[[dialogue]]
speaker = "フワッチ"
# 「――――！？」
line = "「――――！？」"

[[dialogue]]
speaker = "ウズメイア"
# 「会長くん！　大丈夫！？　怪我は……！？」
line = "「会長くん！　大丈夫！？　怪我は……！？」"

[[dialogue]]
speaker = "unk"
# 大丈夫だ。１番前は俺に任せろ
line = "大丈夫だ。１番前は俺に任せろ"

[[dialogue]]
speaker = "ウズメイア"
# 「う、うんっ……！」
line = "「う、うんっ……！」"

[[dialogue]]
speaker = "ウズメイア"
# （攻撃をくらったのに全然怯まない……！　会長くん、すごい気迫だし……！）
line = "（攻撃をくらったのに全然怯まない……！　会長くん、すごい気迫だし……！）"

[[dialogue]]
speaker = "unk"
# その時、ビルの壁をぶち破り、聞き慣れた声が響いた。
line = "その時、ビルの壁をぶち破り、聞き慣れた声が響いた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロト！　ウズメ！　２人共、無事？」
line = "「クロト！　ウズメ！　２人共、無事？」"

[[dialogue]]
speaker = "ウズメイア"
# 「ヴィーナス先輩！　それに、星徒会のみんなも！」
line = "「ヴィーナス先輩！　それに、星徒会のみんなも！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私たちが来るまでよく頑張ったわね。でも、もう大丈夫よ！」
line = "「私たちが来るまでよく頑張ったわね。でも、もう大丈夫よ！」"

[[dialogue]]
speaker = "unk"
# ああ、皆、このままアステラを攻略するぞ！
line = "ああ、皆、このままアステラを攻略するぞ！"

[[dialogue]]
speaker = "ウズメイア"
# （そこからはすごかった。会長くんは１番先頭で戦いながら、あたしや星徒会メンバーに的確な指示を飛ばして、みるみるモンスターの大軍を押し返し――）
line = "（そこからはすごかった。会長くんは１番先頭で戦いながら、あたしや星徒会メンバーに的確な指示を飛ばして、みるみるモンスターの大軍を押し返し――）"

[[dialogue]]
speaker = "ウズメイア"
# （気づけば、アステライトのコアがあるフロアへ到着。モンスターの猛攻を潜り抜け、その拳でコアを破壊してみせた――）
line = "（気づけば、アステライトのコアがあるフロアへ到着。モンスターの猛攻を潜り抜け、その拳でコアを破壊してみせた――）"

[[dialogue]]
speaker = "ウズメイア"
# 「って、緊張が解けたら、いつの間にか星力すっからかんだし……しばらく動けないかも……」
line = "「って、緊張が解けたら、いつの間にか星力すっからかんだし……しばらく動けないかも……」"

[[dialogue]]
speaker = "unk"
# ウズメっ！？
line = "ウズメっ！？"

[[dialogue]]
speaker = "ウズメイア"
# 「あっ、会長くん。大丈夫、大丈夫。攻撃受けたわけじゃなくて、ちょっと疲れただけだから、少し休めば――」
line = "「あっ、会長くん。大丈夫、大丈夫。攻撃受けたわけじゃなくて、ちょっと疲れただけだから、少し休めば――」"

[[dialogue]]
speaker = "ウズメイア"
# 「ひゃあっ！？　か、会長くん！？　なにしてんの！？　いきなりお姫様抱っこって……！？」
line = "「ひゃあっ！？　か、会長くん！？　なにしてんの！？　いきなりお姫様抱っこって……！？」"

[[dialogue]]
speaker = "ウズメイア"
# 「――もうすぐアステライトの異空間が崩壊するから危ないかも？　外まで運んでくれるの？　で、でも……！」
line = "「――もうすぐアステライトの異空間が崩壊するから危ないかも？　外まで運んでくれるの？　で、でも……！」"

[[dialogue]]
speaker = "unk"
# 背中を守ってくれたお礼ってことで
line = "背中を守ってくれたお礼ってことで"

[[dialogue]]
speaker = "ウズメイア"
# 「っ……！」
line = "「っ……！」"

[[dialogue]]
speaker = "ウズメイア"
# （か、会長くんの笑顔、なんかドキッとするし！？　な、なにこれ……なんで急に、こんな……！？）
line = "（か、会長くんの笑顔、なんかドキッとするし！？　な、なにこれ……なんで急に、こんな……！？）"

[[dialogue]]
speaker = "ウズメイア"
# （あたし、もしかして今、会長くんのことを男の子として意識しちゃってんの……！？）
line = "（あたし、もしかして今、会長くんのことを男の子として意識しちゃってんの……！？）"

[[dialogue]]
speaker = "ウズメイア"
# （た、確かにあたしのこと、攻撃から庇ってくれたし、勇敢でカッコよかったけど……！）
line = "（た、確かにあたしのこと、攻撃から庇ってくれたし、勇敢でカッコよかったけど……！）"

[[dialogue]]
speaker = "ウズメイア"
# （って、さっきの会長くん、男らしくて、めっちゃあたしの好みなんだけど！？）
line = "（って、さっきの会長くん、男らしくて、めっちゃあたしの好みなんだけど！？）"

[[dialogue]]
speaker = "ウズメイア"
# （うぅ～～～っ！　ついさっきまで、気の合う男友達で、親友とか自分で言ってたのにぃ～……！）
line = "（うぅ～～～っ！　ついさっきまで、気の合う男友達で、親友とか自分で言ってたのにぃ～……！）"

[[dialogue]]
speaker = "unk"
# お姫様抱っこがそんなに恥ずかしかったのか、顔を赤くして両手で覆ってしまうウズメ。背中におんぶする方がよかっただろうか……？　と反省する俺なのだった――
line = "お姫様抱っこがそんなに恥ずかしかったのか、顔を赤くして両手で覆ってしまうウズメ。背中におんぶする方がよかっただろうか……？　と反省する俺なのだった――"
