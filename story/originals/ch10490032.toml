[[dialogue]]
speaker = "unk"
# 第２話,紅明のお母さん・現代編,P
line = "第２話,紅明のお母さん・現代編,P"

[[dialogue]]
speaker = "unk"
# それはある日の放課後、俺が星徒会室へ向かおうと、廊下を歩いていた時のこと。
line = "それはある日の放課後、俺が星徒会室へ向かおうと、廊下を歩いていた時のこと。"

[[dialogue]]
speaker = "女性"
# 「ごめんなさい、ちょっといいかしら～？」
line = "「ごめんなさい、ちょっといいかしら～？」"

[[dialogue]]
speaker = "unk"
# 声を掛けられて振り返ると、そこにいたのは見知らぬ美人な魔族女性。聞けば、星徒会室へ用事があるらしく、俺が星徒会長であることを名乗ると――
line = "声を掛けられて振り返ると、そこにいたのは見知らぬ美人な魔族女性。聞けば、星徒会室へ用事があるらしく、俺が星徒会長であることを名乗ると――"

[[dialogue]]
speaker = "女性"
# 「そっか、キミが紅明ちゃんの『ダーリンくん』か～☆」
line = "「そっか、キミが紅明ちゃんの『ダーリンくん』か～☆」"

[[dialogue]]
speaker = "unk"
# え？　もしかしてあなたは……
line = "え？　もしかしてあなたは……"

[[dialogue]]
speaker = "unk"
# <b>すごく大きな胸</b>で目を引くその女性は、ふんわりと柔らかな笑顔を浮かべるのだった――
line = "<b>すごく大きな胸</b>で目を引くその女性は、ふんわりと柔らかな笑顔を浮かべるのだった――"

[[dialogue]]
speaker = "紅明"
# 「ダーリン！　全速力でやって来たぜ！！」
line = "「ダーリン！　全速力でやって来たぜ！！」"

[[dialogue]]
speaker = "女性"
# 「あっ、紅明ちゃ～ん☆　遊びに来ちゃった♪」
line = "「あっ、紅明ちゃ～ん☆　遊びに来ちゃった♪」"

[[dialogue]]
speaker = "紅明"
# 「いや、来るとか全然聞いてないんだけど！？　<b>お母さん</b>！」
line = "「いや、来るとか全然聞いてないんだけど！？　<b>お母さん</b>！」"

[[dialogue]]
speaker = "女性"
# 「ごめ～ん☆　噂のダーリンくんに会ってみたくて～。ちょうど時間が空いてたから、学園にホルスタミンを届けるついでにね♪」
line = "「ごめ～ん☆　噂のダーリンくんに会ってみたくて～。ちょうど時間が空いてたから、学園にホルスタミンを届けるついでにね♪」"

[[dialogue]]
speaker = "unk"
# そう、この女性はなんと、紅明の<b>現代の</b>お母さんであった。
line = "そう、この女性はなんと、紅明の<b>現代の</b>お母さんであった。"

[[dialogue]]
speaker = "紅明"
# 「予想外のサプライズを食らったけど、改めてダーリンに紹介するっしょ。アタシのお母さんで、『<ruby=ぜんざいにゅうぎょう>善財乳業</ruby>』の社長をやってる――」
line = "「予想外のサプライズを食らったけど、改めてダーリンに紹介するっしょ。アタシのお母さんで、『<ruby>善財乳業<rt>ぜんざいにゅうぎょう</rt></ruby>』の社長をやってる――」"

[[dialogue]]
speaker = "明鈴"
# 「うふふっ、<ruby=ぎゅうめいりん>牛明鈴</ruby>で～す♪　紅明ちゃんの製造元やってま～す☆」
line = "「うふふっ、<ruby>牛明鈴<rt>ぎゅうめいりん</rt></ruby>で～す♪　紅明ちゃんの製造元やってま～す☆」"

[[dialogue]]
speaker = "紅明"
# 「言い方っ！！」
line = "「言い方っ！！」"

[[dialogue]]
speaker = "明鈴"
# 「ついでに、オレンジのパッケージと緑のイナズママークでお馴染み、エナジードリンク『ホルスタミン』の製造元の代表取締役社長をやってま～す♪」
line = "「ついでに、オレンジのパッケージと緑のイナズママークでお馴染み、エナジードリンク『ホルスタミン』の製造元の代表取締役社長をやってま～す♪」"

[[dialogue]]
speaker = "unk"
# いつもお世話になっております！！！
line = "いつもお世話になっております！！！"

[[dialogue]]
speaker = "unk"
# 紅明がイメージキャラクターを務めるＣМと、『元気、足りてる？』のキャッチコピーで有名な、乳製エナジードリンク『ホルスタミン』。
line = "紅明がイメージキャラクターを務めるＣМと、『元気、足りてる？』のキャッチコピーで有名な、乳製エナジードリンク『ホルスタミン』。"

[[dialogue]]
speaker = "unk"
# 飲めば急速に<ruby=スタミナ>星力</ruby>を回復してくれるそれは、１日に何度もモンスターが出現することもある流星市国において、星騎士には欠かせない必需品である。
line = "飲めば急速に<ruby>星力<rt>スタミナ</rt></ruby>を回復してくれるそれは、１日に何度もモンスターが出現することもある流星市国において、星騎士には欠かせない必需品である。"

[[dialogue]]
speaker = "明鈴"
# 「こちらこそ、娘がいつもお世話になってま～す♪　社長と言っても、ダーリンくんとはこれから仲良くするんだし、気軽に『明鈴ママ』って呼んでね☆」
line = "「こちらこそ、娘がいつもお世話になってま～す♪　社長と言っても、ダーリンくんとはこれから仲良くするんだし、気軽に『明鈴ママ』って呼んでね☆」"

[[dialogue]]
speaker = "明鈴"
# 「それにしても～……ほうほう♪　ダーリンくん、見れば見る程、めっちゃ私の好み～☆　――えいっ<emoji=heart04>」
line = "「それにしても～……ほうほう♪　ダーリンくん、見れば見る程、めっちゃ私の好み～☆　――えいっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 不意に腕に抱き着かれて、大きく柔らかな感触に挟まれる。
line = "不意に腕に抱き着かれて、大きく柔らかな感触に挟まれる。"

[[dialogue]]
speaker = "unk"
# こ、これは……！　紅明より大きい！？
line = "こ、これは……！　紅明より大きい！？"

[[dialogue]]
speaker = "unk"
# ちなみに、紅明は現在１０１センチのＩカップである。そういえば以前紅明が、お母さんは自分よりも大きいＪカップだと――
line = "ちなみに、紅明は現在１０１センチのＩカップである。そういえば以前紅明が、お母さんは自分よりも大きいＪカップだと――"

[[dialogue]]
speaker = "紅明"
# 「ちょいちょいちょい！？　娘の彼氏にベタベタくっ付き過ぎっしょ！」
line = "「ちょいちょいちょい！？　娘の彼氏にベタベタくっ付き過ぎっしょ！」"

[[dialogue]]
speaker = "明鈴"
# 「大丈夫～♪　ママ、バツイチだから☆」
line = "「大丈夫～♪　ママ、バツイチだから☆」"

[[dialogue]]
speaker = "紅明"
# 「むしろ不安なんだが！？」
line = "「むしろ不安なんだが！？」"

[[dialogue]]
speaker = "明鈴"
# 「え～、でも紅明ちゃん、みんな笑顔で幸せになれるなら、ダーリンくんのハーレムもアリ、ってよく言ってるじゃない？」
line = "「え～、でも紅明ちゃん、みんな笑顔で幸せになれるなら、ダーリンくんのハーレムもアリ、ってよく言ってるじゃない？」"

[[dialogue]]
speaker = "紅明"
# 「そ、それは確かに言ってるけども！　自分のママがダーリンとくっ付くとか、さすがにさらっとスルーできないものがあるっしょ！？」
line = "「そ、それは確かに言ってるけども！　自分のママがダーリンとくっ付くとか、さすがにさらっとスルーできないものがあるっしょ！？」"

[[dialogue]]
speaker = "明鈴"
# 「んモ～、紅明ちゃんって、いつもは笑顔で大人みたいに受け流すのに、私の前だと急に子供っぽくワガママになるわよね～」
line = "「んモ～、紅明ちゃんって、いつもは笑顔で大人みたいに受け流すのに、私の前だと急に子供っぽくワガママになるわよね～」"

[[dialogue]]
speaker = "明鈴"
# 「特にダーリンくんと付き合い始めてからは、色々言い訳して、私とダーリンくんを会わせないようにしてたし～」
line = "「特にダーリンくんと付き合い始めてからは、色々言い訳して、私とダーリンくんを会わせないようにしてたし～」"

[[dialogue]]
speaker = "紅明"
# 「ちょっ！？　そんなことダーリンの前でわざわざ言わなくていいじゃん！？　お母さんは早く帰るっしょ！」
line = "「ちょっ！？　そんなことダーリンの前でわざわざ言わなくていいじゃん！？　お母さんは早く帰るっしょ！」"

[[dialogue]]
speaker = "unk"
# と、珍しく恥ずかしそうにしている紅明を尻目に、明鈴さんが耳元でこっそり囁く。
line = "と、珍しく恥ずかしそうにしている紅明を尻目に、明鈴さんが耳元でこっそり囁く。"

[[dialogue]]
speaker = "明鈴"
# 「ふふふっ♪　すごいわね、ダーリンくん」
line = "「ふふふっ♪　すごいわね、ダーリンくん」"

[[dialogue]]
speaker = "明鈴"
# 「いつも達観してる紅明ちゃんが、こんなに動揺することなんて、滅多にないのよ？　それくらい、キミのことが好きなのね♪」
line = "「いつも達観してる紅明ちゃんが、こんなに動揺することなんて、滅多にないのよ？　それくらい、キミのことが好きなのね♪」"

[[dialogue]]
speaker = "紅明"
# 「って、お母さん！　いまダーリンにこそっと何を吹き込んだのさ！？」
line = "「って、お母さん！　いまダーリンにこそっと何を吹き込んだのさ！？」"

[[dialogue]]
speaker = "明鈴"
# 「別に～、なんでも～？」
line = "「別に～、なんでも～？」"

[[dialogue]]
speaker = "紅明"
# 「後でこっそり、２人きりでダーリンと会おうとか、絶対許さないかんね！？」
line = "「後でこっそり、２人きりでダーリンと会おうとか、絶対許さないかんね！？」"

[[dialogue]]
speaker = "明鈴"
# 「はいはい、大丈夫だって～。ママはたまにダーリンくんを貸してもらうだけでいいから～♪」
line = "「はいはい、大丈夫だって～。ママはたまにダーリンくんを貸してもらうだけでいいから～♪」"

[[dialogue]]
speaker = "紅明"
# 「しれっとハーレムに入る気満々じゃん！？」
line = "「しれっとハーレムに入る気満々じゃん！？」"

[[dialogue]]
speaker = "明鈴"
# 「あっ♪　ダーリンくん、ＤＩＳＣの連絡先交換しよ～☆」
line = "「あっ♪　ダーリンくん、ＤＩＳＣの連絡先交換しよ～☆」"

[[dialogue]]
speaker = "紅明"
# 「却下っしょ！！！　ダーリンに連絡する際はアタシを通さなきゃＮＧだから！」
line = "「却下っしょ！！！　ダーリンに連絡する際はアタシを通さなきゃＮＧだから！」"

[[dialogue]]
speaker = "明鈴"
# 「紅明ちゃん、タレントなのにマネージャーみた～い♪」
line = "「紅明ちゃん、タレントなのにマネージャーみた～い♪」"

[[dialogue]]
speaker = "unk"
# にこにこと柔和な笑顔を浮かべながら、終始楽しそうに娘をからかう明鈴さんなのであった――
line = "にこにこと柔和な笑顔を浮かべながら、終始楽しそうに娘をからかう明鈴さんなのであった――"
