[[dialogue]]
speaker = "unk"
# 流星寮クリスマスパーティー実行委員会、第２回が開催される。
line = "流星寮クリスマスパーティー実行委員会、第２回が開催される。"

[[dialogue]]
speaker = "舞亜"
# 「というわけで、やりたいことを全部やっちゃおうと思うんだけど、アポロちゃん的にはどうかな？」
line = "「というわけで、やりたいことを全部やっちゃおうと思うんだけど、アポロちゃん的にはどうかな？」"

[[dialogue]]
speaker = "アポロ"
# 「ごちゃ混ぜクリスマスか……うん、いいと思うぞ！　こんなパーティーなら絶対みんなも楽しいはずだ！」
line = "「ごちゃ混ぜクリスマスか……うん、いいと思うぞ！　こんなパーティーなら絶対みんなも楽しいはずだ！」"

[[dialogue]]
speaker = "アニュラス"
# 「寮長殿の希望ももちろん叶えるつもりだ。アポロがしたいこともな」
line = "「寮長殿の希望ももちろん叶えるつもりだ。アポロがしたいこともな」"

[[dialogue]]
speaker = "アポロ"
# 「あたしがしたいこと……」
line = "「あたしがしたいこと……」"

[[dialogue]]
speaker = "unk"
# あれから新しくやりたいことは出来た？
line = "あれから新しくやりたいことは出来た？"

[[dialogue]]
speaker = "アポロ"
# 「ん……そうだな。それこそ上品なクリスマスパーティーにそぐわないかもしれないが……」
line = "「ん……そうだな。それこそ上品なクリスマスパーティーにそぐわないかもしれないが……」"

[[dialogue]]
speaker = "アポロ"
# 「あたしは流星ライダーの何かがあったらいいなぁって思う！　流星ライダーは強くてかっこいいから、みんなに大人気だしな！」
line = "「あたしは流星ライダーの何かがあったらいいなぁって思う！　流星ライダーは強くてかっこいいから、みんなに大人気だしな！」"

[[dialogue]]
speaker = "舞亜"
# 「パーティーには附属生も参加するから、そういう子にはウケがいいかもね」
line = "「パーティーには附属生も参加するから、そういう子にはウケがいいかもね」"

[[dialogue]]
speaker = "アニュラス"
# 「うーん……」
line = "「うーん……」"

[[dialogue]]
speaker = "アポロ"
# 「アニュラスは反対か？」
line = "「アニュラスは反対か？」"

[[dialogue]]
speaker = "アニュラス"
# 「否、それでは足りない！」
line = "「否、それでは足りない！」"

[[dialogue]]
speaker = "アポロ"
# 「なにっ！？」
line = "「なにっ！？」"

[[dialogue]]
speaker = "アニュラス"
# 「流星ライダー・アポロの何かをやるなら、流星剣騎ファイバーの何かもやって欲しい！」
line = "「流星ライダー・アポロの何かをやるなら、流星剣騎ファイバーの何かもやって欲しい！」"

[[dialogue]]
speaker = "アポロ"
# 「おまえっ……まさか、流星剣騎シリーズ派かっ！？」
line = "「おまえっ……まさか、流星剣騎シリーズ派かっ！？」"

[[dialogue]]
speaker = "アニュラス"
# 「ふっ……確かに流星ライダーはいいものだと聞く。しかし、流星剣騎だって負けてはいない！」
line = "「ふっ……確かに流星ライダーはいいものだと聞く。しかし、流星剣騎だって負けてはいない！」"

[[dialogue]]
speaker = "アニュラス"
# 「もし流星剣騎の何かをやるなら、その役目、このアニュラス・セイファートに任せて欲しい！　見事、演じて見せよう──せいっ！！」
line = "「もし流星剣騎の何かをやるなら、その役目、このアニュラス・セイファートに任せて欲しい！　見事、演じて見せよう──せいっ！！」"

[[dialogue]]
speaker = "舞亜"
# 「うわ、なんか気持ち悪い動き」
line = "「うわ、なんか気持ち悪い動き」"

[[dialogue]]
speaker = "アニュラス"
# 「気持ち悪くなぁい！！」
line = "「気持ち悪くなぁい！！」"

[[dialogue]]
speaker = "アポロ"
# 「流星ライダーに出てくる怪人みたいな動きだったぞ……」
line = "「流星ライダーに出てくる怪人みたいな動きだったぞ……」"

[[dialogue]]
speaker = "舞亜"
# 「それじゃあヒーローショー、やる？　アニュラスに怪人役をやってもらって」
line = "「それじゃあヒーローショー、やる？　アニュラスに怪人役をやってもらって」"

[[dialogue]]
speaker = "アニュラス"
# 「怪人役！？　流星剣騎ではなくて？」
line = "「怪人役！？　流星剣騎ではなくて？」"

[[dialogue]]
speaker = "アポロ"
# 「そしてもちろん、あたしが流星ライダー役だ！」
line = "「そしてもちろん、あたしが流星ライダー役だ！」"

[[dialogue]]
speaker = "アニュラス"
# 「むむむ……今日１番の笑顔をしている……」
line = "「むむむ……今日１番の笑顔をしている……」"

[[dialogue]]
speaker = "アニュラス"
# 「わかった！　みんなの笑顔のため、怪人を演じてみせよう！　その代わりアポロも少しだけ我慢だぞ。流星ライダーをやりたい子は他にもいるだろうからな」
line = "「わかった！　みんなの笑顔のため、怪人を演じてみせよう！　その代わりアポロも少しだけ我慢だぞ。流星ライダーをやりたい子は他にもいるだろうからな」"

[[dialogue]]
speaker = "アポロ"
# 「もちろんだ！　流星ライダーは大人気だから、交替でやるぞ！」
line = "「もちろんだ！　流星ライダーは大人気だから、交替でやるぞ！」"

[[dialogue]]
speaker = "unk"
# パーティーで出す料理の方はどうするんだ？
line = "パーティーで出す料理の方はどうするんだ？"

[[dialogue]]
speaker = "unk"
# ところで今気が付いたんだが
line = "ところで今気が付いたんだが"

[[dialogue]]
speaker = "アニュラス"
# 「カフェテリアはカフェテリアで忙しいだろうからな……やはりお店で注文することになるだろう」
line = "「カフェテリアはカフェテリアで忙しいだろうからな……やはりお店で注文することになるだろう」"

[[dialogue]]
speaker = "舞亜"
# 「そうなるかな……でも、せっかくだから私たちでも用意しない？」
line = "「そうなるかな……でも、せっかくだから私たちでも用意しない？」"

[[dialogue]]
speaker = "アニュラス"
# 「なにっ！？」
line = "「なにっ！？」"

[[dialogue]]
speaker = "アポロ"
# 「いいな！　アニュラスが作ったご馳走食べてみたいぞ！」
line = "「いいな！　アニュラスが作ったご馳走食べてみたいぞ！」"

[[dialogue]]
speaker = "アニュラス"
# 「そそ、それはおすすめ出来ないぞ。生憎、料理はからきしなんだ」
line = "「そそ、それはおすすめ出来ないぞ。生憎、料理はからきしなんだ」"

[[dialogue]]
speaker = "アポロ"
# 「そうなのか？　それは残念だ……」
line = "「そうなのか？　それは残念だ……」"

[[dialogue]]
speaker = "アニュラス"
# 「うぐっ……そんなにがっかりしないでくれ。万が一、私の料理を食べさせてアポロがお腹を壊したら大変だから……」
line = "「うぐっ……そんなにがっかりしないでくれ。万が一、私の料理を食べさせてアポロがお腹を壊したら大変だから……」"

[[dialogue]]
speaker = "unk"
# アニュラスの特訓は俺に任せて
line = "アニュラスの特訓は俺に任せて"

[[dialogue]]
speaker = "unk"
# だったら特訓だ！
line = "だったら特訓だ！"

[[dialogue]]
speaker = "アニュラス"
# 「と、特訓！？　それは……ちょっと心惹かれるな……」
line = "「と、特訓！？　それは……ちょっと心惹かれるな……」"

[[dialogue]]
speaker = "アポロ"
# 「特訓ならあたしも参加したいぞ！」
line = "「特訓ならあたしも参加したいぞ！」"

[[dialogue]]
speaker = "舞亜"
# 「アポロちゃんもやるんだ」
line = "「アポロちゃんもやるんだ」"

[[dialogue]]
speaker = "アポロ"
# 「流星ライダーでも、みんなで料理の特訓をする回があるんだ！」
line = "「流星ライダーでも、みんなで料理の特訓をする回があるんだ！」"

[[dialogue]]
speaker = "舞亜"
# 「なるほどね。じゃあ、気になっちゃうか」
line = "「なるほどね。じゃあ、気になっちゃうか」"

[[dialogue]]
speaker = "アポロ"
# 「おう！　だからアニュラスと一緒に料理の特訓するぞ！」
line = "「おう！　だからアニュラスと一緒に料理の特訓するぞ！」"

[[dialogue]]
speaker = "アニュラス"
# 「む、む……特訓……いや、だめだ！　どうだろう、料理は私抜きというのは？　特訓は舞亜にしてやってくれ」
line = "「む、む……特訓……いや、だめだ！　どうだろう、料理は私抜きというのは？　特訓は舞亜にしてやってくれ」"

[[dialogue]]
speaker = "unk"
# 舞亜は料理できるから
line = "舞亜は料理できるから"

[[dialogue]]
speaker = "アニュラス"
# 「くっ……そうなのか！？」
line = "「くっ……そうなのか！？」"

[[dialogue]]
speaker = "舞亜"
# 「諦め悪いよ、アニュラス。立派な流星の騎士になれるよう、不退転の気持ちで料理特訓しよう」
line = "「諦め悪いよ、アニュラス。立派な流星の騎士になれるよう、不退転の気持ちで料理特訓しよう」"

[[dialogue]]
speaker = "アニュラス"
# 「ぐぬぬ……そこで流星の騎士を出されたら逃げられない……わかった、承知しよう」
line = "「ぐぬぬ……そこで流星の騎士を出されたら逃げられない……わかった、承知しよう」"

[[dialogue]]
speaker = "アポロ"
# 「やったぁ！　よーし、でっかいクリスマスケーキ作るぞ～！　実物大ブッシュドノエルだ！」
line = "「やったぁ！　よーし、でっかいクリスマスケーキ作るぞ～！　実物大ブッシュドノエルだ！」"

[[dialogue]]
speaker = "アニュラス"
# 「あ、いや、それは無理だ。急に難易度上がってないか？　ほら、誰か何とか言ってくれ」
line = "「あ、いや、それは無理だ。急に難易度上がってないか？　ほら、誰か何とか言ってくれ」"

[[dialogue]]
speaker = "アニュラス"
# 「ケーキ作りは、流星の騎士にも荷が重いぞ～～～っ！！」
line = "「ケーキ作りは、流星の騎士にも荷が重いぞ～～～っ！！」"
