[[dialogue]]
speaker = "ネーゼマイン"
# 「ゲームの前に、まずは作戦タイムだね」
line = "「ゲームの前に、まずは作戦タイムだね」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「このカジノにあるものならば、どの種目でもよいとダッチは言っておりますが……」
line = "「このカジノにあるものならば、どの種目でもよいとダッチは言っておりますが……」"

[[dialogue]]
speaker = "セナリィ"
# 「スロットにルーレット。トランプならポーカーにバカラ、ブラックジャック──両手じゃ利かないくらいの選択肢がありますわよ？」
line = "「スロットにルーレット。トランプならポーカーにバカラ、ブラックジャック──両手じゃ利かないくらいの選択肢がありますわよ？」"

[[dialogue]]
speaker = "unk"
# みんなの得意なゲームを聞かせてくれ
line = "みんなの得意なゲームを聞かせてくれ"

[[dialogue]]
speaker = "ネーゼマイン"
# 「私はとりあえず、運だけじゃなく駆け引きの要素もあるゲームが嬉しいかな」
line = "「私はとりあえず、運だけじゃなく駆け引きの要素もあるゲームが嬉しいかな」"

[[dialogue]]
speaker = "セナリィ"
# 「スロットならば大得意ですわ！　動体視力には自信があるんですの。目押しも余裕ですわ！！」
line = "「スロットならば大得意ですわ！　動体視力には自信があるんですの。目押しも余裕ですわ！！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「私は……その、申し訳ございません。賭け事自体、したことがありませんわ」
line = "「私は……その、申し訳ございません。賭け事自体、したことがありませんわ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「かろうじてポーカーくらいですわね。それだって役とルールを知っている程度で……」
line = "「かろうじてポーカーくらいですわね。それだって役とルールを知っている程度で……」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「あちゃ……まぁそうだよね。お嬢様だし、千園寺先輩って鍛錬ばっかしてるイメージだし」
line = "「あちゃ……まぁそうだよね。お嬢様だし、千園寺先輩って鍛錬ばっかしてるイメージだし」"

[[dialogue]]
speaker = "セナリィ"
# 「まったく。こういう時の為に、少しは娯楽も嗜んでおいて欲しかったですわね」
line = "「まったく。こういう時の為に、少しは娯楽も嗜んでおいて欲しかったですわね」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「こんなの予想できるわけがありませんわ！？　モンスターから命を賭けたゲームを挑まれるだなんて……！」
line = "「こんなの予想できるわけがありませんわ！？　モンスターから命を賭けたゲームを挑まれるだなんて……！」"

[[dialogue]]
speaker = "unk"
# なら全員、ポーカーで行こう
line = "なら全員、ポーカーで行こう"

[[dialogue]]
speaker = "ネーゼマイン"
# 「そうだね。ここは敵の巣だし、何かしらイカサマを仕掛けてくると考えるのが妥当だよ」
line = "「そうだね。ここは敵の巣だし、何かしらイカサマを仕掛けてくると考えるのが妥当だよ」"

[[dialogue]]
speaker = "セナリィ"
# 「だったら４人全員、同じゲームの方がいいということですわね。千園寺様がわかるポーカーがベストでしょう」
line = "「だったら４人全員、同じゲームの方がいいということですわね。千園寺様がわかるポーカーがベストでしょう」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「皆様、ご配慮感謝いたしますわ。では──参りましょう！」
line = "「皆様、ご配慮感謝いたしますわ。では──参りましょう！」"

[[dialogue]]
speaker = "ダッチ"
# 「では、一対一のポーカーをいたしましょう。貴女がた全員のチップを私が奪い取れば……」
line = "「では、一対一のポーカーをいたしましょう。貴女がた全員のチップを私が奪い取れば……」"

[[dialogue]]
speaker = "セナリィ"
# 「その時は全員がバニーガールとして<ruby=りょしゅう>虜囚</ruby>になると言うのでしょう？　いいからさっさとチップを寄越しなさいですわ！」
line = "「その時は全員がバニーガールとして<ruby>虜囚<rt>りょしゅう</rt></ruby>になると言うのでしょう？　いいからさっさとチップを寄越しなさいですわ！」"

[[dialogue]]
speaker = "ダッチ"
# 「フフフ！　そう焦らずとも……では全員に２０枚ずつ、チップをお渡しします」
line = "「フフフ！　そう焦らずとも……では全員に２０枚ずつ、チップをお渡しします」"

[[dialogue]]
speaker = "ダッチ"
# 「それでは──『欲望』のポーカーを始めましょう」
line = "「それでは──『欲望』のポーカーを始めましょう」"

[[dialogue]]
speaker = "ダッチ"
# 「勝ちへの強い執念。望むカードを引き込むよう念じることが、このゲームの肝であるとお伝えしておきます」
line = "「勝ちへの強い執念。望むカードを引き込むよう念じることが、このゲームの肝であるとお伝えしておきます」"

[[dialogue]]
speaker = "セナリィ"
# 「調子に乗っていられるのもそこまでですわ！　私が初戦で吠え面かかせてやりますとも！」
line = "「調子に乗っていられるのもそこまでですわ！　私が初戦で吠え面かかせてやりますとも！」"

[[dialogue]]
speaker = "unk"
# セナリィ、頑張れ！
line = "セナリィ、頑張れ！"

[[dialogue]]
speaker = "セナリィ"
# 「ふふん。会長様の手を煩わせることもないですわ。私、命を賭けた戦いなんて掃いて捨てるほど経験済みでしてよ！」
line = "「ふふん。会長様の手を煩わせることもないですわ。私、命を賭けた戦いなんて掃いて捨てるほど経験済みでしてよ！」"

[[dialogue]]
speaker = "セナリィ"
# 「たかが札遊びでヘンタイに遅れなど取りません。祝杯の準備をお願いいたしますわ！」
line = "「たかが札遊びでヘンタイに遅れなど取りません。祝杯の準備をお願いいたしますわ！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「セナリィ、さっきから死亡フラグ立てまくってるけど大丈夫？」
line = "「セナリィ、さっきから死亡フラグ立てまくってるけど大丈夫？」"

[[dialogue]]
speaker = "セナリィ"
# 「勝負前に縁起でもないこと言うんじゃねーですわ！？」
line = "「勝負前に縁起でもないこと言うんじゃねーですわ！？」"

[[dialogue]]
speaker = "セナリィ"
# 「さぁダッチ！　参加料のチップ、１枚ですわ！　カードを配りなさい！」
line = "「さぁダッチ！　参加料のチップ、１枚ですわ！　カードを配りなさい！」"

[[dialogue]]
speaker = "ダッチ"
# 「かしこまりました。では──トランプモンスター！」
line = "「かしこまりました。では──トランプモンスター！」"

[[dialogue]]
speaker = "モンスター"
# 「イ～っ！」
line = "「イ～っ！」"

[[dialogue]]
speaker = "unk"
# 知能のないはずのモンスターがデッキをシャッフルし、セナリィとダッチにカードを配っていく。
line = "知能のないはずのモンスターがデッキをシャッフルし、セナリィとダッチにカードを配っていく。"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「手足のようにモンスターを使役するだなんて。ロストアイテムの力、本当に侮れませんわね……」
line = "「手足のようにモンスターを使役するだなんて。ロストアイテムの力、本当に侮れませんわね……」"

[[dialogue]]
speaker = "セナリィ"
# （さぁ気になる最初の５枚は──まぁ！？）
line = "（さぁ気になる最初の５枚は──まぁ！？）"

[[dialogue]]
speaker = "セナリィ"
# （いきなりツーペアが完成してますわ～！　ああ、これが持って生まれた私の強運！）
line = "（いきなりツーペアが完成してますわ～！　ああ、これが持って生まれた私の強運！）"

[[dialogue]]
speaker = "セナリィ"
# （このままフルハウスまで育てて、一撃で粉砕してやりますわよ！）
line = "（このままフルハウスまで育てて、一撃で粉砕してやりますわよ！）"

[[dialogue]]
speaker = "セナリィ"
# 「１枚チェンジですわ！」
line = "「１枚チェンジですわ！」"

[[dialogue]]
speaker = "ダッチ"
# 「だいぶまとまっているご様子ですね？　私は３枚チェンジです」
line = "「だいぶまとまっているご様子ですね？　私は３枚チェンジです」"

[[dialogue]]
speaker = "セナリィ"
# （３枚チェンジ……フフン。あってもワンペアどまりですわね。『欲望』の名が聞いて呆れますわよ！）
line = "（３枚チェンジ……フフン。あってもワンペアどまりですわね。『欲望』の名が聞いて呆れますわよ！）"

[[dialogue]]
speaker = "セナリィ"
# （さぁ来なさい！　Ｋ、Ｋ、Ｋ──カモンですわ！！）
line = "（さぁ来なさい！　Ｋ、Ｋ、Ｋ──カモンですわ！！）"

[[dialogue]]
speaker = "モンスター"
# 「イ～……！」
line = "「イ～……！」"

[[dialogue]]
speaker = "セナリィ"
# （ファーッ！？　ディスティニードローですわ！！　ハートのＫ、引きましてよ！！）
line = "（ファーッ！？　ディスティニードローですわ！！　ハートのＫ、引きましてよ！！）"

[[dialogue]]
speaker = "セナリィ"
# （Ｋがスリーカードのフルハウス。ポーカーにおいてほぼ最強のハンドですわ～～！？）
line = "（Ｋがスリーカードのフルハウス。ポーカーにおいてほぼ最強のハンドですわ～～！？）"

[[dialogue]]
speaker = "ネーゼマイン"
# （あ～あ……ポーカーフェイスしなきゃダメだよセナリィ。そんなウキウキ顔してたらオリられるに決まってる）
line = "（あ～あ……ポーカーフェイスしなきゃダメだよセナリィ。そんなウキウキ顔してたらオリられるに決まってる）"

[[dialogue]]
speaker = "ダッチ"
# 「フフフ……セナリィ様は愉快な方ですね。相当強いハンドができたと全身で告白しておりますよ？」
line = "「フフフ……セナリィ様は愉快な方ですね。相当強いハンドができたと全身で告白しておりますよ？」"

[[dialogue]]
speaker = "セナリィ"
# 「──ファっ！？」
line = "「──ファっ！？」"

[[dialogue]]
speaker = "ネーゼマイン"
# （ほら、やっぱり……）
line = "（ほら、やっぱり……）"

[[dialogue]]
speaker = "ダッチ"
# 「ですが私も引けない手となりました。レイズといきましょう！」
line = "「ですが私も引けない手となりました。レイズといきましょう！」"

[[dialogue]]
speaker = "ネーゼマイン"
# （えぇ～っ！？）
line = "（えぇ～っ！？）"

[[dialogue]]
speaker = "セナリィ"
# （た、助かりましたわ……すぐオリられては大損！　ちびちびチップを釣り上げてやりますわ～！）
line = "（た、助かりましたわ……すぐオリられては大損！　ちびちびチップを釣り上げてやりますわ～！）"

[[dialogue]]
speaker = "セナリィ"
# 「さらに１枚レイズ！　ダッチはどうしますの？　積みまして？　それともドロップいたしますか！？」
line = "「さらに１枚レイズ！　ダッチはどうしますの？　積みまして？　それともドロップいたしますか！？」"

[[dialogue]]
speaker = "セナリィ"
# 「れれれれ、レイズっ……マックスの２０枚ですわ……！」
line = "「れれれれ、レイズっ……マックスの２０枚ですわ……！」"

[[dialogue]]
speaker = "セナリィ"
# （やべぇですわ！？　オリられないと張り合っているうちに……チップ全部、テーブルに乗っけちゃいましたわ～！？）
line = "（やべぇですわ！？　オリられないと張り合っているうちに……チップ全部、テーブルに乗っけちゃいましたわ～！？）"

[[dialogue]]
speaker = "ダッチ"
# 「フフフ、いきなり大勝負になってしまいましたね……まさか２０枚全賭けとは。恐れ入ります」
line = "「フフフ、いきなり大勝負になってしまいましたね……まさか２０枚全賭けとは。恐れ入ります」"

[[dialogue]]
speaker = "セナリィ"
# 「ふ、ふふん。怖いなら今からでもオリたらどうですの？」
line = "「ふ、ふふん。怖いなら今からでもオリたらどうですの？」"

[[dialogue]]
speaker = "ダッチ"
# 「いえ──コールしましょう。私も２０枚だ」
line = "「いえ──コールしましょう。私も２０枚だ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「敵の手の内がわかる前にいきなり全財産ぶっこんじゃうとか……セナリィ、ゴールデングースの運営、本当に大丈夫？」
line = "「敵の手の内がわかる前にいきなり全財産ぶっこんじゃうとか……セナリィ、ゴールデングースの運営、本当に大丈夫？」"

[[dialogue]]
speaker = "ダッチ"
# 「私も敵ながら心配になってしまいますね」
line = "「私も敵ながら心配になってしまいますね」"

[[dialogue]]
speaker = "セナリィ"
# 「お黙りなさい！　勝てば官軍ですわ──ショウダウンです！　食らいなさい、私のゴージャスハンド！　Ｋハイ・フルハウスを！！」
line = "「お黙りなさい！　勝てば官軍ですわ──ショウダウンです！　食らいなさい、私のゴージャスハンド！　Ｋハイ・フルハウスを！！」"

[[dialogue]]
speaker = "ダッチ"
# 「素晴らしい！　１枚チェンジでそんな役ができていたとは」
line = "「素晴らしい！　１枚チェンジでそんな役ができていたとは」"

[[dialogue]]
speaker = "ダッチ"
# 「ですが残念です。私のハンドはスペードの──」
line = "「ですが残念です。私のハンドはスペードの──」"

[[dialogue]]
speaker = "unk"
# ロイヤルストレートフラッシュ！？
line = "ロイヤルストレートフラッシュ！？"

[[dialogue]]
speaker = "セナリィ"
# 「なななっ、何でこうなりますの～！？」
line = "「なななっ、何でこうなりますの～！？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「なんてこと……！　あんなに強い役で負けるなんて……アンラッキーにも程がありますわ！」
line = "「なんてこと……！　あんなに強い役で負けるなんて……アンラッキーにも程がありますわ！」"

[[dialogue]]
speaker = "ネーゼマイン"
# （ロイヤルストレートフラッシュ……出現確率は確か、０．０００１５％。６５万回に１回、だっけ……？）
line = "（ロイヤルストレートフラッシュ……出現確率は確か、０．０００１５％。６５万回に１回、だっけ……？）"

[[dialogue]]
speaker = "ネーゼマイン"
# （ありがちなフルハウスとかじゃなくて、こんな希少役……イカサマにしては目立ちすぎだよね）
line = "（ありがちなフルハウスとかじゃなくて、こんな希少役……イカサマにしては目立ちすぎだよね）"

[[dialogue]]
speaker = "ネーゼマイン"
# （見破ってみろっていう宣言なのかな。面白いじゃん。絶対に暴いてやるから）
line = "（見破ってみろっていう宣言なのかな。面白いじゃん。絶対に暴いてやるから）"

[[dialogue]]
speaker = "ダッチ"
# 「さぁ……次はどの子ウサギがお相手ですか？」
line = "「さぁ……次はどの子ウサギがお相手ですか？」"
