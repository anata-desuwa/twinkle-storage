[[dialogue]]
speaker = "イレーナ"
# 「こいつで、トドメぇっ！」
line = "「こいつで、トドメぇっ！」"

[[dialogue]]
speaker = "ウルスラ"
# 「きゃああぁあぁぁぁぁっ！」
line = "「きゃああぁあぁぁぁぁっ！」"

[[dialogue]]
speaker = "ウルスラ"
# 「あ、あああ……まだバレンタインは終わっていないのに……終わらせたくないのに……波動が、抜け出て……！　エンドレスバレンタインが、終わってしまいます……！」
line = "「あ、あああ……まだバレンタインは終わっていないのに……終わらせたくないのに……波動が、抜け出て……！　エンドレスバレンタインが、終わってしまいます……！」"

[[dialogue]]
speaker = "イレーナ"
# 「バレンタインは１年に一度だから特別感があるんでしょ。こんな甘ったるい日が、何日も続いたら胃もたれしちゃうわ」
line = "「バレンタインは１年に一度だから特別感があるんでしょ。こんな甘ったるい日が、何日も続いたら胃もたれしちゃうわ」"

[[dialogue]]
speaker = "ウルスラ"
# 「くぅ……やむを得ませんね。今回は負けを認めます。ですが、私は永遠のバレンタインを諦めたりはしませんよ」
line = "「くぅ……やむを得ませんね。今回は負けを認めます。ですが、私は永遠のバレンタインを諦めたりはしませんよ」"

[[dialogue]]
speaker = "ウルスラ"
# 「またお会いしましょう。バレンタインデーは毎年必ず訪れるのですから。うふふふふ<emoji=heart04>」
line = "「またお会いしましょう。バレンタインデーは毎年必ず訪れるのですから。うふふふふ<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
# 「まだそんなに動ける元気が残ってるの！？　ちっとも懲りてないわね！」
line = "「まだそんなに動ける元気が残ってるの！？　ちっとも懲りてないわね！」"

[[dialogue]]
speaker = "unk"
# 悪役めいた捨て台詞を言い残し、まるでバレンタインデーが見せた幻のように、ウルスラの姿は何処ともなく消え去った。
line = "悪役めいた捨て台詞を言い残し、まるでバレンタインデーが見せた幻のように、ウルスラの姿は何処ともなく消え去った。"

[[dialogue]]
speaker = "イレーナ"
# 「あの怪人、またやらかすつもりかしら……もっとボコボコにとっちめた方が良かったわね……」
line = "「あの怪人、またやらかすつもりかしら……もっとボコボコにとっちめた方が良かったわね……」"

[[dialogue]]
speaker = "シャロン"
# 「う、うーん……はっ！？」
line = "「う、うーん……はっ！？」"

[[dialogue]]
speaker = "イレーナ"
# 「あっ、シャロン、気づいた？」
line = "「あっ、シャロン、気づいた？」"

[[dialogue]]
speaker = "シャロン"
# 「イレーナさま、会長さま……私は何をしていたのでしょう……？　なんだか楽しい夢を見ていたような……」
line = "「イレーナさま、会長さま……私は何をしていたのでしょう……？　なんだか楽しい夢を見ていたような……」"

[[dialogue]]
speaker = "イレーナ"
# 「あれ楽しい夢だったの……？　まぁいいわ、とりあえず全部終わったから安心しなさい」
line = "「あれ楽しい夢だったの……？　まぁいいわ、とりあえず全部終わったから安心しなさい」"

[[dialogue]]
speaker = "unk"
# 大丈夫？　肩を貸そうか？
line = "大丈夫？　肩を貸そうか？"

[[dialogue]]
speaker = "シャロン"
# 「か、会長さま……ありがとうございますっ<emoji=heart04>　では、お言葉に甘えて……<emoji=heart04>」
line = "「か、会長さま……ありがとうございますっ<emoji=heart04>　では、お言葉に甘えて……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# まだ矢に撃たれた後遺症が残っているのか、足取りの覚束ないシャロンに肩を貸しつつ、帰路につく。
line = "まだ矢に撃たれた後遺症が残っているのか、足取りの覚束ないシャロンに肩を貸しつつ、帰路につく。"

[[dialogue]]
speaker = "イレーナ"
# 「かばってくれてありがとう、シャロン。あなたのおかげでウルスラに勝てたわ」
line = "「かばってくれてありがとう、シャロン。あなたのおかげでウルスラに勝てたわ」"

[[dialogue]]
speaker = "シャロン"
# 「と、と、とんでもないですっ！　イレーナさまをお守りするのは、当然のことですから。それに──」
line = "「と、と、とんでもないですっ！　イレーナさまをお守りするのは、当然のことですから。それに──」"

[[dialogue]]
speaker = "シャロン"
# 「撃たれたおかげで、こうやって会長さんに寄りかかれるんですから役得です……えへへへ、しゅきぃ……<emoji=heart04>」
line = "「撃たれたおかげで、こうやって会長さんに寄りかかれるんですから役得です……えへへへ、しゅきぃ……<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
# （まだ矢の効果が残ってるの……？　それとも、シャロンの本心？）
line = "（まだ矢の効果が残ってるの……？　それとも、シャロンの本心？）"

[[dialogue]]
speaker = "イレーナ"
# （どちらにせよ……その素直さは羨ましいわ、ホント）
line = "（どちらにせよ……その素直さは羨ましいわ、ホント）"

[[dialogue]]
speaker = "unk"
# シャロンを修道院に送り届けた後、イレーナを教皇庁近くの宿舎まで送っていく。
line = "シャロンを修道院に送り届けた後、イレーナを教皇庁近くの宿舎まで送っていく。"

[[dialogue]]
speaker = "イレーナ"
# 「別にあたしまで送ってくれなくていいのに……あんたの家だと遠回りじゃない？」
line = "「別にあたしまで送ってくれなくていいのに……あんたの家だと遠回りじゃない？」"

[[dialogue]]
speaker = "unk"
# 女の子だけで夜道を歩かせられないよ
line = "女の子だけで夜道を歩かせられないよ"

[[dialogue]]
speaker = "イレーナ"
# 「……そう。相変わらず、お優しいことで」
line = "「……そう。相変わらず、お優しいことで」"

[[dialogue]]
speaker = "イレーナ"
# 「まったく、学園に閉じ込められるなんて……とんでもないバレンタインイベントだったわ」
line = "「まったく、学園に閉じ込められるなんて……とんでもないバレンタインイベントだったわ」"

[[dialogue]]
speaker = "イレーナ"
# 「普段のあたしには縁のないイベントなのに……こんな強烈なインパクトだらけのバレンタインは初めてよ。一生忘れられそうにないわ」
line = "「普段のあたしには縁のないイベントなのに……こんな強烈なインパクトだらけのバレンタインは初めてよ。一生忘れられそうにないわ」"

[[dialogue]]
speaker = "イレーナ"
# 「そうね……どうせ一生忘れられないなら……」
line = "「そうね……どうせ一生忘れられないなら……」"

[[dialogue]]
speaker = "イレーナ"
# 「はい、あんた用のチョコレート。あげるわ」
line = "「はい、あんた用のチョコレート。あげるわ」"

[[dialogue]]
speaker = "unk"
# 俺に！？
line = "俺に！？"

[[dialogue]]
speaker = "イレーナ"
# 「今更なに驚いてんのよ」
line = "「今更なに驚いてんのよ」"

[[dialogue]]
speaker = "イレーナ"
# 「なんだかんだそれなりの付き合いだし、世話になってるお礼をするのに、ちょうどいい機会ってだけ」
line = "「なんだかんだそれなりの付き合いだし、世話になってるお礼をするのに、ちょうどいい機会ってだけ」"

[[dialogue]]
speaker = "イレーナ"
# 「言っておくけど、本命チョコとかじゃないからね！　絶ッッッ対に勘違いするんじゃないわよ！」
line = "「言っておくけど、本命チョコとかじゃないからね！　絶ッッッ対に勘違いするんじゃないわよ！」"

[[dialogue]]
speaker = "unk"
# ここで渡すなら、学園で渡しても……
line = "ここで渡すなら、学園で渡しても……"

[[dialogue]]
speaker = "イレーナ"
# 「だから！　それじゃダメって言ってたのが、わかんない！？」
line = "「だから！　それじゃダメって言ってたのが、わかんない！？」"

[[dialogue]]
speaker = "イレーナ"
# 「人に言われてホイって渡したら、ありがたみ激減でしょ？　いや別にありがたがってもらわなくてもいいけど」
line = "「人に言われてホイって渡したら、ありがたみ激減でしょ？　いや別にありがたがってもらわなくてもいいけど」"

[[dialogue]]
speaker = "イレーナ"
# 「ま、厄介ごとも山ほどあったわけだし、あたしからチョコもらう程度のこと、すぐに忘れるでしょ？　あたしのチョコなんて、それくらいの扱いが丁度いいわ」
line = "「ま、厄介ごとも山ほどあったわけだし、あたしからチョコもらう程度のこと、すぐに忘れるでしょ？　あたしのチョコなんて、それくらいの扱いが丁度いいわ」"

[[dialogue]]
speaker = "unk"
# （忘れるわけない）
line = "（忘れるわけない）"

[[dialogue]]
speaker = "イレーナ"
# 「ホワイトデーのお返しとかいらないから。変な気を利かせなくていいから。あー、渡せてすっきりしたー」
line = "「ホワイトデーのお返しとかいらないから。変な気を利かせなくていいから。あー、渡せてすっきりしたー」"

[[dialogue]]
speaker = "unk"
# イレーナは俺の方を振り返ることなく、教皇庁の宿舎に入ろうとする──その寸前。
line = "イレーナは俺の方を振り返ることなく、教皇庁の宿舎に入ろうとする──その寸前。"

[[dialogue]]
speaker = "イレーナ"
# 「じゃあね。ありがと」
line = "「じゃあね。ありがと」"

[[dialogue]]
speaker = "unk"
# 一言だけ残して、扉の奥に姿を隠したのだった。
line = "一言だけ残して、扉の奥に姿を隠したのだった。"

[[dialogue]]
speaker = "unk"
# イレーナからもらったバレンタインチョコの封を開け、そのひとつを手に取り、口に運ぶと、カカオの苦さが口に広がった。大人の味だ。
line = "イレーナからもらったバレンタインチョコの封を開け、そのひとつを手に取り、口に運ぶと、カカオの苦さが口に広がった。大人の味だ。"

[[dialogue]]
speaker = "unk"
# チョコの甘さと苦さを噛みしめつつ、帰路に就くのだった。
line = "チョコの甘さと苦さを噛みしめつつ、帰路に就くのだった。"
