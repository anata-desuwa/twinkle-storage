[[dialogue]]
speaker = "unk"
# 第２話,サーフィンバトル！,P
line = "第２話,サーフィンバトル！,P"

[[dialogue]]
speaker = "フィオナ"
# 「勝負です、緋宮会長！」
line = "「勝負です、緋宮会長！」"

[[dialogue]]
speaker = "unk"
# いきなり何！？
line = "いきなり何！？"

[[dialogue]]
speaker = "フィオナ"
# 「……なんて、サーフィンの練習のためにリップルさんに結界を作ってもらったので、どうせなら勝負してみたいと思いまして。いかがですか？」
line = "「……なんて、サーフィンの練習のためにリップルさんに結界を作ってもらったので、どうせなら勝負してみたいと思いまして。いかがですか？」"

[[dialogue]]
speaker = "unk"
# それなら受けて立つ！
line = "それなら受けて立つ！"

[[dialogue]]
speaker = "フィオナ"
# 「ありがとうございます。この前はお世話になりましたが、負けるつもりはありませんよ」
line = "「ありがとうございます。この前はお世話になりましたが、負けるつもりはありませんよ」"

[[dialogue]]
speaker = "リップル"
# 「カイチョ～！　フィオナ～！　結界の調整終わッタです。これでイイ感じの波が来るハズですヨ～」
line = "「カイチョ～！　フィオナ～！　結界の調整終わッタです。これでイイ感じの波が来るハズですヨ～」"

[[dialogue]]
speaker = "リップル"
# 「オ～！　ソレ、フィオナのマイボードですカ？　とってもカッコイイで～す！」
line = "「オ～！　ソレ、フィオナのマイボードですカ？　とってもカッコイイで～す！」"

[[dialogue]]
speaker = "フィオナ"
# 「えへへ……サーフィンが楽しくて、つい買ってしまいました。このサーフボードに恥じない波乗りをしてみせます！」
line = "「えへへ……サーフィンが楽しくて、つい買ってしまいました。このサーフボードに恥じない波乗りをしてみせます！」"

[[dialogue]]
speaker = "リップル"
# 「そのイキです！」
line = "「そのイキです！」"

[[dialogue]]
speaker = "フィオナ"
# 「緋宮会長とサーフィンで勝負をしたいのですが、審査員を引き受けていただけませんか？」
line = "「緋宮会長とサーフィンで勝負をしたいのですが、審査員を引き受けていただけませんか？」"

[[dialogue]]
speaker = "リップル"
# 「もちろんオーケーです！　でもその前に、ちょっと慣らした方がイイんじゃないですカ？」
line = "「もちろんオーケーです！　でもその前に、ちょっと慣らした方がイイんじゃないですカ？」"

[[dialogue]]
speaker = "フィオナ"
# 「そうですね。感覚を取り戻したいですし、会長さんも一緒に練習しましょう」
line = "「そうですね。感覚を取り戻したいですし、会長さんも一緒に練習しましょう」"

[[dialogue]]
speaker = "リップル"
# 「みんなで海に入りまショ～！　オオ、さっそくいい波が来テます！」
line = "「みんなで海に入りまショ～！　オオ、さっそくいい波が来テます！」"

[[dialogue]]
speaker = "unk"
# じゃあ俺から……
line = "じゃあ俺から……"

[[dialogue]]
speaker = "フィオナ"
# 「パドリングで加速して……テイクオフ！　いい感じですよ、緋宮会長」
line = "「パドリングで加速して……テイクオフ！　いい感じですよ、緋宮会長」"

[[dialogue]]
speaker = "フィオナ"
# 「そして波に乗ってリッピング！　勢いよく水しぶきが上がってます！」
line = "「そして波に乗ってリッピング！　勢いよく水しぶきが上がってます！」"

[[dialogue]]
speaker = "フィオナ"
# 「では私も……っと」
line = "「では私も……っと」"

[[dialogue]]
speaker = "リップル"
# 「フィオナも波に乗ッタです♪　アップスダウンでスピードをつけて～……カットバックで切り返して～……エアリエル！　フィオナさすがでーす♪」
line = "「フィオナも波に乗ッタです♪　アップスダウンでスピードをつけて～……カットバックで切り返して～……エアリエル！　フィオナさすがでーす♪」"

[[dialogue]]
speaker = "リップル"
# 「２人を見てたらワタシも波に乗りたくナリました♪　行きますヨ～……」
line = "「２人を見てたらワタシも波に乗りたくナリました♪　行きますヨ～……」"

[[dialogue]]
speaker = "フィオナ"
# 「リップルさんが大きな波に乗って……」
line = "「リップルさんが大きな波に乗って……」"

[[dialogue]]
speaker = "リップル"
# 「トォ～！」
line = "「トォ～！」"

[[dialogue]]
speaker = "フィオナ"
# 「すごい！　あんなに高い波のトップでターンして……見事なオフザリップです！」
line = "「すごい！　あんなに高い波のトップでターンして……見事なオフザリップです！」"

[[dialogue]]
speaker = "リップル"
# 「フッフ～ン♪　今のは自分でも決まっタ──って思イました♪」
line = "「フッフ～ン♪　今のは自分でも決まっタ──って思イました♪」"

[[dialogue]]
speaker = "フィオナ"
# 「私もあんな風に大きな波で……きゃっ」
line = "「私もあんな風に大きな波で……きゃっ」"

[[dialogue]]
speaker = "リップル"
# 「焦りは禁物です、フィオナ。勝負で勝ちたいのはワカリますが、もっと力を抜きましょー」
line = "「焦りは禁物です、フィオナ。勝負で勝ちたいのはワカリますが、もっと力を抜きましょー」"

[[dialogue]]
speaker = "フィオナ"
# 「そうですね。力んでいては、乗れる波も乗れませんから」
line = "「そうですね。力んでいては、乗れる波も乗れませんから」"

[[dialogue]]
speaker = "フィオナ"
# 「ふぅ、少し休憩です。慣らしなのに夢中になりすぎましたかね……」
line = "「ふぅ、少し休憩です。慣らしなのに夢中になりすぎましたかね……」"

[[dialogue]]
speaker = "フィオナ"
# 「と見せかけて、それっ」
line = "「と見せかけて、それっ」"

[[dialogue]]
speaker = "unk"
# うわっ、水が！？
line = "うわっ、水が！？"

[[dialogue]]
speaker = "フィオナ"
# 「ふふ、海といえば水をかけ合って遊ぶものと教わりましたからね。悔しかったらやり返してみてください」
line = "「ふふ、海といえば水をかけ合って遊ぶものと教わりましたからね。悔しかったらやり返してみてください」"

[[dialogue]]
speaker = "フィオナ"
# 「きゃっ！？　やりましたね。ではこちらも本気でいきますよ……えいっ」
line = "「きゃっ！？　やりましたね。ではこちらも本気でいきますよ……えいっ」"

[[dialogue]]
speaker = "フィオナ"
# 「やるからには水かけでも本気ですよ♪　そーれっ」
line = "「やるからには水かけでも本気ですよ♪　そーれっ」"

[[dialogue]]
speaker = "フィオナ"
# 「ふふふっ、うふふふふ♪」
line = "「ふふふっ、うふふふふ♪」"

[[dialogue]]
speaker = "リップル"
# 「ムフ～」
line = "「ムフ～」"

[[dialogue]]
speaker = "フィオナ"
# 「──あ」
line = "「──あ」"

[[dialogue]]
speaker = "リップル"
# 「カイチョーとフィオナ、とっても、とっても仲良しサンでーす。イイんですよ、水遊びで勝敗を付けテモ」
line = "「カイチョーとフィオナ、とっても、とっても仲良しサンでーす。イイんですよ、水遊びで勝敗を付けテモ」"

[[dialogue]]
speaker = "フィオナ"
# 「あはは、はは……もちろんリップルさんのことは忘れていませんよ」
line = "「あはは、はは……もちろんリップルさんのことは忘れていませんよ」"

[[dialogue]]
speaker = "フィオナ"
# 「ではサーフィン勝負を始めましょうっ。負けても恨みっこなしです」
line = "「ではサーフィン勝負を始めましょうっ。負けても恨みっこなしです」"

[[dialogue]]
speaker = "リップル"
# 「ハイハーイ！　負けた方は勝った方の言うことをひとつ聞く、というのはどうデスカ？」
line = "「ハイハーイ！　負けた方は勝った方の言うことをひとつ聞く、というのはどうデスカ？」"

[[dialogue]]
speaker = "フィオナ"
# 「いいですね。その提案、乗りました」
line = "「いいですね。その提案、乗りました」"

[[dialogue]]
speaker = "フィオナ"
# 「だって、何かが懸かっている方が勝負は燃えるじゃないですか。それとも……緋宮会長は私に勝つ自信がないんですか？」
line = "「だって、何かが懸かっている方が勝負は燃えるじゃないですか。それとも……緋宮会長は私に勝つ自信がないんですか？」"

[[dialogue]]
speaker = "unk"
# そこまで言うならやってやる！
line = "そこまで言うならやってやる！"

[[dialogue]]
speaker = "フィオナ"
# 「ふふ。では私から行かせてもらいます。波が来て……もう少し……今です！」
line = "「ふふ。では私から行かせてもらいます。波が来て……もう少し……今です！」"

[[dialogue]]
speaker = "リップル"
# 「ベストタイミング！　波を掴みマシた！」
line = "「ベストタイミング！　波を掴みマシた！」"

[[dialogue]]
speaker = "フィオナ"
# 「アップスライドで勢いを保って……このまま……」
line = "「アップスライドで勢いを保って……このまま……」"

[[dialogue]]
speaker = "リップル"
# 「おお、ノーズライディング！　ボードの先端に乗る高難度技です！　そこから元のポジションに戻って……得意のエアリエル！　スバラシイです！」
line = "「おお、ノーズライディング！　ボードの先端に乗る高難度技です！　そこから元のポジションに戻って……得意のエアリエル！　スバラシイです！」"

[[dialogue]]
speaker = "フィオナ"
# 「ふぅ……今の自分の全てが出せたと思います」
line = "「ふぅ……今の自分の全てが出せたと思います」"

[[dialogue]]
speaker = "リップル"
# 「カイチョー、今のフィオナに勝つのはムズカシイですよ～？　覚悟はイイですか？　では……ゴー！」
line = "「カイチョー、今のフィオナに勝つのはムズカシイですよ～？　覚悟はイイですか？　では……ゴー！」"

[[dialogue]]
speaker = "フィオナ"
# 「まずは波に乗って、ボトムターンで加速……手堅い立ち上がりです」
line = "「まずは波に乗って、ボトムターンで加速……手堅い立ち上がりです」"

[[dialogue]]
speaker = "リップル"
# 「カットバックで方向転換して……波のトップでオフザリップ！　これはいい勝負に──おおっと、大波が来ましたよ～！　カイチョーはどうシますか！？」
line = "「カットバックで方向転換して……波のトップでオフザリップ！　これはいい勝負に──おおっと、大波が来ましたよ～！　カイチョーはどうシますか！？」"

[[dialogue]]
speaker = "フィオナ"
# 「ここでチューブライディング！？　波のトンネルを抜ける大技を……！？」
line = "「ここでチューブライディング！？　波のトンネルを抜ける大技を……！？」"

[[dialogue]]
speaker = "リップル"
# 「ワオ♪　ＢＩＧマーベラス！　カイチョーの勝ちでーす！」
line = "「ワオ♪　ＢＩＧマーベラス！　カイチョーの勝ちでーす！」"

[[dialogue]]
speaker = "フィオナ"
# 「これは素直に負けを認めざるを得ませんね。おみそれしました」
line = "「これは素直に負けを認めざるを得ませんね。おみそれしました」"

[[dialogue]]
speaker = "unk"
# まぐれだけどなんとかなった……
line = "まぐれだけどなんとかなった……"

[[dialogue]]
speaker = "フィオナ"
# 「いいえ、きっと実力ですよ。ところで勝った方の言うことを聞くという約束は……あら、考えてなかったって顔ですね」
line = "「いいえ、きっと実力ですよ。ところで勝った方の言うことを聞くという約束は……あら、考えてなかったって顔ですね」"

[[dialogue]]
speaker = "フィオナ"
# 「私は逃げませんので、どうしたいか考えておいてくださいね」
line = "「私は逃げませんので、どうしたいか考えておいてくださいね」"
