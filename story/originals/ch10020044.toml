[[dialogue]]
speaker = "unk"
# 第４話,サーシャと遊園地デート,P
line = "第４話,サーシャと遊園地デート,P"

[[dialogue]]
speaker = "unk"
# サーシャさんと恋人になってからというもの、俺たちは色々なところを訪れてきた。
line = "サーシャさんと恋人になってからというもの、俺たちは色々なところを訪れてきた。"

[[dialogue]]
speaker = "unk"
# 好奇心旺盛で、まだ見ぬ景色に触れることを何よりの喜びとするサーシャさん。そんな彼女の今日のリクエストは遊園地だった。
line = "好奇心旺盛で、まだ見ぬ景色に触れることを何よりの喜びとするサーシャさん。そんな彼女の今日のリクエストは遊園地だった。"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「あ～ん♪　ジェットコースター、すごい迫力だったわね～」
line = "「あ～ん♪　ジェットコースター、すごい迫力だったわね～」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「──ぁ、ＤＩＳＣのアプリに写真が届いたみたい。ふぅん、一番長い坂を走ってた時の写真を撮ってもらえるのね～」
line = "「──ぁ、ＤＩＳＣのアプリに写真が届いたみたい。ふぅん、一番長い坂を走ってた時の写真を撮ってもらえるのね～」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「うふふ、会長くんのはしゃいでいるお顔、よく写ってるわ～<emoji=heart04>」
line = "「うふふ、会長くんのはしゃいでいるお顔、よく写ってるわ～<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ニコニコしながら俺を見てる！？
line = "ニコニコしながら俺を見てる！？"

[[dialogue]]
speaker = "unk"
# サーシャさんは──
line = "サーシャさんは──"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「会長くんがどんなお顔してるのか興味があって～。うふふ♪　わ～、って叫んでるお顔も可愛かったわ～♪」
line = "「会長くんがどんなお顔してるのか興味があって～。うふふ♪　わ～、って叫んでるお顔も可愛かったわ～♪」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「ねぇ会長くん。次はどのアトラクションに行きましょうか？」
line = "「ねぇ会長くん。次はどのアトラクションに行きましょうか？」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「……お化け屋敷？　いいわね、怖いのもびっくりするのも大好きよ～、私」
line = "「……お化け屋敷？　いいわね、怖いのもびっくりするのも大好きよ～、私」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「すごいわね～、本物の廃病院を改造して作った、この国で最長の長さのホラーアトラクションですって～♪」
line = "「すごいわね～、本物の廃病院を改造して作った、この国で最長の長さのホラーアトラクションですって～♪」"

[[dialogue]]
speaker = "unk"
# 途中で脱落もＯＫみたいです
line = "途中で脱落もＯＫみたいです"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「本当ね。ギブアップできる非常口がいくつも……これは何としてもゴールまで行きたいわね♪」
line = "「本当ね。ギブアップできる非常口がいくつも……これは何としてもゴールまで行きたいわね♪」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「中は暗いでしょうし、はぐれないように手を繋いでいきましょうか♪」
line = "「中は暗いでしょうし、はぐれないように手を繋いでいきましょうか♪」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「ひんやり寒くて、すごく雰囲気が出てるわね～♪」
line = "「ひんやり寒くて、すごく雰囲気が出てるわね～♪」"

[[dialogue]]
speaker = "unk"
# けっこう平気そうですね！？
line = "けっこう平気そうですね！？"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「まあ、本物の魔界に比べたら、魔獣もいないし～」
line = "「まあ、本物の魔界に比べたら、魔獣もいないし～」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「……あれ。今あそこで何か動いたような？」
line = "「……あれ。今あそこで何か動いたような？」"

[[dialogue]]
speaker = "幽霊"
# 「ァァァァァアアア────！！」
line = "「ァァァァァアアア────！！」"

[[dialogue]]
speaker = "unk"
# ──うわあああああ！？
line = "──うわあああああ！？"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「あ～ん、こわ～い♪」
line = "「あ～ん、こわ～い♪」"

[[dialogue]]
speaker = "unk"
# やっぱり平気そうですね！？
line = "やっぱり平気そうですね！？"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「だって、気配が丸わかりだから～……うふふ。会長くん、急に驚かされるのは苦手な感じかしら～？」
line = "「だって、気配が丸わかりだから～……うふふ。会長くん、急に驚かされるのは苦手な感じかしら～？」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「大丈夫よ～、お姉ちゃんが傍についてるからね～<emoji=heart04>」
line = "「大丈夫よ～、お姉ちゃんが傍についてるからね～<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 想像以上に恐ろしいお化け屋敷だったのだが、サーシャさんは相変わらずニコニコペースを崩さないのだった──
line = "想像以上に恐ろしいお化け屋敷だったのだが、サーシャさんは相変わらずニコニコペースを崩さないのだった──"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「とっても楽しかったわね～、遊園地♪　魔界にはこういうアトラクションがないから新鮮だったわ～」
line = "「とっても楽しかったわね～、遊園地♪　魔界にはこういうアトラクションがないから新鮮だったわ～」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「もうすぐ陽も落ちちゃうけれど……最後に観覧車に乗っていきましょうか？」
line = "「もうすぐ陽も落ちちゃうけれど……最後に観覧車に乗っていきましょうか？」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「ええ。行きましょう～♪」
line = "「ええ。行きましょう～♪」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「ずいぶん高いところまで上がるのね～。見て見て、あそこ。私たちがやって来た駅が見えるわ～♪」
line = "「ずいぶん高いところまで上がるのね～。見て見て、あそこ。私たちがやって来た駅が見えるわ～♪」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「会長くん、今日はお姉ちゃんのリクエスト……遊園地デートに付き合ってくれて、ありがとうね♪」
line = "「会長くん、今日はお姉ちゃんのリクエスト……遊園地デートに付き合ってくれて、ありがとうね♪」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「人間界に留学してきた時から、行きたい場所ややりたいことはたくさんしてきた私だけど～……」
line = "「人間界に留学してきた時から、行きたい場所ややりたいことはたくさんしてきた私だけど～……」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「遊園地って実は来たことが無かったの。１人で来ても楽しい場所じゃないものね、こういうところ」
line = "「遊園地って実は来たことが無かったの。１人で来ても楽しい場所じゃないものね、こういうところ」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「ふふ♪　会長くんとお付き合いを始める前だったら、絶対に経験できなかった１日だったわ～♪」
line = "「ふふ♪　会長くんとお付き合いを始める前だったら、絶対に経験できなかった１日だったわ～♪」"

[[dialogue]]
speaker = "unk"
# 俺も楽しかったです
line = "俺も楽しかったです"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「うん、そう言ってもらえると、お姉ちゃんも嬉しい<emoji=heart04>」
line = "「うん、そう言ってもらえると、お姉ちゃんも嬉しい<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「……ねえ、会長くん。ちょっと前に私が言ったこと、覚えてるかしら？」
line = "「……ねえ、会長くん。ちょっと前に私が言ったこと、覚えてるかしら？」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「私が新星学園を卒業したら、今度は天界を冒険してみたい、ってやつ」
line = "「私が新星学園を卒業したら、今度は天界を冒険してみたい、ってやつ」"

[[dialogue]]
speaker = "unk"
# ついて行きたい、とも言いました
line = "ついて行きたい、とも言いました"

[[dialogue]]
speaker = "unk"
# もちろん覚えてますよ
line = "もちろん覚えてますよ"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「うん♪　それなんだけど……ちょっとだけ心境の変化があったから、報告させて？」
line = "「うん♪　それなんだけど……ちょっとだけ心境の変化があったから、報告させて？」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「天界にお出かけするのは、私が卒業して、すぐでなくてもいいかもって思うようになったの」
line = "「天界にお出かけするのは、私が卒業して、すぐでなくてもいいかもって思うようになったの」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「だって会長くんは、星徒会長で、魔王だから。まだまだやらなくちゃいけないことが、たくさんあるでしょう？」
line = "「だって会長くんは、星徒会長で、魔王だから。まだまだやらなくちゃいけないことが、たくさんあるでしょう？」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「世界が平和になって、会長くんが魔王としての責務から解放されたその時に、一緒にお出かけすればいいじゃないってね♪」
line = "「世界が平和になって、会長くんが魔王としての責務から解放されたその時に、一緒にお出かけすればいいじゃないってね♪」"

[[dialogue]]
speaker = "unk"
# いいんですか？
line = "いいんですか？"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「ええ。別に何十年も先になることでもないと思うし……それにね？」
line = "「ええ。別に何十年も先になることでもないと思うし……それにね？」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「きっと今日の遊園地みたいに、１人よりも、２人で一緒に触れた方が楽しめるものって、いっぱいあると思うのよ」
line = "「きっと今日の遊園地みたいに、１人よりも、２人で一緒に触れた方が楽しめるものって、いっぱいあると思うのよ」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「だから……あなたが魔王としてのお役目を終えるまでは、傍で支えてあげたいなって」
line = "「だから……あなたが魔王としてのお役目を終えるまでは、傍で支えてあげたいなって」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「ふふ♪　人間界に留学を決めた時……ソフィに相談もしなかった頃の私と比べたら、随分な変わりようよね？」
line = "「ふふ♪　人間界に留学を決めた時……ソフィに相談もしなかった頃の私と比べたら、随分な変わりようよね？」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「でも、これが今の私の正直な気持ちなの。会長くんと出会って、仲良くなって……誰かと一緒にいる幸せを教えてもらったから」
line = "「でも、これが今の私の正直な気持ちなの。会長くんと出会って、仲良くなって……誰かと一緒にいる幸せを教えてもらったから」"

[[dialogue]]
speaker = "unk"
# サーシャさんにずっとそばにいて欲しい
line = "サーシャさんにずっとそばにいて欲しい"

[[dialogue]]
speaker = "unk"
# 俺も同じ気持ちです
line = "俺も同じ気持ちです"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「ええ──ありがとう<emoji=heart04>　あなたにそう言ってもらえて、とっても嬉しいわ♪」
line = "「ええ──ありがとう<emoji=heart04>　あなたにそう言ってもらえて、とっても嬉しいわ♪」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「ぁ──もうすぐ観覧車、下に着いちゃうわね。今のうちに……<emoji=heart04>」
line = "「ぁ──もうすぐ観覧車、下に着いちゃうわね。今のうちに……<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「ん……ちゅっ<emoji=heart04>」
line = "「ん……ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「ずっと、ず～っと、一緒にいましょうね？　大好きよ、会長くん<emoji=heart04>」
line = "「ずっと、ず～っと、一緒にいましょうね？　大好きよ、会長くん<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 幸せそうに微笑むサーシャさんに、俺も同じ気持ちであることを伝えるため、お返しのキスをするのだった──
line = "幸せそうに微笑むサーシャさんに、俺も同じ気持ちであることを伝えるため、お返しのキスをするのだった──"
