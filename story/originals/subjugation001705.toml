[[dialogue]]
speaker = "ロクサーナ"
# 「ここからクライマックスまでの流れを、通しでやる！　よーい……アクション！」
line = "「ここからクライマックスまでの流れを、通しでやる！　よーい……アクション！」"

[[dialogue]]
speaker = "ロクサーナ"
# 「キャピュレット夫人の甥ティボルトが、ロミオの親友であるマーキューシオを殺してしまった」
line = "「キャピュレット夫人の甥ティボルトが、ロミオの親友であるマーキューシオを殺してしまった」"

[[dialogue]]
speaker = "マーキューシオ"
# 「ぎゃー！　おのれ、ティボルトめー！　この恨み、はらさでおくべきかー！」
line = "「ぎゃー！　おのれ、ティボルトめー！　この恨み、はらさでおくべきかー！」"

[[dialogue]]
speaker = "ロクサーナ"
# 「親友のマーキューシオを失い、逆上したロミオはティボルトに反撃し、勢い余って殺めてしまう」
line = "「親友のマーキューシオを失い、逆上したロミオはティボルトに反撃し、勢い余って殺めてしまう」"

[[dialogue]]
speaker = "unk"
# マーキューシオ……仇は取ったぜ
line = "マーキューシオ……仇は取ったぜ"

[[dialogue]]
speaker = "ロクサーナ"
# 「だが、仇討ちは新たな悲しみを産むだけだ。殺人の大罪人となったロミオは、ヴェローナから永久追放された」
line = "「だが、仇討ちは新たな悲しみを産むだけだ。殺人の大罪人となったロミオは、ヴェローナから永久追放された」"

[[dialogue]]
speaker = "ジュリエット"
# 「ロミオ様が殺人犯に……！？　ヴェローナから永久追放されたですって……！？　そんな……ヨヨヨ」
line = "「ロミオ様が殺人犯に……！？　ヴェローナから永久追放されたですって……！？　そんな……ヨヨヨ」"

[[dialogue]]
speaker = "ロクサーナ"
# 「もうロミオとは二度と会えぬと悲しみに暮れるジュリエット。そして、父・キャピュレットは望まぬ政略結婚をジュリエットに命じる」
line = "「もうロミオとは二度と会えぬと悲しみに暮れるジュリエット。そして、父・キャピュレットは望まぬ政略結婚をジュリエットに命じる」"

[[dialogue]]
speaker = "ジュリエット"
# 「嫌よ、絶対に嫌！　ロミオ様以外の人と結ばれるなんて！」
line = "「嫌よ、絶対に嫌！　ロミオ様以外の人と結ばれるなんて！」"

[[dialogue]]
speaker = "ロクサーナ"
# 「彼女は何とかしてこの話から逃れようと、ロレンス神父に助けを求める。そして、ロレンスはジュリエットに」
line = "「彼女は何とかしてこの話から逃れようと、ロレンス神父に助けを求める。そして、ロレンスはジュリエットに」"

[[dialogue]]
speaker = "ロレンス神父"
# 「２時間仮死状態になる薬を飲み、死者として霊廟に埋葬され、目覚めたところに、知らせを受けて迎えに来たロミオと駆け落ちするがよいよいよい」
line = "「２時間仮死状態になる薬を飲み、死者として霊廟に埋葬され、目覚めたところに、知らせを受けて迎えに来たロミオと駆け落ちするがよいよいよい」"

[[dialogue]]
speaker = "ロクサーナ"
# 「──という命がけの策を持ちかけた。まったく無茶をする」
line = "「──という命がけの策を持ちかけた。まったく無茶をする」"

[[dialogue]]
speaker = "ロクサーナ"
# 「パリスとの結婚式の前夜、死の危険をも覚悟し、ジュリエットは仮死の薬をぐいっと一気に飲み干す」
line = "「パリスとの結婚式の前夜、死の危険をも覚悟し、ジュリエットは仮死の薬をぐいっと一気に飲み干す」"

[[dialogue]]
speaker = "ジュリエット"
# 「これを飲めば、目覚めた時、私はロミオ様とともに生きることができるのね……ぐび、ぐびっ……うぅぅぅ……がくっ」
line = "「これを飲めば、目覚めた時、私はロミオ様とともに生きることができるのね……ぐび、ぐびっ……うぅぅぅ……がくっ」"

[[dialogue]]
speaker = "ロクサーナ"
# 「ロレンスの思惑通り、仮死状態になったジュリエット。翌日、キャピレット家では服毒死したと思われた娘の最期を嘆く葬儀が行われた」
line = "「ロレンスの思惑通り、仮死状態になったジュリエット。翌日、キャピレット家では服毒死したと思われた娘の最期を嘆く葬儀が行われた」"

[[dialogue]]
speaker = "メイプル"
# 「火葬とか土葬じゃなくて良かったね～」
line = "「火葬とか土葬じゃなくて良かったね～」"

[[dialogue]]
speaker = "ロクサーナ"
# 「変わり果てた姿のジュリエットと再会したロミオは、彼女の後を追って毒を飲み、息絶えた。こっちは本物の毒だ」
line = "「変わり果てた姿のジュリエットと再会したロミオは、彼女の後を追って毒を飲み、息絶えた。こっちは本物の毒だ」"

[[dialogue]]
speaker = "unk"
# 君がいない世界なんて考えられない……
俺も後を追うよ……ぐび、ぐび……がふっ！？
line = "君がいない世界なんて考えられない……\n俺も後を追うよ……ぐび、ぐび……がふっ！？"

[[dialogue]]
speaker = "メイプル"
# 「ちなみに今、お兄ちゃんが飲んだのは、死ぬほど苦～い罰ゲーム用のお茶だよ♪」
line = "「ちなみに今、お兄ちゃんが飲んだのは、死ぬほど苦～い罰ゲーム用のお茶だよ♪」"

[[dialogue]]
speaker = "unk"
# （こんなところに凝らなくても……マッズぅ）
line = "（こんなところに凝らなくても……マッズぅ）"

[[dialogue]]
speaker = "ロクサーナ"
# 「その直後、ジュリエットが目を覚ますと、すぐ傍でロミオが息絶えていた」
line = "「その直後、ジュリエットが目を覚ますと、すぐ傍でロミオが息絶えていた」"

[[dialogue]]
speaker = "ジュリエット"
# 「まあ、なんてこと！？　ロミオ様！　ロミオ様！？」
line = "「まあ、なんてこと！？　ロミオ様！　ロミオ様！？」"

[[dialogue]]
speaker = "ロクサーナ"
# 「そのロミオを見て、ジュリエットは事の成り行きを悟った」
line = "「そのロミオを見て、ジュリエットは事の成り行きを悟った」"

[[dialogue]]
speaker = "ジュリエット"
# 「はっ！　つまり、私が本当に死んだと思い込んで、後を追ってしまわれたのですね！？」
line = "「はっ！　つまり、私が本当に死んだと思い込んで、後を追ってしまわれたのですね！？」"

[[dialogue]]
speaker = "メイプル"
# 「察しが良すぎるね～」
line = "「察しが良すぎるね～」"

[[dialogue]]
speaker = "ロクサーナ"
# 「ジュリエットはロミオの持っていた短剣で自害し、彼の後を追った」
line = "「ジュリエットはロミオの持っていた短剣で自害し、彼の後を追った」"

[[dialogue]]
speaker = "ジュリエット"
# 「ああ、なんてこと！　ロミオ様のいないこの世界で、生き続けても仕方ありませんわ……私もあなたの剣で後を追います」
line = "「ああ、なんてこと！　ロミオ様のいないこの世界で、生き続けても仕方ありませんわ……私もあなたの剣で後を追います」"

[[dialogue]]
speaker = "ジュリエット"
# 「せめて、天国では一緒に……」
line = "「せめて、天国では一緒に……」"

[[dialogue]]
speaker = "ジュリエット"
# 「ぐふっ……ぱたり」
line = "「ぐふっ……ぱたり」"

[[dialogue]]
speaker = "メイプル"
# 「思い切りが良すぎるね～」
line = "「思い切りが良すぎるね～」"

[[dialogue]]
speaker = "ロクサーナ"
# 「両家の争いは、若い彼らを死に追いやった。息子と娘の死を悔やみ、両家は和解を誓い合ったのである」
line = "「両家の争いは、若い彼らを死に追いやった。息子と娘の死を悔やみ、両家は和解を誓い合ったのである」"

[[dialogue]]
speaker = "メイプル"
# 「めでたし、めでたし」
line = "「めでたし、めでたし」"

[[dialogue]]
speaker = "unk"
# めでたくはないね
line = "めでたくはないね"

[[dialogue]]
speaker = "藍"
# 「うう……悲しいお話です……」
line = "「うう……悲しいお話です……」"

[[dialogue]]
speaker = "ロクサーナ"
# 「穴が開くほど読んだ、今やどこにでもある結末だ。今更、涙するようなものでもない」
line = "「穴が開くほど読んだ、今やどこにでもある結末だ。今更、涙するようなものでもない」"

[[dialogue]]
speaker = "ロクサーナ"
# 「使い古されていて新鮮味はないが、王道とはそういうものだ。本作から着想を得た後世の作品も無数に存在する」
line = "「使い古されていて新鮮味はないが、王道とはそういうものだ。本作から着想を得た後世の作品も無数に存在する」"

[[dialogue]]
speaker = "ロクサーナ"
# 「……うむ。後半はほぼ２人の接触がないから、問題ない。そのすれ違いこそが、涙を誘う肝なのだが」
line = "「……うむ。後半はほぼ２人の接触がないから、問題ない。そのすれ違いこそが、涙を誘う肝なのだが」"

[[dialogue]]
speaker = "ロクサーナ"
# 「やはり肉体接触のある中盤が大問題だ。そこを克服するには──よし、会長、藍」
line = "「やはり肉体接触のある中盤が大問題だ。そこを克服するには──よし、会長、藍」"

[[dialogue]]
speaker = "藍"
# 「は、はい」
line = "「は、はい」"

[[dialogue]]
speaker = "ロクサーナ"
# 「今週末、２人でデートしろ。部長命令だ」
line = "「今週末、２人でデートしろ。部長命令だ」"

[[dialogue]]
speaker = "藍"
# 「えぇえぇぇぇっ！？」
line = "「えぇえぇぇぇっ！？」"

[[dialogue]]
speaker = "藍"
# 「か、会長さんとデートしろだなんて……部長はいつも無茶振りばかりなんです……うぅ……」
line = "「か、会長さんとデートしろだなんて……部長はいつも無茶振りばかりなんです……うぅ……」"

[[dialogue]]
speaker = "unk"
# 嫌なら無茶しなくても
line = "嫌なら無茶しなくても"

[[dialogue]]
speaker = "藍"
# 「い、嫌ではないです……よ？　お芝居を仕事にする以上、男性恐怖症もいつかは克服しなきゃって思ってますし……」
line = "「い、嫌ではないです……よ？　お芝居を仕事にする以上、男性恐怖症もいつかは克服しなきゃって思ってますし……」"

[[dialogue]]
speaker = "藍"
# 「会長さんの貴重なお時間を、私とのデートなんかで使わせちゃうのが……ご迷惑かなって……」
line = "「会長さんの貴重なお時間を、私とのデートなんかで使わせちゃうのが……ご迷惑かなって……」"

[[dialogue]]
speaker = "藍"
# 「会長さん、退屈しちゃいます……私といても面白くないと思いますよ……？」
line = "「会長さん、退屈しちゃいます……私といても面白くないと思いますよ……？」"

[[dialogue]]
speaker = "unk"
# そんなことないと思うけど
line = "そんなことないと思うけど"

[[dialogue]]
speaker = "藍"
# 「ダメです、ダメです。今だってまっすぐ目も合わせられないですし……演劇のことくらいしか話せないですし、私なんて欠点だらけなんですから」
line = "「ダメです、ダメです。今だってまっすぐ目も合わせられないですし……演劇のことくらいしか話せないですし、私なんて欠点だらけなんですから」"

[[dialogue]]
speaker = "藍"
# 「で、でも、でもでも、そ、それでもいいというのでしたら……その……」
line = "「で、でも、でもでも、そ、それでもいいというのでしたら……その……」"

[[dialogue]]
speaker = "藍"
# 「会長さんとデート……男の人と初デートして、みたいです……私と、デート、してくれます、か……？」
line = "「会長さんとデート……男の人と初デートして、みたいです……私と、デート、してくれます、か……？」"

[[dialogue]]
speaker = "unk"
# もちろん
よろしくね、藍
line = "もちろん\nよろしくね、藍"

[[dialogue]]
speaker = "藍"
# 「は、はいっ！　よろしくお願い、します……！」
line = "「は、はいっ！　よろしくお願い、します……！」"
