[[dialogue]]
speaker = "unk"
# 第２話,ルリエルと海デート～お昼間編～,P
line = "第２話,ルリエルと海デート～お昼間編～,P"

[[dialogue]]
speaker = "ルリエル"
# 「バシャバシャ～！　バシャシャ～！」
line = "「バシャバシャ～！　バシャシャ～！」"

[[dialogue]]
speaker = "ルリエル"
# 「ぷはぁっ……！　ゴールなのですっ！」
line = "「ぷはぁっ……！　ゴールなのですっ！」"

[[dialogue]]
speaker = "ルリエル"
# 「えへへ、どうですかぁ？　だいぶ上達してきたと思いません？　バタ足はもう完璧にマスターしちゃいましたよ」
line = "「えへへ、どうですかぁ？　だいぶ上達してきたと思いません？　バタ足はもう完璧にマスターしちゃいましたよ」"

[[dialogue]]
speaker = "ルリエル"
# 「やっぱり会長さんがゴールになってくれると頑張れちゃいますね。絶対に会長さんのところまで辿り着こうって思いますから」
line = "「やっぱり会長さんがゴールになってくれると頑張れちゃいますね。絶対に会長さんのところまで辿り着こうって思いますから」"

[[dialogue]]
speaker = "ルリエル"
# 「でも、たくさん泳いだので疲れちゃいました。浮いてる余裕もないので、ぎゅ～っと抱き締めて浮き輪の代わりになってくれませんか？」
line = "「でも、たくさん泳いだので疲れちゃいました。浮いてる余裕もないので、ぎゅ～っと抱き締めて浮き輪の代わりになってくれませんか？」"

[[dialogue]]
speaker = "unk"
# 甘えんぼさんめ
line = "甘えんぼさんめ"

[[dialogue]]
speaker = "ルリエル"
# 「ふぁん……えへへ、違いますよぉ。会長さんがわたしの足が付かない場所まで泳がせるからじゃないですかぁ」
line = "「ふぁん……えへへ、違いますよぉ。会長さんがわたしの足が付かない場所まで泳がせるからじゃないですかぁ」"

[[dialogue]]
speaker = "ルリエル"
# 「会長さんこそ、わざとこんな場所まで泳がせたんじゃないですか？　わたしに抱きついてもらうために、自分だけが足の付くところをゴールにして」
line = "「会長さんこそ、わざとこんな場所まで泳がせたんじゃないですか？　わたしに抱きついてもらうために、自分だけが足の付くところをゴールにして」"

[[dialogue]]
speaker = "ルリエル"
# 「前より沖の方に出ちゃってますし……もしかしなくても、わたしと２人きりになりたかったんじゃないですか？」
line = "「前より沖の方に出ちゃってますし……もしかしなくても、わたしと２人きりになりたかったんじゃないですか？」"

[[dialogue]]
speaker = "ルリエル"
# 「えへへ、図星ですか？　図星でしょう！　えいえいっ、もーっとくっついてあげちゃいますぅ～！」
line = "「えへへ、図星ですか？　図星でしょう！　えいえいっ、もーっとくっついてあげちゃいますぅ～！」"

[[dialogue]]
speaker = "unk"
# わわわ、溺れる溺れる
line = "わわわ、溺れる溺れる"

[[dialogue]]
speaker = "ルリエル"
# 「ちょっと～、重そうに聞こえる発言はＮＧですよ。そこは軽い軽いって持ち上げてくれないとです」
line = "「ちょっと～、重そうに聞こえる発言はＮＧですよ。そこは軽い軽いって持ち上げてくれないとです」"

[[dialogue]]
speaker = "ルリエル"
# 「でもでも、海ってやっぱり楽しいですね？　プカプカ浮いてるだけでも気持ちいいですし」
line = "「でもでも、海ってやっぱり楽しいですね？　プカプカ浮いてるだけでも気持ちいいですし」"

[[dialogue]]
speaker = "ルリエル"
# 「それに、とーっても静かで……。まるで世界にわたしと会長さんしかいないような気分になっちゃいます」
line = "「それに、とーっても静かで……。まるで世界にわたしと会長さんしかいないような気分になっちゃいます」"

[[dialogue]]
speaker = "ルリエル"
# 「ビーチにいる人たちも、わたしたちのことなんて気にしてないでしょうしね。こーして、くっついてたら……ん。１人で泳いでるのか２人で泳いでるのかもわからなそうです」
line = "「ビーチにいる人たちも、わたしたちのことなんて気にしてないでしょうしね。こーして、くっついてたら……ん。１人で泳いでるのか２人で泳いでるのかもわからなそうです」"

[[dialogue]]
speaker = "unk"
# ルリエルならすっぽり胸の中に収まるしな
line = "ルリエルならすっぽり胸の中に収まるしな"

[[dialogue]]
speaker = "ルリエル"
# 「ふふ、すっぽり収めて何をするつもりなんですか？　一応お外ですよ、ここ」
line = "「ふふ、すっぽり収めて何をするつもりなんですか？　一応お外ですよ、ここ」"

[[dialogue]]
speaker = "ルリエル"
# 「さっきから、抱っこする振りしてお尻もスリスリされちゃってるような気もしますし……。エッチな彼氏さんですぅ……」
line = "「さっきから、抱っこする振りしてお尻もスリスリされちゃってるような気もしますし……。エッチな彼氏さんですぅ……」"

[[dialogue]]
speaker = "ルリエル"
# 「だけど、嬉しいです……。イチャイチャしたくなっちゃいます……」
line = "「だけど、嬉しいです……。イチャイチャしたくなっちゃいます……」"

[[dialogue]]
speaker = "ルリエル"
# 「もっとお顔近づけてください。キスしたくなっちゃいました……」
line = "「もっとお顔近づけてください。キスしたくなっちゃいました……」"

[[dialogue]]
speaker = "ルリエル"
# 「ちゅっ……んっ……んちゅっ……んんっ……<emoji=heart04>」
line = "「ちゅっ……んっ……んちゅっ……んんっ……<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
# 「えへへ……塩からいです<emoji=heart04>」
line = "「えへへ……塩からいです<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# もう少しだけ遠くまで泳いでみる？
line = "もう少しだけ遠くまで泳いでみる？"

[[dialogue]]
speaker = "ルリエル"
# 「……溺れさせないでくださいよ？　前に溺れかけちゃった時は、もー海なんかこりごりだーって思っちゃったんですから」
line = "「……溺れさせないでくださいよ？　前に溺れかけちゃった時は、もー海なんかこりごりだーって思っちゃったんですから」"

[[dialogue]]
speaker = "ルリエル"
# 「会長さんに溺れる分には……んっ、ちゅっ<emoji=heart04>　えへへ、構わないですけど……<emoji=heart04>」
line = "「会長さんに溺れる分には……んっ、ちゅっ<emoji=heart04>　えへへ、構わないですけど……<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
# 「ほら早く……もっと人気のない場所まで連れていってください？　なんならそこで、キスよりもーっと恋人らしいことも──」
line = "「ほら早く……もっと人気のない場所まで連れていってください？　なんならそこで、キスよりもーっと恋人らしいことも──」"

[[dialogue]]
speaker = "イクシリオン"
# 「おふたりともっ、ご無事ですかっ！？」
line = "「おふたりともっ、ご無事ですかっ！？」"

[[dialogue]]
speaker = "ルリエル"
# 「ひぃあっ！？　イ、イクシーさんっ！？」
line = "「ひぃあっ！？　イ、イクシーさんっ！？」"

[[dialogue]]
speaker = "イクシリオン"
# 「もう大丈夫ですよっ、掴まってくださいっ──って、あれ？　溺れてる様子はありませんね？　岸から見た時は確かに──……あっ！」
line = "「もう大丈夫ですよっ、掴まってくださいっ──って、あれ？　溺れてる様子はありませんね？　岸から見た時は確かに──……あっ！」"

[[dialogue]]
speaker = "ルリエル"
# 「ふぇっ！？　ど、どうしたんですかぁ？　何もしてませんよぉ？　わたしたちはただ、水泳の特訓をしていただけですからっ……！」
line = "「ふぇっ！？　ど、どうしたんですかぁ？　何もしてませんよぉ？　わたしたちはただ、水泳の特訓をしていただけですからっ……！」"

[[dialogue]]
speaker = "イクシリオン"
# 「コ、コホン。すみません、私の早とちりでおふたりの濃厚なイチャイチャタイムを邪魔してしまったようですね」
line = "「コ、コホン。すみません、私の早とちりでおふたりの濃厚なイチャイチャタイムを邪魔してしまったようですね」"

[[dialogue]]
speaker = "イクシリオン"
# 「ちなみにですが……この辺りは無人の小島が多く点在していて、恋人の方々はそちらへ向かわれるそうですよ。ここからならあちらの島が近いと思います」
line = "「ちなみにですが……この辺りは無人の小島が多く点在していて、恋人の方々はそちらへ向かわれるそうですよ。ここからならあちらの島が近いと思います」"

[[dialogue]]
speaker = "ルリエル"
# 「妙な気遣いしないでください！？」
line = "「妙な気遣いしないでください！？」"

[[dialogue]]
speaker = "イクシリオン"
# 「もしも疲れてビーチへ戻れなくなってしまった際は連絡してくださいね……？　そ、それでは……！」
line = "「もしも疲れてビーチへ戻れなくなってしまった際は連絡してくださいね……？　そ、それでは……！」"

[[dialogue]]
speaker = "ルリエル"
# 「ですからわたしたちは──って、行ってしまいました」
line = "「ですからわたしたちは──って、行ってしまいました」"

[[dialogue]]
speaker = "ルリエル"
# 「……それより、どうします？　教えてもらった小島行ってみますか……？」
line = "「……それより、どうします？　教えてもらった小島行ってみますか……？」"

[[dialogue]]
speaker = "ルリエル"
# 「会長さんが行きたいって言うなら、その……。行くのもやぶさかではありませんけど……」
line = "「会長さんが行きたいって言うなら、その……。行くのもやぶさかではありませんけど……」"

[[dialogue]]
speaker = "unk"
# 海より人気も……なさそうだしな
line = "海より人気も……なさそうだしな"

[[dialogue]]
speaker = "ルリエル"
# 「そ、そうですね。じゃあ、えへへ、そこでゆっくり──……」
line = "「そ、そうですね。じゃあ、えへへ、そこでゆっくり──……」"

[[dialogue]]
speaker = "イクシリオン"
# 「はあぁ……恋人と２人きりの無人島、きっと戻ってこられる時には２人揃って水着の下まで日焼けしておられて……」
line = "「はあぁ……恋人と２人きりの無人島、きっと戻ってこられる時には２人揃って水着の下まで日焼けしておられて……」"

[[dialogue]]
speaker = "ルリエル"
# 「～～っっ！？　どうしてまだいるんですかぁ！？　戻ったんじゃなかったんですかっ！？」
line = "「～～っっ！？　どうしてまだいるんですかぁ！？　戻ったんじゃなかったんですかっ！？」"

[[dialogue]]
speaker = "イクシリオン"
# 「ぶ、無事におふたりが無人島に辿り着くのを見送ってから戻ろうと思いまして。これもライフセーバーとしての務めですから……！」
line = "「ぶ、無事におふたりが無人島に辿り着くのを見送ってから戻ろうと思いまして。これもライフセーバーとしての務めですから……！」"

[[dialogue]]
speaker = "ルリエル"
# 「そんなにジロジロ見られて行けるわけないじゃないですかぁっ。というか、そもそも無人島になんて行くつもりありませんしっ……！」
line = "「そんなにジロジロ見られて行けるわけないじゃないですかぁっ。というか、そもそも無人島になんて行くつもりありませんしっ……！」"

[[dialogue]]
speaker = "イクシリオン"
# 「今にも向かおうとしていたではありませんか。私のことはその辺のヒトデか何かだと思って、気にせず向かってください……」
line = "「今にも向かおうとしていたではありませんか。私のことはその辺のヒトデか何かだと思って、気にせず向かってください……」"

[[dialogue]]
speaker = "ルリエル"
# 「き、岸に戻ろうとしてただけですっ。ほら行きましょう、会長さんっ……！　わたし、唐突にかき氷が食べたくなってきました……！」
line = "「き、岸に戻ろうとしてただけですっ。ほら行きましょう、会長さんっ……！　わたし、唐突にかき氷が食べたくなってきました……！」"

[[dialogue]]
speaker = "イクシリオン"
# 「あっ、そちらは危険ですっ。その辺りは急に水深が深くなっていて──」
line = "「あっ、そちらは危険ですっ。その辺りは急に水深が深くなっていて──」"

[[dialogue]]
speaker = "ルリエル"
# 「あぶっ！？　あぶぶぶぶぅぅっっ！！？　お、溺れっ……！！」
line = "「あぶっ！？　あぶぶぶぶぅぅっっ！！？　お、溺れっ……！！」"

[[dialogue]]
speaker = "イクシリオン"
# 「ルリエルさんっ！？」
line = "「ルリエルさんっ！？」"

[[dialogue]]
speaker = "ルリエル"
# 「うぅ～！　やっぱり海なんて、もうこりごりですよぉ～！！」
line = "「うぅ～！　やっぱり海なんて、もうこりごりですよぉ～！！」"
