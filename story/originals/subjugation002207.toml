[[dialogue]]
speaker = "unk"
# 新フォームに変身したジュエリーと、幻影へと変装したミネコの戦い。その勝敗の行方は――
line = "新フォームに変身したジュエリーと、幻影へと変装したミネコの戦い。その勝敗の行方は――"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「――チェックメイトだ。大怪盗フランボウ」
line = "「――チェックメイトだ。大怪盗フランボウ」"

[[dialogue]]
speaker = "ミネコ"
# 「かはっ！？　くっ……！」
line = "「かはっ！？　くっ……！」"

[[dialogue]]
speaker = "unk"
# ジュエリーの武器である宝石の弾丸に撃ち抜かれ、怪盗の幻影が消失する。
line = "ジュエリーの武器である宝石の弾丸に撃ち抜かれ、怪盗の幻影が消失する。"

[[dialogue]]
speaker = "unk"
# そこには、認識阻害の効果が剥がれたミネコの姿があった。
line = "そこには、認識阻害の効果が剥がれたミネコの姿があった。"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「それが、キミの本当の怪盗姿か。ミネコ・フランボワーズ」
line = "「それが、キミの本当の怪盗姿か。ミネコ・フランボワーズ」"

[[dialogue]]
speaker = "ミネコ"
# 「どうなってるの……！？　私の攻撃が全部、無効化されるなんて……！」
line = "「どうなってるの……！？　私の攻撃が全部、無効化されるなんて……！」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「簡単なことだよ。キミの動きを事前に予測して――」
line = "「簡単なことだよ。キミの動きを事前に予測して――」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「技が発動する前に、全て封じただけさ」
line = "「技が発動する前に、全て封じただけさ」"

[[dialogue]]
speaker = "ミネコ"
# 「そんなことが……！？」
line = "「そんなことが……！？」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「今までの私だったら無理だった。私は元々、戦闘があまり得意じゃない。戦いながらでは、思考速度が追いついて来なかったんだ」
line = "「今までの私だったら無理だった。私は元々、戦闘があまり得意じゃない。戦いながらでは、思考速度が追いついて来なかったんだ」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「しかし、このエクリプスフォームは、歴代の選星者『名探偵』が持っていた能力を引き出すことができる。ブラウン神父が持っていた『思考力』にも、な」
line = "「しかし、このエクリプスフォームは、歴代の選星者『名探偵』が持っていた能力を引き出すことができる。ブラウン神父が持っていた『思考力』にも、な」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「明解に換言するならば、私の『思考力』が以前とは比べ物にならない程に上がったんだよ。それによって、戦いながらでも冷静に思考できるようになった」
line = "「明解に換言するならば、私の『思考力』が以前とは比べ物にならない程に上がったんだよ。それによって、戦いながらでも冷静に思考できるようになった」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「言うなれば、『思考加速』。だから――」
line = "「言うなれば、『思考加速』。だから――」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「私が目の前にいる限り、キミはもう、何１つ星術を使うことはできないよ。私が全て、発動前に封殺するからね」
line = "「私が目の前にいる限り、キミはもう、何１つ星術を使うことはできないよ。私が全て、発動前に封殺するからね」"

[[dialogue]]
speaker = "ミネコ"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「さっきも言ったが……チェックメイトだ、フランボウ。大人しく捕まりたまえ」
line = "「さっきも言ったが……チェックメイトだ、フランボウ。大人しく捕まりたまえ」"

[[dialogue]]
speaker = "ミネコ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ミネコ"
# 「ふふっ……ふふふっ！」
line = "「ふふっ……ふふふっ！」"

[[dialogue]]
speaker = "ミネコ"
# 「まだだ。まだ終わってないよ、名探偵！　今のキミは確かに私の力を上回っている！　だけど、それは星術での話！」
line = "「まだだ。まだ終わってないよ、名探偵！　今のキミは確かに私の力を上回っている！　だけど、それは星術での話！」"

[[dialogue]]
speaker = "ミネコ"
# 「星力を上乗せした身体能力でなら――私はキミよりも速い！」
line = "「星力を上乗せした身体能力でなら――私はキミよりも速い！」"

[[dialogue]]
speaker = "unk"
# 次の瞬間、ミネコが全速力でジュエリーに向かって駆け出す。
line = "次の瞬間、ミネコが全速力でジュエリーに向かって駆け出す。"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「……！　まさか！」
line = "「……！　まさか！」"

[[dialogue]]
speaker = "unk"
# ミネコはそのままジュエリーを攻撃することなく、すれ違うように横を通り抜ける。
line = "ミネコはそのままジュエリーを攻撃することなく、すれ違うように横を通り抜ける。"

[[dialogue]]
speaker = "unk"
# 彼女が向かう先は、大聖堂の方向。
line = "彼女が向かう先は、大聖堂の方向。"

[[dialogue]]
speaker = "ミネコ"
# 「キミの前で星術が使えないというなら、逃げてから使えばいい！」
line = "「キミの前で星術が使えないというなら、逃げてから使えばいい！」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「待て、ミネコ！」
line = "「待て、ミネコ！」"

[[dialogue]]
speaker = "unk"
# ジュエリーもすかさず彼女を追って、大聖堂へと向かうのだった――
line = "ジュエリーもすかさず彼女を追って、大聖堂へと向かうのだった――"

[[dialogue]]
speaker = "unk"
# <ruby=ラーゴ・シエロ>鏡界の湖</ruby>まで飛ばされた俺は、飛行のみに全星力を注ぎ、ようやく学園まであと少しというところまで帰って来ていた。
line = "<ruby>鏡界の湖<rt>ラーゴ・シエロ</rt></ruby>まで飛ばされた俺は、飛行のみに全星力を注ぎ、ようやく学園まであと少しというところまで帰って来ていた。"

[[dialogue]]
speaker = "unk"
# そんな時、ＤＩＳＣにジュエリーから着信が入る。
line = "そんな時、ＤＩＳＣにジュエリーから着信が入る。"

[[dialogue]]
speaker = "unk"
# ジュエリー、大丈夫か！？
line = "ジュエリー、大丈夫か！？"

[[dialogue]]
speaker = "unk"
# 「ああ、私は大丈夫だ。だが、すまない、ミネコに大聖堂へ入られた。急いで来てくれ、助手……！」
line = "「ああ、私は大丈夫だ。だが、すまない、ミネコに大聖堂へ入られた。急いで来てくれ、助手……！」"

[[dialogue]]
speaker = "unk"
# それから、俺は急いで大聖堂へと向かった。
line = "それから、俺は急いで大聖堂へと向かった。"

[[dialogue]]
speaker = "unk"
# しかし、中へ入るとそこには太陽の壁画を守っているはずの、ヴィーナスや警察官の姿はなく――
line = "しかし、中へ入るとそこには太陽の壁画を守っているはずの、ヴィーナスや警察官の姿はなく――"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「ああ、よかった。戻って来たか、助手」
line = "「ああ、よかった。戻って来たか、助手」"

[[dialogue]]
speaker = "unk"
# １人待っていたジュエリーが、俺の方へ振り返る。
line = "１人待っていたジュエリーが、俺の方へ振り返る。"

[[dialogue]]
speaker = "unk"
# ……！　ヴィーナスたちは？
line = "……！　ヴィーナスたちは？"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「ああ、実は――ミネコの仕掛けで、この大聖堂自体に幻術がかけられているようだ。ヴィーナスさん達が見当たらないのはそのせいだろう」
line = "「ああ、実は――ミネコの仕掛けで、この大聖堂自体に幻術がかけられているようだ。ヴィーナスさん達が見当たらないのはそのせいだろう」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「しかし、キミが来るまでの間に幻術の仕組みは確かめておいたから、すぐにでも解くことはできる。しかし、大聖堂のどこかにミネコが潜伏しているはずだ」
line = "「しかし、キミが来るまでの間に幻術の仕組みは確かめておいたから、すぐにでも解くことはできる。しかし、大聖堂のどこかにミネコが潜伏しているはずだ」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「本当の大聖堂に戻ったら、太陽の壁画の状態を確認しよう」
line = "「本当の大聖堂に戻ったら、太陽の壁画の状態を確認しよう」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「準備はいいかい？　助手」
line = "「準備はいいかい？　助手」"

[[dialogue]]
speaker = "unk"
# 俺はそんな彼女に対し――首を横に振った。
line = "俺はそんな彼女に対し――首を横に振った。"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「？　どうしたんだい、助手？」
line = "「？　どうしたんだい、助手？」"

[[dialogue]]
speaker = "unk"
# キミはジュエリーじゃない
line = "キミはジュエリーじゃない"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「…………正直、驚いたよ。会長」
line = "「…………正直、驚いたよ。会長」"

[[dialogue]]
speaker = "ミネコ"
# 「なんで私が変装してるってわかったのか……聞いてもいい？」
line = "「なんで私が変装してるってわかったのか……聞いてもいい？」"

[[dialogue]]
speaker = "unk"
# ジュエリーは日傘のさし方に、癖があるんだ
line = "ジュエリーは日傘のさし方に、癖があるんだ"

[[dialogue]]
speaker = "unk"
# 普段から常に、屋内外関係なく日傘を差し続けているジュエリー。
line = "普段から常に、屋内外関係なく日傘を差し続けているジュエリー。"

[[dialogue]]
speaker = "unk"
# 太陽光を嫌う彼女はたとえ室内の電灯であっても、光の向きに抗うように傘の角度を調整してしまうのだ。恐らく、無意識のうちに。
line = "太陽光を嫌う彼女はたとえ室内の電灯であっても、光の向きに抗うように傘の角度を調整してしまうのだ。恐らく、無意識のうちに。"

[[dialogue]]
speaker = "unk"
# そして、ミネコが変装したジュエリーには、その仕草が見られなかった。
line = "そして、ミネコが変装したジュエリーには、その仕草が見られなかった。"

[[dialogue]]
speaker = "ミネコ"
# 「そうか……つまりは、ジュエリーが体の一部のように日傘をさし過ぎるが故に、染みついてしまった癖……」
line = "「そうか……つまりは、ジュエリーが体の一部のように日傘をさし過ぎるが故に、染みついてしまった癖……」"

[[dialogue]]
speaker = "ミネコ"
# 「会長は普段からジュエリーのことを見ていて、その癖に気づいていたんだね……」
line = "「会長は普段からジュエリーのことを見ていて、その癖に気づいていたんだね……」"

[[dialogue]]
speaker = "ミネコ"
# 「ふっ……。また、私の負けだ」
line = "「ふっ……。また、私の負けだ」"

[[dialogue]]
speaker = "unk"
# また……？
line = "また……？"

[[dialogue]]
speaker = "ミネコ"
# 「うん。キミは知らなかったかもしれないけど、私はこのところ、他の事件でジュエリーと対決する度に、ずっと負けてたんだよ」
line = "「うん。キミは知らなかったかもしれないけど、私はこのところ、他の事件でジュエリーと対決する度に、ずっと負けてたんだよ」"

[[dialogue]]
speaker = "unk"
# 俺はジュエリーの助手として協力を要請されることも多いが、それは決して全ての事件に対してではない。
line = "俺はジュエリーの助手として協力を要請されることも多いが、それは決して全ての事件に対してではない。"

[[dialogue]]
speaker = "unk"
# ジュエリーは選星者『名探偵』の能力によって、『事件が起きる場所を直感的に察して、現場に居合わせる』特性を持つからだ。
line = "ジュエリーは選星者『名探偵』の能力によって、『事件が起きる場所を直感的に察して、現場に居合わせる』特性を持つからだ。"

[[dialogue]]
speaker = "unk"
# 俺が星徒会やリクリエ絡みの騒動で忙しい時は、彼女単独でその事件を解決してしまっている。むしろ、そういった事件の方が圧倒的に多い。
line = "俺が星徒会やリクリエ絡みの騒動で忙しい時は、彼女単独でその事件を解決してしまっている。むしろ、そういった事件の方が圧倒的に多い。"

[[dialogue]]
speaker = "ミネコ"
# 「――ある時を境に、ジュエリーの何かが変わった。彼女の調子が明らかに良くなったんだよ」
line = "「――ある時を境に、ジュエリーの何かが変わった。彼女の調子が明らかに良くなったんだよ」"

[[dialogue]]
speaker = "ミネコ"
# 「それで、私はその理由を知りたくて……調べてる内に、ジュエリーがキミと出会ったということを知ったんだ」
line = "「それで、私はその理由を知りたくて……調べてる内に、ジュエリーがキミと出会ったということを知ったんだ」"

[[dialogue]]
speaker = "ミネコ"
# 「だから、私は学園に潜入して、キミとジュエリーと仲良くなろうと思ったんだよ」
line = "「だから、私は学園に潜入して、キミとジュエリーと仲良くなろうと思ったんだよ」"

[[dialogue]]
speaker = "ミネコ"
# 「ジュエリーが何故あそこまで強くなったのか、わかると思ったから」
line = "「ジュエリーが何故あそこまで強くなったのか、わかると思ったから」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「――簡単なことだ」
line = "「――簡単なことだ」"

[[dialogue]]
speaker = "unk"
# と、そこへ現れたのは、本物のジュエリーだった。
line = "と、そこへ現れたのは、本物のジュエリーだった。"

[[dialogue]]
speaker = "unk"
# 日傘の角度を変える仕草で、すぐに本人だとわかった。
line = "日傘の角度を変える仕草で、すぐに本人だとわかった。"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「私が強くなったというなら……ミネコ。それはただ、助手に褒めてもらいたかったというだけだ」
line = "「私が強くなったというなら……ミネコ。それはただ、助手に褒めてもらいたかったというだけだ」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「愛する助手に、私１人でも事件を解決してみせたと報告して、褒めてもらえるのを想像したら……つい張り切ってしまうというものだろう？」
line = "「愛する助手に、私１人でも事件を解決してみせたと報告して、褒めてもらえるのを想像したら……つい張り切ってしまうというものだろう？」"

[[dialogue]]
speaker = "ミネコ"
# 「もう幻術を見破って出てくるなんて……さすがだね、名探偵」
line = "「もう幻術を見破って出てくるなんて……さすがだね、名探偵」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「これが助手との『愛』によって目覚めた力だよ、大怪盗」
line = "「これが助手との『愛』によって目覚めた力だよ、大怪盗」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「私は助手と出会って、愛を知ったことで強くなったんだ」
line = "「私は助手と出会って、愛を知ったことで強くなったんだ」"

[[dialogue]]
speaker = "ミネコ"
# 「愛、ね……。まさか本当に、そんなものに負けるとは……」
line = "「愛、ね……。まさか本当に、そんなものに負けるとは……」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「ふふっ、しかし、これでわかっただろう？」
line = "「ふふっ、しかし、これでわかっただろう？」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「愛ってのは、理屈じゃ測れないんだ」
line = "「愛ってのは、理屈じゃ測れないんだ」"

[[dialogue]]
speaker = "ミネコ"
# 「やれやれ、参ったな……」
line = "「やれやれ、参ったな……」"

[[dialogue]]
speaker = "unk"
# そこで、パチンと指を鳴らすミネコ。
line = "そこで、パチンと指を鳴らすミネコ。"

[[dialogue]]
speaker = "ヴィーナス"
# 「あれ？　クロトと、ジュエリー？　大聖堂の中が急に光ったと思ったら、どうして２人がここに？」
line = "「あれ？　クロトと、ジュエリー？　大聖堂の中が急に光ったと思ったら、どうして２人がここに？」"

[[dialogue]]
speaker = "unk"
# 光が収まると、そこに先程まで居なかったヴィーナスや警官の人たちの姿があった。
line = "光が収まると、そこに先程まで居なかったヴィーナスや警官の人たちの姿があった。"

[[dialogue]]
speaker = "unk"
# そして――
line = "そして――"

[[dialogue]]
speaker = "ミネコ"
# 「やあやあ、九浄ヴィーナスに、警察の諸君！」
line = "「やあやあ、九浄ヴィーナスに、警察の諸君！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「って、あなた誰！？　まさか、大怪盗フランボウ！？」
line = "「って、あなた誰！？　まさか、大怪盗フランボウ！？」"

[[dialogue]]
speaker = "unk"
# 気づけば大聖堂の天井近くに、長身の紳士のような人影が浮遊していた。
line = "気づけば大聖堂の天井近くに、長身の紳士のような人影が浮遊していた。"

[[dialogue]]
speaker = "ミネコ"
# 「ははは♪　その通り！　しかし会えて早々だが、そこの名探偵と助手の活躍により、今回は私の完敗だ」
line = "「ははは♪　その通り！　しかし会えて早々だが、そこの名探偵と助手の活躍により、今回は私の完敗だ」"

[[dialogue]]
speaker = "ミネコ"
# 「悔しいが、退かせてもらうとするよ――また会おう、諸君！」
line = "「悔しいが、退かせてもらうとするよ――また会おう、諸君！」"

[[dialogue]]
speaker = "unk"
# 次の瞬間、ポイッとこちらに向けて何かボールのようなものを投げるミネコ。
line = "次の瞬間、ポイッとこちらに向けて何かボールのようなものを投げるミネコ。"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「！　星術じゃない！　みんな、目を閉じろ！　閃光弾だ！」
line = "「！　星術じゃない！　みんな、目を閉じろ！　閃光弾だ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「っ……！　あっ！？　フランボウがいなくなってる！？」
line = "「っ……！　あっ！？　フランボウがいなくなってる！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「外よ！　外に逃げたんだわ！　待ちなさーい！」
line = "「外よ！　外に逃げたんだわ！　待ちなさーい！」"

[[dialogue]]
speaker = "unk"
# ヴィーナスと警官の人たちが大聖堂の外へと追い駆けて行く。
line = "ヴィーナスと警官の人たちが大聖堂の外へと追い駆けて行く。"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「エクリプスフォームの『思考加速』による星術封殺を、物理的な光で視界をくらますことで防いで来たか……」
line = "「エクリプスフォームの『思考加速』による星術封殺を、物理的な光で視界をくらますことで防いで来たか……」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「やはり、そう簡単には行かないね。大怪盗フランボウ」
line = "「やはり、そう簡単には行かないね。大怪盗フランボウ」"

[[dialogue]]
speaker = "unk"
# そうして、ミネコは星騎士たちの包囲網を潜り抜け、逃げ切ってみせるのだった――
line = "そうして、ミネコは星騎士たちの包囲網を潜り抜け、逃げ切ってみせるのだった――"
