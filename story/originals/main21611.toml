[[dialogue]]
speaker = "unk"
# 第１１話,リクリエの衝動,B
line = "第１１話,リクリエの衝動,B"

[[dialogue]]
speaker = "クロト"
# 「リノ！　α地点へ使徒を移送しろ！」
line = "「リノ！　α地点へ使徒を移送しろ！」"

[[dialogue]]
speaker = "リノ"
# 「はい、魔王様！　空間接続──開始します！」
line = "「はい、魔王様！　空間接続──開始します！」"

[[dialogue]]
speaker = "クロト"
# 「クラウディア！　この場にいる者全員に、認識変異の魔法をかけろ！　証拠を残すな！」
line = "「クラウディア！　この場にいる者全員に、認識変異の魔法をかけろ！　証拠を残すな！」"

[[dialogue]]
speaker = "クラウディア（黄昏）"
# 「すでにやっておる──リノ！　早く飛ばせ！」
line = "「すでにやっておる──リノ！　早く飛ばせ！」"

[[dialogue]]
speaker = "魔神ギエル"
# 「貴様たち……いったい、何を──！？」
line = "「貴様たち……いったい、何を──！？」"

[[dialogue]]
speaker = "リノ"
# 「パラレル・アクト──トランスファー！！」
line = "「パラレル・アクト──トランスファー！！」"

[[dialogue]]
speaker = "魔神ギエル"
# 「グ──ヌゥウゥ──！？」
line = "「グ──ヌゥウゥ──！？」"

[[dialogue]]
speaker = "流星市国民"
# 「……あれ？　私、いったい何を……？」
line = "「……あれ？　私、いったい何を……？」"

[[dialogue]]
speaker = "unk"
# 魔神ギエルを目撃したという事実を、その場にいた者はすべて忘れた。
line = "魔神ギエルを目撃したという事実を、その場にいた者はすべて忘れた。"

[[dialogue]]
speaker = "流星市国民"
# 「あ、いけない──電車に遅れちゃう！」
line = "「あ、いけない──電車に遅れちゃう！」"

[[dialogue]]
speaker = "unk"
# ここからは、ベガ世界の誰もが知らない物語。
line = "ここからは、ベガ世界の誰もが知らない物語。"

[[dialogue]]
speaker = "unk"
# 世界の終焉をかけた戦いが始まる──
line = "世界の終焉をかけた戦いが始まる──"

[[dialogue]]
speaker = "魔神ギエル"
# 「ここは……どこだ？　人間界、天界、魔界……その、どこでもない……？」
line = "「ここは……どこだ？　人間界、天界、魔界……その、どこでもない……？」"

[[dialogue]]
speaker = "クロト"
# 「ここは三界から隔絶された、魔女だけの世界──世界樹の<ruby=ふもと>麓</ruby>」
line = "「ここは三界から隔絶された、魔女だけの世界──世界樹の<ruby>麓<rt>ふもと</rt></ruby>」"

[[dialogue]]
speaker = "クロト"
# 「そして希崎レイト。お前の墓場だ」
line = "「そして希崎レイト。お前の墓場だ」"

[[dialogue]]
speaker = "魔神ギエル"
# 「……すでにその名は捨てたのです。聞くたびに忌々しい……真なる『神』より賜った私に対する、愚弄に他ならない！」
line = "「……すでにその名は捨てたのです。聞くたびに忌々しい……真なる『神』より賜った私に対する、愚弄に他ならない！」"

[[dialogue]]
speaker = "魔神ギエル"
# 「私は選ばれたのです！　成り代わったのです！　特別な存在に──！！」
line = "「私は選ばれたのです！　成り代わったのです！　特別な存在に──！！」"

[[dialogue]]
speaker = "クロト"
# 「……特別であることに、価値なんてない。どうしてお前は気づかないんだ？」
line = "「……特別であることに、価値なんてない。どうしてお前は気づかないんだ？」"

[[dialogue]]
speaker = "クロト"
# 「普通であることは、自由であるということだ……俺はただの人間だった頃のお前が、羨ましい」
line = "「普通であることは、自由であるということだ……俺はただの人間だった頃のお前が、羨ましい」"

[[dialogue]]
speaker = "魔神ギエル"
# 「黙りなさい！　魔王ラクシスなどと……本当か嘘かはどうでもいい！　血祭にあげてくれる！」
line = "「黙りなさい！　魔王ラクシスなどと……本当か嘘かはどうでもいい！　血祭にあげてくれる！」"

[[dialogue]]
speaker = "セドナ"
# 「──間に合ったか。魔王、準備はいいか」
line = "「──間に合ったか。魔王、準備はいいか」"

[[dialogue]]
speaker = "クロト"
# 「ああ。修行の成果を今こそ見せる」
line = "「ああ。修行の成果を今こそ見せる」"

[[dialogue]]
speaker = "セドナ"
# 「……拾い上げてから今この時まで、できうる限りの薫陶をお前に授けてきた」
line = "「……拾い上げてから今この時まで、できうる限りの薫陶をお前に授けてきた」"

[[dialogue]]
speaker = "セドナ"
# 「行け。使徒を圧倒してみせろ」
line = "「行け。使徒を圧倒してみせろ」"

[[dialogue]]
speaker = "クロト"
# 「ああ、見ていてくれ！　あなたが育てた息子の、最初で最後の晴れ舞台を！！」
line = "「ああ、見ていてくれ！　あなたが育てた息子の、最初で最後の晴れ舞台を！！」"

[[dialogue]]
speaker = "unk"
# 今の俺に、かつての霊力は存在しない。手にしているのは、数年前に守護星となった地球の星力。
line = "今の俺に、かつての霊力は存在しない。手にしているのは、数年前に守護星となった地球の星力。"

[[dialogue]]
speaker = "unk"
# 母さんから施された地獄の戦闘訓練……全身で骨折したことのない箇所など存在しないほどに痛めつけ、今わの際を何度さ迷ったか。
line = "母さんから施された地獄の戦闘訓練……全身で骨折したことのない箇所など存在しないほどに痛めつけ、今わの際を何度さ迷ったか。"

[[dialogue]]
speaker = "unk"
# そのたびに治癒の魔法を施されて息を吹き返す。その過程で、星力総量をじわりじわりと伸ばし続けた。
line = "そのたびに治癒の魔法を施されて息を吹き返す。その過程で、星力総量をじわりじわりと伸ばし続けた。"

[[dialogue]]
speaker = "unk"
# 単純な星力だけなら、俺は新星の星徒会長の５倍以上──そして星力だけじゃない。
line = "単純な星力だけなら、俺は新星の星徒会長の５倍以上──そして星力だけじゃない。"

[[dialogue]]
speaker = "unk"
# 俺にはネビュラの魔女たちから借り受けた──人間でありながら行使できる、<ruby=デッドコピー>模造品</ruby>の魔法の力がある！！
line = "俺にはネビュラの魔女たちから借り受けた──人間でありながら行使できる、<ruby>模造品<rt>デッドコピー</rt></ruby>の魔法の力がある！！"

[[dialogue]]
speaker = "クロト"
# 「ツェツィーリエ！　俺に施した模造魔導術式──１３番まで全て解除しろ！！」
line = "「ツェツィーリエ！　俺に施した模造魔導術式──１３番まで全て解除しろ！！」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「ラジャー♪　対リクリエ決戦兵器のお披露目だねぇ……凍結解除っ！」
line = "「ラジャー♪　対リクリエ決戦兵器のお披露目だねぇ……凍結解除っ！」"

[[dialogue]]
speaker = "セドナ"
# 「ネビュラ総員──ロッドを掲げろ！　魔力を、魔王へありったけ送り込むのだ！！」
line = "「ネビュラ総員──ロッドを掲げろ！　魔力を、魔王へありったけ送り込むのだ！！」"

[[dialogue]]
speaker = "クロト"
# 「────────ッ！！！！」
line = "「────────ッ！！！！」"

[[dialogue]]
speaker = "魔神ギエル"
# 「何だ、貴様……髪の色が、半分だけ、白く……！？」
line = "「何だ、貴様……髪の色が、半分だけ、白く……！？」"

[[dialogue]]
speaker = "クロト"
# 「霊力が扱えれば……かつての魔王の力も使えた。でもそれが叶わない以上……別のモノで補うしかないからな」
line = "「霊力が扱えれば……かつての魔王の力も使えた。でもそれが叶わない以上……別のモノで補うしかないからな」"

[[dialogue]]
speaker = "魔神ギエル"
# 「魔神を舐めすぎではないですか！？　その程度のブーストで、私に敵うわけが──」
line = "「魔神を舐めすぎではないですか！？　その程度のブーストで、私に敵うわけが──」"

[[dialogue]]
speaker = "魔神ギエル"
# 「ぬ──がっ！？　何だ、今の拳の攻撃……どこからだ！？」
line = "「ぬ──がっ！？　何だ、今の拳の攻撃……どこからだ！？」"

[[dialogue]]
speaker = "クロト"
# 「<ruby=かげろう>陽炎</ruby>の魔女・カヤの隠蔽魔法。簡単に言えばステルスだ──不可視の俺が、お前の周囲を包囲している」
line = "「<ruby>陽炎<rt>かげろう</rt></ruby>の魔女・カヤの隠蔽魔法。簡単に言えばステルスだ──不可視の俺が、お前の周囲を包囲している」"

[[dialogue]]
speaker = "魔神ギエル"
# 「ご、ぉっ──！？　馬鹿な、増えている！？　なぜだ、なぜ──」
line = "「ご、ぉっ──！？　馬鹿な、増えている！？　なぜだ、なぜ──」"

[[dialogue]]
speaker = "unk"
# <ruby=すいきょう>水鏡</ruby>の魔女・ウェンディの複製魔法を、不可視の俺に重ね掛けした。ヤツの周囲には今、<b>目に映らない俺の複製体が７人いる</b>。
line = "<ruby>水鏡<rt>すいきょう</rt></ruby>の魔女・ウェンディの複製魔法を、不可視の俺に重ね掛けした。ヤツの周囲には今、<b>目に映らない俺の複製体が７人いる</b>。"

[[dialogue]]
speaker = "クロト"
# 「──燃えろ、骨の芯まで」
line = "「──燃えろ、骨の芯まで」"

[[dialogue]]
speaker = "魔神ギエル"
# 「ヌ──ガァァアアアァッ！？」
line = "「ヌ──ガァァアアアァッ！？」"

[[dialogue]]
speaker = "unk"
# 母さんの焔を宿した、灼熱の拳打。ダメージの通りはこれが１番良さそうだ。
line = "母さんの焔を宿した、灼熱の拳打。ダメージの通りはこれが１番良さそうだ。"

[[dialogue]]
speaker = "魔神ギエル"
# 「消え失せろ──マクロ・ノヴァ・ブラスト！！！」
line = "「消え失せろ──マクロ・ノヴァ・ブラスト！！！」"

[[dialogue]]
speaker = "クロト"
# 「パラレル・アボイド──！」
line = "「パラレル・アボイド──！」"

[[dialogue]]
speaker = "魔神ギエル"
# 「なッ──！？」
line = "「なッ──！？」"

[[dialogue]]
speaker = "unk"
# 敵の攻撃はすべて、リノの空間魔法を応用して位相をずらす──技の規模から見て、１撃でも当たれば俺たちは跡形もないだろう。
line = "敵の攻撃はすべて、リノの空間魔法を応用して位相をずらす──技の規模から見て、１撃でも当たれば俺たちは跡形もないだろう。"

[[dialogue]]
speaker = "魔神ギエル"
# 「なんだ──貴様は、なんなんだ──！！？？」
line = "「なんだ──貴様は、なんなんだ──！！？？」"

[[dialogue]]
speaker = "unk"
# 拳から衝撃波を放つ──これはリーリアの『魔弾』の応用。
line = "拳から衝撃波を放つ──これはリーリアの『魔弾』の応用。"

[[dialogue]]
speaker = "unk"
# ７人の俺を正確無比に動かすこの力は、マリオンの『人形縫製』。
line = "７人の俺を正確無比に動かすこの力は、マリオンの『人形縫製』。"

[[dialogue]]
speaker = "unk"
# 全身に外科手術で埋め込んだ魔力を内包した宝石──これによって後天的に魔法を発動するのが、今の俺の全力だ！！
line = "全身に外科手術で埋め込んだ魔力を内包した宝石──これによって後天的に魔法を発動するのが、今の俺の全力だ！！"

[[dialogue]]
speaker = "魔神ギエル"
# 「イヤダ──ヤメロ──私ハヨウヤク──超越シタ者ニ、成レタ、ノニ──！？」
line = "「イヤダ──ヤメロ──私ハヨウヤク──超越シタ者ニ、成レタ、ノニ──！？」"

[[dialogue]]
speaker = "unk"
# 無数の拳打の嵐で魔神を圧倒し──
line = "無数の拳打の嵐で魔神を圧倒し──"

[[dialogue]]
speaker = "魔神ギエル"
# 「ギ──ァ──ァアァアアアアアァ────ッッッッ！？！？」
line = "「ギ──ァ──ァアァアアアアアァ────ッッッッ！？！？」"

[[dialogue]]
speaker = "unk"
# 彼の体内から飛び出てきた、暗黒の宝玉に手を伸ばす──
line = "彼の体内から飛び出てきた、暗黒の宝玉に手を伸ばす──"

[[dialogue]]
speaker = "セドナ"
# 「それが<ruby=コア>核</ruby>だ──逃すな！！」
line = "「それが<ruby>核<rt>コア</rt></ruby>だ──逃すな！！」"

[[dialogue]]
speaker = "クロト"
# 「ディマイズ──ブレイカー────ッ！！！！！」
line = "「ディマイズ──ブレイカー────ッ！！！！！」"

[[dialogue]]
speaker = "unk"
# 宝玉を打ち砕くと魔神ギエル──希崎レイトは、その場に倒れこむ。そして、うぞうぞと湧き出てくるのは……リクリエの瘴気！
line = "宝玉を打ち砕くと魔神ギエル──希崎レイトは、その場に倒れこむ。そして、うぞうぞと湧き出てくるのは……リクリエの瘴気！"

[[dialogue]]
speaker = "クロト"
# 「母さん。後は頼んだ──」
line = "「母さん。後は頼んだ──」"

[[dialogue]]
speaker = "セドナ"
# 「…………ああ」
line = "「…………ああ」"

[[dialogue]]
speaker = "unk"
# 俺はリクリエの瘴気を封じる器として、自らを差し出す。
line = "俺はリクリエの瘴気を封じる器として、自らを差し出す。"

[[dialogue]]
speaker = "クロト"
# 「全て呑みこんでやる──俺に従え、リクリエ────！！！！」
line = "「全て呑みこんでやる──俺に従え、リクリエ────！！！！」"

[[dialogue]]
speaker = "unk"
# 暴れ狂う瘴気を全て体内に取り込む──その実感と共に。
line = "暴れ狂う瘴気を全て体内に取り込む──その実感と共に。"

[[dialogue]]
speaker = "unk"
# 俺の意識は、そこで途絶えた────
line = "俺の意識は、そこで途絶えた────"

[[dialogue]]
speaker = "unk"
# …………
line = "…………"

[[dialogue]]
speaker = "unk"
# ……
line = "……"

[[dialogue]]
speaker = "unk"
# そして、それから１週間後。
line = "そして、それから１週間後。"

[[dialogue]]
speaker = "リーリア"
# 「──やっぱり兄さんって色々と規格外ですよね～」
line = "「──やっぱり兄さんって色々と規格外ですよね～」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「出鱈目すぎるよねえ、魔王ちゃん。まさかこんなにもあっさり、リクリエの瘴気を封じ込めちゃうだなんてさー♪」
line = "「出鱈目すぎるよねえ、魔王ちゃん。まさかこんなにもあっさり、リクリエの瘴気を封じ込めちゃうだなんてさー♪」"

[[dialogue]]
speaker = "unk"
# ギエルを創り変えたあのリクリエの瘴気を、俺という器に呑み込んで１週間が経った。
line = "ギエルを創り変えたあのリクリエの瘴気を、俺という器に呑み込んで１週間が経った。"

[[dialogue]]
speaker = "unk"
# 拍子抜けするほどにあっさりと、それは俺のコントロール下に収まっていた。
line = "拍子抜けするほどにあっさりと、それは俺のコントロール下に収まっていた。"

[[dialogue]]
speaker = "クラウディア"
# 「まあ余はわかっておったぞ。お兄はリクリエなんぞに負けんことくらいな！」
line = "「まあ余はわかっておったぞ。お兄はリクリエなんぞに負けんことくらいな！」"

[[dialogue]]
speaker = "カヤ"
# 「……安心はできない。長官が元老会を説得できるかも不明」
line = "「……安心はできない。長官が元老会を説得できるかも不明」"

[[dialogue]]
speaker = "セドナ"
# 「全員、揃っているな」
line = "「全員、揃っているな」"

[[dialogue]]
speaker = "クラウディア"
# 「セドナ！　どうだったのだ、あの石頭たちの説得は！？」
line = "「セドナ！　どうだったのだ、あの石頭たちの説得は！？」"

[[dialogue]]
speaker = "セドナ"
# 「…………経過観察ということで、承諾を取り付けました」
line = "「…………経過観察ということで、承諾を取り付けました」"

[[dialogue]]
speaker = "アイリーン"
# 「本当に！？」
line = "「本当に！？」"

[[dialogue]]
speaker = "リノ"
# 「元老会にとっても、魔王様がいなくなるのは痛手という結論に至ったみたい……！」
line = "「元老会にとっても、魔王様がいなくなるのは痛手という結論に至ったみたい……！」"

[[dialogue]]
speaker = "セドナ"
# 「そもそもリクリエをコントロールできないという判断から、魔王を再封印するという結論を出していたからな……」
line = "「そもそもリクリエをコントロールできないという判断から、魔王を再封印するという結論を出していたからな……」"

[[dialogue]]
speaker = "セドナ"
# 「瘴気を抑えられている以上、<ruby=レナトゥス>封理再誕</ruby>はしなくていい。ヴォイド・プランはいったん凍結する。それが元老会の結論だ」
line = "「瘴気を抑えられている以上、<ruby>封理再誕<rt>レナトゥス</rt></ruby>はしなくていい。ヴォイド・プランはいったん凍結する。それが元老会の結論だ」"

[[dialogue]]
speaker = "クロト"
# 「…………そっか」
line = "「…………そっか」"

[[dialogue]]
speaker = "unk"
# じゃあ、俺は──
line = "じゃあ、俺は──"

[[dialogue]]
speaker = "クロト"
# 「…………っ」
line = "「…………っ」"

[[dialogue]]
speaker = "リノ"
# 「魔王様……泣いて……？」
line = "「魔王様……泣いて……？」"

[[dialogue]]
speaker = "クロト"
# 「俺……まだ、みんなと一緒に、いられるんだな……」
line = "「俺……まだ、みんなと一緒に、いられるんだな……」"

[[dialogue]]
speaker = "リーリア"
# 「……兄さん」
line = "「……兄さん」"

[[dialogue]]
speaker = "クロト"
# 「よかった……本当に……よかった…………」
line = "「よかった……本当に……よかった…………」"

[[dialogue]]
speaker = "セドナ"
# 「……お前には、再誕してからずっと不自由を強いてきた。辛い日々だっただろう」
line = "「……お前には、再誕してからずっと不自由を強いてきた。辛い日々だっただろう」"

[[dialogue]]
speaker = "セドナ"
# 「息子よ──何がしたい？　母が、何でも叶えてやる」
line = "「息子よ──何がしたい？　母が、何でも叶えてやる」"

[[dialogue]]
speaker = "クロト"
# 「…………学園に、また行きたい。今度はスパイじゃなくて……ただの学生として……」
