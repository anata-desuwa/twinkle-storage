[[dialogue]]
speaker = "unk"
# 第４話,大人の静かなデート,P
line = "第４話,大人の静かなデート,P"

[[dialogue]]
speaker = "アポロ"
# 「ふーっ──黒ベア子も追っ払って、これでようやく一安心だな。魔王」
line = "「ふーっ──黒ベア子も追っ払って、これでようやく一安心だな。魔王」"

[[dialogue]]
speaker = "アポロ"
# 「クマロボもモンスターもいないし……のどかで平和な平日だ。うんうん、こういうのが一番だよな」
line = "「クマロボもモンスターもいないし……のどかで平和な平日だ。うんうん、こういうのが一番だよな」"

[[dialogue]]
speaker = "unk"
# またその格好なの？
line = "またその格好なの？"

[[dialogue]]
speaker = "アポロ"
# 「ん？　あぁ──ちゃんと元の姿にも切り替えられるようになったんだけどな。なんか名残り惜しくてよ」
line = "「ん？　あぁ──ちゃんと元の姿にも切り替えられるようになったんだけどな。なんか名残り惜しくてよ」"

[[dialogue]]
speaker = "アポロ"
# 「ていうか、魔王の口からこのフォームの感想を聞いてないぞ。ほら、何か言うことあるだろ～？」
line = "「ていうか、魔王の口からこのフォームの感想を聞いてないぞ。ほら、何か言うことあるだろ～？」"

[[dialogue]]
speaker = "unk"
# フレイムフォーム、可愛くて格好いいよ
line = "フレイムフォーム、可愛くて格好いいよ"

[[dialogue]]
speaker = "アポロ"
# 「だろ～？　元はアルテのカッコらしいけど、あたしにも似合ってるよな！　赤くて強そうだし！」
line = "「だろ～？　元はアルテのカッコらしいけど、あたしにも似合ってるよな！　赤くて強そうだし！」"

[[dialogue]]
speaker = "アポロ"
# 「ていうか、そういうのはあたしに言われなくても魔王から言ってくれよな。あたしだって女の子なんだから」
line = "「ていうか、そういうのはあたしに言われなくても魔王から言ってくれよな。あたしだって女の子なんだから」"

[[dialogue]]
speaker = "アポロ"
# 「ま、このフォームをくれて、アルテとプトラに会わせてくれたところは、黒ベア子に感謝するかな」
line = "「ま、このフォームをくれて、アルテとプトラに会わせてくれたところは、黒ベア子に感謝するかな」"

[[dialogue]]
speaker = "アポロ"
# 「それにこのカッコでいると、普段のあたしにはない感性がついてくる気がすんだよな」
line = "「それにこのカッコでいると、普段のあたしにはない感性がついてくる気がすんだよな」"

[[dialogue]]
speaker = "アポロ"
# 「ほら、芸術に目覚めたっつーのも嘘じゃないんだぜ？　アルテみたく上手な絵は描けねーけど……」
line = "「ほら、芸術に目覚めたっつーのも嘘じゃないんだぜ？　アルテみたく上手な絵は描けねーけど……」"

[[dialogue]]
speaker = "unk"
# いいと思う
line = "いいと思う"

[[dialogue]]
speaker = "unk"
# 上手い下手じゃない
line = "上手い下手じゃない"

[[dialogue]]
speaker = "アポロ"
# 「へへ、だよな」
line = "「へへ、だよな」"

[[dialogue]]
speaker = "アポロ"
# 「んでだな。わざわざ今日のデートにここを選んだのも理由があるんだ」
line = "「んでだな。わざわざ今日のデートにここを選んだのも理由があるんだ」"

[[dialogue]]
speaker = "アポロ"
# 「駅の建物ん中にギャラリーがあるってのは聞いたか？　なんでも、そこで今日から特別に『どうぶつの作品』展ってのをやってるらしい」
line = "「駅の建物ん中にギャラリーがあるってのは聞いたか？　なんでも、そこで今日から特別に『どうぶつの作品』展ってのをやってるらしい」"

[[dialogue]]
speaker = "アポロ"
# 「前までのあたしじゃ、退屈そうな場所としか思ってなかったけど──」
line = "「前までのあたしじゃ、退屈そうな場所としか思ってなかったけど──」"

[[dialogue]]
speaker = "アポロ"
# 「今なら楽しめそうな気がしてな！　オマエと一緒に来たかったんだ」
line = "「今なら楽しめそうな気がしてな！　オマエと一緒に来たかったんだ」"

[[dialogue]]
speaker = "アポロ"
# 「もちろんおとなしく鑑賞するぞ！　今のあたしはゲージュツをリスペクトしてるんだからな！」
line = "「もちろんおとなしく鑑賞するぞ！　今のあたしはゲージュツをリスペクトしてるんだからな！」"

[[dialogue]]
speaker = "アポロ"
# 「そうと決まればさっそくだ。ギャラリーに突撃しようぜ！」
line = "「そうと決まればさっそくだ。ギャラリーに突撃しようぜ！」"

[[dialogue]]
speaker = "unk"
# そうして、俺たちは駅舎にある特別展示を巡った……。
line = "そうして、俺たちは駅舎にある特別展示を巡った……。"

[[dialogue]]
speaker = "アポロ"
# 「いやー、すごい作品ばっかだったな。うまく言葉にはできねーけど……こう、ビビッときて、ググッーときて、バーンってなるような感動があったぞ！」
line = "「いやー、すごい作品ばっかだったな。うまく言葉にはできねーけど……こう、ビビッときて、ググッーときて、バーンってなるような感動があったぞ！」"

[[dialogue]]
speaker = "アポロ"
# 「クマの絵もあって、黒ベア子のこと思い出しちまったよ。そうだ、フレイムフォームの次は動物っぽいフォームもいいな」
line = "「クマの絵もあって、黒ベア子のこと思い出しちまったよ。そうだ、フレイムフォームの次は動物っぽいフォームもいいな」"

[[dialogue]]
speaker = "アポロ"
# 「ライオンフォームとか……ファルコンフォームもかっこよさそうだな！　黒ベア子ー、新しいフォームくれるならまた来てもいいぞー！」
line = "「ライオンフォームとか……ファルコンフォームもかっこよさそうだな！　黒ベア子ー、新しいフォームくれるならまた来てもいいぞー！」"

[[dialogue]]
speaker = "アポロ"
# 「……なんてな。あんなやつが何度も現れたら、世界が穴ボコだらけになっちまうぜ」
line = "「……なんてな。あんなやつが何度も現れたら、世界が穴ボコだらけになっちまうぜ」"

[[dialogue]]
speaker = "アポロ"
# 「魔王はどうだった？　何が印象に残ったんだ？」
line = "「魔王はどうだった？　何が印象に残ったんだ？」"

[[dialogue]]
speaker = "unk"
# 女神と獅子の彫刻
line = "女神と獅子の彫刻"

[[dialogue]]
speaker = "unk"
# 猛禽類の絵画
line = "猛禽類の絵画"

[[dialogue]]
speaker = "アポロ"
# 「ああ、確かにあれはすげー迫力だったよな！」
line = "「ああ、確かにあれはすげー迫力だったよな！」"

[[dialogue]]
speaker = "アポロ"
# 「人ってあんなどでかいキャンバスにも絵が描けるんだな……あたし、柄にもなく感動しちゃったぜ」
line = "「人ってあんなどでかいキャンバスにも絵が描けるんだな……あたし、柄にもなく感動しちゃったぜ」"

[[dialogue]]
speaker = "アポロ"
# 「あたしの絵心が爆発すれば、いつかアルテみたく藝術魔法が使えるようにならないかな？　さすがに無理か」
line = "「あたしの絵心が爆発すれば、いつかアルテみたく藝術魔法が使えるようにならないかな？　さすがに無理か」"

[[dialogue]]
speaker = "アポロ"
# 「ま、たまにはこういう<b>あかでみっく</b>なデートもいいだろ？　なんか大人になった気がするよな」
line = "「ま、たまにはこういう<b>あかでみっく</b>なデートもいいだろ？　なんか大人になった気がするよな」"

[[dialogue]]
speaker = "アポロ"
# 「あたしはほら……この体ってこともあるしな。この先、フィオナに追いつくためにも──どんどん大人にならなくちゃって思ってるんだ」
line = "「あたしはほら……この体ってこともあるしな。この先、フィオナに追いつくためにも──どんどん大人にならなくちゃって思ってるんだ」"

[[dialogue]]
speaker = "アポロ"
# 「だから魔王。オマエはあたしの成長にこれからも付き合ってくれよな♪」
line = "「だから魔王。オマエはあたしの成長にこれからも付き合ってくれよな♪」"

[[dialogue]]
speaker = "unk"
# アポロのペースでね
line = "アポロのペースでね"

[[dialogue]]
speaker = "unk"
# 付き合うよ
line = "付き合うよ"

[[dialogue]]
speaker = "アポロ"
# 「ああ、ありがとな！」
line = "「ああ、ありがとな！」"

[[dialogue]]
speaker = "アポロ"
# 「んじゃ、日も暮れてきたしそろそろ帰るか。ほれ」
line = "「んじゃ、日も暮れてきたしそろそろ帰るか。ほれ」"

[[dialogue]]
speaker = "アポロ"
# 「何キョトンとしてるんだよ、手を繋ぐに決まってるだろ。あたしとオマエなんだから当然だろ」
line = "「何キョトンとしてるんだよ、手を繋ぐに決まってるだろ。あたしとオマエなんだから当然だろ」"

[[dialogue]]
speaker = "アポロ"
# 「……そうそう、それでいい。このまま帰るぞ」
line = "「……そうそう、それでいい。このまま帰るぞ」"

[[dialogue]]
speaker = "アポロ"
# 「オマエの手、大きいな。あたしはこの手、けっこう好きだぞ」
line = "「オマエの手、大きいな。あたしはこの手、けっこう好きだぞ」"

[[dialogue]]
speaker = "アポロ"
# 「んじゃ、夜は流星ライダーの上映会といこうぜ！　静かな鑑賞も悪くなかったけど、やっぱ騒ぎ足りなくてよ～！」
line = "「んじゃ、夜は流星ライダーの上映会といこうぜ！　静かな鑑賞も悪くなかったけど、やっぱ騒ぎ足りなくてよ～！」"

[[dialogue]]
speaker = "アポロ"
# 「魔王！　オマエはどっちのあたしにも、しっかりついてくるんだぞ──！」
line = "「魔王！　オマエはどっちのあたしにも、しっかりついてくるんだぞ──！」"
