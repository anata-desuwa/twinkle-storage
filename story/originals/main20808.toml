[[dialogue]]
speaker = "unk"
# 第９話,新たな女神,B
line = "第９話,新たな女神,B"

[[dialogue]]
speaker = "unk"
# 閃光が晴れると、そこには──
line = "閃光が晴れると、そこには──"

[[dialogue]]
speaker = "ルヴィネ"
# 「く……この姿は見せたくなかったけど」
line = "「く……この姿は見せたくなかったけど」"

[[dialogue]]
speaker = "クロト"
# 「ルヴィネが変身している……？　それに彼女から感じる力は……」
line = "「ルヴィネが変身している……？　それに彼女から感じる力は……」"

[[dialogue]]
speaker = "フィオナ"
# 「霊力ですね。しかし感じる力は守護天使とも違います。そして何より、彼女たちより遥かに強大な存在です」
line = "「霊力ですね。しかし感じる力は守護天使とも違います。そして何より、彼女たちより遥かに強大な存在です」"

[[dialogue]]
speaker = "unk"
# 光り輝く翼から迸る力は、神聖なる存在のみが放つことができるもの。
line = "光り輝く翼から迸る力は、神聖なる存在のみが放つことができるもの。"

[[dialogue]]
speaker = "unk"
# だが彼女から感じる霊力は、守護天使よりも、ノヴァフォームに目覚めた今のヴィーナスに近い。
line = "だが彼女から感じる霊力は、守護天使よりも、ノヴァフォームに目覚めた今のヴィーナスに近い。"

[[dialogue]]
speaker = "？？？"
# 『ようやくまみえることが叶いましたね、女神ルヴィネ』
line = "『ようやくまみえることが叶いましたね、女神ルヴィネ』"

[[dialogue]]
speaker = "クロト"
# 「女神……！？　ルヴィネがそうなのか……？」
line = "「女神……！？　ルヴィネがそうなのか……？」"

[[dialogue]]
speaker = "？？？"
# 『より正確に言えば、“いずれ世界の管理者となる次代の女神、その幼体”です』
line = "『より正確に言えば、“いずれ世界の管理者となる次代の女神、その幼体”です』"

[[dialogue]]
speaker = "ルヴィネ"
# 「その声は女神テルルね。こそこそ隠れていたかと思えば、ようやく尻尾を見せたわね」
line = "「その声は女神テルルね。こそこそ隠れていたかと思えば、ようやく尻尾を見せたわね」"

[[dialogue]]
speaker = "テルル"
# 『ええ、私ももっと早く呼びかけたかったのですが……神域たるフィーニスの塔の頂上に、女神の力を持つ者が２人揃うことで、ようやく声を届けられました』
line = "『ええ、私ももっと早く呼びかけたかったのですが……神域たるフィーニスの塔の頂上に、女神の力を持つ者が２人揃うことで、ようやく声を届けられました』"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「女神テルル──ってことは、ママなのね！？」
line = "「女神テルル──ってことは、ママなのね！？」"

[[dialogue]]
speaker = "テルル"
# 『デネブの人間界にいた九浄テルルは、私の分け身。私は九浄テルルそのものとはいえませんが……あなたは間違いなく私の娘です、ヴィーナス』
line = "『デネブの人間界にいた九浄テルルは、私の分け身。私は九浄テルルそのものとはいえませんが……あなたは間違いなく私の娘です、ヴィーナス』"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「……そっか。私をこれまで見守ってくれていたのも、ママだったのね」
line = "「……そっか。私をこれまで見守ってくれていたのも、ママだったのね」"

[[dialogue]]
speaker = "テルル"
# 『はい。私はアルタイル・デネブ・ベガの中で唯一、平行世界をまたいで同一の存在を保持しています』
line = "『はい。私はアルタイル・デネブ・ベガの中で唯一、平行世界をまたいで同一の存在を保持しています』"

[[dialogue]]
speaker = "テルル"
# 『ですからアルタイルでもあなたを見ていましたが……女神でありながら、力及ばないことが多く、申し訳なく思っています』
line = "『ですからアルタイルでもあなたを見ていましたが……女神でありながら、力及ばないことが多く、申し訳なく思っています』"

[[dialogue]]
speaker = "テルル"
# 『今の最後の力を振り絞って声を届けていますが、長くは持ちません』
line = "『今の最後の力を振り絞って声を届けていますが、長くは持ちません』"

[[dialogue]]
speaker = "テルル"
# 『デネブでは九浄テルルとして敗北した上、今もベガとディザスターハンドを抑えるために力の大部分を使い続けています』
line = "『デネブでは九浄テルルとして敗北した上、今もベガとディザスターハンドを抑えるために力の大部分を使い続けています』"

[[dialogue]]
speaker = "テルル"
# 『その上で、ルヴィネに発見されないよう、身を潜めて力の回復に努めていました』
line = "『その上で、ルヴィネに発見されないよう、身を潜めて力の回復に努めていました』"

[[dialogue]]
speaker = "テルル"
# 『まだもうしばらく、あなたたち頼りになってしまいそうです』
line = "『まだもうしばらく、あなたたち頼りになってしまいそうです』"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「いいのよ、ママ。そのために私たち星騎士がいるんだから！」
line = "「いいのよ、ママ。そのために私たち星騎士がいるんだから！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「勝手なことを言っているけど、旧時代の女神には今ここで消えてもらうわ、テルル」
line = "「勝手なことを言っているけど、旧時代の女神には今ここで消えてもらうわ、テルル」"

[[dialogue]]
speaker = "クロト"
# 「つまり君は、女神テルルの敵──“<ruby=ゼロス>ＸＥＬＯＳ</ruby>”に与する者なんだな、ルヴィネ」
line = "「つまり君は、女神テルルの敵──“<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>”に与する者なんだな、ルヴィネ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「“<ruby=ゼロス>ＸＥＬＯＳ</ruby>”……？」
line = "「“<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>”……？」"

[[dialogue]]
speaker = "クロト"
# 「ある考古学者が仮定した、女神より上位に存在するものの名だ」
line = "「ある考古学者が仮定した、女神より上位に存在するものの名だ」"

[[dialogue]]
speaker = "クロト"
# 「流星教では、女神こそがこの世界の創造主であると教えていたし、俺たちもそれを疑っていなかった」
line = "「流星教では、女神こそがこの世界の創造主であると教えていたし、俺たちもそれを疑っていなかった」"

[[dialogue]]
speaker = "フィオナ"
# 「ですが１つ疑問がありました。女神テルル様が創造主であるなら、どうしてリクリエが起こるのか、ということです」
line = "「ですが１つ疑問がありました。女神テルル様が創造主であるなら、どうしてリクリエが起こるのか、ということです」"

[[dialogue]]
speaker = "フィオナ"
# 「もしリクリエが女神テルル様の意志なら、リクリエに抗う力を私たちに授けることは矛盾しています」
line = "「もしリクリエが女神テルル様の意志なら、リクリエに抗う力を私たちに授けることは矛盾しています」"

[[dialogue]]
speaker = "フィオナ"
# 「ではリクリエが女神テルル様の意志でないなら、リクリエはどこから来て、どうして発生しているのでしょうか。それが説明できません」
line = "「ではリクリエが女神テルル様の意志でないなら、リクリエはどこから来て、どうして発生しているのでしょうか。それが説明できません」"

[[dialogue]]
speaker = "クロト"
# 「だけど女神が創造主でなかったのなら、答えはシンプルなものになる」
line = "「だけど女神が創造主でなかったのなら、答えはシンプルなものになる」"

[[dialogue]]
speaker = "クロト"
# 「女神もまた被造物であり、世界の運営を任された管理者に過ぎないということだ」
line = "「女神もまた被造物であり、世界の運営を任された管理者に過ぎないということだ」"

[[dialogue]]
speaker = "クロト"
# 「女神とは別に存在する創造主がリクリエを望んでいるのであれば、<ruby=リクリエ>厄災</ruby>が消えない理由は説明が付く」
line = "「女神とは別に存在する創造主がリクリエを望んでいるのであれば、<ruby>厄災<rt>リクリエ</rt></ruby>が消えない理由は説明が付く」"

[[dialogue]]
speaker = "クロト"
# 「そして女神が創造主ではなく、唯一無二の存在でないのなら、新たな女神も生まれうる」
line = "「そして女神が創造主ではなく、唯一無二の存在でないのなら、新たな女神も生まれうる」"

[[dialogue]]
speaker = "クロト"
# 「この世界にはバジュラ教団のチャカパラ神を始め、女神ではない、別の神を崇める組織が、時代や地域を超えて無数に存在していた」
line = "「この世界にはバジュラ教団のチャカパラ神を始め、女神ではない、別の神を崇める組織が、時代や地域を超えて無数に存在していた」"

[[dialogue]]
speaker = "クロト"
# 「その信仰の対象を、俺たちは“<ruby=ゼロス>ＸＥＬＯＳ</ruby>”と呼ぶことにした」
line = "「その信仰の対象を、俺たちは“<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>”と呼ぶことにした」"

[[dialogue]]
speaker = "クロト"
# 「そしてルヴィネ……君は“<ruby=ゼロス>ＸＥＬＯＳ</ruby>”に生み出された女神なんじゃないか？」
line = "「そしてルヴィネ……君は“<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>”に生み出された女神なんじゃないか？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「私がその“<ruby=ゼロス>ＸＥＬＯＳ</ruby>”に生み出されたのだとしたら、どうしてデネブを救ったの？　リクリエを起こしているのは『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』なんでしょう？」
line = "「私がその“<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>”に生み出されたのだとしたら、どうしてデネブを救ったの？　リクリエを起こしているのは『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』なんでしょう？」"

[[dialogue]]
speaker = "テルル"
# 『それは私から説明しましょう』
line = "『それは私から説明しましょう』"

[[dialogue]]
speaker = "テルル"
# 『今までは創造主について自ら語ることは許されていませんでしたが、人が“<ruby=ゼロス>ＸＥＬＯＳ</ruby>”と名付けてくれたことで、ようやく話すことができます』
line = "『今までは創造主について自ら語ることは許されていませんでしたが、人が“<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>”と名付けてくれたことで、ようやく話すことができます』"

[[dialogue]]
speaker = "テルル"
# 『“<ruby=ゼロス>ＸＥＬＯＳ</ruby>”は欲したものをデネブで得られませんでした。だからデネブをアルタイルと争わせることで利用しようとしたのです』
line = "『“<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>”は欲したものをデネブで得られませんでした。だからデネブをアルタイルと争わせることで利用しようとしたのです』"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「欲したもの……？　何が必要だったの？」
line = "「欲したもの……？　何が必要だったの？」"

[[dialogue]]
speaker = "テルル"
# 『ディザスターハンドです。ベガの緋宮クロトはディザスターハンドになり、リクリエに堕ちた』
line = "『ディザスターハンドです。ベガの緋宮クロトはディザスターハンドになり、リクリエに堕ちた』"

[[dialogue]]
speaker = "テルル"
# 『しかしデネブの緋宮クロトは自らを犠牲にした。だからデネブではディザスターハンドは得られず、両手が揃うことはなかった』
line = "『しかしデネブの緋宮クロトは自らを犠牲にした。だからデネブではディザスターハンドは得られず、両手が揃うことはなかった』"

[[dialogue]]
speaker = "テルル"
# 『またアルタイルがデネブのリクリエの使徒を破ったことも、今の女神である私を未だに打倒できていないことも、“<ruby=ゼロス>ＸＥＬＯＳ</ruby>”にとって大きな計算違いです』
line = "『またアルタイルがデネブのリクリエの使徒を破ったことも、今の女神である私を未だに打倒できていないことも、“<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>”にとって大きな計算違いです』"

[[dialogue]]
speaker = "テルル"
# 『一度失敗した以上、“<ruby=ゼロス>ＸＥＬＯＳ</ruby>”が同じ手を使うことはありません。それは効率的でない』
line = "『一度失敗した以上、“<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>”が同じ手を使うことはありません。それは効率的でない』"

[[dialogue]]
speaker = "テルル"
# 『だから今回は、ベガのリクリエの使徒と、“デネブとアルタイルの戦争”という形で、二重の攻め手を作ったのです』
line = "『だから今回は、ベガのリクリエの使徒と、“デネブとアルタイルの戦争”という形で、二重の攻め手を作ったのです』"

[[dialogue]]
speaker = "クロト"
# 「つまりデネブを救った理由は“アルタイルを滅ぼすのにまだ使える”と判断されたから……か」
line = "「つまりデネブを救った理由は“アルタイルを滅ぼすのにまだ使える”と判断されたから……か」"

[[dialogue]]
speaker = "テルル"
# 『はい。“<ruby=ゼロス>ＸＥＬＯＳ</ruby>”はただ合理性を追求するだけの機構。ゆえに“デネブを使ってアルタイルと女神テルルを打倒するのが最も効率的だ”と計算したのでしょう』
line = "『はい。“<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>”はただ合理性を追求するだけの機構。ゆえに“デネブを使ってアルタイルと女神テルルを打倒するのが最も効率的だ”と計算したのでしょう』"

[[dialogue]]
speaker = "ルヴィネ"
# 「……はぁ」
line = "「……はぁ」"

[[dialogue]]
speaker = "unk"
# デネブが残った理由が女神テルルから語られると、ルヴィネは呆れたように嘆息して──
line = "デネブが残った理由が女神テルルから語られると、ルヴィネは呆れたように嘆息して──"

[[dialogue]]
speaker = "ルヴィネ"
# 「女神にそこまで説明されてしまったら、否定しても意味はないわね」
line = "「女神にそこまで説明されてしまったら、否定しても意味はないわね」"

[[dialogue]]
speaker = "ルヴィネ"
# 「そう、私は女神。新たな世界を創る新時代の女神よ」
line = "「そう、私は女神。新たな世界を創る新時代の女神よ」"

[[dialogue]]
speaker = "フィオナ"
# 「新たな女神……！　“<ruby=ゼロス>ＸＥＬＯＳ</ruby>”が本当に存在するなら道理ですが、この目で目にするとは思いませんでしたね……」
line = "「新たな女神……！　“<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>”が本当に存在するなら道理ですが、この目で目にするとは思いませんでしたね……」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「じゃあ、デネブの人たちやベアトリスのことも、騙してたってことなの！？」
line = "「じゃあ、デネブの人たちやベアトリスのことも、騙してたってことなの！？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……あなたたちには関係のないことよ」
line = "「……あなたたちには関係のないことよ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「だってあなたたちはここで消えるのだから」
line = "「だってあなたたちはここで消えるのだから」"

[[dialogue]]
speaker = "unk"
# ルヴィネの翼に光が宿る。
line = "ルヴィネの翼に光が宿る。"

[[dialogue]]
speaker = "unk"
# 幼体とはいえ次代の女神。その力は守護天使の比ではない。
line = "幼体とはいえ次代の女神。その力は守護天使の比ではない。"

[[dialogue]]
speaker = "unk"
# しかしその矛先が向いたのは──
line = "しかしその矛先が向いたのは──"

[[dialogue]]
speaker = "ルヴィネ"
# 「私が生まれるのが遅すぎたくらいだわ。消えなさい、古い女神」
line = "「私が生まれるのが遅すぎたくらいだわ。消えなさい、古い女神」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「ママ、逃げて──！」
line = "「ママ、逃げて──！」"

[[dialogue]]
speaker = "テルル"
# 『ごめんなさい……後は、任せます……』
line = "『ごめんなさい……後は、任せます……』"

[[dialogue]]
speaker = "unk"
# ルヴィネの羽から、声がした方へ光が迸る。
line = "ルヴィネの羽から、声がした方へ光が迸る。"

[[dialogue]]
speaker = "ルヴィネ"
# 「また引っ込んだわね……本当に往生際が悪いわ」
line = "「また引っ込んだわね……本当に往生際が悪いわ」"

[[dialogue]]
speaker = "unk"
# しかし女神の気配はすでに消えていた。どうやら何とか逃れたらしい。
line = "しかし女神の気配はすでに消えていた。どうやら何とか逃れたらしい。"

[[dialogue]]
speaker = "ルヴィネ"
# 「なら、残ったあなたたちを消せばいいこと」
line = "「なら、残ったあなたたちを消せばいいこと」"

[[dialogue]]
speaker = "ルヴィネ"
# 「先日はこの姿を見せたくなくて見逃したけど、もう関係ないわね。新たな女神としてあなたたちを裁いてあげる」
line = "「先日はこの姿を見せたくなくて見逃したけど、もう関係ないわね。新たな女神としてあなたたちを裁いてあげる」"

[[dialogue]]
speaker = "ベアトリス"
# 「ルヴィ──！！」
line = "「ルヴィ──！！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「！！？」
line = "「！！？」"

[[dialogue]]
speaker = "unk"
# ベアトリスの声にルヴィネが一瞬目を見開いた。
line = "ベアトリスの声にルヴィネが一瞬目を見開いた。"

[[dialogue]]
speaker = "ナターシャ"
# 「ナイトホークマスカレード！」
line = "「ナイトホークマスカレード！」"

[[dialogue]]
speaker = "unk"
# その瞬間、ナターシャの影が無数の鳥となってルヴィネに襲い掛かる。
line = "その瞬間、ナターシャの影が無数の鳥となってルヴィネに襲い掛かる。"

[[dialogue]]
speaker = "ルヴィネ"
# 「く──！」
line = "「く──！」"

[[dialogue]]
speaker = "梨緒"
# 「みんな、撤退するぞ！」
line = "「みんな、撤退するぞ！」"

[[dialogue]]
speaker = "ベアトリス"
# 「ごめん、ルヴィ……！」
line = "「ごめん、ルヴィ……！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「そうはさせないわ！」
line = "「そうはさせないわ！」"

[[dialogue]]
speaker = "unk"
# ルヴィネが空に手を振りかざすと、地響きのような音とともにディザスターハンドが動き出そうとする。
line = "ルヴィネが空に手を振りかざすと、地響きのような音とともにディザスターハンドが動き出そうとする。"

[[dialogue]]
speaker = "unk"
# その瞬間──
line = "その瞬間──"

[[dialogue]]
speaker = "？？？"
# 『はーい、６名様のお帰りでーす♪』
line = "『はーい、６名様のお帰りでーす♪』"
