[[dialogue]]
speaker = "unk"
# 第３話,運命の相手,P
line = "第３話,運命の相手,P"

[[dialogue]]
speaker = "unk"
# とある日の放課後、ヴィーナスが帰宅する俺についてきて、家までやってきた。
line = "とある日の放課後、ヴィーナスが帰宅する俺についてきて、家までやってきた。"

[[dialogue]]
speaker = "リノ"
# 「──星徒会の他の子たちは以前うちまで来てくれたけど、ヴィーナスちゃんは初めましてね。それで、今日はどうしたのかしら？」
line = "「──星徒会の他の子たちは以前うちまで来てくれたけど、ヴィーナスちゃんは初めましてね。それで、今日はどうしたのかしら？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「初めまして！　私もクロトがどんな家に住んでるのか純粋に興味があったのと……あと、これです！」
line = "「初めまして！　私もクロトがどんな家に住んでるのか純粋に興味があったのと……あと、これです！」"

[[dialogue]]
speaker = "unk"
# タロットカード……？
line = "タロットカード……？"

[[dialogue]]
speaker = "ヴィーナス"
# 「そう！　クロトにタロット占いをするべし、って結果が出たから、さっそくやってきたの！」
line = "「そう！　クロトにタロット占いをするべし、って結果が出たから、さっそくやってきたの！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私、昔からタロットで人を占うのが好きなのよ。星徒会のみんなは占ったことがあったけど、そういえばクロトはまだだったなと思って」
line = "「私、昔からタロットで人を占うのが好きなのよ。星徒会のみんなは占ったことがあったけど、そういえばクロトはまだだったなと思って」"

[[dialogue]]
speaker = "リノ"
# 「いいわね、占い♪　やっぱり、恋愛運とか占うのかしら？」
line = "「いいわね、占い♪　やっぱり、恋愛運とか占うのかしら？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「恋愛運……？　そういえば、恋愛については占ったことなかったわ……」
line = "「恋愛運……？　そういえば、恋愛については占ったことなかったわ……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「みんな、将来のことだとか、勉強のことだとか、そういうのばっかりだったかしら。マトイが恋占いできるのか聞いてきたことはあったけど、結局占わなかったし」
line = "「みんな、将来のことだとか、勉強のことだとか、そういうのばっかりだったかしら。マトイが恋占いできるのか聞いてきたことはあったけど、結局占わなかったし」"

[[dialogue]]
speaker = "リノ"
# 「あら、不思議ね。みんな恋愛には興味がないの？」
line = "「あら、不思議ね。みんな恋愛には興味がないの？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「いえ、そんなことはないはず！　特にクロト！　あなたは今、恋愛に興味津々よ！」
line = "「いえ、そんなことはないはず！　特にクロト！　あなたは今、恋愛に興味津々よ！」"

[[dialogue]]
speaker = "unk"
# 勝手に言い切った……！？
line = "勝手に言い切った……！？"

[[dialogue]]
speaker = "ヴィーナス"
# 「星徒会では両手に花、学園でも星徒会長として女の子に大人気じゃない！　私もクロトの本命が誰なのか、興味があるわっ！」
line = "「星徒会では両手に花、学園でも星徒会長として女の子に大人気じゃない！　私もクロトの本命が誰なのか、興味があるわっ！」"

[[dialogue]]
speaker = "リノ"
# 「ほうほう。母として、私も凄く興味があります」
line = "「ほうほう。母として、私も凄く興味があります」"

[[dialogue]]
speaker = "unk"
# 母さんまで！？
line = "母さんまで！？"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうね、いい機会だからクロトの恋愛運を占いましょう！　やり方はどうしようかしら……うーん」
line = "「そうね、いい機会だからクロトの恋愛運を占いましょう！　やり方はどうしようかしら……うーん」"

[[dialogue]]
speaker = "ヴィーナス"
# 「──よし、ツーマインド法でいきましょう。クロト、気になる女の子を教えてちょうだい」
line = "「──よし、ツーマインド法でいきましょう。クロト、気になる女の子を教えてちょうだい」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……え、いない？　それは嘘でしょ。あれだけ女の子を侍らせておいて」
line = "「……え、いない？　それは嘘でしょ。あれだけ女の子を侍らせておいて」"

[[dialogue]]
speaker = "ヴィーナス"
# 「仕方ないわね、わかった。……じゃあ、誰でもいいから、クロトをどう思っているのか気になる相手はいない？」
line = "「仕方ないわね、わかった。……じゃあ、誰でもいいから、クロトをどう思っているのか気になる相手はいない？」"

[[dialogue]]
speaker = "unk"
# じゃあ、ヴィーナスで
line = "じゃあ、ヴィーナスで"

[[dialogue]]
speaker = "ヴィーナス"
# 「なるほど、ヴィーナスね……えっ、私！？」
line = "「なるほど、ヴィーナスね……えっ、私！？」"

[[dialogue]]
speaker = "リノ"
# 「あら、我が息子ながら大胆♪」
line = "「あら、我が息子ながら大胆♪」"

[[dialogue]]
speaker = "unk"
# だって、俺だけ恥ずかしいの不公平じゃん！
line = "だって、俺だけ恥ずかしいの不公平じゃん！"

[[dialogue]]
speaker = "ヴィーナス"
# 「……ま、まあ、いいわ。本当は自分が関わることを占うのは良くないんだけど……今回は特別よ！」
line = "「……ま、まあ、いいわ。本当は自分が関わることを占うのは良くないんだけど……今回は特別よ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「じゃあ、占うからちょっと待ってて」
line = "「じゃあ、占うからちょっと待ってて」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ツーマインドは、カードの束からの７枚目を上に、さらに７枚目を下に置くわ。それぞれ、私のクロトに対する顕在意識と潜在意識を表しているの」
line = "「ツーマインドは、カードの束からの７枚目を上に、さらに７枚目を下に置くわ。それぞれ、私のクロトに対する顕在意識と潜在意識を表しているの」"

[[dialogue]]
speaker = "ヴィーナス"
# 「要するに、表ではどう思っているのかと、深層意識ではどう思っているのかの２つがわかるってことね」
line = "「要するに、表ではどう思っているのかと、深層意識ではどう思っているのかの２つがわかるってことね」"

[[dialogue]]
speaker = "リノ"
# 「ふむふむ……で、この２枚のカードは、どんな意味なの？」
line = "「ふむふむ……で、この２枚のカードは、どんな意味なの？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……上側のカードは、星の正位置ね。希望や憧れ、理想、ひらめきなんかを意味するカードだわ」
line = "「……上側のカードは、星の正位置ね。希望や憧れ、理想、ひらめきなんかを意味するカードだわ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ま、これは特に不思議じゃないわね。私はクロトに期待しているし、希望も持ってる。星騎士としても、魔王としてもね」
line = "「ま、これは特に不思議じゃないわね。私はクロトに期待しているし、希望も持ってる。星騎士としても、魔王としてもね」"

[[dialogue]]
speaker = "リノ"
# 「魔王……？」
line = "「魔王……？」"

[[dialogue]]
speaker = "unk"
# ち、ちょっとした例えだから！
line = "ち、ちょっとした例えだから！"

[[dialogue]]
speaker = "リノ"
# 「……あらそう？」
line = "「……あらそう？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「で、問題は下ね。潜在意識のほう」
line = "「で、問題は下ね。潜在意識のほう」"

[[dialogue]]
speaker = "ヴィーナス"
# 「恋人の正位置。これは要するに……」
line = "「恋人の正位置。これは要するに……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「相手の女性は、クロトのことが実は好きってことよ……！」
line = "「相手の女性は、クロトのことが実は好きってことよ……！」"

[[dialogue]]
speaker = "unk"
# え？
line = "え？"

[[dialogue]]
speaker = "リノ"
# 「まあ！　今夜はお赤飯ね♪」
line = "「まあ！　今夜はお赤飯ね♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……ん？　んん！？！？　えっ、私ってクロトのこと好きだったのっ！？」
line = "「……ん？　んん！？！？　えっ、私ってクロトのこと好きだったのっ！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「い、いや、確かにクロトのことは良く思っているけど……！　頼りになるし、強いし、ようやく待ちわびた存在でもあるし……！」
line = "「い、いや、確かにクロトのことは良く思っているけど……！　頼りになるし、強いし、ようやく待ちわびた存在でもあるし……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「──あれ？　それってつまり、好きで合ってるのでは？」
line = "「──あれ？　それってつまり、好きで合ってるのでは？」"

[[dialogue]]
speaker = "unk"
# 落ち着け！　あくまで占い！　占いだから！
line = "落ち着け！　あくまで占い！　占いだから！"

[[dialogue]]
speaker = "ヴィーナス"
# 「は！？　私の占いを侮らないで欲しいわ！　凄く良く当たるって、学園中で評判なのよ！」
line = "「は！？　私の占いを侮らないで欲しいわ！　凄く良く当たるって、学園中で評判なのよ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ということは、私はクロトのことが大好きってこと！？！？」
line = "「ということは、私はクロトのことが大好きってこと！？！？」"

[[dialogue]]
speaker = "unk"
# そこまでは占いも言ってなかったんじゃ！？
line = "そこまでは占いも言ってなかったんじゃ！？"

[[dialogue]]
speaker = "ヴィーナス"
# 「いいえ、完全に理解したわ！　この占いの結果、真正面から受け止めてあげましょう！」
line = "「いいえ、完全に理解したわ！　この占いの結果、真正面から受け止めてあげましょう！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私は逃げも隠れもしないわ！　覚悟しなさい、クロト！」
line = "「私は逃げも隠れもしないわ！　覚悟しなさい、クロト！」"

[[dialogue]]
speaker = "unk"
# こんな外堀の埋まり方ある！？
line = "こんな外堀の埋まり方ある！？"

[[dialogue]]
speaker = "unk"
# その後、ヴィーナスは何故か家に泊まって行くことになり、夕食の席には赤飯が並ぶこととなるのだった。
line = "その後、ヴィーナスは何故か家に泊まって行くことになり、夕食の席には赤飯が並ぶこととなるのだった。"
