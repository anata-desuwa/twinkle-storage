[[dialogue]]
speaker = "花織"
# 「陽彩ちゃん、すごい！　悪魔たちの動きが鈍くなってるよ！」
line = "「陽彩ちゃん、すごい！　悪魔たちの動きが鈍くなってるよ！」"

[[dialogue]]
speaker = "ここあ"
# 「悪魔の心も惑わしちゃうなんて、あきあきってば、魔性のセクシー娘になっちゃったね～♪」
line = "「悪魔の心も惑わしちゃうなんて、あきあきってば、魔性のセクシー娘になっちゃったね～♪」"

[[dialogue]]
speaker = "陽彩"
# 「ちょっと余裕が出てきたからって、変な冗談は言わないでくれるか！？」
line = "「ちょっと余裕が出てきたからって、変な冗談は言わないでくれるか！？」"

[[dialogue]]
speaker = "陽彩"
# 「じ、自分でもちょっと恥ずかしい衣装だとは思っているんだ……！」
line = "「じ、自分でもちょっと恥ずかしい衣装だとは思っているんだ……！」"

[[dialogue]]
speaker = "いろは"
# 「え～？　そんなことないよ～。あたしは可愛いと思うな♪」
line = "「え～？　そんなことないよ～。あたしは可愛いと思うな♪」"

[[dialogue]]
speaker = "陽彩"
# 「い、いいから、戦闘に集中しろっ！　ぼくの能力でかく乱している内に、ちゃんと倒しきれ！」
line = "「い、いいから、戦闘に集中しろっ！　ぼくの能力でかく乱している内に、ちゃんと倒しきれ！」"

[[dialogue]]
speaker = "ここあ"
# 「にゃははっ、怒られちった☆　は～い、頑張りま～す！」
line = "「にゃははっ、怒られちった☆　は～い、頑張りま～す！」"

[[dialogue]]
speaker = "花織"
# 「いろは！　ウチがサポートするから、このままの勢いで大群を押し返すよ！」
line = "「いろは！　ウチがサポートするから、このままの勢いで大群を押し返すよ！」"

[[dialogue]]
speaker = "いろは"
# 「うん！　全力で行くよっ！　とりゃああぁああぁっ！」
line = "「うん！　全力で行くよっ！　とりゃああぁああぁっ！」"
