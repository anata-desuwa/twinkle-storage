[[dialogue]]
speaker = "unk"
# 第２話,制覇者,B
line = "第２話,制覇者,B"

[[dialogue]]
speaker = "unk"
# リクリエの使徒に不覚を取り、目覚めてから──さらに１ヵ月の時が過ぎた。
line = "リクリエの使徒に不覚を取り、目覚めてから──さらに１ヵ月の時が過ぎた。"

[[dialogue]]
speaker = "アニュラス"
# 「お父様。あまり無理をなされない方が……」
line = "「お父様。あまり無理をなされない方が……」"

[[dialogue]]
speaker = "セイファート"
# 「そうも言っていられない。何とか剣を振るえるほどには回復した……一刻も早く人間界へ帰還しなくては」
line = "「そうも言っていられない。何とか剣を振るえるほどには回復した……一刻も早く人間界へ帰還しなくては」"

[[dialogue]]
speaker = "セイファート"
# 「使徒が魔界を離れてもう２ヵ月……まさか未だに、人間界で戦いを続けている、ということはないだろう……」
line = "「使徒が魔界を離れてもう２ヵ月……まさか未だに、人間界で戦いを続けている、ということはないだろう……」"

[[dialogue]]
speaker = "アニュラス"
# 「……はい。きっと両学園と──魔王が。防衛に成功したのだと思います」
line = "「……はい。きっと両学園と──魔王が。防衛に成功したのだと思います」"

[[dialogue]]
speaker = "unk"
# 魔界の<ruby=たいはい>頽廃</ruby>都市キュリオスは壊滅し、大小さまざまな街が地図から消えた──だが未だ世界は滅びていない。
line = "魔界の<ruby>頽廃<rt>たいはい</rt></ruby>都市キュリオスは壊滅し、大小さまざまな街が地図から消えた──だが未だ世界は滅びていない。"

[[dialogue]]
speaker = "unk"
# 朝が来れば太陽が昇り、夜になれば月が照らす。再創生の<ruby=ほんぱ>本波</ruby>はこの世界を覆わなかったのだ。
line = "朝が来れば太陽が昇り、夜になれば月が照らす。再創生の<ruby>本波<rt>ほんぱ</rt></ruby>はこの世界を覆わなかったのだ。"

[[dialogue]]
speaker = "セイファート"
# （……私の不覚の尻ぬぐいを、少年がしてくれたのだろう。彼には世話になってばかりだ）
line = "（……私の不覚の尻ぬぐいを、少年がしてくれたのだろう。彼には世話になってばかりだ）"

[[dialogue]]
speaker = "セイファート"
# 「人間界へ向かおう。マルキア、アニュラス」
line = "「人間界へ向かおう。マルキア、アニュラス」"

[[dialogue]]
speaker = "unk"
# そうして私たち一家はレゾフからシャリオン地方へと取って返した。
line = "そうして私たち一家はレゾフからシャリオン地方へと取って返した。"

[[dialogue]]
speaker = "unk"
# 幾日もの旅──モンスターや魔界の原生生物を相手とした戦いこそあったが、使徒に比べれば何ということはない。
line = "幾日もの旅──モンスターや魔界の原生生物を相手とした戦いこそあったが、使徒に比べれば何ということはない。"

[[dialogue]]
speaker = "unk"
# マルキアとアニュラス。愛しい２人とのかけがえのない刻を過ごしながら、西へ、西へ──
line = "マルキアとアニュラス。愛しい２人とのかけがえのない刻を過ごしながら、西へ、西へ──"

[[dialogue]]
speaker = "unk"
# そうしてシャリオン地方にある、魔界のフィーニスの塔内部へ、再び足を踏み入れた。
line = "そうしてシャリオン地方にある、魔界のフィーニスの塔内部へ、再び足を踏み入れた。"

[[dialogue]]
speaker = "アニュラス"
# 「塔の内部には変わらずガーディアンが出現するはずです。道中、気を付けて進みましょう」
line = "「塔の内部には変わらずガーディアンが出現するはずです。道中、気を付けて進みましょう」"

[[dialogue]]
speaker = "マルキア"
# 「そうね。あなた、まだ本調子ではないのですから……」
line = "「そうね。あなた、まだ本調子ではないのですから……」"

[[dialogue]]
speaker = "セイファート"
# 「……ああ。無理をしないと約束しよう。行くぞ！」
line = "「……ああ。無理をしないと約束しよう。行くぞ！」"

[[dialogue]]
speaker = "unk"
# 襲い来るガーディアンを切り捨てながら、塔を攻略していく。
line = "襲い来るガーディアンを切り捨てながら、塔を攻略していく。"

[[dialogue]]
speaker = "unk"
# 一太刀を振るうたびに体がきしみ、悲鳴を上げる──この体たらくでは、完全に復調するまで幾日を要することか。
line = "一太刀を振るうたびに体がきしみ、悲鳴を上げる──この体たらくでは、完全に復調するまで幾日を要することか。"

[[dialogue]]
speaker = "unk"
# 負傷によって落ちた体力に歯噛みしながらも、２人のサポートを受け、私たち家族はとうとう人間界への出口までやってきたのだが……
line = "負傷によって落ちた体力に歯噛みしながらも、２人のサポートを受け、私たち家族はとうとう人間界への出口までやってきたのだが……"

[[dialogue]]
speaker = "アニュラス"
# 「これは一体……！？」
line = "「これは一体……！？」"

[[dialogue]]
speaker = "unk"
# フィーニスの塔と人間界を繋ぐ境い目に、不可思議な時空のねじれがあった。
line = "フィーニスの塔と人間界を繋ぐ境い目に、不可思議な時空のねじれがあった。"

[[dialogue]]
speaker = "セイファート"
# 「どういうことだ？　これは誰が、何のために……」
line = "「どういうことだ？　これは誰が、何のために……」"

[[dialogue]]
speaker = "unk"
# 空間が歪み、黒とも透明とも言えない奇怪な断裂が、人間界への出入り口を覆っている。
line = "空間が歪み、黒とも透明とも言えない奇怪な断裂が、人間界への出入り口を覆っている。"

[[dialogue]]
speaker = "unk"
# 剣の切っ先を軽く差し向けると、磁力が反発するような反動が発生し、押し戻される。
line = "剣の切っ先を軽く差し向けると、磁力が反発するような反動が発生し、押し戻される。"

[[dialogue]]
speaker = "マルキア"
# 「無理に進めば、どうなることか……突破は難しそうね」
line = "「無理に進めば、どうなることか……突破は難しそうね」"

[[dialogue]]
speaker = "アニュラス"
# 「ど、どうしましょう。お父様？」
line = "「ど、どうしましょう。お父様？」"

[[dialogue]]
speaker = "セイファート"
# 「……致し方ない。このままさらに上層を目指そう。人間界で何が起こったのか──もはや女神に訊ねるしかあるまい」
line = "「……致し方ない。このままさらに上層を目指そう。人間界で何が起こったのか──もはや女神に訊ねるしかあるまい」"

[[dialogue]]
speaker = "unk"
# 私たち一家は、フィーニスの塔の上層を目指した。
line = "私たち一家は、フィーニスの塔の上層を目指した。"

[[dialogue]]
speaker = "unk"
# 補給もままならない過酷な<ruby=みちのり>道程</ruby>──地獄のような道中を、私たち家族は執念で登り続け……
line = "補給もままならない過酷な<ruby>道程<rt>みちのり</rt></ruby>──地獄のような道中を、私たち家族は執念で登り続け……"

[[dialogue]]
speaker = "テルル"
# 『英雄ジェラルド。そしてその２人の縁者よ。よく、ここまでたどり着きました』
line = "『英雄ジェラルド。そしてその２人の縁者よ。よく、ここまでたどり着きました』"

[[dialogue]]
speaker = "セイファート"
# 「……許可も得ず禁域の塔を登り、拝謁する無礼をご容赦願いたい」
line = "「……許可も得ず禁域の塔を登り、拝謁する無礼をご容赦願いたい」"

[[dialogue]]
speaker = "テルル"
# 『許しましょう。今が緊急事態であること、私も承知しております』
line = "『許しましょう。今が緊急事態であること、私も承知しております』"

[[dialogue]]
speaker = "セイファート"
# 「女神の寛大な心、感謝申し上げる。……その緊急事態について、我々に真実を教えていただきたい！」
line = "「女神の寛大な心、感謝申し上げる。……その緊急事態について、我々に真実を教えていただきたい！」"

[[dialogue]]
speaker = "セイファート"
# 「私たちの世界は今、どうなっているのだ！？　不可解な出来事が、立て続けに起こっている……！」
line = "「私たちの世界は今、どうなっているのだ！？　不可解な出来事が、立て続けに起こっている……！」"

[[dialogue]]
speaker = "セイファート"
# 「人間界は……星騎士の学園は！？　私の教え子たちは無事なのか！？」
line = "「人間界は……星騎士の学園は！？　私の教え子たちは無事なのか！？」"

[[dialogue]]
speaker = "テルル"
# 『…………新星学園、そして流星学園の星騎士たちは、そのほとんどが亡くなりました』
line = "『…………新星学園、そして流星学園の星騎士たちは、そのほとんどが亡くなりました』"

[[dialogue]]
speaker = "セイファート"
# 「なっ！？」
line = "「なっ！？」"

[[dialogue]]
speaker = "テルル"
# 『英雄ジェラルド。貴方が魔界にて交戦したリクリエの使徒……彼女の手で、殺戮されたのです』
line = "『英雄ジェラルド。貴方が魔界にて交戦したリクリエの使徒……彼女の手で、殺戮されたのです』"

[[dialogue]]
speaker = "テルル"
# 『ですがその使徒も……今はもういません。緋宮クロトが、その身と引き換えに、刺し違えました』
line = "『ですがその使徒も……今はもういません。緋宮クロトが、その身と引き換えに、刺し違えました』"

[[dialogue]]
speaker = "unk"
# 全てが、遅かった……？
line = "全てが、遅かった……？"

[[dialogue]]
speaker = "unk"
# 私が生死の境をさまよっているさなかに、人間界はひどい戦禍に巻き込まれ──少年すらも、死んだだと？
line = "私が生死の境をさまよっているさなかに、人間界はひどい戦禍に巻き込まれ──少年すらも、死んだだと？"

[[dialogue]]
speaker = "アニュラス"
# 「そんな馬鹿なことが……とても信じられません！　人間界には、魔界へ赴いた討伐隊以上の戦力がいたはずです！！」
line = "「そんな馬鹿なことが……とても信じられません！　人間界には、魔界へ赴いた討伐隊以上の戦力がいたはずです！！」"

[[dialogue]]
speaker = "セイファート"
# 「女神よ、嘘だと言ってくれ……教え子たちが皆、死んだなどと……」
line = "「女神よ、嘘だと言ってくれ……教え子たちが皆、死んだなどと……」"

[[dialogue]]
speaker = "マルキア"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "テルル"
# 『──マルキア。貴女だけは、疑いを持っていないようですね』
line = "『──マルキア。貴女だけは、疑いを持っていないようですね』"

[[dialogue]]
speaker = "マルキア"
# 「女神様。あれは、悪い夢ではなかったのですか……？」
line = "「女神様。あれは、悪い夢ではなかったのですか……？」"

[[dialogue]]
speaker = "セイファート"
# 「ど、どういうことだ……？」
line = "「ど、どういうことだ……？」"

[[dialogue]]
speaker = "マルキア"
# 「眠っている間、私は……ずっと夢を見ていたの。ひどい夢……でもあれは、ただの悪い夢だとばかり……」
line = "「眠っている間、私は……ずっと夢を見ていたの。ひどい夢……でもあれは、ただの悪い夢だとばかり……」"

[[dialogue]]
speaker = "テルル"
# 『マルキア。貴女が見ていたのは、夢ではありません』
line = "『マルキア。貴女が見ていたのは、夢ではありません』"

[[dialogue]]
speaker = "テルル"
# 『平行世界の、同一存在ゆえに……貴女にも記憶が共有されていたのでしょう……』
line = "『平行世界の、同一存在ゆえに……貴女にも記憶が共有されていたのでしょう……』"

[[dialogue]]
speaker = "テルル"
# 『あまりに凄惨な現実ではありますが、隠したままではいられません。ジェラルド、そしてアニュラス……貴方たちにも共有いたします』
line = "『あまりに凄惨な現実ではありますが、隠したままではいられません。ジェラルド、そしてアニュラス……貴方たちにも共有いたします』"

[[dialogue]]
speaker = "テルル"
# 『マルキア──よろしいですか？』
line = "『マルキア──よろしいですか？』"

[[dialogue]]
speaker = "マルキア"
# 「…………はい。女神様」
line = "「…………はい。女神様」"

[[dialogue]]
speaker = "unk"
# そうして女神に見せられたのは、あまりにもおぞましい光景だった。
line = "そうして女神に見せられたのは、あまりにもおぞましい光景だった。"

[[dialogue]]
speaker = "unk"
# 私たち家族は、不気味な仮面を被り、正気を失ったマルキアが殺戮を繰り返す光景を見た。
line = "私たち家族は、不気味な仮面を被り、正気を失ったマルキアが殺戮を繰り返す光景を見た。"

[[dialogue]]
speaker = "unk"
# まずは天界の聖庭園で──
line = "まずは天界の聖庭園で──"

[[dialogue]]
speaker = "unk"
# 次は魔界。
line = "次は魔界。"

[[dialogue]]
speaker = "unk"
# 私を下した後、使徒は瞬く間にキュリオスを襲撃し、煌嶺の首級をあげた──
line = "私を下した後、使徒は瞬く間にキュリオスを襲撃し、煌嶺の首級をあげた──"

[[dialogue]]
speaker = "unk"
# そしてとうとう、魔の手は人間界にまで及んだ。
line = "そしてとうとう、魔の手は人間界にまで及んだ。"

[[dialogue]]
speaker = "unk"
# 自在にアステラを生み出し、モンスターを使役する仮面のマルキア。
line = "自在にアステラを生み出し、モンスターを使役する仮面のマルキア。"

[[dialogue]]
speaker = "unk"
# この虐殺を行ったリクリエの使徒は、マルキア・セイファートに他ならないと女神は言う。
line = "この虐殺を行ったリクリエの使徒は、マルキア・セイファートに他ならないと女神は言う。"

[[dialogue]]
speaker = "unk"
# デネブ、アルタイル、ベガ──３つの平行世界が存在するという荒唐無稽な事実。リクリエの使徒となったのは『アルタイル出身のマルキア』だと……
line = "デネブ、アルタイル、ベガ──３つの平行世界が存在するという荒唐無稽な事実。リクリエの使徒となったのは『アルタイル出身のマルキア』だと……"

[[dialogue]]
speaker = "unk"
# 矢継ぎ早に紡がれる話ではあったが、信じざるを得なかった。
line = "矢継ぎ早に紡がれる話ではあったが、信じざるを得なかった。"

[[dialogue]]
speaker = "unk"
# 妻マルキアの謎の昏睡も、他人の空似とは思えないほどに似た使徒の外見も──その全てに説明がついたからだ。
line = "妻マルキアの謎の昏睡も、他人の空似とは思えないほどに似た使徒の外見も──その全てに説明がついたからだ。"

[[dialogue]]
speaker = "unk"
# そうして少年と、操られた妻の決戦の光景を見た。
line = "そうして少年と、操られた妻の決戦の光景を見た。"

[[dialogue]]
speaker = "unk"
# 一進一退の攻防を続けていたが……彼の執念が、使徒の力を上回り始めたその時に異変は起こった。
line = "一進一退の攻防を続けていたが……彼の執念が、使徒の力を上回り始めたその時に異変は起こった。"

[[dialogue]]
speaker = "クロト"
# 「……っ！？　何だ、頭の中で……声が！？」
line = "「……っ！？　何だ、頭の中で……声が！？」"

[[dialogue]]
speaker = "unk"
# 目には見えない、しかし『何か圧倒的な存在』が、少年に働きかけている──？
line = "目には見えない、しかし『何か圧倒的な存在』が、少年に働きかけている──？"

[[dialogue]]
speaker = "クロト"
# 「みんなとまた出会いたければ……世界を、壊せ……！？　滅ぼせ……！？」
line = "「みんなとまた出会いたければ……世界を、壊せ……！？　滅ぼせ……！？」"

[[dialogue]]
speaker = "クロト"
# 「くそ……やめろ！！　貴様の言いなりになんて、なってたまるか！！」
line = "「くそ……やめろ！！　貴様の言いなりになんて、なってたまるか！！」"

[[dialogue]]
speaker = "クロト"
# 「もう少しだと思ったんだが……残念ながら俺は、ここまでのようだ……」
line = "「もう少しだと思ったんだが……残念ながら俺は、ここまでのようだ……」"

[[dialogue]]
speaker = "クロト"
# 「<ruby=ヴィーナス>娘</ruby>を頼んだぞ……ラクシャ」
line = "「<ruby>娘<rt>ヴィーナス</rt></ruby>を頼んだぞ……ラクシャ」"

[[dialogue]]
speaker = "ラクシャ"
# 「待ってよ、魔王！　まだ何か、方法がっ！」
line = "「待ってよ、魔王！　まだ何か、方法がっ！」"

[[dialogue]]
speaker = "クロト"
# 「時間がない！　このままだと俺も、ディザスターハンドになってしまう……！」
line = "「時間がない！　このままだと俺も、ディザスターハンドになってしまう……！」"

[[dialogue]]
speaker = "クロト"
# 「俺はここにいちゃいけない……だが、このリクリエの使徒も残しておけないっ！　刺し違えてでも連れていく！！」
line = "「俺はここにいちゃいけない……だが、このリクリエの使徒も残しておけないっ！　刺し違えてでも連れていく！！」"

[[dialogue]]
speaker = "unk"
# 少年が使徒と距離を詰め、その利き腕で仮面を掴み──
line = "少年が使徒と距離を詰め、その利き腕で仮面を掴み──"

[[dialogue]]
speaker = "クロト"
# 「すみません、マルキアさん……セイファート学園長……」
line = "「すみません、マルキアさん……セイファート学園長……」"

[[dialogue]]
speaker = "クロト"
# 「俺、世界を……守り切れませんでした──」
line = "「俺、世界を……守り切れませんでした──」"

[[dialogue]]
speaker = "unk"
# 少年は──跡形もなく、消え去った。
line = "少年は──跡形もなく、消え去った。"

[[dialogue]]
speaker = "テルル"
# 『緋宮クロトは、自身の力を意図的に暴走させ、爆散による特攻で使徒を消滅させました……』
line = "『緋宮クロトは、自身の力を意図的に暴走させ、爆散による特攻で使徒を消滅させました……』"

[[dialogue]]
speaker = "テルル"
# 『同時に作り出した平行世界のゲートを通り、ラクシャがヴィーナスを、アルタイルの世界へ運んだのです……』
line = "『同時に作り出した平行世界のゲートを通り、ラクシャがヴィーナスを、アルタイルの世界へ運んだのです……』"

[[dialogue]]
speaker = "テルル"
# 『そして……その代償として残ったのが、この次元の裂け目です』
line = "『そして……その代償として残ったのが、この次元の裂け目です』"

[[dialogue]]
speaker = "テルル"
# 『本来ヒトの身では成し得ない平行世界間の移動……それを強引に行った結果、デネブの世界には取り返しのつかない爪痕が残ってしまいました』
line = "『本来ヒトの身では成し得ない平行世界間の移動……それを強引に行った結果、デネブの世界には取り返しのつかない爪痕が残ってしまいました』"

[[dialogue]]
speaker = "テルル"
# 『最も大きく穿たれたのは教皇庁前ですが……その余波は流星市国の全域にまで広がっています』
line = "『最も大きく穿たれたのは教皇庁前ですが……その余波は流星市国の全域にまで広がっています』"

[[dialogue]]
speaker = "テルル"
# 『貴方たちが人間界の土を踏めないのも、その影響です……余波の『壁』は、いずれ時間が解決するとは思いますが……』
line = "『貴方たちが人間界の土を踏めないのも、その影響です……余波の『壁』は、いずれ時間が解決するとは思いますが……』"

[[dialogue]]
speaker = "セイファート"
# 「我々は負けた……もう、終わりなのか？　女神よ」
line = "「我々は負けた……もう、終わりなのか？　女神よ」"

[[dialogue]]
speaker = "テルル"
# 『……いいえ。この宇宙はまだ、終わっていません』
line = "『……いいえ。この宇宙はまだ、終わっていません』"

[[dialogue]]
speaker = "テルル"
# 『ベガは滅びた。デネブも崩壊の寸前まで追い込まれていますが……まだアルタイルが残っています』
line = "『ベガは滅びた。デネブも崩壊の寸前まで追い込まれていますが……まだアルタイルが残っています』"

[[dialogue]]
speaker = "テルル"
# 『アルタイルの森羅歴は２９９２年。平行世界ではおおよそ、同じ出来事が同じタイミングで起こります』
line = "『アルタイルの森羅歴は２９９２年。平行世界ではおおよそ、同じ出来事が同じタイミングで起こります』"

[[dialogue]]
speaker = "テルル"
# 『今から約１０年後に、アルタイルでもリクリエの使徒が現れ、流星群が発生します』
line = "『今から約１０年後に、アルタイルでもリクリエの使徒が現れ、流星群が発生します』"

[[dialogue]]
speaker = "テルル"
# 『３人目の、最後の魔王が倒れる時。その時こそが、真に“今回の宇宙”が終わる時です──』
line = "『３人目の、最後の魔王が倒れる時。その時こそが、真に“今回の宇宙”が終わる時です──』"

[[dialogue]]
speaker = "セイファート"
# 「…………そうか」
line = "「…………そうか」"

[[dialogue]]
speaker = "セイファート"
# 「女神よ。ではデネブの私たちは、何をすればよいのだろうか……？」
line = "「女神よ。ではデネブの私たちは、何をすればよいのだろうか……？」"

[[dialogue]]
speaker = "テルル"
# 『英雄ジェラルド。あなたに、託したいものがあります』
line = "『英雄ジェラルド。あなたに、託したいものがあります』"

[[dialogue]]
speaker = "テルル"
# 『来たるべき決戦の日までに、私の全存在を懸け、一振りの剣をあなたに贈りましょう』
line = "『来たるべき決戦の日までに、私の全存在を懸け、一振りの剣をあなたに贈りましょう』"

[[dialogue]]
speaker = "テルル"
# 『これは一太刀を浴びせるたびに、■■■の存在次元に楔を打ち込むことができます。より低い次元へと堕落させる、抹殺の剣……』
line = "『これは一太刀を浴びせるたびに、■■■の存在次元に楔を打ち込むことができます。より低い次元へと堕落させる、抹殺の剣……』"

[[dialogue]]
speaker = "セイファート"
# 「……待て。今、何と言った？　誰を斬れ、と？」
line = "「……待て。今、何と言った？　誰を斬れ、と？」"

[[dialogue]]
speaker = "テルル"
# 『私は、■■■に名を付けることができません。許可をされていないのです……』
line = "『私は、■■■に名を付けることができません。許可をされていないのです……』"

[[dialogue]]
speaker = "テルル"
# 『間接的に情報を伝えることができているのも、この場が私の領域であるフィーニスの塔であるが故。本当に、申し訳なく思います』
line = "『間接的に情報を伝えることができているのも、この場が私の領域であるフィーニスの塔であるが故。本当に、申し訳なく思います』"

[[dialogue]]
speaker = "セイファート"
# 「…………女神テルル。まさかそれは……あなたよりも、高位の存在がいるということなのか？」
line = "「…………女神テルル。まさかそれは……あなたよりも、高位の存在がいるということなのか？」"

[[dialogue]]
speaker = "テルル"
# 『…………答えることが、できません』
line = "『…………答えることが、できません』"

[[dialogue]]
speaker = "セイファート"
# 「──なるほど。あなたは、その何者か……先ほど、少年の精神に語り掛けていた存在を、語ることができないのだな？」
line = "「──なるほど。あなたは、その何者か……先ほど、少年の精神に語り掛けていた存在を、語ることができないのだな？」"

[[dialogue]]
speaker = "テルル"
# 『…………肯定も否定も、私には許されていません』
line = "『…………肯定も否定も、私には許されていません』"

[[dialogue]]
speaker = "セイファート"
# 「──理解した。相当な強者が、相手のようだな……」
line = "「──理解した。相当な強者が、相手のようだな……」"

[[dialogue]]
speaker = "セイファート"
# 「……アニュラス、マルキア。少し席を外してもらえるか？　女神と２人で話したいことがある」
line = "「……アニュラス、マルキア。少し席を外してもらえるか？　女神と２人で話したいことがある」"

[[dialogue]]
speaker = "マルキア"
# 「わかりました。アニュラス、こちらへ」
line = "「わかりました。アニュラス、こちらへ」"

[[dialogue]]
speaker = "アニュラス"
# 「は、はい。お母様……」
line = "「は、はい。お母様……」"

[[dialogue]]
speaker = "unk"
# 妻と娘が離れたところで、私は女神に疑問をぶつけた。
line = "妻と娘が離れたところで、私は女神に疑問をぶつけた。"

[[dialogue]]
speaker = "セイファート"
# 「女神よ。あなたの目論見は理解した。だが……私は適任ではない」
line = "「女神よ。あなたの目論見は理解した。だが……私は適任ではない」"

[[dialogue]]
speaker = "セイファート"
# 「私はすでに星騎士としてのピークを過ぎている。ここからさらに１０年もの時を経れば、今よりも弱くなるのは必定だ」
line = "「私はすでに星騎士としてのピークを過ぎている。ここからさらに１０年もの時を経れば、今よりも弱くなるのは必定だ」"

[[dialogue]]
speaker = "セイファート"
# 「アルタイルにいる、より若く強い、ジェラルド・セイファートにこそ頼むのが筋ではないか？」
line = "「アルタイルにいる、より若く強い、ジェラルド・セイファートにこそ頼むのが筋ではないか？」"

[[dialogue]]
speaker = "テルル"
# 『それは叶いません。アルタイルのジェラルド・セイファートは、悪の道に堕ちてしまいました』
line = "『それは叶いません。アルタイルのジェラルド・セイファートは、悪の道に堕ちてしまいました』"

[[dialogue]]
speaker = "セイファート"
# 「──っ！？」
line = "「──っ！？」"

[[dialogue]]
speaker = "テルル"
# 『彼は私から霊力を簒奪し、リクリエを望む黒き騎士へと成り果ててしまったのです……』
line = "『彼は私から霊力を簒奪し、リクリエを望む黒き騎士へと成り果ててしまったのです……』"

[[dialogue]]
speaker = "セイファート"
# 「…………そんな」
line = "「…………そんな」"

[[dialogue]]
speaker = "unk"
# 平行世界の私は──一体何をしているのだ！？
line = "平行世界の私は──一体何をしているのだ！？"

[[dialogue]]
speaker = "テルル"
# 『そこで、貴方にしかできないお願いがあります』
line = "『そこで、貴方にしかできないお願いがあります』"

[[dialogue]]
speaker = "セイファート"
# 「私にしかできない……？」
line = "「私にしかできない……？」"

[[dialogue]]
speaker = "テルル"
# 『はい。アルタイルにいるジェラルド・セイファートが私から霊力を奪った結果、それは悪しき心根によって干渉を受けた、魔の霊力となりました』
line = "『はい。アルタイルにいるジェラルド・セイファートが私から霊力を奪った結果、それは悪しき心根によって干渉を受けた、魔の霊力となりました』"

[[dialogue]]
speaker = "テルル"
# 『その魔の霊力と適合できるのは、それを生み出したジェラルド・セイファートのみ』
line = "『その魔の霊力と適合できるのは、それを生み出したジェラルド・セイファートのみ』"

[[dialogue]]
speaker = "テルル"
# 『だから、デネブにいるあなたと、平行世界の地で悪に堕ちたジェラルド・セイファートの意識をリンクさせる──』
line = "『だから、デネブにいるあなたと、平行世界の地で悪に堕ちたジェラルド・セイファートの意識をリンクさせる──』"

[[dialogue]]
speaker = "テルル"
# 『その同調に打ち克ち、健全な精神のまま、魔の霊力を操るすべを手に入れてほしいのです』
line = "『その同調に打ち克ち、健全な精神のまま、魔の霊力を操るすべを手に入れてほしいのです』"

[[dialogue]]
speaker = "テルル"
# 『いずれ黒騎士は、アルタイルの魔王と決着をつけるでしょう……その際、敗れた黒騎士から霊力を回収するようラクシャに命じています』
line = "『いずれ黒騎士は、アルタイルの魔王と決着をつけるでしょう……その際、敗れた黒騎士から霊力を回収するようラクシャに命じています』"

[[dialogue]]
speaker = "テルル"
# 『その力さえあれば、１０年後であったとしても、あなたは十全の騎士となれるでしょう』
line = "『その力さえあれば、１０年後であったとしても、あなたは十全の騎士となれるでしょう』"

[[dialogue]]
speaker = "テルル"
# 『酷なお願いをすることになってしまいますが……試練を受けていただけないでしょうか？　デネブの英雄、ジェラルド』
line = "『酷なお願いをすることになってしまいますが……試練を受けていただけないでしょうか？　デネブの英雄、ジェラルド』"

[[dialogue]]
speaker = "セイファート"
# 「平行世界の私が悪に堕ちた……もしそれが真実ならば、その業は私も背負わなければならないのだろうな……」
line = "「平行世界の私が悪に堕ちた……もしそれが真実ならば、その業は私も背負わなければならないのだろうな……」"

[[dialogue]]
speaker = "セイファート"
# 「いいだろう、女神よ。見せてくれ……！！」
line = "「いいだろう、女神よ。見せてくれ……！！」"

[[dialogue]]
speaker = "テルル"
# 『感謝します。気を強く、保ってください──』
line = "『感謝します。気を強く、保ってください──』"

[[dialogue]]
speaker = "セイファート"
# 「……ぐ、ぅ──！？」
line = "「……ぐ、ぅ──！？」"

[[dialogue]]
speaker = "unk"
# 雪崩れ込んでくる──アルタイルの私が抱いた絶望が。
line = "雪崩れ込んでくる──アルタイルの私が抱いた絶望が。"

[[dialogue]]
speaker = "unk"
# 手の届かない場所に行ってしまった妻が、万を超える命を虐殺していく光景を見る。
line = "手の届かない場所に行ってしまった妻が、万を超える命を虐殺していく光景を見る。"

[[dialogue]]
speaker = "unk"
# ……それをただ、見ていることしかできない苦痛。
line = "……それをただ、見ていることしかできない苦痛。"

[[dialogue]]
speaker = "unk"
# 妻を『リクリエの使徒』などという防ぎようもない理不尽によって奪われた。
line = "妻を『リクリエの使徒』などという防ぎようもない理不尽によって奪われた。"

[[dialogue]]
speaker = "unk"
# 取り返す手段は、ない。
line = "取り返す手段は、ない。"

[[dialogue]]
speaker = "unk"
# ──にも関わらず、世界の守護者としての責務を期待され続けた。
line = "──にも関わらず、世界の守護者としての責務を期待され続けた。"

[[dialogue]]
speaker = "流星教皇"
# 「──これは流星の騎士である君にしか、頼めないことなのだ」
line = "「──これは流星の騎士である君にしか、頼めないことなのだ」"

[[dialogue]]
speaker = "流星市国民"
# 「さすが英雄ジェラルド・セイファート！　あなたがいれば、リクリエなんて怖くないぞ！」
line = "「さすが英雄ジェラルド・セイファート！　あなたがいれば、リクリエなんて怖くないぞ！」"

[[dialogue]]
speaker = "女性職員"
# 「セイファートさん！　あなたのお陰で、夫が無事に帰ってくることができました！」
line = "「セイファートさん！　あなたのお陰で、夫が無事に帰ってくることができました！」"

[[dialogue]]
speaker = "セイファート"
# （ああ……。私はこれからも、妻無き世界で『英雄の振る舞い』を求められ続けるのか……）
line = "（ああ……。私はこれからも、妻無き世界で『英雄の振る舞い』を求められ続けるのか……）"

[[dialogue]]
speaker = "マルキア"
# （……お願い、あなた！　早く私を……殺して……）
line = "（……お願い、あなた！　早く私を……殺して……）"

[[dialogue]]
speaker = "マルキア"
# （どうして殺しに来てくれないの？　どうして、どうして、どうして、どうして──？）
line = "（どうして殺しに来てくれないの？　どうして、どうして、どうして、どうして──？）"

[[dialogue]]
speaker = "マルキア"
# （──殺セ。殺セ。殺セ、殺セ、殺セ殺セ殺セ殺セ！！）
line = "（──殺セ。殺セ。殺セ、殺セ、殺セ殺セ殺セ殺セ！！）"

[[dialogue]]
speaker = "マルキア"
# （壊セ創レ、壊セ創レ、壊セ壊セ、創レ創レ創レ、壊セ壊セ壊セ壊セ────）
line = "（壊セ創レ、壊セ創レ、壊セ壊セ、創レ創レ創レ、壊セ壊セ壊セ壊セ────）"

[[dialogue]]
speaker = "セイファート"
# （叶うものなら、私のこの手で、愛する妻の凶行を止めたかった）
line = "（叶うものなら、私のこの手で、愛する妻の凶行を止めたかった）"

[[dialogue]]
speaker = "セイファート"
# （しかし──平行世界間の移動は、女神の手をもってしても叶わないという……）
line = "（しかし──平行世界間の移動は、女神の手をもってしても叶わないという……）"

[[dialogue]]
speaker = "unk"
# ならばせめて、せめて……
line = "ならばせめて、せめて……"

[[dialogue]]
speaker = "セイファート"
# （愛するマルキアの罪を『なかったことにしたい』……）
line = "（愛するマルキアの罪を『なかったことにしたい』……）"

[[dialogue]]
speaker = "セイファート"
# （三界の者たちから恨まれる殺戮者としての汚名を晴らしたい──そのためには、全ての元凶に魂を売ってでも『<ruby=なかったことにする>リクリエを起こす</ruby>』しかない……）
line = "（三界の者たちから恨まれる殺戮者としての汚名を晴らしたい──そのためには、全ての元凶に魂を売ってでも『<ruby>リクリエを起こす<rt>なかったことにする</rt></ruby>』しかない……）"

[[dialogue]]
speaker = "セイファート"
# （そうか……平行世界の私は……そうやって、狂ってしまったのだな──）
line = "（そうか……平行世界の私は……そうやって、狂ってしまったのだな──）"

[[dialogue]]
speaker = "セイファート"
# （──だが、こちらの私は……絶望に膝を折ることはない）
line = "（──だが、こちらの私は……絶望に膝を折ることはない）"

[[dialogue]]
speaker = "セイファート"
# （妻は生きている。取り返しがつくのだ。そして……）
line = "（妻は生きている。取り返しがつくのだ。そして……）"

[[dialogue]]
speaker = "unk"
# 娘のアニュラスを思いやることができなかったこと。
line = "娘のアニュラスを思いやることができなかったこと。"

[[dialogue]]
speaker = "unk"
# 教え子である学園の生徒たちを信じきれなかったこと──
line = "教え子である学園の生徒たちを信じきれなかったこと──"

[[dialogue]]
speaker = "unk"
# アルタイルの私の後悔を<ruby=すく>掬</ruby>い取り、呑み込む。
line = "アルタイルの私の後悔を<ruby>掬<rt>すく</rt></ruby>い取り、呑み込む。"

[[dialogue]]
speaker = "unk"
# 破滅の光景を視て、未来へ希望を繋ぐことを放棄した、己の弱さを見つめ直す──
line = "破滅の光景を視て、未来へ希望を繋ぐことを放棄した、己の弱さを見つめ直す──"

[[dialogue]]
speaker = "セイファート"
# 「…………これで、よいのか？」
line = "「…………これで、よいのか？」"

[[dialogue]]
speaker = "テルル"
# 『ありがとうございます……そして、この上ない賞賛を。よくぞ耐えてくれました……今の貴方になら、託すことができます』
line = "『ありがとうございます……そして、この上ない賞賛を。よくぞ耐えてくれました……今の貴方になら、託すことができます』"

[[dialogue]]
speaker = "テルル"
# 『私は来たるべきその時まで、剣の錬成と……ベガより飛来するディザスターハンドを食い止めることに全力を尽くします』
line = "『私は来たるべきその時まで、剣の錬成と……ベガより飛来するディザスターハンドを食い止めることに全力を尽くします』"

[[dialogue]]
speaker = "テルル"
# 『すべては１０年後。また見えましょう、英雄ジェラルド……！』
line = "『すべては１０年後。また見えましょう、英雄ジェラルド……！』"

[[dialogue]]
speaker = "unk"
# この日より、私たち一家は身元を隠し、魔界で<ruby=しふく>雌伏</ruby>の時を過ごした。
line = "この日より、私たち一家は身元を隠し、魔界で<ruby>雌伏<rt>しふく</rt></ruby>の時を過ごした。"

[[dialogue]]
speaker = "unk"
# 姓も名も偽り、魔界の片隅で暮らすことで、ルヴィネという謎の天使の目をかいくぐり──鍛錬に次ぐ鍛錬の日々を送った。
line = "姓も名も偽り、魔界の片隅で暮らすことで、ルヴィネという謎の天使の目をかいくぐり──鍛錬に次ぐ鍛錬の日々を送った。"

[[dialogue]]
speaker = "unk"
# 平行世界の妻の、そして教え子たちの仇を討つ。そのことだけを胸に、１０年を過ごした。
line = "平行世界の妻の、そして教え子たちの仇を討つ。そのことだけを胸に、１０年を過ごした。"

[[dialogue]]
speaker = "unk"
# そして──
line = "そして──"

[[dialogue]]
speaker = "セイファート"
# 「──時は満ちた。あなたが、守護天使ラクシャだな？」
line = "「──時は満ちた。あなたが、守護天使ラクシャだな？」"

[[dialogue]]
speaker = "unk"
# ラクシャが回収していた、平行世界アルタイルの私によって汚染された、魔の霊力を継承したのだ──
line = "ラクシャが回収していた、平行世界アルタイルの私によって汚染された、魔の霊力を継承したのだ──"

[[dialogue]]
speaker = "セイファート"
# 「遅れてすまなかった……始めるぞ、少年」
line = "「遅れてすまなかった……始めるぞ、少年」"

[[dialogue]]
speaker = "セイファート"
# 「全ての世界を救う……現代の魔王の物語を！！」
line = "「全ての世界を救う……現代の魔王の物語を！！」"

[[dialogue]]
speaker = "クロト"
# 「セイファート──学園長！！！」
line = "「セイファート──学園長！！！」"

[[dialogue]]
