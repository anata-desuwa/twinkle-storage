[[dialogue]]
speaker = "unk"
# 第３話,大切な幼馴染,P
line = "第３話,大切な幼馴染,P"

[[dialogue]]
speaker = "unk"
# ソバ屋スイーツのアイデアを探しに行くため、ナナカと待ち合わせしていた。
line = "ソバ屋スイーツのアイデアを探しに行くため、ナナカと待ち合わせしていた。"

[[dialogue]]
speaker = "unk"
# フィオナとヴィーナスも誘ってみたが、彼女たちは彼女たちで用事があるらしい。
line = "フィオナとヴィーナスも誘ってみたが、彼女たちは彼女たちで用事があるらしい。"

[[dialogue]]
speaker = "unk"
# その代わりに──
line = "その代わりに──"

[[dialogue]]
speaker = "ナナカ"
# 「お待たせっ。それじゃ行こっか」
line = "「お待たせっ。それじゃ行こっか」"

[[dialogue]]
speaker = "パッキー"
# 「おっしゃあ、じゃんじゃん持ってこ～い！　シン様の質素な食生活に付き合わされて、こっちは万年ハラペコなんだからよ！」
line = "「おっしゃあ、じゃんじゃん持ってこ～い！　シン様の質素な食生活に付き合わされて、こっちは万年ハラペコなんだからよ！」"

[[dialogue]]
speaker = "unk"
# このパンダは？
line = "このパンダは？"

[[dialogue]]
speaker = "ナナカ"
# 「ごめん、なんか話を聞きつけて、ついてきちゃった」
line = "「ごめん、なんか話を聞きつけて、ついてきちゃった」"

[[dialogue]]
speaker = "パッキー"
# 「おいおい、俺様がいれば百人力だろうが！」
line = "「おいおい、俺様がいれば百人力だろうが！」"

[[dialogue]]
speaker = "パッキー"
# 「というか、この大賢者パッキー様をパンダ扱いとは、いい度胸だぜ！」
line = "「というか、この大賢者パッキー様をパンダ扱いとは、いい度胸だぜ！」"

[[dialogue]]
speaker = "ナナカ"
# 「いや、どこからどう見てもパンダでしょ」
line = "「いや、どこからどう見てもパンダでしょ」"

[[dialogue]]
speaker = "unk"
# パンダってスイーツ食べるの？
line = "パンダってスイーツ食べるの？"

[[dialogue]]
speaker = "パッキー"
# 「おうともさ！　メチャクチャ食うぜ！　このパッキー様が笹しか食わないと思ったら大間違いだぜ！」
line = "「おうともさ！　メチャクチャ食うぜ！　このパッキー様が笹しか食わないと思ったら大間違いだぜ！」"

[[dialogue]]
speaker = "ナナカ"
# 「なんか偉そうでごめん。まあ、このパンダは試食担当ってことで」
line = "「なんか偉そうでごめん。まあ、このパンダは試食担当ってことで」"

[[dialogue]]
speaker = "パッキー"
# 「おう！　試食なら俺様に任せやがれ～！」
line = "「おう！　試食なら俺様に任せやがれ～！」"

[[dialogue]]
speaker = "ナナカ"
# 「いろいろ試食してもらったけど、手応えはあった？」
line = "「いろいろ試食してもらったけど、手応えはあった？」"

[[dialogue]]
speaker = "unk"
# 参考になるスウィーツはあったよ
line = "参考になるスウィーツはあったよ"

[[dialogue]]
speaker = "ナナカ"
# 「ならよかった。食べても成果が出なかったら、意味ないもんね」
line = "「ならよかった。食べても成果が出なかったら、意味ないもんね」"

[[dialogue]]
speaker = "ナナカ"
# 「いくら好物でも、食べすぎたら苦しくなっちゃうし。ほら、あんな感じで」
line = "「いくら好物でも、食べすぎたら苦しくなっちゃうし。ほら、あんな感じで」"

[[dialogue]]
speaker = "パッキー"
# 「うぐぅ……うぇぇ……も、もう食えねぇぇ……っ」
line = "「うぐぅ……うぇぇ……も、もう食えねぇぇ……っ」"

[[dialogue]]
speaker = "ナナカ"
# 「まったく、欲張るからそういうことになるんでしょうが」
line = "「まったく、欲張るからそういうことになるんでしょうが」"

[[dialogue]]
speaker = "パッキー"
# 「お、俺様のことは、しばらくそっとしておいてほしいんだぜ……」
line = "「お、俺様のことは、しばらくそっとしておいてほしいんだぜ……」"

[[dialogue]]
speaker = "ナナカ"
# 「だってさ。あの調子じゃ、もう試食係は無理っぽいね。まあ、食べるだけだったから、役には立ってなかったけど」
line = "「だってさ。あの調子じゃ、もう試食係は無理っぽいね。まあ、食べるだけだったから、役には立ってなかったけど」"

[[dialogue]]
speaker = "ナナカ"
# 「てか、アタシらもちょっと食べ過ぎちゃったかな。腹ごなしにさ、少し歩こうよ」
line = "「てか、アタシらもちょっと食べ過ぎちゃったかな。腹ごなしにさ、少し歩こうよ」"

[[dialogue]]
speaker = "ナナカ"
# 「そんでさ、夕霧庵で出すスウィーツって、どんなのがいいと思う？」
line = "「そんでさ、夕霧庵で出すスウィーツって、どんなのがいいと思う？」"

[[dialogue]]
speaker = "ナナカ"
# 「アタシ的には、やっぱ和菓子がいいのかなって思うんだけど……和菓子ってハードル高いよね？」
line = "「アタシ的には、やっぱ和菓子がいいのかなって思うんだけど……和菓子ってハードル高いよね？」"

[[dialogue]]
speaker = "ナナカ"
# 「洋菓子なら簡単なのもあるけど、ソバ屋だしなぁ」
line = "「洋菓子なら簡単なのもあるけど、ソバ屋だしなぁ」"

[[dialogue]]
speaker = "unk"
# 和と洋のいいとこ取りで行こう
line = "和と洋のいいとこ取りで行こう"

[[dialogue]]
speaker = "ナナカ"
# 「おっ、なるほどねぇ。単純な和洋折衷じゃなくて、洋菓子に和のテイストを取り入れて……うんうん、悪くないんじゃない？」
line = "「おっ、なるほどねぇ。単純な和洋折衷じゃなくて、洋菓子に和のテイストを取り入れて……うんうん、悪くないんじゃない？」"

[[dialogue]]
speaker = "ナナカ"
# 「問題は、アタシにも作れるか、だよねぇ。あと、それなりの数も必要だから、量産性も考えなきゃだし……」
line = "「問題は、アタシにも作れるか、だよねぇ。あと、それなりの数も必要だから、量産性も考えなきゃだし……」"

[[dialogue]]
speaker = "ナナカ"
# 「はぁ～、お店で売るのって難しいよね、やっぱ。こんな時、シンがいてくれたら相談出来るんだけど……」
line = "「はぁ～、お店で売るのって難しいよね、やっぱ。こんな時、シンがいてくれたら相談出来るんだけど……」"

[[dialogue]]
speaker = "ナナカ"
# 「あっ、ごめん！　会長も知ってると思うけど、シンってのはアタシの幼馴染でさ……」
line = "「あっ、ごめん！　会長も知ってると思うけど、シンってのはアタシの幼馴染でさ……」"

[[dialogue]]
speaker = "ナナカ"
# 「こういう時、よく相談に乗ってもらってたんだ。幼馴染だから話しやすいし、向こうもこっちに遠慮なんてしないしね」
line = "「こういう時、よく相談に乗ってもらってたんだ。幼馴染だから話しやすいし、向こうもこっちに遠慮なんてしないしね」"

[[dialogue]]
speaker = "unk"
# 仲がいいんだ？
line = "仲がいいんだ？"

[[dialogue]]
speaker = "ナナカ"
# 「仲がいいって言うか……うん、そうなのかな……仲はいいと思う」
line = "「仲がいいって言うか……うん、そうなのかな……仲はいいと思う」"

[[dialogue]]
speaker = "ナナカ"
# 「たまに、口喧嘩することもあるけどね。それでも、いざって時はいつもアタシを助けてくれる、そんなやつだから……」
line = "「たまに、口喧嘩することもあるけどね。それでも、いざって時はいつもアタシを助けてくれる、そんなやつだから……」"

[[dialogue]]
speaker = "unk"
# 幼馴染は大事だね
line = "幼馴染は大事だね"

[[dialogue]]
speaker = "ナナカ"
# 「……うん、アタシもそう思ってる」
line = "「……うん、アタシもそう思ってる」"

[[dialogue]]
speaker = "ナナカ"
# 「ってか、会長も幼馴染のことわかってる感じの物言いだね。もしかして、仲いい幼馴染がいるの？」
line = "「ってか、会長も幼馴染のことわかってる感じの物言いだね。もしかして、仲いい幼馴染がいるの？」"

[[dialogue]]
speaker = "unk"
# メルエルって言うんだけど
line = "メルエルって言うんだけど"

[[dialogue]]
speaker = "unk"
# いるよ
line = "いるよ"

[[dialogue]]
speaker = "ナナカ"
# 「へぇ～……メルエルって言うんだ。よかったらさ、どんな子なのか、教えてよ」
line = "「へぇ～……メルエルって言うんだ。よかったらさ、どんな子なのか、教えてよ」"

[[dialogue]]
speaker = "ナナカ"
# 「なるほど、そのメルエルとは、今通ってる新星学園で再会したんだ……いいね、なんかドラマチックじゃん」
line = "「なるほど、そのメルエルとは、今通ってる新星学園で再会したんだ……いいね、なんかドラマチックじゃん」"

[[dialogue]]
speaker = "ナナカ"
# 「でも、記憶が曖昧なの？　大好きな幼馴染だったんでしょ？」
line = "「でも、記憶が曖昧なの？　大好きな幼馴染だったんでしょ？」"

[[dialogue]]
speaker = "unk"
# はっきり思い出せないんだ
line = "はっきり思い出せないんだ"

[[dialogue]]
speaker = "unk"
# 思い出せたらって思ってるけど
line = "思い出せたらって思ってるけど"

[[dialogue]]
speaker = "ナナカ"
# 「ごめん、デリカシーないこと言った。大切な幼馴染のことだもん、思い出したいに決まってるよね」
line = "「ごめん、デリカシーないこと言った。大切な幼馴染のことだもん、思い出したいに決まってるよね」"

[[dialogue]]
speaker = "ナナカ"
# 「アタシだって……シンのこと忘れちゃったらさ、何が何でも思い出したいって思うだろうし」
line = "「アタシだって……シンのこと忘れちゃったらさ、何が何でも思い出したいって思うだろうし」"

[[dialogue]]
speaker = "ナナカ"
# 「そんで、メルエルの方はどうなわけ？　お互いに覚えてないって感じ？　今聞いた話だと、そんなこともなさそうだけど……」
line = "「そんで、メルエルの方はどうなわけ？　お互いに覚えてないって感じ？　今聞いた話だと、そんなこともなさそうだけど……」"

[[dialogue]]
speaker = "ナナカ"
# （ていうか、何年も会ってなかったのにわざわざ向こうから会いに来たってことは、絶対この人のこと好きでしょそれ。なら、思い出してもらえないのは、つらいよね……）
line = "（ていうか、何年も会ってなかったのにわざわざ向こうから会いに来たってことは、絶対この人のこと好きでしょそれ。なら、思い出してもらえないのは、つらいよね……）"

[[dialogue]]
speaker = "ナナカ"
# （よっしゃ、ここはアタシが、その子に援護射撃してあげちゃおうじゃないの！）
line = "（よっしゃ、ここはアタシが、その子に援護射撃してあげちゃおうじゃないの！）"

[[dialogue]]
speaker = "ナナカ"
# 「ねえ、メルエルのこと、絶対に思い出してあげて！」
line = "「ねえ、メルエルのこと、絶対に思い出してあげて！」"

[[dialogue]]
speaker = "unk"
# ど、どうしたの急に？
line = "ど、どうしたの急に？"

[[dialogue]]
speaker = "ナナカ"
# 「同じ幼馴染のいる立場として、共感しちゃっただけ！　もしアタシがその子の立場なら、絶対に思い出して欲しいし」
line = "「同じ幼馴染のいる立場として、共感しちゃっただけ！　もしアタシがその子の立場なら、絶対に思い出して欲しいし」"

[[dialogue]]
speaker = "ナナカ"
# 「人の記憶なんて、そう簡単にどうにかなるもんじゃないってのは、わかってるけどさ……」
line = "「人の記憶なんて、そう簡単にどうにかなるもんじゃないってのは、わかってるけどさ……」"

[[dialogue]]
speaker = "ナナカ"
# 「でも、願わなかったら絶対叶わないって気がするし。逆に言えば、願い続ければいつかきっと叶う。アタシはそう信じてる」
line = "「でも、願わなかったら絶対叶わないって気がするし。逆に言えば、願い続ければいつかきっと叶う。アタシはそう信じてる」"

[[dialogue]]
speaker = "ナナカ"
# 「そのメルエルって子は、顔も知らない相手だけど……それでも、うまく行って欲しいなって思うんだよ」
line = "「そのメルエルって子は、顔も知らない相手だけど……それでも、うまく行って欲しいなって思うんだよ」"

[[dialogue]]
speaker = "unk"
# うまく行くって、何が？
line = "うまく行くって、何が？"

[[dialogue]]
speaker = "ナナカ"
# 「何って、それは……もうっ、そんなのアタシの口から言わせるんじゃないやいっ！」
line = "「何って、それは……もうっ、そんなのアタシの口から言わせるんじゃないやいっ！」"

[[dialogue]]
speaker = "ナナカ"
# 「とにかくっ、会長も幼馴染のことを大事に思うんだったら、ちゃんと考えて、察してあげな」
line = "「とにかくっ、会長も幼馴染のことを大事に思うんだったら、ちゃんと考えて、察してあげな」"

[[dialogue]]
speaker = "ナナカ"
# 「それだけできっと、メルエルは喜んでくれるはずだからさ」
line = "「それだけできっと、メルエルは喜んでくれるはずだからさ」"

[[dialogue]]
speaker = "ナナカ"
# 「今は離れ離れだけど、あっちに帰ったら、ちゃんとメルエルに優しくしてあげるんだよ」
line = "「今は離れ離れだけど、あっちに帰ったら、ちゃんとメルエルに優しくしてあげるんだよ」"

[[dialogue]]
speaker = "unk"
# 真っ先に会いに行くよ
line = "真っ先に会いに行くよ"

[[dialogue]]
speaker = "ナナカ"
# 「それでよし！　アタシとの約束だからねっ！」
line = "「それでよし！　アタシとの約束だからねっ！」"

[[dialogue]]
speaker = "unk"
# こうして俺はナナカと大切な約束をした。
line = "こうして俺はナナカと大切な約束をした。"

[[dialogue]]
speaker = "unk"
# メルエルは知らない約束だけど、絶対に守ると心の中で誓ったんだ。
line = "メルエルは知らない約束だけど、絶対に守ると心の中で誓ったんだ。"
