[[dialogue]]
speaker = "unk"
# その日の夜。俺たちは再び保健室にやって来ていた。
line = "その日の夜。俺たちは再び保健室にやって来ていた。"

[[dialogue]]
speaker = "ソフレ"
# 「……で、仕方なく、ソフレも調査とやらに協力してあげることにしたわけだけど――」
line = "「……で、仕方なく、ソフレも調査とやらに協力してあげることにしたわけだけど――」"

[[dialogue]]
speaker = "ソフレ"
# 「なぜ、こんな窮屈なところでコソコソしなければいけないのだわ！？」
line = "「なぜ、こんな窮屈なところでコソコソしなければいけないのだわ！？」"

[[dialogue]]
speaker = "フェリシー"
# 「いや、本当に保健室に不審者が現れるなら、こっちの存在がバレないように隠れてないといけないでしょ？」
line = "「いや、本当に保健室に不審者が現れるなら、こっちの存在がバレないように隠れてないといけないでしょ？」"

[[dialogue]]
speaker = "ソフレ"
# 「だからって、つい立ての後ろに３人でぎゅうぎゅう詰めじゃ、暑苦しくて寝てられないのだわ！」
line = "「だからって、つい立ての後ろに３人でぎゅうぎゅう詰めじゃ、暑苦しくて寝てられないのだわ！」"

[[dialogue]]
speaker = "フェリシー"
# 「サボって居眠りする気満々じゃん！」
line = "「サボって居眠りする気満々じゃん！」"

[[dialogue]]
speaker = "ソフレ"
# 「というか、お前はともかく、会長もいるのよ？　少しは空気を読めなのだわ！」
line = "「というか、お前はともかく、会長もいるのよ？　少しは空気を読めなのだわ！」"

[[dialogue]]
speaker = "フェリシー"
# 「え？　どゆこと？　会長くんは助っ人だし……」
line = "「え？　どゆこと？　会長くんは助っ人だし……」"

[[dialogue]]
speaker = "ソフレ"
# 「距離が近いって言ってるのよ！　なんでお前は、今日会ったばかりの男子と、そんなに平気でくっ付いていられるのだわ！？」
line = "「距離が近いって言ってるのよ！　なんでお前は、今日会ったばかりの男子と、そんなに平気でくっ付いていられるのだわ！？」"

[[dialogue]]
speaker = "フェリシー"
# 「あっ、そういうことか！　またやっちゃった……！」
line = "「あっ、そういうことか！　またやっちゃった……！」"

[[dialogue]]
speaker = "フェリシー"
# 「ごめんね、会長くん。嫌じゃなかった？」
line = "「ごめんね、会長くん。嫌じゃなかった？」"

[[dialogue]]
speaker = "フェリシー"
# 「――大丈夫？　なら、よかった。なんか、会長くんって親しみやすい雰囲気だから、つい♪」
line = "「――大丈夫？　なら、よかった。なんか、会長くんって親しみやすい雰囲気だから、つい♪」"

[[dialogue]]
speaker = "ソフレ"
# 「大丈夫と言いつつ、会長、内心ドキドキしてるんじゃないの？」
line = "「大丈夫と言いつつ、会長、内心ドキドキしてるんじゃないの？」"

[[dialogue]]
speaker = "unk"
# そ、そんなことないよ……？
line = "そ、そんなことないよ……？"

[[dialogue]]
speaker = "ソフレ"
# 「図星なのが顔に出てるのだわ」
line = "「図星なのが顔に出てるのだわ」"

[[dialogue]]
speaker = "フェリシー"
# 「えっ、会長くん照れてるの？　な、なんか、それ聞くと、私も照れちゃうかも……」
line = "「えっ、会長くん照れてるの？　な、なんか、それ聞くと、私も照れちゃうかも……」"

[[dialogue]]
speaker = "ソフレ"
# 「はぁ……ソフレは離れたところで寝てるから、もうそのまま、２人で仲よく青春ごっこをしてればいいんじゃないかしら」
line = "「はぁ……ソフレは離れたところで寝てるから、もうそのまま、２人で仲よく青春ごっこをしてればいいんじゃないかしら」"

[[dialogue]]
speaker = "フェリシー"
# 「って、いやいや！　隠れてなきゃダメだって！　ソフレが実際に見えるところで寝てたら、不審者と間違われちゃう可能性もあるでしょ？」
line = "「って、いやいや！　隠れてなきゃダメだって！　ソフレが実際に見えるところで寝てたら、不審者と間違われちゃう可能性もあるでしょ？」"

[[dialogue]]
speaker = "ソフレ"
# 「というか、そもそも何故、ソフレが犯人だと疑われているのだわ？」
line = "「というか、そもそも何故、ソフレが犯人だと疑われているのだわ？」"

[[dialogue]]
speaker = "ソフレ"
# 「ソフレは確かに保健室をお昼寝スポットとして使ったりするけど、それはあくまで昼間の話。夜だったら普通に、流星寮の自室に帰って寝るのだわ」
line = "「ソフレは確かに保健室をお昼寝スポットとして使ったりするけど、それはあくまで昼間の話。夜だったら普通に、流星寮の自室に帰って寝るのだわ」"

[[dialogue]]
speaker = "フェリシー"
# 「私は、ソフレが犯人だとは特に疑ってないよ」
line = "「私は、ソフレが犯人だとは特に疑ってないよ」"

[[dialogue]]
speaker = "フェリシー"
# 「ソフレは『暴虐の吸血鬼』として有名だけど、１００年経った今では、両学園で呼ばれてる『眠り姫』って、可愛いあだ名が付くくらいだし」
line = "「ソフレは『暴虐の吸血鬼』として有名だけど、１００年経った今では、両学園で呼ばれてる『眠り姫』って、可愛いあだ名が付くくらいだし」"

[[dialogue]]
speaker = "フェリシー"
# 「にも関わらず、目撃者の多くがわざわざ『暴虐の吸血鬼』って昔の呼び名を持ち出した」
line = "「にも関わらず、目撃者の多くがわざわざ『暴虐の吸血鬼』って昔の呼び名を持ち出した」"

[[dialogue]]
speaker = "フェリシー"
# 「それって、不審者はソフレに似ているけど、何か違うって感じたからじゃないかと思うんだよね」
line = "「それって、不審者はソフレに似ているけど、何か違うって感じたからじゃないかと思うんだよね」"

[[dialogue]]
speaker = "フェリシー"
# 「あと、探査星術にも引っかからないし、監視カメラにも映らないってのも、明らかに妙だしね」
line = "「あと、探査星術にも引っかからないし、監視カメラにも映らないってのも、明らかに妙だしね」"

[[dialogue]]
speaker = "unk"
# ――それから、１時間ほど経過して。
line = "――それから、１時間ほど経過して。"

[[dialogue]]
speaker = "フェリシー"
# 「どうか、上手く行きますように……」
line = "「どうか、上手く行きますように……」"

[[dialogue]]
speaker = "unk"
# ふと隣を見やると、フェリシーが手を合わせて、お祈りしている姿が目に入った。
line = "ふと隣を見やると、フェリシーが手を合わせて、お祈りしている姿が目に入った。"

[[dialogue]]
speaker = "unk"
# どうしたのかと尋ねると――
line = "どうしたのかと尋ねると――"

[[dialogue]]
speaker = "フェリシー"
# 「あっ、これ？　実は私……結構心配症で、つい癖でお祈りしちゃうんだよね」
line = "「あっ、これ？　実は私……結構心配症で、つい癖でお祈りしちゃうんだよね」"

[[dialogue]]
speaker = "フェリシー"
# 「ほら、何かをいざやろうとする時って、妙に不安な気持ちになったりしない？」
line = "「ほら、何かをいざやろうとする時って、妙に不安な気持ちになったりしない？」"

[[dialogue]]
speaker = "ソフレ"
# 「ふん。悪い癖なのだわ」
line = "「ふん。悪い癖なのだわ」"

[[dialogue]]
speaker = "ソフレ"
# 「自分に自信があれば、不安になんかなったりしないのよ」
line = "「自分に自信があれば、不安になんかなったりしないのよ」"

[[dialogue]]
speaker = "ソフレ"
# 「祈りとは本来、他者への想いを願い、込めるもの……祈りにすがって、不安を忘れることではないのだわ」
line = "「祈りとは本来、他者への想いを願い、込めるもの……祈りにすがって、不安を忘れることではないのだわ」"

[[dialogue]]
speaker = "ソフレ"
# 「お前が本当に、星に選ばれたエクソシストだというのなら――」
line = "「お前が本当に、星に選ばれたエクソシストだというのなら――」"

[[dialogue]]
speaker = "ソフレ"
# 「プライドを持って、自分のことくらい、祈らずに何とかしてみせろって話なのだわ」
line = "「プライドを持って、自分のことくらい、祈らずに何とかしてみせろって話なのだわ」"

[[dialogue]]
speaker = "フェリシー"
# 「……ソフレは、やっぱり誇り高き吸血鬼だね！」
line = "「……ソフレは、やっぱり誇り高き吸血鬼だね！」"

[[dialogue]]
speaker = "ソフレ"
# 「はぁ？」
line = "「はぁ？」"

[[dialogue]]
speaker = "フェリシー"
# 「お母さんやお祖母ちゃんから伝え聞いていた通りだよ！」
line = "「お母さんやお祖母ちゃんから伝え聞いていた通りだよ！」"

[[dialogue]]
speaker = "ソフレ"
# 「…………今のソフレは、昔とは違うのよ……」
line = "「…………今のソフレは、昔とは違うのよ……」"

[[dialogue]]
speaker = "ソフレ"
# （今のは、何となく面白くなくて、つい口を挟んでしまっただけで……）
line = "（今のは、何となく面白くなくて、つい口を挟んでしまっただけで……）"

[[dialogue]]
speaker = "ソフレ"
# （プライドとか今更……そんなんじゃないのだわ。<b>アイツ</b>の言葉を借りただけだし……）
line = "（プライドとか今更……そんなんじゃないのだわ。<b>アイツ</b>の言葉を借りただけだし……）"

[[dialogue]]
speaker = "unk"
# と、その時。
line = "と、その時。"

[[dialogue]]
speaker = "？？？"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# ２人共！　後ろだ！
line = "２人共！　後ろだ！"

[[dialogue]]
speaker = "フェリシー"
# 「えっ……？」
line = "「えっ……？」"

[[dialogue]]
speaker = "ソフレ"
# 「なっ……！？」
line = "「なっ……！？」"

[[dialogue]]
speaker = "フェリシー"
# 「ソフレがもう１人！？　いつの間に！？」
line = "「ソフレがもう１人！？　いつの間に！？」"

[[dialogue]]
speaker = "ソフレ"
# 「本当にそっくりなのだわ！？　なにこれ、ドッペルゲンガー！？」
line = "「本当にそっくりなのだわ！？　なにこれ、ドッペルゲンガー！？」"

[[dialogue]]
speaker = "フェリシー"
# 「全く気配を感じなかった……！」
line = "「全く気配を感じなかった……！」"

[[dialogue]]
speaker = "偽物"
# 「暴虐の吸血鬼……本体を確認したわ」
line = "「暴虐の吸血鬼……本体を確認したわ」"

[[dialogue]]
speaker = "偽物"
# 「好機と判断、<b>図書館</b>への強制転移を行うのだわ」
line = "「好機と判断、<b>図書館</b>への強制転移を行うのだわ」"

[[dialogue]]
speaker = "unk"
# 突然、室内が眩い光に包まれたかと思うと――
line = "突然、室内が眩い光に包まれたかと思うと――"

[[dialogue]]
speaker = "ソフレ"
# 「これは……！？」
line = "「これは……！？」"

[[dialogue]]
speaker = "フェリシー"
# 「ソフレ！」
line = "「ソフレ！」"

[[dialogue]]
speaker = "unk"
# 次の瞬間には、ソフレとフェリシー、そして偽物の姿が消え去ってしまっていた。
line = "次の瞬間には、ソフレとフェリシー、そして偽物の姿が消え去ってしまっていた。"

[[dialogue]]
speaker = "unk"
# 一体どこに……！？
line = "一体どこに……！？"

[[dialogue]]
speaker = "unk"
# 俺は２人を探す為、すぐさま保健室を飛び出すのだった――
line = "俺は２人を探す為、すぐさま保健室を飛び出すのだった――"

[[dialogue]]
speaker = "unk"
# 保健室で光に包まれたソフレとフェリシー。
line = "保健室で光に包まれたソフレとフェリシー。"

[[dialogue]]
speaker = "unk"
# 気付けば、２人は全く別の場所に立っていた。
line = "気付けば、２人は全く別の場所に立っていた。"

[[dialogue]]
speaker = "ソフレ"
# 「ここは……一体どこなのだわ……！？」
line = "「ここは……一体どこなのだわ……！？」"

[[dialogue]]
speaker = "フェリシー"
# 「この場所……『地下図書館』……！？」
line = "「この場所……『地下図書館』……！？」"

[[dialogue]]
speaker = "ソフレ"
# 「それってウィステリアが言っていた……？」
line = "「それってウィステリアが言っていた……？」"

[[dialogue]]
speaker = "フェリシー"
# 「うん。ウィステリアさんに同伴してもらって、何度も来たことがあるから間違いないと思う」
line = "「うん。ウィステリアさんに同伴してもらって、何度も来たことがあるから間違いないと思う」"

[[dialogue]]
speaker = "フェリシー"
# 「地下図書館は、新星学園の地下３０００メートルに存在する謎の空間なの」
line = "「地下図書館は、新星学園の地下３０００メートルに存在する謎の空間なの」"

[[dialogue]]
speaker = "フェリシー"
# 「新星学園の図書館とは、異空間を通じて繋がっている場所で……なんの力が働いているのか分かっていないみたいだけど、１つの異変として、確かにこうして存在している」
line = "「新星学園の図書館とは、異空間を通じて繋がっている場所で……なんの力が働いているのか分かっていないみたいだけど、１つの異変として、確かにこうして存在している」"

[[dialogue]]
speaker = "フェリシー"
# 「ウィステリアさんは、普通の司書として仕事する傍ら、新星学園の指示で、地下図書館の調査を任されているの」
line = "「ウィステリアさんは、普通の司書として仕事する傍ら、新星学園の指示で、地下図書館の調査を任されているの」"

[[dialogue]]
speaker = "フェリシー"
# 「でも、普段はウィステリアさんが出入口を封印しているから、ここには入れないはずなんだけど……」
line = "「でも、普段はウィステリアさんが出入口を封印しているから、ここには入れないはずなんだけど……」"

[[dialogue]]
speaker = "ソフレ"
# 「だとすれば、ここに連れ込んだのは、ヤツなのだわ」
line = "「だとすれば、ここに連れ込んだのは、ヤツなのだわ」"

[[dialogue]]
speaker = "偽物"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "偽物"
# 「本体の転移には成功。しかし――」
line = "「本体の転移には成功。しかし――」"

[[dialogue]]
speaker = "偽物"
# 「直前の不可解な干渉で、余計なものに紛れ込まれたのだわ」
line = "「直前の不可解な干渉で、余計なものに紛れ込まれたのだわ」"

[[dialogue]]
speaker = "フェリシー"
# 「ソフレの偽物……！　まさか、地下図書館の防衛システム……！？」
line = "「ソフレの偽物……！　まさか、地下図書館の防衛システム……！？」"

[[dialogue]]
speaker = "ソフレ"
# 「防衛システム？」
line = "「防衛システム？」"

[[dialogue]]
speaker = "フェリシー"
# 「地下図書館には、侵入者を撃退する為に、ヒトの姿をコピーして、守護者を作り出すシステムがあるの」
line = "「地下図書館には、侵入者を撃退する為に、ヒトの姿をコピーして、守護者を作り出すシステムがあるの」"

[[dialogue]]
speaker = "ソフレ"
# 「でも、なんでソフレの姿に……？　ソフレはこの場所に来たことなんてないのだわ」
line = "「でも、なんでソフレの姿に……？　ソフレはこの場所に来たことなんてないのだわ」"

[[dialogue]]
speaker = "フェリシー"
# 「！　まさか……！」
line = "「！　まさか……！」"

[[dialogue]]
speaker = "フェリシー"
# 「私が地下図書館で、ソフレの封印を解く方法を探していたから……！？
line = "「私が地下図書館で、ソフレの封印を解く方法を探していたから……！？"

[[dialogue]]
speaker = "偽物"
# 「理由なんて、お前たちが知る必要はないのだわ」
line = "「理由なんて、お前たちが知る必要はないのだわ」"

[[dialogue]]
speaker = "偽物"
# 「必要としているのは、ソフレ・ヴァートリン本体の記録。余計な詮索はせずに、黙ってこちらの指示に従うのだわ」
line = "「必要としているのは、ソフレ・ヴァートリン本体の記録。余計な詮索はせずに、黙ってこちらの指示に従うのだわ」"

[[dialogue]]
speaker = "ソフレ"
# 「指示ですって？」
line = "「指示ですって？」"

[[dialogue]]
speaker = "偽物"
# 「お前を拘束し、その情報を詳細に解析、記録する。それと――」
line = "「お前を拘束し、その情報を詳細に解析、記録する。それと――」"

[[dialogue]]
speaker = "偽物"
# 「関係のない侵入者は排除する。恵原フェリシー、ここからすぐに立ち去るのだわ」
line = "「関係のない侵入者は排除する。恵原フェリシー、ここからすぐに立ち去るのだわ」"

[[dialogue]]
speaker = "フェリシー"
# 「ソフレを置いてくだなんて、そんな指示、従えるわけがないよ！」
line = "「ソフレを置いてくだなんて、そんな指示、従えるわけがないよ！」"

[[dialogue]]
speaker = "ソフレ"
# 「ふん。ソフレだって、面倒事はゴメンなのだわ！」
line = "「ふん。ソフレだって、面倒事はゴメンなのだわ！」"

[[dialogue]]
speaker = "偽物"
# 「そう。ならば仕方がない――」
line = "「そう。ならば仕方がない――」"

[[dialogue]]
speaker = "偽物"
# 「実力行使で制圧するのみ」
line = "「実力行使で制圧するのみ」"

[[dialogue]]
speaker = "フェリシー"
# 「ソフレ！」
line = "「ソフレ！」"

[[dialogue]]
speaker = "ソフレ"
# 「わかっているのだわ！」
line = "「わかっているのだわ！」"

[[dialogue]]
speaker = "unk"
# ２人は偽物の放つ攻撃を回避しながら、声を合わせる。
line = "２人は偽物の放つ攻撃を回避しながら、声を合わせる。"

[[dialogue]]
speaker = "２人"
# 「変身！」
line = "「変身！」"

[[dialogue]]
speaker = "偽物"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "フェリシー"
# 「一気に突破して、ここから脱出するよ！」
line = "「一気に突破して、ここから脱出するよ！」"

[[dialogue]]
speaker = "ソフレ"
# 「言われなくとも、ソフレはさっさと帰って寝させてもらうのだわ！」
line = "「言われなくとも、ソフレはさっさと帰って寝させてもらうのだわ！」"

[[dialogue]]
speaker = "unk"
# 地下図書館での戦闘が始まるのだった――
line = "地下図書館での戦闘が始まるのだった――"
