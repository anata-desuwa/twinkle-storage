line = "「メルエルも薄々気付いてたんじゃない？　一緒に住んでる家族が、本当の家族じゃないって」"

[[dialogue]]
speaker = "メルエル"
# 「それは……」
line = "「それは……」"

[[dialogue]]
speaker = "メルエル"
# （考えたことがないわけじゃない……お父さんもお母さんも、私のことをすごく大切にしてくれてるのは、わかる。私だって２人のことが大好きだ）
line = "（考えたことがないわけじゃない……お父さんもお母さんも、私のことをすごく大切にしてくれてるのは、わかる。私だって２人のことが大好きだ）"

[[dialogue]]
speaker = "メルエル"
# （だけど私が人間界に来る時、お父さんの転勤が急に決まった。その時だけじゃない。不自然な転勤は今までも何度かあった）
line = "（だけど私が人間界に来る時、お父さんの転勤が急に決まった。その時だけじゃない。不自然な転勤は今までも何度かあった）"

[[dialogue]]
speaker = "メルエル"
