[[dialogue]]
speaker = "unk"
# 第３話,メルエルとナターシャ,B
line = "第３話,メルエルとナターシャ,B"

[[dialogue]]
speaker = "unk"
# メルエルは魔王の血族だった。
line = "メルエルは魔王の血族だった。"

[[dialogue]]
speaker = "unk"
# そしてナターシャはそれを知りながら、メルエルに秘密にしていた。
line = "そしてナターシャはそれを知りながら、メルエルに秘密にしていた。"

[[dialogue]]
speaker = "unk"
# その事実に、メルエルが目を見開く。
line = "その事実に、メルエルが目を見開く。"

[[dialogue]]
speaker = "メルエル"
# 「私が魔王の血族だって知ってたの？　いつから……？　留学生として新星学園に来た時から？　それとももっと昔……？」
line = "「私が魔王の血族だって知ってたの？　いつから……？　留学生として新星学園に来た時から？　それとももっと昔……？」"

[[dialogue]]
speaker = "ナターシャ"
# 「昔から。初めて会った時から、メルエルが魔王だって知ってたよ」
line = "「昔から。初めて会った時から、メルエルが魔王だって知ってたよ」"

[[dialogue]]
speaker = "メルエル"
# 「え……？　じゃあ──」
line = "「え……？　じゃあ──」"

[[dialogue]]
speaker = "ナターシャ"
# 「そ。お察しの通り。私はメルエルの幼なじみなんかじゃない」
line = "「そ。お察しの通り。私はメルエルの幼なじみなんかじゃない」"

[[dialogue]]
speaker = "ナターシャ"
# 「出会った時から今の今まで、私がメルエルの近くにいたのは任務のため」
line = "「出会った時から今の今まで、私がメルエルの近くにいたのは任務のため」"

[[dialogue]]
speaker = "ナターシャ"
# 「私は小さい頃からずっと……それこそ物心つく前から、メルエルの監視と護衛をしてたんだ」
line = "「私は小さい頃からずっと……それこそ物心つく前から、メルエルの監視と護衛をしてたんだ」"

[[dialogue]]
speaker = "メルエル"
# 「────」
line = "「────」"

[[dialogue]]
speaker = "unk"
# 長年の幼なじみ──と思っていた相手からの告白に、メルエルが言葉を失って唖然とする。
line = "長年の幼なじみ──と思っていた相手からの告白に、メルエルが言葉を失って唖然とする。"

[[dialogue]]
speaker = "ナターシャ"
