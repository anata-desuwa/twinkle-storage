[[dialogue]]
speaker = "ヴィーナス"
# 「えっと、ちょっと待って。リガルタは天界の魔王なのよね？」
line = "「えっと、ちょっと待って。リガルタは天界の魔王なのよね？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「メルエルは魔王の血族で、そのリガルタから命令されていたってことは……」
line = "「メルエルは魔王の血族で、そのリガルタから命令されていたってことは……」"

[[dialogue]]
speaker = "メルエル"
# 「私は、リガルタ様の──」
line = "「私は、リガルタ様の──」"

[[dialogue]]
speaker = "ナターシャ"
# 「娘だよ」
