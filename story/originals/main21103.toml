line = "「私は仕事込みで新星学園に来てるからね。表向きは魔王って悪者でしょ？　だから天界でも一応警戒して監視しようってなったの」"

[[dialogue]]
speaker = "unk"
# ナターシャが新星学園にやってきた時、その任務は魔王である俺を監視することだと言っていた。
line = "ナターシャが新星学園にやってきた時、その任務は魔王である俺を監視することだと言っていた。"

[[dialogue]]
speaker = "unk"
# だがナターシャが監視していた<ruby=……>魔王</ruby>には、メルエルも含まれていたんだ。
line = "だがナターシャが監視していた<ruby>魔王<rt>……</rt></ruby>には、メルエルも含まれていたんだ。"

[[dialogue]]
speaker = "ナターシャ"
# 「私はリガルタから直々に指令を受けて、メルエルの護衛をしてたってわけ」
