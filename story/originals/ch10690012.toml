[[dialogue]]
speaker = "unk"
# 第２話,セシアの愛するもの,P
line = "第２話,セシアの愛するもの,P"

[[dialogue]]
speaker = "unk"
# ある日、図書館に資料を探しにいくと、熱心な様子で本を読んでいるセシアを見かけた。なんの本かと尋ねてみると――
line = "ある日、図書館に資料を探しにいくと、熱心な様子で本を読んでいるセシアを見かけた。なんの本かと尋ねてみると――"

[[dialogue]]
speaker = "セシア"
# 「ああ、会長。こんにちは。――これ？　流星市国の歴史について書かれている本よ」
line = "「ああ、会長。こんにちは。――これ？　流星市国の歴史について書かれている本よ」"

[[dialogue]]
speaker = "セシア"
# 「転生したことで、わたくしの中に蓄積されていた知識の多くが失われてしまったから、こうして、改めて蓄積し直しているの」
line = "「転生したことで、わたくしの中に蓄積されていた知識の多くが失われてしまったから、こうして、改めて蓄積し直しているの」"

[[dialogue]]
speaker = "セシア"
# 「――楽しそうに見えた？　ええ、わたくしは世界の歴史が好きよ」
line = "「――楽しそうに見えた？　ええ、わたくしは世界の歴史が好きよ」"

[[dialogue]]
speaker = "セシア"
# 「記憶は失われても、そう強く感じるわ。転生前のわたくしも、きっと同じだったはず」
line = "「記憶は失われても、そう強く感じるわ。転生前のわたくしも、きっと同じだったはず」"

[[dialogue]]
speaker = "セシア"
# 「歴史とは、人々が今日まで蓄積してきた成長の記録――」
line = "「歴史とは、人々が今日まで蓄積してきた成長の記録――」"

[[dialogue]]
speaker = "セシア"
# 「決して、綺麗なことばかりではないわ。たとえば戦争のような、大きな失敗もある。でも、それらの積み重ねがあって、今日という日が存在している」
line = "「決して、綺麗なことばかりではないわ。たとえば戦争のような、大きな失敗もある。でも、それらの積み重ねがあって、今日という日が存在している」"

[[dialogue]]
speaker = "セシア"
# 「私は良きも悪しきもひっくるめて、世界の歴史を愛おしいと感じるわ」
line = "「私は良きも悪しきもひっくるめて、世界の歴史を愛おしいと感じるわ」"

[[dialogue]]
speaker = "セシア"
# 「それと同じくらい、歴史を積み重ねる中で、人々が生み出してきた文化もね」
line = "「それと同じくらい、歴史を積み重ねる中で、人々が生み出してきた文化もね」"

[[dialogue]]
speaker = "セシア"
# 「この間のクリスマスも楽しかったわ。かつての記憶を失っていても、わたくしの頭の中には、クリスマスの基本的知識があったの」
line = "「この間のクリスマスも楽しかったわ。かつての記憶を失っていても、わたくしの頭の中には、クリスマスの基本的知識があったの」"

[[dialogue]]
speaker = "セシア"
# 「だけれど、実際にプレゼントを配って、クリスマスを体験してみると、知識だけではない蓄積を沢山得ることができた」
line = "「だけれど、実際にプレゼントを配って、クリスマスを体験してみると、知識だけではない蓄積を沢山得ることができた」"

[[dialogue]]
speaker = "セシア"
# 「紅明ママやヨミヨミ、それに会長。あなたたちとの素敵な思い出をね」
line = "「紅明ママやヨミヨミ、それに会長。あなたたちとの素敵な思い出をね」"

[[dialogue]]
speaker = "unk"
# そう言ってもらえると光栄だな
line = "そう言ってもらえると光栄だな"

[[dialogue]]
speaker = "セシア"
# 「ふふっ、みんなのおかげで、わたくしはクリスマスがもっと好きになったわ」
line = "「ふふっ、みんなのおかげで、わたくしはクリスマスがもっと好きになったわ」"

[[dialogue]]
speaker = "セシア"
# 「次はクリスマスだけじゃなくて、ほかの文化もみんなと体験してみたい。想像するだけで心がわくわくしてくるわ♪」
line = "「次はクリスマスだけじゃなくて、ほかの文化もみんなと体験してみたい。想像するだけで心がわくわくしてくるわ♪」"

[[dialogue]]
speaker = "セシア"
# 「――でも、だからこそ、そんな文化や歴史を否定し、世界がこれまで積み重ねてきたものを無に返すリクリエを、わたくしは許せない」
line = "「――でも、だからこそ、そんな文化や歴史を否定し、世界がこれまで積み重ねてきたものを無に返すリクリエを、わたくしは許せない」"

[[dialogue]]
speaker = "セシア"
# 「転生前の記憶は失われているから、わたくしの想像でしかないけれど……」
line = "「転生前の記憶は失われているから、わたくしの想像でしかないけれど……」"

[[dialogue]]
speaker = "セシア"
# 「アウクセシアは、他の誰よりも、何よりもリクリエを許せないからこそ、これまでの蓄積を犠牲にしてでも、転生の道を選んだのだと思うの」
line = "「アウクセシアは、他の誰よりも、何よりもリクリエを許せないからこそ、これまでの蓄積を犠牲にしてでも、転生の道を選んだのだと思うの」"

[[dialogue]]
speaker = "セシア"
# 「今のわたくしも、身動きが取れない状況だったなら、きっと同じ選択をしたはずだから」
line = "「今のわたくしも、身動きが取れない状況だったなら、きっと同じ選択をしたはずだから」"

[[dialogue]]
speaker = "unk"
# セシアはもう、犠牲になる必要はない
line = "セシアはもう、犠牲になる必要はない"

[[dialogue]]
speaker = "セシア"
# 「え？」
line = "「え？」"

[[dialogue]]
speaker = "unk"
# 今はもう、セシアの周りには俺たちがいる。だから、セシア１人を犠牲になんかさせたりしない。
line = "今はもう、セシアの周りには俺たちがいる。だから、セシア１人を犠牲になんかさせたりしない。"

[[dialogue]]
speaker = "セシア"
# 「――だから、これからは一緒に戦おうって？」
line = "「――だから、これからは一緒に戦おうって？」"

[[dialogue]]
speaker = "セシア"
# 「……ふふっ、そうね。そうだわ」
line = "「……ふふっ、そうね。そうだわ」"

[[dialogue]]
speaker = "セシア"
# 「わたくしは、蓄積を司る守護天使。だというのに、心のどこかでまだ、自分が何とかしなくちゃと思っていた……」
line = "「わたくしは、蓄積を司る守護天使。だというのに、心のどこかでまだ、自分が何とかしなくちゃと思っていた……」"

[[dialogue]]
speaker = "セシア"
# 「だけど、そうじゃない。わたくしはこれから星騎士の一員として、みんなと一緒に、リクリエを打ち破る為の力を蓄積していけばいいのね」
line = "「だけど、そうじゃない。わたくしはこれから星騎士の一員として、みんなと一緒に、リクリエを打ち破る為の力を蓄積していけばいいのね」"

[[dialogue]]
speaker = "セシア"
# 「ああ、そう思ったら、わたくし何だか楽しくなってきたわ」
line = "「ああ、そう思ったら、わたくし何だか楽しくなってきたわ」"

[[dialogue]]
speaker = "セシア"
# 「これってクリスマスの時と一緒だもの。みんなと一緒に、憎きリクリエを打ち破る――」
line = "「これってクリスマスの時と一緒だもの。みんなと一緒に、憎きリクリエを打ち破る――」"

[[dialogue]]
speaker = "セシア"
# 「それはきっと、素敵な思い出になるに違いないわ♪」
line = "「それはきっと、素敵な思い出になるに違いないわ♪」"

[[dialogue]]
speaker = "セシア"
# 「その為にはまず、みんなと絆を深めて、『仲間』にならないといけないわね」
line = "「その為にはまず、みんなと絆を深めて、『仲間』にならないといけないわね」"

[[dialogue]]
speaker = "unk"
# セシアのことはもう、仲間だと思ってるよ？
line = "セシアのことはもう、仲間だと思ってるよ？"

[[dialogue]]
speaker = "セシア"
# 「ふふっ、ありがとう、会長。でも、ちゃんと口に出して伝えるのは大事でしょう？」
line = "「ふふっ、ありがとう、会長。でも、ちゃんと口に出して伝えるのは大事でしょう？」"

[[dialogue]]
speaker = "セシア"
# 「男女が一緒になりたいという気持ちを伝え合って、結婚の約束をするように。だから――」
line = "「男女が一緒になりたいという気持ちを伝え合って、結婚の約束をするように。だから――」"

[[dialogue]]
speaker = "セシア"
# 「会長、わたくしの仲間になって欲しいわ」
line = "「会長、わたくしの仲間になって欲しいわ」"

[[dialogue]]
speaker = "unk"
# セシアはそう言って、小指を立てて差し出してくる。
line = "セシアはそう言って、小指を立てて差し出してくる。"

[[dialogue]]
speaker = "セシア"
# 「ええ、そうよ。指切りげんまん。この国では、約束を交わす時にこうするのでしょう？　わたくし、１度やってみたかったの」
line = "「ええ、そうよ。指切りげんまん。この国では、約束を交わす時にこうするのでしょう？　わたくし、１度やってみたかったの」"

[[dialogue]]
speaker = "セシア"
# 「それじゃあ、いくわよ？　指切りげんまん、嘘ついたら……確か、針を１０００本呑ますんだったかしら？」
line = "「それじゃあ、いくわよ？　指切りげんまん、嘘ついたら……確か、針を１０００本呑ますんだったかしら？」"

[[dialogue]]
speaker = "unk"
# それはあくまで例えだからね！？
line = "それはあくまで例えだからね！？"

[[dialogue]]
speaker = "セシア"
# 「ふふっ、わかってるわ。でも、なにか罰があった方が楽しいと思わない？」
line = "「ふふっ、わかってるわ。でも、なにか罰があった方が楽しいと思わない？」"

[[dialogue]]
speaker = "セシア"
# 「――好きな食べ物を奢る？　それじゃあ、会長が約束を破った時には、大聖堂カフェテリアの旗付きチキンライスを奢ってもらおうかしら」
line = "「――好きな食べ物を奢る？　それじゃあ、会長が約束を破った時には、大聖堂カフェテリアの旗付きチキンライスを奢ってもらおうかしら」"

[[dialogue]]
speaker = "セシア"
# 「ええ。わたくしのお気に入りなの。味もほっぺたが落ちるくらい美味しいし、旗を倒さないように食べるのが、最近のマイブームよ」
line = "「ええ。わたくしのお気に入りなの。味もほっぺたが落ちるくらい美味しいし、旗を倒さないように食べるのが、最近のマイブームよ」"

[[dialogue]]
speaker = "セシア"
# 「――旗付きだから恥ずかしくて、まだ食べたことがない？　それはもったいないわ」
line = "「――旗付きだから恥ずかしくて、まだ食べたことがない？　それはもったいないわ」"

[[dialogue]]
speaker = "セシア"
# 「ちょうどお腹も空いてきたし、仲間としての絆を深める為にも、一緒にチキンライスを食べにいきましょう」
line = "「ちょうどお腹も空いてきたし、仲間としての絆を深める為にも、一緒にチキンライスを食べにいきましょう」"

[[dialogue]]
speaker = "unk"
# なら、せっかくだし勝負する？
line = "なら、せっかくだし勝負する？"

[[dialogue]]
speaker = "セシア"
# 「あら、どちらがギリギリまで旗を倒さずにいられるかってこと？　ふふっ、誰かと勝負するなんて考えたことなかったけど――」
line = "「あら、どちらがギリギリまで旗を倒さずにいられるかってこと？　ふふっ、誰かと勝負するなんて考えたことなかったけど――」"

[[dialogue]]
speaker = "セシア"
# 「それはとても楽しそうだわ♪　わたくし、毎日挑戦してるんだから、負けないわよ？」
line = "「それはとても楽しそうだわ♪　わたくし、毎日挑戦してるんだから、負けないわよ？」"

[[dialogue]]
speaker = "unk"
# それから俺たちは、大聖堂カフェテリアに向かった。
line = "それから俺たちは、大聖堂カフェテリアに向かった。"

[[dialogue]]
speaker = "unk"
# 仲良く食べたチキンライスは、セシアの言う通り絶品で、また一緒に食べようと、再び指切りげんまんを交わしたのだった――
line = "仲良く食べたチキンライスは、セシアの言う通り絶品で、また一緒に食べようと、再び指切りげんまんを交わしたのだった――"
