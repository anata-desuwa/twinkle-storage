line = "「モナカのお家ね、星騎士の名家なんだ。お父様もお母様も名のある星騎士だった人で、姉様たちも子どもの頃からモンスター退治を任されてるようなすごい人たちなの」"

[[dialogue]]
speaker = "モナカ"
# 「だけどモナカだけはろくに星力も扱えない落ちこぼれで……。みんなにも、その……役立たずって言われちゃっててね？」
line = "「だけどモナカだけはろくに星力も扱えない落ちこぼれで……。みんなにも、その……役立たずって言われちゃっててね？」"

[[dialogue]]
speaker = "モナカ"
# 「でも１人でずっと泣いてたモナカの前にパルちゃんとシフォンちゃんが現れてくれたの。モナカに手を差し伸べてくれて、笑顔にしてくれて……」
line = "「でも１人でずっと泣いてたモナカの前にパルちゃんとシフォンちゃんが現れてくれたの。モナカに手を差し伸べてくれて、笑顔にしてくれて……」"

[[dialogue]]
speaker = "モナカ"
# 「だからモナカも、みんなを笑顔にしてあげられる星騎士になりたいんだ。たとえ落ちこぼれでも、泣いてる誰かのために手を差し伸べられる星騎士に」
line = "「だからモナカも、みんなを笑顔にしてあげられる星騎士になりたいんだ。たとえ落ちこぼれでも、泣いてる誰かのために手を差し伸べられる星騎士に」"

