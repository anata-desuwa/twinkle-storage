[[dialogue]]
speaker = "モナカ"
# 「きっと泥棒さんにも何か事情があるんじゃないかな……。捕まえて、事情を聞いて、何か困ってることがあるなら聞いてあげたいな……」
line = "「きっと泥棒さんにも何か事情があるんじゃないかな……。捕まえて、事情を聞いて、何か困ってることがあるなら聞いてあげたいな……」"

