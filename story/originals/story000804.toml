speaker = "パルミエ"
# 「ホント！？　それじゃあ遠慮なく～♪　ちょうどスタミナも回復してきた頃だったのよね～」
line = "「ホント！？　それじゃあ遠慮なく～♪　ちょうどスタミナも回復してきた頃だったのよね～」"

