[[dialogue]]
speaker = "シフォン"
# 「ほら私、天使のくせに羽根が黒いじゃないですか？　私の一族は天使と魔族の混血で、こうして羽根に魔族の血が色濃く表れちゃうんです」
line = "「ほら私、天使のくせに羽根が黒いじゃないですか？　私の一族は天使と魔族の混血で、こうして羽根に魔族の血が色濃く表れちゃうんです」"

[[dialogue]]
speaker = "シフォン"
# 「子どもの頃はこの黒い羽根を周りから不気味に思われていて……。私、いつも１人きりで過ごしていたんです」
line = "「子どもの頃はこの黒い羽根を周りから不気味に思われていて……。私、いつも１人きりで過ごしていたんです」"

[[dialogue]]
speaker = "シフォン"
# 「そんな私の手を引いてくれたのがパルミエだったんですよ。この黒い羽根を格好いいと褒めてくれて、怖がらずに遊んでくれて」
line = "「そんな私の手を引いてくれたのがパルミエだったんですよ。この黒い羽根を格好いいと褒めてくれて、怖がらずに遊んでくれて」"

[[dialogue]]
