[[dialogue]]
speaker = "unk"
# 翌日。
line = "翌日。"

[[dialogue]]
speaker = "セナリィ"
# 「昨日あれだけ売りさばいたのに、その売り上げが消えて売ったはずのお菓子が出現しましたわーーー！？」
line = "「昨日あれだけ売りさばいたのに、その売り上げが消えて売ったはずのお菓子が出現しましたわーーー！？」"

[[dialogue]]
speaker = "unk"
# 心底慌てた様子でセナリィが星徒会室に駆け込んできた。
line = "心底慌てた様子でセナリィが星徒会室に駆け込んできた。"

[[dialogue]]
speaker = "セナリィ"
# 「どういうことですの！？　皆さんは何か知ってるんですのよね！？　私にはわかるんですの！」
line = "「どういうことですの！？　皆さんは何か知ってるんですのよね！？　私にはわかるんですの！」"

[[dialogue]]
speaker = "ヒトリ"
# 「せ、せせせ、セナリィさん……！　まずは落ち着いてください……」
line = "「せ、せせせ、セナリィさん……！　まずは落ち着いてください……」"

[[dialogue]]
speaker = "セナリィ"
# 「これが落ち着いていられますか！？」
line = "「これが落ち着いていられますか！？」"

[[dialogue]]
speaker = "サラン"
# 「セナリィちゃん。こういう時こそ、急がば回れだよ～」
line = "「セナリィちゃん。こういう時こそ、急がば回れだよ～」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ほら、ヒトリさんが怯えちゃってるじゃん？」
line = "「ほら、ヒトリさんが怯えちゃってるじゃん？」"

[[dialogue]]
speaker = "セナリィ"
# 「うっ、こほん。……申し訳ありませんわ。少々、気が動転してしまいまして……」
line = "「うっ、こほん。……申し訳ありませんわ。少々、気が動転してしまいまして……」"

[[dialogue]]
speaker = "ヒトリ"
# 「……い、いえいえ……お気持ちはわかりますので……それじゃあ、わたしから説明させていただきますね」
line = "「……い、いえいえ……お気持ちはわかりますので……それじゃあ、わたしから説明させていただきますね」"

[[dialogue]]
speaker = "ヒトリ"
# 「実は今回のハロウィンなんですけど……１日の時間がループしちゃってるみたいなんです。その原因が、昨日セナリィさんも会ったジャクリーヌさんにあるみたいで……」
line = "「実は今回のハロウィンなんですけど……１日の時間がループしちゃってるみたいなんです。その原因が、昨日セナリィさんも会ったジャクリーヌさんにあるみたいで……」"

[[dialogue]]
speaker = "セナリィ"
# 「ジャクリーヌ様が？　どういったことが要因でして？」
line = "「ジャクリーヌ様が？　どういったことが要因でして？」"

[[dialogue]]
speaker = "ヒトリ"
# 「詳しいことはまだよくわかってないんです。ただ、ジャクリーヌさんと深く関わったわたしたちの記憶だけが保持されてて、だからこそループに気づけているってだけで……」
line = "「詳しいことはまだよくわかってないんです。ただ、ジャクリーヌさんと深く関わったわたしたちの記憶だけが保持されてて、だからこそループに気づけているってだけで……」"

[[dialogue]]
speaker = "ゆーちゃん"
# 「ゆ～……」
line = "「ゆ～……」"

[[dialogue]]
speaker = "セナリィ"
# 「なるほどですわ。つまりこのループは初めてのことではなく、<b>直前</b>の回でジャクリーヌ様と関わったことで、私の記憶も保持された、ということですわね」
line = "「なるほどですわ。つまりこのループは初めてのことではなく、<b>直前</b>の回でジャクリーヌ様と関わったことで、私の記憶も保持された、ということですわね」"

[[dialogue]]
speaker = "セナリィ"
# 「朝、目が覚めて以降、昨日と全く同じことが起きていて、周りの人に聞いても知らん顔で……私の頭がおかしくなったのかと思って焦りましたわ」
line = "「朝、目が覚めて以降、昨日と全く同じことが起きていて、周りの人に聞いても知らん顔で……私の頭がおかしくなったのかと思って焦りましたわ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「セナリィの頭は元々おかし……」
line = "「セナリィの頭は元々おかし……」"

[[dialogue]]
speaker = "セナリィ"
# 「マイン！？　うっさいですわよ！」
line = "「マイン！？　うっさいですわよ！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「てへペロ♪」
line = "「てへペロ♪」"

[[dialogue]]
speaker = "セナリィ"
# 「あら？　そういえば、ループさせた張本人であるジャクリーヌ様はどこにいったんですの？　姿が見当たらないようですけど」
line = "「あら？　そういえば、ループさせた張本人であるジャクリーヌ様はどこにいったんですの？　姿が見当たらないようですけど」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「それがね～、イタズラしてたのがバレちゃったから逃げちゃったんだよね～。困ったことに……」
line = "「それがね～、イタズラしてたのがバレちゃったから逃げちゃったんだよね～。困ったことに……」"

[[dialogue]]
speaker = "サラン"
# 「すぐ追いかけようとしたんだけど、ジャクリーヌちゃん、ふわふわ浮いてるから全然捕まえられなくて～」
line = "「すぐ追いかけようとしたんだけど、ジャクリーヌちゃん、ふわふわ浮いてるから全然捕まえられなくて～」"

[[dialogue]]
speaker = "セナリィ"
# 「なんですのそれ！？　まるで子供みたいな……」
line = "「なんですのそれ！？　まるで子供みたいな……」"

[[dialogue]]
speaker = "ヒトリ"
# 「ま、まあ……ジャクリーヌさんも人間界に来たばっかりですし……怒らないであげてください……」
line = "「ま、まあ……ジャクリーヌさんも人間界に来たばっかりですし……怒らないであげてください……」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「まぁ、ついイタズラしたくなっちゃっただけじゃないかな～」
line = "「まぁ、ついイタズラしたくなっちゃっただけじゃないかな～」"

[[dialogue]]
speaker = "サラン"
# 「ハロウィンの化身ってお話だったしね～。ずっとハロウィンが続いてほしいと思ってても不思議じゃないよ～」
line = "「ハロウィンの化身ってお話だったしね～。ずっとハロウィンが続いてほしいと思ってても不思議じゃないよ～」"

[[dialogue]]
speaker = "セナリィ"
# 「そ、それはそうなのですけれど……まさかこのままってわけにも、いかないでしょう？」
line = "「そ、それはそうなのですけれど……まさかこのままってわけにも、いかないでしょう？」"

[[dialogue]]
speaker = "unk"
# もう１日だけって約束だったんだけどな
line = "もう１日だけって約束だったんだけどな"

[[dialogue]]
speaker = "ヒトリ"
# 「約束、破られちゃいましたね……」
line = "「約束、破られちゃいましたね……」"

[[dialogue]]
speaker = "サラン"
# 「このままだと、ジャクリーヌちゃんが色んなところに行けば行くほど……混乱が広がっちゃうよね～」
line = "「このままだと、ジャクリーヌちゃんが色んなところに行けば行くほど……混乱が広がっちゃうよね～」"

[[dialogue]]
speaker = "ヒトリ"
# 「た、確かにそうです！　は、ははは、早くなんとかしないと……大変なことに！」
line = "「た、確かにそうです！　は、ははは、早くなんとかしないと……大変なことに！」"

[[dialogue]]
speaker = "ヒトリ"
# 「ゆー！　ゆー！」
line = "「ゆー！　ゆー！」"

[[dialogue]]
speaker = "セナリィ"
# 「まずは彼女を探さないことには始まりませんわね……」
line = "「まずは彼女を探さないことには始まりませんわね……」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「そうと決まれば、早速探しに行くとしますか～！」
line = "「そうと決まれば、早速探しに行くとしますか～！」"

[[dialogue]]
speaker = "unk"
# 逃げてしまったジャクリーヌを探すことほぼ半日。
line = "逃げてしまったジャクリーヌを探すことほぼ半日。"

[[dialogue]]
speaker = "unk"
# 俺たちは大聖堂に併設されているカフェテリアへとやってきていた。
line = "俺たちは大聖堂に併設されているカフェテリアへとやってきていた。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「そっちは見つかった～？」
line = "「そっちは見つかった～？」"

[[dialogue]]
speaker = "サラン"
# 「う～ん、全然見当たらないね～……」
line = "「う～ん、全然見当たらないね～……」"

[[dialogue]]
speaker = "セナリィ"
# 「ヒトリ様はどうですの？　幽霊のことは一番わかっているでしょうから、私たちよりは見つけやすいと思うのですけれど……」
line = "「ヒトリ様はどうですの？　幽霊のことは一番わかっているでしょうから、私たちよりは見つけやすいと思うのですけれど……」"

[[dialogue]]
speaker = "ヒトリ"
# 「さっきから気配を探っているんですが……ジャクリーヌさん、本気で隠れてるみたいで、探知に引っかからなくて……」
line = "「さっきから気配を探っているんですが……ジャクリーヌさん、本気で隠れてるみたいで、探知に引っかからなくて……」"

[[dialogue]]
speaker = "セナリィ"
# 「まさか、手詰まりですの？」
line = "「まさか、手詰まりですの？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「もしかして、人間界に飽きて一足先に魔界へ帰っちゃったとか？」
line = "「もしかして、人間界に飽きて一足先に魔界へ帰っちゃったとか？」"

[[dialogue]]
speaker = "ヒトリ"
# 「あんなにたくさんお菓子を食べて……ハロウィンを人一倍楽しんでいましたし、それはないと思うんですけど……」
line = "「あんなにたくさんお菓子を食べて……ハロウィンを人一倍楽しんでいましたし、それはないと思うんですけど……」"

[[dialogue]]
speaker = "ヒトリ"
# 「会長さん、そっちの方はどうでしょうか？」
line = "「会長さん、そっちの方はどうでしょうか？」"

[[dialogue]]
speaker = "unk"
# ごめん、こっちにもいないみたい
line = "ごめん、こっちにもいないみたい"

[[dialogue]]
speaker = "ヒトリ"
# 「ダメですか……もう別の場所に行っちゃったんでしょうか……」
line = "「ダメですか……もう別の場所に行っちゃったんでしょうか……」"

[[dialogue]]
speaker = "unk"
# ヒトリがそう呟いた瞬間だった。
line = "ヒトリがそう呟いた瞬間だった。"

[[dialogue]]
speaker = "ゆーちゃん"
# 「ゆー！　ゆー！」
line = "「ゆー！　ゆー！」"

[[dialogue]]
speaker = "ヒトリ"
# 「ゆーちゃん？　も、もしかして見つかったの！？」
line = "「ゆーちゃん？　も、もしかして見つかったの！？」"

[[dialogue]]
speaker = "ゆーちゃん"
# 「ゆー！　ゆー！」
line = "「ゆー！　ゆー！」"

[[dialogue]]
speaker = "サラン"
# 「あ！　あそこー！」
line = "「あ！　あそこー！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「あれあれ！　頭についてるカボチャの片方がひょこっと見えてるよー！」
line = "「あれあれ！　頭についてるカボチャの片方がひょこっと見えてるよー！」"

[[dialogue]]
speaker = "ヒトリ"
# 「や、やっと見つけましたよ、ジャクリーヌさん……！」
line = "「や、やっと見つけましたよ、ジャクリーヌさん……！」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆゆ！？　ゆーーーーー！？」
line = "「ゆゆ！？　ゆーーーーー！？」"

[[dialogue]]
speaker = "セナリィ"
# 「大人しく観念なさいですわーーー！！」
line = "「大人しく観念なさいですわーーー！！」"

[[dialogue]]
speaker = "ヒトリ"
# 「に、逃がしませんからね……！　へんしんです……！」
line = "「に、逃がしませんからね……！　へんしんです……！」"

[[dialogue]]
speaker = "ヒトリ"
# 「ジャクリーヌさん。あなたにお話したいことが……たくさんあるんです！」
line = "「ジャクリーヌさん。あなたにお話したいことが……たくさんあるんです！」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「に、逃げるが勝ちなのー！」
line = "「に、逃げるが勝ちなのー！」"

[[dialogue]]
speaker = "ヒトリ"
# 「そうはいきません……！　お、お覚悟……です！」
line = "「そうはいきません……！　お、お覚悟……です！」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ふぎゃっ！？　き、急に何もないところに壁が出たのーーーー！？」
line = "「ふぎゃっ！？　き、急に何もないところに壁が出たのーーーー！？」"

[[dialogue]]
speaker = "ヒトリ"
# 「つ、捕まえましたよ……！」
line = "「つ、捕まえましたよ……！」"

[[dialogue]]
speaker = "サラン"
# 「ヒトリちゃん、すご～い！」
line = "「ヒトリちゃん、すご～い！」"

[[dialogue]]
speaker = "セナリィ"
# 「やりましたわ！」
line = "「やりましたわ！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「さぁ、もう逃げ道はないよー！」
line = "「さぁ、もう逃げ道はないよー！」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ど、どうして余を追ってくゆ！？」
line = "「ど、どうして余を追ってくゆ！？」"

[[dialogue]]
speaker = "ヒトリ"
# 「わ、わたし……幽霊とはずっと友達だから、わかるんです……」
line = "「わ、わたし……幽霊とはずっと友達だから、わかるんです……」"

[[dialogue]]
speaker = "ヒトリ"
# 「際限なくイタズラをする幽霊は、いつか悪い幽霊になってしまう……今までそういう幽霊を、何人も見てきたから……」
line = "「際限なくイタズラをする幽霊は、いつか悪い幽霊になってしまう……今までそういう幽霊を、何人も見てきたから……」"

[[dialogue]]
speaker = "ヒトリ"
# 「幽霊はヒトの法には縛られません。でも、だからこそ……『約束』を守らない幽霊は、簡単に歯止めが効かなくなる……」
line = "「幽霊はヒトの法には縛られません。でも、だからこそ……『約束』を守らない幽霊は、簡単に歯止めが効かなくなる……」"

[[dialogue]]
speaker = "ヒトリ"
# 「ジャクリーヌさんにはそうなってほしくないから……！」
line = "「ジャクリーヌさんにはそうなってほしくないから……！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ヒトリさん……」
line = "「ヒトリさん……」"

[[dialogue]]
speaker = "セナリィ"
# 「ヒトリ様……」
line = "「ヒトリ様……」"

[[dialogue]]
speaker = "ヒトリ"
# 「だから友達として……わ、わたしがジャクリーヌさんのこと、叱りますっ！」
line = "「だから友達として……わ、わたしがジャクリーヌさんのこと、叱りますっ！」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆ～～～ん！　怒られるのきら～いっ！　余は悪いことしてないのっ。放っておいてなの～！」
line = "「ゆ～～～ん！　怒られるのきら～いっ！　余は悪いことしてないのっ。放っておいてなの～！」"

[[dialogue]]
speaker = "unk"
# 珍しく怒ったような様子のヒトリと、逃げようとするジャクリーヌの戦いが幕を開けた。
line = "珍しく怒ったような様子のヒトリと、逃げようとするジャクリーヌの戦いが幕を開けた。"
