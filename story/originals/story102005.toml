[[dialogue]]
speaker = "プトラ"
# （考えよう。こんな時、どうすればいいか。車掌さんなら何て言ってくれるか……）
line = "（考えよう。こんな時、どうすればいいか。車掌さんなら何て言ってくれるか……）"

