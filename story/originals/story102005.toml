line = "「いえいえ、ここはどうしても譲れません。これほど様々な技術が発展した世界なら、きっと肉料理も発展しているはずです！」"

[[dialogue]]
speaker = "プトラ"
# 「世界が違うってことは海も違うんでしょ？　なら魚も違うはずだよ！　漁師の娘として、ここは引けない！」
line = "「世界が違うってことは海も違うんでしょ？　なら魚も違うはずだよ！　漁師の娘として、ここは引けない！」"

