[[dialogue]]
speaker = "プトラ"
# 「ぜ、全然掴んでないよ！　ただ、フィオナたちの力になりたいって考えたら、あたしにも変身出来ちゃって……」
line = "「ぜ、全然掴んでないよ！　ただ、フィオナたちの力になりたいって考えたら、あたしにも変身出来ちゃって……」"

[[dialogue]]
speaker = "アルテ"
# 「だったら、そういうことなんじゃありませんか？」
line = "「だったら、そういうことなんじゃありませんか？」"

[[dialogue]]
speaker = "プトラ"
# 「えっ？」
line = "「えっ？」"

[[dialogue]]
speaker = "プトラ"
# 「あ……うん、そうかも……しれない！」
line = "「あ……うん、そうかも……しれない！」"

[[dialogue]]
speaker = "アルテ"
# 「で、どうするんです？　せっかく変身したのですから、みなさんに加勢しにいくのでしょう？」
line = "「で、どうするんです？　せっかく変身したのですから、みなさんに加勢しにいくのでしょう？」"

[[dialogue]]
speaker = "プトラ"
# 「もちろんだよ！」
line = "「もちろんだよ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「２人とも、どうしたのその格好！？」
line = "「２人とも、どうしたのその格好！？」"

[[dialogue]]
speaker = "プトラ"
# 「みんなの力になりたいって気持ちがあたしたちを変身させたんだよ！」
line = "「みんなの力になりたいって気持ちがあたしたちを変身させたんだよ！」"

[[dialogue]]
speaker = "アルテ"
# 「いえ、私は違いますが……。ともかく、私の活躍が見られることを光栄に思ってください感謝してください」
line = "「いえ、私は違いますが……。ともかく、私の活躍が見られることを光栄に思ってください感謝してください」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そこはそういうことにしときなさいよ……」
line = "「そこはそういうことにしときなさいよ……」"

[[dialogue]]
speaker = "アポロ"
# 「おお、こういう熱い展開、待ってたぜ！　一緒にこいつらぶちのめすぞ！」
line = "「おお、こういう熱い展開、待ってたぜ！　一緒にこいつらぶちのめすぞ！」"

[[dialogue]]
speaker = "フィオナ"
# 「ありがとうございます。２人とも、お願いします！」
line = "「ありがとうございます。２人とも、お願いします！」"

[[dialogue]]
speaker = "プトラ"
# 「任せて！　それじゃ行くよ、アルテっ！」
line = "「任せて！　それじゃ行くよ、アルテっ！」"

[[dialogue]]
speaker = "アルテ"
# 「ええ、手短に済ませましょう。食事が待ってますから！」
line = "「ええ、手短に済ませましょう。食事が待ってますから！」"
