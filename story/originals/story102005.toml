# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "アルテ"
# （やれやれ、これから美味しいご飯というところで、完全に水を差されてしまいました）
line = "（やれやれ、これから美味しいご飯というところで、完全に水を差されてしまいました）"

[[dialogue]]
speaker = "アルテ"
# （藝術魔法も今は使えないようですし、ここはヴィーナスたちに任せるしかありませんね）
line = "（藝術魔法も今は使えないようですし、ここはヴィーナスたちに任せるしかありませんね）"

[[dialogue]]
speaker = "アルテ"
# （──ですが、まあ……あの人たちには何だかんだ世話を焼いてもらってますし、任せっぱなしというのも如何なものでしょう？）
line = "（──ですが、まあ……あの人たちには何だかんだ世話を焼いてもらってますし、任せっぱなしというのも如何なものでしょう？）"

[[dialogue]]
speaker = "アルテ"
# 「仕方ありませんね。少しは私の華麗な活躍を見せてあげるとしましょう──」
line = "「仕方ありませんね。少しは私の華麗な活躍を見せてあげるとしましょう──」"

[[dialogue]]
speaker = "アルテ"
# 「ふふん、上出来です。この剣と楯でぶっ飛ばしてあげましょう！」
line = "「ふふん、上出来です。この剣と楯でぶっ飛ばしてあげましょう！」"

[[dialogue]]
speaker = "プトラ"
# 「えっ！？　アルテが……変身……？　変身できたの！？」
line = "「えっ！？　アルテが……変身……？　変身できたの！？」"

[[dialogue]]
speaker = "アルテ"
# 「私も驚いていますが、まあ、天才ですから当然ですね」
line = "「私も驚いていますが、まあ、天才ですから当然ですね」"

[[dialogue]]
speaker = "アルテ"
# 「違う世界に来たことで、力の引き出し方が分からなくなっていましたが、ようやく掴めてきましたね」
line = "「違う世界に来たことで、力の引き出し方が分からなくなっていましたが、ようやく掴めてきましたね」"

[[dialogue]]
speaker = "アルテ"
# 「プトラもやってみてはどうですか？　もしかしたら出来るかもしれませんよ」
line = "「プトラもやってみてはどうですか？　もしかしたら出来るかもしれませんよ」"

[[dialogue]]
speaker = "プトラ"
# 「あたしも？　え、えっと……変身……変身ーっ……んんん……！！」
line = "「あたしも？　え、えっと……変身……変身ーっ……んんん……！！」"

[[dialogue]]
speaker = "プトラ"
# 「ええっ！？　ほんとにあたしも変身出来ちゃった！」
line = "「ええっ！？　ほんとにあたしも変身出来ちゃった！」"

[[dialogue]]
speaker = "アルテ"
# 「どうやらあなたも掴んだようですね」
