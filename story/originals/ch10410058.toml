[[dialogue]]
speaker = "unk"
# それは、『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』との戦いを終え、学園へ帰還してから数日後のことだった。
line = "それは、『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』との戦いを終え、学園へ帰還してから数日後のことだった。"

[[dialogue]]
speaker = "unk"
# 溜め込んでしまっていた星徒会業務をこなし、ひとまず今日は帰宅しようとしたところで、恋人のマインが俺を迎えに来てくれた。
line = "溜め込んでしまっていた星徒会業務をこなし、ひとまず今日は帰宅しようとしたところで、恋人のマインが俺を迎えに来てくれた。"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「会長、お疲れ～」
line = "「会長、お疲れ～」"

[[dialogue]]
speaker = "クロト"
# 「あっ、マイン、迎えに来てくれてありがとう――」
line = "「あっ、マイン、迎えに来てくれてありがとう――」"

[[dialogue]]
speaker = "クロト"
# 「って……どうしてノヴァフォームに変身してるんだ？」
line = "「って……どうしてノヴァフォームに変身してるんだ？」"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「うん、今日はちょっと、会長に『お仕置き』をしとかないとって思って」
line = "「うん、今日はちょっと、会長に『お仕置き』をしとかないとって思って」"

[[dialogue]]
speaker = "クロト"
# 「えっ……お、お仕置き……？」
line = "「えっ……お、お仕置き……？」"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「だって会長さ～、この前の戦い……私という恋人がいながら、ほいほい死にに行っちゃうんだもん」
line = "「だって会長さ～、この前の戦い……私という恋人がいながら、ほいほい死にに行っちゃうんだもん」"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「最終的に生きてたから良かったものの、さすがに何も無かったみたいに流したりはできないでしょ～？」
line = "「最終的に生きてたから良かったものの、さすがに何も無かったみたいに流したりはできないでしょ～？」"

[[dialogue]]
speaker = "クロト"
# 「う……それは……はい。すみません……」
line = "「う……それは……はい。すみません……」"

[[dialogue]]
speaker = "unk"
# もちろん、紆余曲折あってのことで、好き好んで死にに行ったわけじゃない。
line = "もちろん、紆余曲折あってのことで、好き好んで死にに行ったわけじゃない。"

[[dialogue]]
speaker = "unk"
# だが――目の前で恋人が死ぬ瞬間を見せつけられたマインの気持ちを思えば、素直に頭を下げるしかなかった。
line = "だが――目の前で恋人が死ぬ瞬間を見せつけられたマインの気持ちを思えば、素直に頭を下げるしかなかった。"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「正直さ～、会長が死んだところを見せられた時……闇落ちしそうになるくらい、ストレスやばかったんだよね～」
line = "「正直さ～、会長が死んだところを見せられた時……闇落ちしそうになるくらい、ストレスやばかったんだよね～」"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「で、そこから解放された反動か――私、今めっちゃムラムラしてて～」
line = "「で、そこから解放された反動か――私、今めっちゃムラムラしてて～」"

[[dialogue]]
speaker = "クロト"
# 「……え？　ムラムラ……？」
line = "「……え？　ムラムラ……？」"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「そう。生存本能を刺激された、的な？　だ・か・ら～」
line = "「そう。生存本能を刺激された、的な？　だ・か・ら～」"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「今から会長の赤ちゃんを孕むくらいヤリまくって――これから絶対に死ねない『パパ』にしてあげるから……覚悟してね<emoji=heart04>」
line = "「今から会長の赤ちゃんを孕むくらいヤリまくって――これから絶対に死ねない『パパ』にしてあげるから……覚悟してね<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 顔を近づけて囁くマインの瞳には、本能的な欲求と、強い執着にも似た光が宿っていて――
line = "顔を近づけて囁くマインの瞳には、本能的な欲求と、強い執着にも似た光が宿っていて――"

[[dialogue]]
speaker = "unk"
# それから俺は、マインの有無を言わさぬ勢いに押されるまま、街のラブホへと連れ込まれてしまった。
line = "それから俺は、マインの有無を言わさぬ勢いに押されるまま、街のラブホへと連れ込まれてしまった。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「んっ……ふうぅっ……<emoji=heart04>　これでよしっと……♪」
line = "「んっ……ふうぅっ……<emoji=heart04>　これでよしっと……♪」"

[[dialogue]]
speaker = "クロト"
# 「えっと……マイン。なんでベッドじゃなくて、『爆弾ちゃん』の上なんだ……？」
line = "「えっと……マイン。なんでベッドじゃなくて、『爆弾ちゃん』の上なんだ……？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひ♪　すぐにわかるよ<emoji=heart04>　――大丈夫、この子はクッション型で、爆発したりはしないから<emoji=heart04>」
line = "「にひひ♪　すぐにわかるよ<emoji=heart04>　――大丈夫、この子はクッション型で、爆発したりはしないから<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# マインの能力で召喚された使い魔――『爆弾ちゃん』。
line = "マインの能力で召喚された使い魔――『爆弾ちゃん』。"

[[dialogue]]
speaker = "unk"
# 柔らかく弾力あるそのクッションの上に、俺は仰向けに寝かされていた。
line = "柔らかく弾力あるそのクッションの上に、俺は仰向けに寝かされていた。"

[[dialogue]]
speaker = "クロト"
# 「それにしても……マイン、思ってた以上にムラムラしてないか……？」
line = "「それにしても……マイン、思ってた以上にムラムラしてないか……？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「そうだよ～？　だって魔界に出張してる間、ずーっとエッチできなくて我慢してたんだもん……<emoji=heart04>」
line = "「そうだよ～？　だって魔界に出張してる間、ずーっとエッチできなくて我慢してたんだもん……<emoji=heart04>」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「はあぁっ……<emoji=heart04>　だから悪いけど、今日は……会長のこと、本気で『犯し』ちゃうからね……？」
line = "「はあぁっ……<emoji=heart04>　だから悪いけど、今日は……会長のこと、本気で『犯し』ちゃうからね……？」"

[[dialogue]]
speaker = "unk"
# 舌なめずりをしながら、悪戯心に満ちた笑みを浮かべるマイン。
line = "舌なめずりをしながら、悪戯心に満ちた笑みを浮かべるマイン。"

[[dialogue]]
speaker = "unk"
# そのまま彼女は腰をゆっくりと揺らし、露出したペニスへと、熱を帯びた秘部を押し当ててくる。
line = "そのまま彼女は腰をゆっくりと揺らし、露出したペニスへと、熱を帯びた秘部を押し当ててくる。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「んっ……<emoji=heart04>　はあぁっ……ふうぅっ……<emoji=heart04>」
line = "「んっ……<emoji=heart04>　はあぁっ……ふうぅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
# 「あれ……マイン、これ……？」
line = "「あれ……マイン、これ……？」"

[[dialogue]]
speaker = "unk"
# その時、俺は気づく。
line = "その時、俺は気づく。"

[[dialogue]]
speaker = "unk"
# 俺の手足と腰が、爆弾ちゃんの表面にぴたりと張り付いて、まるで拘束されているかのように動かせないことに。
line = "俺の手足と腰が、爆弾ちゃんの表面にぴたりと張り付いて、まるで拘束されているかのように動かせないことに。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひ<emoji=heart04>　気づいた？　こっそり『ラプチャーガム』でくっ付けといたんだ～♪」
line = "「にひひ<emoji=heart04>　気づいた？　こっそり『ラプチャーガム』でくっ付けといたんだ～♪」"

[[dialogue]]
speaker = "unk"
# マインの得意とする星術『ラプチャーガム』。それは、ガムのような粘着性の星力を対象にくっ付けて、拘束などができる技だ。
line = "マインの得意とする星術『ラプチャーガム』。それは、ガムのような粘着性の星力を対象にくっ付けて、拘束などができる技だ。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「私が満足するまで、逃がさないから<emoji=heart04>　ムラムラも限界だし、んっ……<emoji=heart04>　もう挿れちゃうよ？」
line = "「私が満足するまで、逃がさないから<emoji=heart04>　ムラムラも限界だし、んっ……<emoji=heart04>　もう挿れちゃうよ？」"

[[dialogue]]
speaker = "unk"
# すでに彼女の秘部は、溢れる愛液で濡れ切っており、ペニスと触れ合うたびにぬるりとした熱が絡みついてくる。
line = "すでに彼女の秘部は、溢れる愛液で濡れ切っており、ペニスと触れ合うたびにぬるりとした熱が絡みついてくる。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「会長のこと……めちゃくちゃに犯しちゃうから<emoji=heart04>」
line = "「会長のこと……めちゃくちゃに犯しちゃうから<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そう囁くと同時に、マインはペニスの先端を膣口へと導き――そのまま、一気に腰を落とした。
line = "そう囁くと同時に、マインはペニスの先端を膣口へと導き――そのまま、一気に腰を落とした。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「んっ――ふあああぁ～～っ<emoji=heart04><emoji=heart04>　おち○ぽ、奥まで……ズッポリと入ったああぁ～～んっ<emoji=heart04><emoji=heart04>」
line = "「んっ――ふあああぁ～～っ<emoji=heart04><emoji=heart04>　おち○ぽ、奥まで……ズッポリと入ったああぁ～～んっ<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 粘りつく水音と共に、熱を帯びた内側へと一気に呑み込まれる。絡みつく肉壁が、逃がすまいと締めつけてきた。
line = "粘りつく水音と共に、熱を帯びた内側へと一気に呑み込まれる。絡みつく肉壁が、逃がすまいと締めつけてきた。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ふうぅっ……はあぁ～っ<emoji=heart04>　それじゃあ――動かしちゃうから<emoji=heart04>」
line = "「ふうぅっ……はあぁ～っ<emoji=heart04>　それじゃあ――動かしちゃうから<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# マインが軽く指を鳴らすと――
line = "マインが軽く指を鳴らすと――"

[[dialogue]]
speaker = "ネーゼマイン"
# 「あっ……はあぁっ<emoji=heart04>　んっ……ふうぅっ<emoji=heart04>　あっ<emoji=heart04>　あんっ<emoji=heart04>　んうぅっ<emoji=heart04>　んふうぅ～っ<emoji=heart04>」
line = "「あっ……はあぁっ<emoji=heart04>　んっ……ふうぅっ<emoji=heart04>　あっ<emoji=heart04>　あんっ<emoji=heart04>　んうぅっ<emoji=heart04>　んふうぅ～っ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 爆弾ちゃんの体が、まるで呼吸するかのように、膨張と収縮の運動を繰り返し始めた。
line = "爆弾ちゃんの体が、まるで呼吸するかのように、膨張と収縮の運動を繰り返し始めた。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「久しぶりのおち○ぽ、堪らな～い<emoji=heart04>　んっ<emoji=heart04>　はあぁっ<emoji=heart04>　ふあぁっ<emoji=heart04>　んうぅっ<emoji=heart04>　あっ<emoji=heart04>　んあぁっ<emoji=heart04>　はああぁ～っ<emoji=heart04>」
line = "「久しぶりのおち○ぽ、堪らな～い<emoji=heart04>　んっ<emoji=heart04>　はあぁっ<emoji=heart04>　ふあぁっ<emoji=heart04>　んうぅっ<emoji=heart04>　あっ<emoji=heart04>　んあぁっ<emoji=heart04>　はああぁ～っ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 膨張と収縮に合わせて、奥まで抉るような出入りが繰り返される。内側を擦り上げられるたび、ぬるりとした快感が積み重なっていく。
line = "膨張と収縮に合わせて、奥まで抉るような出入りが繰り返される。内側を擦り上げられるたび、ぬるりとした快感が積み重なっていく。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「やっぱこれがないとぉ<emoji=heart04>　んっ<emoji=heart04>　はぁんっ<emoji=heart04>　この極太の魔王おち○ぽで、膣内が満たされる感じぃ<emoji=heart04>　あっ<emoji=heart04>　はぁんっ<emoji=heart04>　んああぁ～っ<emoji=heart04>」
line = "「やっぱこれがないとぉ<emoji=heart04>　んっ<emoji=heart04>　はぁんっ<emoji=heart04>　この極太の魔王おち○ぽで、膣内が満たされる感じぃ<emoji=heart04>　あっ<emoji=heart04>　はぁんっ<emoji=heart04>　んああぁ～っ<emoji=heart04>」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「はあぁっ<emoji=heart04>　おま○こ、めっちゃ気持ちいぃ～<emoji=heart04>　あっ<emoji=heart04>　はぁんっ<emoji=heart04>　んっ<emoji=heart04>　はあぁっ<emoji=heart04>　ふああぁんっ<emoji=heart04>」
line = "「はあぁっ<emoji=heart04>　おま○こ、めっちゃ気持ちいぃ～<emoji=heart04>　あっ<emoji=heart04>　はぁんっ<emoji=heart04>　んっ<emoji=heart04>　はあぁっ<emoji=heart04>　ふああぁんっ<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
# 「くうぅっ……！　久しぶりだから、俺もっ……！」
line = "「くうぅっ……！　久しぶりだから、俺もっ……！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「あぁんっ<emoji=heart04>　おま○この中、極太カリでゴリゴリ引っかかれて、ヤバぁいっ<emoji=heart04>　気持ちぃっ<emoji=heart04>　あっ<emoji=heart04>　ふあぁっ<emoji=heart04>　あっ<emoji=heart04>　あんっ<emoji=heart04>　んああぁんっ<emoji=heart04>」
line = "「あぁんっ<emoji=heart04>　おま○この中、極太カリでゴリゴリ引っかかれて、ヤバぁいっ<emoji=heart04>　気持ちぃっ<emoji=heart04>　あっ<emoji=heart04>　ふあぁっ<emoji=heart04>　あっ<emoji=heart04>　あんっ<emoji=heart04>　んああぁんっ<emoji=heart04>」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「はあぁっ<emoji=heart04>　ヤバっ<emoji=heart04>　久しぶりでもうイキそう……！」
line = "「はあぁっ<emoji=heart04>　ヤバっ<emoji=heart04>　久しぶりでもうイキそう……！」"

[[dialogue]]
speaker = "クロト"
# 「マイン、俺も……もうくるっ……！」
line = "「マイン、俺も……もうくるっ……！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「あっ<emoji=heart04>　きたぁっ<emoji=heart04>　絶頂、登ってくるぅっ<emoji=heart04>」
line = "「あっ<emoji=heart04>　きたぁっ<emoji=heart04>　絶頂、登ってくるぅっ<emoji=heart04>」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「はあぁっ<emoji=heart04>　あっ<emoji=heart04>　あんっ<emoji=heart04>　んあぁっ<emoji=heart04>　んうぅっ――<emoji=heart04><emoji=heart04>」
line = "「はあぁっ<emoji=heart04>　あっ<emoji=heart04>　あんっ<emoji=heart04>　んあぁっ<emoji=heart04>　んうぅっ――<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
# 「マイン、出るっ！！！」
line = "「マイン、出るっ！！！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「あっ――ふあああぁぁぁ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」
line = "「あっ――ふあああぁぁぁ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# びくびくと震えながら、マインが絶頂に達する。
line = "びくびくと震えながら、マインが絶頂に達する。"

[[dialogue]]
speaker = "unk"
# 俺も同時に射精した――はずだったが……。
line = "俺も同時に射精した――はずだったが……。"

[[dialogue]]
speaker = "クロト"
# 「あれ？　出てない……？　この感覚……もしかして『絶頂チャージ』……！？」
line = "「あれ？　出てない……？　この感覚……もしかして『絶頂チャージ』……！？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひ<emoji=heart04>　正解～♪　今日はとにかく気持ちよくなりたいから――お互いに絶頂チャージで、快楽をどんどん溜めていくエッチだよ<emoji=heart04>」
line = "「にひひ<emoji=heart04>　正解～♪　今日はとにかく気持ちよくなりたいから――お互いに絶頂チャージで、快楽をどんどん溜めていくエッチだよ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 『絶頂チャージ』は、マインが以前マリオンさんから教えてもらったという術式だ。
line = "『絶頂チャージ』は、マインが以前マリオンさんから教えてもらったという術式だ。"

[[dialogue]]
speaker = "unk"
# それを使うと、絶頂したはずの身体は解放されずに、むしろそこから更に上乗せされるように快感が蓄積されていく。
line = "それを使うと、絶頂したはずの身体は解放されずに、むしろそこから更に上乗せされるように快感が蓄積されていく。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「はあぁ～っ<emoji=heart04>　元々溜まってるところに絶頂チャージすると、感度ヤバぁ～いっ<emoji=heart04>　あっ<emoji=heart04>　あんっ<emoji=heart04>　はあぁ<emoji=heart04>　んあぁっ<emoji=heart04>　ふああぁんっ<emoji=heart04>」
line = "「はあぁ～っ<emoji=heart04>　元々溜まってるところに絶頂チャージすると、感度ヤバぁ～いっ<emoji=heart04>　あっ<emoji=heart04>　あんっ<emoji=heart04>　はあぁ<emoji=heart04>　んあぁっ<emoji=heart04>　ふああぁんっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# マインは止まらない。むしろ爆弾ちゃんの膨張と収縮運動は、さらに強さを増していく。
line = "マインは止まらない。むしろ爆弾ちゃんの膨張と収縮運動は、さらに強さを増していく。"

[[dialogue]]
speaker = "クロト"
# 「くあぁっ……！　マイン、そんな動いてたら、また……！」
line = "「くあぁっ……！　マイン、そんな動いてたら、また……！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひ<emoji=heart04>　いいよっ<emoji=heart04>　どうせ出ないんだから、気にせずイっちゃえっ<emoji=heart04>」
line = "「にひひ<emoji=heart04>　いいよっ<emoji=heart04>　どうせ出ないんだから、気にせずイっちゃえっ<emoji=heart04>」"

