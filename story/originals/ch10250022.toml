[[dialogue]]
speaker = "unk"
# 第２話,熱愛発覚！？,P
line = "第２話,熱愛発覚！？,P"

[[dialogue]]
speaker = "マトイ"
# 「えええぇぇっ！？　ま、舞亜ちゃんに熱愛疑惑！？」
line = "「えええぇぇっ！？　ま、舞亜ちゃんに熱愛疑惑！？」"

[[dialogue]]
speaker = "unk"
# ある日の放課後。ＤＩＳＣでニュースを見ていたマトイが驚きの声を上げた。
line = "ある日の放課後。ＤＩＳＣでニュースを見ていたマトイが驚きの声を上げた。"

[[dialogue]]
speaker = "マトイ"
# 「まさか舞亜ちゃんに彼氏なんて──ああでも舞亜ちゃんだって学生なんだし、恋愛に興味あってもおかしくないよね……？」
line = "「まさか舞亜ちゃんに彼氏なんて──ああでも舞亜ちゃんだって学生なんだし、恋愛に興味あってもおかしくないよね……？」"

[[dialogue]]
speaker = "マトイ"
# 「だけど舞亜ちゃんはスケート一筋ってイメージだったから意外というか、差し出がましいけど競技に影響が出ないといいんだけど……」
line = "「だけど舞亜ちゃんはスケート一筋ってイメージだったから意外というか、差し出がましいけど競技に影響が出ないといいんだけど……」"

[[dialogue]]
speaker = "マトイ"
# 「相手は誰なんだろ……？　ああいや、熱愛が本当だって決まったわけじゃないし……」
line = "「相手は誰なんだろ……？　ああいや、熱愛が本当だって決まったわけじゃないし……」"

[[dialogue]]
speaker = "マトイ"
# 「あれ、どうして会長も引きつった顔してるの？　あ、会長もショックなんだよね！？　そうなんだよね！？」
line = "「あれ、どうして会長も引きつった顔してるの？　あ、会長もショックなんだよね！？　そうなんだよね！？」"

[[dialogue]]
speaker = "unk"
# ま、まぁ、そうかな……
line = "ま、まぁ、そうかな……"

[[dialogue]]
speaker = "マトイ"
# 「うんうん、わかるわかる。舞亜ちゃん、全然噂とかなかったからビックリだよねー」
line = "「うんうん、わかるわかる。舞亜ちゃん、全然噂とかなかったからビックリだよねー」"

[[dialogue]]
speaker = "マトイ"
# 「今日は星徒会ないから、じゃ、また明日ね」
line = "「今日は星徒会ないから、じゃ、また明日ね」"

[[dialogue]]
speaker = "unk"
# マトイと別れて、俺は真っ直ぐ帰宅──ではなく街へ繰り出す。
line = "マトイと別れて、俺は真っ直ぐ帰宅──ではなく街へ繰り出す。"

[[dialogue]]
speaker = "舞亜"
# 「あ、お迎えありがとー」
line = "「あ、お迎えありがとー」"

[[dialogue]]
speaker = "舞亜"
# 「今日は何の用事って？　この近くのスタジオで、スポーツ番組のインタビュー受けてたんだ。星騎士になったこととか、いろいろ話したよ」
line = "「今日は何の用事って？　この近くのスタジオで、スポーツ番組のインタビュー受けてたんだ。星騎士になったこととか、いろいろ話したよ」"

[[dialogue]]
speaker = "舞亜"
# 「今日はこの後オフだし、この辺ブラブラしよっか。あ、そうだ、会長さんのおうちに行ってもいい？」
line = "「今日はこの後オフだし、この辺ブラブラしよっか。あ、そうだ、会長さんのおうちに行ってもいい？」"

[[dialogue]]
speaker = "舞亜"
# 「……大丈夫？　じゃあお邪魔するね」
line = "「……大丈夫？　じゃあお邪魔するね」"

[[dialogue]]
speaker = "舞亜"
# 「それじゃ……手、繋ごっか？」
line = "「それじゃ……手、繋ごっか？」"

[[dialogue]]
speaker = "unk"
# こんなところで手を繋いで大丈夫？
line = "こんなところで手を繋いで大丈夫？"

[[dialogue]]
speaker = "舞亜"
# 「うん、大丈夫。だって私たち、恋人でしょ？」
line = "「うん、大丈夫。だって私たち、恋人でしょ？」"

[[dialogue]]
speaker = "舞亜"
# 「今までなんとなく隠してたけど、別に悪いことしてるわけじゃないから。もちろん会長さんが迷惑ならやめるけど……」
line = "「今までなんとなく隠してたけど、別に悪いことしてるわけじゃないから。もちろん会長さんが迷惑ならやめるけど……」"

[[dialogue]]
speaker = "unk"
# 俺も堂々としていたい
line = "俺も堂々としていたい"

[[dialogue]]
speaker = "舞亜"
# 「……そっか。うん、ありがと」
line = "「……そっか。うん、ありがと」"

[[dialogue]]
speaker = "舞亜"
# 「じゃあお手を失礼。ふふ、ここならたくさんの人に見られちゃうし、もう言い逃れできないね」
line = "「じゃあお手を失礼。ふふ、ここならたくさんの人に見られちゃうし、もう言い逃れできないね」"

[[dialogue]]
speaker = "舞亜"
# 「他に誰もいない時は手を繋いでたけど……こうして堂々としてると、晴れ晴れするっていうか、スカッとするね」
line = "「他に誰もいない時は手を繋いでたけど……こうして堂々としてると、晴れ晴れするっていうか、スカッとするね」"

[[dialogue]]
speaker = "舞亜"
# 「ちなみに会長さん、今日の晩ご飯は？　……今夜は母さんがいないから未定？　じゃあ私が作ってあげるね」
line = "「ちなみに会長さん、今日の晩ご飯は？　……今夜は母さんがいないから未定？　じゃあ私が作ってあげるね」"

[[dialogue]]
speaker = "舞亜"
# 「ん？　何驚いてるの？　私、料理できるんだよ」
line = "「ん？　何驚いてるの？　私、料理できるんだよ」"

[[dialogue]]
speaker = "舞亜"
# 「実はサボテンもステーキにするために育てて……って、冗談冗談。うちのポチとタマはかわいい家族なんだから、食べたら怒るからね」
line = "「実はサボテンもステーキにするために育てて……って、冗談冗談。うちのポチとタマはかわいい家族なんだから、食べたら怒るからね」"

[[dialogue]]
speaker = "舞亜"
# 「食事は自分で管理できるようにしておけ、って母さんに言われてて、一通り料理は教えてもらってるんだ。アスリート向けのレシピも一緒にね」
line = "「食事は自分で管理できるようにしておけ、って母さんに言われてて、一通り料理は教えてもらってるんだ。アスリート向けのレシピも一緒にね」"

[[dialogue]]
speaker = "舞亜"
# 「じゃ、一緒に買い物しよ♪」
line = "「じゃ、一緒に買い物しよ♪」"

[[dialogue]]
speaker = "舞亜"
# 「トマトと、玉ねぎと、セロリと……あと卵と……うん、買いたいものは揃ったかな」
line = "「トマトと、玉ねぎと、セロリと……あと卵と……うん、買いたいものは揃ったかな」"

[[dialogue]]
speaker = "unk"
# 一緒に買い物してると夫婦みたいだ
line = "一緒に買い物してると夫婦みたいだ"

[[dialogue]]
speaker = "舞亜"
# 「恋人通り越して夫婦かぁ……そう言われると照れちゃうなぁ。これから一緒にご飯食べるんだから、ますます家族みたいだね」
line = "「恋人通り越して夫婦かぁ……そう言われると照れちゃうなぁ。これから一緒にご飯食べるんだから、ますます家族みたいだね」"

[[dialogue]]
speaker = "舞亜"
# 「それじゃ、そろそろ会長さんのおうちに行こっか。私の特別メニューでもっとメロメロにしてあげちゃうよ？」
line = "「それじゃ、そろそろ会長さんのおうちに行こっか。私の特別メニューでもっとメロメロにしてあげちゃうよ？」"

[[dialogue]]
speaker = "マトイ"
# 「ま、ま……舞亜ちゃん！？　──と、会長！？」
line = "「ま、ま……舞亜ちゃん！？　──と、会長！？」"

[[dialogue]]
speaker = "マトイ"
# 「どど、どうして会長と舞亜ちゃんが一緒にいるの！？」
line = "「どど、どうして会長と舞亜ちゃんが一緒にいるの！？」"

[[dialogue]]
speaker = "舞亜"
# 「こんにちは。ええと、確か……新星の星徒会の人だよね」
line = "「こんにちは。ええと、確か……新星の星徒会の人だよね」"

[[dialogue]]
speaker = "マトイ"
# 「ここ、こんにちは！？　はわわわわ……ま、まさか舞亜ちゃんと直接お話できるなんて……！？」
line = "「ここ、こんにちは！？　はわわわわ……ま、まさか舞亜ちゃんと直接お話できるなんて……！？」"

[[dialogue]]
speaker = "マトイ"
# 「って、そうじゃなくて！　会長と舞亜ちゃんが一緒にいて、しかも手を繋いでいるということは──」
line = "「って、そうじゃなくて！　会長と舞亜ちゃんが一緒にいて、しかも手を繋いでいるということは──」"

[[dialogue]]
speaker = "unk"
# 俺が舞亜の恋人なんだ
line = "俺が舞亜の恋人なんだ"

[[dialogue]]
speaker = "マトイ"
# 「えええ～～～～～～～っ！！？」
line = "「えええ～～～～～～～っ！！？」"

[[dialogue]]
speaker = "舞亜"
# 「うん。まぁ、そういうこと」
line = "「うん。まぁ、そういうこと」"

[[dialogue]]
speaker = "マトイ"
# 「い、言っちゃって良かったの！？　秘密じゃなかったの！？」
line = "「い、言っちゃって良かったの！？　秘密じゃなかったの！？」"

[[dialogue]]
speaker = "舞亜"
# 「大丈夫。実は今日のインタビューで、例の噂について聞かれたから、彼氏がいるって正直に答えちゃった」
line = "「大丈夫。実は今日のインタビューで、例の噂について聞かれたから、彼氏がいるって正直に答えちゃった」"

[[dialogue]]
speaker = "マトイ"
# 「そ、そうなんだ……！　あのニュースは本当だったんだね……」
line = "「そ、そうなんだ……！　あのニュースは本当だったんだね……」"

[[dialogue]]
speaker = "マトイ"
# 「でもホッとした。正直、だらしない男の人が相手だったらと思って心配だったけど、会長なら安心だよ」
line = "「でもホッとした。正直、だらしない男の人が相手だったらと思って心配だったけど、会長なら安心だよ」"

[[dialogue]]
speaker = "マトイ"
# 「それなら会長が教えてくれてもよかったのに……と思わなくもないけどね」
line = "「それなら会長が教えてくれてもよかったのに……と思わなくもないけどね」"

[[dialogue]]
speaker = "unk"
# それについてはごめん
line = "それについてはごめん"

[[dialogue]]
speaker = "舞亜"
# 「これからは周りを気にせず見せつけていくけど、ちゃんとスケートもするから。応援よろしくね？」
line = "「これからは周りを気にせず見せつけていくけど、ちゃんとスケートもするから。応援よろしくね？」"

[[dialogue]]
speaker = "マトイ"
# 「もちろん！　舞亜ちゃんが幸せならオッケー！　だよ！」
line = "「もちろん！　舞亜ちゃんが幸せならオッケー！　だよ！」"

[[dialogue]]
speaker = "舞亜"
# 「ありがと。それじゃ──」
line = "「ありがと。それじゃ──」"

[[dialogue]]
speaker = "舞亜"
# 「会長さんに、ぎゅ～っと♪　今まで隠してた分もイチャイチャしちゃうからね♪」
line = "「会長さんに、ぎゅ～っと♪　今まで隠してた分もイチャイチャしちゃうからね♪」"

[[dialogue]]
speaker = "マトイ"
# 「舞亜ちゃんってば大胆……！？」
line = "「舞亜ちゃんってば大胆……！？」"

[[dialogue]]
speaker = "unk"
# マトイの前で照れくささがあるものの、舞亜の体温と柔らかさにドキドキしてしまうのだった。
line = "マトイの前で照れくささがあるものの、舞亜の体温と柔らかさにドキドキしてしまうのだった。"
