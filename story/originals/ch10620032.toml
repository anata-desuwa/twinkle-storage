[[dialogue]]
speaker = "unk"
# 第２話,ジュエリーとゲーム合宿,P
line = "第２話,ジュエリーとゲーム合宿,P"

[[dialogue]]
speaker = "unk"
# ある日の放課後。
line = "ある日の放課後。"

[[dialogue]]
speaker = "unk"
# 俺とジュエリーは空き教室に呼び出されていた。
line = "俺とジュエリーは空き教室に呼び出されていた。"

[[dialogue]]
speaker = "ジュエリー"
# 「ミネコが話があるって言うから来てみたが……嫌な予感しかしないよ、助手」
line = "「ミネコが話があるって言うから来てみたが……嫌な予感しかしないよ、助手」"

[[dialogue]]
speaker = "ミネコ"
# 「フッフッフ……待っていたよ、２人とも！」
line = "「フッフッフ……待っていたよ、２人とも！」"

[[dialogue]]
speaker = "unk"
# 透明になって姿を隠していたミネコが、得意げに姿を現す。
line = "透明になって姿を隠していたミネコが、得意げに姿を現す。"

[[dialogue]]
speaker = "unk"
# 彼女はジュエリーと同じく、『大怪盗』の<ruby=ロール>役職</ruby>を持つ『選星者』だ。
line = "彼女はジュエリーと同じく、『大怪盗』の<ruby>役職<rt>ロール</rt></ruby>を持つ『選星者』だ。"

[[dialogue]]
speaker = "ミネコ"
# 「今日はこの『大怪盗フランボウ』から、名探偵ジュエリー・ブラウンへ挑戦状を叩き付けにきたよ！」
line = "「今日はこの『大怪盗フランボウ』から、名探偵ジュエリー・ブラウンへ挑戦状を叩き付けにきたよ！」"

[[dialogue]]
speaker = "ミネコ"
# 「会長と結婚したいというのなら――」
line = "「会長と結婚したいというのなら――」"

[[dialogue]]
speaker = "ミネコ"
# 「この日本製のレトロゲーム、横スクロールアクション『ジ・キルちゃんのオゥ・マイ・ダーリン！』をクリアしてみたまえ！」
line = "「この日本製のレトロゲーム、横スクロールアクション『ジ・キルちゃんのオゥ・マイ・ダーリン！』をクリアしてみたまえ！」"

[[dialogue]]
speaker = "ジュエリー"
# 「……キミのオススメゲームという時点で嫌な予感しかしないんだが」
line = "「……キミのオススメゲームという時点で嫌な予感しかしないんだが」"

[[dialogue]]
speaker = "ミネコ"
# 「フッフッフ！　もしクリアできなければ、会長の愛はこの大怪盗フランボウが頂くよ♪」
line = "「フッフッフ！　もしクリアできなければ、会長の愛はこの大怪盗フランボウが頂くよ♪」"

[[dialogue]]
speaker = "ジュエリー"
# 「いや、ゲーム関係なく、絶対に渡す気はないが……」
line = "「いや、ゲーム関係なく、絶対に渡す気はないが……」"

[[dialogue]]
speaker = "unk"
# そんなわけで週末。
line = "そんなわけで週末。"

[[dialogue]]
speaker = "unk"
# 俺の家で『ゲーム合宿』が行われることになり、ジュエリーとミネコが遊びにやって来ていた。
line = "俺の家で『ゲーム合宿』が行われることになり、ジュエリーとミネコが遊びにやって来ていた。"

[[dialogue]]
speaker = "ジュエリー"
# 「結局押し切られて、プレイすることになってしまった……」
line = "「結局押し切られて、プレイすることになってしまった……」"

[[dialogue]]
speaker = "ミネコ"
# 「さて、改めて説明しよう！　このゲームの主人公は、結婚式に向かう花嫁の『ジ・キルちゃん』！」
line = "「さて、改めて説明しよう！　このゲームの主人公は、結婚式に向かう花嫁の『ジ・キルちゃん』！」"

[[dialogue]]
speaker = "ミネコ"
# 「教会へ向かう道中のトラブルを乗り越え、愛しのダーリンの元へ辿り着いて結婚式を挙げるのが目的だ！」
line = "「教会へ向かう道中のトラブルを乗り越え、愛しのダーリンの元へ辿り着いて結婚式を挙げるのが目的だ！」"

[[dialogue]]
speaker = "ミネコ"
# 「さぁ、花嫁になったつもりで頑張りたまえ、名探偵！」
line = "「さぁ、花嫁になったつもりで頑張りたまえ、名探偵！」"

[[dialogue]]
speaker = "ジュエリー"
# 「設定的に、今の自分と重ねられなくもないが……」
line = "「設定的に、今の自分と重ねられなくもないが……」"

[[dialogue]]
speaker = "unk"
# そうして、ミネコが持ってきた据え置きの古いゲーム機を起動し、プレイを開始するジュエリー。
line = "そうして、ミネコが持ってきた据え置きの古いゲーム機を起動し、プレイを開始するジュエリー。"

[[dialogue]]
speaker = "ジュエリー"
# 「……なんだこれは。主人公の歩行速度が異常に遅くないか……？」
line = "「……なんだこれは。主人公の歩行速度が異常に遅くないか……？」"

[[dialogue]]
speaker = "unk"
# 移動ボタン、壊れてない？
line = "移動ボタン、壊れてない？"

[[dialogue]]
speaker = "ジュエリー"
# 「それに何故か街の住人が、主人公を目の敵にしたかのように襲ってくるんだが……この街は暴徒の巣窟なのか？」
line = "「それに何故か街の住人が、主人公を目の敵にしたかのように襲ってくるんだが……この街は暴徒の巣窟なのか？」"

[[dialogue]]
speaker = "ミネコ"
# 「説明書によれば、舞台は『ロンドン』とのことだよ」
line = "「説明書によれば、舞台は『ロンドン』とのことだよ」"

[[dialogue]]
speaker = "ジュエリー"
# 「私の知っているロンドンとは、あまりにも違いすぎるんだが……」
line = "「私の知っているロンドンとは、あまりにも違いすぎるんだが……」"

[[dialogue]]
speaker = "ジ・キルちゃん"
# 『あぉおおおうっ！！』
line = "『あぉおおおうっ！！』"

[[dialogue]]
speaker = "ジュエリー"
# 「気持ち悪い叫びと共に、主人公が死んだぞ……？」
line = "「気持ち悪い叫びと共に、主人公が死んだぞ……？」"

[[dialogue]]
speaker = "ミネコ"
# 「まだ死んでないよ！　説明書によれば、敵からの攻撃でダメージを受けてストレスが溜まると花嫁は『闇堕ちモード』に入るんだ！」
line = "「まだ死んでないよ！　説明書によれば、敵からの攻撃でダメージを受けてストレスが溜まると花嫁は『闇堕ちモード』に入るんだ！」"

[[dialogue]]
speaker = "ミネコ"
# 「ジ・キルちゃんは実は二重人格で、悪の人格に目覚めると住民たちに逆襲を始めるんだよ！」
line = "「ジ・キルちゃんは実は二重人格で、悪の人格に目覚めると住民たちに逆襲を始めるんだよ！」"

[[dialogue]]
speaker = "ジュエリー"
# 「なるほど、読めてきたぞ」
line = "「なるほど、読めてきたぞ」"

[[dialogue]]
speaker = "ジュエリー"
# 「彼女の悪の人格は『元暗殺者』で、襲ってきているのも結婚を阻むため住民に扮した暗殺者たち――そういう設定だろう？」
line = "「彼女の悪の人格は『元暗殺者』で、襲ってきているのも結婚を阻むため住民に扮した暗殺者たち――そういう設定だろう？」"

[[dialogue]]
speaker = "ミネコ"
# 「うーん、惜しい！　ジ・キルちゃんの悪の人格が元暗殺者なのは合ってるけど、襲ってきてるのはただの住人だよ」
line = "「うーん、惜しい！　ジ・キルちゃんの悪の人格が元暗殺者なのは合ってるけど、襲ってきてるのはただの住人だよ」"

[[dialogue]]
speaker = "unk"
# 世紀末かな？
line = "世紀末かな？"

[[dialogue]]
speaker = "ジュエリー"
# 「つくづく民度が終わってるロンドンだな……」
line = "「つくづく民度が終わってるロンドンだな……」"

[[dialogue]]
speaker = "unk"
# それからジュエリーは、不条理な攻撃の嵐に苦しみ続けていた。
line = "それからジュエリーは、不条理な攻撃の嵐に苦しみ続けていた。"

[[dialogue]]
speaker = "ジュエリー"
# 「こんなの……かわしきれるわけないだろう……！」
line = "「こんなの……かわしきれるわけないだろう……！」"

[[dialogue]]
speaker = "ジュエリー"
# 「住民、動物、虫、それに謎に転がってくる<ruby=たる>樽</ruby>！　全てが主人公の命を狙っているレベルで、執拗に攻撃してくるんだが……！？」
line = "「住民、動物、虫、それに謎に転がってくる<ruby>樽<rt>たる</rt></ruby>！　全てが主人公の命を狙っているレベルで、執拗に攻撃してくるんだが……！？」"

[[dialogue]]
speaker = "ジュエリー"
# 「あと中でも最悪の敵が、この『爆弾魔』だ！　こいつだけは絶対に住人じゃないだろう！？」
line = "「あと中でも最悪の敵が、この『爆弾魔』だ！　こいつだけは絶対に住人じゃないだろう！？」"

[[dialogue]]
speaker = "ミネコ"
# 「説明書には、その爆弾魔も善良な市民って書いてあるよ」
line = "「説明書には、その爆弾魔も善良な市民って書いてあるよ」"

[[dialogue]]
speaker = "ジュエリー"
# 「善良の意味を辞書で引いてきたまえ！」
line = "「善良の意味を辞書で引いてきたまえ！」"

[[dialogue]]
speaker = "ジュエリー"
# 「あと、爆弾のエフェクトはショボいのに、当たり判定が凄まじく大きいのはどうなっているんだ！？」
line = "「あと、爆弾のエフェクトはショボいのに、当たり判定が凄まじく大きいのはどうなっているんだ！？」"

[[dialogue]]
speaker = "ジュエリー"
# 「威力も一撃で瀕死になるレベルだぞ！？　操作性が劣悪だから、回避もしづらいし！」
line = "「威力も一撃で瀕死になるレベルだぞ！？　操作性が劣悪だから、回避もしづらいし！」"

[[dialogue]]
speaker = "ミネコ"
# 「説明書によると、すごい威力の爆弾なんだって」
line = "「説明書によると、すごい威力の爆弾なんだって」"

[[dialogue]]
speaker = "unk"
# なんでも書いてある説明書だな……
line = "なんでも書いてある説明書だな……"

[[dialogue]]
speaker = "ジュエリー"
# 「説明書に書いてあれば何でも許されると思わないでほしいんだが！？」
line = "「説明書に書いてあれば何でも許されると思わないでほしいんだが！？」"

[[dialogue]]
speaker = "ジュエリー"
# 「ミネコから紹介された時点でなんとなくそんな予感はしていたが……明解に換言するならばこれは――」
line = "「ミネコから紹介された時点でなんとなくそんな予感はしていたが……明解に換言するならばこれは――」"

[[dialogue]]
speaker = "ジュエリー"
# 「クソゲーじゃないか！」
line = "「クソゲーじゃないか！」"

[[dialogue]]
speaker = "ミネコ"
# 「人生って、クソゲーに似てるよね♪」
line = "「人生って、クソゲーに似てるよね♪」"

[[dialogue]]
speaker = "ミネコ"
# 「でも、だからこそ私は、挑戦する意味があると思うんだよね～」
line = "「でも、だからこそ私は、挑戦する意味があると思うんだよね～」"

[[dialogue]]
speaker = "ミネコ"
# 「理不尽なことがあって、それでも乗り越えるからこそ、見られる景色がある」
line = "「理不尽なことがあって、それでも乗り越えるからこそ、見られる景色がある」"

[[dialogue]]
speaker = "ミネコ"
# 「人生は山あり谷あり。このゲームのように、『結婚』も必ずしも幸せなことばかりじゃないかもしれないよ？」
line = "「人生は山あり谷あり。このゲームのように、『結婚』も必ずしも幸せなことばかりじゃないかもしれないよ？」"

[[dialogue]]
speaker = "ジュエリー"
# 「ミネコ……」
line = "「ミネコ……」"

[[dialogue]]
speaker = "ジュエリー"
# 「このゲームの制作者は、絶対そこまで考えてないと思うぞ」
line = "「このゲームの制作者は、絶対そこまで考えてないと思うぞ」"

[[dialogue]]
speaker = "ミネコ"
# 「会長～！　キミの恋人、すごくドライなんですけど～！？」
line = "「会長～！　キミの恋人、すごくドライなんですけど～！？」"

[[dialogue]]
speaker = "ジュエリー"
# 「失礼なことを言うな！　私は助手にはすごくウェットだぞ！」
line = "「失礼なことを言うな！　私は助手にはすごくウェットだぞ！」"

[[dialogue]]
speaker = "ミネコ"
# 「それはそれでなんか嫌じゃない……？」
line = "「それはそれでなんか嫌じゃない……？」"

[[dialogue]]
speaker = "unk"
# 大丈夫、俺も大概ウェットだから
line = "大丈夫、俺も大概ウェットだから"

[[dialogue]]
speaker = "ジュエリー"
# 「ふふっ、助手……<emoji=heart04>　愛しているよ<emoji=heart04>」
line = "「ふふっ、助手……<emoji=heart04>　愛しているよ<emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
# 「あ、うん。似た者カップルだったわ……」
line = "「あ、うん。似た者カップルだったわ……」"

[[dialogue]]
speaker = "unk"
# ──翌日。
line = "──翌日。"

[[dialogue]]
speaker = "unk"
# ゲーム合宿改め『クソゲー合宿』で挑んだ『ジ・キルちゃんのオゥ・マイ・ダーリン！』。
line = "ゲーム合宿改め『クソゲー合宿』で挑んだ『ジ・キルちゃんのオゥ・マイ・ダーリン！』。"

[[dialogue]]
speaker = "unk"
# ジュエリーは何度もコンティニューを繰り返した末、ついにラスボスを撃破しエンディングへ到達した。
line = "ジュエリーは何度もコンティニューを繰り返した末、ついにラスボスを撃破しエンディングへ到達した。"

[[dialogue]]
speaker = "ジュエリー"
# 「や、やったぞ……！　ついに結婚式場にたどり着いた……！　見たか、ミネコ！」
line = "「や、やったぞ……！　ついに結婚式場にたどり着いた……！　見たか、ミネコ！」"

[[dialogue]]
speaker = "unk"
# しかし、画面に映ったのは――
line = "しかし、画面に映ったのは――"

[[dialogue]]
speaker = "unk"
# 『ＢＡＤ　ＥＮＤ～闇堕ち花嫁～』
line = "『ＢＡＤ　ＥＮＤ～闇堕ち花嫁～』"

[[dialogue]]
speaker = "ジュエリー"
# 「……………………は？」
line = "「……………………は？」"

[[dialogue]]
speaker = "unk"
# え……どういうこと……？
line = "え……どういうこと……？"

[[dialogue]]
speaker = "ミネコ"
# 「ハッハッハッ！　説明しよう！　このゲームは『１度も闇堕ちルートに入らないで』ゲームクリアしないと、真のハッピーエンドを迎えられないのさ♪」
line = "「ハッハッハッ！　説明しよう！　このゲームは『１度も闇堕ちルートに入らないで』ゲームクリアしないと、真のハッピーエンドを迎えられないのさ♪」"

[[dialogue]]
speaker = "ジュエリー"
# 「やっぱりクソゲーじゃないか！？」
line = "「やっぱりクソゲーじゃないか！？」"

[[dialogue]]
speaker = "ミネコ"
# 「あははははっ♪　というわけで、次こそはハッピーエンドを目指して頑張ろっか♪」
line = "「あははははっ♪　というわけで、次こそはハッピーエンドを目指して頑張ろっか♪」"

[[dialogue]]
speaker = "ジュエリー"
# 「誰がやるかっ！」
line = "「誰がやるかっ！」"

[[dialogue]]
speaker = "unk"
# ──それから数週間後。
line = "──それから数週間後。"

[[dialogue]]
speaker = "ジュエリー"
# 「――助手。あのゲームは、ちゃんとハッピーエンドでクリアしておいたよ」
line = "「――助手。あのゲームは、ちゃんとハッピーエンドでクリアしておいたよ」"

[[dialogue]]
speaker = "unk"
# ジュエリーの淡々とした報告に、俺は驚く。
line = "ジュエリーの淡々とした報告に、俺は驚く。"

[[dialogue]]
speaker = "ジュエリー"
# 「あのまま終わりでは、ミネコの挑戦に負けたことになってしまうからね」
line = "「あのまま終わりでは、ミネコの挑戦に負けたことになってしまうからね」"

[[dialogue]]
speaker = "ジュエリー"
# 「大怪盗フランボウには、私たちの愛の邪魔などさせないさ」
line = "「大怪盗フランボウには、私たちの愛の邪魔などさせないさ」"

[[dialogue]]
speaker = "unk"
# そんなふうに言って微笑むジュエリーに、俺は思わず嬉しくなってしまうのだった。
line = "そんなふうに言って微笑むジュエリーに、俺は思わず嬉しくなってしまうのだった。"
