[[dialogue]]
speaker = "unk"
# 第7話,メイド長の笑顔,B
line = "第7話,メイド長の笑顔,B"

[[dialogue]]
speaker = "unk"
# 誰もが息を飲むような壮絶な戦闘の末、両者の動きが止まる。そして――
line = "誰もが息を飲むような壮絶な戦闘の末、両者の動きが止まる。そして――"

[[dialogue]]
speaker = "キリカ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "マリオン"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "マリオン"
# 「うふふ<emoji=heart04>　素晴らしい戦いでした、キリカさん」
line = "「うふふ<emoji=heart04>　素晴らしい戦いでした、キリカさん」"

[[dialogue]]
speaker = "マリオン"
# 「ああ、なんて眩しく、お可愛らしい……これだから、若い子を推すのは……止められませんね……♪」
line = "「ああ、なんて眩しく、お可愛らしい……これだから、若い子を推すのは……止められませんね……♪」"

[[dialogue]]
speaker = "ナミエル"
# 「キリカさんの――勝ちです！」
line = "「キリカさんの――勝ちです！」"

[[dialogue]]
speaker = "キリカ"
# 「……やり……ました……」
line = "「……やり……ました……」"

[[dialogue]]
speaker = "フェニエル"
# 「キリカさん！？」
line = "「キリカさん！？」"

[[dialogue]]
speaker = "unk"
# 師匠！
line = "師匠！"

[[dialogue]]
speaker = "キリカ"
# 「――ん……ここは……？」
line = "「――ん……ここは……？」"

[[dialogue]]
speaker = "キリカ"
# 「緋宮会長……？　私は一体……？」
line = "「緋宮会長……？　私は一体……？」"

[[dialogue]]
speaker = "キリカ"
# 「――そうでした、マリオンさんに勝って、それで……」
line = "「――そうでした、マリオンさんに勝って、それで……」"

[[dialogue]]
speaker = "フェニエル"
# 「キリカさんは直後に気を失ってしまったんです。そうしたら、会長さんが誰よりも早くキリカさんのところに駆けつけて――」
line = "「キリカさんは直後に気を失ってしまったんです。そうしたら、会長さんが誰よりも早くキリカさんのところに駆けつけて――」"

[[dialogue]]
speaker = "ナミエル"
# 「アリーナから飛び出した時は、どこに連れていく気だと思いましたが、追い駆けたら、この新星学園の保健室に……少し見直しました」
line = "「アリーナから飛び出した時は、どこに連れていく気だと思いましたが、追い駆けたら、この新星学園の保健室に……少し見直しました」"

[[dialogue]]
speaker = "キリカ"
# 「そうでしたか……ありがとうございます、緋宮会長。今日だけじゃなくて、昨日のことも」
line = "「そうでしたか……ありがとうございます、緋宮会長。今日だけじゃなくて、昨日のことも」"

[[dialogue]]
speaker = "キリカ"
# 「私のことを心配して、フィオナお嬢様に相談してくれたのですよね？」
line = "「私のことを心配して、フィオナお嬢様に相談してくれたのですよね？」"

[[dialogue]]
speaker = "unk"
# 弟子ですから
line = "弟子ですから"

[[dialogue]]
speaker = "マリオン"
# 「キリカさん」
line = "「キリカさん」"

[[dialogue]]
speaker = "キリカ"
# 「マリオンさん……あなたの方は、体は大丈夫なのですか？」
line = "「マリオンさん……あなたの方は、体は大丈夫なのですか？」"

[[dialogue]]
speaker = "マリオン"
# 「ええ。私はキリカさんの愛の鞭を受け慣れてますから♪　むしろ、あなたの本気を受け止められて、嬉しくて寝てられないくらいですよ<emoji=heart04>」
line = "「ええ。私はキリカさんの愛の鞭を受け慣れてますから♪　むしろ、あなたの本気を受け止められて、嬉しくて寝てられないくらいですよ<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
# 「――先の戦い、本当に見事でした」
line = "「――先の戦い、本当に見事でした」"

[[dialogue]]
speaker = "マリオン"
# 「キリカさんの未だかつてない、異次元の速度――神速の拳闘術」
line = "「キリカさんの未だかつてない、異次元の速度――神速の拳闘術」"

[[dialogue]]
speaker = "マリオン"
# 「学園を卒業してもなお、あなたはまた１段階、上の領域へと覚醒を果たしたと言っていいでしょう」
line = "「学園を卒業してもなお、あなたはまた１段階、上の領域へと覚醒を果たしたと言っていいでしょう」"

[[dialogue]]
speaker = "マリオン"
# 「若い子達の成長というのはいつ見ても、お可愛らしい……あなたは私の想像を超えた姿を見せてくれました」
line = "「若い子達の成長というのはいつ見ても、お可愛らしい……あなたは私の想像を超えた姿を見せてくれました」"

[[dialogue]]
speaker = "マリオン"
# 「ですから……メイド長の座を、あなたに返します」
line = "「ですから……メイド長の座を、あなたに返します」"

[[dialogue]]
speaker = "マリオン"
# 「おめでとう、キリカさん」
line = "「おめでとう、キリカさん」"

[[dialogue]]
speaker = "キリカ"
# 「ありがとうございます、マリオンさん。確かに承りました」
line = "「ありがとうございます、マリオンさん。確かに承りました」"

[[dialogue]]
speaker = "キリカ"
# 「……それから、メイド隊のみんな」
line = "「……それから、メイド隊のみんな」"

[[dialogue]]
speaker = "ナミエル"
# 「キリカさん、なんでしょう？」
line = "「キリカさん、なんでしょう？」"

[[dialogue]]
speaker = "キリカ"
# 「今回のことで、私はメイド長らしからぬ、情けないところを見せました。非難されても仕方がないと思っています」
line = "「今回のことで、私はメイド長らしからぬ、情けないところを見せました。非難されても仕方がないと思っています」"

[[dialogue]]
speaker = "キリカ"
# 「大変に、申し訳ありませんでした」
line = "「大変に、申し訳ありませんでした」"

[[dialogue]]
speaker = "フェニエル"
# 「え！？　キリカさん、そんな……頭を上げてください！」
line = "「え！？　キリカさん、そんな……頭を上げてください！」"

[[dialogue]]
speaker = "キリカ"
# 「こんな私ですが、それでもメイド長の立場を続けさせて欲しいと思っています」
line = "「こんな私ですが、それでもメイド長の立場を続けさせて欲しいと思っています」"

[[dialogue]]
speaker = "キリカ"
# 「私は今回のことで――メイド長としての仕事が好きだったのだと、自覚することができたので」
line = "「私は今回のことで――メイド長としての仕事が好きだったのだと、自覚することができたので」"

[[dialogue]]
speaker = "ナミエル"
# 「もちろんです、キリカさん――いえ、メイド長。私はいつも真面目なあなたのことを、心から尊敬してますから」
line = "「もちろんです、キリカさん――いえ、メイド長。私はいつも真面目なあなたのことを、心から尊敬してますから」"

[[dialogue]]
speaker = "フェニエル"
# 「私もです。これからもどうか、ご指導をよろしくお願いしますっ！」
line = "「私もです。これからもどうか、ご指導をよろしくお願いしますっ！」"

[[dialogue]]
speaker = "unk"
# そのほかのメイド隊の子たちも、キリカ師匠に笑顔で答える。
line = "そのほかのメイド隊の子たちも、キリカ師匠に笑顔で答える。"

[[dialogue]]
speaker = "unk"
# と、その時だった。
line = "と、その時だった。"

[[dialogue]]
speaker = "キリカ"
# 「ありがとう。みんな……」
line = "「ありがとう。みんな……」"

[[dialogue]]
speaker = "ナミエル"
# 「え？」
line = "「え？」"

[[dialogue]]
speaker = "フェニエル"
# 「あ……！」
line = "「あ……！」"

[[dialogue]]
speaker = "キリカ"
# 「……？　なんですか？　みんな、私の顔をじろじろ見て……」
line = "「……？　なんですか？　みんな、私の顔をじろじろ見て……」"

[[dialogue]]
speaker = "unk"
# 師匠が笑った……！
line = "師匠が笑った……！"

[[dialogue]]
speaker = "キリカ"
# 「え！？　わ、笑ってましたか、私……！？」
line = "「え！？　わ、笑ってましたか、私……！？」"

[[dialogue]]
speaker = "ナミエル"
# 「はい、間違いなく」
line = "「はい、間違いなく」"

[[dialogue]]
speaker = "フェニエル"
# 「可愛かったです……！」
line = "「可愛かったです……！」"

[[dialogue]]
speaker = "キリカ"
# 「か、かわっ！？　～～～っ……！」
line = "「か、かわっ！？　～～～っ……！」"

[[dialogue]]
speaker = "unk"
# 師匠、照れてます？
line = "師匠、照れてます？"

[[dialogue]]
speaker = "キリカ"
# 「はぁ！？　なにを言っているのですか、緋宮会長！？　違います！　ニヤニヤしないで下さいっ！」
line = "「はぁ！？　なにを言っているのですか、緋宮会長！？　違います！　ニヤニヤしないで下さいっ！」"

[[dialogue]]
speaker = "キリカ"
# 「と、とにかく、今さっき見たことは全員忘れなさい！　これはメイド長命令です！　いいですね！？」
line = "「と、とにかく、今さっき見たことは全員忘れなさい！　これはメイド長命令です！　いいですね！？」"

[[dialogue]]
speaker = "unk"
# 恥ずかしそうに顔を赤くするキリカ師匠なのだった。
line = "恥ずかしそうに顔を赤くするキリカ師匠なのだった。"
