line = "「守護天使の神殿の例のように、信仰が何かしらの影響を及ぼしていた可能性もありますが……まぁほぼ無関係でしょうね」"

[[dialogue]]
speaker = "ヴァレリー"
# 「そして、転移モンスターはこれからも出現する可能性があるとのことです。まだまだコラプサーの仕事はなくなりそうにありませんね」
line = "「そして、転移モンスターはこれからも出現する可能性があるとのことです。まだまだコラプサーの仕事はなくなりそうにありませんね」"

[[dialogue]]
