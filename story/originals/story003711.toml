[[dialogue]]
speaker = "ヴァレリー"
# 「そしてあのデータにない新型モンスターですが、ツェツィーリエさんが仰るには、ディザスターハンドの影響で並行世界ベガから転移してきたようです」
line = "「そしてあのデータにない新型モンスターですが、ツェツィーリエさんが仰るには、ディザスターハンドの影響で並行世界ベガから転移してきたようです」"

[[dialogue]]
speaker = "ヴァレリー"
# 「平行世界の時間はブレがありますからね。ディザスターハンドが消滅しても、時間差でこういうことが起こりうる──とのことでした」
line = "「平行世界の時間はブレがありますからね。ディザスターハンドが消滅しても、時間差でこういうことが起こりうる──とのことでした」"

