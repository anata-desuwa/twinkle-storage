[[dialogue]]
speaker = "unk"
# 第２話,パンケーキの秘伝、学びます！,P
line = "第２話,パンケーキの秘伝、学びます！,P"

[[dialogue]]
speaker = "ソフィア"
# 「サラン先輩……いえ、先生！　今日はよろしくお願いします！」
line = "「サラン先輩……いえ、先生！　今日はよろしくお願いします！」"

[[dialogue]]
speaker = "サラン"
# 「は～い、よろしくね～♪」
line = "「は～い、よろしくね～♪」"

[[dialogue]]
speaker = "サラン"
# 「ところでソフィアちゃんはハロウィンフォームでパンケーキを生み出せるのに、どうして実際に自分でも作ってみようと思ったの？」
line = "「ところでソフィアちゃんはハロウィンフォームでパンケーキを生み出せるのに、どうして実際に自分でも作ってみようと思ったの？」"

[[dialogue]]
speaker = "ソフィア"
# 「手作りして食べてもらいたい相手がいまして……」
line = "「手作りして食べてもらいたい相手がいまして……」"

[[dialogue]]
speaker = "ソフィア"
# 「それに、せっかくだから自分でもちゃんと作れるようになりたいな、と」
line = "「それに、せっかくだから自分でもちゃんと作れるようになりたいな、と」"

[[dialogue]]
speaker = "サラン"
# 「嬉しい～♪　お菓子作りに興味を持ってくれてありがと～」
line = "「嬉しい～♪　お菓子作りに興味を持ってくれてありがと～」"

[[dialogue]]
speaker = "サラン"
# 「それじゃ、さっそく始めましょう。材料はこちらに準備してあるから」
line = "「それじゃ、さっそく始めましょう。材料はこちらに準備してあるから」"

[[dialogue]]
speaker = "ソフィア"
# 「まずは卵の黄身と薄力粉、ベーキングパウダーを入れてそれをかき混ぜるところからですね──」
line = "「まずは卵の黄身と薄力粉、ベーキングパウダーを入れてそれをかき混ぜるところからですね──」"

[[dialogue]]
speaker = "サーシャ"
# 「あら、誰かお客さんかしら？」
line = "「あら、誰かお客さんかしら？」"

[[dialogue]]
speaker = "ソフィア"
# 「……ちらっ。姉さん……今、姉さんと会長さんの他には誰もいませんね？」
line = "「……ちらっ。姉さん……今、姉さんと会長さんの他には誰もいませんね？」"

[[dialogue]]
speaker = "サーシャ"
# 「ええ、私たちだけよ？」
line = "「ええ、私たちだけよ？」"

[[dialogue]]
speaker = "ソフィア"
# 「では、こほん……」
line = "「では、こほん……」"

[[dialogue]]
speaker = "ソフィア"
# 「トリック＆トリート～！」
line = "「トリック＆トリート～！」"

[[dialogue]]
speaker = "サーシャ"
# 「あらあら！」
line = "「あらあら！」"

[[dialogue]]
speaker = "ソフィア"
# 「どうです、驚きましたか？　新しく発現したハロウィンフォームです」
line = "「どうです、驚きましたか？　新しく発現したハロウィンフォームです」"

[[dialogue]]
speaker = "サーシャ"
# 「ええ、とっても驚いたし、とっても可愛いわ」
line = "「ええ、とっても驚いたし、とっても可愛いわ」"

[[dialogue]]
speaker = "ソフィア"
# 「そうでしょうそうでしょう。ですがこれだけではありませんよ？」
line = "「そうでしょうそうでしょう。ですがこれだけではありませんよ？」"

[[dialogue]]
speaker = "ソフィア"
# 「これを作ってきました！　じゃーん、サラン先輩に教わって作ったパンケーキです♪　姉さんに食べてもらおうと思って持ってきました」
line = "「これを作ってきました！　じゃーん、サラン先輩に教わって作ったパンケーキです♪　姉さんに食べてもらおうと思って持ってきました」"

[[dialogue]]
speaker = "サーシャ"
# 「私のために？　嬉しいわ、ソフィ……ありがとう……」
line = "「私のために？　嬉しいわ、ソフィ……ありがとう……」"

[[dialogue]]
speaker = "ソフィア"
# 「『美味しいお菓子で、姉さんを驚かせよう大作戦』は成功のようですね……」
line = "「『美味しいお菓子で、姉さんを驚かせよう大作戦』は成功のようですね……」"

[[dialogue]]
speaker = "unk"
# サランの所に通ってたのはそういうことか
line = "サランの所に通ってたのはそういうことか"

[[dialogue]]
speaker = "ソフィア"
# 「ええ、味の方もサラン先生のお墨付きをもらいました。さあさあ、どうぞ食べてください」
line = "「ええ、味の方もサラン先生のお墨付きをもらいました。さあさあ、どうぞ食べてください」"

[[dialogue]]
speaker = "サーシャ"
# 「ありがとう、さっそくいただくわね～」
line = "「ありがとう、さっそくいただくわね～」"

[[dialogue]]
speaker = "サーシャ"
# 「もぐ……あら、本当に美味しい……すごいわ、ソフィ♪」
line = "「もぐ……あら、本当に美味しい……すごいわ、ソフィ♪」"

[[dialogue]]
speaker = "ソフィア"
# 「それほどでも……♪」
line = "「それほどでも……♪」"

[[dialogue]]
speaker = "サーシャ"
# 「こっちにいらっしゃい、一緒に食べましょうよ。ポンポン、いつものようにお膝の上に乗って～♪」
line = "「こっちにいらっしゃい、一緒に食べましょうよ。ポンポン、いつものようにお膝の上に乗って～♪」"

[[dialogue]]
speaker = "ソフィア"
# 「ええ、そうさせてもらいます……<emoji=heart04>」
line = "「ええ、そうさせてもらいます……<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
# 「お姉ちゃんハグ、ぎゅーっ。はい、あーん口を開けて、食べさせてあげるわ～」
line = "「お姉ちゃんハグ、ぎゅーっ。はい、あーん口を開けて、食べさせてあげるわ～」"

[[dialogue]]
speaker = "ソフィア"
# 「あーん……<emoji=heart04>」
line = "「あーん……<emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
# 「あれ、どうしましたか会長さん？」
line = "「あれ、どうしましたか会長さん？」"

[[dialogue]]
speaker = "unk"
# メッチャ甘えるじゃん！
line = "メッチャ甘えるじゃん！"

[[dialogue]]
speaker = "ソフィア"
# 「だって会長さんには、私が姉さんと２人きりの時甘えまくりだということがバレてしまっていますからね」
line = "「だって会長さんには、私が姉さんと２人きりの時甘えまくりだということがバレてしまっていますからね」"

[[dialogue]]
speaker = "ソフィア"
# 「何の遠慮もなく甘やかしてもらえます。そうですね、姉さん？」
line = "「何の遠慮もなく甘やかしてもらえます。そうですね、姉さん？」"

[[dialogue]]
speaker = "サーシャ"
# 「うふふ、そうよ～。よしよし、頭をなでなでしてあげますね」
line = "「うふふ、そうよ～。よしよし、頭をなでなでしてあげますね」"

[[dialogue]]
speaker = "unk"
# これは浮気だ！
line = "これは浮気だ！"

[[dialogue]]
speaker = "unk"
# 納得いかない！
line = "納得いかない！"

[[dialogue]]
speaker = "ソフィア"
# 「そういうのじゃありませんよ、これは！」
line = "「そういうのじゃありませんよ、これは！」"

[[dialogue]]
speaker = "ソフィア"
# 「姉さんとは姉妹なんですから甘えるのは自然なことです。浮気ではないでしょう？」
line = "「姉さんとは姉妹なんですから甘えるのは自然なことです。浮気ではないでしょう？」"

[[dialogue]]
speaker = "unk"
# 恋人である俺を放置はいかがなものか
line = "恋人である俺を放置はいかがなものか"

[[dialogue]]
speaker = "unk"
# だからといって
line = "だからといって"

[[dialogue]]
speaker = "ソフィア"
# 「むぅ……仕方がありませんね。ではどうすればいいんですか？」
line = "「むぅ……仕方がありませんね。ではどうすればいいんですか？」"

[[dialogue]]
speaker = "unk"
# 頭を撫でながらパンケーキを食べさせたい
line = "頭を撫でながらパンケーキを食べさせたい"

[[dialogue]]
speaker = "unk"
# 俺もソフィアを抱っこしたい
line = "俺もソフィアを抱っこしたい"

[[dialogue]]
speaker = "ソフィア"
# 「分かりました。では会長さん、お膝の上に乗せてください」
line = "「分かりました。では会長さん、お膝の上に乗せてください」"

[[dialogue]]
speaker = "ソフィア"
# 「んっ……えへへ……やっぱり会長さんの頭なでなでは、いいですね……」
line = "「んっ……えへへ……やっぱり会長さんの頭なでなでは、いいですね……」"

[[dialogue]]
speaker = "unk"
# はい、あーん
line = "はい、あーん"

[[dialogue]]
speaker = "ソフィア"
# 「あーんっ♪」
line = "「あーんっ♪」"

[[dialogue]]
speaker = "ソフィア"
# 「もぐもぐ……はぁ……恋人に抱っこされながら食べるパンケーキも素晴らしいものです……<emoji=heart04>」
line = "「もぐもぐ……はぁ……恋人に抱っこされながら食べるパンケーキも素晴らしいものです……<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
# 「あーん、会長くんってば、可愛い妹をとらないで欲しいわ～。ソフィ、お姉ちゃんを捨てちゃうの？」
line = "「あーん、会長くんってば、可愛い妹をとらないで欲しいわ～。ソフィ、お姉ちゃんを捨てちゃうの？」"

[[dialogue]]
speaker = "ソフィア"
# 「す、捨てるって！　そんなことするわけないじゃありませんか！」
line = "「す、捨てるって！　そんなことするわけないじゃありませんか！」"

[[dialogue]]
speaker = "サーシャ"
# 「だったら戻ってきてちょうだい！　もっといっぱい甘やかしてあげるから～♪」
line = "「だったら戻ってきてちょうだい！　もっといっぱい甘やかしてあげるから～♪」"

[[dialogue]]
speaker = "ソフィア"
# 「わ、わかりました……では……」
line = "「わ、わかりました……では……」"

[[dialogue]]
speaker = "unk"
# 行かないでくれ、ソフィア！
line = "行かないでくれ、ソフィア！"

[[dialogue]]
speaker = "ソフィア"
# 「ふえっ、会長さん！？」
line = "「ふえっ、会長さん！？」"

[[dialogue]]
speaker = "サーシャ"
# 「お姉ちゃんのこと、選んでくれるでしょ？　ソフィ？」
line = "「お姉ちゃんのこと、選んでくれるでしょ？　ソフィ？」"

[[dialogue]]
speaker = "ソフィア"
# 「む、むむむ……」
line = "「む、むむむ……」"

[[dialogue]]
speaker = "ソフィア"
# 「こんなの選べません！！　どうすればいいんですか～～～～～～っ！！！」
line = "「こんなの選べません！！　どうすればいいんですか～～～～～～っ！！！」"

[[dialogue]]
speaker = "unk"
# 俺もサーシャさんも真っ赤になって困り果てるソフィアに、懸命に笑いをこらえる。
line = "俺もサーシャさんも真っ赤になって困り果てるソフィアに、懸命に笑いをこらえる。"

[[dialogue]]
speaker = "unk"
# そんな風にして俺たちは、ソフィアの作ってきてくれたパンケーキを存分に味わったのだった。
line = "そんな風にして俺たちは、ソフィアの作ってきてくれたパンケーキを存分に味わったのだった。"
