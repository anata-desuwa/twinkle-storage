[[dialogue]]
speaker = "unk"
# 新星学園１年生で、周囲には秘密でＶチューバーとして活動している『<ruby=うみのべ>海野辺</ruby>ルルカ』。
line = "新星学園１年生で、周囲には秘密でＶチューバーとして活動している『<ruby>海野辺<rt>うみのべ</rt></ruby>ルルカ』。"

[[dialogue]]
speaker = "unk"
# 彼女はバレンタイン配信のネタ探しを兼ねて、友人のリーリアやアナが暮らす新星寮へと取材に訪れたところだった。
line = "彼女はバレンタイン配信のネタ探しを兼ねて、友人のリーリアやアナが暮らす新星寮へと取材に訪れたところだった。"

[[dialogue]]
speaker = "unk"
# トワは、イクシリオンのスランプの部分だけを伏せて、それ以外の事情をルルカに説明する。
line = "トワは、イクシリオンのスランプの部分だけを伏せて、それ以外の事情をルルカに説明する。"

[[dialogue]]
speaker = "トワ先生"
# 「――そんな感じで、ここ１週間ずっとチョコ作りに苦戦してるんだ」
line = "「――そんな感じで、ここ１週間ずっとチョコ作りに苦戦してるんだ」"

[[dialogue]]
speaker = "ルルカ"
# 「ふむふむ、なるほど～。だったら……あたしも一緒に作ってみてもいいですか？　お兄ちゃんに贈るチョコを作る予定だったんで、一石二鳥ですし♪」
line = "「ふむふむ、なるほど～。だったら……あたしも一緒に作ってみてもいいですか？　お兄ちゃんに贈るチョコを作る予定だったんで、一石二鳥ですし♪」"

[[dialogue]]
speaker = "イクシリオン"
# 「ですが、先ほど説明した通り、私と一緒に作業をすると、ルルカさんまで巻き込んでしまう可能性が……！」
line = "「ですが、先ほど説明した通り、私と一緒に作業をすると、ルルカさんまで巻き込んでしまう可能性が……！」"

[[dialogue]]
speaker = "ルルカ"
# 「大丈夫だよ♪　同じ１年生だし、困ってるなら助け合わなきゃ！　それにね――」
line = "「大丈夫だよ♪　同じ１年生だし、困ってるなら助け合わなきゃ！　それにね――」"

[[dialogue]]
speaker = "ルルカ"
# 「今の話を聞いて、ちょっと思いついたんです。もしかしたら、あたしなら解決できるかもって♪」
line = "「今の話を聞いて、ちょっと思いついたんです。もしかしたら、あたしなら解決できるかもって♪」"

[[dialogue]]
speaker = "イクシリオン"
# 「えっ？」
line = "「えっ？」"

[[dialogue]]
speaker = "unk"
# そうしてルルカも加わり、３人で再びチョコ作りを始めた。するとまもなく、イクシリオンの体が再び光り始める。
line = "そうしてルルカも加わり、３人で再びチョコ作りを始めた。するとまもなく、イクシリオンの体が再び光り始める。"

[[dialogue]]
speaker = "イクシリオン"
# 「！　ルルカさん、やはり私のバレンタインフォームが反応してます！　気を付けて下さい！」
line = "「！　ルルカさん、やはり私のバレンタインフォームが反応してます！　気を付けて下さい！」"

[[dialogue]]
speaker = "ルルカ"
# 「うん、わかった！　よ～し――」
line = "「うん、わかった！　よ～し――」"

[[dialogue]]
speaker = "unk"
# ルルカは落ち着いた表情で、イクシリオンの力の余波を受け止める。そして――
line = "ルルカは落ち着いた表情で、イクシリオンの力の余波を受け止める。そして――"

[[dialogue]]
speaker = "ルルカ"
# 「変身！」
line = "「変身！」"

[[dialogue]]
speaker = "ルルカ"
# 「――これが、あたしのバレンタインフォーム……！」
line = "「――これが、あたしのバレンタインフォーム……！」"

[[dialogue]]
speaker = "unk"
# 光が収まると、トワと同じようにルルカも、バレンタインフォームへと姿を変えていた。
line = "光が収まると、トワと同じようにルルカも、バレンタインフォームへと姿を変えていた。"

[[dialogue]]
speaker = "ルルカ"
# （やっぱり……衣装のイメージは、ルカルカのバレンタイン配信用にデザインしたやつが反映されてる。うん、この感じなら――！）
line = "（やっぱり……衣装のイメージは、ルカルカのバレンタイン配信用にデザインしたやつが反映されてる。うん、この感じなら――！）"

[[dialogue]]
speaker = "トワ先生"
# 「ルルカちゃん、それじゃあこのままチョコ作りを続けるよ！　準備はいい？」
line = "「ルルカちゃん、それじゃあこのままチョコ作りを続けるよ！　準備はいい？」"

[[dialogue]]
speaker = "ルルカ"
# 「はい、トワちゃん先生！　大丈夫です！」
line = "「はい、トワちゃん先生！　大丈夫です！」"

[[dialogue]]
speaker = "unk"
# 視線を交わし、頷き合う３人。再びチョコ作りを始めていく。
line = "視線を交わし、頷き合う３人。再びチョコ作りを始めていく。"

[[dialogue]]
speaker = "unk"
# ――やがて、調理を続けているルルカの前に、クロトが姿を現した。
line = "――やがて、調理を続けているルルカの前に、クロトが姿を現した。"

[[dialogue]]
speaker = "クロト"
# 「あれ？　ルルカじゃないか。新星寮のキッチンで何を作ってるんだ？」
line = "「あれ？　ルルカじゃないか。新星寮のキッチンで何を作ってるんだ？」"

[[dialogue]]
speaker = "ルルカ"
# 「あっ、お兄ちゃん！　実はね、あたし、お兄ちゃんに渡すチョコを作ってるの♪」
line = "「あっ、お兄ちゃん！　実はね、あたし、お兄ちゃんに渡すチョコを作ってるの♪」"

[[dialogue]]
speaker = "クロト"
# 「本当か？　嬉しいな。どんなチョコを作ってくれるんだ？」
line = "「本当か？　嬉しいな。どんなチョコを作ってくれるんだ？」"

[[dialogue]]
speaker = "ルルカ"
# 「う～ん、それは――バレンタイン当日まで秘密っ♪」
line = "「う～ん、それは――バレンタイン当日まで秘密っ♪」"

[[dialogue]]
speaker = "unk"
# そう言って、ルルカはウィンクをひとつ。
line = "そう言って、ルルカはウィンクをひとつ。"

[[dialogue]]
speaker = "unk"
# 手の甲に油性マジックで書いておいた文字を確認しながら、はっきりと唱える。
line = "手の甲に油性マジックで書いておいた文字を確認しながら、はっきりと唱える。"

[[dialogue]]
speaker = "ルルカ"
# 「――<b>ルルカワールド</b>！」
line = "「――<b>ルルカワールド</b>！」"

[[dialogue]]
speaker = "クロト"
# 「えっ……！？」
line = "「えっ……！？」"

[[dialogue]]
speaker = "ルルカ"
# 「――よしっ♪　トワちゃん先生！　イクシリオンちゃん！　能力、上手く使えたよ！」
line = "「――よしっ♪　トワちゃん先生！　イクシリオンちゃん！　能力、上手く使えたよ！」"

[[dialogue]]
speaker = "unk"
# 気づけばクロトの姿は消え、代わりに現れたのは、イクシリオンとトワの２人だった。
line = "気づけばクロトの姿は消え、代わりに現れたのは、イクシリオンとトワの２人だった。"

[[dialogue]]
speaker = "イクシリオン"
# 「すごいです、ルルカさん！　本当に妄想トリップ中に<b>仮想空間</b>を展開してしまうなんて……！」
line = "「すごいです、ルルカさん！　本当に妄想トリップ中に<b>仮想空間</b>を展開してしまうなんて……！」"

[[dialogue]]
speaker = "トワ先生"
# 「ルルカちゃんの『仮想空間を作り出す力』を応用して、妄想トリップしている私たちの<b>脳内</b>に結界のような空間を構築する――」
line = "「ルルカちゃんの『仮想空間を作り出す力』を応用して、妄想トリップしている私たちの<b>脳内</b>に結界のような空間を構築する――」"

[[dialogue]]
speaker = "イクシリオン"
# 「それならば、こうして妄想トリップ中でも、意識を保ったまま行動できる……！」
line = "「それならば、こうして妄想トリップ中でも、意識を保ったまま行動できる……！」"

[[dialogue]]
speaker = "ルルカ"
# 「うんっ♪　あとは現実のキッチンをそのまま仮想空間内に投影して、現実の体の動きと同期させれば――」
line = "「うんっ♪　あとは現実のキッチンをそのまま仮想空間内に投影して、現実の体の動きと同期させれば――」"

[[dialogue]]
speaker = "ルルカ"
# 「ＶＲヘッドセットを付けてるみたいに、ちゃんとチョコ作りを続けられる、ってわけ♪」
line = "「ＶＲヘッドセットを付けてるみたいに、ちゃんとチョコ作りを続けられる、ってわけ♪」"

[[dialogue]]
speaker = "トワ先生"
# 「本当にすごいよ、ルルカちゃん！　まさかこんな使い方を思いつくなんて！」
line = "「本当にすごいよ、ルルカちゃん！　まさかこんな使い方を思いつくなんて！」"

[[dialogue]]
speaker = "ルルカ"
# 「えへへ♪　あたし、戦闘はあんまり得意じゃないけど……お兄ちゃんの力になれるように、少しずつ星騎士としても頑張ろうって思ってて！」
line = "「えへへ♪　あたし、戦闘はあんまり得意じゃないけど……お兄ちゃんの力になれるように、少しずつ星騎士としても頑張ろうって思ってて！」"

[[dialogue]]
speaker = "ルルカ"
# 「この前、友達と訓練してた時に、精神干渉が得意な星術使いの子がいて……。どうやったら対抗できるか考えてるうちに、こうすればいけるかもって！」
line = "「この前、友達と訓練してた時に、精神干渉が得意な星術使いの子がいて……。どうやったら対抗できるか考えてるうちに、こうすればいけるかもって！」"

[[dialogue]]
speaker = "ルルカ"
# 「だから今回も、もしかしたらイクシリオンちゃんの問題に役立つかもって思ったんです♪」
line = "「だから今回も、もしかしたらイクシリオンちゃんの問題に役立つかもって思ったんです♪」"

[[dialogue]]
speaker = "イクシリオン"
# 「能力は考え方次第で、強さになり得る……。本当にすごいです、ルルカさん！」
line = "「能力は考え方次第で、強さになり得る……。本当にすごいです、ルルカさん！」"

[[dialogue]]
speaker = "トワ先生"
# 「ふふっ、よかった。ルルカちゃんのおかげで、イクシリオンちゃんも元気を取り戻したみたい♪」
line = "「ふふっ、よかった。ルルカちゃんのおかげで、イクシリオンちゃんも元気を取り戻したみたい♪」"

[[dialogue]]
speaker = "イクシリオン"
# 「はい！　先生の言葉の意味が、今ならよくわかります。私もルルカさんを見習って、バレンタインフォームを使いこなせるように頑張ります！」
line = "「はい！　先生の言葉の意味が、今ならよくわかります。私もルルカさんを見習って、バレンタインフォームを使いこなせるように頑張ります！」"

[[dialogue]]
speaker = "ルルカ"
# 「なんかよくわかんないけど……イクシリオンちゃんにとっても一石二鳥になったみたいだね♪」
line = "「なんかよくわかんないけど……イクシリオンちゃんにとっても一石二鳥になったみたいだね♪」"

[[dialogue]]
speaker = "ルルカ"
# 「よ～し、これで妄想トリップの問題も解決したし――」
line = "「よ～し、これで妄想トリップの問題も解決したし――」"

[[dialogue]]
speaker = "ルルカ"
# 「イクシリオンちゃん！　お兄ちゃんに渡すチョコも、絶対に成功させちゃおう♪」
line = "「イクシリオンちゃん！　お兄ちゃんに渡すチョコも、絶対に成功させちゃおう♪」"

[[dialogue]]
speaker = "イクシリオン"
# 「はいっ♪　ルルカさん、よろしくお願い致します！」
line = "「はいっ♪　ルルカさん、よろしくお願い致します！」"

[[dialogue]]
speaker = "unk"
# こうして３人は、本格的にチョコ作りを始めるのだった。
line = "こうして３人は、本格的にチョコ作りを始めるのだった。"
