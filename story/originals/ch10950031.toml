[[dialogue]]
speaker = "unk"
# 第１話,シズハとディーラック,P
line = "第１話,シズハとディーラック,P"

[[dialogue]]
speaker = "unk"
# その日、俺は恋人であるシズハと、新たに覚醒した『ヴィクトリアフォーム』の訓練をする為、『仮想結界システム』を使っていた。
line = "その日、俺は恋人であるシズハと、新たに覚醒した『ヴィクトリアフォーム』の訓練をする為、『仮想結界システム』を使っていた。"

[[dialogue]]
speaker = "unk"
# 訓練フィールドは『渋谷』の市街地。
line = "訓練フィールドは『渋谷』の市街地。"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「ディーちゃん、息を合わせて行くよ！」
line = "「ディーちゃん、息を合わせて行くよ！」"

[[dialogue]]
speaker = "ディーラック"
# 「はいはい、シズハちゃんこそ、遅れないでよね！」
line = "「はいはい、シズハちゃんこそ、遅れないでよね！」"

[[dialogue]]
speaker = "unk"
# ２人は『聖杯の魔力』と『マイナスエネルギー』を融合させ、攻撃を放つ。
line = "２人は『聖杯の魔力』と『マイナスエネルギー』を融合させ、攻撃を放つ。"

[[dialogue]]
speaker = "モンスター"
# 「――ッ！」
line = "「――ッ！」"

[[dialogue]]
speaker = "unk"
# それにより、強力な仮想モンスターも一撃で倒してしまった。
line = "それにより、強力な仮想モンスターも一撃で倒してしまった。"

[[dialogue]]
speaker = "unk"
# 俺がその強さを褒めると、シズハは嬉しそうに笑う。
line = "俺がその強さを褒めると、シズハは嬉しそうに笑う。"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「えへへ♪　これにはディーちゃんや、会長との絆の力が合わさってるからね！」
line = "「えへへ♪　これにはディーちゃんや、会長との絆の力が合わさってるからね！」"

[[dialogue]]
speaker = "unk"
# ヴィクトリアフォームは、シズハとディーラックの精神をリンクさせることで運用が可能になる。
line = "ヴィクトリアフォームは、シズハとディーラックの精神をリンクさせることで運用が可能になる。"

[[dialogue]]
speaker = "unk"
# さらに、俺の魔王の力『アルケインコード』によって起動させたものでもある為、一緒に戦っている時は、俺とシズハの間にも『絆の力』が繋がっている感覚があった。
line = "さらに、俺の魔王の力『アルケインコード』によって起動させたものでもある為、一緒に戦っている時は、俺とシズハの間にも『絆の力』が繋がっている感覚があった。"

[[dialogue]]
speaker = "unk"
# なら、俺もディーラックと仲良くならないとな
line = "なら、俺もディーラックと仲良くならないとな"

[[dialogue]]
speaker = "ディーラック"
# 「いや、それ必要ある？」
line = "「いや、それ必要ある？」"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「え～、私はいいと思うけどな～♪　そうすればもっと絆の力が強くなりそうじゃない？」
line = "「え～、私はいいと思うけどな～♪　そうすればもっと絆の力が強くなりそうじゃない？」"

[[dialogue]]
speaker = "ディーラック"
# 「そんなこと言われてもなぁ……」
line = "「そんなこと言われてもなぁ……」"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「ディーちゃんは会長のこと、嫌い？」
line = "「ディーちゃんは会長のこと、嫌い？」"

[[dialogue]]
speaker = "ディーラック"
# 「いや、別に。ただ、今さら改めて仲良くなろうって言われても、何をすればいいのかわからないでしょ」
line = "「いや、別に。ただ、今さら改めて仲良くなろうって言われても、何をすればいいのかわからないでしょ」"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「それはやっぱり――『お尻』じゃない？」
line = "「それはやっぱり――『お尻』じゃない？」"

[[dialogue]]
speaker = "ディーラック"
# 「はぁ！？」
line = "「はぁ！？」"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「お互いのお尻を触り合えば、距離が縮まると思うわ！」
line = "「お互いのお尻を触り合えば、距離が縮まると思うわ！」"

[[dialogue]]
speaker = "ディーラック"
# 「シズハちゃんの、そのお尻に対する謎の信頼感は何なの！？」
line = "「シズハちゃんの、そのお尻に対する謎の信頼感は何なの！？」"

[[dialogue]]
speaker = "ディーラック"
# 「というか最近、シズハちゃんだって会長のお尻を触ろうとしてないじゃん！？」
line = "「というか最近、シズハちゃんだって会長のお尻を触ろうとしてないじゃん！？」"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「そ、それは……！　だって、恋人同士なんだから、お尻を触るのはもっと仲が深まってからじゃないと……<emoji=heart04>」
line = "「そ、それは……！　だって、恋人同士なんだから、お尻を触るのはもっと仲が深まってからじゃないと……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 恥ずかしそうに視線を逸らすシズハ。
line = "恥ずかしそうに視線を逸らすシズハ。"

[[dialogue]]
speaker = "ディーラック"
# 「わけがわからないんだけど！？　２人はもうキスまでいってる仲なんじゃないの？」
line = "「わけがわからないんだけど！？　２人はもうキスまでいってる仲なんじゃないの？」"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「なに言ってるの、ディーちゃん！　お尻を触り合うほうが、キスよりエッチに決まってるじゃない！」
line = "「なに言ってるの、ディーちゃん！　お尻を触り合うほうが、キスよりエッチに決まってるじゃない！」"

[[dialogue]]
speaker = "ディーラック"
# 「それをシズハちゃんは、ボクと会長にやれって言ってるんだよね！？」
line = "「それをシズハちゃんは、ボクと会長にやれって言ってるんだよね！？」"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「え？　挨拶でお尻を触り合うのは、また意味が違くない？」
line = "「え？　挨拶でお尻を触り合うのは、また意味が違くない？」"

[[dialogue]]
speaker = "ディーラック"
# 「なんでそこでキョトン顔になるのか意味がわからないよ！？」
line = "「なんでそこでキョトン顔になるのか意味がわからないよ！？」"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「大丈夫！　ディーちゃん、挨拶なら恥ずかしくないから、勇気を出して！」
line = "「大丈夫！　ディーちゃん、挨拶なら恥ずかしくないから、勇気を出して！」"

[[dialogue]]
speaker = "ディーラック"
# 「えっと……会長、シズハちゃんの主張、どう思う？」
line = "「えっと……会長、シズハちゃんの主張、どう思う？」"

[[dialogue]]
speaker = "unk"
# 恋人でもわからないことはある
line = "恋人でもわからないことはある"

[[dialogue]]
speaker = "ディーラック"
# 「そこだけは気が合うね……」
line = "「そこだけは気が合うね……」"

[[dialogue]]
speaker = "unk"
# 俺はシズハに向き直り、両肩に手を置いて言う。
line = "俺はシズハに向き直り、両肩に手を置いて言う。"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「どうしたの、会長？」
line = "「どうしたの、会長？」"

[[dialogue]]
speaker = "unk"
# シズハ、よく聞いてくれ
line = "シズハ、よく聞いてくれ"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「え？　――恋人として付き合っている以上、私以外のお尻には軽い気持ちで触りたくない？」
line = "「え？　――恋人として付き合っている以上、私以外のお尻には軽い気持ちで触りたくない？」"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「会長……そっか、ごめん……」
line = "「会長……そっか、ごめん……」"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「私も――会長のお尻が１番好きよ<emoji=heart04>」
line = "「私も――会長のお尻が１番好きよ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ああ、俺もシズハのお尻が１番好きだ！
line = "ああ、俺もシズハのお尻が１番好きだ！"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「会長……<emoji=heart04>　えへへへぇ<emoji=heart04>」
line = "「会長……<emoji=heart04>　えへへへぇ<emoji=heart04>」"

[[dialogue]]
speaker = "ディーラック"
# 「えっ、なにこのバカップルの謎尻会話……」
line = "「えっ、なにこのバカップルの謎尻会話……」"

[[dialogue]]
speaker = "unk"
# 俺はそれからディーラックの方を向いて言う。
line = "俺はそれからディーラックの方を向いて言う。"

[[dialogue]]
speaker = "ディーラック"
# 「なに？　――お尻を触り合わない代わりに、会長もボクのことを『ディーちゃん』って呼びたいって？」
line = "「なに？　――お尻を触り合わない代わりに、会長もボクのことを『ディーちゃん』って呼びたいって？」"

[[dialogue]]
speaker = "ディーラック"
# 「待って、どういう流れ？　というか、会長から『ちゃん付け』で呼ばれるの、キモくて嫌なんだけど……」
line = "「待って、どういう流れ？　というか、会長から『ちゃん付け』で呼ばれるの、キモくて嫌なんだけど……」"

[[dialogue]]
speaker = "unk"
# 辛辣！！！
line = "辛辣！！！"

[[dialogue]]
speaker = "unk"
# それでも俺は諦めない。
line = "それでも俺は諦めない。"

[[dialogue]]
speaker = "ディーラック"
# 「はぁ？　――なら、今度ゲームで遊ぼうって？」
line = "「はぁ？　――なら、今度ゲームで遊ぼうって？」"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「あっ、それいい♪　ディーちゃん、会長と一緒にやろうよ！」
line = "「あっ、それいい♪　ディーちゃん、会長と一緒にやろうよ！」"

[[dialogue]]
speaker = "ディーラック"
# 「いや、今どきオンライン対戦があるから、別に要らないんだけど……」
line = "「いや、今どきオンライン対戦があるから、別に要らないんだけど……」"

[[dialogue]]
speaker = "unk"
# そこをなんとか！
line = "そこをなんとか！"

[[dialogue]]
speaker = "ディーラック"
# 「……あ～もう！　わかったよ！」
line = "「……あ～もう！　わかったよ！」"

[[dialogue]]
speaker = "ディーラック"
# 「どうせやるまでしつこく言い続けるんでしょ？　知ってるよ、会長もシズハちゃんと似て、諦めが悪いんだからサ！」
line = "「どうせやるまでしつこく言い続けるんでしょ？　知ってるよ、会長もシズハちゃんと似て、諦めが悪いんだからサ！」"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「やったね、会長♪　じゃあ、私たち３人で遊べるやつにしよっ♪」
line = "「やったね、会長♪　じゃあ、私たち３人で遊べるやつにしよっ♪」"

[[dialogue]]
speaker = "unk"
# それから訓練を終えた後、俺はシズハの部屋へ遊びに行き、３人で賑やかにゲームをして過ごすのだった。
line = "それから訓練を終えた後、俺はシズハの部屋へ遊びに行き、３人で賑やかにゲームをして過ごすのだった。"
