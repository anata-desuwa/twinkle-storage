[[dialogue]]
speaker = "unk"
# 第４話,ベアトリスの願い,P
line = "第４話,ベアトリスの願い,P"

[[dialogue]]
speaker = "ベアトリス"
# 「ん～～～……気持ちいい～……っ」
line = "「ん～～～……気持ちいい～……っ」"

[[dialogue]]
speaker = "unk"
# 教皇庁前の広場で、両手を羽のように広げて光を浴びるベアトリス。
line = "教皇庁前の広場で、両手を羽のように広げて光を浴びるベアトリス。"

[[dialogue]]
speaker = "unk"
# ベアトリスは本来、日光が苦手な吸血鬼だが……
line = "ベアトリスは本来、日光が苦手な吸血鬼だが……"

[[dialogue]]
speaker = "ベアトリス"
# 「あ、こんにちは、会長さん。私は見ての通り、日光浴中です」
line = "「あ、こんにちは、会長さん。私は見ての通り、日光浴中です」"

[[dialogue]]
speaker = "ベアトリス"
# 「星力がある間は平気ですから、今のうちに光を浴びておかないと。流星市国にいる間に、一生分日向ぼっこするつもりです」
line = "「星力がある間は平気ですから、今のうちに光を浴びておかないと。流星市国にいる間に、一生分日向ぼっこするつもりです」"

[[dialogue]]
speaker = "ベアトリス"
# 「私はデイマスターじゃないけど、星力がある間は日光も大丈夫なんです。逆に言えば星力がないとダメなんですけど」
line = "「私はデイマスターじゃないけど、星力がある間は日光も大丈夫なんです。逆に言えば星力がないとダメなんですけど」"

[[dialogue]]
speaker = "ベアトリス"
# 「なので、星騎士じゃなくなったら故郷の洞窟に帰るつもりです」
line = "「なので、星騎士じゃなくなったら故郷の洞窟に帰るつもりです」"

[[dialogue]]
speaker = "ベアトリス"
# 「でも時間は限られてますから。食事を楽しまなきゃ人生損ですっ」
line = "「でも時間は限られてますから。食事を楽しまなきゃ人生損ですっ」"

[[dialogue]]
speaker = "ベアトリス"
# 「……ん？　どうしたんですか、会長さん。ちょっと顔が険しいですよ」
line = "「……ん？　どうしたんですか、会長さん。ちょっと顔が険しいですよ」"

[[dialogue]]
speaker = "ベアトリス"
# 「はっ──もしかして匂いますか！？　またニンニク入れすぎました！？」
line = "「はっ──もしかして匂いますか！？　またニンニク入れすぎました！？」"

[[dialogue]]
speaker = "unk"
# ベアトリスってあとどれだけ星力が持つの？
line = "ベアトリスってあとどれだけ星力が持つの？"

[[dialogue]]
speaker = "ベアトリス"
# 「え？　そうですねー……吸血鬼は寿命の長い種族ですから、人間や他の魔族よりは持つかもしれません」
line = "「え？　そうですねー……吸血鬼は寿命の長い種族ですから、人間や他の魔族よりは持つかもしれません」"

[[dialogue]]
speaker = "ベアトリス"
# 「でも私の感覚だと、持ってあと数年だと思います。その前にリクリエを何とかして、世界を平和にしましょう！」
line = "「でも私の感覚だと、持ってあと数年だと思います。その前にリクリエを何とかして、世界を平和にしましょう！」"

[[dialogue]]
speaker = "ベアトリス"
# 「……おや？　あの子、不安そうにキョロキョロして……迷子でしょうか？　ちょっと行ってきます！」
line = "「……おや？　あの子、不安そうにキョロキョロして……迷子でしょうか？　ちょっと行ってきます！」"

[[dialogue]]
speaker = "unk"
# その後、ベアトリスは迷子の母親を見つけたり、礼拝に来た人の道案内をしたりと、忙がしく動いていたのだった。
line = "その後、ベアトリスは迷子の母親を見つけたり、礼拝に来た人の道案内をしたりと、忙がしく動いていたのだった。"

[[dialogue]]
speaker = "ベアトリス"
# 「ふぅ……一仕事した気分です。みなさん笑顔になってくれて、お礼もたくさんもらっちゃいました」
line = "「ふぅ……一仕事した気分です。みなさん笑顔になってくれて、お礼もたくさんもらっちゃいました」"

[[dialogue]]
speaker = "unk"
# ベアトリスは優しいな
line = "ベアトリスは優しいな"

[[dialogue]]
speaker = "ベアトリス"
# 「そうですかね？　そう言ってもらえて、悪い気はしませんけど」
line = "「そうですかね？　そう言ってもらえて、悪い気はしませんけど」"

[[dialogue]]
speaker = "unk"
# でももっと自分のために時間を使ってもいい
line = "でももっと自分のために時間を使ってもいい"

[[dialogue]]
speaker = "ベアトリス"
# 「自分のために……？　どういう意味です……？」
line = "「自分のために……？　どういう意味です……？」"

[[dialogue]]
speaker = "ベアトリス"
# 「私が流星市国にいられる時間は限られてるから……？　あ～……なるほど、そういう意味ですか」
line = "「私が流星市国にいられる時間は限られてるから……？　あ～……なるほど、そういう意味ですか」"

[[dialogue]]
speaker = "ベアトリス"
# 「私のこと考えてくれてありがとうございます、会長さん。でも私、別に自分を犠牲にしてるつもりなんかなくて」
line = "「私のこと考えてくれてありがとうございます、会長さん。でも私、別に自分を犠牲にしてるつもりなんかなくて」"

[[dialogue]]
speaker = "ベアトリス"
# 「人助けだって、私がやりたくてやってることですよ。十分自分のために時間を使ってます」
line = "「人助けだって、私がやりたくてやってることですよ。十分自分のために時間を使ってます」"

[[dialogue]]
speaker = "ベアトリス"
# 「ん～……会長さんとはそれなりに仲良くなったと思うんで、昔語りしていいですかね？」
line = "「ん～……会長さんとはそれなりに仲良くなったと思うんで、昔語りしていいですかね？」"

[[dialogue]]
speaker = "unk"
# 俺も聞きたい
line = "俺も聞きたい"

[[dialogue]]
speaker = "ベアトリス"
# 「じゃあ……話しちゃいますね」
line = "「じゃあ……話しちゃいますね」"

[[dialogue]]
speaker = "ベアトリス"
# 「前も言った通り、私は吸血鬼で、私たちの一族は魔界の大きな洞窟の中に住んでいます」
line = "「前も言った通り、私は吸血鬼で、私たちの一族は魔界の大きな洞窟の中に住んでいます」"

[[dialogue]]
speaker = "ベアトリス"
# 「吸血鬼は日に弱いという弱点はありますが、体が頑丈で、非常に高い再生力を持っています」
line = "「吸血鬼は日に弱いという弱点はありますが、体が頑丈で、非常に高い再生力を持っています」"

[[dialogue]]
speaker = "ベアトリス"
# 「ですが何事にも例外はあるもので……私は昔は病弱で、いつも寝込んでばかりいました」
line = "「ですが何事にも例外はあるもので……私は昔は病弱で、いつも寝込んでばかりいました」"

[[dialogue]]
speaker = "ベアトリス"
# 「吸血鬼って基本的に丈夫だから、本当に珍しいんですよ、私みたいなの。だから一族の中でも落ちこぼれというか、出来損ないみたいな扱いでした」
line = "「吸血鬼って基本的に丈夫だから、本当に珍しいんですよ、私みたいなの。だから一族の中でも落ちこぼれというか、出来損ないみたいな扱いでした」"

[[dialogue]]
speaker = "ベアトリス"
# 「私の一族はみんな強いから、弱い者には厳しくて。私が寝込んでいると、視線が冷たいというか、早く死なないかなーみたいな感じで」
line = "「私の一族はみんな強いから、弱い者には厳しくて。私が寝込んでいると、視線が冷たいというか、早く死なないかなーみたいな感じで」"

[[dialogue]]
speaker = "ベアトリス"
# 「寝込んでいる時に、放置されることもありました。その時は運良く旅の方がやってきてくれて、もらったお薬のおかげで治りましたけど」
line = "「寝込んでいる時に、放置されることもありました。その時は運良く旅の方がやってきてくれて、もらったお薬のおかげで治りましたけど」"

[[dialogue]]
speaker = "ベアトリス"
# 「しぶとく生き延びて、大きくなったら体も丈夫になって、星力に目覚めて。それから私は流星市国に来て、星騎士になりました」
line = "「しぶとく生き延びて、大きくなったら体も丈夫になって、星力に目覚めて。それから私は流星市国に来て、星騎士になりました」"

[[dialogue]]
speaker = "ベアトリス"
# 「一族の中で、私は切り捨てられる側でした。弱い方でした」
line = "「一族の中で、私は切り捨てられる側でした。弱い方でした」"

[[dialogue]]
speaker = "ベアトリス"
# 「だから私は誰も切り捨てたくない、見捨てたくないんです」
line = "「だから私は誰も切り捨てたくない、見捨てたくないんです」"

[[dialogue]]
speaker = "ベアトリス"
# 「私みたいに弱い人も、私とは全然違う強い人も、み～んな幸せでいてほしいんです」
line = "「私みたいに弱い人も、私とは全然違う強い人も、み～んな幸せでいてほしいんです」"

[[dialogue]]
speaker = "ベアトリス"
# 「なので、会長さんは優しいって言ってくれましたけど、これは優しさじゃなくて、私のわがままなんです」
line = "「なので、会長さんは優しいって言ってくれましたけど、これは優しさじゃなくて、私のわがままなんです」"

[[dialogue]]
speaker = "unk"
# やっぱりベアトリスは優しいよ
line = "やっぱりベアトリスは優しいよ"

[[dialogue]]
speaker = "ベアトリス"
# 「もう、違うって言ってるのに……でも会長さんにそう言ってもらえると嬉しいです」
line = "「もう、違うって言ってるのに……でも会長さんにそう言ってもらえると嬉しいです」"

[[dialogue]]
speaker = "ベアトリス"
# 「こんなこと言うと笑われるかもしれませんけど……私は世界の全ての人々を守りたいと思っています」
line = "「こんなこと言うと笑われるかもしれませんけど……私は世界の全ての人々を守りたいと思っています」"

[[dialogue]]
speaker = "ベアトリス"
# 「魔界も、人間界も、天界も……もっと広い世界も守りたいんです。私を優しいと言ってくれた会長さんなら、きっとわかってくれると思います」
line = "「魔界も、人間界も、天界も……もっと広い世界も守りたいんです。私を優しいと言ってくれた会長さんなら、きっとわかってくれると思います」"

[[dialogue]]
speaker = "ベアトリス"
# 「欲張りでも、我がままでも、全部ぜ～んぶ守れるように、一緒に頑張りましょう！」
line = "「欲張りでも、我がままでも、全部ぜ～んぶ守れるように、一緒に頑張りましょう！」"

[[dialogue]]
speaker = "unk"
# 後日──
line = "後日──"

[[dialogue]]
speaker = "ダークキングフワッチ"
# 「イ～～～……」
line = "「イ～～～……」"

[[dialogue]]
speaker = "ベアトリス"
# 「お疲れ様でした、会長さん。さすがお強いですね」
line = "「お疲れ様でした、会長さん。さすがお強いですね」"

[[dialogue]]
speaker = "ベアトリス"
# 「あ、会長さん、ちょっと血が出てます。さっきの戦いで少し切っちゃいました？」
line = "「あ、会長さん、ちょっと血が出てます。さっきの戦いで少し切っちゃいました？」"

[[dialogue]]
speaker = "ベアトリス"
# 「──ッ！？」
line = "「──ッ！？」"

[[dialogue]]
speaker = "unk"
# 大丈夫？　何かあった？
line = "大丈夫？　何かあった？"

[[dialogue]]
speaker = "ベアトリス"
# 「吸血鬼は嗅覚が鋭いって言いましたよね？　だからその……血の匂いにも敏感で……」
line = "「吸血鬼は嗅覚が鋭いって言いましたよね？　だからその……血の匂いにも敏感で……」"

[[dialogue]]
speaker = "ベアトリス"
# 「……ゴクリ」
line = "「……ゴクリ」"

[[dialogue]]
speaker = "ベアトリス"
# 「やっぱりエッチですぅ～～～～～っ！！」
line = "「やっぱりエッチですぅ～～～～～っ！！」"

[[dialogue]]
speaker = "梨緒"
# 「どうしたベアト！　魔王に何かされたのか！？」
line = "「どうしたベアト！　魔王に何かされたのか！？」"

[[dialogue]]
speaker = "ベアトリス"
# 「いややや、あの──違うんですぅ～～～～～～っ！！！」
line = "「いややや、あの──違うんですぅ～～～～～～っ！！！」"

[[dialogue]]
speaker = "unk"
# 駆けつけてきた梨緒に勘違いされて、誤解を解くのが大変だったのだった──
line = "駆けつけてきた梨緒に勘違いされて、誤解を解くのが大変だったのだった──"
