[[dialogue]]
speaker = "アルモタヘル"
# 「ふむ、我はケバブの移動販売の補助か。任せろ」
line = "「ふむ、我はケバブの移動販売の補助か。任せろ」"

[[dialogue]]
speaker = "unk"
# アルモは大丈夫？
line = "アルモは大丈夫？"

[[dialogue]]
speaker = "アルモタヘル"
# 「不要な心配だ。我はいくつものケバブ店を食べ歩いてきたのだ。ケバブのことはよく知っている」
line = "「不要な心配だ。我はいくつものケバブ店を食べ歩いてきたのだ。ケバブのことはよく知っている」"

[[dialogue]]
speaker = "アルモタヘル"
# 「確かにマグダレナは鈍いところがあるからな。お前に苦労をかけることもあっただろう。だが我は違う」
line = "「確かにマグダレナは鈍いところがあるからな。お前に苦労をかけることもあっただろう。だが我は違う」"

[[dialogue]]
speaker = "アルモタヘル"
# 「フ。初めて給金を得た暁には、我からお前たちに馳走してやる」
line = "「フ。初めて給金を得た暁には、我からお前たちに馳走してやる」"

[[dialogue]]
speaker = "unk"
# 自信満々な態度が逆に不安になるところではあったが──
line = "自信満々な態度が逆に不安になるところではあったが──"

[[dialogue]]
speaker = "アルモタヘル"
# 「チキンケバブひとつ、辛口ソースだな。代金は──頂戴した」
line = "「チキンケバブひとつ、辛口ソースだな。代金は──頂戴した」"

[[dialogue]]
speaker = "アルモタヘル"
# 「マトンに中辛ソース、チーズトッピング……了解した。しばし待つが良い」
line = "「マトンに中辛ソース、チーズトッピング……了解した。しばし待つが良い」"

[[dialogue]]
speaker = "unk"
# （ちゃんとできてる……！）
line = "（ちゃんとできてる……！）"

[[dialogue]]
speaker = "アルモタヘル"
# 「何を驚いている。言ったであろう、不要な心配だと」
line = "「何を驚いている。言ったであろう、不要な心配だと」"

[[dialogue]]
speaker = "アルモタヘル"
# 「我は悠久の時を生きる守護天使だ。このくらいのこと──」
line = "「我は悠久の時を生きる守護天使だ。このくらいのこと──」"

[[dialogue]]
speaker = "アルモタヘル"
# 「ぐっ……！」
line = "「ぐっ……！」"

[[dialogue]]
speaker = "unk"
# 大丈夫！？
line = "大丈夫！？"

[[dialogue]]
speaker = "アルモタヘル"
# 「ああ……だい、じょうぶだ……身体機能に異常はない……」
line = "「ああ……だい、じょうぶだ……身体機能に異常はない……」"

[[dialogue]]
speaker = "アルモタヘル"
# 「だがケバブを見ていると腹が空く……。働く前に十分食べたと思っていたが……くぅ……」
line = "「だがケバブを見ていると腹が空く……。働く前に十分食べたと思っていたが……くぅ……」"

[[dialogue]]
speaker = "ケバブ屋"
# 「人が落ち着いたら休憩するかい？　賄いぐらい出すよ」
line = "「人が落ち着いたら休憩するかい？　賄いぐらい出すよ」"

[[dialogue]]
speaker = "アルモタヘル"
# 「すまない……助かるぞ、店主」
line = "「すまない……助かるぞ、店主」"

[[dialogue]]
speaker = "アルモタヘル"
# 「だが列はいつになったらなくなるのだ？」
line = "「だが列はいつになったらなくなるのだ？」"

[[dialogue]]
speaker = "unk"
# ケバブの屋台に並んでいる人を見ると、十人や二十人どころではない、長蛇の列ができていた。
line = "ケバブの屋台に並んでいる人を見ると、十人や二十人どころではない、長蛇の列ができていた。"

[[dialogue]]
speaker = "アルモタヘル"
# 「我とてケバブ屋でこのような行列は見たことがない。何が起きているのだ？」
line = "「我とてケバブ屋でこのような行列は見たことがない。何が起きているのだ？」"

[[dialogue]]
speaker = "ケバブ屋"
# 「何でも人気アニメでケバブが登場したらしくてね。アキバフェスタってことで、それを再現したコラボメニューを出してるんだよ」
line = "「何でも人気アニメでケバブが登場したらしくてね。アキバフェスタってことで、それを再現したコラボメニューを出してるんだよ」"

[[dialogue]]
speaker = "アルモタヘル"
# 「何……！？　やたら数が出る品があると思ったらそのせいか！？」
line = "「何……！？　やたら数が出る品があると思ったらそのせいか！？」"

[[dialogue]]
speaker = "ナミエル"
# 「すみません、ビーフケバブ、スペシャルチリソースひとつください」
line = "「すみません、ビーフケバブ、スペシャルチリソースひとつください」"

[[dialogue]]
speaker = "アルモタヘル"
# 「う、うむ……ひとつだな。了解した」
line = "「う、うむ……ひとつだな。了解した」"

[[dialogue]]
speaker = "アルモタヘル"
# （これが店主の言っていたコラボメニューだな。旨味を凝縮した牛肉、香辛料をふんだんに使ったソース……美味に違いない……）
line = "（これが店主の言っていたコラボメニューだな。旨味を凝縮した牛肉、香辛料をふんだんに使ったソース……美味に違いない……）"

[[dialogue]]
speaker = "アルモタヘル"
# 「商品だ。受け取れ」
line = "「商品だ。受け取れ」"

[[dialogue]]
speaker = "ナミエル"
# 「ありがとうございます。では写真を──」
line = "「ありがとうございます。では写真を──」"

[[dialogue]]
speaker = "アルモタヘル"
# 「むむむむ…………」
line = "「むむむむ…………」"

[[dialogue]]
speaker = "ナミエル"
# 「なんだかすごく見られているような……」
line = "「なんだかすごく見られているような……」"

[[dialogue]]
speaker = "アルモタヘル"
# 「……じゅるり」
line = "「……じゅるり」"

[[dialogue]]
speaker = "unk"
# 早く食べた方がいい！
line = "早く食べた方がいい！"

[[dialogue]]
speaker = "ナミエル"
# 「そ、そのようですね。いただきます」
line = "「そ、そのようですね。いただきます」"

[[dialogue]]
speaker = "ナミエル"
# 「──！　ケバブは初めて食しましたが、お肉と野菜と、そしてソースがマッチして……これは美味しいです」
line = "「──！　ケバブは初めて食しましたが、お肉と野菜と、そしてソースがマッチして……これは美味しいです」"

[[dialogue]]
speaker = "アルモタヘル"
# 「ぐぬぬ……ぐぬぬぬぬ……！」
line = "「ぐぬぬ……ぐぬぬぬぬ……！」"

[[dialogue]]
speaker = "unk"
# 先に休憩入る？
line = "先に休憩入る？"

[[dialogue]]
speaker = "アルモタヘル"
# 「いや大丈夫だ……我はまだやれる……！　次の客よ、注文を告げるがいい」
line = "「いや大丈夫だ……我はまだやれる……！　次の客よ、注文を告げるがいい」"

[[dialogue]]
speaker = "マリーベル"
# 「ビーフ、チキン、マトン、ひとつずつ。全てスペシャルチリソースで。ドネルケバブも立派な串料理。研究は怠らないわ」
line = "「ビーフ、チキン、マトン、ひとつずつ。全てスペシャルチリソースで。ドネルケバブも立派な串料理。研究は怠らないわ」"

[[dialogue]]
speaker = "アルモタヘル"
# 「うむ、ミックスケバブ肉３０倍盛だな！」
line = "「うむ、ミックスケバブ肉３０倍盛だな！」"

[[dialogue]]
speaker = "ケバブ屋"
# 「うちにそんなメニューないよ！？」
line = "「うちにそんなメニューないよ！？」"

[[dialogue]]
speaker = "ナミエル"
# 「空腹のあまり混乱しておられるようですね……」
line = "「空腹のあまり混乱しておられるようですね……」"

[[dialogue]]
speaker = "アルモタヘル"
# 「すまぬ。かくなるうえは──来い！　メジェドたち！」
line = "「すまぬ。かくなるうえは──来い！　メジェドたち！」"

[[dialogue]]
speaker = "メジェド"
# 「………………」
line = "「………………」"

[[dialogue]]
speaker = "ナミエル"
# 「何か出てきました！？」
line = "「何か出てきました！？」"

[[dialogue]]
speaker = "マリーベル"
# 「モンスター？　なら全部串刺しにするけど」
line = "「モンスター？　なら全部串刺しにするけど」"

[[dialogue]]
speaker = "アルモタヘル"
# 「いいや、心配には及ばん。これらは我が眷属、人に危害を及ぼすことはない」
line = "「いいや、心配には及ばん。これらは我が眷属、人に危害を及ぼすことはない」"

[[dialogue]]
speaker = "アルモタヘル"
# 「情けないが、少しの間我の代わりに働いてもらおう。これも一応我の力だ」
line = "「情けないが、少しの間我の代わりに働いてもらおう。これも一応我の力だ」"

[[dialogue]]
speaker = "メジェド"
# 「………………」
line = "「………………」"

[[dialogue]]
speaker = "ナミエル"
# 「何も反応がありませんが……」
line = "「何も反応がありませんが……」"

[[dialogue]]
speaker = "アルモタヘル"
# 「しまった。メジェドたちは話すことができぬ。つまり接客は不可能だ。しかももうひとつ問題があってだな……」
line = "「しまった。メジェドたちは話すことができぬ。つまり接客は不可能だ。しかももうひとつ問題があってだな……」"

[[dialogue]]
speaker = "アルモタヘル"
# 「メジェドを出すと猛烈に腹が減るのだ」
line = "「メジェドを出すと猛烈に腹が減るのだ」"

[[dialogue]]
speaker = "アルモタヘル"
# 「──バタッ」
line = "「──バタッ」"

[[dialogue]]
speaker = "unk"
# アルモーーーっ！？
line = "アルモーーーっ！？"
