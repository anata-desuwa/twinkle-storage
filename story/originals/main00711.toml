[[dialogue]]
speaker = "unk"
# 第１１話,悩みの迷路,B
line = "第１１話,悩みの迷路,B"

[[dialogue]]
speaker = "ヴィーナス"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# ひとり待たされているヴィーナスは、外の景観を眺めつつ憂いにふけっていた。
line = "ひとり待たされているヴィーナスは、外の景観を眺めつつ憂いにふけっていた。"

[[dialogue]]
speaker = "ヴィーナス"
# （どうして私は……クロトじゃなきゃダメなんだろう……）
line = "（どうして私は……クロトじゃなきゃダメなんだろう……）"

[[dialogue]]
speaker = "フィオナ"
# 「でもそれって、解釈次第ではありますよね」
line = "「でもそれって、解釈次第ではありますよね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「え……？」
line = "「え……？」"

[[dialogue]]
speaker = "フィオナ"
# 「魔王の素質を目覚めさせる──という意味なら、例の御前試合の際に役目は一度終えているはずです」
line = "「魔王の素質を目覚めさせる──という意味なら、例の御前試合の際に役目は一度終えているはずです」"

[[dialogue]]
speaker = "フィオナ"
# 「そしてヴィーナスさんの立場からすれば──その後、彼に負けないよう己を高める、という道もありえたでしょう」
line = "「そしてヴィーナスさんの立場からすれば──その後、彼に負けないよう己を高める、という道もありえたでしょう」"

[[dialogue]]
speaker = "フィオナ"
# 「けれどヴィーナスさんは、最後まで緋宮会長につきっきりで鍛え上げるという選択をした……」
line = "「けれどヴィーナスさんは、最後まで緋宮会長につきっきりで鍛え上げるという選択をした……」"

[[dialogue]]
speaker = "フィオナ"
# 「その理由は一体、なぜなんでしょうね？」
line = "「その理由は一体、なぜなんでしょうね？」"

[[dialogue]]
speaker = "unk"
# ──あの時、ヴィーナスは自分でも気づいていなかった原初の意思を自覚した。
line = "──あの時、ヴィーナスは自分でも気づいていなかった原初の意思を自覚した。"

[[dialogue]]
speaker = "unk"
# 大事なことは日誌に従う──
line = "大事なことは日誌に従う──"

[[dialogue]]
speaker = "unk"
# 自分はそうやって生きてきたと思っていたが、どうも全てがそうではなかったかもしれない。
line = "自分はそうやって生きてきたと思っていたが、どうも全てがそうではなかったかもしれない。"

[[dialogue]]
speaker = "ヴィーナス"
# （九浄の家に着いた時──私はもう言葉も話せた。日誌も読めた）
line = "（九浄の家に着いた時──私はもう言葉も話せた。日誌も読めた）"

[[dialogue]]
speaker = "ヴィーナス"
# （だったら……クロトを鍛えようって思った決め手は、なんだったんだろ……？）
line = "（だったら……クロトを鍛えようって思った決め手は、なんだったんだろ……？）"

[[dialogue]]
speaker = "？？？"
# 「──お悩みのようだのう」
line = "「──お悩みのようだのう」"

[[dialogue]]
speaker = "ヴィーナス"
# 「──」
line = "「──」"

[[dialogue]]
speaker = "unk"
# 一瞬、目を伏せていたヴィーナスのもとに幼げな声がかけられる。
line = "一瞬、目を伏せていたヴィーナスのもとに幼げな声がかけられる。"

[[dialogue]]
speaker = "クラウディア"
# 「出口のない<ruby=おうのう>懊悩</ruby>ならば、余に打ち明けてみるとよい。人の子には及ばぬ知恵を、授けてやれるやもしれんぞ？」
line = "「出口のない<ruby>懊悩<rt>おうのう</rt></ruby>ならば、余に打ち明けてみるとよい。人の子には及ばぬ知恵を、授けてやれるやもしれんぞ？」"

[[dialogue]]
speaker = "unk"
# ヴィーナスが振り返ってみると、そこに立っていたのは──
line = "ヴィーナスが振り返ってみると、そこに立っていたのは──"

[[dialogue]]
speaker = "unk"
# 極めて異彩なオーラを放つ、一組の<b>魔女</b>だった。
line = "極めて異彩なオーラを放つ、一組の<b>魔女</b>だった。"
