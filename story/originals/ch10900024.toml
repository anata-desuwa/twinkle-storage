[[dialogue]]
speaker = "unk"
# 第４話,妹魔王の素直な気持ち,P
line = "第４話,妹魔王の素直な気持ち,P"

[[dialogue]]
speaker = "unk"
# 遊園地デートから少し経った、とある休日。
line = "遊園地デートから少し経った、とある休日。"

[[dialogue]]
speaker = "unk"
# その日は、メイプルが俺の家へと遊びに来ていたのだが――
line = "その日は、メイプルが俺の家へと遊びに来ていたのだが――"

[[dialogue]]
speaker = "メイプル"
# 「お兄ちゃん♪」
line = "「お兄ちゃん♪」"

[[dialogue]]
speaker = "メイプル"
# 「今日は１日、家に２人きりなんでしょ？　ってことは～」
line = "「今日は１日、家に２人きりなんでしょ？　ってことは～」"

[[dialogue]]
speaker = "メイプル"
# 「人目を気にせず、イチャイチャし放題だね♪　にへへへ<emoji=heart04>」
line = "「人目を気にせず、イチャイチャし放題だね♪　にへへへ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ソファーに２人で落ち着いて間もなく、メイプルは無防備に俺の腕へと抱き着いてくる。
line = "ソファーに２人で落ち着いて間もなく、メイプルは無防備に俺の腕へと抱き着いてくる。"

[[dialogue]]
speaker = "メイプル"
# 「じ～っ……」
line = "「じ～っ……」"

[[dialogue]]
speaker = "unk"
# と、メイプルが上目遣いで俺の顔を見つめてきて――
line = "と、メイプルが上目遣いで俺の顔を見つめてきて――"

[[dialogue]]
speaker = "メイプル"
# 「ねぇ、お兄ちゃん……もしかして、あたしにくっ付かれて、ドキドキしてくれてる？」
line = "「ねぇ、お兄ちゃん……もしかして、あたしにくっ付かれて、ドキドキしてくれてる？」"

[[dialogue]]
speaker = "unk"
# そ、それは……
line = "そ、それは……"

[[dialogue]]
speaker = "メイプル"
# 「あっ、その顔、やっぱりそうなんだ～？」
line = "「あっ、その顔、やっぱりそうなんだ～？」"

[[dialogue]]
speaker = "メイプル"
# 「にへへ<emoji=heart04> お兄ちゃんがあたしにドキドキしてくれてるの、嬉しい<emoji=heart04>」
line = "「にへへ<emoji=heart04> お兄ちゃんがあたしにドキドキしてくれてるの、嬉しい<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# えっ！？
line = "えっ！？"

[[dialogue]]
speaker = "unk"
# この前の遊園地もそうだが、てっきりメイプルは俺のことを『お兄ちゃん』と呼んで、兄妹ごっこの感覚で甘えているのだと思っていた。
line = "この前の遊園地もそうだが、てっきりメイプルは俺のことを『お兄ちゃん』と呼んで、兄妹ごっこの感覚で甘えているのだと思っていた。"

[[dialogue]]
speaker = "unk"
# でも、もしそうじゃないのだとしたら──
line = "でも、もしそうじゃないのだとしたら──"

[[dialogue]]
speaker = "unk"
# 俺が頭の中でモヤモヤと考えている内に、メイプルが隣でテレビをつけ始める。
line = "俺が頭の中でモヤモヤと考えている内に、メイプルが隣でテレビをつけ始める。"

[[dialogue]]
speaker = "unk"
# すると――
line = "すると――"

[[dialogue]]
speaker = "メイプル"
# 「あっ！　観て観て、お兄ちゃん！　紅明先輩が出てる！」
line = "「あっ！　観て観て、お兄ちゃん！　紅明先輩が出てる！」"

[[dialogue]]
speaker = "unk"
# テレビでは、流星市国を代表するタレントとして有名な紅明が、最近話題の観光スポットとして『リゾート結界』を紹介するという番組が放送されていた。
line = "テレビでは、流星市国を代表するタレントとして有名な紅明が、最近話題の観光スポットとして『リゾート結界』を紹介するという番組が放送されていた。"

[[dialogue]]
speaker = "メイプル"
# 「こうしてテレビ越しで観ると、紅明先輩って芸能人なんだな～って改めて実感するよね」
line = "「こうしてテレビ越しで観ると、紅明先輩って芸能人なんだな～って改めて実感するよね」"

[[dialogue]]
speaker = "メイプル"
# 「面白くて人気者で、すごく美人だし……む～っ」
line = "「面白くて人気者で、すごく美人だし……む～っ」"

[[dialogue]]
speaker = "メイプル"
# 「紅明先輩……お兄ちゃんのこと、ダーリンって呼ぶんだよね……」
line = "「紅明先輩……お兄ちゃんのこと、ダーリンって呼ぶんだよね……」"

[[dialogue]]
speaker = "unk"
# メイプル……？
line = "メイプル……？"

[[dialogue]]
speaker = "unk"
# そこで彼女を見やると、なにやら頬を可愛くぷく～っとむくれさせていた。
line = "そこで彼女を見やると、なにやら頬を可愛くぷく～っとむくれさせていた。"

[[dialogue]]
speaker = "メイプル"
# 「おっぱいだって、すごく大きいし……」
line = "「おっぱいだって、すごく大きいし……」"

[[dialogue]]
speaker = "unk"
# もしかして……紅明に焼き餅焼いてるの？
line = "もしかして……紅明に焼き餅焼いてるの？"

[[dialogue]]
speaker = "メイプル"
# 「……だって、お兄ちゃんと仲良さそうなんだもん」
line = "「……だって、お兄ちゃんと仲良さそうなんだもん」"

[[dialogue]]
speaker = "メイプル"
# 「あたしは胸、全然大きくならないし……」
line = "「あたしは胸、全然大きくならないし……」"

[[dialogue]]
speaker = "unk"
# ちょっとしゅんとなりながら、そんなことを言うメイプル。俺はそんなメイプルの頭に、そっと手を置いた。
line = "ちょっとしゅんとなりながら、そんなことを言うメイプル。俺はそんなメイプルの頭に、そっと手を置いた。"

[[dialogue]]
speaker = "メイプル"
# 「お兄ちゃん……？」
line = "「お兄ちゃん……？」"

[[dialogue]]
speaker = "unk"
# 俺は、メイプルが好きなんだ
line = "俺は、メイプルが好きなんだ"

[[dialogue]]
speaker = "unk"
# だから……胸の大きさなんて気にしない。
line = "だから……胸の大きさなんて気にしない。"

[[dialogue]]
speaker = "unk"
# くっつくとドキドキするのはメイプルだけだ。他の誰でもない、メイプルだけに好きだと思ってもらいたい。
line = "くっつくとドキドキするのはメイプルだけだ。他の誰でもない、メイプルだけに好きだと思ってもらいたい。"

[[dialogue]]
speaker = "unk"
# だけど、お兄ちゃんみたいだと思ってた男の人に、急にそんなことを言われたら、女の子は怖いと思う。
line = "だけど、お兄ちゃんみたいだと思ってた男の人に、急にそんなことを言われたら、女の子は怖いと思う。"

[[dialogue]]
speaker = "unk"
# だから今は、色々我慢してるだけなんだ。メイプルに、かっこいいお兄ちゃんで、かっこいい男の人だって、思われたかったから。
line = "だから今は、色々我慢してるだけなんだ。メイプルに、かっこいいお兄ちゃんで、かっこいい男の人だって、思われたかったから。"

[[dialogue]]
speaker = "メイプル"
# 「お兄ちゃん……」
line = "「お兄ちゃん……」"

[[dialogue]]
speaker = "メイプル"
# 「前にさ、あたしのこと妹じゃなくて、可愛い女の子だと思ってるって……言ってくれたでしょ？」
line = "「前にさ、あたしのこと妹じゃなくて、可愛い女の子だと思ってるって……言ってくれたでしょ？」"

[[dialogue]]
speaker = "メイプル"
# 「あれから、一緒に過ごす中で、あたしも……」
line = "「あれから、一緒に過ごす中で、あたしも……」"

[[dialogue]]
speaker = "メイプル"
# 「お兄ちゃんのこと、少しずつ男の人として意識、するようになってきた……というか」
line = "「お兄ちゃんのこと、少しずつ男の人として意識、するようになってきた……というか」"

[[dialogue]]
speaker = "メイプル"
# 「そ、それでね……機会があれば、改めてその話がしたいなって……ずっと、思ってたの」
line = "「そ、それでね……機会があれば、改めてその話がしたいなって……ずっと、思ってたの」"

[[dialogue]]
speaker = "メイプル"
# 「でも、いざ自分から言おうと思うと、なかなか言い出せなくて……」
line = "「でも、いざ自分から言おうと思うと、なかなか言い出せなくて……」"

[[dialogue]]
speaker = "メイプル"
# 「だから、クルセイダーフォームの『お兄ちゃんに甘えたい』効果が、気持ちの後押しになってくれたらって思って……」
line = "「だから、クルセイダーフォームの『お兄ちゃんに甘えたい』効果が、気持ちの後押しになってくれたらって思って……」"

[[dialogue]]
speaker = "メイプル"
# 「最近はお兄ちゃんの前でだけ、わざとずっとあの格好になってたんだ……」
line = "「最近はお兄ちゃんの前でだけ、わざとずっとあの格好になってたんだ……」"

[[dialogue]]
speaker = "unk"
# そこまで言ってから、彼女は１度、深呼吸をして――
line = "そこまで言ってから、彼女は１度、深呼吸をして――"

[[dialogue]]
speaker = "メイプル"
# 「……お兄ちゃん。あたしね――」
line = "「……お兄ちゃん。あたしね――」"

[[dialogue]]
speaker = "メイプル"
# 「お兄ちゃんのことが大好き」
line = "「お兄ちゃんのことが大好き」"

[[dialogue]]
speaker = "メイプル"
# 「だから……改めて、あたしの恋人になって欲しいです」
line = "「だから……改めて、あたしの恋人になって欲しいです」"

[[dialogue]]
speaker = "メイプル"
# 「……ダメ、かな？」
line = "「……ダメ、かな？」"

[[dialogue]]
speaker = "unk"
# そんなわけない。俺でよければ、喜んで
line = "そんなわけない。俺でよければ、喜んで"

[[dialogue]]
speaker = "メイプル"
# 「あ……！」
line = "「あ……！」"

[[dialogue]]
speaker = "メイプル"
# 「うんっ♪　ありがとう、お兄ちゃん<emoji=heart04>」
line = "「うんっ♪　ありがとう、お兄ちゃん<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
# 「にへへっ♪」
line = "「にへへっ♪」"

[[dialogue]]
speaker = "メイプル"
# 「ねぇ、お兄ちゃん……」
line = "「ねぇ、お兄ちゃん……」"

[[dialogue]]
speaker = "メイプル"
# 「その……これであたしたち、恋人同士になった、んだよね？」
line = "「その……これであたしたち、恋人同士になった、んだよね？」"

[[dialogue]]
speaker = "メイプル"
# 「それなら１つ、お願いごとしても、いいかな……？」
line = "「それなら１つ、お願いごとしても、いいかな……？」"

[[dialogue]]
speaker = "メイプル"
# 「えっと、あのぉ…………キス、とかさ。ダメかな？」
line = "「えっと、あのぉ…………キス、とかさ。ダメかな？」"

[[dialogue]]
speaker = "unk"
# き、キス！？
line = "き、キス！？"

[[dialogue]]
speaker = "メイプル"
# 「や、やっぱり、いきなり過ぎたかな！？　でも、この衣装のせいなのかもしれないんだけど――」
line = "「や、やっぱり、いきなり過ぎたかな！？　でも、この衣装のせいなのかもしれないんだけど――」"

[[dialogue]]
speaker = "メイプル"
# 「今、すごくお兄ちゃんに甘えたくて、我慢できなくなっちゃってて……<emoji=heart04>」
line = "「今、すごくお兄ちゃんに甘えたくて、我慢できなくなっちゃってて……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 顔を赤くして、もじもじしながらそんな風に言われてしまったら、断れるはずもなく。
line = "顔を赤くして、もじもじしながらそんな風に言われてしまったら、断れるはずもなく。"

[[dialogue]]
speaker = "unk"
# ……本当にしてもいい？
line = "……本当にしてもいい？"

[[dialogue]]
speaker = "メイプル"
# 「うんっ<emoji=heart04>」
line = "「うんっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺は彼女の両肩に手を置くと、ゆっくりと顔を近づけて――
line = "俺は彼女の両肩に手を置くと、ゆっくりと顔を近づけて――"

[[dialogue]]
speaker = "メイプル"
# 「んっ<emoji=heart04>　お兄ちゃん……<emoji=heart04>」
line = "「んっ<emoji=heart04>　お兄ちゃん……<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
# 「ちゅっ<emoji=heart04>」
line = "「ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そっとキスをした。
line = "そっとキスをした。"

[[dialogue]]
speaker = "メイプル"
# 「ん……<emoji=heart04>　ちゅっ、ちゅっ……<emoji=heart04>」
line = "「ん……<emoji=heart04>　ちゅっ、ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
# 「はあぁ……<emoji=heart04>」
line = "「はあぁ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 好きだ、メイプル
line = "好きだ、メイプル"

[[dialogue]]
speaker = "メイプル"
# 「あたしも、大好き……<emoji=heart04>　お兄ちゃん<emoji=heart04>」
line = "「あたしも、大好き……<emoji=heart04>　お兄ちゃん<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
# 「んっ<emoji=heart04>　……ちゅっ<emoji=heart04>」
line = "「んっ<emoji=heart04>　……ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# それからも俺たちは、初めて余韻がなかなか冷めやらなくて。
line = "それからも俺たちは、初めて余韻がなかなか冷めやらなくて。"

[[dialogue]]
speaker = "unk"
# どれだけ時間が経っているのかもわからなくなるくらい、夢中でキスを繰り返してしまうのだった――
line = "どれだけ時間が経っているのかもわからなくなるくらい、夢中でキスを繰り返してしまうのだった――"
