[[dialogue]]
speaker = "unk"
# 第８話,デネブの朝,B
line = "第８話,デネブの朝,B"

[[dialogue]]
speaker = "unk"
# 俺たちがデネブに来てから一夜が明けた。
line = "俺たちがデネブに来てから一夜が明けた。"

[[dialogue]]
speaker = "unk"
# 昨日食事を摂っていた共用スペースに行くと──
line = "昨日食事を摂っていた共用スペースに行くと──"

[[dialogue]]
speaker = "アポロ（大人）"
# 「お、魔王も起きてきたか」
line = "「お、魔王も起きてきたか」"

[[dialogue]]
speaker = "フィオナ"
# 「おはようございます。朝食、先に頂いていますよ」
line = "「おはようございます。朝食、先に頂いていますよ」"

[[dialogue]]
speaker = "クロト"
# 「ああ、おはよう。さすがフィオナ、こんな時でも早起きなんだな」
line = "「ああ、おはよう。さすがフィオナ、こんな時でも早起きなんだな」"

[[dialogue]]
speaker = "フィオナ"
# 「柔らかいベッドで休んだおかげで、目覚めが良かったので。リノさんのおかげで快適な夜でした」
line = "「柔らかいベッドで休んだおかげで、目覚めが良かったので。リノさんのおかげで快適な夜でした」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「魔王も食べるか？　朝食ならあたしが作るけど、簡単にトーストとベーコンエッグでいいよな？」
line = "「魔王も食べるか？　朝食ならあたしが作るけど、簡単にトーストとベーコンエッグでいいよな？」"

[[dialogue]]
speaker = "クロト"
# 「ああ、お願いするよ」
line = "「ああ、お願いするよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「おはよー！　たっぷり食べて、たっぷり寝て、すっかり体力回復したわ♪」
line = "「おはよー！　たっぷり食べて、たっぷり寝て、すっかり体力回復したわ♪」"

[[dialogue]]
speaker = "ナターシャ"
# 「おはよ。おや、もう朝ごはん食べてる人いるね」
line = "「おはよ。おや、もう朝ごはん食べてる人いるね」"

[[dialogue]]
speaker = "unk"
# 俺に続いて、ヴィーナスとナターシャが起きてくる。
line = "俺に続いて、ヴィーナスとナターシャが起きてくる。"

[[dialogue]]
speaker = "unk"
# そこにアポロが戻ってきた。
line = "そこにアポロが戻ってきた。"

[[dialogue]]
speaker = "アポロ（大人）"
# 「お待たせー。みんな起きてくると思って、人数分作ってきたぞ」
line = "「お待たせー。みんな起きてくると思って、人数分作ってきたぞ」"

[[dialogue]]
speaker = "クロト"
# 「ありがとう。それじゃ……いただきます」
line = "「ありがとう。それじゃ……いただきます」"

[[dialogue]]
speaker = "クロト"
# 「！　美味しい……！」
line = "「！　美味しい……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ん～♪　目玉焼きはトロリと半熟、ベーコンはカリカリ……完璧な焼き加減だわ！」
line = "「ん～♪　目玉焼きはトロリと半熟、ベーコンはカリカリ……完璧な焼き加減だわ！」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「そうだろうそうだろう。やっぱりベーコンはカリカリじゃないとな」
line = "「そうだろうそうだろう。やっぱりベーコンはカリカリじゃないとな」"

[[dialogue]]
speaker = "梨緒"
# 「……おはよう」
line = "「……おはよう」"

[[dialogue]]
speaker = "ラクシャ"
# 「ふわぁ……おはよー……まだ眠いや」
line = "「ふわぁ……おはよー……まだ眠いや」"

[[dialogue]]
speaker = "リノ"
# 「おはよー！　私が朝ご飯作ろうかと思ったけど、アポロちゃんに先を越されちゃったわね」
line = "「おはよー！　私が朝ご飯作ろうかと思ったけど、アポロちゃんに先を越されちゃったわね」"

[[dialogue]]
speaker = "unk"
# そこにみんな起きてきて、今秘密基地にいるメンバーが全員集合する。
line = "そこにみんな起きてきて、今秘密基地にいるメンバーが全員集合する。"

[[dialogue]]
speaker = "リノ"
# 「じゃあちょうどいいし、朝ご飯を食べながら今後の方針を話し合いましょうか」
line = "「じゃあちょうどいいし、朝ご飯を食べながら今後の方針を話し合いましょうか」"

[[dialogue]]
speaker = "クロト"
# 「うん、それじゃまず俺から」
line = "「うん、それじゃまず俺から」"

[[dialogue]]
speaker = "クロト"
# 「デネブを説得して共にリクリエと戦う……それがアルタイルの方針だ。だけどそのためにはルヴィネを説得しないといけない」
line = "「デネブを説得して共にリクリエと戦う……それがアルタイルの方針だ。だけどそのためにはルヴィネを説得しないといけない」"

[[dialogue]]
speaker = "クロト"
# 「でもルヴィネについては怪しい点も多い。彼女がリクリエの側なのか、調べる必要があるだろう」
line = "「でもルヴィネについては怪しい点も多い。彼女がリクリエの側なのか、調べる必要があるだろう」"

[[dialogue]]
speaker = "unk"
# デネブとアルタイルの違いを掘り下げていくと、結局ルヴィネの存在に行きつく。
line = "デネブとアルタイルの違いを掘り下げていくと、結局ルヴィネの存在に行きつく。"

[[dialogue]]
speaker = "unk"
# 彼女が何者であれ、謎を解く鍵を握っているのは間違いないだろう。
line = "彼女が何者であれ、謎を解く鍵を握っているのは間違いないだろう。"

[[dialogue]]
speaker = "クロト"
# 「それにアルタイルに帰る方法を見つけないといけない。このままデネブに滞在し続けるわけにはいかないし」
line = "「それにアルタイルに帰る方法を見つけないといけない。このままデネブに滞在し続けるわけにはいかないし」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「空間の魔女の力でどうにかできないのか？」
line = "「空間の魔女の力でどうにかできないのか？」"

[[dialogue]]
speaker = "リノ"
# 「残念ながら、私だけではそこまでの力はないわね。魔王ラクシスの力でなければ平行世界の移動は不可能よ」
line = "「残念ながら、私だけではそこまでの力はないわね。魔王ラクシスの力でなければ平行世界の移動は不可能よ」"

[[dialogue]]
speaker = "ナターシャ"
# 「チナがアルタイルに来るのに転送装置を使っていたけど、その装置は壊しちゃったからねー」
line = "「チナがアルタイルに来るのに転送装置を使っていたけど、その装置は壊しちゃったからねー」"

[[dialogue]]
speaker = "リノ"
# 「でも心当たりがなくはないわ。ちょっと調整してみるから、目途が立ったらまた知らせるわね」
line = "「でも心当たりがなくはないわ。ちょっと調整してみるから、目途が立ったらまた知らせるわね」"

[[dialogue]]
speaker = "クロト"
# 「うん、わかった」
line = "「うん、わかった」"

[[dialogue]]
speaker = "梨緒"
# 「それと、行方の分からないベアトを探したい。彼女がスパイであるなら、こちらで捕縛しなければいけない」
line = "「それと、行方の分からないベアトを探したい。彼女がスパイであるなら、こちらで捕縛しなければいけない」"

[[dialogue]]
speaker = "梨緒"
# 「それに……もう一度彼女と話がしたい」
line = "「それに……もう一度彼女と話がしたい」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「確かにそれも必要だ。──だが我々レジスタンスには、至急解決しなければいけない問題がある！」
line = "「確かにそれも必要だ。──だが我々レジスタンスには、至急解決しなければいけない問題がある！」"

[[dialogue]]
speaker = "フィオナ"
# 「至急の問題！？　何ですか姉さん！？」
line = "「至急の問題！？　何ですか姉さん！？」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「食料だ。今まで２人だったところに、一気に人が増えたもんだから、備蓄をかなり使ってしまった」
line = "「食料だ。今まで２人だったところに、一気に人が増えたもんだから、備蓄をかなり使ってしまった」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「バックアップメンバーからの補給までまだしばらくあるし、調達が必要だ」
line = "「バックアップメンバーからの補給までまだしばらくあるし、調達が必要だ」"

[[dialogue]]
speaker = "フィオナ"
# 「あぁ、なるほど……それは確かに至急解決が必要ですね……ごめんなさい」
line = "「あぁ、なるほど……それは確かに至急解決が必要ですね……ごめんなさい」"

[[dialogue]]
speaker = "ナターシャ"
# 「ふむふむ……急を要しそうなのは、ベアトの捜索と、物資の買い出しかな。じゃあ分担だね」
line = "「ふむふむ……急を要しそうなのは、ベアトの捜索と、物資の買い出しかな。じゃあ分担だね」"

[[dialogue]]
speaker = "梨緒"
# 「ベアトを探すのは選管が担当する。私たちにはその責任がある」
line = "「ベアトを探すのは選管が担当する。私たちにはその責任がある」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「それならあたしもついていく。戦闘になる可能性もあるし、いざという時逃げるにも、土地勘のあるあたしがいた方がいい」
line = "「それならあたしもついていく。戦闘になる可能性もあるし、いざという時逃げるにも、土地勘のあるあたしがいた方がいい」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「というわけで、買い出しは誰かに頼みたいんだが……」
line = "「というわけで、買い出しは誰かに頼みたいんだが……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「はいはーい！　私行きたーい！　昨日はそれどころじゃなかったし、デネブの街を見てみたいわ！」
line = "「はいはーい！　私行きたーい！　昨日はそれどころじゃなかったし、デネブの街を見てみたいわ！」"

[[dialogue]]
speaker = "クロト"
# 「でもいいのか？　俺たちが街に出たらまた見つかるかもしれない」
line = "「でもいいのか？　俺たちが街に出たらまた見つかるかもしれない」"

[[dialogue]]
speaker = "リノ"
# 「そこは擬装用の魔法があるから大丈夫よ。よほどのことがないとバレないわ」
line = "「そこは擬装用の魔法があるから大丈夫よ。よほどのことがないとバレないわ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「さすがおばあちゃん、抜かりないわね！」
line = "「さすがおばあちゃん、抜かりないわね！」"

[[dialogue]]
speaker = "クロト"
# 「じゃあ俺もヴィーナスと一緒に行くよ。俺もデネブが今どうなってるか見たい」
line = "「じゃあ俺もヴィーナスと一緒に行くよ。俺もデネブが今どうなってるか見たい」"

[[dialogue]]
speaker = "クロト"
# 「それにヴィーナスだけだと心配だし……」
line = "「それにヴィーナスだけだと心配だし……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ちょっと！　私迷子になったりなんかしないわよ！」
line = "「ちょっと！　私迷子になったりなんかしないわよ！」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「はは、違いない。娘の面倒はパパに見てもらわないとな」
line = "「はは、違いない。娘の面倒はパパに見てもらわないとな」"

[[dialogue]]
speaker = "リノ"
# 「じゃあこれを渡しておくわね。決済用のＤＩＳＣ。買い物の時はこれで会計してね」
line = "「じゃあこれを渡しておくわね。決済用のＤＩＳＣ。買い物の時はこれで会計してね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ありがとう、使わせてもらうわね。でも今更だけど、レジスタンスの活動資金ってどうなってるの？」
line = "「ありがとう、使わせてもらうわね。でも今更だけど、レジスタンスの活動資金ってどうなってるの？」"

[[dialogue]]
speaker = "リノ"
# 「バックアップメンバーが用意してくれた仮想通貨を換金して使っているの。無駄遣いはできないけど、あんまりケチケチする必要はないわ」
line = "「バックアップメンバーが用意してくれた仮想通貨を換金して使っているの。無駄遣いはできないけど、あんまりケチケチする必要はないわ」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「ちなみに支払用のＤＩＳＣにも特殊な処理がしてあるから、足が付くことはない。安心して使ってくれ」
line = "「ちなみに支払用のＤＩＳＣにも特殊な処理がしてあるから、足が付くことはない。安心して使ってくれ」"

[[dialogue]]
speaker = "unk"
# おそらく、よほど高度なハッキング技術を持つ者がバックアップにいるんだろう。
line = "おそらく、よほど高度なハッキング技術を持つ者がバックアップにいるんだろう。"

[[dialogue]]
speaker = "unk"
# 星騎士の関係者で、そんなことができるのは……
line = "星騎士の関係者で、そんなことができるのは……"

[[dialogue]]
speaker = "アポロ（大人）"
# 「まぁ、だいたい想像の通りだ。だけど名前は言うなよ？」
line = "「まぁ、だいたい想像の通りだ。だけど名前は言うなよ？」"

[[dialogue]]
speaker = "unk"
# 俺の表情を読んだのか、アポロがニヤリと笑いながら釘を刺す。
line = "俺の表情を読んだのか、アポロがニヤリと笑いながら釘を刺す。"

[[dialogue]]
speaker = "unk"
# <ruby=ジャスティスウィザード>あの人</ruby>が生きていて、俺たちの味方をしてくれるのなら、本当に心強い。
line = "<ruby>あの人<rt>ジャスティスウィザード</rt></ruby>が生きていて、俺たちの味方をしてくれるのなら、本当に心強い。"

[[dialogue]]
speaker = "リノ"
# 「ついていきたいのはやまやまだけど、秘密基地を空けるわけにはいかないのよね……。チャカパラ神の資料も探さないといけないし、私はお留守番するわ」
line = "「ついていきたいのはやまやまだけど、秘密基地を空けるわけにはいかないのよね……。チャカパラ神の資料も探さないといけないし、私はお留守番するわ」"

[[dialogue]]
speaker = "フィオナ"
# 「すみません、私も残らせてください。アルケインコードの反動でまだ魔王因子が機能していないので、一旦回復を優先させたいです」
line = "「すみません、私も残らせてください。アルケインコードの反動でまだ魔王因子が機能していないので、一旦回復を優先させたいです」"

[[dialogue]]
speaker = "ラクシャ"
# 「んじゃボクも。デネブに帰ってくるときに無茶しちゃったから、本調子に程遠くてね～」
line = "「んじゃボクも。デネブに帰ってくるときに無茶しちゃったから、本調子に程遠くてね～」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「よし、決まりだな」
line = "「よし、決まりだな」"

[[dialogue]]
speaker = "unk"
# ベアトリスの捜索が、梨緒、ナターシャ、アポロ。
line = "ベアトリスの捜索が、梨緒、ナターシャ、アポロ。"

[[dialogue]]
speaker = "unk"
# 買い出しの担当が、俺とヴィーナス。
line = "買い出しの担当が、俺とヴィーナス。"

[[dialogue]]
speaker = "unk"
# 秘密基地に残るのが、母さん、フィオナ、ラクシャ。
line = "秘密基地に残るのが、母さん、フィオナ、ラクシャ。"

[[dialogue]]
speaker = "unk"
# それぞれに分かれて、行動することになったのだった。
line = "それぞれに分かれて、行動することになったのだった。"
