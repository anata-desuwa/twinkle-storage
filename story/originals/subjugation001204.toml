[[dialogue]]
speaker = "unk"
# 数日後──俺はライブの練習場所であるトレーニング施設へと向かった。
line = "数日後──俺はライブの練習場所であるトレーニング施設へと向かった。"

[[dialogue]]
speaker = "unk"
# ヘレナちゃん謹製の人工戦闘服のお披露目をしてくれるのだそう──とても楽しみだ。
line = "ヘレナちゃん謹製の人工戦闘服のお披露目をしてくれるのだそう──とても楽しみだ。"

[[dialogue]]
speaker = "ヴィーナス"
# 「待たせたわね、クロト！　ようやくメルエルの着替えが終わったわ！」
line = "「待たせたわね、クロト！　ようやくメルエルの着替えが終わったわ！」"

[[dialogue]]
speaker = "レミカ"
# 「本人は恥ずかしがってるけど、めちゃくちゃ可愛いよ。期待してて」
line = "「本人は恥ずかしがってるけど、めちゃくちゃ可愛いよ。期待してて」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それじゃあメルエル～！　出てきなさい！」
line = "「それじゃあメルエル～！　出てきなさい！」"

[[dialogue]]
speaker = "メルエル"
# 「え、えへへっ……どうかな会長くんっ……へ、変じゃない……？」
line = "「え、えへへっ……どうかな会長くんっ……へ、変じゃない……？」"

[[dialogue]]
speaker = "unk"
# すごく似合ってる！
line = "すごく似合ってる！"

[[dialogue]]
speaker = "メルエル"
# 「そ、そうっ？　よかったぁ～っ……アイドル衣装、とっても可愛いから不安だったんだ……！」
line = "「そ、そうっ？　よかったぁ～っ……アイドル衣装、とっても可愛いから不安だったんだ……！」"

[[dialogue]]
speaker = "unk"
# めちゃくちゃ可愛いよ！　自信持って！
line = "めちゃくちゃ可愛いよ！　自信持って！"

[[dialogue]]
speaker = "メルエル"
# 「あ、ありがとう会長くんっ……え、えへへ～っ<emoji=heart04>」
line = "「あ、ありがとう会長くんっ……え、えへへ～っ<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
# 「流石はヘレナちゃんの作った服。サイズもばっちりね！」
line = "「流石はヘレナちゃんの作った服。サイズもばっちりね！」"

[[dialogue]]
speaker = "レミカ"
# 「うん。よく似合ってるよ。これは私も負けていられないかな」
line = "「うん。よく似合ってるよ。これは私も負けていられないかな」"

[[dialogue]]
speaker = "メルエル"
# 「あ、そうだよっ。１人だけアイドル衣装も恥ずかしいし、レミカちゃんもお着替えして欲しいな……！」
line = "「あ、そうだよっ。１人だけアイドル衣装も恥ずかしいし、レミカちゃんもお着替えして欲しいな……！」"

[[dialogue]]
speaker = "レミカ"
# 「オッケー。じゃあパパっとここで着替えちゃうね」
line = "「オッケー。じゃあパパっとここで着替えちゃうね」"

[[dialogue]]
speaker = "メルエル"
# 「そんな、ダメだよっ！？　会長くんもいるんだし、隣のお部屋で──」
line = "「そんな、ダメだよっ！？　会長くんもいるんだし、隣のお部屋で──」"

[[dialogue]]
speaker = "ヴィーナス"
# 「心配ご無用よ！　アイドル衣装は人工戦闘服。レミカはもうコツを掴んでるの！」
line = "「心配ご無用よ！　アイドル衣装は人工戦闘服。レミカはもうコツを掴んでるの！」"

[[dialogue]]
speaker = "レミカ"
# 「そういうこと。それじゃあ行くよ！　愛戸レミカ──キュートスタイルッ！」
line = "「そういうこと。それじゃあ行くよ！　愛戸レミカ──キュートスタイルッ！」"

[[dialogue]]
speaker = "レミカ"
# 「──と、私の衣装はこんな感じ。どうかな、会長」
line = "「──と、私の衣装はこんな感じ。どうかな、会長」"

[[dialogue]]
speaker = "unk"
# 普段と印象が全然違うよ！
line = "普段と印象が全然違うよ！"

[[dialogue]]
speaker = "unk"
# レミカも可愛いね……！
line = "レミカも可愛いね……！"

[[dialogue]]
speaker = "レミカ"
# 「ふふ、ありがと。自分でもかなり気に入ってるんだ、この衣装」
line = "「ふふ、ありがと。自分でもかなり気に入ってるんだ、この衣装」"

[[dialogue]]
speaker = "メルエル"
# 「すっごく可愛い～っ♪　普段のクールビューティな感じもいいけど、こっちもすごく素敵だよ！」
line = "「すっごく可愛い～っ♪　普段のクールビューティな感じもいいけど、こっちもすごく素敵だよ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「２人が並ぶと可愛さも抜群ね！　これはもうライブの成功、間違いなし！」
line = "「２人が並ぶと可愛さも抜群ね！　これはもうライブの成功、間違いなし！」"

[[dialogue]]
speaker = "レミカ"
# 「それはちょっと気が早いよ。でも……うん。こうやってライブ衣装を着ると気も引き締まるね。ワクワクしてきた」
line = "「それはちょっと気が早いよ。でも……うん。こうやってライブ衣装を着ると気も引き締まるね。ワクワクしてきた」"

[[dialogue]]
speaker = "unk"
# レミカはもう変身できるんだ
line = "レミカはもう変身できるんだ"

[[dialogue]]
speaker = "レミカ"
# 「うん。ヘレナさんから衣装を貰った時、精神的なアプローチがないと、戦闘服としての覚醒は難しいって聞いてたんだけど」
line = "「うん。ヘレナさんから衣装を貰った時、精神的なアプローチがないと、戦闘服としての覚醒は難しいって聞いてたんだけど」"

[[dialogue]]
speaker = "レミカ"
# 「試着で袖を通した時から、すぐに馴染んだんだ。即日にフォーム起動できるようになったよ」
line = "「試着で袖を通した時から、すぐに馴染んだんだ。即日にフォーム起動できるようになったよ」"

[[dialogue]]
speaker = "メルエル"
# 「す、すごいっ……これがワールドクラスのアイドルの実力ってことなのかな！？」
line = "「す、すごいっ……これがワールドクラスのアイドルの実力ってことなのかな！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「前々から、カワイイ系のアイドルになりたいってずっと言ってたもの。念願が叶ったんだもの、当然かもね」
line = "「前々から、カワイイ系のアイドルになりたいってずっと言ってたもの。念願が叶ったんだもの、当然かもね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「──でも油断は禁物よ！　アイドルは１日にして成らず！　私とクロトのトレーニングは厳しいわよ！　覚悟することね！」
line = "「──でも油断は禁物よ！　アイドルは１日にして成らず！　私とクロトのトレーニングは厳しいわよ！　覚悟することね！」"

[[dialogue]]
speaker = "メルエル"
# 「は、はいっ！」
line = "「は、はいっ！」"

[[dialogue]]
speaker = "unk"
# ヴィーナスはコーチの経験はあるの？
line = "ヴィーナスはコーチの経験はあるの？"

[[dialogue]]
speaker = "unk"
# 俺は芸能事務所でバイトしたことあるけど
line = "俺は芸能事務所でバイトしたことあるけど"

[[dialogue]]
speaker = "ヴィーナス"
# 「ないわよ？　でもアイドルアニメはたくさん見てるし、レミカの練習も見学してたもの！　きっといいアドバイスができると思うわ♪」
line = "「ないわよ？　でもアイドルアニメはたくさん見てるし、レミカの練習も見学してたもの！　きっといいアドバイスができると思うわ♪」"

[[dialogue]]
speaker = "unk"
# 今さらだけどコーチ、俺たちで大丈夫？
line = "今さらだけどコーチ、俺たちで大丈夫？"

[[dialogue]]
speaker = "unk"
# そんな簡単にいくかなあ……
line = "そんな簡単にいくかなあ……"

[[dialogue]]
speaker = "レミカ"
# 「もちろん。会長は現場での経験があるし、ヴィーナスは勘がいいでしょ。何にも考えてなさそうなのに、常に正解を当てそうって言うか」
line = "「もちろん。会長は現場での経験があるし、ヴィーナスは勘がいいでしょ。何にも考えてなさそうなのに、常に正解を当てそうって言うか」"

[[dialogue]]
speaker = "ヴィーナス"
# 「褒められてるのかしら……？」
line = "「褒められてるのかしら……？」"

[[dialogue]]
speaker = "メルエル"
# 「会長くんとヴィーナスちゃんがコーチしてくれるのは、私も嬉しいかな……！」
line = "「会長くんとヴィーナスちゃんがコーチしてくれるのは、私も嬉しいかな……！」"

[[dialogue]]
speaker = "メルエル"
# 「この数日、レミカちゃんから貰ったＣＤで予習はしてきてるから。体力も自信あるし、びしばしお願いします！」
line = "「この数日、レミカちゃんから貰ったＣＤで予習はしてきてるから。体力も自信あるし、びしばしお願いします！」"

[[dialogue]]
speaker = "unk"
# それじゃあ１曲目、通してみようか！
line = "それじゃあ１曲目、通してみようか！"

[[dialogue]]
speaker = "unk"
# ──よし！
line = "──よし！"

[[dialogue]]
speaker = "レミカ"
# 「いきなり通しか……まあ本番まで時間もないしね。メルエル、ミスは気にしないでいいから。お互いの呼吸を合わせるところから始めよっか」
line = "「いきなり通しか……まあ本番まで時間もないしね。メルエル、ミスは気にしないでいいから。お互いの呼吸を合わせるところから始めよっか」"

[[dialogue]]
speaker = "メルエル"
# 「うん、わかった。じゃあ配置につきますっ！」
line = "「うん、わかった。じゃあ配置につきますっ！」"

[[dialogue]]
speaker = "unk"
# ──トレーニング施設の開けた場所に並ぶ、メルエルとレミカ。２人の表情は真剣そのものだ。
line = "──トレーニング施設の開けた場所に並ぶ、メルエルとレミカ。２人の表情は真剣そのものだ。"

[[dialogue]]
speaker = "ヴィーナス"
# 「それじゃあミュージックいくわよっ！　ふっふーん、気になるところがあったらガンガン指摘しちゃうんだから！」
line = "「それじゃあミュージックいくわよっ！　ふっふーん、気になるところがあったらガンガン指摘しちゃうんだから！」"

[[dialogue]]
speaker = "メルエル"
# 「う、うんっ！　お願いします！」
line = "「う、うんっ！　お願いします！」"

[[dialogue]]
speaker = "レミカ"
# 「──いつでもいいよ。準備はパーフェクトだから」
line = "「──いつでもいいよ。準備はパーフェクトだから」"

[[dialogue]]
speaker = "unk"
# こうして……彼女たちのアイドル訓練は始まった。
line = "こうして……彼女たちのアイドル訓練は始まった。"

[[dialogue]]
speaker = "unk"
# 練習はきっと途方もなく大変だろう。けれど俺もできる限り、フォローしていこうと思うのだった──
line = "練習はきっと途方もなく大変だろう。けれど俺もできる限り、フォローしていこうと思うのだった──"
