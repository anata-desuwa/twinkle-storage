[[dialogue]]
speaker = "unk"
# 第１０話,サーシャ先輩,B
line = "第１０話,サーシャ先輩,B"

[[dialogue]]
speaker = "マトイ"
# 「──ふぅ」
line = "「──ふぅ」"

[[dialogue]]
speaker = "クロト"
# 「なんとかなったか……？」
line = "「なんとかなったか……？」"

[[dialogue]]
speaker = "unk"
# 昨日よりも明らかに手強い相手だったが、なんとか２人のサポートもあってスムーズに倒せた。
line = "昨日よりも明らかに手強い相手だったが、なんとか２人のサポートもあってスムーズに倒せた。"

[[dialogue]]
speaker = "unk"
# これなら、目標タイムにも到達しているんじゃないか……？
line = "これなら、目標タイムにも到達しているんじゃないか……？"

[[dialogue]]
speaker = "unk"
# 計測結果『01:12.04』
line = "計測結果『01:12.04』"

[[dialogue]]
speaker = "アナ"
# 「１２秒オーバーでした」
line = "「１２秒オーバーでした」"

[[dialogue]]
speaker = "マトイ"
# 「ああっ惜しい！」
line = "「ああっ惜しい！」"

[[dialogue]]
speaker = "アナ"
# 「ですが、次期会長はよく戦えていました。コツは掴めたのではないかと」
line = "「ですが、次期会長はよく戦えていました。コツは掴めたのではないかと」"

[[dialogue]]
speaker = "クロト"
# 「そうだな。２人が弱点を教えてくれたおかげもあったけど」
line = "「そうだな。２人が弱点を教えてくれたおかげもあったけど」"

[[dialogue]]
speaker = "unk"
# 最終的には俺ひとりの力で一分を切らなければ、トレーニングのスタートラインにすら立てないんだものな。頑張るしかない。
line = "最終的には俺ひとりの力で一分を切らなければ、トレーニングのスタートラインにすら立てないんだものな。頑張るしかない。"

[[dialogue]]
speaker = "マトイ"
# 「ていうか……緋宮くんは武器をまったく使わないんだ。珍しい」
line = "「ていうか……緋宮くんは武器をまったく使わないんだ。珍しい」"

[[dialogue]]
speaker = "クロト"
# 「ん……そうか。確かにみんなは戦闘用の得物を持ってるな」
line = "「ん……そうか。確かにみんなは戦闘用の得物を持ってるな」"

[[dialogue]]
speaker = "アナ"
# 「どんなアイテムを持つかは<ruby=スターナイト>星騎士</ruby>次第。思い入れのある物のほうが、星力を宿すにも効率がよくなります」
line = "「どんなアイテムを持つかは<ruby>星騎士<rt>スターナイト</rt></ruby>次第。思い入れのある物のほうが、星力を宿すにも効率がよくなります」"

[[dialogue]]
speaker = "unk"
# 道ばたでモンスターと遭遇して偶発的に戦闘……
line = "道ばたでモンスターと遭遇して偶発的に戦闘……"

[[dialogue]]
speaker = "unk"
# という野試合を繰り返してきたために、武器を持つという発想はこれまでになかった。
line = "という野試合を繰り返してきたために、武器を持つという発想はこれまでになかった。"

[[dialogue]]
speaker = "unk"
# ただ、特に不便でないのならわざわざ開発する必要もないとアナが言う。
line = "ただ、特に不便でないのならわざわざ開発する必要もないとアナが言う。"

[[dialogue]]
speaker = "クロト"
# 「しかし……こうやって３人で戦ってると、転入初日の朝を思い出すな」
line = "「しかし……こうやって３人で戦ってると、転入初日の朝を思い出すな」"

[[dialogue]]
speaker = "マトイ"
# 「そういえば……あの時はこんなことになるなんて思わなかったけど」
line = "「そういえば……あの時はこんなことになるなんて思わなかったけど」"

[[dialogue]]
speaker = "unk"
# 新星学園初の登校日。
line = "新星学園初の登校日。"

[[dialogue]]
speaker = "unk"
# 街中にモンスターが現れるや、彼女たちが助けに来てくれたこと。
line = "街中にモンスターが現れるや、彼女たちが助けに来てくれたこと。"

[[dialogue]]
speaker = "unk"
# 星徒会メンバーである彼女たちは、ああして多くの戦闘を経験してきたのだろう。
line = "星徒会メンバーである彼女たちは、ああして多くの戦闘を経験してきたのだろう。"

[[dialogue]]
speaker = "クロト"
# 「（そう言えば、あの時はもう１人……）」
line = "「（そう言えば、あの時はもう１人……）」"

[[dialogue]]
speaker = "サーシャ"
# 「みんな～、やってる～？」
line = "「みんな～、やってる～？」"

[[dialogue]]
speaker = "マトイ"
# 「あ……サーシャさん」
line = "「あ……サーシャさん」"

[[dialogue]]
speaker = "unk"
# 噂をすればだ。
line = "噂をすればだ。"

[[dialogue]]
speaker = "unk"
# 昨日も星徒会室にいた、妖艶な雰囲気の人が、のれんをくぐるようなノリでホールへ入ってきた。
line = "昨日も星徒会室にいた、妖艶な雰囲気の人が、のれんをくぐるようなノリでホールへ入ってきた。"

[[dialogue]]
speaker = "サーシャ"
# 「奏サーシャ。３年生よ～。よろしくね、クロトくん♪」
line = "「奏サーシャ。３年生よ～。よろしくね、クロトくん♪」"

[[dialogue]]
speaker = "クロト"
# 「あ──はい。緋宮クロトです」
line = "「あ──はい。緋宮クロトです」"

[[dialogue]]
speaker = "マトイ"
# 「サーシャさんは星徒会の会計で、魔族の先輩なの」
line = "「サーシャさんは星徒会の会計で、魔族の先輩なの」"

[[dialogue]]
speaker = "unk"
# くるりと伸びた巻き角に目を見やる。
line = "くるりと伸びた巻き角に目を見やる。"

[[dialogue]]
speaker = "unk"
# アナも含めると天使に魔族、そして俺たち人間も一堂に会している……
line = "アナも含めると天使に魔族、そして俺たち人間も一堂に会している……"

[[dialogue]]
speaker = "unk"
# こんな光景は、新星学園じゃなきゃ考えられないことだった。
line = "こんな光景は、新星学園じゃなきゃ考えられないことだった。"

[[dialogue]]
speaker = "サーシャ"
# 「それでそれで、何してたの～？　ヴィーナスちゃんに随分な無茶振りされてたけど～」
line = "「それでそれで、何してたの～？　ヴィーナスちゃんに随分な無茶振りされてたけど～」"

[[dialogue]]
speaker = "アナ"
# 「かくかくしかじか。その無茶振りに応えるために頑張っていました」
line = "「かくかくしかじか。その無茶振りに応えるために頑張っていました」"

[[dialogue]]
speaker = "サーシャ"
# 「ほえーなるほど……」
line = "「ほえーなるほど……」"

[[dialogue]]
speaker = "マトイ"
# 「ちゃんと聞いてます？」
line = "「ちゃんと聞いてます？」"

[[dialogue]]
speaker = "unk"
# 魔族の先輩──サーシャさんは、アナの話をこくこく頷きながら聞いていた。
line = "魔族の先輩──サーシャさんは、アナの話をこくこく頷きながら聞いていた。"

[[dialogue]]
speaker = "unk"
# どこかポヤポヤした様子で、独特の穏やかさを感じさせる。
line = "どこかポヤポヤした様子で、独特の穏やかさを感じさせる。"

[[dialogue]]
speaker = "サーシャ"
# 「あ、トレーニング用モンスター！　懐かしい～昔は使ってたな」
line = "「あ、トレーニング用モンスター！　懐かしい～昔は使ってたな」"

[[dialogue]]
speaker = "サーシャ"
# 「ねーねーアナちゃん、わたしも測ってみていい～？」
line = "「ねーねーアナちゃん、わたしも測ってみていい～？」"

[[dialogue]]
speaker = "アナ"
# 「一回だけですよ」
line = "「一回だけですよ」"

[[dialogue]]
speaker = "unk"
# サーシャさんは軽くはしゃぎながら、展開されたフィールドに入った。
line = "サーシャさんは軽くはしゃぎながら、展開されたフィールドに入った。"

[[dialogue]]
speaker = "unk"
# 慣れた様子だ。
line = "慣れた様子だ。"

[[dialogue]]
speaker = "サーシャ"
# 「先輩として、かっこいいとこ見せちゃおっかな～♪」
line = "「先輩として、かっこいいとこ見せちゃおっかな～♪」"

[[dialogue]]
speaker = "ダークキングフワッチ"
# 「イイイイイ！」
line = "「イイイイイ！」"

[[dialogue]]
speaker = "unk"
# 変身したサーシャ先輩の前に、モンスターが出現──
line = "変身したサーシャ先輩の前に、モンスターが出現──"

[[dialogue]]
speaker = "クロト"
# 「──ってなんだアレ！？」
line = "「──ってなんだアレ！？」"

[[dialogue]]
speaker = "マトイ"
# 「あー！　サーシャさん、勝手にＳランクに設定してる……！」
line = "「あー！　サーシャさん、勝手にＳランクに設定してる……！」"

[[dialogue]]
speaker = "クロト"
# 「それって平気なのか……！？」
line = "「それって平気なのか……！？」"

[[dialogue]]
speaker = "サーシャ"
# 「えーいっ♪」
line = "「えーいっ♪」"

[[dialogue]]
speaker = "unk"
# ──と危惧する間もなく、サーシャ先輩は一方的にモンスターへ氷撃を浴びせた。
line = "──と危惧する間もなく、サーシャ先輩は一方的にモンスターへ氷撃を浴びせた。"

[[dialogue]]
speaker = "unk"
# そのまま、戦闘は軽やかに進んでいき……
line = "そのまま、戦闘は軽やかに進んでいき……"

[[dialogue]]
speaker = "アナ"
# 「終わったようですね」
line = "「終わったようですね」"

[[dialogue]]
speaker = "クロト"
# 「い……１分２秒！？」
line = "「い……１分２秒！？」"

[[dialogue]]
speaker = "サーシャ"
# 「あら……１分切れるかと思ったのだけど。ふふ、でも参考になったかしら？」
line = "「あら……１分切れるかと思ったのだけど。ふふ、でも参考になったかしら？」"

[[dialogue]]
speaker = "unk"
# 変身を解いて制服に戻るサーシャ先輩。
line = "変身を解いて制服に戻るサーシャ先輩。"

[[dialogue]]
speaker = "unk"
# 今、彼女があっさり倒したモンスターはＳランク──
line = "今、彼女があっさり倒したモンスターはＳランク──"

[[dialogue]]
speaker = "unk"
# 伝え聞いていたヴィーナスの評価に迫るほどの強さだ。
line = "伝え聞いていたヴィーナスの評価に迫るほどの強さだ。"

[[dialogue]]
speaker = "クロト"
# 「……驚きました。とんでもないですね」
line = "「……驚きました。とんでもないですね」"

[[dialogue]]
speaker = "マトイ"
# 「サーシャさんは会長が会長になる前の会長だもの」
line = "「サーシャさんは会長が会長になる前の会長だもの」"

[[dialogue]]
speaker = "クロト"
# 「か、会長が快調に開帳！？」
line = "「か、会長が快調に開帳！？」"

[[dialogue]]
speaker = "アナ"
# 「ヴィーナス現会長の前任、ですね」
line = "「ヴィーナス現会長の前任、ですね」"

[[dialogue]]
speaker = "サーシャ"
# 「そんなこともあったような～。なかったような～？」
line = "「そんなこともあったような～。なかったような～？」"

[[dialogue]]
speaker = "サーシャ"
# 「でもでもクロトくん。出力ばかり気にしてちゃダメよ～、星力は扱い方も大事なんだから～」
line = "「でもでもクロトくん。出力ばかり気にしてちゃダメよ～、星力は扱い方も大事なんだから～」"

[[dialogue]]
speaker = "クロト"
# 「サーシャ先輩……」
line = "「サーシャ先輩……」"

[[dialogue]]
speaker = "unk"
# 星力はいわば筋力。
line = "星力はいわば筋力。"

[[dialogue]]
speaker = "unk"
# だが、いくら筋肉をつけてもイコール戦闘が上達するわけではないという。
line = "だが、いくら筋肉をつけてもイコール戦闘が上達するわけではないという。"

[[dialogue]]
speaker = "アナ"
# 「次期会長は変身後の戦闘にまだ慣れてない。これは転入生なんだから、どうしようもないことですが」
line = "「次期会長は変身後の戦闘にまだ慣れてない。これは転入生なんだから、どうしようもないことですが」"

[[dialogue]]
speaker = "サーシャ"
# 「なるほど～。ならやっぱり、お稽古しかないのかな～」
line = "「なるほど～。ならやっぱり、お稽古しかないのかな～」"

[[dialogue]]
speaker = "クロト"
# 「お願いします。俺は──俺は今の会長、ヴィーナスに勝たなくちゃいけないんです」
line = "「お願いします。俺は──俺は今の会長、ヴィーナスに勝たなくちゃいけないんです」"

[[dialogue]]
speaker = "サーシャ"
# 「ふふふ。あんな無理難題を押し付けられても……諦めないのね」
line = "「ふふふ。あんな無理難題を押し付けられても……諦めないのね」"

[[dialogue]]
speaker = "サーシャ"
# 「嫌いじゃないわ、そういう子♪」
line = "「嫌いじゃないわ、そういう子♪」"

[[dialogue]]
speaker = "unk"
# ヴィーナスに迫るほどのサーシャ先輩なら、きっといい鍛錬ができるだろう。
line = "ヴィーナスに迫るほどのサーシャ先輩なら、きっといい鍛錬ができるだろう。"

[[dialogue]]
speaker = "unk"
# 今の俺の力が、まだまだ及んでいないことは百も承知だけれど……
line = "今の俺の力が、まだまだ及んでいないことは百も承知だけれど……"

[[dialogue]]
speaker = "ヴィーナス"
# 『緋宮クロト──あなたは私と戦って勝ち、その真の力をみんなに知らしめるのよ！』
line = "『緋宮クロト──あなたは私と戦って勝ち、その真の力をみんなに知らしめるのよ！』"

[[dialogue]]
speaker = "unk"
# 彼女の姿、そして言葉が脳裏に浮かぶ。
line = "彼女の姿、そして言葉が脳裏に浮かぶ。"

[[dialogue]]
speaker = "unk"
# 同じ星徒会役員の彼女たちだって面食らっていたのだ。言い逃れしようと思えばできたのかもしれない。
line = "同じ星徒会役員の彼女たちだって面食らっていたのだ。言い逃れしようと思えばできたのかもしれない。"

[[dialogue]]
speaker = "unk"
# だが、なぜだろうか。
line = "だが、なぜだろうか。"

[[dialogue]]
speaker = "unk"
# 彼女の真っ直ぐな視線から……とても逃げる気になれなかったのは。
line = "彼女の真っ直ぐな視線から……とても逃げる気になれなかったのは。"

[[dialogue]]
speaker = "サーシャ"
# 「よ～し。それじゃお姉さんからたっぷり技を盗みなさ～い」
line = "「よ～し。それじゃお姉さんからたっぷり技を盗みなさ～い」"

[[dialogue]]
speaker = "クロト"
# 「はい！」
line = "「はい！」"
