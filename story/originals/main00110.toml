line = "せめてこいつを彼女と同じレベルに倒せないと、戦って勝つどころじゃない……！"

[[dialogue]]
speaker = "クロト"
# 「行くぞ──みんなもサポートを頼む」
line = "「行くぞ──みんなもサポートを頼む」"

[[dialogue]]
speaker = "アナ"
# 「了解」
line = "「了解」"

[[dialogue]]
speaker = "マトイ"
