[[dialogue]]
speaker = "クロト"
# 「よし。これでＡランクに挑戦できるようになったぞ」
line = "「よし。これでＡランクに挑戦できるようになったぞ」"

[[dialogue]]
speaker = "マトイ"
# 「緋宮くん、すごい成長速度！　もう普通の生徒と比べても全然強いよ」
line = "「緋宮くん、すごい成長速度！　もう普通の生徒と比べても全然強いよ」"

[[dialogue]]
speaker = "マトイ"
# 「ただ、今回の場合は目標が目標なんだけど……」
line = "「ただ、今回の場合は目標が目標なんだけど……」"

[[dialogue]]
speaker = "アナ"
# 「ハードルが果てしなく高すぎですね。せめてプリマステラくらいなら、目指すにも現実味があるのですが」
line = "「ハードルが果てしなく高すぎですね。せめてプリマステラくらいなら、目指すにも現実味があるのですが」"

[[dialogue]]
speaker = "クロト"
# 「大丈夫。まだ時間はある」
line = "「大丈夫。まだ時間はある」"

[[dialogue]]
speaker = "unk"
# 大丈夫でないとすれば、むしろこれからか。
line = "大丈夫でないとすれば、むしろこれからか。"

[[dialogue]]
speaker = "unk"
# なぜならこれは朝練──今日はまだまだ授業が控えているのだ。
line = "なぜならこれは朝練──今日はまだまだ授業が控えているのだ。"

[[dialogue]]
speaker = "トワ先生"
# 「と、ゆうわけでぇ──今日の授業は一旦ここまで♪」
line = "「と、ゆうわけでぇ──今日の授業は一旦ここまで♪」"

[[dialogue]]
speaker = "トワ先生"
# 「それじゃ、今から抜き打ち小テストをしまーす。文句は言わせませーんっ」
line = "「それじゃ、今から抜き打ち小テストをしまーす。文句は言わせませーんっ」"

[[dialogue]]
speaker = "クラスの女子Ａ"
# 「えーっ！」
line = "「えーっ！」"

[[dialogue]]
speaker = "クラスの女子Ｂ"
# 「ぶーぶー。鬼ー！」
line = "「ぶーぶー。鬼ー！」"

[[dialogue]]
speaker = "アナ"
# 「特訓、放課後の部──開始！」
line = "「特訓、放課後の部──開始！」"

[[dialogue]]
speaker = "サーシャ"
# 「今日はお姉さんも応援するわよ～」
line = "「今日はお姉さんも応援するわよ～」"

[[dialogue]]
speaker = "マトイ"
# 「サーシャさん、なら本を読んでないで手伝ってください……」
line = "「サーシャさん、なら本を読んでないで手伝ってください……」"

[[dialogue]]
speaker = "unk"
# ──明くる日も明くる日も、鍛錬と授業の繰り返し。
line = "──明くる日も明くる日も、鍛錬と授業の繰り返し。"

[[dialogue]]
speaker = "unk"
# 周囲のみんなの協力もあって、俺は見違えるように実力をつけてきたものの……
line = "周囲のみんなの協力もあって、俺は見違えるように実力をつけてきたものの……"

[[dialogue]]
speaker = "ダークキングフワッチ"
# 「イイイイイッ……！！」
line = "「イイイイイッ……！！」"

[[dialogue]]
speaker = "アナ"
# 「制限時間オーバー……チャレンジ失敗です」
line = "「制限時間オーバー……チャレンジ失敗です」"

[[dialogue]]
speaker = "クロト"
# 「はあ、はあ……くそ。あと少しで倒せそうだったのに」
line = "「はあ、はあ……くそ。あと少しで倒せそうだったのに」"

[[dialogue]]
speaker = "unk"
# ようやくたどり着いたＳランクモンスターへの挑戦権。
line = "ようやくたどり着いたＳランクモンスターへの挑戦権。"

[[dialogue]]
speaker = "unk"
# しかしその相手は厳しく、２人のサポートを受けてもクリアさえままならない状況が続いていた。
line = "しかしその相手は厳しく、２人のサポートを受けてもクリアさえままならない状況が続いていた。"

[[dialogue]]
speaker = "クロト"
# 「ヴィーナスはこれを１０秒か……とんでもないな。改めて」
line = "「ヴィーナスはこれを１０秒か……とんでもないな。改めて」"

[[dialogue]]
speaker = "アナ"
# 「普通、最初に掲げる目標じゃない。会長だって一朝一夕でああなったわけじゃないだろうし」
line = "「普通、最初に掲げる目標じゃない。会長だって一朝一夕でああなったわけじゃないだろうし」"

[[dialogue]]
speaker = "マトイ"
# 「や……やっぱ無理かな……なんとか会長を説得して、退学だけはやめてもらうとか……」
line = "「や……やっぱ無理かな……なんとか会長を説得して、退学だけはやめてもらうとか……」"

[[dialogue]]
speaker = "クロト"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# 何度も続く失敗に、諦めムードがただよい始める。
line = "何度も続く失敗に、諦めムードがただよい始める。"

[[dialogue]]
speaker = "unk"
# けど──
line = "けど──"

[[dialogue]]
speaker = "クロト"
# 「いや……悪い、２人とも。俺は──まだ挑戦を続けるよ」
line = "「いや……悪い、２人とも。俺は──まだ挑戦を続けるよ」"

[[dialogue]]
speaker = "マトイ"
# 「緋宮くん……」
line = "「緋宮くん……」"

[[dialogue]]
speaker = "アナ"
# 「付き合うと言った手前、構いませんが。気にはなります」
line = "「付き合うと言った手前、構いませんが。気にはなります」"

[[dialogue]]
speaker = "アナ"
# 「次期会長はどうしてそこまで──律儀に勝負を受けようとするのですか？」
line = "「次期会長はどうしてそこまで──律儀に勝負を受けようとするのですか？」"

[[dialogue]]
speaker = "クロト"
# 「それは……」
line = "「それは……」"

[[dialogue]]
speaker = "ヴィーナス"
# 『緋宮クロト──あなたは私と戦って勝ち、その真の力をみんなに知らしめるのよ！』
line = "『緋宮クロト──あなたは私と戦って勝ち、その真の力をみんなに知らしめるのよ！』"

[[dialogue]]
speaker = "unk"
# 無茶振り……と言って差し支えない、ヴィーナスの宣言。
line = "無茶振り……と言って差し支えない、ヴィーナスの宣言。"

[[dialogue]]
speaker = "unk"
# 俺はそれを二つ返事で了承した。それがなぜかと問われれば……
line = "俺はそれを二つ返事で了承した。それがなぜかと問われれば……"

[[dialogue]]
speaker = "クロト"
# 「……わからない。今のところは、なんとなくとしか言えない」
line = "「……わからない。今のところは、なんとなくとしか言えない」"

[[dialogue]]
speaker = "マトイ"
# 「がくっ。そ、そんなんで決めちゃっていいの！？」
line = "「がくっ。そ、そんなんで決めちゃっていいの！？」"

[[dialogue]]
speaker = "クロト"
# 「理由はある気がするけど、うまく言語化できないんだ。そうだな」
line = "「理由はある気がするけど、うまく言語化できないんだ。そうだな」"

[[dialogue]]
speaker = "クロト"
# 「俺はこんな体質だから、大きな声じゃ言えないけど……昔から街中で何度もモンスターと戦うような目に遭ってきた」
line = "「俺はこんな体質だから、大きな声じゃ言えないけど……昔から街中で何度もモンスターと戦うような目に遭ってきた」"

[[dialogue]]
speaker = "クロト"
# 「同じように、力を持たない一般人が襲われている現場だって何度も見てきた。その度にできる限りのことはしてきた」
line = "「同じように、力を持たない一般人が襲われている現場だって何度も見てきた。その度にできる限りのことはしてきた」"

[[dialogue]]
speaker = "アナ"
# 「……星騎士めいた経験はあったわけですね」
line = "「……星騎士めいた経験はあったわけですね」"

[[dialogue]]
speaker = "unk"
# 俺とモンスターの戦いは星騎士のみんなみたいにスマートじゃない、泥臭いやり合いが多かったけど。
line = "俺とモンスターの戦いは星騎士のみんなみたいにスマートじゃない、泥臭いやり合いが多かったけど。"

[[dialogue]]
speaker = "unk"
# それでも──
line = "それでも──"

[[dialogue]]
speaker = "クロト"
# 「ああ。だから……挑まれてるなら受けて立つのが自然かなって思った。それだけだ」
line = "「ああ。だから……挑まれてるなら受けて立つのが自然かなって思った。それだけだ」"

[[dialogue]]
speaker = "アナ"
# 「ふむ。次期会長も中々のお馬鹿さんですね」
