[[dialogue]]
speaker = "unk"
# 第４話,２人のサチに挟まれて,P
line = "第４話,２人のサチに挟まれて,P"

[[dialogue]]
speaker = "unk"
# その日、俺が星徒会室で仕事をしていると、サチが慌てた様子で駆け込んできた。
line = "その日、俺が星徒会室で仕事をしていると、サチが慌てた様子で駆け込んできた。"

[[dialogue]]
speaker = "サチ"
# 「お兄さん、すみません！　ちょっとご相談がありまして……！」
line = "「お兄さん、すみません！　ちょっとご相談がありまして……！」"

[[dialogue]]
speaker = "unk"
# もしかして、ロストアイテムか？
line = "もしかして、ロストアイテムか？"

[[dialogue]]
speaker = "サチ"
# 「いえ、そういうわけではないんですけど――」
line = "「いえ、そういうわけではないんですけど――」"

[[dialogue]]
speaker = "サチ"
# 「ふふっ、お兄さん、星徒会のお仕事お疲れ様です♪」
line = "「ふふっ、お兄さん、星徒会のお仕事お疲れ様です♪」"

[[dialogue]]
speaker = "サチ"
# 「み、見ての通り……ちょっとしたトラブルが起きてしまって……」
line = "「み、見ての通り……ちょっとしたトラブルが起きてしまって……」"

[[dialogue]]
speaker = "unk"
# サチが２人！？
line = "サチが２人！？"

[[dialogue]]
speaker = "サチ"
# 「はい……リバースフォームの自主練をしていたら、能力の『アンラッキー』のせいか、気づいたらこんなふうに増えてしまって……」
line = "「はい……リバースフォームの自主練をしていたら、能力の『アンラッキー』のせいか、気づいたらこんなふうに増えてしまって……」"

[[dialogue]]
speaker = "サチ"
# 「でも、考え方を変えれば――これって『ラッキー』かもしれませんよ？」
line = "「でも、考え方を変えれば――これって『ラッキー』かもしれませんよ？」"

[[dialogue]]
speaker = "サチ"
# 「え……？　ど、どういうこと？」
line = "「え……？　ど、どういうこと？」"

[[dialogue]]
speaker = "サチ"
# 「だって、お兄さんに『ハーレムプレイ』をさせてあげられるでしょ♪」
line = "「だって、お兄さんに『ハーレムプレイ』をさせてあげられるでしょ♪」"

[[dialogue]]
speaker = "サチ"
# 「はぁっ！？　そ、そんなエッチなのは……！」
line = "「はぁっ！？　そ、そんなエッチなのは……！」"

[[dialogue]]
speaker = "サチ"
# 「じゃあ、『悪い子』である私の方だけが、お兄さんとイチャイチャしちゃおっかな♪」
line = "「じゃあ、『悪い子』である私の方だけが、お兄さんとイチャイチャしちゃおっかな♪」"

[[dialogue]]
speaker = "サチ"
# 「えぇっ！？　ち、ちょっと待って……！」
line = "「えぇっ！？　ち、ちょっと待って……！」"

[[dialogue]]
speaker = "サチ"
# 「お兄さん、そういうわけなので～♪　恋人同士のスキンシップ、いかがですか？」
line = "「お兄さん、そういうわけなので～♪　恋人同士のスキンシップ、いかがですか？」"

[[dialogue]]
speaker = "unk"
# し、仕事の途中だし……
line = "し、仕事の途中だし……"

[[dialogue]]
speaker = "サチ"
# 「急ぎじゃないなら、気分転換ってことで～<emoji=heart04>　――ダメですかぁ？」
line = "「急ぎじゃないなら、気分転換ってことで～<emoji=heart04>　――ダメですかぁ？」"

[[dialogue]]
speaker = "unk"
# 黒い衣装のサチが距離を詰め、俺の太ももを指先ですりすりとなぞりながら、甘えるように見上げてくる。
line = "黒い衣装のサチが距離を詰め、俺の太ももを指先ですりすりとなぞりながら、甘えるように見上げてくる。"

[[dialogue]]
speaker = "サチ"
# 「そ、そういうエッチなお願いの仕方は禁止です！」
line = "「そ、そういうエッチなお願いの仕方は禁止です！」"

[[dialogue]]
speaker = "サチ"
# 「でも、これを逃したら、私たち２人と同時にイチャイチャできる機会なんて、もう２度とないかもしれませんよ～？」
line = "「でも、これを逃したら、私たち２人と同時にイチャイチャできる機会なんて、もう２度とないかもしれませんよ～？」"

[[dialogue]]
speaker = "unk"
# それは……確かに……！
line = "それは……確かに……！"

[[dialogue]]
speaker = "サチ"
# 「お兄さん！？」
line = "「お兄さん！？」"

[[dialogue]]
speaker = "サチ"
# 「ふふっ♪　それじゃあ合意ということで――ラブラブなスキンシップ、始めちゃいますね<emoji=heart04>」
line = "「ふふっ♪　それじゃあ合意ということで――ラブラブなスキンシップ、始めちゃいますね<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
# 「お兄さんの膝の上、失礼します♪　――ぎゅ～っ<emoji=heart04>」
line = "「お兄さんの膝の上、失礼します♪　――ぎゅ～っ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 黒いサチが俺の胸に顔を埋め、抱きついてくる。
line = "黒いサチが俺の胸に顔を埋め、抱きついてくる。"

[[dialogue]]
speaker = "サチ"
# 「すぅ～っ<emoji=heart04>　はあぁ～<emoji=heart04>　……お兄さんの匂いを嗅ぐと、ドキドキして……好きって気持ちが溢れてきちゃいます<emoji=heart04>」
line = "「すぅ～っ<emoji=heart04>　はあぁ～<emoji=heart04>　……お兄さんの匂いを嗅ぐと、ドキドキして……好きって気持ちが溢れてきちゃいます<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
# 「ちょっ……なにエッチなことしてるんですか！？　そんなに思いきり嗅がないでくださいっ！　恥ずかしいじゃないですかっ！」
line = "「ちょっ……なにエッチなことしてるんですか！？　そんなに思いきり嗅がないでくださいっ！　恥ずかしいじゃないですかっ！」"

[[dialogue]]
speaker = "サチ"
# 「ふふっ、いつまでも恥ずかしがってちゃダメだよ、私。２人で一緒にスキンシップしないと、ハーレムプレイにならないでしょ？」
line = "「ふふっ、いつまでも恥ずかしがってちゃダメだよ、私。２人で一緒にスキンシップしないと、ハーレムプレイにならないでしょ？」"

[[dialogue]]
speaker = "サチ"
# 「私はやるなんて言ってないからね！？　というか『プレイ』って言うのは、エッチだから禁止！」
line = "「私はやるなんて言ってないからね！？　というか『プレイ』って言うのは、エッチだから禁止！」"

[[dialogue]]
speaker = "サチ"
# 「反転した私と向き合うって決めたんじゃないの？　もう、仕方ないな～」
line = "「反転した私と向き合うって決めたんじゃないの？　もう、仕方ないな～」"

[[dialogue]]
speaker = "サチ"
# 「それなら――私がお兄さんを１人占めしちゃうね♪」
line = "「それなら――私がお兄さんを１人占めしちゃうね♪」"

[[dialogue]]
speaker = "サチ"
# 「お兄さん<emoji=heart04>　キス、しちゃいますね<emoji=heart04>　――ん～っ、ちゅっ<emoji=heart04>」
line = "「お兄さん<emoji=heart04>　キス、しちゃいますね<emoji=heart04>　――ん～っ、ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
# 「あっ……！？」
line = "「あっ……！？」"

[[dialogue]]
speaker = "unk"
# 黒いサチに唇を奪われ、何度も甘いキスを重ねられる。
line = "黒いサチに唇を奪われ、何度も甘いキスを重ねられる。"

[[dialogue]]
speaker = "サチ"
# 「んちゅ～っ<emoji=heart04>　ちゅっ、ちゅっ<emoji=heart04>　お兄さん、大好きです<emoji=heart04>」
line = "「んちゅ～っ<emoji=heart04>　ちゅっ、ちゅっ<emoji=heart04>　お兄さん、大好きです<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
# 「だ、ダメ～っ！！」
line = "「だ、ダメ～っ！！」"

[[dialogue]]
speaker = "サチ"
# 「きゃっ！？　ちょっと～、まだ始めたばかりなのに～！」
line = "「きゃっ！？　ちょっと～、まだ始めたばかりなのに～！」"

[[dialogue]]
speaker = "サチ"
# 「お兄さんを１人占めなんて禁止だから！　お兄さんは元々、私の恋人なんだから！　たとえ相手がもう１人の私でも――渡したりしないからぁっ！」
line = "「お兄さんを１人占めなんて禁止だから！　お兄さんは元々、私の恋人なんだから！　たとえ相手がもう１人の私でも――渡したりしないからぁっ！」"

[[dialogue]]
speaker = "サチ"
# 「えいっ！」
line = "「えいっ！」"

[[dialogue]]
speaker = "unk"
# 本物のサチが俺の膝に乗り、真正面からじっと見つめてくる。
line = "本物のサチが俺の膝に乗り、真正面からじっと見つめてくる。"

[[dialogue]]
speaker = "サチ"
# 「お兄さん……浮気なんて許しませんからね！？」
line = "「お兄さん……浮気なんて許しませんからね！？」"

[[dialogue]]
speaker = "unk"
# は、はい。ごめんなさい
line = "は、はい。ごめんなさい"

[[dialogue]]
speaker = "サチ"
# 「だから――さっきの私よりも、ちゃんと愛を込めてキスしてください！」
line = "「だから――さっきの私よりも、ちゃんと愛を込めてキスしてください！」"

[[dialogue]]
speaker = "サチ"
# 「んっ……ちゅっ<emoji=heart04>」
line = "「んっ……ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# サチは頬を真っ赤に染めながら、それでも勇気を振り絞った表情でキスしてくる。
line = "サチは頬を真っ赤に染めながら、それでも勇気を振り絞った表情でキスしてくる。"

[[dialogue]]
speaker = "unk"
# 俺はその体を抱き寄せ、応えるように優しくキスをし返す。
line = "俺はその体を抱き寄せ、応えるように優しくキスをし返す。"

[[dialogue]]
speaker = "サチ"
# 「んんっ……お兄さん<emoji=heart04>　ちゅっ……<emoji=heart04>」
line = "「んんっ……お兄さん<emoji=heart04>　ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# サチ、好きだよ
line = "サチ、好きだよ"

[[dialogue]]
speaker = "サチ"
# 「んっ……はい<emoji=heart04>　私もです<emoji=heart04>」
line = "「んっ……はい<emoji=heart04>　私もです<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
# 「お兄さん、好きです<emoji=heart04>　愛してます<emoji=heart04>　んちゅっ……<emoji=heart04>」
line = "「お兄さん、好きです<emoji=heart04>　愛してます<emoji=heart04>　んちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
# 「む～っ。お兄さん、私の方は好きじゃないんですか～？」
line = "「む～っ。お兄さん、私の方は好きじゃないんですか～？」"

[[dialogue]]
speaker = "unk"
# 俺は唇を離し、首を横に振る。そして頬を膨らませる黒いサチの頭を優しく撫でた。
line = "俺は唇を離し、首を横に振る。そして頬を膨らませる黒いサチの頭を優しく撫でた。"

[[dialogue]]
speaker = "unk"
# どっちもサチだから、ちゃんと好きだよ
line = "どっちもサチだから、ちゃんと好きだよ"

[[dialogue]]
speaker = "unk"
# 俺は、サチの表も裏も、全部ひっくるめて好きだ。それが偽りのない本心だった。
line = "俺は、サチの表も裏も、全部ひっくるめて好きだ。それが偽りのない本心だった。"

[[dialogue]]
speaker = "サチ"
# 「お兄さん<emoji=heart04>　えへへっ、私も大好きです<emoji=heart04>」
line = "「お兄さん<emoji=heart04>　えへへっ、私も大好きです<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 黒いサチは、本物のサチと目を合わせ、笑い合う。
line = "黒いサチは、本物のサチと目を合わせ、笑い合う。"

[[dialogue]]
speaker = "サチ"
# 「というわけで――最初に言った通り、ここからは２人で同時にイチャイチャしてもいいよね、私？」
line = "「というわけで――最初に言った通り、ここからは２人で同時にイチャイチャしてもいいよね、私？」"

[[dialogue]]
speaker = "サチ"
# 「仕方ない……黒いあなたも、確かに私だからね」
line = "「仕方ない……黒いあなたも、確かに私だからね」"

[[dialogue]]
speaker = "サチ"
# 「ふふっ♪　じゃあ次は私からね<emoji=heart04>」
line = "「ふふっ♪　じゃあ次は私からね<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
# 「お兄さん<emoji=heart04>　ん～っ、ちゅっ<emoji=heart04>」
line = "「お兄さん<emoji=heart04>　ん～っ、ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 横から黒いサチが顔を寄せ、俺の唇にキスをする。
line = "横から黒いサチが顔を寄せ、俺の唇にキスをする。"

[[dialogue]]
speaker = "サチ"
# 「こ、交互だからね！　お兄さん、私の方も……んっ<emoji=heart04>　ちゅっ……<emoji=heart04>」
line = "「こ、交互だからね！　お兄さん、私の方も……んっ<emoji=heart04>　ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
# 「ちゅっ<emoji=heart04>　ちゅっ……<emoji=heart04>」
line = "「ちゅっ<emoji=heart04>　ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# その後は、仕事のことも忘れてしまうくらい――
line = "その後は、仕事のことも忘れてしまうくらい――"

[[dialogue]]
speaker = "unk"
# 俺は２人のサチに挟まれながら、甘いスキンシップでゆっくりと理性を溶かされてしまうのだった。
line = "俺は２人のサチに挟まれながら、甘いスキンシップでゆっくりと理性を溶かされてしまうのだった。"
