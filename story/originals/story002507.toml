line = "「大変～、モンスターさんたちがいっぱい現れちゃった～！」"

[[dialogue]]
speaker = "ラティエ"
# 「彼らも夏仕様だね。楽し気な空気に誘われてきたのかな？」
line = "「彼らも夏仕様だね。楽し気な空気に誘われてきたのかな？」"

[[dialogue]]
speaker = "エスメラルダ"
# 『呑気なことを言ってる場合じゃありません！　はやく一般の方々を避難させないと！』
