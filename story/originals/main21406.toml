[[dialogue]]
speaker = "unk"
# 第６話,新世界の守護天使,B
line = "第６話,新世界の守護天使,B"

[[dialogue]]
speaker = "ベアトリス"
# 「……新しい世界を、創る？　な、何を言っているの、ルヴィ……？」
line = "「……新しい世界を、創る？　な、何を言っているの、ルヴィ……？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「言葉通りの意味よ。デネブとアルタイルを滅ぼし、テルルを排除してリクリエが為された時……私は女神の地位に就く」
line = "「言葉通りの意味よ。デネブとアルタイルを滅ぼし、テルルを排除してリクリエが為された時……私は女神の地位に就く」"

[[dialogue]]
speaker = "ルヴィネ"
# 「女神には、己の手足となる守護天使がいる──テルルはいくつも持っているけれど、私は４柱もいれば十分」
line = "「女神には、己の手足となる守護天使がいる──テルルはいくつも持っているけれど、私は４柱もいれば十分」"

[[dialogue]]
speaker = "ルヴィネ"
# 「女神ルヴィネの守護天使として、あなたたち４人を迎えてあげる。どうかしら？」
line = "「女神ルヴィネの守護天使として、あなたたち４人を迎えてあげる。どうかしら？」"

[[dialogue]]
speaker = "チナ"
# 「アタシたちが……」
line = "「アタシたちが……」"

[[dialogue]]
speaker = "グレイス"
# 「ルヴィの守護天使に……？」
line = "「ルヴィの守護天使に……？」"

[[dialogue]]
speaker = "レティシア"
# 「……何を考えているの、ルヴィ？」
line = "「……何を考えているの、ルヴィ？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「あなたたちの怒りは理解できる。お父様の命令とはいえ、無礼なことをしてきたお詫びに、私が提示できる謝罪の形よ」
line = "「あなたたちの怒りは理解できる。お父様の命令とはいえ、無礼なことをしてきたお詫びに、私が提示できる謝罪の形よ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「先日──お父様にお願いをしたの。リクリエを為した後に、あなたたちを守護天使として迎えてもいいか、とね」
line = "「先日──お父様にお願いをしたの。リクリエを為した後に、あなたたちを守護天使として迎えてもいいか、とね」"

[[dialogue]]
speaker = "ルヴィネ"
# 「お父様からは許可をいただけた……ヒトとしての肉体は捨てることになるけれど、永遠の命を約束するわ。……どうかしら？」
line = "「お父様からは許可をいただけた……ヒトとしての肉体は捨てることになるけれど、永遠の命を約束するわ。……どうかしら？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「もちろんあなたたちだけじゃない。今のデネブで生きる人々も、希望する者は全員、下位の天使として招くつもりよ」
line = "「もちろんあなたたちだけじゃない。今のデネブで生きる人々も、希望する者は全員、下位の天使として招くつもりよ」"

[[dialogue]]
speaker = "unk"
# ベアトリスたちは、ルヴィネの言葉に何も言い返すことができない。
line = "ベアトリスたちは、ルヴィネの言葉に何も言い返すことができない。"

[[dialogue]]
speaker = "unk"
# 自分たちは、何を提案されているのか──ベアトリスたちの頭の中が、混乱で埋め尽くされていく。
line = "自分たちは、何を提案されているのか──ベアトリスたちの頭の中が、混乱で埋め尽くされていく。"

[[dialogue]]
speaker = "ルヴィネ"
# 「……ベアト。あなたは吸血鬼の、影の一族。星力が切れれば、太陽の下を歩くこともできなくなる」
line = "「……ベアト。あなたは吸血鬼の、影の一族。星力が切れれば、太陽の下を歩くこともできなくなる」"

[[dialogue]]
speaker = "ルヴィネ"
# 「付き合いの長いあなたが、また暗い洞窟に住まなければならないだなんて……あまりに不憫だわ。あなたに不自由のない霊力の器と、永遠の命をあげる」
line = "「付き合いの長いあなたが、また暗い洞窟に住まなければならないだなんて……あまりに不憫だわ。あなたに不自由のない霊力の器と、永遠の命をあげる」"

[[dialogue]]
speaker = "ベアトリス"
# 「…………そんなの」
line = "「…………そんなの」"

[[dialogue]]
speaker = "ルヴィネ"
# 「チナ。アルタイルのご両親と、そのお腹の子供も一緒に連れていってあげるわ」
line = "「チナ。アルタイルのご両親と、そのお腹の子供も一緒に連れていってあげるわ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「今まで私はお父様に尽くしてきた。そのくらいのワガママなら、聞いてもらえるはずだから」
line = "「今まで私はお父様に尽くしてきた。そのくらいのワガママなら、聞いてもらえるはずだから」"

[[dialogue]]
speaker = "チナ"
# 「…………お前」
line = "「…………お前」"

[[dialogue]]
speaker = "ルヴィネ"
# 「グレイスも、アルタイルに生きているご両親がまだいるはず。きっと探してあげる」
line = "「グレイスも、アルタイルに生きているご両親がまだいるはず。きっと探してあげる」"

[[dialogue]]
speaker = "グレイス"
# 「…………ルヴィ」
line = "「…………ルヴィ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「レティシア。守護天使になって、永遠の命を持てば……５人全員、ずっと一緒よ。これがあなたの望みでしょう？」
line = "「レティシア。守護天使になって、永遠の命を持てば……５人全員、ずっと一緒よ。これがあなたの望みでしょう？」"

[[dialogue]]
speaker = "レティシア"
# 「…………何てことを、言うの？」
line = "「…………何てことを、言うの？」"

[[dialogue]]
speaker = "unk"
# ベアトリスたちは絶句していた。
line = "ベアトリスたちは絶句していた。"

[[dialogue]]
speaker = "unk"
# 価値基準が違う相手に、どう言葉を投げかければいいのか──もはやわからなくなっていた。
line = "価値基準が違う相手に、どう言葉を投げかければいいのか──もはやわからなくなっていた。"

[[dialogue]]
speaker = "ルヴィネ"
# 「リクリエが起きてもあなたたちは死なない。愛しい人達も連れていける……約束するわ」
line = "「リクリエが起きてもあなたたちは死なない。愛しい人達も連れていける……約束するわ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「だからこれまで通り、私に従い、ついてきなさい。あなたたちだけは救ってあげましょう」
line = "「だからこれまで通り、私に従い、ついてきなさい。あなたたちだけは救ってあげましょう」"

[[dialogue]]
speaker = "unk"
# １０年間を共に過ごしてきた親友の提案は、あまりに一方的で、あまりに温かみがなくて──
line = "１０年間を共に過ごしてきた親友の提案は、あまりに一方的で、あまりに温かみがなくて──"

[[dialogue]]
speaker = "？？？"
# 「──それが、新しい女神が描く理想の世界か？」
line = "「──それが、新しい女神が描く理想の世界か？」"

[[dialogue]]
speaker = "unk"
# その沈黙を、１人の声が切り裂く。
line = "その沈黙を、１人の声が切り裂く。"

[[dialogue]]
speaker = "ルヴィネ"
# 「…………もう少し足止めできると思っていたのだけれど。やはりテルルの手先は、目障りね」
line = "「…………もう少し足止めできると思っていたのだけれど。やはりテルルの手先は、目障りね」"

[[dialogue]]
speaker = "クロト"
# 「極星のみんな、待たせてごめん。予想より手間取った……！」
line = "「極星のみんな、待たせてごめん。予想より手間取った……！」"

[[dialogue]]
speaker = "ベアトリス"
# 「会長さん！　それに……みんなも！」
line = "「会長さん！　それに……みんなも！」"

[[dialogue]]
speaker = "アナ（覚醒）"
# 「お待たせしました。道中、色々ありまして……こちらも状況は芳しくなさそうですね」
line = "「お待たせしました。道中、色々ありまして……こちらも状況は芳しくなさそうですね」"

[[dialogue]]
speaker = "チナ"
# 「悪い。まだルヴィを説得できてないんだ……！」
line = "「悪い。まだルヴィを説得できてないんだ……！」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「お姉ちゃんたちが来たからにはもう安心よ～♪　遅れてごめんね、レティシアちゃん？」
line = "「お姉ちゃんたちが来たからにはもう安心よ～♪　遅れてごめんね、レティシアちゃん？」"

[[dialogue]]
speaker = "レティシア"
# 「……何それ。ずっと思っていたのだけどサーシャ、あの日から私を子供扱いしていない……？」
line = "「……何それ。ずっと思っていたのだけどサーシャ、あの日から私を子供扱いしていない……？」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「グレイスちゃん、よく頑張ったね。後は新星星徒会に任せて！」
line = "「グレイスちゃん、よく頑張ったね。後は新星星徒会に任せて！」"

[[dialogue]]
speaker = "グレイス"
# 「マトイさんっ……すみません、すぐに立て直しますから……！！」
line = "「マトイさんっ……すみません、すぐに立て直しますから……！！」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「ようやく追いついたと思ったら、あんまりな提案してるじゃない！　お尻ぺんぺんでお説教ね！！」
line = "「ようやく追いついたと思ったら、あんまりな提案してるじゃない！　お尻ぺんぺんでお説教ね！！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「魔王もノヴァ星騎士もだけど……九浄ヴィーナス。あなたは本当に癇に障るわ。あの出来損ないと話してるみたい」
line = "「魔王もノヴァ星騎士もだけど……九浄ヴィーナス。あなたは本当に癇に障るわ。あの出来損ないと話してるみたい」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「こ、こいつ今、たぶんママの悪口を言ったわ！？　許せないんだけどー！？」
line = "「こ、こいつ今、たぶんママの悪口を言ったわ！？　許せないんだけどー！？」"

[[dialogue]]
speaker = "アナ（覚醒）"
# 「前会長にしては察しがいいですね。その怒り、ぶつけてやりましょう」
line = "「前会長にしては察しがいいですね。その怒り、ぶつけてやりましょう」"

[[dialogue]]
speaker = "クロト"
# 「守護天使として一緒に新しい世界を作ろう。永遠の命をあげる──だって？」
line = "「守護天使として一緒に新しい世界を作ろう。永遠の命をあげる──だって？」"

[[dialogue]]
speaker = "クロト"
# 「ルヴィネ。君は長いこと彼女たちと一緒にいるくせに……どんなことを言えば喜んでくれるかもわからないのか！？」
line = "「ルヴィネ。君は長いこと彼女たちと一緒にいるくせに……どんなことを言えば喜んでくれるかもわからないのか！？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……知った風な口を利かないでほしいわね」
line = "「……知った風な口を利かないでほしいわね」"

[[dialogue]]
speaker = "ルヴィネ"
# 「ベアトたちはともかく、テルルの手先であるあなたたちに、もうこれ以上用はないわ」
line = "「ベアトたちはともかく、テルルの手先であるあなたたちに、もうこれ以上用はないわ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「生きて帰れると思わないことね。ここで引導を渡してあげるわ」
line = "「生きて帰れると思わないことね。ここで引導を渡してあげるわ」"

[[dialogue]]
speaker = "クロト"
# 「いいや、俺たちは勝つ。勝って君を止める！」
line = "「いいや、俺たちは勝つ。勝って君を止める！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……止める？　殺すの間違いでしょう？」
line = "「……止める？　殺すの間違いでしょう？」"

[[dialogue]]
speaker = "クロト"
# 「ルヴィネ、君のことは殺さない。むしろ死なれたら困る」
line = "「ルヴィネ、君のことは殺さない。むしろ死なれたら困る」"

[[dialogue]]
speaker = "クロト"
# 「ベアトリスたちのためにも、俺たちアルタイルのためにも……！」
line = "「ベアトリスたちのためにも、俺たちアルタイルのためにも……！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「──舐められたものね」
line = "「──舐められたものね」"

[[dialogue]]
speaker = "ルヴィネ"
# 「以前にデネブで交戦した時は、全力を出せなかった。でも最早、私が力を隠す理由はないのよ？」
line = "「以前にデネブで交戦した時は、全力を出せなかった。でも最早、私が力を隠す理由はないのよ？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「そんなに女神の全力が見たいのなら、見せてあげる……！」
line = "「そんなに女神の全力が見たいのなら、見せてあげる……！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「そして、今日ここで終わらせてあげるわ！　魔王ラクシスとの因縁も、旧世代の女神が残した負の遺産も、すべて！！」
line = "「そして、今日ここで終わらせてあげるわ！　魔王ラクシスとの因縁も、旧世代の女神が残した負の遺産も、すべて！！」"
