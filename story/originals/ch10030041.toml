[[dialogue]]
speaker = "unk"
# 第１話,プロポーズはまたの日に,P
line = "第１話,プロポーズはまたの日に,P"

[[dialogue]]
speaker = "unk"
# リクリエとの戦いがひと段落して、しばらく経ったある日。
line = "リクリエとの戦いがひと段落して、しばらく経ったある日。"

[[dialogue]]
speaker = "unk"
# そろそろ、ずっと棚上げしていた問題と向き合うべきだろうと考え、放課後にヴィーナスをうちまで連れてきた。
line = "そろそろ、ずっと棚上げしていた問題と向き合うべきだろうと考え、放課後にヴィーナスをうちまで連れてきた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「恋人になった後、娘であることが判明したが、どうするか──？」
line = "「恋人になった後、娘であることが判明したが、どうするか──？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「娘兼、恋人兼、嫁ってことよね、パパ！」
line = "「娘兼、恋人兼、嫁ってことよね、パパ！」"

[[dialogue]]
speaker = "unk"
# 父親の嫁になることに葛藤とかないの！？
line = "父親の嫁になることに葛藤とかないの！？"

[[dialogue]]
speaker = "ヴィーナス"
# 「う～ん、そう言われてもねぇ？」
line = "「う～ん、そう言われてもねぇ？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ママにはちょっと悪いなぁって思うけど、私、ママの記憶ないし！」
line = "「ママにはちょっと悪いなぁって思うけど、私、ママの記憶ないし！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そもそも、なんで娘だとパパのお嫁さんになっちゃいけないのかしら？」
line = "「そもそも、なんで娘だとパパのお嫁さんになっちゃいけないのかしら？」"

[[dialogue]]
speaker = "unk"
# え？
line = "え？"

[[dialogue]]
speaker = "unk"
# 改めて問われると、難しい質問だ。
line = "改めて問われると、難しい質問だ。"

[[dialogue]]
speaker = "unk"
# 俺はヴィーナスのことが女の子として好きだし、当のヴィーナスも好きだと言ってくれているのなら、なんら問題はないように思える。
line = "俺はヴィーナスのことが女の子として好きだし、当のヴィーナスも好きだと言ってくれているのなら、なんら問題はないように思える。"

[[dialogue]]
speaker = "unk"
# とはいえ、なあなあで済ませていい問題でないことも事実だ。
line = "とはいえ、なあなあで済ませていい問題でないことも事実だ。"

[[dialogue]]
speaker = "ヴィーナス"
# 「生理的に嫌じゃないのかって？　何言ってるのよ！　私がクロトのこと、嫌いになるわけないじゃない！！」
line = "「生理的に嫌じゃないのかって？　何言ってるのよ！　私がクロトのこと、嫌いになるわけないじゃない！！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「むしろ、私の身体の半分はクロトで出来てるんだって考えたら……えへへ♪　改めて運命感じちゃったくらいよ」
line = "「むしろ、私の身体の半分はクロトで出来てるんだって考えたら……えへへ♪　改めて運命感じちゃったくらいよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「世間的には、思春期に入ると娘は父親を生理的に気持ち悪く思うもの……？　ふーん、なんか不思議ね！」
line = "「世間的には、思春期に入ると娘は父親を生理的に気持ち悪く思うもの……？　ふーん、なんか不思議ね！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「でもそれって、私が気にしなかったら問題ないってことよね？」
line = "「でもそれって、私が気にしなかったら問題ないってことよね？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あ、もしかして、クロトがダメなのかしら……？　私のことが娘だとわかったら、前みたいにイチャイチャするのは気持ち悪い？」
line = "「あ、もしかして、クロトがダメなのかしら……？　私のことが娘だとわかったら、前みたいにイチャイチャするのは気持ち悪い？」"

[[dialogue]]
speaker = "unk"
# 背徳感とか、気恥ずかしさを感じるだけ
line = "背徳感とか、気恥ずかしさを感じるだけ"

[[dialogue]]
speaker = "unk"
# そんなことはない！
line = "そんなことはない！"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふふっ、良かった♪」
line = "「ふふっ、良かった♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それじゃあ、他の問題は何があるのかしら？」
line = "「それじゃあ、他の問題は何があるのかしら？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふむふむ、遺伝的には血が濃くなりすぎるのが良くない……」
line = "「ふむふむ、遺伝的には血が濃くなりすぎるのが良くない……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「難しい話は私にはよく分からないけれど、魔王の血が濃くなることはいいことなんじゃないかしら！」
line = "「難しい話は私にはよく分からないけれど、魔王の血が濃くなることはいいことなんじゃないかしら！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私は魔王の力を受け継がなかったみたいだけど、魔王の娘である私と、魔王であるクロトの子供なら、きっと無敵の魔王が生まれるに違いないわ！」
line = "「私は魔王の力を受け継がなかったみたいだけど、魔王の娘である私と、魔王であるクロトの子供なら、きっと無敵の魔王が生まれるに違いないわ！」"

[[dialogue]]
speaker = "unk"
# まあ確かに、普通のヒトなら遺伝的な問題も無視はできないんだろうけど、普通のヒトの体でもない俺が今更そんなことを気にしてもしょうがないか……
line = "まあ確かに、普通のヒトなら遺伝的な問題も無視はできないんだろうけど、普通のヒトの体でもない俺が今更そんなことを気にしてもしょうがないか……"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうそう♪」
line = "「そうそう♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そんなことよりも、次代の無敵魔王は男の子がいいか、女の子がいいか、そういうことを考えた方がケンセツテキってものよ！」
line = "「そんなことよりも、次代の無敵魔王は男の子がいいか、女の子がいいか、そういうことを考えた方がケンセツテキってものよ！」"

[[dialogue]]
speaker = "unk"
# それは建設的なのか！？
line = "それは建設的なのか！？"

[[dialogue]]
speaker = "ヴィーナス"
# 「そういうわけだから、未来の明るい家族計画のために、これからも毎日イチャイチャするわよ、パーパ<emoji=heart04>」
line = "「そういうわけだから、未来の明るい家族計画のために、これからも毎日イチャイチャするわよ、パーパ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そんなことを言いながら腕に抱き着いてくるヴィーナスの頭を撫でると、彼女は機嫌よさげに目を細めながら、もっともっとと頭を擦りつけてくるのだった。
line = "そんなことを言いながら腕に抱き着いてくるヴィーナスの頭を撫でると、彼女は機嫌よさげに目を細めながら、もっともっとと頭を擦りつけてくるのだった。"

[[dialogue]]
speaker = "unk"
# それからしばらく、家でヴィーナスとイチャイチャしていたのだが──
line = "それからしばらく、家でヴィーナスとイチャイチャしていたのだが──"

[[dialogue]]
speaker = "unk"
# あ、そうそう。１つだけ
line = "あ、そうそう。１つだけ"

[[dialogue]]
speaker = "ヴィーナス"
# 「ん？　どうかしたの、クロト？」
line = "「ん？　どうかしたの、クロト？」"

[[dialogue]]
speaker = "unk"
# 嫁を名乗るのはもうちょっと待てる？
line = "嫁を名乗るのはもうちょっと待てる？"

[[dialogue]]
speaker = "unk"
# ヴィーナスが恋人なのは間違いないけど
line = "ヴィーナスが恋人なのは間違いないけど"

[[dialogue]]
speaker = "ヴィーナス"
# 「私、将来的に振られる可能性があるってことぉ！？」
line = "「私、将来的に振られる可能性があるってことぉ！？」"

[[dialogue]]
speaker = "unk"
# 違うから！！
line = "違うから！！"

[[dialogue]]
speaker = "ヴィーナス"
# 「婚約は重要なイベントだから、考えてはいるけれどもうちょっとだけ待って欲しい……？　ふ～む、そういうものなの？」
line = "「婚約は重要なイベントだから、考えてはいるけれどもうちょっとだけ待って欲しい……？　ふ～む、そういうものなの？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「まあ確かに、ヘレナちゃんに挨拶も説明も、まだ何もしてないものね」
line = "「まあ確かに、ヘレナちゃんに挨拶も説明も、まだ何もしてないものね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「他にも、幸せになるためには周りの人たちへの説明や理解が必要……？」
line = "「他にも、幸せになるためには周りの人たちへの説明や理解が必要……？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふ～ん。お嫁さんになるって、難しいことなのね……」
line = "「ふ～ん。お嫁さんになるって、難しいことなのね……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ただクロトのことが好きで、クロトが私のことを好きなら、それだけで結婚できるものだと思っていたわ」
line = "「ただクロトのことが好きで、クロトが私のことを好きなら、それだけで結婚できるものだと思っていたわ」"

[[dialogue]]
speaker = "unk"
# もちろん、それが一番大事だよ
line = "もちろん、それが一番大事だよ"

[[dialogue]]
speaker = "ヴィーナス"
# 「うふふっ。私の大好きだけは揺るがないから、こっちの準備はいつでも万端よ！」
line = "「うふふっ。私の大好きだけは揺るがないから、こっちの準備はいつでも万端よ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロトの準備が整ったら、いつでもプロポーズしてきなさい！」
line = "「クロトの準備が整ったら、いつでもプロポーズしてきなさい！」"

[[dialogue]]
speaker = "unk"
# ああ、頑張るから
line = "ああ、頑張るから"

[[dialogue]]
speaker = "ヴィーナス"
# 「それなら、今しばらくは娘兼恋人で我慢しておいてあげるわ」
line = "「それなら、今しばらくは娘兼恋人で我慢しておいてあげるわ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……そう考えると、お嫁さんになる前の『恋人』の期間って、すっごく貴重な気がしてきたわ！」
line = "「……そう考えると、お嫁さんになる前の『恋人』の期間って、すっごく貴重な気がしてきたわ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「えへへ♪　クロト、大好きよっ<emoji=heart04>」
line = "「えへへ♪　クロト、大好きよっ<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
# 「んっ……ちゅっ<emoji=heart04>」
line = "「んっ……ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
# 「貴重な恋人期間、これからも目一杯、楽しんじゃいましょう！」
line = "「貴重な恋人期間、これからも目一杯、楽しんじゃいましょう！」"

[[dialogue]]
speaker = "unk"
# 満面の笑みで可愛いことを言う恋人に、今度は俺の方からキスをするのだった。
line = "満面の笑みで可愛いことを言う恋人に、今度は俺の方からキスをするのだった。"
