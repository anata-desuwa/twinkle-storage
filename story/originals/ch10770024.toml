[[dialogue]]
speaker = "unk"
# 第４話,蘭美の深刻なお悩み,P
line = "第４話,蘭美の深刻なお悩み,P"

[[dialogue]]
speaker = "蘭美"
# 「由々しき事態だわ……」
line = "「由々しき事態だわ……」"

[[dialogue]]
speaker = "unk"
# 縁側に腰かける俺の膝の上に、ちょこんと小さな体を乗っける蘭美。
line = "縁側に腰かける俺の膝の上に、ちょこんと小さな体を乗っける蘭美。"

[[dialogue]]
speaker = "unk"
# 深刻な口調とは裏腹に、蘭美は俺にギュッと抱き着いて、胸に頬をすり寄せている。
line = "深刻な口調とは裏腹に、蘭美は俺にギュッと抱き着いて、胸に頬をすり寄せている。"

[[dialogue]]
speaker = "unk"
# 由々しき事態って？
line = "由々しき事態って？"

[[dialogue]]
speaker = "蘭美"
# 「最近、ほら……色々とタイミングが悪かったでしょう？」
line = "「最近、ほら……色々とタイミングが悪かったでしょう？」"

[[dialogue]]
speaker = "蘭美"
# 「毎日のように出かけていたデートも３日に１度のペースになってしまったし、日によっては全く会えないなんてこともあったわ」
line = "「毎日のように出かけていたデートも３日に１度のペースになってしまったし、日によっては全く会えないなんてこともあったわ」"

[[dialogue]]
speaker = "蘭美"
# 「それで久しぶりに会う約束をした日には、<b>ちょっとした手違い</b>でミスをしてしまう……なんてこともあったわね」
line = "「それで久しぶりに会う約束をした日には、<b>ちょっとした手違い</b>でミスをしてしまう……なんてこともあったわね」"

[[dialogue]]
speaker = "蘭美"
# 「誤算だったわね……薬の飲み忘れなんて生まれて初めてのことだったから、まさかあんなことになるとは思わなかったの」
line = "「誤算だったわね……薬の飲み忘れなんて生まれて初めてのことだったから、まさかあんなことになるとは思わなかったの」"

[[dialogue]]
speaker = "蘭美"
# 「ええ。今は大丈夫よ、落ち着いてるわ。これも貴方の提案のおかげね」
line = "「ええ。今は大丈夫よ、落ち着いてるわ。これも貴方の提案のおかげね」"

[[dialogue]]
speaker = "蘭美"
# 「私は我慢を覚えるために、貴方に会うのを制限しようと提案したわ。けれど貴方は、それと全く逆の提案をしてくれた」
line = "「私は我慢を覚えるために、貴方に会うのを制限しようと提案したわ。けれど貴方は、それと全く逆の提案をしてくれた」"

[[dialogue]]
speaker = "蘭美"
# 「毎日必ず会おうって。たとえ短い時間になっても必ず会うことにしようって」
line = "「毎日必ず会おうって。たとえ短い時間になっても必ず会うことにしようって」"

[[dialogue]]
speaker = "蘭美"
# 「今日みたいに私がお屋敷を離れられない時は、自分の方から会いに行くって言ってくれて……」
line = "「今日みたいに私がお屋敷を離れられない時は、自分の方から会いに行くって言ってくれて……」"

[[dialogue]]
speaker = "蘭美"
# 「それを聞いて私、不覚にも胸がキュ～ってなったわ<emoji=heart04>」
line = "「それを聞いて私、不覚にも胸がキュ～ってなったわ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# こんな夜遅くにお邪魔しちゃって
line = "こんな夜遅くにお邪魔しちゃって"

[[dialogue]]
speaker = "unk"
# でも迷惑じゃないかな？
line = "でも迷惑じゃないかな？"

[[dialogue]]
speaker = "蘭美"
# 「問題ないわ。ヘレナ様には許可を頂いているし、お仕事の方ももう終わっているから」
line = "「問題ないわ。ヘレナ様には許可を頂いているし、お仕事の方ももう終わっているから」"

[[dialogue]]
speaker = "蘭美"
# 「それに、こうして夜に月を見ながら静かに語らうのも……また素敵な時間の過ごし方じゃないかしら？」
line = "「それに、こうして夜に月を見ながら静かに語らうのも……また素敵な時間の過ごし方じゃないかしら？」"

[[dialogue]]
speaker = "unk"
# それじゃ由々しき問題って？
line = "それじゃ由々しき問題って？"

[[dialogue]]
speaker = "unk"
# ん……？
line = "ん……？"

[[dialogue]]
speaker = "蘭美"
# 「だって……貴方がお屋敷に来る頻度が上がったでしょう？」
line = "「だって……貴方がお屋敷に来る頻度が上がったでしょう？」"

[[dialogue]]
speaker = "蘭美"
# 「そうしたら私、こんな風に思いっきり甘えてしまうでしょう……？」
line = "「そうしたら私、こんな風に思いっきり甘えてしまうでしょう……？」"

[[dialogue]]
speaker = "蘭美"
# 「その様子を、お屋敷のみんなに見られてしまうのよ……」
line = "「その様子を、お屋敷のみんなに見られてしまうのよ……」"

[[dialogue]]
speaker = "蘭美"
# 「こんな様子を見られてしまっては、他の者に示しがつかなくなってしまうわ！」
line = "「こんな様子を見られてしまっては、他の者に示しがつかなくなってしまうわ！」"

[[dialogue]]
speaker = "蘭美"
# 「けれど……だからと言ってイチャイチャしない選択肢はないし……実に由々しき問題なのよ。はぁ……」
line = "「けれど……だからと言ってイチャイチャしない選択肢はないし……実に由々しき問題なのよ。はぁ……」"

[[dialogue]]
speaker = "ヨミ"
# 「ご休憩中に失礼します。メイド長、頼まれていたお掃除が完了しました～」
line = "「ご休憩中に失礼します。メイド長、頼まれていたお掃除が完了しました～」"

[[dialogue]]
speaker = "蘭美"
# 「あら、お疲れ様。ヨミヨミにお願いしたかったお仕事は全部終わったから、今日はもう休んでもらっていいわ」
line = "「あら、お疲れ様。ヨミヨミにお願いしたかったお仕事は全部終わったから、今日はもう休んでもらっていいわ」"

[[dialogue]]
speaker = "ヨミ"
# 「はいっ、お疲れ様ですっ！」
line = "「はいっ、お疲れ様ですっ！」"

[[dialogue]]
speaker = "ヨミ"
# 「会長、こんばんはです。今日もいらっしゃっていたんですね」
line = "「会長、こんばんはです。今日もいらっしゃっていたんですね」"

[[dialogue]]
speaker = "unk"
# お邪魔してます
line = "お邪魔してます"

[[dialogue]]
speaker = "ヨミ"
# 「いえいえ、お邪魔だなんてとんでもない！　むしろもっと遊びに来て欲しいくらいです！」
line = "「いえいえ、お邪魔だなんてとんでもない！　むしろもっと遊びに来て欲しいくらいです！」"

[[dialogue]]
speaker = "ヨミ"
# 「えっ？　何故って、ええと……会長が遊びに来たら、メイド長のパフォーマンスが上がるから、でしょうか……」
line = "「えっ？　何故って、ええと……会長が遊びに来たら、メイド長のパフォーマンスが上がるから、でしょうか……」"

[[dialogue]]
speaker = "unk"
# 下がるんじゃなくて、上がるの？
line = "下がるんじゃなくて、上がるの？"

[[dialogue]]
speaker = "ヨミ"
# 「ええ、それはもう爆裂上がります！」
line = "「ええ、それはもう爆裂上がります！」"

[[dialogue]]
speaker = "蘭美"
# 「お仕事の後に会長との時間が待っていると考えたら、私のスピードが冴えわたるのも当然だわ！」
line = "「お仕事の後に会長との時間が待っていると考えたら、私のスピードが冴えわたるのも当然だわ！」"

[[dialogue]]
speaker = "ヨミ"
# 「そうなんですよ。だから遠慮なんてしないで、いつでもメイド長に会いに来てくださいね♪」
line = "「そうなんですよ。だから遠慮なんてしないで、いつでもメイド長に会いに来てくださいね♪」"

[[dialogue]]
speaker = "蘭美"
# 「ただ、さっきも話した通り、会長にメロメロになっているところをみんなに見られてしまうことが問題なのよね……」
line = "「ただ、さっきも話した通り、会長にメロメロになっているところをみんなに見られてしまうことが問題なのよね……」"

[[dialogue]]
speaker = "ヨミ"
# 「えっ？　何が問題なんでしょうか……？」
line = "「えっ？　何が問題なんでしょうか……？」"

[[dialogue]]
speaker = "蘭美"
# 「だってそんな私の姿を見られてしまったら、メイド長の威厳が薄れてしまうでしょう？」
line = "「だってそんな私の姿を見られてしまったら、メイド長の威厳が薄れてしまうでしょう？」"

[[dialogue]]
speaker = "蘭美"
# 「みんなの前では厳格なメイド長……私にはそう在り続けなければならない義務があるのよ」
line = "「みんなの前では厳格なメイド長……私にはそう在り続けなければならない義務があるのよ」"

[[dialogue]]
speaker = "蘭美"
# 「けれど会長と一緒に居ると、どうしても甘えたくなってしまって……クールなメイド長の仮面をかぶり続けることが出来なくなってしまうの！」
line = "「けれど会長と一緒に居ると、どうしても甘えたくなってしまって……クールなメイド長の仮面をかぶり続けることが出来なくなってしまうの！」"

[[dialogue]]
speaker = "蘭美"
# 「ねえ、これは由々しき問題でしょう？」
line = "「ねえ、これは由々しき問題でしょう？」"

[[dialogue]]
speaker = "ヨミ"
# 「ええと……気にしなくてもいいのではないでしょうか？」
line = "「ええと……気にしなくてもいいのではないでしょうか？」"

[[dialogue]]
speaker = "蘭美"
# 「あら、どうして？」
line = "「あら、どうして？」"

[[dialogue]]
speaker = "ヨミ"
# 「だって、メイド長が会長にメロメロなのは……もうとっくにお屋敷の全員が知ってますし」
line = "「だって、メイド長が会長にメロメロなのは……もうとっくにお屋敷の全員が知ってますし」"

[[dialogue]]
speaker = "ヨミ"
# 「今更そんなことを心配したって……何というか、手遅れ……なんじゃないでしょうか？」
line = "「今更そんなことを心配したって……何というか、手遅れ……なんじゃないでしょうか？」"

[[dialogue]]
speaker = "蘭美"
# 「……！！！！」
line = "「……！！！！」"

[[dialogue]]
speaker = "蘭美"
# 「ふ、ふふ……そうなのね。だったらもう我慢する必要はない、ということかしら？」
line = "「ふ、ふふ……そうなのね。だったらもう我慢する必要はない、ということかしら？」"

[[dialogue]]
speaker = "ヨミ"
# （ええっ！？　が、我慢！？　あれで我慢してたつもりだったんだ……！）
line = "（ええっ！？　が、我慢！？　あれで我慢してたつもりだったんだ……！）"

[[dialogue]]
speaker = "蘭美"
# 「ヨミ……聞こえてるわよ」
line = "「ヨミ……聞こえてるわよ」"

[[dialogue]]
speaker = "ヨミ"
# 「こやっ！？　ご、ごめんなさいっ！」
line = "「こやっ！？　ご、ごめんなさいっ！」"

[[dialogue]]
speaker = "ヨミ"
# 「で、でも！　会長にメロメロなメイド長、カワイイってみんなの間で評判ですよ！」
line = "「で、でも！　会長にメロメロなメイド長、カワイイってみんなの間で評判ですよ！」"

[[dialogue]]
speaker = "蘭美"
# 「っ……！！」
line = "「っ……！！」"

[[dialogue]]
speaker = "蘭美"
# 「と、とにかく！　そういうことなら今後は、思いっきりイチャイチャするわよ！　誰が見てたって構うもんですか！！」
line = "「と、とにかく！　そういうことなら今後は、思いっきりイチャイチャするわよ！　誰が見てたって構うもんですか！！」"

[[dialogue]]
speaker = "蘭美"
# 「これからも思う存分、甘え合いましょう！　いいわね、会長！」
line = "「これからも思う存分、甘え合いましょう！　いいわね、会長！」"

[[dialogue]]
speaker = "unk"
# もはや威厳を保つのは無理、と悟ったのか。吹っ切れたように宣言する蘭美。
line = "もはや威厳を保つのは無理、と悟ったのか。吹っ切れたように宣言する蘭美。"

[[dialogue]]
speaker = "unk"
# だからといって、あまりに堂々と見せつけてしまっては、それはそれで問題なのではないだろうか？
line = "だからといって、あまりに堂々と見せつけてしまっては、それはそれで問題なのではないだろうか？"

[[dialogue]]
speaker = "unk"
# やり過ぎないように注意しないとな、と自分を戒めつつ、蘭美に甘えてこられたら抵抗できないだろうとも思うのだった。
line = "やり過ぎないように注意しないとな、と自分を戒めつつ、蘭美に甘えてこられたら抵抗できないだろうとも思うのだった。"
