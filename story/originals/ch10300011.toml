line = "「この間みたいに、お客さんに殺気を向けるのはダメだからね」"

[[dialogue]]
speaker = "ナミエル"
# 「お嬢様。お言葉を返すようですが、あのお客様は挙動が怪しかったのです。私を見るたび、ニヤニヤと笑って──」
line = "「お嬢様。お言葉を返すようですが、あのお客様は挙動が怪しかったのです。私を見るたび、ニヤニヤと笑って──」"

[[dialogue]]
speaker = "フィオナ"
# 「それはナミエルがあまりにも警戒して睨むから、愛想笑いをしてただけじゃ……。男の人だからといって理由もなく怪しんだり、威圧するのはいけないよ」
line = "「それはナミエルがあまりにも警戒して睨むから、愛想笑いをしてただけじゃ……。男の人だからといって理由もなく怪しんだり、威圧するのはいけないよ」"

[[dialogue]]
speaker = "ナミエル"
# 「でも男性はえっちな生き物です。隙を与えれば豹変すると本にも書いてありました」
line = "「でも男性はえっちな生き物です。隙を与えれば豹変すると本にも書いてありました」"

[[dialogue]]
speaker = "フィオナ"
# 「うーん、また今度、ちゃんと話したほうがいいのかなぁ……。とにかく、早とちりで『掃除』をしないようにしてね」
line = "「うーん、また今度、ちゃんと話したほうがいいのかなぁ……。とにかく、早とちりで『掃除』をしないようにしてね」"

