[[dialogue]]
speaker = "unk"
# 第１話,えっちな人は『お掃除』します,P
line = "第１話,えっちな人は『お掃除』します,P"

[[dialogue]]
speaker = "フィオナ"
# 「わざわざ来ていただいたのにすみません、緋宮会長。教皇庁の者と話をする必要がありまして……少しの間、ここでメイドと待っていていただけますか？」
line = "「わざわざ来ていただいたのにすみません、緋宮会長。教皇庁の者と話をする必要がありまして……少しの間、ここでメイドと待っていていただけますか？」"

[[dialogue]]
speaker = "unk"
# もちろん大丈夫
line = "もちろん大丈夫"

[[dialogue]]
speaker = "フィオナ"
# 「ありがとうございます。ナミエル～」
line = "「ありがとうございます。ナミエル～」"

[[dialogue]]
speaker = "ナミエル"
# 「お呼びでしょうか、フィオナお嬢様」
line = "「お呼びでしょうか、フィオナお嬢様」"

[[dialogue]]
speaker = "フィオナ"
# 「ナミエル。私が部屋を空ける間、緋宮会長の応対をお願いね」
line = "「ナミエル。私が部屋を空ける間、緋宮会長の応対をお願いね」"

[[dialogue]]
speaker = "ナミエル"
# 「承知いたしました」
