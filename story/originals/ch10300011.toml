[[dialogue]]
speaker = "ナミエル"
# 「私はあまりよろしくしたくありませんが、致し方ありません」
line = "「私はあまりよろしくしたくありませんが、致し方ありません」"

[[dialogue]]
speaker = "ナミエル"
# 「ナミエル・クレシェンテと申します。流星学園附属の１年生。ご覧のとおり、星見家メイド隊の一員でもあります」
line = "「ナミエル・クレシェンテと申します。流星学園附属の１年生。ご覧のとおり、星見家メイド隊の一員でもあります」"

