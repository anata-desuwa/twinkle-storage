[[dialogue]]
speaker = "unk"
# 翌日の星徒会室。会長の席についた俺を待っていたのは──
line = "翌日の星徒会室。会長の席についた俺を待っていたのは──"

[[dialogue]]
speaker = "アナ"
# 「会長。こちら、各部活動からの企画資料です」
line = "「会長。こちら、各部活動からの企画資料です」"

[[dialogue]]
speaker = "unk"
# ちょっとこの量はやばくない……！？
line = "ちょっとこの量はやばくない……！？"

[[dialogue]]
speaker = "unk"
# あの……アナさん？
line = "あの……アナさん？"

[[dialogue]]
speaker = "マトイ"
# 「ほんとにすごい量だね……書類の束、会長の頭より高いよ！？」
line = "「ほんとにすごい量だね……書類の束、会長の頭より高いよ！？」"

[[dialogue]]
speaker = "アナ"
# 「仕方ありません。新星学園のオープンキャンパスまでもうすぐ。当日は流星市国の外からも見学者がたくさん」
line = "「仕方ありません。新星学園のオープンキャンパスまでもうすぐ。当日は流星市国の外からも見学者がたくさん」"

[[dialogue]]
speaker = "アナ"
# 「将来の入部希望者をゲットするための戦いは、もう始まっています。どの部活動も張り切って当たり前」
line = "「将来の入部希望者をゲットするための戦いは、もう始まっています。どの部活動も張り切って当たり前」"

[[dialogue]]
speaker = "サーシャ"
# 「この時期は毎年、お祭りみたいに賑わうのよね～。ふふ、去年も大変だったわ～♪」
line = "「この時期は毎年、お祭りみたいに賑わうのよね～。ふふ、去年も大変だったわ～♪」"

[[dialogue]]
speaker = "サーシャ"
# 「にぎやかな雰囲気にまぎれて、危ない企画もたくさんあるから気を付けてね♪」
line = "「にぎやかな雰囲気にまぎれて、危ない企画もたくさんあるから気を付けてね♪」"

[[dialogue]]
speaker = "unk"
# なんですかそれ！？
line = "なんですかそれ！？"

[[dialogue]]
speaker = "サーシャ"
# 「そうねえ、去年のケースだと……薙刀部が真剣を使った演武を見せようとしたり、超能力研究会が入試問題を透視しようとして大問題になったり～♪」
line = "「そうねえ、去年のケースだと……薙刀部が真剣を使った演武を見せようとしたり、超能力研究会が入試問題を透視しようとして大問題になったり～♪」"

[[dialogue]]
speaker = "マトイ"
# 「ふ、普通じゃないことばっかりのオープンキャンパスってわけですね。負けられない……！」
line = "「ふ、普通じゃないことばっかりのオープンキャンパスってわけですね。負けられない……！」"

[[dialogue]]
speaker = "アナ"
# 「その対抗意識はぜひ、書類へ向けてください。全員で取り掛かり、テキパキさばいていきましょう」
line = "「その対抗意識はぜひ、書類へ向けてください。全員で取り掛かり、テキパキさばいていきましょう」"

[[dialogue]]
speaker = "マトイ"
# 「うん！　ていうか、こんなに忙しいのにヴィーナスはどこに……？」
line = "「うん！　ていうか、こんなに忙しいのにヴィーナスはどこに……？」"

[[dialogue]]
speaker = "unk"
# 用事があるって言ってどこかへ……
line = "用事があるって言ってどこかへ……"

[[dialogue]]
speaker = "マトイ"
# 「もぉ～。目を離すといっつもこれなんだから……！」
line = "「もぉ～。目を離すといっつもこれなんだから……！」"

[[dialogue]]
speaker = "unk"
# カフェテリアまで来て、だって
line = "カフェテリアまで来て、だって"

[[dialogue]]
speaker = "unk"
# あ、ヴィーナスからメッセージだ
line = "あ、ヴィーナスからメッセージだ"

[[dialogue]]
speaker = "アナ"
# 「はあ……前会長にも困ったものです。会長、話を聞くついでに連れ戻してきてください」
line = "「はあ……前会長にも困ったものです。会長、話を聞くついでに連れ戻してきてください」"

[[dialogue]]
speaker = "サーシャ"
# 「行ってらっしゃ～い♪」
line = "「行ってらっしゃ～い♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「来たわね、クロト！」
line = "「来たわね、クロト！」"

[[dialogue]]
speaker = "レミカ"
# 「会長、ごめんね。忙しいところ無理を言って……来てくれて嬉しいな」
line = "「会長、ごめんね。忙しいところ無理を言って……来てくれて嬉しいな」"

[[dialogue]]
speaker = "レミカ"
# 「実は会長に協力して欲しいことがあるんだ。……私が前から、アイドルユニットを結成したがってることは知ってる？」
line = "「実は会長に協力して欲しいことがあるんだ。……私が前から、アイドルユニットを結成したがってることは知ってる？」"

[[dialogue]]
speaker = "unk"
# カワイイのアイドルをやりたいって聞いた
line = "カワイイのアイドルをやりたいって聞いた"

[[dialogue]]
speaker = "unk"
# クールなアイドルじゃなくて
line = "クールなアイドルじゃなくて"

[[dialogue]]
speaker = "レミカ"
# 「うん。今のクール路線は最初のプロデューサーと相談して決まった見せ方で、それ自体は大成功だったと思ってる」
line = "「うん。今のクール路線は最初のプロデューサーと相談して決まった見せ方で、それ自体は大成功だったと思ってる」"

[[dialogue]]
speaker = "レミカ"
# 「デビュー曲がたまたま凄い作曲家さんに作ってもらえてね。自分で言うのもなんだけど、凄い名曲なんだ」
line = "「デビュー曲がたまたま凄い作曲家さんに作ってもらえてね。自分で言うのもなんだけど、凄い名曲なんだ」"

[[dialogue]]
speaker = "レミカ"
# 「ただ、雰囲気がアーティスティックって言えばいいのかな？　クールで最高なんだけど、あんまりアイドルっぽくはないんだよね」
line = "「ただ、雰囲気がアーティスティックって言えばいいのかな？　クールで最高なんだけど、あんまりアイドルっぽくはないんだよね」"

[[dialogue]]
speaker = "レミカ"
# 「未だに私は、そのデビュー曲を越えられずにいる……。悔しいけど、私の実力不足ってやつ」
line = "「未だに私は、そのデビュー曲を越えられずにいる……。悔しいけど、私の実力不足ってやつ」"

[[dialogue]]
speaker = "レミカ"
# 「小さい頃に私が憧れたのは……『可愛い』を詰め込んだ、太陽みたいなアイドルだったから。いつかそういうアイドルがやりたいってずっと思ってて……」
line = "「小さい頃に私が憧れたのは……『可愛い』を詰め込んだ、太陽みたいなアイドルだったから。いつかそういうアイドルがやりたいってずっと思ってて……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「で、事務所の社長に相談してたんだって！　『１回だけ、自由にライブを企画させて欲しい』って」
line = "「で、事務所の社長に相談してたんだって！　『１回だけ、自由にライブを企画させて欲しい』って」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それでとうとう許可が下りて、レミカのやりたいライブができるようになったのよ！」
line = "「それでとうとう許可が下りて、レミカのやりたいライブができるようになったのよ！」"

[[dialogue]]
speaker = "レミカ"
# 「それで、その自由に企画できるライブでは、ユニットとしてデビューしたいって思ってる」
line = "「それで、その自由に企画できるライブでは、ユニットとしてデビューしたいって思ってる」"

[[dialogue]]
speaker = "レミカ"
# 「デビューといっても、１日限定ユニットになるのかな？　そこはメンバーと相談にはなるんだけど……」
line = "「デビューといっても、１日限定ユニットになるのかな？　そこはメンバーと相談にはなるんだけど……」"

[[dialogue]]
speaker = "レミカ"
# 「正直、私は自分の実力に伸び悩みを感じてる……。みんなは私をトップアイドルって呼んでくれるけど、自分１人ではこれ以上可能性を広げきることができない」
line = "「正直、私は自分の実力に伸び悩みを感じてる……。みんなは私をトップアイドルって呼んでくれるけど、自分１人ではこれ以上可能性を広げきることができない」"

[[dialogue]]
speaker = "レミカ"
# 「でも！　才能のある仲間と本気のステージがやれれば、きっと掴めると思うんだ。太陽みたいに元気をくれる、『可愛い』アイドルの本質が」
line = "「でも！　才能のある仲間と本気のステージがやれれば、きっと掴めると思うんだ。太陽みたいに元気をくれる、『可愛い』アイドルの本質が」"

[[dialogue]]
speaker = "unk"
# ライブが終わったらクール路線に戻るの？
line = "ライブが終わったらクール路線に戻るの？"

[[dialogue]]
speaker = "unk"
# １日限定ユニットってことは……
line = "１日限定ユニットってことは……"

[[dialogue]]
speaker = "レミカ"
# 「それは私じゃなくて、ファンのみんなが決めることかな」
line = "「それは私じゃなくて、ファンのみんなが決めることかな」"

[[dialogue]]
speaker = "レミカ"
# 「アイドルは別に１人１属性ってわけでもなくて、楽曲やユニットごとに見せ方が違うことも多いから」
line = "「アイドルは別に１人１属性ってわけでもなくて、楽曲やユニットごとに見せ方が違うことも多いから」"

[[dialogue]]
speaker = "レミカ"
# 「今回の目的は、レッスンとライブの中で、仲間の才能を学ぶこと。<b>あの子</b>と一緒にユニットを組めれば、私はまた新しい自分を見つけ出せるって確信してる」
line = "「今回の目的は、レッスンとライブの中で、仲間の才能を学ぶこと。<b>あの子</b>と一緒にユニットを組めれば、私はまた新しい自分を見つけ出せるって確信してる」"

[[dialogue]]
speaker = "レミカ"
# 「そんな私の姿を見て、ファンが何かを感じてくれれば……おのずと未来も変わってくるんじゃないかな」
line = "「そんな私の姿を見て、ファンが何かを感じてくれれば……おのずと未来も変わってくるんじゃないかな」"

[[dialogue]]
speaker = "unk"
# なるほど。話はよくわかったよ
line = "なるほど。話はよくわかったよ"

[[dialogue]]
speaker = "レミカ"
# 「うん、それで……会長にはそのライブ当日まで、ユニットのプロデュースをお願いしたいんだけど。……どうかな？」
line = "「うん、それで……会長にはそのライブ当日まで、ユニットのプロデュースをお願いしたいんだけど。……どうかな？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ライブの日はオープンキャンパスより先なの。約１ヶ月後……ってとこかしら？」
line = "「ライブの日はオープンキャンパスより先なの。約１ヶ月後……ってとこかしら？」"

[[dialogue]]
speaker = "unk"
# 力になれるなら、ぜひ
line = "力になれるなら、ぜひ"

[[dialogue]]
speaker = "unk"
# それなら問題ないよ
line = "それなら問題ないよ"

[[dialogue]]
speaker = "レミカ"
# 「よかった。会長なら芸能事務所でのバイト経験もあるし、安心できるから」
line = "「よかった。会長なら芸能事務所でのバイト経験もあるし、安心できるから」"

[[dialogue]]
speaker = "レミカ"
# 「……で。さっそく今からプロデューサーの初仕事なんだけど。実はまだ、メンバー勧誘が終わってないんだ」
line = "「……で。さっそく今からプロデューサーの初仕事なんだけど。実はまだ、メンバー勧誘が終わってないんだ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「その子の説得をクロトに頼みたいの。たぶんあなたが一番の適任者だから！」
line = "「その子の説得をクロトに頼みたいの。たぶんあなたが一番の適任者だから！」"

[[dialogue]]
speaker = "メルエル"
# 「ふぅっ……ボランティア部を抜けるのに時間かかっちゃった。でも迷子の子猫ちゃん、飼い主さんが見つかってよかったぁ……」
line = "「ふぅっ……ボランティア部を抜けるのに時間かかっちゃった。でも迷子の子猫ちゃん、飼い主さんが見つかってよかったぁ……」"

[[dialogue]]
speaker = "メルエル"
# 「ヴィーナスちゃんとレミカちゃん、２人から呼び出しなんて珍しいなあ。どうしたんだろ？」
line = "「ヴィーナスちゃんとレミカちゃん、２人から呼び出しなんて珍しいなあ。どうしたんだろ？」"

[[dialogue]]
speaker = "メルエル"
# 「え～っと……カフェのどこかに……ぁ、いたいた！」
line = "「え～っと……カフェのどこかに……ぁ、いたいた！」"

[[dialogue]]
speaker = "unk"
# SE_3215でもＯＫ
line = "SE_3215でもＯＫ"

[[dialogue]]
speaker = "メルエル"
# 「──って、会長くんもいるっ！？」
line = "「──って、会長くんもいるっ！？」"

[[dialogue]]
speaker = "メルエル"
# 「え、えーっと、髪の毛跳ねたりしてないよねっ。さっきまで猫ちゃん抱っこしてたし、毛玉とか……んーと、えーっと……よし！　大丈夫！」
line = "「え、えーっと、髪の毛跳ねたりしてないよねっ。さっきまで猫ちゃん抱っこしてたし、毛玉とか……んーと、えーっと……よし！　大丈夫！」"

[[dialogue]]
speaker = "メルエル"
# 「か、会長くんっ、お待たせ！　──じゃなくてっ、ヴィーナスちゃん、レミカちゃん、お待たせっ！」
line = "「か、会長くんっ、お待たせ！　──じゃなくてっ、ヴィーナスちゃん、レミカちゃん、お待たせっ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「来たわね、最後の１ピースが！」
line = "「来たわね、最後の１ピースが！」"

[[dialogue]]
speaker = "メルエル"
# 「遅れちゃってごめん──って、え？　１ピース……？」
line = "「遅れちゃってごめん──って、え？　１ピース……？」"

[[dialogue]]
speaker = "unk"
# 昨日の雑談、現実になったみたい……
line = "昨日の雑談、現実になったみたい……"

[[dialogue]]
speaker = "メルエル"
# 「え──？」
line = "「え──？」"

[[dialogue]]
speaker = "レミカ"
# 「──姫咲メルエルさん、改めてお願いするね。私と一緒に、アイドルユニットを組んでくれないかな？」
line = "「──姫咲メルエルさん、改めてお願いするね。私と一緒に、アイドルユニットを組んでくれないかな？」"

[[dialogue]]
speaker = "メルエル"
# 「ええ～～～っ！？」
line = "「ええ～～～っ！？」"
