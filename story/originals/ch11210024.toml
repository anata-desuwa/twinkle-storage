[[dialogue]]
speaker = "unk"
# 第４話,レイラと海の思い出,P
line = "第４話,レイラと海の思い出,P"

[[dialogue]]
speaker = "unk"
# 俺とレイラはとあるビーチに来ていた。
line = "俺とレイラはとあるビーチに来ていた。"

[[dialogue]]
speaker = "unk"
# 人の手を離れて久しいのか、ゴミが散乱し、宿泊施設らしき建物もひどく傷んでいた。
line = "人の手を離れて久しいのか、ゴミが散乱し、宿泊施設らしき建物もひどく傷んでいた。"

[[dialogue]]
speaker = "unk"
# それでも、レイラは目を細めて呟いた。
line = "それでも、レイラは目を細めて呟いた。"

[[dialogue]]
speaker = "レイラ"
# 「懐かしい……」
line = "「懐かしい……」"

[[dialogue]]
speaker = "unk"
# 何故、俺たちがここにいるのかというと……
line = "何故、俺たちがここにいるのかというと……"

[[dialogue]]
speaker = "unk"
# 俺とレイラはヘレナちゃんの呼び出しを受け、九浄家を訪れた。
line = "俺とレイラはヘレナちゃんの呼び出しを受け、九浄家を訪れた。"

[[dialogue]]
speaker = "レイラ"
# 「失礼いたします」
line = "「失礼いたします」"

[[dialogue]]
speaker = "ヘレナ"
# 「立てばプリティ、座ればゴージャス、ヘレナちゃんである。よく来てくれた、ふたりとも」
line = "「立てばプリティ、座ればゴージャス、ヘレナちゃんである。よく来てくれた、ふたりとも」"

[[dialogue]]
speaker = "レイラ"
# 「ご無沙汰しております、ヘレナ様」
line = "「ご無沙汰しております、ヘレナ様」"

[[dialogue]]
speaker = "unk"
# 落ち着いた様子でレイラが頭を下げた。こうしていると、良家の令嬢なんだと思い出す。
line = "落ち着いた様子でレイラが頭を下げた。こうしていると、良家の令嬢なんだと思い出す。"

[[dialogue]]
speaker = "ヘレナ"
# 「うむ。此度の用向きだが、九浄家で海水浴場跡を買い取ってな。その様子を見てきてもらいたい。ここだ」
line = "「うむ。此度の用向きだが、九浄家で海水浴場跡を買い取ってな。その様子を見てきてもらいたい。ここだ」"

[[dialogue]]
speaker = "レイラ"
# 「ここは……かつて、百目騎の保養所だったところですね」
line = "「ここは……かつて、百目騎の保養所だったところですね」"

[[dialogue]]
speaker = "ヘレナ"
# 「ああ、その通りだ。売りに出されて数年が経ち、だいぶ荒廃しているようでな。再開発の前にかつての姿を知る者に様子を見てきてほしい。魔王はその付き添いだ」
line = "「ああ、その通りだ。売りに出されて数年が経ち、だいぶ荒廃しているようでな。再開発の前にかつての姿を知る者に様子を見てきてほしい。魔王はその付き添いだ」"

[[dialogue]]
speaker = "ヘレナ"
# 「もちろん報酬ははずもう。どうだ、頼まれてくれるか？」
line = "「もちろん報酬ははずもう。どうだ、頼まれてくれるか？」"

[[dialogue]]
speaker = "レイラ"
# 「……はい、承りました」
line = "「……はい、承りました」"

[[dialogue]]
speaker = "レイラ"
# 「子どもの頃は毎年、お父様お母様と来ていたんです。会社の保養所でしたから、働いている人のお子さんもいて、みんなで花火したり、スイカ割りしたり……」
line = "「子どもの頃は毎年、お父様お母様と来ていたんです。会社の保養所でしたから、働いている人のお子さんもいて、みんなで花火したり、スイカ割りしたり……」"

[[dialogue]]
speaker = "レイラ"
# 「お父様が塩釜でチキンをまるごと一羽、焼いたことがあったんです。すごく塩辛くて、お母様に食べるのを止められて、悔しかったのを覚えています」
line = "「お父様が塩釜でチキンをまるごと一羽、焼いたことがあったんです。すごく塩辛くて、お母様に食べるのを止められて、悔しかったのを覚えています」"

[[dialogue]]
speaker = "レイラ"
# 「私が沖に流された時なんか、お母様が飛んで助けてくれました。母は星騎士でしたから、私の小さい時にはまだほんの少しだけ星力が残っていたんです」
line = "「私が沖に流された時なんか、お母様が飛んで助けてくれました。母は星騎士でしたから、私の小さい時にはまだほんの少しだけ星力が残っていたんです」"

[[dialogue]]
speaker = "レイラ"
# 「母が飛ぶのを見たのはその時が最初で最後ですね。でも、かっこよかったな……」
line = "「母が飛ぶのを見たのはその時が最初で最後ですね。でも、かっこよかったな……」"

[[dialogue]]
speaker = "レイラ"
# 「ここに来ると、いろんなことを思い出しますね。変わってしまう前に、面影があるうちに来れてよかった。ヘレナ様のお気遣いですね」
line = "「ここに来ると、いろんなことを思い出しますね。変わってしまう前に、面影があるうちに来れてよかった。ヘレナ様のお気遣いですね」"

[[dialogue]]
speaker = "unk"
# 綺麗にしてくるよ
line = "綺麗にしてくるよ"

[[dialogue]]
speaker = "レイラ"
# 「え？　ヘレナ様から依頼されたのは現状確認だけですし、魔王さんがそんなことしなくていいんですよ？」
line = "「え？　ヘレナ様から依頼されたのは現状確認だけですし、魔王さんがそんなことしなくていいんですよ？」"

[[dialogue]]
speaker = "unk"
# 俺もレイラと思い出を作りたい
line = "俺もレイラと思い出を作りたい"

[[dialogue]]
speaker = "レイラ"
# 「もう、ずるいです。あなたは本当に、私の欲しい言葉をくれるんですから……もっと大好きになっちゃいます」
line = "「もう、ずるいです。あなたは本当に、私の欲しい言葉をくれるんですから……もっと大好きになっちゃいます」"

[[dialogue]]
speaker = "レイラ"
# 「思い出、たくさん作りましょうね」
line = "「思い出、たくさん作りましょうね」"

[[dialogue]]
speaker = "unk"
# それから俺たちは、浜辺を掃除して回った。
line = "それから俺たちは、浜辺を掃除して回った。"

[[dialogue]]
speaker = "レイラ"
# 「ラスターグリルシュート！」
line = "「ラスターグリルシュート！」"

[[dialogue]]
speaker = "unk"
# ゴミはレイラがブラックホールで消し飛ばしてくれるので意外と早く終わった。
line = "ゴミはレイラがブラックホールで消し飛ばしてくれるので意外と早く終わった。"

[[dialogue]]
speaker = "レイラ"
# 「あははうふふ～ここまでおいで～」
line = "「あははうふふ～ここまでおいで～」"

[[dialogue]]
speaker = "unk"
# ま、待て～
line = "ま、待て～"

[[dialogue]]
speaker = "レイラ"
# 「カップルって海に来ると追いかけっこするイメージでしたけど、実際にやってみると意味分かんないですね」
line = "「カップルって海に来ると追いかけっこするイメージでしたけど、実際にやってみると意味分かんないですね」"

[[dialogue]]
speaker = "unk"
# 急に落ち着かないで
line = "急に落ち着かないで"

[[dialogue]]
speaker = "レイラ"
# 「では次はお互いに水をかけ合いましょう。位置について……よーい、ドン！」
line = "「では次はお互いに水をかけ合いましょう。位置について……よーい、ドン！」"

[[dialogue]]
speaker = "レイラ"
# 「あははは！　やっぱり意味わかんないですねこれ！」
line = "「あははは！　やっぱり意味わかんないですねこれ！」"

[[dialogue]]
speaker = "レイラ"
# 「あ、お腹の音が……お恥ずかしい。遊んだら、お腹空いてきましたね……近くに食べるところあるといいんですけど」
line = "「あ、お腹の音が……お恥ずかしい。遊んだら、お腹空いてきましたね……近くに食べるところあるといいんですけど」"

[[dialogue]]
speaker = "レイラ"
# 「……そんなこともあろうかと、バーベキューセットをご用意？　さすが魔王さん、私に理解ある彼氏すぎます。さすまおです」
line = "「……そんなこともあろうかと、バーベキューセットをご用意？　さすが魔王さん、私に理解ある彼氏すぎます。さすまおです」"

[[dialogue]]
speaker = "レイラ"
# 「では、焼きましょう。お肉を！」
line = "「では、焼きましょう。お肉を！」"

[[dialogue]]
speaker = "レイラ"
# 「ふぅ、満足。ご馳走さまでした」
line = "「ふぅ、満足。ご馳走さまでした」"

[[dialogue]]
speaker = "レイラ"
# 「『潮風に　箸が止まらぬ　バーベキュー』──レイラ、心の一句」
line = "「『潮風に　箸が止まらぬ　バーベキュー』──レイラ、心の一句」"

[[dialogue]]
speaker = "unk"
# 俳句の出来はともかく、喜んでくれたようだ。レイラのひゅごひゅごに負けないよう肉を焼いた甲斐がある。
line = "俳句の出来はともかく、喜んでくれたようだ。レイラのひゅごひゅごに負けないよう肉を焼いた甲斐がある。"

[[dialogue]]
speaker = "レイラ"
# 「私ばっかり食べててごめんなさい。今度、私もご馳走しますね。魔獣を焼くのは得意なんです」
line = "「私ばっかり食べててごめんなさい。今度、私もご馳走しますね。魔獣を焼くのは得意なんです」"

[[dialogue]]
speaker = "レイラ"
# 「コラプサーのみんなと魔界にいた頃は、いろんな魔獣を狩って食べていました。私が戦うと可食部がなくなるので、もっぱら火の番と焼く係をしていたんです」
line = "「コラプサーのみんなと魔界にいた頃は、いろんな魔獣を狩って食べていました。私が戦うと可食部がなくなるので、もっぱら火の番と焼く係をしていたんです」"

[[dialogue]]
speaker = "レイラ"
# 「魔界つくしや魔界タンポポも食べたことありますよ。見た目は怖いけど、味は美味しかったです」
line = "「魔界つくしや魔界タンポポも食べたことありますよ。見た目は怖いけど、味は美味しかったです」"

[[dialogue]]
speaker = "レイラ"
# 「ふふっ、なんだか不思議ですね。両親といた頃の私は、世間知らずのお嬢様でしたけど、今は６本足の魔獣の味も知っているんですから」
line = "「ふふっ、なんだか不思議ですね。両親といた頃の私は、世間知らずのお嬢様でしたけど、今は６本足の魔獣の味も知っているんですから」"

[[dialogue]]
speaker = "レイラ"
# 「両親が亡くなって、星騎士にもなれなくて……私は全てを諦めました」
line = "「両親が亡くなって、星騎士にもなれなくて……私は全てを諦めました」"

[[dialogue]]
speaker = "unk"
# レイラの視線が海岸線を走る。何を思い出しているのかは、俺には分からない。
line = "レイラの視線が海岸線を走る。何を思い出しているのかは、俺には分からない。"

[[dialogue]]
speaker = "レイラ"
# 「でも死に損なって、あの人に出会いました。魔法で吊り上げられて、星空が足元に広がっていたのをよく覚えています」
line = "「でも死に損なって、あの人に出会いました。魔法で吊り上げられて、星空が足元に広がっていたのをよく覚えています」"

[[dialogue]]
speaker = "レイラ"
# 「それから、あの人に導かれて、コラプサーのみんなに出会って……あなたと敵として対峙しました」
line = "「それから、あの人に導かれて、コラプサーのみんなに出会って……あなたと敵として対峙しました」"

[[dialogue]]
speaker = "レイラ"
# 「今はそのあなたと星空を見上げている。この星空を、私はずっと忘れないと思います」
line = "「今はそのあなたと星空を見上げている。この星空を、私はずっと忘れないと思います」"

[[dialogue]]
speaker = "レイラ"
# 「魔王さん。どうか、これからも、私と一緒にいてくれますか？」
line = "「魔王さん。どうか、これからも、私と一緒にいてくれますか？」"

[[dialogue]]
speaker = "unk"
# この星空に誓うよ
line = "この星空に誓うよ"

[[dialogue]]
speaker = "レイラ"
# 「はい。私もあなたへの想いをこの星空に誓います」
line = "「はい。私もあなたへの想いをこの星空に誓います」"

[[dialogue]]
speaker = "unk"
# レイラの顔が近付く。
line = "レイラの顔が近付く。"

[[dialogue]]
speaker = "unk"
# そして──
line = "そして──"

[[dialogue]]
speaker = "レイラ"
# 「ちゅっ」
line = "「ちゅっ」"

[[dialogue]]
speaker = "unk"
# ほんのりバーべキュー味のキスをした。
line = "ほんのりバーべキュー味のキスをした。"
