[[dialogue]]
speaker = "unk"
# 第４話,ルリエルのガイドブック,P
line = "第４話,ルリエルのガイドブック,P"

[[dialogue]]
speaker = "unk"
# 休日の朝早くからルリエルに呼び出された俺は、流星学園の校門前に向かった。
line = "休日の朝早くからルリエルに呼び出された俺は、流星学園の校門前に向かった。"

[[dialogue]]
speaker = "ルリエル"
# 「会長さん！　おはようございます～っ、来てくれて助かりました！」
line = "「会長さん！　おはようございます～っ、来てくれて助かりました！」"

[[dialogue]]
speaker = "ルリエル"
# 「今日はぜひとも会長さんに、ガイドブック作りのお手伝いしてもらいたいと思いまして……！」
line = "「今日はぜひとも会長さんに、ガイドブック作りのお手伝いしてもらいたいと思いまして……！」"

[[dialogue]]
speaker = "unk"
# ガイドブックを……作る？
line = "ガイドブックを……作る？"

[[dialogue]]
speaker = "ルリエル"
# 「はいです。いつも持ってるロロットさんのガイドブック、とっても便利なのですよ」
line = "「はいです。いつも持ってるロロットさんのガイドブック、とっても便利なのですよ」"

[[dialogue]]
speaker = "ルリエル"
# 「人間界の常識や、たくさんのことわざが載っていて素晴らしいので……それの流星市国バージョンを作りたいな～っと思ったのです！」
line = "「人間界の常識や、たくさんのことわざが載っていて素晴らしいので……それの流星市国バージョンを作りたいな～っと思ったのです！」"

[[dialogue]]
speaker = "unk"
# 面白そうだね。手伝うよ
line = "面白そうだね。手伝うよ"

[[dialogue]]
speaker = "ルリエル"
# 「ありがとうございます、なのです！　今日はまず、流星と新星の両学園のページを充実させたいなと思っています～♪」
line = "「ありがとうございます、なのです！　今日はまず、流星と新星の両学園のページを充実させたいなと思っています～♪」"

[[dialogue]]
speaker = "ルリエル"
# 「それでは、出発しましょう！」
line = "「それでは、出発しましょう！」"

[[dialogue]]
speaker = "ルリエル"
# 「まずは流星学園の星徒会室から。ルリエルたち星徒会メンバーがどんなお仕事をしているのか、書いちゃうのです」
line = "「まずは流星学園の星徒会室から。ルリエルたち星徒会メンバーがどんなお仕事をしているのか、書いちゃうのです」"

[[dialogue]]
speaker = "ルリエル"
# 「特に、凛々しくって頼りになるフィオナ会長のことは、いっぱいページを割いて説明するのです～♪」
line = "「特に、凛々しくって頼りになるフィオナ会長のことは、いっぱいページを割いて説明するのです～♪」"

[[dialogue]]
speaker = "unk"
# ルリエルの字って……
line = "ルリエルの字って……"

[[dialogue]]
speaker = "ルリエル"
# 「ちょ、ちょっと下手かもしれませんがっ。これはまだ下書きですから、いいのですっ！」
line = "「ちょ、ちょっと下手かもしれませんがっ。これはまだ下書きですから、いいのですっ！」"

[[dialogue]]
speaker = "ルリエル"
# 「『何か困ったことがあれば、星徒会室に来るべきです……あと、お客さんには美味しいお茶菓子が出ます』……っと」
line = "「『何か困ったことがあれば、星徒会室に来るべきです……あと、お客さんには美味しいお茶菓子が出ます』……っと」"

[[dialogue]]
speaker = "ルリエル"
# 「うん、こんな感じですね。我ながらいい出来なのです。さぁ会長さん、次の場所へ行きましょう～♪」
line = "「うん、こんな感じですね。我ながらいい出来なのです。さぁ会長さん、次の場所へ行きましょう～♪」"

[[dialogue]]
speaker = "ルリエル"
# 「学園生活の憩いの場。カフェテリアの解説は欠かせません！　特にアフタヌーンティーと一緒に出るケーキが最高なのですぅ～♪」
line = "「学園生活の憩いの場。カフェテリアの解説は欠かせません！　特にアフタヌーンティーと一緒に出るケーキが最高なのですぅ～♪」"

[[dialogue]]
speaker = "ルリエル"
# 「ルリエルのおすすめもいっぱい書いちゃいます。これで初めて訪れた方も迷わずにすむのですよ」
line = "「ルリエルのおすすめもいっぱい書いちゃいます。これで初めて訪れた方も迷わずにすむのですよ」"

[[dialogue]]
speaker = "ルリエル"
# 「筆が乗ってきちゃいました。よぉし、お次は新星学園の方にも突撃取材です！　会長さん、案内をお願いします～♪」
line = "「筆が乗ってきちゃいました。よぉし、お次は新星学園の方にも突撃取材です！　会長さん、案内をお願いします～♪」"

[[dialogue]]
speaker = "ルリエル"
# 「新星学園の星徒会室も、広くて素敵です～♪　ここは流星学園と双璧を為す学び舎で……」
line = "「新星学園の星徒会室も、広くて素敵です～♪　ここは流星学園と双璧を為す学び舎で……」"

[[dialogue]]
speaker = "ルリエル"
# 「あ、会長さん。ここで食べられる美味しいものって何でしょうか？」
line = "「あ、会長さん。ここで食べられる美味しいものって何でしょうか？」"

[[dialogue]]
speaker = "unk"
# グルメレポートになってない？
line = "グルメレポートになってない？"

[[dialogue]]
speaker = "ルリエル"
# 「大事なことなのですよっ！　流星市国に来て、右も左もわからない人のためのガイドブックなのですから」
line = "「大事なことなのですよっ！　流星市国に来て、右も左もわからない人のためのガイドブックなのですから」"

[[dialogue]]
speaker = "ルリエル"
# 「あちこちを歩き回ってお腹がぺこぺこの方はきっと多いのです。さー、新星学園の星徒会室で食べられる美味しいものを教えてくださいっ」
line = "「あちこちを歩き回ってお腹がぺこぺこの方はきっと多いのです。さー、新星学園の星徒会室で食べられる美味しいものを教えてくださいっ」"

[[dialogue]]
speaker = "unk"
# そうして、ルリエルのガイドブック（？）作りに同伴し、学園のいろいろなところを回っているうちに、時間はあっという間に過ぎて──
line = "そうして、ルリエルのガイドブック（？）作りに同伴し、学園のいろいろなところを回っているうちに、時間はあっという間に過ぎて──"

[[dialogue]]
speaker = "ルリエル"
# 「すっかり日が暮れちゃいましたね、会長さん。でも大収穫なのです♪」
line = "「すっかり日が暮れちゃいましたね、会長さん。でも大収穫なのです♪」"

[[dialogue]]
speaker = "ルリエル"
# 「学園の見どころスポットがいっぱいまとまっちゃいました。これがあればきっと、新しくやってきた天使さんも迷わずにすみますね♪」
line = "「学園の見どころスポットがいっぱいまとまっちゃいました。これがあればきっと、新しくやってきた天使さんも迷わずにすみますね♪」"

[[dialogue]]
speaker = "ルリエル"
# 「今回の事件みたいに、またリクリエの影響で異世界からやって来る方が現れるかもしれませんし……」
line = "「今回の事件みたいに、またリクリエの影響で異世界からやって来る方が現れるかもしれませんし……」"

[[dialogue]]
speaker = "ルリエル"
# 「ルリエルみたいに、天界の田舎から来る子も大勢いるはずです。ふふ、その方たちにこのガイドブックを配るのです！」
line = "「ルリエルみたいに、天界の田舎から来る子も大勢いるはずです。ふふ、その方たちにこのガイドブックを配るのです！」"

[[dialogue]]
speaker = "unk"
# いいアイデアだと思う
line = "いいアイデアだと思う"

[[dialogue]]
speaker = "ルリエル"
# 「えへへ！　田舎のじっちゃんとばっちゃんにも言われましたから。三界をつなぐ柱のような天使になれ……って」
line = "「えへへ！　田舎のじっちゃんとばっちゃんにも言われましたから。三界をつなぐ柱のような天使になれ……って」"

[[dialogue]]
speaker = "ルリエル"
# 「でも今度の一件、ルリエルの考えは改まりました。三界以外の方がやってくることだってあります」
line = "「でも今度の一件、ルリエルの考えは改まりました。三界以外の方がやってくることだってあります」"

[[dialogue]]
speaker = "ルリエル"
# 「困っている方を少しでも手助けしたいな～って思ったんです。このガイドブック、まだまだ完成には程遠いですが……」
line = "「困っている方を少しでも手助けしたいな～って思ったんです。このガイドブック、まだまだ完成には程遠いですが……」"

[[dialogue]]
speaker = "ルリエル"
# 「いつか絶対に『実話・人間界バージョン２』を完成させるのですよ。学園の外のデータも網羅した素晴らしい本にするのです♪」
line = "「いつか絶対に『実話・人間界バージョン２』を完成させるのですよ。学園の外のデータも網羅した素晴らしい本にするのです♪」"

[[dialogue]]
speaker = "ルリエル"
# 「明日からは町の各地を巡って、ページを増やしていく予定ですので。お手伝い、よろしくお願いします、なのです♪」
line = "「明日からは町の各地を巡って、ページを増やしていく予定ですので。お手伝い、よろしくお願いします、なのです♪」"

[[dialogue]]
speaker = "unk"
# 流星市国のあらゆる場所を巡って、分厚いガイドブックを作ろうと張り切るルリエル。
line = "流星市国のあらゆる場所を巡って、分厚いガイドブックを作ろうと張り切るルリエル。"

[[dialogue]]
speaker = "unk"
# この作業が終わるのは当分先になりそうだけれど──異世界との交流を通して、天使ルリエルは少しばかり広い視野を手に入れたみたいだ。
line = "この作業が終わるのは当分先になりそうだけれど──異世界との交流を通して、天使ルリエルは少しばかり広い視野を手に入れたみたいだ。"

[[dialogue]]
speaker = "unk"
# 俺も置いて行かれないように気合いを入れないとな、と思うのだった。
line = "俺も置いて行かれないように気合いを入れないとな、と思うのだった。"
