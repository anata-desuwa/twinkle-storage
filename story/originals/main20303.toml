[[dialogue]]
speaker = "unk"
# 第３話,覚醒した力,B
line = "第３話,覚醒した力,B"

[[dialogue]]
speaker = "梨緒"
# 「この……！」
line = "「この……！」"

[[dialogue]]
speaker = "unk"
# 稲妻を帯びた矢が雷鳴とともに迸る。
line = "稲妻を帯びた矢が雷鳴とともに迸る。"

[[dialogue]]
speaker = "unk"
# だが仮面の騎士は大剣を軽々と扱い、矢を容易く切り落とした。
line = "だが仮面の騎士は大剣を軽々と扱い、矢を容易く切り落とした。"

[[dialogue]]
speaker = "ジグ"
# 「君の攻撃は読みやすいね、性格が表れているのかな。それに──」
line = "「君の攻撃は読みやすいね、性格が表れているのかな。それに──」"

[[dialogue]]
speaker = "ナターシャ"
# 「あぐっ──」
line = "「あぐっ──」"

[[dialogue]]
speaker = "unk"
# 音もなく忍び寄ったナターシャを、ジグがあっけなく返り討ちにした。
line = "音もなく忍び寄ったナターシャを、ジグがあっけなく返り討ちにした。"

[[dialogue]]
speaker = "ジグ"
# 「隙を見せたら斬りかかってくるってわかってたよ。速いけど素直すぎる」
line = "「隙を見せたら斬りかかってくるってわかってたよ。速いけど素直すぎる」"

[[dialogue]]
speaker = "ジグ"
# 「でもすごいね、気配をほとんど感じなかった。暗殺者みたいだ」
line = "「でもすごいね、気配をほとんど感じなかった。暗殺者みたいだ」"

[[dialogue]]
speaker = "ナターシャ"
# 「みたいじゃなくて本物。気付かれちゃったのは不覚だけどね」
line = "「みたいじゃなくて本物。気付かれちゃったのは不覚だけどね」"

[[dialogue]]
speaker = "ジグ"
# 「へぇ、暗殺者なんて本当にいるんだ」
line = "「へぇ、暗殺者なんて本当にいるんだ」"

[[dialogue]]
speaker = "ジグ"
# 「でも暗殺者なら、命を取られる覚悟もできてるよね？」
line = "「でも暗殺者なら、命を取られる覚悟もできてるよね？」"

[[dialogue]]
speaker = "unk"
# ナターシャの首めがけ、容赦なく大剣が振り下ろされる。
line = "ナターシャの首めがけ、容赦なく大剣が振り下ろされる。"

[[dialogue]]
speaker = "ベアトリス"
# 「させませんっ！」
line = "「させませんっ！」"

[[dialogue]]
speaker = "unk"
# しかし寸でのところで、槍を伸ばしていたベアトリスが刃を弾く。
line = "しかし寸でのところで、槍を伸ばしていたベアトリスが刃を弾く。"

[[dialogue]]
speaker = "unk"
# その隙にアポロがナターシャを剣の間合いから離脱させた。
line = "その隙にアポロがナターシャを剣の間合いから離脱させた。"

[[dialogue]]
speaker = "アポロ"
# 「大丈夫か、ナターシャ？」
line = "「大丈夫か、ナターシャ？」"

[[dialogue]]
speaker = "ナターシャ"
# 「ありがと。けっこう痛かったけどまだ戦う分には支障ないかな」
line = "「ありがと。けっこう痛かったけどまだ戦う分には支障ないかな」"

[[dialogue]]
speaker = "ジグ"
# 「助け合いか……そういうのも悪くないね。でも敵は私だけじゃないよ？」
line = "「助け合いか……そういうのも悪くないね。でも敵は私だけじゃないよ？」"

[[dialogue]]
speaker = "ドラケルス"
# 「グルルル！」
line = "「グルルル！」"

[[dialogue]]
speaker = "アポロ"
# 「ここはあたしがやる！」
line = "「ここはあたしがやる！」"

[[dialogue]]
speaker = "unk"
# 唸る機械型モンスターを、流星の閃きを宿した刃が真っ二つに切り裂いた。
line = "唸る機械型モンスターを、流星の閃きを宿した刃が真っ二つに切り裂いた。"

[[dialogue]]
speaker = "ジグ"
# 「お見事。でも私の仲間もまだまだいるよ」
line = "「お見事。でも私の仲間もまだまだいるよ」"

[[dialogue]]
speaker = "ドラケルス"
# 「グルルゥ……！」
line = "「グルルゥ……！」"

[[dialogue]]
speaker = "アポロ"
# 「くっ……次から次へと……切りがないな！」
line = "「くっ……次から次へと……切りがないな！」"

[[dialogue]]
speaker = "unk"
# アポロを圧殺せんと、モンスターの群れが迫りくる。
line = "アポロを圧殺せんと、モンスターの群れが迫りくる。"

[[dialogue]]
speaker = "unk"
# 機械型モンスターと正面からまともに戦える星騎士は一握り。そんな強敵が殺到すれば、魔王の力を持つアポロとて一蹴することはできない。
line = "機械型モンスターと正面からまともに戦える星騎士は一握り。そんな強敵が殺到すれば、魔王の力を持つアポロとて一蹴することはできない。"

[[dialogue]]
speaker = "ジグ"
# 「じゃあ、今のうちに先輩から堕とさせてもらおうかな──」
line = "「じゃあ、今のうちに先輩から堕とさせてもらおうかな──」"

[[dialogue]]
speaker = "梨緒"
# 「はぁ、はぁ……ジグ、君の相手は、私だ……！」
line = "「はぁ、はぁ……ジグ、君の相手は、私だ……！」"

[[dialogue]]
speaker = "ジグ"
# 「さっきも私を知っているような口ぶりだったけど、どこかで会ったかい？」
line = "「さっきも私を知っているような口ぶりだったけど、どこかで会ったかい？」"

[[dialogue]]
speaker = "梨緒"
# 「君は新星学園の星徒会長で、私は副会長だった。忘れたとは言わせないぞ！」
line = "「君は新星学園の星徒会長で、私は副会長だった。忘れたとは言わせないぞ！」"

[[dialogue]]
speaker = "ジグ"
# 「忘れたなぁ。世界を導く使命のために、私は生まれ変わったからね」
line = "「忘れたなぁ。世界を導く使命のために、私は生まれ変わったからね」"

[[dialogue]]
speaker = "梨緒"
# 「っ……」
line = "「っ……」"

[[dialogue]]
speaker = "unk"
# ジグを見つめるその目は潤み、涙をこらえるように唇を噛む。
line = "ジグを見つめるその目は潤み、涙をこらえるように唇を噛む。"

[[dialogue]]
speaker = "ベアトリス"
# 「梨緒ちゃんをいじめるのは許しません！」
line = "「梨緒ちゃんをいじめるのは許しません！」"

[[dialogue]]
speaker = "ジグ"
# 「本当に覚えがないし、別にいじめてるつもりはないんだけど」
line = "「本当に覚えがないし、別にいじめてるつもりはないんだけど」"

[[dialogue]]
speaker = "ジグ"
# 「まぁいいや。“真なる神”に仕える者として、仕事をさせてもらうよ」
line = "「まぁいいや。“真なる神”に仕える者として、仕事をさせてもらうよ」"

[[dialogue]]
speaker = "チナ"
# 「スパイラルブレイク！」
line = "「スパイラルブレイク！」"

[[dialogue]]
speaker = "unk"
# 暴風とともに槍が駆けた。
line = "暴風とともに槍が駆けた。"

[[dialogue]]
speaker = "unk"
# 音速を超えた速度に反応しきれず、右肩にもろに食らってしまう。
line = "音速を超えた速度に反応しきれず、右肩にもろに食らってしまう。"

[[dialogue]]
speaker = "チナ"
# 「チッ、今のでも仕留めきれなかったか……魔王はしぶといな」
line = "「チッ、今のでも仕留めきれなかったか……魔王はしぶといな」"

[[dialogue]]
speaker = "チナ"
# 「ていうかお前、さっきなんて言った？　アタシがリクリエの使徒？」
line = "「ていうかお前、さっきなんて言った？　アタシがリクリエの使徒？」"

[[dialogue]]
speaker = "チナ"
# 「魔王がそれを言うか？　世界を滅ぼすのは……お前だろうがっ！！」
line = "「魔王がそれを言うか？　世界を滅ぼすのは……お前だろうがっ！！」"

[[dialogue]]
speaker = "クロト"
# 「くぅぅっ……！！」
line = "「くぅぅっ……！！」"

[[dialogue]]
speaker = "マトイ"
# 「緋宮くんっ！？」
line = "「緋宮くんっ！？」"

[[dialogue]]
speaker = "unk"
# 動きが鈍ったところにもう一撃もらった。意識が飛びかける。
line = "動きが鈍ったところにもう一撃もらった。意識が飛びかける。"

[[dialogue]]
speaker = "クロト"
# （まずい……な……）
line = "（まずい……な……）"

[[dialogue]]
speaker = "unk"
# 魔王の力に及ばずとも、自分の星力だけで戦えるようになった。
line = "魔王の力に及ばずとも、自分の星力だけで戦えるようになった。"

[[dialogue]]
speaker = "unk"
# だがそれでは足りない。彼女はただ単純に──強い。
line = "だがそれでは足りない。彼女はただ単純に──強い。"

[[dialogue]]
speaker = "unk"
# それに──
line = "それに──"

[[dialogue]]
speaker = "unk"
# 追い詰められれば追い詰められるほど、俺の中のリクリエが疼く。
line = "追い詰められれば追い詰められるほど、俺の中のリクリエが疼く。"

[[dialogue]]
speaker = "unk"
# 宿主を守ろうとしているのか……いや、俺の窮地を虎視眈々と狙っているのか。
line = "宿主を守ろうとしているのか……いや、俺の窮地を虎視眈々と狙っているのか。"

[[dialogue]]
speaker = "unk"
# このままでは俺がやられる前に、リクリエの力が目覚めてしまうかもしれない。
line = "このままでは俺がやられる前に、リクリエの力が目覚めてしまうかもしれない。"

[[dialogue]]
speaker = "チナ"
# 「アタシはただの星騎士だ！！　お前みたいな厄災の化身と一緒にするんじゃねえ！！」
line = "「アタシはただの星騎士だ！！　お前みたいな厄災の化身と一緒にするんじゃねえ！！」"

[[dialogue]]
speaker = "クロト"
# （厄災の化身か……否定できないな）
line = "（厄災の化身か……否定できないな）"

[[dialogue]]
speaker = "unk"
# この身に封じたリクリエと、ラクシスが持っていた世界を超える力。
line = "この身に封じたリクリエと、ラクシスが持っていた世界を超える力。"

[[dialogue]]
speaker = "unk"
# ２つも暴走の要因を抱えていれば、強がりでも否定するのは難しい。
line = "２つも暴走の要因を抱えていれば、強がりでも否定するのは難しい。"

[[dialogue]]
speaker = "ヴィーナス"
# 「どきなさい！　セイクリッドスフィア！」
line = "「どきなさい！　セイクリッドスフィア！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「邪魔しないでって言ってるでしょ！」
line = "「邪魔しないでって言ってるでしょ！」"

[[dialogue]]
speaker = "unk"
# 俺を助けようとしたヴィーナスをガーディアンが阻む。
line = "俺を助けようとしたヴィーナスをガーディアンが阻む。"

[[dialogue]]
speaker = "unk"
# そればかりか──
line = "そればかりか──"

[[dialogue]]
speaker = "マトイ"
# 「ッ…………！！」
line = "「ッ…………！！」"

[[dialogue]]
speaker = "サーシャ"
# 「マトイちゃん、まだ持ちこたえられる？」
line = "「マトイちゃん、まだ持ちこたえられる？」"

[[dialogue]]
speaker = "マトイ"
# 「はい、なんとか……！」
line = "「はい、なんとか……！」"

[[dialogue]]
speaker = "unk"
# 星徒会役員たちもガーディアンの猛攻に押されつつあった。
line = "星徒会役員たちもガーディアンの猛攻に押されつつあった。"

[[dialogue]]
speaker = "アナ"
# 「他の場所でもガーティアンが現れていて、流星星徒会はそちらの対応に当たっているそうです……！」
line = "「他の場所でもガーティアンが現れていて、流星星徒会はそちらの対応に当たっているそうです……！」"

[[dialogue]]
speaker = "アナ"
# 「星徒会以外のプリマステラも各地で交戦中。援軍を期待するのは難しい！」
line = "「星徒会以外のプリマステラも各地で交戦中。援軍を期待するのは難しい！」"

[[dialogue]]
speaker = "アナ"
# 「会長は正体不明の敵に押され、私たちもガーディアンの攻撃を凌ぐので精いっぱい。戦況は圧倒的に不利ですっ」
line = "「会長は正体不明の敵に押され、私たちもガーディアンの攻撃を凌ぐので精いっぱい。戦況は圧倒的に不利ですっ」"

[[dialogue]]
speaker = "unk"
# アナが敵の攻撃をさばきながら、冷静な状況判断を告げる。
line = "アナが敵の攻撃をさばきながら、冷静な状況判断を告げる。"

[[dialogue]]
speaker = "unk"
# 圧倒的な不利──それは誰にも否定しようがない事実だった。
line = "圧倒的な不利──それは誰にも否定しようがない事実だった。"

[[dialogue]]
speaker = "マトイ"
# 「でも、今の私たちには奥の手がある……！」
line = "「でも、今の私たちには奥の手がある……！」"

[[dialogue]]
speaker = "サーシャ"
# 「やるしかないわね～」
line = "「やるしかないわね～」"

[[dialogue]]
speaker = "アナ"
# 「リスクはありますが──ここが切り札を出すタイミングでしょう」
line = "「リスクはありますが──ここが切り札を出すタイミングでしょう」"

[[dialogue]]
speaker = "unk"
# マトイ、サーシャ、アナが目を合わせて頷く。
line = "マトイ、サーシャ、アナが目を合わせて頷く。"

[[dialogue]]
speaker = "unk"
# そして──
line = "そして──"

[[dialogue]]
speaker = "３人"
# 「チェンジ・ノヴァフォーム！！！」
line = "「チェンジ・ノヴァフォーム！！！」"

[[dialogue]]
speaker = "チナ"
# 「姿が変わった──！？」
line = "「姿が変わった──！？」"

[[dialogue]]
speaker = "unk"
# それは魔王と絆を結び、そして己が限界を超えた者が辿り着ける境地。
line = "それは魔王と絆を結び、そして己が限界を超えた者が辿り着ける境地。"

[[dialogue]]
speaker = "unk"
# 魔王の因子を触媒にして、爆発的に力を高める切り札。
line = "魔王の因子を触媒にして、爆発的に力を高める切り札。"

[[dialogue]]
speaker = "unk"
# だがその分消耗が激しく、星力を瞬く間に使い切ってしまう諸刃の剣でもある。
line = "だがその分消耗が激しく、星力を瞬く間に使い切ってしまう諸刃の剣でもある。"

[[dialogue]]
speaker = "チナ"
# 「魔王のおまけ風情が！」
line = "「魔王のおまけ風情が！」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「リフレクトゴッデスカリバー！」
line = "「リフレクトゴッデスカリバー！」"

[[dialogue]]
speaker = "unk"
# マトイの一閃を受けたガーディアンが真っ二つになって消える。
line = "マトイの一閃を受けたガーディアンが真っ二つになって消える。"

[[dialogue]]
speaker = "unk"
# 周囲を取り囲むようににじり寄っていた他のガーディアンたちも、アナとサーシャさんの一撃によって次々に消滅していった。
line = "周囲を取り囲むようににじり寄っていた他のガーディアンたちも、アナとサーシャさんの一撃によって次々に消滅していった。"

[[dialogue]]
speaker = "チナ"
# 「！！　極星従騎が一撃で……」
line = "「！！　極星従騎が一撃で……」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「私なんて、緋宮くんやフィオナさんみたいな魔王に比べたら、確かにおまけみたいなものかもしれない」
line = "「私なんて、緋宮くんやフィオナさんみたいな魔王に比べたら、確かにおまけみたいなものかもしれない」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「でも無力なんかじゃない！　おまけだって無いより有った方がマシなんだから！」
line = "「でも無力なんかじゃない！　おまけだって無いより有った方がマシなんだから！」"

[[dialogue]]
speaker = "アナ（覚醒）"
# 「おまけは否定しないんですね」
line = "「おまけは否定しないんですね」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「マトイちゃんは相変わらずちょっとネガティブね～」
line = "「マトイちゃんは相変わらずちょっとネガティブね～」"

[[dialogue]]
speaker = "チナ"
# 「ぐっ……だからどうした！　アタシは……アタシたちは負けない！」
line = "「ぐっ……だからどうした！　アタシは……アタシたちは負けない！」"

[[dialogue]]
speaker = "チナ"
# 「ノヴァだか何だか知らないが、まとめて貫いてやるっ！！」
line = "「ノヴァだか何だか知らないが、まとめて貫いてやるっ！！」"
