[[dialogue]]
speaker = "unk"
# クリスマスも近づいてきた、ある日のこと――
line = "クリスマスも近づいてきた、ある日のこと――"

[[dialogue]]
speaker = "紅明"
# 「ダーリン、おはよ～っ！」
line = "「ダーリン、おはよ～っ！」"

[[dialogue]]
speaker = "unk"
# やあ、紅明。今日も元気だね
line = "やあ、紅明。今日も元気だね"

[[dialogue]]
speaker = "紅明"
# 「おうともさ☆　アタシは元気と笑顔が取り柄だからね♪」
line = "「おうともさ☆　アタシは元気と笑顔が取り柄だからね♪」"

[[dialogue]]
speaker = "unk"
# 彼女は、<ruby=ぎゅうこうめい>牛紅明</ruby>。乳性エナジードリンク『ホルスタミン』をはじめ、乳製品を販売する有名メーカー『善哉乳業』を営む牛一族の社長令嬢だ。
line = "彼女は、<ruby>牛紅明<rt>ぎゅうこうめい</rt></ruby>。乳性エナジードリンク『ホルスタミン』をはじめ、乳製品を販売する有名メーカー『善哉乳業』を営む牛一族の社長令嬢だ。"

[[dialogue]]
speaker = "unk"
# 彼女自身も、流星市国と日本において高い知名度を誇る有名タレントで、『見るエナジードリンク』『ホルスタミンの擬人化』と言われる、元気が魅力的な女の子である。
line = "彼女自身も、流星市国と日本において高い知名度を誇る有名タレントで、『見るエナジードリンク』『ホルスタミンの擬人化』と言われる、元気が魅力的な女の子である。"

[[dialogue]]
speaker = "紅明"
# 「ん～？　今日はどうしたのかって？　実は、ダーリンにお願いがあってさ……」
line = "「ん～？　今日はどうしたのかって？　実は、ダーリンにお願いがあってさ……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ク～ロ～ト～！」
line = "「ク～ロ～ト～！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「報告があるの！　あっ、紅明！　来てたのね♪」
line = "「報告があるの！　あっ、紅明！　来てたのね♪」"

[[dialogue]]
speaker = "紅明"
# 「ヴィナちー、おいっす☆　って、おや？　そちらの可愛い天使ちゃんは？」
line = "「ヴィナちー、おいっす☆　って、おや？　そちらの可愛い天使ちゃんは？」"

[[dialogue]]
speaker = "セシア"
# 「じ～っ……」
line = "「じ～っ……」"

[[dialogue]]
speaker = "紅明"
# 「初めて見る子だけど……」
line = "「初めて見る子だけど……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そう、ちょうどこの子のことで、クロトに報告しにきたところなのよ！　実は私、先週末に街で――」
line = "「そう、ちょうどこの子のことで、クロトに報告しにきたところなのよ！　実は私、先週末に街で――」"

[[dialogue]]
speaker = "ヴィーナス"
# 「この迷子の天使を拾ったの！」
line = "「この迷子の天使を拾ったの！」"

[[dialogue]]
speaker = "unk"
# いや、拾ったって！？
line = "いや、拾ったって！？"

[[dialogue]]
speaker = "セシア"
# 「初めまして。あなたがこの学園の星徒会長ね？」
line = "「初めまして。あなたがこの学園の星徒会長ね？」"

[[dialogue]]
speaker = "セシア"
# 「わたくしの名前は、セシアよ。どうやら、天使らしいわ」
line = "「わたくしの名前は、セシアよ。どうやら、天使らしいわ」"

[[dialogue]]
speaker = "unk"
# どうやら……？
line = "どうやら……？"

[[dialogue]]
speaker = "セシア"
# 「わたくしは、気がついたら流星市国にいて、ヴィーナスに拾われるより以前の記憶がないの。どうも、記憶喪失というやつみたいで……」
line = "「わたくしは、気がついたら流星市国にいて、ヴィーナスに拾われるより以前の記憶がないの。どうも、記憶喪失というやつみたいで……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「１人でふらふらと夜の街中を歩いていたから、心配になって、声をかけたのよ」
line = "「１人でふらふらと夜の街中を歩いていたから、心配になって、声をかけたのよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「原因はわからないけど、名前以外は思い出せないみたいでね。とりあえず連れ帰って、九浄家の伝手を使って、素性を調べたんだけど……」
line = "「原因はわからないけど、名前以外は思い出せないみたいでね。とりあえず連れ帰って、九浄家の伝手を使って、素性を調べたんだけど……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「不思議なことに、セシアの情報は流星市国や日本のどこにも存在しないのよ。ＤＮＡ情報から追っても、何者かわからない――」
line = "「不思議なことに、セシアの情報は流星市国や日本のどこにも存在しないのよ。ＤＮＡ情報から追っても、何者かわからない――」"

[[dialogue]]
speaker = "ヴィーナス"
# 「まさに、謎の天使ね！」
line = "「まさに、謎の天使ね！」"

[[dialogue]]
speaker = "セシア"
# 「わたくし、最初は羽やヘイローもなかったの。途中から現れて、その時になって、わたくしは天使だったんだと思い出したのよ」
line = "「わたくし、最初は羽やヘイローもなかったの。途中から現れて、その時になって、わたくしは天使だったんだと思い出したのよ」"

[[dialogue]]
speaker = "紅明"
# 「え？　なんかそれって、生まれたばかりの天使の赤ちゃんみたいな……」
line = "「え？　なんかそれって、生まれたばかりの天使の赤ちゃんみたいな……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そう！　セシアは記憶だけじゃなくて、元々持っていた星力も失ってるみたいなの！　それでね――」
line = "「そう！　セシアは記憶だけじゃなくて、元々持っていた星力も失ってるみたいなの！　それでね――」"

[[dialogue]]
speaker = "ヴィーナス"
# 「どうやら、人が喜ぶ姿を見ると、星力が少しずつ戻っていくみたいだってわかったの！」
line = "「どうやら、人が喜ぶ姿を見ると、星力が少しずつ戻っていくみたいだってわかったの！」"

[[dialogue]]
speaker = "セシア"
# 「誰かが喜ぶ時に、その感情の一部が溢れて、わたくしの中に吸収されて、蓄積されていくのを感じるの。そうすると、わたくしの中に、前よりも強い力が湧いてくるのよ」
line = "「誰かが喜ぶ時に、その感情の一部が溢れて、わたくしの中に吸収されて、蓄積されていくのを感じるの。そうすると、わたくしの中に、前よりも強い力が湧いてくるのよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「で、私は思いついたの！　これを繰り返していけば、セシアはそのうち星力と一緒に、記憶も取り戻せるんじゃないかって！」
line = "「で、私は思いついたの！　これを繰り返していけば、セシアはそのうち星力と一緒に、記憶も取り戻せるんじゃないかって！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そして、もうすぐクリスマスじゃない？　沢山の人に喜んでもらえる、一石七面鳥なアイデアがあるわ！」
line = "「そして、もうすぐクリスマスじゃない？　沢山の人に喜んでもらえる、一石七面鳥なアイデアがあるわ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ズバリ、セシアがサンタになって、みんなにクリスマスプレゼントを配ればいいのよ！」
line = "「ズバリ、セシアがサンタになって、みんなにクリスマスプレゼントを配ればいいのよ！」"

[[dialogue]]
speaker = "紅明"
# 「おお～っ！　なるほど！　ヴィナちー、天才じゃん☆」
line = "「おお～っ！　なるほど！　ヴィナちー、天才じゃん☆」"

[[dialogue]]
speaker = "ヴィーナス"
# 「でしょ～♪　更にこれなら、セシアのことをみんなに紹介もできるしね！」
line = "「でしょ～♪　更にこれなら、セシアのことをみんなに紹介もできるしね！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「というわけで、まずはクロトに紹介しないと、と思って連れてきたのよ」
line = "「というわけで、まずはクロトに紹介しないと、と思って連れてきたのよ」"

[[dialogue]]
speaker = "unk"
# そういうことなら、俺も手伝うよ
line = "そういうことなら、俺も手伝うよ"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロトなら必ず、そう言ってくれるだろうって信じてたわ♪　ね、セシア。クロトなら快く力を貸してくれるって言ったでしょう？」
line = "「クロトなら必ず、そう言ってくれるだろうって信じてたわ♪　ね、セシア。クロトなら快く力を貸してくれるって言ったでしょう？」"

[[dialogue]]
speaker = "セシア"
# 「じ～っ……確かに、今のはプラス１ポイントね」
line = "「じ～っ……確かに、今のはプラス１ポイントね」"

[[dialogue]]
speaker = "unk"
# セシア、改めてよろしくね
line = "セシア、改めてよろしくね"

[[dialogue]]
speaker = "セシア"
# 「ええ。これからよろしくお願いするわ、会長」
line = "「ええ。これからよろしくお願いするわ、会長」"

[[dialogue]]
speaker = "ヴィーナス"
# 「２人が仲良く握手を交わしたところで、フィクサーとして改めて指令を出すわ！」
line = "「２人が仲良く握手を交わしたところで、フィクサーとして改めて指令を出すわ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロトにはセシアと一緒にプレゼント配りをして、記憶を取り戻す手伝いをしてあげて欲しいの！　名づけて――」
line = "「クロトにはセシアと一緒にプレゼント配りをして、記憶を取り戻す手伝いをしてあげて欲しいの！　名づけて――」"

[[dialogue]]
speaker = "ヴィーナス"
# 「サンタ大作戦よ！」
line = "「サンタ大作戦よ！」"

[[dialogue]]
speaker = "unk"
# そうして、俺はセシアの手伝いをすることになった――――のだが。
line = "そうして、俺はセシアの手伝いをすることになった――――のだが。"

[[dialogue]]
speaker = "紅明"
# 「待ちな！　その計画、誰か１人、忘れちゃあ……いないかい？」
line = "「待ちな！　その計画、誰か１人、忘れちゃあ……いないかい？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「紅明？」
line = "「紅明？」"

[[dialogue]]
speaker = "紅明"
# 「ヴィナちー、ダーリン、そして……セッシー！」
line = "「ヴィナちー、ダーリン、そして……セッシー！」"

[[dialogue]]
speaker = "セシア"
# 「セッシーって、わたくしのこと？」
line = "「セッシーって、わたくしのこと？」"

[[dialogue]]
speaker = "紅明"
# 「アタシもそのサンタ大作戦、１枚噛ませてもらうぜ！」
line = "「アタシもそのサンタ大作戦、１枚噛ませてもらうぜ！」"

[[dialogue]]
speaker = "unk"
# 紅明はグッと親指をサムズアップしながら、宣言するのだった――
line = "紅明はグッと親指をサムズアップしながら、宣言するのだった――"
