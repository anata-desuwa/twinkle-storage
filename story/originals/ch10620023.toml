[[dialogue]]
speaker = "unk"
# 第３話,お泊り明けの朝,P
line = "第３話,お泊り明けの朝,P"

[[dialogue]]
speaker = "unk"
# ジュエリーが俺の家に遊びに来ていた翌日。
line = "ジュエリーが俺の家に遊びに来ていた翌日。"

[[dialogue]]
speaker = "ジュエリー"
# 「ふわぁ～……眠い……」
line = "「ふわぁ～……眠い……」"

[[dialogue]]
speaker = "unk"
# ジュエリー、大丈夫？
line = "ジュエリー、大丈夫？"

[[dialogue]]
speaker = "ジュエリー"
# 「ああ。しかし、星騎士はこういう時、着替えがなくてもいいから便利だね。戦闘服に変身すれば済む」
line = "「ああ。しかし、星騎士はこういう時、着替えがなくてもいいから便利だね。戦闘服に変身すれば済む」"

[[dialogue]]
speaker = "ジュエリー"
# 「おっと、ぼーっと歩いている間に学園の前まで着いてしまった。助手、それではまたお昼休みにカフェテリアで」
line = "「おっと、ぼーっと歩いている間に学園の前まで着いてしまった。助手、それではまたお昼休みにカフェテリアで」"

[[dialogue]]
speaker = "unk"
# 俺は手を振ってジュエリーと別れ、新星学園の校舎へと向かった。
line = "俺は手を振ってジュエリーと別れ、新星学園の校舎へと向かった。"

[[dialogue]]
speaker = "ミネコ"
# 「あっ、ジュエリー、おはよ～♪」
line = "「あっ、ジュエリー、おはよ～♪」"

[[dialogue]]
speaker = "ミネコ"
# 「――って、あれ？　ジュエリー、どうして寮と反対方向から？　それに、さっき一緒に歩いてたのって会長だよね？」
line = "「――って、あれ？　ジュエリー、どうして寮と反対方向から？　それに、さっき一緒に歩いてたのって会長だよね？」"

[[dialogue]]
speaker = "ジュエリー"
# 「ん？　ああ……ここだけの話で秘密にして欲しいのだが、昨日は助手の家に泊まりだったんだ」
line = "「ん？　ああ……ここだけの話で秘密にして欲しいのだが、昨日は助手の家に泊まりだったんだ」"

[[dialogue]]
speaker = "ミネコ"
# 「えっ！？　そ、それって……」
line = "「えっ！？　そ、それって……」"

[[dialogue]]
speaker = "ジュエリー"
# 「大体想像がつくだろう？　つまりは……そういうことだ」
line = "「大体想像がつくだろう？　つまりは……そういうことだ」"

[[dialogue]]
speaker = "ミネコ"
# 「なっ……！？」
line = "「なっ……！？」"

[[dialogue]]
speaker = "ミネコ"
# 「そ、その……随分と眠そうだけど……そんなに夜遅くまでしてたの？」
line = "「そ、その……随分と眠そうだけど……そんなに夜遅くまでしてたの？」"

[[dialogue]]
speaker = "ジュエリー"
# 「いや……つい徹夜で、朝までしてしまったよ」
line = "「いや……つい徹夜で、朝までしてしまったよ」"

[[dialogue]]
speaker = "ミネコ"
# 「朝まで！？」
line = "「朝まで！？」"

[[dialogue]]
speaker = "ジュエリー"
# 「ふふっ、つい盛り上がってしまってね……」
line = "「ふふっ、つい盛り上がってしまってね……」"

[[dialogue]]
speaker = "ミネコ"
# 「そ、そんなにすごかったの……？」
line = "「そ、そんなにすごかったの……？」"

[[dialogue]]
speaker = "ジュエリー"
# 「ああ。今回は特にすごかった……。ミネコもやってみれば、すぐにわかるさ」
line = "「ああ。今回は特にすごかった……。ミネコもやってみれば、すぐにわかるさ」"

[[dialogue]]
speaker = "ミネコ"
# 「や、やってみればって……」
line = "「や、やってみればって……」"

[[dialogue]]
speaker = "ジュエリー"
# 「キミも興味があるだろう？　私たちと一緒にしてみればいい」
line = "「キミも興味があるだろう？　私たちと一緒にしてみればいい」"

[[dialogue]]
speaker = "ミネコ"
# 「３人で！？」
line = "「３人で！？」"

[[dialogue]]
speaker = "ミネコ"
# 「ちょ、ちょっと待って！　ジュエリーはそれでいいの！？」
line = "「ちょ、ちょっと待って！　ジュエリーはそれでいいの！？」"

[[dialogue]]
speaker = "ジュエリー"
# 「ん？　まあ、助手と２人きりでする時間は、もちろん譲りたくはないが……」
line = "「ん？　まあ、助手と２人きりでする時間は、もちろん譲りたくはないが……」"

[[dialogue]]
speaker = "ジュエリー"
# 「３人でするなら、別に構わないよ。助手も歓迎するだろうしね」
line = "「３人でするなら、別に構わないよ。助手も歓迎するだろうしね」"

[[dialogue]]
speaker = "ミネコ"
# 「歓迎しちゃうの！？」
line = "「歓迎しちゃうの！？」"

[[dialogue]]
speaker = "ジュエリー"
# 「それでどうする？　キミがよければ、今日の夜でも構わないが」
line = "「それでどうする？　キミがよければ、今日の夜でも構わないが」"

[[dialogue]]
speaker = "ミネコ"
# 「徹夜でしてたのに！？」
line = "「徹夜でしてたのに！？」"

[[dialogue]]
speaker = "ミネコ"
# 「……ちょっ――」
line = "「……ちょっ――」"

[[dialogue]]
speaker = "ミネコ"
# 「ちょっと……考えさせて欲しい……かな……」
line = "「ちょっと……考えさせて欲しい……かな……」"

[[dialogue]]
speaker = "unk"
# 昼休み、俺はいつも通りジュエリーと昼食をとろうと、カフェテリアで待っていると――
line = "昼休み、俺はいつも通りジュエリーと昼食をとろうと、カフェテリアで待っていると――"

[[dialogue]]
speaker = "ジュエリー"
# 「やあ、助手」
line = "「やあ、助手」"

[[dialogue]]
speaker = "unk"
# ジュエリー、元気な顔になったね
line = "ジュエリー、元気な顔になったね"

[[dialogue]]
speaker = "ジュエリー"
# 「ああ。恥ずかしながら、授業中にいつの間にか意識が飛んで、気づけば小一時間ほど居眠りしてしまっていてね……」
line = "「ああ。恥ずかしながら、授業中にいつの間にか意識が飛んで、気づけば小一時間ほど居眠りしてしまっていてね……」"

[[dialogue]]
speaker = "ジュエリー"
# 「しかし、そのおかげで随分と頭の中がスッキリして、思考が回るようになったよ」
line = "「しかし、そのおかげで随分と頭の中がスッキリして、思考が回るようになったよ」"

[[dialogue]]
speaker = "ミネコ"
# 「あっ……！　か、会長とジュエリー……！」
line = "「あっ……！　か、会長とジュエリー……！」"

[[dialogue]]
speaker = "ジュエリー"
# 「ああ、ミネコ。キミも一緒に昼食にするかい？」
line = "「ああ、ミネコ。キミも一緒に昼食にするかい？」"

[[dialogue]]
speaker = "ミネコ"
# 「え、えっと……その……」
line = "「え、えっと……その……」"

[[dialogue]]
speaker = "ミネコ"
# 「ま、まだ私は心の準備ができてないから、２人でごゆっくり～～～っ！」
line = "「ま、まだ私は心の準備ができてないから、２人でごゆっくり～～～っ！」"

[[dialogue]]
speaker = "unk"
# あれ？　ミネコ、一体どうしたんだ……？
line = "あれ？　ミネコ、一体どうしたんだ……？"

[[dialogue]]
speaker = "ジュエリー"
# 「ふむ……そういえば……」
line = "「ふむ……そういえば……」"

[[dialogue]]
speaker = "unk"
# ジュエリーはしばし考え込むような顔をした後……
line = "ジュエリーはしばし考え込むような顔をした後……"

[[dialogue]]
speaker = "ジュエリー"
# 「――もしかしたら、ミネコには変な勘違いをされているかもしれないな」
line = "「――もしかしたら、ミネコには変な勘違いをされているかもしれないな」"

[[dialogue]]
speaker = "ジュエリー"
# 「実は、今朝――」
line = "「実は、今朝――」"

[[dialogue]]
speaker = "unk"
# それから俺は、今朝ミネコとした会話の内容を聞かされた。
line = "それから俺は、今朝ミネコとした会話の内容を聞かされた。"

[[dialogue]]
speaker = "ジュエリー"
# 「――その時は眠気で考えが回らなかったが、もしかするとミネコは、昨日発売された新作ゲームとは別の意味に捉えたのかもしれない」
line = "「――その時は眠気で考えが回らなかったが、もしかするとミネコは、昨日発売された新作ゲームとは別の意味に捉えたのかもしれない」"

[[dialogue]]
speaker = "unk"
# そう、昨日はまたジュエリーが俺の家に遊びに来て、その日発売されたばかりの新作ゲームを２人で遊んでいたのだ。
line = "そう、昨日はまたジュエリーが俺の家に遊びに来て、その日発売されたばかりの新作ゲームを２人で遊んでいたのだ。"

[[dialogue]]
speaker = "unk"
# 巨大な敵を最大４人で狩る人気アクションゲームの最新作で、これが歴代で１番と言っていい程に出来がよく、２人して徹夜で熱中してしまったのだった。
line = "巨大な敵を最大４人で狩る人気アクションゲームの最新作で、これが歴代で１番と言っていい程に出来がよく、２人して徹夜で熱中してしまったのだった。"

[[dialogue]]
speaker = "unk"
# それは後で誤解を解かないと恥ずかしいな……
line = "それは後で誤解を解かないと恥ずかしいな……"

[[dialogue]]
speaker = "ジュエリー"
# 「助手の家にお泊りしてしまったのは事実だがね」
line = "「助手の家にお泊りしてしまったのは事実だがね」"

[[dialogue]]
speaker = "ジュエリー"
# 「――私が寮に帰るのを面倒臭いと言い出すから？」
line = "「――私が寮に帰るのを面倒臭いと言い出すから？」"

[[dialogue]]
speaker = "ジュエリー"
# 「ふふっ……昨日は本当に楽しかったのだから、仕方ないだろう？」
line = "「ふふっ……昨日は本当に楽しかったのだから、仕方ないだろう？」"

[[dialogue]]
speaker = "unk"
# 彼女はそう言うと、そっと顔を寄せて、耳元で囁く。
line = "彼女はそう言うと、そっと顔を寄せて、耳元で囁く。"

[[dialogue]]
speaker = "ジュエリー"
# 「キミとスキンシップするのもいいが……昨日はゲームを通してイチャイチャさせてもらったわけだ」
line = "「キミとスキンシップするのもいいが……昨日はゲームを通してイチャイチャさせてもらったわけだ」"

[[dialogue]]
speaker = "ジュエリー"
# 「あれほどゲームをするのが楽しいと感じたのは久しぶりだよ。キミも同じだったら嬉しいのだが……どうだったかな？」
line = "「あれほどゲームをするのが楽しいと感じたのは久しぶりだよ。キミも同じだったら嬉しいのだが……どうだったかな？」"

[[dialogue]]
speaker = "unk"
# 俺もすごく楽しかった
line = "俺もすごく楽しかった"

[[dialogue]]
speaker = "ジュエリー"
# 「そうか。ふふっ♪」
line = "「そうか。ふふっ♪」"

[[dialogue]]
speaker = "ジュエリー"
# 「なら、あながちミネコに言ったことも、間違いではないかもしれないな♪　それに――」
line = "「なら、あながちミネコに言ったことも、間違いではないかもしれないな♪　それに――」"

[[dialogue]]
speaker = "ジュエリー"
# 「今の内に慣れておけば……後で本当になった時に、言い訳が楽かもしれないよ？　……なんてね。ふふふっ<emoji=heart04>」
line = "「今の内に慣れておけば……後で本当になった時に、言い訳が楽かもしれないよ？　……なんてね。ふふふっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 言葉の意味を考えて、それがわかると、思わずドキドキしてしまう俺なのであった――
line = "言葉の意味を考えて、それがわかると、思わずドキドキしてしまう俺なのであった――"
