line = "今も夜空を覆い尽くす謎の<ruby>帳<rt>とばり</rt></ruby>。"

[[dialogue]]
speaker = "unk"
# あれの影響で、あらゆる星騎士がその力を失っているようだったが──俺だけは違う。
line = "あれの影響で、あらゆる星騎士がその力を失っているようだったが──俺だけは違う。"

[[dialogue]]
