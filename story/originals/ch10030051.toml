[[dialogue]]
speaker = "unk"
# 第１話,ヴィーナスは考えたい,P
line = "第１話,ヴィーナスは考えたい,P"

[[dialogue]]
speaker = "unk"
# ヴィーナスと恋人になった後で、俺たちは親子であることが判明するなど、常識では考えられない紆余曲折はあったものの──
line = "ヴィーナスと恋人になった後で、俺たちは親子であることが判明するなど、常識では考えられない紆余曲折はあったものの──"

[[dialogue]]
speaker = "unk"
# 俺たちはお互いの意思を確認した上で、親子兼恋人という立場をすべて受け入れることとなった。
line = "俺たちはお互いの意思を確認した上で、親子兼恋人という立場をすべて受け入れることとなった。"

[[dialogue]]
speaker = "unk"
# そして、そんな特別でこそばゆい関係性にも、徐々に慣れ始めてきた、ある休日のこと。
line = "そして、そんな特別でこそばゆい関係性にも、徐々に慣れ始めてきた、ある休日のこと。"

[[dialogue]]
speaker = "ヴィーナス"
# 「パパ！　今日はズバリ、私たちの子供の名前を考えるわよ！」
line = "「パパ！　今日はズバリ、私たちの子供の名前を考えるわよ！」"

[[dialogue]]
speaker = "unk"
# 俺は思わず、飲んでいた緑茶を噴き出してしまった。
line = "俺は思わず、飲んでいた緑茶を噴き出してしまった。"

[[dialogue]]
speaker = "unk"
# 早い早い早い！！
line = "早い早い早い！！"

[[dialogue]]
speaker = "ヴィーナス"
# 「そう？　ほら、『善は急がば３回転』って言うじゃない？　私たち、もう結婚を誓い合った仲なわけだし！」
line = "「そう？　ほら、『善は急がば３回転』って言うじゃない？　私たち、もう結婚を誓い合った仲なわけだし！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それに、いざ子作りし始めたら、あっという間に赤ちゃんができちゃいそうな予感がするのよね、私♪」
line = "「それに、いざ子作りし始めたら、あっという間に赤ちゃんができちゃいそうな予感がするのよね、私♪」"

[[dialogue]]
speaker = "unk"
# 本当に実現しちゃいそうなんだけど！？
line = "本当に実現しちゃいそうなんだけど！？"

[[dialogue]]
speaker = "unk"
# ヴィーナスが言うと
line = "ヴィーナスが言うと"

[[dialogue]]
speaker = "ヴィーナス"
# 「え？　――学園を卒業するまでは待って欲しい？」
line = "「え？　――学園を卒業するまでは待って欲しい？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「大丈夫よ♪　そこはちゃんとわかってるから！」
line = "「大丈夫よ♪　そこはちゃんとわかってるから！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私、卒業と同時に赤ちゃんができるように頑張るわ！」
line = "「私、卒業と同時に赤ちゃんができるように頑張るわ！」"

[[dialogue]]
speaker = "unk"
# 後でちゃんと１回話し合おうか！
line = "後でちゃんと１回話し合おうか！"

[[dialogue]]
speaker = "ヴィーナス"
# 「？　よくわからないけど、わかったわ！」
line = "「？　よくわからないけど、わかったわ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「とりあえず、『案じるとより産みやすし』ってことね♪」
line = "「とりあえず、『案じるとより産みやすし』ってことね♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それでね、私、子供の名前を考えて来たの！」
line = "「それでね、私、子供の名前を考えて来たの！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「はい、ど～ん♪」
line = "「はい、ど～ん♪」"

[[dialogue]]
speaker = "unk"
# そう言いながら、大きな文字が書かれたスケッチブックを取り出して見せて来る。
line = "そう言いながら、大きな文字が書かれたスケッチブックを取り出して見せて来る。"

[[dialogue]]
speaker = "ヴィーナス"
# 「もし男の子だったら、ヴィート！　女の子だったら、ゴッデスなんてどうかしら！」
line = "「もし男の子だったら、ヴィート！　女の子だったら、ゴッデスなんてどうかしら！」"

[[dialogue]]
speaker = "unk"
# 女の子の名前だよね！？！？
line = "女の子の名前だよね！？！？"

[[dialogue]]
speaker = "ヴィーナス"
# 「――名づけの由来？　ゴッデスは女神って意味よ！　由来はもちろん、ゴッデスビームからね！」
line = "「――名づけの由来？　ゴッデスは女神って意味よ！　由来はもちろん、ゴッデスビームからね！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ヴィートは、ヴィーナスとクロトの名前を合体させてみたの！　カッコいいでしょ？」
line = "「ヴィートは、ヴィーナスとクロトの名前を合体させてみたの！　カッコいいでしょ？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「え？　男の子の名前はいいけど、女の子の方は却下？」
line = "「え？　男の子の名前はいいけど、女の子の方は却下？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「意外だわ。ゴッデスの方が自信あったんだけど……」
line = "「意外だわ。ゴッデスの方が自信あったんだけど……」"

[[dialogue]]
speaker = "unk"
# それから、俺はヴィーナスの勢いに押されるまま、女の子の名前を考えて……
line = "それから、俺はヴィーナスの勢いに押されるまま、女の子の名前を考えて……"

[[dialogue]]
speaker = "ヴィーナス"
# 「――じゃあひとまず、男の子はヴィート、女の子はアイネってことで決まりね♪」
line = "「――じゃあひとまず、男の子はヴィート、女の子はアイネってことで決まりね♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふふっ♪　名前を考えると将来のイメージがますます浮かんで来て、ワクワクするわ！」
line = "「ふふっ♪　名前を考えると将来のイメージがますます浮かんで来て、ワクワクするわ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「というわけで――」
line = "「というわけで――」"

[[dialogue]]
speaker = "ヴィーナス"
# 「この調子で、次の子供が生まれた時の名前も考えて行きましょう！」
line = "「この調子で、次の子供が生まれた時の名前も考えて行きましょう！」"

[[dialogue]]
speaker = "unk"
# まさかの２人目！？
line = "まさかの２人目！？"

[[dialogue]]
speaker = "ヴィーナス"
# 「？　なに言ってるの？　３人目と４人目の名前よ！！」
line = "「？　なに言ってるの？　３人目と４人目の名前よ！！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「だって１人目と２人目は、ヴィートとアイネだもの♪　どっちが先に生まれて来るかは、その時のお楽しみね！」
line = "「だって１人目と２人目は、ヴィートとアイネだもの♪　どっちが先に生まれて来るかは、その時のお楽しみね！」"

[[dialogue]]
speaker = "unk"
# ４人以上確定！？
line = "４人以上確定！？"

[[dialogue]]
speaker = "ヴィーナス"
# 「当たり前よ！　私、クロトとの子供だったら、何人でも欲しいもの♪」
line = "「当たり前よ！　私、クロトとの子供だったら、何人でも欲しいもの♪」"

[[dialogue]]
speaker = "unk"
# な、何人でも……
line = "な、何人でも……"

[[dialogue]]
speaker = "unk"
# 俺は思わず色々想像して、顔が熱くなってしまう。
line = "俺は思わず色々想像して、顔が熱くなってしまう。"

[[dialogue]]
speaker = "ヴィーナス"
# 「あっ、クロト、顔が赤くなってるわよ～？　もしかして、照れちゃった？」
line = "「あっ、クロト、顔が赤くなってるわよ～？　もしかして、照れちゃった？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふふっ♪　私はそれくらいクロトのことが好きってことよ♪」
line = "「ふふっ♪　私はそれくらいクロトのことが好きってことよ♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「だ～か～ら～」
line = "「だ～か～ら～」"

[[dialogue]]
speaker = "unk"
# ヴィーナスは俺の近くに来ると、甘えるような上目遣いで抱き着いて来て――
line = "ヴィーナスは俺の近くに来ると、甘えるような上目遣いで抱き着いて来て――"

[[dialogue]]
speaker = "ヴィーナス"
# 「卒業したら、いっぱいよろしくね、パパ<emoji=heart04>」
line = "「卒業したら、いっぱいよろしくね、パパ<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ん……<emoji=heart04>」
line = "「ん……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そう言って、唇をそっと差し出して来る彼女のおねだりに抗えるはずもなく――
line = "そう言って、唇をそっと差し出して来る彼女のおねだりに抗えるはずもなく――"

[[dialogue]]
speaker = "ヴィーナス"
# 「ちゅっ<emoji=heart04>」
line = "「ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あ……<emoji=heart04>　えへへへへへぇ<emoji=heart04>」
line = "「あ……<emoji=heart04>　えへへへへへぇ<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
# 「頭撫でられながらキスするの、好き……<emoji=heart04>」
line = "「頭撫でられながらキスするの、好き……<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ちゅっ……ちゅっ<emoji=heart04>」
line = "「ちゅっ……ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 果たして学園を卒業するまで自制できるかどうか。
line = "果たして学園を卒業するまで自制できるかどうか。"

[[dialogue]]
speaker = "unk"
# その日も俺は無邪気な恋人を相手に、理性の戦いを強いられることになるのだった――
line = "その日も俺は無邪気な恋人を相手に、理性の戦いを強いられることになるのだった――"
