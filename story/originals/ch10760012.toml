[[dialogue]]
speaker = "unk"
# 第２話,モナカとお花のお友達,P
line = "第２話,モナカとお花のお友達,P"

[[dialogue]]
speaker = "モナカ"
# 「ソニックスワールっ！」
line = "「ソニックスワールっ！」"

[[dialogue]]
speaker = "モナカ"
# 「ふぅ……。なんとかやっつけられた……」
line = "「ふぅ……。なんとかやっつけられた……」"

[[dialogue]]
speaker = "unk"
# モナカのプリマステラっぷりも板に付いてきたね
line = "モナカのプリマステラっぷりも板に付いてきたね"

[[dialogue]]
speaker = "モナカ"
# 「そ、そんなことないよ。モナカなんかまだまだだから。にぃ様が一緒に戦ってくれるから落ち着いて力を制御できてるだけで」
line = "「そ、そんなことないよ。モナカなんかまだまだだから。にぃ様が一緒に戦ってくれるから落ち着いて力を制御できてるだけで」"

[[dialogue]]
speaker = "モナカ"
# 「でもモンスター退治をお手伝いできるようになったことは嬉しいな……。やっとモナカもみんなの笑顔を守るために戦えるようになれたんだ」
line = "「でもモンスター退治をお手伝いできるようになったことは嬉しいな……。やっとモナカもみんなの笑顔を守るために戦えるようになれたんだ」"

[[dialogue]]
speaker = "モナカ"
# 「えへへ、モナカ、もっともっと頑張るね？　今よりもっとたくさんの人の笑顔を守れるように」
line = "「えへへ、モナカ、もっともっと頑張るね？　今よりもっとたくさんの人の笑顔を守れるように」"

[[dialogue]]
speaker = "モナカ"
# 「それじゃ帰ろう──……って、あれ？　にぃ様、指から血が出てるよ……？　どこかで切っちゃった？」
line = "「それじゃ帰ろう──……って、あれ？　にぃ様、指から血が出てるよ……？　どこかで切っちゃった？」"

[[dialogue]]
speaker = "モナカ"
# 「じっとしてて？　これくらいなら──ん……ちゅっ、ちゅうぅ、ぺろろ……」
line = "「じっとしてて？　これくらいなら──ん……ちゅっ、ちゅうぅ、ぺろろ……」"

[[dialogue]]
speaker = "unk"
# モ、モナカ……！？
line = "モ、モナカ……！？"

[[dialogue]]
speaker = "モナカ"
# 「ぺろ……んちゅぅ……。ふぇ……？　～～っっ！？」
line = "「ぺろ……んちゅぅ……。ふぇ……？　～～っっ！？」"

[[dialogue]]
speaker = "モナカ"
# 「ご、ごめんなさい、つい……！　これくらいの怪我ならチュウチュウすれば止まると思って……！　モナカもよくドジして指切っちゃうから……！」
line = "「ご、ごめんなさい、つい……！　これくらいの怪我ならチュウチュウすれば止まると思って……！　モナカもよくドジして指切っちゃうから……！」"

[[dialogue]]
speaker = "モナカ"
# 「あうぅ、ば、ばっちかったよね……！　気持ち悪かったよね……！　ほ、本当にごめんなさいっ……！」
line = "「あうぅ、ば、ばっちかったよね……！　気持ち悪かったよね……！　ほ、本当にごめんなさいっ……！」"

[[dialogue]]
speaker = "モナカ"
# 「はう……どうしよう。とんでもないことしちゃった……」
line = "「はう……どうしよう。とんでもないことしちゃった……」"

[[dialogue]]
speaker = "モナカ"
# 「嫌われちゃったかも……。せっかくにぃ様と少しずつ仲良しになってきたと思ってたところだったのに……」
line = "「嫌われちゃったかも……。せっかくにぃ様と少しずつ仲良しになってきたと思ってたところだったのに……」"

[[dialogue]]
speaker = "モナカ"
# 「……え？　そ、そうかな？　気にしてない、かな？　でもやっぱり……。えっ、そ、それはないよ、絶対ないよ……！」
line = "「……え？　そ、そうかな？　気にしてない、かな？　でもやっぱり……。えっ、そ、それはないよ、絶対ないよ……！」"

[[dialogue]]
speaker = "モナカ"
# 「あんまりモナカをからかうと、お水あげないよ？　だ、だってみんなしておかしなこと言うからっ」
line = "「あんまりモナカをからかうと、お水あげないよ？　だ、だってみんなしておかしなこと言うからっ」"

[[dialogue]]
speaker = "unk"
# （モナカが誰かと話してる……？）
line = "（モナカが誰かと話してる……？）"

[[dialogue]]
speaker = "モナカ"
# 「あ、あう。モナカは可愛くなんかないよ。みんなの方がよっぽど可愛いから」
line = "「あ、あう。モナカは可愛くなんかないよ。みんなの方がよっぽど可愛いから」"

[[dialogue]]
speaker = "モナカ"
# 「みんなをにぃ様との仲直りに……？　でも、みんなに悪いよ……。あう、そこまで言ってくれるなら……」
line = "「みんなをにぃ様との仲直りに……？　でも、みんなに悪いよ……。あう、そこまで言ってくれるなら……」"

[[dialogue]]
speaker = "モナカ"
# 「なら代わりに、たくさん美味しいお水あげるねっ？　最近ね、前よりもずっと美味しいお水を出せるようになったんだぁ」
line = "「なら代わりに、たくさん美味しいお水あげるねっ？　最近ね、前よりもずっと美味しいお水を出せるようになったんだぁ」"

[[dialogue]]
speaker = "モナカ"
# 「これもにぃ様がトレーニングに付き合ってくれたおかげなんだよ。少しずつだけど前より星力のコントロールも上手になってきて」
line = "「これもにぃ様がトレーニングに付き合ってくれたおかげなんだよ。少しずつだけど前より星力のコントロールも上手になってきて」"

[[dialogue]]
speaker = "モナカ"
# 「あ、そうだっ。今日ね、にぃ様がねっ。モナカのプリマステラっぷりも板についてきたねって言ってくれて。えへへ、すごく嬉しかったんだぁ」
line = "「あ、そうだっ。今日ね、にぃ様がねっ。モナカのプリマステラっぷりも板についてきたねって言ってくれて。えへへ、すごく嬉しかったんだぁ」"

[[dialogue]]
speaker = "モナカ"
# 「それとね、この間なんてにぃ様に──……ふぇ？　後ろ……？　後ろがどうかしたの？」
line = "「それとね、この間なんてにぃ様に──……ふぇ？　後ろ……？　後ろがどうかしたの？」"

[[dialogue]]
speaker = "モナカ"
# 「ひぃあっ！？　に、にぃ様……！？　いつからそこに……！？」
line = "「ひぃあっ！？　に、にぃ様……！？　いつからそこに……！？」"

[[dialogue]]
speaker = "モナカ"
# 「あの、えと、これは……！　１人で喋ってたわけじゃなくて……！　花壇のお花さんとね、お話ししてたのっ」
line = "「あの、えと、これは……！　１人で喋ってたわけじゃなくて……！　花壇のお花さんとね、お話ししてたのっ」"

[[dialogue]]
speaker = "モナカ"
# 「カティアちゃんや……たまにマリーベルさんとお水やりしてるんだけど、ここのお花さんたち、モナカのお友達で……！」
line = "「カティアちゃんや……たまにマリーベルさんとお水やりしてるんだけど、ここのお花さんたち、モナカのお友達で……！」"

[[dialogue]]
speaker = "unk"
# 花と話せるんだ。モナカはすごいな
line = "花と話せるんだ。モナカはすごいな"

[[dialogue]]
speaker = "モナカ"
# 「そ、そんなことないよっ。お花さんとお友達になれば、誰だってお話できると思うしっ……」
line = "「そ、そんなことないよっ。お花さんとお友達になれば、誰だってお話できると思うしっ……」"

[[dialogue]]
speaker = "モナカ"
# 「モナカは、えと。小さい頃からお花さんとお話する機会が多かっただけで」
line = "「モナカは、えと。小さい頃からお花さんとお話する機会が多かっただけで」"

[[dialogue]]
speaker = "モナカ"
# 「お家にいた頃はメイドさんみたいなことをしてたの。モナカの実力じゃお稽古に混ざっても仕方ないって言われちゃってたから」
line = "「お家にいた頃はメイドさんみたいなことをしてたの。モナカの実力じゃお稽古に混ざっても仕方ないって言われちゃってたから」"

[[dialogue]]
speaker = "モナカ"
# 「だから実家の花壇のお世話もモナカがしてたんだ。あ、でもお世話してもらってたのはモナカの方かも……」
line = "「だから実家の花壇のお世話もモナカがしてたんだ。あ、でもお世話してもらってたのはモナカの方かも……」"

[[dialogue]]
speaker = "モナカ"
# 「毎日のようにお花さんたちに色々な相談をしちゃったりして。その度にお花さんたちはモナカのこと勇気づけてくれて……」
line = "「毎日のようにお花さんたちに色々な相談をしちゃったりして。その度にお花さんたちはモナカのこと勇気づけてくれて……」"

[[dialogue]]
speaker = "モナカ"
# 「モナカにお世話されるのが一番嬉しいって言ってくれたりしてね？　屋根裏部屋で寝起きすることになった時も甘い香りを部屋まで届けてくれたりして……」
line = "「モナカにお世話されるのが一番嬉しいって言ってくれたりしてね？　屋根裏部屋で寝起きすることになった時も甘い香りを部屋まで届けてくれたりして……」"

[[dialogue]]
speaker = "モナカ"
# 「今こうしてモナカがここにいるのも、お花さんたちのおかげかも。パルちゃんやシフォンちゃんと出会わせてくれたのもお花さんたちだったし」
line = "「今こうしてモナカがここにいるのも、お花さんたちのおかげかも。パルちゃんやシフォンちゃんと出会わせてくれたのもお花さんたちだったし」"

[[dialogue]]
speaker = "モナカ"
# 「だから、その。今でも何かあるとつい相談しちゃって……。お花さんたち、すごく聞き上手で口下手なモナカの話もじっと聞いてくれるから」
line = "「だから、その。今でも何かあるとつい相談しちゃって……。お花さんたち、すごく聞き上手で口下手なモナカの話もじっと聞いてくれるから」"

[[dialogue]]
speaker = "モナカ"
# 「そ、そうだ、にぃ様……。さっきはごめんなさい……。怪我してるからって、モナカ、その、にぃ様の指を……」
line = "「そ、そうだ、にぃ様……。さっきはごめんなさい……。怪我してるからって、モナカ、その、にぃ様の指を……」"

[[dialogue]]
speaker = "unk"
# そのお礼を言いに来たんだった
line = "そのお礼を言いに来たんだった"

[[dialogue]]
speaker = "モナカ"
# 「え……お礼？　てっきりモナカ、にぃ様に嫌われちゃったかと思って……」
line = "「え……お礼？　てっきりモナカ、にぃ様に嫌われちゃったかと思って……」"

[[dialogue]]
speaker = "モナカ"
# 「お礼を言うためにわざわざ追いかけてきてくれたの……？　モナカが気にしてると思って……？」
line = "「お礼を言うためにわざわざ追いかけてきてくれたの……？　モナカが気にしてると思って……？」"

[[dialogue]]
speaker = "モナカ"
# 「え、えへへ。お花さんたちの言う通りだった。お花さんたちもね、言ってくれてたんだ。にぃ様は何も気にしてなんかないよって……」
line = "「え、えへへ。お花さんたちの言う通りだった。お花さんたちもね、言ってくれてたんだ。にぃ様は何も気にしてなんかないよって……」"

[[dialogue]]
speaker = "モナカ"
# 「むしろ、その……えと。モナカに指を咥えられて喜んでるって……。そ、そんなわけないって言ったんだけど……！」
line = "「むしろ、その……えと。モナカに指を咥えられて喜んでるって……。そ、そんなわけないって言ったんだけど……！」"

[[dialogue]]
speaker = "モナカ"
# 「でも、嫌われてなかったのなら、これも作らなくて良かったかな」
line = "「でも、嫌われてなかったのなら、これも作らなくて良かったかな」"

[[dialogue]]
speaker = "モナカ"
# 「お花さんたちがね？　にぃ様との仲直りに自分たちを使ってって言ってくれたの。それで、その、お花の冠を作ったんだけど……」
line = "「お花さんたちがね？　にぃ様との仲直りに自分たちを使ってって言ってくれたの。それで、その、お花の冠を作ったんだけど……」"

[[dialogue]]
speaker = "unk"
# 大切にするよ
line = "大切にするよ"

[[dialogue]]
speaker = "モナカ"
# 「あ……えへへ。うんっ……」
line = "「あ……えへへ。うんっ……」"

[[dialogue]]
speaker = "モナカ"
# 「そうだ、にぃ様。良かったら、モナカと一緒にお花さんたちのお水やりしてくれないかな？」
line = "「そうだ、にぃ様。良かったら、モナカと一緒にお花さんたちのお水やりしてくれないかな？」"

[[dialogue]]
speaker = "モナカ"
# 「モナカのお友達をね、にぃ様にも紹介したいんだ。きっとにぃ様もみんなの声がすぐに聞こえるようになると思うから」
line = "「モナカのお友達をね、にぃ様にも紹介したいんだ。きっとにぃ様もみんなの声がすぐに聞こえるようになると思うから」"

[[dialogue]]
speaker = "モナカ"
# 「ね、みんな？　って……どうしたの？　モナカの指……？」
line = "「ね、みんな？　って……どうしたの？　モナカの指……？」"

[[dialogue]]
speaker = "モナカ"
# 「あ。ホントだ、血が出ちゃってる。お花の冠を作ってる最中に切っちゃったのかな……」
line = "「あ。ホントだ、血が出ちゃってる。お花の冠を作ってる最中に切っちゃったのかな……」"

[[dialogue]]
speaker = "モナカ"
# 「へっ？　チャ、チャンスって、みんな何言ってるのっ。もしかして、わざと……！」
line = "「へっ？　チャ、チャンスって、みんな何言ってるのっ。もしかして、わざと……！」"

[[dialogue]]
speaker = "モナカ"
# 「あう……！　ダメだよ、にぃ様。ばっちいから。モナカの指なんか、その、絶対に咥えちゃダメだからねっ……？」
line = "「あう……！　ダメだよ、にぃ様。ばっちいから。モナカの指なんか、その、絶対に咥えちゃダメだからねっ……？」"

[[dialogue]]
speaker = "モナカ"
# 「ホ、ホントにいいからぁ……！！　恥ずかしいよぉ……！！」
line = "「ホ、ホントにいいからぁ……！！　恥ずかしいよぉ……！！」"
