[[dialogue]]
speaker = "イクシリオン"
# 「《命脈》の守護天使を祀る一族の<ruby=すえ>末裔</ruby>として、必ずやアルモタヘル様を解放してみせます！」
line = "「《命脈》の守護天使を祀る一族の<ruby>末裔<rt>すえ</rt></ruby>として、必ずやアルモタヘル様を解放してみせます！」"

[[dialogue]]
speaker = "マトイ"
# 「うん！　せっかく守った世界が台無しになっちゃ困るもんね！」
line = "「うん！　せっかく守った世界が台無しになっちゃ困るもんね！」"

[[dialogue]]
speaker = "リーリア"
# 「あれが守護天使が封印された神殿です。モンスターが周囲を守っているようなので注意を──」
line = "「あれが守護天使が封印された神殿です。モンスターが周囲を守っているようなので注意を──」"

[[dialogue]]
speaker = "マハムート"
# 「ナビゲートありがとう。魔女の人」
line = "「ナビゲートありがとう。魔女の人」"

[[dialogue]]
speaker = "リーリア"
# 「あぅっ」
line = "「あぅっ」"

[[dialogue]]
speaker = "マハムート"
# 「まさかあなたがスパイだなんて思わなかった──」
line = "「まさかあなたがスパイだなんて思わなかった──」"

[[dialogue]]
speaker = "マハムート"
# 「……言われてみるとスパイらしい言動はいろいろあったわね」
line = "「……言われてみるとスパイらしい言動はいろいろあったわね」"

[[dialogue]]
speaker = "リーリア"
# 「ええ～～っ！？　完璧なスパイじゃなかったですか！？」
line = "「ええ～～っ！？　完璧なスパイじゃなかったですか！？」"

[[dialogue]]
speaker = "リーリア"
# 「騙すつもりは……いやありましたけど。でも新星学園に害を与える気はなくて、私なりにウィンウィンを目指してたんです」
line = "「騙すつもりは……いやありましたけど。でも新星学園に害を与える気はなくて、私なりにウィンウィンを目指してたんです」"

[[dialogue]]
speaker = "マハムート"
# 「そんなのわかってるわ。スパイだからって、悪どいことができる子じゃないもの」
line = "「そんなのわかってるわ。スパイだからって、悪どいことができる子じゃないもの」"

[[dialogue]]
speaker = "リーリア"
# 「え？」
line = "「え？」"

[[dialogue]]
speaker = "マハムート"
# 「申し訳ないと思ってるなら、戦って役に立ちなさい。魔女の力、当てにしてるから」
line = "「申し訳ないと思ってるなら、戦って役に立ちなさい。魔女の力、当てにしてるから」"

[[dialogue]]
speaker = "リーリア"
# 「……！　イエス、マム！」
line = "「……！　イエス、マム！」"

[[dialogue]]
speaker = "コハルコ"
# 『こちら、新星学園・放送委員会委員長のコハルコです。本作戦では私がオペレーションを担当します。よろしくお願いします』
line = "『こちら、新星学園・放送委員会委員長のコハルコです。本作戦では私がオペレーションを担当します。よろしくお願いします』"

[[dialogue]]
speaker = "マハムート"
# 「ええ、頼りにしているわ」
line = "「ええ、頼りにしているわ」"

[[dialogue]]
speaker = "紅明"
# 「実はアタシも放送委員会なんだけど、ここは任せるぜ、コハルコ委員長！」
line = "「実はアタシも放送委員会なんだけど、ここは任せるぜ、コハルコ委員長！」"

[[dialogue]]
speaker = "コハルコ"
# 『大型モンスター接近！　迎撃してください！』
line = "『大型モンスター接近！　迎撃してください！』"

[[dialogue]]
speaker = "リップル"
# 「モンスターはビッグウェーブで押し流シま～す！」
line = "「モンスターはビッグウェーブで押し流シま～す！」"

[[dialogue]]
speaker = "リップル"
# 「イエ～イ♪　魔界でもイイ波来てマース！」
line = "「イエ～イ♪　魔界でもイイ波来てマース！」"

[[dialogue]]
speaker = "ヨミ"
# 「星術で生み出した波だから当然なのでは……？」
line = "「星術で生み出した波だから当然なのでは……？」"

[[dialogue]]
speaker = "コハルコ"
# 『ヨミさん、右からモンスターが接近、数２！』
line = "『ヨミさん、右からモンスターが接近、数２！』"

[[dialogue]]
speaker = "ヨミ"
# 「こやっ！？」
line = "「こやっ！？」"

[[dialogue]]
speaker = "セシア"
# 「フェアリーズパーティー！」
line = "「フェアリーズパーティー！」"

[[dialogue]]
speaker = "セシア"
# 「油断大敵よ、ヨミヨミ」
line = "「油断大敵よ、ヨミヨミ」"

[[dialogue]]
speaker = "ヨミ"
# 「セシアちゃん！　来てくれたんですね」
line = "「セシアちゃん！　来てくれたんですね」"

[[dialogue]]
speaker = "セシア"
# 「ええ、星騎士のみんなだけに戦わせるのは申し訳ないもの。元はと言えばわたくしたちの不始末なのだし」
line = "「ええ、星騎士のみんなだけに戦わせるのは申し訳ないもの。元はと言えばわたくしたちの不始末なのだし」"

[[dialogue]]
speaker = "紅明"
# 「いえぃ♪　セッシーがいれば百人力っしょ！」
line = "「いえぃ♪　セッシーがいれば百人力っしょ！」"

[[dialogue]]
speaker = "セシア"
# 「紅明ママ～♪　抱っこして～♪」
line = "「紅明ママ～♪　抱っこして～♪」"

[[dialogue]]
speaker = "紅明"
# 「もちろんだぜセッシー♪　ギュ～♪」
line = "「もちろんだぜセッシー♪　ギュ～♪」"

[[dialogue]]
speaker = "ヨミ"
# 「いつ見てもすごい甘えっぷり……さっき助けてくれた時とは別人みたいです」
line = "「いつ見てもすごい甘えっぷり……さっき助けてくれた時とは別人みたいです」"

[[dialogue]]
speaker = "紅明"
# 「それじゃ──」
line = "「それじゃ──」"

[[dialogue]]
speaker = "紅明"
# 「クリスマスフォームに変☆身♪　セッシーと一緒ならこっちでいくぜ♪」
line = "「クリスマスフォームに変☆身♪　セッシーと一緒ならこっちでいくぜ♪」"

[[dialogue]]
speaker = "セシア"
# 「ほら、ヨミヨミも」
line = "「ほら、ヨミヨミも」"

[[dialogue]]
speaker = "ヨミ"
# 「こやっ！？　私もですか！？」
line = "「こやっ！？　私もですか！？」"

[[dialogue]]
speaker = "紅明"
# 「そうそう、ノリが大事だぜ♪」
line = "「そうそう、ノリが大事だぜ♪」"

[[dialogue]]
speaker = "ヨミ"
# 「理由がよくわかりませんけど……えっ、え～いっ！」
line = "「理由がよくわかりませんけど……えっ、え～いっ！」"

[[dialogue]]
speaker = "ヨミ"
# 「天ヶ崎ヨミ、クリスマスフォームっ！　魔界に破邪の音を響かせます！」
line = "「天ヶ崎ヨミ、クリスマスフォームっ！　魔界に破邪の音を響かせます！」"

[[dialogue]]
speaker = "モンスター"
# 「ガアアアアアッ！！」
line = "「ガアアアアアッ！！」"

[[dialogue]]
speaker = "メルエル"
# 「邪魔はさせないよ──ディヴォーテッド・ラプソディー！」
line = "「邪魔はさせないよ──ディヴォーテッド・ラプソディー！」"

[[dialogue]]
speaker = "モンスター"
# 「ガアアアアッ！」
line = "「ガアアアアッ！」"

[[dialogue]]
speaker = "ユーリス"
# 「映画には空を飛ぶサメもいるそうですが、こんな感じなのでしょうか？」
line = "「映画には空を飛ぶサメもいるそうですが、こんな感じなのでしょうか？」"

[[dialogue]]
speaker = "ユーリス"
# 「ですが映画のように食べられるわけにはいきません。我が祖国・ジルラント王国を救うためにも、守護天使を解放させてもらいます！」
line = "「ですが映画のように食べられるわけにはいきません。我が祖国・ジルラント王国を救うためにも、守護天使を解放させてもらいます！」"

[[dialogue]]
speaker = "メルエル"
# 「モンスターは私たちに任せて、みんな、今のうちに！」
line = "「モンスターは私たちに任せて、みんな、今のうちに！」"

[[dialogue]]
speaker = "マトイ"
# 「うん、ありがとう！」
line = "「うん、ありがとう！」"

[[dialogue]]
speaker = "メルエル"
# 「私だって世界を救う星騎士なんだから！　一意専心──みんなの背中は絶対守ってみせるよ！」
line = "「私だって世界を救う星騎士なんだから！　一意専心──みんなの背中は絶対守ってみせるよ！」"

[[dialogue]]
speaker = "リーリア"
# 「そろそろ堕天使と接敵してもおかしくないはずなんですが……」
line = "「そろそろ堕天使と接敵してもおかしくないはずなんですが……」"

[[dialogue]]
speaker = "コハルコ"
# 『リーリアさん、後方から敵性反応高速で接近！』
line = "『リーリアさん、後方から敵性反応高速で接近！』"

[[dialogue]]
speaker = "リーリア"
# 「──！？」
line = "「──！？」"

[[dialogue]]
speaker = "マトイ"
# 「ふぅ……間に合った……」
line = "「ふぅ……間に合った……」"

[[dialogue]]
speaker = "リーリア"
# 「守ってくれてありがとうございます、マトイ先輩！」
line = "「守ってくれてありがとうございます、マトイ先輩！」"

[[dialogue]]
speaker = "マトイ"
# 「ううん、私の取柄なんてこのくらいだから」
line = "「ううん、私の取柄なんてこのくらいだから」"

[[dialogue]]
speaker = "マハムート"
# 「どうやらお出ましのようね」
line = "「どうやらお出ましのようね」"

[[dialogue]]
speaker = "アルモタヘル"
# 「人間、天使、魔族……そして魔女……種族の交わり……ああ、おぞましい……」
line = "「人間、天使、魔族……そして魔女……種族の交わり……ああ、おぞましい……」"

[[dialogue]]
speaker = "イクシリオン"
# 「アルモタヘル様……やはり完全に正気を失っておられますね。お労しや」
line = "「アルモタヘル様……やはり完全に正気を失っておられますね。お労しや」"

[[dialogue]]
speaker = "イクシリオン"
# 「私はアルモタヘル様に仕える者。ここで役に立てなければ、星騎士になった意味がありません。この戦いに私の全てを懸けます！」
line = "「私はアルモタヘル様に仕える者。ここで役に立てなければ、星騎士になった意味がありません。この戦いに私の全てを懸けます！」"

[[dialogue]]
speaker = "マハムート"
# 「私たちが一緒に戦っているのが気に入らないとでも言いたげね。気に入らないのはこっちだわ。跪きなさい」
line = "「私たちが一緒に戦っているのが気に入らないとでも言いたげね。気に入らないのはこっちだわ。跪きなさい」"

[[dialogue]]
speaker = "マトイ"
# 「アルモタヘルさん……今元に戻しますからね！」
line = "「アルモタヘルさん……今元に戻しますからね！」"

[[dialogue]]
speaker = "リーリア"
# 「魔女の、ネビュラの１人として、そして新星学園の一員として──必ず勝ちます！」
line = "「魔女の、ネビュラの１人として、そして新星学園の一員として──必ず勝ちます！」"

[[dialogue]]
speaker = "イクシリオン"
# 「《命脈》の従者として……イクシリオン、参ります──！」
line = "「《命脈》の従者として……イクシリオン、参ります──！」"
