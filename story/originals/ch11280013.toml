[[dialogue]]
speaker = "unk"
# 第３話,妹でありお姉さん,P
line = "第３話,妹でありお姉さん,P"

[[dialogue]]
speaker = "unk"
# その日、カフェテリアへ昼食をしに向かうと――
line = "その日、カフェテリアへ昼食をしに向かうと――"

[[dialogue]]
speaker = "ルルカ"
# 「あっ、お兄ちゃんだ！　お兄ちゃ～ん♪」
line = "「あっ、お兄ちゃんだ！　お兄ちゃ～ん♪」"

[[dialogue]]
speaker = "メイプル"
# 「本当だ！　お兄ちゃんも今からお昼なの～？　実はあたしたちもなんだ～」
line = "「本当だ！　お兄ちゃんも今からお昼なの～？　実はあたしたちもなんだ～」"

[[dialogue]]
speaker = "ルルカ"
# 「ねぇねぇ、一緒に食べてもいい？」
line = "「ねぇねぇ、一緒に食べてもいい？」"

[[dialogue]]
speaker = "リコリンフィア"
# 「――あっ、お兄ちゃ～ん♪」
line = "「――あっ、お兄ちゃ～ん♪」"

[[dialogue]]
speaker = "リコリンフィア"
# 「今からお昼なの～？　リコリンもなんだ～♪　って……あれ？」
line = "「今からお昼なの～？　リコリンもなんだ～♪　って……あれ？」"

[[dialogue]]
speaker = "ルルカ"
# 「え？　お兄ちゃん……？」
line = "「え？　お兄ちゃん……？」"

[[dialogue]]
speaker = "メイプル"
# 「これは――新たなる妹の波動を感じる……！」
line = "「これは――新たなる妹の波動を感じる……！」"

[[dialogue]]
speaker = "unk"
# またも出会ってしまったか……
line = "またも出会ってしまったか……"

[[dialogue]]
speaker = "unk"
# そんなわけで――
line = "そんなわけで――"

[[dialogue]]
speaker = "unk"
# 俺たちはみんなで一緒に、相席をすることになった。
line = "俺たちはみんなで一緒に、相席をすることになった。"

[[dialogue]]
speaker = "ルルカ"
# 「なるほど、リコリンちゃんか～」
line = "「なるほど、リコリンちゃんか～」"

[[dialogue]]
speaker = "メイプル"
# 「これからよろしくね、リコリン！」
line = "「これからよろしくね、リコリン！」"

[[dialogue]]
speaker = "リコリンフィア"
# 「うん♪　よろしくね」
line = "「うん♪　よろしくね」"

[[dialogue]]
speaker = "リコリンフィア"
# 「――メイプルお姉ちゃん、ルルカお姉ちゃん♪」
line = "「――メイプルお姉ちゃん、ルルカお姉ちゃん♪」"

[[dialogue]]
speaker = "ルルカ"
# 「！？」
line = "「！？」"

[[dialogue]]
speaker = "メイプル"
# 「お姉ちゃん……だと……！？」
line = "「お姉ちゃん……だと……！？」"

[[dialogue]]
speaker = "ルルカ"
# 「そのパターンは、考えてなかった……！」
line = "「そのパターンは、考えてなかった……！」"

[[dialogue]]
speaker = "リコリンフィア"
# 「あれ……？　もしかして、呼んじゃダメだった……？」
line = "「あれ……？　もしかして、呼んじゃダメだった……？」"

[[dialogue]]
speaker = "ルルカ"
# 「う、ううん！　そんなことないよ！　ちょっと驚いてるだけ！」
line = "「う、ううん！　そんなことないよ！　ちょっと驚いてるだけ！」"

[[dialogue]]
speaker = "メイプル"
# 「そうそう！　あたしたちもお兄ちゃんって呼んだりしてるわけだし……」
line = "「そうそう！　あたしたちもお兄ちゃんって呼んだりしてるわけだし……」"

[[dialogue]]
speaker = "リコリンフィア"
# 「よかった～♪　えへへ♪」
line = "「よかった～♪　えへへ♪」"

[[dialogue]]
speaker = "unk"
# （あざと可愛い……！）
line = "（あざと可愛い……！）"

[[dialogue]]
speaker = "ルルカ"
# 「で、でも、あたしがお姉ちゃんに……。なんか、悪くない気がする……！　ふふふ……♪」
line = "「で、でも、あたしがお姉ちゃんに……。なんか、悪くない気がする……！　ふふふ……♪」"

[[dialogue]]
speaker = "メイプル"
# 「くっ……！　妹魔王である我が、更なる妹を眷族として迎えることになろうとは……！　にへへ……♪」
line = "「くっ……！　妹魔王である我が、更なる妹を眷族として迎えることになろうとは……！　にへへ……♪」"

[[dialogue]]
speaker = "unk"
# そうして、昼食をしながらリコリンのことについて色々と尋ねる２人。
line = "そうして、昼食をしながらリコリンのことについて色々と尋ねる２人。"

[[dialogue]]
speaker = "リコリンフィア"
# 「――得意なこと？　えっとね、リコリンは～、実はすごい特技があるんだ！」
line = "「――得意なこと？　えっとね、リコリンは～、実はすごい特技があるんだ！」"

[[dialogue]]
speaker = "ルルカ"
# 「特技？」
line = "「特技？」"

[[dialogue]]
speaker = "リコリンフィア"
# 「うん♪　リコリンね、『大人のフリ』が得意なんだよ～？　実際にやってみせると～」
line = "「うん♪　リコリンね、『大人のフリ』が得意なんだよ～？　実際にやってみせると～」"

[[dialogue]]
speaker = "リコリンフィア"
# 「――ほら、少年。ネクタイが少し乱れているぞ。お姉さんが整えてやろう」
line = "「――ほら、少年。ネクタイが少し乱れているぞ。お姉さんが整えてやろう」"

[[dialogue]]
speaker = "メイプル"
# 「なっ……！？」
line = "「なっ……！？」"

[[dialogue]]
speaker = "unk"
# （素の喋り方を演技ってことにした！？）
line = "（素の喋り方を演技ってことにした！？）"

[[dialogue]]
speaker = "unk"
# 大人の口調と表情になったリコさんは、俺のネクタイをそっと直して言う。
line = "大人の口調と表情になったリコさんは、俺のネクタイをそっと直して言う。"

[[dialogue]]
speaker = "リコリンフィア"
# 「よし、こんなところか。ふっ……どうだ、ルルカ、メイプル」
line = "「よし、こんなところか。ふっ……どうだ、ルルカ、メイプル」"

[[dialogue]]
speaker = "リコリンフィア"
# 「これが『大人のフリ』をする時の私だ。なかなか様になっているだろう？」
line = "「これが『大人のフリ』をする時の私だ。なかなか様になっているだろう？」"

[[dialogue]]
speaker = "メイプル"
# 「す、すごい……！　まるで本物の大人みたいで、魂が震える演技だよリコリン！　演劇部にスカウトしたいくらい！」
line = "「す、すごい……！　まるで本物の大人みたいで、魂が震える演技だよリコリン！　演劇部にスカウトしたいくらい！」"

[[dialogue]]
speaker = "リコリンフィア"
# 「そうだろう？　自分でもなかなか気に入っていてな。少年の前だと、この大人モードでよく話していたりするんだ」
line = "「そうだろう？　自分でもなかなか気に入っていてな。少年の前だと、この大人モードでよく話していたりするんだ」"

[[dialogue]]
speaker = "リコリンフィア"
# 「ちなみに少年は、お姉さんと妹、どっちの私が好みなのかな？」
line = "「ちなみに少年は、お姉さんと妹、どっちの私が好みなのかな？」"

[[dialogue]]
speaker = "unk"
# えぇっ！？
line = "えぇっ！？"

[[dialogue]]
speaker = "リコリンフィア"
# 「ふふっ、なんだ、即決できないのか？　お姉さんはどちらでもリクエストに応えてやるぞ？」
line = "「ふふっ、なんだ、即決できないのか？　お姉さんはどちらでもリクエストに応えてやるぞ？」"

[[dialogue]]
speaker = "ルルカ"
# 「こ、これは……」
line = "「こ、これは……」"

[[dialogue]]
speaker = "ルルカ"
# 「まさかの、附属生の妹でありながら、大人の姉にもなれる……その二刀流は強過ぎない？」
line = "「まさかの、附属生の妹でありながら、大人の姉にもなれる……その二刀流は強過ぎない？」"

[[dialogue]]
speaker = "リコリンフィア"
# 「２人も、大人モードの時はお姉さんに甘えてくれても構わないぞ？」
line = "「２人も、大人モードの時はお姉さんに甘えてくれても構わないぞ？」"

[[dialogue]]
speaker = "リコリンフィア"
# 「――なんてね♪　てへっ☆」
line = "「――なんてね♪　てへっ☆」"

[[dialogue]]
speaker = "メイプル"
# 「くっ、その能力……妹魔王である我が力をもってしても、戦慄を覚えざるを得ない……！」
line = "「くっ、その能力……妹魔王である我が力をもってしても、戦慄を覚えざるを得ない……！」"

[[dialogue]]
speaker = "ルルカ"
# 「――じゃあ、リコリンちゃん、またね！　ＤＩＳＣに妹同盟グループの勧誘メッセージ送っておくから♪」
line = "「――じゃあ、リコリンちゃん、またね！　ＤＩＳＣに妹同盟グループの勧誘メッセージ送っておくから♪」"

[[dialogue]]
speaker = "メイプル"
# 「ふっふっふ、同志リコリンよ。約束した通り、今度我が演劇部にそなたを招待しよう。楽しみにしているがいい！」
line = "「ふっふっふ、同志リコリンよ。約束した通り、今度我が演劇部にそなたを招待しよう。楽しみにしているがいい！」"

[[dialogue]]
speaker = "リコリンフィア"
# 「うん！　お姉ちゃんたち、またね～♪」
line = "「うん！　お姉ちゃんたち、またね～♪」"

[[dialogue]]
speaker = "unk"
# 昼食が終わった後、２人は手を振って、カフェテリアから去って行く。
line = "昼食が終わった後、２人は手を振って、カフェテリアから去って行く。"

[[dialogue]]
speaker = "リコリンフィア"
# 「――ふっ、これでまた、リコリンの人脈が広がったな」
line = "「――ふっ、これでまた、リコリンの人脈が広がったな」"

[[dialogue]]
speaker = "unk"
# まさか、大人の喋り方を特技に見せるとは……
line = "まさか、大人の喋り方を特技に見せるとは……"

[[dialogue]]
speaker = "リコリンフィア"
# 「毒は薬にもなる、とはこういうことだ」
line = "「毒は薬にもなる、とはこういうことだ」"

[[dialogue]]
speaker = "リコリンフィア"
# 「お姉さんのこと、見直したか？　ふふっ……♪」
line = "「お姉さんのこと、見直したか？　ふふっ……♪」"

[[dialogue]]
speaker = "unk"
# 公安委員会の本部長、恐るべし。
line = "公安委員会の本部長、恐るべし。"

[[dialogue]]
speaker = "unk"
# その手際に、おみそれしましたと口にしてしまう俺なのであった――
line = "その手際に、おみそれしましたと口にしてしまう俺なのであった――"
