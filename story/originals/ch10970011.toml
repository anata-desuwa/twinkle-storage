[[dialogue]]
speaker = "unk"
# 第１話,ジュリエッテの自爆,P
line = "第１話,ジュリエッテの自爆,P"

[[dialogue]]
speaker = "ジュリエッテ"
# 「あらあら魔王様じゃございませんか。こんなところで奇遇でございますわね」
line = "「あらあら魔王様じゃございませんか。こんなところで奇遇でございますわね」"

[[dialogue]]
speaker = "unk"
# コラプサーがどうしてここに？
line = "コラプサーがどうしてここに？"

[[dialogue]]
speaker = "ジュリエッテ"
# 「ふふ、そう警戒しなくても大丈夫でございますよ。わたくしに敵意はございませんから」
line = "「ふふ、そう警戒しなくても大丈夫でございますよ。わたくしに敵意はございませんから」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「警戒するのも無理はありませんが……ご安心くださいませ。このわたくし、ジュリエッテ・ハルヴィーノは魔王様に危害を加えませんわ」
line = "「警戒するのも無理はありませんが……ご安心くださいませ。このわたくし、ジュリエッテ・ハルヴィーノは魔王様に危害を加えませんわ」"

[[dialogue]]
speaker = "ジュリエッテ"
# （そう、魔王様にはわたくしの野望……三界を支配するための駒になっていただかなければいけませんからね♪）
line = "（そう、魔王様にはわたくしの野望……三界を支配するための駒になっていただかなければいけませんからね♪）"

[[dialogue]]
speaker = "ジュリエッテ"
# （野望のためならば今は魔王だろうが、コラプサーだろうが、いくらでも媚を売ってあげますでございますの♪）
line = "（野望のためならば今は魔王だろうが、コラプサーだろうが、いくらでも媚を売ってあげますでございますの♪）"

[[dialogue]]
speaker = "ジュリエッテ"
# 「フフフ、我ながら完ッ璧な作戦でございますわ～！」
line = "「フフフ、我ながら完ッ璧な作戦でございますわ～！」"

[[dialogue]]
speaker = "unk"
# 何か企んでるの？
line = "何か企んでるの？"

[[dialogue]]
speaker = "ジュリエッテ"
# 「ギクッ！？　な、何も企んでなどございませんわよ……おほほほほ」
line = "「ギクッ！？　な、何も企んでなどございませんわよ……おほほほほ」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「そ、それよりも魔王様っ、今日はどのようなご予定で？　もしよろしければ、わたくしがお供──」
line = "「そ、それよりも魔王様っ、今日はどのようなご予定で？　もしよろしければ、わたくしがお供──」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「あら、会長さんと……ジュリエッテ様？」
line = "「あら、会長さんと……ジュリエッテ様？」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「げっ！？　シャルレーヌ様！？」
line = "「げっ！？　シャルレーヌ様！？」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「人の顔を見てその反応は失礼ではありませんか？　ジュリエッテ様」
line = "「人の顔を見てその反応は失礼ではありませんか？　ジュリエッテ様」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「でもまあ？　あのハルヴィーノ家の落ちこぼれに礼儀を求めるなんて～無理な話かもしれませんけどぉ♪」
line = "「でもまあ？　あのハルヴィーノ家の落ちこぼれに礼儀を求めるなんて～無理な話かもしれませんけどぉ♪」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「な、ななななな！？　このメスガ──コホン！　……シャルレーヌ様こそ少々礼儀に欠けているのではございませんか？」
line = "「な、ななななな！？　このメスガ──コホン！　……シャルレーヌ様こそ少々礼儀に欠けているのではございませんか？」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「だってジュリエッテ様はハルヴィーノの家をお捨てになったのでしょう？　家を捨てた貴族など平民以下じゃないですか～？」
line = "「だってジュリエッテ様はハルヴィーノの家をお捨てになったのでしょう？　家を捨てた貴族など平民以下じゃないですか～？」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「ぎぃぃぃぃ～～～っ！　本っ当に腹が立つでございますわ～！！」
line = "「ぎぃぃぃぃ～～～っ！　本っ当に腹が立つでございますわ～！！」"

[[dialogue]]
speaker = "unk"
# なんだか因縁が深そうだね
line = "なんだか因縁が深そうだね"

[[dialogue]]
speaker = "ジュリエッテ"
# 「ただの顔見知りでございますわ！」
line = "「ただの顔見知りでございますわ！」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「一応ハルヴィーノ家も、魔界のシャリオン十貴族の１つですからね～♪」
line = "「一応ハルヴィーノ家も、魔界のシャリオン十貴族の１つですからね～♪」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「ただハルヴィーノ家は斜陽気味で、シャリオンでも微妙な立ち位置なんです。そんなハルヴィーノ家の中でも、ジュリエッテ様は特に……」
line = "「ただハルヴィーノ家は斜陽気味で、シャリオンでも微妙な立ち位置なんです。そんなハルヴィーノ家の中でも、ジュリエッテ様は特に……」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「失踪されたとお聞きして心配しておりましたが……まさかコラプサーになっているなんて思いませんでした。くふ♪　墜ちるとこまで堕ちましたね～♪」
line = "「失踪されたとお聞きして心配しておりましたが……まさかコラプサーになっているなんて思いませんでした。くふ♪　墜ちるとこまで堕ちましたね～♪」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「ふんっ、シャルレーヌ様には一生分からないでございましょうよ」
line = "「ふんっ、シャルレーヌ様には一生分からないでございましょうよ」"

[[dialogue]]
speaker = "ジュリエッテ"
# （わたくしと違い、星力にも立場にも恵まれたシャルレーヌ様には、わたくしの気持ちなど……）
line = "（わたくしと違い、星力にも立場にも恵まれたシャルレーヌ様には、わたくしの気持ちなど……）"

[[dialogue]]
speaker = "シャルレーヌ"
# 「会長さんは敵であるコラプサーなんかと一緒にいないで、私と一緒にお出かけしましょう？」
line = "「会長さんは敵であるコラプサーなんかと一緒にいないで、私と一緒にお出かけしましょう？」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「そ、そうはさせませんでございますわ！　魔王様はわたくしと一緒にいますの！」
line = "「そ、そうはさせませんでございますわ！　魔王様はわたくしと一緒にいますの！」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「むっ……私の会長さんを奪わないでくれます～？」
line = "「むっ……私の会長さんを奪わないでくれます～？」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「別に魔王様はシャルレーヌ様のものではないでございます」
line = "「別に魔王様はシャルレーヌ様のものではないでございます」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「これから私のものになるんですけど～？」
line = "「これから私のものになるんですけど～？」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「そ、そうはさせませんわ！　魔王様はわたくしのものにしますの！」
line = "「そ、そうはさせませんわ！　魔王様はわたくしのものにしますの！」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「え～？　敵であるコラプサーが会長さんに近づこうとしてるのって、す～っごく怪しいんですけどー」
line = "「え～？　敵であるコラプサーが会長さんに近づこうとしてるのって、す～っごく怪しいんですけどー」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「それは……！　その、企業秘密でございますわ！」
line = "「それは……！　その、企業秘密でございますわ！」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「企業秘密……やっぱり怪しいですね。ねえ会長さん、やっぱり私と行きましょう？　コラプサーなんて相手にする必要あります？」
line = "「企業秘密……やっぱり怪しいですね。ねえ会長さん、やっぱり私と行きましょう？　コラプサーなんて相手にする必要あります？」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「待ってくださいませっ！　魔王様、わたくしと一緒にいてくださいませ！」
line = "「待ってくださいませっ！　魔王様、わたくしと一緒にいてくださいませ！」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「ちょっと必死になりすぎじゃないですか～？　ちゃんと理由を説明してくれないと、会長さんを渡せませんよ～」
line = "「ちょっと必死になりすぎじゃないですか～？　ちゃんと理由を説明してくれないと、会長さんを渡せませんよ～」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「分かりましたわ……！　なら教えてあげますわ……！」
line = "「分かりましたわ……！　なら教えてあげますわ……！」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「わ、わたくし……わたくしは……魔王様に一目惚れしたんでございますの～！！」
line = "「わ、わたくし……わたくしは……魔王様に一目惚れしたんでございますの～！！」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「……………………」
line = "「……………………」"

[[dialogue]]
speaker = "unk"
# ええええええええええ！？
line = "ええええええええええ！？"

[[dialogue]]
speaker = "ジュリエッテ"
# （……ど、どちゃくそデカい嘘をついてしまいましたわ～～！！）
line = "（……ど、どちゃくそデカい嘘をついてしまいましたわ～～！！）"

[[dialogue]]
speaker = "ジュリエッテ"
# （で、ですが、あのシャルレーヌ様も呆気に取られてますし、ギリギリセーフでございますわ！）
line = "（で、ですが、あのシャルレーヌ様も呆気に取られてますし、ギリギリセーフでございますわ！）"

[[dialogue]]
speaker = "ジュリエッテ"
# 「わたくし、魔王様のことを心からお慕い申してございますの！　なので、シャルレーヌ様には渡せませんの！」
line = "「わたくし、魔王様のことを心からお慕い申してございますの！　なので、シャルレーヌ様には渡せませんの！」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「……くふ♪」
line = "「……くふ♪」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「へぇ～、そうなんですか～。ジュリエッテ様って、会長さんのことお好きだったんですね～」
line = "「へぇ～、そうなんですか～。ジュリエッテ様って、会長さんのことお好きだったんですね～」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「そ、そうでございますわ……！　わたくし、魔王様にメロメロでございますの！」
line = "「そ、そうでございますわ……！　わたくし、魔王様にメロメロでございますの！」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「じゃあ、今日のところはジュリエッテ様に会長さんを譲って差し上げましょう♪」
line = "「じゃあ、今日のところはジュリエッテ様に会長さんを譲って差し上げましょう♪」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「え？」
line = "「え？」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「<b>２人きり</b>で～……楽しんでくださいね<emoji=heart04>　くふふふ<emoji=heart04>」
line = "「<b>２人きり</b>で～……楽しんでくださいね<emoji=heart04>　くふふふ<emoji=heart04>」"

[[dialogue]]
speaker = "ジュリエッテ"
# （は、ハメられましたわー！！）
line = "（は、ハメられましたわー！！）"

[[dialogue]]
speaker = "ジュリエッテ"
# （シャルレーヌ様、わたくしの嘘を見抜いた上で引き下がりやがったのですわ～！）
line = "（シャルレーヌ様、わたくしの嘘を見抜いた上で引き下がりやがったのですわ～！）"

[[dialogue]]
speaker = "unk"
# ええと……
line = "ええと……"

[[dialogue]]
speaker = "ジュリエッテ"
# （気まずいですわ！　逃げ出したいですわ！　絶体絶命でございますわ！）
line = "（気まずいですわ！　逃げ出したいですわ！　絶体絶命でございますわ！）"

[[dialogue]]
speaker = "ジュリエッテ"
# （で、ですが……野望のためにも、ここで退くわけにはいきませんわ！　女は度胸！　最後まで嘘を貫き通してやるでございますわ！！）
line = "（で、ですが……野望のためにも、ここで退くわけにはいきませんわ！　女は度胸！　最後まで嘘を貫き通してやるでございますわ！！）"

[[dialogue]]
speaker = "ジュリエッテ"
# 「ま、魔王様……！　わたくし、本気でございますから……！　本気で魔王様のことを好いてございます！」
line = "「ま、魔王様……！　わたくし、本気でございますから……！　本気で魔王様のことを好いてございます！」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「ですから覚悟してくださいませ！　ぜーったいに、魔王様をわたくしのものにしてやるでございますから！」
line = "「ですから覚悟してくださいませ！　ぜーったいに、魔王様をわたくしのものにしてやるでございますから！」"
