[[dialogue]]
speaker = "unk"
# 負けてしまったリーリアの後を引き継ぎ、ダッチの前に立つサーシャさん。
line = "負けてしまったリーリアの後を引き継ぎ、ダッチの前に立つサーシャさん。"

[[dialogue]]
speaker = "ダッチ"
# 「フフフ。これは予想外！　サーシャ様、まさかここで貴女が出てくるとは思いませんでした！」
line = "「フフフ。これは予想外！　サーシャ様、まさかここで貴女が出てくるとは思いませんでした！」"

[[dialogue]]
speaker = "サーシャ"
# 「今までならそうだったかもしれないわね。でも――」
line = "「今までならそうだったかもしれないわね。でも――」"

[[dialogue]]
speaker = "サーシャ"
# 「私も今年は先輩として、頼れる『みんなのお姉ちゃん』になりたいって思っているの。だからこそ、あなたと戦って勝ってみせるわ」
line = "「私も今年は先輩として、頼れる『みんなのお姉ちゃん』になりたいって思っているの。だからこそ、あなたと戦って勝ってみせるわ」"

[[dialogue]]
speaker = "ダッチ"
# 「ほぅ、良い欲望ですねぇ。ではその欲望、私の欲望とどちらが強いか……いざ、勝負です！」
line = "「ほぅ、良い欲望ですねぇ。ではその欲望、私の欲望とどちらが強いか……いざ、勝負です！」"

[[dialogue]]
speaker = "unk"
# そうして、サーシャさんとダッチの羽根突き勝負が始まった。
line = "そうして、サーシャさんとダッチの羽根突き勝負が始まった。"

[[dialogue]]
speaker = "マトイ"
# 「サーシャさん、すごい……！」
line = "「サーシャさん、すごい……！」"

[[dialogue]]
speaker = "サーシャ"
# 「七彩流羽根突き術・伍ノ型『青』！」
line = "「七彩流羽根突き術・伍ノ型『青』！」"

[[dialogue]]
speaker = "シズハ"
# 「リーリア先輩と並ぶくらい、羽根突きが上手くなってる！」
line = "「リーリア先輩と並ぶくらい、羽根突きが上手くなってる！」"

[[dialogue]]
speaker = "アナ"
# 「しかも、七彩流羽根突き術の技まで、しっかりと会得しています」
line = "「しかも、七彩流羽根突き術の技まで、しっかりと会得しています」"

[[dialogue]]
speaker = "ダッチ"
# 「フハハハハ！　面白い！　だったら、七彩の虹はどうですか？　<ruby=ろく>陸</ruby>ノ型『藍色』！」
line = "「フハハハハ！　面白い！　だったら、七彩の虹はどうですか？　<ruby>陸<rt>ろく</rt></ruby>ノ型『藍色』！」"

[[dialogue]]
speaker = "サーシャ"
# 「<ruby=しち>漆</ruby>ノ型『紫』！！」
line = "「<ruby>漆<rt>しち</rt></ruby>ノ型『紫』！！」"

[[dialogue]]
speaker = "シズハ"
# 「７番目の技で返した！」
line = "「７番目の技で返した！」"

[[dialogue]]
speaker = "アナ"
# 「ですが、またあのカウンター技が来ます……！」
line = "「ですが、またあのカウンター技が来ます……！」"

[[dialogue]]
speaker = "ダッチ"
# 「素晴らしい！　ならば、私も本気で返しましょう！　<ruby=はち>捌</ruby>ノ型――『白兎』ィィィ！！」
line = "「素晴らしい！　ならば、私も本気で返しましょう！　<ruby>捌<rt>はち</rt></ruby>ノ型――『白兎』ィィィ！！」"

[[dialogue]]
speaker = "ダッチ"
# 「さあ、ここからどうやって技を返す気なのか！　貴女が新年に臨む『欲望』、見せて下さい！！！」
line = "「さあ、ここからどうやって技を返す気なのか！　貴女が新年に臨む『欲望』、見せて下さい！！！」"

[[dialogue]]
speaker = "獅子舞"
# （……サーシャよ、お前は初詣の日から、毎日吾輩の元へ来て晴れ着の力の使い方を学び、そしてリーリアからは七彩流羽根突き術を教わって、切磋琢磨を続けていた……）
line = "（……サーシャよ、お前は初詣の日から、毎日吾輩の元へ来て晴れ着の力の使い方を学び、そしてリーリアからは七彩流羽根突き術を教わって、切磋琢磨を続けていた……）"

[[dialogue]]
speaker = "獅子舞"
# 「見せてやれ、サーシャ。お前だけの、晴れ着を超えた『スーパー晴れ着フォーム』の力を！」
line = "「見せてやれ、サーシャ。お前だけの、晴れ着を超えた『スーパー晴れ着フォーム』の力を！」"

[[dialogue]]
speaker = "リーリア"
# 「サーシャさん、マジカルフルパワーでぶちかましちゃって下さい！」
line = "「サーシャさん、マジカルフルパワーでぶちかましちゃって下さい！」"

[[dialogue]]
speaker = "サーシャ"
# 「ええ。私の渾身の想いを込めて、全力で行くわよ～！」
line = "「ええ。私の渾身の想いを込めて、全力で行くわよ～！」"

[[dialogue]]
speaker = "unk"
# サーシャは武器である<ruby=きね>杵</ruby>を大きく振りかぶり、そこに晴れ着の力を収束させて――
line = "サーシャは武器である<ruby>杵<rt>きね</rt></ruby>を大きく振りかぶり、そこに晴れ着の力を収束させて――"

[[dialogue]]
speaker = "サーシャ"
# 「<ruby=かなで>奏</ruby>流餅つき術・壱ノ型『もちもちインパクト』！！！」
line = "「<ruby>奏<rt>かなで</rt></ruby>流餅つき術・壱ノ型『もちもちインパクト』！！！」"

[[dialogue]]
speaker = "unk"
# 思いっきりフルスイングで羽根を打ち返した。
line = "思いっきりフルスイングで羽根を打ち返した。"

[[dialogue]]
speaker = "ダッチ"
# 「もちもちィ！！？」
line = "「もちもちィ！！？」"

[[dialogue]]
speaker = "シズハ"
# 「羽根突きじゃなくて、餅つき術！？」
line = "「羽根突きじゃなくて、餅つき術！？」"

[[dialogue]]
speaker = "サーシャ"
# 「って、あぁっ！？　ちょっと力を入れ過ぎちゃったわ～！　狙いが～！」
line = "「って、あぁっ！？　ちょっと力を入れ過ぎちゃったわ～！　狙いが～！」"

[[dialogue]]
speaker = "ダッチ"
# 「ンンン！？　羽根が私に向かって、真っ直ぐに！？　――フオオオオオオオオオオオオオオッ！？」
line = "「ンンン！？　羽根が私に向かって、真っ直ぐに！？　――フオオオオオオオオオオオオオオッ！？」"

[[dialogue]]
speaker = "unk"
# 羽根は全く地面に落ちず、むしろ天に向けて打ち上がるような軌道を描きながら、ダッチの土手っ腹に直撃した。
line = "羽根は全く地面に落ちず、むしろ天に向けて打ち上がるような軌道を描きながら、ダッチの土手っ腹に直撃した。"

[[dialogue]]
speaker = "アナ"
# 「おぉう。クリーンヒット」
line = "「おぉう。クリーンヒット」"

[[dialogue]]
speaker = "ダッチ"
# 「ウオオオオオオオオオオーーーッ！？　この受け止め切れない程に重い一撃……！　これが、サーシャ様の晴れ着の力！？」
line = "「ウオオオオオオオオオオーーーッ！？　この受け止め切れない程に重い一撃……！　これが、サーシャ様の晴れ着の力！？」"

[[dialogue]]
speaker = "獅子舞"
# 「お前と同じだ、愚弟！　サーシャは七彩流羽根突き術を踏まえた上で、己の新たな型を生み出した。それがサーシャだけの『奏流餅つき術』！」
line = "「お前と同じだ、愚弟！　サーシャは七彩流羽根突き術を踏まえた上で、己の新たな型を生み出した。それがサーシャだけの『奏流餅つき術』！」"

[[dialogue]]
speaker = "ダッチ"
# 「なるほど……素晴らしい！　この欲望のロストアイテム、ダッチが認めましょう！　貴女のその晴れ着は、バニーを付け足さずとも、とても素晴らしい物であると！」
line = "「なるほど……素晴らしい！　この欲望のロストアイテム、ダッチが認めましょう！　貴女のその晴れ着は、バニーを付け足さずとも、とても素晴らしい物であると！」"

[[dialogue]]
speaker = "ダッチ"
# 「だからこそ燃える！　いつの日か、その晴れ着フォームを凌駕する、貴女に似合う究極のバニーフォームを私が用意してみせましょう！」
line = "「だからこそ燃える！　いつの日か、その晴れ着フォームを凌駕する、貴女に似合う究極のバニーフォームを私が用意してみせましょう！」"

[[dialogue]]
speaker = "ダッチ"
# 「ああ……本当はリーリア様や他の皆様とも、もっと戯れたかったところですが、どうやら今回はこれにてショウダウンのようです！」
line = "「ああ……本当はリーリア様や他の皆様とも、もっと戯れたかったところですが、どうやら今回はこれにてショウダウンのようです！」"

[[dialogue]]
speaker = "ダッチ"
# 「それではまたお会いしましょう！　シーユー・ネクストゲームです！　フオオオオオオオオオオオオオオオオオーーーーーーッ！！？」
line = "「それではまたお会いしましょう！　シーユー・ネクストゲームです！　フオオオオオオオオオオオオオオオオオーーーーーーッ！！？」"

[[dialogue]]
speaker = "unk"
# そうしてダッチは強烈な羽根の一撃で、空の彼方まで吹き飛ばされ――小さく『キラン☆』と輝き、見事な星になったのであった。
line = "そうしてダッチは強烈な羽根の一撃で、空の彼方まで吹き飛ばされ――小さく『キラン☆』と輝き、見事な星になったのであった。"

[[dialogue]]
speaker = "シズハ"
# 「やった！　すごいっ！　サーシャさんが勝ったぁ～っ！！」
line = "「やった！　すごいっ！　サーシャさんが勝ったぁ～っ！！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ビームみたいにスカッとぶっ飛ばしてやったわね！」
line = "「ビームみたいにスカッとぶっ飛ばしてやったわね！」"

[[dialogue]]
speaker = "サーシャ"
# 「あら～。でも、私のせいで逃がしちゃったわ～」
line = "「あら～。でも、私のせいで逃がしちゃったわ～」"

[[dialogue]]
speaker = "unk"
# 事故みたいなものだったので……
line = "事故みたいなものだったので……"

[[dialogue]]
speaker = "unk"
# まあ、今回は遭遇自体が
line = "まあ、今回は遭遇自体が"

[[dialogue]]
speaker = "unk"
# ダッチを本気で捕らえるつもりなら、ゲームの勝利報酬として『ダッチを捕らえること』を条件に掲げなければならないだろう。
line = "ダッチを本気で捕らえるつもりなら、ゲームの勝利報酬として『ダッチを捕らえること』を条件に掲げなければならないだろう。"

[[dialogue]]
speaker = "unk"
# しかし、その賭けを成立させ、ダッチとの勝負に勝つのは、相当難しい。
line = "しかし、その賭けを成立させ、ダッチとの勝負に勝つのは、相当難しい。"

[[dialogue]]
speaker = "リーリア"
# 「そうそう！　とりあえず勝ったんですから、喜びましょうよ！　さすがサーシャさんです♪」
line = "「そうそう！　とりあえず勝ったんですから、喜びましょうよ！　さすがサーシャさんです♪」"

[[dialogue]]
speaker = "サーシャ"
# 「ふふっ、ありがと～。リーリアちゃんが先にダッチさんの切り札を出させてくれていたからこそ、落ち着いて対応できたわ」
line = "「ふふっ、ありがと～。リーリアちゃんが先にダッチさんの切り札を出させてくれていたからこそ、落ち着いて対応できたわ」"

[[dialogue]]
speaker = "リーリア"
# 「いえいえ。というか正直、負けた時は内心ヤバいかもって焦りまくりでした！」
line = "「いえいえ。というか正直、負けた時は内心ヤバいかもって焦りまくりでした！」"

[[dialogue]]
speaker = "リーリア"
# 「サーシャさんが堂々とバトンを受けとってくれて、こちらこそ助かりました。マジカル感謝です☆」
line = "「サーシャさんが堂々とバトンを受けとってくれて、こちらこそ助かりました。マジカル感謝です☆」"

[[dialogue]]
speaker = "獅子舞"
# 「ふん……サーシャ、よくぞ晴れ着の名誉を守ってくれたな。吾輩がお前を認めてやろう」
line = "「ふん……サーシャ、よくぞ晴れ着の名誉を守ってくれたな。吾輩がお前を認めてやろう」"

[[dialogue]]
speaker = "サーシャ"
# 「ありがとう～、獅子舞さん。私、このスーパー晴れ着フォームをもっと鍛えて、可愛い後輩たちを守ってみせるわ」
line = "「ありがとう～、獅子舞さん。私、このスーパー晴れ着フォームをもっと鍛えて、可愛い後輩たちを守ってみせるわ」"

[[dialogue]]
speaker = "アナ"
# 「おみそれしました。私もサーシャ先輩を見習って、訓練に取り組まないとですね」
line = "「おみそれしました。私もサーシャ先輩を見習って、訓練に取り組まないとですね」"

[[dialogue]]
speaker = "シズハ"
# 「私も！　サーシャさん、今度一緒に訓練してもいい？」
line = "「私も！　サーシャさん、今度一緒に訓練してもいい？」"

[[dialogue]]
speaker = "サーシャ"
# 「ええ、もちろんいいわよ～♪　でも、まずは――」
line = "「ええ、もちろんいいわよ～♪　でも、まずは――」"

[[dialogue]]
speaker = "サーシャ"
# 「みんなで初詣を再開しましょうか。シズハちゃんとリーリアちゃんも、よければこの後、一緒にどう？」
line = "「みんなで初詣を再開しましょうか。シズハちゃんとリーリアちゃんも、よければこの後、一緒にどう？」"

[[dialogue]]
speaker = "シズハ"
# 「はい！　私ももっと星騎士として強くなれるように、改めて新年のお願いをしていきます！」
line = "「はい！　私ももっと星騎士として強くなれるように、改めて新年のお願いをしていきます！」"

[[dialogue]]
speaker = "リーリア"
# 「私も、センパイに晴れ着を見せてなかったので、タイミング的にはちょうどよかったです☆」
line = "「私も、センパイに晴れ着を見せてなかったので、タイミング的にはちょうどよかったです☆」"

[[dialogue]]
speaker = "リーリア"
# 「と、い・う・わ・け・で～♪　可愛い後輩の新衣装ですよ～☆　た～くさん、褒めてくださいね、センパイ♪」
line = "「と、い・う・わ・け・で～♪　可愛い後輩の新衣装ですよ～☆　た～くさん、褒めてくださいね、センパイ♪」"

[[dialogue]]
speaker = "unk"
# こうして俺たちは、仲間と共に賑やかに願いを捧げて、新たな年を歩み始めるのだった。
line = "こうして俺たちは、仲間と共に賑やかに願いを捧げて、新たな年を歩み始めるのだった。"
