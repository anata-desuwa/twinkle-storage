[[dialogue]]
speaker = "unk"
# 第５話,墜落,B
line = "第５話,墜落,B"

[[dialogue]]
speaker = "クロト"
# 「っ……はぁ……何が起きたんだ……？」
line = "「っ……はぁ……何が起きたんだ……？」"

[[dialogue]]
speaker = "unk"
# 地面に激突した痛みをこらえながら起き上がる。
line = "地面に激突した痛みをこらえながら起き上がる。"

[[dialogue]]
speaker = "unk"
# そこは──
line = "そこは──"

[[dialogue]]
speaker = "クロト"
# 「ここは……？　ガーディアンの自爆に巻き込まれて……落ちたのか……？」
line = "「ここは……？　ガーディアンの自爆に巻き込まれて……落ちたのか……？」"

[[dialogue]]
speaker = "クロト"
# 「俺だけか？　みんなはどこに……？」
line = "「俺だけか？　みんなはどこに……？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あたたたた……」
line = "「あたたたた……」"

[[dialogue]]
speaker = "メルエル"
# 「うぅ……頭痛い……」
line = "「うぅ……頭痛い……」"

[[dialogue]]
speaker = "クロト"
# 「ヴィーナス！　メルエル！　怪我はないか？」
line = "「ヴィーナス！　メルエル！　怪我はないか？」"

[[dialogue]]
speaker = "メルエル"
# 「ありがとう、私は大丈夫。ちょっとふらふらしてるけど、すぐ収まると思う」
line = "「ありがとう、私は大丈夫。ちょっとふらふらしてるけど、すぐ収まると思う」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええ、私も平気よ。２人も一緒に落ちてきたのね。無事でよかったわ」
line = "「ええ、私も平気よ。２人も一緒に落ちてきたのね。無事でよかったわ」"

[[dialogue]]
speaker = "メルエル"
# 「うん、会長くんとヴィーナスちゃんが元気そうで安心した。だけど他のみんなは……」
line = "「うん、会長くんとヴィーナスちゃんが元気そうで安心した。だけど他のみんなは……」"

[[dialogue]]
speaker = "unk"
# 周囲を見回してみるが、俺とヴィーナス、メルエル以外の姿はない。
line = "周囲を見回してみるが、俺とヴィーナス、メルエル以外の姿はない。"

[[dialogue]]
speaker = "unk"
# 他のみんなは別のところに落ちたか、ガーディアンの光に巻き込まれなかったか……どちらにせよ今すぐ安否を確かめる手段はない。
line = "他のみんなは別のところに落ちたか、ガーディアンの光に巻き込まれなかったか……どちらにせよ今すぐ安否を確かめる手段はない。"

[[dialogue]]
speaker = "メルエル"
# 「飛んで戻れればいいんだけど……ダメ。星力を使っても体が浮かないよ」
line = "「飛んで戻れればいいんだけど……ダメ。星力を使っても体が浮かないよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私もね。クロトは？」
line = "「私もね。クロトは？」"

[[dialogue]]
speaker = "クロト"
# 「俺も飛べないみたいだ」
line = "「俺も飛べないみたいだ」"

[[dialogue]]
speaker = "クロト"
# 「だけど戦闘服のままだし、星力は失われていないはず。さっきの光は、おそらく星騎士の飛行能力を麻痺させるものだと思う」
line = "「だけど戦闘服のままだし、星力は失われていないはず。さっきの光は、おそらく星騎士の飛行能力を麻痺させるものだと思う」"

[[dialogue]]
speaker = "メルエル"
# 「なるほど、それは厄介だね。そのうち戻るといいんだけど……」
line = "「なるほど、それは厄介だね。そのうち戻るといいんだけど……」"

[[dialogue]]
speaker = "メルエル"
# 「でも……ここはどこ？」
line = "「でも……ここはどこ？」"

[[dialogue]]
speaker = "unk"
# 今自分たちがいる場所を見上げる。
line = "今自分たちがいる場所を見上げる。"

[[dialogue]]
speaker = "unk"
# 大樹のような巨大な柱に、高層ビルでも届かないような遥か高い天井。
line = "大樹のような巨大な柱に、高層ビルでも届かないような遥か高い天井。"

[[dialogue]]
speaker = "unk"
# 巨人でも出てきそうな広大な空間だ。
line = "巨人でも出てきそうな広大な空間だ。"

[[dialogue]]
speaker = "クロト"
# 「おそらくここは女神の神殿の内部だろう。神殿の中に入れたのは、怪我の功名だ」
line = "「おそらくここは女神の神殿の内部だろう。神殿の中に入れたのは、怪我の功名だ」"

[[dialogue]]
speaker = "クロト"
# 「みんなと合流したいが、極星星徒会に先を越されるとまずい。このまま中枢まで向かおう」
line = "「みんなと合流したいが、極星星徒会に先を越されるとまずい。このまま中枢まで向かおう」"

[[dialogue]]
speaker = "メルエル"
# 「うん、私も賛成だよ」
line = "「うん、私も賛成だよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「じゃあノヴァフォームで神殿をぶち抜いて、一気に進むわよ！」
line = "「じゃあノヴァフォームで神殿をぶち抜いて、一気に進むわよ！」"

[[dialogue]]
speaker = "クロト"
# 「いや、それは待ってくれ。進む方向がわからないのにノヴァフォームを使用して、消耗するのはまずい」
line = "「いや、それは待ってくれ。進む方向がわからないのにノヴァフォームを使用して、消耗するのはまずい」"

[[dialogue]]
speaker = "クロト"
# 「それにあのガーディアンの自爆の時……」
line = "「それにあのガーディアンの自爆の時……」"

[[dialogue]]
speaker = "メルエル"
# 「ナターシャちゃんが言ってた。『魔王の力に反応した』──って」
line = "「ナターシャちゃんが言ってた。『魔王の力に反応した』──って」"

[[dialogue]]
speaker = "unk"
# ナターシャの説明によると、約２０００年前、この神殿は悪しき魔王に狙われた。
line = "ナターシャの説明によると、約２０００年前、この神殿は悪しき魔王に狙われた。"

[[dialogue]]
speaker = "unk"
# であれば、魔王への対策があってもおかしくないだろう。
line = "であれば、魔王への対策があってもおかしくないだろう。"

[[dialogue]]
speaker = "クロト"
# 「ノヴァフォームは魔王因子を使うものだし、今変身すると何が起こるか分からない」
line = "「ノヴァフォームは魔王因子を使うものだし、今変身すると何が起こるか分からない」"

[[dialogue]]
speaker = "クロト"
# 「極星星徒会と直接戦闘することもあるだろうし、いざという時の切り札にしておこう」
line = "「極星星徒会と直接戦闘することもあるだろうし、いざという時の切り札にしておこう」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……わかったわ。ノヴァフォームは消耗が激しいし、ここぞというタイミングで使いたいものね」
line = "「……わかったわ。ノヴァフォームは消耗が激しいし、ここぞというタイミングで使いたいものね」"

[[dialogue]]
speaker = "unk"
# 温存の方針は決まった。だが神殿内を進むにはもう１つ問題がある。
line = "温存の方針は決まった。だが神殿内を進むにはもう１つ問題がある。"

[[dialogue]]
speaker = "ヴィーナス"
# 「でもどっちに進めばいいのかしら？　神殿の構造なんてわからないし……」
line = "「でもどっちに進めばいいのかしら？　神殿の構造なんてわからないし……」"

[[dialogue]]
speaker = "ガーディアン"
# 「ピーガガガ」
line = "「ピーガガガ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あら、フィーニスの塔でも見たガーディアンじゃない。もはや懐かしさすら感じるわ」
line = "「あら、フィーニスの塔でも見たガーディアンじゃない。もはや懐かしさすら感じるわ」"

[[dialogue]]
speaker = "ガーディアン"
# 「ピピピピ！」
line = "「ピピピピ！」"

[[dialogue]]
speaker = "クロト"
# 「攻撃してきた──！」
line = "「攻撃してきた──！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ちょっと、私たちは神殿を守りに来たんだけど！　見境無しってこと！？」
line = "「ちょっと、私たちは神殿を守りに来たんだけど！　見境無しってこと！？」"

[[dialogue]]
speaker = "クロト"
# （応戦するか、力を温存するために隠れるか……）
line = "（応戦するか、力を温存するために隠れるか……）"

[[dialogue]]
speaker = "unk"
# いくつかの選択肢が頭に浮かぶ。
line = "いくつかの選択肢が頭に浮かぶ。"

[[dialogue]]
speaker = "unk"
# このガーディアンを倒せば道が開けるとは限らない。戦いを避けるのも１つの手のように思える。
line = "このガーディアンを倒せば道が開けるとは限らない。戦いを避けるのも１つの手のように思える。"

[[dialogue]]
speaker = "メルエル"
# 「ねぇ、ガーディアンは神殿を守ろうとしてるんだよね？」
line = "「ねぇ、ガーディアンは神殿を守ろうとしてるんだよね？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「多分そうだけど……どうしたの、メルエル？」
line = "「多分そうだけど……どうしたの、メルエル？」"

[[dialogue]]
speaker = "メルエル"
# 「今思ったんだけど、きっとガーディアンは中枢に向かう敵を排除しようとしてる」
line = "「今思ったんだけど、きっとガーディアンは中枢に向かう敵を排除しようとしてる」"

[[dialogue]]
speaker = "メルエル"
# 「じゃあ逆に、ガーディアンのいる方に進めば、神殿の中枢に近づけるんじゃないかな？」
line = "「じゃあ逆に、ガーディアンのいる方に進めば、神殿の中枢に近づけるんじゃないかな？」"

[[dialogue]]
speaker = "クロト"
# 「……一理あるな。よし、ガーディアンを撃破しながら進もう！」
line = "「……一理あるな。よし、ガーディアンを撃破しながら進もう！」"

[[dialogue]]
speaker = "メルエル"
# 「うん！」
line = "「うん！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええ、力ずくで進むわよ！」
line = "「ええ、力ずくで進むわよ！」"

[[dialogue]]
speaker = "unk"
# 道標は他にない。極星星徒会が先んずる可能性を考えれば、迷っている暇はなかった。
line = "道標は他にない。極星星徒会が先んずる可能性を考えれば、迷っている暇はなかった。"

[[dialogue]]
speaker = "unk"
# ならここはわずかな手がかりに懸けるべきだ。
line = "ならここはわずかな手がかりに懸けるべきだ。"

[[dialogue]]
speaker = "メルエル"
# 「ディヴォーテッド・スラスト！」
line = "「ディヴォーテッド・スラスト！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ヴィーナスエクスカリバー！」
line = "「ヴィーナスエクスカリバー！」"

[[dialogue]]
speaker = "unk"
# そしてガーディアンを撃破しながら突き進み──
line = "そしてガーディアンを撃破しながら突き進み──"

[[dialogue]]
speaker = "ヴィーナス"
# 「進む度にガーディアンが増えてきたわね。きっとメルエルが言ったので正解だわ！」
line = "「進む度にガーディアンが増えてきたわね。きっとメルエルが言ったので正解だわ！」"

[[dialogue]]
speaker = "メルエル"
# 「はぁ、はぁ……うん、ならよかった」
line = "「はぁ、はぁ……うん、ならよかった」"

[[dialogue]]
speaker = "クロト"
# 「メルエル、大丈夫か？」
line = "「メルエル、大丈夫か？」"

[[dialogue]]
speaker = "unk"
# ガーディアンとの連戦のせいで、疲労が表情に表れている。
line = "ガーディアンとの連戦のせいで、疲労が表情に表れている。"

[[dialogue]]
speaker = "unk"
# メルエルも優秀なプリマステラだが、ヴィーナスについてくるのは負担が大きかったかもしれない。
line = "メルエルも優秀なプリマステラだが、ヴィーナスについてくるのは負担が大きかったかもしれない。"

[[dialogue]]
speaker = "メルエル"
# 「平気！　絶対役に立つって言ったでしょ。こんなところでへばってなんていられないんだから！」
line = "「平気！　絶対役に立つって言ったでしょ。こんなところでへばってなんていられないんだから！」"

[[dialogue]]
speaker = "メルエル"
# 「だからどんどん頼って、会長くん！」
line = "「だからどんどん頼って、会長くん！」"

[[dialogue]]
speaker = "unk"
# 瞳に強い意志を宿し、気丈に笑顔を作るメルエル。
line = "瞳に強い意志を宿し、気丈に笑顔を作るメルエル。"

[[dialogue]]
speaker = "unk"
# この戦いには、天界の<ruby=すうせい>趨勢</ruby>と、天使全ての命が懸かっている。もちろんメルエル自身の命も。
line = "この戦いには、天界の<ruby>趨勢<rt>すうせい</rt></ruby>と、天使全ての命が懸かっている。もちろんメルエル自身の命も。"

[[dialogue]]
speaker = "unk"
# ここは無理のしどころだ。
line = "ここは無理のしどころだ。"

[[dialogue]]
speaker = "クロト"
# 「ああ、わかった。頼むぞ、メルエル」
line = "「ああ、わかった。頼むぞ、メルエル」"

[[dialogue]]
speaker = "メルエル"
# 「うん！」
line = "「うん！」"

[[dialogue]]
speaker = "ゴルドン"
# 「ピガガガー！」
line = "「ピガガガー！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「またおいでなすったわね！　何度でもスクラップにしてあげるわ！」
line = "「またおいでなすったわね！　何度でもスクラップにしてあげるわ！」"

[[dialogue]]
speaker = "unk"
# 行く手に立ちはだかるように、機械型のガーディアンがまた現れる。
line = "行く手に立ちはだかるように、機械型のガーディアンがまた現れる。"

[[dialogue]]
speaker = "フェアリー"
# 「──」
line = "「──」"

[[dialogue]]
speaker = "クロト"
# 「！　いつの間に──」
line = "「！　いつの間に──」"

[[dialogue]]
speaker = "unk"
# しかし他のガーディアンを囮にして、小型のガーディアンがいつの間にか接近していた。
line = "しかし他のガーディアンを囮にして、小型のガーディアンがいつの間にか接近していた。"

[[dialogue]]
speaker = "メルエル"
# 「きゃあっ！？」
line = "「きゃあっ！？」"

[[dialogue]]
speaker = "クロト"
# （！？　この光景は……俺がアステラに連れ去られた時の……？）
line = "（！？　この光景は……俺がアステラに連れ去られた時の……？）"

[[dialogue]]
speaker = "unk"
# まるで蟻のように俺に群がるモンスター。
line = "まるで蟻のように俺に群がるモンスター。"

[[dialogue]]
speaker = "unk"
# 必死の抵抗も虚しくアステラ内部に連れていかれ、死を待つだけの状態だった。
line = "必死の抵抗も虚しくアステラ内部に連れていかれ、死を待つだけの状態だった。"

[[dialogue]]
speaker = "unk"
# セイファート元学園長が来てくれなければ、俺は死体も残らず朽ち果てていただろう。
line = "セイファート元学園長が来てくれなければ、俺は死体も残らず朽ち果てていただろう。"

[[dialogue]]
speaker = "クロト"
# （あの時の怖さは今でも覚えている。忘れるはずがない）
line = "（あの時の怖さは今でも覚えている。忘れるはずがない）"

[[dialogue]]
speaker = "unk"
# 冷たい汗が噴き出て、心臓の鼓動が速くなる。
line = "冷たい汗が噴き出て、心臓の鼓動が速くなる。"

[[dialogue]]
speaker = "unk"
# 比べ物にならない強敵と戦ってきたけど、あの時より恐怖を覚えたことはなかった。
line = "比べ物にならない強敵と戦ってきたけど、あの時より恐怖を覚えたことはなかった。"

[[dialogue]]
speaker = "メルエル"
# 「大丈夫、会長くん！？」
line = "「大丈夫、会長くん！？」"

[[dialogue]]
speaker = "クロト"
# 「あ、ああ……ありがとう、メルエル。だけど今見えたものは……？」
line = "「あ、ああ……ありがとう、メルエル。だけど今見えたものは……？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ガーディアンの光を浴びたら、何かが見えて……アステラの中だった気がするわね」
line = "「ガーディアンの光を浴びたら、何かが見えて……アステラの中だった気がするわね」"

[[dialogue]]
speaker = "メルエル"
# 「うん、私もアステラが見えたよ」
line = "「うん、私もアステラが見えたよ」"

[[dialogue]]
speaker = "クロト"
# 「ヴィーナスとメルエルにも見えたのか？」
line = "「ヴィーナスとメルエルにも見えたのか？」"

[[dialogue]]
speaker = "メルエル"
# 「会長くんも？　顔色が悪いみたいだけど……」
line = "「会長くんも？　顔色が悪いみたいだけど……」"

[[dialogue]]
speaker = "クロト"
# 「……あの光景は、俺がアステラに連れ去られた時のものなんだ」
line = "「……あの光景は、俺がアステラに連れ去られた時のものなんだ」"

[[dialogue]]
speaker = "メルエル"
# 「会長くんの記憶……！？　どういうこと……？」
line = "「会長くんの記憶……！？　どういうこと……？」"

[[dialogue]]
speaker = "クロト"
# 「わからない。だけどあれが神殿の防衛機構だとすれば、多分トラウマを刺激して、精神攻撃を行うものだと思う」
line = "「わからない。だけどあれが神殿の防衛機構だとすれば、多分トラウマを刺激して、精神攻撃を行うものだと思う」"

[[dialogue]]
speaker = "クロト"
# 「きっとトラウマを伝播させて、見境なく侵入者を攻撃しているんじゃないか」
line = "「きっとトラウマを伝播させて、見境なく侵入者を攻撃しているんじゃないか」"

[[dialogue]]
speaker = "ヴィーナス"
# 「女神の神殿なのに、随分いやらしい攻撃してくれるじゃない」
line = "「女神の神殿なのに、随分いやらしい攻撃してくれるじゃない」"

[[dialogue]]
speaker = "メルエル"
# 「女神様でも、それはちょっとひどいと思うな……！」
line = "「女神様でも、それはちょっとひどいと思うな……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「でもそういう攻撃をしてくるガーディアンがいるってわかれば、注意すればいいだけだわ」
line = "「でもそういう攻撃をしてくるガーディアンがいるってわかれば、注意すればいいだけだわ」"

[[dialogue]]
speaker = "unk"
# ガーディアンに向かって杖を構えるヴィーナス。しかしそこに──
line = "ガーディアンに向かって杖を構えるヴィーナス。しかしそこに──"

[[dialogue]]
speaker = "ホルン"
# 「クルルー！」
line = "「クルルー！」"

[[dialogue]]
speaker = "スレイプニル"
# 「ブルル！」
line = "「ブルル！」"

[[dialogue]]
speaker = "クロト"
# 「極星従騎まで……！」
line = "「極星従騎まで……！」"

[[dialogue]]
speaker = "メルエル"
# 「でも極星従騎がいるってことは……」
line = "「でも極星従騎がいるってことは……」"

[[dialogue]]
speaker = "クロト"
# 「ああ、おそらく極星星徒会がここを通ったはずだ」
line = "「ああ、おそらく極星星徒会がここを通ったはずだ」"

[[dialogue]]
speaker = "クロト"
# 「極星従騎は強敵だ。ここで足止めされれば、極星星徒会が先に神殿の奥に行ってしまう」
line = "「極星従騎は強敵だ。ここで足止めされれば、極星星徒会が先に神殿の奥に行ってしまう」"

[[dialogue]]
speaker = "ヴィーナス"
# 「つまり、今が切り札の使い時ってことね？」
line = "「つまり、今が切り札の使い時ってことね？」"

[[dialogue]]
speaker = "クロト"
# 「ああ、頼んだ！」
line = "「ああ、頼んだ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「まっかせなさい！　チェンジ・ノヴァフォーム！」
line = "「まっかせなさい！　チェンジ・ノヴァフォーム！」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「今度こそノヴァフォームの力、見せつけてやるわ！」
line = "「今度こそノヴァフォームの力、見せつけてやるわ！」"

[[dialogue]]
speaker = "メルエル"
# 「これがヴィーナスちゃんのノヴァフォーム……すっごく強そう……！」
line = "「これがヴィーナスちゃんのノヴァフォーム……すっごく強そう……！」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「もちろん強いわよ！　クロト、メルエル、ちょっとじっとしててね」
line = "「もちろん強いわよ！　クロト、メルエル、ちょっとじっとしててね」"

[[dialogue]]
speaker = "unk"
# ヴィーナスが俺とメルエルを脇に抱える。
line = "ヴィーナスが俺とメルエルを脇に抱える。"

[[dialogue]]
speaker = "クロト"
# 「ん？」
line = "「ん？」"

[[dialogue]]
speaker = "メルエル"
# 「え？」
line = "「え？」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「クロト、メルエル、しっかり掴まっててね！　それじゃ──」
line = "「クロト、メルエル、しっかり掴まっててね！　それじゃ──」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「ノヴァダーーーーーッシュ！！！」
line = "「ノヴァダーーーーーッシュ！！！」"

[[dialogue]]
speaker = "クロト"
# 「うわぁっ！？」
line = "「うわぁっ！？」"

[[dialogue]]
speaker = "メルエル"
# 「わーーーーーーっ！！？」
line = "「わーーーーーーっ！！？」"

[[dialogue]]
speaker = "unk"
# そしてヴィーナスは星力の光をまとい、弾丸となって走り出した。
line = "そしてヴィーナスは星力の光をまとい、弾丸となって走り出した。"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「飛べないならジャンプすればいいのよ！」
line = "「飛べないならジャンプすればいいのよ！」"

[[dialogue]]
speaker = "unk"
# その言葉通り一跳びで数十メートルを跳躍し、猛烈なスピードで神殿内を駆ける。
line = "その言葉通り一跳びで数十メートルを跳躍し、猛烈なスピードで神殿内を駆ける。"

[[dialogue]]
speaker = "スレイプニル"
# 「ブルルル！」
line = "「ブルルル！」"

[[dialogue]]
speaker = "unk"
# 極星従騎が前に立ちふさがるが──
line = "極星従騎が前に立ちふさがるが──"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「邪魔！」
line = "「邪魔！」"

[[dialogue]]
speaker = "スレイプニル"
# 「！？」
line = "「！？」"

[[dialogue]]
speaker = "unk"
# ヴィーナスは星術を使うことすらなく、体当たりで極星従騎を粉々にした。
line = "ヴィーナスは星術を使うことすらなく、体当たりで極星従騎を粉々にした。"

[[dialogue]]
speaker = "メルエル"
# 「極星従騎がこんな簡単に……！？　これがノヴァフォームの力！？」
line = "「極星従騎がこんな簡単に……！？　これがノヴァフォームの力！？」"

[[dialogue]]
speaker = "メルエル"
# 「だけど目が回るよ～～～っ！！」
line = "「だけど目が回るよ～～～っ！！」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「さらに加速するわよーーっ！！」
line = "「さらに加速するわよーーっ！！」"

[[dialogue]]
speaker = "メルエル"
# 「きゃ～～～っ！？」
line = "「きゃ～～～っ！？」"

[[dialogue]]
speaker = "unk"
# アトラクションじみた加速と疾走感とともに、一直線に駆け抜けて──
line = "アトラクションじみた加速と疾走感とともに、一直線に駆け抜けて──"

[[dialogue]]
speaker = "グレイス"
# 「まさか飛行が不可能になるとは思いませんでした……しかしもうすぐで最深部に──」
line = "「まさか飛行が不可能になるとは思いませんでした……しかしもうすぐで最深部に──」"

[[dialogue]]
speaker = "メルエル"
# 「いた！　極星星徒会の星騎士だ！」
line = "「いた！　極星星徒会の星騎士だ！」"

[[dialogue]]
speaker = "グレイス"
# 「！　アルタイルの星騎士……緋宮クロト……！」
line = "「！　アルタイルの星騎士……緋宮クロト……！」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「見つけたわ、極星星徒会！　あなたたちの思い通りにはさせないわよ！」
line = "「見つけたわ、極星星徒会！　あなたたちの思い通りにはさせないわよ！」"
