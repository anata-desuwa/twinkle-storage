[[dialogue]]
speaker = "unk"
# 第２話,思わぬところで意気投合,P
line = "第２話,思わぬところで意気投合,P"

[[dialogue]]
speaker = "unk"
# 一方、ネビュラ基地では──
line = "一方、ネビュラ基地では──"

[[dialogue]]
speaker = "マリオン"
# 「こんにちは、キサナさん」
line = "「こんにちは、キサナさん」"

[[dialogue]]
speaker = "キサナ"
# 「チッ……またおまえかよ」
line = "「チッ……またおまえかよ」"

[[dialogue]]
speaker = "マリオン"
# 「コラプサーの皆さんがネビュラの指揮下に入りましたので、是非とも親睦を深めたいと思いまして」
line = "「コラプサーの皆さんがネビュラの指揮下に入りましたので、是非とも親睦を深めたいと思いまして」"

[[dialogue]]
speaker = "マリオン"
# 「敵ならばコラプサーは脅威ですが、味方であれば頼もしい戦力になりますから。個人的にもキサナさんに興味がありまして……」
line = "「敵ならばコラプサーは脅威ですが、味方であれば頼もしい戦力になりますから。個人的にもキサナさんに興味がありまして……」"

[[dialogue]]
speaker = "キサナ"
# 「そういうのはいらねえよ。いつの間にかオマエらに協力する流れになってるが、慣れ合うつもりはねぇ」
line = "「そういうのはいらねえよ。いつの間にかオマエらに協力する流れになってるが、慣れ合うつもりはねぇ」"

[[dialogue]]
speaker = "マリオン"
# 「うふ、ふふふ……魔女や星騎士には見られないそのワイルドさ、魅力的ですね……<emoji=heart04>　耳としっぽもとってもセクシーです<emoji=heart04>」
line = "「うふ、ふふふ……魔女や星騎士には見られないそのワイルドさ、魅力的ですね……<emoji=heart04>　耳としっぽもとってもセクシーです<emoji=heart04>」"

[[dialogue]]
speaker = "キサナ"
# （はぁ？　ミリョクテキ？　セクシー？　こいつ何言ってやがる？）
line = "（はぁ？　ミリョクテキ？　セクシー？　こいつ何言ってやがる？）"

[[dialogue]]
speaker = "キサナ"
# 「第一、んなことしなくても裏切らねーよ。アタシは飯が食えればそれでいいんだ」
line = "「第一、んなことしなくても裏切らねーよ。アタシは飯が食えればそれでいいんだ」"

[[dialogue]]
speaker = "マリオン"
# 「でしたら今度、一緒にお食事でもいかがでしょう？　腕によりをかけて料理をお作りしますよ」
line = "「でしたら今度、一緒にお食事でもいかがでしょう？　腕によりをかけて料理をお作りしますよ」"

[[dialogue]]
speaker = "マリオン"
# 「もちろんレストランでも構いません。とっても美味しいお店を知っているんです」
line = "「もちろんレストランでも構いません。とっても美味しいお店を知っているんです」"

[[dialogue]]
speaker = "キサナ"
# 「お、おお？　でも足りなかったり、クソ不味かったら承知しねえからな」
line = "「お、おお？　でも足りなかったり、クソ不味かったら承知しねえからな」"

[[dialogue]]
speaker = "マリオン"
# 「ええ、ええ、ご心配なく。キサナさんを絶対にご満足させてみせますから」
line = "「ええ、ええ、ご心配なく。キサナさんを絶対にご満足させてみせますから」"

[[dialogue]]
speaker = "キサナ"
# 「マジか、大した自信じゃねえか。それなら肉がいい。血が滴るみてえなステーキだ」
line = "「マジか、大した自信じゃねえか。それなら肉がいい。血が滴るみてえなステーキだ」"

[[dialogue]]
speaker = "マリオン"
# 「かしこまりました。極上のステーキですね。お任せください」
line = "「かしこまりました。極上のステーキですね。お任せください」"

[[dialogue]]
speaker = "マリオン"
# 「お礼と言ってはなんですが……美味しいディナーにご招待した後、私はキサナ様を美味しくいただかせていただこうかと<emoji=heart04>」
line = "「お礼と言ってはなんですが……美味しいディナーにご招待した後、私はキサナ様を美味しくいただかせていただこうかと<emoji=heart04>」"

[[dialogue]]
speaker = "キサナ"
# 「あ？　アタシなんざ食ってもうまかねえぞ？」
line = "「あ？　アタシなんざ食ってもうまかねえぞ？」"

[[dialogue]]
speaker = "マリオン"
# 「うふふ、キサナさんから滴る蜜は、どれほどの甘露でしょう……」
line = "「うふふ、キサナさんから滴る蜜は、どれほどの甘露でしょう……」"

[[dialogue]]
speaker = "マリオン"
# 「無知な方に未知の快感を仕込む……想像するだけでゾクゾクしてしまいます……はぁん<emoji=heart04>」
line = "「無知な方に未知の快感を仕込む……想像するだけでゾクゾクしてしまいます……はぁん<emoji=heart04>」"

[[dialogue]]
speaker = "キサナ"
# （……なんだ、こいつ。ヤベェヤツか？）
line = "（……なんだ、こいつ。ヤベェヤツか？）"

[[dialogue]]
speaker = "キサナ"
# （どんなに条件が良くても、こいつの話を鵜呑みにするのはヤベェって、アタシの直感がビンビンに反応してやがる……！）
line = "（どんなに条件が良くても、こいつの話を鵜呑みにするのはヤベェって、アタシの直感がビンビンに反応してやがる……！）"

[[dialogue]]
speaker = "ヴァレリー"
# 「ふふふ、マリオンさん、なかなかいいところに目を付けましたね」
line = "「ふふふ、マリオンさん、なかなかいいところに目を付けましたね」"

[[dialogue]]
speaker = "マリオン"
# 「あら、ヴァレリーさん。あなたもネビュラにご助力願えるのですよね？」
line = "「あら、ヴァレリーさん。あなたもネビュラにご助力願えるのですよね？」"

[[dialogue]]
speaker = "ヴァレリー"
# 「そうですね。欲を貪る快楽の宴──そこに私も加わらせていただけるのでしたら」
line = "「そうですね。欲を貪る快楽の宴──そこに私も加わらせていただけるのでしたら」"

[[dialogue]]
speaker = "ヴァレリー"
# 「食以外の快楽に目覚めたキサナさんが、果たしてどのような可愛らしい鳴き声をあげるのか……非常に興味があります、ふふ<emoji=heart04>」
line = "「食以外の快楽に目覚めたキサナさんが、果たしてどのような可愛らしい鳴き声をあげるのか……非常に興味があります、ふふ<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
# 「まあまあ、ヴァレリーさん、話が合いますね。ふふふ<emoji=heart04>」
line = "「まあまあ、ヴァレリーさん、話が合いますね。ふふふ<emoji=heart04>」"

[[dialogue]]
speaker = "キサナ"
# 「お、おい、テメエら、アタシそっちのけでなに意気投合してやがんだ。ろくでもねえ話ってことだけはわかるけどよ」
line = "「お、おい、テメエら、アタシそっちのけでなに意気投合してやがんだ。ろくでもねえ話ってことだけはわかるけどよ」"

[[dialogue]]
speaker = "マリオン"
# 「では、少しだけつまみ食いなど<emoji=heart04>」
line = "「では、少しだけつまみ食いなど<emoji=heart04>」"

[[dialogue]]
speaker = "ヴァレリー"
# 「それも一興ですね。少々お行儀が悪いですが、だからこそ背徳の味が──」
line = "「それも一興ですね。少々お行儀が悪いですが、だからこそ背徳の味が──」"

[[dialogue]]
speaker = "キサナ"
# 「ちょ、待て！　アタシに何するつもり──」
line = "「ちょ、待て！　アタシに何するつもり──」"

[[dialogue]]
speaker = "レイラ"
# 「だめーっ！」
line = "「だめーっ！」"

[[dialogue]]
speaker = "キサナ"
# 「うおっ！？」
line = "「うおっ！？」"

[[dialogue]]
speaker = "マリオン"
# 「きゃんっ！」
line = "「きゃんっ！」"

[[dialogue]]
speaker = "ヴァレリー"
# 「おおっと。危ないじゃないですか、レイラ。こんな狭いところでブラックホールを出さないでください」
line = "「おおっと。危ないじゃないですか、レイラ。こんな狭いところでブラックホールを出さないでください」"

[[dialogue]]
speaker = "ヴァレリー"
# 「危うく私までマリオンさん諸共、存在を抹消されるところでしたよ」
line = "「危うく私までマリオンさん諸共、存在を抹消されるところでしたよ」"

[[dialogue]]
speaker = "レイラ"
# 「だって、ヴァレリーも魔女さんも、キサナに……その、エ、エッチなことをするつもりだったでしょう！？」
line = "「だって、ヴァレリーも魔女さんも、キサナに……その、エ、エッチなことをするつもりだったでしょう！？」"

[[dialogue]]
speaker = "キサナ"
# 「んなっ！？　テメエら、こんなとこで何考えてやがんだっ！？」
line = "「んなっ！？　テメエら、こんなとこで何考えてやがんだっ！？」"

[[dialogue]]
speaker = "マリオン"
# 「まあまあ、エッチだなんて心外です。私はただキサナさんを美味しいお食事にご招待していただけですよ。肉汁溢れる美味しいステーキ、食べに行きましょうね<emoji=heart04>」
line = "「まあまあ、エッチだなんて心外です。私はただキサナさんを美味しいお食事にご招待していただけですよ。肉汁溢れる美味しいステーキ、食べに行きましょうね<emoji=heart04>」"

[[dialogue]]
speaker = "キサナ"
# 「お、おう……」
line = "「お、おう……」"

[[dialogue]]
speaker = "マリオン"
# 「ヴァレリーさんと気が合いそうなのは幸運でした。今度また改めて、お食事に誘わせていただきますね」
line = "「ヴァレリーさんと気が合いそうなのは幸運でした。今度また改めて、お食事に誘わせていただきますね」"

[[dialogue]]
speaker = "ヴァレリー"
# 「私がマリオンさんに美味しくいただかれてしまいそうですね。ですが、それもまたやぶさかではありません、ふふふ<emoji=heart04>」
line = "「私がマリオンさんに美味しくいただかれてしまいそうですね。ですが、それもまたやぶさかではありません、ふふふ<emoji=heart04>」"

[[dialogue]]
speaker = "レイラ"
# 「もう！　そういうのはダメです～っ！」
line = "「もう！　そういうのはダメです～っ！」"

[[dialogue]]
speaker = "unk"
# マリオンは本人と見分けがつかない人形を各所に配置しており、本体がどこにいるかはマリオン自身にしか分からない。
line = "マリオンは本人と見分けがつかない人形を各所に配置しており、本体がどこにいるかはマリオン自身にしか分からない。"

[[dialogue]]
speaker = "unk"
# しかし本体だろうと人形だろうと、どこにいようとも、その奔放さは変わらないのだった。
line = "しかし本体だろうと人形だろうと、どこにいようとも、その奔放さは変わらないのだった。"
