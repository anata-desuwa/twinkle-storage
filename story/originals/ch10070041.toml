[[dialogue]]
speaker = "unk"
# 第１話,今までもこれからも,P
line = "第１話,今までもこれからも,P"

[[dialogue]]
speaker = "unk"
# その日、恋人であるルリエルへ会いに、流星寮へと向かうと――
line = "その日、恋人であるルリエルへ会いに、流星寮へと向かうと――"

[[dialogue]]
speaker = "ルリエル"
# 「ほぇ～、羊さんのお肉――ジンギスカンですか。まだ食べたことなかったのです！」
line = "「ほぇ～、羊さんのお肉――ジンギスカンですか。まだ食べたことなかったのです！」"

[[dialogue]]
speaker = "フェニエル"
# 「今度一緒に食べに行ってみますか？　流星市国にも有名なお店があって、そこのジンギスカン、すごく美味しかったんですよ♪」
line = "「今度一緒に食べに行ってみますか？　流星市国にも有名なお店があって、そこのジンギスカン、すごく美味しかったんですよ♪」"

[[dialogue]]
speaker = "unk"
# ルリエルはロビーで紅茶を飲みながら、フェニエルと２人で談笑しているところだった。
line = "ルリエルはロビーで紅茶を飲みながら、フェニエルと２人で談笑しているところだった。"

[[dialogue]]
speaker = "ルリエル"
# 「行きます行きます！　なんなら今夜にでも食べに行きましょう♪」
line = "「行きます行きます！　なんなら今夜にでも食べに行きましょう♪」"

[[dialogue]]
speaker = "フェニエル"
# 「今夜ですか！？　そ、そこまでは考えてませんでした。さすがルリちゃん、行動力がなまらすごいです……！」
line = "「今夜ですか！？　そ、そこまでは考えてませんでした。さすがルリちゃん、行動力がなまらすごいです……！」"

[[dialogue]]
speaker = "ルリエル"
# 「――あっ、会長さん！　待ってましたよ～♪　会長さんもわたしたちと一緒に、ジンギスカンを食べに行きましょう！」
line = "「――あっ、会長さん！　待ってましたよ～♪　会長さんもわたしたちと一緒に、ジンギスカンを食べに行きましょう！」"

[[dialogue]]
speaker = "フェニエル"
# 「会長さん、ごきげんよう♪」
line = "「会長さん、ごきげんよう♪」"

[[dialogue]]
speaker = "unk"
# ２人って仲良かったんだな
line = "２人って仲良かったんだな"

[[dialogue]]
speaker = "ルリエル"
# 「あれ？　言ってませんでしたっけ？　ルリエルとフニさんは、実は流星学園で同じクラスなのです！」
line = "「あれ？　言ってませんでしたっけ？　ルリエルとフニさんは、実は流星学園で同じクラスなのです！」"

[[dialogue]]
speaker = "フェニエル"
# 「流星学園に転入して来た日、初登校で緊張していた私に、ルリちゃんが明るく話しかけてくれたんです」
line = "「流星学園に転入して来た日、初登校で緊張していた私に、ルリちゃんが明るく話しかけてくれたんです」"

[[dialogue]]
speaker = "ルリエル"
# 「今では流星学園で１番の、仲良し天使コンビなのです♪」
line = "「今では流星学園で１番の、仲良し天使コンビなのです♪」"

[[dialogue]]
speaker = "unk"
# その後、俺も２人と同席させてもらい、仲良しエピソードを聞いていたのだが――ふと、フニが口を開く。
line = "その後、俺も２人と同席させてもらい、仲良しエピソードを聞いていたのだが――ふと、フニが口を開く。"

[[dialogue]]
speaker = "フェニエル"
# 「あのっ。実は私、お２人に聞いてみたいことがあって……」
line = "「あのっ。実は私、お２人に聞いてみたいことがあって……」"

[[dialogue]]
speaker = "フェニエル"
# 「お２人はその……ど、どのようにして付き合い始めたのでしょうかっ！？」
line = "「お２人はその……ど、どのようにして付き合い始めたのでしょうかっ！？」"

[[dialogue]]
speaker = "ルリエル"
# 「恋人になった時の話ですか？　それはですね～」
line = "「恋人になった時の話ですか？　それはですね～」"

[[dialogue]]
speaker = "unk"
# 俺とルリエルが付き合い始めたのは、休日に２人で遊園地へ行った時のことだった――
line = "俺とルリエルが付き合い始めたのは、休日に２人で遊園地へ行った時のことだった――"

[[dialogue]]
speaker = "ルリエル"
# 「会長さ～ん！　次はあの絶叫マシーンに乗りましょう！　あれもみんなキャーって声を上げてて、すごく楽しそうなのです♪」
line = "「会長さ～ん！　次はあの絶叫マシーンに乗りましょう！　あれもみんなキャーって声を上げてて、すごく楽しそうなのです♪」"

[[dialogue]]
speaker = "unk"
# あのさ、ルリエル――
line = "あのさ、ルリエル――"

[[dialogue]]
speaker = "ルリエル"
# 「はい！　なんでしょうか、会長さん？」
line = "「はい！　なんでしょうか、会長さん？」"

[[dialogue]]
speaker = "ルリエル"
# 「って、そんな真剣な顔をして……どうかしましたか？」
line = "「って、そんな真剣な顔をして……どうかしましたか？」"

[[dialogue]]
speaker = "unk"
# 俺、ルリエルのことが好きだ！
line = "俺、ルリエルのことが好きだ！"

[[dialogue]]
speaker = "ルリエル"
# 「え？　あっ、はい♪」
line = "「え？　あっ、はい♪」"

[[dialogue]]
speaker = "ルリエル"
# 「ルリエルも会長さんのこと、大好きですよ！」
line = "「ルリエルも会長さんのこと、大好きですよ！」"

[[dialogue]]
speaker = "ルリエル"
# 「いつも遊んでくれて、今日みたいに行きたいところにも付き合ってくれますし、一緒に居るとすごく楽しくて……」
line = "「いつも遊んでくれて、今日みたいに行きたいところにも付き合ってくれますし、一緒に居るとすごく楽しくて……」"

[[dialogue]]
speaker = "ルリエル"
# 「会長さんは、ルリエルにとって――すごく大切なお友達なのです♪」
line = "「会長さんは、ルリエルにとって――すごく大切なお友達なのです♪」"

[[dialogue]]
speaker = "unk"
# ん？　あれ？　友、達……？
line = "ん？　あれ？　友、達……？"

[[dialogue]]
speaker = "ルリエル"
# 「はい♪　もう親友と言ってもいいくらいの間柄です！」
line = "「はい♪　もう親友と言ってもいいくらいの間柄です！」"

[[dialogue]]
speaker = "ルリエル"
# 「って、そんな慌てた顔をして、どうしましたか？」
line = "「って、そんな慌てた顔をして、どうしましたか？」"

[[dialogue]]
speaker = "ルリエル"
# 「ほえ？　――今日はただ遊びに来たつもりじゃなくて、デートしに来たつもりだった？」
line = "「ほえ？　――今日はただ遊びに来たつもりじゃなくて、デートしに来たつもりだった？」"

[[dialogue]]
speaker = "ルリエル"
# 「ええっ！？　これってデートだったのですか！？」
line = "「ええっ！？　これってデートだったのですか！？」"

[[dialogue]]
speaker = "unk"
# うん……そのつもりだったんだ……
line = "うん……そのつもりだったんだ……"

[[dialogue]]
speaker = "unk"
# 俺はそれから改めて、ルリエルに『友達としてではなく、女の子として恋愛的な意味で好き』であることを説明する。
line = "俺はそれから改めて、ルリエルに『友達としてではなく、女の子として恋愛的な意味で好き』であることを説明する。"

[[dialogue]]
speaker = "ルリエル"
# 「会長さんが……わたしのことを、好き……？」
line = "「会長さんが……わたしのことを、好き……？」"

[[dialogue]]
speaker = "ルリエル"
# 「ということは……今日が会長さんと初めてのデート！　――えへへへへへぇ<emoji=heart04>」
line = "「ということは……今日が会長さんと初めてのデート！　――えへへへへへぇ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# う、嬉しいのか……？
line = "う、嬉しいのか……？"

[[dialogue]]
speaker = "ルリエル"
# 「はいっ♪　会長さんとこれから『恋愛をする仲』になるんだって思ったら、なんだか楽しい想像がいっぱい浮かんできて……！」
line = "「はいっ♪　会長さんとこれから『恋愛をする仲』になるんだって思ったら、なんだか楽しい想像がいっぱい浮かんできて……！」"

[[dialogue]]
speaker = "ルリエル"
# 「いま気づいたんですけど、ルリエル――」
line = "「いま気づいたんですけど、ルリエル――」"

[[dialogue]]
speaker = "ルリエル"
# 「どうやら会長さんのこと、男の人として恋愛したいくらい、好きになっていたみたいです<emoji=heart04>」
line = "「どうやら会長さんのこと、男の人として恋愛したいくらい、好きになっていたみたいです<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
# 「――と、そんなことがありまして、ルリエルと会長さんは恋人としてお付き合いをすることになったのです♪」
line = "「――と、そんなことがありまして、ルリエルと会長さんは恋人としてお付き合いをすることになったのです♪」"

[[dialogue]]
speaker = "フェニエル"
# 「これからのことを想像して、好きだと自覚する……ルリちゃんらしくて、なまら素敵です♪」
line = "「これからのことを想像して、好きだと自覚する……ルリちゃんらしくて、なまら素敵です♪」"

[[dialogue]]
speaker = "ルリエル"
# 「えへへ<emoji=heart04>　そんな会長さんと出会えて、ルリエルはとっても幸せ者なのです♪」
line = "「えへへ<emoji=heart04>　そんな会長さんと出会えて、ルリエルはとっても幸せ者なのです♪」"

[[dialogue]]
speaker = "ルリエル"
# 「だからわたしも、一緒に居ていつも楽しいって思ってもらえるような、素敵な女の子になれるよう頑張るのです！」
line = "「だからわたしも、一緒に居ていつも楽しいって思ってもらえるような、素敵な女の子になれるよう頑張るのです！」"

[[dialogue]]
speaker = "unk"
# 今までも十分、楽しかったけどね
line = "今までも十分、楽しかったけどね"

[[dialogue]]
speaker = "ルリエル"
# 「あっ――えへへ♪　ルリエルもなのです<emoji=heart04>」
line = "「あっ――えへへ♪　ルリエルもなのです<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺が頭に手を置いて撫でると、嬉しそうに笑うルリエルなのであった――
line = "俺が頭に手を置いて撫でると、嬉しそうに笑うルリエルなのであった――"
