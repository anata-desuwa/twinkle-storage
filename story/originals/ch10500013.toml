[[dialogue]]
speaker = "unk"
# 第３話,弱点克服作戦！？,P
line = "第３話,弱点克服作戦！？,P"

[[dialogue]]
speaker = "フロレンシア"
# 「重ね重ね、ご迷惑おかけしてすみませんでした……ほんとにごめんなさい……」
line = "「重ね重ね、ご迷惑おかけしてすみませんでした……ほんとにごめんなさい……」"

[[dialogue]]
speaker = "フロレンシア"
# 「でも厚かましいとは思うんですけど、会長さんに折り入ってお願いがあるんです」
line = "「でも厚かましいとは思うんですけど、会長さんに折り入ってお願いがあるんです」"

[[dialogue]]
speaker = "フロレンシア"
# 「私の両親は天界で医者をしていて、幼い頃からその仕事ぶりを見て育ちました」
line = "「私の両親は天界で医者をしていて、幼い頃からその仕事ぶりを見て育ちました」"

[[dialogue]]
speaker = "フロレンシア"
# 「医者は大変な仕事です。忙しいし、理不尽なこともたくさんあるけど、なくてはならない仕事です」
line = "「医者は大変な仕事です。忙しいし、理不尽なこともたくさんあるけど、なくてはならない仕事です」"

[[dialogue]]
speaker = "フロレンシア"
# 「両親のように傷ついた誰かを癒やしたい。そう思って星騎士になりました」
line = "「両親のように傷ついた誰かを癒やしたい。そう思って星騎士になりました」"

[[dialogue]]
speaker = "フロレンシア"
# 「だけど、せっかく治癒の星術を身に着けたのに、このままでは保健委員失格です」
line = "「だけど、せっかく治癒の星術を身に着けたのに、このままでは保健委員失格です」"

[[dialogue]]
speaker = "フロレンシア"
# 「だからその……血を見るのが苦手なのを克服したいんです。手伝ってもらえないでしょうか？」
line = "「だからその……血を見るのが苦手なのを克服したいんです。手伝ってもらえないでしょうか？」"

[[dialogue]]
speaker = "unk"
# 俺で良ければ喜んで
line = "俺で良ければ喜んで"

[[dialogue]]
speaker = "フロレンシア"
# 「──！　ありがとうございます！　会長さんは優しい人ですね……」
line = "「──！　ありがとうございます！　会長さんは優しい人ですね……」"

[[dialogue]]
speaker = "フロレンシア"
# 「でもどうすればいいかわからなくて……苦手を克服するには実際に血を見ないといけませんし……」
line = "「でもどうすればいいかわからなくて……苦手を克服するには実際に血を見ないといけませんし……」"

[[dialogue]]
speaker = "unk"
# よし！　それなら──
line = "よし！　それなら──"

[[dialogue]]
speaker = "フロレンシア"
# 「え……思い切り攻撃しろ……？　いいんですか？　確かに私なら怪我しても治療できますけど……」
line = "「え……思い切り攻撃しろ……？　いいんですか？　確かに私なら怪我しても治療できますけど……」"

[[dialogue]]
speaker = "フロレンシア"
# 「ううん、会長さんがここまでしてくれてるんだから、私も本気でやらなくちゃ……！」
line = "「ううん、会長さんがここまでしてくれてるんだから、私も本気でやらなくちゃ……！」"

[[dialogue]]
speaker = "フロレンシア"
# 「行きます！　ホーネットニードル！」
line = "「行きます！　ホーネットニードル！」"

[[dialogue]]
speaker = "フロレンシア"
# 「だだ、大丈夫ですかっ、会長さん！？　思いっきりお注射しちゃいましたけど……」
line = "「だだ、大丈夫ですかっ、会長さん！？　思いっきりお注射しちゃいましたけど……」"

[[dialogue]]
speaker = "フロレンシア"
# 「このくらい平気？　良かった～」
line = "「このくらい平気？　良かった～」"

[[dialogue]]
speaker = "フロレンシア"
# 「でも血が出て……いえ、特訓なんだから我慢しないと。大丈夫、大丈夫……私は血なんて平気──」
line = "「でも血が出て……いえ、特訓なんだから我慢しないと。大丈夫、大丈夫……私は血なんて平気──」"

[[dialogue]]
speaker = "フロレンシア"
# 「うぅ、やっぱりダメぇ～っ！」
line = "「うぅ、やっぱりダメぇ～っ！」"

[[dialogue]]
speaker = "スミカ"
# 「で、結局アタシが出てくると。アホか」
line = "「で、結局アタシが出てくると。アホか」"

[[dialogue]]
speaker = "スミカ"
# 「んじゃさっそく治療させてもらおうか。いやぁ～、自分から苦痛を味わいに来るとはいい度胸だなぁ。ヒッヒッヒッ」
line = "「んじゃさっそく治療させてもらおうか。いやぁ～、自分から苦痛を味わいに来るとはいい度胸だなぁ。ヒッヒッヒッ」"

[[dialogue]]
speaker = "unk"
# ぐえ～～～～～っ！！？
line = "ぐえ～～～～～っ！！？"

[[dialogue]]
speaker = "スミカ"
# 「そうそう、その調子だぜ会長サン」
line = "「そうそう、その調子だぜ会長サン」"

[[dialogue]]
speaker = "スミカ"
# 「だけど痛みに慣れてきたのか、ちょっと新鮮さがなくなってきたな。会長サン用に薬の調合を変えてみるか……」
line = "「だけど痛みに慣れてきたのか、ちょっと新鮮さがなくなってきたな。会長サン用に薬の調合を変えてみるか……」"

[[dialogue]]
speaker = "unk"
# 二重人格は昔から？
line = "二重人格は昔から？"

[[dialogue]]
speaker = "スミカ"
# 「いいや、割と最近。新星学園に入って、星術を使えるようになってからだ」
line = "「いいや、割と最近。新星学園に入って、星術を使えるようになってからだ」"

[[dialogue]]
speaker = "スミカ"
# 「つまりアタシは本来の二重人格じゃない。星力の影響で生まれたもうひとつの人格ってわけだ」
line = "「つまりアタシは本来の二重人格じゃない。星力の影響で生まれたもうひとつの人格ってわけだ」"

[[dialogue]]
speaker = "スミカ"
# 「フロレンシアの守護星はへびつかい座<ruby=ラムダ>λ</ruby>星マルフィク。２つの星が重なって１つの星に見える、連星って天体だ。その影響を受けてるのかもしれねえ」
line = "「フロレンシアの守護星はへびつかい座<ruby>λ<rt>ラムダ</rt></ruby>星マルフィク。２つの星が重なって１つの星に見える、連星って天体だ。その影響を受けてるのかもしれねえ」"

[[dialogue]]
speaker = "スミカ"
# 「普通は守護星が星騎士に人格的な影響を与えることはないが……まぁ、何事にも例外はある」
line = "「普通は守護星が星騎士に人格的な影響を与えることはないが……まぁ、何事にも例外はある」"

[[dialogue]]
speaker = "スミカ"
# 「トワちゃんあたりなら他にも似たような例を知ってるかもしれねえな」
line = "「トワちゃんあたりなら他にも似たような例を知ってるかもしれねえな」"

[[dialogue]]
speaker = "スミカ"
# 「だが……アタシだからわかることもある。アタシが存在しているのは、フロレンシアが望んだからだ」
line = "「だが……アタシだからわかることもある。アタシが存在しているのは、フロレンシアが望んだからだ」"

[[dialogue]]
speaker = "スミカ"
# 「血を見たら気絶する不甲斐ない自分に代わって、的確に治療を施す自分じゃない自分──それがアタシだ」
line = "「血を見たら気絶する不甲斐ない自分に代わって、的確に治療を施す自分じゃない自分──それがアタシだ」"

[[dialogue]]
speaker = "スミカ"
# 「だからアタシの趣味も、案外フロレンシアのせいなのかもなぁ？」
line = "「だからアタシの趣味も、案外フロレンシアのせいなのかもなぁ？」"

[[dialogue]]
speaker = "スミカ"
# 「だけど克服されたらアタシが困るんだよなー。表に出てこれなくなるし」
line = "「だけど克服されたらアタシが困るんだよなー。表に出てこれなくなるし」"

[[dialogue]]
speaker = "スミカ"
# 「……って、言ってるそばからフロレンシアが目を覚まそうとしてやがる。ったく、あいつが起きると体返さないといけないんだよな」
line = "「……って、言ってるそばからフロレンシアが目を覚まそうとしてやがる。ったく、あいつが起きると体返さないといけないんだよな」"

[[dialogue]]
speaker = "スミカ"
# 「克服なんてさせんじゃねえぞ。徹底的に邪魔しろ。いいな」
line = "「克服なんてさせんじゃねえぞ。徹底的に邪魔しろ。いいな」"

[[dialogue]]
speaker = "フロレンシア"
# 「ん……んん……あ、すみません、また気絶してました……」
line = "「ん……んん……あ、すみません、また気絶してました……」"

[[dialogue]]
speaker = "unk"
# めげずに頑張ろう
line = "めげずに頑張ろう"

[[dialogue]]
speaker = "フロレンシア"
# 「は、はい！　血なんて怖くない……怖くない……平気、大丈夫、なんともない……」
line = "「は、はい！　血なんて怖くない……怖くない……平気、大丈夫、なんともない……」"

[[dialogue]]
speaker = "フロレンシア"
# 「ではもう一度──ホーネットニードル！」
line = "「ではもう一度──ホーネットニードル！」"

[[dialogue]]
speaker = "フロレンシア"
# 「ぴゃ～～～～～っ！？　がくっ」
line = "「ぴゃ～～～～～っ！？　がくっ」"

[[dialogue]]
speaker = "スミカ"
# 「つーか、前から思ってたんだけどさぁ……」
line = "「つーか、前から思ってたんだけどさぁ……」"

[[dialogue]]
speaker = "スミカ"
# 「邪魔するまでもなく、血が苦手なの悪化してね……？」
line = "「邪魔するまでもなく、血が苦手なの悪化してね……？」"
