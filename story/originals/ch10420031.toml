[[dialogue]]
speaker = "unk"
# 第１話,ホウちゃんリターンズ,P
line = "第１話,ホウちゃんリターンズ,P"

[[dialogue]]
speaker = "unk"
# 星霊祭に向けて訓練し、ノヴァフォームへの覚醒を果たしたフニ。
line = "星霊祭に向けて訓練し、ノヴァフォームへの覚醒を果たしたフニ。"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「ホウちゃん、コンビネーションパターンの『Ｃ』で行くよっ」
line = "「ホウちゃん、コンビネーションパターンの『Ｃ』で行くよっ」"

[[dialogue]]
speaker = "ホウちゃん"
# 「はい。いつでも構いませんよ、フニ！」
line = "「はい。いつでも構いませんよ、フニ！」"

[[dialogue]]
speaker = "unk"
# フニの横で、小さな姿になった魔獣『フェニックス』こと『ホウちゃん』が、パタパタと飛びながら一緒に攻撃の型を繰り出す。
line = "フニの横で、小さな姿になった魔獣『フェニックス』こと『ホウちゃん』が、パタパタと飛びながら一緒に攻撃の型を繰り出す。"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「――よし、やったっ。上手くできたね♪」
line = "「――よし、やったっ。上手くできたね♪」"

[[dialogue]]
speaker = "ホウちゃん"
# 「ふふっ、フニとは以心伝心ですから」
line = "「ふふっ、フニとは以心伝心ですから」"

[[dialogue]]
speaker = "unk"
# フニがノヴァフォームで目覚めた能力によって、変身中はホウちゃんが常時顕現できるようになり、以前よりも俺たちと顔を合わせる機会が増えていた。
line = "フニがノヴァフォームで目覚めた能力によって、変身中はホウちゃんが常時顕現できるようになり、以前よりも俺たちと顔を合わせる機会が増えていた。"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「――会長さん、水筒を持ってきてくれて、ありがとうございます♪」
line = "「――会長さん、水筒を持ってきてくれて、ありがとうございます♪」"

[[dialogue]]
speaker = "unk"
# フニ、お疲れ様。すごく頑張ってたな
line = "フニ、お疲れ様。すごく頑張ってたな"

[[dialogue]]
speaker = "unk"
# 俺は恋人であるフニの頭を、優しく撫でる。
line = "俺は恋人であるフニの頭を、優しく撫でる。"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「あっ<emoji=heart04>　褒めて下さるんですか？　えへへへ<emoji=heart04>　なまら嬉しくなっちゃいます……♪」
line = "「あっ<emoji=heart04>　褒めて下さるんですか？　えへへへ<emoji=heart04>　なまら嬉しくなっちゃいます……♪」"

[[dialogue]]
speaker = "unk"
# ホウちゃんもお疲れ様
line = "ホウちゃんもお疲れ様"

[[dialogue]]
speaker = "ホウちゃん"
# 「おや、私のことも撫でて下さるんですか？　ありがとうございます」
line = "「おや、私のことも撫でて下さるんですか？　ありがとうございます」"

[[dialogue]]
speaker = "ホウちゃん"
# 「んっ……ふふっ♪　相変わらず、会長は撫で方がお上手ですね。心地よいです」
line = "「んっ……ふふっ♪　相変わらず、会長は撫で方がお上手ですね。心地よいです」"

[[dialogue]]
speaker = "unk"
# モフモフと撫でながら、俺はホウちゃんに最近の様子を聞いてみる。
line = "モフモフと撫でながら、俺はホウちゃんに最近の様子を聞いてみる。"

[[dialogue]]
speaker = "ホウちゃん"
# 「――最近ですか？　そうですね……」
line = "「――最近ですか？　そうですね……」"

[[dialogue]]
speaker = "ホウちゃん"
# 「フニがノヴァフォームの維持時間を延ばす為に、普段からよく変身してくれているので、その合間に人間界の料理を色々と試しています」
line = "「フニがノヴァフォームの維持時間を延ばす為に、普段からよく変身してくれているので、その合間に人間界の料理を色々と試しています」"

[[dialogue]]
speaker = "ホウちゃん"
# 「――どんな物が好きか？　私はリンゴやトウモロコシが好物なので、最近はよくアップルパイを<b>作って</b>いますね」
line = "「――どんな物が好きか？　私はリンゴやトウモロコシが好物なので、最近はよくアップルパイを<b>作って</b>いますね」"

[[dialogue]]
speaker = "unk"
# えっ、自分で作ってるの！？
line = "えっ、自分で作ってるの！？"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「ホウちゃん、すっごく料理が上手なんですよ♪　炎の星術で焼いて作るアップルパイ、それはもう頬っぺたが落ちそうになるくらい美味しくて……」
line = "「ホウちゃん、すっごく料理が上手なんですよ♪　炎の星術で焼いて作るアップルパイ、それはもう頬っぺたが落ちそうになるくらい美味しくて……」"

[[dialogue]]
speaker = "ホウちゃん"
# 「ふふっ、炎を操るのは私の得意分野ですから。よろしければ、会長も食べてみますか？」
line = "「ふふっ、炎を操るのは私の得意分野ですから。よろしければ、会長も食べてみますか？」"

[[dialogue]]
speaker = "unk"
# というわけで、流星寮に移動し、ホウちゃんがアップルパイを作ってくれることになったのだが――
line = "というわけで、流星寮に移動し、ホウちゃんがアップルパイを作ってくれることになったのだが――"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「う～ん♪　なまらいい匂いがします♪」
line = "「う～ん♪　なまらいい匂いがします♪」"

[[dialogue]]
speaker = "unk"
# フェニエルと席に着いて待っていると、エプロンを付けた<b>お姉さん</b>が、焼きたてのアップルパイを持ってきてくれる。
line = "フェニエルと席に着いて待っていると、エプロンを付けた<b>お姉さん</b>が、焼きたてのアップルパイを持ってきてくれる。"

[[dialogue]]
speaker = "ホウちゃん"
# 「できましたよ、２人共。切り分けますから、少し待っていてくださいね――」
line = "「できましたよ、２人共。切り分けますから、少し待っていてくださいね――」"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「ありがとう♪　ホウちゃん」
line = "「ありがとう♪　ホウちゃん」"

[[dialogue]]
speaker = "ホウちゃん"
# 「いいえ、フニ。どうしたしまして」
line = "「いいえ、フニ。どうしたしまして」"

[[dialogue]]
speaker = "unk"
# そう、なんとホウちゃんは星術を使い、フニがそのまま成長して大人になったような、母性的なお姉さんの姿へと変身していたのだ。
line = "そう、なんとホウちゃんは星術を使い、フニがそのまま成長して大人になったような、母性的なお姉さんの姿へと変身していたのだ。"

[[dialogue]]
speaker = "unk"
# ホウちゃんは柔らかく包み込むような微笑みを浮かべながら、切り分けたアップルパイをフォークに刺して、俺に差し出してくる。
line = "ホウちゃんは柔らかく包み込むような微笑みを浮かべながら、切り分けたアップルパイをフォークに刺して、俺に差し出してくる。"

[[dialogue]]
speaker = "ホウちゃん"
# 「会長の分も切れましたよ。それでは、口を開けてください」
line = "「会長の分も切れましたよ。それでは、口を開けてください」"

[[dialogue]]
speaker = "unk"
# えっ！？
line = "えっ！？"

[[dialogue]]
speaker = "ホウちゃん"
# 「ふふっ、そんな遠慮なさらず。先程撫でて頂いたお礼です」
line = "「ふふっ、そんな遠慮なさらず。先程撫でて頂いたお礼です」"

[[dialogue]]
speaker = "ホウちゃん"
# 「それに、フニと恋人ということは、会長は私にとっても家族のようなものですから。はい――あ～ん」
line = "「それに、フニと恋人ということは、会長は私にとっても家族のようなものですから。はい――あ～ん」"

[[dialogue]]
speaker = "unk"
# 俺は大人ホウちゃんの押しに負けてしまい、ちょっと気恥ずかしさを感じながら、アップルパイを食べる。
line = "俺は大人ホウちゃんの押しに負けてしまい、ちょっと気恥ずかしさを感じながら、アップルパイを食べる。"

[[dialogue]]
speaker = "unk"
# これは……うまいっ！！
line = "これは……うまいっ！！"

[[dialogue]]
speaker = "ホウちゃん"
# 「それは良かったです。もっと食べますか？」
line = "「それは良かったです。もっと食べますか？」"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「ま、待って下さいっ。それなら次は、私があ～んをしますっ……！」
line = "「ま、待って下さいっ。それなら次は、私があ～んをしますっ……！」"

[[dialogue]]
speaker = "ホウちゃん"
# 「おや、フニ……？」
line = "「おや、フニ……？」"

[[dialogue]]
speaker = "unk"
# フェニエルが慌てたように立ち上がり、アップルパイを持ってこちらに駆け寄って来る。
line = "フェニエルが慌てたように立ち上がり、アップルパイを持ってこちらに駆け寄って来る。"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「会長さん、どうぞですっ。あ～ん……！」
line = "「会長さん、どうぞですっ。あ～ん……！」"

[[dialogue]]
speaker = "unk"
# 俺はちょっと戸惑いながらも、フニから差し出されたアップルパイも食べる。
line = "俺はちょっと戸惑いながらも、フニから差し出されたアップルパイも食べる。"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「ど、どうですか？　美味しいですか？」
line = "「ど、どうですか？　美味しいですか？」"

[[dialogue]]
speaker = "unk"
# う、うん。すごく美味しいよ
line = "う、うん。すごく美味しいよ"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「でしたら、ここからは私が会長さんにあ～んをさせて頂きますねっ……！」
line = "「でしたら、ここからは私が会長さんにあ～んをさせて頂きますねっ……！」"

[[dialogue]]
speaker = "ホウちゃん"
# （ふふっ、なるほど……。あ～んはフニにもよくしているので、会長にだけ特別というわけではなかったのですが……）
line = "（ふふっ、なるほど……。あ～んはフニにもよくしているので、会長にだけ特別というわけではなかったのですが……）"

[[dialogue]]
speaker = "ホウちゃん"
# 「――会長、口の周りが汚れていますよ？　拭きますね♪」
line = "「――会長、口の周りが汚れていますよ？　拭きますね♪」"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「えっ……ホウちゃん！？　わ、私も次、それやりますっ……！」
line = "「えっ……ホウちゃん！？　わ、私も次、それやりますっ……！」"

[[dialogue]]
speaker = "ホウちゃん"
# 「そうですか？　では……私はその代わりにまた、会長にあ～んをさせて頂きましょうかね♪」
line = "「そうですか？　では……私はその代わりにまた、会長にあ～んをさせて頂きましょうかね♪」"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「えぇっ！？　そ、そんな……私はどっちをしたら……！？」
line = "「えぇっ！？　そ、そんな……私はどっちをしたら……！？」"

[[dialogue]]
speaker = "ホウちゃん"
# 「ふふふっ……嫉妬しているフニは可愛いですね」
line = "「ふふふっ……嫉妬しているフニは可愛いですね」"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「へ！？　し、嫉妬……？」
line = "「へ！？　し、嫉妬……？」"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「は、はうぅ……！　今気づきましたけど、私、もしかしてホウちゃんに焼き餅を焼いて……！？　な、なまら恥ずかしいべや……！」
line = "「は、はうぅ……！　今気づきましたけど、私、もしかしてホウちゃんに焼き餅を焼いて……！？　な、なまら恥ずかしいべや……！」"

[[dialogue]]
speaker = "unk"
# そんな風に恥ずかしそうに顔を覆うフニを、にこにこ微笑みながら、母親のように見守るホウちゃんなのであった――
line = "そんな風に恥ずかしそうに顔を覆うフニを、にこにこ微笑みながら、母親のように見守るホウちゃんなのであった――"
