[[dialogue]]
speaker = "unk"
# 俺がセシアたちのサンタ企画を手伝うことになった翌日。
line = "俺がセシアたちのサンタ企画を手伝うことになった翌日。"

[[dialogue]]
speaker = "unk"
# 今日はみんなで空き教室に集まって、クリスマスプレゼントのブレスレットを作ることになった。
line = "今日はみんなで空き教室に集まって、クリスマスプレゼントのブレスレットを作ることになった。"

[[dialogue]]
speaker = "セシア"
# 「フニ、あれから熱っぽいのは大丈夫？」
line = "「フニ、あれから熱っぽいのは大丈夫？」"

[[dialogue]]
speaker = "フェニエル"
# 「はい。体温は今日も高めですけど、体調は引き続き良い感じです！」
line = "「はい。体温は今日も高めですけど、体調は引き続き良い感じです！」"

[[dialogue]]
speaker = "セシア"
# 「ならいいけど……。無理はしちゃダメよ？」
line = "「ならいいけど……。無理はしちゃダメよ？」"

[[dialogue]]
speaker = "ルルカ"
# 「そうそう！　あたし達、もう友達なんだから。遠慮はナシだからね！」
line = "「そうそう！　あたし達、もう友達なんだから。遠慮はナシだからね！」"

[[dialogue]]
speaker = "フェニエル"
# 「はい、ありがとうございます、お２人共」
line = "「はい、ありがとうございます、お２人共」"

[[dialogue]]
speaker = "ルルカ"
# 「だけど、それにしても驚いたな～。魔界でも伝説の生き物って言われている『魔獣』の内の１体が、フニちゃんの中に宿っているだなんて」
line = "「だけど、それにしても驚いたな～。魔界でも伝説の生き物って言われている『魔獣』の内の１体が、フニちゃんの中に宿っているだなんて」"

[[dialogue]]
speaker = "セシア"
# 「魔獣『フェニックス』……。ヒトの言葉を理解できる程の高い知能と、強大な魔力を持つ、魔界で生まれた特殊個体――」
line = "「魔獣『フェニックス』……。ヒトの言葉を理解できる程の高い知能と、強大な魔力を持つ、魔界で生まれた特殊個体――」"

[[dialogue]]
speaker = "セシア"
# 「『不死鳥』という二つ名の通り、例え死んだとしても炎に包まれた後、その灰の中から若い姿で再生する……と魔界で執筆された本には記述されているわ」
line = "「『不死鳥』という二つ名の通り、例え死んだとしても炎に包まれた後、その灰の中から若い姿で再生する……と魔界で執筆された本には記述されているわ」"

[[dialogue]]
speaker = "フェニエル"
# 「私が星力に目覚めたのは、北海道で街へ買い出しに出かけていた時に、モンスターの襲撃に居合わせたのがきっかけでした」
line = "「私が星力に目覚めたのは、北海道で街へ買い出しに出かけていた時に、モンスターの襲撃に居合わせたのがきっかけでした」"

[[dialogue]]
speaker = "フェニエル"
# 「そこで瀕死の重傷を負った時に、体の中に眠っていたホウちゃんが目覚めて……傷を治してくれたんです」
line = "「そこで瀕死の重傷を負った時に、体の中に眠っていたホウちゃんが目覚めて……傷を治してくれたんです」"

[[dialogue]]
speaker = "ルルカ"
# 「道理でフニちゃんって、パワーがすごいわけだよね。ほら、作ったアクセサリーを詰め込んだ箱、かなり重いはずなのに簡単に持ち上げたり――」
line = "「道理でフニちゃんって、パワーがすごいわけだよね。ほら、作ったアクセサリーを詰め込んだ箱、かなり重いはずなのに簡単に持ち上げたり――」"

[[dialogue]]
speaker = "ルルカ"
# 「今も針金で作ってくれてる星型の小さな装飾、ペンチも無しに小さく折り畳んでみせてるじゃない？　それってホウちゃんのおかげだったんだね！」
line = "「今も針金で作ってくれてる星型の小さな装飾、ペンチも無しに小さく折り畳んでみせてるじゃない？　それってホウちゃんのおかげだったんだね！」"

[[dialogue]]
speaker = "フェニエル"
# 「え？　いやこれは、特に星力は使ってないんで、昔からの素というか……」
line = "「え？　いやこれは、特に星力は使ってないんで、昔からの素というか……」"

[[dialogue]]
speaker = "unk"
# 言いながら、グニグニと指先で難なく、綺麗な星型を完成させるフニ。
line = "言いながら、グニグニと指先で難なく、綺麗な星型を完成させるフニ。"

[[dialogue]]
speaker = "ルルカ"
# 「え？」
line = "「え？」"

[[dialogue]]
speaker = "ルルカ"
# 「いやいや！　そんなわけないでしょ～！　フニちゃんってば、面白い冗談言うんだから～！　あははっ♪　ねぇ、お兄ちゃん？」
line = "「いやいや！　そんなわけないでしょ～！　フニちゃんってば、面白い冗談言うんだから～！　あははっ♪　ねぇ、お兄ちゃん？」"

[[dialogue]]
speaker = "unk"
# フニは腕相撲負けなしなんだ
line = "フニは腕相撲負けなしなんだ"

[[dialogue]]
speaker = "ルルカ"
# 「は？　――流星寮で腕相撲大会があって、あのフィジカル最強のヒルディオーネ先輩にも勝った？　……せ、戦闘服で、だよね？」
line = "「は？　――流星寮で腕相撲大会があって、あのフィジカル最強のヒルディオーネ先輩にも勝った？　……せ、戦闘服で、だよね？」"

[[dialogue]]
speaker = "ルルカ"
# 「――違う？　お互いに星力なしの、純粋フィジカル勝負だったって……ど、どういうことぉ！？」
line = "「――違う？　お互いに星力なしの、純粋フィジカル勝負だったって……ど、どういうことぉ！？」"

[[dialogue]]
speaker = "セシア"
# 「わたくしが来る前の話かしら？　とっても興味深いわ♪」
line = "「わたくしが来る前の話かしら？　とっても興味深いわ♪」"

[[dialogue]]
speaker = "unk"
# 実際にフニと腕相撲してみたらわかる
line = "実際にフニと腕相撲してみたらわかる"

[[dialogue]]
speaker = "フェニエル"
# 「腕相撲ですか？　はい、もちろんいいですよ♪」
line = "「腕相撲ですか？　はい、もちろんいいですよ♪」"

[[dialogue]]
speaker = "ルルカ"
# 「――あ、あたしは星力アリで？　よ、よ～し……」
line = "「――あ、あたしは星力アリで？　よ、よ～し……」"

[[dialogue]]
speaker = "unk"
# そうして、フニが机に肘を乗せて差し出した手を、ルルカが取った途端。
line = "そうして、フニが机に肘を乗せて差し出した手を、ルルカが取った途端。"

[[dialogue]]
speaker = "ルルカ"
# 「ハッ……！？」
line = "「ハッ……！？」"

[[dialogue]]
speaker = "ルルカ"
# （ま、全く微動だにしない……！？　ちょっと待って、何これ……！？）
line = "（ま、全く微動だにしない……！？　ちょっと待って、何これ……！？）"

[[dialogue]]
speaker = "unk"
# 流星寮での腕相撲大会の時、俺もフニに挑戦した。その時に、フニの手を取って頭の中を過ぎったイメージは――
line = "流星寮での腕相撲大会の時、俺もフニに挑戦した。その時に、フニの手を取って頭の中を過ぎったイメージは――"

[[dialogue]]
speaker = "ルルカ"
# 「金剛力士像……！？」
line = "「金剛力士像……！？」"

[[dialogue]]
speaker = "フェニエル"
# 「えいっ」
line = "「えいっ」"

[[dialogue]]
speaker = "ルルカ"
# 「あぅっ」
line = "「あぅっ」"

[[dialogue]]
speaker = "フェニエル"
# 「えへへ……どうでしょう？」
line = "「えへへ……どうでしょう？」"

[[dialogue]]
speaker = "ルルカ"
# 「ま、参りました……」
line = "「ま、参りました……」"

[[dialogue]]
speaker = "ルルカ"
# 「いや、ていうか、不死鳥関係なくこのパワーってどういうこと！？　そっちの方が理由気になるんだけど！？」
line = "「いや、ていうか、不死鳥関係なくこのパワーってどういうこと！？　そっちの方が理由気になるんだけど！？」"

[[dialogue]]
speaker = "フェニエル"
# 「う～ん」
line = "「う～ん」"

[[dialogue]]
speaker = "フェニエル"
# 「――私、生まれつき体が丈夫なので♪」
line = "「――私、生まれつき体が丈夫なので♪」"

[[dialogue]]
speaker = "ルルカ"
# 「理由になってなくない！？　そんな生まれつき『竜』のマムみたいなノリで言われても！」
line = "「理由になってなくない！？　そんな生まれつき『竜』のマムみたいなノリで言われても！」"

[[dialogue]]
speaker = "セシア"
# 「なるほど、わかったわ」
line = "「なるほど、わかったわ」"

[[dialogue]]
speaker = "ルルカ"
# 「え！？　セッシーちゃん、わかったの！？」
line = "「え！？　セッシーちゃん、わかったの！？」"

[[dialogue]]
speaker = "セシア"
# 「フニはやっぱり――」
line = "「フニはやっぱり――」"

[[dialogue]]
speaker = "セシア"
# 「内に大いなるママパワーを秘めているから、力持ちなのね！　母は強しって言葉があるでしょう？」
line = "「内に大いなるママパワーを秘めているから、力持ちなのね！　母は強しって言葉があるでしょう？」"

[[dialogue]]
speaker = "ルルカ"
# 「いや、その説明じゃ全然わからないんだけど！？」
line = "「いや、その説明じゃ全然わからないんだけど！？」"

[[dialogue]]
speaker = "unk"
# そんなわけで、フニの規格外のパワーについては、引き続き謎のままなのであった――
line = "そんなわけで、フニの規格外のパワーについては、引き続き謎のままなのであった――"
