[[dialogue]]
speaker = "unk"
# 第１話,ライバル２号じゃありませんわ！,P
line = "第１話,ライバル２号じゃありませんわ！,P"

[[dialogue]]
speaker = "unk"
# ある日の放課後。俺は流星附属の星騎士であるアムから呼び出しを受けた。
line = "ある日の放課後。俺は流星附属の星騎士であるアムから呼び出しを受けた。"

[[dialogue]]
speaker = "unk"
# 何でも、俺に紹介したい人がいるとの話だったのだが──
line = "何でも、俺に紹介したい人がいるとの話だったのだが──"

[[dialogue]]
speaker = "アム"
# 「さぁ会長、ご照覧あれ！　この子が会長よりも早く、あたしのライバルになった子だよ！　名付けてライバル２号！」
line = "「さぁ会長、ご照覧あれ！　この子が会長よりも早く、あたしのライバルになった子だよ！　名付けてライバル２号！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「いきなりご挨拶ですわね！？　もう少しまともな紹介はありませんの、アム！」
line = "「いきなりご挨拶ですわね！？　もう少しまともな紹介はありませんの、アム！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「……こほん。騒がせてしまってすみません、会長様。私の名は桜十路エルデリーゼ。アムのクラスメイトですわ」
line = "「……こほん。騒がせてしまってすみません、会長様。私の名は桜十路エルデリーゼ。アムのクラスメイトですわ」"

[[dialogue]]
speaker = "unk"
# 桜十路……ってことは？
line = "桜十路……ってことは？"

[[dialogue]]
speaker = "エルデリーゼ"
# 「はい、流星市国の五名門の１つです。私の家は分家筋のひとつで、本家のサランお姉様とは親戚に当たります」
line = "「はい、流星市国の五名門の１つです。私の家は分家筋のひとつで、本家のサランお姉様とは親戚に当たります」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「学園の中では先輩と後輩の間柄ですので、どうかお気兼ねなく、エルゼとお呼びください。気の置けないお付き合いをいただけますと嬉しいですわ」
line = "「学園の中では先輩と後輩の間柄ですので、どうかお気兼ねなく、エルゼとお呼びください。気の置けないお付き合いをいただけますと嬉しいですわ」"

[[dialogue]]
speaker = "アム"
# 「お堅いな～、エルゼは。会長は五名門だとかお嬢様だとか、そんなの気にしないって。ねー？」
line = "「お堅いな～、エルゼは。会長は五名門だとかお嬢様だとか、そんなの気にしないって。ねー？」"

[[dialogue]]
speaker = "unk"
# ああ。これからよろしく
line = "ああ。これからよろしく"

[[dialogue]]
speaker = "エルデリーゼ"
# 「……ふふ。ありがとうございます。こちらこそよろしくお願いいたしますわ」
line = "「……ふふ。ありがとうございます。こちらこそよろしくお願いいたしますわ」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「以前から新星学園の会長様とは、お話したいと思っていましたの。御前試合の記録も拝見いたしました。あれは大層見事な──」
line = "「以前から新星学園の会長様とは、お話したいと思っていましたの。御前試合の記録も拝見いたしました。あれは大層見事な──」"

[[dialogue]]
speaker = "アム"
# 「ね～、お腹空かない？　せっかくカフェにいるんだし何か頼もうよ～。エルゼは何にする？」
line = "「ね～、お腹空かない？　せっかくカフェにいるんだし何か頼もうよ～。エルゼは何にする？」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「アム、とりあえず飲み物は頼んでいるのですから、まずは歓談を楽しむべきでは……」
line = "「アム、とりあえず飲み物は頼んでいるのですから、まずは歓談を楽しむべきでは……」"

[[dialogue]]
speaker = "アム"
# 「あたし、けっこーお腹減ってるんだよねー。どうしよっかな。ケーキいっちゃおっかな～。会長は何にする？」
line = "「あたし、けっこーお腹減ってるんだよねー。どうしよっかな。ケーキいっちゃおっかな～。会長は何にする？」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「……はぁあ。あの、会長様。今さらですがアムがご迷惑をおかけしてはいませんか？」
line = "「……はぁあ。あの、会長様。今さらですがアムがご迷惑をおかけしてはいませんか？」"

[[dialogue]]
speaker = "アム"
# 「もー。そうやって細かいことを気にするの、エルゼの悪い癖だよー？　お、何これ。焼きたてのミートパイ丸ごと１個だって！」
line = "「もー。そうやって細かいことを気にするの、エルゼの悪い癖だよー？　お、何これ。焼きたてのミートパイ丸ごと１個だって！」"

[[dialogue]]
speaker = "アム"
# 「これシェアしよっか。すみませーん、注文しまーす！」
line = "「これシェアしよっか。すみませーん、注文しまーす！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「ちょっとアム、会長様の好みも聞いてからにした方が……あぁもう。すみません……」
line = "「ちょっとアム、会長様の好みも聞いてからにした方が……あぁもう。すみません……」"

[[dialogue]]
speaker = "unk"
# 気にしないでいいよ
line = "気にしないでいいよ"

[[dialogue]]
speaker = "エルデリーゼ"
# 「ありがとうございます。それじゃあ、注文が来るまでの間、色々とお話を聞かせていただけますか？」
line = "「ありがとうございます。それじゃあ、注文が来るまでの間、色々とお話を聞かせていただけますか？」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「会長様の人となりやご趣味など。新星学園に来るまではアルバイトもたくさんされていたと、アムから聞いています」
line = "「会長様の人となりやご趣味など。新星学園に来るまではアルバイトもたくさんされていたと、アムから聞いています」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「私、お恥ずかしながら流星附属に入学するまで屋敷にこもっていたので、物を知らないことが多いのです」
line = "「私、お恥ずかしながら流星附属に入学するまで屋敷にこもっていたので、物を知らないことが多いのです」"

[[dialogue]]
speaker = "アム"
# 「箱入りのお嬢様ってやつだからね。エルゼは世間知らずだからさ、てきとーな話でも大げさに喜んでくれるよ～」
line = "「箱入りのお嬢様ってやつだからね。エルゼは世間知らずだからさ、てきとーな話でも大げさに喜んでくれるよ～」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「そ、そこまで単純な性格ではありませんわ！」
line = "「そ、そこまで単純な性格ではありませんわ！」"

[[dialogue]]
speaker = "アム"
# 「またまた。ＤＩＳＣ使ったのだってついこの間のことじゃん。通知来るたびに機械音痴のおばあちゃんみたいな反応してて面白かったよん」
line = "「またまた。ＤＩＳＣ使ったのだってついこの間のことじゃん。通知来るたびに機械音痴のおばあちゃんみたいな反応してて面白かったよん」"

[[dialogue]]
speaker = "アム"
# 「たたた、大変ですアム！　知らない人からメッセージが来ましたわ！　宛先が間違っているとお伝えした方がよろしいですわよね……！？」
line = "「たたた、大変ですアム！　知らない人からメッセージが来ましたわ！　宛先が間違っているとお伝えした方がよろしいですわよね……！？」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「やめてください！　会長様とは初対面なんですよ、その話はいけません！　そ──それに今は、今どきの附属生らしく使えています！」
line = "「やめてください！　会長様とは初対面なんですよ、その話はいけません！　そ──それに今は、今どきの附属生らしく使えています！」"

[[dialogue]]
speaker = "アム"
# 「今どき、ってわざわざ付けるのがもうおばあちゃんだよね～」
line = "「今どき、ってわざわざ付けるのがもうおばあちゃんだよね～」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「アムー！」
line = "「アムー！」"

[[dialogue]]
speaker = "unk"
# 五名門のお嬢様とは聞いていたが、エルゼに気取ったところはなかった。世間知らずな所もチャームポイントだし、何より話していて面白い。
line = "五名門のお嬢様とは聞いていたが、エルゼに気取ったところはなかった。世間知らずな所もチャームポイントだし、何より話していて面白い。"

[[dialogue]]
speaker = "unk"
# 賑やかなお茶会はその後も滞りなく進んだが、運ばれてきたミートパイを食べ終えた頃──事件は起こった。
line = "賑やかなお茶会はその後も滞りなく進んだが、運ばれてきたミートパイを食べ終えた頃──事件は起こった。"

[[dialogue]]
speaker = "エルデリーゼ"
# 「とても美味しかったですわね、ミートパイ」
line = "「とても美味しかったですわね、ミートパイ」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「でもちょっと量が少なかったですわね。せっかくの楽しい歓談の場です。おかわり、いたしましょうか！」
line = "「でもちょっと量が少なかったですわね。せっかくの楽しい歓談の場です。おかわり、いたしましょうか！」"

[[dialogue]]
speaker = "unk"
# ……え！？
line = "……え！？"

[[dialogue]]
speaker = "エルデリーゼ"
# 「やはり３人で食べると一人当たりの取り分が減ってしまいますからね。お茶請けはしっかり用意いたしませんと」
line = "「やはり３人で食べると一人当たりの取り分が減ってしまいますからね。お茶請けはしっかり用意いたしませんと」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「会長様も殿方ですもの。食べ足りなかったのではありませんか？　私が五名門だからと、ご遠慮なさらなくてもよろしいのですよ」
line = "「会長様も殿方ですもの。食べ足りなかったのではありませんか？　私が五名門だからと、ご遠慮なさらなくてもよろしいのですよ」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「アムも食べますわよね。お腹が空いた～、が口癖ですし」
line = "「アムも食べますわよね。お腹が空いた～、が口癖ですし」"

[[dialogue]]
speaker = "アム"
# 「いや、あたしは結構満腹っていうか……」
line = "「いや、あたしは結構満腹っていうか……」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「すみません、店員様。注文をお願いいたしますわ。先ほどのミートパイを──」
line = "「すみません、店員様。注文をお願いいたしますわ。先ほどのミートパイを──」"

[[dialogue]]
speaker = "unk"
# ……エルゼはいつもこうなの？
line = "……エルゼはいつもこうなの？"

[[dialogue]]
speaker = "アム"
# 「うん。見た目に反して超大食い。そのくせ自分が大食いだってことに気づいてないタイプ」
line = "「うん。見た目に反して超大食い。そのくせ自分が大食いだってことに気づいてないタイプ」"

[[dialogue]]
speaker = "アム"
# 「周りのみんなは遠慮してるって本気で信じてるから厄介なんだよね。そっか、あの大きなミートパイでも満足できなかったかぁ……」
line = "「周りのみんなは遠慮してるって本気で信じてるから厄介なんだよね。そっか、あの大きなミートパイでも満足できなかったかぁ……」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「先ほどのミートパイを……そうですね、二回りほど大きく焼いていただけますか？　よろしくお願いいたします♪」
line = "「先ほどのミートパイを……そうですね、二回りほど大きく焼いていただけますか？　よろしくお願いいたします♪」"

[[dialogue]]
speaker = "アム"
# 「……マジで？」
line = "「……マジで？」"

[[dialogue]]
speaker = "unk"
# ──その後、俺とアムがダウンした中、エルゼはにこにこと実に優雅にミートパイを完食した。
line = "──その後、俺とアムがダウンした中、エルゼはにこにこと実に優雅にミートパイを完食した。"

[[dialogue]]
speaker = "unk"
# 人は見た目に寄らない、という言葉を改めて実感した１日なのだった……
line = "人は見た目に寄らない、という言葉を改めて実感した１日なのだった……"
