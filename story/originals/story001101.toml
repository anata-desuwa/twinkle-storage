[[dialogue]]
speaker = "ネーゼマイン"
# 「んじゃ、この前の事件のおさらいしていこっか」
line = "「んじゃ、この前の事件のおさらいしていこっか」"

[[dialogue]]
speaker = "unk"
# マインが取り出したのは、以前発生した『コラプサー事件』の資料。
line = "マインが取り出したのは、以前発生した『コラプサー事件』の資料。"

[[dialogue]]
speaker = "unk"
# 彼女は学園の秘密組織『公安委員会』に所属するエージェントだ。
line = "彼女は学園の秘密組織『公安委員会』に所属するエージェントだ。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「って言っても、会長は当事者だったから振り返るまでもないだろうけど。ま、一応ね♪」
line = "「って言っても、会長は当事者だったから振り返るまでもないだろうけど。ま、一応ね♪」"

[[dialogue]]
speaker = "キサナ"
# 「アタシらはコラプサー。星の光を喰らう者だ」
line = "「アタシらはコラプサー。星の光を喰らう者だ」"

[[dialogue]]
speaker = "unk"
# キサナという魔族の少女は、『コラプサー』を名乗り、流星学園・新星学園両校の星騎士を襲撃した。
line = "キサナという魔族の少女は、『コラプサー』を名乗り、流星学園・新星学園両校の星騎士を襲撃した。"

[[dialogue]]
speaker = "unk"
# キサナの戦闘能力は非常に高く、何より星力を打ち消す未知の力を持っていた。
line = "キサナの戦闘能力は非常に高く、何より星力を打ち消す未知の力を持っていた。"

[[dialogue]]
speaker = "unk"
# 何とか撃退には成功したものの、キサナの身柄の確保には至っていない。
line = "何とか撃退には成功したものの、キサナの身柄の確保には至っていない。"

[[dialogue]]
speaker = "unk"
# 今のところ新たな動きはないが、油断はできないだろう。
line = "今のところ新たな動きはないが、油断はできないだろう。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「『コラプサー事件』はちょっと衝撃だったね～。星騎士が犯罪の標的になることは今までもなくはなかったけど、直接襲われることはまずなかったから」
line = "「『コラプサー事件』はちょっと衝撃だったね～。星騎士が犯罪の標的になることは今までもなくはなかったけど、直接襲われることはまずなかったから」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「だって星騎士って強いし。何かの恨みで襲撃したって、普通返り討ちに遭うのがオチだもんね」
line = "「だって星騎士って強いし。何かの恨みで襲撃したって、普通返り討ちに遭うのがオチだもんね」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「だけどこの前は星徒会長と風紀委員を同時に相手しての大立ち回り。今までにない敵──ってやつだ」
line = "「だけどこの前は星徒会長と風紀委員を同時に相手しての大立ち回り。今までにない敵──ってやつだ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「あの時は犯人がわからなくて、学内の人物の可能性があった。だから風紀委員が動いたけど、今回は公安委員会が調査するよ」
line = "「あの時は犯人がわからなくて、学内の人物の可能性があった。だから風紀委員が動いたけど、今回は公安委員会が調査するよ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「風紀委員は学園生徒による星力の不正行使を取り締まる。でも犯罪者が星力を使う場合は、公安委員会の出番だから」
line = "「風紀委員は学園生徒による星力の不正行使を取り締まる。でも犯罪者が星力を使う場合は、公安委員会の出番だから」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ま、コラプサーが星力を使ってるとは限らないけど。もし全然関係ない力を使ってるとしたら、どこの管轄になるんだろうね？」
line = "「ま、コラプサーが星力を使ってるとは限らないけど。もし全然関係ない力を使ってるとしたら、どこの管轄になるんだろうね？」"

[[dialogue]]
speaker = "unk"
# 今日はセナリィやせつなはいないのか？
line = "今日はセナリィやせつなはいないのか？"

[[dialogue]]
speaker = "ネーゼマイン"
# 「うん、今日は別件があってね。だ～か～ら～……新しいお友達を紹介しまーす♪」
line = "「うん、今日は別件があってね。だ～か～ら～……新しいお友達を紹介しまーす♪」"

[[dialogue]]
speaker = "？？？"
# 「誰が友達だ」
line = "「誰が友達だ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひ♪　仲良くしましょうよ、セ～ンパイ♪」
line = "「にひひ♪　仲良くしましょうよ、セ～ンパイ♪」"

[[dialogue]]
speaker = "？？？"
# 「馴れ馴れしいんだよ。余計仲良くしたくなくなるっての」
line = "「馴れ馴れしいんだよ。余計仲良くしたくなくなるっての」"

[[dialogue]]
speaker = "シアン"
# 「ま、会長さんには名乗っておくか。あたしはシアン・ユーゼリア。新星学園・公安委員会所属の３年生だ」
line = "「ま、会長さんには名乗っておくか。あたしはシアン・ユーゼリア。新星学園・公安委員会所属の３年生だ」"

[[dialogue]]
speaker = "unk"
# （こんな先輩いたっけ……？）
line = "（こんな先輩いたっけ……？）"

[[dialogue]]
speaker = "シアン"
# 「おい、思ってることが顔に出てるぞ。そこは知ってるふりしとけ」
line = "「おい、思ってることが顔に出てるぞ。そこは知ってるふりしとけ」"

[[dialogue]]
speaker = "シアン"
# 「まぁ見覚えがないのは当然だが。あたしは最近まで任務で海外にいたんだ」
line = "「まぁ見覚えがないのは当然だが。あたしは最近まで任務で海外にいたんだ」"

[[dialogue]]
speaker = "シアン"
# 「外国で追ってる事件があったんだが……その関係で今回コラプサー関連の担当になってな。最近流星市国に戻ってきたんだよ」
line = "「外国で追ってる事件があったんだが……その関係で今回コラプサー関連の担当になってな。最近流星市国に戻ってきたんだよ」"

[[dialogue]]
speaker = "シアン"
# 「それにしても……ふーん、これが今の新星の会長か。見た目は割と普通そうだな」
line = "「それにしても……ふーん、これが今の新星の会長か。見た目は割と普通そうだな」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「御前試合じゃ大暴れだったんだから。地を割り、天を裂き、天変地異レベルのパワーだったよ♪」
line = "「御前試合じゃ大暴れだったんだから。地を割り、天を裂き、天変地異レベルのパワーだったよ♪」"

[[dialogue]]
speaker = "シアン"
# 「んなわけあるか。ていうかそこまでいったらリクリエ起こしてるのコイツだろ」
line = "「んなわけあるか。ていうかそこまでいったらリクリエ起こしてるのコイツだろ」"

[[dialogue]]
speaker = "unk"
# （なんだか違和感があるような……）
line = "（なんだか違和感があるような……）"

[[dialogue]]
speaker = "シアン"
# 「ん？　あたしの顔をまじまじ見てどうした？　気に入らないことでもあるのか？」
line = "「ん？　あたしの顔をまじまじ見てどうした？　気に入らないことでもあるのか？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「あれ～？　会長、もしかして気付いたんじゃない？　シアン先輩のヒ・ミ・ツ♪」
line = "「あれ～？　会長、もしかして気付いたんじゃない？　シアン先輩のヒ・ミ・ツ♪」"

[[dialogue]]
speaker = "シアン"
# 「なっ！？」
line = "「なっ！？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「別に言っちゃっていいんじゃない？　会長なら言いふらしたりしないし……ていうか公安委員会の存在の方がよっぽどヤバい秘密だし」
line = "「別に言っちゃっていいんじゃない？　会長なら言いふらしたりしないし……ていうか公安委員会の存在の方がよっぽどヤバい秘密だし」"

[[dialogue]]
speaker = "シアン"
# 「任務上秘匿事項にされてんだ。そういうわけにはいかねえ」
line = "「任務上秘匿事項にされてんだ。そういうわけにはいかねえ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「会長なら教えちゃっていいと思うけどな～。まいっか」
line = "「会長なら教えちゃっていいと思うけどな～。まいっか」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「そーいうわけで、会長にはシアン先輩と一緒にコラプサーの調査をお願いするよ」
line = "「そーいうわけで、会長にはシアン先輩と一緒にコラプサーの調査をお願いするよ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「シアン先輩は、その執念深さと追跡能力から<ruby=ハウンドドッグ>猟犬</ruby>って異名で知られる人なんだ。大先輩だから頼りにするといいよ♪」
line = "「シアン先輩は、その執念深さと追跡能力から<ruby>猟犬<rt>ハウンドドッグ</rt></ruby>って異名で知られる人なんだ。大先輩だから頼りにするといいよ♪」"

[[dialogue]]
speaker = "unk"
# 大先輩……？
line = "大先輩……？"

[[dialogue]]
speaker = "ネーゼマイン"
# 「じゃあ私はセナリィたちと合流しなきゃだから、じゃあね～♪」
line = "「じゃあ私はセナリィたちと合流しなきゃだから、じゃあね～♪」"

[[dialogue]]
speaker = "シアン"
# 「あっ、おい、ネーゼマイン……！　チッ、余計なことばかり言いやがって……」
line = "「あっ、おい、ネーゼマイン……！　チッ、余計なことばかり言いやがって……」"

[[dialogue]]
speaker = "シアン"
# 「まぁいい。星徒会長なら実力は確かだし、あんたは前の事件でもキサナと戦っている。頼りにさせてもらうぞ、会長さん」
line = "「まぁいい。星徒会長なら実力は確かだし、あんたは前の事件でもキサナと戦っている。頼りにさせてもらうぞ、会長さん」"

[[dialogue]]
speaker = "unk"
# はい。よろしくお願いします
line = "はい。よろしくお願いします"

[[dialogue]]
speaker = "シアン"
# 「ああ。とりあえずキサナの足取りを追うぞ。目撃情報を集めてある」
line = "「ああ。とりあえずキサナの足取りを追うぞ。目撃情報を集めてある」"

[[dialogue]]
speaker = "？？？"
# 「ここが流星市国……星騎士たちの総本山」
line = "「ここが流星市国……星騎士たちの総本山」"

[[dialogue]]
speaker = "？？？"
# 「世界を守るために戦う、麗しく、そして気高き戦士たち。流星・新星両校の星騎士と会うのが楽しみです」
line = "「世界を守るために戦う、麗しく、そして気高き戦士たち。流星・新星両校の星騎士と会うのが楽しみです」"

[[dialogue]]
speaker = "？？？"
# 「ああ……本当に楽しみだ」
line = "「ああ……本当に楽しみだ」"
