[[dialogue]]
speaker = "unk"
# 一方その頃、サチとプリムラは深淵書庫の防衛システムと戦いを続けていた――
line = "一方その頃、サチとプリムラは深淵書庫の防衛システムと戦いを続けていた――"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「おのれ、これではキリがないのじゃ……！」
line = "「おのれ、これではキリがないのじゃ……！」"

[[dialogue]]
speaker = "メルクリウス"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "サチ"
# 「やっと倒しても、次の複製体がすぐ現れる……！　やっぱり、ここは逃げるしかない……！」
line = "「やっと倒しても、次の複製体がすぐ現れる……！　やっぱり、ここは逃げるしかない……！」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「しかし、我がこうして力を解放させられている以上、近くにロストアイテムが隠れているのは間違いないのじゃ！」
line = "「しかし、我がこうして力を解放させられている以上、近くにロストアイテムが隠れているのは間違いないのじゃ！」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「トレジアンナ！　ロストアイテムの反応はないのか！？」
line = "「トレジアンナ！　ロストアイテムの反応はないのか！？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「探索術式は使ってるんですけど、この深淵書庫自体がロストアイテムですから、その反応が大きくて見つけられないんですよ～！　木を隠すなら森っていうか～」
line = "「探索術式は使ってるんですけど、この深淵書庫自体がロストアイテムですから、その反応が大きくて見つけられないんですよ～！　木を隠すなら森っていうか～」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「ええい、厄介な場所に引き込まれたもんじゃ！　ん？　待てよ、木を隠すなら森……？」
line = "「ええい、厄介な場所に引き込まれたもんじゃ！　ん？　待てよ、木を隠すなら森……？」"

[[dialogue]]
speaker = "サチ"
# 「プリムラ？　どうしたの？」
line = "「プリムラ？　どうしたの？」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「……トレジアンナ！　よく聞け！」
line = "「……トレジアンナ！　よく聞け！」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「――我に向かって、今すぐロストアイテムの回収術式を放て！」
line = "「――我に向かって、今すぐロストアイテムの回収術式を放て！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「えぇっ！？　そんなことしたら、プリムラさんはただの賢者の石に戻っちゃうので、消滅しちゃいますよ？」
line = "「えぇっ！？　そんなことしたら、プリムラさんはただの賢者の石に戻っちゃうので、消滅しちゃいますよ？」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「阿呆！　そんなもん一時的に決まっとるじゃろうが！　後で必ず元に戻せ！　戻さないと尻叩き１００回の刑じゃぞ！？」
line = "「阿呆！　そんなもん一時的に決まっとるじゃろうが！　後で必ず元に戻せ！　戻さないと尻叩き１００回の刑じゃぞ！？」"

[[dialogue]]
speaker = "サチ"
# 「プリムラ、もしかして……！？」
line = "「プリムラ、もしかして……！？」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「サチ、我が賢者の石に戻ったら、さっさとここから脱出しろ！　敵が目の前にいるから、細かい話は後じゃ！」
line = "「サチ、我が賢者の石に戻ったら、さっさとここから脱出しろ！　敵が目の前にいるから、細かい話は後じゃ！」"

[[dialogue]]
speaker = "サチ"
# 「……うん、わかった！　トレジアンナさん、お願い！」
line = "「……うん、わかった！　トレジアンナさん、お願い！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「とりあえず……やればいいんですね！？　回収術式――」
line = "「とりあえず……やればいいんですね！？　回収術式――」"

[[dialogue]]
speaker = "トレジアンナ"
# 「え～いっ！」
line = "「え～いっ！」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「っ……！」
line = "「っ……！」"

[[dialogue]]
speaker = "unk"
# 回収術式を受け、プリムラの体がその場から消失する。
line = "回収術式を受け、プリムラの体がその場から消失する。"

[[dialogue]]
speaker = "unk"
# そして、プリムラが先程までいた場所に、力を失って落ちたのは――
line = "そして、プリムラが先程までいた場所に、力を失って落ちたのは――"

[[dialogue]]
speaker = "トレジアンナ"
# 「『解放』のロストアイテム！」
line = "「『解放』のロストアイテム！」"

[[dialogue]]
speaker = "サチ"
# 「よし、回収して、すぐにここから脱出しましょう！　トレジアンナさん！」
line = "「よし、回収して、すぐにここから脱出しましょう！　トレジアンナさん！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「はい！　脱出できるゲートを作るので、その間持ちこたえて下さい！」
line = "「はい！　脱出できるゲートを作るので、その間持ちこたえて下さい！」"

[[dialogue]]
speaker = "サチ"
# 「大丈夫。やると決まれば……私、<ruby=ラッキー>幸運</ruby>ですから！」
line = "「大丈夫。やると決まれば……私、<ruby>幸運<rt>ラッキー</rt></ruby>ですから！」"

[[dialogue]]
speaker = "unk"
# ――その後、サチはメルクリウスを抑えきり、トレジアンナの術式によって深淵書庫からの脱出に成功。元の図書館へと戻ってきた。
line = "――その後、サチはメルクリウスを抑えきり、トレジアンナの術式によって深淵書庫からの脱出に成功。元の図書館へと戻ってきた。"

[[dialogue]]
speaker = "プリムラ"
# 「ふぅ。……どうやら上手く行ったようじゃな？」
line = "「ふぅ。……どうやら上手く行ったようじゃな？」"

[[dialogue]]
speaker = "unk"
# トレジアンナが回収術式を解き、プリムラは再び姿を取り戻す。
line = "トレジアンナが回収術式を解き、プリムラは再び姿を取り戻す。"

[[dialogue]]
speaker = "サチ"
# 「うん。プリムラの機転のおかげでね」
line = "「うん。プリムラの機転のおかげでね」"

[[dialogue]]
speaker = "トレジアンナ"
# 「いや～、でもまさか、ロストアイテムがプリムラさんの中に潜伏していたとは思いませんでしたよ」
line = "「いや～、でもまさか、ロストアイテムがプリムラさんの中に潜伏していたとは思いませんでしたよ」"

[[dialogue]]
speaker = "プリムラ"
# 「我の体も当然、ロストアイテムとして探索術式に反応する。それを隠れ蓑にしていたというわけじゃな！」
line = "「我の体も当然、ロストアイテムとして探索術式に反応する。それを隠れ蓑にしていたというわけじゃな！」"

[[dialogue]]
speaker = "プリムラ"
# 「それで？　肝心のロストアイテムは？」
line = "「それで？　肝心のロストアイテムは？」"

[[dialogue]]
speaker = "サチ"
# 「ちゃんと回収したよ。ほら」
line = "「ちゃんと回収したよ。ほら」"

[[dialogue]]
speaker = "プリムラ"
# 「ふむ、そうか。なら逃がさんように、トレジアンナの術でさっさとしまっておけ」
line = "「ふむ、そうか。なら逃がさんように、トレジアンナの術でさっさとしまっておけ」"

[[dialogue]]
speaker = "サチ"
# 「え？　いいの……？」
line = "「え？　いいの……？」"

[[dialogue]]
speaker = "プリムラ"
# 「ん？　何じゃサチ、意外そうな顔をして」
line = "「ん？　何じゃサチ、意外そうな顔をして」"

[[dialogue]]
speaker = "サチ"
# 「だってこれを使えば、プリムラは自分の封印を解くことができるんでしょ？　だからてっきり、寄こせって言い出すんじゃないかって……」
line = "「だってこれを使えば、プリムラは自分の封印を解くことができるんでしょ？　だからてっきり、寄こせって言い出すんじゃないかって……」"

[[dialogue]]
speaker = "プリムラ"
# 「ふん、バカめ。貴様……一体いつまで、我を昔のままだと思っているのじゃ！」
line = "「ふん、バカめ。貴様……一体いつまで、我を昔のままだと思っているのじゃ！」"

[[dialogue]]
speaker = "プリムラ"
# 「我が今更封印を解いて、昔の力を取り戻す程度で満足するとでも？」
line = "「我が今更封印を解いて、昔の力を取り戻す程度で満足するとでも？」"

[[dialogue]]
speaker = "サチ"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "プリムラ"
# 「本来の力を取り戻したところで、サチ、貴様に勝てなければ何の意味もないのじゃ」
line = "「本来の力を取り戻したところで、サチ、貴様に勝てなければ何の意味もないのじゃ」"

[[dialogue]]
speaker = "プリムラ"
# 「何故なら――」
line = "「何故なら――」"

[[dialogue]]
speaker = "プリムラ"
# 「我の今の野望はサチ、貴様を超える最強の魔法少女となり、世界を征服することなのじゃからな！」
line = "「我の今の野望はサチ、貴様を超える最強の魔法少女となり、世界を征服することなのじゃからな！」"

[[dialogue]]
speaker = "サチ"
# 「いや、私は別に魔法少女じゃないけどね！？」
line = "「いや、私は別に魔法少女じゃないけどね！？」"

[[dialogue]]
speaker = "サチ"
# 「でも……そっか。プリムラが最強を目指すっていうなら、より一層負けられないね。だって――」
line = "「でも……そっか。プリムラが最強を目指すっていうなら、より一層負けられないね。だって――」"

[[dialogue]]
speaker = "サチ"
# 「私の目標も、リクリエから世界を救えるような、最強の星騎士になることなんだから！」
line = "「私の目標も、リクリエから世界を救えるような、最強の星騎士になることなんだから！」"

[[dialogue]]
speaker = "プリムラ"
# 「ふっ……それでこそ我が宿敵。倒し甲斐があるというものじゃ」
line = "「ふっ……それでこそ我が宿敵。倒し甲斐があるというものじゃ」"

[[dialogue]]
speaker = "プリムラ"
# 「せいぜい幸運にあぐらをかいて、待っているがよい」
line = "「せいぜい幸運にあぐらをかいて、待っているがよい」"

[[dialogue]]
speaker = "サチ"
# 「残念。私、人事天命がモットーだから、どんどん鍛錬して強くなるよ。……ふふっ♪」
line = "「残念。私、人事天命がモットーだから、どんどん鍛錬して強くなるよ。……ふふっ♪」"

[[dialogue]]
speaker = "unk"
# そう言って、サチは嬉しそうに微笑むのだった。
line = "そう言って、サチは嬉しそうに微笑むのだった。"

[[dialogue]]
speaker = "トレジアンナ"
# 「これは……サーシャさんがこの場にいたら、『あら～♪』とでも言いそうな、いい雰囲気ですね～♪」
line = "「これは……サーシャさんがこの場にいたら、『あら～♪』とでも言いそうな、いい雰囲気ですね～♪」"

[[dialogue]]
speaker = "シズハ"
# 「……お姉ちゃん。それで、話って……？」
line = "「……お姉ちゃん。それで、話って……？」"

[[dialogue]]
speaker = "サーシャ"
# 「……シズハちゃん、あのね」
line = "「……シズハちゃん、あのね」"

[[dialogue]]
speaker = "サーシャ"
# 「私は、あなたと出会ってまだそんなに経っていないけれど、それでも大切にしたいって思っている」
line = "「私は、あなたと出会ってまだそんなに経っていないけれど、それでも大切にしたいって思っている」"

[[dialogue]]
speaker = "サーシャ"
# 「妹のように可愛く思えて、幸せになって欲しいって……だから」
line = "「妹のように可愛く思えて、幸せになって欲しいって……だから」"

[[dialogue]]
speaker = "サーシャ"
# 「あなたには厳しくすると決めた」
line = "「あなたには厳しくすると決めた」"

[[dialogue]]
speaker = "サーシャ"
# 「私は――」
line = "「私は――」"

[[dialogue]]
speaker = "サーシャ"
# 「あなたの『お姉ちゃん』であることを否定するわ」
line = "「あなたの『お姉ちゃん』であることを否定するわ」"

[[dialogue]]
speaker = "unk"
# サーシャさんはシズハに、そう宣言するのだった――
line = "サーシャさんはシズハに、そう宣言するのだった――"
