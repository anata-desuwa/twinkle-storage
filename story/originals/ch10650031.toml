[[dialogue]]
speaker = "unk"
# 第１話,バレンタインドレスの力,P
line = "第１話,バレンタインドレスの力,P"

[[dialogue]]
speaker = "unk"
# 放課後。今日は星徒会の活動がないので、真っ直ぐ帰ろうと思ったが──
line = "放課後。今日は星徒会の活動がないので、真っ直ぐ帰ろうと思ったが──"

[[dialogue]]
speaker = "？？？"
# 「ねぇ、ちょっと……」
line = "「ねぇ、ちょっと……」"

[[dialogue]]
speaker = "unk"
# 俺を呼び止める声が聞こえて振り返る。
line = "俺を呼び止める声が聞こえて振り返る。"

[[dialogue]]
speaker = "イレーナ"
# 「あんたに頼みがあるんだけど……暇なら一緒に来てくれない？」
line = "「あんたに頼みがあるんだけど……暇なら一緒に来てくれない？」"

[[dialogue]]
speaker = "イレーナ"
# 「せっかくバレンタインフォームに変身できるようになったし、イベントだけじゃなくて、実戦でも使いこなせるようになりたいと思ったのよ」
line = "「せっかくバレンタインフォームに変身できるようになったし、イベントだけじゃなくて、実戦でも使いこなせるようになりたいと思ったのよ」"

[[dialogue]]
speaker = "イレーナ"
# 「シャロンが修道院の用事で外せなくて、頼めそうなのがあんたくらいしかいなくてね。付き合ってくれて助かったわ」
line = "「シャロンが修道院の用事で外せなくて、頼めそうなのがあんたくらいしかいなくてね。付き合ってくれて助かったわ」"

[[dialogue]]
speaker = "イレーナ"
# 「ん？　がっかりした？　２人きりだから何かあると思った？　残念、別に色気のある話じゃないわよ」
line = "「ん？　がっかりした？　２人きりだから何かあると思った？　残念、別に色気のある話じゃないわよ」"

[[dialogue]]
speaker = "イレーナ"
# 「まぁ、でも……この衣装の感想とか聞いてなかったから、言うことがあるなら聞いてあげなくもないけど……」
line = "「まぁ、でも……この衣装の感想とか聞いてなかったから、言うことがあるなら聞いてあげなくもないけど……」"

[[dialogue]]
speaker = "unk"
# 聖女なのに肌面積がすごい
line = "聖女なのに肌面積がすごい"

[[dialogue]]
speaker = "イレーナ"
# 「はああぁっ！？　あんたそれしか言うことないの！？　このスケベ魔王！！」
line = "「はああぁっ！？　あんたそれしか言うことないの！？　このスケベ魔王！！」"

[[dialogue]]
speaker = "unk"
# だから本当は独り占めしたい
line = "だから本当は独り占めしたい"

[[dialogue]]
speaker = "イレーナ"
# 「んなっ──！？」
line = "「んなっ──！？」"

[[dialogue]]
speaker = "イレーナ"
# 「他の男に見せたくない……？　見つめてもいいのは俺だけ……？　あと色が大人っぽくて素敵？　いや最後のは最初に言いなさいよ」
line = "「他の男に見せたくない……？　見つめてもいいのは俺だけ……？　あと色が大人っぽくて素敵？　いや最後のは最初に言いなさいよ」"

[[dialogue]]
speaker = "イレーナ"
# 「はいはい、そういう独占欲は２人きりの時だけにしてねー。イベントで使うやつだし、これでも一応戦闘服だから、これで戦うこともあるし」
line = "「はいはい、そういう独占欲は２人きりの時だけにしてねー。イベントで使うやつだし、これでも一応戦闘服だから、これで戦うこともあるし」"

[[dialogue]]
speaker = "イレーナ"
# 「まぁ気が向いたら、じっくり見せてあげても──」
line = "「まぁ気が向いたら、じっくり見せてあげても──」"

[[dialogue]]
speaker = "イレーナ"
# 「って、そういうんじゃないから！　今日はあくまでこの戦闘服を使いこなす訓練！　鑑賞会じゃないっての！」
line = "「って、そういうんじゃないから！　今日はあくまでこの戦闘服を使いこなす訓練！　鑑賞会じゃないっての！」"

[[dialogue]]
speaker = "unk"
# ちなみにイレーナの戦闘服って──
line = "ちなみにイレーナの戦闘服って──"

[[dialogue]]
speaker = "イレーナ"
# 「ん？　これは人工戦闘服じゃなくて自前よ。前のクリスマスフォームもそうだけど」
line = "「ん？　これは人工戦闘服じゃなくて自前よ。前のクリスマスフォームもそうだけど」"

[[dialogue]]
speaker = "unk"
# ノヴァフォームや水着戦闘服、人工戦闘服という例外はあるものの、星騎士がまとう戦闘服は、基本的に１人につき１つだ。
line = "ノヴァフォームや水着戦闘服、人工戦闘服という例外はあるものの、星騎士がまとう戦闘服は、基本的に１人につき１つだ。"

[[dialogue]]
speaker = "unk"
# 自力で戦闘服を変えるのは高度な星力コントロール技術が必要とされるが、イレーナはそれが可能な、稀有な存在だ。
line = "自力で戦闘服を変えるのは高度な星力コントロール技術が必要とされるが、イレーナはそれが可能な、稀有な存在だ。"

[[dialogue]]
speaker = "イレーナ"
# 「これでもヨーロッパじゃ有名な星騎士だったからね。それなりにはやるわ」
line = "「これでもヨーロッパじゃ有名な星騎士だったからね。それなりにはやるわ」"

[[dialogue]]
speaker = "unk"
# だから全部露出度が高いのか……
line = "だから全部露出度が高いのか……"

[[dialogue]]
speaker = "イレーナ"
# 「そんなわけないでしょ！　人を露出狂呼ばわりしないで！」
line = "「そんなわけないでしょ！　人を露出狂呼ばわりしないで！」"

[[dialogue]]
speaker = "イレーナ"
# 「……あれ？　でも戦闘服を調整しようとすると、いつもこんな感じになるような……いえ、今はいいわ。考えないようにしましょ」
line = "「……あれ？　でも戦闘服を調整しようとすると、いつもこんな感じになるような……いえ、今はいいわ。考えないようにしましょ」"

[[dialogue]]
speaker = "イレーナ"
# 「本題に戻るわよ。バレンタインフォームを使いこなす練習に付き合ってほしいの」
line = "「本題に戻るわよ。バレンタインフォームを使いこなす練習に付き合ってほしいの」"

[[dialogue]]
speaker = "イレーナ"
# 「で、このフォームの力はどんなのかっていうと、こうやってドリンクやチョコを出せるの」
line = "「で、このフォームの力はどんなのかっていうと、こうやってドリンクやチョコを出せるの」"

[[dialogue]]
speaker = "unk"
# そう言ってイレーナが手を開くと、チョコレート色の液体が入ったグラスが生まれる。
line = "そう言ってイレーナが手を開くと、チョコレート色の液体が入ったグラスが生まれる。"

[[dialogue]]
speaker = "イレーナ"
# 「これはエスプレッソとホットチョコレート、生クリームを合わせたドリンクで、イタリアのトリノじゃ有名なやつよ」
line = "「これはエスプレッソとホットチョコレート、生クリームを合わせたドリンクで、イタリアのトリノじゃ有名なやつよ」"

[[dialogue]]
speaker = "イレーナ"
# 「巡礼者の滋養強壮のために考えられた……とか聞いたことあるわ。本当か知らないけど」
line = "「巡礼者の滋養強壮のために考えられた……とか聞いたことあるわ。本当か知らないけど」"

[[dialogue]]
speaker = "イレーナ"
# 「……イレーナは神官だからぴったり？　まぁ信仰に関わるって点ではそうかもね」
line = "「……イレーナは神官だからぴったり？　まぁ信仰に関わるって点ではそうかもね」"

[[dialogue]]
speaker = "イレーナ"
# 「ちなみに混ぜずに飲むのが正しい飲み方よ。一杯いってみる？　……はい、あげる」
line = "「ちなみに混ぜずに飲むのが正しい飲み方よ。一杯いってみる？　……はい、あげる」"

[[dialogue]]
speaker = "unk"
# 甘くて苦くて美味しい！
line = "甘くて苦くて美味しい！"

[[dialogue]]
speaker = "イレーナ"
# 「でしょう？　生クリームのコクと、チョコの甘さ、エスプレッソの苦みが順番にやってきて、口の中で溶け合って……絶妙な味になるのよ」
line = "「でしょう？　生クリームのコクと、チョコの甘さ、エスプレッソの苦みが順番にやってきて、口の中で溶け合って……絶妙な味になるのよ」"

[[dialogue]]
speaker = "unk"
# 力がみなぎる……！
line = "力がみなぎる……！"

[[dialogue]]
speaker = "イレーナ"
# 「星術で出してるやつなんだから、そりゃそうでしょ。普通のドリンクじゃないわよ」
line = "「星術で出してるやつなんだから、そりゃそうでしょ。普通のドリンクじゃないわよ」"

[[dialogue]]
speaker = "イレーナ"
# 「これが私のバレンタインフォームの力。ドリンクとチョコで味方を元気づけるの」
line = "「これが私のバレンタインフォームの力。ドリンクとチョコで味方を元気づけるの」"

[[dialogue]]
speaker = "イレーナ"
# 「あとこんなのも出せるわ」
line = "「あとこんなのも出せるわ」"

[[dialogue]]
speaker = "unk"
# イレーナが手の中に小さなお菓子を生み出す。
line = "イレーナが手の中に小さなお菓子を生み出す。"

[[dialogue]]
speaker = "イレーナ"
# 「これはバーチ・ディ・ダーマっていって、クッキーにチョコを挟んだもの。これもトリノ発祥らしいわ。食べてみて」
line = "「これはバーチ・ディ・ダーマっていって、クッキーにチョコを挟んだもの。これもトリノ発祥らしいわ。食べてみて」"

[[dialogue]]
speaker = "イレーナ"
# 「……サクサクの食感とチョコの甘さが合わさって美味しい？　ならよかったわ」
line = "「……サクサクの食感とチョコの甘さが合わさって美味しい？　ならよかったわ」"

[[dialogue]]
speaker = "イレーナ"
# 「ついでにドリンクもう一杯いっとく？　はい、どうぞ」
line = "「ついでにドリンクもう一杯いっとく？　はい、どうぞ」"

[[dialogue]]
speaker = "unk"
# ──苦ぁっ！！？
line = "──苦ぁっ！！？"

[[dialogue]]
speaker = "イレーナ"
# 「さっき露出狂呼ばわりしてくれたお礼よ」
line = "「さっき露出狂呼ばわりしてくれたお礼よ」"

[[dialogue]]
speaker = "イレーナ"
# 「あたしが出すチョコは、甘いも苦いもあたし次第。苦～いのを味わいたくなかったら、あたしの機嫌を損ねないことね♪」
line = "「あたしが出すチョコは、甘いも苦いもあたし次第。苦～いのを味わいたくなかったら、あたしの機嫌を損ねないことね♪」"

[[dialogue]]
speaker = "unk"
# バレンタインフォームを使いこなす練習と言っていたけど、イレーナはすでにこのフォームを十分に使いこなしているようだった。
line = "バレンタインフォームを使いこなす練習と言っていたけど、イレーナはすでにこのフォームを十分に使いこなしているようだった。"
