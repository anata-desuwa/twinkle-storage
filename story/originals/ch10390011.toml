[[dialogue]]
speaker = "unk"
# 第１話,魔女の記憶探し,P
line = "第１話,魔女の記憶探し,P"

[[dialogue]]
speaker = "unk"
# 先週はネビュラの一件で慌ただしい休日になってしまった。
line = "先週はネビュラの一件で慌ただしい休日になってしまった。"

[[dialogue]]
speaker = "unk"
# 今日こそ気を取り直して休日を楽しみたいところだが……
line = "今日こそ気を取り直して休日を楽しみたいところだが……"

[[dialogue]]
speaker = "イニシュ"
# 「奇遇ですね、魔王」
line = "「奇遇ですね、魔王」"

[[dialogue]]
speaker = "アイリーン"
# 「あ、会長さんだ！　こんにちはー！」
line = "「あ、会長さんだ！　こんにちはー！」"

[[dialogue]]
speaker = "unk"
# 何してるんだ？
line = "何してるんだ？"

[[dialogue]]
speaker = "イニシュ"
# 「以前魔王に話した通り、私は長期間スリープ状態だったせいで記憶がありません」
line = "「以前魔王に話した通り、私は長期間スリープ状態だったせいで記憶がありません」"

[[dialogue]]
speaker = "イニシュ"
# 「私は私のことがわかりません」
line = "「私は私のことがわかりません」"

[[dialogue]]
speaker = "イニシュ"
# 「だから私は私のことが知りたい。思い出したい」
line = "「だから私は私のことが知りたい。思い出したい」"

[[dialogue]]
speaker = "イニシュ"
# 「なので今日はアイリーンとラーメンを食べに来ました」
line = "「なので今日はアイリーンとラーメンを食べに来ました」"

[[dialogue]]
speaker = "unk"
# （それはラーメンが食べたいだけでは？）
line = "（それはラーメンが食べたいだけでは？）"

[[dialogue]]
speaker = "イニシュ"
# 「本来なら謹慎期間のはずでしたが、セドナ長官によって短縮されました。その代わり──」
line = "「本来なら謹慎期間のはずでしたが、セドナ長官によって短縮されました。その代わり──」"

[[dialogue]]
speaker = "セドナ"
# 「記憶を取り戻せ」
line = "「記憶を取り戻せ」"

[[dialogue]]
speaker = "セドナ"
# 「お前の失われた記憶には、我々魔女にとって重要な情報が眠っている可能性がある」
line = "「お前の失われた記憶には、我々魔女にとって重要な情報が眠っている可能性がある」"

[[dialogue]]
speaker = "セドナ"
# 「そのための行動はお前に任せる。基地を出ても構わんが、目立つ行動は慎め。いいな」
line = "「そのための行動はお前に任せる。基地を出ても構わんが、目立つ行動は慎め。いいな」"

[[dialogue]]
speaker = "イニシュ"
# 「──と言われました。ですので、これはセドナ長官の命令でもあるのです」
line = "「──と言われました。ですので、これはセドナ長官の命令でもあるのです」"

[[dialogue]]
speaker = "アイリーン"
# 「私は付き添いでーす。イニシュさんだけだとちょっと不安だからね」
line = "「私は付き添いでーす。イニシュさんだけだとちょっと不安だからね」"

[[dialogue]]
speaker = "アイリーン"
# 「ねぇねぇ、今から行くのってどんなラーメン屋さん？」
line = "「ねぇねぇ、今から行くのってどんなラーメン屋さん？」"

[[dialogue]]
speaker = "イニシュ"
# 「とても美味な鶏白湯ラーメンを提供する店と聞いています」
line = "「とても美味な鶏白湯ラーメンを提供する店と聞いています」"

[[dialogue]]
speaker = "イニシュ"
# 「コンビニとコラボレーションしたカップ麺は私も食したことがあるので、店の味が気になっていたのですが……店先に何か書いてありますね」
line = "「コンビニとコラボレーションしたカップ麺は私も食したことがあるので、店の味が気になっていたのですが……店先に何か書いてありますね」"

[[dialogue]]
speaker = "アイリーン"
# 「なになに……？　先月末日を以て、当店は移転しました──」
line = "「なになに……？　先月末日を以て、当店は移転しました──」"

[[dialogue]]
speaker = "アイリーン"
# 「え～～～っ！？　お店なくなっちゃったの～！？」
line = "「え～～～っ！？　お店なくなっちゃったの～！？」"

[[dialogue]]
speaker = "イニシュ"
# 「残念ですが仕方ありません。日を改めましょう」
line = "「残念ですが仕方ありません。日を改めましょう」"

[[dialogue]]
speaker = "イニシュ"
# 「鶏白湯……ラーメン……」
line = "「鶏白湯……ラーメン……」"

[[dialogue]]
speaker = "unk"
# ここからならそんなに遠くないかも
line = "ここからならそんなに遠くないかも"

[[dialogue]]
speaker = "イニシュ"
# 「！　本当ですか？」
line = "「！　本当ですか？」"

[[dialogue]]
speaker = "unk"
# 俺たちは移転先を調べてそこに向かったのだが──
line = "俺たちは移転先を調べてそこに向かったのだが──"

[[dialogue]]
speaker = "アイリーン"
# 「も～、けっこう遠いじゃん！　もう足がクタクタだよー」
line = "「も～、けっこう遠いじゃん！　もう足がクタクタだよー」"

[[dialogue]]
speaker = "イニシュ"
# 「付き合わせてしまってすみません、アイリーン」
line = "「付き合わせてしまってすみません、アイリーン」"

[[dialogue]]
speaker = "アイリーン"
# 「ううん、イニシュさんのせいじゃないよ。私だってラーメン食べたかったし。でも……」
line = "「ううん、イニシュさんのせいじゃないよ。私だってラーメン食べたかったし。でも……」"

[[dialogue]]
speaker = "イニシュ"
# 「お店がありませんね」
line = "「お店がありませんね」"

[[dialogue]]
speaker = "unk"
# 移転したばかりで地図アプリが間違ってるのかも
line = "移転したばかりで地図アプリが間違ってるのかも"

[[dialogue]]
speaker = "アイリーン"
# 「え～っ！？　じゃあやっぱりお店ないの！？」
line = "「え～っ！？　じゃあやっぱりお店ないの！？」"

[[dialogue]]
speaker = "イニシュ"
# 「いえ、この近くにはあるはずです。投稿された写真を頼りに探すしかありません」
line = "「いえ、この近くにはあるはずです。投稿された写真を頼りに探すしかありません」"

[[dialogue]]
speaker = "アイリーン"
# 「うぅ～っ、苦労した分、本当においしいラーメンじゃないと許さないんだからね！」
line = "「うぅ～っ、苦労した分、本当においしいラーメンじゃないと許さないんだからね！」"

[[dialogue]]
speaker = "アイリーン"
# 「写真だとけっこうオシャレな感じだよね……。ねぇねぇ、イニシュさん。あれじゃない？」
line = "「写真だとけっこうオシャレな感じだよね……。ねぇねぇ、イニシュさん。あれじゃない？」"

[[dialogue]]
speaker = "イニシュ"
# 「いえ、あれは喫茶店です」
line = "「いえ、あれは喫茶店です」"

[[dialogue]]
speaker = "アイリーン"
# 「あれは？」
line = "「あれは？」"

[[dialogue]]
speaker = "イニシュ"
# 「あれはサロン──美容室のようです」
line = "「あれはサロン──美容室のようです」"

[[dialogue]]
speaker = "アイリーン"
# 「あんなにおいしそうな雰囲気なのに！？」
line = "「あんなにおいしそうな雰囲気なのに！？」"

[[dialogue]]
speaker = "unk"
# 向こうの看板は？
line = "向こうの看板は？"

[[dialogue]]
speaker = "イニシュ"
# 「<ruby=ラーメン>ＲＡＭＥＮ</ruby>　<ruby=トリスケ>ＴＯＲＩＳＵＫＥ</ruby>……あれです！」
line = "「<ruby>ＲＡＭＥＮ<rt>ラーメン</rt></ruby>　<ruby>ＴＯＲＩＳＵＫＥ<rt>トリスケ</rt></ruby>……あれです！」"

[[dialogue]]
speaker = "イニシュ"
# 「鶏白湯ラーメン……凝縮された鶏の旨味がインパクトを与える、鮮烈な一杯でした」
line = "「鶏白湯ラーメン……凝縮された鶏の旨味がインパクトを与える、鮮烈な一杯でした」"

[[dialogue]]
speaker = "アイリーン"
# 「お店に付くまでが大変だったけど、ほんとにおいしかった！」
line = "「お店に付くまでが大変だったけど、ほんとにおいしかった！」"

[[dialogue]]
speaker = "アイリーン"
# 「イニシュさん、ラーメンで何か思い出せた？」
line = "「イニシュさん、ラーメンで何か思い出せた？」"

[[dialogue]]
speaker = "イニシュ"
# 「いえ、ラーメンに関連した記憶は思い出せませんでした」
line = "「いえ、ラーメンに関連した記憶は思い出せませんでした」"

[[dialogue]]
speaker = "イニシュ"
# 「ですが──」
line = "「ですが──」"

[[dialogue]]
speaker = "アイリーン"
# 「ですが？」
line = "「ですが？」"

[[dialogue]]
speaker = "イニシュ"
# 「………………」
line = "「………………」"

[[dialogue]]
speaker = "アイリーン"
# 「ですが何！？」
line = "「ですが何！？」"

[[dialogue]]
speaker = "イニシュ"
# 「すみません、言語化に時間がかかりました」
line = "「すみません、言語化に時間がかかりました」"

[[dialogue]]
speaker = "イニシュ"
# 「しかし……何と言っていいかわかりません。誰かとお店を探して彷徨った記憶が……あるような……」
line = "「しかし……何と言っていいかわかりません。誰かとお店を探して彷徨った記憶が……あるような……」"

[[dialogue]]
speaker = "イニシュ"
# 「それはとても些細なことのような……でもとても大事なことのような気もします」
line = "「それはとても些細なことのような……でもとても大事なことのような気もします」"

[[dialogue]]
speaker = "イニシュ"
# 「さらに刺激があれば思い出せるかもしれません」
line = "「さらに刺激があれば思い出せるかもしれません」"

[[dialogue]]
speaker = "イニシュ"
# 「よろしければ魔王もまた協力していただけますか？」
line = "「よろしければ魔王もまた協力していただけますか？」"

[[dialogue]]
speaker = "unk"
# そういうことなら喜んで
line = "そういうことなら喜んで"

[[dialogue]]
speaker = "イニシュ"
# 「ありがとうございます。ではまたよろしくお願いします」
line = "「ありがとうございます。ではまたよろしくお願いします」"
