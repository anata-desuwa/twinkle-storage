[[dialogue]]
speaker = "unk"
# 第１話,遅れてやってきたクリスマス,P
line = "第１話,遅れてやってきたクリスマス,P"

[[dialogue]]
speaker = "unk"
# 年が明けてしばらく経った冬休みのある日。俺は恋人であるフニのいる、流星学園寮までやってきていた。
line = "年が明けてしばらく経った冬休みのある日。俺は恋人であるフニのいる、流星学園寮までやってきていた。"

[[dialogue]]
speaker = "フェニエル"
# 「こ、こんな感じでいいですか？」
line = "「こ、こんな感じでいいですか？」"

[[dialogue]]
speaker = "ナミエル"
# 「はい、大変可愛らしいです。ではフニさま、今の感じで何枚か撮っていきますね」
line = "「はい、大変可愛らしいです。ではフニさま、今の感じで何枚か撮っていきますね」"

[[dialogue]]
speaker = "unk"
# ……撮影会？
line = "……撮影会？"

[[dialogue]]
speaker = "フェニエル"
# 「か、会長さん！？」
line = "「か、会長さん！？」"

[[dialogue]]
speaker = "ナミエル"
# 「はい、フニさまのご依頼で、クリスマスフォームのお姿を写真に収めていました」
line = "「はい、フニさまのご依頼で、クリスマスフォームのお姿を写真に収めていました」"

[[dialogue]]
speaker = "フェニエル"
# 「クリスマスの時は撮れなかったから、改めてナミエルちゃんにお願いしたんです。北海道のみんなに見せてあげようと思って」
line = "「クリスマスの時は撮れなかったから、改めてナミエルちゃんにお願いしたんです。北海道のみんなに見せてあげようと思って」"

[[dialogue]]
speaker = "ナミエル"
# 「ということで只今撮影中です。しばしお待ち下さい」
line = "「ということで只今撮影中です。しばしお待ち下さい」"

[[dialogue]]
speaker = "unk"
# じゃあ待たせてもらうね
line = "じゃあ待たせてもらうね"

[[dialogue]]
speaker = "ナミエル"
# 「それでは撮影を再開します」
line = "「それでは撮影を再開します」"

[[dialogue]]
speaker = "フェニエル"
# 「か、会長さんが見ている前で撮るんですかっ！？」
line = "「か、会長さんが見ている前で撮るんですかっ！？」"

[[dialogue]]
speaker = "ナミエル"
# 「さすがに追い返すのは失礼ですからね」
line = "「さすがに追い返すのは失礼ですからね」"

[[dialogue]]
speaker = "フェニエル"
# 「でで、でもっ……そのっ、いろんなポーズで撮ってたから……」
line = "「でで、でもっ……そのっ、いろんなポーズで撮ってたから……」"

[[dialogue]]
speaker = "unk"
# それは是非見てみたいな
line = "それは是非見てみたいな"

[[dialogue]]
speaker = "フェニエル"
# 「か、会長さん～、恥ずかしいですってばぁ」
line = "「か、会長さん～、恥ずかしいですってばぁ」"

[[dialogue]]
speaker = "ナミエル"
# 「視線が気になるなら、緋宮会長の用件を先に済ませてもらう、という選択もあります」
line = "「視線が気になるなら、緋宮会長の用件を先に済ませてもらう、という選択もあります」"

[[dialogue]]
speaker = "ナミエル"
# 「さて、会長はどのようなご用件で流星寮に？」
line = "「さて、会長はどのようなご用件で流星寮に？」"

[[dialogue]]
speaker = "unk"
# フニに会いに来たんだ
line = "フニに会いに来たんだ"

[[dialogue]]
speaker = "ナミエル"
# 「……それだけ、ですか？　新星学園の星徒会長としていらしたわけではないのですね」
line = "「……それだけ、ですか？　新星学園の星徒会長としていらしたわけではないのですね」"

[[dialogue]]
speaker = "フェニエル"
# 「ごめんね、ナミエルちゃん。私っ、その、ね……会長さんとは……」
line = "「ごめんね、ナミエルちゃん。私っ、その、ね……会長さんとは……」"

[[dialogue]]
speaker = "フェニエル"
# 「え、えへへ♪」
line = "「え、えへへ♪」"

[[dialogue]]
speaker = "ナミエル"
# 「……いちいち可愛らしい反応ですね、まったく」
line = "「……いちいち可愛らしい反応ですね、まったく」"

[[dialogue]]
speaker = "ナミエル"
# 「おおよその察しはついていますが、きちんとした報告が聞きたいところです」
line = "「おおよその察しはついていますが、きちんとした報告が聞きたいところです」"

[[dialogue]]
speaker = "フェニエル"
# 「そ、そうだよねっ。あのね、ナミエルちゃん、私と会長さんは……」
line = "「そ、そうだよねっ。あのね、ナミエルちゃん、私と会長さんは……」"

[[dialogue]]
speaker = "unk"
# 恋人同士になりました
line = "恋人同士になりました"

[[dialogue]]
speaker = "フェニエル"
# 「そ、そうなんです。実は私たち、少し前からお付き合い、させてもらってて……」
line = "「そ、そうなんです。実は私たち、少し前からお付き合い、させてもらってて……」"

[[dialogue]]
speaker = "フェニエル"
# 「会長さんの彼女に、してもらえちゃったんですっ<emoji=heart04>　えへへへぇ♪」
line = "「会長さんの彼女に、してもらえちゃったんですっ<emoji=heart04>　えへへへぇ♪」"

[[dialogue]]
speaker = "ナミエル"
# 「そ、そうでしたか。覚悟はしていましたが、直接聞くと意外とダメージを受けますね……」
line = "「そ、そうでしたか。覚悟はしていましたが、直接聞くと意外とダメージを受けますね……」"

[[dialogue]]
speaker = "フェニエル"
# 「その……今まで報告が遅くなって、ごめんなさい」
line = "「その……今まで報告が遅くなって、ごめんなさい」"

[[dialogue]]
speaker = "ナミエル"
# 「いえ、こういったものは中々タイミングがないと話しづらいことは、理解しています」
line = "「いえ、こういったものは中々タイミングがないと話しづらいことは、理解しています」"

[[dialogue]]
speaker = "ナミエル"
# 「おめでとうございます、フニさま」
line = "「おめでとうございます、フニさま」"

[[dialogue]]
speaker = "フェニエル"
# 「ありがとうごいざいますっ、ナミエルちゃん！」
line = "「ありがとうごいざいますっ、ナミエルちゃん！」"

[[dialogue]]
speaker = "unk"
# ありがとう、ナミエル
line = "ありがとう、ナミエル"

[[dialogue]]
speaker = "ナミエル"
# 「あなたには言っていません」
line = "「あなたには言っていません」"

[[dialogue]]
speaker = "unk"
# どうして！？
line = "どうして！？"

[[dialogue]]
speaker = "ナミエル"
# 「ですがまあ、フニさまを笑顔にして頂けるのでしたら、おめでとうと言うのもやぶさかではありません」
line = "「ですがまあ、フニさまを笑顔にして頂けるのでしたら、おめでとうと言うのもやぶさかではありません」"

[[dialogue]]
speaker = "ナミエル"
# 「さあ、フニさま。残りを撮ってしまいますよ」
line = "「さあ、フニさま。残りを撮ってしまいますよ」"

[[dialogue]]
speaker = "フェニエル"
# 「うんっ。よろしくお願いします、ナミエルちゃん！」
line = "「うんっ。よろしくお願いします、ナミエルちゃん！」"

[[dialogue]]
speaker = "ナミエル"
# 「では先程の続きを……そうです、大変可愛らしいですよ。もっと笑顔になったら可愛さ倍増です」
line = "「では先程の続きを……そうです、大変可愛らしいですよ。もっと笑顔になったら可愛さ倍増です」"

[[dialogue]]
speaker = "フェニエル"
# 「こ、こうかな？」
line = "「こ、こうかな？」"

[[dialogue]]
speaker = "ナミエル"
# 「うーん、それも可愛いですが、少々物足りない気がしますね。先程の笑顔と比べると、残念ながら見劣りしてしまいます」
line = "「うーん、それも可愛いですが、少々物足りない気がしますね。先程の笑顔と比べると、残念ながら見劣りしてしまいます」"

[[dialogue]]
speaker = "フェニエル"
# 「わ、私はどうすればいい、でしょうかっ？」
line = "「わ、私はどうすればいい、でしょうかっ？」"

[[dialogue]]
speaker = "ナミエル"
# 「せっかく彼氏の人がいることですし、お２人の嬉し恥ずかしいエピソードを披露して頂きましょう」
line = "「せっかく彼氏の人がいることですし、お２人の嬉し恥ずかしいエピソードを披露して頂きましょう」"

[[dialogue]]
speaker = "ナミエル"
# 「フニさま、恋人同士になったお２人は、いったいどのように愛を語らっているのですか？」
line = "「フニさま、恋人同士になったお２人は、いったいどのように愛を語らっているのですか？」"

[[dialogue]]
speaker = "フェニエル"
# 「ええっ。あのっ、その……た、例えば……」
line = "「ええっ。あのっ、その……た、例えば……」"

[[dialogue]]
speaker = "フェニエル"
# 「２人きりの時はたまに……会長さんのこと、ご、ご主人様<emoji=heart04>　って呼ばせていただいたり、とか？」
line = "「２人きりの時はたまに……会長さんのこと、ご、ご主人様<emoji=heart04>　って呼ばせていただいたり、とか？」"

[[dialogue]]
speaker = "ナミエル"
# 「なぁぁっ！！！？」
line = "「なぁぁっ！！！？」"

[[dialogue]]
speaker = "フェニエル"
# 「あとは会長さんが、おでことか唇に、優しくキスをしてくれたり……」
line = "「あとは会長さんが、おでことか唇に、優しくキスをしてくれたり……」"

[[dialogue]]
speaker = "フェニエル"
# 「ほ、他にも……『フニは可愛いよ<emoji=heart04>』って言って、羽根を優しく撫でてくれたりですね……くすぐったいけど、それがとっても気持ちよくて……」
line = "「ほ、他にも……『フニは可愛いよ<emoji=heart04>』って言って、羽根を優しく撫でてくれたりですね……くすぐったいけど、それがとっても気持ちよくて……」"

[[dialogue]]
speaker = "ナミエル"
# （ぷしゅ～～～～っ）
line = "（ぷしゅ～～～～っ）"

[[dialogue]]
speaker = "フェニエル"
# 「あれ？　ナミエルちゃん？」
line = "「あれ？　ナミエルちゃん？」"

[[dialogue]]
speaker = "ナミエル"
# 「な、なんでもありません。フニさまのお言葉が想像以上の破壊力を秘めていただけです」
line = "「な、なんでもありません。フニさまのお言葉が想像以上の破壊力を秘めていただけです」"

[[dialogue]]
speaker = "ナミエル"
# （恥ずかしがり屋のフニさまが、まさかそこまでとは……う、羨まけしからんですね）
line = "（恥ずかしがり屋のフニさまが、まさかそこまでとは……う、羨まけしからんですね）"

[[dialogue]]
speaker = "フェニエル"
# 「他にも色々あるんですよ、会長さんとの仲良しエピソード。例えばですね……！」
line = "「他にも色々あるんですよ、会長さんとの仲良しエピソード。例えばですね……！」"

[[dialogue]]
speaker = "ナミエル"
# 「ストーーーップ！　もう十分ですっ、フニさま！」
line = "「ストーーーップ！　もう十分ですっ、フニさま！」"

[[dialogue]]
speaker = "unk"
# じゃあ俺からは……
line = "じゃあ俺からは……"

[[dialogue]]
speaker = "ナミエル"
# 「だから十分です！　２人がかりで私を卒倒させるつもりですか」
line = "「だから十分です！　２人がかりで私を卒倒させるつもりですか」"

[[dialogue]]
speaker = "ナミエル"
# 「まったく、想像以上にイチャついていますね。そういうことなら話は簡単です」
line = "「まったく、想像以上にイチャついていますね。そういうことなら話は簡単です」"

[[dialogue]]
speaker = "ナミエル"
# 「緋宮会長。フニさまの恋人のあなたに、撮影役を託します。フニさまの魅力を最大限に引き出して下さい」
line = "「緋宮会長。フニさまの恋人のあなたに、撮影役を託します。フニさまの魅力を最大限に引き出して下さい」"

[[dialogue]]
speaker = "フェニエル"
# 「か、会長さんが撮ってくれるんですか？」
line = "「か、会長さんが撮ってくれるんですか？」"

[[dialogue]]
speaker = "フェニエル"
# 「『フニ可愛いね』って、いつも褒めていただいてますけど……せっかく写真に残すなら、はいっ。私、もっと頑張りたいですっ<emoji=heart04>」
line = "「『フニ可愛いね』って、いつも褒めていただいてますけど……せっかく写真に残すなら、はいっ。私、もっと頑張りたいですっ<emoji=heart04>」"

[[dialogue]]
speaker = "ナミエル"
# 「……やはり私の見立て通りでしたね」
line = "「……やはり私の見立て通りでしたね」"

[[dialogue]]
speaker = "ナミエル"
# 「さあ、撮影再開です。フニさまの可愛さを撮り逃さないよう、お願いしますよ、緋宮会長！」
line = "「さあ、撮影再開です。フニさまの可愛さを撮り逃さないよう、お願いしますよ、緋宮会長！」"

[[dialogue]]
speaker = "unk"
# ――こうして、俺はフニの可愛い写真を撮りまくるのだった。
line = "――こうして、俺はフニの可愛い写真を撮りまくるのだった。"
