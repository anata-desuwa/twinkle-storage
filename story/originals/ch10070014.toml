[[dialogue]]
speaker = "unk"
# 第４話,やる時はやる子,P
line = "第４話,やる時はやる子,P"

[[dialogue]]
speaker = "ルリエル"
# 「うーん……柱……柱……全然思いつかないのですぅ……天界と人間界を繋ぐ存在って何なのですか？」
line = "「うーん……柱……柱……全然思いつかないのですぅ……天界と人間界を繋ぐ存在って何なのですか？」"

[[dialogue]]
speaker = "ルリエル"
# 「……観光大使？　へぇ～、そういうのもあるのですねぇ。でもフィリスティアに観光するところなんてありませんよぉ～？」
line = "「……観光大使？　へぇ～、そういうのもあるのですねぇ。でもフィリスティアに観光するところなんてありませんよぉ～？」"

[[dialogue]]
speaker = "ルリエル"
# 「わたしはどうすれば、じっちゃんばっちゃんの期待に応えられるのでしょうか……？」
line = "「わたしはどうすれば、じっちゃんばっちゃんの期待に応えられるのでしょうか……？」"

[[dialogue]]
speaker = "ルリエル"
# 「ハッ、もしかしてルリエルはダメな天使なんじゃないでしょうか……！？」
line = "「ハッ、もしかしてルリエルはダメな天使なんじゃないでしょうか……！？」"

[[dialogue]]
speaker = "ユウリ"
# 「ん？　ルリと新星の会長さんって、珍しい組み合わせだな」
line = "「ん？　ルリと新星の会長さんって、珍しい組み合わせだな」"

[[dialogue]]
speaker = "ルリエル"
# 「聞いてくださいよぉ、ユウリ先輩。かくかしかじかで」
line = "「聞いてくださいよぉ、ユウリ先輩。かくかしかじかで」"

[[dialogue]]
speaker = "ユウリ"
# 「ふーん」
line = "「ふーん」"

[[dialogue]]
speaker = "ルリエル"
# 「つれない反応！？　かわいい後輩の悩みですよ～」
line = "「つれない反応！？　かわいい後輩の悩みですよ～」"

[[dialogue]]
speaker = "ユウリ"
# 「自分でかわいいって言うな。つーか、そんなの今さらっていうか……別に悩むことじゃなくね？」
line = "「自分でかわいいって言うな。つーか、そんなの今さらっていうか……別に悩むことじゃなくね？」"

[[dialogue]]
speaker = "ルリエル"
# 「うぅ、冷たい……意外と親切で優しいと評判のユウリ先輩らしくないですよぉ」
line = "「うぅ、冷たい……意外と親切で優しいと評判のユウリ先輩らしくないですよぉ」"

[[dialogue]]
speaker = "ユウリ"
# 「どこで評判になってるんだよ。つか意外は余計だ。……あんたはどう思う？」
line = "「どこで評判になってるんだよ。つか意外は余計だ。……あんたはどう思う？」"

[[dialogue]]
speaker = "unk"
# ルリエルはダメな天使じゃない
line = "ルリエルはダメな天使じゃない"

[[dialogue]]
speaker = "ルリエル"
# 「ホントですか！？　ありがとうございますぅ～！」
line = "「ホントですか！？　ありがとうございますぅ～！」"

[[dialogue]]
speaker = "unk"
# ……と思う
line = "……と思う"

[[dialogue]]
speaker = "ルリエル"
# 「そこは断言してくださいよ～！？」
line = "「そこは断言してくださいよ～！？」"

[[dialogue]]
speaker = "ユウリ"
# 「新星の会長もなんか変なヤツだな……。でもな、ルリ――」
line = "「新星の会長もなんか変なヤツだな……。でもな、ルリ――」"

[[dialogue]]
speaker = "ユウリ"
# 「！　アステラ……しかも近いな。この話は後だ、行くぞ！」
line = "「！　アステラ……しかも近いな。この話は後だ、行くぞ！」"

[[dialogue]]
speaker = "ルリエル"
# 「いっきますよぉ……エールホルン！」
line = "「いっきますよぉ……エールホルン！」"

[[dialogue]]
speaker = "ルリエル"
# 「えへへっ、今度はちゃんとサポートするって言いましたからっ」
line = "「えへへっ、今度はちゃんとサポートするって言いましたからっ」"

[[dialogue]]
speaker = "ユウリ"
# 「チッ……そんなに強くはねえが、モンスターの数が多いな。キリがねえ」
line = "「チッ……そんなに強くはねえが、モンスターの数が多いな。キリがねえ」"

[[dialogue]]
speaker = "ルリエル"
# 「ではユウリ先輩は外のモンスターの掃討をお願いしますっ。わたしと会長さんでアステラを叩きます。行きましょう！」
line = "「ではユウリ先輩は外のモンスターの掃討をお願いしますっ。わたしと会長さんでアステラを叩きます。行きましょう！」"

[[dialogue]]
speaker = "ユウリ"
# 「あっ、おい！　……ま、ルリと新星の会長さんなら何とかなるか」
line = "「あっ、おい！　……ま、ルリと新星の会長さんなら何とかなるか」"

[[dialogue]]
speaker = "ユウリ"
# 「ま、後輩に任されたからには手は抜けねえな。いっちょ暴れてやるか！」
line = "「ま、後輩に任されたからには手は抜けねえな。いっちょ暴れてやるか！」"

[[dialogue]]
speaker = "ルリエル"
# 「アステラの中もモンスターがたくさんなのです。もう一度会長さんに加護を……」
line = "「アステラの中もモンスターがたくさんなのです。もう一度会長さんに加護を……」"

[[dialogue]]
speaker = "ルリエル"
# 「ふぇ……ふぇ……」
line = "「ふぇ……ふぇ……」"

[[dialogue]]
speaker = "ルリエル"
# 「セーフッ！　ギリギリでくしゃみしなかったのですよっ。それでは……エールホルン！」
line = "「セーフッ！　ギリギリでくしゃみしなかったのですよっ。それでは……エールホルン！」"

[[dialogue]]
speaker = "ルリエル"
# 「わたしもバシバシ攻撃しますっ。故郷で鍛えた肺活量と星力を見せる時なのですよっ」
line = "「わたしもバシバシ攻撃しますっ。故郷で鍛えた肺活量と星力を見せる時なのですよっ」"

[[dialogue]]
speaker = "ルリエル"
# 「でもやっぱり敵が多いですね……ルリエルと会長さんだけだと大変です……」
line = "「でもやっぱり敵が多いですね……ルリエルと会長さんだけだと大変です……」"

[[dialogue]]
speaker = "ルリエル"
# 「わわっ！？」
line = "「わわっ！？」"

[[dialogue]]
speaker = "ルリエル"
# 「会長さんっ！？　わたしをかばってくれたのですか！？」
line = "「会長さんっ！？　わたしをかばってくれたのですか！？」"

[[dialogue]]
speaker = "ルリエル"
# 「くっ……まだモンスターが残ってます……これはゼッタイゼツメイというやつなのでは！？」
line = "「くっ……まだモンスターが残ってます……これはゼッタイゼツメイというやつなのでは！？」"

[[dialogue]]
speaker = "ルリエル"
# 「こうなったら――」
line = "「こうなったら――」"

[[dialogue]]
speaker = "ルリエル"
# 「シンフォニックブラスター！」
line = "「シンフォニックブラスター！」"

[[dialogue]]
speaker = "unk"
# 角笛からビーム出た！？
line = "角笛からビーム出た！？"

[[dialogue]]
speaker = "ルリエル"
# 「ふぅ～、みっともないから使うなとじっちゃんばっちゃんに言われてたのですが、ピンチなので使っちゃいました」
line = "「ふぅ～、みっともないから使うなとじっちゃんばっちゃんに言われてたのですが、ピンチなので使っちゃいました」"

[[dialogue]]
speaker = "ルリエル"
# 「狙いを付けるのが難しいので、外したらどうしようかと思いましたが……今のでだいぶ倒せたみたいですね。このまま押し切っちゃいましょお～！」
line = "「狙いを付けるのが難しいので、外したらどうしようかと思いましたが……今のでだいぶ倒せたみたいですね。このまま押し切っちゃいましょお～！」"

[[dialogue]]
speaker = "ルリエル"
# 「ふぅ～、終わりました……。あっ、会長さん、さっきの大丈夫ですか？　……平気？　それなら良かったですぅ～」
line = "「ふぅ～、終わりました……。あっ、会長さん、さっきの大丈夫ですか？　……平気？　それなら良かったですぅ～」"

[[dialogue]]
speaker = "ルリエル"
# 「いえ～い、ルリエル大活躍でした！　これでじっちゃんばっちゃんに顔向けできますねっ」
line = "「いえ～い、ルリエル大活躍でした！　これでじっちゃんばっちゃんに顔向けできますねっ」"

[[dialogue]]
speaker = "ユウリ"
# 「よっ、そっちも終わったみたいだな」
line = "「よっ、そっちも終わったみたいだな」"

[[dialogue]]
speaker = "セーラ"
# 「あっれ～、援軍に来たんだけどもう終わった感じ？」
line = "「あっれ～、援軍に来たんだけどもう終わった感じ？」"

[[dialogue]]
speaker = "ルリエル"
# 「セーラ先輩、ユウリ先輩！」
line = "「セーラ先輩、ユウリ先輩！」"

[[dialogue]]
speaker = "ユウリ"
# 「新星の会長さんよ。うちのルリはどうだった？」
line = "「新星の会長さんよ。うちのルリはどうだった？」"

[[dialogue]]
speaker = "unk"
# 立派な星騎士だった
line = "立派な星騎士だった"

[[dialogue]]
speaker = "ルリエル"
# 「会長さん……！」
line = "「会長さん……！」"

[[dialogue]]
speaker = "ユウリ"
# 「だろ？　うちの星徒会に役立たずはいねーんだ」
line = "「だろ？　うちの星徒会に役立たずはいねーんだ」"

[[dialogue]]
speaker = "ルリエル"
# 「ユウリ先輩～っ！」
line = "「ユウリ先輩～っ！」"

[[dialogue]]
speaker = "セーラ"
# 「星力が強いのに制御に難があったり……」
line = "「星力が強いのに制御に難があったり……」"

[[dialogue]]
speaker = "ユウリ"
# 「時々どころかけっこうドジもしたりするが……」
line = "「時々どころかけっこうドジもしたりするが……」"

[[dialogue]]
speaker = "セーラ"
# 「立派な流星星徒会の一員だよっ♪」
line = "「立派な流星星徒会の一員だよっ♪」"

[[dialogue]]
speaker = "ルリエル"
# 「嬉しいですけど、ほめる時はもっと全力ほめてくださいよぉ～」
line = "「嬉しいですけど、ほめる時はもっと全力ほめてくださいよぉ～」"

[[dialogue]]
speaker = "セーラ"
# 「はははっ。ま、それはもっと立派になった時にね。……今日はお疲れさま、ルリちー」
line = "「はははっ。ま、それはもっと立派になった時にね。……今日はお疲れさま、ルリちー」"

[[dialogue]]
speaker = "ルリエル"
# 「はいっ、みなさんもお疲れ様でしたっ♪」
line = "「はいっ、みなさんもお疲れ様でしたっ♪」"

[[dialogue]]
speaker = "ルリエル"
# 「それと……さっきはかばってくれてありがとうございました、会長さん。あの時の会長さん、とってもかっこよかったのです！」
line = "「それと……さっきはかばってくれてありがとうございました、会長さん。あの時の会長さん、とってもかっこよかったのです！」"

[[dialogue]]
speaker = "ルリエル"
# 「会長さんには、これまでも助けてもらったり、一緒にお出かけしたりしました。だから……」
line = "「会長さんには、これまでも助けてもらったり、一緒にお出かけしたりしました。だから……」"

[[dialogue]]
speaker = "ルリエル"
# 「会長さん、大好きなのですっ♪」
line = "「会長さん、大好きなのですっ♪」"
