[[dialogue]]
speaker = "unk"
# サーシャさんと２人で、サチのところに駆けつける。
line = "サーシャさんと２人で、サチのところに駆けつける。"

[[dialogue]]
speaker = "サチ"
# 「お兄さ～ん！　こっちです～」
line = "「お兄さ～ん！　こっちです～」"

[[dialogue]]
speaker = "サチ"
# 「いつも協力ありがとうございます……って、あれ？　サーシャ先輩？」
line = "「いつも協力ありがとうございます……って、あれ？　サーシャ先輩？」"

[[dialogue]]
speaker = "サーシャ"
# 「サチちゃ～ん、こんにちは～。お姉ちゃんも手伝いに来ちゃった♪」
line = "「サチちゃ～ん、こんにちは～。お姉ちゃんも手伝いに来ちゃった♪」"

[[dialogue]]
speaker = "サチ"
# 「力を貸して頂けるんですか？　すごく助かります！」
line = "「力を貸して頂けるんですか？　すごく助かります！」"

[[dialogue]]
speaker = "unk"
# 彼女は『流星学園附属校』の生徒で、３年生の<ruby=しろつめ>白詰</ruby>サチ。
line = "彼女は『流星学園附属校』の生徒で、３年生の<ruby>白詰<rt>しろつめ</rt></ruby>サチ。"

[[dialogue]]
speaker = "unk"
# 現時点でも本校の星徒会メンバーに並ぶ程の実力を持つ星騎士であり、生まれながらの異能である『幸運体質』によって、彼女は附属校最強の『生徒会長』を務めている。
line = "現時点でも本校の星徒会メンバーに並ぶ程の実力を持つ星騎士であり、生まれながらの異能である『幸運体質』によって、彼女は附属校最強の『生徒会長』を務めている。"

[[dialogue]]
speaker = "unk"
# そして、周りには公にしていないが『魔法少女』として、ロストアイテムと呼ばれる存在の回収を行っている。
line = "そして、周りには公にしていないが『魔法少女』として、ロストアイテムと呼ばれる存在の回収を行っている。"

[[dialogue]]
speaker = "unk"
# サチ、いつの間にサーシャさんと
ロストアイテムの回収を……？
line = "サチ、いつの間にサーシャさんと
ロストアイテムの回収を……？"

[[dialogue]]
speaker = "サチ"
# 「そういえば、お兄さんにはそのことをまだ伝えていませんでしたね」
line = "「そういえば、お兄さんにはそのことをまだ伝えていませんでしたね」"

[[dialogue]]
speaker = "トレジアンナ"
# 「実は、サーシャさんがロストアイテム回収に協力したのは、私たちとじゃないんですよね～」
line = "「実は、サーシャさんがロストアイテム回収に協力したのは、私たちとじゃないんですよね～」"

[[dialogue]]
speaker = "unk"
# ふと、サチが頭に付けている四つ葉のクローバー型の髪留めが点滅して、そこから声が聞こえてくる。
line = "ふと、サチが頭に付けている四つ葉のクローバー型の髪留めが点滅して、そこから声が聞こえてくる。"

[[dialogue]]
speaker = "サーシャ"
# 「トレジアンナさん、こんにちは～♪」
line = "「トレジアンナさん、こんにちは～♪」"

[[dialogue]]
speaker = "トレジアンナ"
# 「はい♪　サーシャさん、こんにちはです～♪」
line = "「はい♪　サーシャさん、こんにちはです～♪」"

[[dialogue]]
speaker = "unk"
# 彼女は、喋るロストアイテムであるトレジアンナさん。正確には、ロストアイテムの中に封印されているという、本人曰く『先代の魔法少女』である。
line = "彼女は、喋るロストアイテムであるトレジアンナさん。正確には、ロストアイテムの中に封印されているという、本人曰く『先代の魔法少女』である。"

[[dialogue]]
speaker = "unk"
# それじゃあ、サーシャさんは誰と一緒に？
line = "それじゃあ、サーシャさんは誰と一緒に？"

[[dialogue]]
speaker = "プリムラ"
# 「おお！　待っていたぞ、我が眷族よ！　それに今日は、サーシャも一緒か！」
line = "「おお！　待っていたぞ、我が眷族よ！　それに今日は、サーシャも一緒か！」"

[[dialogue]]
speaker = "サーシャ"
# 「あっ、プリムラちゃ～ん！　そうなの～♪」
line = "「あっ、プリムラちゃ～ん！　そうなの～♪」"

[[dialogue]]
speaker = "プリムラ"
# 「って、わわっ！？　こら、貴様！　気安く我にハグするでない！　我は泣く子も黙る悪の終末兵器なのじゃぞ！？」
line = "「って、わわっ！？　こら、貴様！　気安く我にハグするでない！　我は泣く子も黙る悪の終末兵器なのじゃぞ！？」"

[[dialogue]]
speaker = "サーシャ"
# 「ふふっ、プリムラちゃん、今日もぷにぷにもちもち肌ね～♪　お姉ちゃん、ついついくっ付きたくなっちゃう♪」
line = "「ふふっ、プリムラちゃん、今日もぷにぷにもちもち肌ね～♪　お姉ちゃん、ついついくっ付きたくなっちゃう♪」"

[[dialogue]]
speaker = "プリムラ"
# 「なに？　貴様ァ……！」
line = "「なに？　貴様ァ……！」"

[[dialogue]]
speaker = "プリムラ"
# 「ふっ、ふふふっ♪　まぁ、我のボディは、賢者の石によって作られたスペシャルボディじゃからな♪」
line = "「ふっ、ふふふっ♪　まぁ、我のボディは、賢者の石によって作られたスペシャルボディじゃからな♪」"

[[dialogue]]
speaker = "プリムラ"
# 「そんじょそこらの柔らかクッションとは比べ物にならない程に魅力的なのは、当然のことなのじゃ！」
line = "「そんじょそこらの柔らかクッションとは比べ物にならない程に魅力的なのは、当然のことなのじゃ！」"

[[dialogue]]
speaker = "unk"
# 相変わらず、チョロい……！
line = "相変わらず、チョロい……！"

[[dialogue]]
speaker = "トレジアンナ"
# 「プリムラさん、褒められるのに弱いですからね～」
line = "「プリムラさん、褒められるのに弱いですからね～」"

[[dialogue]]
speaker = "プリムラ"
# 「はあ！？　何を言う、我は喜んでなどおらぬのじゃ！」
line = "「はあ！？　何を言う、我は喜んでなどおらぬのじゃ！」"

[[dialogue]]
speaker = "unk"
# ――彼女は、流星学園附属校２年のプリムラ。
line = "――彼女は、流星学園附属校２年のプリムラ。"

[[dialogue]]
speaker = "unk"
# 学園の登録上では魔族ということになっているが、その正体は『創造』のロストアイテム『賢者の石』を核として創られた、終末兵器である。
line = "学園の登録上では魔族ということになっているが、その正体は『創造』のロストアイテム『賢者の石』を核として創られた、終末兵器である。"

[[dialogue]]
speaker = "unk"
# １年以上前に何者かによって流星市国に投入されたが、サチがその場に居合わせたことで未然に制圧。
line = "１年以上前に何者かによって流星市国に投入されたが、サチがその場に居合わせたことで未然に制圧。"

[[dialogue]]
speaker = "unk"
# それから紆余曲折あり、現在はサチと共にロストアイテム回収を行っている。
line = "それから紆余曲折あり、現在はサチと共にロストアイテム回収を行っている。"

[[dialogue]]
speaker = "プリムラ"
# 「コホン！　……戯言はそこまでにして、じゃ！　今し方、その辺りを少し見回ってきたが、ロストアイテムの気配はかなり近くなっておるぞ」
line = "「コホン！　……戯言はそこまでにして、じゃ！　今し方、その辺りを少し見回ってきたが、ロストアイテムの気配はかなり近くなっておるぞ」"

[[dialogue]]
speaker = "サチ"
# 「って、見つけた！　あそこに！」
line = "「って、見つけた！　あそこに！」"

[[dialogue]]
speaker = "ロストアイテム"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "プリムラ"
# 「よし、行くぞサチ！」
line = "「よし、行くぞサチ！」"

[[dialogue]]
speaker = "サチ"
# 「うん！　プリムラ！」
line = "「うん！　プリムラ！」"

[[dialogue]]
speaker = "２人"
# 「変身！」
line = "「変身！」"

[[dialogue]]
speaker = "プリムラ"
# 「さあ、しかと見よ！　我は悪の終末兵器にして、いずれ世界を支配する者！　漆黒の魔法少女、プリムラ†ノワール！」
line = "「さあ、しかと見よ！　我は悪の終末兵器にして、いずれ世界を支配する者！　漆黒の魔法少女、プリムラ†ノワール！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「そして、キュートでマジカルトレジャーな我らが主役♪　幸運の魔法少女トレジャー☆サチ！」
line = "「そして、キュートでマジカルトレジャーな我らが主役♪　幸運の魔法少女トレジャー☆サチ！」"

[[dialogue]]
speaker = "サチ"
# 「だからっ、名乗りはいらないって毎回言ってるのに！　いいからロストアイテム回収、始めますよ！」
line = "「だからっ、名乗りはいらないって毎回言ってるのに！　いいからロストアイテム回収、始めますよ！」"

[[dialogue]]
speaker = "？？？"
# 「おっと、私も忘れてもらっちゃ困るわ！」
line = "「おっと、私も忘れてもらっちゃ困るわ！」"

[[dialogue]]
speaker = "unk"
# 声のした方を振り向くと、そこにいたのは――
line = "声のした方を振り向くと、そこにいたのは――"

[[dialogue]]
speaker = "サチ"
# 「シズハちゃん！」
line = "「シズハちゃん！」"

[[dialogue]]
speaker = "プリムラ"
# 「遅いぞ、シズハ！」
line = "「遅いぞ、シズハ！」"

[[dialogue]]
speaker = "シズハ"
# 「ごめんごめん♪　まだ学園の地理に慣れてなくて、場所がすぐにわからなくて～」
line = "「ごめんごめん♪　まだ学園の地理に慣れてなくて、場所がすぐにわからなくて～」"

[[dialogue]]
speaker = "unk"
# えっ……誰！？
line = "えっ……誰！？"

[[dialogue]]
speaker = "サーシャ"
# 「あら～♪　シズハ～！」
line = "「あら～♪　シズハ～！」"

[[dialogue]]
speaker = "シズハ"
# 「って、お姉ちゃん！？　もしかして、手伝いに来てくれたの？」
line = "「って、お姉ちゃん！？　もしかして、手伝いに来てくれたの？」"

[[dialogue]]
speaker = "サーシャ"
# 「ええ♪　サチちゃんからの連絡を聞いてね」
line = "「ええ♪　サチちゃんからの連絡を聞いてね」"

[[dialogue]]
speaker = "シズハ"
# 「わぁっ♪　嬉しい！　お姉ちゃんと一緒なら、私、百人力だよ～♪」
line = "「わぁっ♪　嬉しい！　お姉ちゃんと一緒なら、私、百人力だよ～♪」"

[[dialogue]]
speaker = "unk"
# サーシャさん、この子を知ってるんですか？
line = "サーシャさん、この子を知ってるんですか？"

[[dialogue]]
speaker = "サーシャ"
# 「ええ。ほら、前に話したことがあったでしょう？　私にはソフィのほかに、もう１人妹がいるって」
line = "「ええ。ほら、前に話したことがあったでしょう？　私にはソフィのほかに、もう１人妹がいるって」"

[[dialogue]]
speaker = "unk"
# えっ！？　もう１人の妹……？
line = "えっ！？　もう１人の妹……？"

[[dialogue]]
speaker = "unk"
# ――そんなの、聞いたことあったっけ……？
line = "――そんなの、聞いたことあったっけ……？"

[[dialogue]]
speaker = "シズハ"
# 「あっ！　新星学園の会長さんは初めましてだね♪　でも、まずは先に、ロストアイテムを回収しちゃわないと！」
line = "「あっ！　新星学園の会長さんは初めましてだね♪　でも、まずは先に、ロストアイテムを回収しちゃわないと！」"

[[dialogue]]
speaker = "シズハ"
# 「――変身！」
line = "「――変身！」"

[[dialogue]]
speaker = "シズハ"
# 「じゃ～ん！　魔法少女グレイル☆シズハ、ここに参上！」
line = "「じゃ～ん！　魔法少女グレイル☆シズハ、ここに参上！」"

[[dialogue]]
speaker = "unk"
# ３人目の魔法少女……！？
line = "３人目の魔法少女……！？"

[[dialogue]]
speaker = "シズハ"
# 「うん！　実はそうなんだ♪」
line = "「うん！　実はそうなんだ♪」"

[[dialogue]]
speaker = "シズハ"
# 「よ～し、張り切って頑張っちゃうよ～！　お姉ちゃんや会長さんに、カッコいいとこ見せちゃうんだから！」
line = "「よ～し、張り切って頑張っちゃうよ～！　お姉ちゃんや会長さんに、カッコいいとこ見せちゃうんだから！」"

[[dialogue]]
speaker = "ロストアイテム"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "シズハ"
# 「きゃっ！？　なんかロストアイテムが光って……！？」
line = "「きゃっ！？　なんかロストアイテムが光って……！？」"

[[dialogue]]
speaker = "シズハ"
# 「姿が消えた……！？　一体どこに……！？」
line = "「姿が消えた……！？　一体どこに……！？」"

[[dialogue]]
speaker = "プリムラ"
# 「ぐっ……！？」
line = "「ぐっ……！？」"

[[dialogue]]
speaker = "unk"
# ふと、プリムラの様子がおかしいことに気づく。何だか苦しげな顔をしていて――
line = "ふと、プリムラの様子がおかしいことに気づく。何だか苦しげな顔をしていて――"

[[dialogue]]
speaker = "プリムラ"
# 「か、体が急に熱く……！　な、なんじゃこれは……ロストアイテムの能力か……！？」
line = "「か、体が急に熱く……！　な、なんじゃこれは……ロストアイテムの能力か……！？」"

[[dialogue]]
speaker = "サチ"
# 「プリムラ、どうしたの……！？　大丈夫！？」
line = "「プリムラ、どうしたの……！？　大丈夫！？」"

[[dialogue]]
speaker = "プリムラ"
# 「だ、ダメじゃ……体が勝手に変形して……！　うっ……ぬああぁーーーっ！？」
line = "「だ、ダメじゃ……体が勝手に変形して……！　うっ……ぬああぁーーーっ！？」"

[[dialogue]]
speaker = "サチ"
# 「プリムラーー！？」
line = "「プリムラーー！？」"

[[dialogue]]
speaker = "unk"
# プリムラの体から眩い光が広がり、それが収まると――
line = "プリムラの体から眩い光が広がり、それが収まると――"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「こ、これは……！」
line = "「こ、これは……！」"

[[dialogue]]
speaker = "unk"
# プリムラの戦闘服が変化した……！？
line = "プリムラの戦闘服が変化した……！？"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「力が溢れて来る……まさか、封印されていた我の力が、引き出されているのか！？」
line = "「力が溢れて来る……まさか、封印されていた我の力が、引き出されているのか！？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「あのロストアイテム、私も知らない物でしたが……鍵の形状をしていましたね」
line = "「あのロストアイテム、私も知らない物でしたが……鍵の形状をしていましたね」"

[[dialogue]]
speaker = "トレジアンナ"
# 「封印を解く『解放』のロストアイテム、ということでしょうか……？」
line = "「封印を解く『解放』のロストアイテム、ということでしょうか……？」"

[[dialogue]]
speaker = "unk"
# こうして、ロストアイテムを巡る新たな騒動が、幕を開けるのだった――
line = "こうして、ロストアイテムを巡る新たな騒動が、幕を開けるのだった――"
