[[dialogue]]
speaker = "ヴィーナス"
# 「──話は聞かせてもらったわ！」
line = "「──話は聞かせてもらったわ！」"

[[dialogue]]
speaker = "ヘレナ"
# 「む──ヴィーナス？」
line = "「む──ヴィーナス？」"

[[dialogue]]
speaker = "閃"
# 「お、お嬢様」
line = "「お、お嬢様」"

[[dialogue]]
speaker = "ヘレナ"
# 「この時間はまだ学園にいると思っていたが……他の面々も合わせ、どうやら私のことを嗅ぎつけてきたようだな」
line = "「この時間はまだ学園にいると思っていたが……他の面々も合わせ、どうやら私のことを嗅ぎつけてきたようだな」"

[[dialogue]]
speaker = "ヴィーナス"
# 「インボーは全部聞いたわよ、ヘレナちゃん！　あの水着コンテストは新ブランドのＰＲにするつもりだったのね！」
line = "「インボーは全部聞いたわよ、ヘレナちゃん！　あの水着コンテストは新ブランドのＰＲにするつもりだったのね！」"

[[dialogue]]
speaker = "アナ"
# 「だからトリシャさんはあんな大胆な水着を……！」
line = "「だからトリシャさんはあんな大胆な水着を……！」"

[[dialogue]]
speaker = "トリシャ"
# 「ヘレナさんからあちらを着るよう頼まれました……可愛かったので、特に断る理由もなく……フフ、初水着にしては、大胆だったみたいです」
line = "「ヘレナさんからあちらを着るよう頼まれました……可愛かったので、特に断る理由もなく……フフ、初水着にしては、大胆だったみたいです」"

[[dialogue]]
speaker = "ヘレナ"
# 「何。もとより夏シーズンには水着を手掛けようと思っていたものでな、ちょうどタイミングが噛み合ったまで」
line = "「何。もとより夏シーズンには水着を手掛けようと思っていたものでな、ちょうどタイミングが噛み合ったまで」"

[[dialogue]]
speaker = "ヘレナ"
# 「私はあくまでリゾートに人を招きたいというリップルの気持ちに共感しただけだ」
line = "「私はあくまでリゾートに人を招きたいというリップルの気持ちに共感しただけだ」"

[[dialogue]]
speaker = "ヘレナ"
# 「それにイベントの運営資金はすべて私が出資している。何を後ろめたいことがある？」
line = "「それにイベントの運営資金はすべて私が出資している。何を後ろめたいことがある？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうかもしれないけど──リップルに本当の狙いを隠して進めるのは違うでしょ！」
line = "「そうかもしれないけど──リップルに本当の狙いを隠して進めるのは違うでしょ！」"

[[dialogue]]
speaker = "ヘレナ"
# 「それもそうか。なら次に会った際、伝えるとしよう」
line = "「それもそうか。なら次に会った際、伝えるとしよう」"

[[dialogue]]
speaker = "アナ"
# 「物わかりがよいのか悪いのか……」
line = "「物わかりがよいのか悪いのか……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それに、トリシャの優勝を仕組むのだってズルよ！　そういうの、マッチポンプって言うんだから！」
line = "「それに、トリシャの優勝を仕組むのだってズルよ！　そういうの、マッチポンプって言うんだから！」"

[[dialogue]]
speaker = "ヘレナ"
# 「結果までズルを働く気はない。審査は当日の観客たちに任せることにしている」
line = "「結果までズルを働く気はない。審査は当日の観客たちに任せることにしている」"

[[dialogue]]
speaker = "unk"
# そうなのか？
line = "そうなのか？"

[[dialogue]]
speaker = "トリシャ"
# 「はい……特にそのような話は、受けておりません。ただ、水着を着て、ステージに上がれば……友達の輪が広がるとお聞きしまして。にへへ」
line = "「はい……特にそのような話は、受けておりません。ただ、水着を着て、ステージに上がれば……友達の輪が広がるとお聞きしまして。にへへ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふーん。インチキする気はないってわけ」
line = "「ふーん。インチキする気はないってわけ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「じゃあ、もし私が出場して優勝したら、私が賞金ゲットってことね？」
line = "「じゃあ、もし私が出場して優勝したら、私が賞金ゲットってことね？」"

[[dialogue]]
speaker = "ヘレナ"
# 「ふふふ。果たしてヴィーナスがトリシャに敵うかな？」
line = "「ふふふ。果たしてヴィーナスがトリシャに敵うかな？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「むか！　そこまで言うなら出てやろうじゃないの！」
line = "「むか！　そこまで言うなら出てやろうじゃないの！」"

[[dialogue]]
speaker = "ヘレナ"
# 「よし。エントリーナンバー４番だ」
line = "「よし。エントリーナンバー４番だ」"

[[dialogue]]
speaker = "せつな"
# 「まんまと乗せられてるでござるよ、お嬢様」
line = "「まんまと乗せられてるでござるよ、お嬢様」"

[[dialogue]]
speaker = "unk"
# 他の子も出場するかも
line = "他の子も出場するかも"

[[dialogue]]
speaker = "unk"
# 審査が公平なら
line = "審査が公平なら"

[[dialogue]]
speaker = "ヘレナ"
# 「ふふふ……好きにするがよい」
line = "「ふふふ……好きにするがよい」"

[[dialogue]]
speaker = "ヘレナ"
# 「私の思惑を阻止したくば──トリシャを超える逸材を連れてくるのだな！」
line = "「私の思惑を阻止したくば──トリシャを超える逸材を連れてくるのだな！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「やってやろうじゃないの──！」
line = "「やってやろうじゃないの──！」"
