[[dialogue]]
speaker = "unk"
# 第１話,メスガキチョコレート,P
line = "第１話,メスガキチョコレート,P"

[[dialogue]]
speaker = "unk"
# 流星学園のバレンタインイベントが終わった。大聖堂でのチョコ配布は盛況そのもので、シャルレーヌの新衣装も可愛いらしかった──だが！
line = "流星学園のバレンタインイベントが終わった。大聖堂でのチョコ配布は盛況そのもので、シャルレーヌの新衣装も可愛いらしかった──だが！"

[[dialogue]]
speaker = "シャルレーヌ"
# 「それでは、そろそろ失礼いたします。会長さんもここ数日、大変お世話になりました♪」
line = "「それでは、そろそろ失礼いたします。会長さんもここ数日、大変お世話になりました♪」"

[[dialogue]]
speaker = "unk"
# （シャルレーヌからは貰えてない……！）
line = "（シャルレーヌからは貰えてない……！）"

[[dialogue]]
speaker = "unk"
# （他の子からはチョコを貰えたけど……）
line = "（他の子からはチョコを貰えたけど……）"

[[dialogue]]
speaker = "シャルレーヌ"
# 「くふふっ<emoji=heart04>　会長さん、どうかしました～？　何だか物欲しそうなお顔ですけれど～♪」
line = "「くふふっ<emoji=heart04>　会長さん、どうかしました～？　何だか物欲しそうなお顔ですけれど～♪」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「──何でもない？　そうですかぁ<emoji=heart04>　私の勘違いだったみたいです。ではでは、ごきげんよう～<emoji=heart04>」
line = "「──何でもない？　そうですかぁ<emoji=heart04>　私の勘違いだったみたいです。ではでは、ごきげんよう～<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# シャルレーヌは星騎士の中でも一番仲が良い女の子……正直、最もチョコレートを期待していた存在だった。
line = "シャルレーヌは星騎士の中でも一番仲が良い女の子……正直、最もチョコレートを期待していた存在だった。"

[[dialogue]]
speaker = "unk"
# 本命とは言わずとも、義理チョコくらい貰えると思ってたんだけど……がっかりだ……
line = "本命とは言わずとも、義理チョコくらい貰えると思ってたんだけど……がっかりだ……"

[[dialogue]]
speaker = "シャルレーヌ"
# 「くふふ～っ<emoji=heart04>　会長さんってば可愛い～っ<emoji=heart04>　チョコが欲しい、の一言が言えないとかぁ……もうちょっとだけ焦らしちゃおっと♪」
line = "「くふふ～っ<emoji=heart04>　会長さんってば可愛い～っ<emoji=heart04>　チョコが欲しい、の一言が言えないとかぁ……もうちょっとだけ焦らしちゃおっと♪」"

[[dialogue]]
speaker = "unk"
# シャルレーヌは猫かぶりな女の子――つまり周りの目を気にするタイプだ。大聖堂では人の目があったから、俺に渡せなかった可能性がある……！
line = "シャルレーヌは猫かぶりな女の子――つまり周りの目を気にするタイプだ。大聖堂では人の目があったから、俺に渡せなかった可能性がある……！"

[[dialogue]]
speaker = "unk"
# 星徒会室で仕事をしていよう。きっと渡しに来てくれるはずだ……！
line = "星徒会室で仕事をしていよう。きっと渡しに来てくれるはずだ……！"

[[dialogue]]
speaker = "シャルレーヌ"
# 「失礼しま～す♪　あれ、いらっしゃるのは会長さんだけですか？」
line = "「失礼しま～す♪　あれ、いらっしゃるのは会長さんだけですか？」"

[[dialogue]]
speaker = "unk"
# うん、俺だけ！　俺１人！
line = "うん、俺だけ！　俺１人！"

[[dialogue]]
speaker = "シャルレーヌ"
# 「くふふっ<emoji=heart04>　そんなに１人であることを強調しなくっても～。でもご在席でよかったです。お渡ししたいものがあったので……」
line = "「くふふっ<emoji=heart04>　そんなに１人であることを強調しなくっても～。でもご在席でよかったです。お渡ししたいものがあったので……」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「はい、こちら♪　ディアーブル家がバレンタインセールで売り出す、チョコレート付きの香水セット……４人分です♪」
line = "「はい、こちら♪　ディアーブル家がバレンタインセールで売り出す、チョコレート付きの香水セット……４人分です♪」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「うちの香水が、若い女性にどのような反響があるのか確かめたいので。役員の方々にお渡しいただけますか～♪」
line = "「うちの香水が、若い女性にどのような反響があるのか確かめたいので。役員の方々にお渡しいただけますか～♪」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「……あれあれ～？　なんだか曇ったお顔……もしかして私、気づかないうちに何か失礼をしてしまいましたか？」
line = "「……あれあれ～？　なんだか曇ったお顔……もしかして私、気づかないうちに何か失礼をしてしまいましたか？」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「まっっったく見当がつかないのですが……何か思うところがあるなら、お声に出してご指摘いただけます？」
line = "「まっっったく見当がつかないのですが……何か思うところがあるなら、お声に出してご指摘いただけます？」"

[[dialogue]]
speaker = "unk"
# （チョコをねだってたまるか……！）
line = "（チョコをねだってたまるか……！）"

[[dialogue]]
speaker = "unk"
# （お、俺にだってプライドがある……！）
line = "（お、俺にだってプライドがある……！）"

[[dialogue]]
speaker = "シャルレーヌ"
# 「何もないんですか？　……また勘違いだったみたいです♪　では、私の用件はすみましたので。失礼しますね♪」
line = "「何もないんですか？　……また勘違いだったみたいです♪　では、私の用件はすみましたので。失礼しますね♪」"

[[dialogue]]
speaker = "unk"
# ……帰ってしまった。ここはもうプライドを捨てて『チョコをください』と言うべきだろうか？
line = "……帰ってしまった。ここはもうプライドを捨てて『チョコをください』と言うべきだろうか？"

[[dialogue]]
speaker = "unk"
# いや──違う。そうじゃない！　シャルレーヌのことだ。きっと俺が情けなくチョコをくれと言う姿が見たいから、焦らしているんだ……！
line = "いや──違う。そうじゃない！　シャルレーヌのことだ。きっと俺が情けなくチョコをくれと言う姿が見たいから、焦らしているんだ……！"

[[dialogue]]
speaker = "unk"
# わからせられてたまるか……！
line = "わからせられてたまるか……！"

[[dialogue]]
speaker = "unk"
# デスクワークを片付けていると、ＤＩＳＣにメッセージが届いた──シャルレーヌからだ。
line = "デスクワークを片付けていると、ＤＩＳＣにメッセージが届いた──シャルレーヌからだ。"

[[dialogue]]
speaker = "unk"
# 『今度、春に売り出す香水カタログのリンクをお送りました。星徒会役員の方々にご周知いただけると嬉しいです♪』
line = "『今度、春に売り出す香水カタログのリンクをお送りました。星徒会役員の方々にご周知いただけると嬉しいです♪』"

[[dialogue]]
speaker = "unk"
# く、くそっ……負けないぞ……！
line = "く、くそっ……負けないぞ……！"

[[dialogue]]
speaker = "unk"
# 数時間後──今度は電話がかかってきた。
line = "数時間後──今度は電話がかかってきた。"

[[dialogue]]
speaker = "unk"
# は、はいっ！　もしもし！！
line = "は、はいっ！　もしもし！！"

[[dialogue]]
speaker = "シャルレーヌ"
# 「キャハ<emoji=heart04>　すみませ～ん。かけ間違えちゃいました～<emoji=heart04>」
line = "「キャハ<emoji=heart04>　すみませ～ん。かけ間違えちゃいました～<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 完全に遊ばれてる……もしかしなくても、これは勝ち目がないのでは……？
line = "完全に遊ばれてる……もしかしなくても、これは勝ち目がないのでは……？"

[[dialogue]]
speaker = "unk"
# あと５分で２月１５日になってしまう……もうプライドを気にしてる場合じゃない……
line = "あと５分で２月１５日になってしまう……もうプライドを気にしてる場合じゃない……"

[[dialogue]]
speaker = "unk"
# 恥をかいてもいいから、好きな女の子から１４日のうちにチョコを貰いたい……俺は観念して、シャルレーヌに電話をかけた。
line = "恥をかいてもいいから、好きな女の子から１４日のうちにチョコを貰いたい……俺は観念して、シャルレーヌに電話をかけた。"

[[dialogue]]
speaker = "シャルレーヌ"
# 「はぁい、もしも～しぃ<emoji=heart04>　こんな夜遅くにどうしました～？」
line = "「はぁい、もしも～しぃ<emoji=heart04>　こんな夜遅くにどうしました～？」"

[[dialogue]]
speaker = "unk"
# ……チョコをください
line = "……チョコをください"

[[dialogue]]
speaker = "シャルレーヌ"
# 「くふふふっ<emoji=heart04>　いきなりどうしたんですー？　会長さん、そんなに甘いもの好きでしたっけー？」
line = "「くふふふっ<emoji=heart04>　いきなりどうしたんですー？　会長さん、そんなに甘いもの好きでしたっけー？」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「義理チョコは大聖堂でたくさん貰ってたじゃないですか？　それを食べればいいのでは～？」
line = "「義理チョコは大聖堂でたくさん貰ってたじゃないですか？　それを食べればいいのでは～？」"

[[dialogue]]
speaker = "unk"
# シャルレーヌからのチョコが欲しい……
line = "シャルレーヌからのチョコが欲しい……"

[[dialogue]]
speaker = "unk"
# 他の子じゃダメなんです……
line = "他の子じゃダメなんです……"

[[dialogue]]
speaker = "シャルレーヌ"
# 「～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>　今の鳴き声、さいっこーでしたぁ♪　キャハハハハッ<emoji=heart04>」
line = "「～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>　今の鳴き声、さいっこーでしたぁ♪　キャハハハハッ<emoji=heart04>」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「そこまで言われたら仕方ないですねえ～……それではぁ～……<emoji=heart04>」
line = "「そこまで言われたら仕方ないですねえ～……それではぁ～……<emoji=heart04>」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「ハッピーバレンタインで～す、会長さん<emoji=heart04>」
line = "「ハッピーバレンタインで～す、会長さん<emoji=heart04>」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「わざわざ直接電話までしておねだりした、シャルレーヌの義理チョコですよ～<emoji=heart04>」
line = "「わざわざ直接電話までしておねだりした、シャルレーヌの義理チョコですよ～<emoji=heart04>」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「キャハハっ<emoji=heart04>　嬉しそ～な顔しちゃってぇ。大切に食べてくださいね～<emoji=heart04>」
line = "「キャハハっ<emoji=heart04>　嬉しそ～な顔しちゃってぇ。大切に食べてくださいね～<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 相変わらず俺をいじめるのが好きなシャルレーヌに焦らされたけれど、何とか好きな女の子からのチョコレートにありつくことができたのだった――
line = "相変わらず俺をいじめるのが好きなシャルレーヌに焦らされたけれど、何とか好きな女の子からのチョコレートにありつくことができたのだった――"
