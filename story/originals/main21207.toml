[[dialogue]]
speaker = "unk"
# 第７話,救世主の天使,B
line = "第７話,救世主の天使,B"

[[dialogue]]
speaker = "天使の少女"
# 「……うん。すりむいてる程度ね、よかった」
line = "「……うん。すりむいてる程度ね、よかった」"

[[dialogue]]
speaker = "チナ"
# 「あ、あの……え……？」
line = "「あ、あの……え……？」"

[[dialogue]]
speaker = "unk"
# あの凶悪なモンスターを倒したのは、自分とそう変わらない年齢の天使の少女。
line = "あの凶悪なモンスターを倒したのは、自分とそう変わらない年齢の天使の少女。"

[[dialogue]]
speaker = "unk"
# 純白を基調とした神々しいフォーム。幾本もの光の羽根が宙に浮かび、天使の少女を守るように周回している。
line = "純白を基調とした神々しいフォーム。幾本もの光の羽根が宙に浮かび、天使の少女を守るように周回している。"

[[dialogue]]
speaker = "チナ"
# 「おまえ……星騎士、なのか？」
line = "「おまえ……星騎士、なのか？」"

[[dialogue]]
speaker = "天使の少女"
# 「……ええ。安心して。怖かったでしょう。もう大丈夫よ」
line = "「……ええ。安心して。怖かったでしょう。もう大丈夫よ」"

[[dialogue]]
speaker = "unk"
# 信じられない。天使の少女は、星力を発現している。それだけでなく、セレスティアで変身してモンスターを倒していた。
line = "信じられない。天使の少女は、星力を発現している。それだけでなく、セレスティアで変身してモンスターを倒していた。"

[[dialogue]]
speaker = "チナ"
# 「あ、ありがとう……」
line = "「あ、ありがとう……」"

[[dialogue]]
speaker = "天使の少女"
# 「どういたしまして──あら？」
line = "「どういたしまして──あら？」"

[[dialogue]]
speaker = "魔族の少女"
# 「ルヴィネちゃん！　はぁっ、はぁっ……ようやく追いつけた……！　もう倒しちゃった！？」
line = "「ルヴィネちゃん！　はぁっ、はぁっ……ようやく追いつけた……！　もう倒しちゃった！？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「ええ。ベアトリスさん。そっちも終わったみたいね」
line = "「ええ。ベアトリスさん。そっちも終わったみたいね」"

[[dialogue]]
speaker = "ベアトリス"
# 「うん、何とかっ……」
line = "「うん、何とかっ……」"

[[dialogue]]
speaker = "チナ"
# 「う、うそ……？」
line = "「う、うそ……？」"

[[dialogue]]
speaker = "unk"
# 黒と赤に彩られた槍を持つ、またチナと歳の変わらない魔族の少女が現れた。
line = "黒と赤に彩られた槍を持つ、またチナと歳の変わらない魔族の少女が現れた。"

[[dialogue]]
speaker = "unk"
# この少女も星騎士なのか。ありえないものを見続けて、とうとうチナはぽかんと口を開けてしまう。
line = "この少女も星騎士なのか。ありえないものを見続けて、とうとうチナはぽかんと口を開けてしまう。"

[[dialogue]]
speaker = "ベアトリス"
# 「アステラもこわしたし、もう平気かな……今日はかえろっか？」
line = "「アステラもこわしたし、もう平気かな……今日はかえろっか？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「そうね。あなたもついてきて。大したもてなしもできないけれど、ここにいるよりは安全なはずだから」
line = "「そうね。あなたもついてきて。大したもてなしもできないけれど、ここにいるよりは安全なはずだから」"

[[dialogue]]
speaker = "unk"
# そうしてチナは、流星市国のシンボルだったファリス大聖堂へと連れていかれた。
line = "そうしてチナは、流星市国のシンボルだったファリス大聖堂へと連れていかれた。"

[[dialogue]]
speaker = "unk"
# 日曜日にお祈りに訪れていた、<ruby=せいひつ>静謐</ruby>かつ<ruby=そうごん>荘厳</ruby>な大聖堂は、見るも無残に半壊している。
line = "日曜日にお祈りに訪れていた、<ruby>静謐<rt>せいひつ</rt></ruby>かつ<ruby>荘厳<rt>そうごん</rt></ruby>な大聖堂は、見るも無残に半壊している。"

[[dialogue]]
speaker = "unk"
# そこには傷ついた一般市民が数十人、身を寄せ合っていた……
line = "そこには傷ついた一般市民が数十人、身を寄せ合っていた……"

[[dialogue]]
speaker = "ベアトリス"
# 「……ど、どうかな？　少しは落ち着いた？」
line = "「……ど、どうかな？　少しは落ち着いた？」"

[[dialogue]]
speaker = "チナ"
# 「……うん。ありがと……助けてくれて……」
line = "「……うん。ありがと……助けてくれて……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「気にしないで。困った時はお互い様と言うでしょう？」
line = "「気にしないで。困った時はお互い様と言うでしょう？」"

[[dialogue]]
speaker = "ベアトリス"
# 「でもよかった。ひどいケガもなくて……」
line = "「でもよかった。ひどいケガもなくて……」"

[[dialogue]]
speaker = "チナ"
# 「な、なあ。いま、どういう状況なんだ……？」
line = "「な、なあ。いま、どういう状況なんだ……？」"

[[dialogue]]
speaker = "チナ"
# 「アタシ、シェルターにずっといて……今日、外に出たらさ。星騎士の人たち、ぜんぜんいなくて……モンスターばっかり……」
line = "「アタシ、シェルターにずっといて……今日、外に出たらさ。星騎士の人たち、ぜんぜんいなくて……モンスターばっかり……」"

[[dialogue]]
speaker = "チナ"
# 「それにあの『仮面の女』は？　あいつ、ま、まだ生きてるのか……？」
line = "「それにあの『仮面の女』は？　あいつ、ま、まだ生きてるのか……？」"

[[dialogue]]
speaker = "unk"
# ──そして魔王クロトはどこに？
line = "──そして魔王クロトはどこに？"

[[dialogue]]
speaker = "unk"
# あのジェラルド・セイファートが魔界で散ったとのニュースが流星市国に入ってきたのは、少し前のこと。
line = "あのジェラルド・セイファートが魔界で散ったとのニュースが流星市国に入ってきたのは、少し前のこと。"

[[dialogue]]
speaker = "unk"
# それ以降、激化する人間界での戦闘を最前線で指揮していたのは、『魔王』を自称する緋宮クロトだった。
line = "それ以降、激化する人間界での戦闘を最前線で指揮していたのは、『魔王』を自称する緋宮クロトだった。"

[[dialogue]]
speaker = "unk"
# 彼は人類最後の希望だった。新星学園、最強の星騎士。彼が敗北すればリクリエが起こると、シェルターの中では幾度も噂されていた。
line = "彼は人類最後の希望だった。新星学園、最強の星騎士。彼が敗北すればリクリエが起こると、シェルターの中では幾度も噂されていた。"

[[dialogue]]
speaker = "ルヴィネ"
# 「『仮面の女』はもういない……私が倒したから」
line = "「『仮面の女』はもういない……私が倒したから」"

[[dialogue]]
speaker = "チナ"
# 「…………え？」
line = "「…………え？」"

[[dialogue]]
speaker = "unk"
# この女の子が『仮面の女』を──何かの悪い冗談か。チナは辺りを見回すが、魔族の少女も、傷ついた避難民もこぞって首を縦に振った。
line = "この女の子が『仮面の女』を──何かの悪い冗談か。チナは辺りを見回すが、魔族の少女も、傷ついた避難民もこぞって首を縦に振った。"

[[dialogue]]
speaker = "チナ"
# 「ほ、本当に……？　悪いやつ、もういないのか……？」
line = "「ほ、本当に……？　悪いやつ、もういないのか……？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「ええ。安心して。空を覆っていた流星群も、今はないでしょう？　それが証拠になればいいのだけど……」
line = "「ええ。安心して。空を覆っていた流星群も、今はないでしょう？　それが証拠になればいいのだけど……」"

[[dialogue]]
speaker = "チナ"
# 「う、うん……普通の空に、なってる……」
line = "「う、うん……普通の空に、なってる……」"

[[dialogue]]
speaker = "チナ"
# 「でもモンスターはまだ、消えてないよな……？」
line = "「でもモンスターはまだ、消えてないよな……？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「ええ。あの女と一緒に、アステラやモンスターも綺麗に消えればよかったのだけど……」
line = "「ええ。あの女と一緒に、アステラやモンスターも綺麗に消えればよかったのだけど……」"

[[dialogue]]
speaker = "ベアトリス"
# 「アステラは今でも生み出されちゃうみたいなの。だから私たち、戦ってるんだ」
line = "「アステラは今でも生み出されちゃうみたいなの。だから私たち、戦ってるんだ」"

[[dialogue]]
speaker = "チナ"
# 「戦うって……あ、あんたら、そうだよ。すごいんだな……アタシとそう変わんない歳で、もう星騎士なんだ……？」
line = "「戦うって……あ、あんたら、そうだよ。すごいんだな……アタシとそう変わんない歳で、もう星騎士なんだ……？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「正式なものではないのだけれどね」
line = "「正式なものではないのだけれどね」"

[[dialogue]]
speaker = "ベアトリス"
# 「あはは……私たちが使ってるセレスティア、その……借りものだから」
line = "「あはは……私たちが使ってるセレスティア、その……借りものだから」"

[[dialogue]]
speaker = "unk"
# ２人は守護星を得ているが、星騎士として変身するセレスティアは、道端で事切れていた星騎士のものを拝借しているらしい。
line = "２人は守護星を得ているが、星騎士として変身するセレスティアは、道端で事切れていた星騎士のものを拝借しているらしい。"

[[dialogue]]
speaker = "ベアトリス"
# 「あ……自己紹介、まだだったね。私はベアトリス・シェイド。魔界の吸血鬼だけど、血を飲まなくても平気だから。安心してね？」
line = "「あ……自己紹介、まだだったね。私はベアトリス・シェイド。魔界の吸血鬼だけど、血を飲まなくても平気だから。安心してね？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「ルヴィネよ。天界生まれの天使。これからよろしく──あなたは？」
line = "「ルヴィネよ。天界生まれの天使。これからよろしく──あなたは？」"

[[dialogue]]
speaker = "チナ"
# 「……チナ。香堂、チナ」
line = "「……チナ。香堂、チナ」"

[[dialogue]]
speaker = "unk"
# ようやくそれだけ絞り出したチナは──
line = "ようやくそれだけ絞り出したチナは──"

[[dialogue]]
speaker = "チナ"
# 「あ……！」
line = "「あ……！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「ふふ、大きな音」
line = "「ふふ、大きな音」"

[[dialogue]]
speaker = "チナ"
# 「う、うるさいなぁっ……！」
line = "「う、うるさいなぁっ……！」"

[[dialogue]]
speaker = "ベアトリス"
# 「ご飯にしよっか？　お腹いっぱいには、できないと思うけど……」
line = "「ご飯にしよっか？　お腹いっぱいには、できないと思うけど……」"

[[dialogue]]
speaker = "unk"
# その後、焚き火で温められた豆と肉の缶詰を、３人で分け合って食べた。
line = "その後、焚き火で温められた豆と肉の缶詰を、３人で分け合って食べた。"

[[dialogue]]
speaker = "unk"
# 詳しい自己紹介を交わしていくと、ルヴィネとベアトリスは同い年で、チナは２人よりも１歳年下であることがわかった。
line = "詳しい自己紹介を交わしていくと、ルヴィネとベアトリスは同い年で、チナは２人よりも１歳年下であることがわかった。"

[[dialogue]]
speaker = "unk"
# 他愛のない雑談を交わしながら、笑ってしまうくらいわずかな量の食事をとった。しかし、チナの心は満たされたのだった。
line = "他愛のない雑談を交わしながら、笑ってしまうくらいわずかな量の食事をとった。しかし、チナの心は満たされたのだった。"

[[dialogue]]
speaker = "チナ"
# 「なあ、アタシも救助活動、手伝うよ……！」
line = "「なあ、アタシも救助活動、手伝うよ……！」"

[[dialogue]]
speaker = "ベアトリス"
# 「本当！？　よかったぁ、わたしもルヴィネちゃんも、ついこのあいだ、人間界に来たばっかりで……」
line = "「本当！？　よかったぁ、わたしもルヴィネちゃんも、ついこのあいだ、人間界に来たばっかりで……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「ええ。避難民のシェルターがどこにあるのかも、食料品店や薬局の場所も、ほとんどわからないから、助かるわ」
line = "「ええ。避難民のシェルターがどこにあるのかも、食料品店や薬局の場所も、ほとんどわからないから、助かるわ」"

[[dialogue]]
speaker = "チナ"
# 「アタシ、流星市国のことならなんでも知ってるぞ！　まかせてくれよ！」
line = "「アタシ、流星市国のことならなんでも知ってるぞ！　まかせてくれよ！」"

[[dialogue]]
speaker = "unk"
# 両親から、緊急時の手ほどきは受けていた。
line = "両親から、緊急時の手ほどきは受けていた。"

[[dialogue]]
speaker = "unk"
# 市国中に分布しているシェルターの位置も、食料品を扱っている店の場所も、自動販売機が緊急時はお金を使わずに飲み物を出せることだって知っている。
line = "市国中に分布しているシェルターの位置も、食料品を扱っている店の場所も、自動販売機が緊急時はお金を使わずに飲み物を出せることだって知っている。"

[[dialogue]]
speaker = "チナ"
# （暗い顔、してちゃダメだ……）
line = "（暗い顔、してちゃダメだ……）"

[[dialogue]]
speaker = "チナ"
# （すぐに助けは来る。だって流星市国は、日本国内にあるんだ。明日にでも、水や食料を積んだ車がかけつけてくれる）
line = "（すぐに助けは来る。だって流星市国は、日本国内にあるんだ。明日にでも、水や食料を積んだ車がかけつけてくれる）"

[[dialogue]]
speaker = "チナ"
# （悪いやつはいなくなったんだ。このルヴィネって子が、本当に倒したのかは分かんないけど……でもたしかに流星群は止まってるし）
line = "（悪いやつはいなくなったんだ。このルヴィネって子が、本当に倒したのかは分かんないけど……でもたしかに流星群は止まってるし）"

[[dialogue]]
speaker = "チナ"
# （ってことは。もうすぐお父さんたちに会える。その時にベソかいてたら……）
line = "（ってことは。もうすぐお父さんたちに会える。その時にベソかいてたら……）"

[[dialogue]]
speaker = "unk"
# 両親にがっかりされてしまう。だからしっかりしよう。
line = "両親にがっかりされてしまう。だからしっかりしよう。"

[[dialogue]]
speaker = "unk"
# いつも宿題をさぼったり、朝寝坊をしたり、ワガママを言って困らせていたけれど……これからは心を入れ替える。
line = "いつも宿題をさぼったり、朝寝坊をしたり、ワガママを言って困らせていたけれど……これからは心を入れ替える。"

[[dialogue]]
speaker = "unk"
# もう二度と両親を困らせたりしない。お手伝いもたくさんする。誕生日に高いゲーム機を買って欲しいだなんて言わない。
line = "もう二度と両親を困らせたりしない。お手伝いもたくさんする。誕生日に高いゲーム機を買って欲しいだなんて言わない。"

[[dialogue]]
speaker = "unk"
# 晩御飯の前に肉まんを食べて、お腹がいっぱいだなんて絶対に言わない。苦手な勉強もたくさんする。友達とケンカもしない。いい子になるから。
line = "晩御飯の前に肉まんを食べて、お腹がいっぱいだなんて絶対に言わない。苦手な勉強もたくさんする。友達とケンカもしない。いい子になるから。"

[[dialogue]]
speaker = "unk"
# だから早く、大好きな両親に会いたい──
line = "だから早く、大好きな両親に会いたい──"

[[dialogue]]
speaker = "チナ"
# 「がんばろーぜ、２人とも！」
line = "「がんばろーぜ、２人とも！」"

[[dialogue]]
speaker = "unk"
# けれど──それから幾日が過ぎても、助けは来なかった。
line = "けれど──それから幾日が過ぎても、助けは来なかった。"
