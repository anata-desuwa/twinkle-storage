[[dialogue]]
speaker = "unk"
# 第２話,シャリオン魔界事情,P
line = "第２話,シャリオン魔界事情,P"

[[dialogue]]
speaker = "カティア"
# 「あ、おはようございます、魔王様」
line = "「あ、おはようございます、魔王様」"

[[dialogue]]
speaker = "カティア"
# 「授業の前に花壇のお花にお水をあげてるんです。このお花、昨日咲いたんですけど綺麗だと思いませんか？」
line = "「授業の前に花壇のお花にお水をあげてるんです。このお花、昨日咲いたんですけど綺麗だと思いませんか？」"

[[dialogue]]
speaker = "unk"
# うん、綺麗だ
line = "うん、綺麗だ"

[[dialogue]]
speaker = "カティア"
# 「ですよね～♪　ありがとうございます」
line = "「ですよね～♪　ありがとうございます」"

[[dialogue]]
speaker = "カティア"
# 「私は魔界のシャリオン地方の村の生まれなんですけど、それがも～何もなくてつまらない村で」
line = "「私は魔界のシャリオン地方の村の生まれなんですけど、それがも～何もなくてつまらない村で」"

[[dialogue]]
speaker = "カティア"
# 「うちは……というか村のほとんどは農家なんですけど、農作業の合間に畑の隅っこで花を育てるくらいしか楽しみがなかったんです」
line = "「うちは……というか村のほとんどは農家なんですけど、農作業の合間に畑の隅っこで花を育てるくらいしか楽しみがなかったんです」"

[[dialogue]]
speaker = "カティア"
# 「で、せっかく人間界に来たのでこっちでも花を育ててるんです。枯らしたりしたらかわいそうだから、人間界の植物も勉強したんですよ」
line = "「で、せっかく人間界に来たのでこっちでも花を育ててるんです。枯らしたりしたらかわいそうだから、人間界の植物も勉強したんですよ」"

[[dialogue]]
speaker = "unk"
# カティアは花が好きなんだな
line = "カティアは花が好きなんだな"

[[dialogue]]
speaker = "カティア"
# 「はい！　手塩にかけて育てた花が立派に咲いた時は最高ですよ！」
line = "「はい！　手塩にかけて育てた花が立派に咲いた時は最高ですよ！」"

[[dialogue]]
speaker = "カティア"
# （魔王様、いい人だな～……魔王なのに）
line = "（魔王様、いい人だな～……魔王なのに）"

[[dialogue]]
speaker = "カティア"
# （でも言えない……）
line = "（でも言えない……）"

[[dialogue]]
speaker = "カティア"
# （すごい星騎士になって故郷に錦を飾ってやろうと思って新星学園に入学したのに、プリマステラにもなれなくて……）
line = "（すごい星騎士になって故郷に錦を飾ってやろうと思って新星学園に入学したのに、プリマステラにもなれなくて……）"

[[dialogue]]
speaker = "カティア"
# （何の取柄もなくて、何にもなれないから、魔王様の配下になってビッグな魔族になろうと思ってた──とか）
line = "（何の取柄もなくて、何にもなれないから、魔王様の配下になってビッグな魔族になろうと思ってた──とか）"

[[dialogue]]
speaker = "unk"
# カティア？
line = "カティア？"

[[dialogue]]
speaker = "カティア"
# 「あ～っ、いえいえ、何でもないですよ。ちょっと考え事です……ワン」
line = "「あ～っ、いえいえ、何でもないですよ。ちょっと考え事です……ワン」"

[[dialogue]]
speaker = "カティア"
# 「え？　シャルレーヌ……様のことですか。そうです、あの人もシャリオン地方のご出身です」
line = "「え？　シャルレーヌ……様のことですか。そうです、あの人もシャリオン地方のご出身です」"

[[dialogue]]
speaker = "カティア"
# 「ディアーブル家は、貴族の中でも最も有力なシャリオン十貴族の一氏。十貴族はシャリオンでは絶対。神のような存在です」
line = "「ディアーブル家は、貴族の中でも最も有力なシャリオン十貴族の一氏。十貴族はシャリオンでは絶対。神のような存在です」"

[[dialogue]]
speaker = "カティア"
# 「うちはディアーブル領じゃないですが、それでもヒラの農民からするとすごく畏れ多いお方です……」
line = "「うちはディアーブル領じゃないですが、それでもヒラの農民からするとすごく畏れ多いお方です……」"

[[dialogue]]
speaker = "カティア"
# 「しかも附属の１年なのにもうプリマステラになってて……私は新星学園でもプリマステラになれてないのに……どうしてこんなに差があるんですか～！」
line = "「しかも附属の１年なのにもうプリマステラになってて……私は新星学園でもプリマステラになれてないのに……どうしてこんなに差があるんですか～！」"

[[dialogue]]
speaker = "unk"
# 魔王の配下ならシャルレーヌはダメなのか？
line = "魔王の配下ならシャルレーヌはダメなのか？"

[[dialogue]]
speaker = "カティア"
# 「いえいえ、ディアーブルは偽魔王だって地元でも有名ですよ。強くて偉いから誰も文句言わないだけで」
line = "「いえいえ、ディアーブルは偽魔王だって地元でも有名ですよ。強くて偉いから誰も文句言わないだけで」"

[[dialogue]]
speaker = "カティア"
# 「しかもいつも香水してるし。犬の魔族は嗅覚が鋭いからクラクラしそうになるんですよ」
line = "「しかもいつも香水してるし。犬の魔族は嗅覚が鋭いからクラクラしそうになるんですよ」"

[[dialogue]]
speaker = "カティア"
# 「んん！？　この匂いは──」
line = "「んん！？　この匂いは──」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「おはようございます、会長さん」
line = "「おはようございます、会長さん」"

[[dialogue]]
speaker = "カティア"
# 「ひぃっ！？」
line = "「ひぃっ！？」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「あら、そちらは……もしかして私と同郷の方でしょうか。雰囲気でわかります。お名前を伺っても？」
line = "「あら、そちらは……もしかして私と同郷の方でしょうか。雰囲気でわかります。お名前を伺っても？」"

[[dialogue]]
speaker = "カティア"
# 「えと……カティア・セルベラス、です……シャルレーヌ様」
line = "「えと……カティア・セルベラス、です……シャルレーヌ様」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「カティア先輩ですね。よろしくお願いします」
line = "「カティア先輩ですね。よろしくお願いします」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「そんなに緊張されなくてもよろしいですよ。シャリオンの貴族とはいえ、今は星騎士の先輩後輩。様付けなんて必要ありません」
line = "「そんなに緊張されなくてもよろしいですよ。シャリオンの貴族とはいえ、今は星騎士の先輩後輩。様付けなんて必要ありません」"

[[dialogue]]
speaker = "カティア"
# （もしかしてシャルレーヌ様っていい人！？　いやでも裏があるんじゃ……）
line = "（もしかしてシャルレーヌ様っていい人！？　いやでも裏があるんじゃ……）"

[[dialogue]]
speaker = "シャルレーヌ"
# 「ここの花壇の世話をされていたのはカティア先輩だったんですね。いいことを知りました♪」
line = "「ここの花壇の世話をされていたのはカティア先輩だったんですね。いいことを知りました♪」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「どうでしょう。カティア先輩さえ良ければ、新星学園を卒業したらディアーブル領で暮らしませんか？」
line = "「どうでしょう。カティア先輩さえ良ければ、新星学園を卒業したらディアーブル領で暮らしませんか？」"

[[dialogue]]
speaker = "カティア"
# 「はい？」
line = "「はい？」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「ディアーブル家が香水を取り扱っているのはご存じかと思います。そして香水を作るには原料の植物が欠かせません」
line = "「ディアーブル家が香水を取り扱っているのはご存じかと思います。そして香水を作るには原料の植物が欠かせません」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「拝見したところ、カティア先輩は植物を育てるのがお上手のようです。それに嗅覚も鋭いので匂いを嗅ぎ分けることも得意でしょう」
line = "「拝見したところ、カティア先輩は植物を育てるのがお上手のようです。それに嗅覚も鋭いので匂いを嗅ぎ分けることも得意でしょう」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「つまり、香水の原料である植物を育てる才能があるということです」
line = "「つまり、香水の原料である植物を育てる才能があるということです」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「香水はディアーブルの富の源泉。貢献する者には相応の褒美を与えます。きっとご実家よりずっと良い暮らしができるはずです」
line = "「香水はディアーブルの富の源泉。貢献する者には相応の褒美を与えます。きっとご実家よりずっと良い暮らしができるはずです」"

[[dialogue]]
speaker = "カティア"
# 「ええぇ～っ！？　本気──ですか！？」
line = "「ええぇ～っ！？　本気──ですか！？」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「ええ、商談で冗談など言いません」
line = "「ええ、商談で冗談など言いません」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「もちろん指定の植物を育てていただきますが、希望があれば好きな植物の研究をしてもらってかまいません。悪いようにはしませんよ」
line = "「もちろん指定の植物を育てていただきますが、希望があれば好きな植物の研究をしてもらってかまいません。悪いようにはしませんよ」"

[[dialogue]]
speaker = "カティア"
# 「これってけっこう……いやかなりいい条件なんじゃ……」
line = "「これってけっこう……いやかなりいい条件なんじゃ……」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「ただし──」
line = "「ただし──」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「ディアーブルの香水のレシピは秘中の秘。もし外に持ち出そうとしたら──容赦はしませんよ？」
line = "「ディアーブルの香水のレシピは秘中の秘。もし外に持ち出そうとしたら──容赦はしませんよ？」"

[[dialogue]]
speaker = "カティア"
# 「ひぃぃっ！？」
line = "「ひぃぃっ！？」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「どうします？」
line = "「どうします？」"

[[dialogue]]
speaker = "カティア"
# 「その、家族に相談したいというか、ええっと……」
line = "「その、家族に相談したいというか、ええっと……」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「十貴族のお誘い、断るんですか？」
line = "「十貴族のお誘い、断るんですか？」"

[[dialogue]]
speaker = "カティア"
# 「あ……あ……あの、えっと……」
line = "「あ……あ……あの、えっと……」"

[[dialogue]]
speaker = "unk"
# カティアは俺のしもべだ
line = "カティアは俺のしもべだ"

[[dialogue]]
speaker = "カティア"
# 「魔王様……！」
line = "「魔王様……！」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「……それは失礼しました。なるほど、本物の魔王のしもべとあらば、軽々に引き抜くわけにはいきませんね」
line = "「……それは失礼しました。なるほど、本物の魔王のしもべとあらば、軽々に引き抜くわけにはいきませんね」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「それに流星市国で身分を持ち出すのはナンセンスでした。今は星騎士の先輩後輩だと言ったばかりですのに」
line = "「それに流星市国で身分を持ち出すのはナンセンスでした。今は星騎士の先輩後輩だと言ったばかりですのに」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「ゆっくり考えてくださいね、カティア先輩。よいお返事をお待ちしていますよ」
line = "「ゆっくり考えてくださいね、カティア先輩。よいお返事をお待ちしていますよ」"

[[dialogue]]
speaker = "カティア"
# 「魔王様～！」
line = "「魔王様～！」"

[[dialogue]]
speaker = "unk"
# （頭を撫でる）
line = "（頭を撫でる）"

[[dialogue]]
speaker = "カティア"
# 「あ……頭撫でてくれるとほっとする……」
line = "「あ……頭撫でてくれるとほっとする……」"

[[dialogue]]
speaker = "カティア"
# 「えへへへ……やっぱり私のご主人は魔王様ですワン♪」
line = "「えへへへ……やっぱり私のご主人は魔王様ですワン♪」"
