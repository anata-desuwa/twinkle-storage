[[dialogue]]
speaker = "unk"
# 第８話,大いなる福,B
line = "第８話,大いなる福,B"

[[dialogue]]
speaker = "アナ"
# 「この後は特に用事はないです。和菓子を買いに行くのが、最も大切な用件でしたから」
line = "「この後は特に用事はないです。和菓子を買いに行くのが、最も大切な用件でしたから」"

[[dialogue]]
speaker = "マトイ"
# 「それならここで、大福、一緒に食べない？」
line = "「それならここで、大福、一緒に食べない？」"

[[dialogue]]
speaker = "アナ"
# 「それは……一刻も早く食べたいですが……！　星徒会役員が、買い食いをしてもいいのでしょうか……？」
line = "「それは……一刻も早く食べたいですが……！　星徒会役員が、買い食いをしてもいいのでしょうか……？」"

[[dialogue]]
speaker = "マトイ"
# 「お行儀悪いけど、２人だけの秘密ってことで、ね」
line = "「お行儀悪いけど、２人だけの秘密ってことで、ね」"

[[dialogue]]
speaker = "アナ"
# 「そうですね。絶対に秘密です、ふふ。いけないことをするのはドキドキします」
line = "「そうですね。絶対に秘密です、ふふ。いけないことをするのはドキドキします」"

[[dialogue]]
speaker = "マトイ"
# 「そこのベンチが空いてるかな。よいっしょ──」
line = "「そこのベンチが空いてるかな。よいっしょ──」"

[[dialogue]]
speaker = "アナ"
# 「待ってください、マトイ先輩」
line = "「待ってください、マトイ先輩」"

[[dialogue]]
speaker = "マトイ"
# 「えっ、なに？」
line = "「えっ、なに？」"

[[dialogue]]
speaker = "アナ"
# 「ヤマトシジミの幼虫がいます。お尻で潰したら大変ですよ」
line = "「ヤマトシジミの幼虫がいます。お尻で潰したら大変ですよ」"

[[dialogue]]
speaker = "マトイ"
# 「ヤマトシジミ……？　ひゃっ、あ、青虫！？」
line = "「ヤマトシジミ……？　ひゃっ、あ、青虫！？」"

[[dialogue]]
speaker = "マトイ"
# 「危なかったぁ。アナちゃんが止めてくれなかったら、お尻でプチっと押し虫を作っちゃうところだったよ」
line = "「危なかったぁ。アナちゃんが止めてくれなかったら、お尻でプチっと押し虫を作っちゃうところだったよ」"

[[dialogue]]
speaker = "アナ"
# 「ヤマトシジミは、春先に現れる蝶です。小さくて可愛いです」
line = "「ヤマトシジミは、春先に現れる蝶です。小さくて可愛いです」"

[[dialogue]]
speaker = "マトイ"
# 「そうなんだ。アナちゃん、虫に詳しいんだね？」
line = "「そうなんだ。アナちゃん、虫に詳しいんだね？」"

[[dialogue]]
speaker = "アナ"
# 「そうですね。虫や魚といった生き物は好きです。何を考えているかわからない虚ろな目がラブリーです」
line = "「そうですね。虫や魚といった生き物は好きです。何を考えているかわからない虚ろな目がラブリーです」"

[[dialogue]]
speaker = "マトイ"
# 「そ、そう、なんだ？」
line = "「そ、そう、なんだ？」"

[[dialogue]]
speaker = "マトイ"
# （『かわいい』のツボは人それぞれだから、異議を唱えるのは野暮だよね）
line = "（『かわいい』のツボは人それぞれだから、異議を唱えるのは野暮だよね）"

[[dialogue]]
speaker = "アナ"
# 「避けて座りましょう」
line = "「避けて座りましょう」"

[[dialogue]]
speaker = "マトイ"
# 「うん。ここなら大丈夫だね。よいしょっと……」
line = "「うん。ここなら大丈夫だね。よいしょっと……」"

[[dialogue]]
speaker = "マトイ"
# 「それじゃ、いただきまーす。あむっ」
line = "「それじゃ、いただきまーす。あむっ」"

[[dialogue]]
speaker = "アナ"
# 「いただきます。あむっ」
line = "「いただきます。あむっ」"

[[dialogue]]
speaker = "マトイ＆アナ"
# 「んーーーっ！　美味しーーっ！！」
line = "「んーーーっ！　美味しーーっ！！」"

[[dialogue]]
speaker = "アナ"
# 「はぁぁ……デリシャスです……至福の時です……星徒会室で食べるお菓子ともまた違った味わいです」
line = "「はぁぁ……デリシャスです……至福の時です……星徒会室で食べるお菓子ともまた違った味わいです」"

[[dialogue]]
speaker = "マトイ"
# 「こうやって外で食べるから、また美味しかったりするんだよね」
line = "「こうやって外で食べるから、また美味しかったりするんだよね」"

[[dialogue]]
speaker = "アナ"
# 「誘ってくださってありがとうございます、マトイ先輩。おかげで新たな発見ができました」
line = "「誘ってくださってありがとうございます、マトイ先輩。おかげで新たな発見ができました」"

[[dialogue]]
speaker = "マトイ"
# 「どういたしまして。私がアナちゃんとお話したかっただけなんだけどね」
line = "「どういたしまして。私がアナちゃんとお話したかっただけなんだけどね」"

[[dialogue]]
speaker = "アナ"
# 「私とですか」
line = "「私とですか」"

[[dialogue]]
speaker = "マトイ"
# 「うん。アナちゃんと仲良くなりたいと思って」
line = "「うん。アナちゃんと仲良くなりたいと思って」"

[[dialogue]]
speaker = "アナ"
# 「おお……私もマトイ先輩と仲良くなりたいです」
line = "「おお……私もマトイ先輩と仲良くなりたいです」"

[[dialogue]]
speaker = "マトイ"
# 「アナちゃんはどうして星騎士になったの？」
line = "「アナちゃんはどうして星騎士になったの？」"

[[dialogue]]
speaker = "アナ"
# 「見聞を広げるためですね。まだ見たことのない世界を知りたいのです」
line = "「見聞を広げるためですね。まだ見たことのない世界を知りたいのです」"

[[dialogue]]
speaker = "マトイ"
# 「アナちゃん、物知りで頭良いのに……」
line = "「アナちゃん、物知りで頭良いのに……」"

[[dialogue]]
speaker = "アナ"
# 「いえ。まだまだ知らないことだらけです。直に見る経験は何物にも代えがたい。こうして、口に入れなければ……」
line = "「いえ。まだまだ知らないことだらけです。直に見る経験は何物にも代えがたい。こうして、口に入れなければ……」"

[[dialogue]]
speaker = "アナ"
# 「むぐ、もぐ……和菓子の美味しさを知ることも、気付くこともなかったのですから」
line = "「むぐ、もぐ……和菓子の美味しさを知ることも、気付くこともなかったのですから」"

[[dialogue]]
speaker = "アナ"
# 「はあああ……しあわせです……」
line = "「はあああ……しあわせです……」"

[[dialogue]]
speaker = "アナ"
# 「逆にお尋ねしますが、マトイ先輩は何故星騎士に？」
line = "「逆にお尋ねしますが、マトイ先輩は何故星騎士に？」"

[[dialogue]]
speaker = "マトイ"
# 「私？　私は……せっかく星力を持ってるんだったら、何かに活かせないかな、って……」
line = "「私？　私は……せっかく星力を持ってるんだったら、何かに活かせないかな、って……」"

[[dialogue]]
speaker = "マトイ"
# 「まあでも、それほど強い意思があったわけでもなくて、お父さんとお母さんに勧められるまま附属校に入った感じ」
line = "「まあでも、それほど強い意思があったわけでもなくて、お父さんとお母さんに勧められるまま附属校に入った感じ」"

[[dialogue]]
speaker = "マトイ"
# 「でも、入ったからには頑張らなきゃ！　って。クラスのみんなに置いて行かれないよう、鍛錬を重ねてきたの」
line = "「でも、入ったからには頑張らなきゃ！　って。クラスのみんなに置いて行かれないよう、鍛錬を重ねてきたの」"

[[dialogue]]
speaker = "アナ"
# 「おぉ……そうだったのですね」
line = "「おぉ……そうだったのですね」"

[[dialogue]]
speaker = "マトイ"
# 「もちろん私の力で、そんな大層なことが出来るなんて考えたりしてないよ？」
line = "「もちろん私の力で、そんな大層なことが出来るなんて考えたりしてないよ？」"

[[dialogue]]
speaker = "マトイ"
# 「誰よりも強くなってやるー！　とか、私が救世主になる！　とか、そういう大それた気持ちは無いんだ」
line = "「誰よりも強くなってやるー！　とか、私が救世主になる！　とか、そういう大それた気持ちは無いんだ」"

[[dialogue]]
speaker = "マトイ"
# 「ただ、家族とか、友達とか、目の前にいて、手が届く人くらいは守れるようになりたいって……」
line = "「ただ、家族とか、友達とか、目の前にいて、手が届く人くらいは守れるようになりたいって……」"

[[dialogue]]
speaker = "マトイ"
# 「そんな感じの誰もが考えるような普通の気持ちで、ここまでやってきただけ。アナちゃんみたいに明確な理由はないんだ」
line = "「そんな感じの誰もが考えるような普通の気持ちで、ここまでやってきただけ。アナちゃんみたいに明確な理由はないんだ」"

[[dialogue]]
speaker = "マトイ"
# 「ごめんね、あまり面白くなくて」
line = "「ごめんね、あまり面白くなくて」"

[[dialogue]]
speaker = "アナ"
# 「とんでもないです。非常に興味深いお話でした」
line = "「とんでもないです。非常に興味深いお話でした」"

[[dialogue]]
speaker = "マトイ"
# 「そう？」
line = "「そう？」"

[[dialogue]]
speaker = "アナ"
# 「マトイ先輩は、大それた気持ちを抱かぬまま、今に至っている」
line = "「マトイ先輩は、大それた気持ちを抱かぬまま、今に至っている」"

[[dialogue]]
speaker = "マトイ"
# 「うん。それは今もあんまり変わってないかな。会長たちについていくだけで精一杯で……」
line = "「うん。それは今もあんまり変わってないかな。会長たちについていくだけで精一杯で……」"

[[dialogue]]
speaker = "アナ"
# 「でしたら、それは偉業です」
line = "「でしたら、それは偉業です」"

[[dialogue]]
speaker = "マトイ"
# 「え？」
line = "「え？」"

[[dialogue]]
speaker = "アナ"
# 「マトイ先輩は誰もが抱く普通の想いで、新星学園の生徒なら誰もが憧れる星徒会役員の座に昇り詰めたんです」
line = "「マトイ先輩は誰もが抱く普通の想いで、新星学園の生徒なら誰もが憧れる星徒会役員の座に昇り詰めたんです」"

[[dialogue]]
speaker = "アナ"
# 「それこそがマトイ先輩の凄さです。誰にでもできることではありません」
line = "「それこそがマトイ先輩の凄さです。誰にでもできることではありません」"

[[dialogue]]
speaker = "マトイ"
# 「たまたまだよ！　たまたま運が良かっただけ！」
line = "「たまたまだよ！　たまたま運が良かっただけ！」"

[[dialogue]]
speaker = "アナ"
# 「『幸運』は、誰もが羨む才能ではないでしょうか」
line = "「『幸運』は、誰もが羨む才能ではないでしょうか」"

[[dialogue]]
speaker = "アナ"
# 「マトイ先輩には大いなる福が宿っているのですね。はむっ」
line = "「マトイ先輩には大いなる福が宿っているのですね。はむっ」"

[[dialogue]]
speaker = "マトイ"
# 「そうだと嬉しいね。はむっ」
line = "「そうだと嬉しいね。はむっ」"

[[dialogue]]
speaker = "アナ"
# 「んもむ？　なんれひょう？」
line = "「んもむ？　なんれひょう？」"

[[dialogue]]
speaker = "マトイ"
# 「アステラ発生のアラームらよ！　もぐもぐごくん……場所は――」
line = "「アステラ発生のアラームらよ！　もぐもぐごくん……場所は――」"

[[dialogue]]
speaker = "マトイ"
# 「――すぐそこ！」
line = "「――すぐそこ！」"

[[dialogue]]
speaker = "アナ"
# 「行きまひょう、マトイ先輩。もぐもぐごっくん」
line = "「行きまひょう、マトイ先輩。もぐもぐごっくん」"

[[dialogue]]
speaker = "アナ"
# 「これが、アステラですか」
line = "「これが、アステラですか」"

[[dialogue]]
speaker = "マトイ"
# 「アナちゃんは初めてだっけ」
line = "「アナちゃんは初めてだっけ」"

[[dialogue]]
speaker = "アナ"
# 「はい、こうして実物を目にするのも初めてです。マトイ先輩は──」
line = "「はい、こうして実物を目にするのも初めてです。マトイ先輩は──」"

[[dialogue]]
speaker = "マトイ"
# 「あはは、実は私もまだ２回目なんだよね。前回はヴィーナス会長とサーシャさんがいてくれたけど、今回は……」
line = "「あはは、実は私もまだ２回目なんだよね。前回はヴィーナス会長とサーシャさんがいてくれたけど、今回は……」"

[[dialogue]]
speaker = "サーシャ"
# 『マトイちゃ～ん、アステラ発生よ～』
line = "『マトイちゃ～ん、アステラ発生よ～』"

[[dialogue]]
speaker = "マトイ"
# 「サーシャさん！　アナちゃんも一緒です！」
line = "「サーシャさん！　アナちゃんも一緒です！」"

[[dialogue]]
speaker = "サーシャ"
# 『あらあら、２人は仲良しさんなのね、うふふ』
line = "『あらあら、２人は仲良しさんなのね、うふふ』"

[[dialogue]]
speaker = "マトイ"
# 「たまたま街中で会いまして……それはともかく」
line = "「たまたま街中で会いまして……それはともかく」"

[[dialogue]]
speaker = "マトイ"
# 「これからアナちゃんと共に、アステラに対応しようとしていたところです」
line = "「これからアナちゃんと共に、アステラに対応しようとしていたところです」"

[[dialogue]]
speaker = "サーシャ"
# 『まあ……！』
line = "『まあ……！』"

[[dialogue]]
speaker = "マトイ"
# 「ですが、私たち２人で対応して、大丈夫でしょうか？　私はまだ経験が浅く、アナちゃんも初めてで……」
line = "「ですが、私たち２人で対応して、大丈夫でしょうか？　私はまだ経験が浅く、アナちゃんも初めてで……」"

[[dialogue]]
speaker = "ヴィーナス"
# 『何言ってるの！！』
line = "『何言ってるの！！』"

[[dialogue]]
speaker = "ヴィーナス"
# 『マトイとアナなら――私が見込んだあなたたちなら絶対に大丈夫！　胸を張りなさい！　あなたたちは星騎士、しかも星徒会なのよ！』
line = "『マトイとアナなら――私が見込んだあなたたちなら絶対に大丈夫！　胸を張りなさい！　あなたたちは星騎士、しかも星徒会なのよ！』"

[[dialogue]]
speaker = "ヴィーナス"
# 『今、それを食い止められるのは、あなたたちだけ！　私たちも後から追いつくわ！』
line = "『今、それを食い止められるのは、あなたたちだけ！　私たちも後から追いつくわ！』"

[[dialogue]]
speaker = "サーシャ"
# 『ふふ、そうね～、２人なら大丈夫よ～』
line = "『ふふ、そうね～、２人なら大丈夫よ～』"

[[dialogue]]
speaker = "マトイ"
# （発生した無数のモンスターたちが、無関係な街の人たちに襲い掛かろうとしている）
line = "（発生した無数のモンスターたちが、無関係な街の人たちに襲い掛かろうとしている）"

[[dialogue]]
speaker = "マトイ"
# （恐れちゃだめ、私が戦って助けるしかないんだ）
line = "（恐れちゃだめ、私が戦って助けるしかないんだ）"

[[dialogue]]
speaker = "マトイ"
# （世界丸ごとは救えない私でも、自分の目の前にいる人くらいなら守れる。守ってみせる！）
line = "（世界丸ごとは救えない私でも、自分の目の前にいる人くらいなら守れる。守ってみせる！）"

[[dialogue]]
speaker = "マトイ"
# （私はそのために、星騎士になったんだから！）
line = "（私はそのために、星騎士になったんだから！）"

[[dialogue]]
speaker = "マトイ"
# 「ありがとうございます、ヴィーナス会長、サーシャさん。マトイ、アナの両名、対処に当たります！」
line = "「ありがとうございます、ヴィーナス会長、サーシャさん。マトイ、アナの両名、対処に当たります！」"

[[dialogue]]
speaker = "マトイ"
# 「アナちゃん、ヴィーナス先輩とサーシャさんが現着するまでの辛抱。時間を稼ごうね」
line = "「アナちゃん、ヴィーナス先輩とサーシャさんが現着するまでの辛抱。時間を稼ごうね」"

[[dialogue]]
speaker = "アナ"
# 「ですが、私たち２人では」
line = "「ですが、私たち２人では」"

[[dialogue]]
speaker = "マトイ"
# 「ノープロブレムだよ、アナちゃん」
line = "「ノープロブレムだよ、アナちゃん」"

[[dialogue]]
speaker = "マトイ"
# 「だって、私たち、大福を食べたばかりなんだから。だから、今の私たちには、大いなる福が宿っている。でしょ？」
line = "「だって、私たち、大福を食べたばかりなんだから。だから、今の私たちには、大いなる福が宿っている。でしょ？」"

[[dialogue]]
speaker = "アナ"
# 「……！　そうですね」
line = "「……！　そうですね」"

[[dialogue]]
speaker = "アナ"
# 「ノープロブレムです。行きましょう、マトイ先輩」
line = "「ノープロブレムです。行きましょう、マトイ先輩」"
