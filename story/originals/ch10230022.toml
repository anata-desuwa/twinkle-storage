[[dialogue]]
speaker = "unk"
# 第２話,無自覚サンタの憂鬱,P
line = "第２話,無自覚サンタの憂鬱,P"

[[dialogue]]
speaker = "シャロン"
# 「メリークリスマス！　さぁプレゼントをどうぞ」
line = "「メリークリスマス！　さぁプレゼントをどうぞ」"

[[dialogue]]
speaker = "シャロン"
# 「あっ……。また……」
line = "「あっ……。また……」"

[[dialogue]]
speaker = "unk"
# どうかしたの？
line = "どうかしたの？"

[[dialogue]]
speaker = "シャロン"
# 「ああ、会長さま。実は先日作った靴下とプレゼントを子どもたちに配っていたのですが……」
line = "「ああ、会長さま。実は先日作った靴下とプレゼントを子どもたちに配っていたのですが……」"

[[dialogue]]
speaker = "シャロン"
# 「なぜか男の子に限って受け取っていただけないのです。渡そうとして近づくと、一目散に走り去ってしまわれて……」
line = "「なぜか男の子に限って受け取っていただけないのです。渡そうとして近づくと、一目散に走り去ってしまわれて……」"

[[dialogue]]
speaker = "シャロン"
# 「一体何がいけないのでしょうか……。男の子が喜びそうなおもちゃやお菓子を見繕ったつもりなのですが……」
line = "「一体何がいけないのでしょうか……。男の子が喜びそうなおもちゃやお菓子を見繕ったつもりなのですが……」"

[[dialogue]]
speaker = "シャロン"
# 「そうだ、会長さま。良ければ私の立ち振る舞いにおかしなところがないか見ていただいても構わないでしょうか」
line = "「そうだ、会長さま。良ければ私の立ち振る舞いにおかしなところがないか見ていただいても構わないでしょうか」"

[[dialogue]]
speaker = "シャロン"
# 「きっと私に何か問題があると思うんです。他の方からはプレゼントを受け取っているみたいですし……」
line = "「きっと私に何か問題があると思うんです。他の方からはプレゼントを受け取っているみたいですし……」"

[[dialogue]]
speaker = "シャロン"
# 「このままでは女神様にも、靴下作りを手伝ってくださったイレーナさまにも顔向けができません」
line = "「このままでは女神様にも、靴下作りを手伝ってくださったイレーナさまにも顔向けができません」"

[[dialogue]]
speaker = "シャロン"
# 「何より子どもたちにプレゼントのひとつも受け取ってもらえないシスターなんて、女神様の愛を広める者として失格ですから……！」
line = "「何より子どもたちにプレゼントのひとつも受け取ってもらえないシスターなんて、女神様の愛を広める者として失格ですから……！」"

[[dialogue]]
speaker = "unk"
# 俺でよければ力になるよ
line = "俺でよければ力になるよ"

[[dialogue]]
speaker = "シャロン"
# 「ありがとうございます！　では、しゃがんでいただいてもよろしいですか？　子どもたちの視点からの助言をいただければと思いまして」
line = "「ありがとうございます！　では、しゃがんでいただいてもよろしいですか？　子どもたちの視点からの助言をいただければと思いまして」"

[[dialogue]]
speaker = "シャロン"
# 「いかがでしょうか……。こうしてお傍に立っているだけでも逃げだしてしまう子もいるんです」
line = "「いかがでしょうか……。こうしてお傍に立っているだけでも逃げだしてしまう子もいるんです」"

[[dialogue]]
speaker = "シャロン"
# 「私……子どもたちに嫌われてしまったのでしょうか。知らず知らずの間に子どもたちの心を傷つけてしまったのかもしれません……」
line = "「私……子どもたちに嫌われてしまったのでしょうか。知らず知らずの間に子どもたちの心を傷つけてしまったのかもしれません……」"

[[dialogue]]
speaker = "シャロン"
# 「どうでしょう……。会長さまから見て、何かお気づきになられる点はありませんか？」
line = "「どうでしょう……。会長さまから見て、何かお気づきになられる点はありませんか？」"

[[dialogue]]
speaker = "unk"
# 絶景が広がっています
line = "絶景が広がっています"

[[dialogue]]
speaker = "シャロン"
# 「絶景、ですか？　確かにカフェテリアのクリスマス用の装飾は素晴らしいものですけれど……」
line = "「絶景、ですか？　確かにカフェテリアのクリスマス用の装飾は素晴らしいものですけれど……」"

[[dialogue]]
speaker = "シャロン"
# 「ですが、それとこれとは話が別です。今は子どもたちになぜ避けられてしまうのかのご相談をしているのです」
line = "「ですが、それとこれとは話が別です。今は子どもたちになぜ避けられてしまうのかのご相談をしているのです」"

[[dialogue]]
speaker = "シャロン"
# 「私もできる限り威圧感を与えないようにと心がけてはいるのですが。声をかける時も子どもたちと目線を合わせるようにしておりますし……」
line = "「私もできる限り威圧感を与えないようにと心がけてはいるのですが。声をかける時も子どもたちと目線を合わせるようにしておりますし……」"

[[dialogue]]
speaker = "シャロン"
# 「ですが、こうしてしゃがみ込むと、さらに逃げだしてしまう子が多くて……」
line = "「ですが、こうしてしゃがみ込むと、さらに逃げだしてしまう子が多くて……」"

[[dialogue]]
speaker = "シャロン"
# 「一体何故なのでしょう……。いつもはこんなこと一切ありませんのに……」
line = "「一体何故なのでしょう……。いつもはこんなこと一切ありませんのに……」"

[[dialogue]]
speaker = "シャロン"
# 「目も合わせていただけないんです。皆さま、ずっと<ruby=うつむ>俯</ruby>かれてばかりで……」
line = "「目も合わせていただけないんです。皆さま、ずっと<ruby>俯<rt>うつむ</rt></ruby>かれてばかりで……」"

[[dialogue]]
speaker = "シャロン"
# 「あ、会長さまもずっと俯かれていますよね？　なぜ、私にお顔を向けていただけないのですっ？」
line = "「あ、会長さまもずっと俯かれていますよね？　なぜ、私にお顔を向けていただけないのですっ？」"

[[dialogue]]
speaker = "シャロン"
# 「答えてください、会長さま……！　子どもたちは答えてくださらないんです……！」
line = "「答えてください、会長さま……！　子どもたちは答えてくださらないんです……！」"

[[dialogue]]
speaker = "シャロン"
# 「どうしてそんなに俯かれているのかと尋ねると、それこそ弾かれたように走り去ってしまって……！」
line = "「どうしてそんなに俯かれているのかと尋ねると、それこそ弾かれたように走り去ってしまって……！」"

[[dialogue]]
speaker = "unk"
# そりゃ恥ずかしくなって逃げだすというか……
line = "そりゃ恥ずかしくなって逃げだすというか……"

[[dialogue]]
speaker = "シャロン"
# 「そう仰るということは──つまり会長さまはわかっておられるのですねっ？　なぜ私が男の子たちから避けられてしまうのかをっ」
line = "「そう仰るということは──つまり会長さまはわかっておられるのですねっ？　なぜ私が男の子たちから避けられてしまうのかをっ」"

[[dialogue]]
speaker = "シャロン"
# 「どうかお教えください、会長さま……！　一体私の何がいけないのでしょうか……！」
line = "「どうかお教えください、会長さま……！　一体私の何がいけないのでしょうか……！」"

[[dialogue]]
speaker = "シャロン"
# 「どうすればプレゼントを受け取ってもらえるのでしょうっ。どうすれば男の子たちに逃げられずに済むのでしょうか……！」
line = "「どうすればプレゼントを受け取ってもらえるのでしょうっ。どうすれば男の子たちに逃げられずに済むのでしょうか……！」"

[[dialogue]]
speaker = "シャロン"
# 「私に原因があるのなら直しますから……！　何卒……！　何卒ご教授を会長さまっ……！」
line = "「私に原因があるのなら直しますから……！　何卒……！　何卒ご教授を会長さまっ……！」"

[[dialogue]]
speaker = "unk"
# そ、その格好で密着されると……！
line = "そ、その格好で密着されると……！"

[[dialogue]]
speaker = "シャロン"
# 「ああ、会長さまがどんどん前屈みに……！　そうです、そうなんです、男の子たちも皆そうして身を丸めていくばかりで……！」
line = "「ああ、会長さまがどんどん前屈みに……！　そうです、そうなんです、男の子たちも皆そうして身を丸めていくばかりで……！」"

[[dialogue]]
speaker = "シャロン"
# 「なぜなのでしょう……！　皆、私が近づくとお腹を壊してしまうんです……！」
line = "「なぜなのでしょう……！　皆、私が近づくとお腹を壊してしまうんです……！」"

[[dialogue]]
speaker = "シャロン"
# 「もしかして私は無意識のうちに何か呪詛のようなものを振りまいてしまっているのでしょうかっ？」
line = "「もしかして私は無意識のうちに何か呪詛のようなものを振りまいてしまっているのでしょうかっ？」"

[[dialogue]]
speaker = "シャロン"
# 「どうか教えてくださいっ……！　私のっ、私の何がいけないのでしょうっ……！」
line = "「どうか教えてくださいっ……！　私のっ、私の何がいけないのでしょうっ……！」"

[[dialogue]]
speaker = "シャロン"
# 「会長、さま？」
line = "「会長、さま？」"

[[dialogue]]
speaker = "シャロン"
# 「ああっ、会長さまっ！？　どうして会長さままで逃げてしまわれるのですかぁ～！？」
line = "「ああっ、会長さまっ！？　どうして会長さままで逃げてしまわれるのですかぁ～！？」"

[[dialogue]]
speaker = "イレーナ"
# 「ん……？　どうしたのよ、シャロン。この世の終わりみたいな顔しちゃって」
line = "「ん……？　どうしたのよ、シャロン。この世の終わりみたいな顔しちゃって」"

[[dialogue]]
speaker = "シャロン"
# 「イレーナさま……！　私は、私はシスター失格です……！」
line = "「イレーナさま……！　私は、私はシスター失格です……！」"

[[dialogue]]
speaker = "シャロン"
# 「男の子が皆、私の前から逃げだしてしまうんです……！　誰も私の愛を受け取ってくださらないのです……！」
line = "「男の子が皆、私の前から逃げだしてしまうんです……！　誰も私の愛を受け取ってくださらないのです……！」"

[[dialogue]]
speaker = "シャロン"
# 「せっかく女神様から素晴らしいサンタの衣装を賜ったというのに……！ 　子どもたちへプレゼントを贈る務めを授けていただいたというのに……！」
line = "「せっかく女神様から素晴らしいサンタの衣装を賜ったというのに……！ 　子どもたちへプレゼントを贈る務めを授けていただいたというのに……！」"

[[dialogue]]
speaker = "シャロン"
# 「ううう、シスターとしてサンタとして、これ以上の絶望はありません……！」
line = "「ううう、シスターとしてサンタとして、これ以上の絶望はありません……！」"

[[dialogue]]
speaker = "シャロン"
# 「一体、なぜ……！　なぜなのでしょう……！　私の何がいけないのでしょうか……！」
line = "「一体、なぜ……！　なぜなのでしょう……！　私の何がいけないのでしょうか……！」"

[[dialogue]]
speaker = "イレーナ"
# 「そりゃあ……」
line = "「そりゃあ……」"

[[dialogue]]
speaker = "イレーナ"
# 「……その格好がエロすぎるからでしょ」
line = "「……その格好がエロすぎるからでしょ」"
