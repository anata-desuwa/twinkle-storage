[[dialogue]]
speaker = "unk"
# バレンタインの時期が近づいてきた、ある日の放課後。
line = "バレンタインの時期が近づいてきた、ある日の放課後。"

[[dialogue]]
speaker = "イクシリオン"
# （これでバレンタインのチョコ作りに必要な材料は、ひと通り揃いましたね）
line = "（これでバレンタインのチョコ作りに必要な材料は、ひと通り揃いましたね）"

[[dialogue]]
speaker = "unk"
# 新星学園１年生の『イクシリオン・グレゴール』は、街へ買い物に来ていた。
line = "新星学園１年生の『イクシリオン・グレゴール』は、街へ買い物に来ていた。"

[[dialogue]]
speaker = "unk"
# 彼女は学園でも清楚で真面目、文武両道の優等生として知られる少女。１年生の中でも屈指の実力を誇るプリマステラである。
line = "彼女は学園でも清楚で真面目、文武両道の優等生として知られる少女。１年生の中でも屈指の実力を誇るプリマステラである。"

[[dialogue]]
speaker = "イクシリオン"
# （会長、私がバレンタインチョコを贈ったら、喜んで下さるでしょうか……？）
line = "（会長、私がバレンタインチョコを贈ったら、喜んで下さるでしょうか……？）"

[[dialogue]]
speaker = "unk"
# そんなことを考えているうちに、いつものようにイクシリオンの頭の中では、<b>妄想</b>が広がり始めてしまう。
line = "そんなことを考えているうちに、いつものようにイクシリオンの頭の中では、<b>妄想</b>が広がり始めてしまう。"

[[dialogue]]
speaker = "クロト"
# 「――あれ？　イクシー、こんなところで会うなんて奇遇だね」
line = "「――あれ？　イクシー、こんなところで会うなんて奇遇だね」"

[[dialogue]]
speaker = "イクシリオン"
# 「あっ、か、会長……！　ごきげんよう。実はちょっと、買い物に来ていたところでして……」
line = "「あっ、か、会長……！　ごきげんよう。実はちょっと、買い物に来ていたところでして……」"

[[dialogue]]
speaker = "クロト"
# 「そうなんだ。袋からちょっと見えているのは……チョコかな？」
line = "「そうなんだ。袋からちょっと見えているのは……チョコかな？」"

[[dialogue]]
speaker = "イクシリオン"
# 「は、はい。実はその……いつもお世話になっている会長に、バレンタインチョコを作ってお渡ししようと思っていまして。今日はその材料を――」
line = "「は、はい。実はその……いつもお世話になっている会長に、バレンタインチョコを作ってお渡ししようと思っていまして。今日はその材料を――」"

[[dialogue]]
speaker = "クロト"
# 「そうだったんだ。照れるけど……楽しみにしてるよ」
line = "「そうだったんだ。照れるけど……楽しみにしてるよ」"

[[dialogue]]
speaker = "イクシリオン"
# 「はうっ！？　～～～っ<emoji=heart04><emoji=heart04>」
line = "「はうっ！？　～～～っ<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
# （はぁぁっ……<emoji=heart04>　そのはにかみスマイルは反則です……！　胸がドキッとして、息が止まりそうになってしまいます……<emoji=heart04>）
line = "（はぁぁっ……<emoji=heart04>　そのはにかみスマイルは反則です……！　胸がドキッとして、息が止まりそうになってしまいます……<emoji=heart04>）"

[[dialogue]]
speaker = "イクシリオン"
# 「は、はい……<emoji=heart04>　頑張って作ります……<emoji=heart04>」
line = "「は、はい……<emoji=heart04>　頑張って作ります……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# イクシリオンは頬を赤らめ、もじもじと視線を逸らしてしまって――
line = "イクシリオンは頬を赤らめ、もじもじと視線を逸らしてしまって――"

[[dialogue]]
speaker = "イクシリオン"
# （ハッ……！？　気づけば、もう寮の前に……！）
line = "（ハッ……！？　気づけば、もう寮の前に……！）"

[[dialogue]]
speaker = "unk"
# 気がつくと、そこは彼女が暮らす新星寮の前だった。
line = "気がつくと、そこは彼女が暮らす新星寮の前だった。"

[[dialogue]]
speaker = "イクシリオン"
# （ああっ<emoji=heart04>　いけません！　私ったら、まるで会長に本命チョコを渡すかのような妄想を……<emoji=heart04>）
line = "（ああっ<emoji=heart04>　いけません！　私ったら、まるで会長に本命チョコを渡すかのような妄想を……<emoji=heart04>）"

[[dialogue]]
speaker = "unk"
# ――そう。イクシリオンには、つい暴走してしまう『妄想癖』があるのだ。
line = "――そう。イクシリオンには、つい暴走してしまう『妄想癖』があるのだ。"

[[dialogue]]
speaker = "イクシリオン"
# （会長に渡すのはあくまで義理チョコです。いつもお世話になっているお礼として……それだけなのに……<emoji=heart04>）
line = "（会長に渡すのはあくまで義理チョコです。いつもお世話になっているお礼として……それだけなのに……<emoji=heart04>）"

[[dialogue]]
speaker = "イクシリオン"
# （でも最近、会長のことを妄想しても、エッチな方向には全然ならないんですよね……）
line = "（でも最近、会長のことを妄想しても、エッチな方向には全然ならないんですよね……）"

[[dialogue]]
speaker = "イクシリオン"
# （いえ、そもそもお世話になっている会長を、そんな妄想のネタにするなんて失礼なこと……。そう思うと、むしろ良いことなのかもしれませんが……）
line = "（いえ、そもそもお世話になっている会長を、そんな妄想のネタにするなんて失礼なこと……。そう思うと、むしろ良いことなのかもしれませんが……）"

[[dialogue]]
speaker = "イクシリオン"
# （けれど、どうにも物足りないというか……心の潤いが足りない気がして……！　そう、妄想は私の心の癒し……！）
line = "（けれど、どうにも物足りないというか……心の潤いが足りない気がして……！　そう、妄想は私の心の癒し……！）"

[[dialogue]]
speaker = "イクシリオン"
# （もしやこれが……『スランプ』というものなのでしょうか……！？）
line = "（もしやこれが……『スランプ』というものなのでしょうか……！？）"

[[dialogue]]
speaker = "unk"
# 翌日の放課後。
line = "翌日の放課後。"

[[dialogue]]
speaker = "女生徒"
# 「トワちゃん先生、アドバイスありがとうございます！　それじゃあ訓練行ってきますね♪」
line = "「トワちゃん先生、アドバイスありがとうございます！　それじゃあ訓練行ってきますね♪」"

[[dialogue]]
speaker = "トワ先生"
# 「うん、頑張って！　困ったことがあったら、いつでも相談してね～♪」
line = "「うん、頑張って！　困ったことがあったら、いつでも相談してね～♪」"

[[dialogue]]
speaker = "unk"
# 新星学園の教師『有明トワ』は、生徒の相談に乗った後、笑顔で手を振って見送った。
line = "新星学園の教師『有明トワ』は、生徒の相談に乗った後、笑顔で手を振って見送った。"

[[dialogue]]
speaker = "unk"
# トワはノヴァフォームに覚醒して以降、現役の星騎士としても最前線で活躍しており、今では生徒たちから一層頼られる存在となっている。
line = "トワはノヴァフォームに覚醒して以降、現役の星騎士としても最前線で活躍しており、今では生徒たちから一層頼られる存在となっている。"

[[dialogue]]
speaker = "イクシリオン"
# 「……あの、トワ先生。少しお時間、よろしいでしょうか？」
line = "「……あの、トワ先生。少しお時間、よろしいでしょうか？」"

[[dialogue]]
speaker = "トワ先生"
# 「あれ？　イクシリオンちゃん。こんにちは♪　どうしたの？」
line = "「あれ？　イクシリオンちゃん。こんにちは♪　どうしたの？」"

[[dialogue]]
speaker = "イクシリオン"
# 「実は……先生にご相談したいことがありまして」
line = "「実は……先生にご相談したいことがありまして」"

[[dialogue]]
speaker = "トワ先生"
# 「もちろん大丈夫だよ！　トワ先生にまっかせなさい♪」
line = "「もちろん大丈夫だよ！　トワ先生にまっかせなさい♪」"

[[dialogue]]
speaker = "unk"
# トワはイクシリオンとゆっくり話せるように、新星学園の会議室へと場所を移した。
line = "トワはイクシリオンとゆっくり話せるように、新星学園の会議室へと場所を移した。"

[[dialogue]]
speaker = "トワ先生"
# 「――それで、イクシリオンちゃんの相談っていうのは……？」
line = "「――それで、イクシリオンちゃんの相談っていうのは……？」"

[[dialogue]]
speaker = "イクシリオン"
# 「はい。実は……昨日の夜――」
line = "「はい。実は……昨日の夜――」"

[[dialogue]]
speaker = "イクシリオン"
# 「突然、戦闘服がこのような姿に変わってしまいまして……<emoji=heart04>」
line = "「突然、戦闘服がこのような姿に変わってしまいまして……<emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
# 「えっ！？　それって、まさか……『バレンタインフォーム』！？」
line = "「えっ！？　それって、まさか……『バレンタインフォーム』！？」"

[[dialogue]]
speaker = "イクシリオン"
# 「はい。お恥ずかしながら、おそらく……<emoji=heart04>」
line = "「はい。お恥ずかしながら、おそらく……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# イクシリオンの新たな姿を前に、トワは思わず目を丸くしてしまうのだった。
line = "イクシリオンの新たな姿を前に、トワは思わず目を丸くしてしまうのだった。"
