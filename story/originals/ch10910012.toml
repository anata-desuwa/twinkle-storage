[[dialogue]]
speaker = "unk"
# 第２話,梨緒とランチ,P
line = "第２話,梨緒とランチ,P"

[[dialogue]]
speaker = "unk"
# 梨緒が選挙管理委員会を立ち上げてからというもの、彼女の視線が気になるようになった。
line = "梨緒が選挙管理委員会を立ち上げてからというもの、彼女の視線が気になるようになった。"

[[dialogue]]
speaker = "梨緒"
# 「じ～……」
line = "「じ～……」"

[[dialogue]]
speaker = "梨緒"
# 「じぃ～……」
line = "「じぃ～……」"

[[dialogue]]
speaker = "梨緒"
# 「じぃ～～～……」
line = "「じぃ～～～……」"

[[dialogue]]
speaker = "unk"
# 近い近い近い！？
line = "近い近い近い！？"

[[dialogue]]
speaker = "梨緒"
# 「君のことを見すぎだと？　いいや、君は御前試合に勝ったとはいえ、世界を破滅させる可能性は残ったままだ。選管として監視する責務がある」
line = "「君のことを見すぎだと？　いいや、君は御前試合に勝ったとはいえ、世界を破滅させる可能性は残ったままだ。選管として監視する責務がある」"

[[dialogue]]
speaker = "梨緒"
# 「それに守護天使から──いや、これは言うなと止められているんだった」
line = "「それに守護天使から──いや、これは言うなと止められているんだった」"

[[dialogue]]
speaker = "梨緒"
# 「問われても秘密だから話せない。とはいえ、ある程度は察せるだろう」
line = "「問われても秘密だから話せない。とはいえ、ある程度は察せるだろう」"

[[dialogue]]
speaker = "unk"
# 気まぐれなパテルや、まだ見ぬ守護天使の可能性もあるが、俺から距離を置いている守護天使といえばやはりラクシャだろうか。
line = "気まぐれなパテルや、まだ見ぬ守護天使の可能性もあるが、俺から距離を置いている守護天使といえばやはりラクシャだろうか。"

[[dialogue]]
speaker = "unk"
# でも梨緒とラクシャに何の関係が？
line = "でも梨緒とラクシャに何の関係が？"

[[dialogue]]
speaker = "梨緒"
# 「ついでだ。私も昼食をとるとしよう。前の席、いいか？」
line = "「ついでだ。私も昼食をとるとしよう。前の席、いいか？」"

[[dialogue]]
speaker = "unk"
# もちろん
line = "もちろん"

[[dialogue]]
speaker = "梨緒"
# 「ありがとう。では失礼する。君は……そばを頼んだのか。私は鯖の味噌煮定食だ」
line = "「ありがとう。では失礼する。君は……そばを頼んだのか。私は鯖の味噌煮定食だ」"

[[dialogue]]
speaker = "梨緒"
# 「意外か？　時々聞かれるが、私は父がイギリス人で、母はこちらの出身だ。和食にも親しんでいるよ」
line = "「意外か？　時々聞かれるが、私は父がイギリス人で、母はこちらの出身だ。和食にも親しんでいるよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あ～っ！！」
line = "「あ～っ！！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あなた、梨緒・<ruby=アネット>Ａ</ruby>・クリスタルね！　どうしてあなたがクロトと一緒にいるのよ！」
line = "「あなた、梨緒・<ruby>Ａ<rt>アネット</rt></ruby>・クリスタルね！　どうしてあなたがクロトと一緒にいるのよ！」"

[[dialogue]]
speaker = "梨緒"
# 「もちろん監視のためだ。緋宮会長が悪の魔王に堕ちないようにな」
line = "「もちろん監視のためだ。緋宮会長が悪の魔王に堕ちないようにな」"

[[dialogue]]
speaker = "梨緒"
# 「あと私の名は梨緒・<ruby=アガサ>Ａ</ruby>・クリステレスだ。私が名前など覚えるに値しない、無価値な存在なのは理解しているが、一応訂正しておく……」
line = "「あと私の名は梨緒・<ruby>Ａ<rt>アガサ</rt></ruby>・クリステレスだ。私が名前など覚えるに値しない、無価値な存在なのは理解しているが、一応訂正しておく……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あ、ごめんなさい。名前を間違えたことは謝るわ」
line = "「あ、ごめんなさい。名前を間違えたことは謝るわ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それより監視ってどういうことよ？　私が見込んだクロトが悪の魔王になるわけないでしょ。太陽の壁画はウソっぱちなんだから！」
line = "「それより監視ってどういうことよ？　私が見込んだクロトが悪の魔王になるわけないでしょ。太陽の壁画はウソっぱちなんだから！」"

[[dialogue]]
speaker = "梨緒"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「どうしたの、じっとこっち見て何か言ったらどうなのよ？」
line = "「どうしたの、じっとこっち見て何か言ったらどうなのよ？」"

[[dialogue]]
speaker = "梨緒"
# 「不躾ですまないが……君は誰なんだ？」
line = "「不躾ですまないが……君は誰なんだ？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「は？」
line = "「は？」"

[[dialogue]]
speaker = "梨緒"
# 「一方的ではあるが、新星学園の生徒のことは概ね知っている。だが君のことは、寡聞にして知らない」
line = "「一方的ではあるが、新星学園の生徒のことは概ね知っている。だが君のことは、寡聞にして知らない」"

[[dialogue]]
speaker = "ヴィーナス"
# 「失礼だけど、ウソを言ってるようには見えないわね……」
line = "「失礼だけど、ウソを言ってるようには見えないわね……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「いい、よく聞きなさい。私は九浄ヴィーナス。九浄家当主ヘレナの娘にして、新星星徒会のスーパーフィクサーよ！」
line = "「いい、よく聞きなさい。私は九浄ヴィーナス。九浄家当主ヘレナの娘にして、新星星徒会のスーパーフィクサーよ！」"

[[dialogue]]
speaker = "梨緒"
# 「スーパーフィクサー？　こちらの星徒会にはそんな役職もあるのか」
line = "「スーパーフィクサー？　こちらの星徒会にはそんな役職もあるのか」"

[[dialogue]]
speaker = "unk"
# ヴィーナスも一緒にお昼食べる？
line = "ヴィーナスも一緒にお昼食べる？"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうね。けどあなたたち、どうして普通に一緒にご飯食べてるのよ？　いつの間に仲良くなったの？」
line = "「そうね。けどあなたたち、どうして普通に一緒にご飯食べてるのよ？　いつの間に仲良くなったの？」"

[[dialogue]]
speaker = "梨緒"
# 「最初は誤解していたが、私は彼を嫌っているわけではない。むしろ彼の星騎士としての姿勢は好ましいものだと思っている」
line = "「最初は誤解していたが、私は彼を嫌っているわけではない。むしろ彼の星騎士としての姿勢は好ましいものだと思っている」"

[[dialogue]]
speaker = "梨緒"
# 「理不尽を打ち破り、罪無き人々を守る──それは私も理想とするところだ」
line = "「理不尽を打ち破り、罪無き人々を守る──それは私も理想とするところだ」"

[[dialogue]]
speaker = "梨緒"
# 「だが仲良くなったわけではない。私たちは監視する者とされる者。適切な距離を維持しなくてはならない」
line = "「だが仲良くなったわけではない。私たちは監視する者とされる者。適切な距離を維持しなくてはならない」"

[[dialogue]]
speaker = "梨緒"
# 「よって早食いで勝負だ！」
line = "「よって早食いで勝負だ！」"

[[dialogue]]
speaker = "unk"
# なんで早食い！？
line = "なんで早食い！？"

[[dialogue]]
speaker = "梨緒"
# 「星徒会長たる者、度重なる出撃や、星徒会業務で多忙な中でも栄養補給は忘れてはならない。どちらが迅速に食事をとれるか勝負だ」
line = "「星徒会長たる者、度重なる出撃や、星徒会業務で多忙な中でも栄養補給は忘れてはならない。どちらが迅速に食事をとれるか勝負だ」"

[[dialogue]]
speaker = "梨緒"
# 「ではいくぞ！」
line = "「ではいくぞ！」"

[[dialogue]]
speaker = "梨緒"
# 「くっ……負けた……」
line = "「くっ……負けた……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「おそばと鯖の味噌煮じゃ当たり前でしょ」
line = "「おそばと鯖の味噌煮じゃ当たり前でしょ」"

[[dialogue]]
speaker = "unk"
# せっかくなんだから味わって食べようよ
line = "せっかくなんだから味わって食べようよ"

[[dialogue]]
speaker = "梨緒"
# 「……そうだな。カフェテリアのスタッフが作ってくれた食事だ、勝負の種にするべきではなかった。反省する」
line = "「……そうだな。カフェテリアのスタッフが作ってくれた食事だ、勝負の種にするべきではなかった。反省する」"

[[dialogue]]
speaker = "ヴィーナス"
# 「う～ん……」
line = "「う～ん……」"

[[dialogue]]
speaker = "梨緒"
# 「どうかしたか、ヴィーナス？」
line = "「どうかしたか、ヴィーナス？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロトと梨緒、やっぱり仲良くなってない？」
line = "「クロトと梨緒、やっぱり仲良くなってない？」"

[[dialogue]]
speaker = "梨緒"
# 「なっ──！？　そそ、そんなことはないっ！　君も何か言ってくれ！」
line = "「なっ──！？　そそ、そんなことはないっ！　君も何か言ってくれ！」"

[[dialogue]]
speaker = "unk"
# 俺も梨緒のこと好ましいと思ってるよ
line = "俺も梨緒のこと好ましいと思ってるよ"

[[dialogue]]
speaker = "梨緒"
# 「ひあっ！？」
line = "「ひあっ！？」"

[[dialogue]]
speaker = "梨緒"
# 「こ、好ましいとはどういう意味だ？　……星騎士として？　そ、そうか、ではお互い近い認識のようだな……」
line = "「こ、好ましいとはどういう意味だ？　……星騎士として？　そ、そうか、ではお互い近い認識のようだな……」"

[[dialogue]]
speaker = "梨緒"
# 「今日のところは潔く負けを認めよう。ではなっ」
line = "「今日のところは潔く負けを認めよう。ではなっ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あ、行っちゃった」
line = "「あ、行っちゃった」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あなたたち、なんだかんだで上手くやってるみたいじゃない。あんな出会い方をしたとは思えないけど……ま、クロトらしいわね」
line = "「あなたたち、なんだかんだで上手くやってるみたいじゃない。あんな出会い方をしたとは思えないけど……ま、クロトらしいわね」"
