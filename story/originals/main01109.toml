[[dialogue]]
speaker = "unk"
# 第１２話,真実の一太刀,B
line = "第１２話,真実の一太刀,B"

[[dialogue]]
speaker = "黒騎士"
# 『……なるほど、な』
line = "『……なるほど、な』"

[[dialogue]]
speaker = "マトイ"
# 「っ……まだ動けるの……！？」
line = "「っ……まだ動けるの……！？」"

[[dialogue]]
speaker = "黒騎士"
# 『動きは上々──だが……まだ、未知の力に体が追いついていないようだな』
line = "『動きは上々──だが……まだ、未知の力に体が追いついていないようだな』"

[[dialogue]]
speaker = "フィオナ"
# 「──ッ！」
line = "「──ッ！」"

[[dialogue]]
speaker = "クロト"
# 「──フィオナッ！」
line = "「──フィオナッ！」"

[[dialogue]]
speaker = "unk"
# それまで全体へ<ruby=ふえん>敷衍</ruby>させていた奴の霊力が──黒き剣の切っ先へと集約していく。
line = "それまで全体へ<ruby>敷衍<rt>ふえん</rt></ruby>させていた奴の霊力が──黒き剣の切っ先へと集約していく。"

[[dialogue]]
speaker = "黒騎士"
# 『よく粘ったが──これで終わりだ。片割れさえいなくなれば、私には及びもしない──！』
line = "『よく粘ったが──これで終わりだ。片割れさえいなくなれば、私には及びもしない──！』"

[[dialogue]]
speaker = "フィオナ"
# 「──！？」
line = "「──！？」"

[[dialogue]]
speaker = "ニャリオン"
# （まずいニャッ──！）
line = "（まずいニャッ──！）"

[[dialogue]]
speaker = "unk"
# これまでの戦いで一度も見せていなかった──横薙ぎに滑らせるような一閃がフィオナの喉元へ迫る。
line = "これまでの戦いで一度も見せていなかった──横薙ぎに滑らせるような一閃がフィオナの喉元へ迫る。"

[[dialogue]]
speaker = "unk"
# ──だが。
line = "──だが。"

[[dialogue]]
speaker = "クロト"
# 「──読んでたよ」
line = "「──読んでたよ」"

[[dialogue]]
speaker = "黒騎士"
# 『──！？』
line = "『──！？』"

[[dialogue]]
speaker = "unk"
# 完全な不意打ちであったはずの斬り払い──
line = "完全な不意打ちであったはずの斬り払い──"

[[dialogue]]
speaker = "unk"
# その始点となる刺突による差し込みを一点で食い止める。そしてこちらも──
line = "その始点となる刺突による差し込みを一点で食い止める。そしてこちらも──"

[[dialogue]]
speaker = "クロト"
# 「これで──終わりだッ！」
line = "「これで──終わりだッ！」"

[[dialogue]]
speaker = "黒騎士"
# 『ぐ──はァァッ！！』
line = "『ぐ──はァァッ！！』"

[[dialogue]]
speaker = "マトイ"
# 「緋宮くん──！？」
line = "「緋宮くん──！？」"

[[dialogue]]
speaker = "ニャリオン"
# 「や──やったかニャ──！？」
line = "「や──やったかニャ──！？」"

[[dialogue]]
speaker = "unk"
# 崩れた重心へ追い打ちをかけるような渾身の正拳──
line = "崩れた重心へ追い打ちをかけるような渾身の正拳──"

[[dialogue]]
speaker = "unk"
# 全ての力を切っ先に注ぎ込んでいた彼に、この一撃を受けきる術はなかった。
line = "全ての力を切っ先に注ぎ込んでいた彼に、この一撃を受けきる術はなかった。"

[[dialogue]]
speaker = "黒騎士"
# 『ぐ──はっ……！　なぜ──わかっ、た……私の太刀筋が──っ……！？』
line = "『ぐ──はっ……！　なぜ──わかっ、た……私の太刀筋が──っ……！？』"

[[dialogue]]
speaker = "クロト"
# 「わかるさ。おまえは……いや。<b>あなた</b>は必ず最後には、首から胸への斬り払いでとどめを刺そうとする」
line = "「わかるさ。おまえは……いや。<b>あなた</b>は必ず最後には、首から胸への斬り払いでとどめを刺そうとする」"

[[dialogue]]
speaker = "クロト"
# 「この前も……あの時だって、そうだった」
line = "「この前も……あの時だって、そうだった」"

[[dialogue]]
speaker = "黒騎士"
# 『────』
line = "『────』"

[[dialogue]]
speaker = "unk"
# 黒き鎧に身をまとった男の剣術は──その邪悪な波動とは裏腹に、最後まで美しかった。
line = "黒き鎧に身をまとった男の剣術は──その邪悪な波動とは裏腹に、最後まで美しかった。"

[[dialogue]]
speaker = "unk"
# そうして俺の拳を受けた彼の兜が、今……ぱっくりと、割れる。
line = "そうして俺の拳を受けた彼の兜が、今……ぱっくりと、割れる。"

[[dialogue]]
speaker = "フィオナ"
# 「な──っ……！？」
line = "「な──っ……！？」"

[[dialogue]]
speaker = "サーシャ"
# 「あなた──は──……」
line = "「あなた──は──……」"

[[dialogue]]
speaker = "unk"
# たとえ顔が見えなくとも──俺には、彼の剣さばきだけでわかってしまった。
line = "たとえ顔が見えなくとも──俺には、彼の剣さばきだけでわかってしまった。"

[[dialogue]]
speaker = "クロト"
# 「ようやく馬脚を現しましたね、黒騎士──いえ。セイファート学園長」
line = "「ようやく馬脚を現しましたね、黒騎士──いえ。セイファート学園長」"
