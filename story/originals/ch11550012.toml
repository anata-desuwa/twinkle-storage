[[dialogue]]
speaker = "unk"
# 第２話,猪突猛進、フルスロットル娘,P
line = "第２話,猪突猛進、フルスロットル娘,P"

[[dialogue]]
speaker = "unk"
# いろはに『カラオケに連れて行って！』と頼み込まれて、サチは渋谷の街に出かけていた。
line = "いろはに『カラオケに連れて行って！』と頼み込まれて、サチは渋谷の街に出かけていた。"

[[dialogue]]
speaker = "unk"
# そこには同じく異世界からやってきた花織の姿もあった。
line = "そこには同じく異世界からやってきた花織の姿もあった。"

[[dialogue]]
speaker = "いろは"
# 「ん～、いっぱい歌ったね～。サチちゃん、付き合ってくれてありがと～♪」
line = "「ん～、いっぱい歌ったね～。サチちゃん、付き合ってくれてありがと～♪」"

[[dialogue]]
speaker = "サチ"
# 「いえいえ、誘ってもらった時は少し不安でしたが、何も問題なくて逆にビックリしました……」
line = "「いえいえ、誘ってもらった時は少し不安でしたが、何も問題なくて逆にビックリしました……」"

[[dialogue]]
speaker = "いろは"
# 「え？　なになに、どういうこと？」
line = "「え？　なになに、どういうこと？」"

[[dialogue]]
speaker = "サチ"
# 「だって、おふたりはこちらの世界に来たばかりじゃないですか。なのに曲の入力が途切れなくて……」
line = "「だって、おふたりはこちらの世界に来たばかりじゃないですか。なのに曲の入力が途切れなくて……」"

[[dialogue]]
speaker = "サチ"
# 「いろはさんはわかるんです。トレジアンナさんに魔法少女アニメを見せてもらっていたみたいですから」
line = "「いろはさんはわかるんです。トレジアンナさんに魔法少女アニメを見せてもらっていたみたいですから」"

[[dialogue]]
speaker = "いろは"
# 「そうそう♪　歌いたかった曲はぜ～んぶ歌えたよ♪」
line = "「そうそう♪　歌いたかった曲はぜ～んぶ歌えたよ♪」"

[[dialogue]]
speaker = "サチ"
# 「……ですよね」
line = "「……ですよね」"

[[dialogue]]
speaker = "サチ"
# 「不思議なのは花織さんです。どうして花織さんも、こっちの世界の曲を普通に歌えちゃってたんですか？」
line = "「不思議なのは花織さんです。どうして花織さんも、こっちの世界の曲を普通に歌えちゃってたんですか？」"

[[dialogue]]
speaker = "花織"
# 「いろはがそのうち『カラオケ行こー』って騒ぎだすのは目に見えてたから」
line = "「いろはがそのうち『カラオケ行こー』って騒ぎだすのは目に見えてたから」"

[[dialogue]]
speaker = "花織"
# 「いつ連れていかれてもいいように、こっちの世界の流行ってる曲を押さえといたの」
line = "「いつ連れていかれてもいいように、こっちの世界の流行ってる曲を押さえといたの」"

[[dialogue]]
speaker = "いろは"
# 「さっすがカオリン！　あたしのことわかってるっ♪」
line = "「さっすがカオリン！　あたしのことわかってるっ♪」"

[[dialogue]]
speaker = "花織"
# 「ま、長い付き合いだからね。いろはの行動パターンはある程度読めるようになっちゃったよ」
line = "「ま、長い付き合いだからね。いろはの行動パターンはある程度読めるようになっちゃったよ」"

[[dialogue]]
speaker = "サチ"
# 「長いお付き合い……ということは幼なじみとかですか？」
line = "「長いお付き合い……ということは幼なじみとかですか？」"

[[dialogue]]
speaker = "いろは"
# 「うん、小さい頃からのね」
line = "「うん、小さい頃からのね」"

[[dialogue]]
speaker = "花織"
# 「腐れ縁。っていうか、いろはは危なっかしくて放っておけないから」
line = "「腐れ縁。っていうか、いろはは危なっかしくて放っておけないから」"

[[dialogue]]
speaker = "いろは"
# 「えー、そっかな？　どっちかというとカオリンの方が心配な子だと思うんだけど」
line = "「えー、そっかな？　どっちかというとカオリンの方が心配な子だと思うんだけど」"

[[dialogue]]
speaker = "サチ"
# 「そうですか？　花織さん、とてもしっかりされている方のように思いますけど」
line = "「そうですか？　花織さん、とてもしっかりされている方のように思いますけど」"

[[dialogue]]
speaker = "いろは"
# 「でもカオリン、ちょっと繊細だからな～」
line = "「でもカオリン、ちょっと繊細だからな～」"

[[dialogue]]
speaker = "花織"
# 「うっ……」
line = "「うっ……」"

[[dialogue]]
speaker = "いろは"
# 「すぐ落ち込んだり、あわあわ～ってなっちゃうんだよね。そしたらカオリン、すーぐ自分の殻に引きこもっちゃうから」
line = "「すぐ落ち込んだり、あわあわ～ってなっちゃうんだよね。そしたらカオリン、すーぐ自分の殻に引きこもっちゃうから」"

[[dialogue]]
speaker = "いろは"
# 「そういう時はあたしがその殻を叩き割って引っ張り出してあげるの。出てこーい、パッカーン、ずるずるずる～って♪」
line = "「そういう時はあたしがその殻を叩き割って引っ張り出してあげるの。出てこーい、パッカーン、ずるずるずる～って♪」"

[[dialogue]]
speaker = "花織"
# 「まあ……そういう事が無かったかといえば……無くもなかったけど……」
line = "「まあ……そういう事が無かったかといえば……無くもなかったけど……」"

[[dialogue]]
speaker = "花織"
# 「あーっ、もう！　いろは～！　なんでそういう事、新しく仲良くなった子に全部ばらしちゃうかな！」
line = "「あーっ、もう！　いろは～！　なんでそういう事、新しく仲良くなった子に全部ばらしちゃうかな！」"

[[dialogue]]
speaker = "いろは"
# 「あ～、カオリンが怒った～！！」
line = "「あ～、カオリンが怒った～！！」"

[[dialogue]]
speaker = "サチ"
# 「ふふっ、ずっとこんな調子なんですか？」
line = "「ふふっ、ずっとこんな調子なんですか？」"

[[dialogue]]
speaker = "花織"
# 「そ。この子、空気を読むってことを知らないから」
line = "「そ。この子、空気を読むってことを知らないから」"

[[dialogue]]
speaker = "花織"
# 「失礼をやらかさないように、ウチがしっかり監視しておかないとダメなの」
line = "「失礼をやらかさないように、ウチがしっかり監視しておかないとダメなの」"

[[dialogue]]
speaker = "サチ"
# 「ふふっ。おふたりのこと、よくわかった気がします。本当に仲のいい幼なじみなんですね」
line = "「ふふっ。おふたりのこと、よくわかった気がします。本当に仲のいい幼なじみなんですね」"

[[dialogue]]
speaker = "いろは"
# 「幼なじみ兼親友だもんね♪」
line = "「幼なじみ兼親友だもんね♪」"

[[dialogue]]
speaker = "花織"
# 「はぁ、調子いいんだから、まったく……」
line = "「はぁ、調子いいんだから、まったく……」"

[[dialogue]]
speaker = "サチ"
# 「っ……！？」
line = "「っ……！？」"

[[dialogue]]
speaker = "いろは"
# 「ん、この音は？　デュナミスフィア、じゃないよね」
line = "「ん、この音は？　デュナミスフィア、じゃないよね」"

[[dialogue]]
speaker = "サチ"
# 「この近くにモンスターが現れたようです！　すみません、私はそちらに向かいます」
line = "「この近くにモンスターが現れたようです！　すみません、私はそちらに向かいます」"

[[dialogue]]
speaker = "花織"
# 「モンスター！？」
line = "「モンスター！？」"

[[dialogue]]
speaker = "サチ"
# 「おふたりは安全な場所に避難していてください。後で迎えに行きます！」
line = "「おふたりは安全な場所に避難していてください。後で迎えに行きます！」"

[[dialogue]]
speaker = "いろは"
# 「あっ……！」
line = "「あっ……！」"

[[dialogue]]
speaker = "花織"
# 「行っちゃった……けど、どうするいろは？」
line = "「行っちゃった……けど、どうするいろは？」"

[[dialogue]]
speaker = "いろは"
# 「そんなの決まってるじゃん！」
line = "「そんなの決まってるじゃん！」"

[[dialogue]]
speaker = "花織"
# 「だよね……」
line = "「だよね……」"

[[dialogue]]
speaker = "サチ"
# （数はそれほど多くなさそうだけど、死角にもまだ居そう。それに引き換えこっちは１人。単騎深追いは学園で禁止されてる……）
line = "（数はそれほど多くなさそうだけど、死角にもまだ居そう。それに引き換えこっちは１人。単騎深追いは学園で禁止されてる……）"

[[dialogue]]
speaker = "サチ"
# （応援が来るのを待つ？　でも、モンスターが暴れているのを黙って見ているのは……）
line = "（応援が来るのを待つ？　でも、モンスターが暴れているのを黙って見ているのは……）"

[[dialogue]]
speaker = "いろは"
# 「サチちゃん！」
line = "「サチちゃん！」"

[[dialogue]]
speaker = "サチ"
# 「えっ！　いろはさん、どうしてここに！」
line = "「えっ！　いろはさん、どうしてここに！」"

[[dialogue]]
speaker = "いろは"
# 「あいつがモンスターだね？　あたしも一緒に戦うよ！」
line = "「あいつがモンスターだね？　あたしも一緒に戦うよ！」"

[[dialogue]]
speaker = "サチ"
# 「ダメです！　危険ですから、いろはさんたちは大人しく避難してください！」
line = "「ダメです！　危険ですから、いろはさんたちは大人しく避難してください！」"

[[dialogue]]
speaker = "いろは"
# 「黙って見過ごすなんて出来ないよ！」
line = "「黙って見過ごすなんて出来ないよ！」"

[[dialogue]]
speaker = "いろは"
# 「いくよモンスター、世界の平和はあたしが守るっ！　魔法少女いろはが相手だっ！」
line = "「いくよモンスター、世界の平和はあたしが守るっ！　魔法少女いろはが相手だっ！」"

[[dialogue]]
speaker = "いろは"
# 「やぁあああああああっ！！！！」
line = "「やぁあああああああっ！！！！」"

[[dialogue]]
speaker = "サチ"
# 「ちょっ！？　いろはさんっ！」
line = "「ちょっ！？　いろはさんっ！」"

[[dialogue]]
speaker = "花織"
# 「ごめん、サチちゃん。いろは、ああなっちゃったら止められないんだ」
line = "「ごめん、サチちゃん。いろは、ああなっちゃったら止められないんだ」"

[[dialogue]]
speaker = "サチ"
# 「ああ、もうっ！　こうなったら仕方ありません！　花織さん、手を貸してくださいっ」
line = "「ああ、もうっ！　こうなったら仕方ありません！　花織さん、手を貸してくださいっ」"

[[dialogue]]
speaker = "花織"
# 「うん、わかった！」
line = "「うん、わかった！」"

[[dialogue]]
speaker = "花織"
# 「もう、いろはは全力で突っ込んでいくことしか頭に無いんだから。少しはリスクとかバックアップのことも考えて欲しいんだけど……」
line = "「もう、いろはは全力で突っ込んでいくことしか頭に無いんだから。少しはリスクとかバックアップのことも考えて欲しいんだけど……」"

[[dialogue]]
speaker = "unk"
# 花織とサチは顔を見合わせてため息を吐くと気を取り直して、モンスターと戦っているいろはの方へと駆けていくのだった。
line = "花織とサチは顔を見合わせてため息を吐くと気を取り直して、モンスターと戦っているいろはの方へと駆けていくのだった。"
