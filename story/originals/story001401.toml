[[dialogue]]
speaker = "unk"
# 魔女たちの組織「ネビュラ」と協力し、守護天使たちの本体の解放を行った作戦『オペレーション・ペンタグラム』。
line = "魔女たちの組織「ネビュラ」と協力し、守護天使たちの本体の解放を行った作戦『オペレーション・ペンタグラム』。"

[[dialogue]]
speaker = "unk"
# その成功から数日が経過したある日のことだった。
line = "その成功から数日が経過したある日のことだった。"

[[dialogue]]
speaker = "リーリア"
# 「せーんぱい♪」
line = "「せーんぱい♪」"

[[dialogue]]
speaker = "リーリア"
# 「突然ですけど、私の水着に興味はありませんか？」
line = "「突然ですけど、私の水着に興味はありませんか？」"

[[dialogue]]
speaker = "リーリア"
# 「はい♪　水着です。実はですね～、ネビュラで開発を行っていた水着形体の戦闘服が完成したんですよ」
line = "「はい♪　水着です。実はですね～、ネビュラで開発を行っていた水着形体の戦闘服が完成したんですよ」"

[[dialogue]]
speaker = "unk"
# 星騎士の水着フォームを参考にしたって？
line = "星騎士の水着フォームを参考にしたって？"

[[dialogue]]
speaker = "unk"
# アナから少し話は聞いたかも
line = "アナから少し話は聞いたかも"

[[dialogue]]
speaker = "リーリア"
# 「そうそう！　学園の方から情報をいただいて、それを元に作っていたアレです！」
line = "「そうそう！　学園の方から情報をいただいて、それを元に作っていたアレです！」"

[[dialogue]]
speaker = "リーリア"
# 「主力メンバー全員の水着を開発中なんですけど、なんと私のが一番最初に出来たみたいで～」
line = "「主力メンバー全員の水着を開発中なんですけど、なんと私のが一番最初に出来たみたいで～」"

[[dialogue]]
speaker = "リーリア"
# 「それで昨日見せてもらったんです。そしたらその水着がもーーーマジカル可愛くて！！」
line = "「それで昨日見せてもらったんです。そしたらその水着がもーーーマジカル可愛くて！！」"

[[dialogue]]
speaker = "リーリア"
# 「戦闘服って聞いてたから期待してなかったんですけど、いい意味で裏切られたーって感じですね！」
line = "「戦闘服って聞いてたから期待してなかったんですけど、いい意味で裏切られたーって感じですね！」"

[[dialogue]]
speaker = "リーリア"
# 「それで私、思ったわけです……」
line = "「それで私、思ったわけです……」"

[[dialogue]]
speaker = "リーリア"
# 「これはセンパイのこと誘って、泳ぎに行くしかないっ！　とね♪」
line = "「これはセンパイのこと誘って、泳ぎに行くしかないっ！　とね♪」"

[[dialogue]]
speaker = "リーリア"
# 「というわけで、どーですかセ・ン・パ・イ？」
line = "「というわけで、どーですかセ・ン・パ・イ？」"

[[dialogue]]
speaker = "unk"
# リーリアの水着……
line = "リーリアの水着……"

[[dialogue]]
speaker = "リーリア"
# 「おやおや～、お顔が赤くなってますよ？　何を想像しちゃってるんですか～？　ふふっ、センパイのえっち<emoji=heart04>」
line = "「おやおや～、お顔が赤くなってますよ？　何を想像しちゃってるんですか～？　ふふっ、センパイのえっち<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
# 「そんなに見たいんですか？　見たいんですよね？　じゃー、素直になった方がいいと思いますよ～♪」
line = "「そんなに見たいんですか？　見たいんですよね？　じゃー、素直になった方がいいと思いますよ～♪」"

[[dialogue]]
speaker = "リーリア"
# 「さぁさぁ、返答やいかに！」
line = "「さぁさぁ、返答やいかに！」"

[[dialogue]]
speaker = "unk"
# 海に行こう！
line = "海に行こう！"

[[dialogue]]
speaker = "リーリア"
# 「わぁお！　やったぁ、ありがとうございます♪」
line = "「わぁお！　やったぁ、ありがとうございます♪」"

[[dialogue]]
speaker = "リーリア"
# 「……にしても、思ったよりあっさり陥落しましたね～」
line = "「……にしても、思ったよりあっさり陥落しましたね～」"

[[dialogue]]
speaker = "リーリア"
# 「何のことって……またまた、センパイってばとぼけちゃって～♪　それにしても、確かに海シーズンではありますが、人目につきません？　プールじゃないんですか？」
line = "「何のことって……またまた、センパイってばとぼけちゃって～♪　それにしても、確かに海シーズンではありますが、人目につきません？　プールじゃないんですか？」"

[[dialogue]]
speaker = "unk"
# 『エンドレスサマー』にご招待するよ
line = "『エンドレスサマー』にご招待するよ"

[[dialogue]]
speaker = "unk"
# ネビュラの皆さんにはお世話になったから
line = "ネビュラの皆さんにはお世話になったから"

[[dialogue]]
speaker = "リーリア"
# 「『エンドレスサマー』……？　聞いたことがあるような……」
line = "「『エンドレスサマー』……？　聞いたことがあるような……」"

[[dialogue]]
speaker = "リーリア"
# 「あ、思い出しました！　リップルさんが、夏を大いに楽しんでもらうために作り出したっていう巨大な結界ですよね？」
line = "「あ、思い出しました！　リップルさんが、夏を大いに楽しんでもらうために作り出したっていう巨大な結界ですよね？」"

[[dialogue]]
speaker = "リーリア"
# 「そもそも例の水着戦闘服の元になった星騎士の新種フォームも、そこで発見されたものなんでしたっけ？」
line = "「そもそも例の水着戦闘服の元になった星騎士の新種フォームも、そこで発見されたものなんでしたっけ？」"

[[dialogue]]
speaker = "unk"
# すごく綺麗なところだよ
line = "すごく綺麗なところだよ"

[[dialogue]]
speaker = "リーリア"
# 「ふふっ、それは楽しみです♪」
line = "「ふふっ、それは楽しみです♪」"

[[dialogue]]
speaker = "リーリア"
# 「あれ？　でも……待ってください？」
line = "「あれ？　でも……待ってください？」"

[[dialogue]]
speaker = "リーリア"
# 「先日のお礼ってことだと、『オペレーション・ペンタグラム』の打ち上げ、って感じに……なっちゃいませんか？」
line = "「先日のお礼ってことだと、『オペレーション・ペンタグラム』の打ち上げ、って感じに……なっちゃいませんか？」"

[[dialogue]]
speaker = "リーリア"
# 「そうなったら、私はネビュラのみんなを連れてこなきゃだし、センパイの方も星徒会のみなさんが一緒ってことに……？」
line = "「そうなったら、私はネビュラのみんなを連れてこなきゃだし、センパイの方も星徒会のみなさんが一緒ってことに……？」"

[[dialogue]]
speaker = "リーリア"
# 「その通りだけど問題ある？　って……も～～！　本当にセンパイはイジワルな人ですね！」
line = "「その通りだけど問題ある？　って……も～～！　本当にセンパイはイジワルな人ですね！」"

[[dialogue]]
speaker = "リーリア"
# （だって私は……センパイと２人きりがよかったんですけど？）
line = "（だって私は……センパイと２人きりがよかったんですけど？）"

[[dialogue]]
speaker = "リーリア"
# 「これは天然なのか、それとも防衛線を張られてるのか……まったく、どっちなんでしょうね～」
line = "「これは天然なのか、それとも防衛線を張られてるのか……まったく、どっちなんでしょうね～」"

[[dialogue]]
speaker = "リーリア"
# 「ま、今回はそれでいいです。水着戦闘服を持ち出す理由も作れますし、センパイに水着を見てもらうっていう目的は果たせますから」
line = "「ま、今回はそれでいいです。水着戦闘服を持ち出す理由も作れますし、センパイに水着を見てもらうっていう目的は果たせますから」"

[[dialogue]]
speaker = "リーリア"
# 「ネビュラの方には私が話を通しておきますので、そちらはセンパイがお願いしますね」
line = "「ネビュラの方には私が話を通しておきますので、そちらはセンパイがお願いしますね」"

[[dialogue]]
speaker = "リーリア"
# 「それじゃセンパイ、また連絡しま～す♪」
line = "「それじゃセンパイ、また連絡しま～す♪」"

[[dialogue]]
speaker = "unk"
# と、そんな経緯で突如、ネビュラの皆さんを招いての打ち上げ会が開かれることになったのだった。
line = "と、そんな経緯で突如、ネビュラの皆さんを招いての打ち上げ会が開かれることになったのだった。"
