[[dialogue]]
speaker = "マトイ"
# 「私が受け止めるから、今のうちに！」
line = "「私が受け止めるから、今のうちに！」"

[[dialogue]]
speaker = "マハムート"
# 「チョロチョロされるのが面倒ね……畏怖を持って跪きなさい！」
line = "「チョロチョロされるのが面倒ね……畏怖を持って跪きなさい！」"

[[dialogue]]
speaker = "アルモタヘル"
# 「ぐ……が……」
line = "「ぐ……が……」"

[[dialogue]]
speaker = "リーリア"
# 「動きが止まった……！　ありがとうございます、マム、マトイ先輩！」
line = "「動きが止まった……！　ありがとうございます、マム、マトイ先輩！」"

[[dialogue]]
speaker = "リーリア"
# 「この一発を彩るは、我が愛しき友たちとの青春！　全力全開──彩愛の魔弾・アオハルレインボー！！」
line = "「この一発を彩るは、我が愛しき友たちとの青春！　全力全開──彩愛の魔弾・アオハルレインボー！！」"

[[dialogue]]
speaker = "イクシリオン"
# 「我が命よ、燃え上がれ──ヒートヘイズダンス！」
line = "「我が命よ、燃え上がれ──ヒートヘイズダンス！」"

[[dialogue]]
speaker = "アルモタヘル"
# 「感謝、するぞ……」
line = "「感謝、するぞ……」"

[[dialogue]]
speaker = "イクシリオン"
# 「いいえ、もったいないお言葉です」
line = "「いいえ、もったいないお言葉です」"

[[dialogue]]
speaker = "セシア"
# 「アルモタヘルがフィーニスの塔へ戻ったわ。みんなお疲れ様」
line = "「アルモタヘルがフィーニスの塔へ戻ったわ。みんなお疲れ様」"

[[dialogue]]
speaker = "マハムート"
# 「さすがにハードな戦いだったわね。でもこれで新星学園の仕事は果たせたわ」
line = "「さすがにハードな戦いだったわね。でもこれで新星学園の仕事は果たせたわ」"

[[dialogue]]
speaker = "イクシリオン"
# 「堕天からお救いするためとはいえ、刃を向けて申し訳ありませんでした、アルモタヘル様……」
line = "「堕天からお救いするためとはいえ、刃を向けて申し訳ありませんでした、アルモタヘル様……」"

[[dialogue]]
speaker = "セシア"
# 「アルモタヘルを祀る一族とはいえ、気にすることはないわ。何より本人のためだもの」
line = "「アルモタヘルを祀る一族とはいえ、気にすることはないわ。何より本人のためだもの」"

[[dialogue]]
speaker = "イクシリオン"
# 「はい。理解してはいるのですが、幼い頃からアルモタヘル様を信奉していたので心が痛みました……」
line = "「はい。理解してはいるのですが、幼い頃からアルモタヘル様を信奉していたので心が痛みました……」"

[[dialogue]]
speaker = "イクシリオン"
# 「アルモタヘル様は生命の系譜を司るお方。命の営みを愛する私としては敬愛せずにはいられません」
line = "「アルモタヘル様は生命の系譜を司るお方。命の営みを愛する私としては敬愛せずにはいられません」"

[[dialogue]]
speaker = "ヨミ"
# 「命の営み……こやや……」
line = "「命の営み……こやや……」"

[[dialogue]]
speaker = "セシア"
# 「ヨミヨミ、どうしたの？」
line = "「ヨミヨミ、どうしたの？」"

[[dialogue]]
speaker = "ヨミ"
# 「いえ、なんでもありません……」
line = "「いえ、なんでもありません……」"

[[dialogue]]
speaker = "ヨミ"
# （いけない……今のがいやらしい話に聞こえた私は心が穢れています……心頭滅却、邪念必滅……！）
line = "（いけない……今のがいやらしい話に聞こえた私は心が穢れています……心頭滅却、邪念必滅……！）"

[[dialogue]]
speaker = "セシア"
# 「わたくしにも、イクシーのようにアウクセシアを祀る天使がいるのかしら？　いるとしたら、きっと豊かなバブみを持つママに違いないわ♪」
line = "「わたくしにも、イクシーのようにアウクセシアを祀る天使がいるのかしら？　いるとしたら、きっと豊かなバブみを持つママに違いないわ♪」"

[[dialogue]]
speaker = "リップル"
# 「流星市国に帰ったら、みんなでリゾート満喫しまショ～♪」
line = "「流星市国に帰ったら、みんなでリゾート満喫しまショ～♪」"

[[dialogue]]
speaker = "メルエル"
# 「わ～い、やったー！　リップルちゃんの結界で久々に泳ぎたい！」
line = "「わ～い、やったー！　リップルちゃんの結界で久々に泳ぎたい！」"

[[dialogue]]
speaker = "ユーリス"
# 「え、リゾートですか！？」
line = "「え、リゾートですか！？」"

[[dialogue]]
speaker = "リーリア"
# 「泳ぐ！？」
line = "「泳ぐ！？」"

[[dialogue]]
speaker = "紅明"
# 「おやおやおふたりさん、水着で何か都合が悪いことでもあるのかい？」
line = "「おやおやおふたりさん、水着で何か都合が悪いことでもあるのかい？」"

[[dialogue]]
speaker = "ユーリス"
# 「い、いえそんなことは……」
line = "「い、いえそんなことは……」"

[[dialogue]]
speaker = "ユーリス"
# （せめて肌の露出が少ない水着なら……いや胸を潰してもさすがに水着は厳しい……）
line = "（せめて肌の露出が少ない水着なら……いや胸を潰してもさすがに水着は厳しい……）"

[[dialogue]]
speaker = "リーリア"
# （世の中、あなたたちみたいなビッグバストばっかりじゃないんですよ！？）
line = "（世の中、あなたたちみたいなビッグバストばっかりじゃないんですよ！？）"

[[dialogue]]
speaker = "リーリア"
# （うん？　待てよ……この間覚えた幻覚魔法を使えば……いけるかも……！？）
line = "（うん？　待てよ……この間覚えた幻覚魔法を使えば……いけるかも……！？）"

[[dialogue]]
speaker = "紅明"
# 「２人とも黙り込んでどうしたんだぜ？」
line = "「２人とも黙り込んでどうしたんだぜ？」"

[[dialogue]]
speaker = "ユーリス"
# 「あ、いえ、何でもないですよ、何でも」
line = "「あ、いえ、何でもないですよ、何でも」"

[[dialogue]]
speaker = "リーリア"
# 「そうそう、何でもないですよ、あははは……」
line = "「そうそう、何でもないですよ、あははは……」"

[[dialogue]]
speaker = "紅明"
# 「？　なんか歯切れ悪いな～」
line = "「？　なんか歯切れ悪いな～」"

[[dialogue]]
speaker = "コハルコ"
# 『周囲に敵性反応なし。世界樹がもう一度開くまで待機していてください』
line = "『周囲に敵性反応なし。世界樹がもう一度開くまで待機していてください』"

[[dialogue]]
speaker = "リーリア"
# 「ラジャーですっ。でもコハルコ先輩、どうやって魔界まで通信してるんですか？　<ruby=ディスク>ＤＩＳＣ</ruby>の星騎士アプリって魔界でも通じるんです？」
line = "「ラジャーですっ。でもコハルコ先輩、どうやって魔界まで通信してるんですか？　<ruby>ＤＩＳＣ<rt>ディスク</rt></ruby>の星騎士アプリって魔界でも通じるんです？」"

[[dialogue]]
speaker = "コハルコ"
# 『詳しい原理はわからないけど、世界樹を通して人間界と魔界を繋げてるらしいの』
line = "『詳しい原理はわからないけど、世界樹を通して人間界と魔界を繋げてるらしいの』"

[[dialogue]]
speaker = "コハルコ"
# 『ネビュラの人たちから教えてもらったようにやったらできちゃった。世界樹って本当にすごいんだね』
line = "『ネビュラの人たちから教えてもらったようにやったらできちゃった。世界樹って本当にすごいんだね』"

[[dialogue]]
speaker = "リーリア"
# 「へ、へ～、そうなんですねー」
line = "「へ、へ～、そうなんですねー」"

[[dialogue]]
speaker = "リーリア"
# （そんな簡単にできていいんですかね、それ。うーん……）
line = "（そんな簡単にできていいんですかね、それ。うーん……）"

[[dialogue]]
speaker = "リーリア"
# 「何度か任務でコハルコ先輩の監視をやりましたけど、ネビュラがどうしてコハルコ先輩のこと気にしてるんですか？　やっぱりハッカーがいろいろまずいんです？」
line = "「何度か任務でコハルコ先輩の監視をやりましたけど、ネビュラがどうしてコハルコ先輩のこと気にしてるんですか？　やっぱりハッカーがいろいろまずいんです？」"

[[dialogue]]
speaker = "ウェンディ"
# 「ええ。ジャスティスウィザードと呼ばれる彼女の腕をもってすれば、関連企業のデータから我々の存在を知る可能性がありましたからね」
line = "「ええ。ジャスティスウィザードと呼ばれる彼女の腕をもってすれば、関連企業のデータから我々の存在を知る可能性がありましたからね」"

[[dialogue]]
speaker = "リーリア"
# 「じゃあ今後は監視しなくていいんですよね？　もうネビュラのことは知られちゃいましたし」
line = "「じゃあ今後は監視しなくていいんですよね？　もうネビュラのことは知られちゃいましたし」"

[[dialogue]]
speaker = "ウェンディ"
# 「……それは直属の上司であるマリオンに聞きなさい」
line = "「……それは直属の上司であるマリオンに聞きなさい」"

[[dialogue]]
speaker = "リーリア"
# 「絶対他に理由があるやつじゃないですかーっ！？」
line = "「絶対他に理由があるやつじゃないですかーっ！？」"

[[dialogue]]
speaker = "リーリア"
# （実際聞いてみたら適当にはぐらかされちゃいましたし、コハルコ先輩って何者なんでしょう……？）
line = "（実際聞いてみたら適当にはぐらかされちゃいましたし、コハルコ先輩って何者なんでしょう……？）"

[[dialogue]]
speaker = "マトイ"
# 「アルモタヘルさんを解放できて良かった～……。でも……」
line = "「アルモタヘルさんを解放できて良かった～……。でも……」"

[[dialogue]]
speaker = "マハムート"
# 「でも？　どうかした？」
line = "「でも？　どうかした？」"

[[dialogue]]
speaker = "マトイ"
# 「あ、何でもないです、何でも。あはは……」
line = "「あ、何でもないです、何でも。あはは……」"

[[dialogue]]
speaker = "マトイ"
# （星徒会役員なのに、あんまり活躍できてなかった……。もっと広い範囲を守れれば、みんなも攻撃に集中できたはずなのに……）
line = "（星徒会役員なのに、あんまり活躍できてなかった……。もっと広い範囲を守れれば、みんなも攻撃に集中できたはずなのに……）"

[[dialogue]]
speaker = "マトイ"
# 「はぁ～……」
line = "「はぁ～……」"
