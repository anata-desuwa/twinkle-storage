[[dialogue]]
speaker = "unk"
# 第１話,さすらいの旅人、ラティエ,P
line = "第１話,さすらいの旅人、ラティエ,P"

[[dialogue]]
speaker = "unk"
# とある日の放課後──流星学園の星徒会室を訪れた俺は、意外な人物と再会した。
line = "とある日の放課後──流星学園の星徒会室を訪れた俺は、意外な人物と再会した。"

[[dialogue]]
speaker = "ルリエル"
# 「行きますよ～っ！　ルリエル渾身のー、カラーチェンジ！　旅人さん、赤は持っていないはずですっ！」
line = "「行きますよ～っ！　ルリエル渾身のー、カラーチェンジ！　旅人さん、赤は持っていないはずですっ！」"

[[dialogue]]
speaker = "ラティエ"
# 「はっはっ、慧眼だな。確かに赤はないが……む。トップから赤を引いたぞ。ついでにペアも出せるじゃないか。フフ、これで残り１枚だ」
line = "「はっはっ、慧眼だな。確かに赤はないが……む。トップから赤を引いたぞ。ついでにペアも出せるじゃないか。フフ、これで残り１枚だ」"

[[dialogue]]
speaker = "ルリエル"
# 「うわーん！　また旅人さんのディスティニードローです～っ！　どうやったら倒せるのですかぁ！？」
line = "「うわーん！　また旅人さんのディスティニードローです～っ！　どうやったら倒せるのですかぁ！？」"

[[dialogue]]
speaker = "ユウリ"
# 「あれ、でもＵＭＯって言ってないよーな？」
line = "「あれ、でもＵＭＯって言ってないよーな？」"

[[dialogue]]
speaker = "ラティエ"
# 「そうだったか？　いかんな、また忘れてしまった。では２枚カードを引くとしようか」
line = "「そうだったか？　いかんな、また忘れてしまった。では２枚カードを引くとしようか」"

[[dialogue]]
speaker = "ルリエル"
# 「やったのです～っ！　これでまだまだ盤面は膠着状態！　ここから盛り返すのですよ～っ！」
line = "「やったのです～っ！　これでまだまだ盤面は膠着状態！　ここから盛り返すのですよ～っ！」"

[[dialogue]]
speaker = "unk"
# ラティエさん、何やってるんですか？
line = "ラティエさん、何やってるんですか？"

[[dialogue]]
speaker = "ラティエ"
# 「ん？　ああ、きみか。何、ちょっとした気まぐれだよ。つい最近、流星市国に帰ってきてね」
line = "「ん？　ああ、きみか。何、ちょっとした気まぐれだよ。つい最近、流星市国に帰ってきてね」"

[[dialogue]]
speaker = "ラティエ"
# 「星徒会室を冷やかしに来たら、楠葉たちが札遊びに誘ってくれてね。意外と奥が深いものだよ、これは。なかなか勝てん」
line = "「星徒会室を冷やかしに来たら、楠葉たちが札遊びに誘ってくれてね。意外と奥が深いものだよ、これは。なかなか勝てん」"

[[dialogue]]
speaker = "ユウリ"
# 「ＵＭＯって言い忘れてなきゃ、もう１０回は勝ってますって……」
line = "「ＵＭＯって言い忘れてなきゃ、もう１０回は勝ってますって……」"

[[dialogue]]
speaker = "ルリエル"
# 「旅人さん、運はすごいですがルールにはまだ不慣れなのです！　ルリエルが勝つには今がチャンスなのですぅ！」
line = "「旅人さん、運はすごいですがルールにはまだ不慣れなのです！　ルリエルが勝つには今がチャンスなのですぅ！」"

[[dialogue]]
speaker = "セーラ"
# 「ちなみにルリちーもよく言い忘れてるよん。二人していい勝負ってカンジ？　一騎打ちだねぇ」
line = "「ちなみにルリちーもよく言い忘れてるよん。二人していい勝負ってカンジ？　一騎打ちだねぇ」"

[[dialogue]]
speaker = "セーラ"
# 「ところで会長さんは何の用事？　一緒にＵＭＯしちゃう？」
line = "「ところで会長さんは何の用事？　一緒にＵＭＯしちゃう？」"

[[dialogue]]
speaker = "unk"
# フィオナに用事があったんだけど
line = "フィオナに用事があったんだけど"

[[dialogue]]
speaker = "ユウリ"
# 「あぁ、フィオナなら出かけてるよ。もうすぐ帰ってくるんじゃねえか？」
line = "「あぁ、フィオナなら出かけてるよ。もうすぐ帰ってくるんじゃねえか？」"

[[dialogue]]
speaker = "セーラ"
# 「ルリちーたちの一騎打ちが終わったら、５人で遊ぼっか♪」
line = "「ルリちーたちの一騎打ちが終わったら、５人で遊ぼっか♪」"

[[dialogue]]
speaker = "ルリエル"
# 「はぅう。でもフィオナ会長、遅いのです。何かあったのでしょうか……４」
line = "「はぅう。でもフィオナ会長、遅いのです。何かあったのでしょうか……４」"

[[dialogue]]
speaker = "ラティエ"
# 「ほう、星徒会長殿はやはり忙しい身の上なのかな？　６」
line = "「ほう、星徒会長殿はやはり忙しい身の上なのかな？　６」"

[[dialogue]]
speaker = "ルリエル"
# 「はい！　この流星学園はとっても大きな学園ですから。フィオナ会長がいなければ一日ともたないのです！　３っ」
line = "「はい！　この流星学園はとっても大きな学園ですから。フィオナ会長がいなければ一日ともたないのです！　３っ」"

[[dialogue]]
speaker = "ルリエル"
# 「もちろんルリエルたち星徒会メンバーも、日々学園のために東へ西へ、大活躍なのですよっ」
line = "「もちろんルリエルたち星徒会メンバーも、日々学園のために東へ西へ、大活躍なのですよっ」"

[[dialogue]]
speaker = "unk"
# その割には遊んでいるような……
line = "その割には遊んでいるような……"

[[dialogue]]
speaker = "ルリエル"
# 「し、心外ですっ。今日はこのお部屋で待機するのがお仕事なのです！」
line = "「し、心外ですっ。今日はこのお部屋で待機するのがお仕事なのです！」"

[[dialogue]]
speaker = "ルリエル"
# 「会長さん、驚かないでくださいね。なんと今日は、流星の学園長がここにお邪魔するそうなのです！」
line = "「会長さん、驚かないでくださいね。なんと今日は、流星の学園長がここにお邪魔するそうなのです！」"

[[dialogue]]
speaker = "unk"
# え、でも目の前に……
line = "え、でも目の前に……"

[[dialogue]]
speaker = "セーラ"
# 「（しーっ！　ルリちーだけ、まだ気づいてないの。だから内緒ね♪）」
line = "「（しーっ！　ルリちーだけ、まだ気づいてないの。だから内緒ね♪）」"

[[dialogue]]
speaker = "ユウリ"
# 「あたしらは魔界で会ってるけどな、ルリのやつだけ初対面だろ？　ラティエさんが学園長ってずっと気づかねーから面白くってな」
line = "「あたしらは魔界で会ってるけどな、ルリのやつだけ初対面だろ？　ラティエさんが学園長ってずっと気づかねーから面白くってな」"

[[dialogue]]
speaker = "ルリエル"
# 「旅人さんは知らないと思いますが、うちの学園長はとても謎に包まれているんですよ」
line = "「旅人さんは知らないと思いますが、うちの学園長はとても謎に包まれているんですよ」"

[[dialogue]]
speaker = "ラティエ"
# 「ほう。学園長なのに謎の人物……姿を見せないということかな？」
line = "「ほう。学園長なのに謎の人物……姿を見せないということかな？」"

[[dialogue]]
speaker = "ルリエル"
# 「はい！　いつも色んなところを気ままに放浪しているんです。なんと入学式の時ですら欠席していたのです！」
line = "「はい！　いつも色んなところを気ままに放浪しているんです。なんと入学式の時ですら欠席していたのです！」"

[[dialogue]]
speaker = "ルリエル"
# 「おかげでフィオナ会長のお仕事も増えるばっかり。きっと自分勝手でワガママな、悪～い人なのですよ……！」
line = "「おかげでフィオナ会長のお仕事も増えるばっかり。きっと自分勝手でワガママな、悪～い人なのですよ……！」"

[[dialogue]]
speaker = "ラティエ"
# 「はっはっ。それは厄介だな。ずいぶんと自由人なようだ」
line = "「はっはっ。それは厄介だな。ずいぶんと自由人なようだ」"

[[dialogue]]
speaker = "unk"
# （楽しそうにルリエルと話してる……）
line = "（楽しそうにルリエルと話してる……）"

[[dialogue]]
speaker = "ルリエル"
# 「だからルリエル、学園長にお会いしたらビシっと言ってやるつもりなのです。ちょっとはお仕事をしてくださいっ！　と」
line = "「だからルリエル、学園長にお会いしたらビシっと言ってやるつもりなのです。ちょっとはお仕事をしてくださいっ！　と」"

[[dialogue]]
speaker = "ラティエ"
# 「うむ、それは結構だが……ＵＭＯで遊んでいるきみが言っても、相手には響かないかもしれんぞ？」
line = "「うむ、それは結構だが……ＵＭＯで遊んでいるきみが言っても、相手には響かないかもしれんぞ？」"

[[dialogue]]
speaker = "ルリエル"
# 「大丈夫なのですっ。学園長が来る前にお片付けしてしまえば証拠はありません！　ルリエルの作戦はばっちりなのです！」
line = "「大丈夫なのですっ。学園長が来る前にお片付けしてしまえば証拠はありません！　ルリエルの作戦はばっちりなのです！」"

[[dialogue]]
speaker = "ラティエ"
# 「ははははっ！　珍しいな。天使は生真面目な者が多いのだが、きみのような子もいるのだね。やはり世界は広い」
line = "「ははははっ！　珍しいな。天使は生真面目な者が多いのだが、きみのような子もいるのだね。やはり世界は広い」"

[[dialogue]]
speaker = "フィオナ"
# 「──やっと見つけました！」
line = "「──やっと見つけました！」"

[[dialogue]]
speaker = "ルリエル"
# 「あっ、フィオナ会長なのです。お疲れ様です～」
line = "「あっ、フィオナ会長なのです。お疲れ様です～」"

[[dialogue]]
speaker = "ラティエ"
# 「や、星見嬢。ずいぶんと遅れた到着じゃないか」
line = "「や、星見嬢。ずいぶんと遅れた到着じゃないか」"

[[dialogue]]
speaker = "フィオナ"
# 「はぁ……お願いですからちゃんと指定した待ち合わせ場所にいてください。おかげで探し回ってしまいました」
line = "「はぁ……お願いですからちゃんと指定した待ち合わせ場所にいてください。おかげで探し回ってしまいました」"

[[dialogue]]
speaker = "ラティエ"
# 「……そうだったか？　はっはっ、すまない。忘れていたよ」
line = "「……そうだったか？　はっはっ、すまない。忘れていたよ」"

[[dialogue]]
speaker = "フィオナ"
# 「まったくもう、あなたは……！」
line = "「まったくもう、あなたは……！」"

[[dialogue]]
speaker = "ルリエル"
# 「フィオナ会長。こちら、流星市国に最近やってこられた、旅人のラティエさんなのです！　とっても面白いお方で──」
line = "「フィオナ会長。こちら、流星市国に最近やってこられた、旅人のラティエさんなのです！　とっても面白いお方で──」"

[[dialogue]]
speaker = "フィオナ"
# 「……ラティエ学園長、あまりうちのルリエルをからかわないでくださいね」
line = "「……ラティエ学園長、あまりうちのルリエルをからかわないでくださいね」"

[[dialogue]]
speaker = "ルリエル"
# 「──えぇええっ！　学園長っ！？　旅人さんが！？」
line = "「──えぇええっ！　学園長っ！？　旅人さんが！？」"

[[dialogue]]
speaker = "ラティエ"
# 「堅苦しいのは嫌いなんだ。ルリエル嬢のように気兼ねなく接してもらえた方が、私も嬉しくてね。つい旅人のまま通してしまったよ」
line = "「堅苦しいのは嫌いなんだ。ルリエル嬢のように気兼ねなく接してもらえた方が、私も嬉しくてね。つい旅人のまま通してしまったよ」"

[[dialogue]]
speaker = "ラティエ"
# 「さ──それでは親睦会を始めようか。きみたちの学園生活のこと、色々と聞かせてもらえると嬉しいな？」
line = "「さ──それでは親睦会を始めようか。きみたちの学園生活のこと、色々と聞かせてもらえると嬉しいな？」"

[[dialogue]]
speaker = "unk"
# その後、流星星徒会の親睦会に俺も参加し、楽しい会食をすることになったのだが……ルリエルだけは終始、顔を真っ青にしていたのだった。
line = "その後、流星星徒会の親睦会に俺も参加し、楽しい会食をすることになったのだが……ルリエルだけは終始、顔を真っ青にしていたのだった。"

[[dialogue]]
speaker = "ルリエル"
# 「ふぇええぇえ……失礼なこと、言いまくっちゃった気がしますぅ……た、退学とか、ならないですよねぇ……！？」
line = "「ふぇええぇえ……失礼なこと、言いまくっちゃった気がしますぅ……た、退学とか、ならないですよねぇ……！？」"
