line = "「トリックオアトリートだゆ～♪」"

[[dialogue]]
speaker = "ウズメイア"
# 「お菓子をくれなきゃイタズラしちゃうし～！」
line = "「お菓子をくれなきゃイタズラしちゃうし～！」"

[[dialogue]]
speaker = "ソフィア"
# 「ほかほかのパンケーキを隠していませんか？　もしあるなら速やかに出してください」
line = "「ほかほかのパンケーキを隠していませんか？　もしあるなら速やかに出してください」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「なんだかあっという間に時間がすぎてしまったゆ」
line = "「なんだかあっという間に時間がすぎてしまったゆ」"

[[dialogue]]
speaker = "ウズメイア"
# 「ほんとだ、もう日が沈みかかってるし」
line = "「ほんとだ、もう日が沈みかかってるし」"

[[dialogue]]
speaker = "ソフィア"
# 「時間が過ぎるのを早く感じるというのは、それだけ楽しかったということですよ」
line = "「時間が過ぎるのを早く感じるというのは、それだけ楽しかったということですよ」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「２人とも楽しかったゆ？　だったら余も嬉しいゆ♪」
line = "「２人とも楽しかったゆ？　だったら余も嬉しいゆ♪」"

[[dialogue]]
speaker = "ウズメイア"
# 「もうサイコーだし！　そういうゆゆ姫ちゃんはどうだった？」
line = "「もうサイコーだし！　そういうゆゆ姫ちゃんはどうだった？」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「余も楽しかったゆ！　また次のハロウィンも一緒に遊びたいゆ！」
line = "「余も楽しかったゆ！　また次のハロウィンも一緒に遊びたいゆ！」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
