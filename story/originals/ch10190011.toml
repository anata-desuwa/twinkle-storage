[[dialogue]]
speaker = "unk"
# 第１話,メイドで忍者でござる,P
line = "第１話,メイドで忍者でござる,P"

[[dialogue]]
speaker = "unk"
# 最近、誰かにストーキングされている気がする――
line = "最近、誰かにストーキングされている気がする――"

[[dialogue]]
speaker = "unk"
# というわけで、俺はストーキングの専門家……もといヴィーナスの護衛である九浄家メイド隊の閃の元を訪ねた。
line = "というわけで、俺はストーキングの専門家……もといヴィーナスの護衛である九浄家メイド隊の閃の元を訪ねた。"

[[dialogue]]
speaker = "閃"
# 「それで何故、私のところに……！？　言っておきますけど、犯人は私じゃありませんよ！？」
line = "「それで何故、私のところに……！？　言っておきますけど、犯人は私じゃありませんよ！？」"

[[dialogue]]
speaker = "unk"
# ヴィーナスのストーキングはしてるでしょ？
line = "ヴィーナスのストーキングはしてるでしょ？"

[[dialogue]]
speaker = "閃"
# 「ストーキングではなく、護衛ですっ。まさか私に相談に来たのは、同類だからとかそういうアレですか！？」
line = "「ストーキングではなく、護衛ですっ。まさか私に相談に来たのは、同類だからとかそういうアレですか！？」"

[[dialogue]]
speaker = "閃"
# 「うぅっ……お嬢様にも同じように思われてないでしょうか……？　だ、大丈夫……ですよね？」
line = "「うぅっ……お嬢様にも同じように思われてないでしょうか……？　だ、大丈夫……ですよね？」"

[[dialogue]]
speaker = "せつな"
# 「大丈夫でござる！　お嬢様は閃殿なら許容範囲だと仰っていたでござるよ！」
line = "「大丈夫でござる！　お嬢様は閃殿なら許容範囲だと仰っていたでござるよ！」"

[[dialogue]]
speaker = "閃"
# 「ストーキングだと思われてる――――っ！！？」
line = "「ストーキングだと思われてる――――っ！！？」"

[[dialogue]]
speaker = "せつな"
# 「しかし、会長殿に勘づかれていたとは、せつなも忍者としてまだまだ未熟でござる。感情を抑え切れず、気配を消し切れなかったのが原因でござろうか？」
line = "「しかし、会長殿に勘づかれていたとは、せつなも忍者としてまだまだ未熟でござる。感情を抑え切れず、気配を消し切れなかったのが原因でござろうか？」"

[[dialogue]]
speaker = "unk"
# へぇ、忍者……って誰！？
line = "へぇ、忍者……って誰！？"

[[dialogue]]
speaker = "せつな"
# 「おっと、これは失礼つかまつりました。会長殿と閃殿の会話が楽しそうだったのでつい、忍ぶのを忘れてしまったでござる」
line = "「おっと、これは失礼つかまつりました。会長殿と閃殿の会話が楽しそうだったのでつい、忍ぶのを忘れてしまったでござる」"

[[dialogue]]
speaker = "閃"
# 「ああ、なるほど。会長さんをストーキングしていた犯人は、あなただったんですね、せつな」
line = "「ああ、なるほど。会長さんをストーキングしていた犯人は、あなただったんですね、せつな」"

[[dialogue]]
speaker = "せつな"
# 「はい♪　お初にお目に掛かりまする、会長殿。新星学園１年生で、紫桜の里出身、甲賀流くノ一兼メイド！　『せつな』と申しまする！」
line = "「はい♪　お初にお目に掛かりまする、会長殿。新星学園１年生で、紫桜の里出身、甲賀流くノ一兼メイド！　『せつな』と申しまする！」"

[[dialogue]]
speaker = "unk"
# メイドってことは、もしかして──
line = "メイドってことは、もしかして──"

[[dialogue]]
speaker = "閃"
# 「ええ、彼女も私と同じく、『九浄家メイド隊』の一員です。紫桜の里は、甲賀流忍者が暮らす隠れ里で、彼女はそこで育った、正真正銘本物の忍者なんですよ」
line = "「ええ、彼女も私と同じく、『九浄家メイド隊』の一員です。紫桜の里は、甲賀流忍者が暮らす隠れ里で、彼女はそこで育った、正真正銘本物の忍者なんですよ」"

[[dialogue]]
speaker = "せつな"
# 「にんにん♪　故にストーキングは、閃殿以上に得意でござるよ！」
line = "「にんにん♪　故にストーキングは、閃殿以上に得意でござるよ！」"

[[dialogue]]
speaker = "閃"
# 「私は別に、得意なつもりはないんですが……」
line = "「私は別に、得意なつもりはないんですが……」"

[[dialogue]]
speaker = "せつな"
# 「会長殿はもうご存知のようですが、九浄家メイド隊は、お館様が星見家メイド隊に対抗して作った組織でござる」
line = "「会長殿はもうご存知のようですが、九浄家メイド隊は、お館様が星見家メイド隊に対抗して作った組織でござる」"

[[dialogue]]
speaker = "せつな"
# 「お屋敷の仕事はもちろんですが、学園運営の手伝いも行っておりまする」
line = "「お屋敷の仕事はもちろんですが、学園運営の手伝いも行っておりまする」"

[[dialogue]]
speaker = "せつな"
# 「せつながメイド隊に入ったのは、九浄家のお館様へ恩返しをする為。以前、アステラ発生の余波で里に大量のモンスターが現れたことがあったでござるが――」
line = "「せつながメイド隊に入ったのは、九浄家のお館様へ恩返しをする為。以前、アステラ発生の余波で里に大量のモンスターが現れたことがあったでござるが――」"

[[dialogue]]
speaker = "せつな"
# 「それによって大きな被害が出た際、お館様が復興の支援をして下さったのでござる。その奉公として、メイドの仕事をさせて頂くことになったのでござるよ」
line = "「それによって大きな被害が出た際、お館様が復興の支援をして下さったのでござる。その奉公として、メイドの仕事をさせて頂くことになったのでござるよ」"

[[dialogue]]
speaker = "unk"
# どうして俺をストーキングしてたんだ？
line = "どうして俺をストーキングしてたんだ？"

[[dialogue]]
speaker = "unk"
# とりあえず、キミの素性は分かったけど
line = "とりあえず、キミの素性は分かったけど"

[[dialogue]]
speaker = "せつな"
# 「それはズバリ、見極めたかったのでござる！　会長殿がどのようなお方なのかを！」
line = "「それはズバリ、見極めたかったのでござる！　会長殿がどのようなお方なのかを！」"

[[dialogue]]
speaker = "せつな"
# 「そして、やはり会長殿は、せつなの想像通りのお方に間違いないと思ったでござる！　故に会長殿、どうか――」
line = "「そして、やはり会長殿は、せつなの想像通りのお方に間違いないと思ったでござる！　故に会長殿、どうか――」"

[[dialogue]]
speaker = "せつな"
# 「せつなの『主様』となって頂けませぬか！　一旦仮でもいいので！」
line = "「せつなの『主様』となって頂けませぬか！　一旦仮でもいいので！」"

[[dialogue]]
speaker = "unk"
# え！？
line = "え！？"

[[dialogue]]
speaker = "閃"
# 「そういえばよく、自分が仕えるべき主を探している、と言っていましたね。確かそれは、男性である必要があるとも……」
line = "「そういえばよく、自分が仕えるべき主を探している、と言っていましたね。確かそれは、男性である必要があるとも……」"

[[dialogue]]
speaker = "せつな"
# 「はい、師匠の教えにござる。一生側に仕えたいと思える強い殿方を己が主に選べと。御前試合であのお嬢様に勝った会長殿は、まさにせつなの探していた存在でござる！」
line = "「はい、師匠の教えにござる。一生側に仕えたいと思える強い殿方を己が主に選べと。御前試合であのお嬢様に勝った会長殿は、まさにせつなの探していた存在でござる！」"

[[dialogue]]
speaker = "せつな"
# 「……まぐれ勝ち？　いやいや会長殿、謙遜など不要でござる」
line = "「……まぐれ勝ち？　いやいや会長殿、謙遜など不要でござる」"

[[dialogue]]
speaker = "せつな"
# 「戦いが強いかどうかだけでなく、せつなは会長殿を観察させて頂き、そのお人柄も好ましいと感じたのでござる。それこそ――」
line = "「戦いが強いかどうかだけでなく、せつなは会長殿を観察させて頂き、そのお人柄も好ましいと感じたのでござる。それこそ――」"

[[dialogue]]
speaker = "せつな"
# 「この人ならば、師匠から伝授された房中術を捧げても構わないと思える程に！」
line = "「この人ならば、師匠から伝授された房中術を捧げても構わないと思える程に！」"

[[dialogue]]
speaker = "閃"
# 「ぼっ！？」
line = "「ぼっ！？」"

[[dialogue]]
speaker = "unk"
# いま何て！？
line = "いま何て！？"

[[dialogue]]
speaker = "せつな"
# 「む？　房中術にござる。どういう術かというと、女の体を使い、殿方の――」
line = "「む？　房中術にござる。どういう術かというと、女の体を使い、殿方の――」"

[[dialogue]]
speaker = "閃"
# 「いっ、言わなくていいです！　それ以上は説明しなくていいですからっ！」
line = "「いっ、言わなくていいです！　それ以上は説明しなくていいですからっ！」"

[[dialogue]]
speaker = "せつな"
# 「せつなの師匠は、里１番のくノ一で、房中術を最も得意としているのでござるよ。せつなにとって、こんな風になりたいと憧れる女性であり、忍びとしての目標なのでござる」
line = "「せつなの師匠は、里１番のくノ一で、房中術を最も得意としているのでござるよ。せつなにとって、こんな風になりたいと憧れる女性であり、忍びとしての目標なのでござる」"

[[dialogue]]
speaker = "せつな"
# 「その師匠から『強い男を掴まえて、私の教えた房中術を使って欲しい。出来ればその後、里に連れ帰って欲しい』と言われ、主様を探していたのでござるよ！」
line = "「その師匠から『強い男を掴まえて、私の教えた房中術を使って欲しい。出来ればその後、里に連れ帰って欲しい』と言われ、主様を探していたのでござるよ！」"

[[dialogue]]
speaker = "unk"
# さっきと意味合いが変わって来るよ！？
line = "さっきと意味合いが変わって来るよ！？"

[[dialogue]]
speaker = "閃"
# 「ひょっとして紫桜の里、若い男性が少なかったりするのでは……？」
line = "「ひょっとして紫桜の里、若い男性が少なかったりするのでは……？」"

[[dialogue]]
speaker = "せつな"
# 「その通りでござる。何故分かったのでござるか？」
line = "「その通りでござる。何故分かったのでござるか？」"

[[dialogue]]
speaker = "閃"
# 「……会長さん、婿入り大変そうですが、頑張って下さい」
line = "「……会長さん、婿入り大変そうですが、頑張って下さい」"

[[dialogue]]
speaker = "unk"
# まだ決めたわけじゃないから！
line = "まだ決めたわけじゃないから！"

[[dialogue]]
speaker = "unk"
# いやいや待って！
line = "いやいや待って！"

[[dialogue]]
speaker = "せつな"
# 「そんな……！　学園に来てからずっと主様と呼べる殿方を探し続け、ようやく見つけたと思ったのに……！」
line = "「そんな……！　学園に来てからずっと主様と呼べる殿方を探し続け、ようやく見つけたと思ったのに……！」"

[[dialogue]]
speaker = "せつな"
# 「うぅ……会長殿ぉ、何とか、何とかお試しだけでも、ダメでござるかぁ……？」
line = "「うぅ……会長殿ぉ、何とか、何とかお試しだけでも、ダメでござるかぁ……？」"

[[dialogue]]
speaker = "unk"
# まあ、お試しだけなら……
line = "まあ、お試しだけなら……"

[[dialogue]]
speaker = "unk"
# そ、そんな悲しそうな顔をされると……
line = "そ、そんな悲しそうな顔をされると……"

[[dialogue]]
speaker = "せつな"
# 「本当でござるか！？　やったー！　房中術成功でござるにゃん♪」
line = "「本当でござるか！？　やったー！　房中術成功でござるにゃん♪」"

[[dialogue]]
speaker = "せつな"
# 「殿方には瞳を潤ませながらの上目遣い！　これも師匠の教えにござりますれば！」
line = "「殿方には瞳を潤ませながらの上目遣い！　これも師匠の教えにござりますれば！」"

[[dialogue]]
speaker = "unk"
# というか、それは房中術なのか！？
line = "というか、それは房中術なのか！？"

[[dialogue]]
speaker = "unk"
# 騙されたぁ――――っ！？
line = "騙されたぁ――――っ！？"

[[dialogue]]
speaker = "せつな"
# 「お試しとはいえ、せつな自身で会長殿にお仕えすると決めた以上、一生を捧げる覚悟で尽くします故、どうかせつなの忠義を見ていて下さいませ」
line = "「お試しとはいえ、せつな自身で会長殿にお仕えすると決めた以上、一生を捧げる覚悟で尽くします故、どうかせつなの忠義を見ていて下さいませ」"

[[dialogue]]
speaker = "せつな"
# 「己が掟を貫きて、耐えて忍ぶが我が忍道――」
line = "「己が掟を貫きて、耐えて忍ぶが我が忍道――」"

[[dialogue]]
speaker = "せつな"
# 「このせつな、仮では無く、必ずや認めて頂けるような立派な忍になってみせまする！」
line = "「このせつな、仮では無く、必ずや認めて頂けるような立派な忍になってみせまする！」"

[[dialogue]]
speaker = "せつな"
# 「ですので、どうか末永く、よろしくお願い致しますね、主様♪」
line = "「ですので、どうか末永く、よろしくお願い致しますね、主様♪」"
