[[dialogue]]
speaker = "unk"
# 第３話,仮面なき偽りの英雄,B
line = "第３話,仮面なき偽りの英雄,B"

[[dialogue]]
speaker = "ギエル"
# 「アポロ様。僭越ながら、これ以上の妄言に付き合う義理はないかと」
line = "「アポロ様。僭越ながら、これ以上の妄言に付き合う義理はないかと」"

[[dialogue]]
speaker = "ギエル"
# 「倒すべき仇もそこにおります。まずは軽く、この流星市国を地図から消してさしあげましょう」
line = "「倒すべき仇もそこにおります。まずは軽く、この流星市国を地図から消してさしあげましょう」"

[[dialogue]]
speaker = "アポロ"
# 「ああ……そうだなギエル」
line = "「ああ……そうだなギエル」"

[[dialogue]]
speaker = "アポロ"
# 「この鬱陶しい連中を、世界より一足先に滅亡させてやる！」
line = "「この鬱陶しい連中を、世界より一足先に滅亡させてやる！」"

[[dialogue]]
speaker = "ギエル"
# 「ええ、そうですとも！　あなた様こそが三千世界に唯一のメシア！　あのような<ruby=むちもうまい>無知蒙昧</ruby>の戯言など気にする必要はありません！」
line = "「ええ、そうですとも！　あなた様こそが三千世界に唯一のメシア！　あのような<ruby>無知蒙昧<rt>むちもうまい</rt></ruby>の戯言など気にする必要はありません！」"

[[dialogue]]
speaker = "クロト"
# 「っ、これは……」
line = "「っ、これは……」"

[[dialogue]]
speaker = "unk"
# 夜空に砕け散っていた仮面の破片が、とてつもない混沌の瘴気をまとってアポロへと戻ってくる。
line = "夜空に砕け散っていた仮面の破片が、とてつもない混沌の瘴気をまとってアポロへと戻ってくる。"

[[dialogue]]
speaker = "unk"
# さらに、膨れ上がる流星の力──
line = "さらに、膨れ上がる流星の力──"

[[dialogue]]
speaker = "ヴィーナス"
# 「あの大嵐が来るわ──クロト！」
line = "「あの大嵐が来るわ──クロト！」"

[[dialogue]]
speaker = "クロト"
# 「ああ──！」
line = "「ああ──！」"

[[dialogue]]
speaker = "unk"
# 流星ストームの予兆を感じ、俺とヴィーナスは封じ込みのフォーメーションを組む。
line = "流星ストームの予兆を感じ、俺とヴィーナスは封じ込みのフォーメーションを組む。"

[[dialogue]]
speaker = "unk"
# だが──
line = "だが──"

[[dialogue]]
speaker = "アポロ"
# 「──ふぅ……」
line = "「──ふぅ……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「え……？　不発……？」
line = "「え……？　不発……？」"

[[dialogue]]
speaker = "unk"
# 嵐が止む。
line = "嵐が止む。"

[[dialogue]]
speaker = "unk"
# だが、不発ではなかった。
line = "だが、不発ではなかった。"

[[dialogue]]
speaker = "unk"
# 流星の嵐──その勢いと瞬きはすべて彼女の担ぐ大剣へ吸い込まれていく。
line = "流星の嵐──その勢いと瞬きはすべて彼女の担ぐ大剣へ吸い込まれていく。"

[[dialogue]]
speaker = "アポロ"
# 「潰すぞ」
line = "「潰すぞ」"

[[dialogue]]
speaker = "ギエル"
# 「素晴らしい」
line = "「素晴らしい」"

[[dialogue]]
speaker = "ソフィア"
# 「きゃああああああっっ────！」
line = "「きゃああああああっっ────！」"

[[dialogue]]
speaker = "サーシャ"
# 「こっちへ来て、ソフィ──！」
line = "「こっちへ来て、ソフィ──！」"

[[dialogue]]
speaker = "unk"
# 市街中に吹き荒れていた流星──死した星々──の力が、あの大剣一本に集約されてみなぎっている。
line = "市街中に吹き荒れていた流星──死した星々──の力が、あの大剣一本に集約されてみなぎっている。"

[[dialogue]]
speaker = "unk"
# その剣閃は輝かしい軌道を夜空に描くも、星屑を掠めただけで死をもたらす致命のきらめきだ。
line = "その剣閃は輝かしい軌道を夜空に描くも、星屑を掠めただけで死をもたらす致命のきらめきだ。"

[[dialogue]]
speaker = "アポロ"
# 「消えろ──オマエのコトバは、聞くに耐えない」
line = "「消えろ──オマエのコトバは、聞くに耐えない」"

[[dialogue]]
speaker = "エリシア"
# 「消えません──姉さんの目を覚ますまではっ！」
line = "「消えません──姉さんの目を覚ますまではっ！」"

[[dialogue]]
speaker = "unk"
# かつてない凍えた怒りを宿すアポロ。
line = "かつてない凍えた怒りを宿すアポロ。"

[[dialogue]]
speaker = "unk"
# 自らを正義の味方と鼓舞していた、あの英雄気取りの口上も失せている。
line = "自らを正義の味方と鼓舞していた、あの英雄気取りの口上も失せている。"

[[dialogue]]
speaker = "unk"
# その攻撃はエリシア一人だけを徹底的に狙っていて、俺たちの様子など視界にも入っていない様子だった。
line = "その攻撃はエリシア一人だけを徹底的に狙っていて、俺たちの様子など視界にも入っていない様子だった。"

[[dialogue]]
speaker = "ユウリ"
# 「ああもうっ！　ワケわかんねえけどあたしらの頭がピンチだ──助けるぞ！」
line = "「ああもうっ！　ワケわかんねえけどあたしらの頭がピンチだ──助けるぞ！」"

[[dialogue]]
speaker = "セーラ"
# 「ま、そーゆーことだね。別に名前が違ってもフィオナちゃんはフィオナちゃんだし」
line = "「ま、そーゆーことだね。別に名前が違ってもフィオナちゃんはフィオナちゃんだし」"

[[dialogue]]
speaker = "ソフィア"
# 「私たちの仕えるべきお方に違いありません！」
line = "「私たちの仕えるべきお方に違いありません！」"

[[dialogue]]
speaker = "ルリエル"
# 「援護ならお任せあれなのです！」
line = "「援護ならお任せあれなのです！」"

[[dialogue]]
speaker = "エリシア"
# 「みんな……」
line = "「みんな……」"

[[dialogue]]
speaker = "unk"
# 先のラッシュで消耗したエリシアをカバーする流星のフォーメーション。
line = "先のラッシュで消耗したエリシアをカバーする流星のフォーメーション。"

[[dialogue]]
speaker = "unk"
# それを見て、俺たちもなすべきことを理解した。
line = "それを見て、俺たちもなすべきことを理解した。"

[[dialogue]]
speaker = "ヴィーナス"
# 「──新星だって負けてないわ！　みんなでフィオ──じゃなかった、ええとエリちゃんを護るのよ！」
line = "「──新星だって負けてないわ！　みんなでフィオ──じゃなかった、ええとエリちゃんを護るのよ！」"

[[dialogue]]
speaker = "サーシャ"
# 「名前なんて大差ないわよね──本人が本人なら」
line = "「名前なんて大差ないわよね──本人が本人なら」"

[[dialogue]]
speaker = "クロト"
# 「同感です──俺たちのやることは変わらない！」
line = "「同感です──俺たちのやることは変わらない！」"

[[dialogue]]
speaker = "マトイ"
# 「私は地味ですし今まであんまり絡みもなかったですけど、流星の会長さんとして尊敬してますーっ！」
line = "「私は地味ですし今まであんまり絡みもなかったですけど、流星の会長さんとして尊敬してますーっ！」"

[[dialogue]]
speaker = "アナ"
# 「こんな時までネガティブしなくていいと思います、マトイ先輩」
line = "「こんな時までネガティブしなくていいと思います、マトイ先輩」"

[[dialogue]]
speaker = "エリシア"
# 「……皆さん……ありがとう、ございます」
line = "「……皆さん……ありがとう、ございます」"

[[dialogue]]
speaker = "unk"
# 彼女を護る。その気持ちはみんな同じだ。
line = "彼女を護る。その気持ちはみんな同じだ。"

[[dialogue]]
speaker = "unk"
# たとえ本来の彼女が、違う名前だったとしても変わらない。
line = "たとえ本来の彼女が、違う名前だったとしても変わらない。"

[[dialogue]]
speaker = "unk"
# 誰よりも最前線に出てアポロと対面した。
line = "誰よりも最前線に出てアポロと対面した。"

[[dialogue]]
speaker = "unk"
# 俺がここで時間を稼げば、それだけ後方からの力強い支援が受けられる。
line = "俺がここで時間を稼げば、それだけ後方からの力強い支援が受けられる。"

[[dialogue]]
speaker = "アポロ"
# 「邪魔だ……消えろ魔王。オマエの相手は後でしてやる」
line = "「邪魔だ……消えろ魔王。オマエの相手は後でしてやる」"

[[dialogue]]
speaker = "クロト"
# 「随分とノリが変わったな。でも、顔が見える今の方がいい」
line = "「随分とノリが変わったな。でも、顔が見える今の方がいい」"

[[dialogue]]
speaker = "アポロ"
# 「黙れ！」
line = "「黙れ！」"

[[dialogue]]
speaker = "unk"
# 凄まじい膂力で振り払われ、近くの建物に思いきり打ちつけられる。
line = "凄まじい膂力で振り払われ、近くの建物に思いきり打ちつけられる。"

[[dialogue]]
speaker = "unk"
# なんとか受け身を取った。
line = "なんとか受け身を取った。"

[[dialogue]]
speaker = "マトイ"
# 「ちょ──だ、大丈夫！？　緋宮くん！？」
line = "「ちょ──だ、大丈夫！？　緋宮くん！？」"

[[dialogue]]
speaker = "クロト"
# 「昔、ヒーローショーのバイトで悪役をやっていた──やられるのは得意だ」
line = "「昔、ヒーローショーのバイトで悪役をやっていた──やられるのは得意だ」"

[[dialogue]]
speaker = "マトイ"
# 「そ、そうなんだ……」
line = "「そ、そうなんだ……」"

[[dialogue]]
speaker = "ギエル"
# 「気に入りませんね、その眼。まるで諦める様子がない」
line = "「気に入りませんね、その眼。まるで諦める様子がない」"

[[dialogue]]
speaker = "クロト"
# 「そりゃそうだ。諦めてないからな」
line = "「そりゃそうだ。諦めてないからな」"

[[dialogue]]
speaker = "unk"
# いつまでも会話をしてはいられない。
line = "いつまでも会話をしてはいられない。"

[[dialogue]]
speaker = "unk"
# スキを晒した俺には目もくれず、アポロはエリシアに食らいついていく。
line = "スキを晒した俺には目もくれず、アポロはエリシアに食らいついていく。"

[[dialogue]]
speaker = "ニャリオン"
# 「フィオナ嬢を──ニャニャ、エリシア嬢をお守りするニャン！　パワー全開ニャン！」
line = "「フィオナ嬢を──ニャニャ、エリシア嬢をお守りするニャン！　パワー全開ニャン！」"

[[dialogue]]
speaker = "エリシア"
# 「！　ニャリオン──ええ、わかりました」
line = "「！　ニャリオン──ええ、わかりました」"

[[dialogue]]
speaker = "unk"
# 前のめりに飛び出すニャリオンを見て、エリシアは初めて黄金の魔導書を取り出した。
line = "前のめりに飛び出すニャリオンを見て、エリシアは初めて黄金の魔導書を取り出した。"

[[dialogue]]
speaker = "エリシア"
# 「神霊猫ニャメニア・ワールフリオン──星見エリシアの名において命じます。守護なさい」
line = "「神霊猫ニャメニア・ワールフリオン──星見エリシアの名において命じます。守護なさい」"

[[dialogue]]
speaker = "ニャリオン"
# 「ニャニャーッッ！！　ひ、久しぶりに力がみなぎるニャアアアアン！！」
line = "「ニャニャーッッ！！　ひ、久しぶりに力がみなぎるニャアアアアン！！」"

[[dialogue]]
speaker = "ギエル"
# 「ちいっ──畜生風情が、生意気な！」
line = "「ちいっ──畜生風情が、生意気な！」"

[[dialogue]]
speaker = "ニャリオン"
# 「猫は神聖な動物だと言ってるニャン！　おまえなんかよりずっとよっぽど偉いのニャアアアン！」
line = "「猫は神聖な動物だと言ってるニャン！　おまえなんかよりずっとよっぽど偉いのニャアアアン！」"

[[dialogue]]
speaker = "ユウリ"
# 「アホ猫、ほんとに戦えたのかよ」
line = "「アホ猫、ほんとに戦えたのかよ」"

[[dialogue]]
speaker = "サーシャ"
# 「ふふふ、チャンバラみたいで可愛いわね」
line = "「ふふふ、チャンバラみたいで可愛いわね」"

[[dialogue]]
speaker = "unk"
# 目覚めた（？）ニャリオンは途端に生き生きと小刀を振るい始めた。
line = "目覚めた（？）ニャリオンは途端に生き生きと小刀を振るい始めた。"

[[dialogue]]
speaker = "unk"
# だが、おかげで戦力も十分だ。
line = "だが、おかげで戦力も十分だ。"

[[dialogue]]
speaker = "クロト"
# 「来いアポロ──仮面はもうない、いつまでも照れてないでエリシアと向き合え！」
line = "「来いアポロ──仮面はもうない、いつまでも照れてないでエリシアと向き合え！」"

[[dialogue]]
speaker = "アポロ"
# 「潰してやるぞ──オマエも、アイツも！」
line = "「潰してやるぞ──オマエも、アイツも！」"
