[[dialogue]]
speaker = "unk"
# 第２話,もっと一緒に,P
line = "第２話,もっと一緒に,P"

[[dialogue]]
speaker = "unk"
# 恋人関係になって以降、ヴィーナスは俺の家へ遊びにくることが多くなっていた――
line = "恋人関係になって以降、ヴィーナスは俺の家へ遊びにくることが多くなっていた――"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふんふん、ふふ～ん♪」
line = "「ふんふん、ふふ～ん♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「うん？　――私の機嫌がよさそう？」
line = "「うん？　――私の機嫌がよさそう？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「えへへ♪　だって今日は久しぶりに、２人きりで過ごせるんだもの！」
line = "「えへへ♪　だって今日は久しぶりに、２人きりで過ごせるんだもの！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「学園だとみんなで過ごすことが多いし、九浄家だとヘレナちゃんやメイド隊の子たちがいるでしょ？」
line = "「学園だとみんなで過ごすことが多いし、九浄家だとヘレナちゃんやメイド隊の子たちがいるでしょ？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「みんなと一緒なのは、もちろん楽しいし好きよ。だけど恋人同士、たまには２人きりで思う存分イチャイチャしたくなる時もあるじゃない？」
line = "「みんなと一緒なのは、もちろん楽しいし好きよ。だけど恋人同士、たまには２人きりで思う存分イチャイチャしたくなる時もあるじゃない？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「この前のお正月デート？　外で遊ぶのと、部屋で２人きりなのは別腹よ！　今日はリノさんも出かけてるから、誰にも見られないし……」
line = "「この前のお正月デート？　外で遊ぶのと、部屋で２人きりなのは別腹よ！　今日はリノさんも出かけてるから、誰にも見られないし……」"

[[dialogue]]
speaker = "unk"
# そう言うと、ヴィーナスはソファーに座っている俺の前にきて、向き合う形で膝の上に腰かけてきた。
line = "そう言うと、ヴィーナスはソファーに座っている俺の前にきて、向き合う形で膝の上に腰かけてきた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「い～っぱい、スキンシップしちゃうんだから<emoji=heart04>　ふふっ……<emoji=heart04>」
line = "「い～っぱい、スキンシップしちゃうんだから<emoji=heart04>　ふふっ……<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
# 「まずは～、えいっ♪」
line = "「まずは～、えいっ♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ハグからよ<emoji=heart04>　ぎゅ～っ<emoji=heart04>」
line = "「ハグからよ<emoji=heart04>　ぎゅ～っ<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふぅ……<emoji=heart04>　久しぶりのハグ、温かくて落ち着くわ。クロトの、男の子な匂いもするし……<emoji=heart04>」
line = "「ふぅ……<emoji=heart04>　久しぶりのハグ、温かくて落ち着くわ。クロトの、男の子な匂いもするし……<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
# 「――クロトも？　私って、甘くて良い匂いがするの？　えへへ……♪　そうなんだ」
line = "「――クロトも？　私って、甘くて良い匂いがするの？　えへへ……♪　そうなんだ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「――好きな匂い？　うん、私もクロトの匂い、好きよ<emoji=heart04>」
line = "「――好きな匂い？　うん、私もクロトの匂い、好きよ<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ねぇ、クロト、頭も撫でて欲しいわ」
line = "「ねぇ、クロト、頭も撫でて欲しいわ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「――あっ♪　ふふっ……♪　そう、クロトの優しい撫で方、好き……<emoji=heart04>」
line = "「――あっ♪　ふふっ……♪　そう、クロトの優しい撫で方、好き……<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
# 「抱き締められながら、頭撫でられると、幸せ感じちゃうわ……♪」
line = "「抱き締められながら、頭撫でられると、幸せ感じちゃうわ……♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ん……<emoji=heart04>　それと同じくらい、好きって気持ちが込み上げてきて――」
line = "「ん……<emoji=heart04>　それと同じくらい、好きって気持ちが込み上げてきて――」"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロト……<emoji=heart04>」
line = "「クロト……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ヴィーナスが顔を上げて、上目遣いで見つめてくる。俺はそんな彼女の唇に――
line = "ヴィーナスが顔を上げて、上目遣いで見つめてくる。俺はそんな彼女の唇に――"

[[dialogue]]
speaker = "ヴィーナス"
# 「あ……<emoji=heart04>　んっ……ちゅっ……<emoji=heart04>」
line = "「あ……<emoji=heart04>　んっ……ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
# 「はぁ……<emoji=heart04>　キス……<emoji=heart04>　今日はいっぱい、して……<emoji=heart04>　ん……<emoji=heart04>」
line = "「はぁ……<emoji=heart04>　キス……<emoji=heart04>　今日はいっぱい、して……<emoji=heart04>　ん……<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ちゅっ……<emoji=heart04>　んっ……<emoji=heart04>　ちゅっ……<emoji=heart04>　はあぁ……<emoji=heart04>」
line = "「ちゅっ……<emoji=heart04>　んっ……<emoji=heart04>　ちゅっ……<emoji=heart04>　はあぁ……<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロト、好き……<emoji=heart04>」
line = "「クロト、好き……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺も好きだ
line = "俺も好きだ"

[[dialogue]]
speaker = "ヴィーナス"
# 「んっ……<emoji=heart04>　もっと……<emoji=heart04>　ちゅっ……<emoji=heart04>」
line = "「んっ……<emoji=heart04>　もっと……<emoji=heart04>　ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
# 「…………クロト、私、恋人になってからいつも思うんだけど」
line = "「…………クロト、私、恋人になってからいつも思うんだけど」"

[[dialogue]]
speaker = "ヴィーナス"
# 「イチャイチャしてると、時間の進み早くない！？　もう外が真っ暗だわ！」
line = "「イチャイチャしてると、時間の進み早くない！？　もう外が真っ暗だわ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「星徒会の仕事をしようとする時は、あんなに長く感じるのに！　逆にして欲しいわ！」
line = "「星徒会の仕事をしようとする時は、あんなに長く感じるのに！　逆にして欲しいわ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「え？　――暗いから、家まで送っていってくれるの？　夜のお散歩デートね！　ありがと、クロト♪」
line = "「え？　――暗いから、家まで送っていってくれるの？　夜のお散歩デートね！　ありがと、クロト♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あ～あ、毎日２人でイチャイチャする時間がもっとあればいいのにって、最近はすごく思うわ」
line = "「あ～あ、毎日２人でイチャイチャする時間がもっとあればいいのにって、最近はすごく思うわ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「星徒会室でイチャイチャしてたらマトイに見つかって、学園では自重しろって怒られちゃったし」
line = "「星徒会室でイチャイチャしてたらマトイに見つかって、学園では自重しろって怒られちゃったし」"

[[dialogue]]
speaker = "ヴィーナス"
# 「――って、あっという間に九浄家の近くまできちゃったわ。今日はここまでね……」
line = "「――って、あっという間に九浄家の近くまできちゃったわ。今日はここまでね……」"

[[dialogue]]
speaker = "unk"
# 残念そうな顔をするヴィーナスに、「また明日、学園で」と告げて、頭を撫でる。
line = "残念そうな顔をするヴィーナスに、「また明日、学園で」と告げて、頭を撫でる。"

[[dialogue]]
speaker = "ヴィーナス"
# 「うん……」
line = "「うん……」"

[[dialogue]]
speaker = "unk"
# 俺は手を振って、自宅へ戻ろうとすると――
line = "俺は手を振って、自宅へ戻ろうとすると――"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロト、待って」
line = "「クロト、待って」"

[[dialogue]]
speaker = "unk"
# ヴィーナスに呼び止められて、服の裾が摘ままれていることに気づいた。
line = "ヴィーナスに呼び止められて、服の裾が摘ままれていることに気づいた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「あのね……」
line = "「あのね……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「もうちょっとだけ……一緒にいちゃダメ？」
line = "「もうちょっとだけ……一緒にいちゃダメ？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「もう夜遅いから、どこかに行くのとかは無理かもだけど……」
line = "「もう夜遅いから、どこかに行くのとかは無理かもだけど……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「その……手を繋いで一緒にいるだけでもいいっていうか……」
line = "「その……手を繋いで一緒にいるだけでもいいっていうか……」"

[[dialogue]]
speaker = "unk"
# ちょっと待ってて
line = "ちょっと待ってて"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロト……？」
line = "「クロト……？」"

[[dialogue]]
speaker = "unk"
# 俺はその場でＤＩＳＣを取り出し、操作する。九浄家当主のヘレナさんと、メイド隊の閃に、ヴィーナスの帰りが少し遅くなるというメッセ―ジを送信しておいた。
line = "俺はその場でＤＩＳＣを取り出し、操作する。九浄家当主のヘレナさんと、メイド隊の閃に、ヴィーナスの帰りが少し遅くなるというメッセ―ジを送信しておいた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「――もうちょっと、一緒にいていいの？」
line = "「――もうちょっと、一緒にいていいの？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「えへへ……♪　クロト、ありがと<emoji=heart04>」
line = "「えへへ……♪　クロト、ありがと<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
# 「恋人繋ぎで、ね？」
line = "「恋人繋ぎで、ね？」"

[[dialogue]]
speaker = "unk"
# 嬉しそうに腕に抱きついてきたヴィーナスは、そう言って指を絡めてくる。
line = "嬉しそうに腕に抱きついてきたヴィーナスは、そう言って指を絡めてくる。"

[[dialogue]]
speaker = "unk"
# 本当は俺も離れるのが名残惜しかった、とは気恥ずかしくて言えない代わりに、彼女の手をしっかりと握り返すのだった――
line = "本当は俺も離れるのが名残惜しかった、とは気恥ずかしくて言えない代わりに、彼女の手をしっかりと握り返すのだった――"
