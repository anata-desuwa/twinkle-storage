[[dialogue]]
speaker = "unk"
# 俺とフィオナで、結婚式場近くに発生したアステラを消滅させた。
line = "俺とフィオナで、結婚式場近くに発生したアステラを消滅させた。"

[[dialogue]]
speaker = "unk"
# 周囲に湧きだしたモンスターはキリカ師匠とナミエルが倒してくれて、被害を出さずに事を収められた。
line = "周囲に湧きだしたモンスターはキリカ師匠とナミエルが倒してくれて、被害を出さずに事を収められた。"

[[dialogue]]
speaker = "unk"
# そして──
line = "そして──"

[[dialogue]]
speaker = "イレーナ"
# 「新郎緋宮クロト。あなたは星見フィオナを妻とし、健やかなる時も病める時も、富める時も貧しき時も……」
line = "「新郎緋宮クロト。あなたは星見フィオナを妻とし、健やかなる時も病める時も、富める時も貧しき時も……」"

[[dialogue]]
speaker = "イレーナ"
# 「彼女を愛し、慈しみ、共に助け合い……命の限り真心を尽くすことを誓いますか？」
line = "「彼女を愛し、慈しみ、共に助け合い……命の限り真心を尽くすことを誓いますか？」"

[[dialogue]]
speaker = "unk"
# はい、誓います
line = "はい、誓います"

[[dialogue]]
speaker = "イレーナ"
# 「新婦星見フィオナ。あなたは緋宮クロトを夫とし、健やかなる時も病める時も、富める時も貧しき時も……」
line = "「新婦星見フィオナ。あなたは緋宮クロトを夫とし、健やかなる時も病める時も、富める時も貧しき時も……」"

[[dialogue]]
speaker = "イレーナ"
# 「彼を愛し、慈しみ、共に助け合い……命の限り真心を尽くすことを誓いますか？」
line = "「彼を愛し、慈しみ、共に助け合い……命の限り真心を尽くすことを誓いますか？」"

[[dialogue]]
speaker = "フィオナ"
# 「はい、誓います」
line = "「はい、誓います」"

[[dialogue]]
speaker = "イレーナ"
# 「では誓いの口付けを」
line = "「では誓いの口付けを」"

[[dialogue]]
speaker = "フィオナ"
# 「じゃあ……いきますね」
line = "「じゃあ……いきますね」"

[[dialogue]]
speaker = "フィオナ"
# 「ちゅっ」
line = "「ちゅっ」"

[[dialogue]]
speaker = "unk"
# フィオナの唇が俺の頬にそっと触れる。
line = "フィオナの唇が俺の頬にそっと触れる。"

[[dialogue]]
speaker = "unk"
# 顔がかっと熱くなるのを感じながら、俺もフィオナの頬にキスを返した。
line = "顔がかっと熱くなるのを感じながら、俺もフィオナの頬にキスを返した。"

[[dialogue]]
speaker = "フィオナ"
# 「ぁ……」
line = "「ぁ……」"

[[dialogue]]
speaker = "フィオナ"
# 「ふつつか者ですが、よろしくお願いしますね……あなた」
line = "「ふつつか者ですが、よろしくお願いしますね……あなた」"

[[dialogue]]
speaker = "イレーナ"
# 「どうでしょう？　今までと違いはありましたか？」
line = "「どうでしょう？　今までと違いはありましたか？」"

[[dialogue]]
speaker = "フィオナ"
# 「今までよりずっと、心が満たされている気がします。今ならきっと──」
line = "「今までよりずっと、心が満たされている気がします。今ならきっと──」"

[[dialogue]]
speaker = "フィオナ"
# 「元の戦闘服に戻りました……！」
line = "「元の戦闘服に戻りました……！」"

[[dialogue]]
speaker = "キリカ"
# 「では私たちも……」
line = "「では私たちも……」"

[[dialogue]]
speaker = "キリカ"
# 「私とナミエルも戻れました。これで上月神闘流の技を存分に振るえますね」
line = "「私とナミエルも戻れました。これで上月神闘流の技を存分に振るえますね」"

[[dialogue]]
speaker = "ナミエル"
# 「ふぅ、やはり普段の装いの方が落ち着きます。掃除もこちらの方が向いていますし」
line = "「ふぅ、やはり普段の装いの方が落ち着きます。掃除もこちらの方が向いていますし」"

[[dialogue]]
speaker = "unk"
# ほっとした……
line = "ほっとした……"

[[dialogue]]
speaker = "イレーナ"
# 「ではこれで一件落着ですね。貴重な経験ができました」
line = "「ではこれで一件落着ですね。貴重な経験ができました」"

[[dialogue]]
speaker = "ニャリオン"
# 「ニャ～。一時はどうなることかと思ったのニャン」
line = "「ニャ～。一時はどうなることかと思ったのニャン」"

[[dialogue]]
speaker = "キリカ"
# 「ニャリオン、今までどこにいたのです？　途中から姿を見ないと思っていましたが……」
line = "「ニャリオン、今までどこにいたのです？　途中から姿を見ないと思っていましたが……」"

[[dialogue]]
speaker = "ニャリオン"
# 「こっそりフィオナ嬢と新星会長の様子を見てたのニャ」
line = "「こっそりフィオナ嬢と新星会長の様子を見てたのニャ」"

[[dialogue]]
speaker = "ニャリオン"
# 「フィオナ嬢の一の配下として、新星会長が不甲斐なかったらガツンと言おうかと思ってたニャンが……まぁ合格ニャ」
line = "「フィオナ嬢の一の配下として、新星会長が不甲斐なかったらガツンと言おうかと思ってたニャンが……まぁ合格ニャ」"

[[dialogue]]
speaker = "フィオナ"
# 「ありがとう、ニャリオン。心配してくれてたんだね」
line = "「ありがとう、ニャリオン。心配してくれてたんだね」"

[[dialogue]]
speaker = "ニャリオン"
# 「ニャニャン、使い魔として当然のことをしたまでニャン♪」
line = "「ニャニャン、使い魔として当然のことをしたまでニャン♪」"

[[dialogue]]
speaker = "フィオナ"
# 「今回のことはいい経験になりました。少しだけですけど花嫁修業できましたし、結婚式の練習もして……将来が楽しみになりました」
line = "「今回のことはいい経験になりました。少しだけですけど花嫁修業できましたし、結婚式の練習もして……将来が楽しみになりました」"

[[dialogue]]
speaker = "フィオナ"
# 「同時に、自分の未熟さを痛感し、ウェディングドレスを本当に着るのはまだ早いとも思いました」
line = "「同時に、自分の未熟さを痛感し、ウェディングドレスを本当に着るのはまだ早いとも思いました」"

[[dialogue]]
speaker = "unk"
# フィオナ！？
line = "フィオナ！？"

[[dialogue]]
speaker = "フィオナ"
# 「でもせっかく得た力なんですから、使わないともったいないですよね♪」
line = "「でもせっかく得た力なんですから、使わないともったいないですよね♪」"

[[dialogue]]
speaker = "フィオナ"
# 「ウェディングドレスを着ていると、普段の戦闘服や水着とは違う星術を使えるんです。もっと着こなして、戦いに活かせるようにしないといけません」
line = "「ウェディングドレスを着ていると、普段の戦闘服や水着とは違う星術を使えるんです。もっと着こなして、戦いに活かせるようにしないといけません」"

[[dialogue]]
speaker = "ナミエル"
# 「お嬢様がそう仰るなら──」
line = "「お嬢様がそう仰るなら──」"

[[dialogue]]
speaker = "ナミエル"
# 「お嬢様に後れを取らぬよう、星見家メイド隊の一人として、ウェディングドレスの戦闘服も十全に使いこなさなくては」
line = "「お嬢様に後れを取らぬよう、星見家メイド隊の一人として、ウェディングドレスの戦闘服も十全に使いこなさなくては」"

[[dialogue]]
speaker = "キリカ"
# 「ええ。上月神闘流に新たな技を加えるのもよいかもしれません」
line = "「ええ。上月神闘流に新たな技を加えるのもよいかもしれません」"

[[dialogue]]
speaker = "unk"
# さっきは全然問題なく戦えていたような……
line = "さっきは全然問題なく戦えていたような……"

[[dialogue]]
speaker = "ニャリオン"
# 「それは言わないお約束ニャン」
line = "「それは言わないお約束ニャン」"

[[dialogue]]
speaker = "フィオナ"
# （もっと大人になって、自分の意志でウェディングドレスを着た時は、隣に緋宮会長がいてくれたらいいな……なんてね）
line = "（もっと大人になって、自分の意志でウェディングドレスを着た時は、隣に緋宮会長がいてくれたらいいな……なんてね）"

[[dialogue]]
speaker = "unk"
# フィオナ？
line = "フィオナ？"

[[dialogue]]
speaker = "フィオナ"
# 「いえ、なんでもないですよ、なんでも」
line = "「いえ、なんでもないですよ、なんでも」"

[[dialogue]]
speaker = "トワ先生"
# 「ところでフィオナちゃん」
line = "「ところでフィオナちゃん」"

[[dialogue]]
speaker = "フィオナ"
# 「はい？　どうされましたトワ先生？」
line = "「はい？　どうされましたトワ先生？」"

[[dialogue]]
speaker = "トワ先生"
# 「この後改めて、今回の話を聞いてもいいかな。星体力学の研究としてね」
line = "「この後改めて、今回の話を聞いてもいいかな。星体力学の研究としてね」"

[[dialogue]]
speaker = "フィオナ"
# 「トワ先生には助けていただきましたし、恥ずかしいですけど、そういうことなら……」
line = "「トワ先生には助けていただきましたし、恥ずかしいですけど、そういうことなら……」"

[[dialogue]]
speaker = "トワ先生"
# 「じゃあレポートにして学園に提出するね！　絶対みんなの役に立つよ♪」
line = "「じゃあレポートにして学園に提出するね！　絶対みんなの役に立つよ♪」"

[[dialogue]]
speaker = "フィオナ"
# 「それはダメですぅ～～～～～～っ！！？」
line = "「それはダメですぅ～～～～～～っ！！？」"
