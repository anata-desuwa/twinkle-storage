[[dialogue]]
speaker = "リーナ"
# 「お兄ちゃんの敵は……死んで！」
line = "「お兄ちゃんの敵は……死んで！」"

[[dialogue]]
speaker = "ヴァレリー"
# 「どうして邪魔するのです、リーナ？　あなたもコラプサーでしょう？」
line = "「どうして邪魔するのです、リーナ？　あなたもコラプサーでしょう？」"

[[dialogue]]
speaker = "リーナ"
# 「死んじゃえ～～っ！」
line = "「死んじゃえ～～っ！」"

[[dialogue]]
speaker = "ヴァレリー"
# 「っと……！　本当に容赦がないですね。油断しているとズタズタにされそうです」
line = "「っと……！　本当に容赦がないですね。油断しているとズタズタにされそうです」"

[[dialogue]]
speaker = "unk"
# リーナがコラプサ－……！？
line = "リーナがコラプサ－……！？"

[[dialogue]]
speaker = "シアン"
# 「じゃあどうしてヴァレリーと戦ってんだ？　しかもマジで殺す気だぞ？」
line = "「じゃあどうしてヴァレリーと戦ってんだ？　しかもマジで殺す気だぞ？」"

[[dialogue]]
speaker = "セナリィ"
# 「ここはあのお子様に加勢して追撃するべきでしょうか？」
line = "「ここはあのお子様に加勢して追撃するべきでしょうか？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「やめといたほうがいいんじゃないかな～？　あの勢いだと私たちも敵と認識されかねないし」
line = "「やめといたほうがいいんじゃないかな～？　あの勢いだと私たちも敵と認識されかねないし」"

[[dialogue]]
speaker = "せつな"
# 「それにしても、主様はどうしてそんなに妹が増えるでござるか？」
line = "「それにしても、主様はどうしてそんなに妹が増えるでござるか？」"

[[dialogue]]
speaker = "unk"
# そう言われても……
line = "そう言われても……"

[[dialogue]]
speaker = "リーナ"
# 「お兄ちゃんはリーナが守るの！　お兄ちゃんの敵は──リーナの敵！」
line = "「お兄ちゃんはリーナが守るの！　お兄ちゃんの敵は──リーナの敵！」"

[[dialogue]]
speaker = "ヴァレリー"
# 「お兄ちゃん……？　もしかして新星学園の会長さんのことでしょうか？」
line = "「お兄ちゃん……？　もしかして新星学園の会長さんのことでしょうか？」"

[[dialogue]]
speaker = "リーナ"
# 「そう！　リーナのお兄ちゃん！」
line = "「そう！　リーナのお兄ちゃん！」"

[[dialogue]]
speaker = "ヴァレリー"
# 「──」
line = "「──」"

[[dialogue]]
speaker = "ヴァレリー"
# 「アハハッ、アハハハハッ！　私が探している間にもう会長さんに近づいていたのですか。いやはや、さすがですね」
line = "「アハハッ、アハハハハッ！　私が探している間にもう会長さんに近づいていたのですか。いやはや、さすがですね」"

[[dialogue]]
speaker = "ヴァレリー"
# 「リーナ、話を聞いてください。私はあなたを探しに来たのです」
line = "「リーナ、話を聞いてください。私はあなたを探しに来たのです」"

[[dialogue]]
speaker = "ヴァレリー"
# 「あなたが見つかった以上、戦う理由はありません。ですからここでお開きです」
line = "「あなたが見つかった以上、戦う理由はありません。ですからここでお開きです」"

[[dialogue]]
speaker = "リーナ"
# 「へ？」
line = "「へ？」"

[[dialogue]]
speaker = "シアン"
# 「……は？」
line = "「……は？」"

[[dialogue]]
speaker = "ヴァレリー"
# 「何を隠そう、私は合流途中でいなくなったリーナを探していただけでして」
line = "「何を隠そう、私は合流途中でいなくなったリーナを探していただけでして」"

[[dialogue]]
speaker = "ヴァレリー"
# 「星騎士との戦闘は命令されていなかったのですが……これでは勝手なことをしていると彼女を責められませんね。ハハハ」
line = "「星騎士との戦闘は命令されていなかったのですが……これでは勝手なことをしていると彼女を責められませんね。ハハハ」"

[[dialogue]]
speaker = "シアン"
# 「ハハハじゃねえ」
line = "「ハハハじゃねえ」"

[[dialogue]]
speaker = "ヴァレリー"
# 「お見苦しいところをお見せしました。我々は割と自由な組織でして、衝突することもしばしばなんです」
line = "「お見苦しいところをお見せしました。我々は割と自由な組織でして、衝突することもしばしばなんです」"

[[dialogue]]
speaker = "ヴァレリー"
# 「見事な連携を発揮した星騎士の皆さんの前で、お恥ずかしい限りです。いやはや、皆さんを見習えればよいのですが」
line = "「見事な連携を発揮した星騎士の皆さんの前で、お恥ずかしい限りです。いやはや、皆さんを見習えればよいのですが」"

[[dialogue]]
speaker = "ヴァレリー"
# 「ではリーナ、帰りますよ」
line = "「ではリーナ、帰りますよ」"

[[dialogue]]
speaker = "リーナ"
# 「ヤダ。お兄ちゃんと一緒にいる」
line = "「ヤダ。お兄ちゃんと一緒にいる」"

[[dialogue]]
speaker = "ヴァレリー"
# 「聞き分けのない子はお兄ちゃんに嫌われますよ？」
line = "「聞き分けのない子はお兄ちゃんに嫌われますよ？」"

[[dialogue]]
speaker = "リーナ"
# 「う……それはイヤ。帰る」
line = "「う……それはイヤ。帰る」"

[[dialogue]]
speaker = "ヴァレリー"
# 「いい子ですね」
line = "「いい子ですね」"

[[dialogue]]
speaker = "ヴァレリー"
# 「ではまたお会いしましょう、星騎士の皆さん」
line = "「ではまたお会いしましょう、星騎士の皆さん」"

[[dialogue]]
speaker = "ヴァレリー"
# 「あ、そうそう。リーナには優しくしてあげてくださいね、<b>お兄ちゃん</b>」
line = "「あ、そうそう。リーナには優しくしてあげてくださいね、<b>お兄ちゃん</b>」"

[[dialogue]]
speaker = "リーナ"
# 「お兄ちゃん、またねー♪」
line = "「お兄ちゃん、またねー♪」"

[[dialogue]]
speaker = "シアン"
# 「なんだったんだ、アレ。人騒がせなやつらだぜ……」
line = "「なんだったんだ、アレ。人騒がせなやつらだぜ……」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「まぁ一応──」
line = "「まぁ一応──」"

[[dialogue]]
speaker = "セナリィ"
# 「命拾いはしましたわね……」
line = "「命拾いはしましたわね……」"
