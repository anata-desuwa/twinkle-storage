[[dialogue]]
speaker = "unk"
# 第１話,聖剣の勇者,P
line = "第１話,聖剣の勇者,P"

[[dialogue]]
speaker = "unk"
# 星力の適正の有無には男女差があり、新星・流星両学園の生徒の男女比はおよそ１対９。
line = "星力の適正の有無には男女差があり、新星・流星両学園の生徒の男女比はおよそ１対９。"

[[dialogue]]
speaker = "unk"
# ユーリス・フォン・ジルラントは数少ない男子生徒の１人であり、ともに研鑽を重ねる友人だ。
line = "ユーリス・フォン・ジルラントは数少ない男子生徒の１人であり、ともに研鑽を重ねる友人だ。"

[[dialogue]]
speaker = "ユーリス"
# 「流石だね、会長！　私の動きにここまでついて来られるだなんて……！」
line = "「流石だね、会長！　私の動きにここまでついて来られるだなんて……！」"

[[dialogue]]
speaker = "ユーリス"
# 「どうしても君を倒してみたくなったよ！　次の一撃は……全力で行く！」
line = "「どうしても君を倒してみたくなったよ！　次の一撃は……全力で行く！」"

[[dialogue]]
speaker = "ユーリス"
# 「極光よ、剣に宿れ──ブリッツシュナイデン！」
line = "「極光よ、剣に宿れ──ブリッツシュナイデン！」"

[[dialogue]]
speaker = "環"
# 「お～っと！　王子の必殺剣が会長に炸裂！　これは勝負あったか～！？」
line = "「お～っと！　王子の必殺剣が会長に炸裂！　これは勝負あったか～！？」"

[[dialogue]]
speaker = "ユーリス"
# 「市倉さん、いつからそこに？　というより、今のはいったい……？」
line = "「市倉さん、いつからそこに？　というより、今のはいったい……？」"

[[dialogue]]
speaker = "環"
# 「いや～、偶然通りがかったらマジで戦ってるからさー、ここは盛り上げなきゃって」
line = "「いや～、偶然通りがかったらマジで戦ってるからさー、ここは盛り上げなきゃって」"

[[dialogue]]
speaker = "環"
# 「めちゃくちゃバチバチしてるし、男同士、譲れない物でも賭けて決闘でもしてるのかと思ったよ」
line = "「めちゃくちゃバチバチしてるし、男同士、譲れない物でも賭けて決闘でもしてるのかと思ったよ」"

[[dialogue]]
speaker = "ユーリス"
# 「いいえ、ただの模擬戦ですよ」
line = "「いいえ、ただの模擬戦ですよ」"

[[dialogue]]
speaker = "ユーリス"
# 「しかし男同士の決闘……ですか。ふふ」
line = "「しかし男同士の決闘……ですか。ふふ」"

[[dialogue]]
speaker = "ユーリス"
# 「傍から見ていてそこまで鬼気迫っていたのなら、全力を出した甲斐があったというものでしょうか」
line = "「傍から見ていてそこまで鬼気迫っていたのなら、全力を出した甲斐があったというものでしょうか」"

[[dialogue]]
speaker = "unk"
# 叩き切られるかと思った
line = "叩き切られるかと思った"

[[dialogue]]
speaker = "ユーリス"
# 「どれだけスピードを上げても会長が食らいついてくるから、私も熱が入ってしまった。いい太刀筋だったろう？」
line = "「どれだけスピードを上げても会長が食らいついてくるから、私も熱が入ってしまった。いい太刀筋だったろう？」"

[[dialogue]]
speaker = "環"
# 「すごい迫力だったなー。バトル漫画かと思っちゃったよ。ユーリスが速すぎて３人に見える時もあったし」
line = "「すごい迫力だったなー。バトル漫画かと思っちゃったよ。ユーリスが速すぎて３人に見える時もあったし」"

[[dialogue]]
speaker = "ユーリス"
# 「だけど会長には凌がれてしまったね。次は別の勇者スキルを試したいから、また付き合ってくれると嬉しいな」
line = "「だけど会長には凌がれてしまったね。次は別の勇者スキルを試したいから、また付き合ってくれると嬉しいな」"

[[dialogue]]
speaker = "環"
# 「勇者スキル……！　それってあれでしょ、ユーリスの聖剣そのものが記憶してる技なんだよね？」
line = "「勇者スキル……！　それってあれでしょ、ユーリスの聖剣そのものが記憶してる技なんだよね？」"

[[dialogue]]
speaker = "ユーリス"
# 「ええ。我がジルラント王家に伝わる聖剣『エーヴィヒリヒト』には、代々の所有者が身に付けたスキルが記憶されています」
line = "「ええ。我がジルラント王家に伝わる聖剣『エーヴィヒリヒト』には、代々の所有者が身に付けたスキルが記憶されています」"

[[dialogue]]
speaker = "ユーリス"
# 「神速の乱れ切り、星力を収束させた必殺の斬撃など……先代が編み出し磨き上げた技を再現できるんですよ」
line = "「神速の乱れ切り、星力を収束させた必殺の斬撃など……先代が編み出し磨き上げた技を再現できるんですよ」"

[[dialogue]]
speaker = "環"
# 「ほえ～……ほんとにすごい剣なんだなぁ～」
line = "「ほえ～……ほんとにすごい剣なんだなぁ～」"

[[dialogue]]
speaker = "unk"
# でもどうして聖剣って呼ばれてるんだ？
line = "でもどうして聖剣って呼ばれてるんだ？"

[[dialogue]]
speaker = "ユーリス"
# 「あぁ、それはね……」
line = "「あぁ、それはね……」"

[[dialogue]]
speaker = "環"
# 「あ、それは聞いたことある！　魔王を倒した勇者の剣なんだっけ」
line = "「あ、それは聞いたことある！　魔王を倒した勇者の剣なんだっけ」"

[[dialogue]]
speaker = "ユーリス"
# 「そう言われていますね。遠い昔、天使ジルラントが天空より授かった剣で悪逆なる魔王を討った──」
line = "「そう言われていますね。遠い昔、天使ジルラントが天空より授かった剣で悪逆なる魔王を討った──」"

[[dialogue]]
speaker = "ユーリス"
# 「その剣は聖剣と呼ばれ、ジルラントが開いた王国とともに、今も受け継がれている──それが我が国に伝わる伝説です」
line = "「その剣は聖剣と呼ばれ、ジルラントが開いた王国とともに、今も受け継がれている──それが我が国に伝わる伝説です」"

[[dialogue]]
speaker = "環"
# 「あ、だから王子は天使と人間の混血なんだ。ご先祖様が天使だから」
line = "「あ、だから王子は天使と人間の混血なんだ。ご先祖様が天使だから」"

[[dialogue]]
speaker = "ユーリス"
# 「そういうことです」
line = "「そういうことです」"

[[dialogue]]
speaker = "ユーリス"
# 「とはいえ、魔王は厄災の擬人化という説もあるので、伝説がどこまで事実かはわかりませんが」
line = "「とはいえ、魔王は厄災の擬人化という説もあるので、伝説がどこまで事実かはわかりませんが」"

[[dialogue]]
speaker = "環"
# 「今の魔王には効くかな～、この聖剣？」
line = "「今の魔王には効くかな～、この聖剣？」"

[[dialogue]]
speaker = "ユーリス"
# 「担い手次第でしょうか。自信はあるのですが」
line = "「担い手次第でしょうか。自信はあるのですが」"

[[dialogue]]
speaker = "ユーリス"
# 「──なんて、あまりからかわないでください。会長が困った顔をしています」
line = "「──なんて、あまりからかわないでください。会長が困った顔をしています」"

[[dialogue]]
speaker = "ユーリス"
# 「御前試合の時、前会長が君を魔王だと言ったことは覚えているよ」
line = "「御前試合の時、前会長が君を魔王だと言ったことは覚えているよ」"

[[dialogue]]
speaker = "ユーリス"
# 「だけど私は気にしてはいない。君が新星の星徒会長にふさわしい強さと志を持っているって知っているから」
line = "「だけど私は気にしてはいない。君が新星の星徒会長にふさわしい強さと志を持っているって知っているから」"

[[dialogue]]
speaker = "ユーリス"
# 「もちろん、会長が悪に堕ちるのなら全身全霊で戦うけどね」
line = "「もちろん、会長が悪に堕ちるのなら全身全霊で戦うけどね」"

[[dialogue]]
speaker = "unk"
# もしもそうなったらよろしく
line = "もしもそうなったらよろしく"

[[dialogue]]
speaker = "ユーリス"
# 「ああ、約束だ」
line = "「ああ、約束だ」"

[[dialogue]]
speaker = "ユーリス"
# 「さて──会長、今日はこのくらいにしておこうか。そろそろ下校時刻だ」
line = "「さて──会長、今日はこのくらいにしておこうか。そろそろ下校時刻だ」"

[[dialogue]]
speaker = "ユーリス"
# 「そうだ、帰りに食事でもどう？　学生らしくファーストフードとか」
line = "「そうだ、帰りに食事でもどう？　学生らしくファーストフードとか」"

[[dialogue]]
speaker = "環"
# 「いいねいいね～、わかってるじゃん王子！　青春にはやっぱりバーガーとフライドポテトだよ！」
line = "「いいねいいね～、わかってるじゃん王子！　青春にはやっぱりバーガーとフライドポテトだよ！」"

[[dialogue]]
speaker = "環"
# 「でもボクはこれからバイトだから、２人で行ってくるといいよ。じゃ～ね～！」
line = "「でもボクはこれからバイトだから、２人で行ってくるといいよ。じゃ～ね～！」"

[[dialogue]]
speaker = "ユーリス"
# 「行ってしまった……彼女は掴みどころのない風のような子だね」
line = "「行ってしまった……彼女は掴みどころのない風のような子だね」"

[[dialogue]]
speaker = "ユーリス"
# 「じゃあ２人でハンバーガーを食べに行こうか。あまり経験がないからおすすめを教えてくれると助かるよ」
line = "「じゃあ２人でハンバーガーを食べに行こうか。あまり経験がないからおすすめを教えてくれると助かるよ」"

[[dialogue]]
speaker = "ユーリス"
# 「でもその前にシャワーを浴びよう。たくさん運動した分、汗をかいてしまったから」
line = "「でもその前にシャワーを浴びよう。たくさん運動した分、汗をかいてしまったから」"

[[dialogue]]
speaker = "unk"
# そっちは女子用のシャワー室だけど……
line = "そっちは女子用のシャワー室だけど……"

[[dialogue]]
speaker = "ユーリス"
# 「えっ！？　あ、ああ……私としたことが間違えてしまった。ありがとう、危うく変質者になるところだったよ」
line = "「えっ！？　あ、ああ……私としたことが間違えてしまった。ありがとう、危うく変質者になるところだったよ」"

[[dialogue]]
speaker = "ユーリス"
# 「……一緒にシャワー室に？　えっと、それは……」
line = "「……一緒にシャワー室に？　えっと、それは……」"

[[dialogue]]
speaker = "ユーリス"
# 「あ、そうだ！　少し剣の素振りをしてから行くよ。機材の片付けもしておくから」
line = "「あ、そうだ！　少し剣の素振りをしてから行くよ。機材の片付けもしておくから」"

[[dialogue]]
speaker = "unk"
# じゃあお言葉に甘えて……
line = "じゃあお言葉に甘えて……"

[[dialogue]]
speaker = "ユーリス"
# 「ああ、先に汗を流しておいで！　あはは、あははは……」
line = "「ああ、先に汗を流しておいで！　あはは、あははは……」"

[[dialogue]]
speaker = "unk"
# その後２人でハンバーガーショップに寄ったが、その時はいつもの優雅なユーリスに戻っていたのだった──
line = "その後２人でハンバーガーショップに寄ったが、その時はいつもの優雅なユーリスに戻っていたのだった──"
