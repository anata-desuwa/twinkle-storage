[[dialogue]]
speaker = "ヒルディオーネ"
# （流星学園の合同で７日間に渡って行われる『星霊祭』……）
line = "（流星学園の合同で７日間に渡って行われる『星霊祭』……）"

[[dialogue]]
speaker = "ヒルディオーネ"
# （この祭典の中でも、特に注目を集めるのが、星騎士同士が１対１で武を競い合う個人戦トーナメント）
line = "（この祭典の中でも、特に注目を集めるのが、星騎士同士が１対１で武を競い合う個人戦トーナメント）"

[[dialogue]]
speaker = "ヒルディオーネ"
# （その名を――『<ruby=せいれいぶとうかい>星霊舞闘会</ruby>』という）
line = "（その名を――『<ruby>星霊舞闘会<rt>せいれいぶとうかい</rt></ruby>』という）"

[[dialogue]]
speaker = "ヒルディオーネ"
# （そして前回、頂点を制したのは――）
line = "（そして前回、頂点を制したのは――）"

[[dialogue]]
speaker = "マハムート"
# 「――ドラゴニックメガフレア！」
line = "「――ドラゴニックメガフレア！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「かはっ……！」
line = "「かはっ……！」"

[[dialogue]]
speaker = "マハムート"
# 「ふぅ……これで、終わりかしら……？」
line = "「ふぅ……これで、終わりかしら……？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「くっ……！」
line = "「くっ……！」"

[[dialogue]]
speaker = "紅明"
# 『決着ーーーっ！！　星霊舞闘会、優勝者は……新星寮寮長・妃竜院マハムートーーーっ！！！』
line = "『決着ーーーっ！！　星霊舞闘会、優勝者は……新星寮寮長・妃竜院マハムートーーーっ！！！』"

[[dialogue]]
speaker = "ヒルディオーネ"
# （ああ……また、勝つことができませんでしたわ……）
line = "（ああ……また、勝つことができませんでしたわ……）"

[[dialogue]]
speaker = "マハムート"
# 「ふぅ……」
line = "「ふぅ……」"

[[dialogue]]
speaker = "ヒルディオーネ"
# （こうしてまた<ruby=わたくし>私</ruby>は、最強の『竜』たる彼女の前に跪いて――）
line = "（こうしてまた<ruby>私<rt>わたくし</rt></ruby>は、最強の『竜』たる彼女の前に跪いて――）"

[[dialogue]]
speaker = "寮生Ａ"
# 「ああ、ヒルディーお姉様が……！」
line = "「ああ、ヒルディーお姉様が……！」"

[[dialogue]]
speaker = "寮生Ｂ"
# 「負けてしまいましたわ……！」
line = "「負けてしまいましたわ……！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# （応援しに来てくれている後輩たちの前で、みっともない負け姿を晒す。私は妃竜院マハムートと肩を並べる、流星寮の寮長だというのに）
line = "（応援しに来てくれている後輩たちの前で、みっともない負け姿を晒す。私は妃竜院マハムートと肩を並べる、流星寮の寮長だというのに）"

[[dialogue]]
speaker = "ヒルディオーネ"
# （私は未だ――１度として彼女に勝てたことがない）
line = "（私は未だ――１度として彼女に勝てたことがない）"

[[dialogue]]
speaker = "unk"
# 次の星霊祭まであと２週間と迫った、週末前の放課後。
line = "次の星霊祭まであと２週間と迫った、週末前の放課後。"

[[dialogue]]
speaker = "unk"
# 俺は流星学園３年生の<ruby=せんおんじ>千園寺</ruby>ヒルディオーネ先輩と、１年生のフェニエル――フニに頼まれて、ある場所へ合宿にやって来ていた。
line = "俺は流星学園３年生の<ruby>千園寺<rt>せんおんじ</rt></ruby>ヒルディオーネ先輩と、１年生のフェニエル――フニに頼まれて、ある場所へ合宿にやって来ていた。"

[[dialogue]]
speaker = "フェニエル"
# 「会長さん、改めて私の為にわざわざ<b>北海道</b>までご同行頂いて、ありがとうございます……！」
line = "「会長さん、改めて私の為にわざわざ<b>北海道</b>までご同行頂いて、ありがとうございます……！」"

[[dialogue]]
speaker = "unk"
# 久しぶりに帰省できてよかったな
line = "久しぶりに帰省できてよかったな"

[[dialogue]]
speaker = "フェニエル"
# 「えへへ♪　はいっ。村のみんなに会えて、すごく力が湧いて来ました♪」
line = "「えへへ♪　はいっ。村のみんなに会えて、すごく力が湧いて来ました♪」"

[[dialogue]]
speaker = "unk"
# そう、俺たちが今来ている場所は、フニが育った北海道の村近くにある森の中であった。
line = "そう、俺たちが今来ている場所は、フニが育った北海道の村近くにある森の中であった。"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「――フニ、準備は出来ているようですわね。そろそろ合宿の本題に入りますわよ」
line = "「――フニ、準備は出来ているようですわね。そろそろ合宿の本題に入りますわよ」"

[[dialogue]]
speaker = "フェニエル"
# 「あっ、はいっ、ヒルディーお姉様！　<b>ノヴァフォーム</b>になる為の特訓、ご指導よろしくお願いします……！」
line = "「あっ、はいっ、ヒルディーお姉様！　<b>ノヴァフォーム</b>になる為の特訓、ご指導よろしくお願いします……！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ええ。私自身も星霊舞闘会までにもっと強くなる為に来ていますから、一切手は抜きませんわ」
line = "「ええ。私自身も星霊舞闘会までにもっと強くなる為に来ていますから、一切手は抜きませんわ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「事前に言っていた通り――不可能を打ち砕く覚悟で来なさい、フニ！」
line = "「事前に言っていた通り――不可能を打ち砕く覚悟で来なさい、フニ！」"

[[dialogue]]
speaker = "フェニエル"
# 「はいっ……全力で行きます！」
line = "「はいっ……全力で行きます！」"

[[dialogue]]
speaker = "unk"
# ２人は構えて、戦闘態勢に入る。
line = "２人は構えて、戦闘態勢に入る。"

[[dialogue]]
speaker = "フェニエル"
# 「てやぁーーーっ！」
line = "「てやぁーーーっ！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ふっーーー！」
line = "「ふっーーー！」"

[[dialogue]]
speaker = "unk"
# こうして、星霊舞闘会に向けた強化合宿が開始されるのだった――
line = "こうして、星霊舞闘会に向けた強化合宿が開始されるのだった――"
