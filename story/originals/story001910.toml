[[dialogue]]
speaker = "unk"
# 幾度目かの世界崩壊の窮地を食い止め、守護天使オオヒメの解放に成功してからしばらく──今日は大晦日。
line = "幾度目かの世界崩壊の窮地を食い止め、守護天使オオヒメの解放に成功してからしばらく──今日は大晦日。"

[[dialogue]]
speaker = "unk"
# 作戦に参加した星騎士たちは、当主のヘレナさんに呼び出され、九浄家に集っていた。
line = "作戦に参加した星騎士たちは、当主のヘレナさんに呼び出され、九浄家に集っていた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「どうしたの、ヘレナちゃん？　みんなにお年玉でも配ってくれるの？」
line = "「どうしたの、ヘレナちゃん？　みんなにお年玉でも配ってくれるの？」"

[[dialogue]]
speaker = "ヘレナ"
# 「残念ながら、お年玉は新年が明けてからだ。此度の用件は別である」
line = "「残念ながら、お年玉は新年が明けてからだ。此度の用件は別である」"

[[dialogue]]
speaker = "ヘレナ"
# 「先日の魔界への遠征、ご苦労であった。改めて皆には礼を述べよう。世界を救ってくれて感謝する」
line = "「先日の魔界への遠征、ご苦労であった。改めて皆には礼を述べよう。世界を救ってくれて感謝する」"

[[dialogue]]
speaker = "ヘレナ"
# 「そして、今日は皆に会わせたい者がいる。さ、ビクビクしていないで入るがよい」
line = "「そして、今日は皆に会わせたい者がいる。さ、ビクビクしていないで入るがよい」"

[[dialogue]]
speaker = "オオヒメ"
# 「し、失礼する……」
line = "「し、失礼する……」"

[[dialogue]]
speaker = "ソフィア"
# 「もしかして……オオヒメさんですか……！？」
line = "「もしかして……オオヒメさんですか……！？」"

[[dialogue]]
speaker = "オオヒメ"
# 「いかにも……守護天使《天恵》のオオヒメだ。他の守護天使たちと同様、アニマ殿の義体により肉体を得た」
line = "「いかにも……守護天使《天恵》のオオヒメだ。他の守護天使たちと同様、アニマ殿の義体により肉体を得た」"

[[dialogue]]
speaker = "ヘレナ"
# 「解放に尽力してくれた皆に、直々の謝罪と礼を告げたいとのことでな。こうやって集まってもらったというわけだ」
line = "「解放に尽力してくれた皆に、直々の謝罪と礼を告げたいとのことでな。こうやって集まってもらったというわけだ」"

[[dialogue]]
speaker = "オオヒメ"
# 「本当に……本当に、この度はお騒がせした。合わせる顔もないのだが恥を忍び、この場を借りて、皆の前で謝罪をしたい」
line = "「本当に……本当に、この度はお騒がせした。合わせる顔もないのだが恥を忍び、この場を借りて、皆の前で謝罪をしたい」"

[[dialogue]]
speaker = "オオヒメ"
# 「申し訳、ございませんでしたーーーっ！」
line = "「申し訳、ございませんでしたーーーっ！」"

[[dialogue]]
speaker = "unk"
# 守護天使様が土下座なさったー！
line = "守護天使様が土下座なさったー！"

[[dialogue]]
speaker = "舞亜"
# 「お手本にしたくなるような清々しい土下座だね」
line = "「お手本にしたくなるような清々しい土下座だね」"

[[dialogue]]
speaker = "ソフィア"
# 「土下座をお手本にする機会なんて、ないに越したことないですけどね」
line = "「土下座をお手本にする機会なんて、ないに越したことないですけどね」"

[[dialogue]]
speaker = "オオヒメ"
# 「すまない……本当にすまない……謝ったところで許されるはずもないが……」
line = "「すまない……本当にすまない……謝ったところで許されるはずもないが……」"

[[dialogue]]
speaker = "オオヒメ"
# 「煮るなり焼くなり好きにしてくれて構わない。この身にできることならば、どのような処罰でも辱めでも受けよう……」
line = "「煮るなり焼くなり好きにしてくれて構わない。この身にできることならば、どのような処罰でも辱めでも受けよう……」"

[[dialogue]]
speaker = "フィオナ"
# 「オオヒメ様って、わりと打たれ弱い方なんですね……？」
line = "「オオヒメ様って、わりと打たれ弱い方なんですね……？」"

[[dialogue]]
speaker = "ヘレナ"
# 「とまぁ、謝罪の一点張りでな。皆の者、彼女の処遇を如何にする？」
line = "「とまぁ、謝罪の一点張りでな。皆の者、彼女の処遇を如何にする？」"

[[dialogue]]
speaker = "舞亜"
# 「どうすると言われても……ねえ？」
line = "「どうすると言われても……ねえ？」"

[[dialogue]]
speaker = "ウズメイア"
# 「うんうん、みんなの気持ちはおんなじだよね～」
line = "「うんうん、みんなの気持ちはおんなじだよね～」"

[[dialogue]]
speaker = "unk"
# 顔を上げてください
line = "顔を上げてください"

[[dialogue]]
speaker = "オオヒメ"
# 「う、うむ……処遇は決まっただろうか。石抱でも、島流しでも、キツめの折檻でも耐えてみせよう……」
line = "「う、うむ……処遇は決まっただろうか。石抱でも、島流しでも、キツめの折檻でも耐えてみせよう……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「拷問なんてしないわよ！　オオヒメはこれから私たちの仲間！　いい？」
line = "「拷問なんてしないわよ！　オオヒメはこれから私たちの仲間！　いい？」"

[[dialogue]]
speaker = "オオヒメ"
# 「は……？　今、なんと……？　私を許すというのか……！？」
line = "「は……？　今、なんと……？　私を許すというのか……！？」"

[[dialogue]]
speaker = "ウズメイア"
# 「許すも、許さないも……ね～？　過ぎたことだし～？」
line = "「許すも、許さないも……ね～？　過ぎたことだし～？」"

[[dialogue]]
speaker = "トリシャ"
# 「結果何事もなく、無事解決しましたし……皆の絆も育まれました……。私の占いの精度も……研ぎ澄まされたように思えます……」
line = "「結果何事もなく、無事解決しましたし……皆の絆も育まれました……。私の占いの精度も……研ぎ澄まされたように思えます……」"

[[dialogue]]
speaker = "舞亜"
# 「私もオオヒメさんのおかげで、私の演技にも磨きがかかったし。引退するのはもうちょっと先伸ばしになったかな」
line = "「私もオオヒメさんのおかげで、私の演技にも磨きがかかったし。引退するのはもうちょっと先伸ばしになったかな」"

[[dialogue]]
speaker = "ソフィア"
# 「そのせいで、私のライバルがより強大な存在になってしまったのは複雑ですが……オオヒメさんが仲間になるのはいいことです」
line = "「そのせいで、私のライバルがより強大な存在になってしまったのは複雑ですが……オオヒメさんが仲間になるのはいいことです」"

[[dialogue]]
speaker = "オオヒメ"
# 「い、いいのか？　本当に？　私の引きこもりで、世界が崩壊する寸前だったのだぞ……？」
line = "「い、いいのか？　本当に？　私の引きこもりで、世界が崩壊する寸前だったのだぞ……？」"

[[dialogue]]
speaker = "unk"
# 世界の窮地は何度もあったので
line = "世界の窮地は何度もあったので"

[[dialogue]]
speaker = "フィオナ"
# 「あはは……そう言ってしまうと、私たち、とんでもないことの繰り返しですね」
line = "「あはは……そう言ってしまうと、私たち、とんでもないことの繰り返しですね」"

[[dialogue]]
speaker = "舞亜"
# 「じゃ、これにて一件落着、めでたしめでたしだね」
line = "「じゃ、これにて一件落着、めでたしめでたしだね」"

[[dialogue]]
speaker = "ヘレナ"
# 「皆にわざわざ足を運んでもらったのは、これだけではない。このまま年越しと行こうではないか」
line = "「皆にわざわざ足を運んでもらったのは、これだけではない。このまま年越しと行こうではないか」"

[[dialogue]]
speaker = "蘭美"
# 「年越しそばも用意しているわ。みんなも食べていきなさい」
line = "「年越しそばも用意しているわ。みんなも食べていきなさい」"

[[dialogue]]
speaker = "ヘレナ"
# 「もっと馳走を用意させようかと思ったが、それは新年にとっておくことにした。年越しならばこれだろう」
line = "「もっと馳走を用意させようかと思ったが、それは新年にとっておくことにした。年越しならばこれだろう」"

[[dialogue]]
speaker = "フィオナ"
# 「ありがとうございます。ふふ、大晦日には欠かせませんね」
line = "「ありがとうございます。ふふ、大晦日には欠かせませんね」"

[[dialogue]]
speaker = "フィオナ"
# 「緋宮会長、今年１年大変お世話になりました。また来年もよろしくお願いしますね」
line = "「緋宮会長、今年１年大変お世話になりました。また来年もよろしくお願いしますね」"

[[dialogue]]
speaker = "舞亜"
# 「私も。いろいろありがとね、会長さん。来年の私の活躍にも期待してて」
line = "「私も。いろいろありがとね、会長さん。来年の私の活躍にも期待してて」"

[[dialogue]]
speaker = "unk"
# こちらこそ、来年もよろしく
line = "こちらこそ、来年もよろしく"

[[dialogue]]
speaker = "トリシャ"
# 「友達と年越し……死ぬまでにやっておきたいことのひとつ……友達のおかげで、叶ってしまいました……にへへ」
line = "「友達と年越し……死ぬまでにやっておきたいことのひとつ……友達のおかげで、叶ってしまいました……にへへ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「除夜の鐘が始まったわね！　新年を迎えるまで、もうちょっとよ。いくつになってもこの瞬間はワクワクするわ！」
line = "「除夜の鐘が始まったわね！　新年を迎えるまで、もうちょっとよ。いくつになってもこの瞬間はワクワクするわ！」"

[[dialogue]]
speaker = "ソフィア"
# 「ふぁあぁぁ……むにゃ……もうこんな時間……眠いわけです……」
line = "「ふぁあぁぁ……むにゃ……もうこんな時間……眠いわけです……」"

[[dialogue]]
speaker = "舞亜"
# 「ソフィ、眠いんじゃない？」
line = "「ソフィ、眠いんじゃない？」"

[[dialogue]]
speaker = "ソフィア"
# 「ね、眠くなんてないから……！　子ども扱い、しない、で……」
line = "「ね、眠くなんてないから……！　子ども扱い、しない、で……」"

[[dialogue]]
speaker = "舞亜"
# 「年が明けたら起こすからねー」
line = "「年が明けたら起こすからねー」"

[[dialogue]]
speaker = "ソフィア"
# 「って普通に起こして！　明けたら意味ないから！」
line = "「って普通に起こして！　明けたら意味ないから！」"

[[dialogue]]
speaker = "ウズメイア"
# 「あはは、ツッコミで起きたし！」
line = "「あはは、ツッコミで起きたし！」"

[[dialogue]]
speaker = "unk"
# やがて除夜の鐘も１０７回まで鳴り終わり、年の切り替わる瞬間が差し迫った。
line = "やがて除夜の鐘も１０７回まで鳴り終わり、年の切り替わる瞬間が差し迫った。"

[[dialogue]]
speaker = "unk"
# １０秒前だ！
line = "１０秒前だ！"

[[dialogue]]
speaker = "ヴィーナス"
# 「それじゃ、みんなー！　カウントダウンよ！」
line = "「それじゃ、みんなー！　カウントダウンよ！」"

[[dialogue]]
speaker = "ソフィア"
# 「５っ！」
line = "「５っ！」"

[[dialogue]]
speaker = "トリシャ"
# 「よ、４……！」
line = "「よ、４……！」"

[[dialogue]]
speaker = "ウズメイア"
# 「さーん！」
line = "「さーん！」"

[[dialogue]]
speaker = "舞亜"
# 「にーぃ」
line = "「にーぃ」"

[[dialogue]]
speaker = "フィオナ"
# 「１っ！」
line = "「１っ！」"

[[dialogue]]
speaker = "みんな"
# 「あけまして、おめでとうございまーす！」
line = "「あけまして、おめでとうございまーす！」"

[[dialogue]]
speaker = "unk"
# 年が明けると同時、最後の１０８回目の鐘が鳴る。
line = "年が明けると同時、最後の１０８回目の鐘が鳴る。"

[[dialogue]]
speaker = "unk"
# 新たな年は、例年以上に賑々しく幕を開けた。
line = "新たな年は、例年以上に賑々しく幕を開けた。"

[[dialogue]]
speaker = "unk"
# 今年も良い年でありますように。
line = "今年も良い年でありますように。"
