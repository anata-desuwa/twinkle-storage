[[dialogue]]
speaker = "unk"
# 第３話,一等星の試練,P
line = "第３話,一等星の試練,P"

[[dialogue]]
speaker = "モネ"
# 「はい。これで今回のレポートは完成です」
line = "「はい。これで今回のレポートは完成です」"

[[dialogue]]
speaker = "unk"
# ありがとう
line = "ありがとう"

[[dialogue]]
speaker = "モネ"
# 「いえ、これも図書委員の仕事ですから」
line = "「いえ、これも図書委員の仕事ですから」"

[[dialogue]]
speaker = "unk"
# モンスターやアステラに対応した星騎士から聴取し、レポートを作成するのも図書委員の大事な仕事だ。このレポートが図書館に蓄積され、貴重な資料となる。
line = "モンスターやアステラに対応した星騎士から聴取し、レポートを作成するのも図書委員の大事な仕事だ。このレポートが図書館に蓄積され、貴重な資料となる。"

[[dialogue]]
speaker = "モネ"
# 「はぁ……あ、すみません。溜息なんかついて。大したことじゃなくて……」
line = "「はぁ……あ、すみません。溜息なんかついて。大したことじゃなくて……」"

[[dialogue]]
speaker = "unk"
# 俺に隠し事はしないでほしい
line = "俺に隠し事はしないでほしい"

[[dialogue]]
speaker = "モネ"
# 「……はい。私たち、恋人なんですもんね」
line = "「……はい。私たち、恋人なんですもんね」"

[[dialogue]]
speaker = "モネ"
# 「実は昨日──」
line = "「実は昨日──」"

[[dialogue]]
speaker = "シルヴィ"
# 「……で、私はどっかーんってモンスターを倒してアステラを消滅させたんだよ！」
line = "「……で、私はどっかーんってモンスターを倒してアステラを消滅させたんだよ！」"

[[dialogue]]
speaker = "モネ"
# 「……雷光を纏ったメイスがモンスターを捉えた。迸る衝撃と閃光。視界を焼く光が収まると、モンスターは跡形もなく消え去っていた。こうして街に平和が……」
line = "「……雷光を纏ったメイスがモンスターを捉えた。迸る衝撃と閃光。視界を焼く光が収まると、モンスターは跡形もなく消え去っていた。こうして街に平和が……」"

[[dialogue]]
speaker = "リィベル"
# 「ストップ。レポートが小説調になっているわ。モネが手本を見せるっていうから付いてきたのに、これじゃ手本にならないでしょ」
line = "「ストップ。レポートが小説調になっているわ。モネが手本を見せるっていうから付いてきたのに、これじゃ手本にならないでしょ」"

[[dialogue]]
speaker = "モネ"
# 「うぅ、面目ないです……」
line = "「うぅ、面目ないです……」"

[[dialogue]]
speaker = "シルヴィ"
# 「モネちゃんは悪くないよ、気にしないで！」
line = "「モネちゃんは悪くないよ、気にしないで！」"

[[dialogue]]
speaker = "リィベル"
# 「そうね。元星徒会役員のくせに自分でレポートも作れないあなたが悪いもの」
line = "「そうね。元星徒会役員のくせに自分でレポートも作れないあなたが悪いもの」"

[[dialogue]]
speaker = "シルヴィ"
# 「ぐはっ！　だってだって、説明するの苦手なんだもん！」
line = "「ぐはっ！　だってだって、説明するの苦手なんだもん！」"

[[dialogue]]
speaker = "リィベル"
# 「あなた、いつからプリマステラやってるの？」
line = "「あなた、いつからプリマステラやってるの？」"

[[dialogue]]
speaker = "シルヴィ"
# 「１年生のときから！　これでもベテランだよ！」
line = "「１年生のときから！　これでもベテランだよ！」"

[[dialogue]]
speaker = "リィベル"
# 「このベテラン、貫禄が全くないわ」
line = "「このベテラン、貫禄が全くないわ」"

[[dialogue]]
speaker = "モネ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "シルヴィ"
# 「モネちゃん？」
line = "「モネちゃん？」"

[[dialogue]]
speaker = "モネ"
# 「あ、いえ、なんでもないです」
line = "「あ、いえ、なんでもないです」"

[[dialogue]]
speaker = "シルヴィ"
# 「そう？　ま、何かあったら頼ってね。今日はありがとう。またよろしくね！」
line = "「そう？　ま、何かあったら頼ってね。今日はありがとう。またよろしくね！」"

[[dialogue]]
speaker = "リィベル"
# 「そこは自分で書きなさいよ、ベテラン」
line = "「そこは自分で書きなさいよ、ベテラン」"

[[dialogue]]
speaker = "モネ"
# 「あはは……」
line = "「あはは……」"

[[dialogue]]
speaker = "モネ"
# 「１年生の時にプリマステラになっている人も多いのに、私は２年生になってもプリマステラになれないまま……」
line = "「１年生の時にプリマステラになっている人も多いのに、私は２年生になってもプリマステラになれないまま……」"

[[dialogue]]
speaker = "モネ"
# 「戦闘服も増えて、いろんな戦い方ができるようになりましたし、実力も付いてきたと思います」
line = "「戦闘服も増えて、いろんな戦い方ができるようになりましたし、実力も付いてきたと思います」"

[[dialogue]]
speaker = "モネ"
# 「でも、やっぱり私がプリマステラに相応しいとは思えなくて……」
line = "「でも、やっぱり私がプリマステラに相応しいとは思えなくて……」"

[[dialogue]]
speaker = "ミア"
# 「会長さん、大変！　不審者……というかあいつが校門に！」
line = "「会長さん、大変！　不審者……というかあいつが校門に！」"

[[dialogue]]
speaker = "イングリット"
# 「出てこい、魔王。ここにいるのは分かっているぞ！」
line = "「出てこい、魔王。ここにいるのは分かっているぞ！」"

[[dialogue]]
speaker = "unk"
# イングリットはかつて星騎士と敵対していた組織、コラプサーの一員だ。
line = "イングリットはかつて星騎士と敵対していた組織、コラプサーの一員だ。"

[[dialogue]]
speaker = "unk"
# 生粋の戦闘狂であり、時折、強敵を求めて学園に出没する。
line = "生粋の戦闘狂であり、時折、強敵を求めて学園に出没する。"

[[dialogue]]
speaker = "ミア"
# 「早く<ruby=レイラさん>保護者</ruby>を呼んで、引き取ってもらわないと……」
line = "「早く<ruby>保護者<rt>レイラさん</rt></ruby>を呼んで、引き取ってもらわないと……」"

[[dialogue]]
speaker = "イングリット"
# 「見つけたぞ、魔王！　私と戦え！」
line = "「見つけたぞ、魔王！　私と戦え！」"

[[dialogue]]
speaker = "モネ"
# 「……あの、会長？　じっと見つめてどうしたんですか？」
line = "「……あの、会長？　じっと見つめてどうしたんですか？」"

[[dialogue]]
speaker = "unk"
# 戦ってみる？
line = "戦ってみる？"

[[dialogue]]
speaker = "モネ"
# 「わ、私がですか！？」
line = "「わ、私がですか！？」"

[[dialogue]]
speaker = "イングリット"
# 「そいつが私と戦うだと？　なよなよして見るからに弱そうだ。弱者に興味はない、どけ」
line = "「そいつが私と戦うだと？　なよなよして見るからに弱そうだ。弱者に興味はない、どけ」"

[[dialogue]]
speaker = "モネ"
# 「……っ」
line = "「……っ」"

[[dialogue]]
speaker = "モネ"
# （もちろん、会長やウィステリアさんと比べたら、私なんてまだまだだ。……だけど）
line = "（もちろん、会長やウィステリアさんと比べたら、私なんてまだまだだ。……だけど）"

[[dialogue]]
speaker = "モネ"
# 「私はもう、弱くない！！　私なりにいろんなことを乗り越えて、強くなったんです！！」
line = "「私はもう、弱くない！！　私なりにいろんなことを乗り越えて、強くなったんです！！」"

[[dialogue]]
speaker = "モネ（覚醒）"
# 「『傲慢』の魔将、紙屋敷モネが受けて立ちます！」
line = "「『傲慢』の魔将、紙屋敷モネが受けて立ちます！」"

[[dialogue]]
speaker = "イングリット"
# 「この気配、星力ではない……魔力か！　それも桁外れの力を感じるぞ。面白い！」
line = "「この気配、星力ではない……魔力か！　それも桁外れの力を感じるぞ。面白い！」"

[[dialogue]]
speaker = "モネ（覚醒）"
# 「レオニスファング！」
line = "「レオニスファング！」"

[[dialogue]]
speaker = "イングリット"
# 「ヘルズリッパー！」
line = "「ヘルズリッパー！」"

[[dialogue]]
speaker = "イングリット"
# 「なかなかやる！　これでどうだ！」
line = "「なかなかやる！　これでどうだ！」"

[[dialogue]]
speaker = "モネ（覚醒）"
# 「魔将の力は……こんなものじゃない！」
line = "「魔将の力は……こんなものじゃない！」"

[[dialogue]]
speaker = "unk"
# 繰り広げられる技の応酬。手練れのイングリットに対しても、互角どころか、優勢に戦いを進めている。
line = "繰り広げられる技の応酬。手練れのイングリットに対しても、互角どころか、優勢に戦いを進めている。"

[[dialogue]]
speaker = "イングリット"
# 「はぁ、はぁ……ふははは！　楽しい、楽しいぞ！　強いな、お前！」
line = "「はぁ、はぁ……ふははは！　楽しい、楽しいぞ！　強いな、お前！」"

[[dialogue]]
speaker = "イングリット"
# 「だが、勝つのは私だ！　次の一撃で仕留める！」
line = "「だが、勝つのは私だ！　次の一撃で仕留める！」"

[[dialogue]]
speaker = "モネ（覚醒）"
# （自分勝手に戦い始めて、追い詰められているのに喜んで、変な人）
line = "（自分勝手に戦い始めて、追い詰められているのに喜んで、変な人）"

[[dialogue]]
speaker = "モネ（覚醒）"
# （でも、今なら分かる。この人は自分の欲望に忠実なだけ）
line = "（でも、今なら分かる。この人は自分の欲望に忠実なだけ）"

[[dialogue]]
speaker = "モネ（覚醒）"
# （私もきっと同じだ。本を読むためならどんなに追い詰められても構わないし、小説を書いて罵られたって気にしない）
line = "（私もきっと同じだ。本を読むためならどんなに追い詰められても構わないし、小説を書いて罵られたって気にしない）"

[[dialogue]]
speaker = "モネ（覚醒）"
# 「それが私の、私だけの傲慢！」
line = "「それが私の、私だけの傲慢！」"

[[dialogue]]
speaker = "イングリット"
# 「ゆくぞ！　ドゥーム・エクスキューション！！」
line = "「ゆくぞ！　ドゥーム・エクスキューション！！」"

[[dialogue]]
speaker = "モネ（覚醒）"
# 「イングリットさん。私は、あなたに勝ちたい！　──叩き潰せ、アロガントスレッジハンマー！！」
line = "「イングリットさん。私は、あなたに勝ちたい！　──叩き潰せ、アロガントスレッジハンマー！！」"

[[dialogue]]
speaker = "イングリット"
# 「くっ……」
line = "「くっ……」"

[[dialogue]]
speaker = "モネ（覚醒）"
# 「私の、勝ちです」
line = "「私の、勝ちです」"

[[dialogue]]
speaker = "ミア"
# 「モネ先輩すごい！　ひとりでコラプサーに勝っちゃった！」
line = "「モネ先輩すごい！　ひとりでコラプサーに勝っちゃった！」"

[[dialogue]]
speaker = "unk"
# 以前と比べて弱体化したとはいえ、コラプサーは並のプリマステラより強い。これは大きな勝利だ。
line = "以前と比べて弱体化したとはいえ、コラプサーは並のプリマステラより強い。これは大きな勝利だ。"

[[dialogue]]
speaker = "イングリット"
# 「ふん、今回は譲ってやる。次は負けんからな」
line = "「ふん、今回は譲ってやる。次は負けんからな」"

[[dialogue]]
speaker = "モネ（覚醒）"
# 「はい。いつでも受けて立ちますよ」
line = "「はい。いつでも受けて立ちますよ」"

[[dialogue]]
speaker = "unk"
# イングリットの攻撃的な視線を、真っ向から受け止めるモネ。この一戦はモネを大きく成長させたようだ。
line = "イングリットの攻撃的な視線を、真っ向から受け止めるモネ。この一戦はモネを大きく成長させたようだ。"

[[dialogue]]
speaker = "イングリット"
# 「それにしても、戦ったら腹が減ったな。何か食わせろ」
line = "「それにしても、戦ったら腹が減ったな。何か食わせろ」"

[[dialogue]]
speaker = "モネ（覚醒）"
# 「ふふ。本当に自由な方ですね。おすすめのカレー屋さんがあるんです。ご一緒しませんか？」
line = "「ふふ。本当に自由な方ですね。おすすめのカレー屋さんがあるんです。ご一緒しませんか？」"

[[dialogue]]
speaker = "イングリット"
# 「それは構わんが、貴様のおごりだろうな？」
line = "「それは構わんが、貴様のおごりだろうな？」"

[[dialogue]]
speaker = "モネ（覚醒）"
# 「いいんですか！？　なかなか一緒に行ってくれる人がいなかったので嬉しいです！　せっかくだからスぺシャルカレーをご馳走しますね」
line = "「いいんですか！？　なかなか一緒に行ってくれる人がいなかったので嬉しいです！　せっかくだからスぺシャルカレーをご馳走しますね」"

[[dialogue]]
speaker = "イングリット"
# 「スペシャルだと？　それは期待できそうだ。くく、話の分かるヤツじゃないか」
line = "「スペシャルだと？　それは期待できそうだ。くく、話の分かるヤツじゃないか」"

[[dialogue]]
speaker = "モネ（覚醒）"
# 「会長はどうされますか？」
line = "「会長はどうされますか？」"

[[dialogue]]
speaker = "unk"
# ……俺はちょっと用事があるから
line = "……俺はちょっと用事があるから"

[[dialogue]]
speaker = "モネ（覚醒）"
# 「ミアさんは？」
line = "「ミアさんは？」"

[[dialogue]]
speaker = "ミア"
# 「私は──」
line = "「私は──」"

[[dialogue]]
speaker = "unk"
# （やめておいた方がいい……）
line = "（やめておいた方がいい……）"

[[dialogue]]
speaker = "ミア"
# （どうして止めるの？　……え？　モネ先輩と一緒に食事に行くのは危険……？）
line = "（どうして止めるの？　……え？　モネ先輩と一緒に食事に行くのは危険……？）"

[[dialogue]]
speaker = "ミア"
# 「わ、私は遠慮しておきます……」
line = "「わ、私は遠慮しておきます……」"

[[dialogue]]
speaker = "モネ（覚醒）"
# 「分かりました。じゃあ、イングリットさんとふたりで行ってきますね」
line = "「分かりました。じゃあ、イングリットさんとふたりで行ってきますね」"

[[dialogue]]
speaker = "unk"
# しばらく後、モネは無事試験に合格し、プリマステラになった。
line = "しばらく後、モネは無事試験に合格し、プリマステラになった。"

[[dialogue]]
speaker = "unk"
# なおイングリットは──理由は不明だが、その後モネを避けるようになってしまったという。
line = "なおイングリットは──理由は不明だが、その後モネを避けるようになってしまったという。"
