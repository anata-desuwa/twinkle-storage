[[dialogue]]
speaker = "unk"
# 第１話,神と使徒,B
line = "第１話,神と使徒,B"

[[dialogue]]
speaker = "ルヴィネ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# ルヴィネはタブレット端末を手に、１人黙々と星徒会業務をこなしていた。
line = "ルヴィネはタブレット端末を手に、１人黙々と星徒会業務をこなしていた。"

[[dialogue]]
speaker = "unk"
# しかし気配に気付き、後ろを振り返る。
line = "しかし気配に気付き、後ろを振り返る。"

[[dialogue]]
speaker = "ルヴィネ"
# 「何か用？」
line = "「何か用？」"

[[dialogue]]
speaker = "unk"
# その視線の先には──
line = "その視線の先には──"

[[dialogue]]
speaker = "ジグ"
# 「おや、せっかく顔を出したのに冷たいじゃないか。目的を同じくする仲間だろう？」
line = "「おや、せっかく顔を出したのに冷たいじゃないか。目的を同じくする仲間だろう？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「あなたを仲間だと思ったことはないわ。それに仮面をしているから顔は出してないじゃない」
line = "「あなたを仲間だと思ったことはないわ。それに仮面をしているから顔は出してないじゃない」"

[[dialogue]]
speaker = "ジグ"
# 「はは、確かに。これは一本取られた」
line = "「はは、確かに。これは一本取られた」"

[[dialogue]]
speaker = "ルヴィネ"
# 「あなたを呼んだ覚えはない。ここは極星学園の星徒会室。部外者の立ち入りは遠慮してもらってるわ」
line = "「あなたを呼んだ覚えはない。ここは極星学園の星徒会室。部外者の立ち入りは遠慮してもらってるわ」"

[[dialogue]]
speaker = "ジグ"
# 「手厳しいね。では改めて入室の許可をいただけるかな、星徒会長さん？」
line = "「手厳しいね。では改めて入室の許可をいただけるかな、星徒会長さん？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「はぁ、断ると言っても、大人しく立ち去る気はないんでしょう。好きにしなさい」
line = "「はぁ、断ると言っても、大人しく立ち去る気はないんでしょう。好きにしなさい」"

[[dialogue]]
speaker = "ジグ"
# 「ふふ。ありがとう」
line = "「ふふ。ありがとう」"

[[dialogue]]
speaker = "unk"
# リクリエによる再創世を目指す──ジグの言う通り、その目的は一致しているはずだが、ルヴィネの反応は冷たい。
line = "リクリエによる再創世を目指す──ジグの言う通り、その目的は一致しているはずだが、ルヴィネの反応は冷たい。"

[[dialogue]]
speaker = "unk"
# だがジグは、そのつれない態度すら楽しむように軽薄に笑う。
line = "だがジグは、そのつれない態度すら楽しむように軽薄に笑う。"

[[dialogue]]
speaker = "ジグ"
# 「そういえば、アルタイルから飛ばされた魔王たちがデネブに来ていたそうだね」
line = "「そういえば、アルタイルから飛ばされた魔王たちがデネブに来ていたそうだね」"

[[dialogue]]
speaker = "ルヴィネ"
# 「ええ。だけど取り逃がしてしまったわ。我ながら失態ね」
line = "「ええ。だけど取り逃がしてしまったわ。我ながら失態ね」"

[[dialogue]]
speaker = "ジグ"
# 「私はそこまでは言っていないよ？」
line = "「私はそこまでは言っていないよ？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「どうだか。私を<ruby=なじ>詰</ruby>りに来たんじゃないの」
line = "「どうだか。私を<ruby>詰<rt>なじ</rt></ruby>りに来たんじゃないの」"

[[dialogue]]
speaker = "ルヴィネ"
# 「それに魔王たちは私の正体ばかりか、創造神の存在まで知ってしまった。<ruby=テルル>旧世代の女神</ruby>が余計なことをするから」
line = "「それに魔王たちは私の正体ばかりか、創造神の存在まで知ってしまった。<ruby>旧世代の女神<rt>テルル</rt></ruby>が余計なことをするから」"

[[dialogue]]
speaker = "ルヴィネ"
# 「そうそう。魔王たちは創造神を『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』と名付けていたわ」
line = "「そうそう。魔王たちは創造神を『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』と名付けていたわ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「あなたは“神の騎士”を名乗っているから、一応伝えておくわね」
line = "「あなたは“神の騎士”を名乗っているから、一応伝えておくわね」"

[[dialogue]]
speaker = "ジグ"
# 「我が神に名を……？　人間風情が神に名前を付けるなんて不敬だよ。存在を認識することすら分不相応だ」
line = "「我が神に名を……？　人間風情が神に名前を付けるなんて不敬だよ。存在を認識することすら分不相応だ」"

[[dialogue]]
speaker = "ジグ"
# 「ああ、もちろん君は別だよ。君は創造神自らが生み出した、新たな女神なのだから」
line = "「ああ、もちろん君は別だよ。君は創造神自らが生み出した、新たな女神なのだから」"

[[dialogue]]
speaker = "ルヴィネ"
# 「あっそう。別にあなたの許しなんて欲しくないのだけど」
line = "「あっそう。別にあなたの許しなんて欲しくないのだけど」"

[[dialogue]]
speaker = "ジグ"
# 「ところで、君以外の星徒会役員はどうしたんだい？　せっかく広い星徒会室なのに、君１人のようだが」
line = "「ところで、君以外の星徒会役員はどうしたんだい？　せっかく広い星徒会室なのに、君１人のようだが」"

[[dialogue]]
speaker = "ルヴィネ"
# 「レティシアとグレイスなら、アルタイルの天界で作戦中よ。女神の神殿を破壊すれば、アルタイルの天使は全て消滅する」
line = "「レティシアとグレイスなら、アルタイルの天界で作戦中よ。女神の神殿を破壊すれば、アルタイルの天使は全て消滅する」"

[[dialogue]]
speaker = "ジグ"
# 「そうなればアルタイルの敗北は必至──ということか。面白いことを考えるね」
line = "「そうなればアルタイルの敗北は必至──ということか。面白いことを考えるね」"

[[dialogue]]
speaker = "ジグ"
# （……なるほど、それは使えそうだ）
line = "（……なるほど、それは使えそうだ）"

[[dialogue]]
speaker = "ジグ"
# 「しかし君はアルタイルに行かなくていいのかい？」
line = "「しかし君はアルタイルに行かなくていいのかい？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「ディザスターハンドを制御する必要がある以上、私はデネブを離れることはできない」
line = "「ディザスターハンドを制御する必要がある以上、私はデネブを離れることはできない」"

[[dialogue]]
speaker = "ルヴィネ"
# 「それに平行世界を超える転送装置は、ディザスターハンドの力を抽出して作成したもの。そう簡単には用意できないわ」
line = "「それに平行世界を超える転送装置は、ディザスターハンドの力を抽出して作成したもの。そう簡単には用意できないわ」"

[[dialogue]]
speaker = "ジグ"
# 「ふ～ん。具体的にはいくつあるんだい？」
line = "「ふ～ん。具体的にはいくつあるんだい？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「…………今のところ、製造に成功した転送装置は２つだけ」
line = "「…………今のところ、製造に成功した転送装置は２つだけ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「１つは先日のチナのアルタイル侵攻時に使わせたもの。けれど、これは消失している可能性が高いわ」
line = "「１つは先日のチナのアルタイル侵攻時に使わせたもの。けれど、これは消失している可能性が高いわ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「最後の１つは、今回の作戦でグレイスに持たせたもの。３つ目は作っている途中だけれど、まだ完成の目途が立っていないの」
line = "「最後の１つは、今回の作戦でグレイスに持たせたもの。３つ目は作っている途中だけれど、まだ完成の目途が立っていないの」"

[[dialogue]]
speaker = "ジグ"
# 「なるほど。それならデネブから動けないのも仕方ない」
line = "「なるほど。それならデネブから動けないのも仕方ない」"

[[dialogue]]
speaker = "ジグ"
# 「一応確認しておくけど、アルタイルを滅ぼした後は、今度こそデネブでリクリエを起こすんだよね？」
line = "「一応確認しておくけど、アルタイルを滅ぼした後は、今度こそデネブでリクリエを起こすんだよね？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「ええ、もちろん。それが新たな女神たる私の役目なのだから」
line = "「ええ、もちろん。それが新たな女神たる私の役目なのだから」"

[[dialogue]]
speaker = "ジグ"
# 「……そうだよね。うん、それを聞いて安心したよ」
line = "「……そうだよね。うん、それを聞いて安心したよ」"

[[dialogue]]
speaker = "ジグ"
# 「いやぁ、もしかするとデネブに愛着が湧いて役割を放棄してしまわないかと思ったけど、杞憂だったようだ。疑ってごめんよ」
line = "「いやぁ、もしかするとデネブに愛着が湧いて役割を放棄してしまわないかと思ったけど、杞憂だったようだ。疑ってごめんよ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「謝っているようには聞こえないのだけれど……まぁいいわ。でもあなたこそどうなのかしら？」
line = "「謝っているようには聞こえないのだけれど……まぁいいわ。でもあなたこそどうなのかしら？」"

[[dialogue]]
speaker = "ジグ"
# 「私がベガで新星学園の星徒会長をしていたことを言っているのかい？」
line = "「私がベガで新星学園の星徒会長をしていたことを言っているのかい？」"

[[dialogue]]
speaker = "ジグ"
# 「なら心配はいらないよ。あの頃の記憶を取り戻しはしたが、今の私にとっては意味のないものだ」
line = "「なら心配はいらないよ。あの頃の記憶を取り戻しはしたが、今の私にとっては意味のないものだ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「記憶を取り戻したあなたに、本当に『リクリエの使徒』の役目が果たせるの？」
line = "「記憶を取り戻したあなたに、本当に『リクリエの使徒』の役目が果たせるの？」"

[[dialogue]]
speaker = "ジグ"
# 「無論だとも」
line = "「無論だとも」"

[[dialogue]]
speaker = "ジグ"
# 「ベガの星騎士、レナーテ・<ruby=ジグ>Ｚ</ruby>・サイフリートはとうに死んだ。私はジグ。“真なる神の騎士”だ」
line = "「ベガの星騎士、レナーテ・<ruby>Ｚ<rt>ジグ</rt></ruby>・サイフリートはとうに死んだ。私はジグ。“真なる神の騎士”だ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「同じベガの星騎士──梨緒・<ruby=アガサ>Ａ</ruby>・クリステレスのことは気にならないと？」
line = "「同じベガの星騎士──梨緒・<ruby>Ａ<rt>アガサ</rt></ruby>・クリステレスのことは気にならないと？」"

[[dialogue]]
speaker = "ジグ"
# 「ああ。彼女がどこで何をしようが気にならないよ。どこかで野垂れ死にしてくれていい」
line = "「ああ。彼女がどこで何をしようが気にならないよ。どこかで野垂れ死にしてくれていい」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……そう」
line = "「……そう」"

[[dialogue]]
speaker = "ジグ"
# 「アルタイルの天界襲撃、成功するといいね。じゃあ私はこれで」
line = "「アルタイルの天界襲撃、成功するといいね。じゃあ私はこれで」"

[[dialogue]]
speaker = "unk"
# ジグはわざとらしい笑みを作ると、軽く手を振ってどこかへと消えていった。
line = "ジグはわざとらしい笑みを作ると、軽く手を振ってどこかへと消えていった。"

[[dialogue]]
speaker = "ルヴィネ"
# 「はぁ……ようやく行ったわね」
line = "「はぁ……ようやく行ったわね」"

[[dialogue]]
speaker = "unk"
# ジグが去った跡を、忌々しそうに見つめるルヴィネ。
line = "ジグが去った跡を、忌々しそうに見つめるルヴィネ。"

[[dialogue]]
speaker = "ルヴィネ"
# 「私は私の計画を進めるとしましょう」
line = "「私は私の計画を進めるとしましょう」"

[[dialogue]]
speaker = "unk"
# そして作業していたタブレットを置き、ルヴィネもまた星徒会室を後にした。
line = "そして作業していたタブレットを置き、ルヴィネもまた星徒会室を後にした。"
