[[dialogue]]
speaker = "unk"
# 合宿１日目の夜。
line = "合宿１日目の夜。"

[[dialogue]]
speaker = "unk"
# テントの前でランプの火を灯して待っていると、温泉から上がった２人が戻ってきた――
line = "テントの前でランプの火を灯して待っていると、温泉から上がった２人が戻ってきた――"

[[dialogue]]
speaker = "サーシャ"
# 「ふぅ、いいお湯だったわ～」
line = "「ふぅ、いいお湯だったわ～」"

[[dialogue]]
speaker = "アナ"
# 「汗を流して、サッパリ爽快です」
line = "「汗を流して、サッパリ爽快です」"

[[dialogue]]
speaker = "unk"
# ２人共、おかえり～
line = "２人共、おかえり～"

[[dialogue]]
speaker = "サーシャ"
# 「会長くん、ただいま～♪」
line = "「会長くん、ただいま～♪」"

[[dialogue]]
speaker = "アナ"
# 「……さて、食事も終えて、お風呂にも入りましたし、後はもう寝るだけですね」
line = "「……さて、食事も終えて、お風呂にも入りましたし、後はもう寝るだけですね」"

[[dialogue]]
speaker = "サーシャ"
# 「食事といえば、魚を焼いて食べるだけだったのに、凄く美味しく感じたわ」
line = "「食事といえば、魚を焼いて食べるだけだったのに、凄く美味しく感じたわ」"

[[dialogue]]
speaker = "サーシャ"
# 「自分で釣った魚だからかしら？　自給自足ってこういうことなんだって、少し実感出来た感じがするわ～」
line = "「自分で釣った魚だからかしら？　自給自足ってこういうことなんだって、少し実感出来た感じがするわ～」"

[[dialogue]]
speaker = "unk"
# サバイバルの醍醐味ですね
line = "サバイバルの醍醐味ですね"

[[dialogue]]
speaker = "アナ"
# 「私も釣りは好きですが、釣った魚を食べるという体験は今回が初めてでした」
line = "「私も釣りは好きですが、釣った魚を食べるという体験は今回が初めてでした」"

[[dialogue]]
speaker = "サーシャ"
# 「ふふっ♪　魚が上手く焼けなくて焦がしちゃったアナちゃん、可愛かったわ～」
line = "「ふふっ♪　魚が上手く焼けなくて焦がしちゃったアナちゃん、可愛かったわ～」"

[[dialogue]]
speaker = "アナ"
# 「そ、そのことはもう、いいじゃないですか……」
line = "「そ、そのことはもう、いいじゃないですか……」"

[[dialogue]]
speaker = "unk"
# 料理が苦手なのは盲点だったな
line = "料理が苦手なのは盲点だったな"

[[dialogue]]
speaker = "アナ"
# 「か、会長まで……誰しも弱点の１つくらいあるものです。むぅ……」
line = "「か、会長まで……誰しも弱点の１つくらいあるものです。むぅ……」"

[[dialogue]]
speaker = "サーシャ"
# 「明日も魚を取って食べることになるだろうし、釣りを教えて貰った代わりに、今度は私が上手な焼き方を教えてあげるわね♪」
line = "「明日も魚を取って食べることになるだろうし、釣りを教えて貰った代わりに、今度は私が上手な焼き方を教えてあげるわね♪」"

[[dialogue]]
speaker = "アナ"
# 「こうなったら、最終日までには魚を焦がさないようになってみせます」
line = "「こうなったら、最終日までには魚を焦がさないようになってみせます」"

[[dialogue]]
speaker = "アナ"
# 「ん……ふわぁ～」
line = "「ん……ふわぁ～」"

[[dialogue]]
speaker = "アナ"
# 「……すみません。話していたら、ちょっと眠くなってきてしまいました……」
line = "「……すみません。話していたら、ちょっと眠くなってきてしまいました……」"

[[dialogue]]
speaker = "サーシャ"
# 「そしたら、明日もまたあるし、今日はここまでにして寝ましょうか」
line = "「そしたら、明日もまたあるし、今日はここまでにして寝ましょうか」"

[[dialogue]]
speaker = "unk"
# そうですね。じゃあ、また明日
line = "そうですね。じゃあ、また明日"

[[dialogue]]
speaker = "サーシャ"
# 「あら、会長くんは別のテントの方に行っちゃうの？」
line = "「あら、会長くんは別のテントの方に行っちゃうの？」"

[[dialogue]]
speaker = "サーシャ"
# 「――男だから？　え～、そんな固いこと言わずに、一緒のテントで寝ればいいのに～」
line = "「――男だから？　え～、そんな固いこと言わずに、一緒のテントで寝ればいいのに～」"

[[dialogue]]
speaker = "アナ"
# 「いや、さすがに異性同士が１つのテント内で寝るのは、色々と問題があるかと……」
line = "「いや、さすがに異性同士が１つのテント内で寝るのは、色々と問題があるかと……」"

[[dialogue]]
speaker = "サーシャ"
# 「お姉ちゃん、寂しいわ～」
line = "「お姉ちゃん、寂しいわ～」"

[[dialogue]]
speaker = "アナ"
# 「ほら、サーシャ先輩。同性の私とは一緒のテントですから」
line = "「ほら、サーシャ先輩。同性の私とは一緒のテントですから」"

[[dialogue]]
speaker = "アナ"
# 「――それでは会長、おやすみなさい」
line = "「――それでは会長、おやすみなさい」"

[[dialogue]]
speaker = "unk"
# そうして俺は、２人とは別のテントで眠っていたのだが……
line = "そうして俺は、２人とは別のテントで眠っていたのだが……"

[[dialogue]]
speaker = "unk"
# 夜中に何やら物音がして、目が覚めると――
line = "夜中に何やら物音がして、目が覚めると――"

[[dialogue]]
speaker = "アナ"
# 「ん～……お手洗いから、今戻りました……」
line = "「ん～……お手洗いから、今戻りました……」"

[[dialogue]]
speaker = "unk"
# アナ？　どうしてこっちのテントに……？
line = "アナ？　どうしてこっちのテントに……？"

[[dialogue]]
speaker = "アナ"
# 「サーシャ先輩、横失礼しますね……」
line = "「サーシャ先輩、横失礼しますね……」"

[[dialogue]]
speaker = "アナ"
# 「改めて、おやすみなさい……むにゃむにゃ……」
line = "「改めて、おやすみなさい……むにゃむにゃ……」"

[[dialogue]]
speaker = "unk"
# まさか、寝ぼけてテント間違えてる……！？
line = "まさか、寝ぼけてテント間違えてる……！？"

[[dialogue]]
speaker = "アナ"
# 「ん～、私の抱き枕……どこ……」
line = "「ん～、私の抱き枕……どこ……」"

[[dialogue]]
speaker = "アナ"
# 「ん……♪　ありました……」
line = "「ん……♪　ありました……」"

[[dialogue]]
speaker = "アナ"
# 「温かくて安心します……ふぅ……すぅ……」
line = "「温かくて安心します……ふぅ……すぅ……」"

[[dialogue]]
speaker = "unk"
# ぐおぉ……女の子特有のいい匂いが……！
line = "ぐおぉ……女の子特有のいい匂いが……！"

[[dialogue]]
speaker = "サーシャ"
# 「失礼しま～す」
line = "「失礼しま～す」"

[[dialogue]]
speaker = "サーシャ"
# 「あらあら♪　声がするから来てみたら、面白いことになってるわね～」
line = "「あらあら♪　声がするから来てみたら、面白いことになってるわね～」"

[[dialogue]]
speaker = "unk"
# サーシャさん！？　こ、これには理由が――
line = "サーシャさん！？　こ、これには理由が――"

[[dialogue]]
speaker = "サーシャ"
# 「ふふっ、慌てなくても大丈夫よ。分かってるから」
line = "「ふふっ、慌てなくても大丈夫よ。分かってるから」"

[[dialogue]]
speaker = "サーシャ"
# 「アナちゃんが寝ぼけて、こっちのテントに入ってきちゃったんでしょう？」
line = "「アナちゃんが寝ぼけて、こっちのテントに入ってきちゃったんでしょう？」"

[[dialogue]]
speaker = "サーシャ"
# 「この前の合宿の時にも、私のところに潜り込んできて、そのまま寝ちゃったことがあったのよね～」
line = "「この前の合宿の時にも、私のところに潜り込んできて、そのまま寝ちゃったことがあったのよね～」"

[[dialogue]]
speaker = "サーシャ"
# 「というわけで、よいしょっと♪」
line = "「というわけで、よいしょっと♪」"

[[dialogue]]
speaker = "unk"
# ちょっ、なんでサーシャさんまで隣に！？
line = "ちょっ、なんでサーシャさんまで隣に！？"

[[dialogue]]
speaker = "サーシャ"
# 「え？　だって、アナちゃんがこっちで寝てたら、私が１人きりで寂しくなっちゃうわ～」
line = "「え？　だって、アナちゃんがこっちで寝てたら、私が１人きりで寂しくなっちゃうわ～」"

[[dialogue]]
speaker = "サーシャ"
# 「だから、こうなった以上、皆で川の字になって寝ればいいんじゃないかな～と思って♪」
line = "「だから、こうなった以上、皆で川の字になって寝ればいいんじゃないかな～と思って♪」"

[[dialogue]]
speaker = "サーシャ"
# 「――異性同士だからマズいって？　う～ん、そうね～」
line = "「――異性同士だからマズいって？　う～ん、そうね～」"

[[dialogue]]
speaker = "サーシャ"
# 「あっ♪　でも会長くんとアナちゃんをこのまま２人きりにするよりは、３人の方が安全じゃないかしら？」
line = "「あっ♪　でも会長くんとアナちゃんをこのまま２人きりにするよりは、３人の方が安全じゃないかしら？」"

[[dialogue]]
speaker = "unk"
# 明らかに今思い付いて言いましたよね！？
line = "明らかに今思い付いて言いましたよね！？"

[[dialogue]]
speaker = "サーシャ"
# 「あらあら、うふふ♪　それじゃあ、おやすみなさい～」
line = "「あらあら、うふふ♪　それじゃあ、おやすみなさい～」"

[[dialogue]]
speaker = "サーシャ"
# 「……ほら、アナちゃんが起きちゃうから、会長くんも静かにしないとダメよ～」
line = "「……ほら、アナちゃんが起きちゃうから、会長くんも静かにしないとダメよ～」"

[[dialogue]]
speaker = "unk"
# 結局、強引に押し切られる形で、そのまま３人で寝ることになったのだが――
line = "結局、強引に押し切られる形で、そのまま３人で寝ることになったのだが――"

[[dialogue]]
speaker = "サーシャ"
# 「すやすや……うふふ……<emoji=heart04>」
line = "「すやすや……うふふ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# サーシャさんも抱き着き癖があるとは……！
line = "サーシャさんも抱き着き癖があるとは……！"

[[dialogue]]
speaker = "サーシャ"
# 「いい子いい子……♪」
line = "「いい子いい子……♪」"

[[dialogue]]
speaker = "サーシャ"
# 「んふふ……お姉ちゃんが、ぎゅ～ってして、よしよししちゃう……<emoji=heart04>」
line = "「んふふ……お姉ちゃんが、ぎゅ～ってして、よしよししちゃう……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# せ、背中に柔らかくて大きな感触が……！
line = "せ、背中に柔らかくて大きな感触が……！"

[[dialogue]]
speaker = "unk"
# うおぉ……耐えるんだ俺……！
line = "うおぉ……耐えるんだ俺……！"

[[dialogue]]
speaker = "unk"
# 翌朝――
line = "翌朝――"

[[dialogue]]
speaker = "アナ"
# 「ん……朝……？」
line = "「ん……朝……？」"

[[dialogue]]
speaker = "アナ"
# 「あ、会長……おはようございます……って、はわわ！？　会長！？」
line = "「あ、会長……おはようございます……って、はわわ！？　会長！？」"

[[dialogue]]
speaker = "アナ"
# 「な、何故会長がここに……？　いや、ここは……会長のテントの中……？」
line = "「な、何故会長がここに……？　いや、ここは……会長のテントの中……？」"

[[dialogue]]
speaker = "アナ"
# 「も、もしかして私はまた寝ぼけて……！？　しかも、会長を抱き枕にして……！」
line = "「も、もしかして私はまた寝ぼけて……！？　しかも、会長を抱き枕にして……！」"

[[dialogue]]
speaker = "アナ"
# 「うぅぅ……まさか普段抱き枕を愛用していることを、会長に知られてしまうとは……」
line = "「うぅぅ……まさか普段抱き枕を愛用していることを、会長に知られてしまうとは……」"

[[dialogue]]
speaker = "アナ"
# 「穴があったら入りたいです……あぅ……」
line = "「穴があったら入りたいです……あぅ……」"

[[dialogue]]
speaker = "アナ"
# 「――って、会長？　大丈夫ですか？　何だか様子が……」
line = "「――って、会長？　大丈夫ですか？　何だか様子が……」"

[[dialogue]]
speaker = "unk"
# ある意味、サバイバルだった……ガクリ
line = "ある意味、サバイバルだった……ガクリ"

[[dialogue]]
speaker = "アナ"
# 「え、会長！？　しっかりして下さい、会長～～～！？」
line = "「え、会長！？　しっかりして下さい、会長～～～！？」"

[[dialogue]]
speaker = "サーシャ"
# 「ん……」
line = "「ん……」"

[[dialogue]]
speaker = "サーシャ"
# 「ふわぁ～……アナちゃん、おはよ～……って、あら？」
line = "「ふわぁ～……アナちゃん、おはよ～……って、あら？」"

[[dialogue]]
speaker = "サーシャ"
# 「２人共、どうしたの？」
line = "「２人共、どうしたの？」"

[[dialogue]]
speaker = "unk"
# サーシャさんが何事もなかったかのように起きたところで、俺の意識は完全に寝落ちするのだった。
line = "サーシャさんが何事もなかったかのように起きたところで、俺の意識は完全に寝落ちするのだった。"
