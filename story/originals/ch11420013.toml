[[dialogue]]
speaker = "unk"
# 第３話,花騎士とモンスター,P
line = "第３話,花騎士とモンスター,P"

[[dialogue]]
speaker = "ステラ"
# 「スプリングガーデンには６つの国があるんです」
line = "「スプリングガーデンには６つの国があるんです」"

[[dialogue]]
speaker = "ステラ"
# 「『リリィウッド』『ベルガモットバレー』『ウィンターローズ』『ブロッサムヒル』『ロータスレイク』『バナナオーシャン』」
line = "「『リリィウッド』『ベルガモットバレー』『ウィンターローズ』『ブロッサムヒル』『ロータスレイク』『バナナオーシャン』」"

[[dialogue]]
speaker = "ステラ"
# 「ボクはその内の、ベルガモットバレー出身の<ruby=フラワーナイト>花騎士</ruby>です」
line = "「ボクはその内の、ベルガモットバレー出身の<ruby>花騎士<rt>フラワーナイト</rt></ruby>です」"

[[dialogue]]
speaker = "unk"
# 昼間は滅多に外出しようとしないステラが、珍しく買い物に行きたいと言ったので、俺とルリエルで付き合うことにした。
line = "昼間は滅多に外出しようとしないステラが、珍しく買い物に行きたいと言ったので、俺とルリエルで付き合うことにした。"

[[dialogue]]
speaker = "unk"
# その道すがら、彼女のいた世界であるスプリングガーデンについて教えてもらう。
line = "その道すがら、彼女のいた世界であるスプリングガーデンについて教えてもらう。"

[[dialogue]]
speaker = "ルリエル"
# 「そもそも花騎士というのは、どういった存在なんでしょうか？」
line = "「そもそも花騎士というのは、どういった存在なんでしょうか？」"

[[dialogue]]
speaker = "ステラ"
# 「花騎士というのは、世界花から加護を受けた人たちのことですね」
line = "「花騎士というのは、世界花から加護を受けた人たちのことですね」"

[[dialogue]]
speaker = "ステラ"
# 「ボクたちの世界には『害虫』という存在がいて、凶暴な本能のままに自然を貪ったり、他の生き物を襲ってきたりします」
line = "「ボクたちの世界には『害虫』という存在がいて、凶暴な本能のままに自然を貪ったり、他の生き物を襲ってきたりします」"

[[dialogue]]
speaker = "ステラ"
# 「そんな害虫たちと戦えるように、世界花から加護を授かった存在――」
line = "「そんな害虫たちと戦えるように、世界花から加護を授かった存在――」"

[[dialogue]]
speaker = "ステラ"
# 「もう少し言うと、専門の騎士学校を卒業した人たちが正式な花騎士として認められているんですが……例外的な人たちも少なくはないですね」
line = "「もう少し言うと、専門の騎士学校を卒業した人たちが正式な花騎士として認められているんですが……例外的な人たちも少なくはないですね」"

[[dialogue]]
speaker = "ステラ"
# 「実はボクが花騎士になったのも、害虫に襲われたことがきっかけなんですよ」
line = "「実はボクが花騎士になったのも、害虫に襲われたことがきっかけなんですよ」"

[[dialogue]]
speaker = "ステラ"
# 「馬車に乗って、家族みんなで街に向かってる最中に、害虫の一群に襲われてしまって……」
line = "「馬車に乗って、家族みんなで街に向かってる最中に、害虫の一群に襲われてしまって……」"

[[dialogue]]
speaker = "ステラ"
# 「絶体絶命のピンチの中、ボクはみんなを助けたいって一心で世界花に祈ったんです。そうしたら能力が発現して──」
line = "「絶体絶命のピンチの中、ボクはみんなを助けたいって一心で世界花に祈ったんです。そうしたら能力が発現して──」"

[[dialogue]]
speaker = "ステラ"
# 「その後、騎士学校に入学して力もコントロールできるようになって、晴れて花騎士の資格を得た……という感じですね」
line = "「その後、騎士学校に入学して力もコントロールできるようになって、晴れて花騎士の資格を得た……という感じですね」"

[[dialogue]]
speaker = "unk"
# ステラもか……
line = "ステラもか……"

[[dialogue]]
speaker = "ステラ"
# 「えっ？　もしかして会長さんも似た経験があるんですか……？」
line = "「えっ？　もしかして会長さんも似た経験があるんですか……？」"

[[dialogue]]
speaker = "unk"
# モンスターに襲われたんだ
line = "モンスターに襲われたんだ"

[[dialogue]]
speaker = "unk"
# 小さい頃にね
line = "小さい頃にね"

[[dialogue]]
speaker = "ステラ"
# 「モンスター、ですか？」
line = "「モンスター、ですか？」"

[[dialogue]]
speaker = "ルリエル"
# 「ステラさんの世界に害虫がいるように、ルリエルたちの世界にも人々の平穏を脅かす存在がいるのです！」
line = "「ステラさんの世界に害虫がいるように、ルリエルたちの世界にも人々の平穏を脅かす存在がいるのです！」"

[[dialogue]]
speaker = "ステラ"
# 「こんなに平和そうに見える世界なのに、そんな危険な存在がいるんですね……」
line = "「こんなに平和そうに見える世界なのに、そんな危険な存在がいるんですね……」"

[[dialogue]]
speaker = "ルリエル"
# 「そうなんです！　それと戦うのがわたしたち、<ruby=スターナイト>星騎士</ruby>というわけですねっ！」
line = "「そうなんです！　それと戦うのがわたしたち、<ruby>星騎士<rt>スターナイト</rt></ruby>というわけですねっ！」"

[[dialogue]]
speaker = "ルリエル"
# 「はわわっ！？　言ってるそばから現れたみたいです！」
line = "「はわわっ！？　言ってるそばから現れたみたいです！」"

[[dialogue]]
speaker = "unk"
# ここから近いな……
line = "ここから近いな……"

[[dialogue]]
speaker = "ルリエル"
# 「近くにいる星騎士はわたしたちだけですし、現場に向かわなければいけないのですけど……」
line = "「近くにいる星騎士はわたしたちだけですし、現場に向かわなければいけないのですけど……」"

[[dialogue]]
speaker = "unk"
# ステラを危険に巻き込むわけにはいかない。
line = "ステラを危険に巻き込むわけにはいかない。"

[[dialogue]]
speaker = "unk"
# だが、こんな人の多い街中に１人残していくのも……
line = "だが、こんな人の多い街中に１人残していくのも……"

[[dialogue]]
speaker = "ステラ"
# 「あ、あの、会長さん……ボクも行きたいです！」
line = "「あ、あの、会長さん……ボクも行きたいです！」"

[[dialogue]]
speaker = "ステラ"
# 「先日の事件で、ボクもこの世界で花騎士としての力が使えるようになりました！」
line = "「先日の事件で、ボクもこの世界で花騎士としての力が使えるようになりました！」"

[[dialogue]]
speaker = "ステラ"
# 「戦いの訓練は受けています。なのできっと、邪魔にはならないと思います……！」
line = "「戦いの訓練は受けています。なのできっと、邪魔にはならないと思います……！」"

[[dialogue]]
speaker = "unk"
# その瞳には花騎士として、誰かを守りたいという強い意志が宿っているように思えた。
line = "その瞳には花騎士として、誰かを守りたいという強い意志が宿っているように思えた。"

[[dialogue]]
speaker = "ルリエル"
# 「会長さん、一緒に来てもらいましょう！」
line = "「会長さん、一緒に来てもらいましょう！」"

[[dialogue]]
speaker = "unk"
# でも、十分に注意して
line = "でも、十分に注意して"

[[dialogue]]
speaker = "unk"
# そうだな……
line = "そうだな……"

[[dialogue]]
speaker = "ステラ"
# 「はい、ありがとうございます！」
line = "「はい、ありがとうございます！」"

[[dialogue]]
speaker = "unk"
# ステラの同行を許可すると、俺たちはすぐにモンスターの出現ポイントへと向かった。
line = "ステラの同行を許可すると、俺たちはすぐにモンスターの出現ポイントへと向かった。"

[[dialogue]]
speaker = "ステラ"
# 「っ……！？」
line = "「っ……！？」"

[[dialogue]]
speaker = "ルリエル"
# 「ステラさんはここにいてください！　あれは会長さんとわたしで倒しますから」
line = "「ステラさんはここにいてください！　あれは会長さんとわたしで倒しますから」"

[[dialogue]]
speaker = "unk"
# ルリエル、援護を頼んだ
line = "ルリエル、援護を頼んだ"

[[dialogue]]
speaker = "ルリエル"
# 「はいっ、お任せあれなのです！」
line = "「はいっ、お任せあれなのです！」"

[[dialogue]]
speaker = "ステラ"
# （害虫とは全然違う……あれが、会長さんたちの、敵）
line = "（害虫とは全然違う……あれが、会長さんたちの、敵）"

[[dialogue]]
speaker = "ステラ"
# （でも……会長さんたちも強い……次々に倒していってる……）
line = "（でも……会長さんたちも強い……次々に倒していってる……）"

[[dialogue]]
speaker = "ステラ"
# （花騎士としてボクも何か力になれればって思ってたけど、これなら……）
line = "（花騎士としてボクも何か力になれればって思ってたけど、これなら……）"

[[dialogue]]
speaker = "母親"
# 「きゃあああああっ！！！！」
line = "「きゃあああああっ！！！！」"

[[dialogue]]
speaker = "ステラ"
# 「っ……！？」
line = "「っ……！？」"

[[dialogue]]
speaker = "unk"
# 少し離れた場所で悲鳴が上がる。
line = "少し離れた場所で悲鳴が上がる。"

[[dialogue]]
speaker = "unk"
# そこにはモンスターに襲われる母娘の姿があった。
line = "そこにはモンスターに襲われる母娘の姿があった。"

[[dialogue]]
speaker = "母親"
# 「に、逃げて……！」
line = "「に、逃げて……！」"

[[dialogue]]
speaker = "女の子"
# 「ママっ……！」
line = "「ママっ……！」"

[[dialogue]]
speaker = "unk"
# ステラは弾かれたように飛び出し、モンスターと母娘の間に割って入る。
line = "ステラは弾かれたように飛び出し、モンスターと母娘の間に割って入る。"

[[dialogue]]
speaker = "ステラ"
# （この世界ので力の使い方、ルリエルさんたちを真似して……！）
line = "（この世界ので力の使い方、ルリエルさんたちを真似して……！）"

[[dialogue]]
speaker = "unk"
# そして、ステラが能力を発動した瞬間、目が眩むばかりの強い光が全身から放たれた。
line = "そして、ステラが能力を発動した瞬間、目が眩むばかりの強い光が全身から放たれた。"

[[dialogue]]
speaker = "ステラ"
# 「ブライト・スターっ！！！」
line = "「ブライト・スターっ！！！」"

[[dialogue]]
speaker = "ステラ"
# 「はぁ、はぁ、はぁ……」
line = "「はぁ、はぁ、はぁ……」"

[[dialogue]]
speaker = "ステラ"
# 「あ、あの……大丈夫……でしたか……？」
line = "「あ、あの……大丈夫……でしたか……？」"

[[dialogue]]
speaker = "女の子"
# 「ぁ……ぅ……」
line = "「ぁ……ぅ……」"

[[dialogue]]
speaker = "ステラ"
# （恐怖で動けないみたい……どうすれば……）
line = "（恐怖で動けないみたい……どうすれば……）"

[[dialogue]]
speaker = "ステラ"
# （……あ、そうだ……あれを使って……）
line = "（……あ、そうだ……あれを使って……）"

[[dialogue]]
speaker = "unk"
# 丁度、目の前にあったのは花屋だった。
line = "丁度、目の前にあったのは花屋だった。"

[[dialogue]]
speaker = "unk"
# モンスターに襲われたせいで、路上に花が散らばっている。
line = "モンスターに襲われたせいで、路上に花が散らばっている。"

[[dialogue]]
speaker = "unk"
# 地に落ちたその１輪を拾うと、怯え切っている女の子の前に差し出し──それに力を注ぎ込んだ。
line = "地に落ちたその１輪を拾うと、怯え切っている女の子の前に差し出し──それに力を注ぎ込んだ。"

[[dialogue]]
speaker = "女の子"
# 「わぁ……！！」
line = "「わぁ……！！」"

[[dialogue]]
speaker = "unk"
# ステラの手にした花が光を放つ。
line = "ステラの手にした花が光を放つ。"

[[dialogue]]
speaker = "unk"
# その優しい光に、女の子は恐怖を忘れて見入っていた。
line = "その優しい光に、女の子は恐怖を忘れて見入っていた。"

[[dialogue]]
speaker = "ステラ"
# 「これ、あげます……どうぞ……」
line = "「これ、あげます……どうぞ……」"

[[dialogue]]
speaker = "女の子"
# 「ありがとう、お姉ちゃん！」
line = "「ありがとう、お姉ちゃん！」"

[[dialogue]]
speaker = "ステラ"
# 「い、いえ……」
line = "「い、いえ……」"

[[dialogue]]
speaker = "ルリエル"
# 「すごいです、ステラさん！　ルリエル、感動しちゃいました！」
line = "「すごいです、ステラさん！　ルリエル、感動しちゃいました！」"

[[dialogue]]
speaker = "ステラ"
# 「え、えへへ……キラッと大成功です……」
line = "「え、えへへ……キラッと大成功です……」"

[[dialogue]]
speaker = "ステラ"
# 「元気になってくれてよかった……ボクの力、この世界でも役に立って……」
line = "「元気になってくれてよかった……ボクの力、この世界でも役に立って……」"

[[dialogue]]
speaker = "ルリエル"
# 「みんなを笑顔にしてくれる、素敵な能力だと思います！」
line = "「みんなを笑顔にしてくれる、素敵な能力だと思います！」"

[[dialogue]]
speaker = "ステラ"
# 「も、もう、恥ずかしいですよ。そんなに褒めないでください……」
line = "「も、もう、恥ずかしいですよ。そんなに褒めないでください……」"

[[dialogue]]
speaker = "unk"
# 真っ赤になりながら言っているが、俺もルリエルとまったく同意見で──
line = "真っ赤になりながら言っているが、俺もルリエルとまったく同意見で──"

[[dialogue]]
speaker = "unk"
# ステラの能力は皆を笑顔に出来る、素晴らしい能力だと思わずにいられないのだった。
line = "ステラの能力は皆を笑顔に出来る、素晴らしい能力だと思わずにいられないのだった。"
