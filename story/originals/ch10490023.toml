[[dialogue]]
speaker = "unk"
# 第３話,おっぱいをはかってみよう！,P
line = "第３話,おっぱいをはかってみよう！,P"

[[dialogue]]
speaker = "unk"
# ある日、星徒会で紅明に会計仕事を手伝ってもらっていた時のこと――
line = "ある日、星徒会で紅明に会計仕事を手伝ってもらっていた時のこと――"

[[dialogue]]
speaker = "紅明"
# 「はいよ、ダーリン、これで会計資料の打ち込み終わったぜ☆　最終チェックお願い♪」
line = "「はいよ、ダーリン、これで会計資料の打ち込み終わったぜ☆　最終チェックお願い♪」"

[[dialogue]]
speaker = "紅明"
# 「――問題なさそう？　それならよかったっしょ♪　これで全部片付いたし、休憩しようぜ、休憩～」
line = "「――問題なさそう？　それならよかったっしょ♪　これで全部片付いたし、休憩しようぜ、休憩～」"

[[dialogue]]
speaker = "unk"
# 紅明って実は頭良いよね。成績もいいし
line = "紅明って実は頭良いよね。成績もいいし"

[[dialogue]]
speaker = "紅明"
# 「フフフ、そこはほら、アタシってば人生２周目なんで♪　善哉乳業立ち上げるのに、色々勉強したからね～」
line = "「フフフ、そこはほら、アタシってば人生２周目なんで♪　善哉乳業立ち上げるのに、色々勉強したからね～」"

[[dialogue]]
speaker = "紅明"
# 「ところで、ふと思いついたんだけどさ――」
line = "「ところで、ふと思いついたんだけどさ――」"

[[dialogue]]
speaker = "紅明"
# 「ダーリン、アタシのおっぱいの重さ、はかってみよう！」
line = "「ダーリン、アタシのおっぱいの重さ、はかってみよう！」"

[[dialogue]]
speaker = "unk"
# いきなり何言ってんの！？
line = "いきなり何言ってんの！？"

[[dialogue]]
speaker = "紅明"
# 「いや、なんかこう、作業してるとさ……思考が行き詰まる時があるじゃん？」
line = "「いや、なんかこう、作業してるとさ……思考が行き詰まる時があるじゃん？」"

[[dialogue]]
speaker = "紅明"
# 「その時にアタシ、腕組みのポーズをして、手持ち無沙汰だからつい自分のおっぱいをタプタプしてたわけよ」
line = "「その時にアタシ、腕組みのポーズをして、手持ち無沙汰だからつい自分のおっぱいをタプタプしてたわけよ」"

[[dialogue]]
speaker = "紅明"
# 「――そう、下から。で、ふと思ったよね。そういえばアタシ、おっぱいの大きさははかったことあるけど、重さは前世から１度もはかったことないなって」
line = "「――そう、下から。で、ふと思ったよね。そういえばアタシ、おっぱいの大きさははかったことあるけど、重さは前世から１度もはかったことないなって」"

[[dialogue]]
speaker = "紅明"
# 「というわけで、計量器をサンタの袋から召喚！　はい、ドーン！」
line = "「というわけで、計量器をサンタの袋から召喚！　はい、ドーン！」"

[[dialogue]]
speaker = "unk"
# ちょっ、いつ変身した！？
line = "ちょっ、いつ変身した！？"

[[dialogue]]
speaker = "紅明"
# 「――変身が見えなかったって？　ふっ、これがアタシの隠された特技の１つ……『短縮変身』だぜ！」
line = "「――変身が見えなかったって？　ふっ、これがアタシの隠された特技の１つ……『短縮変身』だぜ！」"

[[dialogue]]
speaker = "紅明"
# 「アタシの変身プロセスはなんと、ノーフラッシュかつ最速０．０５秒で完了することが可能なのだ！」
line = "「アタシの変身プロセスはなんと、ノーフラッシュかつ最速０．０５秒で完了することが可能なのだ！」"

[[dialogue]]
speaker = "紅明"
# 「うしし♪　凄いっしょ？　昔、宴会芸として修行した甲斐があったよね～☆」
line = "「うしし♪　凄いっしょ？　昔、宴会芸として修行した甲斐があったよね～☆」"

[[dialogue]]
speaker = "unk"
# 凄いけど、理由がしょーもない！
line = "凄いけど、理由がしょーもない！"

[[dialogue]]
speaker = "紅明"
# 「ともあれ、ダーリンも気になるっしょ～？　アタシのおっぱいのお・も・さ<emoji=heart04>」
line = "「ともあれ、ダーリンも気になるっしょ～？　アタシのおっぱいのお・も・さ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# それはまぁ、俺も男だし、好きな女の子の魅力的な部分である。気になるか気にならないかといえば――
line = "それはまぁ、俺も男だし、好きな女の子の魅力的な部分である。気になるか気にならないかといえば――"

[[dialogue]]
speaker = "紅明"
# 「んふふ～<emoji=heart04>　ダーリンの目もおっぱいに釘付けだし、期待に応えて、計量器に乗せちゃうぜ♪　よいしょっと<emoji=heart04>」
line = "「んふふ～<emoji=heart04>　ダーリンの目もおっぱいに釘付けだし、期待に応えて、計量器に乗せちゃうぜ♪　よいしょっと<emoji=heart04>」"

[[dialogue]]
speaker = "紅明"
# 「それでは、はかりま～す♪」
line = "「それでは、はかりま～す♪」"

[[dialogue]]
speaker = "紅明"
# 「はい！　最近また成長したトップバスト１０１センチ、Ｉカップである、アタシのおっぱいの重さは――」
line = "「はい！　最近また成長したトップバスト１０１センチ、Ｉカップである、アタシのおっぱいの重さは――」"

[[dialogue]]
speaker = "紅明"
# 「なんと、約４２００グラムでした～☆　って重くね！？　自分でもビックリなんだが！」
line = "「なんと、約４２００グラムでした～☆　って重くね！？　自分でもビックリなんだが！」"

[[dialogue]]
speaker = "unk"
# ２リットルのペットボトル２本分！？
line = "２リットルのペットボトル２本分！？"

[[dialogue]]
speaker = "紅明"
# 「マジか～、そりゃ肩も凝るわけだわ～」
line = "「マジか～、そりゃ肩も凝るわけだわ～」"

[[dialogue]]
speaker = "紅明"
# 「ふむふむ、ＤＩＳＣでネット検索してみると～……１つ上のＪカップだと５０００グラムで、Ｋカップだと６２００グラムだと！？」
line = "「ふむふむ、ＤＩＳＣでネット検索してみると～……１つ上のＪカップだと５０００グラムで、Ｋカップだと６２００グラムだと！？」"

[[dialogue]]
speaker = "紅明"
# 「ここから更にペットボトル１本追加されるとか……そうか、おっぱいとは質量兵器だったんだな……」
line = "「ここから更にペットボトル１本追加されるとか……そうか、おっぱいとは質量兵器だったんだな……」"

[[dialogue]]
speaker = "紅明"
# 「しかし、Ｋカップ……必ずしも大きければいいってわけじゃないけど、牛一族に生まれた者としては、最強のサイズを目指してみたいよねぇ」
line = "「しかし、Ｋカップ……必ずしも大きければいいってわけじゃないけど、牛一族に生まれた者としては、最強のサイズを目指してみたいよねぇ」"

[[dialogue]]
speaker = "紅明"
# 「よしっ、ここは１つ、おっぱいを大きくする為に、ダーリンに揉んでもらうか！」
line = "「よしっ、ここは１つ、おっぱいを大きくする為に、ダーリンに揉んでもらうか！」"

[[dialogue]]
speaker = "unk"
# いやもう十分に大きいでしょ！？
line = "いやもう十分に大きいでしょ！？"

[[dialogue]]
speaker = "紅明"
# 「え～、でも、ダーリンも私と付き合ってるんだし、大きいおっぱいは好きなんじゃないの～？」
line = "「え～、でも、ダーリンも私と付き合ってるんだし、大きいおっぱいは好きなんじゃないの～？」"

[[dialogue]]
speaker = "紅明"
# 「Ｋカップのおっぱいに興味はないのかな～？　ちなみにアタシのお母さんは、私よりバストサイズ大きいし、Ｊカップだし、本物はすごいぜ～？」
line = "「Ｋカップのおっぱいに興味はないのかな～？　ちなみにアタシのお母さんは、私よりバストサイズ大きいし、Ｊカップだし、本物はすごいぜ～？」"

[[dialogue]]
speaker = "紅明"
# 「そうそう、善哉乳業の現社長ね。――って、ダーリンいま、お母さんに会ってみたいって考えたっしょ！？」
line = "「そうそう、善哉乳業の現社長ね。――って、ダーリンいま、お母さんに会ってみたいって考えたっしょ！？」"

[[dialogue]]
speaker = "紅明"
# 「んモー！　ダーリン、浮気はいけないんだぞ～？」
line = "「んモー！　ダーリン、浮気はいけないんだぞ～？」"

[[dialogue]]
speaker = "unk"
# いや、紅明から話題に出したんだよね！？
line = "いや、紅明から話題に出したんだよね！？"

[[dialogue]]
speaker = "紅明"
# 「そうだけども～、デレデレするならやっぱり、アタシにして欲しいっていうか……」
line = "「そうだけども～、デレデレするならやっぱり、アタシにして欲しいっていうか……」"

[[dialogue]]
speaker = "紅明"
# 「――嫉妬してるのかって？　だって、ダーリンはアタシのダーリンだし！」
line = "「――嫉妬してるのかって？　だって、ダーリンはアタシのダーリンだし！」"

[[dialogue]]
speaker = "紅明"
# 「とにかく、お母さんと会った時にデレデレしない為にも、やっぱりＫカップを目指すし！」
line = "「とにかく、お母さんと会った時にデレデレしない為にも、やっぱりＫカップを目指すし！」"

[[dialogue]]
speaker = "紅明"
# 「え？　――嫉妬してくれて嬉しい？」
line = "「え？　――嫉妬してくれて嬉しい？」"

[[dialogue]]
speaker = "紅明"
# 「――今の自分のことを、好きだって思ってもらえてると感じるから？」
line = "「――今の自分のことを、好きだって思ってもらえてると感じるから？」"

[[dialogue]]
speaker = "紅明"
# 「んモー<emoji=heart04>　ダーリンってば、そんな胸キュンなこと言ったりして……」
line = "「んモー<emoji=heart04>　ダーリンってば、そんな胸キュンなこと言ったりして……」"

[[dialogue]]
speaker = "紅明"
# 「思わずハグしたくなっちゃうじゃん<emoji=heart04>　――えいっ☆」
line = "「思わずハグしたくなっちゃうじゃん<emoji=heart04>　――えいっ☆」"

[[dialogue]]
speaker = "unk"
# ちょっ、そんな胸を押し付けられると……！
line = "ちょっ、そんな胸を押し付けられると……！"

[[dialogue]]
speaker = "紅明"
# 「うしし<emoji=heart04>　ダーリンってば、恋人同士なのに、抱き着くといつも照れた顔するよね～♪」
line = "「うしし<emoji=heart04>　ダーリンってば、恋人同士なのに、抱き着くといつも照れた顔するよね～♪」"

[[dialogue]]
speaker = "紅明"
# 「――おっぱいが当たってるから意識しちゃう？　ふふっ、それが嬉しいから、アタシもついハグしちゃうんだけどね<emoji=heart04>」
line = "「――おっぱいが当たってるから意識しちゃう？　ふふっ、それが嬉しいから、アタシもついハグしちゃうんだけどね<emoji=heart04>」"

[[dialogue]]
speaker = "紅明"
# 「だってそれって、アタシのこと、女の子として見てくれてるってことじゃん？　うりうり～<emoji=heart04>」
line = "「だってそれって、アタシのこと、女の子として見てくれてるってことじゃん？　うりうり～<emoji=heart04>」"

[[dialogue]]
speaker = "紅明"
# 「ん～？　あんまりされると、どうなっても知らないって？」
line = "「ん～？　あんまりされると、どうなっても知らないって？」"

[[dialogue]]
speaker = "紅明"
# 「どうなっちゃうのかな～？　んふふ<emoji=heart04>」
line = "「どうなっちゃうのかな～？　んふふ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 恋人の悪戯なスキンシップに、ドキドキしてしまう俺なのだった――
line = "恋人の悪戯なスキンシップに、ドキドキしてしまう俺なのだった――"
