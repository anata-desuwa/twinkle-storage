# 「世界を滅ぼすために目覚めてからというもの、本来の姿には戻れず、兵器としての本懐も果たせぬままではあったが……」
line = "「世界を滅ぼすために目覚めてからというもの、本来の姿には戻れず、兵器としての本懐も果たせぬままではあったが……」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「眷族と過ごす日々はとても楽しいし、うまいチョコもくれるし……それに……」
line = "「眷族と過ごす日々はとても楽しいし、うまいチョコもくれるし……それに……」"

[[dialogue]]
