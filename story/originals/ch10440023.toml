[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「ほ～れ、見たことか。やっぱり我の思ったとおり──」
line = "「ほ～れ、見たことか。やっぱり我の思ったとおり──」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「──ではないではないか！？」
line = "「──ではないではないか！？」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「えっ？　我、告白されたのじゃ？　あ、あわわわ……！？」
line = "「えっ？　我、告白されたのじゃ？　あ、あわわわ……！？」"

[[dialogue]]
speaker = "unk"
# 何だと思ってたの……？
