# 「いいや……好き、じゃな<emoji=heart04>」
line = "「いいや……好き、じゃな<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「他の男ではこんな温かな気持ちにはならんのじゃ……返事は、これでよいか？」
line = "「他の男ではこんな温かな気持ちにはならんのじゃ……返事は、これでよいか？」"

