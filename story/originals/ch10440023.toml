# 「……何？　人のいないところがよいのか？　フム、では眷族の家へ行くとするか！」
line = "「……何？　人のいないところがよいのか？　フム、では眷族の家へ行くとするか！」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「で、眷族よ。茶もしばいたし、ケーキも食った。肝心の話はいつするんじゃ？」
line = "「で、眷族よ。茶もしばいたし、ケーキも食った。肝心の話はいつするんじゃ？」"

[[dialogue]]
speaker = "unk"
# （緊張してきたな）
line = "（緊張してきたな）"

[[dialogue]]
speaker = "unk"
# （いざ告白するとなると……）
line = "（いざ告白するとなると……）"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「……なぁんて、の。我は眷族の主人じゃぞ。貴様の考えることなんぞお見通しじゃ！」
line = "「……なぁんて、の。我は眷族の主人じゃぞ。貴様の考えることなんぞお見通しじゃ！」"

[[dialogue]]
speaker = "unk"
