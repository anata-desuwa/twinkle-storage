[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「たわけめ、当然であろう！　配下の考えることがわからんで主人が務まるか！」
line = "「たわけめ、当然であろう！　配下の考えることがわからんで主人が務まるか！」"

[[dialogue]]
