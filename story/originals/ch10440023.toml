[[dialogue]]
speaker = "unk"
# 第３話,プリムラに告白,P
line = "第３話,プリムラに告白,P"

[[dialogue]]
speaker = "unk"
# 数日後──俺とプリムラは繁華街までお出かけをすることにした。
line = "数日後──俺とプリムラは繁華街までお出かけをすることにした。"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「眷族よ、今日は世話になったのじゃ！　貴様のおかげで見事、眷族２号と３号のオモチャとおやつが買えたのじゃ♪」
line = "「眷族よ、今日は世話になったのじゃ！　貴様のおかげで見事、眷族２号と３号のオモチャとおやつが買えたのじゃ♪」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「それにしても貴様、猫のことに随分と詳しかったのう？」
line = "「それにしても貴様、猫のことに随分と詳しかったのう？」"

[[dialogue]]
speaker = "unk"
# ペットショップでアルバイトしてたから
line = "ペットショップでアルバイトしてたから"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「ほう、なるほど。昔取った杵柄というやつじゃな！」
line = "「ほう、なるほど。昔取った杵柄というやつじゃな！」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「我も宝石磨きのアルバイトはしておるが、それ以外はからっきしじゃからの。様々な知恵を出してもらえて助かったのじゃ！」
line = "「我も宝石磨きのアルバイトはしておるが、それ以外はからっきしじゃからの。様々な知恵を出してもらえて助かったのじゃ！」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「やはり我と眷族はよいコンビになれそうじゃ。貴様はその『賢』によって我を支え、我はこの『暴』によって他を圧倒する……無敵なのじゃ！」
line = "「やはり我と眷族はよいコンビになれそうじゃ。貴様はその『賢』によって我を支え、我はこの『暴』によって他を圧倒する……無敵なのじゃ！」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「眷族さえ首を縦に振れば、世界を征服するのもたやすいのじゃが～……ちらっ？」
line = "「眷族さえ首を縦に振れば、世界を征服するのもたやすいのじゃが～……ちらっ？」"

[[dialogue]]
speaker = "unk"
# みんなとは仲良くしようね
line = "みんなとは仲良くしようね"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「ムムム。我は兵器じゃぞ、仲良しこよしをする存在ではないと言うておるじゃろうに！」
line = "「ムムム。我は兵器じゃぞ、仲良しこよしをする存在ではないと言うておるじゃろうに！」"

[[dialogue]]
speaker = "unk"
# 子猫のオモチャを持ってたら説得力が……
line = "子猫のオモチャを持ってたら説得力が……"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「フフン、我がただ甘やかすために散財したと思ったか？　これは恐るべき作戦なのじゃ！」
line = "「フフン、我がただ甘やかすために散財したと思ったか？　これは恐るべき作戦なのじゃ！」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「眷族２号と３号には、今後もたっぷりと美味いものや楽しいオモチャを買い与えて、我への永遠の忠誠を誓わせてやるのじゃ！」
line = "「眷族２号と３号には、今後もたっぷりと美味いものや楽しいオモチャを買い与えて、我への永遠の忠誠を誓わせてやるのじゃ！」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「フフフ、なんと悪どい策略なのじゃ……我ながら恐ろしくなってくるのう♪」
line = "「フフフ、なんと悪どい策略なのじゃ……我ながら恐ろしくなってくるのう♪」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「──ところで眷族よ。買い物が終わった後に、我へ話があると言っておったよな？」
line = "「──ところで眷族よ。買い物が終わった後に、我へ話があると言っておったよな？」"

[[dialogue]]
