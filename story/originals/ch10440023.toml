line = "「て、てっきり世界征服をした後、領土の分け前のことかな～、とばかり……ぜ、全然違ったではないか……！」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「……貴様、本気で言っておるのか？　その、我のこと……あれであろう、女子として好き、と……？」
line = "「……貴様、本気で言っておるのか？　その、我のこと……あれであろう、女子として好き、と……？」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「ムム、真剣な瞳なのじゃ……そ、それなら我も、きちんと答えねばなるまいっ！」
line = "「ムム、真剣な瞳なのじゃ……そ、それなら我も、きちんと答えねばなるまいっ！」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「う、うん……我も、その～……け、眷族のことは、憎からず思って、おるぞ……？」
line = "「う、うん……我も、その～……け、眷族のことは、憎からず思って、おるぞ……？」"

[[dialogue]]
