[[dialogue]]
speaker = "unk"
# リゾート結界に集結した公安委員会のメンバーたち。
line = "リゾート結界に集結した公安委員会のメンバーたち。"

[[dialogue]]
speaker = "unk"
# その光景を目の前にして、異東ヤハトは動揺を隠しきれていなかった。
line = "その光景を目の前にして、異東ヤハトは動揺を隠しきれていなかった。"

[[dialogue]]
speaker = "ヤハト"
# 「馬鹿な……！　あり得ない！　リゾート結界に突入する前に、学園の星騎士がどれくらい入り込んでいるかの事前偵察は行っていた！」
line = "「馬鹿な……！　あり得ない！　リゾート結界に突入する前に、学園の星騎士がどれくらい入り込んでいるかの事前偵察は行っていた！」"

[[dialogue]]
speaker = "ヤハト"
# 「なのに何故、公安委員会の星騎士がこんなにも紛れ込んでいる！？」
line = "「なのに何故、公安委員会の星騎士がこんなにも紛れ込んでいる！？」"

[[dialogue]]
speaker = "リコリンフィア"
# 「言っただろう。それはここが、プライベートビーチの方だからだ」
line = "「言っただろう。それはここが、プライベートビーチの方だからだ」"

[[dialogue]]
speaker = "リコリンフィア"
# 「お前が何故それに気づかず、侵入してしまったのか。そう難しい話じゃない――」
line = "「お前が何故それに気づかず、侵入してしまったのか。そう難しい話じゃない――」"

[[dialogue]]
speaker = "リノ"
# 「あなたたちがパブリックビーチに転移しようとした瞬間、空間魔法で私たちごと、このプライベートビーチの方へ飛ばしたのよ」
line = "「あなたたちがパブリックビーチに転移しようとした瞬間、空間魔法で私たちごと、このプライベートビーチの方へ飛ばしたのよ」"

[[dialogue]]
speaker = "ヤハト"
# 「そんな離れ技が……！？」
line = "「そんな離れ技が……！？」"

[[dialogue]]
speaker = "リコリンフィア"
# 「同じ空間操作の能力を持つお前すら気づかない程の技量。『空間の魔女』の二つ名は、伊達じゃないってことだ」
line = "「同じ空間操作の能力を持つお前すら気づかない程の技量。『空間の魔女』の二つ名は、伊達じゃないってことだ」"

[[dialogue]]
speaker = "リノ"
# 「私……今回の件は、怒っているのよ」
line = "「私……今回の件は、怒っているのよ」"

[[dialogue]]
speaker = "リノ"
# 「あなたたちは、私の世界一可愛い息子に手を出そうとした――」
line = "「あなたたちは、私の世界一可愛い息子に手を出そうとした――」"

[[dialogue]]
speaker = "リノ"
# 「母親として絶対に許せない」
line = "「母親として絶対に許せない」"

[[dialogue]]
speaker = "リノ"
# 「だから、空間の魔女の名にかけて、あなたたちは１人たりともここから逃がさない……！」
line = "「だから、空間の魔女の名にかけて、あなたたちは１人たりともここから逃がさない……！」"

[[dialogue]]
speaker = "ヤハト"
# 「っ……！　だとしても！　俺たちの襲撃のタイミングが何故分かった！？」
line = "「っ……！　だとしても！　俺たちの襲撃のタイミングが何故分かった！？」"

[[dialogue]]
speaker = "ヤハト"
# 「でなければ、公安委員会の連中をこんなに大勢、都合良く揃えられるはずがない！　この１週間ずっと、全員をここに待機させていたとでも！？」
line = "「でなければ、公安委員会の連中をこんなに大勢、都合良く揃えられるはずがない！　この１週間ずっと、全員をここに待機させていたとでも！？」"

[[dialogue]]
speaker = "リコリンフィア"
# 「まさか。ただ、お前たちが襲撃する時間を知らせてもらっていただけだ」
line = "「まさか。ただ、お前たちが襲撃する時間を知らせてもらっていただけだ」"

[[dialogue]]
speaker = "リコリンフィア"
# 「公安委員会らしく、お前たちの組織に潜入調査をしてな」
line = "「公安委員会らしく、お前たちの組織に潜入調査をしてな」"

[[dialogue]]
speaker = "ヤハト"
# 「あり得ない！！　俺の部下たちは全員、ヴェノマイザーを注入しミュータントになった時点で、眷族として絶対服従するように思考操作が施されている！」
line = "「あり得ない！！　俺の部下たちは全員、ヴェノマイザーを注入しミュータントになった時点で、眷族として絶対服従するように思考操作が施されている！」"

[[dialogue]]
speaker = "ヤハト"
# 「仮に万が一裏切ろうとしても、眷族の思考は俺に伝わるようになっている！　潜入員が入り込む余地など、どこにも――」
line = "「仮に万が一裏切ろうとしても、眷族の思考は俺に伝わるようになっている！　潜入員が入り込む余地など、どこにも――」"

[[dialogue]]
speaker = "リコリンフィア"
# 「そう。潜入を得意とするシアンでさえ、非人道的な手段を<ruby=いと>厭</ruby>わぬお前の用意周到さにはお手上げだった。だが――」
line = "「そう。潜入を得意とするシアンでさえ、非人道的な手段を<ruby>厭<rt>いと</rt></ruby>わぬお前の用意周到さにはお手上げだった。だが――」"

[[dialogue]]
speaker = "リコリンフィア"
# 「世界最強レベルの星術使いであれば、話は別だ」
line = "「世界最強レベルの星術使いであれば、話は別だ」"

[[dialogue]]
speaker = "ヤハト"
# 「最強……！？」
line = "「最強……！？」"

[[dialogue]]
speaker = "リコリンフィア"
# 「それがお前の気づかなかったことの２つ目だ」
line = "「それがお前の気づかなかったことの２つ目だ」"

[[dialogue]]
speaker = "リコリンフィア"
# 「――協力に心から感謝する。もう姿を現してもいいぞ」
line = "「――協力に心から感謝する。もう姿を現してもいいぞ」"

[[dialogue]]
speaker = "？？？"
# 「レディース＆ジェントルメン――」
line = "「レディース＆ジェントルメン――」"

[[dialogue]]
speaker = "ミネコ"
# 「イッツ・イリュージョン☆　大怪盗フランボウ、華麗に参上♪」
line = "「イッツ・イリュージョン☆　大怪盗フランボウ、華麗に参上♪」"

[[dialogue]]
speaker = "ヤハト"
# 「は……！？　何故ここで大怪盗！？！？」
line = "「は……！？　何故ここで大怪盗！？！？」"

[[dialogue]]
speaker = "ヤハト"
# 「馬鹿な……！　本物なのか！？」
line = "「馬鹿な……！　本物なのか！？」"

[[dialogue]]
speaker = "ミネコ"
# 「星術犯罪組織『ユゴス』の諸君、日本ではお初にお目にかかる。信じるか信じないかはキミたちに任せるが、お宝はちゃんと盗ませてもらったよ」
line = "「星術犯罪組織『ユゴス』の諸君、日本ではお初にお目にかかる。信じるか信じないかはキミたちに任せるが、お宝はちゃんと盗ませてもらったよ」"

[[dialogue]]
speaker = "ヤハト"
# 「お宝だと……？　はっ……まさか！？」
line = "「お宝だと……？　はっ……まさか！？」"

[[dialogue]]
speaker = "ミネコ"
# 「そう、渋谷の拠点の地下金庫に保管されてた、これだよ♪」
line = "「そう、渋谷の拠点の地下金庫に保管されてた、これだよ♪」"

[[dialogue]]
speaker = "unk"
# そう言って、大怪盗フランボウ――ミネコが懐から取り出したのは、美しい紫色をしたクリスタル。
line = "そう言って、大怪盗フランボウ――ミネコが懐から取り出したのは、美しい紫色をしたクリスタル。"

[[dialogue]]
speaker = "ヤハト"
# 「それは……『ポイズナイト結晶』！　大怪盗、貴様ッ！！」
line = "「それは……『ポイズナイト結晶』！　大怪盗、貴様ッ！！」"

[[dialogue]]
speaker = "unk"
# それは先日リコさんが言っていた、怪人の変身薬『ヴェノマイザー』を作り出す元となる毒を生成する、マンティコアの体内器官だ。
line = "それは先日リコさんが言っていた、怪人の変身薬『ヴェノマイザー』を作り出す元となる毒を生成する、マンティコアの体内器官だ。"

[[dialogue]]
speaker = "ヤハト"
# 「貴様が我々の情報を、公安委員会に伝えていたというのか……！？　大怪盗が潜入員の真似事を……！」
line = "「貴様が我々の情報を、公安委員会に伝えていたというのか……！？　大怪盗が潜入員の真似事を……！」"

[[dialogue]]
speaker = "ミネコ"
# 「私も気は進まなかったのだが、今回はどこぞの<ruby=ネゴシエイター>交渉人</ruby>に、不覚にも交渉負けしてしまったものでね」
line = "「私も気は進まなかったのだが、今回はどこぞの<ruby>交渉人<rt>ネゴシエイター</rt></ruby>に、不覚にも交渉負けしてしまったものでね」"

[[dialogue]]
speaker = "ミネコ"
# 「怪盗たるもの、予告状の時刻と同じように、交わした約束は守らねばならない」
line = "「怪盗たるもの、予告状の時刻と同じように、交わした約束は守らねばならない」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひ♪　大怪盗さん、お仕事お疲れさまで～す☆」
line = "「にひひ♪　大怪盗さん、お仕事お疲れさまで～す☆」"

[[dialogue]]
speaker = "unk"
# そう言って、公安委員会の交渉人は悪戯な笑みを浮かべてみせる。
line = "そう言って、公安委員会の交渉人は悪戯な笑みを浮かべてみせる。"

[[dialogue]]
speaker = "リコリンフィア"
# 「――毒を以て毒を制す」
line = "「――毒を以て毒を制す」"

[[dialogue]]
speaker = "リコリンフィア"
# 「お前たちのような猛毒を制する為には、私たち公安委員会は、毒を使うことを厭わない」
line = "「お前たちのような猛毒を制する為には、私たち公安委員会は、毒を使うことを厭わない」"

[[dialogue]]
speaker = "リコリンフィア"
# 「そして、毒は使い方によっては薬にもなる」
line = "「そして、毒は使い方によっては薬にもなる」"

[[dialogue]]
speaker = "リコリンフィア"
# 「お前らのような外道に付ける劇薬としては、ぴったりの采配だろう？」
line = "「お前らのような外道に付ける劇薬としては、ぴったりの采配だろう？」"

[[dialogue]]
speaker = "ヤハト"
# 「リコリンフィア、貴様ァ……！」
line = "「リコリンフィア、貴様ァ……！」"

[[dialogue]]
speaker = "リコリンフィア"
# 「あともう１つ……異東、お前には言っておきたいことがある」
line = "「あともう１つ……異東、お前には言っておきたいことがある」"

[[dialogue]]
speaker = "リコリンフィア"
# 「別に私は、お前たちをここに誘き出した時点で――」
line = "「別に私は、お前たちをここに誘き出した時点で――」"

[[dialogue]]
speaker = "リコリンフィア"
# 「<b>１人で</b>難なく全員を制圧することができた」
line = "「<b>１人で</b>難なく全員を制圧することができた」"

[[dialogue]]
speaker = "ヤハト"
# 「なんだと……！？」
line = "「なんだと……！？」"

[[dialogue]]
speaker = "リコリンフィア"
# 「そうしなかったのは、私個人の<b>私情</b>というやつだ」
line = "「そうしなかったのは、私個人の<b>私情</b>というやつだ」"

[[dialogue]]
speaker = "リコリンフィア"
# 「なにせ、お前は余りにも、私の部下たちの実力を甘くみているようだったからな」
line = "「なにせ、お前は余りにも、私の部下たちの実力を甘くみているようだったからな」"

[[dialogue]]
speaker = "リコリンフィア"
# 「なぁ、異東……お前、そんな雑兵１００人ごときで、本気で私の部下を倒せるとでも思っていたのか？」
line = "「なぁ、異東……お前、そんな雑兵１００人ごときで、本気で私の部下を倒せるとでも思っていたのか？」"

[[dialogue]]
speaker = "リコリンフィア"
# 「――舐めるなよ。そんなわけないだろうが」
line = "「――舐めるなよ。そんなわけないだろうが」"

[[dialogue]]
speaker = "リコリンフィア"
# 「私の部下はな、全員１人残らず、お前ら程度じゃ足元にも及ばないくらい強いんだよ」
line = "「私の部下はな、全員１人残らず、お前ら程度じゃ足元にも及ばないくらい強いんだよ」"

[[dialogue]]
speaker = "ヤハト"
# 「ミュータントが雑兵だと……！？　魔力の底上げで、１体１体が並みの星騎士を遥かに上回る力を持つ、この軍勢を……！？」
line = "「ミュータントが雑兵だと……！？　魔力の底上げで、１体１体が並みの星騎士を遥かに上回る力を持つ、この軍勢を……！？」"

[[dialogue]]
speaker = "ヤハト"
# 「……く、ククッ」
line = "「……く、ククッ」"

[[dialogue]]
speaker = "ヤハト"
# 「ふざけるなぁぁぁ！！！　舐めているのは貴様の方だリコリンフィアァッ！！！　我々を貴様１人で制圧できたなどとおぉぉぉっ！！！」
line = "「ふざけるなぁぁぁ！！！　舐めているのは貴様の方だリコリンフィアァッ！！！　我々を貴様１人で制圧できたなどとおぉぉぉっ！！！」"

[[dialogue]]
speaker = "リコリンフィア"
# 「……あれから１４年。私も随分と毒の扱いが上手くなってな」
line = "「……あれから１４年。私も随分と毒の扱いが上手くなってな」"

[[dialogue]]
speaker = "ヤハト"
# 「あ……？　ぐっ……！？」
line = "「あ……？　ぐっ……！？」"

[[dialogue]]
speaker = "unk"
# 異東が突然、苦しそうなうめき声を上げて、その場に片膝を着く。
line = "異東が突然、苦しそうなうめき声を上げて、その場に片膝を着く。"

[[dialogue]]
speaker = "ヤハト"
# 「な、なんだ……！？　体が痺れて、上手く動かない……！？」
line = "「な、なんだ……！？　体が痺れて、上手く動かない……！？」"

[[dialogue]]
speaker = "unk"
# リコさんは至って冷静な目で、ヤハトを見下ろしながら告げる。
line = "リコさんは至って冷静な目で、ヤハトを見下ろしながら告げる。"

[[dialogue]]
speaker = "リコリンフィア"
# 「私の星騎士としての能力は知ってるだろう？」
line = "「私の星騎士としての能力は知ってるだろう？」"

[[dialogue]]
speaker = "リコリンフィア"
# 「『毒生成』――それを使って、お前だけに効く毒を作らせてもらった」
line = "「『毒生成』――それを使って、お前だけに効く毒を作らせてもらった」"

[[dialogue]]
speaker = "ヤハト"
# 「毒だと……！？　馬鹿な……そんなものいつの間に……！？」
line = "「毒だと……！？　馬鹿な……そんなものいつの間に……！？」"

[[dialogue]]
speaker = "リコリンフィア"
# 「気化毒だよ」
line = "「気化毒だよ」"

[[dialogue]]
speaker = "リコリンフィア"
# 「簡単に言えば、『毒ガス』だ。私は先程から、毒星術を使って無味無臭の毒ガスを少しずつお前の周りにだけピンポイントで生成し、散布し続けていた」
line = "「簡単に言えば、『毒ガス』だ。私は先程から、毒星術を使って無味無臭の毒ガスを少しずつお前の周りにだけピンポイントで生成し、散布し続けていた」"

[[dialogue]]
speaker = "リコリンフィア"
# 「ミュータントだけに効く麻痺毒をな」
line = "「ミュータントだけに効く麻痺毒をな」"

[[dialogue]]
speaker = "リコリンフィア"
# 「分かるか？　本当ならこれをプライベートビーチに充満させとくだけで、やろうと思えば、私１人でとっくにお前たち全員を制圧できてたってことだ」
line = "「分かるか？　本当ならこれをプライベートビーチに充満させとくだけで、やろうと思えば、私１人でとっくにお前たち全員を制圧できてたってことだ」"

[[dialogue]]
speaker = "ヤハト"
# 「っ……！」
line = "「っ……！」"

[[dialogue]]
speaker = "ヤハト"
# 「おのれ……おのれおのれおのれおのれおのれぇぇぇ！！！　リコリンフィアァァァッ！！！」
line = "「おのれ……おのれおのれおのれおのれおのれぇぇぇ！！！　リコリンフィアァァァッ！！！」"

[[dialogue]]
speaker = "unk"
# 怒りが頂点に達したのか、魔力の高まりと共に獣のような雄叫びを上げながら、異東は無理矢理立ち上がって来る。
line = "怒りが頂点に達したのか、魔力の高まりと共に獣のような雄叫びを上げながら、異東は無理矢理立ち上がって来る。"

[[dialogue]]
speaker = "リコリンフィア"
# 「腐ってもユゴスの幹部か。大した根性だ」
line = "「腐ってもユゴスの幹部か。大した根性だ」"

[[dialogue]]
speaker = "ヤハト"
# 「殺せぇぇぇーーーッ！！！　貴様ら、公安委員会の畜生共を１匹残らず八つ裂きにしろぉぉぉーーーッ！！！」
line = "「殺せぇぇぇーーーッ！！！　貴様ら、公安委員会の畜生共を１匹残らず八つ裂きにしろぉぉぉーーーッ！！！」"

[[dialogue]]
speaker = "部下の怪人たち"
# 「おおおぉぉぉーーーッ！！！」
line = "「おおおぉぉぉーーーッ！！！」"

[[dialogue]]
speaker = "unk"
# ミュータントたちがヤハトの号令を受け、動き出す。
line = "ミュータントたちがヤハトの号令を受け、動き出す。"

[[dialogue]]
speaker = "unk"
# 対するリコさんは、武器を砂浜に突き刺しながら冷静に、しかし辺りにはっきりと透る声音で告げる。
line = "対するリコさんは、武器を砂浜に突き刺しながら冷静に、しかし辺りにはっきりと透る声音で告げる。"

[[dialogue]]
speaker = "リコリンフィア"
# 「１４年前の因縁に、ここで決着をつけるとしよう」
line = "「１４年前の因縁に、ここで決着をつけるとしよう」"

[[dialogue]]
speaker = "リコリンフィア"
# 「――公安委員会のエージェント総員に告げる」
line = "「――公安委員会のエージェント総員に告げる」"

[[dialogue]]
speaker = "リコリンフィア"
# 「これよりミュータントの制圧を開始する。１匹も逃さず、確保しろ！」
line = "「これよりミュータントの制圧を開始する。１匹も逃さず、確保しろ！」"

[[dialogue]]
speaker = "リコリンフィア"
# 「総員――状況開始！！！」
line = "「総員――状況開始！！！」"

[[dialogue]]
speaker = "全員"
# 「了解！！！」
line = "「了解！！！」"

[[dialogue]]
speaker = "unk"
# 公安委員会と俺たちは、ミュータントの軍勢との戦闘を開始するのだった――
line = "公安委員会と俺たちは、ミュータントの軍勢との戦闘を開始するのだった――"
