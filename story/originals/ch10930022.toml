[[dialogue]]
speaker = "unk"
# 第２話,応援タッグバトル（後編）,P
line = "第２話,応援タッグバトル（後編）,P"

[[dialogue]]
speaker = "unk"
# 翌日の放課後。
line = "翌日の放課後。"

[[dialogue]]
speaker = "カティア"
# 「走りたくて、昨日から足がウズウズしてたガオ！」
line = "「走りたくて、昨日から足がウズウズしてたガオ！」"

[[dialogue]]
speaker = "ヒヨ"
# 「あたしもだ！　さあさあ、早くやろうじゃねえか！」
line = "「あたしもだ！　さあさあ、早くやろうじゃねえか！」"

[[dialogue]]
speaker = "ミルフィー"
# 「私だって応援したくて仕方なかったよ！」
line = "「私だって応援したくて仕方なかったよ！」"

[[dialogue]]
speaker = "ヒヨ"
# 「姐さん、チアガールフル装備でメチャクチャやる気じゃねえか！　嬉しいねえ！」
line = "「姐さん、チアガールフル装備でメチャクチャやる気じゃねえか！　嬉しいねえ！」"

[[dialogue]]
speaker = "ミルフィー"
# 「勝負はトラックを３周してゴールした方が勝ちね」
line = "「勝負はトラックを３周してゴールした方が勝ちね」"

[[dialogue]]
speaker = "ミルフィー"
# 「もちろん、走るのを妨害するのはダメだよ。スポーツマンシップに則って、正々堂々と！」
line = "「もちろん、走るのを妨害するのはダメだよ。スポーツマンシップに則って、正々堂々と！」"

[[dialogue]]
speaker = "ミルフィー"
# 「私たちはスタート地点で、一生懸命応援してるからね！　ファイトだよ、ヒヨちゃんっ！」
line = "「私たちはスタート地点で、一生懸命応援してるからね！　ファイトだよ、ヒヨちゃんっ！」"

[[dialogue]]
speaker = "ヒヨ"
# 「おうよ、やってやるぜいっ！」
line = "「おうよ、やってやるぜいっ！」"

[[dialogue]]
speaker = "unk"
# 頑張れ、カティア！
line = "頑張れ、カティア！"

[[dialogue]]
speaker = "カティア"
# 「この勝利、魔王様に捧げますワン！」
line = "「この勝利、魔王様に捧げますワン！」"

[[dialogue]]
speaker = "ミルフィー"
# 「位置について！　よーーーい……ドン！」
line = "「位置について！　よーーーい……ドン！」"

[[dialogue]]
speaker = "unk"
# ピストルの合図と同時に２人が駆け出した！
line = "ピストルの合図と同時に２人が駆け出した！"

[[dialogue]]
speaker = "ヒヨ"
# 「ちぃ、スタートダッシュはワン公に分があるか！　でも、あたしはこっからでい！」
line = "「ちぃ、スタートダッシュはワン公に分があるか！　でも、あたしはこっからでい！」"

[[dialogue]]
speaker = "ミルフィー"
# 「すっごーいっ！　２人とも星霊祭の時よりも速くなってるよっ！」
line = "「すっごーいっ！　２人とも星霊祭の時よりも速くなってるよっ！」"

[[dialogue]]
speaker = "unk"
# 行け行け、カティアーっ！
line = "行け行け、カティアーっ！"

[[dialogue]]
speaker = "ミルフィー"
# 「まだ始まったばかりっ！　全っ然追いつけるよ、ヒヨちゃんっ！」
line = "「まだ始まったばかりっ！　全っ然追いつけるよ、ヒヨちゃんっ！」"

[[dialogue]]
speaker = "ミルフィー"
# 「ヒヨちゃん、ファイトーッ！　ゴー・ファイト・ウィンッ！」
line = "「ヒヨちゃん、ファイトーッ！　ゴー・ファイト・ウィンッ！」"

[[dialogue]]
speaker = "ミルフィー"
# 「あぁんっ、そこっ！　もうちょっとっ！　もうちょっとで抜けるよーっ！　がんばれっ、がーんばれっ♪」
line = "「あぁんっ、そこっ！　もうちょっとっ！　もうちょっとで抜けるよーっ！　がんばれっ、がーんばれっ♪」"

[[dialogue]]
speaker = "unk"
# （ミルフィーのがまろび出そう！？）
line = "（ミルフィーのがまろび出そう！？）"

[[dialogue]]
speaker = "カティア"
# 「わふっ！？　魔王様の応援が途切れた！？」
line = "「わふっ！？　魔王様の応援が途切れた！？」"

[[dialogue]]
speaker = "ヒヨ"
# 「追いついた──いいや、このまま抜かせてもらうぜえ、ワン公っ！」
line = "「追いついた──いいや、このまま抜かせてもらうぜえ、ワン公っ！」"

[[dialogue]]
speaker = "unk"
# 俺がミルフィーに気を取られている間に、ヒヨが先に俺たちの前を通過した。
line = "俺がミルフィーに気を取られている間に、ヒヨが先に俺たちの前を通過した。"

[[dialogue]]
speaker = "ミルフィー"
# 「これで１周目！　すごいぞ、すごいぞ、ヒ・ヨ・ちゃんっ<emoji=heart04>」
line = "「これで１周目！　すごいぞ、すごいぞ、ヒ・ヨ・ちゃんっ<emoji=heart04>」"

[[dialogue]]
speaker = "ヒヨ"
# 「姐さん、ありがとなっ！　このままぶっちぎるぜえ！」
line = "「姐さん、ありがとなっ！　このままぶっちぎるぜえ！」"

[[dialogue]]
speaker = "カティア"
# 「魔王様っ、ここから挽回しますっ！」
line = "「魔王様っ、ここから挽回しますっ！」"

[[dialogue]]
speaker = "unk"
# いいところ見せてくれ！
line = "いいところ見せてくれ！"

[[dialogue]]
speaker = "unk"
# 全然行けるっ！
line = "全然行けるっ！"

[[dialogue]]
speaker = "カティア"
# 「はいっ！　期待に応えて見せまーす！」
line = "「はいっ！　期待に応えて見せまーす！」"

[[dialogue]]
speaker = "unk"
# ほんのわずかに遅れて、カティアがスタート地点を通過する。
line = "ほんのわずかに遅れて、カティアがスタート地点を通過する。"

[[dialogue]]
speaker = "ミルフィー"
# 「うぅ、会長くんにめいっぱい応援してもらえて……カティアちゃん、いいなぁ……」
line = "「うぅ、会長くんにめいっぱい応援してもらえて……カティアちゃん、いいなぁ……」"

[[dialogue]]
speaker = "ミルフィー"
# 「私だってクラス委員のお仕事が大変な時は、会長くんに応援してほしいよー」
line = "「私だってクラス委員のお仕事が大変な時は、会長くんに応援してほしいよー」"

[[dialogue]]
speaker = "ヒヨ"
# 「な、なんだあ？　姐さんの声が届かねぇ──」
line = "「な、なんだあ？　姐さんの声が届かねぇ──」"

[[dialogue]]
speaker = "ミルフィー"
# 「──って、いけない！　ヒヨちゃんの応援に集中しなきゃっ！」
line = "「──って、いけない！　ヒヨちゃんの応援に集中しなきゃっ！」"

[[dialogue]]
speaker = "ミルフィー"
# 「行け行けゴーゴー！　ダッシュダーッシュ！」
line = "「行け行けゴーゴー！　ダッシュダーッシュ！」"

[[dialogue]]
speaker = "カティア"
# 「ぐぅ、もうちょっとで追いつけそうだったのに、また離されちゃったワン……さすがはヒヨっ……！」
line = "「ぐぅ、もうちょっとで追いつけそうだったのに、また離されちゃったワン……さすがはヒヨっ……！」"

[[dialogue]]
speaker = "unk"
# カ・ティ・ア！　カ・ティ・ア！
line = "カ・ティ・ア！　カ・ティ・ア！"

[[dialogue]]
speaker = "カティア"
# 「魔王様に声を張り上げて応援してもらってるのに……負けたくないっ、負けたくなぁいっ！」
line = "「魔王様に声を張り上げて応援してもらってるのに……負けたくないっ、負けたくなぁいっ！」"

[[dialogue]]
speaker = "ヒヨ"
# 「あと１周っ！」
line = "「あと１周っ！」"

[[dialogue]]
speaker = "unk"
# ２周目、再び俺たちの前を先に通過したのはヒヨだった。
line = "２周目、再び俺たちの前を先に通過したのはヒヨだった。"

[[dialogue]]
speaker = "unk"
# さっきよりもカティアとの差が開いているように見える。
line = "さっきよりもカティアとの差が開いているように見える。"

[[dialogue]]
speaker = "カティア"
# 「はぁ、はっ、はっ、はぁっ！　ま、魔王様っ、ここから逆転して見せますワンっ！」
line = "「はぁ、はっ、はっ、はぁっ！　ま、魔王様っ、ここから逆転して見せますワンっ！」"

[[dialogue]]
speaker = "unk"
# １周目より明らかに疲弊の色が濃い。ここからの逆転は厳しいようにも見えるが……
line = "１周目より明らかに疲弊の色が濃い。ここからの逆転は厳しいようにも見えるが……"

[[dialogue]]
speaker = "unk"
# カティアの勝利を信じる！
line = "カティアの勝利を信じる！"

[[dialogue]]
speaker = "unk"
# それでも俺は！
line = "それでも俺は！"

[[dialogue]]
speaker = "ミルフィー"
# 「そのままイケるよっ！　ヒヨちゃんガンバっ！　Ｖ・Ｉ・Ｃ・Ｔ・Ｏ・Ｒ・Ｙ──ビクトリー！」
line = "「そのままイケるよっ！　ヒヨちゃんガンバっ！　Ｖ・Ｉ・Ｃ・Ｔ・Ｏ・Ｒ・Ｙ──ビクトリー！」"

[[dialogue]]
speaker = "ミルフィー"
# （ヒヨちゃんが勝ったら……えへへ、会長くんになんて命令しちゃおっかな……<emoji=heart04>）
line = "（ヒヨちゃんが勝ったら……えへへ、会長くんになんて命令しちゃおっかな……<emoji=heart04>）"

[[dialogue]]
speaker = "ミルフィー"
# （私もカティアちゃんみたいに応援してもらおうかな……ううん、もうちょっと攻めてもいいよね）
line = "（私もカティアちゃんみたいに応援してもらおうかな……ううん、もうちょっと攻めてもいいよね）"

[[dialogue]]
speaker = "ミルフィー"
# （耳元で甘ぁいセリフを言ってもらう、とか……？）
line = "（耳元で甘ぁいセリフを言ってもらう、とか……？）"

[[dialogue]]
speaker = "ミルフィー"
# （アゴをクイッてやられて『可愛いぜ、ミルフィー』なぁんて……きゃーっ<emoji=heart04>）
line = "（アゴをクイッてやられて『可愛いぜ、ミルフィー』なぁんて……きゃーっ<emoji=heart04>）"

[[dialogue]]
speaker = "ヒヨ"
# 「……っ？　あれ、また姐さんの声が……！？　飛ばしすぎたけどよお、残りはあと少し、踏ん張れ、あたし！」
line = "「……っ？　あれ、また姐さんの声が……！？　飛ばしすぎたけどよお、残りはあと少し、踏ん張れ、あたし！」"

[[dialogue]]
speaker = "カティア"
# 「ヒヨのスピードが落ちたっ！　チャンスだガオーーーーーっ！」
line = "「ヒヨのスピードが落ちたっ！　チャンスだガオーーーーーっ！」"

[[dialogue]]
speaker = "unk"
# 残り１／４周。ゴール直前のデッドヒート。
line = "残り１／４周。ゴール直前のデッドヒート。"

[[dialogue]]
speaker = "ミルフィー"
# 「ええっ！？　がんばれ、ヒヨちゃーんっ！」
line = "「ええっ！？　がんばれ、ヒヨちゃーんっ！」"

[[dialogue]]
speaker = "unk"
# ぶっちぎれ、カティアーっ！
line = "ぶっちぎれ、カティアーっ！"

[[dialogue]]
speaker = "unk"
# 最後にテープを切ったのは──
line = "最後にテープを切ったのは──"

[[dialogue]]
speaker = "カティア"
# 「ガオ～～～っ！！」
line = "「ガオ～～～っ！！」"

[[dialogue]]
speaker = "ヒヨ"
# 「くああああっ！　負けちまったあっ！」
line = "「くああああっ！　負けちまったあっ！」"

[[dialogue]]
speaker = "カティア"
# 「やったやった！　これで１００勝ですガオ！」
line = "「やったやった！　これで１００勝ですガオ！」"

[[dialogue]]
speaker = "ミルフィー"
# 「ご、ごめんね、ヒヨちゃん！　私の応援が足りなかったばっかりに……」
line = "「ご、ごめんね、ヒヨちゃん！　私の応援が足りなかったばっかりに……」"

[[dialogue]]
speaker = "ヒヨ"
# 「あ、謝らないでくれやい。リードを取った後で油断しちまったあたしの実力不足さあ」
line = "「あ、謝らないでくれやい。リードを取った後で油断しちまったあたしの実力不足さあ」"

[[dialogue]]
speaker = "ミルフィー"
# （ヒヨちゃんは悪くないっ！　私の応援に邪念が入っちゃったせいだよー！）
line = "（ヒヨちゃんは悪くないっ！　私の応援に邪念が入っちゃったせいだよー！）"

[[dialogue]]
speaker = "ミルフィー"
# （会長くんはずっとカティアちゃんを真面目に応援してたのに……うぅ、私ってば悪い子だ……）
line = "（会長くんはずっとカティアちゃんを真面目に応援してたのに……うぅ、私ってば悪い子だ……）"

[[dialogue]]
speaker = "ヒヨ"
# 「でも次は負けねえ。姐さん、次も応援頼みまさぁ」
line = "「でも次は負けねえ。姐さん、次も応援頼みまさぁ」"

[[dialogue]]
speaker = "カティア"
# 「魔王様、次も応援お願いしますガオ！」
line = "「魔王様、次も応援お願いしますガオ！」"

[[dialogue]]
speaker = "ミルフィー"
# 「そ、それなんだけど！　２人の勝負は私たちの応援に頼らずに、自分たちだけでやらなきゃダメじゃないかな！？」
line = "「そ、それなんだけど！　２人の勝負は私たちの応援に頼らずに、自分たちだけでやらなきゃダメじゃないかな！？」"

[[dialogue]]
speaker = "ミルフィー"
# 「いつでも私たちが応援に駆け付けられるわけじゃないんだし……！　だよね！　会長くん！」
line = "「いつでも私たちが応援に駆け付けられるわけじゃないんだし……！　だよね！　会長くん！」"

[[dialogue]]
speaker = "unk"
# う、うん？
line = "う、うん？"

[[dialogue]]
speaker = "ヒヨ"
# 「お、おう？　まあ、確かにそうか……。次は正々堂々、サシでやろうぜい！」
line = "「お、おう？　まあ、確かにそうか……。次は正々堂々、サシでやろうぜい！」"

[[dialogue]]
speaker = "カティア"
# 「望むところだワン！」
line = "「望むところだワン！」"

[[dialogue]]
speaker = "ミルフィー"
# （また応援しながら対決するなんて、私にはできないよ……）
line = "（また応援しながら対決するなんて、私にはできないよ……）"

[[dialogue]]
speaker = "ミルフィー"
# （カティアちゃんばっかり、会長くんに応援してもらえるなんて羨ましくて……）
line = "（カティアちゃんばっかり、会長くんに応援してもらえるなんて羨ましくて……）"

[[dialogue]]
speaker = "ミルフィー"
# （余計なこと考えて、応援に集中できなくなっちゃうもん！）
line = "（余計なこと考えて、応援に集中できなくなっちゃうもん！）"
