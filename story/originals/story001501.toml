[[dialogue]]
speaker = "unk"
# それはリクリエを退けてしばらく経った、ある日のこと。
line = "それはリクリエを退けてしばらく経った、ある日のこと。"

[[dialogue]]
speaker = "unk"
# サーシャさんと２人で、星徒会の書類仕事をしていたのだが――
line = "サーシャさんと２人で、星徒会の書類仕事をしていたのだが――"

[[dialogue]]
speaker = "サーシャ"
# 「ねぇ、会長くん。そういえばこの前、マトイちゃんがノヴァフォームへの変身に成功したじゃない？」
line = "「ねぇ、会長くん。そういえばこの前、マトイちゃんがノヴァフォームへの変身に成功したじゃない？」"

[[dialogue]]
speaker = "unk"
# 初夏に行われた、『マム』こと妃竜院マハムート先輩によるビーチバレー特訓。
line = "初夏に行われた、『マム』こと妃竜院マハムート先輩によるビーチバレー特訓。"

[[dialogue]]
speaker = "unk"
# その後に現れた新種モンスターとの戦闘で、魔王の秘技である『アルケインノヴァエクストリーム』の発動に再び成功。マトイはノヴァフォームへの覚醒を果たしたのだった。
line = "その後に現れた新種モンスターとの戦闘で、魔王の秘技である『アルケインノヴァエクストリーム』の発動に再び成功。マトイはノヴァフォームへの覚醒を果たしたのだった。"

[[dialogue]]
speaker = "サーシャ"
# 「私もマトイちゃんから話を聞いたりして、改めてノヴァフォームになれないかどうか、研究してるんだけど……」
line = "「私もマトイちゃんから話を聞いたりして、改めてノヴァフォームになれないかどうか、研究してるんだけど……」"

[[dialogue]]
speaker = "サーシャ"
# 「やっぱりそう簡単には行かなくて……ちょっと悩んでるのよね～」
line = "「やっぱりそう簡単には行かなくて……ちょっと悩んでるのよね～」"

[[dialogue]]
speaker = "サーシャ"
# 「またどこかで時間を作って、会長くんも一緒にノヴァフォームの研究会をやりたいんだけど。どうかしら……？」
line = "「またどこかで時間を作って、会長くんも一緒にノヴァフォームの研究会をやりたいんだけど。どうかしら……？」"

[[dialogue]]
speaker = "unk"
# もちろんです。一緒にやりましょう
line = "もちろんです。一緒にやりましょう"

[[dialogue]]
speaker = "サーシャ"
# 「本当？　ありがとう♪　優しい弟くんで、お姉ちゃん助かるわ～♪」
line = "「本当？　ありがとう♪　優しい弟くんで、お姉ちゃん助かるわ～♪」"

[[dialogue]]
speaker = "サーシャ"
# 「ぎゅ～っ♪」
line = "「ぎゅ～っ♪」"

[[dialogue]]
speaker = "unk"
# さ、サーシャさん、胸に埋もれて息が……
line = "さ、サーシャさん、胸に埋もれて息が……"

[[dialogue]]
speaker = "サーシャ"
# 「あら～？　ふふっ、ごめんなさい。嬉しくなってつい、またやっちゃったわ～」
line = "「あら～？　ふふっ、ごめんなさい。嬉しくなってつい、またやっちゃったわ～」"

[[dialogue]]
speaker = "unk"
# と、その時だった。
line = "と、その時だった。"

[[dialogue]]
speaker = "サーシャ"
# 「会長くん、ＤＩＳＣが鳴ってるみたいよ？」
line = "「会長くん、ＤＩＳＣが鳴ってるみたいよ？」"

[[dialogue]]
speaker = "unk"
# 画面を確認すると、電話がかかって来ていた。通話ボタンを押すと――
line = "画面を確認すると、電話がかかって来ていた。通話ボタンを押すと――"

[[dialogue]]
speaker = "サチ"
# 「お兄さん、失礼します。今、お時間よろしいでしょうか？」
line = "「お兄さん、失礼します。今、お時間よろしいでしょうか？」"

[[dialogue]]
speaker = "サチ"
# 「――ありがとうございます。実はもし可能なら、<b>助っ人</b>をお願いできないかと思いまして」
line = "「――ありがとうございます。実はもし可能なら、<b>助っ人</b>をお願いできないかと思いまして」"

[[dialogue]]
speaker = "unk"
# わかった。これから合流するよ
line = "わかった。これから合流するよ"

[[dialogue]]
speaker = "サチ"
# 「よろしくお願いします。そうしたら、場所は――」
line = "「よろしくお願いします。そうしたら、場所は――」"

[[dialogue]]
speaker = "unk"
# 合流場所を聞いて、通話を終了する。
line = "合流場所を聞いて、通話を終了する。"

[[dialogue]]
speaker = "サーシャ"
# 「ねぇ、もしかして用件は――ロストアイテム関連かしら？」
line = "「ねぇ、もしかして用件は――ロストアイテム関連かしら？」"

[[dialogue]]
speaker = "unk"
# え！？　サーシャさんがどうしてそれを……
line = "え！？　サーシャさんがどうしてそれを……"

[[dialogue]]
speaker = "サーシャ"
# 「うん、実は少し前にちょっとね～」
line = "「うん、実は少し前にちょっとね～」"

[[dialogue]]
speaker = "サーシャ"
# 「さっ、そういうことなら急ぎましょう。魔法少女たちが助けを求めてるんだもの♪」
line = "「さっ、そういうことなら急ぎましょう。魔法少女たちが助けを求めてるんだもの♪」"
