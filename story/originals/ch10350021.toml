[[dialogue]]
speaker = "unk"
# 第１話,恋愛パートナー契約、締結,P
line = "第１話,恋愛パートナー契約、締結,P"

[[dialogue]]
speaker = "セナリィ"
# 「会長様、私の呼び出しに応えていただき、ありがとうございます。話というのは他でもありませんわ」
line = "「会長様、私の呼び出しに応えていただき、ありがとうございます。話というのは他でもありませんわ」"

[[dialogue]]
speaker = "セナリィ"
# 「私、もう自分の心に嘘は付けませんの。ですから、言わせてください」
line = "「私、もう自分の心に嘘は付けませんの。ですから、言わせてください」"

[[dialogue]]
speaker = "セナリィ"
# 「愛してますわ、会長様。よろしければ、私と恋愛パートナーとして、契約を結んではいただけませんか？」
line = "「愛してますわ、会長様。よろしければ、私と恋愛パートナーとして、契約を結んではいただけませんか？」"

[[dialogue]]
speaker = "セナリィ"
# 「唐突で驚かれてますわよね。無理なら無理とハッキリ言ってくださいませ」
line = "「唐突で驚かれてますわよね。無理なら無理とハッキリ言ってくださいませ」"

[[dialogue]]
speaker = "セナリィ"
# 「綺麗さっぱりフッていただければ、私は先に進めますから……身勝手な振る舞い、お許しいただければ幸いですわ」
line = "「綺麗さっぱりフッていただければ、私は先に進めますから……身勝手な振る舞い、お許しいただければ幸いですわ」"

[[dialogue]]
speaker = "unk"
# 俺も君のことが好きだ、セナリィ
line = "俺も君のことが好きだ、セナリィ"

[[dialogue]]
speaker = "セナリィ"
# 「ふふ、そうですわよね。私と会長様では住む世界も身分も異なる身。私のことが好きだなんて──ん？」
line = "「ふふ、そうですわよね。私と会長様では住む世界も身分も異なる身。私のことが好きだなんて──ん？」"

[[dialogue]]
speaker = "セナリィ"
# 「好き……好きぃっ！？　んぅえぇぇぇぇっ！？　会長様、今、なんとおっしゃいましたの！？」
line = "「好き……好きぃっ！？　んぅえぇぇぇぇっ！？　会長様、今、なんとおっしゃいましたの！？」"

[[dialogue]]
speaker = "セナリィ"
# 「聞き間違いでなければ、私のことが好き、と。それはつまり、その、おっ、ＯＫということでよろしいんですの！？　私でよろしいんですの！？」
line = "「聞き間違いでなければ、私のことが好き、と。それはつまり、その、おっ、ＯＫということでよろしいんですの！？　私でよろしいんですの！？」"

[[dialogue]]
speaker = "unk"
# セナリィじゃなきゃダメなんだ
line = "セナリィじゃなきゃダメなんだ"

[[dialogue]]
speaker = "セナリィ"
# 「ふぁぁ……それほどまで、まっすぐに好意をぶつけられたのなんて生まれて初めてですわ……会長様、私の生涯の愛情を、あなたひとりに捧げます」
line = "「ふぁぁ……それほどまで、まっすぐに好意をぶつけられたのなんて生まれて初めてですわ……会長様、私の生涯の愛情を、あなたひとりに捧げます」"

[[dialogue]]
speaker = "セナリィ"
# 「──なんて、ちょっと重いでしょうか、ふふ」
line = "「──なんて、ちょっと重いでしょうか、ふふ」"

[[dialogue]]
speaker = "unk"
# こうして、俺とセナリィは互いの想いを確認し合ったのだが。
line = "こうして、俺とセナリィは互いの想いを確認し合ったのだが。"

[[dialogue]]
speaker = "セナリィ"
# 「う～ん……私が会長様とお付き合いを始めたことは秘密にしておくべきでしょうか」
line = "「う～ん……私が会長様とお付き合いを始めたことは秘密にしておくべきでしょうか」"

[[dialogue]]
speaker = "セナリィ"
# 「星徒会としても会長のスキャンダルはご法度でなくて？　しかも、悪の華であるこの私との交際となると……」
line = "「星徒会としても会長のスキャンダルはご法度でなくて？　しかも、悪の華であるこの私との交際となると……」"

[[dialogue]]
speaker = "セナリィ"
# 「チームの長が自ら風紀を乱していては、問題でしょう。風紀の乱れは、心の乱れですわ」
line = "「チームの長が自ら風紀を乱していては、問題でしょう。風紀の乱れは、心の乱れですわ」"

[[dialogue]]
speaker = "セナリィ"
# 「……いえ、これは言い訳ですわね。もっとシンプルに、会長様と恋仲になっただなんて……他の人にバレたら恥ずかしいではありませんの」
line = "「……いえ、これは言い訳ですわね。もっとシンプルに、会長様と恋仲になっただなんて……他の人にバレたら恥ずかしいではありませんの」"

[[dialogue]]
speaker = "セナリィ"
# 「特にマインには内緒ですわ。あの小悪魔が知ったら、何を言われるか、わかったもんじゃありません」
line = "「特にマインには内緒ですわ。あの小悪魔が知ったら、何を言われるか、わかったもんじゃありません」"

[[dialogue]]
speaker = "セナリィ"
# 「ですが、弊社社員のミウやヒマワリには、契約書の調印を見届けてもらわなくてはいけませんし……」
line = "「ですが、弊社社員のミウやヒマワリには、契約書の調印を見届けてもらわなくてはいけませんし……」"

[[dialogue]]
speaker = "unk"
# 契約書？　調印？
line = "契約書？　調印？"

[[dialogue]]
speaker = "セナリィ"
# 「ええ、先ほども申しましたけど、恋愛パートナー契約ですわ」
line = "「ええ、先ほども申しましたけど、恋愛パートナー契約ですわ」"

[[dialogue]]
speaker = "ミウ"
# 「では、会長さん、こちらの契約書にサインと印鑑を。血判でも結構ですよ」
line = "「では、会長さん、こちらの契約書にサインと印鑑を。血判でも結構ですよ」"

[[dialogue]]
speaker = "ヒマワリ"
# 「セナリィ社長も、ここにサインと判子を押してください」
line = "「セナリィ社長も、ここにサインと判子を押してください」"

[[dialogue]]
speaker = "セナリィ"
# 「さらさらさら……ポン。押しましたわ！」
line = "「さらさらさら……ポン。押しましたわ！」"

[[dialogue]]
speaker = "ミウ"
# 「はい、お名前と印鑑、確かに。これにておふたりの間に恋愛パートナー契約が成立しました」
line = "「はい、お名前と印鑑、確かに。これにておふたりの間に恋愛パートナー契約が成立しました」"

[[dialogue]]
speaker = "ヒマワリ"
# 「おめでとうございます、社長～！　……でも、恋人になるのって、こんな流れだっけー？」
line = "「おめでとうございます、社長～！　……でも、恋人になるのって、こんな流れだっけー？」"

[[dialogue]]
speaker = "ミウ"
# 「細かいことはいいんだよ、ヒマワリちゃん。２人の気持ちを形に残すのが大事なんだから」
line = "「細かいことはいいんだよ、ヒマワリちゃん。２人の気持ちを形に残すのが大事なんだから」"

[[dialogue]]
speaker = "ミウ"
# 「でも社長と会長さんが手を組めば、向かうところ敵なしですね」
line = "「でも社長と会長さんが手を組めば、向かうところ敵なしですね」"

[[dialogue]]
speaker = "ヒマワリ"
# 「新星学園の星徒会も、まるっとゴールデングースの味方になってくれるのかな？」
line = "「新星学園の星徒会も、まるっとゴールデングースの味方になってくれるのかな？」"

[[dialogue]]
speaker = "セナリィ"
# 「いいえ、私は星徒会の後ろ盾が欲しくて、会長様と交際を始めたわけではありません」
line = "「いいえ、私は星徒会の後ろ盾が欲しくて、会長様と交際を始めたわけではありません」"

[[dialogue]]
speaker = "セナリィ"
# 「バックに強い組織をチラつかせてイキるなんて、まさに虎の威を借る狐。そこに悪の美学はカケラもありませんわ！」
line = "「バックに強い組織をチラつかせてイキるなんて、まさに虎の威を借る狐。そこに悪の美学はカケラもありませんわ！」"

[[dialogue]]
speaker = "セナリィ"
# 「星徒会からの助力は望みませんが……会長様が私の恋愛パートナーとして……」
line = "「星徒会からの助力は望みませんが……会長様が私の恋愛パートナーとして……」"

[[dialogue]]
speaker = "セナリィ"
# 「そして、私がゴールデングースの総帥ではなく、セナリィという一人の女として困ったときには……あなたに甘えさせていただきますわね」
line = "「そして、私がゴールデングースの総帥ではなく、セナリィという一人の女として困ったときには……あなたに甘えさせていただきますわね」"

[[dialogue]]
speaker = "ミウ＆ヒマワリ"
# 「きゃーーっ<emoji=heart04>」
line = "「きゃーーっ<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
# 「──って、恥ずかしいことを言わせるんじゃありませんわ！」
line = "「──って、恥ずかしいことを言わせるんじゃありませんわ！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「社長が勝手に惚気たんじゃないですかー。はー、アッツいアッツーい！」
line = "「社長が勝手に惚気たんじゃないですかー。はー、アッツいアッツーい！」"

[[dialogue]]
speaker = "ミウ"
# 「社長をこんなにもメロメロに堕としてしまうなんて……会長さんは私よりもずっと策士ですね」
line = "「社長をこんなにもメロメロに堕としてしまうなんて……会長さんは私よりもずっと策士ですね」"

[[dialogue]]
speaker = "セナリィ"
# 「ああ、ふたりとも。会長様とお付き合いを始めた件、くれぐれもマインには内緒ですわよ？」
line = "「ああ、ふたりとも。会長様とお付き合いを始めた件、くれぐれもマインには内緒ですわよ？」"

[[dialogue]]
speaker = "ヒマワリ"
# 「ネーゼマインさんにですか？　お祝いしてくれると思いますけど」
line = "「ネーゼマインさんにですか？　お祝いしてくれると思いますけど」"

[[dialogue]]
speaker = "セナリィ"
# 「どうだか。『セナリィに彼氏ができるなんてね～、にひひ♪』とかなんとか、からかってくるに違いないですわ！」
line = "「どうだか。『セナリィに彼氏ができるなんてね～、にひひ♪』とかなんとか、からかってくるに違いないですわ！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「ああ～、わかる～」
line = "「ああ～、わかる～」"

[[dialogue]]
speaker = "ミウ"
# 「嬉々とした笑顔まで想像できます」
line = "「嬉々とした笑顔まで想像できます」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「やあやあ、皆さんお揃いで。本日はお日柄もよく～」
line = "「やあやあ、皆さんお揃いで。本日はお日柄もよく～」"

[[dialogue]]
speaker = "セナリィ"
# 「ギクリ！　マ、マイン！　事前連絡もなしに、何の用ですの！？」
line = "「ギクリ！　マ、マイン！　事前連絡もなしに、何の用ですの！？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「うんにゃ、近くに来たから寄っただけなんだけど～。あれあれ？　もしかして、みんなで私の悪口でも言ってた？」
line = "「うんにゃ、近くに来たから寄っただけなんだけど～。あれあれ？　もしかして、みんなで私の悪口でも言ってた？」"

[[dialogue]]
speaker = "セナリィ"
# 「そ、そそ、そんなことはありませんわよ！？　ねえ、みんな！？」
line = "「そ、そそ、そんなことはありませんわよ！？　ねえ、みんな！？」"

[[dialogue]]
speaker = "ミウ"
# 「ええ、ミーティングをしていました。ゴールデングースの社外秘なので、ネーゼマインさんにも言えない極秘事項です」
line = "「ええ、ミーティングをしていました。ゴールデングースの社外秘なので、ネーゼマインさんにも言えない極秘事項です」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「そこに社員じゃない会長がいるのに～？　怪しいぞ～？　……ま、いっか☆」
line = "「そこに社員じゃない会長がいるのに～？　怪しいぞ～？　……ま、いっか☆」"

[[dialogue]]
speaker = "unk"
# とりあえずこの場は乗り切ったけれど、マインにバレるのも時間の問題のように思えた。
line = "とりあえずこの場は乗り切ったけれど、マインにバレるのも時間の問題のように思えた。"
