[[dialogue]]
speaker = "unk"
# 第２話,仇敵、相まみえる,P
line = "第２話,仇敵、相まみえる,P"

[[dialogue]]
speaker = "ラティエ"
# 「ここに遊びにくるのも久しぶりだな、相変わらずにぎやかだ」
line = "「ここに遊びにくるのも久しぶりだな、相変わらずにぎやかだ」"

[[dialogue]]
speaker = "unk"
# 訓練の後、学園長に誘われてカジノへやってきていた。
line = "訓練の後、学園長に誘われてカジノへやってきていた。"

[[dialogue]]
speaker = "ラティエ"
# 「ここに遊びに来たのは初めてかい？」
line = "「ここに遊びに来たのは初めてかい？」"

[[dialogue]]
speaker = "unk"
# いえ、何度か来たことがあります
line = "いえ、何度か来たことがあります"

[[dialogue]]
speaker = "ラティエ"
# 「ほう、ならば細かい説明は必要ないかな？」
line = "「ほう、ならば細かい説明は必要ないかな？」"

[[dialogue]]
speaker = "ラティエ"
# 「私はずっと以前、このカジノが出来たばかりのころに何度か遊びに来たことがあったんだよ」
line = "「私はずっと以前、このカジノが出来たばかりのころに何度か遊びに来たことがあったんだよ」"

[[dialogue]]
speaker = "ラティエ"
# 「その時は楽しく遊ばせて貰っただけでなく、懐の方もとても温かくして貰ったものだ」
line = "「その時は楽しく遊ばせて貰っただけでなく、懐の方もとても温かくして貰ったものだ」"

[[dialogue]]
speaker = "unk"
# ええ、まあ……
line = "ええ、まあ……"

[[dialogue]]
speaker = "unk"
# （その時の話はヘレナちゃんから……）
line = "（その時の話はヘレナちゃんから……）"

[[dialogue]]
speaker = "ラティエ"
# 「さあ、何から遊ぼうか。私のお勧めはやはりカードなのだが……」
line = "「さあ、何から遊ぼうか。私のお勧めはやはりカードなのだが……」"

[[dialogue]]
speaker = "ラティエ"
# 「ひとついいことを教えてやろう。ギャンブルは運の強い者が勝つんじゃない、数字に強い者が勝つんだ」
line = "「ひとついいことを教えてやろう。ギャンブルは運の強い者が勝つんじゃない、数字に強い者が勝つんだ」"

[[dialogue]]
speaker = "ラティエ"
# 「きみは学業の成績も優秀と聞いている。もしかしたら隠れた才能が眠っているかもしれないぞ？」
line = "「きみは学業の成績も優秀と聞いている。もしかしたら隠れた才能が眠っているかもしれないぞ？」"

[[dialogue]]
speaker = "ヘレナ"
# 「よくもぬけぬけと顔を出せたものだな、白夜院ラティエ」
line = "「よくもぬけぬけと顔を出せたものだな、白夜院ラティエ」"

[[dialogue]]
speaker = "unk"
# ホールに声が響く。
line = "ホールに声が響く。"

[[dialogue]]
speaker = "unk"
# 気が付くといつの間にか、黒い服を着た人たちに周りを取り囲まれていた。
line = "気が付くといつの間にか、黒い服を着た人たちに周りを取り囲まれていた。"

[[dialogue]]
speaker = "ラティエ"
# 「おや、あなたは……」
line = "「おや、あなたは……」"

[[dialogue]]
speaker = "unk"
# ヘレナちゃん、いらっしゃったんですか？
line = "ヘレナちゃん、いらっしゃったんですか？"

[[dialogue]]
speaker = "ヘレナ"
# 「いらっしゃるも何も、このカジノを経営しているのは私だからな」
line = "「いらっしゃるも何も、このカジノを経営しているのは私だからな」"

[[dialogue]]
speaker = "ヘレナ"
# 「立てばプリティ、座ればゴージャス。カジノオーナーにして九浄家二十六代目当主・九浄ヘレナちゃんとは、私のことであるっ！」
line = "「立てばプリティ、座ればゴージャス。カジノオーナーにして九浄家二十六代目当主・九浄ヘレナちゃんとは、私のことであるっ！」"

[[dialogue]]
speaker = "ラティエ"
# 「そして学園の理事長である、と。ご無沙汰しているな、理事長。先日は素晴らしい人工戦闘服をどうもありがとう」
line = "「そして学園の理事長である、と。ご無沙汰しているな、理事長。先日は素晴らしい人工戦闘服をどうもありがとう」"

[[dialogue]]
speaker = "ヘレナ"
# 「なぁに、星騎士としての実力を見込んでのことだ。そして貴殿の特別な力の謎を解明するためでもある」
line = "「なぁに、星騎士としての実力を見込んでのことだ。そして貴殿の特別な力の謎を解明するためでもある」"

[[dialogue]]
speaker = "ラティエ"
# 「私の謎、か……別に特別な力は持ち合わせていないのだがね」
line = "「私の謎、か……別に特別な力は持ち合わせていないのだがね」"

[[dialogue]]
speaker = "ラティエ"
# 「それでも私が<ruby=スターナイト>星騎士</ruby>たちの未来の礎となれるというならば光栄なことだ」
line = "「それでも私が<ruby>星騎士<rt>スターナイト</rt></ruby>たちの未来の礎となれるというならば光栄なことだ」"

[[dialogue]]
speaker = "ヘレナ"
# 「殊勝だな。だが、そう思うなら放浪の旅は卒業して、少しは研究に協力して欲しいものだ」
line = "「殊勝だな。だが、そう思うなら放浪の旅は卒業して、少しは研究に協力して欲しいものだ」"

[[dialogue]]
speaker = "ラティエ"
# 「しているだろう。旅から帰るたび、そこで得た有益な情報は共有しているつもりだが？」
line = "「しているだろう。旅から帰るたび、そこで得た有益な情報は共有しているつもりだが？」"

[[dialogue]]
speaker = "ヘレナ"
# 「確かに貴殿のもたらす情報には有益なものが多い」
line = "「確かに貴殿のもたらす情報には有益なものが多い」"

[[dialogue]]
speaker = "ヘレナ"
# 「だが貴殿の振る舞いは奔放が過ぎる。大人としての立場を弁えた行動を望みたいものだな」
line = "「だが貴殿の振る舞いは奔放が過ぎる。大人としての立場を弁えた行動を望みたいものだな」"

[[dialogue]]
speaker = "ラティエ"
# 「奔放なのは性分でね。こればかりは目を瞑って頂くほかない」
line = "「奔放なのは性分でね。こればかりは目を瞑って頂くほかない」"

[[dialogue]]
speaker = "unk"
# （とんでもなくピリついてるんだが……）
line = "（とんでもなくピリついてるんだが……）"

[[dialogue]]
speaker = "unk"
# （く、空気が……）
line = "（く、空気が……）"

[[dialogue]]
speaker = "ラティエ"
# 「それで？　カジノオーナー自らホールに現れて何をしようというのだ？」
line = "「それで？　カジノオーナー自らホールに現れて何をしようというのだ？」"

[[dialogue]]
speaker = "ヘレナ"
# 「忘れたとは言わせぬぞ？　以前、貴殿がこのカジノを訪れた時、散々荒らしていってくれたではないか」
line = "「忘れたとは言わせぬぞ？　以前、貴殿がこのカジノを訪れた時、散々荒らしていってくれたではないか」"

[[dialogue]]
speaker = "ラティエ"
# 「人聞きの悪い。私はだた普通に楽しんでいただけだ」
line = "「人聞きの悪い。私はだた普通に楽しんでいただけだ」"

[[dialogue]]
speaker = "ヘレナ"
# 「店を潰しかけておいてよく言う……。また荒らしに来たか？　だが、私の目が黒いうちは好きにさせぬぞ」
line = "「店を潰しかけておいてよく言う……。また荒らしに来たか？　だが、私の目が黒いうちは好きにさせぬぞ」"

[[dialogue]]
speaker = "ラティエ"
# 「フム、ということはオーナー権限により、このカジノに出入り禁止かな？」
line = "「フム、ということはオーナー権限により、このカジノに出入り禁止かな？」"

[[dialogue]]
speaker = "ヘレナ"
# 「当然だろう？　未来永劫、永久に貴様は来店禁止だ」
line = "「当然だろう？　未来永劫、永久に貴様は来店禁止だ」"

[[dialogue]]
speaker = "ヘレナ"
# 「……と言いたいところだが、客の立場からすればそれも理不尽な話だろう？」
line = "「……と言いたいところだが、客の立場からすればそれも理不尽な話だろう？」"

[[dialogue]]
speaker = "ヘレナ"
# 「だから、相手をしてやろう。この私が直々にな……」
line = "「だから、相手をしてやろう。この私が直々にな……」"

[[dialogue]]
speaker = "ラティエ"
# 「なるほど、それは面白い……」
line = "「なるほど、それは面白い……」"

[[dialogue]]
speaker = "unk"
# （コワイコワイコワイコワイっ！！！！）
line = "（コワイコワイコワイコワイっ！！！！）"

[[dialogue]]
speaker = "unk"
# 空気が冷え切っている。
line = "空気が冷え切っている。"

[[dialogue]]
speaker = "unk"
# ２人の圧に圧し潰されて、黒服の中には泡を吹いて倒れる者まで出始めている。
line = "２人の圧に圧し潰されて、黒服の中には泡を吹いて倒れる者まで出始めている。"

[[dialogue]]
speaker = "ラティエ"
# 「何から始める？」
line = "「何から始める？」"

[[dialogue]]
speaker = "ヘレナ"
# 「何でもよい。好きなゲームを選べ」
line = "「何でもよい。好きなゲームを選べ」"

[[dialogue]]
speaker = "ラティエ"
# 「そうか……ではまず、カードで遊びたいな」
line = "「そうか……ではまず、カードで遊びたいな」"

[[dialogue]]
speaker = "ヘレナ"
# 「ほぅ、カードと一口に言っても、当カジノにはいろいろあるが何をご所望かな？」
line = "「ほぅ、カードと一口に言っても、当カジノにはいろいろあるが何をご所望かな？」"

[[dialogue]]
speaker = "ラティエ"
# 「流星星徒会で流行っているゲームがある。まずはそれで勝負しようじゃないか……」
line = "「流星星徒会で流行っているゲームがある。まずはそれで勝負しようじゃないか……」"

[[dialogue]]
speaker = "ヘレナ"
# 「あれか……ふっ、いいだろう……」
line = "「あれか……ふっ、いいだろう……」"

[[dialogue]]
speaker = "unk"
# こうして──
line = "こうして──"

[[dialogue]]
speaker = "unk"
# ポーカーもブラックジャックもルーレットもダイスゲームも全てスルーして、なぜか一般的なルールのトランプが始まってしまった。
line = "ポーカーもブラックジャックもルーレットもダイスゲームも全てスルーして、なぜか一般的なルールのトランプが始まってしまった。"

[[dialogue]]
speaker = "unk"
# ただし、プレイヤーのオーラが半端ではない。
line = "ただし、プレイヤーのオーラが半端ではない。"

[[dialogue]]
speaker = "unk"
# 結局、２人の対決はいつまでたっても決着がつかないまま延々と続き──
line = "結局、２人の対決はいつまでたっても決着がつかないまま延々と続き──"

[[dialogue]]
speaker = "unk"
# 付き合わされていた黒服の皆さんが限界を迎えてしまったため、引き分けということでお開きになったのだった。
line = "付き合わされていた黒服の皆さんが限界を迎えてしまったため、引き分けということでお開きになったのだった。"
