[[dialogue]]
speaker = "unk"
# 第３話,流星星徒会の日常,B
line = "第３話,流星星徒会の日常,B"

[[dialogue]]
speaker = "ユウリ"
# 「よーし、頼むぜルリ。１を出してくれたらあたしに５万テルスが転がり込むんだ」
line = "「よーし、頼むぜルリ。１を出してくれたらあたしに５万テルスが転がり込むんだ」"

[[dialogue]]
speaker = "ルリエル"
# 「ぜーったいユウリ先輩には負けませんから。いっきますよぉ……」
line = "「ぜーったいユウリ先輩には負けませんから。いっきますよぉ……」"

[[dialogue]]
speaker = "ニャリオン"
# 「とにかくたまにはセーラを負かすニャン！　このままだとまた１位を取られるニャンよ！」
line = "「とにかくたまにはセーラを負かすニャン！　このままだとまた１位を取られるニャンよ！」"

[[dialogue]]
speaker = "セーラ"
# 「たまには敗北を知りたくなるよね～。歯ごたえがなさすぎるっていうか～♪」
line = "「たまには敗北を知りたくなるよね～。歯ごたえがなさすぎるっていうか～♪」"

[[dialogue]]
speaker = "ソフィア"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "ルリエル"
# 「１０！　ハイ１０が出ました！　これでわたしがトップ独走、億万長者は目の前です！」
line = "「１０！　ハイ１０が出ました！　これでわたしがトップ独走、億万長者は目の前です！」"

[[dialogue]]
speaker = "ユウリ"
# 「ホントかよ、いくら早くても止まったマス目次第だぜ」
line = "「ホントかよ、いくら早くても止まったマス目次第だぜ」"

[[dialogue]]
speaker = "セーラ"
# 「ルリっちが１０マス進むと～……『魔界で豪華別荘を買う』で～す」
line = "「ルリっちが１０マス進むと～……『魔界で豪華別荘を買う』で～す」"

[[dialogue]]
speaker = "ルリエル"
# 「やったー！　別荘です！　え？　それっていいコトですよね？」
line = "「やったー！　別荘です！　え？　それっていいコトですよね？」"

[[dialogue]]
speaker = "ニャリオン"
# 「ニャーッニャッニャッニャッ！　別荘購入は２０万テルスの出費ニャン！　ルリエルはもう借金地獄から這い上がれないニャン！」
line = "「ニャーッニャッニャッニャッ！　別荘購入は２０万テルスの出費ニャン！　ルリエルはもう借金地獄から這い上がれないニャン！」"

[[dialogue]]
speaker = "ルリエル"
# 「えええええぇぇぇぇぇーーー！？　フツー、別荘っていったら成功の証じゃないですか！　納得いきません～～！！」
line = "「えええええぇぇぇぇぇーーー！？　フツー、別荘っていったら成功の証じゃないですか！　納得いきません～～！！」"

[[dialogue]]
speaker = "ソフィア"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "セーラ"
# 「破産したルリち～はマグロ漁船へ移動ね♪」
line = "「破産したルリち～はマグロ漁船へ移動ね♪」"

[[dialogue]]
speaker = "ニャリオン"
# 「ここに送られたプレイヤーは特産品カード『マグロ』の取得しかできなくなるニャン」
line = "「ここに送られたプレイヤーは特産品カード『マグロ』の取得しかできなくなるニャン」"

[[dialogue]]
speaker = "ユウリ"
# 「この三界逆転ゲーム、落ちぶれたヤツに対して容赦ないよなー……」
line = "「この三界逆転ゲーム、落ちぶれたヤツに対して容赦ないよなー……」"

[[dialogue]]
speaker = "ルリエル"
# 「トホホ……なのですぅ……」
line = "「トホホ……なのですぅ……」"

[[dialogue]]
speaker = "ニャリオン"
# 「次はワガハイニャ！　株の大高騰でボロ儲けしてやるニャァーーン！」
line = "「次はワガハイニャ！　株の大高騰でボロ儲けしてやるニャァーーン！」"

[[dialogue]]
speaker = "ソフィア"
# 「──もう！　いい加減にしてください皆さん、今は放課後、つまり仕事の時間ですよ！」
line = "「──もう！　いい加減にしてください皆さん、今は放課後、つまり仕事の時間ですよ！」"

[[dialogue]]
speaker = "unk"
# 放課後の流星学園は星徒会室。
line = "放課後の流星学園は星徒会室。"

[[dialogue]]
speaker = "unk"
# 奏ソフィアはテーブルに身を乗り出し、ゲームに興じる面々に<ruby=かっぱ>喝破</ruby>をかけた。
line = "奏ソフィアはテーブルに身を乗り出し、ゲームに興じる面々に<ruby>喝破<rt>かっぱ</rt></ruby>をかけた。"

[[dialogue]]
speaker = "セーラ"
# 「まーまーソフィアちゃん。たまには息抜きしないと身が持たないよ～？」
line = "「まーまーソフィアちゃん。たまには息抜きしないと身が持たないよ～？」"

[[dialogue]]
speaker = "ユウリ"
# 「そーそー。あたしらは娯楽を通じてチーム間の団結を高めてるんだ、なあアホ猫」
line = "「そーそー。あたしらは娯楽を通じてチーム間の団結を高めてるんだ、なあアホ猫」"

[[dialogue]]
speaker = "ニャリオン"
# 「アホ猫呼ばわりするアホと団結するいわれはないニャン！」
line = "「アホ猫呼ばわりするアホと団結するいわれはないニャン！」"

[[dialogue]]
speaker = "ソフィア"
# 「皆さんは息抜きしすぎなんです！　フィオナ会長がいないからって皆さん好き勝手に遊んで……！」
line = "「皆さんは息抜きしすぎなんです！　フィオナ会長がいないからって皆さん好き勝手に遊んで……！」"

[[dialogue]]
speaker = "ルリエル"
# 「お、落ち着いてくださいソフィア。別に会長がいても最近はこんな感じですです」
line = "「お、落ち着いてくださいソフィア。別に会長がいても最近はこんな感じですです」"

[[dialogue]]
speaker = "ソフィア"
# 「そっか。それなら…………ってもっとダメです！　ニャリオンまで遊び呆けて……帰ってきたら会長に言いつけますよ！」
line = "「そっか。それなら…………ってもっとダメです！　ニャリオンまで遊び呆けて……帰ってきたら会長に言いつけますよ！」"

[[dialogue]]
speaker = "ニャリオン"
# 「ニャニャ！？　そ、そいつは困るニャン。ワガハイは昨日終わらせた管理票の作成を今日もやることになっているニャン」
line = "「ニャニャ！？　そ、そいつは困るニャン。ワガハイは昨日終わらせた管理票の作成を今日もやることになっているニャン」"

[[dialogue]]
speaker = "ユウリ"
# 「隠蔽する気マンマンじゃねーか」
line = "「隠蔽する気マンマンじゃねーか」"

[[dialogue]]
speaker = "ニャリオン"
# 「それにワガハイはフィオナ嬢に何かあったらすぐに駆けつけられるのニャン。なぜならワガハイは召喚獣だからなのニャン」
line = "「それにワガハイはフィオナ嬢に何かあったらすぐに駆けつけられるのニャン。なぜならワガハイは召喚獣だからなのニャン」"

[[dialogue]]
speaker = "セーラ"
# 「あ、ニャリオンちゃんも別荘購入。しかも月に建てるって」
line = "「あ、ニャリオンちゃんも別荘購入。しかも月に建てるって」"

[[dialogue]]
speaker = "ニャリオン"
# 「ニャんと！？　そんなとこに別荘なんか建ててどうするニャン、バカなのかニャン！？」
line = "「ニャんと！？　そんなとこに別荘なんか建ててどうするニャン、バカなのかニャン！？」"

[[dialogue]]
speaker = "ユウリ"
# 「プレイヤーそっくりだな」
line = "「プレイヤーそっくりだな」"

[[dialogue]]
speaker = "ソフィア"
# 「せ～～ん～～ぱ～～い～～が～～た～～……！！」
line = "「せ～～ん～～ぱ～～い～～が～～た～～……！！」"

[[dialogue]]
speaker = "セーラ"
# 「まーまーそう怒らずに。ソフィアちゃんの好きなニャトルのケーキも買ってあるから、一緒にたべよーよ！」
line = "「まーまーそう怒らずに。ソフィアちゃんの好きなニャトルのケーキも買ってあるから、一緒にたべよーよ！」"

[[dialogue]]
speaker = "ソフィア"
# 「え……ニャトルのケーキ？　そ、それなら、ちょっとだけ……」
line = "「え……ニャトルのケーキ？　そ、それなら、ちょっとだけ……」"

[[dialogue]]
speaker = "unk"
# セーラの誘惑によってソフィアが陥落しかけたその時──
line = "セーラの誘惑によってソフィアが陥落しかけたその時──"

[[dialogue]]
speaker = "unk"
# 部屋に取り付けられたモニターへ学園からの連絡が入る。
line = "部屋に取り付けられたモニターへ学園からの連絡が入る。"

[[dialogue]]
speaker = "セイファート"
# 『流星学園星徒会諸君。ごきげんよう』
line = "『流星学園星徒会諸君。ごきげんよう』"

[[dialogue]]
speaker = "ルリエル"
# 「！　連絡であります！」
line = "「！　連絡であります！」"

[[dialogue]]
speaker = "ユウリ"
# （しかもこの声……新星の学園長かよ！）
line = "（しかもこの声……新星の学園長かよ！）"

[[dialogue]]
speaker = "unk"
# セイファートからの連絡と知れるや、彼女たちはいそいそとゲームボードを片付け始めた。
line = "セイファートからの連絡と知れるや、彼女たちはいそいそとゲームボードを片付け始めた。"

[[dialogue]]
speaker = "セイファート"
# 『前回の“<ruby=ホシヨミ>星読</ruby>事変”以降、世界各地で特殊なモンスターの出現が確認されている。我が流星市国においてもそれは例外ではない』
line = "『前回の“<ruby>星読<rt>ホシヨミ</rt></ruby>事変”以降、世界各地で特殊なモンスターの出現が確認されている。我が流星市国においてもそれは例外ではない』"

[[dialogue]]
speaker = "ルリエル"
# （星読事変って何でしたっけ）
line = "（星読事変って何でしたっけ）"

[[dialogue]]
speaker = "セーラ"
# （新星の子たちが解決してくれたっていうアレ。なんかやばいちびっ子が暴れたらしいよ）
line = "（新星の子たちが解決してくれたっていうアレ。なんかやばいちびっ子が暴れたらしいよ）"

[[dialogue]]
speaker = "セイファート"
# 『これは至急ではないが、諸君に調査を頼みたい。新個体は強力ゆえ星徒会のみの少数精鋭が望ましいだろう。では、健闘を祈る』
line = "『これは至急ではないが、諸君に調査を頼みたい。新個体は強力ゆえ星徒会のみの少数精鋭が望ましいだろう。では、健闘を祈る』"

[[dialogue]]
speaker = "unk"
# セイファートは最後にそう司令を残して通信が切れる。
line = "セイファートは最後にそう司令を残して通信が切れる。"

[[dialogue]]
speaker = "unk"
# すると、緊張していた空気が再びたわんだ。
line = "すると、緊張していた空気が再びたわんだ。"

[[dialogue]]
speaker = "ユウリ"
# 「…………ふぅ、切れたか。無駄に緊張するぜ、あの声」
line = "「…………ふぅ、切れたか。無駄に緊張するぜ、あの声」"

[[dialogue]]
speaker = "ルリエル"
# 「新星の学園長さんでありますか～。わたしは入学式の時くらいしかお見かけしたことがありませんねえ……」
line = "「新星の学園長さんでありますか～。わたしは入学式の時くらいしかお見かけしたことがありませんねえ……」"

[[dialogue]]
speaker = "ソフィア"
# 「ふう……さ！　直々のご命令ですから行きますよ。危うく惑わされるところでした」
line = "「ふう……さ！　直々のご命令ですから行きますよ。危うく惑わされるところでした」"

[[dialogue]]
speaker = "セーラ"
# 「指令が来ちゃったならしょうがないか～」
line = "「指令が来ちゃったならしょうがないか～」"

[[dialogue]]
speaker = "ルリエル"
# 「ん？　それなら今回のゲームは引き分けってことですね、やったー！」
line = "「ん？　それなら今回のゲームは引き分けってことですね、やったー！」"

[[dialogue]]
speaker = "ユウリ"
# 「ま、とりあえずフィオナと合流しねえとな。あいつはどこに行ってんだったか？」
line = "「ま、とりあえずフィオナと合流しねえとな。あいつはどこに行ってんだったか？」"

[[dialogue]]
speaker = "ニャリオン"
# 「ニャ。フィーニスの塔の様子を見てくるって言ってたニャン」
line = "「ニャ。フィーニスの塔の様子を見てくるって言ってたニャン」"
