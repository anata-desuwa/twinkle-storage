[[dialogue]]
speaker = "unk"
# 第４話,絶対手に入れる,P
line = "第４話,絶対手に入れる,P"

[[dialogue]]
speaker = "unk"
# 煌嶺の前で模擬戦をしてから数日が経った。
line = "煌嶺の前で模擬戦をしてから数日が経った。"

[[dialogue]]
speaker = "unk"
# あれからも変わらず、リーエンは俺に模擬戦を挑んでくる。
line = "あれからも変わらず、リーエンは俺に模擬戦を挑んでくる。"

[[dialogue]]
speaker = "リーエン"
# 「往くぞ魔王！　あたしの渾身の一撃、受けてみろ！！」
line = "「往くぞ魔王！　あたしの渾身の一撃、受けてみろ！！」"

[[dialogue]]
speaker = "unk"
# させるかっ！　アビスインパクト！
line = "させるかっ！　アビスインパクト！"

[[dialogue]]
speaker = "リーエン"
# 「さすがだな、技の切れ味がますます研ぎ澄まされているじゃないか？」
line = "「さすがだな、技の切れ味がますます研ぎ澄まされているじゃないか？」"

[[dialogue]]
speaker = "リーエン"
# 「だがっ！　このあたしには届かない！」
line = "「だがっ！　このあたしには届かない！」"

[[dialogue]]
speaker = "unk"
# リーエンも強くなってる
line = "リーエンも強くなってる"

[[dialogue]]
speaker = "リーエン"
# 「当然だ！　こうして……おまえと日々刃を交えているのだからな！」
line = "「当然だ！　こうして……おまえと日々刃を交えているのだからな！」"

[[dialogue]]
speaker = "リーエン"
# 「強くなってもらわねば困る。あたしはもっともっと、強くなるんだ」
line = "「強くなってもらわねば困る。あたしはもっともっと、強くなるんだ」"

[[dialogue]]
speaker = "unk"
# 強くなるのは……煌嶺のため？
line = "強くなるのは……煌嶺のため？"

[[dialogue]]
speaker = "リーエン"
# 「当然だ！　戦いの最中に下らん質問をするな！」
line = "「当然だ！　戦いの最中に下らん質問をするな！」"

[[dialogue]]
speaker = "リーエン"
# 「だが……あたしの武は陛下のためであり……同時にあたし自身のためでもある」
line = "「だが……あたしの武は陛下のためであり……同時にあたし自身のためでもある」"

[[dialogue]]
speaker = "リーエン"
# 「あたしが、より強くありたいと求めた。それが陛下の道と重なっていても、上書きされたりはしない」
line = "「あたしが、より強くありたいと求めた。それが陛下の道と重なっていても、上書きされたりはしない」"

[[dialogue]]
speaker = "リーエン"
# 「どこを見ている！　気を抜くな！」
line = "「どこを見ている！　気を抜くな！」"

[[dialogue]]
speaker = "リーエン"
# 「おしゃべりに興じて情けない姿を見せないでくれ！」
line = "「おしゃべりに興じて情けない姿を見せないでくれ！」"

[[dialogue]]
speaker = "リーエン"
# 「おまえは……おまえはあたしのっ……あたしの<ruby=ライバル>好敵手</ruby>なんだからっ！　気を抜くんじゃないっ！！」
line = "「おまえは……おまえはあたしのっ……あたしの<ruby>好敵手<rt>ライバル</rt></ruby>なんだからっ！　気を抜くんじゃないっ！！」"

[[dialogue]]
speaker = "リーエン"
# 「陛下の言葉を聞いて、あたしは考えた！　あたしは何を欲しているのか！」
line = "「陛下の言葉を聞いて、あたしは考えた！　あたしは何を欲しているのか！」"

[[dialogue]]
speaker = "リーエン"
# 「拳を交える相手……互いに武を極めていく強者を！」
line = "「拳を交える相手……互いに武を極めていく強者を！」"

[[dialogue]]
speaker = "リーエン"
# 「それがおまえだ！　魔王っ！！！」
line = "「それがおまえだ！　魔王っ！！！」"

[[dialogue]]
speaker = "リーエン"
# 「今日は散々な結果だったな」
line = "「今日は散々な結果だったな」"

[[dialogue]]
speaker = "リーエン"
# 「戦いの最中に気を抜きすぎだぞ。まったく情けない」
line = "「戦いの最中に気を抜きすぎだぞ。まったく情けない」"

[[dialogue]]
speaker = "リーエン"
# 「ほら、こっちに来い。簡単な治療なら、あたしがしてやる」
line = "「ほら、こっちに来い。簡単な治療なら、あたしがしてやる」"

[[dialogue]]
speaker = "リーエン"
# 「情けない声を出すな。武人なら、グッと堪えろ」
line = "「情けない声を出すな。武人なら、グッと堪えろ」"

[[dialogue]]
speaker = "リーエン"
# 「…………武人じゃない、とでも言いたげな顔をしているな」
line = "「…………武人じゃない、とでも言いたげな顔をしているな」"

[[dialogue]]
speaker = "リーエン"
# 「いいか、おまえは武人だ。あたしがそう決めた。だから拒否は許さん」
line = "「いいか、おまえは武人だ。あたしがそう決めた。だから拒否は許さん」"

[[dialogue]]
speaker = "unk"
# そんな無茶苦茶な
line = "そんな無茶苦茶な"

[[dialogue]]
speaker = "リーエン"
# 「うるさい。あたしは陛下のように、自分の欲望に忠実になると決めたんだ」
line = "「うるさい。あたしは陛下のように、自分の欲望に忠実になると決めたんだ」"

[[dialogue]]
speaker = "リーエン"
# 「陛下の剣が情けなく迷う姿を見せるなんて、恥ずかしいからな」
line = "「陛下の剣が情けなく迷う姿を見せるなんて、恥ずかしいからな」"

[[dialogue]]
speaker = "リーエン"
# 「とにかく、あたしは決めた。自分が思うままに生きる」
line = "「とにかく、あたしは決めた。自分が思うままに生きる」"

[[dialogue]]
speaker = "リーエン"
# 「そこにある、おまえが模擬戦の後に食べようとしていた肉たっぷりサンドも……あたしのものだ」
line = "「そこにある、おまえが模擬戦の後に食べようとしていた肉たっぷりサンドも……あたしのものだ」"

[[dialogue]]
speaker = "リーエン"
# 「あたしが欲しいから、絶対に手に入れる」
line = "「あたしが欲しいから、絶対に手に入れる」"

[[dialogue]]
speaker = "リーエン"
# 「それと……おまえのことも……」
line = "「それと……おまえのことも……」"

[[dialogue]]
speaker = "リーエン"
# 「陛下に指摘されるまで、あたしは気付かなかったんだ」
line = "「陛下に指摘されるまで、あたしは気付かなかったんだ」"

[[dialogue]]
speaker = "リーエン"
# 「こうしておまえと剣を交え、武を磨き合う日々を……楽しい、と感じていたんだな」
line = "「こうしておまえと剣を交え、武を磨き合う日々を……楽しい、と感じていたんだな」"

[[dialogue]]
speaker = "unk"
# 俺も楽しかった
line = "俺も楽しかった"

[[dialogue]]
speaker = "リーエン"
# 「だろう？　楽しくなければ、あたしに付き合わなかったはずだ」
line = "「だろう？　楽しくなければ、あたしに付き合わなかったはずだ」"

[[dialogue]]
speaker = "リーエン"
# 「あたしは陛下の剣だ。陛下の命で動き、敵を打ち倒す。それがあたしだ」
line = "「あたしは陛下の剣だ。陛下の命で動き、敵を打ち倒す。それがあたしだ」"

[[dialogue]]
speaker = "リーエン"
# 「だが……おまえと戦う日々は、楽しかったんだ」
line = "「だが……おまえと戦う日々は、楽しかったんだ」"

[[dialogue]]
speaker = "リーエン"
# 「陛下のご命令があっても……失いたくないと思うくらいにな……」
line = "「陛下のご命令があっても……失いたくないと思うくらいにな……」"

[[dialogue]]
speaker = "リーエン"
# 「それに気付いたら、陛下のお言葉が意味することがわかった」
line = "「それに気付いたら、陛下のお言葉が意味することがわかった」"

[[dialogue]]
speaker = "リーエン"
# 「かつてのあたしなら、陛下のご命令あらば、おまえとの日々をあっさり捨て去っていたはずだ」
line = "「かつてのあたしなら、陛下のご命令あらば、おまえとの日々をあっさり捨て去っていたはずだ」"

[[dialogue]]
speaker = "リーエン"
# 「しかし！　それはあたしが欲したものを諦めること！　そんなの陛下の剣に相応しくない振る舞いだ！」
line = "「しかし！　それはあたしが欲したものを諦めること！　そんなの陛下の剣に相応しくない振る舞いだ！」"

[[dialogue]]
speaker = "リーエン"
# 「だから、あたしは諦めない。陛下のことも、おまえのことも……あたしが求めるものは全部！」
line = "「だから、あたしは諦めない。陛下のことも、おまえのことも……あたしが求めるものは全部！」"

[[dialogue]]
speaker = "リーエン"
# 「あたしはおまえが欲しい」
line = "「あたしはおまえが欲しい」"

[[dialogue]]
speaker = "リーエン"
# 「魔王、あたしはおまえを手に入れる。おまえはあたしのものだ」
line = "「魔王、あたしはおまえを手に入れる。おまえはあたしのものだ」"

[[dialogue]]
speaker = "リーエン"
# 「絶対に……あたしのものにしてみせる！！」
line = "「絶対に……あたしのものにしてみせる！！」"

[[dialogue]]
speaker = "リーエン"
# 「あたしのものになれ、魔王。いいな、これは命令だ」
line = "「あたしのものになれ、魔王。いいな、これは命令だ」"

[[dialogue]]
speaker = "リーエン"
# 「――――ちゅ<emoji=heart04>」
line = "「――――ちゅ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ……キス？
line = "……キス？"

[[dialogue]]
speaker = "リーエン"
# 「うるさい！　黙れ！　これはつまり……おまえがあたしのものになった証だ！」
line = "「うるさい！　黙れ！　これはつまり……おまえがあたしのものになった証だ！」"

[[dialogue]]
speaker = "リーエン"
# 「マーキングしてやったからな！　いいな！」
line = "「マーキングしてやったからな！　いいな！」"

[[dialogue]]
speaker = "リーエン"
# 「……なんだ、その不満そうな顔は？　マーキングが足りないか？」
line = "「……なんだ、その不満そうな顔は？　マーキングが足りないか？」"

[[dialogue]]
speaker = "リーエン"
# 「むちゅ<emoji=heart04>　ちゅっ<emoji=heart04>　ちゅっ<emoji=heart04>」
line = "「むちゅ<emoji=heart04>　ちゅっ<emoji=heart04>　ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "リーエン"
# 「ちゅうう～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」
line = "「ちゅうう～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "リーエン"
# 「どうだ、わかったか！　これでおまえはあたしのものだからな！」
line = "「どうだ、わかったか！　これでおまえはあたしのものだからな！」"

[[dialogue]]
speaker = "リーエン"
# 「わかったならよし。じゃあこっちに来い」
line = "「わかったならよし。じゃあこっちに来い」"

[[dialogue]]
speaker = "リーエン"
# 「あたしがおまえを抱き締めてやるっ……！！」
line = "「あたしがおまえを抱き締めてやるっ……！！」"

[[dialogue]]
speaker = "unk"
# こうして俺は、キスとハグの集中砲火により、完全にリーエンのものになった。
line = "こうして俺は、キスとハグの集中砲火により、完全にリーエンのものになった。"
