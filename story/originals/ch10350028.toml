line = "「噂には聞いたことがありますけども、実物は初めて見ましたわ……アナルに使用するということは、このツブツブを、お尻の穴に入れるんですわよね……？」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「感触が想像できませんわね……ハッ、そうですわ！　会長様のアナルに入れるというのもワンチャン──」
line = "「感触が想像できませんわね……ハッ、そうですわ！　会長様のアナルに入れるというのもワンチャン──」"

[[dialogue]]
speaker = "クロト"
# 「なし。セナリィに入れるよ」
line = "「なし。セナリィに入れるよ」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
