[[dialogue]]
speaker = "unk"
# とある週末の出来事。
line = "とある週末の出来事。"

[[dialogue]]
speaker = "unk"
# 今日は朝からセナリィと２人きり。映画を観たり、買い物に行ったりと、実に学生らしい健全なデートをして過ごした。
line = "今日は朝からセナリィと２人きり。映画を観たり、買い物に行ったりと、実に学生らしい健全なデートをして過ごした。"

[[dialogue]]
speaker = "unk"
# 楽しい時間が過ぎるのは、あっという間。気がつけば、日は沈み、隣にいるセナリィの顔もよく見えない夜更け。
line = "楽しい時間が過ぎるのは、あっという間。気がつけば、日は沈み、隣にいるセナリィの顔もよく見えない夜更け。"

[[dialogue]]
speaker = "セナリィ"
# 「今日もすごく楽しいデートでしたわ。会長様、エスコートありがとうございます」
line = "「今日もすごく楽しいデートでしたわ。会長様、エスコートありがとうございます」"

[[dialogue]]
speaker = "unk"
# 顔は見えなくとも、ずっと繋いでいる手の温かみで、彼女が傍にいることを強く感じた。
line = "顔は見えなくとも、ずっと繋いでいる手の温かみで、彼女が傍にいることを強く感じた。"

[[dialogue]]
speaker = "unk"
# もうすぐお別れの分岐点が迫っているけれど、彼女との別れはいつだって名残惜しい。
line = "もうすぐお別れの分岐点が迫っているけれど、彼女との別れはいつだって名残惜しい。"

[[dialogue]]
speaker = "セナリィ"
# 「まだあなたと離れたくありませんの……」
line = "「まだあなたと離れたくありませんの……」"

[[dialogue]]
speaker = "unk"
# 考えていることはセナリィも同じだ。繋がっている手には跡が残りそうな程にギュッと力がこもった。
line = "考えていることはセナリィも同じだ。繋がっている手には跡が残りそうな程にギュッと力がこもった。"

[[dialogue]]
speaker = "セナリィ"
# 「ちょうど明日はお休みですし、仕事もありませんし……よろしければ、私の家に泊まっていきません？」
line = "「ちょうど明日はお休みですし、仕事もありませんし……よろしければ、私の家に泊まっていきません？」"

[[dialogue]]
speaker = "クロト"
# 「……いいの？」
line = "「……いいの？」"

[[dialogue]]
speaker = "セナリィ"
# 「ダメだったら、こんなこと言いませんわ。それに会長様にお見せしたいものもありますから」
line = "「ダメだったら、こんなこと言いませんわ。それに会長様にお見せしたいものもありますから」"

[[dialogue]]
speaker = "unk"
# 俺とセナリィが恋人関係である以上、それはすなわちお泊りエッチの誘惑でもあるわけで……。
line = "俺とセナリィが恋人関係である以上、それはすなわちお泊りエッチの誘惑でもあるわけで……。"

[[dialogue]]
speaker = "unk"
# セナリィの住む事務所へと向かうその道中、俺たちが漏らす吐息は少し熱くて、荒かった。
line = "セナリィの住む事務所へと向かうその道中、俺たちが漏らす吐息は少し熱くて、荒かった。"

[[dialogue]]
speaker = "セナリィ"
# 「会長様、もう少しお待ちくださいませ……ん、しょっ……１人で着るのは、ちょっと難儀しますわね」
line = "「会長様、もう少しお待ちくださいませ……ん、しょっ……１人で着るのは、ちょっと難儀しますわね」"

[[dialogue]]
speaker = "セナリィ"
# 「うん、よし、これで完璧ですわね。お待たせしました、会長様！」
line = "「うん、よし、これで完璧ですわね。お待たせしました、会長様！」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「じゃーーーんっ！」
line = "「じゃーーーんっ！」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「ふふ、どうでしょう？　バンデット・セナリィ、<ruby=エンプレス>女帝</ruby>フォームですわ！」
line = "「ふふ、どうでしょう？　バンデット・セナリィ、<ruby>女帝<rt>エンプレス</rt></ruby>フォームですわ！」"

[[dialogue]]
speaker = "クロト"
# 「おお……見せたかったのって、この服？」
line = "「おお……見せたかったのって、この服？」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「ええ、今や我がゴールデングースの象徴とも呼べる私の新コスチュームですわ！」
line = "「ええ、今や我がゴールデングースの象徴とも呼べる私の新コスチュームですわ！」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「ちなみに、これは本物の<ruby=エンプレス>女帝</ruby>フォームではありません。レプリカですわ。アレを着用していたら星力が一瞬でなくなってしまいますからね」
line = "「ちなみに、これは本物の<ruby>女帝<rt>エンプレス</rt></ruby>フォームではありません。レプリカですわ。アレを着用していたら星力が一瞬でなくなってしまいますからね」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「今晩は趣向を変えて……この姿で、あなたに愛していただきたいですわ」
line = "「今晩は趣向を変えて……この姿で、あなたに愛していただきたいですわ」"

[[dialogue]]
speaker = "クロト"
# 「今日は俺も試したい物があるんだ。さっきのデート中に買ったんだけど……」
line = "「今日は俺も試したい物があるんだ。さっきのデート中に買ったんだけど……」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「試したい物……？　そういえば、こっそりと何か買われてたみたいですけど何でしょう？　まさか、この前みたいに媚薬入りのローションとか──」
line = "「試したい物……？　そういえば、こっそりと何か買われてたみたいですけど何でしょう？　まさか、この前みたいに媚薬入りのローションとか──」"

[[dialogue]]
speaker = "クロト"
# 「はい、アナルビーズ」
