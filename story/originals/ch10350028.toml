line = "「うぅ、ですわよねぇ……！　会長様、本気ですの？」"

[[dialogue]]
speaker = "クロト"
# 「俺はいつだって本気だよ。アナルを弄られるのは初めてじゃないでしょ」
line = "「俺はいつだって本気だよ。アナルを弄られるのは初めてじゃないでしょ」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
