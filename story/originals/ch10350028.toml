[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「もっとヒドいものでしたわぁーっ！？」
line = "「もっとヒドいものでしたわぁーっ！？」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
