line = "「おち○ちんとも全然違う感触ですわ……んぉっ！？　か、会長様っ、お尻、かき回しちゃ、おっ、ぐりぐり、しないれ、んほぉんっ！？」"

[[dialogue]]
speaker = "セナリィ"
