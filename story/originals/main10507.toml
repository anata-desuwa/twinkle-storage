[[dialogue]]
speaker = "unk"
# 第７話,潜入作戦再びだぴょん！,B
line = "第７話,潜入作戦再びだぴょん！,B"

[[dialogue]]
speaker = "unk"
# そんな風に忙しくプレゼントを配って回り。
line = "そんな風に忙しくプレゼントを配って回り。"

[[dialogue]]
speaker = "unk"
# お屋敷の人たち全員にプレゼントを配り終わる頃には、２４日、クリスマスイブになっていた。
line = "お屋敷の人たち全員にプレゼントを配り終わる頃には、２４日、クリスマスイブになっていた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「どう？　クリスマスフォームが起動する感じはあるかしら？」
line = "「どう？　クリスマスフォームが起動する感じはあるかしら？」"

[[dialogue]]
speaker = "蘭美"
# 「まだだわ。兆しは感じるものの、何かが足りていないみたい」
line = "「まだだわ。兆しは感じるものの、何かが足りていないみたい」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうね……ふふふ、ここまでは想定通りよ」
line = "「そうね……ふふふ、ここまでは想定通りよ」"

[[dialogue]]
speaker = "蘭美"
# 「な……全てはお嬢様の計画通りだったということなの！？」
line = "「な……全てはお嬢様の計画通りだったということなの！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「蘭美、あなたはまだフォーム解放の最後の鍵を開いていないわ」
line = "「蘭美、あなたはまだフォーム解放の最後の鍵を開いていないわ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そして……その鍵は、あそこにある！」
line = "「そして……その鍵は、あそこにある！」"

[[dialogue]]
speaker = "蘭美"
# 「っ……！　当主様……そういうことね？」
line = "「っ……！　当主様……そういうことね？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええ、そうよ。ヘレナちゃんにプレゼントを渡して、それでこの作戦はやっと完成する……そういうこと！」
line = "「ええ、そうよ。ヘレナちゃんにプレゼントを渡して、それでこの作戦はやっと完成する……そういうこと！」"

[[dialogue]]
speaker = "蘭美"
# 「お嬢様、やってやるわ！　当主様の部屋の灯りが消えたら最後のミッションを開始しましょう！」
line = "「お嬢様、やってやるわ！　当主様の部屋の灯りが消えたら最後のミッションを開始しましょう！」"

[[dialogue]]
speaker = "unk"
# そして夜が訪れた。
line = "そして夜が訪れた。"

[[dialogue]]
speaker = "unk"
# 戦闘服に身を包んだ蘭美は、中庭でヴィーナスと合流する。
line = "戦闘服に身を包んだ蘭美は、中庭でヴィーナスと合流する。"

[[dialogue]]
speaker = "unk"
# 息をひそめて待っていると、やがてヘレナの部屋の灯りが消える。
line = "息をひそめて待っていると、やがてヘレナの部屋の灯りが消える。"

[[dialogue]]
speaker = "蘭美"
# 「どうやらお休みになられたようね……」
line = "「どうやらお休みになられたようね……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そろそろいいんじゃない？」
line = "「そろそろいいんじゃない？」"

[[dialogue]]
speaker = "蘭美"
# 「深夜ともなれば屋敷の警備システムが作動しているわ。出来るだけ物音を立てないように、私の後についてきて」
line = "「深夜ともなれば屋敷の警備システムが作動しているわ。出来るだけ物音を立てないように、私の後についてきて」"

[[dialogue]]
speaker = "ヴィーナス"
# 「どこを進めばいいか分かってるの？」
line = "「どこを進めばいいか分かってるの？」"

[[dialogue]]
speaker = "蘭美"
# 「私は九浄家のメイド長。もちろん屋敷の警備体制についても完璧に把握しているわ」
line = "「私は九浄家のメイド長。もちろん屋敷の警備体制についても完璧に把握しているわ」"

[[dialogue]]
speaker = "蘭美"
# 「今はＣランクの警備体制が敷かれているはずだから……こっちね」
line = "「今はＣランクの警備体制が敷かれているはずだから……こっちね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「うんうん、まさに潜入ミッションって感じね！」
line = "「うんうん、まさに潜入ミッションって感じね！」"

[[dialogue]]
speaker = "蘭美"
# 「……問題ないわ。これならヘレナ様の寝室までたどり着けそう──」
line = "「……問題ないわ。これならヘレナ様の寝室までたどり着けそう──」"

[[dialogue]]
speaker = "蘭美"
# 「警報っ！？　探知に掛かった！？」
line = "「警報っ！？　探知に掛かった！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「見つかっちゃったの！　どうして！？」
line = "「見つかっちゃったの！　どうして！？」"

[[dialogue]]
speaker = "蘭美"
# 「屋敷の警備体制がいつの間にかＳランクに引き上げられてる！」
line = "「屋敷の警備体制がいつの間にかＳランクに引き上げられてる！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「Ｓランク！？　最上級の警戒態勢ってこと？」
line = "「Ｓランク！？　最上級の警戒態勢ってこと？」"

[[dialogue]]
speaker = "蘭美"
# 「そうよ。どうやらヘレナ様は、私たちの目論見を看破していたようね」
line = "「そうよ。どうやらヘレナ様は、私たちの目論見を看破していたようね」"

[[dialogue]]
speaker = "ヘレナ"
# 『小癪な鼠が２人よ。立てばプリティ、座ればゴージャス、我こそは九浄家二十六代目当主・九浄ヘレナちゃんである！』
line = "『小癪な鼠が２人よ。立てばプリティ、座ればゴージャス、我こそは九浄家二十六代目当主・九浄ヘレナちゃんである！』"

[[dialogue]]
speaker = "ヘレナ"
# 『我が九浄家の屋敷に忍び込もうとは見上げた度胸だ』
line = "『我が九浄家の屋敷に忍び込もうとは見上げた度胸だ』"

[[dialogue]]
speaker = "ヘレナ"
# 『その勇気に敬意を表して、全力の防衛体制で迎えることにしよう』
line = "『その勇気に敬意を表して、全力の防衛体制で迎えることにしよう』"

[[dialogue]]
speaker = "ヘレナ"
# 『貴殿らの目的は私だろう？　見事、警備網を突破して我が元までたどり着いてみせよ！　待っているぞ、ふっふっふ！』
line = "『貴殿らの目的は私だろう？　見事、警備網を突破して我が元までたどり着いてみせよ！　待っているぞ、ふっふっふ！』"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふぅん……私たちはプレゼントを届けに来ただけなんだけど──面白いじゃない！」
line = "「ふぅん……私たちはプレゼントを届けに来ただけなんだけど──面白いじゃない！」"

[[dialogue]]
speaker = "蘭美"
# 「ということは勿論？」
line = "「ということは勿論？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「強行突破に決まってるでしょ！」
line = "「強行突破に決まってるでしょ！」"

[[dialogue]]
speaker = "蘭美"
# 「いいわね、そうこなくっちゃ！」
line = "「いいわね、そうこなくっちゃ！」"

[[dialogue]]
speaker = "ガーディアン"
# 『侵入者ヲ、発見シマシタ──排除シマス──』
line = "『侵入者ヲ、発見シマシタ──排除シマス──』"

[[dialogue]]
speaker = "ヴィーナス"
# 「きゃっ！？　何……！？」
line = "「きゃっ！？　何……！？」"

[[dialogue]]
speaker = "蘭美"
# 「ガーディアンよ、気を付けて！」
line = "「ガーディアンよ、気を付けて！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「これってフィーニスの塔にいた、あのガーディアン！？」
line = "「これってフィーニスの塔にいた、あのガーディアン！？」"

[[dialogue]]
speaker = "蘭美"
# 「そのデータを収集して造ったものらしいわ。コピーだけど性能はオリジナルに負けないほど高いわよ！」
line = "「そのデータを収集して造ったものらしいわ。コピーだけど性能はオリジナルに負けないほど高いわよ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「関係ないわね！　私はそのオリジナルとだって戦ってるんだから！」
line = "「関係ないわね！　私はそのオリジナルとだって戦ってるんだから！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ディバインスフィアっ！！！！」
line = "「ディバインスフィアっ！！！！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ま、こんなものね！」
line = "「ま、こんなものね！」"

[[dialogue]]
speaker = "蘭美"
# 「さすがお嬢様だわ！」
line = "「さすがお嬢様だわ！」"

[[dialogue]]
speaker = "ガーディアン"
# 『侵入者、排除シマス──排除シマス──排除シマス──』
line = "『侵入者、排除シマス──排除シマス──排除シマス──』"

[[dialogue]]
speaker = "ヴィーナス"
# 「ぞろぞろと出てきたわね！　いいわ、いくらでもかかって来なさい！」
line = "「ぞろぞろと出てきたわね！　いいわ、いくらでもかかって来なさい！」"

[[dialogue]]
speaker = "ガーディアン"
# 『排除──排除──排除──排除──……』
line = "『排除──排除──排除──排除──……』"

[[dialogue]]
speaker = "ヴィーナス"
# 「後ろからも！？　なるほど、物量で押してくる作戦ってわけね！」
line = "「後ろからも！？　なるほど、物量で押してくる作戦ってわけね！」"

[[dialogue]]
speaker = "蘭美"
# 「お嬢様、後ろの敵は私に任せて！　いつもの戦闘服に変身して──」
line = "「お嬢様、後ろの敵は私に任せて！　いつもの戦闘服に変身して──」"

[[dialogue]]
speaker = "ヴィーナス"
# 「待って、変身しちゃだめよ！　あなたはそのフォームのままでいなさい！」
line = "「待って、変身しちゃだめよ！　あなたはそのフォームのままでいなさい！」"

[[dialogue]]
speaker = "蘭美"
# 「っ！！　だけどこれだけの数、いくらお嬢様でも！」
line = "「っ！！　だけどこれだけの数、いくらお嬢様でも！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「なんてこと無いわ！　ディバインスフィアっ！！！！」
line = "「なんてこと無いわ！　ディバインスフィアっ！！！！」"

[[dialogue]]
speaker = "ガーディアン"
# 『排除シマス──排除シマス──排除シマス──』
line = "『排除シマス──排除シマス──排除シマス──』"

[[dialogue]]
speaker = "ヴィーナス"
# 「次はそっちね！！！！」
line = "「次はそっちね！！！！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「さあ、どんどん来なさい！」
line = "「さあ、どんどん来なさい！」"

[[dialogue]]
speaker = "蘭美"
# （お嬢様ノリノリね……でも、さすがに数が多すぎる）
line = "（お嬢様ノリノリね……でも、さすがに数が多すぎる）"

[[dialogue]]
speaker = "蘭美"
# （やっぱり私も戦った方が……でも、それだとこの戦い自体に意味が無くなってしまうわ）
line = "（やっぱり私も戦った方が……でも、それだとこの戦い自体に意味が無くなってしまうわ）"

[[dialogue]]
speaker = "蘭美"
# （く……指を咥えて見ている事しかできないっていうの？　この私が……？）
line = "（く……指を咥えて見ている事しかできないっていうの？　この私が……？）"

[[dialogue]]
speaker = "蘭美"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "蘭美"
# 「……ふっ、そんなの違うでしょ」
line = "「……ふっ、そんなの違うでしょ」"

[[dialogue]]
speaker = "蘭美"
# 「戦うのよ、羽宮蘭美！　簡単なことじゃない、今すぐ覚醒させればいいだけの話っ！」
line = "「戦うのよ、羽宮蘭美！　簡単なことじゃない、今すぐ覚醒させればいいだけの話っ！」"

[[dialogue]]
speaker = "蘭美"
# 「さあ！　今こそ目覚めなさい、私のクリスマスフォームっ！！！！」
line = "「さあ！　今こそ目覚めなさい、私のクリスマスフォームっ！！！！」"
