[[dialogue]]
speaker = "unk"
# 第３話,蒐集の魔女,P
line = "第３話,蒐集の魔女,P"

[[dialogue]]
speaker = "unk"
# ある日の放課後。俺はたまたま見かけてしまったのだが――
line = "ある日の放課後。俺はたまたま見かけてしまったのだが――"

[[dialogue]]
speaker = "トレジアンナ"
# 「おっ、あったあった……むふふふっ♪」
line = "「おっ、あったあった……むふふふっ♪」"

[[dialogue]]
speaker = "unk"
# トレジアンナさん、何してるんですか……？
line = "トレジアンナさん、何してるんですか……？"

[[dialogue]]
speaker = "トレジアンナ"
# 「はっ！？　会長さん、いつの間に！？　あ～、これはですね～」
line = "「はっ！？　会長さん、いつの間に！？　あ～、これはですね～」"

[[dialogue]]
speaker = "unk"
# 彼女が手に持っているのは、俺が先程、星徒会室を離れる際にゴミ箱に捨てた１枚の『付箋』だった。
line = "彼女が手に持っているのは、俺が先程、星徒会室を離れる際にゴミ箱に捨てた１枚の『付箋』だった。"

[[dialogue]]
speaker = "unk"
# 流星学園の星徒会に書類を届けるという用事を忘れないようにメモをして机に貼っていたもので、いざ届ける段階になったので捨てたのだが……
line = "流星学園の星徒会に書類を届けるという用事を忘れないようにメモをして机に貼っていたもので、いざ届ける段階になったので捨てたのだが……"

[[dialogue]]
speaker = "unk"
# トレジアンナさんはゴミ箱からそれを拾って、魔法で取り出したジッパー袋の中に入れようとしているところだった。
line = "トレジアンナさんはゴミ箱からそれを拾って、魔法で取り出したジッパー袋の中に入れようとしているところだった。"

[[dialogue]]
speaker = "トレジアンナ"
# 「――なんでそんなものを回収しようとしているのか、ですか？　フッ……バレてしまったなら仕方ありませんね！」
line = "「――なんでそんなものを回収しようとしているのか、ですか？　フッ……バレてしまったなら仕方ありませんね！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「実は最近、会長さんの物を<ruby=コレクション>蒐集</ruby>しているんですよ☆」
line = "「実は最近、会長さんの物を<ruby>蒐集<rt>コレクション</rt></ruby>しているんですよ☆」"

[[dialogue]]
speaker = "トレジアンナ"
# 「ほら私、復活してから会長さんと関わる機会が増えたじゃないですか～」
line = "「ほら私、復活してから会長さんと関わる機会が増えたじゃないですか～」"

[[dialogue]]
speaker = "トレジアンナ"
# 「その結果、前よりも会長さんのことが気になるようになってしまいまして～」
line = "「その結果、前よりも会長さんのことが気になるようになってしまいまして～」"

[[dialogue]]
speaker = "unk"
# き、気になるって……
line = "き、気になるって……"

[[dialogue]]
speaker = "トレジアンナ"
# 「はい♪　もちろん男のヒトとしてですよ☆」
line = "「はい♪　もちろん男のヒトとしてですよ☆」"

[[dialogue]]
speaker = "トレジアンナ"
# 「あっ、ちなみに、男のヒトのものが気になって集めるのは、実は生まれて初めてなんですよ～。えへへ♪」
line = "「あっ、ちなみに、男のヒトのものが気になって集めるのは、実は生まれて初めてなんですよ～。えへへ♪」"

[[dialogue]]
speaker = "unk"
# そんなことを可愛い笑顔で言われて、俺は思わずドキッとしてしまう。
line = "そんなことを可愛い笑顔で言われて、俺は思わずドキッとしてしまう。"

[[dialogue]]
speaker = "トレジアンナ"
# 「それで、気になるヒトの物を集めたくなるのは、生物として普通のことですよね？」
line = "「それで、気になるヒトの物を集めたくなるのは、生物として普通のことですよね？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「つまりこれは……そう！　最近の人間界で言う『推し活』というやつなんです！」
line = "「つまりこれは……そう！　最近の人間界で言う『推し活』というやつなんです！」"

[[dialogue]]
speaker = "unk"
# ちょっと違くない！？
line = "ちょっと違くない！？"

[[dialogue]]
speaker = "トレジアンナ"
# 「くっ！　やはり押し切れませんでしたか……。しかしコレクションするのは、私のライフワークみたいなものでして～」
line = "「くっ！　やはり押し切れませんでしたか……。しかしコレクションするのは、私のライフワークみたいなものでして～」"

[[dialogue]]
speaker = "トレジアンナ"
# 「ここは１つ、どうにか見逃して貰えませんかね～？　てへぺろ☆」
line = "「ここは１つ、どうにか見逃して貰えませんかね～？　てへぺろ☆」"

[[dialogue]]
speaker = "unk"
# 復活してから知ったが、トレジアンナさんには『蒐集癖』がある。
line = "復活してから知ったが、トレジアンナさんには『蒐集癖』がある。"

[[dialogue]]
speaker = "unk"
# 聞いた話では、かつて『蒐集の魔女』という二つ名で呼ばれていたこともあり、『空間魔法』をさらっと使いこなして、様々な物を異空間にコレクションしているらしい。
line = "聞いた話では、かつて『蒐集の魔女』という二つ名で呼ばれていたこともあり、『空間魔法』をさらっと使いこなして、様々な物を異空間にコレクションしているらしい。"

[[dialogue]]
speaker = "トレジアンナ"
# 「――ちなみに今までどんなものを、ですか？　そうですね～、例えば……」
line = "「――ちなみに今までどんなものを、ですか？　そうですね～、例えば……」"

[[dialogue]]
speaker = "トレジアンナ"
# 「隠し撮りした写真とか～、買い物した際の要らないレシートとか～、あとは……追跡魔法で観測した、会長さんがその日、何歩移動したかの記録とか☆」
line = "「隠し撮りした写真とか～、買い物した際の要らないレシートとか～、あとは……追跡魔法で観測した、会長さんがその日、何歩移動したかの記録とか☆」"

[[dialogue]]
speaker = "unk"
# それもうストーカーでは！？
line = "それもうストーカーでは！？"

[[dialogue]]
speaker = "トレジアンナ"
# 「あはは、会長さん、大丈夫ですよ～。私、ちゃんと一線はわきまえてますから～」
line = "「あはは、会長さん、大丈夫ですよ～。私、ちゃんと一線はわきまえてますから～」"

[[dialogue]]
speaker = "トレジアンナ"
# 「本当は愛用のペンとか、普段使っている制服も蒐集したいんですけど～、盗みは決してしない主義なので！　それに、ほら――」
line = "「本当は愛用のペンとか、普段使っている制服も蒐集したいんですけど～、盗みは決してしない主義なので！　それに、ほら――」"

[[dialogue]]
speaker = "トレジアンナ"
# 「バレないよう密かに相手の物をコレクションするのって、むしろ燃えるじゃないですか～♪　むふふ☆」
line = "「バレないよう密かに相手の物をコレクションするのって、むしろ燃えるじゃないですか～♪　むふふ☆」"

[[dialogue]]
speaker = "unk"
# いや、バレてるんだが！？
line = "いや、バレてるんだが！？"

[[dialogue]]
speaker = "トレジアンナ"
# 「くっ……！　そこは自分の不手際を深く反省しています……」
line = "「くっ……！　そこは自分の不手際を深く反省しています……」"

[[dialogue]]
speaker = "トレジアンナ"
# 「しかし、バレてしまった以上、これまで蒐集したものは全て、潔く処分しようと思います。会長さんにご迷惑をかけるつもりはなかったので……」
line = "「しかし、バレてしまった以上、これまで蒐集したものは全て、潔く処分しようと思います。会長さんにご迷惑をかけるつもりはなかったので……」"

[[dialogue]]
speaker = "unk"
# いや、わざわざ処分までしなくても……
line = "いや、わざわざ処分までしなくても……"

[[dialogue]]
speaker = "unk"
# コソコソやられてたら怖いが、こっそりやらないのであれば、処分まではしなくていいと伝える。
line = "コソコソやられてたら怖いが、こっそりやらないのであれば、処分まではしなくていいと伝える。"

[[dialogue]]
speaker = "unk"
# すると彼女は、ぱぁっと嬉しそうに笑顔の花を咲かせて──
line = "すると彼女は、ぱぁっと嬉しそうに笑顔の花を咲かせて──"

[[dialogue]]
speaker = "トレジアンナ"
# 「本当ですか！？」
line = "「本当ですか！？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「じゃあ、これからはお願いしたら、会長さんの――」
line = "「じゃあ、これからはお願いしたら、会長さんの――」"

[[dialogue]]
speaker = "トレジアンナ"
# 「<b>使用済みの物</b>も貰えたりしますか！？」
line = "「<b>使用済みの物</b>も貰えたりしますか！？」"

[[dialogue]]
speaker = "unk"
# 言い方！！
line = "言い方！！"

[[dialogue]]
speaker = "トレジアンナ"
# 「え？　それはダメ？」
line = "「え？　それはダメ？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「ですよね～。シュン……」
line = "「ですよね～。シュン……」"

[[dialogue]]
speaker = "unk"
# 露骨にガッカリした顔になるトレジアンナさん。
line = "露骨にガッカリした顔になるトレジアンナさん。"

[[dialogue]]
speaker = "unk"
# へ、変な物じゃなければ、多少は……
line = "へ、変な物じゃなければ、多少は……"

[[dialogue]]
speaker = "トレジアンナ"
# 「！　いいんですか！？　ありがとうございます！」
line = "「！　いいんですか！？　ありがとうございます！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「会長さんならそう言ってくれるんじゃないかと、実は期待しちゃってました～♪　えへへ☆」
line = "「会長さんならそう言ってくれるんじゃないかと、実は期待しちゃってました～♪　えへへ☆」"

[[dialogue]]
speaker = "トレジアンナ"
# 「って、どうしたんですか、会長さん？　何か言いたそうな様子ですけど……？」
line = "「って、どうしたんですか、会長さん？　何か言いたそうな様子ですけど……？」"

[[dialogue]]
speaker = "unk"
# 男として気になるっていうのは、つまり……
line = "男として気になるっていうのは、つまり……"

[[dialogue]]
speaker = "unk"
# その……俺のこと……
line = "その……俺のこと……"

[[dialogue]]
speaker = "トレジアンナ"
# 「？　ニュアンスをもっと具体的に知りたい感じですか？」
line = "「？　ニュアンスをもっと具体的に知りたい感じですか？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「ぶっちゃけると――異性として、会長さんのことを『好き』になってるってことですね☆」
line = "「ぶっちゃけると――異性として、会長さんのことを『好き』になってるってことですね☆」"

[[dialogue]]
speaker = "unk"
# どストレートな言葉に、俺の心臓は先程よりも大きく跳ねる。
line = "どストレートな言葉に、俺の心臓は先程よりも大きく跳ねる。"

[[dialogue]]
speaker = "トレジアンナ"
# 「あ、でも……ごめんなさい！　告白しといてアレなんですけど、お付き合いとかはちょっと考えてなくて～」
line = "「あ、でも……ごめんなさい！　告白しといてアレなんですけど、お付き合いとかはちょっと考えてなくて～」"

[[dialogue]]
speaker = "unk"
# 一方的にフラれた……！？
line = "一方的にフラれた……！？"

[[dialogue]]
speaker = "unk"
# 一方的に告白されて
line = "一方的に告白されて"

[[dialogue]]
speaker = "トレジアンナ"
# 「う～ん、私、ヒトより寿命が長い魔女のせいか、誰かと恋愛関係になるって、いまいちピンと来ないんですよね～」
line = "「う～ん、私、ヒトより寿命が長い魔女のせいか、誰かと恋愛関係になるって、いまいちピンと来ないんですよね～」"

[[dialogue]]
speaker = "トレジアンナ"
# 「だってほら、どんなに仲がいいヒトでも、みんな私より先に死んじゃうじゃないですか～☆」
line = "「だってほら、どんなに仲がいいヒトでも、みんな私より先に死んじゃうじゃないですか～☆」"

[[dialogue]]
speaker = "トレジアンナ"
# 「なので、会長さんとはこれからも<b>異性の友達</b>として、末永く仲良くしていただけたら幸いです♪」
line = "「なので、会長さんとはこれからも<b>異性の友達</b>として、末永く仲良くしていただけたら幸いです♪」"

[[dialogue]]
speaker = "トレジアンナ"
# 「じゃあ、私はこれから、会長さんの使用済みの物について、何なら良くて何だとダメなのか、集中して考えて来ようと思います！」
line = "「じゃあ、私はこれから、会長さんの使用済みの物について、何なら良くて何だとダメなのか、集中して考えて来ようと思います！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「リストが完成したらすぐに連絡しますので、また２人で相談しましょうね～。――それでは☆」
line = "「リストが完成したらすぐに連絡しますので、また２人で相談しましょうね～。――それでは☆」"

[[dialogue]]
speaker = "トレジアンナ"
# 「ふんふん、ふふ～ん♪」
line = "「ふんふん、ふふ～ん♪」"

[[dialogue]]
speaker = "unk"
# 嬉しそうに鼻歌を唄いながら去ってゆくトレジアンナさんを、呆然と見送る俺なのであった――
line = "嬉しそうに鼻歌を唄いながら去ってゆくトレジアンナさんを、呆然と見送る俺なのであった――"
