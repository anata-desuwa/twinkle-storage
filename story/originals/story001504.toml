[[dialogue]]
speaker = "unk"
# その後、校内で見失ったロストアイテムを捜索するために、手分けをして探すことになった。
line = "その後、校内で見失ったロストアイテムを捜索するために、手分けをして探すことになった。"

[[dialogue]]
speaker = "unk"
# チームを２つに分けて、こちらはサーシャさん、シズハ、俺といったメンバーだ。
line = "チームを２つに分けて、こちらはサーシャさん、シズハ、俺といったメンバーだ。"

[[dialogue]]
speaker = "シズハ"
# 「ふふっ。こうやって最初からお姉ちゃんとロストアイテムを探すのは初めてだね」
line = "「ふふっ。こうやって最初からお姉ちゃんとロストアイテムを探すのは初めてだね」"

[[dialogue]]
speaker = "サーシャ"
# 「そうね～。シズハが魔法少女活動をしているって知った件も、完全に偶然だったわけだし」
line = "「そうね～。シズハが魔法少女活動をしているって知った件も、完全に偶然だったわけだし」"

[[dialogue]]
speaker = "ディーラック"
# 「ひひっ♪　ロストアイテムは危険な道具だからネ～。そう簡単に、色んな人へ存在がバレたらまずいのサ」
line = "「ひひっ♪　ロストアイテムは危険な道具だからネ～。そう簡単に、色んな人へ存在がバレたらまずいのサ」"

[[dialogue]]
speaker = "unk"
# トレジアンナさんと同じスタンスだ
関係者は皆、同じように考えるんだな
line = "トレジアンナさんと同じスタンスだ
関係者は皆、同じように考えるんだな"

[[dialogue]]
speaker = "シズハ"
# 「サチちゃんの協力者じゃなかったら、こうやって会長とも知り合えなかったわけで、偶然に感謝感謝～♪」
line = "「サチちゃんの協力者じゃなかったら、こうやって会長とも知り合えなかったわけで、偶然に感謝感謝～♪」"

[[dialogue]]
speaker = "サーシャ"
# 「うふふ～。シズハ、いつになくご機嫌ね～？」
line = "「うふふ～。シズハ、いつになくご機嫌ね～？」"

[[dialogue]]
speaker = "シズハ"
# 「そりゃあそうだよ。少し前まで、病院のベッドで寝たきりだった私が、お姉ちゃんやそのお友達と一緒に、こうやってお散歩できてるんだから！」
line = "「そりゃあそうだよ。少し前まで、病院のベッドで寝たきりだった私が、お姉ちゃんやそのお友達と一緒に、こうやってお散歩できてるんだから！」"

[[dialogue]]
speaker = "サーシャ"
# 「あらあら♪　はしゃぐのはいいけれど、転んだりしないようにね？」
line = "「あらあら♪　はしゃぐのはいいけれど、転んだりしないようにね？」"

[[dialogue]]
speaker = "シズハ"
# 「えっへへ～。わかってますよ～っと……とと？　おおっと！」
line = "「えっへへ～。わかってますよ～っと……とと？　おおっと！」"

[[dialogue]]
speaker = "unk"
# シズハは何もないところで一瞬足をもつれさせたが、なんとか自力で踏みとどまった。
line = "シズハは何もないところで一瞬足をもつれさせたが、なんとか自力で踏みとどまった。"

[[dialogue]]
speaker = "サーシャ"
# 「ほら、言わんこっちゃないわ。手を繋いであげるから、先に行かないで並んで歩きましょう？」
line = "「ほら、言わんこっちゃないわ。手を繋いであげるから、先に行かないで並んで歩きましょう？」"

[[dialogue]]
speaker = "シズハ"
# 「大丈夫、大丈夫～！　私の体はもう本当に健康そのものなんだから。これはただの運動不足というか、鍛錬不足だよ」
line = "「大丈夫、大丈夫～！　私の体はもう本当に健康そのものなんだから。これはただの運動不足というか、鍛錬不足だよ」"

[[dialogue]]
speaker = "シズハ"
# 「そ・れ・に～♪　お姉ちゃんとスキンシップするなら、お手手なんかよりも、私はこっちの方が興味深々だな～」
line = "「そ・れ・に～♪　お姉ちゃんとスキンシップするなら、お手手なんかよりも、私はこっちの方が興味深々だな～」"

[[dialogue]]
speaker = "シズハ"
# 「と、言うわけで。お尻タ～チ♪」
line = "「と、言うわけで。お尻タ～チ♪」"

[[dialogue]]
speaker = "サーシャ"
# 「あぁんっ<emoji=heart04>」
line = "「あぁんっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# サーシャさん……！？
line = "サーシャさん……！？"

[[dialogue]]
speaker = "サーシャ"
# 「会長くん……？　どうしたのかしら、そんなに顔を赤くしたりして」
line = "「会長くん……？　どうしたのかしら、そんなに顔を赤くしたりして」"

[[dialogue]]
speaker = "サーシャ"
# 「私の声……？　うふふ♪　シズハの揉み方が上手だったから、つい～」
line = "「私の声……？　うふふ♪　シズハの揉み方が上手だったから、つい～」"

[[dialogue]]
speaker = "シズハ"
# 「私、そんないやらしい揉み方してないからね……！？」
line = "「私、そんないやらしい揉み方してないからね……！？」"

[[dialogue]]
speaker = "シズハ"
# 「あああっ、会長もディーちゃんも、そんな冷ややかな目で見ないで……！！」
line = "「あああっ、会長もディーちゃんも、そんな冷ややかな目で見ないで……！！」"

[[dialogue]]
speaker = "シズハ"
# 「そりゃ……！　お姉ちゃんのお尻、大きくて柔らかそうで、揉み心地は最高だろうなとは思ったけど！」
line = "「そりゃ……！　お姉ちゃんのお尻、大きくて柔らかそうで、揉み心地は最高だろうなとは思ったけど！」"

[[dialogue]]
speaker = "unk"
# やっぱりアレはセクハラだったんだ……！
line = "やっぱりアレはセクハラだったんだ……！"

[[dialogue]]
speaker = "シズハ"
# 「ちーがーうーの！　思ったけど、欲望は心の底に押し込んで、あくまで今回はタッチに留めたのぉ！」
line = "「ちーがーうーの！　思ったけど、欲望は心の底に押し込んで、あくまで今回はタッチに留めたのぉ！」"

[[dialogue]]
speaker = "サーシャ"
# 「うんうん、シズハのお尻への気遣いは、本物だと思うわ♪」
line = "「うんうん、シズハのお尻への気遣いは、本物だと思うわ♪」"

[[dialogue]]
speaker = "ディーラック"
# 「ひひっ。会長がお尻を抑えてシズハちゃんから距離を取ってるぞ。２度とシズハちゃんに背後は見せないという構えだネ」
line = "「ひひっ。会長がお尻を抑えてシズハちゃんから距離を取ってるぞ。２度とシズハちゃんに背後は見せないという構えだネ」"

[[dialogue]]
speaker = "シズハ"
# 「も～～！　お姉ちゃんが変な声出すからぁ！　絶対わざとでしょぉ！」
line = "「も～～！　お姉ちゃんが変な声出すからぁ！　絶対わざとでしょぉ！」"

[[dialogue]]
speaker = "サーシャ"
# 「そんなことないわよ～♪」
line = "「そんなことないわよ～♪」"

[[dialogue]]
speaker = "シズハ"
# 「ずるいわよ！　こうなったら、お姉ちゃんも私のお尻揉んで！！」
line = "「ずるいわよ！　こうなったら、お姉ちゃんも私のお尻揉んで！！」"

[[dialogue]]
speaker = "サーシャ"
# 「あら～♪　大胆な告白ね～」
line = "「あら～♪　大胆な告白ね～」"

[[dialogue]]
speaker = "サーシャ"
# 「でも私は、シズハの可愛いお尻よりも、こっちの方がいいかしら」
line = "「でも私は、シズハの可愛いお尻よりも、こっちの方がいいかしら」"

[[dialogue]]
speaker = "unk"
# サーシャさんはそう言って、シズハの頭を優しく撫でる。
line = "サーシャさんはそう言って、シズハの頭を優しく撫でる。"

[[dialogue]]
speaker = "シズハ"
# 「はぅぅ……お姉ちゃんのバカ。これじゃあ私だけ変態みたいじゃない」
line = "「はぅぅ……お姉ちゃんのバカ。これじゃあ私だけ変態みたいじゃない」"

[[dialogue]]
speaker = "サーシャ"
# 「あらあら。それじゃあこれ、もうやめちゃう……？」
line = "「あらあら。それじゃあこれ、もうやめちゃう……？」"

[[dialogue]]
speaker = "シズハ"
# 「それもダメ……。お姉ちゃんはお姉ちゃんなんだから、私のこともっと甘やかして」
line = "「それもダメ……。お姉ちゃんはお姉ちゃんなんだから、私のこともっと甘やかして」"

[[dialogue]]
speaker = "サーシャ"
# 「大歓迎よ～。シズハが求めてくれるなら、好きなだけ頭なんて撫でてあげるんだから<emoji=heart04>」
line = "「大歓迎よ～。シズハが求めてくれるなら、好きなだけ頭なんて撫でてあげるんだから<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# は～。眼福、眼福
line = "は～。眼福、眼福"

[[dialogue]]
speaker = "ディーラック"
# 「……キミたち、遊ぶのもいいけど、ひと段落したらロストアイテムもちゃんと探すんだぞ？」
line = "「……キミたち、遊ぶのもいいけど、ひと段落したらロストアイテムもちゃんと探すんだぞ？」"
