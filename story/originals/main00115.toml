[[dialogue]]
speaker = "unk"
# 第１９話,御前試合Ⅰ,B
line = "第１９話,御前試合Ⅰ,B"

[[dialogue]]
speaker = "unk"
# そうしてついに、決戦の時を迎えた。
line = "そうしてついに、決戦の時を迎えた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「よく来たわね──緋宮クロト」
line = "「よく来たわね──緋宮クロト」"

[[dialogue]]
speaker = "クロト"
# 「ああ……逃げるわけにはいかないからな」
line = "「ああ……逃げるわけにはいかないからな」"

[[dialogue]]
speaker = "unk"
# 俺の前に立つは現新星星徒会会長・九浄ヴィーナス。
line = "俺の前に立つは現新星星徒会会長・九浄ヴィーナス。"

[[dialogue]]
speaker = "unk"
# アリーナの全席を埋め尽くすのは、新星学園全２５４２名の生徒たち。
line = "アリーナの全席を埋め尽くすのは、新星学園全２５４２名の生徒たち。"

[[dialogue]]
speaker = "unk"
# これから始まるのは、この新星学園の命運を左右する一大イベント──
line = "これから始まるのは、この新星学園の命運を左右する一大イベント──"

[[dialogue]]
speaker = "unk"
# 御前試合だ。
line = "御前試合だ。"

[[dialogue]]
speaker = "クロト"
# 「（あれが……新星学園の学園長……）」
line = "「（あれが……新星学園の学園長……）」"

[[dialogue]]
speaker = "unk"
# こうしてこの目で見るのは初めてだ。
line = "こうしてこの目で見るのは初めてだ。"

[[dialogue]]
speaker = "unk"
# 俺たちは今から彼の前で、雌雄を決する戦いを行う──
line = "俺たちは今から彼の前で、雌雄を決する戦いを行う──"

[[dialogue]]
speaker = "クロト"
# 「戦いを始める前に……ひとつ訊いておきたい」
line = "「戦いを始める前に……ひとつ訊いておきたい」"

[[dialogue]]
speaker = "ヴィーナス"
# 「何かしら」
line = "「何かしら」"

[[dialogue]]
speaker = "クロト"
# 「君が、そこまで俺を買っている理由はなんだ？」
line = "「君が、そこまで俺を買っている理由はなんだ？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「決まっているわ」
line = "「決まっているわ」"

[[dialogue]]
speaker = "unk"
# ヴィーナスは、さも当然のこととばかりに言った。
line = "ヴィーナスは、さも当然のこととばかりに言った。"

[[dialogue]]
speaker = "ヴィーナス"
# 「あなたこそ、真の魔王だからよ」
line = "「あなたこそ、真の魔王だからよ」"

[[dialogue]]
speaker = "クロト"
# 「魔王……」
line = "「魔王……」"

[[dialogue]]
speaker = "unk"
# 以前も口にしていた言葉だったが、やはり聞き間違えではないようだ。
line = "以前も口にしていた言葉だったが、やはり聞き間違えではないようだ。"

[[dialogue]]
speaker = "クロト"
# 「詳しい意味が聞きたい。俺は別に、魔族でもないただの人間だが……」
line = "「詳しい意味が聞きたい。俺は別に、魔族でもないただの人間だが……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「この場で話すことではないわ。それに、戦えばすぐにわかるはず」
line = "「この場で話すことではないわ。それに、戦えばすぐにわかるはず」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あなたの血に眠る──その資質にね」
line = "「あなたの血に眠る──その資質にね」"

[[dialogue]]
speaker = "unk"
# 血に眠る資質──やはり、ヴィーナスは俺のあの力のことを知っているのだろうか？
line = "血に眠る資質──やはり、ヴィーナスは俺のあの力のことを知っているのだろうか？"

[[dialogue]]
speaker = "unk"
# しかし、彼女はこの場でこれ以上説明してくれそうもない。
line = "しかし、彼女はこの場でこれ以上説明してくれそうもない。"

[[dialogue]]
speaker = "クロト"
# 「──わかった。聞くのはよそう。俺はただ、君の頼みに応えるだけだ」
line = "「──わかった。聞くのはよそう。俺はただ、君の頼みに応えるだけだ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふふ。話が早くて助かるわ」
line = "「ふふ。話が早くて助かるわ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「さて……本来、私は３ヶ月前にサーシャさんから星徒会長を継いだばかりの身」
line = "「さて……本来、私は３ヶ月前にサーシャさんから星徒会長を継いだばかりの身」"

[[dialogue]]
speaker = "ヴィーナス"
# 「けれど。イレギュラーながら──本日をもってこの座をあなたに明け渡すわ」
line = "「けれど。イレギュラーながら──本日をもってこの座をあなたに明け渡すわ」"

[[dialogue]]
speaker = "unk"
# 腕章を示すヴィーナス。
line = "腕章を示すヴィーナス。"

[[dialogue]]
speaker = "unk"
# それだけならば確かに光栄で、この上ない話だ。
line = "それだけならば確かに光栄で、この上ない話だ。"

[[dialogue]]
speaker = "ヴィーナス"
# 「でも……タダでというわけにはいかない。示しがつかないものね」
line = "「でも……タダでというわけにはいかない。示しがつかないものね」"

[[dialogue]]
speaker = "unk"
# ヴィーナスのセレスティアが<ruby=こんじき>金色</ruby>に輝く。
line = "ヴィーナスのセレスティアが<ruby>金色<rt>こんじき</rt></ruby>に輝く。"

[[dialogue]]
speaker = "unk"
# 彼女の奉ずる守護星が、その身に騎士としての加護を与え──変身。
line = "彼女の奉ずる守護星が、その身に騎士としての加護を与え──変身。"

[[dialogue]]
speaker = "unk"
# 戦闘態勢へ移ったのを見て、学園長はアリーナ席から俺たちへ呼びかけた。
line = "戦闘態勢へ移ったのを見て、学園長はアリーナ席から俺たちへ呼びかけた。"

[[dialogue]]
speaker = "セイファート"
# 「星徒会長には──この新星学園に集う、全<ruby=スターナイト>星騎士</ruby>たちを束ねるだけの実力が求められる」
line = "「星徒会長には──この新星学園に集う、全<ruby>星騎士<rt>スターナイト</rt></ruby>たちを束ねるだけの実力が求められる」"

[[dialogue]]
speaker = "セイファート"
# 「ゆえにこそ……これから行うのは、私だけではない、君たちを見守る彼らへ向けての御前試合だ」
line = "「ゆえにこそ……これから行うのは、私だけではない、君たちを見守る彼らへ向けての御前試合だ」"

[[dialogue]]
speaker = "unk"
# アリーナ席を埋め尽くす学生たち。
line = "アリーナ席を埋め尽くす学生たち。"

[[dialogue]]
speaker = "unk"
# 皆が皆、俺よりも早く入学した先輩たちだ。
line = "皆が皆、俺よりも早く入学した先輩たちだ。"

[[dialogue]]
speaker = "unk"
# 星徒会への憧れを持った生徒も多いだろう。なればこそ、俺が認められるべきは彼らをおいて他にない。
line = "星徒会への憧れを持った生徒も多いだろう。なればこそ、俺が認められるべきは彼らをおいて他にない。"

[[dialogue]]
speaker = "ヴィーナス"
# 「示してみなさい。緋宮クロト──彼ら全員を従える覇者としての器があなたにあるか」
line = "「示してみなさい。緋宮クロト──彼ら全員を従える覇者としての器があなたにあるか」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そして……私があなたを、真の魔王として導いてあげる！」
line = "「そして……私があなたを、真の魔王として導いてあげる！」"

[[dialogue]]
speaker = "クロト"
# 「いいだろう──星騎士としての最初の責務、ここで果たさせてもらう！」
line = "「いいだろう──星騎士としての最初の責務、ここで果たさせてもらう！」"
