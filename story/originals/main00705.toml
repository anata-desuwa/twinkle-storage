[[dialogue]]
speaker = "unk"
# 第５話,月の壁画、その使命,B
line = "第５話,月の壁画、その使命,B"

[[dialogue]]
speaker = "unk"
# フィオナにうながされる形で最初の部屋まで戻ってくると、今度は反対側にある部屋に案内された。
line = "フィオナにうながされる形で最初の部屋まで戻ってくると、今度は反対側にある部屋に案内された。"

[[dialogue]]
speaker = "ルリエル"
# 「およ？　さっきの部屋に似てますが、別室ですよね？」
line = "「およ？　さっきの部屋に似てますが、別室ですよね？」"

[[dialogue]]
speaker = "フィオナ"
# 「はい。もうひとつ、皆さんにお伝えしておく事項があります」
line = "「はい。もうひとつ、皆さんにお伝えしておく事項があります」"

[[dialogue]]
speaker = "フィオナ"
# 「上を見てもらえるかしら、ソフィア」
line = "「上を見てもらえるかしら、ソフィア」"

[[dialogue]]
speaker = "ソフィア"
# 「上……？　あっ」
line = "「上……？　あっ」"

[[dialogue]]
speaker = "unk"
# そうして俺たちが見上げた先には、かつて塔で見た絵画が飾られていた。
line = "そうして俺たちが見上げた先には、かつて塔で見た絵画が飾られていた。"

[[dialogue]]
speaker = "マトイ"
# 「これ、太陽の壁画──あれ。ちょっと違う……？」
line = "「これ、太陽の壁画──あれ。ちょっと違う……？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「違うわ、マトイ。これは太陽の壁画じゃなくて──月の壁画。そうよね、フィオナ」
line = "「違うわ、マトイ。これは太陽の壁画じゃなくて──月の壁画。そうよね、フィオナ」"

[[dialogue]]
speaker = "フィオナ"
# 「はい。我が星見家に代々受け継がれてきた……真なる魔王の姿です」
line = "「はい。我が星見家に代々受け継がれてきた……真なる魔王の姿です」"

[[dialogue]]
speaker = "unk"
# それからフィオナはこの絵についての委細を語った。
line = "それからフィオナはこの絵についての委細を語った。"

[[dialogue]]
speaker = "unk"
# 俺たちがフィーニスの塔で得た知識──魔王候補──リクリエのサイクル──なども合わせ……
line = "俺たちがフィーニスの塔で得た知識──魔王候補──リクリエのサイクル──なども合わせ……"

[[dialogue]]
speaker = "unk"
# この絵は森羅暦元年、魔王がリクリエを撃退した時の図であるのだと。
line = "この絵は森羅暦元年、魔王がリクリエを撃退した時の図であるのだと。"

[[dialogue]]
speaker = "ルリエル"
# 「ほ……ほえぇ～！　まさかリクリエさんが過去何度も訪れていたなんて……！」
line = "「ほ……ほえぇ～！　まさかリクリエさんが過去何度も訪れていたなんて……！」"

[[dialogue]]
speaker = "セーラ"
# 「んー、納得はできるけど余計に途方もなく思えてきたよねぇ」
line = "「んー、納得はできるけど余計に途方もなく思えてきたよねぇ」"

[[dialogue]]
speaker = "アナ"
# 「話を聞くに今のこの世界は、耐久度的には限界を迎えているようですね」
line = "「話を聞くに今のこの世界は、耐久度的には限界を迎えているようですね」"

[[dialogue]]
speaker = "unk"
# 荒唐無稽な話ではあったものの、俺たちがマグダレナさんから聞いたことも織り交ぜることでなんとか理解してもらえた。
line = "荒唐無稽な話ではあったものの、俺たちがマグダレナさんから聞いたことも織り交ぜることでなんとか理解してもらえた。"

[[dialogue]]
speaker = "フィオナ"
# 「先ほど──『フィオナ』という名は襲名するものであるとご説明しましたね」
line = "「先ほど──『フィオナ』という名は襲名するものであるとご説明しましたね」"

[[dialogue]]
speaker = "ソフィア"
# 「はい。ですので、現フィオナ会長はお姉さんの跡を継いだと……」
line = "「はい。ですので、現フィオナ会長はお姉さんの跡を継いだと……」"

[[dialogue]]
speaker = "フィオナ"
# 「星見家の長女──フィオナには通常、役目が背負わされます。女神に仕える流星教皇庁、その巫女としての」
line = "「星見家の長女──フィオナには通常、役目が背負わされます。女神に仕える流星教皇庁、その巫女としての」"

[[dialogue]]
speaker = "フィオナ"
# 「しかし……その役目はあくまで表向きのものにすぎません」
line = "「しかし……その役目はあくまで表向きのものにすぎません」"

[[dialogue]]
speaker = "フィオナ"
# 「<b>次</b>のリクリエが起こった時、この世界を救う『魔王』となること──それこそが、星見フィオナに与えられた本当の使命なのです」
line = "「<b>次</b>のリクリエが起こった時、この世界を救う『魔王』となること──それこそが、星見フィオナに与えられた本当の使命なのです」"

[[dialogue]]
speaker = "ヴィーナス"
# 「！」
line = "「！」"

[[dialogue]]
speaker = "ソフィア"
# 「！」
line = "「！」"

[[dialogue]]
speaker = "アナ"
# 「！」
line = "「！」"

[[dialogue]]
speaker = "ルリエル"
# 「！」
line = "「！」"

[[dialogue]]
speaker = "マトイ"
# 「魔王になるのが使命──って、それじゃ……」
line = "「魔王になるのが使命──って、それじゃ……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私がクロトに頼んでたのと、同じ……！」
line = "「私がクロトに頼んでたのと、同じ……！」"

[[dialogue]]
speaker = "フィオナ"
# 「はい。姉は紛れもなく……かの存在を目指していました」
line = "「はい。姉は紛れもなく……かの存在を目指していました」"

[[dialogue]]
speaker = "フィオナ"
# 「かつてクルセイダースを率い、<ruby=いにしえ>古</ruby>の終焉を退けた伝説の英雄──『魔王』を」
line = "「かつてクルセイダースを率い、<ruby>古<rt>いにしえ</rt></ruby>の終焉を退けた伝説の英雄──『魔王』を」"

[[dialogue]]
speaker = "フィオナ"
# 「しかし、その道半ばで……姉は醒めない眠りに陥ってしまいました。その原因は、今も不明なまま」
line = "「しかし、その道半ばで……姉は醒めない眠りに陥ってしまいました。その原因は、今も不明なまま」"

[[dialogue]]
speaker = "フィオナ"
# 「よって私は──『フィオナ』という名とともに、魔王を目指すという宿命をも受け継ぐこととしたのです」
line = "「よって私は──『フィオナ』という名とともに、魔王を目指すという宿命をも受け継ぐこととしたのです」"

[[dialogue]]
speaker = "サーシャ"
# 「ヴィーナスちゃん以外にも、そんな子がいたなんてね……」
line = "「ヴィーナスちゃん以外にも、そんな子がいたなんてね……」"

[[dialogue]]
speaker = "ルリエル"
# 「ほえー……『魔王』様が英雄だなんて、驚きです！」
line = "「ほえー……『魔王』様が英雄だなんて、驚きです！」"

[[dialogue]]
speaker = "マトイ"
# 「大聖堂の壁画じゃあ、あんな悪者みたいに描かれてたのに──」
line = "「大聖堂の壁画じゃあ、あんな悪者みたいに描かれてたのに──」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふふん。だから言ったじゃないの！　あんなのは嘘っぱちなんだって！」
line = "「ふふん。だから言ったじゃないの！　あんなのは嘘っぱちなんだって！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「日誌に書かれていた通りよ！　ね、アナ」
line = "「日誌に書かれていた通りよ！　ね、アナ」"

[[dialogue]]
speaker = "アナ"
# 「……合致はしますね」
line = "「……合致はしますね」"

[[dialogue]]
speaker = "unk"
# 『終焉を打ち砕きし魔王の真実は未だ偽りの悪に虚飾されている。この世界に根を張る日輪の図が、過去の因果を捻じ曲げているのだ』
line = "『終焉を打ち砕きし魔王の真実は未だ偽りの悪に虚飾されている。この世界に根を張る日輪の図が、過去の因果を捻じ曲げているのだ』"

[[dialogue]]
speaker = "unk"
# 『真実を描いた月輪の図はどこかに隠されているという。私は、その在り処を求めるべく友の力を借りた』
line = "『真実を描いた月輪の図はどこかに隠されているという。私は、その在り処を求めるべく友の力を借りた』"

[[dialogue]]
speaker = "unk"
# ヴィーナスは手ずから日誌を開いて俺たちに見せた。
line = "ヴィーナスは手ずから日誌を開いて俺たちに見せた。"

[[dialogue]]
speaker = "unk"
# いつかは白い目で見られていた彼女の主張にも、こうなると説得力があるように思える。
line = "いつかは白い目で見られていた彼女の主張にも、こうなると説得力があるように思える。"

[[dialogue]]
speaker = "クロト"
# 「ここに記されてる日輪の図──ってのが、太陽の壁画にあたるってことだな」
line = "「ここに記されてる日輪の図──ってのが、太陽の壁画にあたるってことだな」"

[[dialogue]]
speaker = "アナ"
# 「して、それが『偽りの悪』であると」
line = "「して、それが『偽りの悪』であると」"

[[dialogue]]
speaker = "unk"
# 学園生なら誰もが知る『太陽の壁画』。
line = "学園生なら誰もが知る『太陽の壁画』。"

[[dialogue]]
speaker = "unk"
# そこには災いの権化として、魔王の倒される姿が描かれていた。
line = "そこには災いの権化として、魔王の倒される姿が描かれていた。"

[[dialogue]]
speaker = "unk"
# となると、ここでひとつの疑問が生じる。
line = "となると、ここでひとつの疑問が生じる。"

[[dialogue]]
speaker = "クロト"
# 「──フィオナ。こっちの──『月の壁画』が描かれたのはいつ頃か、わかるか？」
line = "「──フィオナ。こっちの──『月の壁画』が描かれたのはいつ頃か、わかるか？」"

[[dialogue]]
speaker = "フィオナ"
# 「なにぶん古いものですから、正確な年代はわかりませんが……星見家に伝わっている情報によれば約３０００年前とされています」
line = "「なにぶん古いものですから、正確な年代はわかりませんが……星見家に伝わっている情報によれば約３０００年前とされています」"

[[dialogue]]
speaker = "ユウリ"
# 「３０００年前──っつうと、リクリエが起こってすぐかよ」
line = "「３０００年前──っつうと、リクリエが起こってすぐかよ」"

[[dialogue]]
speaker = "アナ"
# 「……なるほど。一方の『太陽の壁画』は２０００年前に描かれたとされていますから──辻褄は合いますね」
line = "「……なるほど。一方の『太陽の壁画』は２０００年前に描かれたとされていますから──辻褄は合いますね」"

[[dialogue]]
speaker = "クロト"
# 「ああ。あっちのほうが<b>新しい</b>んだ」
line = "「ああ。あっちのほうが<b>新しい</b>んだ」"

[[dialogue]]
speaker = "セーラ"
# 「へえ……？　誰かが間違って模写しちゃった、とか？」
line = "「へえ……？　誰かが間違って模写しちゃった、とか？」"

[[dialogue]]
speaker = "ユウリ"
# 「なんつーか──そう単純じゃなさそうだよな」
line = "「なんつーか──そう単純じゃなさそうだよな」"

[[dialogue]]
speaker = "unk"
# 同じ過去のリクリエを伝える絵だというのに、真逆の結末が描かれているなんて不自然だ。
line = "同じ過去のリクリエを伝える絵だというのに、真逆の結末が描かれているなんて不自然だ。"

[[dialogue]]
speaker = "unk"
# もしここに、何らかの意図が仕組まれているとするなら……
line = "もしここに、何らかの意図が仕組まれているとするなら……"

[[dialogue]]
speaker = "フィオナ"
# 「誰かが──都合の悪い真実を<b>描き変えた</b>」
line = "「誰かが──都合の悪い真実を<b>描き変えた</b>」"

[[dialogue]]
speaker = "クロト"
# 「──のかも、しれない」
line = "「──のかも、しれない」"

[[dialogue]]
speaker = "ソフィア"
# 「……！　そっちの絵がずっと、残り続けてしまったのですか……！」
line = "「……！　そっちの絵がずっと、残り続けてしまったのですか……！」"

[[dialogue]]
speaker = "unk"
# 多くの人たちが──魔王は大悪だと信じ込んだように。
line = "多くの人たちが──魔王は大悪だと信じ込んだように。"

[[dialogue]]
speaker = "unk"
# 日誌の記述を信じるのなら、この真実は隠蔽されたとも考えられる。
line = "日誌の記述を信じるのなら、この真実は隠蔽されたとも考えられる。"

[[dialogue]]
speaker = "クロト"
# （考えられる可能性としてはもうひとつ……ただ、これはまだ不確定だし胸にしまっておくか）
line = "（考えられる可能性としてはもうひとつ……ただ、これはまだ不確定だし胸にしまっておくか）"

[[dialogue]]
speaker = "unk"
# ──と、集まった情報を整理していたところ……
line = "──と、集まった情報を整理していたところ……"
