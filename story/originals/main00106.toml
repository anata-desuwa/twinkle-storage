speaker = "マトイ"
# 「緋宮くん……」
line = "「緋宮くん……」"

[[dialogue]]
speaker = "アナ"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "クロト"
# 「もっと努力するしかないってことだな」
line = "「もっと努力するしかないってことだな」"

[[dialogue]]
speaker = "マトイ"
# 「ポ、ポジティブなのね。やっぱり」
line = "「ポ、ポジティブなのね。やっぱり」"

[[dialogue]]
speaker = "unk"
# 険しい道のりなのはわかった。でも、それが諦める理由にはならない。
line = "険しい道のりなのはわかった。でも、それが諦める理由にはならない。"

[[dialogue]]
speaker = "unk"
# 何より、九浄ヴィーナス──彼女の底知れない強さを聞くたびに体がぞくぞくするのを感じていた。
line = "何より、九浄ヴィーナス──彼女の底知れない強さを聞くたびに体がぞくぞくするのを感じていた。"

[[dialogue]]
speaker = "クロト"
# 「俺の守護星は地球だ。つまり、地球からもっと力を引き出せればあいつくらい強い<ruby=スターナイト>星騎士</ruby>になれるってことだろう？」
line = "「俺の守護星は地球だ。つまり、地球からもっと力を引き出せればあいつくらい強い<ruby>星騎士<rt>スターナイト</rt></ruby>になれるってことだろう？」"

[[dialogue]]
speaker = "トワ先生"
# 「おお……」
line = "「おお……」"

[[dialogue]]
speaker = "アナ"
# 「でも、実際そう。もう受けちゃった以上しょうがない。私たちも応援する」
line = "「でも、実際そう。もう受けちゃった以上しょうがない。私たちも応援する」"

[[dialogue]]
speaker = "マトイ"
# 「……そうね。私も、あんまりネガティブなこと言うのは悪い癖かも」
line = "「……そうね。私も、あんまりネガティブなこと言うのは悪い癖かも」"

[[dialogue]]
speaker = "unk"
# マトイがそっと自身のセレスティアを俺へあてる。
line = "マトイがそっと自身のセレスティアを俺へあてる。"

[[dialogue]]
speaker = "unk"
# すると、俺の身にささやかな光が宿った。
line = "すると、俺の身にささやかな光が宿った。"

[[dialogue]]
speaker = "クロト"
# 「これは……」
line = "「これは……」"

[[dialogue]]
speaker = "マトイ"
# 「回復の星術──私はヒーラーが専門じゃないから、あんまり上手にできないけど」
line = "「回復の星術──私はヒーラーが専門じゃないから、あんまり上手にできないけど」"

[[dialogue]]
speaker = "マトイ"
# 「緋宮くんが頑張るなら、私もできる限り応援するよ！　入ったばかりなんだから──これからまだまだ伸びるってこともあると思う！」
line = "「緋宮くんが頑張るなら、私もできる限り応援するよ！　入ったばかりなんだから──これからまだまだ伸びるってこともあると思う！」"

[[dialogue]]
speaker = "unk"
# マトイに握られた手から、消耗した怪我や星力が癒やされていくのを感じた。
line = "マトイに握られた手から、消耗した怪我や星力が癒やされていくのを感じた。"

[[dialogue]]
speaker = "クロト"
# 「ありがとう──マトイ。世話になるよ」
line = "「ありがとう──マトイ。世話になるよ」"

[[dialogue]]
speaker = "マトイ"
# 「うん。て言っても、それでも会長に届くかどうかは……厳しいけど……」
line = "「うん。て言っても、それでも会長に届くかどうかは……厳しいけど……」"

[[dialogue]]
speaker = "アナ"
# 「明日から頑張りましょう──次期会長。星徒会の権限で、この施設をしばらく貸し切るようにしておきます」
line = "「明日から頑張りましょう──次期会長。星徒会の権限で、この施設をしばらく貸し切るようにしておきます」"

[[dialogue]]
speaker = "クロト"
# 「恩に着る。時間もないしな──やれることをやるしかない」
line = "「恩に着る。時間もないしな──やれることをやるしかない」"

[[dialogue]]
speaker = "unk"
# 俺のこれからの方針が決まった。
line = "俺のこれからの方針が決まった。"

[[dialogue]]
speaker = "unk"
# 一週間後に控えたヴィーナスとの果し合い──それまでに彼女を超えられるよう、己を鍛える。
line = "一週間後に控えたヴィーナスとの果し合い──それまでに彼女を超えられるよう、己を鍛える。"

[[dialogue]]
speaker = "アナ"
# 「それじゃ、打倒ヴィーナス現会長ということで。がんばろ～」
line = "「それじゃ、打倒ヴィーナス現会長ということで。がんばろ～」"

[[dialogue]]
speaker = "クロト"
# 「応！」
line = "「応！」"

[[dialogue]]
speaker = "マトイ"
# 「おー！」
line = "「おー！」"

[[dialogue]]
speaker = "トワ先生"
# 「おー？」
line = "「おー？」"

[[dialogue]]
speaker = "unk"
# そんなこんなで、俺はみんなの助力を得られるようになった。
line = "そんなこんなで、俺はみんなの助力を得られるようになった。"

[[dialogue]]
speaker = "ヴィーナス"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# 月明かりの差す星徒会室。
line = "月明かりの差す星徒会室。"

[[dialogue]]
speaker = "unk"
# <b>現</b>星徒会長である九浄ヴィーナスはただ１人、窓の向こうを歩くクロトらを眺めてつぶやいた。
line = "<b>現</b>星徒会長である九浄ヴィーナスはただ１人、窓の向こうを歩くクロトらを眺めてつぶやいた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「目覚めなさい──緋宮クロト。あなたこそ真の魔王に他ならないわ」
line = "「目覚めなさい──緋宮クロト。あなたこそ真の魔王に他ならないわ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そして、私も……これから全力であなたにぶつかる。それが私の使命」
line = "「そして、私も……これから全力であなたにぶつかる。それが私の使命」"

[[dialogue]]
speaker = "unk"
# ヴィーナスは開いていた日誌をパタンと閉じた。
line = "ヴィーナスは開いていた日誌をパタンと閉じた。"

[[dialogue]]
speaker = "unk"
# 万感の思いを、そのわずかな動作に込めるかのように。
line = "万感の思いを、そのわずかな動作に込めるかのように。"

[[dialogue]]
speaker = "ヴィーナス"
# 「私はこの時を……ずっと待ち続けてきたんだから！」
line = "「私はこの時を……ずっと待ち続けてきたんだから！」"
