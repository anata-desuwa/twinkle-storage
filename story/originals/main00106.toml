speaker = "トワ先生"
# 「いい質問だね！」
line = "「いい質問だね！」"

[[dialogue]]
speaker = "トワ先生"
# 「守護星っていうのは<ruby=スターナイト>星騎士</ruby>が星力を借り受ける星のことだよ。あ、星力はわかるよね？」
line = "「守護星っていうのは<ruby>星騎士<rt>スターナイト</rt></ruby>が星力を借り受ける星のことだよ。あ、星力はわかるよね？」"

[[dialogue]]
speaker = "クロト"
# 「なんとなくは。こう、モンスターに対して有効なすごいパワーみたいな……？」
line = "「なんとなくは。こう、モンスターに対して有効なすごいパワーみたいな……？」"

[[dialogue]]
speaker = "トワ先生"
# 「うーん、ちょっと大雑把すぎるかなあ。転入してきたばかりだからしょうがないんだけどね！」
line = "「うーん、ちょっと大雑把すぎるかなあ。転入してきたばかりだからしょうがないんだけどね！」"

[[dialogue]]
speaker = "マトイ"
# 「（今までフィーリングだけであれだけ戦えてたんだ……逆にすごいかも……）」
line = "「（今までフィーリングだけであれだけ戦えてたんだ……逆にすごいかも……）」"

[[dialogue]]
speaker = "unk"
# 『星力』。
line = "『星力』。"

[[dialogue]]
speaker = "unk"
# 平たく言えば俺たち<ruby=スターナイト>星騎士</ruby>の扱う力の総称であり、たとえば戦闘服への変身も星々の加護を伴う。
line = "平たく言えば俺たち<ruby>星騎士<rt>スターナイト</rt></ruby>の扱う力の総称であり、たとえば戦闘服への変身も星々の加護を伴う。"

[[dialogue]]
speaker = "unk"
# また星力を扱うことができるのは「（ごく一部の例外を除き）」若年層に限られており、加齢と共にそのエネルギーは衰えていくという。
line = "また星力を扱うことができるのは「（ごく一部の例外を除き）」若年層に限られており、加齢と共にそのエネルギーは衰えていくという。"

[[dialogue]]
speaker = "unk"
# そして、人がその力を引き出す源の星を『守護星』と言うらしい。
line = "そして、人がその力を引き出す源の星を『守護星』と言うらしい。"

[[dialogue]]
speaker = "トワ先生"
# 「星騎士はまるで恋人みたいに、宇宙にある一つの星とリンクを結ぶよ。そして、その天体と交信することで『星力』を引き出せるってこと」
line = "「星騎士はまるで恋人みたいに、宇宙にある一つの星とリンクを結ぶよ。そして、その天体と交信することで『星力』を引き出せるってこと」"

[[dialogue]]
speaker = "トワ先生"
# 「緋宮くんとか詠野さんがモンスター相手に使ってる力も、ぜんぶ星力だからね」
line = "「緋宮くんとか詠野さんがモンスター相手に使ってる力も、ぜんぶ星力だからね」"

[[dialogue]]
speaker = "クロト"
# 「なるほど。みんな守護星から力を借りて戦ってるわけですね」
