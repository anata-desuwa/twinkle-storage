[[dialogue]]
speaker = "アナ"
# 「２秒」
line = "「２秒」"

[[dialogue]]
speaker = "クロト"
# 「２びょ……？」
line = "「２びょ……？」"

[[dialogue]]
speaker = "unk"
# 顔が引きつってしまった。
line = "顔が引きつってしまった。"

[[dialogue]]
speaker = "unk"
# 上出来と慢心しかけていた自分が恥ずかしくなるほどの開きがある。
line = "上出来と慢心しかけていた自分が恥ずかしくなるほどの開きがある。"

[[dialogue]]
speaker = "アナ"
