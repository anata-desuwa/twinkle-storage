line = "「んんんっ、はぁんっ……はぁっ、はぁっ……ぁっ……<emoji=heart04>　お腹の奥、あっついっ……<emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
# 「あ……はっ……んんっ<emoji=heart04>　まだ出てっ……んぁっ、あぁっ……あっ、あっ、あっ……あんっ<emoji=heart04>　ふ……ん……んん～～～っ<emoji=heart04><emoji=heart04>」
line = "「あ……はっ……んんっ<emoji=heart04>　まだ出てっ……んぁっ、あぁっ……あっ、あっ、あっ……あんっ<emoji=heart04>　ふ……ん……んん～～～っ<emoji=heart04><emoji=heart04>」"

[[dialogue]]
