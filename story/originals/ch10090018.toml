[[dialogue]]
speaker = "セーラ"
# 「うちの、中にっ……はっ、あっ……あっ、あぁっ……<emoji=heart04>　はぁっ、はぁっ、はっ……ん～～っ<emoji=heart04>」
line = "「うちの、中にっ……はっ、あっ……あっ、あぁっ……<emoji=heart04>　はぁっ、はぁっ、はっ……ん～～っ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# セーラさんが腰を深く沈めてきて、その瞬間にカウントダウンが０になった。
