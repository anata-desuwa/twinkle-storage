# 「おま○こ、熱いの……はぁっ、はぁっ……はぁ、ふっ、んんっ…………はぁっ、あっ、あんっ……<emoji=heart04>」
line = "「おま○こ、熱いの……はぁっ、はぁっ……はぁ、ふっ、んんっ…………はぁっ、あっ、あんっ……<emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
# 「はあぁっ……はっ、はっ、あんっ……<emoji=heart04>　お腹の中こすれて、どんどん気持ち良くなってるっ……あっ、はっ、あぁっ……<emoji=heart04>」
line = "「はあぁっ……はっ、はっ、あんっ……<emoji=heart04>　お腹の中こすれて、どんどん気持ち良くなってるっ……あっ、はっ、あぁっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ペニスの感触を味わうように腰を揺らすセーラさん。
line = "ペニスの感触を味わうように腰を揺らすセーラさん。"

[[dialogue]]
speaker = "unk"
# セーラさんが勢いよく腰を沈めると、ペニスの先端が一番奥に届く。
line = "セーラさんが勢いよく腰を沈めると、ペニスの先端が一番奥に届く。"

[[dialogue]]
speaker = "セーラ"
# 「んんーーーっ！？」
line = "「んんーーーっ！？」"

[[dialogue]]
speaker = "unk"
# その瞬間、亀頭の先端に走った刺激と快感。
line = "その瞬間、亀頭の先端に走った刺激と快感。"

[[dialogue]]
speaker = "unk"
# 強烈すぎるシグナルに一瞬気が遠のいた。
line = "強烈すぎるシグナルに一瞬気が遠のいた。"

[[dialogue]]
speaker = "セーラ"
# 「はぁ、はぁ……今の、わかった……？　今おち○ちんが当たったのが多分うちの子宮。赤ちゃんの部屋」
line = "「はぁ、はぁ……今の、わかった……？　今おち○ちんが当たったのが多分うちの子宮。赤ちゃんの部屋」"

[[dialogue]]
speaker = "セーラ"
# 「はぁっ、はぁっ、はんっ……<emoji=heart04>　ふはぁっ、あっ、はっ……知ってるでしょ、ここに精子出すと君の赤ちゃんできるの」
line = "「はぁっ、はぁっ、はんっ……<emoji=heart04>　ふはぁっ、あっ、はっ……知ってるでしょ、ここに精子出すと君の赤ちゃんできるの」"

[[dialogue]]
speaker = "unk"
# セーラさんの一番奥――子を授かり育む場所に届いたことが、たまらなく俺を燃え上がらせる。
line = "セーラさんの一番奥――子を授かり育む場所に届いたことが、たまらなく俺を燃え上がらせる。"

[[dialogue]]
speaker = "unk"
# 愛しい人を満たすことを想像し、体の奥から熱がこみ上げてくる。
line = "愛しい人を満たすことを想像し、体の奥から熱がこみ上げてくる。"

[[dialogue]]
speaker = "セーラ"
# 「ふぁあああっ……<emoji=heart04>　おち○ちん、めっちゃビクビクしてるっ………<emoji=heart04>」
line = "「ふぁあああっ……<emoji=heart04>　おち○ちん、めっちゃビクビクしてるっ………<emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
# 「はぁ……はっ、はっ……いいよ、男の子って気持ち良くなったら精子出るんだよね……はっ、んんっ……出していいよ……うちのおま○こにビューって出していいよ<emoji=heart04>」
line = "「はぁ……はっ、はっ……いいよ、男の子って気持ち良くなったら精子出るんだよね……はっ、んんっ……出していいよ……うちのおま○こにビューって出していいよ<emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
# 「うちも君の精子ほしいから……んはっ、あっ、あ……うちの奥に君の、ちょうだいっ……<emoji=heart04>」
line = "「うちも君の精子ほしいから……んはっ、あっ、あ……うちの奥に君の、ちょうだいっ……<emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
# 「んんぁああ～～っ<emoji=heart04>」
line = "「んんぁああ～～っ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 最後のスパートをかけ、体を激しく振り乱すセーラさん。
line = "最後のスパートをかけ、体を激しく振り乱すセーラさん。"

[[dialogue]]
speaker = "unk"
# 俺も無理やり腰を使ってペニスを突き立てる。
line = "俺も無理やり腰を使ってペニスを突き立てる。"

[[dialogue]]
speaker = "セーラ"
# 「ひあぁっ<emoji=heart04>　あんっ<emoji=heart04>　あぁんっ<emoji=heart04>　下から突かれてっ……うちの奥、ズンズンされてるっ……<emoji=heart04>　ふぁああっ、あっ、はぁっ……<emoji=heart04>」
line = "「ひあぁっ<emoji=heart04>　あんっ<emoji=heart04>　あぁんっ<emoji=heart04>　下から突かれてっ……うちの奥、ズンズンされてるっ……<emoji=heart04>　ふぁああっ、あっ、はぁっ……<emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
# 「奥に当たるの、すごいっ……<emoji=heart04>　んんっ<emoji=heart04>　はっ、あんっ<emoji=heart04>　子宮にコツコツ当たって、気持ちいいっ……はぁ、はっ……んん～～っ<emoji=heart04>」
line = "「奥に当たるの、すごいっ……<emoji=heart04>　んんっ<emoji=heart04>　はっ、あんっ<emoji=heart04>　子宮にコツコツ当たって、気持ちいいっ……はぁ、はっ……んん～～っ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 亀頭が子宮口にぶつかった瞬間、豊かな胸がさらに大きく揺れる。
line = "亀頭が子宮口にぶつかった瞬間、豊かな胸がさらに大きく揺れる。"

[[dialogue]]
speaker = "セーラ"
# 「会長さんのおち○ちん、好きっ……気持ちいいっ……ふぁっ、はぁんっ<emoji=heart04>　んっ、あっ、ああぁっ……<emoji=heart04>」
line = "「会長さんのおち○ちん、好きっ……気持ちいいっ……ふぁっ、はぁんっ<emoji=heart04>　んっ、あっ、ああぁっ……<emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
# 「んんっ<emoji=heart04>　はぁっ、あぁっ……<emoji=heart04>　あんっ……あんっ……あんっ<emoji=heart04>　こんなのクセになるっ……忘れられなくなっちゃうっ……<emoji=heart04>」
line = "「んんっ<emoji=heart04>　はぁっ、あぁっ……<emoji=heart04>　あんっ……あんっ……あんっ<emoji=heart04>　こんなのクセになるっ……忘れられなくなっちゃうっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 射精寸前の亀頭は敏感なんてレベルじゃなく、奥に衝突する度に意識が飛びそうだ。
line = "射精寸前の亀頭は敏感なんてレベルじゃなく、奥に衝突する度に意識が飛びそうだ。"

[[dialogue]]
speaker = "unk"
# 熱く滾った精が尿道を昇って今か今かと放出を待ちわびる。
line = "熱く滾った精が尿道を昇って今か今かと放出を待ちわびる。"

[[dialogue]]
speaker = "セーラ"
# 「おま○こ、熱いぃっ……おち○ちん、ズボズボ入ってきてっ……ふあぁっ、はっ……はぁんっ……<emoji=heart04>」
line = "「おま○こ、熱いぃっ……おち○ちん、ズボズボ入ってきてっ……ふあぁっ、はっ……はぁんっ……<emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
# 「ふあぁっ、あっ、あんっ……<emoji=heart04>　はぁっ……はっ、はっ、はんっ<emoji=heart04>　気持ち、よすぎっ……おち○ちん大好きになるぅっ……<emoji=heart04>」
line = "「ふあぁっ、あっ、あんっ……<emoji=heart04>　はぁっ……はっ、はっ、はんっ<emoji=heart04>　気持ち、よすぎっ……おち○ちん大好きになるぅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 膣内は大量の蜜で溢れ、溶けてしまいそうなほど。
line = "膣内は大量の蜜で溢れ、溶けてしまいそうなほど。"

[[dialogue]]
speaker = "unk"
# 愛液をまとった肉のひだでパンパンに膨れたペニスを舐め回され、血が沸騰してしまいそうだ。
line = "愛液をまとった肉のひだでパンパンに膨れたペニスを舐め回され、血が沸騰してしまいそうだ。"

[[dialogue]]
speaker = "セーラ"
# 「会長さんのせーし、欲しい……欲しいよぉっ……<emoji=heart04>　出して……あっついせーえき、ビューってうちの奥に出してぇっ<emoji=heart04>」
line = "「会長さんのせーし、欲しい……欲しいよぉっ……<emoji=heart04>　出して……あっついせーえき、ビューってうちの奥に出してぇっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
