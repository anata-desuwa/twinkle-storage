[[dialogue]]
speaker = "unk"
# けれどセーラさんは亀頭に子宮口を密着させたまま、俺の射精を受け止めていた。
line = "けれどセーラさんは亀頭に子宮口を密着させたまま、俺の射精を受け止めていた。"

[[dialogue]]
speaker = "セーラ"
# 「えへへへっ……たくさん出たね……ちょっと溢れちゃってる」
line = "「えへへへっ……たくさん出たね……ちょっと溢れちゃってる」"

[[dialogue]]
speaker = "unk"
# 繋がったところから白くどろりとした精液が垂れ落ちる。
line = "繋がったところから白くどろりとした精液が垂れ落ちる。"

[[dialogue]]
speaker = "unk"
# セーラさんの中にそれだけ大量の精を注いだ証だ。
line = "セーラさんの中にそれだけ大量の精を注いだ証だ。"

[[dialogue]]
speaker = "セーラ"
# 「いっぱい出してくれてありがとう。君の気持ち受け取ったよ」
line = "「いっぱい出してくれてありがとう。君の気持ち受け取ったよ」"

[[dialogue]]
speaker = "セーラ"
# 「でも子どもは世界を守って、うちが社長になってからだね。その時は会長さんは社長夫人……じゃなくて社長<ruby=ふくん>夫君</ruby>だね。夫人の反対は夫君って言うんだよ、本で読んだ」
line = "「でも子どもは世界を守って、うちが社長になってからだね。その時は会長さんは社長夫人……じゃなくて社長<ruby>夫君<rt>ふくん</rt></ruby>だね。夫人の反対は夫君って言うんだよ、本で読んだ」"

[[dialogue]]
speaker = "セーラ"
# 「ふぅ～、誰も来なくてよかった。だけど気持ち良すぎて癖になっちゃいそう。うちがしたくなったら、またしてくれる？」
line = "「ふぅ～、誰も来なくてよかった。だけど気持ち良すぎて癖になっちゃいそう。うちがしたくなったら、またしてくれる？」"

[[dialogue]]
speaker = "unk"
# 無論というか当然というか、むしろ俺がセーラさんを求めすぎないか心配なくらいだ。
line = "無論というか当然というか、むしろ俺がセーラさんを求めすぎないか心配なくらいだ。"

[[dialogue]]
speaker = "セーラ"
# 「オッケー？　それじゃ最後に……ん～……ちゅっ<emoji=heart04>」
line = "「オッケー？　それじゃ最後に……ん～……ちゅっ<emoji=heart04>」"
