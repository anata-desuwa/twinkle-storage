speaker = "unk"
# 膣がペニスを全て呑み込み、とろとろの粘膜が精を搾り取ろうと強く締め付ける。
line = "膣がペニスを全て呑み込み、とろとろの粘膜が精を搾り取ろうと強く締め付ける。"

