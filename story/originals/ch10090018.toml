line = "「あ──んんぁあああぁあ～～～～～～っ<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 子宮口に亀頭が届き、セーラさんの奥に情欲を叩きつける。
line = "子宮口に亀頭が届き、セーラさんの奥に情欲を叩きつける。"

[[dialogue]]
speaker = "セーラ"
# 「んんんっ……はぁんっ……<emoji=heart04>　中でおち○ちん、ビクビクしてっ、熱いの出てるぅっ…………ぅあっ、はぁっ……<emoji=heart04>」
line = "「んんんっ……はぁんっ……<emoji=heart04>　中でおち○ちん、ビクビクしてっ、熱いの出てるぅっ…………ぅあっ、はぁっ……<emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
# 「ドクドクって、奥にっ……んんっ……<emoji=heart04>　はぁ、はぁっ……せーし、入ってきてるっ……<emoji=heart04>」
line = "「ドクドクって、奥にっ……んんっ……<emoji=heart04>　はぁ、はぁっ……せーし、入ってきてるっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺の手をぎゅっと握り、震えながら嬌声を上げるセーラさん。
