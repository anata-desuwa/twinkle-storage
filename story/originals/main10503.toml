[[dialogue]]
speaker = "unk"
# 第３話,美鶴へのプレゼントだぴょん！,B
line = "第３話,美鶴へのプレゼントだぴょん！,B"

[[dialogue]]
speaker = "ヴィーナス"
# 「やっほー、美鶴。メリークリスマス♪」
line = "「やっほー、美鶴。メリークリスマス♪」"

[[dialogue]]
speaker = "美鶴"
# 「お嬢様にメイド長……って、メイド長、その格好どしたの？」
line = "「お嬢様にメイド長……って、メイド長、その格好どしたの？」"

[[dialogue]]
speaker = "蘭美"
# 「クリスマスが楽しみ過ぎて浮かれてしまっているのよ！」
line = "「クリスマスが楽しみ過ぎて浮かれてしまっているのよ！」"

[[dialogue]]
speaker = "美鶴"
# 「胸張っていう事じゃないな～、それ」
line = "「胸張っていう事じゃないな～、それ」"

[[dialogue]]
speaker = "蘭美"
# 「張るほど立派な胸じゃないと言いたいのね？　けれど私の胸はそんなに小さくないのよ！」
line = "「張るほど立派な胸じゃないと言いたいのね？　けれど私の胸はそんなに小さくないのよ！」"

[[dialogue]]
speaker = "美鶴"
# 「そんなこと思ってないし……第一、クリスマスまでまだ１週間くらいあるでしょうに。その格好をするのはチョッチ気が早すぎじゃないです？」
line = "「そんなこと思ってないし……第一、クリスマスまでまだ１週間くらいあるでしょうに。その格好をするのはチョッチ気が早すぎじゃないです？」"

[[dialogue]]
speaker = "蘭美"
# 「速いに越したことはないわ。速さこそ大正義なんだから」
line = "「速いに越したことはないわ。速さこそ大正義なんだから」"

[[dialogue]]
speaker = "蘭美"
# 「それに、そんなこと言ったら街のイルミネーションなんて気が早いなんてもんじゃないでしょう？」
line = "「それに、そんなこと言ったら街のイルミネーションなんて気が早いなんてもんじゃないでしょう？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「お店とかでも１２月に入ったらもうクリスマスムードを漂わせてるところあるわよね？」
line = "「お店とかでも１２月に入ったらもうクリスマスムードを漂わせてるところあるわよね？」"

[[dialogue]]
speaker = "美鶴"
# 「お～、確かに。そーゆーもんかと思えてきたかも」
line = "「お～、確かに。そーゆーもんかと思えてきたかも」"

[[dialogue]]
speaker = "蘭美"
# 「それを考えると今回は出遅れてしまったわね。私としたことが……くっ！」
line = "「それを考えると今回は出遅れてしまったわね。私としたことが……くっ！」"

[[dialogue]]
speaker = "美鶴"
# 「いや、そこ悔しがるところ違うって」
line = "「いや、そこ悔しがるところ違うって」"

[[dialogue]]
speaker = "蘭美"
# 「ま、それは冗談として……私がこの格好をしているのには深い理由があるわ」
line = "「ま、それは冗談として……私がこの格好をしているのには深い理由があるわ」"

[[dialogue]]
speaker = "美鶴"
# 「だよね……うーん……見たところ、その仕立ては……当主様のものよね？」
line = "「だよね……うーん……見たところ、その仕立ては……当主様のものよね？」"

[[dialogue]]
speaker = "美鶴"
# 「ってことは、それって新しい人工戦闘服だったりするんかな？」
line = "「ってことは、それって新しい人工戦闘服だったりするんかな？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「さすが美鶴、見ただけで仕立てがヘレナちゃんだってわかっちゃうんだ」
line = "「さすが美鶴、見ただけで仕立てがヘレナちゃんだってわかっちゃうんだ」"

[[dialogue]]
speaker = "美鶴"
# 「まーまー、一応、そっち系が専門ですから」
line = "「まーまー、一応、そっち系が専門ですから」"

[[dialogue]]
speaker = "蘭美"
# 「お察しの通り、これはヘレナ様が新たに開発されたクリスマスフォームの第２弾よ」
line = "「お察しの通り、これはヘレナ様が新たに開発されたクリスマスフォームの第２弾よ」"

[[dialogue]]
speaker = "蘭美"
# 「けれどまだ私は、この戦闘服の力を引き出せていないの。そこで──」
line = "「けれどまだ私は、この戦闘服の力を引き出せていないの。そこで──」"

[[dialogue]]
speaker = "蘭美"
# 「いつも良い子で働いている美鶴──ま、もうちょっとやる気を出してくれると嬉しいけど──そんな美鶴にサンタさんからのクリスマスプレゼントよ！」
line = "「いつも良い子で働いている美鶴──ま、もうちょっとやる気を出してくれると嬉しいけど──そんな美鶴にサンタさんからのクリスマスプレゼントよ！」"

[[dialogue]]
speaker = "美鶴"
# 「おー、いーの？　超ありがとー」
line = "「おー、いーの？　超ありがとー」"

[[dialogue]]
speaker = "蘭美"
# 「あなたね……ダウナーすぎて感情がわからないのよ。喜んでるならもっとちゃんとリアクションしなさい」
line = "「あなたね……ダウナーすぎて感情がわからないのよ。喜んでるならもっとちゃんとリアクションしなさい」"

[[dialogue]]
speaker = "美鶴"
# 「いや、ほんと嬉しいって。さっそく開けてみてもいい？」
line = "「いや、ほんと嬉しいって。さっそく開けてみてもいい？」"

[[dialogue]]
speaker = "蘭美"
# 「もちろんよ。むしろ遅いくらいだわ。今すぐ開けなさい」
line = "「もちろんよ。むしろ遅いくらいだわ。今すぐ開けなさい」"

[[dialogue]]
speaker = "美鶴"
# 「……っ！？　これ……」
line = "「……っ！？　これ……」"

[[dialogue]]
speaker = "蘭美"
# 「そうそう、そういうマジっぽいリアクションが欲しかったのよ」
line = "「そうそう、そういうマジっぽいリアクションが欲しかったのよ」"

[[dialogue]]
speaker = "蘭美"
# 「美鶴にはやっぱりこれかな、と思って裁縫セットにしたわ」
line = "「美鶴にはやっぱりこれかな、と思って裁縫セットにしたわ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ヘレナちゃんに訊いて選んだから、ちゃんとしっかりしたもののはずよ」
line = "「ヘレナちゃんに訊いて選んだから、ちゃんとしっかりしたもののはずよ」"

[[dialogue]]
speaker = "美鶴"
# 「ですね。ありがとうございます、大切に使わせてもらいます」
line = "「ですね。ありがとうございます、大切に使わせてもらいます」"

[[dialogue]]
speaker = "蘭美"
# 「これで服飾の方でも大いに励むのよ！」
line = "「これで服飾の方でも大いに励むのよ！」"

[[dialogue]]
speaker = "美鶴"
# 「いや……マジ嬉しいですよ……これ……」
line = "「いや……マジ嬉しいですよ……これ……」"

[[dialogue]]
speaker = "美鶴"
# 「実はですね、うちが初めて貰ったクリスマスプレゼントも裁縫道具だったんです」
line = "「実はですね、うちが初めて貰ったクリスマスプレゼントも裁縫道具だったんです」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あら、そうだったの？」
line = "「あら、そうだったの？」"

[[dialogue]]
speaker = "美鶴"
# 「実家の仕事がそっち方面じゃないですか。だから母が裁縫してるところをよく見てたんすよ」
line = "「実家の仕事がそっち方面じゃないですか。だから母が裁縫してるところをよく見てたんすよ」"

[[dialogue]]
speaker = "美鶴"
# 「そしたらある時、『美鶴もやってみたいの？』って聞かれたんですよね」
line = "「そしたらある時、『美鶴もやってみたいの？』って聞かれたんですよね」"

[[dialogue]]
speaker = "美鶴"
# 「うんって答えたら、『サンタさんにお願いしてみなさい。クリスマスも近いからプレゼントが届くかもよ』って言われて」
line = "「うんって答えたら、『サンタさんにお願いしてみなさい。クリスマスも近いからプレゼントが届くかもよ』って言われて」"

[[dialogue]]
speaker = "美鶴"
# 「それから毎日サンタさんにお願いして、イブの夜にはちゃんと靴下を枕元に置いて寝たっけ……」
line = "「それから毎日サンタさんにお願いして、イブの夜にはちゃんと靴下を枕元に置いて寝たっけ……」"

[[dialogue]]
speaker = "美鶴"
# 「朝起きた時、枕元にプレゼントを見つけた時は、ちょー嬉しかったな」
line = "「朝起きた時、枕元にプレゼントを見つけた時は、ちょー嬉しかったな」"

[[dialogue]]
speaker = "美鶴"
# 「すぐに母のところに飛んで行って、裁縫を教えてくれってせがんだのを覚えてるよ～」
line = "「すぐに母のところに飛んで行って、裁縫を教えてくれってせがんだのを覚えてるよ～」"

[[dialogue]]
speaker = "蘭美"
# 「ふふっ、いつもダウナーな美鶴からは想像できない喜びようね」
line = "「ふふっ、いつもダウナーな美鶴からは想像できない喜びようね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そんな思い出があったんだ……いいプレゼントを選べたみたいでよかったわ」
line = "「そんな思い出があったんだ……いいプレゼントを選べたみたいでよかったわ」"

[[dialogue]]
speaker = "蘭美"
# 「……あら、これは……？」
line = "「……あら、これは……？」"

[[dialogue]]
speaker = "美鶴"
# 「ん、どしたん？」
line = "「ん、どしたん？」"

[[dialogue]]
speaker = "蘭美"
# 「あなたの話を聞いてたら、クリスマスフォームに少しだけ力が宿ったような気がするわ」
line = "「あなたの話を聞いてたら、クリスマスフォームに少しだけ力が宿ったような気がするわ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「やったじゃない！　プレゼント作戦大成功ね！」
line = "「やったじゃない！　プレゼント作戦大成功ね！」"

[[dialogue]]
speaker = "蘭美"
# 「プレゼントもですが……一緒にクリスマスのエモ話を聞いて回ったら、もっと早く覚醒できるかもしれないわ！」
line = "「プレゼントもですが……一緒にクリスマスのエモ話を聞いて回ったら、もっと早く覚醒できるかもしれないわ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうね！　よーし、この調子でどんどんプレゼントを配っていくわよ！」
line = "「そうね！　よーし、この調子でどんどんプレゼントを配っていくわよ！」"

[[dialogue]]
speaker = "美鶴"
# 「２人ともがんばー」
line = "「２人ともがんばー」"
