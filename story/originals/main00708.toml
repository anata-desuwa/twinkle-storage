[[dialogue]]
speaker = "unk"
# 第８話,物憂げミッション,B
line = "第８話,物憂げミッション,B"

[[dialogue]]
speaker = "クロト"
# 「ヴィーナスがため息？」
line = "「ヴィーナスがため息？」"

[[dialogue]]
speaker = "みんな"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "クロト"
# 「別にため息くらいつくだろう。俺も、ピザ屋でバイトしてた頃、台風なのに注文が舞い込んだ日なんかは……」
line = "「別にため息くらいつくだろう。俺も、ピザ屋でバイトしてた頃、台風なのに注文が舞い込んだ日なんかは……」"

[[dialogue]]
speaker = "マトイ"
# 「そうじゃなくて～。もっと深刻な感じのやつだから！」
line = "「そうじゃなくて～。もっと深刻な感じのやつだから！」"

[[dialogue]]
speaker = "サーシャ"
# 「ヴィーナスちゃんが弱気になることなんて、今まで全然なかったのにねぇ」
line = "「ヴィーナスちゃんが弱気になることなんて、今まで全然なかったのにねぇ」"

[[dialogue]]
speaker = "アナ"
# 「あの『日誌』が──良くも悪くも心の支えになっていたものかと思われます。その上、仮面の少女との一件が尾を引いているものかと」
line = "「あの『日誌』が──良くも悪くも心の支えになっていたものかと思われます。その上、仮面の少女との一件が尾を引いているものかと」"

[[dialogue]]
speaker = "unk"
# ここ数日、弱るヴィーナスの姿は何度も見ていた。
line = "ここ数日、弱るヴィーナスの姿は何度も見ていた。"

[[dialogue]]
speaker = "unk"
# 助けなくちゃいけない相手がいるのに進むべき道がわからない。その焦りは、俺にも理解できるものだった。
line = "助けなくちゃいけない相手がいるのに進むべき道がわからない。その焦りは、俺にも理解できるものだった。"

[[dialogue]]
speaker = "サーシャ"
# 「会長くんはここ最近、図書館によく通ってるわね……？」
line = "「会長くんはここ最近、図書館によく通ってるわね……？」"

[[dialogue]]
speaker = "クロト"
# 「ええ──何か、現状を打開するヒントが得られないかと」
line = "「ええ──何か、現状を打開するヒントが得られないかと」"

[[dialogue]]
speaker = "unk"
# 俺もヴィーナスも──そしてみんなも気持ちは同じだ。
line = "俺もヴィーナスも──そしてみんなも気持ちは同じだ。"

[[dialogue]]
speaker = "unk"
# 『アポロ』の真相を突き止めて、フィオナのお姉さんを解放してやる必要がある。
line = "『アポロ』の真相を突き止めて、フィオナのお姉さんを解放してやる必要がある。"

[[dialogue]]
speaker = "unk"
# 取り返しのつかない事態となってしまう前に……。
line = "取り返しのつかない事態となってしまう前に……。"

[[dialogue]]
speaker = "クロト"
# 「けど……成果は芳しくありません。ヴィーナスが沈み込む気持ちもわからないではないです」
line = "「けど……成果は芳しくありません。ヴィーナスが沈み込む気持ちもわからないではないです」"

[[dialogue]]
speaker = "サーシャ"
# 「かもしれないわ。私たちも、どうすればいいか途方に暮れてる」
line = "「かもしれないわ。私たちも、どうすればいいか途方に暮れてる」"

[[dialogue]]
speaker = "サーシャ"
# 「でもね会長くん。今は有事でもないのに、私たちのツートップが意気消沈していたら、学園のみんなはどう思うかしら」
line = "「でもね会長くん。今は有事でもないのに、私たちのツートップが意気消沈していたら、学園のみんなはどう思うかしら」"

[[dialogue]]
speaker = "クロト"
# 「む──確かに。みんなの士気に関わりますね」
line = "「む──確かに。みんなの士気に関わりますね」"

[[dialogue]]
speaker = "マトイ"
# 「そうそう。ヴィーナスがあの調子だと、なんかこっちまで滅入るっていうか」
line = "「そうそう。ヴィーナスがあの調子だと、なんかこっちまで滅入るっていうか」"

[[dialogue]]
speaker = "アナ"
# 「ここ数日は──アステラの出現もなく安定しています。もちろん仮面の少女も見つかっておりません」
line = "「ここ数日は──アステラの出現もなく安定しています。もちろん仮面の少女も見つかっておりません」"

[[dialogue]]
speaker = "アナ"
# 「よって、今のうちに英気を養っておくのも必要なのではないかと」
line = "「よって、今のうちに英気を養っておくのも必要なのではないかと」"

[[dialogue]]
speaker = "サーシャ"
# 「そう。なので会長くんに命令です。ヴィーナスちゃんを元気づけてあげること♪」
line = "「そう。なので会長くんに命令です。ヴィーナスちゃんを元気づけてあげること♪」"

[[dialogue]]
speaker = "クロト"
# 「元気づける──ヴィーナスを、ですか」
line = "「元気づける──ヴィーナスを、ですか」"

[[dialogue]]
speaker = "unk"
# 考えたこともない行為だった。
line = "考えたこともない行為だった。"

[[dialogue]]
speaker = "unk"
# なぜなら頭に浮かぶ限り、ヴィーナスは常に元気な存在だったからだ。
line = "なぜなら頭に浮かぶ限り、ヴィーナスは常に元気な存在だったからだ。"

[[dialogue]]
speaker = "クロト"
# 「じゃあ、今度のパトロールにでも誘ってみましょうか」
line = "「じゃあ、今度のパトロールにでも誘ってみましょうか」"

[[dialogue]]
speaker = "サーシャ"
# 「それじゃお仕事になっちゃうわねえ。もっとリラックスできる時間が要ると思うのよ」
line = "「それじゃお仕事になっちゃうわねえ。もっとリラックスできる時間が要ると思うのよ」"

[[dialogue]]
speaker = "クロト"
# 「リラックスですか」
line = "「リラックスですか」"

[[dialogue]]
speaker = "マトイ"
# 「えっと……ほら、あるじゃない？　女の子を誘って、外に出かけたり、一緒においしいもの食べたり」
line = "「えっと……ほら、あるじゃない？　女の子を誘って、外に出かけたり、一緒においしいもの食べたり」"

[[dialogue]]
speaker = "サーシャ"
# 「頭にデがつくやつね♪」
line = "「頭にデがつくやつね♪」"

[[dialogue]]
speaker = "アナ"
# 「ついでに現会長も羽を伸ばせると、なおよいです」
line = "「ついでに現会長も羽を伸ばせると、なおよいです」"

[[dialogue]]
speaker = "クロト"
# 「む……なるほど。確かにそう言われてみると、ヴィーナスと遊んだことはなかったな」
line = "「む……なるほど。確かにそう言われてみると、ヴィーナスと遊んだことはなかったな」"

[[dialogue]]
speaker = "マトイ"
# 「遊ぶっていうか、まあ……」
line = "「遊ぶっていうか、まあ……」"

[[dialogue]]
speaker = "unk"
# マトイはなぜか俺から目を逸らしていた。
line = "マトイはなぜか俺から目を逸らしていた。"

[[dialogue]]
speaker = "unk"
# どこか頬が染まっているようにも見えるが、理由はよくわからない。
line = "どこか頬が染まっているようにも見えるが、理由はよくわからない。"

[[dialogue]]
speaker = "クロト"
# 「要するに──ヴィーナスを遊びに誘えばいいんだな？」
line = "「要するに──ヴィーナスを遊びに誘えばいいんだな？」"

[[dialogue]]
speaker = "アナ"
# 「…………まあ、それでいいです」
line = "「…………まあ、それでいいです」"

[[dialogue]]
speaker = "unk"
# ──そういうわけで、俺はみんなからヴィーナスを元気づける役目を仰せつかった。
line = "──そういうわけで、俺はみんなからヴィーナスを元気づける役目を仰せつかった。"

[[dialogue]]
speaker = "unk"
# 今の俺は星徒会長で──今のヴィーナスはその役員なのだ。
line = "今の俺は星徒会長で──今のヴィーナスはその役員なのだ。"

[[dialogue]]
speaker = "unk"
# そう考えると、会長として果たすべき責務のようにも思えてきた。
line = "そう考えると、会長として果たすべき責務のようにも思えてきた。"
