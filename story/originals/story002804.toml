[[dialogue]]
speaker = "ウィステリア"
# 「こっちからいくわよ！　フォビドゥン──」
line = "「こっちからいくわよ！　フォビドゥン──」"

[[dialogue]]
speaker = "ウィステリア"
# 「！？　いつもの手ごたえがない！？」
line = "「！？　いつもの手ごたえがない！？」"

[[dialogue]]
speaker = "ヴィライア"
# 『魔力が使えなくて驚いたかしら』
line = "『魔力が使えなくて驚いたかしら』"

[[dialogue]]
speaker = "ヴィライア"
# 『その魔導書も深淵書庫の一部と言ったはず。私の管理権限で機能を止めてあるわ』
line = "『その魔導書も深淵書庫の一部と言ったはず。私の管理権限で機能を止めてあるわ』"

[[dialogue]]
speaker = "ウィステリア"
# 「やり方がみみっちいわよ！」
line = "「やり方がみみっちいわよ！」"

[[dialogue]]
speaker = "ヴィライア"
# 『なんとでも言いなさい』
line = "『なんとでも言いなさい』"

[[dialogue]]
speaker = "ヴィライア"
# 『今のあなたは呪いも魔力も使えない、ただの星騎士よ。魔王でもない身で、破滅の化身に勝てると思っているの？』
line = "『今のあなたは呪いも魔力も使えない、ただの星騎士よ。魔王でもない身で、破滅の化身に勝てると思っているの？』"

[[dialogue]]
speaker = "ウィステリア"
# 「破滅の化身？　ならそれこそ、星騎士の出番じゃない」
line = "「破滅の化身？　ならそれこそ、星騎士の出番じゃない」"

[[dialogue]]
speaker = "ウィステリア"
# 「ちょっと魔導書が使えないくらいで絶望してたらキリカに笑われちゃうわ」
line = "「ちょっと魔導書が使えないくらいで絶望してたらキリカに笑われちゃうわ」"

[[dialogue]]
speaker = "ウィステリア"
# 「星力だけで闘うのは初めてだけど……っ！」
line = "「星力だけで闘うのは初めてだけど……っ！」"

[[dialogue]]
speaker = "ヴィライア"
# 『あら、思ったよりはやるようね』
line = "『あら、思ったよりはやるようね』"

[[dialogue]]
speaker = "ヴィライア"
# 『だけど効かないわ。普通のモンスター程度ならともかく、煌竜の前には児戯に等しい』
line = "『だけど効かないわ。普通のモンスター程度ならともかく、煌竜の前には児戯に等しい』"

[[dialogue]]
speaker = "ヴィライア"
# 『己の無力を思い知りなさい──ダークブレイズブレス』
line = "『己の無力を思い知りなさい──ダークブレイズブレス』"

[[dialogue]]
speaker = "ウィステリア"
# 「きゃあああああっ！！」
line = "「きゃあああああっ！！」"

[[dialogue]]
speaker = "ヴィライア"
# 『魔王によって、二度もリクリエは退けられた。にも関わらず、滅びの予兆は消えることはない。むしろその気配は濃くなっている』
line = "『魔王によって、二度もリクリエは退けられた。にも関わらず、滅びの予兆は消えることはない。むしろその気配は濃くなっている』"

[[dialogue]]
speaker = "ヴィライア"
# 『あなたにも分かるでしょう？　魔王だけでは世界を救うには足りないのよ』
line = "『あなたにも分かるでしょう？　魔王だけでは世界を救うには足りないのよ』"

[[dialogue]]
speaker = "ウィステリア"
# 「なに、今の衝撃は！？　……書庫の本から魔力が溢れ出してる！？」
line = "「なに、今の衝撃は！？　……書庫の本から魔力が溢れ出してる！？」"

[[dialogue]]
speaker = "ヴィライア"
# 『リクリエの気配に反応して、魔本たちも目覚めようとしているわ。感じるでしょう。呪いをふりまく魔力の波動を』
line = "『リクリエの気配に反応して、魔本たちも目覚めようとしているわ。感じるでしょう。呪いをふりまく魔力の波動を』"

[[dialogue]]
speaker = "ウィステリア"
# 「！　もし、この本の呪いが解き放たれたら──」
line = "「！　もし、この本の呪いが解き放たれたら──」"

[[dialogue]]
speaker = "ヴィライア"
# 『真上にある流星市国は地獄と化すでしょう。人々は発狂し、動植物は魔獣と化す』
line = "『真上にある流星市国は地獄と化すでしょう。人々は発狂し、動植物は魔獣と化す』"

[[dialogue]]
speaker = "ヴィライア"
# 『それがイヤなら、あなたが呪いの“器”になることね』
line = "『それがイヤなら、あなたが呪いの“器”になることね』"

[[dialogue]]
speaker = "ウィステリア"
# 「だからそんなことしたら、廃人になるでしょうが！」
line = "「だからそんなことしたら、廃人になるでしょうが！」"

[[dialogue]]
speaker = "ヴィライア"
# 『ウィステリア。もう一度、言うわ。私たちを受け入れなさい』
line = "『ウィステリア。もう一度、言うわ。私たちを受け入れなさい』"

[[dialogue]]
speaker = "ヴィライア"
# 『一度は引き分けた相手だもの、全ての魔導書を受け入れれば、ヴィライアも容易く倒せるでしょう』
line = "『一度は引き分けた相手だもの、全ての魔導書を受け入れれば、ヴィライアも容易く倒せるでしょう』"

[[dialogue]]
speaker = "ヴィライア"
# 『あなたなら、全ての呪いを背負い、魔王と並ぶ──いえ、魔王すら超える“英雄”になれるわ』
line = "『あなたなら、全ての呪いを背負い、魔王と並ぶ──いえ、魔王すら超える“英雄”になれるわ』"

[[dialogue]]
speaker = "ウィステリア"
# 「はぁ、はぁ……だから英雄はお断りって言ってるでしょ！」
line = "「はぁ、はぁ……だから英雄はお断りって言ってるでしょ！」"

[[dialogue]]
speaker = "ヴィライア"
# 『ブレスを受けて、まだ抵抗する余力があるのね。やはりあなたは“英雄”に相応しいわ』
line = "『ブレスを受けて、まだ抵抗する余力があるのね。やはりあなたは“英雄”に相応しいわ』"

[[dialogue]]
speaker = "ウィステリア"
# 「人の気も知らないで、勝手なこと言わないで！　私は普通の幸せが欲しいのよ！」
line = "「人の気も知らないで、勝手なこと言わないで！　私は普通の幸せが欲しいのよ！」"

[[dialogue]]
speaker = "ウィステリア"
# 「子どもの時からそう。普通の子が親や友達と遊ぶ頃、私は呪いや魔導書の扱いを叩き込まれていた」
line = "「子どもの時からそう。普通の子が親や友達と遊ぶ頃、私は呪いや魔導書の扱いを叩き込まれていた」"

[[dialogue]]
speaker = "ウィステリア"
# 「小鳥を初めて呪い殺した時、嫌悪と後悔で何度も吐いたわ」
line = "「小鳥を初めて呪い殺した時、嫌悪と後悔で何度も吐いたわ」"

[[dialogue]]
speaker = "ウィステリア"
# 「この魔導書を手にした時も、気が狂いそうになって、呪いの痛みで眠ることもできなくて、また狂いそうになって、三日三晩苦しんで、なんとか生還できた」
line = "「この魔導書を手にした時も、気が狂いそうになって、呪いの痛みで眠ることもできなくて、また狂いそうになって、三日三晩苦しんで、なんとか生還できた」"

[[dialogue]]
speaker = "ウィステリア"
# 「そんな魔窟みたいな実家を抜け出して、ようやく<ruby=ここ>人間界</ruby>まで来たの」
line = "「そんな魔窟みたいな実家を抜け出して、ようやく<ruby>人間界<rt>ここ</rt></ruby>まで来たの」"

[[dialogue]]
speaker = "ウィステリア"
# 「私が欲しいのは、世界を救う力なんかじゃない」
line = "「私が欲しいのは、世界を救う力なんかじゃない」"

[[dialogue]]
speaker = "ウィステリア"
# 「普通の恋と、美味しいスイーツ。それだけよ」
line = "「普通の恋と、美味しいスイーツ。それだけよ」"

[[dialogue]]
speaker = "ヴィライア"
# 『そう、残念だわ。最後まで抗うというなら、ねじ伏せるまで』
line = "『そう、残念だわ。最後まで抗うというなら、ねじ伏せるまで』"

[[dialogue]]
speaker = "ヴィライア"
# 『ダークブレイズブレス』
line = "『ダークブレイズブレス』"

[[dialogue]]
speaker = "ウィステリア"
# 「くっ、うう……」
line = "「くっ、うう……」"

[[dialogue]]
speaker = "ウィステリア"
# （啖呵を切ったのはいいけど、万事休す、ね……）
line = "（啖呵を切ったのはいいけど、万事休す、ね……）"

[[dialogue]]
speaker = "ウィステリア"
# （でも諦めちゃダメ……！　考えるのよ、この状況を打開する方法を……！）
line = "（でも諦めちゃダメ……！　考えるのよ、この状況を打開する方法を……！）"
