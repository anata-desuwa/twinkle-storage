[[dialogue]]
speaker = "unk"
# 第４話,せつなへのプレゼントだぴょん！,B
line = "第４話,せつなへのプレゼントだぴょん！,B"

[[dialogue]]
speaker = "せつな"
# 「クリスマスでござるか。もうそんな時期なのでござるな～」
line = "「クリスマスでござるか。もうそんな時期なのでござるな～」"

[[dialogue]]
speaker = "蘭美"
# 「せつなにも何かクリスマスの思い出を語ってもらいたいんだけど、忍者だからクリスマスには縁がないかしら？」
line = "「せつなにも何かクリスマスの思い出を語ってもらいたいんだけど、忍者だからクリスマスには縁がないかしら？」"

[[dialogue]]
speaker = "せつな"
# 「いえいえ、そんなことはないでござるよ」
line = "「いえいえ、そんなことはないでござるよ」"

[[dialogue]]
speaker = "せつな"
# 「クリスマスイブはみんなで赤と白の忍び装束に身を包み、パーティーで大盛り上がりだったでござる」
line = "「クリスマスイブはみんなで赤と白の忍び装束に身を包み、パーティーで大盛り上がりだったでござる」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そんなカラフルな忍者軍団があっていいの？」
line = "「そんなカラフルな忍者軍団があっていいの？」"

[[dialogue]]
speaker = "蘭美"
# 「全く身を隠せそうにないわね」
line = "「全く身を隠せそうにないわね」"

[[dialogue]]
speaker = "せつな"
# 「里にアステラが発生して被害を受けるまで毎年やっていたでござるよ」
line = "「里にアステラが発生して被害を受けるまで毎年やっていたでござるよ」"

[[dialogue]]
speaker = "せつな"
# 「みんなでクリスマスツリーを飾りつけして、プレゼント交換会をひらいていたでござる」
line = "「みんなでクリスマスツリーを飾りつけして、プレゼント交換会をひらいていたでござる」"

[[dialogue]]
speaker = "せつな"
# 「師匠の用意してくれる料理、ケーキやチキンも美味だったでござるな～」
line = "「師匠の用意してくれる料理、ケーキやチキンも美味だったでござるな～」"

[[dialogue]]
speaker = "蘭美"
# 「師匠？」
line = "「師匠？」"

[[dialogue]]
speaker = "せつな"
# 「せつなの育ての親であり、忍術の師匠でもある人でござる」
line = "「せつなの育ての親であり、忍術の師匠でもある人でござる」"

[[dialogue]]
speaker = "ヴィーナス"
# 「シズルさん、だったかしら？」
line = "「シズルさん、だったかしら？」"

[[dialogue]]
speaker = "せつな"
# 「左様でござる。みんなを集めてクリスマスパーティーを開いてくれていたのも師匠でござった」
line = "「左様でござる。みんなを集めてクリスマスパーティーを開いてくれていたのも師匠でござった」"

[[dialogue]]
speaker = "せつな"
# 「いやはや、懐かしき日々でござるなあ」
line = "「いやはや、懐かしき日々でござるなあ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「へぇ～、楽しそうじゃない。いつか私も参加してみたいわ」
line = "「へぇ～、楽しそうじゃない。いつか私も参加してみたいわ」"

[[dialogue]]
speaker = "蘭美"
# 「紫桜の里の復興も進んでいるし、そのパーティーが再開される日も近いんじゃないかしら？」
line = "「紫桜の里の復興も進んでいるし、そのパーティーが再開される日も近いんじゃないかしら？」"

[[dialogue]]
speaker = "せつな"
# 「実はせつなが学園に来る前の年に復活したでござる」
line = "「実はせつなが学園に来る前の年に復活したでござる」"

[[dialogue]]
speaker = "せつな"
# 「今までで一番盛大なパーティーになって、楽しかったでござるよ」
line = "「今までで一番盛大なパーティーになって、楽しかったでござるよ」"

[[dialogue]]
speaker = "蘭美"
# 「よかったわね、せつな」
line = "「よかったわね、せつな」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そのパーティーの代わりと言ってはなんだけど、今年は私たちからクリスマスプレゼントを用意したわよ！」
line = "「そのパーティーの代わりと言ってはなんだけど、今年は私たちからクリスマスプレゼントを用意したわよ！」"

[[dialogue]]
speaker = "せつな"
# 「何と！　誠でござるか！？」
line = "「何と！　誠でござるか！？」"

[[dialogue]]
speaker = "蘭美"
# 「せつなには……これよ！」
line = "「せつなには……これよ！」"

[[dialogue]]
speaker = "せつな"
# 「ありがたき幸せにござる。一体何でござろうか……」
line = "「ありがたき幸せにござる。一体何でござろうか……」"

[[dialogue]]
speaker = "せつな"
# 「おおっ、これは！　望遠鏡ではござらぬか！！」
line = "「おおっ、これは！　望遠鏡ではござらぬか！！」"

[[dialogue]]
speaker = "蘭美"
# 「これがあれば遠くから敵の様子もうかがえるし、今よりも忍びやすくなるんじゃないかしら？」
line = "「これがあれば遠くから敵の様子もうかがえるし、今よりも忍びやすくなるんじゃないかしら？」"

[[dialogue]]
speaker = "せつな"
# 「そうでござるな。これがあれば『クリスマスの夜の謎』も明らかにできるかもしれないでござる」
line = "「そうでござるな。これがあれば『クリスマスの夜の謎』も明らかにできるかもしれないでござる」"

[[dialogue]]
speaker = "ヴィーナス"
# 「えっ、何それ面白そう！　そんなものがあるの？」
line = "「えっ、何それ面白そう！　そんなものがあるの？」"

[[dialogue]]
speaker = "蘭美"
# 「私も興味があるわ。その話、聞かせてくれるかしら？」
line = "「私も興味があるわ。その話、聞かせてくれるかしら？」"

[[dialogue]]
speaker = "せつな"
# 「不思議な話でござる……夜も更けて宴もたけなわになると、何故か大人たちがひとり、またひとりと姿を消していくでござる」
line = "「不思議な話でござる……夜も更けて宴もたけなわになると、何故か大人たちがひとり、またひとりと姿を消していくでござる」"

[[dialogue]]
speaker = "せつな"
# 「興味を持った者たちで大人たちの行方を追おうとしたのでござるが、忍びの技術も未熟な子供ではそれも叶わず──」
line = "「興味を持った者たちで大人たちの行方を追おうとしたのでござるが、忍びの技術も未熟な子供ではそれも叶わず──」"

[[dialogue]]
speaker = "せつな"
# 「ですが朝になれば姿を消したはずの大人たちは、まるで何事もなかったかのように現れるのでござる」
line = "「ですが朝になれば姿を消したはずの大人たちは、まるで何事もなかったかのように現れるのでござる」"

[[dialogue]]
speaker = "せつな"
# 「そしてせつなたちが何を訊ねようと、夜の出来事について大人たちは一様に口を噤むのでござる」
line = "「そしてせつなたちが何を訊ねようと、夜の出来事について大人たちは一様に口を噤むのでござる」"

[[dialogue]]
speaker = "せつな"
# 「長年、謎に包まれていたクリスマスの夜の謎！」
line = "「長年、謎に包まれていたクリスマスの夜の謎！」"

[[dialogue]]
speaker = "せつな"
# 「この望遠鏡があれば大人たちが一体何をいたしているのか、全てを白日のもとに晒すことが出来るかもしれないでござるよ！」
line = "「この望遠鏡があれば大人たちが一体何をいたしているのか、全てを白日のもとに晒すことが出来るかもしれないでござるよ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「不思議な話ね、クリスマスの夜に怪奇現象なんて……実害はないみたいだけど」
line = "「不思議な話ね、クリスマスの夜に怪奇現象なんて……実害はないみたいだけど」"

[[dialogue]]
speaker = "蘭美"
# 「真相が分かったら私たちにも教えなさい」
line = "「真相が分かったら私たちにも教えなさい」"

[[dialogue]]
speaker = "せつな"
# 「お任せでござる！　お嬢様、蘭美殿、感謝でござる！」
line = "「お任せでござる！　お嬢様、蘭美殿、感謝でござる！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……人が消えていくなんて、クリスマスの思い出っていうより、恐い思い出だったわね」
line = "「……人が消えていくなんて、クリスマスの思い出っていうより、恐い思い出だったわね」"

[[dialogue]]
speaker = "蘭美"
# 「まあそれでも思い出には変わらないわ。せつなの話でまた少し力がこもったみたいだし」
line = "「まあそれでも思い出には変わらないわ。せつなの話でまた少し力がこもったみたいだし」"

[[dialogue]]
speaker = "ヴィーナス"
# 「だったらオッケーね。それじゃ次に行くわよ！」
line = "「だったらオッケーね。それじゃ次に行くわよ！」"
