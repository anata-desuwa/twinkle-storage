[[dialogue]]
speaker = "unk"
# 第４話,夜の浜辺にて,P
line = "第４話,夜の浜辺にて,P"

[[dialogue]]
speaker = "セドナ"
# 「魔王よ。次のネビュラとの合同訓練についてだが……む？　お前、随分とくたびれた顔をしているな」
line = "「魔王よ。次のネビュラとの合同訓練についてだが……む？　お前、随分とくたびれた顔をしているな」"

[[dialogue]]
speaker = "unk"
# ここのところ、忙しくて……
line = "ここのところ、忙しくて……"

[[dialogue]]
speaker = "セドナ"
# 「……また仕事を詰め込んだか。仕方のないやつだ。今日はもうオフにしろ。出かけるぞ」
line = "「……また仕事を詰め込んだか。仕方のないやつだ。今日はもうオフにしろ。出かけるぞ」"

[[dialogue]]
speaker = "セドナ"
# 「どこにって……気分転換だ。黙ってついてこい」
line = "「どこにって……気分転換だ。黙ってついてこい」"

[[dialogue]]
speaker = "unk"
# そうして俺は、仕事を進める手を止め、セドナさんの背中を追いかけて──
line = "そうして俺は、仕事を進める手を止め、セドナさんの背中を追いかけて──"

[[dialogue]]
speaker = "セドナ"
# 「どうだ魔王。誰もいない夜の浜辺は心が休まるだろう」
line = "「どうだ魔王。誰もいない夜の浜辺は心が休まるだろう」"

[[dialogue]]
speaker = "セドナ"
# 「潮騒と、焚き火の爆ぜる音で心を休めるといい」
line = "「潮騒と、焚き火の爆ぜる音で心を休めるといい」"

[[dialogue]]
speaker = "セドナ"
# 「フ──魔力で作った焚き火に当たれるなど、なかなかない経験だろう？」
line = "「フ──魔力で作った焚き火に当たれるなど、なかなかない経験だろう？」"

[[dialogue]]
speaker = "unk"
# たしかに癒されますね、これは
line = "たしかに癒されますね、これは"

[[dialogue]]
speaker = "セドナ"
# 「焚き火は、私の昔からのストレス解消法でな。静かな場所でパチパチと揺れる火を見つめていると、心が安らぐ」
line = "「焚き火は、私の昔からのストレス解消法でな。静かな場所でパチパチと揺れる火を見つめていると、心が安らぐ」"

[[dialogue]]
speaker = "セドナ"
# 「今だけは仕事を忘れ、リラックスしろ。クーラーボックスにある飲み物も、何でも好きに飲むがいい」
line = "「今だけは仕事を忘れ、リラックスしろ。クーラーボックスにある飲み物も、何でも好きに飲むがいい」"

[[dialogue]]
speaker = "セドナ"
# 「……しかし。お前は組織のトップを担う身だ。激務なのは承知しているが、体は大切にしなくては駄目だろう」
line = "「……しかし。お前は組織のトップを担う身だ。激務なのは承知しているが、体は大切にしなくては駄目だろう」"

[[dialogue]]
speaker = "セドナ"
# 「…………なんだ、人の顔をジロジロと見て」
line = "「…………なんだ、人の顔をジロジロと見て」"

[[dialogue]]
speaker = "unk"
# セドナさん、雰囲気が変わりましたね
line = "セドナさん、雰囲気が変わりましたね"

[[dialogue]]
speaker = "セドナ"
# 「……ああ、そうかもしれないな」
line = "「……ああ、そうかもしれないな」"

[[dialogue]]
speaker = "セドナ"
# 「最近はネビュラの部下も、私の前で必要以上に緊張することもなくなった……気がする」
line = "「最近はネビュラの部下も、私の前で必要以上に緊張することもなくなった……気がする」"

[[dialogue]]
speaker = "セドナ"
# 「業務の終わりに食事に誘われたり、プライベートの相談をされたり」
line = "「業務の終わりに食事に誘われたり、プライベートの相談をされたり」"

[[dialogue]]
speaker = "セドナ"
# 「人間と深く交わるようになってから、我々魔女も変化している。おそらく、良い方向へ」
line = "「人間と深く交わるようになってから、我々魔女も変化している。おそらく、良い方向へ」"

[[dialogue]]
speaker = "セドナ"
# 「昔の私が見たら驚くだろうな。無理をするお前に仕事を休めなどと言わなかったに違いない。こうして浜辺で焚き火を囲むことも……」
line = "「昔の私が見たら驚くだろうな。無理をするお前に仕事を休めなどと言わなかったに違いない。こうして浜辺で焚き火を囲むことも……」"

[[dialogue]]
speaker = "unk"
# だからこそ、嬉しいです
line = "だからこそ、嬉しいです"

[[dialogue]]
speaker = "セドナ"
# 「こんなことで嬉しいとは。やはりお前は変わっている」
line = "「こんなことで嬉しいとは。やはりお前は変わっている」"

[[dialogue]]
speaker = "セドナ"
# 「…………以前にお前は、私のことを『個人的に支えたい』と言ったな。覚えているか？」
line = "「…………以前にお前は、私のことを『個人的に支えたい』と言ったな。覚えているか？」"

[[dialogue]]
speaker = "unk"
# もちろんです
line = "もちろんです"

[[dialogue]]
speaker = "セドナ"
# 「最初こそ面倒だと思ったものだが……フフ。今ならよくわかる。信頼のおける者からの支えがあるのは、心強い」
line = "「最初こそ面倒だと思ったものだが……フフ。今ならよくわかる。信頼のおける者からの支えがあるのは、心強い」"

[[dialogue]]
speaker = "セドナ"
# 「そして今は、私も同じ気持ちだ。お前のことを支えたいと思っている」
line = "「そして今は、私も同じ気持ちだ。お前のことを支えたいと思っている」"

[[dialogue]]
speaker = "セドナ"
# 「同盟を組んだネビュラの幹部としても──個人的にも、だ」
line = "「同盟を組んだネビュラの幹部としても──個人的にも、だ」"

[[dialogue]]
speaker = "unk"
# お付き合いしてくれるってことですか？
line = "お付き合いしてくれるってことですか？"

[[dialogue]]
speaker = "unk"
# ……それってつまり
line = "……それってつまり"

[[dialogue]]
speaker = "セドナ"
# 「……人間はそうやってすぐ言葉にしたがるから困る。好きに解釈すればいいだろう。私は肯定も否定もしない」
line = "「……人間はそうやってすぐ言葉にしたがるから困る。好きに解釈すればいいだろう。私は肯定も否定もしない」"

[[dialogue]]
speaker = "unk"
# 好きですよ、セドナさん
line = "好きですよ、セドナさん"

[[dialogue]]
speaker = "セドナ"
# 「…………肯定も否定もしないと言ったばかりだぞ。仕方のないやつだ」
line = "「…………肯定も否定もしないと言ったばかりだぞ。仕方のないやつだ」"

[[dialogue]]
speaker = "セドナ"
# 「……今だけ、人間界の郷に従ってやる」
line = "「……今だけ、人間界の郷に従ってやる」"

[[dialogue]]
speaker = "セドナ"
# 「ん──ちゅっ……<emoji=heart04>」
line = "「ん──ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "セドナ"
# 「フフ……なんだお前、その顔は。なかなかに愉快だぞ」
line = "「フフ……なんだお前、その顔は。なかなかに愉快だぞ」"

[[dialogue]]
speaker = "セドナ"
# 「いいものが見られた。口付けをしてやった甲斐があったな」
line = "「いいものが見られた。口付けをしてやった甲斐があったな」"

[[dialogue]]
speaker = "セドナ"
# 「──ああ。これからもよろしく頼むぞ、魔王」
line = "「──ああ。これからもよろしく頼むぞ、魔王」"

[[dialogue]]
speaker = "unk"
# 星騎士と魔女。それぞれの組織を背負って立つ俺たちは、その夜。お互いの気持ちをしっかりと確かめ合ったのだった──
line = "星騎士と魔女。それぞれの組織を背負って立つ俺たちは、その夜。お互いの気持ちをしっかりと確かめ合ったのだった──"
