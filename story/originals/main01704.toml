[[dialogue]]
speaker = "unk"
# 第４話,覇霊玉,B
line = "第４話,覇霊玉,B"

[[dialogue]]
speaker = "unk"
# が──
line = "が──"

[[dialogue]]
speaker = "ギエル"
# 「邪魔です──下がりなさい、小童ども！」
line = "「邪魔です──下がりなさい、小童ども！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「な──きゃあっ！？」
line = "「な──きゃあっ！？」"

[[dialogue]]
speaker = "アポロ"
# 「くっ──！？」
line = "「くっ──！？」"

[[dialogue]]
speaker = "unk"
# またしても拡散する『影』の波動が──あらゆる侵攻を弾き飛ばした。
line = "またしても拡散する『影』の波動が──あらゆる侵攻を弾き飛ばした。"

[[dialogue]]
speaker = "アナ"
# 「なんです──あの妙な闇は……」
line = "「なんです──あの妙な闇は……」"

[[dialogue]]
speaker = "クロト"
# 「ああ──以前戦った時より、数段手強い……！」
line = "「ああ──以前戦った時より、数段手強い……！」"

[[dialogue]]
speaker = "アポロ"
# 「おかしい──あたしは、ギエルにあんな力は与えてないぞ……！」
line = "「おかしい──あたしは、ギエルにあんな力は与えてないぞ……！」"

[[dialogue]]
speaker = "unk"
# 今までのギエルとは違う。そして仮面に操られていたアポロとも違う。桁違いの『影』の奔流。
line = "今までのギエルとは違う。そして仮面に操られていたアポロとも違う。桁違いの『影』の奔流。"

[[dialogue]]
speaker = "unk"
# そんな未知のオーラの発露に、アポロでさえ驚いていた。
line = "そんな未知のオーラの発露に、アポロでさえ驚いていた。"

[[dialogue]]
speaker = "ギエル"
# 「くくっ……おおっ……なんでしょうか、この力は」
line = "「くくっ……おおっ……なんでしょうか、この力は」"

[[dialogue]]
speaker = "ギエル"
# 「胸の奥底から湧き上がってくるような……万能感を覚えます。おお、なんという祝福であることか！」
line = "「胸の奥底から湧き上がってくるような……万能感を覚えます。おお、なんという祝福であることか！」"

[[dialogue]]
speaker = "unk"
# 仮面に宿っていた瘴気とギエルの『影』はたちまち融合し、やがて燕尾服の胸元へと吸い込まれていった。
line = "仮面に宿っていた瘴気とギエルの『影』はたちまち融合し、やがて燕尾服の胸元へと吸い込まれていった。"

[[dialogue]]
speaker = "unk"
# そして……
line = "そして……"

[[dialogue]]
speaker = "セーラ"
# 「待って──何か出てきたよ！」
line = "「待って──何か出てきたよ！」"

[[dialogue]]
speaker = "ニャリオン"
# 「ニャ──！？」
line = "「ニャ──！？」"

[[dialogue]]
speaker = "マトイ"
# 「あのオーブって──」
line = "「あのオーブって──」"

[[dialogue]]
speaker = "unk"
# ギエルの胸から現れた球体──
line = "ギエルの胸から現れた球体──"

[[dialogue]]
speaker = "unk"
# それは、第零層の最奥に置かれていた緋色のオーブだった。
line = "それは、第零層の最奥に置かれていた緋色のオーブだった。"

[[dialogue]]
speaker = "リノ"
# 「あれはもしかして──覇霊玉……！？」
line = "「あれはもしかして──覇霊玉……！？」"

[[dialogue]]
speaker = "クロト"
# 「！　知ってるのか……母さん？」
line = "「！　知ってるのか……母さん？」"

[[dialogue]]
speaker = "リノ"
# 「文献にあった特徴と一致しているわ。あなた達こそ……あれを見たことがあるの？」
line = "「文献にあった特徴と一致しているわ。あなた達こそ……あれを見たことがあるの？」"

[[dialogue]]
speaker = "アナ"
# 「はい。人間界へ戻ってくる際、フィーニスの塔の内部で──」
line = "「はい。人間界へ戻ってくる際、フィーニスの塔の内部で──」"

[[dialogue]]
speaker = "敗残の亡霊"
# 『俺ハ……俺ハ決して滅びぬ……！　リクリエの到来と共に……チャカパラ様の誕生を見届けるまで……！』
line = "『俺ハ……俺ハ決して滅びぬ……！　リクリエの到来と共に……チャカパラ様の誕生を見届けるまで……！』"

[[dialogue]]
speaker = "敗残の亡霊"
# 『血は受け継がれるものだ……貴様がそうだったように──』
line = "『血は受け継がれるものだ……貴様がそうだったように──』"

[[dialogue]]
speaker = "敗残の亡霊"
# 『故ニ、俺は……何度でも……よみがえ、る……ォォォォーン…………！』
line = "『故ニ、俺は……何度でも……よみがえ、る……ォォォォーン…………！』"

[[dialogue]]
speaker = "ギエル"
# 「ふふ……あぁ……なるほど。これが……今まで私を<ruby=さいな>苛</ruby>んできた、闇の正体でしたか」
line = "「ふふ……あぁ……なるほど。これが……今まで私を<ruby>苛<rt>さいな</rt></ruby>んできた、闇の正体でしたか」"

[[dialogue]]
speaker = "ギエル"
# 「訂正しましょう。どうやら私には……英雄とは非なる血筋が通っていたようです」
line = "「訂正しましょう。どうやら私には……英雄とは非なる血筋が通っていたようです」"

[[dialogue]]
speaker = "unk"
# あの時の相手は──３０００年前、先代魔王に敗れたという教祖の怨霊だった。
line = "あの時の相手は──３０００年前、先代魔王に敗れたという教祖の怨霊だった。"

[[dialogue]]
speaker = "unk"
# それと全く同じ闇の瘴気が、今のギエルには宿っている。
line = "それと全く同じ闇の瘴気が、今のギエルには宿っている。"

[[dialogue]]
speaker = "アナ"
# 「リノさん。覇霊玉とは──？」
line = "「リノさん。覇霊玉とは──？」"

[[dialogue]]
speaker = "リノ"
# 「覇霊玉は──<b>前</b>森羅暦の時代、バジュラ教団という団体が崇めていた呪物よ」
line = "「覇霊玉は──<b>前</b>森羅暦の時代、バジュラ教団という団体が崇めていた呪物よ」"

[[dialogue]]
speaker = "サーシャ"
# 「あの亡霊も、そんなのを名乗ってたわね……！」
line = "「あの亡霊も、そんなのを名乗ってたわね……！」"

[[dialogue]]
speaker = "リノ"
# 「でも……魔女の長い歴史の中でも、その現存は確認されていなかったはず──」
line = "「でも……魔女の長い歴史の中でも、その現存は確認されていなかったはず──」"

[[dialogue]]
speaker = "クロト"
# 「だとしたら……これまで、ずっと潜んできたのかもしれない」
line = "「だとしたら……これまで、ずっと潜んできたのかもしれない」"

[[dialogue]]
speaker = "クロト"
# 「あの教祖の亡霊が言っていた──血は受け継がれるものだと。俺たちのように」
line = "「あの教祖の亡霊が言っていた──血は受け継がれるものだと。俺たちのように」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
# 「！　魔王の血は、３０００年の時を経ても受け継がれてきた──」
line = "「！　魔王の血は、３０００年の時を経ても受け継がれてきた──」"

[[dialogue]]
speaker = "リノ"
# 「だから同様に──魔王に敗れた者の系譜も、現代に残っていたというわけね……！」
line = "「だから同様に──魔王に敗れた者の系譜も、現代に残っていたというわけね……！」"

[[dialogue]]
speaker = "unk"
# 魔王に破れ、散っていった敗残者の血脈。それは当然、魔王のように祭り上げられるものではなかった。
line = "魔王に破れ、散っていった敗残者の血脈。それは当然、魔王のように祭り上げられるものではなかった。"

[[dialogue]]
speaker = "unk"
# けれど、この数千年、いつか来たる復讐の機に備えて眠り続けてきたのだ。
line = "けれど、この数千年、いつか来たる復讐の機に備えて眠り続けてきたのだ。"

[[dialogue]]
speaker = "unk"
# そしてその末裔こそが、ギエル──希崎レイトという人間だった。
line = "そしてその末裔こそが、ギエル──希崎レイトという人間だった。"

[[dialogue]]
speaker = "ギエル"
# 「ああ、おかしい。なんと奇遇にして不遇なことか」
line = "「ああ、おかしい。なんと奇遇にして不遇なことか」"

[[dialogue]]
speaker = "ギエル"
# 「まさに穢れた血統……生まれながらにして、私は負け犬だったというわけだ……くくくっ……！」
line = "「まさに穢れた血統……生まれながらにして、私は負け犬だったというわけだ……くくくっ……！」"

[[dialogue]]
speaker = "クロト"
# 「『影』の正体は──あの亡霊と同じものだったのか……！」
line = "「『影』の正体は──あの亡霊と同じものだったのか……！」"

[[dialogue]]
speaker = "unk"
# ギエルの足元から広がる影が、まるで生き物のように蠢く。
line = "ギエルの足元から広がる影が、まるで生き物のように蠢く。"

[[dialogue]]
speaker = "ギエル"
# 「いやはや……しかしこれで、私が<b>間違っていなかった</b>ことの証明になりましたかねぇ」
line = "「いやはや……しかしこれで、私が<b>間違っていなかった</b>ことの証明になりましたかねぇ」"

[[dialogue]]
speaker = "クロト"
# 「ふざけるな──他人を巻き込んで世界を終わらせることに、どんな正当性もありはしない」
line = "「ふざけるな──他人を巻き込んで世界を終わらせることに、どんな正当性もありはしない」"

[[dialogue]]
speaker = "クロト"
# 「それにおまえは……親や血統に従って、これまでのことを仕出かしたわけじゃないだろう！」
line = "「それにおまえは……親や血統に従って、これまでのことを仕出かしたわけじゃないだろう！」"

[[dialogue]]
speaker = "ギエル"
# 「確かにこれまで自覚はなかった──が。こうなってしまっては、私も己の『血統』に準ずるしかありません」
line = "「確かにこれまで自覚はなかった──が。こうなってしまっては、私も己の『血統』に準ずるしかありません」"

[[dialogue]]
speaker = "ギエル"
# 「ほら──あなたも、星見の妹も、すぐ血統にすがりたがるでしょう？　それが絶対のアイデンティティであるかのように」
line = "「ほら──あなたも、星見の妹も、すぐ血統にすがりたがるでしょう？　それが絶対のアイデンティティであるかのように」"

[[dialogue]]
speaker = "ギエル"
# 「私が他人に興味がないのも、すぐ生き物を殺したくなるのも、いやはや仕方のなきことだったのでしょう。すべては『血』の定めなのですからねぇ……！」
line = "「私が他人に興味がないのも、すぐ生き物を殺したくなるのも、いやはや仕方のなきことだったのでしょう。すべては『血』の定めなのですからねぇ……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ッ──そんなの、ただの責任転嫁じゃない！」
line = "「ッ──そんなの、ただの責任転嫁じゃない！」"

[[dialogue]]
speaker = "unk"
# 覇霊玉は未だに宙をたゆたっている。
line = "覇霊玉は未だに宙をたゆたっている。"

[[dialogue]]
speaker = "unk"
# あの瘴気もまだ、ギエルを支配するには至っていない──！
line = "あの瘴気もまだ、ギエルを支配するには至っていない──！"

[[dialogue]]
speaker = "クロト"
# 「その力を受け入れちゃダメだ──希崎レイト！　ヒトに戻れなくなるぞ！」
line = "「その力を受け入れちゃダメだ──希崎レイト！　ヒトに戻れなくなるぞ！」"

[[dialogue]]
speaker = "クロト"
# 「おまえの恨みも、無念も……そいつはただの燃料としてしか見ていない。そんなのに乗っ取られるのがおまえの望みだったのか！？」
line = "「おまえの恨みも、無念も……そいつはただの燃料としてしか見ていない。そんなのに乗っ取られるのがおまえの望みだったのか！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうよ──！　あの教祖ってやつの亡霊は、ろくなもんじゃなかったんだから！」
line = "「そうよ──！　あの教祖ってやつの亡霊は、ろくなもんじゃなかったんだから！」"

[[dialogue]]
speaker = "ギエル"
# 「ああ……うるさいうるさい。誉れある英雄の血でないなら拒めと？　いつまでも勝手なことを仰るものだ」
line = "「ああ……うるさいうるさい。誉れある英雄の血でないなら拒めと？　いつまでも勝手なことを仰るものだ」"

[[dialogue]]
speaker = "ギエル"
# 「言ったでしょう。深海の魚は、光に憧れなどしないのですよ。私にとっては……この暗澹たる闇こそが心地よい！」
line = "「言ったでしょう。深海の魚は、光に憧れなどしないのですよ。私にとっては……この暗澹たる闇こそが心地よい！」"

[[dialogue]]
speaker = "リノ"
# 「まずいわ──どんどん破片が取り込まれていく！」
line = "「まずいわ──どんどん破片が取り込まれていく！」"

[[dialogue]]
speaker = "unk"
# 忌まわしき血統を、ギエルは拒むどころか歓迎していた。
line = "忌まわしき血統を、ギエルは拒むどころか歓迎していた。"

[[dialogue]]
speaker = "unk"
# 覇霊玉を<ruby=コア>核</ruby>として、断片に分かれていた仮面のカケラがギエル本人と同化していく──！
line = "覇霊玉を<ruby>核<rt>コア</rt></ruby>として、断片に分かれていた仮面のカケラがギエル本人と同化していく──！"

[[dialogue]]
speaker = "ギエル"
# 「おお……私の血が叫んでいる！　魔王を滅せ、ラクシスを討てと……！」
line = "「おお……私の血が叫んでいる！　魔王を滅せ、ラクシスを討てと……！」"

[[dialogue]]
speaker = "ギエル"
# 「アポロ様──今や魔王と化してしまったあなたもだ！」
line = "「アポロ様──今や魔王と化してしまったあなたもだ！」"

[[dialogue]]
speaker = "アポロ"
# 「──ッ……！」
line = "「──ッ……！」"

[[dialogue]]
speaker = "unk"
# 仮面の瘴気──敗残者の影──あらゆる闇をまとったギエルは、ついにアポロを明確な<ruby=てき>魔王</ruby>と捉えた。
line = "仮面の瘴気──敗残者の影──あらゆる闇をまとったギエルは、ついにアポロを明確な<ruby>魔王<rt>てき</rt></ruby>と捉えた。"

[[dialogue]]
speaker = "unk"
# そして──
line = "そして──"

[[dialogue]]
speaker = "ギエル"
# 「さあ──終曲の調べを奏でるとしましょうか！」
line = "「さあ──終曲の調べを奏でるとしましょうか！」"

[[dialogue]]
speaker = "魔神ギエル"
# 「くふふふ……おや……？　どうされました、星騎士の諸君──？」
line = "「くふふふ……おや……？　どうされました、星騎士の諸君──？」"

[[dialogue]]
speaker = "ニャリオン"
# 「ニャッ……！？　ニャニャニャ……！？」
line = "「ニャッ……！？　ニャニャニャ……！？」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
# 「こ……これは……！？」
line = "「こ……これは……！？」"

[[dialogue]]
speaker = "クロト"
# 「仮面──どころじゃないな……」
line = "「仮面──どころじゃないな……」"

[[dialogue]]
speaker = "unk"
# ギエルは──自らの影に包まれて、人ならざるものへの変貌を遂げていた。
line = "ギエルは──自らの影に包まれて、人ならざるものへの変貌を遂げていた。"

[[dialogue]]
speaker = "unk"
# アポロを越える仮面との超適合によって、創り変えられたおぞましき『使徒』の姿に。
line = "アポロを越える仮面との超適合によって、創り変えられたおぞましき『使徒』の姿に。"

[[dialogue]]
speaker = "アポロ"
# 「ぐっ……！　ギ、ギエル──戻ってくれ！　呑まれちゃダメだ──！」
line = "「ぐっ……！　ギ、ギエル──戻ってくれ！　呑まれちゃダメだ──！」"

[[dialogue]]
speaker = "魔神ギエル"
# 「邪魔です──失せなさい」
line = "「邪魔です──失せなさい」"

[[dialogue]]
speaker = "アポロ"
# 「──っっ！！」
line = "「──っっ！！」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
# 「ダメ、姉さん──近づいたら！」
line = "「ダメ、姉さん──近づいたら！」"

[[dialogue]]
speaker = "unk"
# 必死に手を伸ばそうとするアポロも、尋常ならざる影の波動によって撃退される。
line = "必死に手を伸ばそうとするアポロも、尋常ならざる影の波動によって撃退される。"

[[dialogue]]
speaker = "クロト"
# 「アポロ……力を貸してくれ」
line = "「アポロ……力を貸してくれ」"

[[dialogue]]
speaker = "クロト"
# 「俺たちで戦線を組んで──ギエルを食い止めるぞ！」
line = "「俺たちで戦線を組んで──ギエルを食い止めるぞ！」"

[[dialogue]]
speaker = "アポロ"
# 「魔王……ああ。わかった」
line = "「魔王……ああ。わかった」"

[[dialogue]]
speaker = "アポロ"
# 「アイツの目を覚まさせてやれるのは……あたししかいない！」
line = "「アイツの目を覚まさせてやれるのは……あたししかいない！」"

[[dialogue]]
speaker = "unk"
# アポロは覚悟を決め、大剣を担ぎ上げた。
line = "アポロは覚悟を決め、大剣を担ぎ上げた。"

[[dialogue]]
speaker = "unk"
# かつては寄り添っていた主と従者が、ここに向かい合う。
line = "かつては寄り添っていた主と従者が、ここに向かい合う。"

[[dialogue]]
speaker = "魔神ギエル"
# 「ククク……これが……私の新たなる力……」
line = "「ククク……これが……私の新たなる力……」"

[[dialogue]]
speaker = "魔神ギエル"
# 「オオオオッ…………覇アアアアァァァァァッッ────！！」
line = "「オオオオッ…………覇アアアアァァァァァッッ────！！」"
