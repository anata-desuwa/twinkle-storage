[[dialogue]]
speaker = "unk"
# 第８話,作戦準備,B
line = "第８話,作戦準備,B"

[[dialogue]]
speaker = "unk"
# ヴィーナスからの『<ruby=いつ>Ｗｈｅｎ</ruby>』に目星をつけた俺たち。
line = "ヴィーナスからの『<ruby>Ｗｈｅｎ<rt>いつ</rt></ruby>』に目星をつけた俺たち。"

[[dialogue]]
speaker = "unk"
# 『冬』という天災に立ち向かうため、各自で準備を行いつつ……
line = "『冬』という天災に立ち向かうため、各自で準備を行いつつ……"

[[dialogue]]
speaker = "unk"
# もうひとつの手がかりから、彼女の『<ruby=どこ>Ｗｈｅｒｅ</ruby>』を割り出すことに腐心するのだった。
line = "もうひとつの手がかりから、彼女の『<ruby>Ｗｈｅｒｅ<rt>どこ</rt></ruby>』を割り出すことに腐心するのだった。"

[[dialogue]]
speaker = "リタおばさん"
# 「ほら！　とっととここの雪をかいて、あっちに<ruby=まき>薪</ruby>を運ぶんだよ──急いだ急いだ」
line = "「ほら！　とっととここの雪をかいて、あっちに<ruby>薪<rt>まき</rt></ruby>を運ぶんだよ──急いだ急いだ」"

[[dialogue]]
speaker = "リタおばさん"
# 「それから、グロウジカの毛皮を取ってきてもらおうかね。他にも悪魔リスの頬袋なんかがあるといいよ。防風網に使うのさ」
line = "「それから、グロウジカの毛皮を取ってきてもらおうかね。他にも悪魔リスの頬袋なんかがあるといいよ。防風網に使うのさ」"

[[dialogue]]
speaker = "マトイ"
# 「ひ、ひええ。そんな文化があるんだ……」
line = "「ひ、ひええ。そんな文化があるんだ……」"

[[dialogue]]
speaker = "ニャリオン"
# 「ニャ、ニャんでワガハイがこんなことに駆り出されなきゃならないニャン……！？」
line = "「ニャ、ニャんでワガハイがこんなことに駆り出されなきゃならないニャン……！？」"

[[dialogue]]
speaker = "リタおばさん"
# 「若い労働力はいつだって貴重だからねえ。はっはっ……」
line = "「若い労働力はいつだって貴重だからねえ。はっはっ……」"

[[dialogue]]
speaker = "リタおばさん"
# 「まあ安心しな。今言った素材がありゃ、例のブツだって作れるはずさ」
line = "「まあ安心しな。今言った素材がありゃ、例のブツだって作れるはずさ」"

[[dialogue]]
speaker = "マトイ"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "リタおばさん"
# 「『大いなる冬』の当日に出かけようってんだろ？　そんな命知らずには──専用の防寒具が必要だろうからね！」
line = "「『大いなる冬』の当日に出かけようってんだろ？　そんな命知らずには──専用の防寒具が必要だろうからね！」"

[[dialogue]]
speaker = "レゾフの住人"
# 「おお──おおっ？　な、なんだこの火は……水をかけても消えないぞ？」
line = "「おお──おおっ？　な、なんだこの火は……水をかけても消えないぞ？」"

[[dialogue]]
speaker = "ユウリ"
# 「炎の星術──ま、特別製でな。消えない聖火みたいなもんだと思ってくれ」
line = "「炎の星術──ま、特別製でな。消えない聖火みたいなもんだと思ってくれ」"

[[dialogue]]
speaker = "ユウリ"
# 「それと……いくら風に吹かれても動かないようにしといたから、吹雪の当日にも役立つはずだ」
line = "「それと……いくら風に吹かれても動かないようにしといたから、吹雪の当日にも役立つはずだ」"

[[dialogue]]
speaker = "レゾフの住人"
# 「マジかよ……大助かりだ！」
line = "「マジかよ……大助かりだ！」"

[[dialogue]]
speaker = "ソフィア"
# 「助かります、ユウリ先輩。レゾフのために」
line = "「助かります、ユウリ先輩。レゾフのために」"

[[dialogue]]
speaker = "ユウリ"
# 「ま、お互い様だろ。ソフィアの地元ってんなら……喜んで手を貸すさ」
line = "「ま、お互い様だろ。ソフィアの地元ってんなら……喜んで手を貸すさ」"

[[dialogue]]
speaker = "ユウリ"
# 「それに──当日万全に動くためにも、準備は欠かせねえからな」
line = "「それに──当日万全に動くためにも、準備は欠かせねえからな」"

[[dialogue]]
speaker = "ソフィア"
# 「……ですね」
line = "「……ですね」"

[[dialogue]]
speaker = "レゾフの住人"
# 「そういやあんたら……人探しをしてるんだって？」
line = "「そういやあんたら……人探しをしてるんだって？」"

[[dialogue]]
speaker = "ユウリ"
# 「ん？　ああ。かなり緊急でな」
line = "「ん？　ああ。かなり緊急でな」"

[[dialogue]]
speaker = "レゾフの住人"
# 「だったらあのお方を頼るといい！　俺も失くした財布を見つけてもらったことがある！」
line = "「だったらあのお方を頼るといい！　俺も失くした財布を見つけてもらったことがある！」"

[[dialogue]]
speaker = "ユウリ"
# 「あのお方……？」
line = "「あのお方……？」"

[[dialogue]]
speaker = "レゾフの住人"
# 「伝説の占い師だよ！　ちょっと前からレゾフでたまに見かけるんだが──これが最高によく当たるんだ！」
line = "「伝説の占い師だよ！　ちょっと前からレゾフでたまに見かけるんだが──これが最高によく当たるんだ！」"

[[dialogue]]
speaker = "ソフィア"
# 「あ、いえ……そういったものはアテにできないというか……」
line = "「あ、いえ……そういったものはアテにできないというか……」"

[[dialogue]]
speaker = "ユウリ"
# 「いや、待てソフィア。こういうところにヒントが転がってる可能性もある」
line = "「いや、待てソフィア。こういうところにヒントが転がってる可能性もある」"

[[dialogue]]
speaker = "ソフィア"
# （ほ、本当に……？）
line = "（ほ、本当に……？）"

[[dialogue]]
speaker = "クロト"
# 「じゃあ──『森』に心当たりはないんでしょうか？」
line = "「じゃあ──『森』に心当たりはないんでしょうか？」"

[[dialogue]]
speaker = "サーシャ"
# 「正確に言うと……ありすぎる、と言ったほうがいいわね」
line = "「正確に言うと……ありすぎる、と言ったほうがいいわね」"

[[dialogue]]
speaker = "サーシャ"
# 「ここまで来る途中でわかったと思うけれど──魔界は都市部以外、ほとんどが未開拓の地域よ」
line = "「ここまで来る途中でわかったと思うけれど──魔界は都市部以外、ほとんどが未開拓の地域よ」"

[[dialogue]]
speaker = "サーシャ"
# 「森も、林も、街を出ればいくらだって広がってる。ヴィーナスちゃんがどこの森を指しているのか……特定できなきゃダメだわ」
line = "「森も、林も、街を出ればいくらだって広がってる。ヴィーナスちゃんがどこの森を指しているのか……特定できなきゃダメだわ」"

[[dialogue]]
speaker = "クロト"
# 「なるほど……」
line = "「なるほど……」"

[[dialogue]]
speaker = "unk"
# ヴィーナスの残るメッセージ──『森』についてサーシャ先輩から話を聞いていた。
line = "ヴィーナスの残るメッセージ──『森』についてサーシャ先輩から話を聞いていた。"

[[dialogue]]
speaker = "unk"
# しかしやはり、『冬』のようにピンとくる心当たりは見つからない。
line = "しかしやはり、『冬』のようにピンとくる心当たりは見つからない。"

[[dialogue]]
speaker = "サーシャ"
# 「昨日のうちに──この周辺にある森林地帯はリストアップしておいたわ。ただ、魔界の広さを考えると……」
line = "「昨日のうちに──この周辺にある森林地帯はリストアップしておいたわ。ただ、魔界の広さを考えると……」"

[[dialogue]]
speaker = "クロト"
# 「しらみ潰しじゃキリがない……ですか」
line = "「しらみ潰しじゃキリがない……ですか」"

[[dialogue]]
speaker = "サーシャ"
# 「……どうしようかしら。魔界で人探しといったら、祭壇に供物を捧げて祈るか、占ってもらうかしかなくて──」
line = "「……どうしようかしら。魔界で人探しといったら、祭壇に供物を捧げて祈るか、占ってもらうかしかなくて──」"

[[dialogue]]
speaker = "クロト"
# 「……いえ。このリストは助かります。ここから絞れるかもしれません」
line = "「……いえ。このリストは助かります。ここから絞れるかもしれません」"

[[dialogue]]
speaker = "サーシャ"
# 「本当？　私も、他に関連性がないか探ってみるわね」
line = "「本当？　私も、他に関連性がないか探ってみるわね」"

[[dialogue]]
speaker = "サーシャ"
# 「会長くんの熱意なら──どんな吹雪が来たって平気なはずよ♪　だから……無理はしないでね」
line = "「会長くんの熱意なら──どんな吹雪が来たって平気なはずよ♪　だから……無理はしないでね」"

[[dialogue]]
speaker = "クロト"
# 「はは……ありがとうございます」
line = "「はは……ありがとうございます」"

[[dialogue]]
speaker = "unk"
# 撫で撫でされた。
line = "撫で撫でされた。"

[[dialogue]]
speaker = "unk"
# いつもより温もりが感じられたのは……きっと、ここが極寒の街だからだろう。
line = "いつもより温もりが感じられたのは……きっと、ここが極寒の街だからだろう。"

[[dialogue]]
speaker = "unk"
# それからまたしばらく──
line = "それからまたしばらく──"

[[dialogue]]
speaker = "unk"
# 『冬』の作戦行動へ向けて、俺たちはやるべきことを急いだ。
line = "『冬』の作戦行動へ向けて、俺たちはやるべきことを急いだ。"

[[dialogue]]
speaker = "フィオナ"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "ユウリ"
# 「──よう、フィオナ。ご苦労さん」
line = "「──よう、フィオナ。ご苦労さん」"

[[dialogue]]
speaker = "ソフィア"
# 「お疲れさまです、フィオナ会長。大丈夫でしたか？」
line = "「お疲れさまです、フィオナ会長。大丈夫でしたか？」"

[[dialogue]]
speaker = "フィオナ"
# 「ユウリ──ソフィア──うん。そっちも頑張ってくれたみたいね、ありがとう」
line = "「ユウリ──ソフィア──うん。そっちも頑張ってくれたみたいね、ありがとう」"

[[dialogue]]
speaker = "ユウリ"
# 「フィオナは──長老さんから話を聞いてたんだったか？」
line = "「フィオナは──長老さんから話を聞いてたんだったか？」"

[[dialogue]]
speaker = "フィオナ"
# 「ええ。流星教皇──それから星見の名もご存知のようだったので、すんなりお話ができました」
line = "「ええ。流星教皇──それから星見の名もご存知のようだったので、すんなりお話ができました」"

[[dialogue]]
speaker = "フィオナ"
# 「おかげで──『冬』という天災の恐ろしさも、十分に把握しました」
line = "「おかげで──『冬』という天災の恐ろしさも、十分に把握しました」"

[[dialogue]]
speaker = "ユウリ"
# 「ヤバそうか？」
line = "「ヤバそうか？」"

[[dialogue]]
speaker = "フィオナ"
# 「……ですね。アステラまでも凍りつく──というのは過言ではなく、街の人たちは一日中地下にこもっているようです」
line = "「……ですね。アステラまでも凍りつく──というのは過言ではなく、街の人たちは一日中地下にこもっているようです」"

[[dialogue]]
speaker = "フィオナ"
# 「どうしてもその当日に出かけたい──と伝えると、渋面をされてしまいましたが」
line = "「どうしてもその当日に出かけたい──と伝えると、渋面をされてしまいましたが」"

[[dialogue]]
speaker = "ソフィア"
# 「はい。レゾフの住人からすると……信じられないことです」
line = "「はい。レゾフの住人からすると……信じられないことです」"

[[dialogue]]
speaker = "フィオナ"
# 「それでもこの街に伝わる防寒装備……それからユウリの炎の盾と、私の太陽の星術。これらが揃えば当日の行動は可能だと思います」
line = "「それでもこの街に伝わる防寒装備……それからユウリの炎の盾と、私の太陽の星術。これらが揃えば当日の行動は可能だと思います」"

[[dialogue]]
speaker = "ユウリ"
# 「だよな。ったく、ヴィーナスも無茶言ってくれるぜ」
line = "「だよな。ったく、ヴィーナスも無茶言ってくれるぜ」"

[[dialogue]]
speaker = "ソフィア"
# 「あはは……本当ですね」
line = "「あはは……本当ですね」"

[[dialogue]]
speaker = "フィオナ"
# 「……ただ、一点」
line = "「……ただ、一点」"

[[dialogue]]
speaker = "フィオナ"
# 「大いなる冬──最凶の吹雪──その脅威は理解したつもりなのですが」
line = "「大いなる冬──最凶の吹雪──その脅威は理解したつもりなのですが」"

[[dialogue]]
speaker = "フィオナ"
# 「長老さんは『冬の到来だけなら、こもっていれば済む』と仰っていました。その言い方がなんだか、気にかかってしまって」
line = "「長老さんは『冬の到来だけなら、こもっていれば済む』と仰っていました。その言い方がなんだか、気にかかってしまって」"

[[dialogue]]
speaker = "ユウリ"
# 「冬だけなら……か。確かに気になるな」
line = "「冬だけなら……か。確かに気になるな」"

[[dialogue]]
speaker = "ユウリ"
# 「春とか夏とか、ひょっとしてそれ以上の脅威があるってのか？」
line = "「春とか夏とか、ひょっとしてそれ以上の脅威があるってのか？」"

[[dialogue]]
speaker = "ソフィア"
# 「あ、いえ、それは恐らく──」
line = "「あ、いえ、それは恐らく──」"

[[dialogue]]
speaker = "？？？"
# 「──『スタンピード』さ。お嬢さん」
line = "「──『スタンピード』さ。お嬢さん」"

[[dialogue]]
speaker = "フィオナ"
# 「！？」
line = "「！？」"

[[dialogue]]
speaker = "ユウリ"
# 「ん？　なんだ……あんたは？」
line = "「ん？　なんだ……あんたは？」"

[[dialogue]]
speaker = "？？？"
# 「名乗るほどのものではない。ま、旅人とでも言っておこうか──君たちと同じ──ね」
line = "「名乗るほどのものではない。ま、旅人とでも言っておこうか──君たちと同じ──ね」"

[[dialogue]]
speaker = "フィオナ"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "ユウリ"
# （……なあソフィア、こいつは？）
line = "（……なあソフィア、こいつは？）"

[[dialogue]]
speaker = "ソフィア"
# （ええと……いえ、見たことのない方です。ご本人の言うように外部からの来訪者かと）
line = "（ええと……いえ、見たことのない方です。ご本人の言うように外部からの来訪者かと）"

[[dialogue]]
speaker = "ソフィア"
# （とはいえ……レゾフに人間が来るなんて、滅多にあることじゃありませんが……）
line = "（とはいえ……レゾフに人間が来るなんて、滅多にあることじゃありませんが……）"

[[dialogue]]
speaker = "フィオナ"
# 「なるほど──<b>旅人</b>さん。そのスタンピードとは、一体？」
line = "「なるほど──<b>旅人</b>さん。そのスタンピードとは、一体？」"

[[dialogue]]
speaker = "？？？"
# 「うむ。ここの住人なら誰しも知っていることじゃないかな」
line = "「うむ。ここの住人なら誰しも知っていることじゃないかな」"

[[dialogue]]
speaker = "ソフィア"
# 「わ、私ですか？」
line = "「わ、私ですか？」"

[[dialogue]]
speaker = "ソフィア"
# 「そうですね──スタンピードは……『大いなる冬』の到来とともに、稀に見られる現象です」
line = "「そうですね──スタンピードは……『大いなる冬』の到来とともに、稀に見られる現象です」"

[[dialogue]]
speaker = "ソフィア"
# 「ざっくり言うと、凶暴な魔獣たちが一斉に目覚めてやってきます」
line = "「ざっくり言うと、凶暴な魔獣たちが一斉に目覚めてやってきます」"

[[dialogue]]
speaker = "ユウリ"
# 「な！？」
line = "「な！？」"

[[dialogue]]
speaker = "？？？"
# 「フフ……その通り。いわば二次災害と言ったところか」
line = "「フフ……その通り。いわば二次災害と言ったところか」"

[[dialogue]]
speaker = "？？？"
# 「ここ──ズヴィエダ地方の一帯には、特に寒冷な気候でのみ生息する魔獣たちがいる」
line = "「ここ──ズヴィエダ地方の一帯には、特に寒冷な気候でのみ生息する魔獣たちがいる」"

[[dialogue]]
speaker = "？？？"
# 「そしてそれらの魔獣は──冬眠ならぬ夏眠を行うことで知られている。これはつまり、温暖な時期を穴ぐらの中で過ごすのさ」
line = "「そしてそれらの魔獣は──冬眠ならぬ夏眠を行うことで知られている。これはつまり、温暖な時期を穴ぐらの中で過ごすのさ」"

[[dialogue]]
speaker = "ユウリ"
# 「冬眠の逆、ってことか……」
line = "「冬眠の逆、ってことか……」"

[[dialogue]]
speaker = "？？？"
# 「ゆえにそれらの魔獣は──『大いなる冬』の到来に伴い、一斉に穴から出て活動を開始する」
line = "「ゆえにそれらの魔獣は──『大いなる冬』の到来に伴い、一斉に穴から出て活動を開始する」"

[[dialogue]]
speaker = "？？？"
# 「食糧を求め、人里を襲うようになる。その現象こそが『スタンピード』だ」
line = "「食糧を求め、人里を襲うようになる。その現象こそが『スタンピード』だ」"

[[dialogue]]
speaker = "ユウリ"
# 「人間界で言えば──人食い熊が降りてくるみたいなもんか……？」
line = "「人間界で言えば──人食い熊が降りてくるみたいなもんか……？」"

[[dialogue]]
speaker = "ソフィア"
# 「近いかと。とはいえ、規模はその比ではありませんが」
line = "「近いかと。とはいえ、規模はその比ではありませんが」"

[[dialogue]]
speaker = "フィオナ"
# 「ただでさえ全面凍結する猛吹雪に加え、魔獣の襲来──弱り目に祟り目ですね」
line = "「ただでさえ全面凍結する猛吹雪に加え、魔獣の襲来──弱り目に祟り目ですね」"

[[dialogue]]
speaker = "ユウリ"
# 「じゃあ……ヤベェじゃねえか！　そっちの対策もしておかねえと──」
line = "「じゃあ……ヤベェじゃねえか！　そっちの対策もしておかねえと──」"

[[dialogue]]
speaker = "ソフィア"
# 「いえ。スタンピードは十数年に一度しか起こらない現象です。私も、二年前に一度だけしか覚えがありません」
line = "「いえ。スタンピードは十数年に一度しか起こらない現象です。私も、二年前に一度だけしか覚えがありません」"

[[dialogue]]
speaker = "ソフィア"
# 「そして周期を考えれば、当分は安全と言ってもよいでしょう」
line = "「そして周期を考えれば、当分は安全と言ってもよいでしょう」"

[[dialogue]]
speaker = "フィオナ"
# 「……なるほど。だから、長老さんは『冬の到来だけなら』と言っていたのね」
line = "「……なるほど。だから、長老さんは『冬の到来だけなら』と言っていたのね」"

[[dialogue]]
speaker = "？？？"
# 「ああ。とはいえ──不穏分子がないわけではない。近年になって、近隣には強大な魔獣のねぐらが多数確認されているとも聞く」
line = "「ああ。とはいえ──不穏分子がないわけではない。近年になって、近隣には強大な魔獣のねぐらが多数確認されているとも聞く」"

[[dialogue]]
speaker = "？？？"
