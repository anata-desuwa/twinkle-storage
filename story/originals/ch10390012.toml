[[dialogue]]
speaker = "unk"
# 第２話,魔女のゲーム,P
line = "第２話,魔女のゲーム,P"

[[dialogue]]
speaker = "unk"
# イニシュの記憶を取り戻すのを手伝うことになったのだが──
line = "イニシュの記憶を取り戻すのを手伝うことになったのだが──"

[[dialogue]]
speaker = "イニシュ"
# 「お邪魔します、魔王」
line = "「お邪魔します、魔王」"

[[dialogue]]
speaker = "アイリーン"
# 「おジャマしまーす♪」
line = "「おジャマしまーす♪」"

[[dialogue]]
speaker = "アイリーン"
# 「どうして会長さんのおうちにって……もちろん遊びに来たんだよ！　どんなきっかけでイニシュさんの記憶が戻るかわからないからね♪」
line = "「どうして会長さんのおうちにって……もちろん遊びに来たんだよ！　どんなきっかけでイニシュさんの記憶が戻るかわからないからね♪」"

[[dialogue]]
speaker = "イニシュ"
# 「よろしくお願いします」
line = "「よろしくお願いします」"

[[dialogue]]
speaker = "unk"
# （普通に遊びたいだけでは？）
line = "（普通に遊びたいだけでは？）"

[[dialogue]]
speaker = "アイリーン"
# 「というわけで……じゃじゃーん！　マッドスタンパー！」
line = "「というわけで……じゃじゃーん！　マッドスタンパー！」"

[[dialogue]]
speaker = "アイリーン"
# 「あー、魔女もゲームするんだって思ったでしょ？　イニシュさんだってこのゲーム得意なんだから！」
line = "「あー、魔女もゲームするんだって思ったでしょ？　イニシュさんだってこのゲーム得意なんだから！」"

[[dialogue]]
speaker = "イニシュ"
# 「得意というほどではありませんが。それなりです」
line = "「得意というほどではありませんが。それなりです」"

[[dialogue]]
speaker = "イニシュ"
# 「今までは待機時はスリープしていましたが、最近はリクリエの激化に伴い、起動して待機することが多いため、空き時間で人間界のゲームをプレイしています」
line = "「今までは待機時はスリープしていましたが、最近はリクリエの激化に伴い、起動して待機することが多いため、空き時間で人間界のゲームをプレイしています」"

[[dialogue]]
speaker = "アイリーン"
# 「ねぇねぇ、早くやろーよ！　……って、会長さん流星市国の人なのにマッドスタンパー知らないの？　仕方ないから私の貸してあげるね！」
line = "「ねぇねぇ、早くやろーよ！　……って、会長さん流星市国の人なのにマッドスタンパー知らないの？　仕方ないから私の貸してあげるね！」"

[[dialogue]]
speaker = "イニシュ"
# 「では私からこのゲームの説明を。マッドスタンパー、略してマドスタは、スタンプ煽り上等ＦＰＳゲームです」
line = "「では私からこのゲームの説明を。マッドスタンパー、略してマドスタは、スタンプ煽り上等ＦＰＳゲームです」"

[[dialogue]]
speaker = "イニシュ"
# 「ＦＰＳとは、ファーストパーソンシューティングの略で、操作するキャラクターの視点でプレイするゲームです」
line = "「ＦＰＳとは、ファーストパーソンシューティングの略で、操作するキャラクターの視点でプレイするゲームです」"

[[dialogue]]
speaker = "イニシュ"
# 「ＦＰＳゲームは銃器が使われることが多いですが、マドスタはスタンプを武器にしているのが最大の特徴です」
line = "「ＦＰＳゲームは銃器が使われることが多いですが、マドスタはスタンプを武器にしているのが最大の特徴です」"

[[dialogue]]
speaker = "イニシュ"
# 「攻撃が命中すると、ダメージが発生すると同時に設定したスタンプが画面に表示されます。そしてこのスタンプによる煽り合いが重要なゲームです」
line = "「攻撃が命中すると、ダメージが発生すると同時に設定したスタンプが画面に表示されます。そしてこのスタンプによる煽り合いが重要なゲームです」"

[[dialogue]]
speaker = "イニシュ"
# 「たとえば『やんのかコラ』スタンプで攻撃された場合、『お前の勝ちでいいよ』スタンプで反撃に成功すると、いい煽りとしてポイントが加算されます」
line = "「たとえば『やんのかコラ』スタンプで攻撃された場合、『お前の勝ちでいいよ』スタンプで反撃に成功すると、いい煽りとしてポイントが加算されます」"

[[dialogue]]
speaker = "イニシュ"
# 「煽りに対する返しが的外れだった場合、または反撃のスタンプ攻撃が命中しなかった場合、煽り合いで勝利したとして相手にポイントが加算されます」
line = "「煽りに対する返しが的外れだった場合、または反撃のスタンプ攻撃が命中しなかった場合、煽り合いで勝利したとして相手にポイントが加算されます」"

[[dialogue]]
speaker = "イニシュ"
# 「こうして相手を倒しながら煽ってポイントを稼ぎ、試合時間終了時に多くのポイントを持っていたチームの勝利となります」
line = "「こうして相手を倒しながら煽ってポイントを稼ぎ、試合時間終了時に多くのポイントを持っていたチームの勝利となります」"

[[dialogue]]
speaker = "unk"
# けっこうクソゲーでは？
line = "けっこうクソゲーでは？"

[[dialogue]]
speaker = "アイリーン"
# 「そんなことないよ！　人間界で三千万人がプレイしてる人気ゲームなんだから！」
line = "「そんなことないよ！　人間界で三千万人がプレイしてる人気ゲームなんだから！」"

[[dialogue]]
speaker = "unk"
# 大丈夫なのか人間界……
line = "大丈夫なのか人間界……"

[[dialogue]]
speaker = "イニシュ"
# 「プレイヤーは何もスタンプを持っていない状態でゲームを開始し、ゲーム序盤はフィールドを回ってスタンプを集めます」
line = "「プレイヤーは何もスタンプを持っていない状態でゲームを開始し、ゲーム序盤はフィールドを回ってスタンプを集めます」"

[[dialogue]]
speaker = "イニシュ"
# 「この時、煽りとして汎用性のあるスタンプや、そのスタンプに対してカウンターになるスタンプを集めておきましょう」
line = "「この時、煽りとして汎用性のあるスタンプや、そのスタンプに対してカウンターになるスタンプを集めておきましょう」"

[[dialogue]]
speaker = "イニシュ"
# 「またスタンプによって射程や攻撃速度、使用回数などが違います。シューティングゲームでもありますので、自分に合ったものを選ぶのもよいです」
line = "「またスタンプによって射程や攻撃速度、使用回数などが違います。シューティングゲームでもありますので、自分に合ったものを選ぶのもよいです」"

[[dialogue]]
speaker = "アイリーン"
# 「じゃあイニシュさんと同じチームでマッチしてみようよ！　負けてもいいから怖がらなくても大丈夫。ていうかイニシュさん強いから平気だって」
line = "「じゃあイニシュさんと同じチームでマッチしてみようよ！　負けてもいいから怖がらなくても大丈夫。ていうかイニシュさん強いから平気だって」"

[[dialogue]]
speaker = "イニシュ"
# 「いえ、それなりです」
line = "「いえ、それなりです」"

[[dialogue]]
speaker = "アイリーン"
# 「またまた～。私よりランク高いくせに」
line = "「またまた～。私よりランク高いくせに」"

[[dialogue]]
speaker = "イニシュ"
# 「１チームは４人ですので、私と魔王のほかに２人がアサインします。他のプレイヤーの意図を読むのも大事です」
line = "「１チームは４人ですので、私と魔王のほかに２人がアサインします。他のプレイヤーの意図を読むのも大事です」"

[[dialogue]]
speaker = "イニシュ"
# 「！　始まりました。まずはスタンプを集めてください。使用しやすいのは『お前がそう思うんなら以下略』のスタンプです」
line = "「！　始まりました。まずはスタンプを集めてください。使用しやすいのは『お前がそう思うんなら以下略』のスタンプです」"

[[dialogue]]
speaker = "イニシュ"
# 「私は先陣を切って敵の進行を阻止します。──接敵。ターゲット捕捉」
line = "「私は先陣を切って敵の進行を阻止します。──接敵。ターゲット捕捉」"

[[dialogue]]
speaker = "イニシュ"
# 「スタンプ発射。命中。追撃。撃破確認」
line = "「スタンプ発射。命中。追撃。撃破確認」"

[[dialogue]]
speaker = "アイリーン"
# 「イニシュさんやっぱりつよっ！」
line = "「イニシュさんやっぱりつよっ！」"

[[dialogue]]
speaker = "アイリーン"
# 「しかもイニシュさんが使ってるのは『お上手ですね』スタンプ！　これは相手の攻撃をかわしながら使うとポイントが加算されるんだよ」
line = "「しかもイニシュさんが使ってるのは『お上手ですね』スタンプ！　これは相手の攻撃をかわしながら使うとポイントが加算されるんだよ」"

[[dialogue]]
speaker = "イニシュ"
# 「『ありがとうございます』スタンプも同様の効果があります。技量が劣る相手や操作を誤った相手に対し、皮肉を込めた煽りです」
line = "「『ありがとうございます』スタンプも同様の効果があります。技量が劣る相手や操作を誤った相手に対し、皮肉を込めた煽りです」"

[[dialogue]]
speaker = "イニシュ"
# 「タイムラグはありますが、敵を倒してもまた復活してきます。同様に、こちらがやられても復活するので安心してください」
line = "「タイムラグはありますが、敵を倒してもまた復活してきます。同様に、こちらがやられても復活するので安心してください」"

[[dialogue]]
speaker = "イニシュ"
# 「敵が魔王に接近してきました。注意してくださ──」
line = "「敵が魔王に接近してきました。注意してくださ──」"

[[dialogue]]
speaker = "unk"
# あ、スタンプ押された！？
line = "あ、スタンプ押された！？"

[[dialogue]]
speaker = "イニシュ"
# 「煽られても焦らずに反撃を。『で、オチは？』スタンプに対しては、『ごめん、話が難しかったね』スタンプで返しましょう。……そうです、いい煽りです」
line = "「煽られても焦らずに反撃を。『で、オチは？』スタンプに対しては、『ごめん、話が難しかったね』スタンプで返しましょう。……そうです、いい煽りです」"

[[dialogue]]
speaker = "イニシュ"
# 「また魔王を狙っている敵がいますね。『惜しい』スタンプで攻撃。撃墜成功」
line = "「また魔王を狙っている敵がいますね。『惜しい』スタンプで攻撃。撃墜成功」"

[[dialogue]]
speaker = "イニシュ"
# 「このまま煽り続けて優勢を維持してください。タイムアップまであと５……４……３……」
line = "「このまま煽り続けて優勢を維持してください。タイムアップまであと５……４……３……」"

[[dialogue]]
speaker = "イニシュ"
# 「２……１……０」
line = "「２……１……０」"

[[dialogue]]
speaker = "イニシュ"
# 「お疲れ様です。私たちの勝利です」
line = "「お疲れ様です。私たちの勝利です」"

[[dialogue]]
speaker = "unk"
# イニシュのおかげで勝てた
line = "イニシュのおかげで勝てた"

[[dialogue]]
speaker = "イニシュ"
# 「いえ、魔王も初めてなのによい煽りでした。初めてのマッチはどうでしたか？」
line = "「いえ、魔王も初めてなのによい煽りでした。初めてのマッチはどうでしたか？」"

[[dialogue]]
speaker = "unk"
# 楽しかった！
line = "楽しかった！"

[[dialogue]]
speaker = "イニシュ"
# 「なら良かったです。途中煽られて苛ついても、マッチで勝利することが最大の煽りなのだと信じて、冷静さを失わずに戦ってください」
line = "「なら良かったです。途中煽られて苛ついても、マッチで勝利することが最大の煽りなのだと信じて、冷静さを失わずに戦ってください」"

[[dialogue]]
speaker = "アイリーン"
# 「イニシュさん、今日は何か思い出せた？」
line = "「イニシュさん、今日は何か思い出せた？」"

[[dialogue]]
speaker = "イニシュ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "アイリーン"
# 「あ、特に何も思い出してないっぽい」
line = "「あ、特に何も思い出してないっぽい」"

[[dialogue]]
speaker = "イニシュ"
# 「いえ、思い出していないこともないような……」
line = "「いえ、思い出していないこともないような……」"

[[dialogue]]
speaker = "イニシュ"
# 「何だか……昔……楽しいことがあった気がします」
line = "「何だか……昔……楽しいことがあった気がします」"

[[dialogue]]
speaker = "アイリーン"
# 「あー！　イニシュさんが笑ってるー！」
line = "「あー！　イニシュさんが笑ってるー！」"

[[dialogue]]
speaker = "イニシュ"
# 「では新しいマッチを始めましょう。次も楽しいゲームになるといいですね」
line = "「では新しいマッチを始めましょう。次も楽しいゲームになるといいですね」"
