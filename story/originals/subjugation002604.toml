[[dialogue]]
speaker = "ヴィーナス"
# 「しょ……賞金１０万テルスですって！？」
line = "「しょ……賞金１０万テルスですって！？」"

[[dialogue]]
speaker = "ソフィア"
# 「学生のイベントの域を超えています……！」
line = "「学生のイベントの域を超えています……！」"

[[dialogue]]
speaker = "アポロ"
# 「じゅ、１０万テルスっていくらだ！？　ぶどうグミ何個買える！？」
line = "「じゅ、１０万テルスっていくらだ！？　ぶどうグミ何個買える！？」"

[[dialogue]]
speaker = "ルリエル"
# 「１００個は買えますよう！」
line = "「１００個は買えますよう！」"

[[dialogue]]
speaker = "サーシャ"
# 「それどころじゃないんじゃないかしら？」
line = "「それどころじゃないんじゃないかしら？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ますますどこから湧いたお金なのよ！」
line = "「ますますどこから湧いたお金なのよ！」"

[[dialogue]]
speaker = "ヘレナ"
# 「私のポケットマネーだ。フ……これぞ実業家の大盤振る舞いというものよ」
line = "「私のポケットマネーだ。フ……これぞ実業家の大盤振る舞いというものよ」"

[[dialogue]]
speaker = "ヘレナ"
# 「さらに水着コンテストはエントリー費無料、誰でも歓迎！　どうだ？　興味が湧いてきたか？」
line = "「さらに水着コンテストはエントリー費無料、誰でも歓迎！　どうだ？　興味が湧いてきたか？」"

[[dialogue]]
speaker = "ルリエル"
# 「はいっ！」
line = "「はいっ！」"

[[dialogue]]
speaker = "アポロ"
# 「ああ！　こりゃ～激アツのイベントだぜ！」
line = "「ああ！　こりゃ～激アツのイベントだぜ！」"

[[dialogue]]
speaker = "マトイ"
# 「私は──出てもどうせなぁ……勝てっこないし……見られるのも恥ずいし……」
line = "「私は──出てもどうせなぁ……勝てっこないし……見られるのも恥ずいし……」"

[[dialogue]]
speaker = "ソフィア"
# 「そうですね……この手の審査じゃ、大人っぽいほうがいいに決まってます」
line = "「そうですね……この手の審査じゃ、大人っぽいほうがいいに決まってます」"

[[dialogue]]
speaker = "アナ"
# 「つまり、だいなまいとばでぃが有利……と」
line = "「つまり、だいなまいとばでぃが有利……と」"

[[dialogue]]
speaker = "ソフィア"
# 「ってことは……姉さん！？」
line = "「ってことは……姉さん！？」"

[[dialogue]]
speaker = "サーシャ"
# 「あらあら」
line = "「あらあら」"

[[dialogue]]
speaker = "unk"
# 優勝を狙える
line = "優勝を狙える"

[[dialogue]]
speaker = "unk"
# サーシャさんなら
line = "サーシャさんなら"

[[dialogue]]
speaker = "サーシャ"
# 「ふふ。会長くんがそう言うなら、張り切って出場しちゃおうかしら？」
line = "「ふふ。会長くんがそう言うなら、張り切って出場しちゃおうかしら？」"

[[dialogue]]
speaker = "ヘレナ"
# 「フ……確かにサーシャは優勝候補かもしれない。だが、そう簡単にはゆくまいぞ」
line = "「フ……確かにサーシャは優勝候補かもしれない。だが、そう簡単にはゆくまいぞ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「まさか……ヘレナちゃん自ら出る気！？」
line = "「まさか……ヘレナちゃん自ら出る気！？」"

[[dialogue]]
speaker = "ヘレナ"
# 「それも悪くはない──が、否」
line = "「それも悪くはない──が、否」"

[[dialogue]]
speaker = "ヘレナ"
# 「今回は我が軍の誇るトップモデルを用意した。いでよ！」
line = "「今回は我が軍の誇るトップモデルを用意した。いでよ！」"

[[dialogue]]
speaker = "トリシャ"
# 「……えっと……あの……こちらでよろしかったですか……？」
line = "「……えっと……あの……こちらでよろしかったですか……？」"

[[dialogue]]
speaker = "ルリエル"
# 「うおぉ……」
line = "「うおぉ……」"

[[dialogue]]
speaker = "マトイ"
# 「でっか……」
line = "「でっか……」"

[[dialogue]]
speaker = "アナ"
# 「またスイカが……」
line = "「またスイカが……」"

[[dialogue]]
speaker = "unk"
# どうしてここに
line = "どうしてここに"

[[dialogue]]
speaker = "unk"
# トリシャさん！？
line = "トリシャさん！？"

[[dialogue]]
speaker = "トリシャ"
# 「あ、会長さん……どうも。あの、ヘレナさんに呼ばれて……水着、というのも……初めて着ました。なんだか下着みたいですね……フフフ」
line = "「あ、会長さん……どうも。あの、ヘレナさんに呼ばれて……水着、というのも……初めて着ました。なんだか下着みたいですね……フフフ」"

[[dialogue]]
speaker = "マトイ"
# 「いつもの内気な話し方の割に、やけに大胆な水着……」
line = "「いつもの内気な話し方の割に、やけに大胆な水着……」"

[[dialogue]]
speaker = "unk"
# トリシャさんもコンテストに？
line = "トリシャさんもコンテストに？"

[[dialogue]]
speaker = "トリシャ"
# 「はい……ええと、正直よくわかってはいないのですが……コンテストに出るといいことがある、と」
line = "「はい……ええと、正直よくわかってはいないのですが……コンテストに出るといいことがある、と」"

[[dialogue]]
speaker = "トリシャ"
# 「１位になれば……たくさん友達ができると言われました。ふふ……それなら参加したいと思った次第、です」
line = "「１位になれば……たくさん友達ができると言われました。ふふ……それなら参加したいと思った次第、です」"

[[dialogue]]
speaker = "ヘレナ"
# 「うむ。エントリー感謝するぞ、トリシャ」
line = "「うむ。エントリー感謝するぞ、トリシャ」"

[[dialogue]]
speaker = "トリシャ"
# 「お安い御用です。それに……」
line = "「お安い御用です。それに……」"

[[dialogue]]
speaker = "トリシャ"
# 「フフフ……会長さんはもう友達ですから。フレンドリーにボディタッチ」
line = "「フフフ……会長さんはもう友達ですから。フレンドリーにボディタッチ」"

[[dialogue]]
speaker = "unk"
# 柔らかな感触が……
line = "柔らかな感触が……"

[[dialogue]]
speaker = "unk"
# ！？
line = "！？"

[[dialogue]]
speaker = "マトイ"
# 「ちょっ……！？」
line = "「ちょっ……！？」"

[[dialogue]]
speaker = "ルリエル"
# 「おおっ！　大胆ですね～！」
line = "「おおっ！　大胆ですね～！」"

[[dialogue]]
speaker = "トリシャ"
# 「フフフ……他にも友達がたくさん。なんだかテンションが上がってしまいますね……フフフフフ」
line = "「フフフ……他にも友達がたくさん。なんだかテンションが上がってしまいますね……フフフフフ」"
