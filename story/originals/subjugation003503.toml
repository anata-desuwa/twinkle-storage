[[dialogue]]
speaker = "unk"
# ミルフィーの姿に１番に反応したのはジャクリーヌだった。
line = "ミルフィーの姿に１番に反応したのはジャクリーヌだった。"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆゆゆっ！？　道士ゆ！　冥界道士ゆ！！」
line = "「ゆゆゆっ！？　道士ゆ！　冥界道士ゆ！！」"

[[dialogue]]
speaker = "ヘレナ"
# 「その通りだ！　素晴らしい再現度だろう？」
line = "「その通りだ！　素晴らしい再現度だろう？」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「完璧だゆ！！」
line = "「完璧だゆ！！」"

[[dialogue]]
speaker = "ソフィア"
# 「ジャクリーヌさんだけ異様に盛り上がってますけど……」
line = "「ジャクリーヌさんだけ異様に盛り上がってますけど……」"

[[dialogue]]
speaker = "舞亜"
# 「あれじゃないかな？　ジャクリーヌちゃんが見たっていう映画の──」
line = "「あれじゃないかな？　ジャクリーヌちゃんが見たっていう映画の──」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ヒロインの冥界道士が着てた衣装なの！」
line = "「ヒロインの冥界道士が着てた衣装なの！」"

[[dialogue]]
speaker = "unk"
# もしかしてヘレナちゃんもその映画を？
line = "もしかしてヘレナちゃんもその映画を？"

[[dialogue]]
speaker = "ヘレナ"
# 「ふふふ……実は映画を見返す機会があってな、ブームが再燃している」
line = "「ふふふ……実は映画を見返す機会があってな、ブームが再燃している」"

[[dialogue]]
speaker = "ヘレナ"
# 「もとい！　いつ何時、このような事態に見舞われても対処できるよう、秘密裏に準備を進めていたのだ！」
line = "「もとい！　いつ何時、このような事態に見舞われても対処できるよう、秘密裏に準備を進めていたのだ！」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「さすがヘレナだゆ！！」
line = "「さすがヘレナだゆ！！」"

[[dialogue]]
speaker = "ヘレナ"
# 「今回の相手である──仮称『ゾンビ型幽霊』としようか──それは霊的な存在という話だからな」
line = "「今回の相手である──仮称『ゾンビ型幽霊』としようか──それは霊的な存在という話だからな」"

[[dialogue]]
speaker = "ヘレナ"
# 「この人工戦闘服は霊的な存在に対して特攻を持たせている。彼女なら例え敵が億千万のゾンビ型幽霊であったとしても遅れは取るまい」
line = "「この人工戦闘服は霊的な存在に対して特攻を持たせている。彼女なら例え敵が億千万のゾンビ型幽霊であったとしても遅れは取るまい」"

[[dialogue]]
speaker = "ミルフィー"
# 「おっ、億千万……っ！？　いくら何でもそれは無理だと思います……」
line = "「おっ、億千万……っ！？　いくら何でもそれは無理だと思います……」"

[[dialogue]]
speaker = "ヘレナ"
# 「案ずるな、その為にちゃんとオトモがいるのではないか」
line = "「案ずるな、その為にちゃんとオトモがいるのではないか」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆっ！？　オトモ！？　ま、まさか──」
line = "「ゆっ！？　オトモ！？　ま、まさか──」"

[[dialogue]]
speaker = "ヘレナ"
# 「さあ、冥界道士ミルフィーよ！　命じるのだ！」
line = "「さあ、冥界道士ミルフィーよ！　命じるのだ！」"

[[dialogue]]
speaker = "ミルフィー"
# 「え？　ええと……は、入ってきてください、トリシャさんっ！」
line = "「え？　ええと……は、入ってきてください、トリシャさんっ！」"

[[dialogue]]
speaker = "トリシャ"
# 「フフフ……トリシャ＝アポテレスマティカ、召喚の呼び声に応え、参上しました」
line = "「フフフ……トリシャ＝アポテレスマティカ、召喚の呼び声に応え、参上しました」"

[[dialogue]]
speaker = "unk"
# ミルフィーに続いて現れたのは、トリシャさんだった。
line = "ミルフィーに続いて現れたのは、トリシャさんだった。"

[[dialogue]]
speaker = "unk"
# 九浄家の屋敷に滞在している占星術師の彼女も、ミルフィーと同じような衣装に身を包んでいる。
line = "九浄家の屋敷に滞在している占星術師の彼女も、ミルフィーと同じような衣装に身を包んでいる。"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「今度は幽霊ゾンビの登場だゆ！　カッコイイゆ！！」
line = "「今度は幽霊ゾンビの登場だゆ！　カッコイイゆ！！」"

[[dialogue]]
speaker = "ソフィア"
# 「トリシャさんの動き、カフェテリアで暴れていたゾンビ型幽霊と同じ、ぴょんぴょんした動きですね」
line = "「トリシャさんの動き、カフェテリアで暴れていたゾンビ型幽霊と同じ、ぴょんぴょんした動きですね」"

[[dialogue]]
speaker = "ウズメイア"
# 「２人が着てるのってチーパオだっけ？　すっごい可愛いんだけど！」
line = "「２人が着てるのってチーパオだっけ？　すっごい可愛いんだけど！」"

[[dialogue]]
speaker = "トリシャ"
# 「フフ……ありがとうございます……」
line = "「フフ……ありがとうございます……」"

[[dialogue]]
speaker = "unk"
# ミルフィーもよく似合ってる
line = "ミルフィーもよく似合ってる"

[[dialogue]]
speaker = "ミルフィー"
# 「そ、そうかな？　えへへ……そんなに真っ直ぐに褒められると、ちょっと恥ずかしいかも……」
line = "「そ、そうかな？　えへへ……そんなに真っ直ぐに褒められると、ちょっと恥ずかしいかも……」"

[[dialogue]]
speaker = "舞亜"
# 「もしかして会長さんって、こちらの方とはお知り合いなのかな？」
line = "「もしかして会長さんって、こちらの方とはお知り合いなのかな？」"

[[dialogue]]
speaker = "unk"
# ああ、そうだよ
line = "ああ、そうだよ"

[[dialogue]]
speaker = "マトイ"
# 「ミルフィーは私たちのクラスの委員長なんだよ」
line = "「ミルフィーは私たちのクラスの委員長なんだよ」"

[[dialogue]]
speaker = "ミルフィー"
# 「は、はじめまして！　ミルフィー・インセントです」
line = "「は、はじめまして！　ミルフィー・インセントです」"

[[dialogue]]
speaker = "舞亜"
# 「はじめまして、ミルフィーさん。柊舞亜です」
line = "「はじめまして、ミルフィーさん。柊舞亜です」"

[[dialogue]]
speaker = "ウズメイア"
# 「あたしはウズメイア！　ウズメって呼んでください♪」
line = "「あたしはウズメイア！　ウズメって呼んでください♪」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「余はジャクリーヌだゆ！　よろしくだゆ！」
line = "「余はジャクリーヌだゆ！　よろしくだゆ！」"

[[dialogue]]
speaker = "ソフィア"
# 「奏ソフィアです、よろしくお願いします」
line = "「奏ソフィアです、よろしくお願いします」"

[[dialogue]]
speaker = "ミルフィー"
# 「あはは、私はみんなのこと知ってるかな。だって学園中から注目を集めてる有名人ばかりだし」
line = "「あはは、私はみんなのこと知ってるかな。だって学園中から注目を集めてる有名人ばかりだし」"

[[dialogue]]
speaker = "ソフィア"
# 「そうでしょうか？　金メダリストの舞亜はともかく、他のみんなは有名人というほどでは無いような……」
line = "「そうでしょうか？　金メダリストの舞亜はともかく、他のみんなは有名人というほどでは無いような……」"

[[dialogue]]
speaker = "ミルフィー"
# 「そんなことないよ！　ソフィアさんは流星学園の星徒会書記だし、ウズメさんは１年生にキラキラの可愛い子がいるってよく耳にするよ？」
line = "「そんなことないよ！　ソフィアさんは流星学園の星徒会書記だし、ウズメさんは１年生にキラキラの可愛い子がいるってよく耳にするよ？」"

[[dialogue]]
speaker = "ミルフィー"
# 「それにハロウィンの代名詞としてジャクリーヌさんのことを知らない学園生はいないと思うし……すごいメンバーが揃ってて畏れ多いよ」
line = "「それにハロウィンの代名詞としてジャクリーヌさんのことを知らない学園生はいないと思うし……すごいメンバーが揃ってて畏れ多いよ」"

[[dialogue]]
speaker = "ヘレナ"
# 「何を弱気になっているのだミルフィー・インセント、今日の主役は貴殿だぞ？」
line = "「何を弱気になっているのだミルフィー・インセント、今日の主役は貴殿だぞ？」"

[[dialogue]]
speaker = "ミルフィー"
# 「ううっ……が、頑張ります……」
line = "「ううっ……が、頑張ります……」"

[[dialogue]]
speaker = "トリシャ"
# 「ミルフィーさん……私もオトモとしてサポートしますので……」
line = "「ミルフィーさん……私もオトモとしてサポートしますので……」"

[[dialogue]]
speaker = "ミルフィー"
# 「ありがとうございます、トリシャさん」
line = "「ありがとうございます、トリシャさん」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「トリシャも余を助けに来てくれたの！　とっても心強いの♪」
line = "「トリシャも余を助けに来てくれたの！　とっても心強いの♪」"

[[dialogue]]
speaker = "トリシャ"
# 「ジャクリーヌさんとはオトモダチですから……フフ……オトモダチの危機に駆け付けるのは当然のこと……」
line = "「ジャクリーヌさんとはオトモダチですから……フフ……オトモダチの危機に駆け付けるのは当然のこと……」"

[[dialogue]]
speaker = "ヘレナ"
# 「ミルフィーとトリシャ、双方の力を合わせれば、より戦闘服の力を引き出すことが出来るはずだ。期待しているぞ、２人とも」
line = "「ミルフィーとトリシャ、双方の力を合わせれば、より戦闘服の力を引き出すことが出来るはずだ。期待しているぞ、２人とも」"

[[dialogue]]
speaker = "ミルフィー"
# 「は、はいっ」
line = "「は、はいっ」"

[[dialogue]]
speaker = "トリシャ"
# 「お任せください……」
line = "「お任せください……」"
