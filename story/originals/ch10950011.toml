[[dialogue]]
speaker = "unk"
# 第１話,３人目の魔法少女,P
line = "第１話,３人目の魔法少女,P"

[[dialogue]]
speaker = "unk"
# 『解放』のロストアイテムが現れた事件から、少し経って。
line = "『解放』のロストアイテムが現れた事件から、少し経って。"

[[dialogue]]
speaker = "unk"
# その日は魔法少女の３人――サチ、プリムラ、そして新たに加わったシズハが、改めて戦闘中の連携を確認しようということになり、訓練を行っていた。
line = "その日は魔法少女の３人――サチ、プリムラ、そして新たに加わったシズハが、改めて戦闘中の連携を確認しようということになり、訓練を行っていた。"

[[dialogue]]
speaker = "unk"
# 俺はそれを見学していたのだが――
line = "俺はそれを見学していたのだが――"

[[dialogue]]
speaker = "シズハ"
# 「聖杯ちゃん、お願い！　力を貸して！」
line = "「聖杯ちゃん、お願い！　力を貸して！」"

[[dialogue]]
speaker = "unk"
# 分析の結果、シズハの使っている力は星騎士の使う『星力』と異なり、魔女が使う『魔力』であるとモニターに表示されていた。
line = "分析の結果、シズハの使っている力は星騎士の使う『星力』と異なり、魔女が使う『魔力』であるとモニターに表示されていた。"

[[dialogue]]
speaker = "シズハ"
# 「ふぅ～、ちょっと休憩～♪」
line = "「ふぅ～、ちょっと休憩～♪」"

[[dialogue]]
speaker = "unk"
# お疲れ様、シズハ
line = "お疲れ様、シズハ"

[[dialogue]]
speaker = "unk"
# 俺は彼女にスポーツドリンクの入った水筒を渡す。
line = "俺は彼女にスポーツドリンクの入った水筒を渡す。"

[[dialogue]]
speaker = "シズハ"
# 「あっ、会長、ありがとう♪」
line = "「あっ、会長、ありがとう♪」"

[[dialogue]]
speaker = "シズハ"
# 「ねぇ、どうだった？　私、サチちゃんやプリムラちゃんと上手く連携できてた？」
line = "「ねぇ、どうだった？　私、サチちゃんやプリムラちゃんと上手く連携できてた？」"

[[dialogue]]
speaker = "unk"
# ああ、すごくいい感じだったぞ
line = "ああ、すごくいい感じだったぞ"

[[dialogue]]
speaker = "シズハ"
# 「よし♪　ならよかったわ♪」
line = "「よし♪　ならよかったわ♪」"

[[dialogue]]
speaker = "unk"
# 彼女は流星学園附属校３年生の、<ruby=そめい>染井</ruby>シズハ。今から１ヶ月前に学園へやって来た転入生である。
line = "彼女は流星学園附属校３年生の、<ruby>染井<rt>そめい</rt></ruby>シズハ。今から１ヶ月前に学園へやって来た転入生である。"

[[dialogue]]
speaker = "unk"
# ──彼女はサチやプリムラに続く３人目の魔法少女だ。
line = "──彼女はサチやプリムラに続く３人目の魔法少女だ。"

[[dialogue]]
speaker = "unk"
# この前のロストアイテム事件の際に、俺は初めて彼女と顔を合わせていた。
line = "この前のロストアイテム事件の際に、俺は初めて彼女と顔を合わせていた。"

[[dialogue]]
speaker = "unk"
# そういえば、さっきなんだけど――
line = "そういえば、さっきなんだけど――"

[[dialogue]]
speaker = "シズハ"
# 「えっ、聖杯ちゃんのカモフラージュが解けてる……？」
line = "「えっ、聖杯ちゃんのカモフラージュが解けてる……？」"

[[dialogue]]
speaker = "シズハ"
# 「そうなの！？　いつの間に……！」
line = "「そうなの！？　いつの間に……！」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「なんじゃシズハ、大きな声を出したりして」
line = "「なんじゃシズハ、大きな声を出したりして」"

[[dialogue]]
speaker = "サチ"
# 「お兄さん、何かあったんですか？」
line = "「お兄さん、何かあったんですか？」"

[[dialogue]]
speaker = "unk"
# 気づいてやって来た２人に、シズハが使っている力が『魔力』であることを話すと――
line = "気づいてやって来た２人に、シズハが使っている力が『魔力』であることを話すと――"

[[dialogue]]
speaker = "unk"
# サチの杖に憑依しているロストアイテム――トレジアンナさんが口を開く。
line = "サチの杖に憑依しているロストアイテム――トレジアンナさんが口を開く。"

[[dialogue]]
speaker = "トレジアンナ"
# 「なるほど。だとすれば、おそらくディーラックさんがカモフラージュをしていたんでしょうね」
line = "「なるほど。だとすれば、おそらくディーラックさんがカモフラージュをしていたんでしょうね」"

[[dialogue]]
speaker = "シズハ"
# 「私、てっきり聖杯ちゃんにお願いが届いて、誤魔化せてるものだとばかり……」
line = "「私、てっきり聖杯ちゃんにお願いが届いて、誤魔化せてるものだとばかり……」"

[[dialogue]]
speaker = "シズハ"
# 「『魔力は今の時代、一般的な力じゃないから、聖杯ちゃんにお願いして隠してもらいなさい』ってディーちゃんが言ってて」
line = "「『魔力は今の時代、一般的な力じゃないから、聖杯ちゃんにお願いして隠してもらいなさい』ってディーちゃんが言ってて」"

[[dialogue]]
speaker = "シズハ"
# 「それからは附属校に転入手続きをする時も、『星力あり』って判定されてたから、ずっと上手く行ってるつもりだったわ」
line = "「それからは附属校に転入手続きをする時も、『星力あり』って判定されてたから、ずっと上手く行ってるつもりだったわ」"

[[dialogue]]
speaker = "トレジアンナ"
# 「実際は聖杯ではなく、ディーラックさんがこっそりやってたってことでしょうね～」
line = "「実際は聖杯ではなく、ディーラックさんがこっそりやってたってことでしょうね～」"

[[dialogue]]
speaker = "サチ"
# 「そういえばトレジアンナさん、シズハちゃんと初めて会った時から『凄い濃密な魔力の気配がする』って言ってましたもんね」
line = "「そういえばトレジアンナさん、シズハちゃんと初めて会った時から『凄い濃密な魔力の気配がする』って言ってましたもんね」"

[[dialogue]]
speaker = "トレジアンナ"
# 「ええ。サチさんの前では、時々ポロッと魔力って言い方をしちゃってましたが……ロストアイテムはそもそも、古代の魔女が作ったものだと言われてるんです」
line = "「ええ。サチさんの前では、時々ポロッと魔力って言い方をしちゃってましたが……ロストアイテムはそもそも、古代の魔女が作ったものだと言われてるんです」"

[[dialogue]]
speaker = "サチ"
# 「なるほど。だからロストアイテムと融合したシズハちゃんが使うのは『魔力』なんですね」
line = "「なるほど。だからロストアイテムと融合したシズハちゃんが使うのは『魔力』なんですね」"

[[dialogue]]
speaker = "トレジアンナ"
# 「そういうことです。ちなみに、シズハさんの持つ『願望』のロストアイテム――『願いの聖杯』は、人類史の中でも有名な、それはそれは凄い代物なんですよ～！」
line = "「そういうことです。ちなみに、シズハさんの持つ『願望』のロストアイテム――『願いの聖杯』は、人類史の中でも有名な、それはそれは凄い代物なんですよ～！」"

[[dialogue]]
speaker = "unk"
# サチたちはいつ、シズハと知り合ったんだ？
line = "サチたちはいつ、シズハと知り合ったんだ？"

[[dialogue]]
speaker = "unk"
# そういえば、気になってたんだけど――
line = "そういえば、気になってたんだけど――"

[[dialogue]]
speaker = "シズハ"
# 「ああ、その時のこと、会長にはまだ話したことなかったわね」
line = "「ああ、その時のこと、会長にはまだ話したことなかったわね」"

[[dialogue]]
speaker = "シズハ"
# 「１ヶ月前、私が魔法少女になって、ロストアイテムの回収を始めたばかりの頃に、２人とは現場でかち合ったの」
line = "「１ヶ月前、私が魔法少女になって、ロストアイテムの回収を始めたばかりの頃に、２人とは現場でかち合ったの」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「あれは確か、『飛翔』のロストアイテムを追っていた時じゃったな」
line = "「あれは確か、『飛翔』のロストアイテムを追っていた時じゃったな」"

[[dialogue]]
speaker = "シズハ"
# 「そうそう。なんだかんだあって、どっちが先にロストアイテムを回収するかの競争になったのよね」
line = "「そうそう。なんだかんだあって、どっちが先にロストアイテムを回収するかの競争になったのよね」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「こやつ、聖杯の力で出し抜きおって、我らに勝ちおったのじゃ」
line = "「こやつ、聖杯の力で出し抜きおって、我らに勝ちおったのじゃ」"

[[dialogue]]
speaker = "シズハ"
# 「ふっふっふ！　私、格闘技好きだから、戦闘の駆け引きの知識だけは沢山あるのよ♪」
line = "「ふっふっふ！　私、格闘技好きだから、戦闘の駆け引きの知識だけは沢山あるのよ♪」"

[[dialogue]]
speaker = "サチ"
# 「それで、２回目にシズハちゃんとかち合った時のロストアイテムがかなり手強くて、協力して回収する流れになったんだよね」
line = "「それで、２回目にシズハちゃんとかち合った時のロストアイテムがかなり手強くて、協力して回収する流れになったんだよね」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「というか、サチはその時点で既に、シズハと仲良くなってたのじゃ」
line = "「というか、サチはその時点で既に、シズハと仲良くなってたのじゃ」"

[[dialogue]]
speaker = "シズハ"
# 「でも、２回目の時は、プリムラちゃんとのコンビネーションでロストアイテム回収に成功したのよね♪　それで打ち解けられたっていうか」
line = "「でも、２回目の時は、プリムラちゃんとのコンビネーションでロストアイテム回収に成功したのよね♪　それで打ち解けられたっていうか」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「ま、まぁ、そうじゃな。貴様がやたらと人懐っこいから……」
line = "「ま、まぁ、そうじゃな。貴様がやたらと人懐っこいから……」"

[[dialogue]]
speaker = "シズハ"
# 「ふふっ♪　で、それ以降の回収では、より活躍した方にロストアイテムを譲るようになった、って感じかな」
line = "「ふふっ♪　で、それ以降の回収では、より活躍した方にロストアイテムを譲るようになった、って感じかな」"

[[dialogue]]
speaker = "unk"
# 附属校に転入してきたのは？
line = "附属校に転入してきたのは？"

[[dialogue]]
speaker = "シズハ"
# 「初めてサチちゃんたちと出会った、ちょうど翌日ね」
line = "「初めてサチちゃんたちと出会った、ちょうど翌日ね」"

[[dialogue]]
speaker = "シズハ"
# 「ディーちゃんから、学園に入った方が魔法少女として活動しやすいって言われて、転入することにしたんだけど――」
line = "「ディーちゃんから、学園に入った方が魔法少女として活動しやすいって言われて、転入することにしたんだけど――」"

[[dialogue]]
speaker = "シズハ"
# 「実際に通い始めたら、まさかのサチちゃんと同じクラスでビックリしたわ！」
line = "「実際に通い始めたら、まさかのサチちゃんと同じクラスでビックリしたわ！」"

[[dialogue]]
speaker = "unk"
# ちなみに『ディーちゃん』――ディーラックは、今この場にはいないが、シズハを魔法少女にした張本人である。
line = "ちなみに『ディーちゃん』――ディーラックは、今この場にはいないが、シズハを魔法少女にした張本人である。"

[[dialogue]]
speaker = "サチ"
# 「昨日の今日だったからね。最初はちょっと警戒しちゃったけど、シズハちゃんはすごく積極的に話しかけてきて――」
line = "「昨日の今日だったからね。最初はちょっと警戒しちゃったけど、シズハちゃんはすごく積極的に話しかけてきて――」"

[[dialogue]]
speaker = "シズハ"
# 「私、なんかもう出会いの嬉しさの方が勝っちゃって。その日のうちに、サチちゃんとＤＩＳＣの連絡先も交換して、友達になったの♪」
line = "「私、なんかもう出会いの嬉しさの方が勝っちゃって。その日のうちに、サチちゃんとＤＩＳＣの連絡先も交換して、友達になったの♪」"

[[dialogue]]
speaker = "サチ"
# 「ふふっ、あまりに積極的過ぎて、その週末には、私の家に泊まりで遊びに来てたもんね」
line = "「ふふっ、あまりに積極的過ぎて、その週末には、私の家に泊まりで遊びに来てたもんね」"

[[dialogue]]
speaker = "unk"
# どうやら話によると、サチの実家は流星市国にあるらしく、寮生ではないらしい。
line = "どうやら話によると、サチの実家は流星市国にあるらしく、寮生ではないらしい。"

[[dialogue]]
speaker = "シズハ"
# 「そうそう！　で、プリムラちゃんが嫉妬しちゃって、『我も参加する！』って言い出して～」
line = "「そうそう！　で、プリムラちゃんが嫉妬しちゃって、『我も参加する！』って言い出して～」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「ちょっ！？　誰が嫉妬じゃと！？　あれは違うのじゃ！　勝手に勘違いするでない！」
line = "「ちょっ！？　誰が嫉妬じゃと！？　あれは違うのじゃ！　勝手に勘違いするでない！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「いや～、あの時のプリムラさんは可愛かったですね～♪」
line = "「いや～、あの時のプリムラさんは可愛かったですね～♪」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「はあぁっ！？　誰が可愛いって……フヘへ♪　へ、変なことを言うでないのじゃ！」
line = "「はあぁっ！？　誰が可愛いって……フヘへ♪　へ、変なことを言うでないのじゃ！」"

[[dialogue]]
speaker = "unk"
# （そこは照れるんだ……）
line = "（そこは照れるんだ……）"

[[dialogue]]
speaker = "シズハ"
# 「とまぁ、私たちの馴れ初めはそんな感じかな♪」
line = "「とまぁ、私たちの馴れ初めはそんな感じかな♪」"

[[dialogue]]
speaker = "シズハ"
# 「――あっ！　ちなみに『魔法少女グレイル☆シズハ』の名乗りは、サチちゃんの『魔法少女トレジャー☆サチ』の名乗りがカッコよかったから、真似したんだ♪」
line = "「――あっ！　ちなみに『魔法少女グレイル☆シズハ』の名乗りは、サチちゃんの『魔法少女トレジャー☆サチ』の名乗りがカッコよかったから、真似したんだ♪」"

[[dialogue]]
speaker = "サチ"
# 「いや、私は名乗ってませんけどね！？　毎度勝手にその口上を言ってるのは、トレジアンナさんですから！」
line = "「いや、私は名乗ってませんけどね！？　毎度勝手にその口上を言ってるのは、トレジアンナさんですから！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「え～、サチさんもシズハさんみたいに、もっとノリ良く行きましょうよ～！　そろそろ魔法少女活動も長くなって来たことですし～」
line = "「え～、サチさんもシズハさんみたいに、もっとノリ良く行きましょうよ～！　そろそろ魔法少女活動も長くなって来たことですし～」"

[[dialogue]]
speaker = "シズハ"
# 「そうそう！　サチちゃん、こういうのは行け行けゴーゴーで、慣れだよ、慣れ♪」
line = "「そうそう！　サチちゃん、こういうのは行け行けゴーゴーで、慣れだよ、慣れ♪」"

[[dialogue]]
speaker = "サチ"
# 「絶対に、イ・ヤ・で・す～～～！！！」
line = "「絶対に、イ・ヤ・で・す～～～！！！」"

[[dialogue]]
speaker = "unk"
# シズハはサチたちとすっかり親しそうなやり取りをしながら、楽しそうに笑うのだった――
line = "シズハはサチたちとすっかり親しそうなやり取りをしながら、楽しそうに笑うのだった――"
