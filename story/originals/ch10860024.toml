[[dialogue]]
speaker = "unk"
# 第４話,アルモたんと新婚ごっこ,P
line = "第４話,アルモたんと新婚ごっこ,P"

[[dialogue]]
speaker = "unk"
# その日はアルモと２人きりで、リゾート結界のプライベートビーチへと遊びに来ていた。
line = "その日はアルモと２人きりで、リゾート結界のプライベートビーチへと遊びに来ていた。"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「会長、今日はアルモたんと２人きりで、いっぱいイチャイチャするぞ♪」
line = "「会長、今日はアルモたんと２人きりで、いっぱいイチャイチャするぞ♪」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「最近、会長は仕事で忙しくて……全然ぎゅ～ってしてもらえてなかったからな！」
line = "「最近、会長は仕事で忙しくて……全然ぎゅ～ってしてもらえてなかったからな！」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「だから今日は、アルモたんが思いっきり甘えちゃうのだ<emoji=heart04>」
line = "「だから今日は、アルモたんが思いっきり甘えちゃうのだ<emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「それでな、この前の『将来の話』、覚えているか？　今日はその練習も兼ねて――」
line = "「それでな、この前の『将来の話』、覚えているか？　今日はその練習も兼ねて――」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「アルモたんと『新婚さんごっこ』をするのだ<emoji=heart04>」
line = "「アルモたんと『新婚さんごっこ』をするのだ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 新婚さんごっこ！？
line = "新婚さんごっこ！？"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「ふふっ、会長、驚いて顔が赤くなっているぞ♪」
line = "「ふふっ、会長、驚いて顔が赤くなっているぞ♪」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「アルモたん、会長とラブラブなごっこ遊びがしたいのだ<emoji=heart04>　……ダメか？」
line = "「アルモたん、会長とラブラブなごっこ遊びがしたいのだ<emoji=heart04>　……ダメか？」"

[[dialogue]]
speaker = "unk"
# そんなふうに言われて、断れるはずもない。
line = "そんなふうに言われて、断れるはずもない。"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「えへへっ、よかったのだ♪　じゃあまずは、新婚さんの朝といえば――『おはようのチュー』からなのだ♪」
line = "「えへへっ、よかったのだ♪　じゃあまずは、新婚さんの朝といえば――『おはようのチュー』からなのだ♪」"

[[dialogue]]
speaker = "unk"
# アルモがちょこんと両手を俺の胸に当て背伸びをすると、控えめなキスをしてくる。
line = "アルモがちょこんと両手を俺の胸に当て背伸びをすると、控えめなキスをしてくる。"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「ん～っ……ちゅっ<emoji=heart04>　えへへ……<emoji=heart04>　これで今から、会長はアルモたんの<b>旦那さま</b>だぞ♪」
line = "「ん～っ……ちゅっ<emoji=heart04>　えへへ……<emoji=heart04>　これで今から、会長はアルモたんの<b>旦那さま</b>だぞ♪」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「次は……『今日の予定を相談する時間』なのだ！」
line = "「次は……『今日の予定を相談する時間』なのだ！」"

[[dialogue]]
speaker = "unk"
# 俺の腕に抱き着いてきたアルモと並んで、そのまま海辺をゆっくりと散歩する。
line = "俺の腕に抱き着いてきたアルモと並んで、そのまま海辺をゆっくりと散歩する。"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「旦那さま、今日はどこでデートするのだ？　浜辺でピクニックか？　それとも海で一緒にぷかぷかするのだ？」
line = "「旦那さま、今日はどこでデートするのだ？　浜辺でピクニックか？　それとも海で一緒にぷかぷかするのだ？」"

[[dialogue]]
speaker = "unk"
# そう言いながら、アルモは俺の手を自分の腰へと誘導し、体を密着させてくる。
line = "そう言いながら、アルモは俺の手を自分の腰へと誘導し、体を密着させてくる。"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「新婚さんは、手をつなぐだけじゃ足りないのだ。こうやって……体でもくっつきあうものなのだ♪」
line = "「新婚さんは、手をつなぐだけじゃ足りないのだ。こうやって……体でもくっつきあうものなのだ♪」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「えへへ<emoji=heart04>　旦那さまの腕、落ち着くのだ～<emoji=heart04>」
line = "「えへへ<emoji=heart04>　旦那さまの腕、落ち着くのだ～<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# それから、俺たちはビーチチェアーに移動し、２人並んで腰かけた。
line = "それから、俺たちはビーチチェアーに移動し、２人並んで腰かけた。"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「じゃあ次は……お昼の『あーん』タイムなのだ♪」
line = "「じゃあ次は……お昼の『あーん』タイムなのだ♪」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「旦那さま、お口を開けるのだ。アルモたんが作ってきたお弁当を食べさせてあげるぞ♪」
line = "「旦那さま、お口を開けるのだ。アルモたんが作ってきたお弁当を食べさせてあげるぞ♪」"

[[dialogue]]
speaker = "unk"
# アルモは能力で『煉獄』からお弁当箱を取り出し、でき立てのまま保存されている生姜焼きを箸で差し出す。
line = "アルモは能力で『煉獄』からお弁当箱を取り出し、でき立てのまま保存されている生姜焼きを箸で差し出す。"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「はい、お肉をあ～んなのだ<emoji=heart04>」
line = "「はい、お肉をあ～んなのだ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺が食べて、美味しいと伝えると、アルモはぱあっと嬉しそうに笑う。
line = "俺が食べて、美味しいと伝えると、アルモはぱあっと嬉しそうに笑う。"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「えへへっ♪　旦那さまが美味しそうに食べる顔、好きなのだ<emoji=heart04>」
line = "「えへへっ♪　旦那さまが美味しそうに食べる顔、好きなのだ<emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「今度は旦那さまの番なのだ。アルモたんにも……お肉を食べさせて欲しいのだ<emoji=heart04>」
line = "「今度は旦那さまの番なのだ。アルモたんにも……お肉を食べさせて欲しいのだ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 交代して、俺が食べさせてあげると――アルモは幸せそうに目を細める。
line = "交代して、俺が食べさせてあげると――アルモは幸せそうに目を細める。"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「んっ……♪　はむっ……もぐもぐ……♪　美味なのだ<emoji=heart04>　これも新婚さんの特権なのだ～♪」
line = "「んっ……♪　はむっ……もぐもぐ……♪　美味なのだ<emoji=heart04>　これも新婚さんの特権なのだ～♪」"

[[dialogue]]
speaker = "unk"
# そうしてお弁当を食べ終えると、アルモは満足げに身を寄せてきた。
line = "そうしてお弁当を食べ終えると、アルモは満足げに身を寄せてきた。"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「旦那さま……次はお昼寝タイムなのだ。新婚さんは、お昼寝も一緒にするのだ♪」
line = "「旦那さま……次はお昼寝タイムなのだ。新婚さんは、お昼寝も一緒にするのだ♪」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「だから、アルモたんに膝枕をして欲しいのだ<emoji=heart04>」
line = "「だから、アルモたんに膝枕をして欲しいのだ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# アルモは俺の太ももに頭を乗せると、俺が撫でようと近づけた手に頬をすり寄らせてくる。
line = "アルモは俺の太ももに頭を乗せると、俺が撫でようと近づけた手に頬をすり寄らせてくる。"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「はふぅ……<emoji=heart04>　旦那さまの手、優しくて大好きなのだ……♪　頭なでなで……して欲しいのだ……♪」
line = "「はふぅ……<emoji=heart04>　旦那さまの手、優しくて大好きなのだ……♪　頭なでなで……して欲しいのだ……♪」"

[[dialogue]]
speaker = "unk"
# 撫でているうちに、アルモは微笑みながら、寝息を立て始めた。
line = "撫でているうちに、アルモは微笑みながら、寝息を立て始めた。"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「……すぅ……ん……旦那さま、だいすき……なのだ……」
line = "「……すぅ……ん……旦那さま、だいすき……なのだ……」"

[[dialogue]]
speaker = "unk"
# 小一時間ほど経ち、アルモが目を覚ます。
line = "小一時間ほど経ち、アルモが目を覚ます。"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「……んっ、旦那さまの膝枕が気持ちよくて、本当に寝ちゃってたのだ……♪」
line = "「……んっ、旦那さまの膝枕が気持ちよくて、本当に寝ちゃってたのだ……♪」"

[[dialogue]]
speaker = "unk"
# 俺も少し寝ちゃってた
line = "俺も少し寝ちゃってた"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「えへへっ♪　なら次は、おはようのチューを兼ねた、新婚さんの『誓いのちゅー』をしちゃうのだ<emoji=heart04>」
line = "「えへへっ♪　なら次は、おはようのチューを兼ねた、新婚さんの『誓いのちゅー』をしちゃうのだ<emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「会長……愛しているぞ<emoji=heart04>　ん～っ、ちゅっ……<emoji=heart04>」
line = "「会長……愛しているぞ<emoji=heart04>　ん～っ、ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 今度のキスは、ゆっくり長めだった。
line = "今度のキスは、ゆっくり長めだった。"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「んむっ……ちゅっ……<emoji=heart04>　はあぁっ……<emoji=heart04>　新婚さんのキスは、いつもより甘くて……美味なのだ……<emoji=heart04>」
line = "「んむっ……ちゅっ……<emoji=heart04>　はあぁっ……<emoji=heart04>　新婚さんのキスは、いつもより甘くて……美味なのだ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# アルモはキス、好きだよな
line = "アルモはキス、好きだよな"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「うん……♪　会長とのキス、大好きなのだ<emoji=heart04>」
line = "「うん……♪　会長とのキス、大好きなのだ<emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「お肉を食べるよりも、もっと大好きなのだ<emoji=heart04>　愛を感じる、『幸せの味』がするのだ……<emoji=heart04>」
line = "「お肉を食べるよりも、もっと大好きなのだ<emoji=heart04>　愛を感じる、『幸せの味』がするのだ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そう言うと、アルモはぎゅ～っと俺に抱き着いて、小さなキスを何度も重ねてくる。
line = "そう言うと、アルモはぎゅ～っと俺に抱き着いて、小さなキスを何度も重ねてくる。"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「ん～っ<emoji=heart04>　ちゅっ……ちゅっ……<emoji=heart04>　会長……今日はまだまだいっぱい、キスをおかわりしたいのだ<emoji=heart04>」
line = "「ん～っ<emoji=heart04>　ちゅっ……ちゅっ……<emoji=heart04>　会長……今日はまだまだいっぱい、キスをおかわりしたいのだ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# その後も、俺たちは新婚ごっこを続けて――お腹いっぱいになるほどに幸せな休日を過ごすのだった。
line = "その後も、俺たちは新婚ごっこを続けて――お腹いっぱいになるほどに幸せな休日を過ごすのだった。"
