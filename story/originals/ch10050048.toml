line = "「っく……！」"

[[dialogue]]
speaker = "unk"
# 息を噛み殺しながら、下腹部に力を籠める。
line = "息を噛み殺しながら、下腹部に力を籠める。"

[[dialogue]]
speaker = "unk"
# せり上がってくる欲望がはじけ飛ぶ直前まで至り、タガが外れたようにペニスを膣壁にこすりつけた。
line = "せり上がってくる欲望がはじけ飛ぶ直前まで至り、タガが外れたようにペニスを膣壁にこすりつけた。"

[[dialogue]]
speaker = "ソフィア"
# 「あぁっ、ふぁ、ふ、はああっ<emoji=heart04>　くりゅ、くりゅぅぅっ、んんっ<emoji=heart04>　あ、ああっ、おち○ちんから、すごいの、きちゃうよぉっ<emoji=heart04>」
line = "「あぁっ、ふぁ、ふ、はああっ<emoji=heart04>　くりゅ、くりゅぅぅっ、んんっ<emoji=heart04>　あ、ああっ、おち○ちんから、すごいの、きちゃうよぉっ<emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
# 「はぁあっ、あっ、あああ……いっぱひ……そそひでくらはいっ<emoji=heart04>　あっ、あ、ああっ<emoji=heart04>　ん、あっ<emoji=heart04>　あ、あ、ああ、あ、あああっ<emoji=heart04>」
line = "「はぁあっ、あっ、あああ……いっぱひ……そそひでくらはいっ<emoji=heart04>　あっ、あ、ああっ<emoji=heart04>　ん、あっ<emoji=heart04>　あ、あ、ああ、あ、あああっ<emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
# 「ああ、あ、あ、あ、あ、あ、っぅ、あ、あああっ！　や、イク、イク、イクぅ、あ～ぁ、イクぅっ！　んん、あ、んぅ、は、あぁあああっ……」
line = "「ああ、あ、あ、あ、あ、あ、っぅ、あ、あああっ！　や、イク、イク、イクぅ、あ～ぁ、イクぅっ！　んん、あ、んぅ、は、あぁあああっ……」"

[[dialogue]]
speaker = "ソフィア"
# 「ぁあああああああああああああ～～～～～～～～っ！！！」
line = "「ぁあああああああああああああ～～～～～～～～っ！！！」"

[[dialogue]]
speaker = "unk"
# ソフィの膣内でペニスが激しく脈動する。
line = "ソフィの膣内でペニスが激しく脈動する。"

[[dialogue]]
speaker = "unk"
# 結合部を痛いほど締め付けられながら、それでも一滴残らず注ぎ込むためにピストンを続ける。
line = "結合部を痛いほど締め付けられながら、それでも一滴残らず注ぎ込むためにピストンを続ける。"

[[dialogue]]
speaker = "unk"
# そして──
line = "そして──"

[[dialogue]]
speaker = "ソフィア"
# 「やぁ、あ、あああああーーーーーっ！！　んぁ、う、あぁあああーーーーっ！！」
line = "「やぁ、あ、あああああーーーーーっ！！　んぁ、う、あぁあああーーーーっ！！」"

[[dialogue]]
speaker = "unk"
# 俺に抱えられた状態のソフィの身体が、ぶるっぶるっと大きく震える。
line = "俺に抱えられた状態のソフィの身体が、ぶるっぶるっと大きく震える。"

[[dialogue]]
speaker = "unk"
# その直後、花びらの内側から、せきを切ったようにソフィの聖水が噴き出した。
line = "その直後、花びらの内側から、せきを切ったようにソフィの聖水が噴き出した。"

[[dialogue]]
speaker = "ソフィア"
# 「あぁ、あ……ひぅ、ぅ……ぁ……ああああっ……！　んんっ、あっ、あああっ……！！！」
line = "「あぁ、あ……ひぅ、ぅ……ぁ……ああああっ……！　んんっ、あっ、あああっ……！！！」"

[[dialogue]]
speaker = "ソフィア"
# 「あふぅ、ぅ……ぁああ……んんっ……おひっこ……れひゃったぁああぁ……<emoji=heart04>」
line = "「あふぅ、ぅ……ぁああ……んんっ……おひっこ……れひゃったぁああぁ……<emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
# 「ずっと、我慢してたからぁ……きもひ、いいぃいっ……んんぅ、ぁ、ああああっ……<emoji=heart04>」
line = "「ずっと、我慢してたからぁ……きもひ、いいぃいっ……んんぅ、ぁ、ああああっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 絶頂の叫びを上げながらも、下腹部に力を込めて溢れ出すものを我慢しようとする。
line = "絶頂の叫びを上げながらも、下腹部に力を込めて溢れ出すものを我慢しようとする。"

[[dialogue]]
speaker = "unk"
# だが、その衝動は抑制をいとも簡単に押し流してしまう。
line = "だが、その衝動は抑制をいとも簡単に押し流してしまう。"

[[dialogue]]
speaker = "ソフィア"
# 「会長さんのおち○ちんにイカされて……おしっこまで噴かされて……もうわらひ……なにもかんがへられなひぃ……<emoji=heart04>」
line = "「会長さんのおち○ちんにイカされて……おしっこまで噴かされて……もうわらひ……なにもかんがへられなひぃ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# やがてソフィは耐えることを諦め、衝動に身を任せていた。
line = "やがてソフィは耐えることを諦め、衝動に身を任せていた。"

[[dialogue]]
speaker = "unk"
# その間も俺のペニスは、脈動を続けている。
line = "その間も俺のペニスは、脈動を続けている。"

[[dialogue]]
speaker = "unk"
# 熱い液体を腹の中に送り込こまれ、その悦びによってソフィも放尿が止まらない。
line = "熱い液体を腹の中に送り込こまれ、その悦びによってソフィも放尿が止まらない。"

[[dialogue]]
speaker = "ソフィア"
# 「あぁあっ、会長さんっ……おひっこしてるのに……それでも中にらすのやめてぇ……<emoji=heart04>」
line = "「あぁあっ、会長さんっ……おひっこしてるのに……それでも中にらすのやめてぇ……<emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
# 「そんなことされたら……気持ちよすぎて死んじゃうっぅうう……<emoji=heart04>」
line = "「そんなことされたら……気持ちよすぎて死んじゃうっぅうう……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
# 「俺だって、全部出し尽くすまで……止まらない……」
line = "「俺だって、全部出し尽くすまで……止まらない……」"

[[dialogue]]
speaker = "ソフィア"
# 「はぁ、ぅ……あああっ……ん……んぅ……ぁ……ああああっ……」
line = "「はぁ、ぅ……あああっ……ん……んぅ……ぁ……ああああっ……」"

[[dialogue]]
speaker = "unk"
# 自身のどこにそれだけのものが詰まっていたのか不思議とも思えるほど、大量の白濁液を膣内で吐き出す。
line = "自身のどこにそれだけのものが詰まっていたのか不思議とも思えるほど、大量の白濁液を膣内で吐き出す。"

[[dialogue]]
speaker = "unk"
# ソフィは俺の射精に応えながら、口元を緩め、虚ろに瞳を漂わせながらおしっこを垂れ流し続けている。
line = "ソフィは俺の射精に応えながら、口元を緩め、虚ろに瞳を漂わせながらおしっこを垂れ流し続けている。"

[[dialogue]]
speaker = "unk"
# そんな恋人の痴態に、俺は震えるほどの悦びを覚えるのだった。
line = "そんな恋人の痴態に、俺は震えるほどの悦びを覚えるのだった。"
