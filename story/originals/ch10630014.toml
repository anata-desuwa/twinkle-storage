[[dialogue]]
speaker = "unk"
# 第４話,隠密少女の密かな変化,P
line = "第４話,隠密少女の密かな変化,P"

[[dialogue]]
speaker = "カヤ"
# 「──え？　今日で任務、終了……？」
line = "「──え？　今日で任務、終了……？」"

[[dialogue]]
speaker = "セドナ"
# 「ああ。これ以上、護衛を続けていても正体不明の輩との接触はないと判断した」
line = "「ああ。これ以上、護衛を続けていても正体不明の輩との接触はないと判断した」"

[[dialogue]]
speaker = "セドナ"
# 「ま、元々物は試しにという程度の作戦だったしな。今までご苦労だった。明日からは通常任務に戻れ」
line = "「ま、元々物は試しにという程度の作戦だったしな。今までご苦労だった。明日からは通常任務に戻れ」"

[[dialogue]]
speaker = "カヤ"
# 「それが命令なら……」
line = "「それが命令なら……」"

[[dialogue]]
speaker = "unk"
# 今日も遅くまでありがとう
line = "今日も遅くまでありがとう"

[[dialogue]]
speaker = "カヤ"
# 「べ、別にお礼なんかいい。任務、だから……」
line = "「べ、別にお礼なんかいい。任務、だから……」"

[[dialogue]]
speaker = "カヤ"
# 「それより、その……。私、あなたに言わなきゃいけないことある……」
line = "「それより、その……。私、あなたに言わなきゃいけないことある……」"

[[dialogue]]
speaker = "カヤ"
# 「こ、これっ。受け取って欲しい……！」
line = "「こ、これっ。受け取って欲しい……！」"

[[dialogue]]
speaker = "unk"
# これを俺に？
line = "これを俺に？"

[[dialogue]]
speaker = "カヤ"
# 「魔女の森で見つけた。宝石とはまた違うと思うけど、こういうキラキラしたもの、私、好きで……」
line = "「魔女の森で見つけた。宝石とはまた違うと思うけど、こういうキラキラしたもの、私、好きで……」"

[[dialogue]]
speaker = "カヤ"
# 「この前助けてくれたお礼……言えてなかったから。でもこういう時、何を渡せばいいかわからなくて……」
line = "「この前助けてくれたお礼……言えてなかったから。でもこういう時、何を渡せばいいかわからなくて……」"

[[dialogue]]
speaker = "カヤ"
# 「でも、良かったら受け取って欲しい。とびきりキラキラしたの、選んだつもりだから」
line = "「でも、良かったら受け取って欲しい。とびきりキラキラしたの、選んだつもりだから」"

[[dialogue]]
speaker = "カヤ"
# 「本当にありがとう。危ないところ助けてもらって。私のこと、ともだち言ってくれて」
line = "「本当にありがとう。危ないところ助けてもらって。私のこと、ともだち言ってくれて」"

[[dialogue]]
speaker = "カヤ"
# 「この前、私に聞いたこと覚えてる？　ここ数日、楽しくなかったかって話……」
line = "「この前、私に聞いたこと覚えてる？　ここ数日、楽しくなかったかって話……」"

[[dialogue]]
speaker = "カヤ"
# 「本当言うと、楽しかった。あなたと一緒に過ごすこと」
line = "「本当言うと、楽しかった。あなたと一緒に過ごすこと」"

[[dialogue]]
speaker = "カヤ"
# 「まだ私、その。ともだちっていうの、よくわからない。どんな風に話せばいいか。どう接したらいいかもわかってない」
line = "「まだ私、その。ともだちっていうの、よくわからない。どんな風に話せばいいか。どう接したらいいかもわかってない」"

[[dialogue]]
speaker = "カヤ"
# 「だけど、えと……。きっと私も、あなたのこと……」
line = "「だけど、えと……。きっと私も、あなたのこと……」"

[[dialogue]]
speaker = "カヤ"
# 「ともだち……思ってる」
line = "「ともだち……思ってる」"

[[dialogue]]
speaker = "unk"
# すごく嬉しいよ
line = "すごく嬉しいよ"

[[dialogue]]
speaker = "カヤ"
# 「真面目な顔して言わなくていい。私の方が恥ずかしくなる」
line = "「真面目な顔して言わなくていい。私の方が恥ずかしくなる」"

[[dialogue]]
speaker = "カヤ"
# 「でも……ふふ。喜んでもらえたのなら嬉しい」
line = "「でも……ふふ。喜んでもらえたのなら嬉しい」"

[[dialogue]]
speaker = "unk"
# あ……
line = "あ……"

[[dialogue]]
speaker = "カヤ"
# 「？？？　何ニヤニヤしてる？」
line = "「？？？　何ニヤニヤしてる？」"

[[dialogue]]
speaker = "unk"
# 笑ったところ初めて見たから
line = "笑ったところ初めて見たから"

[[dialogue]]
speaker = "カヤ"
# 「～～っっ！？　べ、別に笑ってない。笑う理由ないっ」
line = "「～～っっ！？　べ、別に笑ってない。笑う理由ないっ」"

[[dialogue]]
speaker = "カヤ"
# 「そのにやけ面やめる……！　それ以上、笑うなら刺す……！」
line = "「そのにやけ面やめる……！　それ以上、笑うなら刺す……！」"

[[dialogue]]
speaker = "カヤ"
# 「……やっぱりこの人、私を舐めてる。ともだちにする人、間違えたかもしれない……」
line = "「……やっぱりこの人、私を舐めてる。ともだちにする人、間違えたかもしれない……」"

[[dialogue]]
speaker = "カヤ"
# 「でも──ふふ。こういうのも悪くない」
line = "「でも──ふふ。こういうのも悪くない」"

[[dialogue]]
speaker = "カヤ"
# 「実は今朝。長官から今日で任務終わり言われてた」
line = "「実は今朝。長官から今日で任務終わり言われてた」"

[[dialogue]]
speaker = "カヤ"
# 「けど断った。珍しく長官驚いてた。今まで私、長官に意見したこと一度もなかったから。命令が下れば従うだけだったから」
line = "「けど断った。珍しく長官驚いてた。今まで私、長官に意見したこと一度もなかったから。命令が下れば従うだけだったから」"

[[dialogue]]
speaker = "カヤ"
# 「結局、呆れられたり怒られたりして任務終了は変わらなかったけど……。でも個人的に護衛する分には構わないって言われた」
line = "「結局、呆れられたり怒られたりして任務終了は変わらなかったけど……。でも個人的に護衛する分には構わないって言われた」"

[[dialogue]]
speaker = "カヤ"
# 「だから私、これからもあなたの護衛、続ける」
line = "「だから私、これからもあなたの護衛、続ける」"

[[dialogue]]
speaker = "カヤ"
# 「あなたのことが心配だから。ともだち、だから」
line = "「あなたのことが心配だから。ともだち、だから」"

[[dialogue]]
speaker = "カヤ"
# 「どうせ普段から無茶ばかりしてるはず。あなたは私を庇うようなお人好し。放っておけない」
line = "「どうせ普段から無茶ばかりしてるはず。あなたは私を庇うようなお人好し。放っておけない」"

[[dialogue]]
speaker = "カヤ"
# 「それに……あなたは正体不明の存在からも狙われてる。能天気にしてると、本当に敵に捕まりかねない」
line = "「それに……あなたは正体不明の存在からも狙われてる。能天気にしてると、本当に敵に捕まりかねない」"

[[dialogue]]
speaker = "カヤ"
# 「だから、私が守る。任務や命令じゃなくて──私の意志で」
line = "「だから、私が守る。任務や命令じゃなくて──私の意志で」"

[[dialogue]]
speaker = "unk"
# 心強いよ
line = "心強いよ"

[[dialogue]]
speaker = "カヤ"
# 「ふふ、こっちこそ心強い。あなたと一緒なら私も安心」
line = "「ふふ、こっちこそ心強い。あなたと一緒なら私も安心」"

[[dialogue]]
speaker = "カヤ"
# 「それと……良ければ、その。ともだちのことも色々と教えて欲しい……」
line = "「それと……良ければ、その。ともだちのことも色々と教えて欲しい……」"

[[dialogue]]
speaker = "カヤ"
# 「ともだち同士でどんなことするのか……。どういうお話するのか……。もっと知りたい……」
line = "「ともだち同士でどんなことするのか……。どういうお話するのか……。もっと知りたい……」"

[[dialogue]]
speaker = "カヤ"
# 「あなたと……ふふ。もっともっと、ともだちになりたいから」
line = "「あなたと……ふふ。もっともっと、ともだちになりたいから」"

[[dialogue]]
speaker = "カヤ"
# 「付き合って、くれる？」
line = "「付き合って、くれる？」"
