[[dialogue]]
speaker = "unk"
# 第１話,見学！　異世界流星学園！,P
line = "第１話,見学！　異世界流星学園！,P"

[[dialogue]]
speaker = "ユウリ"
# 「へぇ～。この人がフィオナの言ってたクルセイダースの」
line = "「へぇ～。この人がフィオナの言ってたクルセイダースの」"

[[dialogue]]
speaker = "セーラ"
# 「クルセイダースっていったら大昔の英雄さんだけど、うちらとそう変わんないね？　てゆか下手したら、うちより年下的な？」
line = "「クルセイダースっていったら大昔の英雄さんだけど、うちらとそう変わんないね？　てゆか下手したら、うちより年下的な？」"

[[dialogue]]
speaker = "ソフィア"
# 「そうですね、イメージとは似ても似つきません。やはりこちらの世界のクルセイダースとは違うのでしょうか」
line = "「そうですね、イメージとは似ても似つきません。やはりこちらの世界のクルセイダースとは違うのでしょうか」"

[[dialogue]]
speaker = "聖沙"
# 「コ、コホン。そんなにジロジロ舐め回すように眺めなくても。まるで見世物小屋のパンダになった気分だわ」
line = "「コ、コホン。そんなにジロジロ舐め回すように眺めなくても。まるで見世物小屋のパンダになった気分だわ」"

[[dialogue]]
speaker = "ルリエル"
# 「聖沙さんは正真正銘のクルセイダースですよ！　それにとーっても強いんです！　よく覚えていませんが、わたしもズドドドってありとあらゆる場所を射抜かれまして──」
line = "「聖沙さんは正真正銘のクルセイダースですよ！　それにとーっても強いんです！　よく覚えていませんが、わたしもズドドドってありとあらゆる場所を射抜かれまして──」"

[[dialogue]]
speaker = "聖沙"
# 「そ、その節はごめんなさい。ルリエルさんが正気を失っていたものだから」
line = "「そ、その節はごめんなさい。ルリエルさんが正気を失っていたものだから」"

[[dialogue]]
speaker = "フィオナ"
# 「まずはお互い自己紹介しないとね。せっかく聖沙さんが私たち流星学園星徒会を見学しに来てくれたんだから」
line = "「まずはお互い自己紹介しないとね。せっかく聖沙さんが私たち流星学園星徒会を見学しに来てくれたんだから」"

[[dialogue]]
speaker = "ユウリ"
# 「おっと、そうだったそうだった。あたしは楠葉ユウリ。星徒会の庶務だ」
line = "「おっと、そうだったそうだった。あたしは楠葉ユウリ。星徒会の庶務だ」"

[[dialogue]]
speaker = "セーラ"
# 「うちは副会長の桐原セーラ。ねぇねぇ、みさちーって呼んでいい？　うちのこともセーラで全然オケだから♪　とりま、よろしくね～♪」
line = "「うちは副会長の桐原セーラ。ねぇねぇ、みさちーって呼んでいい？　うちのこともセーラで全然オケだから♪　とりま、よろしくね～♪」"

[[dialogue]]
speaker = "ソフィア"
# 「私は奏ソフィアです。星徒会では書記を担当しています。腹巻きを巻いて寝るのが最近のマイブームです」
line = "「私は奏ソフィアです。星徒会では書記を担当しています。腹巻きを巻いて寝るのが最近のマイブームです」"

[[dialogue]]
speaker = "聖沙"
# 「ユウリさんにセーラさん、それにソフィアさんね？　みさちーは……まぁいいけど。それと──」
line = "「ユウリさんにセーラさん、それにソフィアさんね？　みさちーは……まぁいいけど。それと──」"

[[dialogue]]
speaker = "unk"
# どうも新星学園の星徒会長です
line = "どうも新星学園の星徒会長です"

[[dialogue]]
speaker = "ルリエル"
# 「無駄に新星学園の名前をアピールしてきました！　これは噂に聞くあれですか！？　ライバル校へのあぶり餅というヤツですか！？」
line = "「無駄に新星学園の名前をアピールしてきました！　これは噂に聞くあれですか！？　ライバル校へのあぶり餅というヤツですか！？」"

[[dialogue]]
speaker = "セーラ"
# 「それを言うなら殴り込みだよ、ルリち～。てゆか、そもそも単なる付き添いじゃない？」
line = "「それを言うなら殴り込みだよ、ルリち～。てゆか、そもそも単なる付き添いじゃない？」"

[[dialogue]]
speaker = "ソフィア"
# 「流星学園は迷宮のように広いですからね。私も迷子に──コホン。一度も迷子になったことはありませんが、未だに迷いそうになる時もありますから」
line = "「流星学園は迷宮のように広いですからね。私も迷子に──コホン。一度も迷子になったことはありませんが、未だに迷いそうになる時もありますから」"

[[dialogue]]
speaker = "聖沙"
# 「いえ、会長さんのことは顔も名前もバッチリ覚えてるんだけど。あ、あの子はいないのかしら？」
line = "「いえ、会長さんのことは顔も名前もバッチリ覚えてるんだけど。あ、あの子はいないのかしら？」"

[[dialogue]]
speaker = "ルリエル"
# 「あの子、ですか？　流星星徒会のメンバーはこれで全員ですよ？」
line = "「あの子、ですか？　流星星徒会のメンバーはこれで全員ですよ？」"

[[dialogue]]
speaker = "聖沙"
# 「役員じゃなくて、あの子よ。とってもキュートで愛らしい、鈴とマントがトレードマークの……」
line = "「役員じゃなくて、あの子よ。とってもキュートで愛らしい、鈴とマントがトレードマークの……」"

[[dialogue]]
speaker = "ユウリ"
# 「とってもキュートで愛らしい？　鈴とマントがトレードマークの？　そんなヤツ……うちの星徒会にいたか？」
line = "「とってもキュートで愛らしい？　鈴とマントがトレードマークの？　そんなヤツ……うちの星徒会にいたか？」"

[[dialogue]]
speaker = "聖沙"
# 「いるはずよ！　現に私はこの前の騒動の時に会って──」
line = "「いるはずよ！　現に私はこの前の騒動の時に会って──」"

[[dialogue]]
speaker = "ニャリオン"
# 「フィオナ嬢～。お昼はまだかニャ～？　今日はにゅーるの気分だニャ～」
line = "「フィオナ嬢～。お昼はまだかニャ～？　今日はにゅーるの気分だニャ～」"

[[dialogue]]
speaker = "聖沙"
# 「きゃああああっっ～！！　いたーっ！！　きゃわいいいっ～～！！！」
line = "「きゃああああっっ～！！　いたーっ！！　きゃわいいいっ～～！！！」"

[[dialogue]]
speaker = "ニャリオン"
# 「グニャニャニャっ！！？　ニャんで、この女がここに──！！？」
line = "「グニャニャニャっ！！？　ニャんで、この女がここに──！！？」"

[[dialogue]]
speaker = "セーラ"
# 「あははっニャリオンちゃん、ちょお頬ずりされてんじゃん。ぬいぐるみだったら、中から綿が飛び出ちゃいそうなくらい握り締められちゃってんし～♪」
line = "「あははっニャリオンちゃん、ちょお頬ずりされてんじゃん。ぬいぐるみだったら、中から綿が飛び出ちゃいそうなくらい握り締められちゃってんし～♪」"

[[dialogue]]
speaker = "ユウリ"
# 「あー、そういやアホ猫の存在忘れてたわ。つってもキュートで愛らしいって時点でどのみちピンとはこねえけど」
line = "「あー、そういやアホ猫の存在忘れてたわ。つってもキュートで愛らしいって時点でどのみちピンとはこねえけど」"

[[dialogue]]
speaker = "ニャリオン"
# 「見てニャいで助けっ……！！　毛並みがっ、ワガハイの凛々しく上品な毛並みがメチャクチャにされてるニャぁ……！！」
line = "「見てニャいで助けっ……！！　毛並みがっ、ワガハイの凛々しく上品な毛並みがメチャクチャにされてるニャぁ……！！」"

[[dialogue]]
speaker = "フィオナ"
# 「ふふ、クルセイダースさまに可愛がってもらえるなんて光栄じゃないですか。どうぞ聖沙さん。お好きなだけ撫でてあげてください」
line = "「ふふ、クルセイダースさまに可愛がってもらえるなんて光栄じゃないですか。どうぞ聖沙さん。お好きなだけ撫でてあげてください」"

[[dialogue]]
speaker = "ニャリオン"
# 「ニャニャ！？　フィオナ嬢まで！？」
line = "「ニャニャ！？　フィオナ嬢まで！？」"

[[dialogue]]
speaker = "聖沙"
# 「ねね、お腹空いてるんでしょ？　キャットフード食べる？　道すがらあなたのために買ってきてあげたの♪　猫じゃらしも持ってきたわよ♪」
line = "「ねね、お腹空いてるんでしょ？　キャットフード食べる？　道すがらあなたのために買ってきてあげたの♪　猫じゃらしも持ってきたわよ♪」"

[[dialogue]]
speaker = "ニャリオン"
# 「ワガハイをその辺の野良猫と一緒にするんじゃないニャ！　ワガハイは偉大なる──ニャニャン！　フィオナ嬢の従──ニャフン！　ニャリオ──んにゃん！！」
line = "「ワガハイをその辺の野良猫と一緒にするんじゃないニャ！　ワガハイは偉大なる──ニャニャン！　フィオナ嬢の従──ニャフン！　ニャリオ──んにゃん！！」"

[[dialogue]]
speaker = "聖沙"
# 「きゃぁっ～！！　猫じゃらし叩くのうま～い！！　可愛い～！！」
line = "「きゃぁっ～！！　猫じゃらし叩くのうま～い！！　可愛い～！！」"

[[dialogue]]
speaker = "ニャリオン"
# 「ぐにゃ～！！　体が勝手に反応してしまうニャ～！！」
line = "「ぐにゃ～！！　体が勝手に反応してしまうニャ～！！」"

[[dialogue]]
speaker = "unk"
# ……お目当てはニャリオンだったわけか
line = "……お目当てはニャリオンだったわけか"

[[dialogue]]
speaker = "聖沙"
# 「ご、ごめんなさい。あんまり可愛いものだからつい……。機嫌直して？　ねっ？」
line = "「ご、ごめんなさい。あんまり可愛いものだからつい……。機嫌直して？　ねっ？」"

[[dialogue]]
speaker = "ニャリオン"
# 「プイっ、ニャ！」
line = "「プイっ、ニャ！」"

[[dialogue]]
speaker = "フィオナ"
# 「ダメよ、ニャリオン。わざわざ会いに来てくれたのに、そんな失礼な態度を取ったら」
line = "「ダメよ、ニャリオン。わざわざ会いに来てくれたのに、そんな失礼な態度を取ったら」"

[[dialogue]]
speaker = "聖沙"
# 「べ、別にニャリオンさんにだけ会いに来たわけじゃないのよ？　本当にこちらの流星学園生徒会の皆さんとも話してみたいと思っていて」
line = "「べ、別にニャリオンさんにだけ会いに来たわけじゃないのよ？　本当にこちらの流星学園生徒会の皆さんとも話してみたいと思っていて」"

[[dialogue]]
speaker = "セーラ"
# 「いーよいーよ、フォロー入れなくても♪　みさちーがかわい～ってことも、よーくわかったし♪」
line = "「いーよいーよ、フォロー入れなくても♪　みさちーがかわい～ってことも、よーくわかったし♪」"

[[dialogue]]
speaker = "聖沙"
# 「なっ、かわいい！？」
line = "「なっ、かわいい！？」"

[[dialogue]]
speaker = "ルリエル"
# 「わたしたちのことを知りたいっていうお話なら、カードゲームでもしませんか？　みんなで、よくやってるんです！」
line = "「わたしたちのことを知りたいっていうお話なら、カードゲームでもしませんか？　みんなで、よくやってるんです！」"

[[dialogue]]
speaker = "ユウリ"
# 「お、いいな。ついでにアホ猫の所有権も賭けようぜ。トップがアホ猫を一週間、自分の使い魔にできるってことで」
line = "「お、いいな。ついでにアホ猫の所有権も賭けようぜ。トップがアホ猫を一週間、自分の使い魔にできるってことで」"

[[dialogue]]
speaker = "ニャリオン"
# 「何を勝手に決めてるニャ！？　ワガハイはフィオナ嬢の使い魔ニャ！！　それに万が一、あの女がトップを取ったら……！」
line = "「何を勝手に決めてるニャ！？　ワガハイはフィオナ嬢の使い魔ニャ！！　それに万が一、あの女がトップを取ったら……！」"

[[dialogue]]
speaker = "フィオナ"
# 「ふふ、いいですよ。トップの方にしばらくニャリオンを預けますね？」
line = "「ふふ、いいですよ。トップの方にしばらくニャリオンを預けますね？」"

[[dialogue]]
speaker = "ニャリオン"
# 「ニャんですと！？」
line = "「ニャんですと！？」"

[[dialogue]]
speaker = "セーラ"
# 「だってさ～。ふふふ、ニャリオンちゃん知ってる？　ゲームってのは自分が勝つより誰かを勝たせる方が何倍も簡単なんだよ～？」
line = "「だってさ～。ふふふ、ニャリオンちゃん知ってる？　ゲームってのは自分が勝つより誰かを勝たせる方が何倍も簡単なんだよ～？」"

[[dialogue]]
speaker = "ニャリオン"
# 「こ、こいつら、あの女をわざと勝たせるつもりニャ……！　どうしてそんな残酷なコトができるニャぁぁ～！！？」
line = "「こ、こいつら、あの女をわざと勝たせるつもりニャ……！　どうしてそんな残酷なコトができるニャぁぁ～！！？」"

[[dialogue]]
speaker = "聖沙"
# 「ふ、不正はダメよ！　やるなら正々堂々勝負しましょ！　その上で私はニャリオンさんを必ず手に入れてみせるから……！」
line = "「ふ、不正はダメよ！　やるなら正々堂々勝負しましょ！　その上で私はニャリオンさんを必ず手に入れてみせるから……！」"

[[dialogue]]
speaker = "ソフィア"
# 「正々堂々と、ですか。ふふ、聖沙さんのことが少しわかった気がしますね。では私が公平にカードをお配りしますよ」
line = "「正々堂々と、ですか。ふふ、聖沙さんのことが少しわかった気がしますね。では私が公平にカードをお配りしますよ」"

[[dialogue]]
speaker = "ニャリオン"
# 「ま、負けられないニャ……！　この勝負だけは絶対に負けられないニャっ……！！」
line = "「ま、負けられないニャ……！　この勝負だけは絶対に負けられないニャっ……！！」"

[[dialogue]]
speaker = "聖沙"
# 「それじゃあ──勝負よ、ニャリオンさん！　私だって、ふふ、絶対に負けないんだからっ♪」
line = "「それじゃあ──勝負よ、ニャリオンさん！　私だって、ふふ、絶対に負けないんだからっ♪」"
