[[dialogue]]
speaker = "unk"
# 第４話,ママダレナのこれから,P
line = "第４話,ママダレナのこれから,P"

[[dialogue]]
speaker = "unk"
# とある休日。リゾート結界のプライベートビーチにある海の家で、俺はマグダレナと勉強会をしていた。
line = "とある休日。リゾート結界のプライベートビーチにある海の家で、俺はマグダレナと勉強会をしていた。"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「ふむふむ、なるほど～。会長って、先生みたいに教えるのがお上手ですね♪」
line = "「ふむふむ、なるほど～。会長って、先生みたいに教えるのがお上手ですね♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「――以前、家庭教師のようなバイトをしていたことがある？　ふふっ、やっぱり会長は経験豊富ですね～」
line = "「――以前、家庭教師のようなバイトをしていたことがある？　ふふっ、やっぱり会長は経験豊富ですね～」"

[[dialogue]]
speaker = "unk"
# でも、どうして今日は勉強を？
line = "でも、どうして今日は勉強を？"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「実は私、アニマさまに言われたあの日から、将来のことをちゃんと考えてみることにしたんです。自分がこれから、どう生きていきたいのかって」
line = "「実は私、アニマさまに言われたあの日から、将来のことをちゃんと考えてみることにしたんです。自分がこれから、どう生きていきたいのかって」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「それで……もしできるなら――『保育士』を目指すのもいいかなって、ちょっと思い始めてまして…」
line = "「それで……もしできるなら――『保育士』を目指すのもいいかなって、ちょっと思い始めてまして…」"

[[dialogue]]
speaker = "unk"
# 俺は驚きつつも、子供たちを見守るマグダレナの姿は自然と想像できて、納得していた。
line = "俺は驚きつつも、子供たちを見守るマグダレナの姿は自然と想像できて、納得していた。"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「私、『みんなのママになりたい』っていう気持ちがあって……だから、将来の仕事を考えた時に、保育士に興味を持ったんです」
line = "「私、『みんなのママになりたい』っていう気持ちがあって……だから、将来の仕事を考えた時に、保育士に興味を持ったんです」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「まだ本当に考え始めたばかりなんですが……子供たちを見守るには、やっぱり正しい知識を学ぶことが必要だと思ったので」
line = "「まだ本当に考え始めたばかりなんですが……子供たちを見守るには、やっぱり正しい知識を学ぶことが必要だと思ったので」"

[[dialogue]]
speaker = "unk"
# 保育士、すごくいいと思う
line = "保育士、すごくいいと思う"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「本当ですか？　えへへへ……♪」
line = "「本当ですか？　えへへへ……♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「それと……保育士以外にも、やりたいことがありまして――」
line = "「それと……保育士以外にも、やりたいことがありまして――」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「私、<b>本当の</b>ママになることも……ちゃんと目指したいな、って♪」
line = "「私、<b>本当の</b>ママになることも……ちゃんと目指したいな、って♪」"

[[dialogue]]
speaker = "unk"
# 言いながら、マグダレナは少し照れたように俺を見上げる。
line = "言いながら、マグダレナは少し照れたように俺を見上げる。"

[[dialogue]]
speaker = "unk"
# そ、それってつまり……
line = "そ、それってつまり……"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「はい♪　もし……会長に甘えさせて頂けるなら……<emoji=heart04>」
line = "「はい♪　もし……会長に甘えさせて頂けるなら……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# その言葉に胸の奥が熱くなり、俺はそっとマグダレナの肩へと手をまわして抱き寄せた。
line = "その言葉に胸の奥が熱くなり、俺はそっとマグダレナの肩へと手をまわして抱き寄せた。"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「あっ……会長……<emoji=heart04>」
line = "「あっ……会長……<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「んんぅ……<emoji=heart04>　そんな優しく頭を撫でられたら……ドキドキしちゃいます……<emoji=heart04>」
line = "「んんぅ……<emoji=heart04>　そんな優しく頭を撫でられたら……ドキドキしちゃいます……<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「……えへへ♪　会長の手……いつもより、あったかいです……<emoji=heart04>」
line = "「……えへへ♪　会長の手……いつもより、あったかいです……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そう囁くマグダレナの小さな唇に、俺はそっとキスをした。
line = "そう囁くマグダレナの小さな唇に、俺はそっとキスをした。"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「んっ……ちゅっ……<emoji=heart04>」
line = "「んっ……ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺はマグダレナの頬を手で包み、もう１度唇を重ねる。
line = "俺はマグダレナの頬を手で包み、もう１度唇を重ねる。"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「んちゅっ……<emoji=heart04>　会長……もっと……<emoji=heart04>　ちゅっ……<emoji=heart04>」
line = "「んちゅっ……<emoji=heart04>　会長……もっと……<emoji=heart04>　ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「私……会長にぎゅってされてると……ママになりたいって気持ちが、ますます溢れてきちゃいます……<emoji=heart04>」
line = "「私……会長にぎゅってされてると……ママになりたいって気持ちが、ますます溢れてきちゃいます……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# その言葉に応え、俺は彼女の小さな体を優しく抱き締めながら、また口づけを交わすのだった。
line = "その言葉に応え、俺は彼女の小さな体を優しく抱き締めながら、また口づけを交わすのだった。"

[[dialogue]]
speaker = "unk"
# 翌日。
line = "翌日。"

[[dialogue]]
speaker = "セシア"
# 「あら、会長にマグダレナ。こんにちは」
line = "「あら、会長にマグダレナ。こんにちは」"

[[dialogue]]
speaker = "unk"
# 昼食をとっている俺たちのところへ、同じく附属校に通う守護天使・セシアがやってきた。
line = "昼食をとっている俺たちのところへ、同じく附属校に通う守護天使・セシアがやってきた。"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「あっ、セシア～♪　今日こそは、ママダレナに甘えてくれてもいいんですよ～？」
line = "「あっ、セシア～♪　今日こそは、ママダレナに甘えてくれてもいいんですよ～？」"

[[dialogue]]
speaker = "セシア"
# 「いいえ。残念だけど、附属生のあなたはママではないわ」
line = "「いいえ。残念だけど、附属生のあなたはママではないわ」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「あぅ～、今日もダメでした～！」
line = "「あぅ～、今日もダメでした～！」"

[[dialogue]]
speaker = "unk"
# お～、よしよし
line = "お～、よしよし"

[[dialogue]]
speaker = "unk"
# 項垂れたマグダレナの頭を、俺は撫でてやる。
line = "項垂れたマグダレナの頭を、俺は撫でてやる。"

[[dialogue]]
speaker = "セシア"
# 「でも……じ～っ」
line = "「でも……じ～っ」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「？　セシア、どうかしました？」
line = "「？　セシア、どうかしました？」"

[[dialogue]]
speaker = "セシア"
# 「マグダレナ……あなた、前より少し『ママ<ruby=りょく>力</ruby>』が上がったわね」
line = "「マグダレナ……あなた、前より少し『ママ<ruby>力<rt>りょく</rt></ruby>』が上がったわね」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「えっ……？」
line = "「えっ……？」"

[[dialogue]]
speaker = "セシア"
# 「少し前までのあなたは、『今この瞬間だけママになりたい』っていう……ごっこ遊びをしている子供のようだった」
line = "「少し前までのあなたは、『今この瞬間だけママになりたい』っていう……ごっこ遊びをしている子供のようだった」"

[[dialogue]]
speaker = "セシア"
# 「だけど今のあなたは、ちゃんと『本当のママ』を目指している……そんな感じがするわ」
line = "「だけど今のあなたは、ちゃんと『本当のママ』を目指している……そんな感じがするわ」"

[[dialogue]]
speaker = "セシア"
# 「だから、マグダレナ。私からあなたに、プラス１ポイントをあげるわ。これから先どうなるか、楽しみにしているわよ♪」
line = "「だから、マグダレナ。私からあなたに、プラス１ポイントをあげるわ。これから先どうなるか、楽しみにしているわよ♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「……！　はいっ♪　ママダレナ、これからも頑張ります♪」
line = "「……！　はいっ♪　ママダレナ、これからも頑張ります♪」"

[[dialogue]]
speaker = "unk"
# そう言って、マグダレナは心から嬉しそうな笑顔を浮かべるのだった。
line = "そう言って、マグダレナは心から嬉しそうな笑顔を浮かべるのだった。"
