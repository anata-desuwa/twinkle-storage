[[dialogue]]
speaker = "unk"
# 第２話,魔女の街歩き,P
line = "第２話,魔女の街歩き,P"

[[dialogue]]
speaker = "アナ"
# 「ここが秋葉原。以前は電器で、今はアニメやアイドルなどのサブカルで知られている街です」
line = "「ここが秋葉原。以前は電器で、今はアニメやアイドルなどのサブカルで知られている街です」"

[[dialogue]]
speaker = "アイリーン"
# 「お～っ！　建物がいっぱい！　なんか楽しそうっ！」
line = "「お～っ！　建物がいっぱい！　なんか楽しそうっ！」"

[[dialogue]]
speaker = "サーシャ"
# 「ふふっ、目をキラキラさせてかわいいわね～」
line = "「ふふっ、目をキラキラさせてかわいいわね～」"

[[dialogue]]
speaker = "アイリーン"
# 「私知ってるよ！　メイドさんっていうかわいい人がたくさんいて、どんなご奉仕でもしてくれるんだよね？」
line = "「私知ってるよ！　メイドさんっていうかわいい人がたくさんいて、どんなご奉仕でもしてくれるんだよね？」"

[[dialogue]]
speaker = "アイリーン"
# 「私も“ごしゅじんさま”になってみたいなぁ～。ジュース飲ませてもらってー、マッサージしてもらってー、ネビュラのお仕事も代わりにやってもらおーっと」
line = "「私も“ごしゅじんさま”になってみたいなぁ～。ジュース飲ませてもらってー、マッサージしてもらってー、ネビュラのお仕事も代わりにやってもらおーっと」"

[[dialogue]]
speaker = "unk"
# それは無理な気がする……
line = "それは無理な気がする……"

[[dialogue]]
speaker = "アイリーン"
# 「え～、できないの～？　ざんねーん」
line = "「え～、できないの～？　ざんねーん」"

[[dialogue]]
speaker = "サーシャ"
# 「さて、次はどこを案内しようかしら～。あ、あそこがいいかもしれないわね」
line = "「さて、次はどこを案内しようかしら～。あ、あそこがいいかもしれないわね」"

[[dialogue]]
speaker = "アイリーン"
# 「うわぁ～っ、大きい！　らい、もん……？　どういう意味？」
line = "「うわぁ～っ、大きい！　らい、もん……？　どういう意味？」"

[[dialogue]]
speaker = "アイリーン"
# 「かみなりもん……？　へぇ、そう読むんだ。ふぅ～ん、風神さまと雷神さまが由来なんだね。私も風と雷は得意だよ！」
line = "「かみなりもん……？　へぇ、そう読むんだ。ふぅ～ん、風神さまと雷神さまが由来なんだね。私も風と雷は得意だよ！」"

[[dialogue]]
speaker = "ウィステリア"
# 「あら？」
line = "「あら？」"

[[dialogue]]
speaker = "アイリーン"
# 「あれ？」
line = "「あれ？」"

[[dialogue]]
speaker = "アナ"
# 「どうしましたか？　ウィステリア女史の扇情的な服装は魔女でも気になりますか」
line = "「どうしましたか？　ウィステリア女史の扇情的な服装は魔女でも気になりますか」"

[[dialogue]]
speaker = "ウィステリア"
# 「こらそこ、しれっと何言ってんの」
line = "「こらそこ、しれっと何言ってんの」"

[[dialogue]]
speaker = "アイリーン"
# 「お姉さんの本、すごい魔力……しかもその魔力が呪いになってる」
line = "「お姉さんの本、すごい魔力……しかもその魔力が呪いになってる」"

[[dialogue]]
speaker = "アイリーン"
# 「魔女じゃないのにどうして……ううん、魔女でもそんなの持ってたらおかしいよ」
line = "「魔女じゃないのにどうして……ううん、魔女でもそんなの持ってたらおかしいよ」"

[[dialogue]]
speaker = "アイリーン"
# 「こんな強い呪いの本、魔女でも普通は呪い殺される。これだけの魔力をコントロールしてるなんて、ちょっと信じられないかも……」
line = "「こんな強い呪いの本、魔女でも普通は呪い殺される。これだけの魔力をコントロールしてるなんて、ちょっと信じられないかも……」"

[[dialogue]]
speaker = "ウィステリア"
# 「はいはい、私はただの司書ですよー。害がないようちゃんと封印してるから、そんなドン引きしないでってば」
line = "「はいはい、私はただの司書ですよー。害がないようちゃんと封印してるから、そんなドン引きしないでってば」"

[[dialogue]]
speaker = "unk"
# 魔女や魔力を知ってるんですか？
line = "魔女や魔力を知ってるんですか？"

[[dialogue]]
speaker = "ウィステリア"
# 「一応ね。私の実家は魔界でも古い家系だから、そういう存在がいることは知っていたわ」
line = "「一応ね。私の実家は魔界でも古い家系だから、そういう存在がいることは知っていたわ」"

[[dialogue]]
speaker = "ウィステリア"
# 「まぁ、こんなところで出くわすとは思わなかったけど。星徒会が魔女と知り合いなのも驚きだわ」
line = "「まぁ、こんなところで出くわすとは思わなかったけど。星徒会が魔女と知り合いなのも驚きだわ」"

[[dialogue]]
speaker = "ウィステリア"
# 「一度世界を離れてリクリエを逃れた魔女は、こっちの世界にこっそり顔を出していると聞いていたけど……」
line = "「一度世界を離れてリクリエを逃れた魔女は、こっちの世界にこっそり顔を出していると聞いていたけど……」"

[[dialogue]]
speaker = "アイリーン"
# 「！　ねぇ、もしかしてお母さんのこと知ってる？」
line = "「！　ねぇ、もしかしてお母さんのこと知ってる？」"

[[dialogue]]
speaker = "ウィステリア"
# 「お母さん？」
line = "「お母さん？」"

[[dialogue]]
speaker = "アイリーン"
# 「お母さん、ネビュラの情報収集部門で、こっちの世界に来てたんだ。だからどこかで会ってないかなって」
line = "「お母さん、ネビュラの情報収集部門で、こっちの世界に来てたんだ。だからどこかで会ってないかなって」"

[[dialogue]]
speaker = "ウィステリア"
# 「そうなの。でも私は知らないわ。ごめんなさいね」
line = "「そうなの。でも私は知らないわ。ごめんなさいね」"

[[dialogue]]
speaker = "アイリーン"
# 「そっかー……」
line = "「そっかー……」"

[[dialogue]]
speaker = "unk"
# お母さんのこと好きなんだな
line = "お母さんのこと好きなんだな"

[[dialogue]]
speaker = "アイリーン"
# 「うん！　こっちの世界のことたくさん聞かせてくれたんだよ！」
line = "「うん！　こっちの世界のことたくさん聞かせてくれたんだよ！」"

[[dialogue]]
speaker = "ミネルバ"
# 「ホー！」
line = "「ホー！」"

[[dialogue]]
speaker = "ウィステリア"
# 「もしかしたらどこかですれ違ったりしたかしら……？　気付かないだけで、他にも身近なところに魔女がいたりして」
line = "「もしかしたらどこかですれ違ったりしたかしら……？　気付かないだけで、他にも身近なところに魔女がいたりして」"

[[dialogue]]
speaker = "ウィステリア"
# 「まぁ私のことは置いといて……みんなは浅草観光ってところかしら」
line = "「まぁ私のことは置いといて……みんなは浅草観光ってところかしら」"

[[dialogue]]
speaker = "アイリーン"
# 「うん！　浅草ってほんとにお店がたくさんあるんだね」
line = "「うん！　浅草ってほんとにお店がたくさんあるんだね」"

[[dialogue]]
speaker = "ウィステリア"
# 「あ、そうだ。私も買い物があるんだった」
line = "「あ、そうだ。私も買い物があるんだった」"

[[dialogue]]
speaker = "アイリーン"
# 「なになに？　おいしいもの？」
line = "「なになに？　おいしいもの？」"

[[dialogue]]
speaker = "ウィステリア"
# 「ええ、この近くに有名なプリンのお店があるの。久しぶりに買って帰ろうと思ってね」
line = "「ええ、この近くに有名なプリンのお店があるの。久しぶりに買って帰ろうと思ってね」"

[[dialogue]]
speaker = "アイリーン"
# 「プリン！　ウェンディさんがよく食べてるやつだ！」
line = "「プリン！　ウェンディさんがよく食べてるやつだ！」"

[[dialogue]]
speaker = "サーシャ"
# 「ふふ、それはわたしも気になるわね～」
line = "「ふふ、それはわたしも気になるわね～」"

[[dialogue]]
speaker = "アイリーン"
# 「呪いのお姉さん、私もついていっていい？」
line = "「呪いのお姉さん、私もついていっていい？」"

[[dialogue]]
speaker = "ウィステリア"
# 「別にいいけど、呪いのお姉さんは人聞きが悪すぎるからやめて……」
line = "「別にいいけど、呪いのお姉さんは人聞きが悪すぎるからやめて……」"

[[dialogue]]
speaker = "ウィステリア"
# 「じゃあ売り切れないうちに早く行きましょうか」
line = "「じゃあ売り切れないうちに早く行きましょうか」"

[[dialogue]]
speaker = "アイリーン"
# 「やった～！　一緒にプリン食べようね、ミーちゃん♪」
line = "「やった～！　一緒にプリン食べようね、ミーちゃん♪」"

[[dialogue]]
speaker = "unk"
# モンスター！
line = "モンスター！"

[[dialogue]]
speaker = "サーシャ"
# 「ここから少し遠いわね～。でも星徒会として見過ごせないわ」
line = "「ここから少し遠いわね～。でも星徒会として見過ごせないわ」"

[[dialogue]]
speaker = "アイリーン"
# 「ええっ、それじゃプリン売り切れちゃうかもしれないよ？」
line = "「ええっ、それじゃプリン売り切れちゃうかもしれないよ？」"

[[dialogue]]
speaker = "unk"
# でも俺たちは星騎士だから──
line = "でも俺たちは星騎士だから──"

[[dialogue]]
speaker = "アナ"
# 「それなら私たちが会長の分も戦っておきます」
line = "「それなら私たちが会長の分も戦っておきます」"

[[dialogue]]
speaker = "サーシャ"
# 「敵か味方かわからないネビュラの構成員を監視するのも、会長の立派な仕事じゃないかしら～？」
line = "「敵か味方かわからないネビュラの構成員を監視するのも、会長の立派な仕事じゃないかしら～？」"

[[dialogue]]
speaker = "unk"
# じゃあ頼みました！
line = "じゃあ頼みました！"

[[dialogue]]
speaker = "アナ"
# 「頼まれました。その代わり私たちの分のプリンの確保をお願いします」
line = "「頼まれました。その代わり私たちの分のプリンの確保をお願いします」"

[[dialogue]]
speaker = "アイリーン"
# 「よーし、それじゃプリンにレッツゴー！」
line = "「よーし、それじゃプリンにレッツゴー！」"
