[[dialogue]]
speaker = "unk"
# 第１話,リトルアイドルと妹デート,P
line = "第１話,リトルアイドルと妹デート,P"

[[dialogue]]
speaker = "unk"
# こどもの日を巡る一件から、しばらく経ったある日のこと。
line = "こどもの日を巡る一件から、しばらく経ったある日のこと。"

[[dialogue]]
speaker = "unk"
# その日は休日で、俺は恋人のレミカとデートの約束をしていた。
line = "その日は休日で、俺は恋人のレミカとデートの約束をしていた。"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「会長、お待たせ」
line = "「会長、お待たせ」"

[[dialogue]]
speaker = "unk"
# 待ち合わせ場所に現れたレミカは、こどもの日の事件をきっかけに変身できるようになった、小さな姿――『リトルフォーム』の状態だった。
line = "待ち合わせ場所に現れたレミカは、こどもの日の事件をきっかけに変身できるようになった、小さな姿――『リトルフォーム』の状態だった。"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「それじゃあ、今日は約束していた通り……」
line = "「それじゃあ、今日は約束していた通り……」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「小さな姿での『妹デート』、始めよっか♪」
line = "「小さな姿での『妹デート』、始めよっか♪」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「今日１日、エスコートよろしくね――<b>兄さん</b>♪」
line = "「今日１日、エスコートよろしくね――<b>兄さん</b>♪」"

[[dialogue]]
speaker = "unk"
# なぜ『妹デート』なのかというと――話は数日前にさかのぼる。
line = "なぜ『妹デート』なのかというと――話は数日前にさかのぼる。"

[[dialogue]]
speaker = "レミカ"
# 「――会長。いいことを思いついたんだ」
line = "「――会長。いいことを思いついたんだ」"

[[dialogue]]
speaker = "レミカ"
# 「私、アイドルをやっている都合上、外でデートしようとすると、ファンに見つかって騒ぎになっちゃう可能性があるでしょ？」
line = "「私、アイドルをやっている都合上、外でデートしようとすると、ファンに見つかって騒ぎになっちゃう可能性があるでしょ？」"

[[dialogue]]
speaker = "unk"
# 以前も２人で出かけた際、正体に気づかれそうになり、ファン対応で慌ただしくなってしまったことが何度かあった。
line = "以前も２人で出かけた際、正体に気づかれそうになり、ファン対応で慌ただしくなってしまったことが何度かあった。"

[[dialogue]]
speaker = "レミカ"
# 「そこで思いついたのが、『リトルフォームに変身してデートする』って案なんだ」
line = "「そこで思いついたのが、『リトルフォームに変身してデートする』って案なんだ」"

[[dialogue]]
speaker = "unk"
# そうか、確かにそれなら……
line = "そうか、確かにそれなら……"

[[dialogue]]
speaker = "レミカ"
# 「うん。小さい姿なら、私が『愛戸レミカ』だって、まず気づかれないからね」
line = "「うん。小さい姿なら、私が『愛戸レミカ』だって、まず気づかれないからね」"

[[dialogue]]
speaker = "レミカ"
# 「それなら周りを気にせず、もっと自由にデートできるでしょ？」
line = "「それなら周りを気にせず、もっと自由にデートできるでしょ？」"

[[dialogue]]
speaker = "レミカ"
# 「それとね……もう１つ、試してみたいことがあるの」
line = "「それとね……もう１つ、試してみたいことがあるの」"

[[dialogue]]
speaker = "レミカ"
# 「せっかくだから、『妹キャラ』になりきってみたいんだ」
line = "「せっかくだから、『妹キャラ』になりきってみたいんだ」"

[[dialogue]]
speaker = "unk"
# い、妹……？
line = "い、妹……？"

[[dialogue]]
speaker = "レミカ"
# 「そう。笑顔の似合う『可愛いアイドル』を目指すなら、妹の可愛さって何なのか、ちゃんと知りたくて」
line = "「そう。笑顔の似合う『可愛いアイドル』を目指すなら、妹の可愛さって何なのか、ちゃんと知りたくて」"

[[dialogue]]
speaker = "unk"
# 俺は「こどもの日の事件」の時に伝えた通り、『レミカは自然体でいるのが一番可愛い』と、改めて言葉にする。
line = "俺は「こどもの日の事件」の時に伝えた通り、『レミカは自然体でいるのが一番可愛い』と、改めて言葉にする。"

[[dialogue]]
speaker = "レミカ"
# 「うん、それはこの前のライブで実感したよ」
line = "「うん、それはこの前のライブで実感したよ」"

[[dialogue]]
speaker = "レミカ"
# 「でもね、演じてみることで学べる可愛さもあると思うんだ」
line = "「でもね、演じてみることで学べる可愛さもあると思うんだ」"

[[dialogue]]
speaker = "レミカ"
# 「ライブみたいに大勢の前じゃなくて、恋人同士のごっこ遊びみたいな感じなら……気軽に試せるでしょ？」
line = "「ライブみたいに大勢の前じゃなくて、恋人同士のごっこ遊びみたいな感じなら……気軽に試せるでしょ？」"

[[dialogue]]
speaker = "レミカ"
# 「だから会長、付き合ってくれないかな？」
line = "「だから会長、付き合ってくれないかな？」"

[[dialogue]]
speaker = "レミカ"
# 「私の『妹ごっこ』……カノジョとして、お願い♪」
line = "「私の『妹ごっこ』……カノジョとして、お願い♪」"

[[dialogue]]
speaker = "unk"
# そんなわけで俺は、可愛い彼女のお願いを聞き入れ、休日に『妹デート』をすることになった。
line = "そんなわけで俺は、可愛い彼女のお願いを聞き入れ、休日に『妹デート』をすることになった。"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「兄さん、ほら……ステップ遅れてるよ！」
line = "「兄さん、ほら……ステップ遅れてるよ！」"

[[dialogue]]
speaker = "unk"
# 電車で渋谷へと出かけ、ゲームセンターに立ち寄った俺たちは、ダンスゲームで盛り上がっていた。
line = "電車で渋谷へと出かけ、ゲームセンターに立ち寄った俺たちは、ダンスゲームで盛り上がっていた。"

[[dialogue]]
speaker = "unk"
# レミカには敵わないって！
line = "レミカには敵わないって！"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「ふふっ♪　会長は星騎士の代表なんだから、これくらいのステップはできないと！」
line = "「ふふっ♪　会長は星騎士の代表なんだから、これくらいのステップはできないと！」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「ほら、リズムを合わせて♪」
line = "「ほら、リズムを合わせて♪」"

[[dialogue]]
speaker = "unk"
# 楽しそうに、そして軽やかに。レミカはキレのあるステップで、次々とフルコンボを決めていく。
line = "楽しそうに、そして軽やかに。レミカはキレのあるステップで、次々とフルコンボを決めていく。"

[[dialogue]]
speaker = "見物人の男１"
# 「な、なんなんだあの子……ただ者じゃねぇ……！」
line = "「な、なんなんだあの子……ただ者じゃねぇ……！」"

[[dialogue]]
speaker = "見物人の男２"
# 「ああ……なんか、キラキラしたオーラを感じるぜ……！」
line = "「ああ……なんか、キラキラしたオーラを感じるぜ……！」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「よしっ♪　兄さん、次の曲いくよ！」
line = "「よしっ♪　兄さん、次の曲いくよ！」"

[[dialogue]]
speaker = "unk"
# どうやら正体がバレなくても、レミカのトップアイドルとしての輝きまでは、隠しきれないらしい。
line = "どうやら正体がバレなくても、レミカのトップアイドルとしての輝きまでは、隠しきれないらしい。"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「はい、兄さん――あ～ん」
line = "「はい、兄さん――あ～ん」"

[[dialogue]]
speaker = "unk"
# ゲームセンターで遊んだ後、俺たちはスイーツカフェで一息ついていた。
line = "ゲームセンターで遊んだ後、俺たちはスイーツカフェで一息ついていた。"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「ケーキ、美味しい？」
line = "「ケーキ、美味しい？」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「普段の私だと正体がバレたら大変だから、こういうこと、なかなかできなかったよね」
line = "「普段の私だと正体がバレたら大変だから、こういうこと、なかなかできなかったよね」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「デート中に『あ～ん』するの、前から憧れてたんだ♪」
line = "「デート中に『あ～ん』するの、前から憧れてたんだ♪」"

[[dialogue]]
speaker = "unk"
# ――逆にした方がいいんじゃないか、と俺が提案すると。
line = "――逆にした方がいいんじゃないか、と俺が提案すると。"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「兄さんがしてくれるの？　じ、じゃあ……あ～ん」
line = "「兄さんがしてくれるの？　じ、じゃあ……あ～ん」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「あむっ……もぐもぐ……んっ、甘い……<emoji=heart04>」
line = "「あむっ……もぐもぐ……んっ、甘い……<emoji=heart04>」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「は、恥ずかしいけど……悪くないかも♪」
line = "「は、恥ずかしいけど……悪くないかも♪」"

[[dialogue]]
speaker = "unk"
# 照れながら微笑むその表情に、胸が少しだけ熱くなった。
line = "照れながら微笑むその表情に、胸が少しだけ熱くなった。"

[[dialogue]]
speaker = "unk"
# それからもデートは続き、気づけば空は夕焼け色に染まっていた。
line = "それからもデートは続き、気づけば空は夕焼け色に染まっていた。"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「ねえ、兄さん。今日のデート……私の『妹キャラ』は、どうだった？」
line = "「ねえ、兄さん。今日のデート……私の『妹キャラ』は、どうだった？」"

[[dialogue]]
speaker = "unk"
# 並んで歩きながら、俺は素直な感想を伝える。
line = "並んで歩きながら、俺は素直な感想を伝える。"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「――なりきってたけど、無理してる感じはなくて、自然体で、楽しそうだった……？」
line = "「――なりきってたけど、無理してる感じはなくて、自然体で、楽しそうだった……？」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「それは……ほら、会長って、仲のいい後輩の子たちから『お兄ちゃん』って呼ばれてるでしょ？」
line = "「それは……ほら、会長って、仲のいい後輩の子たちから『お兄ちゃん』って呼ばれてるでしょ？」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「私は１人っ子なのもあって……自分もちょっと、妹気分を味わってみたかったというか……」
line = "「私は１人っ子なのもあって……自分もちょっと、妹気分を味わってみたかったというか……」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「それで、もし自分に兄がいたとしたら、『兄さん』って呼んでたかも……なんて」
line = "「それで、もし自分に兄がいたとしたら、『兄さん』って呼んでたかも……なんて」"

[[dialogue]]
speaker = "unk"
# じゃあ、恋人より兄っぽく接した方がいい？
line = "じゃあ、恋人より兄っぽく接した方がいい？"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「それは……」
line = "「それは……」"

[[dialogue]]
speaker = "unk"
# 少し間を置いてから、レミカは小さく首を振る。
line = "少し間を置いてから、レミカは小さく首を振る。"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「……血の繋がってない妹で、恋人って設定じゃないとやだ<emoji=heart04>」
line = "「……血の繋がってない妹で、恋人って設定じゃないとやだ<emoji=heart04>」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「だって……デートなんだから、やっぱりドキドキしたいし……<emoji=heart04>」
line = "「だって……デートなんだから、やっぱりドキドキしたいし……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そう言って、さりげなく俺の手を握ってくるレミカに、俺は思わず笑みがこぼれてしまう。
line = "そう言って、さりげなく俺の手を握ってくるレミカに、俺は思わず笑みがこぼれてしまう。"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「――え？　今の照れてる私、すごく可愛いって……？」
line = "「――え？　今の照れてる私、すごく可愛いって……？」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「も、もう……バカ兄さん<emoji=heart04>」
line = "「も、もう……バカ兄さん<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 恥ずかしそうに手の甲をぺちぺちと叩いてくる、そんな仕草さえ愛おしい――可愛いレミカなのだった。
line = "恥ずかしそうに手の甲をぺちぺちと叩いてくる、そんな仕草さえ愛おしい――可愛いレミカなのだった。"
