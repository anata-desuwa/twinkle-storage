[[dialogue]]
speaker = "unk"
# 第２話,新たな使徒,B
line = "第２話,新たな使徒,B"

[[dialogue]]
speaker = "梨緒"
# 「ぐっ……」
line = "「ぐっ……」"

[[dialogue]]
speaker = "unk"
# 仮面の女性の姿を見た途端、梨緒の顔が苦痛に歪む。
line = "仮面の女性の姿を見た途端、梨緒の顔が苦痛に歪む。"

[[dialogue]]
speaker = "梨緒"
# （頭が……痛い……っ）
line = "（頭が……痛い……っ）"

[[dialogue]]
speaker = "梨緒"
# （寒気がして……体が震えている？　私は恐れているのか……？　ジグを？）
line = "（寒気がして……体が震えている？　私は恐れているのか……？　ジグを？）"

[[dialogue]]
speaker = "unk"
# ここ数ヶ月、ジグを探し続けていた。
line = "ここ数ヶ月、ジグを探し続けていた。"

[[dialogue]]
speaker = "unk"
# だというのに、梨緒の胸に再会の喜びはない。
line = "だというのに、梨緒の胸に再会の喜びはない。"

[[dialogue]]
speaker = "unk"
# むしろ得体の知れない恐怖が心を支配しようとしていた。
line = "むしろ得体の知れない恐怖が心を支配しようとしていた。"

[[dialogue]]
speaker = "ジグ"
# 「おやおや、そんなに怯えた目をしてどうしたんだい？　私が君に何かしてしまったかな？」
line = "「おやおや、そんなに怯えた目をしてどうしたんだい？　私が君に何かしてしまったかな？」"

[[dialogue]]
speaker = "梨緒"
# 「うる……さい……」
line = "「うる……さい……」"

[[dialogue]]
speaker = "梨緒"
# 「君こそ、私のことを忘れたのか……？　どうして今になって現れた……！」
line = "「君こそ、私のことを忘れたのか……？　どうして今になって現れた……！」"

[[dialogue]]
speaker = "ナターシャ"
# 「ていうか、“真なる神”って何？　女神様に対して不敬じゃない？」
line = "「ていうか、“真なる神”って何？　女神様に対して不敬じゃない？」"

[[dialogue]]
speaker = "ジグ"
# 「言葉通りの意味さ。私が仕えるのは、世界を創り<ruby=たも>給</ruby>うた真なる神。女神なんて所詮お飾りだよ」
line = "「言葉通りの意味さ。私が仕えるのは、世界を創り<ruby>給<rt>たも</rt></ruby>うた真なる神。女神なんて所詮お飾りだよ」"

[[dialogue]]
speaker = "ナターシャ"
# 「ふぅん。テルル様をお飾り呼ばわりとは、不信心だね」
line = "「ふぅん。テルル様をお飾り呼ばわりとは、不信心だね」"

[[dialogue]]
speaker = "アポロ"
# 「言っても無駄だ！　こいつは『リクリエの使徒』だ」
line = "「言っても無駄だ！　こいつは『リクリエの使徒』だ」"

[[dialogue]]
speaker = "アポロ"
# 「かつてのあたしと同じように、リクリエに目をつけられ、世界を破滅に導くためのしもべにされた者──それが『リクリエの使徒』だ」
line = "「かつてのあたしと同じように、リクリエに目をつけられ、世界を破滅に導くためのしもべにされた者──それが『リクリエの使徒』だ」"

[[dialogue]]
speaker = "アポロ"
# 「あいつのヘンテコな言動と、あの仮面がその証だ！！」
line = "「あいつのヘンテコな言動と、あの仮面がその証だ！！」"

[[dialogue]]
speaker = "梨緒"
# （あの仮面を見ていると、震えが止まらない……）
line = "（あの仮面を見ていると、震えが止まらない……）"

[[dialogue]]
speaker = "梨緒"
# （あんな<ruby=もの>仮面</ruby>、私は知らない……知らないはず……なのに、どうして……）
line = "（あんな<ruby>仮面<rt>もの</rt></ruby>、私は知らない……知らないはず……なのに、どうして……）"

[[dialogue]]
speaker = "梨緒"
# （私はあの仮面を……見たことがある……？）
line = "（私はあの仮面を……見たことがある……？）"

[[dialogue]]
speaker = "unk"
# 梨緒が記憶を思い出そうとした瞬間、頭の中で傷が疼くように痛みが走る。
line = "梨緒が記憶を思い出そうとした瞬間、頭の中で傷が疼くように痛みが走る。"

[[dialogue]]
speaker = "梨緒"
# 「っ……」
line = "「っ……」"

[[dialogue]]
speaker = "ベアトリス"
# 「大丈夫、梨緒ちゃんっ？」
line = "「大丈夫、梨緒ちゃんっ？」"

[[dialogue]]
speaker = "梨緒"
# 「あ、ああ……私なら戦える」
line = "「あ、ああ……私なら戦える」"

[[dialogue]]
speaker = "unk"
# 痛む頭を押さえながら、クロスボウを握り直す梨緒。
line = "痛む頭を押さえながら、クロスボウを握り直す梨緒。"

[[dialogue]]
speaker = "unk"
# その視線の先で、ジグがやれやれと小さく肩を竦めた。
line = "その視線の先で、ジグがやれやれと小さく肩を竦めた。"

[[dialogue]]
speaker = "ジグ"
# 「不信心なのは君たちの方だよ。<b>神</b>は世界の刷新を望んでいる」
line = "「不信心なのは君たちの方だよ。<b>神</b>は世界の刷新を望んでいる」"

[[dialogue]]
speaker = "ジグ"
# 「世界の進歩は限界を迎えつつある。より良い未来のために、世界は生まれ変わらなければいけないんだ」
line = "「世界の進歩は限界を迎えつつある。より良い未来のために、世界は生まれ変わらなければいけないんだ」"

[[dialogue]]
speaker = "アポロ"
# 「いかにもリクリエの使徒が言いそうなセリフだな！　だがあたしの眼が<ruby=あか>緋</ruby>いうちはそうはさせないぞ。元使徒として、オマエを止めてやる！」
line = "「いかにもリクリエの使徒が言いそうなセリフだな！　だがあたしの眼が<ruby>緋<rt>あか</rt></ruby>いうちはそうはさせないぞ。元使徒として、オマエを止めてやる！」"

[[dialogue]]
speaker = "ジグ"
# 「へぇ、じゃあ君は私の先輩なんだ。よろしく、小さな先輩」
line = "「へぇ、じゃあ君は私の先輩なんだ。よろしく、小さな先輩」"

[[dialogue]]
speaker = "ジグ"
# 「しかし残念だ。君はせっかく授けられた<b>神</b>の祝福を捨て、<b>神</b>意に背く存在になってしまった」
line = "「しかし残念だ。君はせっかく授けられた<b>神</b>の祝福を捨て、<b>神</b>意に背く存在になってしまった」"

[[dialogue]]
speaker = "アポロ"
# 「うるさい！　あたしはフィオナたちのおかげであたしを取り戻したんだ！」
line = "「うるさい！　あたしはフィオナたちのおかげであたしを取り戻したんだ！」"

[[dialogue]]
speaker = "ジグ"
# 「<b>神</b>に身を委ねていれば、今頃世界は生まれ変わっていたというのに……ああ、本当に残念だよ」
line = "「<b>神</b>に身を委ねていれば、今頃世界は生まれ変わっていたというのに……ああ、本当に残念だよ」"

[[dialogue]]
speaker = "ジグ"
# 「仕方ない。“神の騎士”として、君たちに裁きを下すとしよう」
line = "「仕方ない。“神の騎士”として、君たちに裁きを下すとしよう」"

[[dialogue]]
speaker = "unk"
# そう言ってジグが指を鳴らすと──
line = "そう言ってジグが指を鳴らすと──"

[[dialogue]]
speaker = "ドラケルス"
# 「グルゥ……！」
line = "「グルゥ……！」"

[[dialogue]]
speaker = "梨緒"
# 「このモンスターは……！」
line = "「このモンスターは……！」"

[[dialogue]]
speaker = "ナターシャ"
# 「なるほど。メカのモンスターをけしかけてたのはあなただったんだ」
line = "「なるほど。メカのモンスターをけしかけてたのはあなただったんだ」"

[[dialogue]]
speaker = "ジグ"
# 「同じのばっかりじゃ芸がないからね。楽しんでもらえたかい？」
line = "「同じのばっかりじゃ芸がないからね。楽しんでもらえたかい？」"

[[dialogue]]
speaker = "アポロ"
# 「見た目がカッコイイのだけは認めてやるが、楽しめるわけないだろ！　みんな行くぞ！」
line = "「見た目がカッコイイのだけは認めてやるが、楽しめるわけないだろ！　みんな行くぞ！」"
