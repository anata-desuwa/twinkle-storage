[[dialogue]]
speaker = "unk"
# 第３話,アツアツのカレーパン,P
line = "第３話,アツアツのカレーパン,P"

[[dialogue]]
speaker = "unk"
# 俺はカティアとともに巡回パトロールに出動していた。
line = "俺はカティアとともに巡回パトロールに出動していた。"

[[dialogue]]
speaker = "カティア"
# 「幽霊みたいなモンスターの目撃情報は、この辺らしいですワン」
line = "「幽霊みたいなモンスターの目撃情報は、この辺らしいですワン」"

[[dialogue]]
speaker = "カティア"
# 「はい。突然出てきては、すぐに消えて……被害はそんなに大きくないけど、街の人たちはすっごく迷惑してるそうです」
line = "「はい。突然出てきては、すぐに消えて……被害はそんなに大きくないけど、街の人たちはすっごく迷惑してるそうです」"

[[dialogue]]
speaker = "カティア"
# 「そこで鼻の利く私の出番ですワン！」
line = "「そこで鼻の利く私の出番ですワン！」"

[[dialogue]]
speaker = "カティア"
# 「この辺にはお気に入りのパン屋さんがいくつもあるんです。迷惑をかけるモンスターは絶対許さないガオ！」
line = "「この辺にはお気に入りのパン屋さんがいくつもあるんです。迷惑をかけるモンスターは絶対許さないガオ！」"

[[dialogue]]
speaker = "カティア"
# 「私、パン屋さん巡りが趣味でして。そこのお店も行きつけで、特にメロンパンが絶品なんですガオ！」
line = "「私、パン屋さん巡りが趣味でして。そこのお店も行きつけで、特にメロンパンが絶品なんですガオ！」"

[[dialogue]]
speaker = "カティア"
# 「上のクッキーがサックサクなのに、中にはふわっふわのカステラが入ってるんです！　一口かじっただけで幸せになれちゃうんですよ」
line = "「上のクッキーがサックサクなのに、中にはふわっふわのカステラが入ってるんです！　一口かじっただけで幸せになれちゃうんですよ」"

[[dialogue]]
speaker = "カティア"
# 「焼き立てをすぐに食べるのが一番美味しいんですよね。立ち食いはちょっとお行儀悪いんですけど……えへへ」
line = "「焼き立てをすぐに食べるのが一番美味しいんですよね。立ち食いはちょっとお行儀悪いんですけど……えへへ」"

[[dialogue]]
speaker = "unk"
# 他にも──
line = "他にも──"

[[dialogue]]
speaker = "カティア"
# 「あそこのサンドイッチはボリューミーで美味しいんです！　パンからはみ出すくらい、具がたっぷりで！」
line = "「あそこのサンドイッチはボリューミーで美味しいんです！　パンからはみ出すくらい、具がたっぷりで！」"

[[dialogue]]
speaker = "カティア"
# 「しかも、パンを買うと、サンドイッチを作った余りのパンの耳がタダでもらえちゃうんですよ！」
line = "「しかも、パンを買うと、サンドイッチを作った余りのパンの耳がタダでもらえちゃうんですよ！」"

[[dialogue]]
speaker = "カティア"
# 「耳をオーブンでカリカリに焼くと、ラスクみたいになっていいオヤツになりますワン！」
line = "「耳をオーブンでカリカリに焼くと、ラスクみたいになっていいオヤツになりますワン！」"

[[dialogue]]
speaker = "unk"
# どこも美味しそうだね
line = "どこも美味しそうだね"

[[dialogue]]
speaker = "カティア"
# 「はいっ！　オススメのパン屋さんを魔王様に教えられて良かったですワン♪」
line = "「はいっ！　オススメのパン屋さんを魔王様に教えられて良かったですワン♪」"

[[dialogue]]
speaker = "カティア"
# 「魔王様とお散歩、嬉しいなー<emoji=heart04>　あっ、お散歩じゃないです……真面目にパトロールしなきゃですよね」
line = "「魔王様とお散歩、嬉しいなー<emoji=heart04>　あっ、お散歩じゃないです……真面目にパトロールしなきゃですよね」"

[[dialogue]]
speaker = "unk"
# オススメのお店、もっと教えて
line = "オススメのお店、もっと教えて"

[[dialogue]]
speaker = "unk"
# ちゃんとパトロールもしてるし
line = "ちゃんとパトロールもしてるし"

[[dialogue]]
speaker = "カティア"
# 「……はいっ！」
line = "「……はいっ！」"

[[dialogue]]
speaker = "カティア"
# 「こっちの路地の奥にも絶品カレーパンのお店があって──わふっ！？」
line = "「こっちの路地の奥にも絶品カレーパンのお店があって──わふっ！？」"

[[dialogue]]
speaker = "カティア"
# 「魔王様、モンスターいます！」
line = "「魔王様、モンスターいます！」"

[[dialogue]]
speaker = "unk"
# モンスターの反応は感じないのに
line = "モンスターの反応は感じないのに"

[[dialogue]]
speaker = "unk"
# えっ！？
line = "えっ！？"

[[dialogue]]
speaker = "カティア"
# 「こっちですっ！」
line = "「こっちですっ！」"

[[dialogue]]
speaker = "unk"
# カティアは疾風のように駆け出した。
line = "カティアは疾風のように駆け出した。"

[[dialogue]]
speaker = "モンスター"
# 「イィィッ！？」
line = "「イィィッ！？」"

[[dialogue]]
speaker = "カティア"
# 「おっと、そっちには行かせないよ！」
line = "「おっと、そっちには行かせないよ！」"

[[dialogue]]
speaker = "unk"
# カティアが素早く先回りし、モンスターの逃げ道をふさぐ。
line = "カティアが素早く先回りし、モンスターの逃げ道をふさぐ。"

[[dialogue]]
speaker = "カティア"
# 「魔王様、トドメをっ！」
line = "「魔王様、トドメをっ！」"

[[dialogue]]
speaker = "unk"
# ディマイズブレイカー！
line = "ディマイズブレイカー！"

[[dialogue]]
speaker = "unk"
# ナイス足止め！
line = "ナイス足止め！"

[[dialogue]]
speaker = "モンスター"
# 「イィィ……ッ」
line = "「イィィ……ッ」"

[[dialogue]]
speaker = "カティア"
# 「やったー！　さすがは魔王様ですガオー！」
line = "「やったー！　さすがは魔王様ですガオー！」"

[[dialogue]]
speaker = "unk"
# やっぱり匂いで？
line = "やっぱり匂いで？"

[[dialogue]]
speaker = "unk"
# よく気づいたね
line = "よく気づいたね"

[[dialogue]]
speaker = "カティア"
# 「はいっ、カレーパンの良い匂いの中に、モンスターの嫌～な臭いが混ざってましたから」
line = "「はいっ、カレーパンの良い匂いの中に、モンスターの嫌～な臭いが混ざってましたから」"

[[dialogue]]
speaker = "カティア"
# 「モンスターはやっつけましたし、これで任務完了ですね！　お疲れさまでしたワン！」
line = "「モンスターはやっつけましたし、これで任務完了ですね！　お疲れさまでしたワン！」"

[[dialogue]]
speaker = "カティア"
# 「でも、パトロールが終わっちゃったのは、ちょっと残念かもです」
line = "「でも、パトロールが終わっちゃったのは、ちょっと残念かもです」"

[[dialogue]]
speaker = "カティア"
# 「まだ魔王様に教えたいパン屋さん、いっぱいあるんですけど――」
line = "「まだ魔王様に教えたいパン屋さん、いっぱいあるんですけど――」"

[[dialogue]]
speaker = "unk"
# あとはパトロールじゃなくてデートってことで
line = "あとはパトロールじゃなくてデートってことで"

[[dialogue]]
speaker = "カティア"
# 「ま、ま、魔王様とデ、デ、デートですガオ～～～！？」
line = "「ま、ま、魔王様とデ、デ、デートですガオ～～～！？」"

[[dialogue]]
speaker = "カティア"
# 「と、とりあえず、カレーパンを買って……一緒に食べませんか？」
line = "「と、とりあえず、カレーパンを買って……一緒に食べませんか？」"

[[dialogue]]
speaker = "unk"
# 照れて真っ赤になったカティアの顔は、揚げたてのカレーパンよりもアツアツなのだった。
line = "照れて真っ赤になったカティアの顔は、揚げたてのカレーパンよりもアツアツなのだった。"
