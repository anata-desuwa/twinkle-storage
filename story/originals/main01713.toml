[[dialogue]]
speaker = "unk"
# 第１５話,ティンクルスターナイツ,B
line = "第１５話,ティンクルスターナイツ,B"

[[dialogue]]
speaker = "フィオナ"
# 「──その問題については、サーシャさんにお願いしてみてはどうでしょうか？」
line = "「──その問題については、サーシャさんにお願いしてみてはどうでしょうか？」"

[[dialogue]]
speaker = "クロト"
# 「同じ魔界出身だから？」
line = "「同じ魔界出身だから？」"

[[dialogue]]
speaker = "フィオナ"
# 「はい。<ruby=うち>流星星徒会</ruby>でも、魔界絡みの案件はソフィアに任せることが多いですし」
line = "「はい。<ruby>流星星徒会<rt>うち</rt></ruby>でも、魔界絡みの案件はソフィアに任せることが多いですし」"

[[dialogue]]
speaker = "クロト"
# 「そうだな……俺が無理に対処するより、その方がスムーズに話が進みそうだ」
line = "「そうだな……俺が無理に対処するより、その方がスムーズに話が進みそうだ」"

[[dialogue]]
speaker = "クロト"
# 「フィオナのおかげで色々と整理がついたよ。助かった」
line = "「フィオナのおかげで色々と整理がついたよ。助かった」"

[[dialogue]]
speaker = "フィオナ"
# 「お力になれましたか？」
line = "「お力になれましたか？」"

[[dialogue]]
speaker = "クロト"
# 「もちろん。それに……悪いな。こっちの相談事だったのに、わざわざ新星まで来てもらって」
line = "「もちろん。それに……悪いな。こっちの相談事だったのに、わざわざ新星まで来てもらって」"

[[dialogue]]
speaker = "フィオナ"
# 「ふふっ。私でよければいつでも呼んでくださって構いませんよ。どんどん頼ってくださいね」
line = "「ふふっ。私でよければいつでも呼んでくださって構いませんよ。どんどん頼ってくださいね」"

[[dialogue]]
speaker = "クロト"
# 「ああ、お言葉に甘えさせてもらうよ」
line = "「ああ、お言葉に甘えさせてもらうよ」"

[[dialogue]]
speaker = "unk"
# ヴィーナスから会長を引き継いで、もう結構な時間が経つ。
line = "ヴィーナスから会長を引き継いで、もう結構な時間が経つ。"

[[dialogue]]
speaker = "unk"
# 仕事にも慣れたつもりでいたけれど、フィオナと話すとまだまだ学ぶことは多い。
line = "仕事にも慣れたつもりでいたけれど、フィオナと話すとまだまだ学ぶことは多い。"

[[dialogue]]
speaker = "unk"
# それに『学ぶ』だけじゃない──
line = "それに『学ぶ』だけじゃない──"

[[dialogue]]
speaker = "クロト"
# 「仲間を頼るって、大切なことなんだな」
line = "「仲間を頼るって、大切なことなんだな」"

[[dialogue]]
speaker = "フィオナ"
# 「……はい。そうですね」
line = "「……はい。そうですね」"

[[dialogue]]
speaker = "フィオナ"
# 「最近は流星星徒会の方でも、それぞれで仕事を分担するようにしてみたんです」
line = "「最近は流星星徒会の方でも、それぞれで仕事を分担するようにしてみたんです」"

[[dialogue]]
speaker = "フィオナ"
# 「それで……気づきました。以前の私が、どれだけ自分ひとりで抱え込もうとしていたのか」
line = "「それで……気づきました。以前の私が、どれだけ自分ひとりで抱え込もうとしていたのか」"

[[dialogue]]
speaker = "クロト"
# 「ソフィアとルリエルが喜んでたよ。フィオナが以前より頼ってくれるようになった、ってさ」
line = "「ソフィアとルリエルが喜んでたよ。フィオナが以前より頼ってくれるようになった、ってさ」"

[[dialogue]]
speaker = "フィオナ"
# 「あはは……なんだかそれも照れくさいですけど」
line = "「あはは……なんだかそれも照れくさいですけど」"

[[dialogue]]
speaker = "フィオナ"
# 「ですが──そうですね。私がお願いすると、２人とも喜んで助けてくれます。前よりもっと絆が深まったように思います」
line = "「ですが──そうですね。私がお願いすると、２人とも喜んで助けてくれます。前よりもっと絆が深まったように思います」"

[[dialogue]]
speaker = "フィオナ"
# 「緋宮会長やヴィーナスさんには、感謝してもし尽くせません」
line = "「緋宮会長やヴィーナスさんには、感謝してもし尽くせません」"

[[dialogue]]
speaker = "フィオナ"
# 「困った時は周りを頼ればいい……なんて、言葉にすると実に平凡なものですが」
line = "「困った時は周りを頼ればいい……なんて、言葉にすると実に平凡なものですが」"

[[dialogue]]
speaker = "フィオナ"
# 「その当たり前を──<ruby=わたし>流星教皇庁の娘</ruby>に言ってくれる人は、そう多くありませんでした」
line = "「その当たり前を──<ruby>流星教皇庁の娘<rt>わたし</rt></ruby>に言ってくれる人は、そう多くありませんでした」"

[[dialogue]]
speaker = "フィオナ"
# 「これまでの旅路が……そんな大切なことを、私に気づかせてくれたんです」
line = "「これまでの旅路が……そんな大切なことを、私に気づかせてくれたんです」"

[[dialogue]]
speaker = "unk"
# フィオナはうつむいて、やや面映そうに微笑みを浮かべる。
line = "フィオナはうつむいて、やや面映そうに微笑みを浮かべる。"

[[dialogue]]
speaker = "クロト"
# 「それについちゃ──お互い様ってやつだろ。ほら、今だって……俺がフィオナから教えてもらったこともたくさんある」
line = "「それについちゃ──お互い様ってやつだろ。ほら、今だって……俺がフィオナから教えてもらったこともたくさんある」"

[[dialogue]]
speaker = "クロト"
# 「だから、これからも……お互いに分かち合っていこう」
line = "「だから、これからも……お互いに分かち合っていこう」"

[[dialogue]]
speaker = "フィオナ"
# 「もちろんです。なら、いっそ──今後は定期的に、会長同士の会合を持つようにするのはいかがでしょう？」
line = "「もちろんです。なら、いっそ──今後は定期的に、会長同士の会合を持つようにするのはいかがでしょう？」"

[[dialogue]]
speaker = "クロト"
# 「ああ、アリだな。今度は俺が流星の星徒会室にお邪魔してもいいかもしれない」
line = "「ああ、アリだな。今度は俺が流星の星徒会室にお邪魔してもいいかもしれない」"

[[dialogue]]
speaker = "フィオナ"
# 「ふふっ、ぜひいらしてください」
line = "「ふふっ、ぜひいらしてください」"

[[dialogue]]
speaker = "ヴィーナス"
# 「～～♪」
line = "「～～♪」"

[[dialogue]]
speaker = "クロト"
# 「ん……？」
line = "「ん……？」"

[[dialogue]]
speaker = "フィオナ"
# 「どなたかいらっしゃったみたいですね。この声は……」
line = "「どなたかいらっしゃったみたいですね。この声は……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「──来たわよ！　クロト、いるかしら！？」
line = "「──来たわよ！　クロト、いるかしら！？」"

[[dialogue]]
speaker = "クロト"
# 「ああ、いるよ。相変わらず騒がしいなヴィーナスは」
line = "「ああ、いるよ。相変わらず騒がしいなヴィーナスは」"

[[dialogue]]
speaker = "フィオナ"
# 「お邪魔しています、ヴィーナスさん」
line = "「お邪魔しています、ヴィーナスさん」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あら、フィオナもいたのね。いらっしゃい──２人で何してたの？」
line = "「あら、フィオナもいたのね。いらっしゃい──２人で何してたの？」"

[[dialogue]]
speaker = "クロト"
# 「会長の仕事で迷ってた件があってな。たまたま、相談に乗ってもらってたところだ」
line = "「会長の仕事で迷ってた件があってな。たまたま、相談に乗ってもらってたところだ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あ～、それでフィオナを星徒会室に連れ込んでたってわけね？」
line = "「あ～、それでフィオナを星徒会室に連れ込んでたってわけね？」"

[[dialogue]]
speaker = "フィオナ"
# 「つ、連れ込まれたとかそういう──ことではなくですね！　きちんと、その、密にお話を伺えないかと、私から提案したまででして……っ」
line = "「つ、連れ込まれたとかそういう──ことではなくですね！　きちんと、その、密にお話を伺えないかと、私から提案したまででして……っ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「んん～？　密に～？　なーに、その動揺？　もしかして……２人とも、イイ雰囲気だったりしたのかしら？」
line = "「んん～？　密に～？　なーに、その動揺？　もしかして……２人とも、イイ雰囲気だったりしたのかしら？」"

[[dialogue]]
speaker = "フィオナ"
# 「っ……！？」
line = "「っ……！？」"

[[dialogue]]
speaker = "クロト"
# 「ああ。最高にイイ雰囲気だったぞ」
line = "「ああ。最高にイイ雰囲気だったぞ」"

[[dialogue]]
speaker = "フィオナ"
# 「緋宮会長！？」
line = "「緋宮会長！？」"

[[dialogue]]
speaker = "unk"
# これまで共に闘ってきた、かけがえのない仲間同士だからこそ生まれた、気兼ねない時間──
line = "これまで共に闘ってきた、かけがえのない仲間同士だからこそ生まれた、気兼ねない時間──"

[[dialogue]]
speaker = "unk"
# あれをイイ雰囲気と言わずして何と言おうか。
line = "あれをイイ雰囲気と言わずして何と言おうか。"

[[dialogue]]
speaker = "ヴィーナス"
# 「我が父ながら……クロトは相変わらずねぇ。ちょっとは照れくさくしてみなさいっての」
line = "「我が父ながら……クロトは相変わらずねぇ。ちょっとは照れくさくしてみなさいっての」"

[[dialogue]]
speaker = "クロト"
# 「何の話だ？」
line = "「何の話だ？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「こっちの話！　まあでも、古代の魔王ラクシスもたいそう色んな種族からモテモテだったみたいだし？」
line = "「こっちの話！　まあでも、古代の魔王ラクシスもたいそう色んな種族からモテモテだったみたいだし？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「歴代最強のハーレム魔王を目指すなら──クロトくらいの肝っ玉が必要なのかもしれないわね！」
line = "「歴代最強のハーレム魔王を目指すなら──クロトくらいの肝っ玉が必要なのかもしれないわね！」"

[[dialogue]]
speaker = "フィオナ"
# 「別にそんなつもりじゃありませんからっ！」
line = "「別にそんなつもりじゃありませんからっ！」"

[[dialogue]]
speaker = "クロト"
# 「ないらしいぞ」
line = "「ないらしいぞ」"

[[dialogue]]
speaker = "フィオナ"
# 「あ、あのですね！　私はただ、緋宮会長の相談に乗っていただけで、そんな、イイ雰囲気だったなんて……わけ……」
line = "「あ、あのですね！　私はただ、緋宮会長の相談に乗っていただけで、そんな、イイ雰囲気だったなんて……わけ……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ん～～？　どうも煮えきらないっていうか、満更でもない様子ねえ……？」
line = "「ん～～？　どうも煮えきらないっていうか、満更でもない様子ねえ……？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「これってもしかして──私のママがフィオナって可能性も……？」
line = "「これってもしかして──私のママがフィオナって可能性も……？」"

[[dialogue]]
speaker = "フィオナ"
# 「！？」
line = "「！？」"

[[dialogue]]
speaker = "フィオナ"
# 「え、えーっと──あ、そろそろ私も流星に戻らなくては！　これで失礼いたしますね、緋宮会長！　またっ」
line = "「え、えーっと──あ、そろそろ私も流星に戻らなくては！　これで失礼いたしますね、緋宮会長！　またっ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あっ……待ちなさいって！」
line = "「あっ……待ちなさいって！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「──って行っちゃった。あ～あ、せっかく見せたいものがあったのに」
line = "「──って行っちゃった。あ～あ、せっかく見せたいものがあったのに」"

[[dialogue]]
speaker = "クロト"
# 「フィオナを困らせちゃダメだろ、ヴィーナス。まるでフィオナが俺に気があって鈍感無自覚ハーレムの一員みたいな言い方するから」
line = "「フィオナを困らせちゃダメだろ、ヴィーナス。まるでフィオナが俺に気があって鈍感無自覚ハーレムの一員みたいな言い方するから」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そこまでわかってるならクロトが助け舟出しなさいよ！」
line = "「そこまでわかってるならクロトが助け舟出しなさいよ！」"

[[dialogue]]
speaker = "unk"
# 君子は危うきに近寄らないものだ。
line = "君子は危うきに近寄らないものだ。"

[[dialogue]]
speaker = "unk"
# 落ち着くと、ヴィーナスはニヤつきながら言った。
line = "落ち着くと、ヴィーナスはニヤつきながら言った。"

[[dialogue]]
speaker = "ヴィーナス"
# 「それに……やっぱり気になるじゃない。ねえ、パパ？」
line = "「それに……やっぱり気になるじゃない。ねえ、パパ？」"

[[dialogue]]
speaker = "クロト"
# 「パパって言うな」
line = "「パパって言うな」"

[[dialogue]]
speaker = "ヴィーナス"
# 「だってパパはパパなんだもん。全然実感湧かないけど！」
line = "「だってパパはパパなんだもん。全然実感湧かないけど！」"

[[dialogue]]
speaker = "unk"
# リクリエに連なるさまざまな事件を通じて──俺はヴィーナスの正体を知った。
line = "リクリエに連なるさまざまな事件を通じて──俺はヴィーナスの正体を知った。"

[[dialogue]]
speaker = "unk"
# 平行世界の、緋宮クロトの娘。
line = "平行世界の、緋宮クロトの娘。"

[[dialogue]]
speaker = "unk"
# どう接してよいのか悩んだこともあったけど……結局、今まで通りの関係に落ち着いた。
line = "どう接してよいのか悩んだこともあったけど……結局、今まで通りの関係に落ち着いた。"

[[dialogue]]
speaker = "unk"
# こちらの世界じゃ俺たちはただの同級生同士──
line = "こちらの世界じゃ俺たちはただの同級生同士──"

[[dialogue]]
speaker = "unk"
# ただの、と呼ぶには、それでも縁が深すぎる気もするけど。
line = "ただの、と呼ぶには、それでも縁が深すぎる気もするけど。"

[[dialogue]]
speaker = "クロト"
# （たまに俺を『パパいじり』してくるのだけは慣れないが……）
line = "（たまに俺を『パパいじり』してくるのだけは慣れないが……）"

[[dialogue]]
speaker = "ヴィーナス"
# 「何よ、こっちの顔じっと見て。もしかして本当にフィオナがママなの……？」
line = "「何よ、こっちの顔じっと見て。もしかして本当にフィオナがママなの……？」"

[[dialogue]]
speaker = "クロト"
# 「──いや。たぶん違う」
line = "「──いや。たぶん違う」"

[[dialogue]]
speaker = "unk"
# 俺は、内心では確証を持ちながらそう答えた。
line = "俺は、内心では確証を持ちながらそう答えた。"

[[dialogue]]
speaker = "クロト"
# （第零層で俺に語りかけてきたあの声は──聞き覚えのあるものだった。セイファート学園長の記憶で聞こえたのと、同じ……）
line = "（第零層で俺に語りかけてきたあの声は──聞き覚えのあるものだった。セイファート学園長の記憶で聞こえたのと、同じ……）"

[[dialogue]]
speaker = "クロト"
# （そして……守護天使であるマグダレナさんが当初からヴィーナスを『御子』と呼んでいたこと。これらのことから、類推される母親は……）
line = "（そして……守護天使であるマグダレナさんが当初からヴィーナスを『御子』と呼んでいたこと。これらのことから、類推される母親は……）"

[[dialogue]]
speaker = "unk"
# デネブの世界ではきっと、そうした物語を辿ったんだろう。
line = "デネブの世界ではきっと、そうした物語を辿ったんだろう。"

[[dialogue]]
speaker = "unk"
# 今の俺には想像もできないけど──いつか、それを知る日が来るのかもしれない。
line = "今の俺には想像もできないけど──いつか、それを知る日が来るのかもしれない。"

[[dialogue]]
speaker = "ヴィーナス"
# 「まーいいわ。気になるっちゃなるけど……今のあたしにとってママ代わりはヘレナちゃんだから！」
line = "「まーいいわ。気になるっちゃなるけど……今のあたしにとってママ代わりはヘレナちゃんだから！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あたしがいて、クロトがいる。今はそれで十分よね！」
line = "「あたしがいて、クロトがいる。今はそれで十分よね！」"

[[dialogue]]
speaker = "クロト"
# 「……ああ。それはあくまで、向こうの世界で起きたことだ」
line = "「……ああ。それはあくまで、向こうの世界で起きたことだ」"

[[dialogue]]
speaker = "クロト"
# 「俺たちがこれからどうなっていくのかは──まだ誰にもわからないんだからな」
line = "「俺たちがこれからどうなっていくのかは──まだ誰にもわからないんだからな」"

[[dialogue]]
speaker = "unk"
# <ruby=むこう>デネブ</ruby>は<ruby=むこう>デネブ</ruby>。<ruby=ここ>アルタイル</ruby>は<ruby=ここ>アルタイル</ruby>。
line = "<ruby>デネブ<rt>むこう</rt></ruby>は<ruby>デネブ<rt>むこう</rt></ruby>。<ruby>アルタイル<rt>ここ</rt></ruby>は<ruby>アルタイル<rt>ここ</rt></ruby>。"

[[dialogue]]
speaker = "unk"
# ヴィーナスに母親の記憶がない──ということには、何がしか意味があるのかもしれないが……
line = "ヴィーナスに母親の記憶がない──ということには、何がしか意味があるのかもしれないが……"

[[dialogue]]
speaker = "unk"
# それは追々、父としての俺が探っていくべき事に思えた。
line = "それは追々、父としての俺が探っていくべき事に思えた。"

[[dialogue]]
speaker = "クロト"
# 「それより……さっき言ってた見せたいものって何だ？」
line = "「それより……さっき言ってた見せたいものって何だ？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あ、そうそう。それよ」
line = "「あ、そうそう。それよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「コホン……あのね、実は──ちょっとすっごい物が見つかっちゃったのよ」
line = "「コホン……あのね、実は──ちょっとすっごい物が見つかっちゃったのよ」"

[[dialogue]]
speaker = "クロト"
# 「すっごい物？」
line = "「すっごい物？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そう──これよ！」
line = "「そう──これよ！」"

[[dialogue]]
speaker = "クロト"
# 「えっ、これって……！？」
line = "「えっ、これって……！？」"

[[dialogue]]
speaker = "unk"
# ヴィーナスから手渡されたもの──
line = "ヴィーナスから手渡されたもの──"

[[dialogue]]
speaker = "unk"
# それは、以前まで彼女が肌身離さず持っていた『<ruby=デネブ>未来</ruby>の日誌』だった。
line = "それは、以前まで彼女が肌身離さず持っていた『<ruby>未来<rt>デネブ</rt></ruby>の日誌』だった。"

[[dialogue]]
speaker = "クロト"
# 「日誌──って、あれは魔界で学園長と戦ったとき、消えたんじゃなかったのか？」
line = "「日誌──って、あれは魔界で学園長と戦ったとき、消えたんじゃなかったのか？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「う～ん、そうだったかしら？　でもウルトラミラクル不思議パワーで復活したのよ、きっと！」
line = "「う～ん、そうだったかしら？　でもウルトラミラクル不思議パワーで復活したのよ、きっと！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それよりもほらほら、中身が気になってこない？　ね？」
line = "「それよりもほらほら、中身が気になってこない？　ね？」"

[[dialogue]]
speaker = "クロト"
# 「なんか口調が怪しいな……」
line = "「なんか口調が怪しいな……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そ、そんなことありっこないわよ！？」
line = "「そ、そんなことありっこないわよ！？」"

[[dialogue]]
speaker = "unk"
# 明らかに様子のおかしいヴィーナスだった。
line = "明らかに様子のおかしいヴィーナスだった。"

[[dialogue]]
speaker = "unk"
# というか……よく見れば、この『日誌』は背表紙なんかの細部がちょこちょこ歪んでいる。
line = "というか……よく見れば、この『日誌』は背表紙なんかの細部がちょこちょこ歪んでいる。"

[[dialogue]]
speaker = "unk"
# 明らかに俺の知っていたあの『日誌』ではないが……
line = "明らかに俺の知っていたあの『日誌』ではないが……"

[[dialogue]]
speaker = "クロト"
# 「何を企んでるのか知らないけど……んじゃ、開くぞ」
line = "「何を企んでるのか知らないけど……んじゃ、開くぞ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あっ、待って待って！　ページは私がめくるからっ」
line = "「あっ、待って待って！　ページは私がめくるからっ」"

[[dialogue]]
speaker = "unk"
# ヴィーナスは急いで俺を止め、日誌に手をかけた。
line = "ヴィーナスは急いで俺を止め、日誌に手をかけた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「じゃ……心の準備はいいわね？　せーのっ……ジャーーーーン！！」
line = "「じゃ……心の準備はいいわね？　せーのっ……ジャーーーーン！！」"

[[dialogue]]
speaker = "クロト"
# 「って、これは……」
line = "「って、これは……」"

[[dialogue]]
speaker = "unk"
# 開かれた日誌のページには、デカデカと……
line = "開かれた日誌のページには、デカデカと……"

[[dialogue]]
speaker = "unk"
# 『これからのことは、私が決める！！』
line = "『これからのことは、私が決める！！』"

[[dialogue]]
speaker = "unk"
# 以前の日誌とはまるで異なる、手書きの文字が書き殴られていた。
line = "以前の日誌とはまるで異なる、手書きの文字が書き殴られていた。"

[[dialogue]]
speaker = "クロト"
# 「ヴィーナス──もしかしてこれ、自分で作ったのか？」
line = "「ヴィーナス──もしかしてこれ、自分で作ったのか？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふっふーん、その通りよ！　なかなかよく出来てるでしょ！」
line = "「ふっふーん、その通りよ！　なかなかよく出来てるでしょ！」"

[[dialogue]]
speaker = "クロト"
# 「確かに……お手製にしてはよくできてるけど、わざわざ偽物を用意するなんて」
line = "「確かに……お手製にしてはよくできてるけど、わざわざ偽物を用意するなんて」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ま、心の整理をしておきたかったっていうか」
line = "「ま、心の整理をしておきたかったっていうか」"

[[dialogue]]
speaker = "ヴィーナス"
# 「日誌は──私が物心ついた時から導いてくれた存在だから。私にとっては、それこそアルタイルでのママみたいなものだったし」
line = "「日誌は──私が物心ついた時から導いてくれた存在だから。私にとっては、それこそアルタイルでのママみたいなものだったし」"

[[dialogue]]
speaker = "ヴィーナス"
# 「落ち着いた今、改めてお別れをしておこうかなって。それをクロトにも見届けてほしかったのよ」
line = "「落ち着いた今、改めてお別れをしておこうかなって。それをクロトにも見届けてほしかったのよ」"

[[dialogue]]
speaker = "クロト"
# 「ヴィーナス……」
line = "「ヴィーナス……」"

[[dialogue]]
speaker = "unk"
# 彼女は日誌を閉じると、遠い目をして語り始めた。
line = "彼女は日誌を閉じると、遠い目をして語り始めた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「ずいぶん前だけど……日誌の中身がアポロに書き換えられたこと、覚えてる？」
line = "「ずいぶん前だけど……日誌の中身がアポロに書き換えられたこと、覚えてる？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あの時の私は心の底から不安だった。だって、当時の私には、そこに書かれた未来しか頼れるものがなかったから」
line = "「あの時の私は心の底から不安だった。だって、当時の私には、そこに書かれた未来しか頼れるものがなかったから」"

[[dialogue]]
speaker = "ヴィーナス"
# 「でも──そうじゃないって、クロトが教えてくれたの」
line = "「でも──そうじゃないって、クロトが教えてくれたの」"

[[dialogue]]
speaker = "ヴィーナス"
# 「日誌なんてきっかけにしか過ぎない。実際は……私の人生は、私自身が選び抜いて、色んな人を頼って生きてきた結果なんだってこと」
line = "「日誌なんてきっかけにしか過ぎない。実際は……私の人生は、私自身が選び抜いて、色んな人を頼って生きてきた結果なんだってこと」"

[[dialogue]]
speaker = "ヴィーナス"
# 「だから、クロト──私にとっての一番星はあなたよ」
line = "「だから、クロト──私にとっての一番星はあなたよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私が鍛えて、私が頼って、最後には私を救ってくれた。やっぱり最強の魔王だった」
line = "「私が鍛えて、私が頼って、最後には私を救ってくれた。やっぱり最強の魔王だった」"

[[dialogue]]
speaker = "ヴィーナス"
# 「だからこれからも、私は私の直感を信じられるの」
line = "「だからこれからも、私は私の直感を信じられるの」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私、もう怖がらないわ。先が何も見えなくたって。私は、私の手で、自分の道を選び取っていけるんだから」
line = "「私、もう怖がらないわ。先が何も見えなくたって。私は、私の手で、自分の道を選び取っていけるんだから」"

[[dialogue]]
speaker = "ヴィーナス"
# 「だから……今までありがとね、クロト！　でもって、これからもずっとよろしくっ！」
line = "「だから……今までありがとね、クロト！　でもって、これからもずっとよろしくっ！」"

[[dialogue]]
speaker = "クロト"
# 「……ふぅ。そんなこと言われたら、こっちが照れくさくなるな」
line = "「……ふぅ。そんなこと言われたら、こっちが照れくさくなるな」"

[[dialogue]]
speaker = "クロト"
# 「こちらこそありがとう。俺もヴィーナスのおかげで──ここまで成長できたんだ」
line = "「こちらこそありがとう。俺もヴィーナスのおかげで──ここまで成長できたんだ」"

[[dialogue]]
speaker = "unk"
# ヴィーナスの真っ直ぐな気持ちは、時に俺でも面食らうほどの純真さで。
line = "ヴィーナスの真っ直ぐな気持ちは、時に俺でも面食らうほどの純真さで。"

[[dialogue]]
speaker = "ヴィーナス"
# 「うん……」
line = "「うん……」"

[[dialogue]]
speaker = "unk"
# 気づけば自然と俺は彼女の頭に手をやっていた。
line = "気づけば自然と俺は彼女の頭に手をやっていた。"

[[dialogue]]
speaker = "unk"
# ヴィーナスは上機嫌な子犬のように目を細めつつ、もっと撫でろとばかりに身を寄せてくる。
line = "ヴィーナスは上機嫌な子犬のように目を細めつつ、もっと撫でろとばかりに身を寄せてくる。"

[[dialogue]]
speaker = "ヴィーナス"
# 「えへへ……悪くないわね、こういうのも♪」
line = "「えへへ……悪くないわね、こういうのも♪」"

[[dialogue]]
speaker = "unk"
# ここへきて、ようやく──という若干の気恥ずかしさを覚えながらも……
line = "ここへきて、ようやく──という若干の気恥ずかしさを覚えながらも……"

[[dialogue]]
speaker = "unk"
# 俺はヴィーナスが満足するまで、何度もその頭を優しく撫でてやるのだった。
line = "俺はヴィーナスが満足するまで、何度もその頭を優しく撫でてやるのだった。"

[[dialogue]]
speaker = "unk"
# ──しばらくして。
line = "──しばらくして。"

[[dialogue]]
speaker = "unk"
# 満足しきって離れたヴィーナスが、俺にお茶を注いできてくれた。
line = "満足しきって離れたヴィーナスが、俺にお茶を注いできてくれた。"

[[dialogue]]
speaker = "unk"
# 静かな星徒会室で、ゆったりとした時間が流れる……。
line = "静かな星徒会室で、ゆったりとした時間が流れる……。"

[[dialogue]]
speaker = "クロト"
# 「……平和っていいもんだな。ヴィーナス」
line = "「……平和っていいもんだな。ヴィーナス」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええ……そうね……こんな平和がいつまでも続けばいいのに…………」
line = "「ええ……そうね……こんな平和がいつまでも続けばいいのに…………」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……って、待ちなさい。違うわよクロト、なにすっかり全部終わった感出しちゃってるの！」
line = "「……って、待ちなさい。違うわよクロト、なにすっかり全部終わった感出しちゃってるの！」"

[[dialogue]]
speaker = "クロト"
# 「え？」
line = "「え？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「忘れたわけじゃないでしょうね──アポロと初めて戦ったとき、出てきた巨大な『手』のこと！」
line = "「忘れたわけじゃないでしょうね──アポロと初めて戦ったとき、出てきた巨大な『手』のこと！」"

[[dialogue]]
speaker = "クロト"
# 「ああ……そういえば、そんなのもあったな」
line = "「ああ……そういえば、そんなのもあったな」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それだけじゃないわ。ギエルが言い残してたあのなんちゃら神の謎とか、生き残ってるモンスター達との戦いとか」
line = "「それだけじゃないわ。ギエルが言い残してたあのなんちゃら神の謎とか、生き残ってるモンスター達との戦いとか」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私たちが解決しなくちゃいけない宿題は──まだまだたくさんあるのよ！　縁側でお茶しばいてる暇なんてないんだから！」
line = "「私たちが解決しなくちゃいけない宿題は──まだまだたくさんあるのよ！　縁側でお茶しばいてる暇なんてないんだから！」"

[[dialogue]]
speaker = "クロト"
# 「そこまでまったりしたつもりはない。けど……そうだな」
line = "「そこまでまったりしたつもりはない。けど……そうだな」"

[[dialogue]]
speaker = "クロト"
# 「<ruby=スターナイト>星騎士</ruby>としてやらなきゃならないことは──まだたくさん残ってるな」
line = "「<ruby>星騎士<rt>スターナイト</rt></ruby>としてやらなきゃならないことは──まだたくさん残ってるな」"

[[dialogue]]
speaker = "unk"
# 俺の中に封じ込めたリクリエを安定させるのに、研究や鍛錬は欠かせない。
line = "俺の中に封じ込めたリクリエを安定させるのに、研究や鍛錬は欠かせない。"

[[dialogue]]
speaker = "unk"
# 各地で抑えきれなかった被害の爪痕が癒えるのも、まだまだ先の話だろう。
line = "各地で抑えきれなかった被害の爪痕が癒えるのも、まだまだ先の話だろう。"

[[dialogue]]
speaker = "クロト"
# 「魔王も会長もまだまだ退く気はないさ。これからも気は抜けない──ってとこだよな」
line = "「魔王も会長もまだまだ退く気はないさ。これからも気は抜けない──ってとこだよな」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そういうこと♪　でもね──」
line = "「そういうこと♪　でもね──」"

[[dialogue]]
speaker = "unk"
# 天穹を示すかのように、ヴィーナスはビッと人差し指を掲げる。
line = "天穹を示すかのように、ヴィーナスはビッと人差し指を掲げる。"

[[dialogue]]
speaker = "ヴィーナス"
# 「ここに私たちがいる限り……どんな試練が待ち受けていようとへっちゃらよ！　でしょう？」
line = "「ここに私たちがいる限り……どんな試練が待ち受けていようとへっちゃらよ！　でしょう？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「だって私たちは、この世界を守る星々の輝き──」
line = "「だって私たちは、この世界を守る星々の輝き──」"

[[dialogue]]
speaker = "ヴィーナス"
# 「『ティンクルスターナイツ』なんだから！」
line = "「『ティンクルスターナイツ』なんだから！」"
