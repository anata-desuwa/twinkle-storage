[[dialogue]]
speaker = "unk"
# メルエルが元の１人へと戻ってから数日後。
line = "メルエルが元の１人へと戻ってから数日後。"

[[dialogue]]
speaker = "unk"
# ヴィーナスやレミカも元の大きな姿へと、無事に戻れるようになった……のだが。
line = "ヴィーナスやレミカも元の大きな姿へと、無事に戻れるようになった……のだが。"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「パパ～♪」
line = "「パパ～♪」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「え～い！　娘からの甘えハグよ♪」
line = "「え～い！　娘からの甘えハグよ♪」"

[[dialogue]]
speaker = "unk"
# 星徒会室へ元気よく入ってきたのは、小さい姿のヴィーナスであった。
line = "星徒会室へ元気よく入ってきたのは、小さい姿のヴィーナスであった。"

[[dialogue]]
speaker = "unk"
# なんでまた小さくなってるんだ！？
line = "なんでまた小さくなってるんだ！？"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「ふっふっふっ♪　今日は『娘』としてパパに甘えたい気分だから、こっちの姿に<b>変身</b>したのよ♪」
line = "「ふっふっふっ♪　今日は『娘』としてパパに甘えたい気分だから、こっちの姿に<b>変身</b>したのよ♪」"

[[dialogue]]
speaker = "unk"
# ヴィーナスたちの小さな姿は、新たな戦闘服『リトルフォーム』として定着し、元に戻ってからは自分の意思で変身できるようになっていた。
line = "ヴィーナスたちの小さな姿は、新たな戦闘服『リトルフォーム』として定着し、元に戻ってからは自分の意思で変身できるようになっていた。"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「この姿なら、気兼ねなくパパって呼べるから便利ね♪」
line = "「この姿なら、気兼ねなくパパって呼べるから便利ね♪」"

[[dialogue]]
speaker = "unk"
# いや、そこは多少気にしてもらえると……
line = "いや、そこは多少気にしてもらえると……"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「それならアレだわ！　リトルフォームの時は強制的にパパ呼びになっちゃうってことにするわ♪」
line = "「それならアレだわ！　リトルフォームの時は強制的にパパ呼びになっちゃうってことにするわ♪」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「ふふっ、これからはこの姿で、パパと今までできなかったこと、沢山してみたいわ♪」
line = "「ふふっ、これからはこの姿で、パパと今までできなかったこと、沢山してみたいわ♪」"

[[dialogue]]
speaker = "unk"
# 子供のように無邪気な笑顔でそんな風に言われれば、仕方ないなと受け入れてしまう自分がいる。
line = "子供のように無邪気な笑顔でそんな風に言われれば、仕方ないなと受け入れてしまう自分がいる。"

[[dialogue]]
speaker = "unk"
# でも星徒会活動は真面目にするんだぞ
line = "でも星徒会活動は真面目にするんだぞ"

[[dialogue]]
speaker = "unk"
# わかった。
line = "わかった。"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「――いいの？　わ～い♪　私、いい子って褒めてもらえるように頑張るわね！」
line = "「――いいの？　わ～い♪　私、いい子って褒めてもらえるように頑張るわね！」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「あっ、えへへへへへぇ<emoji=heart04>　パパに頭撫でてもらうの、好き～<emoji=heart04>」
line = "「あっ、えへへへへへぇ<emoji=heart04>　パパに頭撫でてもらうの、好き～<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺はついヴィーナスを甘やかして、頭を撫でてしまうのだった。
line = "俺はついヴィーナスを甘やかして、頭を撫でてしまうのだった。"

[[dialogue]]
speaker = "unk"
# 一方、レミカもあれ以来、リトルフォームによく変身しているようだった。
line = "一方、レミカもあれ以来、リトルフォームによく変身しているようだった。"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「ふぅ……あっ、会長。お疲れ様♪」
line = "「ふぅ……あっ、会長。お疲れ様♪」"

[[dialogue]]
speaker = "unk"
# 仮想結界で訓練してたのか？
line = "仮想結界で訓練してたのか？"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「うん。星騎士としてもそうだけど、アイドルとしても新しいスタイルを手に入れたって言えるわけじゃない？」
line = "「うん。星騎士としてもそうだけど、アイドルとしても新しいスタイルを手に入れたって言えるわけじゃない？」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「だったら、いつステージに立つことになってもパーフェクトに歌えるように、レッスンしておきたいなって……」
line = "「だったら、いつステージに立つことになってもパーフェクトに歌えるように、レッスンしておきたいなって……」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「実はさ、このリトルフォームを使って、愛戸レミカとは別の『愛戸ミソラ』として、引き続き活動していけないかなって考えてるんだ！」
line = "「実はさ、このリトルフォームを使って、愛戸レミカとは別の『愛戸ミソラ』として、引き続き活動していけないかなって考えてるんだ！」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「アイドル事務所のしがらみにとらわれない、個人活動をする姿として」
line = "「アイドル事務所のしがらみにとらわれない、個人活動をする姿として」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「それでね、私的には『Ｖチューバー』として、この姿に近いアバターを作って、ネット上で活動するのはどうかなって思ってるんだよね」
line = "「それでね、私的には『Ｖチューバー』として、この姿に近いアバターを作って、ネット上で活動するのはどうかなって思ってるんだよね」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「ほら、最近人気になってきた子で『<ruby=うしお>汐</ruby>ルカルカ』っているでしょ？　あの子みたいに、歌ってみた動画をあげてく感じで」
line = "「ほら、最近人気になってきた子で『<ruby>汐<rt>うしお</rt></ruby>ルカルカ』っているでしょ？　あの子みたいに、歌ってみた動画をあげてく感じで」"

[[dialogue]]
speaker = "unk"
# る、ルカルカ！？
line = "る、ルカルカ！？"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「ん？　どうしたの、そんな驚いた顔して？」
line = "「ん？　どうしたの、そんな驚いた顔して？」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「あっ、もしかして会長、ルカルカのリスナーだったりする？」
line = "「あっ、もしかして会長、ルカルカのリスナーだったりする？」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「ルカルカはユーモアもあって面白いから、私が可愛いアイドルを目指すための参考になるかなって思ったんだけど……」
line = "「ルカルカはユーモアもあって面白いから、私が可愛いアイドルを目指すための参考になるかなって思ったんだけど……」"

[[dialogue]]
speaker = "unk"
# 『汐ルカルカ』の正体は、新星学園の生徒であり、レミカが所属する『聖歌隊』の後輩でもある『海野辺ルルカ』だったりする。
line = "『汐ルカルカ』の正体は、新星学園の生徒であり、レミカが所属する『聖歌隊』の後輩でもある『海野辺ルルカ』だったりする。"

[[dialogue]]
speaker = "unk"
# な、なるほど。いいんじゃないかな……
line = "な、なるほど。いいんじゃないかな……"

[[dialogue]]
speaker = "unk"
# そのことを知っている俺は苦笑いしてしまいつつも、レミカのＶチューバー活動というアイデアはなかなか面白そうだと思った。
line = "そのことを知っている俺は苦笑いしてしまいつつも、レミカのＶチューバー活動というアイデアはなかなか面白そうだと思った。"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「そっか。なら後で、また相談に乗ってくれたら嬉しいな♪」
line = "「そっか。なら後で、また相談に乗ってくれたら嬉しいな♪」"

[[dialogue]]
speaker = "unk"
# 俺が頷くと、レミカはふと笑顔を浮かべてみせて。
line = "俺が頷くと、レミカはふと笑顔を浮かべてみせて。"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「――ふふっ……じゃあ、約束ね♪」
line = "「――ふふっ……じゃあ、約束ね♪」"

[[dialogue]]
speaker = "unk"
# その笑顔は、リトルフォームに変身しているせいか、前よりずっと柔らかく感じられるのだった。
line = "その笑顔は、リトルフォームに変身しているせいか、前よりずっと柔らかく感じられるのだった。"

[[dialogue]]
speaker = "unk"
# そして――メルエルはあれから、以前よりも多く俺に会いに来るようになっていた。
line = "そして――メルエルはあれから、以前よりも多く俺に会いに来るようになっていた。"

[[dialogue]]
speaker = "メルエル"
# 「会長くん。こっちの書類、できたよ♪」
line = "「会長くん。こっちの書類、できたよ♪」"

[[dialogue]]
speaker = "unk"
# ありがとう。手伝ってくれて助かる
line = "ありがとう。手伝ってくれて助かる"

[[dialogue]]
speaker = "メルエル"
# 「えへへ、どういたしまして♪」
line = "「えへへ、どういたしまして♪」"

[[dialogue]]
speaker = "メルエル"
# 「でも、お礼なんて大丈夫だよ。私にとっては、会長くんとこうして一緒にお仕事できること自体、ご褒美みたいなものだから<emoji=heart04>」
line = "「でも、お礼なんて大丈夫だよ。私にとっては、会長くんとこうして一緒にお仕事できること自体、ご褒美みたいなものだから<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# メルエルはそんな風に、前よりもストレートに好意を見せてくるので、俺もついついドキッとしてしまう。
line = "メルエルはそんな風に、前よりもストレートに好意を見せてくるので、俺もついついドキッとしてしまう。"

[[dialogue]]
speaker = "メルエル"
# 「だからこれからも、星徒会のお仕事で人手が必要な時は、遠慮なく私に声をかけてくれたら嬉しいな♪」
line = "「だからこれからも、星徒会のお仕事で人手が必要な時は、遠慮なく私に声をかけてくれたら嬉しいな♪」"

[[dialogue]]
speaker = "unk"
# と、そんな時、モンスター出現のアラートが鳴り響く。
line = "と、そんな時、モンスター出現のアラートが鳴り響く。"

[[dialogue]]
speaker = "メルエル"
# 「会長くん、出撃するなら、私も力を貸すよ！」
line = "「会長くん、出撃するなら、私も力を貸すよ！」"

[[dialogue]]
speaker = "モンスター"
# 「イー！」
line = "「イー！」"

[[dialogue]]
speaker = "メルエル"
# 「見つけた！　――フォームチェンジ！」
line = "「見つけた！　――フォームチェンジ！」"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「リトルフォーム！　会長くん、行けるよ！」
line = "「リトルフォーム！　会長くん、行けるよ！」"

[[dialogue]]
speaker = "unk"
# ああ、一緒に攻撃するぞ！
line = "ああ、一緒に攻撃するぞ！"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「うん♪　２人で気持ちを合わせて！」
line = "「うん♪　２人で気持ちを合わせて！」"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「――ユニゾン！！　ドロップ・イン・ユアハートッ！！」
line = "「――ユニゾン！！　ドロップ・イン・ユアハートッ！！」"

[[dialogue]]
speaker = "モンスター"
# 「イ～～ッ！？」
line = "「イ～～ッ！？」"

[[dialogue]]
speaker = "unk"
# 俺とメルエルのユニゾンアタックによって、モンスターは一瞬で消滅してしまった。
line = "俺とメルエルのユニゾンアタックによって、モンスターは一瞬で消滅してしまった。"

[[dialogue]]
speaker = "unk"
# その後も、メルエルとのコンビネーションによって、他の星騎士たちが駆け付けてくる前にモンスターを全て倒すことができた。
line = "その後も、メルエルとのコンビネーションによって、他の星騎士たちが駆け付けてくる前にモンスターを全て倒すことができた。"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「よし♪　やったね、会長くん！」
line = "「よし♪　やったね、会長くん！」"

[[dialogue]]
speaker = "unk"
# ああ。メルエルが力を貸してくれたおかげだ
line = "ああ。メルエルが力を貸してくれたおかげだ"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「あのね、会長くん……そのぉ……」
line = "「あのね、会長くん……そのぉ……」"

[[dialogue]]
speaker = "unk"
# 武器をしまったメルエルが、何やらもじもじと体をくねらせていた。
line = "武器をしまったメルエルが、何やらもじもじと体をくねらせていた。"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「お願いがあるんだけど……いいかなぁ？」
line = "「お願いがあるんだけど……いいかなぁ？」"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「えっとね……ヴィーナスちゃんがよく、頑張った時とかに、会長くんから頭を撫でてもらってるでしょ？」
line = "「えっとね……ヴィーナスちゃんがよく、頑張った時とかに、会長くんから頭を撫でてもらってるでしょ？」"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「私……それが羨ましいなって、ずっと前から思ってて。だから……」
line = "「私……それが羨ましいなって、ずっと前から思ってて。だから……」"

[[dialogue]]
speaker = "unk"
# そこまで聞いてメルエルの<b>お願い</b>が何なのか察した俺は、何も言わずに彼女の頭に手を差し出した。
line = "そこまで聞いてメルエルの<b>お願い</b>が何なのか察した俺は、何も言わずに彼女の頭に手を差し出した。"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「あっ……<emoji=heart04>」
line = "「あっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺が伸ばした手のひらに、目を輝かせながら頭を潜り込ませてくるメルエル。
line = "俺が伸ばした手のひらに、目を輝かせながら頭を潜り込ませてくるメルエル。"

[[dialogue]]
speaker = "unk"
# まるで小動物のような純度１００％の好意が、心地よくもこそばゆい……。俺はそんな自分の気持ちを余り直視しないようにしつつ、メルエルの頭を優しく撫でる。
line = "まるで小動物のような純度１００％の好意が、心地よくもこそばゆい……。俺はそんな自分の気持ちを余り直視しないようにしつつ、メルエルの頭を優しく撫でる。"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「えへへへへへぇ<emoji=heart04>　すごく幸せで……メルトしちゃいそう<emoji=heart04>」
line = "「えへへへへへぇ<emoji=heart04>　すごく幸せで……メルトしちゃいそう<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そのまましばらくメルエルの頭を撫でていると、彼女がぽつりと口を開く。
line = "そのまましばらくメルエルの頭を撫でていると、彼女がぽつりと口を開く。"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「……ねぇ、会長くん。この前、告白した時のことだけど――」
line = "「……ねぇ、会長くん。この前、告白した時のことだけど――」"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「私ね、実はあの時、勇気を出してちょっぴり<b>ズル</b>をしたんだよ」
line = "「私ね、実はあの時、勇気を出してちょっぴり<b>ズル</b>をしたんだよ」"

[[dialogue]]
speaker = "unk"
# ズル……？
line = "ズル……？"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「うん。会長くんの返事を、保留してほしいってお願いしたこと」
line = "「うん。会長くんの返事を、保留してほしいってお願いしたこと」"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「リクリエとの最終決戦が終わるまでは、余計な邪魔をしたくないって気持ちは嘘じゃないけど、でもね……」
line = "「リクリエとの最終決戦が終わるまでは、余計な邪魔をしたくないって気持ちは嘘じゃないけど、でもね……」"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「一番はね、会長くんに私のことを好きって思ってもらえるように、もっとアピールする時間が欲しかったんだ<emoji=heart04>」
line = "「一番はね、会長くんに私のことを好きって思ってもらえるように、もっとアピールする時間が欲しかったんだ<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「つまり今は、『告白のロスタイム』中なんだよ」
line = "「つまり今は、『告白のロスタイム』中なんだよ」"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「会長くんに好きって思ってもらえるように、良い女の子だなって思ってもらえるように、リクリエとの戦いも頑張っちゃうんだから♪」
line = "「会長くんに好きって思ってもらえるように、良い女の子だなって思ってもらえるように、リクリエとの戦いも頑張っちゃうんだから♪」"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「ちょっとズルいけど……恋の駆け引きでは『ズルさも勇気』だって、小さい私が教えてくれたから<emoji=heart04>」
line = "「ちょっとズルいけど……恋の駆け引きでは『ズルさも勇気』だって、小さい私が教えてくれたから<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺の腕の中で振り返ったメルエルは、そう言ってイタズラっぽく微笑んでみせるのだった。
line = "俺の腕の中で振り返ったメルエルは、そう言ってイタズラっぽく微笑んでみせるのだった。"
