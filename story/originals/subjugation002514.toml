[[dialogue]]
speaker = "unk"
# 現れた本物のヴィーナスがラスボス宣言をし、彼女と戦うことになったフィオナや俺たち。
line = "現れた本物のヴィーナスがラスボス宣言をし、彼女と戦うことになったフィオナや俺たち。"

[[dialogue]]
speaker = "unk"
# その戦いは、これまでのシャドウ戦よりも更に激化していた。
line = "その戦いは、これまでのシャドウ戦よりも更に激化していた。"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「まだまだ行くわよ！　ヴィーナスキャリバーン！！」
line = "「まだまだ行くわよ！　ヴィーナスキャリバーン！！」"

[[dialogue]]
speaker = "unk"
# 彼女が武器の剣を振るう度に、一撃必殺級のビームが放たれ、暴風のように辺り一帯を薙ぎ払う！
line = "彼女が武器の剣を振るう度に、一撃必殺級のビームが放たれ、暴風のように辺り一帯を薙ぎ払う！"

[[dialogue]]
speaker = "unk"
# くぅっ……！
line = "くぅっ……！"

[[dialogue]]
speaker = "unk"
# そんな中、途中で加勢しに来てくれた人物もいた。
line = "そんな中、途中で加勢しに来てくれた人物もいた。"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「マリオンさん、手伝って頂いてありがとうございます……！」
line = "「マリオンさん、手伝って頂いてありがとうございます……！」"

[[dialogue]]
speaker = "マリオン（覚醒）"
# 「いえ、私はネビュラの魔女であると同時に、星見家のメイドでもありますから」
line = "「いえ、私はネビュラの魔女であると同時に、星見家のメイドでもありますから」"

[[dialogue]]
speaker = "マリオン（覚醒）"
# 「なにより、お嬢様が頑張ろうとしているのなら、それをお手伝いさせて頂くことが、私にとって至上の喜びなのです」
line = "「なにより、お嬢様が頑張ろうとしているのなら、それをお手伝いさせて頂くことが、私にとって至上の喜びなのです」"

[[dialogue]]
speaker = "マリオン（覚醒）"
# 「さあ、見せて下さい。フィオナお嬢様の星が更に輝く瞬間を」
line = "「さあ、見せて下さい。フィオナお嬢様の星が更に輝く瞬間を」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「はい！　ヴィーナスさんや頑張っているみなさんを見ていると……私も負けていられないって燃えて来ました！」
line = "「はい！　ヴィーナスさんや頑張っているみなさんを見ていると……私も負けていられないって燃えて来ました！」"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「ラスボスなんて生意気ね、ヴィーナス。畏怖をもって跪きなさい！」
line = "「ラスボスなんて生意気ね、ヴィーナス。畏怖をもって跪きなさい！」"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「ドラゴニックノヴァフレア！」
line = "「ドラゴニックノヴァフレア！」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「サチちゃん、可愛い後輩同士、合体技決めちゃいますよ～！」
line = "「サチちゃん、可愛い後輩同士、合体技決めちゃいますよ～！」"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「はい、リーリア先輩！　魔弾に幸運を一点収束！」
line = "「はい、リーリア先輩！　魔弾に幸運を一点収束！」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「幸運と可愛さの融合魔弾！」
line = "「幸運と可愛さの融合魔弾！」"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「行きます！　せーのっ！！」
line = "「行きます！　せーのっ！！」"

[[dialogue]]
speaker = "リーリア＆サチ"
# 「マジカルシャイニーゴールド！！」
line = "「マジカルシャイニーゴールド！！」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「ヴィーナスさん。星力、霊力、魔力……その全てを合わせて、私も全力で行きます！」
line = "「ヴィーナスさん。星力、霊力、魔力……その全てを合わせて、私も全力で行きます！」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「事象滅却――ソルフレアバースト！！！」
line = "「事象滅却――ソルフレアバースト！！！」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「受けて立つわ！　私も出し惜しみ無し、最大出力の全力ビームよ！」
line = "「受けて立つわ！　私も出し惜しみ無し、最大出力の全力ビームよ！」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「宇宙一輝け！！」
line = "「宇宙一輝け！！」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「ノヴァゴッデスビィーームッ！！！」
line = "「ノヴァゴッデスビィーームッ！！！」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「くうううぅ――っ！」
line = "「くうううぅ――っ！」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# （なんて凄まじい威力……！？　私は３つの力を掛け合わせて、マム、リーリアさん、サチさんと同時攻撃までしているのに、それでも押し負けそうだなんて……！）
line = "（なんて凄まじい威力……！？　私は３つの力を掛け合わせて、マム、リーリアさん、サチさんと同時攻撃までしているのに、それでも押し負けそうだなんて……！）"

[[dialogue]]
speaker = "フィオナ（魔王）"
# （いや、これがヴィーナスさんの能力……！　私の魔王フォームの能力『事象滅却』すら貫通する、ヴィーナスさんのノヴァフォームの――）
line = "（いや、これがヴィーナスさんの能力……！　私の魔王フォームの能力『事象滅却』すら貫通する、ヴィーナスさんのノヴァフォームの――）"

[[dialogue]]
speaker = "フィオナ（魔王）"
# （概念すら木っ端みじんにする『理屈無視』のビーム攻撃……！）
line = "（概念すら木っ端みじんにする『理屈無視』のビーム攻撃……！）"

[[dialogue]]
speaker = "フィオナ（魔王）"
# （……本当は、ずっと考えていました）
line = "（……本当は、ずっと考えていました）"

[[dialogue]]
speaker = "フィオナ（魔王）"
# （もし私が本気でヴィーナスさんと戦ったら、勝てるのかどうかって）
line = "（もし私が本気でヴィーナスさんと戦ったら、勝てるのかどうかって）"

[[dialogue]]
speaker = "フィオナ（魔王）"
# （ヴィーナスさんは間違いなく、学園のみならず星術使いの中でも頂点に君臨する天才……！）
line = "（ヴィーナスさんは間違いなく、学園のみならず星術使いの中でも頂点に君臨する天才……！）"

[[dialogue]]
speaker = "フィオナ（魔王）"
# （理論ではなく感覚で星力を自在に操る、まさに規格外の星騎士……）
line = "（理論ではなく感覚で星力を自在に操る、まさに規格外の星騎士……）"

[[dialogue]]
speaker = "フィオナ（魔王）"
# （本物の『星見フィオナ』になろうと、緋宮会長のような魔王になろうと、私も努力を重ねてきたつもりですが……）
line = "（本物の『星見フィオナ』になろうと、緋宮会長のような魔王になろうと、私も努力を重ねてきたつもりですが……）"

[[dialogue]]
speaker = "フィオナ（魔王）"
# （いつも誰かを後ろから追いすがってきた私では……超えられない……！）
line = "（いつも誰かを後ろから追いすがってきた私では……超えられない……！）"

[[dialogue]]
speaker = "フィオナ（魔王）"
# （くっ……ダメです……力を使い過ぎて、これ以上は押し合いが保たな――）
line = "（くっ……ダメです……力を使い過ぎて、これ以上は押し合いが保たな――）"

[[dialogue]]
speaker = "アポロ"
# 「フィオナ、頑張れーーーッ！！！」
line = "「フィオナ、頑張れーーーッ！！！」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「姉さん！？」
line = "「姉さん！？」"

[[dialogue]]
speaker = "アポロ"
# 「諦めるな、『星見フィオナ』！！！　オマエは、流星学園最強の星徒会長なんだろう！？」
line = "「諦めるな、『星見フィオナ』！！！　オマエは、流星学園最強の星徒会長なんだろう！？」"

[[dialogue]]
speaker = "アポロ"
# 「それに、ヒーローは決して諦めない！」
line = "「それに、ヒーローは決して諦めない！」"

[[dialogue]]
speaker = "アポロ"
# 「オマエは、あたしを救ってくれたヒーローだ！　誰がなんと言おうと、本物の魔王なんだ！！」
line = "「オマエは、あたしを救ってくれたヒーローだ！　誰がなんと言おうと、本物の魔王なんだ！！」"

[[dialogue]]
speaker = "アポロ"
# 「だから――」
line = "「だから――」"

[[dialogue]]
speaker = "アポロ"
# 「負けるな魔王フィオナーーーッ！！！」
line = "「負けるな魔王フィオナーーーッ！！！」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「姉さん……！　っ――ああああああぁぁぁっ！！！」
line = "「姉さん……！　っ――ああああああぁぁぁっ！！！」"

[[dialogue]]
speaker = "unk"
# ヴィーナスのゴッデスビームに押されていたフィオナが、今まで聞いたことのない叫びを上げる。
line = "ヴィーナスのゴッデスビームに押されていたフィオナが、今まで聞いたことのない叫びを上げる。"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「決して諦めない……燃え尽きぬ『心』のアルケインコード！」
line = "「決して諦めない……燃え尽きぬ『心』のアルケインコード！」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「アルケインソーラーブレイズッ！！！」
line = "「アルケインソーラーブレイズッ！！！」"

[[dialogue]]
speaker = "unk"
# 消えかけていた灯が再点火されるように、フィオナの体から凄まじい熱量の炎が吹き上がる。
line = "消えかけていた灯が再点火されるように、フィオナの体から凄まじい熱量の炎が吹き上がる。"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「はああああああぁぁぁーーーっ！！！」
line = "「はああああああぁぁぁーーーっ！！！」"

[[dialogue]]
speaker = "unk"
# そして、ヴィーナスのゴッデスビームを押し返し始めた。
line = "そして、ヴィーナスのゴッデスビームを押し返し始めた。"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「やるじゃない……！　私もこういう、熱いヤツがやりたかったのよ！！」
line = "「やるじゃない……！　私もこういう、熱いヤツがやりたかったのよ！！」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「私の本気とあなたの本気、どっちが強いのか決着を付けましょう！！」
line = "「私の本気とあなたの本気、どっちが強いのか決着を付けましょう！！」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「ヴィーナスさん……！　はい！！」
line = "「ヴィーナスさん……！　はい！！」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「これが！　私の！！　全力全開ッ！！！」
line = "「これが！　私の！！　全力全開ッ！！！」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「ソルフレアバーストォーーーーーッ！！！！！」
line = "「ソルフレアバーストォーーーーーッ！！！！！」"

[[dialogue]]
speaker = "unk"
# 果たして、全力をぶつけあった勝負の行方は――
line = "果たして、全力をぶつけあった勝負の行方は――"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「はぁ……はぁ……」
line = "「はぁ……はぁ……」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「……残念ね、フィオナ」
line = "「……残念ね、フィオナ」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「もっと続けたかったのに、この体の星力、すっからかんになっちゃったみたい……っ」
line = "「もっと続けたかったのに、この体の星力、すっからかんになっちゃったみたい……っ」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「私の――負けよ」
line = "「私の――負けよ」"

[[dialogue]]
speaker = "unk"
# ふらっと体から力が抜けて、ヴィーナスが倒れそうになる。
line = "ふらっと体から力が抜けて、ヴィーナスが倒れそうになる。"

[[dialogue]]
speaker = "unk"
# ヴィーナス！
line = "ヴィーナス！"

[[dialogue]]
speaker = "unk"
# 俺はその前に駆け寄って、倒れ込む彼女の体を腕で受け止めた。
line = "俺はその前に駆け寄って、倒れ込む彼女の体を腕で受け止めた。"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「あ……えへへ♪　ありがと、パパ……」
line = "「あ……えへへ♪　ありがと、パパ……」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「ヴィーナスさん、大丈夫ですか！？」
line = "「ヴィーナスさん、大丈夫ですか！？」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「ええ。フィオナ、最後の一撃、ものすごかったわよ……！」
line = "「ええ。フィオナ、最後の一撃、ものすごかったわよ……！」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「ありがとうございます。ヴィーナスさんが私と戦いに来てくれたからこそ、大切なことを学べた気がします」
line = "「ありがとうございます。ヴィーナスさんが私と戦いに来てくれたからこそ、大切なことを学べた気がします」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「私は今まで……ヴィーナスさんと戦うことを、避けていたのかもしれません」
line = "「私は今まで……ヴィーナスさんと戦うことを、避けていたのかもしれません」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「星見フィオナとして、流星学園の星徒会長として……あなたに負けてしまうことが怖かったから」
line = "「星見フィオナとして、流星学園の星徒会長として……あなたに負けてしまうことが怖かったから」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「そうなの？　フィオナの考えてたこと、私にはよくわからないけど……」
line = "「そうなの？　フィオナの考えてたこと、私にはよくわからないけど……」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「何度でも戦って、何度でも負けて……そして、何度でも勝てばいいと思うわ！」
line = "「何度でも戦って、何度でも負けて……そして、何度でも勝てばいいと思うわ！」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「何度でも負けて、何度でも勝つ……」
line = "「何度でも負けて、何度でも勝つ……」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「私たちは仲間なんだから、１回戦ってハイ終わりってわけじゃないでしょう？　せっかく仲良くなったんだから、一緒に強くなりたいわ」
line = "「私たちは仲間なんだから、１回戦ってハイ終わりってわけじゃないでしょう？　せっかく仲良くなったんだから、一緒に強くなりたいわ」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「……はい。その通り、ですね」
line = "「……はい。その通り、ですね」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「私はまだまだ、仲間を頼るのが下手なんだってことが、よくわかりました」
line = "「私はまだまだ、仲間を頼るのが下手なんだってことが、よくわかりました」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「なのでこれからは、私ともたくさん戦ってください、ヴィーナスさん」
line = "「なのでこれからは、私ともたくさん戦ってください、ヴィーナスさん」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「もっちろん！　私だって、負けたままで終われないわ。すぐリベンジするから、待ってなさい！」
line = "「もっちろん！　私だって、負けたままで終われないわ。すぐリベンジするから、待ってなさい！」"

[[dialogue]]
speaker = "unk"
# 果たして対決を終えた２人は、お互い満足そうな笑顔を浮かべるのだった――
line = "果たして対決を終えた２人は、お互い満足そうな笑顔を浮かべるのだった――"
