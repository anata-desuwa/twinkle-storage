[[dialogue]]
speaker = "プトラ"
# 「わかったよ！」
line = "「わかったよ！」"

[[dialogue]]
speaker = "unk"
# 背中に隙を作らないように、円陣を作って大量のクマロボに対抗する。
line = "背中に隙を作らないように、円陣を作って大量のクマロボに対抗する。"

[[dialogue]]
speaker = "unk"
# 確かに数は多い。けれど、数が多いだけなら問題ない。
line = "確かに数は多い。けれど、数が多いだけなら問題ない。"

[[dialogue]]
speaker = "アルテ"
# 「ローズブレード！」
