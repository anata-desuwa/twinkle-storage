[[dialogue]]
speaker = "クマロボ"
# 「グッマァーーーーーーーーーー！！！！！！」
line = "「グッマァーーーーーーーーーー！！！！！！」"

[[dialogue]]
speaker = "unk"
# また出てきた！
line = "また出てきた！"

[[dialogue]]
speaker = "プトラ"
# 「今度は数が多いよ！」
line = "「今度は数が多いよ！」"

[[dialogue]]
speaker = "アルテ"
# 「さすがに……私も見ているわけにはいかなそうですね」
line = "「さすがに……私も見ているわけにはいかなそうですね」"

[[dialogue]]
speaker = "フィオナ"
# 「散らばらないように出来るだけ近くに固まって」
