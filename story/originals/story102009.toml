[[dialogue]]
speaker = "アポロ"
# 「流星ライダーキーーーックっ！！」
line = "「流星ライダーキーーーックっ！！」"

[[dialogue]]
speaker = "クマロボ"
# 「クマァーーーーーーーーーー！！！！！！」
line = "「クマァーーーーーーーーーー！！！！！！」"

[[dialogue]]
speaker = "アルテ"
# 「楽勝だったじゃないですか。これなら私たちが変身するまでもなく、みなさんで倒しきれたと思いますよ」
line = "「楽勝だったじゃないですか。これなら私たちが変身するまでもなく、みなさんで倒しきれたと思いますよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ちょっと、サボってんじゃないの」
line = "「ちょっと、サボってんじゃないの」"

[[dialogue]]
speaker = "アルテ"
# 「会長さんにお仕事を投げっぱなしにしているヴィーナスにだけは言われたくないですね」
line = "「会長さんにお仕事を投げっぱなしにしているヴィーナスにだけは言われたくないですね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私はサボってるんじゃないわ、向いてないことをやろうとしないだけよ！」
line = "「私はサボってるんじゃないわ、向いてないことをやろうとしないだけよ！」"

[[dialogue]]
speaker = "アルテ"
# 「だったら私も向いていないことはしないことにしますよ」
line = "「だったら私も向いていないことはしないことにしますよ」"

[[dialogue]]
speaker = "プトラ"
# 「あぅぅ、ケンカはやめてよ～」
line = "「あぅぅ、ケンカはやめてよ～」"

[[dialogue]]
speaker = "unk"
# すっかり見慣れた光景だよ
line = "すっかり見慣れた光景だよ"

[[dialogue]]
speaker = "unk"
# 大丈夫、最近はずっとこの調子だから
line = "大丈夫、最近はずっとこの調子だから"

[[dialogue]]
speaker = "ヴィーナス"
# 「ケンカするほど仲がいい、そういうことね！」
line = "「ケンカするほど仲がいい、そういうことね！」"

[[dialogue]]
speaker = "アルテ"
# 「いい風に纏めないでくれませんか？　別に心を許した証拠にケンカしているというわけではありませんから」
line = "「いい風に纏めないでくれませんか？　別に心を許した証拠にケンカしているというわけではありませんから」"

[[dialogue]]
speaker = "ヴィーナス"
# 「はいはい、わかってるわよ」
line = "「はいはい、わかってるわよ」"

[[dialogue]]
speaker = "クマロボ"
# 「クマァーーーーーーーーーー！！！！！！」
line = "「クマァーーーーーーーーーー！！！！！！」"

[[dialogue]]
speaker = "フィオナ"
# 「っ！！？」
line = "「っ！！？」"

[[dialogue]]
speaker = "アポロ"
# 「また来たのか？」
line = "「また来たのか？」"

[[dialogue]]
speaker = "黒ベア子"
# 「ダメくまーーー！！　もっと盛り上がってくれないとつんまらないっくまーー！！！」
line = "「ダメくまーーー！！　もっと盛り上がってくれないとつんまらないっくまーー！！！」"

[[dialogue]]
speaker = "フィオナ"
# 「あなたは！」
line = "「あなたは！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「出たわね、黒ベア子！」
line = "「出たわね、黒ベア子！」"

[[dialogue]]
speaker = "アポロ"
# 「ふぅん、こいつが今回の異変の元凶なのか。このフォームをくれたのはおまえなんだったら、それは感謝しなくもないけど……」
line = "「ふぅん、こいつが今回の異変の元凶なのか。このフォームをくれたのはおまえなんだったら、それは感謝しなくもないけど……」"

[[dialogue]]
speaker = "アポロ"
# 「別世界に行ったあたしたちの仲間は返してもらわないといけないな！」
line = "「別世界に行ったあたしたちの仲間は返してもらわないといけないな！」"

[[dialogue]]
speaker = "プトラ"
# 「あたしたちも元の世界に返してねっ！」
line = "「あたしたちも元の世界に返してねっ！」"

[[dialogue]]
speaker = "アルテ"
# 「あなたの召喚するクマロボでは、私たちは倒せませんよ。いい加減観念したらどうですか？」
line = "「あなたの召喚するクマロボでは、私たちは倒せませんよ。いい加減観念したらどうですか？」"

[[dialogue]]
speaker = "黒ベア子"
# 「む～～～～～～っ！！！！」
line = "「む～～～～～～っ！！！！」"

[[dialogue]]
speaker = "黒ベア子"
# 「まだまだ足りないよっ！　もっと楽しくするくまっ！！！」
line = "「まだまだ足りないよっ！　もっと楽しくするくまっ！！！」"

[[dialogue]]
speaker = "黒ベア子"
# 「む～～～～～、くま～～～～～ぁぁ！！！」
