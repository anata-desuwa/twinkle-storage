[[dialogue]]
speaker = "unk"
# 蘭美は「用事があるから、あとは２人で」と言って先に去り、俺とせつなは２人きりになった。
line = "蘭美は「用事があるから、あとは２人で」と言って先に去り、俺とせつなは２人きりになった。"

[[dialogue]]
speaker = "せつな"
# 「な、なんかチョコを渡した後だと、照れ臭くなってしまうでござる……」
line = "「な、なんかチョコを渡した後だと、照れ臭くなってしまうでござる……」"

[[dialogue]]
speaker = "unk"
# せつな、チョコを食べてもいい？
line = "せつな、チョコを食べてもいい？"

[[dialogue]]
speaker = "せつな"
# 「え？　は、はい！　もちろんでござりまする！」
line = "「え？　は、はい！　もちろんでござりまする！」"

[[dialogue]]
speaker = "unk"
# 俺はハートの包みを開けて、バレンタインチョコの端っこを割って、口に入れる。
line = "俺はハートの包みを開けて、バレンタインチョコの端っこを割って、口に入れる。"

[[dialogue]]
speaker = "せつな"
# 「……ど、どうでござるか？　主様……？」
line = "「……ど、どうでござるか？　主様……？」"

[[dialogue]]
speaker = "unk"
# うまい！　頬っぺたが落ちそうなくらい
line = "うまい！　頬っぺたが落ちそうなくらい"

[[dialogue]]
speaker = "せつな"
# 「よかったでござる……！　えへへぇ♪　美味しいと言ってもらえて、せつな、嬉しくなってしまうでござるにゃん……<emoji=heart04>」
line = "「よかったでござる……！　えへへぇ♪　美味しいと言ってもらえて、せつな、嬉しくなってしまうでござるにゃん……<emoji=heart04>」"

[[dialogue]]
speaker = "せつな"
# 「でも、主様や蘭美殿には渡せたのでござるが、他のお世話になっている方々に渡すチョコは、間に合わなかったでござる」
line = "「でも、主様や蘭美殿には渡せたのでござるが、他のお世話になっている方々に渡すチョコは、間に合わなかったでござる」"

[[dialogue]]
speaker = "せつな"
# 「本当はもっといっぱい作って、ヴィーナスお嬢様やメイド隊のみんな、学園の友人、それから――」
line = "「本当はもっといっぱい作って、ヴィーナスお嬢様やメイド隊のみんな、学園の友人、それから――」"

[[dialogue]]
speaker = "せつな"
# 「紫桜の里の師匠にも贈りたかったのでござるが、せつなの実力不足で時間がなかったのが、残念でござる……」
line = "「紫桜の里の師匠にも贈りたかったのでござるが、せつなの実力不足で時間がなかったのが、残念でござる……」"

[[dialogue]]
speaker = "unk"
# なら、俺が手伝うから、今からでも作ろう
line = "なら、俺が手伝うから、今からでも作ろう"

[[dialogue]]
speaker = "せつな"
# 「え……？　でも、今日中にお渡しするのは……」
line = "「え……？　でも、今日中にお渡しするのは……」"

[[dialogue]]
speaker = "せつな"
# 「――後日でも構わない、でござるか？」
line = "「――後日でも構わない、でござるか？」"

[[dialogue]]
speaker = "unk"
# たとえバレンタインでなくても、心を込めた贈り物をもらったら嬉しい。大切なのは気持ちなのだから。
line = "たとえバレンタインでなくても、心を込めた贈り物をもらったら嬉しい。大切なのは気持ちなのだから。"

[[dialogue]]
speaker = "unk"
# 俺はせつなにそう伝える。
line = "俺はせつなにそう伝える。"

[[dialogue]]
speaker = "せつな"
# 「……！　主様の仰る通りにござる！」
line = "「……！　主様の仰る通りにござる！」"

[[dialogue]]
speaker = "せつな"
# 「せつな、これからまたバレンタインチョコを作って、みんなにちゃんと渡したいでござる！」
line = "「せつな、これからまたバレンタインチョコを作って、みんなにちゃんと渡したいでござる！」"

[[dialogue]]
speaker = "せつな"
# 「主様、ありがとうございまする！」
line = "「主様、ありがとうございまする！」"

[[dialogue]]
speaker = "せつな"
# 「――主様はやっぱり、せつなが心からお仕えしたいと思える主様にござる♪」
line = "「――主様はやっぱり、せつなが心からお仕えしたいと思える主様にござる♪」"

[[dialogue]]
speaker = "せつな"
# 「えへへぇ……♪」
line = "「えへへぇ……♪」"

[[dialogue]]
speaker = "unk"
# せつなはそう言って、笑顔を浮かべるのだった――
line = "せつなはそう言って、笑顔を浮かべるのだった――"

[[dialogue]]
speaker = "unk"
# 一方、蘭美は流星学園に出向き、ある人物を待ち構えていた――
line = "一方、蘭美は流星学園に出向き、ある人物を待ち構えていた――"

[[dialogue]]
speaker = "蘭美"
# 「待っていたわよ、上月キリカ」
line = "「待っていたわよ、上月キリカ」"

[[dialogue]]
speaker = "キリカ"
# 「九浄家メイド長の、<ruby=はねみや>羽宮</ruby>様……？　私になにか御用でしょうか？」
line = "「九浄家メイド長の、<ruby>羽宮<rt>はねみや</rt></ruby>様……？　私になにか御用でしょうか？」"

[[dialogue]]
speaker = "蘭美"
# 「ええ。貴方も、今日は何の日かくらい知っているでしょう？」
line = "「ええ。貴方も、今日は何の日かくらい知っているでしょう？」"

[[dialogue]]
speaker = "蘭美"
# 「というわけで、はい、これ。私から貴方へ、バレンタインチョコよ」
line = "「というわけで、はい、これ。私から貴方へ、バレンタインチョコよ」"

[[dialogue]]
speaker = "キリカ"
# 「え？　あ、ありがとうございます」
line = "「え？　あ、ありがとうございます」"

[[dialogue]]
speaker = "unk"
# 蘭美からチョコを受け取ったキリカは、戸惑った様子で尋ねる。
line = "蘭美からチョコを受け取ったキリカは、戸惑った様子で尋ねる。"

[[dialogue]]
speaker = "キリカ"
# 「でも、貴方が私に……ですか？」
line = "「でも、貴方が私に……ですか？」"

[[dialogue]]
speaker = "蘭美"
# 「そうよ。意外？」
line = "「そうよ。意外？」"

[[dialogue]]
speaker = "キリカ"
# 「はい、正直。貴方はてっきり、私に対抗心を抱いているものだと思っていましたから……」
line = "「はい、正直。貴方はてっきり、私に対抗心を抱いているものだと思っていましたから……」"

[[dialogue]]
speaker = "蘭美"
# 「ええ、それはもう、いつだって対抗心を燃やしているわ。だって、私にとって貴方は乗り越えるべきライバルだもの」
line = "「ええ、それはもう、いつだって対抗心を燃やしているわ。だって、私にとって貴方は乗り越えるべきライバルだもの」"

[[dialogue]]
speaker = "蘭美"
# 「ただ、これはいつかの<b>お返し</b>だから」
line = "「ただ、これはいつかの<b>お返し</b>だから」"

[[dialogue]]
speaker = "キリカ"
# 「お返し？」
line = "「お返し？」"

[[dialogue]]
speaker = "蘭美"
# 「メイド・オブ・メイドの決勝戦で私が負けて、悔しくて泣いていた時、貴方が私に声をかけてきたでしょう？」
line = "「メイド・オブ・メイドの決勝戦で私が負けて、悔しくて泣いていた時、貴方が私に声をかけてきたでしょう？」"

[[dialogue]]
speaker = "キリカ"
# 「羽宮様。今大会、実に見事なお手前でした」
line = "「羽宮様。今大会、実に見事なお手前でした」"

[[dialogue]]
speaker = "蘭美"
# 「なに！？　私が子供だと思って、慰めにでもきたわけ！？」
line = "「なに！？　私が子供だと思って、慰めにでもきたわけ！？」"

[[dialogue]]
speaker = "蘭美"
# 「馬鹿にしないで！　私はこの大会、１人のメイドとして、本気で戦いにきたのよ！」
line = "「馬鹿にしないで！　私はこの大会、１人のメイドとして、本気で戦いにきたのよ！」"

[[dialogue]]
speaker = "キリカ"
# 「いえ……私はただ、貴方のことを素直に称賛したかったのです」
line = "「いえ……私はただ、貴方のことを素直に称賛したかったのです」"

[[dialogue]]
speaker = "キリカ"
# 「その若さで信じられない程に磨き抜かれたメイドスキル。たとえ天才的な才能があったとしても、並大抵の努力では、その若さでその領域まで辿り着けなかったでしょう」
line = "「その若さで信じられない程に磨き抜かれたメイドスキル。たとえ天才的な才能があったとしても、並大抵の努力では、その若さでその領域まで辿り着けなかったでしょう」"

[[dialogue]]
speaker = "キリカ"
# 「勝敗を分けたのは、私には仕えるべき主人がいて、貴方にはまだそういう相手がいなかったこと」
line = "「勝敗を分けたのは、私には仕えるべき主人がいて、貴方にはまだそういう相手がいなかったこと」"

[[dialogue]]
speaker = "キリカ"
# 「ですが、貴方のメイドに対する情熱は、間違いなく私よりも上でした」
line = "「ですが、貴方のメイドに対する情熱は、間違いなく私よりも上でした」"

[[dialogue]]
speaker = "キリカ"
# 「私は、今大会で誰よりもメイドとして輝いていた貴方を、心から称賛します」
line = "「私は、今大会で誰よりもメイドとして輝いていた貴方を、心から称賛します」"

[[dialogue]]
speaker = "蘭美"
# 「――あの時、貴方が言ってくれたことが、今の私の誇りになっているわ」
line = "「――あの時、貴方が言ってくれたことが、今の私の誇りになっているわ」"

[[dialogue]]
speaker = "蘭美"
# 「だから、これはそのお礼よ」
line = "「だから、これはそのお礼よ」"

[[dialogue]]
speaker = "キリカ"
# 「……そうですか。なら――」
line = "「……そうですか。なら――」"

[[dialogue]]
speaker = "キリカ"
# 「このお返しは、ホワイトデーにしないといけませんね」
line = "「このお返しは、ホワイトデーにしないといけませんね」"

[[dialogue]]
speaker = "蘭美"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "蘭美"
# 「ふふっ。なら、世界第１位のメイドが作るお菓子、期待しているわよ？」
line = "「ふふっ。なら、世界第１位のメイドが作るお菓子、期待しているわよ？」"

[[dialogue]]
speaker = "unk"
# その後、蘭美は九浄家への帰り道を、鼻歌まじりに歩いていた。
line = "その後、蘭美は九浄家への帰り道を、鼻歌まじりに歩いていた。"

[[dialogue]]
speaker = "蘭美"
# 「～～♪　～～～♪」
line = "「～～♪　～～～♪」"

[[dialogue]]
speaker = "unk"
# 彼女にとってキリカは、あの日から、もう１人の憧れのメイド。
line = "彼女にとってキリカは、あの日から、もう１人の憧れのメイド。"

[[dialogue]]
speaker = "蘭美"
# 「ふふっ、ホワイトデー、楽しみね♪」
line = "「ふふっ、ホワイトデー、楽しみね♪」"

[[dialogue]]
speaker = "unk"
# 思わず笑みがこぼれて、ぴょんぴょんとスキップをしてしまう蘭美なのだった――
line = "思わず笑みがこぼれて、ぴょんぴょんとスキップをしてしまう蘭美なのだった――"
