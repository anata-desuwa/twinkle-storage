# 「私、ご主人様の精液の匂い、やっぱり好きです……<emoji=heart04>　気持ちよくしていっぱい出してもらうと、幸せな気分になっちゃいます……<emoji=heart04>」
line = "「私、ご主人様の精液の匂い、やっぱり好きです……<emoji=heart04>　気持ちよくしていっぱい出してもらうと、幸せな気分になっちゃいます……<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
# 「でも、ごめんなさい……。ご主人様の精液、量がすごくてこぼしちゃいました……。なので――」
line = "「でも、ごめんなさい……。ご主人様の精液、量がすごくてこぼしちゃいました……。なので――」"

[[dialogue]]
speaker = "ヨミ"
# 「誰かにバレるかもと思って興奮しちゃう変態メイドに、どうか罰をお命じ下さいませ……<emoji=heart04>」
line = "「誰かにバレるかもと思って興奮しちゃう変態メイドに、どうか罰をお命じ下さいませ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# その言葉を聞いて、俺のペニスは再び勃起してしまう。
line = "その言葉を聞いて、俺のペニスは再び勃起してしまう。"

[[dialogue]]
speaker = "クロト"
# 「どうなっても知らないからな」
line = "「どうなっても知らないからな」"

[[dialogue]]
speaker = "ヨミ"
# 「はい<emoji=heart04>　ご主人様……<emoji=heart04>」
line = "「はい<emoji=heart04>　ご主人様……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 嬉しそうに尻尾を振る恋人メイドに、俺は再びお掃除フェラをするように命じるのだった――
line = "嬉しそうに尻尾を振る恋人メイドに、俺は再びお掃除フェラをするように命じるのだった――"
