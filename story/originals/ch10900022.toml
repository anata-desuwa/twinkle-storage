[[dialogue]]
speaker = "unk"
# 第２話,メイプルとナナカ,P
line = "第２話,メイプルとナナカ,P"

[[dialogue]]
speaker = "unk"
# 今回出会った流星クルセイダースの１人、夕霧ナナカ。
line = "今回出会った流星クルセイダースの１人、夕霧ナナカ。"

[[dialogue]]
speaker = "unk"
# 彼女に招かれて、俺とメイプルは彼女の実家、蕎麦屋『夕霧庵』へとやって来ていた――
line = "彼女に招かれて、俺とメイプルは彼女の実家、蕎麦屋『夕霧庵』へとやって来ていた――"

[[dialogue]]
speaker = "ナナカ"
# 「メイちゃん、会長。へい、お待ち♪」
line = "「メイちゃん、会長。へい、お待ち♪」"

[[dialogue]]
speaker = "ナナカ"
# 「これがアタシの作った『手打ち蕎麦』だよ！　割合は二八ね！」
line = "「これがアタシの作った『手打ち蕎麦』だよ！　割合は二八ね！」"

[[dialogue]]
speaker = "メイプル"
# 「わぁ～っ♪　美味しそう！　ナナお姉ちゃん、ありがと～♪」
line = "「わぁ～っ♪　美味しそう！　ナナお姉ちゃん、ありがと～♪」"

[[dialogue]]
speaker = "ナナカ"
# 「へへっ♪　お任せってことだったんで、今回は冷たい『ざるそば』にしてみたよ！」
line = "「へへっ♪　お任せってことだったんで、今回は冷たい『ざるそば』にしてみたよ！」"

[[dialogue]]
speaker = "ナナカ"
# 「多分なんだけど、メイちゃんは猫舌なんじゃないかって思って。――どう？　合ってる？」
line = "「多分なんだけど、メイちゃんは猫舌なんじゃないかって思って。――どう？　合ってる？」"

[[dialogue]]
speaker = "メイプル"
# 「すごい！　なんでわかったの！？」
line = "「すごい！　なんでわかったの！？」"

[[dialogue]]
speaker = "ナナカ"
# 「あははっ、やっぱり～♪　そこもマコちゃんと似てるんじゃないかって、そんな予感がしたんだよね～！」
line = "「あははっ、やっぱり～♪　そこもマコちゃんと似てるんじゃないかって、そんな予感がしたんだよね～！」"

[[dialogue]]
speaker = "unk"
# マコちゃんってもしかして――
line = "マコちゃんってもしかして――"

[[dialogue]]
speaker = "ナナカ"
# 「うん、そう♪　アタシ、マカロンちゃんのことはそう呼んでるんだ」
line = "「うん、そう♪　アタシ、マカロンちゃんのことはそう呼んでるんだ」"

[[dialogue]]
speaker = "メイプル"
# 「ロロットも言ってたけど、あたし、そんなにその子と似てるんだ……」
line = "「ロロットも言ってたけど、あたし、そんなにその子と似てるんだ……」"

[[dialogue]]
speaker = "ナナカ"
# 「別に、瓜２つってわけでもないんだけどね～。でも、なんとなく雰囲気が似てるって感じ」
line = "「別に、瓜２つってわけでもないんだけどね～。でも、なんとなく雰囲気が似てるって感じ」"

[[dialogue]]
speaker = "ナナカ"
# 「アタシのこと、ナナお姉ちゃんって呼んでくれるのも一緒だしね！」
line = "「アタシのこと、ナナお姉ちゃんって呼んでくれるのも一緒だしね！」"

[[dialogue]]
speaker = "メイプル"
# 「それは、この戦闘服の影響かな……？　なんとなく、ナナお姉ちゃんって呼び方が自然と頭の中に浮かんできたんだ」
line = "「それは、この戦闘服の影響かな……？　なんとなく、ナナお姉ちゃんって呼び方が自然と頭の中に浮かんできたんだ」"

[[dialogue]]
speaker = "メイプル"
# 「でも、聞けば聞く程、ますますその子に会いたくなって来るな～」
line = "「でも、聞けば聞く程、ますますその子に会いたくなって来るな～」"

[[dialogue]]
speaker = "ナナカ"
# 「あ～、それがさ、今ちょうど、魔王の武者修行だって言って、出かけちゃってるんだよね～。この前電話が来た時は、群馬だって言ってたかな？」
line = "「あ～、それがさ、今ちょうど、魔王の武者修行だって言って、出かけちゃってるんだよね～。この前電話が来た時は、群馬だって言ってたかな？」"

[[dialogue]]
speaker = "ナナカ"
# 「なんか、魔境を見つけたとかなんとかって――」
line = "「なんか、魔境を見つけたとかなんとかって――」"

[[dialogue]]
speaker = "メイプル"
# 「魔境！？　こっちの日本には、そんな心躍るワードを冠する場所が……！？」
line = "「魔境！？　こっちの日本には、そんな心躍るワードを冠する場所が……！？」"

[[dialogue]]
speaker = "ナナカ"
# 「心躍るんだ……」
line = "「心躍るんだ……」"

[[dialogue]]
speaker = "unk"
# 覚醒する系の子なので……
line = "覚醒する系の子なので……"

[[dialogue]]
speaker = "unk"
# メイプルは眼帯を付けて
line = "メイプルは眼帯を付けて"

[[dialogue]]
speaker = "ナナカ"
# 「ああ、なるほど！　そういうこと……」
line = "「ああ、なるほど！　そういうこと……」"

[[dialogue]]
speaker = "メイプル"
# 「ふっふっふっ。魔王を目指して自ら魔境へ修業におもむくとは……ルリエルとロロットの２人を見た時に考えていたことが、いよいよ確信に変わったぞ！」
line = "「ふっふっふっ。魔王を目指して自ら魔境へ修業におもむくとは……ルリエルとロロットの２人を見た時に考えていたことが、いよいよ確信に変わったぞ！」"

[[dialogue]]
speaker = "ナナカ"
# 「言ってるそばから、いきなり覚醒した！？」
line = "「言ってるそばから、いきなり覚醒した！？」"

[[dialogue]]
speaker = "メイプル"
# 「ここは女神テルル様が管理する世界とは全く異なる異世界！　……しかし、流星市国と流星町のように、異なりながらも共通する要素の数々」
line = "「ここは女神テルル様が管理する世界とは全く異なる異世界！　……しかし、流星市国と流星町のように、異なりながらも共通する要素の数々」"

[[dialogue]]
speaker = "メイプル"
# 「ならば、それはあたしたちヒトにも当てはまるはず！　すなわち――」
line = "「ならば、それはあたしたちヒトにも当てはまるはず！　すなわち――」"

[[dialogue]]
speaker = "メイプル"
# 「ルリエルとロロット、そして、あたしとその子は……『<b>異世界の同位存在</b>』！」
line = "「ルリエルとロロット、そして、あたしとその子は……『<b>異世界の同位存在</b>』！」"

[[dialogue]]
speaker = "メイプル"
# 「今、この時を持って名づけるなら、そう！　『<ruby=アナザーステラ>異相連星</ruby>』なのだ……！」
line = "「今、この時を持って名づけるなら、そう！　『<ruby>異相連星<rt>アナザーステラ</rt></ruby>』なのだ……！」"

[[dialogue]]
speaker = "ナナカ"
# 「アナザー……なんて？」
line = "「アナザー……なんて？」"

[[dialogue]]
speaker = "メイプル"
# 「言うなれば、世界の境界を背中合わせにした光と闇の関係……！　それこそが、あたし達に隠されていた真実！」
line = "「言うなれば、世界の境界を背中合わせにした光と闇の関係……！　それこそが、あたし達に隠されていた真実！」"

[[dialogue]]
speaker = "ナナカ"
# 「メイちゃん？　お～い、メイちゃ～ん？」
line = "「メイちゃん？　お～い、メイちゃ～ん？」"

[[dialogue]]
speaker = "unk"
# とりあえず、お蕎麦食べよっか
line = "とりあえず、お蕎麦食べよっか"

[[dialogue]]
speaker = "unk"
# はい、そこまで！
line = "はい、そこまで！"

[[dialogue]]
speaker = "メイプル"
# 「――あっ！　は～い♪」
line = "「――あっ！　は～い♪」"

[[dialogue]]
speaker = "ナナカ"
# 「戻ってきた！？　会長、めっちゃ手慣れてるじゃん！」
line = "「戻ってきた！？　会長、めっちゃ手慣れてるじゃん！」"

[[dialogue]]
speaker = "unk"
# それから、俺たちはナナカの打ってくれた蕎麦を残さず頂いた。
line = "それから、俺たちはナナカの打ってくれた蕎麦を残さず頂いた。"

[[dialogue]]
speaker = "メイプル"
# 「――ふぅっ♪　ナナお姉ちゃんのお蕎麦、すごく美味しかった～♪」
line = "「――ふぅっ♪　ナナお姉ちゃんのお蕎麦、すごく美味しかった～♪」"

[[dialogue]]
speaker = "unk"
# ご馳走様でした。うまかった！
line = "ご馳走様でした。うまかった！"

[[dialogue]]
speaker = "ナナカ"
# 「あいよ♪　お粗末様っ♪」
line = "「あいよ♪　お粗末様っ♪」"

[[dialogue]]
speaker = "メイプル"
# 「でも、ナナお姉ちゃん、蕎麦作るの上手なんだね！　本当に美味しくて、あたしビックリしちゃった」
line = "「でも、ナナお姉ちゃん、蕎麦作るの上手なんだね！　本当に美味しくて、あたしビックリしちゃった」"

[[dialogue]]
speaker = "ナナカ"
# 「へへっ♪　褒めてくれてあんがと！　親父に比べたらまだまだだけどさ、一応これでも流星学園の『一芸入試』に、蕎麦打って合格した実績があるんでね」
line = "「へへっ♪　褒めてくれてあんがと！　親父に比べたらまだまだだけどさ、一応これでも流星学園の『一芸入試』に、蕎麦打って合格した実績があるんでね」"

[[dialogue]]
speaker = "ナナカ"
# 「それにしても、シンはタイミングが悪いね。せっかく遠路はるばるご客人が来てるっていうのに、こういう肝心な時に限って留守にしてるなんて」
line = "「それにしても、シンはタイミングが悪いね。せっかく遠路はるばるご客人が来てるっていうのに、こういう肝心な時に限って留守にしてるなんて」"

[[dialogue]]
speaker = "ナナカ"
# 「あっ、そうそう。シンと言えば、この前ね……？」
line = "「あっ、そうそう。シンと言えば、この前ね……？」"

[[dialogue]]
speaker = "メイプル"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ナナカ"
# 「って、どしたのメイちゃん。アタシの顔見て固まっちゃって……」
line = "「って、どしたのメイちゃん。アタシの顔見て固まっちゃって……」"

[[dialogue]]
speaker = "メイプル"
# 「あのさ。ナナお姉ちゃんって、もしかして――」
line = "「あのさ。ナナお姉ちゃんって、もしかして――」"

[[dialogue]]
speaker = "メイプル"
# 「そのシンって人のこと、好きだったりする……？」
line = "「そのシンって人のこと、好きだったりする……？」"

[[dialogue]]
speaker = "ナナカ"
# 「へぇあっ！？」
line = "「へぇあっ！？」"

[[dialogue]]
speaker = "ナナカ"
# 「な、ななな、何でそんな風に思ったのかな、メイちゃん！？」
line = "「な、ななな、何でそんな風に思ったのかな、メイちゃん！？」"

[[dialogue]]
speaker = "メイプル"
# 「なんか、その人のことを話してるお姉ちゃん、すごく嬉しそうだなと思って……」
line = "「なんか、その人のことを話してるお姉ちゃん、すごく嬉しそうだなと思って……」"

[[dialogue]]
speaker = "ナナカ"
# 「いやいやいやいや！　う、嬉しいだなんて、そんな……アタシとあいつはただの幼馴染みだし……！」
line = "「いやいやいやいや！　う、嬉しいだなんて、そんな……アタシとあいつはただの幼馴染みだし……！」"

[[dialogue]]
speaker = "メイプル"
# 「でも、ナナお姉ちゃん、すっごく顔が赤いよ？」
line = "「でも、ナナお姉ちゃん、すっごく顔が赤いよ？」"

[[dialogue]]
speaker = "ナナカ"
# 「へぁっ！？　こ、これはそのぉ……！　ち、ちょっとこっちに来て、メイちゃん！」
line = "「へぁっ！？　こ、これはそのぉ……！　ち、ちょっとこっちに来て、メイちゃん！」"

[[dialogue]]
speaker = "ナナカ"
# 「――というか、そういうメイちゃんの方はどうなのさっ」
line = "「――というか、そういうメイちゃんの方はどうなのさっ」"

[[dialogue]]
speaker = "メイプル"
# 「え？　どうって……？」
line = "「え？　どうって……？」"

[[dialogue]]
speaker = "ナナカ"
# 「会長とのこと。なんかすごく仲良さそうに見えるけど？」
line = "「会長とのこと。なんかすごく仲良さそうに見えるけど？」"

[[dialogue]]
speaker = "メイプル"
# 「そ、それは……えっと、耳を貸してナナお姉ちゃん。その～、ね？　ごにょごにょごにょ」
line = "「そ、それは……えっと、耳を貸してナナお姉ちゃん。その～、ね？　ごにょごにょごにょ」"

[[dialogue]]
speaker = "ナナカ"
# 「ん～、なるほど……そんな感じかぁ。じゃあ――」
line = "「ん～、なるほど……そんな感じかぁ。じゃあ――」"

[[dialogue]]
speaker = "ナナカ"
# 「アタシたちはお互い、頑張らないといけない者同士だね♪」
line = "「アタシたちはお互い、頑張らないといけない者同士だね♪」"

[[dialogue]]
speaker = "ナナカ"
# 「元の世界に帰ったら、次はどうなるかわかんないけどさ。でも、もしまた会えたら――」
line = "「元の世界に帰ったら、次はどうなるかわかんないけどさ。でも、もしまた会えたら――」"

[[dialogue]]
speaker = "ナナカ"
# 「その時は、２人で恋バナしよっか♪」
line = "「その時は、２人で恋バナしよっか♪」"

[[dialogue]]
speaker = "ナナカ"
# 「メイちゃん、頑張って！　アタシも応援してるからさ！」
line = "「メイちゃん、頑張って！　アタシも応援してるからさ！」"

[[dialogue]]
speaker = "メイプル"
# 「ナナお姉ちゃん……うんっ♪」
line = "「ナナお姉ちゃん……うんっ♪」"

[[dialogue]]
speaker = "unk"
# 会話の内容は全く聞き取れなかったが、部屋の隅で何やら秘密の会話を交わしたらしいメイプルとナナカは、笑顔でグータッチを交わすのだった――
line = "会話の内容は全く聞き取れなかったが、部屋の隅で何やら秘密の会話を交わしたらしいメイプルとナナカは、笑顔でグータッチを交わすのだった――"
