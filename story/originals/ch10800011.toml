[[dialogue]]
speaker = "unk"
# 第１話,想い、受け止めてくれ！,P
line = "第１話,想い、受け止めてくれ！,P"

[[dialogue]]
speaker = "unk"
# 『廊下を走ってはいけません』の全国的標語を厳守することなく、新星学園の廊下を駆け抜ける２つの人影。
line = "『廊下を走ってはいけません』の全国的標語を厳守することなく、新星学園の廊下を駆け抜ける２つの人影。"

[[dialogue]]
speaker = "フラン"
# 「待てー！　逃げるな、会長っ！　オレの熱い想い！　受け取ってくれー！」
line = "「待てー！　逃げるな、会長っ！　オレの熱い想い！　受け取ってくれー！」"

[[dialogue]]
speaker = "フラン"
# 「こっちはすっかりその気になってんだ！　弄ぶんじゃねえーっ！」
line = "「こっちはすっかりその気になってんだ！　弄ぶんじゃねえーっ！」"

[[dialogue]]
speaker = "マトイ"
# 「もう、模範となるべき会長が廊下を全力疾走しちゃダメだってば」
line = "「もう、模範となるべき会長が廊下を全力疾走しちゃダメだってば」"

[[dialogue]]
speaker = "unk"
# 追われているんだ！
line = "追われているんだ！"

[[dialogue]]
speaker = "マトイ"
# 「追われている？　さっきから騒がしいのと関係あるのかな？」
line = "「追われている？　さっきから騒がしいのと関係あるのかな？」"

[[dialogue]]
speaker = "アナ"
# 「あのよく通る声は、応援団のフラン先輩ですね。熱い想いをどうとか、弄ぶなとか叫んでました」
line = "「あのよく通る声は、応援団のフラン先輩ですね。熱い想いをどうとか、弄ぶなとか叫んでました」"

[[dialogue]]
speaker = "マトイ"
# 「熱い想い……？　弄ぶ――それってまさか……！？」
line = "「熱い想い……？　弄ぶ――それってまさか……！？」"

[[dialogue]]
speaker = "フラン"
# 「応援団２年、フラン・アーテリアル、失礼します！」
line = "「応援団２年、フラン・アーテリアル、失礼します！」"

[[dialogue]]
speaker = "フラン"
# 「やっぱりここだったな、やっと追いついたぜ、会長！　オレの想いを綴った手紙、受け取ってくれっ！」
line = "「やっぱりここだったな、やっと追いついたぜ、会長！　オレの想いを綴った手紙、受け取ってくれっ！」"

[[dialogue]]
speaker = "マトイ"
# 「想いを綴った……その手紙はやっぱり！　ドキドキワクワク！」
line = "「想いを綴った……その手紙はやっぱり！　ドキドキワクワク！」"

[[dialogue]]
speaker = "フラン"
# 「ああ、もちろん──」
line = "「ああ、もちろん──」"

[[dialogue]]
speaker = "フラン"
# 「果たし状だっ！」
line = "「果たし状だっ！」"

[[dialogue]]
speaker = "unk"
# ……果たし状？
line = "……果たし状？"

[[dialogue]]
speaker = "フラン"
# 「会長！　あんたに決闘を申し込む！」
line = "「会長！　あんたに決闘を申し込む！」"

[[dialogue]]
speaker = "マトイ"
# 「は、果たし状？　ラブレターじゃなくて？」
line = "「は、果たし状？　ラブレターじゃなくて？」"

[[dialogue]]
speaker = "フラン"
# 「ラブレター！？　んなわけねえだろ！　んなもん書いたことねえし出す気もねえよ！」
line = "「ラブレター！？　んなわけねえだろ！　んなもん書いたことねえし出す気もねえよ！」"

[[dialogue]]
speaker = "アナ"
# 「果たし状とは随分と古風ですね。直接メッセージを送ればいいのでは」
line = "「果たし状とは随分と古風ですね。直接メッセージを送ればいいのでは」"

[[dialogue]]
speaker = "フラン"
# 「それじゃ、オレの想いは伝わらねえ。こういうマジなのは形から入るのが大事だろ」
line = "「それじゃ、オレの想いは伝わらねえ。こういうマジなのは形から入るのが大事だろ」"

[[dialogue]]
speaker = "フラン"
# 「ヴィーナスが星徒会長の時に御前試合をしたかったんだが、先を越されちまったからな。だからオレはヴィーナスに勝ったあんたに勝負を申し込む！」
line = "「ヴィーナスが星徒会長の時に御前試合をしたかったんだが、先を越されちまったからな。だからオレはヴィーナスに勝ったあんたに勝負を申し込む！」"

[[dialogue]]
speaker = "フラン"
# 「ヴィーナスとの試合記録、何度も見させてもらった。本当に見事だったぜ。惚れた！」
line = "「ヴィーナスとの試合記録、何度も見させてもらった。本当に見事だったぜ。惚れた！」"

[[dialogue]]
speaker = "マトイ"
# 「ほ、惚れ……！　会長にＬＯＶＥ？」
line = "「ほ、惚れ……！　会長にＬＯＶＥ？」"

[[dialogue]]
speaker = "アナ"
# 「いえ。あの様子だとＬＩＫＥでしょう」
line = "「いえ。あの様子だとＬＩＫＥでしょう」"

[[dialogue]]
speaker = "フラン"
# 「一歩も引かないあんたの戦いぶりにな！　超絶格好良かったぜ！　あんたはオレの憧れだ！」
line = "「一歩も引かないあんたの戦いぶりにな！　超絶格好良かったぜ！　あんたはオレの憧れだ！」"

[[dialogue]]
speaker = "アナ"
# 「むしろ、ＲＥＳＰＥＣＴですかね」
line = "「むしろ、ＲＥＳＰＥＣＴですかね」"

[[dialogue]]
speaker = "アナ"
# 「つかぬことをお聞きしますが、会長との勝負にこだわるということは、フラン先輩はゆくゆくは星徒会長の座を？」
line = "「つかぬことをお聞きしますが、会長との勝負にこだわるということは、フラン先輩はゆくゆくは星徒会長の座を？」"

[[dialogue]]
speaker = "フラン"
# 「会長の座？　いや？　そんなのにはこれっぽっちも興味ねえんだけど」
line = "「会長の座？　いや？　そんなのにはこれっぽっちも興味ねえんだけど」"

[[dialogue]]
speaker = "マトイ"
# 「これっぽっちも！？　それじゃ、なんで決闘なんて挑むの？」
line = "「これっぽっちも！？　それじゃ、なんで決闘なんて挑むの？」"

[[dialogue]]
speaker = "フラン"
# 「なんでって……『強いやつと戦いてえ！』それ以外に理由なんているのかよ」
line = "「なんでって……『強いやつと戦いてえ！』それ以外に理由なんているのかよ」"

[[dialogue]]
speaker = "マトイ"
# 「<ruby=バトルマニア>戦闘狂</ruby>かな……」
line = "「<ruby>戦闘狂<rt>バトルマニア</rt></ruby>かな……」"

[[dialogue]]
speaker = "アナ"
# 「<ruby=バーサーカー>狂戦士</ruby>ですね」
line = "「<ruby>狂戦士<rt>バーサーカー</rt></ruby>ですね」"

[[dialogue]]
speaker = "フラン"
# 「人聞き悪ぃな。誰でも良いわけじゃねえ。オレはちゃんと分別がついてるよ」
line = "「人聞き悪ぃな。誰でも良いわけじゃねえ。オレはちゃんと分別がついてるよ」"

[[dialogue]]
speaker = "フラン"
# 「弱い者イジメなんて、卑怯な真似は絶対にしねえ。戦うなら強いやつだ」
line = "「弱い者イジメなんて、卑怯な真似は絶対にしねえ。戦うなら強いやつだ」"

[[dialogue]]
speaker = "フラン"
# 「鍛えた自分の体がどんだけ強くなったのか、わかりやすい物差しで計りたくなるだろ？　みんなは違うのか？」
line = "「鍛えた自分の体がどんだけ強くなったのか、わかりやすい物差しで計りたくなるだろ？　みんなは違うのか？」"

[[dialogue]]
speaker = "マトイ"
# 「うーーーん、わからなくもないけど……」
line = "「うーーーん、わからなくもないけど……」"

[[dialogue]]
speaker = "アナ"
# 「会長を物差し扱いとは恐れ知らずですね」
line = "「会長を物差し扱いとは恐れ知らずですね」"

[[dialogue]]
speaker = "フラン"
# 「強くなれば強くなるほど、戦士として守れるものが増えるからな」
line = "「強くなれば強くなるほど、戦士として守れるものが増えるからな」"

[[dialogue]]
speaker = "フラン"
# 「だけど会長になんてなったら忙しすぎて、守るべきやつを守れなくなっちまう。それじゃ本末転倒だ」
line = "「だけど会長になんてなったら忙しすぎて、守るべきやつを守れなくなっちまう。それじゃ本末転倒だ」"

[[dialogue]]
speaker = "フラン"
# 「ま、そういうわけだ！　オレからの果たし状、受け取ってくれるな？」
line = "「ま、そういうわけだ！　オレからの果たし状、受け取ってくれるな？」"

[[dialogue]]
speaker = "unk"
# 受け取るよ
line = "受け取るよ"

[[dialogue]]
speaker = "マトイ"
# 「会長！？」
line = "「会長！？」"

[[dialogue]]
speaker = "フラン"
# 「よっしゃあ！　ついに会長と御前試合がやれるんだな！」
line = "「よっしゃあ！　ついに会長と御前試合がやれるんだな！」"

[[dialogue]]
speaker = "unk"
# 御前試合は簡単にはできないよ
line = "御前試合は簡単にはできないよ"

[[dialogue]]
speaker = "フラン"
# 「は？　そういや前もそう言ってたっけ」
line = "「は？　そういや前もそう言ってたっけ」"

[[dialogue]]
speaker = "フラン"
# 「まあ、いいや。会長と勝負ができるなら、いつだってなんだってＯＫだ！　で、いつにする？」
line = "「まあ、いいや。会長と勝負ができるなら、いつだってなんだってＯＫだ！　で、いつにする？」"

[[dialogue]]
speaker = "unk"
# 日時は明日、場所はここでいい？
line = "日時は明日、場所はここでいい？"

[[dialogue]]
speaker = "マトイ"
# 「明日って、学園はお休みよね。随分急だけど」
line = "「明日って、学園はお休みよね。随分急だけど」"

[[dialogue]]
speaker = "フラン"
# 「へっ、常在戦場、戦士に休息はねえ！　いつだろうが、どこだろうが、望むところだ！」
line = "「へっ、常在戦場、戦士に休息はねえ！　いつだろうが、どこだろうが、望むところだ！」"

[[dialogue]]
speaker = "フラン"
# 「明日の勝負、楽しみにしてるぜ！」
line = "「明日の勝負、楽しみにしてるぜ！」"

[[dialogue]]
speaker = "アナ"
# 「フラン先輩、吹き荒れる熱風のような方でした」
line = "「フラン先輩、吹き荒れる熱風のような方でした」"

[[dialogue]]
speaker = "マトイ"
# 「でも、明日いきなり勝負だなんて……大丈夫？」
line = "「でも、明日いきなり勝負だなんて……大丈夫？」"

[[dialogue]]
speaker = "アナ"
# 「ああでも言っておかないと、フラン先輩は引き下がりそうになかったですしね」
line = "「ああでも言っておかないと、フラン先輩は引き下がりそうになかったですしね」"

[[dialogue]]
speaker = "unk"
# 任せておいて
line = "任せておいて"

[[dialogue]]
speaker = "アナ"
# 「ふむ。会長には何やら考えがある様子。お手並み拝見といきましょう」
line = "「ふむ。会長には何やら考えがある様子。お手並み拝見といきましょう」"
