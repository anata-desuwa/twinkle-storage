[[dialogue]]
speaker = "舞亜"
# 「アニュラス、ちょっといい？」
line = "「アニュラス、ちょっといい？」"

[[dialogue]]
speaker = "アニュラス"
# 「舞亜か。私に用か？」
line = "「舞亜か。私に用か？」"

[[dialogue]]
speaker = "舞亜"
# 「うん、昨日２人の話を聞いて、ひらめいたことがあるんだけど……」
line = "「うん、昨日２人の話を聞いて、ひらめいたことがあるんだけど……」"

[[dialogue]]
speaker = "舞亜"
# 「もう開き直って全部詰め込んじゃわない？」
line = "「もう開き直って全部詰め込んじゃわない？」"

[[dialogue]]
speaker = "アニュラス"
# 「それは……思いついたこと全てを取り入れよう、ということか？」
line = "「それは……思いついたこと全てを取り入れよう、ということか？」"

[[dialogue]]
speaker = "舞亜"
# 「もちろん、無理なものは除外するけどね。でも、全体のまとまりとか、そういうのはこの際忘れちゃおうって」
line = "「もちろん、無理なものは除外するけどね。でも、全体のまとまりとか、そういうのはこの際忘れちゃおうって」"

[[dialogue]]
speaker = "舞亜"
# 「みんながやりたいことを全部するの。ちぐはぐにはなるだろうけど、でもその中には何か刺さるものを見つけられる」
line = "「みんながやりたいことを全部するの。ちぐはぐにはなるだろうけど、でもその中には何か刺さるものを見つけられる」"

[[dialogue]]
speaker = "舞亜"
# 「そんなクリスマスパーティーにしたいって、私は思うんだ」
line = "「そんなクリスマスパーティーにしたいって、私は思うんだ」"

[[dialogue]]
speaker = "アニュラス"
# 「なるほど、それが舞亜の意見か……」
line = "「なるほど、それが舞亜の意見か……」"

[[dialogue]]
speaker = "舞亜"
# 「……やっぱりアニュラスは納得いかない？」
line = "「……やっぱりアニュラスは納得いかない？」"

[[dialogue]]
speaker = "アニュラス"
# 「納得いかない……というわけではないが、どうしても引っかかる点が１つある」
line = "「納得いかない……というわけではないが、どうしても引っかかる点が１つある」"

[[dialogue]]
speaker = "アニュラス"
# 「それは、寮長殿のオーダーを無視することにならないか？」
line = "「それは、寮長殿のオーダーを無視することにならないか？」"

[[dialogue]]
speaker = "アニュラス"
# 「我々はあくまでオーダーを受けた身だ。依頼主の意向を無視して、勝手なことをするわけにはいかない」
line = "「我々はあくまでオーダーを受けた身だ。依頼主の意向を無視して、勝手なことをするわけにはいかない」"

[[dialogue]]
speaker = "舞亜"
# 「無視するわけじゃないの。『流星寮の品格に相応しいクリスマスパーティー』の中に詰め込めるものを全部詰め込むの」
line = "「無視するわけじゃないの。『流星寮の品格に相応しいクリスマスパーティー』の中に詰め込めるものを全部詰め込むの」"

[[dialogue]]
speaker = "舞亜"
# 「寮長さんの意向は大事だけど、私は参加した全員が楽しめるクリスマスパーティーにしたい」
line = "「寮長さんの意向は大事だけど、私は参加した全員が楽しめるクリスマスパーティーにしたい」"

[[dialogue]]
speaker = "舞亜"
# 「寮生はいっぱいいるんだもん。元気にはしゃぎたい子もいれば、しっとり過ごしたい子もいる。モリモリ食べたい子もいれば、ほっこりしたい子もいるはずだよ」
line = "「寮生はいっぱいいるんだもん。元気にはしゃぎたい子もいれば、しっとり過ごしたい子もいる。モリモリ食べたい子もいれば、ほっこりしたい子もいるはずだよ」"

[[dialogue]]
speaker = "アニュラス"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "アニュラス"
# 「そうだな、舞亜の言う通りだ……パーティーは参加する全員が楽しくあるべきだ」
line = "「そうだな、舞亜の言う通りだ……パーティーは参加する全員が楽しくあるべきだ」"

[[dialogue]]
speaker = "舞亜"
# 「オッケー♪　そうと決まったらアニュラスは自分のやりたい事、思いつくままどんどん提案していってね」
line = "「オッケー♪　そうと決まったらアニュラスは自分のやりたい事、思いつくままどんどん提案していってね」"

[[dialogue]]
speaker = "舞亜"
# 「私はみんなのアイデアを全部ひとつにして、パーティー会場っていうステージを作り出して見せるから！」
line = "「私はみんなのアイデアを全部ひとつにして、パーティー会場っていうステージを作り出して見せるから！」"

[[dialogue]]
speaker = "アニュラス"
# 「待った」
line = "「待った」"

[[dialogue]]
speaker = "舞亜"
# 「他にも何か気になることがあったりする？」
line = "「他にも何か気になることがあったりする？」"

[[dialogue]]
speaker = "アニュラス"
# 「いや、そうじゃなくてだな……」
line = "「いや、そうじゃなくてだな……」"

[[dialogue]]
speaker = "アニュラス"
# 「舞亜はどうなんだ？　全員が楽しめるパーティーというなら、舞亜の意見も含まれていなければならないだろう？」
line = "「舞亜はどうなんだ？　全員が楽しめるパーティーというなら、舞亜の意見も含まれていなければならないだろう？」"

[[dialogue]]
speaker = "舞亜"
# 「あ……」
line = "「あ……」"

[[dialogue]]
speaker = "アニュラス"
# 「私たちの意見を聞くだけではなく、舞亜も自分のやりたいことを言って欲しい。そうでなければ全員が楽しめるパーティーとは言えない」
line = "「私たちの意見を聞くだけではなく、舞亜も自分のやりたいことを言って欲しい。そうでなければ全員が楽しめるパーティーとは言えない」"

[[dialogue]]
speaker = "舞亜"
# 「うん、そうだね。アニュラスの言う通りだ……」
line = "「うん、そうだね。アニュラスの言う通りだ……」"

[[dialogue]]
speaker = "舞亜"
# 「それじゃあ私もやりたい事、言うね？　そうだな～、石窯を設置してピザを食べ放題とか？」
line = "「それじゃあ私もやりたい事、言うね？　そうだな～、石窯を設置してピザを食べ放題とか？」"

[[dialogue]]
speaker = "舞亜"
# 「後はビンゴゲームっぽい感じのプレゼント交換会とか！」
line = "「後はビンゴゲームっぽい感じのプレゼント交換会とか！」"

[[dialogue]]
speaker = "アニュラス"
# 「ほう、事前にプレゼントを集めておいて、それでビンゴを行うということか？　それは楽しそうだな！」
line = "「ほう、事前にプレゼントを集めておいて、それでビンゴを行うということか？　それは楽しそうだな！」"

[[dialogue]]
speaker = "舞亜"
# 「後はね、ええと──」
line = "「後はね、ええと──」"

[[dialogue]]
speaker = "アニュラス"
# 「うむ、それは私もやりたいと考えていた！　ぜひ、やろう！　後は私はこういうのも考えているんだが──」
line = "「うむ、それは私もやりたいと考えていた！　ぜひ、やろう！　後は私はこういうのも考えているんだが──」"

[[dialogue]]
speaker = "unk"
# こうして流星寮のクリスマスパーティーは順調に膨らんでいく。
line = "こうして流星寮のクリスマスパーティーは順調に膨らんでいく。"

[[dialogue]]
speaker = "unk"
# 全てを詰め込んで、それを実現する。そんなことが本当に可能かどうかは分からない。
line = "全てを詰め込んで、それを実現する。そんなことが本当に可能かどうかは分からない。"

[[dialogue]]
speaker = "unk"
# だが今は何も考えずに、自分がやりたいと思ったことを提案し合う。
line = "だが今は何も考えずに、自分がやりたいと思ったことを提案し合う。"

[[dialogue]]
speaker = "unk"
# それによって確実に何かが動き始めた──と、手ごたえを確信する舞亜とアニュラスだった。
line = "それによって確実に何かが動き始めた──と、手ごたえを確信する舞亜とアニュラスだった。"
