[[dialogue]]
speaker = "unk"
# 第２話,甘えん坊のヴィーナス,P
line = "第２話,甘えん坊のヴィーナス,P"

[[dialogue]]
speaker = "unk"
# 放課後、教室で授業の課題を片付けていると──
line = "放課後、教室で授業の課題を片付けていると──"

[[dialogue]]
speaker = "マトイ"
# 「か、会長っ！　大変、大変なの！」
line = "「か、会長っ！　大変、大変なの！」"

[[dialogue]]
speaker = "マトイ"
# 「ヴィーナスが、お子ちゃま化しちゃった！！！」
line = "「ヴィーナスが、お子ちゃま化しちゃった！！！」"

[[dialogue]]
speaker = "unk"
# どういうこと！？
line = "どういうこと！？"

[[dialogue]]
speaker = "ヴィーナス"
# 「おそいわよっ！　まちくたびれちゃったじゃないっ！」
line = "「おそいわよっ！　まちくたびれちゃったじゃないっ！」"

[[dialogue]]
speaker = "マトイ"
# 「ええと、会長。状況を簡単に説明するとね──」
line = "「ええと、会長。状況を簡単に説明するとね──」"

[[dialogue]]
speaker = "アナ"
# 「今朝、業者が来て星徒会室にワックスをかけたそうです。そうとは知らず前会長がやってきて、ズッコケて頭を打ちました」
line = "「今朝、業者が来て星徒会室にワックスをかけたそうです。そうとは知らず前会長がやってきて、ズッコケて頭を打ちました」"

[[dialogue]]
speaker = "サーシャ"
# 「こんなこともあるのね～。お姉ちゃん、びっくりしちゃったわ。記憶とか大丈夫みたいだけど、精神年齢だけ子供に戻っちゃったみたいね～」
line = "「こんなこともあるのね～。お姉ちゃん、びっくりしちゃったわ。記憶とか大丈夫みたいだけど、精神年齢だけ子供に戻っちゃったみたいね～」"

[[dialogue]]
speaker = "unk"
# いや、そんなことあります！？
line = "いや、そんなことあります！？"

[[dialogue]]
speaker = "マトイ"
# 「や、やっぱマズいよね？　病院、病院に電話しなくちゃ……！」
line = "「や、やっぱマズいよね？　病院、病院に電話しなくちゃ……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「びょういんはヤ～。おちゅうしゃ、きらいだもの」
line = "「びょういんはヤ～。おちゅうしゃ、きらいだもの」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ねぇねぇ、それよりもみんな！」
line = "「ねぇねぇ、それよりもみんな！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「わたしと、かけっこでしょうぶしましょっ！」
line = "「わたしと、かけっこでしょうぶしましょっ！」"

[[dialogue]]
speaker = "アナ"
# 「凄い。中身は前会長のまま。この唐突さ、覚えがありすぎる」
line = "「凄い。中身は前会長のまま。この唐突さ、覚えがありすぎる」"

[[dialogue]]
speaker = "サーシャ"
# 「あら可愛らしい♪　ねえ、かけっこって……グラウンドで競争するってこと？」
line = "「あら可愛らしい♪　ねえ、かけっこって……グラウンドで競争するってこと？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ううん。せいりょくで、そらをとぶかけっこよ！　おにくわきおどるわ！」
line = "「ううん。せいりょくで、そらをとぶかけっこよ！　おにくわきおどるわ！」"

[[dialogue]]
speaker = "マトイ"
# 「結構ガチなやつじゃないそれ！？」
line = "「結構ガチなやつじゃないそれ！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「よーし、かけっこスタートよ、みんな！　まけないんだからっ！」
line = "「よーし、かけっこスタートよ、みんな！　まけないんだからっ！」"

[[dialogue]]
speaker = "サーシャ"
# 「ふふっ。会長くんに手を繋いでもらって、本当に子供みたいね。可愛いわ～♪」
line = "「ふふっ。会長くんに手を繋いでもらって、本当に子供みたいね。可愛いわ～♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「んうぅ……ねむい……」
line = "「んうぅ……ねむい……」"

[[dialogue]]
speaker = "unk"
# （ヴィーナスの頭を撫でてみる）
line = "（ヴィーナスの頭を撫でてみる）"

[[dialogue]]
speaker = "ヴィーナス"
# 「んふふふ……くすぐったい……かいちょーのて、おっきい……」
line = "「んふふふ……くすぐったい……かいちょーのて、おっきい……」"

[[dialogue]]
speaker = "マトイ"
# 「……じゃあ、九浄邸までヴィーナスのこと、よろしくね。何かあったら連絡してくれていいから。私、早く帰ってお風呂入りたい……」
line = "「……じゃあ、九浄邸までヴィーナスのこと、よろしくね。何かあったら連絡してくれていいから。私、早く帰ってお風呂入りたい……」"

[[dialogue]]
speaker = "アナ"
# 「疲労困憊。子供に戻った前会長が、ここまでとは思いませんでした……。それじゃあ申し訳ありませんが、私たちは先に失礼します」
line = "「疲労困憊。子供に戻った前会長が、ここまでとは思いませんでした……。それじゃあ申し訳ありませんが、私たちは先に失礼します」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……かいちょー、つかれたぁ……おんぶしてぇ……」
line = "「……かいちょー、つかれたぁ……おんぶしてぇ……」"

[[dialogue]]
speaker = "unk"
# （ヴィーナスをおぶってやる）
line = "（ヴィーナスをおぶってやる）"

[[dialogue]]
speaker = "ヴィーナス"
# 「かいちょーのせなか、あったかぁい……んふふふ……おっきぃ……いいにおいするぅ……」
line = "「かいちょーのせなか、あったかぁい……んふふふ……おっきぃ……いいにおいするぅ……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「なんだか、おとうさん、みたい～……」
line = "「なんだか、おとうさん、みたい～……」"

[[dialogue]]
speaker = "unk"
# お父さん……？
line = "お父さん……？"

[[dialogue]]
speaker = "ヴィーナス"
# 「……すぅ……すぅ……んんっ、すう…………かいちょぉ……」
line = "「……すぅ……すぅ……んんっ、すう…………かいちょぉ……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「…………んっ、んんっ……」
line = "「…………んっ、んんっ……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……ん？　あれ、私、何して……」
line = "「……ん？　あれ、私、何して……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「って、クロト！？　なんで私のことおんぶしてるの！？」
line = "「って、クロト！？　なんで私のことおんぶしてるの！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「えっ、ていうか、もう夜になってる！？　なんで！？　どうして！？」
line = "「えっ、ていうか、もう夜になってる！？　なんで！？　どうして！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……ハッ！　もしかして私……時間旅行してたのでは！？」
line = "「……ハッ！　もしかして私……時間旅行してたのでは！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「さすが私ね！　いつかやれると思ってたのよ！」
line = "「さすが私ね！　いつかやれると思ってたのよ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「──ふうん、なるほど。頭を打って気絶してたのね、私」
line = "「──ふうん、なるほど。頭を打って気絶してたのね、私」"

[[dialogue]]
speaker = "ヴィーナス"
# 「どおりで記憶がないわけね。たんこぶもできてるし」
line = "「どおりで記憶がないわけね。たんこぶもできてるし」"

[[dialogue]]
speaker = "unk"
# 復活したなら背中から降りて貰えると……
line = "復活したなら背中から降りて貰えると……"

[[dialogue]]
speaker = "unk"
# それよりも……
line = "それよりも……"

[[dialogue]]
speaker = "ヴィーナス"
# 「えー？　いいじゃないこのままで。私、クロトの背中、好きよ。おっきくてなんだか安心するわ」
line = "「えー？　いいじゃないこのままで。私、クロトの背中、好きよ。おっきくてなんだか安心するわ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……ねえ、このままぎゅって抱き着いてみてもいい？」
line = "「……ねえ、このままぎゅって抱き着いてみてもいい？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……うん。いいわねこれは。すっごく安心する」
line = "「……うん。いいわねこれは。すっごく安心する」"

[[dialogue]]
speaker = "ヴィーナス"
# 「すんすんっ……なんだかいい匂いもするわね。もしかしてクロトって、アロマ的なものを放出してたりするのかしら？」
line = "「すんすんっ……なんだかいい匂いもするわね。もしかしてクロトって、アロマ的なものを放出してたりするのかしら？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ま、なんでもいいわねっ。それよりもっと抱きしめて、リラックス成分を吸収しなくちゃ」
line = "「ま、なんでもいいわねっ。それよりもっと抱きしめて、リラックス成分を吸収しなくちゃ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「んん～～～♪　生き返る～～～！」
line = "「んん～～～♪　生き返る～～～！」"

[[dialogue]]
speaker = "unk"
# （ま、今日は好きなようにさせてやるか……）
line = "（ま、今日は好きなようにさせてやるか……）"

[[dialogue]]
speaker = "ヴィーナス"
# 「さあ、九浄邸までゴーゴーよ！　疾風となって夜を切り裂きなさい！」
line = "「さあ、九浄邸までゴーゴーよ！　疾風となって夜を切り裂きなさい！」"

[[dialogue]]
speaker = "unk"
# 俺はやれやれと思いつつも、ヴィーナスの望むように、九浄邸に向けて走り出すのだった。
line = "俺はやれやれと思いつつも、ヴィーナスの望むように、九浄邸に向けて走り出すのだった。"
