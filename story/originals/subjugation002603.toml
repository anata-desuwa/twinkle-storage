[[dialogue]]
speaker = "unk"
# ──後日。
line = "──後日。"

[[dialogue]]
speaker = "ヴィーナス"
# 「なっ……」
line = "「なっ……」"

[[dialogue]]
speaker = "ルリエル"
# 「これは……！」
line = "「これは……！」"

[[dialogue]]
speaker = "リップル"
# 「いらっしゃーい！　今だけの特別仕様エンドレスサマーへ！」
line = "「いらっしゃーい！　今だけの特別仕様エンドレスサマーへ！」"

[[dialogue]]
speaker = "unk"
# 砂浜には豪華なセットが設営され、ステージの前には観覧用のビーチパラソルがいくつも並ぶ。
line = "砂浜には豪華なセットが設営され、ステージの前には観覧用のビーチパラソルがいくつも並ぶ。"

[[dialogue]]
speaker = "unk"
# 高らかに掲げられたフラッグには、でかでかと『リゾート結界　水着コンテスト』と書かれていた。
line = "高らかに掲げられたフラッグには、でかでかと『リゾート結界　水着コンテスト』と書かれていた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「すごすぎない！？」
line = "「すごすぎない！？」"

[[dialogue]]
speaker = "リップル"
# 「水着コンテストならここまでやってナンボとお聞きしました！　さすがは名スポンサーサンデース！」
line = "「水着コンテストならここまでやってナンボとお聞きしました！　さすがは名スポンサーサンデース！」"

[[dialogue]]
speaker = "アナ"
# 「時代の流れで減少している審美コンテストをこうも派手に……」
line = "「時代の流れで減少している審美コンテストをこうも派手に……」"

[[dialogue]]
speaker = "ヘレナ"
# 「フッ──イベンターの面目躍如だ。海の家が発展すれば、貴殿のお師匠たちも喜ばれよう……？」
line = "「フッ──イベンターの面目躍如だ。海の家が発展すれば、貴殿のお師匠たちも喜ばれよう……？」"

[[dialogue]]
speaker = "リップル"
# 「ハーイ、その通りデース！　ヘレナちゃんの寛大なお心遣いに感謝感激いたしマース！」
line = "「ハーイ、その通りデース！　ヘレナちゃんの寛大なお心遣いに感謝感激いたしマース！」"

[[dialogue]]
speaker = "サーシャ"
# 「それにしても豪華なステージね……」
line = "「それにしても豪華なステージね……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「どこからこんなものが出てきたのよ」
line = "「どこからこんなものが出てきたのよ」"

[[dialogue]]
speaker = "ヘレナ"
# 「何、色々とツテをあたってな。今回のビジネ……もとい、人助けのことを話したら、たくさんの協賛を得られたのだ」
line = "「何、色々とツテをあたってな。今回のビジネ……もとい、人助けのことを話したら、たくさんの協賛を得られたのだ」"

[[dialogue]]
speaker = "ソフィア"
# 「今、ビジネスって言いかけませんでした……？」
line = "「今、ビジネスって言いかけませんでした……？」"

[[dialogue]]
speaker = "ヘレナ"
# 「気のせいだ。私はただ、この海の家を盛り上げたいだけ……」
line = "「気のせいだ。私はただ、この海の家を盛り上げたいだけ……」"

[[dialogue]]
speaker = "リップル"
# 「ハーイ！　ヘレナちゃんはワタシのビジョンに共感してくれマシタ！」
line = "「ハーイ！　ヘレナちゃんはワタシのビジョンに共感してくれマシタ！」"

[[dialogue]]
speaker = "ヘレナ"
# 「今回の『エンドレスサマー水着コンテスト』は、水着でステージにさえ上がれば誰でも参加可能！　エントリー費無料！」
line = "「今回の『エンドレスサマー水着コンテスト』は、水着でステージにさえ上がれば誰でも参加可能！　エントリー費無料！」"

[[dialogue]]
speaker = "ヘレナ"
# 「公明正大な審査によって、もっとも水着の似合っていた優勝者にはグランプリの称号が与えられる！」
line = "「公明正大な審査によって、もっとも水着の似合っていた優勝者にはグランプリの称号が与えられる！」"

[[dialogue]]
speaker = "ヘレナ"
# 「どうかな？　貴殿らも、このリゾートをより盛り上げると思って、参加してみては？」
line = "「どうかな？　貴殿らも、このリゾートをより盛り上げると思って、参加してみては？」"

[[dialogue]]
speaker = "ルリエル"
# 「へへへ、そう聞くとなんだか楽しそうですね♪」
line = "「へへへ、そう聞くとなんだか楽しそうですね♪」"

[[dialogue]]
speaker = "リップル"
# 「ワクワクしてきたデショウ？」
line = "「ワクワクしてきたデショウ？」"

[[dialogue]]
speaker = "リップル"
# 「さらに参加者には～……もれなく豪華海のサチ、海の家ドリンクチケット、バナナボートが贈られマ～ス！」
line = "「さらに参加者には～……もれなく豪華海のサチ、海の家ドリンクチケット、バナナボートが贈られマ～ス！」"

[[dialogue]]
speaker = "アポロ"
# 「海の幸！　バナナボート！？　うおお、あたしは絶対に出場するぞ！」
line = "「海の幸！　バナナボート！？　うおお、あたしは絶対に出場するぞ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「なんでそんなに景品が豪華なのよ！？」
line = "「なんでそんなに景品が豪華なのよ！？」"

[[dialogue]]
speaker = "ヘレナ"
# 「無論、この私がスポンサーだからだ」
line = "「無論、この私がスポンサーだからだ」"

[[dialogue]]
speaker = "ヘレナ"
# 「それに驚くのはまだ早い。此度のコンテストでもし優勝すれば……」
line = "「それに驚くのはまだ早い。此度のコンテストでもし優勝すれば……」"

[[dialogue]]
speaker = "unk"
# 何が……？
line = "何が……？"

[[dialogue]]
speaker = "unk"
# 優勝すれば……？
line = "優勝すれば……？"

[[dialogue]]
speaker = "リップル"
# 「フフフ……聞いて驚くナカレ、なのデス」
line = "「フフフ……聞いて驚くナカレ、なのデス」"

[[dialogue]]
speaker = "リップル"
# 「なんと一等賞には……賞金１０万テルスが贈呈されマ～～～ス！！」
line = "「なんと一等賞には……賞金１０万テルスが贈呈されマ～～～ス！！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええええ────っ！？！？」
line = "「ええええ────っ！？！？」"
