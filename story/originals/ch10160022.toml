[[dialogue]]
speaker = "unk"
# 第２話,にゃんにゃん猫モード,P
line = "第２話,にゃんにゃん猫モード,P"

[[dialogue]]
speaker = "unk"
# ヒトリがハロウィンフォームに変身できるようになってから、以前と変わったことがある。
line = "ヒトリがハロウィンフォームに変身できるようになってから、以前と変わったことがある。"

[[dialogue]]
speaker = "unk"
# その日はヒトリが俺の家に遊びに来ていたのだが――
line = "その日はヒトリが俺の家に遊びに来ていたのだが――"

[[dialogue]]
speaker = "ヒトリ"
# 「ふにゃあ<emoji=heart04>　ごろごろ……<emoji=heart04>」
line = "「ふにゃあ<emoji=heart04>　ごろごろ……<emoji=heart04>」"

[[dialogue]]
speaker = "ヒトリ"
# 「ご主人様のお膝の上、落ち着きます、にゃん……♪」
line = "「ご主人様のお膝の上、落ち着きます、にゃん……♪」"

[[dialogue]]
speaker = "unk"
# 今日は母さんが出かけていて２人きり。ソファーに腰かけている俺の膝の上には、ヒトリが座っていた。
line = "今日は母さんが出かけていて２人きり。ソファーに腰かけている俺の膝の上には、ヒトリが座っていた。"

[[dialogue]]
speaker = "unk"
# 今日のヒトリは、猫さんモード？
line = "今日のヒトリは、猫さんモード？"

[[dialogue]]
speaker = "ヒトリ"
# 「はい、そうですにゃ♪　なので、大好きなご主人様に甘えても恥ずかしくないんですにゃ<emoji=heart04>」
line = "「はい、そうですにゃ♪　なので、大好きなご主人様に甘えても恥ずかしくないんですにゃ<emoji=heart04>」"

[[dialogue]]
speaker = "ヒトリ"
# 「だから、いっぱい撫でたり……後は――」
line = "「だから、いっぱい撫でたり……後は――」"

[[dialogue]]
speaker = "ヒトリ"
# 「キスしてくれると、嬉しいです、にゃん……<emoji=heart04>」
line = "「キスしてくれると、嬉しいです、にゃん……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ハロウィンフォームが気に入ったのか、最近のヒトリは２人きりになると、こうして猫モードで甘えてくる。
line = "ハロウィンフォームが気に入ったのか、最近のヒトリは２人きりになると、こうして猫モードで甘えてくる。"

[[dialogue]]
speaker = "unk"
# ヒトリは俺と正面から向き合うように座り直すと、そっと顔を近づけてきて――
line = "ヒトリは俺と正面から向き合うように座り直すと、そっと顔を近づけてきて――"

[[dialogue]]
speaker = "ヒトリ"
# 「ん……<emoji=heart04>」
line = "「ん……<emoji=heart04>」"

[[dialogue]]
speaker = "ヒトリ"
# 「ちゅっ<emoji=heart04>」
line = "「ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "ヒトリ"
# 「ご主人様……好きです<emoji=heart04>　んむっ……ちゅっ<emoji=heart04>　ちゅっ……<emoji=heart04>」
line = "「ご主人様……好きです<emoji=heart04>　んむっ……ちゅっ<emoji=heart04>　ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ヒトリが甘いキスの雨を俺に降らせて来る。
line = "ヒトリが甘いキスの雨を俺に降らせて来る。"

[[dialogue]]
speaker = "ヒトリ"
# 「はあぁ……<emoji=heart04>　ご主人様からも、キスして欲しいです……んっ……ちゅっ<emoji=heart04>」
line = "「はあぁ……<emoji=heart04>　ご主人様からも、キスして欲しいです……んっ……ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "ヒトリ"
# 「あっ……キスしてくれるの、嬉しい、です<emoji=heart04>　んっ……ちゅっ<emoji=heart04>　ちゅっ……んむっ<emoji=heart04>」
line = "「あっ……キスしてくれるの、嬉しい、です<emoji=heart04>　んっ……ちゅっ<emoji=heart04>　ちゅっ……んむっ<emoji=heart04>」"

[[dialogue]]
speaker = "ヒトリ"
# 「はあぁ……<emoji=heart04>　ご主人様のキス、力強くて、頭の中が痺れちゃいます……<emoji=heart04>」
line = "「はあぁ……<emoji=heart04>　ご主人様のキス、力強くて、頭の中が痺れちゃいます……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ヒトリはすっかりキス魔になっちゃったな
line = "ヒトリはすっかりキス魔になっちゃったな"

[[dialogue]]
speaker = "ヒトリ"
# 「は、はい……<emoji=heart04>　ご主人様とキスすると、頭の中が幸せな気持ちでいっぱいになって……そ、それに……」
line = "「は、はい……<emoji=heart04>　ご主人様とキスすると、頭の中が幸せな気持ちでいっぱいになって……そ、それに……」"

[[dialogue]]
speaker = "ヒトリ"
# 「純粋に、肌が触れ合うのも、気持ちいいっていうか……<emoji=heart04>」
line = "「純粋に、肌が触れ合うのも、気持ちいいっていうか……<emoji=heart04>」"

[[dialogue]]
speaker = "ヒトリ"
# 「ご主人様の方は……どうですか？」
line = "「ご主人様の方は……どうですか？」"

[[dialogue]]
speaker = "ヒトリ"
# 「えへへ<emoji=heart04>　ドキドキする、ですか……？　はぁぁ<emoji=heart04>　わたしもです♪」
line = "「えへへ<emoji=heart04>　ドキドキする、ですか……？　はぁぁ<emoji=heart04>　わたしもです♪」"

[[dialogue]]
speaker = "ヒトリ"
# 「――って、あっ<emoji=heart04>　やんっ……<emoji=heart04>　ご主人様、耳と尻尾は触っちゃダメです……<emoji=heart04>」
line = "「――って、あっ<emoji=heart04>　やんっ……<emoji=heart04>　ご主人様、耳と尻尾は触っちゃダメです……<emoji=heart04>」"

[[dialogue]]
speaker = "ヒトリ"
# 「そ、そこは敏感なんですぅ……ふあぁ<emoji=heart04>　ご主人様ぁ……<emoji=heart04>」
line = "「そ、そこは敏感なんですぅ……ふあぁ<emoji=heart04>　ご主人様ぁ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ヒトリのハロウィンフォームに付いているネコミミと尻尾。それはただの装飾ではなく、『猫っぽいことができる』という能力の一部であり、感覚が通っているという。
line = "ヒトリのハロウィンフォームに付いているネコミミと尻尾。それはただの装飾ではなく、『猫っぽいことができる』という能力の一部であり、感覚が通っているという。"

[[dialogue]]
speaker = "unk"
# なので、触ると体温の温もりがあり、ピコピコ、フリフリと可愛く反応を返してくれる。
line = "なので、触ると体温の温もりがあり、ピコピコ、フリフリと可愛く反応を返してくれる。"

[[dialogue]]
speaker = "ヒトリ"
# 「やぁっ……だ、ダメぇ<emoji=heart04>　それ以上はぁ……ゆ、許して下さいぃ……<emoji=heart04>」
line = "「やぁっ……だ、ダメぇ<emoji=heart04>　それ以上はぁ……ゆ、許して下さいぃ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ごめん、嫌だった？
line = "ごめん、嫌だった？"

[[dialogue]]
speaker = "ヒトリ"
# 「はぁ……はぁ……。い、いえ、むしろ……気持ちよすぎちゃうから、おかしくなっちゃいそう、というか……」
line = "「はぁ……はぁ……。い、いえ、むしろ……気持ちよすぎちゃうから、おかしくなっちゃいそう、というか……」"

[[dialogue]]
speaker = "ヒトリ"
# 「ご主人様の触り方、すごく上手なので……<emoji=heart04>」
line = "「ご主人様の触り方、すごく上手なので……<emoji=heart04>」"

[[dialogue]]
speaker = "ヒトリ"
# 「――猫カフェでバイトしてたことがある？　……むっ。そ、そうなんですね……」
line = "「――猫カフェでバイトしてたことがある？　……むっ。そ、そうなんですね……」"

[[dialogue]]
speaker = "unk"
# 猫に嫉妬してる？
line = "猫に嫉妬してる？"

[[dialogue]]
speaker = "unk"
# あれ？　ヒトリ、もしかして……
line = "あれ？　ヒトリ、もしかして……"

[[dialogue]]
speaker = "ヒトリ"
# 「し、してません……！」
line = "「し、してません……！」"

[[dialogue]]
speaker = "ヒトリ"
# 「そんなことくらいで、別に……」
line = "「そんなことくらいで、別に……」"

[[dialogue]]
speaker = "unk"
# 俺は思わず、彼女を抱き締めてしまう。
line = "俺は思わず、彼女を抱き締めてしまう。"

[[dialogue]]
speaker = "ヒトリ"
# 「にゃっ！？　ご、ご主人様……？」
line = "「にゃっ！？　ご、ご主人様……？」"

[[dialogue]]
speaker = "unk"
# ヒトリは本当に可愛いな
line = "ヒトリは本当に可愛いな"

[[dialogue]]
speaker = "ヒトリ"
# 「ふあぁ……<emoji=heart04>　頭を優しく撫でられながら、耳元で囁かれるの……ゾクゾクしちゃいます<emoji=heart04>」
line = "「ふあぁ……<emoji=heart04>　頭を優しく撫でられながら、耳元で囁かれるの……ゾクゾクしちゃいます<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺はヒトリだけのものだから、大丈夫
line = "俺はヒトリだけのものだから、大丈夫"

[[dialogue]]
speaker = "ヒトリ"
# 「……！　会長さん……<emoji=heart04>」
line = "「……！　会長さん……<emoji=heart04>」"

[[dialogue]]
speaker = "ヒトリ"
# 「あの……わたし。またキスが、したいです……<emoji=heart04>」
line = "「あの……わたし。またキスが、したいです……<emoji=heart04>」"

[[dialogue]]
speaker = "ヒトリ"
# 「ん……<emoji=heart04>」
line = "「ん……<emoji=heart04>」"

[[dialogue]]
speaker = "ヒトリ"
# 「ちゅっ……<emoji=heart04>」
line = "「ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "ヒトリ"
# 「ご主人様……大好きです<emoji=heart04>　ちゅっ……ちゅっ<emoji=heart04>」
line = "「ご主人様……大好きです<emoji=heart04>　ちゅっ……ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺たちはそれからまた、何度も甘いキスを繰り返すのだった――
line = "俺たちはそれからまた、何度も甘いキスを繰り返すのだった――"
