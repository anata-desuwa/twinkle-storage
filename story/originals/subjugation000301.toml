[[dialogue]]
speaker = "モネ"
# 「平和ですねー」
line = "「平和ですねー」"

[[dialogue]]
speaker = "ウィステリア"
# 「平和ねー」
line = "「平和ねー」"

[[dialogue]]
speaker = "モネ"
# 「まぁ、いろいろ事件が起きていて、本当は平和じゃないのはわかってるんですけど。でも図書館はいつも通りですね」
line = "「まぁ、いろいろ事件が起きていて、本当は平和じゃないのはわかってるんですけど。でも図書館はいつも通りですね」"

[[dialogue]]
speaker = "ウィステリア"
# 「そうね。仕事も変わりなく──」
line = "「そうね。仕事も変わりなく──」"

[[dialogue]]
speaker = "ウィステリア"
# 「きゃっ！？」
line = "「きゃっ！？」"

[[dialogue]]
speaker = "ウィステリア"
# 「うぅ、またつまずいちゃったわ……。これで連続何日目かしら」
line = "「うぅ、またつまずいちゃったわ……。これで連続何日目かしら」"

[[dialogue]]
speaker = "モネ"
# （ウィステリアさんの運が悪いのもいつも通り……）
line = "（ウィステリアさんの運が悪いのもいつも通り……）"

[[dialogue]]
speaker = "モネ"
# 「でも私、残念です。こんなに本がたくさんあるのに、テスト前以外はそんなに利用者が多くないんですから」
line = "「でも私、残念です。こんなに本がたくさんあるのに、テスト前以外はそんなに利用者が多くないんですから」"

[[dialogue]]
speaker = "モネ"
# 「本は素晴らしいです。歴史の本を読むことで、過去を知ることができます。科学の本を読めば、世界の仕組みを理解することができます」
line = "「本は素晴らしいです。歴史の本を読むことで、過去を知ることができます。科学の本を読めば、世界の仕組みを理解することができます」"

[[dialogue]]
speaker = "モネ"
# 「物語は現実ではできないことを体験できます。詩は人の心を感じることができます」
line = "「物語は現実ではできないことを体験できます。詩は人の心を感じることができます」"

[[dialogue]]
speaker = "モネ"
# 「本を通していろんな世界に触れることができます。だからみんなにもっと本を読んでほしいです」
line = "「本を通していろんな世界に触れることができます。だからみんなにもっと本を読んでほしいです」"

[[dialogue]]
speaker = "モネ"
# 「あと、人が来ないなら受付するより本を読んでいたいです……」
line = "「あと、人が来ないなら受付するより本を読んでいたいです……」"

[[dialogue]]
speaker = "ウィステリア"
# 「ダ～メ。これも立派な仕事なんだから。借りたい本があるのに受付がいなかったら困るでしょ」
line = "「ダ～メ。これも立派な仕事なんだから。借りたい本があるのに受付がいなかったら困るでしょ」"

[[dialogue]]
speaker = "モネ"
# 「はーい」
line = "「はーい」"

[[dialogue]]
speaker = "モネ"
# 「ちなみにウィステリアさんは、学生時代、図書館はよく利用されてましたか？」
line = "「ちなみにウィステリアさんは、学生時代、図書館はよく利用されてましたか？」"

[[dialogue]]
speaker = "ウィステリア"
# 「正直言うとあんまり……友達と過ごしたり、アルバイトしてる方が多かったわね」
line = "「正直言うとあんまり……友達と過ごしたり、アルバイトしてる方が多かったわね」"

[[dialogue]]
speaker = "ウィステリア"
# （青春がしたくて人間界に来たとは言えない……しかも全然出会いがなかったし……）
line = "（青春がしたくて人間界に来たとは言えない……しかも全然出会いがなかったし……）"

[[dialogue]]
speaker = "モネ"
# 「ウィステリアさん、アルバイトされてたんですね」
line = "「ウィステリアさん、アルバイトされてたんですね」"

[[dialogue]]
speaker = "モネ"
# 「そういえば、ウィステリアさんの学生時代の話ってあまり聞いたことがない気がします。昔のウィステリアさんってどんな──」
line = "「そういえば、ウィステリアさんの学生時代の話ってあまり聞いたことがない気がします。昔のウィステリアさんってどんな──」"

[[dialogue]]
speaker = "ウィステリア"
# 「ああっと、いけないいけないっ。仕事しないとよね」
line = "「ああっと、いけないいけないっ。仕事しないとよね」"

[[dialogue]]
speaker = "モネ"
# 「今、急に話を逸らされたような……？」
line = "「今、急に話を逸らされたような……？」"

[[dialogue]]
speaker = "モネ"
# 「でもどうにかして、図書館を利用する人を増やせないでしょうか」
line = "「でもどうにかして、図書館を利用する人を増やせないでしょうか」"

[[dialogue]]
speaker = "モネ"
# 「触ったり匂いを嗅いだりするのもいいですが、やはり本は読むためにあるもの。偏屈な子は別ですけど、本たちだって読まれたがっています」
line = "「触ったり匂いを嗅いだりするのもいいですが、やはり本は読むためにあるもの。偏屈な子は別ですけど、本たちだって読まれたがっています」"

[[dialogue]]
speaker = "ウィステリア"
# 「前半は置いておくとして……そうね、せっかく本があるんだから読まないともったいないわ」
line = "「前半は置いておくとして……そうね、せっかく本があるんだから読まないともったいないわ」"

[[dialogue]]
speaker = "ウィステリア"
# 「だけど今までも取り組みはしてきたのよ。定期的な図書便りの更新はもちろん、季節のイベントを催したりとか」
line = "「だけど今までも取り組みはしてきたのよ。定期的な図書便りの更新はもちろん、季節のイベントを催したりとか」"

[[dialogue]]
speaker = "ウィステリア"
# 「だけど反応してくれるのは、もともと図書館を利用していた子の方が多いわね」
line = "「だけど反応してくれるのは、もともと図書館を利用していた子の方が多いわね」"

[[dialogue]]
speaker = "ウィステリア"
# 「コハルコさんのデータだと、図書館の利用者は微減傾向。最近起きてる事件のせいもあるのかしら」
line = "「コハルコさんのデータだと、図書館の利用者は微減傾向。最近起きてる事件のせいもあるのかしら」"

[[dialogue]]
speaker = "モネ"
# 「やっぱり減っているんですね。薄々そんな気はしてましたけど……」
line = "「やっぱり減っているんですね。薄々そんな気はしてましたけど……」"

[[dialogue]]
speaker = "ウィステリア"
# 「ハッ──！　このままだと──」
line = "「ハッ──！　このままだと──」"

[[dialogue]]
speaker = "セイファート"
# 「図書館の利用者数だが、ここのところ低迷しているようだな」
line = "「図書館の利用者数だが、ここのところ低迷しているようだな」"

[[dialogue]]
speaker = "ウィステリア"
# 「えっと、それは……ほら、学生って遊びたい年頃ですし、星騎士の活動がありますから、読書する時間がとれないのかも……」
line = "「えっと、それは……ほら、学生って遊びたい年頃ですし、星騎士の活動がありますから、読書する時間がとれないのかも……」"

[[dialogue]]
speaker = "セイファート"
# 「原因はいい。問題は需要に対してこの図書館の人員が過剰であるということだ」
line = "「原因はいい。問題は需要に対してこの図書館の人員が過剰であるということだ」"

[[dialogue]]
speaker = "ウィステリア"
# 「えっ？」
line = "「えっ？」"

[[dialogue]]
speaker = "セイファート"
# 「リクリエの激化に伴い、我々は体制を最適化し、リソースを集中させねばならない」
line = "「リクリエの激化に伴い、我々は体制を最適化し、リソースを集中させねばならない」"

[[dialogue]]
speaker = "ウィステリア"
# 「つまり……？」
line = "「つまり……？」"

[[dialogue]]
speaker = "セイファート"
# 「君はクビだ」
line = "「君はクビだ」"

[[dialogue]]
speaker = "ウィステリア"
# 「えええ～～～～～っ！？」
line = "「えええ～～～～～っ！？」"

[[dialogue]]
speaker = "ウィステリア"
# （もし人を減らすことになれば、真っ先に切られるのは絶対運の悪い私だわ。最近は<b>あっち</b>の調査も捗ってないし……）
line = "（もし人を減らすことになれば、真っ先に切られるのは絶対運の悪い私だわ。最近は<b>あっち</b>の調査も捗ってないし……）"

[[dialogue]]
speaker = "ウィステリア"
# （この歳で２度目の失業なんてゴメンよ。それだけは回避しないと……！）
line = "（この歳で２度目の失業なんてゴメンよ。それだけは回避しないと……！）"

[[dialogue]]
speaker = "モネ"
# 「ウィステリアさん？」
line = "「ウィステリアさん？」"

[[dialogue]]
speaker = "ウィステリア"
# 「あっ、ううん、なんでもないわ」
line = "「あっ、ううん、なんでもないわ」"

[[dialogue]]
speaker = "ウィステリア"
# 「そうね、利用者が少なくなるなんて司書として見過ごせないわ。私もできる範囲で手伝うわよ」
line = "「そうね、利用者が少なくなるなんて司書として見過ごせないわ。私もできる範囲で手伝うわよ」"

[[dialogue]]
speaker = "モネ"
# 「はい、よろしくお願いします！」
line = "「はい、よろしくお願いします！」"
