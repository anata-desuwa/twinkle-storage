[[dialogue]]
speaker = "unk"
# 第４話,パテルと海デート,P
line = "第４話,パテルと海デート,P"

[[dialogue]]
speaker = "？？？"
# 「デーデンデーデンデーデン……」
line = "「デーデンデーデンデーデン……」"

[[dialogue]]
speaker = "パテル"
# 「シャーーッ！！」
line = "「シャーーッ！！」"

[[dialogue]]
speaker = "unk"
# わーーっ
line = "わーーっ"

[[dialogue]]
speaker = "パテル"
# 「アハハッ、驚き方がわざとらしいよ。サメに驚くならもっといい悲鳴を上げてくれなきゃ」
line = "「アハハッ、驚き方がわざとらしいよ。サメに驚くならもっといい悲鳴を上げてくれなきゃ」"

[[dialogue]]
speaker = "unk"
# 今日はリゾート結界でパテルとデートだ。
line = "今日はリゾート結界でパテルとデートだ。"

[[dialogue]]
speaker = "パテル"
# 「ねぇねぇ、デートしようよ～。え？　星徒会の仕事がある？」
line = "「ねぇねぇ、デートしようよ～。え？　星徒会の仕事がある？」"

[[dialogue]]
speaker = "パテル"
# 「え～、この前もそう言ってたじゃん。あたしからデートに誘ったらいつもこうだし」
line = "「え～、この前もそう言ってたじゃん。あたしからデートに誘ったらいつもこうだし」"

[[dialogue]]
speaker = "パテル"
# 「デート行きたい～っ。デートデートぉ～」
line = "「デート行きたい～っ。デートデートぉ～」"

[[dialogue]]
speaker = "unk"
# 運悪く仕事や用事が重なって我慢してもらっていたから、今日はうんと楽しませてあげたい。
line = "運悪く仕事や用事が重なって我慢してもらっていたから、今日はうんと楽しませてあげたい。"

[[dialogue]]
speaker = "パテル"
# 「あたしが脅かしたらちゃんと驚いてね。それじゃいくよ～……」
line = "「あたしが脅かしたらちゃんと驚いてね。それじゃいくよ～……」"

[[dialogue]]
speaker = "パテル"
# 「シャ～～～ッ！！」
line = "「シャ～～～ッ！！」"

[[dialogue]]
speaker = "unk"
# ぎゃぁあああっ！？
line = "ぎゃぁあああっ！？"

[[dialogue]]
speaker = "パテル"
# 「アハハハッ！　悲鳴が迫真すぎて逆に笑えてきちゃった。そうだよ、サメが相手ならそのくらいビビらないと♪」
line = "「アハハハッ！　悲鳴が迫真すぎて逆に笑えてきちゃった。そうだよ、サメが相手ならそのくらいビビらないと♪」"

[[dialogue]]
speaker = "パテル"
# 「ちょっと狭いけど、フカヒレくんに一緒に乗ろうよ。ほら、こっちこっち。魔王はあたしの後ろに乗ってね」
line = "「ちょっと狭いけど、フカヒレくんに一緒に乗ろうよ。ほら、こっちこっち。魔王はあたしの後ろに乗ってね」"

[[dialogue]]
speaker = "パテル"
# 「魔王、乗った？　ってそんなに離れてちゃダメじゃん。ほらほら、もっとくっつかないと振り落とされちゃうよ。デートなんだから、遠慮しちゃダ～メ♪」
line = "「魔王、乗った？　ってそんなに離れてちゃダメじゃん。ほらほら、もっとくっつかないと振り落とされちゃうよ。デートなんだから、遠慮しちゃダ～メ♪」"

[[dialogue]]
speaker = "パテル"
# 「あ～、もしかして魔王ってばエッチなこと考えてる？　くっつくだけでそんなこと考えるなんて、魔王ってばいやらしいんだ～」
line = "「あ～、もしかして魔王ってばエッチなこと考えてる？　くっつくだけでそんなこと考えるなんて、魔王ってばいやらしいんだ～」"

[[dialogue]]
speaker = "パテル"
# 「な～んてね♪　ほら、もっと近くに来て。でないとほんとに振り落としちゃうよ」
line = "「な～んてね♪　ほら、もっと近くに来て。でないとほんとに振り落としちゃうよ」"

[[dialogue]]
speaker = "パテル"
# 「それじゃフカヒレくん……」
line = "「それじゃフカヒレくん……」"

[[dialogue]]
speaker = "パテル"
# 「ゴーッ！」
line = "「ゴーッ！」"

[[dialogue]]
speaker = "パテル"
# 「いけ～っ、フカヒレくん！　七つの海を支配するのだーっ！　大海原の覇者となれ～っ！！」
line = "「いけ～っ、フカヒレくん！　七つの海を支配するのだーっ！　大海原の覇者となれ～っ！！」"

[[dialogue]]
speaker = "パテル"
# 「アハハッ、アハハハッ♪　サメに乗ってるだけなのに楽しいねっ。あなたと一緒だからかな」
line = "「アハハッ、アハハハッ♪　サメに乗ってるだけなのに楽しいねっ。あなたと一緒だからかな」"

[[dialogue]]
speaker = "パテル"
# 「あわわっ！？」
line = "「あわわっ！？」"

[[dialogue]]
speaker = "unk"
# パテル、大丈夫？
line = "パテル、大丈夫？"

[[dialogue]]
speaker = "パテル"
# 「シャーーーッ！！！」
line = "「シャーーーッ！！！」"

[[dialogue]]
speaker = "unk"
# うわあっ！？
line = "うわあっ！？"

[[dialogue]]
speaker = "パテル"
# 「アハハッ♪　ようやくちゃんと驚かせたね。あたしの勝ち～っ♪」
line = "「アハハッ♪　ようやくちゃんと驚かせたね。あたしの勝ち～っ♪」"

[[dialogue]]
speaker = "パテル"
# 「いや～、遊んだ遊んだ～。もう日も暮れてきちゃったね」
line = "「いや～、遊んだ遊んだ～。もう日も暮れてきちゃったね」"

[[dialogue]]
speaker = "パテル"
# 「今日はデートに連れてきてくれてありがとね、楽しかったよ。あと、わがまま言っちゃってごめん」
line = "「今日はデートに連れてきてくれてありがとね、楽しかったよ。あと、わがまま言っちゃってごめん」"

[[dialogue]]
speaker = "パテル"
# 「……デートしたいって言われるのは嬉しいから全然ＯＫ？　そっか、じゃあこれからもわがまま言うから、ちゃんと叶えてね」
line = "「……デートしたいって言われるのは嬉しいから全然ＯＫ？　そっか、じゃあこれからもわがまま言うから、ちゃんと叶えてね」"

[[dialogue]]
speaker = "パテル"
# 「でもいいの？　あたしと一緒にいて。他の女の子の方がよくない？」
line = "「でもいいの？　あたしと一緒にいて。他の女の子の方がよくない？」"

[[dialogue]]
speaker = "パテル"
# 「自分で言うのもなんだけど、あたしってめんどくさいし、かわいくないでしょ。死神トークしちゃうしさ」
line = "「自分で言うのもなんだけど、あたしってめんどくさいし、かわいくないでしょ。死神トークしちゃうしさ」"

[[dialogue]]
speaker = "パテル"
# 「守護天使は女神様に与えられた権能を核に作られている。つまり機能が先にあるんだよ。あたしの場合、『淘汰』の摂理が核だね」
line = "「守護天使は女神様に与えられた権能を核に作られている。つまり機能が先にあるんだよ。あたしの場合、『淘汰』の摂理が核だね」"

[[dialogue]]
speaker = "パテル"
# 「『淘汰』は世界の整理。そしてそれは『死』を意味する。あたしはどこまでいっても死神なんだよ」
line = "「『淘汰』は世界の整理。そしてそれは『死』を意味する。あたしはどこまでいっても死神なんだよ」"

[[dialogue]]
speaker = "パテル"
# 「あなたのことを特別だと思ってるけど、守護天使として特別扱いはしない。それを変えるつもりはないし、変えたいとも思わない」
line = "「あなたのことを特別だと思ってるけど、守護天使として特別扱いはしない。それを変えるつもりはないし、変えたいとも思わない」"

[[dialogue]]
speaker = "パテル"
# 「それでもいいの？」
line = "「それでもいいの？」"

[[dialogue]]
speaker = "unk"
# 俺はそんなところも含めてパテルが好きだから
line = "俺はそんなところも含めてパテルが好きだから"

[[dialogue]]
speaker = "パテル"
# 「そっか……えへへ♪　そう言ってくれると嬉しいな♪」
line = "「そっか……えへへ♪　そう言ってくれると嬉しいな♪」"

[[dialogue]]
speaker = "パテル"
# 「あたし、あなたのこと……」
line = "「あたし、あなたのこと……」"

[[dialogue]]
speaker = "unk"
# パテルがそっと顔を近づけてきて──
line = "パテルがそっと顔を近づけてきて──"

[[dialogue]]
speaker = "パテル"
# 「ふぅ～」
line = "「ふぅ～」"

[[dialogue]]
speaker = "unk"
# 耳に息がぁっ！？
line = "耳に息がぁっ！？"

[[dialogue]]
speaker = "パテル"
# 「アハハハッ♪　引っかかった引っかかった～♪　からかうと楽しいところも好きだよ♪」
line = "「アハハハッ♪　引っかかった引っかかった～♪　からかうと楽しいところも好きだよ♪」"

[[dialogue]]
speaker = "パテル"
# 「だけど──」
line = "「だけど──」"

[[dialogue]]
speaker = "パテル"
# 「ちゅっ<emoji=heart04>」
line = "「ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "パテル"
# 「あなたのことちゃんと好きだから、それもわかっていてね<emoji=heart04>」
line = "「あなたのことちゃんと好きだから、それもわかっていてね<emoji=heart04>」"
