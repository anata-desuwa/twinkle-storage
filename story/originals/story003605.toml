[[dialogue]]
speaker = "unk"
# シズハが『覚醒フォームになりたい』と宣言してから、１週間が経った。
line = "シズハが『覚醒フォームになりたい』と宣言してから、１週間が経った。"

[[dialogue]]
speaker = "シズハ"
# 「会長……もう１度、手合わせをお願い！」
line = "「会長……もう１度、手合わせをお願い！」"

[[dialogue]]
speaker = "unk"
# わかった――行くぞ！
line = "わかった――行くぞ！"

[[dialogue]]
speaker = "unk"
# 仮想結界システムで再現された『フィーニスの塔』の頂上――俺とシズハはそこで、戦闘訓練を行っていた。
line = "仮想結界システムで再現された『フィーニスの塔』の頂上――俺とシズハはそこで、戦闘訓練を行っていた。"

[[dialogue]]
speaker = "シズハ"
# 「よしっ……ディーちゃん、タイミングを合わせて、一緒に行くよ！」
line = "「よしっ……ディーちゃん、タイミングを合わせて、一緒に行くよ！」"

[[dialogue]]
speaker = "ディーラック"
# 「また？　はぁ……やれやれ」
line = "「また？　はぁ……やれやれ」"

[[dialogue]]
speaker = "unk"
# シズハと共に、ディーラックが連携して攻め込んでくる。
line = "シズハと共に、ディーラックが連携して攻め込んでくる。"

[[dialogue]]
speaker = "unk"
# １週間前――シズハが俺たちに相談してきた日。
line = "１週間前――シズハが俺たちに相談してきた日。"

[[dialogue]]
speaker = "シズハ"
# 「トレジアンナさん。次にエントロフィーちゃんが『反転のロストアイテム』を使ってきた時の為に……私、考えたことがあるの」
line = "「トレジアンナさん。次にエントロフィーちゃんが『反転のロストアイテム』を使ってきた時の為に……私、考えたことがあるの」"

[[dialogue]]
speaker = "シズハ"
# 「私の中の聖杯ちゃんが持っている魔力と、ディーちゃんの扱えるマイナスエネルギー」
line = "「私の中の聖杯ちゃんが持っている魔力と、ディーちゃんの扱えるマイナスエネルギー」"

[[dialogue]]
speaker = "シズハ"
# 「この２つの力を、サチちゃんの『フォルトゥーナフォーム』みたいに、『融合』して使えないかな？」
line = "「この２つの力を、サチちゃんの『フォルトゥーナフォーム』みたいに、『融合』して使えないかな？」"

[[dialogue]]
speaker = "ディーラック"
# 「は！？　いきなり何言い出してんのサ、シズハちゃん！」
line = "「は！？　いきなり何言い出してんのサ、シズハちゃん！」"

[[dialogue]]
speaker = "unk"
# 姿を透明化させて横で聞いていたらしいディーラックが、驚いて出てくる。
line = "姿を透明化させて横で聞いていたらしいディーラックが、驚いて出てくる。"

[[dialogue]]
speaker = "トレジアンナ"
# 「ふむ……魔力とマイナスエネルギーで融合反応が成立すれば、確かに『反転のロストアイテム』の効果を防ぐことができるかもしれません」
line = "「ふむ……魔力とマイナスエネルギーで融合反応が成立すれば、確かに『反転のロストアイテム』の効果を防ぐことができるかもしれません」"

[[dialogue]]
speaker = "トレジアンナ"
# 「実際にこの前、ディーラックさんはマイナスエネルギーのフィールドで、エントロフィーさんの接触を防いでいましたから」
line = "「実際にこの前、ディーラックさんはマイナスエネルギーのフィールドで、エントロフィーさんの接触を防いでいましたから」"

[[dialogue]]
speaker = "トレジアンナ"
# 「ですが……それが本当に可能かどうかは、マイナスエネルギーを使うことのできるディーラックさんにしかわかりません」
line = "「ですが……それが本当に可能かどうかは、マイナスエネルギーを使うことのできるディーラックさんにしかわかりません」"

[[dialogue]]
speaker = "ディーラック"
# 「……不可能ではないだろうね。マイナスエネルギーは計測されないエネルギーだ。魔力と干渉せず、両立はできる」
line = "「……不可能ではないだろうね。マイナスエネルギーは計測されないエネルギーだ。魔力と干渉せず、両立はできる」"

[[dialogue]]
speaker = "シズハ"
# 「じゃあ、行けるかもしれないってことだよね！」
line = "「じゃあ、行けるかもしれないってことだよね！」"

[[dialogue]]
speaker = "ディーラック"
# 「……問題はそこじゃない」
line = "「……問題はそこじゃない」"

[[dialogue]]
speaker = "ディーラック"
# 「魔力とマイナスエネルギーをかけ合わせるってことは、ボクとシズハちゃんが二人三脚するようなものサ。息が合わなきゃ、当然成立しない」
line = "「魔力とマイナスエネルギーをかけ合わせるってことは、ボクとシズハちゃんが二人三脚するようなものサ。息が合わなきゃ、当然成立しない」"

[[dialogue]]
speaker = "ディーラック"
# 「ボクには……それができるとは思えないよ」
line = "「ボクには……それができるとは思えないよ」"

[[dialogue]]
speaker = "シズハ"
# 「え？　どうして？　私とディーちゃんなら、できるよ！」
line = "「え？　どうして？　私とディーちゃんなら、できるよ！」"

[[dialogue]]
speaker = "シズハ"
# 「だって――私とディーちゃんは友達だもん♪」
line = "「だって――私とディーちゃんは友達だもん♪」"

[[dialogue]]
speaker = "ディーラック"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# そうして、ディーラックと精神をリンクさせる機能を組み込んだ、シズハのアップデート戦闘服が完成した。
line = "そうして、ディーラックと精神をリンクさせる機能を組み込んだ、シズハのアップデート戦闘服が完成した。"

[[dialogue]]
speaker = "unk"
# 見た目こそ変化はないが、これでディーラックと連携しての戦闘が可能になった――はずなのだが。
line = "見た目こそ変化はないが、これでディーラックと連携しての戦闘が可能になった――はずなのだが。"

[[dialogue]]
speaker = "シズハ"
# 「はぁ……はぁ……！」
line = "「はぁ……はぁ……！」"

[[dialogue]]
speaker = "ディーラック"
# 「……また失敗だね」
line = "「……また失敗だね」"

[[dialogue]]
speaker = "ディーラック"
# 「あのさ、シズハちゃん……やっぱり無理なんじゃない？　マイナスエネルギーの気配は、人間には感じ取れない」
line = "「あのさ、シズハちゃん……やっぱり無理なんじゃない？　マイナスエネルギーの気配は、人間には感じ取れない」"

[[dialogue]]
speaker = "シズハ"
# 「確かに、マイナスエネルギーの感覚は全然掴めないけど……ディーちゃんと心が繋がっているのはわかるから」
line = "「確かに、マイナスエネルギーの感覚は全然掴めないけど……ディーちゃんと心が繋がっているのはわかるから」"

[[dialogue]]
speaker = "シズハ"
# 「会長、どう？　『アルケインコード』の輝きは、見える？」
line = "「会長、どう？　『アルケインコード』の輝きは、見える？」"

[[dialogue]]
speaker = "unk"
# いや……まだだ
line = "いや……まだだ"

[[dialogue]]
speaker = "unk"
# トレジアンナさんによってシズハの戦闘服に組み込まれた、覚醒フォームに変身時の動力源となる『融合反応炉心』。
line = "トレジアンナさんによってシズハの戦闘服に組み込まれた、覚醒フォームに変身時の動力源となる『融合反応炉心』。"

[[dialogue]]
speaker = "unk"
# それはサチのフォルトゥーナフォームの時と同じく、俺が使う魔王の力――アルケインコードの使用が、最後の起動条件となっていた。
line = "それはサチのフォルトゥーナフォームの時と同じく、俺が使う魔王の力――アルケインコードの使用が、最後の起動条件となっていた。"

[[dialogue]]
speaker = "ディーラック"
# 「……ボクとの連携も、会長との絆も、上手くいく保証なんてどこにもないのに……」
line = "「……ボクとの連携も、会長との絆も、上手くいく保証なんてどこにもないのに……」"

[[dialogue]]
speaker = "ディーラック"
# 「シズハちゃんさ……本当にできると思ってんの？」
line = "「シズハちゃんさ……本当にできると思ってんの？」"

[[dialogue]]
speaker = "ディーラック"
# 「ボクたちの間にもまるで『絆』があるみたいに言うけどサ、ボクはこの前まで、キミたちと敵対していたんだよ？」
line = "「ボクたちの間にもまるで『絆』があるみたいに言うけどサ、ボクはこの前まで、キミたちと敵対していたんだよ？」"

[[dialogue]]
speaker = "シズハ"
# 「でも……それは私の中の聖杯を直す為で、ディーちゃんは私の命を助けてくれたでしょ？」
line = "「でも……それは私の中の聖杯を直す為で、ディーちゃんは私の命を助けてくれたでしょ？」"

[[dialogue]]
speaker = "シズハ"
# 「今だって、寮の部屋で一緒に暮らしてるわけだし……」
line = "「今だって、寮の部屋で一緒に暮らしてるわけだし……」"

[[dialogue]]
speaker = "シズハ"
# 「だから、私はディーちゃんのことを信じるよ」
line = "「だから、私はディーちゃんのことを信じるよ」"

[[dialogue]]
speaker = "ディーラック"
# 「あのサ、前も言ったけど……あれは牛とか、豚とか、そういう利用価値のある『家畜』が病気になったから、治そうと思ったって理屈」
line = "「あのサ、前も言ったけど……あれは牛とか、豚とか、そういう利用価値のある『家畜』が病気になったから、治そうと思ったって理屈」"

[[dialogue]]
speaker = "ディーラック"
# 「わかってる？　ボクがシズハちゃんを見る目と、キミがボクを見る目とは、決して同じじゃないって言ってるんだよ？」
line = "「わかってる？　ボクがシズハちゃんを見る目と、キミがボクを見る目とは、決して同じじゃないって言ってるんだよ？」"

[[dialogue]]
speaker = "シズハ"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "ディーラック"
# 「ボクには……キミたちが言うような『愛』だとか、『友情』だとか、『絆』なんてものは、よくわからない」
line = "「ボクには……キミたちが言うような『愛』だとか、『友情』だとか、『絆』なんてものは、よくわからない」"

[[dialogue]]
speaker = "ディーラック"
# 「だってボクは――キミたちとは体だけじゃなく、<b>精神構造</b>が異なるエネルギー生命体なんだから」
line = "「だってボクは――キミたちとは体だけじゃなく、<b>精神構造</b>が異なるエネルギー生命体なんだから」"

[[dialogue]]
speaker = "シズハ"
# 「ディーちゃん……」
line = "「ディーちゃん……」"

[[dialogue]]
speaker = "ディーラック"
# 「ふん……」
line = "「ふん……」"

[[dialogue]]
speaker = "unk"
# そう言って、ディーラックはフイッとシズハから視線を逸らすのだった。
line = "そう言って、ディーラックはフイッとシズハから視線を逸らすのだった。"

[[dialogue]]
speaker = "unk"
# 一方、その頃。
line = "一方、その頃。"

[[dialogue]]
speaker = "unk"
# 仮想空間の『遊園地』フィールドでは、サチとプリムラが訓練中だった。
line = "仮想空間の『遊園地』フィールドでは、サチとプリムラが訓練中だった。"

[[dialogue]]
speaker = "サチ"
# 「ふぅ……プリムラ、今のはどうだった？」
line = "「ふぅ……プリムラ、今のはどうだった？」"

[[dialogue]]
speaker = "プリムラ"
# 「ふん、まだまだじゃな！　しかし――」
line = "「ふん、まだまだじゃな！　しかし――」"

[[dialogue]]
speaker = "トレジアンナ"
# 「お２人共、１５分経過しましたよ～！」
line = "「お２人共、１５分経過しましたよ～！」"

[[dialogue]]
speaker = "サチ"
# 「あっ、はい！　暴走しないように、一旦クールダウンに入ります」
line = "「あっ、はい！　暴走しないように、一旦クールダウンに入ります」"

[[dialogue]]
speaker = "プリムラ"
# 「なんじゃ、もう経過したのか？　仕方あるまい」
line = "「なんじゃ、もう経過したのか？　仕方あるまい」"

[[dialogue]]
speaker = "エントロフィー"
# 「いやはや、さすがアネさんたちっすね～♪　力が反転させられた状態でも、変身して戦えるようになるなんて～！」
line = "「いやはや、さすがアネさんたちっすね～♪　力が反転させられた状態でも、変身して戦えるようになるなんて～！」"

[[dialogue]]
speaker = "エントロフィー"
# 「あっ、差し入れでスポーツドリンク持ってきました～♪　はい、トレジアンナのアネさんもどうぞ♪」
line = "「あっ、差し入れでスポーツドリンク持ってきました～♪　はい、トレジアンナのアネさんもどうぞ♪」"

[[dialogue]]
speaker = "トレジアンナ"
# 「おっ、私もいいんですか？　ありがとうございます～♪」
line = "「おっ、私もいいんですか？　ありがとうございます～♪」"

[[dialogue]]
speaker = "サチ"
# 「って、トレジアンナさん、ストップスト～ップ！　タッチしちゃダメです～っ！！」
line = "「って、トレジアンナさん、ストップスト～ップ！　タッチしちゃダメです～っ！！」"

[[dialogue]]
speaker = "プリムラ"
# 「そいつは敵じゃ！！」
line = "「そいつは敵じゃ！！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「――ハッ！？　危うく、私も力を反転させられるところでした！」
line = "「――ハッ！？　危うく、私も力を反転させられるところでした！」"

[[dialogue]]
speaker = "エントロフィー"
# 「ありゃりゃ、しれっとタッチしたかったんすけど、作戦失敗っす～☆」
line = "「ありゃりゃ、しれっとタッチしたかったんすけど、作戦失敗っす～☆」"

[[dialogue]]
speaker = "プリムラ"
# 「貴様、何しに来たのじゃ！？」
line = "「貴様、何しに来たのじゃ！？」"

[[dialogue]]
speaker = "エントロフィー"
# 「ふふっ♪　そりゃもちろん、お２人があれからどうなったか、様子を拝見させてもらいに来たんすよ～♪」
line = "「ふふっ♪　そりゃもちろん、お２人があれからどうなったか、様子を拝見させてもらいに来たんすよ～♪」"

[[dialogue]]
speaker = "サチ"
# 「エントロフィーさん！　私たちにかけた『反転のロストアイテム』の能力を解除して下さい！」
line = "「エントロフィーさん！　私たちにかけた『反転のロストアイテム』の能力を解除して下さい！」"

[[dialogue]]
speaker = "エントロフィー"
# 「いや～、それは残念ながら、まだできないっすね～」
line = "「いや～、それは残念ながら、まだできないっすね～」"

[[dialogue]]
speaker = "エントロフィー"
# 「だって、このまま大人しく解除とか――そんなの全然面白くないでしょ？」
line = "「だって、このまま大人しく解除とか――そんなの全然面白くないでしょ？」"

[[dialogue]]
speaker = "プリムラ"
# 「ふざけおって……なら、やはり力づくで、ロストアイテムを回収するしかないようじゃな！」
line = "「ふざけおって……なら、やはり力づくで、ロストアイテムを回収するしかないようじゃな！」"

[[dialogue]]
speaker = "エントロフィーL"
# 「きゃはははっ☆　当然、そういう展開になるっすよね～♪　では――」
line = "「きゃはははっ☆　当然、そういう展開になるっすよね～♪　では――」"

[[dialogue]]
speaker = "エントロフィーL"
# 「反転したアネさんたちの力、見せてもらいましょうかね！」
line = "「反転したアネさんたちの力、見せてもらいましょうかね！」"

[[dialogue]]
speaker = "unk"
# 体から目に見える程のマイナスエネルギーのオーラを立ち昇らせるエントロフィー。
line = "体から目に見える程のマイナスエネルギーのオーラを立ち昇らせるエントロフィー。"

[[dialogue]]
speaker = "トレジアンナ"
# 「お２人共、気を付けて下さい！　マイナスビーストであるエントロフィーさんのエネルギー総量は、ディーラックさんと同じく、桁違いですよ！」
line = "「お２人共、気を付けて下さい！　マイナスビーストであるエントロフィーさんのエネルギー総量は、ディーラックさんと同じく、桁違いですよ！」"

[[dialogue]]
speaker = "サチ"
# 「はい！　行きます！」
line = "「はい！　行きます！」"

[[dialogue]]
speaker = "プリムラ"
# 「我らの訓練の成果、見せてやるのじゃ！」
line = "「我らの訓練の成果、見せてやるのじゃ！」"

[[dialogue]]
speaker = "unk"
# サチとプリムラは構えて、エントロフィーと戦闘を開始するのだった。
line = "サチとプリムラは構えて、エントロフィーと戦闘を開始するのだった。"
