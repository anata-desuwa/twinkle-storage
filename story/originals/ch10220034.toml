[[dialogue]]
speaker = "unk"
# 第４話,あなたと紡ぐ物語,P
line = "第４話,あなたと紡ぐ物語,P"

[[dialogue]]
speaker = "unk"
# 今日は、以前約束していたモネとのデートの日だ。
line = "今日は、以前約束していたモネとのデートの日だ。"

[[dialogue]]
speaker = "unk"
# 漫画が原作の実写映画を一緒に見たのだが──
line = "漫画が原作の実写映画を一緒に見たのだが──"

[[dialogue]]
speaker = "モネ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "モネ"
# 「あ、すみません……映画、とても面白かったと思い、ます…………ごめんなさい」
line = "「あ、すみません……映画、とても面白かったと思い、ます…………ごめんなさい」"

[[dialogue]]
speaker = "unk"
# 何かあった？
line = "何かあった？"

[[dialogue]]
speaker = "モネ"
# 「ああいや、それは……」
line = "「ああいや、それは……」"

[[dialogue]]
speaker = "モネ"
# 「……はい、ありました」
line = "「……はい、ありました」"

[[dialogue]]
speaker = "モネ"
# 「応募していた小説賞の結果通知が、昨日来たんです。それが頭を離れなくて……」
line = "「応募していた小説賞の結果通知が、昨日来たんです。それが頭を離れなくて……」"

[[dialogue]]
speaker = "モネ"
# 「選評結果は……『佳作』でした」
line = "「選評結果は……『佳作』でした」"

[[dialogue]]
speaker = "モネ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# 残念だった？
line = "残念だった？"

[[dialogue]]
speaker = "unk"
# 嬉しい？
line = "嬉しい？"

[[dialogue]]
speaker = "モネ"
# 「……自分でも初めてのことで、戸惑ってます」
line = "「……自分でも初めてのことで、戸惑ってます」"

[[dialogue]]
speaker = "モネ"
# 「今までも何度か応募して、一番いい結果で、本当なら嬉しいはずなんです」
line = "「今までも何度か応募して、一番いい結果で、本当なら嬉しいはずなんです」"

[[dialogue]]
speaker = "モネ"
# 「でも、悔しくて……悔しくてたまらないんです」
line = "「でも、悔しくて……悔しくてたまらないんです」"

[[dialogue]]
speaker = "モネ"
# 「ウィステリアさんやリィベルさんにも応援してもらったのに…………ううん、違う」
line = "「ウィステリアさんやリィベルさんにも応援してもらったのに…………ううん、違う」"

[[dialogue]]
speaker = "モネ"
# 「私の書いたものは最高だったはずなのに、それが認められないのが、悔しいんです」
line = "「私の書いたものは最高だったはずなのに、それが認められないのが、悔しいんです」"

[[dialogue]]
speaker = "モネ"
# 「あはは……私、本当はこんなに傲慢だったんですね。ロクサーナ先輩の言う通りです」
line = "「あはは……私、本当はこんなに傲慢だったんですね。ロクサーナ先輩の言う通りです」"

[[dialogue]]
speaker = "unk"
# 審査員は見る目がないな
line = "審査員は見る目がないな"

[[dialogue]]
speaker = "モネ"
# 「そこまで言いますか！？　さすが魔王様、私に負けない傲慢さですね……」
line = "「そこまで言いますか！？　さすが魔王様、私に負けない傲慢さですね……」"

[[dialogue]]
speaker = "モネ"
# 「でも、そのくらいでいいのかもしれません。研鑽は大事ですけど、『理解しない方が悪い』くらいの傲慢さは、時にはあってもいいのかも」
line = "「でも、そのくらいでいいのかもしれません。研鑽は大事ですけど、『理解しない方が悪い』くらいの傲慢さは、時にはあってもいいのかも」"

[[dialogue]]
speaker = "モネ"
# 「そうでないと、作品を世に出す意味がありませんから。やっぱり傲慢は作家の<ruby=さが>性</ruby>なんですね」
line = "「そうでないと、作品を世に出す意味がありませんから。やっぱり傲慢は作家の<ruby>性<rt>さが</rt></ruby>なんですね」"

[[dialogue]]
speaker = "unk"
# だけど──
line = "だけど──"

[[dialogue]]
speaker = "モネ"
# 「モネが大作家になっても、最初のファンも、一番のファンも譲らない……？」
line = "「モネが大作家になっても、最初のファンも、一番のファンも譲らない……？」"

[[dialogue]]
speaker = "モネ"
# 「ふふふ、そうでした。私が書いた小説を最初に読んでくれたのは会長でしたね」
line = "「ふふふ、そうでした。私が書いた小説を最初に読んでくれたのは会長でしたね」"

[[dialogue]]
speaker = "モネ"
# 「はい。もし私が有名な作家になって、賞を取りまくって、ベストセラーを連発しても、一番のファンは会長ですよ」
line = "「はい。もし私が有名な作家になって、賞を取りまくって、ベストセラーを連発しても、一番のファンは会長ですよ」"

[[dialogue]]
speaker = "モネ"
# 「ちなみにそれは、彼氏としての独占欲もあります……？」
line = "「ちなみにそれは、彼氏としての独占欲もあります……？」"

[[dialogue]]
speaker = "unk"
# もちろんそれもある！
line = "もちろんそれもある！"

[[dialogue]]
speaker = "モネ"
# 「でも嬉しい……えへへ……」
line = "「でも嬉しい……えへへ……」"

[[dialogue]]
speaker = "モネ"
# 「──モンスター！」
line = "「──モンスター！」"

[[dialogue]]
speaker = "モネ"
# 「ここから近いですね。行きましょう！」
line = "「ここから近いですね。行きましょう！」"

[[dialogue]]
speaker = "モンスター"
# 「イーーッ！」
line = "「イーーッ！」"

[[dialogue]]
speaker = "モネ"
# 「モンスターいました！　ヴァースオブフェネクス！」
line = "「モンスターいました！　ヴァースオブフェネクス！」"

[[dialogue]]
speaker = "モンスター"
# 「イ～～……」
line = "「イ～～……」"

[[dialogue]]
speaker = "モネ"
# 「私もプリマステラになりましたから、これくらいできます。私も強くなりました」
line = "「私もプリマステラになりましたから、これくらいできます。私も強くなりました」"

[[dialogue]]
speaker = "モンスター"
# 「グルルルルッ！」
line = "「グルルルルッ！」"

[[dialogue]]
speaker = "モネ"
# 「！　機械型モンスターまで……！」
line = "「！　機械型モンスターまで……！」"

[[dialogue]]
speaker = "モネ"
# 「機械型モンスターは非常に頑健な体と、高い攻撃力を持ち、プリマステラでも太刀打ちできない相手でした」
line = "「機械型モンスターは非常に頑健な体と、高い攻撃力を持ち、プリマステラでも太刀打ちできない相手でした」"

[[dialogue]]
speaker = "モネ"
# 「ですが──」
line = "「ですが──」"

[[dialogue]]
speaker = "モネ（覚醒）"
# 「今の私なら倒せます！」
line = "「今の私なら倒せます！」"

[[dialogue]]
speaker = "モネ（覚醒）"
# 「跪け──ルシファーアセンション！！」
line = "「跪け──ルシファーアセンション！！」"

[[dialogue]]
speaker = "モンスター"
# 「ガアァ……！」
line = "「ガアァ……！」"

[[dialogue]]
speaker = "モネ（覚醒）"
# 「ああ、ああ……っ！　会長、大変です！」
line = "「ああ、ああ……っ！　会長、大変です！」"

[[dialogue]]
speaker = "unk"
# どうしたの！？　怪我でもした！？
line = "どうしたの！？　怪我でもした！？"

[[dialogue]]
speaker = "モネ（覚醒）"
# 「ちち、違うんです！　会長と一緒にモンスターを倒したら、文章があふれ出てきて……今すぐ帰って書き留めないとっ！」
line = "「ちち、違うんです！　会長と一緒にモンスターを倒したら、文章があふれ出てきて……今すぐ帰って書き留めないとっ！」"

[[dialogue]]
speaker = "モネ（覚醒）"
# 「ああいや、帰ってからじゃ間に合わない！　メモメモ……」
line = "「ああいや、帰ってからじゃ間に合わない！　メモメモ……」"

[[dialogue]]
speaker = "モネ（覚醒）"
# 「……ふぅ、とりあえず書き留めました。寮に帰ったらまた改めて文章にします」
line = "「……ふぅ、とりあえず書き留めました。寮に帰ったらまた改めて文章にします」"

[[dialogue]]
speaker = "モネ（覚醒）"
# 「今回の悔しさを、私はずっと忘れないでしょう。でもそれはそれとして、物語を書き続けます」
line = "「今回の悔しさを、私はずっと忘れないでしょう。でもそれはそれとして、物語を書き続けます」"

[[dialogue]]
speaker = "モネ（覚醒）"
# 「だって、私は賞が欲しくて小説を書いたんじゃないですから。もちろん、もらえれば嬉しいですけど、書きたくて、書かずにはいられないから書くんです」
line = "「だって、私は賞が欲しくて小説を書いたんじゃないですから。もちろん、もらえれば嬉しいですけど、書きたくて、書かずにはいられないから書くんです」"

[[dialogue]]
speaker = "モネ（覚醒）"
# 「そして、私が書いた<ruby=本>小説</ruby>が、いつか誰かの友達になってくれたら嬉しいです」
line = "「そして、私が書いた<ruby>小説<rt>本</rt></ruby>が、いつか誰かの友達になってくれたら嬉しいです」"

[[dialogue]]
speaker = "unk"
# 次はどんな話を書くの？
line = "次はどんな話を書くの？"

[[dialogue]]
speaker = "モネ（覚醒）"
# 「それはもちろん、どんな絶望的な状況でも諦めない、終焉に立ち向かう<ruby=スターナイツ>星騎士</ruby>の物語です！」
line = "「それはもちろん、どんな絶望的な状況でも諦めない、終焉に立ち向かう<ruby>星騎士<rt>スターナイツ</rt></ruby>の物語です！」"

[[dialogue]]
speaker = "unk"
# モネの瞳がキラキラと輝く。きっと、彼女以外に誰にも書けない物語が生まれるだろう。
line = "モネの瞳がキラキラと輝く。きっと、彼女以外に誰にも書けない物語が生まれるだろう。"

[[dialogue]]
speaker = "unk"
# モネの恋人としてファンとして、それが楽しみで仕方ない。
line = "モネの恋人としてファンとして、それが楽しみで仕方ない。"
