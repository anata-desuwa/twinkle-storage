[[dialogue]]
speaker = "unk"
# 第２話,アムたちのお出かけ,P
line = "第２話,アムたちのお出かけ,P"

[[dialogue]]
speaker = "unk"
# アムとナミエルの二人三脚生活が無事に終わった、クリスマスの後日。
line = "アムとナミエルの二人三脚生活が無事に終わった、クリスマスの後日。"

[[dialogue]]
speaker = "unk"
# ２人は週末の休日に、街へ出かけることになった。
line = "２人は週末の休日に、街へ出かけることになった。"

[[dialogue]]
speaker = "アム"
# 「ふんふん、ふふふ～ん♪　いや～、ナミエルとのお出かけ、楽しみにしてたんだよね～」
line = "「ふんふん、ふふふ～ん♪　いや～、ナミエルとのお出かけ、楽しみにしてたんだよね～」"

[[dialogue]]
speaker = "ナミエル"
# 「ただの外出で、そこまでテンション上がらなくても……」
line = "「ただの外出で、そこまでテンション上がらなくても……」"

[[dialogue]]
speaker = "アム"
# 「えっ、だって、ナミエルともっと仲良くなることができる日じゃん？　そりゃワクワクしてきちゃうよ～」
line = "「えっ、だって、ナミエルともっと仲良くなることができる日じゃん？　そりゃワクワクしてきちゃうよ～」"

[[dialogue]]
speaker = "ナミエル"
# 「仲良くって……アム先輩はやはり『陽キャ』ですね。そういうことを何気なくさらっと言っちゃうんですから……」
line = "「仲良くって……アム先輩はやはり『陽キャ』ですね。そういうことを何気なくさらっと言っちゃうんですから……」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「私も本日のお出かけは、とても楽しみにしておりましたわ♪」
line = "「私も本日のお出かけは、とても楽しみにしておりましたわ♪」"

[[dialogue]]
speaker = "unk"
# そう――今回のお出かけにはなんと、附属校３年生でアムのクラスメイトであるエルデリーゼも同行していた。
line = "そう――今回のお出かけにはなんと、附属校３年生でアムのクラスメイトであるエルデリーゼも同行していた。"

[[dialogue]]
speaker = "エルデリーゼ"
# 「ナミエル様、先輩後輩として更に親睦を深められるよう、本日はこの前のお泊り会の時みたいに、楽しい１日に致しましょうね♪」
line = "「ナミエル様、先輩後輩として更に親睦を深められるよう、本日はこの前のお泊り会の時みたいに、楽しい１日に致しましょうね♪」"

[[dialogue]]
speaker = "ナミエル"
# 「はい、エルゼ先輩。私も楽しみにしていました。本日はよろしくお願いします」
line = "「はい、エルゼ先輩。私も楽しみにしていました。本日はよろしくお願いします」"

[[dialogue]]
speaker = "アム"
# 「あたしに対する態度と、なんか微妙に温度差ない！？」
line = "「あたしに対する態度と、なんか微妙に温度差ない！？」"

[[dialogue]]
speaker = "unk"
# そうして、エルデリーゼを含めた３人で、街を歩くことになったアム達。
line = "そうして、エルデリーゼを含めた３人で、街を歩くことになったアム達。"

[[dialogue]]
speaker = "アム"
# 「あっ、２人共、見てこれ！　この服、めっちゃカッコよくない！？」
line = "「あっ、２人共、見てこれ！　この服、めっちゃカッコよくない！？」"

[[dialogue]]
speaker = "unk"
# ウィンドウショッピングをしている途中で服屋に入った際、アムが足を止めて言った。
line = "ウィンドウショッピングをしている途中で服屋に入った際、アムが足を止めて言った。"

[[dialogue]]
speaker = "ナミエル"
# 「えっ、この黒いコートですか……？　なんかその……微妙に『ダサい』気が……」
line = "「えっ、この黒いコートですか……？　なんかその……微妙に『ダサい』気が……」"

[[dialogue]]
speaker = "アム"
# 「ダサい！？」
line = "「ダサい！？」"

[[dialogue]]
speaker = "ナミエル"
# 「すみません、ダサいは言い過ぎました。個人的にあまり良さが分からないファッションというか……」
line = "「すみません、ダサいは言い過ぎました。個人的にあまり良さが分からないファッションというか……」"

[[dialogue]]
speaker = "unk"
# ナミエルが思わずダサいと言ってしまったその服は――いわゆる『思春期の男子』が喜びそうな雰囲気の、アニメや漫画に登場しそうな漆黒のロングコートであった。
line = "ナミエルが思わずダサいと言ってしまったその服は――いわゆる『思春期の男子』が喜びそうな雰囲気の、アニメや漫画に登場しそうな漆黒のロングコートであった。"

[[dialogue]]
speaker = "エルデリーゼ"
# 「大丈夫ですわ、ナミエル様。私もアムの服装のセンスについては、前から同じようにズレていると感じていましたもの」
line = "「大丈夫ですわ、ナミエル様。私もアムの服装のセンスについては、前から同じようにズレていると感じていましたもの」"

[[dialogue]]
speaker = "アム"
# 「ズレてる！？　いや、待って？　２人は女の子らしく可愛い系の服が好みかもしれないけども！　あたしはカッコいい系が好みってだけだし……！」
line = "「ズレてる！？　いや、待って？　２人は女の子らしく可愛い系の服が好みかもしれないけども！　あたしはカッコいい系が好みってだけだし……！」"

[[dialogue]]
speaker = "アム"
# 「ほら、このところどころ穴が開いてる感じがカッコよくない……！？　ダメージジーンズってあるじゃん？　あれと同じ感じで……！」
line = "「ほら、このところどころ穴が開いてる感じがカッコよくない……！？　ダメージジーンズってあるじゃん？　あれと同じ感じで……！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「――アム。現在は会長と異性として、お付き合いされているのですわよね？」
line = "「――アム。現在は会長と異性として、お付き合いされているのですわよね？」"

[[dialogue]]
speaker = "アム"
# 「え？　う、うん……そうだけど？」
line = "「え？　う、うん……そうだけど？」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「こんな意味不明に穴が開きまくったコートをもしデートに着ていったら――フラれますわよ？」
line = "「こんな意味不明に穴が開きまくったコートをもしデートに着ていったら――フラれますわよ？」"

[[dialogue]]
speaker = "アム"
# 「そこまで！？　いや、会長はコート１つがダサかったくらいで、フったりなんかしないはず……！」
line = "「そこまで！？　いや、会長はコート１つがダサかったくらいで、フったりなんかしないはず……！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「正直、『お芋っぽい』香りが致しますわ」
line = "「正直、『お芋っぽい』香りが致しますわ」"

[[dialogue]]
speaker = "アム"
# 「お芋！？」
line = "「お芋！？」"

[[dialogue]]
speaker = "ナミエル"
# 「……なんだか、アム先輩が普段どんな私服を着ているのか、気になってきました。……家ではジャージとかですか？」
line = "「……なんだか、アム先輩が普段どんな私服を着ているのか、気になってきました。……家ではジャージとかですか？」"

[[dialogue]]
speaker = "アム"
# 「芋ジャージってこと！？　変なイメージするのやめて！　違うから！　あたし、家ではちゃんと別の私服を着てるからっ！」
line = "「芋ジャージってこと！？　変なイメージするのやめて！　違うから！　あたし、家ではちゃんと別の私服を着てるからっ！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「ちなみに、私服のバリエーションはこんな感じですわ♪　ほら、１つだけじゃなくて、沢山ありますのよ。え～っと、ＤＩＳＣで写真を見る操作は確か……」
line = "「ちなみに、私服のバリエーションはこんな感じですわ♪　ほら、１つだけじゃなくて、沢山ありますのよ。え～っと、ＤＩＳＣで写真を見る操作は確か……」"

[[dialogue]]
speaker = "unk"
# そう言って、エルデリーゼはたどたどしい手つきでＤＩＳＣを操作し、アムが私服を着ている写真を開く。それから指でスライドさせ、いくつも見せていく。
line = "そう言って、エルデリーゼはたどたどしい手つきでＤＩＳＣを操作し、アムが私服を着ている写真を開く。それから指でスライドさせ、いくつも見せていく。"

[[dialogue]]
speaker = "ナミエル"
# 「え？　私服のアム先輩、いつもより女の子らしくて可愛い……！」
line = "「え？　私服のアム先輩、いつもより女の子らしくて可愛い……！」"

[[dialogue]]
speaker = "アム"
# 「ちょっ！？　エルゼ、勝手に見せないでよ！　恥ずかしいじゃん！」
line = "「ちょっ！？　エルゼ、勝手に見せないでよ！　恥ずかしいじゃん！」"

[[dialogue]]
speaker = "ナミエル"
# 「ですが、どうしてエルゼ先輩がこんなに写真を……？」
line = "「ですが、どうしてエルゼ先輩がこんなに写真を……？」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「ふふっ、実はアムの私服……私がこうして一緒に出かけた時に、毎回選んで差し上げておりますのよ♪」
line = "「ふふっ、実はアムの私服……私がこうして一緒に出かけた時に、毎回選んで差し上げておりますのよ♪」"

[[dialogue]]
speaker = "アム"
# 「だって～、エルゼが毎度毎度、あたしがカッコいいの選ぼうとすると、断固阻止してくるから……」
line = "「だって～、エルゼが毎度毎度、あたしがカッコいいの選ぼうとすると、断固阻止してくるから……」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「アムってば、放っておくと全然可愛くない服を買おうとするんですもの！　ライバルとして見過ごせませんわ！」
line = "「アムってば、放っておくと全然可愛くない服を買おうとするんですもの！　ライバルとして見過ごせませんわ！」"

[[dialogue]]
speaker = "アム"
# 「くぅっ……！　あたしはただ、女として大人っぽくてカッコいいファッションをしたいだけなのに……！」
line = "「くぅっ……！　あたしはただ、女として大人っぽくてカッコいいファッションをしたいだけなのに……！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「アムの言う『カッコいい』は、お子様っぽいのですわ！」
line = "「アムの言う『カッコいい』は、お子様っぽいのですわ！」"

[[dialogue]]
speaker = "アム"
# 「子供っぽくないし！」
line = "「子供っぽくないし！」"

[[dialogue]]
speaker = "ナミエル"
# 「子供みたいに頬を膨らませてて可愛い……」
line = "「子供みたいに頬を膨らませてて可愛い……」"

[[dialogue]]
speaker = "アム"
# 「ナミエル、誰が可愛いって！？　むぅ～！　こうなったら――」
line = "「ナミエル、誰が可愛いって！？　むぅ～！　こうなったら――」"

[[dialogue]]
speaker = "アム"
# 「この中で誰が一番カッコいい私服コーデを選べるか、勝負だよ！」
line = "「この中で誰が一番カッコいい私服コーデを選べるか、勝負だよ！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「面白そうですわね♪　『可愛い』ではなく、『カッコいい』の基準で私服を選ぶのは、私、初めてですわ。ふふっ♪」
line = "「面白そうですわね♪　『可愛い』ではなく、『カッコいい』の基準で私服を選ぶのは、私、初めてですわ。ふふっ♪」"

[[dialogue]]
speaker = "unk"
# その後。
line = "その後。"

[[dialogue]]
speaker = "アム"
# 「ま、負けたぁぁぁーーーっ！！！」
line = "「ま、負けたぁぁぁーーーっ！！！」"

[[dialogue]]
speaker = "ナミエル"
# 「おみそれしました。これは完全に、エルゼ先輩の勝ちですね」
line = "「おみそれしました。これは完全に、エルゼ先輩の勝ちですね」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「ふふふっ♪　ファッションセンスでは、アムには決して負けませんわよ♪」
line = "「ふふふっ♪　ファッションセンスでは、アムには決して負けませんわよ♪」"

[[dialogue]]
speaker = "アム"
# 「くうぅ～～っ！　あたしだってそのうち絶対、エルゼがカッコいいと唸るコーデを見せてやるんだからぁ～～っ！！」
line = "「くうぅ～～っ！　あたしだってそのうち絶対、エルゼがカッコいいと唸るコーデを見せてやるんだからぁ～～っ！！」"

[[dialogue]]
speaker = "unk"
# こうして、ファッションでもいつかエルゼに勝つと誓うアムなのであった。
line = "こうして、ファッションでもいつかエルゼに勝つと誓うアムなのであった。"
