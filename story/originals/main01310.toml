[[dialogue]]
speaker = "unk"
# 第１１話,ある一人の渡し守,B
line = "第１１話,ある一人の渡し守,B"

[[dialogue]]
speaker = "unk"
# 旧森羅暦末期──
line = "旧森羅暦末期──"

[[dialogue]]
speaker = "unk"
# 世界は厄災に見舞われ、人々は英雄を求めていた。
line = "世界は厄災に見舞われ、人々は英雄を求めていた。"

[[dialogue]]
speaker = "unk"
# これは、そんな時代を生きた、一人の男の物語である。
line = "これは、そんな時代を生きた、一人の男の物語である。"

[[dialogue]]
speaker = "unk"
# 世界には滅亡の機が迫っていた。
line = "世界には滅亡の機が迫っていた。"

[[dialogue]]
speaker = "unk"
# セレーネ流星群──そう称された流れ星の雨が地上へと降り注ぎ、数多のアステライトが地上を埋め尽くした。
line = "セレーネ流星群──そう称された流れ星の雨が地上へと降り注ぎ、数多のアステライトが地上を埋め尽くした。"

[[dialogue]]
speaker = "unk"
# 当時の人類はみな、それが再創生の機先であることを知らない。
line = "当時の人類はみな、それが再創生の機先であることを知らない。"

[[dialogue]]
speaker = "unk"
# 魔王──リクリエ──スターナイト──そんな単語は世のどこにも存在していなかった。
line = "魔王──リクリエ──スターナイト──そんな単語は世のどこにも存在していなかった。"

[[dialogue]]
speaker = "unk"
# ただ、住む世界にかつてない危機が訪れていることは理解していた。
line = "ただ、住む世界にかつてない危機が訪れていることは理解していた。"

[[dialogue]]
speaker = "unk"
# だからこそ、人は、時代は、英雄を求めていた。
line = "だからこそ、人は、時代は、英雄を求めていた。"

[[dialogue]]
speaker = "unk"
# なれば──後に『英雄』と称されることになる<b>彼</b>は、最初から英雄的な人物だったのだろうか？
line = "なれば──後に『英雄』と称されることになる<b>彼</b>は、最初から英雄的な人物だったのだろうか？"

[[dialogue]]
speaker = "unk"
# 答えは否だ。
line = "答えは否だ。"

[[dialogue]]
speaker = "unk"
# 人間界に住まう青年だったラクシスもまた、どこかに英雄を切望する一人だった。
line = "人間界に住まう青年だったラクシスもまた、どこかに英雄を切望する一人だった。"

[[dialogue]]
speaker = "unk"
# 彼は<ruby=ラーゴ・シエロ>鏡界の湖</ruby>の<ruby=わた>渡</ruby>し<ruby=もり>守</ruby>として生活していた。
line = "彼は<ruby>鏡界の湖<rt>ラーゴ・シエロ</rt></ruby>の<ruby>渡<rt>わた</rt></ruby>し<ruby>守<rt>もり</rt></ruby>として生活していた。"

[[dialogue]]
speaker = "unk"
# 三界を繋ぐ支点において、多くの種族がせわしなく行き交うのを見た。
line = "三界を繋ぐ支点において、多くの種族がせわしなく行き交うのを見た。"

[[dialogue]]
speaker = "unk"
# 「どこかに、この世界を救ってくれる誰かがいないものだろうか」
line = "「どこかに、この世界を救ってくれる誰かがいないものだろうか」"

[[dialogue]]
speaker = "unk"
# 度重なる天災により青年は家族を失っていた。
line = "度重なる天災により青年は家族を失っていた。"

[[dialogue]]
speaker = "unk"
# そんな彼の希求は、やがて予期せぬ形で実現することになる。
line = "そんな彼の希求は、やがて予期せぬ形で実現することになる。"

[[dialogue]]
speaker = "unk"
# ある日──彼は鏡界の湖に<ruby=おぼ>溺</ruby>れてしまった。
line = "ある日──彼は鏡界の湖に<ruby>溺<rt>おぼ</rt></ruby>れてしまった。"

[[dialogue]]
speaker = "unk"
# 決して生身で落ちてはいけない。意図しなかったこととはいえ、そんな禁忌を破る行いだった。
line = "決して生身で落ちてはいけない。意図しなかったこととはいえ、そんな禁忌を破る行いだった。"

[[dialogue]]
speaker = "unk"
# 彼は死を覚悟した。
line = "彼は死を覚悟した。"

[[dialogue]]
speaker = "unk"
# 溺れて死ぬか、あるいは幸運に三界のいずこかへ放り出されたとしても、無事で済むはずがないと思った。
line = "溺れて死ぬか、あるいは幸運に三界のいずこかへ放り出されたとしても、無事で済むはずがないと思った。"

[[dialogue]]
speaker = "unk"
# だが、彼を待ち受けていたのは物語よりも数奇な運命だった。
line = "だが、彼を待ち受けていたのは物語よりも数奇な運命だった。"

[[dialogue]]
speaker = "unk"
# 彼が導かれたのは──三界のどこでもない全くの<ruby=マルチバース>異次元宇宙</ruby>。
line = "彼が導かれたのは──三界のどこでもない全くの<ruby>異次元宇宙<rt>マルチバース</rt></ruby>。"

[[dialogue]]
speaker = "unk"
# そこは、名を流星町といった。
line = "そこは、名を流星町といった。"
