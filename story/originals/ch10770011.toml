[[dialogue]]
speaker = "unk"
# 第１話,２人のメイド長,P
line = "第１話,２人のメイド長,P"

[[dialogue]]
speaker = "unk"
# バレンタインが過ぎてしばらく経った、ある日の昼休み。カフェテリアに行くと、２人のメイドが一緒に昼食をしているのを見かけた。
line = "バレンタインが過ぎてしばらく経った、ある日の昼休み。カフェテリアに行くと、２人のメイドが一緒に昼食をしているのを見かけた。"

[[dialogue]]
speaker = "蘭美"
# 「あら、会長。ごきげんよう。貴方も昼食かしら？」
line = "「あら、会長。ごきげんよう。貴方も昼食かしら？」"

[[dialogue]]
speaker = "unk"
# 彼女は『<ruby=はねみや>羽宮</ruby>　<ruby=らび>蘭美</ruby>』。九浄家メイド隊の中でも最年少でありながら、卓越したメイドスキルによってメイド長を務める天才少女である。
line = "彼女は『<ruby>羽宮<rt>はねみや</rt></ruby>　<ruby>蘭美<rt>らび</rt></ruby>』。九浄家メイド隊の中でも最年少でありながら、卓越したメイドスキルによってメイド長を務める天才少女である。"

[[dialogue]]
speaker = "unk"
# 星騎士としても優れた才能を持ち、本来なら流星学園附属校の２年生に当たる年齢だが、特別に飛び級を認められ、現在は新星学園３年生のクラスに所属している。
line = "星騎士としても優れた才能を持ち、本来なら流星学園附属校の２年生に当たる年齢だが、特別に飛び級を認められ、現在は新星学園３年生のクラスに所属している。"

[[dialogue]]
speaker = "unk"
# 彼女とは、この前のバレンタインの出来事で親交を深め、最近はよく顔を合わせるようになった。
line = "彼女とは、この前のバレンタインの出来事で親交を深め、最近はよく顔を合わせるようになった。"

[[dialogue]]
speaker = "蘭美"
# 「お昼を食べにきたのなら、同席してもいいわよ。――会長は貴方の弟子だそうだし、構わないわよね？　<ruby=こうづき>上月</ruby>キリカ」
line = "「お昼を食べにきたのなら、同席してもいいわよ。――会長は貴方の弟子だそうだし、構わないわよね？　<ruby>上月<rt>こうづき</rt></ruby>キリカ」"

[[dialogue]]
speaker = "キリカ"
# 「はい、私は構いません。ごきげんよう、緋宮会長。よろしければ、こちらの席にどうぞ」
line = "「はい、私は構いません。ごきげんよう、緋宮会長。よろしければ、こちらの席にどうぞ」"

[[dialogue]]
speaker = "unk"
# ありがとうございます、師匠
line = "ありがとうございます、師匠"

[[dialogue]]
speaker = "unk"
# 上月キリカ師匠は、星見家メイド隊のメイド長だ。俺は彼女に弟子入りをして、定期的に格闘術を指導してもらっていた。
line = "上月キリカ師匠は、星見家メイド隊のメイド長だ。俺は彼女に弟子入りをして、定期的に格闘術を指導してもらっていた。"

[[dialogue]]
speaker = "蘭美"
# 「ふふっ、会長、この飛び級天才美少女である私と同席できること、光栄に思いなさい♪」
line = "「ふふっ、会長、この飛び級天才美少女である私と同席できること、光栄に思いなさい♪」"

[[dialogue]]
speaker = "蘭美"
# 「って、どうしたの？　――私と上月キリカが同席していることが意外？」
line = "「って、どうしたの？　――私と上月キリカが同席していることが意外？」"

[[dialogue]]
speaker = "蘭美"
# 「なるほど。確かに、九浄家メイド隊と星見家メイド隊のメンバーは、お互いに対抗心を見せていたりするしね」
line = "「なるほど。確かに、九浄家メイド隊と星見家メイド隊のメンバーは、お互いに対抗心を見せていたりするしね」"

[[dialogue]]
speaker = "キリカ"
# 「……元はと言えば、羽宮様が私をライバル視していることが原因で、関係がこじれ始めた感じがしますが」
line = "「……元はと言えば、羽宮様が私をライバル視していることが原因で、関係がこじれ始めた感じがしますが」"

[[dialogue]]
speaker = "蘭美"
# 「まあ、私が上月キリカに対抗心を燃やしているのは、その通りよ。会長には前に、『メイド・オブ・メイド』の話をしたでしょう？」
line = "「まあ、私が上月キリカに対抗心を燃やしているのは、その通りよ。会長には前に、『メイド・オブ・メイド』の話をしたでしょう？」"

[[dialogue]]
speaker = "蘭美"
# 「そう、通称『<ruby=エム>M</ruby>・<ruby=オー>Ｏ</ruby>・<ruby=エム>Ｍ</ruby>』。３年に１度開催されて、メイドスキルを競う世界大会のことよ」
line = "「そう、通称『<ruby>M<rt>エム</rt></ruby>・<ruby>Ｏ<rt>オー</rt></ruby>・<ruby>Ｍ<rt>エム</rt></ruby>』。３年に１度開催されて、メイドスキルを競う世界大会のことよ」"

[[dialogue]]
speaker = "蘭美"
# 「私は２年前、そこで歴代最年少の記録で、世界第２位の座を手に入れたわ。そして――」
line = "「私は２年前、そこで歴代最年少の記録で、世界第２位の座を手に入れたわ。そして――」"

[[dialogue]]
speaker = "蘭美"
# 「その時に優勝して、世界第１位のメイド、『マスターメイド』の称号を手に入れたのが、上月キリカなのよ」
line = "「その時に優勝して、世界第１位のメイド、『マスターメイド』の称号を手に入れたのが、上月キリカなのよ」"

[[dialogue]]
speaker = "unk"
# そうだったのか……！
line = "そうだったのか……！"

[[dialogue]]
speaker = "キリカ"
# 「わざわざ自分が世界第１位だと、言いふらして回ることでもないので……」
line = "「わざわざ自分が世界第１位だと、言いふらして回ることでもないので……」"

[[dialogue]]
speaker = "蘭美"
# 「あら、肩書きを隠さず名乗ることも、一種の礼儀じゃないかしら？」
line = "「あら、肩書きを隠さず名乗ることも、一種の礼儀じゃないかしら？」"

[[dialogue]]
speaker = "キリカ"
# 「私には星見家のメイド長という肩書きがありますから。それさえあれば、十分です」
line = "「私には星見家のメイド長という肩書きがありますから。それさえあれば、十分です」"

[[dialogue]]
speaker = "蘭美"
# 「真面目ね。でも、メイド・オブ・メイドには出場していたじゃない」
line = "「真面目ね。でも、メイド・オブ・メイドには出場していたじゃない」"

[[dialogue]]
speaker = "キリカ"
# 「それは、星見家メイド隊の伝統のようなものです。メイド長は代々、メイド・オブ・メイドに出場してきましたから」
line = "「それは、星見家メイド隊の伝統のようなものです。メイド長は代々、メイド・オブ・メイドに出場してきましたから」"

[[dialogue]]
speaker = "蘭美"
# 「ふふっ、伝統だから、ね。私の実家のメイド長も、最初はそうだったって言っていたわ」
line = "「ふふっ、伝統だから、ね。私の実家のメイド長も、最初はそうだったって言っていたわ」"

[[dialogue]]
speaker = "キリカ"
# 「あの人が……？」
line = "「あの人が……？」"

[[dialogue]]
speaker = "unk"
# 蘭美の実家のメイド長って……？
line = "蘭美の実家のメイド長って……？"

[[dialogue]]
speaker = "蘭美"
# 「上月キリカも面識がある人よ。なにせ、その人は、星見家の２代前のメイド長を務めていたんだもの」
line = "「上月キリカも面識がある人よ。なにせ、その人は、星見家の２代前のメイド長を務めていたんだもの」"

[[dialogue]]
speaker = "キリカ"
# 「先代がマリオンさんで、それより更に前……私が幼い頃に、メイドとしての指導をして下さった方です」
line = "「先代がマリオンさんで、それより更に前……私が幼い頃に、メイドとしての指導をして下さった方です」"

[[dialogue]]
speaker = "蘭美"
# 「私も実家でその人に弟子入りして、鍛えてもらったのよ」
line = "「私も実家でその人に弟子入りして、鍛えてもらったのよ」"

[[dialogue]]
speaker = "蘭美"
# 「メイド長は、かつてメイド・オブ・メイドで３回連続優勝を果たして殿堂入りし、『グランドマスターメイド』の称号を持つに至った、正真正銘、世界最高のメイドなの」
line = "「メイド長は、かつてメイド・オブ・メイドで３回連続優勝を果たして殿堂入りし、『グランドマスターメイド』の称号を持つに至った、正真正銘、世界最高のメイドなの」"

[[dialogue]]
speaker = "蘭美"
# 「彼女は、世界トップレベルのメイドたちと切磋琢磨する中で、世界一であることに誇りを持つようになったと言っていたわ」
line = "「彼女は、世界トップレベルのメイドたちと切磋琢磨する中で、世界一であることに誇りを持つようになったと言っていたわ」"

[[dialogue]]
speaker = "蘭美"
# 「だから、次の大会では……」
line = "「だから、次の大会では……」"

[[dialogue]]
speaker = "蘭美"
# 「この私が、上月キリカ――貴方を負かして、『悔しいから次も出場する』って必ず言わせてあげるわ！」
line = "「この私が、上月キリカ――貴方を負かして、『悔しいから次も出場する』って必ず言わせてあげるわ！」"

[[dialogue]]
speaker = "蘭美"
# 「というか、私が年上の貴方に対して、ライバルとしてタメ口で話しているんだから、そろそろ貴方も、敬語は止めてくれてもいいと思うんだけど？」
line = "「というか、私が年上の貴方に対して、ライバルとしてタメ口で話しているんだから、そろそろ貴方も、敬語は止めてくれてもいいと思うんだけど？」"

[[dialogue]]
speaker = "キリカ"
# 「羽宮様は対等な相手ですから」
line = "「羽宮様は対等な相手ですから」"

[[dialogue]]
speaker = "キリカ"
# 「私は同じメイド長として、礼節を持って接しているだけです」
line = "「私は同じメイド長として、礼節を持って接しているだけです」"

[[dialogue]]
speaker = "蘭美"
# 「……！　言うじゃない。対等ね……ふふっ。真面目な貴方らしいけれど……」
line = "「……！　言うじゃない。対等ね……ふふっ。真面目な貴方らしいけれど……」"

[[dialogue]]
speaker = "unk"
# と、そこで俺はふと気づく。
line = "と、そこで俺はふと気づく。"

[[dialogue]]
speaker = "蘭美"
# 「ん？　なにかしら、会長？」
line = "「ん？　なにかしら、会長？」"

[[dialogue]]
speaker = "蘭美"
# 「――私と上月キリカが、同じ人から学んだ？　ええ、そうね。実家のメイド長に……」
line = "「――私と上月キリカが、同じ人から学んだ？　ええ、そうね。実家のメイド長に……」"

[[dialogue]]
speaker = "unk"
# それって、姉妹弟子ってことじゃない？
line = "それって、姉妹弟子ってことじゃない？"

[[dialogue]]
speaker = "蘭美"
# 「あ……言われてみれば……！」
line = "「あ……言われてみれば……！」"

[[dialogue]]
speaker = "キリカ"
# 「妹弟子……。ふっ……ふふっ……」
line = "「妹弟子……。ふっ……ふふっ……」"

[[dialogue]]
speaker = "蘭美"
# 「な、なに？　貴方がそんな笑い方するの、初めてみたわ」
line = "「な、なに？　貴方がそんな笑い方するの、初めてみたわ」"

[[dialogue]]
speaker = "キリカ"
# 「いえ、すみません。こうして指摘されるまで、全く気づいていなかったことに面白くなってしまって……」
line = "「いえ、すみません。こうして指摘されるまで、全く気づいていなかったことに面白くなってしまって……」"

[[dialogue]]
speaker = "キリカ"
# 「同門で、妹弟子ならそうですね。これからはもう少し仲良くしましょう、<b>蘭美</b>」
line = "「同門で、妹弟子ならそうですね。これからはもう少し仲良くしましょう、<b>蘭美</b>」"

[[dialogue]]
speaker = "蘭美"
# 「……！　な、なによ、急に……言っとくけど、姉弟子でもライバルなのは忘れないでよね、<b>キリカ</b>」
line = "「……！　な、なによ、急に……言っとくけど、姉弟子でもライバルなのは忘れないでよね、<b>キリカ</b>」"

[[dialogue]]
speaker = "unk"
# 蘭美はちょっと照れ臭そうな顔をしながらも、下の名前で呼び返すのだった――
line = "蘭美はちょっと照れ臭そうな顔をしながらも、下の名前で呼び返すのだった――"
