[[dialogue]]
speaker = "unk"
# 魔界への守護天使救出作戦も完了し──
line = "魔界への守護天使救出作戦も完了し──"

[[dialogue]]
speaker = "unk"
# 季節は初夏。
line = "季節は初夏。"

[[dialogue]]
speaker = "マハムート"
# 「……ふぅ」
line = "「……ふぅ」"

[[dialogue]]
speaker = "unk"
# 新星学園３年生、妃竜院マハムートは、水着姿でひと足早いバカンスを楽しんでいた。
line = "新星学園３年生、妃竜院マハムートは、水着姿でひと足早いバカンスを楽しんでいた。"

[[dialogue]]
speaker = "unk"
# 彼女は、魔界の竜の一族『妃竜院家』の次期当主であり、新星学園の学生寮『ラルーナ』の寮長を務めている。
line = "彼女は、魔界の竜の一族『妃竜院家』の次期当主であり、新星学園の学生寮『ラルーナ』の寮長を務めている。"

[[dialogue]]
speaker = "unk"
# ヴィーナスと並ぶ学園最強クラスの星騎士として畏怖を集めると同時に、寮生達からは寮母のように慕われる存在だ。
line = "ヴィーナスと並ぶ学園最強クラスの星騎士として畏怖を集めると同時に、寮生達からは寮母のように慕われる存在だ。"

[[dialogue]]
speaker = "マハムート"
# 「平和ね……。悪くないわ」
line = "「平和ね……。悪くないわ」"

[[dialogue]]
speaker = "unk"
# 彼女はビーチチェアーに優雅に腰かけ、海のさざ波に耳を澄ます。
line = "彼女はビーチチェアーに優雅に腰かけ、海のさざ波に耳を澄ます。"

[[dialogue]]
speaker = "unk"
# ここは、『リゾート結界』のビーチ。
line = "ここは、『リゾート結界』のビーチ。"

[[dialogue]]
speaker = "unk"
# 学園の敷地内から繋がっている、とある天使の星術によって生み出された常夏の異空間である。
line = "学園の敷地内から繋がっている、とある天使の星術によって生み出された常夏の異空間である。"

[[dialogue]]
speaker = "リップル"
# 「ヘイ、マム！　ジュースお待ちドウでーす♪」
line = "「ヘイ、マム！　ジュースお待ちドウでーす♪」"

[[dialogue]]
speaker = "マハムート"
# 「あら、ありがとう。気が利くじゃない」
line = "「あら、ありがとう。気が利くじゃない」"

[[dialogue]]
speaker = "リップル"
# 「エヘヘ、アリガタキお言葉！　ワタシも新星寮の寮生ですから、マムに尽くすのは当然のコトでーす♪」
line = "「エヘヘ、アリガタキお言葉！　ワタシも新星寮の寮生ですから、マムに尽くすのは当然のコトでーす♪」"

[[dialogue]]
speaker = "マハムート"
# 「ふふっ、いい心がけね、リップル」
line = "「ふふっ、いい心がけね、リップル」"

[[dialogue]]
speaker = "unk"
# 彼女は新星学園２年生、リップル。
line = "彼女は新星学園２年生、リップル。"

[[dialogue]]
speaker = "unk"
# 以前、クロト達が無人島へサバイバル合宿に出かけた際に出会い、学園へと迎え入れた天使だ。
line = "以前、クロト達が無人島へサバイバル合宿に出かけた際に出会い、学園へと迎え入れた天使だ。"

[[dialogue]]
speaker = "unk"
# そして他でもない、このリゾート結界を生み出した張本人である。
line = "そして他でもない、このリゾート結界を生み出した張本人である。"

[[dialogue]]
speaker = "マハムート"
# 「あら……？」
line = "「あら……？」"

[[dialogue]]
speaker = "マトイ"
# 「お、お休みのところ失礼します！」
line = "「お、お休みのところ失礼します！」"

[[dialogue]]
speaker = "リップル"
# 「マトイ！　それに、カイチョー！　ヘイ、ラッシャーセー♪　リゾート結界へようこそでーす♪」
line = "「マトイ！　それに、カイチョー！　ヘイ、ラッシャーセー♪　リゾート結界へようこそでーす♪」"

[[dialogue]]
speaker = "unk"
# こんにちは、リップル
line = "こんにちは、リップル"

[[dialogue]]
speaker = "マハムート"
# 「どうしたの、２人共？　私に何か用かしら？」
line = "「どうしたの、２人共？　私に何か用かしら？」"

[[dialogue]]
speaker = "unk"
# 実はマトイから、マムに相談があるらしくて
line = "実はマトイから、マムに相談があるらしくて"

[[dialogue]]
speaker = "マハムート"
# 「相談……？」
line = "「相談……？」"

[[dialogue]]
speaker = "マトイ"
# 「ま、マム！」
line = "「ま、マム！」"

[[dialogue]]
speaker = "unk"
# すると、マトイはその場でいきなり土下座をして――
line = "すると、マトイはその場でいきなり土下座をして――"

[[dialogue]]
speaker = "マトイ"
# 「私を弟子にして下さいっ！！！」
line = "「私を弟子にして下さいっ！！！」"

[[dialogue]]
speaker = "リップル"
# 「ワオ！　ジャパニーズ・ドゲザ！！！」
line = "「ワオ！　ジャパニーズ・ドゲザ！！！」"

[[dialogue]]
speaker = "マハムート"
# 「は？　するわけないでしょ」
line = "「は？　するわけないでしょ」"

[[dialogue]]
speaker = "マトイ"
# 「即答！？」
line = "「即答！？」"

[[dialogue]]
speaker = "マハムート"
# 「というか、なんで急にそんなことを頼みにきたのかしら？」
line = "「というか、なんで急にそんなことを頼みにきたのかしら？」"

[[dialogue]]
speaker = "マトイ"
# 「それは……」
line = "「それは……」"

[[dialogue]]
speaker = "マトイ"
# 「私が、星徒会メンバーの中で……最も弱いからです」
line = "「私が、星徒会メンバーの中で……最も弱いからです」"

[[dialogue]]
speaker = "マトイ"
# （あの時――リクリエとの決戦での無力感は、決して忘れることができない）
line = "（あの時――リクリエとの決戦での無力感は、決して忘れることができない）"

[[dialogue]]
speaker = "マトイ"
# （圧倒的なリクリエの力を纏ったアポロちゃん）
line = "（圧倒的なリクリエの力を纏ったアポロちゃん）"

[[dialogue]]
speaker = "マトイ"
# （そして、その後に現れた『リクリエの化身』）
line = "（そして、その後に現れた『リクリエの化身』）"

[[dialogue]]
speaker = "魔神ギエル"
# 「──マクロ・ノヴァ・ブラスト──」
line = "「──マクロ・ノヴァ・ブラスト──」"

[[dialogue]]
speaker = "unk"
# ぐ──おおおおおおおおッッッ！！
line = "ぐ──おおおおおおおおッッッ！！"

[[dialogue]]
speaker = "マトイ"
# 「会長────ッ！！！」
line = "「会長────ッ！！！」"

[[dialogue]]
speaker = "マトイ"
# （私はただ、見ていることしかできなかった。星徒会の盾役だったはずなのに、会長を守ることができなかった……）
line = "（私はただ、見ていることしかできなかった。星徒会の盾役だったはずなのに、会長を守ることができなかった……）"

[[dialogue]]
speaker = "マトイ"
# （どうしようもなく弱くて、普通の存在だった――）
line = "（どうしようもなく弱くて、普通の存在だった――）"

[[dialogue]]
speaker = "マトイ"
# 「――それと、最近出没しているっていう、新種のモンスターの件もありますし……」
line = "「――それと、最近出没しているっていう、新種のモンスターの件もありますし……」"

[[dialogue]]
speaker = "マハムート"
# 「ああ、今まで見たことのないような、異質な姿をしているっていう噂のやつね」
line = "「ああ、今まで見たことのないような、異質な姿をしているっていう噂のやつね」"

[[dialogue]]
speaker = "マハムート"
# 「流星寮の生徒たちが苦戦してたところにヒルディオーネが駆け付けて、何とか倒したって話を聞いたけれど……」
line = "「流星寮の生徒たちが苦戦してたところにヒルディオーネが駆け付けて、何とか倒したって話を聞いたけれど……」"

[[dialogue]]
speaker = "マトイ"
# 「リクリエを会長が抑え込んだことで、モンスターの出現頻度は減っていました」
line = "「リクリエを会長が抑え込んだことで、モンスターの出現頻度は減っていました」"

[[dialogue]]
speaker = "マトイ"
# 「でも、何故かまた、新種のモンスターが現れるようになった。だとしたら――」
line = "「でも、何故かまた、新種のモンスターが現れるようになった。だとしたら――」"

[[dialogue]]
speaker = "マトイ"
# 「アポロちゃんとは別の、新たな『リクリエの使徒』が現れるかもしれない」
line = "「アポロちゃんとは別の、新たな『リクリエの使徒』が現れるかもしれない」"

[[dialogue]]
speaker = "マハムート"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "マトイ"
# 「そうなった時の為にも、私……もっと強くなりたいんです！」
line = "「そうなった時の為にも、私……もっと強くなりたいんです！」"

[[dialogue]]
speaker = "マハムート"
# 「なるほどね」
line = "「なるほどね」"

[[dialogue]]
speaker = "unk"
# と、その時だった。
line = "と、その時だった。"

[[dialogue]]
speaker = "アム"
# 「マム！　おはようございまーすっ！」
line = "「マム！　おはようございまーすっ！」"

[[dialogue]]
speaker = "アム"
# 「今日も水着フォームのご指導、よろしくお願いします！　……って、会長と、マトイ先輩？」
line = "「今日も水着フォームのご指導、よろしくお願いします！　……って、会長と、マトイ先輩？」"

[[dialogue]]
speaker = "マトイ"
# 「流星学園附属校の、アムちゃん……？」
line = "「流星学園附属校の、アムちゃん……？」"

[[dialogue]]
speaker = "unk"
# ２人の盾使いは互いに顔を見合わせるのだった――
line = "２人の盾使いは互いに顔を見合わせるのだった――"
