[[dialogue]]
speaker = "unk"
# 俺たちは創造神『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』の核を砕き、地球ごと破壊しようとする暴挙を阻止した。
line = "俺たちは創造神『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』の核を砕き、地球ごと破壊しようとする暴挙を阻止した。"

[[dialogue]]
speaker = "unk"
# そして、『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』が次元の裂け目を通じてデネブを撤退した後──
line = "そして、『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』が次元の裂け目を通じてデネブを撤退した後──"

[[dialogue]]
speaker = "ルヴィネ"
# 「ふぅ……ようやく一息つくことができるわね」
line = "「ふぅ……ようやく一息つくことができるわね」"

[[dialogue]]
speaker = "クロト"
# 「ああ、何とかなって良かった」
line = "「ああ、何とかなって良かった」"

[[dialogue]]
speaker = "unk"
# ルヴィネと極星従騎によるアルタイル襲撃。
line = "ルヴィネと極星従騎によるアルタイル襲撃。"

[[dialogue]]
speaker = "unk"
# ホロウ・ルヴィネとディザスターハンドの出現。
line = "ホロウ・ルヴィネとディザスターハンドの出現。"

[[dialogue]]
speaker = "unk"
# そして創造神『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』との戦い。
line = "そして創造神『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』との戦い。"

[[dialogue]]
speaker = "unk"
# 世界を揺るがすような出来事が、今日１日で数えきれないほど起きた。
line = "世界を揺るがすような出来事が、今日１日で数えきれないほど起きた。"

[[dialogue]]
speaker = "unk"
# まさに激動の連続だった。
line = "まさに激動の連続だった。"

[[dialogue]]
speaker = "ルヴィネ"
# 「今のうちにこちらも態勢を立て直しましょう。被害の把握も必要だわ。でも今更だけど──」
line = "「今のうちにこちらも態勢を立て直しましょう。被害の把握も必要だわ。でも今更だけど──」"

[[dialogue]]
speaker = "ルヴィネ"
# 「どうしてあなたがここいるのかしら、煌嶺？」
line = "「どうしてあなたがここいるのかしら、煌嶺？」"

[[dialogue]]
speaker = "unk"
# ルヴィネが冷たい視線を向けると、九尾の女帝は不敵な笑みを浮かべる。
line = "ルヴィネが冷たい視線を向けると、九尾の女帝は不敵な笑みを浮かべる。"

[[dialogue]]
speaker = "煌嶺"
# 「どうしてか、だと？　フッ、質問の意図がわかりかねるな」
line = "「どうしてか、だと？　フッ、質問の意図がわかりかねるな」"

[[dialogue]]
speaker = "ルヴィネ"
# 「欲するままに全てを奪う暴君・煌嶺──その悪名はデネブの魔界でも有名だったわ」
line = "「欲するままに全てを奪う暴君・煌嶺──その悪名はデネブの魔界でも有名だったわ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「アルタイルのあなたも本質は同じ。そんなあなたが世界を守るために戦うなんて思えないのだけど」
line = "「アルタイルのあなたも本質は同じ。そんなあなたが世界を守るために戦うなんて思えないのだけど」"

[[dialogue]]
speaker = "煌嶺"
# 「それは貴様も同じことだろう。貴様は創造神が生み出した、新たな女神のなり損ない」
line = "「それは貴様も同じことだろう。貴様は創造神が生み出した、新たな女神のなり損ない」"

[[dialogue]]
speaker = "煌嶺"
# 「それが反旗を翻し、共に創造神を討とうというのなら……貴様こそ釈明が必要なのではないか？」
line = "「それが反旗を翻し、共に創造神を討とうというのなら……貴様こそ釈明が必要なのではないか？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "煌嶺"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# ルヴィネと煌嶺が視線で火花を散らす。
line = "ルヴィネと煌嶺が視線で火花を散らす。"

[[dialogue]]
speaker = "unk"
# 衝突されると困るのだが、確かに今同じ陣営にいるのが不思議な２人でもある。
line = "衝突されると困るのだが、確かに今同じ陣営にいるのが不思議な２人でもある。"

[[dialogue]]
speaker = "unk"
# どうして２人が今ここにいるかというと──
line = "どうして２人が今ここにいるかというと──"
