[[dialogue]]
speaker = "unk"
# 第４話,フレグランスな恋人,P
line = "第４話,フレグランスな恋人,P"

[[dialogue]]
speaker = "unk"
# 今日は星徒会の仕事はオフ。
line = "今日は星徒会の仕事はオフ。"

[[dialogue]]
speaker = "unk"
# せっかくの休日ということもあり、俺はルリエルを自宅に招いて、家デートを楽しむことにした。
line = "せっかくの休日ということもあり、俺はルリエルを自宅に招いて、家デートを楽しむことにした。"

[[dialogue]]
speaker = "ルリエル"
# 「お紅茶、おまちどおさま、なのです～♪　熱いので気を付けてくださいね？」
line = "「お紅茶、おまちどおさま、なのです～♪　熱いので気を付けてくださいね？」"

[[dialogue]]
speaker = "unk"
# 悪いね、お客さんに淹れさせちゃって
line = "悪いね、お客さんに淹れさせちゃって"

[[dialogue]]
speaker = "ルリエル"
# 「いえいえ！　会長さんのお家にも、もう何度もお邪魔してますし。こうやって彼氏さんにお茶を淹れるのも楽しいですから♪」
line = "「いえいえ！　会長さんのお家にも、もう何度もお邪魔してますし。こうやって彼氏さんにお茶を淹れるのも楽しいですから♪」"

[[dialogue]]
speaker = "ルリエル"
# 「お砂糖やミルクの量もばっちりなのです～。一緒にのんびり、くつろぎましょう～<emoji=heart04>」
line = "「お砂糖やミルクの量もばっちりなのです～。一緒にのんびり、くつろぎましょう～<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
# 「は～……甘くておいしいのです～<emoji=heart04>」
line = "「は～……甘くておいしいのです～<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
# 「ねえ会長さん。ステラさんやラファエロさんは、今どうしてるんでしょうか？」
line = "「ねえ会長さん。ステラさんやラファエロさんは、今どうしてるんでしょうか？」"

[[dialogue]]
speaker = "ルリエル"
# 「お２人とも、ルリエルたちの世界を楽しんでいましたけれど……元の世界に大切な人がいるみたいでした」
line = "「お２人とも、ルリエルたちの世界を楽しんでいましたけれど……元の世界に大切な人がいるみたいでした」"

[[dialogue]]
speaker = "ルリエル"
# 「たまに、ちょっぴりだけ寂しそうなお顔、してましたから」
line = "「たまに、ちょっぴりだけ寂しそうなお顔、してましたから」"

[[dialogue]]
speaker = "unk"
# ラファエロは『館長』だったな
line = "ラファエロは『館長』だったな"

[[dialogue]]
speaker = "unk"
# ステラは『団長さん』で……
line = "ステラは『団長さん』で……"

[[dialogue]]
speaker = "ルリエル"
# 「はい。やっぱり仲良しの人と離ればなれなのは寂しいことなのです……きっと再会できてますよね？」
line = "「はい。やっぱり仲良しの人と離ればなれなのは寂しいことなのです……きっと再会できてますよね？」"

[[dialogue]]
speaker = "unk"
# 心配いらないよ
line = "心配いらないよ"

[[dialogue]]
speaker = "unk"
# フィオナやヴィーナスは無事帰ってきた
line = "フィオナやヴィーナスは無事帰ってきた"

[[dialogue]]
speaker = "ルリエル"
# 「えへへ、そうですよね♪　せっかく仲良しになれた人たちだったので、ちょっぴり気になっちゃって」
line = "「えへへ、そうですよね♪　せっかく仲良しになれた人たちだったので、ちょっぴり気になっちゃって」"

[[dialogue]]
speaker = "unk"
# イチャイチャしてるかもしれない
line = "イチャイチャしてるかもしれない"

[[dialogue]]
speaker = "unk"
# むしろ今頃、俺たちに負けないくらい
line = "むしろ今頃、俺たちに負けないくらい"

[[dialogue]]
speaker = "ルリエル"
# 「えへへ♪　だったらルリエルたちも負けてられません！　イチャイチャしましょう、会長さん<emoji=heart04>」
line = "「えへへ♪　だったらルリエルたちも負けてられません！　イチャイチャしましょう、会長さん<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
# 「ふふ～、ルリエルの膝枕、どうぞなのです～<emoji=heart04>」
line = "「ふふ～、ルリエルの膝枕、どうぞなのです～<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
# 「ん～、しょっ……と<emoji=heart04>　どこかにお出かけもいいですけど、こうやってのんびりするのも、ルリエル大好きなのです～<emoji=heart04>」
line = "「ん～、しょっ……と<emoji=heart04>　どこかにお出かけもいいですけど、こうやってのんびりするのも、ルリエル大好きなのです～<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
# 「会長さん、いつもお疲れ様なのです。頑張り屋の会長さんには、恋人の膝枕でのんびりできる権利をプレゼントですよー？」
line = "「会長さん、いつもお疲れ様なのです。頑張り屋の会長さんには、恋人の膝枕でのんびりできる権利をプレゼントですよー？」"

[[dialogue]]
speaker = "ルリエル"
# 「してほしいことがあったら、何でも言ってほしいのです♪」
line = "「してほしいことがあったら、何でも言ってほしいのです♪」"

[[dialogue]]
speaker = "unk"
# それじゃあ……
line = "それじゃあ……"

[[dialogue]]
speaker = "ルリエル"
# 「え……？　ステラさんの衣装に変身して欲しい、ですか？　確かめたいことがある……？」
line = "「え……？　ステラさんの衣装に変身して欲しい、ですか？　確かめたいことがある……？」"

[[dialogue]]
speaker = "ルリエル"
# 「はいなのです♪　それでは──」
line = "「はいなのです♪　それでは──」"

[[dialogue]]
speaker = "ルリエル"
# 「これでいいですか？　それで、確かめたいことって……？」
line = "「これでいいですか？　それで、確かめたいことって……？」"

[[dialogue]]
speaker = "unk"
# やっぱり、この衣装になると……
line = "やっぱり、この衣装になると……"

[[dialogue]]
speaker = "ルリエル"
# 「はぇええっ！？　ルリエルから、お花のいい香りがするんですか……っ！？」
line = "「はぇええっ！？　ルリエルから、お花のいい香りがするんですか……っ！？」"

[[dialogue]]
speaker = "ルリエル"
# 「あ……そういえば、バレンタインフォームの星騎士さんって、ほんのりチョコの香りがするような……？」
line = "「あ……そういえば、バレンタインフォームの星騎士さんって、ほんのりチョコの香りがするような……？」"

[[dialogue]]
speaker = "ルリエル"
# 「花騎士さんの衣装だから、お花の香りがするんでしょうか……星力の一部がお花の香りに変わっちゃってる、とか？」
line = "「花騎士さんの衣装だから、お花の香りがするんでしょうか……星力の一部がお花の香りに変わっちゃってる、とか？」"

[[dialogue]]
speaker = "ルリエル"
# 「くんくん、くんくん……自分じゃぜんぜんわからないのです！！」
line = "「くんくん、くんくん……自分じゃぜんぜんわからないのです！！」"

[[dialogue]]
speaker = "ルリエル"
# 「な、なんだかちょっぴり恥ずかしい気もするのですが……でもでも、いい香りだったなら、嬉しいです♪」
line = "「な、なんだかちょっぴり恥ずかしい気もするのですが……でもでも、いい香りだったなら、嬉しいです♪」"

[[dialogue]]
speaker = "ルリエル"
# 「それに、考えようによっては、これは使えちゃう気がします！」
line = "「それに、考えようによっては、これは使えちゃう気がします！」"

[[dialogue]]
speaker = "ルリエル"
# 「今回みたいに、異世界に誰かが飛び出しちゃう事件……今後も起きちゃうかもですが……」
line = "「今回みたいに、異世界に誰かが飛び出しちゃう事件……今後も起きちゃうかもですが……」"

[[dialogue]]
speaker = "ルリエル"
# 「もしもルリエルが迷子になっても、このお花の香り、会長さんが覚えていてくれたら安心なのです♪　会長さんなら、きっと見つけてくれますよね？」
line = "「もしもルリエルが迷子になっても、このお花の香り、会長さんが覚えていてくれたら安心なのです♪　会長さんなら、きっと見つけてくれますよね？」"

[[dialogue]]
speaker = "unk"
# もちろん。すぐに見つけてみせる
line = "もちろん。すぐに見つけてみせる"

[[dialogue]]
speaker = "ルリエル"
# 「はい♪　もちろん逆の立場になった時は、ルリエルが一番に会長さんを見つけちゃうのです！」
line = "「はい♪　もちろん逆の立場になった時は、ルリエルが一番に会長さんを見つけちゃうのです！」"

[[dialogue]]
speaker = "ルリエル"
# 「くんくん……<emoji=heart04>　会長さんの香り、しっかり覚えておかないと～……なのです<emoji=heart04>　くんくんくん……<emoji=heart04>」
line = "「くんくん……<emoji=heart04>　会長さんの香り、しっかり覚えておかないと～……なのです<emoji=heart04>　くんくんくん……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 健気に鼻を鳴らすルリエルと、その日はずっとくっついて過ごした。
line = "健気に鼻を鳴らすルリエルと、その日はずっとくっついて過ごした。"

[[dialogue]]
speaker = "unk"
# この可愛い女の子と、いつまでもずっと一緒にいられますように──そんなことを願いながら。
line = "この可愛い女の子と、いつまでもずっと一緒にいられますように──そんなことを願いながら。"
