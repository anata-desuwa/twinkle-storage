[[dialogue]]
speaker = "unk"
# 『遠からん者は音に聞け、近くば寄って目にも見よ。余は光の魔女にしてネビュラ総帥──クラウディア・イルゼ・フォン・ゴッドフリートである！』
line = "『遠からん者は音に聞け、近くば寄って目にも見よ。余は光の魔女にしてネビュラ総帥──クラウディア・イルゼ・フォン・ゴッドフリートである！』"

[[dialogue]]
speaker = "unk"
# 通信が繋がり、空中に生み出されたスクリーンから映像が流れてくる。
line = "通信が繋がり、空中に生み出されたスクリーンから映像が流れてくる。"

[[dialogue]]
speaker = "unk"
# 突然の、そして意外な人物からの接触に驚きの声が上がった。
line = "突然の、そして意外な人物からの接触に驚きの声が上がった。"

[[dialogue]]
speaker = "ヒヨ"
# 「なんでい！？　ずいぶんと偉そうなのが出てきやがった！？」
line = "「なんでい！？　ずいぶんと偉そうなのが出てきやがった！？」"

[[dialogue]]
speaker = "クラウディア"
# 『偉そうなのではない。余は実際に偉いのだ』
line = "『偉そうなのではない。余は実際に偉いのだ』"

[[dialogue]]
speaker = "ヴィーナス"
# 「ヘレナちゃん、どういうこと？　どうして魔女が出てくるのよ」
line = "「ヘレナちゃん、どういうこと？　どうして魔女が出てくるのよ」"

[[dialogue]]
speaker = "ヘレナ"
# 「私たちも手をこまねいていたわけではない。こうなることを見越して、先の戦いの後、緋宮リノを通じてネビュラと交渉していたのだ」
line = "「私たちも手をこまねいていたわけではない。こうなることを見越して、先の戦いの後、緋宮リノを通じてネビュラと交渉していたのだ」"

[[dialogue]]
speaker = "セドナ"
# 『ネビュラとしても、守護天使が封印されていることは懸案事項だった。リクリエを食い止めても、世界の機能が停止しては意味がないからな』
line = "『ネビュラとしても、守護天使が封印されていることは懸案事項だった。リクリエを食い止めても、世界の機能が停止しては意味がないからな』"

[[dialogue]]
speaker = "セドナ"
# 『本題に入ろう。我々ネビュラには事態を解決する術がある』
line = "『本題に入ろう。我々ネビュラには事態を解決する術がある』"

[[dialogue]]
speaker = "unk"
# 世界樹を使うのか？
line = "世界樹を使うのか？"

[[dialogue]]
speaker = "セドナ"
# 『そうだ。魔女の森と三界を繋ぐ世界樹を使えば、魔界の各地に戦力を送り込める』
line = "『そうだ。魔女の森と三界を繋ぐ世界樹を使えば、魔界の各地に戦力を送り込める』"

[[dialogue]]
speaker = "サーシャ"
# 「信用してもいいのかしら？　前の時は、帰ろうとしたら入口を閉められたけれど」
line = "「信用してもいいのかしら？　前の時は、帰ろうとしたら入口を閉められたけれど」"

[[dialogue]]
speaker = "セドナ"
# 『あの時は貴様たちが帰ってくると不都合だったからな。理由がなければ素直に返すさ』
line = "『あの時は貴様たちが帰ってくると不都合だったからな。理由がなければ素直に返すさ』"

[[dialogue]]
speaker = "ソフィア"
# 「とはいえ魔界ではしてやられましたし……。ですが他に手段は……」
line = "「とはいえ魔界ではしてやられましたし……。ですが他に手段は……」"

[[dialogue]]
speaker = "リノ"
# 『大丈夫よ、私が見てるから』
line = "『大丈夫よ、私が見てるから』"

[[dialogue]]
speaker = "unk"
# 母さん！？
line = "母さん！？"

[[dialogue]]
speaker = "リノ"
# 『さっきも言ってたでしょ、私が仲介したって。それに意味もない嫌がらせをするほどネビュラは酔狂じゃないわ』
line = "『さっきも言ってたでしょ、私が仲介したって。それに意味もない嫌がらせをするほどネビュラは酔狂じゃないわ』"

[[dialogue]]
speaker = "フィオナ"
# 「心境としては複雑ですが……私は彼女たちを信じます」
line = "「心境としては複雑ですが……私は彼女たちを信じます」"

[[dialogue]]
speaker = "フィオナ"
# 「やり方が違うとはいえ、彼女たちの世界を救おうとする意志は本物でした。だからこそ私たちはぶつかったんだと思います」
line = "「やり方が違うとはいえ、彼女たちの世界を救おうとする意志は本物でした。だからこそ私たちはぶつかったんだと思います」"

[[dialogue]]
speaker = "unk"
# 俺もネビュラを信じる
line = "俺もネビュラを信じる"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロトがそう言うなら仕方ないわね。でも変なことしたら、魔界の空をぶち破って戻ってきちゃうんだから！」
line = "「クロトがそう言うなら仕方ないわね。でも変なことしたら、魔界の空をぶち破って戻ってきちゃうんだから！」"

[[dialogue]]
speaker = "セドナ"
# 『フ──それはそれで見物だが、そうはならないと約束しよう』
line = "『フ──それはそれで見物だが、そうはならないと約束しよう』"

[[dialogue]]
speaker = "セドナ"
# 『話が決まったところで作戦の説明を進めよう。天使の本体は現在、魔界の各地の<ruby=ふる>旧</ruby>い神殿に封印されている』
line = "『話が決まったところで作戦の説明を進めよう。天使の本体は現在、魔界の各地の<ruby>旧<rt>ふる</rt></ruby>い神殿に封印されている』"

[[dialogue]]
speaker = "セドナ"
# 『魔界にもかつては守護天使への信仰があったのだろう。とはいえ、千年以上放置され、ほとんど廃墟になっているがな』
line = "『魔界にもかつては守護天使への信仰があったのだろう。とはいえ、千年以上放置され、ほとんど廃墟になっているがな』"

[[dialogue]]
speaker = "ヘレナ"
# 「守護天使が封印された場所については、九浄家も情報を集めていた」
line = "「守護天使が封印された場所については、九浄家も情報を集めていた」"

[[dialogue]]
speaker = "ヘレナ"
# 「我々とネビュラ、そして匿名の情報提供者の情報を合わせ、特定に至ったのが……」
line = "「我々とネビュラ、そして匿名の情報提供者の情報を合わせ、特定に至ったのが……」"

[[dialogue]]
speaker = "ヘレナ"
# 「《境界》のマグダレナ、《命脈》のアルモタヘル、《円環》のラクシャ、《万成》のアウクセシア、《試練》のパテルの五柱だ」
line = "「《境界》のマグダレナ、《命脈》のアルモタヘル、《円環》のラクシャ、《万成》のアウクセシア、《試練》のパテルの五柱だ」"

[[dialogue]]
speaker = "ルリエル"
# 「匿名の情報提供者？　って、誰なんです？」
line = "「匿名の情報提供者？　って、誰なんです？」"

[[dialogue]]
speaker = "ヘレナ"
# 「わからないから匿名なのだ。だが心当たりがある者もいるだろう」
line = "「わからないから匿名なのだ。だが心当たりがある者もいるだろう」"

[[dialogue]]
speaker = "ヴィーナス"
# 「もしかして環がっ？」
line = "「もしかして環がっ？」"

[[dialogue]]
speaker = "unk"
# 俺やヴィーナスと同じ学年の生徒・市倉環の正体は、守護天使《円環》のラクシャだった。
line = "俺やヴィーナスと同じ学年の生徒・市倉環の正体は、守護天使《円環》のラクシャだった。"

[[dialogue]]
speaker = "unk"
# 魔界に囚われていたヴィーナスによると、環はセイファートに協力する代わり、守護天使が封印されていた場所を聞いていたという。
line = "魔界に囚われていたヴィーナスによると、環はセイファートに協力する代わり、守護天使が封印されていた場所を聞いていたという。"

[[dialogue]]
speaker = "unk"
# 環は現在新星学園には戻っておらず、姿を消したままだ。
line = "環は現在新星学園には戻っておらず、姿を消したままだ。"

[[dialogue]]
speaker = "ヘレナ"
# 「正体がわからないものに助けられるのはいささか釈然としないが、ネビュラによって情報の裏取りは済んでいる」
line = "「正体がわからないものに助けられるのはいささか釈然としないが、ネビュラによって情報の裏取りは済んでいる」"

[[dialogue]]
speaker = "マグダレナ"
# 「残る一柱の所在は不明ですが、我々五柱を復活させることができれば、当面の間は世界の維持が可能でしょう」
line = "「残る一柱の所在は不明ですが、我々五柱を復活させることができれば、当面の間は世界の維持が可能でしょう」"

[[dialogue]]
speaker = "セドナ"
# 『作戦はいたって単純だ。流星市国から魔界にある神殿に戦力を送り込み、堕天使となった守護天使を撃破する』
line = "『作戦はいたって単純だ。流星市国から魔界にある神殿に戦力を送り込み、堕天使となった守護天使を撃破する』"

[[dialogue]]
speaker = "セドナ"
# 『ただし世界樹で送れる戦力には限りがある。一ヵ所につき十数名が限界だろう』
line = "『ただし世界樹で送れる戦力には限りがある。一ヵ所につき十数名が限界だろう』"

[[dialogue]]
speaker = "セドナ"
# 『そしておそらく、堕天使は今までに戦ったものより格段に強い。何せ女神に近い高等存在の本体。死闘になるのは必至だ』
line = "『そしておそらく、堕天使は今までに戦ったものより格段に強い。何せ女神に近い高等存在の本体。死闘になるのは必至だ』"

[[dialogue]]
speaker = "セドナ"
# 『また、案内として各チームにはネビュラの魔女が同行する。世界樹の中で迷子になっては敵わないからな』
line = "『また、案内として各チームにはネビュラの魔女が同行する。世界樹の中で迷子になっては敵わないからな』"

[[dialogue]]
speaker = "セドナ"
# 『しかし魔界への道を開くのに膨大な魔力を消費する。世界樹にかかる負担も大きい。チャンスは一度きりだ』
line = "『しかし魔界への道を開くのに膨大な魔力を消費する。世界樹にかかる負担も大きい。チャンスは一度きりだ』"

[[dialogue]]
speaker = "ヘレナ"
# 「つまり敗北は許されない。<ruby=けんこんいってき>乾坤一擲</ruby>の戦いだ。心してくれ」
line = "「つまり敗北は許されない。<ruby>乾坤一擲<rt>けんこんいってき</rt></ruby>の戦いだ。心してくれ」"

[[dialogue]]
speaker = "マトイ"
# 「この前世界を守ったと思ったのに、また世界の危機なんて……しかも失敗したら終わりとか、心臓がバクバクしちゃうよ」
line = "「この前世界を守ったと思ったのに、また世界の危機なんて……しかも失敗したら終わりとか、心臓がバクバクしちゃうよ」"

[[dialogue]]
speaker = "ルリエル"
# 「ひょえ～……息つく間もありませんよぉ～」
line = "「ひょえ～……息つく間もありませんよぉ～」"

[[dialogue]]
speaker = "フィオナ"
# 「しかし、以前魔界に行く時は渋々でしたのに、今回はすんなりと世界樹を使わせていただけるんですね」
line = "「しかし、以前魔界に行く時は渋々でしたのに、今回はすんなりと世界樹を使わせていただけるんですね」"

[[dialogue]]
speaker = "セドナ"
# 『本来なら魔女以外の者を──しかもこれほどの数を、神聖なる世界樹に通したくはない。だがここで見過ごしては祖先に顔向けができないからな』
line = "『本来なら魔女以外の者を──しかもこれほどの数を、神聖なる世界樹に通したくはない。だがここで見過ごしては祖先に顔向けができないからな』"

[[dialogue]]
speaker = "セドナ"
# 『魔女と星騎士の初めての合同作戦だ。認めたくないが、少人数での多方面制圧ならそちらに分がある。期待させてもらう』
line = "『魔女と星騎士の初めての合同作戦だ。認めたくないが、少人数での多方面制圧ならそちらに分がある。期待させてもらう』"

[[dialogue]]
speaker = "クラウディア"
# 『ふっふっふ……余の力、存分に見せてやろう！　ついでに魔界を物見遊山といこうではないか♪』
line = "『ふっふっふ……余の力、存分に見せてやろう！　ついでに魔界を物見遊山といこうではないか♪』"

[[dialogue]]
speaker = "セドナ"
# 『姫はお留守番です。私とともに世界樹に魔力を注ぐ者が必要ですので』
line = "『姫はお留守番です。私とともに世界樹に魔力を注ぐ者が必要ですので』"

[[dialogue]]
speaker = "クラウディア"
# 『なに～！？』
line = "『なに～！？』"

[[dialogue]]
speaker = "ヒヨ"
# 「黒いスーツの姉ちゃん、厳しいことばっかり言ってくれるぜ……。まぁ悔しいけど、プリマステラになってそこそこのあたしの実力じゃ、この作戦はついていけねえ──」
line = "「黒いスーツの姉ちゃん、厳しいことばっかり言ってくれるぜ……。まぁ悔しいけど、プリマステラになってそこそこのあたしの実力じゃ、この作戦はついていけねえ──」"

[[dialogue]]
speaker = "ミルフィー"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "ヒヨ"
# 「姐さん？」
line = "「姐さん？」"

[[dialogue]]
speaker = "ミルフィー"
# 「ねぇ、私もこの作戦に参加していい？　マグダレナ様を解放するチームに入りたいんだけど」
line = "「ねぇ、私もこの作戦に参加していい？　マグダレナ様を解放するチームに入りたいんだけど」"

[[dialogue]]
speaker = "ヒヨ"
# 「姐さんも行くのか！？　絶対危険なやつだぜ！？」
line = "「姐さんも行くのか！？　絶対危険なやつだぜ！？」"

[[dialogue]]
speaker = "ミルフィー"
# 「当然だよ。私はマグダレナ様に仕える者なんだから」
line = "「当然だよ。私はマグダレナ様に仕える者なんだから」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええ、もちろん。ミルフィーの実力なら大歓迎よ。こっちからお願いしたいくらいだわ！」
line = "「ええ、もちろん。ミルフィーの実力なら大歓迎よ。こっちからお願いしたいくらいだわ！」"

[[dialogue]]
speaker = "ミルフィー"
# 「ありがとう。──ではマグダレナ様、行って参ります」
line = "「ありがとう。──ではマグダレナ様、行って参ります」"

[[dialogue]]
speaker = "マグダレナ"
# 「よろしくお願いします。ですが、決して無理はしないでくださいね」
line = "「よろしくお願いします。ですが、決して無理はしないでくださいね」"

[[dialogue]]
speaker = "ユウリ"
# 「敵陣に乗り込んでぶっ潰す！　やることがわかってんなら悩むことはねえな」
line = "「敵陣に乗り込んでぶっ潰す！　やることがわかってんなら悩むことはねえな」"

[[dialogue]]
speaker = "アナ"
# 「すべきことは単純。やると決めたら、後は効率的に動くのみです」
line = "「すべきことは単純。やると決めたら、後は効率的に動くのみです」"

[[dialogue]]
speaker = "unk"
# みんなで世界を守るぞ！
line = "みんなで世界を守るぞ！"

[[dialogue]]
speaker = "ミルフィー"
# 「うん。マグダレナ様を祀る一族として、守護天使様を必ず解放するよ！」
line = "「うん。マグダレナ様を祀る一族として、守護天使様を必ず解放するよ！」"

[[dialogue]]
speaker = "マハムート"
# 「話は聞いたわね。私たち新星学園の星騎士も魔界に向かい、守護天使を解放するわ」
line = "「話は聞いたわね。私たち新星学園の星騎士も魔界に向かい、守護天使を解放するわ」"

[[dialogue]]
speaker = "マハムート"
# 「星徒会ばかりにいい格好はさせない。堕天使だろうと跪かせてやるわ！」
line = "「星徒会ばかりにいい格好はさせない。堕天使だろうと跪かせてやるわ！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「流星学園からもプリマステラを選抜させていただきました。しかし世界樹によって流星市国と魔界を繋げられる時間はわずか。帰還まで気を抜かないでください」
line = "「流星学園からもプリマステラを選抜させていただきました。しかし世界樹によって流星市国と魔界を繋げられる時間はわずか。帰還まで気を抜かないでください」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「さぁ、世界の危機を共に打ち砕きますわよ！」
line = "「さぁ、世界の危機を共に打ち砕きますわよ！」"

[[dialogue]]
speaker = "サチ"
# 「プリマステラの数では流星本校や新星学園には及びませんが、附属校も戦います。みんなの力を合わせましょう！」
line = "「プリマステラの数では流星本校や新星学園には及びませんが、附属校も戦います。みんなの力を合わせましょう！」"

[[dialogue]]
speaker = "クラウディア"
# 『では魔界へ送り出すぞ。星騎士たちよ、存分に暴れるがいい！』
line = "『では魔界へ送り出すぞ。星騎士たちよ、存分に暴れるがいい！』"

[[dialogue]]
speaker = "クラウディア"
# 『オペレーション・ペンタグラム──スタートだ！』
line = "『オペレーション・ペンタグラム──スタートだ！』"
