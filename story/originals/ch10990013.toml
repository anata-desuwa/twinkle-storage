[[dialogue]]
speaker = "unk"
# 第３話,ミウの秘密特訓,P
line = "第３話,ミウの秘密特訓,P"

[[dialogue]]
speaker = "unk"
# 俺は地下トレーニング施設で、ミウと対峙していた。
line = "俺は地下トレーニング施設で、ミウと対峙していた。"

[[dialogue]]
speaker = "ミウ"
# 「行きますよ、会長さんっ！　はっ！　たっ！　レイピアバレット！」
line = "「行きますよ、会長さんっ！　はっ！　たっ！　レイピアバレット！」"

[[dialogue]]
speaker = "ミウ"
# 「嘘っ、今の銃弾が防がれるなんて──」
line = "「嘘っ、今の銃弾が防がれるなんて──」"

[[dialogue]]
speaker = "unk"
# 隙だらけだよ！
line = "隙だらけだよ！"

[[dialogue]]
speaker = "ミウ"
# 「きゃあっ！　はぁ、はぁ……まっ、まだまだです……手加減無用……続き、お願いします……！」
line = "「きゃあっ！　はぁ、はぁ……まっ、まだまだです……手加減無用……続き、お願いします……！」"

[[dialogue]]
speaker = "unk"
# トレーニング開始から１時間。まだ彼女は俺に一度も決定打を与えられていない。
line = "トレーニング開始から１時間。まだ彼女は俺に一度も決定打を与えられていない。"

[[dialogue]]
speaker = "ミウ"
# 「会長さん、あなたを学園最強と見込んでお願いします」
line = "「会長さん、あなたを学園最強と見込んでお願いします」"

[[dialogue]]
speaker = "ミウ"
# 「日々の業務でお忙しいとは思いますけど、私にお稽古をつけてもらえませんでしょうか」
line = "「日々の業務でお忙しいとは思いますけど、私にお稽古をつけてもらえませんでしょうか」"

[[dialogue]]
speaker = "ミウ"
# 「セナリィ社長の<ruby=エンプレス>女帝</ruby>フォームばかりに頼りきりじゃ、いつか社長は過労で倒れてしまいます」
line = "「セナリィ社長の<ruby>女帝<rt>エンプレス</rt></ruby>フォームばかりに頼りきりじゃ、いつか社長は過労で倒れてしまいます」"

[[dialogue]]
speaker = "ミウ"
# 「新型モンスターとの戦いにおいて、私は何の役にも立ててません……社長やヒマワリちゃんの足を引っ張りたくないんです」
line = "「新型モンスターとの戦いにおいて、私は何の役にも立ててません……社長やヒマワリちゃんの足を引っ張りたくないんです」"

[[dialogue]]
speaker = "unk"
# でも、ミウはまだ附属生だし
line = "でも、ミウはまだ附属生だし"

[[dialogue]]
speaker = "ミウ"
# 「それは弱くていい理由にはならないです。いつか強くなれるんだとしても、力が欲しいのは今なんです」
line = "「それは弱くていい理由にはならないです。いつか強くなれるんだとしても、力が欲しいのは今なんです」"

[[dialogue]]
speaker = "ミウ"
# 「だから、一度だけでもいいんです。会長さんと剣を交えることで得られるものは、きっと大きいはずですから」
line = "「だから、一度だけでもいいんです。会長さんと剣を交えることで得られるものは、きっと大きいはずですから」"

[[dialogue]]
speaker = "unk"
# ミウの熱意に負けて、俺は彼女に稽古をつけることになった。
line = "ミウの熱意に負けて、俺は彼女に稽古をつけることになった。"

[[dialogue]]
speaker = "ミウ"
# 「はぁ、はぁっ、ま、まだです……！」
line = "「はぁ、はぁっ、ま、まだです……！」"

[[dialogue]]
speaker = "ミウ"
# 「えっ、もう時間……！？　まだ会長さんに一矢も報えてない……何も掴めてないのに……私は、強くなれないの……？　足手まといでしかないの……？」
line = "「えっ、もう時間……！？　まだ会長さんに一矢も報えてない……何も掴めてないのに……私は、強くなれないの……？　足手まといでしかないの……？」"

[[dialogue]]
speaker = "ヒマワリ"
# 「そんなわけないじゃんっ！」
line = "「そんなわけないじゃんっ！」"

[[dialogue]]
speaker = "ミウ"
# 「えっ……その声は──ヒマワリちゃん！？」
line = "「えっ……その声は──ヒマワリちゃん！？」"

[[dialogue]]
speaker = "ヒマワリ"
# 「そーだよ、あたしだよ！　水臭いじゃん、ミウ」
line = "「そーだよ、あたしだよ！　水臭いじゃん、ミウ」"

[[dialogue]]
speaker = "ミウ"
# 「どうして、ここに……？　内緒にしてたのに……」
line = "「どうして、ここに……？　内緒にしてたのに……」"

[[dialogue]]
speaker = "ヒマワリ"
# 「『附属の子が会長と特訓してる』って噂が聞こえてきたからさ。ピーンと来たんだよね、絶対にミウだーって！」
line = "「『附属の子が会長と特訓してる』って噂が聞こえてきたからさ。ピーンと来たんだよね、絶対にミウだーって！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「抜け駆けなんてズルいじゃん！　会長さん、あたしもトレーニングに参加させてよ！」
line = "「抜け駆けなんてズルいじゃん！　会長さん、あたしもトレーニングに参加させてよ！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「まさか会長さんが、附属の子相手に『２対１は卑怯だー』なんて言わないよねー？」
line = "「まさか会長さんが、附属の子相手に『２対１は卑怯だー』なんて言わないよねー？」"

[[dialogue]]
speaker = "unk"
# もちろん、望むところだ！
line = "もちろん、望むところだ！"

[[dialogue]]
speaker = "ヒマワリ"
# 「よーし、ミウ！　会長さんのこと、やっつけちゃおう！」
line = "「よーし、ミウ！　会長さんのこと、やっつけちゃおう！」"

[[dialogue]]
speaker = "ミウ"
# 「でも、会長さんはすごく強いよ。さっきから何度やっても弾かれちゃって……」
line = "「でも、会長さんはすごく強いよ。さっきから何度やっても弾かれちゃって……」"

[[dialogue]]
speaker = "ヒマワリ"
# 「頭に血が昇っちゃってるんだろうけどさ。せっかくのミウの持ち味を殺しちゃ意味ないじゃん。ほら、深呼吸、深呼吸」
line = "「頭に血が昇っちゃってるんだろうけどさ。せっかくのミウの持ち味を殺しちゃ意味ないじゃん。ほら、深呼吸、深呼吸」"

[[dialogue]]
speaker = "ミウ"
# 「あっ……すぅー、はぁー……すぅー、はぁー……うん、大丈夫、落ち着いた」
line = "「あっ……すぅー、はぁー……すぅー、はぁー……うん、大丈夫、落ち着いた」"

[[dialogue]]
speaker = "ヒマワリ"
# 「会長さんをやっつけるプラン、思いつきそ？」
line = "「会長さんをやっつけるプラン、思いつきそ？」"

[[dialogue]]
speaker = "ミウ"
# 「やっつけるのは難しいけど、ビックリさせるくらいはできるかも。ごにょごにょごにょ──」
line = "「やっつけるのは難しいけど、ビックリさせるくらいはできるかも。ごにょごにょごにょ──」"

[[dialogue]]
speaker = "ヒマワリ"
# 「ふんふん……あは、あははっ！　さっすがー！　それでこそ、いつものミウだ！」
line = "「ふんふん……あは、あははっ！　さっすがー！　それでこそ、いつものミウだ！」"

[[dialogue]]
speaker = "ミウ"
# 「ヒマワリちゃん、私よりも私のことよくわかってるんだね」
line = "「ヒマワリちゃん、私よりも私のことよくわかってるんだね」"

[[dialogue]]
speaker = "ヒマワリ"
# 「当たり前でしょ、だって、あたしたち──」
line = "「当たり前でしょ、だって、あたしたち──」"

[[dialogue]]
speaker = "ミウ"
# 「──親友だもんね！　行きます、会長さん！」
line = "「──親友だもんね！　行きます、会長さん！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「会長さん強かったねー！」
line = "「会長さん強かったねー！」"

[[dialogue]]
speaker = "ミウ"
# 「うん、思ってた以上だった。さすがだね」
line = "「うん、思ってた以上だった。さすがだね」"

[[dialogue]]
speaker = "unk"
# ふたりの連携もバッチリだったよ
line = "ふたりの連携もバッチリだったよ"

[[dialogue]]
speaker = "ミウ"
# 「私に注意が向いてる時は、ヒマワリちゃんが斬り込んで」
line = "「私に注意が向いてる時は、ヒマワリちゃんが斬り込んで」"

[[dialogue]]
speaker = "ヒマワリ"
# 「あたしが目くらまししてる時は、ミウが狙撃で狙う！　そしたら、会長さんの頭をズキューンって！」
line = "「あたしが目くらまししてる時は、ミウが狙撃で狙う！　そしたら、会長さんの頭をズキューンって！」"

[[dialogue]]
speaker = "unk"
# ２人の息をもつかせぬ連携で、最後の最後にミウの狙撃で１本取られてしまった。
line = "２人の息をもつかせぬ連携で、最後の最後にミウの狙撃で１本取られてしまった。"

[[dialogue]]
speaker = "unk"
# 自分の長所を伸ばし続けるようにね
line = "自分の長所を伸ばし続けるようにね"

[[dialogue]]
speaker = "ミウ＆ヒマワリ"
# 「はいっ！」
line = "「はいっ！」"

[[dialogue]]
speaker = "ミウ"
# 「あっ、鯛焼き、焼けたみたいです。ここの鯛焼き屋さんは注文してから焼いてくれるんで、いつも焼き立てアツアツで、本っ当に美味しいんです！」
line = "「あっ、鯛焼き、焼けたみたいです。ここの鯛焼き屋さんは注文してから焼いてくれるんで、いつも焼き立てアツアツで、本っ当に美味しいんです！」"

[[dialogue]]
speaker = "ミウ"
# 「ささやかですけど、私からのせめてもの感謝の気持ちです。２人とも奢られてください」
line = "「ささやかですけど、私からのせめてもの感謝の気持ちです。２人とも奢られてください」"

[[dialogue]]
speaker = "ヒマワリ"
# 「いっただっきまーす！　はふはふ、ほふほふ……んーっ！　美味ぁーっ！」
line = "「いっただっきまーす！　はふはふ、ほふほふ……んーっ！　美味ぁーっ！」"

[[dialogue]]
speaker = "unk"
# うん、美味しい！
line = "うん、美味しい！"

[[dialogue]]
speaker = "ミウ"
# 「お口に合ったようで、良かったです」
line = "「お口に合ったようで、良かったです」"

[[dialogue]]
speaker = "ミウ"
# 「会長さん、いずれは私もなれるでしょうか。誰よりも輝けるプリマステラに」
line = "「会長さん、いずれは私もなれるでしょうか。誰よりも輝けるプリマステラに」"

[[dialogue]]
speaker = "unk"
# ミウなら必ずなれるよ。俺が保証する
line = "ミウなら必ずなれるよ。俺が保証する"

[[dialogue]]
speaker = "ミウ"
# 「ありがとうございます。会長さんがそう言ってくれると、不思議と叶いそうな……そんな気がするんです」
line = "「ありがとうございます。会長さんがそう言ってくれると、不思議と叶いそうな……そんな気がするんです」"

[[dialogue]]
speaker = "ミウ"
# 「できればでいいんですけど……私の成長、見守っててくださいね、会長さん♪」
line = "「できればでいいんですけど……私の成長、見守っててくださいね、会長さん♪」"
