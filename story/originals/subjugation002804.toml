line = "「ほげぇーーーーっ！！！　お、お化けーーーーーっ！！！」"

[[dialogue]]
speaker = "ソフィア"
# 「ふふふ、お化けではなく私でした♪　お菓子をくれないとイタズラしてしまいますよ？」
line = "「ふふふ、お化けではなく私でした♪　お菓子をくれないとイタズラしてしまいますよ？」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
