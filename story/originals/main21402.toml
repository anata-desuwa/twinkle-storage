[[dialogue]]
speaker = "unk"
# 第２話,使徒のシャドウ,B
line = "第２話,使徒のシャドウ,B"

[[dialogue]]
speaker = "スレイプニル"
# 「ブルルルッ──！！」
line = "「ブルルルッ──！！」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「総員、極星従騎たちの迎撃に当たってください！　彗星の雨は私が撃ち落とします！」
line = "「総員、極星従騎たちの迎撃に当たってください！　彗星の雨は私が撃ち落とします！」"

[[dialogue]]
speaker = "ルリエル"
# 「あわわわっ！　何なんですかぁ、この物量！　さばききれないですよぉ～っ！？」
line = "「あわわわっ！　何なんですかぁ、この物量！　さばききれないですよぉ～っ！？」"

[[dialogue]]
speaker = "ユウリ"
# 「慌てんなルリ！　──イグニッションアサルト！！」
line = "「慌てんなルリ！　──イグニッションアサルト！！」"

[[dialogue]]
speaker = "スレイプニル"
# 「ヒヒィンッ──！？」
line = "「ヒヒィンッ──！？」"

[[dialogue]]
speaker = "ルリエル"
# 「おぉっ……流石なのです、ユウリ先輩！」
line = "「おぉっ……流石なのです、ユウリ先輩！」"

[[dialogue]]
speaker = "セーラ"
# 「喜んでる暇はないよ、ルリちー！　どんどん来てるっ！」
line = "「喜んでる暇はないよ、ルリちー！　どんどん来てるっ！」"

[[dialogue]]
speaker = "バグキメラ"
# 「ギィィイィッ──！」
line = "「ギィィイィッ──！」"

[[dialogue]]
speaker = "ソフィア"
# 「極星従騎だけでなくモンスターまでっ……！」
line = "「極星従騎だけでなくモンスターまでっ……！」"

[[dialogue]]
speaker = "セーラ"
# 「まずいねぇ、きっと街の方もしっちゃかめっちゃかだよフィオナちゃんっ！」
line = "「まずいねぇ、きっと街の方もしっちゃかめっちゃかだよフィオナちゃんっ！」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「ええ！　新星学園と協力して事に当たらなくては……！」
line = "「ええ！　新星学園と協力して事に当たらなくては……！」"

[[dialogue]]
speaker = "unk"
# フィオナは地表に降り注ぐ彗星の雨を端から燃やし尽くす──その隙間を縫って緋宮クロトへ連絡を取った。
line = "フィオナは地表に降り注ぐ彗星の雨を端から燃やし尽くす──その隙間を縫って緋宮クロトへ連絡を取った。"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「緋宮会長──聞こえますか！？」
line = "「緋宮会長──聞こえますか！？」"

[[dialogue]]
speaker = "クロト"
# 「そっちの状況はわかった──しばらく耐えてくれ！　すぐに増援のプリマステラを派遣する！」
line = "「そっちの状況はわかった──しばらく耐えてくれ！　すぐに増援のプリマステラを派遣する！」"

[[dialogue]]
speaker = "クロト"
# 「流星市国全域の防衛は俺が指示を出す！　フィオナは学園の守備を頼んだ！」
line = "「流星市国全域の防衛は俺が指示を出す！　フィオナは学園の守備を頼んだ！」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 『任されました──！　フェニックスバーンッ！！』
line = "『任されました──！　フェニックスバーンッ！！』"

[[dialogue]]
speaker = "トワ先生"
# 「会長くんお待たせ！　戦況の分析が終わったよ！」
line = "「会長くんお待たせ！　戦況の分析が終わったよ！」"

[[dialogue]]
speaker = "トワ先生"
# 「空の異変は間違いなく、リクリエの前兆を報せる流星群……フィヴォス流星群の時と同じで、多数のアステラが展開されてる！」
line = "「空の異変は間違いなく、リクリエの前兆を報せる流星群……フィヴォス流星群の時と同じで、多数のアステラが展開されてる！」"

[[dialogue]]
speaker = "トワ先生"
# 「一番大きいアステラは学園の上空だけど……東京駅や渋谷、浅草……フィーニスの塔を中心に範囲は今も拡大してるみたい！」
line = "「一番大きいアステラは学園の上空だけど……東京駅や渋谷、浅草……フィーニスの塔を中心に範囲は今も拡大してるみたい！」"

[[dialogue]]
speaker = "アナ"
# 「そしてアステラからは、リクリエモンスターだけでなく極星従騎も出現しているようです」
line = "「そしてアステラからは、リクリエモンスターだけでなく極星従騎も出現しているようです」"

[[dialogue]]
speaker = "マトイ"
# 「ルヴィネちゃんはもう隠す気もない……ってことなのかな」
line = "「ルヴィネちゃんはもう隠す気もない……ってことなのかな」"

[[dialogue]]
speaker = "ベアトリス"
# 「そんな……」
line = "「そんな……」"

[[dialogue]]
speaker = "グレイス"
# 「デネブの守護者である極星従騎が、モンスターと手を組んで街を攻撃するなんて……こんなの、見たくありません！」
line = "「デネブの守護者である極星従騎が、モンスターと手を組んで街を攻撃するなんて……こんなの、見たくありません！」"

[[dialogue]]
speaker = "チナ"
# 「くそっ！　やっぱり魔王たちの言うことが、真実だってのかよ……！？」
line = "「くそっ！　やっぱり魔王たちの言うことが、真実だってのかよ……！？」"

[[dialogue]]
speaker = "レティシア"
# 「──確かめに行かなくてはね。ルヴィは今どこに？」
line = "「──確かめに行かなくてはね。ルヴィは今どこに？」"

[[dialogue]]
speaker = "トワ先生"
# 「多分フィーニスの塔……だと思う。内部や頂上はモニタリングできないんだけど、それ以外の場所は考えづらいかな」
line = "「多分フィーニスの塔……だと思う。内部や頂上はモニタリングできないんだけど、それ以外の場所は考えづらいかな」"

[[dialogue]]
speaker = "アナ"
# 「塔の周辺を、極星従騎やモンスターが滞空しています。あそこまで防御を固めていれば、結論は一つでしょう」
line = "「塔の周辺を、極星従騎やモンスターが滞空しています。あそこまで防御を固めていれば、結論は一つでしょう」"

[[dialogue]]
speaker = "unk"
# 地上の防衛をしながら、フィーニスの塔を同時攻略する──この非常時に戦力を分散しなくてはいけないのは厳しい。
line = "地上の防衛をしながら、フィーニスの塔を同時攻略する──この非常時に戦力を分散しなくてはいけないのは厳しい。"

[[dialogue]]
speaker = "トワ先生"
# 「また緊急連絡──って……えっ！？　何これっ！？」
line = "「また緊急連絡──って……えっ！？　何これっ！？」"

[[dialogue]]
speaker = "トワ先生"
# 「会長くん、まずいことになったかも……！　映像出すよ！」
line = "「会長くん、まずいことになったかも……！　映像出すよ！」"

[[dialogue]]
speaker = "アポロ"
# 「な、ぁっ……！？」
line = "「な、ぁっ……！？」"

[[dialogue]]
speaker = "梨緒"
# 「ジグとアポロのシャドウ！？」
line = "「ジグとアポロのシャドウ！？」"

[[dialogue]]
speaker = "ジグ"
# 「……ここまで辱められるとはね。流石の私も黙っていられないな」
line = "「……ここまで辱められるとはね。流石の私も黙っていられないな」"

[[dialogue]]
speaker = "アナ"
# 「リクリエが使徒の力を学習したようですね……最悪の展開です」
line = "「リクリエが使徒の力を学習したようですね……最悪の展開です」"

[[dialogue]]
speaker = "トワ先生"
# 「戦闘力の計測数値は……本物のジグちゃん達には及ばない。でも６割程度までは完璧にコピーされてる……！？」
line = "「戦闘力の計測数値は……本物のジグちゃん達には及ばない。でも６割程度までは完璧にコピーされてる……！？」"

[[dialogue]]
speaker = "新星学園の女子"
# 『トワ先生！　応援をお願いします！　プリマステラがもう何人もやられていて──！！』
line = "『トワ先生！　応援をお願いします！　プリマステラがもう何人もやられていて──！！』"

[[dialogue]]
speaker = "トワ先生"
# 「う、うん！　場所は分かった、すぐに──！」
line = "「う、うん！　場所は分かった、すぐに──！」"

[[dialogue]]
speaker = "？？？"
# 『──余計なことはするな！　おい小娘、ＤＩＳＣを寄越せ』
line = "『──余計なことはするな！　おい小娘、ＤＩＳＣを寄越せ』"

[[dialogue]]
speaker = "新星学園の女子"
# 『え、誰っ──きゃあぁっ！？』
line = "『え、誰っ──きゃあぁっ！？』"

[[dialogue]]
speaker = "煌嶺"
# 『聞こえているな、魔王！　これは妾の獲物だ。無粋な横槍は許さん』
line = "『聞こえているな、魔王！　これは妾の獲物だ。無粋な横槍は許さん』"

[[dialogue]]
speaker = "クロト"
# 「煌嶺！　今の状況だけど──」
line = "「煌嶺！　今の状況だけど──」"

[[dialogue]]
speaker = "煌嶺"
# 『デネブの女神の幼体が乗り込んできた──そうであろう？』
line = "『デネブの女神の幼体が乗り込んできた──そうであろう？』"

[[dialogue]]
speaker = "クロト"
# 「ああ！　……その、無理だとは思うけど、市街地の防衛を任せるというのは──」
line = "「ああ！　……その、無理だとは思うけど、市街地の防衛を任せるというのは──」"

[[dialogue]]
speaker = "煌嶺"
# 『するわけがないだろう。妾の目的は厄災の化身とまみえること。市民の命など知った事か』
line = "『するわけがないだろう。妾の目的は厄災の化身とまみえること。市民の命など知った事か』"

[[dialogue]]
speaker = "クロト"
# 「……そう言うと思った。なら、どうして使徒の幻影に執着する？」
line = "「……そう言うと思った。なら、どうして使徒の幻影に執着する？」"

[[dialogue]]
speaker = "煌嶺"
# 『──不意を突かれた。まさか妾に手傷を負わせるとはな』
line = "『──不意を突かれた。まさか妾に手傷を負わせるとはな』"

[[dialogue]]
speaker = "煌嶺"
# 『不届き者へ誅罰を下す──故に横槍を入れるな。邪魔立てすれば、増援ごと殺す！』
line = "『不届き者へ誅罰を下す──故に横槍を入れるな。邪魔立てすれば、増援ごと殺す！』"

[[dialogue]]
speaker = "クロト"
# 「……使徒のシャドウをあなたが倒してくれるならありがたい。学園生には、戦いの邪魔をするなと厳命しておく」
line = "「……使徒のシャドウをあなたが倒してくれるならありがたい。学園生には、戦いの邪魔をするなと厳命しておく」"

[[dialogue]]
speaker = "煌嶺"
# 『それでよい。こやつら、なかなかに骨が折れる。未来が視える女に、星力の出力を妨害する女……ちょうどいいハンデだ』
line = "『それでよい。こやつら、なかなかに骨が折れる。未来が視える女に、星力の出力を妨害する女……ちょうどいいハンデだ』"

[[dialogue]]
speaker = "アナ"
# 「星力の妨害！？　まさか『<ruby=てんがい>天蓋</ruby>』が──！？」
line = "「星力の妨害！？　まさか『<ruby>天蓋<rt>てんがい</rt></ruby>』が──！？」"

[[dialogue]]
speaker = "クロト"
# 「本当に大丈夫なのか、煌嶺……！？」
line = "「本当に大丈夫なのか、煌嶺……！？」"

[[dialogue]]
speaker = "煌嶺"
# 『それ以上、妾の身を案じる言葉を吐くな──侮辱と受け取るぞ？』
line = "『それ以上、妾の身を案じる言葉を吐くな──侮辱と受け取るぞ？』"

[[dialogue]]
speaker = "煌嶺"
# 『聞きたいことは１つだけだ。厄災の化身を従える、ルヴィネとやらは今どこにいる？』
line = "『聞きたいことは１つだけだ。厄災の化身を従える、ルヴィネとやらは今どこにいる？』"

[[dialogue]]
speaker = "クロト"
# 「……フィーニスの塔。恐らくその最上階だ」
line = "「……フィーニスの塔。恐らくその最上階だ」"

[[dialogue]]
speaker = "煌嶺"
# 『それさえわかれば十分だ。この模造品を蹴散らした後に登るとしよう。急がねばな？』
line = "『それさえわかれば十分だ。この模造品を蹴散らした後に登るとしよう。急がねばな？』"

[[dialogue]]
speaker = "クロト"
# 「ああ、急がないと──」
line = "「ああ、急がないと──」"

[[dialogue]]
speaker = "煌嶺"
# 『そうだ。貴様たちが死んでしまう──妾の助力なしで、勝てるものか。なあ？』
line = "『そうだ。貴様たちが死んでしまう──妾の助力なしで、勝てるものか。なあ？』"

[[dialogue]]
speaker = "unk"
# 俺たちが先に倒してしまうぞ、と言いたかったんだが──言いたいだけ言い切ると、煌嶺は通信を切ってしまった。
line = "俺たちが先に倒してしまうぞ、と言いたかったんだが──言いたいだけ言い切ると、煌嶺は通信を切ってしまった。"

[[dialogue]]
speaker = "クロト"
# 「メンバーを決める。ルヴィネ攻略班と、地上防衛の２チームに切り分けるぞ」
line = "「メンバーを決める。ルヴィネ攻略班と、地上防衛の２チームに切り分けるぞ」"

[[dialogue]]
speaker = "クロト"
# 「ルヴィネとディザスターハンド、双方との戦いに備える──新星星徒会のみんな。ノヴァフォームの力、存分に奮ってくれ」
line = "「ルヴィネとディザスターハンド、双方との戦いに備える──新星星徒会のみんな。ノヴァフォームの力、存分に奮ってくれ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「まっかせなさい！　ルヴィネにがつんと言ってやらなきゃね！」
line = "「まっかせなさい！　ルヴィネにがつんと言ってやらなきゃね！」"

[[dialogue]]
speaker = "クロト"
# 「続いて、極星学園のみんな。ルヴィネの未来を変えるには、君たち４人の協力が欠かせない。俺たちと一緒に来てくれ」
line = "「続いて、極星学園のみんな。ルヴィネの未来を変えるには、君たち４人の協力が欠かせない。俺たちと一緒に来てくれ」"

[[dialogue]]
speaker = "ベアトリス"
# 「はいっ！　絶対に説得してみせます……！」
line = "「はいっ！　絶対に説得してみせます……！」"

[[dialogue]]
speaker = "クロト"
# 「選挙管理委員会には地上の防衛を頼みたい。本音を言うなら、決戦の場に梨緒たちがいない状況は避けたかったんだが……」
line = "「選挙管理委員会には地上の防衛を頼みたい。本音を言うなら、決戦の場に梨緒たちがいない状況は避けたかったんだが……」"

[[dialogue]]
speaker = "梨緒"
# 「使徒のシャドウまで出てきた今、そうも言っていられないだろう。地上は任せてくれ」
line = "「使徒のシャドウまで出てきた今、そうも言っていられないだろう。地上は任せてくれ」"

[[dialogue]]
speaker = "梨緒"
# 「余裕が生まれ次第、塔の頂上へ援護に向かう──フィオナたち流星星徒会にも声をかけておこう」
line = "「余裕が生まれ次第、塔の頂上へ援護に向かう──フィオナたち流星星徒会にも声をかけておこう」"

[[dialogue]]
speaker = "ジグ"
# 「──魔王。その、未来の……」
line = "「──魔王。その、未来の……」"

[[dialogue]]
speaker = "ジグ"
# 「……いいや。なんでもない」
line = "「……いいや。なんでもない」"

[[dialogue]]
speaker = "ジグ"
# 「──ディザスターハンドは、一度ベガを滅ぼした存在だ。武運を祈るよ」
line = "「──ディザスターハンドは、一度ベガを滅ぼした存在だ。武運を祈るよ」"

[[dialogue]]
speaker = "クロト"
# 「ああ。お互いにな」
line = "「ああ。お互いにな」"

[[dialogue]]
speaker = "梨緒"
# 「……ベアト。行ってこい。君ならきっとルヴィネを救えるはずだ」
line = "「……ベアト。行ってこい。君ならきっとルヴィネを救えるはずだ」"

[[dialogue]]
speaker = "ベアトリス"
# 「ありがとう、梨緒ちゃん！　行ってきます！」
line = "「ありがとう、梨緒ちゃん！　行ってきます！」"
