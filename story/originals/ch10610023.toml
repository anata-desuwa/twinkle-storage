[[dialogue]]
speaker = "unk"
# 第３話,服飾職人は惹かれ合う,P
line = "第３話,服飾職人は惹かれ合う,P"

[[dialogue]]
speaker = "マリオン"
# 「こんにちは、新星星徒会の皆様方。改めまして、マリオン・ネイマールです」
line = "「こんにちは、新星星徒会の皆様方。改めまして、マリオン・ネイマールです」"

[[dialogue]]
speaker = "unk"
# ネビュラと星見家や流星学園間の連絡係として、星見家に再雇用されたマリオン。
line = "ネビュラと星見家や流星学園間の連絡係として、星見家に再雇用されたマリオン。"

[[dialogue]]
speaker = "unk"
# 今日は挨拶がてら新星星徒会を訪れていた。
line = "今日は挨拶がてら新星星徒会を訪れていた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「マリオンは正式に星見家のメイドとして復帰したのよね？」
line = "「マリオンは正式に星見家のメイドとして復帰したのよね？」"

[[dialogue]]
speaker = "マリオン"
# 「はい。私のような者を再雇用していただけるなんて、フィオナお嬢様の懐の深さには感謝しております」
line = "「はい。私のような者を再雇用していただけるなんて、フィオナお嬢様の懐の深さには感謝しております」"

[[dialogue]]
speaker = "ヴィーナス"
# 「お客さんなんだし、マリオンは寛いでていいわよ」
line = "「お客さんなんだし、マリオンは寛いでていいわよ」"

[[dialogue]]
speaker = "マリオン"
# 「いえいえお構いなく。むしろ私は皆様のお世話をさせていただきたいくらいです」
line = "「いえいえお構いなく。むしろ私は皆様のお世話をさせていただきたいくらいです」"

[[dialogue]]
speaker = "マリオン"
# 「そうです、会長様。使者としてではなく、私個人としてのご提案なのですが」
line = "「そうです、会長様。使者としてではなく、私個人としてのご提案なのですが」"

[[dialogue]]
speaker = "マリオン"
# 「私が服作りを趣味としているのは、会長様もご存じだと思いますが、会長様を想って作成した衣装がクローゼットにたくさん溜まってしまいまして……」
line = "「私が服作りを趣味としているのは、会長様もご存じだと思いますが、会長様を想って作成した衣装がクローゼットにたくさん溜まってしまいまして……」"

[[dialogue]]
speaker = "マリオン"
# 「よろしければ、一度、着てみてはいただけませんでしょうか？　もちろん無理強いは致しませんが……」
line = "「よろしければ、一度、着てみてはいただけませんでしょうか？　もちろん無理強いは致しませんが……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「へぇ～！　面白そうじゃない。クロト、着てあげたら？」
line = "「へぇ～！　面白そうじゃない。クロト、着てあげたら？」"

[[dialogue]]
speaker = "美鶴"
# 「ちょい待ち。話は聞かせてもらいました」
line = "「ちょい待ち。話は聞かせてもらいました」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あら、美鶴。お弁当を届けてくれたの？」
line = "「あら、美鶴。お弁当を届けてくれたの？」"

[[dialogue]]
speaker = "美鶴"
# 「あ、はい、お嬢様。こちら今日のお弁当です」
line = "「あ、はい、お嬢様。こちら今日のお弁当です」"

[[dialogue]]
speaker = "美鶴"
# 「それはそれとして──うちも会長さんに似合いそうなコス、何着か作ってんだけどさ。一度、着せてみたかったんだよね」
line = "「それはそれとして──うちも会長さんに似合いそうなコス、何着か作ってんだけどさ。一度、着せてみたかったんだよね」"

[[dialogue]]
speaker = "unk"
# ２人して、何やってんの？
line = "２人して、何やってんの？"

[[dialogue]]
speaker = "美鶴"
# 「そう言われてもね。会長さんを見てると、作り手の血が騒ぐんすよ」
line = "「そう言われてもね。会長さんを見てると、作り手の血が騒ぐんすよ」"

[[dialogue]]
speaker = "マリオン"
# 「わかります、わかります。会長様にはそうしたくなる『何か』があるんですよね」
line = "「わかります、わかります。会長様にはそうしたくなる『何か』があるんですよね」"

[[dialogue]]
speaker = "美鶴"
# 「服作るのは人様と競うものじゃないとは思うんすけどね。相手がマリオンさんなら、ちょいと話は別」
line = "「服作るのは人様と競うものじゃないとは思うんすけどね。相手がマリオンさんなら、ちょいと話は別」"

[[dialogue]]
speaker = "美鶴"
# 「マリオンさん、うちのメイド隊のヨミーとかせつなにちょっかい出してたっしょ？」
line = "「マリオンさん、うちのメイド隊のヨミーとかせつなにちょっかい出してたっしょ？」"

[[dialogue]]
speaker = "マリオン"
# 「ちょっかいだなんて、そんな。楽しくお話をしていただけですよ。ヨミ様もせつな様も嫌がっているようには見えませんでしたけど？」
line = "「ちょっかいだなんて、そんな。楽しくお話をしていただけですよ。ヨミ様もせつな様も嫌がっているようには見えませんでしたけど？」"

[[dialogue]]
speaker = "美鶴"
# 「それがマリオンさんの手口なんでしょ。うちの子らにナンパすんの、やめてもらっていいかな」
line = "「それがマリオンさんの手口なんでしょ。うちの子らにナンパすんの、やめてもらっていいかな」"

[[dialogue]]
speaker = "マリオン"
# 「まあまあ。お可愛い女の子と話すのを禁じられるなんて、私にとって呼吸をするなというようなもの。私、死んでしまいます」
line = "「まあまあ。お可愛い女の子と話すのを禁じられるなんて、私にとって呼吸をするなというようなもの。私、死んでしまいます」"

[[dialogue]]
speaker = "美鶴"
# 「それなら、ちょうどいい決め方があるじゃん。うちもマリオンさんも服飾のエキスパート。──ってことはさ」
line = "「それなら、ちょうどいい決め方があるじゃん。うちもマリオンさんも服飾のエキスパート。──ってことはさ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「面白いわね！　クロトのファッションショーで勝負といきましょう！」
line = "「面白いわね！　クロトのファッションショーで勝負といきましょう！」"

[[dialogue]]
speaker = "マリオン"
# 「ふふ、しかしただのファッションショーではありませんよね、美鶴様」
line = "「ふふ、しかしただのファッションショーではありませんよね、美鶴様」"

[[dialogue]]
speaker = "美鶴"
# 「うん。どうやら作り手は惹かれ合い、その発想も同じになるみたいすね」
line = "「うん。どうやら作り手は惹かれ合い、その発想も同じになるみたいすね」"

[[dialogue]]
speaker = "マリオン"
# 「それでは──」
line = "「それでは──」"

[[dialogue]]
speaker = "マリオン"
# 「会長様の女装ファッションショー、開幕でーーーす♪」
line = "「会長様の女装ファッションショー、開幕でーーーす♪」"

[[dialogue]]
speaker = "unk"
# なんで女装ーーーーっ！！？！？
line = "なんで女装ーーーーっ！！？！？"

[[dialogue]]
speaker = "unk"
# こうして、俺の意志を完全に無視した女の闘いの火蓋が切って落とされたのである。
line = "こうして、俺の意志を完全に無視した女の闘いの火蓋が切って落とされたのである。"

[[dialogue]]
speaker = "ヴィーナス"
# 「まずはウェイトレスからね！　定番だけど定番ゆえの良さがあるわね！　これはどっちの作品かしら」
line = "「まずはウェイトレスからね！　定番だけど定番ゆえの良さがあるわね！　これはどっちの作品かしら」"

[[dialogue]]
speaker = "美鶴"
# 「うちのです。フリルを全身に施しながらも、下品にならないバランスに苦労しました」
line = "「うちのです。フリルを全身に施しながらも、下品にならないバランスに苦労しました」"

[[dialogue]]
speaker = "マリオン"
# 「まあまあまあ……会長様、なんてお可愛らしい……<emoji=heart04>　はっ、いけません、お次は私の衣装を」
line = "「まあまあまあ……会長様、なんてお可愛らしい……<emoji=heart04>　はっ、いけません、お次は私の衣装を」"

[[dialogue]]
speaker = "マリオン"
# 「私の作品はメイド服！　クラシカルさとモダンさを兼ね備えた一品です♪」
line = "「私の作品はメイド服！　クラシカルさとモダンさを兼ね備えた一品です♪」"

[[dialogue]]
speaker = "美鶴"
# 「くっ……メイドなんて見慣れてると思ったけど、九浄家と星見家のメイド服のいいとこ取り……しかも、会長さんにチョー似合ってるし……やるじゃん」
line = "「くっ……メイドなんて見慣れてると思ったけど、九浄家と星見家のメイド服のいいとこ取り……しかも、会長さんにチョー似合ってるし……やるじゃん」"

[[dialogue]]
speaker = "ヴィーナス"
# 「さ、次々行くわよ！　クロト、ちゃっちゃと着替えて！」
line = "「さ、次々行くわよ！　クロト、ちゃっちゃと着替えて！」"

[[dialogue]]
speaker = "美鶴"
# 「チアガール！　看護師！　サンタ水着！」
line = "「チアガール！　看護師！　サンタ水着！」"

[[dialogue]]
speaker = "マリオン"
# 「巫女！　ウェディングドレス！　魔法少女！」
line = "「巫女！　ウェディングドレス！　魔法少女！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「なんだかんだ言いながらも着こなしているクロトが凄いわね！　そんじょそこらの女の子より、ずっと可愛いわ！」
line = "「なんだかんだ言いながらも着こなしているクロトが凄いわね！　そんじょそこらの女の子より、ずっと可愛いわ！」"

[[dialogue]]
speaker = "unk"
# もうどうにでもな～れ♪
line = "もうどうにでもな～れ♪"

[[dialogue]]
speaker = "unk"
# なんで着ちゃってるんだろう……
line = "なんで着ちゃってるんだろう……"

[[dialogue]]
speaker = "マリオン"
# 「ふふっ……会長様の魅力を十全に引き出している……なかなかやりますね、美鶴様」
line = "「ふふっ……会長様の魅力を十全に引き出している……なかなかやりますね、美鶴様」"

[[dialogue]]
speaker = "美鶴"
# 「マリオンさんの魔法少女コスもさすがだね。うちも発想はあったけど、形にはできなかった」
line = "「マリオンさんの魔法少女コスもさすがだね。うちも発想はあったけど、形にはできなかった」"

[[dialogue]]
speaker = "ヴィーナス"
# 「うう～ん、どっちも甲乙つけがたいわね！　最後はクロトに決めてもらいましょ！」
line = "「うう～ん、どっちも甲乙つけがたいわね！　最後はクロトに決めてもらいましょ！」"

[[dialogue]]
speaker = "unk"
# 恥辱にまみれた決戦投票は、俺に委ねられた。
line = "恥辱にまみれた決戦投票は、俺に委ねられた。"

[[dialogue]]
speaker = "unk"
# マリオンの方がフィット感が完璧だった
line = "マリオンの方がフィット感が完璧だった"

[[dialogue]]
speaker = "unk"
# 勝者は……マリオン！
line = "勝者は……マリオン！"

[[dialogue]]
speaker = "美鶴"
# 「ちぇ、うちの負けか」
line = "「ちぇ、うちの負けか」"

[[dialogue]]
speaker = "マリオン"
# 「ふふふ、会長様のお傍で、微に入り細を穿つように、会長様をじ～っくり観察してきましたから」
line = "「ふふふ、会長様のお傍で、微に入り細を穿つように、会長様をじ～っくり観察してきましたから」"

[[dialogue]]
speaker = "マリオン"
# 「会長様の丈、似合う色やデザイン……世界で一番、誰よりも理解っているつもりですよ」
line = "「会長様の丈、似合う色やデザイン……世界で一番、誰よりも理解っているつもりですよ」"

[[dialogue]]
speaker = "美鶴"
# 「単に趣味で作ってたうちとは熱意が違ったってわけだ。そこまで会長さんを思ってるなら本物だね。降参。うちの負けを認めるよ」
line = "「単に趣味で作ってたうちとは熱意が違ったってわけだ。そこまで会長さんを思ってるなら本物だね。降参。うちの負けを認めるよ」"

[[dialogue]]
speaker = "マリオン"
# 「では、敗者には罰ゲームと参りましょう<emoji=heart04>　美鶴様にはこちらの衣装を着てもらいましょうか」
line = "「では、敗者には罰ゲームと参りましょう<emoji=heart04>　美鶴様にはこちらの衣装を着てもらいましょうか」"

[[dialogue]]
speaker = "美鶴"
# 「いや、罰ゲームは聞いてないし。つか、衣装って……ほとんど布ないじゃん。これって逆バニー？」
line = "「いや、罰ゲームは聞いてないし。つか、衣装って……ほとんど布ないじゃん。これって逆バニー？」"

[[dialogue]]
speaker = "美鶴"
# 「ま、仕方ないね。作り手として負けた以上、このくらいの辱めは甘んじて受け入れるよ」
line = "「ま、仕方ないね。作り手として負けた以上、このくらいの辱めは甘んじて受け入れるよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「作り手としてのプライドが高いわね！」
line = "「作り手としてのプライドが高いわね！」"

[[dialogue]]
speaker = "unk"
# 受け入れないでいいからね！？
line = "受け入れないでいいからね！？"

[[dialogue]]
speaker = "マリオン"
# 「まあまあ、会長様ストップがかかってしまったのなら諦めざるを得ませんね。美鶴様の艶姿、見られなくて残念です」
line = "「まあまあ、会長様ストップがかかってしまったのなら諦めざるを得ませんね。美鶴様の艶姿、見られなくて残念です」"

[[dialogue]]
speaker = "マリオン"
# 「大きな勝利を飾ったことで満足するとして……では、逆バニーはいずれ、会長様に着ていただきましょうか♪」
line = "「大きな勝利を飾ったことで満足するとして……では、逆バニーはいずれ、会長様に着ていただきましょうか♪」"

[[dialogue]]
speaker = "美鶴"
# 「なにそれ見たい」
line = "「なにそれ見たい」"

[[dialogue]]
speaker = "unk"
# 絶対着ません！！！
line = "絶対着ません！！！"

[[dialogue]]
speaker = "unk"
# 今回のファッションショーの真の敗者は──
line = "今回のファッションショーの真の敗者は──"

[[dialogue]]
speaker = "unk"
# 男としてのプライドを傷つけられまくった、俺なのであった……
line = "男としてのプライドを傷つけられまくった、俺なのであった……"
