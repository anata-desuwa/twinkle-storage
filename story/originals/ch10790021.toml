[[dialogue]]
speaker = "unk"
# 第１話,附属のプルちゃん,P
line = "第１話,附属のプルちゃん,P"

[[dialogue]]
speaker = "unk"
# 今日は用事があって流星附属校に来たのだが──
line = "今日は用事があって流星附属校に来たのだが──"

[[dialogue]]
speaker = "？？？"
# 「ふんふふ～ん♪」
line = "「ふんふふ～ん♪」"

[[dialogue]]
speaker = "unk"
# パテル……！？
line = "パテル……！？"

[[dialogue]]
speaker = "？？？"
# 「パテル～？　誰のことかな？　キュートでぷりちーな守護天使様のことなんて、あたし知らないな～」
line = "「パテル～？　誰のことかな？　キュートでぷりちーな守護天使様のことなんて、あたし知らないな～」"

[[dialogue]]
speaker = "プルちゃん？"
# 「あたしプルちゃん！　カワイイカワイイ附属校のアイドルだよ！」
line = "「あたしプルちゃん！　カワイイカワイイ附属校のアイドルだよ！」"

[[dialogue]]
speaker = "プルちゃん？"
# （な～んてね。後で話そっか、おにーさん）
line = "（な～んてね。後で話そっか、おにーさん）"

[[dialogue]]
speaker = "unk"
# 用事を済ませて、カフェテリアでパテルと落ち合った。
line = "用事を済ませて、カフェテリアでパテルと落ち合った。"

[[dialogue]]
speaker = "パテル"
# 「やぁ、魔王。ここで会うのは初めてだね」
line = "「やぁ、魔王。ここで会うのは初めてだね」"

[[dialogue]]
speaker = "パテル"
# 「あたしは附属の生徒じゃないって？　そうだよ。あたしは制服をパク──借りてるだけで、附属校には在籍してない」
line = "「あたしは附属の生徒じゃないって？　そうだよ。あたしは制服をパク──借りてるだけで、附属校には在籍してない」"

[[dialogue]]
speaker = "パテル"
# 「でもこの制服を着て堂々としてたら、案外気付かれないもんだよ」
line = "「でもこの制服を着て堂々としてたら、案外気付かれないもんだよ」"

[[dialogue]]
speaker = "パテル"
# 「オペレーション・ペンタグラムで一緒に戦った子もいるけど、その子たちは逆に『守護天使がいるのは何か意味があるのかな』って思ってスルーしてくれるし」
line = "「オペレーション・ペンタグラムで一緒に戦った子もいるけど、その子たちは逆に『守護天使がいるのは何か意味があるのかな』って思ってスルーしてくれるし」"

[[dialogue]]
speaker = "unk"
# そうなんだ……
line = "そうなんだ……"

[[dialogue]]
speaker = "ミウ"
# 「あ、プルちゃん、会長さん、こんにちは。プルちゃんって会長さんと知り合いだったんだね」
line = "「あ、プルちゃん、会長さん、こんにちは。プルちゃんって会長さんと知り合いだったんだね」"

[[dialogue]]
speaker = "パテル"
# 「うん、そうなんだ～。新星の会長さんって、優しくて頼りになって素敵だよね」
line = "「うん、そうなんだ～。新星の会長さんって、優しくて頼りになって素敵だよね」"

[[dialogue]]
speaker = "ミウ"
# 「わかるなぁ……私もヒマワリちゃんも会長さんにはお世話になってるし」
line = "「わかるなぁ……私もヒマワリちゃんも会長さんにはお世話になってるし」"

[[dialogue]]
speaker = "ミウ"
# 「私はヒマワリちゃんと約束があるからこれで。会長さんもゴールデングースの事務所でまたお会いしましょう」
line = "「私はヒマワリちゃんと約束があるからこれで。会長さんもゴールデングースの事務所でまたお会いしましょう」"

[[dialogue]]
speaker = "パテル"
# 「じゃ～ね～」
line = "「じゃ～ね～」"

[[dialogue]]
speaker = "unk"
# 普通に馴染んでる……！
line = "普通に馴染んでる……！"

[[dialogue]]
speaker = "パテル"
# 「あたしのキュートさと順応力をもってすれば、附属生になりきるくらいわけないよ」
line = "「あたしのキュートさと順応力をもってすれば、附属生になりきるくらいわけないよ」"

[[dialogue]]
speaker = "パテル"
# 「でもかわいすぎて目立っちゃうとバレるから、そこは気をつけないといけないかなぁ～」
line = "「でもかわいすぎて目立っちゃうとバレるから、そこは気をつけないといけないかなぁ～」"

[[dialogue]]
speaker = "unk"
# 附属の先生に不審者がいるって伝えておこう
line = "附属の先生に不審者がいるって伝えておこう"

[[dialogue]]
speaker = "パテル"
# 「待って！　バラしちゃダメ！　大人しくしてるから言わないで～っ！」
line = "「待って！　バラしちゃダメ！　大人しくしてるから言わないで～っ！」"

[[dialogue]]
speaker = "パテル"
# 「……別に言う気はない？　もう、あたしをからかうなんて、悪い魔王様なんだから。こんなにキュートな死神を不審者呼ばわりなんて失礼だよ」
line = "「……別に言う気はない？　もう、あたしをからかうなんて、悪い魔王様なんだから。こんなにキュートな死神を不審者呼ばわりなんて失礼だよ」"

[[dialogue]]
speaker = "パテル"
# 「ん？　あたしが附属で何してるのかって？　そうだなぁ……適当に校内を見て回ったり、気が向いたら授業聞いたりするくらいだけど」
line = "「ん？　あたしが附属で何してるのかって？　そうだなぁ……適当に校内を見て回ったり、気が向いたら授業聞いたりするくらいだけど」"

[[dialogue]]
speaker = "パテル"
# 「あと、気になる子の様子を見たりかな」
line = "「あと、気になる子の様子を見たりかな」"

[[dialogue]]
speaker = "パテル"
# 「たとえば染井シズハ。彼女は本来病で命を落とすはずだったけど、ロストアイテムによって生きながらえた」
line = "「たとえば染井シズハ。彼女は本来病で命を落とすはずだったけど、ロストアイテムによって生きながらえた」"

[[dialogue]]
speaker = "パテル"
# 「だから何かしら彼女に異変がないか、観察しているんだ」
line = "「だから何かしら彼女に異変がないか、観察しているんだ」"

[[dialogue]]
speaker = "パテル"
# 「ああ、警戒しなくても大丈夫だよ、魔王」
line = "「ああ、警戒しなくても大丈夫だよ、魔王」"

[[dialogue]]
speaker = "パテル"
# 「ロストアイテムによる奇跡とはいえ、彼女は試練を乗り越えた。だから連れていくつもりはないよ。念のため様子を見ているだけ」
line = "「ロストアイテムによる奇跡とはいえ、彼女は試練を乗り越えた。だから連れていくつもりはないよ。念のため様子を見ているだけ」"

[[dialogue]]
speaker = "パテル"
# 「ただ、このことは本人には秘密にしておいてほしいんだ」
line = "「ただ、このことは本人には秘密にしておいてほしいんだ」"

[[dialogue]]
speaker = "パテル"
# 「かつての彼女の生活は、死神に付きまとわれているようなものだっただろうからね。死神に見られてるなんて知らない方がいいでしょ」
line = "「かつての彼女の生活は、死神に付きまとわれているようなものだっただろうからね。死神に見られてるなんて知らない方がいいでしょ」"

[[dialogue]]
speaker = "パテル"
# 「──！　ごめん、ちょっと隠れるね」
line = "「──！　ごめん、ちょっと隠れるね」"

[[dialogue]]
speaker = "シズハ"
# 「こんにちは、会長」
line = "「こんにちは、会長」"

[[dialogue]]
speaker = "シズハ"
# 「会長は知ってるかしら？　附属の制服を着た謎の生徒が、附属校に出入りしてるって噂」
line = "「会長は知ってるかしら？　附属の制服を着た謎の生徒が、附属校に出入りしてるって噂」"

[[dialogue]]
speaker = "unk"
# （ギクッ）
line = "（ギクッ）"

[[dialogue]]
speaker = "シズハ"
# 「！　その反応……もしかしてその生徒を知ってるの？　だったらその子のことを教えて」
line = "「！　その反応……もしかしてその生徒を知ってるの？　だったらその子のことを教えて」"

[[dialogue]]
speaker = "unk"
# パテルが隠れている方に視線を送ると──
line = "パテルが隠れている方に視線を送ると──"

[[dialogue]]
speaker = "パテル"
# （言ったでしょ、秘密にしてって。適当にごまかしといて）
line = "（言ったでしょ、秘密にしてって。適当にごまかしといて）"

[[dialogue]]
speaker = "シズハ"
# 「私、その子にどうしても会いたいの。だって──」
line = "「私、その子にどうしても会いたいの。だって──」"

[[dialogue]]
speaker = "シズハ"
# 「その子、とっても美少女だって聞いたから！　絶対お尻を触って仲良くなるわ！！」
line = "「その子、とっても美少女だって聞いたから！　絶対お尻を触って仲良くなるわ！！」"

[[dialogue]]
speaker = "パテル"
# （あたし狙われてる！？）
line = "（あたし狙われてる！？）"

[[dialogue]]
speaker = "unk"
# 深淵を覗く時、深淵もこちらを覗いている──そんな言葉が脳裏に浮かんだ。
line = "深淵を覗く時、深淵もこちらを覗いている──そんな言葉が脳裏に浮かんだ。"

[[dialogue]]
speaker = "unk"
# パテルのお尻の運命はいかに。
line = "パテルのお尻の運命はいかに。"
