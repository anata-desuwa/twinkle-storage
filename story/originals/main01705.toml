speaker = "unk"
# ──３人の魔王を合わせて。
line = "──３人の魔王を合わせて。"

[[dialogue]]
speaker = "unk"
# ──３つの世界を救う。
line = "──３つの世界を救う。"

[[dialogue]]
speaker = "unk"
# それは──本来交わることなんてなかったはずの、幾多もの運命が絡み合って生まれた奇跡。
line = "それは──本来交わることなんてなかったはずの、幾多もの運命が絡み合って生まれた奇跡。"

[[dialogue]]
speaker = "マトイ"
# 「すごい……！　魔王の力が──ひとつになってる……！」
line = "「すごい……！　魔王の力が──ひとつになってる……！」"

[[dialogue]]
speaker = "ニャリオン"
# 「こんニャのは初めてニャン……！　前の森羅暦でも、ありえなかったはずニャ……！」
line = "「こんニャのは初めてニャン……！　前の森羅暦でも、ありえなかったはずニャ……！」"

[[dialogue]]
speaker = "リノ"
# （この光──そっか……）
line = "（この光──そっか……）"

[[dialogue]]
speaker = "リノ"
# （なんだか……腑に落ちた気がするわ。ネビュラにもたどり着けなかった、アルタイルを救済する方法）
line = "（なんだか……腑に落ちた気がするわ。ネビュラにもたどり着けなかった、アルタイルを救済する方法）"

[[dialogue]]
speaker = "リノ"
# （３人の魔王が結集するなんて──そんなの、考えもしなかったわね……）
line = "（３人の魔王が結集するなんて──そんなの、考えもしなかったわね……）"

[[dialogue]]
speaker = "unk"
# たったひとつの使命を元に集まった俺たち。その総力は何倍にも跳ね上がる！
line = "たったひとつの使命を元に集まった俺たち。その総力は何倍にも跳ね上がる！"

[[dialogue]]
speaker = "クロト"
# 「ベガとデネブは確かに手遅れだったのかもしれない。だけど、そのためにヴィーナスは来てくれた」
line = "「ベガとデネブは確かに手遅れだったのかもしれない。だけど、そのためにヴィーナスは来てくれた」"

[[dialogue]]
speaker = "クロト"
# 「不甲斐ない俺を目覚めさせて。女神や守護天使たちの導きも通じて。ここまできた」
line = "「不甲斐ない俺を目覚めさせて。女神や守護天使たちの導きも通じて。ここまできた」"

[[dialogue]]
speaker = "クロト"
# 「その全部──他の平行世界にはなかった、未知の物語だったはずだ」
line = "「その全部──他の平行世界にはなかった、未知の物語だったはずだ」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
# 「ええ。そして、遠回りでしたが姉さんも」
line = "「ええ。そして、遠回りでしたが姉さんも」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
# 「こうして私たちが一丸となった今──きっと、超えられない壁なんてないはずです」
line = "「こうして私たちが一丸となった今──きっと、超えられない壁なんてないはずです」"

[[dialogue]]
speaker = "魔神ギエル"
# 「未知の物語……下らない。たとえ道筋が変わろうとも、行き着く末路は同じに決まっている」
line = "「未知の物語……下らない。たとえ道筋が変わろうとも、行き着く末路は同じに決まっている」"

[[dialogue]]
speaker = "魔神ギエル"
# 「その程度で……宇宙の啓示に抗えるなどと、思い上がるな！」
line = "「その程度で……宇宙の啓示に抗えるなどと、思い上がるな！」"

[[dialogue]]
speaker = "クロト"
# 「あいにく──星騎士はそういう存在なんでな」
line = "「あいにく──星騎士はそういう存在なんでな」"

[[dialogue]]
speaker = "クロト"
# 「俺たちはアルタイルを救う。俺たち全員の生きてきたこの世界だけは、決して終わらせやしない」
line = "「俺たちはアルタイルを救う。俺たち全員の生きてきたこの世界だけは、決して終わらせやしない」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
# 「はい。なぜなら私たちは──世界の命運を担う『魔王』だから」
line = "「はい。なぜなら私たちは──世界の命運を担う『魔王』だから」"

[[dialogue]]
speaker = "アポロ"
# 「ギエル──オマエにも教えてやる。どんな目に遭ったって、希望は潰えやしないってこと」
line = "「ギエル──オマエにも教えてやる。どんな目に遭ったって、希望は潰えやしないってこと」"

[[dialogue]]
speaker = "マトイ"
# 「すごい……３人の光が……！」
line = "「すごい……３人の光が……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「魔王と魔王と魔王のパワーが合わさって──えぇと、なんかもうとりあえず最強だわ！」
line = "「魔王と魔王と魔王のパワーが合わさって──えぇと、なんかもうとりあえず最強だわ！」"

[[dialogue]]
speaker = "unk"
# ギエルの『影』にも負けない星と魔と霊の力が巨大な器に渦を巻く。
line = "ギエルの『影』にも負けない星と魔と霊の力が巨大な器に渦を巻く。"

[[dialogue]]
speaker = "unk"
# 魔王と魔王と魔王による三重奏──その総力は、たとえリクリエ相手にも引けを取らない！
line = "魔王と魔王と魔王による三重奏──その総力は、たとえリクリエ相手にも引けを取らない！"

[[dialogue]]
speaker = "魔神ギエル"
# 「ああ……小賢シイ……３０００年前のラクシスと……何モ変わってイナイ……イヤ……あれより醜イ……」
line = "「ああ……小賢シイ……３０００年前のラクシスと……何モ変わってイナイ……イヤ……あれより醜イ……」"

[[dialogue]]
speaker = "魔神ギエル"
# 「何ガ仲間だ……何が希望ダ……平等な終末は、スグそこに迫っていたとイウノニ。……アア、鬱陶シイ鬱陶シイ鬱陶シイ────！！」
line = "「何ガ仲間だ……何が希望ダ……平等な終末は、スグそこに迫っていたとイウノニ。……アア、鬱陶シイ鬱陶シイ鬱陶シイ────！！」"

[[dialogue]]
speaker = "マトイ"
# 「っ……何……！？」
line = "「っ……何……！？」"

[[dialogue]]
speaker = "ニャリオン"
# 「ますます人間じゃなくなってくニャン──！？」
line = "「ますます人間じゃなくなってくニャン──！？」"

[[dialogue]]
speaker = "unk"
# じゅくじゅくと不気味な音を立て、ギエルの血肉はさらなる変貌を遂げていた。
line = "じゅくじゅくと不気味な音を立て、ギエルの血肉はさらなる変貌を遂げていた。"

[[dialogue]]
speaker = "unk"
# 心臓部に埋もれた覇霊玉が妖しい光を放つ──
line = "心臓部に埋もれた覇霊玉が妖しい光を放つ──"

[[dialogue]]
speaker = "魔神ギエル"
# 「終ワリにシマショウ。アナタたちサエ潰セバ、もはやアルタイルに邪魔はナイ」
line = "「終ワリにシマショウ。アナタたちサエ潰セバ、もはやアルタイルに邪魔はナイ」"

[[dialogue]]
speaker = "魔神ギエル"
# 「見ていてクダサイねェ、今ハ亡キ我ガ<ruby=イニシエ>古</ruby>の主……従順ナル<ruby=シモベ>下僕</ruby>ガ、真の終焉ヲもたらす様ヲォ！！」
line = "「見ていてクダサイねェ、今ハ亡キ我ガ<ruby>古<rt>イニシエ</rt></ruby>の主……従順ナル<ruby>下僕<rt>シモベ</rt></ruby>ガ、真の終焉ヲもたらす様ヲォ！！」"

[[dialogue]]
speaker = "クロト"
# 「いくぞアポロ、フィオナ──ギエルと覇霊玉を全力で粉砕する！」
line = "「いくぞアポロ、フィオナ──ギエルと覇霊玉を全力で粉砕する！」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
# 「ええ──太陽の輝きに懸けて！」
line = "「ええ──太陽の輝きに懸けて！」"

[[dialogue]]
speaker = "アポロ"
# 「主としてのケジメ、果たしてやる！」
line = "「主としてのケジメ、果たしてやる！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私たちも──全力でサポートするわ！」
line = "「私たちも──全力でサポートするわ！」"

[[dialogue]]
speaker = "ソフィア"
# 「はいっ──！」
line = "「はいっ──！」"

[[dialogue]]
speaker = "魔神ギエル"
# 「来ルガヨイ、魔王ドモ──今コソ宇宙ノ再創生ヲ願ウ時！」
line = "「来ルガヨイ、魔王ドモ──今コソ宇宙ノ再創生ヲ願ウ時！」"
