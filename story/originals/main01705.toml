line = "「この手で魔王<b>たち</b>を<ruby>斃<rt>たお</rt></ruby>し……リクリエを為し……そして、<ruby>終<rt>つい</rt></ruby>には私も消える」"

[[dialogue]]
speaker = "魔神ギエル"
