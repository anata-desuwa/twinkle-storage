[[dialogue]]
speaker = "unk"
# 第２話,甘々サンドイッチ,P
line = "第２話,甘々サンドイッチ,P"

[[dialogue]]
speaker = "unk"
# マグダレナと俺の家で過ごす約束をしていたある休日のこと。彼女を出迎えると――
line = "マグダレナと俺の家で過ごす約束をしていたある休日のこと。彼女を出迎えると――"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「お邪魔しま～す♪」
line = "「お邪魔しま～す♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「――早速なのですが、会長。実は今日、サプライズを用意してまして……」
line = "「――早速なのですが、会長。実は今日、サプライズを用意してまして……」"

[[dialogue]]
speaker = "大人ダレナ"
# 「じゃ～ん♪　見て下さい、ダブルママダレナですよ～♪」
line = "「じゃ～ん♪　見て下さい、ダブルママダレナですよ～♪」"

[[dialogue]]
speaker = "unk"
# えっ、マグダレナが２人！？
line = "えっ、マグダレナが２人！？"

[[dialogue]]
speaker = "大人ダレナ"
# 「はい♪　実はアニマさまから、新しい薬の実験を頼まれまして――」
line = "「はい♪　実はアニマさまから、新しい薬の実験を頼まれまして――」"

[[dialogue]]
speaker = "unk"
# 聞けば、魂を２つに分裂させるという『分裂薬』を飲んだことで、２つのアバターを同時に動かすことが可能になったのだという。
line = "聞けば、魂を２つに分裂させるという『分裂薬』を飲んだことで、２つのアバターを同時に動かすことが可能になったのだという。"

[[dialogue]]
speaker = "大人ダレナ"
# 「――アニマさま、またとんでもないものを作ったって？　ふふっ、私も驚いてしまいました」
line = "「――アニマさま、またとんでもないものを作ったって？　ふふっ、私も驚いてしまいました」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「でも、分裂薬を作ろうと思ったのは、会長が新星学園に通いながらも、附属校にもまた通えるようにできたらと考えたからみたいですよ？」
line = "「でも、分裂薬を作ろうと思ったのは、会長が新星学園に通いながらも、附属校にもまた通えるようにできたらと考えたからみたいですよ？」"

[[dialogue]]
speaker = "unk"
# ならちゃんと、後でお礼を伝えないとな
line = "ならちゃんと、後でお礼を伝えないとな"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「はい♪　私もまた、会長と附属校に通うことができたら、とても嬉しいです♪」
line = "「はい♪　私もまた、会長と附属校に通うことができたら、とても嬉しいです♪」"

[[dialogue]]
speaker = "大人ダレナ"
# 「それで、とりあえずこうして、分裂することに成功したわけですし――」
line = "「それで、とりあえずこうして、分裂することに成功したわけですし――」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「せっかくですから今日は、私たち２人で、会長を甘やかしちゃいますね♪」
line = "「せっかくですから今日は、私たち２人で、会長を甘やかしちゃいますね♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「ふふっ、まずはこうして両側から抱き着いて挟んじゃいます♪」
line = "「ふふっ、まずはこうして両側から抱き着いて挟んじゃいます♪」"

[[dialogue]]
speaker = "大人ダレナ"
# 「ママダレナサンドイッチですね♪」
line = "「ママダレナサンドイッチですね♪」"

[[dialogue]]
speaker = "unk"
# う、腕が別のものにも挟まれて……！
line = "う、腕が別のものにも挟まれて……！"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「ふふっ、会長、体が固くなってますよ<emoji=heart04>　緊張しちゃいましたか？」
line = "「ふふっ、会長、体が固くなってますよ<emoji=heart04>　緊張しちゃいましたか？」"

[[dialogue]]
speaker = "大人ダレナ"
# 「もっと肩の力を抜いて、リラックスして下さい」
line = "「もっと肩の力を抜いて、リラックスして下さい」"

[[dialogue]]
speaker = "大人ダレナ"
# 「会長さまにはもっと、心を許して欲しいのです。私たちは、恋人なのですから……」
line = "「会長さまにはもっと、心を許して欲しいのです。私たちは、恋人なのですから……」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「会長……ちゅっ……<emoji=heart04>」
line = "「会長……ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "大人ダレナ"
# 「私もしちゃいます<emoji=heart04>　ちゅっ……<emoji=heart04>」
line = "「私もしちゃいます<emoji=heart04>　ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「ちゅっ……ちゅっ……<emoji=heart04>」
line = "「ちゅっ……ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ２人から、何度もキスをされる。
line = "２人から、何度もキスをされる。"

[[dialogue]]
speaker = "unk"
# き、今日のマグダレナ、すごく大胆……！
line = "き、今日のマグダレナ、すごく大胆……！"

[[dialogue]]
speaker = "大人ダレナ"
# 「んっ……そうかもしれません……<emoji=heart04>　もしかすると、これがアニマさまが言っていた、分裂薬の副作用なのかも<emoji=heart04>　効果には個人差があるそうですが……」
line = "「んっ……そうかもしれません……<emoji=heart04>　もしかすると、これがアニマさまが言っていた、分裂薬の副作用なのかも<emoji=heart04>　効果には個人差があるそうですが……」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「会長を見ていると、愛おしい気持ちが溢れてきて、止められなくなってしまう感じです……<emoji=heart04>」
line = "「会長を見ていると、愛おしい気持ちが溢れてきて、止められなくなってしまう感じです……<emoji=heart04>」"

[[dialogue]]
speaker = "大人ダレナ"
# 「いつもは自分からキスをしようとするのは恥ずかしくなってしまうのですが……今はもっと、したくなっちゃいます」
line = "「いつもは自分からキスをしようとするのは恥ずかしくなってしまうのですが……今はもっと、したくなっちゃいます」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「好きです、会長……<emoji=heart04>」
line = "「好きです、会長……<emoji=heart04>」"

[[dialogue]]
speaker = "大人ダレナ"
# 「たとえリクリエとの戦いが終わっても、あなたのそばから離れるなんて考えられないくらい、愛しています……<emoji=heart04>」
line = "「たとえリクリエとの戦いが終わっても、あなたのそばから離れるなんて考えられないくらい、愛しています……<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「あっ……いま、すごく面白いことを考えちゃいました。もう１人の私、耳を貸して下さい……こしょこしょ」
line = "「あっ……いま、すごく面白いことを考えちゃいました。もう１人の私、耳を貸して下さい……こしょこしょ」"

[[dialogue]]
speaker = "大人ダレナ"
# 「ふむふむ……まあ<emoji=heart04>　それは、試してみたくてドキドキしてしまいますね♪」
line = "「ふむふむ……まあ<emoji=heart04>　それは、試してみたくてドキドキしてしまいますね♪」"

[[dialogue]]
speaker = "unk"
# ２人とも、一体何を話して……？
line = "２人とも、一体何を話して……？"

[[dialogue]]
speaker = "unk"
# 何度もキスされた余韻で、ちょっと思考がぼーっとなってしまう中、聞き返すと――
line = "何度もキスされた余韻で、ちょっと思考がぼーっとなってしまう中、聞き返すと――"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「会長、ちょっと体勢を変えますね～……はい♪」
line = "「会長、ちょっと体勢を変えますね～……はい♪」"

[[dialogue]]
speaker = "大人ダレナ"
# 「大きい方の私は後ろから、こうやって会長さまを抱き締めて……<emoji=heart04>」
line = "「大きい方の私は後ろから、こうやって会長さまを抱き締めて……<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「小さい方の私は、会長の膝の上に乗って、前から抱き着いちゃいます<emoji=heart04>」
line = "「小さい方の私は、会長の膝の上に乗って、前から抱き着いちゃいます<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 前からも柔らかい感触がきて、体が一気に熱くなる。
line = "前からも柔らかい感触がきて、体が一気に熱くなる。"

[[dialogue]]
speaker = "大人ダレナ"
# 「前に聞いたことのある言葉から引用して……名付けて、『だいしゅきダブルホールド』です<emoji=heart04>」
line = "「前に聞いたことのある言葉から引用して……名付けて、『だいしゅきダブルホールド』です<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ぐっ……ぐああぁぁっ！！？
line = "ぐっ……ぐああぁぁっ！！？"

[[dialogue]]
speaker = "unk"
# これまで想像したこともない、前後から大きくて柔らかい感触に挟まれたサンドイッチ。男でこの破壊力に堪えられる者がいるのだろうか。
line = "これまで想像したこともない、前後から大きくて柔らかい感触に挟まれたサンドイッチ。男でこの破壊力に堪えられる者がいるのだろうか。"

[[dialogue]]
speaker = "大人ダレナ"
# 「あっ……ふふっ♪　会長さまの心臓がすごくドキドキしているのが伝わってきます<emoji=heart04>」
line = "「あっ……ふふっ♪　会長さまの心臓がすごくドキドキしているのが伝わってきます<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺がそれ以上我慢ができずに思わず、目の前の小さいマグダレナの体を強く抱き締めてしまう。
line = "俺がそれ以上我慢ができずに思わず、目の前の小さいマグダレナの体を強く抱き締めてしまう。"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「って、あっ、会長……<emoji=heart04>」
line = "「って、あっ、会長……<emoji=heart04>」"

[[dialogue]]
speaker = "大人ダレナ"
# 「少し、やり過ぎてしまいましたかね……<emoji=heart04>」
line = "「少し、やり過ぎてしまいましたかね……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# これ以上は色々と限界です
line = "これ以上は色々と限界です"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「いいですよ～……<emoji=heart04>　いっぱい甘えて下さい。恋人として、ちゃんと責任をもって受け止めますから<emoji=heart04>」
line = "「いいですよ～……<emoji=heart04>　いっぱい甘えて下さい。恋人として、ちゃんと責任をもって受け止めますから<emoji=heart04>」"

[[dialogue]]
speaker = "大人ダレナ"
# 「ただ、小さい私だけじゃなくて、大きい私もちゃんと相手して下さいね<emoji=heart04>」
line = "「ただ、小さい私だけじゃなくて、大きい私もちゃんと相手して下さいね<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ×２"
# 「ん……ちゅっ<emoji=heart04>」
line = "「ん……ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺はそのまま、何も考えられなくなってしまうくらい２人との甘々な時間に溺れてしてしまうのだった――
line = "俺はそのまま、何も考えられなくなってしまうくらい２人との甘々な時間に溺れてしてしまうのだった――"
