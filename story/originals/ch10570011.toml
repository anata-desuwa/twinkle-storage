[[dialogue]]
speaker = "unk"
# 第１話,不幸を吹き飛ばす味,P
line = "第１話,不幸を吹き飛ばす味,P"

[[dialogue]]
speaker = "unk"
# 魔界の都市レゾフで出会った、星騎士ではないのに星術を使うことのできる占星術師──トリシャ＝アポテレスマティカ。
line = "魔界の都市レゾフで出会った、星騎士ではないのに星術を使うことのできる占星術師──トリシャ＝アポテレスマティカ。"

[[dialogue]]
speaker = "unk"
# ひょんなことから彼女の友人となった俺は、レゾフの街を案内してもらうことになり……
line = "ひょんなことから彼女の友人となった俺は、レゾフの街を案内してもらうことになり……"

[[dialogue]]
speaker = "トリシャ"
# 「さっきのお店で……衣類はだいたい揃うかと……」
line = "「さっきのお店で……衣類はだいたい揃うかと……」"

[[dialogue]]
speaker = "トリシャ"
# 「レゾフは魔界の中でも極寒の地。コートや帽子をしっかり着込むのが、吉でしょうから……」
line = "「レゾフは魔界の中でも極寒の地。コートや帽子をしっかり着込むのが、吉でしょうから……」"

[[dialogue]]
speaker = "unk"
# トリシャさんは寒くないの？
line = "トリシャさんは寒くないの？"

[[dialogue]]
speaker = "トリシャ"
# 「私は寒さに強いので……それに分厚いコートと帽子を身に付けると、占い師であることが周りに伝わりません……」
line = "「私は寒さに強いので……それに分厚いコートと帽子を身に付けると、占い師であることが周りに伝わりません……」"

[[dialogue]]
speaker = "トリシャ"
# 「寒さに負けて着ぶくれしていては、大切な運命との邂逅を逃してしまう……」
line = "「寒さに負けて着ぶくれしていては、大切な運命との邂逅を逃してしまう……」"

[[dialogue]]
speaker = "トリシャ"
# 「現にあなたが私に声をかけたのも、この占い師の衣装が功を奏したはずです……」
line = "「現にあなたが私に声をかけたのも、この占い師の衣装が功を奏したはずです……」"

[[dialogue]]
speaker = "トリシャ"
# 「だから……ちょっぴり寒いけど我慢……っくしゅん」
line = "「だから……ちょっぴり寒いけど我慢……っくしゅん」"

[[dialogue]]
speaker = "トリシャ"
# 「ずずっ……で、案内の続きですが……」
line = "「ずずっ……で、案内の続きですが……」"

[[dialogue]]
speaker = "トリシャ"
# 「パンを買うなら、あの青白い街灯が目立つ店がオススメです……気さくな店主ですから、人間のあなたでも買いやすいかと……」
line = "「パンを買うなら、あの青白い街灯が目立つ店がオススメです……気さくな店主ですから、人間のあなたでも買いやすいかと……」"

[[dialogue]]
speaker = "トリシャ"
# 「しかし、基本的にレゾフの住人は親切です……困りごとがあれば、初対面でも頼って良いと、思います……」
line = "「しかし、基本的にレゾフの住人は親切です……困りごとがあれば、初対面でも頼って良いと、思います……」"

[[dialogue]]
speaker = "トリシャ"
# 「もちろん、私でも良いですよ……あなたと私は、友達。そう。友達同士ですから……フフ……友達とは、本当に、良い響き……」
line = "「もちろん、私でも良いですよ……あなたと私は、友達。そう。友達同士ですから……フフ……友達とは、本当に、良い響き……」"

[[dialogue]]
speaker = "トリシャ"
# 「……これで大体、レゾフで生活する上で必要なことは伝えられたはず……」
line = "「……これで大体、レゾフで生活する上で必要なことは伝えられたはず……」"

[[dialogue]]
speaker = "トリシャ"
# 「人間界は娯楽が充実していると聞きますし、それに比べたら退屈かもしれませんが……良い街、ですので……」
line = "「人間界は娯楽が充実していると聞きますし、それに比べたら退屈かもしれませんが……良い街、ですので……」"

[[dialogue]]
speaker = "トリシャ"
# 「さて……本当ならここでお別れするのですが……もう少しだけお時間、よろしいでしょうか……」
line = "「さて……本当ならここでお別れするのですが……もう少しだけお時間、よろしいでしょうか……」"

[[dialogue]]
speaker = "トリシャ"
# 「実は今朝、お出かけ前にあなたのことを占ったのです……あなたの運命の糸は、とても複雑で奇怪に絡み合っていますから……」
line = "「実は今朝、お出かけ前にあなたのことを占ったのです……あなたの運命の糸は、とても複雑で奇怪に絡み合っていますから……」"

[[dialogue]]
speaker = "トリシャ"
# 「そうしたら、今日の最後にわずかばかりの不幸があると、星が教えてくれたのです……」
line = "「そうしたら、今日の最後にわずかばかりの不幸があると、星が教えてくれたのです……」"

[[dialogue]]
speaker = "unk"
# ええっ！？
line = "ええっ！？"

[[dialogue]]
speaker = "トリシャ"
# 「これは定め事……宿運と言っても良いでしょう。避けることはできません……」
line = "「これは定め事……宿運と言っても良いでしょう。避けることはできません……」"

[[dialogue]]
speaker = "トリシャ"
# 「しかし、本当に些細な不幸です。誰かを永遠に失う、ひどい怪我を負う……そんな不幸では決してありません……」
line = "「しかし、本当に些細な不幸です。誰かを永遠に失う、ひどい怪我を負う……そんな不幸では決してありません……」"

[[dialogue]]
speaker = "トリシャ"
# 「しかし、不幸に変わりはなく。あなたとリンクしている守護星が教えてくれたので、確かです……」
line = "「しかし、不幸に変わりはなく。あなたとリンクしている守護星が教えてくれたので、確かです……」"

[[dialogue]]
speaker = "トリシャ"
# 「だからこそ今のうちに、あなたに幸せを増やしたい。たくさんの幸せがあれば、不幸に耐える覚悟ができます……」
line = "「だからこそ今のうちに、あなたに幸せを増やしたい。たくさんの幸せがあれば、不幸に耐える覚悟ができます……」"

[[dialogue]]
speaker = "トリシャ"
# 「あの……ここで、しばらく待っていてください。ちょっと『ある物』を、買ってきます……」
line = "「あの……ここで、しばらく待っていてください。ちょっと『ある物』を、買ってきます……」"

[[dialogue]]
speaker = "トリシャ"
# 「お待たせしました。フフ……どうぞ、これを……あ、手のひらに置きますので、指で掴まないように……」
line = "「お待たせしました。フフ……どうぞ、これを……あ、手のひらに置きますので、指で掴まないように……」"

[[dialogue]]
speaker = "トリシャ"
# 「これはレゾフの名産品……氷結ヨーグルト、です……」
line = "「これはレゾフの名産品……氷結ヨーグルト、です……」"

[[dialogue]]
speaker = "トリシャ"
# 「年中、氷点下を超えない極寒の地で作られる、シャーベット状のヨーグルトでして……」
line = "「年中、氷点下を超えない極寒の地で作られる、シャーベット状のヨーグルトでして……」"

[[dialogue]]
speaker = "トリシャ"
# 「フフ……地元民でも好き嫌いが別れるほどの、凍てつくうまさが炸裂する一品……レゾフに来たらこれを食さねば……です……」
line = "「フフ……地元民でも好き嫌いが別れるほどの、凍てつくうまさが炸裂する一品……レゾフに来たらこれを食さねば……です……」"

[[dialogue]]
speaker = "unk"
# 容器を持った指が貼りつく！？
line = "容器を持った指が貼りつく！？"

[[dialogue]]
speaker = "トリシャ"
# 「あ……だから持たないで、と……良かったですね、すぐに剥がせて……」
line = "「あ……だから持たないで、と……良かったですね、すぐに剥がせて……」"

[[dialogue]]
speaker = "トリシャ"
# 「３秒以上、素手で掴むと、お湯がない限りカップと一体化します……」
line = "「３秒以上、素手で掴むと、お湯がない限りカップと一体化します……」"

[[dialogue]]
speaker = "トリシャ"
# 「フフ……人体が許容できるギリギリの冷たさですから……食べる時は一気にいってください……」
line = "「フフ……人体が許容できるギリギリの冷たさですから……食べる時は一気にいってください……」"

[[dialogue]]
speaker = "トリシャ"
# 「怯えたまま食すと、内頬にひっついて取れなくなります……」
line = "「怯えたまま食すと、内頬にひっついて取れなくなります……」"

[[dialogue]]
speaker = "トリシャ"
# 「しかしそのリスクを超えた先にあるのは甘美な祝福……『おいしい』という流星群があなたの頭に降り注ぐはず……」
line = "「しかしそのリスクを超えた先にあるのは甘美な祝福……『おいしい』という流星群があなたの頭に降り注ぐはず……」"

[[dialogue]]
speaker = "トリシャ"
# 「共に広めてゆきましょう。氷結ヨーグルト愛好の輪を……」
line = "「共に広めてゆきましょう。氷結ヨーグルト愛好の輪を……」"

[[dialogue]]
speaker = "unk"
# い、いただきます……！
line = "い、いただきます……！"

[[dialogue]]
speaker = "トリシャ"
# 「フフ、フ……いかがでしょうか……」
line = "「フフ、フ……いかがでしょうか……」"

[[dialogue]]
speaker = "unk"
# これは……うまいっ！
line = "これは……うまいっ！"

[[dialogue]]
speaker = "トリシャ"
# 「喜んでもらえて良かった……に、にへへ、へ……♪」
line = "「喜んでもらえて良かった……に、にへへ、へ……♪」"

[[dialogue]]
speaker = "トリシャ"
# 「今夜、あなたを襲う不幸は避けられません……だから、せめて今のうちに……」
line = "「今夜、あなたを襲う不幸は避けられません……だから、せめて今のうちに……」"

[[dialogue]]
speaker = "トリシャ"
# 「実は、それ１つじゃなくて、いっぱい、買ってあって……お代わりも、自由……」
line = "「実は、それ１つじゃなくて、いっぱい、買ってあって……お代わりも、自由……」"

[[dialogue]]
speaker = "トリシャ"
# 「占い師にできることは、このくらいだから……」
line = "「占い師にできることは、このくらいだから……」"

[[dialogue]]
speaker = "トリシャ"
# 「たくさん、食べてくれたら、嬉しい……」
line = "「たくさん、食べてくれたら、嬉しい……」"

[[dialogue]]
speaker = "unk"
# 俺はトリシャさんに進められるまま、レゾフ名産の氷結ヨーグルトをたくさんご馳走になった。
line = "俺はトリシャさんに進められるまま、レゾフ名産の氷結ヨーグルトをたくさんご馳走になった。"

[[dialogue]]
speaker = "unk"
# トリシャさんは少しユニークな言動のある、変わった子ではあるけれど……優しく気配りのできる女性であることがよくわかる１日だった。
line = "トリシャさんは少しユニークな言動のある、変わった子ではあるけれど……優しく気配りのできる女性であることがよくわかる１日だった。"

[[dialogue]]
speaker = "unk"
# ちなみに、その日の夜に俺を襲った不幸の正体は……
line = "ちなみに、その日の夜に俺を襲った不幸の正体は……"

[[dialogue]]
speaker = "unk"
# 冷たいものの食べ過ぎによる腹痛──なのだった。
line = "冷たいものの食べ過ぎによる腹痛──なのだった。"
