[[dialogue]]
speaker = "マハムート"
# 「マトイ、次行くわよ！」
line = "「マトイ、次行くわよ！」"

[[dialogue]]
speaker = "マトイ"
# 「イエス・マム！　お願いします！」
line = "「イエス・マム！　お願いします！」"

[[dialogue]]
speaker = "マハムート"
# 「せーのっ！」
line = "「せーのっ！」"

[[dialogue]]
speaker = "マトイ"
# 「くっ……！」
line = "「くっ……！」"

[[dialogue]]
speaker = "マトイ"
# （サーブを素早く受け流したら、すかさず周囲に浮いてるビーチボールに意識を移す！）
line = "（サーブを素早く受け流したら、すかさず周囲に浮いてるビーチボールに意識を移す！）"

[[dialogue]]
speaker = "unk"
# ビーチバレー形式の訓練が始まって、あれから数時間。途中でアムと交代したりもしつつ、マトイはマムのサーブ千本ノックを捌き続けていた。
line = "ビーチバレー形式の訓練が始まって、あれから数時間。途中でアムと交代したりもしつつ、マトイはマムのサーブ千本ノックを捌き続けていた。"

[[dialogue]]
speaker = "マハムート"
# 「引力操作！」
line = "「引力操作！」"

[[dialogue]]
speaker = "マトイ"
# （一斉攻撃でも、ビーチボールの配置はランダム。つまり、着弾までの距離にそれぞれ微妙な差がある。それを一瞬で見極めて、近いものから防御して弾き飛ばす！）
line = "（一斉攻撃でも、ビーチボールの配置はランダム。つまり、着弾までの距離にそれぞれ微妙な差がある。それを一瞬で見極めて、近いものから防御して弾き飛ばす！）"

[[dialogue]]
speaker = "マトイ"
# 「はあぁぁぁっ！」
line = "「はあぁぁぁっ！」"

[[dialogue]]
speaker = "マハムート"
# 「よし、マトイは一旦休憩よ。会長と交代なさい」
line = "「よし、マトイは一旦休憩よ。会長と交代なさい」"

[[dialogue]]
speaker = "マトイ"
# 「はぁ……はぁ……イエス・マム！　ありがとうございます！」
line = "「はぁ……はぁ……イエス・マム！　ありがとうございます！」"

[[dialogue]]
speaker = "マハムート"
# 「数時間の訓練で、ギリギリながらも捌き切れるようになってきた。星徒会の盾として、リクリエの使徒との戦いを潜り抜けただけはあるわね。だけど――」
line = "「数時間の訓練で、ギリギリながらも捌き切れるようになってきた。星徒会の盾として、リクリエの使徒との戦いを潜り抜けただけはあるわね。だけど――」"

[[dialogue]]
speaker = "マハムート"
# 「悪く言うなら、行動が優等生過ぎるわ。アムがどう捌いているかは見たでしょう？」
line = "「悪く言うなら、行動が優等生過ぎるわ。アムがどう捌いているかは見たでしょう？」"

[[dialogue]]
speaker = "マトイ"
# 「はい。盾を使わず、星力で防御力を高めて、体で受け止めたり……」
line = "「はい。盾を使わず、星力で防御力を高めて、体で受け止めたり……」"

[[dialogue]]
speaker = "マハムート"
# 「そうね。まあ、あれはあの子が防御に特化してるからこそできる荒業で、普通はダメージを受けるから、よくないけど……」
line = "「そうね。まあ、あれはあの子が防御に特化してるからこそできる荒業で、普通はダメージを受けるから、よくないけど……」"

[[dialogue]]
speaker = "マハムート"
# 「盾で防ぐ、という固定観念に縛られてると、攻撃を捌き切れないような状況になった時、別の選択肢をすぐに取ることができない、ってことね」
line = "「盾で防ぐ、という固定観念に縛られてると、攻撃を捌き切れないような状況になった時、別の選択肢をすぐに取ることができない、ってことね」"

[[dialogue]]
speaker = "マトイ"
# 「つまりは、普通じゃない状況への対処……」
line = "「つまりは、普通じゃない状況への対処……」"

[[dialogue]]
speaker = "マハムート"
# 「そう。だからマトイ、今よりも強くなりたいのなら、あなたの中にある『普通』……固定観念を捨てなさい」
line = "「そう。だからマトイ、今よりも強くなりたいのなら、あなたの中にある『普通』……固定観念を捨てなさい」"

[[dialogue]]
speaker = "マハムート"
# 「自分は普通だから仕方ない、と思い込んで、行動の選択肢を狭めてるうちは、殻を破ることなんてできないわよ」
line = "「自分は普通だから仕方ない、と思い込んで、行動の選択肢を狭めてるうちは、殻を破ることなんてできないわよ」"

[[dialogue]]
speaker = "マトイ"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "マハムート"
# 「あなたに足りないのは、自信よ」
line = "「あなたに足りないのは、自信よ」"

[[dialogue]]
speaker = "マハムート"
# 「謙虚なのは別にいいわ。だけどあなたのそれは今、自身の成長を阻害する枷になってる」
line = "「謙虚なのは別にいいわ。だけどあなたのそれは今、自身の成長を阻害する枷になってる」"

[[dialogue]]
speaker = "マハムート"
# 「マトイ。いい加減気づきなさい」
line = "「マトイ。いい加減気づきなさい」"

[[dialogue]]
speaker = "マハムート"
# 「この私の攻撃を防ぎ切っているのに、あなたが本当に『普通』なわけないでしょ？」
line = "「この私の攻撃を防ぎ切っているのに、あなたが本当に『普通』なわけないでしょ？」"

[[dialogue]]
speaker = "マトイ"
# 「マム……！」
line = "「マム……！」"

[[dialogue]]
speaker = "マハムート"
# 「って何よ、そのキラキラとした瞳は……？」
line = "「って何よ、そのキラキラとした瞳は……？」"

[[dialogue]]
speaker = "マトイ"
# 「あの、私、これまで星徒会役員としてしか、マムと関わったことがなくて……だから、人づてに聞いていただけだったんですけど……」
line = "「あの、私、これまで星徒会役員としてしか、マムと関わったことがなくて……だから、人づてに聞いていただけだったんですけど……」"

[[dialogue]]
speaker = "マトイ"
# 「新星寮の子たちが言うように、マムって本当に優しいですね……！」
line = "「新星寮の子たちが言うように、マムって本当に優しいですね……！」"

[[dialogue]]
speaker = "マハムート"
# 「はぁ？」
line = "「はぁ？」"

[[dialogue]]
speaker = "マトイ"
# 「まさか私のこと、そんな風に見ていてくれてるだなんて……！　ちょっと感動しちゃいました！」
line = "「まさか私のこと、そんな風に見ていてくれてるだなんて……！　ちょっと感動しちゃいました！」"

[[dialogue]]
speaker = "マハムート"
# 「勘違いしないで頂戴。私はあなたを褒めたつもりはないわ。事実認識が正しくないと、厳しく指導しているだけよ」
line = "「勘違いしないで頂戴。私はあなたを褒めたつもりはないわ。事実認識が正しくないと、厳しく指導しているだけよ」"

[[dialogue]]
speaker = "マトイ"
# 「本気で言ってて、裏表ないところがすごい……！」
line = "「本気で言ってて、裏表ないところがすごい……！」"

[[dialogue]]
speaker = "unk"
# さすがマム
line = "さすがマム"

[[dialogue]]
speaker = "マハムート"
# 「会長、なんか後方腕組みで、うんうんと頷いているけれど……なんか畏怖とは違う感情を持たれてる気がして、不愉快なのだけれど？」
line = "「会長、なんか後方腕組みで、うんうんと頷いているけれど……なんか畏怖とは違う感情を持たれてる気がして、不愉快なのだけれど？」"

[[dialogue]]
speaker = "マハムート"
# 「というかマトイ。感動する前に、私の言ったことはちゃんと理解しているのかしら？」
line = "「というかマトイ。感動する前に、私の言ったことはちゃんと理解しているのかしら？」"

[[dialogue]]
speaker = "マトイ"
# 「イエス・マム！　一言一句、脳裏に焼き付けてます！　この後もご指導よろしくお願いします！」
line = "「イエス・マム！　一言一句、脳裏に焼き付けてます！　この後もご指導よろしくお願いします！」"

[[dialogue]]
speaker = "マハムート"
# 「やれやれ、本当に大丈夫かしら……」
line = "「やれやれ、本当に大丈夫かしら……」"

[[dialogue]]
speaker = "unk"
# ちなみに、俺もマムに頼んで、訓練を受けさせてもらっていた。
line = "ちなみに、俺もマムに頼んで、訓練を受けさせてもらっていた。"

[[dialogue]]
speaker = "マハムート"
# 「さて、会長の番だけど――あなたの場合は実戦形式で戦う方がよさそうね」
line = "「さて、会長の番だけど――あなたの場合は実戦形式で戦う方がよさそうね」"

[[dialogue]]
speaker = "マハムート"
# 「あなたはリクリエの使徒を退けてみせた。今や本気で戦えば、世界最強クラスの星騎士と言っていいでしょうね」
line = "「あなたはリクリエの使徒を退けてみせた。今や本気で戦えば、世界最強クラスの星騎士と言っていいでしょうね」"

[[dialogue]]
speaker = "マハムート"
# 「だったら、私も一切手加減する必要がない。そうでしょう？」
line = "「だったら、私も一切手加減する必要がない。そうでしょう？」"

[[dialogue]]
speaker = "unk"
# お手柔らかにお願いします
line = "お手柔らかにお願いします"

[[dialogue]]
speaker = "マハムート"
# 「――色々あって、今は全力を出せない？　ふふ、それくらいはお見通しよ」
line = "「――色々あって、今は全力を出せない？　ふふ、それくらいはお見通しよ」"

[[dialogue]]
speaker = "マハムート"
# 「そうは言っても、神に匹敵する力と戦い、退けた経験と胆力。強さを求める私の血が疼いて仕方がないわ」
line = "「そうは言っても、神に匹敵する力と戦い、退けた経験と胆力。強さを求める私の血が疼いて仕方がないわ」"

[[dialogue]]
speaker = "マハムート"
# 「『フィヴォス流星群』の時は寮長の役割を全うして、見せ場を譲ったんだもの。その見返りくらいは、あってしかるべきよね？」
line = "「『フィヴォス流星群』の時は寮長の役割を全うして、見せ場を譲ったんだもの。その見返りくらいは、あってしかるべきよね？」"

[[dialogue]]
speaker = "マハムート"
# 「さあ会長？　その魔王の力の一端、竜たる私に見せてみなさい」
line = "「さあ会長？　その魔王の力の一端、竜たる私に見せてみなさい」"

[[dialogue]]
speaker = "unk"
# そうして、俺が本気のマムと１対１で戦っていると――
line = "そうして、俺が本気のマムと１対１で戦っていると――"

[[dialogue]]
speaker = "マハムート"
# 「なるほど、確かに強くなったわね。パワーだけなら魔王モードでない今でさえ、この私を上回っている。ただ、私の水着フォームも伊達じゃないわよ？」
line = "「なるほど、確かに強くなったわね。パワーだけなら魔王モードでない今でさえ、この私を上回っている。ただ、私の水着フォームも伊達じゃないわよ？」"

[[dialogue]]
speaker = "マハムート"
# 「――会長、畏怖を持って、その場で跪きなさい」
line = "「――会長、畏怖を持って、その場で跪きなさい」"

[[dialogue]]
speaker = "unk"
# ……！　体が勝手に……！？
line = "……！　体が勝手に……！？"

[[dialogue]]
speaker = "unk"
# 俺は気づけば、マムの言葉通りに、ビーチの砂に片膝を着いてしまっていた。
line = "俺は気づけば、マムの言葉通りに、ビーチの砂に片膝を着いてしまっていた。"

[[dialogue]]
speaker = "マハムート"
# 「ふふ、驚いたかしら？　これが私の水着フォームの能力。『言葉の引力操作』よ」
line = "「ふふ、驚いたかしら？　これが私の水着フォームの能力。『言葉の引力操作』よ」"

[[dialogue]]
speaker = "マハムート"
# 「物理だけではなく、概念や意識の引力も操作できるようになった。つまり、私が発した言葉には引力が発生し、対象に命令を聞かせることができる」
line = "「物理だけではなく、概念や意識の引力も操作できるようになった。つまり、私が発した言葉には引力が発生し、対象に命令を聞かせることができる」"

[[dialogue]]
speaker = "unk"
# チートでは！？
line = "チートでは！？"

[[dialogue]]
speaker = "マハムート"
# 「あなたがそれを言う？　まあでも、ちゃんと私に畏怖を持ったようで、何よりだわ」
line = "「あなたがそれを言う？　まあでも、ちゃんと私に畏怖を持ったようで、何よりだわ」"

[[dialogue]]
speaker = "マハムート"
# 「そうね……せっかくだし、私のことも褒め称えてもらおうかしら？」
line = "「そうね……せっかくだし、私のことも褒め称えてもらおうかしら？」"

[[dialogue]]
speaker = "マハムート"
# 「――何をって？　そんなの決まっているでしょう？　私のこの、威厳ある水着姿をよ」
line = "「――何をって？　そんなの決まっているでしょう？　私のこの、威厳ある水着姿をよ」"

[[dialogue]]
speaker = "マハムート"
# 「ふふっ、さあ、命令よ、会長。私を褒め称えなさい」
line = "「ふふっ、さあ、命令よ、会長。私を褒め称えなさい」"

[[dialogue]]
speaker = "unk"
# すごく可愛いと思います
line = "すごく可愛いと思います"

[[dialogue]]
speaker = "マハムート"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "unk"
# ――本当なら先輩だし、紳士的に綺麗だと表現するべきかもしれない。しかし、マムは小さい背丈ながらも堂々としているからこそ、俺はあえて言いたい。
line = "――本当なら先輩だし、紳士的に綺麗だと表現するべきかもしれない。しかし、マムは小さい背丈ながらも堂々としているからこそ、俺はあえて言いたい。"

[[dialogue]]
speaker = "unk"
# マムの水着姿は可愛い。たった１歳年上の女の子に対して、変に気を遣って言葉を選びたくない。俺は嘘偽りなく、一目見て『すごく可愛い』と思った。
line = "マムの水着姿は可愛い。たった１歳年上の女の子に対して、変に気を遣って言葉を選びたくない。俺は嘘偽りなく、一目見て『すごく可愛い』と思った。"

[[dialogue]]
speaker = "unk"
# 具体的に細かく可愛いポイント挙げていくと――
line = "具体的に細かく可愛いポイント挙げていくと――"

[[dialogue]]
speaker = "マハムート"
# 「っ……も、もういいわ！　それ以上は言わなくていいから！」
line = "「っ……も、もういいわ！　それ以上は言わなくていいから！」"

[[dialogue]]
speaker = "unk"
# あっ、その照れ顔も凄く可愛いと思います！
line = "あっ、その照れ顔も凄く可愛いと思います！"

[[dialogue]]
speaker = "マハムート"
# 「言葉の引力を突破した！？　なんでそこで謎の力を発揮するのよ、貴方は！？」
line = "「言葉の引力を突破した！？　なんでそこで謎の力を発揮するのよ、貴方は！？」"

[[dialogue]]
speaker = "マハムート"
# 「っ……いい加減にしなさい！　この私を辱めた罰として、畏怖を叩き込んであげるわ！」
line = "「っ……いい加減にしなさい！　この私を辱めた罰として、畏怖を叩き込んであげるわ！」"

[[dialogue]]
speaker = "unk"
# 褒めてるだけなのに何故！？
line = "褒めてるだけなのに何故！？"

[[dialogue]]
speaker = "マハムート"
# 「先輩に対して、畏怖が足りないのよ、畏怖が！　貴方には、千本ノックでもぬるいわ！」
line = "「先輩に対して、畏怖が足りないのよ、畏怖が！　貴方には、千本ノックでもぬるいわ！」"

[[dialogue]]
speaker = "マハムート"
# 「１万本スパイクよ！！　――スパイクメガフレアッ！！！」
line = "「１万本スパイクよ！！　――スパイクメガフレアッ！！！」"

[[dialogue]]
speaker = "unk"
# ぎゃーーーーーーっ！！？
line = "ぎゃーーーーーーっ！！？"

[[dialogue]]
speaker = "unk"
# その後、流星群のように襲い来るビーチボールから逃げ回る羽目になる俺なのだった。
line = "その後、流星群のように襲い来るビーチボールから逃げ回る羽目になる俺なのだった。"
