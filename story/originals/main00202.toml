[[dialogue]]
speaker = "unk"
# 第３話,堕天使,B
line = "第３話,堕天使,B"

[[dialogue]]
speaker = "ニャリオン"
# 「ふぅ……辛く険しい戦いだったニャン」
line = "「ふぅ……辛く険しい戦いだったニャン」"

[[dialogue]]
speaker = "ユウリ"
# 「何にもしてねーだろっての」
line = "「何にもしてねーだろっての」"

[[dialogue]]
speaker = "ニャリオン"
# 「多少はしているニャン！」
line = "「多少はしているニャン！」"

[[dialogue]]
speaker = "ソフィア"
# 「たまにはニャリオンさん単騎で戦ってみるというのはどうでしょう」
line = "「たまにはニャリオンさん単騎で戦ってみるというのはどうでしょう」"

[[dialogue]]
speaker = "ニャリオン"
# 「ソフィア、意外ときついこと言うニャンね……？」
line = "「ソフィア、意外ときついこと言うニャンね……？」"

[[dialogue]]
speaker = "フィオナ"
# 「ふふ。それは勘弁してあげて、ソフィア」
line = "「ふふ。それは勘弁してあげて、ソフィア」"

[[dialogue]]
speaker = "unk"
# その後も、彼女らはモンスターを討伐しつつアステラの最深部へと進んだ。
line = "その後も、彼女らはモンスターを討伐しつつアステラの最深部へと進んだ。"

[[dialogue]]
speaker = "ルリエル"
# 「おおっとぉ！　行き止まりです」
line = "「おおっとぉ！　行き止まりです」"

[[dialogue]]
speaker = "セーラ"
# 「あっがり～♪　とは、いかないよねえ」
line = "「あっがり～♪　とは、いかないよねえ」"

[[dialogue]]
speaker = "unk"
# ５人が揃って臨戦態勢へ移行する。
line = "５人が揃って臨戦態勢へ移行する。"

[[dialogue]]
speaker = "unk"
# 彼女たちが見据えていたのは、アステラの果てに待っていたある存在だった。
line = "彼女たちが見据えていたのは、アステラの果てに待っていたある存在だった。"

[[dialogue]]
speaker = "マグダレナ"
# 「あぁ……なぜ……世界は……滅びなくては……なら、ない……いっそ……この場で……ああ……」
line = "「あぁ……なぜ……世界は……滅びなくては……なら、ない……いっそ……この場で……ああ……」"

[[dialogue]]
speaker = "ユウリ"
# 「ボスモンスターだな。よぉーし、あたしの炎でいっちょ……」
line = "「ボスモンスターだな。よぉーし、あたしの炎でいっちょ……」"

[[dialogue]]
speaker = "フィオナ"
# 「……待って、ユウリ」
line = "「……待って、ユウリ」"

[[dialogue]]
speaker = "unk"
# 汚染されたアステライトとはモンスターの巣窟である。
line = "汚染されたアステライトとはモンスターの巣窟である。"

[[dialogue]]
speaker = "unk"
# よって最奥に待ち受けるのはその親玉というのが通例だった。
line = "よって最奥に待ち受けるのはその親玉というのが通例だった。"

[[dialogue]]
speaker = "unk"
# しかし……とフィオナは立ち止まる。
line = "しかし……とフィオナは立ち止まる。"

[[dialogue]]
speaker = "マグダレナ"
# 「世界に……裁きを……崩壊の……兆し……あぁ……」
line = "「世界に……裁きを……崩壊の……兆し……あぁ……」"

[[dialogue]]
speaker = "ニャリオン"
# 「モンスター……じゃ、なさそうニャンね」
line = "「モンスター……じゃ、なさそうニャンね」"

[[dialogue]]
speaker = "セーラ"
# 「ん～。頭の輪っか、ルリちーと同じっぽくない？　汚れててよく見えないけど」
line = "「ん～。頭の輪っか、ルリちーと同じっぽくない？　汚れててよく見えないけど」"

[[dialogue]]
speaker = "ルリエル"
# 「輪っか……？　ヘイローのことでしょうかっ」
line = "「輪っか……？　ヘイローのことでしょうかっ」"

[[dialogue]]
speaker = "フィオナ"
# 「ヘイローが……？　もしかして──」
line = "「ヘイローが……？　もしかして──」"

[[dialogue]]
speaker = "ソフィア"
# 「天使さん……？」
line = "「天使さん……？」"

[[dialogue]]
speaker = "unk"
# 三大種族のひとつとして数えられる天使。
line = "三大種族のひとつとして数えられる天使。"

[[dialogue]]
speaker = "unk"
# だが、彼女たちの眼前にいる存在はその高貴さから遠くかけ離れていた。
line = "だが、彼女たちの眼前にいる存在はその高貴さから遠くかけ離れていた。"

[[dialogue]]
speaker = "フィオナ"
# 「……なるほど。だとすると彼女は──堕天使、でしょうか」
line = "「……なるほど。だとすると彼女は──堕天使、でしょうか」"

[[dialogue]]
speaker = "unk"
# フィオナの目測。
line = "フィオナの目測。"

[[dialogue]]
speaker = "unk"
# それは彼女の知る太古の逸話に裏打ちされたもので、事実その推察は当たっていた。
line = "それは彼女の知る太古の逸話に裏打ちされたもので、事実その推察は当たっていた。"

[[dialogue]]
speaker = "マグダレナ"
# 「ア……ア……なら……私の、使命は……破滅、を、もたら……し……」
line = "「ア……ア……なら……私の、使命は……破滅、を、もたら……し……」"

[[dialogue]]
speaker = "ルリエル"
# 「堕天使さん！　ではでは、同じく天使のこの不肖ルリエルめが……」
line = "「堕天使さん！　ではでは、同じく天使のこの不肖ルリエルめが……」"

[[dialogue]]
speaker = "unk"
# そう得心し、ルリエルが胸を張って近づこうとするも……
line = "そう得心し、ルリエルが胸を張って近づこうとするも……"

[[dialogue]]
speaker = "マグダレナ"
# 「人──間──天、使……魔、族──壊す……助けて……壊す……助けて……壊す……」
line = "「人──間──天、使……魔、族──壊す……助けて……壊す……助けて……壊す……」"

[[dialogue]]
speaker = "ルリエル"
# 「ひゃああっ！？　お、お話が通じません！」
line = "「ひゃああっ！？　お、お話が通じません！」"

[[dialogue]]
speaker = "ユウリ"
# 「壊すとか助けてとか、何を言ってんのかわかんねーな」
line = "「壊すとか助けてとか、何を言ってんのかわかんねーな」"

[[dialogue]]
speaker = "フィオナ"
# 「解放しましょう。きっと彼女もこのアステラと同じ──リクリエに穢された存在のはずです」
line = "「解放しましょう。きっと彼女もこのアステラと同じ──リクリエに穢された存在のはずです」"

[[dialogue]]
speaker = "セーラ"
# 「りょうかーいっ♪」
line = "「りょうかーいっ♪」"

[[dialogue]]
speaker = "ニャリオン"
# 「やるがよいニャ、者ども！」
line = "「やるがよいニャ、者ども！」"
