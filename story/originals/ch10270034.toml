[[dialogue]]
speaker = "unk"
# 第４話,桜十路家のお嬢様,P
line = "第４話,桜十路家のお嬢様,P"

[[dialogue]]
speaker = "サラン"
# 「えへへ～、お菓子の準備もオッケー～♪　それじゃまったりしようね～♪」
line = "「えへへ～、お菓子の準備もオッケー～♪　それじゃまったりしようね～♪」"

[[dialogue]]
speaker = "unk"
# 今日はサランが我が家に遊びに来ていた。
line = "今日はサランが我が家に遊びに来ていた。"

[[dialogue]]
speaker = "unk"
# ちょうど母さんも留守のため、２人の時間をゆっくり過ごすことが出来る。
line = "ちょうど母さんも留守のため、２人の時間をゆっくり過ごすことが出来る。"

[[dialogue]]
speaker = "unk"
# 俺たちはお菓子を持ち寄って、リビングでそれを食べながら昼下がりのひと時を楽しんでいた。
line = "俺たちはお菓子を持ち寄って、リビングでそれを食べながら昼下がりのひと時を楽しんでいた。"

[[dialogue]]
speaker = "サラン"
# 「あ……会長ちゃん、テレビ見て～！　ほらほら、この船～♪」
line = "「あ……会長ちゃん、テレビ見て～！　ほらほら、この船～♪」"

[[dialogue]]
speaker = "サラン"
# 「この船が『チェリークルーズ号』だよ～」
line = "「この船が『チェリークルーズ号』だよ～」"

[[dialogue]]
speaker = "unk"
# テレビのニュース画面にはとんでもなく巨大な船が映っていた。
line = "テレビのニュース画面にはとんでもなく巨大な船が映っていた。"

[[dialogue]]
speaker = "サラン"
# 「出港してからしばらく経つけど、無事にハワイについたんだね～。よかったぁ～」
line = "「出港してからしばらく経つけど、無事にハワイについたんだね～。よかったぁ～」"

[[dialogue]]
speaker = "サラン"
# 「うん、この船はハワイを出たら、そのまま太平洋を横断してアメリカに向かうの～♪」
line = "「うん、この船はハワイを出たら、そのまま太平洋を横断してアメリカに向かうの～♪」"

[[dialogue]]
speaker = "サラン"
# 「世界一周して日本に帰ってくるのは……ぽよ？　いつになるんだろ～？」
line = "「世界一周して日本に帰ってくるのは……ぽよ？　いつになるんだろ～？」"

[[dialogue]]
speaker = "unk"
# 無事に帰ってきて欲しいね
line = "無事に帰ってきて欲しいね"

[[dialogue]]
speaker = "サラン"
# 「きっと大丈夫だよ～♪」
line = "「きっと大丈夫だよ～♪」"

[[dialogue]]
speaker = "unk"
# ホントにでかいな！！！
line = "ホントにでかいな！！！"

[[dialogue]]
speaker = "unk"
# それにしてもこの船……
line = "それにしてもこの船……"

[[dialogue]]
speaker = "サラン"
# 「そうだよ～。国内最大級だってお父様が言ってたかな～」
line = "「そうだよ～。国内最大級だってお父様が言ってたかな～」"

[[dialogue]]
speaker = "unk"
# 国内最大級──
line = "国内最大級──"

[[dialogue]]
speaker = "unk"
# そんな大きな船を持っている桜十路家は、やはり相当な富豪なのだと今更のように思ってしまう。
line = "そんな大きな船を持っている桜十路家は、やはり相当な富豪なのだと今更のように思ってしまう。"

[[dialogue]]
speaker = "unk"
# そしてサランは、その桜十路家のお嬢様なのだ。
line = "そしてサランは、その桜十路家のお嬢様なのだ。"

[[dialogue]]
speaker = "サラン"
# 「ぽよ？　サランのこと、そんなに見つめてどうしたの～……？」
line = "「ぽよ？　サランのこと、そんなに見つめてどうしたの～……？」"

[[dialogue]]
speaker = "unk"
# 庶民がお嬢様を見つめてごめんなさい！
line = "庶民がお嬢様を見つめてごめんなさい！"

[[dialogue]]
speaker = "サラン"
# 「ぽよ～、どうしてそんなこと言うの～」
line = "「ぽよ～、どうしてそんなこと言うの～」"

[[dialogue]]
speaker = "サラン"
# 「確かに桜十路家はお金持ちだけど、サランは普通の女の子だよ～」
line = "「確かに桜十路家はお金持ちだけど、サランは普通の女の子だよ～」"

[[dialogue]]
speaker = "サラン"
# 「会長ちゃんにそんな風に言われると、ちょっと悲しくなっちゃうな～……」
line = "「会長ちゃんにそんな風に言われると、ちょっと悲しくなっちゃうな～……」"

[[dialogue]]
speaker = "unk"
# ご、ごめん……
line = "ご、ごめん……"

[[dialogue]]
speaker = "サラン"
# 「えへへ、大丈夫だよ～」
line = "「えへへ、大丈夫だよ～」"

[[dialogue]]
speaker = "サラン"
# 「でもお嬢様っていうんだったら、ヴィーちゃんもそうだよ～」
line = "「でもお嬢様っていうんだったら、ヴィーちゃんもそうだよ～」"

[[dialogue]]
speaker = "サラン"
# 「とってもお金持ちの九浄家のお嬢様だし～、だけど会長ちゃんは緊張しないでしょ？」
line = "「とってもお金持ちの九浄家のお嬢様だし～、だけど会長ちゃんは緊張しないでしょ？」"

[[dialogue]]
speaker = "サラン"
# 「九浄家は桜十路家と同じ『五名門』のひとつで、主に人材の方面で活躍してるんだよ～」
line = "「九浄家は桜十路家と同じ『五名門』のひとつで、主に人材の方面で活躍してるんだよ～」"

[[dialogue]]
speaker = "unk"
# その話はヘレナちゃん他、各所から聞いているが……
line = "その話はヘレナちゃん他、各所から聞いているが……"

[[dialogue]]
speaker = "unk"
# 九浄家はもはや何を得意としているのか分からないくらい手広くやっているイメージがある。
line = "九浄家はもはや何を得意としているのか分からないくらい手広くやっているイメージがある。"

[[dialogue]]
speaker = "unk"
# 学園経営に人工戦闘服の研究、カジノにイベントの運営まで、本当にいろいろだ。
line = "学園経営に人工戦闘服の研究、カジノにイベントの運営まで、本当にいろいろだ。"

[[dialogue]]
speaker = "unk"
# 桜十路家は『食品』と『流通』？
line = "桜十路家は『食品』と『流通』？"

[[dialogue]]
speaker = "サラン"
# 「そうだよ～。食品は分かりやすいけど、流通はあまり知られてないんだ～」
line = "「そうだよ～。食品は分かりやすいけど、流通はあまり知られてないんだ～」"

[[dialogue]]
speaker = "サラン"
# 「でも桜十路家に何かあったら、世界の流通は完全に麻痺しちゃうって言われてるみたい～」
line = "「でも桜十路家に何かあったら、世界の流通は完全に麻痺しちゃうって言われてるみたい～」"

[[dialogue]]
speaker = "unk"
# やっぱりとんでもない家じゃないか！
line = "やっぱりとんでもない家じゃないか！"

[[dialogue]]
speaker = "unk"
# しかし──
line = "しかし──"

[[dialogue]]
speaker = "unk"
# そんな桜十路家のお嬢様がどうして星騎士を目指したんだろうか？
line = "そんな桜十路家のお嬢様がどうして星騎士を目指したんだろうか？"

[[dialogue]]
speaker = "unk"
# 特にサランの場合はふわふわおっとりしていて、お世辞にも戦いに向いている性格とは言い難い。
line = "特にサランの場合はふわふわおっとりしていて、お世辞にも戦いに向いている性格とは言い難い。"

[[dialogue]]
speaker = "unk"
# そんなサランがどうして星騎士を目指したのか、どうしても気になってしまった。
line = "そんなサランがどうして星騎士を目指したのか、どうしても気になってしまった。"

[[dialogue]]
speaker = "サラン"
# 「えっとね～。サランが小さい頃、モンスターの出現のせいで、流通業界のみんなが困ってるってお話を聞いたの」
line = "「えっとね～。サランが小さい頃、モンスターの出現のせいで、流通業界のみんなが困ってるってお話を聞いたの」"

[[dialogue]]
speaker = "サラン"
# 「もしサランが星騎士になって戦えたら、そういう人たちを守ってあげられるかな～って♪」
line = "「もしサランが星騎士になって戦えたら、そういう人たちを守ってあげられるかな～って♪」"

[[dialogue]]
speaker = "サラン"
# 「本当に星騎士になれるかどうか分からなかったけど、とりあえず新星学園に入学してみたの～」
line = "「本当に星騎士になれるかどうか分からなかったけど、とりあえず新星学園に入学してみたの～」"

[[dialogue]]
speaker = "サラン"
# 「でも、ちゃんとプリマステラになることができて、よかったな～って思うよ～」
line = "「でも、ちゃんとプリマステラになることができて、よかったな～って思うよ～」"

[[dialogue]]
speaker = "unk"
# 入学までの経緯がふわふわしているのはとてもサランらしい。
line = "入学までの経緯がふわふわしているのはとてもサランらしい。"

[[dialogue]]
speaker = "unk"
# 結果、サランは星騎士としての適性が高く、その力を開花させていった。
line = "結果、サランは星騎士としての適性が高く、その力を開花させていった。"

[[dialogue]]
speaker = "unk"
# だが、サランがプリマステラとして認められたのは、適性のひと言で片付けられるものではない。
line = "だが、サランがプリマステラとして認められたのは、適性のひと言で片付けられるものではない。"

[[dialogue]]
speaker = "unk"
# 相応の努力を積み重ねて今日の力を得た。
line = "相応の努力を積み重ねて今日の力を得た。"

[[dialogue]]
speaker = "unk"
# そして何より、サランには『困っている人の力になりたい』という強い想いがあるからだろう。
line = "そして何より、サランには『困っている人の力になりたい』という強い想いがあるからだろう。"

[[dialogue]]
speaker = "サラン"
# 「ぽよ……？」
line = "「ぽよ……？」"

[[dialogue]]
speaker = "サラン"
# 「えへへ、会長ちゃんどうしたの～？　急に頭を撫でてきて～♪」
line = "「えへへ、会長ちゃんどうしたの～？　急に頭を撫でてきて～♪」"

[[dialogue]]
speaker = "サラン"
# 「はわっ！？　今度は急に抱きしめて……ん～、どうしちゃったんだろう～♪」
line = "「はわっ！？　今度は急に抱きしめて……ん～、どうしちゃったんだろう～♪」"

[[dialogue]]
speaker = "unk"
# その健気さがたまらなくなって、思わず抱きしめてしまった。
line = "その健気さがたまらなくなって、思わず抱きしめてしまった。"

[[dialogue]]
speaker = "unk"
# そんな俺を宥めるように、サランは俺に恥ずかしそうな笑顔を向けてくれるのだった。
line = "そんな俺を宥めるように、サランは俺に恥ずかしそうな笑顔を向けてくれるのだった。"
