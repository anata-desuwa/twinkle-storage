[[dialogue]]
speaker = "unk"
# 第８話,アルタイルの梨緒,B
line = "第８話,アルタイルの梨緒,B"

[[dialogue]]
speaker = "梨緒"
# 「先ほど、イングランドの方から教皇庁に返答が返ってきた。問い合わせが具体的だったから、時間はかからなかったそうだ」
line = "「先ほど、イングランドの方から教皇庁に返答が返ってきた。問い合わせが具体的だったから、時間はかからなかったそうだ」"

[[dialogue]]
speaker = "unk"
# 空き教室に集まる選挙管理員会のメンバーたち。
line = "空き教室に集まる選挙管理員会のメンバーたち。"

[[dialogue]]
speaker = "unk"
# その前で梨緒は、手元に届いた調査結果を読み上げる。
line = "その前で梨緒は、手元に届いた調査結果を読み上げる。"

[[dialogue]]
speaker = "梨緒"
# 「梨緒・Ａ・クリステレス、およびその家族は森羅暦２９９２年、モンスターに襲われ死亡──」
line = "「梨緒・Ａ・クリステレス、およびその家族は森羅暦２９９２年、モンスターに襲われ死亡──」"

[[dialogue]]
speaker = "梨緒"
# 「だそうだ」
line = "「だそうだ」"

[[dialogue]]
speaker = "unk"
# 感情を押し殺して、淡々と自分の死を伝える梨緒。
line = "感情を押し殺して、淡々と自分の死を伝える梨緒。"

[[dialogue]]
speaker = "unk"
# アポロたちはすぐに反応を返せず、教室に沈黙が落ちた。
line = "アポロたちはすぐに反応を返せず、教室に沈黙が落ちた。"

[[dialogue]]
speaker = "梨緒"
# （こちらの私と出会ったらどうするかなんて、少し考えてもみたが……無駄だったな）
line = "（こちらの私と出会ったらどうするかなんて、少し考えてもみたが……無駄だったな）"

[[dialogue]]
speaker = "梨緒"
# （平行世界なんて最初は信じられなかった。今も馬鹿げていると思っている）
line = "（平行世界なんて最初は信じられなかった。今も馬鹿げていると思っている）"

[[dialogue]]
speaker = "梨緒"
# （だが私の新星学園と異なる星徒会や、小さいフィオナ──アポロを見せられ、こうして証拠を突きつけられれば、もう否定はできない）
line = "（だが私の新星学園と異なる星徒会や、小さいフィオナ──アポロを見せられ、こうして証拠を突きつけられれば、もう否定はできない）"

[[dialogue]]
speaker = "梨緒"
# 「アルタイル、デネブ、ベガは根本が同じ平行世界とはいえ、多少の差異が生じるんだろう。私の生死はその多少の部分ということだ」
line = "「アルタイル、デネブ、ベガは根本が同じ平行世界とはいえ、多少の差異が生じるんだろう。私の生死はその多少の部分ということだ」"

[[dialogue]]
speaker = "ベアトリス"
# 「梨緒ちゃん……」
line = "「梨緒ちゃん……」"

[[dialogue]]
speaker = "梨緒"
# 「不安な顔をする必要はない、ベアト。問い合わせを依頼した時点で、覚悟はしていたことだ」
line = "「不安な顔をする必要はない、ベアト。問い合わせを依頼した時点で、覚悟はしていたことだ」"

[[dialogue]]
speaker = "ナターシャ"
# 「おや、気丈だね。さすがに凹むかと思ったんだけど」
line = "「おや、気丈だね。さすがに凹むかと思ったんだけど」"

[[dialogue]]
speaker = "梨緒"
# 「正直、私自身もこの知らせをどう受け止めていいかわからない」
line = "「正直、私自身もこの知らせをどう受け止めていいかわからない」"

[[dialogue]]
speaker = "梨緒"
# 「喪失感がないと言えば嘘になる。この世界の梨緒は私自身でもあるが、他人でもあって……言葉にし難い心境だ」
line = "「喪失感がないと言えば嘘になる。この世界の梨緒は私自身でもあるが、他人でもあって……言葉にし難い心境だ」"

[[dialogue]]
speaker = "梨緒"
# 「家族と再会できるという期待もなくはなかったが、別れは元の世界でとうに済ませている」
line = "「家族と再会できるという期待もなくはなかったが、別れは元の世界でとうに済ませている」"

[[dialogue]]
speaker = "梨緒"
# 「だがリクリエを止めるという意志は変わらない。ジグやディザスターハンドとも戦わなければいけないからな」
line = "「だがリクリエを止めるという意志は変わらない。ジグやディザスターハンドとも戦わなければいけないからな」"

[[dialogue]]
speaker = "梨緒"
# 「アポロもありがとう。君のおかげで、ようやく自分が平行世界から来たと認めることができた」
line = "「アポロもありがとう。君のおかげで、ようやく自分が平行世界から来たと認めることができた」"

[[dialogue]]
speaker = "アポロ"
# 「……ああ」
line = "「……ああ」"

[[dialogue]]
speaker = "梨緒"
# 「残念ながら、“真なる神”に関して新たに判明した事実はない。報告は以上だ」
line = "「残念ながら、“真なる神”に関して新たに判明した事実はない。報告は以上だ」"

[[dialogue]]
speaker = "梨緒"
# 「今日は解散にしよう」
line = "「今日は解散にしよう」"

[[dialogue]]
speaker = "unk"
# 選挙管理委員会のメンバーと別れた後、梨緒の足は自然と大聖堂に向いていた。
line = "選挙管理委員会のメンバーと別れた後、梨緒の足は自然と大聖堂に向いていた。"

[[dialogue]]
speaker = "unk"
# 梨緒は特別信仰心が強いわけではないが、それでもここは他の場所より少し気持ちが落ち着く気がするからだ。
line = "梨緒は特別信仰心が強いわけではないが、それでもここは他の場所より少し気持ちが落ち着く気がするからだ。"

[[dialogue]]
speaker = "梨緒"
# （この世界──アルタイルにも梨緒・Ａ・クリステレスがいた。ならば私は別の平行世界の梨緒だ）
line = "（この世界──アルタイルにも梨緒・Ａ・クリステレスがいた。ならば私は別の平行世界の梨緒だ）"

[[dialogue]]
speaker = "梨緒"
# （だが私はデネブにあるという、極星学園を知らない）
line = "（だが私はデネブにあるという、極星学園を知らない）"

[[dialogue]]
speaker = "梨緒"
# （私が知るフィオナ──アポロも、デネブのアポロとは辿った経緯が異なる。よって私の世界はデネブではない）
line = "（私が知るフィオナ──アポロも、デネブのアポロとは辿った経緯が異なる。よって私の世界はデネブではない）"

[[dialogue]]
speaker = "梨緒"
# （つまり私の世界は残る１つ──ベガ）
line = "（つまり私の世界は残る１つ──ベガ）"

[[dialogue]]
speaker = "梨緒"
# （そして私の記憶が正しければ……ベガはリクリエに敗北し、滅んだ）
line = "（そして私の記憶が正しければ……ベガはリクリエに敗北し、滅んだ）"

[[dialogue]]
speaker = "梨緒"
# （薄々わかっていたことだろう。今だって驚きはない。ようやく納得がいっただけだ）
line = "（薄々わかっていたことだろう。今だって驚きはない。ようやく納得がいっただけだ）"

[[dialogue]]
speaker = "梨緒"
# （それでも──）
line = "（それでも──）"

[[dialogue]]
speaker = "梨緒"
# （私は世界の終わりを目の当たりにした。世界の終焉に立ち会った）
line = "（私は世界の終わりを目の当たりにした。世界の終焉に立ち会った）"

[[dialogue]]
speaker = "梨緒"
# （だけど気が付けば私は、まだ滅びていない流星市国にいた）
line = "（だけど気が付けば私は、まだ滅びていない流星市国にいた）"

[[dialogue]]
speaker = "梨緒"
# （やり直すことができる。今度こそ世界を救えると思った）
line = "（やり直すことができる。今度こそ世界を救えると思った）"

[[dialogue]]
speaker = "梨緒"
# 「いや！　私は今度こそ世界を守る！　そのために私はここにいるんだ！」
line = "「いや！　私は今度こそ世界を守る！　そのために私はここにいるんだ！」"

[[dialogue]]
speaker = "梨緒"
# 「今度こそ……今度こそ、世界を救う。そう誓った」
line = "「今度こそ……今度こそ、世界を救う。そう誓った」"

[[dialogue]]
speaker = "梨緒"
# 「だけどその誓いは──無駄だったんだな」
line = "「だけどその誓いは──無駄だったんだな」"

[[dialogue]]
speaker = "梨緒"
# 「ぅっ……ぐすっ……」
line = "「ぅっ……ぐすっ……」"

[[dialogue]]
speaker = "梨緒"
# 「友人と共に学んだ新星学園も、家族と過ごした流星市国も、生まれた故郷も、何もかも失くなってしまった……」
line = "「友人と共に学んだ新星学園も、家族と過ごした流星市国も、生まれた故郷も、何もかも失くなってしまった……」"

[[dialogue]]
speaker = "梨緒"
# 「母さんが焼いたスコーンももう食べられない……放課後にみんなで紅茶を飲むこともできない……」
line = "「母さんが焼いたスコーンももう食べられない……放課後にみんなで紅茶を飲むこともできない……」"

[[dialogue]]
speaker = "梨緒"
# 「一緒に笑い合った仲間も、フィオナも、エリシアも……みんな……いないんだな」
line = "「一緒に笑い合った仲間も、フィオナも、エリシアも……みんな……いないんだな」"

[[dialogue]]
speaker = "梨緒"
# 「ひぐっ、ぅっ……ううぅ……」
line = "「ひぐっ、ぅっ……ううぅ……」"

[[dialogue]]
speaker = "梨緒"
# 「ジグ……」
line = "「ジグ……」"

[[dialogue]]
speaker = "梨緒"
# （私が弱くて、情けなくて泣いていると、君がいつの間にか傍にいた。泣いているところを見せたくなんかないのに）
line = "（私が弱くて、情けなくて泣いていると、君がいつの間にか傍にいた。泣いているところを見せたくなんかないのに）"

[[dialogue]]
speaker = "梨緒"
# （それでも君の軽薄な笑顔を見ると、不思議と涙は引いていた）
line = "（それでも君の軽薄な笑顔を見ると、不思議と涙は引いていた）"

[[dialogue]]
speaker = "梨緒"
# （私は同じ世界の仲間をすべて失った。──だけど）
line = "（私は同じ世界の仲間をすべて失った。──だけど）"

[[dialogue]]
speaker = "梨緒"
# （ジグはまだ生きている。今は敵だとしても）
line = "（ジグはまだ生きている。今は敵だとしても）"

[[dialogue]]
speaker = "梨緒"
# （だからジグは取り戻す。ジグだけは救ってみせる）
line = "（だからジグは取り戻す。ジグだけは救ってみせる）"

[[dialogue]]
speaker = "梨緒"
# （また戦うことになっても、負けるわけにはいかない）
line = "（また戦うことになっても、負けるわけにはいかない）"

[[dialogue]]
speaker = "梨緒"
# （リクリエの使徒に……勝つ……！）
line = "（リクリエの使徒に……勝つ……！）"

[[dialogue]]
speaker = "アポロ"
# 「見つけたぞ、梨緒！」
line = "「見つけたぞ、梨緒！」"

[[dialogue]]
speaker = "梨緒"
# 「──！？」
line = "「──！？」"

[[dialogue]]
speaker = "unk"
# 梨緒の涙を吹き飛ばすように、大聖堂の扉が勢いよく開け放たれた。
line = "梨緒の涙を吹き飛ばすように、大聖堂の扉が勢いよく開け放たれた。"

[[dialogue]]
speaker = "unk"
# アポロたち選挙管理委員会のメンバーが、梨緒の元にやってくる。
line = "アポロたち選挙管理委員会のメンバーが、梨緒の元にやってくる。"

[[dialogue]]
speaker = "梨緒"
# 「ど、どうして君たちがここに……！？」
line = "「ど、どうして君たちがここに……！？」"

[[dialogue]]
speaker = "アポロ"
# 「<ruby=うち>星見家</ruby>に帰らないから心配して探しに来たんだ。んで魔王に聞いてみたら、前にここで泣いてたって言っててな」
line = "「<ruby>星見家<rt>うち</rt></ruby>に帰らないから心配して探しに来たんだ。んで魔王に聞いてみたら、前にここで泣いてたって言っててな」"

[[dialogue]]
speaker = "梨緒"
# 「い、いや、私は泣いてないっ」
line = "「い、いや、私は泣いてないっ」"

[[dialogue]]
speaker = "アポロ"
# 「めちゃくちゃ目が赤いぞ。さすがに無理があるだろ」
line = "「めちゃくちゃ目が赤いぞ。さすがに無理があるだろ」"

[[dialogue]]
speaker = "アポロ"
# 「ずいぶんあっさりしてると思ったが、やっぱりショックなんじゃないか。それならそう言え！」
line = "「ずいぶんあっさりしてると思ったが、やっぱりショックなんじゃないか。それならそう言え！」"

[[dialogue]]
speaker = "梨緒"
# 「だって……私の世界のことは、君たちには関係ないし……」
line = "「だって……私の世界のことは、君たちには関係ないし……」"

[[dialogue]]
speaker = "ベアトリス"
# 「確かに私たちは、梨緒ちゃんの世界は知らないよ」
line = "「確かに私たちは、梨緒ちゃんの世界は知らないよ」"

[[dialogue]]
speaker = "ベアトリス"
# 「でも梨緒ちゃんのことは知ってる。だから、関係ないなんて言わないで」
line = "「でも梨緒ちゃんのことは知ってる。だから、関係ないなんて言わないで」"

[[dialogue]]
speaker = "ベアトリス"
# 「それに言ったでしょ。１人で泣かないでほしいって」
line = "「それに言ったでしょ。１人で泣かないでほしいって」"

[[dialogue]]
speaker = "梨緒"
# 「ベアト……」
line = "「ベアト……」"

[[dialogue]]
speaker = "ベアトリス"
# 「というわけで、梨緒ちゃんの涙を拭きに来たよ。梨緒ちゃんが泣くわけないもんね？」
line = "「というわけで、梨緒ちゃんの涙を拭きに来たよ。梨緒ちゃんが泣くわけないもんね？」"

[[dialogue]]
speaker = "unk"
# ハンカチを構えて、梨緒ににじり寄るベアトリス。
line = "ハンカチを構えて、梨緒ににじり寄るベアトリス。"

[[dialogue]]
speaker = "unk"
# そのままぐいぐいと近づいていって、力ずくで涙を拭いていく。
line = "そのままぐいぐいと近づいていって、力ずくで涙を拭いていく。"

[[dialogue]]
speaker = "梨緒"
# 「待て……やめろ……！　ていうか君、力強いな……！」
line = "「待て……やめろ……！　ていうか君、力強いな……！」"

[[dialogue]]
speaker = "ベアトリス"
# 「だって吸血鬼だからねっ」
line = "「だって吸血鬼だからねっ」"

[[dialogue]]
speaker = "ナターシャ"
# 「１人で泣いてすっきりしたければ、２人連れて出ていくけど、どうする？」
line = "「１人で泣いてすっきりしたければ、２人連れて出ていくけど、どうする？」"

[[dialogue]]
speaker = "梨緒"
# 「もう遅い！　というか私は泣いてないと言っているだろうっ！」
line = "「もう遅い！　というか私は泣いてないと言っているだろうっ！」"

[[dialogue]]
speaker = "ナターシャ"
# 「ほんと強情なんだから。かわいくないよね」
line = "「ほんと強情なんだから。かわいくないよね」"

[[dialogue]]
speaker = "unk"
# やれやれと肩を竦めるナターシャ。梨緒の意地っ張りに呆れるのもお決まりになってきた。
line = "やれやれと肩を竦めるナターシャ。梨緒の意地っ張りに呆れるのもお決まりになってきた。"

[[dialogue]]
speaker = "アポロ"
# 「あと、さっき無駄がどうとか聞こえたけど、オマエがやってきたことは無駄じゃないからな！」
line = "「あと、さっき無駄がどうとか聞こえたけど、オマエがやってきたことは無駄じゃないからな！」"

[[dialogue]]
speaker = "梨緒"
# 「え？」
line = "「え？」"

[[dialogue]]
speaker = "アポロ"
# 「オマエは世界を守ろうと頑張って、モンスターを倒して、<ruby=きょくせいじゅうき>極星従騎</ruby>と戦った。そのおかげで助けられた人がいる」
line = "「オマエは世界を守ろうと頑張って、モンスターを倒して、<ruby>極星従騎<rt>きょくせいじゅうき</rt></ruby>と戦った。そのおかげで助けられた人がいる」"

[[dialogue]]
speaker = "ベアトリス"
# 「それだけじゃないよ。梨緒ちゃんが選挙管理委員会を作ってくれたおかげで、私は１人にならずに済んだ」
line = "「それだけじゃないよ。梨緒ちゃんが選挙管理委員会を作ってくれたおかげで、私は１人にならずに済んだ」"

[[dialogue]]
speaker = "ベアトリス"
# 「右も左もわからない新星学園で、仲間を作ることができた。梨緒ちゃんのおかげだよ」
line = "「右も左もわからない新星学園で、仲間を作ることができた。梨緒ちゃんのおかげだよ」"

[[dialogue]]
speaker = "梨緒"
# 「私の……おかげ……？」
line = "「私の……おかげ……？」"

[[dialogue]]
speaker = "ナターシャ"
# 「そうそう。魔王の監視っていう、私の任務にもちょうどいいしね」
line = "「そうそう。魔王の監視っていう、私の任務にもちょうどいいしね」"

[[dialogue]]
speaker = "梨緒"
# 「最後のはいらないぞ」
line = "「最後のはいらないぞ」"

[[dialogue]]
speaker = "アポロ"
# 「それにだ」
line = "「それにだ」"

[[dialogue]]
speaker = "アポロ"
# 「オマエは全てを失ったかもしれない。あたしたちじゃ、オマエが失くしたものの代わりになれないなんてわかってる」
line = "「オマエは全てを失ったかもしれない。あたしたちじゃ、オマエが失くしたものの代わりになれないなんてわかってる」"

[[dialogue]]
speaker = "アポロ"
# 「それでも今、オマエは１人じゃない。あたしたちがいる！」
line = "「それでも今、オマエは１人じゃない。あたしたちがいる！」"

[[dialogue]]
speaker = "ベアトリス"
# 「うん。私はちょっと頼りないかもしれないけど、梨緒ちゃんを１人にはさせないから」
line = "「うん。私はちょっと頼りないかもしれないけど、梨緒ちゃんを１人にはさせないから」"

[[dialogue]]
speaker = "梨緒"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "梨緒"
# 「……ありがとう、みんな」
line = "「……ありがとう、みんな」"

[[dialogue]]
speaker = "unk"
# アポロやベアトリスの言葉を受け止め、梨緒が少しだけ微笑む。
line = "アポロやベアトリスの言葉を受け止め、梨緒が少しだけ微笑む。"

[[dialogue]]
speaker = "unk"
# 涙はいつの間にか乾いていた。
line = "涙はいつの間にか乾いていた。"

[[dialogue]]
speaker = "梨緒"
# 「改めて言っておく。私の世界が滅んだのだとしても、私はリクリエとの戦いをやめるつもりはない」
line = "「改めて言っておく。私の世界が滅んだのだとしても、私はリクリエとの戦いをやめるつもりはない」"

[[dialogue]]
speaker = "梨緒"
# 「緋宮クロトの監視についても同様だ。私が知る彼は平行世界の彼だったが、アルタイルの緋宮クロトが同じ過ちを繰り返さないと決まったわけではない。まだまだ注視が必要だろう」
line = "「緋宮クロトの監視についても同様だ。私が知る彼は平行世界の彼だったが、アルタイルの緋宮クロトが同じ過ちを繰り返さないと決まったわけではない。まだまだ注視が必要だろう」"

[[dialogue]]
speaker = "ベアトリス"
# 「うん、異議なし！　リクリエは止めないといけないもんね」
line = "「うん、異議なし！　リクリエは止めないといけないもんね」"

[[dialogue]]
speaker = "アポロ"
# 「なら、あたしも監査を続けるまでだ。魔王の監視をする以上、オマエたちにもズルはさせないからな」
line = "「なら、あたしも監査を続けるまでだ。魔王の監視をする以上、オマエたちにもズルはさせないからな」"

[[dialogue]]
speaker = "梨緒"
# 「ああ、これからもよろしく頼む」
line = "「ああ、これからもよろしく頼む」"

[[dialogue]]
speaker = "梨緒"
# 「そしてジグについての方針も変わらない。彼女は私と同じく、ベガの数少ない生き残りだ」
line = "「そしてジグについての方針も変わらない。彼女は私と同じく、ベガの数少ない生き残りだ」"

[[dialogue]]
speaker = "梨緒"
# 「たとえ厳しい戦いになったとしても、ジグに勝って彼女を取り戻す……！」
line = "「たとえ厳しい戦いになったとしても、ジグに勝って彼女を取り戻す……！」"

[[dialogue]]
speaker = "unk"
# その先にジグがいるかの如く、遠くを見据えて鋭い眼差しを向ける梨緒。
line = "その先にジグがいるかの如く、遠くを見据えて鋭い眼差しを向ける梨緒。"

[[dialogue]]
speaker = "unk"
# 瞳に宿る闘志は、決して衰えてはいなかった。
line = "瞳に宿る闘志は、決して衰えてはいなかった。"

[[dialogue]]
speaker = "アポロ"
# 「ああ、その意気だ！　あたしたちは負けないぞ！」
line = "「ああ、その意気だ！　あたしたちは負けないぞ！」"

[[dialogue]]
speaker = "ナターシャ"
# 「ふーん……」
line = "「ふーん……」"

[[dialogue]]
speaker = "梨緒"
# 「どうした、ナターシャ？」
line = "「どうした、ナターシャ？」"

[[dialogue]]
speaker = "ナターシャ"
# 「ああいや、梨緒が元気になって良かったなーって。嬉しいよ」
line = "「ああいや、梨緒が元気になって良かったなーって。嬉しいよ」"

[[dialogue]]
speaker = "梨緒"
# 「あまり感情がこもってないように聞こえるんだが」
line = "「あまり感情がこもってないように聞こえるんだが」"

[[dialogue]]
speaker = "ナターシャ"
# 「それは元からだよ元から。私、基本的に感情薄めだから」
line = "「それは元からだよ元から。私、基本的に感情薄めだから」"

[[dialogue]]
speaker = "ナターシャ"
# （もっとポキッて折れてもおかしくないかと思ったんだけど、すんなり立ち直っちゃったね）
line = "（もっとポキッて折れてもおかしくないかと思ったんだけど、すんなり立ち直っちゃったね）"

[[dialogue]]
speaker = "ナターシャ"
# （まぁ戦う気力があるなら結果オーライ……なのかな？）
line = "（まぁ戦う気力があるなら結果オーライ……なのかな？）"
