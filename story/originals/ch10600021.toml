[[dialogue]]
speaker = "unk"
# 第１話,レミカに告白,P
line = "第１話,レミカに告白,P"

[[dialogue]]
speaker = "unk"
# 学園内での映画撮影をサポートしたり、アーネストのライブを補佐したり……共に時間を過ごすうち、俺はどんどんレミカに惹かれていった。
line = "学園内での映画撮影をサポートしたり、アーネストのライブを補佐したり……共に時間を過ごすうち、俺はどんどんレミカに惹かれていった。"

[[dialogue]]
speaker = "unk"
# 世界を魅了する歌姫である彼女と、一介の学生でしかない自分は不釣り合いかもしれない。そう悩んだこともある。
line = "世界を魅了する歌姫である彼女と、一介の学生でしかない自分は不釣り合いかもしれない。そう悩んだこともある。"

[[dialogue]]
speaker = "unk"
# だけどもう覚悟を決めた。想いの一つを伝える勇気も持てない男に、あのレミカが惚れてくれるとは思えなかったから──
line = "だけどもう覚悟を決めた。想いの一つを伝える勇気も持てない男に、あのレミカが惚れてくれるとは思えなかったから──"

[[dialogue]]
speaker = "レミカ"
# 「ふぅっ……これで今日の練習は終了かな。会長、遅くまで付き合ってくれてありがとね」
line = "「ふぅっ……これで今日の練習は終了かな。会長、遅くまで付き合ってくれてありがとね」"

[[dialogue]]
speaker = "レミカ"
# 「キュートスタイルでレッスンするの、久しぶりだったから気合い入っちゃった」
line = "「キュートスタイルでレッスンするの、久しぶりだったから気合い入っちゃった」"

[[dialogue]]
speaker = "レミカ"
# 「──うん。アーネストは１日限定の約束だから解散しちゃったけど……」
line = "「──うん。アーネストは１日限定の約束だから解散しちゃったけど……」"

[[dialogue]]
speaker = "レミカ"
# 「事務所がさ、この衣装を埋もれさせるのはもったいないって言ってくれたんだ」
line = "「事務所がさ、この衣装を埋もれさせるのはもったいないって言ってくれたんだ」"

[[dialogue]]
speaker = "レミカ"
# 「それで今度、ソロライブをキュートスタイルでやってみることになったんだよね。全部、会長のおかげ」
line = "「それで今度、ソロライブをキュートスタイルでやってみることになったんだよね。全部、会長のおかげ」"

[[dialogue]]
speaker = "レミカ"
# 「で、この衣装でライブの練習をするなら、たくさんの時間を過ごしてきたこの場所がいいかなって思って」
line = "「で、この衣装でライブの練習をするなら、たくさんの時間を過ごしてきたこの場所がいいかなって思って」"

[[dialogue]]
speaker = "レミカ"
# 「環境って自分が思う以上に影響が大きいから。おかげで事務所のレッスンスタジオよりも張り切れた気がするよ」
line = "「環境って自分が思う以上に影響が大きいから。おかげで事務所のレッスンスタジオよりも張り切れた気がするよ」"

[[dialogue]]
speaker = "レミカ"
# 「だから今日、ここを貸し切りにしてくれてありがとう」
line = "「だから今日、ここを貸し切りにしてくれてありがとう」"

[[dialogue]]
speaker = "レミカ"
# 「相変わらず会長の指摘も的確だし……この調子ならパーフェクトなライブになりそうだよ」
line = "「相変わらず会長の指摘も的確だし……この調子ならパーフェクトなライブになりそうだよ」"

[[dialogue]]
speaker = "レミカ"
# 「あ……そう言えばさ、話って何？　練習が終わった後でいいって言ってたけど」
line = "「あ……そう言えばさ、話って何？　練習が終わった後でいいって言ってたけど」"

[[dialogue]]
speaker = "unk"
# レミカに聞いて欲しいことがあるんだ
line = "レミカに聞いて欲しいことがあるんだ"

[[dialogue]]
speaker = "レミカ"
# 「うん、何でも言って。会長にはお世話になってるし、どんな無理難題でもＯＫだよ」
line = "「うん、何でも言って。会長にはお世話になってるし、どんな無理難題でもＯＫだよ」"

[[dialogue]]
speaker = "レミカ"
# 「もし星徒会の広報でアイドルが必要とかだったら……ふふ♪　お世話になってるし、友達価格で社長に交渉しちゃうよ」
line = "「もし星徒会の広報でアイドルが必要とかだったら……ふふ♪　お世話になってるし、友達価格で社長に交渉しちゃうよ」"

[[dialogue]]
speaker = "レミカ"
# 「私としては、会長のお願いならタダでいいんだけど。一応事務所の所属だし、ポラプロの顔も立てないとね」
line = "「私としては、会長のお願いならタダでいいんだけど。一応事務所の所属だし、ポラプロの顔も立てないとね」"

[[dialogue]]
speaker = "レミカ"
# 「……会長？」
line = "「……会長？」"

[[dialogue]]
speaker = "unk"
# 俺と付き合って欲しい
line = "俺と付き合って欲しい"

[[dialogue]]
speaker = "unk"
# ──好きだ
line = "──好きだ"

[[dialogue]]
speaker = "レミカ"
# 「えっ──」
line = "「えっ──」"

[[dialogue]]
speaker = "レミカ"
# 「あっ……え、えっと……ずいぶんとストレート、なんだね……？」
line = "「あっ……え、えっと……ずいぶんとストレート、なんだね……？」"

[[dialogue]]
speaker = "unk"
# 驚かせちゃったかな
line = "驚かせちゃったかな"

[[dialogue]]
speaker = "レミカ"
# 「うん……結構、驚いてる。ぜんぜん予想してなかったな」
line = "「うん……結構、驚いてる。ぜんぜん予想してなかったな」"

[[dialogue]]
speaker = "レミカ"
# 「実は私、告白されることって結構多いんだ。学園の人からもそうだし、芸能界の人からもそう」
line = "「実は私、告白されることって結構多いんだ。学園の人からもそうだし、芸能界の人からもそう」"

[[dialogue]]
speaker = "レミカ"
# 「みんな、それっぽいシチュエーション……って言って伝わるかな？　話があるからって呼び出す場所、そこからもうバレバレなんだよね」
line = "「みんな、それっぽいシチュエーション……って言って伝わるかな？　話があるからって呼び出す場所、そこからもうバレバレなんだよね」"

[[dialogue]]
speaker = "レミカ"
# 「うん。おしゃれなレストランとか、夜景の見える展望台とかに誘ってくるから」
line = "「うん。おしゃれなレストランとか、夜景の見える展望台とかに誘ってくるから」"

[[dialogue]]
speaker = "レミカ"
# 「だから事前にいつも断ってたんだ。事務所の方針もあるし、プライベートでちょっとでも誤解される行動はしたくなかったから」
line = "「だから事前にいつも断ってたんだ。事務所の方針もあるし、プライベートでちょっとでも誤解される行動はしたくなかったから」"

[[dialogue]]
speaker = "レミカ"
# 「だから……うん、驚いた。まさかトレーニング施設で告白されるだなんて思わかったよ」
line = "「だから……うん、驚いた。まさかトレーニング施設で告白されるだなんて思わかったよ」"

[[dialogue]]
speaker = "unk"
# レミカと多くの時間を過ごした場所だから
line = "レミカと多くの時間を過ごした場所だから"

[[dialogue]]
speaker = "unk"
# 告白するならここがよかったんだ
line = "告白するならここがよかったんだ"

[[dialogue]]
speaker = "レミカ"
# 「まさかＯＫされるとは思わなかった……って顔だね。そんな緊張したり謙遜しなくていいのに。同級生だよ、私たち」
line = "「まさかＯＫされるとは思わなかった……って顔だね。そんな緊張したり謙遜しなくていいのに。同級生だよ、私たち」"

[[dialogue]]
speaker = "レミカ"
# 「ＯＫの理由って……私も会長が好きだから、だけど？　ていうかそれ以外に理由ってある？」
line = "「ＯＫの理由って……私も会長が好きだから、だけど？　ていうかそれ以外に理由ってある？」"

[[dialogue]]
speaker = "レミカ"
# 「そうだよ。会長が好き。あなたと仲良くなってから、毎日がずっと楽しいんだ」
line = "「そうだよ。会長が好き。あなたと仲良くなってから、毎日がずっと楽しいんだ」"

[[dialogue]]
speaker = "レミカ"
# 「新曲とか、ダンスの動画とか。私のリリースするもの全部チェックして、感想を伝えてくれるのも嬉しいし……」
line = "「新曲とか、ダンスの動画とか。私のリリースするもの全部チェックして、感想を伝えてくれるのも嬉しいし……」"

[[dialogue]]
speaker = "レミカ"
# 「臨時でプロデューサーをお願いした時も、二つ返事で引き受けてくれるよね。映画の撮影の時も、アーネストのライブの時も」
line = "「臨時でプロデューサーをお願いした時も、二つ返事で引き受けてくれるよね。映画の撮影の時も、アーネストのライブの時も」"

[[dialogue]]
speaker = "レミカ"
# 「──そうだよ？　初めて異性として意識したのは、あの映画のプロモーション撮影で、夜の校舎を歩いた時」
line = "「──そうだよ？　初めて異性として意識したのは、あの映画のプロモーション撮影で、夜の校舎を歩いた時」"

[[dialogue]]
speaker = "レミカ"
# 「同い年の男の子と手を繋いだのなんて初めてだったし。ずーっと心臓がドキドキ鳴ってたから……」
line = "「同い年の男の子と手を繋いだのなんて初めてだったし。ずーっと心臓がドキドキ鳴ってたから……」"

[[dialogue]]
speaker = "レミカ"
# 「でも告白する勇気、持てなかったんだ。私って芸能人だからプライベートとかないし。窮屈な思い、きっとさせちゃうだろうなって思ったら……」
line = "「でも告白する勇気、持てなかったんだ。私って芸能人だからプライベートとかないし。窮屈な思い、きっとさせちゃうだろうなって思ったら……」"

[[dialogue]]
speaker = "レミカ"
# 「だから、好きって言ってくれて……付き合おうって言ってくれて、すごく嬉しいよ、会長」
line = "「だから、好きって言ってくれて……付き合おうって言ってくれて、すごく嬉しいよ、会長」"

[[dialogue]]
speaker = "レミカ"
# 「告白、お受けします。私をあなたの彼女にしてください」
line = "「告白、お受けします。私をあなたの彼女にしてください」"

[[dialogue]]
speaker = "レミカ"
# 「……返事、こんな感じでいいかな。ごめん。告白されたことはあっても……ＯＫするの、初めてだから」
line = "「……返事、こんな感じでいいかな。ごめん。告白されたことはあっても……ＯＫするの、初めてだから」"

[[dialogue]]
speaker = "レミカ"
# 「ズレてなかったら嬉しいんだけど……うんっ、それならよかった」
line = "「ズレてなかったら嬉しいんだけど……うんっ、それならよかった」"

[[dialogue]]
speaker = "レミカ"
# 「で──会長。目の前に恋人になった女の子がいるわけなんだけど。そのまま突っ立ってるだけ？」
line = "「で──会長。目の前に恋人になった女の子がいるわけなんだけど。そのまま突っ立ってるだけ？」"

[[dialogue]]
speaker = "unk"
# ……キスしていい？
line = "……キスしていい？"

[[dialogue]]
speaker = "レミカ"
# 「……そこは聞かない方がパーフェクトかも、なんてね。うん──して欲しいな<emoji=heart04>」
line = "「……そこは聞かない方がパーフェクトかも、なんてね。うん──して欲しいな<emoji=heart04>」"

[[dialogue]]
speaker = "レミカ"
# 「んっ……ちゅ<emoji=heart04>　ちゅっ……ちゅっ……ぷぁ……<emoji=heart04>」
line = "「んっ……ちゅ<emoji=heart04>　ちゅっ……ちゅっ……ぷぁ……<emoji=heart04>」"

[[dialogue]]
speaker = "レミカ"
# 「あー……なるほど、なるほど……」
line = "「あー……なるほど、なるほど……」"

[[dialogue]]
speaker = "unk"
# 何が『なるほど』？
line = "何が『なるほど』？"

[[dialogue]]
speaker = "レミカ"
# 「いや、私ってさ。今まで散々、恋とかキスとかをテーマにステージで歌ってきたでしょ？」
line = "「いや、私ってさ。今まで散々、恋とかキスとかをテーマにステージで歌ってきたでしょ？」"

[[dialogue]]
speaker = "レミカ"
# 「イメージはしてたんだ。好きな男の子にキスされた時の女の子の気持ち。リアルに想像して、それを歌とダンスに込めてたつもりだったんだけど……」
line = "「イメージはしてたんだ。好きな男の子にキスされた時の女の子の気持ち。リアルに想像して、それを歌とダンスに込めてたつもりだったんだけど……」"

[[dialogue]]
speaker = "レミカ"
# 「本当に『つもり』だったみたい……<emoji=heart04>」
line = "「本当に『つもり』だったみたい……<emoji=heart04>」"

[[dialogue]]
speaker = "レミカ"
# 「現実に経験してみたら、私のイメージが全然パーフェクトじゃないことに気づいたっていう。そういう意味で、なるほど……ってこと」
line = "「現実に経験してみたら、私のイメージが全然パーフェクトじゃないことに気づいたっていう。そういう意味で、なるほど……ってこと」"

[[dialogue]]
speaker = "レミカ"
# 「すごいね、現実のキスってこんなにすごいんだ……<emoji=heart04>」
line = "「すごいね、現実のキスってこんなにすごいんだ……<emoji=heart04>」"

[[dialogue]]
speaker = "レミカ"
# 「ねぇ会長。もう一回……してもいい？」
line = "「ねぇ会長。もう一回……してもいい？」"

[[dialogue]]
speaker = "レミカ"
# 「うん……んっ……ちゅ、ちゅぅっ……ちゅ、ちゅっ……<emoji=heart04>」
line = "「うん……んっ……ちゅ、ちゅぅっ……ちゅ、ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# その後も、頬を真っ赤に染めたレミカと、何度も何度もキスを交わした。
line = "その後も、頬を真っ赤に染めたレミカと、何度も何度もキスを交わした。"

[[dialogue]]
speaker = "unk"
# 正直、レミカが告白を受け入れてくれたこと、大好きな女の子とキスができたことが嬉しすぎて……
line = "正直、レミカが告白を受け入れてくれたこと、大好きな女の子とキスができたことが嬉しすぎて……"

[[dialogue]]
speaker = "unk"
# 『ドキドキする』以外の感想が出てこない、ボキャブラリーの貧しい俺なのだった──
line = "『ドキドキする』以外の感想が出てこない、ボキャブラリーの貧しい俺なのだった──"
