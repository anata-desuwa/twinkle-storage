[[dialogue]]
speaker = "unk"
# 第２話,幻影の名残,B
line = "第２話,幻影の名残,B"

[[dialogue]]
speaker = "クロト"
# 「ごめん、トイレが混んでて遅れちゃって……お待たせ」
line = "「ごめん、トイレが混んでて遅れちゃって……お待たせ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "クロト"
# 「ってあれ？　ヴィーナス？」
line = "「ってあれ？　ヴィーナス？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「！　あ、あ──クロト！　た、たたたっ、ただいま」
line = "「！　あ、あ──クロト！　た、たたたっ、ただいま」"

[[dialogue]]
speaker = "クロト"
# 「ただいまはこっちだけど……何かあったの？」
line = "「ただいまはこっちだけど……何かあったの？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「う、ううん──なんでも……」
line = "「う、ううん──なんでも……」"

[[dialogue]]
speaker = "ヴィーナス"
# （今、見せられたのって──何……？）
line = "（今、見せられたのって──何……？）"

[[dialogue]]
speaker = "ヴィーナス"
# （<b>この世界のことじゃなかった</b>──しかも……あっちの世界じゃ、私は……）
line = "（<b>この世界のことじゃなかった</b>──しかも……あっちの世界じゃ、私は……）"

[[dialogue]]
speaker = "ヴィーナス"
# （幻──とも、思えないわ。だって確かに……私の心の内から、湧き上がってきた──みたいな……）
line = "（幻──とも、思えないわ。だって確かに……私の心の内から、湧き上がってきた──みたいな……）"

[[dialogue]]
speaker = "ヴィーナス"
# （ああもうっ……！　説明しなさいよチンチクリン──って思ったら、いつの間にかあの魔女もいなくなってるし……！）
line = "（ああもうっ……！　説明しなさいよチンチクリン──って思ったら、いつの間にかあの魔女もいなくなってるし……！）"

[[dialogue]]
speaker = "クロト"
# 「……？　ヴィーナス……？」
line = "「……？　ヴィーナス……？」"

[[dialogue]]
speaker = "unk"
# ヴィーナスは露骨に目線を逸らしていた。
line = "ヴィーナスは露骨に目線を逸らしていた。"

[[dialogue]]
speaker = "unk"
# なぜか外を行き交う人たちからも、『忘れた』『何があったんだっけ』などの声が口々に聞こえてくる。
line = "なぜか外を行き交う人たちからも、『忘れた』『何があったんだっけ』などの声が口々に聞こえてくる。"

[[dialogue]]
speaker = "クロト"
# 「店を出ようか。そろそろ、ヴィーナスのため息も減ってくれたかな」
line = "「店を出ようか。そろそろ、ヴィーナスのため息も減ってくれたかな」"

[[dialogue]]
speaker = "ヴィーナス"
# 「！　あ、あたぼうよ！　めちゃんこリフレッシュできたってんでい！」
line = "「！　あ、あたぼうよ！　めちゃんこリフレッシュできたってんでい！」"

[[dialogue]]
speaker = "クロト"
# 「妙なテンションになってないか……？」
line = "「妙なテンションになってないか……？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「まあま──それよりほら、お会計しなくちゃよね！」
line = "「まあま──それよりほら、お会計しなくちゃよね！」"

[[dialogue]]
speaker = "クロト"
# 「フ──それなら大丈夫」
line = "「フ──それなら大丈夫」"

[[dialogue]]
speaker = "クロト"
# 「もう済ませておいたからな」
line = "「もう済ませておいたからな」"

[[dialogue]]
speaker = "unk"
# そうして俺たちは『お出かけ』を終え──
line = "そうして俺たちは『お出かけ』を終え──"

[[dialogue]]
speaker = "unk"
# ヴィーナスにとっても、ちょうどいいリフレッシュの機会になってくれたようだった。
line = "ヴィーナスにとっても、ちょうどいいリフレッシュの機会になってくれたようだった。"

[[dialogue]]
speaker = "unk"
# ただ……
line = "ただ……"

[[dialogue]]
speaker = "ヴィーナス"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "クロト"
# 「……？　どうしたヴィーナス、俺のほうばっかり見つめて」
line = "「……？　どうしたヴィーナス、俺のほうばっかり見つめて」"

[[dialogue]]
speaker = "ヴィーナス"
# 「！？　なな、なんでもない！」
line = "「！？　なな、なんでもない！」"

[[dialogue]]
speaker = "unk"
# ため息の回数が減った代わり──不審な挙動を取るようになってしまったのが気がかりだった。
line = "ため息の回数が減った代わり──不審な挙動を取るようになってしまったのが気がかりだった。"

[[dialogue]]
speaker = "unk"
# 俺の秘技『トイレ行ってる間にサラッと会計』がスマートすぎたのだろうか……？
line = "俺の秘技『トイレ行ってる間にサラッと会計』がスマートすぎたのだろうか……？"

[[dialogue]]
speaker = "クロト"
# 「……ふう」
line = "「……ふう」"

[[dialogue]]
speaker = "unk"
# 今日はいろいろ歩き回って疲れた──が、まだやり残したことがある。
line = "今日はいろいろ歩き回って疲れた──が、まだやり残したことがある。"

[[dialogue]]
speaker = "クロト"
# （さて……）
line = "（さて……）"

[[dialogue]]
speaker = "unk"
# ヴィーナスから借り受けた未来の日誌。
line = "ヴィーナスから借り受けた未来の日誌。"

[[dialogue]]
speaker = "unk"
# これを一時的にでも託してもらえること自体、信頼の証とも言えるが──
line = "これを一時的にでも託してもらえること自体、信頼の証とも言えるが──"

[[dialogue]]
speaker = "unk"
# 俺にはどうしても調べたいことがあった。
line = "俺にはどうしても調べたいことがあった。"

[[dialogue]]
speaker = "クロト"
# （あの出来事があってからもう二週間は経つ……いつまでも平和でありがたいとばかり、言ってられないのも確かだ……）
line = "（あの出来事があってからもう二週間は経つ……いつまでも平和でありがたいとばかり、言ってられないのも確かだ……）"

[[dialogue]]
speaker = "unk"
# アポロの問題は何も解決していない。
line = "アポロの問題は何も解決していない。"

[[dialogue]]
speaker = "unk"
# むしろ、倒せばいいという話でもなくなっただけに、より混迷化していた。
line = "むしろ、倒せばいいという話でもなくなっただけに、より混迷化していた。"

[[dialogue]]
speaker = "unk"
# これまでヴィーナスの人生を導いてきたという謎のアイテム──
line = "これまでヴィーナスの人生を導いてきたという謎のアイテム──"

[[dialogue]]
speaker = "unk"
# 借りてきた『未来の日誌』を開く。
line = "借りてきた『未来の日誌』を開く。"

[[dialogue]]
speaker = "unk"
# そして最新のページ──今日の日付を見てみた。
line = "そして最新のページ──今日の日付を見てみた。"

[[dialogue]]
speaker = "unk"
# 『荒鷹ノ月十五日。流星市国の安寧は今日も保たれ、私たちは平穏でかけがえのない日常を過ごしていた』
line = "『荒鷹ノ月十五日。流星市国の安寧は今日も保たれ、私たちは平穏でかけがえのない日常を過ごしていた』"

[[dialogue]]
speaker = "クロト"
# 「……これだけか」
line = "「……これだけか」"

[[dialogue]]
speaker = "unk"
# 前後のページをめくってみても、今日の出来事に関する具体的な記述はどこにもなかった。
line = "前後のページをめくってみても、今日の出来事に関する具体的な記述はどこにもなかった。"

[[dialogue]]
speaker = "unk"
# 茶屋に立ち寄ったことや、風船を探しに行ったことなんかも。
line = "茶屋に立ち寄ったことや、風船を探しに行ったことなんかも。"

[[dialogue]]
speaker = "クロト"
# （平穏な日常……か）
line = "（平穏な日常……か）"

[[dialogue]]
speaker = "unk"
# ヴィーナスがやきもきしていたのもなんとなくわかった気がした。
line = "ヴィーナスがやきもきしていたのもなんとなくわかった気がした。"

[[dialogue]]
speaker = "unk"
# こうして、毎日穏やかに過ごせるという保証があったからこそ──彼女はアクションを起こしたくても起こせなかったのだろう。
line = "こうして、毎日穏やかに過ごせるという保証があったからこそ──彼女はアクションを起こしたくても起こせなかったのだろう。"

[[dialogue]]
speaker = "クロト"
# （……けど）
line = "（……けど）"

[[dialogue]]
speaker = "unk"
# ヴィーナスは──そして俺たちは──このままでいいのかという疑念がよぎる。
line = "ヴィーナスは──そして俺たちは──このままでいいのかという疑念がよぎる。"

[[dialogue]]
speaker = "unk"
# それを判断するために俺は、わざわざこの宝物を借り受けてきたのだ。
line = "それを判断するために俺は、わざわざこの宝物を借り受けてきたのだ。"

[[dialogue]]
speaker = "クロト"
# （確かめよう。この道具の真実を）
line = "（確かめよう。この道具の真実を）"

[[dialogue]]
speaker = "unk"
# ──そう、決心した矢先のことだった。
line = "──そう、決心した矢先のことだった。"

[[dialogue]]
speaker = "クロト"
# 「っ──え……？」
line = "「っ──え……？」"

[[dialogue]]
speaker = "unk"
# 一瞬──わずかに日誌が揺れ動いた。
line = "一瞬──わずかに日誌が揺れ動いた。"

[[dialogue]]
speaker = "クロト"
# 「！　これは──もしかして……」
line = "「！　これは──もしかして……」"

[[dialogue]]
speaker = "クロト"
# 「新たな日付が……増えている……」
line = "「新たな日付が……増えている……」"

[[dialogue]]
speaker = "unk"
# 期せずして俺は、未来が記される瞬間を──目の当たりにしてしまっていた。
line = "期せずして俺は、未来が記される瞬間を──目の当たりにしてしまっていた。"

[[dialogue]]
speaker = "unk"
# 次の日。
line = "次の日。"

[[dialogue]]
speaker = "unk"
# 俺はさっそく、追記された日誌を持ち主のヴィーナスへ返却しにきた。
line = "俺はさっそく、追記された日誌を持ち主のヴィーナスへ返却しにきた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「新しい記述が増えた──ですって！？」
line = "「新しい記述が増えた──ですって！？」"

[[dialogue]]
speaker = "クロト"
# 「ああ」
line = "「ああ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「やったわ！　これで前に進めるわね──これもクロトのおかげかしら？」
line = "「やったわ！　これで前に進めるわね──これもクロトのおかげかしら？」"

[[dialogue]]
speaker = "クロト"
# 「たまたまだよ。にしても──なんで朝っぱらからこんなところにいたんだ？」
line = "「たまたまだよ。にしても──なんで朝っぱらからこんなところにいたんだ？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「鍛錬に決まってるでしょ！　いつ、またアポロが現れるかもわからないんだし」
line = "「鍛錬に決まってるでしょ！　いつ、またアポロが現れるかもわからないんだし」"

[[dialogue]]
speaker = "unk"
# ヴィーナスはトレーニング施設で仮想モンスター相手に星術を連発していた。
line = "ヴィーナスはトレーニング施設で仮想モンスター相手に星術を連発していた。"

[[dialogue]]
speaker = "unk"
# 表示されているスコアはＳランク複数体を９秒台──さすがだ。
line = "表示されているスコアはＳランク複数体を９秒台──さすがだ。"

[[dialogue]]
speaker = "クロト"
# （調子は──元に戻ってるみたいだな）
line = "（調子は──元に戻ってるみたいだな）"

[[dialogue]]
speaker = "unk"
# 昨日──
line = "昨日──"

[[dialogue]]
speaker = "unk"
# 茶屋を出てからというもの、ヴィーナスはどこか上の空な様子が続いていた。
line = "茶屋を出てからというもの、ヴィーナスはどこか上の空な様子が続いていた。"

[[dialogue]]
speaker = "unk"
# それも、時おり俺のことをまじまじと見つめたり、かと思えば目を逸らしたりと……
line = "それも、時おり俺のことをまじまじと見つめたり、かと思えば目を逸らしたりと……"

[[dialogue]]
speaker = "unk"
# 調子を崩したかとも思ったが、今日の元気さを見るに特に問題はなさそうだ。
line = "調子を崩したかとも思ったが、今日の元気さを見るに特に問題はなさそうだ。"

[[dialogue]]
speaker = "ヴィーナス"
# 「それで──今度こそ、次に進む手がかりがわかったのかしら？」
line = "「それで──今度こそ、次に進む手がかりがわかったのかしら？」"

[[dialogue]]
speaker = "クロト"
# 「ああ。次に打つべき一手は記されていた」
line = "「ああ。次に打つべき一手は記されていた」"

[[dialogue]]
speaker = "ヴィーナス"
# 「なら決まりね──みんなを呼びましょ！　やるべきことが決まったなら、うかうかしている暇はないわ！」
line = "「なら決まりね──みんなを呼びましょ！　やるべきことが決まったなら、うかうかしている暇はないわ！」"
