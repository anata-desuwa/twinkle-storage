[[dialogue]]
speaker = "unk"
# 第１話,マムには逆らえない,P
line = "第１話,マムには逆らえない,P"

[[dialogue]]
speaker = "unk"
# ハロウィン騒動があった翌日。
line = "ハロウィン騒動があった翌日。"

[[dialogue]]
speaker = "unk"
# 正式に新星学園の生徒になったジャクリーヌを、新星寮『ラルーナ』の寮長を務めるマハムートに紹介しに行くことにした。
line = "正式に新星学園の生徒になったジャクリーヌを、新星寮『ラルーナ』の寮長を務めるマハムートに紹介しに行くことにした。"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「？？？　余はどうしてここに連れてこられたゆ？」
line = "「？？？　余はどうしてここに連れてこられたゆ？」"

[[dialogue]]
speaker = "unk"
# 住むところが必要になるんだ
line = "住むところが必要になるんだ"

[[dialogue]]
speaker = "unk"
# 人間界で生活するには、
line = "人間界で生活するには、"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「でも今は、ヒトリにお世話になってるから大丈夫だゆ？」
line = "「でも今は、ヒトリにお世話になってるから大丈夫だゆ？」"

[[dialogue]]
speaker = "unk"
# ヒトリのお家が大変でしょ？
line = "ヒトリのお家が大変でしょ？"

[[dialogue]]
speaker = "unk"
# ずっとそのままだと
line = "ずっとそのままだと"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「それもそうなの……じゃあこれから、どうするゆ？」
line = "「それもそうなの……じゃあこれから、どうするゆ？」"

[[dialogue]]
speaker = "unk"
# そこで生活してもらう予定だよ
line = "そこで生活してもらう予定だよ"

[[dialogue]]
speaker = "unk"
# この学園には寮があるから、
line = "この学園には寮があるから、"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「なるほどなの。それでこの人は誰なの？」
line = "「なるほどなの。それでこの人は誰なの？」"

[[dialogue]]
speaker = "unk"
# ちゃんと挨拶してね
line = "ちゃんと挨拶してね"

[[dialogue]]
speaker = "unk"
# マムはその新星寮のボス。
line = "マムはその新星寮のボス。"

[[dialogue]]
speaker = "unk"
# 挨拶する前に耳元で「マムは厳しくて怖い人だから、粗相をしないように」と言伝する。
line = "挨拶する前に耳元で「マムは厳しくて怖い人だから、粗相をしないように」と言伝する。"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「余はジャクリーヌ・オー・ランタン。『ジャック・オー・ランタン』の娘なの！　好きなものはお菓子とオシャレだゆ！」
line = "「余はジャクリーヌ・オー・ランタン。『ジャック・オー・ランタン』の娘なの！　好きなものはお菓子とオシャレだゆ！」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「人間界のことはよくわからないけど、会長の力にはなりたいと思ってるゆ！」
line = "「人間界のことはよくわからないけど、会長の力にはなりたいと思ってるゆ！」"

[[dialogue]]
speaker = "マハムート"
# 「殊勝な心掛けね。……私は新星学園３年生、妃竜院マハムート。これからは『マム』と呼ぶように」
line = "「殊勝な心掛けね。……私は新星学園３年生、妃竜院マハムート。これからは『マム』と呼ぶように」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「よろしくなの！」
line = "「よろしくなの！」"

[[dialogue]]
speaker = "マハムート"
# 「ハロウィンの事件の顛末は、そこにいる星徒会長から聞いてるわ」
line = "「ハロウィンの事件の顛末は、そこにいる星徒会長から聞いてるわ」"

[[dialogue]]
speaker = "マハムート"
# 「だいぶ派手にやらかしたようだけど、強い子が新星寮に加わるなら大歓迎よ」
line = "「だいぶ派手にやらかしたようだけど、強い子が新星寮に加わるなら大歓迎よ」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「トリックオアトリート♪　そのお菓子よこすゆ♪」
line = "「トリックオアトリート♪　そのお菓子よこすゆ♪」"

[[dialogue]]
speaker = "マハムート"
# 「おっと……この私にイタズラを仕掛けようなんて、いい度胸ね？」
line = "「おっと……この私にイタズラを仕掛けようなんて、いい度胸ね？」"

[[dialogue]]
speaker = "マハムート"
# 「しかも、私の大好物であるわたあめを盗もうとは……」
line = "「しかも、私の大好物であるわたあめを盗もうとは……」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「は、放せなの～～……っ！」
line = "「は、放せなの～～……っ！」"

[[dialogue]]
speaker = "マハムート"
# 「最近はこういう骨のある子も減ってきていたから……ふふふっ、これからが楽しみだわ」
line = "「最近はこういう骨のある子も減ってきていたから……ふふふっ、これからが楽しみだわ」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆ、ゆゆゆっ！？　この人怖いの……二度とイタズラはしないゆ……！」
line = "「ゆ、ゆゆゆっ！？　この人怖いの……二度とイタズラはしないゆ……！」"

[[dialogue]]
speaker = "マハムート"
# 「これからは、私に逆らわないと誓えるかしら？」
line = "「これからは、私に逆らわないと誓えるかしら？」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「は、はい……なの！」
line = "「は、はい……なの！」"

[[dialogue]]
speaker = "マハムート"
# 「違うでしょう？　私に対する返事は、『イエス・マム』よ！」
line = "「違うでしょう？　私に対する返事は、『イエス・マム』よ！」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「イエス・マムなの！」
line = "「イエス・マムなの！」"

[[dialogue]]
speaker = "マハムート"
# 「よろしい。……あ、会長。ちょっといいかしら？」
line = "「よろしい。……あ、会長。ちょっといいかしら？」"

[[dialogue]]
speaker = "unk"
# は、はい。なんでしょうか……
line = "は、はい。なんでしょうか……"

[[dialogue]]
speaker = "unk"
# あれだけ注意してもイタズラ三昧のジャクリーヌが、気を付けの姿勢で制止している。どうやらマムを格上と認識したらしい。
line = "あれだけ注意してもイタズラ三昧のジャクリーヌが、気を付けの姿勢で制止している。どうやらマムを格上と認識したらしい。"

[[dialogue]]
speaker = "マハムート"
# 「連れてくる後輩の躾がなってないんじゃないかしら？」
line = "「連れてくる後輩の躾がなってないんじゃないかしら？」"

[[dialogue]]
speaker = "マハムート"
# 「私はね、会長。舐められるのが大嫌いなのよ。知らなかったかしら？」
line = "「私はね、会長。舐められるのが大嫌いなのよ。知らなかったかしら？」"

[[dialogue]]
speaker = "unk"
# いえ、存じております……
line = "いえ、存じております……"

[[dialogue]]
speaker = "マハムート"
# 「ふふっ。面白いことを言うわね？　私が舐められるのが嫌いだと知っていて、躾のなっていない後輩をそのまま連れてくる……」
line = "「ふふっ。面白いことを言うわね？　私が舐められるのが嫌いだと知っていて、躾のなっていない後輩をそのまま連れてくる……」"

[[dialogue]]
speaker = "マハムート"
# 「つまり、私はあなたに舐められたということかしら？」
line = "「つまり、私はあなたに舐められたということかしら？」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ひぇっ……」
line = "「ひぇっ……」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「か、会長……余が怒られてるわけじゃないのに、怖くて泣きそうなの。もう二度としないから、許してほしいの」
line = "「か、会長……余が怒られてるわけじゃないのに、怖くて泣きそうなの。もう二度としないから、許してほしいの」"

[[dialogue]]
speaker = "マハムート"
# 「ジャクリーヌ、覚えておきなさい。社会では、部下の失敗は上司が贖うものなの。あなたの判断ミスは、会長の死によってしか清算されないわ」
line = "「ジャクリーヌ、覚えておきなさい。社会では、部下の失敗は上司が贖うものなの。あなたの判断ミスは、会長の死によってしか清算されないわ」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「会長、死んじゃダメゆ～～～……っ！」
line = "「会長、死んじゃダメゆ～～～……っ！」"

[[dialogue]]
speaker = "unk"
# 相変わらず不敬罪の罪が重い！
line = "相変わらず不敬罪の罪が重い！"

[[dialogue]]
speaker = "マハムート"
# 「あなたも相変わらず軽口が止まらないようだし、これはお仕置きが必要のようね」
line = "「あなたも相変わらず軽口が止まらないようだし、これはお仕置きが必要のようね」"

[[dialogue]]
speaker = "マハムート"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「会長がマムの鉄球を受け止めてるゆーーー！？　むしろ会長はなんで死んでないゆ！？！？！」
line = "「会長がマムの鉄球を受け止めてるゆーーー！？　むしろ会長はなんで死んでないゆ！？！？！」"

[[dialogue]]
speaker = "マハムート"
# 「あら、避けるんじゃなくてしっかり受け取るとは、ちょっとは成長したみたいじゃない」
line = "「あら、避けるんじゃなくてしっかり受け取るとは、ちょっとは成長したみたいじゃない」"

[[dialogue]]
speaker = "unk"
# マムに鍛えてもらってますから！
line = "マムに鍛えてもらってますから！"

[[dialogue]]
speaker = "マハムート"
# 「そうね。それじゃあそのまま、あと９９回耐えてもらおうかしら」
line = "「そうね。それじゃあそのまま、あと９９回耐えてもらおうかしら」"

[[dialogue]]
speaker = "unk"
# 流石にこれをあと９８回は死んだかなぁ……と思いながら、俺は後輩の指導はちゃんとやろう、と心に誓うのだった。
line = "流石にこれをあと９８回は死んだかなぁ……と思いながら、俺は後輩の指導はちゃんとやろう、と心に誓うのだった。"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「会長ーーー！？　後で余のお菓子分けてあげるから、死んじゃダメゆ～～～！！」
line = "「会長ーーー！？　後で余のお菓子分けてあげるから、死んじゃダメゆ～～～！！」"
