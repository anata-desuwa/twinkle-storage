[[dialogue]]
speaker = "ルヴィネ"
# 「同じ星徒会長として、一応挨拶させてもらうわ。私はルヴィネ。極星学園の星徒会長よ」
line = "「同じ星徒会長として、一応挨拶させてもらうわ。私はルヴィネ。極星学園の星徒会長よ」"

[[dialogue]]
speaker = "unk"
# 俺たちがルヴィネと初めて出会ったのは、事故でデネブに渡った時のことだった。
line = "俺たちがルヴィネと初めて出会ったのは、事故でデネブに渡った時のことだった。"

[[dialogue]]
speaker = "unk"
# アルタイルかデネブか、どちらかが滅びる必要がある──ルヴィネはそう主張していた。
line = "アルタイルかデネブか、どちらかが滅びる必要がある──ルヴィネはそう主張していた。"

[[dialogue]]
speaker = "クロト"
# 「敵は同じリクリエのはずだ。ならアルタイルとデネブが力を合わせてリクリエと戦うこともできるんじゃないのか？」
line = "「敵は同じリクリエのはずだ。ならアルタイルとデネブが力を合わせてリクリエと戦うこともできるんじゃないのか？」"

[[dialogue]]
speaker = "クロト"
# 「俺は新星学園の星徒会長として、アルタイルの星騎士として……アルタイルとデネブ、２つの世界で共にリクリエと戦うことを提案する！」
line = "「俺は新星学園の星徒会長として、アルタイルの星騎士として……アルタイルとデネブ、２つの世界で共にリクリエと戦うことを提案する！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「子どものような理屈をこねないで。アルタイルとデネブが両方存在している限り、リクリエは永遠に終わらない」
line = "「子どものような理屈をこねないで。アルタイルとデネブが両方存在している限り、リクリエは永遠に終わらない」"

[[dialogue]]
speaker = "ルヴィネ"
# 「私には女神様の声が聞こえるの。……と言っても、あなたたちには信じられないかもしれなけいけど」
line = "「私には女神様の声が聞こえるの。……と言っても、あなたたちには信じられないかもしれなけいけど」"

[[dialogue]]
speaker = "unk"
# 一度は破滅に瀕したデネブを救った英雄。
line = "一度は破滅に瀕したデネブを救った英雄。"

[[dialogue]]
speaker = "unk"
# 女神の力を与えられた神の遣い。
line = "女神の力を与えられた神の遣い。"

[[dialogue]]
speaker = "unk"
# それが極星学園の星徒会長として君臨する彼女だった。
line = "それが極星学園の星徒会長として君臨する彼女だった。"

[[dialogue]]
speaker = "ルヴィネ"
# 「問答は終わりかしら？　であれば……極星学園の星徒会長として、デネブの敵であるあなたたちを処断するわ」
line = "「問答は終わりかしら？　であれば……極星学園の星徒会長として、デネブの敵であるあなたたちを処断するわ」"

[[dialogue]]
speaker = "unk"
# ルヴィネは圧倒的な力を以て、俺たちの前に立ちはだかった。
line = "ルヴィネは圧倒的な力を以て、俺たちの前に立ちはだかった。"

[[dialogue]]
speaker = "unk"
# ヴィーナスのノヴァフォームの覚醒と、ルヴィネに対抗するレジスタンスの助けがなければ、俺たちはあそこで倒れていただろう。
line = "ヴィーナスのノヴァフォームの覚醒と、ルヴィネに対抗するレジスタンスの助けがなければ、俺たちはあそこで倒れていただろう。"

[[dialogue]]
speaker = "unk"
# それから俺たちはレジスタンスに匿ってもらって──
line = "それから俺たちはレジスタンスに匿ってもらって──"

[[dialogue]]
speaker = "ルヴィネ"
# 「担々麺はゴマが命！」
line = "「担々麺はゴマが命！」"

[[dialogue]]
speaker = "unk"
# ルヴィネがいろんなアルバイトをしていることや、担々麺が大好きなこともわかったっけ……
line = "ルヴィネがいろんなアルバイトをしていることや、担々麺が大好きなこともわかったっけ……"

[[dialogue]]
speaker = "unk"
# そして俺たちは、彼女を追いかけて潜入したフィーニスの塔で──
line = "そして俺たちは、彼女を追いかけて潜入したフィーニスの塔で──"

[[dialogue]]
speaker = "ルヴィネ"
# 「そう、私は女神。新たな世界を創る新時代の女神よ」
line = "「そう、私は女神。新たな世界を創る新時代の女神よ」"

[[dialogue]]
speaker = "unk"
# その正体が、テルルに代わる新たな女神であることを知った。
line = "その正体が、テルルに代わる新たな女神であることを知った。"
