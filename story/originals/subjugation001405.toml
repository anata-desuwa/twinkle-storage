[[dialogue]]
speaker = "ウィステリア"
# 「せっかくお休み取って海に来たのに……わざわざ水着にまで着替えたのに……」
line = "「せっかくお休み取って海に来たのに……わざわざ水着にまで着替えたのに……」"

[[dialogue]]
speaker = "水着フワッチ"
# 「イ～～～～～ッ」
line = "「イ～～～～～ッ」"

[[dialogue]]
speaker = "ウィステリア"
# 「うぅ、どうしてよりにもよってモンスターなんか寄ってくるのよ～！　不運だわ～！」
line = "「うぅ、どうしてよりにもよってモンスターなんか寄ってくるのよ～！　不運だわ～！」"

[[dialogue]]
speaker = "ルリエル"
# 「わわっ、すごいですぅ。いつもと違う力ですのに、一撃でモンスターを蹴散らしてしまいましたっ」
line = "「わわっ、すごいですぅ。いつもと違う力ですのに、一撃でモンスターを蹴散らしてしまいましたっ」"

[[dialogue]]
speaker = "イクシリオン"
# 「ウィステリアさんは使いこなしていらっしゃるのですね。普段と異なる自身のお力を……」
line = "「ウィステリアさんは使いこなしていらっしゃるのですね。普段と異なる自身のお力を……」"

[[dialogue]]
speaker = "ルリエル"
# 「でもでも、これはチャンスですよぉ！　有識者の登場なのですっ！」
line = "「でもでも、これはチャンスですよぉ！　有識者の登場なのですっ！」"

[[dialogue]]
speaker = "ウィステリア"
# 「あら……あなたたち。こんなところで奇遇ね？」
line = "「あら……あなたたち。こんなところで奇遇ね？」"

[[dialogue]]
speaker = "ウィステリア"
# 「珍しく幸運かも。海に来たのはいいものの、１人じゃ心細くって──」
line = "「珍しく幸運かも。海に来たのはいいものの、１人じゃ心細くって──」"

[[dialogue]]
speaker = "ルリエル"
# 「ウィステリアさんっ！」
line = "「ウィステリアさんっ！」"

[[dialogue]]
speaker = "ウィステリア"
# 「ひゃっ？　な、なに？　そんな前のめりになって」
line = "「ひゃっ？　な、なに？　そんな前のめりになって」"

[[dialogue]]
speaker = "イクシリオン"
# 「どうか私たちに星力制御のコツを教えていただけませんかっ？」
line = "「どうか私たちに星力制御のコツを教えていただけませんかっ？」"

[[dialogue]]
speaker = "ウィステリア"
# 「私、バカンスに来たんだけど……」
line = "「私、バカンスに来たんだけど……」"

[[dialogue]]
speaker = "ウィステリア"
# 「なるほど、話は聞かせてもらったわ。人工戦闘服なんてヘレナさんも面白い試みをしたものね」
line = "「なるほど、話は聞かせてもらったわ。人工戦闘服なんてヘレナさんも面白い試みをしたものね」"

[[dialogue]]
speaker = "ルリエル"
# 「ウィステリアさんの水着も戦闘服を改良したものですよね～？　それはどうやって手に入れたんですか？」
line = "「ウィステリアさんの水着も戦闘服を改良したものですよね～？　それはどうやって手に入れたんですか？」"

[[dialogue]]
speaker = "ウィステリア"
# 「私はさっき自分で改造したの。こう戦闘服にググっと星力を込めて編み直して」
line = "「私はさっき自分で改造したの。こう戦闘服にググっと星力を込めて編み直して」"

[[dialogue]]
speaker = "イクシリオン"
# 「独力で戦闘服を変化させるとは……。私たちは人工戦闘服の力を借りてやっとでしたのに……」
line = "「独力で戦闘服を変化させるとは……。私たちは人工戦闘服の力を借りてやっとでしたのに……」"

[[dialogue]]
speaker = "unk"
# しかしこれまた際どい……
line = "しかしこれまた際どい……"

[[dialogue]]
speaker = "ウィステリア"
# 「ち、違うのっ。ここまでするつもりはなかったのっ。いざ戦闘服を変化させる時に、たまたま近くで２回も雷が落ちてっ、動揺しちゃってっ」
line = "「ち、違うのっ。ここまでするつもりはなかったのっ。いざ戦闘服を変化させる時に、たまたま近くで２回も雷が落ちてっ、動揺しちゃってっ」"

[[dialogue]]
speaker = "ウィステリア"
# 「気がついたらこんな大胆な水着に。うう、せっかく休暇をとって海までやってきたのに……」
line = "「気がついたらこんな大胆な水着に。うう、せっかく休暇をとって海までやってきたのに……」"

[[dialogue]]
speaker = "ルリエル"
# 「う。その落雷ってまさか」
line = "「う。その落雷ってまさか」"

[[dialogue]]
speaker = "イクシリオン"
# 「ご、ご迷惑をおかけしました」
line = "「ご、ご迷惑をおかけしました」"

[[dialogue]]
speaker = "ウィステリア"
# 「え？　よくわからないけどいいのよ。そもそも海に来てから戦闘服を調整した私が悪いから」
line = "「え？　よくわからないけどいいのよ。そもそも海に来てから戦闘服を調整した私が悪いから」"

[[dialogue]]
speaker = "unk"
# 魔導書の呪いは健在みたいですね
line = "魔導書の呪いは健在みたいですね"

[[dialogue]]
speaker = "ウィステリア"
# 「そうなのよ……。こればっかりはどれだけ戦闘服を変化させても変わらなくて……」
line = "「そうなのよ……。こればっかりはどれだけ戦闘服を変化させても変わらなくて……」"

[[dialogue]]
speaker = "ウィステリア"
# 「いえ、私のことはいいわ。それより、星力制御のコツを教えて欲しい。という話だったかしら？」
line = "「いえ、私のことはいいわ。それより、星力制御のコツを教えて欲しい。という話だったかしら？」"

[[dialogue]]
speaker = "ルリエル"
# 「はい。どーにも新しい力が上手く使いこなせないんですぅ」
line = "「はい。どーにも新しい力が上手く使いこなせないんですぅ」"

[[dialogue]]
speaker = "イクシリオン"
# 「色々と特訓はしてみたつもりなんですが……」
line = "「色々と特訓はしてみたつもりなんですが……」"

[[dialogue]]
speaker = "unk"
# 俺も力足らずで……
line = "俺も力足らずで……"

[[dialogue]]
speaker = "ウィステリア"
# 「そこまで落ち込む必要はないわ。新しい力をすぐに使いこなせる人の方が稀だもの」
line = "「そこまで落ち込む必要はないわ。新しい力をすぐに使いこなせる人の方が稀だもの」"

[[dialogue]]
speaker = "ウィステリア"
# 「かく言う私もこの戦闘服にまだ慣れてないしね。十全に力を引き出せてるとは言えないわ」
line = "「かく言う私もこの戦闘服にまだ慣れてないしね。十全に力を引き出せてるとは言えないわ」"

[[dialogue]]
speaker = "ルリエル"
# 「ほえー……。なのにモンスターを一撃で……」
line = "「ほえー……。なのにモンスターを一撃で……」"

[[dialogue]]
speaker = "イクシリオン"
# 「す、凄まじい実力ですね……」
line = "「す、凄まじい実力ですね……」"

[[dialogue]]
speaker = "ウィステリア"
# 「ううん。さっきのモンスターもすんでのところで取り逃がしちゃったもの。しばらくは動けない程度にダメージを与えられたとは思うけど」
line = "「ううん。さっきのモンスターもすんでのところで取り逃がしちゃったもの。しばらくは動けない程度にダメージを与えられたとは思うけど」"

[[dialogue]]
speaker = "イクシリオン"
# 「どうすれば力を引き出せるようになるのでしょう。ヘレナさんからは、何かきっかけを掴めば、とアドバイスをいただいてるのですが」
line = "「どうすれば力を引き出せるようになるのでしょう。ヘレナさんからは、何かきっかけを掴めば、とアドバイスをいただいてるのですが」"

[[dialogue]]
speaker = "ウィステリア"
# 「間違ってはないわね。なんて言うか……自分の中で回路が繋がる感覚かしら」
line = "「間違ってはないわね。なんて言うか……自分の中で回路が繋がる感覚かしら」"

[[dialogue]]
speaker = "ルリエル"
# 「それって何をしたらいいんですかね～？　やっぱり苦手なことを克服するのが一番なんでしょうか？」
line = "「それって何をしたらいいんですかね～？　やっぱり苦手なことを克服するのが一番なんでしょうか？」"

[[dialogue]]
speaker = "ウィステリア"
# 「やり方は色々あるけど──そうね。せっかく海へ来ているのだから」
line = "「やり方は色々あるけど──そうね。せっかく海へ来ているのだから」"

[[dialogue]]
speaker = "ウィステリア"
# 「ひとまず細かいことは忘れて、遊んじゃいましょ♪」
line = "「ひとまず細かいことは忘れて、遊んじゃいましょ♪」"
