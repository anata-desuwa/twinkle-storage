[[dialogue]]
speaker = "unk"
# 第４話,敗残者の怨念,B
line = "第４話,敗残者の怨念,B"

[[dialogue]]
speaker = "unk"
# 俺たちはそれからもひたすらフィーニスの塔・第零層を駆け上がっていった。
line = "俺たちはそれからもひたすらフィーニスの塔・第零層を駆け上がっていった。"

[[dialogue]]
speaker = "ユウリ"
# 「おっと──行き止まりか？」
line = "「おっと──行き止まりか？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ここが終点ってことかしら？　いつもの感じなら、最後には大体ボスが待ってるはずなんだけど──」
line = "「ここが終点ってことかしら？　いつもの感じなら、最後には大体ボスが待ってるはずなんだけど──」"

[[dialogue]]
speaker = "ソフィア"
# 「ま、前のドラゴンみたいな……！」
line = "「ま、前のドラゴンみたいな……！」"

[[dialogue]]
speaker = "unk"
# きょろきょろと周囲を見渡す俺たち。
line = "きょろきょろと周囲を見渡す俺たち。"

[[dialogue]]
speaker = "unk"
# しかし、どこからも新手が飛び出してくる様子はなかった。
line = "しかし、どこからも新手が飛び出してくる様子はなかった。"

[[dialogue]]
speaker = "クロト"
# 「何もな──いや。あそこを見てくれ」
line = "「何もな──いや。あそこを見てくれ」"

[[dialogue]]
speaker = "フィオナ"
# 「──あれは……？」
line = "「──あれは……？」"

[[dialogue]]
speaker = "unk"
# そこにあったのは不吉な色をしたオーブだった。
line = "そこにあったのは不吉な色をしたオーブだった。"

[[dialogue]]
speaker = "unk"
# どす黒いオーラをまとった水晶玉が、幾何学模様の上にぽつんと鎮座している。
line = "どす黒いオーラをまとった水晶玉が、幾何学模様の上にぽつんと鎮座している。"

[[dialogue]]
speaker = "マトイ"
# 「な、何あれ……？　なんか不気味な感じ……」
line = "「な、何あれ……？　なんか不気味な感じ……」"

[[dialogue]]
speaker = "サーシャ"
# 「拾っていいのかしら……？」
line = "「拾っていいのかしら……？」"

[[dialogue]]
speaker = "unk"
# 警戒しつつオーブへと近づいていく──と。
line = "警戒しつつオーブへと近づいていく──と。"

[[dialogue]]
speaker = "敗残の亡霊"
# 『オオオオオオオォォォォ────ン………………』
line = "『オオオオオオオォォォォ────ン………………』"

[[dialogue]]
speaker = "ユウリ"
# 「んなっ──」
line = "「んなっ──」"

[[dialogue]]
speaker = "ソフィア"
# 「ユ、ユーレイ！？」
line = "「ユ、ユーレイ！？」"

[[dialogue]]
speaker = "unk"
# 瘴気が実体化して──俺たちの前に立ちはだかった！
line = "瘴気が実体化して──俺たちの前に立ちはだかった！"

[[dialogue]]
speaker = "クロト"
# 「どうやら……こいつが<ruby=ここ>零層</ruby>の番人みたいだな」
line = "「どうやら……こいつが<ruby>零層<rt>ここ</rt></ruby>の番人みたいだな」"

[[dialogue]]
speaker = "フィオナ"
# 「なんと<ruby=まがまが>禍々</ruby>しい存在……あのオーブに宿っているようですね」
line = "「なんと<ruby>禍々<rt>まがまが</rt></ruby>しい存在……あのオーブに宿っているようですね」"

[[dialogue]]
speaker = "敗残の亡霊"
# 『オォォ……ウゥゥ……ォォーン…………』
line = "『オォォ……ウゥゥ……ォォーン…………』"

[[dialogue]]
speaker = "ニャリオン"
# 「な……なんニャ、この感覚は。ワガハイ、アイツを知ってる気がするニャ」
line = "「な……なんニャ、この感覚は。ワガハイ、アイツを知ってる気がするニャ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「気のせいじゃない？　こんなの地上にいないでしょ」
line = "「気のせいじゃない？　こんなの地上にいないでしょ」"

[[dialogue]]
speaker = "クロト"
# 「いや……俺もだ、ニャリオン。この空気……どこか覚えがあるような……」
line = "「いや……俺もだ、ニャリオン。この空気……どこか覚えがあるような……」"

[[dialogue]]
speaker = "unk"
# 謎の既視感。その正体は、亡霊そのものが明かしてくれた。
line = "謎の既視感。その正体は、亡霊そのものが明かしてくれた。"

[[dialogue]]
speaker = "敗残の亡霊"
# 『リク……リエは……黙示録の表す……崇高なる天の啓示……』
line = "『リク……リエは……黙示録の表す……崇高なる天の啓示……』"

[[dialogue]]
speaker = "敗残の亡霊"
# 『よって……世界の再創生とは……女神をも超越する……チャカパラ神のご意思なのだァ……ッ……！！』
line = "『よって……世界の再創生とは……女神をも超越する……チャカパラ神のご意思なのだァ……ッ……！！』"

[[dialogue]]
speaker = "クロト"
# 「っ──！　その戯けた教義──まさか、バジュラ教団か！」
line = "「っ──！　その戯けた教義──まさか、バジュラ教団か！」"

[[dialogue]]
speaker = "unk"
# バジュラ教団──それはかつて、<ruby=ラクシス>先代魔王</ruby>に滅ぼされた抵抗勢力のひとつ。
line = "バジュラ教団──それはかつて、<ruby>先代魔王<rt>ラクシス</rt></ruby>に滅ぼされた抵抗勢力のひとつ。"

[[dialogue]]
speaker = "unk"
# そしてこの亡霊は、恐らく彼らを率いていた教祖の……！
line = "そしてこの亡霊は、恐らく彼らを率いていた教祖の……！"

[[dialogue]]
speaker = "ヴィーナス"
# 「ってことは──３０００年前の怨霊ってこと！？」
line = "「ってことは──３０００年前の怨霊ってこと！？」"

[[dialogue]]
speaker = "ユウリ"
# 「さっきの話を聞く限り、魔王の邪魔してたんだろ？　すげえはた迷惑な連中だったな」
line = "「さっきの話を聞く限り、魔王の邪魔してたんだろ？　すげえはた迷惑な連中だったな」"

[[dialogue]]
speaker = "ニャリオン"
# 「ニャんでそんニャのがここに残ってるニャンか──！？」
line = "「ニャんでそんニャのがここに残ってるニャンか──！？」"

[[dialogue]]
speaker = "サーシャ"
# 「前回のドラゴンさんは確か、朱雀暦を滅ぼした元凶だっけ……？」
line = "「前回のドラゴンさんは確か、朱雀暦を滅ぼした元凶だっけ……？」"

[[dialogue]]
speaker = "ソフィア"
# 「過去の厄介者たちばかりですね……」
line = "「過去の厄介者たちばかりですね……」"

[[dialogue]]
speaker = "フィオナ"
# 「もしかすると、フィーニスの塔は──これらを幽閉する役割をも担っていたのかもしれませんね」
line = "「もしかすると、フィーニスの塔は──これらを幽閉する役割をも担っていたのかもしれませんね」"

[[dialogue]]
speaker = "unk"
# フィオナの推測は正しく思えた。
line = "フィオナの推測は正しく思えた。"

[[dialogue]]
speaker = "unk"
# たちまち広がったバジュラ教祖の怨霊は、恨みがましい眼で俺を見据える。
line = "たちまち広がったバジュラ教祖の怨霊は、恨みがましい眼で俺を見据える。"

[[dialogue]]
speaker = "敗残の亡霊"
# 『魔王……ラクシスよ……貴様だけは……許しておけぬ……！』
line = "『魔王……ラクシスよ……貴様だけは……許しておけぬ……！』"

[[dialogue]]
speaker = "クロト"
# 「……ここにラクシスはいない。目を覚ましたらどうだ」
line = "「……ここにラクシスはいない。目を覚ましたらどうだ」"

[[dialogue]]
speaker = "敗残の亡霊"
# 『黙レ……！　貴様はラクシス──教団を解体させた、忌むべき宿敵……！」
line = "『黙レ……！　貴様はラクシス──教団を解体させた、忌むべき宿敵……！」"

[[dialogue]]
speaker = "敗残の亡霊"
# 『チャカパラ様の降臨まであと一歩だったというのに……貴様のせいで……これ以上、我らの邪魔をするなァ……！』
line = "『チャカパラ様の降臨まであと一歩だったというのに……貴様のせいで……これ以上、我らの邪魔をするなァ……！』"

[[dialogue]]
speaker = "ユウリ"
# 「聞く耳持たねーみたいだな」
line = "「聞く耳持たねーみたいだな」"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロトはあの壁画の魔王にもそっくりだものねー」
line = "「クロトはあの壁画の魔王にもそっくりだものねー」"

[[dialogue]]
speaker = "サーシャ"
# 「モンスターといい、アポロちゃんといい……会長くんは悪くないのに、ずいぶん恨まれちゃうのね」
line = "「モンスターといい、アポロちゃんといい……会長くんは悪くないのに、ずいぶん恨まれちゃうのね」"

[[dialogue]]
speaker = "クロト"
# 「仕方ありません。これも３０００年前から続く──魔王の宿縁ということでしょう」
line = "「仕方ありません。これも３０００年前から続く──魔王の宿縁ということでしょう」"

[[dialogue]]
speaker = "unk"
# 今の俺には、現代の魔王として……過去の因果もひっくるめて背負う覚悟がある。
line = "今の俺には、現代の魔王として……過去の因果もひっくるめて背負う覚悟がある。"

[[dialogue]]
speaker = "クロト"
# 「来い。名も知らない教祖の亡霊──俺がここで清算してやる」
line = "「来い。名も知らない教祖の亡霊──俺がここで清算してやる」"

[[dialogue]]
speaker = "敗残の亡霊"
# 『ほざけ……貴様は今度こそ、チャカパラ様の贄となるのだァッ──！』
line = "『ほざけ……貴様は今度こそ、チャカパラ様の贄となるのだァッ──！』"
