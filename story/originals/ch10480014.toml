[[dialogue]]
speaker = "unk"
# 第４話,マムとのこれから,P
line = "第４話,マムとのこれから,P"

[[dialogue]]
speaker = "unk"
# マムとの付き合いもそこそこ長くなって来た、ある日のこと。
line = "マムとの付き合いもそこそこ長くなって来た、ある日のこと。"

[[dialogue]]
speaker = "unk"
# 星徒会の残業を彼女が手伝ってくれていたのだが──
line = "星徒会の残業を彼女が手伝ってくれていたのだが──"

[[dialogue]]
speaker = "マハムート"
# 「会長。仕事の手、一旦止めなさい」
line = "「会長。仕事の手、一旦止めなさい」"

[[dialogue]]
speaker = "unk"
# マム、どうかした？
line = "マム、どうかした？"

[[dialogue]]
speaker = "マハムート"
# 「どうかした、じゃないわよ。アナタ、顔色がちょっと悪いわよ」
line = "「どうかした、じゃないわよ。アナタ、顔色がちょっと悪いわよ」"

[[dialogue]]
speaker = "マハムート"
# 「今日、日中は戦闘出動があったでしょ。無理してるんじゃない？」
line = "「今日、日中は戦闘出動があったでしょ。無理してるんじゃない？」"

[[dialogue]]
speaker = "unk"
# まあ、実は疲れがちょっと……
line = "まあ、実は疲れがちょっと……"

[[dialogue]]
speaker = "マハムート"
# 「やっぱり……まったく、馬鹿らしい。こんな書類仕事ごときで体調崩してどうするの」
line = "「やっぱり……まったく、馬鹿らしい。こんな書類仕事ごときで体調崩してどうするの」"

[[dialogue]]
speaker = "マハムート"
# 「決めたわ。今日の仕事はこれにて打ち切りよ」
line = "「決めたわ。今日の仕事はこれにて打ち切りよ」"

[[dialogue]]
speaker = "マハムート"
# 「それから会長、こっちのソファーに来て、座りなさい」
line = "「それから会長、こっちのソファーに来て、座りなさい」"

[[dialogue]]
speaker = "マハムート"
# 「拒否権は認めないわ、これは<b>寮長命令</b>よ」
line = "「拒否権は認めないわ、これは<b>寮長命令</b>よ」"

[[dialogue]]
speaker = "unk"
# マムと並んでソファーに座ると、彼女は引力操作を使い、強引に俺の頭を自分の膝の上に乗せた。
line = "マムと並んでソファーに座ると、彼女は引力操作を使い、強引に俺の頭を自分の膝の上に乗せた。"

[[dialogue]]
speaker = "unk"
# わっ、これって……
line = "わっ、これって……"

[[dialogue]]
speaker = "マハムート"
# 「いわゆる膝枕というやつね。畏怖をもって感謝なさい、寮生でも滅多にしてあげることないんだから」
line = "「いわゆる膝枕というやつね。畏怖をもって感謝なさい、寮生でも滅多にしてあげることないんだから」"

[[dialogue]]
speaker = "マハムート"
# 「あら、顔が赤いわよ？　ひょっとして熱があるんじゃない？」
line = "「あら、顔が赤いわよ？　ひょっとして熱があるんじゃない？」"

[[dialogue]]
speaker = "マハムート"
# 「なに、違う？　膝枕が照れくさい？」
line = "「なに、違う？　膝枕が照れくさい？」"

[[dialogue]]
speaker = "マハムート"
# 「最初の頃に比べて、先輩の私に随分と気安く接するようになった癖に、今更そんなことを気にするわけ？」
line = "「最初の頃に比べて、先輩の私に随分と気安く接するようになった癖に、今更そんなことを気にするわけ？」"

[[dialogue]]
speaker = "unk"
# いや、今だからこそ、むしろ気になるというか……
line = "いや、今だからこそ、むしろ気になるというか……"

[[dialogue]]
speaker = "マハムート"
# 「とにかく、起き上がるのは却下よ。このまま横になってなさい」
line = "「とにかく、起き上がるのは却下よ。このまま横になってなさい」"

[[dialogue]]
speaker = "マハムート"
# 「しばらく安静にしていれば、少しは気分も良くなるでしょ」
line = "「しばらく安静にしていれば、少しは気分も良くなるでしょ」"

[[dialogue]]
speaker = "マハムート"
# 「まったく、それにしても……」
line = "「まったく、それにしても……」"

[[dialogue]]
speaker = "マハムート"
# 「最近少しは会長らしくなって来たと思っていたけど、まだまだね」
line = "「最近少しは会長らしくなって来たと思っていたけど、まだまだね」"

[[dialogue]]
speaker = "マハムート"
# 「リクリエはこっちの都合なんて待ってはくれないわ。体調を万全に整えるのも、会長としての大事な仕事よ」
line = "「リクリエはこっちの都合なんて待ってはくれないわ。体調を万全に整えるのも、会長としての大事な仕事よ」"

[[dialogue]]
speaker = "unk"
# ごめん、マムの言う通りだ……
line = "ごめん、マムの言う通りだ……"

[[dialogue]]
speaker = "マハムート"
# 「十分に反省なさい。ただ、今は余計なことを考えず、ゆっくりと休むこと」
line = "「十分に反省なさい。ただ、今は余計なことを考えず、ゆっくりと休むこと」"

[[dialogue]]
speaker = "マハムート"
# 「疲れているなら、少し眠っててもいいわよ」
line = "「疲れているなら、少し眠っててもいいわよ」"

[[dialogue]]
speaker = "マハムート"
# 「私はここから動かなくとも、引力操作で物を動かせるし」
line = "「私はここから動かなくとも、引力操作で物を動かせるし」"

[[dialogue]]
speaker = "マハムート"
# 「ふふっ……アナタの髪、初めて触ったけど、なかなか触り心地が良いわね」
line = "「ふふっ……アナタの髪、初めて触ったけど、なかなか触り心地が良いわね」"

[[dialogue]]
speaker = "マハムート"
# 「少し梳いてあげましょうか。……ふっ、何だか大きな子供を相手にしてるような気分ね」
line = "「少し梳いてあげましょうか。……ふっ、何だか大きな子供を相手にしてるような気分ね」"

[[dialogue]]
speaker = "マハムート"
# 「ん？　どうかしたかしら？」
line = "「ん？　どうかしたかしら？」"

[[dialogue]]
speaker = "unk"
# どうしてマムは優しくしてくれるの？
line = "どうしてマムは優しくしてくれるの？"

[[dialogue]]
speaker = "unk"
# ……俺は寮生じゃないのに、
line = "……俺は寮生じゃないのに、"

[[dialogue]]
speaker = "マハムート"
# 「何を言い出すかと思えば……そんなことを気にしてたわけ？」
line = "「何を言い出すかと思えば……そんなことを気にしてたわけ？」"

[[dialogue]]
speaker = "マハムート"
# 「別に優しくしたつもりはないけれど……でも、そうね」
line = "「別に優しくしたつもりはないけれど……でも、そうね」"

[[dialogue]]
speaker = "マハムート"
# 「どうして、アナタに構うのかと問われれば──」
line = "「どうして、アナタに構うのかと問われれば──」"

[[dialogue]]
speaker = "マハムート"
# 「アナタが私の後輩で、放っておけないからかしら」
line = "「アナタが私の後輩で、放っておけないからかしら」"

[[dialogue]]
speaker = "unk"
# マムに心配させないような男になるよ
line = "マムに心配させないような男になるよ"

[[dialogue]]
speaker = "unk"
# だったらこれからは、
line = "だったらこれからは、"

[[dialogue]]
speaker = "マハムート"
# 「あら……面白いことを言うじゃない？」
line = "「あら……面白いことを言うじゃない？」"

[[dialogue]]
speaker = "マハムート"
# 「そうして頂戴、と言いたいところだけど……」
line = "「そうして頂戴、と言いたいところだけど……」"

[[dialogue]]
speaker = "マハムート"
# 「立派になったらなったで、からかい甲斐がないわね。……ふふっ」
line = "「立派になったらなったで、からかい甲斐がないわね。……ふふっ」"

[[dialogue]]
speaker = "unk"
# えぇ……
line = "えぇ……"

[[dialogue]]
speaker = "マハムート"
# 「冗談よ。せいぜい私に心配させないような男になってみせなさい」
line = "「冗談よ。せいぜい私に心配させないような男になってみせなさい」"

[[dialogue]]
speaker = "マハムート"
# 「でも……ああ、そうね──」
line = "「でも……ああ、そうね──」"

[[dialogue]]
speaker = "マハムート"
# 「会長、アナタはとても強い。それなのに、どこか放っておけないからこそ、面白いのね。きっと」
line = "「会長、アナタはとても強い。それなのに、どこか放っておけないからこそ、面白いのね。きっと」"

[[dialogue]]
speaker = "unk"
# マムはそう言うと、俺の頭を撫でながら微笑む。その眼差しはとても優しいもので──
line = "マムはそう言うと、俺の頭を撫でながら微笑む。その眼差しはとても優しいもので──"

[[dialogue]]
speaker = "マハムート"
# 「あら、顔が赤いわよ？　やっぱり熱でもあるんじゃない？」
line = "「あら、顔が赤いわよ？　やっぱり熱でもあるんじゃない？」"

[[dialogue]]
speaker = "マハムート"
# 「……違う？　じゃあ、照れてるってこと？」
line = "「……違う？　じゃあ、照れてるってこと？」"

[[dialogue]]
speaker = "マハムート"
# 「ふふっ、変な子ね……」
line = "「ふふっ、変な子ね……」"

[[dialogue]]
speaker = "unk"
# そう言って、優しげな微笑みを浮かべながら人差し指で頬っぺたを突っついて来るマムに、俺はまたドキッとしてしまうのだった。
line = "そう言って、優しげな微笑みを浮かべながら人差し指で頬っぺたを突っついて来るマムに、俺はまたドキッとしてしまうのだった。"
