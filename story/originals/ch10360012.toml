[[dialogue]]
speaker = "unk"
# 第２話,水面下の白鳥,P
line = "第２話,水面下の白鳥,P"

[[dialogue]]
speaker = "unk"
# ちょっとした用事でトレーニング施設に向かうと、そこでフェニエルの姿を見つけた。
line = "ちょっとした用事でトレーニング施設に向かうと、そこでフェニエルの姿を見つけた。"

[[dialogue]]
speaker = "unk"
# フニ、どうかした……？
line = "フニ、どうかした……？"

[[dialogue]]
speaker = "フェニエル"
# 「あれ、会長さん？　こんばんは。実は……」
line = "「あれ、会長さん？　こんばんは。実は……」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ふっ……！　はっ……！　ふっ……！」
line = "「ふっ……！　はっ……！　ふっ……！」"

[[dialogue]]
speaker = "unk"
# （千園寺先輩……凄い気迫だ）
line = "（千園寺先輩……凄い気迫だ）"

[[dialogue]]
speaker = "フェニエル"
# 「お姉様の内緒のトレーニングなんです。ちょっとだけ様子を見に来たつもりだったんですが、つい魅入ってしまって……」
line = "「お姉様の内緒のトレーニングなんです。ちょっとだけ様子を見に来たつもりだったんですが、つい魅入ってしまって……」"

[[dialogue]]
speaker = "フェニエル"
# 「いつもの優雅なお姉様とは全然違うんですけど、何だか凄く格好良くて。……時間が経つのも、忘れてしまうんです」
line = "「いつもの優雅なお姉様とは全然違うんですけど、何だか凄く格好良くて。……時間が経つのも、忘れてしまうんです」"

[[dialogue]]
speaker = "フェニエル"
# 「ただ、お姉様はトレーニング姿を見られるのがお好きではないそうなので、出来れば私が覗いていたことは、秘密にして頂けると……」
line = "「ただ、お姉様はトレーニング姿を見られるのがお好きではないそうなので、出来れば私が覗いていたことは、秘密にして頂けると……」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「フニ、全部聞こえていましてよ」
line = "「フニ、全部聞こえていましてよ」"

[[dialogue]]
speaker = "フェニエル"
# 「ぴぃっ！？　お姉様、いつの間に……？」
line = "「ぴぃっ！？　お姉様、いつの間に……？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「貴方はもっと周囲の気配に敏感になった方がいいですわね。戦闘ではその油断が命取りになりますわよ」
line = "「貴方はもっと周囲の気配に敏感になった方がいいですわね。戦闘ではその油断が命取りになりますわよ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「しかし、トレーニング姿を緋宮会長に見られてしまうとは、私も油断していましたわ」
line = "「しかし、トレーニング姿を緋宮会長に見られてしまうとは、私も油断していましたわ」"

[[dialogue]]
speaker = "unk"
# 先輩の居場所をマムから聞きまして
line = "先輩の居場所をマムから聞きまして"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「マハムートから？　全く、悪戯好きですわね……それで、私に何か用がございますの？」
line = "「マハムートから？　全く、悪戯好きですわね……それで、私に何か用がございますの？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ん、これは……ああ、今度の定例会の資料ですわね。届けて下さり、感謝致しますわ」
line = "「ん、これは……ああ、今度の定例会の資料ですわね。届けて下さり、感謝致しますわ」"

[[dialogue]]
speaker = "unk"
# いつもこんな時間までトレーニングを？
line = "いつもこんな時間までトレーニングを？"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「はて、何のことやら分かりませんわね。今日はたまたま――」
line = "「はて、何のことやら分かりませんわね。今日はたまたま――」"

[[dialogue]]
speaker = "フェニエル"
# 「そうなんです！」
line = "「そうなんです！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「えっ」
line = "「えっ」"

[[dialogue]]
speaker = "フェニエル"
# 「お姉様は毎日欠かさず、夜に集中してトレーニングをされているんです！　しかも、そのトレーニング量は凄くて、早朝まで続けることもあるくらいで！」
line = "「お姉様は毎日欠かさず、夜に集中してトレーニングをされているんです！　しかも、そのトレーニング量は凄くて、早朝まで続けることもあるくらいで！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ま、待ちなさいフニ。貴方が何でそれを知っているのかしら？」
line = "「ま、待ちなさいフニ。貴方が何でそれを知っているのかしら？」"

[[dialogue]]
speaker = "フェニエル"
# 「感動して、見ていました！」
line = "「感動して、見ていました！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ですわ！？　むしろ貴方の集中力の方が凄いのではなくて……！？」
line = "「ですわ！？　むしろ貴方の集中力の方が凄いのではなくて……！？」"

[[dialogue]]
speaker = "フェニエル"
# 「お姉様の尊敬出来るところは、ハードなトレーニングを毎日欠かさず続けているのに、昼間はそれをおくびにも出さず、優雅に振る舞い続けているところです！」
line = "「お姉様の尊敬出来るところは、ハードなトレーニングを毎日欠かさず続けているのに、昼間はそれをおくびにも出さず、優雅に振る舞い続けているところです！」"

[[dialogue]]
speaker = "フェニエル"
# 「真面目に授業を受け、星騎士の仕事をこなし、寮長として後輩を厳しくも真摯に向き合って指導する。まさに、模範生……私の尊敬するお姉様です！」
line = "「真面目に授業を受け、星騎士の仕事をこなし、寮長として後輩を厳しくも真摯に向き合って指導する。まさに、模範生……私の尊敬するお姉様です！」"

[[dialogue]]
speaker = "unk"
# 千園寺先輩は努力家だったんですね
line = "千園寺先輩は努力家だったんですね"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「も、もう！　フニ、そのくらいになさい！　あまり上級生に恥をかかせるものではなくってよ！」
line = "「も、もう！　フニ、そのくらいになさい！　あまり上級生に恥をかかせるものではなくってよ！」"

[[dialogue]]
speaker = "フェニエル"
# 「あっ……申し訳ありません、お姉様。つい熱くなっちゃって……」
line = "「あっ……申し訳ありません、お姉様。つい熱くなっちゃって……」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「努力とは見せびらかすものではありません。あくまで成果に繋げる為の過程であり、美しい結果だけを当然のように見せることこそがエレガント――」
line = "「努力とは見せびらかすものではありません。あくまで成果に繋げる為の過程であり、美しい結果だけを当然のように見せることこそがエレガント――」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「すなわち、私の美学なのですわ」
line = "「すなわち、私の美学なのですわ」"

[[dialogue]]
speaker = "フェニエル"
# 「お姉様……！　私、感動しました！　やはりお姉様は、尊敬出来る凄い人ですっ」
line = "「お姉様……！　私、感動しました！　やはりお姉様は、尊敬出来る凄い人ですっ」"

[[dialogue]]
speaker = "フェニエル"
# 「だからこそ流星寮の皆さんは、お姉さまが自主練してても<b>知らないフリ</b>をしているんですね……！」
line = "「だからこそ流星寮の皆さんは、お姉さまが自主練してても<b>知らないフリ</b>をしているんですね……！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「そうそう、その通り……って、んん？　フニ、今なんと言ったかしら？」
line = "「そうそう、その通り……って、んん？　フニ、今なんと言ったかしら？」"

[[dialogue]]
speaker = "フェニエル"
# 「流星寮の皆さんも、お姉様を尊敬しているということです！」
line = "「流星寮の皆さんも、お姉様を尊敬しているということです！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「そ、そう？　何か聞き捨てならない台詞が聞こえたような気が……」
line = "「そ、そう？　何か聞き捨てならない台詞が聞こえたような気が……」"

[[dialogue]]
speaker = "unk"
# （寮生みんなに努力がバレてる……！）
line = "（寮生みんなに努力がバレてる……！）"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ま、まあいいですわ。そんなわけで、緋宮会長も私がトレーニングしていたことは、吹聴しないで頂けますかしら？」
line = "「ま、まあいいですわ。そんなわけで、緋宮会長も私がトレーニングしていたことは、吹聴しないで頂けますかしら？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「淑女としてみっともないところを、あまり知られたくはありませんので」
line = "「淑女としてみっともないところを、あまり知られたくはありませんので」"

[[dialogue]]
speaker = "unk"
# その上で、一緒に鍛錬しちゃダメですか？
line = "その上で、一緒に鍛錬しちゃダメですか？"

[[dialogue]]
speaker = "unk"
# 言いふらさないと約束します
line = "言いふらさないと約束します"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「え？　緋宮会長が私と一緒に？」
line = "「え？　緋宮会長が私と一緒に？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ふむ。誰かと一緒にトレーニングすることは、これまであまりありませんでしたわね……」
line = "「ふむ。誰かと一緒にトレーニングすることは、これまであまりありませんでしたわね……」"

[[dialogue]]
speaker = "unk"
# 俺は強くなりたい。リクリエを止める為に
line = "俺は強くなりたい。リクリエを止める為に"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「……！　ふふっ……」
line = "「……！　ふふっ……」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「おーっほっほっほ！　そうですわね、その通りですわ！　それに緋宮会長にはこの前、同志として親交を結ぶことを宣言したばかり！」
line = "「おーっほっほっほ！　そうですわね、その通りですわ！　それに緋宮会長にはこの前、同志として親交を結ぶことを宣言したばかり！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「いいでしょう。リクリエを阻止出来る最強の星騎士になる為、今日だけと言わず、貴方を私の正式なトレーニングパートナーにして差し上げますわ！」
line = "「いいでしょう。リクリエを阻止出来る最強の星騎士になる為、今日だけと言わず、貴方を私の正式なトレーニングパートナーにして差し上げますわ！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「そうと決まれば、善は急げ、すぐに共同トレーニング開始ですわよ！」
line = "「そうと決まれば、善は急げ、すぐに共同トレーニング開始ですわよ！」"

[[dialogue]]
speaker = "フェニエル"
# 「あ、あの、お姉様っ。私も一緒に参加しちゃダメですか……？」
line = "「あ、あの、お姉様っ。私も一緒に参加しちゃダメですか……？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ふふっ、こうなれば１人くらい増えたところで変わりませんわ！　隠れて覗かれるくらいなら、訓練を見てあげてもよろしくてよ、フニ！」
line = "「ふふっ、こうなれば１人くらい増えたところで変わりませんわ！　隠れて覗かれるくらいなら、訓練を見てあげてもよろしくてよ、フニ！」"

[[dialogue]]
speaker = "フェニエル"
# 「はいっ。ありがとうございます、お姉様♪」
line = "「はいっ。ありがとうございます、お姉様♪」"

[[dialogue]]
speaker = "unk"
# こうしてその日から、俺とフェニエルは、千園寺先輩とトレーニング仲間になったのだった。
line = "こうしてその日から、俺とフェニエルは、千園寺先輩とトレーニング仲間になったのだった。"
