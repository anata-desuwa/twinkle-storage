[[dialogue]]
speaker = "unk"
# 第４話,通い妻パルミエ！,P
line = "第４話,通い妻パルミエ！,P"

[[dialogue]]
speaker = "unk"
# とある日の夜。不意に響いたチャイムを聞いて玄関を開けると──
line = "とある日の夜。不意に響いたチャイムを聞いて玄関を開けると──"

[[dialogue]]
speaker = "パルミエ"
# 「はぁ～い、ダーリン♪　可愛い私が通い妻に来てあげたわよ～♪」
line = "「はぁ～い、ダーリン♪　可愛い私が通い妻に来てあげたわよ～♪」"

[[dialogue]]
speaker = "パルミエ"
# 「今夜はお義理さまがいないんでしょ？　ふふふ、遠慮なく夫婦の絆を深められるわね♪　勝負下着も着けてきちゃった♪」
line = "「今夜はお義理さまがいないんでしょ？　ふふふ、遠慮なく夫婦の絆を深められるわね♪　勝負下着も着けてきちゃった♪」"

[[dialogue]]
speaker = "パルミエ"
# 『って、どうして追い出すのよ～！？　入れてってばぁ～！！』
line = "『って、どうして追い出すのよ～！？　入れてってばぁ～！！』"

[[dialogue]]
speaker = "パルミエ"
# 『可愛い妻を締め出すなんて旦那失格よ～！？　入れてくれないなら朝までここで騒いでやる～！』
line = "『可愛い妻を締め出すなんて旦那失格よ～！？　入れてくれないなら朝までここで騒いでやる～！』"

[[dialogue]]
speaker = "パルミエ"
# 「んもう、冗談が通じないんだから。せっかく１人で寂しい夜を過ごしてるかと思って訪ねてきてあげたのに」
line = "「んもう、冗談が通じないんだから。せっかく１人で寂しい夜を過ごしてるかと思って訪ねてきてあげたのに」"

[[dialogue]]
speaker = "パルミエ"
# 「にしても……ふむふむ。本当に１人で過ごしてたのね？　てっきり誰かしら他の女の子を連れ込んでるのかと思ってたけど」
line = "「にしても……ふむふむ。本当に１人で過ごしてたのね？　てっきり誰かしら他の女の子を連れ込んでるのかと思ってたけど」"

[[dialogue]]
speaker = "パルミエ"
# 「あ、別に連れ込んでたとしても怒らないから安心して♪　私、浮気には寛容だから♪　──って、また追い出そうとしないの！」
line = "「あ、別に連れ込んでたとしても怒らないから安心して♪　私、浮気には寛容だから♪　──って、また追い出そうとしないの！」"

[[dialogue]]
speaker = "パルミエ"
# 「それよりお台所借りるわよ？　晩ご飯まだなんでしょ？」
line = "「それよりお台所借りるわよ？　晩ご飯まだなんでしょ？」"

[[dialogue]]
speaker = "パルミエ"
# 「ふふん、通い妻に来たって言ったじゃない。今夜はこのために来たんだから」
line = "「ふふん、通い妻に来たって言ったじゃない。今夜はこのために来たんだから」"

[[dialogue]]
speaker = "パルミエ"
# 「まぁ見てなさい？　私の作る料理は絶品よ？　私の良妻っぷりをダーリンに教えてあげるわ」
line = "「まぁ見てなさい？　私の作る料理は絶品よ？　私の良妻っぷりをダーリンに教えてあげるわ」"

[[dialogue]]
speaker = "パルミエ"
# 「できあがり～！　どうぞどうぞ、冷めないうちに食べちゃって？」
line = "「できあがり～！　どうぞどうぞ、冷めないうちに食べちゃって？」"

[[dialogue]]
speaker = "パルミエ"
# 「ふふ、美味しいでしょ？　私、普段やらないだけでお料理は得意な部類なんだから♪」
line = "「ふふ、美味しいでしょ？　私、普段やらないだけでお料理は得意な部類なんだから♪」"

[[dialogue]]
speaker = "パルミエ"
# 「愛情もたっぷりたーっぷり込めておいたから。味わって食べてね？」
line = "「愛情もたっぷりたーっぷり込めておいたから。味わって食べてね？」"

[[dialogue]]
speaker = "unk"
# またそうやって冗談を……
line = "またそうやって冗談を……"

[[dialogue]]
speaker = "パルミエ"
# 「むむ、失礼ね。愛情を込めてるのは本当よ？」
line = "「むむ、失礼ね。愛情を込めてるのは本当よ？」"

[[dialogue]]
speaker = "パルミエ"
# 「考えてもみて？　面倒臭がり屋の私が、好きでもない人のためにわざわざ料理を作りに来ると思う？」
line = "「考えてもみて？　面倒臭がり屋の私が、好きでもない人のためにわざわざ料理を作りに来ると思う？」"

[[dialogue]]
speaker = "パルミエ"
# 「確かに最初は、初心で面白くて親に紹介する結婚相手に丁度いいなぁって思ってダーリンに結婚を迫っていたけど……」
line = "「確かに最初は、初心で面白くて親に紹介する結婚相手に丁度いいなぁって思ってダーリンに結婚を迫っていたけど……」"

[[dialogue]]
speaker = "パルミエ"
# 「でも……最近は割と本気なのよ？　本気でダーリンのこと、好きになっちゃってるんだからね……？」
line = "「でも……最近は割と本気なのよ？　本気でダーリンのこと、好きになっちゃってるんだからね……？」"

[[dialogue]]
speaker = "パルミエ"
# 「これでも勇気を出して部屋に来たんだから……。そろそろダーリンから真剣に答えを聞かせてもらおうと思って……」
line = "「これでも勇気を出して部屋に来たんだから……。そろそろダーリンから真剣に答えを聞かせてもらおうと思って……」"

[[dialogue]]
speaker = "パルミエ"
# 「ね……。ダーリン？　最初に会った時に尋ねたこと……今日ここでもう一度聞いてもいいかしら？」
line = "「ね……。ダーリン？　最初に会った時に尋ねたこと……今日ここでもう一度聞いてもいいかしら？」"

[[dialogue]]
speaker = "unk"
# 突然すぎて心の準備が──
line = "突然すぎて心の準備が──"

[[dialogue]]
speaker = "パルミエ"
# 「ま、待たないわっ。私だって自分を奮い立たせてここへ来たんだものっ」
line = "「ま、待たないわっ。私だって自分を奮い立たせてここへ来たんだものっ」"

[[dialogue]]
speaker = "パルミエ"
# 「改めて聞くわよ、ダーリン。ダーリンさえ良ければ、その……！　その、ね──……？」
line = "「改めて聞くわよ、ダーリン。ダーリンさえ良ければ、その……！　その、ね──……？」"

[[dialogue]]
speaker = "パルミエ"
# 「星徒会をやめて、おなか部に入ってくれないっ？」
line = "「星徒会をやめて、おなか部に入ってくれないっ？」"

[[dialogue]]
speaker = "unk"
# ……は？
line = "……は？"

[[dialogue]]
speaker = "パルミエ"
# 「だからおなか部よ、おなか部♪　最初に会った時もチラっと勧誘したじゃな～い♪」
line = "「だからおなか部よ、おなか部♪　最初に会った時もチラっと勧誘したじゃな～い♪」"

[[dialogue]]
speaker = "パルミエ"
# 「シフォンもモナカもダーリンのこと気に入ってるみたいだし♪　ダーリンが入部してくれれば、もっと楽しくなると思うのよね～♪」
line = "「シフォンもモナカもダーリンのこと気に入ってるみたいだし♪　ダーリンが入部してくれれば、もっと楽しくなると思うのよね～♪」"

[[dialogue]]
speaker = "パルミエ"
# 「って、あら？　あらあら？　どうしたの、ダーリン？　お顔真っ赤よ～？」
line = "「って、あら？　あらあら？　どうしたの、ダーリン？　お顔真っ赤よ～？」"

[[dialogue]]
speaker = "パルミエ"
# 「ふふ、まさか私との結婚話の方だと思った？　やーねー、そっちの方はダーリンの意志とは無関係に進めさせてもらってるわよ～♪」
line = "「ふふ、まさか私との結婚話の方だと思った？　やーねー、そっちの方はダーリンの意志とは無関係に進めさせてもらってるわよ～♪」"

[[dialogue]]
speaker = "unk"
# それはそれで困るんだけど！？
line = "それはそれで困るんだけど！？"

[[dialogue]]
speaker = "パルミエ"
# 「あはは、本当に面白いわね～。照れたり呆れたり怒ったり、それでこそからかい甲斐があるってものよ～」
line = "「あはは、本当に面白いわね～。照れたり呆れたり怒ったり、それでこそからかい甲斐があるってものよ～」"

[[dialogue]]
speaker = "パルミエ"
# 「でも、ダーリンがおなか部に入ってくれたらいいのにって思ってるのは本当よ？　ダーリンが好きっていうのも本当だし」
line = "「でも、ダーリンがおなか部に入ってくれたらいいのにって思ってるのは本当よ？　ダーリンが好きっていうのも本当だし」"

[[dialogue]]
speaker = "パルミエ"
# 「まぁそれがＬＩＫＥかＬＯＶＥかはダーリンの想像に任せるけど♪」
line = "「まぁそれがＬＩＫＥかＬＯＶＥかはダーリンの想像に任せるけど♪」"

[[dialogue]]
speaker = "unk"
# そろそろ何の用事で来たか教えてくれ……
line = "そろそろ何の用事で来たか教えてくれ……"

[[dialogue]]
speaker = "パルミエ"
# 「うん？　それは最初に言ったじゃない。１人で寂しい夜を過ごしてるかもしれないから訪ねてきてあげたのよ」
line = "「うん？　それは最初に言ったじゃない。１人で寂しい夜を過ごしてるかもしれないから訪ねてきてあげたのよ」"

[[dialogue]]
speaker = "パルミエ"
# 「晩ご飯を１人で黙って食べるのって楽しくないじゃない？　広い家で１人で過ごすのって悲しいじゃない？」
line = "「晩ご飯を１人で黙って食べるのって楽しくないじゃない？　広い家で１人で過ごすのって悲しいじゃない？」"

[[dialogue]]
speaker = "パルミエ"
# 「私はシフォンやモナカと出会うまで、そういうのがすごく寂しかったから」
line = "「私はシフォンやモナカと出会うまで、そういうのがすごく寂しかったから」"

[[dialogue]]
speaker = "パルミエ"
# 「うちの親、すごくドライなのよね～。ご飯中も私語禁止だったし。そもそも大抵屋敷にいないし。そのくせ私は屋敷から出してくれないし」
line = "「うちの親、すごくドライなのよね～。ご飯中も私語禁止だったし。そもそも大抵屋敷にいないし。そのくせ私は屋敷から出してくれないし」"

[[dialogue]]
speaker = "パルミエ"
# 「だからかしらね？　今夜、ダーリンのお義母さんが留守にしてるって小耳に挟んで、つい飛んで来ちゃったの」
line = "「だからかしらね？　今夜、ダーリンのお義母さんが留守にしてるって小耳に挟んで、つい飛んで来ちゃったの」"

[[dialogue]]
speaker = "パルミエ"
# 「ほら私、好きな人には笑顔でいてもらいたいってタイプだから。ダーリンが１人寂しくもそもそご飯を食べてるかと思うと気になっちゃって」
line = "「ほら私、好きな人には笑顔でいてもらいたいってタイプだから。ダーリンが１人寂しくもそもそご飯を食べてるかと思うと気になっちゃって」"

[[dialogue]]
speaker = "パルミエ"
# 「ま、自分でもちょっと意外だったんだけどね？　シフォンやモナカのためならともかく、他の誰かのためにこんな面倒なことしちゃうなんて」
line = "「ま、自分でもちょっと意外だったんだけどね？　シフォンやモナカのためならともかく、他の誰かのためにこんな面倒なことしちゃうなんて」"

[[dialogue]]
speaker = "パルミエ"
# 「いつの間にか、それくらいダーリンのことが気に入っちゃってるみたい。なんだか放っておけないし、からかい甲斐もあって楽しいし」
line = "「いつの間にか、それくらいダーリンのことが気に入っちゃってるみたい。なんだか放っておけないし、からかい甲斐もあって楽しいし」"

[[dialogue]]
speaker = "パルミエ"
# 「私、ホント言うと男性になんて一切興味の欠片もなかったけど。もしかしたら私、意外と本当に──……」
line = "「私、ホント言うと男性になんて一切興味の欠片もなかったけど。もしかしたら私、意外と本当に──……」"

[[dialogue]]
speaker = "パルミエ"
# 「ふふ、ううん、やっぱりなんでもないわ。さ、食べ終わったのならゲームでもして遊びましょ♪」
line = "「ふふ、ううん、やっぱりなんでもないわ。さ、食べ終わったのならゲームでもして遊びましょ♪」"

[[dialogue]]
speaker = "パルミエ"
# 「今夜は寝かせないわよ～？　あ、それともダーリンの方が寝かせてくれないのかしら……<emoji=heart04>」
line = "「今夜は寝かせないわよ～？　あ、それともダーリンの方が寝かせてくれないのかしら……<emoji=heart04>」"

[[dialogue]]
speaker = "パルミエ"
# 「あはは、冗談よ冗談。ま、冗談にしなくても構わないけど♪」
line = "「あはは、冗談よ冗談。ま、冗談にしなくても構わないけど♪」"

[[dialogue]]
speaker = "パルミエ"
# 「ね……ダーリン？　またご飯作りに来てもいいかしら？　ダーリンと過ごしてると、自分の知らなかった一面が見えてくる気がするの」
line = "「ね……ダーリン？　またご飯作りに来てもいいかしら？　ダーリンと過ごしてると、自分の知らなかった一面が見えてくる気がするの」"

[[dialogue]]
speaker = "パルミエ"
# 「ふふ。なら、たまに作りに来させてもらうわね♪　ダーリンのために通い妻になってあげる♪」
line = "「ふふ。なら、たまに作りに来させてもらうわね♪　ダーリンのために通い妻になってあげる♪」"

[[dialogue]]
speaker = "パルミエ"
# 「まぁ……とっても面倒臭いけど♪」
line = "「まぁ……とっても面倒臭いけど♪」"
