[[dialogue]]
speaker = "unk"
# 第４話,新星学園理事会,B
line = "第４話,新星学園理事会,B"

[[dialogue]]
speaker = "unk"
# 同刻。新星学園の会議室では、新たな学園長を決めるために理事会が開かれていた。
line = "同刻。新星学園の会議室では、新たな学園長を決めるために理事会が開かれていた。"

[[dialogue]]
speaker = "unk"
# 規則上、新星学園の学園長は理事会の承認によって決定される。
line = "規則上、新星学園の学園長は理事会の承認によって決定される。"

[[dialogue]]
speaker = "unk"
# 開校当初は、教皇庁に推薦されたセイファートが学園長に就任し、今まで信任され続けていた。
line = "開校当初は、教皇庁に推薦されたセイファートが学園長に就任し、今まで信任され続けていた。"

[[dialogue]]
speaker = "unk"
# それが彼の失踪──そして裏切りによって学園長が不在になり、流星学園学園長のラティエが新星の学園長を兼任している状態だ。
line = "それが彼の失踪──そして裏切りによって学園長が不在になり、流星学園学園長のラティエが新星の学園長を兼任している状態だ。"

[[dialogue]]
speaker = "ヘレナ"
# 「ご多忙のところ、理事会への出席感謝する。知らぬ者はいないだろうが、理事長のヘレナだ」
line = "「ご多忙のところ、理事会への出席感謝する。知らぬ者はいないだろうが、理事長のヘレナだ」"

[[dialogue]]
speaker = "ヘレナ"
# 「今日集まってもらったのは他でもない、空席になっていた学園長を決めるためだ」
line = "「今日集まってもらったのは他でもない、空席になっていた学園長を決めるためだ」"

[[dialogue]]
speaker = "ヘレナ"
# 「ここにいる諸君には周知だが、前学園長ジェラルド・セイファートは我が娘ヴィーナスを連れ去り、魔界へ失踪した」
line = "「ここにいる諸君には周知だが、前学園長ジェラルド・セイファートは我が娘ヴィーナスを連れ去り、魔界へ失踪した」"

[[dialogue]]
speaker = "ヘレナ"
# 「そればかりかリクリエに加担し、世界を滅ぼそうとした。新星学園学園長としてあってはならない裏切りだ」
line = "「そればかりかリクリエに加担し、世界を滅ぼそうとした。新星学園学園長としてあってはならない裏切りだ」"

[[dialogue]]
speaker = "ヘレナ"
# 「だがこれは、彼を学園長として信任していながら、その本心を見抜けなかった我々理事会の失態でもある」
line = "「だがこれは、彼を学園長として信任していながら、その本心を見抜けなかった我々理事会の失態でもある」"

[[dialogue]]
speaker = "ヘレナ"
# 「教皇庁から請われて理事長に就いたとはいえ、この九浄ヘレナとしても不徳の致すところだ」
line = "「教皇庁から請われて理事長に就いたとはいえ、この九浄ヘレナとしても不徳の致すところだ」"

[[dialogue]]
speaker = "理事Ａ"
# 「本当に理事として情けない気持ちです。生徒を導く者のトップが、敵だったなんて……」
line = "「本当に理事として情けない気持ちです。生徒を導く者のトップが、敵だったなんて……」"

[[dialogue]]
speaker = "理事Ａ"
# 「ですが正直、今でも信じられない気持ちです。あの流星の騎士がリクリエの到来を望むなんて思いませんでした」
line = "「ですが正直、今でも信じられない気持ちです。あの流星の騎士がリクリエの到来を望むなんて思いませんでした」"

[[dialogue]]
speaker = "理事Ａ"
# 「実は私も彼に救われたことがありまして……いえ、ご令嬢を攫われた九浄理事長の前でする話ではありませんでしたね」
line = "「実は私も彼に救われたことがありまして……いえ、ご令嬢を攫われた九浄理事長の前でする話ではありませんでしたね」"

[[dialogue]]
speaker = "ヘレナ"
# 「かまわぬ。彼の実績は私も知っているからな」
line = "「かまわぬ。彼の実績は私も知っているからな」"

[[dialogue]]
speaker = "unk"
# なお、一般にはジェラルド・セイファートの死の詳細は知らされていない。
line = "なお、一般にはジェラルド・セイファートの死の詳細は知らされていない。"

[[dialogue]]
speaker = "unk"
# 『流星の騎士』の活躍を知る人は、みな彼の死を悼んでいるという。
line = "『流星の騎士』の活躍を知る人は、みな彼の死を悼んでいるという。"

[[dialogue]]
speaker = "ヘレナ"
# 「しかし後悔ばかりしてもいられない。新星学園には新たな学園長が必要だ」
line = "「しかし後悔ばかりしてもいられない。新星学園には新たな学園長が必要だ」"

[[dialogue]]
speaker = "ヘレナ"
# 「私が推薦する候補がもうすぐ到着する。先日のガーディアンの襲撃で公共交通機関に乱れが出ていて、少し遅れるとのことだ。すまないがしばし待ってくれ」
line = "「私が推薦する候補がもうすぐ到着する。先日のガーディアンの襲撃で公共交通機関に乱れが出ていて、少し遅れるとのことだ。すまないがしばし待ってくれ」"

[[dialogue]]
speaker = "理事Ａ"
# 「それは問題ないのですが……例の……」
line = "「それは問題ないのですが……例の……」"

[[dialogue]]
speaker = "ヘレナ"
# 「うむ。動画の件だな。私も存じている」
line = "「うむ。動画の件だな。私も存じている」"

[[dialogue]]
speaker = "unk"
# 新星学園の理事たちは、平行世界の存在についても報告を受けており、今いるこの世界──アルタイル以外の世界の存在も承知していた。
line = "新星学園の理事たちは、平行世界の存在についても報告を受けており、今いるこの世界──アルタイル以外の世界の存在も承知していた。"

[[dialogue]]
speaker = "unk"
# だからこそ、チナの言葉はより真実味を持って聞こえた。
line = "だからこそ、チナの言葉はより真実味を持って聞こえた。"

[[dialogue]]
speaker = "理事Ｂ"
# 「つまるところ、新星学園はどうするのだ？　極星学園と戦うのか？」
line = "「つまるところ、新星学園はどうするのだ？　極星学園と戦うのか？」"

[[dialogue]]
speaker = "ヘレナ"
# 「それは私も測りかねているところだ。彼女の主張が真実かどうか、知る手立てがないのでな」
line = "「それは私も測りかねているところだ。彼女の主張が真実かどうか、知る手立てがないのでな」"

[[dialogue]]
speaker = "理事Ｂ"
# 「ならなおのこと、戦うべきではないのか？　真偽はどうあれ、この世界が滅ぼされるのを指を咥えて見ているわけにはいかん」
line = "「ならなおのこと、戦うべきではないのか？　真偽はどうあれ、この世界が滅ぼされるのを指を咥えて見ているわけにはいかん」"

[[dialogue]]
speaker = "ヘレナ"
# 「……正論ではあるな」
line = "「……正論ではあるな」"

[[dialogue]]
speaker = "unk"
# だがその選択肢を取れば、デネブを滅ぼすことになるかもしれない。
line = "だがその選択肢を取れば、デネブを滅ぼすことになるかもしれない。"

[[dialogue]]
speaker = "unk"
# 星騎士の若者たちにそんな重責を背負わせて良いものかと、ヘレナでも悩んでしまう。
line = "星騎士の若者たちにそんな重責を背負わせて良いものかと、ヘレナでも悩んでしまう。"

[[dialogue]]
speaker = "unk"
# そこに──
line = "そこに──"

[[dialogue]]
speaker = "？？？"
# 「む。すでに始まっているのか。悪いな、少し遅れた」
line = "「む。すでに始まっているのか。悪いな、少し遅れた」"

[[dialogue]]
speaker = "理事Ａ"
# 「は……？　あなたは……？」
line = "「は……？　あなたは……？」"

[[dialogue]]
speaker = "unk"
# 理事会に姿を現したのは、豪奢な衣装に身を包んだ魔族の女性。
line = "理事会に姿を現したのは、豪奢な衣装に身を包んだ魔族の女性。"

[[dialogue]]
speaker = "unk"
# 毛並みの良い九尾を優雅に揺らし、眩いばかりの美貌は見る者を魅了せずにはいない。
line = "毛並みの良い九尾を優雅に揺らし、眩いばかりの美貌は見る者を魅了せずにはいない。"

[[dialogue]]
speaker = "unk"
# その存在感はヘレナにも匹敵、いや凌駕するほどだ。
line = "その存在感はヘレナにも匹敵、いや凌駕するほどだ。"

[[dialogue]]
speaker = "理事Ｂ"
# 「理事長、推薦したい方とはこの方ですかな……？」
line = "「理事長、推薦したい方とはこの方ですかな……？」"

[[dialogue]]
speaker = "ヘレナ"
# 「いいや。だが彼女のことは知っている」
line = "「いいや。だが彼女のことは知っている」"

[[dialogue]]
speaker = "unk"
# 困惑する理事たちとは対照的に、ヘレナは警戒の視線を彼女に向ける。
line = "困惑する理事たちとは対照的に、ヘレナは警戒の視線を彼女に向ける。"

[[dialogue]]
speaker = "unk"
# ヘレナにとっても初対面だが、何者か察するのに時間はかからなかった。
line = "ヘレナにとっても初対面だが、何者か察するのに時間はかからなかった。"

[[dialogue]]
speaker = "煌嶺"
# 「名乗るのが遅れたな。<ruby=わらわ>妾</ruby>の名は<ruby=コウレイ>煌嶺</ruby>。人間界では知らぬ者もいるか？」
line = "「名乗るのが遅れたな。<ruby>妾<rt>わらわ</rt></ruby>の名は<ruby>煌嶺<rt>コウレイ</rt></ruby>。人間界では知らぬ者もいるか？」"

[[dialogue]]
speaker = "理事Ｂ"
# 「あの悪名高い頽廃都市キュリオスの……！？　どうして彼女がここに！？」
line = "「あの悪名高い頽廃都市キュリオスの……！？　どうして彼女がここに！？」"

[[dialogue]]
speaker = "煌嶺"
# 「どうしても何も、新星学園の理事が理事会に来て何が悪い」
line = "「どうしても何も、新星学園の理事が理事会に来て何が悪い」"

[[dialogue]]
speaker = "理事Ｂ"
# 「理事……！？　あなたが……？」
line = "「理事……！？　あなたが……？」"

[[dialogue]]
speaker = "煌嶺"
# 「そうだ。貴殿は知っておろう……九浄ヘレナ」
line = "「そうだ。貴殿は知っておろう……九浄ヘレナ」"

[[dialogue]]
speaker = "unk"
# 煌嶺が横目に視線を送ると、ヘレナが重く頷く。
line = "煌嶺が横目に視線を送ると、ヘレナが重く頷く。"

[[dialogue]]
speaker = "ヘレナ"
# 「ああ、煌嶺殿の言っていることは本当だ。これも事情があってな。今回の理事会で話そうと思っていたのだが」
line = "「ああ、煌嶺殿の言っていることは本当だ。これも事情があってな。今回の理事会で話そうと思っていたのだが」"

[[dialogue]]
speaker = "ヘレナ"
# 「先日、緋宮リノが“星骸布”を譲り受ける際、引き換えに新星学園の理事の座を求められた」
line = "「先日、緋宮リノが“星骸布”を譲り受ける際、引き換えに新星学園の理事の座を求められた」"

[[dialogue]]
speaker = "ヘレナ"
# 「私はリノから報告を受け、教皇庁と合意の上で理事に追加した。正直なところ、魔界の秘宝の対価としては、実に安いものだったと言えるだろう」
line = "「私はリノから報告を受け、教皇庁と合意の上で理事に追加した。正直なところ、魔界の秘宝の対価としては、実に安いものだったと言えるだろう」"

[[dialogue]]
speaker = "理事Ａ"
# 「な、なるほど……それはやむなしですな……」
line = "「な、なるほど……それはやむなしですな……」"

[[dialogue]]
speaker = "ヘレナ"
# 「同じく、“シエルの<ruby=はこ>筐</ruby>”を授けてくれた聖庭園のリガルタ氏も、現在は新星学園の理事だ。こちらは委任状を預かっているので、この場には来ないがな」
line = "「同じく、“シエルの<ruby>筐<rt>はこ</rt></ruby>”を授けてくれた聖庭園のリガルタ氏も、現在は新星学園の理事だ。こちらは委任状を預かっているので、この場には来ないがな」"

[[dialogue]]
speaker = "unk"
# リノは研究機関ヘキサグラムの研究員としてだけでなく、九浄ヘレナの代理人としても接触していた。
line = "リノは研究機関ヘキサグラムの研究員としてだけでなく、九浄ヘレナの代理人としても接触していた。"

[[dialogue]]
speaker = "ヘレナ"
# 「まさか流星市国までご足労頂くとは思わなかったな、煌嶺殿」
line = "「まさか流星市国までご足労頂くとは思わなかったな、煌嶺殿」"

[[dialogue]]
speaker = "煌嶺"
# 「この前の大交流で<ruby=こちら>人間界</ruby>に来てな。理事になったのだから、学園くらい見ていくかと思ったら、理事会があるというではないか」
line = "「この前の大交流で<ruby>人間界<rt>こちら</rt></ruby>に来てな。理事になったのだから、学園くらい見ていくかと思ったら、理事会があるというではないか」"

[[dialogue]]
speaker = "煌嶺"
# 「いかんな？　正式な理事に知らせもなしに理事会を開くなぞ」
line = "「いかんな？　正式な理事に知らせもなしに理事会を開くなぞ」"

[[dialogue]]
speaker = "煌嶺"
# 「まぁ、魔界に伝える手段がないのだから仕方ないか。妾は機嫌が良い。許そう」
line = "「まぁ、魔界に伝える手段がないのだから仕方ないか。妾は機嫌が良い。許そう」"

[[dialogue]]
speaker = "理事Ｂ"
# 「しかしどうなのだ。あのキュリオスの支配者が、教育機関の理事に就くというのは……」
line = "「しかしどうなのだ。あのキュリオスの支配者が、教育機関の理事に就くというのは……」"

[[dialogue]]
speaker = "煌嶺"
# 「フ──ハハッ！　無礼ではあるが正論だ。そこは妾も正直どうかと思っておる」
line = "「フ──ハハッ！　無礼ではあるが正論だ。そこは妾も正直どうかと思っておる」"

[[dialogue]]
speaker = "unk"
# 頽廃都市キュリオス──魔界の欲が集まる場所と言われており、合法違法問わずいかがわしい業者が<ruby=あまた>数多</ruby>ひしめいているとされる。
line = "頽廃都市キュリオス──魔界の欲が集まる場所と言われており、合法違法問わずいかがわしい業者が<ruby>数多<rt>あまた</rt></ruby>ひしめいているとされる。"

[[dialogue]]
speaker = "unk"
# 善良で節度ある者でも一度キュリオスを訪れると、一夜で欲望に染まり、一文無しになるという。
line = "善良で節度ある者でも一度キュリオスを訪れると、一夜で欲望に染まり、一文無しになるという。"

[[dialogue]]
speaker = "unk"
# メイプルのような宮廷仕えなど一部の者は、まだまともと言えるだろうが。
line = "メイプルのような宮廷仕えなど一部の者は、まだまともと言えるだろうが。"

[[dialogue]]
speaker = "煌嶺"
# 「だが世界の危機には些事であろう。妾が敵にならぬだけ心強く思うがいい」
line = "「だが世界の危機には些事であろう。妾が敵にならぬだけ心強く思うがいい」"

[[dialogue]]
speaker = "煌嶺"
# 「ところで、今日の理事会では新星学園の学園長を決めるのであったな。では──」
line = "「ところで、今日の理事会では新星学園の学園長を決めるのであったな。では──」"

[[dialogue]]
speaker = "煌嶺"
# 「妾が学園長を務めようではないか！」
line = "「妾が学園長を務めようではないか！」"

[[dialogue]]
speaker = "ヘレナ"
# 「なに……？」
line = "「なに……？」"
