line = "「よし！　当たりました！」"

[[dialogue]]
speaker = "unk"
# このまま一気に攻める！　俺も――
line = "このまま一気に攻める！　俺も――"

[[dialogue]]
speaker = "トレジアンナ"
# 「あっ、しまった！　会長さん！　サチさんと一緒に戦うのは、混ぜたら危険というか――」
line = "「あっ、しまった！　会長さん！　サチさんと一緒に戦うのは、混ぜたら危険というか――」"

[[dialogue]]
speaker = "サチ"
# 「そっか！　お兄さん記憶喪失だから、そのことも忘れて……きゃっ！？」
line = "「そっか！　お兄さん記憶喪失だから、そのことも忘れて……きゃっ！？」"

[[dialogue]]
speaker = "unk"
# サチが着地した瞬間に、ツルッと足を滑らせる。その隙にロストアイテムが攻撃を放ってきた！
line = "サチが着地した瞬間に、ツルッと足を滑らせる。その隙にロストアイテムが攻撃を放ってきた！"

[[dialogue]]
speaker = "unk"
