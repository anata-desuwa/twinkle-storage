[[dialogue]]
speaker = "unk"
# よかった……って、俺も足元が滑っ……！？
line = "よかった……って、俺も足元が滑っ……！？"

[[dialogue]]
speaker = "サチ"
# 「お兄さん！？　バランスが崩れて……わわっ！？」
line = "「お兄さん！？　バランスが崩れて……わわっ！？」"

[[dialogue]]
speaker = "サチ"
# 「う、う～ん……大丈夫ですか、お兄さん……？」
line = "「う、う～ん……大丈夫ですか、お兄さん……？」"

[[dialogue]]
speaker = "unk"
# 大丈夫、ちょっと転んだだけ……って
line = "大丈夫、ちょっと転んだだけ……って"

[[dialogue]]
speaker = "unk"
# 一体どう転んだらそうなるのか――サチと色々密着して、床に押し倒すような形になってしまっていた。
line = "一体どう転んだらそうなるのか――サチと色々密着して、床に押し倒すような形になってしまっていた。"

[[dialogue]]
speaker = "サチ"
# 「き……きゃあぁぁぁ～～～っ！　何やってんですか、お兄さん！？　えっっっ――」
line = "「き……きゃあぁぁぁ～～～っ！　何やってんですか、お兄さん！？　えっっっ――」"

[[dialogue]]
speaker = "サチ"
