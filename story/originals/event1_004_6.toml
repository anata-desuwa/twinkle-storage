line = "「まあ、いわゆるラッキースケベなんで、これも幸運の内だと私は思うんですけどね～♪」"

[[dialogue]]
speaker = "サチ"
# 「全然ラッキーじゃないです！　違いますからね、お兄さん！？」
line = "「全然ラッキーじゃないです！　違いますからね、お兄さん！？」"

[[dialogue]]
speaker = "unk"
# でも、俺のせいで逃げられちゃったな……
line = "でも、俺のせいで逃げられちゃったな……"

[[dialogue]]
speaker = "トマル"
# 「それは大丈夫です、会長さま」
line = "「それは大丈夫です、会長さま」"

[[dialogue]]
speaker = "トマル"
# 「マーキングはもう、成功しましたから」
line = "「マーキングはもう、成功しましたから」"

[[dialogue]]
speaker = "unk"
