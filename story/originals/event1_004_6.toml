[[dialogue]]
speaker = "unk"
# サチのことも気になったので、プリムラを一旦マトイに任せて、今度はトマルたちと合流した。
line = "サチのことも気になったので、プリムラを一旦マトイに任せて、今度はトマルたちと合流した。"

[[dialogue]]
speaker = "サチ"
# 「ルーレットロット」
line = "「ルーレットロット」"

[[dialogue]]
speaker = "サチ"
# 「――止まった結果は……東ですね。いきましょう」
line = "「――止まった結果は……東ですね。いきましょう」"

[[dialogue]]
speaker = "unk"
# （サチ、ちょっと元気がない気がするな……）
line = "（サチ、ちょっと元気がない気がするな……）"

[[dialogue]]
speaker = "unk"
# やっぱり、プリムラのことを気にしているからだろうか……そんな風に思っていると――
line = "やっぱり、プリムラのことを気にしているからだろうか……そんな風に思っていると――"

[[dialogue]]
speaker = "サチ"
# 「あれ？　お兄さん、どうかしましたか？」
line = "「あれ？　お兄さん、どうかしましたか？」"

[[dialogue]]
speaker = "サチ"
# 「なにか聞きたそうな顔をしてますけど……」
line = "「なにか聞きたそうな顔をしてますけど……」"

[[dialogue]]
speaker = "unk"
# いや、えっと……ルーレットが気になって
line = "いや、えっと……ルーレットが気になって"

[[dialogue]]
speaker = "トマル"
# 「サチさまの能力は、幸運であること。生まれながらの幸運体質なんです」
line = "「サチさまの能力は、幸運であること。生まれながらの幸運体質なんです」"

[[dialogue]]
speaker = "トレジアンナ"
# 「サチさんはそれで、附属校で最強のプリマステラって呼ばれているんですよ～。実際に生徒会長を務めていますしね☆」
line = "「サチさんはそれで、附属校で最強のプリマステラって呼ばれているんですよ～。実際に生徒会長を務めていますしね☆」"

[[dialogue]]
speaker = "トマル"
# 「もちろん、サチさま自身の努力によって培われた純粋な戦闘力の高さもありますが、そこに幸運が合わさることで、無敵とも言える強さを発揮するんです」
line = "「もちろん、サチさま自身の努力によって培われた純粋な戦闘力の高さもありますが、そこに幸運が合わさることで、無敵とも言える強さを発揮するんです」"

[[dialogue]]
speaker = "サチ"
# 「無敵は大げさですけどね……実際には、どう足掻いても運勢の波が存在しますから、安定性に難がありますし」
line = "「無敵は大げさですけどね……実際には、どう足掻いても運勢の波が存在しますから、安定性に難がありますし」"

[[dialogue]]
speaker = "サチ"
# 「今回だって、見ての通り絶不調で……記憶を奪われる事態になっちゃってますから」
line = "「今回だって、見ての通り絶不調で……記憶を奪われる事態になっちゃってますから」"

[[dialogue]]
speaker = "サチ"
# 「ただ、自分に備わった能力を最大限活用しないのも、それはそれで違うって、私は思うので」
line = "「ただ、自分に備わった能力を最大限活用しないのも、それはそれで違うって、私は思うので」"

[[dialogue]]
speaker = "サチ"
# 「こうして幸運体質を活かして、得意な失せもの占いでロストアイテムを探しているというわけです」
line = "「こうして幸運体質を活かして、得意な失せもの占いでロストアイテムを探しているというわけです」"

[[dialogue]]
speaker = "unk"
# そうだ、気になってることといえば――
line = "そうだ、気になってることといえば――"

[[dialogue]]
speaker = "サチ"
# 「――トレジアンナさんが何者なのか、ですか？」
line = "「――トレジアンナさんが何者なのか、ですか？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「あー、やっぱり気になっちゃいます？　声とか可愛いから気になっちゃうって？　いやー、会長さんに言われると照れちゃいますね～☆」
line = "「あー、やっぱり気になっちゃいます？　声とか可愛いから気になっちゃうって？　いやー、会長さんに言われると照れちゃいますね～☆」"

[[dialogue]]
speaker = "サチ"
# 「そこまでは言ってないです」
line = "「そこまでは言ってないです」"

[[dialogue]]
speaker = "トレジアンナ"
# 「私、さっきはわかりやすくロストアイテムだって自己紹介してましたけど、正確にはロストアイテムに封印されちゃってる感じなんですよね～」
line = "「私、さっきはわかりやすくロストアイテムだって自己紹介してましたけど、正確にはロストアイテムに封印されちゃってる感じなんですよね～」"

[[dialogue]]
speaker = "トレジアンナ"
# 「『精神の水晶』ってロストアイテムなんですけど、大昔、ミスってそれに体ごと取り込まれちゃったっていうか～。憑依、みたいな？」
line = "「『精神の水晶』ってロストアイテムなんですけど、大昔、ミスってそれに体ごと取り込まれちゃったっていうか～。憑依、みたいな？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「で、そのままずっと眠ってたんですけど、今回のリクリエに際して目覚めたところで、幸運にもサチさんと出会ったんですよ～」
line = "「で、そのままずっと眠ってたんですけど、今回のリクリエに際して目覚めたところで、幸運にもサチさんと出会ったんですよ～」"

[[dialogue]]
speaker = "サチ"
# 「２年前、附属校に入学したばかりの時に、飛び回ってる水晶からフランクに話しかけられて……それがトレジアンナさんだったんです」
line = "「２年前、附属校に入学したばかりの時に、飛び回ってる水晶からフランクに話しかけられて……それがトレジアンナさんだったんです」"

[[dialogue]]
speaker = "サチ"
# 「で、ロストアイテム回収を手伝ってたら、いつの間にか私の杖とか髪飾りとかにとり憑いてて……」
line = "「で、ロストアイテム回収を手伝ってたら、いつの間にか私の杖とか髪飾りとかにとり憑いてて……」"

[[dialogue]]
speaker = "トレジアンナ"
# 「そんな、とり憑くだなんて、悪霊みたいに言わないでくださいよ～」
line = "「そんな、とり憑くだなんて、悪霊みたいに言わないでくださいよ～」"

[[dialogue]]
speaker = "トレジアンナ"
# 「ズバリ、何を隠そう私の正体は、ロストアイテム回収のスペシャリスト、今は封印されてる先代の魔法少女なので～す♪　キラッ☆」
line = "「ズバリ、何を隠そう私の正体は、ロストアイテム回収のスペシャリスト、今は封印されてる先代の魔法少女なので～す♪　キラッ☆」"

[[dialogue]]
speaker = "サチ"
# 「とか本人は言ってますけど、魔法少女はこの人の趣味なので、多分大昔の星騎士なんじゃないかと私は思ってます」
line = "「とか本人は言ってますけど、魔法少女はこの人の趣味なので、多分大昔の星騎士なんじゃないかと私は思ってます」"

[[dialogue]]
speaker = "トレジアンナ"
# 「いやいや、本当なんですって！　私の本来の姿はもう、可愛くてダイナマイトボディな永遠の美少女なんですよ！？　声から想像してください、声から！」
line = "「いやいや、本当なんですって！　私の本来の姿はもう、可愛くてダイナマイトボディな永遠の美少女なんですよ！？　声から想像してください、声から！」"

[[dialogue]]
speaker = "サチ"
# 「ね？　胡散くさいでしょう？」
line = "「ね？　胡散くさいでしょう？」"

[[dialogue]]
speaker = "unk"
# 確かに……
line = "確かに……"

[[dialogue]]
speaker = "トレジアンナ"
# 「会長さんも、そこは否定してくださいよ～！？」
line = "「会長さんも、そこは否定してくださいよ～！？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「ぐぬぬ～、いつか封印解除のロストアイテムを回収した暁には、必ずや第３の魔法少女として華麗に復活してみせます……！」
line = "「ぐぬぬ～、いつか封印解除のロストアイテムを回収した暁には、必ずや第３の魔法少女として華麗に復活してみせます……！」"

[[dialogue]]
speaker = "サチ"
# 「はいはい、見つかるといいですね～」
line = "「はいはい、見つかるといいですね～」"

[[dialogue]]
speaker = "トレジアンナ"
# 「返事に心が込もってない！」
line = "「返事に心が込もってない！」"

[[dialogue]]
speaker = "ロストアイテム"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# って、見つけたぁーーーっ！
line = "って、見つけたぁーーーっ！"

[[dialogue]]
speaker = "トレジアンナ"
# 「えっ、もしかして来ちゃいました！？　第２の魔法少女が誕生したばかりなのに、もう私の実装きちゃった感じですか！？」
line = "「えっ、もしかして来ちゃいました！？　第２の魔法少女が誕生したばかりなのに、もう私の実装きちゃった感じですか！？」"

[[dialogue]]
speaker = "サチ"
