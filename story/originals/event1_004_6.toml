[[dialogue]]
speaker = "サチ"
# 「ひゃっ！？　お兄さんに抱きかかえられて……っ！」
line = "「ひゃっ！？　お兄さんに抱きかかえられて……っ！」"

[[dialogue]]
speaker = "サチ"
