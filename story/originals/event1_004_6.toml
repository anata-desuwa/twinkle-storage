line = "マーキング……？"

[[dialogue]]
speaker = "トマル"
# 「はい。私、１度帯電させた相手は、追跡することができるんです」
line = "「はい。私、１度帯電させた相手は、追跡することができるんです」"

[[dialogue]]
speaker = "unk"
# そう言って、トマルは優しく微笑むのだった。
line = "そう言って、トマルは優しく微笑むのだった。"
