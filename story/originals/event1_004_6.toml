line = "「避けられました……！　やはり速い……！」"

[[dialogue]]
speaker = "サチ"
# 「でも、室内なら……！　トレジアンナさん、アレをやります！」
line = "「でも、室内なら……！　トレジアンナさん、アレをやります！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「はいは～い！　いきますよ～、ルーレットスタート☆」
line = "「はいは～い！　いきますよ～、ルーレットスタート☆」"

[[dialogue]]
speaker = "サチ"
# 「フォーチュンドロップ、シックスバレット――」
line = "「フォーチュンドロップ、シックスバレット――」"

[[dialogue]]
speaker = "サチ"
# 「ランダムシュート！」
line = "「ランダムシュート！」"

[[dialogue]]
speaker = "unk"
# 星術を詠み上げて、サチは６発の水球を作り出すと、図書館内各所に向かってバラバラに撃ち放った。
line = "星術を詠み上げて、サチは６発の水球を作り出すと、図書館内各所に向かってバラバラに撃ち放った。"

[[dialogue]]
speaker = "unk"
# サチ、ダメだ！　ここには沢山の本が！
line = "サチ、ダメだ！　ここには沢山の本が！"

[[dialogue]]
speaker = "サチ"
# 「大丈夫です、お兄さん！　撃つと決めた以上――」
line = "「大丈夫です、お兄さん！　撃つと決めた以上――」"

[[dialogue]]
speaker = "サチ"
# 「絶対に<b>ハズレ</b>ませんから！」
line = "「絶対に<b>ハズレ</b>ませんから！」"

[[dialogue]]
speaker = "unk"
# 水球は床や壁に当たって跳弾し、図書館内を飛び回る。しかし、計算されたかのように本棚にだけは当たらない。そして――
line = "水球は床や壁に当たって跳弾し、図書館内を飛び回る。しかし、計算されたかのように本棚にだけは当たらない。そして――"

[[dialogue]]
speaker = "unk"
# 水球を避け続けるロストアイテムを追い詰めるような軌跡を描き、最後には吸い込まれるように６発とも全弾直撃！
line = "水球を避け続けるロストアイテムを追い詰めるような軌跡を描き、最後には吸い込まれるように６発とも全弾直撃！"

[[dialogue]]
speaker = "ロストアイテム"
# 「～～～～～～っ！？」
line = "「～～～～～～っ！？」"

[[dialogue]]
speaker = "サチ"
