line = "「サチさま、会長さまとなんて羨まし……いえ、大変な体勢に……！」"

[[dialogue]]
speaker = "ロストアイテム"
# 「…………♪」
line = "「…………♪」"

[[dialogue]]
speaker = "トレジアンナ"
# 「ロストアイテム、また逃げられちゃいましたね……」
line = "「ロストアイテム、また逃げられちゃいましたね……」"

[[dialogue]]
speaker = "サチ"
# 「うぅ……やっぱり今日は、絶不調です……」
line = "「うぅ……やっぱり今日は、絶不調です……」"

[[dialogue]]
speaker = "トレジアンナ"
# 「サチさんと会長さんが一緒にいると、なぜかこういうエッチなトラブルがよく起きちゃうんですよね～」
line = "「サチさんと会長さんが一緒にいると、なぜかこういうエッチなトラブルがよく起きちゃうんですよね～」"

[[dialogue]]
speaker = "サチ"
# 「一緒に戦おうとする時には、特に注意が必要で……説明しとくのをすっかり忘れてました……」
line = "「一緒に戦おうとする時には、特に注意が必要で……説明しとくのをすっかり忘れてました……」"

[[dialogue]]
speaker = "トレジアンナ"
