[[dialogue]]
speaker = "unk"
# 第２話,物語の始まり,B
line = "第２話,物語の始まり,B"

[[dialogue]]
speaker = "unk"
# ヴィーナスの母は女神テルルだと、守護天使ラクシャの口から語られた。
line = "ヴィーナスの母は女神テルルだと、守護天使ラクシャの口から語られた。"

[[dialogue]]
speaker = "unk"
# ヴィーナスの母親については今までも推測できる情報はあったが、直接言葉にされると小さくない衝撃があった。
line = "ヴィーナスの母親については今までも推測できる情報はあったが、直接言葉にされると小さくない衝撃があった。"

[[dialogue]]
speaker = "unk"
# しかも女神を転生させたのが、俺のよく知る環だというのだからなおさらだ。
line = "しかも女神を転生させたのが、俺のよく知る環だというのだからなおさらだ。"

[[dialogue]]
speaker = "ヴィーナス"
# 「環がママを人間に転生させて、ママが私を産んだ。つまり──」
line = "「環がママを人間に転生させて、ママが私を産んだ。つまり──」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あなたはママのママってことね！」
line = "「あなたはママのママってことね！」"

[[dialogue]]
speaker = "ラクシャ"
# 「ちがわい」
line = "「ちがわい」"

[[dialogue]]
speaker = "ラクシャ"
# 「話を戻すよ。人間として九浄家に生まれたテルルは、成長して星騎士となり、新星学園に入学した」
line = "「話を戻すよ。人間として九浄家に生まれたテルルは、成長して星騎士となり、新星学園に入学した」"

[[dialogue]]
speaker = "ラクシャ"
# 「彼女は星徒会長となり、ある男子生徒と出会った。ここまで言えば誰のことかわかるよね？」
line = "「彼女は星徒会長となり、ある男子生徒と出会った。ここまで言えば誰のことかわかるよね？」"

[[dialogue]]
speaker = "クロト"
# 「デネブの俺……だな」
line = "「デネブの俺……だな」"

[[dialogue]]
speaker = "ラクシャ"
# 「もちろん。そこで他の男が出てきたらビックリしちゃうよ」
line = "「もちろん。そこで他の男が出てきたらビックリしちゃうよ」"

[[dialogue]]
speaker = "？？？"
# 「星徒会長さんが居眠りってのは感心しないんじゃない？　ま、何もない証とも言えるけど」
line = "「星徒会長さんが居眠りってのは感心しないんじゃない？　ま、何もない証とも言えるけど」"

[[dialogue]]
speaker = "クロト"
# 「そうだな。世の中が平和なうちに、もう一眠り………………」
line = "「そうだな。世の中が平和なうちに、もう一眠り………………」"

[[dialogue]]
speaker = "unk"
# いつか見た星徒会の光景。
line = "いつか見た星徒会の光景。"

[[dialogue]]
speaker = "unk"
# あれは夢ではない。ヴィーナスとの記憶でもない。
line = "あれは夢ではない。ヴィーナスとの記憶でもない。"

[[dialogue]]
speaker = "unk"
# デネブの<ruby=クロト>俺</ruby>が経験した、人となったテルルとの日々。
line = "デネブの<ruby>俺<rt>クロト</rt></ruby>が経験した、人となったテルルとの日々。"

[[dialogue]]
speaker = "unk"
# その記憶が俺の力を通して流れ込んできたものなんだ。
line = "その記憶が俺の力を通して流れ込んできたものなんだ。"

[[dialogue]]
speaker = "ラクシャ"
# 「そして２人は恋に落ち、子を授かりました。めでたしめでたし……とはいかないんだけど」
line = "「そして２人は恋に落ち、子を授かりました。めでたしめでたし……とはいかないんだけど」"

[[dialogue]]
speaker = "ヴィーナス"
# 「その子どもが私、ってわけね」
line = "「その子どもが私、ってわけね」"

[[dialogue]]
speaker = "ラクシャ"
# 「そ。キミは正真正銘、女神と魔王の娘ってわけ」
line = "「そ。キミは正真正銘、女神と魔王の娘ってわけ」"

[[dialogue]]
speaker = "ラクシャ"
# 「だけど話はもう少し続くよ」
line = "「だけど話はもう少し続くよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# この先はヴィーナスにとって聞きたい話ではないだろう。
line = "この先はヴィーナスにとって聞きたい話ではないだろう。"

[[dialogue]]
speaker = "unk"
# それでも、一言たりとも聞き逃すまいと、環の話に真剣に耳を傾けている。
line = "それでも、一言たりとも聞き逃すまいと、環の話に真剣に耳を傾けている。"

[[dialogue]]
speaker = "ラクシャ"
# 「緋宮クロトと九浄テルルは共にリクリエと戦った。だけど勝てなかった」
line = "「緋宮クロトと九浄テルルは共にリクリエと戦った。だけど勝てなかった」"

[[dialogue]]
speaker = "ラクシャ"
# 「敗北を悟った２人は最後の手段に出た。それは自らを犠牲に、愛娘を平行世界に送り出すこと」
line = "「敗北を悟った２人は最後の手段に出た。それは自らを犠牲に、愛娘を平行世界に送り出すこと」"

[[dialogue]]
speaker = "ラクシャ"
# 「デネブのクロトは魔王の力を臨界させ、アルタイルへの道を開いた。テルルの人間としての肉体も同時に失われている」
line = "「デネブのクロトは魔王の力を臨界させ、アルタイルへの道を開いた。テルルの人間としての肉体も同時に失われている」"

[[dialogue]]
speaker = "ラクシャ"
# 「そしてヴィーナスはボクと一緒にアルタイルへやってきた──ってわけ」
line = "「そしてヴィーナスはボクと一緒にアルタイルへやってきた──ってわけ」"

[[dialogue]]
speaker = "ラクシャ"
# 「ちなみにヴィーナスが持ってた『未来の日誌』は、テルルが付けていた日記を元にしたものだ」
line = "「ちなみにヴィーナスが持ってた『未来の日誌』は、テルルが付けていた日記を元にしたものだ」"

[[dialogue]]
speaker = "ラクシャ"
# 「ヴィーナスも熱心に星徒会日誌つけてたよね？　あれと同じことをキミのお母さんもしていたんだ」
line = "「ヴィーナスも熱心に星徒会日誌つけてたよね？　あれと同じことをキミのお母さんもしていたんだ」"

[[dialogue]]
speaker = "ラクシャ"
# 「参考になればと思って持たせたみたいだけど、日誌にないことがたくさん起きたし、残念ながらあんまり役に立たなかったね」
line = "「参考になればと思って持たせたみたいだけど、日誌にないことがたくさん起きたし、残念ながらあんまり役に立たなかったね」"

[[dialogue]]
speaker = "ラクシャ"
# 「だからあの日誌は、キミたちを操ろうとかそういうものじゃないんだよ。ずいぶん疑われちゃったけど」
line = "「だからあの日誌は、キミたちを操ろうとかそういうものじゃないんだよ。ずいぶん疑われちゃったけど」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そう……だったのね」
line = "「そう……だったのね」"

[[dialogue]]
speaker = "unk"
# アナは疑問を持っていたけど、あの日誌は純粋にヴィーナスを想って用意されたものだった。
line = "アナは疑問を持っていたけど、あの日誌は純粋にヴィーナスを想って用意されたものだった。"

[[dialogue]]
speaker = "unk"
# そして何より、ヴィーナスにとって数少ない母との繋がりでもあった。
line = "そして何より、ヴィーナスにとって数少ない母との繋がりでもあった。"

[[dialogue]]
speaker = "クロト"
# 「環がデネブのラクシャなのはわかった。だけどアルタイルで別れたはずなのに、どうしてこっちにいるんだ？」
line = "「環がデネブのラクシャなのはわかった。だけどアルタイルで別れたはずなのに、どうしてこっちにいるんだ？」"

[[dialogue]]
speaker = "ラクシャ"
# 「チナとの戦いは見ていたからね。キミたちが穴に吸い込まれた時、ボクは肉体を捨てて霊体で飛び込んだのさ」
line = "「チナとの戦いは見ていたからね。キミたちが穴に吸い込まれた時、ボクは肉体を捨てて霊体で飛び込んだのさ」"

[[dialogue]]
speaker = "ラクシャ"
# 「ボクは元々デネブのラクシャ。ボクの本体を道標にして、キミたちをデネブの流星市国へと導いた」
line = "「ボクは元々デネブのラクシャ。ボクの本体を道標にして、キミたちをデネブの流星市国へと導いた」"

[[dialogue]]
speaker = "ラクシャ"
# 「で、肉体はこっちで再構成して、今に至ると」
line = "「で、肉体はこっちで再構成して、今に至ると」"

[[dialogue]]
speaker = "クロト"
# 「つまり俺たちが流星市国に出たのは……」
line = "「つまり俺たちが流星市国に出たのは……」"

[[dialogue]]
speaker = "ラクシャ"
# 「そう、ボクのおかげ。あのままじゃ、魔界や天界の辺境に飛ばされて野垂れ死に、ってこともありえたからね」
line = "「そう、ボクのおかげ。あのままじゃ、魔界や天界の辺境に飛ばされて野垂れ死に、ってこともありえたからね」"

[[dialogue]]
speaker = "クロト"
# 「それは……ありがとう」
line = "「それは……ありがとう」"

[[dialogue]]
speaker = "unk"
# 穴に呑み込まれた時の記憶がおぼろげなせいで実感はないが、環にはいつの間にか助けられたようだった。
line = "穴に呑み込まれた時の記憶がおぼろげなせいで実感はないが、環にはいつの間にか助けられたようだった。"

[[dialogue]]
speaker = "ヴィーナス"
# 「……全部呑み込めたわけじゃないけど、環にもいろいろ事情があったのはわかったわ」
line = "「……全部呑み込めたわけじゃないけど、環にもいろいろ事情があったのはわかったわ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「だけどそれなら、最初から全部教えてくれたらよかったじゃない！　それにどうして今になって出てきたのよ！？」
line = "「だけどそれなら、最初から全部教えてくれたらよかったじゃない！　それにどうして今になって出てきたのよ！？」"

[[dialogue]]
speaker = "ラクシャ"
# 「知ってたら、キミたちは勝てたかい？」
line = "「知ってたら、キミたちは勝てたかい？」"

[[dialogue]]
speaker = "ラクシャ"
# 「キミたちは段階的に成長する必要があった。だから情報も自分で掴み取ってもらう方が都合が良かったんだ」
line = "「キミたちは段階的に成長する必要があった。だから情報も自分で掴み取ってもらう方が都合が良かったんだ」"

[[dialogue]]
speaker = "クロト"
# 「ドライなんだな」
line = "「ドライなんだな」"

[[dialogue]]
speaker = "ラクシャ"
# 「何せ相手はリクリエだからね」
line = "「何せ相手はリクリエだからね」"

[[dialogue]]
speaker = "unk"
# 彼女は守護天使であり、その視点で世界を見ている。
line = "彼女は守護天使であり、その視点で世界を見ている。"

[[dialogue]]
speaker = "unk"
# 外見は俺のよく知る環だが、その奥底にある価値観は、高位存在たる守護天使のものなのだと実感する。
line = "外見は俺のよく知る環だが、その奥底にある価値観は、高位存在たる守護天使のものなのだと実感する。"

[[dialogue]]
speaker = "ラクシャ"
# 「そしてなぜ、今になってキミたちの前に姿を表したのか……それは今がチャンスだと思ったからだよ」
line = "「そしてなぜ、今になってキミたちの前に姿を表したのか……それは今がチャンスだと思ったからだよ」"

[[dialogue]]
speaker = "クロト"
# 「チャンス……？」
line = "「チャンス……？」"

[[dialogue]]
speaker = "ラクシャ"
# 「うん、チャンス。緋宮クロト……キミはデネブに渡って極星学園を説得すると言ったね？」
line = "「うん、チャンス。緋宮クロト……キミはデネブに渡って極星学園を説得すると言ったね？」"

[[dialogue]]
speaker = "ラクシャ"
# 「そんなキミにとって、事故でデネブにやってきたことは、期せずして舞い込んだチャンスだ」
line = "「そんなキミにとって、事故でデネブにやってきたことは、期せずして舞い込んだチャンスだ」"

[[dialogue]]
speaker = "ラクシャ"
# 「そしてそれはボクにとっても同じ」
line = "「そしてそれはボクにとっても同じ」"

[[dialogue]]
speaker = "ラクシャ"
# 「デネブに戻ってから少し情報収集したけど、どう考えてもルヴィネの存在は不自然だ」
line = "「デネブに戻ってから少し情報収集したけど、どう考えてもルヴィネの存在は不自然だ」"

[[dialogue]]
speaker = "ラクシャ"
# 「デネブのクロトが敗れた後、ルヴィネが世界を救ったことになってるけど、リクリエもモンスターも１人の天使が全部片づけたなんて信じられないよ」
line = "「デネブのクロトが敗れた後、ルヴィネが世界を救ったことになってるけど、リクリエもモンスターも１人の天使が全部片づけたなんて信じられないよ」"

[[dialogue]]
speaker = "ラクシャ"
# 「それにルヴィネは女神の力をもらったとか、声を聞いたとか言ってたけど、それも怪しい」
line = "「それにルヴィネは女神の力をもらったとか、声を聞いたとか言ってたけど、それも怪しい」"

[[dialogue]]
speaker = "ラクシャ"
# 「だいたい、女神テルルにそんな力が残ってるなら、最初っから魔王を勝たせてるっての」
line = "「だいたい、女神テルルにそんな力が残ってるなら、最初っから魔王を勝たせてるっての」"

[[dialogue]]
speaker = "ラクシャ"
# 「ルヴィネには必ず裏がある。それもきっととびっきりのネタだ」
line = "「ルヴィネには必ず裏がある。それもきっととびっきりのネタだ」"

[[dialogue]]
speaker = "ラクシャ"
# 「だからここは手札をオープンにして、協力してルヴィネのことを調べようってわけ」
line = "「だからここは手札をオープンにして、協力してルヴィネのことを調べようってわけ」"

[[dialogue]]
speaker = "ラクシャ"
# 「というわけで……理解してくれたかな、ヴィーナス？」
line = "「というわけで……理解してくれたかな、ヴィーナス？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ヴィーナス"
# 「半分くらいしかわからなかったわ！」
line = "「半分くらいしかわからなかったわ！」"

[[dialogue]]
speaker = "ラクシャ"
# 「うん、そうだろうと思った」
line = "「うん、そうだろうと思った」"

[[dialogue]]
speaker = "ヴィーナス"
# 「だけど、環が嘘をついてるようにも見えなかった。気分的にはまだ納得いかないけど……信じることにするわ」
line = "「だけど、環が嘘をついてるようにも見えなかった。気分的にはまだ納得いかないけど……信じることにするわ」"

[[dialogue]]
speaker = "ラクシャ"
# 「ありがとう。レジスタンスの御二方はどう？」
line = "「ありがとう。レジスタンスの御二方はどう？」"

[[dialogue]]
speaker = "リノ"
# 「私はクロトが死んだ時、怪我で一緒に戦えなかった。それでも後方から状況を観測していたけど……データとあなたの言葉に矛盾はない」
line = "「私はクロトが死んだ時、怪我で一緒に戦えなかった。それでも後方から状況を観測していたけど……データとあなたの言葉に矛盾はない」"

[[dialogue]]
speaker = "リノ"
# 「少なくとも、今の説明の中に嘘はない……と思うわ」
line = "「少なくとも、今の説明の中に嘘はない……と思うわ」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「まぁ、筋は通ってなくもない。それにルヴィネに疑問を持っているのはレジスタンスと同じだ」
line = "「まぁ、筋は通ってなくもない。それにルヴィネに疑問を持っているのはレジスタンスと同じだ」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「要するに、あたしたちとは利害が一致している。レジスタンスはお前を味方と認めよう」
line = "「要するに、あたしたちとは利害が一致している。レジスタンスはお前を味方と認めよう」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「まぁ、当面は警戒させてもらうがな」
line = "「まぁ、当面は警戒させてもらうがな」"

[[dialogue]]
speaker = "ラクシャ"
# 「うん、それでいいよ。出会ったばかりで全幅の信頼を置かれても、それはそれで心配になっちゃうし」
line = "「うん、それでいいよ。出会ったばかりで全幅の信頼を置かれても、それはそれで心配になっちゃうし」"

[[dialogue]]
speaker = "フィオナ"
# 「守護天使ラクシャは謎が多い存在でしたが……なるほど、入り組んだ事情があったのですね……」
line = "「守護天使ラクシャは謎が多い存在でしたが……なるほど、入り組んだ事情があったのですね……」"

[[dialogue]]
speaker = "クロト"
# 「俺も環を信じる。魔界で戦った時は霊屑をもらったし、ただの敵でないことはわかっていたから」
line = "「俺も環を信じる。魔界で戦った時は霊屑をもらったし、ただの敵でないことはわかっていたから」"

[[dialogue]]
speaker = "ラクシャ"
# 「ありがとう。助かるよ。ここで追い出されたら路頭に迷うところだったからね」
line = "「ありがとう。助かるよ。ここで追い出されたら路頭に迷うところだったからね」"

[[dialogue]]
speaker = "クロト"
# 「だけど、もうひとつ聞いていいか？」
line = "「だけど、もうひとつ聞いていいか？」"

[[dialogue]]
speaker = "ラクシャ"
# 「何？　もう説明しきったと思うんだけど」
line = "「何？　もう説明しきったと思うんだけど」"

[[dialogue]]
speaker = "クロト"
# 「今さらだけど……環か、ラクシャか、君を何て呼べばいいんだ？」
line = "「今さらだけど……環か、ラクシャか、君を何て呼べばいいんだ？」"

[[dialogue]]
speaker = "ラクシャ"
# 「──」
line = "「──」"

[[dialogue]]
speaker = "ラクシャ"
# 「なんだ、そんなことか。キミらしいね」
line = "「なんだ、そんなことか。キミらしいね」"

[[dialogue]]
speaker = "ラクシャ"
# 「環って馴染みのある名前も悪くないけど、ここじゃキミとヴィーナスにしか通じないから、ラクシャでお願い」
line = "「環って馴染みのある名前も悪くないけど、ここじゃキミとヴィーナスにしか通じないから、ラクシャでお願い」"

[[dialogue]]
speaker = "クロト"
# 「……わかった」
line = "「……わかった」"

[[dialogue]]
speaker = "unk"
# ラクシャ──環とは、俺が新星学園に転入する前、それこそヴィーナスより先に出会った。
line = "ラクシャ──環とは、俺が新星学園に転入する前、それこそヴィーナスより先に出会った。"

[[dialogue]]
speaker = "unk"
# 俺を監視するためだとしても、バイト仲間として苦楽を共にした相手だ。
line = "俺を監視するためだとしても、バイト仲間として苦楽を共にした相手だ。"

[[dialogue]]
speaker = "unk"
# 元より仮の名とはいえ、そんな彼女の名前が使われなくなることに少し寂しさを感じる。
line = "元より仮の名とはいえ、そんな彼女の名前が使われなくなることに少し寂しさを感じる。"

[[dialogue]]
speaker = "ラクシャ"
# 「ま、２人きりの時は環って呼んでくれてもいいんだぜ♪」
line = "「ま、２人きりの時は環って呼んでくれてもいいんだぜ♪」"

