[[dialogue]]
speaker = "unk"
# 第１話,鬼料理人はギャップ少女,P
line = "第１話,鬼料理人はギャップ少女,P"

[[dialogue]]
speaker = "unk"
# ある日。サーシャさんから元星徒会メンバーで紹介したい子がいると言われ、昼休みに大聖堂カフェテリアへ呼び出されたのだが──
line = "ある日。サーシャさんから元星徒会メンバーで紹介したい子がいると言われ、昼休みに大聖堂カフェテリアへ呼び出されたのだが──"

[[dialogue]]
speaker = "蛍火"
# 「じーっ……」
line = "「じーっ……」"

[[dialogue]]
speaker = "unk"
# （な、なんか凄く見られてる……！）
line = "（な、なんか凄く見られてる……！）"

[[dialogue]]
speaker = "unk"
# 先程から物影に半身を隠している彼女だが、視線と背中の大剣の圧が凄くて、全然隠れられていない。
line = "先程から物影に半身を隠している彼女だが、視線と背中の大剣の圧が凄くて、全然隠れられていない。"

[[dialogue]]
speaker = "サーシャ"
# 「会長く～ん、おまたせ～」
line = "「会長く～ん、おまたせ～」"

[[dialogue]]
speaker = "サーシャ"
# 「……って、あら？　どうかした？」
line = "「……って、あら？　どうかした？」"

[[dialogue]]
speaker = "サーシャ"
# 「ああ、なるほど～。会長くんのことが気になって、ずっと様子をうかがってたのね～」
line = "「ああ、なるほど～。会長くんのことが気になって、ずっと様子をうかがってたのね～」"

[[dialogue]]
speaker = "サーシャ"
# 「蛍火ちゃん～？　ちゃんと紹介するから、こちらにいらっしゃい」
line = "「蛍火ちゃん～？　ちゃんと紹介するから、こちらにいらっしゃい」"

[[dialogue]]
speaker = "蛍火"
# 「……はい。サーシャ先輩」
line = "「……はい。サーシャ先輩」"

[[dialogue]]
speaker = "サーシャ"
# 「会長くん、こちらが紹介したかった子で、２年生の蛍火ちゃん。去年まで星徒会で書記を務めていたの～」
line = "「会長くん、こちらが紹介したかった子で、２年生の蛍火ちゃん。去年まで星徒会で書記を務めていたの～」"

[[dialogue]]
speaker = "蛍火"
# 「……ご紹介にあずかりました、東雲蛍火と申します。今は給食委員会に所属しています」
line = "「……ご紹介にあずかりました、東雲蛍火と申します。今は給食委員会に所属しています」"

[[dialogue]]
speaker = "蛍火"
# 「昨年度末、サーシャ先輩から推薦を頂きまして、それからはカフェテリアで料理人を務めさせて頂いております……」
line = "「昨年度末、サーシャ先輩から推薦を頂きまして、それからはカフェテリアで料理人を務めさせて頂いております……」"

[[dialogue]]
speaker = "サーシャ"
# 「蛍火ちゃんは料理も凄いけど、星騎士としても強いのよ～。実力は私より上♪　ヴィーナスちゃんにも匹敵する、学園最強クラスといっても過言じゃないわ」
line = "「蛍火ちゃんは料理も凄いけど、星騎士としても強いのよ～。実力は私より上♪　ヴィーナスちゃんにも匹敵する、学園最強クラスといっても過言じゃないわ」"

[[dialogue]]
speaker = "unk"
# それって滅茶苦茶強くないですか！？
line = "それって滅茶苦茶強くないですか！？"

[[dialogue]]
speaker = "サーシャ"
# 「だから、会長くんには是非紹介しておきたかったの～。星徒会メンバーだけで対処出来ない事態が発生した時に頼れる、強力な助っ人としてね」
line = "「だから、会長くんには是非紹介しておきたかったの～。星徒会メンバーだけで対処出来ない事態が発生した時に頼れる、強力な助っ人としてね」"

[[dialogue]]
speaker = "蛍火"
# 「そこまで期待されても困りますが……私は料理人です。まあ、以後お見知りおきを……」
line = "「そこまで期待されても困りますが……私は料理人です。まあ、以後お見知りおきを……」"

[[dialogue]]
speaker = "サーシャ"
# 「ふふっ♪　……会長くん、ここまでで蛍火ちゃんのこと、ちょっと怖そうな子だなって思ったでしょ？」
line = "「ふふっ♪　……会長くん、ここまでで蛍火ちゃんのこと、ちょっと怖そうな子だなって思ったでしょ？」"

[[dialogue]]
speaker = "サーシャ"
# 「でも、これが実は違ったりするのよね～。は～い、蛍火ちゃん、こちょこちょこちょ～」
line = "「でも、これが実は違ったりするのよね～。は～い、蛍火ちゃん、こちょこちょこちょ～」"

[[dialogue]]
speaker = "蛍火"
# 「あっ……サーシャ先輩なにを！？　……ふふっ……あはっ……あはははっ！　や、やめっ……脇腹は苦手なので！　あははははっ！　許し、許して下さいぃ！」
line = "「あっ……サーシャ先輩なにを！？　……ふふっ……あはっ……あはははっ！　や、やめっ……脇腹は苦手なので！　あははははっ！　許し、許して下さいぃ！」"

[[dialogue]]
speaker = "サーシャ"
# 「どう？　少しリラックスできた？」
line = "「どう？　少しリラックスできた？」"

[[dialogue]]
speaker = "蛍火"
# 「は、はい……多分……。ええと、その……申し訳ありませんでした、会長。私、昔から凄く緊張しいで……会長とお話しするのが、初めてでしたので」
line = "「は、はい……多分……。ええと、その……申し訳ありませんでした、会長。私、昔から凄く緊張しいで……会長とお話しするのが、初めてでしたので」"

[[dialogue]]
speaker = "unk"
# （ふ、雰囲気が変わった……！？）
line = "（ふ、雰囲気が変わった……！？）"

[[dialogue]]
speaker = "蛍火"
# 「それで、よろしければなのですが……お近付きの印に、私が作った料理を食べて頂きたいなと思っておりましてっ」
line = "「それで、よろしければなのですが……お近付きの印に、私が作った料理を食べて頂きたいなと思っておりましてっ」"

[[dialogue]]
speaker = "蛍火"
# 「事前に昼食はカフェテリアで召し上がると伺っていましたので、会長がいらっしゃる前から準備していたんです。えっと……お持ちしますので是非っ」
line = "「事前に昼食はカフェテリアで召し上がると伺っていましたので、会長がいらっしゃる前から準備していたんです。えっと……お持ちしますので是非っ」"

[[dialogue]]
speaker = "unk"
# 蛍火が作ってくれたという唐揚げ定食を頂くことになった。しばらく無言の食事が続いていたのだが──
line = "蛍火が作ってくれたという唐揚げ定食を頂くことになった。しばらく無言の食事が続いていたのだが──"

[[dialogue]]
speaker = "蛍火"
# 「その……いかがでしょう？　会長のお口に合いますでしょうか？」
line = "「その……いかがでしょう？　会長のお口に合いますでしょうか？」"

[[dialogue]]
speaker = "unk"
# ……めっっっっっちゃくちゃ美味いっ！！！
line = "……めっっっっっちゃくちゃ美味いっ！！！"

[[dialogue]]
speaker = "サーシャ"
# 「でしょ～！　蛍火ちゃんの料理は、食べると星力が回復すると言われているくらい絶品なの♪　だからこそ、両学園の食を支えるカフェテリアの料理人に推薦したのよ」
line = "「でしょ～！　蛍火ちゃんの料理は、食べると星力が回復すると言われているくらい絶品なの♪　だからこそ、両学園の食を支えるカフェテリアの料理人に推薦したのよ」"

[[dialogue]]
speaker = "蛍火"
# 「たかだか料理が美味しいくらいで、そんな騒がないで下さい。大げさな……」
line = "「たかだか料理が美味しいくらいで、そんな騒がないで下さい。大げさな……」"

[[dialogue]]
speaker = "unk"
# あれ！？　褒めちゃまずかった！？
line = "あれ！？　褒めちゃまずかった！？"

[[dialogue]]
speaker = "サーシャ"
# 「ふふっ。違うのよ、会長くん。これは照れてまた緊張モードになっちゃっただけだから。翻訳すると、そんな美味しいと騒がれると恥ずかしくなっちゃいます、ってこと♪」
line = "「ふふっ。違うのよ、会長くん。これは照れてまた緊張モードになっちゃっただけだから。翻訳すると、そんな美味しいと騒がれると恥ずかしくなっちゃいます、ってこと♪」"

[[dialogue]]
speaker = "蛍火"
# 「……どうやら、勘違いをさせるようなことを言ってしまったようですね。我ながら不甲斐ない……」
line = "「……どうやら、勘違いをさせるようなことを言ってしまったようですね。我ながら不甲斐ない……」"

[[dialogue]]
speaker = "unk"
# これはもう、二重人格なのでは……？
line = "これはもう、二重人格なのでは……？"

[[dialogue]]
speaker = "サーシャ"
# 「ふふっ、二重人格ではないのよ～」
line = "「ふふっ、二重人格ではないのよ～」"

[[dialogue]]
speaker = "蛍火"
# 「ええ、二重人格ではありません。ただちょっと、顔が強張ってしまうだけです」
line = "「ええ、二重人格ではありません。ただちょっと、顔が強張ってしまうだけです」"

[[dialogue]]
speaker = "unk"
# いや、そもそも性格違くない！？
line = "いや、そもそも性格違くない！？"

[[dialogue]]
speaker = "サーシャ"
# 「……まあまあ、そんな些細なことはともかく。実は、会長くんに蛍火ちゃんを紹介したのは、もう一つ理由があってね」
line = "「……まあまあ、そんな些細なことはともかく。実は、会長くんに蛍火ちゃんを紹介したのは、もう一つ理由があってね」"

[[dialogue]]
speaker = "サーシャ"
# 「会長くんはほら、物怖じしない性格でしょう？　だから、蛍火ちゃんのことも、誤解しないで接してくれるって思ったの」
line = "「会長くんはほら、物怖じしない性格でしょう？　だから、蛍火ちゃんのことも、誤解しないで接してくれるって思ったの」"

[[dialogue]]
speaker = "サーシャ"
# 「一度仲良くなれば、緊張しなくなっていくはずだから、よければ友達になってあげてくれないかしら？」
line = "「一度仲良くなれば、緊張しなくなっていくはずだから、よければ友達になってあげてくれないかしら？」"

[[dialogue]]
speaker = "蛍火"
# 「……会長。嫌なら別に、断って下さって構わな──」
line = "「……会長。嫌なら別に、断って下さって構わな──」"

[[dialogue]]
speaker = "unk"
# なんだ、そんなことか。もちろんＯＫだよ
line = "なんだ、そんなことか。もちろんＯＫだよ"

[[dialogue]]
speaker = "蛍火"
# 「ふぅぅ……そうですよね。私と友達になど……えっ？」
line = "「ふぅぅ……そうですよね。私と友達になど……えっ？」"

[[dialogue]]
speaker = "サーシャ"
# 「うふふ～♪　会長くんならそう言ってくれると思ってたわ～」
line = "「うふふ～♪　会長くんならそう言ってくれると思ってたわ～」"

[[dialogue]]
speaker = "蛍火"
# 「いいのですか？　私と……本当に？」
line = "「いいのですか？　私と……本当に？」"

[[dialogue]]
speaker = "unk"
# 今日からよろしく頼むよ、蛍火
line = "今日からよろしく頼むよ、蛍火"

[[dialogue]]
speaker = "unk"
# ああ、友達になろう。
line = "ああ、友達になろう。"

[[dialogue]]
speaker = "蛍火"
# 「下の名前で、しかも呼び捨て？　いくらなんでも、いきなり馴れ馴れし過ぎでは……」
line = "「下の名前で、しかも呼び捨て？　いくらなんでも、いきなり馴れ馴れし過ぎでは……」"

[[dialogue]]
speaker = "unk"
# 素っ気ない言葉でも構わず、握手を求めて、手を差し出す。
line = "素っ気ない言葉でも構わず、握手を求めて、手を差し出す。"

[[dialogue]]
speaker = "unk"
# 蛍火はしばらく視線を泳がせていたが──
line = "蛍火はしばらく視線を泳がせていたが──"

[[dialogue]]
speaker = "蛍火"
# 「そ、その……よろしくお願いします……！」
line = "「そ、その……よろしくお願いします……！」"

[[dialogue]]
speaker = "unk"
# 震える手で握手に応じると、初めて嬉しそうな笑顔を見せるのだった。
line = "震える手で握手に応じると、初めて嬉しそうな笑顔を見せるのだった。"
