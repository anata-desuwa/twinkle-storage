[[dialogue]]
speaker = "unk"
# バレンタイン当日の朝。
line = "バレンタイン当日の朝。"

[[dialogue]]
speaker = "イクシリオン"
# 「し、失礼致します、会長……！」
line = "「し、失礼致します、会長……！」"

[[dialogue]]
speaker = "unk"
# 俺が星徒会室で待っていると、約束の時間より少し早く、イクシーが姿を見せた。
line = "俺が星徒会室で待っていると、約束の時間より少し早く、イクシーが姿を見せた。"

[[dialogue]]
speaker = "unk"
# おはよう、イクシー。その衣装は……？
line = "おはよう、イクシー。その衣装は……？"

[[dialogue]]
speaker = "イクシリオン"
# 「え、えっと……これは、先日覚醒した『バレンタインフォーム』でして……」
line = "「え、えっと……これは、先日覚醒した『バレンタインフォーム』でして……」"

[[dialogue]]
speaker = "unk"
# 驚きつつも、その衣装がイクシーによく似合っていて可愛いと伝える。
line = "驚きつつも、その衣装がイクシーによく似合っていて可愛いと伝える。"

[[dialogue]]
speaker = "unk"
# リボンやフリルが多いデザインは、普段からリボンを好む彼女の雰囲気にぴったりだった。
line = "リボンやフリルが多いデザインは、普段からリボンを好む彼女の雰囲気にぴったりだった。"

[[dialogue]]
speaker = "イクシリオン"
# 「あ、ありがとうございます<emoji=heart04>　会長に褒めていただけて……光栄です……<emoji=heart04>」
line = "「あ、ありがとうございます<emoji=heart04>　会長に褒めていただけて……光栄です……<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
# （はぁぁ……<emoji=heart04>　会長に可愛いって言われちゃいました……！　胸がドキドキして、落ち着きません……！）
line = "（はぁぁ……<emoji=heart04>　会長に可愛いって言われちゃいました……！　胸がドキドキして、落ち着きません……！）"

[[dialogue]]
speaker = "イクシリオン"
# 「その……今日はお忙しいのに、私のためにお時間を作っていただき、ありがとうございます……！」
line = "「その……今日はお忙しいのに、私のためにお時間を作っていただき、ありがとうございます……！」"

[[dialogue]]
speaker = "イクシリオン"
# 「それで……この衣装を見れば、もうお察しかと思うのですが――」
line = "「それで……この衣装を見れば、もうお察しかと思うのですが――」"

[[dialogue]]
speaker = "unk"
# イクシリオンは小さく深呼吸をしてから、丁寧にラッピングされた箱を差し出した。耳まで真っ赤に染めながら、少し震える手で――
line = "イクシリオンは小さく深呼吸をしてから、丁寧にラッピングされた箱を差し出した。耳まで真っ赤に染めながら、少し震える手で――"

[[dialogue]]
speaker = "イクシリオン"
# 「か、会長に……バレンタインチョコを作ってきました！　ど、どうぞ……！」
line = "「か、会長に……バレンタインチョコを作ってきました！　ど、どうぞ……！」"

[[dialogue]]
speaker = "unk"
# 俺はそのチョコを受け取り、笑顔で答える。
line = "俺はそのチョコを受け取り、笑顔で答える。"

[[dialogue]]
speaker = "unk"
# ありがとう、イクシー。本当に嬉しいよ
line = "ありがとう、イクシー。本当に嬉しいよ"

[[dialogue]]
speaker = "イクシリオン"
# 「は、はい……<emoji=heart04>」
line = "「は、はい……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# その場で食べてもいいかと聞くと、イクシリオンは驚いたように顔を上げ、すぐにこくりと頷いた。
line = "その場で食べてもいいかと聞くと、イクシリオンは驚いたように顔を上げ、すぐにこくりと頷いた。"

[[dialogue]]
speaker = "イクシリオン"
# 「えっ！？　あっ……も、もちろんですっ！」
line = "「えっ！？　あっ……も、もちろんですっ！」"

[[dialogue]]
speaker = "イクシリオン"
# （ああぁ……<emoji=heart04>　会長が、私の作ったチョコを手に取って――食べてくれてる……<emoji=heart04>）
line = "（ああぁ……<emoji=heart04>　会長が、私の作ったチョコを手に取って――食べてくれてる……<emoji=heart04>）"

[[dialogue]]
speaker = "unk"
# うん、うまい！　甘くてすごく美味しいよ！
line = "うん、うまい！　甘くてすごく美味しいよ！"

[[dialogue]]
speaker = "イクシリオン"
# 「！　あ、ありがとうございます……<emoji=heart04>」
line = "「！　あ、ありがとうございます……<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
# （はあぁ……<emoji=heart04>　美味しいと言ってもらえて嬉しい……<emoji=heart04>　まるで……私自身を味わってもらっているみたいな……<emoji=heart04>）
line = "（はあぁ……<emoji=heart04>　美味しいと言ってもらえて嬉しい……<emoji=heart04>　まるで……私自身を味わってもらっているみたいな……<emoji=heart04>）"

[[dialogue]]
speaker = "イクシリオン"
# （あっ、だ、ダメです！　そんな……会長がチョコだけじゃなく、私のバレンタインフォームまで味わいたいだなんて……っ！）
line = "（あっ、だ、ダメです！　そんな……会長がチョコだけじゃなく、私のバレンタインフォームまで味わいたいだなんて……っ！）"

[[dialogue]]
speaker = "イクシリオン"
# （こ、こんなこと考えてたら……次はホワイトデーでエッチな展開になってしまうことを妄想して……っ<emoji=heart04>）
line = "（こ、こんなこと考えてたら……次はホワイトデーでエッチな展開になってしまうことを妄想して……っ<emoji=heart04>）"

[[dialogue]]
speaker = "イクシリオン"
# 「――え、えへへへぇ<emoji=heart04>」
line = "「――え、えへへへぇ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# い、イクシー？　大丈夫か？
line = "い、イクシー？　大丈夫か？"

[[dialogue]]
speaker = "イクシリオン"
# 「へっ！？　――な、なんか変な顔をしてましたか！？　し、失礼しましたっ！　チョコを美味しいって言ってもらえて、嬉しくてつい……！」
line = "「へっ！？　――な、なんか変な顔をしてましたか！？　し、失礼しましたっ！　チョコを美味しいって言ってもらえて、嬉しくてつい……！」"

[[dialogue]]
speaker = "イクシリオン"
# 「そ、そう！　ちょっと気が緩んじゃっただけなんです！　だ、大丈夫ですからっ！」
line = "「そ、そう！　ちょっと気が緩んじゃっただけなんです！　だ、大丈夫ですからっ！」"

[[dialogue]]
speaker = "イクシリオン"
# （あぁぁっ……<emoji=heart04>　会長のこと考えてたら、頭の中が妄想でいっぱいに……！　これって、スランプ脱出ってことなんでしょうか！？）
line = "（あぁぁっ……<emoji=heart04>　会長のこと考えてたら、頭の中が妄想でいっぱいに……！　これって、スランプ脱出ってことなんでしょうか！？）"

[[dialogue]]
speaker = "イクシリオン"
# （いえ、でも……好きな人にエッチな妄想ばっかりするのって、やっぱりよくない気が……！）
line = "（いえ、でも……好きな人にエッチな妄想ばっかりするのって、やっぱりよくない気が……！）"

[[dialogue]]
speaker = "unk"
# （なんかまた変な妄想してる気がする……）
line = "（なんかまた変な妄想してる気がする……）"

[[dialogue]]
speaker = "unk"
# けれど、その表情にはもう緊張の色はなく、どこか幸せそうな笑みが浮かんでいた。
line = "けれど、その表情にはもう緊張の色はなく、どこか幸せそうな笑みが浮かんでいた。"

[[dialogue]]
speaker = "unk"
# それならまぁいいか、と俺は微笑ましく見守りながら、チョコをもう一口味わうのだった。
line = "それならまぁいいか、と俺は微笑ましく見守りながら、チョコをもう一口味わうのだった。"

[[dialogue]]
speaker = "unk"
# イクシリオンが退室した直後、入れ替わるようにして、今度はトワ先生とルルカが星徒会室に入ってきた。
line = "イクシリオンが退室した直後、入れ替わるようにして、今度はトワ先生とルルカが星徒会室に入ってきた。"

[[dialogue]]
speaker = "ルルカ"
# 「キュー、キュー、キューッとおはドルフィン☆　お兄ちゃん、キラキラバレンタインだよ～♪」
line = "「キュー、キュー、キューッとおはドルフィン☆　お兄ちゃん、キラキラバレンタインだよ～♪」"

[[dialogue]]
speaker = "トワ先生"
# 「し、失礼しま～す……！」
line = "「し、失礼しま～す……！」"

[[dialogue]]
speaker = "unk"
# まさかの２人同時登場に、俺は思わず目を丸くする。しかも２人とも、バレンタインフォーム！？
line = "まさかの２人同時登場に、俺は思わず目を丸くする。しかも２人とも、バレンタインフォーム！？"

[[dialogue]]
speaker = "ルルカ"
# 「ふふっ、まあ、ちょっと色々あってね～☆　というわけで、まずはトワ先生からどうぞ～♪」
line = "「ふふっ、まあ、ちょっと色々あってね～☆　というわけで、まずはトワ先生からどうぞ～♪」"

[[dialogue]]
speaker = "トワ先生"
# 「か、会長くん……はいっ！　せ、先生からの……バレンタインチョコです……！」
line = "「か、会長くん……はいっ！　せ、先生からの……バレンタインチョコです……！」"

[[dialogue]]
speaker = "unk"
# 先生、ありがとうございます。嬉しいです
line = "先生、ありがとうございます。嬉しいです"

[[dialogue]]
speaker = "トワ先生"
# 「え、えへへ……<emoji=heart04>　どういたしまして……<emoji=heart04>　ウェディングフォームの時はお世話になったから、そのお礼も込めて、ね？」
line = "「え、えへへ……<emoji=heart04>　どういたしまして……<emoji=heart04>　ウェディングフォームの時はお世話になったから、そのお礼も込めて、ね？」"

[[dialogue]]
speaker = "ルルカ"
# 「次はあたしの番だね～♪　お兄ちゃん、妹からのバレンタインチョコレートだよ<emoji=heart04>」
line = "「次はあたしの番だね～♪　お兄ちゃん、妹からのバレンタインチョコレートだよ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ルルカも、ありがとう。嬉しいよ
line = "ルルカも、ありがとう。嬉しいよ"

[[dialogue]]
speaker = "unk"
# 俺はルルカの頭を撫でながら、お礼を言う。
line = "俺はルルカの頭を撫でながら、お礼を言う。"

[[dialogue]]
speaker = "ルルカ"
# 「あっ……えへへ<emoji=heart04>　もう、お兄ちゃん。そういうことしてると、そのうち勘違いさせちゃうよ～？　気をつけないと刺されちゃうからね<emoji=heart04>」
line = "「あっ……えへへ<emoji=heart04>　もう、お兄ちゃん。そういうことしてると、そのうち勘違いさせちゃうよ～？　気をつけないと刺されちゃうからね<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# えっ、いきなり何！？　怖いんだけど！？
line = "えっ、いきなり何！？　怖いんだけど！？"

[[dialogue]]
speaker = "ルルカ"
# 「まったく、お兄ちゃんは……困ってる時は察しがいいのに、こういうとこだけ鈍いんだから～。まあ、無意識で撫でてるあたりが『いつもの癖』って感じだけど♪」
line = "「まったく、お兄ちゃんは……困ってる時は察しがいいのに、こういうとこだけ鈍いんだから～。まあ、無意識で撫でてるあたりが『いつもの癖』って感じだけど♪」"

[[dialogue]]
speaker = "トワ先生"
# 「ふふっ、確かにそうだね。先生も気をつけた方がいいと思うな～？」
line = "「ふふっ、確かにそうだね。先生も気をつけた方がいいと思うな～？」"

[[dialogue]]
speaker = "unk"
# ２人が顔を見合わせて笑う様子に、俺は少し考えて――あることを思いつく。
line = "２人が顔を見合わせて笑う様子に、俺は少し考えて――あることを思いつく。"

[[dialogue]]
speaker = "unk"
# 先生の頭も、撫でていいですか？
line = "先生の頭も、撫でていいですか？"

[[dialogue]]
speaker = "トワ先生"
# 「はわっ！？　な、なにを言ってるのかな、会長くんっ！？」
line = "「はわっ！？　な、なにを言ってるのかな、会長くんっ！？」"

[[dialogue]]
speaker = "ルルカ"
# 「おっ、そう来たか～♪　でも確かに、あたしだけって不公平かもね～。トワちゃん先生、せっかくだし撫でてもらってもいいと思いますよ？　今日はバレンタインですし♪」
line = "「おっ、そう来たか～♪　でも確かに、あたしだけって不公平かもね～。トワちゃん先生、せっかくだし撫でてもらってもいいと思いますよ？　今日はバレンタインですし♪」"

[[dialogue]]
speaker = "トワ先生"
# 「えぇぇ！？　で、でも……先生が生徒に頭を撫でてもらうだなんて……！」
line = "「えぇぇ！？　で、でも……先生が生徒に頭を撫でてもらうだなんて……！」"

[[dialogue]]
speaker = "トワ先生"
# 「あ、いや！　別に嫌じゃないよ！？　ただ、その……他の生徒に見られたりしたら、ちょっと……<emoji=heart04>」
line = "「あ、いや！　別に嫌じゃないよ！？　ただ、その……他の生徒に見られたりしたら、ちょっと……<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
# 「ちょこっとだけなら大丈夫ですよ！　あたしが入り口、見張ってますから♪」
line = "「ちょこっとだけなら大丈夫ですよ！　あたしが入り口、見張ってますから♪」"

[[dialogue]]
speaker = "トワ先生"
# 「う、うぅ～……！　そ、そこまでお膳立てされちゃうとぉ～！」
line = "「う、うぅ～……！　そ、そこまでお膳立てされちゃうとぉ～！」"

[[dialogue]]
speaker = "unk"
# 先生、ちょっとだけ失礼しますね
line = "先生、ちょっとだけ失礼しますね"

[[dialogue]]
speaker = "トワ先生"
# 「えっ！？　ひゃっ……<emoji=heart04>」
line = "「えっ！？　ひゃっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺はそっと先生の頭を撫でた。
line = "俺はそっと先生の頭を撫でた。"

[[dialogue]]
speaker = "トワ先生"
# 「あっ……<emoji=heart04>　ふあぁっ……<emoji=heart04>」
line = "「あっ……<emoji=heart04>　ふあぁっ……<emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
# （か、会長くんに撫でられてる……<emoji=heart04>　教師としてはよくないのに……でも……）
line = "（か、会長くんに撫でられてる……<emoji=heart04>　教師としてはよくないのに……でも……）"

[[dialogue]]
speaker = "トワ先生"
# 「はふぅ……<emoji=heart04>　え……えへへ……<emoji=heart04>」
line = "「はふぅ……<emoji=heart04>　え……えへへ……<emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
# （嬉しくて……顔が緩んじゃう……<emoji=heart04>）
line = "（嬉しくて……顔が緩んじゃう……<emoji=heart04>）"

[[dialogue]]
speaker = "ルルカ"
# 「ふふっ♪　よかったですね、トワちゃん先生♪」
line = "「ふふっ♪　よかったですね、トワちゃん先生♪」"

[[dialogue]]
speaker = "トワ先生"
# 「あ、あぅ……<emoji=heart04>」
line = "「あ、あぅ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# まるで少女のように、恥ずかしそうに頬を染めてこくりと頷くトワ先生。その表情に、俺も自然と笑みがこぼれてしまうのだった。
line = "まるで少女のように、恥ずかしそうに頬を染めてこくりと頷くトワ先生。その表情に、俺も自然と笑みがこぼれてしまうのだった。"
