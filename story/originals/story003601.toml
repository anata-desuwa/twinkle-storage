[[dialogue]]
speaker = "unk"
# その日、附属校の『魔法少女』たちは、新たに出現したロストアイテムの回収にあたっていた。
line = "その日、附属校の『魔法少女』たちは、新たに出現したロストアイテムの回収にあたっていた。"

[[dialogue]]
speaker = "サチ"
# 「じゃあ……プリムラ！　息を合わせて行くよ！」
line = "「じゃあ……プリムラ！　息を合わせて行くよ！」"

[[dialogue]]
speaker = "プリムラ"
# 「言われずとも分かっておるのじゃ、サチ！　そっちこそ足を引っ張るでないぞ！」
line = "「言われずとも分かっておるのじゃ、サチ！　そっちこそ足を引っ張るでないぞ！」"

[[dialogue]]
speaker = "unk"
# 附属校生徒会長『<ruby=しろつめ>白詰</ruby>サチ』と、長く共に戦ってきた相棒『プリムラ』の魔法少女コンビが同時に飛び出す。
line = "附属校生徒会長『<ruby>白詰<rt>しろつめ</rt></ruby>サチ』と、長く共に戦ってきた相棒『プリムラ』の魔法少女コンビが同時に飛び出す。"

[[dialogue]]
speaker = "ロストアイテム"
# 「～♪」
line = "「～♪」"

[[dialogue]]
speaker = "unk"
# 魔法少女たちから逃げ回っているのは、大きいＵ字型の磁石――『磁力』のロストアイテムであった。
line = "魔法少女たちから逃げ回っているのは、大きいＵ字型の磁石――『磁力』のロストアイテムであった。"

[[dialogue]]
speaker = "シズハ"
# 「よし、トレジアンナさん、私たちも！」
line = "「よし、トレジアンナさん、私たちも！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「はい♪　サチさんたちの反対側から回り込んじゃいますよ～！」
line = "「はい♪　サチさんたちの反対側から回り込んじゃいますよ～！」"

[[dialogue]]
speaker = "unk"
# サチたちの後から魔法少女として加わった『追加戦士』の２人――『<ruby=そめい>染井</ruby>シズハ』と『トレジアンナ』も、挟み撃ちの体勢を取る。
line = "サチたちの後から魔法少女として加わった『追加戦士』の２人――『<ruby>染井<rt>そめい</rt></ruby>シズハ』と『トレジアンナ』も、挟み撃ちの体勢を取る。"

[[dialogue]]
speaker = "ロストアイテム"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "unk"
# 追い詰められたロストアイテムは能力を発動し、４人へ向けて『磁力ビーム』を放った。
line = "追い詰められたロストアイテムは能力を発動し、４人へ向けて『磁力ビーム』を放った。"

[[dialogue]]
speaker = "プリムラ"
# 「またあの厄介なビームなのじゃ！」
line = "「またあの厄介なビームなのじゃ！」"

[[dialogue]]
speaker = "サチ"
# 「うん！　みんな――」
line = "「うん！　みんな――」"

[[dialogue]]
speaker = "サチ"
# 「作戦通り、<b>避けないで</b>そのまま突っ込むよ！」
line = "「作戦通り、<b>避けないで</b>そのまま突っ込むよ！」"

[[dialogue]]
speaker = "ロストアイテム"
# 「！？」
line = "「！？」"

[[dialogue]]
speaker = "シズハ"
# 「オッケー♪　いけいけゴーゴー！」
line = "「オッケー♪　いけいけゴーゴー！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「いざ、ユニゾンです！」
line = "「いざ、ユニゾンです！」"

[[dialogue]]
speaker = "unk"
# 『磁力』のロストアイテムは、ビームを当てた対象に『Ｓ極』か『Ｎ極』を付与する能力を持っている。
line = "『磁力』のロストアイテムは、ビームを当てた対象に『Ｓ極』か『Ｎ極』を付与する能力を持っている。"

[[dialogue]]
speaker = "unk"
# ここまでの戦闘で、サチたちはそれを見抜いていた。
line = "ここまでの戦闘で、サチたちはそれを見抜いていた。"

[[dialogue]]
speaker = "サチ"
# （挟み撃ちにすれば、付与する『極』のパターンは限られる……！）
line = "（挟み撃ちにすれば、付与する『極』のパターンは限られる……！）"

[[dialogue]]
speaker = "シズハ"
# （捕まりたくないなら、全員を同じ『極』にして反発させるはず！）
line = "（捕まりたくないなら、全員を同じ『極』にして反発させるはず！）"

[[dialogue]]
speaker = "unk"
# ４人へ向けて磁力ビームが放たれる。
line = "４人へ向けて磁力ビームが放たれる。"

[[dialogue]]
speaker = "トレジアンナ"
# （磁力ビームは弾速が速すぎて、まず避けられないのはわかっています……ならば！）
line = "（磁力ビームは弾速が速すぎて、まず避けられないのはわかっています……ならば！）"

[[dialogue]]
speaker = "プリムラ"
# （避けずに、防いでしまえばいいのじゃ！）
line = "（避けずに、防いでしまえばいいのじゃ！）"

[[dialogue]]
speaker = "unk"
# サチの前にプリムラが、シズハの前にトレジアンナが飛び出し、ビームをその身で受け止める。
line = "サチの前にプリムラが、シズハの前にトレジアンナが飛び出し、ビームをその身で受け止める。"

[[dialogue]]
speaker = "unk"
# 同じ『極』を付与された２人は、強烈な反発で後方へ弾き飛ばされた。
line = "同じ『極』を付与された２人は、強烈な反発で後方へ弾き飛ばされた。"

[[dialogue]]
speaker = "プリムラ"
# 「今じゃ、サチ！！」
line = "「今じゃ、サチ！！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「シズハさん、お願いしますっ！」
line = "「シズハさん、お願いしますっ！」"

[[dialogue]]
speaker = "サチ"
# 「はい！　このチャンス――逃しません！」
line = "「はい！　このチャンス――逃しません！」"

[[dialogue]]
speaker = "シズハ"
# 「とりゃあぁ～～っ！！」
line = "「とりゃあぁ～～っ！！」"

[[dialogue]]
speaker = "unk"
# ビームを受けなかったサチとシズハが、一斉に飛び出す。
line = "ビームを受けなかったサチとシズハが、一斉に飛び出す。"

[[dialogue]]
speaker = "unk"
# そして――
line = "そして――"

[[dialogue]]
speaker = "サチ"
# 「……ロストアイテム、確保成功です！」
line = "「……ロストアイテム、確保成功です！」"

[[dialogue]]
speaker = "シズハ"
# 「やったぁ～～～っ♪」
line = "「やったぁ～～～っ♪」"

[[dialogue]]
speaker = "unk"
# ２人は磁石のロストアイテムを同時に掴み取り、回収することに成功したのだった。
line = "２人は磁石のロストアイテムを同時に掴み取り、回収することに成功したのだった。"

[[dialogue]]
speaker = "unk"
# トレジアンナが回収魔法を発動し、ロストアイテムを亜空間へと収納する。
line = "トレジアンナが回収魔法を発動し、ロストアイテムを亜空間へと収納する。"

[[dialogue]]
speaker = "トレジアンナ"
# 「ふぅ……みなさん、お疲れ様でした～♪　今回のロストアイテム回収は、これにて終了です！」
line = "「ふぅ……みなさん、お疲れ様でした～♪　今回のロストアイテム回収は、これにて終了です！」"

[[dialogue]]
speaker = "プリムラ"
# 「フハハハ！　我らにかかれば、こんなものじゃ♪」
line = "「フハハハ！　我らにかかれば、こんなものじゃ♪」"

[[dialogue]]
speaker = "シズハ"
# 「ふふっ♪　私たち魔法少女の『絆』の勝利ね♪」
line = "「ふふっ♪　私たち魔法少女の『絆』の勝利ね♪」"

[[dialogue]]
speaker = "サチ"
# 「うん♪　最近はお兄さんの手をわずらわせなくても、私たちだけでロストアイテムを回収できてるし――」
line = "「うん♪　最近はお兄さんの手をわずらわせなくても、私たちだけでロストアイテムを回収できてるし――」"

[[dialogue]]
speaker = "シズハ"
# 「チームワークもよくなってきて、いけいけゴーゴーって感じだよね♪」
line = "「チームワークもよくなってきて、いけいけゴーゴーって感じだよね♪」"

[[dialogue]]
speaker = "プリムラ"
# 「しかし、『ディーラック』を負かして一件落着かと思っておったのに、ロストアイテムは変わらず現れ続けるとはな」
line = "「しかし、『ディーラック』を負かして一件落着かと思っておったのに、ロストアイテムは変わらず現れ続けるとはな」"

[[dialogue]]
speaker = "トレジアンナ"
# 「まあ、元々リクリエの影響でロストアイテムは活性化していましたからね～。そこにディーラックさんが便乗していた形なので……」
line = "「まあ、元々リクリエの影響でロストアイテムは活性化していましたからね～。そこにディーラックさんが便乗していた形なので……」"

[[dialogue]]
speaker = "トレジアンナ"
# 「ともあれ、今回も無事に回収できたわけですし、みなさんで勝利のハイタッチといきましょ～♪」
line = "「ともあれ、今回も無事に回収できたわけですし、みなさんで勝利のハイタッチといきましょ～♪」"

[[dialogue]]
speaker = "シズハ"
# 「いぇ～い♪　ハイタ～ッチ♪　ほら、サチちゃんも♪」
line = "「いぇ～い♪　ハイタ～ッチ♪　ほら、サチちゃんも♪」"

[[dialogue]]
speaker = "サチ"
# 「う、うんっ。い、いぇ～い♪」
line = "「う、うんっ。い、いぇ～い♪」"

[[dialogue]]
speaker = "プリムラ"
# 「仕方あるまい。我もしてやるのじゃ！」
line = "「仕方あるまい。我もしてやるのじゃ！」"

[[dialogue]]
speaker = "？？？"
# 「いぇ～い☆　ハイタッチっす～♪」
line = "「いぇ～い☆　ハイタッチっす～♪」"

[[dialogue]]
speaker = "サチ"
# 「は、ハイタ～ッチ♪　……って、え？」
line = "「は、ハイタ～ッチ♪　……って、え？」"

[[dialogue]]
speaker = "プリムラ"
# 「誰じゃ貴様！？」
line = "「誰じゃ貴様！？」"

[[dialogue]]
speaker = "unk"
# サチやプリムラとハイタッチしたのは、これまで見たことのない謎の存在だった。
line = "サチやプリムラとハイタッチしたのは、これまで見たことのない謎の存在だった。"

[[dialogue]]
speaker = "エントロフィー"
# 「ふふっ、初めましてっす！　魔法少女のアネさんたち～♪　ウチは『エントロフィー』って言いま～っす♪」
line = "「ふふっ、初めましてっす！　魔法少女のアネさんたち～♪　ウチは『エントロフィー』って言いま～っす♪」"

[[dialogue]]
speaker = "エントロフィー"
# 「では早速、挨拶代わりに――『反転』♪」
line = "「では早速、挨拶代わりに――『反転』♪」"

[[dialogue]]
speaker = "サチ"
# 「あっ……！？」
line = "「あっ……！？」"

[[dialogue]]
speaker = "プリムラ"
# 「なっ……！？」
line = "「なっ……！？」"

[[dialogue]]
speaker = "サチ"
# 「か、体から急に力が抜けて……変身が解除された……！？」
line = "「か、体から急に力が抜けて……変身が解除された……！？」"

[[dialogue]]
speaker = "プリムラ"
# 「っ……再変身もできん！　貴様、一体何をしたのじゃ……！？」
line = "「っ……再変身もできん！　貴様、一体何をしたのじゃ……！？」"

[[dialogue]]
speaker = "エントロフィー"
# 「そうっすね～、簡単に言うと、ウチが持ってるこの『反転のロストアイテム』を使って～」
line = "「そうっすね～、簡単に言うと、ウチが持ってるこの『反転のロストアイテム』を使って～」"

[[dialogue]]
speaker = "unk"
# 取り出してみせたのは、『砂時計』型のロストアイテム。
line = "取り出してみせたのは、『砂時計』型のロストアイテム。"

[[dialogue]]
speaker = "エントロフィー"
# 「さっき相手してた磁力のロストアイテムみたいに、お２人の力の『極』をくるっと反転させちゃった、みたいな感じっすかね～☆」
line = "「さっき相手してた磁力のロストアイテムみたいに、お２人の力の『極』をくるっと反転させちゃった、みたいな感じっすかね～☆」"

[[dialogue]]
speaker = "トレジアンナ"
# 「まさか……ハイタッチした時に！？」
line = "「まさか……ハイタッチした時に！？」"

[[dialogue]]
speaker = "エントロフィー"
# 「ご名答～♪　ウチ、しれっと素早く紛れ込むのは、得意なんすよ～♪」
line = "「ご名答～♪　ウチ、しれっと素早く紛れ込むのは、得意なんすよ～♪」"

[[dialogue]]
speaker = "エントロフィー"
# 「あっ、次はシズハのアネさんと、トレジアンナのアネさんも、タッチして反転させちゃいますね～☆」
line = "「あっ、次はシズハのアネさんと、トレジアンナのアネさんも、タッチして反転させちゃいますね～☆」"

[[dialogue]]
speaker = "シズハ"
# 「っ……！　速い！？」
line = "「っ……！　速い！？」"

[[dialogue]]
speaker = "シズハ"
# （目を離してなかったのに、一瞬で後ろに回り込まれた……！？　避けられない……！）
line = "（目を離してなかったのに、一瞬で後ろに回り込まれた……！？　避けられない……！）"

[[dialogue]]
speaker = "unk"
# エントロフィーの手が、シズハに触れようとした、その瞬間。
line = "エントロフィーの手が、シズハに触れようとした、その瞬間。"

[[dialogue]]
speaker = "ディーラック"
# 「――おい、誰だか知らないけど、ボクの縄張りでなに好き勝手に暴れてんのサ？」
line = "「――おい、誰だか知らないけど、ボクの縄張りでなに好き勝手に暴れてんのサ？」"

[[dialogue]]
speaker = "unk"
# バリアのように、エネルギーフィールドがシズハの周囲に展開される。
line = "バリアのように、エネルギーフィールドがシズハの周囲に展開される。"

[[dialogue]]
speaker = "unk"
# 静電気のようにバチッと音がして、エントロフィーはその場から飛び退いた。
line = "静電気のようにバチッと音がして、エントロフィーはその場から飛び退いた。"

[[dialogue]]
speaker = "シズハ"
# 「ディーちゃん！　もしかして、近くで様子を見ていてくれたの？」
line = "「ディーちゃん！　もしかして、近くで様子を見ていてくれたの？」"

[[dialogue]]
speaker = "ディーラック"
# 「ふん……別に、たまたま暇だったから見にきただけサ」
line = "「ふん……別に、たまたま暇だったから見にきただけサ」"

[[dialogue]]
speaker = "エントロフィー"
# 「おおっと……これはこれは～♪　ちわ～っす☆　ディーラックのアネさん♪」
line = "「おおっと……これはこれは～♪　ちわ～っす☆　ディーラックのアネさん♪」"

[[dialogue]]
speaker = "ディーラック"
# 「あん？　お前――」
line = "「あん？　お前――」"

[[dialogue]]
speaker = "ディーラック"
# 「『マイナスエネルギー』の気配がするな……」
line = "「『マイナスエネルギー』の気配がするな……」"

[[dialogue]]
speaker = "ディーラック"
# 「まさか、ボクと同類なのか……？」
line = "「まさか、ボクと同類なのか……？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「同類……！？　ということは、ディーラックさんと同じ、マイナスエネルギーから生まれた『エネルギー生命体』……！？」
line = "「同類……！？　ということは、ディーラックさんと同じ、マイナスエネルギーから生まれた『エネルギー生命体』……！？」"

[[dialogue]]
speaker = "エントロフィー"
# 「きゃははっ、正解～♪　ウチはアネさんよりも後に生まれた『妹』っすよ～☆」
line = "「きゃははっ、正解～♪　ウチはアネさんよりも後に生まれた『妹』っすよ～☆」"

[[dialogue]]
speaker = "エントロフィー"
# 「種族名を付けるなら――『マイナスビースト』ってところっすかね～♪」
line = "「種族名を付けるなら――『マイナスビースト』ってところっすかね～♪」"

[[dialogue]]
speaker = "ディーラック"
# 「はぁ？　妹ぉ～？」
line = "「はぁ？　妹ぉ～？」"

[[dialogue]]
speaker = "プリムラ"
# 「貴様、新たな敵ということか……！」
line = "「貴様、新たな敵ということか……！」"

[[dialogue]]
speaker = "サチ"
# 「あなたの目的は一体……！？」
line = "「あなたの目的は一体……！？」"

[[dialogue]]
speaker = "エントロフィー"
# 「ん～、全部明かしちゃうと面白くないんで、それはまた今度ってことで～☆」
line = "「ん～、全部明かしちゃうと面白くないんで、それはまた今度ってことで～☆」"

[[dialogue]]
speaker = "エントロフィー"
# 「顔合わせの挨拶は済みましたし、ここから更に戦うのは面倒そうなんで、今日のところはこれで引き上げるっす～♪」
line = "「顔合わせの挨拶は済みましたし、ここから更に戦うのは面倒そうなんで、今日のところはこれで引き上げるっす～♪」"

[[dialogue]]
speaker = "エントロフィー"
# 「では、アネさん方、新顔の『エントロフィー』ちゃんのこと、覚えといて下さいね～☆」
line = "「では、アネさん方、新顔の『エントロフィー』ちゃんのこと、覚えといて下さいね～☆」"

[[dialogue]]
speaker = "エントロフィー"
# 「失礼しま～すっ♪」
line = "「失礼しま～すっ♪」"

[[dialogue]]
speaker = "unk"
# そうして、エントロフィーは目にも止まらぬ速さで、その場から姿を消すのだった。
line = "そうして、エントロフィーは目にも止まらぬ速さで、その場から姿を消すのだった。"

[[dialogue]]
speaker = "unk"
# 数日後。
line = "数日後。"

[[dialogue]]
speaker = "トレジアンナ"
# 「と、そんなわけで……」
line = "「と、そんなわけで……」"

[[dialogue]]
speaker = "unk"
# サチとプリムラは、大丈夫なのか？
line = "サチとプリムラは、大丈夫なのか？"

[[dialogue]]
speaker = "unk"
# 新たな敵、エントロフィーのことは既に聞いていたが、それよりも俺が心配なのは２人のことだった。
line = "新たな敵、エントロフィーのことは既に聞いていたが、それよりも俺が心配なのは２人のことだった。"

[[dialogue]]
speaker = "シズハ"
# 「サチちゃんとプリムラちゃんは『反転のロストアイテム』の影響で、通常の変身ができなくなっちゃってて……」
line = "「サチちゃんとプリムラちゃんは『反転のロストアイテム』の影響で、通常の変身ができなくなっちゃってて……」"

[[dialogue]]
speaker = "トレジアンナ"
# 「なので、元の力が戻るまでの間、今の状態で変身できるように――」
line = "「なので、元の力が戻るまでの間、今の状態で変身できるように――」"

[[dialogue]]
speaker = "トレジアンナ"
# 「お２人の新しい戦闘服を作ってみたんです！」
line = "「お２人の新しい戦闘服を作ってみたんです！」"

[[dialogue]]
speaker = "プリムラ"
# 「フッフッフ、見よ眷族！　これが我の新たな姿じゃ！」
line = "「フッフッフ、見よ眷族！　これが我の新たな姿じゃ！」"

[[dialogue]]
speaker = "サチ"
# 「お兄さん、あ、あんまりじっと見ないで下さい……！」
line = "「お兄さん、あ、あんまりじっと見ないで下さい……！」"

