[[dialogue]]
speaker = "unk"
# 第９話,ルーザー,B
line = "第９話,ルーザー,B"

[[dialogue]]
speaker = "？？？"
# 「もう……困ったわねぇ」
line = "「もう……困ったわねぇ」"

[[dialogue]]
speaker = "unk"
# けど──声がした。
line = "けど──声がした。"

[[dialogue]]
speaker = "？？？"
# 「魔王として目覚めたあなたは、もう原点を忘れてしまったの？　クロト──あなたは、それくらいで終わる人間だったかしら」
line = "「魔王として目覚めたあなたは、もう原点を忘れてしまったの？　クロト──あなたは、それくらいで終わる人間だったかしら」"

[[dialogue]]
speaker = "？？？"
# 「私が人の子に与えた『星の力』は決して霊力の代替品ではないわ。星騎士──あなた達にしかできないことがあるはずよ」
line = "「私が人の子に与えた『星の力』は決して霊力の代替品ではないわ。星騎士──あなた達にしかできないことがあるはずよ」"

[[dialogue]]
speaker = "？？？"
# 「立ち上がりなさい──クロト。そして……不甲斐ない英雄には、あなたがお尻を叩いてあげなさい。ヴィーナス！」
line = "「立ち上がりなさい──クロト。そして……不甲斐ない英雄には、あなたがお尻を叩いてあげなさい。ヴィーナス！」"

[[dialogue]]
speaker = "魔神ギエル"
# 「──！」
line = "「──！」"

[[dialogue]]
speaker = "魔神ギエル"
# 「防イダ……？　我ガマクロ・ノヴァヲ……？　バカナ……ドコニソンナ力ガ残サレテイルトイウ」
line = "「防イダ……？　我ガマクロ・ノヴァヲ……？　バカナ……ドコニソンナ力ガ残サレテイルトイウ」"

[[dialogue]]
speaker = "unk"
# 俺とヴィーナスの放った光芒は、奇跡的な噛み合いによってギエルの超新星爆発を相殺させる。
line = "俺とヴィーナスの放った光芒は、奇跡的な噛み合いによってギエルの超新星爆発を相殺させる。"

[[dialogue]]
speaker = "unk"
# それから──立ち上がる。
line = "それから──立ち上がる。"

[[dialogue]]
speaker = "ヴィーナス"
# 「参ったわね……あんな風に言われちゃ、死ぬまでやるしかないじゃない」
line = "「参ったわね……あんな風に言われちゃ、死ぬまでやるしかないじゃない」"

[[dialogue]]
speaker = "クロト"
# 「ああ……まったく。にしても──ふふっ……そうか。そうだよな。忘れてたよ」
line = "「ああ……まったく。にしても──ふふっ……そうか。そうだよな。忘れてたよ」"

[[dialogue]]
speaker = "魔神ギエル"
# 「ナニ……？」
line = "「ナニ……？」"

[[dialogue]]
speaker = "クロト"
# 「まだ負けてない──なんて意地の張り方は……間違ってたよ。俺らしくなかった」
line = "「まだ負けてない──なんて意地の張り方は……間違ってたよ。俺らしくなかった」"

[[dialogue]]
speaker = "クロト"
# 「構わない──いいさ。負けを認めてやるよ、ギエル。一度はな！」
line = "「構わない──いいさ。負けを認めてやるよ、ギエル。一度はな！」"

[[dialogue]]
speaker = "unk"
# 俺がいくら哀れで、負け犬で、敗残者だろうと構いやしない。
line = "俺がいくら哀れで、負け犬で、敗残者だろうと構いやしない。"

[[dialogue]]
speaker = "unk"
# だってそんなの、今に始まった話じゃないんだ。
line = "だってそんなの、今に始まった話じゃないんだ。"

[[dialogue]]
speaker = "ヴィーナス"
# 「魔王なんでしょ……英雄なんでしょ？」
line = "「魔王なんでしょ……英雄なんでしょ？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「だったら……私１人くらい、軽くひねってみせてよ──！」
line = "「だったら……私１人くらい、軽くひねってみせてよ──！」"

[[dialogue]]
speaker = "unk"
# ──あの時だって。
line = "──あの時だって。"

[[dialogue]]
speaker = "unk"
# 一度、ヴィーナスの前に敗れ去った俺は、みっともなく決着を覆して抗った。
line = "一度、ヴィーナスの前に敗れ去った俺は、みっともなく決着を覆して抗った。"

[[dialogue]]
speaker = "unk"
# そして──今の俺はようやく、娘の期待に応えるだけの真の魔王になれたんだ。
line = "そして──今の俺はようやく、娘の期待に応えるだけの真の魔王になれたんだ。"

[[dialogue]]
speaker = "クロト"
# 「……だから」
line = "「……だから」"

[[dialogue]]
speaker = "unk"
# 何度だって受け入れよう。敗北を。情けない自分を。
line = "何度だって受け入れよう。敗北を。情けない自分を。"

[[dialogue]]
speaker = "unk"
# 最初から圧倒して勝ち切るなんて──スマートなヒーローのやり方は、映画にでも任せておけばいい。
line = "最初から圧倒して勝ち切るなんて──スマートなヒーローのやり方は、映画にでも任せておけばいい。"

[[dialogue]]
speaker = "魔神ギエル"
# 「ナゼダ……ナゼ、マダ立テルト言ウ……！？　ラクシス──！！」
line = "「ナゼダ……ナゼ、マダ立テルト言ウ……！？　ラクシス──！！」"

[[dialogue]]
speaker = "クロト"
# 「諦めが悪いだけだ。もしかしたらこいつも、<b>先代譲り</b>なのかもしれないけどさ」
line = "「諦めが悪いだけだ。もしかしたらこいつも、<b>先代譲り</b>なのかもしれないけどさ」"

[[dialogue]]
speaker = "unk"
# だけど──俺は<ruby=ラクシス>先代</ruby>とは違う。
line = "だけど──俺は<ruby>先代<rt>ラクシス</rt></ruby>とは違う。"

[[dialogue]]
speaker = "unk"
# 緋宮クロトには、女神より授かった星の加護がある。
line = "緋宮クロトには、女神より授かった星の加護がある。"

[[dialogue]]
speaker = "unk"
# だから、俺は、負ければ負けるほど──地を這いつくばれば這いつくばるほど──
line = "だから、俺は、負ければ負けるほど──地を這いつくばれば這いつくばるほど──"

[[dialogue]]
speaker = "クロト"
# 「何度、地に倒れ伏したって……俺はその度に……強くなる。心の芯が折れない限り」
line = "「何度、地に倒れ伏したって……俺はその度に……強くなる。心の芯が折れない限り」"

[[dialogue]]
speaker = "クロト"
# 「俺の守護星は──地球だ！　この、地に足つけて立ち上がるための、地球なんだ！！」
line = "「俺の守護星は──地球だ！　この、地に足つけて立ち上がるための、地球なんだ！！」"

[[dialogue]]
speaker = "魔神ギエル"
# 「──ッ──？　ナ、ニ────？」
line = "「──ッ──？　ナ、ニ────？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「これ──私と戦った時の──」
line = "「これ──私と戦った時の──」"

[[dialogue]]
speaker = "アナ"
# 「地球由来の──『不屈』の力──！」
line = "「地球由来の──『不屈』の力──！」"

[[dialogue]]
speaker = "モンスターＡ"
# 「イ～ッ！」
line = "「イ～ッ！」"

[[dialogue]]
speaker = "モンスターＢ"
# 「ィィィ──！」
line = "「ィィィ──！」"

[[dialogue]]
speaker = "unk"
# 少年がモンスターに襲われていた。その少年は、俺だった。
line = "少年がモンスターに襲われていた。その少年は、俺だった。"

[[dialogue]]
speaker = "クロト"
# （はは──あの時は……さんざん泣いてたっけ）
line = "（はは──あの時は……さんざん泣いてたっけ）"

[[dialogue]]
speaker = "飢えたモンスターA"
# 『グッグッグッ……ガッガッガッガッ』
line = "『グッグッグッ……ガッガッガッガッ』"

[[dialogue]]
speaker = "飢えたモンスターB"
# 『グルル……ゲヘェ』
line = "『グルル……ゲヘェ』"

[[dialogue]]
speaker = "unk"
# 街で襲われたとき──アステラに連れて行かれたとき──
line = "街で襲われたとき──アステラに連れて行かれたとき──"

[[dialogue]]
speaker = "unk"
# それは、緋宮クロトが人生で経験してきた『敗北』の歴史だった。
line = "それは、緋宮クロトが人生で経験してきた『敗北』の歴史だった。"

[[dialogue]]
speaker = "クロト"
# （こんなの──いちいち思い出してたら、キリがないよ）
line = "（こんなの──いちいち思い出してたら、キリがないよ）"

[[dialogue]]
speaker = "unk"
# ──小さい頃からモンスターにばかり襲われていた。
line = "──小さい頃からモンスターにばかり襲われていた。"

[[dialogue]]
speaker = "unk"
# ──何度も泣いて、逃げ出して、その度に現実が嫌になって……。
line = "──何度も泣いて、逃げ出して、その度に現実が嫌になって……。"

[[dialogue]]
speaker = "unk"
# 走馬灯のように流れていく記憶。
line = "走馬灯のように流れていく記憶。"

[[dialogue]]
speaker = "unk"
# それだけじゃない。今の自分に覚えのない敗走の記憶まで、雪崩のように流れ込んできた。
line = "それだけじゃない。今の自分に覚えのない敗走の記憶まで、雪崩のように流れ込んできた。"

[[dialogue]]
speaker = "クロト"
# （ああ──そうか──これは──別次元の俺の出来事）
line = "（ああ──そうか──これは──別次元の俺の出来事）"

[[dialogue]]
speaker = "クロト"
# （俺はずっと──他の平行世界でも、同じように負け続けてきたんだな）
line = "（俺はずっと──他の平行世界でも、同じように負け続けてきたんだな）"

[[dialogue]]
speaker = "unk"
# デネブで、ベガで……俺は御前試合で何度負けたんだろう？
line = "デネブで、ベガで……俺は御前試合で何度負けたんだろう？"

[[dialogue]]
speaker = "unk"
# 細かい数はわからないけど──
line = "細かい数はわからないけど──"

[[dialogue]]
speaker = "unk"
# 湧き上がってくる底知れない強さは、我ながら苦笑してしまうほど、泥臭い敗北の結晶だった。
line = "湧き上がってくる底知れない強さは、我ながら苦笑してしまうほど、泥臭い敗北の結晶だった。"

[[dialogue]]
speaker = "クロト"
# 「緋宮クロトは諦めない……」
line = "「緋宮クロトは諦めない……」"

[[dialogue]]
speaker = "クロト"
# 「いい敗北をくれたな、ギエル。人生最高の屈辱だったよ」
line = "「いい敗北をくれたな、ギエル。人生最高の屈辱だったよ」"

[[dialogue]]
speaker = "魔神ギエル"
# 「────」
line = "「────」"

[[dialogue]]
speaker = "unk"
# 立つ。吠える。気炎を上げる。
line = "立つ。吠える。気炎を上げる。"

[[dialogue]]
speaker = "unk"
# どんなにか屈辱的な敗北だろうと──それは緋宮クロトにとって、這い上がる最高の糧になる。
line = "どんなにか屈辱的な敗北だろうと──それは緋宮クロトにとって、這い上がる最高の糧になる。"

[[dialogue]]
speaker = "魔神ギエル"
# 「アリエヌ……イクラ魔王ダロウト、コノ規模ノ天体爆発ヲ防ゲルハズガナイ！」
line = "「アリエヌ……イクラ魔王ダロウト、コノ規模ノ天体爆発ヲ防ゲルハズガナイ！」"

[[dialogue]]
speaker = "クロト"
# 「そうだな。魔王ってだけじゃ無理だっただろう──だからこれは、俺の諦めの悪さでしかない」
line = "「そうだな。魔王ってだけじゃ無理だっただろう──だからこれは、俺の諦めの悪さでしかない」"

[[dialogue]]
speaker = "クロト"
# 「俺の立つ地平は……何度だって、俺を奮い立たせてくれる」
line = "「俺の立つ地平は……何度だって、俺を奮い立たせてくれる」"

[[dialogue]]
speaker = "アナ"
# 「何重にも重なった『不屈』の能力……これは……」
line = "「何重にも重なった『不屈』の能力……これは……」"

[[dialogue]]
speaker = "リノ"
# 「今のクロトはさっきまでの数倍──いえ、もしかしたら数十倍……！」
line = "「今のクロトはさっきまでの数倍──いえ、もしかしたら数十倍……！」"

[[dialogue]]
speaker = "unk"
# 魔王覚醒すら上回る力のインフレーションが発動していた。
line = "魔王覚醒すら上回る力のインフレーションが発動していた。"

[[dialogue]]
speaker = "unk"
# 要はそれだけ負け続けたってことで、不甲斐ない戦績の証明でしかないけれど。
line = "要はそれだけ負け続けたってことで、不甲斐ない戦績の証明でしかないけれど。"

[[dialogue]]
speaker = "unk"
# 敗北こそが緋宮クロトを強くする──その限界は平行世界の<ruby=くびき>軛</ruby>さえ超えた青天井。
line = "敗北こそが緋宮クロトを強くする──その限界は平行世界の<ruby>軛<rt>くびき</rt></ruby>さえ超えた青天井。"

[[dialogue]]
speaker = "トリュファイナ"
# 『魔王ラクシス──あなたは、一輪の花のようですね』
line = "『魔王ラクシス──あなたは、一輪の花のようですね』"

[[dialogue]]
speaker = "トリュファイナ"
# 『重なり合う可能性の花弁。そんなあなたの種を植えれば、きっと……新たな領域が芽吹くことになるのでしょう』
line = "『重なり合う可能性の花弁。そんなあなたの種を植えれば、きっと……新たな領域が芽吹くことになるのでしょう』"

[[dialogue]]
speaker = "クロト"
# （デネブ──ベガ──アルタイル──３つに分かたれた世界すべての『敗北』を、今この瞬間に束ねる）
line = "（デネブ──ベガ──アルタイル──３つに分かたれた世界すべての『敗北』を、今この瞬間に束ねる）"

[[dialogue]]
speaker = "unk"
# それは──この宇宙に分岐を生んだ『根』としての存在証明。
line = "それは──この宇宙に分岐を生んだ『根』としての存在証明。"

[[dialogue]]
speaker = "unk"
# 緋宮クロトにしかできない、超次元の重ね合わせ──
line = "緋宮クロトにしかできない、超次元の重ね合わせ──"

[[dialogue]]
speaker = "クロト"
# 「フロンティア、ドライブ──」
line = "「フロンティア、ドライブ──」"
