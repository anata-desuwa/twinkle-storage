[[dialogue]]
speaker = "unk"
# あれは数ヶ月前のこと。九浄家の経営するカジノに、新種のトランプモンスターが出現するという事件が発生した。
line = "あれは数ヶ月前のこと。九浄家の経営するカジノに、新種のトランプモンスターが出現するという事件が発生した。"

[[dialogue]]
speaker = "unk"
# その時は、流星星徒会のユウリとセーラ先輩、そして俺の同窓生でもあるユーリスと共に、カジノの警備と調査を行った。
line = "その時は、流星星徒会のユウリとセーラ先輩、そして俺の同窓生でもあるユーリスと共に、カジノの警備と調査を行った。"

[[dialogue]]
speaker = "unk"
# ユーリスが『実は男装をしている女生徒である』ことがユウリたちにバレてしまうトラブルもあったが、無事にトランプモンスターたちは撃破できた。
line = "ユーリスが『実は男装をしている女生徒である』ことがユウリたちにバレてしまうトラブルもあったが、無事にトランプモンスターたちは撃破できた。"

[[dialogue]]
speaker = "unk"
# しかし謎は謎のまま──新種のトランプモンスターたちがどこから現れたのかまでは明らかにできなかった。
line = "しかし謎は謎のまま──新種のトランプモンスターたちがどこから現れたのかまでは明らかにできなかった。"

[[dialogue]]
speaker = "unk"
# しかし今、再び九浄家のカジノで事件が発生した。そのため俺は調査の為に呼ばれたのだった──
line = "しかし今、再び九浄家のカジノで事件が発生した。そのため俺は調査の為に呼ばれたのだった──"

[[dialogue]]
speaker = "ユーリス"
# 「やぁ会長、待っていたよ。ヘレナさんから事件の内容は聞いてるかな？」
line = "「やぁ会長、待っていたよ。ヘレナさんから事件の内容は聞いてるかな？」"

[[dialogue]]
speaker = "unk"
# このカジノで神隠しが起きているって……
line = "このカジノで神隠しが起きているって……"

[[dialogue]]
speaker = "ユーリス"
# 「そうなんだ。具体的な目撃証言は無し。でも行方不明者は皆、このカジノを訪れてからの足跡が辿れないらしくて」
line = "「そうなんだ。具体的な目撃証言は無し。でも行方不明者は皆、このカジノを訪れてからの足跡が辿れないらしくて」"

[[dialogue]]
speaker = "ユーリス"
# 「原因はこのカジノ……もっと言えば、前回の騒動のトランプモンスター達が絡んでいる。ヘレナさんはそう睨んでいるんだろうね」
line = "「原因はこのカジノ……もっと言えば、前回の騒動のトランプモンスター達が絡んでいる。ヘレナさんはそう睨んでいるんだろうね」"

[[dialogue]]
speaker = "unk"
# 今回は隠密調査をするって聞いてる
line = "今回は隠密調査をするって聞いてる"

[[dialogue]]
speaker = "ユーリス"
# 「うん。学園が秘密裏に抱えている部隊……公安委員会を動かすからね。存在を聞いた時は驚いたよ」
line = "「うん。学園が秘密裏に抱えている部隊……公安委員会を動かすからね。存在を聞いた時は驚いたよ」"

[[dialogue]]
speaker = "ユーリス"
# 「あ……噂をすればだ。会長、頼もしい助っ人の登場だよ？」
line = "「あ……噂をすればだ。会長、頼もしい助っ人の登場だよ？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「やっほ～、会長に王子様♪　今日はよろしく～」
line = "「やっほ～、会長に王子様♪　今日はよろしく～」"

[[dialogue]]
speaker = "セナリィ"
# 「何やら報酬を弾んでいただけるそうで……期待していますわよ？」
line = "「何やら報酬を弾んでいただけるそうで……期待していますわよ？」"

[[dialogue]]
speaker = "unk"
# 彼女は対星力犯罪専門の隠密部隊である『公安委員会』に所属する、<ruby=たちくち>立朽</ruby>ネーゼマイン。イタズラ好きだが頭のキレる後輩だ。
line = "彼女は対星力犯罪専門の隠密部隊である『公安委員会』に所属する、<ruby>立朽<rt>たちくち</rt></ruby>ネーゼマイン。イタズラ好きだが頭のキレる後輩だ。"

[[dialogue]]
speaker = "unk"
# そして秘密結社『ゴールデングース』の社長、バンデット・セナリィ。傭兵としての経験も豊富で、荒事に関して彼女の右に出る者はいないだろう。
line = "そして秘密結社『ゴールデングース』の社長、バンデット・セナリィ。傭兵としての経験も豊富で、荒事に関して彼女の右に出る者はいないだろう。"

[[dialogue]]
speaker = "unk"
# ここに聖剣の担い手であるユーリスと星徒会長の俺が加わり、神隠し事件の調査に当たることになる──
line = "ここに聖剣の担い手であるユーリスと星徒会長の俺が加わり、神隠し事件の調査に当たることになる──"

[[dialogue]]
speaker = "ユーリス"
# 「お集まりいただきありがとうございます。早速、どのように調査をするか、話し合っていきましょうか」
line = "「お集まりいただきありがとうございます。早速、どのように調査をするか、話し合っていきましょうか」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「オッケー。でもその前に……にひ♪　カジノ内をうろついても違和感がないようにドレスコードを守らないとだよね？」
line = "「オッケー。でもその前に……にひ♪　カジノ内をうろついても違和感がないようにドレスコードを守らないとだよね？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「王子様の聖剣スキルを使えば、あっという間に早着替えができちゃうって聞いてるけど本当なの？」
line = "「王子様の聖剣スキルを使えば、あっという間に早着替えができちゃうって聞いてるけど本当なの？」"

[[dialogue]]
speaker = "ユーリス"
# 「ええ、もちろん調査のための衣装は提供いたします。早速、別室にてスキルを使用いたしましょうか」
line = "「ええ、もちろん調査のための衣装は提供いたします。早速、別室にてスキルを使用いたしましょうか」"

[[dialogue]]
speaker = "セナリィ"
# 「衣装を無料でレンタル。いい響きですわ！」
line = "「衣装を無料でレンタル。いい響きですわ！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「楽しみだな～。王子様ってバニーが大好きなんでしょ？　どんなこだわりのある衣装を着せられちゃうのかな～♪」
line = "「楽しみだな～。王子様ってバニーが大好きなんでしょ？　どんなこだわりのある衣装を着せられちゃうのかな～♪」"

[[dialogue]]
speaker = "ユーリス"
# 「私、バニーにこだわりなんてありませんよ！？」
line = "「私、バニーにこだわりなんてありませんよ！？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「そうなの？　真面目なユウリ先輩にあんなエッチ衣装を着せてたから、てっきり……」
line = "「そうなの？　真面目なユウリ先輩にあんなエッチ衣装を着せてたから、てっきり……」"

[[dialogue]]
speaker = "ユーリス"
# 「ひ、ひどい誤解です！」
line = "「ひ、ひどい誤解です！」"

[[dialogue]]
speaker = "セナリィ"
# 「私のバニー衣装は、それはもうゴージャスなやつでお願いいたしますわね！」
line = "「私のバニー衣装は、それはもうゴージャスなやつでお願いいたしますわね！」"

[[dialogue]]
speaker = "セナリィ"
# 「流石はゴールデングースの総帥と言われるようなデザイン……そうです、色や装飾の指定はできまして？」
line = "「流石はゴールデングースの総帥と言われるようなデザイン……そうです、色や装飾の指定はできまして？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「私はとびっきり可愛いやつでお願いね！　あ、でもちょっとくらいエッチなやつも歓迎だよ。会長を悩殺しちゃうのも面白そうだし～♪」
line = "「私はとびっきり可愛いやつでお願いね！　あ、でもちょっとくらいエッチなやつも歓迎だよ。会長を悩殺しちゃうのも面白そうだし～♪」"

[[dialogue]]
speaker = "ユーリス"
# 「わ、私の聖剣スキルはそこまで自由度の高いものでは……！」
line = "「わ、私の聖剣スキルはそこまで自由度の高いものでは……！」"

[[dialogue]]
speaker = "ユーリス"
# 「──っと。ああ、すみません。あちらにいらっしゃる九浄家の方が、何やら呼んでいるようですっ」
line = "「──っと。ああ、すみません。あちらにいらっしゃる九浄家の方が、何やら呼んでいるようですっ」"

[[dialogue]]
speaker = "ユーリス"
# 「ちょっと話を聞いてくるから。か、会長はちゃんと誤解を解いておいてね……！？」
line = "「ちょっと話を聞いてくるから。か、会長はちゃんと誤解を解いておいてね……！？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひ♪　王子様ったら慌てちゃって可愛いな～♪」
line = "「にひ♪　王子様ったら慌てちゃって可愛いな～♪」"

[[dialogue]]
speaker = "unk"
# もう少し緊張感を持った方がいいんじゃ？
line = "もう少し緊張感を持った方がいいんじゃ？"

[[dialogue]]
speaker = "unk"
# たくさんの人が神隠しに遭ってるらしい
line = "たくさんの人が神隠しに遭ってるらしい"

[[dialogue]]
speaker = "セナリィ"
# 「あんまりシリアスになりすぎるのもよくないですわよ？　ここはカジノ……陽気な態度でこそ目立たず任務を遂行できるというものですわ」
line = "「あんまりシリアスになりすぎるのもよくないですわよ？　ここはカジノ……陽気な態度でこそ目立たず任務を遂行できるというものですわ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「そーそー。それにしてもカジノの雰囲気、いつもと変わらないね。お客が消えてることはあまり広まっていない感じなのかな？」
line = "「そーそー。それにしてもカジノの雰囲気、いつもと変わらないね。お客が消えてることはあまり広まっていない感じなのかな？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「スタッフもお客もみんな賭けを楽しんで……って、あれ？　珍しい人がいる」
line = "「スタッフもお客もみんな賭けを楽しんで……って、あれ？　珍しい人がいる」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「──あら？　緋宮会長。奇遇ですわね」
line = "「──あら？　緋宮会長。奇遇ですわね」"

[[dialogue]]
speaker = "unk"
# 千園寺先輩……！？
line = "千園寺先輩……！？"

[[dialogue]]
speaker = "unk"
# 流星市国の五名家の一柱『<ruby=せんおんじ>千園寺</ruby>家』の令嬢──千園寺ヒルディオーネ先輩だ。
line = "流星市国の五名家の一柱『<ruby>千園寺<rt>せんおんじ</rt></ruby>家』の令嬢──千園寺ヒルディオーネ先輩だ。"

[[dialogue]]
speaker = "unk"
# 流星学園の寮長を担っており、その卓越した戦闘能力と実績から『<ruby=エトワール・イルソーレ>白昼の極星</ruby>』の二つ名で多くの後輩から慕われる生粋のお嬢様である。
line = "流星学園の寮長を担っており、その卓越した戦闘能力と実績から『<ruby>白昼の極星<rt>エトワール・イルソーレ</rt></ruby>』の二つ名で多くの後輩から慕われる生粋のお嬢様である。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「まさかのレアキャラだね。こんにちは～♪」
line = "「まさかのレアキャラだね。こんにちは～♪」"

[[dialogue]]
speaker = "セナリィ"
# 「今日はこんな所でどうしたんですの？　貴女ほどのお嬢様であれば、賭け事とは無縁でしょうに」
line = "「今日はこんな所でどうしたんですの？　貴女ほどのお嬢様であれば、賭け事とは無縁でしょうに」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「おーっほっほっほ！　何も賭け事をするだけが、カジノを訪れる理由ではありませんわ」
line = "「おーっほっほっほ！　何も賭け事をするだけが、カジノを訪れる理由ではありませんわ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「家業の千園寺ギャラクティックでお世話になっている方々が、本日こちらにいらっしゃるのです。私は千園寺の者として、ご挨拶に来たのですわ！」
line = "「家業の千園寺ギャラクティックでお世話になっている方々が、本日こちらにいらっしゃるのです。私は千園寺の者として、ご挨拶に来たのですわ！」"

[[dialogue]]
speaker = "セナリィ"
# 「相変わらず声の大きいご令嬢ですわね……」
line = "「相変わらず声の大きいご令嬢ですわね……」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ところで緋宮会長たちこそ、どうしてこんな所に？」
line = "「ところで緋宮会長たちこそ、どうしてこんな所に？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「学生の本分は勉学と鍛錬ですわよ。賭け事に興じるのはあまり感心いたしませんわね」
line = "「学生の本分は勉学と鍛錬ですわよ。賭け事に興じるのはあまり感心いたしませんわね」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ちょっとしたアルバイトに来てるんだ～。このあと会長命令でー、ちょっぴりエッチなバニー服を着せられちゃう予定～♪」
line = "「ちょっとしたアルバイトに来てるんだ～。このあと会長命令でー、ちょっぴりエッチなバニー服を着せられちゃう予定～♪」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ですわっ！？　い、いけませんわ、緋宮会長！　権力を笠にそんなハレンチを命じるなど……！」
line = "「ですわっ！？　い、いけませんわ、緋宮会長！　権力を笠にそんなハレンチを命じるなど……！」"

[[dialogue]]
speaker = "unk"
# 先輩、マインの軽口を信じないで！？
line = "先輩、マインの軽口を信じないで！？"

[[dialogue]]
speaker = "？？？"
# 「ちょっぴりエッチなバニー服。良い響きですねぇ……着替えが必要ならばそのお役目。ぜひ私めにお任せいただけませんか？」
line = "「ちょっぴりエッチなバニー服。良い響きですねぇ……着替えが必要ならばそのお役目。ぜひ私めにお任せいただけませんか？」"

[[dialogue]]
speaker = "セナリィ"
# 「……？　何ですの、今のニチャァっとした感じの声は」
line = "「……？　何ですの、今のニチャァっとした感じの声は」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「……何だか不気味な響きだったね」
line = "「……何だか不気味な響きだったね」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「はっ……！？　皆様、あちらを──！」
line = "「はっ……！？　皆様、あちらを──！」"

[[dialogue]]
speaker = "？？？"
# 「嗚呼──素晴らしい。新星の星徒会長さえ呼べればと思っていたのですが……まさかこんなにも可憐な女性たちにまで出会えるとは！」
line = "「嗚呼──素晴らしい。新星の星徒会長さえ呼べればと思っていたのですが……まさかこんなにも可憐な女性たちにまで出会えるとは！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「な、何者ですの、貴方──！？」
line = "「な、何者ですの、貴方──！？」"

[[dialogue]]
speaker = "？？？"
# 「今日の私はなんてツイているのでしょう！　これも『欲望』の賜物……そうに違いありません！」
line = "「今日の私はなんてツイているのでしょう！　これも『欲望』の賜物……そうに違いありません！」"

[[dialogue]]
speaker = "セナリィ"
# 「──くぅ！？」
line = "「──くぅ！？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「なに、この力っ──振りほどけない……！？」
line = "「なに、この力っ──振りほどけない……！？」"

[[dialogue]]
speaker = "？？？"
# 「星騎士の皆様──あなた方を特別にご招待いたしましょう」
line = "「星騎士の皆様──あなた方を特別にご招待いたしましょう」"

[[dialogue]]
speaker = "？？？"
# 「めくるめく『欲望』渦巻く──私のアステラカジノへ！！」
line = "「めくるめく『欲望』渦巻く──私のアステラカジノへ！！」"

[[dialogue]]
speaker = "ユーリス"
# 「お待たせしました。打ち合わせの続きを──あれ？」
line = "「お待たせしました。打ち合わせの続きを──あれ？」"

[[dialogue]]
speaker = "ユーリス"
# 「会長……皆さん……？　いったいどこに……？」
line = "「会長……皆さん……？　いったいどこに……？」"
