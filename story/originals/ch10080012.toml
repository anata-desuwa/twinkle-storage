[[dialogue]]
speaker = "unk"
# 第２話,どこでもお昼寝,P
line = "第２話,どこでもお昼寝,P"

[[dialogue]]
speaker = "マトイ"
# 「お疲れ様、会長。運動部系の部室の割り当て、うまい感じにまとまって良かったね」
line = "「お疲れ様、会長。運動部系の部室の割り当て、うまい感じにまとまって良かったね」"

[[dialogue]]
speaker = "マトイ"
# 「薙刀部が星徒会室に乗り込んできた時はどうなるかと思ったけど……堂々とした対応で、すごかったよ。私なんか、薙刀を突き付けられた時は縮こまっちゃったもん」
line = "「薙刀部が星徒会室に乗り込んできた時はどうなるかと思ったけど……堂々とした対応で、すごかったよ。私なんか、薙刀を突き付けられた時は縮こまっちゃったもん」"

[[dialogue]]
speaker = "unk"
# あれはさすがに俺も肝が冷えたけどな……
line = "あれはさすがに俺も肝が冷えたけどな……"

[[dialogue]]
speaker = "マトイ"
# 「ただいま戻りました。薙刀部の件は会長がうまく解決してくれて……」
line = "「ただいま戻りました。薙刀部の件は会長がうまく解決してくれて……」"

[[dialogue]]
speaker = "サーシャ"
# 「マトイちゃん。し～♪」
line = "「マトイちゃん。し～♪」"

[[dialogue]]
speaker = "マトイ"
# 「あ……」
line = "「あ……」"

[[dialogue]]
speaker = "アナ"
# 「……すぅ、すぅ…んんっ、……すぅ……」
line = "「……すぅ、すぅ…んんっ、……すぅ……」"

[[dialogue]]
speaker = "サーシャ"
# 「仮眠を取るから１０分くらい経ったら起こしてって、アナちゃんに頼まれたの」
line = "「仮眠を取るから１０分くらい経ったら起こしてって、アナちゃんに頼まれたの」"

[[dialogue]]
speaker = "サーシャ"
# 「私の膝の上に移動させても全然起きないのよ？　かわいい～♪」
line = "「私の膝の上に移動させても全然起きないのよ？　かわいい～♪」"

[[dialogue]]
speaker = "マトイ"
# 「えっ……さ、サーシャさんがアナを移動させたんですか？　アナが甘えてきた、とかじゃなくて……？」
line = "「えっ……さ、サーシャさんがアナを移動させたんですか？　アナが甘えてきた、とかじゃなくて……？」"

[[dialogue]]
speaker = "サーシャ"
# 「そうよ？　こうやって、よいしょって膝の上に乗せたの♪　抱きしめるとちょうどすっぽり収まるから、抱き心地がいいのよね、アナちゃんって」
line = "「そうよ？　こうやって、よいしょって膝の上に乗せたの♪　抱きしめるとちょうどすっぽり収まるから、抱き心地がいいのよね、アナちゃんって」"

[[dialogue]]
speaker = "サーシャ"
# 「はあぁ～……♪　今なら、なでなでし放題だわ♪」
line = "「はあぁ～……♪　今なら、なでなでし放題だわ♪」"

[[dialogue]]
speaker = "アナ"
# 「んっ、んん……っ、……すぅ、すぅ、んふぅ……」
line = "「んっ、んん……っ、……すぅ、すぅ、んふぅ……」"

[[dialogue]]
speaker = "サーシャ"
# 「今ならいたずらし放題よ？　どう、マトイちゃん……？　今ならこの柔らかそうなほっぺた、ぷにぷにし放題♪」
line = "「今ならいたずらし放題よ？　どう、マトイちゃん……？　今ならこの柔らかそうなほっぺた、ぷにぷにし放題♪」"

[[dialogue]]
speaker = "マトイ"
# 「だ、ダメですよ！　アナだって疲れてるんですから、ゆっくり寝かせてあげたほうがいいと思います……！」
line = "「だ、ダメですよ！　アナだって疲れてるんですから、ゆっくり寝かせてあげたほうがいいと思います……！」"

[[dialogue]]
speaker = "サーシャ"
# 「会長くんはどうかしら……？」
line = "「会長くんはどうかしら……？」"

[[dialogue]]
speaker = "unk"
# ……ごくり
line = "……ごくり"

[[dialogue]]
speaker = "マトイ"
# 「ごくり、じゃないよ！？　意外とムッツリだよね、会長！？」
line = "「ごくり、じゃないよ！？　意外とムッツリだよね、会長！？」"

[[dialogue]]
speaker = "マトイ"
# 「膝の上に乗せるくらい別に……って、そう考えてる時点で下心あるよ。私だってちょっと乗せてみたいなって思ってたけど、我慢したんだから……」
line = "「膝の上に乗せるくらい別に……って、そう考えてる時点で下心あるよ。私だってちょっと乗せてみたいなって思ってたけど、我慢したんだから……」"

[[dialogue]]
speaker = "サーシャ"
# 「大丈夫よ、マトイちゃん。アナちゃんには了承を得てるわ」
line = "「大丈夫よ、マトイちゃん。アナちゃんには了承を得てるわ」"

[[dialogue]]
speaker = "マトイ"
# 「そう……なんですか？　じ、じゃあ、私も……」
line = "「そう……なんですか？　じ、じゃあ、私も……」"

[[dialogue]]
speaker = "サーシャ"
# 「寝ている間に、寝心地のいいところに移動させておいてあげるって、言っておいたから♪」
line = "「寝ている間に、寝心地のいいところに移動させておいてあげるって、言っておいたから♪」"

[[dialogue]]
speaker = "マトイ"
# 「拡大解釈では！？　や、やっぱり私は止めておきます……」
line = "「拡大解釈では！？　や、やっぱり私は止めておきます……」"

[[dialogue]]
speaker = "unk"
# 俺はちょっと失礼して……
line = "俺はちょっと失礼して……"

[[dialogue]]
speaker = "マトイ"
# 「あっ、会長！？　ずるい！」
line = "「あっ、会長！？　ずるい！」"

[[dialogue]]
speaker = "サーシャ"
# 「うふふ……いいわよ～♪」
line = "「うふふ……いいわよ～♪」"

[[dialogue]]
speaker = "サーシャ"
# 「こっちにいらっしゃい。代わってあげる♪」
line = "「こっちにいらっしゃい。代わってあげる♪」"

[[dialogue]]
speaker = "アナ"
# 「ん、んうぅ……」
line = "「ん、んうぅ……」"

[[dialogue]]
speaker = "サーシャ"
# 「おはよう、アナちゃん。きっちり１０分寝てたわね～」
line = "「おはよう、アナちゃん。きっちり１０分寝てたわね～」"

[[dialogue]]
speaker = "サーシャ"
# 「その技術、私も欲しいわ～。仮眠を取ろうとすると、つい熟睡しちゃうのよね～」
line = "「その技術、私も欲しいわ～。仮眠を取ろうとすると、つい熟睡しちゃうのよね～」"

[[dialogue]]
speaker = "マトイ"
# 「わ、私……どうなっても知らないから」
line = "「わ、私……どうなっても知らないから」"

[[dialogue]]
speaker = "unk"
# おはよう、アナ
line = "おはよう、アナ"

[[dialogue]]
speaker = "アナ"
# 「…………は？」
line = "「…………は？」"

[[dialogue]]
speaker = "アナ"
# 「…………～～～～～～っっっ！？！？」
line = "「…………～～～～～～っっっ！？！？」"

[[dialogue]]
speaker = "アナ"
# 「なな、なにをしているんですか、会長！？」
line = "「なな、なにをしているんですか、会長！？」"

[[dialogue]]
speaker = "サーシャ"
# 「きゃ～♪　アナちゃんのそんな慌てる顔、初めてみたかも♪」
line = "「きゃ～♪　アナちゃんのそんな慌てる顔、初めてみたかも♪」"

[[dialogue]]
speaker = "アナ"
# 「さ、サーシャ先輩っ、これはどういうことですかっ！？」
line = "「さ、サーシャ先輩っ、これはどういうことですかっ！？」"

[[dialogue]]
speaker = "サーシャ"
# 「アナちゃんが仮眠を取る前に、寝心地のいいところに移動させるって言ったじゃない。そういうことよ～♪」
line = "「アナちゃんが仮眠を取る前に、寝心地のいいところに移動させるって言ったじゃない。そういうことよ～♪」"

[[dialogue]]
speaker = "unk"
# 寝心地はどうだった？
line = "寝心地はどうだった？"

[[dialogue]]
speaker = "アナ"
# 「ね、寝心地と言われても……」
line = "「ね、寝心地と言われても……」"

[[dialogue]]
speaker = "アナ"
# 「……いえ、冷静になると、これはこれで悪くないかもしれません」
line = "「……いえ、冷静になると、これはこれで悪くないかもしれません」"

[[dialogue]]
speaker = "アナ"
# 「会長。グッドチェアー賞、受賞。というわけで、このままの体勢で仕事に戻りましょう」
line = "「会長。グッドチェアー賞、受賞。というわけで、このままの体勢で仕事に戻りましょう」"

[[dialogue]]
speaker = "unk"
# え……俺が仕事できないんだけど……
line = "え……俺が仕事できないんだけど……"

[[dialogue]]
speaker = "アナ"
# 「ノープロブレム。私の仕事の能率は１００％アップですから」
line = "「ノープロブレム。私の仕事の能率は１００％アップですから」"

[[dialogue]]
speaker = "アナ"
# 「会長からやりだしたことなんですから、最後まで責任を持って役目を果たして下さい♪」
line = "「会長からやりだしたことなんですから、最後まで責任を持って役目を果たして下さい♪」"

[[dialogue]]
speaker = "unk"
# は、はい……
line = "は、はい……"

[[dialogue]]
speaker = "アナ"
# 「～～～♪」
line = "「～～～♪」"

[[dialogue]]
speaker = "unk"
# アナは先程までと打って変わって機嫌よさそうに、バリバリと仕事をこなし始めるのだった。
line = "アナは先程までと打って変わって機嫌よさそうに、バリバリと仕事をこなし始めるのだった。"
