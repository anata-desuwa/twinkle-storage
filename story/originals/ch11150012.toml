[[dialogue]]
speaker = "unk"
# 第２話,『煌嶺』の名,P
line = "第２話,『煌嶺』の名,P"

[[dialogue]]
speaker = "モンスター"
# 「グモォオオオッ！！」
line = "「グモォオオオッ！！」"

[[dialogue]]
speaker = "シルヴィ"
# 「いくよ、会長くん！」
line = "「いくよ、会長くん！」"

[[dialogue]]
speaker = "unk"
# 街にモンスターが出現し、近くに居合わせたシルヴィ先輩とともに戦闘に突入する──
line = "街にモンスターが出現し、近くに居合わせたシルヴィ先輩とともに戦闘に突入する──"

[[dialogue]]
speaker = "煌嶺"
# 「ちぇりゃーっ！」
line = "「ちぇりゃーっ！」"

[[dialogue]]
speaker = "モンスター"
# 「グォオオッ！！？」
line = "「グォオオッ！！？」"

[[dialogue]]
speaker = "シルヴィ"
# 「モンスターを蹴り倒したーっ！？」
line = "「モンスターを蹴り倒したーっ！？」"

[[dialogue]]
speaker = "煌嶺"
# 「私、キュリオスの女帝だよ？　リーエンちゃんから格闘技も教わってるし、このくらい朝飯前なんだから」
line = "「私、キュリオスの女帝だよ？　リーエンちゃんから格闘技も教わってるし、このくらい朝飯前なんだから」"

[[dialogue]]
speaker = "モンスター"
# 「グルルァアアッ！」
line = "「グルルァアアッ！」"

[[dialogue]]
speaker = "煌嶺"
# 「あ、まだモンスターいるんだ。ひぃ、ふぅ、みぃ、よぉ……たくさんいるね！　それじゃ──」
line = "「あ、まだモンスターいるんだ。ひぃ、ふぅ、みぃ、よぉ……たくさんいるね！　それじゃ──」"

[[dialogue]]
speaker = "煌嶺"
# 「燃やすとするか」
line = "「燃やすとするか」"

[[dialogue]]
speaker = "煌嶺"
# 「機械型モンスターなど今更我が物にするまでもない。せいぜい鮮やかに散ってみせよ──千熾万紅！」
line = "「機械型モンスターなど今更我が物にするまでもない。せいぜい鮮やかに散ってみせよ──千熾万紅！」"

[[dialogue]]
speaker = "unk"
# 煌嶺が扇を振るうと、業火がモンスターの群れを呑み込み、あっという間に燃やし尽くした。
line = "煌嶺が扇を振るうと、業火がモンスターの群れを呑み込み、あっという間に燃やし尽くした。"

[[dialogue]]
speaker = "シルヴィ"
# 「ひょえー……あっさり倒しちゃった。さっすが煌嶺だ」
line = "「ひょえー……あっさり倒しちゃった。さっすが煌嶺だ」"

[[dialogue]]
speaker = "unk"
# 流星市国を守ってくれたのか……？
line = "流星市国を守ってくれたのか……？"

[[dialogue]]
speaker = "煌嶺"
# 「流星市国がどうなろうと妾の知ったことではない」
line = "「流星市国がどうなろうと妾の知ったことではない」"

[[dialogue]]
speaker = "煌嶺"
# 「だがここには妾が出資した店もあるのでな。投資を回収する前に潰れてもらっては損になるというだけのことよ」
line = "「だがここには妾が出資した店もあるのでな。投資を回収する前に潰れてもらっては損になるというだけのことよ」"

[[dialogue]]
speaker = "煌嶺"
# 「ここで会ったが百年目！　お小遣いちょうだい、おじいちゃん！」
line = "「ここで会ったが百年目！　お小遣いちょうだい、おじいちゃん！」"

[[dialogue]]
speaker = "unk"
# おじいちゃん！？
line = "おじいちゃん！？"

[[dialogue]]
speaker = "煌嶺"
# 「あはは、冗談冗談。３０００年前のご先祖様だからって、さすがにおじいちゃんとは思ってないよ」
line = "「あはは、冗談冗談。３０００年前のご先祖様だからって、さすがにおじいちゃんとは思ってないよ」"

[[dialogue]]
speaker = "煌嶺"
# 「シルヴィちゃんも久しぶり～♪」
line = "「シルヴィちゃんも久しぶり～♪」"

[[dialogue]]
speaker = "シルヴィ"
# 「うん、久しぶりー」
line = "「うん、久しぶりー」"

[[dialogue]]
speaker = "unk"
# あれ、２人ってけっこう仲がいい？
line = "あれ、２人ってけっこう仲がいい？"

[[dialogue]]
speaker = "シルヴィ"
# 「仲いいかはわかんないけど、一緒にフライドチキン食べに行ったことあるよ。たくさん奢ってもらっちゃった」
line = "「仲いいかはわかんないけど、一緒にフライドチキン食べに行ったことあるよ。たくさん奢ってもらっちゃった」"

[[dialogue]]
speaker = "煌嶺"
# 「あの時の食べっぷりはすごかったね～」
line = "「あの時の食べっぷりはすごかったね～」"

[[dialogue]]
speaker = "シルヴィ"
# 「でもお店とかポンポン買っちゃって、お金大丈夫なの？」
line = "「でもお店とかポンポン買っちゃって、お金大丈夫なの？」"

[[dialogue]]
speaker = "煌嶺"
# 「だいじょーぶだいじょーぶ。私は頽廃都市キュリオスの女帝だよ？　ケチケチせすに、お金はばーんと稼いで、どーんと使わなきゃ！」
line = "「だいじょーぶだいじょーぶ。私は頽廃都市キュリオスの女帝だよ？　ケチケチせすに、お金はばーんと稼いで、どーんと使わなきゃ！」"

[[dialogue]]
speaker = "煌嶺"
# 「欲しいものは手に入れるのが私の流儀だもんね！」
line = "「欲しいものは手に入れるのが私の流儀だもんね！」"

[[dialogue]]
speaker = "煌嶺"
# 「ま、心配しなくても平気だよ。キュリオスは賭場でけっこう儲けてるし」
line = "「ま、心配しなくても平気だよ。キュリオスは賭場でけっこう儲けてるし」"

[[dialogue]]
speaker = "煌嶺"
# 「あとお宝を売ったりとか。世界に１つしかないような珍しいお宝もいろいろ持ってるけど、いらなかったら処分しちゃうしね」
line = "「あとお宝を売ったりとか。世界に１つしかないような珍しいお宝もいろいろ持ってるけど、いらなかったら処分しちゃうしね」"

[[dialogue]]
speaker = "シルヴィ"
# 「ほえ～……煌嶺ってほんとにお金持ちなんだ」
line = "「ほえ～……煌嶺ってほんとにお金持ちなんだ」"

[[dialogue]]
speaker = "煌嶺"
# 「……おや、魔王さん。その顔は、他にも気になることがあるって顔だね」
line = "「……おや、魔王さん。その顔は、他にも気になることがあるって顔だね」"

[[dialogue]]
speaker = "unk"
# 俺やフィオナ、アポロがそうであったように、魔王の血に秘められた魔王因子は、血縁の者に助けを求められた時に真に覚醒する。
line = "俺やフィオナ、アポロがそうであったように、魔王の血に秘められた魔王因子は、血縁の者に助けを求められた時に真に覚醒する。"

[[dialogue]]
speaker = "unk"
# 先ほどのような圧倒的な力を持つ煌嶺であれば、魔王への覚醒を果たしているはずだが……
line = "先ほどのような圧倒的な力を持つ煌嶺であれば、魔王への覚醒を果たしているはずだが……"

[[dialogue]]
speaker = "煌嶺"
# 「へー、魔王因子ってそういう仕組みなんだ。じゃああの時かな？」
line = "「へー、魔王因子ってそういう仕組みなんだ。じゃああの時かな？」"

[[dialogue]]
speaker = "シルヴィ"
# 「あの時？」
line = "「あの時？」"

[[dialogue]]
speaker = "煌嶺"
# 「うちのしきたりでね。『煌嶺』の名前を襲名する時に、母──先代の煌嶺を殺すんだ」
line = "「うちのしきたりでね。『煌嶺』の名前を襲名する時に、母──先代の煌嶺を殺すんだ」"

[[dialogue]]
speaker = "unk"
# え……！？
line = "え……！？"

[[dialogue]]
speaker = "煌嶺"
# 「次代の『煌嶺』は名前を付けられず、親から離して育てられるんだ」
line = "「次代の『煌嶺』は名前を付けられず、親から離して育てられるんだ」"

[[dialogue]]
speaker = "煌嶺"
# 「その子は名無しのまま、この世に存在しないものとして幽閉されながら育てられる。やがて成長して、名前を……自分の存在を欲した時、親を殺して『煌嶺』になるの」
line = "「その子は名無しのまま、この世に存在しないものとして幽閉されながら育てられる。やがて成長して、名前を……自分の存在を欲した時、親を殺して『煌嶺』になるの」"

[[dialogue]]
speaker = "煌嶺"
# 「そして殺す前に、母親に命乞いさせるんだ。『命だけは助けて。許してください』って」
line = "「そして殺す前に、母親に命乞いさせるんだ。『命だけは助けて。許してください』って」"

[[dialogue]]
speaker = "煌嶺"
# 「もちろんお芝居じゃダメ。本気の本気で追い詰めて、心の底から命乞いさせて、ようやく『煌嶺』になれるってわけ」
line = "「もちろんお芝居じゃダメ。本気の本気で追い詰めて、心の底から命乞いさせて、ようやく『煌嶺』になれるってわけ」"

[[dialogue]]
speaker = "煌嶺"
# 「命乞いさせたら実際に殺さなくていいし、追放で済ませることもあるんだけど……だいたい殺されるね」
line = "「命乞いさせたら実際に殺さなくていいし、追放で済ませることもあるんだけど……だいたい殺されるね」"

[[dialogue]]
speaker = "煌嶺"
# 「私はどうしたっけな……ああ、寸でのところで逃げられたんだった。でも先代の煌嶺がキュリオスに戻ることはもうないよ」
line = "「私はどうしたっけな……ああ、寸でのところで逃げられたんだった。でも先代の煌嶺がキュリオスに戻ることはもうないよ」"

[[dialogue]]
speaker = "シルヴィ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "煌嶺"
# 「あはは、２人ともびっくりしてるー。やっぱり余所からしたらドン引きなんだね～」
line = "「あはは、２人ともびっくりしてるー。やっぱり余所からしたらドン引きなんだね～」"

[[dialogue]]
speaker = "シルヴィ"
# 「そりゃそうでしょ。そのしきたりヤバすぎだって」
line = "「そりゃそうでしょ。そのしきたりヤバすぎだって」"

[[dialogue]]
speaker = "煌嶺"
# 「ちなみに煌嶺の血筋は、女しか生まれない家系で、後継ぎが生まれないってことはないらしいよ」
line = "「ちなみに煌嶺の血筋は、女しか生まれない家系で、後継ぎが生まれないってことはないらしいよ」"

[[dialogue]]
speaker = "シルヴィ"
# 「お父さんはどうしたの？」
line = "「お父さんはどうしたの？」"

[[dialogue]]
speaker = "煌嶺"
# 「し～らないっ。少なくとも私は会ったことないなぁ。顔も知らないし」
line = "「し～らないっ。少なくとも私は会ったことないなぁ。顔も知らないし」"

[[dialogue]]
speaker = "煌嶺"
# 「どこに行ったかも興味ないし～……ま、運が良ければ、先代の煌嶺と一緒に逃げてるんじゃない？」
line = "「どこに行ったかも興味ないし～……ま、運が良ければ、先代の煌嶺と一緒に逃げてるんじゃない？」"

[[dialogue]]
speaker = "シルヴィ"
# 「お父さんもそんな感じか……ホントにハードだ……」
line = "「お父さんもそんな感じか……ホントにハードだ……」"

[[dialogue]]
speaker = "unk"
# 先代の煌嶺はどうして──
line = "先代の煌嶺はどうして──"

[[dialogue]]
speaker = "煌嶺"
# 「……ん？　自分の娘に女帝の座を追われることがわかっていて、どうして子どもを産むんだ──って？」
line = "「……ん？　自分の娘に女帝の座を追われることがわかっていて、どうして子どもを産むんだ──って？」"

[[dialogue]]
speaker = "煌嶺"
# 「ん～……言われてみたらどうしてだろうね？　ま、でも、代々継いでいくものって、そういうものじゃないの？」
line = "「ん～……言われてみたらどうしてだろうね？　ま、でも、代々継いでいくものって、そういうものじゃないの？」"

[[dialogue]]
speaker = "シルヴィ"
# 「うーん……そうかなぁ……？　あたし普通の家の生まれだからわかんないや」
line = "「うーん……そうかなぁ……？　あたし普通の家の生まれだからわかんないや」"

[[dialogue]]
speaker = "unk"
# 欲するもの全てを手中に収めんとする暴君・煌嶺。
line = "欲するもの全てを手中に収めんとする暴君・煌嶺。"

[[dialogue]]
speaker = "unk"
# だが彼女もいずれ皇帝の座を追われるのかもしれないと思うと、複雑な気持ちになるのだった。
line = "だが彼女もいずれ皇帝の座を追われるのかもしれないと思うと、複雑な気持ちになるのだった。"
