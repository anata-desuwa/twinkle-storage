[[dialogue]]
speaker = "リーナ"
# 「あ～、お兄ちゃん、遅いよー！」
line = "「あ～、お兄ちゃん、遅いよー！」"

[[dialogue]]
speaker = "unk"
# 待たせてごめん
line = "待たせてごめん"

[[dialogue]]
speaker = "リーナ"
# 「用事は終わったんだよね？　じゃあずっとリーナと一緒にいてくれるよね！」
line = "「用事は終わったんだよね？　じゃあずっとリーナと一緒にいてくれるよね！」"

[[dialogue]]
speaker = "リーナ"
# 「え～っ、また行かないといけないの～！？　お兄ちゃんのイジワル～！」
line = "「え～っ、また行かないといけないの～！？　お兄ちゃんのイジワル～！」"

[[dialogue]]
speaker = "unk"
# 俺が戦わないといけないんだ
line = "俺が戦わないといけないんだ"

[[dialogue]]
speaker = "リーナ"
# 「そう……なんだ」
line = "「そう……なんだ」"

[[dialogue]]
speaker = "リーナ"
# 「……うん、じゃあリーナ待ってるね。行ってらっしゃい。怪我しないで帰ってきてね」
line = "「……うん、じゃあリーナ待ってるね。行ってらっしゃい。怪我しないで帰ってきてね」"

[[dialogue]]
speaker = "リーナ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ヴァレリー"
# 「これが長き歴史を誇る流星学園。星騎士たちがここで日夜研鑽を積み重ねていると思うと、胸が弾みます」
line = "「これが長き歴史を誇る流星学園。星騎士たちがここで日夜研鑽を積み重ねていると思うと、胸が弾みます」"

[[dialogue]]
speaker = "ヴァレリー"
# 「校舎もまた美しい。神聖な空気を感じずにはいられません。できれば明るいうちに来たかったのですが、そこは仕方ありませんね」
line = "「校舎もまた美しい。神聖な空気を感じずにはいられません。できれば明るいうちに来たかったのですが、そこは仕方ありませんね」"

[[dialogue]]
speaker = "ヴァレリー"
# 「そして奥にそびえるのがフィーニスの塔……本当に頂上が見えませんね。噂に違わぬ無窮の塔というわけですか」
line = "「そして奥にそびえるのがフィーニスの塔……本当に頂上が見えませんね。噂に違わぬ無窮の塔というわけですか」"

[[dialogue]]
speaker = "シアン"
# 「よう、待ってたぜ」
line = "「よう、待ってたぜ」"

[[dialogue]]
speaker = "ヴァレリー"
# 「おや。学生はもう帰る時間だと思っていたのですが」
line = "「おや。学生はもう帰る時間だと思っていたのですが」"

[[dialogue]]
speaker = "シアン"
# 「流星学園の校舎は、名のある建築家が設計したそうで、その手のマニアにはけっこう価値があるらしいぜ」
line = "「流星学園の校舎は、名のある建築家が設計したそうで、その手のマニアにはけっこう価値があるらしいぜ」"

[[dialogue]]
speaker = "シアン"
# 「それにあんた、星騎士のファンなんだろ？　ここに来たくて来たくてたまらなかったんじゃないのか」
line = "「それにあんた、星騎士のファンなんだろ？　ここに来たくて来たくてたまらなかったんじゃないのか」"

[[dialogue]]
speaker = "シアン"
# 「敵にファンだの憧れているだの言ってのける図太さだ。本陣にひょっこり現れてもおかしくねえと思ってな」
line = "「敵にファンだの憧れているだの言ってのける図太さだ。本陣にひょっこり現れてもおかしくねえと思ってな」"

[[dialogue]]
speaker = "ヴァレリー"
# 「図太いも何も、本当のことなのですがね。そこは信じていただきたいのですが残念です」
line = "「図太いも何も、本当のことなのですがね。そこは信じていただきたいのですが残念です」"

[[dialogue]]
speaker = "ヴァレリー"
# 「しかし待ち伏せされていた以上、ここは退くしかありませんね。いくら私でも、この状況で押し通るほど図太くはありませんから」
line = "「しかし待ち伏せされていた以上、ここは退くしかありませんね。いくら私でも、この状況で押し通るほど図太くはありませんから」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「トラップ設置済みだよ♪　コラプサーでもそう簡単に逃がさないから♪」
line = "「トラップ設置済みだよ♪　コラプサーでもそう簡単に逃がさないから♪」"

[[dialogue]]
speaker = "せつな"
# 「逃がさないでござる！」
line = "「逃がさないでござる！」"

[[dialogue]]
speaker = "セナリィ"
# 「カモがネギをしょってやってきましたわ！」
line = "「カモがネギをしょってやってきましたわ！」"

[[dialogue]]
speaker = "ヴァレリー"
# 「ふむ、これは困りました。背後を塞がれましたね」
line = "「ふむ、これは困りました。背後を塞がれましたね」"

[[dialogue]]
speaker = "unk"
# もちろんオレもいる
line = "もちろんオレもいる"

[[dialogue]]
speaker = "ヴァレリー"
# 「後ろは公安委員会。正面に星徒会長。状況は悪くなる一方……」
line = "「後ろは公安委員会。正面に星徒会長。状況は悪くなる一方……」"

[[dialogue]]
speaker = "ヴァレリー"
# 「それと星徒会長の隣のあなた──そういえばお名前を聞いていませんでした。よければお聞かせいただいても？」
line = "「それと星徒会長の隣のあなた──そういえばお名前を聞いていませんでした。よければお聞かせいただいても？」"

[[dialogue]]
speaker = "シアン"
# 「あぁん？　ならず者の変態に名乗る名前なんかねぇよ。てめえこそお縄について洗いざらい吐きやがれ」
line = "「あぁん？　ならず者の変態に名乗る名前なんかねぇよ。てめえこそお縄について洗いざらい吐きやがれ」"

[[dialogue]]
speaker = "ヴァレリー"
# 「フフフ、つれない人ですね」
line = "「フフフ、つれない人ですね」"

[[dialogue]]
speaker = "ヴァレリー"
# 「しかしこの窮地も、５人もの星騎士を独り占めできるとなれば贅沢というもの。せいぜい足掻かせていただきましょうか」
line = "「しかしこの窮地も、５人もの星騎士を独り占めできるとなれば贅沢というもの。せいぜい足掻かせていただきましょうか」"

[[dialogue]]
speaker = "ヴァレリー"
# 「さぁ……美しき星の輝き、私に見せてください……！」
line = "「さぁ……美しき星の輝き、私に見せてください……！」"

[[dialogue]]
speaker = "ヴァレリー"
# 「はぁ、はぁ……いい……いいですよ……！　麗しき星騎士たちが苦痛に顔を歪める姿……たまらない……！」
line = "「はぁ、はぁ……いい……いいですよ……！　麗しき星騎士たちが苦痛に顔を歪める姿……たまらない……！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「はぁ……こっちも散々痛めつけてるんですけどー……」
line = "「はぁ……こっちも散々痛めつけてるんですけどー……」"

[[dialogue]]
speaker = "unk"
# こいつ、キサナより打たれ強い……！
line = "こいつ、キサナより打たれ強い……！"

[[dialogue]]
speaker = "セナリィ"
# 「マジでしぶといですわ！？　どれだけ撃ち込まれれば気が済むんですの！？」
line = "「マジでしぶといですわ！？　どれだけ撃ち込まれれば気が済むんですの！？」"

[[dialogue]]
speaker = "ヴァレリー"
# 「楽しい……もっと、もっと……壊れるまで、傷つけあいましょう……！」
line = "「楽しい……もっと、もっと……壊れるまで、傷つけあいましょう……！」"

[[dialogue]]
speaker = "せつな"
# 「さらに気持ち悪くなってきたでござる！？」
line = "「さらに気持ち悪くなってきたでござる！？」"

[[dialogue]]
speaker = "シアン"
# 「押し切れねえが、間もなく援軍が来る。このままならあたしらの勝ちだ！」
line = "「押し切れねえが、間もなく援軍が来る。このままならあたしらの勝ちだ！」"

[[dialogue]]
speaker = "ヴァレリー"
# 「おやおや、私はもっと楽しみたいというのに。やはりつれない方ですね」
line = "「おやおや、私はもっと楽しみたいというのに。やはりつれない方ですね」"

[[dialogue]]
speaker = "ヴァレリー"
# 「では強行突破といきましょう。サヴェージ──」
line = "「では強行突破といきましょう。サヴェージ──」"

[[dialogue]]
speaker = "セナリィ"
# 「一か八か──《<ruby=バンデット>強奪</ruby>》！」
line = "「一か八か──《<ruby>強奪<rt>バンデット</rt></ruby>》！」"

[[dialogue]]
speaker = "ヴァレリー"
# 「！？　『強奪の星眼』──！？」
line = "「！？　『強奪の星眼』──！？」"

[[dialogue]]
speaker = "セナリィ"
# 「星眼が通じましたわ！？　ですが今は迷っている時ではありません！　《<ruby=リリース>解放</ruby>》──！」
line = "「星眼が通じましたわ！？　ですが今は迷っている時ではありません！　《<ruby>解放<rt>リリース</rt></ruby>》──！」"

[[dialogue]]
speaker = "ヴァレリー"
# 「くぁああああああっ！？」
line = "「くぁああああああっ！？」"

[[dialogue]]
speaker = "ヴァレリー"
# 「ハハハ……さすがに無茶が過ぎましたか。星騎士の天敵、コラプサーとはいえこの戦力は覆せませんね……」
line = "「ハハハ……さすがに無茶が過ぎましたか。星騎士の天敵、コラプサーとはいえこの戦力は覆せませんね……」"

[[dialogue]]
speaker = "ヴァレリー"
# 「──なんて」
line = "「──なんて」"

[[dialogue]]
speaker = "シアン"
# 「あいつの傷が、ふさがっていく……！？」
line = "「あいつの傷が、ふさがっていく……！？」"

[[dialogue]]
speaker = "ヴァレリー"
# 「ハハハッ、ハハハハハッ！！」
line = "「ハハハッ、ハハハハハッ！！」"

[[dialogue]]
speaker = "ヴァレリー"
# 「キサナは貫き穿つことに特化していましたが、私の力の真髄は癒しにある。あなた方から吸収した星力、ありがたく使わせていただきましたよ」
line = "「キサナは貫き穿つことに特化していましたが、私の力の真髄は癒しにある。あなた方から吸収した星力、ありがたく使わせていただきましたよ」"

[[dialogue]]
speaker = "ヴァレリー"
# 「バンデット・セナリィ。あなたもご存じの通り、強奪の星眼には弱点がある。ひとつは、相手の星術を１つしか奪えないこと。そして……」
line = "「バンデット・セナリィ。あなたもご存じの通り、強奪の星眼には弱点がある。ひとつは、相手の星術を１つしか奪えないこと。そして……」"

[[dialogue]]
speaker = "セナリィ"
# 「一度使うと再使用まで時間がかかること、ですわね。つまり“囮”を使われれば不発となる。だから見極めが肝心なのですわ」
line = "「一度使うと再使用まで時間がかかること、ですわね。つまり“囮”を使われれば不発となる。だから見極めが肝心なのですわ」"

[[dialogue]]
speaker = "ヴァレリー"
# 「その通りです。切り札を最後まで取っておいて正解でした」
line = "「その通りです。切り札を最後まで取っておいて正解でした」"

[[dialogue]]
speaker = "ヴァレリー"
# 「今の私の力は万全以上。さぁ──精魂尽き果てるまで、存分に死合いましょうか──！」
line = "「今の私の力は万全以上。さぁ──精魂尽き果てるまで、存分に死合いましょうか──！」"

[[dialogue]]
speaker = "リーナ"
# 「お兄ちゃんを傷つける人は許さないんだから！」
line = "「お兄ちゃんを傷つける人は許さないんだから！」"

[[dialogue]]
speaker = "ヴァレリー"
# 「リーナ……！？」
line = "「リーナ……！？」"
