line = "「モンスター、アステライト。これらは世界のエラーなんだ。それをごちゃ混ぜにして本来あるべき世界へ創り変える」"

[[dialogue]]
speaker = "アポロ"
# 「これは正しいことだ」
line = "「これは正しいことだ」"

[[dialogue]]
speaker = "アポロ"
