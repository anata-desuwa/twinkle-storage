[[dialogue]]
speaker = "unk"
# 使徒──という言葉の意味を深く理解した。
line = "使徒──という言葉の意味を深く理解した。"

[[dialogue]]
speaker = "アポロ"
# 「リクリエはすべて……パーフェクト・ワールドへ至るための研磨なんだ。本来、これまでみたいに、もっとたくさん積み重ねなきゃいけない」
line = "「リクリエはすべて……パーフェクト・ワールドへ至るための研磨なんだ。本来、これまでみたいに、もっとたくさん積み重ねなきゃいけない」"

[[dialogue]]
speaker = "アポロ"
# 「なのに、その研磨は長いこと停滞している。ある致命的な弊害のせいで」
line = "「なのに、その研磨は長いこと停滞している。ある致命的な弊害のせいで」"

[[dialogue]]
speaker = "アポロ"
# 「わかるか？」
line = "「わかるか？」"

[[dialogue]]
speaker = "クロト"
# 「致命的な、弊害……？」
line = "「致命的な、弊害……？」"

[[dialogue]]
speaker = "アポロ"
# 「オマエだ。魔王──いや、緋宮クロト」
line = "「オマエだ。魔王──いや、緋宮クロト」"

[[dialogue]]
speaker = "unk"
# アポロは、俺を指さした。
line = "アポロは、俺を指さした。"

[[dialogue]]
speaker = "アポロ"
# 「デネブ──アルタイル──ベガ──三つに分裂した宇宙そのもの。土台が分裂するなんて、あっていいはずがない大エラーだ」
line = "「デネブ──アルタイル──ベガ──三つに分裂した宇宙そのもの。土台が分裂するなんて、あっていいはずがない大エラーだ」"

[[dialogue]]
speaker = "アポロ"
# 「これらを再び単一の宇宙へと束ねない限り、パーフェクト・ワールドには至れない。そのためにあたしはやってきた」
line = "「これらを再び単一の宇宙へと束ねない限り、パーフェクト・ワールドには至れない。そのためにあたしはやってきた」"

[[dialogue]]
speaker = "クロト"
# 「だから……君の宿命のライバルは、俺ってわけか」
line = "「だから……君の宿命のライバルは、俺ってわけか」"

[[dialogue]]
speaker = "unk"
# 分かたれた三世界を束ねて創り直す。何度も何度も創り直す。
line = "分かたれた三世界を束ねて創り直す。何度も何度も創り直す。"

[[dialogue]]
speaker = "unk"
# その先に築かれるのがパーフェクト・ワールド──
line = "その先に築かれるのがパーフェクト・ワールド──"

[[dialogue]]
speaker = "アポロ"
# 「リクリエは……本当なら、抗えないはずなんだ。もうとっくに成功してたはずなんだ。デネブも、ベガも、抗えなかった」
line = "「リクリエは……本当なら、抗えないはずなんだ。もうとっくに成功してたはずなんだ。デネブも、ベガも、抗えなかった」"

[[dialogue]]
speaker = "アポロ"
# 「なのにこの世界──アルタイルだけが、しぶとく今まで生き残ってる」
line = "「なのにこの世界──アルタイルだけが、しぶとく今まで生き残ってる」"

[[dialogue]]
speaker = "アポロ"
# 「あたしは使徒として……世界を元に戻さなきゃならない……！」
line = "「あたしは使徒として……世界を元に戻さなきゃならない……！」"

[[dialogue]]
speaker = "unk"
# それが恐らく──アポロに課せられた使徒としての真の使命。
line = "それが恐らく──アポロに課せられた使徒としての真の使命。"

[[dialogue]]
speaker = "unk"
# 彼女は、アルタイルの使徒なんだ。
line = "彼女は、アルタイルの使徒なんだ。"

[[dialogue]]
speaker = "アナ"
# 「アポロにとっては失敗。ですが……」
line = "「アポロにとっては失敗。ですが……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「逆に言えば──アルタイルがあるおかげで、今の宇宙は無事、ってことよね」
line = "「逆に言えば──アルタイルがあるおかげで、今の宇宙は無事、ってことよね」"

[[dialogue]]
speaker = "クロト"
# 「ああ。俺たちが……生き残った最後の世界線なんだ」
line = "「ああ。俺たちが……生き残った最後の世界線なんだ」"

[[dialogue]]
speaker = "unk"
# デネブとベガ──２つの可能性はすでに潰され、恐らくはもう滅んでしまっている。
line = "デネブとベガ──２つの可能性はすでに潰され、恐らくはもう滅んでしまっている。"

[[dialogue]]
speaker = "アポロ"
# 「だから、魔王──オマエだけはあたしが倒す！」
line = "「だから、魔王──オマエだけはあたしが倒す！」"

[[dialogue]]
speaker = "クロト"
# 「ああ……俺を敵視するのは理解したよ」
line = "「ああ……俺を敵視するのは理解したよ」"

[[dialogue]]
speaker = "クロト"
# 「でも、その論理で──フィオナにも牙を剥けるのか？」
line = "「でも、その論理で──フィオナにも牙を剥けるのか？」"

[[dialogue]]
speaker = "アポロ"
# 「っ……！」
line = "「っ……！」"

[[dialogue]]
speaker = "unk"
# 俺の言葉に、一瞬だけだが、アポロが躊躇うような逡巡の息を漏らすのが見えた。
line = "俺の言葉に、一瞬だけだが、アポロが躊躇うような逡巡の息を漏らすのが見えた。"
