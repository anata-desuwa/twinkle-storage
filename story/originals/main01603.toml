line = "「そうです──リクリエの使徒。あなたが目指す先には、何が見えているというのです！？」"

[[dialogue]]
speaker = "unk"
# 俺たちの純粋な疑問。それに対して、アポロは……
line = "俺たちの純粋な疑問。それに対して、アポロは……"

[[dialogue]]
speaker = "アポロ"
# 「──パーフェクト・ワールド」
line = "「──パーフェクト・ワールド」"

[[dialogue]]
speaker = "マトイ"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "クロト"
# 「パーフェクト・ワールド……？」
line = "「パーフェクト・ワールド……？」"

[[dialogue]]
speaker = "アポロ"
# 「そうだ。幾度となく再創生を繰り返した先に至る、完全で無欠な宇宙空間」
line = "「そうだ。幾度となく再創生を繰り返した先に至る、完全で無欠な宇宙空間」"

