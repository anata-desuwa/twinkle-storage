line = "「私たちの世界は──未完成なんかじゃないわ！」"

[[dialogue]]
speaker = "クロト"
# 「そうだ。エラーがあるなら潰せばいい。何も土台ごと作り直す必要はない」
line = "「そうだ。エラーがあるなら潰せばいい。何も土台ごと作り直す必要はない」"

[[dialogue]]
speaker = "クロト"
# 「そうして再創生を繰り返して……その先に何があるっていうんだ。俺には、キリのない発展の螺旋を辿るだけにしか思えない」
line = "「そうして再創生を繰り返して……その先に何があるっていうんだ。俺には、キリのない発展の螺旋を辿るだけにしか思えない」"

[[dialogue]]
speaker = "アポロ"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "アナ"
