[[dialogue]]
speaker = "unk"
# 第６話,謎めく塞ぎ手,B
line = "第６話,謎めく塞ぎ手,B"

[[dialogue]]
speaker = "フィオナ"
# 「ッ、これは……」
line = "「ッ、これは……」"

[[dialogue]]
speaker = "クロト"
# 「凄まじい冷気──さすがにユウリ抜きだと、堪えるな……！」
line = "「凄まじい冷気──さすがにユウリ抜きだと、堪えるな……！」"

[[dialogue]]
speaker = "ニャリオン"
# 「ふ、震えるニャアン……！？」
line = "「ふ、震えるニャアン……！？」"

[[dialogue]]
speaker = "unk"
# 街を出てすぐの原野はすでに大半が凍てついていた。即死級の猛吹雪が一帯を覆い尽くしている。
line = "街を出てすぐの原野はすでに大半が凍てついていた。即死級の猛吹雪が一帯を覆い尽くしている。"

[[dialogue]]
speaker = "狼型の魔獣"
# 『ガルル……グラアアアアアアアッ！！』
line = "『ガルル……グラアアアアアアアッ！！』"

[[dialogue]]
speaker = "サーシャ"
# 「見かけない魔獣もひっきりなしに湧いているわ──街へ向かっているみたい」
line = "「見かけない魔獣もひっきりなしに湧いているわ──街へ向かっているみたい」"

[[dialogue]]
speaker = "クロト"
# 「ラティエさん達に任せていれば大丈夫なはずです。進行を阻む個体のみ掃討していきましょう」
line = "「ラティエさん達に任せていれば大丈夫なはずです。進行を阻む個体のみ掃討していきましょう」"

[[dialogue]]
speaker = "マトイ"
# 「りょーかい──！」
line = "「りょーかい──！」"

[[dialogue]]
speaker = "unk"
# そうして俺たちは全速力で原野を駆け抜けた。
line = "そうして俺たちは全速力で原野を駆け抜けた。"

[[dialogue]]
speaker = "unk"
# <ruby=しれつ>熾烈</ruby>な向かい風に身を凍えさせられながらも、闘志を燃やしながら突き進む──
line = "<ruby>熾烈<rt>しれつ</rt></ruby>な向かい風に身を凍えさせられながらも、闘志を燃やしながら突き進む──"

[[dialogue]]
speaker = "ニャリオン"
# 「ふぅ、ふぅ──ネメシスまではまだなのニャン！？　もう体が限界ニャン──！」
line = "「ふぅ、ふぅ──ネメシスまではまだなのニャン！？　もう体が限界ニャン──！」"

[[dialogue]]
speaker = "マトイ"
# 「た、確かに……耐氷の装衣があっても、眠くなってきたような……」
line = "「た、確かに……耐氷の装衣があっても、眠くなってきたような……」"

[[dialogue]]
speaker = "クロト"
# 「気をしっかり持て、マトイ。気絶したら一巻の終わりだ」
line = "「気をしっかり持て、マトイ。気絶したら一巻の終わりだ」"

[[dialogue]]
speaker = "サーシャ"
# 「あと少しよ──ここを真っ直ぐに行けば、ネメシス盆地のあった場所へ着くはずだわ！」
line = "「あと少しよ──ここを真っ直ぐに行けば、ネメシス盆地のあった場所へ着くはずだわ！」"

[[dialogue]]
speaker = "unk"
# とうに人間界なら小国を渡るくらいの距離は飛行してきた。
line = "とうに人間界なら小国を渡るくらいの距離は飛行してきた。"

[[dialogue]]
speaker = "unk"
# ここにきてようやく、目的地への兆しが見えてくる──だが。
line = "ここにきてようやく、目的地への兆しが見えてくる──だが。"

[[dialogue]]
speaker = "サーシャ"
# 「──っ！？」
line = "「──っ！？」"

[[dialogue]]
speaker = "フィオナ"
# 「新手ですか──」
line = "「新手ですか──」"

[[dialogue]]
speaker = "クロト"
# 「いや──今の攻撃は──」
line = "「いや──今の攻撃は──」"

[[dialogue]]
speaker = "環？"
# 「や～、今のを防いじゃうかー。さすが星徒会、なかなかやるね！」
line = "「や～、今のを防いじゃうかー。さすが星徒会、なかなかやるね！」"

[[dialogue]]
speaker = "マトイ"
# 「い……市倉さん！？」
line = "「い……市倉さん！？」"

[[dialogue]]
speaker = "クロト"
# 「たま──き……？」
line = "「たま──き……？」"

[[dialogue]]
speaker = "unk"
# 俺たちを待ち伏せした人物──
line = "俺たちを待ち伏せした人物──"

[[dialogue]]
speaker = "unk"
# それは、俺のよく知る友人、環その人だった。
line = "それは、俺のよく知る友人、環その人だった。"

[[dialogue]]
speaker = "環？"
# 「うんうん。そんなに驚いてくれると、寒さに耐えてた甲斐もあるってもんかな」
line = "「うんうん。そんなに驚いてくれると、寒さに耐えてた甲斐もあるってもんかな」"

[[dialogue]]
speaker = "クロト"
# 「蜃気楼──なんかじゃ、なさそうだな。ここは魔界だぞ」
line = "「蜃気楼──なんかじゃ、なさそうだな。ここは魔界だぞ」"

[[dialogue]]
speaker = "環？"
# 「知ってるよ。めちゃくちゃ割のいいバイトがあるって聞いて飛んできちゃった♪」
line = "「知ってるよ。めちゃくちゃ割のいいバイトがあるって聞いて飛んできちゃった♪」"

[[dialogue]]
speaker = "環？"
# 「──なんて、さすがに無理があるか。あははっ」
line = "「──なんて、さすがに無理があるか。あははっ」"

[[dialogue]]
speaker = "サーシャ"
# （あの子は確か、うちの学園の……）
line = "（あの子は確か、うちの学園の……）"

[[dialogue]]
speaker = "unk"
# 環は俺が新星学園に転入する前、一緒に働いていたバイト仲間だった。
line = "環は俺が新星学園に転入する前、一緒に働いていたバイト仲間だった。"

[[dialogue]]
speaker = "unk"
# 何者かが成りすましているのかとさえ思ったが──言葉を交わしてみても、怪しい雰囲気はない。
line = "何者かが成りすましているのかとさえ思ったが──言葉を交わしてみても、怪しい雰囲気はない。"

[[dialogue]]
speaker = "マトイ"
# 「どうして市倉さんがここにいるの……？　もしかして援軍……？　でも、さっきの攻撃は……？」
line = "「どうして市倉さんがここにいるの……？　もしかして援軍……？　でも、さっきの攻撃は……？」"

[[dialogue]]
speaker = "環？"
# 「ふふふ。さーて、なんででしょう？」
line = "「ふふふ。さーて、なんででしょう？」"

[[dialogue]]
speaker = "クロト"
# 「なぜおまえがここにいるのか──聞きたいところだが今はいい。俺たちは急いでいる。通してくれ」
line = "「なぜおまえがここにいるのか──聞きたいところだが今はいい。俺たちは急いでいる。通してくれ」"

[[dialogue]]
speaker = "環？"
# 「それはできない相談なんだよねえ。これだけの猛吹雪なんだしさ、家で暖かくしてた方がよほどラクだと思わない？」
line = "「それはできない相談なんだよねえ。これだけの猛吹雪なんだしさ、家で暖かくしてた方がよほどラクだと思わない？」"

[[dialogue]]
speaker = "unk"
# 友人との再会を喜べない理由は環の態度にあった。
line = "友人との再会を喜べない理由は環の態度にあった。"

[[dialogue]]
speaker = "unk"
# 彼女は明らかに……俺たちの進行を阻むようにして、立ちはだかっている。
line = "彼女は明らかに……俺たちの進行を阻むようにして、立ちはだかっている。"

[[dialogue]]
speaker = "クロト"
# 「なぜ俺たちを阻む？」
line = "「なぜ俺たちを阻む？」"

[[dialogue]]
speaker = "環？"
# 「キミに進んでもらっちゃ困るんだよ。それだけさ」
line = "「キミに進んでもらっちゃ困るんだよ。それだけさ」"

[[dialogue]]
speaker = "環？"
# 「この先には『彼』が待ってるからね」
line = "「この先には『彼』が待ってるからね」"

[[dialogue]]
speaker = "クロト"
# 「！」
line = "「！」"

[[dialogue]]
speaker = "サーシャ"
# 「黒騎士──知っているのね……？」
line = "「黒騎士──知っているのね……？」"

[[dialogue]]
speaker = "環？"
# 「うん。そしてキミたちじゃ……『彼』に勝てない。だから無駄死にさせるわけにはいかない」
line = "「うん。そしてキミたちじゃ……『彼』に勝てない。だから無駄死にさせるわけにはいかない」"

[[dialogue]]
speaker = "環？"
# 「クロト。もしキミまで彼の手に堕ちてしまえば……この世界はどうしようもなくなるからね」
line = "「クロト。もしキミまで彼の手に堕ちてしまえば……この世界はどうしようもなくなるからね」"

[[dialogue]]
speaker = "環？"
# 「リクリエから世界を守るのにクロトの力は不可欠だ──こんなところで、その戦力を欠かすわけにはいかないのさ」
line = "「リクリエから世界を守るのにクロトの力は不可欠だ──こんなところで、その戦力を欠かすわけにはいかないのさ」"

[[dialogue]]
speaker = "クロト"
# 「……俺をそこまで評価してくれてるのはありがたいが」
line = "「……俺をそこまで評価してくれてるのはありがたいが」"

[[dialogue]]
speaker = "クロト"
# 「なら、なぜ──黒騎士には勝てないっていうんだ？」
line = "「なら、なぜ──黒騎士には勝てないっていうんだ？」"

[[dialogue]]
speaker = "環？"
# 「あれはキミにとって、越えられない壁だからさ」
line = "「あれはキミにとって、越えられない壁だからさ」"

[[dialogue]]
speaker = "クロト"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "環？"
# 「キミもあの『手』を見たはずだ。道を踏み外して、闇に堕ちたくはないだろう？」
line = "「キミもあの『手』を見たはずだ。道を踏み外して、闇に堕ちたくはないだろう？」"

[[dialogue]]
speaker = "マトイ"
# 「手──って、もしかして……」
line = "「手──って、もしかして……」"

[[dialogue]]
speaker = "unk"
# かつて、アポロを救うようにさらっていった巨大な手──
line = "かつて、アポロを救うようにさらっていった巨大な手──"

[[dialogue]]
speaker = "unk"
# 俺が失敗しようものなら、アレが……死神よろしく迎えに来るとでも言うのだろうか。
line = "俺が失敗しようものなら、アレが……死神よろしく迎えに来るとでも言うのだろうか。"

[[dialogue]]
speaker = "環？"
# 「ボクだってクロトのことは大事な友達だと思ってるんだよ？　だから死んでほしくない。至って普通の感情さ」
line = "「ボクだってクロトのことは大事な友達だと思ってるんだよ？　だから死んでほしくない。至って普通の感情さ」"

[[dialogue]]
speaker = "フィオナ"
# 「あなたのお気持ちは理解しました。しかし、こちらにも譲れぬ事情があります」
line = "「あなたのお気持ちは理解しました。しかし、こちらにも譲れぬ事情があります」"

[[dialogue]]
speaker = "マトイ"
# 「そ……そうだよ市倉さん！　私たちだって、ヴィーナスっていう大事な仲間のために──」
line = "「そ……そうだよ市倉さん！　私たちだって、ヴィーナスっていう大事な仲間のために──」"

[[dialogue]]
speaker = "環？"
# 「知ってる。ま、ボクも不本意だけど仕方がない。彼女は元々──<b>この世界にいるはずのない</b>異物なんだから」
line = "「知ってる。ま、ボクも不本意だけど仕方がない。彼女は元々──<b>この世界にいるはずのない</b>異物なんだから」"

[[dialogue]]
speaker = "環？"
# 「そんな彼女に引っ張られてキミを失えば……このアルタイルまで不可逆な破滅へ向かうことになる。ボクという存在はそれを認められない」
line = "「そんな彼女に引っ張られてキミを失えば……このアルタイルまで不可逆な破滅へ向かうことになる。ボクという存在はそれを認められない」"

[[dialogue]]
speaker = "マトイ"
# 「またアルタイル──それに異物って……？　市倉さん、何を言ってるの……？」
line = "「またアルタイル──それに異物って……？　市倉さん、何を言ってるの……？」"

[[dialogue]]
speaker = "クロト"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# 環の言っていることを、俺たちは十分に理解できない。
line = "環の言っていることを、俺たちは十分に理解できない。"

[[dialogue]]
speaker = "unk"
# ひとつだけわかるのは──どうやら環は──俺と黒騎士が戦うことを良しとしない、らしい。
line = "ひとつだけわかるのは──どうやら環は──俺と黒騎士が戦うことを良しとしない、らしい。"

[[dialogue]]
speaker = "クロト"
# 「ご忠告──そして友人としての心配には感謝する。だが、仲間のためにもここは退けない」
line = "「ご忠告──そして友人としての心配には感謝する。だが、仲間のためにもここは退けない」"

[[dialogue]]
speaker = "環？"
# 「……あーあ。ま、だよねえ。キミの性格ならそう言うってわかってたのにさ」
line = "「……あーあ。ま、だよねえ。キミの性格ならそう言うってわかってたのにさ」"

[[dialogue]]
speaker = "環？"
# 「でもボクにも事情があるからね。譲れないんだ」
line = "「でもボクにも事情があるからね。譲れないんだ」"

[[dialogue]]
speaker = "マトイ"
# 「……私たち全員と戦う気？」
line = "「……私たち全員と戦う気？」"

[[dialogue]]
speaker = "環？"
# 「確かに、ボクの星力ではキミたちに遠く及ばない」
line = "「確かに、ボクの星力ではキミたちに遠く及ばない」"

[[dialogue]]
speaker = "環？"
# 「でもキミたちは知っているはずだよ？　星力でも魔力でもない力を使う──大いなる存在を」
line = "「でもキミたちは知っているはずだよ？　星力でも魔力でもない力を使う──大いなる存在を」"

[[dialogue]]
speaker = "クロト"
# 「大いなる存在って、まさか──！？」
line = "「大いなる存在って、まさか──！？」"

[[dialogue]]
speaker = "フィオナ"
# 「守護天使……！」
line = "「守護天使……！」"

[[dialogue]]
speaker = "サーシャ"
# 「堕天使──ってわけでも、なさそうね……！」
line = "「堕天使──ってわけでも、なさそうね……！」"

[[dialogue]]
speaker = "クロト"
# 「……なるほどな。環──おまえは最初から、マグダレナさん達と同じ存在だったわけだ」
line = "「……なるほどな。環──おまえは最初から、マグダレナさん達と同じ存在だったわけだ」"

[[dialogue]]
speaker = "環？"
# 「まぁそういうこと。考えてもみてよ。どうしてボクがキミと一緒にバイトしていたのか」
line = "「まぁそういうこと。考えてもみてよ。どうしてボクがキミと一緒にバイトしていたのか」"

[[dialogue]]
speaker = "環？"
# 「ずっとキミを監視してたんだよ。──<ruby=ひのみや>緋宮</ruby>クロト」
line = "「ずっとキミを監視してたんだよ。──<ruby>緋宮<rt>ひのみや</rt></ruby>クロト」"

[[dialogue]]
speaker = "クロト"
# 「──！」
line = "「──！」"

[[dialogue]]
speaker = "ラクシャ"
# 「守護天使が<ruby=いっちゅう>一柱</ruby>・《円環》のラクシャ──一身上の都合により、友人の邪魔をさせてもらうよ」
line = "「守護天使が<ruby>一柱<rt>いっちゅう</rt></ruby>・《円環》のラクシャ──一身上の都合により、友人の邪魔をさせてもらうよ」"

[[dialogue]]
speaker = "マトイ"
# 「市倉さん──じょ、冗談……だよね……？」
line = "「市倉さん──じょ、冗談……だよね……？」"

[[dialogue]]
speaker = "クロト"
# 「そういうわけでもなさそうだ。伊達に長い付き合いじゃない」
line = "「そういうわけでもなさそうだ。伊達に長い付き合いじゃない」"

[[dialogue]]
speaker = "unk"
# 堕天しているわけでもない。
line = "堕天しているわけでもない。"

[[dialogue]]
speaker = "unk"
# だが……そのいつになく真剣な眼光から、これが決して避けられない運命なのだと理解した。
line = "だが……そのいつになく真剣な眼光から、これが決して避けられない運命なのだと理解した。"

[[dialogue]]
speaker = "クロト"
# 「新星星徒会会長・緋宮クロト──こちらも退けない都合により、少し手荒な真似をさせてもらう」
line = "「新星星徒会会長・緋宮クロト──こちらも退けない都合により、少し手荒な真似をさせてもらう」"

[[dialogue]]
speaker = "ラクシャ"
# 「そうこなくっちゃ。かかってきなよ、星徒会のエリート達」
line = "「そうこなくっちゃ。かかってきなよ、星徒会のエリート達」"

[[dialogue]]
speaker = "サーシャ"
# 「言われずとも──」
line = "「言われずとも──」"

[[dialogue]]
speaker = "フィオナ"
# 「警戒最大──速やかに突破します！」
line = "「警戒最大──速やかに突破します！」"

[[dialogue]]
speaker = "ニャリオン"
# 「ニャ！　守護天使が相手でも──怯むわけにはいかないニャン！」
line = "「ニャ！　守護天使が相手でも──怯むわけにはいかないニャン！」"
