[[dialogue]]
speaker = "unk"
# 第１話,祓魔師と名探偵,P
line = "第１話,祓魔師と名探偵,P"

[[dialogue]]
speaker = "unk"
# ある日の昼休み、昼食をしにカフェテリアへ向かうと、見知った２人から声をかけられた。
line = "ある日の昼休み、昼食をしにカフェテリアへ向かうと、見知った２人から声をかけられた。"

[[dialogue]]
speaker = "フェリシー"
# 「あっ、会長くんだ！　こんにちは～♪」
line = "「あっ、会長くんだ！　こんにちは～♪」"

[[dialogue]]
speaker = "ジュエリー"
# 「やあ、助手。どうやらキミも昼食をしにきたようだね」
line = "「やあ、助手。どうやらキミも昼食をしにきたようだね」"

[[dialogue]]
speaker = "フェリシー"
# 「それならせっかくだし、一緒に食べようよ！　私の隣が空いてるから、どうぞ♪」
line = "「それならせっかくだし、一緒に食べようよ！　私の隣が空いてるから、どうぞ♪」"

[[dialogue]]
speaker = "unk"
# 彼女は流星学園２年生の、恵原フェリシー。この前解決した、保健室の事件で知り合った星騎士だ。
line = "彼女は流星学園２年生の、恵原フェリシー。この前解決した、保健室の事件で知り合った星騎士だ。"

[[dialogue]]
speaker = "unk"
# イタリア出身で日本人とイタリア人のハーフ。家業を継ぎ、『異変』の依頼を受けて解決する『祓魔師』でもある。
line = "イタリア出身で日本人とイタリア人のハーフ。家業を継ぎ、『異変』の依頼を受けて解決する『祓魔師』でもある。"

[[dialogue]]
speaker = "ジュエリー"
# 「ここ最近、事件の調査続きで、キミとはなかなか会えずにいたから、久しぶりに話せて嬉しいよ」
line = "「ここ最近、事件の調査続きで、キミとはなかなか会えずにいたから、久しぶりに話せて嬉しいよ」"

[[dialogue]]
speaker = "unk"
# 一方の彼女は、流星市国で有名な『日傘探偵』こと、流星学園１年生、ジュエリー・ブラウン。
line = "一方の彼女は、流星市国で有名な『日傘探偵』こと、流星学園１年生、ジュエリー・ブラウン。"

[[dialogue]]
speaker = "unk"
# １度彼女の部屋を掃除したことがきっかけで仲よくなり、俺はたまに助手（仮）として、探偵の仕事を手伝っていたりする。
line = "１度彼女の部屋を掃除したことがきっかけで仲よくなり、俺はたまに助手（仮）として、探偵の仕事を手伝っていたりする。"

[[dialogue]]
speaker = "unk"
# そういえば、２人は友達なんだっけ
line = "そういえば、２人は友達なんだっけ"

[[dialogue]]
speaker = "フェリシー"
# 「うん！　『<ruby=せんせいしゃ>選星者</ruby>』繋がりでね」
line = "「うん！　『<ruby>選星者<rt>せんせいしゃ</rt></ruby>』繋がりでね」"

[[dialogue]]
speaker = "unk"
# 選星者とは、女神から『<ruby=ロール>役職</ruby>』を授けられた者のこと。天からの啓示で、生まれながらにそのことを自覚し、役職に応じた特殊な能力を与えられるという。
line = "選星者とは、女神から『<ruby>役職<rt>ロール</rt></ruby>』を授けられた者のこと。天からの啓示で、生まれながらにそのことを自覚し、役職に応じた特殊な能力を与えられるという。"

[[dialogue]]
speaker = "フェリシー"
# 「役職は私が『<ruby=エクソシスト>祓魔師</ruby>』で、ジュエリーは『名探偵』」
line = "「役職は私が『<ruby>祓魔師<rt>エクソシスト</rt></ruby>』で、ジュエリーは『名探偵』」"

[[dialogue]]
speaker = "フェリシー"
# 「出会ったきっかけは、まだ学園に入学する前、エクソシストとして依頼を受けて、異変の正体を追っていた時のことで――」
line = "「出会ったきっかけは、まだ学園に入学する前、エクソシストとして依頼を受けて、異変の正体を追っていた時のことで――」"

[[dialogue]]
speaker = "ジュエリー"
# 「偶然、フェリシーと出会ったんだよ。私も別の依頼主から受けた事件を追っていた最中にね」
line = "「偶然、フェリシーと出会ったんだよ。私も別の依頼主から受けた事件を追っていた最中にね」"

[[dialogue]]
speaker = "ジュエリー"
# 「つまりは、事件の行き着く先……『謎』の正体が同じだったというわけさ。あの時はまさに運命の出会いだったね」
line = "「つまりは、事件の行き着く先……『謎』の正体が同じだったというわけさ。あの時はまさに運命の出会いだったね」"

[[dialogue]]
speaker = "フェリシー"
# 「そこで２人で協力して、事件を解決したんだ！」
line = "「そこで２人で協力して、事件を解決したんだ！」"

[[dialogue]]
speaker = "ジュエリー"
# 「それ以来、連絡先を交換して、友人として交流したり、お互いの依頼で協力し合ったりする仲になったというわけさ」
line = "「それ以来、連絡先を交換して、友人として交流したり、お互いの依頼で協力し合ったりする仲になったというわけさ」"

[[dialogue]]
speaker = "ジュエリー"
# 「ああ、そうだ。ところで――実はキミにまた、助手として協力をお願いしたいと思っていたんだよ」
line = "「ああ、そうだ。ところで――実はキミにまた、助手として協力をお願いしたいと思っていたんだよ」"

[[dialogue]]
speaker = "ジュエリー"
# 「そう、このところ私が追っていた事件の調査協力をね。よければ、後で相談してもいいかな？」
line = "「そう、このところ私が追っていた事件の調査協力をね。よければ、後で相談してもいいかな？」"

[[dialogue]]
speaker = "ジュエリー"
# 「――ありがとう。愛しているよ、我が助手」
line = "「――ありがとう。愛しているよ、我が助手」"

[[dialogue]]
speaker = "フェリシー"
# 「は、話には聞いてたけど、ジュエリーのその『愛してる』っていうの、本当に言ってるんだね……」
line = "「は、話には聞いてたけど、ジュエリーのその『愛してる』っていうの、本当に言ってるんだね……」"

[[dialogue]]
speaker = "ジュエリー"
# 「ああ、もちろんだとも。助手は我が『運命の君』であるという、『予言者』のお墨付きだからね」
line = "「ああ、もちろんだとも。助手は我が『運命の君』であるという、『予言者』のお墨付きだからね」"

[[dialogue]]
speaker = "フェリシー"
# 「でも、会長くんが助手として手伝ってくれるのか～。なんかちょっと羨ましいな～」
line = "「でも、会長くんが助手として手伝ってくれるのか～。なんかちょっと羨ましいな～」"

[[dialogue]]
speaker = "フェリシー"
# 「ねぇ、今度、私も依頼が来たら、会長くんに助手役をお願いしちゃダメかな？」
line = "「ねぇ、今度、私も依頼が来たら、会長くんに助手役をお願いしちゃダメかな？」"

[[dialogue]]
speaker = "フェリシー"
# 「会長くんが手伝ってくれたら、頼もしいかもって思ったんだけど……」
line = "「会長くんが手伝ってくれたら、頼もしいかもって思ったんだけど……」"

[[dialogue]]
speaker = "フェリシー"
# 「――いいの？　グラッチェ♪　ありがとう、会長くん！」
line = "「――いいの？　グラッチェ♪　ありがとう、会長くん！」"

[[dialogue]]
speaker = "ジュエリー"
# 「ふむ……さらっと助手の手を取り、顔を近づけてお願いするとは、相変わらず大胆だね、フェリシー」
line = "「ふむ……さらっと助手の手を取り、顔を近づけてお願いするとは、相変わらず大胆だね、フェリシー」"

[[dialogue]]
speaker = "フェリシー"
# 「え？」
line = "「え？」"

[[dialogue]]
speaker = "ジュエリー"
# 「しかも、本人に自覚のない、天然の技ときた。これはなかなか手強いライバルになりそうだよ」
line = "「しかも、本人に自覚のない、天然の技ときた。これはなかなか手強いライバルになりそうだよ」"

[[dialogue]]
speaker = "フェリシー"
# 「あっ……！　ついまた手を握っちゃってた！　ごめんごめん。てへへ」
line = "「あっ……！　ついまた手を握っちゃってた！　ごめんごめん。てへへ」"

[[dialogue]]
speaker = "ジュエリー"
# 「フェリシーの距離感が近過ぎることを除いても、助手とはもうすっかり仲良くなっているようだね」
line = "「フェリシーの距離感が近過ぎることを除いても、助手とはもうすっかり仲良くなっているようだね」"

[[dialogue]]
speaker = "フェリシー"
# 「うん！　実際に話してみて、会長くんとは気が合いそうだなって思ったよ」
line = "「うん！　実際に話してみて、会長くんとは気が合いそうだなって思ったよ」"

[[dialogue]]
speaker = "フェリシー"
# 「この前もお互いの趣味の話になって、私がキャンプ好きだって教えたんだけど――」
line = "「この前もお互いの趣味の話になって、私がキャンプ好きだって教えたんだけど――」"

[[dialogue]]
speaker = "フェリシー"
# 「会長くんも実はバイトでサバイバル経験があることが分かって、盛り上がったんだよね～」
line = "「会長くんも実はバイトでサバイバル経験があることが分かって、盛り上がったんだよね～」"

[[dialogue]]
speaker = "ジュエリー"
# 「そういえば、フェリシーも学園に来る前、エクソシストの修行でサバイバル経験をしたことがあると言っていたね」
line = "「そういえば、フェリシーも学園に来る前、エクソシストの修行でサバイバル経験をしたことがあると言っていたね」"

[[dialogue]]
speaker = "フェリシー"
# 「うん、当時は何もわからなくて大変だったけど、今では１人でもキャンプに行くくらい好きになっちゃったよ」
line = "「うん、当時は何もわからなくて大変だったけど、今では１人でもキャンプに行くくらい好きになっちゃったよ」"

[[dialogue]]
speaker = "フェリシー"
# 「それで、今度の長期休暇の時は、会長くんと一緒にキャンプでも行こうかって話してたんだよね～」
line = "「それで、今度の長期休暇の時は、会長くんと一緒にキャンプでも行こうかって話してたんだよね～」"

[[dialogue]]
speaker = "フェリシー"
# 「会長くんから、夏のリゾート結界でのサバイバル合宿したって話を聞いたら、羨ましくなっちゃってさ～」
line = "「会長くんから、夏のリゾート結界でのサバイバル合宿したって話を聞いたら、羨ましくなっちゃってさ～」"

[[dialogue]]
speaker = "ジュエリー"
# 「まさか、２人でかい？」
line = "「まさか、２人でかい？」"

[[dialogue]]
speaker = "フェリシー"
# 「え？　まだ具体的な予定を決めたわけじゃないから、人数は特に考えてなかったけど、ソフレは誘っても来ない気がするしな～」
line = "「え？　まだ具体的な予定を決めたわけじゃないから、人数は特に考えてなかったけど、ソフレは誘っても来ない気がするしな～」"

[[dialogue]]
speaker = "フェリシー"
# 「あっ、もしかして、ジュエリーも参加したかった？　それなら大歓迎だよ！」
line = "「あっ、もしかして、ジュエリーも参加したかった？　それなら大歓迎だよ！」"

[[dialogue]]
speaker = "ジュエリー"
# 「いや、そういうことではなく……まあ、いいか」
line = "「いや、そういうことではなく……まあ、いいか」"

[[dialogue]]
speaker = "ジュエリー"
# 「肌が弱くて日傘を手離せないという問題はあるが、愛する助手とキャンプに行くのは楽しそうではある」
line = "「肌が弱くて日傘を手離せないという問題はあるが、愛する助手とキャンプに行くのは楽しそうではある」"

[[dialogue]]
speaker = "フェリシー"
# 「決まりだね！　大丈夫、太陽光が苦手ってことなら、大きな屋根付きのテントを用意すればいいし！」
line = "「決まりだね！　大丈夫、太陽光が苦手ってことなら、大きな屋根付きのテントを用意すればいいし！」"

[[dialogue]]
speaker = "unk"
# あと、リゾート結界なら紫外線カットできる
line = "あと、リゾート結界なら紫外線カットできる"

[[dialogue]]
speaker = "フェリシー"
# 「え！？　なにそれ、どういうこと？」
line = "「え！？　なにそれ、どういうこと？」"

[[dialogue]]
speaker = "フェリシー"
# 「――リゾート結界は、リップルさんの能力で作られたものだから、日焼けしないモードがある？　そんなこともできるの！？　すごくない！？」
line = "「――リゾート結界は、リップルさんの能力で作られたものだから、日焼けしないモードがある？　そんなこともできるの！？　すごくない！？」"

[[dialogue]]
speaker = "ジュエリー"
# 「ほう、それは実に興味深い」
line = "「ほう、それは実に興味深い」"

[[dialogue]]
speaker = "unk"
# その後も俺たちは、リゾート結界の話で盛り上がるのだった――
line = "その後も俺たちは、リゾート結界の話で盛り上がるのだった――"
