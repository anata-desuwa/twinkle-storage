[[dialogue]]
speaker = "unk"
# 極星学園の星徒会長・ルヴィネ。
line = "極星学園の星徒会長・ルヴィネ。"

[[dialogue]]
speaker = "unk"
# 創造神『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』に生み出された、新たな女神。
line = "創造神『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』に生み出された、新たな女神。"

[[dialogue]]
speaker = "unk"
# 彼女はリクリエを遂行するために生まれた存在だった。
line = "彼女はリクリエを遂行するために生まれた存在だった。"

[[dialogue]]
speaker = "unk"
# 彼女は世界を滅ぼすために、デネブ全てを謀っていた。
line = "彼女は世界を滅ぼすために、デネブ全てを謀っていた。"

[[dialogue]]
speaker = "unk"
# だけど、それだけじゃなかった。
line = "だけど、それだけじゃなかった。"

[[dialogue]]
speaker = "unk"
# 心優しきヴァンパイアの副会長・ベアトリス。
line = "心優しきヴァンパイアの副会長・ベアトリス。"

[[dialogue]]
speaker = "unk"
# 家族想いで勇敢な一番槍のチナ。
line = "家族想いで勇敢な一番槍のチナ。"

[[dialogue]]
speaker = "unk"
# 好奇心と食欲旺盛で、元気溢れるグレイス。
line = "好奇心と食欲旺盛で、元気溢れるグレイス。"

[[dialogue]]
speaker = "unk"
# 冷たい微笑の下に優しい心を宿したレティシア。
line = "冷たい微笑の下に優しい心を宿したレティシア。"

[[dialogue]]
speaker = "unk"
# 周囲から隔絶された流星市国──１０年前の地獄を共に生きた仲間たち。
line = "周囲から隔絶された流星市国──１０年前の地獄を共に生きた仲間たち。"

[[dialogue]]
speaker = "unk"
# ルヴィネの死の危機を知った極星星徒会の４人は、彼女が自分たちを騙していたと気付いてもなお、ルヴィネを救うために立ち向かった。
line = "ルヴィネの死の危機を知った極星星徒会の４人は、彼女が自分たちを騙していたと気付いてもなお、ルヴィネを救うために立ち向かった。"

[[dialogue]]
speaker = "unk"
# 極星星徒会の仲間たちを、守護天使として新たな世界に連れていこうとするルヴィネ。
line = "極星星徒会の仲間たちを、守護天使として新たな世界に連れていこうとするルヴィネ。"

[[dialogue]]
speaker = "unk"
# だが４人はその誘いを断り、友達として呼びかける。
line = "だが４人はその誘いを断り、友達として呼びかける。"

[[dialogue]]
speaker = "チナ"
# 「……ルヴィはモノなんかじゃない。女神である前に、１人の天使だ……アタシの、友達だっ！」
line = "「……ルヴィはモノなんかじゃない。女神である前に、１人の天使だ……アタシの、友達だっ！」"

[[dialogue]]
speaker = "グレイス"
# 「『魔王さん』と約束しましたから！　世界も、友達も、絶対に諦めないって！！　ルヴィ、私たちとちゃんと向き合ってください！　そこからですよ……！」
line = "「『魔王さん』と約束しましたから！　世界も、友達も、絶対に諦めないって！！　ルヴィ、私たちとちゃんと向き合ってください！　そこからですよ……！」"

[[dialogue]]
speaker = "レティシア"
# 「永遠にルヴィと生きられるのも、素敵だとは思うけれど……私たちの居場所のデネブで、限りある人生を生きる方が、魅力的だわ……」
line = "「永遠にルヴィと生きられるのも、素敵だとは思うけれど……私たちの居場所のデネブで、限りある人生を生きる方が、魅力的だわ……」"

[[dialogue]]
speaker = "ベアトリス"
# 「ねぇルヴィ。私たち、聞きたいことは１つだけなの」
line = "「ねぇルヴィ。私たち、聞きたいことは１つだけなの」"

[[dialogue]]
speaker = "ベアトリス"
# 「『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』に与えられた使命を全うして、世界をやり直したいの……？」
line = "「『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』に与えられた使命を全うして、世界をやり直したいの……？」"

[[dialogue]]
speaker = "ベアトリス"
# 「それとも……嘘や間違いだらけでも、この世界で私たちと生きていきたい？」
line = "「それとも……嘘や間違いだらけでも、この世界で私たちと生きていきたい？」"

[[dialogue]]
speaker = "unk"
# 極星星徒会は１０年もの時間を……家族より長い時を共に過ごしてきた。
line = "極星星徒会は１０年もの時間を……家族より長い時を共に過ごしてきた。"

[[dialogue]]
speaker = "unk"
# そんな大切な幼なじみの言葉に、ルヴィネも素直にならざるを得なかった。
line = "そんな大切な幼なじみの言葉に、ルヴィネも素直にならざるを得なかった。"

[[dialogue]]
speaker = "ルヴィネ"
# 「みんな、今まで本当に……ごめんなさい」
line = "「みんな、今まで本当に……ごめんなさい」"

[[dialogue]]
speaker = "ルヴィネ"
# 「許されるのなら……これからも、みんなと一緒に生きていきたい……っ」
line = "「許されるのなら……これからも、みんなと一緒に生きていきたい……っ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「リクリエなんて起こさずに、この世界で生きていきたいわ……！」
line = "「リクリエなんて起こさずに、この世界で生きていきたいわ……！」"

[[dialogue]]
speaker = "unk"
# ルヴィネは極星星徒会のみんなと共に生きることを選んだ。
line = "ルヴィネは極星星徒会のみんなと共に生きることを選んだ。"

[[dialogue]]
speaker = "unk"
# 戦いを回避し、ルヴィネの死の未来も退けられた──と思われた。
line = "戦いを回避し、ルヴィネの死の未来も退けられた──と思われた。"

[[dialogue]]
speaker = "ルヴィネ"
# 「どうして……？　霊力が突然、なくなった──？」
line = "「どうして……？　霊力が突然、なくなった──？」"

[[dialogue]]
speaker = "？？？"
# 「──返してもらったのよ。不出来な姉には過ぎた力だもの」
line = "「──返してもらったのよ。不出来な姉には過ぎた力だもの」"

[[dialogue]]
speaker = "ルヴィネ"
# 「────か、はっ……！？」
line = "「────か、はっ……！？」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「１０年間、お疲れ様……役立たずのルヴィネ。そしてさようなら」
line = "「１０年間、お疲れ様……役立たずのルヴィネ。そしてさようなら」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「これからは私──新しいルヴィネが、リクリエを引き継ぐわ」
line = "「これからは私──新しいルヴィネが、リクリエを引き継ぐわ」"

[[dialogue]]
speaker = "unk"
# しかしルヴィネは、<b>新しいルヴィネ</b>に霊力を奪われ、討たれた。
line = "しかしルヴィネは、<b>新しいルヴィネ</b>に霊力を奪われ、討たれた。"

[[dialogue]]
speaker = "ベアトリス"
# 「私の守護星は、ポラリス・アウストラリス……！　南極に一番近い星で！」
line = "「私の守護星は、ポラリス・アウストラリス……！　南極に一番近い星で！」"

[[dialogue]]
speaker = "グレイス"
# 「私の守護星は、ファワリス……いつか北極星に組み込まれる星座なんですね！」
line = "「私の守護星は、ファワリス……いつか北極星に組み込まれる星座なんですね！」"

[[dialogue]]
speaker = "チナ"
# 「アタシはエライ。レティシアはエダシク……どっちも北極星に関係してるだなんて、こんな偶然あるんだな！」
line = "「アタシはエライ。レティシアはエダシク……どっちも北極星に関係してるだなんて、こんな偶然あるんだな！」"

[[dialogue]]
speaker = "レティシア"
# 「……すごい、ぐうぜん？」
line = "「……すごい、ぐうぜん？」"

[[dialogue]]
speaker = "チナ"
# 「ルヴィの守護星も調べたかったなあ。アタシらじゃ機械の動かし方、よくわからなかったし……」
line = "「ルヴィの守護星も調べたかったなあ。アタシらじゃ機械の動かし方、よくわからなかったし……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「いいえ。テルル様に遣わされた時に、守護星のことは聞いているの」
line = "「いいえ。テルル様に遣わされた時に、守護星のことは聞いているの」"

[[dialogue]]
speaker = "ルヴィネ"
# 「私の守護星は──ポラリス。今の北極星よ。ふふ……みんな同じなのね」
line = "「私の守護星は──ポラリス。今の北極星よ。ふふ……みんな同じなのね」"

[[dialogue]]
speaker = "unk"
# 偶然にも共通項を持つ５人の守護星。だがルヴィネの言葉は偽りだった。
line = "偶然にも共通項を持つ５人の守護星。だがルヴィネの言葉は偽りだった。"

[[dialogue]]
speaker = "unk"
# 創造神の従僕だったルヴィネは守護星を持たない。
line = "創造神の従僕だったルヴィネは守護星を持たない。"

[[dialogue]]
speaker = "unk"
# それでもルヴィネは願った。
line = "それでもルヴィネは願った。"

[[dialogue]]
speaker = "unk"
# 夜空で動かず、迷わず、静かに地上を見守り続ける極星に。
line = "夜空で動かず、迷わず、静かに地上を見守り続ける極星に。"

[[dialogue]]
speaker = "ルヴィネ"
# 「お願い……私に……愛しい世界を……」
line = "「お願い……私に……愛しい世界を……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「大好きな友達を……守る力を…………！！」
line = "「大好きな友達を……守る力を…………！！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「今度こそ一緒に行きましょう──ポラリス！！」
line = "「今度こそ一緒に行きましょう──ポラリス！！」"

[[dialogue]]
speaker = "unk"
# そしてルヴィネは復活を果たし、今度こそ星騎士として羽ばたいた。
line = "そしてルヴィネは復活を果たし、今度こそ星騎士として羽ばたいた。"
