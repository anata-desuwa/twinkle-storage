[[dialogue]]
speaker = "unk"
# 第１話,完璧なるメイド,P
line = "第１話,完璧なるメイド,P"

[[dialogue]]
speaker = "キリカ"
# 「ふっ――」
line = "「ふっ――」"

[[dialogue]]
speaker = "キリカ"
# 「……感心なされているようですが、この程度は当然です。メイドたる者、主人を守るためには戦闘もこなせなくてはなりませんから」
line = "「……感心なされているようですが、この程度は当然です。メイドたる者、主人を守るためには戦闘もこなせなくてはなりませんから」"

[[dialogue]]
speaker = "キリカ"
# 「メイドとは即ち、主のために全てを極めるもの。戦いとて例外ではありません」
line = "「メイドとは即ち、主のために全てを極めるもの。戦いとて例外ではありません」"

[[dialogue]]
speaker = "unk"
# なぜキリカさんと一緒に戦っているかというと──
line = "なぜキリカさんと一緒に戦っているかというと──"

[[dialogue]]
speaker = "キリカ"
# 「ごきげんよう。お嬢様がお世話になっております。お買い物でしょうか」
line = "「ごきげんよう。お嬢様がお世話になっております。お買い物でしょうか」"

[[dialogue]]
speaker = "キリカ"
# 「私はこの近くに星見家のお屋敷で使っている紅茶のお店がありますので、茶葉を購入しに向かうところです」
line = "「私はこの近くに星見家のお屋敷で使っている紅茶のお店がありますので、茶葉を購入しに向かうところです」"

[[dialogue]]
speaker = "キリカ"
# 「……そんなにこちらをじっとご覧になって、どうされましたか？」
line = "「……そんなにこちらをじっとご覧になって、どうされましたか？」"

[[dialogue]]
speaker = "キリカ"
# 「ああ、メイドが珍しいのですね。確かに、どの家庭にもいるものではありませんから」
line = "「ああ、メイドが珍しいのですね。確かに、どの家庭にもいるものではありませんから」"

[[dialogue]]
speaker = "キリカ"
# 「加えて私たちは星見家に仕えるために様々な訓練を積んだ精鋭。物珍しく思われるのも無理はないでしょう」
line = "「加えて私たちは星見家に仕えるために様々な訓練を積んだ精鋭。物珍しく思われるのも無理はないでしょう」"

[[dialogue]]
speaker = "キリカ"
# 「方向が同じなら途中まで一緒に……？　ええ、構いません」
line = "「方向が同じなら途中まで一緒に……？　ええ、構いません」"

[[dialogue]]
speaker = "キリカ"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# ……
line = "……"

[[dialogue]]
speaker = "unk"
# …………
line = "…………"

[[dialogue]]
speaker = "unk"
# この辺よく来るんですか？
line = "この辺よく来るんですか？"

[[dialogue]]
speaker = "キリカ"
# 「いえ、そんなに」
line = "「いえ、そんなに」"

[[dialogue]]
speaker = "unk"
# ……
line = "……"

[[dialogue]]
speaker = "unk"
# …………
line = "…………"

[[dialogue]]
speaker = "unk"
# 好きなお店とか……？
line = "好きなお店とか……？"

[[dialogue]]
speaker = "キリカ"
# 「特にありません」
line = "「特にありません」"

[[dialogue]]
speaker = "unk"
# …………
line = "…………"

[[dialogue]]
speaker = "unk"
# ……………………
line = "……………………"

[[dialogue]]
speaker = "キリカ"
# 「モンスターの反応ですか。……近いようですね。私も助力させていただきます」
line = "「モンスターの反応ですか。……近いようですね。私も助力させていただきます」"

[[dialogue]]
speaker = "unk"
# ――というわけで今に至る。
line = "――というわけで今に至る。"

[[dialogue]]
speaker = "unk"
# しまった、後ろから……！
line = "しまった、後ろから……！"

[[dialogue]]
speaker = "キリカ"
# 「失礼します」
line = "「失礼します」"

[[dialogue]]
speaker = "キリカ"
# 「お礼は結構ですが、油断は禁物です」
line = "「お礼は結構ですが、油断は禁物です」"

[[dialogue]]
speaker = "キリカ"
# 「拳を使った戦闘スタイルではインファイトになりがちですが、それは相手の懐に飛び込むと同時に、自らを危険に晒すことでもあります」
line = "「拳を使った戦闘スタイルではインファイトになりがちですが、それは相手の懐に飛び込むと同時に、自らを危険に晒すことでもあります」"

[[dialogue]]
speaker = "キリカ"
# 「至近距離ではこちらは退きづらく、相手にとっても恰好の的です。一瞬の判断ミスが命取りになりますので注意してください」
line = "「至近距離ではこちらは退きづらく、相手にとっても恰好の的です。一瞬の判断ミスが命取りになりますので注意してください」"

[[dialogue]]
speaker = "キリカ"
# 「それに攻撃の際は顕著ですが、あなたの戦い方には隙があります」
line = "「それに攻撃の際は顕著ですが、あなたの戦い方には隙があります」"

[[dialogue]]
speaker = "キリカ"
# 「気を張り巡らせて相手の動きを察知しつつ、戦いの盤面の上で自身を俯瞰し、敵味方の行動を予測することが肝要です」
line = "「気を張り巡らせて相手の動きを察知しつつ、戦いの盤面の上で自身を俯瞰し、敵味方の行動を予測することが肝要です」"

[[dialogue]]
speaker = "キリカ"
# 「……出過ぎた発言、失礼いたしました。私は指導する立場ではありませんので」
line = "「……出過ぎた発言、失礼いたしました。私は指導する立場ではありませんので」"

[[dialogue]]
speaker = "キリカ"
# 「講釈を垂れる気はありません。用事の途中ですし、手早く済ませましょう」
line = "「講釈を垂れる気はありません。用事の途中ですし、手早く済ませましょう」"

[[dialogue]]
speaker = "キリカ"
# 「モンスターの全滅を確認。お疲れ様でした」
line = "「モンスターの全滅を確認。お疲れ様でした」"

[[dialogue]]
speaker = "unk"
# （ほとんどキリカさんが倒してしまった……）
line = "（ほとんどキリカさんが倒してしまった……）"

[[dialogue]]
speaker = "キリカ"
# 「では私はお店に向かいますので、これで──」
line = "「では私はお店に向かいますので、これで──」"

[[dialogue]]
speaker = "キリカ"
# 「？　何か仰りたいご様子ですが。お嬢様への言伝でしょうか？」
line = "「？　何か仰りたいご様子ですが。お嬢様への言伝でしょうか？」"

[[dialogue]]
speaker = "unk"
# 師匠と呼ばせてください！
line = "師匠と呼ばせてください！"

[[dialogue]]
speaker = "キリカ"
# 「……師匠？」
line = "「……師匠？」"

[[dialogue]]
speaker = "キリカ"
# 「そう呼ばれるのは構いませんが、私は弟子をとるつもりはありません」
line = "「そう呼ばれるのは構いませんが、私は弟子をとるつもりはありません」"

[[dialogue]]
speaker = "キリカ"
# 「お嬢様のお世話や新人のメイドの教育もありますので、申し訳ありませんが、私にそのような時間は──」
line = "「お嬢様のお世話や新人のメイドの教育もありますので、申し訳ありませんが、私にそのような時間は──」"

[[dialogue]]
speaker = "フィオナ"
# 「ちょっと待って、キリカ」
line = "「ちょっと待って、キリカ」"

[[dialogue]]
speaker = "キリカ"
# 「お嬢様……？」
line = "「お嬢様……？」"
