[[dialogue]]
speaker = "unk"
# お正月が終わり、さらに１ヵ月が経過したある冬の一日。
line = "お正月が終わり、さらに１ヵ月が経過したある冬の一日。"

[[dialogue]]
speaker = "unk"
# 星徒会の仕事がひと段落したので、俺はヴィーナスと一緒に大聖堂カフェテリアへ飲み物を買いにきて、休憩をしていた――
line = "星徒会の仕事がひと段落したので、俺はヴィーナスと一緒に大聖堂カフェテリアへ飲み物を買いにきて、休憩をしていた――"

[[dialogue]]
speaker = "ヴィーナス"
# 「そういえば、クロト！　もうすぐバレンタインよね！」
line = "「そういえば、クロト！　もうすぐバレンタインよね！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「って、どうしたの？　急にそわそわし出して……」
line = "「って、どうしたの？　急にそわそわし出して……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「――女の子の方から切り出されると、気恥ずかしくなる話題？　そうなの？　よくわからないけど……」
line = "「――女の子の方から切り出されると、気恥ずかしくなる話題？　そうなの？　よくわからないけど……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「とりあえず、今年のバレンタインは期待しておきなさい！　これまで待ちに待って、ようやく出会えた魔王に――」
line = "「とりあえず、今年のバレンタインは期待しておきなさい！　これまで待ちに待って、ようやく出会えた魔王に――」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私から、とっておきの本命チョコをプレゼントしてあげるわ！」
line = "「私から、とっておきの本命チョコをプレゼントしてあげるわ！」"

[[dialogue]]
speaker = "unk"
# ほ、本命なんだ……
line = "ほ、本命なんだ……"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええ、もちろん！　私がいちばん仲の良い男の子はクロトだもの！　当然でしょ？」
line = "「ええ、もちろん！　私がいちばん仲の良い男の子はクロトだもの！　当然でしょ？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「って、クロト、顔が赤いわよ？　もしかして、照れてる？」
line = "「って、クロト、顔が赤いわよ？　もしかして、照れてる？」"

[[dialogue]]
speaker = "？？？"
# 「ふふっ、相変わらず、ド直球の最速ストレートね。さすがは私たちのお嬢様だわ」
line = "「ふふっ、相変わらず、ド直球の最速ストレートね。さすがは私たちのお嬢様だわ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あら？」
line = "「あら？」"

[[dialogue]]
speaker = "？？？"
# 「ご歓談のところ、失礼致します。ヴィーナスお嬢様、それに会長」
line = "「ご歓談のところ、失礼致します。ヴィーナスお嬢様、それに会長」"

[[dialogue]]
speaker = "ヴィーナス"
# 「<ruby=らび>蘭美</ruby>！　あなたもカフェテリアへ休憩にきたの？」
line = "「<ruby>蘭美<rt>らび</rt></ruby>！　あなたもカフェテリアへ休憩にきたの？」"

[[dialogue]]
speaker = "蘭美"
# 「ええ。そしたら、お嬢様の豪速球な言葉が聞こえてきたものだから、つい釣られてきてしまったわ」
line = "「ええ。そしたら、お嬢様の豪速球な言葉が聞こえてきたものだから、つい釣られてきてしまったわ」"

[[dialogue]]
speaker = "unk"
# はじめまして。キミは……？
line = "はじめまして。キミは……？"

[[dialogue]]
speaker = "ヴィーナス"
# 「えっ、２人が顔を合わせるのって、今回が初めてなの！？　クロトのことだから、てっきりまた、いつの間にか面識あるパターンだと思っていたわ！」
line = "「えっ、２人が顔を合わせるのって、今回が初めてなの！？　クロトのことだから、てっきりまた、いつの間にか面識あるパターンだと思っていたわ！」"

[[dialogue]]
speaker = "蘭美"
# 「私も、お嬢様から話を聞いて、すぐに会う機会があるだろうと思っていたけれど、気づけばすっかり遅くなってしまったわね」
line = "「私も、お嬢様から話を聞いて、すぐに会う機会があるだろうと思っていたけれど、気づけばすっかり遅くなってしまったわね」"

[[dialogue]]
speaker = "蘭美"
# 「――はじめまして、会長。私の名前は『<ruby=はねみや>羽宮</ruby>　<ruby=らび>蘭美</ruby>』」
line = "「――はじめまして、会長。私の名前は『<ruby>羽宮<rt>はねみや</rt></ruby>　<ruby>蘭美<rt>らび</rt></ruby>』」"

[[dialogue]]
speaker = "蘭美"
# 「他の子たちと知り合って、『九浄家メイド隊』のことはもう知っているでしょうけれど――」
line = "「他の子たちと知り合って、『九浄家メイド隊』のことはもう知っているでしょうけれど――」"

[[dialogue]]
speaker = "蘭美"
# 「私はそのまとめ役。九浄家<b>メイド長</b>を務めているわ」
line = "「私はそのまとめ役。九浄家<b>メイド長</b>を務めているわ」"

[[dialogue]]
speaker = "蘭美"
# 「以後、お見知りおきを」
line = "「以後、お見知りおきを」"

[[dialogue]]
speaker = "unk"
# 九浄家メイド隊の、メイド長……！
line = "九浄家メイド隊の、メイド長……！"

[[dialogue]]
speaker = "蘭美"
# 「――って、いま貴方、その割に<b>小さい</b>とか思ったでしょ……？」
line = "「――って、いま貴方、その割に<b>小さい</b>とか思ったでしょ……？」"

[[dialogue]]
speaker = "unk"
# え？　いや……？
line = "え？　いや……？"

[[dialogue]]
speaker = "蘭美"
# 「言っておくけど私は、年齢的には附属校２年であっても、学年は貴方より上！　飛び級で進学した、新星学園の３年生よ！」
line = "「言っておくけど私は、年齢的には附属校２年であっても、学年は貴方より上！　飛び級で進学した、新星学園の３年生よ！」"

[[dialogue]]
speaker = "蘭美"
# 「つまりは、貴方の先輩！　学園では先輩として敬いなさい！　そう――」
line = "「つまりは、貴方の先輩！　学園では先輩として敬いなさい！　そう――」"

[[dialogue]]
speaker = "蘭美"
# 「この私が、いくら小さくて可愛い天才美少女であっても！」
line = "「この私が、いくら小さくて可愛い天才美少女であっても！」"

[[dialogue]]
speaker = "unk"
# は、はあ……
line = "は、はあ……"

[[dialogue]]
speaker = "ヴィーナス"
# 「蘭美の言っていることは本当よ。メイドとしても、星騎士としてもすごい実力を持っているの！」
line = "「蘭美の言っていることは本当よ。メイドとしても、星騎士としてもすごい実力を持っているの！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「蘭美は、魔界にあるラパン地方を古くから治めている貴族、『羽宮家』の長女でね。九浄家とは昔から関わりがあったの」
line = "「蘭美は、魔界にあるラパン地方を古くから治めている貴族、『羽宮家』の長女でね。九浄家とは昔から関わりがあったの」"

[[dialogue]]
speaker = "蘭美"
# 「それで、生まれつき星力持ちだった私は、ご当主様――九浄ヘレナ様からスカウトされて、人間界にやってきたというわけ」
line = "「それで、生まれつき星力持ちだった私は、ご当主様――九浄ヘレナ様からスカウトされて、人間界にやってきたというわけ」"

[[dialogue]]
speaker = "蘭美"
# 「本来は、流星学園附属校の１年生として入学することになっていたけど……あいにく、私は何事も最速を目指す主義なの」
line = "「本来は、流星学園附属校の１年生として入学することになっていたけど……あいにく、私は何事も最速を目指す主義なの」"

[[dialogue]]
speaker = "蘭美"
# 「ヘレナ様にお願いをして、特別に新星学園の編入試験を受けさせてもらったわ。そうして見事合格してみせて、２年生として編入したのが今から１年前」
line = "「ヘレナ様にお願いをして、特別に新星学園の編入試験を受けさせてもらったわ。そうして見事合格してみせて、２年生として編入したのが今から１年前」"

[[dialogue]]
speaker = "蘭美"
# 「今は進級して、３年生というわけよ。どう？　すごいでしょ？」
line = "「今は進級して、３年生というわけよ。どう？　すごいでしょ？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「その勢いで、メイドとしても実力を示して、九浄家の歴代最年少でメイド長に抜擢されたのよ。まさに天才ね！」
line = "「その勢いで、メイドとしても実力を示して、九浄家の歴代最年少でメイド長に抜擢されたのよ。まさに天才ね！」"

[[dialogue]]
speaker = "蘭美"
# 「ふふんっ♪　ありがとう、お嬢様。ストレートな褒め言葉が耳に心地いいわ♪」
line = "「ふふんっ♪　ありがとう、お嬢様。ストレートな褒め言葉が耳に心地いいわ♪」"

[[dialogue]]
speaker = "unk"
# 魔界の貴族って話だったけど……羽宮先輩はどうしてメイドに？
line = "魔界の貴族って話だったけど……羽宮先輩はどうしてメイドに？"

[[dialogue]]
speaker = "蘭美"
# 「蘭美、と呼び捨てでいいわよ、会長」
line = "「蘭美、と呼び捨てでいいわよ、会長」"

[[dialogue]]
speaker = "蘭美"
# 「私は本来なら貴方より年下で、ヴィーナスお嬢様に仕えるメイドとして敬語を使うべき立場」
line = "「私は本来なら貴方より年下で、ヴィーナスお嬢様に仕えるメイドとして敬語を使うべき立場」"

[[dialogue]]
speaker = "蘭美"
# 「でも同時に、私は学園での先輩でもある。となると、お互い敬語を使って交流を深めていくのが無難ではあるけれど……」
line = "「でも同時に、私は学園での先輩でもある。となると、お互い敬語を使って交流を深めていくのが無難ではあるけれど……」"

[[dialogue]]
speaker = "蘭美"
# 「さっきも言ったけど、私は何事も最速を目指す主義なの。ヴィーナスお嬢様が信頼を寄せる貴方を私も信頼して、堅苦しいのは無しにしたいと思うわ」
line = "「さっきも言ったけど、私は何事も最速を目指す主義なの。ヴィーナスお嬢様が信頼を寄せる貴方を私も信頼して、堅苦しいのは無しにしたいと思うわ」"

[[dialogue]]
speaker = "蘭美"
# 「というわけで、対等の関係って感じでどうかしら？　会長」
line = "「というわけで、対等の関係って感じでどうかしら？　会長」"

[[dialogue]]
speaker = "unk"
# わかった。これからよろしく、蘭美
line = "わかった。これからよろしく、蘭美"

[[dialogue]]
speaker = "蘭美"
# 「ふふんっ♪　お嬢様たちから聞いていた通りの人ね。こちらこそよろしく、会長」
line = "「ふふんっ♪　お嬢様たちから聞いていた通りの人ね。こちらこそよろしく、会長」"

[[dialogue]]
speaker = "unk"
# 俺と蘭美は握手を交わす。
line = "俺と蘭美は握手を交わす。"

[[dialogue]]
speaker = "蘭美"
# 「――それで、貴族である私が、どうしてメイドになったのかっていう話だったわね」
line = "「――それで、貴族である私が、どうしてメイドになったのかっていう話だったわね」"

[[dialogue]]
speaker = "蘭美"
# 「それは、世界一のメイドになることが私の夢だからよ」
line = "「それは、世界一のメイドになることが私の夢だからよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「蘭美は２年前、世界最高のメイドを決める大会『メイド・オブ・メイド』で、最年少の世界２位まで登り詰めたのよ！」
line = "「蘭美は２年前、世界最高のメイドを決める大会『メイド・オブ・メイド』で、最年少の世界２位まで登り詰めたのよ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ちなみに、その時の１位は――」
line = "「ちなみに、その時の１位は――」"

[[dialogue]]
speaker = "unk"
# と、その時だった。
line = "と、その時だった。"

[[dialogue]]
speaker = "女子生徒"
# 「キャーッ！　何あれ！？」
line = "「キャーッ！　何あれ！？」"

[[dialogue]]
speaker = "男子生徒"
# 「も、モンスター！？」
line = "「も、モンスター！？」"

[[dialogue]]
speaker = "？？？"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "蘭美"
# 「あれは一体……？」
line = "「あれは一体……？」"

[[dialogue]]
speaker = "unk"
# 突然、どこからともなく現れた異様な存在に、喧騒に包まれるカフェテリア。
line = "突然、どこからともなく現れた異様な存在に、喧騒に包まれるカフェテリア。"

[[dialogue]]
speaker = "unk"
# ――その様子を影から覗いている人物が、１人。
line = "――その様子を影から覗いている人物が、１人。"

[[dialogue]]
speaker = "せつな"
# 「あわわ……！　どうしようでござる……！」
line = "「あわわ……！　どうしようでござる……！」"

[[dialogue]]
speaker = "unk"
# 九浄メイド隊の１人『せつな』は、慌てた様子で呟くのだった――
line = "九浄メイド隊の１人『せつな』は、慌てた様子で呟くのだった――"
