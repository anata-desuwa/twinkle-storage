[[dialogue]]
speaker = "unk"
# 第１話,ジュエリーと家族の挨拶,P
line = "第１話,ジュエリーと家族の挨拶,P"

[[dialogue]]
speaker = "unk"
# ジュエリーとイレーナのウェディング騒動から少し経った頃。
line = "ジュエリーとイレーナのウェディング騒動から少し経った頃。"

[[dialogue]]
speaker = "unk"
# ウェディングフォームの固定化は無事に解除されたものの、それ以来ジュエリーは、たびたび俺の家へ花嫁修業に訪れていた。
line = "ウェディングフォームの固定化は無事に解除されたものの、それ以来ジュエリーは、たびたび俺の家へ花嫁修業に訪れていた。"

[[dialogue]]
speaker = "リノ"
# 「ここはこうやってね、角を落とすように拭くと、綺麗に見えるのよ～」
line = "「ここはこうやってね、角を落とすように拭くと、綺麗に見えるのよ～」"

[[dialogue]]
speaker = "ジュエリー"
# 「なるほど、確かに理にかなっている」
line = "「なるほど、確かに理にかなっている」"

[[dialogue]]
speaker = "リノ"
# 「うんうん、いい感じ。不器用だから家事は苦手って言ってたけど、ジュエリーちゃん、上手にできてるじゃない♪」
line = "「うんうん、いい感じ。不器用だから家事は苦手って言ってたけど、ジュエリーちゃん、上手にできてるじゃない♪」"

[[dialogue]]
speaker = "ジュエリー"
# 「リノさんの教え方が上手いからだよ。不器用な私でも、スポンジが水を吸うように吸収できてしまうのさ」
line = "「リノさんの教え方が上手いからだよ。不器用な私でも、スポンジが水を吸うように吸収できてしまうのさ」"

[[dialogue]]
speaker = "リノ"
# 「まあ♪　ジュエリーちゃんってばお上手～♪」
line = "「まあ♪　ジュエリーちゃんってばお上手～♪」"

[[dialogue]]
speaker = "unk"
# （むしろ器用なのでは？）
line = "（むしろ器用なのでは？）"

[[dialogue]]
speaker = "unk"
# （日傘を持ったまま掃除ができるのは）
line = "（日傘を持ったまま掃除ができるのは）"

[[dialogue]]
speaker = "unk"
# そんな俺の心のツッコミをよそに、ジュエリーは片手で日傘を差したまま、家事の練習を続けていく。
line = "そんな俺の心のツッコミをよそに、ジュエリーは片手で日傘を差したまま、家事の練習を続けていく。"

[[dialogue]]
speaker = "リノ"
# 「さて、次はお料理──と思ったんだけど、これは私じゃない方がいいかな～。クロト、バトンタッチできるかしら？」
line = "「さて、次はお料理──と思ったんだけど、これは私じゃない方がいいかな～。クロト、バトンタッチできるかしら？」"

[[dialogue]]
speaker = "ジュエリー"
# 「おや？　リノさんは料理が苦手なのかい？」
line = "「おや？　リノさんは料理が苦手なのかい？」"

[[dialogue]]
speaker = "unk"
# いや、できるけど、味にこだわりがないんだ
line = "いや、できるけど、味にこだわりがないんだ"

[[dialogue]]
speaker = "リノ"
# 「私はつい、味よりも栄養を優先して考えちゃうのよね～。だから料理に関しては、私じゃない方がいいかなーって」
line = "「私はつい、味よりも栄養を優先して考えちゃうのよね～。だから料理に関しては、私じゃない方がいいかなーって」"

[[dialogue]]
speaker = "ジュエリー"
# 「なるほど……では我が助手、いつもの感じでお願いしようかな」
line = "「なるほど……では我が助手、いつもの感じでお願いしようかな」"

[[dialogue]]
speaker = "unk"
# いつものって……アレをやるの？
line = "いつものって……アレをやるの？"

[[dialogue]]
speaker = "ジュエリー"
# 「ああ。あの方法がいちばん効率よく料理スキルを習得できそうだからね♪」
line = "「ああ。あの方法がいちばん効率よく料理スキルを習得できそうだからね♪」"

[[dialogue]]
speaker = "リノ"
# 「なになに？　２人の秘密とかずるい～！　お母さんにも教えてよ～！」
line = "「なになに？　２人の秘密とかずるい～！　お母さんにも教えてよ～！」"

[[dialogue]]
speaker = "ジュエリー"
# 「ほら、リノさんもこう言ってるじゃないか」
line = "「ほら、リノさんもこう言ってるじゃないか」"

[[dialogue]]
speaker = "unk"
# それから、俺はキッチンに立つジュエリーの後ろに回る。
line = "それから、俺はキッチンに立つジュエリーの後ろに回る。"

[[dialogue]]
speaker = "unk"
# そのまま彼女を抱き込むようにして手を重ねて、『二人羽織』のような姿勢で料理を始めた。
line = "そのまま彼女を抱き込むようにして手を重ねて、『二人羽織』のような姿勢で料理を始めた。"

[[dialogue]]
speaker = "リノ"
# 「あら～<emoji=heart04>　いつもそうやって、抱きしめられながら教えてもらってるの～？」
line = "「あら～<emoji=heart04>　いつもそうやって、抱きしめられながら教えてもらってるの～？」"

[[dialogue]]
speaker = "ジュエリー"
# 「傘を差したまま料理をするというのは、思いのほか難易度が高くてね」
line = "「傘を差したまま料理をするというのは、思いのほか難易度が高くてね」"

[[dialogue]]
speaker = "ジュエリー"
# 「その結果こうやって、助手が後ろから支えてくれる形に行き着いたというわけさ」
line = "「その結果こうやって、助手が後ろから支えてくれる形に行き着いたというわけさ」"

[[dialogue]]
speaker = "ジュエリー"
# 「その甲斐あって、包丁の扱いも随分上達した。野菜を切ろうとするたびに指を切ることも、もうなくなったよ」
line = "「その甲斐あって、包丁の扱いも随分上達した。野菜を切ろうとするたびに指を切ることも、もうなくなったよ」"

[[dialogue]]
speaker = "リノ"
# 「ふふっ、なんだかもうすっかり、本当に新婚さんって感じね～♪」
line = "「ふふっ、なんだかもうすっかり、本当に新婚さんって感じね～♪」"

[[dialogue]]
speaker = "ジュエリー"
# 「リノさんからそう言われると、こそばゆく感じるよ」
line = "「リノさんからそう言われると、こそばゆく感じるよ」"

[[dialogue]]
speaker = "ジュエリー"
# 「愛する助手にぴったり寄り添ってもらいながら、共に料理をするという約束も叶えてもらった……私は幸せ者だよ<emoji=heart04>」
line = "「愛する助手にぴったり寄り添ってもらいながら、共に料理をするという約束も叶えてもらった……私は幸せ者だよ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# やがて食事の準備が整い、３人でテーブルを囲むことになった。
line = "やがて食事の準備が整い、３人でテーブルを囲むことになった。"

[[dialogue]]
speaker = "リノ"
# 「――そういえば、ジュエリーちゃんのご両親って、どんな人なの？」
line = "「――そういえば、ジュエリーちゃんのご両親って、どんな人なの？」"

[[dialogue]]
speaker = "ジュエリー"
# 「私の父は、もともとイギリスで神父をしていたんだ。けれど今は引退して、私と同じように探偵の仕事をしている」
line = "「私の父は、もともとイギリスで神父をしていたんだ。けれど今は引退して、私と同じように探偵の仕事をしている」"

[[dialogue]]
speaker = "ジュエリー"
# 「周りからは、『司祭探偵』なんて呼ばれているよ」
line = "「周りからは、『司祭探偵』なんて呼ばれているよ」"

[[dialogue]]
speaker = "リノ"
# 「お父さんも探偵なのね！　さすがブラウン神父様の血筋だわ♪」
line = "「お父さんも探偵なのね！　さすがブラウン神父様の血筋だわ♪」"

[[dialogue]]
speaker = "ジュエリー"
# 「父は神父だった頃から破天荒な人でね。私と同じで謎解きが好きで、探偵の真似事をしていたそうだよ」
line = "「父は神父だった頃から破天荒な人でね。私と同じで謎解きが好きで、探偵の真似事をしていたそうだよ」"

[[dialogue]]
speaker = "ジュエリー"
# 「そしてある時、母と出会って恋に落ちてしまって……神父を引退したんだ」
line = "「そしてある時、母と出会って恋に落ちてしまって……神父を引退したんだ」"

[[dialogue]]
speaker = "リノ"
# 「まあ！　まるでドラマみたいね♪」
line = "「まあ！　まるでドラマみたいね♪」"

[[dialogue]]
speaker = "ジュエリー"
# 「引退した後は、それまでのコネを頼って、困っている人から依頼を受けるようになってね。自然と探偵の仕事をするようになったそうだ」
line = "「引退した後は、それまでのコネを頼って、困っている人から依頼を受けるようになってね。自然と探偵の仕事をするようになったそうだ」"

[[dialogue]]
speaker = "ジュエリー"
# 「それで……私がまだ幼い頃、現地で大司教様を暗殺しようとする事件が起きてね」
line = "「それで……私がまだ幼い頃、現地で大司教様を暗殺しようとする事件が起きてね」"

[[dialogue]]
speaker = "ジュエリー"
# 「父はその犯人を見つけ出し、大司教様を無事に守り抜いた。その功績が認められて、『名誉司祭』の称号を頂いたんだ」
line = "「父はその犯人を見つけ出し、大司教様を無事に守り抜いた。その功績が認められて、『名誉司祭』の称号を頂いたんだ」"

[[dialogue]]
speaker = "リノ"
# 「それで『司祭探偵』というわけね！　お父さん、すごい人じゃない♪」
line = "「それで『司祭探偵』というわけね！　お父さん、すごい人じゃない♪」"

[[dialogue]]
speaker = "ジュエリー"
# 「ふふっ……普段は、日本の言葉で言う『<ruby=ひるあんどん>昼行灯</ruby>』みたいな人なんだけどね」
line = "「ふふっ……普段は、日本の言葉で言う『<ruby>昼行灯<rt>ひるあんどん</rt></ruby>』みたいな人なんだけどね」"

[[dialogue]]
speaker = "ジュエリー"
# 「ともあれ、私はそんな父の影響を受けて育ったんだ」
line = "「ともあれ、私はそんな父の影響を受けて育ったんだ」"

[[dialogue]]
speaker = "リノ"
# 「それで、ジュエリーちゃん。ご両親には、クロトと付き合ってることはもう伝えてるの？」
line = "「それで、ジュエリーちゃん。ご両親には、クロトと付き合ってることはもう伝えてるの？」"

[[dialogue]]
speaker = "ジュエリー"
# 「伝えているよ。父も母もＤＩＳＣを使えるからね」
line = "「伝えているよ。父も母もＤＩＳＣを使えるからね」"

[[dialogue]]
speaker = "unk"
# えっ、それって……筒抜けってこと！？
line = "えっ、それって……筒抜けってこと！？"

[[dialogue]]
speaker = "ジュエリー"
# 「ああ。私が初めて報告したときの父は、面白いくらい動揺していたよ」
line = "「ああ。私が初めて報告したときの父は、面白いくらい動揺していたよ」"

[[dialogue]]
speaker = "ジュエリー"
# 「でも、落ち着いてからは、１度挨拶をしたいとも言っていたな。今度、カメラ越しに挨拶するかい？」
line = "「でも、落ち着いてからは、１度挨拶をしたいとも言っていたな。今度、カメラ越しに挨拶するかい？」"

[[dialogue]]
speaker = "unk"
# こ、心の準備をしておきます……
line = "こ、心の準備をしておきます……"

[[dialogue]]
speaker = "リノ"
# 「ふふっ、クロト、ちゃんと面と向かってご挨拶しとかなきゃダメよ～？」
line = "「ふふっ、クロト、ちゃんと面と向かってご挨拶しとかなきゃダメよ～？」"

[[dialogue]]
speaker = "リノ"
# 「そうだ、ジュエリーちゃんとの結婚が決まった時には、旅行も兼ねて直接会いに行きましょうか♪」
line = "「そうだ、ジュエリーちゃんとの結婚が決まった時には、旅行も兼ねて直接会いに行きましょうか♪」"

[[dialogue]]
speaker = "ジュエリー"
# 「いいね。卒業旅行も兼ねた、家族旅行というわけだ」
line = "「いいね。卒業旅行も兼ねた、家族旅行というわけだ」"

[[dialogue]]
speaker = "リノ"
# 「あら、卒業してすぐなんて早いわね♪　うふふっ♪」
line = "「あら、卒業してすぐなんて早いわね♪　うふふっ♪」"

[[dialogue]]
speaker = "ジュエリー"
# 「私はそれくらい早く結婚したいつもりだけど……キミはどう思っているのかな、助手？」
line = "「私はそれくらい早く結婚したいつもりだけど……キミはどう思っているのかな、助手？」"

[[dialogue]]
speaker = "unk"
# それも心の準備をしておきます……
line = "それも心の準備をしておきます……"

[[dialogue]]
speaker = "ジュエリー"
# 「ふふっ♪　楽しみにしているよ」
line = "「ふふっ♪　楽しみにしているよ」"

[[dialogue]]
speaker = "unk"
# 俺の反応に、ジュエリーと母さんは揃って楽しそうな笑顔を浮かべるのだった。
line = "俺の反応に、ジュエリーと母さんは揃って楽しそうな笑顔を浮かべるのだった。"
