[[dialogue]]
speaker = "unk"
# 第１話,なんとなく,P
line = "第１話,なんとなく,P"

[[dialogue]]
speaker = "unk"
# 極星学園による流星市国襲撃。白昼の攻撃は市民を震撼させた。
line = "極星学園による流星市国襲撃。白昼の攻撃は市民を震撼させた。"

[[dialogue]]
speaker = "unk"
# コラプサーたちも迎撃のために出撃し──
line = "コラプサーたちも迎撃のために出撃し──"

[[dialogue]]
speaker = "キサナ"
# 「いい加減くたばれ！　カラミティパイル！」
line = "「いい加減くたばれ！　カラミティパイル！」"

[[dialogue]]
speaker = "極星従騎"
# 「ブルルッ」
line = "「ブルルッ」"

[[dialogue]]
speaker = "キサナ"
# 「チッ、まだ動きやがるか」
line = "「チッ、まだ動きやがるか」"

[[dialogue]]
speaker = "レイラ"
# 「大丈夫、私が仕留める！　ブラックホール・ディバウアー！」
line = "「大丈夫、私が仕留める！　ブラックホール・ディバウアー！」"

[[dialogue]]
speaker = "キサナ"
# 「クソ、どんだけいやがるんだよっ！　正義の味方さまは何やってんだ！」
line = "「クソ、どんだけいやがるんだよっ！　正義の味方さまは何やってんだ！」"

[[dialogue]]
speaker = "unk"
# 新星・流星両学園の星騎士が総力を挙げて対応しているが、後手に回っている。数が多いうえに、極星従騎は星徒会のメンバーでも手を焼く強敵だ。
line = "新星・流星両学園の星騎士が総力を挙げて対応しているが、後手に回っている。数が多いうえに、極星従騎は星徒会のメンバーでも手を焼く強敵だ。"

[[dialogue]]
speaker = "レイラ"
# 「はぁ、はぁ……エルゴフォースブラスター！」
line = "「はぁ、はぁ……エルゴフォースブラスター！」"

[[dialogue]]
speaker = "unk"
# 弱体化した今のコラプサーでは、致命傷を与えられるのはレイラだけ。
line = "弱体化した今のコラプサーでは、致命傷を与えられるのはレイラだけ。"

[[dialogue]]
speaker = "unk"
# そのレイラは操るブラックホールが強力すぎて、市街地では全力を出せない。
line = "そのレイラは操るブラックホールが強力すぎて、市街地では全力を出せない。"

[[dialogue]]
speaker = "レイラ"
# 「あ、通信……はい、レイラです。え、北西にも敵ですか？　でも戦力を分散させるわけには……」
line = "「あ、通信……はい、レイラです。え、北西にも敵ですか？　でも戦力を分散させるわけには……」"

[[dialogue]]
speaker = "キサナ"
# （んだと？　そっちの方角にはガキどもが……）
line = "（んだと？　そっちの方角にはガキどもが……）"

[[dialogue]]
speaker = "キサナ"
# 「悪いレイラ、ここは任せる！」
line = "「悪いレイラ、ここは任せる！」"

[[dialogue]]
speaker = "レイラ"
# 「待って、キサナ！　単独行動は危険だって！」
line = "「待って、キサナ！　単独行動は危険だって！」"

[[dialogue]]
speaker = "キサナ"
# 「うるせえ！」
line = "「うるせえ！」"

[[dialogue]]
speaker = "キサナ"
# （アタシは何やってんだ？　他人のために命を懸けるなんざ、バカのやることだろ）
line = "（アタシは何やってんだ？　他人のために命を懸けるなんざ、バカのやることだろ）"

[[dialogue]]
speaker = "unk"
# キサナが向かったのは、以前面倒を見た少女が預けられている保護施設。
line = "キサナが向かったのは、以前面倒を見た少女が預けられている保護施設。"

[[dialogue]]
speaker = "極星従騎"
# 「ヒヒィンッ！」
line = "「ヒヒィンッ！」"

[[dialogue]]
speaker = "キサナ"
# 「ざけんじゃねえ！！　ヘヴィアウトレイジ！」
line = "「ざけんじゃねえ！！　ヘヴィアウトレイジ！」"

[[dialogue]]
speaker = "キサナ"
# 「くたばったか？　手負いだったみてぇだな」
line = "「くたばったか？　手負いだったみてぇだな」"

[[dialogue]]
speaker = "unk"
# 崩れた壁から中に入る。物が散乱しているが、血の臭いはしない。
line = "崩れた壁から中に入る。物が散乱しているが、血の臭いはしない。"

[[dialogue]]
speaker = "キサナ"
# 「おい、無事か！？　返事しろ！」
line = "「おい、無事か！？　返事しろ！」"

[[dialogue]]
speaker = "女の子"
# 「……キサナお姉ちゃん？」
line = "「……キサナお姉ちゃん？」"

[[dialogue]]
speaker = "キサナ"
# 「いんならさっさと返事しろ」
line = "「いんならさっさと返事しろ」"

[[dialogue]]
speaker = "unk"
# 奥から現れたのは、キサナが保護した少女だった。親から育児放棄され、ここで暮らしている。
line = "奥から現れたのは、キサナが保護した少女だった。親から育児放棄され、ここで暮らしている。"

[[dialogue]]
speaker = "キサナ"
# 「他の連中はどうした？」
line = "「他の連中はどうした？」"

[[dialogue]]
speaker = "女の子"
# 「地下にお部屋があるから、みんな、先生と一緒に隠れてるの。お姉ちゃんの声が聞こえたから出てきちゃった」
line = "「地下にお部屋があるから、みんな、先生と一緒に隠れてるの。お姉ちゃんの声が聞こえたから出てきちゃった」"

[[dialogue]]
speaker = "キサナ"
# 「……はぁ、そうかよ。急いで損したぜ」
line = "「……はぁ、そうかよ。急いで損したぜ」"

[[dialogue]]
speaker = "女の子"
# 「キサナお姉ちゃん、助けに来てくれたんだ」
line = "「キサナお姉ちゃん、助けに来てくれたんだ」"

[[dialogue]]
speaker = "キサナ"
# 「はぁ？　アタシがんなだりぃことするわけねえだろ。ついでだついで」
line = "「はぁ？　アタシがんなだりぃことするわけねえだろ。ついでだついで」"

[[dialogue]]
speaker = "女の子"
# 「ふふっ、変わらないね。キサナお姉ちゃん」
line = "「ふふっ、変わらないね。キサナお姉ちゃん」"

[[dialogue]]
speaker = "キサナ"
# 「ああ？　そういうオマエはずいぶん変わったな。べらべら喋るようになりやがって」
line = "「ああ？　そういうオマエはずいぶん変わったな。べらべら喋るようになりやがって」"

[[dialogue]]
speaker = "女の子"
# 「そうかな？　自分では分からないや」
line = "「そうかな？　自分では分からないや」"

[[dialogue]]
speaker = "キサナ"
# 「んにゃっ！？　いきなりしっぽ掴むなっつってんだろ。前言撤回だ。やっぱり変わってねえな、オマエ」
line = "「んにゃっ！？　いきなりしっぽ掴むなっつってんだろ。前言撤回だ。やっぱり変わってねえな、オマエ」"

[[dialogue]]
speaker = "女の子"
# 「ごめんなさい。でも怖くて……」
line = "「ごめんなさい。でも怖くて……」"

[[dialogue]]
speaker = "キサナ"
# 「いいからオマエは地下に隠れてろ。外のクソ馬はアタシがぶっ潰す」
line = "「いいからオマエは地下に隠れてろ。外のクソ馬はアタシがぶっ潰す」"

[[dialogue]]
speaker = "女の子"
# 「うん！　星騎士が助けに来てくれたってみんなに伝えるね！」
line = "「うん！　星騎士が助けに来てくれたってみんなに伝えるね！」"

[[dialogue]]
speaker = "キサナ"
# 「ちがっ、アタシは星騎士なんかじゃ……行っちまいやがった」
line = "「ちがっ、アタシは星騎士なんかじゃ……行っちまいやがった」"

[[dialogue]]
speaker = "キサナ"
# 「クソ、これじゃ本当に正義の味方みてえじゃねえか。気持ちわりぃ」
line = "「クソ、これじゃ本当に正義の味方みてえじゃねえか。気持ちわりぃ」"

[[dialogue]]
speaker = "極星従騎"
# 「ブルルル……」
line = "「ブルルル……」"

[[dialogue]]
speaker = "キサナ"
# 「おいクソ馬！　キサナ様が相手してやる。地べたに頭こすりつけて感謝しろ！」
line = "「おいクソ馬！　キサナ様が相手してやる。地べたに頭こすりつけて感謝しろ！」"

[[dialogue]]
speaker = "キサナ"
# 「オラ喰らえ！　カラミティパイル！」
line = "「オラ喰らえ！　カラミティパイル！」"

[[dialogue]]
speaker = "キサナ"
# 「チッ、クソ硬えな。こっちの手がしびれやがる」
line = "「チッ、クソ硬えな。こっちの手がしびれやがる」"

[[dialogue]]
speaker = "極星従騎"
# 「ブルルッ！」
line = "「ブルルッ！」"

[[dialogue]]
speaker = "キサナ"
# 「ぐぅっ！」
line = "「ぐぅっ！」"

[[dialogue]]
speaker = "unk"
# 極星従騎の突撃。キサナの体がビルに叩きつけられる。
line = "極星従騎の突撃。キサナの体がビルに叩きつけられる。"

[[dialogue]]
speaker = "キサナ"
# （アタシは何やってんだろうな）
line = "（アタシは何やってんだろうな）"

[[dialogue]]
speaker = "キサナ"
# （ガキの頃、生き方を教えてくれたヤツがいた。ナイフの使い方、銃の撃ち方、カードの遊び方、あとなんかいろいろ）
line = "（ガキの頃、生き方を教えてくれたヤツがいた。ナイフの使い方、銃の撃ち方、カードの遊び方、あとなんかいろいろ）"

[[dialogue]]
speaker = "キサナ"
# （ソイツは言った。誰も信用するな、自分の事だけ考えろって）
line = "（ソイツは言った。誰も信用するな、自分の事だけ考えろって）"

[[dialogue]]
speaker = "キサナ"
# （でも、ソイツはアタシを敵の銃弾から庇って死んだ。そんなのは弱いやつの、バカがすることだって言ってたのに）
line = "（でも、ソイツはアタシを敵の銃弾から庇って死んだ。そんなのは弱いやつの、バカがすることだって言ってたのに）"

[[dialogue]]
speaker = "キサナ"
# 「本当に笑えるぜ。テメエの命が大事ならさっさと逃げりゃいいのにな」
line = "「本当に笑えるぜ。テメエの命が大事ならさっさと逃げりゃいいのにな」"

[[dialogue]]
speaker = "unk"
# 施設も女の子も見捨て、流星市国から逃げればいい。それが賢い選択だと分かっている。生き残るための正しい選択。でもそうはしなかった。
line = "施設も女の子も見捨て、流星市国から逃げればいい。それが賢い選択だと分かっている。生き残るための正しい選択。でもそうはしなかった。"

[[dialogue]]
speaker = "unk"
# キサナを動かすのは使命感でも正義感でもない。
line = "キサナを動かすのは使命感でも正義感でもない。"

[[dialogue]]
speaker = "キサナ"
# 「……アネゴ、最期に言ってたよな。『なんとなく』って。イカレちまったんだと思ってた」
line = "「……アネゴ、最期に言ってたよな。『なんとなく』って。イカレちまったんだと思ってた」"

[[dialogue]]
speaker = "キサナ"
# 「今ならアタシにも分かるぜ。本当に『なんとなく』なんだな。あ～あ、アタシもイカレちまったみたいだ」
line = "「今ならアタシにも分かるぜ。本当に『なんとなく』なんだな。あ～あ、アタシもイカレちまったみたいだ」"

[[dialogue]]
speaker = "極星従騎"
# 「ヒヒィンッ！」
line = "「ヒヒィンッ！」"

[[dialogue]]
speaker = "キサナ"
# 「来い！　風穴開けてやるよ！！」
line = "「来い！　風穴開けてやるよ！！」"

[[dialogue]]
speaker = "unk"
# 再び、極星従騎の突撃。キサナは逃げない。真正面から受け止め、杭打機の引き金を弾く。
line = "再び、極星従騎の突撃。キサナは逃げない。真正面から受け止め、杭打機の引き金を弾く。"

[[dialogue]]
speaker = "キサナ"
# 「うおおおおおっ！　リベリオンハウリングッ！！」
line = "「うおおおおおっ！　リベリオンハウリングッ！！」"

[[dialogue]]
speaker = "unk"
# 爆音とともに極星従騎の頭を打ち抜く。風穴どころか、極星従騎がバラバラに砕けた。
line = "爆音とともに極星従騎の頭を打ち抜く。風穴どころか、極星従騎がバラバラに砕けた。"

[[dialogue]]
speaker = "キサナ"
# 「ハァ、ハァ……アタシにケンカを売ったことを後悔しやがれ」
line = "「ハァ、ハァ……アタシにケンカを売ったことを後悔しやがれ」"

[[dialogue]]
speaker = "極星従騎"
# 「ブルルル……」
line = "「ブルルル……」"

[[dialogue]]
speaker = "キサナ"
# 「チッ、おかわりかよ。まあいい、テメエも後悔させてやる！」
line = "「チッ、おかわりかよ。まあいい、テメエも後悔させてやる！」"

[[dialogue]]
speaker = "レイラ"
# 「遅くなってごめん、キサナ！」
line = "「遅くなってごめん、キサナ！」"

[[dialogue]]
speaker = "キサナ"
# 「マジで遅え。全部喰っちまうとこだったぜ」
line = "「マジで遅え。全部喰っちまうとこだったぜ」"

[[dialogue]]
speaker = "キサナ"
# 「アタシに続け、バカども！　行くぜ！」
line = "「アタシに続け、バカども！　行くぜ！」"

[[dialogue]]
speaker = "unk"
# コラプサーと合流し、キサナは施設と子どもたちを守り抜いた。
line = "コラプサーと合流し、キサナは施設と子どもたちを守り抜いた。"
