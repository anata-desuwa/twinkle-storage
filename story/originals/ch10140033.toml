[[dialogue]]
speaker = "unk"
# 第３話,新生・有明トワ,P
line = "第３話,新生・有明トワ,P"

[[dialogue]]
speaker = "トワ先生"
# 「ふ～、あったかいココアがおいしい……疲れた脳に糖が補給されていくよ～」
line = "「ふ～、あったかいココアがおいしい……疲れた脳に糖が補給されていくよ～」"

[[dialogue]]
speaker = "トワ先生"
# 「会長くんも積極的に甘いものを摂取した方がいいよ。頭脳労働に糖は必須だからね」
line = "「会長くんも積極的に甘いものを摂取した方がいいよ。頭脳労働に糖は必須だからね」"

[[dialogue]]
speaker = "メイプル"
# 「あっ、トワちゃんはっけーん！　お兄ちゃんも一緒だったんだね♪」
line = "「あっ、トワちゃんはっけーん！　お兄ちゃんも一緒だったんだね♪」"

[[dialogue]]
speaker = "トワ先生"
# 「あ、メイプルちゃん。よかったらこっちに座る？　ココアもあるよ～」
line = "「あ、メイプルちゃん。よかったらこっちに座る？　ココアもあるよ～」"

[[dialogue]]
speaker = "メイプル"
# 「ココア！　ククク……漆黒を煮詰めたような苦く甘き霊薬……」
line = "「ココア！　ククク……漆黒を煮詰めたような苦く甘き霊薬……」"

[[dialogue]]
speaker = "トワ先生"
# 「苦さは感じないからきっとおいしいよ～」
line = "「苦さは感じないからきっとおいしいよ～」"

[[dialogue]]
speaker = "メイプル"
# 「頂きま～す♪　トワちゃんとお兄ちゃんは休憩中？」
line = "「頂きま～す♪　トワちゃんとお兄ちゃんは休憩中？」"

[[dialogue]]
speaker = "トワ先生"
# 「うん、一休みしながら会長くんとおしゃべりしてたの」
line = "「うん、一休みしながら会長くんとおしゃべりしてたの」"

[[dialogue]]
speaker = "メイプル"
# 「あらー、ふっふっふ、<b>会長くん</b>と仲良くおしゃべりしてたんだ～♪」
line = "「あらー、ふっふっふ、<b>会長くん</b>と仲良くおしゃべりしてたんだ～♪」"

[[dialogue]]
speaker = "トワ先生"
# 「な、なに？　なんだよ～、その含みのある笑いは～！」
line = "「な、なに？　なんだよ～、その含みのある笑いは～！」"

[[dialogue]]
speaker = "メイプル"
# 「お兄ちゃん聞いて。トワちゃんね～、こないだ１人の時、お兄ちゃんのこと<b>会長きゅん</b>って言ってたよ～」
line = "「お兄ちゃん聞いて。トワちゃんね～、こないだ１人の時、お兄ちゃんのこと<b>会長きゅん</b>って言ってたよ～」"

[[dialogue]]
speaker = "unk"
# 会長……きゅん？
line = "会長……きゅん？"

[[dialogue]]
speaker = "トワ先生"
# 「わー！　言ってない言ってない！　そんな呼び方してないから！　ほんと！　ほんとだからね！」
line = "「わー！　言ってない言ってない！　そんな呼び方してないから！　ほんと！　ほんとだからね！」"

[[dialogue]]
speaker = "メイプル"
# 「え～、じゃあ別な呼び方？　お兄ちゃんの名前にハートマークつけたようなあま～い感じで呼んでたこともあった気が……」
line = "「え～、じゃあ別な呼び方？　お兄ちゃんの名前にハートマークつけたようなあま～い感じで呼んでたこともあった気が……」"

[[dialogue]]
speaker = "トワ先生"
# 「やめてやめてー！　つい魔が差しちゃっただけだから！　会長くんに会いたくてちょこっと想いが募っちゃっただけだから！」
line = "「やめてやめてー！　つい魔が差しちゃっただけだから！　会長くんに会いたくてちょこっと想いが募っちゃっただけだから！」"

[[dialogue]]
speaker = "トワ先生"
# 「あうう……恥ずかしいよね、いい大人なのに。しかも、こっそり言ってたつもりなのにメイプルちゃんに聞かれちゃってたなんて」
line = "「あうう……恥ずかしいよね、いい大人なのに。しかも、こっそり言ってたつもりなのにメイプルちゃんに聞かれちゃってたなんて」"

[[dialogue]]
speaker = "メイプル"
# 「こっそり？　結構おっきな声出してたと思うけど」
line = "「こっそり？　結構おっきな声出してたと思うけど」"

[[dialogue]]
speaker = "メイプル"
# 「ほら、ウェディングフォーム！　って、ドレスに変身して……」
line = "「ほら、ウェディングフォーム！　って、ドレスに変身して……」"

[[dialogue]]
speaker = "トワ先生"
# 「わーっ！　わぁぁーーーっ！　その話もダメ～～！！」
line = "「わーっ！　わぁぁーーーっ！　その話もダメ～～！！」"

[[dialogue]]
speaker = "メイプル"
# 「トワちゃん、お兄ちゃんと恋人同士なんだよね？　だったらこそこそしなくてもいいと思うんだけど」
line = "「トワちゃん、お兄ちゃんと恋人同士なんだよね？　だったらこそこそしなくてもいいと思うんだけど」"

[[dialogue]]
speaker = "メイプル"
# 「ねえねえ、お兄ちゃん、トワちゃんね、家でウェディングフォームになって、クッションを持って……」
line = "「ねえねえ、お兄ちゃん、トワちゃんね、家でウェディングフォームになって、クッションを持って……」"

[[dialogue]]
speaker = "メイプル"
# 「ちゅ～～～ってしてたんだよ？　可愛いでしょ？」
line = "「ちゅ～～～ってしてたんだよ？　可愛いでしょ？」"

[[dialogue]]
speaker = "unk"
# なにそれメチャクチャかわいい！
line = "なにそれメチャクチャかわいい！"

[[dialogue]]
speaker = "トワ先生"
# 「うわぁぁぁん、なんでそんなことまで言っちゃうのぉおおおお～～～！！」
line = "「うわぁぁぁん、なんでそんなことまで言っちゃうのぉおおおお～～～！！」"

[[dialogue]]
speaker = "メイプル"
# 「ごめんね、でもトワちゃんならいいと思うよ。お兄ちゃんとお似合いだもん」
line = "「ごめんね、でもトワちゃんならいいと思うよ。お兄ちゃんとお似合いだもん」"

[[dialogue]]
speaker = "メイプル"
# 「あー、でも結婚するなら、直した方がいいよね～って思うところもあるかな」
line = "「あー、でも結婚するなら、直した方がいいよね～って思うところもあるかな」"

[[dialogue]]
speaker = "メイプル"
# 「トワちゃんって、外ではきちんとしてるけど、家ではけっこーズボラなんだよね～」
line = "「トワちゃんって、外ではきちんとしてるけど、家ではけっこーズボラなんだよね～」"

[[dialogue]]
speaker = "トワ先生"
# 「そんなことないよ？　わたしちゃんとしてるよね、メイプルちゃん？」
line = "「そんなことないよ？　わたしちゃんとしてるよね、メイプルちゃん？」"

[[dialogue]]
speaker = "トワ先生"
# 「同居し始めてから、そういうとこしっかりしようって決めたし、守れてると思うんだけど」
line = "「同居し始めてから、そういうとこしっかりしようって決めたし、守れてると思うんだけど」"

[[dialogue]]
speaker = "メイプル"
# 「うん、トワちゃんが努力してることは知ってるよ。でもね、お酒飲むと素のトワちゃんが出ちゃってるから」
line = "「うん、トワちゃんが努力してることは知ってるよ。でもね、お酒飲むと素のトワちゃんが出ちゃってるから」"

[[dialogue]]
speaker = "トワ先生"
# 「お、お酒はしょうがないんだよ～。あれがないと生きていけないんだから～」
line = "「お、お酒はしょうがないんだよ～。あれがないと生きていけないんだから～」"

[[dialogue]]
speaker = "メイプル"
# 「お酒飲んじゃうと、脱いだ服ぽーんってその辺に放り投げるでしょ」
line = "「お酒飲んじゃうと、脱いだ服ぽーんってその辺に放り投げるでしょ」"

[[dialogue]]
speaker = "トワ先生"
# 「うっ」
line = "「うっ」"

[[dialogue]]
speaker = "メイプル"
# 「あと、クローゼットに何でもむぎゅむぎゅ突っ込んでるよね？　入りきらなくて決壊して、よく悲鳴上げてるし」
line = "「あと、クローゼットに何でもむぎゅむぎゅ突っ込んでるよね？　入りきらなくて決壊して、よく悲鳴上げてるし」"

[[dialogue]]
speaker = "トワ先生"
# 「ひ、否定したいけど、身に覚えがありすぎる……」
line = "「ひ、否定したいけど、身に覚えがありすぎる……」"

[[dialogue]]
speaker = "メイプル"
# 「表面だけごまかす癖は、直した方がいいと思う。じゃないとお兄ちゃんにがっかりされちゃうよ？」
line = "「表面だけごまかす癖は、直した方がいいと思う。じゃないとお兄ちゃんにがっかりされちゃうよ？」"

[[dialogue]]
speaker = "unk"
# そんなことない……よ？
line = "そんなことない……よ？"

[[dialogue]]
speaker = "トワ先生"
# 「わぁぁぁん、会長くんは見たことないから、そんな優しいフォローが出来るんだよ」
line = "「わぁぁぁん、会長くんは見たことないから、そんな優しいフォローが出来るんだよ」"

[[dialogue]]
speaker = "トワ先生"
# 「実際に見たら、失望するに決まってるよぉ。せっかく素敵な大人のお姉さんのイメージでやってきたのに……」
line = "「実際に見たら、失望するに決まってるよぉ。せっかく素敵な大人のお姉さんのイメージでやってきたのに……」"

[[dialogue]]
speaker = "メイプル"
# 「ご、ごめんトワちゃん。あたし、ちょっと言い過ぎちゃったかも」
line = "「ご、ごめんトワちゃん。あたし、ちょっと言い過ぎちゃったかも」"

[[dialogue]]
speaker = "トワ先生"
# 「メイプルちゃんは悪くないよ。むしろ指摘してくれてありがとね」
line = "「メイプルちゃんは悪くないよ。むしろ指摘してくれてありがとね」"

[[dialogue]]
speaker = "トワ先生"
# 「わたし頑張るから！　お片付けだってちゃんとする！　クローゼットだって整頓するよ！」
line = "「わたし頑張るから！　お片付けだってちゃんとする！　クローゼットだって整頓するよ！」"

[[dialogue]]
speaker = "トワ先生"
# 「お酒も……やめるから……うううっ」
line = "「お酒も……やめるから……うううっ」"

[[dialogue]]
speaker = "unk"
# 無理しないで
line = "無理しないで"

[[dialogue]]
speaker = "トワ先生"
# 「でもっ、会長くんと……そのっ、いつか一緒に暮らしたいなら……今ここで無理しないとダメでしょ？」
line = "「でもっ、会長くんと……そのっ、いつか一緒に暮らしたいなら……今ここで無理しないとダメでしょ？」"

[[dialogue]]
speaker = "トワ先生"
# 「ということで、わたしは生まれ変わったつもりで頑張るよ！　もう二度とメイプルちゃんにズボラだなんて言わせないんだから！」
line = "「ということで、わたしは生まれ変わったつもりで頑張るよ！　もう二度とメイプルちゃんにズボラだなんて言わせないんだから！」"

[[dialogue]]
speaker = "トワ先生"
# 「そしてお酒は……お酒はぁぁぁ……」
line = "「そしてお酒は……お酒はぁぁぁ……」"

[[dialogue]]
speaker = "トワ先生"
# 「……へ、減らしますっ。３分の１に……いや、半分に……休肝日だって……倍に……」
line = "「……へ、減らしますっ。３分の１に……いや、半分に……休肝日だって……倍に……」"

[[dialogue]]
speaker = "トワ先生"
# 「うううううっ、想像しただけでもつらすぎる……」
line = "「うううううっ、想像しただけでもつらすぎる……」"

[[dialogue]]
speaker = "メイプル"
# 「トワちゃん、量はそこまで飲んでないんだから、お酒は我慢しなくていいんじゃない？」
line = "「トワちゃん、量はそこまで飲んでないんだから、お酒は我慢しなくていいんじゃない？」"

[[dialogue]]
speaker = "トワ先生"
# 「わたしを甘やかさないで！　会長くんのためにわたしは変わるんだから！」
line = "「わたしを甘やかさないで！　会長くんのためにわたしは変わるんだから！」"

[[dialogue]]
speaker = "トワ先生"
# 「待っててね、新生・有明トワの姿を！」
line = "「待っててね、新生・有明トワの姿を！」"

[[dialogue]]
speaker = "unk"
# 生活改善することを、固く誓うトワちゃんだった。
line = "生活改善することを、固く誓うトワちゃんだった。"
