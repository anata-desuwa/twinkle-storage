[[dialogue]]
speaker = "unk"
# 第７話,レティシアの外出,B
line = "第７話,レティシアの外出,B"

[[dialogue]]
speaker = "unk"
# グレイスへ真実を伝えた翌日。俺は購買部へ顔を出していた。
line = "グレイスへ真実を伝えた翌日。俺は購買部へ顔を出していた。"

[[dialogue]]
speaker = "トリュファイナ"
# 「──なるほど。そんなことが……」
line = "「──なるほど。そんなことが……」"

[[dialogue]]
speaker = "クロト"
# 「トリュファイナさん、可能でしょうか？」
line = "「トリュファイナさん、可能でしょうか？」"

[[dialogue]]
speaker = "トリュファイナ"
# 「──難しいですね。状況を見ない事には、何とも……」
line = "「──難しいですね。状況を見ない事には、何とも……」"

[[dialogue]]
speaker = "トリュファイナ"
# 「けれど、死力を尽くします。それだけはお約束しましょう」
line = "「けれど、死力を尽くします。それだけはお約束しましょう」"

[[dialogue]]
speaker = "クロト"
# 「すみません。かなり危険なことになると思いますが……あなた以外に頼めないことでした」
line = "「すみません。かなり危険なことになると思いますが……あなた以外に頼めないことでした」"

[[dialogue]]
speaker = "トリュファイナ"
# 「お気になさらないでください。世界の危機とあっては、私も命を懸けなくては！」
line = "「お気になさらないでください。世界の危機とあっては、私も命を懸けなくては！」"

[[dialogue]]
speaker = "トリュファイナ"
# 「──それにしても魔王様。ここのところ、休む間もなく駆け回っているとか……お疲れでしょう？」
line = "「──それにしても魔王様。ここのところ、休む間もなく駆け回っているとか……お疲れでしょう？」"

[[dialogue]]
speaker = "unk"
# トリュファイナさんが魔力を用いて、俺の疲労感を取り去ってくれた。
line = "トリュファイナさんが魔力を用いて、俺の疲労感を取り去ってくれた。"

[[dialogue]]
speaker = "トリュファイナ"
# 「ある程度の疲れならば、このようにすぐにお癒やしできます。またおいでください」
line = "「ある程度の疲れならば、このようにすぐにお癒やしできます。またおいでください」"

[[dialogue]]
speaker = "クロト"
# 「ありがとうございます。体が軽くなりました」
line = "「ありがとうございます。体が軽くなりました」"

[[dialogue]]
speaker = "グレイス"
# 「こんにちは！　フライドチキンください！！」
line = "「こんにちは！　フライドチキンください！！」"

[[dialogue]]
speaker = "トリュファイナ"
# 「あっ。グレイス様。いらっしゃいませ！」
line = "「あっ。グレイス様。いらっしゃいませ！」"

[[dialogue]]
speaker = "マトイ"
# 「ぜえ、ぜえっ……会長、お疲れ様～……」
line = "「ぜえ、ぜえっ……会長、お疲れ様～……」"

[[dialogue]]
speaker = "クロト"
# 「マトイもご苦労様。今日もグレイスは……その、元気いっぱいみたいだな」
line = "「マトイもご苦労様。今日もグレイスは……その、元気いっぱいみたいだな」"

[[dialogue]]
speaker = "マトイ"
# 「トリュファイナさんの揚げるチキンが絶品だって……毎日リピートしててね……」
line = "「トリュファイナさんの揚げるチキンが絶品だって……毎日リピートしててね……」"

[[dialogue]]
speaker = "マトイ"
# 「これを食べたら次は図書館でしょ。その後は渋谷に行って、秋葉原に行って、浅草もめぐるんだって～……」
line = "「これを食べたら次は図書館でしょ。その後は渋谷に行って、秋葉原に行って、浅草もめぐるんだって～……」"

[[dialogue]]
speaker = "クロト"
# 「本当にお疲れ様、マトイ……」
line = "「本当にお疲れ様、マトイ……」"

[[dialogue]]
speaker = "マトイ"
# 「あはは。グレイスちゃんはわかりやすく喜んでくれるし、お礼もちゃんと言ってくれるから、面倒の見甲斐はあるけどね」
line = "「あはは。グレイスちゃんはわかりやすく喜んでくれるし、お礼もちゃんと言ってくれるから、面倒の見甲斐はあるけどね」"

[[dialogue]]
speaker = "マトイ"
# 「そういえば会長。今日はレティシアさんから連絡があったってホント？　初めての外出申請だよね？」
line = "「そういえば会長。今日はレティシアさんから連絡があったってホント？　初めての外出申請だよね？」"

[[dialogue]]
speaker = "クロト"
# 「ああ。この後、サーシャさんが担当することになってる。俺も同席するつもりだ」
line = "「ああ。この後、サーシャさんが担当することになってる。俺も同席するつもりだ」"

[[dialogue]]
speaker = "マトイ"
# 「なんて言ったらいいのかわからないけど……気を付けてね。悪い人とまでは言わないけど……」
line = "「なんて言ったらいいのかわからないけど……気を付けてね。悪い人とまでは言わないけど……」"

[[dialogue]]
speaker = "クロト"
# 「レティシアは、一番アルタイルに対して心を開いていない感じがするよな。心配してくれてありがとう」
line = "「レティシアは、一番アルタイルに対して心を開いていない感じがするよな。心配してくれてありがとう」"

[[dialogue]]
speaker = "マトイ"
# 「うん！　また何か進展があったら教えてね！」
line = "「うん！　また何か進展があったら教えてね！」"

[[dialogue]]
speaker = "グレイス"
# 「マトイさん、魔王さんも！　トリュファイナさんにサービスしてもらいました！　チキン、お１つどうぞ！」
line = "「マトイさん、魔王さんも！　トリュファイナさんにサービスしてもらいました！　チキン、お１つどうぞ！」"

[[dialogue]]
speaker = "マトイ"
# 「う、うんっ、ありがとう……わ、ほんとにおいしい！！」
line = "「う、うんっ、ありがとう……わ、ほんとにおいしい！！」"

[[dialogue]]
speaker = "トリュファイナ"
# 「ふふふ♪　またのご来店、お待ちしておりますね♪」
line = "「ふふふ♪　またのご来店、お待ちしておりますね♪」"

[[dialogue]]
speaker = "unk"
# それからしばらく後。レティシアが申請した外出先に、俺は出向いた──
line = "それからしばらく後。レティシアが申請した外出先に、俺は出向いた──"

[[dialogue]]
speaker = "サーシャ"
# 「あらあら。やっぱりレティシアちゃん、とっても強いわね～♪」
line = "「あらあら。やっぱりレティシアちゃん、とっても強いわね～♪」"

[[dialogue]]
speaker = "レティシア"
# 「お喋りしてると舌を噛むわよ？」
line = "「お喋りしてると舌を噛むわよ？」"

[[dialogue]]
speaker = "サーシャ"
# 「ご忠告どうも～♪」
line = "「ご忠告どうも～♪」"

[[dialogue]]
speaker = "レティシア"
# 「ふっ──！！」
line = "「ふっ──！！」"

[[dialogue]]
speaker = "unk"
# レティシアが申請したのは模擬戦闘──本人曰く、体がなまらないようにしたいとのこと。
line = "レティシアが申請したのは模擬戦闘──本人曰く、体がなまらないようにしたいとのこと。"

[[dialogue]]
speaker = "unk"
# 一応、極星学園生は捕虜なので、渡しているセレスティアには細工がある。
line = "一応、極星学園生は捕虜なので、渡しているセレスティアには細工がある。"

[[dialogue]]
speaker = "unk"
# トワ先生が改造を施した、一定以下の星力までしか行使できない訓練用セレスティアを貸し出しているのだが──
line = "トワ先生が改造を施した、一定以下の星力までしか行使できない訓練用セレスティアを貸し出しているのだが──"

[[dialogue]]
speaker = "トワ先生"
# 「す、すごいね～、レティシアちゃん。動きに全然無駄がないよ」
line = "「す、すごいね～、レティシアちゃん。動きに全然無駄がないよ」"

[[dialogue]]
speaker = "クロト"
# 「実際に戦ったアポロから、相当の実力者と聞いてます」
line = "「実際に戦ったアポロから、相当の実力者と聞いてます」"

[[dialogue]]
speaker = "トワ先生"
# 「うん。星力総量も戦闘経験も段違い……出力制限されてあの動きは普通じゃないね」
line = "「うん。星力総量も戦闘経験も段違い……出力制限されてあの動きは普通じゃないね」"

[[dialogue]]
speaker = "トワ先生"
# 「プリマステラの子も、ほとんどが歯も立たないんじゃないかな……」
line = "「プリマステラの子も、ほとんどが歯も立たないんじゃないかな……」"

[[dialogue]]
speaker = "クロト"
# 「でも、あの動きについていけるサーシャさんも流石です」
line = "「でも、あの動きについていけるサーシャさんも流石です」"

[[dialogue]]
speaker = "トワ先生"
# 「彼女も新星の元星徒会長だからね！　あ、ひと段落ついたかな？」
line = "「彼女も新星の元星徒会長だからね！　あ、ひと段落ついたかな？」"

[[dialogue]]
speaker = "サーシャ"
# 「ふぅ──このあたりにしておきましょうか～？」
line = "「ふぅ──このあたりにしておきましょうか～？」"

[[dialogue]]
speaker = "レティシア"
# 「残念だわ。ノヴァフォームを見せて欲しかったのだけれど……やっぱり機能制限されているセレスティアで追い込むのは無理ね」
line = "「残念だわ。ノヴァフォームを見せて欲しかったのだけれど……やっぱり機能制限されているセレスティアで追い込むのは無理ね」"

[[dialogue]]
speaker = "サーシャ"
# 「うふふ。それはまた今度ね♪　それじゃあレティシアちゃん、先に変身を解除して？」
line = "「うふふ。それはまた今度ね♪　それじゃあレティシアちゃん、先に変身を解除して？」"

[[dialogue]]
speaker = "レティシア"
# 「……ええ」
line = "「……ええ」"

[[dialogue]]
speaker = "レティシア"
# 「はい。セレスティア、お返しするわ」
line = "「はい。セレスティア、お返しするわ」"

[[dialogue]]
speaker = "トワ先生"
# 「はーい、お疲れ様～」
line = "「はーい、お疲れ様～」"

[[dialogue]]
speaker = "サーシャ"
# 「それじゃあレティシアちゃん。次は何をしましょうか？」
line = "「それじゃあレティシアちゃん。次は何をしましょうか？」"

[[dialogue]]
speaker = "レティシア"
# 「部屋に戻るわ。体がなまらないように運動したかっただけだもの」
line = "「部屋に戻るわ。体がなまらないように運動したかっただけだもの」"

[[dialogue]]
speaker = "サーシャ"
# 「グレイスちゃんみたいに、もっと自由に歩き回っていいのよ？　アルタイルの流星市国、気にならない？」
line = "「グレイスちゃんみたいに、もっと自由に歩き回っていいのよ？　アルタイルの流星市国、気にならない？」"

[[dialogue]]
speaker = "レティシア"
# 「いいえ。まったく興味がないわ。どうせ滅ぼす世界だもの」
line = "「いいえ。まったく興味がないわ。どうせ滅ぼす世界だもの」"

[[dialogue]]
speaker = "サーシャ"
# 「困ったわね～……担当の私は楽でいいけど、グレイスちゃんに引っ張りまわされているマトイちゃんに悪い気がするわ～」
line = "「困ったわね～……担当の私は楽でいいけど、グレイスちゃんに引っ張りまわされているマトイちゃんに悪い気がするわ～」"

[[dialogue]]
speaker = "サーシャ"
# 「できないことも多いけど、できる限りリクエストには応えるから～。なんならもう１回、模擬戦する？」
line = "「できないことも多いけど、できる限りリクエストには応えるから～。なんならもう１回、模擬戦する？」"

[[dialogue]]
speaker = "レティシア"
# 「それなら、流星星徒会の人達を呼んでくれる？　いずれ敵として戦う時の参考にしたいから」
line = "「それなら、流星星徒会の人達を呼んでくれる？　いずれ敵として戦う時の参考にしたいから」"

[[dialogue]]
speaker = "サーシャ"
# 「あらあら……血の気が多いのね～」
line = "「あらあら……血の気が多いのね～」"

[[dialogue]]
speaker = "クロト"
# 「フィオナが許可するなら問題ない。連絡を取るよ」
line = "「フィオナが許可するなら問題ない。連絡を取るよ」"

[[dialogue]]
speaker = "unk"
# ──それからレティシアは、流星星徒会の面々とも模擬戦闘を行った。
line = "──それからレティシアは、流星星徒会の面々とも模擬戦闘を行った。"

[[dialogue]]
speaker = "unk"
# そしてその後、フィオナから意外な申し出があり……
line = "そしてその後、フィオナから意外な申し出があり……"

[[dialogue]]
speaker = "レティシア"
# 「ふうん。これが教皇庁、星見家の<ruby=ていたく>邸宅</ruby>……」
line = "「ふうん。これが教皇庁、星見家の<ruby>邸宅<rt>ていたく</rt></ruby>……」"

[[dialogue]]
speaker = "フィオナ"
# 「はい。ごゆっくりなさってください」
line = "「はい。ごゆっくりなさってください」"

[[dialogue]]
speaker = "unk"
# レティシアがなかなか心を開いてくれないことを知ったフィオナが、語らいの場を設けようと自宅まで招待してくれたのだった。
line = "レティシアがなかなか心を開いてくれないことを知ったフィオナが、語らいの場を設けようと自宅まで招待してくれたのだった。"

[[dialogue]]
speaker = "unk"
# けれど──
line = "けれど──"

[[dialogue]]
speaker = "レティシア"
# 「どの部屋も通路も広い。刀を振るうスペースは十分ね」
line = "「どの部屋も通路も広い。刀を振るうスペースは十分ね」"

[[dialogue]]
speaker = "unk"
# レティシアはくつろぐどころか、敵情視察しかしていない気がする──
line = "レティシアはくつろぐどころか、敵情視察しかしていない気がする──"

[[dialogue]]
speaker = "クロト"
# 「……本当に大丈夫かな？　自宅まで招いちゃって」
line = "「……本当に大丈夫かな？　自宅まで招いちゃって」"

[[dialogue]]
speaker = "フィオナ"
# 「<ruby=きょうきん>胸襟</ruby>も開かない相手を信頼しろという方が無理でしょう。問題ありませんよ」
line = "「<ruby>胸襟<rt>きょうきん</rt></ruby>も開かない相手を信頼しろという方が無理でしょう。問題ありませんよ」"

[[dialogue]]
speaker = "フィオナ"
# 「できる限りのことをする──緋宮会長と同じことをしているだけですから」
line = "「できる限りのことをする──緋宮会長と同じことをしているだけですから」"

[[dialogue]]
speaker = "クロト"
# 「……ありがとう、フィオナ」
line = "「……ありがとう、フィオナ」"

[[dialogue]]
speaker = "ナミエル"
# 「失礼します。お茶のおかわりをお持ちしました」
line = "「失礼します。お茶のおかわりをお持ちしました」"

[[dialogue]]
speaker = "フィオナ"
# 「ナミエル、ご苦労様。レティシアさんから先にお願いね」
line = "「ナミエル、ご苦労様。レティシアさんから先にお願いね」"

[[dialogue]]
speaker = "ナミエル"
# 「……かしこまりました」
line = "「……かしこまりました」"

[[dialogue]]
speaker = "フィオナ"
# 「あ、ちょっと……平行世界からのお客様なんだから。そんなに睨んじゃ──」
line = "「あ、ちょっと……平行世界からのお客様なんだから。そんなに睨んじゃ──」"

[[dialogue]]
speaker = "レティシア"
# 「構わないわ。むしろ落ち着くくらい。ようやく頭の中がお花畑じゃない子がいたわね？」
line = "「構わないわ。むしろ落ち着くくらい。ようやく頭の中がお花畑じゃない子がいたわね？」"

[[dialogue]]
speaker = "ナミエル"
# 「……アルタイルとデネブの状況は理解していますが、お嬢様に害をなすようであれば容赦はしません」
line = "「……アルタイルとデネブの状況は理解していますが、お嬢様に害をなすようであれば容赦はしません」"

[[dialogue]]
speaker = "レティシア"
# 「ええ。そのくらいの距離感でいて？　その方が、いざという時に斬りやすいもの」
line = "「ええ。そのくらいの距離感でいて？　その方が、いざという時に斬りやすいもの」"

[[dialogue]]
speaker = "unk"
# 一触即発の空気だ……レティシアは本当に難攻不落な気がする。
line = "一触即発の空気だ……レティシアは本当に難攻不落な気がする。"

[[dialogue]]
speaker = "unk"
# ナミエルがレティシアの近くまで歩み寄る──紅茶のポットを置き、カップの中身を注ぎ足す。
line = "ナミエルがレティシアの近くまで歩み寄る──紅茶のポットを置き、カップの中身を注ぎ足す。"

[[dialogue]]
speaker = "レティシア"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# その何でもない所作を、レティシアはジッと注視している。
line = "その何でもない所作を、レティシアはジッと注視している。"

[[dialogue]]
speaker = "unk"
# そして──
line = "そして──"

[[dialogue]]
speaker = "レティシア"
# 「──あなた。その身のこなし、どこで身に着けたの？」
line = "「──あなた。その身のこなし、どこで身に着けたの？」"

[[dialogue]]
speaker = "unk"
# とても珍しい、レティシアからの能動的な声かけに、俺は耳を疑った。
line = "とても珍しい、レティシアからの能動的な声かけに、俺は耳を疑った。"

[[dialogue]]
speaker = "レティシア"
# 「足音を極端に殺して歩く……腕を動かす時、衣擦れが起きないように……それ、無意識でしょう。どこで習ったの？」
line = "「足音を極端に殺して歩く……腕を動かす時、衣擦れが起きないように……それ、無意識でしょう。どこで習ったの？」"

[[dialogue]]
speaker = "ナミエル"
# 「…………昔、とある組織で。それが何か？」
line = "「…………昔、とある組織で。それが何か？」"

[[dialogue]]
speaker = "レティシア"
# 「……いいえ。何でもないわ。忘れて頂戴」
line = "「……いいえ。何でもないわ。忘れて頂戴」"

[[dialogue]]
speaker = "ナミエル"
# 「そうですか。ではおくつろぎください。失礼します」
line = "「そうですか。ではおくつろぎください。失礼します」"

[[dialogue]]
speaker = "レティシア"
# 「……………………」
line = "「……………………」"

[[dialogue]]
speaker = "クロト"
# 「サーシャさん。レティシアのこと、どう思いますか？」
line = "「サーシャさん。レティシアのこと、どう思いますか？」"

[[dialogue]]
speaker = "サーシャ"
# 「取り付く島もないって、このことかしら。ルヴィネちゃんに相当心酔してるみたい」
line = "「取り付く島もないって、このことかしら。ルヴィネちゃんに相当心酔してるみたい」"

[[dialogue]]
speaker = "サーシャ"
# 「あの子の担当は私で正解ね。ちょっとでも隙を見せたら、人質を取られて、セレスティアも奪われちゃいそう」
line = "「あの子の担当は私で正解ね。ちょっとでも隙を見せたら、人質を取られて、セレスティアも奪われちゃいそう」"

[[dialogue]]
speaker = "クロト"
# 「……ですよね」
line = "「……ですよね」"

[[dialogue]]
speaker = "サーシャ"
# 「説得できるか怪しいわね～。今日あの子と模擬戦闘をしたけれど……本当に機械を相手にしてるみたいだったわ」
line = "「説得できるか怪しいわね～。今日あの子と模擬戦闘をしたけれど……本当に機械を相手にしてるみたいだったわ」"

[[dialogue]]
speaker = "サーシャ"
# 「会長くんは武器を使わないけれど、なんとなくわからない？　太刀筋には感情が乗るでしょう？」
line = "「会長くんは武器を使わないけれど、なんとなくわからない？　太刀筋には感情が乗るでしょう？」"

[[dialogue]]
speaker = "unk"
# サーシャさんの言うことはよくわかる。その人間の身に着けた武芸というものは、時として言葉よりも雄弁なことがある。
line = "サーシャさんの言うことはよくわかる。その人間の身に着けた武芸というものは、時として言葉よりも雄弁なことがある。"

[[dialogue]]
speaker = "unk"
# 俺が、黒騎士となったセイファート学園長の正体に気づけたキッカケも、彼の放つ太刀筋に覚えがあったからだ。
line = "俺が、黒騎士となったセイファート学園長の正体に気づけたキッカケも、彼の放つ太刀筋に覚えがあったからだ。"

[[dialogue]]
speaker = "サーシャ"
# 「レティシアちゃんの攻撃には、何もないの。恨みも憎しみも、焦りもいら立ちも。喜びも悲しみもない」
line = "「レティシアちゃんの攻撃には、何もないの。恨みも憎しみも、焦りもいら立ちも。喜びも悲しみもない」"

[[dialogue]]
speaker = "サーシャ"
# 「打ち合えば打ち合うほど……言葉を選ばずに言うと、ぞっとするの」
line = "「打ち合えば打ち合うほど……言葉を選ばずに言うと、ぞっとするの」"

[[dialogue]]
speaker = "サーシャ"
# 「この子は『空っぽ』なんじゃないかって」
line = "「この子は『空っぽ』なんじゃないかって」"

[[dialogue]]
speaker = "クロト"
# 「……彼女の生い立ちが関係しているんでしょうか？」
line = "「……彼女の生い立ちが関係しているんでしょうか？」"

[[dialogue]]
speaker = "サーシャ"
# 「そうかもしれないわね。ベアトリスちゃん達から聞いたわ。バジュラ教団のような新興宗教で育ったって」
line = "「そうかもしれないわね。ベアトリスちゃん達から聞いたわ。バジュラ教団のような新興宗教で育ったって」"

[[dialogue]]
speaker = "クロト"
# 「アナも出生記録がないと言っていましたね。俺たちには想像もできない、辛い過去があったのかも……」
line = "「アナも出生記録がないと言っていましたね。俺たちには想像もできない、辛い過去があったのかも……」"

[[dialogue]]
speaker = "サーシャ"
# 「そこから救い出してくれたのが、ルヴィネちゃんだったとしたら……依存も感じるけれど、相当の恩義もありそうね～」
line = "「そこから救い出してくれたのが、ルヴィネちゃんだったとしたら……依存も感じるけれど、相当の恩義もありそうね～」"

[[dialogue]]
speaker = "unk"
# だとすると、レティシアにとってルヴィネは、ナミエルにおけるフィオナのようなもの……？
line = "だとすると、レティシアにとってルヴィネは、ナミエルにおけるフィオナのようなもの……？"

[[dialogue]]
speaker = "unk"
# いつレティシアに真実を伝えるか。伝えたところで信じてもらえるのか──まったく成功する気がしない。
line = "いつレティシアに真実を伝えるか。伝えたところで信じてもらえるのか──まったく成功する気がしない。"

[[dialogue]]
speaker = "unk"
# 結局その後、妙案が見つかることはなく……
line = "結局その後、妙案が見つかることはなく……"

[[dialogue]]
speaker = "unk"
# これからもレティシアとは折に触れて接していこうと決めて、サーシャさんとは解散するのだった。
line = "これからもレティシアとは折に触れて接していこうと決めて、サーシャさんとは解散するのだった。"

[[dialogue]]
speaker = "unk"
# しかし事態は突然、動いた。
line = "しかし事態は突然、動いた。"

[[dialogue]]
speaker = "unk"
# その日の真夜中──俺のＤＩＳＣに緊急連絡が入った。
line = "その日の真夜中──俺のＤＩＳＣに緊急連絡が入った。"

[[dialogue]]
speaker = "サーシャ"
# 『会長くん。緊急事態よ──すぐに来て！』
line = "『会長くん。緊急事態よ──すぐに来て！』"

[[dialogue]]
speaker = "サーシャ"
# 『レティシアちゃんが学園からいなくなったわ。セレスティアも１つ足りないの……！』
line = "『レティシアちゃんが学園からいなくなったわ。セレスティアも１つ足りないの……！』"
