[[dialogue]]
speaker = "unk"
# 第２話,ルヴィネのバイト遍歴,P
line = "第２話,ルヴィネのバイト遍歴,P"

[[dialogue]]
speaker = "unk"
# 極星学園の皆の、アルタイル滞在はまだまだ続く──今日は５人全員が、星徒会室へやって来ていた。
line = "極星学園の皆の、アルタイル滞在はまだまだ続く──今日は５人全員が、星徒会室へやって来ていた。"

[[dialogue]]
speaker = "チナ"
# 「そういや小耳に挟んだんだけどさ。魔王も新星学園に転入する前は、アルバイトばっかりしてたって本当なのか？」
line = "「そういや小耳に挟んだんだけどさ。魔王も新星学園に転入する前は、アルバイトばっかりしてたって本当なのか？」"

[[dialogue]]
speaker = "unk"
# 学費を貯めなきゃいけなかったから
line = "学費を貯めなきゃいけなかったから"

[[dialogue]]
speaker = "unk"
# ああ、そうだよ
line = "ああ、そうだよ"

[[dialogue]]
speaker = "ルヴィネ"
# 「へぇ。私と魔王には、意外な共通点があったのね」
line = "「へぇ。私と魔王には、意外な共通点があったのね」"

[[dialogue]]
speaker = "ルヴィネ"
# 「と言っても、私がバイトをしていたのは、デネブの人達に献身を見せつけるため……打算の行動ではあったけれど……」
line = "「と言っても、私がバイトをしていたのは、デネブの人達に献身を見せつけるため……打算の行動ではあったけれど……」"

[[dialogue]]
speaker = "ベアトリス"
# 「ルヴィって本当に色々なところで働いてたよね。お洒落なカフェに、映画館に、美術館──」
line = "「ルヴィって本当に色々なところで働いてたよね。お洒落なカフェに、映画館に、美術館──」"

[[dialogue]]
speaker = "グレイス"
# 「スイーツショップとかステーキハウスとかでも働いてましたから、美味しいご飯の情報もたくさん貰えてました！」
line = "「スイーツショップとかステーキハウスとかでも働いてましたから、美味しいご飯の情報もたくさん貰えてました！」"

[[dialogue]]
speaker = "レティシア"
# 「でも冷凍マグロの倉庫バイトとか、工事現場みたいな体力を使う仕事も多かったわよね」
line = "「でも冷凍マグロの倉庫バイトとか、工事現場みたいな体力を使う仕事も多かったわよね」"

[[dialogue]]
speaker = "チナ"
# 「アタシが知ってるだけでも１０や２０じゃ利かないくらいの場所で働いてたしなー……いつ寝てるんだって感じだったから心配だったよ」
line = "「アタシが知ってるだけでも１０や２０じゃ利かないくらいの場所で働いてたしなー……いつ寝てるんだって感じだったから心配だったよ」"

[[dialogue]]
speaker = "マトイ"
# 「へぇぇ……意外かも。うちの会長だけだと思ってたよ、そんなにたくさんのバイトをしてる人って」
line = "「へぇぇ……意外かも。うちの会長だけだと思ってたよ、そんなにたくさんのバイトをしてる人って」"

[[dialogue]]
speaker = "ルヴィネ"
# 「変わり種のバイトについては……依頼が来る以上は請けようと思っていただけよ。デネブはどこも人手が足りないし……」
line = "「変わり種のバイトについては……依頼が来る以上は請けようと思っていただけよ。デネブはどこも人手が足りないし……」"

[[dialogue]]
speaker = "アナ"
# 「人心掌握のため、とは言いますが……ルヴィネさん、案外アルバイトそのものを楽しんでいたのでは？」
line = "「人心掌握のため、とは言いますが……ルヴィネさん、案外アルバイトそのものを楽しんでいたのでは？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「まあ、そうね──性に合っていたのかしら。大変だったけれど、労働そのものは楽しかったと思うわ」
line = "「まあ、そうね──性に合っていたのかしら。大変だったけれど、労働そのものは楽しかったと思うわ」"

[[dialogue]]
speaker = "unk"
# わかる。労働って楽しいよな
line = "わかる。労働って楽しいよな"

[[dialogue]]
speaker = "ルヴィネ"
# 「職場の数だけ、色々なヒトがいるものね。できることも増えていくし……」
line = "「職場の数だけ、色々なヒトがいるものね。できることも増えていくし……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「でも流石のルヴィネおばちゃんも、うちのクロトのバイト遍歴には敵わないんじゃないかしら！」
line = "「でも流石のルヴィネおばちゃんも、うちのクロトのバイト遍歴には敵わないんじゃないかしら！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「…………っ」
line = "「…………っ」"

[[dialogue]]
speaker = "アナ"
# 「前会長。またそうやって無自覚に対立をあおるようなことを……」
line = "「前会長。またそうやって無自覚に対立をあおるようなことを……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……魔王がいくらバイト漬けだったからといって、職歴の数で私が負けるとは思えないけれど？」
line = "「……魔王がいくらバイト漬けだったからといって、職歴の数で私が負けるとは思えないけれど？」"

[[dialogue]]
speaker = "unk"
# 勝つのは──俺だ！！
line = "勝つのは──俺だ！！"

[[dialogue]]
speaker = "unk"
# 試してみるか？
line = "試してみるか？"

[[dialogue]]
speaker = "ヴィーナス"
# 「じゃあ早速、勝負スタートね！！」
line = "「じゃあ早速、勝負スタートね！！」"

[[dialogue]]
speaker = "unk"
# そうしてルヴィネとバイト遍歴の数で勝負することになったのだが──
line = "そうしてルヴィネとバイト遍歴の数で勝負することになったのだが──"

[[dialogue]]
speaker = "ルヴィネ"
# 「回転寿司屋！　ライブ会場の設営！　ドーナツショップ！　交通量調査──！」
line = "「回転寿司屋！　ライブ会場の設営！　ドーナツショップ！　交通量調査──！」"

[[dialogue]]
speaker = "unk"
# ゲームセンター！　ボドゲカフェ！
line = "ゲームセンター！　ボドゲカフェ！"

[[dialogue]]
speaker = "unk"
# ペットショップ！　カレースタンド！
line = "ペットショップ！　カレースタンド！"

[[dialogue]]
speaker = "ルヴィネ"
# 「……やるわね魔王。今のところ、互角のようだわ」
line = "「……やるわね魔王。今のところ、互角のようだわ」"

[[dialogue]]
speaker = "チナ"
# 「す、すげえ。ルヴィに張り合ってる……！？　魔王のやつ、そこまでバイト漬けだったのか！」
line = "「す、すげえ。ルヴィに張り合ってる……！？　魔王のやつ、そこまでバイト漬けだったのか！」"

[[dialogue]]
speaker = "レティシア"
# 「まさかルヴィと肩を並べるバイト戦士がいただなんて……」
line = "「まさかルヴィと肩を並べるバイト戦士がいただなんて……」"

[[dialogue]]
speaker = "マトイ"
# 「さ、最初はただの雑談だったはずなのに……今は私、会長を応援しちゃってる！　負けないで会長……！」
line = "「さ、最初はただの雑談だったはずなのに……今は私、会長を応援しちゃってる！　負けないで会長……！」"

[[dialogue]]
speaker = "アナ"
# 「ですが経歴の数で争っては、いつまで経っても勝敗が決まりそうにないですね」
line = "「ですが経歴の数で争っては、いつまで経っても勝敗が決まりそうにないですね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「よーし、それじゃあ相手のやったことのないアルバイトをたくさん挙げた方が勝ちにしましょう！　今決めたわ！」
line = "「よーし、それじゃあ相手のやったことのないアルバイトをたくさん挙げた方が勝ちにしましょう！　今決めたわ！」"

[[dialogue]]
speaker = "サーシャ"
# 「あらあら～、うふふ♪」
line = "「あらあら～、うふふ♪」"

[[dialogue]]
speaker = "unk"
# 花嫁修業教室──どうだルヴィネ！？
line = "花嫁修業教室──どうだルヴィネ！？"

[[dialogue]]
speaker = "ルヴィネ"
# 「バイト漬けだったのだから、ブライダル関係のアルバイトも経験済みよ。舐めないで頂戴」
line = "「バイト漬けだったのだから、ブライダル関係のアルバイトも経験済みよ。舐めないで頂戴」"

[[dialogue]]
speaker = "unk"
# くっ……やるな！
line = "くっ……やるな！"

[[dialogue]]
speaker = "ルヴィネ"
# 「反撃しましょう──メイド喫茶。男性の貴方には難しいはずよ。私はオムライスにハートを描いて、萌え萌えキュンをしたことがあるわ」
line = "「反撃しましょう──メイド喫茶。男性の貴方には難しいはずよ。私はオムライスにハートを描いて、萌え萌えキュンをしたことがあるわ」"

[[dialogue]]
speaker = "unk"
# 舐めるな！　経験済みだぞ！
line = "舐めるな！　経験済みだぞ！"

[[dialogue]]
speaker = "チナ"
# 「何であるんだよ！？」
line = "「何であるんだよ！？」"

[[dialogue]]
speaker = "アナ"
# 「会長は女装メイド喫茶で、かつてナンバーワンの実力者でした」
line = "「会長は女装メイド喫茶で、かつてナンバーワンの実力者でした」"

[[dialogue]]
speaker = "チナ"
# 「なんでこの副会長は誇らしげなんだ！？」
line = "「なんでこの副会長は誇らしげなんだ！？」"

[[dialogue]]
speaker = "unk"
# ──芸能事務所のプロデューサー！
line = "──芸能事務所のプロデューサー！"

[[dialogue]]
speaker = "ルヴィネ"
# 「──っ！？　何ですって……！？」
line = "「──っ！？　何ですって……！？」"

[[dialogue]]
speaker = "ベアトリス"
# 「ルヴィがアイドルのプロデュースをしていたのは、聞いたことがないかも……！？」
line = "「ルヴィがアイドルのプロデュースをしていたのは、聞いたことがないかも……！？」"

[[dialogue]]
speaker = "アナ"
# 「来ました。これはチェックメイトでしょうか」
line = "「来ました。これはチェックメイトでしょうか」"

[[dialogue]]
speaker = "チナ"
# 「ま、まだだ！　ルヴィはまだ負けてない！」
line = "「ま、まだだ！　ルヴィはまだ負けてない！」"

[[dialogue]]
speaker = "グレイス"
# 「ルヴィ、こちらも奥の手を出すべきです！　あるじゃないですか、超レアのアルバイトが！！」
line = "「ルヴィ、こちらも奥の手を出すべきです！　あるじゃないですか、超レアのアルバイトが！！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「えっ──グレイス！？　貴女、まさか──」
line = "「えっ──グレイス！？　貴女、まさか──」"

[[dialogue]]
speaker = "レティシア"
# 「……あったわね。あのルヴィが１日で辞めちゃったお仕事」
line = "「……あったわね。あのルヴィが１日で辞めちゃったお仕事」"

[[dialogue]]
speaker = "グレイス"
# 「ええ！　ルヴィはですね、昔──！」
line = "「ええ！　ルヴィはですね、昔──！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「──やっ、やめなさい！　止まりなさい！！　待って！　お願い──！」
line = "「──やっ、やめなさい！　止まりなさい！！　待って！　お願い──！」"

[[dialogue]]
speaker = "グレイス"
# 「ルヴィは……Ｖチューバーだったことがあります！！」
line = "「ルヴィは……Ｖチューバーだったことがあります！！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「──────やめて！！！！！」
line = "「──────やめて！！！！！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「なななっ、なんですってーーー！？」
line = "「なななっ、なんですってーーー！？」"

[[dialogue]]
speaker = "グレイス"
# 「ポラリスプロダクションから持ち込まれたお仕事で、現役星騎士Ｖチューバーという肩書きでデビューしたんですよっ！」
line = "「ポラリスプロダクションから持ち込まれたお仕事で、現役星騎士Ｖチューバーという肩書きでデビューしたんですよっ！」"

[[dialogue]]
speaker = "ベアトリス"
# 「あったね～……私たちが１年生の頃だっけ。Ｖチューバーの『<ruby=あけぼし>明星</ruby>ルミナ』ちゃん……」
line = "「あったね～……私たちが１年生の頃だっけ。Ｖチューバーの『<ruby>明星<rt>あけぼし</rt></ruby>ルミナ』ちゃん……」"

[[dialogue]]
speaker = "チナ"
# 「あのルヴィが、めっちゃキャラ作ってたんだよなぁ……きゃぴきゃぴした感じで挨拶して……」
line = "「あのルヴィが、めっちゃキャラ作ってたんだよなぁ……きゃぴきゃぴした感じで挨拶して……」"

[[dialogue]]
speaker = "レティシア"
# 「でもデビュー初日の配信で、すぐに声でバレちゃったのよね。コメント欄が『ルヴィネ様』一色になって──」
line = "「でもデビュー初日の配信で、すぐに声でバレちゃったのよね。コメント欄が『ルヴィネ様』一色になって──」"

[[dialogue]]
speaker = "ルヴィネ"
# 「む、蒸し返さないで頂戴……いくら求められたからといって、あれは請けるべきではなかったわ……」
line = "「む、蒸し返さないで頂戴……いくら求められたからといって、あれは請けるべきではなかったわ……」"

[[dialogue]]
speaker = "グレイス"
# 「そんなに気にしなくても。大量の送金チャットで製作費はペイできたじゃないですか！　ポラプロさんも損失はなかったって言ってましたよ？」
line = "「そんなに気にしなくても。大量の送金チャットで製作費はペイできたじゃないですか！　ポラプロさんも損失はなかったって言ってましたよ？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「忘れたいのよ！　察しなさい、グレイス！！」
line = "「忘れたいのよ！　察しなさい、グレイス！！」"

[[dialogue]]
speaker = "unk"
# 俺、Ｖチューバーはしたことがない……！
line = "俺、Ｖチューバーはしたことがない……！"

[[dialogue]]
speaker = "グレイス"
# 「やりました！　これで一勝一敗ですよ、ルヴィ！」
line = "「やりました！　これで一勝一敗ですよ、ルヴィ！」"

[[dialogue]]
speaker = "アナ"
# 「というか気になりますね、<ruby=あけぼし>明星</ruby>ルミナ。デネブに行けば調べられるでしょうか？」
line = "「というか気になりますね、<ruby>明星<rt>あけぼし</rt></ruby>ルミナ。デネブに行けば調べられるでしょうか？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「私の負けよ、魔王……殺して頂戴」
line = "「私の負けよ、魔王……殺して頂戴」"

[[dialogue]]
speaker = "unk"
# こうして第一次アルバイト遍歴バトルは幕を閉じた。
line = "こうして第一次アルバイト遍歴バトルは幕を閉じた。"

[[dialogue]]
speaker = "unk"
# ルヴィネとは会長という役職以外にも、共通点が多いなと感じる１日なのだった──
line = "ルヴィネとは会長という役職以外にも、共通点が多いなと感じる１日なのだった──"
