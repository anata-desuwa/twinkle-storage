[[dialogue]]
speaker = "unk"
# ――目が覚めると、そこは何故か新星学園保健室のベッドの上だった。
line = "――目が覚めると、そこは何故か新星学園保健室のベッドの上だった。"

[[dialogue]]
speaker = "マトイ"
# 「あっ！　会長、起きた！？」
line = "「あっ！　会長、起きた！？」"

[[dialogue]]
speaker = "unk"
# マトイ……？
line = "マトイ……？"

[[dialogue]]
speaker = "マトイ"
# 「目が覚めて、よかった～。先生は体に傷とかはないって言ってたけど、心配してたんだよ？」
line = "「目が覚めて、よかった～。先生は体に傷とかはないって言ってたけど、心配してたんだよ？」"

[[dialogue]]
speaker = "マトイ"
# 「星徒会室の前の廊下で倒れてたのを発見した時は、血の気が引いたよ。もしかして過労で！？　とか思っちゃったりして……」
line = "「星徒会室の前の廊下で倒れてたのを発見した時は、血の気が引いたよ。もしかして過労で！？　とか思っちゃったりして……」"

[[dialogue]]
speaker = "マトイ"
# 「でも、診察した先生は過労じゃないって言ってて。会長、一体何があったの？」
line = "「でも、診察した先生は過労じゃないって言ってて。会長、一体何があったの？」"

[[dialogue]]
speaker = "unk"
# なんで倒れてたのか、思い出せない……
line = "なんで倒れてたのか、思い出せない……"

[[dialogue]]
speaker = "マトイ"
# 「え？　自分でもわからないってこと？」
line = "「え？　自分でもわからないってこと？」"

[[dialogue]]
speaker = "マトイ"
# 「――それだけじゃないって？　一体どういう……」
line = "「――それだけじゃないって？　一体どういう……」"

[[dialogue]]
speaker = "？？？"
# 「会長さま、ご無事ですか！？」
line = "「会長さま、ご無事ですか！？」"

[[dialogue]]
speaker = "マトイ"
# 「あっ、トマル！」
line = "「あっ、トマル！」"

[[dialogue]]
speaker = "トマル"
# 「はぁっ……はぁっ……！　マトイ姉さま！　会長さまの容体は！？」
line = "「はぁっ……はぁっ……！　マトイ姉さま！　会長さまの容体は！？」"

[[dialogue]]
speaker = "マトイ"
# 「息切れしてるじゃない。ひとまず落ち着いて。会長は大丈夫だから」
line = "「息切れしてるじゃない。ひとまず落ち着いて。会長は大丈夫だから」"

[[dialogue]]
speaker = "トマル"
# 「ご無事なのですね……！　よかった……！」
line = "「ご無事なのですね……！　よかった……！」"

[[dialogue]]
speaker = "トマル"
# 「会長さまを探していたら、保健室に運び込まれたと聞いて……！」
line = "「会長さまを探していたら、保健室に運び込まれたと聞いて……！」"

[[dialogue]]
speaker = "unk"
# 心配してくれてありがとう
line = "心配してくれてありがとう"

[[dialogue]]
speaker = "トマル"
# 「いえ、会長さまがご無事ならそれで……！」
line = "「いえ、会長さまがご無事ならそれで……！」"

[[dialogue]]
speaker = "トマル"
# 「――え？　どうしたのですか、会長さま？　いきなり謝られたりして……」
line = "「――え？　どうしたのですか、会長さま？　いきなり謝られたりして……」"

[[dialogue]]
speaker = "マトイ"
# 「――気を悪くしないでほしいって？　なんか、浮かない顔してるけど……」
line = "「――気を悪くしないでほしいって？　なんか、浮かない顔してるけど……」"

[[dialogue]]
speaker = "unk"
# 実は……トマル？　のことが思い出せないんだ
line = "実は……トマル？　のことが思い出せないんだ"

[[dialogue]]
speaker = "トマル"
# 「え！？　会長さま……まさか……！」
line = "「え！？　会長さま……まさか……！」"

[[dialogue]]
speaker = "マトイ"
# 「いやいや！　今まで何度も会ってるでしょ！？」
line = "「いやいや！　今まで何度も会ってるでしょ！？」"

[[dialogue]]
speaker = "マトイ"
# 「私の弟の、<ruby=よみの>詠野</ruby>トマルよ！　まさか……忘れちゃったの！？」
line = "「私の弟の、<ruby>詠野<rt>よみの</rt></ruby>トマルよ！　まさか……忘れちゃったの！？」"

[[dialogue]]
speaker = "unk"
# マトイの弟…………弟！？！？
line = "マトイの弟…………弟！？！？"

[[dialogue]]
speaker = "マトイ"
# 「まあ、どうやっても美少女にしか見えないけど……」
line = "「まあ、どうやっても美少女にしか見えないけど……」"

[[dialogue]]
speaker = "トマル"
# 「あはは……はい。お恥ずかしながら――」
line = "「あはは……はい。お恥ずかしながら――」"

[[dialogue]]
speaker = "トマル"
# 「私、男なんです……」
line = "「私、男なんです……」"

[[dialogue]]
speaker = "unk"
# え……えええぇぇぇーーーーーーっ！！？
line = "え……えええぇぇぇーーーーーーっ！！？"
