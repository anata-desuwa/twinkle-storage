[[dialogue]]
speaker = "unk"
# 星霊祭が近づきつつあったある日、俺はマムから言われていたことがあった――
line = "星霊祭が近づきつつあったある日、俺はマムから言われていたことがあった――"

[[dialogue]]
speaker = "マハムート"
# 「会長、来たる星霊祭に向けて、『アルケインコード』の扱いについて伝えておきたいことがあるわ」
line = "「会長、来たる星霊祭に向けて、『アルケインコード』の扱いについて伝えておきたいことがあるわ」"

[[dialogue]]
speaker = "マハムート"
# 「星霊祭では、総合優勝した学園側に『学園対抗杯』の大きなポイントが与えられる」
line = "「星霊祭では、総合優勝した学園側に『学園対抗杯』の大きなポイントが与えられる」"

[[dialogue]]
speaker = "unk"
# 学園対抗杯とは、両学園の星騎士たちを切磋琢磨させる為、モンスターの撃破数などをポイントとして視覚化し、競争を推奨する制度である。
line = "学園対抗杯とは、両学園の星騎士たちを切磋琢磨させる為、モンスターの撃破数などをポイントとして視覚化し、競争を推奨する制度である。"

[[dialogue]]
speaker = "マハムート"
# 「そして、星霊祭で行われる競技の中で、特に大きな配点種目の１つとなっているのが、個人戦となる星霊舞闘会」
line = "「そして、星霊祭で行われる競技の中で、特に大きな配点種目の１つとなっているのが、個人戦となる星霊舞闘会」"

[[dialogue]]
speaker = "マハムート"
# 「舞闘会で優勝した生徒の所属する学園側には、星霊祭での大きなポイントが与えられる」
line = "「舞闘会で優勝した生徒の所属する学園側には、星霊祭での大きなポイントが与えられる」"

[[dialogue]]
speaker = "マハムート"
# 「つまりは、会長……あなたが持つ、星騎士を覚醒させることができる魔王の技――アルケインコードは、新星学園側の大きなアドバンテージになる力よ」
line = "「つまりは、会長……あなたが持つ、星騎士を覚醒させることができる魔王の技――アルケインコードは、新星学園側の大きなアドバンテージになる力よ」"

[[dialogue]]
speaker = "マハムート"
# 「だけど……私は、それは公平ではないと思っている」
line = "「だけど……私は、それは公平ではないと思っている」"

[[dialogue]]
speaker = "マハムート"
# 「学園対抗杯も、星霊祭も、舞闘会も、両学園で競い合うことで切磋琢磨して、共に強くなる為にある。だというのに――」
line = "「学園対抗杯も、星霊祭も、舞闘会も、両学園で競い合うことで切磋琢磨して、共に強くなる為にある。だというのに――」"

[[dialogue]]
speaker = "マハムート"
# 「会長が新星学園側だからという理由で、流星学園の子たちの可能性を押さえつけてしまうのでは、競い合っている意味がない」
line = "「会長が新星学園側だからという理由で、流星学園の子たちの可能性を押さえつけてしまうのでは、競い合っている意味がない」"

[[dialogue]]
speaker = "マハムート"
# 「両学園の生徒たちには私が責任を持って、説明するわ。だから、会長――」
line = "「両学園の生徒たちには私が責任を持って、説明するわ。だから、会長――」"

[[dialogue]]
speaker = "マハムート"
# 「公平を期す為に、星霊祭までにもし覚醒できる子がいれば、どちらの学園でも関係なく使ってあげなさい」
line = "「公平を期す為に、星霊祭までにもし覚醒できる子がいれば、どちらの学園でも関係なく使ってあげなさい」"

[[dialogue]]
speaker = "マハムート"
# 「それが、新星寮の寮長としてではなく……学園の先輩星騎士としての、私の望みよ」
line = "「それが、新星寮の寮長としてではなく……学園の先輩星騎士としての、私の望みよ」"

[[dialogue]]
speaker = "unk"
# その翌日、マムから説明を受けたと言って、ヒルディオーネ先輩とフニが俺のところへやって来た。
line = "その翌日、マムから説明を受けたと言って、ヒルディオーネ先輩とフニが俺のところへやって来た。"

[[dialogue]]
speaker = "フェニエル"
# 「会長さん、お願いします。私――星霊舞闘会までに、ノヴァフォームに覚醒したいんです！」
line = "「会長さん、お願いします。私――星霊舞闘会までに、ノヴァフォームに覚醒したいんです！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「私からもお願い致しますわ。会長、どうか私たちに力をお貸し下さいませ」
line = "「私からもお願い致しますわ。会長、どうか私たちに力をお貸し下さいませ」"

[[dialogue]]
speaker = "unk"
# こうして、真剣な顔で頭を深く下げる２人に、俺は協力することを決めたのだった――
line = "こうして、真剣な顔で頭を深く下げる２人に、俺は協力することを決めたのだった――"

[[dialogue]]
speaker = "unk"
# 北海道での週末合宿は、あっという間に３日目を迎えていた。
line = "北海道での週末合宿は、あっという間に３日目を迎えていた。"

[[dialogue]]
speaker = "unk"
# 明日からは平日となる為、今日の夜には流星市国へと帰らなくはならない。だが――
line = "明日からは平日となる為、今日の夜には流星市国へと帰らなくはならない。だが――"

[[dialogue]]
speaker = "フェニエル"
# 「はぁっ……はぁっ……！」
line = "「はぁっ……はぁっ……！」"

[[dialogue]]
speaker = "unk"
# フ二は未だ、覚醒の兆しを得られていなかった。何度も攻撃を受けて、戦闘服はボロボロになり、息も絶え絶えで足がふらついている。
line = "フ二は未だ、覚醒の兆しを得られていなかった。何度も攻撃を受けて、戦闘服はボロボロになり、息も絶え絶えで足がふらついている。"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「……会長、フニに覚醒の輝きは見えまして？」
line = "「……会長、フニに覚醒の輝きは見えまして？」"

[[dialogue]]
speaker = "unk"
# ……いや、ダメです
line = "……いや、ダメです"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「そう……そろそろ日も暮れて来ましたし、潮時ですわね……」
line = "「そう……そろそろ日も暮れて来ましたし、潮時ですわね……」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「フニ。残念ですが、合宿はここまでに――」
line = "「フニ。残念ですが、合宿はここまでに――」"

[[dialogue]]
speaker = "フェニエル"
# 「まだ……です。ここで諦めるわけにはいきません……！」
line = "「まだ……です。ここで諦めるわけにはいきません……！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「フニ……？」
line = "「フニ……？」"

[[dialogue]]
speaker = "フェニエル"
# 「私……以前のバトルフェスタ・ペンタグラムの時に、会長さんと舞闘会で戦いたいって言いました。でも、それが叶わないとわかって、正直ガッカリしちゃってました……」
line = "「私……以前のバトルフェスタ・ペンタグラムの時に、会長さんと舞闘会で戦いたいって言いました。でも、それが叶わないとわかって、正直ガッカリしちゃってました……」"

[[dialogue]]
speaker = "unk"
# そう、俺は今回の星霊舞闘会に参加することはできない。
line = "そう、俺は今回の星霊舞闘会に参加することはできない。"

[[dialogue]]
speaker = "unk"
# それは、トーナメントを盛り上げる為に設けられたルールで『両学園の星徒会は舞闘会には参加できない』と取り決められている為だった。
line = "それは、トーナメントを盛り上げる為に設けられたルールで『両学園の星徒会は舞闘会には参加できない』と取り決められている為だった。"

[[dialogue]]
speaker = "フェニエル"
# 「だから……星霊舞闘会に出るのは、正直そこまで乗り気ではなかったんです。でも、最近になって、それとは別の強くなりたいと思う理由ができて……」
line = "「だから……星霊舞闘会に出るのは、正直そこまで乗り気ではなかったんです。でも、最近になって、それとは別の強くなりたいと思う理由ができて……」"

[[dialogue]]
speaker = "フェニエル"
# 「私――ヒルディーお姉様には、ご自身の望むまま、舞闘会に臨んで欲しいんです……！」
line = "「私――ヒルディーお姉様には、ご自身の望むまま、舞闘会に臨んで欲しいんです……！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「え？」
line = "「え？」"

[[dialogue]]
speaker = "フェニエル"
# 「お姉様……最近ずっと悩んでいらっしゃいますよね？」
line = "「お姉様……最近ずっと悩んでいらっしゃいますよね？」"

[[dialogue]]
speaker = "フェニエル"
# 「アルケインコードを使って覚醒するか、それとも……自力で覚醒できるようになるまで鍛錬し続けるか」
line = "「アルケインコードを使って覚醒するか、それとも……自力で覚醒できるようになるまで鍛錬し続けるか」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「……！　フニ、あなた、気づいていましたの……？」
line = "「……！　フニ、あなた、気づいていましたの……？」"

[[dialogue]]
speaker = "フェニエル"
# 「はい。――お姉様は、本当はもう、アルケインコードを使いさえすれば覚醒することができる。会長さん……そうですよね？」
line = "「はい。――お姉様は、本当はもう、アルケインコードを使いさえすれば覚醒することができる。会長さん……そうですよね？」"

[[dialogue]]
speaker = "unk"
# ……ああ、その通りだ
line = "……ああ、その通りだ"

[[dialogue]]
speaker = "unk"
# アルケインコードで覚醒できる条件――心に灯る眩い星のような輝きが、ヒルディオーネ先輩の中にはずっと見えていた。本当は、この合宿を始めるよりも以前から。
line = "アルケインコードで覚醒できる条件――心に灯る眩い星のような輝きが、ヒルディオーネ先輩の中にはずっと見えていた。本当は、この合宿を始めるよりも以前から。"

[[dialogue]]
speaker = "unk"
# もちろん、そのことは先輩に伝えてある。しかし……彼女からは、それを知った上で「考えさせて欲しい」と言われていた。
line = "もちろん、そのことは先輩に伝えてある。しかし……彼女からは、それを知った上で「考えさせて欲しい」と言われていた。"

[[dialogue]]
speaker = "フェニエル"
# 「お姉様は、本当は……１人の星騎士として、自力で覚醒を果たして、マムに挑みたいと思っているのではありませんか？」
line = "「お姉様は、本当は……１人の星騎士として、自力で覚醒を果たして、マムに挑みたいと思っているのではありませんか？」"

[[dialogue]]
speaker = "フェニエル"
# 「でも、どうするべきか悩んでしまっているのは……お姉様には『流星寮の寮長』という立場があるから」
line = "「でも、どうするべきか悩んでしまっているのは……お姉様には『流星寮の寮長』という立場があるから」"

[[dialogue]]
speaker = "フェニエル"
# 「最近、新星学園には会長さんのアルケインコードで覚醒した人たちが、多く現れるようになりました」
line = "「最近、新星学園には会長さんのアルケインコードで覚醒した人たちが、多く現れるようになりました」"

[[dialogue]]
speaker = "フェニエル"
# 「それによって機械型モンスターの撃破数が増えて……今の学園対抗杯は、新星学園側に逆転されている状況です」
line = "「それによって機械型モンスターの撃破数が増えて……今の学園対抗杯は、新星学園側に逆転されている状況です」"

[[dialogue]]
speaker = "フェニエル"
# 「そして、そのポイント差は日に日に開いていっている……。だからこそ、お姉様は悩んでいらっしゃるんですよね？」
line = "「そして、そのポイント差は日に日に開いていっている……。だからこそ、お姉様は悩んでいらっしゃるんですよね？」"

[[dialogue]]
speaker = "フェニエル"
# 「舞闘会や星霊祭、ひいては学園対抗杯で勝つ為に、自力で覚醒することは諦めて、アルケインコードに頼るかどうかを」
line = "「舞闘会や星霊祭、ひいては学園対抗杯で勝つ為に、自力で覚醒することは諦めて、アルケインコードに頼るかどうかを」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「……確実に覚醒することができるなら、流星寮の寮長として、使わないという選択肢はありませんわ」
line = "「……確実に覚醒することができるなら、流星寮の寮長として、使わないという選択肢はありませんわ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「なんとなく、自力で何かが掴めそうな予感があったとしても……それは、私個人のみっともないワガママですもの」
line = "「なんとなく、自力で何かが掴めそうな予感があったとしても……それは、私個人のみっともないワガママですもの」"

[[dialogue]]
speaker = "フェニエル"
# 「だから、私は今、ノヴァフォームに覚醒したいんです……！」
line = "「だから、私は今、ノヴァフォームに覚醒したいんです……！」"

[[dialogue]]
speaker = "フェニエル"
# 「お姉様がたとえギリギリまで覚醒できなかったとしても、私が代わりにノヴァフォームになれれば、お姉様の不安を肩代わりすることができるから！」
line = "「お姉様がたとえギリギリまで覚醒できなかったとしても、私が代わりにノヴァフォームになれれば、お姉様の不安を肩代わりすることができるから！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「……！　フニ、私の為にそこまで……」
line = "「……！　フニ、私の為にそこまで……」"

[[dialogue]]
speaker = "フェニエル"
# 「だからどうか、お姉様はご自身の信じる道を、そのまま進み続けて下さい！」
line = "「だからどうか、お姉様はご自身の信じる道を、そのまま進み続けて下さい！」"

[[dialogue]]
speaker = "フェニエル"
# 「ノヴァフォームになるという責務は――私が代わりに請け負ってみせますっ！！」
line = "「ノヴァフォームになるという責務は――私が代わりに請け負ってみせますっ！！」"

[[dialogue]]
speaker = "unk"
# フ二が力強く宣言した瞬間、俺には見えた。
line = "フ二が力強く宣言した瞬間、俺には見えた。"

[[dialogue]]
speaker = "unk"
# 彼女の心に灯る、眩い星の輝きが。だから――
line = "彼女の心に灯る、眩い星の輝きが。だから――"

[[dialogue]]
speaker = "unk"
# アルケインノヴァエクストリーム！
line = "アルケインノヴァエクストリーム！"

[[dialogue]]
speaker = "unk"
# 俺はフニの決意に応えて、アルケインコードを発動する。
line = "俺はフニの決意に応えて、アルケインコードを発動する。"

[[dialogue]]
speaker = "フェニエル"
# 「――会長さんと心が繋がって、なまらすごい力が湧いて来ます。これが……」
line = "「――会長さんと心が繋がって、なまらすごい力が湧いて来ます。これが……」"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「ノヴァフォームへの覚醒……！」
line = "「ノヴァフォームへの覚醒……！」"

[[dialogue]]
speaker = "ホウちゃん"
# 「――あなたの強い想い、私にも届きましたよ。フニ」
line = "「――あなたの強い想い、私にも届きましたよ。フニ」"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「え？　もしかして……ホウちゃん！？」
line = "「え？　もしかして……ホウちゃん！？」"

[[dialogue]]
speaker = "unk"
# フ二の横には、小さな不死鳥の姿があった。
line = "フ二の横には、小さな不死鳥の姿があった。"

[[dialogue]]
speaker = "unk"
# 彼女の中に宿っている魔獣『フェニックス』こと『ホウちゃん』は、微笑みを浮かべながら頷く。
line = "彼女の中に宿っている魔獣『フェニックス』こと『ホウちゃん』は、微笑みを浮かべながら頷く。"

[[dialogue]]
speaker = "ホウちゃん"
# 「これからは私も共に戦います。だから、フニ――ヒルディオーネさんへ、あなたの想いの力を見せてあげましょう！」
line = "「これからは私も共に戦います。だから、フニ――ヒルディオーネさんへ、あなたの想いの力を見せてあげましょう！」"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「うんっ……！」
line = "「うんっ……！」"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「お姉様――私のノヴァフォーム、見ていて下さいっ！」
line = "「お姉様――私のノヴァフォーム、見ていて下さいっ！」"

[[dialogue]]
speaker = "unk"
# そうして覚醒を果たしたフニは、もう１度、ヒルディオーネ先輩へと戦いを挑むのだった――
line = "そうして覚醒を果たしたフニは、もう１度、ヒルディオーネ先輩へと戦いを挑むのだった――"
