[[dialogue]]
speaker = "unk"
# 俺とヒマワリが付き合い出して、半月ほどが経ったある日。
line = "俺とヒマワリが付き合い出して、半月ほどが経ったある日。"

[[dialogue]]
speaker = "unk"
# 下校の途中、ヒマワリは耳を疑うようなことを言い出した。
line = "下校の途中、ヒマワリは耳を疑うようなことを言い出した。"

[[dialogue]]
speaker = "ヒマワリ"
# 「ねーねー、会長さん。えっちって、すごーく気持ちいいんだよね？」
line = "「ねーねー、会長さん。えっちって、すごーく気持ちいいんだよね？」"

[[dialogue]]
speaker = "クロト"
# 「……はい？」
line = "「……はい？」"

[[dialogue]]
speaker = "ヒマワリ"
# 「えっちだよ、えっち。セックス～とか子作り～って言った方がわかりやすい？」
line = "「えっちだよ、えっち。セックス～とか子作り～って言った方がわかりやすい？」"

[[dialogue]]
speaker = "クロト"
# 「だ、大丈夫、わかるよ。ヒマワリの口からいきなりすごい言葉が出たから驚いただけで」
line = "「だ、大丈夫、わかるよ。ヒマワリの口からいきなりすごい言葉が出たから驚いただけで」"

[[dialogue]]
speaker = "ヒマワリ"
# 「えー？　あたしだって年頃の女の子だもん。そのくらい知ってるし、興味津々だよー」
line = "「えー？　あたしだって年頃の女の子だもん。そのくらい知ってるし、興味津々だよー」"

[[dialogue]]
speaker = "ヒマワリ"
# 「気持ちよすぎるから、悪いってわかってても不倫とかいけないことしちゃうんだろうしなー……」
line = "「気持ちよすぎるから、悪いってわかってても不倫とかいけないことしちゃうんだろうしなー……」"

[[dialogue]]
speaker = "ヒマワリ"
# 「うーん、一度シてみないことにはわかんないよね。会長さんはえっち、シたことある？」
line = "「うーん、一度シてみないことにはわかんないよね。会長さんはえっち、シたことある？」"

[[dialogue]]
speaker = "クロト"
# 「いや、ないけど……」
line = "「いや、ないけど……」"

[[dialogue]]
speaker = "ヒマワリ"
# 「良かったー♪　会長さんに先越されてたら、ちょっとショックだったからさー」
line = "「良かったー♪　会長さんに先越されてたら、ちょっとショックだったからさー」"

[[dialogue]]
speaker = "ヒマワリ"
# 「彼氏以外の人とはシたくないから、ね、お願い♪　あたしとえっち、シてみない？」
line = "「彼氏以外の人とはシたくないから、ね、お願い♪　あたしとえっち、シてみない？」"

[[dialogue]]
speaker = "unk"
# その翌日、俺は好奇心旺盛で自由奔放なヒマワリと男女の一線を越えた。
line = "その翌日、俺は好奇心旺盛で自由奔放なヒマワリと男女の一線を越えた。"

[[dialogue]]
speaker = "unk"
# 気持ちいいことに貪欲な年頃だ。恋人同士のセックスなんて最高の快感を知ってしまったら、もう歯止めが利かない。
line = "気持ちいいことに貪欲な年頃だ。恋人同士のセックスなんて最高の快感を知ってしまったら、もう歯止めが利かない。"

[[dialogue]]
speaker = "unk"
# 週末に一度、お互いの部屋でしていたのが自然と回数が増えていき、週に２回、３回、やがて毎日に。
line = "週末に一度、お互いの部屋でしていたのが自然と回数が増えていき、週に２回、３回、やがて毎日に。"

[[dialogue]]
speaker = "unk"
# 下校後にしていたのも、どうしても我慢できなくなり、ついには昼休みにトイレでして以来。
line = "下校後にしていたのも、どうしても我慢できなくなり、ついには昼休みにトイレでして以来。"

[[dialogue]]
speaker = "unk"
# 屋上や体育倉庫と人目を忍びながらもスリルを求めてしまい、校内でするのが、すっかり癖になってしまった。
line = "屋上や体育倉庫と人目を忍びながらもスリルを求めてしまい、校内でするのが、すっかり癖になってしまった。"

[[dialogue]]
speaker = "unk"
# 付き合って数ヶ月が経った今となっては──
line = "付き合って数ヶ月が経った今となっては──"

[[dialogue]]
speaker = "ヒマワリ"
# 「えへへ、会長さんの教室に入るの初めてー。これが会長さんの机なんだねー」
line = "「えへへ、会長さんの教室に入るの初めてー。これが会長さんの机なんだねー」"

[[dialogue]]
speaker = "ヒマワリ"
# 「いつも、この席でマジメに勉強してるんだよね？　あたしが会長さんと同い年だったら、同じ教室で授業を受けてたのかな」
line = "「いつも、この席でマジメに勉強してるんだよね？　あたしが会長さんと同い年だったら、同じ教室で授業を受けてたのかな」"

[[dialogue]]
speaker = "ヒマワリ"
# 「隣の席になってー、授業中にちらちら顔を覗いたりしてー、消しゴム借りるのもドキドキしちゃってたりしてー。そんな思い出作りしてみたかったなー」
line = "「隣の席になってー、授業中にちらちら顔を覗いたりしてー、消しゴム借りるのもドキドキしちゃってたりしてー。そんな思い出作りしてみたかったなー」"

[[dialogue]]
speaker = "ヒマワリ"
# 「ね、会長さん。今日は、ここでえっちしよ？」
line = "「ね、会長さん。今日は、ここでえっちしよ？」"

[[dialogue]]
speaker = "クロト"
# 「ここで！？　それはさすがにマズいって！」
line = "「ここで！？　それはさすがにマズいって！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「えー、なんでー？　附属の女の子、連れ込んでるから？　将来有望な子を案内してるだけって言えば大丈夫だよ」
line = "「えー、なんでー？　附属の女の子、連れ込んでるから？　将来有望な子を案内してるだけって言えば大丈夫だよ」"

[[dialogue]]
speaker = "ヒマワリ"
