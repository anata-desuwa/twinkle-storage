line = "「んぅいひっ……<emoji=heart04>　すっごぉ……<emoji=heart04>　おま○こ、広げられるぅ……あ、あぅ、あっ……はぁ、はっ……あ、動いてる……ち○ちんが、お腹引っ掻いてるぅ……<emoji=heart04>」"

