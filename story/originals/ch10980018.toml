line = "「会長さんって煽られると、すぐにえっちなスイッチ入っちゃうよね。あたしより大人なのに、辛抱足りないぞー。そんな会長さんだから、大好きなんだけど。ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "ヒマワリ"
# 「ね、想い出作り、シよ♪」
