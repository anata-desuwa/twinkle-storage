speaker = "ヒマワリ"
# 「会長さんのこと、好きすぎて……彼女がここまで求めてるんだから、恥かかさないで欲しいな……」
line = "「会長さんのこと、好きすぎて……彼女がここまで求めてるんだから、恥かかさないで欲しいな……」"

