[[dialogue]]
speaker = "ヒマワリ"
# 「あはは……あたしのおま○こ、とろ～ってお汁垂れちゃってるや……イジらなくても、準備オッケーみたい」
line = "「あはは……あたしのおま○こ、とろ～ってお汁垂れちゃってるや……イジらなくても、準備オッケーみたい」"

