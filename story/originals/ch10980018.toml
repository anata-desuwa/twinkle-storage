[[dialogue]]
speaker = "ヒマワリ"
# 「マジメに授業受けてても、あたしとここでえっちしたこと、思い出しちゃうねー♪」
line = "「マジメに授業受けてても、あたしとここでえっちしたこと、思い出しちゃうねー♪」"

[[dialogue]]
speaker = "ヒマワリ"
# 「みんなはマジメに授業受けてるのにー、会長さんだけ、あたしとのえっちを思い出して、ち○ちんおっきしちゃうんだろうねー<emoji=heart04>」
line = "「みんなはマジメに授業受けてるのにー、会長さんだけ、あたしとのえっちを思い出して、ち○ちんおっきしちゃうんだろうねー<emoji=heart04>」"

[[dialogue]]
speaker = "ヒマワリ"
# 「──あ♪　想像しちゃった？　会長さんのち○ちんの辺り、むくむく膨らんでるー」
line = "「──あ♪　想像しちゃった？　会長さんのち○ちんの辺り、むくむく膨らんでるー」"

[[dialogue]]
speaker = "ヒマワリ"
