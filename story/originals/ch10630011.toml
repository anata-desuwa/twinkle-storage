[[dialogue]]
speaker = "unk"
# 第１話,ネビュラの小さな番犬,P
line = "第１話,ネビュラの小さな番犬,P"

[[dialogue]]
speaker = "セドナ"
# 『折り入って話がある。基地まで出向いてくれないか』
line = "『折り入って話がある。基地まで出向いてくれないか』"

[[dialogue]]
speaker = "unk"
# おかしいな……誰もいない
line = "おかしいな……誰もいない"

[[dialogue]]
speaker = "？？？"
# 「侵入者、発見」
line = "「侵入者、発見」"

[[dialogue]]
speaker = "unk"
# っっ！？
line = "っっ！？"

[[dialogue]]
speaker = "カヤ"
# 「性懲りもなく何しに来た。それも今度はたった一人で」
line = "「性懲りもなく何しに来た。それも今度はたった一人で」"

[[dialogue]]
speaker = "カヤ"
# 「まさか自分一人で十分、思った？　だとしたらネビュラも私も見くびられたもの。その傲慢っぷり、後悔するといい」
line = "「まさか自分一人で十分、思った？　だとしたらネビュラも私も見くびられたもの。その傲慢っぷり、後悔するといい」"

[[dialogue]]
speaker = "unk"
# 待て！　俺はセドナに呼び出されて──
line = "待て！　俺はセドナに呼び出されて──"

[[dialogue]]
speaker = "カヤ"
# 「そんな通達、聞いてない。侵入者は漏れなく排除する。それが私の仕事」
line = "「そんな通達、聞いてない。侵入者は漏れなく排除する。それが私の仕事」"

[[dialogue]]
speaker = "カヤ"
# 「……どうして反撃してこない？　私のこと、年下だと思って舐めてる？」
line = "「……どうして反撃してこない？　私のこと、年下だと思って舐めてる？」"

[[dialogue]]
speaker = "カヤ"
# 「なら、そのまま舐めているといい。たとえ無抵抗でも、私は容赦──しないっ！」
line = "「なら、そのまま舐めているといい。たとえ無抵抗でも、私は容赦──しないっ！」"

[[dialogue]]
speaker = "カヤ"
# 「……動くな。少しでも動いたら切る」
line = "「……動くな。少しでも動いたら切る」"

[[dialogue]]
speaker = "カヤ"
# 「人のこと舐めるからこうなる。最後に言い残すことあれば言うといい」
line = "「人のこと舐めるからこうなる。最後に言い残すことあれば言うといい」"

[[dialogue]]
speaker = "セドナ"
# 「──そこまでだ、カヤ。武器を下ろせ」
line = "「──そこまでだ、カヤ。武器を下ろせ」"

[[dialogue]]
speaker = "カヤ"
# 「長官……？　けどこの男、侵入者。排除しないと……」
line = "「長官……？　けどこの男、侵入者。排除しないと……」"

[[dialogue]]
speaker = "セドナ"
# 「聞こえなかったか？　二度言わせるな」
line = "「聞こえなかったか？　二度言わせるな」"

[[dialogue]]
speaker = "カヤ"
# 「……了解……」
line = "「……了解……」"

[[dialogue]]
speaker = "セドナ"
# 「そちらも早く立ち上がるといい。フ……そう警戒するな。陥れるつもりなら、こうして止めはしないさ」
line = "「そちらも早く立ち上がるといい。フ……そう警戒するな。陥れるつもりなら、こうして止めはしないさ」"

[[dialogue]]
speaker = "セドナ"
# 「改めてカヤの実力を教えてやろうと思ってな。紹介がてら、あえて来訪を知らせず襲わせてみたというわけだが……どうだった、うちの番犬は？」
line = "「改めてカヤの実力を教えてやろうと思ってな。紹介がてら、あえて来訪を知らせず襲わせてみたというわけだが……どうだった、うちの番犬は？」"

[[dialogue]]
speaker = "セドナ"
# 「しかしカヤを相手取って一切反撃をしないとはな。幼い見た目に惑わされたか？　その甘さ、戦場では命取りになるぞ」
line = "「しかしカヤを相手取って一切反撃をしないとはな。幼い見た目に惑わされたか？　その甘さ、戦場では命取りになるぞ」"

[[dialogue]]
speaker = "unk"
# ……それで用件は？
line = "……それで用件は？"

[[dialogue]]
speaker = "セドナ"
# 「怖い顔をするな。貴様にカヤを護衛に付けてやろうという話だよ」
line = "「怖い顔をするな。貴様にカヤを護衛に付けてやろうという話だよ」"

[[dialogue]]
speaker = "カヤ"
# 「護衛……？　私が……？」
line = "「護衛……？　私が……？」"

[[dialogue]]
speaker = "セドナ"
# 「ああ。先程の様子ではいつなんどき、この男が敵に捕らえられるかわかったものではないからな」
line = "「ああ。先程の様子ではいつなんどき、この男が敵に捕らえられるかわかったものではないからな」"

[[dialogue]]
speaker = "セドナ"
# 「万が一でもこちらの情報を漏らされては困る。そのための保険ということだ」
line = "「万が一でもこちらの情報を漏らされては困る。そのための保険ということだ」"

[[dialogue]]
speaker = "セドナ"
# 「カヤの力は今の戦闘で理解できただろう？　無愛想だが、腕は確かだ。傍に控えさせて損はないぞ」
line = "「カヤの力は今の戦闘で理解できただろう？　無愛想だが、腕は確かだ。傍に控えさせて損はないぞ」"

[[dialogue]]
speaker = "カヤ"
# 「……護衛任務。この男の……」
line = "「……護衛任務。この男の……」"

[[dialogue]]
speaker = "セドナ"
# 「不満か？　半ば監視のようなものだ。お前の得意分野だろう？」
line = "「不満か？　半ば監視のようなものだ。お前の得意分野だろう？」"

[[dialogue]]
speaker = "カヤ"
# 「それはそう……ですが……」
line = "「それはそう……ですが……」"

[[dialogue]]
speaker = "セドナ"
# 「フフ、嫌われているではないか。反撃されなかったことが余程、気に食わなかったらしい」
line = "「フフ、嫌われているではないか。反撃されなかったことが余程、気に食わなかったらしい」"

[[dialogue]]
speaker = "セドナ"
# 「しかし敵愾心を抱きすぎるなよ。仲良くする必要はないが、敵意に振り回されて警戒を怠られても困る」
line = "「しかし敵愾心を抱きすぎるなよ。仲良くする必要はないが、敵意に振り回されて警戒を怠られても困る」"

[[dialogue]]
speaker = "カヤ"
# 「…………ん」
line = "「…………ん」"

[[dialogue]]
speaker = "セドナ"
# 「返事の曖昧さが気になるが……まぁいいだろう。話は以上だ。カヤは準備が出来次第、警護に就け」
line = "「返事の曖昧さが気になるが……まぁいいだろう。話は以上だ。カヤは準備が出来次第、警護に就け」"

[[dialogue]]
speaker = "カヤ"
# 「了解」
line = "「了解」"

[[dialogue]]
speaker = "unk"
# 俺は別に護衛なんて──
line = "俺は別に護衛なんて──"

[[dialogue]]
speaker = "セドナ"
# 「貴様に拒否権はない。ネビュラの情報漏洩を防ぐためだと言っただろう？　貴様の甘さは看過できない」
line = "「貴様に拒否権はない。ネビュラの情報漏洩を防ぐためだと言っただろう？　貴様の甘さは看過できない」"

[[dialogue]]
speaker = "セドナ"
# 「理解したのなら立ち去れ。私は忙しい」
line = "「理解したのなら立ち去れ。私は忙しい」"

[[dialogue]]
speaker = "セドナ"
# 「ああ、そうだ。カヤは人間界を訪れたことがなくてな。優しくエスコートしてやってくれ。お節介が得意なのだろう？」
line = "「ああ、そうだ。カヤは人間界を訪れたことがなくてな。優しくエスコートしてやってくれ。お節介が得意なのだろう？」"

[[dialogue]]
speaker = "unk"
# …………
line = "…………"

[[dialogue]]
speaker = "セドナ"
# 「ふむ。行ったか」
line = "「ふむ。行ったか」"

[[dialogue]]
speaker = "カヤ"
# 「私も配置、つきます」
line = "「私も配置、つきます」"

[[dialogue]]
speaker = "セドナ"
# 「少し待て。本題の説明がまだだ」
line = "「少し待て。本題の説明がまだだ」"

[[dialogue]]
speaker = "カヤ"
# 「本題？」
line = "「本題？」"

[[dialogue]]
speaker = "セドナ"
# 「先程の話は建前だ。情報漏洩を危惧しているのは事実だが、お前には護衛の裏でしてもらいたいことがある」
line = "「先程の話は建前だ。情報漏洩を危惧しているのは事実だが、お前には護衛の裏でしてもらいたいことがある」"

[[dialogue]]
speaker = "セドナ"
# 「アポロでも星騎士でも、ましてや魔女でもない正体不明の存在については知っているな？」
line = "「アポロでも星騎士でも、ましてや魔女でもない正体不明の存在については知っているな？」"

[[dialogue]]
speaker = "カヤ"
# 「！　捕獲したモンスターを逃がしたヤツ──」
line = "「！　捕獲したモンスターを逃がしたヤツ──」"

[[dialogue]]
speaker = "セドナ"
# 「そうだ。ヤツの正体を探れ。お前が任務で不在の時とはいえ、この基地に忍び込まれたのは不愉快だろう？」
line = "「そうだ。ヤツの正体を探れ。お前が任務で不在の時とはいえ、この基地に忍び込まれたのは不愉快だろう？」"

[[dialogue]]
speaker = "セドナ"
# 「ヤツはまた魔王に接触してくる可能性がある。護衛についていれば、遭遇することもあるだろう」
line = "「ヤツはまた魔王に接触してくる可能性がある。護衛についていれば、遭遇することもあるだろう」"

[[dialogue]]
speaker = "セドナ"
# 「ヤツの正体を掴めるなら、魔王の身柄がどうなろうと構わん。優先順位を忘れるな」
line = "「ヤツの正体を掴めるなら、魔王の身柄がどうなろうと構わん。優先順位を忘れるな」"

[[dialogue]]
speaker = "カヤ"
# 「つまりこれは……彼をエサに正体不明の存在を釣り上げる任務？」
line = "「つまりこれは……彼をエサに正体不明の存在を釣り上げる任務？」"

[[dialogue]]
speaker = "セドナ"
# 「そう、魔王がエサならお前は釣り針といったところだ。とはいえ獲物がかかるのはいつになるかわからないからな。釣りらしく気楽にやるといい」
line = "「そう、魔王がエサならお前は釣り針といったところだ。とはいえ獲物がかかるのはいつになるかわからないからな。釣りらしく気楽にやるといい」"

[[dialogue]]
speaker = "カヤ"
# 「気楽に……。それも命令？」
line = "「気楽に……。それも命令？」"

[[dialogue]]
speaker = "セドナ"
# 「ふむ、そうだな……。補足するならば、魔王に真意を気付かれないよう自然に振る舞え、といったところか」
line = "「ふむ、そうだな……。補足するならば、魔王に真意を気付かれないよう自然に振る舞え、といったところか」"

[[dialogue]]
speaker = "カヤ"
# 「それなら──ん。了解。行動、開始する」
line = "「それなら──ん。了解。行動、開始する」"

[[dialogue]]
speaker = "セドナ"
# 「……やれやれ。カヤももう少し融通が利くようになればな。まぁだからこそ今回の任務に適任だ。カヤなら必要以上に魔王と親密になることもあるまい」
line = "「……やれやれ。カヤももう少し融通が利くようになればな。まぁだからこそ今回の任務に適任だ。カヤなら必要以上に魔王と親密になることもあるまい」"
