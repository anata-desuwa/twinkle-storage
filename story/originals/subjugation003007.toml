[[dialogue]]
speaker = "unk"
# 巨大なアステラが流星市国の市街地上空に出現しているにも関わらず、周囲の人たちが全く気づいていないという異様な光景に、戸惑うアムとナミエル。
line = "巨大なアステラが流星市国の市街地上空に出現しているにも関わらず、周囲の人たちが全く気づいていないという異様な光景に、戸惑うアムとナミエル。"

[[dialogue]]
speaker = "スノーマン"
# 「多分、体を作ってもらう前のボクと同じように、他の人たちには見えていないんだと思う……」
line = "「多分、体を作ってもらう前のボクと同じように、他の人たちには見えていないんだと思う……」"

[[dialogue]]
speaker = "ナミエル"
# 「そうか……！　スノーマンがカメラに映らなかったみたいに、アステラが認識できない状態になっているから、警報が鳴らないんですね……！」
line = "「そうか……！　スノーマンがカメラに映らなかったみたいに、アステラが認識できない状態になっているから、警報が鳴らないんですね……！」"

[[dialogue]]
speaker = "アム"
# 「でも、だとしたら、このまま放置していると、かなりマズいんじゃ……」
line = "「でも、だとしたら、このまま放置していると、かなりマズいんじゃ……」"

[[dialogue]]
speaker = "ナミエル"
# 「……１度、会長に報告してみましょう。たとえ見えなくても、アステラに接近すれば侵入することはできるかもしれません」
line = "「……１度、会長に報告してみましょう。たとえ見えなくても、アステラに接近すれば侵入することはできるかもしれません」"

[[dialogue]]
speaker = "アム"
# 「なるほど！　ナミエル、頭いい！」
line = "「なるほど！　ナミエル、頭いい！」"

[[dialogue]]
speaker = "ナミエル"
# 「ですが……もし見えないだけじゃなくて、会長たちがあのアステラに侵入不可能となった場合は――」
line = "「ですが……もし見えないだけじゃなくて、会長たちがあのアステラに侵入不可能となった場合は――」"

[[dialogue]]
speaker = "アム"
# 「……！　あたし達がどうにかしなきゃいけないかもしれない……ってことだね？」
line = "「……！　あたし達がどうにかしなきゃいけないかもしれない……ってことだね？」"

[[dialogue]]
speaker = "ナミエル"
# 「はい――心の準備はしておきましょう」
line = "「はい――心の準備はしておきましょう」"

[[dialogue]]
speaker = "unk"
# その後、ナミエルの予想は的中した。
line = "その後、ナミエルの予想は的中した。"

[[dialogue]]
speaker = "unk"
# ２人以外は、アステラを視認できず、接近しても侵入することはできなかった。
line = "２人以外は、アステラを視認できず、接近しても侵入することはできなかった。"

[[dialogue]]
speaker = "unk"
# その為、クロトたち星騎士の精鋭部隊は外で待機し、アステラの攻略はナミエルとアムに託されることとなった。
line = "その為、クロトたち星騎士の精鋭部隊は外で待機し、アステラの攻略はナミエルとアムに託されることとなった。"

[[dialogue]]
speaker = "ナミエル"
# 「――最深部に到達しましたが、これは……！」
line = "「――最深部に到達しましたが、これは……！」"

[[dialogue]]
speaker = "巨大スノーマン"
# 「スノォォォ……！」
line = "「スノォォォ……！」"

[[dialogue]]
speaker = "アム"
# 「アステラのボスモンスターが、巨大なスノーマン……！　これって……！？」
line = "「アステラのボスモンスターが、巨大なスノーマン……！　これって……！？」"

[[dialogue]]
speaker = "スノーマン"
# 「ボク……思い出した」
line = "「ボク……思い出した」"

[[dialogue]]
speaker = "ナミエル"
# 「スノーマン？　思い出したって……もしかして、記憶が……？」
line = "「スノーマン？　思い出したって……もしかして、記憶が……？」"

[[dialogue]]
speaker = "スノーマン"
# 「うん……何があったか、全部――」
line = "「うん……何があったか、全部――」"

[[dialogue]]
speaker = "スノーマンL"
# 「ボク、今回の冬が来て生まれた時、リクリエの瘴気に襲われた」
line = "「ボク、今回の冬が来て生まれた時、リクリエの瘴気に襲われた」"

[[dialogue]]
speaker = "スノーマンL"
# 「それで、リクリエの力はどんどん体の中に広がってきて……ボク、モンスターにされて、意識も飲まれそうになった……」
line = "「それで、リクリエの力はどんどん体の中に広がってきて……ボク、モンスターにされて、意識も飲まれそうになった……」"

[[dialogue]]
speaker = "スノーマンL"
# 「だからボク、意識が完全に乗っ取られる前に、力の一部を切り離して、星騎士に助けてもらおうと思った……」
line = "「だからボク、意識が完全に乗っ取られる前に、力の一部を切り離して、星騎士に助けてもらおうと思った……」"

[[dialogue]]
speaker = "ナミエル"
# 「あっ……！　その一部っていうのが、私たちのところに落ちてきた<b>シルクハット</b>……！」
line = "「あっ……！　その一部っていうのが、私たちのところに落ちてきた<b>シルクハット</b>……！」"

[[dialogue]]
speaker = "スノーマン"
# 「うん。それで、２人に力が渡って、ボクの姿が見えるようになった……」
line = "「うん。それで、２人に力が渡って、ボクの姿が見えるようになった……」"

[[dialogue]]
speaker = "アム"
# 「ってことは、あれがモンスター化したスノーマンの本体……！」
line = "「ってことは、あれがモンスター化したスノーマンの本体……！」"

[[dialogue]]
speaker = "スノーマンL"
# 「そう……このままだと、冬の力が全部リクリエに飲み込まれちゃう。もしそうなったら……」
line = "「そう……このままだと、冬の力が全部リクリエに飲み込まれちゃう。もしそうなったら……」"

[[dialogue]]
speaker = "スノーマンL"
# 「人間界には春がいつまでも来なくて、生き物が住めなくなるくらい、もっと寒い冬が訪れるかもしれない……」
line = "「人間界には春がいつまでも来なくて、生き物が住めなくなるくらい、もっと寒い冬が訪れるかもしれない……」"

[[dialogue]]
speaker = "アム"
# 「思っていたより、ずっとヤバいじゃん……！」
line = "「思っていたより、ずっとヤバいじゃん……！」"

[[dialogue]]
speaker = "ナミエル"
# 「はい。なんとしても、止めないと……！」
line = "「はい。なんとしても、止めないと……！」"

[[dialogue]]
speaker = "unk"
# ２人は頷き合うと、最奥へと進み、巨大スノーマンの前に立つ。
line = "２人は頷き合うと、最奥へと進み、巨大スノーマンの前に立つ。"

[[dialogue]]
speaker = "巨大スノーマン"
# 「……！　スノオォォォーーーマンッ！！！」
line = "「……！　スノオォォォーーーマンッ！！！」"

[[dialogue]]
speaker = "ナミエル"
# 「アム先輩、私達は１メートル以上離れられないってこと、忘れないで下さいね……！」
line = "「アム先輩、私達は１メートル以上離れられないってこと、忘れないで下さいね……！」"

[[dialogue]]
speaker = "アム"
# 「わかってる。練習していた通り、二人三脚しているつもりで、息を合わせて戦うよ！」
line = "「わかってる。練習していた通り、二人三脚しているつもりで、息を合わせて戦うよ！」"

[[dialogue]]
speaker = "unk"
# ２人は巨大スノーマンとの戦闘を開始するのだった。
line = "２人は巨大スノーマンとの戦闘を開始するのだった。"

[[dialogue]]
speaker = "unk"
# それから、息を合わせて巨大スノーマンと戦う２人。しかし――
line = "それから、息を合わせて巨大スノーマンと戦う２人。しかし――"

[[dialogue]]
speaker = "アム"
# 「はぁっ……はぁっ……！」
line = "「はぁっ……はぁっ……！」"

[[dialogue]]
speaker = "ナミエル"
# 「これが、スノーマンの力……！　強い……！」
line = "「これが、スノーマンの力……！　強い……！」"

[[dialogue]]
speaker = "巨大スノーマン"
# 「スノオオオォーーーッ！！！」
line = "「スノオオオォーーーッ！！！」"

[[dialogue]]
speaker = "アム"
# 「それに、どれだけ攻撃しても、すぐ体を再生させてくる……！」
line = "「それに、どれだけ攻撃しても、すぐ体を再生させてくる……！」"

[[dialogue]]
speaker = "ナミエル"
# （このままじゃ、私をソリに乗せて、攻撃を回避し続けているアム先輩の方が、先に星力切れを起こしてしまう……！　どうしたら……？）
line = "（このままじゃ、私をソリに乗せて、攻撃を回避し続けているアム先輩の方が、先に星力切れを起こしてしまう……！　どうしたら……？）"

[[dialogue]]
speaker = "スノーマン"
# 「……ナミエル、アム」
line = "「……ナミエル、アム」"

[[dialogue]]
speaker = "unk"
# その時、小さなスノーマンが口を開く。
line = "その時、小さなスノーマンが口を開く。"

[[dialogue]]
speaker = "スノーマンL"
# 「ボクの持っている力、全部２人に渡す」
line = "「ボクの持っている力、全部２人に渡す」"

[[dialogue]]
speaker = "ナミエル"
# 「えっ……？　これは……アステラの中に雪が……？」
line = "「えっ……？　これは……アステラの中に雪が……？」"

[[dialogue]]
speaker = "unk"
# 小さなスノーマンから放たれた光が収まると、アステラ内にちらほらと『光の雪』が舞い降りてきていた。
line = "小さなスノーマンから放たれた光が収まると、アステラ内にちらほらと『光の雪』が舞い降りてきていた。"

[[dialogue]]
speaker = "アム"
# 「なんか、この雪……すごい力が湧いて来る……！」
line = "「なんか、この雪……すごい力が湧いて来る……！」"

[[dialogue]]
speaker = "スノーマン"
# 「２人共、これで行けそう……？」
line = "「２人共、これで行けそう……？」"

[[dialogue]]
speaker = "unk"
# ２人共！　大丈夫か！？
line = "２人共！　大丈夫か！？"

[[dialogue]]
speaker = "unk"
# それからすぐに、クロトと共に他の星騎士たちが、ナミエル達の元に駆けつけてくる。
line = "それからすぐに、クロトと共に他の星騎士たちが、ナミエル達の元に駆けつけてくる。"

[[dialogue]]
speaker = "ナミエル"
# 「会長……！　どうしてここに？」
line = "「会長……！　どうしてここに？」"

[[dialogue]]
speaker = "アム"
# 「え？　――外にも雪が降り始めて、それと同時に、アステラの輪郭が視認できるようになった……？」
line = "「え？　――外にも雪が降り始めて、それと同時に、アステラの輪郭が視認できるようになった……？」"

[[dialogue]]
speaker = "スノーマンL"
# 「ボク、頑張った……。みんなの力も借りれば、ボクの本体……止められる？」
line = "「ボク、頑張った……。みんなの力も借りれば、ボクの本体……止められる？」"

[[dialogue]]
speaker = "アム"
# 「ありがとう、スノーマン！　――ナミエル！　この力で、もう１度！」
line = "「ありがとう、スノーマン！　――ナミエル！　この力で、もう１度！」"

[[dialogue]]
speaker = "ナミエル"
# 「はい、アム先輩……！　――会長、指示をお願いできますか？」
line = "「はい、アム先輩……！　――会長、指示をお願いできますか？」"

[[dialogue]]
speaker = "アム"
# 「そうしたらあたし達、百人力だよ！」
line = "「そうしたらあたし達、百人力だよ！」"

[[dialogue]]
speaker = "unk"
# ああ、任せろ！　行くぞ、みんな！
line = "ああ、任せろ！　行くぞ、みんな！"

[[dialogue]]
speaker = "unk"
# クロト達の加勢を受けて、ナミエルとアムは再び、巨大スノーマンへと勝負を挑むのだった。
line = "クロト達の加勢を受けて、ナミエルとアムは再び、巨大スノーマンへと勝負を挑むのだった。"
