[[dialogue]]
speaker = "unk"
# こどもの日パーティーから１週間ほど経って──
line = "こどもの日パーティーから１週間ほど経って──"

[[dialogue]]
speaker = "unk"
# 小さなレミカは、大きなレミカと相談して、あることを行おうとしていた。
line = "小さなレミカは、大きなレミカと相談して、あることを行おうとしていた。"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「――ライブの準備はこんな感じでいいかな？」
line = "「――ライブの準備はこんな感じでいいかな？」"

[[dialogue]]
speaker = "レミカ"
# 「そうだね。みんな、手伝ってくれてありがとう」
line = "「そうだね。みんな、手伝ってくれてありがとう」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「こどもの日パーティーを手伝ってもらったんだもの。もちろん協力するわよ！」
line = "「こどもの日パーティーを手伝ってもらったんだもの。もちろん協力するわよ！」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「といっても、私の得意分野じゃないから、メルエルやパパの方がたくさん頑張ったんだけどね！　えっへん♪」
line = "「といっても、私の得意分野じゃないから、メルエルやパパの方がたくさん頑張ったんだけどね！　えっへん♪」"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「でも、２人のレミカちゃんでアイドルユニットを組んでライブをするだなんて思わなかったよ」
line = "「でも、２人のレミカちゃんでアイドルユニットを組んでライブをするだなんて思わなかったよ」"

[[dialogue]]
speaker = "unk"
# そう、２人のレミカは、学園内のイベントとしてミニライブを開催しようとしていた。
line = "そう、２人のレミカは、学園内のイベントとしてミニライブを開催しようとしていた。"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「私が小さくなった体で望むとすれば――やっぱり『可愛いアイドル』になりたいってことだからね♪」
line = "「私が小さくなった体で望むとすれば――やっぱり『可愛いアイドル』になりたいってことだからね♪」"

[[dialogue]]
speaker = "レミカ"
# 「事務所に所属している以上、私だけの意思で思いきったイメージチェンジってできないから、ちょうどいいチャンスかなって思ったんだよ」
line = "「事務所に所属している以上、私だけの意思で思いきったイメージチェンジってできないから、ちょうどいいチャンスかなって思ったんだよ」"

[[dialogue]]
speaker = "メルエル"
# 「前に私と『アーネスト』のライブをした時も、事務所さんから１度ＮＧが出ちゃったもんね」
line = "「前に私と『アーネスト』のライブをした時も、事務所さんから１度ＮＧが出ちゃったもんね」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「うん。仕事としてやっている以上、そういったしがらみは避けられないよね」
line = "「うん。仕事としてやっている以上、そういったしがらみは避けられないよね」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「でも、小さくなった私なら、愛戸レミカとは別の『新人アイドル』として、自由にイメチェンできるから」
line = "「でも、小さくなった私なら、愛戸レミカとは別の『新人アイドル』として、自由にイメチェンできるから」"

[[dialogue]]
speaker = "レミカ"
# 「そして、私も一緒のステージに立つことで、観に来てくれたファンの人たちが小さい私の姿を見てどう思うのか、反応を伺うことができる」
line = "「そして、私も一緒のステージに立つことで、観に来てくれたファンの人たちが小さい私の姿を見てどう思うのか、反応を伺うことができる」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「ただ、ちょっと悩んでるのが、小さい私がどんな自分を演出するかってことなんだよね……」
line = "「ただ、ちょっと悩んでるのが、小さい私がどんな自分を演出するかってことなんだよね……」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「真面目な話なんだけど……会長は、私がどんなキャラを演じたら可愛く見えると思う？」
line = "「真面目な話なんだけど……会長は、私がどんなキャラを演じたら可愛く見えると思う？」"

[[dialogue]]
speaker = "unk"
# ちなみに今はどんな風に行こうと考えてる？
line = "ちなみに今はどんな風に行こうと考えてる？"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「こ、この場で演じるのはちょっと恥ずかしいけど……コホン」
line = "「こ、この場で演じるのはちょっと恥ずかしいけど……コホン」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「――みんな～♪　愛戸レミカの従妹、『愛戸ミソラ』だよ～☆　今日はライブを見に来てくれてありがと～<emoji=heart04>」
line = "「――みんな～♪　愛戸レミカの従妹、『愛戸ミソラ』だよ～☆　今日はライブを見に来てくれてありがと～<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「レミカ！　その『ミソラ』っていうのは何！？」
line = "「レミカ！　その『ミソラ』っていうのは何！？」"

[[dialogue]]
speaker = "レミカ"
# 「普通に考えて、『私が２人に増えちゃいました』って言われても、正直意味不明でしょ？」
line = "「普通に考えて、『私が２人に増えちゃいました』って言われても、正直意味不明でしょ？」"

[[dialogue]]
speaker = "メルエル"
# 「ま、まあ、当事者である私たち自身、正直意味は不明だと思ってるからね……」
line = "「ま、まあ、当事者である私たち自身、正直意味は不明だと思ってるからね……」"

[[dialogue]]
speaker = "レミカ"
# 「うん。だから、ライブに来てくれたファンに対しては、私の従妹っていう設定にしようと思って」
line = "「うん。だから、ライブに来てくれたファンに対しては、私の従妹っていう設定にしようと思って」"

[[dialogue]]
speaker = "メルエル"
# 「ミソラちゃん……だっけ？　可愛い名前だね♪」
line = "「ミソラちゃん……だっけ？　可愛い名前だね♪」"

[[dialogue]]
speaker = "unk"
# う～ん、でも、ちょっとあざといかも……？
line = "う～ん、でも、ちょっとあざといかも……？"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「あ、あざといって……じゃあ会長は、どんな感じなら可愛いと思うの？」
line = "「あ、あざといって……じゃあ会長は、どんな感じなら可愛いと思うの？」"

[[dialogue]]
speaker = "unk"
# 俺は１度深呼吸してから、かつてのバイト経験を活かして、演じてみせる。
line = "俺は１度深呼吸してから、かつてのバイト経験を活かして、演じてみせる。"

[[dialogue]]
speaker = "unk"
# こんな感じとか、どうかにゃん？
line = "こんな感じとか、どうかにゃん？"

[[dialogue]]
speaker = "レミカ"
# 「にゃん！？」
line = "「にゃん！？」"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「か、会長くん、可愛い～～っ！　可愛い、可愛すぎるよぉ！　えっ、何！？　その喋り方は何なの！？」
line = "「か、会長くん、可愛い～～っ！　可愛い、可愛すぎるよぉ！　えっ、何！？　その喋り方は何なの！？」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「パパが急に、可愛い女の子に変身したみたいだわ！」
line = "「パパが急に、可愛い女の子に変身したみたいだわ！」"

[[dialogue]]
speaker = "メルエル"
# 「女の子姿に変身してるところは見たことあるけど、喋り方が女の子っぽいのは初めて見たかも！？」
line = "「女の子姿に変身してるところは見たことあるけど、喋り方が女の子っぽいのは初めて見たかも！？」"

[[dialogue]]
speaker = "unk"
# これは猫耳メイドの喋り方だにゃん！
line = "これは猫耳メイドの喋り方だにゃん！"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「ぶふっ！？　か、会長、ちょっと待って……くっ、ふふふふっ……！　可愛いけど、なんで猫耳メイド……！？」
line = "「ぶふっ！？　か、会長、ちょっと待って……くっ、ふふふふっ……！　可愛いけど、なんで猫耳メイド……！？」"

[[dialogue]]
speaker = "unk"
# 可愛くなかったかにゃん？
line = "可愛くなかったかにゃん？"

[[dialogue]]
speaker = "レミカ"
# 「ぶふふっ……！　い、いや可愛いと、思うけれども……！」
line = "「ぶふふっ……！　い、いや可愛いと、思うけれども……！」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「――え？　ちなみに名前は『クロにゃん』？　ぷはっ……！　い、いや別に笑ってないから……！　あはっ、あはははははっ！」
line = "「――え？　ちなみに名前は『クロにゃん』？　ぷはっ……！　い、いや別に笑ってないから……！　あはっ、あはははははっ！」"

[[dialogue]]
speaker = "レミカ"
# 「そ、そう……くふっ……！　アイドルはこんなことで笑ったりしないから……！　あ、ダメ、あはははははっ！」
line = "「そ、そう……くふっ……！　アイドルはこんなことで笑ったりしないから……！　あ、ダメ、あはははははっ！」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「思いっきり笑ってるわ！」
line = "「思いっきり笑ってるわ！」"

[[dialogue]]
speaker = "unk"
# 俺はそれから喋り方を元に戻して、レミカに言う。
line = "俺はそれから喋り方を元に戻して、レミカに言う。"

[[dialogue]]
speaker = "unk"
# レミカは自然体のままでいいと思うよ
line = "レミカは自然体のままでいいと思うよ"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「え？」
line = "「え？」"

[[dialogue]]
speaker = "unk"
# 無理に演じようとするよりも、レミカは今みたいに肩の力を抜いて、『素』の感じでやるのが一番可愛いと思う。
line = "無理に演じようとするよりも、レミカは今みたいに肩の力を抜いて、『素』の感じでやるのが一番可愛いと思う。"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「す、素が可愛いとか言われても……どうしたらいいのか……恥ずかしいし……」
line = "「す、素が可愛いとか言われても……どうしたらいいのか……恥ずかしいし……」"

[[dialogue]]
speaker = "unk"
# 子供の頃に戻ったつもりで、楽しめばいい
line = "子供の頃に戻ったつもりで、楽しめばいい"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「子供の頃に戻ったつもりで……？」
line = "「子供の頃に戻ったつもりで……？」"

[[dialogue]]
speaker = "unk"
# 俺は頷いて、言葉を続ける。
line = "俺は頷いて、言葉を続ける。"

[[dialogue]]
speaker = "レミカ"
# 「――子供の頃に憧れた『可愛いアイドル』みたいに、ステージで思いっきりライブを楽しむ……？」
line = "「――子供の頃に憧れた『可愛いアイドル』みたいに、ステージで思いっきりライブを楽しむ……？」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「つまり、全力でビームを撃つみたいなものね！！」
line = "「つまり、全力でビームを撃つみたいなものね！！」"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「全力で楽しいライブをやる……そっか、そうだよね！」
line = "「全力で楽しいライブをやる……そっか、そうだよね！」"

[[dialogue]]
speaker = "メルエル"
# 「演出とか、どう見せるとか、きっと大事なことだと思うけど……そういう難しいことは、むしろいつもやってることでしょ？」
line = "「演出とか、どう見せるとか、きっと大事なことだと思うけど……そういう難しいことは、むしろいつもやってることでしょ？」"

[[dialogue]]
speaker = "メルエル"
# 「それよりも、可愛い衣装で可愛い歌を、全力で歌って踊って、楽しんでる姿を見せる！」
line = "「それよりも、可愛い衣装で可愛い歌を、全力で歌って踊って、楽しんでる姿を見せる！」"

[[dialogue]]
speaker = "メルエル"
# 「そこに全力をかけることが、レミカちゃんの理想に繋がるんじゃないかな？」
line = "「そこに全力をかけることが、レミカちゃんの理想に繋がるんじゃないかな？」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「確かに……私が憧れた『流星スターピース』は、そういうアイドルだったかも。うん。私、やってみる！」
line = "「確かに……私が憧れた『流星スターピース』は、そういうアイドルだったかも。うん。私、やってみる！」"

[[dialogue]]
speaker = "unk"
# その翌日の放課後。レミカ２人によるミニライブが行われた。
line = "その翌日の放課後。レミカ２人によるミニライブが行われた。"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「みんな～！　今日は来てくれてありがとう！　短いライブだったけど、楽しんでもらえたかな～？」
line = "「みんな～！　今日は来てくれてありがとう！　短いライブだったけど、楽しんでもらえたかな～？」"

[[dialogue]]
speaker = "unk"
# 今回初めて登場したレミカの従妹、という設定にも関わらず、沢山の生徒たちが集まったアリーナの観客席から大きな歓声が上がる。
line = "今回初めて登場したレミカの従妹、という設定にも関わらず、沢山の生徒たちが集まったアリーナの観客席から大きな歓声が上がる。"

[[dialogue]]
speaker = "unk"
# それほどに小さいレミカは、１人のアイドルとしてキラキラと輝いていた。それは、大きいレミカも同じで――
line = "それほどに小さいレミカは、１人のアイドルとしてキラキラと輝いていた。それは、大きいレミカも同じで――"

[[dialogue]]
speaker = "レミカ"
# 「私からもありがとう！　今回また初めて組んだユニットだったけど、私自身、ライブをしててすごく楽しかった……！」
line = "「私からもありがとう！　今回また初めて組んだユニットだったけど、私自身、ライブをしててすごく楽しかった……！」"

[[dialogue]]
speaker = "unk"
# 彼女はアーネストのライブをした時にも垣間見せた、キラキラとした笑顔を浮かべていた。
line = "彼女はアーネストのライブをした時にも垣間見せた、キラキラとした笑顔を浮かべていた。"

[[dialogue]]
speaker = "レミカ"
# 「私、これからも……みんなに笑顔を与えられるようなアイドルを目指したい！」
line = "「私、これからも……みんなに笑顔を与えられるようなアイドルを目指したい！」"

[[dialogue]]
speaker = "レミカ"
# 「子供の頃に見た、キラキラした笑顔で、みんなに元気を与えられるようなアイドルに！」
line = "「子供の頃に見た、キラキラした笑顔で、みんなに元気を与えられるようなアイドルに！」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「うん。私も――キラキラな笑顔が似合う、可愛いアイドルになりたい♪」
line = "「うん。私も――キラキラな笑顔が似合う、可愛いアイドルになりたい♪」"

[[dialogue]]
speaker = "unk"
# ステージの上で２人のレミカは向き合って、互いに笑顔を浮かべ合うのだった。
line = "ステージの上で２人のレミカは向き合って、互いに笑顔を浮かべ合うのだった。"

[[dialogue]]
speaker = "unk"
# 果たして拍手喝采の中でライブは終了した。
line = "果たして拍手喝采の中でライブは終了した。"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「ふぅ～……ただいま」
line = "「ふぅ～……ただいま」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「レミカ、すごかったわ！　ライブも大盛り上がりだったわね♪」
line = "「レミカ、すごかったわ！　ライブも大盛り上がりだったわね♪」"

[[dialogue]]
speaker = "メルエル"
# 「あれ？　大きい方のレミカちゃんは？」
line = "「あれ？　大きい方のレミカちゃんは？」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「実はステージから降りると同時に私の体が光って、元の１人に戻ったんだ」
line = "「実はステージから降りると同時に私の体が光って、元の１人に戻ったんだ」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「じゃあ、レミカの望みはちゃんと叶ったってことね♪」
line = "「じゃあ、レミカの望みはちゃんと叶ったってことね♪」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「うん、ステージで思いっきり歌って踊って、思い出したよ」
line = "「うん、ステージで思いっきり歌って踊って、思い出したよ」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「子供の頃に初めてアイドルのライブを観た時の、キラキラして思わず笑顔が溢れてくるような感動……」
line = "「子供の頃に初めてアイドルのライブを観た時の、キラキラして思わず笑顔が溢れてくるような感動……」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「私はあの時、流星スターピースの２人が浮かべた、観ている人たちまで笑顔にしちゃうようなキラキラな笑顔に、何よりも憧れたんだ」
line = "「私はあの時、流星スターピースの２人が浮かべた、観ている人たちまで笑顔にしちゃうようなキラキラな笑顔に、何よりも憧れたんだ」"

[[dialogue]]
speaker = "unk"
# 今日のレミカの笑顔は、最高に可愛かったぞ
line = "今日のレミカの笑顔は、最高に可愛かったぞ"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「……！　か、会長はいつもそうやって、恥ずかしくなることをドストレートに言う……」
line = "「……！　か、会長はいつもそうやって、恥ずかしくなることをドストレートに言う……」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「でも……アドバイスのおかげで、また１歩前進できたから……」
line = "「でも……アドバイスのおかげで、また１歩前進できたから……」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「ありがと……会長」
line = "「ありがと……会長」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「ふふっ、照れながらお礼を言うレミカも可愛いわね♪」
line = "「ふふっ、照れながらお礼を言うレミカも可愛いわね♪」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「び、ヴィーナスも、そういうことはいちいち言わなくていいから！」
line = "「び、ヴィーナスも、そういうことはいちいち言わなくていいから！」"

[[dialogue]]
speaker = "メルエル"
# 「レミカちゃんも１人に戻ったし、残るは私だけだね！」
line = "「レミカちゃんも１人に戻ったし、残るは私だけだね！」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「メルエルが小さい体になって望むこと、もう分かったの？」
line = "「メルエルが小さい体になって望むこと、もう分かったの？」"

[[dialogue]]
speaker = "メルエル"
# 「うん。い、一応、ちっちゃな私と２人で話し合って考えといたんだけど――」
line = "「うん。い、一応、ちっちゃな私と２人で話し合って考えといたんだけど――」"

[[dialogue]]
speaker = "unk"
# ちらっとメルエルが俺と視線を合わせながら、口を開こうとする。
line = "ちらっとメルエルが俺と視線を合わせながら、口を開こうとする。"

[[dialogue]]
speaker = "unk"
# が、しかし。
line = "が、しかし。"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「ごめんね……大きい私には悪いけど、相談してた内容、なかったことにして欲しいな」
line = "「ごめんね……大きい私には悪いけど、相談してた内容、なかったことにして欲しいな」"

[[dialogue]]
speaker = "メルエル"
# 「えっ？　どういうこと……？」
line = "「えっ？　どういうこと……？」"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「ヴィーナスちゃんやレミカちゃんにも申し訳ないけど……私、さっき決めたんだ」
line = "「ヴィーナスちゃんやレミカちゃんにも申し訳ないけど……私、さっき決めたんだ」"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「私は、自分のやりたいことを叶える為に――このまま元の１人には戻らないって！」
line = "「私は、自分のやりたいことを叶える為に――このまま元の１人には戻らないって！」"

[[dialogue]]
speaker = "メルエル"
# 「なっ！？」
line = "「なっ！？」"

[[dialogue]]
speaker = "unk"
# ここに来ての小さなメルエルの宣言に、その場にいた全員が言葉を失ってしまうのだった。
line = "ここに来ての小さなメルエルの宣言に、その場にいた全員が言葉を失ってしまうのだった。"
