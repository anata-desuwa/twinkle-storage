[[dialogue]]
speaker = "unk"
# 第３話,この気持ちの名前,P
line = "第３話,この気持ちの名前,P"

[[dialogue]]
speaker = "unk"
# リーナの希望で遊園地併設のプールに遊びに来た。
line = "リーナの希望で遊園地併設のプールに遊びに来た。"

[[dialogue]]
speaker = "リーナ"
# 「ここ、前から来てみたかったんだ。ありがとう、お兄ちゃんっ！」
line = "「ここ、前から来てみたかったんだ。ありがとう、お兄ちゃんっ！」"

[[dialogue]]
speaker = "リーナ"
# 「お兄ちゃん、大好きっ！　ぎゅーっ」
line = "「お兄ちゃん、大好きっ！　ぎゅーっ」"

[[dialogue]]
speaker = "unk"
# 笑顔で抱き着いてくるリーナ。これまで何度もあったことだけど、水着だとリーナの柔らかい感触が直に伝わってくる。
line = "笑顔で抱き着いてくるリーナ。これまで何度もあったことだけど、水着だとリーナの柔らかい感触が直に伝わってくる。"

[[dialogue]]
speaker = "リーナ"
# 「……どうしたの、お兄ちゃん？」
line = "「……どうしたの、お兄ちゃん？」"

[[dialogue]]
speaker = "unk"
# ごめん、考えごとしてた
line = "ごめん、考えごとしてた"

[[dialogue]]
speaker = "リーナ"
# 「もう、リーナと遊びに来てるのにぃ」
line = "「もう、リーナと遊びに来てるのにぃ」"

[[dialogue]]
speaker = "unk"
# 兄として振舞おうとしても、やはり異性の女の子であることを意識してしまう。
line = "兄として振舞おうとしても、やはり異性の女の子であることを意識してしまう。"

[[dialogue]]
speaker = "サーシャ"
# 「あら、会長くん？」
line = "「あら、会長くん？」"

[[dialogue]]
speaker = "unk"
# こんにちは、サーシャさん
line = "こんにちは、サーシャさん"

[[dialogue]]
speaker = "リーナ"
# 「お兄ちゃん、この人は？　……ふぅん、お兄ちゃんの学園の先輩なんだ」
line = "「お兄ちゃん、この人は？　……ふぅん、お兄ちゃんの学園の先輩なんだ」"

[[dialogue]]
speaker = "サーシャ"
# 「お兄ちゃん？　あ、会長くんの妹さんかしら～。私は奏サーシャよ、よろしくね～」
line = "「お兄ちゃん？　あ、会長くんの妹さんかしら～。私は奏サーシャよ、よろしくね～」"

[[dialogue]]
speaker = "サーシャ"
# 「ふふっ、奇遇ね。私たちも姉妹でデートなの～」
line = "「ふふっ、奇遇ね。私たちも姉妹でデートなの～」"

[[dialogue]]
speaker = "ソフィア"
# 「姉さん姉さん、見てください！　焼きたてのパンケーキが…………コホン」
line = "「姉さん姉さん、見てください！　焼きたてのパンケーキが…………コホン」"

[[dialogue]]
speaker = "ソフィア"
# 「あの、これはですね、姉さんに焼きたてのパンケーキを食べてほしかっただけで、はしゃいでいるわけではありません。いいですね？」
line = "「あの、これはですね、姉さんに焼きたてのパンケーキを食べてほしかっただけで、はしゃいでいるわけではありません。いいですね？」"

[[dialogue]]
speaker = "リーナ"
# 「じゃあ、お姉ちゃんのこと大好きなんだねっ！　リーナもお兄ちゃんのこと大好きっ！」
line = "「じゃあ、お姉ちゃんのこと大好きなんだねっ！　リーナもお兄ちゃんのこと大好きっ！」"

[[dialogue]]
speaker = "ソフィア"
# 「いや、ちがっ……」
line = "「いや、ちがっ……」"

[[dialogue]]
speaker = "サーシャ"
# 「ええっ、違うの？　お姉ちゃんはソフィが大好きなのに、寂しいわぁ……くすん」
line = "「ええっ、違うの？　お姉ちゃんはソフィが大好きなのに、寂しいわぁ……くすん」"

[[dialogue]]
speaker = "ソフィア"
# 「ああもう、違いませんよ！　そういう小芝居やめてくださいっ」
line = "「ああもう、違いませんよ！　そういう小芝居やめてくださいっ」"

[[dialogue]]
speaker = "サーシャ"
# 「ふふっ、ごめんなさい。でもソフィがお姉ちゃんのこと大好きで嬉しいわ」
line = "「ふふっ、ごめんなさい。でもソフィがお姉ちゃんのこと大好きで嬉しいわ」"

[[dialogue]]
speaker = "ソフィア"
# 「もう、調子がいいんですから」
line = "「もう、調子がいいんですから」"

[[dialogue]]
speaker = "ソフィア"
# 「あなたは初めましてですね。奏ソフィアです。よろしくお願いします」
line = "「あなたは初めましてですね。奏ソフィアです。よろしくお願いします」"

[[dialogue]]
speaker = "リーナ"
# 「リーナは<ruby=ひづき>火憑</ruby>リーナだよっ！」
line = "「リーナは<ruby>火憑<rt>ひづき</rt></ruby>リーナだよっ！」"

[[dialogue]]
speaker = "サーシャ"
# 「会長くんたちもスイーツがお目当てかしら？　ここのスイーツはすごく美味しいから、私も驚いちゃった～」
line = "「会長くんたちもスイーツがお目当てかしら？　ここのスイーツはすごく美味しいから、私も驚いちゃった～」"

[[dialogue]]
speaker = "unk"
# このプール『チェリークルーズ』ではフードメニューにも力を入れていて、特にサランが考案したスイーツは専門店にもひけはとらない。
line = "このプール『チェリークルーズ』ではフードメニューにも力を入れていて、特にサランが考案したスイーツは専門店にもひけはとらない。"

[[dialogue]]
speaker = "リーナ"
# 「ここのパフェがとっても美味しいってレイラお姉ちゃんが言ってたから、お兄ちゃんと食べてみたかったの！」
line = "「ここのパフェがとっても美味しいってレイラお姉ちゃんが言ってたから、お兄ちゃんと食べてみたかったの！」"

[[dialogue]]
speaker = "リーナ"
# 「ほらほら、見て見て～♪　レイラお姉ちゃんが撮ってくれた写真、こんなに綺麗なの♪」
line = "「ほらほら、見て見て～♪　レイラお姉ちゃんが撮ってくれた写真、こんなに綺麗なの♪」"

[[dialogue]]
speaker = "リーナ"
# 「このスイカがたくさんのったパフェ、グランスイカパフェって言うんだって。これをお兄ちゃんと２人で食べるんだ！」
line = "「このスイカがたくさんのったパフェ、グランスイカパフェって言うんだって。これをお兄ちゃんと２人で食べるんだ！」"

[[dialogue]]
speaker = "サーシャ"
# 「すごいボリュームね。でもすごく美味しそう……私たちも食べる、ソフィ？」
line = "「すごいボリュームね。でもすごく美味しそう……私たちも食べる、ソフィ？」"

[[dialogue]]
speaker = "ソフィア"
# 「姉さんが食べたいなら買ってくればいいじゃないですか。手伝ってあげてもいいですよ」
line = "「姉さんが食べたいなら買ってくればいいじゃないですか。手伝ってあげてもいいですよ」"

[[dialogue]]
speaker = "サーシャ"
# 「じゃあ決まりね。私たちで買ってくるから、ソフィとリーナちゃんは席をお願いね～」
line = "「じゃあ決まりね。私たちで買ってくるから、ソフィとリーナちゃんは席をお願いね～」"

[[dialogue]]
speaker = "unk"
# 俺とサーシャさんの２人で、売店にパフェを買いに行く。
line = "俺とサーシャさんの２人で、売店にパフェを買いに行く。"

[[dialogue]]
speaker = "リーナ"
# 「あ…………行っちゃった」
line = "「あ…………行っちゃった」"

[[dialogue]]
speaker = "リーナ"
# 「う～～～～」
line = "「う～～～～」"

[[dialogue]]
speaker = "ソフィア"
# 「どうしたんですか？」
line = "「どうしたんですか？」"

[[dialogue]]
speaker = "リーナ"
# 「お兄ちゃんがサーシャさんと一緒に行っちゃった……キレイな人だし、お兄ちゃんとも仲よさそうだったし……うぅ～～～～」
line = "「お兄ちゃんがサーシャさんと一緒に行っちゃった……キレイな人だし、お兄ちゃんとも仲よさそうだったし……うぅ～～～～」"

[[dialogue]]
speaker = "ソフィア"
# 「はぁ……？　あ、もしかして姉さんに嫉妬しているんですか？」
line = "「はぁ……？　あ、もしかして姉さんに嫉妬しているんですか？」"

[[dialogue]]
speaker = "リーナ"
# 「しっと？」
line = "「しっと？」"

[[dialogue]]
speaker = "ソフィア"
# 「ええと、私もうまく言えませんが、人を羨ましく思って、そのせいで怒りや苛立ちを感じること……でしょうか」
line = "「ええと、私もうまく言えませんが、人を羨ましく思って、そのせいで怒りや苛立ちを感じること……でしょうか」"

[[dialogue]]
speaker = "リーナ"
# 「いかりやいらだち……」
line = "「いかりやいらだち……」"

[[dialogue]]
speaker = "ソフィア"
# 「ええ、そうです。例えば、会長さんが知らない人と楽しそうに話していたら、イライラしたりモヤモヤしませんか？」
line = "「ええ、そうです。例えば、会長さんが知らない人と楽しそうに話していたら、イライラしたりモヤモヤしませんか？」"

[[dialogue]]
speaker = "リーナ"
# 「する！　すごいする！　この前もおさななじみ？　の人がお兄ちゃんとすっごく楽しそうにお話してた！　その間、今みたいに胸が苦しかったの！」
line = "「する！　すごいする！　この前もおさななじみ？　の人がお兄ちゃんとすっごく楽しそうにお話してた！　その間、今みたいに胸が苦しかったの！」"

[[dialogue]]
speaker = "ソフィア"
# 「分かります。私も人間界に来てすぐの時は、姉さんが知らない人と親しげに話していて、イライラしたものです。私は置いていったのに、と」
line = "「分かります。私も人間界に来てすぐの時は、姉さんが知らない人と親しげに話していて、イライラしたものです。私は置いていったのに、と」"

[[dialogue]]
speaker = "リーナ"
# 「そうなんだ。ソフィアちゃんはそのあとどうしたの？」
line = "「そうなんだ。ソフィアちゃんはそのあとどうしたの？」"

[[dialogue]]
speaker = "ソフィア"
# 「どうというか……意地を張ってしまって、しばらくは姉さんには冷たくあたってしまいました。結局、素直に自分の気持ちを伝えて仲直りしましたが」
line = "「どうというか……意地を張ってしまって、しばらくは姉さんには冷たくあたってしまいました。結局、素直に自分の気持ちを伝えて仲直りしましたが」"

[[dialogue]]
speaker = "ソフィア"
# 「リーナさん。モヤモヤするなら、その気持ち、会長さんに伝えてみませんか？　解決にはならないかもしれませんが、それでも、伝えることに意味はあると思うんです」
line = "「リーナさん。モヤモヤするなら、その気持ち、会長さんに伝えてみませんか？　解決にはならないかもしれませんが、それでも、伝えることに意味はあると思うんです」"

[[dialogue]]
speaker = "リーナ"
# 「気持ちを伝える……お兄ちゃんに……」
line = "「気持ちを伝える……お兄ちゃんに……」"

[[dialogue]]
speaker = "ソフィア"
# 「あ、姉さんたち戻ってきましたよ。話してみたらどうですか」
line = "「あ、姉さんたち戻ってきましたよ。話してみたらどうですか」"

[[dialogue]]
speaker = "unk"
# 俺がパフェを持って戻ってくると、入れ替わるようにソフィアがサーシャさんのところに行く。
line = "俺がパフェを持って戻ってくると、入れ替わるようにソフィアがサーシャさんのところに行く。"

[[dialogue]]
speaker = "リーナ"
# 「お、お兄ちゃん。あのね……」
line = "「お、お兄ちゃん。あのね……」"

[[dialogue]]
speaker = "リーナ"
# 「お話があるの……」
line = "「お話があるの……」"
