[[dialogue]]
speaker = "unk"
# 第３話,プリムラとディーラック,P
line = "第３話,プリムラとディーラック,P"

[[dialogue]]
speaker = "unk"
# ある週末。
line = "ある週末。"

[[dialogue]]
speaker = "unk"
# 流星寮に住むプリムラは、同じく寮生のトレジアンナと共に、大聖堂カフェテリアへ昼食をしに来ていた。
line = "流星寮に住むプリムラは、同じく寮生のトレジアンナと共に、大聖堂カフェテリアへ昼食をしに来ていた。"

[[dialogue]]
speaker = "プリムラ"
# 「ん？　外が妙に騒がしいな」
line = "「ん？　外が妙に騒がしいな」"

[[dialogue]]
speaker = "トレジアンナ"
# 「なんでも、今日は大聖堂で結婚式があるそうですよ」
line = "「なんでも、今日は大聖堂で結婚式があるそうですよ」"

[[dialogue]]
speaker = "トレジアンナ"
# 「新婦さんが元星騎士で、学園の卒業生なんだとか。それで結婚式場に大聖堂を選ばれたそうで」
line = "「新婦さんが元星騎士で、学園の卒業生なんだとか。それで結婚式場に大聖堂を選ばれたそうで」"

[[dialogue]]
speaker = "プリムラ"
# 「ほう……結婚式か……」
line = "「ほう……結婚式か……」"

[[dialogue]]
speaker = "トレジアンナ"
# 「おや？　もしかしてプリムラさん、興味あります～？」
line = "「おや？　もしかしてプリムラさん、興味あります～？」"

[[dialogue]]
speaker = "プリムラ"
# 「はぁ！？　な、何を言う！　我が眷族と大聖堂で式を挙げるなどと……」
line = "「はぁ！？　な、何を言う！　我が眷族と大聖堂で式を挙げるなどと……」"

[[dialogue]]
speaker = "プリムラ"
# 「――フヘへへぇ<emoji=heart04>」
line = "「――フヘへへぇ<emoji=heart04>」"

[[dialogue]]
speaker = "トレジアンナ"
# 「想像しちゃいましたね？」
line = "「想像しちゃいましたね？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「ふふっ、このまま会長さんと順調にお付き合いが続けば、遠い未来の話ではないかもしれませんよ～？」
line = "「ふふっ、このまま会長さんと順調にお付き合いが続けば、遠い未来の話ではないかもしれませんよ～？」"

[[dialogue]]
speaker = "プリムラ"
# 「か、からかうでないわ……！」
line = "「か、からかうでないわ……！」"

[[dialogue]]
speaker = "プリムラ"
# （け、眷族と結婚して夫婦に……<emoji=heart04>　ん？　でも、待てよ……？）
line = "（け、眷族と結婚して夫婦に……<emoji=heart04>　ん？　でも、待てよ……？）"

[[dialogue]]
speaker = "プリムラ"
# （我の体はヒトではない。ならば、結婚したとして、子供は……？）
line = "（我の体はヒトではない。ならば、結婚したとして、子供は……？）"

[[dialogue]]
speaker = "ディーラック"
# 「……で？　それでお前を作った『ママ』であるボクに相談しに来たと？」
line = "「……で？　それでお前を作った『ママ』であるボクに相談しに来たと？」"

[[dialogue]]
speaker = "プリムラ"
# 「ママ言うな！　そこは絶対に呼ばんからな！？」
line = "「ママ言うな！　そこは絶対に呼ばんからな！？」"

[[dialogue]]
speaker = "ディーラック"
# 「やれやれ、プリムラの方から初めて呼び出してきたと思ったら、『子供を作れるかどうか』の相談って……」
line = "「やれやれ、プリムラの方から初めて呼び出してきたと思ったら、『子供を作れるかどうか』の相談って……」"

[[dialogue]]
speaker = "ディーラック"
# 「ぷっ……アハハハハ！」
line = "「ぷっ……アハハハハ！」"

[[dialogue]]
speaker = "プリムラ"
# 「笑うな！　だからこいつに相談するのはイヤだったのじゃ、トレジアンナ！」
line = "「笑うな！　だからこいつに相談するのはイヤだったのじゃ、トレジアンナ！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「まあまあ、そこはやはり作り出したご本人が、いちばん詳しいでしょうし……」
line = "「まあまあ、そこはやはり作り出したご本人が、いちばん詳しいでしょうし……」"

[[dialogue]]
speaker = "ディーラック"
# 「ん～、といっても、ぶっちゃけボクにもよくわかんないけどね。まあ、プリムラの体は『賢者の石』でできてるから、いけるんじゃない？」
line = "「ん～、といっても、ぶっちゃけボクにもよくわかんないけどね。まあ、プリムラの体は『賢者の石』でできてるから、いけるんじゃない？」"

[[dialogue]]
speaker = "プリムラ"
# 「適当じゃな！？」
line = "「適当じゃな！？」"

[[dialogue]]
speaker = "ディーラック"
# 「いや、だってボクはあくまで『マイナスエネルギー回収用の終末兵器』としてお前を作ったわけで、生殖能力なんて考慮しとらんし」
line = "「いや、だってボクはあくまで『マイナスエネルギー回収用の終末兵器』としてお前を作ったわけで、生殖能力なんて考慮しとらんし」"

[[dialogue]]
speaker = "プリムラ"
# 「というか、前から気になってたんじゃが……」
line = "「というか、前から気になってたんじゃが……」"

[[dialogue]]
speaker = "プリムラ"
# 「貴様、我が本当に世界を滅ぼしたらどうするつもりだったのじゃ？」
line = "「貴様、我が本当に世界を滅ぼしたらどうするつもりだったのじゃ？」"

[[dialogue]]
speaker = "ディーラック"
# 「ん～？　なんだかんだ誰かが止めてくれてたでしょ、多分」
line = "「ん～？　なんだかんだ誰かが止めてくれてたでしょ、多分」"

[[dialogue]]
speaker = "プリムラ"
# 「多分！？」
line = "「多分！？」"

[[dialogue]]
speaker = "ディーラック"
# 「あの時はマイナスエネルギーをバカでかく生み出せればなんでもよかったから、適当なところで誰かが止めてくれたらな～って」
line = "「あの時はマイナスエネルギーをバカでかく生み出せればなんでもよかったから、適当なところで誰かが止めてくれたらな～って」"

[[dialogue]]
speaker = "プリムラ"
# 「そこも適当！？　くっ……我はこんな奴に作られたのか……！」
line = "「そこも適当！？　くっ……我はこんな奴に作られたのか……！」"

[[dialogue]]
speaker = "ディーラック"
# 「……でもまあ皮肉なことに、適当に作ったら、ボクの思惑を超えて予想以上に自我が強く育っちゃってさ」
line = "「……でもまあ皮肉なことに、適当に作ったら、ボクの思惑を超えて予想以上に自我が強く育っちゃってさ」"

[[dialogue]]
speaker = "ディーラック"
# 「まさか創造主に噛みつくまで進化するとはね」
line = "「まさか創造主に噛みつくまで進化するとはね」"

[[dialogue]]
speaker = "トレジアンナ"
# 「おっ、プリムラさん、ママから褒められてますよ～♪」
line = "「おっ、プリムラさん、ママから褒められてますよ～♪」"

[[dialogue]]
speaker = "ディーラック"
# 「いや、別に褒めてないし！　負かされた愚痴だっつーの！」
line = "「いや、別に褒めてないし！　負かされた愚痴だっつーの！」"

[[dialogue]]
speaker = "プリムラ"
# 「と、とにかくじゃ！　その……我は子供を作ろうと思えば可能、ってことでよいのじゃな！？」
line = "「と、とにかくじゃ！　その……我は子供を作ろうと思えば可能、ってことでよいのじゃな！？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「私的にも行けるんじゃないかと思いますよ！　プリムラさんの友達として、私は会長さんとのハッピーエンドを全力で応援します！」
line = "「私的にも行けるんじゃないかと思いますよ！　プリムラさんの友達として、私は会長さんとのハッピーエンドを全力で応援します！」"

[[dialogue]]
speaker = "プリムラ"
# 「……そ、そうか。相談に乗ってくれたこと……感謝する」
line = "「……そ、そうか。相談に乗ってくれたこと……感謝する」"

[[dialogue]]
speaker = "ディーラック"
# 「あ～あ、終末兵器の癖に、すっかり色気づいちゃってサ～」
line = "「あ～あ、終末兵器の癖に、すっかり色気づいちゃってサ～」"

[[dialogue]]
speaker = "プリムラ"
# 「うっさいわ！　貴様こそ、シズハのところに戻ってきてから、最近は一緒に風呂に入ったり、寝たりしとるんじゃろ？」
line = "「うっさいわ！　貴様こそ、シズハのところに戻ってきてから、最近は一緒に風呂に入ったり、寝たりしとるんじゃろ？」"

[[dialogue]]
speaker = "ディーラック"
# 「なっ、仕方ないだろ！　ボクはシズハちゃんの命令には逆らえないように術式がかかってんだから！」
line = "「なっ、仕方ないだろ！　ボクはシズハちゃんの命令には逆らえないように術式がかかってんだから！」"

[[dialogue]]
speaker = "プリムラ"
# 「はん、そう言って本当は満更でもない癖に、素直じゃないのじゃ！」
line = "「はん、そう言って本当は満更でもない癖に、素直じゃないのじゃ！」"

[[dialogue]]
speaker = "ディーラック"
# 「お前だけには言われたくないんだが！？」
line = "「お前だけには言われたくないんだが！？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「ふふっ、こうして見ると、やっぱり親子っぽいですね～」
line = "「ふふっ、こうして見ると、やっぱり親子っぽいですね～」"

[[dialogue]]
speaker = "プリムラ"
# 「誰がじゃ！？」
line = "「誰がじゃ！？」"

[[dialogue]]
speaker = "unk"
# 新たな週の朝。
line = "新たな週の朝。"

[[dialogue]]
speaker = "unk"
# 俺が仕事の準備をしていると、勢いよく扉が開く。
line = "俺が仕事の準備をしていると、勢いよく扉が開く。"

[[dialogue]]
speaker = "プリムラ"
# 「――眷族よ！　おはようなのじゃ！」
line = "「――眷族よ！　おはようなのじゃ！」"

[[dialogue]]
speaker = "unk"
# ２日ぶり。会いたかったよ
line = "２日ぶり。会いたかったよ"

[[dialogue]]
speaker = "プリムラ"
# 「う、うむ……それでじゃな……」
line = "「う、うむ……それでじゃな……」"

[[dialogue]]
speaker = "unk"
# プリムラはもじもじと視線を泳がせてから、口を開く。
line = "プリムラはもじもじと視線を泳がせてから、口を開く。"

[[dialogue]]
speaker = "プリムラ"
# 「わ、我は――ちゃんと子孫を残せるらしいぞ！」
line = "「わ、我は――ちゃんと子孫を残せるらしいぞ！」"

[[dialogue]]
speaker = "unk"
# はい！？　いきなりなんの話！？
line = "はい！？　いきなりなんの話！？"

[[dialogue]]
speaker = "プリムラ"
# 「と、とにかくそれだけ報告したかったのじゃ！　そういうことでな！」
line = "「と、とにかくそれだけ報告したかったのじゃ！　そういうことでな！」"

[[dialogue]]
speaker = "プリムラ"
# 「――放課後まで、さらばなのじゃ～っ！」
line = "「――放課後まで、さらばなのじゃ～っ！」"

[[dialogue]]
speaker = "unk"
# 顔を赤くしながら、走り去っていくプリムラ。
line = "顔を赤くしながら、走り去っていくプリムラ。"

[[dialogue]]
speaker = "unk"
# 俺はよくわからず、ぽかんとその場で立ち尽くしてしまうのだった。
line = "俺はよくわからず、ぽかんとその場で立ち尽くしてしまうのだった。"
