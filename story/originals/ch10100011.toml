[[dialogue]]
speaker = "unk"
# 第１話,星徒会にご挨拶,P
line = "第１話,星徒会にご挨拶,P"

[[dialogue]]
speaker = "ヴィーナス"
# 「みんな、今日の仕事終わった？　よし！　時間あるし、みんなでカフェテリアでも行かない？」
line = "「みんな、今日の仕事終わった？　よし！　時間あるし、みんなでカフェテリアでも行かない？」"

[[dialogue]]
speaker = "マグダレナ"
# 「お邪魔します」
line = "「お邪魔します」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あなたは……！？」
line = "「あなたは……！？」"

[[dialogue]]
speaker = "マトイ"
# 「え、ヴィーナスの知ってる人？　すごく綺麗な人だけど……どなたですか？　生徒でも先生でもないようだし……」
line = "「え、ヴィーナスの知ってる人？　すごく綺麗な人だけど……どなたですか？　生徒でも先生でもないようだし……」"

[[dialogue]]
speaker = "マグダレナ"
# 「守護天使、《境界》のマグダレナと申します。この度は新星学園星徒会の皆さまにご挨拶に伺いました」
line = "「守護天使、《境界》のマグダレナと申します。この度は新星学園星徒会の皆さまにご挨拶に伺いました」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうそう。フィーニスの塔で会ったんだけど話の途中で消えちゃって……本体は遠くにいるって言ってなかったっけ？」
line = "「そうそう。フィーニスの塔で会ったんだけど話の途中で消えちゃって……本体は遠くにいるって言ってなかったっけ？」"

[[dialogue]]
speaker = "アナ"
# 「はい。ですから私とアニマ先輩で依り代となるボディを作り、力と意識の一部を移す形で現界してもらいました」
line = "「はい。ですから私とアニマ先輩で依り代となるボディを作り、力と意識の一部を移す形で現界してもらいました」"

[[dialogue]]
speaker = "マトイ"
# 「そんなことできるんだ！？」
line = "「そんなことできるんだ！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「フィーニスの塔ではいろいろありがとうね」
line = "「フィーニスの塔ではいろいろありがとうね」"

[[dialogue]]
speaker = "マグダレナ"
# 「いいえ、礼には及びません。この身は領域の摂理を司る守護天使。天界・人間界・魔界、それぞれの境界を守る者ですから」
line = "「いいえ、礼には及びません。この身は領域の摂理を司る守護天使。天界・人間界・魔界、それぞれの境界を守る者ですから」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それってつまり、あなたがいなかったら三界がぐちゃぐちゃになるってこと？」
line = "「それってつまり、あなたがいなかったら三界がぐちゃぐちゃになるってこと？」"

[[dialogue]]
speaker = "マグダレナ"
# 「はい、大まかに言うとそうなりますね」
line = "「はい、大まかに言うとそうなりますね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「へぇ～、守護天使ってほんとにすごいんだ……」
line = "「へぇ～、守護天使ってほんとにすごいんだ……」"

[[dialogue]]
speaker = "マトイ"
# 「じゃあ何とお呼びすれば……？　守護天使って女神様に仕えるかなり高位の存在……なんですよね？」
line = "「じゃあ何とお呼びすれば……？　守護天使って女神様に仕えるかなり高位の存在……なんですよね？」"

[[dialogue]]
speaker = "マグダレナ"
# 「そうですね……」
line = "「そうですね……」"

[[dialogue]]
speaker = "マトイ"
# （三界の境界を守る守護天使ってことは、かなりカッチリした方なんじゃ……やっぱり様付けしないと……）
line = "（三界の境界を守る守護天使ってことは、かなりカッチリした方なんじゃ……やっぱり様付けしないと……）"

[[dialogue]]
speaker = "マグダレナ"
# 「お好きなように呼んでいただいて構いませんよ～。マグダレナでもマグちゃんでも呼びやすいものでどうぞ」
line = "「お好きなように呼んでいただいて構いませんよ～。マグダレナでもマグちゃんでも呼びやすいものでどうぞ」"

[[dialogue]]
speaker = "マグダレナ"
# 「守護天使とはいえ、今の私は皆さまと同じく自らの足で大地を踏む者。お気遣いなさらず、気軽にお声がけください。ふふふ」
line = "「守護天使とはいえ、今の私は皆さまと同じく自らの足で大地を踏む者。お気遣いなさらず、気軽にお声がけください。ふふふ」"

[[dialogue]]
speaker = "マトイ"
# （思ったよりぽわぽわしてる……！　しかも眩しい！）
line = "（思ったよりぽわぽわしてる……！　しかも眩しい！）"

[[dialogue]]
speaker = "サーシャ"
# 「神々しいわ～。じゃあマグダレナさんで」
line = "「神々しいわ～。じゃあマグダレナさんで」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私はマグダレナで！　前からそう呼んでるしいいわよね？」
line = "「私はマグダレナで！　前からそう呼んでるしいいわよね？」"

[[dialogue]]
speaker = "マグダレナ"
# 「はい、もちろんです」
line = "「はい、もちろんです」"

[[dialogue]]
speaker = "マトイ"
# 「ほんとに気軽！？　まぁヴィーナスらしいけど……」
line = "「ほんとに気軽！？　まぁヴィーナスらしいけど……」"

[[dialogue]]
speaker = "マグダレナ"
# 「一度は敵になったとはいえ、我々守護天使は世界の理を守る者。世界の崩壊を防ぐためにともに戦わせてください」
line = "「一度は敵になったとはいえ、我々守護天使は世界の理を守る者。世界の崩壊を防ぐためにともに戦わせてください」"

[[dialogue]]
speaker = "unk"
# よろしくお願いします！
line = "よろしくお願いします！"

[[dialogue]]
speaker = "マグダレナ"
# 「こちらこそよろしくお願いいたします。では流星学園の方々にもご挨拶に――」
line = "「こちらこそよろしくお願いいたします。では流星学園の方々にもご挨拶に――」"

[[dialogue]]
speaker = "マトイ"
# 「今の……誰？」
line = "「今の……誰？」"

[[dialogue]]
speaker = "マグダレナ"
# 「失礼しました、今のお腹の音は私です……。本来守護天使は食事を必要としないのですが、肉体を得て栄養を欲しているようです」
line = "「失礼しました、今のお腹の音は私です……。本来守護天使は食事を必要としないのですが、肉体を得て栄養を欲しているようです」"

[[dialogue]]
speaker = "マグダレナ"
# 「なるほど、人前でお腹が鳴るといささか恥ずかしいのですね。ひとつ学ぶことができました」
line = "「なるほど、人前でお腹が鳴るといささか恥ずかしいのですね。ひとつ学ぶことができました」"

[[dialogue]]
speaker = "ヴィーナス"
# 「よーし、それじゃ改めて、みんなでカフェテリア行きましょ！」
line = "「よーし、それじゃ改めて、みんなでカフェテリア行きましょ！」"

[[dialogue]]
speaker = "マグダレナ"
# 「こちらの場所は……？　良い香りがしますね」
line = "「こちらの場所は……？　良い香りがしますね」"

[[dialogue]]
speaker = "アナ"
# 「新星と流星の両校の生徒がお茶する場所」
line = "「新星と流星の両校の生徒がお茶する場所」"

[[dialogue]]
speaker = "サーシャ"
# 「コーヒーや紅茶の他に、いろいろなケーキもあるのよ～」
line = "「コーヒーや紅茶の他に、いろいろなケーキもあるのよ～」"

[[dialogue]]
speaker = "unk"
# 星騎士たちの憩いの場所です
line = "星騎士たちの憩いの場所です"

[[dialogue]]
speaker = "マグダレナ"
# 「それは興味深いです。ご一緒してもよろしいのですか？」
line = "「それは興味深いです。ご一緒してもよろしいのですか？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「もっちろん！　とりあえず、コーヒーと日替わりケーキ、人数分お願いしまーす！」
line = "「もっちろん！　とりあえず、コーヒーと日替わりケーキ、人数分お願いしまーす！」"

[[dialogue]]
speaker = "マグダレナ"
# 「日替わりケーキ……不思議と胸がときめく言葉ですね。ふふふっ」
line = "「日替わりケーキ……不思議と胸がときめく言葉ですね。ふふふっ」"

[[dialogue]]
speaker = "マグダレナ"
# 「あ、来ました。ではさっそく……あむ」
line = "「あ、来ました。ではさっそく……あむ」"

[[dialogue]]
speaker = "マグダレナ"
# 「！　口の中に広がる甘さ……初めての刺激ですが、これが美味しいという感情なのですね」
line = "「！　口の中に広がる甘さ……初めての刺激ですが、これが美味しいという感情なのですね」"

[[dialogue]]
speaker = "マグダレナ"
# 「コーヒーも風味豊かで、空腹も満たされて……体を得るとこんなことができるようになるのですね」
line = "「コーヒーも風味豊かで、空腹も満たされて……体を得るとこんなことができるようになるのですね」"

[[dialogue]]
speaker = "マグダレナ"
# 「あら？　マトイさま、お口の周りにクリームが付いておりますよ。お拭きいたしますね」
line = "「あら？　マトイさま、お口の周りにクリームが付いておりますよ。お拭きいたしますね」"

[[dialogue]]
speaker = "マトイ"
# 「あ、いえいえ、お気になさらず！　自分で拭きますから！」
line = "「あ、いえいえ、お気になさらず！　自分で拭きますから！」"

[[dialogue]]
speaker = "マグダレナ"
# 「遠慮なさらずともよろしいですのに……」
line = "「遠慮なさらずともよろしいですのに……」"

[[dialogue]]
speaker = "マグダレナ"
# 「あら、ヴィーナスさまのカップがもう空に……こういう時は追加で注文すれば良いのでしょうか」
line = "「あら、ヴィーナスさまのカップがもう空に……こういう時は追加で注文すれば良いのでしょうか」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あ、だいじょーぶ、自分でやるって」
line = "「あ、だいじょーぶ、自分でやるって」"

[[dialogue]]
speaker = "マグダレナ"
# 「さようですか……あ、会長さま。食べる手が止まっているようですが、どうされました？　食べさせて差し上げましょうか？」
line = "「さようですか……あ、会長さま。食べる手が止まっているようですが、どうされました？　食べさせて差し上げましょうか？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「え」
line = "「え」"

[[dialogue]]
speaker = "サーシャ"
# 「あら～？」
line = "「あら～？」"

[[dialogue]]
speaker = "unk"
# 大丈夫です！
line = "大丈夫です！"

[[dialogue]]
speaker = "マグダレナ"
# 「あら、そうですか。あーんして差し上げようと思ったのですが」
line = "「あら、そうですか。あーんして差し上げようと思ったのですが」"

[[dialogue]]
speaker = "アナ"
# 「会長がフリーズしてる」
line = "「会長がフリーズしてる」"

[[dialogue]]
speaker = "マトイ"
# （この天使様、もしかしてめちゃくちゃ甘やかすタイプ……？）
line = "（この天使様、もしかしてめちゃくちゃ甘やかすタイプ……？）"
