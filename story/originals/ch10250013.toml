[[dialogue]]
speaker = "unk"
# 第３話,迷子な舞亜？,P
line = "第３話,迷子な舞亜？,P"

[[dialogue]]
speaker = "舞亜"
# 「ちぇっ、いいとこまで行けると思ったんだけどなぁ……」
line = "「ちぇっ、いいとこまで行けると思ったんだけどなぁ……」"

[[dialogue]]
speaker = "舞亜"
# 「あ……会長さん、こんにちは。この前はトレーニング付き合ってくれてありがとう」
line = "「あ……会長さん、こんにちは。この前はトレーニング付き合ってくれてありがとう」"

[[dialogue]]
speaker = "舞亜"
# 「何をしているかというと……えーっと……散歩？」
line = "「何をしているかというと……えーっと……散歩？」"

[[dialogue]]
speaker = "unk"
# なぜ疑問形？
line = "なぜ疑問形？"

[[dialogue]]
speaker = "ソフィア"
# 「まったく……こんなところにいましたか。なぜか会長さんも一緒ですが」
line = "「まったく……こんなところにいましたか。なぜか会長さんも一緒ですが」"

[[dialogue]]
speaker = "舞亜"
# 「あ、ソフィ。やっほー」
line = "「あ、ソフィ。やっほー」"

[[dialogue]]
speaker = "ソフィア"
# 「やっほーじゃありません。待ち合わせに来ないと思ったら、やっぱり道に迷ってたんじゃないですか」
line = "「やっほーじゃありません。待ち合わせに来ないと思ったら、やっぱり道に迷ってたんじゃないですか」"

[[dialogue]]
speaker = "舞亜"
# 「違う違う、たまたま気が向いてブラブラしてただけだから」
line = "「違う違う、たまたま気が向いてブラブラしてただけだから」"

[[dialogue]]
speaker = "ソフィア"
# 「それはそれで問題です。会長さんはご存じないと思いますが、舞亜さんは方向音痴なのでよく迷うんですよ」
line = "「それはそれで問題です。会長さんはご存じないと思いますが、舞亜さんは方向音痴なのでよく迷うんですよ」"

[[dialogue]]
speaker = "ソフィア"
# 「どうして方向音痴の人って認めたがらないんでしょう。よく今まで選手としてやってこられましたね」
line = "「どうして方向音痴の人って認めたがらないんでしょう。よく今まで選手としてやってこられましたね」"

[[dialogue]]
speaker = "舞亜"
# 「自分でも割とそう思う」
line = "「自分でも割とそう思う」"

[[dialogue]]
speaker = "unk"
# ２人でどこ行くんだ？
line = "２人でどこ行くんだ？"

[[dialogue]]
speaker = "ソフィア"
# 「一緒にパンケーキ食べに行くんです」
line = "「一緒にパンケーキ食べに行くんです」"

[[dialogue]]
speaker = "舞亜"
# 「女の子に甘いものは欠かせないからね。でもけっこうカロリーあるから、２人で半分こするんだよ」
line = "「女の子に甘いものは欠かせないからね。でもけっこうカロリーあるから、２人で半分こするんだよ」"

[[dialogue]]
speaker = "舞亜"
# 「神経質に感じるかもしれないけど、高度なジャンプが要求されるフィギュアスケートの選手は体型や体重の変化にはすごく敏感なんだ」
line = "「神経質に感じるかもしれないけど、高度なジャンプが要求されるフィギュアスケートの選手は体型や体重の変化にはすごく敏感なんだ」"

[[dialogue]]
speaker = "舞亜"
# 「私だっておっぱい大きくなった時は大変だったんだから」
line = "「私だっておっぱい大きくなった時は大変だったんだから」"

[[dialogue]]
speaker = "unk"
# おっ……！？
line = "おっ……！？"

[[dialogue]]
speaker = "ソフィア"
# 「舞亜さん、会長さんの前でそういう話は……」
line = "「舞亜さん、会長さんの前でそういう話は……」"

[[dialogue]]
speaker = "舞亜"
# 「あ、こういうのもセクハラになるんだっけ。ごめんごめん」
line = "「あ、こういうのもセクハラになるんだっけ。ごめんごめん」"

[[dialogue]]
speaker = "ソフィア"
# 「むー……」
line = "「むー……」"

[[dialogue]]
speaker = "ソフィア"
# （私だってそのうち成長……する気がしない……）
line = "（私だってそのうち成長……する気がしない……）"

[[dialogue]]
speaker = "舞亜"
# 「ん？　ソフィどうしたの？」
line = "「ん？　ソフィどうしたの？」"

[[dialogue]]
speaker = "ソフィア"
# 「いえ、なんでもないです……」
line = "「いえ、なんでもないです……」"

[[dialogue]]
speaker = "舞亜"
# 「あ、そうだ。会長さんも一緒にパンケーキ食べに行かない？　会長さんがいたら分け合っていろんなメニュー食べられそうだし」
line = "「あ、そうだ。会長さんも一緒にパンケーキ食べに行かない？　会長さんがいたら分け合っていろんなメニュー食べられそうだし」"

[[dialogue]]
speaker = "unk"
# 男といるところを見られてもいいのか？
line = "男といるところを見られてもいいのか？"

[[dialogue]]
speaker = "舞亜"
# 「有名人だから心配してくれてるの？　ふふっ、芸能人じゃなくてアスリートなんだから大丈夫だよ」
line = "「有名人だから心配してくれてるの？　ふふっ、芸能人じゃなくてアスリートなんだから大丈夫だよ」"

[[dialogue]]
speaker = "舞亜"
# 「でも会長さんなら噂になってもいいよ。もし誤解されたらホントに付き合っちゃう？」
line = "「でも会長さんなら噂になってもいいよ。もし誤解されたらホントに付き合っちゃう？」"

[[dialogue]]
speaker = "ソフィア"
# 「もうっ、舞亜さんは本気か冗談かわからない顔でそういうこと言うんですから」
line = "「もうっ、舞亜さんは本気か冗談かわからない顔でそういうこと言うんですから」"

[[dialogue]]
speaker = "舞亜"
# 「え～、私本気なのになー」
line = "「え～、私本気なのになー」"

[[dialogue]]
speaker = "ソフィア"
# 「！　モンスターが現れました。ここから近いです」
line = "「！　モンスターが現れました。ここから近いです」"

[[dialogue]]
speaker = "舞亜"
# 「フッ──私はこれを見越して迷子になっていたのさ」
line = "「フッ──私はこれを見越して迷子になっていたのさ」"

[[dialogue]]
speaker = "ソフィア"
# 「絶対ウソですよね。というかようやく迷子と認めましたね」
line = "「絶対ウソですよね。というかようやく迷子と認めましたね」"

[[dialogue]]
speaker = "ソフィア"
# 「行きますよ。パンケーキのためにも早く片付けましょう」
line = "「行きますよ。パンケーキのためにも早く片付けましょう」"

[[dialogue]]
speaker = "舞亜"
# 「――アイスフォールダンス」
line = "「――アイスフォールダンス」"

[[dialogue]]
speaker = "舞亜"
# 「ま、こんな感じかな。特訓の成果が出たんじゃない？」
line = "「ま、こんな感じかな。特訓の成果が出たんじゃない？」"

[[dialogue]]
speaker = "unk"
# かっこ良かった
line = "かっこ良かった"

[[dialogue]]
speaker = "舞亜"
# 「ありがとう。会長さんに言われると嬉しいな」
line = "「ありがとう。会長さんに言われると嬉しいな」"

[[dialogue]]
speaker = "舞亜"
# 「会長さんもかっこ良かったよ。ちょっとドキドキしちゃった」
line = "「会長さんもかっこ良かったよ。ちょっとドキドキしちゃった」"

[[dialogue]]
speaker = "サーシャ"
# 「もう戦闘は終わっちゃったのかしら～？　あら、みんな先に着いてたのね。おつかれさま～」
line = "「もう戦闘は終わっちゃったのかしら～？　あら、みんな先に着いてたのね。おつかれさま～」"

[[dialogue]]
speaker = "ソフィア"
# 「姉さんっ？」
line = "「姉さんっ？」"

[[dialogue]]
speaker = "舞亜"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "サーシャ"
# 「あれ、そんなにじっと見つめてどうしたの？　私の顔に何か付いてるかしら～？　それにあなた、柊舞亜ちゃん……？」
line = "「あれ、そんなにじっと見つめてどうしたの？　私の顔に何か付いてるかしら～？　それにあなた、柊舞亜ちゃん……？」"

[[dialogue]]
speaker = "舞亜"
# 「あの……以前フィギュアスケートの会場でモンスターと戦ったことありませんでしたか？」
line = "「あの……以前フィギュアスケートの会場でモンスターと戦ったことありませんでしたか？」"

[[dialogue]]
speaker = "サーシャ"
# 「え？　ええ、あの時は妹がスケートをしてるからつい重ねちゃって、すごく力が入ったわね～」
line = "「え？　ええ、あの時は妹がスケートをしてるからつい重ねちゃって、すごく力が入ったわね～」"

[[dialogue]]
speaker = "舞亜"
# 「そうか、どうりで会わないと思ったら新星の方だったんだ。その可能性を忘れてた……」
line = "「そうか、どうりで会わないと思ったら新星の方だったんだ。その可能性を忘れてた……」"

[[dialogue]]
speaker = "舞亜"
# 「私、あの時助けてもらって、それがきっかけで流星学園に入ったんです。本当にありがとうございました」
line = "「私、あの時助けてもらって、それがきっかけで流星学園に入ったんです。本当にありがとうございました」"

[[dialogue]]
speaker = "サーシャ"
# 「そうなのね～。学園は違うけど嬉しいわ～」
line = "「そうなのね～。学園は違うけど嬉しいわ～」"

[[dialogue]]
speaker = "ソフィア"
# 「舞亜さんを助けたのが……姉さん？」
line = "「舞亜さんを助けたのが……姉さん？」"

[[dialogue]]
speaker = "舞亜"
# 「え？　ソフィのお姉さん？」
line = "「え？　ソフィのお姉さん？」"

[[dialogue]]
speaker = "サーシャ"
# 「あら～？　ソフィのお友達？」
line = "「あら～？　ソフィのお友達？」"

[[dialogue]]
speaker = "unk"
# ……
line = "……"

[[dialogue]]
speaker = "unk"
# …………
line = "…………"

[[dialogue]]
speaker = "サーシャ"
# 「ふふふ。なるほど、ソフィと同じ部活動なのね。運命を感じるわ～」
line = "「ふふふ。なるほど、ソフィと同じ部活動なのね。運命を感じるわ～」"

[[dialogue]]
speaker = "ソフィア"
# 「舞亜さんを助けたのが、まさかよりによって姉さんだとは……」
line = "「舞亜さんを助けたのが、まさかよりによって姉さんだとは……」"

[[dialogue]]
speaker = "舞亜"
# 「流星学園でソフィを初めて見た時、なんか雰囲気が似てるなとは思ったけど姉妹だったとは……」
line = "「流星学園でソフィを初めて見た時、なんか雰囲気が似てるなとは思ったけど姉妹だったとは……」"

[[dialogue]]
speaker = "ソフィア"
# 「じゃあ最初から私に聞けばよかったじゃないですかっ」
line = "「じゃあ最初から私に聞けばよかったじゃないですかっ」"

[[dialogue]]
speaker = "舞亜"
# 「いやまさか、姉妹なんて偶然があるとは思わなくて……灯台下暗しだったよ。あはは」
line = "「いやまさか、姉妹なんて偶然があるとは思わなくて……灯台下暗しだったよ。あはは」"
