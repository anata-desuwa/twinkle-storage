[[dialogue]]
speaker = "unk"
# 第４話,あなたの傍に,P
line = "第４話,あなたの傍に,P"

[[dialogue]]
speaker = "unk"
# 『ふたりきりで会えませんか』
line = "『ふたりきりで会えませんか』"

[[dialogue]]
speaker = "unk"
# レイラからのメッセージにはそうあったので、放課後に校門前で待ち合わせることにした。
line = "レイラからのメッセージにはそうあったので、放課後に校門前で待ち合わせることにした。"

[[dialogue]]
speaker = "レイラ"
# 「お待たせしました、魔王さん」
line = "「お待たせしました、魔王さん」"

[[dialogue]]
speaker = "unk"
# 俺も今来たとこだから
line = "俺も今来たとこだから"

[[dialogue]]
speaker = "レイラ"
# 「ふふっ、そう言うとまるでデートみたいですね…………あ」
line = "「ふふっ、そう言うとまるでデートみたいですね…………あ」"

[[dialogue]]
speaker = "レイラ"
# （魔王さん、いつもより身だしなみがきちっとしてる……もしかして、デートだと思っていらっしゃる？）
line = "（魔王さん、いつもより身だしなみがきちっとしてる……もしかして、デートだと思っていらっしゃる？）"

[[dialogue]]
speaker = "レイラ"
# （でも、メッセージにはデートとは書いてないはず…………いや、冷静に考えて、ふたりきりで会いたいはデートの誘いだろ百目騎レイラぁ！）
line = "（でも、メッセージにはデートとは書いてないはず…………いや、冷静に考えて、ふたりきりで会いたいはデートの誘いだろ百目騎レイラぁ！）"

[[dialogue]]
speaker = "レイラ"
# 「あー、コホン。先日は大変な失礼をいたしました。今日はそのことを謝りたかったんです」
line = "「あー、コホン。先日は大変な失礼をいたしました。今日はそのことを謝りたかったんです」"

[[dialogue]]
speaker = "レイラ"
# 「男性に対し、胸の大きさのお話をすべきではないと、コハルコさんにも叱られてしまいました」
line = "「男性に対し、胸の大きさのお話をすべきではないと、コハルコさんにも叱られてしまいました」"

[[dialogue]]
speaker = "レイラ"
# 「他意はなかったんです。本当に肩こりがつらいと伝えたかっただけで……いえ、言い訳はやめましょう」
line = "「他意はなかったんです。本当に肩こりがつらいと伝えたかっただけで……いえ、言い訳はやめましょう」"

[[dialogue]]
speaker = "レイラ"
# 「さぞ居心地の悪い思いをされたと思います。本当にすみませんでした」
line = "「さぞ居心地の悪い思いをされたと思います。本当にすみませんでした」"

[[dialogue]]
speaker = "unk"
# こちらこそ、ごめん
line = "こちらこそ、ごめん"

[[dialogue]]
speaker = "レイラ"
# 「……意識しすぎて避けていた、ですか？　いえ、元は私が悪いのですから気にしないでください」
line = "「……意識しすぎて避けていた、ですか？　いえ、元は私が悪いのですから気にしないでください」"

[[dialogue]]
speaker = "レイラ"
# 「今回の件で、私からお詫びをさせてください。魔王さんは何か欲しいものや、してほしいことはありませんか？」
line = "「今回の件で、私からお詫びをさせてください。魔王さんは何か欲しいものや、してほしいことはありませんか？」"

[[dialogue]]
speaker = "unk"
# ならデートしてほしい
line = "ならデートしてほしい"

[[dialogue]]
speaker = "レイラ"
# 「はい、デートですね。分かりまし……デ、デ、デ、デートォッ！？」
line = "「はい、デートですね。分かりまし……デ、デ、デ、デートォッ！？」"

[[dialogue]]
speaker = "レイラ"
# 「デートってあのリア充がやってる秘密の儀式ですか！？」
line = "「デートってあのリア充がやってる秘密の儀式ですか！？」"

[[dialogue]]
speaker = "レイラ"
# 「……もちろんそのデート？　こんな根暗のギークとデートなんて魔王さんも奇特な方ですね……」
line = "「……もちろんそのデート？　こんな根暗のギークとデートなんて魔王さんも奇特な方ですね……」"

[[dialogue]]
speaker = "unk"
# 俺はもうすでに、レイラを異性として意識してしまっている。確信はないけど、きっとその先の感情も。
line = "俺はもうすでに、レイラを異性として意識してしまっている。確信はないけど、きっとその先の感情も。"

[[dialogue]]
speaker = "レイラ"
# 「……え、レイラといると楽しい、ですか？　それは……その、ありがとうございます」
line = "「……え、レイラといると楽しい、ですか？　それは……その、ありがとうございます」"

[[dialogue]]
speaker = "レイラ"
# 「……私も、魔王さんといると、楽しいですし」
line = "「……私も、魔王さんといると、楽しいですし」"

[[dialogue]]
speaker = "レイラ"
# 「あ、いえ、なんでもありません！　じゃあどこに行きましょうか？」
line = "「あ、いえ、なんでもありません！　じゃあどこに行きましょうか？」"

[[dialogue]]
speaker = "レイラ"
# 「ここが流星市国でも有名な、大盛り自慢の中華料理屋さんですね。一度来てみたかったんです」
line = "「ここが流星市国でも有名な、大盛り自慢の中華料理屋さんですね。一度来てみたかったんです」"

[[dialogue]]
speaker = "レイラ"
# 「制限時間内に１０キロのチャーハンを食べきれば賞金がもらえるそうです」
line = "「制限時間内に１０キロのチャーハンを食べきれば賞金がもらえるそうです」"

[[dialogue]]
speaker = "レイラ"
# 「魔王さん、どうか刮目あれ！　百目騎レイラの雄姿をご覧にいれますとも！」
line = "「魔王さん、どうか刮目あれ！　百目騎レイラの雄姿をご覧にいれますとも！」"

[[dialogue]]
speaker = "レイラ"
# 「トゥ！　ヘアー！」
line = "「トゥ！　ヘアー！」"

[[dialogue]]
speaker = "レイラ"
# 「１０キロのスペシャルチャーハン、たいへん美味でした。具材とお米の一体感、ムラのない味付け……素晴らしい職人技でしたね」
line = "「１０キロのスペシャルチャーハン、たいへん美味でした。具材とお米の一体感、ムラのない味付け……素晴らしい職人技でしたね」"

[[dialogue]]
speaker = "レイラ"
# 「そのあとのバケツ杏仁豆腐も絶品でした。柔らかさを保ったままあの形に固めるのは並みの技術ではありません」
line = "「そのあとのバケツ杏仁豆腐も絶品でした。柔らかさを保ったままあの形に固めるのは並みの技術ではありません」"

[[dialogue]]
speaker = "レイラ"
# 「……レイラの食べっぷりに圧倒された？　そうでしょうそうでしょう。昔から、両親からもいい食べっぷりだねーと褒められてきましたから」
line = "「……レイラの食べっぷりに圧倒された？　そうでしょうそうでしょう。昔から、両親からもいい食べっぷりだねーと褒められてきましたから」"

[[dialogue]]
speaker = "レイラ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "レイラ"
# 「魔王さん、少しだけ付き合っていただいてもいいですか？」
line = "「魔王さん、少しだけ付き合っていただいてもいいですか？」"

[[dialogue]]
speaker = "レイラ"
# 「両親のことを思い出したら、ここに来たくなってしまって。一緒に来てくれてありがとうございます」
line = "「両親のことを思い出したら、ここに来たくなってしまって。一緒に来てくれてありがとうございます」"

[[dialogue]]
speaker = "レイラ"
# 「子どものころは両親と一緒に礼拝に来ていたんです。……魔王さんも、ですか？　じゃあ気付かないうちにすれ違っていたのかもしれませんね」
line = "「子どものころは両親と一緒に礼拝に来ていたんです。……魔王さんも、ですか？　じゃあ気付かないうちにすれ違っていたのかもしれませんね」"

[[dialogue]]
speaker = "レイラ"
# 「あの『太陽の壁画』に憧れて、私はコラプサーを結成したんです。私もあんな風になるんだー、って無邪気に両親に言っていました」
line = "「あの『太陽の壁画』に憧れて、私はコラプサーを結成したんです。私もあんな風になるんだー、って無邪気に両親に言っていました」"

[[dialogue]]
speaker = "レイラ"
# 「今は魔王が救世の英雄であることは知っています。過去の魔王も、今代の魔王のあなたも、です」
line = "「今は魔王が救世の英雄であることは知っています。過去の魔王も、今代の魔王のあなたも、です」"

[[dialogue]]
speaker = "レイラ"
# 「それでも、幼心に抱いた憧れが消えることはありません」
line = "「それでも、幼心に抱いた憧れが消えることはありません」"

[[dialogue]]
speaker = "unk"
# 俺も、そうだ
line = "俺も、そうだ"

[[dialogue]]
speaker = "レイラ"
# 「魔王さんにも憧れの人がいるんですね。……はい。もう会えないとしても、憧れが無になることはありません。諦めない限り、その光は私たちを照らしてくれるのです」
line = "「魔王さんにも憧れの人がいるんですね。……はい。もう会えないとしても、憧れが無になることはありません。諦めない限り、その光は私たちを照らしてくれるのです」"

[[dialogue]]
speaker = "レイラ"
# 「道を踏み外した私に、そのことを教えてくれたのはあなたでした。魔王さんがいたから、私は誰も手にかけずにいられたのです」
line = "「道を踏み外した私に、そのことを教えてくれたのはあなたでした。魔王さんがいたから、私は誰も手にかけずにいられたのです」"

[[dialogue]]
speaker = "レイラ"
# 「コラプサーのみんなは困った子ばかりですけど、私の新しい家族です。みんなで今度こそ、世界を救うために戦います」
line = "「コラプサーのみんなは困った子ばかりですけど、私の新しい家族です。みんなで今度こそ、世界を救うために戦います」"

[[dialogue]]
speaker = "レイラ"
# 「それを両親と、あなたに誓います」
line = "「それを両親と、あなたに誓います」"

[[dialogue]]
speaker = "レイラ"
# 「だから、傍で見守っていてくださいね。ずっとずっと──私もあなたの傍にいたいですから」
line = "「だから、傍で見守っていてくださいね。ずっとずっと──私もあなたの傍にいたいですから」"
