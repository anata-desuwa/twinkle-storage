[[dialogue]]
speaker = "unk"
# 第３話,激おこ（？）ぷんぷん紅明,P
line = "第３話,激おこ（？）ぷんぷん紅明,P"

[[dialogue]]
speaker = "unk"
# とある休日。このところ忙しくて２人きりの時間が持てていなかった為、紅明と家で１日ゆっくり過ごすことになった――
line = "とある休日。このところ忙しくて２人きりの時間が持てていなかった為、紅明と家で１日ゆっくり過ごすことになった――"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「というわけで、ダーリン<emoji=heart04>　今日は思う存分、イチャイチャするっしょ～<emoji=heart04>」
line = "「というわけで、ダーリン<emoji=heart04>　今日は思う存分、イチャイチャするっしょ～<emoji=heart04>」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「ん～？　――なんでラクシャシーフォームなのかって？　守護天使セッシー曰く、この衣装の方が『バブみ』？　が増すらしいんだよね♪」
line = "「ん～？　――なんでラクシャシーフォームなのかって？　守護天使セッシー曰く、この衣装の方が『バブみ』？　が増すらしいんだよね♪」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「なんで、夫婦気分でらぶらぶイチャイチャしたい今日みたいな日には、ぴったりかな～と思って<emoji=heart04>」
line = "「なんで、夫婦気分でらぶらぶイチャイチャしたい今日みたいな日には、ぴったりかな～と思って<emoji=heart04>」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「それで、今日は～」
line = "「それで、今日は～」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「――ダーリンと<b>マッサージ</b>がしたいっしょ<emoji=heart04>」
line = "「――ダーリンと<b>マッサージ</b>がしたいっしょ<emoji=heart04>」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「ほら、アタシはタレントの仕事、ダーリンは会長の仕事で忙しかったから、色々疲れが溜まってるっしょ？」
line = "「ほら、アタシはタレントの仕事、ダーリンは会長の仕事で忙しかったから、色々疲れが溜まってるっしょ？」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「だから、ね？　ダーリン、お願い<emoji=heart04>」
line = "「だから、ね？　ダーリン、お願い<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そうして、まずは俺が紅明の体をマッサージすることになったのだが……
line = "そうして、まずは俺が紅明の体をマッサージすることになったのだが……"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「あっ<emoji=heart04>　ダーリン、そこ利くぅ……<emoji=heart04>」
line = "「あっ<emoji=heart04>　ダーリン、そこ利くぅ……<emoji=heart04>」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「んっ<emoji=heart04>　ふあぁっ……<emoji=heart04>　すごく気持ちいいっ……<emoji=heart04>」
line = "「んっ<emoji=heart04>　ふあぁっ……<emoji=heart04>　すごく気持ちいいっ……<emoji=heart04>」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「はぁんっ<emoji=heart04>　指、そんなに入れちゃ……感じちゃう……<emoji=heart04>」
line = "「はぁんっ<emoji=heart04>　指、そんなに入れちゃ……感じちゃう……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# （普通にマッサージしてるだけだぞ……）
line = "（普通にマッサージしてるだけだぞ……）"

[[dialogue]]
speaker = "unk"
# （落ち着け俺……）
line = "（落ち着け俺……）"

[[dialogue]]
speaker = "unk"
# 紅明の体に触れているだけで、俺は妙にドキドキしてしまって――
line = "紅明の体に触れているだけで、俺は妙にドキドキしてしまって――"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「こいつぁすごいぜ！　体が軽くて、本当に元気になったっしょ♪」
line = "「こいつぁすごいぜ！　体が軽くて、本当に元気になったっしょ♪」"

[[dialogue]]
speaker = "unk"
# なんとか俺は、何事もなくマッサージを終えることができたのだが……
line = "なんとか俺は、何事もなくマッサージを終えることができたのだが……"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「――前にマッサージ店でバイトしてたことがある？　さっすがアタシのダーリン、技能多才でそこに痺れる憧れる☆」
line = "「――前にマッサージ店でバイトしてたことがある？　さっすがアタシのダーリン、技能多才でそこに痺れる憧れる☆」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「って、そうじゃなくてっ！　結局エッチなイタズラしないんか～い！！！」
line = "「って、そうじゃなくてっ！　結局エッチなイタズラしないんか～い！！！」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「アタシがマッサージ中にちょっと色っぽい声を出したり！　わざとダーリンの腕に胸を当てたり、お尻振ったりしてたのに！！　一切乗ってこないとか！！！」
line = "「アタシがマッサージ中にちょっと色っぽい声を出したり！　わざとダーリンの腕に胸を当てたり、お尻振ったりしてたのに！！　一切乗ってこないとか！！！」"

[[dialogue]]
speaker = "unk"
# わざとだったのか……
line = "わざとだったのか……"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「そりゃそうよ！　当ててんのよ！？　彼女がこれだけ露骨に誘ってるのに、乗ってこない彼氏がいるかーーーっ！！！」
line = "「そりゃそうよ！　当ててんのよ！？　彼女がこれだけ露骨に誘ってるのに、乗ってこない彼氏がいるかーーーっ！！！」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「なんで変な自制心を発揮してるのさ！？　激おこぷんぷん丸～！」
line = "「なんで変な自制心を発揮してるのさ！？　激おこぷんぷん丸～！」"

[[dialogue]]
speaker = "unk"
# と俺の頬を両手で挟むと、ふにふにして来る。
line = "と俺の頬を両手で挟むと、ふにふにして来る。"

[[dialogue]]
speaker = "unk"
# 俺はそこでふと、前に聞いた『紅明は怒るのが苦手』という話を思い出し――
line = "俺はそこでふと、前に聞いた『紅明は怒るのが苦手』という話を思い出し――"

[[dialogue]]
speaker = "unk"
# あれ？　もしかして今……怒られてる？
line = "あれ？　もしかして今……怒られてる？"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「どう見てもそうっしょ！　――って、ダーリン、その口元を押さえる仕草はなによ！？」
line = "「どう見てもそうっしょ！　――って、ダーリン、その口元を押さえる仕草はなによ！？」"

[[dialogue]]
speaker = "unk"
# 俺の彼女、怒り方可愛すぎ……
line = "俺の彼女、怒り方可愛すぎ……"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「その可愛いって言い方、なんか嬉しくないんだが！？」
line = "「その可愛いって言い方、なんか嬉しくないんだが！？」"

[[dialogue]]
speaker = "unk"
# 俺は彼女に、バイトしていた時の癖で、マッサージ中に変なことをしてはダメだと自制してしまったと伝える。
line = "俺は彼女に、バイトしていた時の癖で、マッサージ中に変なことをしてはダメだと自制してしまったと伝える。"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「――む～っ！　なら、今からダーリンにはアタシの体に対する『フリータッチ権』を与えるっしょ！」
line = "「――む～っ！　なら、今からダーリンにはアタシの体に対する『フリータッチ権』を与えるっしょ！」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「この権利は永久不滅で、ダーリンはいついかなる時でも、アタシの体は好きに触っていいし、揉んでいいものとします！　事前の許可やムード作りは必要ありません！」
line = "「この権利は永久不滅で、ダーリンはいついかなる時でも、アタシの体は好きに触っていいし、揉んでいいものとします！　事前の許可やムード作りは必要ありません！」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「つまりは、アタシが『マッサージしたい』って言った時は、もっとイチャイチャしようぜってことっしょ♪　というわけで～」
line = "「つまりは、アタシが『マッサージしたい』って言った時は、もっとイチャイチャしようぜってことっしょ♪　というわけで～」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「ダーリン、次は――<b>ここ</b>のマッサージをして欲しいっしょ<emoji=heart04>」
line = "「ダーリン、次は――<b>ここ</b>のマッサージをして欲しいっしょ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そう言って紅明が人差し指で触れたのは――彼女の唇だった。
line = "そう言って紅明が人差し指で触れたのは――彼女の唇だった。"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「んっ……<emoji=heart04>」
line = "「んっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺は言葉の代わりに、彼女にそっと顔を寄せることで応える。
line = "俺は言葉の代わりに、彼女にそっと顔を寄せることで応える。"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「ダーリン……<emoji=heart04>　ちゅっ<emoji=heart04>」
line = "「ダーリン……<emoji=heart04>　ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「ちゅっ、んちゅっ……<emoji=heart04>　んっ……ちゅっ<emoji=heart04>」
line = "「ちゅっ、んちゅっ……<emoji=heart04>　んっ……ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# しばらくして、唇が離れると――
line = "しばらくして、唇が離れると――"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「……ふぅ<emoji=heart04>　……さてダーリン、次はどうする？」
line = "「……ふぅ<emoji=heart04>　……さてダーリン、次はどうする？」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「――おっぱい揉む？　うしし<emoji=heart04>」
line = "「――おっぱい揉む？　うしし<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そう言って、悪戯っぽく笑う紅明なのだった――
line = "そう言って、悪戯っぽく笑う紅明なのだった――"
