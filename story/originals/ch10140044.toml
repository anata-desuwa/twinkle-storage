[[dialogue]]
speaker = "unk"
# 第４話,時計の針を進めて,P
line = "第４話,時計の針を進めて,P"

[[dialogue]]
speaker = "unk"
# その日、モンスター出現の報せを受け、俺はトワちゃんや星徒会メンバーと共に現場へ急行し、応戦していた。
line = "その日、モンスター出現の報せを受け、俺はトワちゃんや星徒会メンバーと共に現場へ急行し、応戦していた。"

[[dialogue]]
speaker = "モンスター"
# 「ギギ！」
line = "「ギギ！」"

[[dialogue]]
speaker = "女性"
# 「この子は傷つけさせない……！」
line = "「この子は傷つけさせない……！」"

[[dialogue]]
speaker = "トワ先生"
# 「はああぁっ！　バレンタインマーキュリー！」
line = "「はああぁっ！　バレンタインマーキュリー！」"

[[dialogue]]
speaker = "女性"
# 「あっ……！」
line = "「あっ……！」"

[[dialogue]]
speaker = "モンスター"
# 「ギーーッ！？」
line = "「ギーーッ！？」"

[[dialogue]]
speaker = "トワ先生"
# 「ふぅ……よかった、間に合って。怪我はありませんか？」
line = "「ふぅ……よかった、間に合って。怪我はありませんか？」"

[[dialogue]]
speaker = "女性"
# 「うん、大丈夫。助けてくれてありがとう、トワ」
line = "「うん、大丈夫。助けてくれてありがとう、トワ」"

[[dialogue]]
speaker = "トワ先生"
# 「え？　あっ――カコ！？」
line = "「え？　あっ――カコ！？」"

[[dialogue]]
speaker = "unk"
# 戦闘を終えて現場が落ち着いた頃、トワちゃんのところへ行くと、知り合いらしい大人の女性と話していた。
line = "戦闘を終えて現場が落ち着いた頃、トワちゃんのところへ行くと、知り合いらしい大人の女性と話していた。"

[[dialogue]]
speaker = "unk"
# トワちゃん、そちらの方は？
line = "トワちゃん、そちらの方は？"

[[dialogue]]
speaker = "トワ先生"
# 「あっ、会長くん！　紹介するね。この人は私が学園に通っていた頃の同級生で――」
line = "「あっ、会長くん！　紹介するね。この人は私が学園に通っていた頃の同級生で――」"

[[dialogue]]
speaker = "カコ"
# 「初めまして、会長くん。私は元星騎士で、トワやマリオンと一緒に星徒会をやってた『<ruby=ときかわ>時川</ruby>カコ』って言います。よろしくね♪」
line = "「初めまして、会長くん。私は元星騎士で、トワやマリオンと一緒に星徒会をやってた『<ruby>時川<rt>ときかわ</rt></ruby>カコ』って言います。よろしくね♪」"

[[dialogue]]
speaker = "トワ先生"
# 「カコはね、当時マリオンに負けないくらい強い副会長だったんだよ～」
line = "「カコはね、当時マリオンに負けないくらい強い副会長だったんだよ～」"

[[dialogue]]
speaker = "トワ先生"
# 「今はこんなに綺麗で落ち着いた人妻さんだけど、当時は巨大なメイスをバットみたいにぶん回す、ゴリゴリの近距離型星騎士で～」
line = "「今はこんなに綺麗で落ち着いた人妻さんだけど、当時は巨大なメイスをバットみたいにぶん回す、ゴリゴリの近距離型星騎士で～」"

[[dialogue]]
speaker = "カコ"
# 「ちょっ、言い方！　なんかゴリラみたいな聞こえるからやめて～」
line = "「ちょっ、言い方！　なんかゴリラみたいな聞こえるからやめて～」"

[[dialogue]]
speaker = "トワ先生"
# 「あははっ♪　ごめんごめん。でも、ほんと強かったんだよ！　――そういえば、体はもう大丈夫？　最近忙しくてなかなか会いに行けてなかったけど……」
line = "「あははっ♪　ごめんごめん。でも、ほんと強かったんだよ！　――そういえば、体はもう大丈夫？　最近忙しくてなかなか会いに行けてなかったけど……」"

[[dialogue]]
speaker = "カコ"
# 「うん、もうすっかり元気♪　これでも元星騎士だからね。それに――この子を守るために、お母さんとしても頑張らないと」
line = "「うん、もうすっかり元気♪　これでも元星騎士だからね。それに――この子を守るために、お母さんとしても頑張らないと」"

[[dialogue]]
speaker = "unk"
# カコさんの腕には、小さな赤ちゃんがすやすやと眠っていた。
line = "カコさんの腕には、小さな赤ちゃんがすやすやと眠っていた。"

[[dialogue]]
speaker = "トワ先生"
# 「ふふっ……可愛い♪　確か、女の子だったよね？」
line = "「ふふっ……可愛い♪　確か、女の子だったよね？」"

[[dialogue]]
speaker = "カコ"
# 「うん。ありがとね、トワ。助けてくれて……。でも、びっくりしちゃった！　まさかそんな可愛い衣装で現れるなんて」
line = "「うん。ありがとね、トワ。助けてくれて……。でも、びっくりしちゃった！　まさかそんな可愛い衣装で現れるなんて」"

[[dialogue]]
speaker = "トワ先生"
# 「えっ！？　あっ、こ、これは最近新しく変身できるようになった『バレンタインフォーム』で……」
line = "「えっ！？　あっ、こ、これは最近新しく変身できるようになった『バレンタインフォーム』で……」"

[[dialogue]]
speaker = "カコ"
# 「先生としてだけじゃなく、星騎士としても活躍してるって聞いたよ。マリオンから」
line = "「先生としてだけじゃなく、星騎士としても活躍してるって聞いたよ。マリオンから」"

[[dialogue]]
speaker = "カコ"
# 「今も強くなり続けてるなんて、トワはほんとすごい星騎士だね。……正直、ちょっと羨ましいくらい」
line = "「今も強くなり続けてるなんて、トワはほんとすごい星騎士だね。……正直、ちょっと羨ましいくらい」"

[[dialogue]]
speaker = "トワ先生"
# 「カコ……？」
line = "「カコ……？」"

[[dialogue]]
speaker = "カコ"
# 「さっきみたいにモンスターに襲われても、私はもう星力を使えなくて、この子を守ってあげられないから……」
line = "「さっきみたいにモンスターに襲われても、私はもう星力を使えなくて、この子を守ってあげられないから……」"

[[dialogue]]
speaker = "カコ"
# 「――ごめんね、トワ。ずっと謝らなきゃと思っていたことがあるの。私が星力を失った時……泣きながら『私の分まで戦ってほしい』ってお願いしたこと、覚えてる？」
line = "「――ごめんね、トワ。ずっと謝らなきゃと思っていたことがあるの。私が星力を失った時……泣きながら『私の分まで戦ってほしい』ってお願いしたこと、覚えてる？」"

[[dialogue]]
speaker = "トワ先生"
# 「……うん、覚えてるよ」
line = "「……うん、覚えてるよ」"

[[dialogue]]
speaker = "カコ"
# 「もしかしたら、あれがトワのプレッシャーになってたんじゃないかって……私、後から気づいたの」
line = "「もしかしたら、あれがトワのプレッシャーになってたんじゃないかって……私、後から気づいたの」"

[[dialogue]]
speaker = "カコ"
# 「でも、頑張っているトワを見ていたら……やっぱり気にしなくていいなんて、今更言えなくなっちゃって……」
line = "「でも、頑張っているトワを見ていたら……やっぱり気にしなくていいなんて、今更言えなくなっちゃって……」"

[[dialogue]]
speaker = "カコ"
# 「トワが本当は、自分の特殊体質をあまり好きじゃないってこと……私、知ってたのに。……本当にごめん」
line = "「トワが本当は、自分の特殊体質をあまり好きじゃないってこと……私、知ってたのに。……本当にごめん」"

[[dialogue]]
speaker = "unk"
# そう言って、カコさんは深く頭を下げる。トワちゃんは１度息を吸って、ゆっくりと口を開いた。
line = "そう言って、カコさんは深く頭を下げる。トワちゃんは１度息を吸って、ゆっくりと口を開いた。"

[[dialogue]]
speaker = "トワ先生"
# 「……確かに、そう思ったこともあったよ。でも――最近はね、この『自動回復』の特殊体質があってよかったって、素直に思えるようになってきたんだ」
line = "「……確かに、そう思ったこともあったよ。でも――最近はね、この『自動回復』の特殊体質があってよかったって、素直に思えるようになってきたんだ」"

[[dialogue]]
speaker = "トワ先生"
# 「そのおかげで私は、今もこうして――友達の幸せを守ることができる」
line = "「そのおかげで私は、今もこうして――友達の幸せを守ることができる」"

[[dialogue]]
speaker = "トワ先生"
# 「だから、今度は私からカコにお願いするね。カコは『お母さん』として、その子を幸せにしてあげて」
line = "「だから、今度は私からカコにお願いするね。カコは『お母さん』として、その子を幸せにしてあげて」"

[[dialogue]]
speaker = "カコ"
# 「この子を、幸せに……？」
line = "「この子を、幸せに……？」"

[[dialogue]]
speaker = "トワ先生"
# 「そう。それは私にはできない――お母さんになったカコだからこそ、できることだから」
line = "「そう。それは私にはできない――お母さんになったカコだからこそ、できることだから」"

[[dialogue]]
speaker = "カコ"
# 「……うん、そうだね。ありがとう、トワ」
line = "「……うん、そうだね。ありがとう、トワ」"

[[dialogue]]
speaker = "カコ"
# 「私――お母さんとしてもっと強くなるよ」
line = "「私――お母さんとしてもっと強くなるよ」"

[[dialogue]]
speaker = "トワ先生"
# 「うん！　私も――カコたちの想いを背負って頑張るから♪」
line = "「うん！　私も――カコたちの想いを背負って頑張るから♪」"

[[dialogue]]
speaker = "unk"
# ２人は互いに笑い合い、未来への決意を言葉にした。
line = "２人は互いに笑い合い、未来への決意を言葉にした。"

[[dialogue]]
speaker = "unk"
# そしてカコさんは、ふと俺の方に視線を向ける。
line = "そしてカコさんは、ふと俺の方に視線を向ける。"

[[dialogue]]
speaker = "カコ"
# 「ところで……トワって、会長くんと『いい感じ』だったりする？」
line = "「ところで……トワって、会長くんと『いい感じ』だったりする？」"

[[dialogue]]
speaker = "トワ先生"
# 「えっ！？　どどど、どうして！？」
line = "「えっ！？　どどど、どうして！？」"

[[dialogue]]
speaker = "unk"
# 一応、教師と生徒という関係のため、恋人であることはなるべく周囲には内緒にしている。焦るトワちゃんを見て、カコさんは優しく笑った。
line = "一応、教師と生徒という関係のため、恋人であることはなるべく周囲には内緒にしている。焦るトワちゃんを見て、カコさんは優しく笑った。"

[[dialogue]]
speaker = "カコ"
# 「ふふっ、長い付き合いだもの、見ればわかるわよ。大丈夫、私は応援してるから♪」
line = "「ふふっ、長い付き合いだもの、見ればわかるわよ。大丈夫、私は応援してるから♪」"

[[dialogue]]
speaker = "カコ"
# 「トワが私の幸せを守ってくれたみたいに、私もトワの幸せを応援する。――友達としてね♪」
line = "「トワが私の幸せを守ってくれたみたいに、私もトワの幸せを応援する。――友達としてね♪」"

[[dialogue]]
speaker = "トワ先生"
# 「し、幸せって……<emoji=heart04>　あぅ……<emoji=heart04>」
line = "「し、幸せって……<emoji=heart04>　あぅ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 顔を赤くしながら、ちらりと俺の方を見つめるトワちゃん。
line = "顔を赤くしながら、ちらりと俺の方を見つめるトワちゃん。"

[[dialogue]]
speaker = "カコ"
# 「星騎士として頑張るのも大事だけど、自分を犠牲にしないでね。『トワ自身の幸せ』も、ちゃんと大切にして」
line = "「星騎士として頑張るのも大事だけど、自分を犠牲にしないでね。『トワ自身の幸せ』も、ちゃんと大切にして」"

[[dialogue]]
speaker = "カコ"
# 「リクリエと戦う為に自分を犠牲にしないで、トワ自身の幸せもちゃんと忘れずに追いかけてね」
line = "「リクリエと戦う為に自分を犠牲にしないで、トワ自身の幸せもちゃんと忘れずに追いかけてね」"

[[dialogue]]
speaker = "カコ"
# 「……でも、守ってくれる人がいるみたいだし、大丈夫か♪　ね、会長くん？」
line = "「……でも、守ってくれる人がいるみたいだし、大丈夫か♪　ね、会長くん？」"

[[dialogue]]
speaker = "unk"
# はい。トワちゃんの幸せは、俺が守ります
line = "はい。トワちゃんの幸せは、俺が守ります"

[[dialogue]]
speaker = "トワ先生"
# 「！　か、会長くん……<emoji=heart04>　え、えへへへぇ<emoji=heart04>」
line = "「！　か、会長くん……<emoji=heart04>　え、えへへへぇ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 少しして、カコさんの旦那さんが駆けつけてきた。モンスター襲撃の知らせを聞いて、仕事を抜けて慌てて来たらしい。
line = "少しして、カコさんの旦那さんが駆けつけてきた。モンスター襲撃の知らせを聞いて、仕事を抜けて慌てて来たらしい。"

[[dialogue]]
speaker = "カコ"
# 「――じゃあ、もうそろそろ私は行くね。今日は助けてくれて本当にありがと、トワ」
line = "「――じゃあ、もうそろそろ私は行くね。今日は助けてくれて本当にありがと、トワ」"

[[dialogue]]
speaker = "トワ先生"
# 「うん。また今度、近いうちに――あっ、そうだ！　聞き忘れてた！」
line = "「うん。また今度、近いうちに――あっ、そうだ！　聞き忘れてた！」"

[[dialogue]]
speaker = "トワ先生"
# 「カコの娘ちゃん、名前はなんていうの？」
line = "「カコの娘ちゃん、名前はなんていうの？」"

[[dialogue]]
speaker = "カコ"
# 「――『ミライ』だよ」
line = "「――『ミライ』だよ」"

[[dialogue]]
speaker = "トワ先生"
# 「ミライちゃん……うん、とっても素敵な名前だね♪」
line = "「ミライちゃん……うん、とっても素敵な名前だね♪」"

[[dialogue]]
speaker = "unk"
# トワちゃんはそう言って笑顔で手を振り、カコさん親子を見送った。
line = "トワちゃんはそう言って笑顔で手を振り、カコさん親子を見送った。"

[[dialogue]]
speaker = "unk"
# 去っていく背中を見つめたあと、トワちゃんは俺の方を振り返り、少し照れくさそうに微笑んだ。
line = "去っていく背中を見つめたあと、トワちゃんは俺の方を振り返り、少し照れくさそうに微笑んだ。"

[[dialogue]]
speaker = "トワ先生"
# 「それじゃあ会長くん、帰ろっか。――私たちの学園に♪」
line = "「それじゃあ会長くん、帰ろっか。――私たちの学園に♪」"

[[dialogue]]
speaker = "トワ先生"
# 「私、星騎士としてもっと頑張るよ。幸せな『未来』を守る為に」
line = "「私、星騎士としてもっと頑張るよ。幸せな『未来』を守る為に」"

[[dialogue]]
speaker = "unk"
# ああ、頑張ろう。一緒に
line = "ああ、頑張ろう。一緒に"

[[dialogue]]
speaker = "unk"
# 俺は頷き、トワちゃんの手をそっと握る。彼女も微笑み返し、指を絡めて恋人繋ぎに握り直した。
line = "俺は頷き、トワちゃんの手をそっと握る。彼女も微笑み返し、指を絡めて恋人繋ぎに握り直した。"

[[dialogue]]
speaker = "トワ先生"
# 「うん♪　えへへ<emoji=heart04>」
line = "「うん♪　えへへ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# その笑顔は、俺が何よりも好きな――あたたかい未来の光だった。
line = "その笑顔は、俺が何よりも好きな――あたたかい未来の光だった。"
