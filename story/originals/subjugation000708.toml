line = "「星騎士どもが集まってきてるってよ。これ以上囲まれる前に戻ってこいって言われちまった」"

[[dialogue]]
speaker = "キサナ"
# 「それとボスからの言伝だ……。『これは星騎士への宣戦布告に過ぎない。覚悟しておけ』だとよ。ハッ」
line = "「それとボスからの言伝だ……。『これは星騎士への宣戦布告に過ぎない。覚悟しておけ』だとよ。ハッ」"

[[dialogue]]
speaker = "ミア"
# 「宣戦、布告……？」
line = "「宣戦、布告……？」"

[[dialogue]]
speaker = "エリス"
# 「あなたたちは一体……」
line = "「あなたたちは一体……」"

[[dialogue]]
speaker = "キサナ"
# 「あぁ？　あ、そーいや名乗ってなかったな……。言えっつわれてたのすっかり忘れてたぜ……」
line = "「あぁ？　あ、そーいや名乗ってなかったな……。言えっつわれてたのすっかり忘れてたぜ……」"

[[dialogue]]
speaker = "キサナ"
# 「アタシらはコラプサー。星の光を喰らう者だ」
line = "「アタシらはコラプサー。星の光を喰らう者だ」"

[[dialogue]]
speaker = "キサナ"
# 「ま、覚えておかなくてもいいぜ。ボケッとしてる間に息の根止めてやるからよ」
line = "「ま、覚えておかなくてもいいぜ。ボケッとしてる間に息の根止めてやるからよ」"

[[dialogue]]
speaker = "ミア"
# 「あっ、待ちなさいっ……！」
line = "「あっ、待ちなさいっ……！」"

[[dialogue]]
speaker = "エリス"
# 「いえ、深追いは禁物です。彼女の組織の応援も来ているかもしれません」
line = "「いえ、深追いは禁物です。彼女の組織の応援も来ているかもしれません」"

[[dialogue]]
speaker = "ミア"
# 「くっ……もう少し足止めできれば捕まえられたのに……。こんなことなら最初からもっと大人数で攻めるべきでしたでしょうか……」
line = "「くっ……もう少し足止めできれば捕まえられたのに……。こんなことなら最初からもっと大人数で攻めるべきでしたでしょうか……」"

[[dialogue]]
speaker = "エリス"
# 「そんなことありませんよ。集団で挑めば、さしもの彼女も即時撤退したはずです。貴重な情報も得られなかったでしょう」
line = "「そんなことありませんよ。集団で挑めば、さしもの彼女も即時撤退したはずです。貴重な情報も得られなかったでしょう」"

[[dialogue]]
speaker = "unk"
# コラプサー……か
line = "コラプサー……か"

[[dialogue]]
speaker = "エリス"
# 「星の光を食らう者……私たちへの宣戦布告……」
line = "「星の光を食らう者……私たちへの宣戦布告……」"

[[dialogue]]
speaker = "エリス"
# 「事態は思っていたより深刻なのかもしれませんね。私たち星騎士を憎み、そして狙う集団が現れた……」
line = "「事態は思っていたより深刻なのかもしれませんね。私たち星騎士を憎み、そして狙う集団が現れた……」"

[[dialogue]]
speaker = "ミア"
# 「ごめんなさい。そもそも私が軽率な行動を取らなければ、もっと色んな情報を得ることもできたかもしれないのに……」
line = "「ごめんなさい。そもそも私が軽率な行動を取らなければ、もっと色んな情報を得ることもできたかもしれないのに……」"

[[dialogue]]
speaker = "エリス"
# 「ふふ、いいえ。ミアさんは素晴らしい活躍をされましたよ」
line = "「ふふ、いいえ。ミアさんは素晴らしい活躍をされましたよ」"

[[dialogue]]
speaker = "ミア"
# 「え……？」
line = "「え……？」"

[[dialogue]]
speaker = "エリス"
# 「ミアさんが彼女の力の弱点を見抜いてくださったからこそ、彼女を捕縛するための作戦を立てられたんです」
line = "「ミアさんが彼女の力の弱点を見抜いてくださったからこそ、彼女を捕縛するための作戦を立てられたんです」"

[[dialogue]]
speaker = "エリス"
# 「そしてミアさんが身を挺して彼女の力を消耗させたおかげで、こうして彼女を撃退することができたんです」
line = "「そしてミアさんが身を挺して彼女の力を消耗させたおかげで、こうして彼女を撃退することができたんです」"

[[dialogue]]
speaker = "エリス"
# 「彼女の力は脅威ですが……力に限界があると知れた以上、無闇に星騎士を襲うこともできないでしょう。彼女の容貌も記録できたはずです」
line = "「彼女の力は脅威ですが……力に限界があると知れた以上、無闇に星騎士を襲うこともできないでしょう。彼女の容貌も記録できたはずです」"

[[dialogue]]
speaker = "エリス"
# 「私が襲われた時はただ逃げ延びるだけで精一杯でしたからね。ミアさんの慧眼と勇気を私も見習わなくては」
line = "「私が襲われた時はただ逃げ延びるだけで精一杯でしたからね。ミアさんの慧眼と勇気を私も見習わなくては」"

[[dialogue]]
speaker = "ミア"
# 「そんな……。私はただ無謀な真似をしちゃっただけで……。子どもみたいに意地になって飛び出して行っちゃっただけで……」
line = "「そんな……。私はただ無謀な真似をしちゃっただけで……。子どもみたいに意地になって飛び出して行っちゃっただけで……」"

