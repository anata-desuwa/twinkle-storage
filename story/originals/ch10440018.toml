# 「ふあああぁぁぁっ<emoji=heart04><emoji=heart04><emoji=heart04>　中出しされて、イっくぅぅぅぅぅぅぅうぅぅぅぅぅうぅぅぅ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」
line = "「ふあああぁぁぁっ<emoji=heart04><emoji=heart04><emoji=heart04>　中出しされて、イっくぅぅぅぅぅぅぅうぅぅぅぅぅうぅぅぅ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
# 「眷族の子種<emoji=heart04>　いっぱい<emoji=heart04>　入ってきてる……っ<emoji=heart04>　おち○ぽ子宮口に押しつけられて、すごい勢いで出てるのじゃ……っ<emoji=heart04>」
line = "「眷族の子種<emoji=heart04>　いっぱい<emoji=heart04>　入ってきてる……っ<emoji=heart04>　おち○ぽ子宮口に押しつけられて、すごい勢いで出てるのじゃ……っ<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
# 「あぁっ……<emoji=heart04>　ん……っ<emoji=heart04>　精子、熱い……<emoji=heart04>　はあぁっ……<emoji=heart04>　んあぁ……っ<emoji=heart04>　んっ……<emoji=heart04>　すごい量なのじゃ……<emoji=heart04>　ふうぅ……<emoji=heart04>」
line = "「あぁっ……<emoji=heart04>　ん……っ<emoji=heart04>　精子、熱い……<emoji=heart04>　はあぁっ……<emoji=heart04>　んあぁ……っ<emoji=heart04>　んっ……<emoji=heart04>　すごい量なのじゃ……<emoji=heart04>　ふうぅ……<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
# 「子宮の中、精子で全部満たされておる……<emoji=heart04>」
line = "「子宮の中、精子で全部満たされておる……<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
# 「ん……はぁっ<emoji=heart04>　ふぅ……んっ<emoji=heart04>　あ……抜いてしまうのか？　はぁん……<emoji=heart04>」
line = "「ん……はぁっ<emoji=heart04>　ふぅ……んっ<emoji=heart04>　あ……抜いてしまうのか？　はぁん……<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
# 「はあぁ……<emoji=heart04>　量が多すぎて、精液出てきちゃうのじゃ<emoji=heart04>　んっ……<emoji=heart04>」
line = "「はあぁ……<emoji=heart04>　量が多すぎて、精液出てきちゃうのじゃ<emoji=heart04>　んっ……<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
# 「ダメじゃ……おま○こバカになって……腰に力が入らん……<emoji=heart04>」
line = "「ダメじゃ……おま○こバカになって……腰に力が入らん……<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
# 「って……な、なんじゃっ、そんなニヤニヤして！」
line = "「って……な、なんじゃっ、そんなニヤニヤして！」"

[[dialogue]]
speaker = "プリムラ"
# 「……まったく、勝負も負けるし、イかされるし……今日は散々じゃ」
line = "「……まったく、勝負も負けるし、イかされるし……今日は散々じゃ」"

[[dialogue]]
speaker = "クロト"
# 「でも、そうなるのを期待してたんでしょ？」
line = "「でも、そうなるのを期待してたんでしょ？」"

[[dialogue]]
speaker = "プリムラ"
# 「……う、うるさいわ！　確かに眷族に責められるのは好きじゃが……こんなこと、事後にわざわざ言わせるでない！」
line = "「……う、うるさいわ！　確かに眷族に責められるのは好きじゃが……こんなこと、事後にわざわざ言わせるでない！」"

[[dialogue]]
speaker = "プリムラ"
# 「うぅ……してる最中に言ったことを思い出して、恥ずかしくなるじゃろうが……」
line = "「うぅ……してる最中に言ったことを思い出して、恥ずかしくなるじゃろうが……」"

[[dialogue]]
speaker = "プリムラ"
# 「それもこれも、貴様のおち○ぽが凶悪すぎるせいじゃ……！　この……このっ！」
line = "「それもこれも、貴様のおち○ぽが凶悪すぎるせいじゃ……！　この……このっ！」"

[[dialogue]]
speaker = "クロト"
# 「はいはい……でも、プリムラも悪いんだぞ？」
line = "「はいはい……でも、プリムラも悪いんだぞ？」"

[[dialogue]]
speaker = "プリムラ"
# 「我が……？　どうしてじゃ」
line = "「我が……？　どうしてじゃ」"

[[dialogue]]
speaker = "クロト"
# 「だって、エッチしてる時のプリムラ、凶悪な可愛さなんだから。男なら興奮するに決まってる」
line = "「だって、エッチしてる時のプリムラ、凶悪な可愛さなんだから。男なら興奮するに決まってる」"

[[dialogue]]
speaker = "プリムラ"
# 「そ、そうなのか……我、そんなに可愛いのか」
line = "「そ、そうなのか……我、そんなに可愛いのか」"

[[dialogue]]
speaker = "クロト"
# 「俺だけのものにしたいって思える、最高に可愛い恋人だ」
line = "「俺だけのものにしたいって思える、最高に可愛い恋人だ」"

[[dialogue]]
speaker = "プリムラ"
# 「……フヘ、フヘへ♪　ま、まぁ……眷族じゃし、体の関係もあるわけじゃしな。恋人……という言い方は間違いではないな。……フヘへ<emoji=heart04>」
line = "「……フヘ、フヘへ♪　ま、まぁ……眷族じゃし、体の関係もあるわけじゃしな。恋人……という言い方は間違いではないな。……フヘへ<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
# 「せっかくじゃし……もっと褒めてもいいんじゃぞ<emoji=heart04>」
line = "「せっかくじゃし……もっと褒めてもいいんじゃぞ<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
# 「そうだなぁ……でも、言葉にしてもし尽せないというか……」
line = "「そうだなぁ……でも、言葉にしてもし尽せないというか……」"

[[dialogue]]
speaker = "プリムラ"
# 「む……そうなのか？　それは……ちょっと残念じゃが……って、ひゃっ！？　おま○こに、おち○ぽ当たって……！」
line = "「む……そうなのか？　それは……ちょっと残念じゃが……って、ひゃっ！？　おま○こに、おち○ぽ当たって……！」"

[[dialogue]]
speaker = "クロト"
# 「続きはこれで……。思い出したら、またムラムラしてきちゃったから」
line = "「続きはこれで……。思い出したら、またムラムラしてきちゃったから」"

[[dialogue]]
speaker = "プリムラ"
# 「あ、あんなに出したのに、もうおち○ぽ大きくなって……<emoji=heart04>　んっ……<emoji=heart04>　じ、じゃが、我の魅力でそうなるというなら仕方あるまい……<emoji=heart04>」
line = "「あ、あんなに出したのに、もうおち○ぽ大きくなって……<emoji=heart04>　んっ……<emoji=heart04>　じ、じゃが、我の魅力でそうなるというなら仕方あるまい……<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
# 「我がどんなに可愛いか……じっくりまったり……そして激しく、教えてもらわねばな<emoji=heart04>」
line = "「我がどんなに可愛いか……じっくりまったり……そして激しく、教えてもらわねばな<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
# 「どんな甘い言葉が聞けるのか、期待しているからな……我が主よ<emoji=heart04>　――あっ<emoji=heart04>　あんっ……<emoji=heart04>」
line = "「どんな甘い言葉が聞けるのか、期待しているからな……我が主よ<emoji=heart04>　――あっ<emoji=heart04>　あんっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# その後、プリムラの望み通り、激しく愛し合いながら、何度も可愛いと褒めてあげるのだった――
line = "その後、プリムラの望み通り、激しく愛し合いながら、何度も可愛いと褒めてあげるのだった――"
