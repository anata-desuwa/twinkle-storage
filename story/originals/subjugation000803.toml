[[dialogue]]
speaker = "unk"
# 大聖堂カフェテリアから、つい逃げ出してしまったせつな――
line = "大聖堂カフェテリアから、つい逃げ出してしまったせつな――"

[[dialogue]]
speaker = "せつな"
# 「うぅ……耐えて忍ぶのが忍者だというのに、恥ずかしさを抑え切れず、主様に無礼な態度をとってしまったでござる……」
line = "「うぅ……耐えて忍ぶのが忍者だというのに、恥ずかしさを抑え切れず、主様に無礼な態度をとってしまったでござる……」"

[[dialogue]]
speaker = "せつな"
# 「でも……バレンタインの日まで、主様に打ち明けるわけには――」
line = "「でも……バレンタインの日まで、主様に打ち明けるわけには――」"

[[dialogue]]
speaker = "蘭美"
# 「なるほど。やはりそういうことね」
line = "「なるほど。やはりそういうことね」"

[[dialogue]]
speaker = "せつな"
# 「って、蘭美殿！？　いつの間に！？」
line = "「って、蘭美殿！？　いつの間に！？」"

[[dialogue]]
speaker = "蘭美"
# 「ふっ、本物の忍者である貴方といえど、学園最速と呼ばれる私からは、そう簡単に逃げられないわよ」
line = "「ふっ、本物の忍者である貴方といえど、学園最速と呼ばれる私からは、そう簡単に逃げられないわよ」"

[[dialogue]]
speaker = "せつな"
# 「さすがは飛び級のメイド長……恐るべしでござる……」
line = "「さすがは飛び級のメイド長……恐るべしでござる……」"

[[dialogue]]
speaker = "蘭美"
# 「変な隠し事も光速で看破するから、私には通用しないわ。せつな、貴方――」
line = "「変な隠し事も光速で看破するから、私には通用しないわ。せつな、貴方――」"

[[dialogue]]
speaker = "蘭美"
# 「会長にバレンタインチョコを作っていたんじゃない？」
line = "「会長にバレンタインチョコを作っていたんじゃない？」"

[[dialogue]]
speaker = "せつな"
# 「う……は、はい……。実は……」
line = "「う……は、はい……。実は……」"

[[dialogue]]
speaker = "せつな"
# 「せつなはカフェテリアの厨房を貸して頂いて……主様へ贈る手作りバレンタインチョコの、修業をしていたのでござる」
line = "「せつなはカフェテリアの厨房を貸して頂いて……主様へ贈る手作りバレンタインチョコの、修業をしていたのでござる」"

[[dialogue]]
speaker = "蘭美"
# 「だから会長には、今度のバレンタイン当日まで秘密にしておきたかった、というわけね」
line = "「だから会長には、今度のバレンタイン当日まで秘密にしておきたかった、というわけね」"

[[dialogue]]
speaker = "せつな"
# 「左様にござる……」
line = "「左様にござる……」"

[[dialogue]]
speaker = "蘭美"
# 「会長の前から逃げた理由はわかったわ。でも、それだけじゃまだ分からないことがある」
line = "「会長の前から逃げた理由はわかったわ。でも、それだけじゃまだ分からないことがある」"

[[dialogue]]
speaker = "蘭美"
# 「あのゴーレムは一体なんなの？　貴方が作り出したって言ってたけど、アレからは甘い匂い――」
line = "「あのゴーレムは一体なんなの？　貴方が作り出したって言ってたけど、アレからは甘い匂い――」"

[[dialogue]]
speaker = "蘭美"
# 「そう、<b>チョコレート</b>の匂いがしてたわ」
line = "「そう、<b>チョコレート</b>の匂いがしてたわ」"

[[dialogue]]
speaker = "せつな"
# 「……チョコが変身したのでござる」
line = "「……チョコが変身したのでござる」"

[[dialogue]]
speaker = "蘭美"
# 「は？」
line = "「は？」"

[[dialogue]]
speaker = "せつな"
# 「せつながチョコを作っていたら、なぜか勝手に星術が発動して、ゴーレムに変身してしまったのでござる！」
line = "「せつながチョコを作っていたら、なぜか勝手に星術が発動して、ゴーレムに変身してしまったのでござる！」"

[[dialogue]]
speaker = "蘭美"
# 「えっと……せつな？」
line = "「えっと……せつな？」"

[[dialogue]]
speaker = "蘭美"
# 「確かに、貴方が料理が苦手なのは知っているわ。だけど――」
line = "「確かに、貴方が料理が苦手なのは知っているわ。だけど――」"

[[dialogue]]
speaker = "蘭美"
# 「チョコは突然、ゴーレムになったりしないわ！」
line = "「チョコは突然、ゴーレムになったりしないわ！」"

[[dialogue]]
speaker = "せつな"
# 「自分でもそう思うでござるが、なっちゃったのでござる！」
line = "「自分でもそう思うでござるが、なっちゃったのでござる！」"

[[dialogue]]
speaker = "蘭美"
# 「いや、どういう星術よ！？」
line = "「いや、どういう星術よ！？」"

[[dialogue]]
speaker = "せつな"
# 「せつなも初めてのことで……料理をしててダークマターを作り出してしまうことなら、これまでもあったでござるが……」
line = "「せつなも初めてのことで……料理をしててダークマターを作り出してしまうことなら、これまでもあったでござるが……」"

[[dialogue]]
speaker = "蘭美"
# 「ダークマターも普通は生まれないけどね！？」
line = "「ダークマターも普通は生まれないけどね！？」"

[[dialogue]]
speaker = "蘭美"
# 「とにかく、事情は把握したわ。そういうことなら――」
line = "「とにかく、事情は把握したわ。そういうことなら――」"

[[dialogue]]
speaker = "蘭美"
# 「この世界第２位の天才美少女メイド、羽宮蘭美が、貴方に直接チョコ作りの指導をしてあげるわ！」
line = "「この世界第２位の天才美少女メイド、羽宮蘭美が、貴方に直接チョコ作りの指導をしてあげるわ！」"

[[dialogue]]
speaker = "せつな"
# 「えっ！？　蘭美殿、せつなを手伝って下さるのでござるか！？」
line = "「えっ！？　蘭美殿、せつなを手伝って下さるのでござるか！？」"

[[dialogue]]
speaker = "蘭美"
# 「まあ、またさっきみたいなゴーレム騒ぎを起こして、九浄家メイド隊の悪評が立っても困るしね」
line = "「まあ、またさっきみたいなゴーレム騒ぎを起こして、九浄家メイド隊の悪評が立っても困るしね」"

[[dialogue]]
speaker = "蘭美"
# 「メイド長として、特別に面倒を見てあげるわ。光栄に思いなさい？」
line = "「メイド長として、特別に面倒を見てあげるわ。光栄に思いなさい？」"

[[dialogue]]
speaker = "せつな"
# 「蘭美殿……！　感謝致しまする！」
line = "「蘭美殿……！　感謝致しまする！」"

[[dialogue]]
speaker = "蘭美"
# 「ふふんっ♪　それじゃあ最速で――今日からバレンタイン修業、スタートよ！」
line = "「ふふんっ♪　それじゃあ最速で――今日からバレンタイン修業、スタートよ！」"

[[dialogue]]
speaker = "せつな"
# 「御意！」
line = "「御意！」"

[[dialogue]]
speaker = "unk"
# それから２人は再びカフェテリアに移動し、厨房を借りて、チョコ作りを開始することになった――
line = "それから２人は再びカフェテリアに移動し、厨房を借りて、チョコ作りを開始することになった――"

[[dialogue]]
speaker = "蘭美"
# 「会長はどうやら、仕事で星徒会室に戻ったみたいね」
line = "「会長はどうやら、仕事で星徒会室に戻ったみたいね」"

[[dialogue]]
speaker = "蘭美"
# 「それから、材料のチョコも在庫は十分と。うん、このまま問題なく始められるわね」
line = "「それから、材料のチョコも在庫は十分と。うん、このまま問題なく始められるわね」"

[[dialogue]]
speaker = "蘭美"
# 「そういえば、ゴーレムの方が気になってたから聞き忘れてたけど。せつな、その服ってどうしたの？　今まで見せたことなかったわよね？」
line = "「そういえば、ゴーレムの方が気になってたから聞き忘れてたけど。せつな、その服ってどうしたの？　今まで見せたことなかったわよね？」"

[[dialogue]]
speaker = "せつな"
# 「このバレンタイン衣装でござるか？　これはご当主様が下さったのでござる！」
line = "「このバレンタイン衣装でござるか？　これはご当主様が下さったのでござる！」"

[[dialogue]]
speaker = "蘭美"
# 「ヘレナ様が？」
line = "「ヘレナ様が？」"

[[dialogue]]
speaker = "せつな"
# 「はい。主様に手作りチョコを贈りたいという話をしたら、何やら閃いたと仰って……」
line = "「はい。主様に手作りチョコを贈りたいという話をしたら、何やら閃いたと仰って……」"

[[dialogue]]
speaker = "せつな"
# 「せつなの為にわざわざデザインして、作って下さったのでござる！」
line = "「せつなの為にわざわざデザインして、作って下さったのでござる！」"

[[dialogue]]
speaker = "蘭美"
# 「言われてみれば、可愛いもの好きなヘレナ様らしいデザインね。せつなになかなか似合っていると、褒めてあげるわ」
line = "「言われてみれば、可愛いもの好きなヘレナ様らしいデザインね。せつなになかなか似合っていると、褒めてあげるわ」"

[[dialogue]]
speaker = "せつな"
# 「えへへぇ♪　蘭美殿、ありがとうでございまする！」
line = "「えへへぇ♪　蘭美殿、ありがとうでございまする！」"

[[dialogue]]
speaker = "蘭美"
# 「それじゃあ、チョコ作りを始めていくわよ。せつな」
line = "「それじゃあ、チョコ作りを始めていくわよ。せつな」"

[[dialogue]]
speaker = "せつな"
# 「かしこまりましてにござる！」
line = "「かしこまりましてにござる！」"

[[dialogue]]
speaker = "蘭美"
# 「――って、待ちなさい。貴方がいま取り出した液体が入っているビンはなんなの？」
line = "「――って、待ちなさい。貴方がいま取り出した液体が入っているビンはなんなの？」"

[[dialogue]]
speaker = "蘭美"
# 「なんというか、液体が形容しがたい色をしているけど！」
line = "「なんというか、液体が形容しがたい色をしているけど！」"

[[dialogue]]
speaker = "せつな"
# 「？　これは材料に使おうと思って用意した、せつな特製の調合ドリンクにござる！　滋養強壮の効果があり、三日三晩寝ずとも働けるようになる優れモノでござる！」
line = "「？　これは材料に使おうと思って用意した、せつな特製の調合ドリンクにござる！　滋養強壮の効果があり、三日三晩寝ずとも働けるようになる優れモノでござる！」"

[[dialogue]]
speaker = "せつな"
# 「調合成分は紫桜の里の秘伝ゆえ、具体名は明かせぬでござるが、野草半分、虫半分くらいの割合でござる！」
line = "「調合成分は紫桜の里の秘伝ゆえ、具体名は明かせぬでござるが、野草半分、虫半分くらいの割合でござる！」"

[[dialogue]]
speaker = "蘭美"
# 「ゴーレム化の原因、それじゃないの！？」
line = "「ゴーレム化の原因、それじゃないの！？」"

[[dialogue]]
speaker = "せつな"
# 「いやいや！　これは、前にも料理に使ったことがあるでござるよ！」
line = "「いやいや！　これは、前にも料理に使ったことがあるでござるよ！」"

[[dialogue]]
speaker = "せつな"
# 「その時はせつなの腕の未熟さゆえ、完食して下さった主様は、御前試合で戦い抜いた時のような険しい表情になっていたでござるが……」
line = "「その時はせつなの腕の未熟さゆえ、完食して下さった主様は、御前試合で戦い抜いた時のような険しい表情になっていたでござるが……」"

[[dialogue]]
speaker = "蘭美"
# 「会長、男気あるわね！　素直に尊敬したわ、今！」
line = "「会長、男気あるわね！　素直に尊敬したわ、今！」"

[[dialogue]]
speaker = "蘭美"
# 「ともかく、それを使うのは、メイド長権限で禁止よ！　チョコが美味しくなるビジョンが見えないし！」
line = "「ともかく、それを使うのは、メイド長権限で禁止よ！　チョコが美味しくなるビジョンが見えないし！」"

[[dialogue]]
speaker = "せつな"
# 「そんな～。バレンタインチョコに、せつなのオリジナリティをと思ったのでござるが……」
line = "「そんな～。バレンタインチョコに、せつなのオリジナリティをと思ったのでござるが……」"

[[dialogue]]
speaker = "蘭美"
# 「そういうのは、まともに食べれるチョコを作れるようになってから言いなさい！」
line = "「そういうのは、まともに食べれるチョコを作れるようになってから言いなさい！」"

[[dialogue]]
speaker = "unk"
# そんなこんなで、蘭美によるチョコ作り指導がスタートするのだった――
line = "そんなこんなで、蘭美によるチョコ作り指導がスタートするのだった――"
