[[dialogue]]
speaker = "unk"
# 第２話,聖女の正体,P
line = "第２話,聖女の正体,P"

[[dialogue]]
speaker = "イレーナ"
# 「こんにちは、会長さん。ちょうどお会いしたいと思っていました。お昼ご一緒しても？」
line = "「こんにちは、会長さん。ちょうどお会いしたいと思っていました。お昼ご一緒しても？」"

[[dialogue]]
speaker = "イレーナ"
# 「よろしいですか。ありがとうございます♪」
line = "「よろしいですか。ありがとうございます♪」"

[[dialogue]]
speaker = "unk"
# 昨日の夜──
line = "昨日の夜──"

[[dialogue]]
speaker = "イレーナ"
# 「今の聞いてた！？　いつから──いえ、言わなくていいわ。どうせ最初から聞いてたんでしょ」
line = "「今の聞いてた！？　いつから──いえ、言わなくていいわ。どうせ最初から聞いてたんでしょ」"

[[dialogue]]
speaker = "イレーナ"
# 「はぁ～、しくじった。慣れない環境で気を抜くもんじゃないわね……」
line = "「はぁ～、しくじった。慣れない環境で気を抜くもんじゃないわね……」"

[[dialogue]]
speaker = "unk"
# 昼間と全然違うような……
line = "昼間と全然違うような……"

[[dialogue]]
speaker = "イレーナ"
# 「そりゃそうでしょ。外面を取り繕うなんてみんな大なり小なりやっていることよ」
line = "「そりゃそうでしょ。外面を取り繕うなんてみんな大なり小なりやっていることよ」"

[[dialogue]]
speaker = "イレーナ"
# 「ご覧の通り、あたしはエセ聖女。どう？　がっかりした？　詐欺で訴えたければ女神様に言いなさい」
line = "「ご覧の通り、あたしはエセ聖女。どう？　がっかりした？　詐欺で訴えたければ女神様に言いなさい」"

[[dialogue]]
speaker = "イレーナ"
# 「ていうかあんた何しに──忘れ物？　ああ、このＤＩＳＣ、あんたのだったの。はい、もう忘れないでよね」
line = "「ていうかあんた何しに──忘れ物？　ああ、このＤＩＳＣ、あんたのだったの。はい、もう忘れないでよね」"

[[dialogue]]
speaker = "unk"
# ありがとう
line = "ありがとう"

[[dialogue]]
speaker = "イレーナ"
# 「……あんたはお昼の時と全然変わんないのね」
line = "「……あんたはお昼の時と全然変わんないのね」"

[[dialogue]]
speaker = "イレーナ"
# 「独り言よ、何でもないわ。いいからさっさと帰りなさい。大聖堂の戸締りができないでしょうが」
line = "「独り言よ、何でもないわ。いいからさっさと帰りなさい。大聖堂の戸締りができないでしょうが」"

[[dialogue]]
speaker = "イレーナ"
# 「今見たこと聞いたこと、誰かに言わないでよね。もし言ったら──」
line = "「今見たこと聞いたこと、誰かに言わないでよね。もし言ったら──」"

[[dialogue]]
speaker = "イレーナ"
# 「あんたを潰す！　主に社会的に」
line = "「あんたを潰す！　主に社会的に」"

[[dialogue]]
speaker = "イレーナ"
# 「素敵なカフェテリアですね。メニューも豊富で何を食べるかついつい迷ってしまいそうです。神官は清貧を尊ぶべきなのに、いけませんね私は」
line = "「素敵なカフェテリアですね。メニューも豊富で何を食べるかついつい迷ってしまいそうです。神官は清貧を尊ぶべきなのに、いけませんね私は」"

[[dialogue]]
speaker = "イレーナ"
# 「で──」
line = "「で──」"

[[dialogue]]
speaker = "イレーナ"
# （あたしのこと、誰にも言ってないでしょうね？）
line = "（あたしのこと、誰にも言ってないでしょうね？）"

[[dialogue]]
speaker = "unk"
# 大丈夫、信じてくれ
line = "大丈夫、信じてくれ"

[[dialogue]]
speaker = "イレーナ"
# （ほんとに～？　上っ面だけなら何とでも言えるでしょうに）
line = "（ほんとに～？　上っ面だけなら何とでも言えるでしょうに）"

[[dialogue]]
speaker = "イレーナ"
# （これでも聖女ヅラするのって大変なの。邪魔だけはしないでよね）
line = "（これでも聖女ヅラするのって大変なの。邪魔だけはしないでよね）"

[[dialogue]]
speaker = "unk"
# 星徒会の仕事を終えて帰路に就くと──
line = "星徒会の仕事を終えて帰路に就くと──"

[[dialogue]]
speaker = "イレーナ"
# 「あ」
line = "「あ」"

[[dialogue]]
speaker = "イレーナ"
# 「はぁ……また会ったわね。あんたの顔なんて何度も見たくないっていうのに」
line = "「はぁ……また会ったわね。あんたの顔なんて何度も見たくないっていうのに」"

[[dialogue]]
speaker = "イレーナ"
# 「まぁいいわ。あたし寮じゃなくて教皇庁の宿舎に住んでるから、帰りはこっちなの。じゃあね」
line = "「まぁいいわ。あたし寮じゃなくて教皇庁の宿舎に住んでるから、帰りはこっちなの。じゃあね」"

[[dialogue]]
speaker = "イレーナ"
# 「いつまでついてくんのよ。誰かに見られてあんたと噂されたくないの。神官は貞淑でないといけないんだから」
line = "「いつまでついてくんのよ。誰かに見られてあんたと噂されたくないの。神官は貞淑でないといけないんだから」"

[[dialogue]]
speaker = "イレーナ"
# 「あんたも帰りこっち？　ぬぬぬ……じゃあ気を遣って遠回りするとかしなさいよ～」
line = "「あんたも帰りこっち？　ぬぬぬ……じゃあ気を遣って遠回りするとかしなさいよ～」"

[[dialogue]]
speaker = "unk"
# 転入生同士仲良くしようって言ってたのに
line = "転入生同士仲良くしようって言ってたのに"

[[dialogue]]
speaker = "イレーナ"
# 「あんなの社交辞令に決まってるでしょ！　バッカじゃないの！」
line = "「あんなの社交辞令に決まってるでしょ！　バッカじゃないの！」"

[[dialogue]]
speaker = "イレーナ"
# 「あっ」
line = "「あっ」"

[[dialogue]]
speaker = "イレーナ"
# 「誰も見てないわね……よかった～。はぁ～、あんたといると調子狂うわ……」
line = "「誰も見てないわね……よかった～。はぁ～、あんたといると調子狂うわ……」"

[[dialogue]]
speaker = "unk"
# イレーナはどうして聖女になったんた？
line = "イレーナはどうして聖女になったんた？"

[[dialogue]]
speaker = "イレーナ"
# 「どうしてって……成り行きというかなんというか……」
line = "「どうしてって……成り行きというかなんというか……」"

[[dialogue]]
speaker = "イレーナ"
# 「けっこう珍しいことらしいんだけど、あたしは小さい頃から星力を使えた」
line = "「けっこう珍しいことらしいんだけど、あたしは小さい頃から星力を使えた」"

[[dialogue]]
speaker = "イレーナ"
# 「最初は道端で倒れてた人をちょっと助けただけだった」
line = "「最初は道端で倒れてた人をちょっと助けただけだった」"

[[dialogue]]
speaker = "イレーナ"
# 「それが奇跡なんて噂になって、病気や怪我を治してほしい人が集まってきた」
line = "「それが奇跡なんて噂になって、病気や怪我を治してほしい人が集まってきた」"

[[dialogue]]
speaker = "イレーナ"
# 「調子に乗ったあたしはみんな助けてあげて、そしたら教皇庁に声をかけられて、教会に入って」
line = "「調子に乗ったあたしはみんな助けてあげて、そしたら教皇庁に声をかけられて、教会に入って」"

[[dialogue]]
speaker = "イレーナ"
# 「気づけば誰もがあたしを聖女と呼ぶようになっていた。聖女になろうと思ってなったわけじゃないわ」
line = "「気づけば誰もがあたしを聖女と呼ぶようになっていた。聖女になろうと思ってなったわけじゃないわ」"

[[dialogue]]
speaker = "イレーナ"
# 「……でも結果的にはこれでよかったの。聖女らしく、お行儀良くして微笑んでればみんなちやほやしてくれる」
line = "「……でも結果的にはこれでよかったの。聖女らしく、お行儀良くして微笑んでればみんなちやほやしてくれる」"

[[dialogue]]
speaker = "イレーナ"
# 「聖女じゃないあたしなんて需要がないの。誰も望んでないのよ」
line = "「聖女じゃないあたしなんて需要がないの。誰も望んでないのよ」"

[[dialogue]]
speaker = "イレーナ"
# 「あ──」
line = "「あ──」"

[[dialogue]]
speaker = "イレーナ"
# 「おばあさん、どうされましたか？」
line = "「おばあさん、どうされましたか？」"

[[dialogue]]
speaker = "老婦人"
# 「あ、あの、杖を落としてしまって……。わたし、目がほとんど見えないので杖がないと……」
line = "「あ、あの、杖を落としてしまって……。わたし、目がほとんど見えないので杖がないと……」"

[[dialogue]]
speaker = "イレーナ"
# 「こちらですね。どうぞ」
line = "「こちらですね。どうぞ」"

[[dialogue]]
speaker = "老婦人"
# 「ありがとうございます。この声……もしかして教会の聖女様？」
line = "「ありがとうございます。この声……もしかして教会の聖女様？」"

[[dialogue]]
speaker = "イレーナ"
# 「ええ、先日流星市国に参りました、イレーナ・ロレンツェッティです。あなたも礼拝に来てくださったのですね」
line = "「ええ、先日流星市国に参りました、イレーナ・ロレンツェッティです。あなたも礼拝に来てくださったのですね」"

[[dialogue]]
speaker = "老婦人"
# 「ああ、聖女様が自ら……ありがとうございます、ありがとうございます……」
line = "「ああ、聖女様が自ら……ありがとうございます、ありがとうございます……」"

[[dialogue]]
speaker = "イレーナ"
# 「誰かを手助けしたいと思う気持ちに聖女も神官も関係ありませんよ」
line = "「誰かを手助けしたいと思う気持ちに聖女も神官も関係ありませんよ」"

[[dialogue]]
speaker = "イレーナ"
# 「すみません。少しじっとしていていただけますか？」
line = "「すみません。少しじっとしていていただけますか？」"

[[dialogue]]
speaker = "老婦人"
# 「え？　もちろんかまいませんが──」
line = "「え？　もちろんかまいませんが──」"

[[dialogue]]
speaker = "老婦人"
# 「え……？　目が……！？　目が見える……！？」
line = "「え……？　目が……！？　目が見える……！？」"

[[dialogue]]
speaker = "老婦人"
# 「あ、ありがとうございます！　聖女様の奇跡です！」
line = "「あ、ありがとうございます！　聖女様の奇跡です！」"

[[dialogue]]
speaker = "イレーナ"
# 「女神様の御心ですよ。あなたに女神様の加護がありますように」
line = "「女神様の御心ですよ。あなたに女神様の加護がありますように」"

[[dialogue]]
speaker = "unk"
# 本人はエセ聖女だと言っていたけど、優しく微笑むイレーナの姿は本物の聖女に見えた──
line = "本人はエセ聖女だと言っていたけど、優しく微笑むイレーナの姿は本物の聖女に見えた──"
