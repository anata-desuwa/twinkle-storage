[[dialogue]]
speaker = "unk"
# １００年前。ソフレがフェリーチェに敗北し、封印の説明を聞いた後のこと――
line = "１００年前。ソフレがフェリーチェに敗北し、封印の説明を聞いた後のこと――"

[[dialogue]]
speaker = "ソフレ"
# 「くっ……！」
line = "「くっ……！」"

[[dialogue]]
speaker = "ソフレ"
# 「どうして、ソフレが人間風情なんかに……！」
line = "「どうして、ソフレが人間風情なんかに……！」"

[[dialogue]]
speaker = "フェリーチェ"
# 「――本気でアンタにムカついたからな。アタシはただ、それを星術に込めてぶつけただけだ」
line = "「――本気でアンタにムカついたからな。アタシはただ、それを星術に込めてぶつけただけだ」"

[[dialogue]]
speaker = "フェリーチェ"
# 「アタシはそういう強い気持ちを、力に変えられる『<ruby=エクソシスト>祓魔師</ruby>』なんでね」
line = "「アタシはそういう強い気持ちを、力に変えられる『<ruby>祓魔師<rt>エクソシスト</rt></ruby>』なんでね」"

[[dialogue]]
speaker = "ソフレ"
# 「そんな……馬鹿なことが……！」
line = "「そんな……馬鹿なことが……！」"

[[dialogue]]
speaker = "フェリーチェ"
# 「こうして、実際に起こっただろ？　逆転の奇跡ってやつが」
line = "「こうして、実際に起こっただろ？　逆転の奇跡ってやつが」"

[[dialogue]]
speaker = "フェリーチェ"
# 「でもまぁ、ムカつきはしたが、アンタのプライドの高さは嫌いじゃなかったぜ」
line = "「でもまぁ、ムカつきはしたが、アンタのプライドの高さは嫌いじゃなかったぜ」"

[[dialogue]]
speaker = "フェリーチェ"
# 「だから、封印するだけで勘弁してやるよ」
line = "「だから、封印するだけで勘弁してやるよ」"

[[dialogue]]
speaker = "ソフレ"
# 「３０００年も惨めに、生き恥を晒せだなんて……！」
line = "「３０００年も惨めに、生き恥を晒せだなんて……！」"

[[dialogue]]
speaker = "フェリーチェ"
# 「お前のプライド高さは、死んでも直らんだろ。アタシにも直せる気がしねぇ」
line = "「お前のプライド高さは、死んでも直らんだろ。アタシにも直せる気がしねぇ」"

[[dialogue]]
speaker = "フェリーチェ"
# 「アタシはアンタと同じ、プライド高いタチなんでね。相性最悪ってやつだ。だから――」
line = "「アタシはアンタと同じ、プライド高いタチなんでね。相性最悪ってやつだ。だから――」"

[[dialogue]]
speaker = "フェリーチェ"
# 「せいぜい、死なずに待ってみろよ」
line = "「せいぜい、死なずに待ってみろよ」"

[[dialogue]]
speaker = "フェリーチェ"
# 「そうすりゃ案外、面白いことが起こるかもしれないぜ？」
line = "「そうすりゃ案外、面白いことが起こるかもしれないぜ？」"

[[dialogue]]
speaker = "フェリーチェ"
# 「じゃあな。あばよ、吸血鬼――」
line = "「じゃあな。あばよ、吸血鬼――」"

[[dialogue]]
speaker = "フェリーチェ"
# 「いつかアンタにも、よき祝福のあらんことを」
line = "「いつかアンタにも、よき祝福のあらんことを」"

[[dialogue]]
speaker = "unk"
# 地下図書館でソフレの偽物達を全て倒し切り、防衛システムの一時的な停止まで持っていくことができた翌日。
line = "地下図書館でソフレの偽物達を全て倒し切り、防衛システムの一時的な停止まで持っていくことができた翌日。"

[[dialogue]]
speaker = "ウィステリア"
# 「――改めて、保健室を調べてみた結果、地下図書館から空間を繋げた痕跡が見つかったわ」
line = "「――改めて、保健室を調べてみた結果、地下図書館から空間を繋げた痕跡が見つかったわ」"

[[dialogue]]
speaker = "ウィステリア"
# 「つまり、目撃されていた不審者の正体は、地下図書館の防衛システムによって生み出された、ソフレの偽物だったってことで間違いないわ」
line = "「つまり、目撃されていた不審者の正体は、地下図書館の防衛システムによって生み出された、ソフレの偽物だったってことで間違いないわ」"

[[dialogue]]
speaker = "ソフレ"
# 「連中は、ソフレのコピーのことを実験体だって言っていたのだわ」
line = "「連中は、ソフレのコピーのことを実験体だって言っていたのだわ」"

[[dialogue]]
speaker = "フェリシー"
# 「実験って、一体何の目的で……？」
line = "「実験って、一体何の目的で……？」"

[[dialogue]]
speaker = "ウィステリア"
# 「もしその実験が、保健室に空間を繋げて出入りすることだったとすれば――」
line = "「もしその実験が、保健室に空間を繋げて出入りすることだったとすれば――」"

[[dialogue]]
speaker = "unk"
# 防衛システムの行動範囲を広げる為？
line = "防衛システムの行動範囲を広げる為？"

[[dialogue]]
speaker = "ウィステリア"
# 「……想像したくないけど、その可能性はあるわね」
line = "「……想像したくないけど、その可能性はあるわね」"

[[dialogue]]
speaker = "ウィステリア"
# 「ソフレをコピー対象に選んだのは、１００年前の封印術式で行動範囲の制限を受けているから」
line = "「ソフレをコピー対象に選んだのは、１００年前の封印術式で行動範囲の制限を受けているから」"

[[dialogue]]
speaker = "フェリシー"
# 「その封印術式を解析したことで、今回実際に防衛システムが地上まで進出してきた……ってことですか？」
line = "「その封印術式を解析したことで、今回実際に防衛システムが地上まで進出してきた……ってことですか？」"

[[dialogue]]
speaker = "ウィステリア"
# 「恐ろしいことにね。まさか、防衛システムがこんな暴走を引き起こすだなんて……」
line = "「恐ろしいことにね。まさか、防衛システムがこんな暴走を引き起こすだなんて……」"

[[dialogue]]
speaker = "ウィステリア"
# 「前にも、地下図書館の入り口のロックが勝手に外れてしまったことがあった。その時は原因が分からなかったけど――」
line = "「前にも、地下図書館の入り口のロックが勝手に外れてしまったことがあった。その時は原因が分からなかったけど――」"

[[dialogue]]
speaker = "ウィステリア"
# 「それも今思えば、防衛システムの暴走だったのかもしれない。いずれにせよ、今後はもっとしっかり警戒していく必要があるわ」
line = "「それも今思えば、防衛システムの暴走だったのかもしれない。いずれにせよ、今後はもっとしっかり警戒していく必要があるわ」"

[[dialogue]]
speaker = "unk"
# でも、とりあえず今回は一件落着かな
line = "でも、とりあえず今回は一件落着かな"

[[dialogue]]
speaker = "フェリシー"
# 「うん！　今回の件がちゃんと活躍として認められて、ソフレの封印も刑期が短くなったしね！」
line = "「うん！　今回の件がちゃんと活躍として認められて、ソフレの封印も刑期が短くなったしね！」"

[[dialogue]]
speaker = "ウィステリア"
# 「あら、そうなの？　ソフレ、よかったじゃない」
line = "「あら、そうなの？　ソフレ、よかったじゃない」"

[[dialogue]]
speaker = "ソフレ"
# 「短くなったと言っても、たった１００年ぽっちなのよ。これまで過ごした分を引いても、まだ２８００年分も残っているのだわ」
line = "「短くなったと言っても、たった１００年ぽっちなのよ。これまで過ごした分を引いても、まだ２８００年分も残っているのだわ」"

[[dialogue]]
speaker = "フェリシー"
# 「え～？　大進歩だよ！」
line = "「え～？　大進歩だよ！」"

[[dialogue]]
speaker = "フェリシー"
# 「これから私たちはリクリエを阻止する為に戦うわけだし、この調子で星騎士として活躍すれば、きっと学園を卒業するまでに間に合うって！」
line = "「これから私たちはリクリエを阻止する為に戦うわけだし、この調子で星騎士として活躍すれば、きっと学園を卒業するまでに間に合うって！」"

[[dialogue]]
speaker = "ソフレ"
# 「別に、次の卒業に間に合わせる必要もないのだわ」
line = "「別に、次の卒業に間に合わせる必要もないのだわ」"

[[dialogue]]
speaker = "フェリシー"
# 「いや、頑張ろうよ！　だって――」
line = "「いや、頑張ろうよ！　だって――」"

[[dialogue]]
speaker = "フェリシー"
# 「私、ソフレと一緒に学園を卒業したいし！」
line = "「私、ソフレと一緒に学園を卒業したいし！」"

[[dialogue]]
speaker = "ソフレ"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "フェリシー"
# 「で、卒業したら、一緒にイタリアへ旅行に行こう！　お母さんやお祖母ちゃんに、伝説の吸血鬼と友達になったんだよって、紹介したいんだ！」
line = "「で、卒業したら、一緒にイタリアへ旅行に行こう！　お母さんやお祖母ちゃんに、伝説の吸血鬼と友達になったんだよって、紹介したいんだ！」"

[[dialogue]]
speaker = "ソフレ"
# 「り、旅行って……いきなり何を言い出すのよ、お前は……」
line = "「り、旅行って……いきなり何を言い出すのよ、お前は……」"

[[dialogue]]
speaker = "フェリシー"
# 「今回で頑張ればソフレの封印は解けるって実感したから、目標ができたっていうか……ソフレと卒業旅行に行きたいなって思ったんだ！」
line = "「今回で頑張ればソフレの封印は解けるって実感したから、目標ができたっていうか……ソフレと卒業旅行に行きたいなって思ったんだ！」"

[[dialogue]]
speaker = "ソフレ"
# 「ソフレがなんでそんなこと……というか、そもそもお前と友達になった覚えはないのだわ！」
line = "「ソフレがなんでそんなこと……というか、そもそもお前と友達になった覚えはないのだわ！」"

[[dialogue]]
speaker = "フェリシー"
# 「これからなる予定だし！　とにかく、一緒に学園を卒業できるように頑張ろうよ！」
line = "「これからなる予定だし！　とにかく、一緒に学園を卒業できるように頑張ろうよ！」"

[[dialogue]]
speaker = "ソフレ"
# 「ああもう、お前はいつもそうやって強引に……勝手に決めるんじゃないのだわ！　大体――」
line = "「ああもう、お前はいつもそうやって強引に……勝手に決めるんじゃないのだわ！　大体――」"

[[dialogue]]
speaker = "ソフレ"
# 「ソフレは１００年も遠出してなかったのだから、旅行バッグなんて持ってないのだわ！」
line = "「ソフレは１００年も遠出してなかったのだから、旅行バッグなんて持ってないのだわ！」"

[[dialogue]]
speaker = "フェリシー"
# 「……それって」
line = "「……それって」"

[[dialogue]]
speaker = "フェリシー"
# 「旅行バッグがあれば、一緒に行くのはＯＫってこと！？」
line = "「旅行バッグがあれば、一緒に行くのはＯＫってこと！？」"

[[dialogue]]
speaker = "ソフレ"
# 「は！？　い、いやいや、今のは違うのだわ！　まだ了承したわけじゃ……！」
line = "「は！？　い、いやいや、今のは違うのだわ！　まだ了承したわけじゃ……！」"

[[dialogue]]
speaker = "unk"
# 前向きには考えてるってことだよね？
line = "前向きには考えてるってことだよね？"

[[dialogue]]
speaker = "ソフレ"
# 「ちょっ、会長！？　何を言っているのだわ！？」
line = "「ちょっ、会長！？　何を言っているのだわ！？」"

[[dialogue]]
speaker = "ウィステリア"
# 「ふふっ、卒業旅行、いいじゃない」
line = "「ふふっ、卒業旅行、いいじゃない」"

[[dialogue]]
speaker = "ソフレ"
# 「ウィステリアまで！　ち、違うから！」
line = "「ウィステリアまで！　ち、違うから！」"

[[dialogue]]
speaker = "ソフレ"
# 「ソフレはまだ何も認めてないのだわ～～～っ！」
line = "「ソフレはまだ何も認めてないのだわ～～～っ！」"

[[dialogue]]
speaker = "フェリシー"
# 「あっ……ふふっ！　あははっ♪」
line = "「あっ……ふふっ！　あははっ♪」"

[[dialogue]]
speaker = "フェリシー"
# 「ソフレ、顔が赤くなってる～！」
line = "「ソフレ、顔が赤くなってる～！」"

[[dialogue]]
speaker = "unk"
# ソフレの反応を見て、フェリシーは嬉しそうに笑うのだった。
line = "ソフレの反応を見て、フェリシーは嬉しそうに笑うのだった。"
