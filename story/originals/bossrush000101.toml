[[dialogue]]
speaker = "unk"
# 俺は星徒会長としてコラプサーについて記録に残すべく、コハルコさんと一緒に事件を振り返っていた。
line = "俺は星徒会長としてコラプサーについて記録に残すべく、コハルコさんと一緒に事件を振り返っていた。"

[[dialogue]]
speaker = "コハルコ"
# 「コラプサーとは何度も戦ってきたけど、事件が起きるのはいつも突然だったね」
line = "「コラプサーとは何度も戦ってきたけど、事件が起きるのはいつも突然だったね」"

[[dialogue]]
speaker = "キサナ"
# 『星騎士は正義の味方なんじゃなかったのか？　そのザマで何が守れるっつうんだよ』
line = "『星騎士は正義の味方なんじゃなかったのか？　そのザマで何が守れるっつうんだよ』"

[[dialogue]]
speaker = "コハルコ"
# 「全ての始まりは、キサナによる星騎士襲撃だった」
line = "「全ての始まりは、キサナによる星騎士襲撃だった」"

[[dialogue]]
speaker = "コハルコ"
# 「新星・流星両校の風紀委員であるミアさんとエリスさん、そして会長さんのおかげで、何とかキサナを撃退できた」
line = "「新星・流星両校の風紀委員であるミアさんとエリスさん、そして会長さんのおかげで、何とかキサナを撃退できた」"

[[dialogue]]
speaker = "コハルコ"
# 「だけどキサナは私たちに宣戦布告するとともに、こう言い残した」
line = "「だけどキサナは私たちに宣戦布告するとともに、こう言い残した」"

[[dialogue]]
speaker = "キサナ"
# 『アタシらはコラプサー──星の光を喰らう者だ』
line = "『アタシらはコラプサー──星の光を喰らう者だ』"

[[dialogue]]
speaker = "コハルコ"
# 「キサナはとても高い戦闘力を持っているだけじゃなくて、星力を吸収する能力もあった。今までにない強敵だったね」
line = "「キサナはとても高い戦闘力を持っているだけじゃなくて、星力を吸収する能力もあった。今までにない強敵だったね」"

[[dialogue]]
speaker = "コハルコ"
# 「その後に現れたのは、リーナとヴァレリーの２人」
line = "「その後に現れたのは、リーナとヴァレリーの２人」"

[[dialogue]]
speaker = "リーナ"
# 『リーナのお兄ちゃん、やっと会えた！』
line = "『リーナのお兄ちゃん、やっと会えた！』"

[[dialogue]]
speaker = "コハルコ"
# 「リーナはなぜか会長さんの妹を名乗っていたけど……あれは何だったんだろう？」
line = "「リーナはなぜか会長さんの妹を名乗っていたけど……あれは何だったんだろう？」"

[[dialogue]]
speaker = "コハルコ"
# 「ヴァレリーは蛍火さんと浅草で遭遇し、戦闘に突入。一度撤退した後、流星学園に再び姿を表した」
line = "「ヴァレリーは蛍火さんと浅草で遭遇し、戦闘に突入。一度撤退した後、流星学園に再び姿を表した」"

[[dialogue]]
speaker = "コハルコ"
# 「その時は会長さんと公安委員会が連携して戦ったけど──」
line = "「その時は会長さんと公安委員会が連携して戦ったけど──」"

[[dialogue]]
speaker = "ヴァレリー"
# 『何を隠そう、私は合流途中でいなくなったリーナを探していただけでして』
line = "『何を隠そう、私は合流途中でいなくなったリーナを探していただけでして』"

[[dialogue]]
speaker = "ヴァレリー"
# 『星騎士との戦闘は命令されていなかったのですが……これでは勝手なことをしていると彼女を責められませんね。ハハハ』
line = "『星騎士との戦闘は命令されていなかったのですが……これでは勝手なことをしていると彼女を責められませんね。ハハハ』"

[[dialogue]]
speaker = "コハルコ"
# 「ヴァレリーは迷子になったリーナを探していて、私たちは巻き込まれただけっていう、傍迷惑な事件だったね……」
line = "「ヴァレリーは迷子になったリーナを探していて、私たちは巻き込まれただけっていう、傍迷惑な事件だったね……」"

[[dialogue]]
speaker = "コハルコ"
# 「だけどセナリィさんの《強奪》の星眼がヴァレリーに効いたことで、コラプサーは星術を使っているってことがわかった。一応収穫ではあったかな」
line = "「だけどセナリィさんの《強奪》の星眼がヴァレリーに効いたことで、コラプサーは星術を使っているってことがわかった。一応収穫ではあったかな」"

[[dialogue]]
speaker = "コハルコ"
# 「そうそう。記録から得たコラプサーのデータを、シミュレーターで再現してみたんだ」
line = "「そうそう。記録から得たコラプサーのデータを、シミュレーターで再現してみたんだ」"

[[dialogue]]
speaker = "コハルコ"
# 「コラプサー事件の記録のために、会長さんも見てみてくれないかな？」
line = "「コラプサー事件の記録のために、会長さんも見てみてくれないかな？」"
