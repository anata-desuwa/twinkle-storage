[[dialogue]]
speaker = "unk"
# 第３話,アルモたんの幸せ計画,P
line = "第３話,アルモたんの幸せ計画,P"

[[dialogue]]
speaker = "unk"
# その日、俺はアルモと一緒に、リゾート結界の海の家でバイトをしていた。
line = "その日、俺はアルモと一緒に、リゾート結界の海の家でバイトをしていた。"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「焼肉定食、お待たせしましたなのだ～♪」
line = "「焼肉定食、お待たせしましたなのだ～♪」"

[[dialogue]]
speaker = "サラン"
# 「わぁ～♪　アルモたん、ありがと～♪　いただきま～す♪」
line = "「わぁ～♪　アルモたん、ありがと～♪　いただきま～す♪」"

[[dialogue]]
speaker = "サラン"
# 「あむっ……もぐもぐ♪　ん～、美味しくてふわふわ～♪」
line = "「あむっ……もぐもぐ♪　ん～、美味しくてふわふわ～♪」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「サランはいつも美味しそうに食べてくれるから、嬉しいのだ♪」
line = "「サランはいつも美味しそうに食べてくれるから、嬉しいのだ♪」"

[[dialogue]]
speaker = "サラン"
# 「だって、アルモたんの作ってくれるお肉料理、ほんとに美味しいんだもん♪　サラン、ふわふわの笑顔になっちゃう～♪」
line = "「だって、アルモたんの作ってくれるお肉料理、ほんとに美味しいんだもん♪　サラン、ふわふわの笑顔になっちゃう～♪」"

[[dialogue]]
speaker = "リップル"
# 「アルモたんが焼くお肉は、お客さんにも評判デスので、ワタシもとてもタスカッテま～す♪」
line = "「アルモたんが焼くお肉は、お客さんにも評判デスので、ワタシもとてもタスカッテま～す♪」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「えへへ♪　みんなが喜んでくれて、アルモたん嬉しいのだ～♪」
line = "「えへへ♪　みんなが喜んでくれて、アルモたん嬉しいのだ～♪」"

[[dialogue]]
speaker = "リップル"
# 「このままずっと、一緒に海の家で働いてホシイくらいですよ～♪」
line = "「このままずっと、一緒に海の家で働いてホシイくらいですよ～♪」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「アルモたんも、これからも時々バイトさせてもらえるとありがたいのだ♪」
line = "「アルモたんも、これからも時々バイトさせてもらえるとありがたいのだ♪」"

[[dialogue]]
speaker = "リップル"
# 「もちろんダイカンゲイで～す♪」
line = "「もちろんダイカンゲイで～す♪」"

[[dialogue]]
speaker = "unk"
# バイトが終わったあと、アルモは焼肉定食を作り、俺にもご馳走してくれた。
line = "バイトが終わったあと、アルモは焼肉定食を作り、俺にもご馳走してくれた。"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「会長、アルモたんの作った定食は、どうなのだ？」
line = "「会長、アルモたんの作った定食は、どうなのだ？」"

[[dialogue]]
speaker = "unk"
# うん、うまいっ！　すごく美味だ！
line = "うん、うまいっ！　すごく美味だ！"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「えへへ～♪　蛍火に作り方を教わって、練習してよかったのだ～♪」
line = "「えへへ～♪　蛍火に作り方を教わって、練習してよかったのだ～♪」"

[[dialogue]]
speaker = "unk"
# アルモの嬉しそうな笑顔を見て、俺は最近気になっていたことを尋ねてみた。
line = "アルモの嬉しそうな笑顔を見て、俺は最近気になっていたことを尋ねてみた。"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「――ん？　アルモたんが最近よくバイトしてる理由か？」
line = "「――ん？　アルモたんが最近よくバイトしてる理由か？」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「それはな、アルモたん、人間界で『やりたいこと』を考えてみることにしたのだ♪」
line = "「それはな、アルモたん、人間界で『やりたいこと』を考えてみることにしたのだ♪」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「この前、アニマと会った時に言われたのだ。リクリエとの戦いが終わった後なら、本体に急いで戻る必要はないんじゃないかって」
line = "「この前、アニマと会った時に言われたのだ。リクリエとの戦いが終わった後なら、本体に急いで戻る必要はないんじゃないかって」"

[[dialogue]]
speaker = "unk"
# 聞けば、オペレーション・ペンタグラムで守護天使本体の封印が解かれた為、世界の摂理を守護する柱としての役割は、本体が問題なく果たしているから、ということらしい。
line = "聞けば、オペレーション・ペンタグラムで守護天使本体の封印が解かれた為、世界の摂理を守護する柱としての役割は、本体が問題なく果たしているから、ということらしい。"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「――なら、せっかくの機会だし、命脈の守護天使として、ヒトの『人生』というものを１度体験してから帰りたいと思ったのだ」
line = "「――なら、せっかくの機会だし、命脈の守護天使として、ヒトの『人生』というものを１度体験してから帰りたいと思ったのだ」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「何より……アルモたんは会長のことが大好きだからな♪　すぐに戻らなくていいのなら、会長と一緒に人生を過ごしてみたいのだ♪」
line = "「何より……アルモたんは会長のことが大好きだからな♪　すぐに戻らなくていいのなら、会長と一緒に人生を過ごしてみたいのだ♪」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「それで、生きて何をしたいかと考えたら……アルモたんは人間界でお肉を食べて感動したから、食に関する仕事がしてみたいって思ったのだ！」
line = "「それで、生きて何をしたいかと考えたら……アルモたんは人間界でお肉を食べて感動したから、食に関する仕事がしてみたいって思ったのだ！」"

[[dialogue]]
speaker = "unk"
# だから料理を？
line = "だから料理を？"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「うんっ♪　アルモたんが焼いたお肉を『美味しい』って言ってもらえると、すごく嬉しいって感じることに気づいたのだ！」
line = "「うんっ♪　アルモたんが焼いたお肉を『美味しい』って言ってもらえると、すごく嬉しいって感じることに気づいたのだ！」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「だから、お肉だけじゃなくて、合わせて出す料理ももっと上手くなりたいと思っているのだ！」
line = "「だから、お肉だけじゃなくて、合わせて出す料理ももっと上手くなりたいと思っているのだ！」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「それで、いつかは肉料理のお店を開けたらいいなって♪　食べたみんなが笑顔になれるようなお店を作れたら、すっごく楽しそうだと思ったのだ♪」
line = "「それで、いつかは肉料理のお店を開けたらいいなって♪　食べたみんなが笑顔になれるようなお店を作れたら、すっごく楽しそうだと思ったのだ♪」"

[[dialogue]]
speaker = "unk"
# なら、アルモの夢、俺も手伝うよ
line = "なら、アルモの夢、俺も手伝うよ"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「えっ？　会長も一緒に手伝ってくれるのか！？　わぁっ♪　ありがとうなのだ～♪」
line = "「えっ？　会長も一緒に手伝ってくれるのか！？　わぁっ♪　ありがとうなのだ～♪」"

[[dialogue]]
speaker = "unk"
# アルモたんは勢いよく飛びついてくる。
line = "アルモたんは勢いよく飛びついてくる。"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「会長と一緒なら、絶対に楽しいに決まってるのだ♪」
line = "「会長と一緒なら、絶対に楽しいに決まってるのだ♪」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「あとは将来、会長と結婚して～、<b>子供</b>もできたらもっと楽しくなりそうだな♪」
line = "「あとは将来、会長と結婚して～、<b>子供</b>もできたらもっと楽しくなりそうだな♪」"

[[dialogue]]
speaker = "unk"
# っ！？　ごほっ、ごほっ……！
line = "っ！？　ごほっ、ごほっ……！"

[[dialogue]]
speaker = "unk"
# 定食を食べながら聞いていた俺は、肉を喉に詰まらせかけて思わずむせてしまう。
line = "定食を食べながら聞いていた俺は、肉を喉に詰まらせかけて思わずむせてしまう。"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「会長！？　大丈夫か？」
line = "「会長！？　大丈夫か？」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「――いきなり子供とか言い出すからビックリした？」
line = "「――いきなり子供とか言い出すからビックリした？」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「だけど、アルモたんたちは恋人なんだし、このまま結婚したら、子供を作るのは普通のことじゃないのか？」
line = "「だけど、アルモたんたちは恋人なんだし、このまま結婚したら、子供を作るのは普通のことじゃないのか？」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「アルモたんは、会長との子供ができるの、すっごく楽しみだぞ♪」
line = "「アルモたんは、会長との子供ができるの、すっごく楽しみだぞ♪」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「そうだ！　会長は子供、何人くらい欲しいのだ？」
line = "「そうだ！　会長は子供、何人くらい欲しいのだ？」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「アルモたんは、会長との子供ならいくらでも欲しいぞ♪　たくさんの子供に囲まれた家族は、すっごく幸せそうだなと思うのだ♪」
line = "「アルモたんは、会長との子供ならいくらでも欲しいぞ♪　たくさんの子供に囲まれた家族は、すっごく幸せそうだなと思うのだ♪」"

[[dialogue]]
speaker = "unk"
# が、頑張ります……
line = "が、頑張ります……"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「うんっ♪　アルモたんも一緒に頑張って、元気な子供をいっぱい産んじゃうのだ♪　えへへっ♪」
line = "「うんっ♪　アルモたんも一緒に頑張って、元気な子供をいっぱい産んじゃうのだ♪　えへへっ♪」"

[[dialogue]]
speaker = "unk"
# そう言って無邪気に笑うアルモに、俺は恥ずかしくもこそばゆい気持ちになってしまうのだった。
line = "そう言って無邪気に笑うアルモに、俺は恥ずかしくもこそばゆい気持ちになってしまうのだった。"
