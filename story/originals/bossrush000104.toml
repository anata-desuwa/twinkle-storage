[[dialogue]]
speaker = "コハルコ"
# 「そして最後は……コラプサー首領・百目騎レイラ」
line = "「そして最後は……コラプサー首領・百目騎レイラ」"

[[dialogue]]
speaker = "コハルコ"
# 「今は没落した五名門・百目騎家の長女で、ブラックホールを操る最強のコラプサー」
line = "「今は没落した五名門・百目騎家の長女で、ブラックホールを操る最強のコラプサー」"

[[dialogue]]
speaker = "コハルコ"
# 「レイラは私の家のＰＣショップに現れ、私をコラプサーのアジトに連れ去った」
line = "「レイラは私の家のＰＣショップに現れ、私をコラプサーのアジトに連れ去った」"

[[dialogue]]
speaker = "コハルコ"
# 「その後は会長さんやマリオンさんと対峙し、戦闘に入った」
line = "「その後は会長さんやマリオンさんと対峙し、戦闘に入った」"

[[dialogue]]
speaker = "コハルコ"
# 「パソコン作成やハッキングとか、私と趣味が同じだから、個人的には親近感を感じるけど」
line = "「パソコン作成やハッキングとか、私と趣味が同じだから、個人的には親近感を感じるけど」"

[[dialogue]]
speaker = "コハルコ"
# 「レイラのデータも入れてみたから、シミュレーターを使ってみてね」
line = "「レイラのデータも入れてみたから、シミュレーターを使ってみてね」"
