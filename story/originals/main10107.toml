[[dialogue]]
speaker = "unk"
# 第７話,買収と餌付け,B
line = "第７話,買収と餌付け,B"

[[dialogue]]
speaker = "マトイ"
# 最初はアナちゃんの星徒会入りを不安視する周囲の声もあった。
line = "最初はアナちゃんの星徒会入りを不安視する周囲の声もあった。"

[[dialogue]]
speaker = "マトイ"
# けれど、しばらく経つとすぐにそんな声は聞こえなくなった。
line = "けれど、しばらく経つとすぐにそんな声は聞こえなくなった。"

[[dialogue]]
speaker = "マトイ"
# それほどにアナちゃんは優秀で、いつの間にかヴィーナス会長に変わって書類仕事をこなすまでになっていた。
line = "それほどにアナちゃんは優秀で、いつの間にかヴィーナス会長に変わって書類仕事をこなすまでになっていた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「小さくてー、かわいくてー、仕事もデキるなんて、カンペキのペキじゃなーい！」
line = "「小さくてー、かわいくてー、仕事もデキるなんて、カンペキのペキじゃなーい！」"

[[dialogue]]
speaker = "サーシャ"
# 「アナちゃんみたいな子が来てくれて、嬉しいわ。なでなで、よしよし♪」
line = "「アナちゃんみたいな子が来てくれて、嬉しいわ。なでなで、よしよし♪」"

[[dialogue]]
speaker = "アナ"
# 「うぃうぃ、うぃうぃ」
line = "「うぃうぃ、うぃうぃ」"

[[dialogue]]
speaker = "マトイ"
# 「副会長のお仕事は大変じゃない？　えっと……アナ、ちゃん」
line = "「副会長のお仕事は大変じゃない？　えっと……アナ、ちゃん」"

[[dialogue]]
speaker = "ヴィーナス"
# 「もー、まだまだぎこちないわね。アナさんじゃなくてアナちゃんでしょ？」
line = "「もー、まだまだぎこちないわね。アナさんじゃなくてアナちゃんでしょ？」"

[[dialogue]]
speaker = "アナ"
# 「私の方が後輩なのですからご遠慮なく」
line = "「私の方が後輩なのですからご遠慮なく」"

[[dialogue]]
speaker = "マトイ"
# 「う、うん……アナちゃん。それで会計と副会長のお仕事、やってみてどちらが大変そう？」
line = "「う、うん……アナちゃん。それで会計と副会長のお仕事、やってみてどちらが大変そう？」"

[[dialogue]]
speaker = "アナ"
# 「ノープロブレム。むしろ会計より、こちらのお仕事の方が合っているまであるかもです」
line = "「ノープロブレム。むしろ会計より、こちらのお仕事の方が合っているまであるかもです」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ね？　私が言った通り、アナは副会長が適任だったでしょう？」
line = "「ね？　私が言った通り、アナは副会長が適任だったでしょう？」"

[[dialogue]]
speaker = "サーシャ"
# 「そうね、私と役職を交換して大正解だったかも」
line = "「そうね、私と役職を交換して大正解だったかも」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふふ～ん♪」
line = "「ふふ～ん♪」"

[[dialogue]]
speaker = "マトイ"
# 「結果的にそうだったかもしれないですけど、本音は会長が面倒な書類仕事を押し付けたかっただけじゃありませんか？」
line = "「結果的にそうだったかもしれないですけど、本音は会長が面倒な書類仕事を押し付けたかっただけじゃありませんか？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「適材適所ってだけよ。ぶっちゃけ私、書類仕事は向いてないっ！」
line = "「適材適所ってだけよ。ぶっちゃけ私、書類仕事は向いてないっ！」"

[[dialogue]]
speaker = "マトイ"
# 「堂々と言い切るようなことですか！」
line = "「堂々と言い切るようなことですか！」"

[[dialogue]]
speaker = "マトイ"
# （何も知らないうちは尊敬してたんだけどな。星徒会役員として付き合っていくうちにイメージがガラガラ崩れていく）
line = "（何も知らないうちは尊敬してたんだけどな。星徒会役員として付き合っていくうちにイメージがガラガラ崩れていく）"

[[dialogue]]
speaker = "マトイ"
# （まさか会長がこんなにアレな人だとは思わなかったよ……）
line = "（まさか会長がこんなにアレな人だとは思わなかったよ……）"

[[dialogue]]
speaker = "マトイ"
# 「アナちゃん、あまりに激務だったら断って良いんですよ。会長がやるべき業務は、会長にやらせないと」
line = "「アナちゃん、あまりに激務だったら断って良いんですよ。会長がやるべき業務は、会長にやらせないと」"

[[dialogue]]
speaker = "アナ"
# 「この程度なら激務に入りません。それに会長はお菓子をくれますから」
line = "「この程度なら激務に入りません。それに会長はお菓子をくれますから」"

[[dialogue]]
speaker = "マトイ"
# 「お菓子？」
line = "「お菓子？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ひとつお仕事が片づく度に、アナにはお菓子をあげてるの！　文字通りに飴と鞭よ！」
line = "「ひとつお仕事が片づく度に、アナにはお菓子をあげてるの！　文字通りに飴と鞭よ！」"

[[dialogue]]
speaker = "マトイ"
# 「それは買収っていうんです！」
line = "「それは買収っていうんです！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「人聞き悪ーい！　アナが和菓子を食べたことないっていうから、行きつけのお店で美味しいのを買ってきたのよ！」
line = "「人聞き悪ーい！　アナが和菓子を食べたことないっていうから、行きつけのお店で美味しいのを買ってきたのよ！」"

[[dialogue]]
speaker = "アナ"
# 「おお……なんですか、その桃色と白の物体は」
line = "「おお……なんですか、その桃色と白の物体は」"

[[dialogue]]
speaker = "サーシャ"
# 「あらあら、天界にはないのかしら？　これはね、すあまっていうの」
line = "「あらあら、天界にはないのかしら？　これはね、すあまっていうの」"

[[dialogue]]
speaker = "アナ"
# 「おお……それが、すあま。書物で読んだことがあります」
line = "「おお……それが、すあま。書物で読んだことがあります」"

[[dialogue]]
speaker = "アナ"
# 「生まれたばかりの子供の肌のようにもちもちで、一口含めば、口腔の粘膜に吸いつく官能的食感」
line = "「生まれたばかりの子供の肌のようにもちもちで、一口含めば、口腔の粘膜に吸いつく官能的食感」"

[[dialogue]]
speaker = "アナ"
# 「いと素晴らしき甘味の名は――すあま」
line = "「いと素晴らしき甘味の名は――すあま」"

[[dialogue]]
speaker = "マトイ"
# 「伝説のアイテムみたいな記述だね……すあまなのに」
line = "「伝説のアイテムみたいな記述だね……すあまなのに」"

[[dialogue]]
speaker = "アナ"
# 「食べてもＯＫ？」
line = "「食べてもＯＫ？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「もっちろん。召し上がれー！」
line = "「もっちろん。召し上がれー！」"

[[dialogue]]
speaker = "アナ"
# 「いただきます……あむ、あむ……」
line = "「いただきます……あむ、あむ……」"

[[dialogue]]
speaker = "アナ"
# 「んーーっ<emoji=heart04>」
line = "「んーーっ<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
# 「とってもデリシャスです……もっちもっち、むっちゃむっちゃ」
line = "「とってもデリシャスです……もっちもっち、むっちゃむっちゃ」"

[[dialogue]]
speaker = "サーシャ"
# 「あらあら、いい食べっぷり～」
line = "「あらあら、いい食べっぷり～」"

[[dialogue]]
speaker = "アナ"
# 「この世にこんな美味しい食べ物があったなんて……なくなってしまうのがもったいないです」
line = "「この世にこんな美味しい食べ物があったなんて……なくなってしまうのがもったいないです」"

[[dialogue]]
speaker = "ヴィーナス"
# 「星徒会の業務を頑張ってくれたら、もっともーっと和菓子を買ってあげるわ」
line = "「星徒会の業務を頑張ってくれたら、もっともーっと和菓子を買ってあげるわ」"

[[dialogue]]
speaker = "サーシャ"
# 「私も買ってあげちゃおうかな。おまんじゅうに～、おはぎに～、鯛焼きに～、きんつばに～」
line = "「私も買ってあげちゃおうかな。おまんじゅうに～、おはぎに～、鯛焼きに～、きんつばに～」"

[[dialogue]]
speaker = "マトイ"
# 「見事にあんこばっかりですね……」
line = "「見事にあんこばっかりですね……」"

[[dialogue]]
speaker = "アナ"
# 「なんと。もっと仕事をください。和菓子のためなら、なんでもやります」
line = "「なんと。もっと仕事をください。和菓子のためなら、なんでもやります」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふふふ、今『なんでも』って言ったわね？」
line = "「ふふふ、今『なんでも』って言ったわね？」"

[[dialogue]]
speaker = "マトイ"
# 「会長！　悪い顔しないでください！」
line = "「会長！　悪い顔しないでください！」"

[[dialogue]]
speaker = "マトイ"
# （……あれ、アナちゃん？　キョロキョロと周りを見回してるけど、何か探し物？）
line = "（……あれ、アナちゃん？　キョロキョロと周りを見回してるけど、何か探し物？）"

[[dialogue]]
speaker = "マトイ"
# （ヴィーナス会長に振り回されない、たまのお休み。プライベートを満喫しているなら声をかけるのも迷惑かな）
line = "（ヴィーナス会長に振り回されない、たまのお休み。プライベートを満喫しているなら声をかけるのも迷惑かな）"

[[dialogue]]
speaker = "アナ"
# 「あ、マトイ先輩」
line = "「あ、マトイ先輩」"

[[dialogue]]
speaker = "マトイ"
# 「あ……こんにちは、アナちゃん」
line = "「あ……こんにちは、アナちゃん」"

[[dialogue]]
speaker = "アナ"
# 「ちょうどいいところに。助けてください」
line = "「ちょうどいいところに。助けてください」"

[[dialogue]]
speaker = "マトイ"
# 「何かな。私にできることなら、なんでも言って」
line = "「何かな。私にできることなら、なんでも言って」"

[[dialogue]]
speaker = "アナ"
# 「先ほどから和菓子を売っているお店を探しているのですが、なかなか見つからないのです」
line = "「先ほどから和菓子を売っているお店を探しているのですが、なかなか見つからないのです」"

[[dialogue]]
speaker = "マトイ"
# 「そうかなあ……コンビニやスーパーにも普通に売ってるはずだけど」
line = "「そうかなあ……コンビニやスーパーにも普通に売ってるはずだけど」"

[[dialogue]]
speaker = "マトイ"
# 「あ、でも美味しい大福のお店なら知ってるよ」
line = "「あ、でも美味しい大福のお店なら知ってるよ」"

[[dialogue]]
speaker = "アナ"
# 「大福！　書物で読みました。一口頬張れば、大いなる福を手に入れられるという幸運の和菓子……」
line = "「大福！　書物で読みました。一口頬張れば、大いなる福を手に入れられるという幸運の和菓子……」"

[[dialogue]]
speaker = "マトイ"
# 「大福ってそんなラッキーアイテムだったかなあ……」
line = "「大福ってそんなラッキーアイテムだったかなあ……」"

[[dialogue]]
speaker = "アナ"
# 「生の果物を入れることもあると聞きます」
line = "「生の果物を入れることもあると聞きます」"

[[dialogue]]
speaker = "マトイ"
# 「うんうん、イチゴ大福とかあるね」
line = "「うんうん、イチゴ大福とかあるね」"

[[dialogue]]
speaker = "アナ"
# 「ただでさえ美味しいあんこに、ジューシーなフルーツを合わせてしまうなんて……可能性の塊です。和菓子の世界は奥深いです」
line = "「ただでさえ美味しいあんこに、ジューシーなフルーツを合わせてしまうなんて……可能性の塊です。和菓子の世界は奥深いです」"

[[dialogue]]
speaker = "マトイ"
# 「あ、ここ、ここ」
line = "「あ、ここ、ここ」"

[[dialogue]]
speaker = "アナ"
# 「おお……！　和菓子のジュエリーボックス」
line = "「おお……！　和菓子のジュエリーボックス」"

[[dialogue]]
speaker = "アナ"
# 「むふー」
line = "「むふー」"

[[dialogue]]
speaker = "マトイ"
# （アナちゃん、大福に釘付けになってる……このお店に連れてきて正解だったかな？）
line = "（アナちゃん、大福に釘付けになってる……このお店に連れてきて正解だったかな？）"

[[dialogue]]
speaker = "マトイ"
# 「ねえねえ、見て！　メロン大福だって。美味しそ。こっちはみかん……へえ、こんなのもあるんだ」
line = "「ねえねえ、見て！　メロン大福だって。美味しそ。こっちはみかん……へえ、こんなのもあるんだ」"

[[dialogue]]
speaker = "アナ"
# 「いっぱい種類がありすぎて……じゅるり……どれも食べたくなってしまいます」
line = "「いっぱい種類がありすぎて……じゅるり……どれも食べたくなってしまいます」"

[[dialogue]]
speaker = "マトイ"
# 「おこづかいが無くなっちゃわないように気を付けなくちゃね」
line = "「おこづかいが無くなっちゃわないように気を付けなくちゃね」"

[[dialogue]]
speaker = "アナ"
# 「そうですね。でも今の私は覚悟が決まってますから、限界まで行っちゃいますよ」
line = "「そうですね。でも今の私は覚悟が決まってますから、限界まで行っちゃいますよ」"

[[dialogue]]
speaker = "マトイ"
# 「えへへ、じゃあ私も便乗して買っちゃおーっと♪　私の体も甘い物を欲しがっているのだ！」
line = "「えへへ、じゃあ私も便乗して買っちゃおーっと♪　私の体も甘い物を欲しがっているのだ！」"

[[dialogue]]
speaker = "アナ"
# 「私もです、むっふー♪」
line = "「私もです、むっふー♪」"

[[dialogue]]
speaker = "マトイ"
# （喜んでくれてるみたいでよかった……でも、まだまだ表情からだと感情が読めないなぁ）
line = "（喜んでくれてるみたいでよかった……でも、まだまだ表情からだと感情が読めないなぁ）"

[[dialogue]]
speaker = "マトイ"
# （私、まだアナちゃんのことよく知らないんだよね。……せっかく同じ星徒会になれたんだし、もっと知りたいな）
line = "（私、まだアナちゃんのことよく知らないんだよね。……せっかく同じ星徒会になれたんだし、もっと知りたいな）"

[[dialogue]]
speaker = "マトイ"
# （ううん、役員だから、じゃなくて。もっとシンプルに友達として……）
line = "（ううん、役員だから、じゃなくて。もっとシンプルに友達として……）"

[[dialogue]]
speaker = "マトイ"
# （よし──！）
line = "（よし──！）"

[[dialogue]]
speaker = "マトイ"
# 「アナちゃん、この後って何か用事ある？」
line = "「アナちゃん、この後って何か用事ある？」"
