[[dialogue]]
speaker = "unk"
# 第４話,お姉ちゃんと男心,P
line = "第４話,お姉ちゃんと男心,P"

[[dialogue]]
speaker = "unk"
# 日焼け止めを塗り終わり、俺とサーシャさんは多くの人で賑わう海の家の方へとやって来ていた――
line = "日焼け止めを塗り終わり、俺とサーシャさんは多くの人で賑わう海の家の方へとやって来ていた――"

[[dialogue]]
speaker = "サーシャ"
# 「リゾート結界、すっかり街の大人気スポットになっちゃったわね～」
line = "「リゾート結界、すっかり街の大人気スポットになっちゃったわね～」"

[[dialogue]]
speaker = "サーシャ"
# 「クチコミで人気が広がって、学園生だけじゃなく、一般のお客さんも来るようになったみたいよ～」
line = "「クチコミで人気が広がって、学園生だけじゃなく、一般のお客さんも来るようになったみたいよ～」"

[[dialogue]]
speaker = "サーシャ"
# 「おかげで周りに人が多いけど……えいっ♪」
line = "「おかげで周りに人が多いけど……えいっ♪」"

[[dialogue]]
speaker = "unk"
# う、腕が胸に挟まれて……！？
line = "う、腕が胸に挟まれて……！？"

[[dialogue]]
speaker = "サーシャ"
# 「うふふっ、当ててるのよ♪　お姉ちゃんの恋人アピール<emoji=heart04>」
line = "「うふふっ、当ててるのよ♪　お姉ちゃんの恋人アピール<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
# 「会長くんはモテるから、学園外の女の子たちにも、しっかり見せつけておかないとね♪」
line = "「会長くんはモテるから、学園外の女の子たちにも、しっかり見せつけておかないとね♪」"

[[dialogue]]
speaker = "サーシャ"
# 「――うん？　私の方がモテる？　ふふっ、ありがとう♪　でも、それなら他の男の子たちにもアピールできるから、一石二鳥じゃない？」
line = "「――うん？　私の方がモテる？　ふふっ、ありがとう♪　でも、それなら他の男の子たちにもアピールできるから、一石二鳥じゃない？」"

[[dialogue]]
speaker = "サーシャ"
# 「――見られて恥ずかしい？　大丈夫よ。海の家には焼きそばを買いに来ただけだし、すぐにまた２人きりの場所に戻るから、ね<emoji=heart04>」
line = "「――見られて恥ずかしい？　大丈夫よ。海の家には焼きそばを買いに来ただけだし、すぐにまた２人きりの場所に戻るから、ね<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 海の家は混んでいたので、サーシャさんには外で待ってもらい、焼きそばを買ってきた。そして、サーシャさんの元に戻って来ると――
line = "海の家は混んでいたので、サーシャさんには外で待ってもらい、焼きそばを買ってきた。そして、サーシャさんの元に戻って来ると――"

[[dialogue]]
speaker = "サーシャ"
# 「うふふ、ごめんなさい。私、今は彼氏を待っているところなので～」
line = "「うふふ、ごめんなさい。私、今は彼氏を待っているところなので～」"

[[dialogue]]
speaker = "チャラい男"
# 「そう言わずにさ～、オレと遊ぼうよ～。彼氏、学生なんだろ？　社会人のオレの方が金持ってるし、楽しい思いをさせてあげられるよ～？」
line = "「そう言わずにさ～、オレと遊ぼうよ～。彼氏、学生なんだろ？　社会人のオレの方が金持ってるし、楽しい思いをさせてあげられるよ～？」"

[[dialogue]]
speaker = "サーシャ"
# 「う～ん、あいにく私、年下の可愛い男の子がタイプなので……」
line = "「う～ん、あいにく私、年下の可愛い男の子がタイプなので……」"

[[dialogue]]
speaker = "unk"
# サーシャさん！
line = "サーシャさん！"

[[dialogue]]
speaker = "サーシャ"
# 「あっ、会長くん♪　焼きそば買い終わったの？　おかえりなさ～い♪」
line = "「あっ、会長くん♪　焼きそば買い終わったの？　おかえりなさ～い♪」"

[[dialogue]]
speaker = "チャラい男"
# 「ふ～ん、こいつがキミの彼氏かぁ。顔はまぁ、整ってるけど……何ていうか、地味？　彼氏くんさぁ、こんな美人の彼女、キミにはもったいないと思うんだよねぇ」
line = "「ふ～ん、こいつがキミの彼氏かぁ。顔はまぁ、整ってるけど……何ていうか、地味？　彼氏くんさぁ、こんな美人の彼女、キミにはもったいないと思うんだよねぇ」"

[[dialogue]]
speaker = "サーシャ"
# 「むっ……あの～、流石にちょっとしつこい――」
line = "「むっ……あの～、流石にちょっとしつこい――」"

[[dialogue]]
speaker = "unk"
# 譲る気は全くないので、失礼します！
line = "譲る気は全くないので、失礼します！"

[[dialogue]]
speaker = "サーシャ"
# 「きゃっ、会長くん！？　急にそんな、お姫様抱っこだなんて――<emoji=heart04>」
line = "「きゃっ、会長くん！？　急にそんな、お姫様抱っこだなんて――<emoji=heart04>」"

[[dialogue]]
speaker = "チャラい男"
# 「おい、まだ話は……って、女の子お姫様抱っこしながら、足超速ぇぇぇっーーー！？」
line = "「おい、まだ話は……って、女の子お姫様抱っこしながら、足超速ぇぇぇっーーー！？」"

[[dialogue]]
speaker = "サーシャ"
# 「うふふっ♪　いきなり連れ去られて、お姉ちゃんビックリしちゃった……<emoji=heart04>」
line = "「うふふっ♪　いきなり連れ去られて、お姉ちゃんビックリしちゃった……<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
# 「――ええ、私は全然平気よ～。街を歩いている時にも同じような経験があるし、いざとなればお姉ちゃんも強いからね♪」
line = "「――ええ、私は全然平気よ～。街を歩いている時にも同じような経験があるし、いざとなればお姉ちゃんも強いからね♪」"

[[dialogue]]
speaker = "サーシャ"
# 「それよりも……会長くんがあの人に『譲る気はない』ってビシッと言ってくれた時、お姉ちゃんちょっとドキッとしちゃったわ<emoji=heart04>」
line = "「それよりも……会長くんがあの人に『譲る気はない』ってビシッと言ってくれた時、お姉ちゃんちょっとドキッとしちゃったわ<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
# 「お姫様抱っこも――」
line = "「お姫様抱っこも――」"

[[dialogue]]
speaker = "サーシャ"
# 「何だか、私を力強く引っ張ってくれるような、男らしさっていうのかな？　そういうのを、凄く感じちゃったわ……<emoji=heart04>」
line = "「何だか、私を力強く引っ張ってくれるような、男らしさっていうのかな？　そういうのを、凄く感じちゃったわ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# それなら――
line = "それなら――"

[[dialogue]]
speaker = "サーシャ"
# 「どうしたの、会長くん？　――今日１日、男らしく振る舞う？　確かに、そういうのは今まで、したことなかったけど……」
line = "「どうしたの、会長くん？　――今日１日、男らしく振る舞う？　確かに、そういうのは今まで、したことなかったけど……」"

[[dialogue]]
speaker = "サーシャ"
# 「でも、具体的にはどんな感じで……きゃっ！？」
line = "「でも、具体的にはどんな感じで……きゃっ！？」"

[[dialogue]]
speaker = "サーシャ"
# 「い、いきなり抱き寄せられて……あんっ<emoji=heart04>　耳元に会長くんの息、当たって――」
line = "「い、いきなり抱き寄せられて……あんっ<emoji=heart04>　耳元に会長くんの息、当たって――」"

[[dialogue]]
speaker = "unk"
# サーシャ、愛してる
line = "サーシャ、愛してる"

[[dialogue]]
speaker = "サーシャ"
# 「～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」
line = "「～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
# 「そんな耳元で名前を呼び捨てなんて……ふあぁっ<emoji=heart04>　何度も囁いちゃダメよぉ……胸が本当に、ドキドキしちゃう<emoji=heart04>」
line = "「そんな耳元で名前を呼び捨てなんて……ふあぁっ<emoji=heart04>　何度も囁いちゃダメよぉ……胸が本当に、ドキドキしちゃう<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
# 「――え？　き、キスをするの？　ま、待って心の準備が追いついてな――んっ<emoji=heart04>」
line = "「――え？　き、キスをするの？　ま、待って心の準備が追いついてな――んっ<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
# 「ちゅ……<emoji=heart04>　んむっ……ちゅっ<emoji=heart04>」
line = "「ちゅ……<emoji=heart04>　んむっ……ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
# 「……はぁ<emoji=heart04>　ご、強引に２回も、キスするなんて……<emoji=heart04>」
line = "「……はぁ<emoji=heart04>　ご、強引に２回も、キスするなんて……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 本当はいつもしたいの、我慢してる
line = "本当はいつもしたいの、我慢してる"

[[dialogue]]
speaker = "サーシャ"
# 「そ、そうなの……？　それなら、言ってくれれば私……」
line = "「そ、そうなの……？　それなら、言ってくれれば私……」"

[[dialogue]]
speaker = "サーシャ"
# 「――私が年上だから、遠慮しちゃう？　学園だと先輩だから、呼び捨てするわけにもいかない……？」
line = "「――私が年上だから、遠慮しちゃう？　学園だと先輩だから、呼び捨てするわけにもいかない……？」"

[[dialogue]]
speaker = "サーシャ"
# 「あと、お姉ちゃんって呼ばれるのが好きだって、私が言ったから……？」
line = "「あと、お姉ちゃんって呼ばれるのが好きだって、私が言ったから……？」"

[[dialogue]]
speaker = "サーシャ"
# 「た、確かに……ごめんなさい。あんまり意識はしてなかったけど――」
line = "「た、確かに……ごめんなさい。あんまり意識はしてなかったけど――」"

[[dialogue]]
speaker = "サーシャ"
# 「私、会長くんに甘えさせてるつもりで、自分も……甘えちゃってたのね」
line = "「私、会長くんに甘えさせてるつもりで、自分も……甘えちゃってたのね」"

[[dialogue]]
speaker = "サーシャ"
# 「あっ……<emoji=heart04>　会長くんの手が、私の頭を撫でて……やぁっ<emoji=heart04>　また耳元で、呼び捨てで囁くのダメ……<emoji=heart04>」
line = "「あっ……<emoji=heart04>　会長くんの手が、私の頭を撫でて……やぁっ<emoji=heart04>　また耳元で、呼び捨てで囁くのダメ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# お姉ちゃんらしくないサーシャも凄く可愛い
line = "お姉ちゃんらしくないサーシャも凄く可愛い"

[[dialogue]]
speaker = "サーシャ"
# 「はうぅっ……<emoji=heart04>　いま可愛いって言われると、何だか凄く恥ずかしくて、顔が熱くなっちゃうぅ……<emoji=heart04>」
line = "「はうぅっ……<emoji=heart04>　いま可愛いって言われると、何だか凄く恥ずかしくて、顔が熱くなっちゃうぅ……<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
# 「あっ……ダメッ<emoji=heart04>　顔見ないで、会長くん！　絶対変な顔しちゃってるからぁ<emoji=heart04>　あっ、あっ、手をどけちゃ――」
line = "「あっ……ダメッ<emoji=heart04>　顔見ないで、会長くん！　絶対変な顔しちゃってるからぁ<emoji=heart04>　あっ、あっ、手をどけちゃ――」"

[[dialogue]]
speaker = "unk"
# 今日はいっぱい俺に、恥ずかしいとこ見せて
line = "今日はいっぱい俺に、恥ずかしいとこ見せて"

[[dialogue]]
speaker = "サーシャ"
# 「～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>　な、なんでこんなにドキドキするのぉ～～～っ！？」
line = "「～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>　な、なんでこんなにドキドキするのぉ～～～っ！？」"

[[dialogue]]
speaker = "サーシャ"
# 「んんっ<emoji=heart04>　ちゅっ……いまキスしちゃダメぇ……<emoji=heart04>　頭熱くなり過ぎて、おかしくなっちゃう……ちゅっ<emoji=heart04>」
line = "「んんっ<emoji=heart04>　ちゅっ……いまキスしちゃダメぇ……<emoji=heart04>　頭熱くなり過ぎて、おかしくなっちゃう……ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
# 「んむっ……会長くぅん……<emoji=heart04>　ちゅっ……はぁぁ……<emoji=heart04>　大好き<emoji=heart04>」
line = "「んむっ……会長くぅん……<emoji=heart04>　ちゅっ……はぁぁ……<emoji=heart04>　大好き<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 顔を赤くしたサーシャが可愛くて、俺はついつい男らしい振る舞いを続けてしまうのだった――
line = "顔を赤くしたサーシャが可愛くて、俺はついつい男らしい振る舞いを続けてしまうのだった――"
