[[dialogue]]
speaker = "unk"
# 第３話,神殿での再会,B
line = "第３話,神殿での再会,B"

[[dialogue]]
speaker = "unk"
# 俺たちは女神の神殿目指し、全速力で空を駆け抜けた。
line = "俺たちは女神の神殿目指し、全速力で空を駆け抜けた。"

[[dialogue]]
speaker = "unk"
# そして──
line = "そして──"

[[dialogue]]
speaker = "メルエル"
# 「ここが女神様の神殿……すごく荘厳な雰囲気……」
line = "「ここが女神様の神殿……すごく荘厳な雰囲気……」"

[[dialogue]]
speaker = "梨緒"
# 「確かにこんな状況でなければ見入っていたところだが、今は極星星徒会を止める方が先だ」
line = "「確かにこんな状況でなければ見入っていたところだが、今は極星星徒会を止める方が先だ」"

[[dialogue]]
speaker = "アポロ"
# 「天使のためにも、世界のためにも、女神の神殿を守るぞ！」
line = "「天使のためにも、世界のためにも、女神の神殿を守るぞ！」"

[[dialogue]]
speaker = "メルエル"
# 「うん！　私たちはそのために来たんだから！」
line = "「うん！　私たちはそのために来たんだから！」"

[[dialogue]]
speaker = "unk"
# 俺たちが神殿に到着すると、２人の星騎士の姿があった。
line = "俺たちが神殿に到着すると、２人の星騎士の姿があった。"

[[dialogue]]
speaker = "クロト"
# 「あの２人が極星星徒会の？」
line = "「あの２人が極星星徒会の？」"

[[dialogue]]
speaker = "ベアトリス"
# 「はい、グレイスちゃんとレティシアちゃんです！　グレイスちゃんは妖精の魔族で、レティシアちゃんは天使なんです」
line = "「はい、グレイスちゃんとレティシアちゃんです！　グレイスちゃんは妖精の魔族で、レティシアちゃんは天使なんです」"

[[dialogue]]
speaker = "ヴィーナス"
# 「えーっと、ルヴィネとベアトリスとチナと……グレイスとレティシア、ね。これで５人だわ！」
line = "「えーっと、ルヴィネとベアトリスとチナと……グレイスとレティシア、ね。これで５人だわ！」"

[[dialogue]]
speaker = "unk"
# 会長のルヴィネ。
line = "会長のルヴィネ。"

[[dialogue]]
speaker = "unk"
# 副会長のベアトリス。
line = "副会長のベアトリス。"

[[dialogue]]
speaker = "unk"
# そしてチナ。グレイス。レティシア。
line = "そしてチナ。グレイス。レティシア。"

[[dialogue]]
speaker = "unk"
# ベアトリスによると、この５人が極星星徒会の全員だ。
line = "ベアトリスによると、この５人が極星星徒会の全員だ。"

[[dialogue]]
speaker = "ベアトリス"
# 「グレイスちゃん！　レティシアちゃん！　私の話を聞いて！」
line = "「グレイスちゃん！　レティシアちゃん！　私の話を聞いて！」"

[[dialogue]]
speaker = "グレイス"
# 「な、なんでベアトがここにいるんですっ？　アルタイルの星騎士が妨害に来ることはあり得ると思ってましたが……」
line = "「な、なんでベアトがここにいるんですっ？　アルタイルの星騎士が妨害に来ることはあり得ると思ってましたが……」"

[[dialogue]]
speaker = "ベアトリス"
# 「チナちゃんが教えてくれたの！　天界が襲撃されてるなら、きっと女神の神殿が本命だって」
line = "「チナちゃんが教えてくれたの！　天界が襲撃されてるなら、きっと女神の神殿が本命だって」"

[[dialogue]]
speaker = "グレイス"
# 「チナが……！？」
line = "「チナが……！？」"

[[dialogue]]
speaker = "レティシア"
# 「妙ね。拷問で口を割るような子じゃないはずだけど」
line = "「妙ね。拷問で口を割るような子じゃないはずだけど」"

[[dialogue]]
speaker = "ベアトリス"
# 「そんなひどいことしてないよ！？　私がお願いしたの！　このままじゃデネブもアルタイルも大変なことになるから……！」
line = "「そんなひどいことしてないよ！？　私がお願いしたの！　このままじゃデネブもアルタイルも大変なことになるから……！」"

[[dialogue]]
speaker = "ベアトリス"
# 「２人とも聞いて！　平行世界が滅ぼし合わないといけないのは嘘で、『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』っていう存在がリクリエを起こそうとしているの！」
line = "「２人とも聞いて！　平行世界が滅ぼし合わないといけないのは嘘で、『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』っていう存在がリクリエを起こそうとしているの！」"

[[dialogue]]
speaker = "グレイス"
# 「ぜろす……？」
line = "「ぜろす……？」"

[[dialogue]]
speaker = "ベアトリス"
# 「『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』は女神テルル様を生み出した創造神で、テルル様はリクリエを起こそうとする『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』にずっと抵抗してて……！」
line = "「『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』は女神テルル様を生み出した創造神で、テルル様はリクリエを起こそうとする『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』にずっと抵抗してて……！」"

[[dialogue]]
speaker = "ベアトリス"
# 「それでルヴィは、『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』がリクリエを実現させるために生み出した、新しい女神だったの……！」
line = "「それでルヴィは、『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』がリクリエを実現させるために生み出した、新しい女神だったの……！」"

[[dialogue]]
speaker = "グレイス"
# 「……はい？」
line = "「……はい？」"

[[dialogue]]
speaker = "レティシア"
# 「ルヴィがリクリエの側、と言いたいの？　……おかしな話。それならどうして、ルヴィは私たちを──デネブを救ってくれたのかしら」
line = "「ルヴィがリクリエの側、と言いたいの？　……おかしな話。それならどうして、ルヴィは私たちを──デネブを救ってくれたのかしら」"

[[dialogue]]
speaker = "ベアトリス"
# 「それは、デネブとアルタイルを争わせるためで──」
line = "「それは、デネブとアルタイルを争わせるためで──」"

[[dialogue]]
speaker = "グレイス"
# 「いやいや、さっきから何を言ってるんですかベアト！？　あのルヴィがデネブを滅ぼすだなんて、そんなことあり得ません」
line = "「いやいや、さっきから何を言ってるんですかベアト！？　あのルヴィがデネブを滅ぼすだなんて、そんなことあり得ません」"

[[dialogue]]
speaker = "グレイス"
# 「誰よりもデネブを守ろうとしているのがルヴィじゃないですか。ベアトだってよく知ってるはずですよ！」
line = "「誰よりもデネブを守ろうとしているのがルヴィじゃないですか。ベアトだってよく知ってるはずですよ！」"

[[dialogue]]
speaker = "ベアトリス"
# 「……っ」
line = "「……っ」"

[[dialogue]]
speaker = "レティシア"
# 「可哀想に。アルタイルの星騎士から、何か誤った情報を吹き込まれているのね」
line = "「可哀想に。アルタイルの星騎士から、何か誤った情報を吹き込まれているのね」"

[[dialogue]]
speaker = "グレイス"
# 「その可能性は大いにあり得ますね……ベアトは何でもホイホイ信じちゃう子ですし」
line = "「その可能性は大いにあり得ますね……ベアトは何でもホイホイ信じちゃう子ですし」"

[[dialogue]]
speaker = "ベアトリス"
# 「違うの、私はこの目でちゃんと……！」
line = "「違うの、私はこの目でちゃんと……！」"

[[dialogue]]
speaker = "レティシア"
# 「ごめんなさいね？　今のベアトの言葉は信用できないわ。アルタイルの星騎士と行動を共にしている、こんな状況ではね」
line = "「ごめんなさいね？　今のベアトの言葉は信用できないわ。アルタイルの星騎士と行動を共にしている、こんな状況ではね」"

[[dialogue]]
speaker = "グレイス"
# 「ベアトを連れ戻すようにと、ルヴィからも指令を受けてます！　一緒に私たちの世界に……デネブに帰りましょう！　話はその時にできますよ！」
line = "「ベアトを連れ戻すようにと、ルヴィからも指令を受けてます！　一緒に私たちの世界に……デネブに帰りましょう！　話はその時にできますよ！」"

[[dialogue]]
speaker = "ベアトリス"
# 「っ……やっぱり簡単には信じてもらえないよね」
line = "「っ……やっぱり簡単には信じてもらえないよね」"

[[dialogue]]
speaker = "unk"
# 『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』の存在やルヴィネの正体には、俺たちも驚かされた。極星星徒会の２人がベアトリスの話を信じないのも無理はない。
line = "『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』の存在やルヴィネの正体には、俺たちも驚かされた。極星星徒会の２人がベアトリスの話を信じないのも無理はない。"

[[dialogue]]
speaker = "unk"
# 今はアルタイルを敵と認識しているのだから、なおさらだ──そう感じていた時。
line = "今はアルタイルを敵と認識しているのだから、なおさらだ──そう感じていた時。"

[[dialogue]]
speaker = "unk"
# グレイスという少女が俺へ鋭い視線を向けてきた。
line = "グレイスという少女が俺へ鋭い視線を向けてきた。"

[[dialogue]]
speaker = "グレイス"
# 「……魔王もご一緒でしたか。ベアトにずいぶん巧みな嘘を吹き込んだようですね。流石は私たちを見捨てた裏切り者です」
line = "「……魔王もご一緒でしたか。ベアトにずいぶん巧みな嘘を吹き込んだようですね。流石は私たちを見捨てた裏切り者です」"

[[dialogue]]
speaker = "グレイス"
# 「次はどんな卑怯な手を打つんですか！？　言っておきますが、チナを人質にしても無駄ですよ」
line = "「次はどんな卑怯な手を打つんですか！？　言っておきますが、チナを人質にしても無駄ですよ」"

[[dialogue]]
speaker = "グレイス"
# 「自分の身を盾にされるのは、誰よりチナが望まないはず……<ruby=あくらつ>悪辣</ruby>な脅しは無意味です。私たちはひるんだりしません！」
line = "「自分の身を盾にされるのは、誰よりチナが望まないはず……<ruby>悪辣<rt>あくらつ</rt></ruby>な脅しは無意味です。私たちはひるんだりしません！」"

[[dialogue]]
speaker = "クロト"
# 「そんなことはしない！　俺たちアルタイルは、デネブと戦うのではなく、共にリクリエと戦いたいと思っている」
line = "「そんなことはしない！　俺たちアルタイルは、デネブと戦うのではなく、共にリクリエと戦いたいと思っている」"

[[dialogue]]
speaker = "クロト"
# 「アルタイルもデネブもリクリエに脅かされている。ならアルタイルとデネブの星騎士の力を合わせて、一緒にリクリエに立ち向かわないか！？」
line = "「アルタイルもデネブもリクリエに脅かされている。ならアルタイルとデネブの星騎士の力を合わせて、一緒にリクリエに立ち向かわないか！？」"

[[dialogue]]
speaker = "グレイス"
# 「──どの口でそんな綺麗ごとを！　そんなこと言って、また裏切るつもりなんでしょう！」
line = "「──どの口でそんな綺麗ごとを！　そんなこと言って、また裏切るつもりなんでしょう！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロトは裏切ってなんかいないわ！　ルヴィネの嘘よ！」
line = "「クロトは裏切ってなんかいないわ！　ルヴィネの嘘よ！」"

[[dialogue]]
speaker = "グレイス"
# 「口では何とでも言えます！」
line = "「口では何とでも言えます！」"

[[dialogue]]
speaker = "グレイス"
# 「魔王クロトは世界を守ると言いました。ですが魔王はデネブを去り、滅びかけた世界を守ったのはルヴィでした！」
line = "「魔王クロトは世界を守ると言いました。ですが魔王はデネブを去り、滅びかけた世界を守ったのはルヴィでした！」"

[[dialogue]]
speaker = "グレイス"
# 「魔王は私たちを……デネブを裏切ったんです！」
line = "「魔王は私たちを……デネブを裏切ったんです！」"

[[dialogue]]
speaker = "unk"
# 『魔王クロトはデネブを裏切ってアルタイルに逃げた』──平行世界デネブでは、ルヴィネからそう伝えられている。
line = "『魔王クロトはデネブを裏切ってアルタイルに逃げた』──平行世界デネブでは、ルヴィネからそう伝えられている。"

[[dialogue]]
speaker = "unk"
# 何せ救世の英雄ルヴィネの言葉だ。信じている人が大半だろう。
line = "何せ救世の英雄ルヴィネの言葉だ。信じている人が大半だろう。"

[[dialogue]]
speaker = "レティシア"
# 「ここでのんびりと問答をするつもりはないの。グレイス、まずは一番の指令を果たしましょう。神殿内部へ向かうわ」
line = "「ここでのんびりと問答をするつもりはないの。グレイス、まずは一番の指令を果たしましょう。神殿内部へ向かうわ」"

[[dialogue]]
speaker = "グレイス"
# 「はいっ──行きなさい、極星従騎！」
line = "「はいっ──行きなさい、極星従騎！」"

[[dialogue]]
speaker = "unk"
# グレイスが転送装置を取り出して号令を下すと、虚空に穴が開き、剣を携えたガーディアンが現れる。
line = "グレイスが転送装置を取り出して号令を下すと、虚空に穴が開き、剣を携えたガーディアンが現れる。"

[[dialogue]]
speaker = "スレイプニル"
# 「ヒィィン！！」
line = "「ヒィィン！！」"

[[dialogue]]
speaker = "unk"
# そして極星従騎が<ruby=いなな>嘶</ruby>き、宙を駆けて突進する。
line = "そして極星従騎が<ruby>嘶<rt>いなな</rt></ruby>き、宙を駆けて突進する。"

[[dialogue]]
speaker = "ヴィーナス"
# 「話を聞くつもりがないなら、力ずくで止めるまでよ！」
line = "「話を聞くつもりがないなら、力ずくで止めるまでよ！」"

[[dialogue]]
speaker = "メルエル"
# 「うん！　天使も天界も、絶対に守るんだから！」
line = "「うん！　天使も天界も、絶対に守るんだから！」"
