[[dialogue]]
speaker = "unk"
# 第４話,愛の誓いを,P
line = "第４話,愛の誓いを,P"

[[dialogue]]
speaker = "フィオナ"
# 「緋宮会長とここに来るのは久しぶりですね。あの時買ってもらったキーホルダー、今も付けていますよ」
line = "「緋宮会長とここに来るのは久しぶりですね。あの時買ってもらったキーホルダー、今も付けていますよ」"

[[dialogue]]
speaker = "フィオナ"
# 「あなたからデートに誘っていただけて嬉しいです。ここのところ忙しくて、２人になれる時間があまりなかったですから」
line = "「あなたからデートに誘っていただけて嬉しいです。ここのところ忙しくて、２人になれる時間があまりなかったですから」"

[[dialogue]]
speaker = "フィオナ"
# 「だから、その……」
line = "「だから、その……」"

[[dialogue]]
speaker = "unk"
# 手を繋ごうか？
line = "手を繋ごうか？"

[[dialogue]]
speaker = "フィオナ"
# 「はい……！」
line = "「はい……！」"

[[dialogue]]
speaker = "フィオナ"
# 「えへへ……緋宮会長の手、大きいです。にぎにぎ<emoji=heart04>」
line = "「えへへ……緋宮会長の手、大きいです。にぎにぎ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 好きだよ、フィオナ
line = "好きだよ、フィオナ"

[[dialogue]]
speaker = "フィオナ"
# 「ひゃっ！？　ふ、不意打ちは卑怯ですよっ！？」
line = "「ひゃっ！？　ふ、不意打ちは卑怯ですよっ！？」"

[[dialogue]]
speaker = "フィオナ"
# 「でも……緋宮会長は私のどこが好きなんでしょうか？」
line = "「でも……緋宮会長は私のどこが好きなんでしょうか？」"

[[dialogue]]
speaker = "フィオナ"
# 「姉さんが倒れた時から、私は『星見フィオナ』であろうとしてきました。完璧な魔王を目指して、勉学に励み、星術を磨く日々で……私ってつまらない人間なんじゃ……」
line = "「姉さんが倒れた時から、私は『星見フィオナ』であろうとしてきました。完璧な魔王を目指して、勉学に励み、星術を磨く日々で……私ってつまらない人間なんじゃ……」"

[[dialogue]]
speaker = "フィオナ"
# 「どうしてそこで笑うんですか！？　フィオナは全然つまらなくない……？　好きなところがたくさんある……？」
line = "「どうしてそこで笑うんですか！？　フィオナは全然つまらなくない……？　好きなところがたくさんある……？」"

[[dialogue]]
speaker = "フィオナ"
# 「ヒーローや漫画が好きで、それを隠しているところ……サーフィンに夢中になるところ……卵焼きを極めようとしているところ……」
line = "「ヒーローや漫画が好きで、それを隠しているところ……サーフィンに夢中になるところ……卵焼きを極めようとしているところ……」"

[[dialogue]]
speaker = "フィオナ"
# 「なんでもかわいいって言っちゃうところや、オタクなところも好き……？　ちょっと余計なの入ってないですか！？」
line = "「なんでもかわいいって言っちゃうところや、オタクなところも好き……？　ちょっと余計なの入ってないですか！？」"

[[dialogue]]
speaker = "フィオナ"
# 「もう、褒めてないですよね。流星星徒会のみんなもそうですけど、最近よくいじられている気がします」
line = "「もう、褒めてないですよね。流星星徒会のみんなもそうですけど、最近よくいじられている気がします」"

[[dialogue]]
speaker = "フィオナ"
# 「でも嬉しいです。緋宮会長がそれだけ私のことを見てくれてる、知ってくれているということですから」
line = "「でも嬉しいです。緋宮会長がそれだけ私のことを見てくれてる、知ってくれているということですから」"

[[dialogue]]
speaker = "フィオナ"
# 「私も緋宮会長が好きです。実直で、優しくて、私を包み込んでくれているみたいで……」
line = "「私も緋宮会長が好きです。実直で、優しくて、私を包み込んでくれているみたいで……」"

[[dialogue]]
speaker = "フィオナ"
# 「本来『星見エリシア』であった私が、今自分を見失わずにいられるのも、あなたのおかげなんだと思います」
line = "「本来『星見エリシア』であった私が、今自分を見失わずにいられるのも、あなたのおかげなんだと思います」"

[[dialogue]]
speaker = "フィオナ"
# 「あ……あそこ、新しいアニメのショップができています。どれどれ……変身ヒーロー作品とのコラボキャンペーンも開催されているみたいですね」
line = "「あ……あそこ、新しいアニメのショップができています。どれどれ……変身ヒーロー作品とのコラボキャンペーンも開催されているみたいですね」"

[[dialogue]]
speaker = "unk"
# 入ってみようか
line = "入ってみようか"

[[dialogue]]
speaker = "フィオナ"
# 「それは……いえ、そうですね。飛び込んでみましょうっ」
line = "「それは……いえ、そうですね。飛び込んでみましょうっ」"

[[dialogue]]
speaker = "フィオナ"
# 「ふふ、緋宮会長とお店を見て回れて、とっても楽しかったです」
line = "「ふふ、緋宮会長とお店を見て回れて、とっても楽しかったです」"

[[dialogue]]
speaker = "フィオナ"
# 「ヒーローが好きなんて、本当は恥ずかしがる必要ないんでしょうけど……緋宮会長と一緒だから入れました」
line = "「ヒーローが好きなんて、本当は恥ずかしがる必要ないんでしょうけど……緋宮会長と一緒だから入れました」"

[[dialogue]]
speaker = "フィオナ"
# 「それに欲しかった漫画の新装版も買えて、至れり尽くせりです♪」
line = "「それに欲しかった漫画の新装版も買えて、至れり尽くせりです♪」"

[[dialogue]]
speaker = "フィオナ"
# 「でもどうしてデートの後に大聖堂に？　星徒会の仕事……ではないですよね？」
line = "「でもどうしてデートの後に大聖堂に？　星徒会の仕事……ではないですよね？」"

[[dialogue]]
speaker = "フィオナ"
# 「伝えたいことがある？　とても大事なこと？」
line = "「伝えたいことがある？　とても大事なこと？」"

[[dialogue]]
speaker = "unk"
# 俺と結婚してほしい
line = "俺と結婚してほしい"

[[dialogue]]
speaker = "フィオナ"
# 「──！」
line = "「──！」"

[[dialogue]]
speaker = "フィオナ"
# 「それは、この前の結婚式のふりの続き……ではないですよね」
line = "「それは、この前の結婚式のふりの続き……ではないですよね」"

[[dialogue]]
speaker = "フィオナ"
# 「私は流星教皇の娘。いずれ多くの責務を負う者です。それでも……私と添い遂げたいと思いますか」
line = "「私は流星教皇の娘。いずれ多くの責務を負う者です。それでも……私と添い遂げたいと思いますか」"

[[dialogue]]
speaker = "フィオナ"
# 「……なんて、あなたが理解していないわけないですよね。本気なのは聞かなくてもわかります」
line = "「……なんて、あなたが理解していないわけないですよね。本気なのは聞かなくてもわかります」"

[[dialogue]]
speaker = "フィオナ"
# 「断る理由がありません。だって私はあなたを愛していて、あなたも私を愛しているんですから」
line = "「断る理由がありません。だって私はあなたを愛していて、あなたも私を愛しているんですから」"

[[dialogue]]
speaker = "フィオナ"
# 「プロポーズ、お受けします」
line = "「プロポーズ、お受けします」"

[[dialogue]]
speaker = "フィオナ"
# 「お互いまだ学生ですから、本当に結婚するのは早いですけど……リクリエを退けて世界が平和になったら、私たち結婚しましょう」
line = "「お互いまだ学生ですから、本当に結婚するのは早いですけど……リクリエを退けて世界が平和になったら、私たち結婚しましょう」"

[[dialogue]]
speaker = "unk"
# それ死亡フラグ！？
line = "それ死亡フラグ！？"

[[dialogue]]
speaker = "フィオナ"
# 「死亡フラグも立てすぎれば、生存フラグになるんですよ。逆転するくらい、死亡フラグを立てまくっちゃいましょう♪」
line = "「死亡フラグも立てすぎれば、生存フラグになるんですよ。逆転するくらい、死亡フラグを立てまくっちゃいましょう♪」"

[[dialogue]]
speaker = "イレーナ"
# 「あのー……そろそろ出てきてもよろしいでしょうか？」
line = "「あのー……そろそろ出てきてもよろしいでしょうか？」"

[[dialogue]]
speaker = "フィオナ"
# 「ひゃっ！？　イ、イレーナさん！？」
line = "「ひゃっ！？　イ、イレーナさん！？」"

[[dialogue]]
speaker = "イレーナ"
# 「そんなに驚かないでください。私はこの大聖堂に着任した、正式な神官ですから」
line = "「そんなに驚かないでください。私はこの大聖堂に着任した、正式な神官ですから」"

[[dialogue]]
speaker = "イレーナ"
# 「おふたりのやりとりを拝見していたところ、どうやら神官の出番かと思いまして」
line = "「おふたりのやりとりを拝見していたところ、どうやら神官の出番かと思いまして」"

[[dialogue]]
speaker = "イレーナ"
# 「籍を入れずとも、新郎新婦の愛を神官が見届ければ婚姻は成り立つと、女神様を信仰する者としては思っております。いかがでしょうか、おふたりとも？」
line = "「籍を入れずとも、新郎新婦の愛を神官が見届ければ婚姻は成り立つと、女神様を信仰する者としては思っております。いかがでしょうか、おふたりとも？」"

[[dialogue]]
speaker = "フィオナ"
# 「はい、よろしくお願いします、イレーナ神官」
line = "「はい、よろしくお願いします、イレーナ神官」"

[[dialogue]]
speaker = "イレーナ"
# 「ええ。健やかなる時も、病める時も──はたくさん言ったからもういいですよね。新郎新婦、誓いのキスを」
line = "「ええ。健やかなる時も、病める時も──はたくさん言ったからもういいですよね。新郎新婦、誓いのキスを」"

[[dialogue]]
speaker = "フィオナ"
# 「はい」
line = "「はい」"

[[dialogue]]
speaker = "フィオナ"
# 「──ちゅっ」
line = "「──ちゅっ」"

[[dialogue]]
speaker = "フィオナ"
# 「ようやく唇にキスできましたね」
line = "「ようやく唇にキスできましたね」"

[[dialogue]]
speaker = "フィオナ"
# 「ふつつか者ですが、末永くよろしくお願いしますね……あなた」
line = "「ふつつか者ですが、末永くよろしくお願いしますね……あなた」"
