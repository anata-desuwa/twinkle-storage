[[dialogue]]
speaker = "unk"
# 第３話,ひとつの命,P
line = "第３話,ひとつの命,P"

[[dialogue]]
speaker = "unk"
# とある休日の昼下がり。遊びに来たパテルと一緒に流行のドラマを見ていると──
line = "とある休日の昼下がり。遊びに来たパテルと一緒に流行のドラマを見ていると──"

[[dialogue]]
speaker = "パテル"
# 「あ、死んだ。この人、いつか死ぬ気がしてたけど、ここで事故死かぁ～」
line = "「あ、死んだ。この人、いつか死ぬ気がしてたけど、ここで事故死かぁ～」"

[[dialogue]]
speaker = "unk"
# 理不尽な死がつらい……
line = "理不尽な死がつらい……"

[[dialogue]]
speaker = "パテル"
# 「ハハッ。見事に作り手の術中にはまってるね。でも死が理不尽だの不条理だの言われるの、そろそろ飽き飽きだな～……」
line = "「ハハッ。見事に作り手の術中にはまってるね。でも死が理不尽だの不条理だの言われるの、そろそろ飽き飽きだな～……」"

[[dialogue]]
speaker = "パテル"
# 「人は刺されたら死ぬ。たとえ法律で殺人が禁止されても、人が死ななくなるわけじゃない」
line = "「人は刺されたら死ぬ。たとえ法律で殺人が禁止されても、人が死ななくなるわけじゃない」"

[[dialogue]]
speaker = "パテル"
# 「病だってそう。医療の発展で死ににくくはなったけど、病が悪化すれば死ぬ」
line = "「病だってそう。医療の発展で死ににくくはなったけど、病が悪化すれば死ぬ」"

[[dialogue]]
speaker = "パテル"
# 「事故死や突然死なんて、ただ運が悪いだけで死ぬ。そこに正しく生きてるかどうかなんて関係ない。人の言う条理なんてものの方が後付けなんだよ」
line = "「事故死や突然死なんて、ただ運が悪いだけで死ぬ。そこに正しく生きてるかどうかなんて関係ない。人の言う条理なんてものの方が後付けなんだよ」"

[[dialogue]]
speaker = "パテル"
# 「それとも、わかってるのに気付かないふりしてるのかな──なんて、死神トークはこのくらいにしとこっか。かわいくないしね」
line = "「それとも、わかってるのに気付かないふりしてるのかな──なんて、死神トークはこのくらいにしとこっか。かわいくないしね」"

[[dialogue]]
speaker = "パテル"
# 「んじゃドラマも見終わったところだし、遊びに行こっか！　せっかくのお休みなんだし、時間を無駄にするのはナンセンスだよ！」
line = "「んじゃドラマも見終わったところだし、遊びに行こっか！　せっかくのお休みなんだし、時間を無駄にするのはナンセンスだよ！」"

[[dialogue]]
speaker = "パテル"
# 「じゃーん！　ゆ～えんち～！　この前は誰かさんのせいでちゃんと遊べなかったからね！　その誰かさんはあたしだけど！」
line = "「じゃーん！　ゆ～えんち～！　この前は誰かさんのせいでちゃんと遊べなかったからね！　その誰かさんはあたしだけど！」"

[[dialogue]]
speaker = "unk"
# 今さらだけど、どうして附属の制服を？
line = "今さらだけど、どうして附属の制服を？"

[[dialogue]]
speaker = "パテル"
# 「ちょうどいいから予備をこっそり借りた！　あたし、えら～い守護天使様だからこれくらいいいよね！」
line = "「ちょうどいいから予備をこっそり借りた！　あたし、えら～い守護天使様だからこれくらいいいよね！」"

[[dialogue]]
speaker = "パテル"
# 「死ぬまで借りてるだけだよ、借りてるだけ。死んだら返すよ、多分」
line = "「死ぬまで借りてるだけだよ、借りてるだけ。死んだら返すよ、多分」"

[[dialogue]]
speaker = "パテル"
# 「さぁ、デートだよ、デート！　思いっきりあたしを甘やかしてね<emoji=heart04>」
line = "「さぁ、デートだよ、デート！　思いっきりあたしを甘やかしてね<emoji=heart04>」"

[[dialogue]]
speaker = "パテル"
# 「何驚いてるの？　男と女が一緒に遊びに行くってことはデートでしょ？　まさかあたしのこと女の子として意識してなかった？」
line = "「何驚いてるの？　男と女が一緒に遊びに行くってことはデートでしょ？　まさかあたしのこと女の子として意識してなかった？」"

[[dialogue]]
speaker = "パテル"
# 「じゃあこうしたら、ちょっとは意識してくれるかな……？」
line = "「じゃあこうしたら、ちょっとは意識してくれるかな……？」"

[[dialogue]]
speaker = "unk"
# （パテルが腕に抱きついて……）
line = "（パテルが腕に抱きついて……）"

[[dialogue]]
speaker = "パテル"
# 「あたしだって女の子なんだし、その、少しくらいドキドキしてくれてもいいんじゃないかな……」
line = "「あたしだって女の子なんだし、その、少しくらいドキドキしてくれてもいいんじゃないかな……」"

[[dialogue]]
speaker = "パテル"
# 「な～んてね♪　ドキッとしちゃった？」
line = "「な～んてね♪　ドキッとしちゃった？」"

[[dialogue]]
speaker = "パテル"
# 「アハハッ、からかってごめんってば～。じゃあお詫びに、このまま遊園地回ろうよ。デートなんだしさ♪」
line = "「アハハッ、からかってごめんってば～。じゃあお詫びに、このまま遊園地回ろうよ。デートなんだしさ♪」"

[[dialogue]]
speaker = "パテル"
# 「ほら行こっ！　お化け屋敷に～、ゴーカートに～、あとジェットコースターもまた乗りたいんだ♪」
line = "「ほら行こっ！　お化け屋敷に～、ゴーカートに～、あとジェットコースターもまた乗りたいんだ♪」"

[[dialogue]]
speaker = "パテル"
# 「おお、上がってる上がってる……」
line = "「おお、上がってる上がってる……」"

[[dialogue]]
speaker = "パテル"
# 「キャ～～～～～～ッ！！　死ぬ～～～～～～っ！！」
line = "「キャ～～～～～～ッ！！　死ぬ～～～～～～っ！！」"

[[dialogue]]
speaker = "パテル"
# 「やっぱり遊園地といえばジェットコースターだよね～♪　死神なのにドキドキして、クセになっちゃうかも♪」
line = "「やっぱり遊園地といえばジェットコースターだよね～♪　死神なのにドキドキして、クセになっちゃうかも♪」"

[[dialogue]]
speaker = "パテル"
# 「ゴーカートも楽しかった！　次はもっとうまくなって、あたしの運転で魔王を追い抜いてあげるね！」
line = "「ゴーカートも楽しかった！　次はもっとうまくなって、あたしの運転で魔王を追い抜いてあげるね！」"

[[dialogue]]
speaker = "パテル"
# 「でもお化け屋敷は期待はずれだったなぁ～。あたしの方がもっと上手に驚かせるよ。阿鼻叫喚にしてあげる♪」
line = "「でもお化け屋敷は期待はずれだったなぁ～。あたしの方がもっと上手に驚かせるよ。阿鼻叫喚にしてあげる♪」"

[[dialogue]]
speaker = "パテル"
# 「あ……くんくん、くんくん……お肉の匂い……遊園地の売店からだね」
line = "「あ……くんくん、くんくん……お肉の匂い……遊園地の売店からだね」"

[[dialogue]]
speaker = "パテル"
# 「前よりは物を食べるようになったけど、お肉はやっぱりまだ抵抗あるかな。いい匂いだし、食べればおいしいんだと思うけど……」
line = "「前よりは物を食べるようになったけど、お肉はやっぱりまだ抵抗あるかな。いい匂いだし、食べればおいしいんだと思うけど……」"

[[dialogue]]
speaker = "パテル"
# 「別に食べなくたって、生きてるだけでリソースを消費している。わかってはいるんだけど、やっぱりお肉はね……」
line = "「別に食べなくたって、生きてるだけでリソースを消費している。わかってはいるんだけど、やっぱりお肉はね……」"

[[dialogue]]
speaker = "unk"
# 今のパテルもひとつの命だよ
line = "今のパテルもひとつの命だよ"

[[dialogue]]
speaker = "パテル"
# 「ほえ？」
line = "「ほえ？」"

[[dialogue]]
speaker = "グロリア"
# 「こんにちは。お久しぶりですね、プルちゃん」
line = "「こんにちは。お久しぶりですね、プルちゃん」"

[[dialogue]]
speaker = "フラン"
# 「オレもいるぞ。よぉチビ。いかにも最後の別れみたいな雰囲気出してたくせに、しっかり姿現してんじゃねえか」
line = "「オレもいるぞ。よぉチビ。いかにも最後の別れみたいな雰囲気出してたくせに、しっかり姿現してんじゃねえか」"

[[dialogue]]
speaker = "パテル"
# 「むっか～。相変わらずフランは生意気だね。その首刈り取ってあげようか」
line = "「むっか～。相変わらずフランは生意気だね。その首刈り取ってあげようか」"

[[dialogue]]
speaker = "フラン"
# 「やれるもんならやってみな。死神との勝負なら喜んで受けて立つぜ」
line = "「やれるもんならやってみな。死神との勝負なら喜んで受けて立つぜ」"

[[dialogue]]
speaker = "グロリア"
# 「会長さんが、プルちゃんがここにいるって教えてくれたんです。プルちゃんが元気そうでよかった」
line = "「会長さんが、プルちゃんがここにいるって教えてくれたんです。プルちゃんが元気そうでよかった」"

[[dialogue]]
speaker = "パテル"
# 「ありがとう。グロリアは優しいね。もう、魔王ってば。言わなくていいって言ったのに」
line = "「ありがとう。グロリアは優しいね。もう、魔王ってば。言わなくていいって言ったのに」"

[[dialogue]]
speaker = "フラン"
# 「死神がどうとか、変な気ぃ使ってんじゃねえ。ほら食えよ。オレオススメのカツドッグだ」
line = "「死神がどうとか、変な気ぃ使ってんじゃねえ。ほら食えよ。オレオススメのカツドッグだ」"

[[dialogue]]
speaker = "パテル"
# 「コッペパンにトンカツを挟んでるの？　おいしそうではあるけど……」
line = "「コッペパンにトンカツを挟んでるの？　おいしそうではあるけど……」"

[[dialogue]]
speaker = "フラン"
# 「別にお前が食わなきゃオレが食う。でも今のお前は、オレたちと同じように体があって、食わなきゃ腹減って死ぬんだろ」
line = "「別にお前が食わなきゃオレが食う。でも今のお前は、オレたちと同じように体があって、食わなきゃ腹減って死ぬんだろ」"

[[dialogue]]
speaker = "グロリア"
# 「本体は守護天使でも、今のプルちゃんはプルちゃんです。だから普通の生き物と同じように生きていいんじゃないでしょうか」
line = "「本体は守護天使でも、今のプルちゃんはプルちゃんです。だから普通の生き物と同じように生きていいんじゃないでしょうか」"

[[dialogue]]
speaker = "パテル"
# 「あたしも……普通の生き物……」
line = "「あたしも……普通の生き物……」"

[[dialogue]]
speaker = "パテル"
# 「普通の生き物なら……糧になるものは食べるのが自然か。それじゃ……あ～ん」
line = "「普通の生き物なら……糧になるものは食べるのが自然か。それじゃ……あ～ん」"

[[dialogue]]
speaker = "パテル"
# 「ん～っ！　カツドックおいし～っ♪　サクサクでジューシーで……はむはむはむはむ……ごくんっ」
line = "「ん～っ！　カツドックおいし～っ♪　サクサクでジューシーで……はむはむはむはむ……ごくんっ」"

[[dialogue]]
speaker = "パテル"
# 「これが命の味か……罪深くて、甘美な味だなぁ。でも生きるって、こういうことだもんね」
line = "「これが命の味か……罪深くて、甘美な味だなぁ。でも生きるって、こういうことだもんね」"

[[dialogue]]
speaker = "パテル"
# 「……うん、そうだね。こうして体があって、この世にいるなら、あたしもひとつの命か」
line = "「……うん、そうだね。こうして体があって、この世にいるなら、あたしもひとつの命か」"

[[dialogue]]
speaker = "パテル"
# 「だいたい、あたしがこうなっちゃったのはリクリエのせいなんだから、あたしがやらかしても全部リクリエが悪いんだ！」
line = "「だいたい、あたしがこうなっちゃったのはリクリエのせいなんだから、あたしがやらかしても全部リクリエが悪いんだ！」"

[[dialogue]]
speaker = "unk"
# 開き直った！？
line = "開き直った！？"

[[dialogue]]
speaker = "パテル"
# 「というわけで、もっとあたしの好きにすることにしたよ。好きなことして、好きなもの食べるんだ！」
line = "「というわけで、もっとあたしの好きにすることにしたよ。好きなことして、好きなもの食べるんだ！」"

[[dialogue]]
speaker = "フラン"
# 「よぉし、今度こそ勝負だチビ！　絶叫マシーン勝負の決着付けるぞ！」
line = "「よぉし、今度こそ勝負だチビ！　絶叫マシーン勝負の決着付けるぞ！」"

[[dialogue]]
speaker = "グロリア"
# 「スタンプラリーでもらった遊園地の割引券が残っていますから、みんなでまた一緒に来ましょう」
line = "「スタンプラリーでもらった遊園地の割引券が残っていますから、みんなでまた一緒に来ましょう」"

[[dialogue]]
speaker = "パテル"
# 「うん！」
line = "「うん！」"

[[dialogue]]
speaker = "パテル"
# 「今日はありがとう、魔王。おかげで吹っ切れたよ」
line = "「今日はありがとう、魔王。おかげで吹っ切れたよ」"

[[dialogue]]
speaker = "パテル"
# 「だからその、あなたのこと、割と気に入ってるっていうか……けっこう好きかも。エヘヘ……♪」
line = "「だからその、あなたのこと、割と気に入ってるっていうか……けっこう好きかも。エヘヘ……♪」"
