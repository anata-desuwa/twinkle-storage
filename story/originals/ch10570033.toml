line = "「今までは……占いのお願いをされることが多かったのですが……」"

[[dialogue]]
speaker = "トリシャ"
# 「コンテストの後は私のことについてよく聞かれるようになりました。出身地や、なぜ占いを始めたのか、など……」
line = "「コンテストの後は私のことについてよく聞かれるようになりました。出身地や、なぜ占いを始めたのか、など……」"

[[dialogue]]
speaker = "トリシャ"
# 「私は学園生ではありませんのに、皆さん、とても良くしてくださって……」
line = "「私は学園生ではありませんのに、皆さん、とても良くしてくださって……」"

[[dialogue]]
speaker = "トリシャ"
