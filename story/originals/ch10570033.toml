[[dialogue]]
speaker = "トリシャ"
# 「そもそも、私の体なんて、何も面白いことはありませんのに……人間界では興味の対象となるのですね。不思議です」
line = "「そもそも、私の体なんて、何も面白いことはありませんのに……人間界では興味の対象となるのですね。不思議です」"

