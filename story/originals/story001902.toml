[[dialogue]]
speaker = "ウズメイア"
# 「せ、世界が滅んじゃうとか、もーやだなー、トリシャさんってばー！　冗談キツいってー。今は平和そのものなんだよー？」
line = "「せ、世界が滅んじゃうとか、もーやだなー、トリシャさんってばー！　冗談キツいってー。今は平和そのものなんだよー？」"

[[dialogue]]
speaker = "トリシャ"
# 「占いに関して、冗談は申しません……このままですと……新年を迎える前に……世界が消失します」
line = "「占いに関して、冗談は申しません……このままですと……新年を迎える前に……世界が消失します」"

[[dialogue]]
speaker = "ソフィア"
# 「ど、どういうことなんですか？　世界が終わっちゃうなんて、そんな……窮地から救って間もないのに……」
line = "「ど、どういうことなんですか？　世界が終わっちゃうなんて、そんな……窮地から救って間もないのに……」"

[[dialogue]]
speaker = "トリシャ"
# 「より詳しく占ってみましょう……少々お待ちを……カシャ、カシャ……」
line = "「より詳しく占ってみましょう……少々お待ちを……カシャ、カシャ……」"

[[dialogue]]
speaker = "トリシャ"
# 「ふむ……ふむ……世界を支える柱が不足しているため、世界が崩壊する……といったところでしょうか……」
line = "「ふむ……ふむ……世界を支える柱が不足しているため、世界が崩壊する……といったところでしょうか……」"

[[dialogue]]
speaker = "トリシャ"
# 「その崩壊を食い止めるには、魔界へと赴く必要がある……と出ています……」
line = "「その崩壊を食い止めるには、魔界へと赴く必要がある……と出ています……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「柱が足りなくて崩壊……魔界へレッツラゴー……？　それだけじゃ、情報が足りてない感じだわ」
line = "「柱が足りなくて崩壊……魔界へレッツラゴー……？　それだけじゃ、情報が足りてない感じだわ」"

[[dialogue]]
speaker = "ヘレナ"
# 「世界を支える柱とは、守護天使のことであろうな」
line = "「世界を支える柱とは、守護天使のことであろうな」"

[[dialogue]]
speaker = "ヘレナ"
# 「マグダレナ、アルモタヘル、ラクシャ、アウクセシア、パテルら五柱は確認できていたが、兼ねてより残りの一柱の所在は不明であった」
line = "「マグダレナ、アルモタヘル、ラクシャ、アウクセシア、パテルら五柱は確認できていたが、兼ねてより残りの一柱の所在は不明であった」"

[[dialogue]]
speaker = "フィオナ"
# 「しかし守護天使は全部で六柱……残る一柱が不在のため、世界を維持できずに崩壊する……来るべき時が来たということでしょうか」
line = "「しかし守護天使は全部で六柱……残る一柱が不在のため、世界を維持できずに崩壊する……来るべき時が来たということでしょうか」"

[[dialogue]]
speaker = "トリシャ"
# 「では……その最後の守護天使様の封印されし神殿……その位置を占いましょう……カシャ、カシャ」
line = "「では……その最後の守護天使様の封印されし神殿……その位置を占いましょう……カシャ、カシャ」"

[[dialogue]]
speaker = "ウズメイア"
# 「そんな簡単にわかっちゃうんだ！？　トリシャさんすっご！」
line = "「そんな簡単にわかっちゃうんだ！？　トリシャさんすっご！」"

[[dialogue]]
speaker = "ソフィア"
# 「トリシャさんの占いは、万能ですね。あなたの力がなかったら、どうなっていたことか……」
line = "「トリシャさんの占いは、万能ですね。あなたの力がなかったら、どうなっていたことか……」"

[[dialogue]]
speaker = "トリシャ"
# 「い、いえ、その……う、占いは万能ではありません……師匠ならばともかく……百発百中というわけではありませんので……」
line = "「い、いえ、その……う、占いは万能ではありません……師匠ならばともかく……百発百中というわけではありませんので……」"

[[dialogue]]
speaker = "トリシャ"
# 「当たるも八卦、当たらぬも八卦……外れることも多々あり……放っておいても、何も生じない可能性も……十二分にありましたが……」
line = "「当たるも八卦、当たらぬも八卦……外れることも多々あり……放っておいても、何も生じない可能性も……十二分にありましたが……」"

[[dialogue]]
speaker = "トリシャ"
# 「今回に関しては……幾度占っても、結果は色濃くなるばかり……世界が崩壊する占いなど、杞憂であるべきなのですが……残念ながら、今回は……」
line = "「今回に関しては……幾度占っても、結果は色濃くなるばかり……世界が崩壊する占いなど、杞憂であるべきなのですが……残念ながら、今回は……」"

[[dialogue]]
speaker = "フィオナ"
# 「事前に発見に至ったトリシャさんはお手柄ですね。素晴らしいです」
line = "「事前に発見に至ったトリシャさんはお手柄ですね。素晴らしいです」"

[[dialogue]]
speaker = "ウズメイア"
# 「さっすが、あたしの友達ー！」
line = "「さっすが、あたしの友達ー！」"

[[dialogue]]
speaker = "トリシャ"
# 「にへ、にへへ……みんな褒めてくれる……あっ……占いが指し示したのは、魔界の……この付近です……」
line = "「にへ、にへへ……みんな褒めてくれる……あっ……占いが指し示したのは、魔界の……この付近です……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ここにネボスケの守護天使がいるってわけね！　みんなで叩き起こしに行きましょ！」
line = "「ここにネボスケの守護天使がいるってわけね！　みんなで叩き起こしに行きましょ！」"

[[dialogue]]
speaker = "unk"
# そして決定した守護天使解放作戦メンバーは──
line = "そして決定した守護天使解放作戦メンバーは──"

[[dialogue]]
speaker = "ヘレナ"
# 「オペレーション・ペンタグラムの際と同様、今回も魔女の世界樹を使用し、魔界へ向かう」
line = "「オペレーション・ペンタグラムの際と同様、今回も魔女の世界樹を使用し、魔界へ向かう」"

[[dialogue]]
speaker = "アイリーン"
# 「なので、ネビュラからは案内役として私、魔女のアイリーンが参加しまーす！　こっちは使い魔のミネルバ！　ミーちゃんって呼んであげてね！」
line = "「なので、ネビュラからは案内役として私、魔女のアイリーンが参加しまーす！　こっちは使い魔のミネルバ！　ミーちゃんって呼んであげてね！」"

[[dialogue]]
speaker = "ミーちゃん"
# 「ホホー！」
line = "「ホホー！」"

[[dialogue]]
speaker = "マグダレナ"
# 「この《境界》のマグダレナも共に参りますね。守護天使の一柱として、責務を果たさせていただきます」
line = "「この《境界》のマグダレナも共に参りますね。守護天使の一柱として、責務を果たさせていただきます」"

[[dialogue]]
speaker = "マグダレナ"
# 「残る最後の一柱は、《天恵》のオオヒメ。『普遍』の摂理を司る守護天使です」
line = "「残る最後の一柱は、《天恵》のオオヒメ。『普遍』の摂理を司る守護天使です」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ヘレナちゃん、当然、私たちも出撃メンバーよね？」
line = "「ヘレナちゃん、当然、私たちも出撃メンバーよね？」"

[[dialogue]]
speaker = "ヘレナ"
# 「うむ。星騎士からはクロト、ヴィーナス、フィオナに加えて──」
line = "「うむ。星騎士からはクロト、ヴィーナス、フィオナに加えて──」"

[[dialogue]]
speaker = "ソフィア"
# 「私と舞亜とウズメですか。魔界での戦闘経験もありますし、問題ありません」
line = "「私と舞亜とウズメですか。魔界での戦闘経験もありますし、問題ありません」"

[[dialogue]]
speaker = "ウズメイア"
# 「この組み合わせ、オペレーション・ペンタグラムの時を思い出すよね～♪」
line = "「この組み合わせ、オペレーション・ペンタグラムの時を思い出すよね～♪」"

[[dialogue]]
speaker = "舞亜"
# 「うん。頼りにしてるよ、ソフィ、ウズメ。メダル取るくらい活躍しちゃお」
line = "「うん。頼りにしてるよ、ソフィ、ウズメ。メダル取るくらい活躍しちゃお」"

[[dialogue]]
speaker = "フィオナ"
# 「こうして見ると、天使、人間、魔族……新星と流星の星騎士、守護天使様にネビュラと、ありとあらゆる陣営から参加していますね」
line = "「こうして見ると、天使、人間、魔族……新星と流星の星騎士、守護天使様にネビュラと、ありとあらゆる陣営から参加していますね」"

[[dialogue]]
speaker = "ヘレナ"
# 「世界の崩壊は、全ての者にとって他人事ではないからな。だがこうして、皆がわだかまりなく手を取り合えるようになったのは、これまでの積み重ねの賜物だ」
line = "「世界の崩壊は、全ての者にとって他人事ではないからな。だがこうして、皆がわだかまりなく手を取り合えるようになったのは、これまでの積み重ねの賜物だ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「一番の功労者は、なんたってクロトよね。さ、号令をかけて！」
line = "「一番の功労者は、なんたってクロトよね。さ、号令をかけて！」"

[[dialogue]]
speaker = "unk"
# 守護天使オオヒメ解放作戦、スタートだ！
line = "守護天使オオヒメ解放作戦、スタートだ！"

[[dialogue]]
speaker = "みんな"
# 「おーっ！」
line = "「おーっ！」"

[[dialogue]]
speaker = "unk"
# 忙しい年の瀬に、唐突に訪れた世界の窮地。
line = "忙しい年の瀬に、唐突に訪れた世界の窮地。"

[[dialogue]]
speaker = "unk"
# 天使、人間、魔族──あらゆる種族が再び手を組み、魔界へと向かうのだった。
line = "天使、人間、魔族──あらゆる種族が再び手を組み、魔界へと向かうのだった。"
