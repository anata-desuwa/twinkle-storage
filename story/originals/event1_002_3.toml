[[dialogue]]
speaker = "unk"
# 合宿２日目。
line = "合宿２日目。"

[[dialogue]]
speaker = "unk"
# 俺達は海の家に宿泊して、リップルの作った朝食を口にしていた。
line = "俺達は海の家に宿泊して、リップルの作った朝食を口にしていた。"

[[dialogue]]
speaker = "フィオナ"
# 「うん、美味しいです。昨日頂いた時も思いましたが、リップルさんは料理がとてもお上手ですね」
line = "「うん、美味しいです。昨日頂いた時も思いましたが、リップルさんは料理がとてもお上手ですね」"

[[dialogue]]
speaker = "リップル"
# 「エヘヘ～♪　それほどでもないデスよ～」
line = "「エヘヘ～♪　それほどでもないデスよ～」"

[[dialogue]]
speaker = "マトイ"
# 「いやいや、この焼きそばとか、本当に絶品だよ！　これもお世話になった師匠さんに教わったの？」
line = "「いやいや、この焼きそばとか、本当に絶品だよ！　これもお世話になった師匠さんに教わったの？」"

[[dialogue]]
speaker = "リップル"
# 「ハイ♪　焼きそばは大好物で、シショーに作り方をナラいました！」
line = "「ハイ♪　焼きそばは大好物で、シショーに作り方をナラいました！」"

[[dialogue]]
speaker = "リップル"
# 「海の家で食べるものはフインキだけでも美味しく感じマスが、料理が美味しいと更にハッピーな気持ちになれマスから♪」
line = "「海の家で食べるものはフインキだけでも美味しく感じマスが、料理が美味しいと更にハッピーな気持ちになれマスから♪」"

[[dialogue]]
speaker = "リップル"
# 「ワタシが理想の海の家をツクるにあたって、特にこだわっているトコロです！」
line = "「ワタシが理想の海の家をツクるにあたって、特にこだわっているトコロです！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「このレストラン並みの料理を提供できるだけでも、海の家として十分に人気出そうな気がするけど、それだけじゃダメなの？」
line = "「このレストラン並みの料理を提供できるだけでも、海の家として十分に人気出そうな気がするけど、それだけじゃダメなの？」"

[[dialogue]]
speaker = "サーシャ"
# 「内装も綺麗だし、とてもスランプとは思えないほど、素敵な場所よね～？」
line = "「内装も綺麗だし、とてもスランプとは思えないほど、素敵な場所よね～？」"

[[dialogue]]
speaker = "リップル"
# 「こんなものじゃ、まだまだタリません！　ワタシが去年見たシショ―の海の家は……夏のビーチは、心に焼き付いて離れないほど、情熱的でハッピーなリゾートでした！」
line = "「こんなものじゃ、まだまだタリません！　ワタシが去年見たシショ―の海の家は……夏のビーチは、心に焼き付いて離れないほど、情熱的でハッピーなリゾートでした！」"

[[dialogue]]
speaker = "リップル"
# 「もちろん、アレを簡単に超えることは出来ないとワカっていますが……それでもワタシは、あのハッピーなキモチを皆にもツタえたいのです！」
line = "「もちろん、アレを簡単に超えることは出来ないとワカっていますが……それでもワタシは、あのハッピーなキモチを皆にもツタえたいのです！」"

[[dialogue]]
speaker = "アナ"
# 「リップルさんは、職人肌なのですね。夏の海に対する強いこだわりを感じます」
line = "「リップルさんは、職人肌なのですね。夏の海に対する強いこだわりを感じます」"

[[dialogue]]
speaker = "リップル"
# 「ハイ！　トコナツのリゾート結界は、ワタシのＢＩＧドリームですから！」
line = "「ハイ！　トコナツのリゾート結界は、ワタシのＢＩＧドリームですから！」"

[[dialogue]]
speaker = "リップル"
# 「夏の海はとてもハッピーな気持ちにさせてくれます。デスから、トコナツの世界を作り上げれば、いつでも皆ハッピーな気分でスゴせるです！」
line = "「夏の海はとてもハッピーな気持ちにさせてくれます。デスから、トコナツの世界を作り上げれば、いつでも皆ハッピーな気分でスゴせるです！」"

[[dialogue]]
speaker = "リップル"
# 「なのでワタシはまず、このリゾート結界を理想のカタチに仕上げて、たくさんの人に訪れてもらって、夏の海の良さを広げたいとカンガえてます！」
line = "「なのでワタシはまず、このリゾート結界を理想のカタチに仕上げて、たくさんの人に訪れてもらって、夏の海の良さを広げたいとカンガえてます！」"

[[dialogue]]
speaker = "マトイ"
# 「うんうん、いい夢だと思うよ」
line = "「うんうん、いい夢だと思うよ」"

[[dialogue]]
speaker = "リップル"
# 「そして、夏の海を好きになってもらったら、そのハッピーな気持ちを少しずつ分けてもらい、リゾート結界拡大のエネルギーにヘンカンします」
line = "「そして、夏の海を好きになってもらったら、そのハッピーな気持ちを少しずつ分けてもらい、リゾート結界拡大のエネルギーにヘンカンします」"

[[dialogue]]
speaker = "ヴィーナス"
# 「へぇ～、そんなことも出来るのね！」
line = "「へぇ～、そんなことも出来るのね！」"

[[dialogue]]
speaker = "リップル"
# 「これを繰り返して行くことで、ゆくゆくはリゾート結界で世界を覆い尽くしたいとカンガえますっ」
line = "「これを繰り返して行くことで、ゆくゆくはリゾート結界で世界を覆い尽くしたいとカンガえますっ」"

[[dialogue]]
speaker = "マトイ"
# 「そっか～、世界を……何て？」
line = "「そっか～、世界を……何て？」"

[[dialogue]]
speaker = "リップル"
# 「そうすれば、世界はトコナツに包まれ、真のエンドレスサマーが完成し、皆ハッピー♪　というワケです！」
line = "「そうすれば、世界はトコナツに包まれ、真のエンドレスサマーが完成し、皆ハッピー♪　というワケです！」"

[[dialogue]]
speaker = "マトイ"
# 「いやいやいやいやいや、待って！？　エンドレスサマーって響きが急に怖く聞こえるんだけど！？」
line = "「いやいやいやいやいや、待って！？　エンドレスサマーって響きが急に怖く聞こえるんだけど！？」"

[[dialogue]]
speaker = "リップル"
# 「皆ハッピーになれる、素敵なケイカクですよ？」
line = "「皆ハッピーになれる、素敵なケイカクですよ？」"

[[dialogue]]
speaker = "unk"
# 世界征服を狙うラスボス的発想！
line = "世界征服を狙うラスボス的発想！"

[[dialogue]]
speaker = "アナ"
# 「……フィオナ先輩。私の見立てでは、個人の星術でそんな容量の大結界は作成不可能だと思うのですが、実際どうなんでしょう？」
line = "「……フィオナ先輩。私の見立てでは、個人の星術でそんな容量の大結界は作成不可能だと思うのですが、実際どうなんでしょう？」"

[[dialogue]]
speaker = "フィオナ"
# 「わ、私も世界を覆うのは非現実的だと思いますが、さっき他の人から気持ちを分けてもらって、エネルギーに変換するとか何とかって……」
line = "「わ、私も世界を覆うのは非現実的だと思いますが、さっき他の人から気持ちを分けてもらって、エネルギーに変換するとか何とかって……」"

[[dialogue]]
speaker = "アナ"
# 「……聞こえなかったことにします」
line = "「……聞こえなかったことにします」"

[[dialogue]]
speaker = "マトイ"
# 「アナが遠くを見る目をしてるんだけど！？」
line = "「アナが遠くを見る目をしてるんだけど！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「リップル、あなた面白いこと考えるわね！　そういう野望、私は好きよ！」
line = "「リップル、あなた面白いこと考えるわね！　そういう野望、私は好きよ！」"

[[dialogue]]
speaker = "リップル"
# 「アリガトございます♪　必ず叶えてミセます！」
line = "「アリガトございます♪　必ず叶えてミセます！」"

[[dialogue]]
speaker = "マトイ"
# 「ヴィーナスが肯定すると、本当に実現しちゃいそうだから止めて！」
line = "「ヴィーナスが肯定すると、本当に実現しちゃいそうだから止めて！」"

[[dialogue]]
speaker = "サーシャ"
# 「まあまあ。リップルちゃんは良い子だし、きっと大丈夫よ～」
line = "「まあまあ。リップルちゃんは良い子だし、きっと大丈夫よ～」"

[[dialogue]]
speaker = "リップル"
# 「アハハ！　トコナツの世界になれば、自動的に皆ハッピーになるからダイジョウブですよ～♪」
line = "「アハハ！　トコナツの世界になれば、自動的に皆ハッピーになるからダイジョウブですよ～♪」"

[[dialogue]]
speaker = "アナ"
# 「一応真面目な解説を入れておくと、三界の摂理は守護天使様に守られているので、基本不可能です。……リップルさんの力が、守護天使様を上回らなければ」
line = "「一応真面目な解説を入れておくと、三界の摂理は守護天使様に守られているので、基本不可能です。……リップルさんの力が、守護天使様を上回らなければ」"

[[dialogue]]
speaker = "unk"
# （小声の補足が怖いなぁ……）
line = "（小声の補足が怖いなぁ……）"

[[dialogue]]
speaker = "リップル"
# 「とりあえず、こうして料理を食べてくれる人達が来てくれたワケですし、今日はこの後、理想のメニューをカンガえます！」
line = "「とりあえず、こうして料理を食べてくれる人達が来てくれたワケですし、今日はこの後、理想のメニューをカンガえます！」"

[[dialogue]]
speaker = "リップル"
# 「皆さんはその間ドウゾ、リゾート結界の海を楽しんで、感想を聞かせてクダさい！」
line = "「皆さんはその間ドウゾ、リゾート結界の海を楽しんで、感想を聞かせてクダさい！」"

[[dialogue]]
speaker = "unk"
# リップルが海の家でメニューを考えている間、俺達は海で水着フォームの訓練を行うことになった――
line = "リップルが海の家でメニューを考えている間、俺達は海で水着フォームの訓練を行うことになった――"

[[dialogue]]
speaker = "アナ"
# 「水鉄砲で狙い撃ちです。バン」
line = "「水鉄砲で狙い撃ちです。バン」"

[[dialogue]]
speaker = "ヴィーナス"
# 「きゃっ♪　アナ、よくもやったわね～、フルパワーでお返しよ！」
line = "「きゃっ♪　アナ、よくもやったわね～、フルパワーでお返しよ！」"

[[dialogue]]
speaker = "サーシャ"
# 「あんっ<emoji=heart04>　ヴィーナスちゃん、激し過ぎよ～。水圧で水着がズレちゃうわ～」
line = "「あんっ<emoji=heart04>　ヴィーナスちゃん、激し過ぎよ～。水圧で水着がズレちゃうわ～」"

[[dialogue]]
speaker = "マトイ"
# 「ちょっ！？　会長が見てますから！　すぐに隠して下さいサーシャさん！」
line = "「ちょっ！？　会長が見てますから！　すぐに隠して下さいサーシャさん！」"

[[dialogue]]
speaker = "アナ"
# 「ノープロブレム。水鉄砲で会長の視界を塞ぎます」
line = "「ノープロブレム。水鉄砲で会長の視界を塞ぎます」"

[[dialogue]]
speaker = "unk"
# うわっ、アナ！　目を狙い撃つのはやめて！
line = "うわっ、アナ！　目を狙い撃つのはやめて！"

[[dialogue]]
speaker = "サーシャ"
# 「うふふっ、なんちゃって～♪　嘘よ～♪」
line = "「うふふっ、なんちゃって～♪　嘘よ～♪」"

[[dialogue]]
speaker = "マトイ"
# 「からかいましたね！？　もう、許しませんよ！　それ！」
line = "「からかいましたね！？　もう、許しませんよ！　それ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ほら、フィオナも遠慮してないで！　全力で水をかけてきなさい！　フィオナとは１度本気で戦ってみたかったし！」
line = "「ほら、フィオナも遠慮してないで！　全力で水をかけてきなさい！　フィオナとは１度本気で戦ってみたかったし！」"

[[dialogue]]
speaker = "フィオナ"
# 「あ、はい！　えっと、こうでしょうか……えいっ！」
line = "「あ、はい！　えっと、こうでしょうか……えいっ！」"

[[dialogue]]
speaker = "マトイ"
# 「きゃっ！？　凄いパワー！　さすが流星の星徒会長……！」
line = "「きゃっ！？　凄いパワー！　さすが流星の星徒会長……！」"

[[dialogue]]
speaker = "リップル"
# 「フィオナ、イイ波で～す♪　サーフィンの腕がナリます！　イヤッホ～♪」
line = "「フィオナ、イイ波で～す♪　サーフィンの腕がナリます！　イヤッホ～♪」"

[[dialogue]]
speaker = "フィオナ"
# 「ありがとうございます。……って、リップルさん！？」
line = "「ありがとうございます。……って、リップルさん！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「リップル、あなたサーフィンも上手いのね！」
line = "「リップル、あなたサーフィンも上手いのね！」"

[[dialogue]]
speaker = "リップル"
# 「ハイ♪　これもシショ―からオソわりました。ワタシが一番海で好きなアソビです♪」
line = "「ハイ♪　これもシショ―からオソわりました。ワタシが一番海で好きなアソビです♪」"

[[dialogue]]
speaker = "マトイ"
# 「それはいいんだけど……リップル、メニュー作りするとか言ってなかった？」
line = "「それはいいんだけど……リップル、メニュー作りするとか言ってなかった？」"

[[dialogue]]
speaker = "リップル"
# 「ハッ……！　ソウでした！」
line = "「ハッ……！　ソウでした！」"

[[dialogue]]
speaker = "リップル"
# 「目覚めてから同年代の友達と遊んだことがナカッタので、見ていたらつい……」
line = "「目覚めてから同年代の友達と遊んだことがナカッタので、見ていたらつい……」"

[[dialogue]]
speaker = "サーシャ"
# 「あらあら♪　訓練が楽しそうで、我慢出来なくなっちゃったのね～」
line = "「あらあら♪　訓練が楽しそうで、我慢出来なくなっちゃったのね～」"

[[dialogue]]
speaker = "unk"
# なら、今日はリップルも一緒に訓練しよう！
line = "なら、今日はリップルも一緒に訓練しよう！"

[[dialogue]]
speaker = "リップル"
# 「カイチョー、いいんですか？」
line = "「カイチョー、いいんですか？」"

[[dialogue]]
speaker = "リップル"
# 「――ハイ、確かに、これまで１人で居て、スランプで行き詰まってまシタけど……」
line = "「――ハイ、確かに、これまで１人で居て、スランプで行き詰まってまシタけど……」"

[[dialogue]]
speaker = "unk"
# そういう時は、気分転換も必要だよ
line = "そういう時は、気分転換も必要だよ"

[[dialogue]]
speaker = "リップル"
# 「……！　カイチョー、アリガトです！」
line = "「……！　カイチョー、アリガトです！」"

[[dialogue]]
speaker = "リップル"
# 「アナタはシショ―みたいに優しい人！　ダイスキです♪」
line = "「アナタはシショ―みたいに優しい人！　ダイスキです♪」"

[[dialogue]]
speaker = "リップル"
# 「ちゅっ<emoji=heart04>」
line = "「ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
# 「ちょっ！？　会長のほ、頬っぺたにききき、キス！？」
line = "「ちょっ！？　会長のほ、頬っぺたにききき、キス！？」"

[[dialogue]]
speaker = "サーシャ"
# 「あら～♪」
line = "「あら～♪」"

[[dialogue]]
speaker = "アナ"
# 「わお。大胆です」
line = "「わお。大胆です」"

[[dialogue]]
speaker = "リップル"
# 「エヘヘ♪　シショーがオクサンにしていた、最大の親愛を示すアイサツです♪」
line = "「エヘヘ♪　シショーがオクサンにしていた、最大の親愛を示すアイサツです♪」"

[[dialogue]]
speaker = "リップル"
# 「ハッピーな気持ちが溢れて、初めてやってみましたが、ちょっと照れマスね……」
line = "「ハッピーな気持ちが溢れて、初めてやってみましたが、ちょっと照れマスね……」"

[[dialogue]]
speaker = "unk"
# 俺もちょっと、ビックリした……
line = "俺もちょっと、ビックリした……"

[[dialogue]]
speaker = "ヴィーナス"
# 「よし、それじゃあリップルも訓練参加ね！　手加減しないわよ～。えいっ！」
line = "「よし、それじゃあリップルも訓練参加ね！　手加減しないわよ～。えいっ！」"

[[dialogue]]
speaker = "リップル"
# 「おっと、簡単にはくらいマセンよ！　結界バリアー発動です！」
line = "「おっと、簡単にはくらいマセンよ！　結界バリアー発動です！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「なっ！？　透明な壁に水を弾かれたわ！？」
line = "「なっ！？　透明な壁に水を弾かれたわ！？」"

[[dialogue]]
speaker = "フィオナ"
# 「結界はそんな使い方も出来るんですね……！」
line = "「結界はそんな使い方も出来るんですね……！」"

[[dialogue]]
speaker = "リップル"
# 「海はワタシの得意フィールドです。簡単にはマケません！」
line = "「海はワタシの得意フィールドです。簡単にはマケません！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「面白いわ！　フィオナ、手を貸しなさい！　協力して、あの結界バリアーを破るのよ！」
line = "「面白いわ！　フィオナ、手を貸しなさい！　協力して、あの結界バリアーを破るのよ！」"

[[dialogue]]
speaker = "フィオナ"
# 「は、はい、分かりました。全力でやってみます！」
line = "「は、はい、分かりました。全力でやってみます！」"

[[dialogue]]
speaker = "リップル"
# 「受けてタチます！　カモンです！」
line = "「受けてタチます！　カモンです！」"

[[dialogue]]
speaker = "マトイ"
# 「うわっ！？　３人とも、私達巻き込んでるから！　パワー出し過ぎ……きゃ～～～っ！？」
line = "「うわっ！？　３人とも、私達巻き込んでるから！　パワー出し過ぎ……きゃ～～～っ！？」"

[[dialogue]]
speaker = "アナ"
# 「あっ。マトイ先輩、水着取れてます」
line = "「あっ。マトイ先輩、水着取れてます」"

[[dialogue]]
speaker = "サーシャ"
# 「あら～♪」
line = "「あら～♪」"

[[dialogue]]
speaker = "マトイ"
# 「いやぁぁぁっ！？　会長、こっち見ないでぇぇぇ～～～っ！」
line = "「いやぁぁぁっ！？　会長、こっち見ないでぇぇぇ～～～っ！」"

[[dialogue]]
speaker = "unk"
# いや、見てな――うわっぷ！？
line = "いや、見てな――うわっぷ！？"

[[dialogue]]
speaker = "リップル"
# 「アハハハ！　カイチョーも波にナガされてます！」
line = "「アハハハ！　カイチョーも波にナガされてます！」"

[[dialogue]]
speaker = "リップル"
# 「こんなにハッピーなのは、ヒサシぶりです♪」
line = "「こんなにハッピーなのは、ヒサシぶりです♪」"

[[dialogue]]
