[[dialogue]]
speaker = "unk"
# 第１話,もう１度契約してみるのじゃ！,P
line = "第１話,もう１度契約してみるのじゃ！,P"

[[dialogue]]
speaker = "unk"
# 『解放』のロストアイテムにより、封印されていた能力の一部を取り戻したプリムラ。
line = "『解放』のロストアイテムにより、封印されていた能力の一部を取り戻したプリムラ。"

[[dialogue]]
speaker = "unk"
# プリムラの強大な力は、管理者である俺かサチの許可がなくては起動できない。そのため、戦闘訓練も必然的に一緒に行う必要があって……
line = "プリムラの強大な力は、管理者である俺かサチの許可がなくては起動できない。そのため、戦闘訓練も必然的に一緒に行う必要があって……"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「モンスターよ、これでジ・エンドじゃ！　プリズム・ブラスター！！」
line = "「モンスターよ、これでジ・エンドじゃ！　プリズム・ブラスター！！」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「フハハハハ！　どうじゃ眷族よ、我の新しい戦闘形態は！」
line = "「フハハハハ！　どうじゃ眷族よ、我の新しい戦闘形態は！」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「先日のロストアイテム騒動の時にも披露してやったが、凄まじい火力じゃろう！」
line = "「先日のロストアイテム騒動の時にも披露してやったが、凄まじい火力じゃろう！」"

[[dialogue]]
speaker = "unk"
# 本当にすごいパワーだ……！
line = "本当にすごいパワーだ……！"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「当然じゃ。今でこそあの忌々しい『星の鎖』によって封じられておるが、我はそもそもこの世界を滅ぼすために設計された終末兵器なのじゃからな♪」
line = "「当然じゃ。今でこそあの忌々しい『星の鎖』によって封じられておるが、我はそもそもこの世界を滅ぼすために設計された終末兵器なのじゃからな♪」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「ククク、老婆心ながら忠告してやろう。今のうちにしっかり我のご機嫌を取っておくのが賢明じゃぞ？」
line = "「ククク、老婆心ながら忠告してやろう。今のうちにしっかり我のご機嫌を取っておくのが賢明じゃぞ？」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「我は日々の訓練と実戦で、着実にレベルアップしておるのじゃ！　それに加えて、封印されておる全ての力を取り戻してみろ……」
line = "「我は日々の訓練と実戦で、着実にレベルアップしておるのじゃ！　それに加えて、封印されておる全ての力を取り戻してみろ……」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「最終的には、学園の星騎士が束になっても敵わん強さになることは必定！　世界は我が力の前にひれ伏すことになるのじゃ！」
line = "「最終的には、学園の星騎士が束になっても敵わん強さになることは必定！　世界は我が力の前にひれ伏すことになるのじゃ！」"

[[dialogue]]
speaker = "unk"
# ご褒美をあげなきゃね
line = "ご褒美をあげなきゃね"

[[dialogue]]
speaker = "unk"
# 訓練の成果もばっちりだし
line = "訓練の成果もばっちりだし"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「おおっ！　桜十路のチョコレートか！　フヘヘ、我の好物なのじゃっ！　もぐもぐもぐ……！」
line = "「おおっ！　桜十路のチョコレートか！　フヘヘ、我の好物なのじゃっ！　もぐもぐもぐ……！」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「──って！　我はペットではない！　餌付けのようにチョコを渡すのはやめろと言っておるじゃろうが！　もぐもぐもぐ……！」
line = "「──って！　我はペットではない！　餌付けのようにチョコを渡すのはやめろと言っておるじゃろうが！　もぐもぐもぐ……！」"

[[dialogue]]
speaker = "unk"
# （それでも食べるんだ……）
line = "（それでも食べるんだ……）"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「──ふぅっ。眷族はいつもこうじゃ。我と相対した時に、こう……何と言えばよいのじゃ？」
line = "「──ふぅっ。眷族はいつもこうじゃ。我と相対した時に、こう……何と言えばよいのじゃ？」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「子犬を愛でる飼い主のような塩梅で接してきよる。貴様、我が普通の<ruby=おなご>女子</ruby>と変わらんと思ってはおらんか？」
line = "「子犬を愛でる飼い主のような塩梅で接してきよる。貴様、我が普通の<ruby>女子<rt>おなご</rt></ruby>と変わらんと思ってはおらんか？」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「我は賢者の石より製造されし『メルクリウス』！　リクリエを人為的に引き起こすために作られた、悪の終末兵器なのじゃぞ！」
line = "「我は賢者の石より製造されし『メルクリウス』！　リクリエを人為的に引き起こすために作られた、悪の終末兵器なのじゃぞ！」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「周りのエネルギーを吸い取り自らの力と変え、拳による接近戦から射撃までこなす……そう、一片の隙もない怪物なのじゃっ！」
line = "「周りのエネルギーを吸い取り自らの力と変え、拳による接近戦から射撃までこなす……そう、一片の隙もない怪物なのじゃっ！」"

[[dialogue]]
speaker = "unk"
# チョコのおかわり、いる？
line = "チョコのおかわり、いる？"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「いるのじゃ！　もぐもぐもぐっ……！」
line = "「いるのじゃ！　もぐもぐもぐっ……！」"

[[dialogue]]
speaker = "unk"
# 代わりにほっぺ触っていい？
line = "代わりにほっぺ触っていい？"

[[dialogue]]
speaker = "unk"
# 限定販売のチョコも用意してあるよ
line = "限定販売のチョコも用意してあるよ"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「フハハ、しょうがないのう～♪　限定の捧げものとあらば、我のぷにもちほっぺを触ることも許可してやらんでも……」
line = "「フハハ、しょうがないのう～♪　限定の捧げものとあらば、我のぷにもちほっぺを触ることも許可してやらんでも……」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「──って！？　なぜこうなるのじゃあ～～～っ！？」
line = "「──って！？　なぜこうなるのじゃあ～～～っ！？」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「おのれ～っ。せっかくデストロイフォームを取り戻し、我の威厳も復活すると思っていたのに……計算と違うのじゃ！」
line = "「おのれ～っ。せっかくデストロイフォームを取り戻し、我の威厳も復活すると思っていたのに……計算と違うのじゃ！」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「やはりこのちんちくりんな姿がいかんのかのう……サチの封印が忌々しいのじゃ」
line = "「やはりこのちんちくりんな姿がいかんのかのう……サチの封印が忌々しいのじゃ」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「何度も言っておるが、我は本当はナイスバディーな大人のレディなのじゃぞ！」
line = "「何度も言っておるが、我は本当はナイスバディーな大人のレディなのじゃぞ！」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「それはもうすごいダイナマイトな感じなのじゃ！　守護天使の乳のでかい女がおるじゃろう、あやつくらい凄いのじゃからなっ！」
line = "「それはもうすごいダイナマイトな感じなのじゃ！　守護天使の乳のでかい女がおるじゃろう、あやつくらい凄いのじゃからなっ！」"

[[dialogue]]
speaker = "unk"
# なるほど～
line = "なるほど～"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「……くそ～、疑いの眼差しを向けおって！」
line = "「……くそ～、疑いの眼差しを向けおって！」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「拳から砲撃へ、武器は変えられるようになったのに。見た目だけは一時的に変えても、定着しないのじゃ……くやしいったらないのじゃ」
line = "「拳から砲撃へ、武器は変えられるようになったのに。見た目だけは一時的に変えても、定着しないのじゃ……くやしいったらないのじゃ」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「いや、でも待てよ？　変化があったことは確かじゃし……ということは……」
line = "「いや、でも待てよ？　変化があったことは確かじゃし……ということは……」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「おい、眷族よ。ちょいと近う寄るのじゃ」
line = "「おい、眷族よ。ちょいと近う寄るのじゃ」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「うむ、それでよい！　では──んちゅっ<emoji=heart04>」
line = "「うむ、それでよい！　では──んちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# い、今キスしたのは……！！
line = "い、今キスしたのは……！！"

[[dialogue]]
speaker = "unk"
# ──っ！？
line = "──っ！？"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「フハハハ！　その通り、以前にもした『契約の儀式』なのじゃ！　我の体の一部を取り込ませ、眷族を強制的に我の支配下に置いてくれる！」
line = "「フハハハ！　その通り、以前にもした『契約の儀式』なのじゃ！　我の体の一部を取り込ませ、眷族を強制的に我の支配下に置いてくれる！」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「前回は貴様の素質に敗北したが、力を一部取り戻した今の我ならば……今度こそ眷族を我のモノにできるかもしれん！」
line = "「前回は貴様の素質に敗北したが、力を一部取り戻した今の我ならば……今度こそ眷族を我のモノにできるかもしれん！」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「ククク……眷族の体に、我が馴染んでゆくのを感じるぞ～……？」
line = "「ククク……眷族の体に、我が馴染んでゆくのを感じるぞ～……？」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「さぁ──手始めに、その場でピョンと飛び跳ねてワンと言ってみるのじゃ！」
line = "「さぁ──手始めに、その場でピョンと飛び跳ねてワンと言ってみるのじゃ！」"

[[dialogue]]
speaker = "unk"
# 飛び跳ねてワンって言って
line = "飛び跳ねてワンって言って"

[[dialogue]]
speaker = "unk"
# ──プリムラ
line = "──プリムラ"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「わんっ！　わんわんっ！」
line = "「わんっ！　わんわんっ！」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「何でじゃあ～～～っ！？　やっぱりうまくいかないのじゃあっ！？」
line = "「何でじゃあ～～～っ！？　やっぱりうまくいかないのじゃあっ！？」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「くそ～っ。また失敗したということか……残念無念なのじゃ」
line = "「くそ～っ。また失敗したということか……残念無念なのじゃ」"

[[dialogue]]
speaker = "サチ"
# 「何が残念なの？」
line = "「何が残念なの？」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「それはもちろん、契約の儀式が成功すれば眷族は我が手中。サチの幸運を封じる特異点を手に入れたことになるのじゃ！」
line = "「それはもちろん、契約の儀式が成功すれば眷族は我が手中。サチの幸運を封じる特異点を手に入れたことになるのじゃ！」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「そうなればいずれ来るサチとの最終決戦の際には、眷属が切り札となりあやつをギャフンと言わせることも可能となるじゃろう！」
line = "「そうなればいずれ来るサチとの最終決戦の際には、眷属が切り札となりあやつをギャフンと言わせることも可能となるじゃろう！」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「コテンパンにした後は、１ヶ月くらいおやつ抜きの刑にしてやるのじゃ！　この前だって罰掃除をさせおって……我の恨みは深いのじゃっ！」
line = "「コテンパンにした後は、１ヶ月くらいおやつ抜きの刑にしてやるのじゃ！　この前だって罰掃除をさせおって……我の恨みは深いのじゃっ！」"

[[dialogue]]
speaker = "サチ"
# 「でもあれは、プリムラが生徒会のお仕事をサボったのが悪いんでしょ？」
line = "「でもあれは、プリムラが生徒会のお仕事をサボったのが悪いんでしょ？」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「何を言っておる！　我は悪の終末兵器じゃぞ！　仕事をサボらずして何が悪か！」
line = "「何を言っておる！　我は悪の終末兵器じゃぞ！　仕事をサボらずして何が悪か！」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「──って、サチぃ！？　いいいっ、いつからそこにいたのじゃあっ！？」
line = "「──って、サチぃ！？　いいいっ、いつからそこにいたのじゃあっ！？」"

[[dialogue]]
speaker = "サチ"
# 「拘束ーーーーーっ！！」
line = "「拘束ーーーーーっ！！」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「ぎにゃーーー！　なのじゃあぁ！」
line = "「ぎにゃーーー！　なのじゃあぁ！」"

[[dialogue]]
speaker = "サチ"
# 「まったくもう！　最近は少し丸くなったと思ってたのに……！　本当に油断も隙も無いんだから！」
line = "「まったくもう！　最近は少し丸くなったと思ってたのに……！　本当に油断も隙も無いんだから！」"

[[dialogue]]
speaker = "unk"
# 附属校生徒会長のサチは、プリムラが悪いことをしないよう監視するお役目を担っている。
line = "附属校生徒会長のサチは、プリムラが悪いことをしないよう監視するお役目を担っている。"

[[dialogue]]
speaker = "unk"
# 今、プリムラの全身をぐるぐる巻きにしている鎖も、サチの所有するロストアイテムの力だ。
line = "今、プリムラの全身をぐるぐる巻きにしている鎖も、サチの所有するロストアイテムの力だ。"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「むぎゅぅうう……簀巻きは嫌なのじゃあ～……」
line = "「むぎゅぅうう……簀巻きは嫌なのじゃあ～……」"

[[dialogue]]
speaker = "unk"
# 相変わらず何度懲らしめられても、悪いことをしようとしてしまうプリムラなのだった──
line = "相変わらず何度懲らしめられても、悪いことをしようとしてしまうプリムラなのだった──"
