[[dialogue]]
speaker = "unk"
# 第１話,図書委員モネ,P
line = "第１話,図書委員モネ,P"

[[dialogue]]
speaker = "モネ"
# 「はぁ～、いつも本がたくさん……新星学園に来て良かったぁ……本に囲まれて幸せ……」
line = "「はぁ～、いつも本がたくさん……新星学園に来て良かったぁ……本に囲まれて幸せ……」"

[[dialogue]]
speaker = "unk"
# ちょっと聞きたいことがあるんだけど
line = "ちょっと聞きたいことがあるんだけど"

[[dialogue]]
speaker = "モネ"
# 「はっ、会長！？　今の聞こえてましたか……？　いえ、何でもないです、何でも……」
line = "「はっ、会長！？　今の聞こえてましたか……？　いえ、何でもないです、何でも……」"

[[dialogue]]
speaker = "モネ"
# 「私、図書委員の紙屋敷モネです。あ、でも私なんて大したことないので、覚えておかなくていいですよ……あはは」
line = "「私、図書委員の紙屋敷モネです。あ、でも私なんて大したことないので、覚えておかなくていいですよ……あはは」"

[[dialogue]]
speaker = "モネ"
# 「会長は図書館に何かご用事で？　……ああ、なるほど、モンスターの出現に関する資料ですね。さすが星徒会長、勉強熱心なんですね」
line = "「会長は図書館に何かご用事で？　……ああ、なるほど、モンスターの出現に関する資料ですね。さすが星徒会長、勉強熱心なんですね」"

[[dialogue]]
speaker = "モネ"
# 「なら私が案内しますよ。ちょうどそちらに本を持っていくところだったので」
line = "「なら私が案内しますよ。ちょうどそちらに本を持っていくところだったので」"

[[dialogue]]
speaker = "モネ"
# 「では行きましょう。……よっこいしょ」
line = "「では行きましょう。……よっこいしょ」"

[[dialogue]]
speaker = "unk"
# 重そうだけど大丈夫？
line = "重そうだけど大丈夫？"

[[dialogue]]
speaker = "モネ"
# 「はい……これくらい平気です……本は大好きなので……」
line = "「はい……これくらい平気です……本は大好きなので……」"

[[dialogue]]
speaker = "モネ"
# 「んっしょ……はぁはぁ……んっ……はぁ……」
line = "「んっしょ……はぁはぁ……んっ……はぁ……」"

[[dialogue]]
speaker = "モネ"
# 「きゃっ！？」
line = "「きゃっ！？」"

[[dialogue]]
speaker = "モネ"
# 「あ……受け止めていただいてすみません。会長がお優しい方で良かったです。ありがとうございます」
line = "「あ……受け止めていただいてすみません。会長がお優しい方で良かったです。ありがとうございます」"

[[dialogue]]
speaker = "unk"
# 手伝おうか？
line = "手伝おうか？"

[[dialogue]]
speaker = "モネ"
# 「いえ、これは図書委員の仕事ですから」
line = "「いえ、これは図書委員の仕事ですから」"

[[dialogue]]
speaker = "モネ"
# 「あ……だけど星徒会長に手伝わせろと言われたら、権限的に断れませんね……」
line = "「あ……だけど星徒会長に手伝わせろと言われたら、権限的に断れませんね……」"

[[dialogue]]
speaker = "モネ"
# 「えへへ、ありがとうございます。ではこちらを持っていただけると……おお、さすが男の人ですね、力があります」
line = "「えへへ、ありがとうございます。ではこちらを持っていただけると……おお、さすが男の人ですね、力があります」"

[[dialogue]]
speaker = "モネ"
# 「……ふむふむ、バイトで重いものも持っていたと。ふふっ、会長って経験豊富なんですね。頼りになります」
line = "「……ふむふむ、バイトで重いものも持っていたと。ふふっ、会長って経験豊富なんですね。頼りになります」"

[[dialogue]]
speaker = "モネ"
# 「じゃあついてきてください。資料の場所はここをまっすぐ行って、右に曲がって、階段を下りて……」
line = "「じゃあついてきてください。資料の場所はここをまっすぐ行って、右に曲がって、階段を下りて……」"

[[dialogue]]
speaker = "モネ"
# 「はい、到着です。こちらがお探しの資料です」
line = "「はい、到着です。こちらがお探しの資料です」"

[[dialogue]]
speaker = "モネ"
# 「いえいえそんな、お礼なんて恐れ多いです。こちらこそ本を持っていただいてありがとうございました」
line = "「いえいえそんな、お礼なんて恐れ多いです。こちらこそ本を持っていただいてありがとうございました」"

[[dialogue]]
speaker = "モネ"
# 「じゃあ私はこれで……そうだ。これ、良かったらどうですか？　図書館の蔵書に追加してほしいアンケートです」
line = "「じゃあ私はこれで……そうだ。これ、良かったらどうですか？　図書館の蔵書に追加してほしいアンケートです」"

[[dialogue]]
speaker = "モネ"
# 「必ずしもアンケート通りになるとは限りませんが、欲しい本がタダで買えるようなものなので、気になる本があれば書いて損はないと思いますよ」
line = "「必ずしもアンケート通りになるとは限りませんが、欲しい本がタダで買えるようなものなので、気になる本があれば書いて損はないと思いますよ」"

[[dialogue]]
speaker = "モネ"
# 「もし本で困ったことがあったら、司書の方でも私たち図書委員でも気軽に声をかけてくださいね」
line = "「もし本で困ったことがあったら、司書の方でも私たち図書委員でも気軽に声をかけてくださいね」"

[[dialogue]]
speaker = "モネ"
# 「例えば何か本が読みたいけど、何を読んでいいかわからないとか。そういう時はおすすめの本を紹介します」
line = "「例えば何か本が読みたいけど、何を読んでいいかわからないとか。そういう時はおすすめの本を紹介します」"

[[dialogue]]
speaker = "unk"
# モネのおすすめは？
line = "モネのおすすめは？"

[[dialogue]]
speaker = "モネ"
# 「私のおすすめですかっ？　そうですね～……会長は恋愛小説はお好きですか？　それともミステリー？　ＳＦ？　もちろんどれでもイチ押しがありますよ！」
line = "「私のおすすめですかっ？　そうですね～……会長は恋愛小説はお好きですか？　それともミステリー？　ＳＦ？　もちろんどれでもイチ押しがありますよ！」"

[[dialogue]]
speaker = "モネ"
# 「恋愛小説ならまずこれ、『蝉時雨ラプソディ』！　少年少女が出会い、心を通わせる短いひと夏を描いた作品で、爽やかで甘酸っぱい、そして切なさ溢れる１作です」
line = "「恋愛小説ならまずこれ、『蝉時雨ラプソディ』！　少年少女が出会い、心を通わせる短いひと夏を描いた作品で、爽やかで甘酸っぱい、そして切なさ溢れる１作です」"

[[dialogue]]
speaker = "モネ"
# 「情景描写が巧みで、文字を追っているのに夏の花火が脳裏に浮かび上がってくるんです。そして何より心理描写が素晴らしくっ、思い出すだけで涙が……」
line = "「情景描写が巧みで、文字を追っているのに夏の花火が脳裏に浮かび上がってくるんです。そして何より心理描写が素晴らしくっ、思い出すだけで涙が……」"

[[dialogue]]
speaker = "モネ"
# 「あ、そうそう。恋愛ならこちらもいかがですか？　『ミュトスの情愛』という本なのですが、テーマはズバリ歪んだ愛情」
line = "「あ、そうそう。恋愛ならこちらもいかがですか？　『ミュトスの情愛』という本なのですが、テーマはズバリ歪んだ愛情」"

[[dialogue]]
speaker = "モネ"
# 「ギリシャ演劇を紐解きながら様々な形の愛が交錯する、とても難解で読み応えのある作品で――」
line = "「ギリシャ演劇を紐解きながら様々な形の愛が交錯する、とても難解で読み応えのある作品で――」"

[[dialogue]]
speaker = "モネ"
# 「！　すみません……語りすぎてしまいました。私いつもこうで、本の素晴らしさを語ろうとすると引かれてしまうんです……」
line = "「！　すみません……語りすぎてしまいました。私いつもこうで、本の素晴らしさを語ろうとすると引かれてしまうんです……」"

[[dialogue]]
speaker = "モネ"
# 「でも、私のことは嫌いになっても本のことは嫌いにならないでください……」
line = "「でも、私のことは嫌いになっても本のことは嫌いにならないでください……」"

[[dialogue]]
speaker = "unk"
# 本が大好きなんだ
line = "本が大好きなんだ"

[[dialogue]]
speaker = "モネ"
# 「は、はいっ。生まれてからずっと本に囲まれて生きてきたようなもので、本がないと生きていけませんっ」
line = "「は、はいっ。生まれてからずっと本に囲まれて生きてきたようなもので、本がないと生きていけませんっ」"

[[dialogue]]
speaker = "モネ"
# 「本は読むのも眺めるのもスリスリするものハスハスするのも好きで……ハッ、いえ、本は読むものですよ。ええ」
line = "「本は読むのも眺めるのもスリスリするものハスハスするのも好きで……ハッ、いえ、本は読むものですよ。ええ」"

[[dialogue]]
speaker = "モネ"
# 「実は、本の感想を誰かと語り合いたいと思っているんですけど……私がこんななのであんまり……」
line = "「実は、本の感想を誰かと語り合いたいと思っているんですけど……私がこんななのであんまり……」"

[[dialogue]]
speaker = "unk"
# じゃあさっきのおすすめ借りるよ
line = "じゃあさっきのおすすめ借りるよ"

[[dialogue]]
speaker = "モネ"
# 「！　それって……その、私と……？」
line = "「！　それって……その、私と……？」"

[[dialogue]]
speaker = "モネ"
# 「じゃ、じゃあカウンターで待っていますね。図書館のご利用、ありがとうございますっ」
line = "「じゃ、じゃあカウンターで待っていますね。図書館のご利用、ありがとうございますっ」"
