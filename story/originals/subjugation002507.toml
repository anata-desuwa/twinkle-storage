[[dialogue]]
speaker = "unk"
# シャドウマリオンとの戦いの舞台となる仮想空間――渋谷。
line = "シャドウマリオンとの戦いの舞台となる仮想空間――渋谷。"

[[dialogue]]
speaker = "トワ先生（覚醒）"
# 「よ～し。先生、今日は頑張っちゃうぞ～！」
line = "「よ～し。先生、今日は頑張っちゃうぞ～！」"

[[dialogue]]
speaker = "トワ先生（覚醒）"
# 「というわけで、協力よろしくね、リーリアちゃん♪」
line = "「というわけで、協力よろしくね、リーリアちゃん♪」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「協力するのはいいんですけど～……マリオンさんのシャドウ、絶対にマジカル強いんで、果たして勝てるかどうか……」
line = "「協力するのはいいんですけど～……マリオンさんのシャドウ、絶対にマジカル強いんで、果たして勝てるかどうか……」"

[[dialogue]]
speaker = "トワ先生（覚醒）"
# 「大丈夫！　マリオンに直接聞いたけど、リーリアちゃん、魔女としてもすごく強いんでしょ？」
line = "「大丈夫！　マリオンに直接聞いたけど、リーリアちゃん、魔女としてもすごく強いんでしょ？」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「まあ、これでも一応、二つ名持ちですし？　学園に潜入するエージェントとして戦闘力込みでセドナ長官から指名を受けたんで、強い方だとは思いますけど……」
line = "「まあ、これでも一応、二つ名持ちですし？　学園に潜入するエージェントとして戦闘力込みでセドナ長官から指名を受けたんで、強い方だとは思いますけど……」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「でも、強いと言うならマリオンさんの方が別格ですよ。クラウディア様に戦い方の指導をしたのも、あの人ですし……」
line = "「でも、強いと言うならマリオンさんの方が別格ですよ。クラウディア様に戦い方の指導をしたのも、あの人ですし……」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「今のクラウディア様が本気で戦ったとしても、マリオンさんが負けるビジョンが、私には思い浮かびません」
line = "「今のクラウディア様が本気で戦ったとしても、マリオンさんが負けるビジョンが、私には思い浮かびません」"

[[dialogue]]
speaker = "トワ先生（覚醒）"
# 「うん。マリオンの強さは、流星学園で同期だった私もよく知ってる」
line = "「うん。マリオンの強さは、流星学園で同期だった私もよく知ってる」"

[[dialogue]]
speaker = "トワ先生（覚醒）"
# 「だからこそ、もう１度挑戦してみたいんだ。先生も現役の星騎士だから」
line = "「だからこそ、もう１度挑戦してみたいんだ。先生も現役の星騎士だから」"

[[dialogue]]
speaker = "トワ先生（覚醒）"
# 「リーリアちゃんだけじゃなくて、みんなも一緒に来てくれてありがとね♪」
line = "「リーリアちゃんだけじゃなくて、みんなも一緒に来てくれてありがとね♪」"

[[dialogue]]
speaker = "アナ（覚醒）"
# 「ノープロブレムです。同じクラスのグループでどこに挑戦しようかと話し合っていたところだったので、ちょうどいいタイミングでした」
line = "「ノープロブレムです。同じクラスのグループでどこに挑戦しようかと話し合っていたところだったので、ちょうどいいタイミングでした」"

[[dialogue]]
speaker = "ルルカ"
# 「そうそう。それに、リーリアちゃんの覚醒した新フォームの力も見てみたかったし♪」
line = "「そうそう。それに、リーリアちゃんの覚醒した新フォームの力も見てみたかったし♪」"

[[dialogue]]
speaker = "メイプル"
# 「お兄ちゃんのところに行こうかとも思ったんだけど、それは後でもいいしね。トワ先生が頑張りたいって思ってるなら、喜んで協力するよ！」
line = "「お兄ちゃんのところに行こうかとも思ったんだけど、それは後でもいいしね。トワ先生が頑張りたいって思ってるなら、喜んで協力するよ！」"

[[dialogue]]
speaker = "ヨミ"
# 「私もです。この前の一件でトワ先生とは仲良くなったことですし、一緒に頑張りましょう！」
line = "「私もです。この前の一件でトワ先生とは仲良くなったことですし、一緒に頑張りましょう！」"

[[dialogue]]
speaker = "トワ先生（覚醒）"
# 「うんっ♪」
line = "「うんっ♪」"

[[dialogue]]
speaker = "マリオン（覚醒）"
# 「ふふっ、最近のトワは学生の頃に戻ったように可愛くなりましたね♪」
line = "「ふふっ、最近のトワは学生の頃に戻ったように可愛くなりましたね♪」"

[[dialogue]]
speaker = "トワ先生（覚醒）"
# 「いや、先生は戻るも何もそもそも若いから！　って、シャドウじゃなくて本物のマリオン！？」
line = "「いや、先生は戻るも何もそもそも若いから！　って、シャドウじゃなくて本物のマリオン！？」"

[[dialogue]]
speaker = "マリオン（覚醒）"
# 「はい♪　トワの様子が気になって、見学しに来ちゃいました♪　それと――」
line = "「はい♪　トワの様子が気になって、見学しに来ちゃいました♪　それと――」"

[[dialogue]]
speaker = "マリオン（覚醒）"
# 「今日はリーリアさんの<b>本気</b>も見られそうですしね♪」
line = "「今日はリーリアさんの<b>本気</b>も見られそうですしね♪」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「あ、あはは～。ご期待に添えるかどうか分かりませんが……」
line = "「あ、あはは～。ご期待に添えるかどうか分かりませんが……」"

[[dialogue]]
speaker = "ルルカ"
# 「ねぇ、あたし、今朝からずっと思ってたんだけど……」
line = "「ねぇ、あたし、今朝からずっと思ってたんだけど……」"

[[dialogue]]
speaker = "ルルカ"
# 「なんか今日のリーリアちゃん、いつもより自信がなさそうな感じじゃない？」
line = "「なんか今日のリーリアちゃん、いつもより自信がなさそうな感じじゃない？」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「え゛」
line = "「え゛」"

[[dialogue]]
speaker = "ヨミ"
# 「確かに、私も思ってました。どこか不安そうっていうか……」
line = "「確かに、私も思ってました。どこか不安そうっていうか……」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「う……それは……」
line = "「う……それは……」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「その……ネビュラから潜入してたスパイだって、学園のみんなの前で改めて言ったじゃない？　その上、ボス役にまで抜擢されて……」
line = "「その……ネビュラから潜入してたスパイだって、学園のみんなの前で改めて言ったじゃない？　その上、ボス役にまで抜擢されて……」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「みんなからどんな風に思われるか、やっぱり気になるというか……今は協力体制にあっても、私はこれまでずっとみんなを騙してたわけだし……」
line = "「みんなからどんな風に思われるか、やっぱり気になるというか……今は協力体制にあっても、私はこれまでずっとみんなを騙してたわけだし……」"

[[dialogue]]
speaker = "アナ（覚醒）"
# 「良く思わないヒトは、やはりいるでしょうね。ですが――」
line = "「良く思わないヒトは、やはりいるでしょうね。ですが――」"

[[dialogue]]
speaker = "アナ（覚醒）"
# 「リーリアさんが今更周りの目を気にしてぶりっ子を止めてしまったら、面白さ９割減、あんこ餅のあんこ抜きみたいなものです」
line = "「リーリアさんが今更周りの目を気にしてぶりっ子を止めてしまったら、面白さ９割減、あんこ餅のあんこ抜きみたいなものです」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「ん……？」
line = "「ん……？」"

[[dialogue]]
speaker = "メイプル"
# 「確かに！　ぜんっぜん面白くないよね！　リーリアはあたしたちの前でも突然かわい子ぶったりするから面白いのに！　あとパッド！」
line = "「確かに！　ぜんっぜん面白くないよね！　リーリアはあたしたちの前でも突然かわい子ぶったりするから面白いのに！　あとパッド！」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「ちょっと待って！？　そもそも私、面白キャラを目指してるわけじゃないんだけど！？　あとパッド言うな！！」
line = "「ちょっと待って！？　そもそも私、面白キャラを目指してるわけじゃないんだけど！？　あとパッド言うな！！」"

[[dialogue]]
speaker = "ヨミ"
# 「えっ、そうなんですか！？　私は、明るくて可愛くて面白いと三拍子揃ってるリーリアさんは、爆裂ステキだなってずっと思ってましたけど……」
line = "「えっ、そうなんですか！？　私は、明るくて可愛くて面白いと三拍子揃ってるリーリアさんは、爆裂ステキだなってずっと思ってましたけど……」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「ヨミヨミちゃん！　ありがとう！　可愛い！　尻尾モフモフ！」
line = "「ヨミヨミちゃん！　ありがとう！　可愛い！　尻尾モフモフ！」"

[[dialogue]]
speaker = "ヨミ"
# 「こやや！？　可愛いだなんて、そんな……」
line = "「こやや！？　可愛いだなんて、そんな……」"

[[dialogue]]
speaker = "ルルカ"
# 「あたし的には、胸のパッドはそこまで盛らなくてもいいんじゃないかなって思うな～」
line = "「あたし的には、胸のパッドはそこまで盛らなくてもいいんじゃないかなって思うな～」"

[[dialogue]]
speaker = "ルルカ"
# 「バズりネタとしては羨ましいくらい面白いけど、リーリアちゃんはもっと自信持っていいと思うよ！」
line = "「バズりネタとしては羨ましいくらい面白いけど、リーリアちゃんはもっと自信持っていいと思うよ！」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「ネタで付けてるわけじゃないんだけど！？」
line = "「ネタで付けてるわけじゃないんだけど！？」"

[[dialogue]]
speaker = "ヨミ"
# 「そうなんですか！？　私、てっきり……」
line = "「そうなんですか！？　私、てっきり……」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「ヨミヨミちゃん！？」
line = "「ヨミヨミちゃん！？」"

[[dialogue]]
speaker = "アナ（覚醒）"
# 「ぶふっ……コホン」
line = "「ぶふっ……コホン」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「アナちゃん、今ちょっと笑いそうになったでしょ！？　普通に失礼！！」
line = "「アナちゃん、今ちょっと笑いそうになったでしょ！？　普通に失礼！！」"

[[dialogue]]
speaker = "アナ（覚醒）"
# 「いえ、気のせいです」
line = "「いえ、気のせいです」"

[[dialogue]]
speaker = "メイプル"
# 「はっ……閃いた！」
line = "「はっ……閃いた！」"

[[dialogue]]
speaker = "メイプル"
# 「名づけて、虚飾の聖域――『ヴァニティ・サンクチュアリ』……！　パッドの幻影魔法の名前にどう？　カッコ良くない！？」
line = "「名づけて、虚飾の聖域――『ヴァニティ・サンクチュアリ』……！　パッドの幻影魔法の名前にどう？　カッコ良くない！？」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「欲しいのはカッコ良さじゃなくて大きさッ！！！」
line = "「欲しいのはカッコ良さじゃなくて大きさッ！！！」"

[[dialogue]]
speaker = "アナ（覚醒）"
# 「ぶふっ……！　ふふふっ！」
line = "「ぶふっ……！　ふふふっ！」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「やっぱ笑ってんじゃん！！」
line = "「やっぱ笑ってんじゃん！！」"

[[dialogue]]
speaker = "unk"
# と、その時。
line = "と、その時。"

[[dialogue]]
speaker = "シャドウマリオン"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "トワ先生（覚醒）"
# 「みんな、シャドウが現れたよ！」
line = "「みんな、シャドウが現れたよ！」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「ああ、もう！　なんか不安に思ってるのが馬鹿らしくなってきた！」
line = "「ああ、もう！　なんか不安に思ってるのが馬鹿らしくなってきた！」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「こうなったら――マジカル可愛く大活躍して、みんなからチヤホヤされまくってやるんだから！」
line = "「こうなったら――マジカル可愛く大活躍して、みんなからチヤホヤされまくってやるんだから！」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「この、私とセンパイの絆から生まれた新しい力『アルカンシェルフォーム』で！」
line = "「この、私とセンパイの絆から生まれた新しい力『アルカンシェルフォーム』で！」"

[[dialogue]]
speaker = "unk"
# アナは、ふっと口元を小さく微笑ませて──
line = "アナは、ふっと口元を小さく微笑ませて──"

[[dialogue]]
speaker = "アナ（覚醒）"
# 「それでこそリーリアさんです」
line = "「それでこそリーリアさんです」"

[[dialogue]]
speaker = "ルルカ"
# 「だね♪　よ～し、クラスメイトと先生で仲良く頑張っちゃおう！　お～！！」
line = "「だね♪　よ～し、クラスメイトと先生で仲良く頑張っちゃおう！　お～！！」"

[[dialogue]]
speaker = "unk"
# そうして、トワとリーリア達クラスメイトチームは、シャドウマリオンに勝負を挑むのだった――
line = "そうして、トワとリーリア達クラスメイトチームは、シャドウマリオンに勝負を挑むのだった――"
