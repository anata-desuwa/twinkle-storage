[[dialogue]]
speaker = "unk"
# 第１０話,作戦完了！,B
line = "第１０話,作戦完了！,B"

[[dialogue]]
speaker = "unk"
# 彼らがパトロール作戦を始めて数時間──
line = "彼らがパトロール作戦を始めて数時間──"

[[dialogue]]
speaker = "unk"
# 各地に出没していた特殊個体もそのほとんどが掃討され、流星市国には平和が戻っていた。
line = "各地に出没していた特殊個体もそのほとんどが掃討され、流星市国には平和が戻っていた。"

[[dialogue]]
speaker = "ユウリ"
# 「ふぅ……大体片付いたっぽいな。街の人たちも怪我人はいないみたいだったぜ」
line = "「ふぅ……大体片付いたっぽいな。街の人たちも怪我人はいないみたいだったぜ」"

[[dialogue]]
speaker = "セーラ"
# 「みんな、お疲れ～♪　ふふ、たまにはこういうのも楽しいじゃんね」
line = "「みんな、お疲れ～♪　ふふ、たまにはこういうのも楽しいじゃんね」"

[[dialogue]]
speaker = "マトイ"
# 「ほっ……どうなることかと思いましたけど、これでセイファート学園長にもいい報告ができます」
line = "「ほっ……どうなることかと思いましたけど、これでセイファート学園長にもいい報告ができます」"

[[dialogue]]
speaker = "セーラ"
# 「ルリちーはどうだった、今日の？」
line = "「ルリちーはどうだった、今日の？」"

[[dialogue]]
speaker = "ルリエル"
# 「ばっちりでしたよ！　同じ一年生の天使同士、抜群のコミュニケーションとコンビネーションでした！　ね！　アナちゃんさん！」
line = "「ばっちりでしたよ！　同じ一年生の天使同士、抜群のコミュニケーションとコンビネーションでした！　ね！　アナちゃんさん！」"

[[dialogue]]
speaker = "アナ"
# 「ばっちぐ～」
line = "「ばっちぐ～」"

[[dialogue]]
speaker = "マトイ"
# 「ちゃん付けなの？　さん付けなの？　どっち……？」
line = "「ちゃん付けなの？　さん付けなの？　どっち……？」"

[[dialogue]]
speaker = "ルリエル"
# 「同級生としてはちゃん付けですが、同級生と思えぬほどご立派なのでさん付けなのです！」
line = "「同級生としてはちゃん付けですが、同級生と思えぬほどご立派なのでさん付けなのです！」"

[[dialogue]]
speaker = "サーシャ"
# 「ルリエルちゃんも可愛いわね～♪　ホントに真っ白な天使さんって感じ」
line = "「ルリエルちゃんも可愛いわね～♪　ホントに真っ白な天使さんって感じ」"

[[dialogue]]
speaker = "ルリエル"
# 「えへへ、褒められました！　ソフィアもサーシャ先輩と上手く連携できたでありますか？」
line = "「えへへ、褒められました！　ソフィアもサーシャ先輩と上手く連携できたでありますか？」"

[[dialogue]]
speaker = "ソフィア"
# 「ん……ま、まあ。それなりに」
line = "「ん……ま、まあ。それなりに」"

[[dialogue]]
speaker = "サーシャ"
# 「それなり～？　残念ね、あんなに仲良くお話できたのに」
line = "「それなり～？　残念ね、あんなに仲良くお話できたのに」"

[[dialogue]]
speaker = "ソフィア"
# 「う、うるさいです。姉さんはいつもそうやって私を子ども扱いするんですから……」
line = "「う、うるさいです。姉さんはいつもそうやって私を子ども扱いするんですから……」"

[[dialogue]]
speaker = "ユウリ"
# 「ハハ、よかったないい先輩がいて…………え？」
line = "「ハハ、よかったないい先輩がいて…………え？」"

[[dialogue]]
speaker = "ソフィア"
# 「あっ」
line = "「あっ」"

[[dialogue]]
speaker = "ルリエル"
# 「姉さんって──ええ！？　サーシャ先輩はソフィアのお姉さんだったでありますか！？」
line = "「姉さんって──ええ！？　サーシャ先輩はソフィアのお姉さんだったでありますか！？」"

[[dialogue]]
speaker = "マトイ"
# 「びっくり。そういえばソフィアちゃんの名字聞いたことなかった……奏ソフィアちゃん、ってこと？」
line = "「びっくり。そういえばソフィアちゃんの名字聞いたことなかった……奏ソフィアちゃん、ってこと？」"

[[dialogue]]
speaker = "ソフィア"
# 「違います」
line = "「違います」"

[[dialogue]]
speaker = "ユウリ"
# 「いやそうだろ。あたしら誤魔化せると思うなよ」
line = "「いやそうだろ。あたしら誤魔化せると思うなよ」"

[[dialogue]]
speaker = "セーラ"
# 「あはは。ま、会長たちがいなくたってうちらも捨てたもんじゃないってことで♪」
line = "「あはは。ま、会長たちがいなくたってうちらも捨てたもんじゃないってことで♪」"

[[dialogue]]
speaker = "ソフィア"
# 「ですね。ふふ……これにて私たちの合同出撃は終わりを迎えるのであった」
line = "「ですね。ふふ……これにて私たちの合同出撃は終わりを迎えるのであった」"

[[dialogue]]
speaker = "マトイ"
# 「すごい無理やりまとめようとしてる」
line = "「すごい無理やりまとめようとしてる」"

[[dialogue]]
speaker = "アナ"
# 「兄弟姉妹の前では素が出せない性格の人は多い。ソフィアも年齢的に姉離れしたくなる年頃だから……」
line = "「兄弟姉妹の前では素が出せない性格の人は多い。ソフィアも年齢的に姉離れしたくなる年頃だから……」"

[[dialogue]]
speaker = "ユウリ"
# 「あまり分析してやらないほうがいいと思うぞ、アナ」
line = "「あまり分析してやらないほうがいいと思うぞ、アナ」"

[[dialogue]]
speaker = "unk"
# そうして、彼らはそれぞれの学び舎へと帰る──
line = "そうして、彼らはそれぞれの学び舎へと帰る──"

[[dialogue]]
speaker = "unk"
# さらなる異変が起こったのは、その道中だった。
line = "さらなる異変が起こったのは、その道中だった。"
