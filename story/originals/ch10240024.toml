[[dialogue]]
speaker = "unk"
# 第４話,真面目な匂いフェチ,P
line = "第４話,真面目な匂いフェチ,P"

[[dialogue]]
speaker = "unk"
# このところ星徒会の仕事が忙しくて、ヨミと恋人同士の時間を取れていない日々が続いていた――
line = "このところ星徒会の仕事が忙しくて、ヨミと恋人同士の時間を取れていない日々が続いていた――"

[[dialogue]]
speaker = "ヨミ"
# 「はぁ……今日でもう１週間……」
line = "「はぁ……今日でもう１週間……」"

[[dialogue]]
speaker = "ヨミ"
# （同じ学園に通っているのに、まさかこんなにも会えないだなんて……。今は、会長と毎日会っているお嬢様たちを、羨ましく感じてしまいます……）
line = "（同じ学園に通っているのに、まさかこんなにも会えないだなんて……。今は、会長と毎日会っているお嬢様たちを、羨ましく感じてしまいます……）"

[[dialogue]]
speaker = "ヨミ"
# （いっそのこと、お嬢様に頼んで、会長専属のメイドということで配置換えを頼んでみるのもいいのかも……。そうすればいつも会長のそばにいれますし……）
line = "（いっそのこと、お嬢様に頼んで、会長専属のメイドということで配置換えを頼んでみるのもいいのかも……。そうすればいつも会長のそばにいれますし……）"

[[dialogue]]
speaker = "ヨミ"
# （って、なに考えてるんだろう、私……！　せっかく任務管轄係の仕事を任せてもらっているのに、それを投げ出すのは無責任ですよね。変な考えは止めないと……でも――）
line = "（って、なに考えてるんだろう、私……！　せっかく任務管轄係の仕事を任せてもらっているのに、それを投げ出すのは無責任ですよね。変な考えは止めないと……でも――）"

[[dialogue]]
speaker = "ヨミ"
# （わかっているんですけど、会長の<b>匂い成分</b>が爆裂足りない……！）
line = "（わかっているんですけど、会長の<b>匂い成分</b>が爆裂足りない……！）"

[[dialogue]]
speaker = "unk"
# ヨミ！　１週間ぶりにやっと会えた
line = "ヨミ！　１週間ぶりにやっと会えた"

[[dialogue]]
speaker = "ヨミ"
# 「こやっ！？　会長！？」
line = "「こやっ！？　会長！？」"

[[dialogue]]
speaker = "ヨミ"
# 「もしかして、忙しかった仕事がひと段落したんですか！？（尻尾ぶんぶん）」
line = "「もしかして、忙しかった仕事がひと段落したんですか！？（尻尾ぶんぶん）」"

[[dialogue]]
speaker = "ヨミ"
# 「――仕事で移動中に、偶然通りかかっただけ？　そ、そうでしたか……（尻尾しなしな）」
line = "「――仕事で移動中に、偶然通りかかっただけ？　そ、そうでしたか……（尻尾しなしな）」"

[[dialogue]]
speaker = "ヨミ"
# （あぁ～、１週間ぶりの会長の匂い……！　くんくん……体と心に染み渡ります……<emoji=heart04>　やっぱり好き……<emoji=heart04>　ウットリしちゃいます……<emoji=heart04>）
line = "（あぁ～、１週間ぶりの会長の匂い……！　くんくん……体と心に染み渡ります……<emoji=heart04>　やっぱり好き……<emoji=heart04>　ウットリしちゃいます……<emoji=heart04>）"

[[dialogue]]
speaker = "ヨミ"
# （今すぐ抱き着いて、いっぱいくんくんしたい……！　うぅ～、でも、忙しい会長の邪魔をするわけには……！）
line = "（今すぐ抱き着いて、いっぱいくんくんしたい……！　うぅ～、でも、忙しい会長の邪魔をするわけには……！）"

[[dialogue]]
speaker = "ヨミ"
# 「――えっ？　あっ、なんでもないですよ！？　ひ、久しぶりに会長と会えたので、なにを話そうか迷ってしまって……あは、あははっ！」
line = "「――えっ？　あっ、なんでもないですよ！？　ひ、久しぶりに会長と会えたので、なにを話そうか迷ってしまって……あは、あははっ！」"

[[dialogue]]
speaker = "ヨミ"
# 「そ、そうですか。もうそろそろ戻らないといけないんですね……。星徒会のお仕事、頑張って下さいっ。私も任務管轄係の仕事を頑張りますので！」
line = "「そ、そうですか。もうそろそろ戻らないといけないんですね……。星徒会のお仕事、頑張って下さいっ。私も任務管轄係の仕事を頑張りますので！」"

[[dialogue]]
speaker = "unk"
# その日の夜、ヨミは任務管轄係の書類を星徒会に届けにきたのだが――
line = "その日の夜、ヨミは任務管轄係の書類を星徒会に届けにきたのだが――"

[[dialogue]]
speaker = "ヨミ"
# 「――こういう仕事で会えるタイミングに限って、会長は不在なんですね……。はぁ……」
line = "「――こういう仕事で会えるタイミングに限って、会長は不在なんですね……。はぁ……」"

[[dialogue]]
speaker = "ヨミ"
# （こうなって初めて、自分がどれだけ会長のことを好きになってるのか、実感します……）
line = "（こうなって初めて、自分がどれだけ会長のことを好きになってるのか、実感します……）"

[[dialogue]]
speaker = "ヨミ"
# （ん？　あ……会長の匂いがすると思ったら、会長席の椅子に制服の上着が……。今日はちょっと、暑い日だったから……）
line = "（ん？　あ……会長の匂いがすると思ったら、会長席の椅子に制服の上着が……。今日はちょっと、暑い日だったから……）"

[[dialogue]]
speaker = "ヨミ"
# （…………恋人なんだし、これくらいは、いいですよね？）
line = "（…………恋人なんだし、これくらいは、いいですよね？）"

[[dialogue]]
speaker = "unk"
# ヨミは俺の制服を手に取ると、顔を埋めるようにして――
line = "ヨミは俺の制服を手に取ると、顔を埋めるようにして――"

[[dialogue]]
speaker = "ヨミ"
# 「くんくん……<emoji=heart04>　――はあぁ……<emoji=heart04>」
line = "「くんくん……<emoji=heart04>　――はあぁ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# えっと……ヨミヨミ？
line = "えっと……ヨミヨミ？"

[[dialogue]]
speaker = "ヨミ"
# 「えっ……こ、こやあぁぁぁーーーっ！！？」
line = "「えっ……こ、こやあぁぁぁーーーっ！！？」"

[[dialogue]]
speaker = "ヨミ"
# 「か、会長！？　戻ってきてたんですか！？　いつの間に！？」
line = "「か、会長！？　戻ってきてたんですか！？　いつの間に！？」"

[[dialogue]]
speaker = "ヨミ"
# 「――制服を手に取ったところから？　爆裂最悪なタイミングーーーっ！！」
line = "「――制服を手に取ったところから？　爆裂最悪なタイミングーーーっ！！」"

[[dialogue]]
speaker = "ヨミ"
# 「恥ずかしくて、今すぐ穴を掘って埋まりたい……」
line = "「恥ずかしくて、今すぐ穴を掘って埋まりたい……」"

[[dialogue]]
speaker = "unk"
# 匂いフェチなのは今更だから、大丈夫だよ
line = "匂いフェチなのは今更だから、大丈夫だよ"

[[dialogue]]
speaker = "ヨミ"
# 「こやっ！？　か、会長……！　いきなり抱き締めちゃ……<emoji=heart04>　だ、ダメです！　仕事が忙しいのに、邪魔するわけには……！」
line = "「こやっ！？　か、会長……！　いきなり抱き締めちゃ……<emoji=heart04>　だ、ダメです！　仕事が忙しいのに、邪魔するわけには……！」"

[[dialogue]]
speaker = "ヨミ"
# 「――仕事が全部終わったから、私を探しに行ってた？　と、ということは、今日はもうゆっくりできるってこと、ですか？」
line = "「――仕事が全部終わったから、私を探しに行ってた？　と、ということは、今日はもうゆっくりできるってこと、ですか？」"

[[dialogue]]
speaker = "ヨミ"
# 「か、会長とゆっくり……<emoji=heart04>　恋人のスキンシップ……！　好きなだけ……！　か――」
line = "「か、会長とゆっくり……<emoji=heart04>　恋人のスキンシップ……！　好きなだけ……！　か――」"

[[dialogue]]
speaker = "ヨミ"
# 「会長っ！　こやあぁっ<emoji=heart04><emoji=heart04>」
line = "「会長っ！　こやあぁっ<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ちょっ、ヨミ！？　うおぉっ！？
line = "ちょっ、ヨミ！？　うおぉっ！？"

[[dialogue]]
speaker = "unk"
# なんと、ヨミは俺をいきなり床に押し倒すと、匂いを嗅ぐだけでなく、首筋やら顔やらを舐め始めた！
line = "なんと、ヨミは俺をいきなり床に押し倒すと、匂いを嗅ぐだけでなく、首筋やら顔やらを舐め始めた！"

[[dialogue]]
speaker = "ヨミ"
# 「くんくん<emoji=heart04>　ぺろぺろ<emoji=heart04>　会長っ<emoji=heart04>　会長ぉっ<emoji=heart04>　ふーっ<emoji=heart04>　ふーっ……！」
line = "「くんくん<emoji=heart04>　ぺろぺろ<emoji=heart04>　会長っ<emoji=heart04>　会長ぉっ<emoji=heart04>　ふーっ<emoji=heart04>　ふーっ……！」"

[[dialogue]]
speaker = "ヨミ"
# 「好きっ<emoji=heart04>　はぁっ……はぁっ……くんくん<emoji=heart04>　ぺろぺろ<emoji=heart04>　会長の匂い、ずっとくんくん恋しかったんですぅ……<emoji=heart04>　ふうぅ……すうぅ……はあぁっ……<emoji=heart04><emoji=heart04>」
line = "「好きっ<emoji=heart04>　はぁっ……はぁっ……くんくん<emoji=heart04>　ぺろぺろ<emoji=heart04>　会長の匂い、ずっとくんくん恋しかったんですぅ……<emoji=heart04>　ふうぅ……すうぅ……はあぁっ……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# しばらくして、興奮が落ち着いてきたらしいヨミは、はっと我に返った顔をして――
line = "しばらくして、興奮が落ち着いてきたらしいヨミは、はっと我に返った顔をして――"

[[dialogue]]
speaker = "ヨミ"
# 「えっ……こ、こやあぁぁぁーーーっ！？　なんか会長の服が乱れて、すごくエッチな有様にぃーーー！？」
line = "「えっ……こ、こやあぁぁぁーーーっ！？　なんか会長の服が乱れて、すごくエッチな有様にぃーーー！？」"

[[dialogue]]
speaker = "unk"
# やったのヨミヨミだからね！？
line = "やったのヨミヨミだからね！？"

[[dialogue]]
speaker = "ヨミ"
# 「そうでした！　ご、ごめんなさいぃ……！」
line = "「そうでした！　ご、ごめんなさいぃ……！」"

[[dialogue]]
speaker = "ヨミ"
# 「うぅ……欲望に勝てず、種族の本能が出てしまいました……！」
line = "「うぅ……欲望に勝てず、種族の本能が出てしまいました……！」"

[[dialogue]]
speaker = "ヨミ"
# 「――実はずっと、会長の匂いが嗅げてなくて、その……欲求不満でムラムラしてしまっていて……」
line = "「――実はずっと、会長の匂いが嗅げてなくて、その……欲求不満でムラムラしてしまっていて……」"

[[dialogue]]
speaker = "unk"
# それから、ヨミはこの１週間、悩んでいたことを打ち明けてくれた。
line = "それから、ヨミはこの１週間、悩んでいたことを打ち明けてくれた。"

[[dialogue]]
speaker = "unk"
# ――真面目なのは、ヨミの良いところだ。そして、同時に悪いところでもある。だから、これからは我慢せずに相談して欲しい。俺は彼女に、そう伝えた。
line = "――真面目なのは、ヨミの良いところだ。そして、同時に悪いところでもある。だから、これからは我慢せずに相談して欲しい。俺は彼女に、そう伝えた。"

[[dialogue]]
speaker = "ヨミ"
# 「――その代わり、会長もスキンシップしたい時はちゃんと伝えるから、ですか？」
line = "「――その代わり、会長もスキンシップしたい時はちゃんと伝えるから、ですか？」"

[[dialogue]]
speaker = "ヨミ"
# 「は、はい……<emoji=heart04>　わかりました……<emoji=heart04>」
line = "「は、はい……<emoji=heart04>　わかりました……<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
# 「じゃあ、その……会長にお願いしてもいいですか……？　私――」
line = "「じゃあ、その……会長にお願いしてもいいですか……？　私――」"

[[dialogue]]
speaker = "ヨミ"
# 「今日はまだ、会長とスキンシップしたいです……<emoji=heart04>」
line = "「今日はまだ、会長とスキンシップしたいです……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# うん。俺もだ
line = "うん。俺もだ"

[[dialogue]]
speaker = "ヨミ"
# 「ん……<emoji=heart04>　えへへ……<emoji=heart04>　１週間ぶりの会長、温かくて、いい匂いがして……落ち着きます<emoji=heart04>　くんくん<emoji=heart04>　すりすり……<emoji=heart04>」
line = "「ん……<emoji=heart04>　えへへ……<emoji=heart04>　１週間ぶりの会長、温かくて、いい匂いがして……落ち着きます<emoji=heart04>　くんくん<emoji=heart04>　すりすり……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# その日は彼女が満足するまで、目一杯甘えさせてあげるのだった――
line = "その日は彼女が満足するまで、目一杯甘えさせてあげるのだった――"
