[[dialogue]]
speaker = "unk"
# バレンタイン翌日の朝。
line = "バレンタイン翌日の朝。"

[[dialogue]]
speaker = "ルルカ"
# 「トワちゃん先生、おはようございま～す♪」
line = "「トワちゃん先生、おはようございま～す♪」"

[[dialogue]]
speaker = "トワ先生"
# 「あっ、ルルカちゃん。おはよう♪」
line = "「あっ、ルルカちゃん。おはよう♪」"

[[dialogue]]
speaker = "unk"
# ２人が談笑していると――
line = "２人が談笑していると――"

[[dialogue]]
speaker = "イクシリオン"
# 「トワ先生、ルルカさん。おはようございます♪」
line = "「トワ先生、ルルカさん。おはようございます♪」"

[[dialogue]]
speaker = "トワ先生"
# 「イクシリオンちゃん♪　おはよう！」
line = "「イクシリオンちゃん♪　おはよう！」"

[[dialogue]]
speaker = "unk"
# そこへイクシリオンもやって来て、３人は挨拶を交わした。ふとルルカは、イクシリオンの様子に気づく。
line = "そこへイクシリオンもやって来て、３人は挨拶を交わした。ふとルルカは、イクシリオンの様子に気づく。"

[[dialogue]]
speaker = "ルルカ"
# 「――あれ？　イクシリオンちゃん、なんだか肌がすごくツヤツヤしてない？」
line = "「――あれ？　イクシリオンちゃん、なんだか肌がすごくツヤツヤしてない？」"

[[dialogue]]
speaker = "イクシリオン"
# 「あ……おかげさまで昨晩は、その……とてもスッキリ眠れまして……<emoji=heart04>」
line = "「あ……おかげさまで昨晩は、その……とてもスッキリ眠れまして……<emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
# 「そ、そっか。健康的でいいね、あははは……！」
line = "「そ、そっか。健康的でいいね、あははは……！」"

[[dialogue]]
speaker = "ルルカ"
# 「？　とりあえず、無事にバレンタインも終わったし、ひと段落ってとこかな♪」
line = "「？　とりあえず、無事にバレンタインも終わったし、ひと段落ってとこかな♪」"

[[dialogue]]
speaker = "unk"
# 少し頬を赤らめたトワを見て、ルルカは首をかしげながらも、楽しそうに笑った。
line = "少し頬を赤らめたトワを見て、ルルカは首をかしげながらも、楽しそうに笑った。"

[[dialogue]]
speaker = "イクシリオン"
# 「それで……今日会ったら、お２人に渡したいと思っていたものがありまして――」
line = "「それで……今日会ったら、お２人に渡したいと思っていたものがありまして――」"

[[dialogue]]
speaker = "unk"
# そう言ってイクシリオンが取り出したのは、小さなチョコの入った袋だった。
line = "そう言ってイクシリオンが取り出したのは、小さなチョコの入った袋だった。"

[[dialogue]]
speaker = "イクシリオン"
# 「こちらをどうぞ。今回のお礼の気持ちを込めて、昨晩改めて作ってきました」
line = "「こちらをどうぞ。今回のお礼の気持ちを込めて、昨晩改めて作ってきました」"

[[dialogue]]
speaker = "ルルカ"
# 「わぁっ♪　あたしにも？　イクシリオンちゃん、ありがと～♪」
line = "「わぁっ♪　あたしにも？　イクシリオンちゃん、ありがと～♪」"

[[dialogue]]
speaker = "トワ先生"
# 「ありがとう♪　――チョコを作れたってことは、もうバレンタインフォームも大丈夫なの？」
line = "「ありがとう♪　――チョコを作れたってことは、もうバレンタインフォームも大丈夫なの？」"

[[dialogue]]
speaker = "イクシリオン"
# 「はい。トワ先生の仰っていた通り、チョコを無事に渡せたことで、他のフォームにも変身できるようになりました」
line = "「はい。トワ先生の仰っていた通り、チョコを無事に渡せたことで、他のフォームにも変身できるようになりました」"

[[dialogue]]
speaker = "トワ先生"
# 「そっか♪　本当に、よかった！」
line = "「そっか♪　本当に、よかった！」"

[[dialogue]]
speaker = "イクシリオン"
# 「あの……それで、もしよろしければ……」
line = "「あの……それで、もしよろしければ……」"

[[dialogue]]
speaker = "イクシリオン"
# 「今後は、私のことを『イクシー』と呼んでいただけませんか？」
line = "「今後は、私のことを『イクシー』と呼んでいただけませんか？」"

[[dialogue]]
speaker = "トワ先生"
# 「え……？」
line = "「え……？」"

[[dialogue]]
speaker = "イクシリオン"
# 「その、勘違いでしたらお恥ずかしい限りなのですが……今回の件で、少しはトワ先生とも親しくなれたのではないかと……個人的には、そう思っておりまして……」
line = "「その、勘違いでしたらお恥ずかしい限りなのですが……今回の件で、少しはトワ先生とも親しくなれたのではないかと……個人的には、そう思っておりまして……」"

[[dialogue]]
speaker = "イクシリオン"
# 「――先生としては、いかがでしょうか？」
line = "「――先生としては、いかがでしょうか？」"

[[dialogue]]
speaker = "unk"
# もじもじと照れながら尋ねるイクシリオンに、トワはふっと微笑んで頷いた。
line = "もじもじと照れながら尋ねるイクシリオンに、トワはふっと微笑んで頷いた。"

[[dialogue]]
speaker = "トワ先生"
# 「――うん♪　わかった。それじゃあ、これからは先生も『イクシーちゃん』って呼ぶね♪」
line = "「――うん♪　わかった。それじゃあ、これからは先生も『イクシーちゃん』って呼ぶね♪」"

[[dialogue]]
speaker = "イクシリオン"
# 「……！　はいっ♪　これからもご指導、よろしくお願いします、先生！」
line = "「……！　はいっ♪　これからもご指導、よろしくお願いします、先生！」"

[[dialogue]]
speaker = "ルルカ"
# 「ねぇねぇ、それならあたしも、イクシーちゃんって呼んでもいい？」
line = "「ねぇねぇ、それならあたしも、イクシーちゃんって呼んでもいい？」"

[[dialogue]]
speaker = "イクシリオン"
# 「もちろんです！　実はルルカさんにも、そのお願いをしようと思っていたところでした」
line = "「もちろんです！　実はルルカさんにも、そのお願いをしようと思っていたところでした」"

[[dialogue]]
speaker = "イクシリオン"
# 「今回こうして仲良くなれたので、ぜひ今後も友達として仲良くしていただければと……」
line = "「今回こうして仲良くなれたので、ぜひ今後も友達として仲良くしていただければと……」"

[[dialogue]]
speaker = "ルルカ"
# 「あははっ♪　イクシーちゃん、同じ１年生同士なんだから、そんなにかしこまらなくてもいいよ～」
line = "「あははっ♪　イクシーちゃん、同じ１年生同士なんだから、そんなにかしこまらなくてもいいよ～」"

[[dialogue]]
speaker = "ルルカ"
# 「あたしも友達が増えるのは大歓迎☆　だから、今日からもっと仲良くしよ♪」
line = "「あたしも友達が増えるのは大歓迎☆　だから、今日からもっと仲良くしよ♪」"

[[dialogue]]
speaker = "イクシリオン"
# 「ありがとうございます！　私も新しい友達ができて、すごく嬉しいです♪」
line = "「ありがとうございます！　私も新しい友達ができて、すごく嬉しいです♪」"

[[dialogue]]
speaker = "ルルカ"
# 「それじゃあ改めて――よろしくね、イクシーちゃん♪」
line = "「それじゃあ改めて――よろしくね、イクシーちゃん♪」"

[[dialogue]]
speaker = "イクシリオン"
# 「はい。こちらこそ、よろしくお願いします、ルルカさん！」
line = "「はい。こちらこそ、よろしくお願いします、ルルカさん！」"

[[dialogue]]
speaker = "unk"
# ２人が笑い合うと、イクシリオンはふと思い出したようにトワへと向き直った。
line = "２人が笑い合うと、イクシリオンはふと思い出したようにトワへと向き直った。"

[[dialogue]]
speaker = "イクシリオン"
# 「そうでした、トワ先生。――アドバイスしていただいた通り、妄想癖を集中力に変える訓練を始めようと思っていまして……」
line = "「そうでした、トワ先生。――アドバイスしていただいた通り、妄想癖を集中力に変える訓練を始めようと思っていまして……」"

[[dialogue]]
speaker = "イクシリオン"
# 「できれば後ほど、バレンタインフォームの使い方について、ご指導いただけないでしょうか……？」
line = "「できれば後ほど、バレンタインフォームの使い方について、ご指導いただけないでしょうか……？」"

[[dialogue]]
speaker = "トワ先生"
# 「もちろんいいよ！　私もバレンタインフォームを使いこなせるように訓練するつもりだったし、放課後に一緒にやろっか♪」
line = "「もちろんいいよ！　私もバレンタインフォームを使いこなせるように訓練するつもりだったし、放課後に一緒にやろっか♪」"

[[dialogue]]
speaker = "ルルカ"
# 「あっ、それならあたしもやりた～い♪　イクシーちゃん、いい？」
line = "「あっ、それならあたしもやりた～い♪　イクシーちゃん、いい？」"

[[dialogue]]
speaker = "イクシリオン"
# 「はい、もちろんです！　同じ星騎士の仲間で――それに、友達ですから♪」
line = "「はい、もちろんです！　同じ星騎士の仲間で――それに、友達ですから♪」"

[[dialogue]]
speaker = "unk"
# イクシリオンは少し照れたようにそう言って、微笑むのだった。
line = "イクシリオンは少し照れたようにそう言って、微笑むのだった。"
