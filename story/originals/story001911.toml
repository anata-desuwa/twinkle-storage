[[dialogue]]
speaker = "unk"
# フィオナに呼び出され、俺は正月早々、流星の星徒会にお邪魔することになった。
line = "フィオナに呼び出され、俺は正月早々、流星の星徒会にお邪魔することになった。"

[[dialogue]]
speaker = "unk"
# なんでも俺に顔を会わせたい人がいるとのことだが──
line = "なんでも俺に顔を会わせたい人がいるとのことだが──"

[[dialogue]]
speaker = "フィオナ"
# 「さ、オオヒメ様」
line = "「さ、オオヒメ様」"

[[dialogue]]
speaker = "オオヒメ"
# 「う、うむ……どうしてもこの服でなくてはいけないのだろうか。私にこのようなハイカラな服は……」
line = "「う、うむ……どうしてもこの服でなくてはいけないのだろうか。私にこのようなハイカラな服は……」"

[[dialogue]]
speaker = "フィオナ"
# 「どこもおかしくなんてありませんよ。よくお似合いです」
line = "「どこもおかしくなんてありませんよ。よくお似合いです」"

[[dialogue]]
speaker = "オオヒメ"
# 「本当か？　本当であろうな？　嘘だったら、また引きこもりかねない──ま、待て、引っ張らないでくれ……！」
line = "「本当か？　本当であろうな？　嘘だったら、また引きこもりかねない──ま、待て、引っ張らないでくれ……！」"

[[dialogue]]
speaker = "オオヒメ"
# 「ひぁ……！　あまりまじまじと見ないでくれ、魔王……」
line = "「ひぁ……！　あまりまじまじと見ないでくれ、魔王……」"

[[dialogue]]
speaker = "フィオナ"
# 「ふふ、驚かれたようですね。当学園の制服を支給したんです。あの服のままでは『圧』が強すぎましたから」
line = "「ふふ、驚かれたようですね。当学園の制服を支給したんです。あの服のままでは『圧』が強すぎましたから」"

[[dialogue]]
speaker = "unk"
# よく似合ってて、可愛いらしいですよ
line = "よく似合ってて、可愛いらしいですよ"

[[dialogue]]
speaker = "オオヒメ"
# 「似合っ……か、可愛い……！？　魔王よ、そういう発言は<ruby=けいけい>軽々</ruby>にしないでくれ……」
line = "「似合っ……か、可愛い……！？　魔王よ、そういう発言は<ruby>軽々<rt>けいけい</rt></ruby>にしないでくれ……」"

[[dialogue]]
speaker = "unk"
# （ちょっと顔が赤いような……？）
line = "（ちょっと顔が赤いような……？）"

[[dialogue]]
speaker = "フィオナ"
# 「緋宮会長には、オオヒメ様の制服のお披露目のためだけに来てもらったわけではありません」
line = "「緋宮会長には、オオヒメ様の制服のお披露目のためだけに来てもらったわけではありません」"

[[dialogue]]
speaker = "フィオナ"
# 「両校の代表として、やはりキチンと聞き出さねばならないと思いまして。オオヒメ様、デリケートな話でしたら大変申し訳ないのですが……」
line = "「両校の代表として、やはりキチンと聞き出さねばならないと思いまして。オオヒメ様、デリケートな話でしたら大変申し訳ないのですが……」"

[[dialogue]]
speaker = "オオヒメ"
# 「私がどうして神殿の奥にこもっていたか……か。やはり話さねばなるまいな……」
line = "「私がどうして神殿の奥にこもっていたか……か。やはり話さねばなるまいな……」"

[[dialogue]]
speaker = "オオヒメ"
# 「あなたたちがフィーニスの塔の頂上に登った時があっただろう。以前の決戦の時だ」
line = "「あなたたちがフィーニスの塔の頂上に登った時があっただろう。以前の決戦の時だ」"

[[dialogue]]
speaker = "フィオナ"
# 「はい、姉さんとギエルとの戦いの時に。ですがオオヒメ様の姿は見えなかったはずですが……」
line = "「はい、姉さんとギエルとの戦いの時に。ですがオオヒメ様の姿は見えなかったはずですが……」"

[[dialogue]]
speaker = "オオヒメ"
# 「あ、ああ……それなんだが……」
line = "「あ、ああ……それなんだが……」"

[[dialogue]]
speaker = "フィオナ"
# 「？　実はあの時フィーニスの塔のどこかにいらしたんですか？」
line = "「？　実はあの時フィーニスの塔のどこかにいらしたんですか？」"

[[dialogue]]
speaker = "オオヒメ"
# 「ああ……ええと……あなたたちはフィーニスの塔をどのようにして昇った？」
line = "「ああ……ええと……あなたたちはフィーニスの塔をどのようにして昇った？」"

[[dialogue]]
speaker = "unk"
# あの時は確か……魔王ビームで……
階層を思いっきりぶち抜きながら……
line = "あの時は確か……魔王ビームで……\n階層を思いっきりぶち抜きながら……"

[[dialogue]]
speaker = "フィオナ"
# 「そうでしたね。切羽詰まっていたとはいえ、無茶な方法を取ったものです。光の柱がフィーニスの塔を貫いて……」
line = "「そうでしたね。切羽詰まっていたとはいえ、無茶な方法を取ったものです。光の柱がフィーニスの塔を貫いて……」"

[[dialogue]]
speaker = "オオヒメ"
# 「それ！　私はその魔王ビームの一撃に巻き込まれたのだ！」
line = "「それ！　私はその魔王ビームの一撃に巻き込まれたのだ！」"

[[dialogue]]
speaker = "フィオナ"
# 「ええーっ！？」
line = "「ええーっ！？」"

[[dialogue]]
speaker = "リノ"
# 「──ぶち抜きなさい、クロト。今なら女神さまも許してくれるわ」
line = "「──ぶち抜きなさい、クロト。今なら女神さまも許してくれるわ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「なるほど──さすがクロトのママ！　いちいち階段なんて昇ってられないものね！」
line = "「なるほど──さすがクロトのママ！　いちいち階段なんて昇ってられないものね！」"

[[dialogue]]
speaker = "オオヒメ"
# 「む……？　下で何か──」
line = "「む……？　下で何か──」"

[[dialogue]]
speaker = "オオヒメ"
# 「うあああああああっ！！？」
line = "「うあああああああっ！！？」"

[[dialogue]]
speaker = "オオヒメ"
# 「いきなり真下からズドーンと！　見事なまでの不意打ちだった！」
line = "「いきなり真下からズドーンと！　見事なまでの不意打ちだった！」"

[[dialogue]]
speaker = "オオヒメ"
# 「まさか神域たるフィーニスの塔を、あのような無茶苦茶な力技で登る者が現れるとは思わないだろう！？」
line = "「まさか神域たるフィーニスの塔を、あのような無茶苦茶な力技で登る者が現れるとは思わないだろう！？」"

[[dialogue]]
speaker = "オオヒメ"
# 「分身たる堕天使とはいえ、守護天使である私が、たった一発の不意打ちで消し飛ばされたのだ！　情けなくもなる！　引きこもりもしよう！」
line = "「分身たる堕天使とはいえ、守護天使である私が、たった一発の不意打ちで消し飛ばされたのだ！　情けなくもなる！　引きこもりもしよう！」"

[[dialogue]]
speaker = "フィオナ"
# 「あの時は私も霊力の経路を繋げたりと、緋宮会長の支援をしていましたし……関係がないとは言えませんね」
line = "「あの時は私も霊力の経路を繋げたりと、緋宮会長の支援をしていましたし……関係がないとは言えませんね」"

[[dialogue]]
speaker = "unk"
# まさか、そんな事故があったとは……
なんか、すみません……
line = "まさか、そんな事故があったとは……\nなんか、すみません……"

[[dialogue]]
speaker = "オオヒメ"
# 「い、いや、謝罪の必要はない。そもそもセイファートに敗れ、堕天した私が悪いのだから」
line = "「い、いや、謝罪の必要はない。そもそもセイファートに敗れ、堕天した私が悪いのだから」"

[[dialogue]]
speaker = "オオヒメ"
# 「堕天使である私が倒されるのは世界のためにもよいことだ。しかし守護天使として自信を失うには十分な出来事だった……」
line = "「堕天使である私が倒されるのは世界のためにもよいことだ。しかし守護天使として自信を失うには十分な出来事だった……」"

[[dialogue]]
speaker = "unk"
# 大丈夫、オオヒメ様は立派な守護天使ですよ
line = "大丈夫、オオヒメ様は立派な守護天使ですよ"

[[dialogue]]
speaker = "オオヒメ"
# 「！　そ、そうか……あなたはそう言ってくれるのか」
line = "「！　そ、そうか……あなたはそう言ってくれるのか」"

[[dialogue]]
speaker = "フィオナ"
# 「守護天使様は幾千幾万年の間世界を守ってきたんですから、一度や二度の失敗くらいありますよ。気にしなくていいと思います」
line = "「守護天使様は幾千幾万年の間世界を守ってきたんですから、一度や二度の失敗くらいありますよ。気にしなくていいと思います」"

[[dialogue]]
speaker = "オオヒメ"
# 「そう言ってくれるとありがたい……あなたたちは優しいのだな」
line = "「そう言ってくれるとありがたい……あなたたちは優しいのだな」"

[[dialogue]]
speaker = "unk"
# 望むところです
今後は手を取り合い、リクリエを防ぎましょう！
line = "望むところです\n今後は手を取り合い、リクリエを防ぎましょう！"

[[dialogue]]
speaker = "オオヒメ"
# 「う、うむ……そうだな」
line = "「う、うむ……そうだな」"

[[dialogue]]
speaker = "フィオナ"
# 「オオヒメ様、まだ何かしがらみが……？」
line = "「オオヒメ様、まだ何かしがらみが……？」"

[[dialogue]]
speaker = "オオヒメ"
# 「いや、そうではない、そうではないぞ。いわゆる握手……握手をすればいいのだな？　よ、よろしく頼む」
line = "「いや、そうではない、そうではないぞ。いわゆる握手……握手をすればいいのだな？　よ、よろしく頼む」"

[[dialogue]]
speaker = "unk"
# ようやく握り返してきたオオヒメ様の手をギュッと握る。
line = "ようやく握り返してきたオオヒメ様の手をギュッと握る。"

[[dialogue]]
speaker = "オオヒメ"
# 「ひゃんっ！？」
line = "「ひゃんっ！？」"

[[dialogue]]
speaker = "フィオナ"
# 「え、今の可愛らしい声……オオヒメ様ですか？」
line = "「え、今の可愛らしい声……オオヒメ様ですか？」"

[[dialogue]]
speaker = "オオヒメ"
# 「驚いてしまって、な……その、なんだ……魔王の手は、とても大きく……温かいのだな……？」
line = "「驚いてしまって、な……その、なんだ……魔王の手は、とても大きく……温かいのだな……？」"

[[dialogue]]
speaker = "unk"
# 普通だと思いますけど
line = "普通だと思いますけど"

[[dialogue]]
speaker = "オオヒメ"
# 「そ、そうなのか……これが男性の普通なのか……」
line = "「そ、そうなのか……これが男性の普通なのか……」"

[[dialogue]]
speaker = "フィオナ"
# 「オオヒメ様？　なんだか様子が……」
line = "「オオヒメ様？　なんだか様子が……」"

[[dialogue]]
speaker = "オオヒメ"
# 「私は、その……引きこもってばかりだったし……存じている通り、守護天使には女しかいないものでな……？」
line = "「私は、その……引きこもってばかりだったし……存じている通り、守護天使には女しかいないものでな……？」"

[[dialogue]]
speaker = "オオヒメ"
# 「永きに渡って生きてきたが、異性と肉体的接触をしたのは、この握手が初めて……あなたが私の初めての男だ」
line = "「永きに渡って生きてきたが、異性と肉体的接触をしたのは、この握手が初めて……あなたが私の初めての男だ」"

[[dialogue]]
speaker = "フィオナ"
# 「そ、その言い回しは……なんだか……」
line = "「そ、その言い回しは……なんだか……」"

[[dialogue]]
speaker = "オオヒメ"
# 「固い握手により盟約は交わされた。魔王よ……末永く頼むぞ」
line = "「固い握手により盟約は交わされた。魔王よ……末永く頼むぞ」"
