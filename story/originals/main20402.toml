[[dialogue]]
speaker = "unk"
# 第２話,真なる神,B
line = "第２話,真なる神,B"

[[dialogue]]
speaker = "梨緒"
# 「真なる神……に関連する書籍はないか。ワード検索にも引っかかってはくれないな」
line = "「真なる神……に関連する書籍はないか。ワード検索にも引っかかってはくれないな」"

[[dialogue]]
speaker = "unk"
# 翌日。選挙管理委員会のメンバーは、ジグの語った“真なる神”について調べていた。
line = "翌日。選挙管理委員会のメンバーは、ジグの語った“真なる神”について調べていた。"

[[dialogue]]
speaker = "ナターシャ"
# 「ディザスターハンドもついでに調べる？」
line = "「ディザスターハンドもついでに調べる？」"

[[dialogue]]
speaker = "梨緒"
# 「……いや、その名称は私たちが付けたものだ。文献はないだろう。今は“真なる神”に集中しよう」
line = "「……いや、その名称は私たちが付けたものだ。文献はないだろう。今は“真なる神”に集中しよう」"

[[dialogue]]
speaker = "unk"
# ディザスターハンドとの遭遇や、その情報は、ベアトリスたち他の選挙管理委員にも共有しておいた。
line = "ディザスターハンドとの遭遇や、その情報は、ベアトリスたち他の選挙管理委員にも共有しておいた。"

[[dialogue]]
speaker = "梨緒"
# （アポロはリクリエの使徒であった頃に、ディザスターハンドに一度助けられたそうだ。だがそんな彼女にとっても、あれは正体不明の存在らしい）
line = "（アポロはリクリエの使徒であった頃に、ディザスターハンドに一度助けられたそうだ。だがそんな彼女にとっても、あれは正体不明の存在らしい）"

[[dialogue]]
speaker = "ベアトリス"
# 「ムムムム……」
line = "「ムムムム……」"

[[dialogue]]
speaker = "梨緒"
# 「ベアトは何か見つけたか？」
line = "「ベアトは何か見つけたか？」"

[[dialogue]]
speaker = "ベアトリス"
# 「ひゃぁっ！？」
line = "「ひゃぁっ！？」"

[[dialogue]]
speaker = "梨緒"
# 「読んでいるのは……ここ数年のリクリエのレポートか。“真なる神”について情報はありそうか？」
line = "「読んでいるのは……ここ数年のリクリエのレポートか。“真なる神”について情報はありそうか？」"

[[dialogue]]
speaker = "ベアトリス"
# 「う、ううん、“真なる神”のことは何も……。調べるなら昔の本の方がいいかもね……」
line = "「う、ううん、“真なる神”のことは何も……。調べるなら昔の本の方がいいかもね……」"

[[dialogue]]
speaker = "アポロ"
# 「んー……」
line = "「んー……」"

[[dialogue]]
speaker = "梨緒"
# 「アポロ？」
line = "「アポロ？」"

[[dialogue]]
speaker = "アポロ"
# 「神……といえば、ひとつ心当たりを思い出したんだ。フィオナから聞いた話なんだが──」
line = "「神……といえば、ひとつ心当たりを思い出したんだ。フィオナから聞いた話なんだが──」"

[[dialogue]]
speaker = "アポロ"
# 「フィオナたちがフィーニスの塔の第零層を通った時、大昔の亡霊に出会ったらしい」
line = "「フィオナたちがフィーニスの塔の第零層を通った時、大昔の亡霊に出会ったらしい」"

[[dialogue]]
speaker = "アポロ"
# 「そしてそいつはこう言ったそうだ」
line = "「そしてそいつはこう言ったそうだ」"

[[dialogue]]
speaker = "敗残の亡霊"
# 『リク……リエは……黙示録の表す……崇高なる天の啓示……』
line = "『リク……リエは……黙示録の表す……崇高なる天の啓示……』"

[[dialogue]]
speaker = "敗残の亡霊"
# 『よって……世界の再創生とは……女神をも超越する……チャカパラ神のご意思なのだァ……ッ……！！』
line = "『よって……世界の再創生とは……女神をも超越する……チャカパラ神のご意思なのだァ……ッ……！！』"

[[dialogue]]
speaker = "梨緒"
# 「女神をも超越する神……ジグが言っていたことに近いな」
line = "「女神をも超越する神……ジグが言っていたことに近いな」"

[[dialogue]]
speaker = "アポロ"
# 「何でもその亡霊は３０００年前、魔王ラクシスと戦ったバジュラ教団ってやつで、女神じゃなくてチャカパラ神ってのを信仰していたらしい」
line = "「何でもその亡霊は３０００年前、魔王ラクシスと戦ったバジュラ教団ってやつで、女神じゃなくてチャカパラ神ってのを信仰していたらしい」"

[[dialogue]]
speaker = "梨緒"
# 「そのチャカパラ神と、ジグの言う“真なる神”が同一の存在であるかもしれないわけか」
line = "「そのチャカパラ神と、ジグの言う“真なる神”が同一の存在であるかもしれないわけか」"

[[dialogue]]
speaker = "アポロ"
# 「女神より上にいる神……なんてのは信じがたいけどな。まぁその正体が何であれ、同じものを指している可能性は高いんじゃないか」
line = "「女神より上にいる神……なんてのは信じがたいけどな。まぁその正体が何であれ、同じものを指している可能性は高いんじゃないか」"

[[dialogue]]
speaker = "梨緒"
# 「ああ。ではチャカパラ神にも範囲を広げて調べてみよう」
line = "「ああ。ではチャカパラ神にも範囲を広げて調べてみよう」"

[[dialogue]]
speaker = "ナターシャ"
# 「うーん……チャカパラ神も調べてみたけど、全然本が見つからないね」
line = "「うーん……チャカパラ神も調べてみたけど、全然本が見つからないね」"

[[dialogue]]
speaker = "梨緒"
# 「空振りか。そう簡単に見つかるとは思っていなかったが、歯がゆいな……」
line = "「空振りか。そう簡単に見つかるとは思っていなかったが、歯がゆいな……」"

[[dialogue]]
speaker = "ベアトリス"
# 「変な信仰って言うと、私も魔界で聞いたことあるような……」
line = "「変な信仰って言うと、私も魔界で聞いたことあるような……」"

[[dialogue]]
speaker = "梨緒"
# 「まだバジュラ教団が残っていたのか？」
line = "「まだバジュラ教団が残っていたのか？」"

[[dialogue]]
speaker = "ベアトリス"
# 「ああいや、信じてたのはチャカパラ神じゃなくて……ペルテラ？　ああいや、ペンテラ様だったかな？」
line = "「ああいや、信じてたのはチャカパラ神じゃなくて……ペルテラ？　ああいや、ペンテラ様だったかな？」"

[[dialogue]]
speaker = "ナターシャ"
# 「そういう変な名前シリーズだと、私も聖庭園の資料で見たかな」
line = "「そういう変な名前シリーズだと、私も聖庭園の資料で見たかな」"

[[dialogue]]
speaker = "ナターシャ"
# 「１０００年くらい前に、天界の田舎の方で、ジャミール神ってのを祀る信仰があったとか。すぐ消えちゃったらしいけどね」
line = "「１０００年くらい前に、天界の田舎の方で、ジャミール神ってのを祀る信仰があったとか。すぐ消えちゃったらしいけどね」"

[[dialogue]]
speaker = "アポロ"
# 「なんだそりゃ。チャカパラ神以外も似たようなのがあるのか？　しかもふざけた名前ばっかりだな」
line = "「なんだそりゃ。チャカパラ神以外も似たようなのがあるのか？　しかもふざけた名前ばっかりだな」"

[[dialogue]]
speaker = "梨緒"
# 「……頭が痛くなってきた。名称が多数ある上に、それらが同一のものを指すかもわからないとは……」
line = "「……頭が痛くなってきた。名称が多数ある上に、それらが同一のものを指すかもわからないとは……」"

[[dialogue]]
speaker = "梨緒"
# 「これ以上は私たちだけで探すのは難しそうだ。司書に資料の捜索を依頼しつつ、星徒会にも情報を共有しておこう」
line = "「これ以上は私たちだけで探すのは難しそうだ。司書に資料の捜索を依頼しつつ、星徒会にも情報を共有しておこう」"

[[dialogue]]
speaker = "ナターシャ"
# 「そだね。それが効率的かも」
line = "「そだね。それが効率的かも」"

[[dialogue]]
speaker = "梨緒"
# （“真なる神”に関連する資料はなかった。だがチャカパラ神と同じ存在かもしれない……という推測ができたのは前進か）
line = "（“真なる神”に関連する資料はなかった。だがチャカパラ神と同じ存在かもしれない……という推測ができたのは前進か）"

[[dialogue]]
speaker = "梨緒"
# 「それともうひとつ、図書館で調べたいことがある」
line = "「それともうひとつ、図書館で調べたいことがある」"

[[dialogue]]
speaker = "梨緒"
# 「私とジグが平行世界の出身であるかもしれない、ということは話しただろう」
line = "「私とジグが平行世界の出身であるかもしれない、ということは話しただろう」"

[[dialogue]]
speaker = "梨緒"
# 「その推測は筋が通っている。だがそれでも私は信じきれなかった。私が平行世界から来たのなら、居るべき者がここに居ないからだ」
line = "「その推測は筋が通っている。だがそれでも私は信じきれなかった。私が平行世界から来たのなら、居るべき者がここに居ないからだ」"

[[dialogue]]
speaker = "ベアトリス"
# 「居るべき者……？」
line = "「居るべき者……？」"

[[dialogue]]
speaker = "梨緒"
# 「アルタイルの私だ」
line = "「アルタイルの私だ」"

[[dialogue]]
speaker = "ベアトリス"
# 「！　そうか……梨緒ちゃんが他の世界の梨緒ちゃんなら、こっちの世界の梨緒ちゃんもいないとおかしいんだ」
line = "「！　そうか……梨緒ちゃんが他の世界の梨緒ちゃんなら、こっちの世界の梨緒ちゃんもいないとおかしいんだ」"

[[dialogue]]
speaker = "梨緒"
# 「私が他の世界から来たのなら、この世界の私がいるはずだ」
line = "「私が他の世界から来たのなら、この世界の私がいるはずだ」"

[[dialogue]]
speaker = "梨緒"
# 「戸籍に関しては、梨緒・Ａ・クリステレスという人間が流星市国にいないか、キリカさんにお願いして調べてもらっている」
line = "「戸籍に関しては、梨緒・Ａ・クリステレスという人間が流星市国にいないか、キリカさんにお願いして調べてもらっている」"

[[dialogue]]
speaker = "梨緒"
# 「本来は個人情報だが、平行世界関連のことなので特別に許可してもらった」
line = "「本来は個人情報だが、平行世界関連のことなので特別に許可してもらった」"

[[dialogue]]
speaker = "梨緒"
# 「だから図書館では、梨緒という星騎士の痕跡がないか、レポートなどで調べたい」
line = "「だから図書館では、梨緒という星騎士の痕跡がないか、レポートなどで調べたい」"

[[dialogue]]
speaker = "ベアトリス"
# 「うん、わかった。じゃあここ数年のを調べてみるね」
line = "「うん、わかった。じゃあここ数年のを調べてみるね」"

[[dialogue]]
speaker = "ベアトリス"
# （最近の資料なら、ついでに私の調べものもできるかな。一緒に調べさせてもらおうっと）
line = "（最近の資料なら、ついでに私の調べものもできるかな。一緒に調べさせてもらおうっと）"

[[dialogue]]
speaker = "ナターシャ"
# 「でもこっちの梨緒も星騎士になってるとは限らないよ？」
line = "「でもこっちの梨緒も星騎士になってるとは限らないよ？」"

[[dialogue]]
speaker = "梨緒"
# 「自分に星力があるとわかった時、私は迷わず星騎士を志した。この世界に私がいるのなら絶対に星騎士になっているはずだ」
line = "「自分に星力があるとわかった時、私は迷わず星騎士を志した。この世界に私がいるのなら絶対に星騎士になっているはずだ」"

[[dialogue]]
speaker = "梨緒"
# （そうだ。無辜の人々を守るために、私は星騎士になった）
line = "（そうだ。無辜の人々を守るために、私は星騎士になった）"

[[dialogue]]
speaker = "幼い梨緒"
# 『私が星騎士になれる……！？　こんな私でも……？』
line = "『私が星騎士になれる……！？　こんな私でも……？』"

[[dialogue]]
speaker = "unk"
# 『星騎士になれば、私は──』
line = "『星騎士になれば、私は──』"

[[dialogue]]
speaker = "梨緒"
# （元々私は弱かった。駆けっこは誰にも勝てなくて、勉強も得意じゃなくて、お絵かきも下手くそで……そんな自分が情けなくていつも泣いていた）
line = "（元々私は弱かった。駆けっこは誰にも勝てなくて、勉強も得意じゃなくて、お絵かきも下手くそで……そんな自分が情けなくていつも泣いていた）"

[[dialogue]]
speaker = "梨緒"
# （星騎士になれると聞いて、私は嬉しかった。そんな弱い自分でも戦えることが。誰かの役に立てることが）
line = "（星騎士になれると聞いて、私は嬉しかった。そんな弱い自分でも戦えることが。誰かの役に立てることが）"

[[dialogue]]
speaker = "ナターシャ"
# 「絶対、か。すごい自信だね。まぁいいや、そこまで言うなら調べてみるよ」
line = "「絶対、か。すごい自信だね。まぁいいや、そこまで言うなら調べてみるよ」"

[[dialogue]]
speaker = "梨緒"
# 「ああ、頼む」
line = "「ああ、頼む」"

[[dialogue]]
speaker = "unk"
# それから選挙管理委員会の４人は図書館の資料を調べたが──
line = "それから選挙管理委員会の４人は図書館の資料を調べたが──"

[[dialogue]]
speaker = "ナターシャ"
# 「戦闘レポートやら事件報告を漁ってみたけど名前はないね。クリステレス姓じゃない可能性も考えて、梨緒だけで検索してもヒットなし」
line = "「戦闘レポートやら事件報告を漁ってみたけど名前はないね。クリステレス姓じゃない可能性も考えて、梨緒だけで検索してもヒットなし」"

[[dialogue]]
speaker = "梨緒"
# 「さっきキリカさんからもメールが届いた。流星市国及びその近辺で、『梨緒・Ａ・クリステレス』という人間が住んでいた記録はないそうだ」
line = "「さっきキリカさんからもメールが届いた。流星市国及びその近辺で、『梨緒・Ａ・クリステレス』という人間が住んでいた記録はないそうだ」"

[[dialogue]]
speaker = "梨緒"
# 「私の痕跡はなし……か。すまない、無駄な時間を使わせたな」
line = "「私の痕跡はなし……か。すまない、無駄な時間を使わせたな」"

[[dialogue]]
speaker = "ベアトリス"
# 「ううん、確かめなきゃいけない大事なことだもん。無駄なんかじゃないよ」
line = "「ううん、確かめなきゃいけない大事なことだもん。無駄なんかじゃないよ」"

[[dialogue]]
speaker = "ナターシャ"
# 「でも流星市国にいないなら、この世界の梨緒はどこにいるんだろうね？　昔はイングランドに住んでたって言ってたしそこかな？」
line = "「でも流星市国にいないなら、この世界の梨緒はどこにいるんだろうね？　昔はイングランドに住んでたって言ってたしそこかな？」"

[[dialogue]]
speaker = "梨緒"
# 「新星学園ではなく、イングランドの流星学園分校という可能性もあるか……。マリーベルに聞いてみよう。あとは流星学園のジュエリーも確か同郷だったか」
line = "「新星学園ではなく、イングランドの流星学園分校という可能性もあるか……。マリーベルに聞いてみよう。あとは流星学園のジュエリーも確か同郷だったか」"

[[dialogue]]
speaker = "アポロ"
# 「いや──」
line = "「いや──」"

[[dialogue]]
speaker = "梨緒"
# 「？　アポロ、どうした？」
line = "「？　アポロ、どうした？」"

[[dialogue]]
speaker = "アポロ"
# 「ああいや、なんでもない……」
line = "「ああいや、なんでもない……」"

[[dialogue]]
speaker = "unk"
# 一瞬口を挟もうとしたアポロだが、険しい顔で言葉を呑み込む。
line = "一瞬口を挟もうとしたアポロだが、険しい顔で言葉を呑み込む。"

[[dialogue]]
speaker = "梨緒"
# 「珍しく歯切れが悪いな。君らしくない」
line = "「珍しく歯切れが悪いな。君らしくない」"

[[dialogue]]
speaker = "梨緒"
# 「……何か心当たりがあるのか？」
line = "「……何か心当たりがあるのか？」"

[[dialogue]]
speaker = "アポロ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# アポロは首を振ることも頷くこともしないが、その無言の返事が、肯定を表していた。
line = "アポロは首を振ることも頷くこともしないが、その無言の返事が、肯定を表していた。"

[[dialogue]]
speaker = "梨緒"
# 「思い付いたことがあるなら言ってくれ」
line = "「思い付いたことがあるなら言ってくれ」"

[[dialogue]]
speaker = "梨緒"
# 「たとえ目を背けたいことであっても、真相に近づかなければ前に進めない。知らなければいけないことなんだ」
line = "「たとえ目を背けたいことであっても、真相に近づかなければ前に進めない。知らなければいけないことなんだ」"

[[dialogue]]
speaker = "アポロ"
# 「……わかった」
line = "「……わかった」"

[[dialogue]]
speaker = "アポロ"
# 「アルタイルの梨緒は……もうこの世にいないんじゃないかと思うんだ」
line = "「アルタイルの梨緒は……もうこの世にいないんじゃないかと思うんだ」"

[[dialogue]]
speaker = "梨緒"
# 「──！」
line = "「──！」"

[[dialogue]]
speaker = "ナターシャ"
# 「まぁ確かに、こんだけ痕跡がないとそういう可能性も考えるよね。でもアポロには、そう思う別の根拠がある感じかな？」
line = "「まぁ確かに、こんだけ痕跡がないとそういう可能性も考えるよね。でもアポロには、そう思う別の根拠がある感じかな？」"

[[dialogue]]
speaker = "アポロ"
# 「ああ。また平行世界の話になるんだが……」
line = "「ああ。また平行世界の話になるんだが……」"

[[dialogue]]
speaker = "アポロ"
# 「基本的に、同一人物は同じ世界に存在し得ない。あたしがそうであったように」
line = "「基本的に、同一人物は同じ世界に存在し得ない。あたしがそうであったように」"

[[dialogue]]
speaker = "アポロ"
# 「デネブのあたしが元の世界に戻ることで、長年眠っていたアルタイルのあたしは目を覚ました」
line = "「デネブのあたしが元の世界に戻ることで、長年眠っていたアルタイルのあたしは目を覚ました」"

[[dialogue]]
speaker = "梨緒"
# 「私が今こうして不自由なく行動できているのなら──」
line = "「私が今こうして不自由なく行動できているのなら──」"

[[dialogue]]
speaker = "アポロ"
# 「アルタイルの梨緒はもういなくなってるかもしれない、ということだ」
line = "「アルタイルの梨緒はもういなくなってるかもしれない、ということだ」"

[[dialogue]]
speaker = "梨緒"
# 「確かに、私がいないと推測するには十分だな。その可能性も探ってみるべきだろう」
line = "「確かに、私がいないと推測するには十分だな。その可能性も探ってみるべきだろう」"

[[dialogue]]
speaker = "ナターシャ"
# 「んー……でも梨緒が命を落としていたとして、どう確かめる？　どこに聞けばいいのかな？」
line = "「んー……でも梨緒が命を落としていたとして、どう確かめる？　どこに聞けばいいのかな？」"

[[dialogue]]
speaker = "梨緒"
# 「……私が幼い頃、イングランドに住んでいた時、近所にモンスターが現れたことがあった」
line = "「……私が幼い頃、イングランドに住んでいた時、近所にモンスターが現れたことがあった」"

[[dialogue]]
speaker = "梨緒"
# 「モンスターはすぐに討伐されたと聞いている。実際、私はそのモンスターをこの目で見てすらない」
line = "「モンスターはすぐに討伐されたと聞いている。実際、私はそのモンスターをこの目で見てすらない」"

[[dialogue]]
speaker = "梨緒"
# 「だが、もしも亡くなっているとしたら、きっとその時だ」
line = "「だが、もしも亡くなっているとしたら、きっとその時だ」"

[[dialogue]]
speaker = "梨緒"
# 「また特例になるが、その一件で犠牲者がいないか、教皇庁伝手に問い合わせるしかないだろう」
line = "「また特例になるが、その一件で犠牲者がいないか、教皇庁伝手に問い合わせるしかないだろう」"

[[dialogue]]
speaker = "アポロ"
# 「それならあたしも一緒に頼んでみるぞ。同じ選管の仲間のことだからな」
line = "「それならあたしも一緒に頼んでみるぞ。同じ選管の仲間のことだからな」"

[[dialogue]]
speaker = "梨緒"
# 「ああ、助かる」
line = "「ああ、助かる」"

[[dialogue]]
speaker = "unk"
# それから梨緒とアポロは星見家に戻り、キリカを通して教皇庁に要請を伝えたのだった。
line = "それから梨緒とアポロは星見家に戻り、キリカを通して教皇庁に要請を伝えたのだった。"
