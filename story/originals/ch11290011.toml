[[dialogue]]
speaker = "unk"
# 第１話,アルタイル,P
line = "第１話,アルタイル,P"

[[dialogue]]
speaker = "unk"
# 別世界であるデネブから、元いた世界アルタイルへと戻ってきて──
line = "別世界であるデネブから、元いた世界アルタイルへと戻ってきて──"

[[dialogue]]
speaker = "unk"
# その際に保護したエステルの身柄は、極星学園との戦いが収まるまで星見家で預かることになった。
line = "その際に保護したエステルの身柄は、極星学園との戦いが収まるまで星見家で預かることになった。"

[[dialogue]]
speaker = "フィオナ"
# 「戦いがいつまで続くかはわかりませんが、それまでの間は当家でゆっくりお過ごしください」
line = "「戦いがいつまで続くかはわかりませんが、それまでの間は当家でゆっくりお過ごしください」"

[[dialogue]]
speaker = "梨緒"
# 「別世界からやってきて戸惑うことも多いだろう。似た境遇に身を置く者同士、助け合っていこう」
line = "「別世界からやってきて戸惑うことも多いだろう。似た境遇に身を置く者同士、助け合っていこう」"

[[dialogue]]
speaker = "エステル"
# 「フィオナさん、梨緒さん、ありがとうございます」
line = "「フィオナさん、梨緒さん、ありがとうございます」"

[[dialogue]]
speaker = "フィオナ"
# 「ナミエル。エステルさんの身の回りのお世話はお願いね」
line = "「ナミエル。エステルさんの身の回りのお世話はお願いね」"

[[dialogue]]
speaker = "ナミエル"
# 「お任せください、フィオナお嬢様」
line = "「お任せください、フィオナお嬢様」"

[[dialogue]]
speaker = "ナミエル"
# 「エステルさま、ナミエルと申します。こちらの世界にご滞在の間、身の回りのお世話をさせていただきます。どうぞよろしくお願い致します」
line = "「エステルさま、ナミエルと申します。こちらの世界にご滞在の間、身の回りのお世話をさせていただきます。どうぞよろしくお願い致します」"

[[dialogue]]
speaker = "エステル"
# 「これはご丁寧に。こちらこそよろしくお願いしますね、ナミエルさん」
line = "「これはご丁寧に。こちらこそよろしくお願いしますね、ナミエルさん」"

[[dialogue]]
speaker = "エステル"
# 「けれど、こんなに色々していただいて良いのでしょうか？　何だか申し訳なくなってしまいます」
line = "「けれど、こんなに色々していただいて良いのでしょうか？　何だか申し訳なくなってしまいます」"

[[dialogue]]
speaker = "フィオナ"
# 「遠慮することはないですよ。エステルさんは大切なお客様なのですから」
line = "「遠慮することはないですよ。エステルさんは大切なお客様なのですから」"

[[dialogue]]
speaker = "ナミエル"
# 「はい、何なりとお申し付けください」
line = "「はい、何なりとお申し付けください」"

[[dialogue]]
speaker = "エステル"
# 「ありがとうございます」
line = "「ありがとうございます」"

[[dialogue]]
speaker = "アポロ"
# 「おーい！　新しくうちで過ごすことになったって奴がいるんだろ？　顔を見に来たぞ！」
line = "「おーい！　新しくうちで過ごすことになったって奴がいるんだろ？　顔を見に来たぞ！」"

[[dialogue]]
speaker = "エステル"
# 「あら……？」
line = "「あら……？」"

[[dialogue]]
speaker = "アポロ"
# 「どれどれ、ふーん……こいつか。あたしはアポロだ、よろしくなっ！」
line = "「どれどれ、ふーん……こいつか。あたしはアポロだ、よろしくなっ！」"

[[dialogue]]
speaker = "エステル"
# 「アポロさん！　やはりあなたはアポロさんなのですね！？」
line = "「アポロさん！　やはりあなたはアポロさんなのですね！？」"

[[dialogue]]
speaker = "梨緒"
# 「そうだ。彼女がこちらの世界のアポロだ」
line = "「そうだ。彼女がこちらの世界のアポロだ」"

[[dialogue]]
speaker = "アポロ"
# 「ん？　それってもしかして……デネブであっちのあたしと会ったのか！？」
line = "「ん？　それってもしかして……デネブであっちのあたしと会ったのか！？」"

[[dialogue]]
speaker = "梨緒"
# 「そうなんだ。もっとも向こうの世界のアポロは、君よりもずっと大人びた姿をしていたがな」
line = "「そうなんだ。もっとも向こうの世界のアポロは、君よりもずっと大人びた姿をしていたがな」"

[[dialogue]]
speaker = "エステル"
# 「はい。ですからひと目見ただけでは分かりませんでしたけど……確かにその面影はあります」
line = "「はい。ですからひと目見ただけでは分かりませんでしたけど……確かにその面影はあります」"

[[dialogue]]
speaker = "アポロ"
# 「……どういうことだ？　あっちのあたしはそんなに成長してるってことか？」
line = "「……どういうことだ？　あっちのあたしはそんなに成長してるってことか？」"

[[dialogue]]
speaker = "アポロ"
# 「むぅぅ……！　使徒としてアルタイルに居た時は、今のあたしと同じ体型だったってのに！」
line = "「むぅぅ……！　使徒としてアルタイルに居た時は、今のあたしと同じ体型だったってのに！」"

[[dialogue]]
speaker = "フィオナ"
# 「というか寸分たがわず同じ体型でしたね」
line = "「というか寸分たがわず同じ体型でしたね」"

[[dialogue]]
speaker = "アポロ"
# 「そうだ！　それがなんで向こうのあたしだけ、そんな大人になってるんだ！　ずるいっ！」
line = "「そうだ！　それがなんで向こうのあたしだけ、そんな大人になってるんだ！　ずるいっ！」"

[[dialogue]]
speaker = "フィオナ"
# 「まあまあ、落ち着いてください姉さん。将来姉さんが成長したら同じような姿になるという保証が出来たわけですから」
line = "「まあまあ、落ち着いてください姉さん。将来姉さんが成長したら同じような姿になるという保証が出来たわけですから」"

[[dialogue]]
speaker = "アポロ"
# 「そうか……だったらまあいいか」
line = "「そうか……だったらまあいいか」"

[[dialogue]]
speaker = "アポロ"
# 「よろしくな、ええと……」
line = "「よろしくな、ええと……」"

[[dialogue]]
speaker = "エステル"
# 「エステルです、よろしくお願いします」
line = "「エステルです、よろしくお願いします」"

[[dialogue]]
speaker = "アポロ"
# 「おうっ！！！」
line = "「おうっ！！！」"

[[dialogue]]
speaker = "アポロ"
# 「……真っ先に、大聖堂へ案内して欲しいなんて。どこでも案内してやるって言ってるのに」
line = "「……真っ先に、大聖堂へ案内して欲しいなんて。どこでも案内してやるって言ってるのに」"

[[dialogue]]
speaker = "エステル"
# 「ふふっ、ありがとうございます。でも、まずは女神様への祈りを捧げたくて」
line = "「ふふっ、ありがとうございます。でも、まずは女神様への祈りを捧げたくて」"

[[dialogue]]
speaker = "アポロ"
# 「ふーん……変わったやつだな」
line = "「ふーん……変わったやつだな」"

[[dialogue]]
speaker = "シャロン"
# 「いえいえ、素晴らしいお心がけだと思います！」
line = "「いえいえ、素晴らしいお心がけだと思います！」"

[[dialogue]]
speaker = "エステル"
# 「あなた方は……」
line = "「あなた方は……」"

[[dialogue]]
speaker = "シャロン"
# 「こちらの大聖堂にてお勤めさせて頂いているシスター、シャロン・ミストリアと申します」
line = "「こちらの大聖堂にてお勤めさせて頂いているシスター、シャロン・ミストリアと申します」"

[[dialogue]]
speaker = "イレーナ"
# 「神官のイレーナ・ロレンツェッティです。ようこそおいで下さいました」
line = "「神官のイレーナ・ロレンツェッティです。ようこそおいで下さいました」"

[[dialogue]]
speaker = "エステル"
# 「初めまして、エステル・ミルフォードと申します」
line = "「初めまして、エステル・ミルフォードと申します」"

[[dialogue]]
speaker = "シャロン"
# 「こちらの世界に来て、まず何より先に大聖堂へ足を運んでくださるなんて……エステルさまは深い信仰心をお持ちなのですね」
line = "「こちらの世界に来て、まず何より先に大聖堂へ足を運んでくださるなんて……エステルさまは深い信仰心をお持ちなのですね」"

[[dialogue]]
speaker = "エステル"
# 「深い信仰心……もちろん女神様への信仰は忘れたことはありません」
line = "「深い信仰心……もちろん女神様への信仰は忘れたことはありません」"

[[dialogue]]
speaker = "エステル"
# 「ですが私が祈るのは、リクリエによって犠牲となった方々に対して、哀悼の気持ちを忘れずに持ち続けたいからなのです」
line = "「ですが私が祈るのは、リクリエによって犠牲となった方々に対して、哀悼の気持ちを忘れずに持ち続けたいからなのです」"

[[dialogue]]
speaker = "アポロ"
# 「エステル……おまえ……」
line = "「エステル……おまえ……」"

[[dialogue]]
speaker = "エステル"
# 「デネブは、リクリエによって甚大な被害を受けました」
line = "「デネブは、リクリエによって甚大な被害を受けました」"

[[dialogue]]
speaker = "エステル"
# 「多くの人々がその犠牲となりました。魔王様がいなければあの時、私もその犠牲者の１人となっていたでしょう」
line = "「多くの人々がその犠牲となりました。魔王様がいなければあの時、私もその犠牲者の１人となっていたでしょう」"

[[dialogue]]
speaker = "エステル"
# 「こうして救われた私が、亡くなった方々のために出来ることといえば……祈りをささげることだけですから。そうですよね、魔王様」
line = "「こうして救われた私が、亡くなった方々のために出来ることといえば……祈りをささげることだけですから。そうですよね、魔王様」"

[[dialogue]]
speaker = "unk"
# エステルの祈りで救われてる
line = "エステルの祈りで救われてる"

[[dialogue]]
speaker = "unk"
# そうかもしれないな
line = "そうかもしれないな"

[[dialogue]]
speaker = "シャロン"
# 「エステルさま……色々とお辛いご経験をされてきたのですね？」
line = "「エステルさま……色々とお辛いご経験をされてきたのですね？」"

[[dialogue]]
speaker = "シャロン"
# 「私は今、切実に思いますっ。あなたのお力になりたいと！」
line = "「私は今、切実に思いますっ。あなたのお力になりたいと！」"

[[dialogue]]
speaker = "シャロン"
# 「何かして欲しいことはありませんかっ？　元気の出るおまじないをかけますかっ？　それとも心の落ち着くマッサージはいかがですかっ？」
line = "「何かして欲しいことはありませんかっ？　元気の出るおまじないをかけますかっ？　それとも心の落ち着くマッサージはいかがですかっ？」"

[[dialogue]]
speaker = "イレーナ"
# 「シャロン……落ち着いてください」
line = "「シャロン……落ち着いてください」"

[[dialogue]]
speaker = "エステル"
# 「ふふっ、ありがとうございますシャロンさん。お気持ちだけでもとても嬉しいです」
line = "「ふふっ、ありがとうございますシャロンさん。お気持ちだけでもとても嬉しいです」"

[[dialogue]]
speaker = "エステル"
# 「そうですね……ではシャロンさん、私と一緒に祈って頂けないでしょうか？　デネブと、アルタイルの、尊い犠牲者のために」
line = "「そうですね……ではシャロンさん、私と一緒に祈って頂けないでしょうか？　デネブと、アルタイルの、尊い犠牲者のために」"

[[dialogue]]
speaker = "シャロン"
# 「もちろんですっ。共に祈りましょう、エステルさまっ」
line = "「もちろんですっ。共に祈りましょう、エステルさまっ」"

[[dialogue]]
speaker = "unk"
# ２人は揃って女神様への祈りを捧げ始める。
line = "２人は揃って女神様への祈りを捧げ始める。"

[[dialogue]]
speaker = "unk"
# 少し話を聞いただけでも、エステルとシャロンの相性は抜群に良さそうだった。
line = "少し話を聞いただけでも、エステルとシャロンの相性は抜群に良さそうだった。"

[[dialogue]]
speaker = "unk"
# 逆にイレーナは、面倒な子が増えたかもしれない、とでも言いたげな表情を浮かべながら、祈りをささげる様子を眺めていたのだった。
line = "逆にイレーナは、面倒な子が増えたかもしれない、とでも言いたげな表情を浮かべながら、祈りをささげる様子を眺めていたのだった。"
