[[dialogue]]
speaker = "unk"
# 夏の時期に入ったある日のこと。
line = "夏の時期に入ったある日のこと。"

[[dialogue]]
speaker = "unk"
# 俺は公安委員会の案件で相談したいことがあると、リゾート結界で待ち合わせることになった。
line = "俺は公安委員会の案件で相談したいことがあると、リゾート結界で待ち合わせることになった。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「会長、お待たせ～」
line = "「会長、お待たせ～」"

[[dialogue]]
speaker = "unk"
# 背後から声を掛けられて、振り返ると――
line = "背後から声を掛けられて、振り返ると――"

[[dialogue]]
speaker = "ネーゼマイン"
# 「じゃじゃ～ん☆　水着姿の爆弾サプラ～イズ♪」
line = "「じゃじゃ～ん☆　水着姿の爆弾サプラ～イズ♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひ♪　会長、どう？」
line = "「にひひ♪　会長、どう？」"

[[dialogue]]
speaker = "unk"
# 可愛くて、すごく似合ってる
line = "可愛くて、すごく似合ってる"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ありがと～♪　実はこれ、ただの水着じゃなくて戦闘服なんだよね～」
line = "「ありがと～♪　実はこれ、ただの水着じゃなくて戦闘服なんだよね～」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「密かにリゾート結界の疑似守護星とリンクして、『水着フォーム』に覚醒したんだ☆」
line = "「密かにリゾート結界の疑似守護星とリンクして、『水着フォーム』に覚醒したんだ☆」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「プライベートビーチで２人きりだし、もっとじっくり見せてあげよっか？」
line = "「プライベートビーチで２人きりだし、もっとじっくり見せてあげよっか？」"

[[dialogue]]
speaker = "unk"
# 公安委員会は表向きには存在していない学園組織だ。その為、今回は誰もいないプライベートビーチの方へやって来ていた。
line = "公安委員会は表向きには存在していない学園組織だ。その為、今回は誰もいないプライベートビーチの方へやって来ていた。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ほら、透け透けのミニスカートの下、見てみる？　ぴらっ<emoji=heart04>」
line = "「ほら、透け透けのミニスカートの下、見てみる？　ぴらっ<emoji=heart04>」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひ♪　会長、顔が赤くなってるよ？　そんな反応されると、もっと悪戯したくてムラムラしてきちゃうな～<emoji=heart04>」
line = "「にひひ♪　会長、顔が赤くなってるよ？　そんな反応されると、もっと悪戯したくてムラムラしてきちゃうな～<emoji=heart04>」"

[[dialogue]]
speaker = "？？？"
# 「マインお姉ちゃん、楽しそうにしてるけど、私のこと忘れないでよ～」
line = "「マインお姉ちゃん、楽しそうにしてるけど、私のこと忘れないでよ～」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「おっと、そうだった♪」
line = "「おっと、そうだった♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「会長、実はこの子、公安委員会所属なんだけど、会長に会いたいって言っててさ～」
line = "「会長、実はこの子、公安委員会所属なんだけど、会長に会いたいって言っててさ～」"

[[dialogue]]
speaker = "リコリン"
# 「リコリンリン♪　こんにちは、会長のお兄ちゃん！　流星学園附属校２年生、リコリンだよ～☆」
line = "「リコリンリン♪　こんにちは、会長のお兄ちゃん！　流星学園附属校２年生、リコリンだよ～☆」"

[[dialogue]]
speaker = "unk"
# 初めまして。よろしくね
line = "初めまして。よろしくね"

[[dialogue]]
speaker = "リコリン"
# 「うんっ！　リコリンね、マインお姉ちゃんたちからお兄ちゃんのこと聞いてて、ずっと会ってみたかったの～♪」
line = "「うんっ！　リコリンね、マインお姉ちゃんたちからお兄ちゃんのこと聞いてて、ずっと会ってみたかったの～♪」"

[[dialogue]]
speaker = "リコリン"
# 「今回はリコリンも協力するから、よろしくね♪　てへっ☆」
line = "「今回はリコリンも協力するから、よろしくね♪　てへっ☆」"

[[dialogue]]
speaker = "リコリン"
# 「と、冗談はさておき――」
line = "「と、冗談はさておき――」"

[[dialogue]]
speaker = "リコリンフィア"
# 「初めましてだ、少年。私の名はリコリンフィアという。キミのことはマインからよく聞かされている」
line = "「初めましてだ、少年。私の名はリコリンフィアという。キミのことはマインからよく聞かされている」"

[[dialogue]]
speaker = "unk"
# え！？
line = "え！？"

[[dialogue]]
speaker = "リコリンフィア"
# 「驚いたか？　私はこう見えて、年齢的には大人でな」
line = "「驚いたか？　私はこう見えて、年齢的には大人でな」"

[[dialogue]]
speaker = "リコリンフィア"
# 「組織での役職は『公安委員会本部長』――簡潔に言えば、公安委員会のエージェント達のリーダーを務めている」
line = "「組織での役職は『公安委員会本部長』――簡潔に言えば、公安委員会のエージェント達のリーダーを務めている」"

[[dialogue]]
speaker = "リコリンフィア"
# 「マイン達がいつも世話になっているな。ここまで公安委員会の秘密を守りながら何度も協力してくれて、感謝している」
line = "「マイン達がいつも世話になっているな。ここまで公安委員会の秘密を守りながら何度も協力してくれて、感謝している」"

[[dialogue]]
speaker = "リコリンフィア"
# 「今回、キミに会いたかったのは、１度挨拶をしておきたかったこともあるが――」
line = "「今回、キミに会いたかったのは、１度挨拶をしておきたかったこともあるが――」"

[[dialogue]]
speaker = "リコリンフィア"
# 「公安委員会として、キミに協力を依頼したくてな」
line = "「公安委員会として、キミに協力を依頼したくてな」"

[[dialogue]]
speaker = "リコリンフィア"
# 「間もなく、もう１人の協力者がここに来る。揃ったら説明を……と、ちょうどいいタイミングで着いたようだ」
line = "「間もなく、もう１人の協力者がここに来る。揃ったら説明を……と、ちょうどいいタイミングで着いたようだ」"

[[dialogue]]
speaker = "リノ"
# 「ク～ロ～ト♪」
line = "「ク～ロ～ト♪」"

[[dialogue]]
speaker = "unk"
# 母さん！？
line = "母さん！？"

[[dialogue]]
speaker = "リノ"
# 「ふふっ、驚いた？　お母さんも今回、一緒に頑張っちゃうわよ～♪」
line = "「ふふっ、驚いた？　お母さんも今回、一緒に頑張っちゃうわよ～♪」"

[[dialogue]]
speaker = "unk"
# 俺の母さん――緋宮リノは、水着姿で元気な笑顔を浮かべて見せるのだった。
line = "俺の母さん――緋宮リノは、水着姿で元気な笑顔を浮かべて見せるのだった。"
