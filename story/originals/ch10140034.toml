[[dialogue]]
speaker = "unk"
# 第４話,幾久しく,P
line = "第４話,幾久しく,P"

[[dialogue]]
speaker = "トワ先生"
# 「会長くん！　今日は会長くんに大事な報告がありまして……」
line = "「会長くん！　今日は会長くんに大事な報告がありまして……」"

[[dialogue]]
speaker = "トワ先生"
# 「この前宣言したよね、新生・有明トワになりますって」
line = "「この前宣言したよね、新生・有明トワになりますって」"

[[dialogue]]
speaker = "トワ先生"
# 「それについて、なんだけど……ううっ、今からそれを報告します……」
line = "「それについて、なんだけど……ううっ、今からそれを報告します……」"

[[dialogue]]
speaker = "トワ先生"
# 「まず、部屋の片付けは……ちょっと忙しくて、全然出来てなくて……むしろ、いつもより散らかっているという有様です」
line = "「まず、部屋の片付けは……ちょっと忙しくて、全然出来てなくて……むしろ、いつもより散らかっているという有様です」"

[[dialogue]]
speaker = "トワ先生"
# 「クローゼットは入りきらなくなっちゃって、メイプルちゃんにお願いしてそっちで預かってもらいました」
line = "「クローゼットは入りきらなくなっちゃって、メイプルちゃんにお願いしてそっちで預かってもらいました」"

[[dialogue]]
speaker = "unk"
# お酒は？
line = "お酒は？"

[[dialogue]]
speaker = "トワ先生"
# 「お酒は……とてもおいしい飲み物、だと思います」
line = "「お酒は……とてもおいしい飲み物、だと思います」"

[[dialogue]]
speaker = "トワ先生"
# 「ほんと忙しくてね、飲まないとやってられなかったの。だからっ、あれから休肝日ゼロで晩酌をエンジョイしてしまいましたぁ！」
line = "「ほんと忙しくてね、飲まないとやってられなかったの。だからっ、あれから休肝日ゼロで晩酌をエンジョイしてしまいましたぁ！」"

[[dialogue]]
speaker = "トワ先生"
# 「自分から宣言しておきながら、この体たらくだよ。ほんと、わたしはとことんダメ人間だね……」
line = "「自分から宣言しておきながら、この体たらくだよ。ほんと、わたしはとことんダメ人間だね……」"

[[dialogue]]
speaker = "トワ先生"
# 「こんなので会長くんの彼女って言っていいのかな？」
line = "「こんなので会長くんの彼女って言っていいのかな？」"

[[dialogue]]
speaker = "トワ先生"
# 「会長くんだって同じかそれ以上に忙しいのに、日常生活もちゃんとしてて……すごいなぁって尊敬しちゃうよ」
line = "「会長くんだって同じかそれ以上に忙しいのに、日常生活もちゃんとしてて……すごいなぁって尊敬しちゃうよ」"

[[dialogue]]
speaker = "トワ先生"
# 「でも、わたしには無理みたい。そういうとこで評価されるのはもう諦めたよ。だからね……」
line = "「でも、わたしには無理みたい。そういうとこで評価されるのはもう諦めたよ。だからね……」"

[[dialogue]]
speaker = "トワ先生"
# 「へ、変身！」
line = "「へ、変身！」"

[[dialogue]]
speaker = "トワ先生"
