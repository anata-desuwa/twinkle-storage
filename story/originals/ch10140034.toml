line = "「ちっちゃいこと、コンプレックスに感じてたけど……会長くんが抱き心地いいなって思ってくれるなら、ちっちゃいわたしでもよかったなって」"

[[dialogue]]
speaker = "トワ先生"
# 「ほら、ぎゅってしてみて。いいんだよ、会長くんがしたいことしても」
line = "「ほら、ぎゅってしてみて。いいんだよ、会長くんがしたいことしても」"

[[dialogue]]
speaker = "unk"
