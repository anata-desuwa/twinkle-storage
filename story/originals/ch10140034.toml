line = "「もう、生活能力でわたしに期待するのは諦めて。その代わり、いっぱい可愛いことして、全力で会長くんを甘やかしてあげる！」"

[[dialogue]]
speaker = "トワ先生"
# 「か、可愛さ全振りで突撃しちゃうんだから！」
