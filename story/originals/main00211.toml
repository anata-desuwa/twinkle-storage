[[dialogue]]
speaker = "unk"
# 第１４話,第一階層・終点,B
line = "第１４話,第一階層・終点,B"

[[dialogue]]
speaker = "unk"
# 今から９年前の夏──それは、俺が覚えている限り最古に近い記憶だ。
line = "今から９年前の夏──それは、俺が覚えている限り最古に近い記憶だ。"

[[dialogue]]
speaker = "unk"
# 緋宮クロトにそれより過去の思い出は一切ない。だからこそ、あの少女との出会いは印象的だった……。
line = "緋宮クロトにそれより過去の思い出は一切ない。だからこそ、あの少女との出会いは印象的だった……。"

[[dialogue]]
speaker = "ヴィーナス"
# 「ちなみにその時もうドラ猫はいたの？」
line = "「ちなみにその時もうドラ猫はいたの？」"

[[dialogue]]
speaker = "クロト"
# 「その時はまだいなかったな」
line = "「その時はまだいなかったな」"

[[dialogue]]
speaker = "ニャリオン"
# 「ドラ猫とは何ニャン！　ワガハイはフィオナ嬢第一の家臣にして神聖なる猫の化身……」
line = "「ドラ猫とは何ニャン！　ワガハイはフィオナ嬢第一の家臣にして神聖なる猫の化身……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「よーし、この調子でてっぺんまで突き進むわよ！」
line = "「よーし、この調子でてっぺんまで突き進むわよ！」"

[[dialogue]]
speaker = "ニャリオン"
# 「人の話を聞くニャン～！」
line = "「人の話を聞くニャン～！」"

[[dialogue]]
speaker = "キリカ"
# 「（人……？）」
line = "「（人……？）」"

[[dialogue]]
speaker = "unk"
# それからしばらく。
line = "それからしばらく。"

[[dialogue]]
speaker = "unk"
# 俺たちは、順調にフィーニスの塔を昇り続けた。
line = "俺たちは、順調にフィーニスの塔を昇り続けた。"

[[dialogue]]
speaker = "unk"
# が……ある異常も訪れ始めていた。
line = "が……ある異常も訪れ始めていた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「──っ」
line = "「──っ」"

[[dialogue]]
speaker = "クロト"
# 「ヴィーナス！？」
line = "「ヴィーナス！？」"

[[dialogue]]
speaker = "unk"
# ヴィーナスがふらっと倒れそうになる。
line = "ヴィーナスがふらっと倒れそうになる。"

[[dialogue]]
speaker = "unk"
# 戦闘状態でもないのに、先ほどからこんな調子が続いているのだ。
line = "戦闘状態でもないのに、先ほどからこんな調子が続いているのだ。"

[[dialogue]]
speaker = "ヴィーナス"
# 「ううん、平気……ありがと。クロト」
line = "「ううん、平気……ありがと。クロト」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ただ……っ……ちょっと、頭痛がだんだん……強くなってて……」
line = "「ただ……っ……ちょっと、頭痛がだんだん……強くなってて……」"

[[dialogue]]
speaker = "unk"
# 額を抱え、苦悶の表情を浮かべるヴィーナス。
line = "額を抱え、苦悶の表情を浮かべるヴィーナス。"

[[dialogue]]
speaker = "unk"
# ここに至るまで戦闘のダメージは大したことなかった。
line = "ここに至るまで戦闘のダメージは大したことなかった。"

[[dialogue]]
speaker = "unk"
# 俺より遥かに地力で優るヴィーナスが消耗しているとも思えない。
line = "俺より遥かに地力で優るヴィーナスが消耗しているとも思えない。"

[[dialogue]]
speaker = "ニャリオン"
# 「だ、大丈夫かニャ？　あまり無理しないほうがいいニャ」
line = "「だ、大丈夫かニャ？　あまり無理しないほうがいいニャ」"

[[dialogue]]
speaker = "クロト"
# 「……酸欠とかか？　外が見えないからわからないが、結構な高所まで来てるはずだ」
line = "「……酸欠とかか？　外が見えないからわからないが、結構な高所まで来てるはずだ」"

[[dialogue]]
speaker = "キリカ"
# 「フィーニスの塔は目算されているだけでも４０００階以上の層構造──果ては成層圏まで続いていると聞きます」
line = "「フィーニスの塔は目算されているだけでも４０００階以上の層構造──果ては成層圏まで続いていると聞きます」"

[[dialogue]]
speaker = "フィオナ"
# 「さすがにそこまで歩くのは骨が折れそうですが……」
line = "「さすがにそこまで歩くのは骨が折れそうですが……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ううん……違うの。そういうのじゃなくて……」
line = "「ううん……違うの。そういうのじゃなくて……」"

[[dialogue]]
speaker = "unk"
# と──ヴィーナスが言葉を選ぼうとする最中だった。
line = "と──ヴィーナスが言葉を選ぼうとする最中だった。"

[[dialogue]]
speaker = "unk"
# おいで……ヴィーナス……こちらへ……ふふ……いい子ね……その調子よ……
line = "おいで……ヴィーナス……こちらへ……ふふ……いい子ね……その調子よ……"

[[dialogue]]
speaker = "ヴィーナス"
# 「────」
line = "「────」"

[[dialogue]]
speaker = "unk"
# 彼女はふと、弾かれたように顔を上げた。
line = "彼女はふと、弾かれたように顔を上げた。"

[[dialogue]]
speaker = "クロト"
# 「どうした……？」
line = "「どうした……？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「い、今の──聞こえなかった！？　私を呼んでる──女の人の声！」
line = "「い、今の──聞こえなかった！？　私を呼んでる──女の人の声！」"

[[dialogue]]
speaker = "フィオナ"
# 「い、いえ……」
line = "「い、いえ……」"

[[dialogue]]
speaker = "unk"
# はっと見開いてそう主張するヴィーナスだったが、俺たち３人と１匹にはまったく心当たりがなく。
line = "はっと見開いてそう主張するヴィーナスだったが、俺たち３人と１匹にはまったく心当たりがなく。"

[[dialogue]]
speaker = "unk"
# 体調の悪さが災いした幻聴なのではと思うところだったが……
line = "体調の悪さが災いした幻聴なのではと思うところだったが……"

[[dialogue]]
speaker = "ヴィーナス"
# 「──このまま進むわ。やっぱり間違ってなかったのよ！　さあ早く行きましょう！」
line = "「──このまま進むわ。やっぱり間違ってなかったのよ！　さあ早く行きましょう！」"

[[dialogue]]
speaker = "ニャリオン"
# 「きゅ、急に元気になったニャ！？」
line = "「きゅ、急に元気になったニャ！？」"

[[dialogue]]
speaker = "unk"
# 日誌を胸に抱き、彼女はそのままぐいぐい進んでいった。
line = "日誌を胸に抱き、彼女はそのままぐいぐい進んでいった。"

[[dialogue]]
speaker = "クロト"
# 「本当に大丈夫なのか──ヴィーナス？」
line = "「本当に大丈夫なのか──ヴィーナス？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええ」
line = "「ええ」"

[[dialogue]]
speaker = "unk"
# 彼女は、自信満々にそう答えて……
line = "彼女は、自信満々にそう答えて……"

[[dialogue]]
speaker = "ヴィーナス"
# 「この先──塔の高みで──何かが私を、待ってる気がするの」
line = "「この先──塔の高みで──何かが私を、待ってる気がするの」"

[[dialogue]]
speaker = "unk"
# 彼女の瞳に宿る──確たる意志。
line = "彼女の瞳に宿る──確たる意志。"

[[dialogue]]
speaker = "unk"
# こうなったらいざ止めようとしても聞かないだろう。
line = "こうなったらいざ止めようとしても聞かないだろう。"

[[dialogue]]
speaker = "unk"
# 俺たちは、彼女へついていくように塔の攻略を進めた。
line = "俺たちは、彼女へついていくように塔の攻略を進めた。"

[[dialogue]]
speaker = "unk"
# あの後。
line = "あの後。"

[[dialogue]]
speaker = "unk"
# 例の“声”とやらを認識したのち、実際に彼女の調子はめっきり良くなったらしく──
line = "例の“声”とやらを認識したのち、実際に彼女の調子はめっきり良くなったらしく──"

[[dialogue]]
speaker = "unk"
# 数多ものガーディアンを退け、俺たちはゆうに２０以上のフロアを踏破していた。
line = "数多ものガーディアンを退け、俺たちはゆうに２０以上のフロアを踏破していた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「よーし♪　この調子でまだまだ昇るわよー！」
line = "「よーし♪　この調子でまだまだ昇るわよー！」"

[[dialogue]]
speaker = "フィオナ"
# 「！　待ってください」
line = "「！　待ってください」"

[[dialogue]]
speaker = "unk"
# フィオナが足を止める。
line = "フィオナが足を止める。"

[[dialogue]]
speaker = "unk"
# 俺たちにもすぐ、その異変の正体は察せた。
line = "俺たちにもすぐ、その異変の正体は察せた。"

[[dialogue]]
speaker = "クロト"
# 「階段が────ない」
line = "「階段が────ない」"

[[dialogue]]
speaker = "unk"
# そう。
line = "そう。"

[[dialogue]]
speaker = "unk"
# これまでフロアの終点に必ず位置していた、<b>次</b>へ繋がる階段がなかった。
line = "これまでフロアの終点に必ず位置していた、<b>次</b>へ繋がる階段がなかった。"

[[dialogue]]
speaker = "ニャリオン"
# 「ニャニャ？　ここが終点なのかニャ？」
line = "「ニャニャ？　ここが終点なのかニャ？」"

[[dialogue]]
speaker = "キリカ"
# 「さすがにまだ、成層圏へ達したとは思えませんが……」
line = "「さすがにまだ、成層圏へ達したとは思えませんが……」"

[[dialogue]]
speaker = "unk"
# 一体どういうことなのか──揃って周囲を見渡したその時。
line = "一体どういうことなのか──揃って周囲を見渡したその時。"

[[dialogue]]
speaker = "ガーディアン・オルサ"
# 「ギ……ギギ……ガガ、ゴゴ……侵入者・発見。目標・補足。脅威度・Ａト推定スル」
line = "「ギ……ギギ……ガガ、ゴゴ……侵入者・発見。目標・補足。脅威度・Ａト推定スル」"

[[dialogue]]
speaker = "クロト"
# 「こいつは……！」
line = "「こいつは……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「へえ……面白そうなのがいるじゃない」
line = "「へえ……面白そうなのがいるじゃない」"

[[dialogue]]
speaker = "unk"
# その大きさも、発する殺気も……
line = "その大きさも、発する殺気も……"

[[dialogue]]
speaker = "unk"
# 明らかにこれまでのガーディアンとは違う。
line = "明らかにこれまでのガーディアンとは違う。"

[[dialogue]]
speaker = "フィオナ"
# 「この階層の主──のようですね」
line = "「この階層の主──のようですね」"

[[dialogue]]
speaker = "ニャリオン"
# 「暴走状態には違いないニャン。全員気をつけるニャン！」
line = "「暴走状態には違いないニャン。全員気をつけるニャン！」"

[[dialogue]]
speaker = "ガーディアン・オルサ"
# 「撃退モード展開。バトルフォーメーション・Ｃ。対象ノ生死問ワズ」
line = "「撃退モード展開。バトルフォーメーション・Ｃ。対象ノ生死問ワズ」"

[[dialogue]]
speaker = "unk"
# けたたましい警報音が鳴るや、これまで倒してきた小型ガーディアンたちが援軍として招集される。
line = "けたたましい警報音が鳴るや、これまで倒してきた小型ガーディアンたちが援軍として招集される。"

[[dialogue]]
speaker = "unk"
# こちらを睥睨するレーダーが、殺気に満ちた眼を思わせた。
line = "こちらを睥睨するレーダーが、殺気に満ちた眼を思わせた。"

[[dialogue]]
speaker = "クロト"
# 「全員で迎え撃つぞ──！」
line = "「全員で迎え撃つぞ──！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「任せなさい──！」
line = "「任せなさい──！」"
