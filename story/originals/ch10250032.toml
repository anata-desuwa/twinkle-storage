[[dialogue]]
speaker = "unk"
# 第２話,お披露目、クリスマスフォーム,P
line = "第２話,お披露目、クリスマスフォーム,P"

[[dialogue]]
speaker = "unk"
# クリスマス前の流星寮にて。
line = "クリスマス前の流星寮にて。"

[[dialogue]]
speaker = "unk"
# 舞亜は仲のいい友達に乞われて、クリスマスフォームのお披露目会をしていた。
line = "舞亜は仲のいい友達に乞われて、クリスマスフォームのお披露目会をしていた。"

[[dialogue]]
speaker = "舞亜"
# 「じゃあ行くよ。変身！」
line = "「じゃあ行くよ。変身！」"

[[dialogue]]
speaker = "舞亜"
# 「どうかな？　これが私のクリスマスフォーム……なんだけど」
line = "「どうかな？　これが私のクリスマスフォーム……なんだけど」"

[[dialogue]]
speaker = "ソフィア"
# 「いい！　すごくいいと思います」
line = "「いい！　すごくいいと思います」"

[[dialogue]]
speaker = "ウズメイア"
# 「めっちゃカワイイし！　もちろん普段もめちゃカワだけど、更にパワーアップって感じ～」
line = "「めっちゃカワイイし！　もちろん普段もめちゃカワだけど、更にパワーアップって感じ～」"

[[dialogue]]
speaker = "舞亜"
# 「ありがと、２人とも。うん、私もこれはかなり可愛いって思ってるんだ」
line = "「ありがと、２人とも。うん、私もこれはかなり可愛いって思ってるんだ」"

[[dialogue]]
speaker = "ソフィア"
# 「可愛いだけでなく今度のパーティーにぴったりですね」
line = "「可愛いだけでなく今度のパーティーにぴったりですね」"

[[dialogue]]
speaker = "ウズメイア"
# 「うんうん！　ちゃんと個性も出てるし、上手に活かせばめっちゃ目立てそう」
line = "「うんうん！　ちゃんと個性も出てるし、上手に活かせばめっちゃ目立てそう」"

[[dialogue]]
speaker = "アニュラス"
# 「さすがは舞亜だな。とてもちゃーみんぐだと思うぞ」
line = "「さすがは舞亜だな。とてもちゃーみんぐだと思うぞ」"

[[dialogue]]
speaker = "舞亜"
# 「ちゃーみんぐって……」
line = "「ちゃーみんぐって……」"

[[dialogue]]
speaker = "ウズメイア"
# 「あれ？　アニュラスもクリスマスフォーム？」
line = "「あれ？　アニュラスもクリスマスフォーム？」"

[[dialogue]]
speaker = "ソフィア"
# 「もしかして、見せつけてますか？」
line = "「もしかして、見せつけてますか？」"

[[dialogue]]
speaker = "アニュラス"
# 「見せつけているつもりはないが、私と舞亜は仲間だからな」
line = "「見せつけているつもりはないが、私と舞亜は仲間だからな」"

[[dialogue]]
speaker = "ソフィア"
# 「とは言いつつも、舞亜のものとは色々違うようですね」
line = "「とは言いつつも、舞亜のものとは色々違うようですね」"

[[dialogue]]
speaker = "ウズメイア"
# 「舞亜のはパティシエって感じ？」
line = "「舞亜のはパティシエって感じ？」"

[[dialogue]]
speaker = "舞亜"
# 「私のクリスマスフォームのコンセプトはそうだね」
line = "「私のクリスマスフォームのコンセプトはそうだね」"

[[dialogue]]
speaker = "舞亜"
# 「アニュラスのは制服っぽいかな？」
line = "「アニュラスのは制服っぽいかな？」"

[[dialogue]]
speaker = "ウズメイア"
# 「そだね、アニュラスのクリスマスフォームもいい感じだし♪」
line = "「そだね、アニュラスのクリスマスフォームもいい感じだし♪」"

[[dialogue]]
speaker = "アニュラス"
# 「ありがとう。では感謝のバズーカを贈ろう！　発射！」
line = "「ありがとう。では感謝のバズーカを贈ろう！　発射！」"

[[dialogue]]
speaker = "ソフィア"
# 「ちょっ！　いきなり！！」
line = "「ちょっ！　いきなり！！」"

[[dialogue]]
speaker = "ウズメイア"
# 「耳がキーンとしたし！！」
line = "「耳がキーンとしたし！！」"

[[dialogue]]
speaker = "舞亜"
# 「アニュラス、いくら非殺傷でもばんばん発射するのは迷惑だから」
line = "「アニュラス、いくら非殺傷でもばんばん発射するのは迷惑だから」"

[[dialogue]]
speaker = "舞亜"
# 「発射する時には、ちゃんと撃ちますよって伝えてから撃たないとだめだよ」
line = "「発射する時には、ちゃんと撃ちますよって伝えてから撃たないとだめだよ」"

[[dialogue]]
speaker = "アニュラス"
# 「す、すまない……」
line = "「す、すまない……」"

[[dialogue]]
speaker = "舞亜"
# 「パーティー本番では絶対やめようね。２人とも大丈夫？」
line = "「パーティー本番では絶対やめようね。２人とも大丈夫？」"

[[dialogue]]
speaker = "ウズメイア"
# 「あはは、へーきへーき……ちょっちキンキンしてるけど、たぶんすぐ治るし……」
line = "「あはは、へーきへーき……ちょっちキンキンしてるけど、たぶんすぐ治るし……」"

[[dialogue]]
speaker = "ソフィア"
# 「私も大丈夫……」
line = "「私も大丈夫……」"

[[dialogue]]
speaker = "舞亜"
# 「ごめんね、アニュラスが迷惑かけちゃって」
line = "「ごめんね、アニュラスが迷惑かけちゃって」"

[[dialogue]]
speaker = "ソフィア"
# 「舞亜、ちょっとママ化してきてませんか……？」
line = "「舞亜、ちょっとママ化してきてませんか……？」"

[[dialogue]]
speaker = "ウズメイア"
# 「アニュラスの面倒を見てて偉いし♪」
line = "「アニュラスの面倒を見てて偉いし♪」"

[[dialogue]]
speaker = "アニュラス"
# 「もしかして私が娘ポジションということか？　いや、それは納得がいかないぞ？」
line = "「もしかして私が娘ポジションということか？　いや、それは納得がいかないぞ？」"

[[dialogue]]
speaker = "舞亜"
# 「それが嫌ならちゃんと自制してね」
line = "「それが嫌ならちゃんと自制してね」"

[[dialogue]]
speaker = "アニュラス"
# 「むぅ、分かった……注意しよう」
line = "「むぅ、分かった……注意しよう」"

[[dialogue]]
speaker = "ウズメイア"
# 「なんだかんだで仲いいね～。この調子でクリスマスパーティーを盛り上げてよ」
line = "「なんだかんだで仲いいね～。この調子でクリスマスパーティーを盛り上げてよ」"

[[dialogue]]
speaker = "アニュラス"
# 「ああ。我ら流星寮クリスマスパーティー実行委員に任せてくれ！」
line = "「ああ。我ら流星寮クリスマスパーティー実行委員に任せてくれ！」"

[[dialogue]]
speaker = "舞亜"
# 「ところで２人に相談したいんだけど、このクリスマスフォーム、どう活用したらいいかな？」
line = "「ところで２人に相談したいんだけど、このクリスマスフォーム、どう活用したらいいかな？」"

[[dialogue]]
speaker = "ウズメイア"
# 「パティシエだし、スイーツ作り？」
line = "「パティシエだし、スイーツ作り？」"

[[dialogue]]
speaker = "舞亜"
# 「実はこの戦闘服の能力でスイーツを作り出せるみたいなんだよね。それとは別に私たちの手作り料理もお出しすることにはなってるよ」
line = "「実はこの戦闘服の能力でスイーツを作り出せるみたいなんだよね。それとは別に私たちの手作り料理もお出しすることにはなってるよ」"

[[dialogue]]
speaker = "ソフィア"
# 「でしたらやはり、インラインスケートをうまく活用するのがよさそうですね」
line = "「でしたらやはり、インラインスケートをうまく活用するのがよさそうですね」"

[[dialogue]]
speaker = "ウズメイア"
# 「じゃあじゃあ！　スケートで走りながらご馳走を運ぶのはどう？」
line = "「じゃあじゃあ！　スケートで走りながらご馳走を運ぶのはどう？」"

[[dialogue]]
speaker = "ソフィア"
# 「なるほど、それはいいかもしれませんね！」
line = "「なるほど、それはいいかもしれませんね！」"

[[dialogue]]
speaker = "舞亜"
# 「スケートを滑りながら料理を運ぶ、かぁ……」
line = "「スケートを滑りながら料理を運ぶ、かぁ……」"

[[dialogue]]
speaker = "unk"
# やっぱり難しそう？
line = "やっぱり難しそう？"

[[dialogue]]
speaker = "unk"
# 自然に滑れるように練習してるけど
line = "自然に滑れるように練習してるけど"

[[dialogue]]
speaker = "舞亜"
# 「軸を安定させて滑るのは簡単だけど、実際に料理を持って滑ったことはないからちょっと不安かもね」
line = "「軸を安定させて滑るのは簡単だけど、実際に料理を持って滑ったことはないからちょっと不安かもね」"

[[dialogue]]
speaker = "アニュラス"
# 「であれば、特訓だな」
line = "「であれば、特訓だな」"

[[dialogue]]
speaker = "ソフィア"
# 「そうですね、私もこれはアニュラスさんに賛成です」
line = "「そうですね、私もこれはアニュラスさんに賛成です」"

[[dialogue]]
speaker = "ウズメイア"
# 「特訓って、そんな大袈裟な……」
line = "「特訓って、そんな大袈裟な……」"

[[dialogue]]
speaker = "舞亜"
# 「そう？　新しいことに取り組む時は、特訓するのが普通だと思うけど」
line = "「そう？　新しいことに取り組む時は、特訓するのが普通だと思うけど」"

[[dialogue]]
speaker = "アニュラス"
# 「舞亜の言う通りだ」
line = "「舞亜の言う通りだ」"

[[dialogue]]
speaker = "ソフィア"
# 「それくらいしないと、いい成績は残せませんからね」
line = "「それくらいしないと、いい成績は残せませんからね」"

[[dialogue]]
speaker = "ウズメイア"
# 「お、おおぅ……そう言えば、この３人がっつり体育会系だったよ……」
line = "「お、おおぅ……そう言えば、この３人がっつり体育会系だったよ……」"

[[dialogue]]
speaker = "ソフィア"
# 「ではさっそく特訓を始めましょう。アニュラスさんはサポートをお願いします」
line = "「ではさっそく特訓を始めましょう。アニュラスさんはサポートをお願いします」"

[[dialogue]]
speaker = "アニュラス"
# 「承知した。私に任せてくれ」
line = "「承知した。私に任せてくれ」"

[[dialogue]]
speaker = "ソフィア"
# 「会長さんは舞亜が運ぶ料理をお願いします」
line = "「会長さんは舞亜が運ぶ料理をお願いします」"

[[dialogue]]
speaker = "unk"
# 任せてくれ
line = "任せてくれ"

[[dialogue]]
speaker = "unk"
# 了解！
line = "了解！"

[[dialogue]]
speaker = "ウズメイア"
# 「あたしは？　あたしも何か手伝いたいんだけど」
line = "「あたしは？　あたしも何か手伝いたいんだけど」"

[[dialogue]]
speaker = "舞亜"
# 「ウズメはお客さん役でお願い」
line = "「ウズメはお客さん役でお願い」"

[[dialogue]]
speaker = "ウズメイア"
# 「オッケー♪　じゃあ、ウェイトレスさんっ、今日の日替わり定食をお願いしまーす！」
line = "「オッケー♪　じゃあ、ウェイトレスさんっ、今日の日替わり定食をお願いしまーす！」"

[[dialogue]]
speaker = "舞亜"
# 「はーい、ご注文承りました！　しばらくお待ち下さい～♪」
line = "「はーい、ご注文承りました！　しばらくお待ち下さい～♪」"

[[dialogue]]
speaker = "舞亜"
# 「って、ここまでする必要あるの？」
line = "「って、ここまでする必要あるの？」"

[[dialogue]]
speaker = "ソフィア"
# 「あります」
line = "「あります」"

[[dialogue]]
speaker = "舞亜"
# 「即答！？　まあ、ソフィがそう言うなら……やるけど」
line = "「即答！？　まあ、ソフィがそう言うなら……やるけど」"

[[dialogue]]
speaker = "ソフィア"
# 「演技指導は任せて下さい。舞亜を最高に可愛いウェイトレスさんにしてみせますから！」
line = "「演技指導は任せて下さい。舞亜を最高に可愛いウェイトレスさんにしてみせますから！」"

[[dialogue]]
speaker = "unk"
# こうして、可愛さ全振りな舞亜のウェイトレス特訓が始まるのだった。
line = "こうして、可愛さ全振りな舞亜のウェイトレス特訓が始まるのだった。"
