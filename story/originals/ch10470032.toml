line = "「魔王さまが気持ちよくなれるように……お風呂でも誠心誠意、ご奉仕させていただきますねっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そうして俺たちは、お風呂場に舞台を移してからも『魔王さまのしもべごっこ』でイチャイチャし続けるのだった。
line = "そうして俺たちは、お風呂場に舞台を移してからも『魔王さまのしもべごっこ』でイチャイチャし続けるのだった。"
