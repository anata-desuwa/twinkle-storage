[[dialogue]]
speaker = "unk"
# 第２話,魔王さまのしもべごっこ,P
line = "第２話,魔王さまのしもべごっこ,P"

[[dialogue]]
speaker = "unk"
# 今日は休日。週に１度の、家デートの日だ。
line = "今日は休日。週に１度の、家デートの日だ。"

[[dialogue]]
speaker = "メルエル（覚醒）"
# 「えへへ<emoji=heart04>　この格好になると、会長くんの『眷属』なんだってことが実感できて、ドキドキしてきちゃうよぉ<emoji=heart04>」
line = "「えへへ<emoji=heart04>　この格好になると、会長くんの『眷属』なんだってことが実感できて、ドキドキしてきちゃうよぉ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# どうしてメルエルが俺の家でノヴァフォームになっているのかというと――
line = "どうしてメルエルが俺の家でノヴァフォームになっているのかというと――"

[[dialogue]]
speaker = "メルエル"
# 「この前、ナターシャちゃんから『会長くんが私の支配者』って言ってもらえたでしょ？」
line = "「この前、ナターシャちゃんから『会長くんが私の支配者』って言ってもらえたでしょ？」"

[[dialogue]]
speaker = "メルエル"
# 「あれ、すっごく嬉しかったんだぁ<emoji=heart04>　他の人から見ても、私って正真正銘、会長くんの眷属──魔王さまのしもべなんだなぁって<emoji=heart04>」
line = "「あれ、すっごく嬉しかったんだぁ<emoji=heart04>　他の人から見ても、私って正真正銘、会長くんの眷属──魔王さまのしもべなんだなぁって<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
# 「でも……会長くんって、私に命令とか、強引なところを見せてくれることって、あんまりないよね？」
line = "「でも……会長くんって、私に命令とか、強引なところを見せてくれることって、あんまりないよね？」"

[[dialogue]]
speaker = "メルエル"
# 「私としては、会長くんにだったら……たくさん命令してもらったり、強引なところを見せてもらえたら、嬉しいんだけどなぁ<emoji=heart04>」
line = "「私としては、会長くんにだったら……たくさん命令してもらったり、強引なところを見せてもらえたら、嬉しいんだけどなぁ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ――と、数日前にそんな会話があって、今に至る。
line = "――と、数日前にそんな会話があって、今に至る。"

[[dialogue]]
speaker = "メルエル（覚醒）"
# 「それじゃあ会長くん……ううん、魔王さまっ<emoji=heart04>　今日はたくさん、メルエルに命令してください<emoji=heart04>」
line = "「それじゃあ会長くん……ううん、魔王さまっ<emoji=heart04>　今日はたくさん、メルエルに命令してください<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル（覚醒）"
# 「──といっても、私にしてほしいことなんて、なかなか思いつかない？」
line = "「──といっても、私にしてほしいことなんて、なかなか思いつかない？」"

[[dialogue]]
speaker = "unk"
# もうだいたい全部やってもらってるんだよな
line = "もうだいたい全部やってもらってるんだよな"

[[dialogue]]
speaker = "unk"
# 正確に言うと、メルエルにしてほしいこと
line = "正確に言うと、メルエルにしてほしいこと"

[[dialogue]]
speaker = "unk"
# メルエルはなんと、毎日朝起こしに来てくれて、毎日お弁当の用意をしてくれて、休み時間も膝枕や耳かきをしてくれたりと、日常的に至れり尽くせりのパーフェクト彼女である。
line = "メルエルはなんと、毎日朝起こしに来てくれて、毎日お弁当の用意をしてくれて、休み時間も膝枕や耳かきをしてくれたりと、日常的に至れり尽くせりのパーフェクト彼女である。"

[[dialogue]]
speaker = "unk"
# しかもこれらを、メルエルは「私がやりたくて、やらせてもらってるの」という立場を崩したことがなく、これ以上欲張りになって命令を出せ、というのは地味な難題だった。
line = "しかもこれらを、メルエルは「私がやりたくて、やらせてもらってるの」という立場を崩したことがなく、これ以上欲張りになって命令を出せ、というのは地味な難題だった。"

[[dialogue]]
speaker = "メルエル（覚醒）"
# 「何でもいいんだよ？　魔王さまの命令だったら、絶対何でも嬉しいから……だから私に命令、してください<emoji=heart04>」
line = "「何でもいいんだよ？　魔王さまの命令だったら、絶対何でも嬉しいから……だから私に命令、してください<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 『メルエルの方から、キスしろ』
line = "『メルエルの方から、キスしろ』"

[[dialogue]]
speaker = "unk"
# あっ、１つ思いついた。
line = "あっ、１つ思いついた。"

[[dialogue]]
speaker = "メルエル（覚醒）"
# 「はうぅぅっ<emoji=heart04>　そ、それはぁ……<emoji=heart04>」
line = "「はうぅぅっ<emoji=heart04>　そ、それはぁ……<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル（覚醒）"
# （ちっちゃい姿の私だったら、ぐいぐいって行けちゃうんだろうけど……確かに、この姿で私から会長くんにキスするの、ちょっと恥ずかしいよぉ<emoji=heart04>）
line = "（ちっちゃい姿の私だったら、ぐいぐいって行けちゃうんだろうけど……確かに、この姿で私から会長くんにキスするの、ちょっと恥ずかしいよぉ<emoji=heart04>）"

[[dialogue]]
speaker = "メルエル（覚醒）"
# （でもでも……！　せっかく会長くんが考えてくれた命令、だもんねっ<emoji=heart04>　これは命令<emoji=heart04>　命令だから……<emoji=heart04>）
line = "（でもでも……！　せっかく会長くんが考えてくれた命令、だもんねっ<emoji=heart04>　これは命令<emoji=heart04>　命令だから……<emoji=heart04>）"

[[dialogue]]
speaker = "メルエル（覚醒）"
# 「は、はいぃ、魔王さまぁ<emoji=heart04>　今日は私の方から、キス、させていただきます<emoji=heart04>」
line = "「は、はいぃ、魔王さまぁ<emoji=heart04>　今日は私の方から、キス、させていただきます<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル（覚醒）"
# 「んぅ……<emoji=heart04>　ちゅっ<emoji=heart04>」
line = "「んぅ……<emoji=heart04>　ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル（覚醒）"
# 「はぁあっ<emoji=heart04>　あぁあっ、恥ずかしいっ<emoji=heart04>　恥ずかしいけど……えへへ<emoji=heart04>　なんだか嬉しいなっ<emoji=heart04>」
line = "「はぁあっ<emoji=heart04>　あぁあっ、恥ずかしいっ<emoji=heart04>　恥ずかしいけど……えへへ<emoji=heart04>　なんだか嬉しいなっ<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル（覚醒）"
# 「え？　──次の命令、思いついた？　う、うんっ<emoji=heart04>　頑張るから、どんどん私に命令してねっ<emoji=heart04>」
line = "「え？　──次の命令、思いついた？　う、うんっ<emoji=heart04>　頑張るから、どんどん私に命令してねっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# それから１時間ほど、メルエルに全身を揉み解すマッサージをしてもらった。
line = "それから１時間ほど、メルエルに全身を揉み解すマッサージをしてもらった。"

[[dialogue]]
speaker = "unk"
# マッサージ自体もすごく上手で、気持ちよかったのだが……
line = "マッサージ自体もすごく上手で、気持ちよかったのだが……"

[[dialogue]]
speaker = "メルエル（覚醒）"
# 「よいしょっ……<emoji=heart04>　はぁっ、んんぅ……<emoji=heart04>　ぐぐぐぅ～……っとぉ<emoji=heart04>」
line = "「よいしょっ……<emoji=heart04>　はぁっ、んんぅ……<emoji=heart04>　ぐぐぐぅ～……っとぉ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# マッサージの最中、メルエルの体がぴったりとくっついてしまい……彼女の大きな胸が俺の体に当たって、ふにゅふにゅと形を変えている感触が伝わってくる。
line = "マッサージの最中、メルエルの体がぴったりとくっついてしまい……彼女の大きな胸が俺の体に当たって、ふにゅふにゅと形を変えている感触が伝わってくる。"

[[dialogue]]
speaker = "unk"
# 視線が合うと、メルエルは頬を真っ赤に染めながら「えへへ<emoji=heart04>」と微笑むので、どうやら彼女自身が考えたご奉仕のひとつのようだった。
line = "視線が合うと、メルエルは頬を真っ赤に染めながら「えへへ<emoji=heart04>」と微笑むので、どうやら彼女自身が考えたご奉仕のひとつのようだった。"

[[dialogue]]
speaker = "メルエル（覚醒）"
# 「ど、どうでしょうか、魔王さまっ<emoji=heart04>　私のマッサージ、上手くできていますか？」
line = "「ど、どうでしょうか、魔王さまっ<emoji=heart04>　私のマッサージ、上手くできていますか？」"

[[dialogue]]
speaker = "unk"
# あとその、胸が当たってて……
line = "あとその、胸が当たってて……"

[[dialogue]]
speaker = "unk"
# マッサージ、凄く気持ちいい。
line = "マッサージ、凄く気持ちいい。"

[[dialogue]]
speaker = "メルエル（覚醒）"
# 「ちょ、ちょっと、はしたなかったかなっ。嫌だったら、ごめんねっ」
line = "「ちょ、ちょっと、はしたなかったかなっ。嫌だったら、ごめんねっ」"

[[dialogue]]
speaker = "メルエル（覚醒）"
# 「──嫌なわけがない？　興奮するし、メルエルの『喜んで欲しい』って気持ちが伝わってきて、すごく嬉しい……？」
line = "「──嫌なわけがない？　興奮するし、メルエルの『喜んで欲しい』って気持ちが伝わってきて、すごく嬉しい……？」"

[[dialogue]]
speaker = "メルエル（覚醒）"
# 「そ、そっかぁ<emoji=heart04>　えへへへぇ<emoji=heart04>　……ちょっと恥ずかしかったけど、頑張ってみてよかったぁ<emoji=heart04>」
line = "「そ、そっかぁ<emoji=heart04>　えへへへぇ<emoji=heart04>　……ちょっと恥ずかしかったけど、頑張ってみてよかったぁ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# エッチなこと、ちょっと苦手じゃない？
line = "エッチなこと、ちょっと苦手じゃない？"

[[dialogue]]
speaker = "unk"
# でも、メルエルは恥ずかしいこととか
line = "でも、メルエルは恥ずかしいこととか"

[[dialogue]]
speaker = "メルエル（覚醒）"
# 「えっと、正直に言っちゃうとね……」
line = "「えっと、正直に言っちゃうとね……」"

[[dialogue]]
speaker = "メルエル（覚醒）"
# 「魔王さまがしてくれることだったら……私、なんでもその瞬間に、大好きになっちゃうんです<emoji=heart04>」
line = "「魔王さまがしてくれることだったら……私、なんでもその瞬間に、大好きになっちゃうんです<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル（覚醒）"
# 「エッチなことも、恥ずかしいことも……もともと、すっごく苦手だったよ」
line = "「エッチなことも、恥ずかしいことも……もともと、すっごく苦手だったよ」"

[[dialogue]]
speaker = "メルエル（覚醒）"
# 「でも、魔王さまにされるエッチなことは、全部嬉しくて、ドキドキして、気持ち良くって……すぐに、大好きになっちゃいました<emoji=heart04>」
line = "「でも、魔王さまにされるエッチなことは、全部嬉しくて、ドキドキして、気持ち良くって……すぐに、大好きになっちゃいました<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル（覚醒）"
# 「恥ずかしいって気持ちも、本当は凄く苦手なんだけど……恥ずかしがってる姿を、魔王さまはいつも『可愛い』って言ってくれるから……<emoji=heart04>」
line = "「恥ずかしいって気持ちも、本当は凄く苦手なんだけど……恥ずかしがってる姿を、魔王さまはいつも『可愛い』って言ってくれるから……<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル（覚醒）"
# 「魔王さまの前だけは、いくらでも恥ずかしくされてもいいって、思ってて……<emoji=heart04>」
line = "「魔王さまの前だけは、いくらでも恥ずかしくされてもいいって、思ってて……<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル（覚醒）"
# 「うぅうん──たくさん、『恥ずかしくされちゃいたい』って、そんなことを思う女の子に、なっちゃったんです<emoji=heart04>」
line = "「うぅうん──たくさん、『恥ずかしくされちゃいたい』って、そんなことを思う女の子に、なっちゃったんです<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル（覚醒）"
# 「だから、魔王さまが相手なら……エッチなことも、恥ずかしいことも、全部全部、大好きなのっ<emoji=heart04>」
line = "「だから、魔王さまが相手なら……エッチなことも、恥ずかしいことも、全部全部、大好きなのっ<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル（覚醒）"
# 「……って！　なんかこれ、すっごく恥ずかしいことを告白しちゃった気がするよぉ<emoji=heart04>」
line = "「……って！　なんかこれ、すっごく恥ずかしいことを告白しちゃった気がするよぉ<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル（覚醒）"
# 「でも……私はもう、魔王さまのしもべだから<emoji=heart04>　恥ずかしいけど、同時に嬉しいんです<emoji=heart04>」
line = "「でも……私はもう、魔王さまのしもべだから<emoji=heart04>　恥ずかしいけど、同時に嬉しいんです<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル（覚醒）"
# 「全部受け止めてくれるって、わかってるから<emoji=heart04>　魔王さまにだったら……私の全部をさらけ出せるの<emoji=heart04>」
line = "「全部受け止めてくれるって、わかってるから<emoji=heart04>　魔王さまにだったら……私の全部をさらけ出せるの<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル（覚醒）"
# 「これは『しもべごっこ』だからとかじゃなくって……ずっとずっと、そう思ってたことだよ<emoji=heart04>」
line = "「これは『しもべごっこ』だからとかじゃなくって……ずっとずっと、そう思ってたことだよ<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル（覚醒）"
# 「とっても恥ずかしいけど……本当の気持ち、言葉にできて嬉しいなっ<emoji=heart04>」
line = "「とっても恥ずかしいけど……本当の気持ち、言葉にできて嬉しいなっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 恥ずかしくても伝えてくれる所は愛おしいよ
line = "恥ずかしくても伝えてくれる所は愛おしいよ"

[[dialogue]]
speaker = "unk"
