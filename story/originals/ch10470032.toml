line = "「はふぅぅう<emoji=heart04>　嬉しすぎて、頭の中ぜんぶ、蕩けちゃってますぅ<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル（覚醒）"
# 「こんなの……理想のご主人様すぎて、メルトしちゃうよぉ～<emoji=heart04>」
line = "「こんなの……理想のご主人様すぎて、メルトしちゃうよぉ～<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 一緒に風呂に入って体を洗ってもらおうかな
line = "一緒に風呂に入って体を洗ってもらおうかな"

[[dialogue]]
speaker = "unk"
