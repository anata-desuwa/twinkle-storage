[[dialogue]]
speaker = "子どもＡ"
# 「聖女さま、シスターさま、今日はありがとう～！」
line = "「聖女さま、シスターさま、今日はありがとう～！」"

[[dialogue]]
speaker = "シャロン"
# 「いえいえ。お気を付けて帰ってくださいね」
line = "「いえいえ。お気を付けて帰ってくださいね」"

[[dialogue]]
speaker = "イレーナ"
# 「皆さまに女神様の祝福があらんことを」
line = "「皆さまに女神様の祝福があらんことを」"

[[dialogue]]
speaker = "イレーナ"
# 「ふぅ……ようやく落ち着いたわね。結局ほとんど飲み食いしている暇なかったわ」
line = "「ふぅ……ようやく落ち着いたわね。結局ほとんど飲み食いしている暇なかったわ」"

[[dialogue]]
speaker = "シャロン"
# 「大人気でしたものね。私もイレーナさまと同じくらい子どもたちのお相手がうまくなりたいものです」
line = "「大人気でしたものね。私もイレーナさまと同じくらい子どもたちのお相手がうまくなりたいものです」"

[[dialogue]]
speaker = "イレーナ"
# 「シャロンも十分上手だったと思うけど？　さすが普段から子ども会の手伝いしてるだけはあるわね」
line = "「シャロンも十分上手だったと思うけど？　さすが普段から子ども会の手伝いしてるだけはあるわね」"

[[dialogue]]
speaker = "シャロン"
# 「うふふ。イレーナさまにお褒めいただけるなんて恐縮です♪」
line = "「うふふ。イレーナさまにお褒めいただけるなんて恐縮です♪」"

[[dialogue]]
speaker = "イレーナ"
# 「あと、そこに転がってるヤツもついでに褒めてあげるわ」
line = "「あと、そこに転がってるヤツもついでに褒めてあげるわ」"

[[dialogue]]
speaker = "unk"
# つ……疲れた
line = "つ……疲れた"

[[dialogue]]
speaker = "イレーナ"
# 「ふふ、トナカイ役ご苦労だったわね♪　子どもたちも喜んでたわよ♪」
line = "「ふふ、トナカイ役ご苦労だったわね♪　子どもたちも喜んでたわよ♪」"

[[dialogue]]
speaker = "シャロン"
# 「あ、あれは本当に良かったのでしょうか……。催し物とはいえ、人の背中に乗って歩き回らせるなど不道徳だったような……」
line = "「あ、あれは本当に良かったのでしょうか……。催し物とはいえ、人の背中に乗って歩き回らせるなど不道徳だったような……」"

[[dialogue]]
speaker = "イレーナ"
# 「いいのよ、コイツにはこれくらいで。人が気合い入れて用意した衣装をスケベな目で見るような男だし」
line = "「いいのよ、コイツにはこれくらいで。人が気合い入れて用意した衣装をスケベな目で見るような男だし」"

[[dialogue]]
speaker = "イレーナ"
# 「それよりシャロン……。ちょっと付き合いなさいよ。話があるから」
line = "「それよりシャロン……。ちょっと付き合いなさいよ。話があるから」"

[[dialogue]]
speaker = "シャロン"
# 「？？？　ここではいけないのですか？」
line = "「？？？　ここではいけないのですか？」"

[[dialogue]]
speaker = "イレーナ"
# 「い、いいから来なさいってば。ここだと誰かに見られるかもしれないでしょ……！」
line = "「い、いいから来なさいってば。ここだと誰かに見られるかもしれないでしょ……！」"

[[dialogue]]
speaker = "シャロン"
# 「ひゃっ。そ、そんなに引っ張らないでくださいませ！」
line = "「ひゃっ。そ、そんなに引っ張らないでくださいませ！」"

[[dialogue]]
speaker = "シャロン"
# 「それで……お話というのは」
line = "「それで……お話というのは」"

[[dialogue]]
speaker = "イレーナ"
# 「ええと、その……あんたに……」
line = "「ええと、その……あんたに……」"

[[dialogue]]
speaker = "シャロン"
# 「ハッ──！　まさかまた聖女をお辞めになると仰るつもりですかっ！？　いけませんよ、イレーナさま……！」
line = "「ハッ──！　まさかまた聖女をお辞めになると仰るつもりですかっ！？　いけませんよ、イレーナさま……！」"

[[dialogue]]
speaker = "イレーナ"
# 「ああもう、そうじゃないわよ……！　てかあんた、あたしが聖女を辞められるように助力するとか言ってなかったっけ？」
line = "「ああもう、そうじゃないわよ……！　てかあんた、あたしが聖女を辞められるように助力するとか言ってなかったっけ？」"

[[dialogue]]
speaker = "シャロン"
# 「あの時はイレーナさまの<ruby=あまのじゃく>天邪鬼</ruby>なお心を理解しておりませんでしたから。ですが今は違います！　お辞めにならないでください、イレーナさま！」
line = "「あの時はイレーナさまの<ruby>天邪鬼<rt>あまのじゃく</rt></ruby>なお心を理解しておりませんでしたから。ですが今は違います！　お辞めにならないでください、イレーナさま！」"

[[dialogue]]
speaker = "イレーナ"
# 「誰が天邪鬼よ！　あんたのせいでその気も失せたっての……。どうせ辞めるならもっといい辞め時を考えるわ」
line = "「誰が天邪鬼よ！　あんたのせいでその気も失せたっての……。どうせ辞めるならもっといい辞め時を考えるわ」"

[[dialogue]]
speaker = "シャロン"
# 「それなら安心いたしました！　今後ともよろしくお願いいたしますね、イレーナさま！」
line = "「それなら安心いたしました！　今後ともよろしくお願いいたしますね、イレーナさま！」"

[[dialogue]]
speaker = "イレーナ"
# 「え、ええ──じゃなくて！　あたしの用事はこれよ、これ！」
line = "「え、ええ──じゃなくて！　あたしの用事はこれよ、これ！」"

[[dialogue]]
speaker = "シャロン"
# 「！　こちらは……」
line = "「！　こちらは……」"

[[dialogue]]
speaker = "イレーナ"
# 「うちの地元だとクリスマスといえばこれ……パネットーネなのよ。親しい友人に渡して、聖夜を祝うの」
line = "「うちの地元だとクリスマスといえばこれ……パネットーネなのよ。親しい友人に渡して、聖夜を祝うの」"

[[dialogue]]
speaker = "シャロン"
# 「親しい友人に……」
line = "「親しい友人に……」"

[[dialogue]]
speaker = "イレーナ"
# 「サランに材料を手配してもらって……途中失敗しちゃったけど、何度も作り直してやっとうまくできたの。だからあんたに……」
line = "「サランに材料を手配してもらって……途中失敗しちゃったけど、何度も作り直してやっとうまくできたの。だからあんたに……」"

[[dialogue]]
speaker = "イレーナ"
# 「その……ごめんなさい。この前はついカっとなってシャロンに酷いことを言ったわ」
line = "「その……ごめんなさい。この前はついカっとなってシャロンに酷いことを言ったわ」"

[[dialogue]]
speaker = "イレーナ"
# 「あんたはあんたなりに感謝を伝えてくれただけなのに……自分勝手にぶち切れて、あんたの信仰を傷つけた。本当にごめんなさい」
line = "「あんたはあんたなりに感謝を伝えてくれただけなのに……自分勝手にぶち切れて、あんたの信仰を傷つけた。本当にごめんなさい」"

[[dialogue]]
speaker = "イレーナ"
# 「これで許してって言うつもりはないけど、よかったら……受け取って」
line = "「これで許してって言うつもりはないけど、よかったら……受け取って」"

[[dialogue]]
speaker = "シャロン"
# 「イレーナさま……」
line = "「イレーナさま……」"

[[dialogue]]
speaker = "シャロン"
# 「謝るのは私の方です。イレーナさまの心の内も知らずに、あなたを傷つけてしまいました」
line = "「謝るのは私の方です。イレーナさまの心の内も知らずに、あなたを傷つけてしまいました」"

[[dialogue]]
speaker = "シャロン"
# 「ですから私もプレゼントを……」
line = "「ですから私もプレゼントを……」"

[[dialogue]]
speaker = "イレーナ"
# 「プレゼントって──これ、パネットーネじゃない！？　どうしてシャロンが……？」
line = "「プレゼントって──これ、パネットーネじゃない！？　どうしてシャロンが……？」"

[[dialogue]]
speaker = "シャロン"
# 「イレーナさまがパネットーネを食べたがっていると小耳に挟んだもので。少しでもお喜びいただければと」
line = "「イレーナさまがパネットーネを食べたがっていると小耳に挟んだもので。少しでもお喜びいただければと」"

[[dialogue]]
speaker = "イレーナ"
# 「まったく、あの口の軽いトナカイは……。また変なところで気を回してくれちゃってるんだから……」
line = "「まったく、あの口の軽いトナカイは……。また変なところで気を回してくれちゃってるんだから……」"

[[dialogue]]
speaker = "シャロン"
# 「私もサランさまに教わって作ったのです。お母様の味には劣るかもしれませんが……受け取ってくださいますか？」
line = "「私もサランさまに教わって作ったのです。お母様の味には劣るかもしれませんが……受け取ってくださいますか？」"

[[dialogue]]
speaker = "イレーナ"
# 「バカね……。パネットーネってのは、こんなに畏まって交換しあうようなもんじゃないっての。むず痒いったらありゃしないじゃない……」
line = "「バカね……。パネットーネってのは、こんなに畏まって交換しあうようなもんじゃないっての。むず痒いったらありゃしないじゃない……」"

[[dialogue]]
speaker = "蛍火"
# 「会話の内容は聞き取れませんが……どうやら様子を見に来る必要はなかったようですね」
line = "「会話の内容は聞き取れませんが……どうやら様子を見に来る必要はなかったようですね」"

[[dialogue]]
speaker = "サラン"
# 「みたいだね～♪　２人から同じ相談された時はびっくりしたけど、うまくいってよかった～♪」
line = "「みたいだね～♪　２人から同じ相談された時はびっくりしたけど、うまくいってよかった～♪」"

[[dialogue]]
speaker = "unk"
# 戻ろうか
line = "戻ろうか"

[[dialogue]]
speaker = "蛍火"
# 「はい。友人同士の時間に他人が水を差すものではありませんしね」
line = "「はい。友人同士の時間に他人が水を差すものではありませんしね」"

[[dialogue]]
speaker = "サラン"
# 「戻ってお茶の準備しなきゃだね～♪　パネットーネに合う紅茶を選んでおかないと～♪」
line = "「戻ってお茶の準備しなきゃだね～♪　パネットーネに合う紅茶を選んでおかないと～♪」"

[[dialogue]]
speaker = "シャロン"
# 「イレーナさまの言う通り、イレーナさまの癒しの力は女神様の愛ではないのでしょう」
line = "「イレーナさまの言う通り、イレーナさまの癒しの力は女神様の愛ではないのでしょう」"

[[dialogue]]
speaker = "イレーナ"
# 「だからそう言ってんじゃない。さすがのあんたもいい加減認めたわね」
line = "「だからそう言ってんじゃない。さすがのあんたもいい加減認めたわね」"

[[dialogue]]
speaker = "シャロン"
# 「つまり、イレーナさまの愛ですね！！」
line = "「つまり、イレーナさまの愛ですね！！」"

[[dialogue]]
speaker = "イレーナ"
# 「はぁっ！？」
line = "「はぁっ！？」"

[[dialogue]]
speaker = "シャロン"
# 「イレーナさまを見ていれば、人々を愛していることがわかります。イレーナさまはとても愛の深いお方です！」
line = "「イレーナさまを見ていれば、人々を愛していることがわかります。イレーナさまはとても愛の深いお方です！」"

[[dialogue]]
speaker = "イレーナ"
# 「な、な、何言ってんのよ！？　あんたの目、節穴なんじゃないっ？」
line = "「な、な、何言ってんのよ！？　あんたの目、節穴なんじゃないっ？」"

[[dialogue]]
speaker = "イレーナ"
# 「てかあんた、気にしてないの？　あたし、女神のせいで病気に……なんて言ったのに」
line = "「てかあんた、気にしてないの？　あたし、女神のせいで病気に……なんて言ったのに」"

[[dialogue]]
speaker = "シャロン"
# 「ええ、全く。私は女神様を信じていますから」
line = "「ええ、全く。私は女神様を信じていますから」"

[[dialogue]]
speaker = "イレーナ"
# 「何よ……あんたのほうがよっぽど聖女みたいじゃない」
line = "「何よ……あんたのほうがよっぽど聖女みたいじゃない」"

[[dialogue]]
speaker = "シャロン"
# 「これから先、あなたが悩み苦しむこともあるでしょう。女神様の愛はイレーナさまを直接お救いにならないかもしれません」
line = "「これから先、あなたが悩み苦しむこともあるでしょう。女神様の愛はイレーナさまを直接お救いにならないかもしれません」"

[[dialogue]]
speaker = "シャロン"
# 「ですから、あなたの心は私が救います。女神様の愛が届かなくとも、私が愛を注ぎます」
line = "「ですから、あなたの心は私が救います。女神様の愛が届かなくとも、私が愛を注ぎます」"

[[dialogue]]
speaker = "イレーナ"
# 「まったくもう……愛、愛って小っ恥ずかしいわね……」
line = "「まったくもう……愛、愛って小っ恥ずかしいわね……」"

[[dialogue]]
speaker = "シャロン"
# 「それが私の信仰ですから」
line = "「それが私の信仰ですから」"

[[dialogue]]
speaker = "イレーナ"
# 「強情ね」
line = "「強情ね」"

[[dialogue]]
speaker = "シャロン"
# 「イレーナさまほどでは」
line = "「イレーナさまほどでは」"

[[dialogue]]
speaker = "イレーナ"
# 「ふんっ、言うようになったじゃない」
line = "「ふんっ、言うようになったじゃない」"

[[dialogue]]
speaker = "イレーナ"
# 「まぁいいわ。お腹減ったし、そろそろパネットーネ食べましょ」
line = "「まぁいいわ。お腹減ったし、そろそろパネットーネ食べましょ」"

[[dialogue]]
speaker = "イレーナ"
# 「あ、でもその前にこれ言わないといけないわよね」
line = "「あ、でもその前にこれ言わないといけないわよね」"

[[dialogue]]
speaker = "イレーナ"
# 「メリークリスマス、シャロン」
line = "「メリークリスマス、シャロン」"

[[dialogue]]
speaker = "シャロン"
# 「はい、メリークリスマスです、イレーナさま♪」
line = "「はい、メリークリスマスです、イレーナさま♪」"

[[dialogue]]
speaker = "unk"
# 後日──
line = "後日──"

[[dialogue]]
speaker = "シャロン"
# 「イレーナさま！　子ども会の子たちからお手紙が届きましたよ！　ぜひご覧になってください！」
line = "「イレーナさま！　子ども会の子たちからお手紙が届きましたよ！　ぜひご覧になってください！」"

[[dialogue]]
speaker = "シャロン"
# 「イレーナさま！　街にイタリアンジェラートのお店ができたそうです。今度一緒に行ってみませんか！？」
line = "「イレーナさま！　街にイタリアンジェラートのお店ができたそうです。今度一緒に行ってみませんか！？」"

[[dialogue]]
speaker = "シャロン"
# 「イレーナさま！　イレーナさま！　イレーナさま～！」
line = "「イレーナさま！　イレーナさま！　イレーナさま～！」"

[[dialogue]]
speaker = "イレーナ"
# 「あ～も～うるさーい！　ちょっとは静かにしなさーい！」
line = "「あ～も～うるさーい！　ちょっとは静かにしなさーい！」"
