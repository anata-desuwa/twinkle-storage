[[dialogue]]
speaker = "unk"
# 第１話,破滅の手,B
line = "第１話,破滅の手,B"

[[dialogue]]
speaker = "クロト"
# 「ディザスターハンド……？」
line = "「ディザスターハンド……？」"

[[dialogue]]
speaker = "梨緒"
# 「ああ。私たちは、便宜上あれをそう呼んでいた」
line = "「ああ。私たちは、便宜上あれをそう呼んでいた」"

[[dialogue]]
speaker = "クロト"
# 「私たち？」
line = "「私たち？」"

[[dialogue]]
speaker = "梨緒"
# 「新星学園と流星学園の残存勢力だ」
line = "「新星学園と流星学園の残存勢力だ」"

[[dialogue]]
speaker = "梨緒"
# 「星騎士のほとんどを失った両学園は、残った戦力をかき集めて、ディザスターハンドに最後の戦いを挑んだ」
line = "「星騎士のほとんどを失った両学園は、残った戦力をかき集めて、ディザスターハンドに最後の戦いを挑んだ」"

[[dialogue]]
speaker = "梨緒"
# 「結果は全滅。最後に残った私とフィオナ、そしてジグもあれに──」
line = "「結果は全滅。最後に残った私とフィオナ、そしてジグもあれに──」"

[[dialogue]]
speaker = "梨緒"
# 「っ……頭痛が……」
line = "「っ……頭痛が……」"

[[dialogue]]
speaker = "梨緒"
# （くっ……ジグのことを思い出そうとすると、頭が痛む……）
line = "（くっ……ジグのことを思い出そうとすると、頭が痛む……）"

[[dialogue]]
speaker = "梨緒"
# （あの時、ジグも私と一緒にいた。そのはずだ。なのに何だ、この違和感は……）
line = "（あの時、ジグも私と一緒にいた。そのはずだ。なのに何だ、この違和感は……）"

[[dialogue]]
speaker = "クロト"
# 「梨緒、大丈夫か？」
line = "「梨緒、大丈夫か？」"

[[dialogue]]
speaker = "梨緒"
# 「ああ、すまない。軽い頭痛だ、気にしないでくれ」
line = "「ああ、すまない。軽い頭痛だ、気にしないでくれ」"

[[dialogue]]
speaker = "梨緒"
# 「重要なのは、あのディザスターハンドが強大な力を持っているということだ。流星・新星両学園の星騎士をまとめて叩き潰すほどにな」
line = "「重要なのは、あのディザスターハンドが強大な力を持っているということだ。流星・新星両学園の星騎士をまとめて叩き潰すほどにな」"

[[dialogue]]
speaker = "unk"
# 両学園の壊滅。星騎士の絶滅。
line = "両学園の壊滅。星騎士の絶滅。"

[[dialogue]]
speaker = "unk"
# 耳を疑うような、聞くだけで重くのしかかるような内容を、梨緒は淡々と告げた。
line = "耳を疑うような、聞くだけで重くのしかかるような内容を、梨緒は淡々と告げた。"

[[dialogue]]
speaker = "マトイ"
# 「また敵が増えたってこと……？　いや、あの手は前からいたけど……」
line = "「また敵が増えたってこと……？　いや、あの手は前からいたけど……」"

[[dialogue]]
speaker = "unk"
# デネブから襲撃を仕掛けてきた極星学園。
line = "デネブから襲撃を仕掛けてきた極星学園。"

[[dialogue]]
speaker = "unk"
# リクリエの使徒・ジグ。
line = "リクリエの使徒・ジグ。"

[[dialogue]]
speaker = "unk"
# そしてディザスターハンド。
line = "そしてディザスターハンド。"

[[dialogue]]
speaker = "unk"
# 世界は全然平和になんてなっていなかった。何せこれだけの脅威が迫っているのだから。
line = "世界は全然平和になんてなっていなかった。何せこれだけの脅威が迫っているのだから。"

[[dialogue]]
speaker = "ヴィーナス"
# 「ようするに、あの手はリクリエなのよね？　どうしてあれは今私たちを襲ってこないの？」
line = "「ようするに、あの手はリクリエなのよね？　どうしてあれは今私たちを襲ってこないの？」"

[[dialogue]]
speaker = "梨緒"
# 「リクリエそのものと表現するには語弊があるが……ディザスターハンドも無制限に出現することができないのかもしれない」
line = "「リクリエそのものと表現するには語弊があるが……ディザスターハンドも無制限に出現することができないのかもしれない」"

[[dialogue]]
speaker = "梨緒"
# 「おそらくあれは常にフィーニスの塔の頂上にいるわけではない。現れたのには何かきっかけがあったんじゃないのか？」
line = "「おそらくあれは常にフィーニスの塔の頂上にいるわけではない。現れたのには何かきっかけがあったんじゃないのか？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「！　それって──」
line = "「！　それって──」"

[[dialogue]]
speaker = "unk"
# 俺たちがフィーニスの塔を、三界を見渡す視座として利用しようとしたこと。
line = "俺たちがフィーニスの塔を、三界を見渡す視座として利用しようとしたこと。"

[[dialogue]]
speaker = "unk"
# それを妨害するためにディザスターハンドは俺たちの前に現れたのか？
line = "それを妨害するためにディザスターハンドは俺たちの前に現れたのか？"

[[dialogue]]
speaker = "サーシャ"
# 「私たちの動きを察知された、と思った方が良さそうね～。どうやったのかはわからないけれど」
line = "「私たちの動きを察知された、と思った方が良さそうね～。どうやったのかはわからないけれど」"

[[dialogue]]
speaker = "クロト"
# 「そうですね。情報を得るためにフィーニスの塔を登るのは諦めた方がいいでしょう」
line = "「そうですね。情報を得るためにフィーニスの塔を登るのは諦めた方がいいでしょう」"

[[dialogue]]
speaker = "マトイ"
# 「そんな……何かわかるかもって思ったのに……」
line = "「そんな……何かわかるかもって思ったのに……」"

[[dialogue]]
speaker = "unk"
# 状況はまた悪化した。
line = "状況はまた悪化した。"

[[dialogue]]
speaker = "unk"
# ただでさえ情報を得る手段が限られているのに、その１つが封じられたのだから。
line = "ただでさえ情報を得る手段が限られているのに、その１つが封じられたのだから。"

[[dialogue]]
speaker = "クロト"
# 「ちなみに……みんなは頂上から何か見えたか？」
line = "「ちなみに……みんなは頂上から何か見えたか？」"

[[dialogue]]
speaker = "アナ"
# 「いえ、私は撤退するので精いっぱいだったので」
line = "「いえ、私は撤退するので精いっぱいだったので」"

[[dialogue]]
speaker = "サーシャ"
# 「私もそうね～。爆発があったのは感じたけど」
line = "「私もそうね～。爆発があったのは感じたけど」"

[[dialogue]]
speaker = "マトイ"
# 「同じく……ごめんね」
line = "「同じく……ごめんね」"

[[dialogue]]
speaker = "クロト"
# 「ああいや、聞いてみただけだから。気にしないでくれ」
line = "「ああいや、聞いてみただけだから。気にしないでくれ」"

[[dialogue]]
speaker = "unk"
# 俺が見えたのは、ある男の最期。
line = "俺が見えたのは、ある男の最期。"

[[dialogue]]
speaker = "？？？"
# 『道は俺が──娘の成長をこの目で見られないのは残念だが──元気に育ってくれるなら──』
line = "『道は俺が──娘の成長をこの目で見られないのは残念だが──元気に育ってくれるなら──』"

[[dialogue]]
speaker = "？？？"
# 『<ruby=ヴィーナス>娘</ruby>を頼んだぞ……ラク──』
line = "『<ruby>娘<rt>ヴィーナス</rt></ruby>を頼んだぞ……ラク──』"

[[dialogue]]
speaker = "unk"
# おそらくあれはデネブの俺。
line = "おそらくあれはデネブの俺。"

[[dialogue]]
speaker = "unk"
# 敗北を悟った緋宮クロトが、最期の力を振り絞ってヴィーナスを送り出そうとしたんだ。
line = "敗北を悟った緋宮クロトが、最期の力を振り絞ってヴィーナスを送り出そうとしたんだ。"

[[dialogue]]
speaker = "ヴィーナス"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# ヴィーナスの沈痛な表情を見て察する。
line = "ヴィーナスの沈痛な表情を見て察する。"

[[dialogue]]
speaker = "unk"
# 彼女も同じ光景を見たんだ。
line = "彼女も同じ光景を見たんだ。"

[[dialogue]]
speaker = "unk"
# 俺が敗れる姿を。父の最期を。
line = "俺が敗れる姿を。父の最期を。"

[[dialogue]]
speaker = "クロト"
# 「ヴィーナス」
line = "「ヴィーナス」"

[[dialogue]]
speaker = "ヴィーナス"
# 「う、うん」
line = "「う、うん」"

[[dialogue]]
speaker = "unk"
# はっとして顔を上げるヴィーナス。
line = "はっとして顔を上げるヴィーナス。"

[[dialogue]]
speaker = "unk"
# その目は潤み、目の端に雫が浮かんでいた。
line = "その目は潤み、目の端に雫が浮かんでいた。"

[[dialogue]]
speaker = "クロト"
# 「デネブの俺はもういない。だけどこの世界の緋宮クロトはここにいる。俺がヴィーナスを守るから」
line = "「デネブの俺はもういない。だけどこの世界の緋宮クロトはここにいる。俺がヴィーナスを守るから」"

[[dialogue]]
speaker = "ヴィーナス"
# 「！」
line = "「！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうね……頼りにしてるわ、パパ」
line = "「そうね……頼りにしてるわ、パパ」"

[[dialogue]]
speaker = "unk"
# 冗談めかしながらヴィーナスが笑う。
line = "冗談めかしながらヴィーナスが笑う。"

[[dialogue]]
speaker = "unk"
# 破滅に向かう世界から渡ってきた彼女を、決して１人にしないと改めて誓う。
line = "破滅に向かう世界から渡ってきた彼女を、決して１人にしないと改めて誓う。"

[[dialogue]]
speaker = "ヴィーナス"
# 「ひとまず、ディザスターハンドのことはヘレナちゃんにも報告しておくわ」
line = "「ひとまず、ディザスターハンドのことはヘレナちゃんにも報告しておくわ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あ、そうだ、いいニュースもあるのよ。ヘレナちゃんが新しい新星学園の学園長候補を連れてきてくれてね」
line = "「あ、そうだ、いいニュースもあるのよ。ヘレナちゃんが新しい新星学園の学園長候補を連れてきてくれてね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「次の理事会で承認されれば、正式に学園長に就任するわ。ヘレナちゃんが太鼓判を押してた人だからきっと大丈夫よ！」
line = "「次の理事会で承認されれば、正式に学園長に就任するわ。ヘレナちゃんが太鼓判を押してた人だからきっと大丈夫よ！」"

[[dialogue]]
speaker = "クロト"
# 「新しい学園長……どんな人なんだろう？」
line = "「新しい学園長……どんな人なんだろう？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私も知らないけど、きっと驚くって言ってたわ」
line = "「私も知らないけど、きっと驚くって言ってたわ」"

[[dialogue]]
speaker = "梨緒"
# 「私の新星学園も、学園長はセイファート氏だったから心当たりはないな……」
line = "「私の新星学園も、学園長はセイファート氏だったから心当たりはないな……」"

[[dialogue]]
speaker = "梨緒"
# 「気になるところだが、そろそろ家に帰ろう。今日はもう遅い」
line = "「気になるところだが、そろそろ家に帰ろう。今日はもう遅い」"

[[dialogue]]
speaker = "梨緒"
# 「居候の身で深夜に帰るのは、とても申し訳ない気持ちになるがな……」
line = "「居候の身で深夜に帰るのは、とても申し訳ない気持ちになるがな……」"

[[dialogue]]
speaker = "アナ"
# 「私もマムが怖いです」
line = "「私もマムが怖いです」"

[[dialogue]]
speaker = "サーシャ"
# 「何を言われるかしら～」
line = "「何を言われるかしら～」"

[[dialogue]]
speaker = "マトイ"
# 「あ……ＤＩＳＣにお母さんから留守電入ってる……」
line = "「あ……ＤＩＳＣにお母さんから留守電入ってる……」"

[[dialogue]]
speaker = "unk"
# 時刻を見ると、とっくに零時を回っていた。
line = "時刻を見ると、とっくに零時を回っていた。"

[[dialogue]]
speaker = "unk"
# 母さんになんて言おうかと考えながら、帰路に就いたのだった。
line = "母さんになんて言おうかと考えながら、帰路に就いたのだった。"

[[dialogue]]
speaker = "unk"
# しんと静まった街の中を、梨緒は月明かりを浴びながら歩く。
line = "しんと静まった街の中を、梨緒は月明かりを浴びながら歩く。"

[[dialogue]]
speaker = "unk"
# 向かっているのは教皇庁公邸──行く宛てのない梨緒の仮の住処だ。
line = "向かっているのは教皇庁公邸──行く宛てのない梨緒の仮の住処だ。"

[[dialogue]]
speaker = "梨緒"
# 「キリカさんになんと言われるか……想像しただけで頭が痛い」
line = "「キリカさんになんと言われるか……想像しただけで頭が痛い」"

[[dialogue]]
speaker = "梨緒"
# 「本当に……頭が痛いな……」
line = "「本当に……頭が痛いな……」"

[[dialogue]]
speaker = "unk"
# 梨緒が脳裏に浮かぶのは、あの破滅の化身の姿。
line = "梨緒が脳裏に浮かぶのは、あの破滅の化身の姿。"

[[dialogue]]
speaker = "unk"
# 対峙したのは一瞬だったが、その暴威は梨緒の知るそれといささかの違いもない。
line = "対峙したのは一瞬だったが、その暴威は梨緒の知るそれといささかの違いもない。"

[[dialogue]]
speaker = "梨緒"
# 「ディザスターハンドは必ず倒さなくてはならない。さもなくば全て破壊し尽くされてしまう。だが……」
line = "「ディザスターハンドは必ず倒さなくてはならない。さもなくば全て破壊し尽くされてしまう。だが……」"

[[dialogue]]
speaker = "梨緒"
# （ディザスターハンドは私たちの前に現れた。こちらに緋宮クロトがいるにもかかわらず）
line = "（ディザスターハンドは私たちの前に現れた。こちらに緋宮クロトがいるにもかかわらず）"

[[dialogue]]
speaker = "梨緒"
# （そして平行世界デネブから現れた極星学園……）
line = "（そして平行世界デネブから現れた極星学園……）"

[[dialogue]]
speaker = "梨緒"
# （なら私の世界は──）
line = "（なら私の世界は──）"

[[dialogue]]
speaker = "unk"
# 梨緒の頭の中で考えがぐるぐる巡る。
line = "梨緒の頭の中で考えがぐるぐる巡る。"

[[dialogue]]
speaker = "unk"
# やがてひとつの結論に辿り着こうとするが、その前に思考が止まる。
line = "やがてひとつの結論に辿り着こうとするが、その前に思考が止まる。"

[[dialogue]]
speaker = "unk"
# いや、最初からわかっていたことかもしれない。
line = "いや、最初からわかっていたことかもしれない。"

[[dialogue]]
speaker = "unk"
# ただそれを受け入れることができなかっただけ──
line = "ただそれを受け入れることができなかっただけ──"

[[dialogue]]
speaker = "梨緒"
# （ジグ……）
line = "（ジグ……）"

[[dialogue]]
speaker = "ジグ"
# 『可能性は残されている。私はそう思うよ』
line = "『可能性は残されている。私はそう思うよ』"

[[dialogue]]
speaker = "梨緒"
# 「可能性、か……」
line = "「可能性、か……」"

[[dialogue]]
speaker = "梨緒"
# 「私たちの世界を救う可能性は……もう……」
line = "「私たちの世界を救う可能性は……もう……」"
