[[dialogue]]
speaker = "unk"
# トレジアンナさんが復活してから数日後、俺と魔法少女メンバーは、昼休みにカフェテリアへと集まっていた。
line = "トレジアンナさんが復活してから数日後、俺と魔法少女メンバーは、昼休みにカフェテリアへと集まっていた。"

[[dialogue]]
speaker = "トレジアンナ"
# 「そんなわけで、今日から私も附属校の生徒になっちゃいました～☆　キラッ☆」
line = "「そんなわけで、今日から私も附属校の生徒になっちゃいました～☆　キラッ☆」"

[[dialogue]]
speaker = "トレジアンナ"
# 「どうですか～、会長さん、似合います～？」
line = "「どうですか～、会長さん、似合います～？」"

[[dialogue]]
speaker = "unk"
# 似合ってて可愛いです
line = "似合ってて可愛いです"

[[dialogue]]
speaker = "トレジアンナ"
# 「えへへ～<emoji=heart04>　ありがとうございます～♪　みなさんみたいに、私も会長さんから褒めて貰いたいな～って、ずっと思ってたんですよね～♪」
line = "「えへへ～<emoji=heart04>　ありがとうございます～♪　みなさんみたいに、私も会長さんから褒めて貰いたいな～って、ずっと思ってたんですよね～♪」"

[[dialogue]]
speaker = "トレジアンナ"
# 「あっ、そうだ♪　魔法少女が揃った記念に、みなさんで写真を撮りませんか？」
line = "「あっ、そうだ♪　魔法少女が揃った記念に、みなさんで写真を撮りませんか？」"

[[dialogue]]
speaker = "トマル"
# 「写真、ですか？」
line = "「写真、ですか？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「はい♪　私も自分用のＤＩＳＣを買いましたし、コレクションしときたいんですよね～♪」
line = "「はい♪　私も自分用のＤＩＳＣを買いましたし、コレクションしときたいんですよね～♪」"

[[dialogue]]
speaker = "プリムラ"
# 「やれやれ、一体どんな写真をコレクションしとるのやら」
line = "「やれやれ、一体どんな写真をコレクションしとるのやら」"

[[dialogue]]
speaker = "トレジアンナ"
# 「ふふふ、知りたいですか？」
line = "「ふふふ、知りたいですか？」"

[[dialogue]]
speaker = "サチ"
# 「聞くのがちょっと怖いんですけど……」
line = "「聞くのがちょっと怖いんですけど……」"

[[dialogue]]
speaker = "トレジアンナ"
# 「名づけて――『サチさんの可愛い日常シーンコレクション』です！」
line = "「名づけて――『サチさんの可愛い日常シーンコレクション』です！」"

[[dialogue]]
speaker = "サチ"
# 「はぁっ！？　私、そんなの聞いてないんですけど！？　というか、なんで私なんですか！？」
line = "「はぁっ！？　私、そんなの聞いてないんですけど！？　というか、なんで私なんですか！？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「シリーズ第１弾だからです！　もちろん、２弾以降も予定してます！」
line = "「シリーズ第１弾だからです！　もちろん、２弾以降も予定してます！」"

[[dialogue]]
speaker = "プリムラ"
# 「おい待て！　それ絶対、第２弾は我のパターンじゃろ！」
line = "「おい待て！　それ絶対、第２弾は我のパターンじゃろ！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「てへぺろ☆」
line = "「てへぺろ☆」"

[[dialogue]]
speaker = "トレジアンナ"
# 「そしてこれが、コレクション中のフォトアルバムです♪」
line = "「そしてこれが、コレクション中のフォトアルバムです♪」"

[[dialogue]]
speaker = "unk"
# さらっと『収納魔法』で空間に穴を開け、そこから写真の納まったファイル取り出して見せるトレジアンナさん。
line = "さらっと『収納魔法』で空間に穴を開け、そこから写真の納まったファイル取り出して見せるトレジアンナさん。"

[[dialogue]]
speaker = "トレジアンナ"
# 「一昨日、サチさんの家にお泊りした時に撮った寝顔や、生徒会長の仕事をしている時の真面目な様子――」
line = "「一昨日、サチさんの家にお泊りした時に撮った寝顔や、生徒会長の仕事をしている時の真面目な様子――」"

[[dialogue]]
speaker = "トレジアンナ"
# 「ご飯を食べてる時の美味しそうな顔など、これを見ただけでサチさんの可愛さが十二分に伝わるようなアルバムにする予定です！」
line = "「ご飯を食べてる時の美味しそうな顔など、これを見ただけでサチさんの可愛さが十二分に伝わるようなアルバムにする予定です！」"

[[dialogue]]
speaker = "シズハ"
# 「はい、質問！　サチちゃんのお尻を写したカットはありますか！？」
line = "「はい、質問！　サチちゃんのお尻を写したカットはありますか！？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「もちろんです！　家の玄関から出る際、靴を履いている時の――」
line = "「もちろんです！　家の玄関から出る際、靴を履いている時の――」"

[[dialogue]]
speaker = "サチ"
# 「ちょっ、見せないで下さい！　いつの間に撮ったんですか！？　そのコレクションは禁止！　没収です！」
line = "「ちょっ、見せないで下さい！　いつの間に撮ったんですか！？　そのコレクションは禁止！　没収です！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「わわっ！？　サチさん、ちょっとタンマ！　気に入ってる物なんで、没収は勘弁して下さ～い！」
line = "「わわっ！？　サチさん、ちょっとタンマ！　気に入ってる物なんで、没収は勘弁して下さ～い！」"

[[dialogue]]
speaker = "unk"
# サチが急いで席から立ち上がってアルバムを取ろうと手を伸ばし、トレジアンナさんは慌ててアルバムを引っ込めようとする。
line = "サチが急いで席から立ち上がってアルバムを取ろうと手を伸ばし、トレジアンナさんは慌ててアルバムを引っ込めようとする。"

[[dialogue]]
speaker = "unk"
# が、その際に、トレジアンナさんの手からすっぽ抜けて、アルバムは宙を舞ってしまう。
line = "が、その際に、トレジアンナさんの手からすっぽ抜けて、アルバムは宙を舞ってしまう。"

[[dialogue]]
speaker = "unk"
# おっと！　キャッチ！
line = "おっと！　キャッチ！"

[[dialogue]]
speaker = "unk"
# 咄嗟に両手でそれを受け止める俺だったが――
line = "咄嗟に両手でそれを受け止める俺だったが――"

[[dialogue]]
speaker = "サチ"
# 「お兄さん、見ちゃダメですーーーっ！」
line = "「お兄さん、見ちゃダメですーーーっ！」"

[[dialogue]]
speaker = "unk"
# 慌てたサチがテーブルを回り込んで走って来る。
line = "慌てたサチがテーブルを回り込んで走って来る。"

[[dialogue]]
speaker = "unk"
# が、次の瞬間、ツルッと滑ってバランスを崩す。
line = "が、次の瞬間、ツルッと滑ってバランスを崩す。"

[[dialogue]]
speaker = "サチ"
# 「きゃっ！？」
line = "「きゃっ！？」"

[[dialogue]]
speaker = "unk"
# 俺はサチの体を受け止めて、支えようとするが――
line = "俺はサチの体を受け止めて、支えようとするが――"

[[dialogue]]
speaker = "サチ"
# 「あいたっ……！」
line = "「あいたっ……！」"

[[dialogue]]
speaker = "unk"
# サチは急にまた変な方向に滑って、その場で尻餅をついてしまった。
line = "サチは急にまた変な方向に滑って、その場で尻餅をついてしまった。"

[[dialogue]]
speaker = "トレジアンナ"
# 「会長さん、アルバムのキャッチ、ナイスです！　サチさんには悪いですが、今の内にアルバムをしまっちゃいますよ～」
line = "「会長さん、アルバムのキャッチ、ナイスです！　サチさんには悪いですが、今の内にアルバムをしまっちゃいますよ～」"

[[dialogue]]
speaker = "unk"
# しめしめといった様子でこちらへ駆け寄ってくるトレジアンナさん。
line = "しめしめといった様子でこちらへ駆け寄ってくるトレジアンナさん。"

[[dialogue]]
speaker = "unk"
# が、突然、今度は彼女の方がツルッと足元を滑らせてバランスを崩す。
line = "が、突然、今度は彼女の方がツルッと足元を滑らせてバランスを崩す。"

[[dialogue]]
speaker = "トレジアンナ"
# 「ほえっ！？　わわわっ！？」
line = "「ほえっ！？　わわわっ！？」"

[[dialogue]]
speaker = "unk"
# 俺はトレジアンナさんの体を受け止めて、支えようとする。
line = "俺はトレジアンナさんの体を受け止めて、支えようとする。"

[[dialogue]]
speaker = "unk"
# しかし、勢いよく突っ込んできた彼女に押されて、俺も床に転がるように転倒してしまった。
line = "しかし、勢いよく突っ込んできた彼女に押されて、俺も床に転がるように転倒してしまった。"

[[dialogue]]
speaker = "トレジアンナ"
# 「あんっ<emoji=heart04>」
line = "「あんっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 気づけば俺は――どうしてそうなったのか、トレジアンナさんのアンバランスにたわわな胸に顔を埋もれさせるような形で、彼女を押し倒してしまっていた。
line = "気づけば俺は――どうしてそうなったのか、トレジアンナさんのアンバランスにたわわな胸に顔を埋もれさせるような形で、彼女を押し倒してしまっていた。"

[[dialogue]]
speaker = "unk"
# おわぁっ！？　トレジアンナさん、ごめん！
line = "おわぁっ！？　トレジアンナさん、ごめん！"

[[dialogue]]
speaker = "トレジアンナ"
# 「あ、あれ……！？　サチさんじゃなくて、私の方が会長さんとラッキースケベ状態に！？　私的にはちょっと嬉しいですけど<emoji=heart04>」
line = "「あ、あれ……！？　サチさんじゃなくて、私の方が会長さんとラッキースケベ状態に！？　私的にはちょっと嬉しいですけど<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
# 「なっ！？　お、お兄さん、エッチなことは禁止ですーーーっ！！」
line = "「なっ！？　お、お兄さん、エッチなことは禁止ですーーーっ！！」"

[[dialogue]]
speaker = "unk"
# 翌日――
line = "翌日――"

[[dialogue]]
speaker = "unk"
# 俺と魔法少女メンバーはサチから呼び出されて、星徒会室に集まっていた。
line = "俺と魔法少女メンバーはサチから呼び出されて、星徒会室に集まっていた。"

[[dialogue]]
speaker = "プリムラ"
# 「サチ、大事な話とは一体なんなのじゃ？」
line = "「サチ、大事な話とは一体なんなのじゃ？」"

[[dialogue]]
speaker = "サチ"
# 「うん、実は――」
line = "「うん、実は――」"

[[dialogue]]
speaker = "サチ"
# 「私、どうやら幸運体質がなくなっちゃったみたいで……」
line = "「私、どうやら幸運体質がなくなっちゃったみたいで……」"

[[dialogue]]
speaker = "シズハ"
# 「えぇっ！？」
line = "「えぇっ！？」"

[[dialogue]]
speaker = "トマル"
# 「一体どうして……！？」
line = "「一体どうして……！？」"

[[dialogue]]
speaker = "unk"
# 俺たちは思わず、驚きの声を上げてしまうのだった――
line = "俺たちは思わず、驚きの声を上げてしまうのだった――"
