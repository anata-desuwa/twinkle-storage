[[dialogue]]
speaker = "ルリエル？"
# 「ドジじゃありませ～ん！」
line = "「ドジじゃありませ～ん！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「んん～……？　この感じ……やっぱり、なんだか以前にも、似たようなことがあったような……」
line = "「んん～……？　この感じ……やっぱり、なんだか以前にも、似たようなことがあったような……」"

[[dialogue]]
speaker = "ナナカ"
# 「えっ、もしかして、ロロちゃんがこうなっちゃった心当たり、なんかあるの？」
line = "「えっ、もしかして、ロロちゃんがこうなっちゃった心当たり、なんかあるの？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……はっ！　そうよ、前にもリクリエの影響で、ルリエルがこんなふうになってたじゃない！」
line = "「……はっ！　そうよ、前にもリクリエの影響で、ルリエルがこんなふうになってたじゃない！」"

[[dialogue]]
speaker = "フィオナ"
# 「あ……そうでした！　私たちはまた、認識改変の影響を受けていた、ということですか……！？　不覚ですっ」
line = "「あ……そうでした！　私たちはまた、認識改変の影響を受けていた、ということですか……！？　不覚ですっ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「でも、ナナカと話してる内に、思い出せるようになったわよね？　なんで？」
line = "「でも、ナナカと話してる内に、思い出せるようになったわよね？　なんで？」"

[[dialogue]]
speaker = "フィオナ"
# 「影響を受けていないナナカさんの干渉で、認識改変が綻びた、という感じでしょうか」
line = "「影響を受けていないナナカさんの干渉で、認識改変が綻びた、という感じでしょうか」"

