line = "「て、てやんでい……？」"

[[dialogue]]
speaker = "ナナカ"
# 「ったく、しゃーないね！　なんだかよくわかんないけど、そういうことなら任せときな！」
line = "「ったく、しゃーないね！　なんだかよくわかんないけど、そういうことなら任せときな！」"

