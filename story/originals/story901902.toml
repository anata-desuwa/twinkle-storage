line = "「そのためにもまずは、彼女に少し落ち着いてもらう必要があるかと……」"

[[dialogue]]
speaker = "ルリエル？"
# 「むむむ～っ、落ち着くのは皆さんの方ですよ！」
line = "「むむむ～っ、落ち着くのは皆さんの方ですよ！」"

[[dialogue]]
speaker = "ルリエル？"
# 「原因はよくわかりませんが、どうやら皆さん、正気ではないご様子……」
line = "「原因はよくわかりませんが、どうやら皆さん、正気ではないご様子……」"

[[dialogue]]
speaker = "ルリエル？"
