speaker = "ナナカ"
# 「え、アタシ、なんかやっちゃいました……？」
line = "「え、アタシ、なんかやっちゃいました……？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「前にもね、私たちの仲間の様子がおかしくなったことがあったの。もう大変だったんだから」
line = "「前にもね、私たちの仲間の様子がおかしくなったことがあったの。もう大変だったんだから」"

[[dialogue]]
speaker = "ルリエル？"
