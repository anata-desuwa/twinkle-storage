[[dialogue]]
speaker = "unk"
# ナミエル曰く、クラスメイトの子たちは俺たちと交流を深める為に、もともと歓迎会のようなものをしたいと考えてくれていたらしい。
line = "ナミエル曰く、クラスメイトの子たちは俺たちと交流を深める為に、もともと歓迎会のようなものをしたいと考えてくれていたらしい。"

[[dialogue]]
speaker = "unk"
# そんな時に、俺がアルモたん達と一緒に鬼ごっこをしないかと声をかけたことで、みんな快く参加してくれる流れになったというわけだった。
line = "そんな時に、俺がアルモたん達と一緒に鬼ごっこをしないかと声をかけたことで、みんな快く参加してくれる流れになったというわけだった。"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「クラスの皆さま、とてもいい子たちですね♪」
line = "「クラスの皆さま、とてもいい子たちですね♪」"

[[dialogue]]
speaker = "unk"
# じゃんけんの結果、鬼になったアルモたんやセシアから逃げていると、マグダレナさんが楽しげに言う。
line = "じゃんけんの結果、鬼になったアルモたんやセシアから逃げていると、マグダレナさんが楽しげに言う。"

[[dialogue]]
speaker = "ナミエル"
# 「まぁ、半分は面白がっているだけだと思いますが……確かに、いい人たちだらけです」
line = "「まぁ、半分は面白がっているだけだと思いますが……確かに、いい人たちだらけです」"

[[dialogue]]
speaker = "ナミエル"
# 「人付き合いが決して得意とは言えない私とも、皆さま、仲よくしてくれていますから」
line = "「人付き合いが決して得意とは言えない私とも、皆さま、仲よくしてくれていますから」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「ふふっ、ナミエルさまが笑ったの、初めてみました」
line = "「ふふっ、ナミエルさまが笑ったの、初めてみました」"

[[dialogue]]
speaker = "ナミエル"
# 「えっ、私いま、笑ってましたか？」
line = "「えっ、私いま、笑ってましたか？」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「はい。ナミエルさまは良き学園生活を送られているようですね」
line = "「はい。ナミエルさまは良き学園生活を送られているようですね」"

[[dialogue]]
speaker = "ナミエル"
# 「……！　そうですね。メイド隊の同僚や、クラスメイトと一緒に過ごす日々は、悪くないです」
line = "「……！　そうですね。メイド隊の同僚や、クラスメイトと一緒に過ごす日々は、悪くないです」"

[[dialogue]]
speaker = "ナミエル"
# 「あとはまぁ……最近は、よくちょっかいをかけてくる男の先輩もいらっしゃるので。じ～っ……」
line = "「あとはまぁ……最近は、よくちょっかいをかけてくる男の先輩もいらっしゃるので。じ～っ……」"

[[dialogue]]
speaker = "unk"
# そ、それって……
line = "そ、それって……"

[[dialogue]]
speaker = "ナミエル"
# 「ある意味、退屈しない日々です」
line = "「ある意味、退屈しない日々です」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「ふふっ、お２人とも仲がよさそうですね♪」
line = "「ふふっ、お２人とも仲がよさそうですね♪」"

[[dialogue]]
speaker = "ナミエル"
# 「あっ……い、いや、今のはそういう意味では……！」
line = "「あっ……い、いや、今のはそういう意味では……！」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「私もこれから、ナミエルさまと良き友人関係を築けていけたら嬉しいです。手始めに――」
line = "「私もこれから、ナミエルさまと良き友人関係を築けていけたら嬉しいです。手始めに――」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「お互い、名前を呼ぶ時に敬称を付けるのを止めるところからですね♪」
line = "「お互い、名前を呼ぶ時に敬称を付けるのを止めるところからですね♪」"

[[dialogue]]
speaker = "ナミエル"
# 「え？」
line = "「え？」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「私、アルモタヘルを見ていて、気づいたのです。誰かに親しく呼んで欲しいのなら、まずは自分が相手を親しく呼ぶようにしなければと」
line = "「私、アルモタヘルを見ていて、気づいたのです。誰かに親しく呼んで欲しいのなら、まずは自分が相手を親しく呼ぶようにしなければと」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「なので――<b>ナミエル</b>。あなたのことは、これからそう呼んでもいいでしょうか？」
line = "「なので――<b>ナミエル</b>。あなたのことは、これからそう呼んでもいいでしょうか？」"

[[dialogue]]
speaker = "ナミエル"
# 「……！　は、はい」
line = "「……！　は、はい」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「あとは、会長も」
line = "「あとは、会長も」"

[[dialogue]]
speaker = "unk"
# もちろん大丈夫だよ
line = "もちろん大丈夫だよ"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「ありがとうございます♪　なので私のことも、『ママダレナ』と呼んでいただけると嬉しいです♪」
line = "「ありがとうございます♪　なので私のことも、『ママダレナ』と呼んでいただけると嬉しいです♪」"

[[dialogue]]
speaker = "ナミエル"
# 「えっと、それは……」
line = "「えっと、それは……」"

[[dialogue]]
speaker = "unk"
# アニマ先輩の呼び方借りて、マグたんかなぁ
line = "アニマ先輩の呼び方借りて、マグたんかなぁ"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「えぇ～～～っ！？　なんでですか～っ！？」
line = "「えぇ～～～っ！？　なんでですか～っ！？」"

[[dialogue]]
speaker = "ナミエル"
# 「ママと呼ぶのは、少し抵抗があるといいますか……」
line = "「ママと呼ぶのは、少し抵抗があるといいますか……」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「そんなぁ～！？　ち、ちょっとだけ！　１回だけでいいから、言ってみてくれませんか！？」
line = "「そんなぁ～！？　ち、ちょっとだけ！　１回だけでいいから、言ってみてくれませんか！？」"

[[dialogue]]
speaker = "ナミエル"
# 「そ、そんな顔を近づけて言われると、困ります……」
line = "「そ、そんな顔を近づけて言われると、困ります……」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「そこをなんとか！　うるうる……」
line = "「そこをなんとか！　うるうる……」"

[[dialogue]]
speaker = "ナミエル"
# （う……瞳をうるうるさせて、かわいい……）
line = "（う……瞳をうるうるさせて、かわいい……）"

[[dialogue]]
speaker = "ナミエル"
# 「わ……わかりました。では、その……マ――」
line = "「わ……わかりました。では、その……マ――」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「ならばナミエル、我のこともアルモたんと呼んでくれなければな！」
line = "「ならばナミエル、我のこともアルモたんと呼んでくれなければな！」"

[[dialogue]]
speaker = "ナミエル"
# 「あ……」
line = "「あ……」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「というわけで、油断しているマグダレナの背中にタッチなのだ♪」
line = "「というわけで、油断しているマグダレナの背中にタッチなのだ♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「なっ！？」
line = "「なっ！？」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「あ、アルモタヘル……今、いいところだったのにぃぃぃ～～～っ！！！」
line = "「あ、アルモタヘル……今、いいところだったのにぃぃぃ～～～っ！！！」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「おおっ！？　マグダレナが怒っているところ、久しぶりに見た気がするのだ！」
line = "「おおっ！？　マグダレナが怒っているところ、久しぶりに見た気がするのだ！」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「鬼のマグダレナから、逃げるのだ～～～っ！　あはははははっ♪」
line = "「鬼のマグダレナから、逃げるのだ～～～っ！　あはははははっ♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「こらぁぁぁ～～～っ！！！　待ちなさ～～～いっ！！！」
line = "「こらぁぁぁ～～～っ！！！　待ちなさ～～～いっ！！！」"

[[dialogue]]
speaker = "ナミエル"
# 「ぷっ……」
line = "「ぷっ……」"

[[dialogue]]
speaker = "ナミエル"
# 「あはっ♪　あははははっ♪」
line = "「あはっ♪　あははははっ♪」"

[[dialogue]]
speaker = "unk"
# 守護天使の２人の追いかけっこが面白かったのか、本気で噴き出して笑ってしまうナミエルなのだった。
line = "守護天使の２人の追いかけっこが面白かったのか、本気で噴き出して笑ってしまうナミエルなのだった。"

[[dialogue]]
speaker = "unk"
# マグダレナから逃げ続けるアルモタヘルは、新星学園の敷地内までやって来ていた。
line = "マグダレナから逃げ続けるアルモタヘルは、新星学園の敷地内までやって来ていた。"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「ふ～っ、ここまで逃げれば、さすがに……」
line = "「ふ～っ、ここまで逃げれば、さすがに……」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「アルモタヘル～！　そう簡単に許しませんよ～！」
line = "「アルモタヘル～！　そう簡単に許しませんよ～！」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「げっ！？　そんな大きい胸をしている癖に、足が速いのだ！？」
line = "「げっ！？　そんな大きい胸をしている癖に、足が速いのだ！？」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「胸関係あります！？　とにかく、観念して――」
line = "「胸関係あります！？　とにかく、観念して――」"

[[dialogue]]
speaker = "マグダレナ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "アルモタヘル"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「えっ！？　私たちの本体アバター……！？」
line = "「えっ！？　私たちの本体アバター……！？」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「なぜ動いているのだ……！？」
line = "「なぜ動いているのだ……！？」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「！　本体の霊力出力が上昇してます！　アルモタヘル！」
line = "「！　本体の霊力出力が上昇してます！　アルモタヘル！」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「くっ……！？」
line = "「くっ……！？」"

[[dialogue]]
speaker = "unk"
# 屋外に突然の爆発音が響き渡るのだった――
line = "屋外に突然の爆発音が響き渡るのだった――"
