[[dialogue]]
speaker = "unk"
# 第７話,拾う神あり,B
line = "第７話,拾う神あり,B"

[[dialogue]]
speaker = "unk"
# そんな騒ぎがあった数日後のこと。
line = "そんな騒ぎがあった数日後のこと。"

[[dialogue]]
speaker = "セドナ"
# 「では行くぞ、ウェンディ」
line = "「では行くぞ、ウェンディ」"

[[dialogue]]
speaker = "ウェンディ"
# 「は、はいっ」
line = "「は、はいっ」"

[[dialogue]]
speaker = "セドナ"
# 「緊張しているか？」
line = "「緊張しているか？」"

[[dialogue]]
speaker = "ウェンディ"
# 「はい……九浄家当主からの呼び出しとなれば。一体どのような用件なのでしょう？」
line = "「はい……九浄家当主からの呼び出しとなれば。一体どのような用件なのでしょう？」"

[[dialogue]]
speaker = "ウェンディ"
# 「ま、まさか先日のカジノでの一件について、ということは……」
line = "「ま、まさか先日のカジノでの一件について、ということは……」"

[[dialogue]]
speaker = "セドナ"
# 「さすがにそれはないだろう」
line = "「さすがにそれはないだろう」"

[[dialogue]]
speaker = "セドナ"
# 「話を持ってきたリノが言うには、今後のネビュラの進退に関わる話だとか」
line = "「話を持ってきたリノが言うには、今後のネビュラの進退に関わる話だとか」"

[[dialogue]]
speaker = "ウェンディ"
# 「そんな重大な話ですか！？」
line = "「そんな重大な話ですか！？」"

[[dialogue]]
speaker = "セドナ"
# 「リノのことだ。面白がって話を大きくしている可能性もあるがな」
line = "「リノのことだ。面白がって話を大きくしている可能性もあるがな」"

[[dialogue]]
speaker = "ウェンディ"
# 「そんな話にどうして私が同席するよう指名を受けたのでしょう？」
line = "「そんな話にどうして私が同席するよう指名を受けたのでしょう？」"

[[dialogue]]
speaker = "セドナ"
# 「分からない、が、先方からの強い要望らしい」
line = "「分からない、が、先方からの強い要望らしい」"

[[dialogue]]
speaker = "ウェンディ"
# 「ぅぅぅ……恐い～、恐すぎます～……」
line = "「ぅぅぅ……恐い～、恐すぎます～……」"

[[dialogue]]
speaker = "セドナ"
# 「そう構えるな。交渉において平常心を保つことが最も重要だぞ」
line = "「そう構えるな。交渉において平常心を保つことが最も重要だぞ」"

[[dialogue]]
speaker = "ウェンディ"
# 「は、はい……」
line = "「は、はい……」"

[[dialogue]]
speaker = "ヘレナ"
# 「よく来てくれた、ネビュラの諸君」
line = "「よく来てくれた、ネビュラの諸君」"

[[dialogue]]
speaker = "ヘレナ"
# 「立てばプリティ、座ればゴージャス。泣く子も黙る九浄家二十六代目当主・九浄ヘレナちゃんとは私のことである」
line = "「立てばプリティ、座ればゴージャス。泣く子も黙る九浄家二十六代目当主・九浄ヘレナちゃんとは私のことである」"

[[dialogue]]
speaker = "セドナ"
# 「対リクリエ秘密組織ネビュラ、司令官のセドナだ」
line = "「対リクリエ秘密組織ネビュラ、司令官のセドナだ」"

[[dialogue]]
speaker = "ウェンディ"
# 「財務を担当しているウェンディです」
line = "「財務を担当しているウェンディです」"

[[dialogue]]
speaker = "ヘレナ"
# 「うむ、ウェンディ殿……先日はカジノでお会いしたが、私のことは覚えているかな？」
line = "「うむ、ウェンディ殿……先日はカジノでお会いしたが、私のことは覚えているかな？」"

[[dialogue]]
speaker = "ウェンディ"
# 「はい、その節は色々と申し訳ありませんでした……」
line = "「はい、その節は色々と申し訳ありませんでした……」"

[[dialogue]]
speaker = "ヘレナ"
# 「否、否、楽しんで頂けたようで大変結構なことだ」
line = "「否、否、楽しんで頂けたようで大変結構なことだ」"

[[dialogue]]
speaker = "ヘレナ"
# 「先日の勝負は誠、見事という他になかったぞ。願わくば貴殿の勝負をもっと見てみたいものだ」
line = "「先日の勝負は誠、見事という他になかったぞ。願わくば貴殿の勝負をもっと見てみたいものだ」"

[[dialogue]]
speaker = "ヘレナ"
# 「そうだ、当カジノのエースディーラーと勝負してみてはどうか？　きっと熱い戦いになると思うが」
line = "「そうだ、当カジノのエースディーラーと勝負してみてはどうか？　きっと熱い戦いになると思うが」"

[[dialogue]]
speaker = "ウェンディ"
# 「い、いえ……ギャンブルはこりごりというか、しばらく控えようかと……」
line = "「い、いえ……ギャンブルはこりごりというか、しばらく控えようかと……」"

[[dialogue]]
speaker = "ヘレナ"
# 「ふむ、それは残念だ。だが、気が変わったらまた遊びに来るとよい」
line = "「ふむ、それは残念だ。だが、気が変わったらまた遊びに来るとよい」"

[[dialogue]]
speaker = "セドナ"
# 「九浄ヘレナ、前置きはそのくらいにして本題に入ってもらえないか？」
line = "「九浄ヘレナ、前置きはそのくらいにして本題に入ってもらえないか？」"

[[dialogue]]
speaker = "ヘレナ"
# 「ふっ……これは失礼した。では、単刀直入に申し上げよう──」
line = "「ふっ……これは失礼した。では、単刀直入に申し上げよう──」"

[[dialogue]]
speaker = "ヘレナ"
# 「ネビュラの……魔女の力を借りたい」
line = "「ネビュラの……魔女の力を借りたい」"

[[dialogue]]
speaker = "セドナ"
# 「ほう？」
line = "「ほう？」"

[[dialogue]]
speaker = "ウェンディ"
# （人間が魔女の力を借りたいって？　どういうことですか？）
line = "（人間が魔女の力を借りたいって？　どういうことですか？）"

[[dialogue]]
speaker = "セドナ"
# 「リクリエを凌いだ今、殊更我らの力を借りねばならぬ事があるとは思えないが？」
line = "「リクリエを凌いだ今、殊更我らの力を借りねばならぬ事があるとは思えないが？」"

[[dialogue]]
speaker = "ヘレナ"
# 「何を言う。貴殿ならばこれだけで、もう十分察しはついているだろう」
line = "「何を言う。貴殿ならばこれだけで、もう十分察しはついているだろう」"

[[dialogue]]
speaker = "セドナ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "セドナ"
# 「……守護天使、か？」
line = "「……守護天使、か？」"

[[dialogue]]
speaker = "ヘレナ"
# 「御名答！」
line = "「御名答！」"

[[dialogue]]
speaker = "ヘレナ"
# 「リクリエは凌いだ。世界は平穏を取り戻したかに見える」
line = "「リクリエは凌いだ。世界は平穏を取り戻したかに見える」"

[[dialogue]]
speaker = "ヘレナ"
# 「だが実際は違う。一触即発、それこそ世界を滅ぼしかねない危険に晒されているのだ」
line = "「だが実際は違う。一触即発、それこそ世界を滅ぼしかねない危険に晒されているのだ」"

[[dialogue]]
speaker = "ウェンディ"
# （守護天使の問題、ですか……なるほど）
line = "（守護天使の問題、ですか……なるほど）"

[[dialogue]]
speaker = "ウェンディ"
# （星騎士によって解放されはしたが、一時、守護天使たちは堕天使となってしまっていました）
line = "（星騎士によって解放されはしたが、一時、守護天使たちは堕天使となってしまっていました）"

[[dialogue]]
speaker = "ウェンディ"
# （その守護天使の本体は魔界に封印されています……）
line = "（その守護天使の本体は魔界に封印されています……）"

[[dialogue]]
speaker = "ヘレナ"
# 「守護天使の本体が封印された状態では、本来の役目を十全に果たすことが出来ない」
line = "「守護天使の本体が封印された状態では、本来の役目を十全に果たすことが出来ない」"

[[dialogue]]
speaker = "ヘレナ"
# 「現在、信徒たちの祈りの力によって持ちこたえてはいるが、これを放置し続ければ取り返しのつかぬ大きな問題へと発展するであろう」
line = "「現在、信徒たちの祈りの力によって持ちこたえてはいるが、これを放置し続ければ取り返しのつかぬ大きな問題へと発展するであろう」"

[[dialogue]]
speaker = "ヘレナ"
# 「そうなる前に、守護天使たちの本体を解放し、力を取り戻してもらわねばならないのだ」
line = "「そうなる前に、守護天使たちの本体を解放し、力を取り戻してもらわねばならないのだ」"

[[dialogue]]
speaker = "ウェンディ"
# （そう……その危険は我々も察知し、かねてより守護天使の封じられた神殿を探していました……）
line = "（そう……その危険は我々も察知し、かねてより守護天使の封じられた神殿を探していました……）"

[[dialogue]]
speaker = "セドナ"
# 「……守護天使の封印を解くために、大人数の星騎士を魔界に送りたい」
line = "「……守護天使の封印を解くために、大人数の星騎士を魔界に送りたい」"

[[dialogue]]
speaker = "セドナ"
# 「だが大交流の時期もまだ遠く、世界を渡る術がない……たったひとつ、魔女の森の世界樹以外──」
line = "「だが大交流の時期もまだ遠く、世界を渡る術がない……たったひとつ、魔女の森の世界樹以外──」"

[[dialogue]]
speaker = "セドナ"
# 「それで緋宮リノを通じて、私に連絡をよこしたというわけだ」
line = "「それで緋宮リノを通じて、私に連絡をよこしたというわけだ」"

[[dialogue]]
speaker = "ヘレナ"
# 「うむ、そういうことだ」
line = "「うむ、そういうことだ」"

[[dialogue]]
speaker = "セドナ"
# 「守護天使の問題は、魔女としても見過ごせない事態だ。協力もやぶさかではない」
line = "「守護天使の問題は、魔女としても見過ごせない事態だ。協力もやぶさかではない」"

[[dialogue]]
speaker = "セドナ"
# 「だが、我々はこれまでリクリエへの対処を巡って、新星・流星星徒会と対立してきた」
line = "「だが、我々はこれまでリクリエへの対処を巡って、新星・流星星徒会と対立してきた」"

[[dialogue]]
speaker = "セドナ"
# 「そんな我々のことを果たして信用できるのかな？」
line = "「そんな我々のことを果たして信用できるのかな？」"

[[dialogue]]
speaker = "ヘレナ"
# 「ふむ……貴殿は魔界に送った星徒会の面々を、世界樹を封鎖することで人間界に戻ってこれぬようにした、そんなこともあったな」
line = "「ふむ……貴殿は魔界に送った星徒会の面々を、世界樹を封鎖することで人間界に戻ってこれぬようにした、そんなこともあったな」"

[[dialogue]]
speaker = "ヘレナ"
# 「警戒はされるやもしれぬ。だが他に手段はないのだ」
line = "「警戒はされるやもしれぬ。だが他に手段はないのだ」"

[[dialogue]]
speaker = "ヘレナ"
# 「誠意をもって説明すれば皆もきっと分かってくれよう」
line = "「誠意をもって説明すれば皆もきっと分かってくれよう」"

[[dialogue]]
speaker = "ヘレナ"
# 「手段方法は違った。だが我々は存亡をかけて共にリクリエに立ち向かった仲間なのだからな！」
line = "「手段方法は違った。だが我々は存亡をかけて共にリクリエに立ち向かった仲間なのだからな！」"

[[dialogue]]
speaker = "セドナ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ヘレナ"
# 「無論、ネビュラの協力を無償で仰ごうなどとは考えていない。相応の返礼は用意するつもりだ」
line = "「無論、ネビュラの協力を無償で仰ごうなどとは考えていない。相応の返礼は用意するつもりだ」"

[[dialogue]]
speaker = "ヘレナ"
# 「そうだな……以後、ネビュラと我ら学園は同盟を結ぶ、ということでどうだ？」
line = "「そうだな……以後、ネビュラと我ら学園は同盟を結ぶ、ということでどうだ？」"

[[dialogue]]
speaker = "ヘレナ"
# 「同盟関係となった以上、経済的援助は惜しまない。これは願ってもない条件だと思うが」
line = "「同盟関係となった以上、経済的援助は惜しまない。これは願ってもない条件だと思うが」"

[[dialogue]]
speaker = "ウェンディ"
# 「っ……！？」
line = "「っ……！？」"

[[dialogue]]
speaker = "セドナ"
# 「隠すだけ無駄ということか……しかし、そんな情報をどこから得た？　リノ辺りから聞いたか？」
line = "「隠すだけ無駄ということか……しかし、そんな情報をどこから得た？　リノ辺りから聞いたか？」"

[[dialogue]]
speaker = "ヘレナ"
# 「残念ながら違う。だが、貴殿らネビュラと魔女の行く末を想う、善意の者の口添えだ」
line = "「残念ながら違う。だが、貴殿らネビュラと魔女の行く末を想う、善意の者の口添えだ」"

[[dialogue]]
speaker = "セドナ"
# 「そうか……」
line = "「そうか……」"

[[dialogue]]
speaker = "ヘレナ"
# 「返答や如何に？」
line = "「返答や如何に？」"

[[dialogue]]
speaker = "セドナ"
# 「選択の余地がないのはお互い様ということだ。ネビュラとしても金銭的な支援は最も望むべき条件」
line = "「選択の余地がないのはお互い様ということだ。ネビュラとしても金銭的な支援は最も望むべき条件」"

[[dialogue]]
speaker = "ヘレナ"
# 「では同盟成立、ということでよろしいかな？」
line = "「では同盟成立、ということでよろしいかな？」"

[[dialogue]]
speaker = "セドナ"
# 「ああ……『対等な』同盟関係だ」
line = "「ああ……『対等な』同盟関係だ」"

[[dialogue]]
speaker = "ヘレナ"
# 「ふむ？」
line = "「ふむ？」"

[[dialogue]]
speaker = "セドナ"
# 「対等な同盟である以上、我々も協力を惜しまない」
line = "「対等な同盟である以上、我々も協力を惜しまない」"

[[dialogue]]
speaker = "セドナ"
# 「世界樹の通行権だけでは釣り合わないだろう。戦闘員としても可能な限り協力しよう」
line = "「世界樹の通行権だけでは釣り合わないだろう。戦闘員としても可能な限り協力しよう」"

[[dialogue]]
speaker = "ヘレナ"
# 「そうか……感謝する」
line = "「そうか……感謝する」"

[[dialogue]]
speaker = "セドナ"
# 「組織の財務に関してはウェンディに任せている。そちらは頼んでいいな、ウェンディ」
line = "「組織の財務に関してはウェンディに任せている。そちらは頼んでいいな、ウェンディ」"

[[dialogue]]
speaker = "ウェンディ"
# 「はいっ、お任せください！」
line = "「はいっ、お任せください！」"

[[dialogue]]
speaker = "ヘレナ"
# 「ふふふ、以後末永く宜しく頼むぞ」
line = "「ふふふ、以後末永く宜しく頼むぞ」"

[[dialogue]]
speaker = "ウェンディ"
# 「ヘレナ様、こちらこそよろしくお願い致しますっ！」
line = "「ヘレナ様、こちらこそよろしくお願い致しますっ！」"

[[dialogue]]
speaker = "ウェンディ"
# （……そうか、私を会談に指名したのはそういう理由だったのですか）
line = "（……そうか、私を会談に指名したのはそういう理由だったのですか）"

[[dialogue]]
speaker = "ウェンディ"
# （どれだけの援助が頂けるのかわかりません！　でも、でもっ！！）
line = "（どれだけの援助が頂けるのかわかりません！　でも、でもっ！！）"

[[dialogue]]
speaker = "ウェンディ"
# （これできっと、ネビュラは救われますっ！！！！）
line = "（これできっと、ネビュラは救われますっ！！！！）"

[[dialogue]]
speaker = "ヘレナ"
# 「ふむ……こんなところでどうだろうか、トリュファイナ殿？」
line = "「ふむ……こんなところでどうだろうか、トリュファイナ殿？」"

[[dialogue]]
speaker = "トリュファイナ"
# 「ありがとうございます。私のわがままを聞いてくださって」
line = "「ありがとうございます。私のわがままを聞いてくださって」"

[[dialogue]]
speaker = "ヘレナ"
# 「なに、世界樹を通じて魔界に星騎士を送り込む、というアイデアは私も考えていたのだ」
line = "「なに、世界樹を通じて魔界に星騎士を送り込む、というアイデアは私も考えていたのだ」"

[[dialogue]]
speaker = "ヘレナ"
# 「そのための交渉条件と、貴殿の願いが合致したまで」
line = "「そのための交渉条件と、貴殿の願いが合致したまで」"

[[dialogue]]
speaker = "トリュファイナ"
# 「……きっと、あの子たちも救われます」
line = "「……きっと、あの子たちも救われます」"

[[dialogue]]
speaker = "トリュファイナ"
# 「これを契機に、魔女とニンゲンが共に、手を取り合える世界が訪れれば幸いです」
line = "「これを契機に、魔女とニンゲンが共に、手を取り合える世界が訪れれば幸いです」"

[[dialogue]]
speaker = "ヘレナ"
# 「必ずや実現してみせよう。この九浄ヘレナの名に懸けて、はっはっは！」
line = "「必ずや実現してみせよう。この九浄ヘレナの名に懸けて、はっはっは！」"
