[[dialogue]]
speaker = "unk"
# キリカ師匠からも合格をもらい、花婿修行を終えた。
line = "キリカ師匠からも合格をもらい、花婿修行を終えた。"

[[dialogue]]
speaker = "unk"
# 今度こそフィオナを満足させる式を挙げるべく、また式場へ向かった。
line = "今度こそフィオナを満足させる式を挙げるべく、また式場へ向かった。"

[[dialogue]]
speaker = "イレーナ"
# 「三度目の正直……になるといいのですが。女神様に目をつむっていただくのもそろそろ心苦しくなってきましたので」
line = "「三度目の正直……になるといいのですが。女神様に目をつむっていただくのもそろそろ心苦しくなってきましたので」"

[[dialogue]]
speaker = "フィオナ"
# 「あはは……今度こそ元に戻れると思います。多分」
line = "「あはは……今度こそ元に戻れると思います。多分」"

[[dialogue]]
speaker = "トワ先生"
# 「ねぇねぇ、花婿修行ならキリカちゃんやナミエルちゃんとも、結婚式のふりをしてみたら？」
line = "「ねぇねぇ、花婿修行ならキリカちゃんやナミエルちゃんとも、結婚式のふりをしてみたら？」"

[[dialogue]]
speaker = "ナミエル"
# 「えっ？　私とメイド長がですか？」
line = "「えっ？　私とメイド長がですか？」"

[[dialogue]]
speaker = "トワ先生"
# 「フィオナちゃんを満足させるためには、堂々とした花婿にならないと。それに、せっかくウェディングドレスを着たんだから、式を挙げてみたくない？」
line = "「フィオナちゃんを満足させるためには、堂々とした花婿にならないと。それに、せっかくウェディングドレスを着たんだから、式を挙げてみたくない？」"

[[dialogue]]
speaker = "ナミエル"
# 「そ、そんなことは……」
line = "「そ、そんなことは……」"

[[dialogue]]
speaker = "キリカ"
# 「お嬢様のためならやぶさかではないですが……」
line = "「お嬢様のためならやぶさかではないですが……」"

[[dialogue]]
speaker = "フィオナ"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "フィオナ"
# 「私も賛成です。緋宮会長、お願いしてもいいでしょうか？」
line = "「私も賛成です。緋宮会長、お願いしてもいいでしょうか？」"

[[dialogue]]
speaker = "unk"
# わかった
line = "わかった"

[[dialogue]]
speaker = "イレーナ"
# 「わかりました。では会長さん、ナミエルさん、こちらに」
line = "「わかりました。では会長さん、ナミエルさん、こちらに」"

[[dialogue]]
speaker = "ナミエル"
# 「は、はい」
line = "「は、はい」"

[[dialogue]]
speaker = "ナミエル"
# 「あくまでこれは練習。私は式を挙げたいなんて思っていませんので。フィオナお嬢様のためですから、勘違いしないでくださいね？」
line = "「あくまでこれは練習。私は式を挙げたいなんて思っていませんので。フィオナお嬢様のためですから、勘違いしないでくださいね？」"

[[dialogue]]
speaker = "イレーナ"
# 「ふふ。では始めましょうか」
line = "「ふふ。では始めましょうか」"

[[dialogue]]
speaker = "イレーナ"
# 「新郎緋宮クロト。あなたはナミエル・クレシェンテを妻とし、健やかなる時も病める時も、彼女を愛し、慈しむことを誓いますか？」
line = "「新郎緋宮クロト。あなたはナミエル・クレシェンテを妻とし、健やかなる時も病める時も、彼女を愛し、慈しむことを誓いますか？」"

[[dialogue]]
speaker = "unk"
# はい、誓います
line = "はい、誓います"

[[dialogue]]
speaker = "フィオナ"
# （私の時は緊張しながら言っていたのに……）
line = "（私の時は緊張しながら言っていたのに……）"

[[dialogue]]
speaker = "イレーナ"
# 「新婦ナミエル・クレシェンテ。あなたは緋宮クロトを夫とし、健やかなる時も病める時も、彼を愛し、慈しむことを誓いますか？」
line = "「新婦ナミエル・クレシェンテ。あなたは緋宮クロトを夫とし、健やかなる時も病める時も、彼を愛し、慈しむことを誓いますか？」"

[[dialogue]]
speaker = "ナミエル"
# 「ち、ちか……」
line = "「ち、ちか……」"

[[dialogue]]
speaker = "unk"
# 顔が真っ赤だよ
line = "顔が真っ赤だよ"

[[dialogue]]
speaker = "ナミエル"
# 「み、見ないでください！　ハレンチです！」
line = "「み、見ないでください！　ハレンチです！」"

[[dialogue]]
speaker = "ナミエル"
# 「コホン。ち、誓います……」
line = "「コホン。ち、誓います……」"

[[dialogue]]
speaker = "イレーナ"
# 「では誓いの口付けを──」
line = "「では誓いの口付けを──」"

[[dialogue]]
speaker = "ナミエル"
# 「とてもハレンチですっ！？」
line = "「とてもハレンチですっ！？」"

[[dialogue]]
speaker = "フィオナ"
# 「そ、そうですっ。<b>ふり</b>なんですからそこまでしなくても……私の時はしませんでしたし……」
line = "「そ、そうですっ。<b>ふり</b>なんですからそこまでしなくても……私の時はしませんでしたし……」"

[[dialogue]]
speaker = "イレーナ"
# 「ふりだからと、キスをしなかったのも、戦闘服が戻らない原因かと思いまして」
line = "「ふりだからと、キスをしなかったのも、戦闘服が戻らない原因かと思いまして」"

[[dialogue]]
speaker = "イレーナ"
# 「とはいえ本当にキスすると、ふりでは済まなくなりますし、お互いに頬にキスをするのはいかがでしょうか？」
line = "「とはいえ本当にキスすると、ふりでは済まなくなりますし、お互いに頬にキスをするのはいかがでしょうか？」"

[[dialogue]]
speaker = "ナミエル"
# 「それなら……いえ、あくまでお嬢様のためですから。結婚式らしくするためですからねっ。そのままでは届かないのでしゃがんでください」
line = "「それなら……いえ、あくまでお嬢様のためですから。結婚式らしくするためですからねっ。そのままでは届かないのでしゃがんでください」"

[[dialogue]]
speaker = "ナミエル"
# 「で、では……ん～」
line = "「で、では……ん～」"

[[dialogue]]
speaker = "ナミエル"
# 「チュッ」
line = "「チュッ」"

[[dialogue]]
speaker = "フィオナ"
# 「ひゃっ」
line = "「ひゃっ」"

[[dialogue]]
speaker = "unk"
# じゃあ俺からも……
line = "じゃあ俺からも……"

[[dialogue]]
speaker = "ナミエル"
# 「んっ」
line = "「んっ」"

[[dialogue]]
speaker = "フィオナ"
# 「はわっ」
line = "「はわっ」"

[[dialogue]]
speaker = "ナミエル"
# 「キ、キスされてしまいました……」
line = "「キ、キスされてしまいました……」"

[[dialogue]]
speaker = "フィオナ"
# 「うぅ～……ほんとにキスしちゃった……」
line = "「うぅ～……ほんとにキスしちゃった……」"

[[dialogue]]
speaker = "キリカ"
# 「フィオナお嬢様、小さな子どもではないのですから、そんなに顔を真っ赤にされなくても」
line = "「フィオナお嬢様、小さな子どもではないのですから、そんなに顔を真っ赤にされなくても」"

[[dialogue]]
speaker = "フィオナ"
# 「そう言うキリカだって顔赤くなってるじゃないっ」
line = "「そう言うキリカだって顔赤くなってるじゃないっ」"

[[dialogue]]
speaker = "キリカ"
# 「こ、これは……空調が効きすぎているのでしょうか、少し暑くて……」
line = "「こ、これは……空調が効きすぎているのでしょうか、少し暑くて……」"

[[dialogue]]
speaker = "フィオナ"
# 「むしろ涼しいくらいだと思うけど……」
line = "「むしろ涼しいくらいだと思うけど……」"

[[dialogue]]
speaker = "イレーナ"
# 「ではキリカさんも愛を誓いましょうか」
line = "「ではキリカさんも愛を誓いましょうか」"

[[dialogue]]
speaker = "トワ先生"
# 「イレーナちゃん、ちょっと楽しんでない？」
line = "「イレーナちゃん、ちょっと楽しんでない？」"

[[dialogue]]
speaker = "イレーナ"
# 「いえいえ。まさかそんな。私は敬虔な神官ですから」
line = "「いえいえ。まさかそんな。私は敬虔な神官ですから」"

[[dialogue]]
speaker = "キリカ"
# 「ぅ……ではキスさせていただきますね……」
line = "「ぅ……ではキスさせていただきますね……」"

[[dialogue]]
speaker = "キリカ"
# 「ちゅっ」
line = "「ちゅっ」"

[[dialogue]]
speaker = "unk"
# 俺からもお返しに……
line = "俺からもお返しに……"

[[dialogue]]
speaker = "キリカ"
# 「……っ」
line = "「……っ」"

[[dialogue]]
speaker = "キリカ"
# 「……これがキスなのですね」
line = "「……これがキスなのですね」"

[[dialogue]]
speaker = "ナミエル"
# 「頬に感触が残っています……」
line = "「頬に感触が残っています……」"

[[dialogue]]
speaker = "フィオナ"
# （ナミエルもキリカもまんざらでもなさそう……それに緋宮会長もあんなに顔を赤くして……）
line = "（ナミエルもキリカもまんざらでもなさそう……それに緋宮会長もあんなに顔を赤くして……）"

[[dialogue]]
speaker = "フィオナ"
# （私のために練習してくれているはずなのに……どうして胸のモヤモヤが大きくなっていくの……？）
line = "（私のために練習してくれているはずなのに……どうして胸のモヤモヤが大きくなっていくの……？）"

[[dialogue]]
speaker = "unk"
# フィオナ……？
line = "フィオナ……？"

[[dialogue]]
speaker = "フィオナ"
# 「す、すみませんっ」
line = "「す、すみませんっ」"

[[dialogue]]
speaker = "unk"
# 俺が呼び止めるより先に、フィオナが式場を飛び出してしまった。
line = "俺が呼び止めるより先に、フィオナが式場を飛び出してしまった。"
