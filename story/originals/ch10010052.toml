[[dialogue]]
speaker = "フィオナ（魔王）"
# 「すみません。先ほどから、私の後をつけられていましたよね。どうしてかお聞かせいただけますか？」
line = "「すみません。先ほどから、私の後をつけられていましたよね。どうしてかお聞かせいただけますか？」"

[[dialogue]]
speaker = "フィオナ（魔王）"
