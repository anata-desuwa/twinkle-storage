[[dialogue]]
speaker = "unk"
# 第２話,星ミミ,P
line = "第２話,星ミミ,P"

[[dialogue]]
speaker = "unk"
# ──ああは言ったものの、フィオナはやはり周囲の視線が気になって仕方ないようだった。
line = "──ああは言ったものの、フィオナはやはり周囲の視線が気になって仕方ないようだった。"

[[dialogue]]
speaker = "unk"
# そんなある日のこと……
line = "そんなある日のこと……"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「──突き止めました」
line = "「──突き止めました」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「ええ、例の噂話の件です。私もあれから１人で街に出たり、学園を歩いたりしてみたのですが……やはり違和感は感じられず」
line = "「ええ、例の噂話の件です。私もあれから１人で街に出たり、学園を歩いたりしてみたのですが……やはり違和感は感じられず」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「どうも、私と緋宮会長が一緒にいるとき、特に強い視線を感じることが判明したのです！」
line = "「どうも、私と緋宮会長が一緒にいるとき、特に強い視線を感じることが判明したのです！」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「ごめんなさい。注意する必要はない、なんて言っておきながら……どうしても私が気になってしまって」
line = "「ごめんなさい。注意する必要はない、なんて言っておきながら……どうしても私が気になってしまって」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「この間のデート中に感じた視線も、気のせいではなさそうでしたし……」
line = "「この間のデート中に感じた視線も、気のせいではなさそうでしたし……」"

[[dialogue]]
speaker = "unk"
# それにその格好は？
line = "それにその格好は？"

[[dialogue]]
speaker = "unk"
# 突き止めたっていうのは？
line = "突き止めたっていうのは？"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「はい。今まではスルーしてきたのですが、視線の主を突き止めようと思いまして」
line = "「はい。今まではスルーしてきたのですが、視線の主を突き止めようと思いまして」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「私はあえてこの目立つ格好でおびき寄せることにしました」
line = "「私はあえてこの目立つ格好でおびき寄せることにしました」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「その作戦が功を奏しました。今日、ここへ来る直前、視線を感じるほうへ近づいてみたのです」
line = "「その作戦が功を奏しました。今日、ここへ来る直前、視線を感じるほうへ近づいてみたのです」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「もちろん、向こうは陰ながら私たちを見張っている方ですから、私と面と向かうのは不都合でしょう」
line = "「もちろん、向こうは陰ながら私たちを見張っている方ですから、私と面と向かうのは不都合でしょう」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「ですが私は思い切って──声をかけてみたのです」
line = "「ですが私は思い切って──声をかけてみたのです」"

