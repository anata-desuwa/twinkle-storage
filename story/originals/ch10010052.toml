line = "「確かに私は星徒会長という立場。ですが……あくまでも男女の学生として、節度を守った交際を心がけているつもりです」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「もし、言いたいことがあるのでしたら、私に直接──」
line = "「もし、言いたいことがあるのでしたら、私に直接──」"

[[dialogue]]
speaker = "unk"
# 誠実な態度で注意することにしたフィオナ──だが、彼女たちの反応は想定と違っていたという。
line = "誠実な態度で注意することにしたフィオナ──だが、彼女たちの反応は想定と違っていたという。"

