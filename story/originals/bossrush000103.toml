[[dialogue]]
speaker = "コハルコ"
# 「次の事件は、コラプサーによる新星学園襲撃」
line = "「次の事件は、コラプサーによる新星学園襲撃」"

[[dialogue]]
speaker = "コハルコ"
# 「流星市国周辺に発生した疑似アステラを囮にして、手薄になった新星学園にコラプサーが直接乗り込んできた」
line = "「流星市国周辺に発生した疑似アステラを囮にして、手薄になった新星学園にコラプサーが直接乗り込んできた」"

[[dialogue]]
speaker = "コハルコ"
# 「今考えると、イングリットの時に出現していた不自然なアステラも、この時のと同じものだったんだね」
line = "「今考えると、イングリットの時に出現していた不自然なアステラも、この時のと同じものだったんだね」"

[[dialogue]]
speaker = "コハルコ"
# 「やってきた刺客はエンジュとメテオラの２人」
line = "「やってきた刺客はエンジュとメテオラの２人」"

[[dialogue]]
speaker = "コハルコ"
# 「会長さんとリーリアさんが迎撃に当たったけど、２人の攻撃が激しくて、けっこう押し込まれちゃったね」
line = "「会長さんとリーリアさんが迎撃に当たったけど、２人の攻撃が激しくて、けっこう押し込まれちゃったね」"

[[dialogue]]
speaker = "コハルコ"
# 「この時に判明したのが──」
line = "「この時に判明したのが──」"

[[dialogue]]
speaker = "メテオラ"
# 『あいつがターゲットのコハルコかー！　捕まえるぞー！』
line = "『あいつがターゲットのコハルコかー！　捕まえるぞー！』"

[[dialogue]]
speaker = "エンジュ"
# 『これは星騎士どもへの通達だ。あたしたちは、お前らからかき集めた星力を使って、リクリエのない世界を作る。それがコラプサーの救世だ』
line = "『これは星騎士どもへの通達だ。あたしたちは、お前らからかき集めた星力を使って、リクリエのない世界を作る。それがコラプサーの救世だ』"

[[dialogue]]
speaker = "コハルコ"
# 「コラプサーの狙いが私で、リクリエをなくすのに必要らしいってこと。まさか自分が一連の事件の中心人物だなんて思わなかったよ」
line = "「コラプサーの狙いが私で、リクリエをなくすのに必要らしいってこと。まさか自分が一連の事件の中心人物だなんて思わなかったよ」"

[[dialogue]]
speaker = "コハルコ"
# 「エンジュとメテオラをはじめ、コラプサー各員は無力化の上、拘束に成功。ネビュラが身柄を預かることになった」
line = "「エンジュとメテオラをはじめ、コラプサー各員は無力化の上、拘束に成功。ネビュラが身柄を預かることになった」"

[[dialogue]]
speaker = "コハルコ"
# 「だけどリーリアさんに『あなたは魔女なんです』って言われてビックリしたっけ」
line = "「だけどリーリアさんに『あなたは魔女なんです』って言われてビックリしたっけ」"

[[dialogue]]
speaker = "コハルコ"
# 「エンジュとメテオラのデータも再現してみたよ。試してみて」
line = "「エンジュとメテオラのデータも再現してみたよ。試してみて」"
