[[dialogue]]
speaker = "unk"
# 第３話,クリスマスストーリー,P
line = "第３話,クリスマスストーリー,P"

[[dialogue]]
speaker = "モネ"
# 「うーん……」
line = "「うーん……」"

[[dialogue]]
speaker = "モネ"
# 「きゃっ！？　……あ、会長！？　ぶつかってごめんなさい……」
line = "「きゃっ！？　……あ、会長！？　ぶつかってごめんなさい……」"

[[dialogue]]
speaker = "unk"
# 暗い顔してたみたいだけど大丈夫？
line = "暗い顔してたみたいだけど大丈夫？"

[[dialogue]]
speaker = "モネ"
# 「あ、その……大したことではなくて……今書いている小説のネタ出しに行き詰っているんです」
line = "「あ、その……大したことではなくて……今書いている小説のネタ出しに行き詰っているんです」"

[[dialogue]]
speaker = "モネ"
# 「かれこれ一週間くらいずっと考えていて……いつもは１日にニ十冊は読んでる本が、十冊しか読めてません……」
line = "「かれこれ一週間くらいずっと考えていて……いつもは１日にニ十冊は読んでる本が、十冊しか読めてません……」"

[[dialogue]]
speaker = "モネ"
# 「やっぱり私には小説の才能なんかないんですかね……」
line = "「やっぱり私には小説の才能なんかないんですかね……」"

[[dialogue]]
speaker = "unk"
# それなら俺も協力するよ
line = "それなら俺も協力するよ"

[[dialogue]]
speaker = "モネ"
# 「でも忙しい会長のお時間を取らせるわけには……」
line = "「でも忙しい会長のお時間を取らせるわけには……」"

[[dialogue]]
speaker = "unk"
# 俺とモネの仲だから
line = "俺とモネの仲だから"

[[dialogue]]
speaker = "モネ"
# 「あ……うぅ……そ、それじゃあお願いします……」
line = "「あ……うぅ……そ、それじゃあお願いします……」"

[[dialogue]]
speaker = "unk"
# 図書館の談話スペースに場所を移して、詳しい話を聞く。
line = "図書館の談話スペースに場所を移して、詳しい話を聞く。"

[[dialogue]]
speaker = "モネ"
# 「私が書こうと思っているのは、クリスマスをテーマにした恋愛小説です。でも恋愛小説はたくさん読んでいるはずなのに、情景が思い浮かばなくて……」
line = "「私が書こうと思っているのは、クリスマスをテーマにした恋愛小説です。でも恋愛小説はたくさん読んでいるはずなのに、情景が思い浮かばなくて……」"

[[dialogue]]
speaker = "モネ"
# 「思いついたとしても、すでに読んだ本の焼き直しになってる気がして……全然進まないんです」
line = "「思いついたとしても、すでに読んだ本の焼き直しになってる気がして……全然進まないんです」"

[[dialogue]]
speaker = "モネ"
# 「会長に何度か読んでもらった通り、今までも小説は書いてたんですけど、こんなのは初めてです」
line = "「会長に何度か読んでもらった通り、今までも小説は書いてたんですけど、こんなのは初めてです」"

[[dialogue]]
speaker = "モネ"
# 「もちろん、今までだってそんなにスラスラ書けていたわけではないんですけど……」
line = "「もちろん、今までだってそんなにスラスラ書けていたわけではないんですけど……」"

[[dialogue]]
speaker = "unk"
# モネはどんな恋愛小説にしたいの？
line = "モネはどんな恋愛小説にしたいの？"

[[dialogue]]
speaker = "モネ"
# 「あ、そうですよね……そこから掘り下げないと。私が書きたいのは、初々しい恋愛を描いた物語です」
line = "「あ、そうですよね……そこから掘り下げないと。私が書きたいのは、初々しい恋愛を描いた物語です」"

[[dialogue]]
speaker = "モネ"
# 「楽しい学園生活を送る男子生徒……友人に囲まれた賑やかな毎日……けれど少し物足りない気がしていた」
line = "「楽しい学園生活を送る男子生徒……友人に囲まれた賑やかな毎日……けれど少し物足りない気がしていた」"

[[dialogue]]
speaker = "モネ"
# 「穏やかな日々を過ごす女子生徒……友達は少なくて地味だが、目立たないなりに充実していて……でも憧れがあった」
line = "「穏やかな日々を過ごす女子生徒……友達は少なくて地味だが、目立たないなりに充実していて……でも憧れがあった」"

[[dialogue]]
speaker = "モネ"
# 「２人は隣のクラスだが、移動教室ですれ違ったり、選択教科で席が近くなったり……お互い顔や名前は知っている程度の関係だった」
line = "「２人は隣のクラスだが、移動教室ですれ違ったり、選択教科で席が近くなったり……お互い顔や名前は知っている程度の関係だった」"

[[dialogue]]
speaker = "モネ"
# 「季節は秋。文化祭の実行委員になったことから２人は話すようになり、ほのかに意識し合う。そして季節は冬に──」
line = "「季節は秋。文化祭の実行委員になったことから２人は話すようになり、ほのかに意識し合う。そして季節は冬に──」"

[[dialogue]]
speaker = "モネ"
# 「はっ──！？　私ったらつい、頭の中の妄想をベラベラと……」
line = "「はっ──！？　私ったらつい、頭の中の妄想をベラベラと……」"

[[dialogue]]
speaker = "unk"
# いい感じだから続けて続けて
line = "いい感じだから続けて続けて"

[[dialogue]]
speaker = "モネ"
# 「あ……はい……すみません……」
line = "「あ……はい……すみません……」"

[[dialogue]]
speaker = "モネ"
# 「学園行事を通して知り合った２人が、仲を深め、クリスマスに告白して恋人になる……そんな物語にしたいんです」
line = "「学園行事を通して知り合った２人が、仲を深め、クリスマスに告白して恋人になる……そんな物語にしたいんです」"

[[dialogue]]
speaker = "モネ"
# 「きっと探せばどこにでもあるようなお話。ありふれた、けれど特別な青春……そんなイメージです」
line = "「きっと探せばどこにでもあるようなお話。ありふれた、けれど特別な青春……そんなイメージです」"

[[dialogue]]
speaker = "モネ"
# 「……それだけイメージがあるなら書けそう？　確かにイメージはあるんですけど、具体的なアイデアがなくて……」
line = "「……それだけイメージがあるなら書けそう？　確かにイメージはあるんですけど、具体的なアイデアがなくて……」"

[[dialogue]]
speaker = "モネ"
# 「そしてデートシーンは特に印象深いものにしたいんです。距離が一番縮まるところですし、クリスマスのデートは学生にとって一大イベントですから」
line = "「そしてデートシーンは特に印象深いものにしたいんです。距離が一番縮まるところですし、クリスマスのデートは学生にとって一大イベントですから」"

[[dialogue]]
speaker = "モネ"
# 「でも、その肝心のデートをどうすればいいかわからないんです……」
line = "「でも、その肝心のデートをどうすればいいかわからないんです……」"

[[dialogue]]
speaker = "unk"
# じゃあ実際にやってみよう
line = "じゃあ実際にやってみよう"

[[dialogue]]
speaker = "モネ"
# 「実際に……？　私と会長がデートするんですか！？」
line = "「実際に……？　私と会長がデートするんですか！？」"

[[dialogue]]
speaker = "モネ"
# 「そんな……私が会長とデートするなんて畏れ多いですよぉ……」
line = "「そんな……私が会長とデートするなんて畏れ多いですよぉ……」"

[[dialogue]]
speaker = "unk"
# 俺とモネは密かに付き合っている。
line = "俺とモネは密かに付き合っている。"

[[dialogue]]
speaker = "unk"
# しかしモネは控えめというか、自分を卑下しがちなので、こんな調子だ。
line = "しかしモネは控えめというか、自分を卑下しがちなので、こんな調子だ。"

[[dialogue]]
speaker = "モネ"
# 「あれだけ多くの人から慕われている会長が、私と付き合っているなんて、ちょっと信じられない事態ですし……」
line = "「あれだけ多くの人から慕われている会長が、私と付き合っているなんて、ちょっと信じられない事態ですし……」"

[[dialogue]]
speaker = "unk"
# 俺はモネとデートしたいよ
line = "俺はモネとデートしたいよ"

[[dialogue]]
speaker = "モネ"
# 「ひゃっ！？」
line = "「ひゃっ！？」"

[[dialogue]]
speaker = "モネ"
# 「あ……図書館なのに、大きな声を出してしまいました……図書委員なのにいけません……」
line = "「あ……図書館なのに、大きな声を出してしまいました……図書委員なのにいけません……」"

[[dialogue]]
speaker = "モネ"
# 「会長がそう言うなら……しましょうか、デート。……私の心臓が爆発するかもですけど」
line = "「会長がそう言うなら……しましょうか、デート。……私の心臓が爆発するかもですけど」"

[[dialogue]]
speaker = "モネ"
# 「私だって、その、デートしたいですし。こんなのでも一応、恋人ですから……」
line = "「私だって、その、デートしたいですし。こんなのでも一応、恋人ですから……」"

[[dialogue]]
speaker = "モネ"
# 「……デートコース？　あっ、そうですね、当てもなくブラブラしても時間を無駄にしてしまいますし」
line = "「……デートコース？　あっ、そうですね、当てもなくブラブラしても時間を無駄にしてしまいますし」"

[[dialogue]]
speaker = "モネ"
# 「学生らしいデート……映画とか、ゲームセンターとか……？」
line = "「学生らしいデート……映画とか、ゲームセンターとか……？」"

[[dialogue]]
speaker = "モネ"
# 「最後は夜景を……ううん、どうせなら…………その、こんな感じでどうでしょうか？」
line = "「最後は夜景を……ううん、どうせなら…………その、こんな感じでどうでしょうか？」"

[[dialogue]]
speaker = "unk"
# モネの考えたプランを見て頷く。
line = "モネの考えたプランを見て頷く。"

[[dialogue]]
speaker = "unk"
# こうして、俺たちのクリスマスデートが決定したのだった。
line = "こうして、俺たちのクリスマスデートが決定したのだった。"
