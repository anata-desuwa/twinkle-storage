[[dialogue]]
speaker = "unk"
# 第５話,極星学園,B
line = "第５話,極星学園,B"

[[dialogue]]
speaker = "unk"
# 流星市国全域を襲った攻撃から一夜が明けた。
line = "流星市国全域を襲った攻撃から一夜が明けた。"

[[dialogue]]
speaker = "unk"
# 新星・流星両校の星騎士が奮闘してガーディアンを討伐したものの、街には爪痕がそこかしこに残されている。
line = "新星・流星両校の星騎士が奮闘してガーディアンを討伐したものの、街には爪痕がそこかしこに残されている。"

[[dialogue]]
speaker = "unk"
# 今は昨日の騒乱が嘘のように、街はひっそりと静まり返っていた。
line = "今は昨日の騒乱が嘘のように、街はひっそりと静まり返っていた。"

[[dialogue]]
speaker = "unk"
# チナとの戦いで得た情報を整理すべく、役員が星徒会室に集まる。
line = "チナとの戦いで得た情報を整理すべく、役員が星徒会室に集まる。"

[[dialogue]]
speaker = "unk"
# 流星星徒会からも代表として、副会長のセーラさんに来てもらっていた。
line = "流星星徒会からも代表として、副会長のセーラさんに来てもらっていた。"

[[dialogue]]
speaker = "クロト"
# 「昨日の襲撃は被害が大きく、怪我を負って入院になった星騎士も多数でている……」
line = "「昨日の襲撃は被害が大きく、怪我を負って入院になった星騎士も多数でている……」"

[[dialogue]]
speaker = "クロト"
# 「それでも流星星徒会が陣頭指揮を執り、多くのプリマステラが協力してくれたお陰で、なんとかこの程度の被害に抑えることができた」
line = "「それでも流星星徒会が陣頭指揮を執り、多くのプリマステラが協力してくれたお陰で、なんとかこの程度の被害に抑えることができた」"

[[dialogue]]
speaker = "クロト"
# 「敵の強さを考えれば、死者が出なかっただけでも僥倖と言える。……改めて、ご協力感謝します、セーラさん」
line = "「敵の強さを考えれば、死者が出なかっただけでも僥倖と言える。……改めて、ご協力感謝します、セーラさん」"

[[dialogue]]
speaker = "セーラ"
# 「困った時はお互い様っしょ～。ていうか新星には例の彼女を押さえてもらって、こっちこそ助かったよ」
line = "「困った時はお互い様っしょ～。ていうか新星には例の彼女を押さえてもらって、こっちこそ助かったよ」"

[[dialogue]]
speaker = "セーラ"
# 「まぁ、フィオナちゃんが<ruby=こっち>人間界</ruby>にいてくれたら、もっと被害を押さえられたとは思うんだけどね」
line = "「まぁ、フィオナちゃんが<ruby>人間界<rt>こっち</rt></ruby>にいてくれたら、もっと被害を押さえられたとは思うんだけどね」"

[[dialogue]]
speaker = "unk"
# いつも明るいセーラさんには珍しく、苦笑いを浮かべる。
line = "いつも明るいセーラさんには珍しく、苦笑いを浮かべる。"

[[dialogue]]
speaker = "マトイ"
# 「フィオナさんは確か……今、魔界にいるんでしたっけ」
line = "「フィオナさんは確か……今、魔界にいるんでしたっけ」"

[[dialogue]]
speaker = "セーラ"
# 「そうそう、出張中～」
line = "「そうそう、出張中～」"

[[dialogue]]
speaker = "unk"
# 先日、トリシャさんの占いによって、ある情報がもたらされた。
line = "先日、トリシャさんの占いによって、ある情報がもたらされた。"

[[dialogue]]
speaker = "unk"
# 『魔界に邪竜が現れ、大禍が生ずる』──と。
line = "『魔界に邪竜が現れ、大禍が生ずる』──と。"

[[dialogue]]
speaker = "unk"
# ネビュラの分析の結果、その邪竜とは、かつて朱雀暦の世界を破壊した煌竜ヴィライアだと判明した。
line = "ネビュラの分析の結果、その邪竜とは、かつて朱雀暦の世界を破壊した煌竜ヴィライアだと判明した。"

[[dialogue]]
speaker = "unk"
# 正確にはヴィライアそのものではなく、森羅暦で発生した同種の存在。
line = "正確にはヴィライアそのものではなく、森羅暦で発生した同種の存在。"

[[dialogue]]
speaker = "unk"
# 以前戦ったヴィライアは朱雀暦のヴィライアだったが、リクリエによって歴史のやり直しが発生している現在の森羅歴にも、それに相当する存在がすでにいるのだという。
line = "以前戦ったヴィライアは朱雀暦のヴィライアだったが、リクリエによって歴史のやり直しが発生している現在の森羅歴にも、それに相当する存在がすでにいるのだという。"

[[dialogue]]
speaker = "unk"
# フィオナはその脅威に対抗すべく、ネビュラとともに世界樹で魔界に渡っていたのだった。
line = "フィオナはその脅威に対抗すべく、ネビュラとともに世界樹で魔界に渡っていたのだった。"

[[dialogue]]
speaker = "unk"
# ヴィライアの出現が近いことは間違いないが、正確な日時までは特定できていない。
line = "ヴィライアの出現が近いことは間違いないが、正確な日時までは特定できていない。"

[[dialogue]]
speaker = "unk"
# 流星市国の防衛だけを考えるなら、フィオナには一刻も早く戻ってきて欲しいところだが、魔界の脅威を放置するのも得策ではないという事情があった。
line = "流星市国の防衛だけを考えるなら、フィオナには一刻も早く戻ってきて欲しいところだが、魔界の脅威を放置するのも得策ではないという事情があった。"

[[dialogue]]
speaker = "セーラ"
# 「だから、詳しい話は副会長のうちが聞くよ。いろいろあったんでしょ？」
line = "「だから、詳しい話は副会長のうちが聞くよ。いろいろあったんでしょ？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええ、昨日は本当にいろいろあったわね……」
line = "「ええ、昨日は本当にいろいろあったわね……」"

[[dialogue]]
speaker = "unk"
# デネブ、極星学園、リクリエの使徒……無視できないワードがいくつも出てきた。
line = "デネブ、極星学園、リクリエの使徒……無視できないワードがいくつも出てきた。"

[[dialogue]]
speaker = "unk"
# わからないことも多い。だが確かなのは、新たな戦いが本格的に始まったということだった。
line = "わからないことも多い。だが確かなのは、新たな戦いが本格的に始まったということだった。"

[[dialogue]]
speaker = "ヴィーナス"
# 「えーっと……デネブから来たのがガーティアンで？　メカのモンスターが……ゴチャゴチャしてよくわからないわ！」
line = "「えーっと……デネブから来たのがガーティアンで？　メカのモンスターが……ゴチャゴチャしてよくわからないわ！」"

[[dialogue]]
speaker = "アナ"
# 「議題を大きく２つに分けましょう。デネブおよび極星学園、そしてリクリエの使徒です」
line = "「議題を大きく２つに分けましょう。デネブおよび極星学園、そしてリクリエの使徒です」"

[[dialogue]]
speaker = "クロト"
# 「まずは極星学園についてだな」
line = "「まずは極星学園についてだな」"

[[dialogue]]
speaker = "unk"
# 昨日、流星市国を攻撃したガーディアン。
line = "昨日、流星市国を攻撃したガーディアン。"

[[dialogue]]
speaker = "unk"
# それを率いていたのは、極星学園の星徒会役員を名乗る星騎士だった。
line = "それを率いていたのは、極星学園の星徒会役員を名乗る星騎士だった。"

[[dialogue]]
speaker = "クロト"
# 「本当かどうかはわからないが、彼女は平行世界デネブの極星学園から来たと言っていた」
line = "「本当かどうかはわからないが、彼女は平行世界デネブの極星学園から来たと言っていた」"

[[dialogue]]
speaker = "クロト"
# 「それがもし真実であれば、何らかの手段で、デネブとこの世界──アルタイルを行き来していることになる」
line = "「それがもし真実であれば、何らかの手段で、デネブとこの世界──アルタイルを行き来していることになる」"

[[dialogue]]
speaker = "unk"
# ありえないことのようではあるが、デネブから何者かがやってくるのは前例がある。
line = "ありえないことのようではあるが、デネブから何者かがやってくるのは前例がある。"

[[dialogue]]
speaker = "unk"
# ここにいるヴィーナスもそうだし、<b>俺たちが戦っていた</b>アポロもデネブから呼ばれていた。
line = "ここにいるヴィーナスもそうだし、<b>俺たちが戦っていた</b>アポロもデネブから呼ばれていた。"

[[dialogue]]
speaker = "アナ"
# 「香堂チナという星騎士がアルタイルにいないことを考えれば、彼女がデネブから来たという発言は信憑性があると思います」
line = "「香堂チナという星騎士がアルタイルにいないことを考えれば、彼女がデネブから来たという発言は信憑性があると思います」"

[[dialogue]]
speaker = "アナ"
# 「ですが──」
line = "「ですが──」"

[[dialogue]]
speaker = "アポロ"
# 「リクリエは……本当なら、抗えないはずなんだ。もうとっくに成功してたはずなんだ。デネブも、ベガも、抗えなかった」
line = "「リクリエは……本当なら、抗えないはずなんだ。もうとっくに成功してたはずなんだ。デネブも、ベガも、抗えなかった」"

[[dialogue]]
speaker = "unk"
# もう１つの世界ベガと同じく、デネブはリクリエで滅びたと言われていた。
line = "もう１つの世界ベガと同じく、デネブはリクリエで滅びたと言われていた。"

[[dialogue]]
speaker = "unk"
# その言葉が間違いで、デネブが生き残っていたのなら、それ自体は喜ぶべきことではあるのだが……
line = "その言葉が間違いで、デネブが生き残っていたのなら、それ自体は喜ぶべきことではあるのだが……"

[[dialogue]]
speaker = "ヴィーナス"
# 「それに極星学園って何？　デネブの流星学園や新星学園はどうしたのかしら？」
line = "「それに極星学園って何？　デネブの流星学園や新星学園はどうしたのかしら？」"

[[dialogue]]
speaker = "サーシャ"
# 「チナって子は『デネブの流星と新星はリクリエに敗北した』って言ってたかしら～？」
line = "「チナって子は『デネブの流星と新星はリクリエに敗北した』って言ってたかしら～？」"

[[dialogue]]
speaker = "アナ"
# 「彼女の言葉をストレートに受け取るなら、流星と新星が負けた後、残存戦力で立ち上げた新しい組織……ということになるでしょうか」
line = "「彼女の言葉をストレートに受け取るなら、流星と新星が負けた後、残存戦力で立ち上げた新しい組織……ということになるでしょうか」"

[[dialogue]]
speaker = "クロト"
# 「決めつけで先入観を持つのは怖い。その件については一旦判断を保留しよう」
line = "「決めつけで先入観を持つのは怖い。その件については一旦判断を保留しよう」"

[[dialogue]]
speaker = "unk"
# 俺の言葉に、その場のみんなが頷いた。
line = "俺の言葉に、その場のみんなが頷いた。"

[[dialogue]]
speaker = "サーシャ"
# 「極星学園が何者であれ、一番の問題はこっちにやって来た目的よね～」
line = "「極星学園が何者であれ、一番の問題はこっちにやって来た目的よね～」"

[[dialogue]]
speaker = "クロト"
# 「そうですね。彼女はアルタイルに来た目的を、宣戦布告だと言っていました」
line = "「そうですね。彼女はアルタイルに来た目的を、宣戦布告だと言っていました」"

[[dialogue]]
speaker = "マトイ"
# 「星騎士同士の戦争……ってことになっちゃうのかな。だってあの子も自分の世界を……」
line = "「星騎士同士の戦争……ってことになっちゃうのかな。だってあの子も自分の世界を……」"

[[dialogue]]
speaker = "unk"
# そう、彼女は私欲や野心でアルタイルを侵略しようとしたわけではない。
line = "そう、彼女は私欲や野心でアルタイルを侵略しようとしたわけではない。"

[[dialogue]]
speaker = "チナ"
# 「アルタイルのリクリエを止めれば、デネブのリクリエが加速する。デネブのリクリエを止めれば、アルタイルのリクリエが激化する」
line = "「アルタイルのリクリエを止めれば、デネブのリクリエが加速する。デネブのリクリエを止めれば、アルタイルのリクリエが激化する」"

[[dialogue]]
speaker = "チナ"
# 「いいか、これは生存競争だ。生き残るのはデネブかアルタイル、２つに１つ」
line = "「いいか、これは生存競争だ。生き残るのはデネブかアルタイル、２つに１つ」"

[[dialogue]]
speaker = "チナ"
# 「生き残るのはアタシらだ……！」
line = "「生き残るのはアタシらだ……！」"

[[dialogue]]
speaker = "unk"
# 彼女は自分の世界を、デネブを守るためにアルタイルを攻撃した。
line = "彼女は自分の世界を、デネブを守るためにアルタイルを攻撃した。"

[[dialogue]]
speaker = "unk"
# それはある意味、この世界を守ろうとギエルらと戦った俺たちと変わらない。
line = "それはある意味、この世界を守ろうとギエルらと戦った俺たちと変わらない。"

[[dialogue]]
speaker = "ヴィーナス"
# 「もしあの子が言っていたことが本当なら、私たちはデネブを滅ぼさなくちゃいけないのかしら……？」
line = "「もしあの子が言っていたことが本当なら、私たちはデネブを滅ぼさなくちゃいけないのかしら……？」"

[[dialogue]]
speaker = "unk"
# 記憶がないとはいえ、デネブはヴィーナスの生まれた世界だ。それを自らの手で滅ぼすなんて、ヴィーナスにはさせられない。
line = "記憶がないとはいえ、デネブはヴィーナスの生まれた世界だ。それを自らの手で滅ぼすなんて、ヴィーナスにはさせられない。"

[[dialogue]]
speaker = "unk"
# それにその選択は、デネブにいる無辜の人たちを見捨てることになる。
line = "それにその選択は、デネブにいる無辜の人たちを見捨てることになる。"

[[dialogue]]
speaker = "unk"
# 人々を守るために星騎士になった俺たちが、その道を選んでいいものだろうか……？
line = "人々を守るために星騎士になった俺たちが、その道を選んでいいものだろうか……？"

[[dialogue]]
speaker = "クロト"
# 「現時点では、チナの言葉が真実かどうかはわからない。……だろ？」
line = "「現時点では、チナの言葉が真実かどうかはわからない。……だろ？」"

[[dialogue]]
speaker = "クロト"
# 「今結論付けるのは早計だ。方針を決める前に、もっと情報を集めなくちゃならない」
line = "「今結論付けるのは早計だ。方針を決める前に、もっと情報を集めなくちゃならない」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それもそうね！　リクリエの押し付け合いなんて聞かされて、大人しく従えるもんですか」
line = "「それもそうね！　リクリエの押し付け合いなんて聞かされて、大人しく従えるもんですか」"

[[dialogue]]
speaker = "クロト"
# 「じゃあ、この件は情報収集を進めるということで。後でエスメラルダ先生の分析も聞いてみよう」
line = "「じゃあ、この件は情報収集を進めるということで。後でエスメラルダ先生の分析も聞いてみよう」"

[[dialogue]]
speaker = "アナ"
# 「そうですね。今はそれしかないと思います」
line = "「そうですね。今はそれしかないと思います」"

[[dialogue]]
speaker = "unk"
# デネブと極星学園に対して、今後するべき対応が決まったところで……
line = "デネブと極星学園に対して、今後するべき対応が決まったところで……"

[[dialogue]]
speaker = "クロト"
# 「後はリクリエの使徒──だな」
line = "「後はリクリエの使徒──だな」"

[[dialogue]]
speaker = "unk"
# 選挙管理委員会のみんなによると、梨緒はあのジグというリクリエの使徒について、何か知っているようだった。
line = "選挙管理委員会のみんなによると、梨緒はあのジグというリクリエの使徒について、何か知っているようだった。"

[[dialogue]]
speaker = "unk"
# だけど梨緒は今──
line = "だけど梨緒は今──"
