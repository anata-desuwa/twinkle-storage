[[dialogue]]
speaker = "unk"
# 第１１話,ＶＳ星喰らいシャドウ・黒騎士戦闘前,B
line = "第１１話,ＶＳ星喰らいシャドウ・黒騎士戦闘前,B"

[[dialogue]]
speaker = "メルエル（覚醒）"
# 「はぁっ……はぁあっ……！」
line = "「はぁっ……はぁあっ……！」"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「知ってはいたけど、やっぱり出鱈目な強さだねー……！」
line = "「知ってはいたけど、やっぱり出鱈目な強さだねー……！」"

[[dialogue]]
speaker = "メルエル（覚醒）"
# 「アニュラスちゃん、大丈夫……？」
line = "「アニュラスちゃん、大丈夫……？」"

[[dialogue]]
speaker = "アニュラス（覚醒）"
# 「ああ、問題ない……！　まだいける……！」
line = "「ああ、問題ない……！　まだいける……！」"

[[dialogue]]
speaker = "アニュラス（覚醒）"
# 「ふふ……本当に流石ですね──」
line = "「ふふ……本当に流石ですね──」"

[[dialogue]]
speaker = "アニュラス（覚醒）"
# 「…………お父様！！」
line = "「…………お父様！！」"

[[dialogue]]
speaker = "黒騎士"
# 「……理解が出来ぬ。なぜ世界の刷新を拒むのだ？」
line = "「……理解が出来ぬ。なぜ世界の刷新を拒むのだ？」"

[[dialogue]]
speaker = "黒騎士"
# 「森羅歴の進歩はもはや頭打ち。これからヒトに待ち受けるのは、衰退と滅亡のみ……醜く足掻いて、何になる……？」
line = "「森羅歴の進歩はもはや頭打ち。これからヒトに待ち受けるのは、衰退と滅亡のみ……醜く足掻いて、何になる……？」"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「見解の相違ってやつだね～。というか、学園長の口を使って喋ってるけど、それってただの『ＸＥＬＯＳ』の代弁だよね？」
line = "「見解の相違ってやつだね～。というか、学園長の口を使って喋ってるけど、それってただの『ＸＥＬＯＳ』の代弁だよね？」"

[[dialogue]]
speaker = "アニュラス（覚醒）"
# 「お父様の口から、『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』の決めつけを聞かされるのは、想像以上に不愉快だな──」
line = "「お父様の口から、『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』の決めつけを聞かされるのは、想像以上に不愉快だな──」"

[[dialogue]]
speaker = "アニュラス（覚醒）"
# 「私たちヒトは、創造神の定めた枠に収まるつもりはない！！」
line = "「私たちヒトは、創造神の定めた枠に収まるつもりはない！！」"

[[dialogue]]
speaker = "メルエル（覚醒）"
# 「……黒騎士になった、セイファート学園長。あなたが世界の破滅を望むようになったきっかけは──聞いたよ」
line = "「……黒騎士になった、セイファート学園長。あなたが世界の破滅を望むようになったきっかけは──聞いたよ」"

[[dialogue]]
speaker = "メルエル（覚醒）"
# 「心の底から愛していた奥さんと、離ればなれになって……その絶望は、理解してあげたいけど……」
line = "「心の底から愛していた奥さんと、離ればなれになって……その絶望は、理解してあげたいけど……」"

[[dialogue]]
speaker = "メルエル（覚醒）"
# 「でもその絶望は、すべての人が向き合っているものだから！！」
line = "「でもその絶望は、すべての人が向き合っているものだから！！」"

[[dialogue]]
speaker = "メルエル（覚醒）"
# 「戦う力のない人にも最愛の人がいて、かけがえのない時間があって、お別れの時がある！」
line = "「戦う力のない人にも最愛の人がいて、かけがえのない時間があって、お別れの時がある！」"

[[dialogue]]
speaker = "メルエル（覚醒）"
# 「だからこそ私たち星騎士は……憎しみに力を預けちゃいけないの！」
line = "「だからこそ私たち星騎士は……憎しみに力を預けちゃいけないの！」"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「そもそも、無限の成長とか進歩って何？　って感じなんだよね。それってちゃんと定義あるの？」
line = "「そもそも、無限の成長とか進歩って何？　って感じなんだよね。それってちゃんと定義あるの？」"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「どーせ神様の感覚で、『最近ちょっと伸び率悪いな～』とか、そんなテキトーな分析なんでしょ？」
line = "「どーせ神様の感覚で、『最近ちょっと伸び率悪いな～』とか、そんなテキトーな分析なんでしょ？」"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「正直、神様の手による世界の調整なんて、いい迷惑。そんなものがなくたって、私たちは進歩していけるんだから！」
line = "「正直、神様の手による世界の調整なんて、いい迷惑。そんなものがなくたって、私たちは進歩していけるんだから！」"

[[dialogue]]
speaker = "アニュラス（覚醒）"
# 「先輩たちの言う通りだ──だから今一度、お父様！！　貴方の凶行を止めさせていただくッ！！」
line = "「先輩たちの言う通りだ──だから今一度、お父様！！　貴方の凶行を止めさせていただくッ！！」"

[[dialogue]]
speaker = "黒騎士"
# 「……理解できぬのであれば仕方あるまい」
line = "「……理解できぬのであれば仕方あるまい」"

[[dialogue]]
speaker = "黒騎士"
# 「創造神よ──もっと力を寄越せ。私に無限の『霊力』を授けよ──」
line = "「創造神よ──もっと力を寄越せ。私に無限の『霊力』を授けよ──」"

[[dialogue]]
speaker = "ＸＥＬＯＳ"
# 「…………ギ、ィィイィィィィ！！！」
line = "「…………ギ、ィィイィィィィ！！！」"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「……！！　『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』の分身体が、黒騎士と同化して──」
line = "「……！！　『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』の分身体が、黒騎士と同化して──」"

[[dialogue]]
speaker = "メルエル（覚醒）"
# 「何、この闇の力っ──！？」
line = "「何、この闇の力っ──！？」"

[[dialogue]]
speaker = "黒騎士"
# 「────生マレロ」
line = "「────生マレロ」"

[[dialogue]]
speaker = "unk"
# 黒騎士がその大剣を大地に突き立てると、インクをこぼしたような染みが広がり──
line = "黒騎士がその大剣を大地に突き立てると、インクをこぼしたような染みが広がり──"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「────滅ボス。滅ボス。滅ボス」
line = "「────滅ボス。滅ボス。滅ボス」"

[[dialogue]]
speaker = "レイラ"
# 「ファッ！？　ホロウのシャドウが、いち、じゅう──か、数えきれないほどに出てきて……！？」
line = "「ファッ！？　ホロウのシャドウが、いち、じゅう──か、数えきれないほどに出てきて……！？」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「レイラ！　加速の星術をかけるよ！！　コラプサーの皆にも指示を出して！！」
line = "「レイラ！　加速の星術をかけるよ！！　コラプサーの皆にも指示を出して！！」"

[[dialogue]]
speaker = "レイラ"
# 「はい！　みんな、手分けして──」
line = "「はい！　みんな、手分けして──」"

[[dialogue]]
speaker = "イングリット"
# 「何だ、まだ斬らせてくれるのか──片っ端から首を貰うぞ！」
line = "「何だ、まだ斬らせてくれるのか──片っ端から首を貰うぞ！」"

[[dialogue]]
speaker = "メテオラ"
# 「思いっきりやるぞ、どっかーんってな！」
line = "「思いっきりやるぞ、どっかーんってな！」"

[[dialogue]]
speaker = "レイラ"
# 「……ああ、ちょっと！　待ってってば！」
line = "「……ああ、ちょっと！　待ってってば！」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「相変わらずでございますわね、本当に」
line = "「相変わらずでございますわね、本当に」"

[[dialogue]]
speaker = "キサナ"
# 「ま。あいつらは連携なんて考えない方がいいだろ。離れてた方がアタシらも安全だしな」
line = "「ま。あいつらは連携なんて考えない方がいいだろ。離れてた方がアタシらも安全だしな」"

[[dialogue]]
speaker = "ヴァレリー"
# 「ふふふ。おぞましく、そして美しい光景ですね」
line = "「ふふふ。おぞましく、そして美しい光景ですね」"

[[dialogue]]
speaker = "リーナ"
# 「またルヴィネって子が出てきたの？　お兄ちゃんを困らせてる奴。全部いなくなっちゃえいなくなっちゃえいなくなっちゃえ──」
line = "「またルヴィネって子が出てきたの？　お兄ちゃんを困らせてる奴。全部いなくなっちゃえいなくなっちゃえいなくなっちゃえ──」"

[[dialogue]]
speaker = "エンジュ"
# 「全員ぶっ潰してやる……行くぞ！！」
line = "「全員ぶっ潰してやる……行くぞ！！」"

[[dialogue]]
speaker = "黒騎士"
# 「……これで終わりだ。貴様たちは敗北し、緋宮クロトはベガの地を踏むことも敵わない」
line = "「……これで終わりだ。貴様たちは敗北し、緋宮クロトはベガの地を踏むことも敵わない」"

[[dialogue]]
speaker = "黒騎士"
# 「世界の刷新を……マルキアとの──再会、を────」
line = "「世界の刷新を……マルキアとの──再会、を────」"

[[dialogue]]
speaker = "アニュラス（覚醒）"
# 「……お父様。貴方をその妄執から解き放つ──お相手願おう！！」
line = "「……お父様。貴方をその妄執から解き放つ──お相手願おう！！」"
