[[dialogue]]
speaker = "unk"
# 第３話,デネブのレジスタンス,B
line = "第３話,デネブのレジスタンス,B"

[[dialogue]]
speaker = "アポロ（大人）"
# 「ではあたしたちから、デネブで何が起きたかと、レジスタンスの状況について説明しよう」
line = "「ではあたしたちから、デネブで何が起きたかと、レジスタンスの状況について説明しよう」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「誤解のないよう改めて言っておくが、ここは森羅歴３０１２年のデネブだ」
line = "「誤解のないよう改めて言っておくが、ここは森羅歴３０１２年のデネブだ」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「あたしと魔王たちがアルタイルで戦ったのが森羅暦３００２年だから、１０年先の未来になる」
line = "「あたしと魔王たちがアルタイルで戦ったのが森羅暦３００２年だから、１０年先の未来になる」"

[[dialogue]]
speaker = "クロト"
# 「つまり俺たちは未来の平行世界にいるってことだな」
line = "「つまり俺たちは未来の平行世界にいるってことだな」"

[[dialogue]]
speaker = "unk"
# あのビル群も、俺たちの世界より未来ということなら頷ける。
line = "あのビル群も、俺たちの世界より未来ということなら頷ける。"

[[dialogue]]
speaker = "unk"
# そしてアポロが成長しているのも、１０年後なら当然のことだ。
line = "そしてアポロが成長しているのも、１０年後なら当然のことだ。"

[[dialogue]]
speaker = "unk"
# 平行世界間には時間のズレがあるとは言われていたが、今のアポロの姿を見て、改めて実感する。
line = "平行世界間には時間のズレがあるとは言われていたが、今のアポロの姿を見て、改めて実感する。"

[[dialogue]]
speaker = "アポロ（大人）"
# 「あたしも改めて名乗ろう。あたしはアポロ。かつてリクリエの使徒としてアルタイルに渡り、そしてデネブに帰ってきた」
line = "「あたしも改めて名乗ろう。あたしはアポロ。かつてリクリエの使徒としてアルタイルに渡り、そしてデネブに帰ってきた」"

[[dialogue]]
speaker = "梨緒"
# 「！　やはりそうか……」
line = "「！　やはりそうか……」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「やはり？」
line = "「やはり？」"

[[dialogue]]
speaker = "梨緒"
# 「私はベガの出身だ。だからベガの君も知っている」
line = "「私はベガの出身だ。だからベガの君も知っている」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「なら３つの平行世界全てのあたしを知っているのか。なおさらややこしいな」
line = "「なら３つの平行世界全てのあたしを知っているのか。なおさらややこしいな」"

[[dialogue]]
speaker = "梨緒"
# 「……そうだな」
line = "「……そうだな」"

[[dialogue]]
speaker = "リノ"
# 「私は緋宮リノ。元ネビュラの魔女で、デネブのクロトの母親よ。アポロちゃんと２人でレジスタンスの実働部隊をやっているわ」
line = "「私は緋宮リノ。元ネビュラの魔女で、デネブのクロトの母親よ。アポロちゃんと２人でレジスタンスの実働部隊をやっているわ」"

[[dialogue]]
speaker = "リノ"
# 「守護天使ラクシャが語った通り、１０年前、この世界の魔王クロトはリクリエに敗北した。もう少しで勝てるというところまでいったけど、残念ながら届かなかった」
line = "「守護天使ラクシャが語った通り、１０年前、この世界の魔王クロトはリクリエに敗北した。もう少しで勝てるというところまでいったけど、残念ながら届かなかった」"

[[dialogue]]
speaker = "リノ"
# 「クロトがヴィーナスちゃんを送り出した後の話をするわね」
line = "「クロトがヴィーナスちゃんを送り出した後の話をするわね」"

[[dialogue]]
speaker = "リノ"
# 「多くの星騎士が<ruby=たお>斃</ruby>れ、無数のアステラが渦巻き、モンスターが街を埋め尽くし、あと一歩で世界が滅びるというところで──」
line = "「多くの星騎士が<ruby>斃<rt>たお</rt></ruby>れ、無数のアステラが渦巻き、モンスターが街を埋め尽くし、あと一歩で世界が滅びるというところで──」"

[[dialogue]]
speaker = "リノ"
# 「１人の幼い天使が現れた」
line = "「１人の幼い天使が現れた」"

[[dialogue]]
speaker = "リノ"
# 「彼女の名はルヴィネ。『女神の遣い』を名乗る女の子だった」
line = "「彼女の名はルヴィネ。『女神の遣い』を名乗る女の子だった」"

[[dialogue]]
speaker = "リノ"
# 「彼女が出現するやいなや、モンスターは消え、アステラも消滅した。世界の危機は去り、デネブは救われた」
line = "「彼女が出現するやいなや、モンスターは消え、アステラも消滅した。世界の危機は去り、デネブは救われた」"

[[dialogue]]
speaker = "リノ"
# 「その時のことは私も観測していたけど、何が起こったのかはわからなかった。データも残っていない」
line = "「その時のことは私も観測していたけど、何が起こったのかはわからなかった。データも残っていない」"

[[dialogue]]
speaker = "リノ"
# 「だけど結果だけ見れば、ルヴィネが世界を救ったとしか思えない。人々は彼女を英雄とか救世主とか呼んでいるわ」
line = "「だけど結果だけ見れば、ルヴィネが世界を救ったとしか思えない。人々は彼女を英雄とか救世主とか呼んでいるわ」"

[[dialogue]]
speaker = "リノ"
# 「それからデネブは平和を取り戻し、復興の道を歩んでいる。分野によっては、リクリエ以前より発展を遂げていると言っても過言じゃないわ」
line = "「それからデネブは平和を取り戻し、復興の道を歩んでいる。分野によっては、リクリエ以前より発展を遂げていると言っても過言じゃないわ」"

[[dialogue]]
speaker = "リノ"
# 「流星学園と新星学園の星騎士はほとんど命を落としたけど、わずかな生き残りが集まり、極星学園の前身を作った」
line = "「流星学園と新星学園の星騎士はほとんど命を落としたけど、わずかな生き残りが集まり、極星学園の前身を作った」"

[[dialogue]]
speaker = "リノ"
# 「そして極星学園が正式に設立されると同時に、ルヴィネが星徒会長となり、彼女がデネブの星騎士を率いているわ」
line = "「そして極星学園が正式に設立されると同時に、ルヴィネが星徒会長となり、彼女がデネブの星騎士を率いているわ」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「あたしがデネブに帰ってきたのは、ルヴィネがリクリエを退けてからだ。元の世界に戻ってきたら全部終わってるもんだからビックリしたな」
line = "「あたしがデネブに帰ってきたのは、ルヴィネがリクリエを退けてからだ。元の世界に戻ってきたら全部終わってるもんだからビックリしたな」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「デネブでもリクリエは完全に収まったわけじゃない。モンスターは散発的に発生している」
line = "「デネブでもリクリエは完全に収まったわけじゃない。モンスターは散発的に発生している」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「だがルヴィネたち極星学園の星騎士によって、この世界は守られている。そこだけ見ればルヴィネはこのデネブの守護者だ」
line = "「だがルヴィネたち極星学園の星騎士によって、この世界は守られている。そこだけ見ればルヴィネはこのデネブの守護者だ」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「──だが」
line = "「──だが」"

[[dialogue]]
speaker = "フィオナ"
# 「だが？　それだけではないんですか？」
line = "「だが？　それだけではないんですか？」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「ルヴィネはこの世界のクロトを『悪しき魔王』と呼び、『平行世界アルタイルと手を結んで、デネブの滅亡を目論んだ』と言い出した」
line = "「ルヴィネはこの世界のクロトを『悪しき魔王』と呼び、『平行世界アルタイルと手を結んで、デネブの滅亡を目論んだ』と言い出した」"

[[dialogue]]
speaker = "フィオナ"
# 「そんな馬鹿な……！？　ラクシャさんが言った通り、この世界の緋宮会長は世界を守るためにリクリエと戦っていたはず……」
line = "「そんな馬鹿な……！？　ラクシャさんが言った通り、この世界の緋宮会長は世界を守るためにリクリエと戦っていたはず……」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「ああ、あたしたちはそれを知っている。だがそれは緋宮クロトに近い者だけだ」
line = "「ああ、あたしたちはそれを知っている。だがそれは緋宮クロトに近い者だけだ」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「魔王といえば悪というのが一般常識だし、一緒に戦っていたやつらもほとんどが先の戦いで倒れた」
line = "「魔王といえば悪というのが一般常識だし、一緒に戦っていたやつらもほとんどが先の戦いで倒れた」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「何より世界を救ったルヴィネの言葉だ。信じないやつはまずいなかった」
line = "「何より世界を救ったルヴィネの言葉だ。信じないやつはまずいなかった」"

[[dialogue]]
speaker = "クロト"
# 「なるほど……俺の顔を見て怯える人がいるのも納得だ」
line = "「なるほど……俺の顔を見て怯える人がいるのも納得だ」"

[[dialogue]]
speaker = "unk"
# 極星星徒会のチナや、デネブの街で出会った人々の反応を思い出す。
line = "極星星徒会のチナや、デネブの街で出会った人々の反応を思い出す。"

[[dialogue]]
speaker = "unk"
# そもそも太陽の壁画では悪として描かれていたし、救世の英雄に名指しされれば、ああなるのも自然か。
line = "そもそも太陽の壁画では悪として描かれていたし、救世の英雄に名指しされれば、ああなるのも自然か。"

[[dialogue]]
speaker = "ヴィーナス"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# 俺とヴィーナスはデネブの人に聞いていたから、アポロの話に驚きはないが、やはり父を悪の魔王と呼ばれることに憤りを覚えるのだろう。
line = "俺とヴィーナスはデネブの人に聞いていたから、アポロの話に驚きはないが、やはり父を悪の魔王と呼ばれることに憤りを覚えるのだろう。"

[[dialogue]]
speaker = "アポロ（大人）"
# 「そしてルヴィネは、緋宮クロトに味方していた者を、魔王の一派として排除しようとした」
line = "「そしてルヴィネは、緋宮クロトに味方していた者を、魔王の一派として排除しようとした」"

[[dialogue]]
speaker = "リノ"
# 「私も狙われたんだけど……危なかったところをアポロちゃんに助けてもらったの。それがレジスタンスの始まりね」
line = "「私も狙われたんだけど……危なかったところをアポロちゃんに助けてもらったの。それがレジスタンスの始まりね」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「それからは、同じようにルヴィネに狙われているやつを魔界に逃がしたり、リクリエについて調査したりしていた」
line = "「それからは、同じようにルヴィネに狙われているやつを魔界に逃がしたり、リクリエについて調査したりしていた」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「そんなわけで、あたしたちレジスタンスはルヴィネと対立している」
line = "「そんなわけで、あたしたちレジスタンスはルヴィネと対立している」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「ルヴィネの存在は余りに不自然だ。魔王クロトを敵視していることもそうだが、ルヴィネはデネブにとって都合が良すぎる」
line = "「ルヴィネの存在は余りに不自然だ。魔王クロトを敵視していることもそうだが、ルヴィネはデネブにとって都合が良すぎる」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「だからあたしたちは、ルヴィネはリクリエの側で、何かしらの意図があって極星の星徒会長をしているのではないかと疑っている」
line = "「だからあたしたちは、ルヴィネはリクリエの側で、何かしらの意図があって極星の星徒会長をしているのではないかと疑っている」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「そういう意味では、ラクシャと考えてることは同じだな」
line = "「そういう意味では、ラクシャと考えてることは同じだな」"

[[dialogue]]
speaker = "フィオナ"
# 「説明ありがとうございます、姉さん。おかげでデネブの状況が理解できてきました」
line = "「説明ありがとうございます、姉さん。おかげでデネブの状況が理解できてきました」"

[[dialogue]]
speaker = "フィオナ"
# 「ところで、ネビュラのみなさんはどうされたのでしょう？　星騎士の状況は聞きましたが、もしかして魔女も……」
line = "「ところで、ネビュラのみなさんはどうされたのでしょう？　星騎士の状況は聞きましたが、もしかして魔女も……」"

[[dialogue]]
speaker = "リノ"
# 「いいえ、ネビュラは星騎士ほど壊滅的な被害を受けたわけじゃないわ」
line = "「いいえ、ネビュラは星騎士ほど壊滅的な被害を受けたわけじゃないわ」"

[[dialogue]]
speaker = "リノ"
# 「だけど１０年前のリクリエとの戦いで世界樹の根を絶たれていて、『魔女の森』と行き来できなくなっているのよ。だから今人間界にいるのは私だけね」
line = "「だけど１０年前のリクリエとの戦いで世界樹の根を絶たれていて、『魔女の森』と行き来できなくなっているのよ。だから今人間界にいるのは私だけね」"

[[dialogue]]
speaker = "リノ"
# 「この秘密基地も、ネビュラ基地が留守の間に、設備を拝借して作ったものなの」
line = "「この秘密基地も、ネビュラ基地が留守の間に、設備を拝借して作ったものなの」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「まぁ、魔女を頼れないことには変わりないな」
line = "「まぁ、魔女を頼れないことには変わりないな」"

[[dialogue]]
speaker = "フィオナ"
# 「なるほど……」
line = "「なるほど……」"

[[dialogue]]
speaker = "unk"
# レジスタンス以外に頼れる相手がいないかと考えたが、俺たちが知っている星騎士は、戦いで倒れているか、生き残っていても星力を失って引退しているだろう。
line = "レジスタンス以外に頼れる相手がいないかと考えたが、俺たちが知っている星騎士は、戦いで倒れているか、生き残っていても星力を失って引退しているだろう。"

[[dialogue]]
speaker = "unk"
# 今ここにいる他に味方はいないと考えてよさそうだ。
line = "今ここにいる他に味方はいないと考えてよさそうだ。"

[[dialogue]]
speaker = "クロト"
# 「デネブの状況はわかった」
line = "「デネブの状況はわかった」"

[[dialogue]]
speaker = "クロト"
# 「じゃあ俺たちも説明するよ。アポロと別れてから何があったか、そして俺たちが何をしようとしているのかを」
line = "「じゃあ俺たちも説明するよ。アポロと別れてから何があったか、そして俺たちが何をしようとしているのかを」"
