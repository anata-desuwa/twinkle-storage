[[dialogue]]
speaker = "グロリア"
# 「ど、どういうことですか！？　プルちゃんがパテル様で……堕天使もパテル様で……パテル様がたくさん！？」
line = "「ど、どういうことですか！？　プルちゃんがパテル様で……堕天使もパテル様で……パテル様がたくさん！？」"

[[dialogue]]
speaker = "パテル"
# 「話が長くなるんだけどー、どこから説明しよっかなー」
line = "「話が長くなるんだけどー、どこから説明しよっかなー」"

[[dialogue]]
speaker = "パテル"
# 「フィーニスの塔を出た堕天使パテルは逃げるために分裂してー、そのうち１体が正気を取り戻しちゃってー、それがあたしってわけ。霊体だからできることだね」
line = "「フィーニスの塔を出た堕天使パテルは逃げるために分裂してー、そのうち１体が正気を取り戻しちゃってー、それがあたしってわけ。霊体だからできることだね」"

[[dialogue]]
speaker = "パテル"
# 「ハイ、説明終わり！　思ったより短かったね、アハ♪」
line = "「ハイ、説明終わり！　思ったより短かったね、アハ♪」"

[[dialogue]]
speaker = "グロリア"
# 「な、なるほど……？」
line = "「な、なるほど……？」"

[[dialogue]]
speaker = "パテル"
# 「ところでその立派な剣使わないの？　かっこいいのに」
line = "「ところでその立派な剣使わないの？　かっこいいのに」"

[[dialogue]]
speaker = "グロリア"
# 「えっ？　はい、私の剣は自分で使うためのものではありませんから……」
line = "「えっ？　はい、私の剣は自分で使うためのものではありませんから……」"

[[dialogue]]
speaker = "グロリア"
# 「では堕天使のパテル様の目的は……？　どうしてたくさんの堕天使が私たちのところに……？」
line = "「では堕天使のパテル様の目的は……？　どうしてたくさんの堕天使が私たちのところに……？」"

[[dialogue]]
speaker = "パテル"
# 「それはね……あなたの命だよ、グロリア」
line = "「それはね……あなたの命だよ、グロリア」"

[[dialogue]]
speaker = "unk"
# 早くグロリアさんのところに行かないと……！
line = "早くグロリアさんのところに行かないと……！"

[[dialogue]]
speaker = "フラン"
# 「クソ！　ちょこまかと鬱陶しい！」
line = "「クソ！　ちょこまかと鬱陶しい！」"

[[dialogue]]
speaker = "フラン"
# 「ぐっ……邪魔すんなぁああっ！！」
line = "「ぐっ……邪魔すんなぁああっ！！」"

[[dialogue]]
speaker = "パテル"
# 「堕天使とは守護天使がリクリエの瘴気に染まったもの。世界を破滅に導くべく、破壊の限りを尽くす存在だ」
line = "「堕天使とは守護天使がリクリエの瘴気に染まったもの。世界を破滅に導くべく、破壊の限りを尽くす存在だ」"

[[dialogue]]
speaker = "パテル"
# 「だけどフィーニスの塔の戦闘で傷ついた堕天使パテルは、リクリエに従うことすらなくなり、本能のままに動くだけのものになった」
line = "「だけどフィーニスの塔の戦闘で傷ついた堕天使パテルは、リクリエに従うことすらなくなり、本能のままに動くだけのものになった」"

[[dialogue]]
speaker = "グロリア"
# 「本能……？　守護天使の本能ですか？」
line = "「本能……？　守護天使の本能ですか？」"

[[dialogue]]
speaker = "パテル"
# 「そう。あたしは──パテルは死神。死を強く願うあなたに引き寄せられた。火に<ruby=いざな>誘</ruby>われる虫のようにね」
line = "「そう。あたしは──パテルは死神。死を強く願うあなたに引き寄せられた。火に<ruby>誘<rt>いざな</rt></ruby>われる虫のようにね」"

[[dialogue]]
speaker = "パテル"
# 「喜びなよグロリア。あれはあなたが待ち望んだ死神だよ」
line = "「喜びなよグロリア。あれはあなたが待ち望んだ死神だよ」"

[[dialogue]]
speaker = "グロリア"
# 「──！」
line = "「──！」"

[[dialogue]]
speaker = "グロリア"
# 「ああ、とうとうこの日が来たのですね……私が女神様の元に……パパとママのところに行く時が……」
line = "「ああ、とうとうこの日が来たのですね……私が女神様の元に……パパとママのところに行く時が……」"

[[dialogue]]
speaker = "グロリア"
# 「しかも守護天使様の鎌で逝けるなんて光栄です……」
line = "「しかも守護天使様の鎌で逝けるなんて光栄です……」"

[[dialogue]]
speaker = "パテル"
# 「おっと！」
line = "「おっと！」"

[[dialogue]]
speaker = "パテル"
# 「あいつらの標的にはあたしも入ってるけどね。守護天使パテルの意識を持ってるあたしが邪魔みたいだから」
line = "「あいつらの標的にはあたしも入ってるけどね。守護天使パテルの意識を持ってるあたしが邪魔みたいだから」"

[[dialogue]]
speaker = "グロリア"
# 「！　そうでした、私はともかくプルちゃんは守らないと……！」
line = "「！　そうでした、私はともかくプルちゃんは守らないと……！」"

[[dialogue]]
speaker = "パテル"
# 「あたしが守護天使でも？　ウソついてたのに？」
line = "「あたしが守護天使でも？　ウソついてたのに？」"

[[dialogue]]
speaker = "グロリア"
# 「はい。プルちゃんがパテル様でも、一緒にスタンプラリーを回ったプルちゃんには変わりませんから」
line = "「はい。プルちゃんがパテル様でも、一緒にスタンプラリーを回ったプルちゃんには変わりませんから」"

[[dialogue]]
speaker = "パテル"
# 「あたしがグロリアをエサにしていたとしても？」
line = "「あたしがグロリアをエサにしていたとしても？」"

[[dialogue]]
speaker = "グロリア"
# 「はい。それでも。友達……と言っていいのかわかりませんが、私は楽しかったです。だからプルちゃんは死神にはやらせません……！」
line = "「はい。それでも。友達……と言っていいのかわかりませんが、私は楽しかったです。だからプルちゃんは死神にはやらせません……！」"

[[dialogue]]
speaker = "パテル"
# 「へー、そうなんだー。やっぱりお姉ちゃんにするならグロリアだね♪　おっぱいもふかふかだし♪」
line = "「へー、そうなんだー。やっぱりお姉ちゃんにするならグロリアだね♪　おっぱいもふかふかだし♪」"

[[dialogue]]
speaker = "パテル"
# 「でもね、グロリア。グロリアがそう言ってくれるなら、あたしも誠意を見せるよ」
line = "「でもね、グロリア。グロリアがそう言ってくれるなら、あたしも誠意を見せるよ」"

[[dialogue]]
speaker = "グロリア"
# 「え？」
line = "「え？」"

[[dialogue]]
speaker = "パテル"
# 「『善い人だから早く天に召された』──なんてウソっぱちさ。あなたの両親は不運で死んだだけ」
line = "「『善い人だから早く天に召された』──なんてウソっぱちさ。あなたの両親は不運で死んだだけ」"

[[dialogue]]
speaker = "グロリア"
# 「──」
line = "「──」"

[[dialogue]]
speaker = "パテル"
# 「グロリアだって本当はわかってるでしょ。それならおじいちゃんおばあちゃんはみんな悪い人になっちゃう」
line = "「グロリアだって本当はわかってるでしょ。それならおじいちゃんおばあちゃんはみんな悪い人になっちゃう」"

[[dialogue]]
speaker = "パテル"
# 「早く死ぬ善人もいれば、長く生きる善人もいる。早く死ぬ悪人もいて、長く生きる悪人もいる」
line = "「早く死ぬ善人もいれば、長く生きる善人もいる。早く死ぬ悪人もいて、長く生きる悪人もいる」"

[[dialogue]]
speaker = "パテル"
# 「あなたの両親はただモンスターに殺されただけ。死神のあたしが言うんだもの、間違いない」
line = "「あなたの両親はただモンスターに殺されただけ。死神のあたしが言うんだもの、間違いない」"

[[dialogue]]
speaker = "グロリア"
# 「それ……は……」
line = "「それ……は……」"

[[dialogue]]
speaker = "パテル"
# 「善い人になれば両親の元に行けると、あなたは『死』に縋っている。でもね、それは勝手な思い込みだ」
line = "「善い人になれば両親の元に行けると、あなたは『死』に縋っている。でもね、それは勝手な思い込みだ」"

[[dialogue]]
speaker = "パテル"
# 「ついでに言うと、死んだ人の魂が行くのは女神様のところじゃなくて、《円環》のラクシャのところかなー……とマジレスしてみるのでした」
line = "「ついでに言うと、死んだ人の魂が行くのは女神様のところじゃなくて、《円環》のラクシャのところかなー……とマジレスしてみるのでした」"

[[dialogue]]
speaker = "パテル"
# 「ねぇ、両親の後を追うのはやめなよ。そういうのはね、無駄死にっていうんだよ」
line = "「ねぇ、両親の後を追うのはやめなよ。そういうのはね、無駄死にっていうんだよ」"

[[dialogue]]
speaker = "グロリア"
# 「──！」
line = "「──！」"

[[dialogue]]
speaker = "グロリア"
# 「そんな……私は……私は……」
line = "「そんな……私は……私は……」"

[[dialogue]]
speaker = "パテル"
# 「守護天使の立場で個人にこういうこと言いたくないんだけど──いやまぁ今までそんな機会なかったんだけど、あたしなりに親切心で──」
line = "「守護天使の立場で個人にこういうこと言いたくないんだけど──いやまぁ今までそんな機会なかったんだけど、あたしなりに親切心で──」"

[[dialogue]]
speaker = "？？？"
# 「──うるせえ」
line = "「──うるせえ」"

[[dialogue]]
speaker = "パテル"
# 「ん？」
line = "「ん？」"

[[dialogue]]
speaker = "フラン"
# 「うるせえっつってんだよ！！」
line = "「うるせえっつってんだよ！！」"
