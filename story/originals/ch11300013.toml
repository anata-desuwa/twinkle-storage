[[dialogue]]
speaker = "unk"
# 第３話,陰陽師ＶＳ大怪盗,P
line = "第３話,陰陽師ＶＳ大怪盗,P"

[[dialogue]]
speaker = "unk"
# その日、俺はミヤハルと昼食をしに、大聖堂カフェテリアへとやって来ていた。
line = "その日、俺はミヤハルと昼食をしに、大聖堂カフェテリアへとやって来ていた。"

[[dialogue]]
speaker = "ミヤハル"
# 「会長はん、お隣ごめんやす<emoji=heart04>」
line = "「会長はん、お隣ごめんやす<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ミヤハル、ここで腕に抱き着かれると……
line = "ミヤハル、ここで腕に抱き着かれると……"

[[dialogue]]
speaker = "ミヤハル"
# 「ふふっ<emoji=heart04>　周りの視線が気になります？」
line = "「ふふっ<emoji=heart04>　周りの視線が気になります？」"

[[dialogue]]
speaker = "ミヤハル"
# 「うちは人に見られると、むしろ興奮してまうから構わへんのやけど<emoji=heart04>」
line = "「うちは人に見られると、むしろ興奮してまうから構わへんのやけど<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そんな風にくっ付きあって席に着きながら、昼食をしていると――
line = "そんな風にくっ付きあって席に着きながら、昼食をしていると――"

[[dialogue]]
speaker = "ミネコ"
# 「やあ、会長。ごきげんよう♪」
line = "「やあ、会長。ごきげんよう♪」"

[[dialogue]]
speaker = "unk"
# 声を掛けてきたのは、流星学園１年生のミネコ・フランボワーズだった。
line = "声を掛けてきたのは、流星学園１年生のミネコ・フランボワーズだった。"

[[dialogue]]
speaker = "ミネコ"
# 「おや？　そちらの美人さんは、もしかして……」
line = "「おや？　そちらの美人さんは、もしかして……」"

[[dialogue]]
speaker = "ミネコ"
# 「<b>選星者</b>『陰陽師』の、安倍野ミヤハルさん――ですよね？」
line = "「<b>選星者</b>『陰陽師』の、安倍野ミヤハルさん――ですよね？」"

[[dialogue]]
speaker = "ミヤハル"
# 「あら、うちが選星者やってこと、知ってはるん？　それじゃあ、もしかして――」
line = "「あら、うちが選星者やってこと、知ってはるん？　それじゃあ、もしかして――」"

[[dialogue]]
speaker = "ミネコ"
# 「はい♪　私も同じく選星者なので」
line = "「はい♪　私も同じく選星者なので」"

[[dialogue]]
speaker = "ミネコ"
# 「私は、ミネコ・フランボワーズ。またの名を、大怪盗フランボウ。選星者の１人『大怪盗』を承っている者だよ☆　以後お見知りおきを♪」
line = "「私は、ミネコ・フランボワーズ。またの名を、大怪盗フランボウ。選星者の１人『大怪盗』を承っている者だよ☆　以後お見知りおきを♪」"

[[dialogue]]
speaker = "unk"
# 選星者とは、女神から世界に必要な『<ruby=ロール>役職</ruby>』を授けられた者のことを指す。
line = "選星者とは、女神から世界に必要な『<ruby>役職<rt>ロール</rt></ruby>』を授けられた者のことを指す。"

[[dialogue]]
speaker = "unk"
# 彼らは天からの啓示により、生まれながらにそのことを自覚し、役職に応じた特殊な能力を与えられている。
line = "彼らは天からの啓示により、生まれながらにそのことを自覚し、役職に応じた特殊な能力を与えられている。"

[[dialogue]]
speaker = "unk"
# そして、実は『陰陽師』であるミヤハルも、その１人だ。
line = "そして、実は『陰陽師』であるミヤハルも、その１人だ。"

[[dialogue]]
speaker = "ミネコ"
# 「かの有名な安倍晴明の子孫で、しかもこんな美人な女性と知り合えるなんて、とっても光栄だよ☆」
line = "「かの有名な安倍晴明の子孫で、しかもこんな美人な女性と知り合えるなんて、とっても光栄だよ☆」"

[[dialogue]]
speaker = "ミヤハル"
# 「あら、お上手やねぇ<emoji=heart04>　うちも会長はんから聞かされとったけど、ミネコはん、名探偵のジュエリーはんと会長はんを取り合う仲なんやろ？」
line = "「あら、お上手やねぇ<emoji=heart04>　うちも会長はんから聞かされとったけど、ミネコはん、名探偵のジュエリーはんと会長はんを取り合う仲なんやろ？」"

[[dialogue]]
speaker = "ミネコ"
# 「ああ、ジュエリーの言う『愛』というのを知りたくてね。その為に会長の心を盗もうと攻略の最中なんだ♪」
line = "「ああ、ジュエリーの言う『愛』というのを知りたくてね。その為に会長の心を盗もうと攻略の最中なんだ♪」"

[[dialogue]]
speaker = "ミヤハル"
# 「なるほどなぁ。つまりはミネコはんも……会長はんの<b>体狙い</b>っていうわけやね<emoji=heart04>」
line = "「なるほどなぁ。つまりはミネコはんも……会長はんの<b>体狙い</b>っていうわけやね<emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
# 「体狙い！？」
line = "「体狙い！？」"

[[dialogue]]
speaker = "ミヤハル"
# 「アカン、ポロッとストレートに言うてもうたわぁ<emoji=heart04>」
line = "「アカン、ポロッとストレートに言うてもうたわぁ<emoji=heart04>」"

[[dialogue]]
speaker = "ミヤハル"
# 「でも――ふふっ<emoji=heart04>　『愛』って言ったら、やっぱり心だけやのうて、そっちの意味も含みますやろ？」
line = "「でも――ふふっ<emoji=heart04>　『愛』って言ったら、やっぱり心だけやのうて、そっちの意味も含みますやろ？」"

[[dialogue]]
speaker = "ミネコ"
# 「い、いや、間違ってはないけど……！　でも私は、もっと愛という名のロマンを追い求めているというか……」
line = "「い、いや、間違ってはないけど……！　でも私は、もっと愛という名のロマンを追い求めているというか……」"

[[dialogue]]
speaker = "unk"
# （あのミネコが動揺している……！？）
line = "（あのミネコが動揺している……！？）"

[[dialogue]]
speaker = "ミヤハル"
# 「あら、もしかして恥ずかしがっとりますの？　大怪盗はん、意外とウブなんやねぇ<emoji=heart04>」
line = "「あら、もしかして恥ずかしがっとりますの？　大怪盗はん、意外とウブなんやねぇ<emoji=heart04>」"

[[dialogue]]
speaker = "ミヤハル"
# 「うちはもう、会長はんのそっちの方も盗む気満々やよ<emoji=heart04>」
line = "「うちはもう、会長はんのそっちの方も盗む気満々やよ<emoji=heart04>」"

[[dialogue]]
speaker = "ミヤハル"
# 「はよ盗みとうて、想像するとうち――<b>濡れて</b>きてまうわぁ<emoji=heart04>」
line = "「はよ盗みとうて、想像するとうち――<b>濡れて</b>きてまうわぁ<emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
# 「ちょっ！？　公の場でこの人、なに言ってんの！？」
line = "「ちょっ！？　公の場でこの人、なに言ってんの！？」"

[[dialogue]]
speaker = "unk"
# 慌てたミネコが、指パッチンをして星術を発動する。
line = "慌てたミネコが、指パッチンをして星術を発動する。"

[[dialogue]]
speaker = "unk"
# ミヤハルの発言で集まっていた生徒たちから視線――注目が、何事もなかったのように霧散して、元に戻っていく。
line = "ミヤハルの発言で集まっていた生徒たちから視線――注目が、何事もなかったのように霧散して、元に戻っていく。"

[[dialogue]]
speaker = "ミヤハル"
# 「……！　驚いたわぁ。会長はんからも聞いてたけど、これが大怪盗の能力なん？」
line = "「……！　驚いたわぁ。会長はんからも聞いてたけど、これが大怪盗の能力なん？」"

[[dialogue]]
speaker = "ミネコ"
# 「そう。選星者として与えられた能力『情報改竄』……って、変なことで力を使わせないでよ！」
line = "「そう。選星者として与えられた能力『情報改竄』……って、変なことで力を使わせないでよ！」"

[[dialogue]]
speaker = "ミヤハル"
# 「羨ましいわぁ。これって、相手に認識されてる自分の情報を操作すれば、透明人間みたいにもなれるってことやろ？　つまり――」
line = "「羨ましいわぁ。これって、相手に認識されてる自分の情報を操作すれば、透明人間みたいにもなれるってことやろ？　つまり――」"

[[dialogue]]
speaker = "ミヤハル"
# 「全裸でお散歩したり、野外プレイもし放題ってことやろ？」
line = "「全裸でお散歩したり、野外プレイもし放題ってことやろ？」"

[[dialogue]]
speaker = "ミネコ"
# 「そんな使い方はしないよ！？　というか、さっきから発言がポロリしまくってるんだけど！？」
line = "「そんな使い方はしないよ！？　というか、さっきから発言がポロリしまくってるんだけど！？」"

[[dialogue]]
speaker = "ミヤハル"
# 「ふふっ<emoji=heart04>　どうせ無かったことにできると思うたら、つい<emoji=heart04>」
line = "「ふふっ<emoji=heart04>　どうせ無かったことにできると思うたら、つい<emoji=heart04>」"

[[dialogue]]
speaker = "ミヤハル"
# 「でも、ほんまに羨ましいわぁ。うちの陰陽術と交換して欲しいわぁ、その<b>露出能力</b><emoji=heart04>」
line = "「でも、ほんまに羨ましいわぁ。うちの陰陽術と交換して欲しいわぁ、その<b>露出能力</b><emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
# 「その言い方は止めてくれるかな！？」
line = "「その言い方は止めてくれるかな！？」"

[[dialogue]]
speaker = "ミネコ"
# 「噂には聞いてたけど、ミヤハルさんって、ほんとにエロトークが止まらないね……」
line = "「噂には聞いてたけど、ミヤハルさんって、ほんとにエロトークが止まらないね……」"

[[dialogue]]
speaker = "ミヤハル"
# 「ふふふっ<emoji=heart04>　堪忍しておくれやす<emoji=heart04>　うちはえっちなこと大好きで、『歩く１８禁』って言われとるドスケベ陰陽師やから<emoji=heart04>」
line = "「ふふふっ<emoji=heart04>　堪忍しておくれやす<emoji=heart04>　うちはえっちなこと大好きで、『歩く１８禁』って言われとるドスケベ陰陽師やから<emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
# 「自分で言っちゃうのそれ！？」
line = "「自分で言っちゃうのそれ！？」"

[[dialogue]]
speaker = "ミヤハル"
# 「あっ、スケベトークついでになんやけど、ミネコはんのえっちな性癖を聞いてもええやろか？」
line = "「あっ、スケベトークついでになんやけど、ミネコはんのえっちな性癖を聞いてもええやろか？」"

[[dialogue]]
speaker = "ミネコ"
# 「趣味を聞くみたいなノリで！？」
line = "「趣味を聞くみたいなノリで！？」"

[[dialogue]]
speaker = "ミヤハル"
# 「ふふふっ<emoji=heart04>　うち、最近他人との仲良くなり方が少し分かって来たんよ～」
line = "「ふふふっ<emoji=heart04>　うち、最近他人との仲良くなり方が少し分かって来たんよ～」"

[[dialogue]]
speaker = "ミネコ"
# 「その仲良くなり方は果たして合ってるのかな！？」
line = "「その仲良くなり方は果たして合ってるのかな！？」"

[[dialogue]]
speaker = "ミヤハル"
# 「ちなみにうちは、露出癖があってな？」
line = "「ちなみにうちは、露出癖があってな？」"

[[dialogue]]
speaker = "ミネコ"
# 「か、会長～～っ！　ヘルプッ！　この先輩のセクハラを止めてぇ～～～っ！！！」
line = "「か、会長～～っ！　ヘルプッ！　この先輩のセクハラを止めてぇ～～～っ！！！」"

[[dialogue]]
speaker = "unk"
# ミヤハル、めっ！
line = "ミヤハル、めっ！"

[[dialogue]]
speaker = "ミヤハル"
# 「あんっ<emoji=heart04>　会長はんに怒られてもうた<emoji=heart04>」
line = "「あんっ<emoji=heart04>　会長はんに怒られてもうた<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺がポンと頭に手を置くと、ちろっと舌を出して、悪戯っぽく微笑むミヤハルなのだった――
line = "俺がポンと頭に手を置くと、ちろっと舌を出して、悪戯っぽく微笑むミヤハルなのだった――"
