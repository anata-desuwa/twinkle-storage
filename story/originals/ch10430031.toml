[[dialogue]]
speaker = "unk"
# 第１話,サチと反転の力,P
line = "第１話,サチと反転の力,P"

[[dialogue]]
speaker = "unk"
# その日も『仮想結界システム』を使い、俺はサチの新たなフォームの訓練に付き合うことになった。
line = "その日も『仮想結界システム』を使い、俺はサチの新たなフォームの訓練に付き合うことになった。"

[[dialogue]]
speaker = "サチ"
# 「それではお兄さん、本日も一緒に訓練をよろしくお願いしますね」
line = "「それではお兄さん、本日も一緒に訓練をよろしくお願いしますね」"

[[dialogue]]
speaker = "unk"
# 今日も頑張ろう
line = "今日も頑張ろう"

[[dialogue]]
speaker = "サチ"
# 「はい♪　アンラッキーも、ちゃんと使いこなせるようになってみせます」
line = "「はい♪　アンラッキーも、ちゃんと使いこなせるようになってみせます」"

[[dialogue]]
speaker = "ルルカ"
# 「サチちゃ～ん、お兄ちゃ～ん！」
line = "「サチちゃ～ん、お兄ちゃ～ん！」"

[[dialogue]]
speaker = "サチ"
# 「あっ、ルルカ先輩！　それに――」
line = "「あっ、ルルカ先輩！　それに――」"

[[dialogue]]
speaker = "リコリンフィア"
# 「リコリンリン♪　こんにちは～♪」
line = "「リコリンリン♪　こんにちは～♪」"

[[dialogue]]
speaker = "サチ"
# 「もしかして、附属校２年のリコリンさんですか？」
line = "「もしかして、附属校２年のリコリンさんですか？」"

[[dialogue]]
speaker = "リコリンフィア"
# 「うん、サチお姉ちゃん♪　『妹同盟』のグループチャットではお話してたけど、こうして直接会うのは初めましてだね～♪」
line = "「うん、サチお姉ちゃん♪　『妹同盟』のグループチャットではお話してたけど、こうして直接会うのは初めましてだね～♪」"

[[dialogue]]
speaker = "サチ"
# 「こちらこそ初めまして♪　附属校３年の<ruby=しろつめ>白詰</ruby>サチです」
line = "「こちらこそ初めまして♪　附属校３年の<ruby>白詰<rt>しろつめ</rt></ruby>サチです」"

[[dialogue]]
speaker = "サチ"
# 「お２人も訓練にいらっしゃったんですか？」
line = "「お２人も訓練にいらっしゃったんですか？」"

[[dialogue]]
speaker = "ルルカ"
# 「うん、そうなんだ～。リコリンちゃんに誘われてね♪」
line = "「うん、そうなんだ～。リコリンちゃんに誘われてね♪」"

[[dialogue]]
speaker = "ルルカ"
# 「ねぇ、それがチャットで言ってたサチちゃんの新フォーム？」
line = "「ねぇ、それがチャットで言ってたサチちゃんの新フォーム？」"

[[dialogue]]
speaker = "サチ"
# 「はい。『リバースフォーム』と言います。少し事情があって、最近変身できるようになりまして……」
line = "「はい。『リバースフォーム』と言います。少し事情があって、最近変身できるようになりまして……」"

[[dialogue]]
speaker = "unk"
# ２人には話していないが、魔法少女絡みの騒動で、サチは『反転のロストアイテム』の能力を受け、元の戦闘服へと変身できなくなってしまっていた。
line = "２人には話していないが、魔法少女絡みの騒動で、サチは『反転のロストアイテム』の能力を受け、元の戦闘服へと変身できなくなってしまっていた。"

[[dialogue]]
speaker = "unk"
# そのため、『反転した力』で戦えるようにと、トレジアンナさんが新たに製作したのが、このリバースフォームというわけだった。
line = "そのため、『反転した力』で戦えるようにと、トレジアンナさんが新たに製作したのが、このリバースフォームというわけだった。"

[[dialogue]]
speaker = "リコリンフィア"
# 「わぁ～っ、サチお姉ちゃんの衣装、すっごく可愛い～♪　どんな能力が使えるの～？」
line = "「わぁ～っ、サチお姉ちゃんの衣装、すっごく可愛い～♪　どんな能力が使えるの～？」"

[[dialogue]]
speaker = "サチ"
# 「あ、ありがとうございます。このフォームでは、これまで使っていた『幸運を引き寄せる』能力とは真逆で――『不運を引き寄せる』能力が使えるんです」
line = "「あ、ありがとうございます。このフォームでは、これまで使っていた『幸運を引き寄せる』能力とは真逆で――『不運を引き寄せる』能力が使えるんです」"

[[dialogue]]
speaker = "リコリンフィア"
# 「へぇ～、そうなんだ～。すご～い♪」
line = "「へぇ～、そうなんだ～。すご～い♪」"

[[dialogue]]
speaker = "ルルカ"
# 「ん？　でも、それって自分がアンラッキーになっちゃうんじゃ……」
line = "「ん？　でも、それって自分がアンラッキーになっちゃうんじゃ……」"

[[dialogue]]
speaker = "サチ"
# 「はい、実はそうなんです。それで、なかなか使いこなせなくて……あはは」
line = "「はい、実はそうなんです。それで、なかなか使いこなせなくて……あはは」"

[[dialogue]]
speaker = "unk"
# そうして、仮想結界を起動し、ルルカとリコリンも一緒に戦闘訓練へ参加することになった。
line = "そうして、仮想結界を起動し、ルルカとリコリンも一緒に戦闘訓練へ参加することになった。"

[[dialogue]]
speaker = "ブヒモス"
# 「ブヒッ！」
line = "「ブヒッ！」"

[[dialogue]]
speaker = "unk"
# 相手は、強力な仮想モンスターだ。
line = "相手は、強力な仮想モンスターだ。"

[[dialogue]]
speaker = "サチ"
# 「それでは、行きます！　――きゃあっ！？」
line = "「それでは、行きます！　――きゃあっ！？」"

[[dialogue]]
speaker = "unk"
# サチがモンスターへ向かって１歩踏み出した瞬間、いきなり盛大にツルッと滑り、その場に転んでしまった。
line = "サチがモンスターへ向かって１歩踏み出した瞬間、いきなり盛大にツルッと滑り、その場に転んでしまった。"

[[dialogue]]
speaker = "ルルカ"
# 「えぇ～っ！？　何もないところで派手に滑った！？」
line = "「えぇ～っ！？　何もないところで派手に滑った！？」"

[[dialogue]]
speaker = "リコリンフィア"
# 「なるほど～。アンラッキーって、あんな感じで起きちゃうんだね～」
line = "「なるほど～。アンラッキーって、あんな感じで起きちゃうんだね～」"

[[dialogue]]
speaker = "ルルカ"
# 「ま、まるで漫画のドジっ子みたいな……」
line = "「ま、まるで漫画のドジっ子みたいな……」"

[[dialogue]]
speaker = "サチ"
# 「くっ……すぐ起き上がらないと――」
line = "「くっ……すぐ起き上がらないと――」"

[[dialogue]]
speaker = "ブヒモス"
# 「ブヒモーーッ！！」
line = "「ブヒモーーッ！！」"

[[dialogue]]
speaker = "サチ"
# 「って、きゃ～っ！？」
line = "「って、きゃ～っ！？」"

[[dialogue]]
speaker = "unk"
# 体勢を立て直す間もなく、モンスターの突進で跳ね飛ばされてしまう。
line = "体勢を立て直す間もなく、モンスターの突進で跳ね飛ばされてしまう。"

[[dialogue]]
speaker = "サチ"
# 「うぅ……アンラッキーです……」
line = "「うぅ……アンラッキーです……」"

[[dialogue]]
speaker = "unk"
# それから何度も挑戦するが、そのたびに不運が重なり、サチは敗北を喫してしまっていた。
line = "それから何度も挑戦するが、そのたびに不運が重なり、サチは敗北を喫してしまっていた。"

[[dialogue]]
speaker = "サチ"
# 「はぁ……はぁ……！」
line = "「はぁ……はぁ……！」"

[[dialogue]]
speaker = "unk"
# サチ、そろそろ１回休憩した方が……
line = "サチ、そろそろ１回休憩した方が……"

[[dialogue]]
speaker = "サチ"
# 「いえ、大丈夫です。もう１度……！」
line = "「いえ、大丈夫です。もう１度……！」"

[[dialogue]]
speaker = "unk"
# 失敗し続けている悔しさからか、すぐに再挑戦しようとするサチ。
line = "失敗し続けている悔しさからか、すぐに再挑戦しようとするサチ。"

[[dialogue]]
speaker = "unk"
# と、その時だった。
line = "と、その時だった。"

[[dialogue]]
speaker = "ルルカ"
# 「あれ？　サチちゃん！　なんか体が光ってるよ！？」
line = "「あれ？　サチちゃん！　なんか体が光ってるよ！？」"

[[dialogue]]
speaker = "サチ"
# 「え？　あっ――」
line = "「え？　あっ――」"

[[dialogue]]
speaker = "サチ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# 光が収まると、サチはどこか落ち着いた――しかし先ほどとは違う雰囲気をまとっていた。
line = "光が収まると、サチはどこか落ち着いた――しかし先ほどとは違う雰囲気をまとっていた。"

[[dialogue]]
speaker = "ルルカ"
# 「さ、サチちゃん？　大丈夫？」
line = "「さ、サチちゃん？　大丈夫？」"

[[dialogue]]
speaker = "サチ"
# 「――はい。大丈夫ですよ、ルルカ先輩♪」
line = "「――はい。大丈夫ですよ、ルルカ先輩♪」"

[[dialogue]]
speaker = "リコリンフィア"
# 「サチお姉ちゃん、なんだか雰囲気が違うような……？」
line = "「サチお姉ちゃん、なんだか雰囲気が違うような……？」"

[[dialogue]]
speaker = "unk"
# しまった、反転した……！
line = "しまった、反転した……！"

[[dialogue]]
speaker = "ルルカ"
# 「えっ？　反転……？」
line = "「えっ？　反転……？」"

[[dialogue]]
speaker = "サチ"
# 「ふふっ、お兄さん♪　そういうことなので～」
line = "「ふふっ、お兄さん♪　そういうことなので～」"

[[dialogue]]
speaker = "サチ"
# 「今度は私とお兄さんで、実戦訓練ですよ♪　えいっ<emoji=heart04>」
line = "「今度は私とお兄さんで、実戦訓練ですよ♪　えいっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# サチが突然、抱きついてきて――
line = "サチが突然、抱きついてきて――"

[[dialogue]]
speaker = "サチ"
# 「んちゅ～～っ<emoji=heart04><emoji=heart04>」
line = "「んちゅ～～っ<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺は強引に唇を塞がれてしまった。
line = "俺は強引に唇を塞がれてしまった。"

[[dialogue]]
speaker = "ルルカ"
# 「えぇ～～っ！？　目の前でいきなりキス！？」
line = "「えぇ～～っ！？　目の前でいきなりキス！？」"

[[dialogue]]
speaker = "リコリンフィア"
# 「すご～い♪　サチお姉ちゃんってば、大胆～♪」
line = "「すご～い♪　サチお姉ちゃんってば、大胆～♪」"

[[dialogue]]
speaker = "unk"
# んん～～～っ！？
line = "んん～～～っ！？"

[[dialogue]]
speaker = "unk"
# リバースフォームの能力によるものか、体に上手く力が入らず、俺はキスされたまま、サチのホールドから抜け出せない。
line = "リバースフォームの能力によるものか、体に上手く力が入らず、俺はキスされたまま、サチのホールドから抜け出せない。"

[[dialogue]]
speaker = "サチ"
# 「――んっ……はあぁっ<emoji=heart04>　お兄さんと人前でキスしちゃいました……<emoji=heart04>」
line = "「――んっ……はあぁっ<emoji=heart04>　お兄さんと人前でキスしちゃいました……<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
# 「すごく解放的で、最高な気分です<emoji=heart04>」
line = "「すごく解放的で、最高な気分です<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
# 「このところ、リバースフォームの訓練でうまくいかなくて溜まっていたストレスも、どこかへ飛んでいっちゃいました<emoji=heart04>」
line = "「このところ、リバースフォームの訓練でうまくいかなくて溜まっていたストレスも、どこかへ飛んでいっちゃいました<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
# 「お兄さん、もう１度<emoji=heart04>　ん～っ<emoji=heart04>」
line = "「お兄さん、もう１度<emoji=heart04>　ん～っ<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
# 「ちゅっ<emoji=heart04>　ちゅ～っ<emoji=heart04>」
line = "「ちゅっ<emoji=heart04>　ちゅ～っ<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
# 「ひゃああぁっ<emoji=heart04>　サチちゃんとお兄ちゃんって、普段からこんなふうにキスしてるの……！？　す、すごくエッチだよ……！」
line = "「ひゃああぁっ<emoji=heart04>　サチちゃんとお兄ちゃんって、普段からこんなふうにキスしてるの……！？　す、すごくエッチだよ……！」"

[[dialogue]]
speaker = "リコリンフィア"
# 「ふっ……なるほど。リバースフォームは制御を誤ると、力だけでなく『精神』まで暴走し、反転してしまうというわけか。興味深い……」
line = "「ふっ……なるほど。リバースフォームは制御を誤ると、力だけでなく『精神』まで暴走し、反転してしまうというわけか。興味深い……」"

[[dialogue]]
speaker = "unk"
# （２人共、見てないでヘルプ～～っ！？）
line = "（２人共、見てないでヘルプ～～っ！？）"

[[dialogue]]
speaker = "unk"
# 唇を塞がれて声が出せないため、必死に目で助けを求めるが、２人は興味津々で観察し続けていた。
line = "唇を塞がれて声が出せないため、必死に目で助けを求めるが、２人は興味津々で観察し続けていた。"

[[dialogue]]
speaker = "サチ"
# 「んっ……ちゅぱっ……ふふっ<emoji=heart04>　キスを見られて恥ずかしがっているお兄さん、エッチで可愛いです<emoji=heart04>」
line = "「んっ……ちゅぱっ……ふふっ<emoji=heart04>　キスを見られて恥ずかしがっているお兄さん、エッチで可愛いです<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 暴走したサチは、小悪魔のような笑みを浮かべるのだった。
line = "暴走したサチは、小悪魔のような笑みを浮かべるのだった。"
