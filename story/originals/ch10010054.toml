[[dialogue]]
speaker = "unk"
# 第４話,幸せのお裾分け,P
line = "第４話,幸せのお裾分け,P"

[[dialogue]]
speaker = "フィオナ"
# 「アニマ先輩──あなたが、私たちのグッズを製造・販売していたんですね！」
line = "「アニマ先輩──あなたが、私たちのグッズを製造・販売していたんですね！」"

[[dialogue]]
speaker = "アニマ"
# 「ムゥ……バレてしまっては仕方がない。その通りダ。アニマに造れないものはナイ！」
line = "「ムゥ……バレてしまっては仕方がない。その通りダ。アニマに造れないものはナイ！」"

[[dialogue]]
speaker = "フィオナ"
# 「確かにこのグッズのクオリティは認めますが──無断でこんなものを販売することは、星徒会長として見過ごせません。販売の差し止めを要求します」
line = "「確かにこのグッズのクオリティは認めますが──無断でこんなものを販売することは、星徒会長として見過ごせません。販売の差し止めを要求します」"

[[dialogue]]
speaker = "アニマ"
# 「な、なんだっテ！　しかし……これも消費者が求めた結果ダ。需要と供給なんダ」
line = "「な、なんだっテ！　しかし……これも消費者が求めた結果ダ。需要と供給なんダ」"

[[dialogue]]
speaker = "フィオナ"
# 「なんですって……？」
line = "「なんですって……？」"

[[dialogue]]
speaker = "アニマ"
# 「見よ。先月の購買部アンケートの結果ダ。売ってほしい商品リクエスト第１位」
line = "「見よ。先月の購買部アンケートの結果ダ。売ってほしい商品リクエスト第１位」"

[[dialogue]]
speaker = "unk"
