[[dialogue]]
speaker = "フィオナ"
# 「そうですね──そこまでしようとは思いませんでした。私が問い詰めたファンの子たちも、純粋に私のことを好いてくれている様子でしたし」
line = "「そうですね──そこまでしようとは思いませんでした。私が問い詰めたファンの子たちも、純粋に私のことを好いてくれている様子でしたし」"

[[dialogue]]
speaker = "フィオナ"
