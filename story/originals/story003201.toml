[[dialogue]]
speaker = "イレーナ"
# 「はぁ……教皇庁ったら、人遣いが荒いんだから。ただでさえ普段の仕事があるのに、用事があるって言って呼び出してくるし……」
line = "「はぁ……教皇庁ったら、人遣いが荒いんだから。ただでさえ普段の仕事があるのに、用事があるって言って呼び出してくるし……」"

[[dialogue]]
speaker = "イレーナ"
# 「ん？　くんくん……いい匂いがするわね。そろそろバレンタインだし、誰かお菓子でも焼いてきたのかしら？」
line = "「ん？　くんくん……いい匂いがするわね。そろそろバレンタインだし、誰かお菓子でも焼いてきたのかしら？」"

[[dialogue]]
speaker = "シャロン"
# 「あっ、イレーナさま！　ちょうどいいところに！」
line = "「あっ、イレーナさま！　ちょうどいいところに！」"

[[dialogue]]
speaker = "イレーナ"
# 「ああ、やっぱりシャロンだったの」
line = "「ああ、やっぱりシャロンだったの」"

[[dialogue]]
speaker = "イレーナ"
# 「甘くていい匂い……それにお酒の香りも少しするような……またカヌレでも焼いてきたの？」
line = "「甘くていい匂い……それにお酒の香りも少しするような……またカヌレでも焼いてきたの？」"

[[dialogue]]
speaker = "シャロン"
# 「はい、ご名答ですっ。試食して感想を聞かせてもらえませんか？」
line = "「はい、ご名答ですっ。試食して感想を聞かせてもらえませんか？」"

[[dialogue]]
speaker = "イレーナ"
# 「試食？　カヌレなら今まで何度も作ってきてるでしょ。まぁ、もらえるならもらうけど……あ、まだちょっとぬくいじゃない」
line = "「試食？　カヌレなら今まで何度も作ってきてるでしょ。まぁ、もらえるならもらうけど……あ、まだちょっとぬくいじゃない」"

[[dialogue]]
speaker = "シャロン"
# 「はい、先ほど焼いてきましたので。少し冷めて外側がカリッと、中がモチッとして、今が一番美味しい時です！」
line = "「はい、先ほど焼いてきましたので。少し冷めて外側がカリッと、中がモチッとして、今が一番美味しい時です！」"

[[dialogue]]
speaker = "イレーナ"
# 「へぇ、それは期待できるわね。それじゃ……あんっ」
line = "「へぇ、それは期待できるわね。それじゃ……あんっ」"

[[dialogue]]
speaker = "イレーナ"
# 「うん、確かにカリモチで美味し……ん？　チョコの味がするわね」
line = "「うん、確かにカリモチで美味し……ん？　チョコの味がするわね」"

[[dialogue]]
speaker = "シャロン"
# 「はいっ！　バレンタイン用にチョコカヌレを作ってみたんですっ」
line = "「はいっ！　バレンタイン用にチョコカヌレを作ってみたんですっ」"

[[dialogue]]
speaker = "イレーナ"
# 「見た目じゃわからなかったけど、これはこれで美味しいわね」
line = "「見た目じゃわからなかったけど、これはこれで美味しいわね」"

[[dialogue]]
speaker = "シャロン"
# 「ありがとうございます！　そう言っていただけて嬉しいです！」
line = "「ありがとうございます！　そう言っていただけて嬉しいです！」"

[[dialogue]]
speaker = "シャロン"
# 「ですがもっとこう……見た目でもバレンタインらしい特別感を出せたらいいなと思っていまして……」
line = "「ですがもっとこう……見た目でもバレンタインらしい特別感を出せたらいいなと思っていまして……」"

[[dialogue]]
speaker = "イレーナ"
# 「そうねぇ、カヌレの形は特徴的だけど……どうせならもう一工夫、バレンタインならではの華やかさが欲しいとこよね」
line = "「そうねぇ、カヌレの形は特徴的だけど……どうせならもう一工夫、バレンタインならではの華やかさが欲しいとこよね」"

[[dialogue]]
speaker = "シャロン"
# 「そうなんですっ！　形を変えちゃうとカヌレじゃなくなっちゃいますし、困りどころなんです」
line = "「そうなんですっ！　形を変えちゃうとカヌレじゃなくなっちゃいますし、困りどころなんです」"

[[dialogue]]
speaker = "イレーナ"
# 「ふーん、なるほどねぇ……。で？　このチョコカヌレ、どうしたのよ？　どっかで配るの？」
line = "「ふーん、なるほどねぇ……。で？　このチョコカヌレ、どうしたのよ？　どっかで配るの？」"

[[dialogue]]
speaker = "シャロン"
# 「それはもちろん、女神様の愛をあまねく届かせるために……」
line = "「それはもちろん、女神様の愛をあまねく届かせるために……」"

[[dialogue]]
speaker = "シャロン"
# 「そして私自身の感謝の気持ちを込めて、会長さまにお渡ししたいのです」
line = "「そして私自身の感謝の気持ちを込めて、会長さまにお渡ししたいのです」"

[[dialogue]]
speaker = "イレーナ"
# 「……へえー？　あいつにー、バレンタインのプレゼントねー。あげたら、すっごく喜ぶんじゃない？」
line = "「……へえー？　あいつにー、バレンタインのプレゼントねー。あげたら、すっごく喜ぶんじゃない？」"

[[dialogue]]
speaker = "シャロン"
# 「えへへ、喜んでもらえたら嬉しいんですけど……イレーナさまは会長さまにバレンタインのプレゼントをしないんですか？」
line = "「えへへ、喜んでもらえたら嬉しいんですけど……イレーナさまは会長さまにバレンタインのプレゼントをしないんですか？」"

[[dialogue]]
speaker = "イレーナ"
# 「な、なんで、あたしがあいつにバレンタインのチョコをあげなきゃいけないの！？」
line = "「な、なんで、あたしがあいつにバレンタインのチョコをあげなきゃいけないの！？」"

[[dialogue]]
speaker = "シャロン"
# 「日頃の感謝をお菓子に込めれば、普段は伝えにくいことも素直に言えると思いますよ♪」
line = "「日頃の感謝をお菓子に込めれば、普段は伝えにくいことも素直に言えると思いますよ♪」"

[[dialogue]]
speaker = "イレーナ"
# 「別に伝えにくいことなんて……っていうか、素直とかそういう問題じゃないし。あたしは神官なんだから、バレンタインなんかに乗っかるわけないでしょ」
line = "「別に伝えにくいことなんて……っていうか、素直とかそういう問題じゃないし。あたしは神官なんだから、バレンタインなんかに乗っかるわけないでしょ」"

[[dialogue]]
speaker = "シャロン"
# 「えっ！？　神官ってバレンタインをしては駄目なのですかっ！？」
line = "「えっ！？　神官ってバレンタインをしては駄目なのですかっ！？」"

[[dialogue]]
speaker = "イレーナ"
# 「そりゃそうでしょ。あたしたち神職ってのは、世俗から距離を取って貞淑でないといけないんだから」
line = "「そりゃそうでしょ。あたしたち神職ってのは、世俗から距離を取って貞淑でないといけないんだから」"

[[dialogue]]
speaker = "イレーナ"
# 「ボランティアでお菓子を配るくらいならともかく、特定の誰かに入れ込んだりするのはダメ」
line = "「ボランティアでお菓子を配るくらいならともかく、特定の誰かに入れ込んだりするのはダメ」"

[[dialogue]]
speaker = "シャロン"
# 「そうなのですか……」
line = "「そうなのですか……」"

[[dialogue]]
speaker = "イレーナ"
# 「それに義理であげたチョコを本命と勘違いされて、本気で迫られでもしたら困るでしょ？　どこかの会長とかに」
line = "「それに義理であげたチョコを本命と勘違いされて、本気で迫られでもしたら困るでしょ？　どこかの会長とかに」"

[[dialogue]]
speaker = "シャロン"
# 「本気で、迫られ……そ、そうですね、心の準備ができていないと、ちょっと困っちゃうかもしれませんね、えへへ<emoji=heart04>」
line = "「本気で、迫られ……そ、そうですね、心の準備ができていないと、ちょっと困っちゃうかもしれませんね、えへへ<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
# 「いや、そういう意味じゃないんだけど……」
line = "「いや、そういう意味じゃないんだけど……」"

[[dialogue]]
speaker = "イレーナ"
# 「あ、そろそろ時間だわ。教皇庁から呼び出されてるから、ちょっと行ってくるわね」
line = "「あ、そろそろ時間だわ。教皇庁から呼び出されてるから、ちょっと行ってくるわね」"

[[dialogue]]
speaker = "シャロン"
# 「はいっ、もっと改良を重ねますので、次も感想を聞かせてくださいねっ」
line = "「はいっ、もっと改良を重ねますので、次も感想を聞かせてくださいねっ」"

[[dialogue]]
speaker = "イレーナ"
# 「はぁ……シャロンのあの素直さは危なっかしいというか……ちょっとだけ羨ましいというか……」
line = "「はぁ……シャロンのあの素直さは危なっかしいというか……ちょっとだけ羨ましいというか……」"

[[dialogue]]
speaker = "イレーナ"
# 「いやいや、羨ましくなんてないから。あたしこれでも神官だし、バレンタインのチョコとか関係ないんだから」
line = "「いやいや、羨ましくなんてないから。あたしこれでも神官だし、バレンタインのチョコとか関係ないんだから」"

[[dialogue]]
speaker = "イレーナ"
# 「だけど教皇庁の呼び出しって、どういう要件かしら？　面倒なことにならないといいけど……」
line = "「だけど教皇庁の呼び出しって、どういう要件かしら？　面倒なことにならないといいけど……」"

[[dialogue]]
speaker = "unk"
# イレーナは教皇庁の建物に入ると、先任の神官に呼び出しの理由を尋ねる。
line = "イレーナは教皇庁の建物に入ると、先任の神官に呼び出しの理由を尋ねる。"

[[dialogue]]
speaker = "イレーナ"
# 「神官イレーナ、ただいま戻りました。私に特別な用件とは何でしょうか？」
line = "「神官イレーナ、ただいま戻りました。私に特別な用件とは何でしょうか？」"

[[dialogue]]
speaker = "イレーナ"
# 「……え？　バレンタインデーについて？」
line = "「……え？　バレンタインデーについて？」"

[[dialogue]]
speaker = "イレーナ"
# 「バレンタインの贈り物をし合うのは、あくまで世俗の行事」
line = "「バレンタインの贈り物をし合うのは、あくまで世俗の行事」"

[[dialogue]]
speaker = "イレーナ"
# 「愛する人を想う心は尊いものではありますが、流星教としては貞淑を守り、浮ついたりしないよう──」
line = "「愛する人を想う心は尊いものではありますが、流星教としては貞淑を守り、浮ついたりしないよう──」"

[[dialogue]]
speaker = "イレーナ"
# 「え、そうではなくて？　ふむふむ……ふむ、ふむ……えっ？」
line = "「え、そうではなくて？　ふむふむ……ふむ、ふむ……えっ？」"

[[dialogue]]
speaker = "イレーナ"
# 「えええ～～～～～っ！？」
line = "「えええ～～～～～っ！？」"
