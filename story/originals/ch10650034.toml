[[dialogue]]
speaker = "unk"
# 第４話,バレンタインの贈り物,P
line = "第４話,バレンタインの贈り物,P"

[[dialogue]]
speaker = "unk"
# バレンタインの時期だけあって、ここ最近、周囲の女性からチョコをもらうことが多い。
line = "バレンタインの時期だけあって、ここ最近、周囲の女性からチョコをもらうことが多い。"

[[dialogue]]
speaker = "unk"
# 今日もチョコを紙袋に入れながら下校していたのだが……
line = "今日もチョコを紙袋に入れながら下校していたのだが……"

[[dialogue]]
speaker = "イレーナ"
# 「ふーん……」
line = "「ふーん……」"

[[dialogue]]
speaker = "unk"
# イレーナ！？
line = "イレーナ！？"

[[dialogue]]
speaker = "イレーナ"
# 「別にチョコを隠さなくていいわよ。どうせあんたがたくさんチョコもらうのはわかってたし」
line = "「別にチョコを隠さなくていいわよ。どうせあんたがたくさんチョコもらうのはわかってたし」"

[[dialogue]]
speaker = "イレーナ"
# 「いやー、いろんな女の子と結婚式も挙げてるし、罪な男ねー」
line = "「いやー、いろんな女の子と結婚式も挙げてるし、罪な男ねー」"

[[dialogue]]
speaker = "イレーナ"
# 「あれはウェディング戦闘服を解除するためだって？　そんなの知ってるわよ。でも１人の女としては、どうかと思わなくもないのよねー」
line = "「あれはウェディング戦闘服を解除するためだって？　そんなの知ってるわよ。でも１人の女としては、どうかと思わなくもないのよねー」"

[[dialogue]]
speaker = "イレーナ"
# 「あんなことしてたら、いつか誰かに後ろからブスッて刺されるんじゃない？　もしそうなっても、あたしが治してあげるかわかんないわよ」
line = "「あんなことしてたら、いつか誰かに後ろからブスッて刺されるんじゃない？　もしそうなっても、あたしが治してあげるかわかんないわよ」"

[[dialogue]]
speaker = "イレーナ"
# 「じー……」
line = "「じー……」"

[[dialogue]]
speaker = "unk"
# 次の週末空いてる？
line = "次の週末空いてる？"

[[dialogue]]
speaker = "イレーナ"
# 「え……？　今それ聞く？　いや別に空いてるけど……」
line = "「え……？　今それ聞く？　いや別に空いてるけど……」"

[[dialogue]]
speaker = "イレーナ"
# 「一緒に出かけるの？　うん……いいけど……」
line = "「一緒に出かけるの？　うん……いいけど……」"

[[dialogue]]
speaker = "イレーナ"
# 「……来たわよ。何するつもり？　２人で映画でも見に行こうっていうの？　言っとくけど、怖いのは嫌いだからね」
line = "「……来たわよ。何するつもり？　２人で映画でも見に行こうっていうの？　言っとくけど、怖いのは嫌いだからね」"

[[dialogue]]
speaker = "イレーナ"
# 「え……？　この辺の手芸用品店で、品揃えがいいところを調べてきた……？」
line = "「え……？　この辺の手芸用品店で、品揃えがいいところを調べてきた……？」"

[[dialogue]]
speaker = "イレーナ"
# 「……あたしの趣味、覚えててくれたんだ」
line = "「……あたしの趣味、覚えててくれたんだ」"

[[dialogue]]
speaker = "イレーナ"
# 「手芸店ならそんなに派手じゃないし、神官が出入りしてても問題ないでしょ。……うん、行くわ」
line = "「手芸店ならそんなに派手じゃないし、神官が出入りしてても問題ないでしょ。……うん、行くわ」"

[[dialogue]]
speaker = "unk"
# 俺の提案通り、手芸品店に向かって歩き出す。
line = "俺の提案通り、手芸品店に向かって歩き出す。"

[[dialogue]]
speaker = "unk"
# その道中、距離を詰めてイレーナのすぐ隣を歩く。
line = "その道中、距離を詰めてイレーナのすぐ隣を歩く。"

[[dialogue]]
speaker = "イレーナ"
# 「……近いんだけど。いや、別に、離れてくれって意味じゃないけど」
line = "「……近いんだけど。いや、別に、離れてくれって意味じゃないけど」"

[[dialogue]]
speaker = "イレーナ"
# 「どうして手芸が好きなのかって？」
line = "「どうして手芸が好きなのかって？」"

[[dialogue]]
speaker = "イレーナ"
# 「ん～……忙しい時に掃除が捗る的な？　仕事やら何やらで頭がごちゃごちゃしてる時に、１人でちまちま手を動かすのが楽しいっていうか……」
line = "「ん～……忙しい時に掃除が捗る的な？　仕事やら何やらで頭がごちゃごちゃしてる時に、１人でちまちま手を動かすのが楽しいっていうか……」"

[[dialogue]]
speaker = "イレーナ"
# 「あと可愛いのができると嬉しいし……針とか糸とか見るの楽しいし……」
line = "「あと可愛いのができると嬉しいし……針とか糸とか見るの楽しいし……」"

[[dialogue]]
speaker = "イレーナ"
# 「それと……あげたら喜んでくれる人がいるから……」
line = "「それと……あげたら喜んでくれる人がいるから……」"

[[dialogue]]
speaker = "イレーナ"
# 「今度ポーチ作るんだけど、色は何色がいいと思う？　別に人にあげるって決まったわけじゃないけど」
line = "「今度ポーチ作るんだけど、色は何色がいいと思う？　別に人にあげるって決まったわけじゃないけど」"

[[dialogue]]
speaker = "イレーナ"
# 「……ふうん、青ね。まぁ参考にさせてもらうわ」
line = "「……ふうん、青ね。まぁ参考にさせてもらうわ」"

[[dialogue]]
speaker = "イレーナ"
# 「あんたが買い物に誘ったんだから、荷物持ちくらいしなさいよね」
line = "「あんたが買い物に誘ったんだから、荷物持ちくらいしなさいよね」"

[[dialogue]]
speaker = "unk"
# 手芸用品を買った後は、学生には背伸びしたレストランで食事をして、イレーナを教皇庁の宿舎まで送っていく。
line = "手芸用品を買った後は、学生には背伸びしたレストランで食事をして、イレーナを教皇庁の宿舎まで送っていく。"

[[dialogue]]
speaker = "イレーナ"
# 「さっきのとこ、いいお店だったわね。個室だったから周りに気を遣わなくてよかったし」
line = "「さっきのとこ、いいお店だったわね。個室だったから周りに気を遣わなくてよかったし」"

[[dialogue]]
speaker = "イレーナ"
# 「……で、どうしたのよ、その真っ赤なバラの花束は。ここに来るまでに買ってたけど」
line = "「……で、どうしたのよ、その真っ赤なバラの花束は。ここに来るまでに買ってたけど」"

[[dialogue]]
speaker = "unk"
# 俺からイレーナにバレンタインのプレゼント
line = "俺からイレーナにバレンタインのプレゼント"

[[dialogue]]
speaker = "イレーナ"
# 「……ベタベタね」
line = "「……ベタベタね」"

[[dialogue]]
speaker = "unk"
# イタリア流ならこれだって聞いたから
line = "イタリア流ならこれだって聞いたから"

[[dialogue]]
speaker = "イレーナ"
# 「……っ」
line = "「……っ」"

[[dialogue]]
speaker = "イレーナ"
# 「じゃあ、今日のはバレンタインのデートってわけね。急に出かけようって言った意味がようやくわかったわ」
line = "「じゃあ、今日のはバレンタインのデートってわけね。急に出かけようって言った意味がようやくわかったわ」"

[[dialogue]]
speaker = "unk"
# 好きだよ、イレーナ
line = "好きだよ、イレーナ"

[[dialogue]]
speaker = "イレーナ"
# 「──！！」
line = "「──！！」"

[[dialogue]]
speaker = "unk"
# イレーナが素直じゃなくて、俺も素直になれなかった。
line = "イレーナが素直じゃなくて、俺も素直になれなかった。"

[[dialogue]]
speaker = "unk"
# だからこのバレンタインに、改めて気持ちを伝える。
line = "だからこのバレンタインに、改めて気持ちを伝える。"

[[dialogue]]
speaker = "unk"
# 恋人になって、イレーナ
line = "恋人になって、イレーナ"

[[dialogue]]
speaker = "イレーナ"
# 「……あたしは流星教皇庁の神官。聖女なんて呼ばれて、真面目で信心深い聖職者だって思われてる」
line = "「……あたしは流星教皇庁の神官。聖女なんて呼ばれて、真面目で信心深い聖職者だって思われてる」"

[[dialogue]]
speaker = "イレーナ"
# 「だから清貧で、貞淑でいないといけないんだけど──」
line = "「だから清貧で、貞淑でいないといけないんだけど──」"

[[dialogue]]
speaker = "イレーナ"
# 「バレンタインのチョコ、あげる」
line = "「バレンタインのチョコ、あげる」"

[[dialogue]]
speaker = "イレーナ"
# 「これはお世話になってるとかじゃなくて、ちゃんと好きのチョコだから。あたしが手作りしたやつ」
line = "「これはお世話になってるとかじゃなくて、ちゃんと好きのチョコだから。あたしが手作りしたやつ」"

[[dialogue]]
speaker = "イレーナ"
# 「あたしもあんたが好き」
line = "「あたしもあんたが好き」"

[[dialogue]]
speaker = "イレーナ"
# 「だから……あんたの恋人になってあげる」
line = "「だから……あんたの恋人になってあげる」"

[[dialogue]]
speaker = "unk"
# ありがとう
line = "ありがとう"

[[dialogue]]
speaker = "イレーナ"
# 「別にお礼言うことじゃないでしょうに。お互い様なんだから」
line = "「別にお礼言うことじゃないでしょうに。お互い様なんだから」"

[[dialogue]]
speaker = "イレーナ"
# 「はい、チョコ。ちゃんと受け取って」
line = "「はい、チョコ。ちゃんと受け取って」"

[[dialogue]]
speaker = "unk"
# 花束とチョコを交換するように贈り合い、そして──
line = "花束とチョコを交換するように贈り合い、そして──"

[[dialogue]]
speaker = "イレーナ"
# 「ん……ちゅっ」
line = "「ん……ちゅっ」"

[[dialogue]]
speaker = "unk"
# 明かりに照らされる広場の隅で、そっと口付けを交わした。
line = "明かりに照らされる広場の隅で、そっと口付けを交わした。"
