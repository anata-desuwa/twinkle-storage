[[dialogue]]
speaker = "unk"
# 第３話,チナの地元,P
line = "第３話,チナの地元,P"

[[dialogue]]
speaker = "unk"
# 今日はチナとともに繁華街に来ていた。
line = "今日はチナとともに繁華街に来ていた。"

[[dialogue]]
speaker = "unk"
# チナだけで外出を許すことはできないので、俺が監視という名目でついている。
line = "チナだけで外出を許すことはできないので、俺が監視という名目でついている。"

[[dialogue]]
speaker = "チナ"
# 「別にあんたが監視じゃなくてもよかっただろ。星徒会長なんだから忙しいんじゃないのか？」
line = "「別にあんたが監視じゃなくてもよかっただろ。星徒会長なんだから忙しいんじゃないのか？」"

[[dialogue]]
speaker = "チナ"
# 「あんたがアタシと出かけたかった……？　あっそ。そりゃ物好きなことで」
line = "「あんたがアタシと出かけたかった……？　あっそ。そりゃ物好きなことで」"

[[dialogue]]
speaker = "チナ"
# 「……外出の目的？　別にねーよ。ずっと同じ部屋にいると気が滅入るから、外の空気を吸いたいだけだ」
line = "「……外出の目的？　別にねーよ。ずっと同じ部屋にいると気が滅入るから、外の空気を吸いたいだけだ」"

[[dialogue]]
speaker = "チナ"
# 「しいて言うなら──あった！　<ruby=ローローハンテン>肉肉飯店</ruby>だ！」
line = "「しいて言うなら──あった！　<ruby>肉肉飯店<rt>ローローハンテン</rt></ruby>だ！」"

[[dialogue]]
speaker = "unk"
# 肉肉飯店はこの辺りで有名な、とても美味しい肉まんのお店だ。
line = "肉肉飯店はこの辺りで有名な、とても美味しい肉まんのお店だ。"

[[dialogue]]
speaker = "unk"
# 俺もこの近くでアルバイトしたことがあるので、何度か近くを通ったことがある。
line = "俺もこの近くでアルバイトしたことがあるので、何度か近くを通ったことがある。"

[[dialogue]]
speaker = "チナ"
# 「ん？　アタシの記憶より店がでかくなってるような……？　アタシの襲撃で壊れた後、煌嶺が金を出して改装した？」
line = "「ん？　アタシの記憶より店がでかくなってるような……？　アタシの襲撃で壊れた後、煌嶺が金を出して改装した？」"

[[dialogue]]
speaker = "チナ"
# 「そりゃ悪かったな……。でもそんな金をポンと出せるってことは、煌嶺は相当な金持ちなんだな」
line = "「そりゃ悪かったな……。でもそんな金をポンと出せるってことは、煌嶺は相当な金持ちなんだな」"

[[dialogue]]
speaker = "チナ"
# 「そんなやつに目を付けられるなんて、肉肉飯店も有名になったもんだ」
line = "「そんなやつに目を付けられるなんて、肉肉飯店も有名になったもんだ」"

[[dialogue]]
speaker = "チナ"
# 「魔王は食べたことあるか知らないが、肉肉飯店の肉まんは最高なんだぞ。皮はふかふかで、中の肉はジューシーで、本当にうまいんだ」
line = "「魔王は食べたことあるか知らないが、肉肉飯店の肉まんは最高なんだぞ。皮はふかふかで、中の肉はジューシーで、本当にうまいんだ」"

[[dialogue]]
speaker = "チナ"
# 「父さんが買ってきてくれた時は、ちょっとお祭り気分だったな」
line = "「父さんが買ってきてくれた時は、ちょっとお祭り気分だったな」"

[[dialogue]]
speaker = "unk"
# せっかくだから買ってくるよ
line = "せっかくだから買ってくるよ"

[[dialogue]]
speaker = "チナ"
# 「いいけど、けっこう並ぶぞ？　朝イチとかじゃないと、１時間くらい並ぶ時もあるし」
line = "「いいけど、けっこう並ぶぞ？　朝イチとかじゃないと、１時間くらい並ぶ時もあるし」"

[[dialogue]]
speaker = "チナ"
# 「１人で並ぶから大丈夫……？　オイ待て、あんたはアタシの監視で来てるんだろうが。置いてってどうする」
line = "「１人で並ぶから大丈夫……？　オイ待て、あんたはアタシの監視で来てるんだろうが。置いてってどうする」"

[[dialogue]]
speaker = "チナ"
# 「仕方ないな。アタシも一緒に並ぶよ」
line = "「仕方ないな。アタシも一緒に並ぶよ」"

[[dialogue]]
speaker = "unk"
# ありがとう！
line = "ありがとう！"

[[dialogue]]
speaker = "チナ"
# 「お礼言うとこじゃないだろ……変なやつ」
line = "「お礼言うとこじゃないだろ……変なやつ」"

[[dialogue]]
speaker = "unk"
# それからきっかり１時間並んで、肉肉飯店の肉まんをゲットした。
line = "それからきっかり１時間並んで、肉肉飯店の肉まんをゲットした。"

[[dialogue]]
speaker = "チナ"
# 「アタシの分も買ってもらってよかったのか？　……一緒に並んでくれたお礼？　だから礼はいいって言ってんのに」
line = "「アタシの分も買ってもらってよかったのか？　……一緒に並んでくれたお礼？　だから礼はいいって言ってんのに」"

[[dialogue]]
speaker = "チナ"
# 「まぁいいや、それなら遠慮なく食うぞ。いただきまーす」
line = "「まぁいいや、それなら遠慮なく食うぞ。いただきまーす」"

[[dialogue]]
speaker = "unk"
# ！　めちゃくちゃ美味しい！
line = "！　めちゃくちゃ美味しい！"

[[dialogue]]
speaker = "チナ"
# 「ん～～っ♪　やっぱり肉肉飯店の肉まんは最高だ！」
line = "「ん～～っ♪　やっぱり肉肉飯店の肉まんは最高だ！」"

[[dialogue]]
speaker = "チナ"
# 「あんたのＤＩＳＣ、鳴ってるぞ。モンスターか？」
line = "「あんたのＤＩＳＣ、鳴ってるぞ。モンスターか？」"

[[dialogue]]
speaker = "unk"
# 俺、行ってくるよ
line = "俺、行ってくるよ"

[[dialogue]]
speaker = "チナ"
# 「いや、あんたは監視だからアタシを置いていっちゃダメだろ。アタシが逃げたらどうするんだよ」
line = "「いや、あんたは監視だからアタシを置いていっちゃダメだろ。アタシが逃げたらどうするんだよ」"

[[dialogue]]
speaker = "チナ"
# 「チナはそんなことしないから大丈夫……？　なんでそんなこと言えるんだよ……はぁ、好きにしろ」
line = "「チナはそんなことしないから大丈夫……？　なんでそんなこと言えるんだよ……はぁ、好きにしろ」"

[[dialogue]]
speaker = "チナ"
# （アルタイルのリクリエを止めれば、デネブのリクリエが進む。デネブのリクリエを止めれば、アルタイルのリクリエが進む。ルヴィにそう言われた）
line = "（アルタイルのリクリエを止めれば、デネブのリクリエが進む。デネブのリクリエを止めれば、アルタイルのリクリエが進む。ルヴィにそう言われた）"

[[dialogue]]
speaker = "チナ"
# （デネブのリクリエが進む可能性がある以上、アタシはアルタイルを守ることはできない）
line = "（デネブのリクリエが進む可能性がある以上、アタシはアルタイルを守ることはできない）"

[[dialogue]]
speaker = "モンスター"
# 「イー！」
line = "「イー！」"

[[dialogue]]
speaker = "チナ"
# 「つっても、モンスターがアタシに向かってくるんだから仕方ないよな！」
line = "「つっても、モンスターがアタシに向かってくるんだから仕方ないよな！」"

[[dialogue]]
speaker = "チナ"
# 「これは正当防衛だ！　消えろモンスター！」
line = "「これは正当防衛だ！　消えろモンスター！」"

[[dialogue]]
speaker = "モンスター"
# 「イー！？」
line = "「イー！？」"

[[dialogue]]
speaker = "unk"
# チナの参戦のおかげで、あっという間にモンスターを駆逐できた。
line = "チナの参戦のおかげで、あっという間にモンスターを駆逐できた。"

[[dialogue]]
speaker = "unk"
# 俺も周囲の無事を確認して、チナのところに戻る。
line = "俺も周囲の無事を確認して、チナのところに戻る。"

[[dialogue]]
speaker = "チナ"
# 「よう、そっちも終わったのか」
line = "「よう、そっちも終わったのか」"

[[dialogue]]
speaker = "チナ"
# 「礼はいらない。アタシは街を守ったんじゃなくて、モンスターが襲ってきたから自分の身を守っただけだ」
line = "「礼はいらない。アタシは街を守ったんじゃなくて、モンスターが襲ってきたから自分の身を守っただけだ」"

[[dialogue]]
speaker = "チナ"
# 「んじゃ、肉まんも食ったしそろそろ帰るか」
line = "「んじゃ、肉まんも食ったしそろそろ帰るか」"

[[dialogue]]
speaker = "unk"
# アルタイルの両親に会っていく？
line = "アルタイルの両親に会っていく？"

[[dialogue]]
speaker = "チナ"
# 「──！」
line = "「──！」"

[[dialogue]]
speaker = "チナ"
# 「そうか。こっちにはうちの親がいるんだな……」
line = "「そうか。こっちにはうちの親がいるんだな……」"

[[dialogue]]
speaker = "チナ"
# 「でもダメだ」
line = "「でもダメだ」"

[[dialogue]]
speaker = "チナ"
# 「アタシはアルタイルを滅ぼそうとしたんだ。それなのに、都合良く会いに行けるか」
line = "「アタシはアルタイルを滅ぼそうとしたんだ。それなのに、都合良く会いに行けるか」"

[[dialogue]]
speaker = "チナ"
# 「それにアタシのせいで、アルタイルのアタシは眠ってる。向こうからしたら、さっさと消えてほしい邪魔者だろ」
line = "「それにアタシのせいで、アルタイルのアタシは眠ってる。向こうからしたら、さっさと消えてほしい邪魔者だろ」"

[[dialogue]]
speaker = "unk"
# そんなことないよ
line = "そんなことないよ"

[[dialogue]]
speaker = "チナ"
# 「はぁ？　どうしてそんなこと言えるんだよ」
line = "「はぁ？　どうしてそんなこと言えるんだよ」"

[[dialogue]]
speaker = "unk"
# だって知っているから。
line = "だって知っているから。"

[[dialogue]]
speaker = "unk"
# 世界を超えて出会った双子のことを。
line = "世界を超えて出会った双子のことを。"

[[dialogue]]
speaker = "unk"
# 平行世界からやってきた娘もいる。
line = "平行世界からやってきた娘もいる。"

[[dialogue]]
speaker = "unk"
# デネブにも母さんがいた。
line = "デネブにも母さんがいた。"

[[dialogue]]
speaker = "unk"
# 確かに生きる世界は違う。この世界にはこの世界の家族がいる。
line = "確かに生きる世界は違う。この世界にはこの世界の家族がいる。"

[[dialogue]]
speaker = "unk"
# それでも、他人だと割り切ることなんてできない。
line = "それでも、他人だと割り切ることなんてできない。"

[[dialogue]]
speaker = "チナ"
# 「……なんだよ、何か言いたそうな顔して。ちょっと寂しそうな顔してるぞ」
line = "「……なんだよ、何か言いたそうな顔して。ちょっと寂しそうな顔してるぞ」"

[[dialogue]]
speaker = "チナ"
# 「会わないって言ったら会わない。アタシがそう決めたんだ」
line = "「会わないって言ったら会わない。アタシがそう決めたんだ」"

[[dialogue]]
speaker = "unk"
# ……そっか
line = "……そっか"

[[dialogue]]
speaker = "チナ"
# 「だから何であんたが寂しそうな顔するんだよ……あーもう。こういう雰囲気ってニガテなんだよな……」
line = "「だから何であんたが寂しそうな顔するんだよ……あーもう。こういう雰囲気ってニガテなんだよな……」"

[[dialogue]]
speaker = "チナ"
# 「よし、気が変わった。とっておきの場所に連れてってやる。路地を入ったところにあるボロいゲームセンターでな、珍しいゲームがたくさんあるんだ」
line = "「よし、気が変わった。とっておきの場所に連れてってやる。路地を入ったところにあるボロいゲームセンターでな、珍しいゲームがたくさんあるんだ」"

[[dialogue]]
speaker = "チナ"
# 「ゲームで勝負だ、魔王！　ボコボコにしてやる！」
line = "「ゲームで勝負だ、魔王！　ボコボコにしてやる！」"

[[dialogue]]
speaker = "unk"
# それから日が暮れるまで、チナとゲーム勝負をしたのだった。
line = "それから日が暮れるまで、チナとゲーム勝負をしたのだった。"
