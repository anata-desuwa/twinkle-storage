[[dialogue]]
speaker = "unk"
# 第４話,『あれ』をせい！,P
line = "第４話,『あれ』をせい！,P"

[[dialogue]]
speaker = "unk"
# 今日も今日とて、俺の家へ遊びに来たクラウディア。
line = "今日も今日とて、俺の家へ遊びに来たクラウディア。"

[[dialogue]]
speaker = "unk"
# 彼女は魔女のお姫様という立場のせいか、会話を『あれ』や『それ』ですませることがよくある。例えば……
line = "彼女は魔女のお姫様という立場のせいか、会話を『あれ』や『それ』ですませることがよくある。例えば……"

[[dialogue]]
speaker = "クラウディア"
# 「お～い、まおー。あれだ、あれをせい～」
line = "「お～い、まおー。あれだ、あれをせい～」"

[[dialogue]]
speaker = "unk"
# お茶を淹れる
line = "お茶を淹れる"

[[dialogue]]
speaker = "unk"
# （……喉が渇いたのかな？）
line = "（……喉が渇いたのかな？）"

[[dialogue]]
speaker = "クラウディア"
# 「お、紅茶か。砂糖とミルクはたっぷり……うむ、入っておるな♪　苦しゅうないぞ」
line = "「お、紅茶か。砂糖とミルクはたっぷり……うむ、入っておるな♪　苦しゅうないぞ」"

[[dialogue]]
speaker = "クラウディア"
# 「──って、そうではない！　茶はありがたいが、余が求めたのはこれではないのだっ」
line = "「──って、そうではない！　茶はありがたいが、余が求めたのはこれではないのだっ」"

[[dialogue]]
speaker = "クラウディア"
# 「ほれ、いつものあれを忘れとるだろうが。わからんのか？」
line = "「ほれ、いつものあれを忘れとるだろうが。わからんのか？」"

[[dialogue]]
speaker = "unk"
# ケーキをどうぞ
line = "ケーキをどうぞ"

[[dialogue]]
speaker = "unk"
# （あっ、お茶請けか）
line = "（あっ、お茶請けか）"

[[dialogue]]
speaker = "クラウディア"
# 「おぉ！　けーきか！　ほう、リノが余のために準備してくれていただと？　では今度、礼を言っておかねばな」
line = "「おぉ！　けーきか！　ほう、リノが余のために準備してくれていただと？　では今度、礼を言っておかねばな」"

[[dialogue]]
speaker = "クラウディア"
# 「基地では宿題を終わらせねば甘味は食えんのだ。いただくぞ！」
line = "「基地では宿題を終わらせねば甘味は食えんのだ。いただくぞ！」"

[[dialogue]]
speaker = "クラウディア"
# 「う～ん、うまいっ<emoji=heart04>　大切に食べねばな。よし、苺は最後に食うとして……」
line = "「う～ん、うまいっ<emoji=heart04>　大切に食べねばな。よし、苺は最後に食うとして……」"

[[dialogue]]
speaker = "クラウディア"
# 「なに？　まだあまっているから持って帰ってよい！？　それはありがたい……！」
line = "「なに？　まだあまっているから持って帰ってよい！？　それはありがたい……！」"

[[dialogue]]
speaker = "クラウディア"
# 「──って、そうではな～～い！　ケーキは大好物だが、余が求めたものと違う！　あれと言ったら、あれだっ！」
line = "「──って、そうではな～～い！　ケーキは大好物だが、余が求めたものと違う！　あれと言ったら、あれだっ！」"

[[dialogue]]
speaker = "unk"
# クラウディアを膝に乗せて抱っこする
line = "クラウディアを膝に乗せて抱っこする"

[[dialogue]]
speaker = "unk"
# （背もたれになればいいのかな……？）
line = "（背もたれになればいいのかな……？）"

[[dialogue]]
speaker = "クラウディア"
# 「うむうむ♪　余はソファに座るより、お前の膝上の方が落ち着くのだ」
line = "「うむうむ♪　余はソファに座るより、お前の膝上の方が落ち着くのだ」"

[[dialogue]]
speaker = "クラウディア"
# 「お、何だ？　頭を撫でたいのか。よかろう、ナデナデするがよい！」
line = "「お、何だ？　頭を撫でたいのか。よかろう、ナデナデするがよい！」"

[[dialogue]]
speaker = "クラウディア"
# 「うむ……うむうむ……心地よいぞ、まおー<emoji=heart04>」
line = "「うむ……うむうむ……心地よいぞ、まおー<emoji=heart04>」"

[[dialogue]]
speaker = "クラウディア"
# 「お前、撫でるのがうまいな。よし、角も触ってよいぞ、特別に許そう！」
line = "「お前、撫でるのがうまいな。よし、角も触ってよいぞ、特別に許そう！」"

[[dialogue]]
speaker = "クラウディア"
# 「って、そうではないのだ～～～……！！　この朴念仁め、なぜわからんのだ……！」
line = "「って、そうではないのだ～～～……！！　この朴念仁め、なぜわからんのだ……！」"

[[dialogue]]
speaker = "クラウディア"
# 「余は……お、お前にキスをせいと言ったのだ。あれをしろと言ったらすぐに察さぬか、馬鹿者……」
line = "「余は……お、お前にキスをせいと言ったのだ。あれをしろと言ったらすぐに察さぬか、馬鹿者……」"

[[dialogue]]
speaker = "unk"
# 抱き寄せてキスをする
line = "抱き寄せてキスをする"

[[dialogue]]
speaker = "unk"
# 鈍感でごめん……
line = "鈍感でごめん……"

[[dialogue]]
speaker = "クラウディア"
# 「んぅ、ちゅっ……ちゅ、ちゅぅっ……んちゅ……<emoji=heart04>」
line = "「んぅ、ちゅっ……ちゅ、ちゅぅっ……んちゅ……<emoji=heart04>」"

[[dialogue]]
speaker = "クラウディア"
# 「ぷぁ……うん、これだ。これをせいと言ったのだ。よいか、次からはちゃんとすぐに察して、キスをするのだぞ？」
line = "「ぷぁ……うん、これだ。これをせいと言ったのだ。よいか、次からはちゃんとすぐに察して、キスをするのだぞ？」"

[[dialogue]]
speaker = "クラウディア"
# 「──待て。まだだ。無駄にオアズケされたからな、余は満足しとらん。よいと言うまでキスをせんか」
line = "「──待て。まだだ。無駄にオアズケされたからな、余は満足しとらん。よいと言うまでキスをせんか」"

[[dialogue]]
speaker = "クラウディア"
# 「んちゅっ、ちゅぅーっ……ん、ちゅっ<emoji=heart04>　ちゅぅ<emoji=heart04>　まおー……好きだぞ……ちゅ、んちゅぅ……ちゅっ<emoji=heart04>」
line = "「んちゅっ、ちゅぅーっ……ん、ちゅっ<emoji=heart04>　ちゅぅ<emoji=heart04>　まおー……好きだぞ……ちゅ、んちゅぅ……ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 膝上に乗せたクラウディアを優しく抱きしめながら、俺はキスを続けた──
line = "膝上に乗せたクラウディアを優しく抱きしめながら、俺はキスを続けた──"

[[dialogue]]
speaker = "unk"
# そうして、クラウディアが帰宅する時間になった。
line = "そうして、クラウディアが帰宅する時間になった。"

[[dialogue]]
speaker = "ウェンディ"
# 「クラウディア様。お迎えに上がりました」
line = "「クラウディア様。お迎えに上がりました」"

[[dialogue]]
speaker = "クラウディア"
# 「うむ。ご苦労だな、ウェンディ」
line = "「うむ。ご苦労だな、ウェンディ」"

[[dialogue]]
speaker = "ウェンディ"
# 「ほっ……よかった。今日は普通の格好ですね。これなら無事に報告書を上げられそうです」
line = "「ほっ……よかった。今日は普通の格好ですね。これなら無事に報告書を上げられそうです」"

[[dialogue]]
speaker = "クラウディア"
# 「余だっていつもいつもお前を困らせたりせんわ。ではな、魔王」
line = "「余だっていつもいつもお前を困らせたりせんわ。ではな、魔王」"

[[dialogue]]
speaker = "クラウディア"
# 「おっと、そうだ。あれを忘れておったわ。魔王よ、あれを頼む」
line = "「おっと、そうだ。あれを忘れておったわ。魔王よ、あれを頼む」"

[[dialogue]]
speaker = "unk"
# 今ここで……！？
line = "今ここで……！？"

[[dialogue]]
speaker = "unk"
# え……あれをやるの！？
line = "え……あれをやるの！？"

[[dialogue]]
speaker = "ウェンディ"
# 「……どうしたんですか、会長さん。そんなに慌てて」
line = "「……どうしたんですか、会長さん。そんなに慌てて」"

[[dialogue]]
speaker = "クラウディア"
# 「同じことを二度言わせるでない。あれがなければ帰れんだろうが。ほれ、早う！」
line = "「同じことを二度言わせるでない。あれがなければ帰れんだろうが。ほれ、早う！」"

[[dialogue]]
speaker = "unk"
# クラウディアにキスをする
line = "クラウディアにキスをする"

[[dialogue]]
speaker = "unk"
# （ウェンディがいるけど……）
line = "（ウェンディがいるけど……）"

[[dialogue]]
speaker = "クラウディア"
# 「んちゅっ……！？」
line = "「んちゅっ……！？」"

[[dialogue]]
speaker = "ウェンディ"
# 「いきなり何をしているんですかーーー！？」
line = "「いきなり何をしているんですかーーー！？」"

[[dialogue]]
speaker = "クラウディア"
# 「ばばば、馬鹿者っ！　人前でキスするやつがあるか！　ていうかさっきまで散々したではないかっ！　まだし足りんのか！？」
line = "「ばばば、馬鹿者っ！　人前でキスするやつがあるか！　ていうかさっきまで散々したではないかっ！　まだし足りんのか！？」"

[[dialogue]]
speaker = "ウェンディ"
# 「散々していたんですか！？　やめてください、聞きたくないです！！」
line = "「散々していたんですか！？　やめてください、聞きたくないです！！」"

[[dialogue]]
speaker = "クラウディア"
# 「余が言ったのはけーきだ、あまったものを持って帰ってよいと言っていたではないか！？」
line = "「余が言ったのはけーきだ、あまったものを持って帰ってよいと言っていたではないか！？」"

[[dialogue]]
speaker = "クラウディア"
# 「なにぃ、お別れのキスを命じられたと思っただと……！？　む──？　そう言われてみると、確かにアリかもしれんな……」
line = "「なにぃ、お別れのキスを命じられたと思っただと……！？　む──？　そう言われてみると、確かにアリかもしれんな……」"

[[dialogue]]
speaker = "ウェンディ"
# 「無しですよ！？　また報告書に書けないことが増えるじゃないですか！？」
line = "「無しですよ！？　また報告書に書けないことが増えるじゃないですか！？」"

[[dialogue]]
speaker = "クラウディア"
# 「よし、魔王。けーきを持ってこい。その後、もう一度お別れのキスをするのだ。さっきは不意打ちで楽しめなんだからな<emoji=heart04>」
line = "「よし、魔王。けーきを持ってこい。その後、もう一度お別れのキスをするのだ。さっきは不意打ちで楽しめなんだからな<emoji=heart04>」"

[[dialogue]]
speaker = "ウェンディ"
# 「却下ですーーー！！」
line = "「却下ですーーー！！」"

[[dialogue]]
speaker = "unk"
# ネビュラの姫であるクラウディアとの交際は、大変なことも多いけれど、今のところ順調だと思う。
line = "ネビュラの姫であるクラウディアとの交際は、大変なことも多いけれど、今のところ順調だと思う。"

[[dialogue]]
speaker = "unk"
# 鈍感な俺なりに、これからも彼女に尽くしていこうと思うのだった。
line = "鈍感な俺なりに、これからも彼女に尽くしていこうと思うのだった。"

[[dialogue]]
speaker = "unk"
# それと、ウェンディ。いつも苦労をかけて本当にごめんなさい──
line = "それと、ウェンディ。いつも苦労をかけて本当にごめんなさい──"
