[[dialogue]]
speaker = "unk"
# 第１話,仮面に封じられた力,P
line = "第１話,仮面に封じられた力,P"

[[dialogue]]
speaker = "unk"
# これは私──アニュラス・セイファートの恋人である緋宮クロトが、魔界へと旅立ってからしばらくが経過した頃のこと。
line = "これは私──アニュラス・セイファートの恋人である緋宮クロトが、魔界へと旅立ってからしばらくが経過した頃のこと。"

[[dialogue]]
speaker = "unk"
# 後に『フィヴォス流星群』と名付けられる、星騎士とネビュラ、そしてアポロたちリクリエ陣営との決戦直前の出来事となる。
line = "後に『フィヴォス流星群』と名付けられる、星騎士とネビュラ、そしてアポロたちリクリエ陣営との決戦直前の出来事となる。"

[[dialogue]]
speaker = "unk"
# その日、私は不思議な夢を見た──
line = "その日、私は不思議な夢を見た──"

[[dialogue]]
speaker = "アニュラス"
# 「お父、様……？」
line = "「お父、様……？」"

[[dialogue]]
speaker = "unk"
# 行方知れずだったお父様が、黒騎士の鎧をまとって私の前に現れた。
line = "行方知れずだったお父様が、黒騎士の鎧をまとって私の前に現れた。"

[[dialogue]]
speaker = "unk"
# いくら夢とはいえタチが悪い。あのお父様が黒騎士であるわけがないのに。憧れの存在を汚された気がして、夢だというのに私は憤りを隠せなかった。
line = "いくら夢とはいえタチが悪い。あのお父様が黒騎士であるわけがないのに。憧れの存在を汚された気がして、夢だというのに私は憤りを隠せなかった。"

[[dialogue]]
speaker = "unk"
# そんな私に対して、お父様は訥々と喋り始めた──
line = "そんな私に対して、お父様は訥々と喋り始めた──"

[[dialogue]]
speaker = "セイファート"
# 「……アニュラス。このメッセージがお前に届いたということは、私はもうこの世にはいないはずだ」
line = "「……アニュラス。このメッセージがお前に届いたということは、私はもうこの世にはいないはずだ」"

[[dialogue]]
speaker = "アニュラス"
# 「えっ──」
line = "「えっ──」"

[[dialogue]]
speaker = "セイファート"
# 「魔界へ旅立つ前夜……以前、お前に贈った仮面に、特殊な術式を施した。私が死ぬことを鍵として封印が解けるように……」
line = "「魔界へ旅立つ前夜……以前、お前に贈った仮面に、特殊な術式を施した。私が死ぬことを鍵として封印が解けるように……」"

[[dialogue]]
speaker = "アニュラス"
# 「封印……？　し、死ぬことを鍵として……？　な、何を言っているのですか、お父様……！？」
line = "「封印……？　し、死ぬことを鍵として……？　な、何を言っているのですか、お父様……！？」"

[[dialogue]]
speaker = "セイファート"
# 「私は、己の悲願のために……もう止まることはできない。が──敗れた時のことを考えて、このメッセージを遺す」
line = "「私は、己の悲願のために……もう止まることはできない。が──敗れた時のことを考えて、このメッセージを遺す」"

[[dialogue]]
speaker = "unk"
# 私の声はお父様には届かない。まるで記録してある映像が再生されるかのように、お父様の言葉は止まらなかった。
line = "私の声はお父様には届かない。まるで記録してある映像が再生されるかのように、お父様の言葉は止まらなかった。"

[[dialogue]]
speaker = "セイファート"
# 「──私は道を誤った」
line = "「──私は道を誤った」"

[[dialogue]]
speaker = "セイファート"
# 「妻を優先するあまり、娘を蔑ろにした愚かな父だ……軽蔑してほしい」
line = "「妻を優先するあまり、娘を蔑ろにした愚かな父だ……軽蔑してほしい」"

[[dialogue]]
speaker = "アニュラス"
# 「そんなっ……い、いやっ……これは夢だ。悪い夢だ……私はまだ未熟だ。こんな馬鹿らしい妄想を……」
line = "「そんなっ……い、いやっ……これは夢だ。悪い夢だ……私はまだ未熟だ。こんな馬鹿らしい妄想を……」"

[[dialogue]]
speaker = "unk"
# 最愛の父は行方知れず。恋人である会長も、ネビュラ基地へ向かったきり消息不明。そんな状況にも関わらず、最近のアステラの出現頻度は増加の一途をたどっている。
line = "最愛の父は行方知れず。恋人である会長も、ネビュラ基地へ向かったきり消息不明。そんな状況にも関わらず、最近のアステラの出現頻度は増加の一途をたどっている。"

[[dialogue]]
speaker = "unk"
# そう……不安定な現状に揺れる弱い心が見せた──これはただの悪夢なのだ、きっとそうだ……！
line = "そう……不安定な現状に揺れる弱い心が見せた──これはただの悪夢なのだ、きっとそうだ……！"

[[dialogue]]
speaker = "セイファート"
# 「お前は私のことを心底から慕ってくれていた。だから信じられないかもしれないが……いずれ現実は突き付けられる」
line = "「お前は私のことを心底から慕ってくれていた。だから信じられないかもしれないが……いずれ現実は突き付けられる」"

[[dialogue]]
speaker = "セイファート"
# 「私は許されざる悪党であり、英雄ではない。すまない、アニュラス……」
line = "「私は許されざる悪党であり、英雄ではない。すまない、アニュラス……」"

[[dialogue]]
speaker = "アニュラス"
# 「そん、なっ……」
line = "「そん、なっ……」"

[[dialogue]]
speaker = "セイファート"
# 「デネブ、アルタイル、ベガ……３つの世界……」
line = "「デネブ、アルタイル、ベガ……３つの世界……」"

[[dialogue]]
speaker = "セイファート"
# 「ベガは滅び、破滅まで秒読みだったデネブの惨状を見た私は……心を折られてしまった。この戦いに勝ち目はない。未来はないのだ、とな」
line = "「ベガは滅び、破滅まで秒読みだったデネブの惨状を見た私は……心を折られてしまった。この戦いに勝ち目はない。未来はないのだ、とな」"

[[dialogue]]
speaker = "セイファート"
# 「残されたお前を愛し、人々と世界を守り、異なる地へ連れ去られた妻を取り戻す術を探す──そんな淡い希望を抱いて進む強さを、持つことができなかった……」
line = "「残されたお前を愛し、人々と世界を守り、異なる地へ連れ去られた妻を取り戻す術を探す──そんな淡い希望を抱いて進む強さを、持つことができなかった……」"

[[dialogue]]
speaker = "セイファート"
# 「愚かな父から、せめてもの餞別を遺しておこうと思う。お前の仮面に……込められるだけの霊力を、込めておく」
line = "「愚かな父から、せめてもの餞別を遺しておこうと思う。お前の仮面に……込められるだけの霊力を、込めておく」"

[[dialogue]]
speaker = "セイファート"
# 「本来、人の身では扱えない力だが……女神に認められた『セイファートの血』であれば、我が物とすることができるだろう」
line = "「本来、人の身では扱えない力だが……女神に認められた『セイファートの血』であれば、我が物とすることができるだろう」"

[[dialogue]]
speaker = "セイファート"
# 「愚かな私には過ぎた力だったが、まっすぐなお前ならばきっと……大切なもののためにこの力を使えるだろう」
line = "「愚かな私には過ぎた力だったが、まっすぐなお前ならばきっと……大切なもののためにこの力を使えるだろう」"

[[dialogue]]
speaker = "セイファート"
# 「……お別れだ、アニュラス」
line = "「……お別れだ、アニュラス」"

[[dialogue]]
speaker = "アニュラス"
# 「……っ！　待ってください！　お父様！　私の大切なもの……その１つはあなたです！」
line = "「……っ！　待ってください！　お父様！　私の大切なもの……その１つはあなたです！」"

[[dialogue]]
speaker = "アニュラス"
# 「誰かの為に使えと言われれば、あなたの為にこの力を使いたい！　それなのに、いなくなってしまうだなんて……！」
line = "「誰かの為に使えと言われれば、あなたの為にこの力を使いたい！　それなのに、いなくなってしまうだなんて……！」"

[[dialogue]]
speaker = "アニュラス"
# 「お母様は消えてしまったのに……！　お父様まで、いなくなってしまうのですか……！？」
line = "「お母様は消えてしまったのに……！　お父様まで、いなくなってしまうのですか……！？」"

[[dialogue]]
speaker = "セイファート"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "セイファート"
# 「本来ならば霊力などではなく、もっと違うもの……言葉や愛情といったものこそを、お前に贈るべきだったのだろうな……」
line = "「本来ならば霊力などではなく、もっと違うもの……言葉や愛情といったものこそを、お前に贈るべきだったのだろうな……」"

[[dialogue]]
speaker = "セイファート"
# 「私はもう後戻りのできないところまで来てしまった。だからお前と一緒にいられない……すまない、アニュラス……」
line = "「私はもう後戻りのできないところまで来てしまった。だからお前と一緒にいられない……すまない、アニュラス……」"

[[dialogue]]
speaker = "アニュラス"
# 「お父様、そんなっ……待ってください、お父様──！！」
line = "「お父様、そんなっ……待ってください、お父様──！！」"

[[dialogue]]
speaker = "アニュラス"
# 「──お父様っ！？」
line = "「──お父様っ！？」"

[[dialogue]]
speaker = "unk"
# ソファから跳ね起きる。見慣れない部屋──ここは流星学園の星徒会室だ。
line = "ソファから跳ね起きる。見慣れない部屋──ここは流星学園の星徒会室だ。"

[[dialogue]]
speaker = "unk"
# ここのところ出撃があまりに多く、自室へ帰る暇もない星騎士のために一時的に開放されている休息所だった。
line = "ここのところ出撃があまりに多く、自室へ帰る暇もない星騎士のために一時的に開放されている休息所だった。"

[[dialogue]]
speaker = "アニュラス"
# 「今の、夢は……」
line = "「今の、夢は……」"

[[dialogue]]
speaker = "unk"
# 飛び起きた拍子に外れた仮面。流星学園の実技試験で主席をとった際に、父から贈られた私の宝物──そこへ手をかざしてみる。
line = "飛び起きた拍子に外れた仮面。流星学園の実技試験で主席をとった際に、父から贈られた私の宝物──そこへ手をかざしてみる。"

[[dialogue]]
speaker = "アニュラス"
# 「夢……では、ない……のか……」
line = "「夢……では、ない……のか……」"

[[dialogue]]
speaker = "unk"
# そこには確かに……星力とは違う、温かな、清らかな力が宿っているのがわかった。女神様から賜った力──霊力。
line = "そこには確かに……星力とは違う、温かな、清らかな力が宿っているのがわかった。女神様から賜った力──霊力。"

[[dialogue]]
speaker = "アニュラス"
# 「お父様は、霊力を扱えた……ということは、黒騎士の、正体は……」
line = "「お父様は、霊力を扱えた……ということは、黒騎士の、正体は……」"

[[dialogue]]
speaker = "unk"
# 心の半身が欠けてしまったような感覚。遠く魔界の地で、たった今……最愛の家族が散ってしまったことを、頭ではなく魂で理解してしまった──
line = "心の半身が欠けてしまったような感覚。遠く魔界の地で、たった今……最愛の家族が散ってしまったことを、頭ではなく魂で理解してしまった──"

[[dialogue]]
speaker = "unk"
# 私はどうすればいい？　泣き叫ぶべきなのだろうか……心折れてふさぎ込むべきなのだろうか……？
line = "私はどうすればいい？　泣き叫ぶべきなのだろうか……心折れてふさぎ込むべきなのだろうか……？"

[[dialogue]]
speaker = "アニュラス"
# 「────違う」
line = "「────違う」"

[[dialogue]]
speaker = "アニュラス"
# 「……私は、力を託されたんだ……ならば悲しみに膝を折ることは許されない……！」
line = "「……私は、力を託されたんだ……ならば悲しみに膝を折ることは許されない……！」"

[[dialogue]]
speaker = "unk"
# ＤＩＳＣから、モンスターの出現を報せるアラームが鳴る。
line = "ＤＩＳＣから、モンスターの出現を報せるアラームが鳴る。"

[[dialogue]]
speaker = "unk"
# 私は仮面に宿っている力を引き出し、自身の星力と共に新たな力を練り上げる──！
line = "私は仮面に宿っている力を引き出し、自身の星力と共に新たな力を練り上げる──！"

[[dialogue]]
speaker = "アニュラス（覚醒）"
# 「……戦おう。私はアニュラス・セイファート……誇り高き流星の騎士の、娘なのだから……！」
line = "「……戦おう。私はアニュラス・セイファート……誇り高き流星の騎士の、娘なのだから……！」"

[[dialogue]]
speaker = "unk"
# 魔界で黒騎士……セイファート学園長を斃し、フィーニスの塔を経由して人間界へと戻ってきた俺たち。
line = "魔界で黒騎士……セイファート学園長を斃し、フィーニスの塔を経由して人間界へと戻ってきた俺たち。"

[[dialogue]]
speaker = "unk"
# 地上で戦っていたメンバーと合流し、互いの無事を喜んでいたその時──俺のもとへ１人の少女がやってきた。
line = "地上で戦っていたメンバーと合流し、互いの無事を喜んでいたその時──俺のもとへ１人の少女がやってきた。"

[[dialogue]]
speaker = "アニュラス（覚醒）"
# 「ようやく帰ったか会長。無事で何よりだ……！」
line = "「ようやく帰ったか会長。無事で何よりだ……！」"

[[dialogue]]
speaker = "アニュラス（覚醒）"
# 「……ってお前！　何だかずいぶん見た目が変わっているな！？　魔界で何かあったのか……？」
line = "「……ってお前！　何だかずいぶん見た目が変わっているな！？　魔界で何かあったのか……？」"

[[dialogue]]
speaker = "unk"
# その恰好、どうしたんだ！？
line = "その恰好、どうしたんだ！？"

[[dialogue]]
speaker = "unk"
# アニュラスこそ！？
line = "アニュラスこそ！？"

[[dialogue]]
speaker = "アニュラス（覚醒）"
# 「ああ……これか。少し前にお父様からの餞別を受け取ってな……新しい力を扱えるようになったんだ」
line = "「ああ……これか。少し前にお父様からの餞別を受け取ってな……新しい力を扱えるようになったんだ」"

[[dialogue]]
speaker = "unk"
# セイファート学園長が……！？
line = "セイファート学園長が……！？"

[[dialogue]]
speaker = "アニュラス（覚醒）"
# 「ああ。お父様からもらった仮面。あれに、女神様から賜った霊力が込められていたんだ。好きに使うといい、と言われた」
line = "「ああ。お父様からもらった仮面。あれに、女神様から賜った霊力が込められていたんだ。好きに使うといい、と言われた」"

[[dialogue]]
speaker = "アニュラス（覚醒）"
# 「不思議な夢を見た……だから何となく感じている。なあ会長……お父様は、亡くなったのだろう……？」
line = "「不思議な夢を見た……だから何となく感じている。なあ会長……お父様は、亡くなったのだろう……？」"

[[dialogue]]
speaker = "unk"
# 立派な最期だった……
line = "立派な最期だった……"

[[dialogue]]
speaker = "unk"
# ……魔界で黒騎士と刺し違えたんだ
line = "……魔界で黒騎士と刺し違えたんだ"

[[dialogue]]
speaker = "アニュラス（覚醒）"
# 「…………そうか。お父様の誇りを守ってくれて、ありがとう」
line = "「…………そうか。お父様の誇りを守ってくれて、ありがとう」"

[[dialogue]]
speaker = "アニュラス（覚醒）"
# 「さぁ、地上は私たちに任せろ。お前は空にいる<ruby=あいつ>アポロ</ruby>を止めに行くんだろう？」
line = "「さぁ、地上は私たちに任せろ。お前は空にいる<ruby>アポロ<rt>あいつ</rt></ruby>を止めに行くんだろう？」"

[[dialogue]]
speaker = "アニュラス（覚醒）"
# 「私はリクリエを退けたいと願っていた……流星の騎士であった頃のお父様の遺志を継ぐ。この剣に誓ってな」
line = "「私はリクリエを退けたいと願っていた……流星の騎士であった頃のお父様の遺志を継ぐ。この剣に誓ってな」"

[[dialogue]]
speaker = "unk"
# 黒と白──二振りの剣を掲げるアニュラスに、俺も己の使命に全力を賭けることを誓った。そうして俺たちは、それぞれの持ち場へと向かうのだった──
line = "黒と白──二振りの剣を掲げるアニュラスに、俺も己の使命に全力を賭けることを誓った。そうして俺たちは、それぞれの持ち場へと向かうのだった──"
