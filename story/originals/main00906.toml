[[dialogue]]
speaker = "カヤ"
# 「！」
line = "「！」"

[[dialogue]]
speaker = "ソフィア"
# 「この声は──」
line = "「この声は──」"

[[dialogue]]
speaker = "unk"
# 交戦開始からしばらくして──
line = "交戦開始からしばらくして──"

[[dialogue]]
speaker = "unk"
# 待ったをかけるように聞こえてきたのは、いつかの女性のアナウンスだった。
line = "待ったをかけるように聞こえてきたのは、いつかの女性のアナウンスだった。"

[[dialogue]]
speaker = "セドナ"
# 『その者たちには縁がある──警戒しつつ丁重に案内せよ、カヤ』
line = "『その者たちには縁がある──警戒しつつ丁重に案内せよ、カヤ』"

[[dialogue]]
speaker = "カヤ"
# 「……ラジャ」
line = "「……ラジャ」"

[[dialogue]]
speaker = "セドナ"
# 「改めて──久方ぶりだな、諸君。流星、そして新星学園の星騎士たち」
line = "「改めて──久方ぶりだな、諸君。流星、そして新星学園の星騎士たち」"

[[dialogue]]
speaker = "クロト"
# 「セドナ……さん。でしたよね」
line = "「セドナ……さん。でしたよね」"

[[dialogue]]
speaker = "セドナ"
# 「ああ。しかし、今日はよもや我々の基地にいきなり乗り込んでこようとは──どういう了見かね？」
line = "「ああ。しかし、今日はよもや我々の基地にいきなり乗り込んでこようとは──どういう了見かね？」"

[[dialogue]]
speaker = "ルリエル"
# 「ぜ、前回は無理やり連れてこられたですよ！？」
line = "「ぜ、前回は無理やり連れてこられたですよ！？」"

[[dialogue]]
speaker = "カヤ"
# 「……上官の<ruby=ちき>知己</ruby>だったの。迎撃しちゃったけど──」
line = "「……上官の<ruby>知己<rt>ちき</rt></ruby>だったの。迎撃しちゃったけど──」"

[[dialogue]]
speaker = "セドナ"
# 「構わん。招かれざる客には違いない。なんなら、次に訪ねてきた時も同じように歓迎してやれ」
line = "「構わん。招かれざる客には違いない。なんなら、次に訪ねてきた時も同じように歓迎してやれ」"

[[dialogue]]
speaker = "カヤ"
# 「イエス、コマンダー」
line = "「イエス、コマンダー」"

[[dialogue]]
speaker = "マトイ"
# 「えぇぇ……」
line = "「えぇぇ……」"

[[dialogue]]
speaker = "ソフィア"
# 「不当な扱いにも程があります」
line = "「不当な扱いにも程があります」"

[[dialogue]]
speaker = "unk"
# 『カヤ』と呼ばれた少女はこの基地の番兵らしく、侵入者がいないか上空まで見張っていたようだった。
line = "『カヤ』と呼ばれた少女はこの基地の番兵らしく、侵入者がいないか上空まで見張っていたようだった。"

[[dialogue]]
speaker = "unk"
# 上官のセドナさんに命じられてからはすっかりおとなしく待機している。
line = "上官のセドナさんに命じられてからはすっかりおとなしく待機している。"

[[dialogue]]
speaker = "セドナ"
# 「まあいい。暇ではないが──少しくらいなら時間を割いてやる」
line = "「まあいい。暇ではないが──少しくらいなら時間を割いてやる」"

[[dialogue]]
speaker = "セドナ"
# 「わざわざこちらへうかがうほどの用もあるようだし──な？」
line = "「わざわざこちらへうかがうほどの用もあるようだし──な？」"

[[dialogue]]
speaker = "クロト"
# 「……はい。お尋ねしたい事柄が、いくつかあります」
line = "「……はい。お尋ねしたい事柄が、いくつかあります」"

[[dialogue]]
speaker = "unk"
# そうして俺は改めてセドナさんに事情を説明した。
line = "そうして俺は改めてセドナさんに事情を説明した。"

[[dialogue]]
speaker = "unk"
# ヴィーナスがさらわれたこと、行方をようやく掴めそうだったこと、そして……。
line = "ヴィーナスがさらわれたこと、行方をようやく掴めそうだったこと、そして……。"

[[dialogue]]
speaker = "セドナ"
# 「がん首揃えて訪ねてきたかと思えば──やれやれ」
line = "「がん首揃えて訪ねてきたかと思えば──やれやれ」"

[[dialogue]]
speaker = "セドナ"
# 「<b>三界を渡る方法を知らないか</b>……だと？」
line = "「<b>三界を渡る方法を知らないか</b>……だと？」"

[[dialogue]]
speaker = "クロト"
# 「──ええ。あなた達は以前、三界のどこでもない『魔女の森』に棲んでいたと言った」
line = "「──ええ。あなた達は以前、三界のどこでもない『魔女の森』に棲んでいたと言った」"

[[dialogue]]
speaker = "クロト"
# 「そして、その移動に際してはあの穴──『世界樹のうろ』を通ってきたとも」
line = "「そして、その移動に際してはあの穴──『世界樹のうろ』を通ってきたとも」"

[[dialogue]]
speaker = "unk"
# 俺は基地の一角にむき出しとなった木の根にちらりと視線をやった。
line = "俺は基地の一角にむき出しとなった木の根にちらりと視線をやった。"

[[dialogue]]
speaker = "アイリーン"
# 「──それはあくまでも我々魔女にのみ許された経路です。あなた達は違います」
line = "「──それはあくまでも我々魔女にのみ許された経路です。あなた達は違います」"

[[dialogue]]
speaker = "アイリーン"
# 「通常、三界をまたぐ移動には鏡界の湖から『大交流』の船に乗る必要があります。もっとも、限られた人員しか許可されませんが」
line = "「通常、三界をまたぐ移動には鏡界の湖から『大交流』の船に乗る必要があります。もっとも、限られた人員しか許可されませんが」"

[[dialogue]]
speaker = "ルリエル"
# 「そ、それは当然知っています！　わたし達がお聞きしたいのはそうではなくですね！」
line = "「そ、それは当然知っています！　わたし達がお聞きしたいのはそうではなくですね！」"

[[dialogue]]
speaker = "セドナ"
# 「我々の『うろ』なら今の時期でも使えるだろう──と？」
line = "「我々の『うろ』なら今の時期でも使えるだろう──と？」"

[[dialogue]]
speaker = "クロト"
# 「……その通りです」
line = "「……その通りです」"

[[dialogue]]
speaker = "アイリーン"
# 「『うろ』を当てにして、ここまで来たというのですか──」
line = "「『うろ』を当てにして、ここまで来たというのですか──」"

[[dialogue]]
speaker = "セドナ"
# 「第一──魔女の森へ行けたとして何とする？　断っておくが、おまえ達の尋ね人が迷い込んだ可能性はゼロだぞ」
line = "「第一──魔女の森へ行けたとして何とする？　断っておくが、おまえ達の尋ね人が迷い込んだ可能性はゼロだぞ」"

[[dialogue]]
speaker = "クロト"
# 「ええ。確かに俺たちが魔女の森へ行く必要はない。だけど──」
line = "「ええ。確かに俺たちが魔女の森へ行く必要はない。だけど──」"

[[dialogue]]
speaker = "アイリーン"
# 「世界樹とは文字通り──世界と世界を結ぶ樹。あの穴をくぐった先には、私どもの暮らす魔女の森があります」
line = "「世界樹とは文字通り──世界と世界を結ぶ樹。あの穴をくぐった先には、私どもの暮らす魔女の森があります」"

[[dialogue]]
speaker = "アイリーン"
# 「つまりあれは──異世界同士を繋ぐ『世界樹のうろ』なのです」
line = "「つまりあれは──異世界同士を繋ぐ『世界樹のうろ』なのです」"

[[dialogue]]
speaker = "unk"
# 以前──アイリーンさんがこの場で語ってくれたことを思い出す。
line = "以前──アイリーンさんがこの場で語ってくれたことを思い出す。"

[[dialogue]]
speaker = "クロト"
# 「アイリーンさんはこうも言った。世界樹のうろは──<b>異世界同士</b>を繋ぐものなのだと」
line = "「アイリーンさんはこうも言った。世界樹のうろは──<b>異世界同士</b>を繋ぐものなのだと」"

[[dialogue]]
speaker = "アイリーン"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "unk"
# ここから先、確証はない。だがすべてを見透かしたように俺は続けた。
line = "ここから先、確証はない。だがすべてを見透かしたように俺は続けた。"

[[dialogue]]
speaker = "クロト"
# 「そして、ここが人間界の本部であるという事実。なら他にも当然──拠点や支部が存在するんだろう」
line = "「そして、ここが人間界の本部であるという事実。なら他にも当然──拠点や支部が存在するんだろう」"

[[dialogue]]
speaker = "クロト"
# 「これらのことを踏まえると──あの根は他の三界にも繋がっていると解釈するのが自然だ」
line = "「これらのことを踏まえると──あの根は他の三界にも繋がっていると解釈するのが自然だ」"

[[dialogue]]
speaker = "フィオナ"
# 「つまり──魔界にも……」
line = "「つまり──魔界にも……」"

[[dialogue]]
speaker = "unk"
# 三界を自在にまたぐ方法なんてのは、詐欺まがいも横行するくらいには絵空事──
line = "三界を自在にまたぐ方法なんてのは、詐欺まがいも横行するくらいには絵空事──"

[[dialogue]]
speaker = "unk"
# しかし彼女たち<b>だけ</b>は、そんな経路だけを使って、これまで連綿と行き来してきた幻の存在だ。
line = "しかし彼女たち<b>だけ</b>は、そんな経路だけを使って、これまで連綿と行き来してきた幻の存在だ。"

[[dialogue]]
speaker = "セドナ"
# 「……ふう。やれやれ。少々語りすぎたようだな、アイリーン」
line = "「……ふう。やれやれ。少々語りすぎたようだな、アイリーン」"

[[dialogue]]
speaker = "アイリーン"
# 「──申し訳ございません」
line = "「──申し訳ございません」"

[[dialogue]]
speaker = "unk"
# セドナさんとアイリーンさんは、納得したように目を合わせると……
line = "セドナさんとアイリーンさんは、納得したように目を合わせると……"

[[dialogue]]
speaker = "セドナ"
# 「話はわかった。それで──我々にどうしてほしい？」
line = "「話はわかった。それで──我々にどうしてほしい？」"

[[dialogue]]
speaker = "クロト"
# 「『世界樹のうろ』を通らせて欲しい。俺たちに」
line = "「『世界樹のうろ』を通らせて欲しい。俺たちに」"

[[dialogue]]
speaker = "セドナ"
# 「代価もなしにか。虫のいい話だな」
line = "「代価もなしにか。虫のいい話だな」"

[[dialogue]]
speaker = "クロト"
# 「ああ。だから」
line = "「ああ。だから」"

[[dialogue]]
speaker = "マトイ"
# 「ちょっ……緋宮くん！？　土下座って……！」
line = "「ちょっ……緋宮くん！？　土下座って……！」"

[[dialogue]]
speaker = "アイリーン"
# 「そこまでして──」
line = "「そこまでして──」"

[[dialogue]]
speaker = "クロト"
# 「──この通りだ。今、俺たちは仲間が魔界へさらわれて窮地にある」
line = "「──この通りだ。今、俺たちは仲間が魔界へさらわれて窮地にある」"

[[dialogue]]
speaker = "クロト"
# 「どうしても……命に代えても、あいつを助けにいかなきゃならないんだ……！」
line = "「どうしても……命に代えても、あいつを助けにいかなきゃならないんだ……！」"

[[dialogue]]
speaker = "セドナ"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# 俺は地に膝をついて──頭を下げた。
line = "俺は地に膝をついて──頭を下げた。"

[[dialogue]]
speaker = "クロト"
# 「俺たちは同志だとあなたは言った。この先のリクリエに抗するためにも、ヴィーナスの力は必要だ」
line = "「俺たちは同志だとあなたは言った。この先のリクリエに抗するためにも、ヴィーナスの力は必要だ」"

[[dialogue]]
speaker = "クロト"
# 「星徒会の握っている情報だって共有する。俺個人の戦力をいくら貸したって構わない」
line = "「星徒会の握っている情報だって共有する。俺個人の戦力をいくら貸したって構わない」"

[[dialogue]]
speaker = "クロト"
