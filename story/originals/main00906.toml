line = "「うむ。何せ余は『ネビュラ』の<b>そーすい</b>だからな──偉い者が決める権利を持つのだ。わはは！」"

[[dialogue]]
speaker = "ソフィア"
# （総帥って──ここの？　えぇ……？）
