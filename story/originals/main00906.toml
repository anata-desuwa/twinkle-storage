# 「──た・だ・し」
line = "「──た・だ・し」"

[[dialogue]]
speaker = "クラウディア"
# 「当然……タダで、とは言わんがのう。ふふふ」
line = "「当然……タダで、とは言わんがのう。ふふふ」"

[[dialogue]]
speaker = "フィオナ"
# 「なるほど──対価ですか」
line = "「なるほど──対価ですか」"

[[dialogue]]
speaker = "クロト"
# 「もちろん望むなら助力するつもりだ。そちらがいざという時は、俺たちが助太刀をしたって──」
line = "「もちろん望むなら助力するつもりだ。そちらがいざという時は、俺たちが助太刀をしたって──」"

[[dialogue]]
speaker = "クラウディア"
# 「ああ、要らぬ要らぬそんなものは。小難しい話は嫌いだ」
line = "「ああ、要らぬ要らぬそんなものは。小難しい話は嫌いだ」"

[[dialogue]]
speaker = "クロト"
# 「？　なら……」
line = "「？　なら……」"

[[dialogue]]
speaker = "クラウディア"
# 「余は退屈なのだ。毎日毎日この基地から出られんでなあ、やれ勉強だ野菜だと小うるさい小言ばかり」
line = "「余は退屈なのだ。毎日毎日この基地から出られんでなあ、やれ勉強だ野菜だと小うるさい小言ばかり」"

[[dialogue]]
speaker = "クラウディア"
# 「だから──せいぜい飽きさせぬ程度に、遊んでくれればそれでいい」
line = "「だから──せいぜい飽きさせぬ程度に、遊んでくれればそれでいい」"

[[dialogue]]
speaker = "クラウディア"
# 「試練だ。余らを打ち倒し、その誠意をやらを証明してみせよ」
line = "「試練だ。余らを打ち倒し、その誠意をやらを証明してみせよ」"

[[dialogue]]
speaker = "フィオナ"
# 「！」
line = "「！」"

[[dialogue]]
speaker = "サーシャ"
# 「そう来るのね──」
line = "「そう来るのね──」"

[[dialogue]]
speaker = "unk"
# 少女の手には見たことのない形の魔法杖が握られていた。
line = "少女の手には見たことのない形の魔法杖が握られていた。"

[[dialogue]]
speaker = "unk"
# その全身からは刺すようなオーラの奔流がほとばしる──
line = "その全身からは刺すようなオーラの奔流がほとばしる──"

[[dialogue]]
speaker = "クラウディア"
# 「セドナ。アイリーン。カヤも来い。共に遊んでやろうぞ、これも一興だ」
line = "「セドナ。アイリーン。カヤも来い。共に遊んでやろうぞ、これも一興だ」"

[[dialogue]]
speaker = "アイリーン"
# 「！　は──はいっ！」
line = "「！　は──はいっ！」"

[[dialogue]]
speaker = "カヤ"
# 「──ご用命なら」
line = "「──ご用命なら」"

[[dialogue]]
speaker = "セドナ"
# 「ふう……付き合わされるこちらの身にもなってほしいですが。少しだけですよ」
line = "「ふう……付き合わされるこちらの身にもなってほしいですが。少しだけですよ」"

[[dialogue]]
speaker = "マトイ"
# 「っっ……！　なんて星力──じゃなくって、これは……！」
line = "「っっ……！　なんて星力──じゃなくって、これは……！」"

[[dialogue]]
speaker = "クロト"
# 「魔力──か」
line = "「魔力──か」"

[[dialogue]]
speaker = "クラウディア"
# 「さよう。ああ、魔法は三千年前からも存続している由緒ある術なのだぞ」
line = "「さよう。ああ、魔法は三千年前からも存続している由緒ある術なのだぞ」"

[[dialogue]]
speaker = "セドナ"
# 「精々丸焼けにはならぬことだな。お仲間に会わせるツラが黒焦げでは、興醒めだろう？」
line = "「精々丸焼けにはならぬことだな。お仲間に会わせるツラが黒焦げでは、興醒めだろう？」"

[[dialogue]]
speaker = "アイリーン"
# 「お二人の魔力には及びませんが──全力でサポートいたしますっ！」
line = "「お二人の魔力には及びませんが──全力でサポートいたしますっ！」"

[[dialogue]]
speaker = "フィオナ"
# 「是非もないですね──こちらも全力でお相手しましょう！」
line = "「是非もないですね──こちらも全力でお相手しましょう！」"

[[dialogue]]
speaker = "クロト"
# 「ああ。恐らく世界に唯一の道筋──逃すわけにはいかない！」
line = "「ああ。恐らく世界に唯一の道筋──逃すわけにはいかない！」"

[[dialogue]]
speaker = "クロト"
# （ヴィーナス……待っていてくれ。どんな手を使っても君に辿り着く）
line = "（ヴィーナス……待っていてくれ。どんな手を使っても君に辿り着く）"

[[dialogue]]
speaker = "unk"
# 絶対に負けられない──
line = "絶対に負けられない──"

[[dialogue]]
speaker = "unk"
# 俺はたぎる闘志を燃やして、過去最大に守護星の地球へ祈りを捧げた。
line = "俺はたぎる闘志を燃やして、過去最大に守護星の地球へ祈りを捧げた。"

[[dialogue]]
speaker = "クラウディア"
# 「《光》の魔女、クラウディア・イルゼ・フォン・ゴットフリート──ネビュラが総帥として相手をしてやる」
line = "「《光》の魔女、クラウディア・イルゼ・フォン・ゴットフリート──ネビュラが総帥として相手をしてやる」"

[[dialogue]]
speaker = "クラウディア"
# 「<b>せーとかい</b>とやらの威信、余に示してみせるがよいぞ！」
line = "「<b>せーとかい</b>とやらの威信、余に示してみせるがよいぞ！」"
