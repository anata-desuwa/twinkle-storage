line = "「あの洞穴の先の道も、いくらか枝分かれしてるって感じかな？」"

[[dialogue]]
speaker = "セドナ"
# 「そうだ。三界の各地に張り巡らされている世界樹の根を伝うことで、次元間での移動が可能となる」
line = "「そうだ。三界の各地に張り巡らされている世界樹の根を伝うことで、次元間での移動が可能となる」"

[[dialogue]]
speaker = "フィオナ"
# （あのうろはあくまでも巨大な世界樹の一部……その根は至るところに張り巡らされている、というワケですか──）
line = "（あのうろはあくまでも巨大な世界樹の一部……その根は至るところに張り巡らされている、というワケですか──）"

[[dialogue]]
speaker = "ルリエル"
# （新星会長さんの勘、ドンピシャです！）
