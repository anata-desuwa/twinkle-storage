[[dialogue]]
speaker = "セドナ"
# 「しかし──『うろ』は我ら魔女にとって、世界樹本体とも結びつく神聖なもの。易々と人間などを通すわけにはいかない」
line = "「しかし──『うろ』は我ら魔女にとって、世界樹本体とも結びつく神聖なもの。易々と人間などを通すわけにはいかない」"

[[dialogue]]
speaker = "ソフィア"
# 「っ……どうしても、ですか……！？」
line = "「っ……どうしても、ですか……！？」"

[[dialogue]]
speaker = "マトイ"
# 「そんな──！」
line = "「そんな──！」"

[[dialogue]]
speaker = "unk"
# やはり種族の壁は高い──
line = "やはり種族の壁は高い──"

[[dialogue]]
speaker = "unk"
# そう思われ、絶望の気色がただよった瞬間だった。
line = "そう思われ、絶望の気色がただよった瞬間だった。"

[[dialogue]]
speaker = "クラウディア"
# 「よいではないか──セドナ。よもやこれで、魔女が滅ぶわけでもあるまい」
line = "「よいではないか──セドナ。よもやこれで、魔女が滅ぶわけでもあるまい」"

[[dialogue]]
speaker = "サーシャ"
# 「え……？」
line = "「え……？」"

[[dialogue]]
speaker = "マトイ"
# 「だ、誰……？」
line = "「だ、誰……？」"

[[dialogue]]
speaker = "セドナ"
# 「姫──今はまだ、宿題の時間のはずですが……」
line = "「姫──今はまだ、宿題の時間のはずですが……」"

[[dialogue]]
speaker = "クラウディア"
# 「──<ruby=おもて>面</ruby>を上げい、<ruby=おのこ>男子</ruby>よ。余が許可を出してやる」
line = "「──<ruby>面<rt>おもて</rt></ruby>を上げい、<ruby>男子<rt>おのこ</rt></ruby>よ。余が許可を出してやる」"

[[dialogue]]
speaker = "クロト"
# 「っ……」
line = "「っ……」"

[[dialogue]]
speaker = "unk"
# 俺は立ち上がり、居住まいを正した。
line = "俺は立ち上がり、居住まいを正した。"

[[dialogue]]
speaker = "unk"
# 奥の扉から現れた少女──以前ここへ来た時には見なかった人物だ。
line = "奥の扉から現れた少女──以前ここへ来た時には見なかった人物だ。"

[[dialogue]]
speaker = "クロト"
# （この子は……）
line = "（この子は……）"

[[dialogue]]
speaker = "unk"
# ……なんだろうか。
line = "……なんだろうか。"

[[dialogue]]
speaker = "unk"
# 年端も行かぬ少女にしか見えないのに──
line = "年端も行かぬ少女にしか見えないのに──"

[[dialogue]]
speaker = "unk"
