line = "「何──固いことを抜かすでない、セドナ。それで『うろ』がすり減るわけでもないのだろう」"

[[dialogue]]
speaker = "セドナ"
# 「ですが、万が一のことがあっては……」
line = "「ですが、万が一のことがあっては……」"

[[dialogue]]
speaker = "マトイ"
# （な、なんか風向き変わった感じ……？）
line = "（な、なんか風向き変わった感じ……？）"

[[dialogue]]
speaker = "セーラ"
