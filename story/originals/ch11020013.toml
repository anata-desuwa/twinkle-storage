[[dialogue]]
speaker = "unk"
# 第３話,限定版ギガンドムをゲットせよ,P
line = "第３話,限定版ギガンドムをゲットせよ,P"

[[dialogue]]
speaker = "unk"
# シュティレの大好きなロボットアニメ・超機動武神ギガンドムの限定版プラモデルが発売されるらしい。
line = "シュティレの大好きなロボットアニメ・超機動武神ギガンドムの限定版プラモデルが発売されるらしい。"

[[dialogue]]
speaker = "unk"
# 俺は彼女に誘われて、模型屋の列に並ぶことになった──
line = "俺は彼女に誘われて、模型屋の列に並ぶことになった──"

[[dialogue]]
speaker = "シュティレ"
# 「予想を超える長蛇の列です。流石は国民的アニメ……この人気は誇らしいですが、ゲットできるか少々不安ですね」
line = "「予想を超える長蛇の列です。流石は国民的アニメ……この人気は誇らしいですが、ゲットできるか少々不安ですね」"

[[dialogue]]
speaker = "シュティレ"
# 「会長、今日はお休みの日にご足労ありがとうございます」
line = "「会長、今日はお休みの日にご足労ありがとうございます」"

[[dialogue]]
speaker = "シュティレ"
# 「本日発売されるのは、数年前のイベントで限定<ruby=はんぷ>頒布</ruby>された決戦仕様ギガンドム……その奇蹟の再販なのです」
line = "「本日発売されるのは、数年前のイベントで限定<ruby>頒布<rt>はんぷ</rt></ruby>された決戦仕様ギガンドム……その奇蹟の再販なのです」"

[[dialogue]]
speaker = "シュティレ"
# 「どうしても２セット入手したいため、会長をお呼びする形になってしまいました。どうぞよろしくお願いします」
line = "「どうしても２セット入手したいため、会長をお呼びする形になってしまいました。どうぞよろしくお願いします」"

[[dialogue]]
speaker = "unk"
# でも、２つも買ってどうするの？
line = "でも、２つも買ってどうするの？"

[[dialogue]]
speaker = "unk"
# 全然気にしなくていいよ
line = "全然気にしなくていいよ"

[[dialogue]]
speaker = "シュティレ"
# 「愚問です。１つは制作および鑑賞用。そしてもう１つは、抱いて寝る用です」
line = "「愚問です。１つは制作および鑑賞用。そしてもう１つは、抱いて寝る用です」"

[[dialogue]]
speaker = "unk"
# 愛が深いね……！？
line = "愛が深いね……！？"

[[dialogue]]
speaker = "シュティレ"
# 「はい、シュティレのギガンドムへの愛は無限大です──まあ、抱いて寝る用は冗談ですが」
line = "「はい、シュティレのギガンドムへの愛は無限大です──まあ、抱いて寝る用は冗談ですが」"

[[dialogue]]
speaker = "シュティレ"
# 「もう１つは改造用です。敢えて腕を破損させたり、オリジナルのカラーで塗装をしたり……」
line = "「もう１つは改造用です。敢えて腕を破損させたり、オリジナルのカラーで塗装をしたり……」"

[[dialogue]]
speaker = "シュティレ"
# 「夕陽の差す戦場で佇む、壊れかけのギガンドムをジオラマで再現したいのです。そのためプレーンとは別にもう１体、どうしても欲しくて……」
line = "「夕陽の差す戦場で佇む、壊れかけのギガンドムをジオラマで再現したいのです。そのためプレーンとは別にもう１体、どうしても欲しくて……」"

[[dialogue]]
speaker = "シュティレ"
# 「先日のモンスター化したギガンドムの一件でバタバタしていた、ちょうどその時に予約サイトがオープンしていたこと。本当に悲しいです」
line = "「先日のモンスター化したギガンドムの一件でバタバタしていた、ちょうどその時に予約サイトがオープンしていたこと。本当に悲しいです」"

[[dialogue]]
speaker = "シュティレ"
# 「当日販売に望みを託すなど、ロボットオタクとして恥ずかしい限りですが……」
line = "「当日販売に望みを託すなど、ロボットオタクとして恥ずかしい限りですが……」"

[[dialogue]]
speaker = "unk"
# 今日は絶対にゲットしよう！
line = "今日は絶対にゲットしよう！"

[[dialogue]]
speaker = "シュティレ"
# 「はい。女神様に祈ります。どうかどうか、限定版ギガンドムをシュティレの手に……！」
line = "「はい。女神様に祈ります。どうかどうか、限定版ギガンドムをシュティレの手に……！」"

[[dialogue]]
speaker = "シュティレ"
# 「いよいよ、あと数人ですね。ワクワクしてきました。あと少しでギガンドムが──」
line = "「いよいよ、あと数人ですね。ワクワクしてきました。あと少しでギガンドムが──」"

[[dialogue]]
speaker = "店員"
# 「申し訳ございません！　限定版ギガンドム、在庫なくなりましたー！」
line = "「申し訳ございません！　限定版ギガンドム、在庫なくなりましたー！」"

[[dialogue]]
speaker = "シュティレ"
# 「そんな……ギガンドム……」
line = "「そんな……ギガンドム……」"

[[dialogue]]
speaker = "シュティレ"
# 「──いえ。諦めません、勝つまでは。会長、すみませんが別の店舗へ参ります」
line = "「──いえ。諦めません、勝つまでは。会長、すみませんが別の店舗へ参ります」"

[[dialogue]]
speaker = "シュティレ"
# 「ここはかなり大きな模型店です。在庫もふんだんにあることでしょう」
line = "「ここはかなり大きな模型店です。在庫もふんだんにあることでしょう」"

[[dialogue]]
speaker = "シュティレ"
# 「順調……順調です……列が終わるまであと少し……！」
line = "「順調……順調です……列が終わるまであと少し……！」"

[[dialogue]]
speaker = "店員"
# 「ただ今を持ちまして、限定版ギガンドム、売り切れました！」
line = "「ただ今を持ちまして、限定版ギガンドム、売り切れました！」"

[[dialogue]]
speaker = "シュティレ"
# 「つ、次っ……！」
line = "「つ、次っ……！」"

[[dialogue]]
speaker = "シュティレ"
# 「私の父に教えてもらった穴場の模型店です。ふふ、数えるほどしか人がいないでしょう。初めからここに来るべきでした」
line = "「私の父に教えてもらった穴場の模型店です。ふふ、数えるほどしか人がいないでしょう。初めからここに来るべきでした」"

[[dialogue]]
speaker = "シュティレ"
# 「列の先頭まで来ました、さあギガンドム、シュティレの元へ飛び込んできてください。準備は万端──」
line = "「列の先頭まで来ました、さあギガンドム、シュティレの元へ飛び込んできてください。準備は万端──」"

[[dialogue]]
speaker = "おじさん"
# 「あちゃあ、シュティレちゃんか。ごめんな、今ので売り切れちゃったんだ……」
line = "「あちゃあ、シュティレちゃんか。ごめんな、今ので売り切れちゃったんだ……」"

[[dialogue]]
speaker = "シュティレ"
# 「くっ……も、もう一度、街を変えます……次がラストチャンス……！」
line = "「くっ……も、もう一度、街を変えます……次がラストチャンス……！」"

[[dialogue]]
speaker = "シュティレ"
# 「テルル様テルル様テルル様──どうかシュティレに女神の御慈悲を──」
line = "「テルル様テルル様テルル様──どうかシュティレに女神の御慈悲を──」"

[[dialogue]]
speaker = "unk"
# でも俺たちが先頭だよ！
line = "でも俺たちが先頭だよ！"

[[dialogue]]
speaker = "unk"
# お祈りを始めてる……！
line = "お祈りを始めてる……！"

[[dialogue]]
speaker = "シュティレ"
# 「はい、祈ります祈ります祈ります──」
line = "「はい、祈ります祈ります祈ります──」"

[[dialogue]]
speaker = "店員"
# 「お次の方！　おめでとうございます、限定版ギガンドム、最後の１つですよ！　どうぞ！」
line = "「お次の方！　おめでとうございます、限定版ギガンドム、最後の１つですよ！　どうぞ！」"

[[dialogue]]
speaker = "シュティレ"
# 「──やりました、会長！　ぶいっ……！」
line = "「──やりました、会長！　ぶいっ……！」"

[[dialogue]]
speaker = "シュティレ"
# 「目的とした２セットは無理でしたが、ここは１セットだけでも十分な戦果と言えます！」
line = "「目的とした２セットは無理でしたが、ここは１セットだけでも十分な戦果と言えます！」"

[[dialogue]]
speaker = "シュティレ"
# 「会長、すみませんでした。１日中、連れ回してしまって……」
line = "「会長、すみませんでした。１日中、連れ回してしまって……」"

[[dialogue]]
speaker = "シュティレ"
# 「気にしなくていい、ですか？　お気遣いありがとうございます。では、清算してきま──」
line = "「気にしなくていい、ですか？　お気遣いありがとうございます。では、清算してきま──」"

[[dialogue]]
speaker = "男の子"
# 「うわああああん！　やだあ！　ギガンドム、欲しいー！！」
line = "「うわああああん！　やだあ！　ギガンドム、欲しいー！！」"

[[dialogue]]
speaker = "男の子の父"
# 「ごめんなー、お父さんが予約を忘れちゃったから……ほ、他のお店に行こうか。きっとまだ……」
line = "「ごめんなー、お父さんが予約を忘れちゃったから……ほ、他のお店に行こうか。きっとまだ……」"

[[dialogue]]
speaker = "男の子"
# 「もうどこにもないよー！　いっぱい歩いたもん！　欲しい欲しい欲しいー！！　わああああん！！」
line = "「もうどこにもないよー！　いっぱい歩いたもん！　欲しい欲しい欲しいー！！　わああああん！！」"

[[dialogue]]
speaker = "シュティレ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "シュティレ"
# 「しょぼーん……なんで譲っちゃったんでしょう……」
line = "「しょぼーん……なんで譲っちゃったんでしょう……」"

[[dialogue]]
speaker = "シュティレ"
# 「ギガンドムの主人公なら絶対に譲る、そう思ったらつい……ううぅう……限定版ギガンドム……組み立てたかったです……」
line = "「ギガンドムの主人公なら絶対に譲る、そう思ったらつい……ううぅう……限定版ギガンドム……組み立てたかったです……」"

[[dialogue]]
speaker = "unk"
# 立派だったよ、シュティレ
line = "立派だったよ、シュティレ"

[[dialogue]]
speaker = "シュティレ"
# 「……別に褒められるようなことじゃありません。それよりも、会長の貴重な休日を無駄にしてしまってすみませんでした」
line = "「……別に褒められるようなことじゃありません。それよりも、会長の貴重な休日を無駄にしてしまってすみませんでした」"

[[dialogue]]
speaker = "シュティレ"
# 「ところで、あの、ここでしばらく待機ってどういうことですか？」
line = "「ところで、あの、ここでしばらく待機ってどういうことですか？」"

[[dialogue]]
speaker = "unk"
# あ──ようやく来た。おーい！
line = "あ──ようやく来た。おーい！"

[[dialogue]]
speaker = "若い男"
# 「まったくキミも無茶なことを言うね～。限定版ギガンドムを譲ってくれ～、だなんてさ」
line = "「まったくキミも無茶なことを言うね～。限定版ギガンドムを譲ってくれ～、だなんてさ」"

[[dialogue]]
speaker = "シュティレ"
# 「えっ……！？」
line = "「えっ……！？」"

[[dialogue]]
speaker = "若い男"
# 「まあ俺は２個買うよ？　制作用と改造用でさ。他の奴なら絶対に無理だけど……キミには昔、ずいぶん助けてもらったしな。はいよ、どーぞ」
line = "「まあ俺は２個買うよ？　制作用と改造用でさ。他の奴なら絶対に無理だけど……キミには昔、ずいぶん助けてもらったしな。はいよ、どーぞ」"

[[dialogue]]
speaker = "若い男"
# 「──ん？　キミじゃない？　こっちの女の子が欲しいのかい！？　へぇ～！　お嬢ちゃん、いい趣味してるね！」
line = "「──ん？　キミじゃない？　こっちの女の子が欲しいのかい！？　へぇ～！　お嬢ちゃん、いい趣味してるね！」"

[[dialogue]]
speaker = "シュティレ"
# 「え、あ、あのっ……も、模型屋の店長さん……ですか？」
line = "「え、あ、あのっ……も、模型屋の店長さん……ですか？」"

[[dialogue]]
speaker = "若い男"
# 「いいや？　俺はただの倉庫バイトだよ。プラモデル作るのは趣味だけど。彼とはバイト友達。今でもたまに遊んだりするんだ」
line = "「いいや？　俺はただの倉庫バイトだよ。プラモデル作るのは趣味だけど。彼とはバイト友達。今でもたまに遊んだりするんだ」"

[[dialogue]]
speaker = "シュティレ"
# 「……驚きました。まさか模型作りが趣味のご友人に、交渉をしていただけただなんて」
line = "「……驚きました。まさか模型作りが趣味のご友人に、交渉をしていただけただなんて」"

[[dialogue]]
speaker = "シュティレ"
# 「会長。どうしてそこまで……」
line = "「会長。どうしてそこまで……」"

[[dialogue]]
speaker = "unk"
# かっこいいなって思ったから
line = "かっこいいなって思ったから"

[[dialogue]]
speaker = "unk"
# 男の子に譲ったところを見て
line = "男の子に譲ったところを見て"

[[dialogue]]
speaker = "シュティレ"
# 「シュティレが……かっこいい？」
line = "「シュティレが……かっこいい？」"

[[dialogue]]
speaker = "シュティレ"
# 「……初めて言われました、そんなこと」
line = "「……初めて言われました、そんなこと」"

[[dialogue]]
speaker = "unk"
# シュティレという女の子は、マイペースで独特の雰囲気を持っていて、多くの人が『変わった子』だと評すると思う。
line = "シュティレという女の子は、マイペースで独特の雰囲気を持っていて、多くの人が『変わった子』だと評すると思う。"

[[dialogue]]
speaker = "unk"
# だけど無表情なのは、その表層だけだ。
line = "だけど無表情なのは、その表層だけだ。"

[[dialogue]]
speaker = "unk"
# 自分の大切なものを手放してまで、他人の幸せを願える──簡単なようでとても難しいことだと思う。彼女の深いところにあるのは、純粋さと優しさだ。
line = "自分の大切なものを手放してまで、他人の幸せを願える──簡単なようでとても難しいことだと思う。彼女の深いところにあるのは、純粋さと優しさだ。"

[[dialogue]]
speaker = "unk"
# 俺はこの日から、シュティレのことを魅力的な女の子として意識するようになったのだった──
line = "俺はこの日から、シュティレのことを魅力的な女の子として意識するようになったのだった──"
