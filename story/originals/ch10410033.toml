[[dialogue]]
speaker = "unk"
# 第３話,会長の可愛いバニーを見てみたい♪,P
line = "第３話,会長の可愛いバニーを見てみたい♪,P"

[[dialogue]]
speaker = "unk"
# ある日の放課後。星徒会室で１人さみしく事務仕事を片付けていたら、マインがやってきた──
line = "ある日の放課後。星徒会室で１人さみしく事務仕事を片付けていたら、マインがやってきた──"

[[dialogue]]
speaker = "ネーゼマイン"
# 「会長、お仕事お疲れ様～♪　お菓子の差し入れ持ってきたよ！」
line = "「会長、お仕事お疲れ様～♪　お菓子の差し入れ持ってきたよ！」"

[[dialogue]]
speaker = "unk"
# ありがとう、助かるよ
line = "ありがとう、助かるよ"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ついでにお茶も淹れてあげるね。座って待ってて～」
line = "「ついでにお茶も淹れてあげるね。座って待ってて～」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「星徒会役員じゃないのに、すっかりどこに何があるか覚えちゃったなー。にひひ♪」
line = "「星徒会役員じゃないのに、すっかりどこに何があるか覚えちゃったなー。にひひ♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「会長も今度、公安の事務所に遊びに来てよ。部外者は駄目だけど、会長ならぜんぜんＯＫだと思うし……」
line = "「会長も今度、公安の事務所に遊びに来てよ。部外者は駄目だけど、会長ならぜんぜんＯＫだと思うし……」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「は～い、どうぞ♪　召し上がれ～♪」
line = "「は～い、どうぞ♪　召し上がれ～♪」"

[[dialogue]]
speaker = "unk"
# テーブルの上に置かれたケーキも紅茶も美味しそう──だが、１つだけ違和感というか、拭いきれない懸念がある。
line = "テーブルの上に置かれたケーキも紅茶も美味しそう──だが、１つだけ違和感というか、拭いきれない懸念がある。"

[[dialogue]]
speaker = "unk"
# なぜなら……そろそろ周期的に、マインがイタズラをしたくなるタイミングだからだ！！
line = "なぜなら……そろそろ周期的に、マインがイタズラをしたくなるタイミングだからだ！！"

[[dialogue]]
speaker = "unk"
# この紅茶、不思議な香りがするね？
line = "この紅茶、不思議な香りがするね？"

[[dialogue]]
speaker = "ネーゼマイン"
# 「うん。もらい物なんだ～。何でも市販されてないレアフレーバーなんだって！」
line = "「うん。もらい物なんだ～。何でも市販されてないレアフレーバーなんだって！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「えー♪　何も入れてないよ～……本当だってば！　嘘はついてない！」
line = "「えー♪　何も入れてないよ～……本当だってば！　嘘はついてない！」"

[[dialogue]]
speaker = "unk"
# じゃあ、誰から貰った紅茶……？
line = "じゃあ、誰から貰った紅茶……？"

[[dialogue]]
speaker = "ネーゼマイン"
# 「アニマ先輩！」
line = "「アニマ先輩！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「わぉ♪　すっごいスウェーバック♪」
line = "「わぉ♪　すっごいスウェーバック♪」"

[[dialogue]]
speaker = "unk"
# 絶対に飲まないぞ！！
line = "絶対に飲まないぞ！！"

[[dialogue]]
speaker = "ネーゼマイン"
# 「そんなぁ……しょぼん。会長ってばひどーい……せっかく恋人が心を込めて淹れた紅茶なのに……」
line = "「そんなぁ……しょぼん。会長ってばひどーい……せっかく恋人が心を込めて淹れた紅茶なのに……」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「もー、そんなに警戒しないでよ～♪　毒ってわけじゃないし！」
line = "「もー、そんなに警戒しないでよ～♪　毒ってわけじゃないし！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひ……♪　目的は何って言われても……ちょ～っと会長の可愛いところが見たくなっちゃっただけだよ？」
line = "「にひ……♪　目的は何って言われても……ちょ～っと会長の可愛いところが見たくなっちゃっただけだよ？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ダッチから貰ったバニー服。戦闘服として起動はできないけど、変身自体はできるでしょ？」
line = "「ダッチから貰ったバニー服。戦闘服として起動はできないけど、変身自体はできるでしょ？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「だからさ、その紅茶──女体化できる紅茶を使って女の子になって？　もっかいバニーになった可愛い会長を見～せ～て♪」
line = "「だからさ、その紅茶──女体化できる紅茶を使って女の子になって？　もっかいバニーになった可愛い会長を見～せ～て♪」"

[[dialogue]]
speaker = "unk"
# ──断る！！！
line = "──断る！！！"

[[dialogue]]
speaker = "ネーゼマイン"
# 「まぁ、そうだよね～。そう言うに決まってるよね～。おっけー、じゃあ助っ人かもーん！」
line = "「まぁ、そうだよね～。そう言うに決まってるよね～。おっけー、じゃあ助っ人かもーん！」"

[[dialogue]]
speaker = "トワ先生"
# 「話は聞かせてもらったよ、会長くん！！」
line = "「話は聞かせてもらったよ、会長くん！！」"

[[dialogue]]
speaker = "トワ先生"
# 「ダメじゃない！　星騎士として新しい力を手に入れたなら、それはちゃんと学園に報告してくれないと！」
line = "「ダメじゃない！　星騎士として新しい力を手に入れたなら、それはちゃんと学園に報告してくれないと！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ごめんねー、会長♪　先生と雑談してたら、ついつい会長がめっちゃ可愛いバニー服をアステラカジノで手に入れたこと、喋っちゃった♪」
line = "「ごめんねー、会長♪　先生と雑談してたら、ついつい会長がめっちゃ可愛いバニー服をアステラカジノで手に入れたこと、喋っちゃった♪」"

[[dialogue]]
speaker = "トワ先生"
# 「アステラで敵から渡された戦闘服だなんて……ちゃんと調査しないと危ないから！　先生命令です！　今すぐ変身しなさい！」
line = "「アステラで敵から渡された戦闘服だなんて……ちゃんと調査しないと危ないから！　先生命令です！　今すぐ変身しなさい！」"

[[dialogue]]
speaker = "unk"
# もう他には誰にも言ってないよね！？
line = "もう他には誰にも言ってないよね！？"

[[dialogue]]
speaker = "unk"
# マイン、あれは内緒って言っただろ！？
line = "マイン、あれは内緒って言っただろ！？"

[[dialogue]]
speaker = "ネーゼマイン"
# 「あ～……う～ん♪　私もそのつもりだったんだけどさー……ごめんね☆」
line = "「あ～……う～ん♪　私もそのつもりだったんだけどさー……ごめんね☆」"

[[dialogue]]
speaker = "ヒトリ"
# 「バニーに変身した、てぇてぇ会長が見られるって本当ですかっ！？」
line = "「バニーに変身した、てぇてぇ会長が見られるって本当ですかっ！？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「うん、これからお披露目だよ～♪」
line = "「うん、これからお披露目だよ～♪」"

[[dialogue]]
speaker = "ヒトリ"
# 「よ、よかったです、間に合いました……！」
line = "「よ、よかったです、間に合いました……！」"

[[dialogue]]
speaker = "トワ先生"
# 「ほら！　早く女の子になって、会長くん！」
line = "「ほら！　早く女の子になって、会長くん！」"

[[dialogue]]
speaker = "unk"
# ゆーちゃん、助けて！！
line = "ゆーちゃん、助けて！！"

[[dialogue]]
speaker = "ヒトリ"
# 「て～て～♪（カップを差し出す）」
line = "「て～て～♪（カップを差し出す）」"

[[dialogue]]
speaker = "unk"
# いやだあああああああ！！！
line = "いやだあああああああ！！！"

[[dialogue]]
speaker = "unk"
# そうして俺は再び、女体化バニーをお披露目することになったのだった……
line = "そうして俺は再び、女体化バニーをお披露目することになったのだった……"
