[[dialogue]]
speaker = "unk"
# 第７話,フィーニスの塔・第零階層,B
line = "第７話,フィーニスの塔・第零階層,B"

[[dialogue]]
speaker = "unk"
# そうして──俺たちは魔界の広大な原野をひたすらに<ruby=か>翔</ruby>け抜けた。
line = "そうして──俺たちは魔界の広大な原野をひたすらに<ruby>翔<rt>か</rt></ruby>け抜けた。"

[[dialogue]]
speaker = "unk"
# ひたすら西へ、西へ……
line = "ひたすら西へ、西へ……"

[[dialogue]]
speaker = "unk"
# それだけで一冊の旅行記が書けそうなくらい、過酷な道のりだったけれど、難を乗り越えて俺たちはシャリオン地方へ達した。
line = "それだけで一冊の旅行記が書けそうなくらい、過酷な道のりだったけれど、難を乗り越えて俺たちはシャリオン地方へ達した。"

[[dialogue]]
speaker = "unk"
# そして塔の入り口は、打ち捨てられた遺跡の中心にあった。
line = "そして塔の入り口は、打ち捨てられた遺跡の中心にあった。"

[[dialogue]]
speaker = "クロト"
# 「サーシャさん──それじゃ、ここが……！？」
line = "「サーシャさん──それじゃ、ここが……！？」"

[[dialogue]]
speaker = "サーシャ"
# 「ええ。そのはずよ。もちろん立ち入り厳禁だけど──今さら気にかけてる場合じゃないわね」
line = "「ええ。そのはずよ。もちろん立ち入り厳禁だけど──今さら気にかけてる場合じゃないわね」"

[[dialogue]]
speaker = "unk"
# シャリオン地方にそびえるフィーニスの塔は、外観から流星市国のそれと大きく異なっていた。
line = "シャリオン地方にそびえるフィーニスの塔は、外観から流星市国のそれと大きく異なっていた。"

[[dialogue]]
speaker = "unk"
# そして、その内部も……
line = "そして、その内部も……"

[[dialogue]]
speaker = "ユウリ"
# 「おいおい……なんだここ」
line = "「おいおい……なんだここ」"

[[dialogue]]
speaker = "フィオナ"
# 「これが……フィーニスの塔……なのですか？」
line = "「これが……フィーニスの塔……なのですか？」"

[[dialogue]]
speaker = "ソフィア"
# 「話には聞いていましたが……本当に、ガラリと中身が変わるんですね」
line = "「話には聞いていましたが……本当に、ガラリと中身が変わるんですね」"

[[dialogue]]
speaker = "クロト"
# 「第零層──想像してたより異質だな」
line = "「第零層──想像してたより異質だな」"

[[dialogue]]
speaker = "unk"
# これまでのどの層とも異なる空間が広がっていた。
line = "これまでのどの層とも異なる空間が広がっていた。"

[[dialogue]]
speaker = "unk"
# フィーニスの塔内部といえば、各層はどれも『ヒトの文明』を感じさせる様相だったにもかかわらず、ここはどこまでも無機質で寒々しい。
line = "フィーニスの塔内部といえば、各層はどれも『ヒトの文明』を感じさせる様相だったにもかかわらず、ここはどこまでも無機質で寒々しい。"

[[dialogue]]
speaker = "unk"
# 塔の『制覇者』であった学園長の記憶にもなかった、完全なる未開の層──
line = "塔の『制覇者』であった学園長の記憶にもなかった、完全なる未開の層──"

[[dialogue]]
speaker = "ユウリ"
# 「零層ってことは、ここより下はねえ。でもって登ってさえいきゃあ……人間界にもたどり着くって話だったな？　フィオナ」
line = "「零層ってことは、ここより下はねえ。でもって登ってさえいきゃあ……人間界にもたどり着くって話だったな？　フィオナ」"

[[dialogue]]
speaker = "フィオナ"
# 「はい。魔界、人間界、天界と──どこにあってもフィーニスの塔だけは同じ軸を貫きます」
line = "「はい。魔界、人間界、天界と──どこにあってもフィーニスの塔だけは同じ軸を貫きます」"

[[dialogue]]
speaker = "フィオナ"
# 「よって、このまま上昇していけば……学園の敷地内に着くはずです」
line = "「よって、このまま上昇していけば……学園の敷地内に着くはずです」"

[[dialogue]]
speaker = "マトイ"
# 「魔界から人間界まで……か。そう聞くとキリがなさそうだけど」
line = "「魔界から人間界まで……か。そう聞くとキリがなさそうだけど」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ま、行くっきゃないわね！　ここしか残された道がないなら」
line = "「ま、行くっきゃないわね！　ここしか残された道がないなら」"

[[dialogue]]
speaker = "クロト"
# 「一応──俺たちも塔を昇ることに関しちゃ慣れたものだしな。行くぞ」
line = "「一応──俺たちも塔を昇ることに関しちゃ慣れたものだしな。行くぞ」"

[[dialogue]]
speaker = "unk"
# 人間界へ戻るために。今までで最も特異な層の攻略が始まった。
line = "人間界へ戻るために。今までで最も特異な層の攻略が始まった。"

[[dialogue]]
speaker = "ソフィア"
# 「気をつけましょう。こんな不思議な空間……何が飛び出してきてもおかしくありません……！」
line = "「気をつけましょう。こんな不思議な空間……何が飛び出してきてもおかしくありません……！」"

[[dialogue]]
speaker = "サーシャ"
# 「そうね──ん？」
line = "「そうね──ん？」"

[[dialogue]]
speaker = "ガーディアン"
# 「ポロポロ……パロパロ……ピピ、ガガガ」
line = "「ポロポロ……パロパロ……ピピ、ガガガ」"

[[dialogue]]
speaker = "ガーディアン"
# 「エネミー発見。エネミー発見。迎撃モードに移行シマス」
line = "「エネミー発見。エネミー発見。迎撃モードに移行シマス」"

[[dialogue]]
speaker = "マトイ"
# 「なんだ、ガーディアン。むしろ見慣れてるぶん安心しちゃうくらい」
line = "「なんだ、ガーディアン。むしろ見慣れてるぶん安心しちゃうくらい」"

[[dialogue]]
speaker = "ニャリオン"
# 「そうニャね。あれがいるニャら、ここがフィーニスの塔の中ってわかるニャン」
line = "「そうニャね。あれがいるニャら、ここがフィーニスの塔の中ってわかるニャン」"

[[dialogue]]
speaker = "ヴィーナス"
# 「んじゃ──ちゃっちゃと倒しちゃいましょ♪」
line = "「んじゃ──ちゃっちゃと倒しちゃいましょ♪」"

[[dialogue]]
speaker = "unk"
# 例によって俺たちを侵入者とみなしてきたガーディアンたちを、慣れた星術さばきで掃討していく。
line = "例によって俺たちを侵入者とみなしてきたガーディアンたちを、慣れた星術さばきで掃討していく。"

[[dialogue]]
speaker = "ヴィーナス"
# 「楽勝、楽勝。今さら私たちの相手じゃないわね！」
line = "「楽勝、楽勝。今さら私たちの相手じゃないわね！」"

[[dialogue]]
speaker = "フィオナ"
# 「ええ。この調子で──」
line = "「ええ。この調子で──」"

[[dialogue]]
speaker = "クロト"
# 「……待った。みんな、あっちを見てくれ」
line = "「……待った。みんな、あっちを見てくれ」"

[[dialogue]]
speaker = "ユウリ"
# 「んぁ……？」
line = "「んぁ……？」"

[[dialogue]]
speaker = "ガーディアン"
# 「ピ……ガガ……起動完了。起動完了。Ｃ区域へ移動シマス」
line = "「ピ……ガガ……起動完了。起動完了。Ｃ区域へ移動シマス」"

[[dialogue]]
speaker = "ガーディアン"
# 「ウィーン……ウィーン……環境の瘴気を測定。異常アリ。異常アリ」
line = "「ウィーン……ウィーン……環境の瘴気を測定。異常アリ。異常アリ」"

[[dialogue]]
speaker = "unk"
# 俺たちが目をやった一角では──
line = "俺たちが目をやった一角では──"

[[dialogue]]
speaker = "unk"
# 落とし穴のような<ruby=かんせい>陥穽</ruby>から、新たなガーディアンたちが無数に湧き出てきていた。
line = "落とし穴のような<ruby>陥穽<rt>かんせい</rt></ruby>から、新たなガーディアンたちが無数に湧き出てきていた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「な──何よあれ！　ガーディアン製造工場！？」
line = "「な──何よあれ！　ガーディアン製造工場！？」"

[[dialogue]]
speaker = "ソフィア"
# 「１０……１１……１２……ああ、数え切れません。ひっきりなしに出てきてます」
line = "「１０……１１……１２……ああ、数え切れません。ひっきりなしに出てきてます」"

[[dialogue]]
speaker = "ユウリ"
# 「なんつー光景だよ……」
line = "「なんつー光景だよ……」"

[[dialogue]]
speaker = "unk"
# おびただしいまでの頭数が湧き上がるガーディアンたち。
line = "おびただしいまでの頭数が湧き上がるガーディアンたち。"

[[dialogue]]
speaker = "unk"
# しかし彼らは襲ってくることなく、右へ左へと散開していった。
line = "しかし彼らは襲ってくることなく、右へ左へと散開していった。"

[[dialogue]]
speaker = "フィオナ"
# 「あのガーディアンたち……散り散りになっているようですが……」
line = "「あのガーディアンたち……散り散りになっているようですが……」"

[[dialogue]]
speaker = "サーシャ"
# 「飛んで、昇っていく子もいるわね」
line = "「飛んで、昇っていく子もいるわね」"

[[dialogue]]
speaker = "クロト"
# 「これは勘だけど──配置につこうとしているんじゃないか？」
line = "「これは勘だけど──配置につこうとしているんじゃないか？」"

[[dialogue]]
speaker = "フィオナ"
# 「！　なるほど。ここ以外の層にも──ということですか」
line = "「！　なるほど。ここ以外の層にも──ということですか」"

[[dialogue]]
speaker = "ニャリオン"
# 「ってことはニャ……今までのガーディアンも全部ここで造られたのかニャン！？」
line = "「ってことはニャ……今までのガーディアンも全部ここで造られたのかニャン！？」"

[[dialogue]]
speaker = "ユウリ"
# 「ほー……ありえそうだな。ヴィーナスの言う通り、ホントに製造工場なのかもしれん」
line = "「ほー……ありえそうだな。ヴィーナスの言う通り、ホントに製造工場なのかもしれん」"

[[dialogue]]
speaker = "ガーディアン"
# 「ピ──ピピ。有機生命体の反応を感知」
line = "「ピ──ピピ。有機生命体の反応を感知」"

[[dialogue]]
speaker = "ガーディアン"
# 「侵入者発見。侵入者発見。直チニ迎撃体制へ移行する」
line = "「侵入者発見。侵入者発見。直チニ迎撃体制へ移行する」"

[[dialogue]]
speaker = "ヴィーナス"
# 「って、またロックオンされてるんですけど──！？」
line = "「って、またロックオンされてるんですけど──！？」"

[[dialogue]]
speaker = "クロト"
# 「当然、入り口の門番も無限に生成されるってわけだ」
line = "「当然、入り口の門番も無限に生成されるってわけだ」"

[[dialogue]]
speaker = "マトイ"
# 「き、きりがない……！」
line = "「き、きりがない……！」"

[[dialogue]]
speaker = "クロト"
# 「こうなると──いつどこからガーディアンが出てくるかわからない。気を引き締めていくぞ」
line = "「こうなると──いつどこからガーディアンが出てくるかわからない。気を引き締めていくぞ」"

[[dialogue]]
speaker = "フィオナ"
# 「ええ。普段通りのオペレーションができれば、負けないはずです」
line = "「ええ。普段通りのオペレーションができれば、負けないはずです」"

[[dialogue]]
speaker = "ユウリ"
# 「おうっ！」
line = "「おうっ！」"
