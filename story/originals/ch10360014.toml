[[dialogue]]
speaker = "unk"
# 第４話,恋愛初黒星,P
line = "第４話,恋愛初黒星,P"

[[dialogue]]
speaker = "フェニエル"
# 「あの、お姉様！　私、聞きたいことがありまして！」
line = "「あの、お姉様！　私、聞きたいことがありまして！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「あら、どうしましたのフニ？　何だかそわそわして……」
line = "「あら、どうしましたのフニ？　何だかそわそわして……」"

[[dialogue]]
speaker = "フェニエル"
# 「もしかしてお姉様は、その……会長さんとお付き合いされているんですか！？」
line = "「もしかしてお姉様は、その……会長さんとお付き合いされているんですか！？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ですわ！？　ななな、何をいきなり言い出しますの！？」
line = "「ですわ！？　ななな、何をいきなり言い出しますの！？」"

[[dialogue]]
speaker = "フェニエル"
# 「誤解だったらごめんなさい……。でも、何だか最近、いつも一緒に居らっしゃいますし」
line = "「誤解だったらごめんなさい……。でも、何だか最近、いつも一緒に居らっしゃいますし」"

[[dialogue]]
speaker = "フェニエル"
# 「２人の時はお姉様、とても楽しそうな笑顔を浮かべているので、もしかしたらそうなのかなって……」
line = "「２人の時はお姉様、とても楽しそうな笑顔を浮かべているので、もしかしたらそうなのかなって……」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「そ、そんな事実はありませんわ！　ええ、全く！　これっぽっちも！」
line = "「そ、そんな事実はありませんわ！　ええ、全く！　これっぽっちも！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# （と言いつつ、緋宮会長のことを思い浮かべたら、胸が急にドキドキし始めて……これは一体、どういうことですの～～～っ！？）
line = "（と言いつつ、緋宮会長のことを思い浮かべたら、胸が急にドキドキし始めて……これは一体、どういうことですの～～～っ！？）"

[[dialogue]]
speaker = "unk"
# トレーニング仲間になって以来、俺はヒルディー先輩と一緒に、毎朝ランニングもするようになっていた――
line = "トレーニング仲間になって以来、俺はヒルディー先輩と一緒に、毎朝ランニングもするようになっていた――"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ひ、緋宮会長。おはようございますわ」
line = "「ひ、緋宮会長。おはようございますわ」"

[[dialogue]]
speaker = "unk"
# おはようございます、ヒルディー先輩
line = "おはようございます、ヒルディー先輩"

[[dialogue]]
speaker = "ヒルディオーネ"
# （ですわっ！？　ひひひ、緋宮会長の爽やかな笑顔を見ただけで、意識してドキドキしてしまいますわ！？）
line = "（ですわっ！？　ひひひ、緋宮会長の爽やかな笑顔を見ただけで、意識してドキドキしてしまいますわ！？）"

[[dialogue]]
speaker = "ヒルディオーネ"
# （昨日の朝までは普通に接しておりましたのに！　これではまるで、私が本当に緋宮会長のことをす、す、す……）
line = "（昨日の朝までは普通に接しておりましたのに！　これではまるで、私が本当に緋宮会長のことをす、す、す……）"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「って、そんなわけありませんわっ！　こんなことで早朝トレーニングをサボっていたら、負けですのよ！？」
line = "「って、そんなわけありませんわっ！　こんなことで早朝トレーニングをサボっていたら、負けですのよ！？」"

[[dialogue]]
speaker = "unk"
# えっ！？　何が！？
line = "えっ！？　何が！？"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「緋宮会長！　さっさとランニングに行きますわよ……！」
line = "「緋宮会長！　さっさとランニングに行きますわよ……！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「この千園寺ヒルディオーネ、自身の誇りに懸けて、この状況に打ち勝ってみせますわ！」
line = "「この千園寺ヒルディオーネ、自身の誇りに懸けて、この状況に打ち勝ってみせますわ！」"

[[dialogue]]
speaker = "unk"
# （何かまた先輩が面白いことになってる！？）
line = "（何かまた先輩が面白いことになってる！？）"

[[dialogue]]
speaker = "ヒルディオーネ"
# （……と、気合いを入れてランニングを始めたものの）
line = "（……と、気合いを入れてランニングを始めたものの）"

[[dialogue]]
speaker = "ヒルディオーネ"
# （緋宮会長に意識が向いて、全然集中できませんわ！？　いやむしろ、緋宮会長に意識が集中してしまってますわ！）
line = "（緋宮会長に意識が向いて、全然集中できませんわ！？　いやむしろ、緋宮会長に意識が集中してしまってますわ！）"

[[dialogue]]
speaker = "ヒルディオーネ"
# （……前々から思ってましたけれど、緋宮会長は細く見えて、実は筋肉で引き締まった体付きをしておりますのよね。私の好みな、いわゆる細マッチョというやつですわ！）
line = "（……前々から思ってましたけれど、緋宮会長は細く見えて、実は筋肉で引き締まった体付きをしておりますのよね。私の好みな、いわゆる細マッチョというやつですわ！）"

[[dialogue]]
speaker = "ヒルディオーネ"
# （それに特別、殿方の顔にこだわりはありませんでしたけど……緋宮会長はよく見ると、整った顔立ちをしておりますわよね）
line = "（それに特別、殿方の顔にこだわりはありませんでしたけど……緋宮会長はよく見ると、整った顔立ちをしておりますわよね）"

[[dialogue]]
speaker = "ヒルディオーネ"
# （派手で目立つわけではないですけれど、その分親しみやすくて、見ていて安心出来ますのよね）
line = "（派手で目立つわけではないですけれど、その分親しみやすくて、見ていて安心出来ますのよね）"

[[dialogue]]
speaker = "ヒルディオーネ"
# （それでいて、戦闘時には驚くくらい凛々しい表情を浮かべたりもして……男らしさに不足はありませんわ）
line = "（それでいて、戦闘時には驚くくらい凛々しい表情を浮かべたりもして……男らしさに不足はありませんわ）"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「って、私は先程から何を考えてますの！？　思考が変な方向にランニングしてますわよ！？」
line = "「って、私は先程から何を考えてますの！？　思考が変な方向にランニングしてますわよ！？」"

[[dialogue]]
speaker = "unk"
# だ、大丈夫ですか、先輩……？
line = "だ、大丈夫ですか、先輩……？"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「え！？　お、おーっほっほっほ！　全然、これっぽっちも大したことじゃありませんのよ、緋宮会長！」
line = "「え！？　お、おーっほっほっほ！　全然、これっぽっちも大したことじゃありませんのよ、緋宮会長！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# （相手を心から気遣おうとする……こういう優しいところも、緋宮会長の美点ですわ）
line = "（相手を心から気遣おうとする……こういう優しいところも、緋宮会長の美点ですわ）"

[[dialogue]]
speaker = "ヒルディオーネ"
# （マナーをどこかで学んだわけではないのでしょうが、さり気なく紳士的で、純粋に女性をエスコートしようとする心持ち……悪くないですわ）
line = "（マナーをどこかで学んだわけではないのでしょうが、さり気なく紳士的で、純粋に女性をエスコートしようとする心持ち……悪くないですわ）"

[[dialogue]]
speaker = "ヒルディオーネ"
# （というか……あれ？　男性として、緋宮会長のことが、全然嫌ではありませんわ。むしろ十分に好感の持てる……）
line = "（というか……あれ？　男性として、緋宮会長のことが、全然嫌ではありませんわ。むしろ十分に好感の持てる……）"

[[dialogue]]
speaker = "ヒルディオーネ"
# （それこそ、両親に紹介したくなるくらい……って）
line = "（それこそ、両親に紹介したくなるくらい……って）"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ひ、否定要素が、全然見当たりませんわ～～～っ！？」
line = "「ひ、否定要素が、全然見当たりませんわ～～～っ！？」"

[[dialogue]]
speaker = "unk"
# 顔、なんか赤くなってますよ！？
line = "顔、なんか赤くなってますよ！？"

[[dialogue]]
speaker = "unk"
# いや、本当に大丈夫ですか先輩！？
line = "いや、本当に大丈夫ですか先輩！？"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「へ！？　か、顔ですの！？　そんな、そんなことは……！」
line = "「へ！？　か、顔ですの！？　そんな、そんなことは……！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「あっ！？　た、確かに、顔がとても熱くなってますわっ！？」
line = "「あっ！？　た、確かに、顔がとても熱くなってますわっ！？」"

[[dialogue]]
speaker = "unk"
# ランニングは中止です。熱があるのかも！
line = "ランニングは中止です。熱があるのかも！"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ひゃあっ！？　お、お待ちになって！　今近付かれるのは、むしろ色々とマズいですわ！」
line = "「ひゃあっ！？　お、お待ちになって！　今近付かれるのは、むしろ色々とマズいですわ！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「私なら、だだだ大丈夫ですわ！　<ruby=エトワール・イルソーレ>白昼の極星</ruby>がこれしきのことでトレーニングを中止にするなんて、恥ですもの」
line = "「私なら、だだだ大丈夫ですわ！　<ruby>白昼の極星<rt>エトワール・イルソーレ</rt></ruby>がこれしきのことでトレーニングを中止にするなんて、恥ですもの」"

[[dialogue]]
speaker = "unk"
# 俺は、先輩のことが心配なんです！
line = "俺は、先輩のことが心配なんです！"

[[dialogue]]
speaker = "unk"
# 恥とかどうでもいい！
line = "恥とかどうでもいい！"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「～～～～～～～～～っ！」
line = "「～～～～～～～～～っ！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「わ、私……」
line = "「わ、私……」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「私、緋宮会長のことを、本当に好きになってしまいましたわぁぁぁ～～～～～～～～～っ！！！」
line = "「私、緋宮会長のことを、本当に好きになってしまいましたわぁぁぁ～～～～～～～～～っ！！！」"

[[dialogue]]
speaker = "unk"
# え……？
line = "え……？"

[[dialogue]]
speaker = "unk"
# ちょっ、ヒルディー先輩ぃぃぃ！？
line = "ちょっ、ヒルディー先輩ぃぃぃ！？"

[[dialogue]]
speaker = "unk"
# えええぇぇぇ～～～～っ！！？
line = "えええぇぇぇ～～～～っ！！？"

[[dialogue]]
speaker = "unk"
# 突然の告白に顔が熱くなるのを感じながら、俺は先輩を追い駆け──ランニングを再開するのだった。
line = "突然の告白に顔が熱くなるのを感じながら、俺は先輩を追い駆け──ランニングを再開するのだった。"
