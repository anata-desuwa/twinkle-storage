[[dialogue]]
speaker = "unk"
# ノヴァフォームへと変身したマハムート。その鍛え上げられた圧倒的力の前に、ヒルディオーネは追い詰められていた。
line = "ノヴァフォームへと変身したマハムート。その鍛え上げられた圧倒的力の前に、ヒルディオーネは追い詰められていた。"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「――引力球」
line = "「――引力球」"

[[dialogue]]
speaker = "unk"
# マハムートが指示を飛ばすように手の平をかざすと、小さな黒い球体が無数に生み出され、ヒルディオーネに襲い来る。
line = "マハムートが指示を飛ばすように手の平をかざすと、小さな黒い球体が無数に生み出され、ヒルディオーネに襲い来る。"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「くっ……！？」
line = "「くっ……！？」"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「引力操作」
line = "「引力操作」"

[[dialogue]]
speaker = "unk"
# なんとか回避しようと飛び回るヒルディオーネだが、マハムートの能力によって無理矢理引力球の方に引き寄せられる。しかも、どの引力球に引っ張られるか予測ができない。
line = "なんとか回避しようと飛び回るヒルディオーネだが、マハムートの能力によって無理矢理引力球の方に引き寄せられる。しかも、どの引力球に引っ張られるか予測ができない。"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ミラージュブレイカーッ！」
line = "「ミラージュブレイカーッ！」"

[[dialogue]]
speaker = "unk"
# 引力球を破壊しようと、槍のドリルを回転させて突き付ける――が、しかし。
line = "引力球を破壊しようと、槍のドリルを回転させて突き付ける――が、しかし。"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「っ……砕けない……！」
line = "「っ……砕けない……！」"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「無駄よ――ブラックホールブレイザー！」
line = "「無駄よ――ブラックホールブレイザー！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「かっ……はっ……！」
line = "「かっ……はっ……！」"

[[dialogue]]
speaker = "unk"
# 包囲した引力球が一斉に大爆発を引き起こし、ヒルディオーネはまた地面へと落下し叩き付けられる。
line = "包囲した引力球が一斉に大爆発を引き起こし、ヒルディオーネはまた地面へと落下し叩き付けられる。"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「はぁ……はぁ……！」
line = "「はぁ……はぁ……！」"

[[dialogue]]
speaker = "unk"
# ふらつく体で、なんとか立ち上がる。
line = "ふらつく体で、なんとか立ち上がる。"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「……ヒルディオーネ、あなたの今の力は、そこまでなのかしら？」
line = "「……ヒルディオーネ、あなたの今の力は、そこまでなのかしら？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# ヒルディオーネは言葉を返すことができない。
line = "ヒルディオーネは言葉を返すことができない。"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「そう……残念ね。――引力球」
line = "「そう……残念ね。――引力球」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ぐうぅっ……！」
line = "「ぐうぅっ……！」"

[[dialogue]]
speaker = "unk"
# マハムートの攻撃を止める手段はなく、引力操作で回避もし切れずにダメージを受け続けるヒルディオーネ。
line = "マハムートの攻撃を止める手段はなく、引力操作で回避もし切れずにダメージを受け続けるヒルディオーネ。"

[[dialogue]]
speaker = "unk"
# スチームオーバーブーストの効果はもう既に切れ、反動で体の内側からもダメージが来ており、もはや立つのもやっと。
line = "スチームオーバーブーストの効果はもう既に切れ、反動で体の内側からもダメージが来ており、もはや立つのもやっと。"

[[dialogue]]
speaker = "ヒルディオーネ"
# （結局、私は今この瞬間まで、覚醒に至れなかった……）
line = "（結局、私は今この瞬間まで、覚醒に至れなかった……）"

[[dialogue]]
speaker = "unk"
# 星霊舞闘会前日の夜。
line = "星霊舞闘会前日の夜。"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「会長。夜遅くにお呼び立てして、申し訳ございませんわ」
line = "「会長。夜遅くにお呼び立てして、申し訳ございませんわ」"

[[dialogue]]
speaker = "unk"
# 大丈夫です。それで、覚醒には……
line = "大丈夫です。それで、覚醒には……"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「……残念ですが、至れませんでしたわ。掴めそうで、いつまでも手が届かない……我ながら情けない限りですわ」
line = "「……残念ですが、至れませんでしたわ。掴めそうで、いつまでも手が届かない……我ながら情けない限りですわ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ですから……千園寺ヒルディオーネとしての<ruby=プライド>意地</ruby>を突き通すのは、ここまで」
line = "「ですから……千園寺ヒルディオーネとしての<ruby>意地<rt>プライド</rt></ruby>を突き通すのは、ここまで」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「私は流星寮の寮長として……３年生の先輩として、責務を果たさねばなりませんの」
line = "「私は流星寮の寮長として……３年生の先輩として、責務を果たさねばなりませんの」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「なので、会長。お願い致しますわ……私に、アルケインコードを――」
line = "「なので、会長。お願い致しますわ……私に、アルケインコードを――」"

[[dialogue]]
speaker = "unk"
# それは少し、待ってあげて下さい
line = "それは少し、待ってあげて下さい"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「え……？」
line = "「え……？」"

[[dialogue]]
speaker = "フェニエル"
# 「お姉様っ……！」
line = "「お姉様っ……！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「フニ……？　それに、あなた達……！」
line = "「フニ……？　それに、あなた達……！」"

[[dialogue]]
speaker = "unk"
# ヒルディオーネが振り返ると、フェニエルと――その他にも流星寮の寮生たちが大勢、ロビーに集まってきていた。
line = "ヒルディオーネが振り返ると、フェニエルと――その他にも流星寮の寮生たちが大勢、ロビーに集まってきていた。"

[[dialogue]]
speaker = "寮生Ａ"
# 「ヒルディーお姉様！　無理にノヴァフォームに覚醒する必要なんてございませんわ！」
line = "「ヒルディーお姉様！　無理にノヴァフォームに覚醒する必要なんてございませんわ！」"

[[dialogue]]
speaker = "寮生Ｂ"
# 「そうです！　私たちの為に、お姉様が進もうとしている道を諦めたりなどしないで下さいまし！」
line = "「そうです！　私たちの為に、お姉様が進もうとしている道を諦めたりなどしないで下さいまし！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「どうしてそのことを……」
line = "「どうしてそのことを……」"

[[dialogue]]
speaker = "フェニエル"
# 「私と同じです。流星寮の皆さんも、お姉様が悩んでいることに気づいていたんです」
line = "「私と同じです。流星寮の皆さんも、お姉様が悩んでいることに気づいていたんです」"

[[dialogue]]
speaker = "フェニエル"
# 「私たちはいつも、お姉様の背中を見て、流星学園の星騎士として強くなろうと励んできましたから」
line = "「私たちはいつも、お姉様の背中を見て、流星学園の星騎士として強くなろうと励んできましたから」"

[[dialogue]]
speaker = "寮生Ｃ"
# 「ヒルディーお姉様！　星霊祭の優勝で得られるポイントなんて、お気になさらないで下さい！」
line = "「ヒルディーお姉様！　星霊祭の優勝で得られるポイントなんて、お気になさらないで下さい！」"

[[dialogue]]
speaker = "寮生Ｄ"
# 「そんなものよりも、私たちにとっては、お姉様の方が大事なのですわ！」
line = "「そんなものよりも、私たちにとっては、お姉様の方が大事なのですわ！」"

[[dialogue]]
speaker = "寮生Ｅ"
# 「私たち、お姉様には最強の星騎士への道を――自身が１番信じるやり方で進んで頂きたいのです！」
line = "「私たち、お姉様には最強の星騎士への道を――自身が１番信じるやり方で進んで頂きたいのです！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "寮生Ａ"
# 「もしその結果、失敗して負けてしまったとしても、学園対抗杯のポイントは私たちが責任を持って集めますわ！」
line = "「もしその結果、失敗して負けてしまったとしても、学園対抗杯のポイントは私たちが責任を持って集めますわ！」"

[[dialogue]]
speaker = "寮生Ｂ"
# 「そうですわ！　お姉様が信じる道を進んで、たとえ覚醒できなかったとしても、それはきっとお姉様が次に勝利する為に、必要な失敗なんですの！」
line = "「そうですわ！　お姉様が信じる道を進んで、たとえ覚醒できなかったとしても、それはきっとお姉様が次に勝利する為に、必要な失敗なんですの！」"

[[dialogue]]
speaker = "寮生Ｃ"
# 「ですから、失敗を恐れて、自分の信じる道を諦めたりしないで下さいまし、お姉様！」
line = "「ですから、失敗を恐れて、自分の信じる道を諦めたりしないで下さいまし、お姉様！」"

[[dialogue]]
speaker = "寮生Ｄ"
# 「お姉様はご自身の心が望むままに、全力でマムに挑んで下さいませ！」
line = "「お姉様はご自身の心が望むままに、全力でマムに挑んで下さいませ！」"

[[dialogue]]
speaker = "寮生Ｅ"
# 「私たちは――お姉様がお姉様らしく、いちばんカッコよく戦う姿が見たいのですわ！！」
line = "「私たちは――お姉様がお姉様らしく、いちばんカッコよく戦う姿が見たいのですわ！！」"

[[dialogue]]
speaker = "寮生Ａ"
# 「お姉様ーーーっ！！！」
line = "「お姉様ーーーっ！！！」"

[[dialogue]]
speaker = "寮生Ｂ"
# 「頑張ってーーーっ！！！」
line = "「頑張ってーーーっ！！！」"

[[dialogue]]
speaker = "unk"
# マハムートの容赦ない猛攻の中で、ヒルディオーネの意識を繋ぎ止めたのは、観客席から見守る寮生たちの声援だった。
line = "マハムートの容赦ない猛攻の中で、ヒルディオーネの意識を繋ぎ止めたのは、観客席から見守る寮生たちの声援だった。"

[[dialogue]]
speaker = "unk"
# そして――
line = "そして――"

[[dialogue]]
speaker = "フェニエル"
# 「お姉様ぁぁぁーーーっ！！　諦めないで下さいっ！！」
line = "「お姉様ぁぁぁーーーっ！！　諦めないで下さいっ！！」"

[[dialogue]]
speaker = "unk"
# 普段はあまり大きな声を出さないフェニエルも、全力で応援していた。
line = "普段はあまり大きな声を出さないフェニエルも、全力で応援していた。"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「…………マム」
line = "「…………マム」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「私には……あなたのような突き抜けた才能はありませんわ」
line = "「私には……あなたのような突き抜けた才能はありませんわ」"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「……それで？」
line = "「……それで？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「っ……どれだけ努力しても、追いつけない」
line = "「っ……どれだけ努力しても、追いつけない」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「だけど、私……絶対に諦められませんの」
line = "「だけど、私……絶対に諦められませんの」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「私を信じて、こんなにも応援してくれる子たちがいるんですもの」
line = "「私を信じて、こんなにも応援してくれる子たちがいるんですもの」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「あの子たちが信じてくれる限り――」
line = "「あの子たちが信じてくれる限り――」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「私は、決して――」
line = "「私は、決して――」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「自分を信じるのを、最後まで諦めるわけにはいかないのですわ！！！」
line = "「自分を信じるのを、最後まで諦めるわけにはいかないのですわ！！！」"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「……ええ、知っている。だから――」
line = "「……ええ、知っている。だから――」"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「畏怖をもって、今からでも追いついてみせなさい！　千園寺ヒルディオーネっ！！」
line = "「畏怖をもって、今からでも追いついてみせなさい！　千園寺ヒルディオーネっ！！」"

[[dialogue]]
speaker = "unk"
# マハムートが口を開く。そこに強大な星力が紅蓮の炎色を帯びて、収束して行く。
line = "マハムートが口を開く。そこに強大な星力が紅蓮の炎色を帯びて、収束して行く。"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「ドラゴニックノヴァフレアッ！！！」
line = "「ドラゴニックノヴァフレアッ！！！」"

[[dialogue]]
speaker = "unk"
# それは竜形態の時に見せたものよりも遥かに鋭く、高密度のレーザーのような、竜の<ruby=ブレス>息吹</ruby>。
line = "それは竜形態の時に見せたものよりも遥かに鋭く、高密度のレーザーのような、竜の<ruby>息吹<rt>ブレス</rt></ruby>。"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「はああぁぁぁーーーっ！！！」
line = "「はああぁぁぁーーーっ！！！」"

[[dialogue]]
speaker = "unk"
# 引力操作によって、その場に強制固定されたヒルディオーネは、それを槍で真正面から受け止める。
line = "引力操作によって、その場に強制固定されたヒルディオーネは、それを槍で真正面から受け止める。"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ぐううぅっ！！」
line = "「ぐううぅっ！！」"

[[dialogue]]
speaker = "unk"
# 全力でドリルを回転させ、マハムートの炎を無効化しようとする。
line = "全力でドリルを回転させ、マハムートの炎を無効化しようとする。"

[[dialogue]]
speaker = "unk"
# だが、高密度の炎を貫くことは叶わず――ピシッと嫌な音と共に、槍に大きな亀裂が走る。
line = "だが、高密度の炎を貫くことは叶わず――ピシッと嫌な音と共に、槍に大きな亀裂が走る。"

[[dialogue]]
speaker = "unk"
# それでも――
line = "それでも――"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「諦めませんわ……！　絶対に……っ！！」
line = "「諦めませんわ……！　絶対に……っ！！」"

[[dialogue]]
speaker = "フェニエル"
# 「お姉様ーーーっ！　自分を信じてっ！！」
line = "「お姉様ーーーっ！　自分を信じてっ！！」"

[[dialogue]]
speaker = "フェニエル"
# 「けっぱるべーーーっ！！！」
line = "「けっぱるべーーーっ！！！」"

[[dialogue]]
speaker = "unk"
# フェニエルが――後輩たちが信じてくれる自分を、決して諦めない。
line = "フェニエルが――後輩たちが信じてくれる自分を、決して諦めない。"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「私は――」
line = "「私は――」"

[[dialogue]]
speaker = "unk"
# 千園寺ヒルディオーネは、立ちはだかる圧倒的力を前に、決して目を逸らさない！
line = "千園寺ヒルディオーネは、立ちはだかる圧倒的力を前に、決して目を逸らさない！"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「私の不可能を、打ち砕いてみせますわっ！！」
line = "「私の不可能を、打ち砕いてみせますわっ！！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ミラージュ――ブレイカァァァーーーッ！！！」
line = "「ミラージュ――ブレイカァァァーーーッ！！！」"

[[dialogue]]
speaker = "unk"
# 大爆発が起き、ヒルディオーネの体が炎に飲み込まれていく。
line = "大爆発が起き、ヒルディオーネの体が炎に飲み込まれていく。"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "フェニエル"
# 「お姉様……！」
line = "「お姉様……！」"

[[dialogue]]
speaker = "unk"
# アリーナの全員が目撃する。
line = "アリーナの全員が目撃する。"

[[dialogue]]
speaker = "unk"
# 炎の中から、羽化する蝶のように新たな一対の羽が生まれて、４枚の翼が広がるのを。
line = "炎の中から、羽化する蝶のように新たな一対の羽が生まれて、４枚の翼が広がるのを。"

[[dialogue]]
speaker = "unk"
# そして――
line = "そして――"

[[dialogue]]
speaker = "unk"
# 極星は白昼に輝く。
line = "極星は白昼に輝く。"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「壁を……やっと打ち砕きましたわ」
line = "「壁を……やっと打ち砕きましたわ」"

[[dialogue]]
speaker = "unk"
# ――そこには、新たな戦闘服に身を纏ったヒルディオーネが立っていた。
line = "――そこには、新たな戦闘服に身を纏ったヒルディオーネが立っていた。"

[[dialogue]]
speaker = "unk"
# ヒビ割れて砕けた槍の破片が、地面に落ちていく。その下からは、進化した新たな槍が姿を現す。
line = "ヒビ割れて砕けた槍の破片が、地面に落ちていく。その下からは、進化した新たな槍が姿を現す。"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「……私、もし自分で覚醒することができたら、決めていましたの。新フォームの名前を」
line = "「……私、もし自分で覚醒することができたら、決めていましたの。新フォームの名前を」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「流星寮の寮長として、あなたのノヴァフォームの対となる――」
line = "「流星寮の寮長として、あなたのノヴァフォームの対となる――」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「『ミーティアフォーム』。それが、この新たな姿の名前ですわ」
line = "「『ミーティアフォーム』。それが、この新たな姿の名前ですわ」"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「……ふっ」
line = "「……ふっ」"

[[dialogue]]
