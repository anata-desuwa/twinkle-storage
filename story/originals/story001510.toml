[[dialogue]]
speaker = "unk"
# 今回の一件はまだ終わっていない――そう言ったサチに、俺は緩みかけていた気を引き締める。
line = "今回の一件はまだ終わっていない――そう言ったサチに、俺は緩みかけていた気を引き締める。"

[[dialogue]]
speaker = "シズハ"
# 「サチちゃん、一体どういうことなの……？」
line = "「サチちゃん、一体どういうことなの……？」"

[[dialogue]]
speaker = "サチ"
# 「シズハちゃんは、『解放』のロストアイテムを初めて見たのはどのタイミングだったか、覚えてる？」
line = "「シズハちゃんは、『解放』のロストアイテムを初めて見たのはどのタイミングだったか、覚えてる？」"

[[dialogue]]
speaker = "シズハ"
# 「え？　えっと……サチちゃんとプリムラちゃんがロストアイテムを回収し始めようと変身して、その直後、駆け付けた時に……」
line = "「え？　えっと……サチちゃんとプリムラちゃんがロストアイテムを回収し始めようと変身して、その直後、駆け付けた時に……」"

[[dialogue]]
speaker = "サチ"
# 「ということは、それ以前は『解放』のロストアイテムと接触した覚えがないんだよね？」
line = "「ということは、それ以前は『解放』のロストアイテムと接触した覚えがないんだよね？」"

[[dialogue]]
speaker = "シズハ"
# 「うん。仮に、私が気づかない間に接近したとしても、ディーちゃんが気づくはずだから……」
line = "「うん。仮に、私が気づかない間に接近したとしても、ディーちゃんが気づくはずだから……」"

[[dialogue]]
speaker = "サチ"
# 「だとしたら、おかしいのはあの時、『解放』のロストアイテムが能力をまだ発動する素振りがなかったのにも関わらず――」
line = "「だとしたら、おかしいのはあの時、『解放』のロストアイテムが能力をまだ発動する素振りがなかったのにも関わらず――」"

[[dialogue]]
speaker = "サチ"
# 「シズハちゃんとサーシャさんが実の姉妹関係だと、既に全員が誤認していたこと」
line = "「シズハちゃんとサーシャさんが実の姉妹関係だと、既に全員が誤認していたこと」"

[[dialogue]]
speaker = "シズハ"
# 「あ……！」
line = "「あ……！」"

[[dialogue]]
speaker = "シズハ"
# 「つまり、聖杯ちゃんはその時、既に暴走していた……！？」
line = "「つまり、聖杯ちゃんはその時、既に暴走していた……！？」"

[[dialogue]]
speaker = "サチ"
# 「そう。だから、『解放』のロストアイテムとは別の要因があるんだよ。だけど、それにしてはタイミングが良すぎるよね？」
line = "「そう。だから、『解放』のロストアイテムとは別の要因があるんだよ。だけど、それにしてはタイミングが良すぎるよね？」"

[[dialogue]]
speaker = "サチ"
# 「まるで『解放』のロストアイテムの出現に合わせるように聖杯が暴走した。これって本当に偶然……？」
line = "「まるで『解放』のロストアイテムの出現に合わせるように聖杯が暴走した。これって本当に偶然……？」"

[[dialogue]]
speaker = "サチ"
# 「偶然じゃないとしたら……誰かが意図して、これを引き起こしたということになる」
line = "「偶然じゃないとしたら……誰かが意図して、これを引き起こしたということになる」"

[[dialogue]]
speaker = "サチ"
# 「そうじゃないですか？　<b>ディーラックさん</b>」
line = "「そうじゃないですか？　<b>ディーラックさん</b>」"

[[dialogue]]
speaker = "シズハ"
# 「え！？」
line = "「え！？」"

[[dialogue]]
speaker = "ディーラック"
# 「ん？　ボクかい？」
line = "「ん？　ボクかい？」"

[[dialogue]]
speaker = "サチ"
# 「はい。違っていたら謝ります。でも、あなたが今、１番怪しい容疑者です」
line = "「はい。違っていたら謝ります。でも、あなたが今、１番怪しい容疑者です」"

[[dialogue]]
speaker = "ディーラック"
# 「ふぅん。どうしてそう思うのサ？」
line = "「ふぅん。どうしてそう思うのサ？」"

[[dialogue]]
speaker = "サチ"
# 「まず１点。私たちは図書館に行って、『解放』のロストアイテムを見つけました。その場所に反応があったと教えてくれたのは、ディーラックさんです」
line = "「まず１点。私たちは図書館に行って、『解放』のロストアイテムを見つけました。その場所に反応があったと教えてくれたのは、ディーラックさんです」"

[[dialogue]]
speaker = "ディーラック"
# 「そうだね。それで、実際に見つけたんだろう？」
line = "「そうだね。それで、実際に見つけたんだろう？」"

[[dialogue]]
speaker = "サチ"
# 「はい、見つけました。ただし――」
line = "「はい、見つけました。ただし――」"

[[dialogue]]
speaker = "プリムラ"
# 「ロストアイテムがあったのは、我の体の中じゃったがな！」
line = "「ロストアイテムがあったのは、我の体の中じゃったがな！」"

[[dialogue]]
speaker = "サチ"
# 「つまりは、矛盾するんです。図書館でロストアイテムの反応があった、というディーラックさんの報告と」
line = "「つまりは、矛盾するんです。図書館でロストアイテムの反応があった、というディーラックさんの報告と」"

[[dialogue]]
speaker = "ディーラック"
# 「そうなのかい？　あれれ～、おっかしいな～？　確かにすごく大きいロストアイテム反応が、図書館からしたんだけどな～？」
line = "「そうなのかい？　あれれ～、おっかしいな～？　確かにすごく大きいロストアイテム反応が、図書館からしたんだけどな～？」"

[[dialogue]]
speaker = "サチ"
# 「そう言うと思ってました。あそこには別の、大きなロストアイテムが隠されていた。だからこそ、図書館という場所を選んだんですよね？」
line = "「そう言うと思ってました。あそこには別の、大きなロストアイテムが隠されていた。だからこそ、図書館という場所を選んだんですよね？」"

[[dialogue]]
speaker = "サチ"
# 「ですが、２点目。『解放』のロストアイテムがもし聖杯の暴走の原因なら、あなたが気づかないはずがない」
line = "「ですが、２点目。『解放』のロストアイテムがもし聖杯の暴走の原因なら、あなたが気づかないはずがない」"

[[dialogue]]
speaker = "ディーラック"
# 「う～ん、それについてはボクにもよくわからないのサ。いつの間にかボクも、シズハちゃんとサーシャちゃんが実の姉妹だと思い込んでいたからね」
line = "「う～ん、それについてはボクにもよくわからないのサ。いつの間にかボクも、シズハちゃんとサーシャちゃんが実の姉妹だと思い込んでいたからね」"

[[dialogue]]
speaker = "ディーラック"
# 「でも、間の悪い偶然というのも、あり得るんじゃないかな？」
line = "「でも、間の悪い偶然というのも、あり得るんじゃないかな？」"

[[dialogue]]
speaker = "ディーラック"
# 「シズハちゃんの内心にはずっと、お姉ちゃんに会いたいという願望があったそうだからね」
line = "「シズハちゃんの内心にはずっと、お姉ちゃんに会いたいという願望があったそうだからね」"

[[dialogue]]
speaker = "サチ"
# 「……そうですね。確かにこれも、ディーラックさんがやったという証拠にはなりません」
line = "「……そうですね。確かにこれも、ディーラックさんがやったという証拠にはなりません」"

[[dialogue]]
speaker = "ディーラック"
# 「だったら――」
line = "「だったら――」"

[[dialogue]]
speaker = "サチ"
# 「なので、トレジアンナさんの回収術式を受けてもらえませんか？」
line = "「なので、トレジアンナさんの回収術式を受けてもらえませんか？」"

[[dialogue]]
speaker = "ディーラック"
# 「え？」
line = "「え？」"

[[dialogue]]
speaker = "サチ"
# 「ディーラックさん、ロストアイテムですよね？　なので、トレジアンナさんの回収術式を受けて欲しいんです」
line = "「ディーラックさん、ロストアイテムですよね？　なので、トレジアンナさんの回収術式を受けて欲しいんです」"

[[dialogue]]
speaker = "ディーラック"
# 「何の為に？」
line = "「何の為に？」"

[[dialogue]]
speaker = "サチ"
# 「これ以上の疑いを晴らす為です。回収術式を受けると、ディーラックさんは一時的に封印されますが――」
line = "「これ以上の疑いを晴らす為です。回収術式を受けると、ディーラックさんは一時的に封印されますが――」"

[[dialogue]]
speaker = "サチ"
# 「ディーラックさんがそれに抵抗しないなら、私たちはあなたのことを信用できます。もちろん、術式はすぐに解除すると約束します」
line = "「ディーラックさんがそれに抵抗しないなら、私たちはあなたのことを信用できます。もちろん、術式はすぐに解除すると約束します」"

[[dialogue]]
speaker = "サチ"
# 「ディーラックさんが無実なら、協力して頂けますよね？」
line = "「ディーラックさんが無実なら、協力して頂けますよね？」"

[[dialogue]]
speaker = "ディーラック"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "シズハ"
# 「えっと……ディーちゃん、別に構わないよね？　ディーちゃんはこれまでずっと、私のそばに居たんだし、変なことなんてするわけ……」
line = "「えっと……ディーちゃん、別に構わないよね？　ディーちゃんはこれまでずっと、私のそばに居たんだし、変なことなんてするわけ……」"

[[dialogue]]
speaker = "サチ"
# 「じゃあ、回収術式を使いますね。トレジアンナさん、お願いします」
line = "「じゃあ、回収術式を使いますね。トレジアンナさん、お願いします」"

[[dialogue]]
speaker = "トレジアンナ"
# 「はい。痛くありませんから、大丈夫ですよ～。回収術式――え～いっ！」
line = "「はい。痛くありませんから、大丈夫ですよ～。回収術式――え～いっ！」"

[[dialogue]]
speaker = "unk"
# トレジアンナさん――サチのルーレットロットから、術式の光が放たれる。ディーラックはそれを――
line = "トレジアンナさん――サチのルーレットロットから、術式の光が放たれる。ディーラックはそれを――"

[[dialogue]]
speaker = "ディーラック"
# 「…………ん～、残念♪」
line = "「…………ん～、残念♪」"

[[dialogue]]
speaker = "unk"
# さっと避けた。
line = "さっと避けた。"

[[dialogue]]
speaker = "シズハ"
# 「ディーちゃん！？」
line = "「ディーちゃん！？」"

[[dialogue]]
speaker = "ディーラック"
# 「悪いね、シズハちゃん」
line = "「悪いね、シズハちゃん」"

[[dialogue]]
speaker = "サチ"
# 「残念ですが……推理は合っていたみたいですね」
line = "「残念ですが……推理は合っていたみたいですね」"

[[dialogue]]
speaker = "ディーラック"
# 「ひひっ……ひひひっ♪　アハハハハハハッ！」
line = "「ひひっ……ひひひっ♪　アハハハハハハッ！」"

[[dialogue]]
speaker = "ディーラック"
# 「は～！　失敗したなぁ～！　さすがサチちゃん、生徒会長だから頭もいいんだね～。いや～、参った参った」
line = "「は～！　失敗したなぁ～！　さすがサチちゃん、生徒会長だから頭もいいんだね～。いや～、参った参った」"

[[dialogue]]
speaker = "ディーラック"
# 「もうちょっと長い間、近くで楽しめるかとも思ったんだけどな～……ふぅ。しかしまぁ、バレたなら仕方がない」
line = "「もうちょっと長い間、近くで楽しめるかとも思ったんだけどな～……ふぅ。しかしまぁ、バレたなら仕方がない」"

[[dialogue]]
speaker = "ディーラック"
# 「――改めて、自己紹介をしようか。ボクはディーラック」
line = "「――改めて、自己紹介をしようか。ボクはディーラック」"

[[dialogue]]
speaker = "ディーラック"
# 「ロストアイテムから生まれた、『エネルギー生命体』サ」
line = "「ロストアイテムから生まれた、『エネルギー生命体』サ」"

[[dialogue]]
speaker = "トレジアンナ"
# 「なっ……まさか……！？」
line = "「なっ……まさか……！？」"

[[dialogue]]
speaker = "ディーラック"
# 「そう、キミならわかるよねぇ？　自分でもロストアイテムを作り出せる程に精通し、その結果、放置するとヤバいと分かったから回収に乗り出した！」
line = "「そう、キミならわかるよねぇ？　自分でもロストアイテムを作り出せる程に精通し、その結果、放置するとヤバいと分かったから回収に乗り出した！」"

[[dialogue]]
speaker = "ディーラック"
# 「『<ruby=しゅうしゅう>蒐集</ruby>』の<b>魔女</b>トレジアンナ！　キミになら、ねぇ！？」
line = "「『<ruby>蒐集<rt>しゅうしゅう</rt></ruby>』の<b>魔女</b>トレジアンナ！　キミになら、ねぇ！？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "unk"
# トレジアンナさんが、魔女……！？
line = "トレジアンナさんが、魔女……！？"

[[dialogue]]
speaker = "unk"
# トレジアンナさんは否定しない。ということは、ロストアイテムにその身を封じられる前は、彼女も『魔女の森』にいたということなのだろうか。
line = "トレジアンナさんは否定しない。ということは、ロストアイテムにその身を封じられる前は、彼女も『魔女の森』にいたということなのだろうか。"

[[dialogue]]
speaker = "トレジアンナ"
# 「どうしてそのことを……？」
line = "「どうしてそのことを……？」"

[[dialogue]]
speaker = "ディーラック"
# 「知ってるに決まってるだろう？　ボクはロストアイテム達から生まれた。そのロストアイテムの一部を製作してるのはキミなんだから！」
line = "「知ってるに決まってるだろう？　ボクはロストアイテム達から生まれた。そのロストアイテムの一部を製作してるのはキミなんだから！」"

[[dialogue]]
speaker = "シズハ"
# 「どういうことなの、ディーちゃん……！？」
line = "「どういうことなの、ディーちゃん……！？」"

[[dialogue]]
speaker = "ディーラック"
# 「ひひっ、教えてあげるよ。ロストアイテムっていうのは……使われる度に排熱――マイナスエネルギーっていうのが放出されるのサ」
line = "「ひひっ、教えてあげるよ。ロストアイテムっていうのは……使われる度に排熱――マイナスエネルギーっていうのが放出されるのサ」"

[[dialogue]]
speaker = "ディーラック"
# 「しかし、それは本来、世界に存在するはずのない虚数のエネルギー。物理法則を無視した異物みたいなものサ～」
line = "「しかし、それは本来、世界に存在するはずのない虚数のエネルギー。物理法則を無視した異物みたいなものサ～」"

[[dialogue]]
speaker = "ディーラック"
# 「本来のエネルギーは外に排出されれば、別のエネルギーに転換され、世界の中を循環していく……が、マイナスエネルギーはそうならない」
line = "「本来のエネルギーは外に排出されれば、別のエネルギーに転換され、世界の中を循環していく……が、マイナスエネルギーはそうならない」"

[[dialogue]]
speaker = "ディーラック"
# 「永遠に処理されないゴミとして、リクリエを幾度乗り越えても、世界の裏に塵の山となって貯まっていたのサ」
line = "「永遠に処理されないゴミとして、リクリエを幾度乗り越えても、世界の裏に塵の山となって貯まっていたのサ」"

[[dialogue]]
speaker = "ディーラック"
# 「そして今回、未だかつてない大きなリクリエが迫った時、その影響を受けて、マイナスエネルギーに突然変異が起きた。……自我が生まれたんだよ」
line = "「そして今回、未だかつてない大きなリクリエが迫った時、その影響を受けて、マイナスエネルギーに突然変異が起きた。……自我が生まれたんだよ」"

[[dialogue]]
speaker = "ディーラック"
# 「すなわち、貯まり続けたマイナスエネルギーが形を持って、ボクとなったというわけサ♪」
line = "「すなわち、貯まり続けたマイナスエネルギーが形を持って、ボクとなったというわけサ♪」"

[[dialogue]]
speaker = "unk"
# １つ、教えて欲しい
line = "１つ、教えて欲しい"

[[dialogue]]
speaker = "ディーラック"
# 「おや？　なんだい、会長？」
line = "「おや？　なんだい、会長？」"

[[dialogue]]
speaker = "unk"
# キミは……俺たちの敵なのか？
line = "キミは……俺たちの敵なのか？"

[[dialogue]]
speaker = "ディーラック"
# 「ハハッ！　いい質問だね。ボクにとってキミたちは――」
line = "「ハハッ！　いい質問だね。ボクにとってキミたちは――」"

[[dialogue]]
speaker = "ディーラック"
# 「ズバリ『家畜』サ。何故ならマイナスエネルギーそのものであるボクの主食は、当然マイナスエネルギー」
line = "「ズバリ『家畜』サ。何故ならマイナスエネルギーそのものであるボクの主食は、当然マイナスエネルギー」"

[[dialogue]]
speaker = "ディーラック"
# 「それを生み出すのは、ロストアイテムを使うキミたち、愚かな欲望にまみれた<b>ヒトカス</b>共サ♪」
line = "「それを生み出すのは、ロストアイテムを使うキミたち、愚かな欲望にまみれた<b>ヒトカス</b>共サ♪」"

[[dialogue]]
speaker = "ディーラック"
# 「だからボクにとって、キミたちは餌。ヒトだって他の獣の肉を殺して食うだろう？　それと同じ」
line = "「だからボクにとって、キミたちは餌。ヒトだって他の獣の肉を殺して食うだろう？　それと同じ」"

[[dialogue]]
speaker = "ディーラック"
# 「時に可愛いと思うことはあるけれど、食べ頃となれば美味しく調理するサ」
line = "「時に可愛いと思うことはあるけれど、食べ頃となれば美味しく調理するサ」"

[[dialogue]]
speaker = "ディーラック"
# 「今回や、<b>これまで</b>みたいにね」
line = "「今回や、<b>これまで</b>みたいにね」"

[[dialogue]]
speaker = "サチ"
# 「これまで……？　まさか……」
line = "「これまで……？　まさか……」"

[[dialogue]]
speaker = "ディーラック"
# 「前回とか、なかなか美味しかったよ？　『記憶』のロストアイテムで、サチちゃんや会長の記憶を奪って」
line = "「前回とか、なかなか美味しかったよ？　『記憶』のロストアイテムで、サチちゃんや会長の記憶を奪って」"

[[dialogue]]
speaker = "プリムラ"
# 「あれも貴様が仕組んだのか！？」
line = "「あれも貴様が仕組んだのか！？」"

[[dialogue]]
speaker = "ディーラック"
# 「ひひひっ！　その通り♪　ボクはロストアイテムから生まれたマイナスエネルギー。だから、ロストアイテムにマイナスエネルギーを逆流させることができる」
line = "「ひひひっ！　その通り♪　ボクはロストアイテムから生まれたマイナスエネルギー。だから、ロストアイテムにマイナスエネルギーを逆流させることができる」"

[[dialogue]]
speaker = "ディーラック"
# 「するとどうなるか？　もう分かるよね？　――暴走するんだよ、ロストアイテムが♪」
line = "「するとどうなるか？　もう分かるよね？　――暴走するんだよ、ロストアイテムが♪」"

[[dialogue]]
speaker = "プリムラ"
# 「おのれ……！　貴様……！」
line = "「おのれ……！　貴様……！」"

[[dialogue]]
speaker = "ディーラック"
# 「あ、もしかしてプリムラちゃん怒ってる？　いや～、でも予想外だったな～、今回の件」
line = "「あ、もしかしてプリムラちゃん怒ってる？　いや～、でも予想外だったな～、今回の件」"

[[dialogue]]
speaker = "ディーラック"
# 「プリムラちゃんは『解放』のロストアイテムで力を取り戻して、もっと大暴れしてくれるもんだと思ってたけど……１年ちょっとで、すっかりヒトらしくなっちゃって」
line = "「プリムラちゃんは『解放』のロストアイテムで力を取り戻して、もっと大暴れしてくれるもんだと思ってたけど……１年ちょっとで、すっかりヒトらしくなっちゃって」"

[[dialogue]]
speaker = "プリムラ"
# 「ふん、我を甘くみるな！　……って、待て」
line = "「ふん、我を甘くみるな！　……って、待て」"

[[dialogue]]
speaker = "プリムラ"
# 「貴様、一体いつから暗躍していた？　まさか……」
line = "「貴様、一体いつから暗躍していた？　まさか……」"

[[dialogue]]
speaker = "ディーラック"
# 「ひひっ……♪　さて、ここでプリムラちゃんに問題です」
line = "「ひひっ……♪　さて、ここでプリムラちゃんに問題です」"

[[dialogue]]
speaker = "ディーラック"
# 「賢者の石から作られた、あらゆるエネルギーを吸収し変換する終末兵器のキミ。それを作ったのは、一体誰でしょう？」
line = "「賢者の石から作られた、あらゆるエネルギーを吸収し変換する終末兵器のキミ。それを作ったのは、一体誰でしょう？」"

[[dialogue]]
speaker = "プリムラ"
# 「ディーラック、貴様が我を作ったのか！？」
line = "「ディーラック、貴様が我を作ったのか！？」"

[[dialogue]]
speaker = "ディーラック"
# 「正解～～～っ♪　ボクがママでちゅよ～♪　アハハハハハハッ！！！」
line = "「正解～～～っ♪　ボクがママでちゅよ～♪　アハハハハハハッ！！！」"

[[dialogue]]
speaker = "ディーラック"
# 「ちなみに！　こう見えて、ボクの性別は女の子サ♪　だから――」
line = "「ちなみに！　こう見えて、ボクの性別は女の子サ♪　だから――」"

[[dialogue]]
speaker = "ディーラック"
# 「可愛い女の子のお願いに免じて、今日のところはボクを見逃してくれると嬉しいな～♪　――どうだい、みんな？」
line = "「可愛い女の子のお願いに免じて、今日のところはボクを見逃してくれると嬉しいな～♪　――どうだい、みんな？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「ディーラックさん、教えて下さい」
line = "「ディーラックさん、教えて下さい」"

[[dialogue]]
speaker = "ディーラック"
# 「ん？」
line = "「ん？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「見逃したとして、あなたはこれからどうするんですか？　ロストアイテムを暴走させるのを止められるんですか？」
line = "「見逃したとして、あなたはこれからどうするんですか？　ロストアイテムを暴走させるのを止められるんですか？」"

[[dialogue]]
speaker = "ディーラック"
# 「う～ん……そうだ！　お互いのテリトリーを設けるとかどう？　ボクは流星市国に侵入しない。その代わり――」
line = "「う～ん……そうだ！　お互いのテリトリーを設けるとかどう？　ボクは流星市国に侵入しない。その代わり――」"

[[dialogue]]
speaker = "ディーラック"
# 「外国でロストアイテムの事件が起こっても、キミたちは干渉しない。どうだい？」
line = "「外国でロストアイテムの事件が起こっても、キミたちは干渉しない。どうだい？」"

[[dialogue]]
speaker = "unk"
# ダメだ。認められるわけがない
line = "ダメだ。認められるわけがない"

[[dialogue]]
speaker = "サチ"
# 「お兄さんと同じく。あなたをこのまま野放しにはできません！」
line = "「お兄さんと同じく。あなたをこのまま野放しにはできません！」"

[[dialogue]]
speaker = "プリムラ"
# 「だそうじゃ。我としても、生みの親の貴様には１発拳を入れてやりたい気分なのでな。大人しく捕まるがいい！」
line = "「だそうじゃ。我としても、生みの親の貴様には１発拳を入れてやりたい気分なのでな。大人しく捕まるがいい！」"

[[dialogue]]
speaker = "ディーラック"
# 「……ふぅ。交渉決裂か」
line = "「……ふぅ。交渉決裂か」"

[[dialogue]]
speaker = "ディーラック"
# 「なら仕方ないね！　それっ！」
line = "「なら仕方ないね！　それっ！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「えっ！？　あっ！？」
line = "「えっ！？　あっ！？」"

[[dialogue]]
speaker = "unk"
# サチのルーレットロット――トレジアンナさんの体が光る。
line = "サチのルーレットロット――トレジアンナさんの体が光る。"

[[dialogue]]
speaker = "unk"
# そこから『解放』のロストアイテムが抜け出て、ディーラックの方へと飛んで行く。
line = "そこから『解放』のロストアイテムが抜け出て、ディーラックの方へと飛んで行く。"

[[dialogue]]
speaker = "ディーラック"
# 「勿体ぶって、さっさと自分の封印を解いておかなかったのは失策だったね、トレジアンナ！」
line = "「勿体ぶって、さっさと自分の封印を解いておかなかったのは失策だったね、トレジアンナ！」"

[[dialogue]]
speaker = "ディーラック"
# 「復活はまたお預けサ♪　こうやって後で回収できるように、事前に術式を仕込んでおいたんだよ」
line = "「復活はまたお預けサ♪　こうやって後で回収できるように、事前に術式を仕込んでおいたんだよ」"

[[dialogue]]
speaker = "ディーラック"
# 「じゃあね、みんな！　ボクは逃げさせてもらうよ！」
line = "「じゃあね、みんな！　ボクは逃げさせてもらうよ！」"

[[dialogue]]
speaker = "シズハ"
# 「あっ！　待って、ディーちゃん！」
line = "「あっ！　待って、ディーちゃん！」"

[[dialogue]]
speaker = "unk"
# シズハの言葉には答えず、ディーラックは『解放』のロストアイテムを手に掴むと、素早く空へ逃げ去ろうとする。
line = "シズハの言葉には答えず、ディーラックは『解放』のロストアイテムを手に掴むと、素早く空へ逃げ去ろうとする。"

[[dialogue]]
speaker = "unk"
# しかし――
line = "しかし――"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「させないわ」
line = "「させないわ」"

[[dialogue]]
speaker = "ディーラック"
# 「……あ痛っ！？　これは……！」
line = "「……あ痛っ！？　これは……！」"

[[dialogue]]
speaker = "unk"
# 天井に頭をぶつけるように、ディーラックが空中で見えない壁のようなものに阻まれる。
line = "天井に頭をぶつけるように、ディーラックが空中で見えない壁のようなものに阻まれる。"

[[dialogue]]
speaker = "ディーラック"
# 「まさか、サーシャちゃんの<b>凍結</b>かい……！？」
line = "「まさか、サーシャちゃんの<b>凍結</b>かい……！？」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「アリーナの周りを覆うように、空間を凍らせたわ。だから、逃げられないわよ、ディーラックちゃん」
line = "「アリーナの周りを覆うように、空間を凍らせたわ。だから、逃げられないわよ、ディーラックちゃん」"

[[dialogue]]
speaker = "ディーラック"
# 「いやいや、チートすぎでしょ……！　その能力！」
line = "「いやいや、チートすぎでしょ……！　その能力！」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「……ねぇ、ディーラックちゃん。お姉ちゃん、今回の件はちょっと怒ってるの」
line = "「……ねぇ、ディーラックちゃん。お姉ちゃん、今回の件はちょっと怒ってるの」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「私だけだったら、許せたかもしれない。でも――」
line = "「私だけだったら、許せたかもしれない。でも――」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「あなたはシズハちゃんの心を弄んだ。そのことは私、絶対に許せない」
line = "「あなたはシズハちゃんの心を弄んだ。そのことは私、絶対に許せない」"

[[dialogue]]
speaker = "ディーラック"
# 「……そうかい。だったら！」
line = "「……そうかい。だったら！」"

[[dialogue]]
speaker = "unk"
# ディーラックは大きく口を開けると――
line = "ディーラックは大きく口を開けると――"

[[dialogue]]
speaker = "ディーラック"
# 「あ～ん！　――ごくんっ！」
line = "「あ～ん！　――ごくんっ！」"

[[dialogue]]
speaker = "unk"
# 『解放』のロストアイテムを食べて、飲み込んだ。
line = "『解放』のロストアイテムを食べて、飲み込んだ。"

[[dialogue]]
speaker = "ディーラック"
# 「――解放」
line = "「――解放」"

[[dialogue]]
speaker = "ディーラック"
# 「ふぅ～～～」
line = "「ふぅ～～～」"

[[dialogue]]
speaker = "シズハ"
# 「ディーちゃんが変身した……！？」
line = "「ディーちゃんが変身した……！？」"

[[dialogue]]
speaker = "ディーラック"
# 「悪いけど……全力で暴れて、突破させてもらうサ！！！」
line = "「悪いけど……全力で暴れて、突破させてもらうサ！！！」"

[[dialogue]]
speaker = "unk"
# 変貌を遂げたディーラックとの戦闘が、開始されるのだった。
line = "変貌を遂げたディーラックとの戦闘が、開始されるのだった。"
