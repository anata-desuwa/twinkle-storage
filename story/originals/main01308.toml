[[dialogue]]
speaker = "unk"
# 第９話,先代魔王、その追想,B
line = "第９話,先代魔王、その追想,B"

[[dialogue]]
speaker = "unk"
# その後も俺たちは湧き続けるガーディアンを倒しながら塔を登っていった……。
line = "その後も俺たちは湧き続けるガーディアンを倒しながら塔を登っていった……。"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふぅ……けっこう昇ってきたかしら。みんな疲れてない？」
line = "「ふぅ……けっこう昇ってきたかしら。みんな疲れてない？」"

[[dialogue]]
speaker = "マトイ"
# 「ちょっとは。でもでも、ヴィーナスがいるだけでなんか元気出ちゃうよ」
line = "「ちょっとは。でもでも、ヴィーナスがいるだけでなんか元気出ちゃうよ」"

[[dialogue]]
speaker = "ユウリ"
# 「だな。さらわれて生死不明、なんて状態は正直、精神的にキツかったからな」
line = "「だな。さらわれて生死不明、なんて状態は正直、精神的にキツかったからな」"

[[dialogue]]
speaker = "ヴィーナス"
# 「みんな心配してくれてありがと！　復帰したからには、バリバリ期待に応えなくっちゃね」
line = "「みんな心配してくれてありがと！　復帰したからには、バリバリ期待に応えなくっちゃね」"

[[dialogue]]
speaker = "unk"
# ヴィーナスは力こぶを作りそれを叩いてみせた。
line = "ヴィーナスは力こぶを作りそれを叩いてみせた。"

[[dialogue]]
speaker = "クロト"
# 「ちなみに──ヴィーナス。いつかみたいに、『声』が聞こえたりはしないか？」
line = "「ちなみに──ヴィーナス。いつかみたいに、『声』が聞こえたりはしないか？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「んー……何も聞こえないわね。入った時から」
line = "「んー……何も聞こえないわね。入った時から」"

[[dialogue]]
speaker = "クロト"
# 「じゃあ、あれは最初だけだったのかな」
line = "「じゃあ、あれは最初だけだったのかな」"

[[dialogue]]
speaker = "unk"
# 俺たちがフィーニスの塔に入った１回目と２回目の時──
line = "俺たちがフィーニスの塔に入った１回目と２回目の時──"

[[dialogue]]
speaker = "unk"
# ヴィーナスは謎の『声』に導かれて上層へと昇り、その先で俺たちは壁画やリクリエについてなど、数多の真実を知った。
line = "ヴィーナスは謎の『声』に導かれて上層へと昇り、その先で俺たちは壁画やリクリエについてなど、数多の真実を知った。"

[[dialogue]]
speaker = "unk"
# だから今回も、なにか新たな知識が授けられることも……と思っていたのだが。
line = "だから今回も、なにか新たな知識が授けられることも……と思っていたのだが。"

[[dialogue]]
speaker = "ヴィーナス"
# 「もう伝えたいこともないんじゃない？　リクリエについてはもう大体わかってるし」
line = "「もう伝えたいこともないんじゃない？　リクリエについてはもう大体わかってるし」"

[[dialogue]]
speaker = "フィオナ"
# 「異なる暦に、平行世界……既に相当な深みにまで踏み入ったのは間違いありませんね」
line = "「異なる暦に、平行世界……既に相当な深みにまで踏み入ったのは間違いありませんね」"

[[dialogue]]
speaker = "クロト"
# 「……それもそうか」
line = "「……それもそうか」"

[[dialogue]]
speaker = "クロト"
# （ヴィーナスを呼んでいた『声』……あれは、学園長の記憶で聴いた<b>彼女</b>のそれと同じだった）
line = "（ヴィーナスを呼んでいた『声』……あれは、学園長の記憶で聴いた<b>彼女</b>のそれと同じだった）"

[[dialogue]]
speaker = "クロト"
# （そして、マグダレナさんはヴィーナスのことを『御子』と呼んでいた。もし、だとするなら……）
line = "（そして、マグダレナさんはヴィーナスのことを『御子』と呼んでいた。もし、だとするなら……）"

[[dialogue]]
speaker = "unk"
# 想像が膨らんでいく。
line = "想像が膨らんでいく。"

[[dialogue]]
speaker = "unk"
# けれど……今はここに心を砕いている場合ではないかもしれない。
line = "けれど……今はここに心を砕いている場合ではないかもしれない。"

[[dialogue]]
speaker = "ユウリ"
# 「これ以上詰め込まれたら、頭がパンクしちまうよ。とりあえず人間界まで帰ろうぜ」
line = "「これ以上詰め込まれたら、頭がパンクしちまうよ。とりあえず人間界まで帰ろうぜ」"

[[dialogue]]
speaker = "クロト"
# 「だな。今は考えることよりも、人間界に到着することを優先しよう」
line = "「だな。今は考えることよりも、人間界に到着することを優先しよう」"

[[dialogue]]
speaker = "サーシャ"
# 「全速前進よ～♪」
line = "「全速前進よ～♪」"

[[dialogue]]
speaker = "unk"
# と、全員で突き進んでいると……
line = "と、全員で突き進んでいると……"

[[dialogue]]
speaker = "クロト"
# 「──っ……？」
line = "「──っ……？」"

[[dialogue]]
speaker = "unk"
# 一瞬──なにかの幻影が頭をよぎった。
line = "一瞬──なにかの幻影が頭をよぎった。"

[[dialogue]]
speaker = "クロト"
# （なんだ……気のせい……か？）
line = "（なんだ……気のせい……か？）"

[[dialogue]]
speaker = "unk"
# 思わず立ち止まる。
line = "思わず立ち止まる。"

[[dialogue]]
speaker = "unk"
# 周囲に変わった様子はなく、みんなが前進していく背中をじっと見つめていた。
line = "周囲に変わった様子はなく、みんなが前進していく背中をじっと見つめていた。"

[[dialogue]]
speaker = "サーシャ"
# 「会長くんー？　疲れちゃったー？」
line = "「会長くんー？　疲れちゃったー？」"

[[dialogue]]
speaker = "クロト"
# 「いえ──大丈夫です。すぐ行きます！」
line = "「いえ──大丈夫です。すぐ行きます！」"

[[dialogue]]
speaker = "unk"
# それからも着々と塔を昇っていく俺たち。
line = "それからも着々と塔を昇っていく俺たち。"

[[dialogue]]
speaker = "unk"
# その過程で俺は、先の幻影が錯覚でなかったことを知る。
line = "その過程で俺は、先の幻影が錯覚でなかったことを知る。"

[[dialogue]]
speaker = "unk"
# 今から約三千年前──
line = "今から約三千年前──"

[[dialogue]]
speaker = "unk"
# 森羅暦──現在では<b>旧</b>森羅暦──の世界は、存亡の危機を迎えていた。
line = "森羅暦──現在では<b>旧</b>森羅暦──の世界は、存亡の危機を迎えていた。"

[[dialogue]]
speaker = "unk"
# いや……本来であれば、滅亡しかありえないはずだった。
line = "いや……本来であれば、滅亡しかありえないはずだった。"

[[dialogue]]
speaker = "unk"
# これまでにも幾度となく繰り返されてきた<ruby=リクリエ>再創生</ruby>の時期が、すぐそこにも迫っていたからである。
line = "これまでにも幾度となく繰り返されてきた<ruby>再創生<rt>リクリエ</rt></ruby>の時期が、すぐそこにも迫っていたからである。"

[[dialogue]]
speaker = "unk"
# しかし今代の人類は違った。
line = "しかし今代の人類は違った。"

[[dialogue]]
speaker = "unk"
# この宇宙の摂理を乗り切るべく、クルセイダースと呼ばれる戦士たちが<ruby=かちどき>鬨</ruby>を上げた。
line = "この宇宙の摂理を乗り切るべく、クルセイダースと呼ばれる戦士たちが<ruby>鬨<rt>かちどき</rt></ruby>を上げた。"

[[dialogue]]
speaker = "unk"
# そして彼らを、三種族すべての戦士を率いる一人の男がいた。
line = "そして彼らを、三種族すべての戦士を率いる一人の男がいた。"

[[dialogue]]
speaker = "unk"
# 男は大賢者と呼ばれる使い魔を従え、厄災の最前線へ立ち向かった。
line = "男は大賢者と呼ばれる使い魔を従え、厄災の最前線へ立ち向かった。"

[[dialogue]]
speaker = "unk"
# 魔王ラクシス──
line = "魔王ラクシス──"

[[dialogue]]
speaker = "unk"
# 後に人類史上初めて、<ruby=リクリエ>再創生</ruby>を退けた影なる英雄である。
line = "後に人類史上初めて、<ruby>再創生<rt>リクリエ</rt></ruby>を退けた影なる英雄である。"

[[dialogue]]
speaker = "クロト"
# 「──っ！？」
line = "「──っ！？」"

[[dialogue]]
speaker = "unk"
# ──再び意識が浮上する。
line = "──再び意識が浮上する。"

[[dialogue]]
speaker = "unk"
# 今度こそ間違いない。今のは、ただの幻覚などではなかった。
line = "今度こそ間違いない。今のは、ただの幻覚などではなかった。"

[[dialogue]]
speaker = "クロト"
# 「い……今のは？」
line = "「い……今のは？」"

[[dialogue]]
speaker = "マトイ"
# 「？　何が？」
line = "「？　何が？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「どうしたのよ、クロト。鱧が金平糖食べたみたいな顔して」
line = "「どうしたのよ、クロト。鱧が金平糖食べたみたいな顔して」"

[[dialogue]]
speaker = "ソフィア"
# 「鳩が豆鉄砲です」
line = "「鳩が豆鉄砲です」"

[[dialogue]]
speaker = "ユウリ"
# 「わざと言ってんだろ、もはや」
line = "「わざと言ってんだろ、もはや」"

[[dialogue]]
speaker = "クロト"
# （みんなには……見えていなかったのか？　ヴィーナスにさえ──）
line = "（みんなには……見えていなかったのか？　ヴィーナスにさえ──）"

[[dialogue]]
speaker = "unk"
# 今、脳裏によぎった『彼』の姿は──俺にしか見えていないようだった。
line = "今、脳裏によぎった『彼』の姿は──俺にしか見えていないようだった。"

[[dialogue]]
speaker = "フィオナ"
# 「緋宮会長……？　調子がすぐれませんか？」
line = "「緋宮会長……？　調子がすぐれませんか？」"

[[dialogue]]
speaker = "サーシャ"
# 「仕方ないわよ～。あれだけの激戦を制した後に、この強行軍だもの」
line = "「仕方ないわよ～。あれだけの激戦を制した後に、この強行軍だもの」"

[[dialogue]]
speaker = "ソフィア"
# 「確かにです。強力な力なわけですから、魔王覚醒の反動だってありそうですし……」
line = "「確かにです。強力な力なわけですから、魔王覚醒の反動だってありそうですし……」"

[[dialogue]]
speaker = "クロト"
# 「……いや。大丈夫だ。進もう」
line = "「……いや。大丈夫だ。進もう」"

[[dialogue]]
speaker = "unk"
# 気を取り直すも、俺の意識は先の回想に引っ張られていた。
line = "気を取り直すも、俺の意識は先の回想に引っ張られていた。"

[[dialogue]]
speaker = "クロト"
# （間違いない。あれは──月の壁画に描かれていた……先代の魔王）
line = "（間違いない。あれは──月の壁画に描かれていた……先代の魔王）"

[[dialogue]]
speaker = "unk"
# かつてリクリエを撃退した人物。
line = "かつてリクリエを撃退した人物。"

[[dialogue]]
speaker = "unk"
# いつかニャリオンが仕えたと語る人物。
line = "いつかニャリオンが仕えたと語る人物。"

[[dialogue]]
speaker = "unk"
# そしてヴィーナスが、俺にそっくりだと主張し続けてきた人物──ラクシス。
line = "そしてヴィーナスが、俺にそっくりだと主張し続けてきた人物──ラクシス。"

[[dialogue]]
speaker = "クロト"
# （気になる。もっと進めば──あれ以上のことも見えてくるのだろうか）
line = "（気になる。もっと進めば──あれ以上のことも見えてくるのだろうか）"

[[dialogue]]
speaker = "unk"
# これまでも、世界の裏側を教えてくれたフィーニスの塔。
line = "これまでも、世界の裏側を教えてくれたフィーニスの塔。"

[[dialogue]]
speaker = "unk"
# 第零層──ここはもしかしたら、すべての始点になりうる場所なのかもしれない。
line = "第零層──ここはもしかしたら、すべての始点になりうる場所なのかもしれない。"
