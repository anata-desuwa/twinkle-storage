[[dialogue]]
speaker = "unk"
# 今日は、魔将となったウィステリアさんと実戦トレーニングをしていた。
line = "今日は、魔将となったウィステリアさんと実戦トレーニングをしていた。"

[[dialogue]]
speaker = "unk"
# だが──
line = "だが──"

[[dialogue]]
