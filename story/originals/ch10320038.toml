[[dialogue]]
speaker = "クロト"
# 「好きな人がそんな格好していたら、当然気になりますよ！」
line = "「好きな人がそんな格好していたら、当然気になりますよ！」"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
# 「うぅ……そこまで言われると恥ずかしいんだけど……」
