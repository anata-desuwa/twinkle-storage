# 「くっ……俺の負けです……」
line = "「くっ……俺の負けです……」"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
# 「どうしたの、会長くん？　ずいぶんあっさりだったじゃない」
line = "「どうしたの、会長くん？　ずいぶんあっさりだったじゃない」"

[[dialogue]]
speaker = "unk"
# 元々英雄と呼ばれるほどの実力者であるウィステリアさんが新たな力に目覚めたのだから、魔将フォームは本当に強力だ。
line = "元々英雄と呼ばれるほどの実力者であるウィステリアさんが新たな力に目覚めたのだから、魔将フォームは本当に強力だ。"

[[dialogue]]
speaker = "unk"
# ただそれ以上に、肌の露出が大きくなっていて、そこに気を取られてしまった。
line = "ただそれ以上に、肌の露出が大きくなっていて、そこに気を取られてしまった。"

[[dialogue]]
speaker = "クロト"
# 「えっと、それは……ウィステリアさんの肌が気になって……」
