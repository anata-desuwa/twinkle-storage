[[dialogue]]
speaker = "unk"
# 第１話,エリスさんは風紀委員,P
line = "第１話,エリスさんは風紀委員,P"

[[dialogue]]
speaker = "unk"
# 新星学園の星徒会長になり、流星の星徒会とも邂逅してから数日。
line = "新星学園の星徒会長になり、流星の星徒会とも邂逅してから数日。"

[[dialogue]]
speaker = "unk"
# 星徒会の仕事の帰りにモンスターと遭遇し、俺が倒そうとしたのだが──
line = "星徒会の仕事の帰りにモンスターと遭遇し、俺が倒そうとしたのだが──"

[[dialogue]]
speaker = "エリス"
# 「フルール・ド・エクレール！」
line = "「フルール・ド・エクレール！」"

[[dialogue]]
speaker = "unk"
# 一撃で倒した！？
line = "一撃で倒した！？"

[[dialogue]]
speaker = "エリス"
# 「お怪我はありませんか？　……ご無事なようですね。良かったです」
line = "「お怪我はありませんか？　……ご無事なようですね。良かったです」"

[[dialogue]]
speaker = "エリス"
# 「ところで見慣れないお顔ですが、新星学園の生徒でしょうか？」
line = "「ところで見慣れないお顔ですが、新星学園の生徒でしょうか？」"

[[dialogue]]
speaker = "エリス"
# 「しかしあなたはプリマステラではないですよね？　私は流星・新星・附属各校のプリマステラを把握していますが、あなたのことは存じ上げておりません」
line = "「しかしあなたはプリマステラではないですよね？　私は流星・新星・附属各校のプリマステラを把握していますが、あなたのことは存じ上げておりません」"

[[dialogue]]
speaker = "エリス"
# 「──失礼、申し遅れました。私はエリス・クローデル。流星学園２年生で、風紀委員に所属しています」
line = "「──失礼、申し遅れました。私はエリス・クローデル。流星学園２年生で、風紀委員に所属しています」"

[[dialogue]]
speaker = "エリス"
# 「星徒会が先頭に立ってモンスターと戦うように、流星学園や新星学園の委員会には普通の学校とは違う役割があります」
line = "「星徒会が先頭に立ってモンスターと戦うように、流星学園や新星学園の委員会には普通の学校とは違う役割があります」"

[[dialogue]]
speaker = "エリス"
# 「風紀委員の仕事は星騎士のルールを守らせること。たとえばプリマステラでないのに独断で戦闘したり、星術を使って私闘を行ったりですね」
line = "「風紀委員の仕事は星騎士のルールを守らせること。たとえばプリマステラでないのに独断で戦闘したり、星術を使って私闘を行ったりですね」"

[[dialogue]]
speaker = "エリス"
# 「もし注意や警告に従わない場合、実力を行使して直接取り締まる権限もあります」
line = "「もし注意や警告に従わない場合、実力を行使して直接取り締まる権限もあります」"

[[dialogue]]
speaker = "エリス"
# 「新星学園の生徒であればご存じのことと思いますが……」
line = "「新星学園の生徒であればご存じのことと思いますが……」"

[[dialogue]]
speaker = "ルリエル"
# 「ルリエル参上──って、もう終わっちゃってるです。エリス先輩と新星の会長さんがやったんですか？」
line = "「ルリエル参上──って、もう終わっちゃってるです。エリス先輩と新星の会長さんがやったんですか？」"

[[dialogue]]
speaker = "エリス"
# 「会長さん？　もしかして、御前試合でヴィーナス前会長を破って新会長になったという……あなたがそうでしたか」
line = "「会長さん？　もしかして、御前試合でヴィーナス前会長を破って新会長になったという……あなたがそうでしたか」"

[[dialogue]]
speaker = "エリス"
# 「であれば私が剣を抜く必要はありませんでしたね。すみません、差し出がましい真似をしました」
line = "「であれば私が剣を抜く必要はありませんでしたね。すみません、差し出がましい真似をしました」"

[[dialogue]]
speaker = "unk"
# でも俺は会長やプリマステラじゃなくても戦う
line = "でも俺は会長やプリマステラじゃなくても戦う"

[[dialogue]]
speaker = "エリス"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "エリス"
# 「ふふっ」
line = "「ふふっ」"

[[dialogue]]
speaker = "unk"
# 笑われた！？
line = "笑われた！？"

[[dialogue]]
speaker = "エリス"
# 「すみません、失礼しました。とても真っ直ぐな人だなと思って」
line = "「すみません、失礼しました。とても真っ直ぐな人だなと思って」"

[[dialogue]]
speaker = "エリス"
# 「私も同感です」
line = "「私も同感です」"

[[dialogue]]
speaker = "unk"
# え？
line = "え？"

[[dialogue]]
speaker = "エリス"
# 「ですが、そういう人がいるからこそ、プリマステラがあるのだと理解してください。血気盛んな生徒に言うことを聞かせるためにも規則やルールが必要なんですよ」
line = "「ですが、そういう人がいるからこそ、プリマステラがあるのだと理解してください。血気盛んな生徒に言うことを聞かせるためにも規則やルールが必要なんですよ」"

[[dialogue]]
speaker = "エリス"
# 「実は私も経験がありまして──」
line = "「実は私も経験がありまして──」"

[[dialogue]]
speaker = "エリス"
# 「私はフランスのリヨンの生まれなのですが、故郷でモンスターが発生した際、私も独力で迎え撃とうとしたのです」
line = "「私はフランスのリヨンの生まれなのですが、故郷でモンスターが発生した際、私も独力で迎え撃とうとしたのです」"

[[dialogue]]
speaker = "エリス"
# 「私の母はかつて流星学園に在籍していた天使で、私はその母から星術の手ほどきを受けていました」
line = "「私の母はかつて流星学園に在籍していた天使で、私はその母から星術の手ほどきを受けていました」"

[[dialogue]]
speaker = "エリス"
# 「だから私なら十分戦える。そう思ったのですが……結果は敗北。危うく命を落とすところを助けてもらいました」
line = "「だから私なら十分戦える。そう思ったのですが……結果は敗北。危うく命を落とすところを助けてもらいました」"

[[dialogue]]
speaker = "エリス"
# 「そしてより力をつけるために流星学園に入学したのです」
line = "「そしてより力をつけるために流星学園に入学したのです」"

[[dialogue]]
speaker = "エリス"
# 「星騎士はモンスターと戦うのが務めなのに、どうしてプリマステラの規則があるのか。疑問に思われたかもしれません」
line = "「星騎士はモンスターと戦うのが務めなのに、どうしてプリマステラの規則があるのか。疑問に思われたかもしれません」"

[[dialogue]]
speaker = "エリス"
# 「それはもちろん、単純に危険だからです」
line = "「それはもちろん、単純に危険だからです」"

[[dialogue]]
speaker = "エリス"
# 「経験があれば、自分より強い敵が出現してもそれを察し、足止めに撤する、あるいは撤退するという判断ができます」
line = "「経験があれば、自分より強い敵が出現してもそれを察し、足止めに撤する、あるいは撤退するという判断ができます」"

[[dialogue]]
speaker = "エリス"
# 「ですが経験のない者ほど彼我の戦力を正確に判断できません。星力や星術も未熟な中、強敵と遭遇し、戦力差に気付かず戦ってしまったら……想像したくないですね」
line = "「ですが経験のない者ほど彼我の戦力を正確に判断できません。星力や星術も未熟な中、強敵と遭遇し、戦力差に気付かず戦ってしまったら……想像したくないですね」"

[[dialogue]]
speaker = "エリス"
# 「一般の方々の安全が脅かされている状況だったら──とも思うでしょう。ですが戦う力がないなら逃げるべきです」
line = "「一般の方々の安全が脅かされている状況だったら──とも思うでしょう。ですが戦う力がないなら逃げるべきです」"

[[dialogue]]
speaker = "エリス"
# 「星騎士は選ばれた戦士ですが、同時に若き学生でもある。本来なら守られる側の存在です」
line = "「星騎士は選ばれた戦士ですが、同時に若き学生でもある。本来なら守られる側の存在です」"

[[dialogue]]
speaker = "エリス"
# 「未熟な力で立ち向かえば、何も守れないばかりか、いたずらに命を散らしてしまう。それを防ぐための規則です」
line = "「未熟な力で立ち向かえば、何も守れないばかりか、いたずらに命を散らしてしまう。それを防ぐための規則です」"

[[dialogue]]
speaker = "エリス"
# 「……と、いち風紀委員が星徒会長に説明するのもおこがましいですが」
line = "「……と、いち風紀委員が星徒会長に説明するのもおこがましいですが」"

[[dialogue]]
speaker = "unk"
# ありがとう。納得した
line = "ありがとう。納得した"

[[dialogue]]
speaker = "エリス"
# 「それなら良かったです」
line = "「それなら良かったです」"

[[dialogue]]
speaker = "ルリエル"
# 「ほえ～……さすがエリス先輩なのです……」
line = "「ほえ～……さすがエリス先輩なのです……」"

[[dialogue]]
speaker = "エリス"
# 「いえ、そこまで感心されなくても……」
line = "「いえ、そこまで感心されなくても……」"

[[dialogue]]
speaker = "ルリエル"
# 「でもでも、エリス先輩だって星徒会でもおかしくないのですよ！」
line = "「でもでも、エリス先輩だって星徒会でもおかしくないのですよ！」"

[[dialogue]]
speaker = "ルリエル"
# 「風紀委員は、場合によっては他の星騎士を力ずくで止める必要がありますから、よほど強くないとなれません」
line = "「風紀委員は、場合によっては他の星騎士を力ずくで止める必要がありますから、よほど強くないとなれません」"

[[dialogue]]
speaker = "ルリエル"
# 「エリス先輩はそのエースですし、流星学園のプリマステラの中でも実力者なのです」
line = "「エリス先輩はそのエースですし、流星学園のプリマステラの中でも実力者なのです」"

[[dialogue]]
speaker = "ルリエル"
# 「だけどエリス先輩がモンスターに負けた話は初めて聞きました。ちょっと意外です」
line = "「だけどエリス先輩がモンスターに負けた話は初めて聞きました。ちょっと意外です」"

[[dialogue]]
speaker = "エリス"
# 「いえいえ、私なんてまだまだです」
line = "「いえいえ、私なんてまだまだです」"

[[dialogue]]
speaker = "エリス"
# 「ちなみにその話ですが……あまり口外しないでいただけると助かります。私にとっては恥ずかしい記憶ですし、風紀委員としての立場がありますので」
line = "「ちなみにその話ですが……あまり口外しないでいただけると助かります。私にとっては恥ずかしい記憶ですし、風紀委員としての立場がありますので」"

[[dialogue]]
speaker = "unk"
# わかった、約束する
line = "わかった、約束する"

[[dialogue]]
speaker = "エリス"
# 「ありがとうございます。風紀委員としても私個人としても助かります」
line = "「ありがとうございます。風紀委員としても私個人としても助かります」"

[[dialogue]]
speaker = "ルリエル"
# 「ルリエルもりょーかいでありますっ」
line = "「ルリエルもりょーかいでありますっ」"

[[dialogue]]
speaker = "エリス"
# 「それでは私とルリエルさんは寮に戻ります。新しい新星の星徒会長として、頑張ってくださいね」
line = "「それでは私とルリエルさんは寮に戻ります。新しい新星の星徒会長として、頑張ってくださいね」"
