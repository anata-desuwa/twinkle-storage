[[dialogue]]
speaker = "unk"
# 第３話,イングリットとジュリエッテ,P
line = "第３話,イングリットとジュリエッテ,P"

[[dialogue]]
speaker = "イングリット"
# 「魔王、腹が減った。食事でも奢ってもらおうか」
line = "「魔王、腹が減った。食事でも奢ってもらおうか」"

[[dialogue]]
speaker = "unk"
# いきなり何！？
line = "いきなり何！？"

[[dialogue]]
speaker = "イングリット"
# 「これから貴様と戦うのだから、その前に腹ごしらえだ。何もおかしなことはあるまい」
line = "「これから貴様と戦うのだから、その前に腹ごしらえだ。何もおかしなことはあるまい」"

[[dialogue]]
speaker = "unk"
# おかしなところしかない！？
line = "おかしなところしかない！？"

[[dialogue]]
speaker = "イングリット"
# 「戦う気はないし、奢る理由もない……と？　なんだ、魔王のくせにケチだな」
line = "「戦う気はないし、奢る理由もない……と？　なんだ、魔王のくせにケチだな」"

[[dialogue]]
speaker = "イングリット"
# 「金？　そんなもの持っていない。私には必要ないものだからな」
line = "「金？　そんなもの持っていない。私には必要ないものだからな」"

[[dialogue]]
speaker = "イングリット"
# 「いつもジュリエッテに食事を用意させている。だが、今日に限ってジュリエッテが見つからんのだ」
line = "「いつもジュリエッテに食事を用意させている。だが、今日に限ってジュリエッテが見つからんのだ」"

[[dialogue]]
speaker = "イングリット"
# 「だから今日は魔王が私に馳走しろ。出来るだけ旨いものがいい」
line = "「だから今日は魔王が私に馳走しろ。出来るだけ旨いものがいい」"

[[dialogue]]
speaker = "unk"
# それが人に物を頼む態度？
line = "それが人に物を頼む態度？"

[[dialogue]]
speaker = "イングリット"
# 「別に頼んでなどいない。これは命令だ。この私が人に物を頼むわけがないだろう」
line = "「別に頼んでなどいない。これは命令だ。この私が人に物を頼むわけがないだろう」"

[[dialogue]]
speaker = "イングリット"
# 「だから魔王、早く私に奢れ」
line = "「だから魔王、早く私に奢れ」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「……流石に横暴がすぎるでございますわよ。イングリット様」
line = "「……流石に横暴がすぎるでございますわよ。イングリット様」"

[[dialogue]]
speaker = "イングリット"
# 「ジュリエッテ、今までどこに行っていた」
line = "「ジュリエッテ、今までどこに行っていた」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「そんなの決まってるでございますよ！　イングリット様から逃げていたのでございます！」
line = "「そんなの決まってるでございますよ！　イングリット様から逃げていたのでございます！」"

[[dialogue]]
speaker = "イングリット"
# 「？？？　なぜ私から逃げる必要がある？」
line = "「？？？　なぜ私から逃げる必要がある？」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「ほ、本気で言ってございますの！？」
line = "「ほ、本気で言ってございますの！？」"

[[dialogue]]
speaker = "ジュリエッテ"
# （この戦闘狂の人格破綻者めぇぇ！　自分が厄災の化身だという自覚を持ちやがれでございますの！！）
line = "（この戦闘狂の人格破綻者めぇぇ！　自分が厄災の化身だという自覚を持ちやがれでございますの！！）"

[[dialogue]]
speaker = "ジュリエッテ"
# 「まったく……イングリット様の横暴さに耐えかねて、わたくしもついつい出てきてしまいました」
line = "「まったく……イングリット様の横暴さに耐えかねて、わたくしもついつい出てきてしまいました」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「ということですので魔王様、イングリット様には気を付けてくださいまし。すでに被害に遭っていらっしゃるようですけど」
line = "「ということですので魔王様、イングリット様には気を付けてくださいまし。すでに被害に遭っていらっしゃるようですけど」"

[[dialogue]]
speaker = "イングリット"
# 「いいから食事だ。貴様らのどちらでもいいから食わせろ」
line = "「いいから食事だ。貴様らのどちらでもいいから食わせろ」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「どういたしましょう魔王様……こうなったイングリット様は<ruby=てこ>梃子</ruby>でも動きません。駄々をこねる子どもより厄介でございます……」
line = "「どういたしましょう魔王様……こうなったイングリット様は<ruby>梃子<rt>てこ</rt></ruby>でも動きません。駄々をこねる子どもより厄介でございます……」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「仕方ありませんわ。魔王様、もしよろしければ一緒に食事でもいかがでございましょうか？」
line = "「仕方ありませんわ。魔王様、もしよろしければ一緒に食事でもいかがでございましょうか？」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「もちろんお代は結構でございますわ。このわたくし、ジュリエッテ・ハルヴィーノがご馳走して差し上げますのっ」
line = "「もちろんお代は結構でございますわ。このわたくし、ジュリエッテ・ハルヴィーノがご馳走して差し上げますのっ」"

[[dialogue]]
speaker = "unk"
# 本当にいいの？
line = "本当にいいの？"

[[dialogue]]
speaker = "ジュリエッテ"
# 「ええ、もちろん大丈夫でございますわ。イングリット様が普段からご迷惑をおかけしていることでしょうし」
line = "「ええ、もちろん大丈夫でございますわ。イングリット様が普段からご迷惑をおかけしていることでしょうし」"

[[dialogue]]
speaker = "ジュリエッテ"
# （フフフ……それに魔王様に恩を売っておくことは、悪いことではございませんからね♪）
line = "（フフフ……それに魔王様に恩を売っておくことは、悪いことではございませんからね♪）"

[[dialogue]]
speaker = "イングリット"
# 「話はまとまったか？　全く、無駄な時間を取らせないでほしいものだ」
line = "「話はまとまったか？　全く、無駄な時間を取らせないでほしいものだ」"

[[dialogue]]
speaker = "ジュリエッテ"
# （こ、この方は本当に～～～～～～！！　いっそのことぶん殴ってやりましょうか！！　戦ったら負けるのはこちらでございますが！！）
line = "（こ、この方は本当に～～～～～～！！　いっそのことぶん殴ってやりましょうか！！　戦ったら負けるのはこちらでございますが！！）"

[[dialogue]]
speaker = "ジュリエッテ"
# 「こ、コホン……とりあえず行きましょうか魔王様」
line = "「こ、コホン……とりあえず行きましょうか魔王様」"

[[dialogue]]
speaker = "イングリット"
# 「ああ、早く案内しろ。腹が空きすぎて胃に穴が開きそうだ」
line = "「ああ、早く案内しろ。腹が空きすぎて胃に穴が開きそうだ」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「イングリット様は少し遠慮という言葉を覚えてくださいまし！」
line = "「イングリット様は少し遠慮という言葉を覚えてくださいまし！」"

[[dialogue]]
speaker = "イングリット"
# 「ふぅ、なかなか美味い飯だったな。悪くない店だ」
line = "「ふぅ、なかなか美味い飯だったな。悪くない店だ」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「人のお金で遠慮なく食べれるご飯はさぞ美味しいでございましょうよ」
line = "「人のお金で遠慮なく食べれるご飯はさぞ美味しいでございましょうよ」"

[[dialogue]]
speaker = "イングリット"
# 「？？？　誰の金かで味が変わるのか？」
line = "「？？？　誰の金かで味が変わるのか？」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「嫌味がまるで通じないでございますわ～！」
line = "「嫌味がまるで通じないでございますわ～！」"

[[dialogue]]
speaker = "イングリット"
# 「さて、腹も満たされたことだ。魔王よ、勝負といこう」
line = "「さて、腹も満たされたことだ。魔王よ、勝負といこう」"

[[dialogue]]
speaker = "unk"
# また戦い？
line = "また戦い？"

[[dialogue]]
speaker = "ジュリエッテ"
# 「イングリット様……あなた様は本当に食べるか戦うかしかないのでございますか？」
line = "「イングリット様……あなた様は本当に食べるか戦うかしかないのでございますか？」"

[[dialogue]]
speaker = "イングリット"
# 「それの何が悪い。好きなものを食らい、好きなだけ戦う。これこそが至高の人生だ」
line = "「それの何が悪い。好きなものを食らい、好きなだけ戦う。これこそが至高の人生だ」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「それで他人に迷惑をかけていなければ文句はないのでございますが……コラプサーのわたくしが言うのもなんですけど」
line = "「それで他人に迷惑をかけていなければ文句はないのでございますが……コラプサーのわたくしが言うのもなんですけど」"

[[dialogue]]
speaker = "イングリット"
# 「他者を気にするなど私らしくない」
line = "「他者を気にするなど私らしくない」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「そんなカス発言をドヤ顔でおっしゃられても……」
line = "「そんなカス発言をドヤ顔でおっしゃられても……」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「というよりイングリット様、残念ながら今日はコラプサーの招集がかかっておりますので、戦闘は諦めてくださいまし」
line = "「というよりイングリット様、残念ながら今日はコラプサーの招集がかかっておりますので、戦闘は諦めてくださいまし」"

[[dialogue]]
speaker = "イングリット"
# 「招集など、どうせ退屈な話を聞かされるだけだろう。そんなものより魔王との対決の方が大事だ」
line = "「招集など、どうせ退屈な話を聞かされるだけだろう。そんなものより魔王との対決の方が大事だ」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「そういうわけにはいかないでございますの！　ほら、もし参加したらわたくし達のボスと戦うこともできるかもしれませんわよ」
line = "「そういうわけにはいかないでございますの！　ほら、もし参加したらわたくし達のボスと戦うこともできるかもしれませんわよ」"

[[dialogue]]
speaker = "イングリット"
# 「何？　奴と戦えるのか？」
line = "「何？　奴と戦えるのか？」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「え、ええ……そういう可能性もあるに違いありませんわ……！」
line = "「え、ええ……そういう可能性もあるに違いありませんわ……！」"

[[dialogue]]
speaker = "ジュリエッテ"
# （９９パーセント有り得ないことでございましょうけど！！）
line = "（９９パーセント有り得ないことでございましょうけど！！）"

[[dialogue]]
speaker = "イングリット"
# 「分かった、今日のところは招集に応じてやろう。魔王よ、貴様との勝負は預けたぞ」
line = "「分かった、今日のところは招集に応じてやろう。魔王よ、貴様との勝負は預けたぞ」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「魔王様、今日はご一緒にお食事が出来て楽しかったでございますわ。またの機会にお会いしましょう♪」
line = "「魔王様、今日はご一緒にお食事が出来て楽しかったでございますわ。またの機会にお会いしましょう♪」"

[[dialogue]]
speaker = "unk"
# イングリット……本当に嵐のようなコラプサーだ……
line = "イングリット……本当に嵐のようなコラプサーだ……"
