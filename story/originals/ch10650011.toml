[[dialogue]]
speaker = "unk"
# 第１話,異国の聖女,P
line = "第１話,異国の聖女,P"

[[dialogue]]
speaker = "unk"
# 日曜日、モンスターを倒して報告のために学園に来ると、大聖堂の方に人だかりができていた。
line = "日曜日、モンスターを倒して報告のために学園に来ると、大聖堂の方に人だかりができていた。"

[[dialogue]]
speaker = "シャロン"
# 「会長さまも日曜礼拝でしょうか？　でしたらこちらにどうぞ」
line = "「会長さまも日曜礼拝でしょうか？　でしたらこちらにどうぞ」"

[[dialogue]]
speaker = "unk"
# 今日は人が多いみたいだけど
line = "今日は人が多いみたいだけど"

[[dialogue]]
speaker = "シャロン"
# 「はい。イタリアから聖女様が来られたので」
line = "「はい。イタリアから聖女様が来られたので」"

[[dialogue]]
speaker = "unk"
# 聖女？
line = "聖女？"

[[dialogue]]
speaker = "シャロン"
# 「あ、そろそろ説法が始まります。椅子にお座りください」
line = "「あ、そろそろ説法が始まります。椅子にお座りください」"

[[dialogue]]
speaker = "イレーナ"
# 「お初にお目にかかります。イレーナ・ロレンツェッティと申します」
line = "「お初にお目にかかります。イレーナ・ロレンツェッティと申します」"

[[dialogue]]
speaker = "イレーナ"
# 「どうやら今日お集まりいただいた方は、私の噂をご存じのようですね。嬉しいやら恥ずかしいやら」
line = "「どうやら今日お集まりいただいた方は、私の噂をご存じのようですね。嬉しいやら恥ずかしいやら」"

[[dialogue]]
speaker = "イレーナ"
# 「畏れ多いことに、私は故郷では聖女と呼ばれておりました。この流星市国の地でも、聖女と認められるにふさわしいよう努力する所存です」
line = "「畏れ多いことに、私は故郷では聖女と呼ばれておりました。この流星市国の地でも、聖女と認められるにふさわしいよう努力する所存です」"

[[dialogue]]
speaker = "イレーナ"
# 「おっと、私の身の上話ばかりしていてはいけませんね。女神様に叱られてしまいます」
line = "「おっと、私の身の上話ばかりしていてはいけませんね。女神様に叱られてしまいます」"

[[dialogue]]
speaker = "イレーナ"
# 「今日のお話は……そうですね。ここは世界の信仰の中心、ファリア大聖堂。そしてかの有名な太陽の壁画が掲げられています」
line = "「今日のお話は……そうですね。ここは世界の信仰の中心、ファリア大聖堂。そしてかの有名な太陽の壁画が掲げられています」"

[[dialogue]]
speaker = "イレーナ"
# 「それにちなんで、人間・魔族・天使が手を取り合い、魔王を討ち果たした時の話をいたしましょう」
line = "「それにちなんで、人間・魔族・天使が手を取り合い、魔王を討ち果たした時の話をいたしましょう」"

[[dialogue]]
speaker = "イレーナ"
# 「──魔王が世界を荒らし始めた時、天使ははじめ傍観しました。いたずらに地上や魔界に介入すべきではないと」
line = "「──魔王が世界を荒らし始めた時、天使ははじめ傍観しました。いたずらに地上や魔界に介入すべきではないと」"

[[dialogue]]
speaker = "イレーナ"
# 「魔族は他の種族を拒みました。魔界を守るのは我ら魔族だと」
line = "「魔族は他の種族を拒みました。魔界を守るのは我ら魔族だと」"

[[dialogue]]
speaker = "イレーナ"
# 「そして人間は無力を嘆き、ただ逃げ惑うばかりでした」
line = "「そして人間は無力を嘆き、ただ逃げ惑うばかりでした」"

[[dialogue]]
speaker = "イレーナ"
# 「ですが天使も魔族も人間も、魔王に抗うために協力しなければいけないのは本当はわかっていました。しかし怖かったのです」
line = "「ですが天使も魔族も人間も、魔王に抗うために協力しなければいけないのは本当はわかっていました。しかし怖かったのです」"

[[dialogue]]
speaker = "イレーナ"
# 「世界を破壊せんとする魔王への恐怖だけではありません」
line = "「世界を破壊せんとする魔王への恐怖だけではありません」"

[[dialogue]]
speaker = "イレーナ"
# 「自分と異なる種。異界の住人。今の皆さんは天使も魔族も当たり前のように知っていますが、当時はその実在さえ不確かに思われていた時代」
line = "「自分と異なる種。異界の住人。今の皆さんは天使も魔族も当たり前のように知っていますが、当時はその実在さえ不確かに思われていた時代」"

[[dialogue]]
speaker = "イレーナ"
# 「魔族や天使の存在は、非力な人間にとって恐ろしい存在に映ったのです」
line = "「魔族や天使の存在は、非力な人間にとって恐ろしい存在に映ったのです」"

[[dialogue]]
speaker = "イレーナ"
# 「しかしある人間が言いました。このまま世界が滅ぶくらいなら──」
line = "「しかしある人間が言いました。このまま世界が滅ぶくらいなら──」"

[[dialogue]]
speaker = "イレーナ"
# 「──と、こうして三界の住人は手を取り合い、魔王に打ち克つことができました」
line = "「──と、こうして三界の住人は手を取り合い、魔王に打ち克つことができました」"

[[dialogue]]
speaker = "イレーナ"
# 「信じることがいかに勇気のいることか。歩み寄ることがいかに難しいか。おわかりいただけたかと思います」
line = "「信じることがいかに勇気のいることか。歩み寄ることがいかに難しいか。おわかりいただけたかと思います」"

[[dialogue]]
speaker = "イレーナ"
# 「ですが、だからこそ、最初の一歩は偉大なものとなるのです」
line = "「ですが、だからこそ、最初の一歩は偉大なものとなるのです」"

[[dialogue]]
speaker = "イレーナ"
# 「今日の説法はこれまでといたしょう。皆さんに女神様の祝福がありますように」
line = "「今日の説法はこれまでといたしょう。皆さんに女神様の祝福がありますように」"

[[dialogue]]
speaker = "unk"
# （いつの間にか聞き入っていた……）
line = "（いつの間にか聞き入っていた……）"

[[dialogue]]
speaker = "イレーナ"
# 「おや、その腕章……もしかしてあなたが新星学園の星徒会長さんですか？」
line = "「おや、その腕章……もしかしてあなたが新星学園の星徒会長さんですか？」"

[[dialogue]]
speaker = "イレーナ"
# 「改めまして、私はイレーナ。流星学園の生徒ですが、先ほどご覧の通り神官でもあります」
line = "「改めまして、私はイレーナ。流星学園の生徒ですが、先ほどご覧の通り神官でもあります」"

[[dialogue]]
speaker = "イレーナ"
# 「数日前に流星学園に転入して、この大聖堂の所属になったばかりなんです」
line = "「数日前に流星学園に転入して、この大聖堂の所属になったばかりなんです」"

[[dialogue]]
speaker = "イレーナ"
# 「会長さんも最近新星学園に転入されたと聞きました。学年も同じですし奇遇ですね」
line = "「会長さんも最近新星学園に転入されたと聞きました。学年も同じですし奇遇ですね」"

[[dialogue]]
speaker = "イレーナ"
# 「会長さんの方が少し先輩ですが、転入生同士、仲良くしていただけると嬉しいです」
line = "「会長さんの方が少し先輩ですが、転入生同士、仲良くしていただけると嬉しいです」"

[[dialogue]]
speaker = "イレーナ"
# 「それと──先ほどは失礼しました。あなたが礼拝にいらっしゃっていたとは知らなくて」
line = "「それと──先ほどは失礼しました。あなたが礼拝にいらっしゃっていたとは知らなくて」"

[[dialogue]]
speaker = "イレーナ"
# 「あなたが魔王だという噂は存じております。気分を害されたのなら謝罪します」
line = "「あなたが魔王だという噂は存じております。気分を害されたのなら謝罪します」"

[[dialogue]]
speaker = "unk"
# 気にしてないので大丈夫です
line = "気にしてないので大丈夫です"

[[dialogue]]
speaker = "イレーナ"
# 「それなら安心しました」
line = "「それなら安心しました」"

[[dialogue]]
speaker = "イレーナ"
# 「あ……会長さん、お手を失礼します」
line = "「あ……会長さん、お手を失礼します」"

[[dialogue]]
speaker = "イレーナ"
# 「モンスターと戦っておられたのですよね。少し傷が残っていましたので治療しました。もう痛くないはずですよ」
line = "「モンスターと戦っておられたのですよね。少し傷が残っていましたので治療しました。もう痛くないはずですよ」"

[[dialogue]]
speaker = "イレーナ"
# 「私には幼い頃から癒しの力がありまして。こうして人々を助けていたら、いつの間にか聖女なんて呼ばれるようになっていたんです」
line = "「私には幼い頃から癒しの力がありまして。こうして人々を助けていたら、いつの間にか聖女なんて呼ばれるようになっていたんです」"

[[dialogue]]
speaker = "イレーナ"
# 「しかし聖女の祈りよりも、血の献身の方が尊いもの。いつも懸命に戦っておられる会長さんには頭が下がります」
line = "「しかし聖女の祈りよりも、血の献身の方が尊いもの。いつも懸命に戦っておられる会長さんには頭が下がります」"

[[dialogue]]
speaker = "イレーナ"
# 「それではまたお会いしましょう。この大聖堂でお待ちしています」
line = "「それではまたお会いしましょう。この大聖堂でお待ちしています」"

[[dialogue]]
speaker = "unk"
# 礼拝の後、学園に報告をして、ついでに星徒会の書類仕事を片付けて、そこで大聖堂にＤＩＳＣを忘れたことに気付いた。
line = "礼拝の後、学園に報告をして、ついでに星徒会の書類仕事を片付けて、そこで大聖堂にＤＩＳＣを忘れたことに気付いた。"

[[dialogue]]
speaker = "unk"
# 誰か残っていてくれるといいんだが……
line = "誰か残っていてくれるといいんだが……"

[[dialogue]]
speaker = "？？？"
# 「揃いも揃って上っ面に騙されちゃって、流星市国の人たちもチョロいもんね」
line = "「揃いも揃って上っ面に騙されちゃって、流星市国の人たちもチョロいもんね」"

[[dialogue]]
speaker = "イレーナ"
# 「あんなに集まっちゃってさ、聖女様がそんなに見たいわけ？　あたしは動物園のライオンかっての」
line = "「あんなに集まっちゃってさ、聖女様がそんなに見たいわけ？　あたしは動物園のライオンかっての」"

[[dialogue]]
speaker = "イレーナ"
# 「それにしても新星の会長、御前試合とやらで勝ったらしいけど本当なの？　そんな強そうには見えなかったけど──」
line = "「それにしても新星の会長、御前試合とやらで勝ったらしいけど本当なの？　そんな強そうには見えなかったけど──」"

[[dialogue]]
speaker = "unk"
# イレーナ？
line = "イレーナ？"

[[dialogue]]
speaker = "イレーナ"
# 「はぁっ！？　なんであんたがここにいるのよ！？」
line = "「はぁっ！？　なんであんたがここにいるのよ！？」"
