[[dialogue]]
speaker = "unk"
# そしていつもの式場にて、イレーナ、ジュエリーとの結婚式が開かれた。
line = "そしていつもの式場にて、イレーナ、ジュエリーとの結婚式が開かれた。"

[[dialogue]]
speaker = "unk"
# 神官役はフィオナが務め、シャロン、トワ先生といった事情を知るごく限られた数名が参列者となった。
line = "神官役はフィオナが務め、シャロン、トワ先生といった事情を知るごく限られた数名が参列者となった。"

[[dialogue]]
speaker = "フィオナ"
# 「新郎緋宮クロト。あなたはイレーナ・ロレンツェッティを妻とし、健やかなる時も病める時も、富める時も貧しき時も……」
line = "「新郎緋宮クロト。あなたはイレーナ・ロレンツェッティを妻とし、健やかなる時も病める時も、富める時も貧しき時も……」"

[[dialogue]]
speaker = "フィオナ"
# 「彼女を愛し、慈しみ、共に助け合い……命の限り真心を尽くすことを誓いますか？」
line = "「彼女を愛し、慈しみ、共に助け合い……命の限り真心を尽くすことを誓いますか？」"

[[dialogue]]
speaker = "unk"
# はい、誓います
line = "はい、誓います"

[[dialogue]]
speaker = "フィオナ"
# 「新婦イレーナ・ロレンツェッティ。あなたは緋宮クロトを夫とし、健やかなる時も病める時も、富める時も貧しき時も……」
line = "「新婦イレーナ・ロレンツェッティ。あなたは緋宮クロトを夫とし、健やかなる時も病める時も、富める時も貧しき時も……」"

[[dialogue]]
speaker = "フィオナ"
# 「彼を愛し、慈しみ、共に助け合い……命の限り真心を尽くすことを誓いますか？」
line = "「彼を愛し、慈しみ、共に助け合い……命の限り真心を尽くすことを誓いますか？」"

[[dialogue]]
speaker = "イレーナ"
# 「はい、誓います」
line = "「はい、誓います」"

[[dialogue]]
speaker = "フィオナ"
# 「では……誓いの口付けを……」
line = "「では……誓いの口付けを……」"

[[dialogue]]
speaker = "イレーナ"
# 「あくまで結婚式のふりですから、頬にキスさせていただきますね。……いきます、会長さん」
line = "「あくまで結婚式のふりですから、頬にキスさせていただきますね。……いきます、会長さん」"

[[dialogue]]
speaker = "イレーナ"
# 「ちゅっ」
line = "「ちゅっ」"

[[dialogue]]
speaker = "unk"
# イレーナにキスしてもらい、俺も頬にキスを返す。
line = "イレーナにキスしてもらい、俺も頬にキスを返す。"

[[dialogue]]
speaker = "イレーナ"
# 「これは何とも……何度も見てきましたが、自分でするとこそばゆい気持ちになりますね……」
line = "「これは何とも……何度も見てきましたが、自分でするとこそばゆい気持ちになりますね……」"

[[dialogue]]
speaker = "フィオナ"
# 「それでは引き続き、ジュエリーさん」
line = "「それでは引き続き、ジュエリーさん」"

[[dialogue]]
speaker = "ジュエリー"
# 「ああ、いつでもいいよ」
line = "「ああ、いつでもいいよ」"

[[dialogue]]
speaker = "フィオナ"
# 「では……新郎緋宮クロト。あなたはジュエリー・ブラウンを妻とし、健やかなる時も病める時も、富める時も貧しき時も……」
line = "「では……新郎緋宮クロト。あなたはジュエリー・ブラウンを妻とし、健やかなる時も病める時も、富める時も貧しき時も……」"

[[dialogue]]
speaker = "フィオナ"
# 「彼女を愛し、慈しみ、共に助け合い……命の限り真心を尽くすことを誓いますか？」
line = "「彼女を愛し、慈しみ、共に助け合い……命の限り真心を尽くすことを誓いますか？」"

[[dialogue]]
speaker = "unk"
# はい、誓います
line = "はい、誓います"

[[dialogue]]
speaker = "フィオナ"
# 「新婦ジュエリー・ブラウン。あなたは緋宮クロトを夫とし、健やかなる時も病める時も、富める時も貧しき時も……」
line = "「新婦ジュエリー・ブラウン。あなたは緋宮クロトを夫とし、健やかなる時も病める時も、富める時も貧しき時も……」"

[[dialogue]]
speaker = "フィオナ"
# 「彼を愛し、慈しみ、共に助け合い……命の限り真心を尽くすことを誓いますか？」
line = "「彼を愛し、慈しみ、共に助け合い……命の限り真心を尽くすことを誓いますか？」"

[[dialogue]]
speaker = "ジュエリー"
# 「ああ、もちろん誓うとも」
line = "「ああ、もちろん誓うとも」"

[[dialogue]]
speaker = "フィオナ"
# 「では……誓いの口付けを……」
line = "「では……誓いの口付けを……」"

[[dialogue]]
speaker = "ジュエリー"
# 「では私はイレーナさんと反対の頬にさせてもらおうかな」
line = "「では私はイレーナさんと反対の頬にさせてもらおうかな」"

[[dialogue]]
speaker = "ジュエリー"
# 「愛しているよ、我が助手……」
line = "「愛しているよ、我が助手……」"

[[dialogue]]
speaker = "ジュエリー"
# 「ちゅっ」
line = "「ちゅっ」"

[[dialogue]]
speaker = "unk"
# そして俺もジュエリーの頬にキスをする。
line = "そして俺もジュエリーの頬にキスをする。"

[[dialogue]]
speaker = "ジュエリー"
# 「ふふ。ふりとはいえ、キミにキスされると嬉しいね。我が愛しの助手」
line = "「ふふ。ふりとはいえ、キミにキスされると嬉しいね。我が愛しの助手」"

[[dialogue]]
speaker = "イレーナ"
# 「ウェディングドレスが……」
line = "「ウェディングドレスが……」"

[[dialogue]]
speaker = "ジュエリー"
# 「元に戻った。どうやら成功のようだね」
line = "「元に戻った。どうやら成功のようだね」"

[[dialogue]]
speaker = "イレーナ"
# 「ホッとしました……。会長さん、ご協力ありがとうございます」
line = "「ホッとしました……。会長さん、ご協力ありがとうございます」"

[[dialogue]]
speaker = "unk"
# どういたしまして
line = "どういたしまして"

[[dialogue]]
speaker = "フィオナ"
# 「イレーナさん、ジュエリーさん、本当にごめんなさい」
line = "「イレーナさん、ジュエリーさん、本当にごめんなさい」"

[[dialogue]]
speaker = "フィオナ"
# 「元はと言えば、ウェディング因子は私が生み出してしまったものです。そのせいでご迷惑をおかけしてしまって……」
line = "「元はと言えば、ウェディング因子は私が生み出してしまったものです。そのせいでご迷惑をおかけしてしまって……」"

[[dialogue]]
speaker = "ジュエリー"
# 「ふふ、むしろ愛しの助手と睦まじい時間を過ごせて感謝したいくらいさ。そうだろう、イレーナさん？」
line = "「ふふ、むしろ愛しの助手と睦まじい時間を過ごせて感謝したいくらいさ。そうだろう、イレーナさん？」"

[[dialogue]]
speaker = "イレーナ"
# 「ひゃいっ！？」
line = "「ひゃいっ！？」"

[[dialogue]]
speaker = "イレーナ"
# （ちょっ……！？　あたしも一緒にしないでよ！）
line = "（ちょっ……！？　あたしも一緒にしないでよ！）"

[[dialogue]]
speaker = "イレーナ"
# （そりゃ……まあ……花嫁修業とか、何だかんだ楽しかったし……キスとか……ちょっとドキドキしたけど……）
line = "（そりゃ……まあ……花嫁修業とか、何だかんだ楽しかったし……キスとか……ちょっとドキドキしたけど……）"

[[dialogue]]
speaker = "フィオナ"
# 「イレーナさん？」
line = "「イレーナさん？」"

[[dialogue]]
speaker = "イレーナ"
# 「あ……そ、そうですね。貴重な体験をさせていただききました」
line = "「あ……そ、そうですね。貴重な体験をさせていただききました」"

[[dialogue]]
speaker = "ジュエリー"
# 「ふふ……でも正直に言うとね、イレーナさんが助手の頬にキスした時、内心ではハラハラしていたよ」
line = "「ふふ……でも正直に言うとね、イレーナさんが助手の頬にキスした時、内心ではハラハラしていたよ」"

[[dialogue]]
speaker = "イレーナ"
# 「そうなんですか？」
line = "「そうなんですか？」"

[[dialogue]]
speaker = "ジュエリー"
# 「キミが素敵な花嫁だったからね。もしかしたら助手の心を奪われてしまうのではないかと心配になったんだ」
line = "「キミが素敵な花嫁だったからね。もしかしたら助手の心を奪われてしまうのではないかと心配になったんだ」"

[[dialogue]]
speaker = "イレーナ"
# 「ジュエリーさんは確か、会長さんは最終的に自分の隣に戻ってくると信じている……とおっしゃっていたような？」
line = "「ジュエリーさんは確か、会長さんは最終的に自分の隣に戻ってくると信じている……とおっしゃっていたような？」"

[[dialogue]]
speaker = "ジュエリー"
# 「ライバルを前にうろたえる姿を見せたくないじゃないか……あれは私なりの精一杯の強がりだよ」
line = "「ライバルを前にうろたえる姿を見せたくないじゃないか……あれは私なりの精一杯の強がりだよ」"

[[dialogue]]
speaker = "ジュエリー"
# 「しかし、愛しの助手よ。私はここに改めて誓うよ。花嫁としてより精進し、キミのためにキミだけの最高の花嫁になってみせるとね」
line = "「しかし、愛しの助手よ。私はここに改めて誓うよ。花嫁としてより精進し、キミのためにキミだけの最高の花嫁になってみせるとね」"

[[dialogue]]
speaker = "イレーナ"
# 「そうですね。私も本当の結婚の時は、花嫁に相応しい女性でありたいものです」
line = "「そうですね。私も本当の結婚の時は、花嫁に相応しい女性でありたいものです」"

[[dialogue]]
speaker = "イレーナ"
# 「はぁ……本っ当に大変だったわ……花嫁なんてもうコリゴリよ……」
line = "「はぁ……本っ当に大変だったわ……花嫁なんてもうコリゴリよ……」"

[[dialogue]]
speaker = "unk"
# 結婚式が終わり大聖堂に戻ってきて、ようやく緊張を緩めるイレーナ。
line = "結婚式が終わり大聖堂に戻ってきて、ようやく緊張を緩めるイレーナ。"

[[dialogue]]
speaker = "ジュエリー"
# 「おや、では助手は私が貰っていってもいいのかな？」
line = "「おや、では助手は私が貰っていってもいいのかな？」"

[[dialogue]]
speaker = "イレーナ"
# 「う……そういう意味じゃないけど……」
line = "「う……そういう意味じゃないけど……」"

[[dialogue]]
speaker = "ジュエリー"
# 「ほほう……では、助手を巡る花嫁対決から降りるつもりはない、ということだね？」
line = "「ほほう……では、助手を巡る花嫁対決から降りるつもりはない、ということだね？」"

[[dialogue]]
speaker = "イレーナ"
# 「べ、別にあいつのことはどうだっていいけど、花嫁対決に負けるのは嫌だし……」
line = "「べ、別にあいつのことはどうだっていいけど、花嫁対決に負けるのは嫌だし……」"

[[dialogue]]
speaker = "ジュエリー"
# 「素直じゃないね……まあ、今はそういう事にしておいてあげよう」
line = "「素直じゃないね……まあ、今はそういう事にしておいてあげよう」"

[[dialogue]]
speaker = "ジュエリー"
# 「ところでイレーナさん。事件もひと段落したことだし……ここらでひと勝負といかないかい？」
line = "「ところでイレーナさん。事件もひと段落したことだし……ここらでひと勝負といかないかい？」"

[[dialogue]]
speaker = "イレーナ"
# 「そうね、１ラウンドずつ取ったところで中断になっちゃったし。今度は最初から全力で行くわよ」
line = "「そうね、１ラウンドずつ取ったところで中断になっちゃったし。今度は最初から全力で行くわよ」"

[[dialogue]]
speaker = "ジュエリー"
# 「望むところだ」
line = "「望むところだ」"

[[dialogue]]
speaker = "unk"
# どこでやるの？
line = "どこでやるの？"

[[dialogue]]
speaker = "unk"
# 対決はいいんだけど……
line = "対決はいいんだけど……"

[[dialogue]]
speaker = "ジュエリー"
# 「言うまでもないだろう？」
line = "「言うまでもないだろう？」"

[[dialogue]]
speaker = "イレーナ"
# 「あんたの部屋に決まってるでしょ。素のあたしで対戦できるところなんてあそこしかないんだから」
line = "「あんたの部屋に決まってるでしょ。素のあたしで対戦できるところなんてあそこしかないんだから」"

[[dialogue]]
speaker = "イレーナ"
# 「妻の趣味には付き合うものよ。ね、旦那様？」
line = "「妻の趣味には付き合うものよ。ね、旦那様？」"

[[dialogue]]
speaker = "unk"
# それから夜遅くまで、２人の花嫁の戦いで白熱したのだった。
line = "それから夜遅くまで、２人の花嫁の戦いで白熱したのだった。"
