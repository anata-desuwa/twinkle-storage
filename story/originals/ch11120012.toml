[[dialogue]]
speaker = "unk"
# 第２話,チナは未来人,P
line = "第２話,チナは未来人,P"

[[dialogue]]
speaker = "unk"
# チナと共闘することになったとはいえ、アルタイルを滅ぼそうとした極星星徒会の星騎士を完全に自由にさせておくことはできない。
line = "チナと共闘することになったとはいえ、アルタイルを滅ぼそうとした極星星徒会の星騎士を完全に自由にさせておくことはできない。"

[[dialogue]]
speaker = "unk"
# そのため会議室を簡易的な独房にして、いつでも監視できる体制をとっていた。
line = "そのため会議室を簡易的な独房にして、いつでも監視できる体制をとっていた。"

[[dialogue]]
speaker = "チナ"
# 「なんだ、また見に来たのか、魔王」
line = "「なんだ、また見に来たのか、魔王」"

[[dialogue]]
speaker = "チナ"
# 「別に心配しなくても生きてるっての。ハムスターじゃねーんだから」
line = "「別に心配しなくても生きてるっての。ハムスターじゃねーんだから」"

[[dialogue]]
speaker = "チナ"
# 「ん？　なんだ？」
line = "「ん？　なんだ？」"

[[dialogue]]
speaker = "unk"
# （小さくて素早いからハムスターっぽいかも）
line = "（小さくて素早いからハムスターっぽいかも）"

[[dialogue]]
speaker = "チナ"
# 「じっと見てどうした？　変なヤツだな」
line = "「じっと見てどうした？　変なヤツだな」"

[[dialogue]]
speaker = "マトイ"
# 「自由に出歩けないだろうし、暇潰し用にゲーム機を持ってきたよ。といっても、うちで使わなくなったちょっと古いのだけど──」
line = "「自由に出歩けないだろうし、暇潰し用にゲーム機を持ってきたよ。といっても、うちで使わなくなったちょっと古いのだけど──」"

[[dialogue]]
speaker = "チナ"
# 「すげー！　激レアレトロゲームじゃん！」
line = "「すげー！　激レアレトロゲームじゃん！」"

[[dialogue]]
speaker = "マトイ"
# 「レトロゲーム！？」
line = "「レトロゲーム！？」"

[[dialogue]]
speaker = "マトイ"
# 「いやちょっと待って！　そこまで古くないよ！　発売されたのだって４～５年前だし、全然レトロじゃないよ！」
line = "「いやちょっと待って！　そこまで古くないよ！　発売されたのだって４～５年前だし、全然レトロじゃないよ！」"

[[dialogue]]
speaker = "マトイ"
# 「ハッ──！　そうか、デネブはアルタイルより１０年進んでるらしいから、チナちゃんからしたら１５年前のゲームなんだ！　そりゃレトロだよ……」
line = "「ハッ──！　そうか、デネブはアルタイルより１０年進んでるらしいから、チナちゃんからしたら１５年前のゲームなんだ！　そりゃレトロだよ……」"

[[dialogue]]
speaker = "チナ"
# 「これ、やってもいいんだよな？」
line = "「これ、やってもいいんだよな？」"

[[dialogue]]
speaker = "マトイ"
# 「うん、もちろん。古いのだから、チナちゃんが楽しめるかはわからないけど……」
line = "「うん、もちろん。古いのだから、チナちゃんが楽しめるかはわからないけど……」"

[[dialogue]]
speaker = "チナ"
# 「んじゃモニターに繋いで……あ、やっぱり端子は古い規格なんだな」
line = "「んじゃモニターに繋いで……あ、やっぱり端子は古い規格なんだな」"

[[dialogue]]
speaker = "マトイ"
# 「いや、規格はまだ現行のはずなんだけど……」
line = "「いや、規格はまだ現行のはずなんだけど……」"

[[dialogue]]
speaker = "チナ"
# 「お、映った。やっぱ画質荒いな」
line = "「お、映った。やっぱ画質荒いな」"

[[dialogue]]
speaker = "マトイ"
# 「私、最初すごく綺麗って驚いたのに……」
line = "「私、最初すごく綺麗って驚いたのに……」"

[[dialogue]]
speaker = "マトイ"
# 「これがジェネレーションギャップなんだ……お父さんが時々ショック受けてたけど、少し気持ちがわかったよ……」
line = "「これがジェネレーションギャップなんだ……お父さんが時々ショック受けてたけど、少し気持ちがわかったよ……」"

[[dialogue]]
speaker = "unk"
# 俺もちょっと傷ついてきた……
line = "俺もちょっと傷ついてきた……"

[[dialogue]]
speaker = "マトイ"
# 「逆にデネブのゲーム機ってどうなってるの？　やっぱりこっちよりすごいの？」
line = "「逆にデネブのゲーム機ってどうなってるの？　やっぱりこっちよりすごいの？」"

[[dialogue]]
speaker = "チナ"
# 「アタシにとっちゃ普通のゲーム機だから、すごいかどうか聞かれてもわからねえけど、まぁアルタイルから見たらすごいんじゃないか？」
line = "「アタシにとっちゃ普通のゲーム機だから、すごいかどうか聞かれてもわからねえけど、まぁアルタイルから見たらすごいんじゃないか？」"

[[dialogue]]
speaker = "チナ"
# 「最近のだと、全世界同時に１万人参加するシューティングゲームとかあったり」
line = "「最近のだと、全世界同時に１万人参加するシューティングゲームとかあったり」"

[[dialogue]]
speaker = "マトイ"
# 「１万人！？　本当に多いね！？」
line = "「１万人！？　本当に多いね！？」"

[[dialogue]]
speaker = "チナ"
# 「あとミラモンも種類が増えてるし──」
line = "「あとミラモンも種類が増えてるし──」"

[[dialogue]]
speaker = "マトイ"
# 「ちょ、ちょっと待って！？　ミラモンって、ミラクルモンスターだよね！？　全世界的人気シリーズの！？」
line = "「ちょ、ちょっと待って！？　ミラモンって、ミラクルモンスターだよね！？　全世界的人気シリーズの！？」"

[[dialogue]]
speaker = "チナ"
# 「ああ、そのミラモンで合ってるよ」
line = "「ああ、そのミラモンで合ってるよ」"

[[dialogue]]
speaker = "マトイ"
# 「未来のミラモン……すごく知りたい……でも知りたくない……どうしよう……」
line = "「未来のミラモン……すごく知りたい……でも知りたくない……どうしよう……」"

[[dialogue]]
speaker = "チナ"
# 「言った方がいいのか？　それとも言わない方がいいのか？」
line = "「言った方がいいのか？　それとも言わない方がいいのか？」"

[[dialogue]]
speaker = "マトイ"
# 「えーっと、ごめん！　言わない方向でお願い！」
line = "「えーっと、ごめん！　言わない方向でお願い！」"

[[dialogue]]
speaker = "チナ"
# 「わかったよ。まぁバレは面白くないもんな」
line = "「わかったよ。まぁバレは面白くないもんな」"

[[dialogue]]
speaker = "チナ"
# 「地獄のウルトラ進化対戦環境とか、ミラモンショックとか、知らない方がいいと思うし……」
line = "「地獄のウルトラ進化対戦環境とか、ミラモンショックとか、知らない方がいいと思うし……」"

[[dialogue]]
speaker = "マトイ"
# 「何それ！？　めっちゃ気になるワードが飛んできたんですけど！？」
line = "「何それ！？　めっちゃ気になるワードが飛んできたんですけど！？」"

[[dialogue]]
speaker = "チナ"
# 「あっ、悪い……今のは忘れてくれ」
line = "「あっ、悪い……今のは忘れてくれ」"

[[dialogue]]
speaker = "マトイ"
# 「チナちゃんってやっぱり未来の人なんだ……わかっていたつもりだけど、すごく実感しちゃった……」
line = "「チナちゃんってやっぱり未来の人なんだ……わかっていたつもりだけど、すごく実感しちゃった……」"

[[dialogue]]
speaker = "マトイ"
# 「だけどチナちゃんゲーム楽しめてる？　古いゲームだとつまらなかったりしない？」
line = "「だけどチナちゃんゲーム楽しめてる？　古いゲームだとつまらなかったりしない？」"

[[dialogue]]
speaker = "チナ"
# 「ああ、楽しいぞ。アタシは初めてプレイするゲームだし、面白いゲームは何十年経っても面白いもんだ」
line = "「ああ、楽しいぞ。アタシは初めてプレイするゲームだし、面白いゲームは何十年経っても面白いもんだ」"

[[dialogue]]
speaker = "チナ"
# 「リクリエでいろんなものが吹っ飛んだから、流星市国じゃ古いゲームはめちゃくちゃレアだしな」
line = "「リクリエでいろんなものが吹っ飛んだから、流星市国じゃ古いゲームはめちゃくちゃレアだしな」"

[[dialogue]]
speaker = "チナ"
# 「正直、触れる機会があると思ってなかった。それがアルタイルで遊べるとは……なんか妙な気分だ」
line = "「正直、触れる機会があると思ってなかった。それがアルタイルで遊べるとは……なんか妙な気分だ」"

[[dialogue]]
speaker = "マトイ"
# 「……そっか。チナちゃんが気に入ってくれて良かった」
line = "「……そっか。チナちゃんが気に入ってくれて良かった」"

[[dialogue]]
speaker = "マトイ"
# 「あ、アナからメッセージだ。どれどれ……」
line = "「あ、アナからメッセージだ。どれどれ……」"

[[dialogue]]
speaker = "チナ"
# 「ん？　あんたのＤＩＳＣ……」
line = "「ん？　あんたのＤＩＳＣ……」"

[[dialogue]]
speaker = "マトイ"
# 「私のＤＩＳＣがどうしたの？」
line = "「私のＤＩＳＣがどうしたの？」"

[[dialogue]]
speaker = "チナ"
# 「どこかで見たことがあるような……あ、そうだ、昔ばあちゃんが使ってたやつだ」
line = "「どこかで見たことがあるような……あ、そうだ、昔ばあちゃんが使ってたやつだ」"

[[dialogue]]
speaker = "マトイ"
# 「おばあちゃん……！？」
line = "「おばあちゃん……！？」"

[[dialogue]]
speaker = "マトイ"
# 「チナちゃんを相手にしていると、なんだかすごく年を取った気がする……」
line = "「チナちゃんを相手にしていると、なんだかすごく年を取った気がする……」"

[[dialogue]]
speaker = "unk"
# 俺もそうかもしれない……
line = "俺もそうかもしれない……"

[[dialogue]]
speaker = "unk"
# デネブはアルタイルより１０年進んでいると頭ではわかっていても、やはりジェネレーションギャップを感じざるを得ないのだった。
line = "デネブはアルタイルより１０年進んでいると頭ではわかっていても、やはりジェネレーションギャップを感じざるを得ないのだった。"
