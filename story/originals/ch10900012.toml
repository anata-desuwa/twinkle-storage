[[dialogue]]
speaker = "unk"
# 第２話,妹ライバル,P
line = "第２話,妹ライバル,P"

[[dialogue]]
speaker = "unk"
# 翌日。メイプルはついに、新星学園の転入初日を迎えた。
line = "翌日。メイプルはついに、新星学園の転入初日を迎えた。"

[[dialogue]]
speaker = "unk"
# 俺は様子が気になって、放課後に足を運ぶと――
line = "俺は様子が気になって、放課後に足を運ぶと――"

[[dialogue]]
speaker = "メイプル"
# 「あっ、お兄ちゃん！」
line = "「あっ、お兄ちゃん！」"

[[dialogue]]
speaker = "メイプル"
# 「もしかして様子を見に来てくれたの？　にへへ♪　ありがと～♪」
line = "「もしかして様子を見に来てくれたの？　にへへ♪　ありがと～♪」"

[[dialogue]]
speaker = "unk"
# 転入初日、どうだった？
line = "転入初日、どうだった？"

[[dialogue]]
speaker = "メイプル"
# 「ちょっと緊張したけど、楽しかったよ！」
line = "「ちょっと緊張したけど、楽しかったよ！」"

[[dialogue]]
speaker = "メイプル"
# 「アナとルルカもいたし、それからリーリアって子とも仲良くなってね、連絡先も交換したんだ♪」
line = "「アナとルルカもいたし、それからリーリアって子とも仲良くなってね、連絡先も交換したんだ♪」"

[[dialogue]]
speaker = "ルルカ"
# 「じ～っ……」
line = "「じ～っ……」"

[[dialogue]]
speaker = "メイプル"
# 「むっ、殺気……！」
line = "「むっ、殺気……！」"

[[dialogue]]
speaker = "ルルカ"
# 「いや、殺気は出してないよ！？　言いたかっただけでしょ、それ！」
line = "「いや、殺気は出してないよ！？　言いたかっただけでしょ、それ！」"

[[dialogue]]
speaker = "メイプル"
# 「ふふふ、噂をすれば、我が妹ライバルのルルカではないか！　あたしがお兄ちゃんと仲良くしているのが気になる感じかな？」
line = "「ふふふ、噂をすれば、我が妹ライバルのルルカではないか！　あたしがお兄ちゃんと仲良くしているのが気になる感じかな？」"

[[dialogue]]
speaker = "ルルカ"
# 「う……！　それは、教室から出て、たまたま目に入ったから……」
line = "「う……！　それは、教室から出て、たまたま目に入ったから……」"

[[dialogue]]
speaker = "メイプル"
# 「ちょうどいい、ルルカには聞きたいことがあったんだよね。お兄ちゃんも含めて３人で、場所を移して話さない？」
line = "「ちょうどいい、ルルカには聞きたいことがあったんだよね。お兄ちゃんも含めて３人で、場所を移して話さない？」"

[[dialogue]]
speaker = "ルルカ"
# 「促されるまま、誰もいない空き教室まで来たけど、話って何……？　ていうかメイプルちゃん、また眼帯を付けてるし……」
line = "「促されるまま、誰もいない空き教室まで来たけど、話って何……？　ていうかメイプルちゃん、また眼帯を付けてるし……」"

[[dialogue]]
speaker = "メイプル"
# 「Ｖチューバ―『ルカルカ』」
line = "「Ｖチューバ―『ルカルカ』」"

[[dialogue]]
speaker = "ルルカ"
# 「えっ！？」
line = "「えっ！？」"

[[dialogue]]
speaker = "メイプル"
# 「ふっ……反応したな。昨日言っていたＶチューバーという知らない単語が気になって、ＤＩＳＣで調べてみたのだ」
line = "「ふっ……反応したな。昨日言っていたＶチューバーという知らない単語が気になって、ＤＩＳＣで調べてみたのだ」"

[[dialogue]]
speaker = "メイプル"
# 「そうして何人かの配信者を見る内に、ルカルカに行き当たった」
line = "「そうして何人かの配信者を見る内に、ルカルカに行き当たった」"

[[dialogue]]
speaker = "メイプル"
# 「すると、彼女は何故か聞いたことがあるような声をしていて、リスナーを『お兄ちゃん』『お姉ちゃん』と呼んでいるではないか」
line = "「すると、彼女は何故か聞いたことがあるような声をしていて、リスナーを『お兄ちゃん』『お姉ちゃん』と呼んでいるではないか」"

[[dialogue]]
speaker = "メイプル"
# 「それでルルカが昨日、似たようなことを言っていたのを思い出したのだ」
line = "「それでルルカが昨日、似たようなことを言っていたのを思い出したのだ」"

[[dialogue]]
speaker = "ルルカ"
# 「い、いや……それはその……」
line = "「い、いや……それはその……」"

[[dialogue]]
speaker = "メイプル"
# 「Ｖチューバ―、悪くない」
line = "「Ｖチューバ―、悪くない」"

[[dialogue]]
speaker = "ルルカ"
# 「え……？」
line = "「え……？」"

[[dialogue]]
speaker = "メイプル"
# 「何よりもルカルカの歌、あれは素晴らしい」
line = "「何よりもルカルカの歌、あれは素晴らしい」"

[[dialogue]]
speaker = "メイプル"
# 「我も本気で魔王を目指しているからこそ、伝わってきた。声に魂がこもっていて、本気で歌が好きなのだと」
line = "「我も本気で魔王を目指しているからこそ、伝わってきた。声に魂がこもっていて、本気で歌が好きなのだと」"

[[dialogue]]
speaker = "メイプル"
# 「故に……ここに宣言する！　我も今日からルカルカのリスナーとなり、応援すると！」
line = "「故に……ここに宣言する！　我も今日からルカルカのリスナーとなり、応援すると！」"

[[dialogue]]
speaker = "ルルカ"
# 「あれ……？　えっと……？」
line = "「あれ……？　えっと……？」"

[[dialogue]]
speaker = "メイプル"
# 「ふっふっふ……もうわかっているぞ。ルルカも――ルカルカのリスナーなのだろう？」
line = "「ふっふっふ……もうわかっているぞ。ルルカも――ルカルカのリスナーなのだろう？」"

[[dialogue]]
speaker = "メイプル"
# 「だが、そのことを他人には隠していた。それで昨日、お兄ちゃんとの関係も誤魔化したのだ」
line = "「だが、そのことを他人には隠していた。それで昨日、お兄ちゃんとの関係も誤魔化したのだ」"

[[dialogue]]
speaker = "メイプル"
# 「つまりは……お兄ちゃんもルカルカのリスナー仲間なのではないか！？」
line = "「つまりは……お兄ちゃんもルカルカのリスナー仲間なのではないか！？」"

[[dialogue]]
speaker = "unk"
# ふっ……よくぞ見抜いたな、妹よ
line = "ふっ……よくぞ見抜いたな、妹よ"

[[dialogue]]
speaker = "ルルカ"
# 「あ……！　そ、そう！　実は……あたしはルカルカの熱狂的なファンなの！　お兄ちゃんにはたまたまバレちゃって、それで仲良くなったんだ！」
line = "「あ……！　そ、そう！　実は……あたしはルカルカの熱狂的なファンなの！　お兄ちゃんにはたまたまバレちゃって、それで仲良くなったんだ！」"

[[dialogue]]
speaker = "ルルカ"
# 「いや～、参った。メイプルちゃんにもバレちゃったか～。あは、あはは……！」
line = "「いや～、参った。メイプルちゃんにもバレちゃったか～。あは、あはは……！」"

[[dialogue]]
speaker = "メイプル"
# 「なら、これで妹ライバルとして、憂いはなくなったな」
line = "「なら、これで妹ライバルとして、憂いはなくなったな」"

[[dialogue]]
speaker = "メイプル"
# 「これからは同じルカルカを応援する者として、我には隠さず話すがよい」
line = "「これからは同じルカルカを応援する者として、我には隠さず話すがよい」"

[[dialogue]]
speaker = "メイプル"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "メイプル"
# 「ああ、ちなみに、このことを誰かに言いふらしたりする気はないぞ？　魔王はそんな卑怯なことはしない。我が魂に誓って約束しよう」
line = "「ああ、ちなみに、このことを誰かに言いふらしたりする気はないぞ？　魔王はそんな卑怯なことはしない。我が魂に誓って約束しよう」"

[[dialogue]]
speaker = "ルルカ"
# 「う、うん……ありがとう。…………えっと」
line = "「う、うん……ありがとう。…………えっと」"

[[dialogue]]
speaker = "ルルカ"
# 「あのさ……！　メイプルちゃん、もしかして……あたしの為に、わかってやってくれてたりする？」
line = "「あのさ……！　メイプルちゃん、もしかして……あたしの為に、わかってやってくれてたりする？」"

[[dialogue]]
speaker = "メイプル"
# 「ん？　なんのことだ？　我はただ、ルカルカに敬意を表し、同じファンとして応援しようと思っただけのこと」
line = "「ん？　なんのことだ？　我はただ、ルカルカに敬意を表し、同じファンとして応援しようと思っただけのこと」"

[[dialogue]]
speaker = "メイプル"
# 「それに、勘違いをしてもらっては困る。妹ライバルとしては、お兄ちゃん呼びを譲るつもりはないぞ？」
line = "「それに、勘違いをしてもらっては困る。妹ライバルとしては、お兄ちゃん呼びを譲るつもりはないぞ？」"

[[dialogue]]
speaker = "ルルカ"
# 「……そっか。…………ふふっ……♪」
line = "「……そっか。…………ふふっ……♪」"

[[dialogue]]
speaker = "ルルカ"
# 「うん！　そういうことなら……あたしだって負けないから！　言っておくけど、お兄ちゃんとの付き合いはあたしの方が長いんだからね？」
line = "「うん！　そういうことなら……あたしだって負けないから！　言っておくけど、お兄ちゃんとの付き合いはあたしの方が長いんだからね？」"

[[dialogue]]
speaker = "メイプル"
# 「ふっ……お兄ちゃんとは先日、窮地を一緒に切り抜けた仲。魔王を目指す同志の強い絆で、すぐに追い付いてみせよう！」
line = "「ふっ……お兄ちゃんとは先日、窮地を一緒に切り抜けた仲。魔王を目指す同志の強い絆で、すぐに追い付いてみせよう！」"

[[dialogue]]
speaker = "ルルカ"
# 「なにそれ！？　すごく気になるんだけど……！」
line = "「なにそれ！？　すごく気になるんだけど……！」"

[[dialogue]]
speaker = "ルルカ"
# 「でも、これからはクラスメイトになるわけだし……それは後でゆっくり聞かせてもらおうかなっ」
line = "「でも、これからはクラスメイトになるわけだし……それは後でゆっくり聞かせてもらおうかなっ」"

[[dialogue]]
speaker = "ルルカ"
# 「とりあえずまずは……よろしくね！　メイプルちゃん♪」
line = "「とりあえずまずは……よろしくね！　メイプルちゃん♪」"

[[dialogue]]
speaker = "メイプル"
# 「ああ。よろしく、ルルカ。……にへへ♪」
line = "「ああ。よろしく、ルルカ。……にへへ♪」"

[[dialogue]]
speaker = "unk"
# ２人は改めて、笑顔で握手を交わす。
line = "２人は改めて、笑顔で握手を交わす。"

[[dialogue]]
speaker = "unk"
# それを見て、俺もまた微笑ましい気持ちになるのだった。
line = "それを見て、俺もまた微笑ましい気持ちになるのだった。"
