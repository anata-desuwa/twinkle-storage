[[dialogue]]
speaker = "unk"
# ある日、東京の量販店で起きた事件について、警察から協力を依頼されてやって来ていた俺とジュエリー。
line = "ある日、東京の量販店で起きた事件について、警察から協力を依頼されてやって来ていた俺とジュエリー。"

[[dialogue]]
speaker = "unk"
# 『日傘探偵』の見事な推理によって、今回も事件は無事に解決したのだが――
line = "『日傘探偵』の見事な推理によって、今回も事件は無事に解決したのだが――"

[[dialogue]]
speaker = "ミネコ"
# 「いや～、まさか事件現場に偶然居合わせちゃうとはね～」
line = "「いや～、まさか事件現場に偶然居合わせちゃうとはね～」"

[[dialogue]]
speaker = "unk"
# 帰りの道中、俺たちはミネコと並んで歩いていた。
line = "帰りの道中、俺たちはミネコと並んで歩いていた。"

[[dialogue]]
speaker = "unk"
# 居合わせたのは本当に偶然……？
line = "居合わせたのは本当に偶然……？"

[[dialogue]]
speaker = "ミネコ"
# 「ん？　ふふっ♪　さってね～♪　会長はどっちだと思う？」
line = "「ん？　ふふっ♪　さってね～♪　会長はどっちだと思う？」"

[[dialogue]]
speaker = "unk"
# おどけて見せるミネコ。
line = "おどけて見せるミネコ。"

[[dialogue]]
speaker = "unk"
# と、ジュエリーが少し考えるように顎を擦りながら、口を開く。
line = "と、ジュエリーが少し考えるように顎を擦りながら、口を開く。"

[[dialogue]]
speaker = "ジュエリー"
# 「ふむ。確かに、ミネコの立場を考えれば、疑いたくなるところだが……」
line = "「ふむ。確かに、ミネコの立場を考えれば、疑いたくなるところだが……」"

[[dialogue]]
speaker = "ジュエリー"
# 「おそらく、今回は本当に偶然なのだろう」
line = "「おそらく、今回は本当に偶然なのだろう」"

[[dialogue]]
speaker = "ミネコ"
# 「え？」
line = "「え？」"

[[dialogue]]
speaker = "ジュエリー"
# 「推測するに、キミは――」
line = "「推測するに、キミは――」"

[[dialogue]]
speaker = "ジュエリー"
# 「胸を大きくする為の『豊胸グッズ』を、あの量販店に買いに来ていたんじゃないか？」
line = "「胸を大きくする為の『豊胸グッズ』を、あの量販店に買いに来ていたんじゃないか？」"

[[dialogue]]
speaker = "ミネコ"
# 「な、ななな、何をいきなり言い出すのかなジュエリー！？」
line = "「な、ななな、何をいきなり言い出すのかなジュエリー！？」"

[[dialogue]]
speaker = "ジュエリー"
# 「なに、ここ最近のキミの行動を見ていて気づいたのさ。学園の女生徒たちの胸を、よくチラ見していることにね」
line = "「なに、ここ最近のキミの行動を見ていて気づいたのさ。学園の女生徒たちの胸を、よくチラ見していることにね」"

[[dialogue]]
speaker = "ジュエリー"
# 「私も少なからず感じたことがあるから、すぐにわかったよ。この学園の女生徒はズバリ――」
line = "「私も少なからず感じたことがあるから、すぐにわかったよ。この学園の女生徒はズバリ――」"

[[dialogue]]
speaker = "ジュエリー"
# 「『巨乳率』がやたらと高い」
line = "「『巨乳率』がやたらと高い」"

[[dialogue]]
speaker = "ジュエリー"
# 「しかも、その平均サイズは、大人顔負けのグラビア並みだ」
line = "「しかも、その平均サイズは、大人顔負けのグラビア並みだ」"

[[dialogue]]
speaker = "ジュエリー"
# 「だが、キミは私と同じ、『持たざる者』の側だ」
line = "「だが、キミは私と同じ、『持たざる者』の側だ」"

[[dialogue]]
speaker = "ミネコ"
# 「ぐはぁっ！？」
line = "「ぐはぁっ！？」"

[[dialogue]]
speaker = "unk"
# 初めて大怪盗にダメ―ジが入った！？
line = "初めて大怪盗にダメ―ジが入った！？"

[[dialogue]]
speaker = "ミネコ"
# 「だ、だからって、なんで私が豊胸グッズを買いに来てたとか……！」
line = "「だ、だからって、なんで私が豊胸グッズを買いに来てたとか……！」"

[[dialogue]]
speaker = "ジュエリー"
# 「昨日は私も含め、クラス内の『持たざる者』の間でグッズの話が盛り上がっていたからね。あの量販店に売っているらしい、という話にもなった」
line = "「昨日は私も含め、クラス内の『持たざる者』の間でグッズの話が盛り上がっていたからね。あの量販店に売っているらしい、という話にもなった」"

[[dialogue]]
speaker = "ジュエリー"
# 「その時、普段なら話に混ざってくるキミが、あえて距離をとって様子を伺っていたのを、少々不思議に思っていたんだよ」
line = "「その時、普段なら話に混ざってくるキミが、あえて距離をとって様子を伺っていたのを、少々不思議に思っていたんだよ」"

[[dialogue]]
speaker = "ジュエリー"
# 「そして、<b>キミの母親</b>のことを思えば、少なからずコンプレックスを抱いていることは、想像に難くない」
line = "「そして、<b>キミの母親</b>のことを思えば、少なからずコンプレックスを抱いていることは、想像に難くない」"

[[dialogue]]
speaker = "ミネコ"
# 「わ、私の母親が誰かは、明かしてなかったはずだけど……？」
line = "「わ、私の母親が誰かは、明かしてなかったはずだけど……？」"

[[dialogue]]
speaker = "unk"
# ミネコのお母さん……？
line = "ミネコのお母さん……？"

[[dialogue]]
speaker = "ジュエリー"
# 「ああ、助手にはそのことはまだ、話してなかったね」
line = "「ああ、助手にはそのことはまだ、話してなかったね」"

[[dialogue]]
speaker = "ジュエリー"
# 「ミネコが前に１度、流星寮の私の部屋に無理矢理泊まりに来たことがあってね」
line = "「ミネコが前に１度、流星寮の私の部屋に無理矢理泊まりに来たことがあってね」"

[[dialogue]]
speaker = "ジュエリー"
# 「就寝する前の『自分語りタイム』とやらで、彼女がどういう経緯で怪盗をやっているのかを聞いたんだよ」
line = "「就寝する前の『自分語りタイム』とやらで、彼女がどういう経緯で怪盗をやっているのかを聞いたんだよ」"

[[dialogue]]
speaker = "ジュエリー"
# 「その結果判明したのが、彼女の父親が未だ現役の、世界的に有名な『怪盗』である、ということだった」
line = "「その結果判明したのが、彼女の父親が未だ現役の、世界的に有名な『怪盗』である、ということだった」"

[[dialogue]]
speaker = "unk"
# え、現役の怪盗？　それって……
line = "え、現役の怪盗？　それって……"

[[dialogue]]
speaker = "unk"
# 現在、世界で話題に上がる怪盗は、<b>２人</b>存在している。
line = "現在、世界で話題に上がる怪盗は、<b>２人</b>存在している。"

[[dialogue]]
speaker = "unk"
# １人は、大怪盗フランボウ。そして、もう１人は――
line = "１人は、大怪盗フランボウ。そして、もう１人は――"

[[dialogue]]
speaker = "ジュエリー"
# 「フランボウが現れるずっと前から活動し続けている、人間界で知らぬ者なき大怪盗――」
line = "「フランボウが現れるずっと前から活動し続けている、人間界で知らぬ者なき大怪盗――」"

[[dialogue]]
speaker = "ジュエリー"
# 「通称『ルパン・ザ・ピンキー』。ミネコはその実の娘だよ」
line = "「通称『ルパン・ザ・ピンキー』。ミネコはその実の娘だよ」"

[[dialogue]]
speaker = "unk"
# ルパンの娘！？　ならミネコのお母さんは……
line = "ルパンの娘！？　ならミネコのお母さんは……"

[[dialogue]]
speaker = "ジュエリー"
# 「ここまで言えば、後は想像がつくだろう？　有名なルパン一味の女性。ミネコは明言こそしないが……つまりはそういうことだろう」
line = "「ここまで言えば、後は想像がつくだろう？　有名なルパン一味の女性。ミネコは明言こそしないが……つまりはそういうことだろう」"

[[dialogue]]
speaker = "unk"
# ミネコは怪盗ルパンの末裔だったんだ……
line = "ミネコは怪盗ルパンの末裔だったんだ……"

[[dialogue]]
speaker = "ミネコ"
# 「血筋的にはね。でも――私は今後もルパンを名乗る気はないよ」
line = "「血筋的にはね。でも――私は今後もルパンを名乗る気はないよ」"

[[dialogue]]
speaker = "ミネコ"
# 「娘の私にも実年齢がわからないあのバカ親父が、まだまだ現役で有名だからね。仮に名乗ったところで、私の評価が『ルパンの娘』より上がることは、絶対にない」
line = "「娘の私にも実年齢がわからないあのバカ親父が、まだまだ現役で有名だからね。仮に名乗ったところで、私の評価が『ルパンの娘』より上がることは、絶対にない」"

[[dialogue]]
speaker = "ミネコ"
# 「そんなの私、嫌なんだよね。私は――」
line = "「そんなの私、嫌なんだよね。私は――」"

[[dialogue]]
speaker = "ミネコ"
# 「親父が現役のうちに、親父に勝ちたい。だから、過去の選星者であった『フランボウ』を名乗らせてもらうことにしたんだ」
line = "「親父が現役のうちに、親父に勝ちたい。だから、過去の選星者であった『フランボウ』を名乗らせてもらうことにしたんだ」"

[[dialogue]]
speaker = "ジュエリー"
# 「ちなみに、私は流星市国に来る前に１度、ルパンと事件でぶつかったことがある」
line = "「ちなみに、私は流星市国に来る前に１度、ルパンと事件でぶつかったことがある」"

[[dialogue]]
speaker = "ジュエリー"
# 「だけど結果は――完敗だったよ」
line = "「だけど結果は――完敗だったよ」"

[[dialogue]]
speaker = "ジュエリー"
# 「本人曰く、選星者には選ばれなかったし、星力も一切持っていない一般人とのことだったが……それであの実力は、もはや規格外という他ない」
line = "「本人曰く、選星者には選ばれなかったし、星力も一切持っていない一般人とのことだったが……それであの実力は、もはや規格外という他ない」"

[[dialogue]]
speaker = "ジュエリー"
# 「掴みどころがなくてなんだか憎めない、面白いおじ様だった。……だが、次会った時は負ける気もないけどね」
line = "「掴みどころがなくてなんだか憎めない、面白いおじ様だった。……だが、次会った時は負ける気もないけどね」"

[[dialogue]]
speaker = "ジュエリー"
# 「――と、それはそうと、ミネコが豊胸したがっているという話だったね」
line = "「――と、それはそうと、ミネコが豊胸したがっているという話だったね」"

[[dialogue]]
speaker = "ミネコ"
# 「いや、そんなこと一言も言ってないから！」
line = "「いや、そんなこと一言も言ってないから！」"

[[dialogue]]
speaker = "ジュエリー"
# 「まあ、待ちたまえ、ミネコ。私が言いたいのは、同じく持たざる者として、キミの気持ちはわかるし、それに対してのアドバイスもできるということだ」
line = "「まあ、待ちたまえ、ミネコ。私が言いたいのは、同じく持たざる者として、キミの気持ちはわかるし、それに対してのアドバイスもできるということだ」"

[[dialogue]]
speaker = "ミネコ"
# 「え？　ジュエリーもまさか……おっぱいを大きくするために、何かしてるの？」
line = "「え？　ジュエリーもまさか……おっぱいを大きくするために、何かしてるの？」"

[[dialogue]]
speaker = "ジュエリー"
# 「いいや、してない」
line = "「いいや、してない」"

[[dialogue]]
speaker = "ミネコ"
# 「なんのアドバイスなわけ！？」
line = "「なんのアドバイスなわけ！？」"

[[dialogue]]
speaker = "ジュエリー"
# 「私のアドバイスは――」
line = "「私のアドバイスは――」"

[[dialogue]]
speaker = "ジュエリー"
# 「胸の大きさ関係なく愛してくれる相手を見つければ、コンプレックスなど気にならなくなるということだ」
line = "「胸の大きさ関係なく愛してくれる相手を見つければ、コンプレックスなど気にならなくなるということだ」"

[[dialogue]]
speaker = "ミネコ"
# 「その相手って……？」
line = "「その相手って……？」"

[[dialogue]]
speaker = "ジュエリー"
# 「ふふっ♪　それはもちろん、我が愛する助手に決まっているだろう？」
line = "「ふふっ♪　それはもちろん、我が愛する助手に決まっているだろう？」"

[[dialogue]]
speaker = "unk"
# えっ！？
line = "えっ！？"

[[dialogue]]
speaker = "ミネコ"
# 「会長、明らかに予想外って顔してるけど……」
line = "「会長、明らかに予想外って顔してるけど……」"

[[dialogue]]
speaker = "ジュエリー"
# 「問題ない。私は助手を心から信じているからね。ふふっ♪」
line = "「問題ない。私は助手を心から信じているからね。ふふっ♪」"

[[dialogue]]
speaker = "ミネコ"
# 「……なんか私、しばらく見てて気づいたんだけど」
line = "「……なんか私、しばらく見てて気づいたんだけど」"

[[dialogue]]
speaker = "ミネコ"
# 「ジュエリーって会長のことに対しては、急にバカになるよね……」
line = "「ジュエリーって会長のことに対しては、急にバカになるよね……」"

[[dialogue]]
speaker = "ジュエリー"
# 「失礼な。キミにはわからないかもしれないが――これが『愛』というやつだよ♪」
line = "「失礼な。キミにはわからないかもしれないが――これが『愛』というやつだよ♪」"

[[dialogue]]
speaker = "unk"
# ふふん♪　と自信たっぷりの笑顔で、堂々と胸を張って言うジュエリーなのであった――
line = "ふふん♪　と自信たっぷりの笑顔で、堂々と胸を張って言うジュエリーなのであった――"
