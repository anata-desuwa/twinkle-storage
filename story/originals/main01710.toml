[[dialogue]]
speaker = "unk"
# 生まれだろうと、バイトの経験だろうと、過去だろうと未来だろうと平行世界だろうと──使えるものはなんでも使う。
line = "生まれだろうと、バイトの経験だろうと、過去だろうと未来だろうと平行世界だろうと──使えるものはなんでも使う。"

