[[dialogue]]
speaker = "レミカ"
# 「みんなー！　今日は突然のゲリラライブにも関わらず、こんなにたくさん集まってくれて、ありがとーー！！」
line = "「みんなー！　今日は突然のゲリラライブにも関わらず、こんなにたくさん集まってくれて、ありがとーー！！」"

[[dialogue]]
speaker = "レミカ"
# 「うん！　今日は私も、思いっきり歌えて楽しかった！！」
line = "「うん！　今日は私も、思いっきり歌えて楽しかった！！」"

[[dialogue]]
speaker = "レミカ"
# 「今日のライブはここでお別れだけど、私はまだまだ歌い足りないから……」
line = "「今日のライブはここでお別れだけど、私はまだまだ歌い足りないから……」"

[[dialogue]]
speaker = "レミカ"
# 「私の歌とパフォーマンスを、これからも楽しみにしてて欲しい……！！」
line = "「私の歌とパフォーマンスを、これからも楽しみにしてて欲しい……！！」"

[[dialogue]]
speaker = "メルエル"
# 「わぁぁぁ～～～！　やっぱりレミカちゃんは、本当に凄いよぉ！」
line = "「わぁぁぁ～～～！　やっぱりレミカちゃんは、本当に凄いよぉ！」"

[[dialogue]]
speaker = "メルエル"
# 「生ライブに参加できたのは初めてだったけど……遠くから見てるだけで、すっごくドキドキしちゃった！」
line = "「生ライブに参加できたのは初めてだったけど……遠くから見てるだけで、すっごくドキドキしちゃった！」"

[[dialogue]]
speaker = "メルエル"
# 「歌も踊りもキレキレで、クールでかっこいい姿……アンコールも終わったのに、いつまでも興奮が冷めていかないよぉ」
line = "「歌も踊りもキレキレで、クールでかっこいい姿……アンコールも終わったのに、いつまでも興奮が冷めていかないよぉ」"

[[dialogue]]
speaker = "メルエル"
# 「前に『ユニットを組もう』なんて誘われちゃったけど、自分があの大舞台に立ってるところは、想像できないなぁ」
line = "「前に『ユニットを組もう』なんて誘われちゃったけど、自分があの大舞台に立ってるところは、想像できないなぁ」"

[[dialogue]]
speaker = "メルエル"
# 「……うん。アイドルってすっごく素敵なお仕事だけど、私はやっぱり、<ruby=こっち>観客席</ruby>側かな」
line = "「……うん。アイドルってすっごく素敵なお仕事だけど、私はやっぱり、<ruby>観客席<rt>こっち</rt></ruby>側かな」"

[[dialogue]]
speaker = "メルエル"
# 「……ふふっ。可愛くてフリフリの衣装を着て、会長くんに私の歌う姿を見てもらえたら、きっと幸せだろうなぁって思えるけど」
line = "「……ふふっ。可愛くてフリフリの衣装を着て、会長くんに私の歌う姿を見てもらえたら、きっと幸せだろうなぁって思えるけど」"

[[dialogue]]
speaker = "メルエル"
# 「こういうのは、妄想してるくらいが一番楽しいんだよね♪　……だから私がアイドルなんて、ないない」
line = "「こういうのは、妄想してるくらいが一番楽しいんだよね♪　……だから私がアイドルなんて、ないない」"
