[[dialogue]]
speaker = "unk"
# 第８話,陸の孤島,B
line = "第８話,陸の孤島,B"

[[dialogue]]
speaker = "unk"
# 流星市国は、日本の東京都内に位置する独立国家である。故にこの小国の異常に、周囲が気づかないはずがない。
line = "流星市国は、日本の東京都内に位置する独立国家である。故にこの小国の異常に、周囲が気づかないはずがない。"

[[dialogue]]
speaker = "unk"
# リクリエの本波が過ぎれば、すぐに日本国からの救助がやってくる──チナはそう思っていた。
line = "リクリエの本波が過ぎれば、すぐに日本国からの救助がやってくる──チナはそう思っていた。"

[[dialogue]]
speaker = "unk"
# しかし数日が過ぎても、救援は来なかった──
line = "しかし数日が過ぎても、救援は来なかった──"

[[dialogue]]
speaker = "unk"
# 異常な状況下で、チナは懸命に働いた。
line = "異常な状況下で、チナは懸命に働いた。"

[[dialogue]]
speaker = "unk"
# モンスターと対峙する時は、星力に目覚めているルヴィネとベアトリスを頼り、流星市国の案内はチナが担当する。
line = "モンスターと対峙する時は、星力に目覚めているルヴィネとベアトリスを頼り、流星市国の案内はチナが担当する。"

[[dialogue]]
speaker = "unk"
# そうして避難民の数は日を追うごとに増えていった。
line = "そうして避難民の数は日を追うごとに増えていった。"

[[dialogue]]
speaker = "unk"
# ある日、妖精族の少女、グレイス・オベロニアと出会った。
line = "ある日、妖精族の少女、グレイス・オベロニアと出会った。"

[[dialogue]]
speaker = "グレイス"
# 「生き返りましたぁ～っ……！　ごはんとお水、ありがとうございました！」
line = "「生き返りましたぁ～っ……！　ごはんとお水、ありがとうございました！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「ふふ。元気な子ね」
line = "「ふふ。元気な子ね」"

[[dialogue]]
speaker = "グレイス"
# 「はい！　暗い時こそ、明るく笑えというのがオベロニアの教えです！」
line = "「はい！　暗い時こそ、明るく笑えというのがオベロニアの教えです！」"

[[dialogue]]
speaker = "グレイス"
# 「ところでチナさん、さっきお店で拾ってたクッキー、いつ食べるんですか？　私、気になって気になって仕方がないのですが……！」
line = "「ところでチナさん、さっきお店で拾ってたクッキー、いつ食べるんですか？　私、気になって気になって仕方がないのですが……！」"

[[dialogue]]
speaker = "チナ"
# 「非常食だよこれは。いざって時のために取っとくの」
line = "「非常食だよこれは。いざって時のために取っとくの」"

[[dialogue]]
speaker = "グレイス"
# 「……今がその非常時では？　じゅるり」
line = "「……今がその非常時では？　じゅるり」"

[[dialogue]]
speaker = "ルヴィネ"
# 「チナさん。少しなら問題ないでしょう、分けてあげたら？」
line = "「チナさん。少しなら問題ないでしょう、分けてあげたら？」"

[[dialogue]]
speaker = "チナ"
# 「ルヴィネの頼みでもこればっかりは聞けねーな！　ケーカク的に食べないと、すぐになんにもなくなっちゃうぞ！」
line = "「ルヴィネの頼みでもこればっかりは聞けねーな！　ケーカク的に食べないと、すぐになんにもなくなっちゃうぞ！」"

[[dialogue]]
speaker = "グレイス"
# 「ぐすん。ひもじいですね……」
line = "「ぐすん。ひもじいですね……」"

[[dialogue]]
speaker = "チナ"
# 「アタシよりも１コ上って話だったのに、落ち着きのない奴だな……」
line = "「アタシよりも１コ上って話だったのに、落ち着きのない奴だな……」"

[[dialogue]]
speaker = "グレイス"
# 「お腹の空き方に年齢は関係ありません！　むしろ育ち盛りだからこそお腹が空くんです！」
line = "「お腹の空き方に年齢は関係ありません！　むしろ育ち盛りだからこそお腹が空くんです！」"

[[dialogue]]
speaker = "チナ"
# 「ああ言えばこう言う……あのな、働かざる者食うべからず、ってコトワザがあるだろ？」
line = "「ああ言えばこう言う……あのな、働かざる者食うべからず、ってコトワザがあるだろ？」"

[[dialogue]]
speaker = "ベアトリス"
# 「あはは……じゃ、じゃあいつもみたいにパトロールして、そのご褒美ならどうかな、チナちゃん？」
line = "「あはは……じゃ、じゃあいつもみたいにパトロールして、そのご褒美ならどうかな、チナちゃん？」"

[[dialogue]]
speaker = "グレイス"
# 「いい考えです！　張り切ってお出かけしましょう、ベアトリスさん！」
line = "「いい考えです！　張り切ってお出かけしましょう、ベアトリスさん！」"

[[dialogue]]
speaker = "チナ"
# 「いや、グレイスはモンスターと戦えないだろ……何の役に立つんだよ」
line = "「いや、グレイスはモンスターと戦えないだろ……何の役に立つんだよ」"

[[dialogue]]
speaker = "unk"
# 厳しい環境下でも元気に笑うグレイスは、チナたちにとって精神的な支えとなった──
line = "厳しい環境下でも元気に笑うグレイスは、チナたちにとって精神的な支えとなった──"

[[dialogue]]
speaker = "unk"
# ──それから数日後。今度はルヴィネが、不思議な少女を連れてきた。
line = "──それから数日後。今度はルヴィネが、不思議な少女を連れてきた。"

[[dialogue]]
speaker = "ルヴィネ"
# 「レティシア・オルティースさん。年齢は私たちの１つ上みたい。仲良くしてあげて」
line = "「レティシア・オルティースさん。年齢は私たちの１つ上みたい。仲良くしてあげて」"

[[dialogue]]
speaker = "レティシア"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ベアトリス"
# 「よ、よろしくね、レティシアちゃん」
line = "「よ、よろしくね、レティシアちゃん」"

[[dialogue]]
speaker = "チナ"
# 「お前、ずーっと黙ってるな……どっかケガでもしてるのか？」
line = "「お前、ずーっと黙ってるな……どっかケガでもしてるのか？」"

[[dialogue]]
speaker = "グレイス"
# 「きっとお腹が空いてるんですね……可哀想です……」
line = "「きっとお腹が空いてるんですね……可哀想です……」"

[[dialogue]]
speaker = "チナ"
# 「それはないだろ。グレイスじゃねーんだから」
line = "「それはないだろ。グレイスじゃねーんだから」"

[[dialogue]]
speaker = "ルヴィネ"
# 「この子、ちょっと特殊な環境にいたせいかしら……感情表現が苦手みたいなの。みんな、気にしてあげてくれるかしら」
line = "「この子、ちょっと特殊な環境にいたせいかしら……感情表現が苦手みたいなの。みんな、気にしてあげてくれるかしら」"

[[dialogue]]
speaker = "レティシア"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "チナ"
# 「暗いやつだなぁ……」
line = "「暗いやつだなぁ……」"

[[dialogue]]
speaker = "ベアトリス"
# 「だ、だめだよ～チナちゃん。そんなこと言ったら」
line = "「だ、だめだよ～チナちゃん。そんなこと言ったら」"

[[dialogue]]
speaker = "グレイス"
# 「仕方ありません。お近づきの印に……どうぞ。昨夜くすねたチナさんのクッキーです」
line = "「仕方ありません。お近づきの印に……どうぞ。昨夜くすねたチナさんのクッキーです」"

[[dialogue]]
speaker = "チナ"
# 「んなっ！？　グレイスいつの間にっ……このやろ～！？」
line = "「んなっ！？　グレイスいつの間にっ……このやろ～！？」"

[[dialogue]]
speaker = "レティシア"
# 「…………ふふ」
line = "「…………ふふ」"

[[dialogue]]
speaker = "グレイス"
# 「あっ……笑いましたよ、この子！」
line = "「あっ……笑いましたよ、この子！」"

[[dialogue]]
speaker = "チナ"
# 「笑われてんだよ、お前が！！」
line = "「笑われてんだよ、お前が！！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「よかった。あまり喋らないから心配してたの」
line = "「よかった。あまり喋らないから心配してたの」"

[[dialogue]]
speaker = "ベアトリス"
# 「レティシアちゃん、何か困ったことがあったら、私たちに相談してね！」
line = "「レティシアちゃん、何か困ったことがあったら、私たちに相談してね！」"

[[dialogue]]
speaker = "レティシア"
# 「…………ん」
line = "「…………ん」"

[[dialogue]]
speaker = "チナ"
# 「へへっ、モンスターが現れたら、アタシの後ろに隠れるんだぞ！」
line = "「へへっ、モンスターが現れたら、アタシの後ろに隠れるんだぞ！」"

[[dialogue]]
speaker = "レティシア"
# 「…………？」
line = "「…………？」"

[[dialogue]]
speaker = "チナ"
# 「なんでそこで首をかしげるんだよ」
line = "「なんでそこで首をかしげるんだよ」"

[[dialogue]]
speaker = "グレイス"
# 「ぷぷ。自分より小さい女の子に隠れられるわけないでしょう」
line = "「ぷぷ。自分より小さい女の子に隠れられるわけないでしょう」"

[[dialogue]]
speaker = "チナ"
# 「なんだとー！？」
line = "「なんだとー！？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「ちなみにレティシアさんは、守護星もセレスティアも持っているわ。私とベアトリスさんに続く、３人目の星騎士ね」
line = "「ちなみにレティシアさんは、守護星もセレスティアも持っているわ。私とベアトリスさんに続く、３人目の星騎士ね」"

[[dialogue]]
speaker = "チナ"
# 「ななな、なんだとー！？」
line = "「ななな、なんだとー！？」"

[[dialogue]]
speaker = "unk"
# リクリエを<ruby=ことほ>寿</ruby>ぐ宗教団体で生まれ育ったレティシアは、常識というものを何も知らなかった。人間性にも乏しかった。
line = "リクリエを<ruby>寿<rt>ことほ</rt></ruby>ぐ宗教団体で生まれ育ったレティシアは、常識というものを何も知らなかった。人間性にも乏しかった。"

[[dialogue]]
speaker = "unk"
# しかしチナたちの献身的な付き合いで、彼女は少しずつ、ヒトとして生きる力を身に着けていく。
line = "しかしチナたちの献身的な付き合いで、彼女は少しずつ、ヒトとして生きる力を身に着けていく。"

[[dialogue]]
speaker = "unk"
# 少ない食料を分け合い、みなで日々を生き抜くために力を合わせた。
line = "少ない食料を分け合い、みなで日々を生き抜くために力を合わせた。"

[[dialogue]]
speaker = "unk"
# 極星学園の５人は、この時から毎日を一緒に過ごすことになる──
line = "極星学園の５人は、この時から毎日を一緒に過ごすことになる──"

[[dialogue]]
speaker = "unk"
# ──１週間が過ぎた頃、とうとう避難地で限界を訴える声が出始めた。
line = "──１週間が過ぎた頃、とうとう避難地で限界を訴える声が出始めた。"

[[dialogue]]
speaker = "unk"
# 水も食料も供給が圧倒的に追いつかない。いつまで経っても助けは来ない。
line = "水も食料も供給が圧倒的に追いつかない。いつまで経っても助けは来ない。"

[[dialogue]]
speaker = "unk"
# 散発的に発生するアステラとモンスターに怯え、夜もまともに眠れない日々……
line = "散発的に発生するアステラとモンスターに怯え、夜もまともに眠れない日々……"

[[dialogue]]
speaker = "unk"
# 体調を崩す者が出始めた。小さな子供が熱を出し、母親がパニックを起こした。
line = "体調を崩す者が出始めた。小さな子供が熱を出し、母親がパニックを起こした。"

[[dialogue]]
speaker = "流星市国民"
# 「ルヴィネさん！　あなたがここにいろというから、ずっと耐えてきたが……もう限界だ！！」
line = "「ルヴィネさん！　あなたがここにいろというから、ずっと耐えてきたが……もう限界だ！！」"

[[dialogue]]
speaker = "流星市国民"
# 「市国の外には家族がいる！　早く会いたいんだ！　会いに行かせてくれ！！」
line = "「市国の外には家族がいる！　早く会いたいんだ！　会いに行かせてくれ！！」"

[[dialogue]]
speaker = "流星市国民"
# 「救助が来ないなら、俺たちが動けばいい！　避難するんだ、いいだろ！？」
line = "「救助が来ないなら、俺たちが動けばいい！　避難するんだ、いいだろ！？」"

[[dialogue]]
speaker = "流星市国民"
# 「ここから逃げよう！　なあ！？」
line = "「ここから逃げよう！　なあ！？」"

[[dialogue]]
speaker = "unk"
# モンスターに対抗できるのは、ルヴィネとベアトリス、レティシアの３名のみ。３人がいなければ身動きも取れない状況だった。
line = "モンスターに対抗できるのは、ルヴィネとベアトリス、レティシアの３名のみ。３人がいなければ身動きも取れない状況だった。"

[[dialogue]]
speaker = "unk"
# 流星市国の外まで護衛をしてくれと頼む市民たちに、ルヴィネは大きく息を吐いて──
line = "流星市国の外まで護衛をしてくれと頼む市民たちに、ルヴィネは大きく息を吐いて──"

[[dialogue]]
speaker = "ルヴィネ"
# 「……それはできないの」
line = "「……それはできないの」"

[[dialogue]]
speaker = "ルヴィネ"
# 「でも──何も伝えずに納得してもらうのも、無理ね。説明するわ」
line = "「でも──何も伝えずに納得してもらうのも、無理ね。説明するわ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「グレイスさんとチナさんと……あとは数人、市国民の方を連れていくわ」
line = "「グレイスさんとチナさんと……あとは数人、市国民の方を連れていくわ」"

[[dialogue]]
speaker = "ベアトリス"
# 「ねえルヴィネちゃん。本当に、喋っちゃって大丈夫……？」
line = "「ねえルヴィネちゃん。本当に、喋っちゃって大丈夫……？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「仕方ないわ。このままだと本当に結束がなくなってしまう」
line = "「仕方ないわ。このままだと本当に結束がなくなってしまう」"

[[dialogue]]
speaker = "ルヴィネ"
# 「留守を頼むわね。レティシアさんはまだ戦いに不慣れだから……」
line = "「留守を頼むわね。レティシアさんはまだ戦いに不慣れだから……」"

[[dialogue]]
speaker = "ベアトリス"
# 「うん、任せて……！」
line = "「うん、任せて……！」"

[[dialogue]]
speaker = "unk"
# そうしてルヴィネは──数人の同伴者を連れて、流星市国と日本国の国境付近へ進んだ。
line = "そうしてルヴィネは──数人の同伴者を連れて、流星市国と日本国の国境付近へ進んだ。"

[[dialogue]]
speaker = "unk"
# そして──チナは目を疑った。
line = "そして──チナは目を疑った。"

[[dialogue]]
speaker = "チナ"
# 「な、なんだコレ……？　空気が、ねじれてる……？」
line = "「な、なんだコレ……？　空気が、ねじれてる……？」"

[[dialogue]]
speaker = "unk"
# 空間が歪んで、黒とも透明とも言えない奇怪な断裂が、そこにはあった。
line = "空間が歪んで、黒とも透明とも言えない奇怪な断裂が、そこにはあった。"

[[dialogue]]
speaker = "unk"
# その場に落ちていた瓦礫を投げ込むと、磁力が反発するような動きで押し戻される。もしも無理に進もうとすれば──それは考えただけで恐ろしい。
line = "その場に落ちていた瓦礫を投げ込むと、磁力が反発するような動きで押し戻される。もしも無理に進もうとすれば──それは考えただけで恐ろしい。"

[[dialogue]]
speaker = "ルヴィネ"
# 「避難をさせられない理由がこれよ。もう十分ね。大聖堂に戻りましょう」
line = "「避難をさせられない理由がこれよ。もう十分ね。大聖堂に戻りましょう」"

[[dialogue]]
speaker = "ルヴィネ"
# 「さっき見せたとおり、流星市国は今……『壁』で覆われているの。陸の孤島と言えば伝わるかしら」
line = "「さっき見せたとおり、流星市国は今……『壁』で覆われているの。陸の孤島と言えば伝わるかしら」"

[[dialogue]]
speaker = "ルヴィネ"
# 「壁はドームのような半球体で、流星市国をすっぽりと覆っている……ある程度上空まで飛び上がれば、空にも同じものがあるわ」
line = "「壁はドームのような半球体で、流星市国をすっぽりと覆っている……ある程度上空まで飛び上がれば、空にも同じものがあるわ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「星力を持ってしても突破できない。外部から救助が来ないんじゃない、来られないの」
line = "「星力を持ってしても突破できない。外部から救助が来ないんじゃない、来られないの」"

[[dialogue]]
speaker = "チナ"
# 「それはわかったよ……でも、ルヴィネ。原因はなんなんだ……？　なんであんなことになってるんだよ？」
line = "「それはわかったよ……でも、ルヴィネ。原因はなんなんだ……？　なんであんなことになってるんだよ？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……あの壁が現れたのは、緋宮クロトのせいよ」
line = "「……あの壁が現れたのは、緋宮クロトのせいよ」"

[[dialogue]]
speaker = "グレイス"
# 「え──！？」
line = "「え──！？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「今まで黙っていてごめんなさい……かつてあなたたちを守っていた存在が裏切り者だと知ったら、心が折れてしまう人も出てしまうんじゃないかと思って……言えなかった」
line = "「今まで黙っていてごめんなさい……かつてあなたたちを守っていた存在が裏切り者だと知ったら、心が折れてしまう人も出てしまうんじゃないかと思って……言えなかった」"

[[dialogue]]
speaker = "ルヴィネ"
# 「ここにいる皆には伝えたわよね。私があの『仮面の女』を倒したと……」
line = "「ここにいる皆には伝えたわよね。私があの『仮面の女』を倒したと……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「まともな訓練も積んでいない私が、どうして『仮面の女』を倒せるほどの星力を宿しているのか──」
line = "「まともな訓練も積んでいない私が、どうして『仮面の女』を倒せるほどの星力を宿しているのか──」"

[[dialogue]]
speaker = "ルヴィネ"
# 「それは私が、女神テルル……様から。遣わされた存在だからよ」
line = "「それは私が、女神テルル……様から。遣わされた存在だからよ」"

[[dialogue]]
speaker = "チナ"
# 「女神様の、遣い……！？」
line = "「女神様の、遣い……！？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「そう。ついこの間まで、私は天界の田舎で暮らす、何の力もないただの天使だった」
line = "「そう。ついこの間まで、私は天界の田舎で暮らす、何の力もないただの天使だった」"

[[dialogue]]
speaker = "ルヴィネ"
# 「そんな私にお声を届けて、力と啓示を授けてくださったのがテルル、様」
line = "「そんな私にお声を届けて、力と啓示を授けてくださったのがテルル、様」"

[[dialogue]]
speaker = "ルヴィネ"
# 「人間界が滅び、リクリエがやってくる──それを阻止するために、この星力を振るいなさい、と仰ったの」
line = "「人間界が滅び、リクリエがやってくる──それを阻止するために、この星力を振るいなさい、と仰ったの」"

[[dialogue]]
speaker = "ルヴィネ"
# 「そしてもう１つ……人間界にいる魔王、緋宮クロトは──」
line = "「そしてもう１つ……人間界にいる魔王、緋宮クロトは──」"

[[dialogue]]
speaker = "ルヴィネ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ルヴィネ"
# 「我が身可愛さに逃げ出した──だから彼の代わりに、人類の救世主になりなさいって」
line = "「我が身可愛さに逃げ出した──だから彼の代わりに、人類の救世主になりなさいって」"

[[dialogue]]
speaker = "チナ"
# 「……マジ、かよ」
line = "「……マジ、かよ」"

[[dialogue]]
speaker = "グレイス"
# 「そっ──そんなことない！　あるわけないです！　ありえません！！　魔王さんは、そんな人じゃない！！！」
line = "「そっ──そんなことない！　あるわけないです！　ありえません！！　魔王さんは、そんな人じゃない！！！」"

[[dialogue]]
speaker = "チナ"
# 「グレイス……？」
line = "「グレイス……？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「そうよね。すぐには信じてもらえないと思う……だから、今まで伝えるのをためらっていたの」
line = "「そうよね。すぐには信じてもらえないと思う……だから、今まで伝えるのをためらっていたの」"

[[dialogue]]
speaker = "グレイス"
# 「信じない！　信じないですからっ……！　いくら命の恩人のルヴィネさんでも、い、言っていいことと悪いことがあります！！」
line = "「信じない！　信じないですからっ……！　いくら命の恩人のルヴィネさんでも、い、言っていいことと悪いことがあります！！」"

[[dialogue]]
speaker = "チナ"
# 「お、おいグレイス。落ち着けって……」
line = "「お、おいグレイス。落ち着けって……」"

[[dialogue]]
speaker = "グレイス"
# 「これが落ち着いていられますか！？　あの人は、英雄です！　私たちのために命を賭けて、いつも戦ってくれていました……！」
line = "「これが落ち着いていられますか！？　あの人は、英雄です！　私たちのために命を賭けて、いつも戦ってくれていました……！」"

[[dialogue]]
speaker = "流星市国民"
# 「……俺も、その妖精の女の子と同じ意見だ。緋宮クロトは、あの『仮面の女』に立ち向かっていた。この目ではっきり見た……」
line = "「……俺も、その妖精の女の子と同じ意見だ。緋宮クロトは、あの『仮面の女』に立ち向かっていた。この目ではっきり見た……」"

[[dialogue]]
speaker = "流星市国民"
# 「私も、モンスターから家族を助けてもらったことがあります。クロトさんは、いつだって私たちの味方で……」
line = "「私も、モンスターから家族を助けてもらったことがあります。クロトさんは、いつだって私たちの味方で……」"

[[dialogue]]
speaker = "ベアトリス"
# 「ね、ねぇチナちゃん。クロトさんってそんなに凄い人なの……？」
line = "「ね、ねぇチナちゃん。クロトさんってそんなに凄い人なの……？」"

[[dialogue]]
speaker = "チナ"
# 「直接会ったことはないんだよな。それに、自分を『魔王』だって自称してる変なやつで……だけど」
line = "「直接会ったことはないんだよな。それに、自分を『魔王』だって自称してる変なやつで……だけど」"

[[dialogue]]
speaker = "unk"
# 星騎士としては、かくあるべしと言われるような、真面目でひたむきな男であったと、チナの両親は言っていた。
line = "星騎士としては、かくあるべしと言われるような、真面目でひたむきな男であったと、チナの両親は言っていた。"

[[dialogue]]
speaker = "流星市国民"
# 「というか……魔王クロトが逃げ出した。代わりにルヴィネさん、あなたがやってきた──そこまではいいとして、だ」
line = "「というか……魔王クロトが逃げ出した。代わりにルヴィネさん、あなたがやってきた──そこまではいいとして、だ」"

[[dialogue]]
speaker = "流星市国民"
# 「それと、あの『壁』がどう関係しているっていうんだ……？」
line = "「それと、あの『壁』がどう関係しているっていうんだ……？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……魔王クロトは、逃げ出すときに『ある力』を使ったの。魔王にだけ備わっているのか、どこかで手に入れたものなのかはわからないけれど」
line = "「……魔王クロトは、逃げ出すときに『ある力』を使ったの。魔王にだけ備わっているのか、どこかで手に入れたものなのかはわからないけれど」"

[[dialogue]]
speaker = "ルヴィネ"
# 「それは──平行世界を跳躍する力」
line = "「それは──平行世界を跳躍する力」"

[[dialogue]]
speaker = "ルヴィネ"
# 「信じ難い情報を矢継ぎ早にごめんなさい。でも……私たちの暮らす世界は、１つじゃない。３つあるの」
line = "「信じ難い情報を矢継ぎ早にごめんなさい。でも……私たちの暮らす世界は、１つじゃない。３つあるの」"

[[dialogue]]
speaker = "チナ"
# 「知ってるよ。三界……人間界、天界、魔界だろ？」
line = "「知ってるよ。三界……人間界、天界、魔界だろ？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「いいえ、それだけじゃない。女神様は仰ったわ。人間界、天界、魔界──それをひっくるめて、ここは『デネブの世界』だって」
line = "「いいえ、それだけじゃない。女神様は仰ったわ。人間界、天界、魔界──それをひっくるめて、ここは『デネブの世界』だって」"

[[dialogue]]
speaker = "ベアトリス"
# 「…………でねぶ？」
line = "「…………でねぶ？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「そう。そして世界は１つじゃない、３つある……デネブ、アルタイル、ベガ」
line = "「そう。そして世界は１つじゃない、３つある……デネブ、アルタイル、ベガ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「つまりは平行世界……魔王クロトは、絶望的な状況になったデネブに見切りをつけて、アルタイル世界へ逃亡したと聞いたわ」
line = "「つまりは平行世界……魔王クロトは、絶望的な状況になったデネブに見切りをつけて、アルタイル世界へ逃亡したと聞いたわ」"

[[dialogue]]
speaker = "グレイス"
# 「わ、わけがわかりませんっ……ルヴィネさん、疲れておかしくなってしまったんですか！？」
line = "「わ、わけがわかりませんっ……ルヴィネさん、疲れておかしくなってしまったんですか！？」"

[[dialogue]]
speaker = "グレイス"
# 「平行世界？　デネブ？　アルタイルっ？　そんなおかしなことを言って、クロトさんが逃げただなんて……」
line = "「平行世界？　デネブ？　アルタイルっ？　そんなおかしなことを言って、クロトさんが逃げただなんて……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「信じろという方が無理なのはわかる。でも、事実よ」
line = "「信じろという方が無理なのはわかる。でも、事実よ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「本来、平行世界は交わらない。跳躍して移動する術はない──それを強引に実行した結果、空間に『ひずみ』が生まれた」
line = "「本来、平行世界は交わらない。跳躍して移動する術はない──それを強引に実行した結果、空間に『ひずみ』が生まれた」"

[[dialogue]]
speaker = "ベアトリス"
# 「それが……あの、空気がねじれた『壁』の正体……？」
line = "「それが……あの、空気がねじれた『壁』の正体……？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「そう。あの壁がある限り、私たちはこの流星市国から出られない。外から入ってくることもできない……だから、陸の孤島」
line = "「そう。あの壁がある限り、私たちはこの流星市国から出られない。外から入ってくることもできない……だから、陸の孤島」"

[[dialogue]]
speaker = "unk"
# 始めこそ、突拍子もない話であったが──避難民たちはルヴィネの言葉を信じた。
line = "始めこそ、突拍子もない話であったが──避難民たちはルヴィネの言葉を信じた。"

[[dialogue]]
speaker = "unk"
# まともな救援も保護も望めないこの世界で、誰よりも矢面に立ち、モンスターと戦っているのはルヴィネだったから。
line = "まともな救援も保護も望めないこの世界で、誰よりも矢面に立ち、モンスターと戦っているのはルヴィネだったから。"

[[dialogue]]
speaker = "unk"
# ベアトリスもレティシアも守護星を得てはいるが、ルヴィネの力は規格外だった。
line = "ベアトリスもレティシアも守護星を得てはいるが、ルヴィネの力は規格外だった。"

[[dialogue]]
speaker = "unk"
# あの『仮面の女』を倒すほどの星力を宿す彼女が言うのだからと──みんな信じた。
line = "あの『仮面の女』を倒すほどの星力を宿す彼女が言うのだからと──みんな信じた。"

[[dialogue]]
speaker = "グレイス"
# 「……嘘です。絶対に嘘っ……魔王さんは……私と、や、約束を……」
line = "「……嘘です。絶対に嘘っ……魔王さんは……私と、や、約束を……」"

[[dialogue]]
speaker = "ベアトリス"
# 「グレイスちゃん……」
line = "「グレイスちゃん……」"

[[dialogue]]
speaker = "流星市国民"
# 「……な、なあ。だったらどうなるんだ？　俺たち、ずっとここでモンスターに怯えるしかないのか……？」
line = "「……な、なあ。だったらどうなるんだ？　俺たち、ずっとここでモンスターに怯えるしかないのか……？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「いいえ。私は毎日、空間のひずみを調べに行っている。少しずつだけど、ひずみが元に戻ろうと動いているのはわかっているわ」
line = "「いいえ。私は毎日、空間のひずみを調べに行っている。少しずつだけど、ひずみが元に戻ろうと動いているのはわかっているわ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「時間はかかるけれど、いつかは解除される……はずよ」
line = "「時間はかかるけれど、いつかは解除される……はずよ」"

[[dialogue]]
speaker = "流星市国民"
# 「そ、それっていつなんだ！？」
line = "「そ、それっていつなんだ！？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「…………おそらく、３ヵ月か、４ヵ月」
line = "「…………おそらく、３ヵ月か、４ヵ月」"

[[dialogue]]
speaker = "流星市国民"
# 「そんなに持つわけない！！　食い物だっていつか底をつく……薬だっていくら残ってるか、それにこれから冬がくる！　みんな死ぬぞ！？」
line = "「そんなに持つわけない！！　食い物だっていつか底をつく……薬だっていくら残ってるか、それにこれから冬がくる！　みんな死ぬぞ！？」"

[[dialogue]]
speaker = "流星市国民"
# 「なぁ！　力と啓示をもらったんなら、女神様にお伝えしてくれよ！　あの『ひずみ』を消してくれって！　できないのか！？」
line = "「なぁ！　力と啓示をもらったんなら、女神様にお伝えしてくれよ！　あの『ひずみ』を消してくれって！　できないのか！？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「ごめんなさい。私に戦う力を与えて、人間界に呼ぶだけでも、かなり無茶をされているの。テルル様は相当に消耗されている。これ以上の助けは……」
line = "「ごめんなさい。私に戦う力を与えて、人間界に呼ぶだけでも、かなり無茶をされているの。テルル様は相当に消耗されている。これ以上の助けは……」"

[[dialogue]]
speaker = "流星市国民"
# 「何だよそれっ……！　『仮面の女』に殺されなくても、ここで飢え死にするか、モンスターに殺されるのを待つなら同じことじゃねえか！？」
line = "「何だよそれっ……！　『仮面の女』に殺されなくても、ここで飢え死にするか、モンスターに殺されるのを待つなら同じことじゃねえか！？」"

[[dialogue]]
speaker = "流星市国民"
# 「何が女神の遣いだ！！　何とかするために来たんだろ、だったら何とかしろよ！！」
line = "「何が女神の遣いだ！！　何とかするために来たんだろ、だったら何とかしろよ！！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "チナ"
# 「おっさん、そんな言い方ないだろ！？　ルヴィネがどれだけアタシらのために……！」
line = "「おっさん、そんな言い方ないだろ！？　ルヴィネがどれだけアタシらのために……！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「いいの、チナさん。そこの人の言うとおり……女神の遣いであるのに、不自由を強いてしまっている……」
line = "「いいの、チナさん。そこの人の言うとおり……女神の遣いであるのに、不自由を強いてしまっている……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「本当にごめんなさい。私が至らないばかりに……」
line = "「本当にごめんなさい。私が至らないばかりに……」"

[[dialogue]]
speaker = "unk"
# ルヴィネが平身低頭、額を地べたにこすりつけて謝罪をした。少女に激昂して、謝罪までさせてしまった男は、ようやく頭にのぼった血が引く。
line = "ルヴィネが平身低頭、額を地べたにこすりつけて謝罪をした。少女に激昂して、謝罪までさせてしまった男は、ようやく頭にのぼった血が引く。"

[[dialogue]]
speaker = "流星市国民"
# 「あ、ぅ……す、すまない……俺、どうかしてた……」
line = "「あ、ぅ……す、すまない……俺、どうかしてた……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「まともに食事も睡眠もとれない状況だもの……無理もないわ。私の方こそ、ごめんなさい」
line = "「まともに食事も睡眠もとれない状況だもの……無理もないわ。私の方こそ、ごめんなさい」"

[[dialogue]]
speaker = "ルヴィネ"
# 「この状況下で、数ヵ月を生き延びるのは困難を極めるわ。モンスターの対策をしながら、動植物がほとんどない都市でのサバイバル」
line = "「この状況下で、数ヵ月を生き延びるのは困難を極めるわ。モンスターの対策をしながら、動植物がほとんどない都市でのサバイバル」"

[[dialogue]]
speaker = "ルヴィネ"
# 「でも、どうか強く心を持って。希望を捨てないで欲しい」
line = "「でも、どうか強く心を持って。希望を捨てないで欲しい」"

[[dialogue]]
speaker = "ルヴィネ"
# 「不出来な女神の遣いではあるけれど……この流星市国の人達を私は守りたい」
line = "「不出来な女神の遣いではあるけれど……この流星市国の人達を私は守りたい」"

[[dialogue]]
speaker = "ルヴィネ"
# 「誰一人、モンスターに襲わせない。私が守る。だから──ついてきてはくれないかしら」
line = "「誰一人、モンスターに襲わせない。私が守る。だから──ついてきてはくれないかしら」"

[[dialogue]]
speaker = "unk"
# 長い沈黙の果てに──１人の流星市国民が呟いた。
line = "長い沈黙の果てに──１人の流星市国民が呟いた。"

[[dialogue]]
speaker = "流星市国民"
# 「──ルヴィネ様」
line = "「──ルヴィネ様」"

[[dialogue]]
speaker = "unk"
# この少女が、女神テルルが遣わした、世界の最後の希望であるのなら。
line = "この少女が、女神テルルが遣わした、世界の最後の希望であるのなら。"

[[dialogue]]
speaker = "流星市国民"
# 「ルヴィネ様……お願いします……！」
line = "「ルヴィネ様……お願いします……！」"

[[dialogue]]
speaker = "unk"
# 命に代えても守ると告げる少女の言葉に、確かな意思とまごころがこもっているのを皆が感じていたから。
line = "命に代えても守ると告げる少女の言葉に、確かな意思とまごころがこもっているのを皆が感じていたから。"

[[dialogue]]
speaker = "流星市国民"
# 「どうか私たちを助けてください、ルヴィネ様……！！」
line = "「どうか私たちを助けてください、ルヴィネ様……！！」"

[[dialogue]]
speaker = "unk"
# その日から、大聖堂に身を寄せる避難民たちは、ルヴィネのことを女神テルルと同じくらいに慕い、敬うようになった──
line = "その日から、大聖堂に身を寄せる避難民たちは、ルヴィネのことを女神テルルと同じくらいに慕い、敬うようになった──"
