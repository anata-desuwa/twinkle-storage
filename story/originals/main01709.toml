[[dialogue]]
speaker = "unk"
# なら俺たちは……その全部、余すところなく受け継がせてもらおう。
line = "なら俺たちは……その全部、余すところなく受け継がせてもらおう。"

[[dialogue]]
speaker = "クロト"
# 「──受け取った」
line = "「──受け取った」"

[[dialogue]]
speaker = "アポロ"
# 「──ああ。全開だ」
