[[dialogue]]
speaker = "クロト"
# 「新星学園星徒会会長、緋宮クロト──星騎士としての使命、果たさせてもらう！」
line = "「新星学園星徒会会長、緋宮クロト──星騎士としての使命、果たさせてもらう！」"

[[dialogue]]
speaker = "魔神ギエル"
# 「我ハ『リクリエ』──大イナル再創生ノ化身！　人類風情ガ、宇宙ノ塵ト消エルガイイ──！！」
line = "「我ハ『リクリエ』──大イナル再創生ノ化身！　人類風情ガ、宇宙ノ塵ト消エルガイイ──！！」"
