[[dialogue]]
speaker = "セシア"
# 「<ruby=わたくし>私</ruby>たちとの縁まで繋げるなんて、会長の力は凄いのね」
line = "「<ruby>私<rt>わたくし</rt></ruby>たちとの縁まで繋げるなんて、会長の力は凄いのね」"

[[dialogue]]
speaker = "パテル"
# 「あたし、本当はリクリエ静観派なんだけどね～。でも今回のリクリエはいつもと違う気がするし、ちょ～っと力を貸したげよっかな♪」
line = "「あたし、本当はリクリエ静観派なんだけどね～。でも今回のリクリエはいつもと違う気がするし、ちょ～っと力を貸したげよっかな♪」"

[[dialogue]]
speaker = "セドナ"
# 「総員──ロッドを天へ掲げろ！　持ちえる総ての魔力を、塔の頂へと結集するのだ！」
line = "「総員──ロッドを天へ掲げろ！　持ちえる総ての魔力を、塔の頂へと結集するのだ！」"

[[dialogue]]
speaker = "ネビュラ隊員"
# 「──イエス、マム！」
line = "「──イエス、マム！」"

[[dialogue]]
speaker = "セドナ"
# 「──何？　我々の作戦はどうしたのか……だと？」
line = "「──何？　我々の作戦はどうしたのか……だと？」"

[[dialogue]]
speaker = "セドナ"
# 「知らん。姫様の『壁』がもう張られ、『使徒』の権限まで移り変わった以上、当初の算段は崩れた。もはや奴らに委ねるしかあるまい」
line = "「知らん。姫様の『壁』がもう張られ、『使徒』の権限まで移り変わった以上、当初の算段は崩れた。もはや奴らに委ねるしかあるまい」"

[[dialogue]]
speaker = "セドナ"
# 「元老会のお歴々からはどやされるやもしれんが……ま、私が大目玉を食うだけで済むなら安いものだ」
line = "「元老会のお歴々からはどやされるやもしれんが……ま、私が大目玉を食うだけで済むなら安いものだ」"

[[dialogue]]
speaker = "セドナ"
# 「最後の大博打だ。リノ──貴様が組織に背いてまで得たかった結末を、私たちに拝ませてみろ」
line = "「最後の大博打だ。リノ──貴様が組織に背いてまで得たかった結末を、私たちに拝ませてみろ」"

[[dialogue]]
speaker = "ソフィア"
# 「これは……」
line = "「これは……」"

[[dialogue]]
speaker = "セーラ"
