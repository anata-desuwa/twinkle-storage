[[dialogue]]
speaker = "ヴィーナス"
# 「さあ、いくわよクロト──ママもきっと祈ってくれてるわ！　星徒会のみんな、準備はいい！？」
line = "「さあ、いくわよクロト──ママもきっと祈ってくれてるわ！　星徒会のみんな、準備はいい！？」"

[[dialogue]]
speaker = "みんな"
# 「──おう！！」
line = "「──おう！！」"

[[dialogue]]
speaker = "unk"
# 再び立ち上がった流星、新星の星騎士たち。
line = "再び立ち上がった流星、新星の星騎士たち。"

[[dialogue]]
speaker = "unk"
# 挑むはギエル──主を失った従者にして、３０００年の因果が生んだ影の怪物！
