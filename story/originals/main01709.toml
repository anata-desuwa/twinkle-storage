line = "第１０話,敗北の結晶,B"

[[dialogue]]
speaker = "クロト"
# 「フロンティア、ドライブ──」
line = "「フロンティア、ドライブ──」"

[[dialogue]]
speaker = "魔神ギエル"
# 「ヌ──！？」
line = "「ヌ──！？」"

[[dialogue]]
speaker = "魔神ギエル"
# 「平行世界ヘノ干渉……！　バカナ──人ノ身デ、自在ニソレヲ操レルダト──！？」
line = "「平行世界ヘノ干渉……！　バカナ──人ノ身デ、自在ニソレヲ操レルダト──！？」"

[[dialogue]]
speaker = "unk"
# 指数関数的に跳ね上がっていく魔王の波動！
line = "指数関数的に跳ね上がっていく魔王の波動！"

[[dialogue]]
speaker = "unk"
# 平行世界で敗れた俺よ、この俺に最後の力を与えてくれ！
line = "平行世界で敗れた俺よ、この俺に最後の力を与えてくれ！"

[[dialogue]]
speaker = "リノ"
# 「無限の可能性の連鎖──はは……参ったわね」
line = "「無限の可能性の連鎖──はは……参ったわね」"

[[dialogue]]
speaker = "リノ"
# （私が思っていたよりもずっとずっと……強い子だったみたいね。昔から）
line = "（私が思っていたよりもずっとずっと……強い子だったみたいね。昔から）"

[[dialogue]]
speaker = "ニャリオン"
# 「これニャら──リクリエそのものが相手だろうといけるニャン！！」
line = "「これニャら──リクリエそのものが相手だろうといけるニャン！！」"

[[dialogue]]
speaker = "アポロ"
# 「っ……くたばってる場合じゃないな！」
line = "「っ……くたばってる場合じゃないな！」"

[[dialogue]]
speaker = "セーラ"
# 「待って。なんか地面が揺れてない……？」
line = "「待って。なんか地面が揺れてない……？」"

[[dialogue]]
speaker = "アナ"
# 「これは……天蓋対策に張っていた、地脈が連動しています──！」
line = "「これは……天蓋対策に張っていた、地脈が連動しています──！」"

[[dialogue]]
speaker = "トワ先生"
# 「──みんな！　星徒会のみんなに向けて、力を送るよ！　せーのっ！」
line = "「──みんな！　星徒会のみんなに向けて、力を送るよ！　せーのっ！」"

[[dialogue]]
speaker = "コハルコ"
# 「私たちに最後まで、できることがあるなら──」
line = "「私たちに最後まで、できることがあるなら──」"

[[dialogue]]
speaker = "アニュラス（覚醒）"
# 「負けるんじゃないぞ、緋宮クロト。私との果たし合いが済むまでな──！」
line = "「負けるんじゃないぞ、緋宮クロト。私との果たし合いが済むまでな──！」"

[[dialogue]]
speaker = "舞亜"
# 「……頑張って、ソフィ。お姉さん達も」
line = "「……頑張って、ソフィ。お姉さん達も」"

[[dialogue]]
speaker = "キリカ"
# 「お嬢様方──どうかご無事で。健闘を祈ります」
line = "「お嬢様方──どうかご無事で。健闘を祈ります」"

[[dialogue]]
speaker = "エスメラルダ"
# 「アステラも消えちゃった今……彼女たちに託すしかないものね」
line = "「アステラも消えちゃった今……彼女たちに託すしかないものね」"

[[dialogue]]
speaker = "ヘレナ"
# 「はてさて──最後の正念場と言ったところか。不肖の娘の晴れ舞台、彩ってやるのもやぶさかではない」
line = "「はてさて──最後の正念場と言ったところか。不肖の娘の晴れ舞台、彩ってやるのもやぶさかではない」"

[[dialogue]]
speaker = "せつな"
# 「星徒会のみんなに……せつな達の力を送るでござる！」
line = "「星徒会のみんなに……せつな達の力を送るでござる！」"

[[dialogue]]
speaker = "ヨミ"
# 「はい──！　星々よ、私たちの祈りを届けて──！」
line = "「はい──！　星々よ、私たちの祈りを届けて──！」"

[[dialogue]]
speaker = "閃"
# 「お嬢様のいない世界なんて──死んでも願い下げですから」
line = "「お嬢様のいない世界なんて──死んでも願い下げですから」"

[[dialogue]]
speaker = "unk"
# 全世界に広がる地脈と、そして天空を通じて、色とりどりの星々の祝福がまたたく。
line = "全世界に広がる地脈と、そして天空を通じて、色とりどりの星々の祝福がまたたく。"

[[dialogue]]
speaker = "サーシャ"
# 「エウロパの鼓動を感じるわ……同じ守護星の子たちが、助けてくれているのね」
