[[dialogue]]
speaker = "魔神ギエル"
# 「シブトイ──何度ヨミガエレバ気ガ済ムトイウノダ、魔王ラクシス──！」
line = "「シブトイ──何度ヨミガエレバ気ガ済ムトイウノダ、魔王ラクシス──！」"

[[dialogue]]
speaker = "unk"
# 人間界を、森羅暦を、アルタイルを終わらせない。
