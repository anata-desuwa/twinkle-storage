[[dialogue]]
speaker = "アナ"
# 「<ruby=マーズ>火星</ruby>も……他にも、無数の星々による星力が注がれてきます……！」
line = "「<ruby>火星<rt>マーズ</rt></ruby>も……他にも、無数の星々による星力が注がれてきます……！」"

[[dialogue]]
speaker = "ユウリ"
# 「ああ……どんどん力が湧いてくる。これならやれるぜ、まだまだ──ッ！」
line = "「ああ……どんどん力が湧いてくる。これならやれるぜ、まだまだ──ッ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「みんな……」
line = "「みんな……」"

[[dialogue]]
speaker = "unk"
# 星々とのリンクを通じて力を取り戻したみんなが立ち上がる。
line = "星々とのリンクを通じて力を取り戻したみんなが立ち上がる。"

[[dialogue]]
speaker = "unk"
# しかも──
line = "しかも──"

[[dialogue]]
speaker = "アポロ"
# 「どうやら……それだけじゃないみたいだな」
line = "「どうやら……それだけじゃないみたいだな」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
# 「ええ──どこからか霊力まで送られてきます。今、これを扱えるのは……」
line = "「ええ──どこからか霊力まで送られてきます。今、これを扱えるのは……」"

[[dialogue]]
speaker = "マグダレナ"
# 「魔王──それに御子──いよいよ運命を決する時ですね」
line = "「魔王──それに御子──いよいよ運命を決する時ですね」"

[[dialogue]]
speaker = "アルモタヘル"
# 「今……一瞬だけだが女神の波動を感じた。まだ、我々も見捨てられてはいないようだ」
line = "「今……一瞬だけだが女神の波動を感じた。まだ、我々も見捨てられてはいないようだ」"

[[dialogue]]
speaker = "マグダレナ"
# 「この世界を救うため、私たちにできることを尽くしましょう」
