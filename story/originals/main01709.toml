[[dialogue]]
speaker = "unk"
# なら俺は──この地球に生きる、全ての命を率いてみせよう。
line = "なら俺は──この地球に生きる、全ての命を率いてみせよう。"

[[dialogue]]
speaker = "クロト"
# 「来いよ──ギエル。リクリエの使徒。バジュラ教団の残党。よこしまな悪党はまとめて全部」
line = "「来いよ──ギエル。リクリエの使徒。バジュラ教団の残党。よこしまな悪党はまとめて全部」"

[[dialogue]]
speaker = "クロト"
# 「俺も負け犬。おまえも負け犬だ。共に地べたを這いつくばった者同士、泥臭くやり合うのがお似合いだろ」
line = "「俺も負け犬。おまえも負け犬だ。共に地べたを這いつくばった者同士、泥臭くやり合うのがお似合いだろ」"

[[dialogue]]
speaker = "魔神ギエル"
# 「────」
line = "「────」"

[[dialogue]]
speaker = "クロト"
# 「かかってこい。俺が、おまえ達全員の因縁に、ここでけりをつけてやる！」
