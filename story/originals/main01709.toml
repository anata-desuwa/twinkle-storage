[[dialogue]]
speaker = "魔神ギエル"
# 「愚カシイ……地球ゴトキガ……大自然ノ理カラスレバ、ソノ程度ノ矮星ハ塵屑モ同ジ！」
line = "「愚カシイ……地球ゴトキガ……大自然ノ理カラスレバ、ソノ程度ノ矮星ハ塵屑モ同ジ！」"

[[dialogue]]
speaker = "アポロ"
# 「流星ライダーアポロ──最終回だ。悪は必ず滅ぼしてやる！」
