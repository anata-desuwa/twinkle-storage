[[dialogue]]
speaker = "unk"
# メルエルが、小さな自分からの告白する宣言をされた翌朝。
line = "メルエルが、小さな自分からの告白する宣言をされた翌朝。"

[[dialogue]]
speaker = "メルエル"
# 「はぁ……」
line = "「はぁ……」"

[[dialogue]]
speaker = "クロト"
# 「メルエル、おはよう」
line = "「メルエル、おはよう」"

[[dialogue]]
speaker = "メルエル"
# 「あっ、か、会長くん……！？」
line = "「あっ、か、会長くん……！？」"

[[dialogue]]
speaker = "メルエル"
# 「えっ！？　――朝から元気がないように見える？　そ、そんなことないよ？」
line = "「えっ！？　――朝から元気がないように見える？　そ、そんなことないよ？」"

[[dialogue]]
speaker = "メルエル"
# 「心配してくれてありがとう♪　ちょっとひと息ついてただけだから、大丈夫！」
line = "「心配してくれてありがとう♪　ちょっとひと息ついてただけだから、大丈夫！」"

[[dialogue]]
speaker = "メルエル"
# 「じ、じゃあ、教室に行くから、またね♪」
line = "「じ、じゃあ、教室に行くから、またね♪」"

[[dialogue]]
speaker = "unk"
# そう言って笑顔を見せて、メルエルはクロトから逃げるようにその場を立ち去るのだった。
line = "そう言って笑顔を見せて、メルエルはクロトから逃げるようにその場を立ち去るのだった。"

[[dialogue]]
speaker = "unk"
# その日の放課後。
line = "その日の放課後。"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「メルエル～！」
line = "「メルエル～！」"

[[dialogue]]
speaker = "メルエル"
# 「あっ、ヴィーナスちゃん！　それにレミカちゃんも、どうしたの？　体が小さくなってる間は附属校に通ってるんじゃ……」
line = "「あっ、ヴィーナスちゃん！　それにレミカちゃんも、どうしたの？　体が小さくなってる間は附属校に通ってるんじゃ……」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「ねぇ、メルエル。小さい自分と、何かあった？」
line = "「ねぇ、メルエル。小さい自分と、何かあった？」"

[[dialogue]]
speaker = "メルエル"
# 「！　ご、ごめんね。まだちっちゃな自分と意見が合わなくて、それで２人には迷惑かけちゃって……」
line = "「！　ご、ごめんね。まだちっちゃな自分と意見が合わなくて、それで２人には迷惑かけちゃって……」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「それは気にしなくていいんだけど、会長が私たちに相談しに来てさ」
line = "「それは気にしなくていいんだけど、会長が私たちに相談しに来てさ」"

[[dialogue]]
speaker = "メルエル"
# 「会長くんが……？」
line = "「会長くんが……？」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「パパがメルエルの様子が変だって心配してて、それで私とレミカに相談に乗ってあげて欲しいってお願いしにきたのよ！」
line = "「パパがメルエルの様子が変だって心配してて、それで私とレミカに相談に乗ってあげて欲しいってお願いしにきたのよ！」"

[[dialogue]]
speaker = "メルエル"
# 「そうだったんだ。会長くんに、また迷惑をかけちゃったなぁ……」
line = "「そうだったんだ。会長くんに、また迷惑をかけちゃったなぁ……」"

[[dialogue]]
speaker = "メルエル"
# 「あのね……実は――」
line = "「あのね……実は――」"

[[dialogue]]
speaker = "unk"
# 空き教室へと移動しながら、メルエルは昨日、小さな自分と話した時のことを打ち明ける。
line = "空き教室へと移動しながら、メルエルは昨日、小さな自分と話した時のことを打ち明ける。"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「そっか。小さなメルエルが、会長に……」
line = "「そっか。小さなメルエルが、会長に……」"

[[dialogue]]
speaker = "メルエル"
# 「うん。自分の気持ちは自分が１番よくわかってるから、私、何も言えなくなっちゃって……」
line = "「うん。自分の気持ちは自分が１番よくわかってるから、私、何も言えなくなっちゃって……」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「う～ん、なるほどね！　難しいことはよくわからないけれど――」
line = "「う～ん、なるほどね！　難しいことはよくわからないけれど――」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「メルエル！　こういう時は、気晴らしにバトルよ♪」
line = "「メルエル！　こういう時は、気晴らしにバトルよ♪」"

[[dialogue]]
speaker = "メルエル"
# 「えぇええぇえ”ぇっ”！？」
line = "「えぇええぇえ”ぇっ”！？」"

[[dialogue]]
speaker = "unk"
# それから、３人はアリーナへと移動して、仮想結界システムを起動。
line = "それから、３人はアリーナへと移動して、仮想結界システムを起動。"

[[dialogue]]
speaker = "unk"
# 一緒に戦闘訓練を行うことになった。
line = "一緒に戦闘訓練を行うことになった。"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「行くわよ、メルエル！　――リトルシューティングスター！」
line = "「行くわよ、メルエル！　――リトルシューティングスター！」"

[[dialogue]]
speaker = "メルエル"
# 「くぅっ……！　ヴィーナスちゃん、小さな体でもすごく強い！」
line = "「くぅっ……！　ヴィーナスちゃん、小さな体でもすごく強い！」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「ふふん♪　そうでしょ～？　武器が『ビーム銃』になったから、前より色々なビームを撃てるようになったのよ♪」
line = "「ふふん♪　そうでしょ～？　武器が『ビーム銃』になったから、前より色々なビームを撃てるようになったのよ♪」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「ねぇ、メルエル！　私、思うんだけど、難しくてどうしたらいいかわからない時は、とりあえず戦ってみればいいと思うのよ！」
line = "「ねぇ、メルエル！　私、思うんだけど、難しくてどうしたらいいかわからない時は、とりあえず戦ってみればいいと思うのよ！」"

[[dialogue]]
speaker = "メルエル"
# 「戦う？」
line = "「戦う？」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「そう！　それで負けたとしても、どうやって勝てるかを考えて！　またチャレンジすればいいと思うの！」
line = "「そう！　それで負けたとしても、どうやって勝てるかを考えて！　またチャレンジすればいいと思うの！」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「勝てるまで、何度だって！」
line = "「勝てるまで、何度だって！」"

[[dialogue]]
speaker = "メルエル"
# 「でも……！　私は、ちっちゃい自分の気持ち、わかっちゃうから……」
line = "「でも……！　私は、ちっちゃい自分の気持ち、わかっちゃうから……」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「メルエルはクロトのこと、ちっちゃい自分に取られちゃってもいいの！？」
line = "「メルエルはクロトのこと、ちっちゃい自分に取られちゃってもいいの！？」"

[[dialogue]]
speaker = "メルエル"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「私は小さい私と元の１人に戻れるから、パパの頬っぺたにキスするのを我慢してたけど、ちっちゃいメルエルは元に戻る気はないって言ってるんでしょ？」
line = "「私は小さい私と元の１人に戻れるから、パパの頬っぺたにキスするのを我慢してたけど、ちっちゃいメルエルは元に戻る気はないって言ってるんでしょ？」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「もし私だったら、小さい自分だけパパとイチャイチャするのは、ずるいからイヤだって思うわ！」
line = "「もし私だったら、小さい自分だけパパとイチャイチャするのは、ずるいからイヤだって思うわ！」"

[[dialogue]]
speaker = "unk"
# 小さい姿になったヴィーナスのビームがメルエルにヒットして、仮想結界システムがヴィーナスに勝ち星のランプを付ける。
line = "小さい姿になったヴィーナスのビームがメルエルにヒットして、仮想結界システムがヴィーナスに勝ち星のランプを付ける。"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「ぷっ……ふふふっ……！　よくわからない時は、とりあえず戦うって……！」
line = "「ぷっ……ふふふっ……！　よくわからない時は、とりあえず戦うって……！」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「でも――私も、ヴィーナスの言っていることは間違ってないと思うよ」
line = "「でも――私も、ヴィーナスの言っていることは間違ってないと思うよ」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「メルエルは会長のこと、誰にも譲りたくないくらい、すごく好きなんだよね？」
line = "「メルエルは会長のこと、誰にも譲りたくないくらい、すごく好きなんだよね？」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「私、メルエルには本当にアイドルの才能があると思うし……チャンスがあればまた『アーネスト』としてユニットを組みたいって、今でも思ってる」
line = "「私、メルエルには本当にアイドルの才能があると思うし……チャンスがあればまた『アーネスト』としてユニットを組みたいって、今でも思ってる」"

[[dialogue]]
speaker = "メルエル"
# 「！　レミカちゃん……」
line = "「！　レミカちゃん……」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「でも、メルエルはみんなに愛を与えるアイドルよりも、会長１人に対しての一途な愛を貫くことを選んだでしょ？」
line = "「でも、メルエルはみんなに愛を与えるアイドルよりも、会長１人に対しての一途な愛を貫くことを選んだでしょ？」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「その気持ちは、小さいメルエルもきっと同じ。だったら――メルエルが選ぶべき道は１つ」
line = "「その気持ちは、小さいメルエルもきっと同じ。だったら――メルエルが選ぶべき道は１つ」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「一途な気持ちで、自分に負けちゃダメだよ」
line = "「一途な気持ちで、自分に負けちゃダメだよ」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「元の１人に戻るとか、そんなのは後で考えればいい。いま大事なのは、メルエルの気持ちだよ」
line = "「元の１人に戻るとか、そんなのは後で考えればいい。いま大事なのは、メルエルの気持ちだよ」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「メルエルなら、大丈夫よ！」
line = "「メルエルなら、大丈夫よ！」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「だって、メルエルはすごくいい子だもの！　自信を持って、小さな自分に全力でぶつかればいいわ！」
line = "「だって、メルエルはすごくいい子だもの！　自信を持って、小さな自分に全力でぶつかればいいわ！」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「相手は自分なんだから、全力で挑めば、必ず気持ちは伝わるはずよ！」
line = "「相手は自分なんだから、全力で挑めば、必ず気持ちは伝わるはずよ！」"

[[dialogue]]
speaker = "メルエル"
# 「ヴィーナスちゃん、レミカちゃん……２人共、ありがとう」
line = "「ヴィーナスちゃん、レミカちゃん……２人共、ありがとう」"

[[dialogue]]
speaker = "メルエル"
# 「私――もう１度自分と話してみるよ！」
line = "「私――もう１度自分と話してみるよ！」"

[[dialogue]]
speaker = "unk"
# そうして、小さな自分と改めて話し合おうと決意したメルエルだったが、問題が発生していた。
line = "そうして、小さな自分と改めて話し合おうと決意したメルエルだったが、問題が発生していた。"

[[dialogue]]
speaker = "メルエル"
# 「ちっちゃい私、一体どこに行っちゃったんだろう……！？」
line = "「ちっちゃい私、一体どこに行っちゃったんだろう……！？」"

[[dialogue]]
speaker = "unk"
# 肝心の小さなメルエルが姿を消していた。附属校の教室にも、臨時で用意してもらった寮の部屋にもその姿がない。
line = "肝心の小さなメルエルが姿を消していた。附属校の教室にも、臨時で用意してもらった寮の部屋にもその姿がない。"

[[dialogue]]
speaker = "メルエル"
# （会長くんやヴィーナスちゃん、レミカちゃんにも協力してもらって探してるけど……）
line = "（会長くんやヴィーナスちゃん、レミカちゃんにも協力してもらって探してるけど……）"

[[dialogue]]
speaker = "unk"
# 小さい自分が何を思って行動しているのか、メルエルは考えてみる。
line = "小さい自分が何を思って行動しているのか、メルエルは考えてみる。"

[[dialogue]]
speaker = "メルエル"
# （ちっちゃい私も、心は同じ。なら、考えることは――）
line = "（ちっちゃい私も、心は同じ。なら、考えることは――）"

[[dialogue]]
speaker = "メルエル"
# （もしかして……会長くんに今日告白を？　だとしたら、場所は……）
line = "（もしかして……会長くんに今日告白を？　だとしたら、場所は……）"

[[dialogue]]
speaker = "unk"
# メルエルは頭の中に、ある場所を思い浮かべるのだった。
line = "メルエルは頭の中に、ある場所を思い浮かべるのだった。"
