[[dialogue]]
speaker = "unk"
# 魔法少女たちと悪魔たちの戦闘は続いていた。
line = "魔法少女たちと悪魔たちの戦闘は続いていた。"

[[dialogue]]
speaker = "いろは"
# 「はああぁっ！」
line = "「はああぁっ！」"

[[dialogue]]
speaker = "アラクネ"
# 「――っ！」
line = "「――っ！」"

[[dialogue]]
speaker = "いろは"
# 「よしっ、１体倒したよ！　次！」
line = "「よしっ、１体倒したよ！　次！」"

[[dialogue]]
speaker = "ここあ"
# 「いろはす、ナイス～！」
line = "「いろはす、ナイス～！」"

[[dialogue]]
speaker = "陽彩"
# （悪魔は確かに倒せている。だが……）
line = "（悪魔は確かに倒せている。だが……）"

[[dialogue]]
speaker = "陽彩"
# （敵の数が多すぎる……！　このままでは、いろはたちの体力の方が先に……）
line = "（敵の数が多すぎる……！　このままでは、いろはたちの体力の方が先に……）"

[[dialogue]]
speaker = "いろは"
# 「はぁ……はぁ……！」
line = "「はぁ……はぁ……！」"

[[dialogue]]
speaker = "花織"
# 「いろは、後ろ！　危ないっ！！」
line = "「いろは、後ろ！　危ないっ！！」"

[[dialogue]]
speaker = "いろは"
# 「！　しまっ――」
line = "「！　しまっ――」"

[[dialogue]]
speaker = "unk"
# 疲労から集中力が途切れたことで生まれた、一瞬の油断。アラクネが足をいろはに向けて、振り下ろす。
line = "疲労から集中力が途切れたことで生まれた、一瞬の油断。アラクネが足をいろはに向けて、振り下ろす。"

[[dialogue]]
speaker = "unk"
# と、その時だった。
line = "と、その時だった。"

[[dialogue]]
speaker = "陽彩"
# 「止まれ！」
line = "「止まれ！」"

[[dialogue]]
speaker = "アラクネ"
# 「っ……！？」
line = "「っ……！？」"

[[dialogue]]
speaker = "ここあ"
# 「悪魔の動きが止まった……！？　これって――」
line = "「悪魔の動きが止まった……！？　これって――」"

[[dialogue]]
speaker = "陽彩"
# 「ふぅ……間一髪、間に合ったな」
line = "「ふぅ……間一髪、間に合ったな」"

[[dialogue]]
speaker = "いろは"
# 「陽彩ちゃん！　その姿……悪魔のロストアイテムの力はもう体から抜けたんじゃ！？」
line = "「陽彩ちゃん！　その姿……悪魔のロストアイテムの力はもう体から抜けたんじゃ！？」"

[[dialogue]]
speaker = "陽彩"
# 「ああ。変身できるかどうかは、試してみるまで分からなかったが……どうやらぼくの中にまだ、力の一部が残っていたみたいだ」
line = "「ああ。変身できるかどうかは、試してみるまで分からなかったが……どうやらぼくの中にまだ、力の一部が残っていたみたいだ」"

[[dialogue]]
speaker = "陽彩"
# 「これなら新しいドレス――今度はみんなを守る為の力として、運用することができる」
line = "「これなら新しいドレス――今度はみんなを守る為の力として、運用することができる」"

[[dialogue]]
speaker = "いろは"
# 「すごい！　陽彩ちゃん、闇落ちからの光覚醒展開だ！！　激アツぅ～～！！！」
line = "「すごい！　陽彩ちゃん、闇落ちからの光覚醒展開だ！！　激アツぅ～～！！！」"

[[dialogue]]
speaker = "陽彩"
# 「目を輝かせてないで、気を引き締め直せ！　ぼくもまだどこまで力をコントロールできるのかは未知数なんだ。油断はできないぞ！」
line = "「目を輝かせてないで、気を引き締め直せ！　ぼくもまだどこまで力をコントロールできるのかは未知数なんだ。油断はできないぞ！」"

[[dialogue]]
speaker = "いろは"
# 「うん！　わかった。ここからは４人で力を合わせて戦おう！」
line = "「うん！　わかった。ここからは４人で力を合わせて戦おう！」"

[[dialogue]]
speaker = "陽彩"
# 「ああ。いろは、背中は預ける！」
line = "「ああ。いろは、背中は預ける！」"

[[dialogue]]
speaker = "unk"
# 陽彩が加わり、魔法少女４人揃っての戦闘が、改めて始まるのだった。
line = "陽彩が加わり、魔法少女４人揃っての戦闘が、改めて始まるのだった。"
