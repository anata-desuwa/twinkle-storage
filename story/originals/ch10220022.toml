[[dialogue]]
speaker = "unk"
# 第２話,モネのスペシャルメニュー？,P
line = "第２話,モネのスペシャルメニュー？,P"

[[dialogue]]
speaker = "モネ"
# 「いきます……クリスマステイル……！」
line = "「いきます……クリスマステイル……！」"

[[dialogue]]
speaker = "unk"
# リップルのリゾート結界の中で、モネのトレーニングに付き合う。
line = "リップルのリゾート結界の中で、モネのトレーニングに付き合う。"

[[dialogue]]
speaker = "unk"
# いつもは内気なモネだが、水着のアクティブさのためか（？）、今日は果敢に攻めていた。
line = "いつもは内気なモネだが、水着のアクティブさのためか（？）、今日は果敢に攻めていた。"

[[dialogue]]
speaker = "モネ"
# 「はぁ、はぁ……ありがとうございました。さすが会長は強いですね……」
line = "「はぁ、はぁ……ありがとうございました。さすが会長は強いですね……」"

[[dialogue]]
speaker = "モネ"
# 「え？　私の星術が変わっている……ですか？」
line = "「え？　私の星術が変わっている……ですか？」"

[[dialogue]]
speaker = "モネ"
# 「そうですね。今までは本から星術を撃ち出していたんですけど、本に描かれたものを呼び出せるようになりました」
line = "「そうですね。今までは本から星術を撃ち出していたんですけど、本に描かれたものを呼び出せるようになりました」"

[[dialogue]]
speaker = "モネ"
# 「例えばクリスマスの絵本であれば、トナカイやサンタさんを召喚することができます。本の世界を少し再現できて嬉しいです」
line = "「例えばクリスマスの絵本であれば、トナカイやサンタさんを召喚することができます。本の世界を少し再現できて嬉しいです」"

[[dialogue]]
speaker = "モネ"
# 「自分では成長しているつもりなんですけど……会長から見てどうでしょうか？　あんまり変わらないですかね……？」
line = "「自分では成長しているつもりなんですけど……会長から見てどうでしょうか？　あんまり変わらないですかね……？」"

[[dialogue]]
speaker = "unk"
# もう少しでプリマステラになれるかも
line = "もう少しでプリマステラになれるかも"

[[dialogue]]
speaker = "モネ"
# 「！　はい、頑張ります！」
line = "「！　はい、頑張ります！」"

[[dialogue]]
speaker = "リップル"
# 「モネー！　カイチョー！　デキましたー！」
line = "「モネー！　カイチョー！　デキましたー！」"

[[dialogue]]
speaker = "モネ"
# 「あ、リップルさん、ありがとうございます」
line = "「あ、リップルさん、ありがとうございます」"

[[dialogue]]
speaker = "モネ"
# 「実は会長にはもう１つお願いがありまして……限界に挑戦していただきたいんです」
line = "「実は会長にはもう１つお願いがありまして……限界に挑戦していただきたいんです」"

[[dialogue]]
speaker = "unk"
# 限界？
line = "限界？"

[[dialogue]]
speaker = "モネ"
# 「はい。リップルさんの海の家の新メニューを開発していて、私はホットな辛口カレーを提案したんです」
line = "「はい。リップルさんの海の家の新メニューを開発していて、私はホットな辛口カレーを提案したんです」"

[[dialogue]]
speaker = "モネ"
# 「ですがリップルさんから『モネのカレーは辛スギます！』と言われてしまいまして……私的にはまだ甘口のつもりだったんですが……」
line = "「ですがリップルさんから『モネのカレーは辛スギます！』と言われてしまいまして……私的にはまだ甘口のつもりだったんですが……」"

[[dialogue]]
speaker = "リップル"
# 「ゼンゼン甘口じゃナイです！　ＢＩＧ辛いです！　モネの味覚に合わせたら、お客サンがいなくなってシマイます！」
line = "「ゼンゼン甘口じゃナイです！　ＢＩＧ辛いです！　モネの味覚に合わせたら、お客サンがいなくなってシマイます！」"

[[dialogue]]
speaker = "モネ"
# 「でもカレーは辛いから美味しいんじゃないですか。ですから、どのくらいの辛さが限界か、会長に試してもらいたいんです」
line = "「でもカレーは辛いから美味しいんじゃないですか。ですから、どのくらいの辛さが限界か、会長に試してもらいたいんです」"

[[dialogue]]
speaker = "モネ"
# 「まぁ、限界といっても美味しく食べられる辛さですから。心配はいりませんよ」
line = "「まぁ、限界といっても美味しく食べられる辛さですから。心配はいりませんよ」"

[[dialogue]]
speaker = "unk"
# （嫌な予感がするけど）モネとリップルのためなら
line = "（嫌な予感がするけど）モネとリップルのためなら"

[[dialogue]]
speaker = "モネ"
# 「ありがとうございます！　ではさっそく……これが一番辛くないカレーです」
line = "「ありがとうございます！　ではさっそく……これが一番辛くないカレーです」"

[[dialogue]]
speaker = "リップル"
# 「オー……スデにマグマのように真っ赤でーす……」
line = "「オー……スデにマグマのように真っ赤でーす……」"

[[dialogue]]
speaker = "unk"
# （覚悟して）じゃあいただきま──
line = "（覚悟して）じゃあいただきま──"

[[dialogue]]
speaker = "リップル"
# 「ノー！　そうじゃナイでーす！」
line = "「ノー！　そうじゃナイでーす！」"

[[dialogue]]
speaker = "モネ"
# 「ひゃいっ！？」
line = "「ひゃいっ！？」"

[[dialogue]]
speaker = "リップル"
# 「モネとカイチョウーはＢＩＧナカヨシ、ラブラブです！　デスから、そこはモネがあ～んするトコロでーす！」
line = "「モネとカイチョウーはＢＩＧナカヨシ、ラブラブです！　デスから、そこはモネがあ～んするトコロでーす！」"

[[dialogue]]
speaker = "モネ"
# 「ええっ！？　そんな……あーんなんて……」
line = "「ええっ！？　そんな……あーんなんて……」"

[[dialogue]]
speaker = "リップル"
# 「モネとカイチョー、ナカヨシ違いマスか？」
line = "「モネとカイチョー、ナカヨシ違いマスか？」"

[[dialogue]]
speaker = "モネ"
# 「ち、違わないですけど……」
line = "「ち、違わないですけど……」"

[[dialogue]]
speaker = "unk"
# 確かに俺とモネはＢＩＧ仲良し
line = "確かに俺とモネはＢＩＧ仲良し"

[[dialogue]]
speaker = "モネ"
# 「あ……あぅ……会長まで……そう言ってもらえるのは嬉しいですけど……」
line = "「あ……あぅ……会長まで……そう言ってもらえるのは嬉しいですけど……」"

[[dialogue]]
speaker = "モネ"
# 「じゃ、じゃあ……あ～ん……」
line = "「じゃ、じゃあ……あ～ん……」"

[[dialogue]]
speaker = "モネ"
# 「お、お味はどうですか……？　……美味しい？　まだいける？　なら良かったです」
line = "「お、お味はどうですか……？　……美味しい？　まだいける？　なら良かったです」"

[[dialogue]]
speaker = "モネ"
# 「ほら、会長は美味しいって言ってますよ、リップルさん。やっぱりカレーは辛い方がいいんですよ」
line = "「ほら、会長は美味しいって言ってますよ、リップルさん。やっぱりカレーは辛い方がいいんですよ」"

[[dialogue]]
speaker = "リップル"
# 「カイチョー、たくさん汗かいて、チョットつらそうです……ダイジョーブですか……？」
line = "「カイチョー、たくさん汗かいて、チョットつらそうです……ダイジョーブですか……？」"

[[dialogue]]
speaker = "モネ"
# 「これでも私的には甘口なくらいなんですが……。会長ならもっと上の辛さでも大丈夫ですよね。じゃあ次の辛さにいきますよ」
line = "「これでも私的には甘口なくらいなんですが……。会長ならもっと上の辛さでも大丈夫ですよね。じゃあ次の辛さにいきますよ」"

[[dialogue]]
speaker = "モネ"
# 「はい、どうぞ。あ～ん♪」
line = "「はい、どうぞ。あ～ん♪」"

[[dialogue]]
speaker = "モネ"
# 「この辛さも大丈夫ですか？　……美味しい？　ですよね、辛い方が美味しいですよね♪」
line = "「この辛さも大丈夫ですか？　……美味しい？　ですよね、辛い方が美味しいですよね♪」"

[[dialogue]]
speaker = "リップル"
# 「オー……カレーが赤くナルと、カイチョーの顔が青くなってイキまーす……」
line = "「オー……カレーが赤くナルと、カイチョーの顔が青くなってイキまーす……」"

[[dialogue]]
speaker = "モネ"
# 「私、嬉しいです。私が美味しいと思うものを、会長が美味しいと言ってくれて。だって、好きな人と同じものを好きでいたいじゃないですか」
line = "「私、嬉しいです。私が美味しいと思うものを、会長が美味しいと言ってくれて。だって、好きな人と同じものを好きでいたいじゃないですか」"

[[dialogue]]
speaker = "unk"
# （モネの笑顔は嬉しいけど辛いと言いにくい……）
line = "（モネの笑顔は嬉しいけど辛いと言いにくい……）"

[[dialogue]]
speaker = "モネ"
# 「じゃあ次が最後の辛さです。私でもちょっと辛いと思うくらいなので、本当に辛かったらダメって言ってくださいね」
line = "「じゃあ次が最後の辛さです。私でもちょっと辛いと思うくらいなので、本当に辛かったらダメって言ってくださいね」"

[[dialogue]]
speaker = "モネ"
# 「はい、あ～～～ん♪」
line = "「はい、あ～～～ん♪」"

[[dialogue]]
speaker = "unk"
# ～～～～～～っ！！？？
line = "～～～～～～っ！！？？"

[[dialogue]]
speaker = "モネ"
# 「会長！？」
line = "「会長！？」"

[[dialogue]]
speaker = "モネ"
# 「会長！？　大丈夫ですか、会長～～～っ！！？」
line = "「会長！？　大丈夫ですか、会長～～～っ！！？」"

[[dialogue]]
speaker = "unk"
# 結局、モネのカレーはメニューとして不採用になったのだった。
line = "結局、モネのカレーはメニューとして不採用になったのだった。"
