[[dialogue]]
speaker = "unk"
# 放課後、俺が教室でメルエルと雑談していると、レミカがやって来た――
line = "放課後、俺が教室でメルエルと雑談していると、レミカがやって来た――"

[[dialogue]]
speaker = "メルエル"
# 「あれ？　アイドルのレミカちゃん？　別のクラスなのに、どうして会長くんの教室に……」
line = "「あれ？　アイドルのレミカちゃん？　別のクラスなのに、どうして会長くんの教室に……」"

[[dialogue]]
speaker = "unk"
# ――ちなみに、<ruby=ひめさき>姫咲</ruby>メルエルは俺やレミカと同じく新星学園２年生。俺は思い出せずにいるが、１０年前に会って一緒に遊んだことがあるという、いわゆる幼なじみの関係だ。
line = "――ちなみに、<ruby>姫咲<rt>ひめさき</rt></ruby>メルエルは俺やレミカと同じく新星学園２年生。俺は思い出せずにいるが、１０年前に会って一緒に遊んだことがあるという、いわゆる幼なじみの関係だ。"

[[dialogue]]
speaker = "レミカ"
# 「あ、見つけた。姫咲メルエルさん……って、会長？　どうしてここに？」
line = "「あ、見つけた。姫咲メルエルさん……って、会長？　どうしてここに？」"

[[dialogue]]
speaker = "レミカ"
# 「――そっか、会長と友達なんだ。えっ……再会した幼なじみ？　へぇ、そんなことってあるんだ」
line = "「――そっか、会長と友達なんだ。えっ……再会した幼なじみ？　へぇ、そんなことってあるんだ」"

[[dialogue]]
speaker = "レミカ"
# 「私、実は姫咲さんに話があって、探してたんだ」
line = "「私、実は姫咲さんに話があって、探してたんだ」"

[[dialogue]]
speaker = "メルエル"
# 「レミカちゃ――じゃなかった。愛戸さんが、私に？　話って一体……」
line = "「レミカちゃ――じゃなかった。愛戸さんが、私に？　話って一体……」"

[[dialogue]]
speaker = "レミカ"
# 「ん。突然で驚くと思うんだけど……姫咲さん、アイドルに興味ある？」
line = "「ん。突然で驚くと思うんだけど……姫咲さん、アイドルに興味ある？」"

[[dialogue]]
speaker = "メルエル"
# 「え？　うん、昔からアイドルは好きだよ♪　可愛くて憧れちゃう……私、歌も好きだし」
line = "「え？　うん、昔からアイドルは好きだよ♪　可愛くて憧れちゃう……私、歌も好きだし」"

[[dialogue]]
speaker = "メルエル"
# 「実は愛戸さんのことも前から応援してて……歌がとっても上手で素敵だなぁって♪」
line = "「実は愛戸さんのことも前から応援してて……歌がとっても上手で素敵だなぁって♪」"

[[dialogue]]
speaker = "レミカ"
# 「そっか、やっぱり。何か惹きつけられるものを感じたんだ。ねぇ、姫咲さん――」
line = "「そっか、やっぱり。何か惹きつけられるものを感じたんだ。ねぇ、姫咲さん――」"

[[dialogue]]
speaker = "レミカ"
# 「私と一緒にアイドルになって、ユニットを組まない？」
line = "「私と一緒にアイドルになって、ユニットを組まない？」"

[[dialogue]]
speaker = "メルエル"
# 「へぇ、私が愛戸さんと一緒に。それは楽しそう――って、え……？」
line = "「へぇ、私が愛戸さんと一緒に。それは楽しそう――って、え……？」"

[[dialogue]]
speaker = "メルエル"
# 「ええぇぇぇ―――っ！？　わ、私がアイドルに！？　しかも、愛戸さんとユニットを組む！？　いやいやいやいやいや！　それって何の冗談！？」
line = "「ええぇぇぇ―――っ！？　わ、私がアイドルに！？　しかも、愛戸さんとユニットを組む！？　いやいやいやいやいや！　それって何の冗談！？」"

[[dialogue]]
speaker = "レミカ"
# 「冗談じゃなくて、本気。姫咲さんって、たまに鼻歌を唄ってることあるでしょ」
line = "「冗談じゃなくて、本気。姫咲さんって、たまに鼻歌を唄ってることあるでしょ」"

[[dialogue]]
speaker = "メルエル"
# 「うっ、聞かれちゃってた……？　その……気分が良いと、つい癖で……」
line = "「うっ、聞かれちゃってた……？　その……気分が良いと、つい癖で……」"

[[dialogue]]
speaker = "レミカ"
# 「私、その鼻歌に才能を感じたんだよね」
line = "「私、その鼻歌に才能を感じたんだよね」"

[[dialogue]]
speaker = "メルエル"
# 「鼻歌だけで！？」
line = "「鼻歌だけで！？」"

[[dialogue]]
speaker = "レミカ"
# 「あとは直感、かな」
line = "「あとは直感、かな」"

[[dialogue]]
speaker = "unk"
# でも、何でユニットを結成したいんだ？
line = "でも、何でユニットを結成したいんだ？"

[[dialogue]]
speaker = "メルエル"
# 「うんうんっ。だって愛戸さんは、もうワールドクラスの超有名アイドルなのに」
line = "「うんうんっ。だって愛戸さんは、もうワールドクラスの超有名アイドルなのに」"

[[dialogue]]
speaker = "レミカ"
# 「真面目に勧誘をするんだから、それはちゃんと話さなきゃだよね。……私、最近悩んでることがあって――」
line = "「真面目に勧誘をするんだから、それはちゃんと話さなきゃだよね。……私、最近悩んでることがあって――」"

[[dialogue]]
speaker = "レミカ"
# 「今の私には、『アイドルらしさ』が足りてないと思うんだ」
line = "「今の私には、『アイドルらしさ』が足りてないと思うんだ」"

[[dialogue]]
speaker = "メルエル"
# 「え？　愛戸さんは間違いなく、今の時代を代表するトップアイドルなのに……」
line = "「え？　愛戸さんは間違いなく、今の時代を代表するトップアイドルなのに……」"

[[dialogue]]
speaker = "レミカ"
# 「ありがと。でも、私の世間的評価って『アイドルらしいアイドル』っていう風には、なってないでしょ？」
line = "「ありがと。でも、私の世間的評価って『アイドルらしいアイドル』っていう風には、なってないでしょ？」"

[[dialogue]]
speaker = "メルエル"
# 「あ……確か『アイドルの枠を越えた、アーティスティックでクールな歌姫』だって、前に雑誌で……」
line = "「あ……確か『アイドルの枠を越えた、アーティスティックでクールな歌姫』だって、前に雑誌で……」"

[[dialogue]]
speaker = "レミカ"
# 「そう、大体どこもそんな感じ。アーティスティック、クール、どっちかっていうとカッコいい系。私が男のアイドルなら、それもアリだったんだろうけど……」
line = "「そう、大体どこもそんな感じ。アーティスティック、クール、どっちかっていうとカッコいい系。私が男のアイドルなら、それもアリだったんだろうけど……」"

[[dialogue]]
speaker = "レミカ"
# 「私が子供の頃に憧れたアイドルってさ、もっとこう……『カッコよくも可愛い』アイドルだったんだよね。可愛さを突き詰めた結果の、カッコよさっていうのかな」
line = "「私が子供の頃に憧れたアイドルってさ、もっとこう……『カッコよくも可愛い』アイドルだったんだよね。可愛さを突き詰めた結果の、カッコよさっていうのかな」"

[[dialogue]]
speaker = "レミカ"
# 「私は今の自分が、その理想通りのアイドルになれているとは……思えない」
line = "「私は今の自分が、その理想通りのアイドルになれているとは……思えない」"

[[dialogue]]
speaker = "レミカ"
# 「トップアイドルだって周りが言ってくれていても、今のままじゃ納得が出来ないんだ」
line = "「トップアイドルだって周りが言ってくれていても、今のままじゃ納得が出来ないんだ」"

[[dialogue]]
speaker = "レミカ"
# 「だって私が目指すのは、完全無欠のトップアイドルだから」
line = "「だって私が目指すのは、完全無欠のトップアイドルだから」"

[[dialogue]]
speaker = "レミカ"
# 「自分が思い描いた夢に手を伸ばさなきゃ、皆にも夢は見せられない」
line = "「自分が思い描いた夢に手を伸ばさなきゃ、皆にも夢は見せられない」"

[[dialogue]]
speaker = "レミカ"
# 「それが、アイドルっていうものだと、私は思ってるから」
line = "「それが、アイドルっていうものだと、私は思ってるから」"

[[dialogue]]
speaker = "メルエル"
# 「なんか、凄い……これが――」
line = "「なんか、凄い……これが――」"

[[dialogue]]
speaker = "unk"
# プロのトップアイドルってやつか
line = "プロのトップアイドルってやつか"

[[dialogue]]
speaker = "メルエル"
# 「でも、そこまで真剣な事情を聞いちゃうと、誘ってもらえるのは光栄だけど――」
line = "「でも、そこまで真剣な事情を聞いちゃうと、誘ってもらえるのは光栄だけど――」"

[[dialogue]]
speaker = "メルエル"
# 「いきなり私もアイドルになる決心が付くかって言われると、ちょっと……」
line = "「いきなり私もアイドルになる決心が付くかって言われると、ちょっと……」"

[[dialogue]]
speaker = "レミカ"
# 「う……勧誘するのに、重いことを話し過ぎた、かも」
line = "「う……勧誘するのに、重いことを話し過ぎた、かも」"

[[dialogue]]
speaker = "レミカ"
# 「で、でも、姫咲さんがアイドルに興味はあって、歌が好きなのも本当なんだよね？」
line = "「で、でも、姫咲さんがアイドルに興味はあって、歌が好きなのも本当なんだよね？」"

[[dialogue]]
speaker = "レミカ"
# 「だったらとりあえず、お互いを知るところから始めちゃダメ、かな？」
line = "「だったらとりあえず、お互いを知るところから始めちゃダメ、かな？」"

[[dialogue]]
speaker = "メルエル"
# 「あっ、そういえば雑誌で見たけど、愛戸さんってカラオケ行くのが好きなんだっけ？　実は私もなんだ♪　カラオケ一緒に行くのは、大歓迎だよ！」
line = "「あっ、そういえば雑誌で見たけど、愛戸さんってカラオケ行くのが好きなんだっけ？　実は私もなんだ♪　カラオケ一緒に行くのは、大歓迎だよ！」"

[[dialogue]]
speaker = "レミカ"
# 「本当……！？　趣味が一緒なのは……嬉しい、かも。じゃあ後で予定決める為に、連絡先とか交換してもいい？」
line = "「本当……！？　趣味が一緒なのは……嬉しい、かも。じゃあ後で予定決める為に、連絡先とか交換してもいい？」"

[[dialogue]]
speaker = "メルエル"
# 「うん、いいよ♪　あ、私のことはメルエルって呼んで？　同級生なんだし、これから仲良くしてほしいな♪」
line = "「うん、いいよ♪　あ、私のことはメルエルって呼んで？　同級生なんだし、これから仲良くしてほしいな♪」"

[[dialogue]]
speaker = "レミカ"
# 「ん、分かった……メルエル。私のことも、レミカって呼んで。これから、よろしく」
line = "「ん、分かった……メルエル。私のことも、レミカって呼んで。これから、よろしく」"

[[dialogue]]
speaker = "メルエル"
# 「うん♪　これからよろしくね、レミカちゃん！」
line = "「うん♪　これからよろしくね、レミカちゃん！」"

[[dialogue]]
speaker = "レミカ"
# 「あっ、そうだ。会長もカラオケ一緒に行く？　私、実は会長の歌にも興味ある」
line = "「あっ、そうだ。会長もカラオケ一緒に行く？　私、実は会長の歌にも興味ある」"

[[dialogue]]
speaker = "メルエル"
# 「確かに！　私もある！　会長くん、ひょっとしてバイトで歌ったことがあったりして……！」
line = "「確かに！　私もある！　会長くん、ひょっとしてバイトで歌ったことがあったりして……！」"

[[dialogue]]
speaker = "レミカ"
# 「いやそれ、どんなバイト――って、本当にあるの？　な、なにそれ……ぷっ……ふふふ……！」
line = "「いやそれ、どんなバイト――って、本当にあるの？　な、なにそれ……ぷっ……ふふふ……！」"

[[dialogue]]
speaker = "unk"
# そうして後日、俺は２人と一緒にカラオケをして、前より少しレミカと仲良くなることができたのだった――
line = "そうして後日、俺は２人と一緒にカラオケをして、前より少しレミカと仲良くなることができたのだった――"
