[[dialogue]]
speaker = "unk"
# 第４話,ルルカと恋人ＡＳＭＲ・後編,P
line = "第４話,ルルカと恋人ＡＳＭＲ・後編,P"

[[dialogue]]
speaker = "unk"
# ルルカに耳かきをしてあげることになり、リビングから俺の部屋へと場所を移した。
line = "ルルカに耳かきをしてあげることになり、リビングから俺の部屋へと場所を移した。"

[[dialogue]]
speaker = "unk"
# ベッドに座った俺は、ルルカを膝の上に寝かせて、竹製の耳かきをそっと手に取る。
line = "ベッドに座った俺は、ルルカを膝の上に寝かせて、竹製の耳かきをそっと手に取る。"

[[dialogue]]
speaker = "ルルカ"
# 「あたしが耳かきするのはたまにしてるけど、お兄ちゃんにやってもらうのは初めてだよね」
line = "「あたしが耳かきするのはたまにしてるけど、お兄ちゃんにやってもらうのは初めてだよね」"

[[dialogue]]
speaker = "ルルカ"
# 「――昔、バイトで獣人系魔族の耳かきをしたことがあるから、慣れてる？」
line = "「――昔、バイトで獣人系魔族の耳かきをしたことがあるから、慣れてる？」"

[[dialogue]]
speaker = "ルルカ"
# 「い、一体どんなバイトをしてたらそんな経験をするのか、相変わらずお兄ちゃんのバイト遍歴が気になるんだけど……」
line = "「い、一体どんなバイトをしてたらそんな経験をするのか、相変わらずお兄ちゃんのバイト遍歴が気になるんだけど……」"

[[dialogue]]
speaker = "unk"
# だから安心して、身を任せて
line = "だから安心して、身を任せて"

[[dialogue]]
speaker = "ルルカ"
# 「ひゃあぁっ<emoji=heart04>　お、お兄ちゃん、そんな急に近くで囁かれたら……ビックリして、ドキドキしちゃうよぉ……<emoji=heart04>」
line = "「ひゃあぁっ<emoji=heart04>　お、お兄ちゃん、そんな急に近くで囁かれたら……ビックリして、ドキドキしちゃうよぉ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺は微笑みながら、そっと彼女のケモ耳に息を吹きかける。そのたびにルルカの体が小さく震え、頬がほんのり赤く染まっていく。
line = "俺は微笑みながら、そっと彼女のケモ耳に息を吹きかける。そのたびにルルカの体が小さく震え、頬がほんのり赤く染まっていく。"

[[dialogue]]
speaker = "ルルカ"
# 「お、お兄ちゃん、くすぐったくて耳がピコピコしちゃうよぉ……<emoji=heart04>」
line = "「お、お兄ちゃん、くすぐったくて耳がピコピコしちゃうよぉ……<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
# 「んっ<emoji=heart04>　お兄ちゃんの手が、耳に触れて……<emoji=heart04>」
line = "「んっ<emoji=heart04>　お兄ちゃんの手が、耳に触れて……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# それじゃあ、入れるよ？
line = "それじゃあ、入れるよ？"

[[dialogue]]
speaker = "ルルカ"
# 「あっ<emoji=heart04>　お兄ちゃん……ふあぁっ<emoji=heart04>」
line = "「あっ<emoji=heart04>　お兄ちゃん……ふあぁっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺は耳かきをそっと差し込み、細い動きで優しく内側を撫でていく。ルルカの呼吸が、少しずつ甘く乱れていった。
line = "俺は耳かきをそっと差し込み、細い動きで優しく内側を撫でていく。ルルカの呼吸が、少しずつ甘く乱れていった。"

[[dialogue]]
speaker = "ルルカ"
# 「はぁぁ……んっ……<emoji=heart04>　お兄ちゃんに耳の奥まで撫でられる感じがして……気持ちいい……<emoji=heart04>」
line = "「はぁぁ……んっ……<emoji=heart04>　お兄ちゃんに耳の奥まで撫でられる感じがして……気持ちいい……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ――痛くはないか？
line = "――痛くはないか？"

[[dialogue]]
speaker = "ルルカ"
# 「ううん……ぜんぜん……<emoji=heart04>　すごく上手だよ……お兄ちゃんの手、優しくて安心するの……<emoji=heart04>」
line = "「ううん……ぜんぜん……<emoji=heart04>　すごく上手だよ……お兄ちゃんの手、優しくて安心するの……<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
# 「んんっ……<emoji=heart04>　耳の奥、こそばゆいけど……気持ちよくて……とろけちゃいそう……<emoji=heart04>」
line = "「んんっ……<emoji=heart04>　耳の奥、こそばゆいけど……気持ちよくて……とろけちゃいそう……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ――ルルカは最近、星騎士の訓練も、Ｖチューバーの活動も、すごく頑張ってるよな。
line = "――ルルカは最近、星騎士の訓練も、Ｖチューバーの活動も、すごく頑張ってるよな。"

[[dialogue]]
speaker = "ルルカ"
# 「ひゃうっ……！　そ、そんな風に褒められたら……<emoji=heart04>　もっと頑張りたくなっちゃう……<emoji=heart04>」
line = "「ひゃうっ……！　そ、そんな風に褒められたら……<emoji=heart04>　もっと頑張りたくなっちゃう……<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
# 「あたし、最近色んなフォームに変身できるようになってきたから……お兄ちゃんや、友達や、リスナーのみんな……みんなのこと、守れるようになりたいと思って……<emoji=heart04>」
line = "「あたし、最近色んなフォームに変身できるようになってきたから……お兄ちゃんや、友達や、リスナーのみんな……みんなのこと、守れるようになりたいと思って……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ――偉いな。自分だけじゃなく誰かの為に頑張れるルルカは、本当にすごい。
line = "――偉いな。自分だけじゃなく誰かの為に頑張れるルルカは、本当にすごい。"

[[dialogue]]
speaker = "ルルカ"
# 「はあぁ……<emoji=heart04>　お兄ちゃんに褒められると……耳だけじゃなく、心まで気持ちよくなっちゃう……<emoji=heart04>」
line = "「はあぁ……<emoji=heart04>　お兄ちゃんに褒められると……耳だけじゃなく、心まで気持ちよくなっちゃう……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ――いいよ。恥ずかしがらなくて。気持ちいいって、素直に感じて。
line = "――いいよ。恥ずかしがらなくて。気持ちいいって、素直に感じて。"

[[dialogue]]
speaker = "ルルカ"
# 「ふああぁっ……<emoji=heart04>　お兄ちゃんの優しい声……好きぃ……<emoji=heart04>」
line = "「ふああぁっ……<emoji=heart04>　お兄ちゃんの優しい声……好きぃ……<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
# 「はああぁ……<emoji=heart04>　ふにゃぁ……<emoji=heart04>」
line = "「はああぁ……<emoji=heart04>　ふにゃぁ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 耳かきが終わる頃には、ルルカは完全に力が抜け、とろけるような表情を浮かべていた。
line = "耳かきが終わる頃には、ルルカは完全に力が抜け、とろけるような表情を浮かべていた。"

[[dialogue]]
speaker = "unk"
# 耳かき、気持ちよかった？
line = "耳かき、気持ちよかった？"

[[dialogue]]
speaker = "ルルカ"
# 「う、うん……<emoji=heart04>　でも、耳だけじゃなくて……<emoji=heart04>」
line = "「う、うん……<emoji=heart04>　でも、耳だけじゃなくて……<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
# 「お兄ちゃんと、もっと……イチャイチャしたい気分になってきちゃった……<emoji=heart04>」
line = "「お兄ちゃんと、もっと……イチャイチャしたい気分になってきちゃった……<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
# 「ねぇ……しても、いい？」
line = "「ねぇ……しても、いい？」"

[[dialogue]]
speaker = "unk"
# 俺は頷いて、再び耳元で囁くように言う。
line = "俺は頷いて、再び耳元で囁くように言う。"

[[dialogue]]
speaker = "unk"
# ――いいよ。おいで。
line = "――いいよ。おいで。"

[[dialogue]]
speaker = "ルルカ"
# 「ふあっ<emoji=heart04>　――うん<emoji=heart04>　お兄ちゃん……<emoji=heart04>」
line = "「ふあっ<emoji=heart04>　――うん<emoji=heart04>　お兄ちゃん……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ルルカは体を起こすと、胸に飛び込むように抱きついてくる。
line = "ルルカは体を起こすと、胸に飛び込むように抱きついてくる。"

[[dialogue]]
speaker = "ルルカ"
# 「はああぁっ……<emoji=heart04>　お兄ちゃんの匂い……落ち着くのに、ドキドキする……<emoji=heart04>」
line = "「はああぁっ……<emoji=heart04>　お兄ちゃんの匂い……落ち着くのに、ドキドキする……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺の胸元に顔を埋め、嬉しそうにスリスリと頬を寄せる。
line = "俺の胸元に顔を埋め、嬉しそうにスリスリと頬を寄せる。"

[[dialogue]]
speaker = "ルルカ"
# 「ねぇ、お兄ちゃん……<emoji=heart04>　あたし、キスしたい……<emoji=heart04>」
line = "「ねぇ、お兄ちゃん……<emoji=heart04>　あたし、キスしたい……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺は頷き、ルルカの頬に手を添えて、唇を重ねた。
line = "俺は頷き、ルルカの頬に手を添えて、唇を重ねた。"

[[dialogue]]
speaker = "ルルカ"
# 「んっ……<emoji=heart04>　ちゅっ……<emoji=heart04>」
line = "「んっ……<emoji=heart04>　ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 柔らかい唇が触れ合うたび、彼女の体がわずかに震える。その耳元で、俺はそっと口にする。
line = "柔らかい唇が触れ合うたび、彼女の体がわずかに震える。その耳元で、俺はそっと口にする。"

[[dialogue]]
speaker = "unk"
# ――ルルカ、好きだよ。愛してる。
line = "――ルルカ、好きだよ。愛してる。"

[[dialogue]]
speaker = "ルルカ"
# 「ひゃうっ……<emoji=heart04>　お兄ちゃん、耳元でそんなこと言われたら……<emoji=heart04>　もう、だめ……好きが止まらなくなっちゃうよぉ……<emoji=heart04>」
line = "「ひゃうっ……<emoji=heart04>　お兄ちゃん、耳元でそんなこと言われたら……<emoji=heart04>　もう、だめ……好きが止まらなくなっちゃうよぉ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺はルルカの耳たぶの内側にキスを落としながら、何度も何度も『好き』と囁く。
line = "俺はルルカの耳たぶの内側にキスを落としながら、何度も何度も『好き』と囁く。"

[[dialogue]]
speaker = "ルルカ"
# 「んんっ……<emoji=heart04>　そんなに好きって言われたら……あたしも……気持ちがいっぱい溢れてきちゃう……<emoji=heart04>」
line = "「んんっ……<emoji=heart04>　そんなに好きって言われたら……あたしも……気持ちがいっぱい溢れてきちゃう……<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
# 「あたしも、お兄ちゃんが大好き……世界でいちばん好き……<emoji=heart04>」
line = "「あたしも、お兄ちゃんが大好き……世界でいちばん好き……<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
# 「ん～っ……<emoji=heart04>　ちゅっ……ちゅっ……<emoji=heart04>」
line = "「ん～っ……<emoji=heart04>　ちゅっ……ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ――俺も、ルルカの声が大好きだ。聞いてるだけで、心が溶けそうになる。
line = "――俺も、ルルカの声が大好きだ。聞いてるだけで、心が溶けそうになる。"

[[dialogue]]
speaker = "ルルカ"
# 「えへへ……<emoji=heart04>　嬉しい……でもね、あたしは声だけじゃなくて――」
line = "「えへへ……<emoji=heart04>　嬉しい……でもね、あたしは声だけじゃなくて――」"

[[dialogue]]
speaker = "ルルカ"
# 「お兄ちゃんの優しいところも、男らしいところも、全部、ぜんぶ好き……<emoji=heart04>」
line = "「お兄ちゃんの優しいところも、男らしいところも、全部、ぜんぶ好き……<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
# 「ちょっとエッチなところも……あたしだけの特別だから……もっと好き……<emoji=heart04>」
line = "「ちょっとエッチなところも……あたしだけの特別だから……もっと好き……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺は愛しさをこらえきれず、ルルカを強く抱きしめる。
line = "俺は愛しさをこらえきれず、ルルカを強く抱きしめる。"

[[dialogue]]
speaker = "ルルカ"
# 「あっ……<emoji=heart04>　お兄ちゃん……ぎゅ～ってされるの、好き……<emoji=heart04>」
line = "「あっ……<emoji=heart04>　お兄ちゃん……ぎゅ～ってされるの、好き……<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
# 「キスも、もっとしたい……<emoji=heart04>」
line = "「キスも、もっとしたい……<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
# 「んむっ……<emoji=heart04>　ちゅっ……んちゅっ……<emoji=heart04>」
line = "「んむっ……<emoji=heart04>　ちゅっ……んちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 唇が触れるたび、世界が甘くとろけていく。
line = "唇が触れるたび、世界が甘くとろけていく。"

[[dialogue]]
speaker = "unk"
# ２人だけの静かな部屋で、俺たちは言葉よりも多くの『好き』を確かめ合うように、何度も何度もキスを重ねるのだった。
line = "２人だけの静かな部屋で、俺たちは言葉よりも多くの『好き』を確かめ合うように、何度も何度もキスを重ねるのだった。"
