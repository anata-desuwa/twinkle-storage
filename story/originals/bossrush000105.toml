[[dialogue]]
speaker = "コハルコ"
# 「──とまぁ、コラプサー事件の振り返りはこんなものかな。レポートはまとまりそう？」
line = "「──とまぁ、コラプサー事件の振り返りはこんなものかな。レポートはまとまりそう？」"

[[dialogue]]
speaker = "レイラ"
# 「あ、こちらにいたんですね、魔王さん。コハルコさんも」
line = "「あ、こちらにいたんですね、魔王さん。コハルコさんも」"

[[dialogue]]
speaker = "コハルコ"
# 「あれ、どうしたの、レイラ？　何か会長さんに用事？」
line = "「あれ、どうしたの、レイラ？　何か会長さんに用事？」"

[[dialogue]]
speaker = "レイラ"
# 「はい。私たちコラプサーはあの事件の後、守護星であるブラックホールとのリンクが弱くなり、戦闘力も低下しました」
line = "「はい。私たちコラプサーはあの事件の後、守護星であるブラックホールとのリンクが弱くなり、戦闘力も低下しました」"

[[dialogue]]
speaker = "レイラ"
# 「なのでリクリエと戦うために、改めて訓練する必要があるんですが、その相手を魔王さんにお願いしようと思いまして」
line = "「なのでリクリエと戦うために、改めて訓練する必要があるんですが、その相手を魔王さんにお願いしようと思いまして」"

[[dialogue]]
speaker = "コハルコ"
# 「なるほど。それじゃ私も──」
line = "「なるほど。それじゃ私も──」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「自分が魔女だってわかって、魔法も使えるようになったけど、まだまだ不慣れだから、私も会長さんに見てもらおうかな」
line = "「自分が魔女だってわかって、魔法も使えるようになったけど、まだまだ不慣れだから、私も会長さんに見てもらおうかな」"

[[dialogue]]
speaker = "レイラ"
# 「それはいいですけど、どうしてアリーナに移動したんです？」
line = "「それはいいですけど、どうしてアリーナに移動したんです？」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「だって本物のレイラだったら、トレーニングルームなんて消滅させちゃうでしょ。前より弱くなったっていっても、それでもブラックホールだし」
line = "「だって本物のレイラだったら、トレーニングルームなんて消滅させちゃうでしょ。前より弱くなったっていっても、それでもブラックホールだし」"

[[dialogue]]
speaker = "レイラ"
# 「あ～……確かに……気を抜くととんでもないことになりますね」
line = "「あ～……確かに……気を抜くととんでもないことになりますね」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「というわけで、アリーナでのびのびやらせてもらうよ。ハッカーコンビの力、見せてあげる」
line = "「というわけで、アリーナでのびのびやらせてもらうよ。ハッカーコンビの力、見せてあげる」"

[[dialogue]]
speaker = "レイラ"
# 「戦闘ではハッカー関係なくないですか？」
line = "「戦闘ではハッカー関係なくないですか？」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「ノリなんだから、そういうことは言わなくていいの」
line = "「ノリなんだから、そういうことは言わなくていいの」"

[[dialogue]]
speaker = "レイラ"
# 「はーい。それじゃ胸を借りるつもりで行きますね、魔王さん！」
line = "「はーい。それじゃ胸を借りるつもりで行きますね、魔王さん！」"
