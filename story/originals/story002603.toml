[[dialogue]]
speaker = "unk"
# 俺たちはパブリックビーチの方へ移動し、海で遊ぶことになり――
line = "俺たちはパブリックビーチの方へ移動し、海で遊ぶことになり――"

[[dialogue]]
speaker = "リノ"
# 「ねぇねぇ、ク・ロ・ト♪」
line = "「ねぇねぇ、ク・ロ・ト♪」"

[[dialogue]]
speaker = "リノ"
# 「さっきは色々説明してたから聞けなかったけど～。お母さんの水着、どうかしら？　似合ってる？」
line = "「さっきは色々説明してたから聞けなかったけど～。お母さんの水着、どうかしら？　似合ってる？」"

[[dialogue]]
speaker = "unk"
# ちょっと大胆な気もするけど……
line = "ちょっと大胆な気もするけど……"

[[dialogue]]
speaker = "unk"
# よく似合ってて、綺麗だよ
line = "よく似合ってて、綺麗だよ"

[[dialogue]]
speaker = "リノ"
# 「ふふふっ♪　ありがと～♪　でも、そんなに大胆かしら？」
line = "「ふふふっ♪　ありがと～♪　でも、そんなに大胆かしら？」"

[[dialogue]]
speaker = "リコリンフィア"
# 「ああ。リノは良くも悪くもセンスが大胆だからな」
line = "「ああ。リノは良くも悪くもセンスが大胆だからな」"

[[dialogue]]
speaker = "リコリンフィア"
# 「まぁ、美人だしスタイルが良いから、結局何を着ても似合ってしまうわけだが……」
line = "「まぁ、美人だしスタイルが良いから、結局何を着ても似合ってしまうわけだが……」"

[[dialogue]]
speaker = "unk"
# リコさんも水着、すごく似合ってます
line = "リコさんも水着、すごく似合ってます"

[[dialogue]]
speaker = "リコリンフィア"
# 「ん？　ふふっ、やはり水着に見えるか」
line = "「ん？　ふふっ、やはり水着に見えるか」"

[[dialogue]]
speaker = "リコリンフィア"
# 「実は、これは私のデフォルトの戦闘服でな。昔から水着っぽいと言われていたから、それを今回、便利に使っているというわけだ」
line = "「実は、これは私のデフォルトの戦闘服でな。昔から水着っぽいと言われていたから、それを今回、便利に使っているというわけだ」"

[[dialogue]]
speaker = "リノ"
# 「ちなみにお母さんのも、ただの水着じゃなくて『水着フォーム』なのよ♪」
line = "「ちなみにお母さんのも、ただの水着じゃなくて『水着フォーム』なのよ♪」"

[[dialogue]]
speaker = "リノ"
# 「ほら、こんな感じでね♪　ネビュラの方で、前に魔女の水着フォーム実装に成功していたでしょう？」
line = "「ほら、こんな感じでね♪　ネビュラの方で、前に魔女の水着フォーム実装に成功していたでしょう？」"

[[dialogue]]
speaker = "リノ"
# 「その技術を参考に、私独自にアレンジして作ってみたの♪」
line = "「その技術を参考に、私独自にアレンジして作ってみたの♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひ♪　さらっと言ってますけど、多分その参考にしたっていうのは、技術を提供してもらったわけじゃなくて、目で見て分析したって感じですよね？」
line = "「にひひ♪　さらっと言ってますけど、多分その参考にしたっていうのは、技術を提供してもらったわけじゃなくて、目で見て分析したって感じですよね？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「だとしたら、リノさんも大概、ハンパない魔女ですよね～」
line = "「だとしたら、リノさんも大概、ハンパない魔女ですよね～」"

[[dialogue]]
speaker = "リノ"
# 「ふふっ、星術や魔法の研究は、私の専門分野だからね～」
line = "「ふふっ、星術や魔法の研究は、私の専門分野だからね～」"

[[dialogue]]
speaker = "リノ"
# 「ただ、お母さん的には、今はマインちゃんに興味津々かな♪」
line = "「ただ、お母さん的には、今はマインちゃんに興味津々かな♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ありゃ？　私ですか？」
line = "「ありゃ？　私ですか？」"

[[dialogue]]
speaker = "リノ"
# 「だってマインちゃん、思っていたよりずっと、クロトと仲良さそうなんだもの♪」
line = "「だってマインちゃん、思っていたよりずっと、クロトと仲良さそうなんだもの♪」"

[[dialogue]]
speaker = "unk"
# ちょっと、母さん！？
line = "ちょっと、母さん！？"

[[dialogue]]
speaker = "ネーゼマイン"
# 「はてさて、会長は私のこと、どんな風に思っているんですかね～？　にひひ♪」
line = "「はてさて、会長は私のこと、どんな風に思っているんですかね～？　にひひ♪」"

[[dialogue]]
speaker = "unk"
# ニヤニヤと悪戯な笑顔を浮かべながら、俺の脇腹をひと差し指でつついて来るマイン。
line = "ニヤニヤと悪戯な笑顔を浮かべながら、俺の脇腹をひと差し指でつついて来るマイン。"

[[dialogue]]
speaker = "unk"
# お手柔らかにお願いします……
line = "お手柔らかにお願いします……"

[[dialogue]]
speaker = "ネーゼマイン"
# 「え～？　それって私に悪戯して欲しいっていうフリだったりする？」
line = "「え～？　それって私に悪戯して欲しいっていうフリだったりする？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「どうしよっかな～？　にひひひっ<emoji=heart04>」
line = "「どうしよっかな～？　にひひひっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# その後、俺たちはリコさんの提案で、海に入りながらビーチボールで遊ぶことになった。
line = "その後、俺たちはリコさんの提案で、海に入りながらビーチボールで遊ぶことになった。"

[[dialogue]]
speaker = "リコリンフィア"
# 「そら、ゆくぞ少年。星徒会長の実力とやら、お姉さんに見せてみるがいい。――せいっ！」
line = "「そら、ゆくぞ少年。星徒会長の実力とやら、お姉さんに見せてみるがいい。――せいっ！」"

[[dialogue]]
speaker = "unk"
# うおぉっ！？　遊びなのに星力込み！？
line = "うおぉっ！？　遊びなのに星力込み！？"

[[dialogue]]
speaker = "unk"
# 星力の込められたサーブは、空気で膨らませたビニールボールとは思えない程に、重い手応えがあった。
line = "星力の込められたサーブは、空気で膨らませたビニールボールとは思えない程に、重い手応えがあった。"

[[dialogue]]
speaker = "リコリンフィア"
# 「ほう、しっかりと返してみせたか。いいレシーブだ」
line = "「ほう、しっかりと返してみせたか。いいレシーブだ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「きゃはははっ☆　一応これ、<b>仕事</b>のはずなんですけど、リコさんってば、星騎士なのは隠す気ないんですね♪」
line = "「きゃはははっ☆　一応これ、<b>仕事</b>のはずなんですけど、リコさんってば、星騎士なのは隠す気ないんですね♪」"

[[dialogue]]
speaker = "リコリンフィア"
# 「星騎士が変に星力を隠している方が不自然に見えるというものだ」
line = "「星騎士が変に星力を隠している方が不自然に見えるというものだ」"

[[dialogue]]
speaker = "リコリンフィア"
# 「それに、海を『エンジョイする』と言っただろう？　ならば、本当に楽しんでいるように見せなければ意味がない。――そらっ！」
line = "「それに、海を『エンジョイする』と言っただろう？　ならば、本当に楽しんでいるように見せなければ意味がない。――そらっ！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「いや～、本物の附属生になり切ってるヒトが言うと、説得力ありますわ～。リノさん、トスで～す♪」
line = "「いや～、本物の附属生になり切ってるヒトが言うと、説得力ありますわ～。リノさん、トスで～す♪」"

[[dialogue]]
speaker = "リノ"
# 「は～い♪　リコは真面目に見せかけて、結構無茶苦茶なことを平然とやるからね～。――スパイク、え～いっ！」
line = "「は～い♪　リコは真面目に見せかけて、結構無茶苦茶なことを平然とやるからね～。――スパイク、え～いっ！」"

[[dialogue]]
speaker = "リコリンフィア"
# 「ふっ、何を言っている、私はいつも真面目だとも。大事なことは――」
line = "「ふっ、何を言っている、私はいつも真面目だとも。大事なことは――」"

[[dialogue]]
speaker = "リコリンフィア"
# 「大人として責任を持ち、結果でしっかりと<ruby=つじつま>辻褄</ruby>を合わせることだ。――はぁっ！」
line = "「大人として責任を持ち、結果でしっかりと<ruby>辻褄<rt>つじつま</rt></ruby>を合わせることだ。――はぁっ！」"

[[dialogue]]
speaker = "unk"
# 母さんのスパイクを、ダイレクトにスパイクで返すリコさん。
line = "母さんのスパイクを、ダイレクトにスパイクで返すリコさん。"

[[dialogue]]
speaker = "unk"
# その一撃は鋭い角度で、コート隅へと飛んで行くが――
line = "その一撃は鋭い角度で、コート隅へと飛んで行くが――"

[[dialogue]]
speaker = "unk"
# バッチコイ！　おりゃあ！！
line = "バッチコイ！　おりゃあ！！"

[[dialogue]]
speaker = "unk"
# 俺は全力ダイブして、両腕に星力を込めレシーブを上げてみせる。
line = "俺は全力ダイブして、両腕に星力を込めレシーブを上げてみせる。"

[[dialogue]]
speaker = "リコリンフィア"
# 「ふっ、そうこなくてはな、少年」
line = "「ふっ、そうこなくてはな、少年」"

[[dialogue]]
speaker = "unk"
# リコさんは楽しそうな笑みを浮かべるのだった。
line = "リコさんは楽しそうな笑みを浮かべるのだった。"

[[dialogue]]
speaker = "unk"
# 海でのビーチバレーが終わった後、俺たちは一時休憩を取ることになった。
line = "海でのビーチバレーが終わった後、俺たちは一時休憩を取ることになった。"

[[dialogue]]
speaker = "unk"
# 浜辺に置いてある飲み物を取りに行き、水分補給してから戻る途中――リコさんが、ちょっと怪しい雰囲気の男性に話しかけられている様子が目に入る。
line = "浜辺に置いてある飲み物を取りに行き、水分補給してから戻る途中――リコさんが、ちょっと怪しい雰囲気の男性に話しかけられている様子が目に入る。"

[[dialogue]]
speaker = "怪しい男性"
# 「お嬢ちゃん、水着が似合ってて、すごく可愛いね～」
line = "「お嬢ちゃん、水着が似合ってて、すごく可愛いね～」"

[[dialogue]]
speaker = "リコリンフィア"
# 「え～？　おじさん、リコリンのこと、褒めてくれるの？　えへへっ、ありがと～♪」
line = "「え～？　おじさん、リコリンのこと、褒めてくれるの？　えへへっ、ありがと～♪」"

[[dialogue]]
speaker = "怪しい男性"
# 「可愛いから、よければおじさんが何か奢ってあげよう。一緒に食べに行かないかい？」
line = "「可愛いから、よければおじさんが何か奢ってあげよう。一緒に食べに行かないかい？」"

[[dialogue]]
speaker = "リコリンフィア"
# 「本当？　でも、ごめんなさ～い！　リコリン、実は家族で遊びに来てて～」
line = "「本当？　でも、ごめんなさ～い！　リコリン、実は家族で遊びに来てて～」"

[[dialogue]]
speaker = "リコリンフィア"
# 「……あっ！　ちょうどお兄ちゃんが戻って来た♪　お兄ちゃ～ん！　こっちこっち～！」
line = "「……あっ！　ちょうどお兄ちゃんが戻って来た♪　お兄ちゃ～ん！　こっちこっち～！」"

[[dialogue]]
speaker = "怪しい男性"
# 「えっ！？　お兄さん……！？」
line = "「えっ！？　お兄さん……！？」"

[[dialogue]]
speaker = "unk"
# 俺の妹に何か御用でしょうか？
line = "俺の妹に何か御用でしょうか？"

[[dialogue]]
speaker = "怪しい男性"
# 「い、いえ、別に！　あははは！　失礼しました～～～！！！」
line = "「い、いえ、別に！　あははは！　失礼しました～～～！！！」"

[[dialogue]]
speaker = "unk"
# 慌てて走り去って行く男性。
line = "慌てて走り去って行く男性。"

[[dialogue]]
speaker = "リコリンフィア"
# 「――やれやれ。あの男はさすがに今回の捜査とは無関係な気はするが……」
line = "「――やれやれ。あの男はさすがに今回の捜査とは無関係な気はするが……」"

[[dialogue]]
speaker = "リコリンフィア"
# 「とはいえ、リゾート結界の治安的には全くもってよくないな。後で警戒リストに記載しておくとしよう」
line = "「とはいえ、リゾート結界の治安的には全くもってよくないな。後で警戒リストに記載しておくとしよう」"

[[dialogue]]
speaker = "リコリンフィア"
# 「だが、いいタイミングで戻って来てくれたな、少年。おかげで楽に露払いすることができたよ。感謝する」
line = "「だが、いいタイミングで戻って来てくれたな、少年。おかげで楽に露払いすることができたよ。感謝する」"

[[dialogue]]
speaker = "unk"
# 妹がまた１人増える流れに……
line = "妹がまた１人増える流れに……"

[[dialogue]]
speaker = "リコリンフィア"
# 「え～？　お兄ちゃんはリコリンが妹になるの、嫌なの～？　うるうる」
line = "「え～？　お兄ちゃんはリコリンが妹になるの、嫌なの～？　うるうる」"

[[dialogue]]
speaker = "unk"
# 再び附属生になり切って、目をあざとく潤ませてみせるリコさん――いや、リコリン。
line = "再び附属生になり切って、目をあざとく潤ませてみせるリコさん――いや、リコリン。"

[[dialogue]]
speaker = "unk"
# う……そんな目で見つめられると、困るんですが……
line = "う……そんな目で見つめられると、困るんですが……"

[[dialogue]]
speaker = "リコリンフィア"
# 「――ふっ、別にいいじゃないか。少年にはそういう妹的な後輩が既に多くいるのだろう？　情報収集しているから、よく知っているよ」
line = "「――ふっ、別にいいじゃないか。少年にはそういう妹的な後輩が既に多くいるのだろう？　情報収集しているから、よく知っているよ」"

[[dialogue]]
speaker = "リコリンフィア"
# 「今更１人増えたところで、どうという事はあるまい？　……いや、年上のお姉さんが妹になるというのは初体験かな？　ふふっ……♪」
line = "「今更１人増えたところで、どうという事はあるまい？　……いや、年上のお姉さんが妹になるというのは初体験かな？　ふふっ……♪」"

[[dialogue]]
speaker = "unk"
# 楽しんでやってません？
line = "楽しんでやってません？"

[[dialogue]]
speaker = "リコリンフィア"
# 「何を言っている。リコリンはあくまで仕事に便利だから使っている<ruby=キャラ>演技</ruby>だ」
line = "「何を言っている。リコリンはあくまで仕事に便利だから使っている<ruby>演技<rt>キャラ</rt></ruby>だ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひ♪　リコさんはそこだけは頑なに譲らないからね～」
line = "「にひひ♪　リコさんはそこだけは頑なに譲らないからね～」"

[[dialogue]]
speaker = "リノ"
# 「絶対に気に入って、やってるわよね～？」
line = "「絶対に気に入って、やってるわよね～？」"

[[dialogue]]
speaker = "unk"
# そこにマインと母さんが戻って来る。
line = "そこにマインと母さんが戻って来る。"

[[dialogue]]
speaker = "リコリンフィア"
# 「譲らないのではなく、事実だからだ」
line = "「譲らないのではなく、事実だからだ」"

[[dialogue]]
speaker = "リノ"
# 「でも、私たちで家族になり切るっていうのは面白そうね♪　マインちゃん、私のことをお母さんって呼んでくれてもいいのよ～？」
line = "「でも、私たちで家族になり切るっていうのは面白そうね♪　マインちゃん、私のことをお母さんって呼んでくれてもいいのよ～？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「おっ、それ面白そうですね～♪　だったら私も、会長より年下なわけだし、妹になり切っちゃおうかな～？」
line = "「おっ、それ面白そうですね～♪　だったら私も、会長より年下なわけだし、妹になり切っちゃおうかな～？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ねぇねぇ、どう思う？　――<ruby=あに>兄</ruby>くん♪」
line = "「ねぇねぇ、どう思う？　――<ruby>兄<rt>あに</rt></ruby>くん♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「なんてね☆　にひひ♪」
line = "「なんてね☆　にひひ♪」"

[[dialogue]]
speaker = "unk"
# 悪戯な笑みを浮かべて言うマインに、ちょっと悪くないかもと一瞬思ってしまう俺なのであった――
line = "悪戯な笑みを浮かべて言うマインに、ちょっと悪くないかもと一瞬思ってしまう俺なのであった――"
