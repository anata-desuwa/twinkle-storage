speaker = "キサナ"
# 「ま、めげずに挑んできたことだけは褒めてやんよ。ご褒美に二度と戦えなくなる程度で済ましてやる」
line = "「ま、めげずに挑んできたことだけは褒めてやんよ。ご褒美に二度と戦えなくなる程度で済ましてやる」"

