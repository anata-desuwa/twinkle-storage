# 「弱ったテメエら２人くらい今のアタシでもぶちのめせるぜ！　逃げるだけならもっと簡単だ！」
line = "「弱ったテメエら２人くらい今のアタシでもぶちのめせるぜ！　逃げるだけならもっと簡単だ！」"

