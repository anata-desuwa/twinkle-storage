line = "「私も少ない力をやりくりして使ってるからわかるの……。私の場合、逆に体に熱を溜めに溜めて力を高める使い方をしているけれどね……」"

[[dialogue]]
speaker = "キサナ"
# 「まさかテメエ……さっきの迷推理はブラフか？　アタシに近づくためだけに？　そのチンケな熱でアタシの力を消耗させる気で……」
line = "「まさかテメエ……さっきの迷推理はブラフか？　アタシに近づくためだけに？　そのチンケな熱でアタシの力を消耗させる気で……」"

[[dialogue]]
speaker = "キサナ"
# 「アタシがその気だったら死んでんぞ？　わかってんのか？」
line = "「アタシがその気だったら死んでんぞ？　わかってんのか？」"

[[dialogue]]
speaker = "ミア"
# 「肉を切らせて骨を断つ、虎穴に入らずんば虎児を得ず、よ……。覚えて、おきなさいっ……！」
line = "「肉を切らせて骨を断つ、虎穴に入らずんば虎児を得ず、よ……。覚えて、おきなさいっ……！」"

[[dialogue]]
speaker = "キサナ"
