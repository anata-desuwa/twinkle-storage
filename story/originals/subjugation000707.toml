line = "「大丈夫ですか、ミアさん……！　やはり囮役は私か会長さんがするべきだったのでは……」"

[[dialogue]]
speaker = "ミア"
# 「ダメ、ですよ……。これはあの子が私を子どもだって舐めてるからこその作戦なんですから……」
line = "「ダメ、ですよ……。これはあの子が私を子どもだって舐めてるからこその作戦なんですから……」"

[[dialogue]]
speaker = "ミア"
# 「それに私より強い２人を消耗させちゃったら本末転倒です……。こういうのは、一番戦力にならない人間がやるべきですから……！」
line = "「それに私より強い２人を消耗させちゃったら本末転倒です……。こういうのは、一番戦力にならない人間がやるべきですから……！」"

[[dialogue]]
speaker = "エリス"
# 「ミアさん……」
line = "「ミアさん……」"

[[dialogue]]
speaker = "ミア"
# 「私なら大丈夫です、まだ動けます……！　それより今は、３人であの子を……！」
line = "「私なら大丈夫です、まだ動けます……！　それより今は、３人であの子を……！」"

[[dialogue]]
speaker = "キサナ"
# 「ハハァ、まさか正義の味方サマが不意打ちとはよ……！　もっとお行儀のいいヤツらかと思ってたぜ……！」
line = "「ハハァ、まさか正義の味方サマが不意打ちとはよ……！　もっとお行儀のいいヤツらかと思ってたぜ……！」"

[[dialogue]]
speaker = "キサナ"
