[[dialogue]]
speaker = "キサナ"
# 「あー、つまんねー……。どこを探しても星騎士どももいやがらねえし……」
line = "「あー、つまんねー……。どこを探しても星騎士どももいやがらねえし……」"

[[dialogue]]
speaker = "キサナ"
# 「ビビって隠れちまったか？　やっぱ直接学園に乗り込んでいきゃあ良かったか？」
line = "「ビビって隠れちまったか？　やっぱ直接学園に乗り込んでいきゃあ良かったか？」"

[[dialogue]]
speaker = "キサナ"
# 「けどカチコミはやめとけっつわれてるしな……ったく、面倒な注文付けやがって……」
line = "「けどカチコミはやめとけっつわれてるしな……ったく、面倒な注文付けやがって……」"

[[dialogue]]
speaker = "キサナ"
# 「あー、かったりぃ。この辺、酒場とかないのかねぇ。賭けカードができる店とかあると退屈しねえんだが……」
line = "「あー、かったりぃ。この辺、酒場とかないのかねぇ。賭けカードができる店とかあると退屈しねえんだが……」"

[[dialogue]]
speaker = "キサナ"
# 「つーかアタシはどこで寝りゃあいいんだよ。まぁその辺の空き家にでも転がり込むか……」
line = "「つーかアタシはどこで寝りゃあいいんだよ。まぁその辺の空き家にでも転がり込むか……」"

[[dialogue]]
speaker = "ミア"
# 「見つけたわよっ！」
line = "「見つけたわよっ！」"

[[dialogue]]
speaker = "キサナ"
# 「あぁ……？　誰かと思えば昼間のチビガキと魔王じゃねえか。わりぃがよ、今から寝るトコなんだわ」
line = "「あぁ……？　誰かと思えば昼間のチビガキと魔王じゃねえか。わりぃがよ、今から寝るトコなんだわ」"

[[dialogue]]
speaker = "ミア"
# 「なっ……！？　戦うつもりはないってこと！？　ふざけないでっ！」
line = "「なっ……！？　戦うつもりはないってこと！？　ふざけないでっ！」"

[[dialogue]]
speaker = "キサナ"
# 「ハハァ、ふざけてんのはテメエの方だろ。誰が寝るから戦わねえっつったよ？」
line = "「ハハァ、ふざけてんのはテメエの方だろ。誰が寝るから戦わねえっつったよ？」"

[[dialogue]]
speaker = "キサナ"
# 「その逆だ！」
line = "「その逆だ！」"

[[dialogue]]
speaker = "ミア"
# 「ぐっ……！？」
line = "「ぐっ……！？」"

[[dialogue]]
speaker = "キサナ"
# 「わざわざやられに来てくれるとは思ってなかったぜ！　やり残しなくスッキリ寝られそうじゃねえか！」
line = "「わざわざやられに来てくれるとは思ってなかったぜ！　やり残しなくスッキリ寝られそうじゃねえか！」"

[[dialogue]]
speaker = "ミア"
# 「眠りたいならいくらでも眠らせてあげるわ！　ただし、冷たい檻の中でね！」
line = "「眠りたいならいくらでも眠らせてあげるわ！　ただし、冷たい檻の中でね！」"

[[dialogue]]
speaker = "unk"
# お前はここで捕まえる！
line = "お前はここで捕まえる！"

[[dialogue]]
speaker = "キサナ"
# 「ハハハッ、攻撃が軽いなァ！　２人がかりでそれかよォ！　もっと人数引き連れてこりゃ良かったんじゃねえかァ、おい！」
line = "「ハハハッ、攻撃が軽いなァ！　２人がかりでそれかよォ！　もっと人数引き連れてこりゃ良かったんじゃねえかァ、おい！」"

[[dialogue]]
speaker = "ミア"
# 「きゃあっ！　あ、あんたなんか私と会長さんだけで十分よっ。星力を打ち消すその力、弱点はもう見抜いてるんだからっ」
line = "「きゃあっ！　あ、あんたなんか私と会長さんだけで十分よっ。星力を打ち消すその力、弱点はもう見抜いてるんだからっ」"

[[dialogue]]
speaker = "キサナ"
# 「へえ、面白えこと言うじゃねえの。アタシの力の弱点だ？」
line = "「へえ、面白えこと言うじゃねえの。アタシの力の弱点だ？」"

[[dialogue]]
speaker = "ミア"
# 「考えてみれば簡単なことよ。その力、正面からの攻撃しか打ち消せないんでしょ？　だからあなたは孤立した星騎士ばかりを狙って襲撃した」
line = "「考えてみれば簡単なことよ。その力、正面からの攻撃しか打ち消せないんでしょ？　だからあなたは孤立した星騎士ばかりを狙って襲撃した」"

[[dialogue]]
speaker = "ミア"
# 「私の攻撃を逃げずに受け止めた時だってそう。正面なら無力化できるからだったんでしょう？」
line = "「私の攻撃を逃げずに受け止めた時だってそう。正面なら無力化できるからだったんでしょう？」"

[[dialogue]]
speaker = "ミア"
# 「極めつけはモンスターが現れた時よ。圧倒的に有利な立場だったのにあなたは逃げだした。モンスターの相手をしてる間に背後から攻撃されることを嫌ったんだわ」
line = "「極めつけはモンスターが現れた時よ。圧倒的に有利な立場だったのにあなたは逃げだした。モンスターの相手をしてる間に背後から攻撃されることを嫌ったんだわ」"

[[dialogue]]
speaker = "キサナ"
# 「ククク、なら試してみろよ。アタシの背後が取れるってならな」
line = "「ククク、なら試してみろよ。アタシの背後が取れるってならな」"

[[dialogue]]
speaker = "unk"
# ミア……
line = "ミア……"

[[dialogue]]
speaker = "ミア"
# 「私を信じて会長さん」
line = "「私を信じて会長さん」"

[[dialogue]]
speaker = "ミア"
# 「間違ってはいない、はずよ。もしも間違っていたら、その時は私が……」
line = "「間違ってはいない、はずよ。もしも間違っていたら、その時は私が……」"

[[dialogue]]
speaker = "キサナ"
# 「くっちゃべってねえでかかって来い！　来ねえならこっちから行くぜっ！」
line = "「くっちゃべってねえでかかって来い！　来ねえならこっちから行くぜっ！」"

[[dialogue]]
speaker = "ミア"
# 「くっ……！　とにかく会長さん、作戦通りにっ……！」
line = "「くっ……！　とにかく会長さん、作戦通りにっ……！」"

[[dialogue]]
speaker = "unk"
# わかった、俺が隙を作る！
line = "わかった、俺が隙を作る！"

[[dialogue]]
speaker = "キサナ"
# 「ハッ、魔王が相手してる間にチビが後ろから攻撃ってか！」
line = "「ハッ、魔王が相手してる間にチビが後ろから攻撃ってか！」"

[[dialogue]]
speaker = "キサナ"
# 「いいぜ、来いよ！　チビガキ程度、いつでも返り討ちにしてやるぜ！」
line = "「いいぜ、来いよ！　チビガキ程度、いつでも返り討ちにしてやるぜ！」"

[[dialogue]]
speaker = "ミア"
# 「まだよ、ミア。焦っちゃダメ。会長さんなら必ず隙を作ってくれる」
line = "「まだよ、ミア。焦っちゃダメ。会長さんなら必ず隙を作ってくれる」"

[[dialogue]]
speaker = "ミア"
