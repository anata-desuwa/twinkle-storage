speaker = "クロト"
# 「はい……」
line = "「はい……」"

[[dialogue]]
speaker = "トリシャ"
# 「なら来て……<emoji=heart04>　私のおっぱいも、あなたをもっと味わいたいって、言ってるから……<emoji=heart04>」
line = "「なら来て……<emoji=heart04>　私のおっぱいも、あなたをもっと味わいたいって、言ってるから……<emoji=heart04>」"

