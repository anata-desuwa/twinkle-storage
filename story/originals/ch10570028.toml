# 「俺も、好きです……トリシャさん、トリシャさんっ……！」
line = "「俺も、好きです……トリシャさん、トリシャさんっ……！」"

[[dialogue]]
speaker = "トリシャ"
# 「うん、おち○ちんから好き好きが伝わってくるよ……どぷどぷ出しちゃお……<emoji=heart04>」
line = "「うん、おち○ちんから好き好きが伝わってくるよ……どぷどぷ出しちゃお……<emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
# 「このまま……おっぱいま○こに中出し、しよ……<emoji=heart04>　気持ちよーく、びゅーっ、びゅーっ、びゅーっ<emoji=heart04>」
line = "「このまま……おっぱいま○こに中出し、しよ……<emoji=heart04>　気持ちよーく、びゅーっ、びゅーっ、びゅーっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 甘く耳に注がれた、卑猥すぎる言葉が一気に俺を追い詰めた。
line = "甘く耳に注がれた、卑猥すぎる言葉が一気に俺を追い詰めた。"

[[dialogue]]
speaker = "トリシャ"
# 「はぁ、はっ……フフフ、かけられたら、せっかくの晴れ着が汚れちゃうから……私のおっぱいに……いっぱい、いっぱい……欲望をぶつけて……<emoji=heart04>」
line = "「はぁ、はっ……フフフ、かけられたら、せっかくの晴れ着が汚れちゃうから……私のおっぱいに……いっぱい、いっぱい……欲望をぶつけて……<emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
# 「出して、私のおっぱいま○こを……孕ませるくらい……たぁっぷり、出して、出して、出してっ……<emoji=heart04>」
line = "「出して、私のおっぱいま○こを……孕ませるくらい……たぁっぷり、出して、出して、出してっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# もう止まらない。気持ちいいこと以外、何も考えられない。ひたすらピストンを加速させ、ペニスを絶頂に追い込むだけ。
line = "もう止まらない。気持ちいいこと以外、何も考えられない。ひたすらピストンを加速させ、ペニスを絶頂に追い込むだけ。"

[[dialogue]]
speaker = "トリシャ"
# 「はぁ、はっ……あなたのイキそうな顔……かわいい……とってもかわいい……おち○ちんで突かれてるおっぱいの奥が、キュンキュンしちゃうっ……<emoji=heart04>」
line = "「はぁ、はっ……あなたのイキそうな顔……かわいい……とってもかわいい……おち○ちんで突かれてるおっぱいの奥が、キュンキュンしちゃうっ……<emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
# 「あなたのイキ顔……じーっと見ててあげるから……ヨダレ垂らして、泣き出しちゃいそうな切ない顔……<emoji=heart04>」
line = "「あなたのイキ顔……じーっと見ててあげるから……ヨダレ垂らして、泣き出しちゃいそうな切ない顔……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
# 「あ、あ、ぁっ……イクッ……！」
line = "「あ、あ、ぁっ……イクッ……！」"

[[dialogue]]
speaker = "トリシャ"
# 「いいよ、イッちゃって……イッて、イッちゃえっ……<emoji=heart04>　おっぱいま○こに、中出ししちゃえっ……<emoji=heart04>」
line = "「いいよ、イッちゃって……イッて、イッちゃえっ……<emoji=heart04>　おっぱいま○こに、中出ししちゃえっ……<emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
# 「あっ……<emoji=heart04>　どくんどくんって、精液せり上がってきて……おち○ちんが出そうとしてるの、伝わってぇ……<emoji=heart04>」
line = "「あっ……<emoji=heart04>　どくんどくんって、精液せり上がってきて……おち○ちんが出そうとしてるの、伝わってぇ……<emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
# 「キてる……精液が、すぐ、そこまで……出してっ、出してっ、おっぱいま○こに中出しちょうだぁい……<emoji=heart04>」
line = "「キてる……精液が、すぐ、そこまで……出してっ、出してっ、おっぱいま○こに中出しちょうだぁい……<emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
# 「はぁ、はっ、はぁぁっ……あっ、あっ！　びくびくって、昇ってっ──！」
line = "「はぁ、はっ、はぁぁっ……あっ、あっ！　びくびくって、昇ってっ──！」"

[[dialogue]]
speaker = "トリシャ"
# 「あ、ぅうぅんっ……<emoji=heart04>　んぁはぁあぁっ……<emoji=heart04>」
line = "「あ、ぅうぅんっ……<emoji=heart04>　んぁはぁあぁっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 白くて柔らかなマシュマロおっぱいの谷間に、俺の白濁がたっぷりと注がれる。
line = "白くて柔らかなマシュマロおっぱいの谷間に、俺の白濁がたっぷりと注がれる。"

[[dialogue]]
speaker = "トリシャ"
# 「あ……あっ……すごい……どっくんどっくんって……おっぱいの中で、暴れて……ふふふ……<emoji=heart04>」
line = "「あ……あっ……すごい……どっくんどっくんって……おっぱいの中で、暴れて……ふふふ……<emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
# 「ぁ、はっ……ふぁ……おもらしみたいにたぁっぷり……どぷっどぷっ出てる……おち○ちんとっても元気、元気……素敵ぃ……カッコいい……<emoji=heart04>」
line = "「ぁ、はっ……ふぁ……おもらしみたいにたぁっぷり……どぷっどぷっ出てる……おち○ちんとっても元気、元気……素敵ぃ……カッコいい……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺が射精している間も、トリシャさんはうっとりと蕩けた瞳で俺を見上げていた。
line = "俺が射精している間も、トリシャさんはうっとりと蕩けた瞳で俺を見上げていた。"

[[dialogue]]
speaker = "トリシャ"
# 「はぁ、ふぁ……そのまま……おとなしく……じっとしててね……出し切るまで……ずっと……びゅーっ……びゅーっ……びゅーっ……<emoji=heart04>」
line = "「はぁ、ふぁ……そのまま……おとなしく……じっとしててね……出し切るまで……ずっと……びゅーっ……びゅーっ……びゅーっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ペニスから残りを搾り出すように、トリシャさんがおっぱいで挟んだまま体を揺らす。
line = "ペニスから残りを搾り出すように、トリシャさんがおっぱいで挟んだまま体を揺らす。"

[[dialogue]]
speaker = "トリシャ"
# 「まだびくびくしてる……はぁ……私の汗と、あなたの精液が、ぐちょぐちょに混ざって、えっちな音が響いて──ぁんっ！？」
line = "「まだびくびくしてる……はぁ……私の汗と、あなたの精液が、ぐちょぐちょに混ざって、えっちな音が響いて──ぁんっ！？」"

[[dialogue]]
speaker = "unk"
# 粘液で滑ったペニスは、トリシャさんの谷間から飛び出ると、尿道の残り汁を乳房にまき散らした。
line = "粘液で滑ったペニスは、トリシャさんの谷間から飛び出ると、尿道の残り汁を乳房にまき散らした。"

[[dialogue]]
speaker = "トリシャ"
# 「あっ、ひゃっ……精液、勢いよすぎ……ぶっかけちゃだめぇっ……<emoji=heart04>」
line = "「あっ、ひゃっ……精液、勢いよすぎ……ぶっかけちゃだめぇっ……<emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
# 「はぁっ、はぁ……とても濃厚なオスの臭い……<emoji=heart04>　メスを発情させる罪深い芳香……晴れ着に染みついちゃう……<emoji=heart04>」
line = "「はぁっ、はぁ……とても濃厚なオスの臭い……<emoji=heart04>　メスを発情させる罪深い芳香……晴れ着に染みついちゃう……<emoji=heart04>」"

[[dialogue]]
speaker = "トリシャ"
# 「はぁ、はぁん……精液でおっぱいの間、べっとべとに……いやらしい香りが、立ち上って……すぅ、はぁぁ……<emoji=heart04>　味見もしちゃお……」
line = "「はぁ、はぁん……精液でおっぱいの間、べっとべとに……いやらしい香りが、立ち上って……すぅ、はぁぁ……<emoji=heart04>　味見もしちゃお……」"

[[dialogue]]
speaker = "unk"
# おっぱりにまとわりつく精液を指ですくい、愛おしそうに口に含む。
line = "おっぱりにまとわりつく精液を指ですくい、愛おしそうに口に含む。"

[[dialogue]]
speaker = "トリシャ"
# 「ちゅばっ……んぅ……れろぉ……ちゅぱ、ちゅぴぅ……んはぁ……精液、ねっとり濃ゆくて、口にまとわりついて……美味ひい……<emoji=heart04>」
line = "「ちゅばっ……んぅ……れろぉ……ちゅぱ、ちゅぴぅ……んはぁ……精液、ねっとり濃ゆくて、口にまとわりついて……美味ひい……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 精液を心底美味しそうに味わうトリシャさんが淫靡で、吐き出したばかりのペニスが再び天井を突くように反り返る。
line = "精液を心底美味しそうに味わうトリシャさんが淫靡で、吐き出したばかりのペニスが再び天井を突くように反り返る。"

[[dialogue]]
speaker = "トリシャ"
# 「あ……<emoji=heart04>　私のおっぱいま○こ、もっと味わいたい……？」
line = "「あ……<emoji=heart04>　私のおっぱいま○こ、もっと味わいたい……？」"

