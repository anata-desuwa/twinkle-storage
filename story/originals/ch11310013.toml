[[dialogue]]
speaker = "シズル"
# 「うちのせつなは贔屓目なしにかわいいと思うんですよね～。しかも私が教えた房中術で、夜の方もかなり具合は良いはずですよ？　まさに今が食べ頃です♪」
line = "「うちのせつなは贔屓目なしにかわいいと思うんですよね～。しかも私が教えた房中術で、夜の方もかなり具合は良いはずですよ？　まさに今が食べ頃です♪」"

[[dialogue]]
speaker = "シズル"
# 「ちょっとでいいですから、試してみませんか？　つまみ食いですよ。何も責任を取れなんて言いません、後腐れない関係を楽しんじゃいましょう♪」
line = "「ちょっとでいいですから、試してみませんか？　つまみ食いですよ。何も責任を取れなんて言いません、後腐れない関係を楽しんじゃいましょう♪」"

[[dialogue]]
