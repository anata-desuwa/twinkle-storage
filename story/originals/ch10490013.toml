[[dialogue]]
speaker = "unk"
# 第３話,豊胸ブートキャンプ,P
line = "第３話,豊胸ブートキャンプ,P"

[[dialogue]]
speaker = "unk"
# とある日の放課後、星徒会室。
line = "とある日の放課後、星徒会室。"

[[dialogue]]
speaker = "unk"
# そこには、いつになく真剣な表情をしたマトイの姿があった──
line = "そこには、いつになく真剣な表情をしたマトイの姿があった──"

[[dialogue]]
speaker = "マトイ"
# 「紅明さん、私……リア充になりたいんです！」
line = "「紅明さん、私……リア充になりたいんです！」"

[[dialogue]]
speaker = "紅明"
# 「ほほう……？」
line = "「ほほう……？」"

[[dialogue]]
speaker = "マトイ"
# 「どうすれば、紅明さんみたいな人気者になれますか！？」
line = "「どうすれば、紅明さんみたいな人気者になれますか！？」"

[[dialogue]]
speaker = "紅明"
# 「なるほど、マトイっち、タレントのアタシみたいになりたいのか。それなら──」
line = "「なるほど、マトイっち、タレントのアタシみたいになりたいのか。それなら──」"

[[dialogue]]
speaker = "紅明"
# 「やはり……<b>おっぱい</b>っしょ！！！」
line = "「やはり……<b>おっぱい</b>っしょ！！！」"

[[dialogue]]
speaker = "紅明"
# 「ねっ！！！　ダーリン♪」
line = "「ねっ！！！　ダーリン♪」"

[[dialogue]]
speaker = "unk"
# 俺に話を振らないでくれるかな！？
line = "俺に話を振らないでくれるかな！？"

[[dialogue]]
speaker = "マトイ"
# 「そっか、やはりおっぱい……！　おっぱいは全てを解決するんだ！」
line = "「そっか、やはりおっぱい……！　おっぱいは全てを解決するんだ！」"

[[dialogue]]
speaker = "マトイ"
# 「だけど、紅明さんの胸が大きいのは遺伝だと思うし、私ではどうしようも……」
line = "「だけど、紅明さんの胸が大きいのは遺伝だと思うし、私ではどうしようも……」"

[[dialogue]]
speaker = "紅明"
# 「ちっちっち、甘いぜマトイっち。牛一族の女は意中の雄を魅了する為、いつだっておっぱいを大きくすることを考えて来た……」
line = "「ちっちっち、甘いぜマトイっち。牛一族の女は意中の雄を魅了する為、いつだっておっぱいを大きくすることを考えて来た……」"

[[dialogue]]
speaker = "unk"
# （そうなの……！？）
line = "（そうなの……！？）"

[[dialogue]]
speaker = "紅明"
# 「つまり、牛一族には２０００年研究を重ねて来た『豊胸術』が存在する……！」
line = "「つまり、牛一族には２０００年研究を重ねて来た『豊胸術』が存在する……！」"

[[dialogue]]
speaker = "マトイ"
# 「まさか、そんなものが……！？」
line = "「まさか、そんなものが……！？」"

[[dialogue]]
speaker = "紅明"
# 「その名も『豊胸ブートキャンプ』！」
line = "「その名も『豊胸ブートキャンプ』！」"

[[dialogue]]
speaker = "unk"
# （胡散臭さＭＡＸ！！！）
line = "（胡散臭さＭＡＸ！！！）"

[[dialogue]]
speaker = "紅明"
# 「これを実践すれば、誰もが羨む魅力的なボディを手に入れられること間違いなしだぜ！　どうだい？　やるかい、マトイっち？」
line = "「これを実践すれば、誰もが羨む魅力的なボディを手に入れられること間違いなしだぜ！　どうだい？　やるかい、マトイっち？」"

[[dialogue]]
speaker = "マトイ"
# 「はい！　もちろん、やります！」
line = "「はい！　もちろん、やります！」"

[[dialogue]]
speaker = "紅明"
# 「なら、今日からアタシのことは教官と呼びな！　返事は、サー・イエッサーだぜ！」
line = "「なら、今日からアタシのことは教官と呼びな！　返事は、サー・イエッサーだぜ！」"

[[dialogue]]
speaker = "マトイ"
# 「サー・イエッサー！」
line = "「サー・イエッサー！」"

[[dialogue]]
speaker = "unk"
# そうして、豊胸ブートキャンプの日々は始まった。
line = "そうして、豊胸ブートキャンプの日々は始まった。"

[[dialogue]]
speaker = "紅明"
# 「そう、えぐり込むように拳を繰り出すんだ！　腕の筋肉よりも胸の筋肉を意識して！」
line = "「そう、えぐり込むように拳を繰り出すんだ！　腕の筋肉よりも胸の筋肉を意識して！」"

[[dialogue]]
speaker = "マトイ"
# 「サー・イエッサー！」
line = "「サー・イエッサー！」"

[[dialogue]]
speaker = "紅明"
# 「そして、体を徹底的に追い込んだ後は、ホルスタミンで回復！！！　これを繰り返すことで、体が作られていくんだぜ！」
line = "「そして、体を徹底的に追い込んだ後は、ホルスタミンで回復！！！　これを繰り返すことで、体が作られていくんだぜ！」"

[[dialogue]]
speaker = "紅明"
# 「もっとだマトイっち！　お前ならもっとスクワットの回数をこなせるはずだ！」
line = "「もっとだマトイっち！　お前ならもっとスクワットの回数をこなせるはずだ！」"

[[dialogue]]
speaker = "マトイ"
# 「くっ……うおおっ！　根性ぉぉぉ！」
line = "「くっ……うおおっ！　根性ぉぉぉ！」"

[[dialogue]]
speaker = "紅明"
# 「いいぞマトイっち！　お前の体は確実に進化していってるぞ！」
line = "「いいぞマトイっち！　お前の体は確実に進化していってるぞ！」"

[[dialogue]]
speaker = "紅明"
# 「キレの良いパンチだ！　初日からは想像できない程、動きがキレまくってるぞ、マトイっち！」
line = "「キレの良いパンチだ！　初日からは想像できない程、動きがキレまくってるぞ、マトイっち！」"

[[dialogue]]
speaker = "マトイ"
# 「ええ、分かります！　自分でも体が進化していってるのが！」
line = "「ええ、分かります！　自分でも体が進化していってるのが！」"

[[dialogue]]
speaker = "紅明"
# 「アナっちもいいぞ！　着実に動きが良くなっている！」
line = "「アナっちもいいぞ！　着実に動きが良くなっている！」"

[[dialogue]]
speaker = "アナ"
# 「サー・イエッサー！」
line = "「サー・イエッサー！」"

[[dialogue]]
speaker = "unk"
# 何か１人増えてる！？
line = "何か１人増えてる！？"

[[dialogue]]
speaker = "unk"
# そんな日々が続いて、ついに──
line = "そんな日々が続いて、ついに──"

[[dialogue]]
speaker = "紅明"
# 「……完成だ、マトイっち！！！　もうアタシから言うことは何もない！」
line = "「……完成だ、マトイっち！！！　もうアタシから言うことは何もない！」"

[[dialogue]]
speaker = "マトイ"
# 「ありがとうございます、教官。まるで生まれ変わったような気持ちです……」
line = "「ありがとうございます、教官。まるで生まれ変わったような気持ちです……」"

[[dialogue]]
speaker = "マトイ"
# 「今なら私……素手でモンスターを倒せる気がする！」
line = "「今なら私……素手でモンスターを倒せる気がする！」"

[[dialogue]]
speaker = "紅明"
# 「ああ、まさに完璧な筋肉だぜ！」
line = "「ああ、まさに完璧な筋肉だぜ！」"

[[dialogue]]
speaker = "マトイ"
# 「ええ、我ながら素晴らしい、無駄の無い筋肉……」
line = "「ええ、我ながら素晴らしい、無駄の無い筋肉……」"

[[dialogue]]
speaker = "マトイ"
# 「って、違ぁぁぁ──う！！！」
line = "「って、違ぁぁぁ──う！！！」"

[[dialogue]]
speaker = "マトイ"
# 「おっぱいどこ行った！？　私のおっぱいはどこに行っちゃったの、ねぇ！！」
line = "「おっぱいどこ行った！？　私のおっぱいはどこに行っちゃったの、ねぇ！！」"

[[dialogue]]
speaker = "マトイ"
# 「いつから筋肉修行になったんですか、ブートキャンプ！？」
line = "「いつから筋肉修行になったんですか、ブートキャンプ！？」"

[[dialogue]]
speaker = "アナ"
# 「ふっ……見て下さい会長、私もなかなか筋肉が付いてきました」
line = "「ふっ……見て下さい会長、私もなかなか筋肉が付いてきました」"

[[dialogue]]
speaker = "マトイ"
# 「アナは何でちょっと嬉しそうなの！？」
line = "「アナは何でちょっと嬉しそうなの！？」"

[[dialogue]]
speaker = "unk"
# 俺もブートキャンプやってみようかな
line = "俺もブートキャンプやってみようかな"

[[dialogue]]
speaker = "紅明"
# 「おっ、ダーリンやる？　おけまる～☆」
line = "「おっ、ダーリンやる？　おけまる～☆」"

[[dialogue]]
speaker = "マトイ"
# 「いや、趣旨変わってるし！！」
line = "「いや、趣旨変わってるし！！」"

[[dialogue]]
speaker = "unk"
# 後日、スレンダーになったマトイはバストサイズが少し小さくなり、筋肉質になったことで体重が増え、クラスの女子達から人気者になるのだった。
line = "後日、スレンダーになったマトイはバストサイズが少し小さくなり、筋肉質になったことで体重が増え、クラスの女子達から人気者になるのだった。"

[[dialogue]]
speaker = "マトイ"
# 「全然嬉しくないんだけど！？」
line = "「全然嬉しくないんだけど！？」"
