[[dialogue]]
speaker = "unk"
# 結局あの後、ロストアイテムはどこかへ消えてしまい、とりあえず星徒会室に戻って今後の相談をすることになった。
line = "結局あの後、ロストアイテムはどこかへ消えてしまい、とりあえず星徒会室に戻って今後の相談をすることになった。"

[[dialogue]]
speaker = "トレジアンナ"
# 「ついに現れましたね。封印を解くことができるかもしれないロストアイテムが……！」
line = "「ついに現れましたね。封印を解くことができるかもしれないロストアイテムが……！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「仮ですが、『解放』のロストアイテムと名づけておきましょうか！」
line = "「仮ですが、『解放』のロストアイテムと名づけておきましょうか！」"

[[dialogue]]
speaker = "プリムラ"
# 「ひとまず、力の制御は戻って、変身を解くことはできたのじゃ。しかし――」
line = "「ひとまず、力の制御は戻って、変身を解くことはできたのじゃ。しかし――」"

[[dialogue]]
speaker = "プリムラ"
# 「今の我は、サチの了承がなくとも自力でまたあの姿に変身できると感じる。一部ではあるが、本来の我の力が戻ってきているのじゃ」
line = "「今の我は、サチの了承がなくとも自力でまたあの姿に変身できると感じる。一部ではあるが、本来の我の力が戻ってきているのじゃ」"

[[dialogue]]
speaker = "unk"
# プリムラは正真正銘、世界を滅ぼす終末兵器として作られた存在だ。
line = "プリムラは正真正銘、世界を滅ぼす終末兵器として作られた存在だ。"

[[dialogue]]
speaker = "unk"
# しかしその力は現在、サチが持っているペンダント型のロストアイテム『星の鎖』によって大部分が封印されている。
line = "しかしその力は現在、サチが持っているペンダント型のロストアイテム『星の鎖』によって大部分が封印されている。"

[[dialogue]]
speaker = "サチ"
# 「解放の、ロストアイテム……」
line = "「解放の、ロストアイテム……」"

[[dialogue]]
speaker = "サチ"
# （もし封印を解く能力が本物なのだとしたら……トレジアンナさんは元の姿に戻ることができる。それに、プリムラも……）
line = "（もし封印を解く能力が本物なのだとしたら……トレジアンナさんは元の姿に戻ることができる。それに、プリムラも……）"

[[dialogue]]
speaker = "サチ"
# （だけど……もし封印が解けたら、プリムラはどうするんだろう……？）
line = "（だけど……もし封印が解けたら、プリムラはどうするんだろう……？）"

[[dialogue]]
speaker = "サチ"
# （……学園に残るのかな？　それとも……）
line = "（……学園に残るのかな？　それとも……）"

[[dialogue]]
speaker = "プリムラ"
# 「――ただ、よりによってタイミングが悪いのじゃ。トマルが不在の時に……」
line = "「――ただ、よりによってタイミングが悪いのじゃ。トマルが不在の時に……」"

[[dialogue]]
speaker = "サーシャ"
# 「そうね。お世話になった親戚の方が亡くなったとかで、マトイちゃんとトマルちゃん、数日学園を休んでいるから……」
line = "「そうね。お世話になった親戚の方が亡くなったとかで、マトイちゃんとトマルちゃん、数日学園を休んでいるから……」"

[[dialogue]]
speaker = "unk"
# 場所は北陸の方だと聞いていた。星騎士なら飛べばすぐの距離ではあるが、いつ現れるかわからないロストアイテム相手に呼びつけるわけにもいかない。
line = "場所は北陸の方だと聞いていた。星騎士なら飛べばすぐの距離ではあるが、いつ現れるかわからないロストアイテム相手に呼びつけるわけにもいかない。"

[[dialogue]]
speaker = "プリムラ"
# 「うむ。ロストアイテムは共通して、気配を隠して逃げるのが上手い。トマルの追跡能力がないのは痛手なのじゃ」
line = "「うむ。ロストアイテムは共通して、気配を隠して逃げるのが上手い。トマルの追跡能力がないのは痛手なのじゃ」"

[[dialogue]]
speaker = "シズハ"
# 「まあでも、実際にいない以上、ここにいるメンバーで頑張るしかないわよね！」
line = "「まあでも、実際にいない以上、ここにいるメンバーで頑張るしかないわよね！」"

[[dialogue]]
speaker = "シズハ"
# 「大丈夫！　本気で見つけたいって願えば、何とかなるわ、きっと！　みんなで力を合わせて頑張りましょう♪」
line = "「大丈夫！　本気で見つけたいって願えば、何とかなるわ、きっと！　みんなで力を合わせて頑張りましょう♪」"

[[dialogue]]
speaker = "シズハ"
# 「……って、そうだわ！　会長さんと、ちゃんと挨拶しておかないとね♪」
line = "「……って、そうだわ！　会長さんと、ちゃんと挨拶しておかないとね♪」"

[[dialogue]]
speaker = "シズハ"
# 「改めまして――」
line = "「改めまして――」"

[[dialogue]]
speaker = "シズハ"
# 「ごきげんよう、会長さん♪　私はサーシャお姉ちゃんの妹で、附属校３年生の<ruby=そめい>染井</ruby>シズハって言います！」
line = "「ごきげんよう、会長さん♪　私はサーシャお姉ちゃんの妹で、附属校３年生の<ruby>染井<rt>そめい</rt></ruby>シズハって言います！」"

[[dialogue]]
speaker = "unk"
# 初めまして
line = "初めまして"

[[dialogue]]
speaker = "シズハ"
# 「会長さんの話は、みんなから聞いてるよ。リクリエを退けてみせた英雄だって♪」
line = "「会長さんの話は、みんなから聞いてるよ。リクリエを退けてみせた英雄だって♪」"

[[dialogue]]
speaker = "シズハ"
# 「うん？　どうしたの？　――聞きたいことがある？」
line = "「うん？　どうしたの？　――聞きたいことがある？」"

[[dialogue]]
speaker = "unk"
# サーシャさんの妹って…… 妹分とか、妹的な存在ってこと？
line = "サーシャさんの妹って……\n妹分とか、妹的な存在ってこと？"

[[dialogue]]
speaker = "シズハ"
# 「……？　私は普通に、サーシャお姉ちゃんと血の繋がった妹だけど……」
line = "「……？　私は普通に、サーシャお姉ちゃんと血の繋がった妹だけど……」"

[[dialogue]]
speaker = "サーシャ"
# 「ええ。会長くん、どうしてそう思ったのかしら？　確かに会ったのは今日が初めかもしれないけど……」
line = "「ええ。会長くん、どうしてそう思ったのかしら？　確かに会ったのは今日が初めかもしれないけど……」"

[[dialogue]]
speaker = "サーシャ"
# 「私にはソフィのほかにもう１人妹がいるって、前に言ったことがあったでしょう？」
line = "「私にはソフィのほかにもう１人妹がいるって、前に言ったことがあったでしょう？」"

[[dialogue]]
speaker = "unk"
# いや、そんなはずは……
line = "いや、そんなはずは……"

[[dialogue]]
speaker = "unk"
# ふと、しばらく考えていたら、何だか聞いたことがあったような気がしてきて――
line = "ふと、しばらく考えていたら、何だか聞いたことがあったような気がしてきて――"

[[dialogue]]
speaker = "unk"
# ごめん。何か勘違いしてたみたいだ
line = "ごめん。何か勘違いしてたみたいだ"

[[dialogue]]
speaker = "シズハ"
# 「あははっ♪　まぁ、学園に転入してきたのはついこの間のことだし、そう思われても仕方ないよね」
line = "「あははっ♪　まぁ、学園に転入してきたのはついこの間のことだし、そう思われても仕方ないよね」"

[[dialogue]]
speaker = "シズハ"
# 「私ね、今でこそ元気な体になったけど、つい２ヶ月前までは病気で寝たきりの状態で、ずっと病院にいたの」
line = "「私ね、今でこそ元気な体になったけど、つい２ヶ月前までは病気で寝たきりの状態で、ずっと病院にいたの」"

[[dialogue]]
speaker = "シズハ"
# 「今の医学では治らない、いわゆる不治の病ってやつでね。しかも、体はもう本当に全然動かなくて、心臓も日に日に弱って行って、余命わずかとまで言われてた」
line = "「今の医学では治らない、いわゆる不治の病ってやつでね。しかも、体はもう本当に全然動かなくて、心臓も日に日に弱って行って、余命わずかとまで言われてた」"

[[dialogue]]
speaker = "シズハ"
# 「――そんな状態で、どうやって病気が治ったのか気になるよね？　本当に奇跡みたいな出会いだったんだけど……ある日突然、ロストアイテムが私の前に現れたの」
line = "「――そんな状態で、どうやって病気が治ったのか気になるよね？　本当に奇跡みたいな出会いだったんだけど……ある日突然、ロストアイテムが私の前に現れたの」"

[[dialogue]]
speaker = "シズハ"
# 「そして、ロストアイテムの力で、私はこうして元気に歩けるようになった」
line = "「そして、ロストアイテムの力で、私はこうして元気に歩けるようになった」"

[[dialogue]]
speaker = "シズハ"
# 「ディーちゃんが私のところへやって来たのは、それからすぐのことだったわ」
line = "「ディーちゃんが私のところへやって来たのは、それからすぐのことだったわ」"

[[dialogue]]
speaker = "unk"
# ディーちゃん……？
line = "ディーちゃん……？"

[[dialogue]]
speaker = "シズハ"
# 「うん！　トレジアンナさんみたいに喋るロストアイテムでね。って、あれ？　そういえばさっきからディーちゃん、全然喋らないような……？」
line = "「うん！　トレジアンナさんみたいに喋るロストアイテムでね。って、あれ？　そういえばさっきからディーちゃん、全然喋らないような……？」"

[[dialogue]]
speaker = "unk"
# ふと、俺は肩をトントンと叩かれる。後ろを振り返ると――
line = "ふと、俺は肩をトントンと叩かれる。後ろを振り返ると――"

[[dialogue]]
speaker = "？？？"
# 「ばぁっ♪」
line = "「ばぁっ♪」"

[[dialogue]]
speaker = "unk"
# おわぁっ！？
line = "おわぁっ！？"

[[dialogue]]
speaker = "ディーちゃん"
# 「ひひっ♪　初めまして、会長♪　ボクがその『ディーちゃん』なのサ♪」
line = "「ひひっ♪　初めまして、会長♪　ボクがその『ディーちゃん』なのサ♪」"

[[dialogue]]
speaker = "unk"
# ビックリした……！
line = "ビックリした……！"

[[dialogue]]
speaker = "ディーちゃん"
# 「フフッ、ドッキリ成功～♪　ボクはヒトのそういう反応が大好物だからね～。ご馳走様なのサ！」
line = "「フフッ、ドッキリ成功～♪　ボクはヒトのそういう反応が大好物だからね～。ご馳走様なのサ！」"

[[dialogue]]
speaker = "シズハ"
# 「もう、またそういう悪戯して！　驚かせる為にわざと喋らないようにしてたわね！？」
line = "「もう、またそういう悪戯して！　驚かせる為にわざと喋らないようにしてたわね！？」"

[[dialogue]]
speaker = "ディーちゃん"
# 「まあまあ、これがボクのコミュニケーションってやつだから、許してよ～☆」
line = "「まあまあ、これがボクのコミュニケーションってやつだから、許してよ～☆」"

[[dialogue]]
speaker = "ディーラック"
# 「さて、ディーちゃんというのは愛称で、ボクの本当の名前は『ディーラック』って言うのサ」
line = "「さて、ディーちゃんというのは愛称で、ボクの本当の名前は『ディーラック』って言うのサ」"

[[dialogue]]
speaker = "ディーラック"
# 「いわゆる魔法少女の使い魔っていうと、わかりやすいかな？　そんなわけで、これからシズハちゃん共々よろしく頼むよ、会長♪」
line = "「いわゆる魔法少女の使い魔っていうと、わかりやすいかな？　そんなわけで、これからシズハちゃん共々よろしく頼むよ、会長♪」"

[[dialogue]]
speaker = "unk"
# ああ、よろしく。ディーラック
line = "ああ、よろしく。ディーラック"

[[dialogue]]
speaker = "シズハ"
# 「じ～っ……」
line = "「じ～っ……」"

[[dialogue]]
speaker = "unk"
# ふと、何やらシズハがこちらの腰回りを観察していることに気づく。かと思うと――
line = "ふと、何やらシズハがこちらの腰回りを観察していることに気づく。かと思うと――"

[[dialogue]]
speaker = "シズハ"
# 「えいっ♪」
line = "「えいっ♪」"

[[dialogue]]
speaker = "unk"
# キャーーーーーーーーーーーー！？
line = "キャーーーーーーーーーーーー！？"

[[dialogue]]
speaker = "unk"
# 突然背後に回り込まれ、両手で遠慮なく尻を揉みしだかれた。
line = "突然背後に回り込まれ、両手で遠慮なく尻を揉みしだかれた。"

[[dialogue]]
speaker = "シズハ"
# 「ふふっ♪　会長さん……思った通り、すごくいいお尻をしてるわ♪」
line = "「ふふっ♪　会長さん……思った通り、すごくいいお尻をしてるわ♪」"

[[dialogue]]
speaker = "unk"
# 突然なにしてるの！？
line = "突然なにしてるの！？"

[[dialogue]]
speaker = "ディーラック"
# 「ひひっ♪　実はシズハちゃん、生粋の<b>お尻フェチ</b>なんだよね～」
line = "「ひひっ♪　実はシズハちゃん、生粋の<b>お尻フェチ</b>なんだよね～」"

[[dialogue]]
speaker = "シズハ"
# 「ディーちゃん。そんな、大きな声で私の性癖を発表されたら、その、恥ずかしいよ……」
line = "「ディーちゃん。そんな、大きな声で私の性癖を発表されたら、その、恥ずかしいよ……」"

[[dialogue]]
speaker = "プリムラ"
# 「他人のケツを勝手に揉みしだくのは恥ずかしくないのか……？」
line = "「他人のケツを勝手に揉みしだくのは恥ずかしくないのか……？」"

[[dialogue]]
speaker = "シズハ"
# 「確かに私は、お尻の形と柔らかさに、芸術性と美しさと魅力を感じているけれど！　できればすれ違う人々、老若男女全てのヒトのお尻を揉みしだきたいと思っているけれども！」
line = "「確かに私は、お尻の形と柔らかさに、芸術性と美しさと魅力を感じているけれど！　できればすれ違う人々、老若男女全てのヒトのお尻を揉みしだきたいと思っているけれども！」"

[[dialogue]]
speaker = "ディーラック"
# 「ひひっ♪　欲望が全部漏れちゃってるネ～」
line = "「ひひっ♪　欲望が全部漏れちゃってるネ～」"

[[dialogue]]
speaker = "シズハ"
# 「実際にお尻を触るのは、セクハラのためではないわ！　これはそう、コミュニケーション手段としてだから！」
line = "「実際にお尻を触るのは、セクハラのためではないわ！　これはそう、コミュニケーション手段としてだから！」"

[[dialogue]]
speaker = "unk"
# こ、コミュニケーション手段……？
line = "こ、コミュニケーション手段……？"

[[dialogue]]
speaker = "シズハ"
# 「そう！　ほら、お互いのお尻を触ると……気持ちが近づいて、すぐに仲良くなれるでしょ？」
line = "「そう！　ほら、お互いのお尻を触ると……気持ちが近づいて、すぐに仲良くなれるでしょ？」"

[[dialogue]]
speaker = "シズハ"
# 「あっ、なので会長も私のお尻、触ってくださいね♪」
line = "「あっ、なので会長も私のお尻、触ってくださいね♪」"

[[dialogue]]
speaker = "unk"
# と、シズハは俺の手を取ると……なんと自らお尻を触らせてきた。
line = "と、シズハは俺の手を取ると……なんと自らお尻を触らせてきた。"

[[dialogue]]
speaker = "unk"
# 柔らか……って、えぇーーーーーっ！？
line = "柔らか……って、えぇーーーーーっ！？"

[[dialogue]]
speaker = "サチ"
# 「ちょっ！？　何やってるんですか、お兄さん！？　エッチなのは禁止ですよ！？」
line = "「ちょっ！？　何やってるんですか、お兄さん！？　エッチなのは禁止ですよ！？」"

[[dialogue]]
speaker = "unk"
# 待って！　今のは不意打ちだから！
line = "待って！　今のは不意打ちだから！"

[[dialogue]]
speaker = "シズハ"
# 「ふふっ♪　これで私たちは『お尻合い』ですね、<b>会長</b>♪　お尻だけに！」
line = "「ふふっ♪　これで私たちは『お尻合い』ですね、<b>会長</b>♪　お尻だけに！」"

[[dialogue]]
speaker = "サーシャ"
# 「あら～♪」
line = "「あら～♪」"

[[dialogue]]
speaker = "ディーラック"
# 「ひひひっ♪　どう考えても、やってることがボクよりも酷いのサ～」
line = "「ひひひっ♪　どう考えても、やってることがボクよりも酷いのサ～」"

[[dialogue]]
speaker = "プリムラ"
# 「やれやれ、破廉恥な……清楚そうな見た目にそぐわぬセクハラ魔人っぷりなのじゃ……」
line = "「やれやれ、破廉恥な……清楚そうな見た目にそぐわぬセクハラ魔人っぷりなのじゃ……」"

[[dialogue]]
speaker = "シズハ"
# 「おっ、プリムラちゃん、言ったな～？　それ～♪」
line = "「おっ、プリムラちゃん、言ったな～？　それ～♪」"

[[dialogue]]
speaker = "プリムラ"
# 「んなぁっ！？　こらぁ、シズハ！　我の尻を無断で触るでない！」
line = "「んなぁっ！？　こらぁ、シズハ！　我の尻を無断で触るでない！」"

[[dialogue]]
speaker = "シズハ"
# 「う～ん、プリムラちゃん、相変わらずプリプリでモチモチないいお尻だこと♪」
line = "「う～ん、プリムラちゃん、相変わらずプリプリでモチモチないいお尻だこと♪」"

[[dialogue]]
speaker = "プリムラ"
# 「や、やめっ……ひゃあぁっ！？　貴様っ……破廉恥なのじゃあぁぁぁっ！」
line = "「や、やめっ……ひゃあぁっ！？　貴様っ……破廉恥なのじゃあぁぁぁっ！」"

[[dialogue]]
speaker = "unk"
# こうして俺は、シズハと『お知り合い』になったのだった――
line = "こうして俺は、シズハと『お知り合い』になったのだった――"
