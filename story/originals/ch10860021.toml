[[dialogue]]
speaker = "unk"
# 第１話,アルモたんは海で遊びたい,P
line = "第１話,アルモたんは海で遊びたい,P"

[[dialogue]]
speaker = "unk"
# その日は休日で、俺たちはリゾート結界へ遊びに来ていた。
line = "その日は休日で、俺たちはリゾート結界へ遊びに来ていた。"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「会長～！　おはようなのだ～♪」
line = "「会長～！　おはようなのだ～♪」"

[[dialogue]]
speaker = "unk"
# 最近手に入れた水着フォームの姿で、恋人のアルモが元気よく駆け寄ってくる。
line = "最近手に入れた水着フォームの姿で、恋人のアルモが元気よく駆け寄ってくる。"

[[dialogue]]
speaker = "unk"
# 今日も水着、似合ってて可愛いぞ
line = "今日も水着、似合ってて可愛いぞ"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「えへへ<emoji=heart04>　ありがとなのだ～♪」
line = "「えへへ<emoji=heart04>　ありがとなのだ～♪」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「会長の女の子姿の水着も、すっごく可愛いのだ♪　アルモたんは大好きだぞ♪」
line = "「会長の女の子姿の水着も、すっごく可愛いのだ♪　アルモたんは大好きだぞ♪」"

[[dialogue]]
speaker = "unk"
# そう――今日は俺も久しぶりに、アニマ先輩が作った『附属生女子』の義体を使って遊びに来ていた。
line = "そう――今日は俺も久しぶりに、アニマ先輩が作った『附属生女子』の義体を使って遊びに来ていた。"

[[dialogue]]
speaker = "unk"
# 俺は褒めてくれた恋人の頭を、優しく撫でる。
line = "俺は褒めてくれた恋人の頭を、優しく撫でる。"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「あっ♪　会長、そんな優しく撫でられると、くすぐったいのだ～♪　えへへへぇ～<emoji=heart04>」
line = "「あっ♪　会長、そんな優しく撫でられると、くすぐったいのだ～♪　えへへへぇ～<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「会長～、アルモタヘル～♪　おはようございます～♪」
line = "「会長～、アルモタヘル～♪　おはようございます～♪」"

[[dialogue]]
speaker = "ナミエル"
# 「……おはようございます。じ～っ……」
line = "「……おはようございます。じ～っ……」"

[[dialogue]]
speaker = "ナミエル"
# （附属生の女の子になった会長の水着姿……可愛い……）
line = "（附属生の女の子になった会長の水着姿……可愛い……）"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「２人共、おはようなのだ～！　今日はいっぱい海で楽しく遊ぶのだ♪」
line = "「２人共、おはようなのだ～！　今日はいっぱい海で楽しく遊ぶのだ♪」"

[[dialogue]]
speaker = "unk"
# 今日は附属校１年Ｃ組の仲良しメンバーで海遊びをする約束をしていて、俺も『附属生女子』の姿で参加したというわけだった。
line = "今日は附属校１年Ｃ組の仲良しメンバーで海遊びをする約束をしていて、俺も『附属生女子』の姿で参加したというわけだった。"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「ナミエルも、せっかくですから可愛い水着を着てくればよかったのに～。見たかったです～」
line = "「ナミエルも、せっかくですから可愛い水着を着てくればよかったのに～。見たかったです～」"

[[dialogue]]
speaker = "ナミエル"
# 「い、今はまだ夏ではありませんし、それに男性の目も近くにありますから……！」
line = "「い、今はまだ夏ではありませんし、それに男性の目も近くにありますから……！」"

[[dialogue]]
speaker = "unk"
# ちらりと俺を見るナミエル。その反応につい苦笑してしまう。
line = "ちらりと俺を見るナミエル。その反応につい苦笑してしまう。"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「今日は会長も女の子なのに、ナミエルは恥ずかしがり屋なのだ～」
line = "「今日は会長も女の子なのに、ナミエルは恥ずかしがり屋なのだ～」"

[[dialogue]]
speaker = "ナミエル"
# 「いや、見た目は女の子でも、中身は男性ですからね！？」
line = "「いや、見た目は女の子でも、中身は男性ですからね！？」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「え～？　でもアルモたん的には、会長の水着は可愛くて似合ってると思うぞ？」
line = "「え～？　でもアルモたん的には、会長の水着は可愛くて似合ってると思うぞ？」"

[[dialogue]]
speaker = "ナミエル"
# 「そ、それはまぁ……否定できませんが……」
line = "「そ、それはまぁ……否定できませんが……」"

[[dialogue]]
speaker = "unk"
# そう言われると、ちょっと照れる……
line = "そう言われると、ちょっと照れる……"

[[dialogue]]
speaker = "ナミエル"
# 「っ……！　会長、そんな風に恥じらうのはずるいですよ！？」
line = "「っ……！　会長、そんな風に恥じらうのはずるいですよ！？」"

[[dialogue]]
speaker = "ナミエル"
# （なんで会長は男性なのに、女の子姿だとこんなに可愛いんですか……！？）
line = "（なんで会長は男性なのに、女の子姿だとこんなに可愛いんですか……！？）"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「女の子の会長は本当に可愛いのだ～<emoji=heart04>　アルモたんもマグダレナみたいに、抱き締めて撫でたくなっちゃうのだ<emoji=heart04>」
line = "「女の子の会長は本当に可愛いのだ～<emoji=heart04>　アルモたんもマグダレナみたいに、抱き締めて撫でたくなっちゃうのだ<emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「ぎゅ～っ<emoji=heart04>　よしよし、なのだ～<emoji=heart04>」
line = "「ぎゅ～っ<emoji=heart04>　よしよし、なのだ～<emoji=heart04>」"

[[dialogue]]
speaker = "ナミエル"
# 「ちょっ、アルモたん！？　何をしてるんですか……！」
line = "「ちょっ、アルモたん！？　何をしてるんですか……！」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「ん～？　アルモたんと会長は恋人同士だし、これくらい普通じゃないか？　それに今は女の子同士なのだ♪」
line = "「ん～？　アルモたんと会長は恋人同士だし、これくらい普通じゃないか？　それに今は女の子同士なのだ♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「あっ、もしかしてナミエルも甘えたかったですか～？　それならママダレナが代わりに、愛を込めて抱き締めちゃいますよ～♪　ぎゅ～っ<emoji=heart04>」
line = "「あっ、もしかしてナミエルも甘えたかったですか～？　それならママダレナが代わりに、愛を込めて抱き締めちゃいますよ～♪　ぎゅ～っ<emoji=heart04>」"

[[dialogue]]
speaker = "ナミエル"
# 「ひゃっ！？　そ、そういう意味じゃありませんから！　公共の場でくっ付き合うのは破廉恥で……！」
line = "「ひゃっ！？　そ、そういう意味じゃありませんから！　公共の場でくっ付き合うのは破廉恥で……！」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「マグダレナとナミエルも、アルモたんと会長みたいに仲良しなのだ～♪」
line = "「マグダレナとナミエルも、アルモたんと会長みたいに仲良しなのだ～♪」"

[[dialogue]]
speaker = "ナミエル"
# 「ああもう、恥ずかしいですからやめてください～！」
line = "「ああもう、恥ずかしいですからやめてください～！」"

[[dialogue]]
speaker = "unk"
# それから俺たちは海に入って、水遊びを始めた。
line = "それから俺たちは海に入って、水遊びを始めた。"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「ナミエル、くらえなのだ～♪」
line = "「ナミエル、くらえなのだ～♪」"

[[dialogue]]
speaker = "ナミエル"
# 「わぷっ！？　虫捕り網の中から大量の水が飛び出して……！　その水着フォームの武器、どうなってるんですか……！？」
line = "「わぷっ！？　虫捕り網の中から大量の水が飛び出して……！　その水着フォームの武器、どうなってるんですか……！？」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「アルモたんの虫捕り網は、異空間の『<ruby=れんごく>煉獄</ruby>』に繋がってるのだ♪　なんでも沢山入れて、好きな時に取り出せるのだ♪」
line = "「アルモたんの虫捕り網は、異空間の『<ruby>煉獄<rt>れんごく</rt></ruby>』に繋がってるのだ♪　なんでも沢山入れて、好きな時に取り出せるのだ♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「ふふっ、それじゃあ私も――それ～っ♪」
line = "「ふふっ、それじゃあ私も――それ～っ♪」"

[[dialogue]]
speaker = "ナミエル"
# 「海水を四角いブロックみたいにして投げてる……！？　なんですかその能力！」
line = "「海水を四角いブロックみたいにして投げてる……！？　なんですかその能力！」"

[[dialogue]]
speaker = "ナミエル"
# 「こうなったら私も――」
line = "「こうなったら私も――」"

[[dialogue]]
speaker = "ナミエル"
# 「クリスマスフォームのスコップで対抗します！　えいっ！」
line = "「クリスマスフォームのスコップで対抗します！　えいっ！」"

[[dialogue]]
speaker = "unk"
# 雪かきでもするようにして、バシャバシャと大きな水飛沫を上げてみせるナミエル。
line = "雪かきでもするようにして、バシャバシャと大きな水飛沫を上げてみせるナミエル。"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「わぁ～っ♪　ナミエルの武器もすごいのだ～！　あははははっ♪」
line = "「わぁ～っ♪　ナミエルの武器もすごいのだ～！　あははははっ♪」"

[[dialogue]]
speaker = "unk"
# そうして夢中で遊んでいるうちに、あっという間に夕方になった。
line = "そうして夢中で遊んでいるうちに、あっという間に夕方になった。"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「それじゃあ、お肉も焼けたし……いただきますなのだ～♪」
line = "「それじゃあ、お肉も焼けたし……いただきますなのだ～♪」"

[[dialogue]]
speaker = "unk"
# ビーチでバーベキューをすることになり、アルモは手を合わせてから俺に向き直る。
line = "ビーチでバーベキューをすることになり、アルモは手を合わせてから俺に向き直る。"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「会長～<emoji=heart04>　恋人のアルモたんに、あ～んして欲しいのだ♪」
line = "「会長～<emoji=heart04>　恋人のアルモたんに、あ～んして欲しいのだ♪」"

[[dialogue]]
speaker = "unk"
# わかった。それじゃあ……ふー、ふー
line = "わかった。それじゃあ……ふー、ふー"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「えへへ～<emoji=heart04>　ちゃんとふーふーして食べさせてくれる会長、優しくて大好きなのだ～<emoji=heart04>」
line = "「えへへ～<emoji=heart04>　ちゃんとふーふーして食べさせてくれる会長、優しくて大好きなのだ～<emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「――あ～ん<emoji=heart04>　もぐもぐ……ん～<emoji=heart04>　会長に食べさせてもらうお肉が、やっぱり一番美味なのだ♪」
line = "「――あ～ん<emoji=heart04>　もぐもぐ……ん～<emoji=heart04>　会長に食べさせてもらうお肉が、やっぱり一番美味なのだ♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「ふふっ、アルモタヘルと会長は、すっかりラブラブですね～」
line = "「ふふっ、アルモタヘルと会長は、すっかりラブラブですね～」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「うん♪　恋人になってから、アルモたんは会長のことをどんどん好きになっていってるからな<emoji=heart04>」
line = "「うん♪　恋人になってから、アルモたんは会長のことをどんどん好きになっていってるからな<emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「ナミエルも、お肉を美味しく食べられてるか？」
line = "「ナミエルも、お肉を美味しく食べられてるか？」"

[[dialogue]]
speaker = "ナミエル"
# 「んっ……もぐもぐ……はい、バーベキューするのは久しぶりですが、美味しいです……♪」
line = "「んっ……もぐもぐ……はい、バーベキューするのは久しぶりですが、美味しいです……♪」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「ならよかったのだ♪　ナミエル、今日はアルモたんと一緒に遊んでくれて、ありがとうなのだ♪」
line = "「ならよかったのだ♪　ナミエル、今日はアルモたんと一緒に遊んでくれて、ありがとうなのだ♪」"

[[dialogue]]
speaker = "ナミエル"
# 「え、急にどうしたんですか……？」
line = "「え、急にどうしたんですか……？」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「お肉に夢中になると、言いそびれちゃいそうだからな。先に言っておきたかったのだ」
line = "「お肉に夢中になると、言いそびれちゃいそうだからな。先に言っておきたかったのだ」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「ナミエルは、アルモたんが誘うといつも遊びに付き合ってくれて、すごく感謝しているぞ♪」
line = "「ナミエルは、アルモたんが誘うといつも遊びに付き合ってくれて、すごく感謝しているぞ♪」"

[[dialogue]]
speaker = "ナミエル"
# 「ま、まあ……その……友達ですから……」
line = "「ま、まあ……その……友達ですから……」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「うんっ♪　アルモたんにとっても、ナミエルは大事な友達なのだ！　えへへっ♪」
line = "「うんっ♪　アルモたんにとっても、ナミエルは大事な友達なのだ！　えへへっ♪」"

[[dialogue]]
speaker = "unk"
# そうしてアルモは、照れくさそうなナミエルとお互いに笑顔を浮かべ合うのだった。
line = "そうしてアルモは、照れくさそうなナミエルとお互いに笑顔を浮かべ合うのだった。"
