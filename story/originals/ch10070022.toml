[[dialogue]]
speaker = "unk"
# 第２話,新たな力を見せるのです！,P
line = "第２話,新たな力を見せるのです！,P"

[[dialogue]]
speaker = "ルリエル"
# 「会長さん、今日はルリエルの特訓に付き合って欲しいのです」
line = "「会長さん、今日はルリエルの特訓に付き合って欲しいのです」"

[[dialogue]]
speaker = "unk"
# 戦闘服からいつもと違うね
line = "戦闘服からいつもと違うね"

[[dialogue]]
speaker = "ルリエル"
# 「はい。ロロットさんの服を着て変身すると、ルリエルの力も変わっちゃうみたいなのです」
line = "「はい。ロロットさんの服を着て変身すると、ルリエルの力も変わっちゃうみたいなのです」"

[[dialogue]]
speaker = "ルリエル"
# 「いつもの角笛ならばっちりお任せなのですが、この杖を使った戦い方はまだまだなので……」
line = "「いつもの角笛ならばっちりお任せなのですが、この杖を使った戦い方はまだまだなので……」"

[[dialogue]]
speaker = "ルリエル"
# 「そもそも、ルリエルの得意な光の属性すら変わっちゃってるのです。ちょっぴり不安で……」
line = "「そもそも、ルリエルの得意な光の属性すら変わっちゃってるのです。ちょっぴり不安で……」"

[[dialogue]]
speaker = "パッキー"
# 「ふーん。おもしれーことになってるじゃねーか。ドジ天使」
line = "「ふーん。おもしれーことになってるじゃねーか。ドジ天使」"

[[dialogue]]
speaker = "ルリエル"
# 「あっ！　エロパンダなのです！　何しに来たのですか！」
line = "「あっ！　エロパンダなのです！　何しに来たのですか！」"

[[dialogue]]
speaker = "パッキー"
# 「俺様好みのおねーちゃんを探してブラブラしてたんだよ。まったく、ツルペタしかいねえとはやれやれだぜ」
line = "「俺様好みのおねーちゃんを探してブラブラしてたんだよ。まったく、ツルペタしかいねえとはやれやれだぜ」"

[[dialogue]]
speaker = "ルリエル"
# 「ぐむむむ……！　相っ変わらず失礼な使い魔なのです……！」
line = "「ぐむむむ……！　相っ変わらず失礼な使い魔なのです……！」"

[[dialogue]]
speaker = "パッキー"
# 「ところでこっちの魔王様よ。このドジ天使、なかなか変わった属性を持ってるじゃねーか」
line = "「ところでこっちの魔王様よ。このドジ天使、なかなか変わった属性を持ってるじゃねーか」"

[[dialogue]]
speaker = "unk"
# 何が起こっているのか分かる？
line = "何が起こっているのか分かる？"

[[dialogue]]
speaker = "パッキー"
# 「当然だぜ。俺様は大賢者パッキー様だからな」
line = "「当然だぜ。俺様は大賢者パッキー様だからな」"

[[dialogue]]
speaker = "パッキー"
# 「向こうの世界で霊力を長いこと浴びてただろ？　その影響さ。化学変化するみてーに星力の質が変わっちまったってわけ」
line = "「向こうの世界で霊力を長いこと浴びてただろ？　その影響さ。化学変化するみてーに星力の質が変わっちまったってわけ」"

[[dialogue]]
speaker = "ルリエル"
# 「もしかして悪いことが起こったりしますか……？」
line = "「もしかして悪いことが起こったりしますか……？」"

[[dialogue]]
speaker = "パッキー"
# 「さぁな～？　でも天使の服を着てない時は普段どおりなんだろ？　ゲームで言う『特殊効果のある装備品』みたいなものだと思うぜ」
line = "「さぁな～？　でも天使の服を着てない時は普段どおりなんだろ？　ゲームで言う『特殊効果のある装備品』みたいなものだと思うぜ」"

[[dialogue]]
speaker = "ルリエル"
# 「おぉ……！　ルリエル、新たな装備品を手に入れたというわけですね。よぉし、これで大活躍なのです……！」
line = "「おぉ……！　ルリエル、新たな装備品を手に入れたというわけですね。よぉし、これで大活躍なのです……！」"

[[dialogue]]
speaker = "ルリエル"
# 「まさにこれこそ、ガイドブックに書いてあった天使の手から水が漏る、というやつですね！」
line = "「まさにこれこそ、ガイドブックに書いてあった天使の手から水が漏る、というやつですね！」"

[[dialogue]]
speaker = "パッキー"
# 「何言ってるんだか、さっぱりわからねえ……。そんじゃ俺様はオサラバするぜ。さーて、まだ見ぬおねーちゃんたちを求めて──」
line = "「何言ってるんだか、さっぱりわからねえ……。そんじゃ俺様はオサラバするぜ。さーて、まだ見ぬおねーちゃんたちを求めて──」"

[[dialogue]]
speaker = "パッキー"
# 「んぁ？　何だ、この音」
line = "「んぁ？　何だ、この音」"

[[dialogue]]
speaker = "ルリエル"
# 「アステラ反応なのです！　モンスターが現れましたっ。行きましょう、会長さん！」
line = "「アステラ反応なのです！　モンスターが現れましたっ。行きましょう、会長さん！」"

[[dialogue]]
speaker = "unk"
# パッキーも来る？
line = "パッキーも来る？"

[[dialogue]]
speaker = "パッキー"
# 「冗談だろ。なんで俺様が……いや。こいつらと行動をすれば星騎士のねーちゃんたちにも出会えるのか……？」
line = "「冗談だろ。なんで俺様が……いや。こいつらと行動をすれば星騎士のねーちゃんたちにも出会えるのか……？」"

[[dialogue]]
speaker = "パッキー"
# 「ひゃっほ～、行く！　行くぜ～！　お前ら、俺様についてきな！」
line = "「ひゃっほ～、行く！　行くぜ～！　お前ら、俺様についてきな！」"

[[dialogue]]
speaker = "ルリエル"
# 「げ、現金なパンダなのですっ……！」
line = "「げ、現金なパンダなのですっ……！」"

[[dialogue]]
speaker = "ルリエル"
# 「ルリエルたちが一番乗りみたいですね！　会長さん、行きましょう！」
line = "「ルリエルたちが一番乗りみたいですね！　会長さん、行きましょう！」"

[[dialogue]]
speaker = "unk"
# ルリエルは後方支援を頼む！
line = "ルリエルは後方支援を頼む！"

[[dialogue]]
speaker = "ルリエル"
# 「いえ！　ルリエル、どうやらこの杖を持った時は、前線で戦えるアタッカーのようなのです！」
line = "「いえ！　ルリエル、どうやらこの杖を持った時は、前線で戦えるアタッカーのようなのです！」"

[[dialogue]]
speaker = "ルリエル"
# 「ロロットさんの武器を借りて、ルリエルの星力も乗っけてー……」
line = "「ロロットさんの武器を借りて、ルリエルの星力も乗っけてー……」"

[[dialogue]]
speaker = "ルリエル"
# 「ハイドロ・スウィールっ！」
line = "「ハイドロ・スウィールっ！」"

[[dialogue]]
speaker = "unk"
# すごい、一撃だ……！
line = "すごい、一撃だ……！"

[[dialogue]]
speaker = "ルリエル"
# 「ふっふっふー！　まだまだなのです、どんどんモリモリ力が湧いてくるのですよ～っ！」
line = "「ふっふっふー！　まだまだなのです、どんどんモリモリ力が湧いてくるのですよ～っ！」"

[[dialogue]]
speaker = "ルリエル"
# 「このまま一気に退治しちゃいます！　ルリエルビームっ……一斉射撃ーっ！」
line = "「このまま一気に退治しちゃいます！　ルリエルビームっ……一斉射撃ーっ！」"

[[dialogue]]
speaker = "パッキー"
# 「お、おいおい！　そんな張り切って退治されたら、まだ見ぬおねーちゃんとのアバンチュールが……！」
line = "「お、おいおい！　そんな張り切って退治されたら、まだ見ぬおねーちゃんとのアバンチュールが……！」"

[[dialogue]]
speaker = "ルリエル"
# 「大天使ルリエルの攻撃、刮目せよ～、なのですっ！！」
line = "「大天使ルリエルの攻撃、刮目せよ～、なのですっ！！」"

[[dialogue]]
speaker = "ルリエル"
# 「すす、すごいのです……これがルリエルの新しい力……！」
line = "「すす、すごいのです……これがルリエルの新しい力……！」"

[[dialogue]]
speaker = "unk"
# 俺の出る幕はなかったかな
line = "俺の出る幕はなかったかな"

[[dialogue]]
speaker = "ルリエル"
# 「いえ。頼りになる会長さんがいてくれたから、ルリエルも頑張れました。ありがとうなのです～♪」
line = "「いえ。頼りになる会長さんがいてくれたから、ルリエルも頑張れました。ありがとうなのです～♪」"

[[dialogue]]
speaker = "パッキー"
# 「ひ、ひでぇ……結局、誰も来る前に終わっちまった……新しい出会いがあると思ったのによ～」
line = "「ひ、ひでぇ……結局、誰も来る前に終わっちまった……新しい出会いがあると思ったのによ～」"

[[dialogue]]
speaker = "パッキー"
# 「ちぇっ。俺様は帰るぜ。またサーシャちゃんのおっぱいでも揉んじゃおっかな～」
line = "「ちぇっ。俺様は帰るぜ。またサーシャちゃんのおっぱいでも揉んじゃおっかな～」"

[[dialogue]]
speaker = "ルリエル"
# 「でも、杖って何だか扱いが難しいのです。角笛と違って、振るだけで攻撃が出ちゃうところなんか特に……」
line = "「でも、杖って何だか扱いが難しいのです。角笛と違って、振るだけで攻撃が出ちゃうところなんか特に……」"

[[dialogue]]
speaker = "ルリエル"
# 「んっ……ふぇ、ふぇえっ……」
line = "「んっ……ふぇ、ふぇえっ……」"

[[dialogue]]
speaker = "ルリエル"
# 「ふぇっ……くっしょんっ！」
line = "「ふぇっ……くっしょんっ！」"

[[dialogue]]
speaker = "パッキー"
# 「メタファっ！？」
line = "「メタファっ！？」"

[[dialogue]]
speaker = "unk"
# パッキー！？
line = "パッキー！？"

[[dialogue]]
speaker = "ルリエル"
# 「は、はわわっ。くしゃみした拍子に攻撃が出ちゃったのですっ。早くしまわなきゃ……ぁ、また……へ、へ、へっくしゅっ！！」
line = "「は、はわわっ。くしゃみした拍子に攻撃が出ちゃったのですっ。早くしまわなきゃ……ぁ、また……へ、へ、へっくしゅっ！！」"

[[dialogue]]
speaker = "パッキー"
# 「ほむんへ！」
line = "「ほむんへ！」"

[[dialogue]]
speaker = "ルリエル"
# 「あ、あぁああ！　会長さん、この杖は危険なのですっ、コントロールが利かないのですよ～っ！？」
line = "「あ、あぁああ！　会長さん、この杖は危険なのですっ、コントロールが利かないのですよ～っ！？」"

[[dialogue]]
speaker = "unk"
# 誤射されて黒焦げになったパッキーを抱え、俺たちは学園へ帰還した。
line = "誤射されて黒焦げになったパッキーを抱え、俺たちは学園へ帰還した。"

[[dialogue]]
speaker = "unk"
# ルリエルが新たな力を制御できるようになる日は、もうしばらく先のことになりそうなのだった……
line = "ルリエルが新たな力を制御できるようになる日は、もうしばらく先のことになりそうなのだった……"
