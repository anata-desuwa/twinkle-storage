[[dialogue]]
speaker = "unk"
# ある日の放課後、俺が星徒会室で仕事していると――
line = "ある日の放課後、俺が星徒会室で仕事していると――"

[[dialogue]]
speaker = "マリオン"
# 「お忙しいところ失礼致します」
line = "「お忙しいところ失礼致します」"

[[dialogue]]
speaker = "unk"
# マリオンさん、こんにちは
line = "マリオンさん、こんにちは"

[[dialogue]]
speaker = "マリオン"
# 「はい♪　ごきげんよう、会長様♪」
line = "「はい♪　ごきげんよう、会長様♪」"

[[dialogue]]
speaker = "マリオン"
# 「ふふふっ、このマリオン、今日も会長様のお可愛いご尊顔を拝めて、眼福です<emoji=heart04>」
line = "「ふふふっ、このマリオン、今日も会長様のお可愛いご尊顔を拝めて、眼福です<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 彼女は星見家メイド隊の、マリオン・ネイマールさん。元星見家メイド長にして、元流星学園星徒会長という経歴を持つ、ハイスペック美人メイドさんである。
line = "彼女は星見家メイド隊の、マリオン・ネイマールさん。元星見家メイド長にして、元流星学園星徒会長という経歴を持つ、ハイスペック美人メイドさんである。"

[[dialogue]]
speaker = "unk"
# しかし、それらはあくまで仮の姿。その正体は、ネビュラ所属の『魔女』だったりする。
line = "しかし、それらはあくまで仮の姿。その正体は、ネビュラ所属の『魔女』だったりする。"

[[dialogue]]
speaker = "マリオン"
# 「――それで、本日参りました用件についてなのですが……」
line = "「――それで、本日参りました用件についてなのですが……」"

[[dialogue]]
speaker = "マリオン"
# 「クーシェン様、どうぞこちらへ」
line = "「クーシェン様、どうぞこちらへ」"

[[dialogue]]
speaker = "クーシェン"
# 「は～い♪」
line = "「は～い♪」"

[[dialogue]]
speaker = "クーシェン"
# 「へぇ～、キミが噂の魔王様～？　やあやあ、初めまして。ボクの名前は、クーシェン！」
line = "「へぇ～、キミが噂の魔王様～？　やあやあ、初めまして。ボクの名前は、クーシェン！」"

[[dialogue]]
speaker = "クーシェン"
# 「強きを求めて魔界を放浪せし、さすらいの星術使いだよ！」
line = "「強きを求めて魔界を放浪せし、さすらいの星術使いだよ！」"

[[dialogue]]
speaker = "unk"
# 初めまして。キミはどうして人間界に？
line = "初めまして。キミはどうして人間界に？"

[[dialogue]]
speaker = "マリオン"
# 「それは私の方から説明させて頂きます。実は私……ネビュラの仕事で『三界の監視役』を担っておりまして」
line = "「それは私の方から説明させて頂きます。実は私……ネビュラの仕事で『三界の監視役』を担っておりまして」"

[[dialogue]]
speaker = "マリオン"
# 「自身の人形たちを人間界だけでなく、魔界や天界など三界の各地に配置して、異常がないか監視させているのです」
line = "「自身の人形たちを人間界だけでなく、魔界や天界など三界の各地に配置して、異常がないか監視させているのです」"

[[dialogue]]
speaker = "マリオン"
# 「それで先日、魔界のクーシェン様が現地の方たちとトラブルになり、大立ち回りを繰り広げていたところをお見かけしまして……」
line = "「それで先日、魔界のクーシェン様が現地の方たちとトラブルになり、大立ち回りを繰り広げていたところをお見かけしまして……」"

[[dialogue]]
speaker = "クーシェン"
# 「いや～、そいつら、街を裏から牛耳って、住人を苦しめていた悪党でさ！　ここは１つ、強いボクがとっちめてやろうと思って、アジトに乗り込んでったんだけど～」
line = "「いや～、そいつら、街を裏から牛耳って、住人を苦しめていた悪党でさ！　ここは１つ、強いボクがとっちめてやろうと思って、アジトに乗り込んでったんだけど～」"

[[dialogue]]
speaker = "クーシェン"
# 「ちょ～っと調子に乗って、連中に悪戯をし過ぎちゃってさ……ボスを本気で怒らせちゃったんだよね～」
line = "「ちょ～っと調子に乗って、連中に悪戯をし過ぎちゃってさ……ボスを本気で怒らせちゃったんだよね～」"

[[dialogue]]
speaker = "クーシェン"
# 「で、悪党総出で追っかけて来るから、街中が大騒ぎになっちゃって。その時に、マリオンが助けてくれたんだ！」
line = "「で、悪党総出で追っかけて来るから、街中が大騒ぎになっちゃって。その時に、マリオンが助けてくれたんだ！」"

[[dialogue]]
speaker = "クーシェン"
# 「魔王は知ってる！？　マリオンってすっごく強いんだよ！　何千何百と分身を作り出して、あっという間に悪党共を制圧しちゃったんだから」
line = "「魔王は知ってる！？　マリオンってすっごく強いんだよ！　何千何百と分身を作り出して、あっという間に悪党共を制圧しちゃったんだから」"

[[dialogue]]
speaker = "マリオン"
# 「何千は言い過ぎですよ。まあ……その後にクーシェン様と戦った際は、１０００体以上人形を作る羽目になりましたが……」
line = "「何千は言い過ぎですよ。まあ……その後にクーシェン様と戦った際は、１０００体以上人形を作る羽目になりましたが……」"

[[dialogue]]
speaker = "unk"
# １０００体！？　というか、戦ったって……
line = "１０００体！？　というか、戦ったって……"

[[dialogue]]
speaker = "クーシェン"
# 「悪党たちをやっつけた後に、ボクからマリオンに勝負をお願いしたんだ♪」
line = "「悪党たちをやっつけた後に、ボクからマリオンに勝負をお願いしたんだ♪」"

[[dialogue]]
speaker = "クーシェン"
# 「ほら、強いヒトと出会ったら、ウキウキして手合わせしたくなるでしょ？」
line = "「ほら、強いヒトと出会ったら、ウキウキして手合わせしたくなるでしょ？」"

[[dialogue]]
speaker = "unk"
# 快活な<ruby=バトルマニア>戦闘狂タイプ</ruby>かぁ……。
line = "快活な<ruby>戦闘狂タイプ<rt>バトルマニア</rt></ruby>かぁ……。"

[[dialogue]]
speaker = "unk"
# なまじヴィーナスと相性が良さそうなだけに、今日は九浄家の用事で不在という幸運に俺は感謝した。
line = "なまじヴィーナスと相性が良さそうなだけに、今日は九浄家の用事で不在という幸運に俺は感謝した。"

[[dialogue]]
speaker = "unk"
# いきなり「バトルよ！」とか言い出しても、話がややこしくなりそうだったので。
line = "いきなり「バトルよ！」とか言い出しても、話がややこしくなりそうだったので。"

[[dialogue]]
speaker = "クーシェン"
# 「ボクも結構強い自信があるけど、マリオンと命がけの全力勝負したら、結構やばいかもね♪」
line = "「ボクも結構強い自信があるけど、マリオンと命がけの全力勝負したら、結構やばいかもね♪」"

[[dialogue]]
speaker = "クーシェン"
# 「ボク、強いヒトはちゃんと尊敬することにしてるんだ。そんなマリオンの話だから、今日も付いてくることにしたんだよ」
line = "「ボク、強いヒトはちゃんと尊敬することにしてるんだ。そんなマリオンの話だから、今日も付いてくることにしたんだよ」"

[[dialogue]]
speaker = "マリオン"
# 「実際に手合わせさせて頂き、わかりましたが………」
line = "「実際に手合わせさせて頂き、わかりましたが………」"

[[dialogue]]
speaker = "マリオン"
# 「クーシェン様はその小さくお可愛い身でありながら、私の人形１０００体では足りない程――まさに一騎当千の実力を秘めていらっしゃいます」
line = "「クーシェン様はその小さくお可愛い身でありながら、私の人形１０００体では足りない程――まさに一騎当千の実力を秘めていらっしゃいます」"

[[dialogue]]
speaker = "マリオン"
# 「そこで、私の方から星騎士としてスカウトさせて頂き、世界樹を通って人間界へとお連れしたのです」
line = "「そこで、私の方から星騎士としてスカウトさせて頂き、世界樹を通って人間界へとお連れしたのです」"

[[dialogue]]
speaker = "unk"
# なるほど……でもどうして俺のところへ？
line = "なるほど……でもどうして俺のところへ？"

[[dialogue]]
speaker = "マリオン"
# 「人間界には私よりも強い魔王様がいらっしゃいますよ、とお話させて頂いた結果、会わせてくれるのなら人間界に来てもいい、と仰られたのです」
line = "「人間界には私よりも強い魔王様がいらっしゃいますよ、とお話させて頂いた結果、会わせてくれるのなら人間界に来てもいい、と仰られたのです」"

[[dialogue]]
speaker = "マリオン"
# 「あとは、もう１点。クーシェン様がお持ちの『道具』について、もしかすると会長様にお心当たりがあるのではと思いまして」
line = "「あとは、もう１点。クーシェン様がお持ちの『道具』について、もしかすると会長様にお心当たりがあるのではと思いまして」"

[[dialogue]]
speaker = "unk"
# 道具……？
line = "道具……？"

[[dialogue]]
speaker = "クーシェン"
# 「うん。最近、別の悪党から手に入れた戦利品なんだけど――」
line = "「うん。最近、別の悪党から手に入れた戦利品なんだけど――」"

[[dialogue]]
speaker = "unk"
# そう言って、クーシェンが持って来ていた布袋から取り出してみせたのは――『大きな扇』だった。
line = "そう言って、クーシェンが持って来ていた布袋から取り出してみせたのは――『大きな扇』だった。"

[[dialogue]]
speaker = "クーシェン"
# 「試しに今回、悪戯で使ってみたら……加減を間違って、悪党のアジトを跡形もなく吹き飛ばしちゃってさ～☆　てへへ♪」
line = "「試しに今回、悪戯で使ってみたら……加減を間違って、悪党のアジトを跡形もなく吹き飛ばしちゃってさ～☆　てへへ♪」"

[[dialogue]]
speaker = "マリオン"
# 「……その扇は、軽くひと振りするだけで、建造物を全壊させてしまう程の突風を引き起こす力を持っています」
line = "「……その扇は、軽くひと振りするだけで、建造物を全壊させてしまう程の突風を引き起こす力を持っています」"

[[dialogue]]
speaker = "マリオン"
# 「この見た目と能力、どこかで聞き覚えがございませんか？」
line = "「この見た目と能力、どこかで聞き覚えがございませんか？」"

[[dialogue]]
speaker = "unk"
# もしかして……
line = "もしかして……"

[[dialogue]]
speaker = "unk"
# 俺の頭に１人、思い浮かぶ人物がいた。
line = "俺の頭に１人、思い浮かぶ人物がいた。"

[[dialogue]]
speaker = "unk"
# それから、マリオンさんに後を任され、しばらくして――
line = "それから、マリオンさんに後を任され、しばらくして――"

[[dialogue]]
speaker = "紅明"
# 「ダーリン、おいっす～☆　紅明ちゃんが今日も元気にやってきたぜ～♪」
line = "「ダーリン、おいっす～☆　紅明ちゃんが今日も元気にやってきたぜ～♪」"

[[dialogue]]
speaker = "unk"
# 紅明、わざわざ来てくれてありがとう
line = "紅明、わざわざ来てくれてありがとう"

[[dialogue]]
speaker = "紅明"
# 「ダーリンの頼みとあらば、アタシはいつでも元気に駆けつけるぜ♪　それで、アタシに見て欲しいものって？」
line = "「ダーリンの頼みとあらば、アタシはいつでも元気に駆けつけるぜ♪　それで、アタシに見て欲しいものって？」"

[[dialogue]]
speaker = "unk"
# クーシェンから受け取った扇を、彼女に見せると――
line = "クーシェンから受け取った扇を、彼女に見せると――"

[[dialogue]]
speaker = "紅明"
# 「なっ……！？　それって、まさか――『<ruby=ばしょうせん>芭蕉扇</ruby>』！？」
line = "「なっ……！？　それって、まさか――『<ruby>芭蕉扇<rt>ばしょうせん</rt></ruby>』！？」"

[[dialogue]]
speaker = "クーシェン"
# 「あ～、そういえば確かに、これを武器として悪用していた連中も、そんな名前を口にしていたような……？」
line = "「あ～、そういえば確かに、これを武器として悪用していた連中も、そんな名前を口にしていたような……？」"

[[dialogue]]
speaker = "unk"
# そこへ、ウキウキと興味津々で星徒会室のロフトを見に行っていたクーシェンが、１階へと降りて来る。
line = "そこへ、ウキウキと興味津々で星徒会室のロフトを見に行っていたクーシェンが、１階へと降りて来る。"

[[dialogue]]
speaker = "紅明"
# 「えっ！？」
line = "「えっ！？」"

[[dialogue]]
speaker = "unk"
# 紅明が振り向き、クーシェンと顔を合わせる。
line = "紅明が振り向き、クーシェンと顔を合わせる。"

[[dialogue]]
speaker = "紅明"
# 「まさか……『悟空』！？」
line = "「まさか……『悟空』！？」"

[[dialogue]]
speaker = "unk"
# 彼女は驚いた様子で、その名を口にするのだった。
line = "彼女は驚いた様子で、その名を口にするのだった。"
