[[dialogue]]
speaker = "unk"
# 第３話,大賢者はかっこいい,B
line = "第３話,大賢者はかっこいい,B"

[[dialogue]]
speaker = "クロト"
# 「ディマイズ──ブレイカー」
line = "「ディマイズ──ブレイカー」"

[[dialogue]]
speaker = "ゴルドン"
# 「ピ──ピ、ガァァァッ…………ッ！！」
line = "「ピ──ピ、ガァァァッ…………ッ！！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「やるぅ──さっすがクロト！」
line = "「やるぅ──さっすがクロト！」"

[[dialogue]]
speaker = "マトイ"
# 「すごい……！　魔王力全開なら、ここまで強くなっちゃうんだ……！」
line = "「すごい……！　魔王力全開なら、ここまで強くなっちゃうんだ……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私を守るためならいくらだって強くなるのよ。ねっ、パーパ♪」
line = "「私を守るためならいくらだって強くなるのよ。ねっ、パーパ♪」"

[[dialogue]]
speaker = "クロト"
# 「からかうんじゃない。大切なのはみんな同じだ」
line = "「からかうんじゃない。大切なのはみんな同じだ」"

[[dialogue]]
speaker = "unk"
# 戦闘経験を重ねるごとに星力と霊力のコントロールが熟練し、よりスムーズに立ち回れるようになっていた。
line = "戦闘経験を重ねるごとに星力と霊力のコントロールが熟練し、よりスムーズに立ち回れるようになっていた。"

[[dialogue]]
speaker = "unk"
# だが……俺の意識は、垣間見えた幻影に引っ張られていた。
line = "だが……俺の意識は、垣間見えた幻影に引っ張られていた。"

[[dialogue]]
speaker = "クロト"
# （さっきのは……偶然じゃなさそうだな。俺が魔王の力を引き出せば引き出すほど、塔と同調していくのを感じる）
line = "（さっきのは……偶然じゃなさそうだな。俺が魔王の力を引き出せば引き出すほど、塔と同調していくのを感じる）"

[[dialogue]]
speaker = "unk"
# しかし周りのみんなには、やはり見えていないようだった。
line = "しかし周りのみんなには、やはり見えていないようだった。"

[[dialogue]]
speaker = "クロト"
# （でも──あれが先代魔王？　壁画から受けた印象とは、ずいぶん違ったような……）
line = "（でも──あれが先代魔王？　壁画から受けた印象とは、ずいぶん違ったような……）"

[[dialogue]]
speaker = "unk"
# フィーニスの塔が見せてくれたのは恐らく実際に起きた旧森羅暦の過去。
line = "フィーニスの塔が見せてくれたのは恐らく実際に起きた旧森羅暦の過去。"

[[dialogue]]
speaker = "unk"
# 魔王の功績も、これまで壁画で見てきたような流れだった。
line = "魔王の功績も、これまで壁画で見てきたような流れだった。"

[[dialogue]]
speaker = "unk"
# でも……肝心の彼の人物像については、俺やヴィーナスの思い描いていたような英雄然としたものじゃなかった。
line = "でも……肝心の彼の人物像については、俺やヴィーナスの思い描いていたような英雄然としたものじゃなかった。"

[[dialogue]]
speaker = "クロト"
# （それに──俺そっくりってのも本当だった。余計に気になるところだけど……）
line = "（それに──俺そっくりってのも本当だった。余計に気になるところだけど……）"

[[dialogue]]
speaker = "unk"
# そして何より……すべての起源となった青年Ｓ。オルタナティブ宇宙にいた魔王の祖。
line = "そして何より……すべての起源となった青年Ｓ。オルタナティブ宇宙にいた魔王の祖。"

[[dialogue]]
speaker = "unk"
# 俺があちらと関わることはないにしろ、世界の広がりを感じずにはいられなかった。
line = "俺があちらと関わることはないにしろ、世界の広がりを感じずにはいられなかった。"

[[dialogue]]
speaker = "ニャリオン"
# 「フ──中々やるニャンね。さすがはフィオナ嬢に次ぐ魔王候補ニャ。認めてやらんでもないニャ！」
line = "「フ──中々やるニャンね。さすがはフィオナ嬢に次ぐ魔王候補ニャ。認めてやらんでもないニャ！」"

[[dialogue]]
speaker = "クロト"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "ニャリオン"
# 「な、なんニャ。急にワガハイをじっと見つめて」
line = "「な、なんニャ。急にワガハイをじっと見つめて」"

[[dialogue]]
speaker = "クロト"
# 「なあ……もしかしてニャリオンの言う前世って、もっと格好いい姿だったんじゃないか？」
line = "「なあ……もしかしてニャリオンの言う前世って、もっと格好いい姿だったんじゃないか？」"

[[dialogue]]
speaker = "ニャリオン"
# 「うーん……どうだったかニャンねえ……ニャにぶんワガハイも、おぼろげニャ記憶しかないからニャ」
line = "「うーん……どうだったかニャンねえ……ニャにぶんワガハイも、おぼろげニャ記憶しかないからニャ」"

[[dialogue]]
speaker = "ニャリオン"
# 「というかニャ。今もワガハイはサイコーに格好いいわけニャから、その言い方はおかしいニャン！」
line = "「というかニャ。今もワガハイはサイコーに格好いいわけニャから、その言い方はおかしいニャン！」"

[[dialogue]]
speaker = "クロト"
# 「そうか。それもそうだな」
line = "「そうか。それもそうだな」"

[[dialogue]]
speaker = "unk"
# ラクシスの従えていた剣虎とニャリオンは、根っこは同じなれど自我は別の存在らしかった。
line = "ラクシスの従えていた剣虎とニャリオンは、根っこは同じなれど自我は別の存在らしかった。"

[[dialogue]]
speaker = "ヴィーナス"
# 「ていうか、なんで急にそんなこと聞いたわけ？」
line = "「ていうか、なんで急にそんなこと聞いたわけ？」"

[[dialogue]]
speaker = "クロト"
# 「ああ。実は……」
line = "「ああ。実は……」"

[[dialogue]]
speaker = "unk"
# 隠しておくことでもないと思い、俺は今しがた見た先代魔王についての記憶をみんなにも共有した。
line = "隠しておくことでもないと思い、俺は今しがた見た先代魔王についての記憶をみんなにも共有した。"

[[dialogue]]
speaker = "フィオナ"
# 「先代魔王──ラクシスの過去……そうだったのですね。記録には残っていないので、照合のしようはありませんが」
line = "「先代魔王──ラクシスの過去……そうだったのですね。記録には残っていないので、照合のしようはありませんが」"

[[dialogue]]
speaker = "マトイ"
# 「そ、それに……そのお話通りなら、魔王っていうのはよその宇宙から持ってこられたものってこと？」
line = "「そ、それに……そのお話通りなら、魔王っていうのはよその宇宙から持ってこられたものってこと？」"

[[dialogue]]
speaker = "ソフィア"
# 「本当なのでしょうか……？」
line = "「本当なのでしょうか……？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「塔が教えてくれたことならホントのはずよ。今までもそうだったし！」
line = "「塔が教えてくれたことならホントのはずよ。今までもそうだったし！」"

[[dialogue]]
speaker = "マトイ"
# 「と、塔が教えてくれることなんてあるの？」
line = "「と、塔が教えてくれることなんてあるの？」"

[[dialogue]]
speaker = "ユウリ"
# 「さっぱりわかんねーな……けど、アホ猫のフカシは合ってたってことなのか」
line = "「さっぱりわかんねーな……けど、アホ猫のフカシは合ってたってことなのか」"

[[dialogue]]
speaker = "ニャリオン"
# 「だから最初から言っているニャン。３０００年前の大賢者ニャと」
line = "「だから最初から言っているニャン。３０００年前の大賢者ニャと」"

[[dialogue]]
speaker = "ニャリオン"
# 「ニャけども、いくら９つの命を持つ猫のワガハイでもそんなに長生きできるわけないニャ」
line = "「ニャけども、いくら９つの命を持つ猫のワガハイでもそんなに長生きできるわけないニャ」"

[[dialogue]]
speaker = "ニャリオン"
# 「ニャから、ワガハイがこうしてこの時代にいられるのも──フィオナ嬢が召喚してくれたおかげなのニャン！」
line = "「ニャから、ワガハイがこうしてこの時代にいられるのも──フィオナ嬢が召喚してくれたおかげなのニャン！」"

[[dialogue]]
speaker = "サーシャ"
# 「ついでにすっごく可愛くなったのね♪」
line = "「ついでにすっごく可愛くなったのね♪」"

[[dialogue]]
speaker = "ソフィア"
# 「可愛い……ですかねえ……？」
line = "「可愛い……ですかねえ……？」"

[[dialogue]]
speaker = "フィオナ"
# 「私としては……そんな大それた召喚のつもりはなかったのですが。これは、幸運と呼ぶべきなのでしょうか」
line = "「私としては……そんな大それた召喚のつもりはなかったのですが。これは、幸運と呼ぶべきなのでしょうか」"

[[dialogue]]
speaker = "ニャリオン"
# 「運命ニャ！　ワガハイは魔王の血筋に引き寄せられたのニャン！」
line = "「運命ニャ！　ワガハイは魔王の血筋に引き寄せられたのニャン！」"

[[dialogue]]
speaker = "unk"
# ニャリオンが現世に降臨した理屈は不明瞭だったが、俺にはなんとなくその解釈で合っているように思えた。
line = "ニャリオンが現世に降臨した理屈は不明瞭だったが、俺にはなんとなくその解釈で合っているように思えた。"

[[dialogue]]
speaker = "unk"
# それより……
line = "それより……"

[[dialogue]]
speaker = "フィオナ"
# 「？　どうかされましたか、緋宮会長」
line = "「？　どうかされましたか、緋宮会長」"

[[dialogue]]
speaker = "クロト"
# 「いや……なんでも」
line = "「いや……なんでも」"

[[dialogue]]
speaker = "unk"
# そういえば──と思い返す。
line = "そういえば──と思い返す。"

[[dialogue]]
speaker = "unk"
# 最後、<ruby=ラクシス>先代魔王</ruby>の隣にいた女性の姿──おぼろげながらフィオナに似ているような印象を受けた。
line = "最後、<ruby>先代魔王<rt>ラクシス</rt></ruby>の隣にいた女性の姿──おぼろげながらフィオナに似ているような印象を受けた。"

[[dialogue]]
speaker = "unk"
# かたや、先代魔王の方は壁画の通り、俺に瓜二つで……
line = "かたや、先代魔王の方は壁画の通り、俺に瓜二つで……"

[[dialogue]]
speaker = "クロト"
# （俺も魔王。フィオナも魔王。これは今となっちゃ確定だ。でも、ヴィーナスの信じた魔王候補と、女神の語っていた魔王候補は違う……）
line = "（俺も魔王。フィオナも魔王。これは今となっちゃ確定だ。でも、ヴィーナスの信じた魔王候補と、女神の語っていた魔王候補は違う……）"

[[dialogue]]
speaker = "unk"
# 諸々を総合して考えていくと、最終的にはシンプルな疑問に行き着く。
line = "諸々を総合して考えていくと、最終的にはシンプルな疑問に行き着く。"

[[dialogue]]
speaker = "unk"
# つまり──
line = "つまり──"

[[dialogue]]
speaker = "クロト"
# （俺とフィオナは……<b>どう</b>違うんだ？）
line = "（俺とフィオナは……<b>どう</b>違うんだ？）"
