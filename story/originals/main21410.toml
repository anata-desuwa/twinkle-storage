[[dialogue]]
speaker = "unk"
# 第１０話,女神の本心,B
line = "第１０話,女神の本心,B"

[[dialogue]]
speaker = "クロト"
# 「……ルヴィネ。今の君の叫びが、本当の気持ちのはずだ」
line = "「……ルヴィネ。今の君の叫びが、本当の気持ちのはずだ」"

[[dialogue]]
speaker = "クロト"
# 「もう、女神としての仮面をつけるのはやめるんだ……」
line = "「もう、女神としての仮面をつけるのはやめるんだ……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……仮面だなんて。そんなもの……私にはない……」
line = "「……仮面だなんて。そんなもの……私にはない……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「私はリクリエを起こすために造られた。ただそれだけの存在……」
line = "「私はリクリエを起こすために造られた。ただそれだけの存在……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「私は、世界を創り直すためだけに生み出された、モノにすぎないもの……」
line = "「私は、世界を創り直すためだけに生み出された、モノにすぎないもの……」"

[[dialogue]]
speaker = "チナ"
# 「……ルヴィはモノなんかじゃない。女神である前に、１人の天使だ……アタシの、友達だっ！」
line = "「……ルヴィはモノなんかじゃない。女神である前に、１人の天使だ……アタシの、友達だっ！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「チナ……それは違うわ。私はあなたたちとは違う……」
line = "「チナ……それは違うわ。私はあなたたちとは違う……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「命のある生き物は、何かの目的のために生み出されたりしない……生物が命を紡ぐということに、意味なんてないのだから……」
line = "「命のある生き物は、何かの目的のために生み出されたりしない……生物が命を紡ぐということに、意味なんてないのだから……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「私は、この見た目も、名前も、<ruby=ちから>霊力</ruby>も……全てリクリエのために製造された……」
line = "「私は、この見た目も、名前も、<ruby>霊力<rt>ちから</rt></ruby>も……全てリクリエのために製造された……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「目的もなく生み出される存在は、生物と呼ばれる……」
line = "「目的もなく生み出される存在は、生物と呼ばれる……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「でも、目的をもって生み出される存在は──モノという以外に、ないでしょう……？」
line = "「でも、目的をもって生み出される存在は──モノという以外に、ないでしょう……？」"

[[dialogue]]
speaker = "チナ"
# 「やめろって──言ってんだろがっ！！」
line = "「やめろって──言ってんだろがっ！！」"

[[dialogue]]
speaker = "チナ"
# 「ルヴィは、アタシの命の恩人だ！　父さんや母さんよりも長い時間──一緒にいたんだぞ！！」
line = "「ルヴィは、アタシの命の恩人だ！　父さんや母さんよりも長い時間──一緒にいたんだぞ！！」"

[[dialogue]]
speaker = "チナ"
# 「騙してた……！？　それがどうした！！　仮面の女がいなくなって、絶望しかなかったデネブを助けてくれた事実は、変わらない！！」
line = "「騙してた……！？　それがどうした！！　仮面の女がいなくなって、絶望しかなかったデネブを助けてくれた事実は、変わらない！！」"

[[dialogue]]
speaker = "チナ"
# 「アタシの友達をモノ扱いだなんて……許さないぞ！　『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』だろうがルヴィ本人だろうがっ、許さないっ！！」
line = "「アタシの友達をモノ扱いだなんて……許さないぞ！　『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』だろうがルヴィ本人だろうがっ、許さないっ！！」"

[[dialogue]]
speaker = "チナ"
# 「アタシの友達は……クソ真面目で、いつも難しい言葉ばかり使って！　冷たそうな見た目の癖に根は優しくて！」
line = "「アタシの友達は……クソ真面目で、いつも難しい言葉ばかり使って！　冷たそうな見た目の癖に根は優しくて！」"

[[dialogue]]
speaker = "チナ"
# 「担々麺が大好物で、いろんなところでバイトして貯めた金は、全部誰かのために使っちまう──そんなヤツなんだ！」
line = "「担々麺が大好物で、いろんなところでバイトして貯めた金は、全部誰かのために使っちまう──そんなヤツなんだ！」"

[[dialogue]]
speaker = "チナ"
# 「出会い方が偽物だったら、その後も全部偽物かっ！？　ふざっけんな！！」
line = "「出会い方が偽物だったら、その後も全部偽物かっ！？　ふざっけんな！！」"

[[dialogue]]
speaker = "チナ"
# 「嘘じゃない事も混ざってただろ……なあ、そうだろルヴィ……！？」
line = "「嘘じゃない事も混ざってただろ……なあ、そうだろルヴィ……！？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「…………っ」
line = "「…………っ」"

[[dialogue]]
speaker = "グレイス"
# 「ルヴィは、難しいことを考えすぎです！」
line = "「ルヴィは、難しいことを考えすぎです！」"

[[dialogue]]
speaker = "グレイス"
# 「私、嘘をつかれたことは怒ってます。でも、だからって……取引みたいにお詫びだなんて言われても、嬉しくないですよ……」
line = "「私、嘘をつかれたことは怒ってます。でも、だからって……取引みたいにお詫びだなんて言われても、嬉しくないですよ……」"

[[dialogue]]
speaker = "グレイス"
# 「魔王さんが言ってましたよね？　女神としてではなく、１人の天使として会話を……と」
line = "「魔王さんが言ってましたよね？　女神としてではなく、１人の天使として会話を……と」"

[[dialogue]]
speaker = "グレイス"
# 「私も同じ気持ちです。女神のルヴィネ様になんて、用事はないんです。私が話したいのは……天使の、友達の、ルヴィなんですよ？」
line = "「私も同じ気持ちです。女神のルヴィネ様になんて、用事はないんです。私が話したいのは……天使の、友達の、ルヴィなんですよ？」"

[[dialogue]]
speaker = "グレイス"
# 「ルヴィがしたこと……今すぐ全部許します、とは言えません……。でも私……ルヴィのこと、いつか許したいって、思ってます……」
line = "「ルヴィがしたこと……今すぐ全部許します、とは言えません……。でも私……ルヴィのこと、いつか許したいって、思ってます……」"

[[dialogue]]
speaker = "グレイス"
# 「お父さんやお母さんよりも長い時間、一緒にいた……大好きな友達なんですから……」
line = "「お父さんやお母さんよりも長い時間、一緒にいた……大好きな友達なんですから……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「でも私は、あなたたちを騙して……」
line = "「でも私は、あなたたちを騙して……」"

[[dialogue]]
speaker = "グレイス"
# 「はい。でもルヴィが１０年間、ず～っと心の中で……しめしめって舌を出していたようには……私、どうしても思えません……」
line = "「はい。でもルヴィが１０年間、ず～っと心の中で……しめしめって舌を出していたようには……私、どうしても思えません……」"

[[dialogue]]
speaker = "グレイス"
# 「それに『魔王さん』と約束しましたから！　世界も、友達も、絶対に諦めないって！！」
line = "「それに『魔王さん』と約束しましたから！　世界も、友達も、絶対に諦めないって！！」"

[[dialogue]]
speaker = "グレイス"
# 「ルヴィ、私たちとちゃんと向き合ってください！　そこからですよ……！」
line = "「ルヴィ、私たちとちゃんと向き合ってください！　そこからですよ……！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「私に……そんなことをする資格……」
line = "「私に……そんなことをする資格……」"

[[dialogue]]
speaker = "レティシア"
# 「私、ルヴィとこれから──色々なことがしたいわ」
line = "「私、ルヴィとこれから──色々なことがしたいわ」"

[[dialogue]]
speaker = "レティシア"
# 「みんなが私のこと……『空っぽ』じゃないって言うんだもの。だったら色々なこと、一緒に体験してみたい」
line = "「みんなが私のこと……『空っぽ』じゃないって言うんだもの。だったら色々なこと、一緒に体験してみたい」"

[[dialogue]]
speaker = "レティシア"
# 「永遠にルヴィと生きられるのも、素敵だとは思うけれど……私たちの居場所のデネブで、限りある人生を生きる方が、魅力的だわ……」
line = "「永遠にルヴィと生きられるのも、素敵だとは思うけれど……私たちの居場所のデネブで、限りある人生を生きる方が、魅力的だわ……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……レティシア」
line = "「……レティシア」"

[[dialogue]]
speaker = "レティシア"
# 「いいじゃない、命令なんて反故にしても。子は親を選べないのだし」
line = "「いいじゃない、命令なんて反故にしても。子は親を選べないのだし」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……笑えないわ、その冗談」
line = "「……笑えないわ、その冗談」"

[[dialogue]]
speaker = "ベアトリス"
# 「ねぇルヴィ。私たち、聞きたいことは１つだけなの」
line = "「ねぇルヴィ。私たち、聞きたいことは１つだけなの」"

[[dialogue]]
speaker = "ベアトリス"
# 「『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』に与えられた使命を全うして、世界をやり直したいの……？」
line = "「『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』に与えられた使命を全うして、世界をやり直したいの……？」"

[[dialogue]]
speaker = "ベアトリス"
# 「それとも……嘘や間違いだらけでも、この世界で私たちと生きていきたい？」
line = "「それとも……嘘や間違いだらけでも、この世界で私たちと生きていきたい？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……申し訳ないけれど、私に選択肢はないのよ」
line = "「……申し訳ないけれど、私に選択肢はないのよ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「私は命じられたままに動かなければ……そうでないと存在する意味だって……」
line = "「私は命じられたままに動かなければ……そうでないと存在する意味だって……」"

[[dialogue]]
speaker = "ベアトリス"
# 「ううん、そうじゃないんだよ？」
line = "「ううん、そうじゃないんだよ？」"

[[dialogue]]
speaker = "ベアトリス"
# 「『選択肢はない』だとか、『存在する意味』だとか、そういうことは関係なくって……」
line = "「『選択肢はない』だとか、『存在する意味』だとか、そういうことは関係なくって……」"

[[dialogue]]
speaker = "ベアトリス"
# 「私たちはただ、ルヴィが『どうしたいのか』。それを知りたいだけなの」
line = "「私たちはただ、ルヴィが『どうしたいのか』。それを知りたいだけなの」"

[[dialogue]]
speaker = "ルヴィネ"
# 「…………ベアト。あと数年もしたら……あなたは星力がなくなるのよ？　太陽の下も歩けない……」
line = "「…………ベアト。あと数年もしたら……あなたは星力がなくなるのよ？　太陽の下も歩けない……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「私がリクリエを起こして、守護天使として連れていかなかったら。あなたはいずれ、暗い洞窟に……」
line = "「私がリクリエを起こして、守護天使として連れていかなかったら。あなたはいずれ、暗い洞窟に……」"

[[dialogue]]
speaker = "ベアトリス"
# 「うん！　だから時間ぎりぎりまで──ルヴィとみんなでいっぱい思い出を作りたい！」
line = "「うん！　だから時間ぎりぎりまで──ルヴィとみんなでいっぱい思い出を作りたい！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……………………」
line = "「……………………」"

[[dialogue]]
speaker = "unk"
# ルヴィネはしばらくの沈黙の後、俺の方へ顔を向けた。
line = "ルヴィネはしばらくの沈黙の後、俺の方へ顔を向けた。"

[[dialogue]]
speaker = "ルヴィネ"
# 「緋宮クロト。あなたは、今回の騒動に、どんな決着をつけるつもりなの……？」
line = "「緋宮クロト。あなたは、今回の騒動に、どんな決着をつけるつもりなの……？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「お父様は……テルルよりも高位の存在よ。私のような女神の幼体を生み出せる創造神……」
line = "「お父様は……テルルよりも高位の存在よ。私のような女神の幼体を生み出せる創造神……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「あなたたち、誰に逆らうと言ってるのか……本当にわかっているの？」
line = "「あなたたち、誰に逆らうと言ってるのか……本当にわかっているの？」"

[[dialogue]]
speaker = "クロト"
# 「いざとなれば戦うことになるかもしれない。でも……ルヴィネ。君がいれば話は変わってくる」
line = "「いざとなれば戦うことになるかもしれない。でも……ルヴィネ。君がいれば話は変わってくる」"

[[dialogue]]
speaker = "クロト"
# 「『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』と意思疎通ができるんだろう？　だったら、話し合いで何とかなるかもしれない」
line = "「『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』と意思疎通ができるんだろう？　だったら、話し合いで何とかなるかもしれない」"

[[dialogue]]
speaker = "ルヴィネ"
# 「…………馬鹿なことを」
line = "「…………馬鹿なことを」"

[[dialogue]]
speaker = "クロト"
# 「『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』に善意や悪意があるわけではないことは……何となく理解しているつもりだ。神様っていうのはきっと、そういうものなんだろうって」
line = "「『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』に善意や悪意があるわけではないことは……何となく理解しているつもりだ。神様っていうのはきっと、そういうものなんだろうって」"

[[dialogue]]
speaker = "クロト"
# 「でも、だからこそ、何とか対話で解決したいんだ。リクリエなんて起こさなくても、俺たちは進化を続けていく」
line = "「でも、だからこそ、何とか対話で解決したいんだ。リクリエなんて起こさなくても、俺たちは進化を続けていく」"

[[dialogue]]
speaker = "クロト"
# 「資源を消費する生物が生きていくには、成長し続けるしかない。だけど、その速度は生きている俺たちに選ばせてほしいんだ」
line = "「資源を消費する生物が生きていくには、成長し続けるしかない。だけど、その速度は生きている俺たちに選ばせてほしいんだ」"

[[dialogue]]
speaker = "クロト"
# 「協力してくれないか──『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』と対話できる、君の力があれば心強い」
line = "「協力してくれないか──『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』と対話できる、君の力があれば心強い」"

[[dialogue]]
speaker = "ルヴィネ"
# 「…………本当に愚かね」
line = "「…………本当に愚かね」"

[[dialogue]]
speaker = "unk"
# ルヴィネのその言葉は、俺たちに言っている──わけではなかった。
line = "ルヴィネのその言葉は、俺たちに言っている──わけではなかった。"

[[dialogue]]
speaker = "ルヴィネ"
# 「私はテルル以上に……出来損ないの女神だったみたい……」
line = "「私はテルル以上に……出来損ないの女神だったみたい……」"

[[dialogue]]
speaker = "ベアトリス"
# 「ルヴィ……！」
line = "「ルヴィ……！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「みんな、今まで本当に……ごめんなさい」
line = "「みんな、今まで本当に……ごめんなさい」"

[[dialogue]]
speaker = "ルヴィネ"
# 「許されるのなら……これからも、みんなと一緒に生きていきたい……っ」
line = "「許されるのなら……これからも、みんなと一緒に生きていきたい……っ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「リクリエなんて起こさずに、この世界で生きていきたいわ……！」
line = "「リクリエなんて起こさずに、この世界で生きていきたいわ……！」"
