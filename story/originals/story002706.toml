line = "「どうかした？　意外そうな顔して」"

[[dialogue]]
speaker = "ミヤハル"
# 「ああいや、マトイはん、うちのこと、そんな風に呼んでましたっけって思うて……」
line = "「ああいや、マトイはん、うちのこと、そんな風に呼んでましたっけって思うて……」"

[[dialogue]]
speaker = "マトイ"
# 「……ほら、なんかもう昨日、とんでもないことをぶっちゃけあったし。考えてみれば、私たち学園は違うけど、同じ２年生同士でしょ？　だから――」
line = "「……ほら、なんかもう昨日、とんでもないことをぶっちゃけあったし。考えてみれば、私たち学園は違うけど、同じ２年生同士でしょ？　だから――」"

[[dialogue]]
speaker = "マトイ"
# 「ミヤハルも私のこと、マトイって呼び捨てにしてくれていいから」
line = "「ミヤハルも私のこと、マトイって呼び捨てにしてくれていいから」"

[[dialogue]]
speaker = "マトイ"
# 「その方が気兼ねなく、ツッコミやすいしね」
line = "「その方が気兼ねなく、ツッコミやすいしね」"

[[dialogue]]
speaker = "ミヤハル"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "マトイ"
# 「もしかして、嫌だった？」
line = "「もしかして、嫌だった？」"

[[dialogue]]
speaker = "ミヤハル"
# 「いや、そんなことはないんやけど……ちょっと戸惑ってもうて」
line = "「いや、そんなことはないんやけど……ちょっと戸惑ってもうて」"

[[dialogue]]
speaker = "ミヤハル"
# 「うち、昨日も言ったけど、これまで友達って言える仲の子おらんかったから、こういうの初めてで……」
line = "「うち、昨日も言ったけど、これまで友達って言える仲の子おらんかったから、こういうの初めてで……」"

[[dialogue]]
speaker = "ミヤハル"
# 「誰かを呼び捨てで呼ぶ関係になったこと、無くて……」
line = "「誰かを呼び捨てで呼ぶ関係になったこと、無くて……」"

[[dialogue]]
speaker = "マトイ"
# 「……ふふっ」
line = "「……ふふっ」"

[[dialogue]]
speaker = "ミヤハル"
# 「な、なに笑うとるん？」
line = "「な、なに笑うとるん？」"

[[dialogue]]
speaker = "マトイ"
# 「ミヤハル、えっちなことは平然と口にできるのに、そういうのは照れちゃうんだね」
line = "「ミヤハル、えっちなことは平然と口にできるのに、そういうのは照れちゃうんだね」"

[[dialogue]]
speaker = "ミヤハル"
# 「はぁ！？　照れてへんしっ。マトイはん、いけずやわぁ……！」
line = "「はぁ！？　照れてへんしっ。マトイはん、いけずやわぁ……！」"

[[dialogue]]
speaker = "マトイ"
# 「昨日イジられたお返しだよ。あと、呼び捨てになってないよ？」
line = "「昨日イジられたお返しだよ。あと、呼び捨てになってないよ？」"

[[dialogue]]
speaker = "ミヤハル"
# 「っ……！」
line = "「っ……！」"

[[dialogue]]
speaker = "ミヤハル"
# 「い、言えばええんやろ？　その……ま、マトイ……」
line = "「い、言えばええんやろ？　その……ま、マトイ……」"

[[dialogue]]
speaker = "マトイ"
# 「――うん♪　よくできました」
line = "「――うん♪　よくできました」"

[[dialogue]]
speaker = "ルリエル"
# 「あ～！　２人ともずるいのです！」
line = "「あ～！　２人ともずるいのです！」"

[[dialogue]]
speaker = "ミヤハル"
# 「って、ルリエルはん、トマルはん、見てたん！？」
line = "「って、ルリエルはん、トマルはん、見てたん！？」"

[[dialogue]]
speaker = "トマル"
# 「すみません、ちょっと待ってから声をかけた方がよさそうな雰囲気でしたので……」
line = "「すみません、ちょっと待ってから声をかけた方がよさそうな雰囲気でしたので……」"

[[dialogue]]
speaker = "ルリエル"
# 「ルリエルも昨日の話し合いには参加してましたし、みんなから親しく『ルリ』って呼ばれたいのです！」
line = "「ルリエルも昨日の話し合いには参加してましたし、みんなから親しく『ルリ』って呼ばれたいのです！」"

[[dialogue]]
speaker = "マトイ"
# 「う～ん。なんとなく、呼ぶなら『ルリちゃん』かな～」
line = "「う～ん。なんとなく、呼ぶなら『ルリちゃん』かな～」"

[[dialogue]]
speaker = "ルリエル"
# 「なんでですか！？　アナさんのことは、アナって呼んでるのに！」
line = "「なんでですか！？　アナさんのことは、アナって呼んでるのに！」"

[[dialogue]]
speaker = "マトイ"
# 「ルリちゃんにはそっちの方が可愛いから、かな？」
line = "「ルリちゃんにはそっちの方が可愛いから、かな？」"

[[dialogue]]
speaker = "ミヤハル"
# 「せやねぇ。うちもはんなりと、『ルリはん』って呼びたいわぁ」
line = "「せやねぇ。うちもはんなりと、『ルリはん』って呼びたいわぁ」"

[[dialogue]]
speaker = "ルリエル"
# 「えへへへへぇ～<emoji=heart04>　ルリエルが特別可愛いからということなら、仕方がないのです♪」
line = "「えへへへへぇ～<emoji=heart04>　ルリエルが特別可愛いからということなら、仕方がないのです♪」"

[[dialogue]]
speaker = "ミヤハル"
# 「ふふっ、ルリはんは本当、天使って感じの子やねぇ。可愛い後輩やわぁ」
line = "「ふふっ、ルリはんは本当、天使って感じの子やねぇ。可愛い後輩やわぁ」"

[[dialogue]]
speaker = "トマル"
# 「あの……私も『ルリさま』、とお呼びしてもいいでしょうか？」
line = "「あの……私も『ルリさま』、とお呼びしてもいいでしょうか？」"

[[dialogue]]
speaker = "ルリエル"
# 「はい！　もちろんなのですよ、トマルさん♪」
line = "「はい！　もちろんなのですよ、トマルさん♪」"

[[dialogue]]
speaker = "unk"
# こうして、お泊り会を経て、少し変化のあった４人なのだった――
line = "こうして、お泊り会を経て、少し変化のあった４人なのだった――"
