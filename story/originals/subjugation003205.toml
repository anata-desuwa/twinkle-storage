[[dialogue]]
speaker = "unk"
# トワに迷惑をかけていることを申し訳なく思ったイクシリオンは、これまで隠していたことを打ち明け始めた。
line = "トワに迷惑をかけていることを申し訳なく思ったイクシリオンは、これまで隠していたことを打ち明け始めた。"

[[dialogue]]
speaker = "イクシリオン"
# 「――私、妄想癖は小さい頃からあったんです。でも、天界にいた頃は、それが良い方向に働いていたと思います」
line = "「――私、妄想癖は小さい頃からあったんです。でも、天界にいた頃は、それが良い方向に働いていたと思います」"

[[dialogue]]
speaker = "イクシリオン"
# 「理想の星騎士として、自分のなりたい姿を毎日思い描くことで、それが一種のイメージトレーニングになっていたんです」
line = "「理想の星騎士として、自分のなりたい姿を毎日思い描くことで、それが一種のイメージトレーニングになっていたんです」"

[[dialogue]]
speaker = "イクシリオン"
# 「そのおかげで、人間界に来るまでに鍛錬を重ね、附属校に入学してすぐ、プリマステラの資格を得ることができました」
line = "「そのおかげで、人間界に来るまでに鍛錬を重ね、附属校に入学してすぐ、プリマステラの資格を得ることができました」"

[[dialogue]]
speaker = "イクシリオン"
# 「ですが……人間界に来て私は、『漫画』という文化に出会ってしまったんです……！」
line = "「ですが……人間界に来て私は、『漫画』という文化に出会ってしまったんです……！」"

[[dialogue]]
speaker = "イクシリオン"
# 「それは、書店で何気なく手に取った、試し読みの少女漫画でした。その内容が――」
line = "「それは、書店で何気なく手に取った、試し読みの少女漫画でした。その内容が――」"

[[dialogue]]
speaker = "イクシリオン"
# 「その……想像していた以上に、男女の関係が情熱的に描かれていたんです……<emoji=heart04>」
line = "「その……想像していた以上に、男女の関係が情熱的に描かれていたんです……<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
# 「それはもう、これまでの人生で味わったことのない衝撃でした。まさに『晴天の霹靂』という人間界のことわざの通り……！」
line = "「それはもう、これまでの人生で味わったことのない衝撃でした。まさに『晴天の霹靂』という人間界のことわざの通り……！」"

[[dialogue]]
speaker = "トワ先生"
# 「あ～、なるほど……それで」
line = "「あ～、なるほど……それで」"

[[dialogue]]
speaker = "イクシリオン"
# 「はい……それ以来、私は好奇心が抑えられなくなってしまって……」
line = "「はい……それ以来、私は好奇心が抑えられなくなってしまって……」"

[[dialogue]]
speaker = "イクシリオン"
# 「そういう描写の多い漫画を探しては、隠れて読み漁り、エッチな妄想をするようになってしまったんです……！」
line = "「そういう描写の多い漫画を探しては、隠れて読み漁り、エッチな妄想をするようになってしまったんです……！」"

[[dialogue]]
speaker = "トワ先生"
# （……ああ、わかる。私も同じくらいの頃、親にも友達にも言えずにこっそり読んでたなぁ……言えないけど）
line = "（……ああ、わかる。私も同じくらいの頃、親にも友達にも言えずにこっそり読んでたなぁ……言えないけど）"

[[dialogue]]
speaker = "イクシリオン"
# 「それで、会長が転入してきて、御前試合で戦う勇姿を見てからは……その……会長に対しても、エッチな妄想をするようになってしまって……！」
line = "「それで、会長が転入してきて、御前試合で戦う勇姿を見てからは……その……会長に対しても、エッチな妄想をするようになってしまって……！」"

[[dialogue]]
speaker = "イクシリオン"
# 「ですが最近……それもスランプになってしまっているみたいなんです……」
line = "「ですが最近……それもスランプになってしまっているみたいなんです……」"

[[dialogue]]
speaker = "トワ先生"
# 「スランプ？」
line = "「スランプ？」"

[[dialogue]]
speaker = "イクシリオン"
# 「はい。最近は、会長の妄想をしても……なぜか手が触れただけでドキドキしてしまうような――」
line = "「はい。最近は、会長の妄想をしても……なぜか手が触れただけでドキドキしてしまうような――」"

[[dialogue]]
speaker = "イクシリオン"
# 「全然エッチじゃない、<b>プラトニック</b>な妄想ばかりするようになってしまったんです……！」
line = "「全然エッチじゃない、<b>プラトニック</b>な妄想ばかりするようになってしまったんです……！」"

[[dialogue]]
speaker = "トワ先生"
# 「えっ？」
line = "「えっ？」"

[[dialogue]]
speaker = "イクシリオン"
# 「会長が私に好きだと言ってくれたり、ただ手を繋いで恋人同士になるような妄想ばかりで……逆に申し訳なくなってしまって……！」
line = "「会長が私に好きだと言ってくれたり、ただ手を繋いで恋人同士になるような妄想ばかりで……逆に申し訳なくなってしまって……！」"

[[dialogue]]
speaker = "イクシリオン"
# 「殿方なら、若い女性とエッチなことをするのは喜んでもらえるだろうとは思っているのですが――」
line = "「殿方なら、若い女性とエッチなことをするのは喜んでもらえるだろうとは思っているのですが――」"

[[dialogue]]
speaker = "イクシリオン"
# 「しかし、勝手に恋人にしてしまうのは、さすがにいけないことなんじゃないかと……！」
line = "「しかし、勝手に恋人にしてしまうのは、さすがにいけないことなんじゃないかと……！」"

[[dialogue]]
speaker = "トワ先生"
# 「いやいや！　なんか色々ズレてる気がするよ！？　偏見も混じってるし！」
line = "「いやいや！　なんか色々ズレてる気がするよ！？　偏見も混じってるし！」"

[[dialogue]]
speaker = "トワ先生"
# 「というかイクシリオンちゃん、会長くんのこと、好きなんだよね？　だったら別におかしくないと思うけど……」
line = "「というかイクシリオンちゃん、会長くんのこと、好きなんだよね？　だったら別におかしくないと思うけど……」"

[[dialogue]]
speaker = "イクシリオン"
# 「えっ？　いえ、好きだなんてそんなおこがましいこと、思っていません！　チョコは、感謝を込めた<b>義理</b>チョコです！」
line = "「えっ？　いえ、好きだなんてそんなおこがましいこと、思っていません！　チョコは、感謝を込めた<b>義理</b>チョコです！」"

[[dialogue]]
speaker = "トワ先生"
# 「えっ！？　もしかして、イクシリオンちゃん……会長くんのことが好きって自覚、ないの？」
line = "「えっ！？　もしかして、イクシリオンちゃん……会長くんのことが好きって自覚、ないの？」"

[[dialogue]]
speaker = "イクシリオン"
# 「えぇっ！？　わ、私……会長のことが好きだったんですか！？」
line = "「えぇっ！？　わ、私……会長のことが好きだったんですか！？」"

[[dialogue]]
speaker = "トワ先生"
# 「本当に今気づいたの！？」
line = "「本当に今気づいたの！？」"

[[dialogue]]
speaker = "イクシリオン"
# 「ま、待ってください……じゃあ、最近エッチな妄想ができなくなったのは……」
line = "「ま、待ってください……じゃあ、最近エッチな妄想ができなくなったのは……」"

[[dialogue]]
speaker = "トワ先生"
# 「えっと……多分、恋のドキドキが勝っちゃった感じなんじゃないかな……？」
line = "「えっと……多分、恋のドキドキが勝っちゃった感じなんじゃないかな……？」"

[[dialogue]]
speaker = "イクシリオン"
# 「ああああああっ！？！？　そ、そんな……恥ずかしい～～っ！！」
line = "「ああああああっ！？！？　そ、そんな……恥ずかしい～～っ！！」"

[[dialogue]]
speaker = "トワ先生"
# 「うん……今まで自覚がなかったのが、むしろすごいビックリだよ……」
line = "「うん……今まで自覚がなかったのが、むしろすごいビックリだよ……」"

[[dialogue]]
speaker = "イクシリオン"
# 「うぅ……バレンタインフォームが解除できないのも、このスランプが関係してるのかもしれないと思っていたのですが……」
line = "「うぅ……バレンタインフォームが解除できないのも、このスランプが関係してるのかもしれないと思っていたのですが……」"

[[dialogue]]
speaker = "トワ先生"
# 「一応、無関係とは言えないかもしれないね。会長くんのことを思う気持ちが強すぎて、フォームの力まで暴走しちゃってるのかも……」
line = "「一応、無関係とは言えないかもしれないね。会長くんのことを思う気持ちが強すぎて、フォームの力まで暴走しちゃってるのかも……」"

[[dialogue]]
speaker = "unk"
# ショックを受けたように、イクシリオンはさらに肩を落とす。
line = "ショックを受けたように、イクシリオンはさらに肩を落とす。"

[[dialogue]]
speaker = "イクシリオン"
# 「……だとしたら、これって直せるんでしょうか？」
line = "「……だとしたら、これって直せるんでしょうか？」"

[[dialogue]]
speaker = "イクシリオン"
# 「私、妄想癖を直そうと、本やネットで何度も調べて対策しようとしてきました……」
line = "「私、妄想癖を直そうと、本やネットで何度も調べて対策しようとしてきました……」"

[[dialogue]]
speaker = "イクシリオン"
# 「でも、どうしてもダメで……今回ついに、周りまで巻き込むような事態まで引き起こしてしまって……」
line = "「でも、どうしてもダメで……今回ついに、周りまで巻き込むような事態まで引き起こしてしまって……」"

[[dialogue]]
speaker = "イクシリオン"
# 「この悪い癖は、どうすれば直せるんでしょうか……？」
line = "「この悪い癖は、どうすれば直せるんでしょうか……？」"

[[dialogue]]
speaker = "unk"
# トワはそんなイクシリオンに歩み寄り、そっと肩に手を置く。
line = "トワはそんなイクシリオンに歩み寄り、そっと肩に手を置く。"

[[dialogue]]
speaker = "トワ先生"
# 「イクシリオンちゃん――その妄想癖は、直す必要なんてないよ。それは強みにもなるから」
line = "「イクシリオンちゃん――その妄想癖は、直す必要なんてないよ。それは強みにもなるから」"

[[dialogue]]
speaker = "イクシリオン"
# 「強み……？」
line = "「強み……？」"

[[dialogue]]
speaker = "トワ先生"
# 「そう。『何かに夢中になる』ってことは、悪いことじゃない。むしろ他の人にはない集中力を持ってるってことだよ」
line = "「そう。『何かに夢中になる』ってことは、悪いことじゃない。むしろ他の人にはない集中力を持ってるってことだよ」"

[[dialogue]]
speaker = "トワ先生"
# 「イクシリオンちゃんはまだ、バレンタインフォームを上手く制御できてないだけで――」
line = "「イクシリオンちゃんはまだ、バレンタインフォームを上手く制御できてないだけで――」"

[[dialogue]]
speaker = "トワ先生"
# 「使いこなせば、妄想癖は『極限の集中力』として、力に変えられるはず」
line = "「使いこなせば、妄想癖は『極限の集中力』として、力に変えられるはず」"

[[dialogue]]
speaker = "イクシリオン"
# 「私の妄想癖が……力に……？　本当に、そんなことが……？」
line = "「私の妄想癖が……力に……？　本当に、そんなことが……？」"

[[dialogue]]
speaker = "トワ先生"
# 「……先生もさ、体の細胞が星力で『自動回復』しちゃうっていう、特殊体質を持ってるんだ」
line = "「……先生もさ、体の細胞が星力で『自動回復』しちゃうっていう、特殊体質を持ってるんだ」"

[[dialogue]]
speaker = "トワ先生"
# 「そのせいで今も時々、自分だけいつまでも大人に成長できてないような……そういうネガティブな気分になる時がある」
line = "「そのせいで今も時々、自分だけいつまでも大人に成長できてないような……そういうネガティブな気分になる時がある」"

[[dialogue]]
speaker = "トワ先生"
# 「だけどさ、考え方をポジティブに変えれば、そのおかげで私は他の人よりもずっと長く、星騎士として戦い続けることができるんだよね」
line = "「だけどさ、考え方をポジティブに変えれば、そのおかげで私は他の人よりもずっと長く、星騎士として戦い続けることができるんだよね」"

[[dialogue]]
speaker = "トワ先生"
# 「つまりそれって、他の人よりも長く、星騎士として強くなれるチャンスがあるってことでしょ？」
line = "「つまりそれって、他の人よりも長く、星騎士として強くなれるチャンスがあるってことでしょ？」"

[[dialogue]]
speaker = "トワ先生"
# （……そう思えるようになったのは、私も割と最近になって――会長くんやメイプルちゃんたちと出会ってからだけど）
line = "（……そう思えるようになったのは、私も割と最近になって――会長くんやメイプルちゃんたちと出会ってからだけど）"

[[dialogue]]
speaker = "トワ先生"
# 「――だから、イクシリオンちゃんも、考え方を少し変えてみよう」
line = "「――だから、イクシリオンちゃんも、考え方を少し変えてみよう」"

[[dialogue]]
speaker = "トワ先生"
# 「妄想癖は『直す』んじゃなく『鍛える』。集中力として磨けば、それはあなただけの強みになる」
line = "「妄想癖は『直す』んじゃなく『鍛える』。集中力として磨けば、それはあなただけの強みになる」"

[[dialogue]]
speaker = "トワ先生"
# 「だから、自分を卑下しないで。自信を持って」
line = "「だから、自分を卑下しないで。自信を持って」"

[[dialogue]]
speaker = "トワ先生"
# 「イクシリオンちゃんが頑張りたいと思うなら――トワ先生が、いくらでも力になるから！」
line = "「イクシリオンちゃんが頑張りたいと思うなら――トワ先生が、いくらでも力になるから！」"

[[dialogue]]
speaker = "イクシリオン"
# 「先生……」
line = "「先生……」"

[[dialogue]]
speaker = "unk"
# ――と、その時。
line = "――と、その時。"

[[dialogue]]
speaker = "ルルカ"
# 「お邪魔しま～す♪　……あれ？」
line = "「お邪魔しま～す♪　……あれ？」"

[[dialogue]]
speaker = "ルルカ"
# 「トワ先生？　どうして新星寮に？　それにイクシリオンちゃんも……その衣装、どうしたの？」
line = "「トワ先生？　どうして新星寮に？　それにイクシリオンちゃんも……その衣装、どうしたの？」"

[[dialogue]]
speaker = "トワ先生"
# 「ルルカちゃん……？」
line = "「ルルカちゃん……？」"

[[dialogue]]
speaker = "unk"
# 新星寮に現れたルルカは、トワとイクシリオンの姿を見て、不思議そうに目をぱちくりさせるのだった。
line = "新星寮に現れたルルカは、トワとイクシリオンの姿を見て、不思議そうに目をぱちくりさせるのだった。"
