[[dialogue]]
speaker = "unk"
# 新型モンスターを撃破したゴールデングースの面々は、疲れを露わにしながら事務所へと帰還した。
line = "新型モンスターを撃破したゴールデングースの面々は、疲れを露わにしながら事務所へと帰還した。"

[[dialogue]]
speaker = "ヒマワリ"
# 「はー、疲れたー……」
line = "「はー、疲れたー……」"

[[dialogue]]
speaker = "セナリィ"
# 「犯罪者には逃げられてしまいましたけど、あのような邪魔が入ってしまったなら、やむを得ませんわね」
line = "「犯罪者には逃げられてしまいましたけど、あのような邪魔が入ってしまったなら、やむを得ませんわね」"

[[dialogue]]
speaker = "セナリィ"
# 「私が出遅れたことで、あなたたちに怖い想いをさせたことについて謝罪しますわ。ごめんなさい」
line = "「私が出遅れたことで、あなたたちに怖い想いをさせたことについて謝罪しますわ。ごめんなさい」"

[[dialogue]]
speaker = "ミウ"
# 「謝らないでください！　危ないところを助けていただき、ありがとうございます。私たち、自分の力を過信していました」
line = "「謝らないでください！　危ないところを助けていただき、ありがとうございます。私たち、自分の力を過信していました」"

[[dialogue]]
speaker = "セナリィ"
# 「この数週間の起動テストで少しは飼い慣らしたつもりでしたけど、まったく、とんだじゃじゃ馬ですわ」
line = "「この数週間の起動テストで少しは飼い慣らしたつもりでしたけど、まったく、とんだじゃじゃ馬ですわ」"

[[dialogue]]
speaker = "ミウ"
# 「<ruby=エンプレス>女帝</ruby>フォーム……先ほどの社長のお姿ですよね」
line = "「<ruby>女帝<rt>エンプレス</rt></ruby>フォーム……先ほどの社長のお姿ですよね」"

[[dialogue]]
speaker = "セナリィ"
# 「ええ。あなたたちに内緒にしていた企業秘密とはアレのことですわ」
line = "「ええ。あなたたちに内緒にしていた企業秘密とはアレのことですわ」"

[[dialogue]]
speaker = "ヒマワリ"
# 「めちゃ格好良かったです！　まるでスーパーロボットの必殺技でした！」
line = "「めちゃ格好良かったです！　まるでスーパーロボットの必殺技でした！」"

[[dialogue]]
speaker = "ミウ"
# 「あんな隠し玉があったなんて……私たちにまだ話せないのでしたら無理には尋ねませんけど、どうして内緒にされてたんですか？」
line = "「あんな隠し玉があったなんて……私たちにまだ話せないのでしたら無理には尋ねませんけど、どうして内緒にされてたんですか？」"

[[dialogue]]
speaker = "セナリィ"
# 「今のあなたたちなら信頼が置けますし、そろそろ話しておいた方が良さそうですわね」
line = "「今のあなたたちなら信頼が置けますし、そろそろ話しておいた方が良さそうですわね」"

[[dialogue]]
speaker = "セナリィ"
# 「<ruby=エンプレス>女帝</ruby>フォームは従来の戦闘服より遥かに強力ですが、起動時間や星力消費に難がありますの」
line = "「<ruby>女帝<rt>エンプレス</rt></ruby>フォームは従来の戦闘服より遥かに強力ですが、起動時間や星力消費に難がありますの」"

[[dialogue]]
speaker = "セナリィ"
# 「空っぽからフル充填するのに丸１日以上かかりますわ。そして、稼働時間は節約しても、いいとこ２０分」
line = "「空っぽからフル充填するのに丸１日以上かかりますわ。そして、稼働時間は節約しても、いいとこ２０分」"

[[dialogue]]
speaker = "ミウ"
# 「丸１日チャージして、２０分ですか……！？　燃費悪すぎ……！」
line = "「丸１日チャージして、２０分ですか……！？　燃費悪すぎ……！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「どうして、そんな星力食い虫を使ってるんですか？　社長ならいつもの姿でもパパパーッ！　とやっつけられるじゃないですか」
line = "「どうして、そんな星力食い虫を使ってるんですか？　社長ならいつもの姿でもパパパーッ！　とやっつけられるじゃないですか」"

[[dialogue]]
speaker = "セナリィ"
# 「新型モンスターと戦闘したのなら、理解したのではありませんの？　あいつらは並の星騎士では倒せない」
line = "「新型モンスターと戦闘したのなら、理解したのではありませんの？　あいつらは並の星騎士では倒せない」"

[[dialogue]]
speaker = "ミウ"
# 「それは確かに……まったく歯が立ちませんでした」
line = "「それは確かに……まったく歯が立ちませんでした」"

[[dialogue]]
speaker = "セナリィ"
# 「あなたたちは決して弱くない。並以上の能力を持つあなたたちですら手も足も出なかったのですから、私でも苦戦を強いられるのは必至ですわ」
line = "「あなたたちは決して弱くない。並以上の能力を持つあなたたちですら手も足も出なかったのですから、私でも苦戦を強いられるのは必至ですわ」"

[[dialogue]]
speaker = "セナリィ"
# 「故に、使い慣れていなくとも、新たなる強大な力に頼った」
line = "「故に、使い慣れていなくとも、新たなる強大な力に頼った」"

[[dialogue]]
speaker = "セナリィ"
# 「しかし、この疑似ノヴァフォームはまだ試作段階。九浄へレナ様に頼まれて、ゴールデングースで試験運用を行っているんですのよ」
line = "「しかし、この疑似ノヴァフォームはまだ試作段階。九浄へレナ様に頼まれて、ゴールデングースで試験運用を行っているんですのよ」"

[[dialogue]]
speaker = "セナリィ"
# 「<ruby=エンプレス>女帝</ruby>フォームの運用結果次第では、疑似ノヴァフォームの量産化も見込まれることでしょう。忌むべき新型モンスターたちの殲滅にも一役買うわけです」
line = "「<ruby>女帝<rt>エンプレス</rt></ruby>フォームの運用結果次第では、疑似ノヴァフォームの量産化も見込まれることでしょう。忌むべき新型モンスターたちの殲滅にも一役買うわけです」"

[[dialogue]]
speaker = "ヒマワリ"
# 「すっ……すっごーーーーい！　さっすがはあたしたちの社長です！」
line = "「すっ……すっごーーーーい！　さっすがはあたしたちの社長です！」"

[[dialogue]]
speaker = "ミウ"
# 「九浄家の一大事業に、ゴールデングースが一枚噛んでるってことですよね！」
line = "「九浄家の一大事業に、ゴールデングースが一枚噛んでるってことですよね！」"

[[dialogue]]
speaker = "セナリィ"
# 「そういうことになりますわね。もちろん、女帝の名を冠するに相応しい、私の類稀なる実力を見込まれてのものですわ！」
line = "「そういうことになりますわね。もちろん、女帝の名を冠するに相応しい、私の類稀なる実力を見込まれてのものですわ！」"

[[dialogue]]
speaker = "ミウ"
# 「未来を見据えた最新装備の試験運用を任されているだなんて！　さすがはセナリィ社長！　まだ見習いとはいえ、ゴールデングースにいることが誇らしいです！」
line = "「未来を見据えた最新装備の試験運用を任されているだなんて！　さすがはセナリィ社長！　まだ見習いとはいえ、ゴールデングースにいることが誇らしいです！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「疑似ノヴァフォームが量産化されたら、テスト運用を務めあげたセナリィ社長の名前が、一生刻まれて！　ゴールデングースの評判も鰻登り！」
line = "「疑似ノヴァフォームが量産化されたら、テスト運用を務めあげたセナリィ社長の名前が、一生刻まれて！　ゴールデングースの評判も鰻登り！」"

[[dialogue]]
speaker = "セナリィ"
# 「え、ええ！　当然、そういう流れになりますわね！」
line = "「え、ええ！　当然、そういう流れになりますわね！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「でも、こんなに燃費が悪いんじゃ、量産化にはまだまだ先は長そうですよねー」
line = "「でも、こんなに燃費が悪いんじゃ、量産化にはまだまだ先は長そうですよねー」"

[[dialogue]]
speaker = "セナリィ"
# 「今までの比ではない性能を持つ以上、過度なエネルギー消費も仕方のないことなのでしょうけど……ここを解決しないことには、量産化は夢のまた夢ですわね」
line = "「今までの比ではない性能を持つ以上、過度なエネルギー消費も仕方のないことなのでしょうけど……ここを解決しないことには、量産化は夢のまた夢ですわね」"

[[dialogue]]
speaker = "ミウ"
# 「巨大なタンクをつけるわけにもいかないですし……星力がすぐに枯渇してしまうなら、再充填できる方法さえ見つかれば……」
line = "「巨大なタンクをつけるわけにもいかないですし……星力がすぐに枯渇してしまうなら、再充填できる方法さえ見つかれば……」"

[[dialogue]]
speaker = "セナリィ"
# 「それが簡単に思いつけば苦労はしませんわ。さ、あなたたちはもうお家に帰る時間ですわよ。今日も一日、お疲れさま」
line = "「それが簡単に思いつけば苦労はしませんわ。さ、あなたたちはもうお家に帰る時間ですわよ。今日も一日、お疲れさま」"

[[dialogue]]
speaker = "ヒマワリ"
# 「はい！　お疲れさまでした！」
line = "「はい！　お疲れさまでした！」"

[[dialogue]]
speaker = "ミウ"
# 「お先に失礼します」
line = "「お先に失礼します」"

[[dialogue]]
speaker = "セナリィ"
# 「ふう……２人とも行きましたわね。なんとかバレずに済みましたわ……あいたたたた……！」
line = "「ふう……２人とも行きましたわね。なんとかバレずに済みましたわ……あいたたたた……！」"

[[dialogue]]
speaker = "セナリィ"
# 「<ruby=エンプレス>女帝</ruby>フォームの弱点はもうひとつ……全力を出した後、全身がとんでもない筋肉痛に襲われることですわ……！」
line = "「<ruby>女帝<rt>エンプレス</rt></ruby>フォームの弱点はもうひとつ……全力を出した後、全身がとんでもない筋肉痛に襲われることですわ……！」"

[[dialogue]]
speaker = "セナリィ"
# 「まったく、とんでもない暴れ馬ですわ──いだだだだだ！」
line = "「まったく、とんでもない暴れ馬ですわ──いだだだだだ！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「あたしたちには隠してたみたいだけど、セナリィ社長、苦しそうだったね。あれだけ凄いパワーだと体にかかる負荷もヤバいんだろーなー」
line = "「あたしたちには隠してたみたいだけど、セナリィ社長、苦しそうだったね。あれだけ凄いパワーだと体にかかる負荷もヤバいんだろーなー」"

[[dialogue]]
speaker = "ヒマワリ"
# 「あたしたちのために頑張ってくれてるセナリィ社長のためにも、もっと頑張らなきゃだね、ミウ──」
line = "「あたしたちのために頑張ってくれてるセナリィ社長のためにも、もっと頑張らなきゃだね、ミウ──」"

[[dialogue]]
speaker = "ミウ"
# 「うーん……エネルギー問題かぁ……ヒマワリちゃんの星術を駆使すれば、或いは──」
line = "「うーん……エネルギー問題かぁ……ヒマワリちゃんの星術を駆使すれば、或いは──」"

[[dialogue]]
speaker = "ヒマワリ"
# 「おっ、ミウがプランニングモードに入ってんねー」
line = "「おっ、ミウがプランニングモードに入ってんねー」"

[[dialogue]]
speaker = "ヒマワリ"
# 「ミウのことだから、きっとスッゴいアイデアが思いついちゃうんだろうなー。楽しみにしておこーっと♪」
line = "「ミウのことだから、きっとスッゴいアイデアが思いついちゃうんだろうなー。楽しみにしておこーっと♪」"
