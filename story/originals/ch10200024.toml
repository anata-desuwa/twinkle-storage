[[dialogue]]
speaker = "unk"
# 第４話,潮騒オンステージ,P
line = "第４話,潮騒オンステージ,P"

[[dialogue]]
speaker = "unk"
# 今日のリゾート結界は、学園生以外の一般客もやってくる日だ。
line = "今日のリゾート結界は、学園生以外の一般客もやってくる日だ。"

[[dialogue]]
speaker = "unk"
# 俺とルルカも今日ばかりは配信活動の打ち合わせはお休み。海水浴デートをしようということになり──
line = "俺とルルカも今日ばかりは配信活動の打ち合わせはお休み。海水浴デートをしようということになり──"

[[dialogue]]
speaker = "ルルカ"
# 「うわわわっ、すごい人だぁ～っ……！？」
line = "「うわわわっ、すごい人だぁ～っ……！？」"

[[dialogue]]
speaker = "unk"
# ルルカ、手を繋ごうか
line = "ルルカ、手を繋ごうか"

[[dialogue]]
speaker = "ルルカ"
# 「わっ……<emoji=heart04>　えへへ、お兄ちゃん、ありがとう。助かっちゃった」
line = "「わっ……<emoji=heart04>　えへへ、お兄ちゃん、ありがとう。助かっちゃった」"

[[dialogue]]
speaker = "ルルカ"
# 「いつも打ち合わせの時は、普通の人は入れないプライベートビーチの方に入れてもらっちゃってたけど……」
line = "「いつも打ち合わせの時は、普通の人は入れないプライベートビーチの方に入れてもらっちゃってたけど……」"

[[dialogue]]
speaker = "ルルカ"
# 「一般開放のリゾート結界って、お休みの日はこんなに賑わうんだね。びっくりしちゃった」
line = "「一般開放のリゾート結界って、お休みの日はこんなに賑わうんだね。びっくりしちゃった」"

[[dialogue]]
speaker = "unk"
# 今日は日曜日だしな
line = "今日は日曜日だしな"

[[dialogue]]
speaker = "ルルカ"
# 「そうだね！　それに季節関係なく海水浴ができるっていうのも素敵だし、人が集まるのも納得かな～」
line = "「そうだね！　それに季節関係なく海水浴ができるっていうのも素敵だし、人が集まるのも納得かな～」"

[[dialogue]]
speaker = "ルルカ"
# 「今日はいっぱい遊ぼうね、お兄ちゃん！　ここのところ夜まで配信続きだったから、あたしも羽を伸ばしたいし……！」
line = "「今日はいっぱい遊ぼうね、お兄ちゃん！　ここのところ夜まで配信続きだったから、あたしも羽を伸ばしたいし……！」"

[[dialogue]]
speaker = "ルルカ"
# 「お兄ちゃんも今日のために星徒会のお仕事、頑張って片付けてくれたんだよね？　あたし知ってるよ♪」
line = "「お兄ちゃんも今日のために星徒会のお仕事、頑張って片付けてくれたんだよね？　あたし知ってるよ♪」"

[[dialogue]]
speaker = "ルルカ"
# 「素敵なデートにしようね、お兄ちゃん。さっそく泳ぐのもいいけどちょうどお昼時だし……何か食べてからにしよっか」
line = "「素敵なデートにしようね、お兄ちゃん。さっそく泳ぐのもいいけどちょうどお昼時だし……何か食べてからにしよっか」"

[[dialogue]]
speaker = "ルルカ"
# 「……うん！　リップルさんおすすめの焼きそば、気になってたんだ～！　一緒に並ぼう、お兄ちゃん！」
line = "「……うん！　リップルさんおすすめの焼きそば、気になってたんだ～！　一緒に並ぼう、お兄ちゃん！」"

[[dialogue]]
speaker = "ルルカ"
# 「ふー、ごちそうさま♪　おいしかった～<emoji=heart04>」
line = "「ふー、ごちそうさま♪　おいしかった～<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
# 「プライベートビーチみたいに貸し切るのも贅沢でいいけど、賑やかな海もやっぱりいいね、お兄ちゃん！」
line = "「プライベートビーチみたいに貸し切るのも贅沢でいいけど、賑やかな海もやっぱりいいね、お兄ちゃん！」"

[[dialogue]]
speaker = "ルルカ"
# 「みんな楽しそうだし、海はきれいで大きいし……うーん♪　新曲のインスピレーションも沸いて来ちゃいそうだよ～♪」
line = "「みんな楽しそうだし、海はきれいで大きいし……うーん♪　新曲のインスピレーションも沸いて来ちゃいそうだよ～♪」"

[[dialogue]]
speaker = "ルルカ"
# 「それじゃあ何して遊ぼっか。海に泳ぎに行く？　イルカの浮き輪、一緒に使っちゃうのもいいよね♪」
line = "「それじゃあ何して遊ぼっか。海に泳ぎに行く？　イルカの浮き輪、一緒に使っちゃうのもいいよね♪」"

[[dialogue]]
speaker = "unk"
# それもいいけど、あれは？
line = "それもいいけど、あれは？"

[[dialogue]]
speaker = "ルルカ"
# 「ん？　なんだか舞台が設置されてるね……？　アンプとか、マイクを準備してる人もいる……」
line = "「ん？　なんだか舞台が設置されてるね……？　アンプとか、マイクを準備してる人もいる……」"

[[dialogue]]
speaker = "ルルカ"
# 「あのー、すみません。これって何が始まるんですか？」
line = "「あのー、すみません。これって何が始まるんですか？」"

[[dialogue]]
speaker = "お姉さん"
# 「野外ライブよ！　とは言っても、有志で参加するカラオケ大会みたいな感じのゆる～いやつだけどね」
line = "「野外ライブよ！　とは言っても、有志で参加するカラオケ大会みたいな感じのゆる～いやつだけどね」"

[[dialogue]]
speaker = "ルルカ"
# 「は～。のど自慢大会、みたいな？」
line = "「は～。のど自慢大会、みたいな？」"

[[dialogue]]
speaker = "お姉さん"
# 「ええ。あなたも歌に自信があったら出てみたら？」
line = "「ええ。あなたも歌に自信があったら出てみたら？」"

[[dialogue]]
speaker = "ルルカ"
# 「あ、でもあたしは～……」
line = "「あ、でもあたしは～……」"

[[dialogue]]
speaker = "お姉さん"
# 「あら。彼氏さんとデートだったのね。ふふ、ごめんなさい」
line = "「あら。彼氏さんとデートだったのね。ふふ、ごめんなさい」"

[[dialogue]]
speaker = "ルルカ"
# 「い、いえ！　ありがとうございました～」
line = "「い、いえ！　ありがとうございました～」"

[[dialogue]]
speaker = "ルルカ"
# 「ね、お兄ちゃん。歌のライブがあるんだって～。ちょっと聴いて行こっか。楽しそう！」
line = "「ね、お兄ちゃん。歌のライブがあるんだって～。ちょっと聴いて行こっか。楽しそう！」"

[[dialogue]]
speaker = "unk"
# ルルカも参加してみたら？
line = "ルルカも参加してみたら？"

[[dialogue]]
speaker = "ルルカ"
# 「えっ……でもせっかくのデートだし。それにあたし、何も準備してないし……」
line = "「えっ……でもせっかくのデートだし。それにあたし、何も準備してないし……」"

[[dialogue]]
speaker = "unk"
# ルルカの歌が聴きたいな
line = "ルルカの歌が聴きたいな"

[[dialogue]]
speaker = "ルルカ"
# 「うっ──そ、そういうことを言われちゃうと……うんっ」
line = "「うっ──そ、そういうことを言われちゃうと……うんっ」"

[[dialogue]]
speaker = "ルルカ"
# 「期待に応えるしかないよね！　そうだよね。お兄ちゃんには『ルカルカ』としての歌はたくさん届けてるけど……」
line = "「期待に応えるしかないよね！　そうだよね。お兄ちゃんには『ルカルカ』としての歌はたくさん届けてるけど……」"

[[dialogue]]
speaker = "ルルカ"
# 「あたし、海野辺ルルカとしての歌はあんまり聴いてもらってないかも。よ～しっ……！」
line = "「あたし、海野辺ルルカとしての歌はあんまり聴いてもらってないかも。よ～しっ……！」"

[[dialogue]]
speaker = "ルルカ"
# 「お兄ちゃん、参加してくるね！　頑張って歌うから、最前列で聴いて欲しいな！」
line = "「お兄ちゃん、参加してくるね！　頑張って歌うから、最前列で聴いて欲しいな！」"

[[dialogue]]
speaker = "unk"
# まかせろ！
line = "まかせろ！"

[[dialogue]]
speaker = "ルルカ"
# 「うんっ！　それじゃあ、行ってきま～すっ！」
line = "「うんっ！　それじゃあ、行ってきま～すっ！」"

[[dialogue]]
speaker = "unk"
# ──こうして海の家の歌唱ライブは大盛況となった。
line = "──こうして海の家の歌唱ライブは大盛況となった。"

[[dialogue]]
speaker = "unk"
# ルルカがステージで歌った曲は、かつて彼女が作曲した『恋と海』をテーマにした汐ルカルカの有名なナンバー。
line = "ルルカがステージで歌った曲は、かつて彼女が作曲した『恋と海』をテーマにした汐ルカルカの有名なナンバー。"

[[dialogue]]
speaker = "unk"
# 俺にとっても特別な曲を、屋外のステージで聴くのは、とても贅沢な時間だった──
line = "俺にとっても特別な曲を、屋外のステージで聴くのは、とても贅沢な時間だった──"

[[dialogue]]
speaker = "ルルカ"
# 「ただいま、お兄ちゃん！　どうだったかな♪」
line = "「ただいま、お兄ちゃん！　どうだったかな♪」"

[[dialogue]]
speaker = "unk"
# 最高だった……！
line = "最高だった……！"

[[dialogue]]
speaker = "ルルカ"
# 「えへへっ、そう言ってもらえてホッとしたよ～。あの曲、お兄ちゃんのために書き下ろしたやつだったから」
line = "「えへへっ、そう言ってもらえてホッとしたよ～。あの曲、お兄ちゃんのために書き下ろしたやつだったから」"

[[dialogue]]
speaker = "ルルカ"
# 「あたし、やっぱり歌が好き。いつかお母さんみたいな歌手になりたいって、生の観客を前にして改めて思っちゃった」
line = "「あたし、やっぱり歌が好き。いつかお母さんみたいな歌手になりたいって、生の観客を前にして改めて思っちゃった」"

[[dialogue]]
speaker = "ルルカ"
# 「これからもっと上手になって、もっともっと人気になってみせるから。お兄ちゃんも最前列で応援してね。約束だよっ！」
line = "「これからもっと上手になって、もっともっと人気になってみせるから。お兄ちゃんも最前列で応援してね。約束だよっ！」"

[[dialogue]]
speaker = "unk"
# 嬉しそうにはにかむルルカを見て、これからも誰よりも近くで彼女を支えていこうと思うのだった──
line = "嬉しそうにはにかむルルカを見て、これからも誰よりも近くで彼女を支えていこうと思うのだった──"
