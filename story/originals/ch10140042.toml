[[dialogue]]
speaker = "unk"
# 第２話,トワ先生と大人の飲み会,P
line = "第２話,トワ先生と大人の飲み会,P"

[[dialogue]]
speaker = "unk"
# その日、トワは学園ＯＧの友人２人――リコリンフィアとマリオンに呼ばれ、リゾート結界のプライベートビーチへとやって来ていた。
line = "その日、トワは学園ＯＧの友人２人――リコリンフィアとマリオンに呼ばれ、リゾート結界のプライベートビーチへとやって来ていた。"

[[dialogue]]
speaker = "トワ先生"
# 「はあぁ～、やっと今日の仕事、終わったぁ～」
line = "「はあぁ～、やっと今日の仕事、終わったぁ～」"

[[dialogue]]
speaker = "リコリンフィア"
# 「やっと来たか。もう飲み始めてるぞ」
line = "「やっと来たか。もう飲み始めてるぞ」"

[[dialogue]]
speaker = "マリオン"
# 「お疲れ様です、トワ。まずはいつも通り、ビールの大ジョッキでよろしいですか？」
line = "「お疲れ様です、トワ。まずはいつも通り、ビールの大ジョッキでよろしいですか？」"

[[dialogue]]
speaker = "unk"
# マリオンは能力で人形を出しており、１人はリコリンフィアの隣でワインを傾け、もう１人はメイド姿で調理と給仕を担当していた。
line = "マリオンは能力で人形を出しており、１人はリコリンフィアの隣でワインを傾け、もう１人はメイド姿で調理と給仕を担当していた。"

[[dialogue]]
speaker = "トワ先生"
# 「うん、お願い～。マリオンの手料理、久しぶりだから今日は楽しみにしてたんだよね～」
line = "「うん、お願い～。マリオンの手料理、久しぶりだから今日は楽しみにしてたんだよね～」"

[[dialogue]]
speaker = "リコリンフィア"
# 「マリオン、こっちも大ジョッキを追加で頼む」
line = "「マリオン、こっちも大ジョッキを追加で頼む」"

[[dialogue]]
speaker = "マリオン"
# 「は～い♪　すぐにお持ちしますね」
line = "「は～い♪　すぐにお持ちしますね」"

[[dialogue]]
speaker = "unk"
# そうして、大人３人の飲み会がゆるやかに始まった。
line = "そうして、大人３人の飲み会がゆるやかに始まった。"

[[dialogue]]
speaker = "トワ先生"
# 「ぷはぁ～っ！　やっぱり仕事終わりのビールは最高～<emoji=heart04>　疲れた体に染み渡るぅ～！」
line = "「ぷはぁ～っ！　やっぱり仕事終わりのビールは最高～<emoji=heart04>　疲れた体に染み渡るぅ～！」"

[[dialogue]]
speaker = "トワ先生"
# 「それに、マリオン特製の『たこわさ』も相変わらず絶品！　やっぱり星見家の元メイド長は違うよね～♪」
line = "「それに、マリオン特製の『たこわさ』も相変わらず絶品！　やっぱり星見家の元メイド長は違うよね～♪」"

[[dialogue]]
speaker = "unk"
# たこわさ――たこをわさびと塩麹、調味料などで和えた塩辛の一種である。トワはこれが大好物で、家でもよく自分で作るほどだった。
line = "たこわさ――たこをわさびと塩麹、調味料などで和えた塩辛の一種である。トワはこれが大好物で、家でもよく自分で作るほどだった。"

[[dialogue]]
speaker = "マリオン"
# 「ふふっ、おかわりしたい時はすぐに作りますから、言って下さいね」
line = "「ふふっ、おかわりしたい時はすぐに作りますから、言って下さいね」"

[[dialogue]]
speaker = "リコリンフィア"
# 「……トワ、言動がちょっと親父くさいぞ？　実年齢より精神年齢の方が上に見える」
line = "「……トワ、言動がちょっと親父くさいぞ？　実年齢より精神年齢の方が上に見える」"

[[dialogue]]
speaker = "トワ先生"
# 「うっ！？　べ、別に、リコとマリオンの前くらいでしか、こういうことは言わないからっ！」
line = "「うっ！？　べ、別に、リコとマリオンの前くらいでしか、こういうことは言わないからっ！」"

[[dialogue]]
speaker = "リコリンフィア"
# 「本当か～？　会長の前や、メイプルの前で気が緩んで、ついポロッと出てたりしないのか？」
line = "「本当か～？　会長の前や、メイプルの前で気が緩んで、ついポロッと出てたりしないのか？」"

[[dialogue]]
speaker = "トワ先生"
# 「か、会長くんの前では絶対に言ってないからっ！」
line = "「か、会長くんの前では絶対に言ってないからっ！」"

[[dialogue]]
speaker = "マリオン"
# 「まあまあ、うふふっ♪　メイプル様の前ではつい気が緩んじゃってるんですね～。まるで姉妹みたいに仲のよろしいことで♪」
line = "「まあまあ、うふふっ♪　メイプル様の前ではつい気が緩んじゃってるんですね～。まるで姉妹みたいに仲のよろしいことで♪」"

[[dialogue]]
speaker = "トワ先生"
# 「はうっ……！　だ、だって疲れた時にビール飲んだら、つい言いたくなっちゃうというか……！　ほら、お風呂に入って『あぁ～』って声出るのと一緒、みたいな！？」
line = "「はうっ……！　だ、だって疲れた時にビール飲んだら、つい言いたくなっちゃうというか……！　ほら、お風呂に入って『あぁ～』って声出るのと一緒、みたいな！？」"

[[dialogue]]
speaker = "リコリンフィア"
# 「ははっ。相変わらず正直者だな、お前は」
line = "「ははっ。相変わらず正直者だな、お前は」"

[[dialogue]]
speaker = "unk"
# リコリンフィアは軽くグラスを揺らしながら、少し真面目な声色になる。
line = "リコリンフィアは軽くグラスを揺らしながら、少し真面目な声色になる。"

[[dialogue]]
speaker = "リコリンフィア"
# 「まあ、アルコールは大人にとっての『必要毒』だ。普段なら言えないことも、酒のせいにして言いやすくなる……」
line = "「まあ、アルコールは大人にとっての『必要毒』だ。普段なら言えないことも、酒のせいにして言いやすくなる……」"

[[dialogue]]
speaker = "リコリンフィア"
# 「――というわけで、今日の本題だ。トワ、ぶっちゃけお前……ここ最近、オーバーワーク気味じゃないか？」
line = "「――というわけで、今日の本題だ。トワ、ぶっちゃけお前……ここ最近、オーバーワーク気味じゃないか？」"

[[dialogue]]
speaker = "トワ先生"
# 「えっ！？　な、なんでそう思うの？」
line = "「えっ！？　な、なんでそう思うの？」"

[[dialogue]]
speaker = "リコリンフィア"
# 「先月の残業、１０２時間。労働基準的にギリギリアウトだ」
line = "「先月の残業、１０２時間。労働基準的にギリギリアウトだ」"

[[dialogue]]
speaker = "トワ先生"
# 「リ、リコ、それ調べたの……？」
line = "「リ、リコ、それ調べたの……？」"

[[dialogue]]
speaker = "リコリンフィア"
# 「ああ。こう見えて、私は公安委員会の本部長なんでな」
line = "「ああ。こう見えて、私は公安委員会の本部長なんでな」"

[[dialogue]]
speaker = "トワ先生"
# 「ま、まあ、でも私、能力で『自動回復』あるし、大丈夫だよ！　今月は気を付けるし……」
line = "「ま、まあ、でも私、能力で『自動回復』あるし、大丈夫だよ！　今月は気を付けるし……」"

[[dialogue]]
speaker = "マリオン"
# 「ですが、さっきも『疲れた』って言ってましたよね？」
line = "「ですが、さっきも『疲れた』って言ってましたよね？」"

[[dialogue]]
speaker = "マリオン"
# 「体が勝手に自動回復する特殊体質であっても、精神的な疲労、ストレスなどの心の疲れは癒やせませんよ」
line = "「体が勝手に自動回復する特殊体質であっても、精神的な疲労、ストレスなどの心の疲れは癒やせませんよ」"

[[dialogue]]
speaker = "リコリンフィア"
# 「それと――トワ。お前、最近新しく『バレンタインフォーム』に覚醒したんだろう？　今ここで見せてくれないか？」
line = "「それと――トワ。お前、最近新しく『バレンタインフォーム』に覚醒したんだろう？　今ここで見せてくれないか？」"

[[dialogue]]
speaker = "トワ先生"
# 「こ、こんな感じだけど……」
line = "「こ、こんな感じだけど……」"

[[dialogue]]
speaker = "マリオン"
# 「はああぁっ<emoji=heart04>　実にお似合いです！　とてもお可愛いですよ、トワ<emoji=heart04>　思わずお持ち帰りしたくなってしまうくらい……！」
line = "「はああぁっ<emoji=heart04>　実にお似合いです！　とてもお可愛いですよ、トワ<emoji=heart04>　思わずお持ち帰りしたくなってしまうくらい……！」"

[[dialogue]]
speaker = "リコリンフィア"
# 「ほう、やるじゃないか。私が『リコリン』を生み出す際にモデルにしただけはある。見事な可愛さだと褒めてやろう」
line = "「ほう、やるじゃないか。私が『リコリン』を生み出す際にモデルにしただけはある。見事な可愛さだと褒めてやろう」"

[[dialogue]]
speaker = "トワ先生"
# 「いや、私はあんなにあざとくないからね！？」
line = "「いや、私はあんなにあざとくないからね！？」"

[[dialogue]]
speaker = "マリオン"
# 「私はリコリン様も、大変にお可愛いくて大好きですけどね<emoji=heart04>　ふふっ♪」
line = "「私はリコリン様も、大変にお可愛いくて大好きですけどね<emoji=heart04>　ふふっ♪」"

[[dialogue]]
speaker = "リコリンフィア"
# 「えへへ～♪　マリオンお姉ちゃん、ありがと～☆　リコリン、嬉しい<emoji=heart04>」
line = "「えへへ～♪　マリオンお姉ちゃん、ありがと～☆　リコリン、嬉しい<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
# 「あらあらっ！　うふふふっ<emoji=heart04>　そんなお可愛いらしいことを言うと、今夜はお持ち帰りしちゃいますよ～？」
line = "「あらあらっ！　うふふふっ<emoji=heart04>　そんなお可愛いらしいことを言うと、今夜はお持ち帰りしちゃいますよ～？」"

[[dialogue]]
speaker = "トワ先生"
# 「えっと……２人共、もう酔ってる？」
line = "「えっと……２人共、もう酔ってる？」"

[[dialogue]]
speaker = "マリオン"
# 「いえ、いつも通りです<emoji=heart04>」
line = "「いえ、いつも通りです<emoji=heart04>」"

[[dialogue]]
speaker = "リコリンフィア"
# 「リコリンも、いつも通りの可愛さだよ～☆　てへっ♪」
line = "「リコリンも、いつも通りの可愛さだよ～☆　てへっ♪」"

[[dialogue]]
speaker = "リコリンフィア"
# 「――と、冗談はさておき……これでトワの戦闘服は、通常、ノヴァ、ウェディングフォームに続き、４フォーム目となる」
line = "「――と、冗談はさておき……これでトワの戦闘服は、通常、ノヴァ、ウェディングフォームに続き、４フォーム目となる」"

[[dialogue]]
speaker = "マリオン"
# 「しかも最近になってから覚醒ラッシュが続いています。ここに来てトワは、星騎士として目覚ましい成長を遂げていると言っていいでしょう」
line = "「しかも最近になってから覚醒ラッシュが続いています。ここに来てトワは、星騎士として目覚ましい成長を遂げていると言っていいでしょう」"

[[dialogue]]
speaker = "リコリンフィア"
# 「今や、お前はリクリエ最前線で戦う現星徒会メンバーにも匹敵する実力者だ。真面目な話、流星市国の中でもトップクラスの星騎士と言っていい」
line = "「今や、お前はリクリエ最前線で戦う現星徒会メンバーにも匹敵する実力者だ。真面目な話、流星市国の中でもトップクラスの星騎士と言っていい」"

[[dialogue]]
speaker = "トワ先生"
# 「そんな、私はまだまだ……」
line = "「そんな、私はまだまだ……」"

[[dialogue]]
speaker = "マリオン"
# 「でも実際、前線でよく活躍していると伺いましたよ。会長様たちと一緒に」
line = "「でも実際、前線でよく活躍していると伺いましたよ。会長様たちと一緒に」"

[[dialogue]]
speaker = "リコリンフィア"
# 「だが一方で、星騎士としての活動が増えたからこそ、教師の仕事との両立が大変になり、残業時間が増えている……違うか？」
line = "「だが一方で、星騎士としての活動が増えたからこそ、教師の仕事との両立が大変になり、残業時間が増えている……違うか？」"

[[dialogue]]
speaker = "トワ先生"
# 「……うん。リコの言う通りだよ。最近は戦うことが増えて、仕事も山積みで、残業や休日出勤ばっかり」
line = "「……うん。リコの言う通りだよ。最近は戦うことが増えて、仕事も山積みで、残業や休日出勤ばっかり」"

[[dialogue]]
speaker = "トワ先生"
# 「でもね……私、星騎士として、会長くんたちと一緒に肩を並べて戦える今が、すごく嬉しいんだ」
line = "「でもね……私、星騎士として、会長くんたちと一緒に肩を並べて戦える今が、すごく嬉しいんだ」"

[[dialogue]]
speaker = "トワ先生"
# 「学生の頃からずっと、リコやマリオンみたいに強くなって、みんなと一緒に戦いたいって思ってたから」
line = "「学生の頃からずっと、リコやマリオンみたいに強くなって、みんなと一緒に戦いたいって思ってたから」"

[[dialogue]]
speaker = "リコリンフィア"
# 「だったら――現役の星騎士である私たちのことも、もっと頼れ」
line = "「だったら――現役の星騎士である私たちのことも、もっと頼れ」"

[[dialogue]]
speaker = "トワ先生"
# 「え……？」
line = "「え……？」"

[[dialogue]]
speaker = "リコリンフィア"
# 「お前は昔から、なんでも自分で抱え込もうとする癖がある。自動回復があるからって、他人を頼らなくても勝手に自己解決できるだろうと思い込んでいる」
line = "「お前は昔から、なんでも自分で抱え込もうとする癖がある。自動回復があるからって、他人を頼らなくても勝手に自己解決できるだろうと思い込んでいる」"

[[dialogue]]
speaker = "マリオン"
# 「つまり、トワは自分で思っているよりずっと、『甘え下手』ってことですね♪」
line = "「つまり、トワは自分で思っているよりずっと、『甘え下手』ってことですね♪」"

[[dialogue]]
speaker = "リコリンフィア"
# 「変に理由をつけて、自分を抑え込もうとする。それはお前の長所でもあり、弱点でもある」
line = "「変に理由をつけて、自分を抑え込もうとする。それはお前の長所でもあり、弱点でもある」"

[[dialogue]]
speaker = "トワ先生"
# 「だって私、もう大人で……今は先生だし……」
line = "「だって私、もう大人で……今は先生だし……」"

[[dialogue]]
speaker = "リコリンフィア"
# 「私も大人だが？」
line = "「私も大人だが？」"

[[dialogue]]
speaker = "マリオン"
# 「あと、私たちにとってトワは『先生』ではなく、『同級生』ですよ♪」
line = "「あと、私たちにとってトワは『先生』ではなく、『同級生』ですよ♪」"

[[dialogue]]
speaker = "unk"
# 俺も恋人なので、もっと頼って下さい
line = "俺も恋人なので、もっと頼って下さい"

[[dialogue]]
speaker = "トワ先生"
# 「へっ！？　か、会長くん！？　どうしてここに！？」
line = "「へっ！？　か、会長くん！？　どうしてここに！？」"

[[dialogue]]
speaker = "リコリンフィア"
# 「私が呼んでおいた。トワにはちょうどいい毒になると思ってな」
line = "「私が呼んでおいた。トワにはちょうどいい毒になると思ってな」"

[[dialogue]]
speaker = "リコリンフィア"
# 「肩書きが邪魔なら、それがいらない相手に甘えればいい。そういうことだ」
line = "「肩書きが邪魔なら、それがいらない相手に甘えればいい。そういうことだ」"

[[dialogue]]
speaker = "トワ先生"
# 「……ほんと、昔からリコには敵わないなぁ」
line = "「……ほんと、昔からリコには敵わないなぁ」"

[[dialogue]]
speaker = "リコリンフィア"
# 「ふっ……私は毒のスペシャリストなんでな」
line = "「ふっ……私は毒のスペシャリストなんでな」"

[[dialogue]]
speaker = "マリオン"
# 「うふふっ♪　それでは、会長様もいらっしゃいましたし――改めて、楽しい食事会にいたしましょうか♪」
line = "「うふふっ♪　それでは、会長様もいらっしゃいましたし――改めて、楽しい食事会にいたしましょうか♪」"

[[dialogue]]
speaker = "リコリンフィア"
# 「お兄ちゃ～ん♪　リコリンの隣、空いてるよ～☆　こっちこっち～♪」
line = "「お兄ちゃ～ん♪　リコリンの隣、空いてるよ～☆　こっちこっち～♪」"

[[dialogue]]
speaker = "トワ先生"
# 「いやいや、そこは私の隣でしょ！？　会長くんは私の恋人なんだからっ！」
line = "「いやいや、そこは私の隣でしょ！？　会長くんは私の恋人なんだからっ！」"

[[dialogue]]
speaker = "リコリンフィア"
# 「甘いな、トワ。そんな誘い方じゃ、リコリンの可愛さには敵わないぞ？　モデルとなったトワの『附属生なりきりモード』を見せてみろ」
line = "「甘いな、トワ。そんな誘い方じゃ、リコリンの可愛さには敵わないぞ？　モデルとなったトワの『附属生なりきりモード』を見せてみろ」"

[[dialogue]]
speaker = "unk"
# それ、前から気になってたんですよね
line = "それ、前から気になってたんですよね"

[[dialogue]]
speaker = "マリオン"
# 「それはもう、とってもお可愛いらしかったんですよ<emoji=heart04>　あれはそう、学園時代、附属生の子から頼まれて――」
line = "「それはもう、とってもお可愛いらしかったんですよ<emoji=heart04>　あれはそう、学園時代、附属生の子から頼まれて――」"

[[dialogue]]
speaker = "トワ先生"
# 「ちょっ！？　黒歴史を彼氏に暴露するのはやめてえぇぇ～～～っ！！？」
line = "「ちょっ！？　黒歴史を彼氏に暴露するのはやめてえぇぇ～～～っ！！？」"

[[dialogue]]
speaker = "unk"
# その後、クロトもＯＧ組の輪に加わり、大人たちの賑やかで楽しい夜が笑い声とともに更けていくのだった。
line = "その後、クロトもＯＧ組の輪に加わり、大人たちの賑やかで楽しい夜が笑い声とともに更けていくのだった。"
