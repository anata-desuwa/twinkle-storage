[[dialogue]]
speaker = "unk"
# 第１話,恥じらい忍者への告白方法,P
line = "第１話,恥じらい忍者への告白方法,P"

[[dialogue]]
speaker = "unk"
# これはせつなが正式な『専属忍者』になってから、しばらく経った頃の出来事。
line = "これはせつなが正式な『専属忍者』になってから、しばらく経った頃の出来事。"

[[dialogue]]
speaker = "unk"
# せつなのことが好きだ。
line = "せつなのことが好きだ。"

[[dialogue]]
speaker = "unk"
# 専属忍者になる以前からデートを繰り返していて、自分でも薄々気付いてはいたのだが、最近ではもうすっかり自分でもその感情を自覚せざるを得なくなっていた。
line = "専属忍者になる以前からデートを繰り返していて、自分でも薄々気付いてはいたのだが、最近ではもうすっかり自分でもその感情を自覚せざるを得なくなっていた。"

[[dialogue]]
speaker = "せつな"
# 「？　どうかしたでござるか、主様？　せつなの顔をじっくり眺めたりして」
line = "「？　どうかしたでござるか、主様？　せつなの顔をじっくり眺めたりして」"

[[dialogue]]
speaker = "unk"
# 今日もせつなが可愛いなと思って
line = "今日もせつなが可愛いなと思って"

[[dialogue]]
speaker = "せつな"
# 「にゃにゃ、にゃっ！？　突然どうしたでござるか、主様！？　そういうイタズラは、心臓に悪いでござりまする！」
line = "「にゃにゃ、にゃっ！？　突然どうしたでござるか、主様！？　そういうイタズラは、心臓に悪いでござりまする！」"

[[dialogue]]
speaker = "せつな"
# 「せつなはいつも通り、主様の忍びとして、休日の掃除と洗濯をしに来ただけでござる！」
line = "「せつなはいつも通り、主様の忍びとして、休日の掃除と洗濯をしに来ただけでござる！」"

[[dialogue]]
speaker = "せつな"
# 「えっ？　掃除と洗濯は忍者の仕事じゃない……？」
line = "「えっ？　掃除と洗濯は忍者の仕事じゃない……？」"

[[dialogue]]
speaker = "せつな"
# 「いえいえ、せつなはただの忍者ではございませぬ。九浄家メイド隊が一人、メイド忍者にござりまする！　であればこそ、主様への奉仕の精神も忘れないのでござる」
line = "「いえいえ、せつなはただの忍者ではございませぬ。九浄家メイド隊が一人、メイド忍者にござりまする！　であればこそ、主様への奉仕の精神も忘れないのでござる」"

[[dialogue]]
speaker = "unk"
# でもこれだと、恋人にお世話されてるみたい
line = "でもこれだと、恋人にお世話されてるみたい"

[[dialogue]]
speaker = "せつな"
# 「にゃんですとぉ！？　はわわっ、ダメでござる、主様！　そんな男女が密室に恋人だのなんだのって……そんなの、破廉恥すぎるでござる！！」
line = "「にゃんですとぉ！？　はわわっ、ダメでござる、主様！　そんな男女が密室に恋人だのなんだのって……そんなの、破廉恥すぎるでござる！！」"

[[dialogue]]
speaker = "せつな"
# 「もっとこう年頃の健全な若者は、ヌードとかおっぱいとか、○○○○とか○○○○みたいな本能に忠実なもので発散しないと！？」
line = "「もっとこう年頃の健全な若者は、ヌードとかおっぱいとか、○○○○とか○○○○みたいな本能に忠実なもので発散しないと！？」"

[[dialogue]]
speaker = "unk"
# うん、まあ。せつなは相変わらずだよね
line = "うん、まあ。せつなは相変わらずだよね"

[[dialogue]]
speaker = "unk"
# なぜかせつなは、恋愛とエロの羞恥心が普通の人の真逆なのだった。
line = "なぜかせつなは、恋愛とエロの羞恥心が普通の人の真逆なのだった。"

[[dialogue]]
speaker = "unk"
# そうであるが故に、せつなに対しての告白というのは、一筋縄ではいかない予感がすでにヒシヒシとしていた。
line = "そうであるが故に、せつなに対しての告白というのは、一筋縄ではいかない予感がすでにヒシヒシとしていた。"

[[dialogue]]
speaker = "せつな"
# 「せつなとしても、主様がその気であれば、いつでも房中術を披露するでござる！」
line = "「せつなとしても、主様がその気であれば、いつでも房中術を披露するでござる！」"

[[dialogue]]
speaker = "せつな"
# 「さすがに路上や学園ではやりませぬが、ここは主様のお家。せつなのたわわに実ったおっぱい、そろそろ主様にも披露したいと思っていたところでござる！」
line = "「さすがに路上や学園ではやりませぬが、ここは主様のお家。せつなのたわわに実ったおっぱい、そろそろ主様にも披露したいと思っていたところでござる！」"

[[dialogue]]
speaker = "せつな"
# 「？　何を慌てているでござる？　男子たる者、女子のおっぱいに興味を持つのは当然のこと！　主様であれば、遠慮はなしにござる♪」
line = "「？　何を慌てているでござる？　男子たる者、女子のおっぱいに興味を持つのは当然のこと！　主様であれば、遠慮はなしにござる♪」"

[[dialogue]]
speaker = "せつな"
# 「ダメでござるか……？　うぅぅ、主様はいけずでござるぅ。忍びにだって、忠誠を誓った主様に自慢の体を見てもらいたい欲求がござりまする……」
line = "「ダメでござるか……？　うぅぅ、主様はいけずでござるぅ。忍びにだって、忠誠を誓った主様に自慢の体を見てもらいたい欲求がござりまする……」"

[[dialogue]]
speaker = "せつな"
# 「せつながどう考えてるかはともかく、一般的にそういうのは恋人同士ですること……でござるか？」
line = "「せつながどう考えてるかはともかく、一般的にそういうのは恋人同士ですること……でござるか？」"

[[dialogue]]
speaker = "せつな"
# 「むむぅ……別にせつなは、主様相手だったら気にしないのでござるが」
line = "「むむぅ……別にせつなは、主様相手だったら気にしないのでござるが」"

[[dialogue]]
speaker = "unk"
# せつなは人から告白されたらどうする？
line = "せつなは人から告白されたらどうする？"

[[dialogue]]
speaker = "unk"
# とはいえ、苦手なのは知ってるけど
line = "とはいえ、苦手なのは知ってるけど"

[[dialogue]]
speaker = "せつな"
# 「こ、告白というのはつまり……恋愛対象であることを認め合って、お互いが好き同士であることを受け入れ合った、破廉恥な関係になる、ということでござるか？」
line = "「こ、告白というのはつまり……恋愛対象であることを認め合って、お互いが好き同士であることを受け入れ合った、破廉恥な関係になる、ということでござるか？」"

[[dialogue]]
speaker = "せつな"
# 「な、なるほど……せつなは忍び故、誰かに告白するなんてことはあり得ませぬが、他人から告白される可能性は確かにゼロにはできませぬ」
line = "「な、なるほど……せつなは忍び故、誰かに告白するなんてことはあり得ませぬが、他人から告白される可能性は確かにゼロにはできませぬ」"

[[dialogue]]
speaker = "せつな"
# 「ただ、当然のことではありまするが、せつなは主様の専属メイド忍者。誰の告白であろうとも、受け入れることはありませぬ」
line = "「ただ、当然のことではありまするが、せつなは主様の専属メイド忍者。誰の告白であろうとも、受け入れることはありませぬ」"

[[dialogue]]
speaker = "せつな"
# 「せつなは主様が不要と断ずるまでは、主様ただ一人にどこまでもついていくでござる！」
line = "「せつなは主様が不要と断ずるまでは、主様ただ一人にどこまでもついていくでござる！」"

[[dialogue]]
speaker = "unk"
# じゃ、じゃあもし、俺が告白したら？
line = "じゃ、じゃあもし、俺が告白したら？"

[[dialogue]]
speaker = "せつな"
# 「は……？」
line = "「は……？」"

[[dialogue]]
speaker = "せつな"
# 「それはつまり、せつなと主様が……恋愛対象であることを認め合って、お互いが好き同士であることを受け入れ合った、破廉恥な関係になる、ということでござるか？」
line = "「それはつまり、せつなと主様が……恋愛対象であることを認め合って、お互いが好き同士であることを受け入れ合った、破廉恥な関係になる、ということでござるか？」"

[[dialogue]]
speaker = "せつな"
# 「そ、そそそ、そんにゃこと……！？」
line = "「そ、そそそ、そんにゃこと……！？」"

[[dialogue]]
speaker = "せつな"
# 「破廉恥でござる！　破廉恥でござる！　破廉恥でござるぅ～～～～～～っ！？」
line = "「破廉恥でござる！　破廉恥でござる！　破廉恥でござるぅ～～～～～～っ！？」"

[[dialogue]]
speaker = "unk"
# まあやっぱり、こうなるよなぁ……。
line = "まあやっぱり、こうなるよなぁ……。"

[[dialogue]]
speaker = "ヨミ"
# 「なるほど、そんなことが……」
line = "「なるほど、そんなことが……」"

[[dialogue]]
speaker = "ヨミ"
# 「会長とせつなさん、かなり仲が良さそうだと思ってたんですが、確かにせつなさん相手だと恋人になるのは苦労しそうですね……」
line = "「会長とせつなさん、かなり仲が良さそうだと思ってたんですが、確かにせつなさん相手だと恋人になるのは苦労しそうですね……」"

[[dialogue]]
speaker = "unk"
# うん、まあ。せつなは相変わらずだよね
line = "うん、まあ。せつなは相変わらずだよね"

[[dialogue]]
speaker = "ヨミ"
# 「わっ、会長のそこまで弱った顔、初めて見たかもしれません。それだけ真剣、ってことですね」
line = "「わっ、会長のそこまで弱った顔、初めて見たかもしれません。それだけ真剣、ってことですね」"

[[dialogue]]
speaker = "ヨミ"
# 「そうですねぇ……だったら、こんなのはどうでしょうか？」
line = "「そうですねぇ……だったら、こんなのはどうでしょうか？」"

[[dialogue]]
speaker = "ヨミ"
# 「題して、ラブレター大作戦です！」
line = "「題して、ラブレター大作戦です！」"

[[dialogue]]
speaker = "ヨミ"
# 「せつなさんの反応を見ている限り、恋愛は苦手ってだけで嫌いなわけじゃないと思うんです」
line = "「せつなさんの反応を見ている限り、恋愛は苦手ってだけで嫌いなわけじゃないと思うんです」"

[[dialogue]]
speaker = "ヨミ"
# 「苦手っていうか、とにかく恥ずかしいって感じですよね。だから、会長から恋愛感情を向けられていることとか、自分の中にある恋愛感情を直視できないだけで……」
line = "「苦手っていうか、とにかく恥ずかしいって感じですよね。だから、会長から恋愛感情を向けられていることとか、自分の中にある恋愛感情を直視できないだけで……」"

[[dialogue]]
speaker = "ヨミ"
# 「人のことを好きになれないとか、人から好かれたくないって感じではありません。これはもう、勝手ながら断言しちゃいます！」
line = "「人のことを好きになれないとか、人から好かれたくないって感じではありません。これはもう、勝手ながら断言しちゃいます！」"

[[dialogue]]
speaker = "ヨミ"
# 「面と向かって好きって言われるのって、嬉しいけど、きっと恥ずかしいじゃないですか。せつなさんじゃなくたって、恥ずかしくて逃げちゃいたくなる人はたくさんいます」
line = "「面と向かって好きって言われるのって、嬉しいけど、きっと恥ずかしいじゃないですか。せつなさんじゃなくたって、恥ずかしくて逃げちゃいたくなる人はたくさんいます」"

[[dialogue]]
speaker = "ヨミ"
# 「そこで、想いを伝える方法をラブレターにするんです」
line = "「そこで、想いを伝える方法をラブレターにするんです」"

[[dialogue]]
speaker = "ヨミ"
# 「面と向かって言われたら恥ずかしくて逃げだしちゃいたくなることでも、文章になっていれば自分のペースで読むことができます」
line = "「面と向かって言われたら恥ずかしくて逃げだしちゃいたくなることでも、文章になっていれば自分のペースで読むことができます」"

[[dialogue]]
speaker = "ヨミ"
# 「せつなさんにはきっと、会長の好意を受け取る覚悟を決める時間が必要なんじゃないかと、私は思うんです」
line = "「せつなさんにはきっと、会長の好意を受け取る覚悟を決める時間が必要なんじゃないかと、私は思うんです」"

[[dialogue]]
speaker = "unk"
# ラブレター大作戦、やってみる！
line = "ラブレター大作戦、やってみる！"

[[dialogue]]
speaker = "unk"
# ありがとう、ヨミヨミ
line = "ありがとう、ヨミヨミ"

[[dialogue]]
speaker = "ヨミ"
# 「はい、頑張ってください、会長」
line = "「はい、頑張ってください、会長」"

[[dialogue]]
speaker = "ヨミ"
# 「同僚として、せつなさんと会長の幸せを、私も願っていますから」
line = "「同僚として、せつなさんと会長の幸せを、私も願っていますから」"
