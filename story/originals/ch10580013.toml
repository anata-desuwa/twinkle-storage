[[dialogue]]
speaker = "unk"
# 第３話,ヘレナちゃんとデート,P
line = "第３話,ヘレナちゃんとデート,P"

[[dialogue]]
speaker = "unk"
# とある休日、ヘレナちゃんから暇なら付き合えと呼び出されて、街へとやってきた――
line = "とある休日、ヘレナちゃんから暇なら付き合えと呼び出されて、街へとやってきた――"

[[dialogue]]
speaker = "ヘレナ"
# 「ふふっ、よくぞきた、魔王よ」
line = "「ふふっ、よくぞきた、魔王よ」"

[[dialogue]]
speaker = "ヘレナ"
# 「――ここで一体なにをするのか、とな？　男女２人が揃えば、決まっていよう」
line = "「――ここで一体なにをするのか、とな？　男女２人が揃えば、決まっていよう」"

[[dialogue]]
speaker = "ヘレナ"
# 「ズバリ、『デート』だ」
line = "「ズバリ、『デート』だ」"

[[dialogue]]
speaker = "ヘレナ"
# 「――ふふっ、夢にも思ってなかったという顔だな。前から貴殿のことは好みだと言っていたであろう？」
line = "「――ふふっ、夢にも思ってなかったという顔だな。前から貴殿のことは好みだと言っていたであろう？」"

[[dialogue]]
speaker = "ヘレナ"
# 「このプリティでゴージャスな九浄ヘレナちゃんの初めてのデート相手に選ばれたこと、光栄に思うがよい」
line = "「このプリティでゴージャスな九浄ヘレナちゃんの初めてのデート相手に選ばれたこと、光栄に思うがよい」"

[[dialogue]]
speaker = "ヘレナ"
# 「む？　なにをそんな意外そうな顔をしている？」
line = "「む？　なにをそんな意外そうな顔をしている？」"

[[dialogue]]
speaker = "ヘレナ"
# 「――モテそうなのに、デートするのが初めてなんて驚いた？」
line = "「――モテそうなのに、デートするのが初めてなんて驚いた？」"

[[dialogue]]
speaker = "ヘレナ"
# 「ああ、モテるとも。ただし、寄ってくる男は揃いも揃って欲に目のくらんだ、私の好みとは程遠い連中ばかりだったがな」
line = "「ああ、モテるとも。ただし、寄ってくる男は揃いも揃って欲に目のくらんだ、私の好みとは程遠い連中ばかりだったがな」"

[[dialogue]]
speaker = "ヘレナ"
# 「そんな中で、九浄家の財にも権力にも特別興味はありませんという可愛い顔をした、貴殿が現れた」
line = "「そんな中で、九浄家の財にも権力にも特別興味はありませんという可愛い顔をした、貴殿が現れた」"

[[dialogue]]
speaker = "ヘレナ"
# 「故に、デートがしてみたいと思ったのだ」
line = "「故に、デートがしてみたいと思ったのだ」"

[[dialogue]]
speaker = "ヘレナ"
# 「――そういうわけで今日１日、ワガママに付き合ってもらえるか？」
line = "「――そういうわけで今日１日、ワガママに付き合ってもらえるか？」"

[[dialogue]]
speaker = "unk"
# は、はい。俺でよければ……
line = "は、はい。俺でよければ……"

[[dialogue]]
speaker = "ヘレナ"
# 「であれば、魔王よ。この九浄ヘレナについてくるがよい」
line = "「であれば、魔王よ。この九浄ヘレナについてくるがよい」"

[[dialogue]]
speaker = "unk"
# デートが始まると、いくつもの高級洋服店をはしごしながら、着せ替えをされる羽目になった。
line = "デートが始まると、いくつもの高級洋服店をはしごしながら、着せ替えをされる羽目になった。"

[[dialogue]]
speaker = "ヘレナ"
# 「ふふっ、よいぞ。実に面白い。貴殿は可愛い顔立ちで、かつ素朴であるが故に、服装で大きくイメージが様変わりする。素材として申し分ない」
line = "「ふふっ、よいぞ。実に面白い。貴殿は可愛い顔立ちで、かつ素朴であるが故に、服装で大きくイメージが様変わりする。素材として申し分ない」"

[[dialogue]]
speaker = "ヘレナ"
# 「先程の紳士服もよかったが、その服も実によく似合っているぞ。我ながら会心のコーディネート。まさに――」
line = "「先程の紳士服もよかったが、その服も実によく似合っているぞ。我ながら会心のコーディネート。まさに――」"

[[dialogue]]
speaker = "ヘレナ"
# 「完璧な女装だ！」
line = "「完璧な女装だ！」"

[[dialogue]]
speaker = "unk"
# いや、なんで女装！？
line = "いや、なんで女装！？"

[[dialogue]]
speaker = "ヘレナ"
# 「ふっ……可愛い子には旅をさせよ、というであろう？」
line = "「ふっ……可愛い子には旅をさせよ、というであろう？」"

[[dialogue]]
speaker = "ヘレナ"
# 「とりあえず、試着したものは全部は購入して、プレゼントしよう。どれも捨て難いからな」
line = "「とりあえず、試着したものは全部は購入して、プレゼントしよう。どれも捨て難いからな」"

[[dialogue]]
speaker = "unk"
# この服も！？
line = "この服も！？"

[[dialogue]]
speaker = "ヘレナ"
# 「――もしリノに見つかったら、どう言い訳するのか、とな？　ふふふっ♪　それは想像したら、面白そうであるがな」
line = "「――もしリノに見つかったら、どう言い訳するのか、とな？　ふふふっ♪　それは想像したら、面白そうであるがな」"

[[dialogue]]
speaker = "ヘレナ"
# 「さて、デートで来ているのだし、私もなにか試着するとしよう」
line = "「さて、デートで来ているのだし、私もなにか試着するとしよう」"

[[dialogue]]
speaker = "ヘレナ"
# 「貴殿に見せて、どんな衣装が好みなのか、聞いてみたいところであるしな」
line = "「貴殿に見せて、どんな衣装が好みなのか、聞いてみたいところであるしな」"

[[dialogue]]
speaker = "unk"
# そこから、ヘレナちゃんのプリティーでゴージャスなファッションショーが始まるのだった――
line = "そこから、ヘレナちゃんのプリティーでゴージャスなファッションショーが始まるのだった――"

[[dialogue]]
speaker = "unk"
# 洋服店を後にして、次にヘレナちゃんが向かった場所は、なんと猫カフェであった。
line = "洋服店を後にして、次にヘレナちゃんが向かった場所は、なんと猫カフェであった。"

[[dialogue]]
speaker = "ヘレナ"
# 「はああぁぁぁ<emoji=heart04>　見るがよい、魔王よ！　この愛くるしい猫共の姿を<emoji=heart04>」
line = "「はああぁぁぁ<emoji=heart04>　見るがよい、魔王よ！　この愛くるしい猫共の姿を<emoji=heart04>」"

[[dialogue]]
speaker = "ヘレナ"
# 「ふふふ<emoji=heart04>　おのれ、そんなラブリーな声をにゃんにゃん上げても、この九浄ヘレナは落とせぬぞ<emoji=heart04>」
line = "「ふふふ<emoji=heart04>　おのれ、そんなラブリーな声をにゃんにゃん上げても、この九浄ヘレナは落とせぬぞ<emoji=heart04>」"

[[dialogue]]
speaker = "ヘレナ"
# 「逆にこのヘレナちゃんが、たっぷりと弄んでくれよう。ほ～ら、こっちにくるがよい<emoji=heart04>　にゃ～<emoji=heart04>」
line = "「逆にこのヘレナちゃんが、たっぷりと弄んでくれよう。ほ～ら、こっちにくるがよい<emoji=heart04>　にゃ～<emoji=heart04>」"

[[dialogue]]
speaker = "ヘレナ"
# 「ふふふ♪　貴殿、警戒せずに寄ってくるとは、迂闊な猫め。捕まえたぞ<emoji=heart04>」
line = "「ふふふ♪　貴殿、警戒せずに寄ってくるとは、迂闊な猫め。捕まえたぞ<emoji=heart04>」"

[[dialogue]]
speaker = "ヘレナ"
# 「にゃ～<emoji=heart04>　にゃんにゃん<emoji=heart04>　にゃ～<emoji=heart04>」
line = "「にゃ～<emoji=heart04>　にゃんにゃん<emoji=heart04>　にゃ～<emoji=heart04>」"

[[dialogue]]
speaker = "ヘレナ"
# 「うりうり～<emoji=heart04>　ふふっ、ここがよいのか？　ごろごろ言っておるぞ<emoji=heart04>」
line = "「うりうり～<emoji=heart04>　ふふっ、ここがよいのか？　ごろごろ言っておるぞ<emoji=heart04>」"

[[dialogue]]
speaker = "ヘレナ"
# 「っと、魔王よ、どうした？　貴殿もそこで見ておらず、こちらへきて一緒に愛でるがよい。猫はよいぞ？」
line = "「っと、魔王よ、どうした？　貴殿もそこで見ておらず、こちらへきて一緒に愛でるがよい。猫はよいぞ？」"

[[dialogue]]
speaker = "unk"
# 猫も可愛いが、それにデレデレなヘレナちゃんも可愛いと思ってしまうのだった――
line = "猫も可愛いが、それにデレデレなヘレナちゃんも可愛いと思ってしまうのだった――"

[[dialogue]]
speaker = "ヘレナ"
# 「――そろそろ引き上げ時か。今日は実に有意義なデートであった」
line = "「――そろそろ引き上げ時か。今日は実に有意義なデートであった」"

[[dialogue]]
speaker = "ヘレナ"
# 「気の合う男と出歩くのは、こんなにも楽しいものなのだな。教えてくれて感謝するぞ、魔王よ」
line = "「気の合う男と出歩くのは、こんなにも楽しいものなのだな。教えてくれて感謝するぞ、魔王よ」"

[[dialogue]]
speaker = "ヘレナ"
# 「――ああ、衣装は礼は別によい。代わりに、今日プレゼントした衣装は、星徒会の小娘たちにも見せてやれ。きっと面白い反応が返ってくるぞ？」
line = "「――ああ、衣装は礼は別によい。代わりに、今日プレゼントした衣装は、星徒会の小娘たちにも見せてやれ。きっと面白い反応が返ってくるぞ？」"

[[dialogue]]
speaker = "unk"
# 女装は見せないよ！？
line = "女装は見せないよ！？"

[[dialogue]]
speaker = "ヘレナ"
# 「ふふっ、みな喜ぶと思うがな。さて、しばし待つがよい。家の者を呼ぶ。自宅まで車で送るぞ」
line = "「ふふっ、みな喜ぶと思うがな。さて、しばし待つがよい。家の者を呼ぶ。自宅まで車で送るぞ」"

[[dialogue]]
speaker = "ヘレナ"
# 「――ん？　どうした、魔王よ。私になにか言いたいことでもあるのか？」
line = "「――ん？　どうした、魔王よ。私になにか言いたいことでもあるのか？」"

[[dialogue]]
speaker = "unk"
# またデートに誘ってもいい？
line = "またデートに誘ってもいい？"

[[dialogue]]
speaker = "ヘレナ"
# 「……！　ほう？　このヘレナちゃんとまたデートに来たいと？」
line = "「……！　ほう？　このヘレナちゃんとまたデートに来たいと？」"

[[dialogue]]
speaker = "ヘレナ"
# 「ふふっ、ふふふふっ！　可愛いことを言うではないか」
line = "「ふふっ、ふふふふっ！　可愛いことを言うではないか」"

[[dialogue]]
speaker = "ヘレナ"
# 「ならば今度の時は、貴殿にエスコートしてもらうとしよう」
line = "「ならば今度の時は、貴殿にエスコートしてもらうとしよう」"

[[dialogue]]
speaker = "ヘレナ"
# 「期待しているぞ？」
line = "「期待しているぞ？」"

[[dialogue]]
speaker = "unk"
# ヘレナちゃんはそう言って、嬉しそうに微笑むのだった――
line = "ヘレナちゃんはそう言って、嬉しそうに微笑むのだった――"
