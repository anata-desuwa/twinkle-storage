[[dialogue]]
speaker = "unk"
# 第３話,働くパテルちゃん,P
line = "第３話,働くパテルちゃん,P"

[[dialogue]]
speaker = "パテル"
# 「いらっしゃ～い♪　海の家へようこそ～♪」
line = "「いらっしゃ～い♪　海の家へようこそ～♪」"

[[dialogue]]
speaker = "パテル"
# 「あ、驚いてる驚いてる。どうしてあたしがここで働いてるんだって思ったでしょ？」
line = "「あ、驚いてる驚いてる。どうしてあたしがここで働いてるんだって思ったでしょ？」"

[[dialogue]]
speaker = "パテル"
# 「ほら、この前パテルストーンの件で迷惑かけちゃったでしょ？　だからリップルにお詫びをしたいって話をしてさ」
line = "「ほら、この前パテルストーンの件で迷惑かけちゃったでしょ？　だからリップルにお詫びをしたいって話をしてさ」"

[[dialogue]]
speaker = "パテル"
# 「リップルは別にいいって言ってくれたんだけど、海の家が人手不足って聞いて、こっちを手伝うことになったんだ」
line = "「リップルは別にいいって言ってくれたんだけど、海の家が人手不足って聞いて、こっちを手伝うことになったんだ」"

[[dialogue]]
speaker = "unk"
# マグダレナさんのバイトは笑ってたのに
line = "マグダレナさんのバイトは笑ってたのに"

[[dialogue]]
speaker = "パテル"
# 「そりゃ世界の摂理を守る守護天使がティッシュ配りなんてしてたら、やることにギャップがありすぎるからね」
line = "「そりゃ世界の摂理を守る守護天使がティッシュ配りなんてしてたら、やることにギャップがありすぎるからね」"

[[dialogue]]
speaker = "パテル"
# 「でもあたしは借りは返す主義だから。迷惑をかけた分はちゃんと役に立つよ」
line = "「でもあたしは借りは返す主義だから。迷惑をかけた分はちゃんと役に立つよ」"

[[dialogue]]
speaker = "パテル"
# 「というわけでドンドン注文してね、お客さん♪」
line = "「というわけでドンドン注文してね、お客さん♪」"

[[dialogue]]
speaker = "unk"
# じゃあ焼きそばで
line = "じゃあ焼きそばで"

[[dialogue]]
speaker = "パテル"
# 「は～い、焼きそば１つね。パテルりょーかい！」
line = "「は～い、焼きそば１つね。パテルりょーかい！」"

[[dialogue]]
speaker = "unk"
# 待つことしばらく──
line = "待つことしばらく──"

[[dialogue]]
speaker = "パテル"
# 「は～い、焼きそばお待ちどうさま～」
line = "「は～い、焼きそばお待ちどうさま～」"

[[dialogue]]
speaker = "パテル"
# 「どう？　パテルちゃんの焼きそば美味しい？」
line = "「どう？　パテルちゃんの焼きそば美味しい？」"

[[dialogue]]
speaker = "unk"
# うん、美味しいよ
line = "うん、美味しいよ"

[[dialogue]]
speaker = "パテル"
# 「ならよかった。あたしは運んできただけだけどね♪」
line = "「ならよかった。あたしは運んできただけだけどね♪」"

[[dialogue]]
speaker = "パテル"
# 「おっと、お客さん来てるから行かなきゃ」
line = "「おっと、お客さん来てるから行かなきゃ」"

[[dialogue]]
speaker = "パテル"
# 「いらっしゃいませ～。来てくれて嬉しいな♪」
line = "「いらっしゃいませ～。来てくれて嬉しいな♪」"

[[dialogue]]
speaker = "パテル"
# 「ご注文は……うんうん、ラーメンとカレーだね。おふたりさんならフライドポテトもオススメだけどどーする？」
line = "「ご注文は……うんうん、ラーメンとカレーだね。おふたりさんならフライドポテトもオススメだけどどーする？」"

[[dialogue]]
speaker = "パテル"
# 「フライドポテトも追加？　りょ～か～いっ」
line = "「フライドポテトも追加？　りょ～か～いっ」"

[[dialogue]]
speaker = "unk"
# 的確に注文を取ったかと思えば……
line = "的確に注文を取ったかと思えば……"

[[dialogue]]
speaker = "パテル"
# 「お待たせー。チャーシュー麺、いっちょあがりっ。熱いから気を付けてね」
line = "「お待たせー。チャーシュー麺、いっちょあがりっ。熱いから気を付けてね」"

[[dialogue]]
speaker = "パテル"
# 「ビーチパラソルの貸し出し？　もちろんやってるよ。向こうの方で受け付けてるからね」
line = "「ビーチパラソルの貸し出し？　もちろんやってるよ。向こうの方で受け付けてるからね」"

[[dialogue]]
speaker = "パテル"
# 「あ、お客さんお帰り？　ありがと～、また来てね♪」
line = "「あ、お客さんお帰り？　ありがと～、また来てね♪」"

[[dialogue]]
speaker = "unk"
# 配膳をそつなくこなしつつ、客への案内や、見送りもしている。
line = "配膳をそつなくこなしつつ、客への案内や、見送りもしている。"

[[dialogue]]
speaker = "unk"
# 慣れないバイトに苦戦するかと思いきや、パテルは器用にこなしていた。
line = "慣れないバイトに苦戦するかと思いきや、パテルは器用にこなしていた。"

[[dialogue]]
speaker = "パテル"
# 「そろそろ落ち着き……ってあれ！？　お客さん増えてるっ！？」
line = "「そろそろ落ち着き……ってあれ！？　お客さん増えてるっ！？」"

[[dialogue]]
speaker = "パテル"
# 「え？　かわいい店員さんがいるって噂になってる？　そっかそっか、あたしのぷりちーさなら仕方ないね～……」
line = "「え？　かわいい店員さんがいるって噂になってる？　そっかそっか、あたしのぷりちーさなら仕方ないね～……」"

[[dialogue]]
speaker = "パテル"
# 「──って、ええぇっ！？　人手が足りないから手伝ってるのに、お客さん増えたら意味ないじゃんっ！？」
line = "「──って、ええぇっ！？　人手が足りないから手伝ってるのに、お客さん増えたら意味ないじゃんっ！？」"

[[dialogue]]
speaker = "unk"
# 俺も手伝うよ
line = "俺も手伝うよ"

[[dialogue]]
speaker = "パテル"
# 「いいの？　だけどリップルへのお詫びでやってるのに、魔王に手伝ってもらったら意味ないような……」
line = "「いいの？　だけどリップルへのお詫びでやってるのに、魔王に手伝ってもらったら意味ないような……」"

[[dialogue]]
speaker = "パテル"
# 「いや、そんなこと言ってる場合じゃないね。お願い、力を貸して」
line = "「いや、そんなこと言ってる場合じゃないね。お願い、力を貸して」"

[[dialogue]]
speaker = "パテル"
# 「は～……やっと落ち着いた……働くのって大変なんだね……。手伝ってくれてありがと、魔王」
line = "「は～……やっと落ち着いた……働くのって大変なんだね……。手伝ってくれてありがと、魔王」"

[[dialogue]]
speaker = "パテル"
# 「いや～、魔王の働きっぷりはすごかったね。百戦錬磨のバイト戦士の力を見せてもらったよ。ラクシャも同じくらいバイトしてたんだからすごいなぁ～……」
line = "「いや～、魔王の働きっぷりはすごかったね。百戦錬磨のバイト戦士の力を見せてもらったよ。ラクシャも同じくらいバイトしてたんだからすごいなぁ～……」"

[[dialogue]]
speaker = "パテル"
# 「んじゃ休憩しよ。何か海の家っぽいもの食べたいな～……」
line = "「んじゃ休憩しよ。何か海の家っぽいもの食べたいな～……」"

[[dialogue]]
speaker = "パテル"
# 「そうだ、かき氷にしよっと。リゾート結界は一年中かき氷食べられるからいいよね」
line = "「そうだ、かき氷にしよっと。リゾート結界は一年中かき氷食べられるからいいよね」"

[[dialogue]]
speaker = "パテル"
# 「魔王も一緒にかき氷食べる？　じゃあお互い別の味にしようよ」
line = "「魔王も一緒にかき氷食べる？　じゃあお互い別の味にしようよ」"

[[dialogue]]
speaker = "パテル"
# 「あたしは～……イチゴ味！　魔王は……キウイ味にした？　へ～、そんなのもあるんだ。シロップもちゃんとキウイの色してるね」
line = "「あたしは～……イチゴ味！　魔王は……キウイ味にした？　へ～、そんなのもあるんだ。シロップもちゃんとキウイの色してるね」"

[[dialogue]]
speaker = "パテル"
# 「それじゃ──」
line = "「それじゃ──」"

[[dialogue]]
speaker = "パテル"
# 「かき氷食べさせて、おにーさん<emoji=heart04>」
line = "「かき氷食べさせて、おにーさん<emoji=heart04>」"

[[dialogue]]
speaker = "パテル"
# 「あ～んっ。ん～っ、ちべたくておいしー♪　キウイ味も甘酸っぱくて美味しいね♪」
line = "「あ～んっ。ん～っ、ちべたくておいしー♪　キウイ味も甘酸っぱくて美味しいね♪」"

[[dialogue]]
speaker = "パテル"
# 「それじゃあたしはイチゴ味食べさせてあげる。はい、あ～ん」
line = "「それじゃあたしはイチゴ味食べさせてあげる。はい、あ～ん」"

[[dialogue]]
speaker = "パテル"
# 「……どう？　美味しい？」
line = "「……どう？　美味しい？」"

[[dialogue]]
speaker = "unk"
# 王道の味で美味しい
line = "王道の味で美味しい"

[[dialogue]]
speaker = "パテル"
# 「へ～、これが王道の味なんだ。あたしも食べてみよっと。あむっ」
line = "「へ～、これが王道の味なんだ。あたしも食べてみよっと。あむっ」"

[[dialogue]]
speaker = "パテル"
# 「ん～っ！？　キーンってきた！　これが例のやつかー」
line = "「ん～っ！？　キーンってきた！　これが例のやつかー」"

[[dialogue]]
speaker = "パテル"
# 「でもイチゴ味、すっごく甘いね。確かにこれは王道の味かも」
line = "「でもイチゴ味、すっごく甘いね。確かにこれは王道の味かも」"

[[dialogue]]
speaker = "パテル"
# 「ん？　どうしたの？　……間接キス？」
line = "「ん？　どうしたの？　……間接キス？」"

[[dialogue]]
speaker = "パテル"
# 「へ～、魔王ってば気にしちゃうんだぁ～……かわいいとこあるなぁ」
line = "「へ～、魔王ってば気にしちゃうんだぁ～……かわいいとこあるなぁ」"

[[dialogue]]
speaker = "パテル"
# 「それじゃあたしのかき氷、もっと食べさせてあげる♪　だから魔王のかき氷も食べさせてね♪」
line = "「それじゃあたしのかき氷、もっと食べさせてあげる♪　だから魔王のかき氷も食べさせてね♪」"

[[dialogue]]
speaker = "パテル"
# 「はい、あ～ん♪」
line = "「はい、あ～ん♪」"
