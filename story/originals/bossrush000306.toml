[[dialogue]]
speaker = "ルヴィネ"
# 「私はデネブと……極星のみんなと共に歩むと決めたの」
line = "「私はデネブと……極星のみんなと共に歩むと決めたの」"

[[dialogue]]
speaker = "ルヴィネ"
# 「だからリクリエを止める。創造神に、私たちの営みの邪魔をさせないわ」
line = "「だからリクリエを止める。創造神に、私たちの営みの邪魔をさせないわ」"

[[dialogue]]
speaker = "煌嶺"
# 「妾は見たいのだ。創造神と戦い、生の限り輝く星騎士たちの様をな」
line = "「妾は見たいのだ。創造神と戦い、生の限り輝く星騎士たちの様をな」"

[[dialogue]]
speaker = "煌嶺"
# 「何せ相手は創造神だ。数度生まれ変わっても、なかなか巡り会えるものではないぞ？」
line = "「何せ相手は創造神だ。数度生まれ変わっても、なかなか巡り会えるものではないぞ？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……呆れた。どこまでも享楽的なのね」
line = "「……呆れた。どこまでも享楽的なのね」"

[[dialogue]]
speaker = "ルヴィネ"
# 「まぁいいわ。あなたが強大な力を持っていることは間違いない。味方であるのなら利用させてもらうまでよ」
line = "「まぁいいわ。あなたが強大な力を持っていることは間違いない。味方であるのなら利用させてもらうまでよ」"

[[dialogue]]
speaker = "煌嶺"
# 「フン、それはこちらのセリフだ。拾った命、せいぜい無駄に散らさぬことだな」
line = "「フン、それはこちらのセリフだ。拾った命、せいぜい無駄に散らさぬことだな」"

[[dialogue]]
speaker = "unk"
# 生みの親である創造神の下を離れ、仲間と共に生きることを選んだルヴィネ。
line = "生みの親である創造神の下を離れ、仲間と共に生きることを選んだルヴィネ。"

[[dialogue]]
speaker = "unk"
# どこまでも己の快楽を求め、鮮烈な星の輝きを欲する煌嶺。
line = "どこまでも己の快楽を求め、鮮烈な星の輝きを欲する煌嶺。"

[[dialogue]]
speaker = "unk"
# 相容れないのは当然だろう。
line = "相容れないのは当然だろう。"

[[dialogue]]
speaker = "unk"
# それでも今は、利害が一致していることに変わりはない。
line = "それでも今は、利害が一致していることに変わりはない。"

[[dialogue]]
speaker = "ルヴィネ"
# 「……ん？　今誰かのお腹の音が鳴った……？」
line = "「……ん？　今誰かのお腹の音が鳴った……？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「私じゃないけど……魔王、あなたなの？　……違う？」
line = "「私じゃないけど……魔王、あなたなの？　……違う？」"

[[dialogue]]
speaker = "煌嶺"
# 「う～、お腹減った～！」
line = "「う～、お腹減った～！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「！？　いきなりどうしたの！？」
line = "「！？　いきなりどうしたの！？」"

[[dialogue]]
speaker = "煌嶺"
# 「だってずっと戦いっぱなしだったんだもん、お腹ペコペコだよ～」
line = "「だってずっと戦いっぱなしだったんだもん、お腹ペコペコだよ～」"

[[dialogue]]
speaker = "ルヴィネ"
# 「いえそうではなくて、あなたの変わりっぷりに驚いているのだけど……」
line = "「いえそうではなくて、あなたの変わりっぷりに驚いているのだけど……」"

[[dialogue]]
speaker = "煌嶺"
# 「女の子はいろんな顔があるものだからね♪」
line = "「女の子はいろんな顔があるものだからね♪」"

[[dialogue]]
speaker = "ルヴィネ"
# 「そういう問題かしら……？」
line = "「そういう問題かしら……？」"

[[dialogue]]
speaker = "煌嶺"
# 「それよりデネブのいいお店教えてよ。せっかくデネブに来たんだから、とびっきり美味しいものが食べたいな」
line = "「それよりデネブのいいお店教えてよ。せっかくデネブに来たんだから、とびっきり美味しいものが食べたいな」"

[[dialogue]]
speaker = "煌嶺"
# 「デネブはあなたのホームなんだし、美味しいお店くらい知ってるでしょ？　ホストなんだから、ちゃ～んともてなしてよ♪」
line = "「デネブはあなたのホームなんだし、美味しいお店くらい知ってるでしょ？　ホストなんだから、ちゃ～んともてなしてよ♪」"

[[dialogue]]
speaker = "ルヴィネ"
# 「傍若無人という煌嶺の評判は本当のようね……」
line = "「傍若無人という煌嶺の評判は本当のようね……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「でもそうね。共に戦うのなら、一緒に食事をして<ruby=きょうきん>胸襟</ruby>を開くのも悪くないわ」
line = "「でもそうね。共に戦うのなら、一緒に食事をして<ruby>胸襟<rt>きょうきん</rt></ruby>を開くのも悪くないわ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「美食を求めるなら答えはひとつ──」
line = "「美食を求めるなら答えはひとつ──」"

[[dialogue]]
speaker = "ルヴィネ"
# 「担々麺よ！！」
line = "「担々麺よ！！」"

[[dialogue]]
speaker = "unk"
# ルヴィネに連れられ、目的のお店に向かう。
line = "ルヴィネに連れられ、目的のお店に向かう。"

[[dialogue]]
speaker = "ルヴィネ"
# 「よかった、こんな時でもお店はやっているわね」
line = "「よかった、こんな時でもお店はやっているわね」"

[[dialogue]]
speaker = "ルヴィネ"
# 「ここは私のお気に入りで、個人的担々麺ランキングＴＯＰ５に入るお店よ」
line = "「ここは私のお気に入りで、個人的担々麺ランキングＴＯＰ５に入るお店よ」"

[[dialogue]]
speaker = "煌嶺"
# 「やった♪　私、担々麺好き～♪」
line = "「やった♪　私、担々麺好き～♪」"

[[dialogue]]
speaker = "ルヴィネ"
# 「このお店は特にゴマにこだわっていて、お店でゴマを煎ってから練りゴマにしているの。黒ゴマを使った黒担々麺も美味しくて……」
line = "「このお店は特にゴマにこだわっていて、お店でゴマを煎ってから練りゴマにしているの。黒ゴマを使った黒担々麺も美味しくて……」"

[[dialogue]]
speaker = "煌嶺"
# 「あ、その話長くなりそう？　別にそういうのが聞きたいんじゃないんだけど……」
line = "「あ、その話長くなりそう？　別にそういうのが聞きたいんじゃないんだけど……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「まぁ聞きなさい。知識を得ることで味わい方も変わるわ。このお店では、独特の痺れの元である<ruby=ホアジャオ>花椒</ruby>も厳選したものを使っていて──」
line = "「まぁ聞きなさい。知識を得ることで味わい方も変わるわ。このお店では、独特の痺れの元である<ruby>花椒<rt>ホアジャオ</rt></ruby>も厳選したものを使っていて──」"

[[dialogue]]
speaker = "煌嶺"
# 「いやそれはいいから！　早く食べさせて～！？」
line = "「いやそれはいいから！　早く食べさせて～！？」"
