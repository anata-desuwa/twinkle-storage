[[dialogue]]
speaker = "unk"
# 第６話,学園長候補？,B
line = "第６話,学園長候補？,B"

[[dialogue]]
speaker = "unk"
# 俺はヘレナちゃんに呼ばれて九浄家に来ていた。ヴィーナスもこの場に同席している。
line = "俺はヘレナちゃんに呼ばれて九浄家に来ていた。ヴィーナスもこの場に同席している。"

[[dialogue]]
speaker = "ヘレナ"
# 「よく来てくれた魔王よ。切迫した状況なのに悪いな」
line = "「よく来てくれた魔王よ。切迫した状況なのに悪いな」"

[[dialogue]]
speaker = "クロト"
# 「いえ、構いません。ヘレナちゃんはこういう時、無駄な話はしませんから」
line = "「いえ、構いません。ヘレナちゃんはこういう時、無駄な話はしませんから」"

[[dialogue]]
speaker = "ヴィーナス"
# 「でもどうしたの、ヘレナちゃん？　理事会で次の学園長を決めるんじゃなかったの？」
line = "「でもどうしたの、ヘレナちゃん？　理事会で次の学園長を決めるんじゃなかったの？」"

[[dialogue]]
speaker = "ヘレナ"
# 「それがだな……」
line = "「それがだな……」"

[[dialogue]]
speaker = "unk"
# 俺たちは理事会で起こった一部始終を聞いた。
line = "俺たちは理事会で起こった一部始終を聞いた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「コウレイが理事会にやってきて、学園長になるって言ってきた──！？」
line = "「コウレイが理事会にやってきて、学園長になるって言ってきた──！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「で、コウレイって誰だったっけ？」
line = "「で、コウレイって誰だったっけ？」"

[[dialogue]]
speaker = "ヘレナ"
# 「我が娘ながらそう言うと思ったぞ」
line = "「我が娘ながらそう言うと思ったぞ」"

[[dialogue]]
speaker = "unk"
# 三界にはそれぞれ魔王ラクシスの血を色濃く受け継ぐ者がいるという。
line = "三界にはそれぞれ魔王ラクシスの血を色濃く受け継ぐ者がいるという。"

[[dialogue]]
speaker = "unk"
# 人間界の星見家。
line = "人間界の星見家。"

[[dialogue]]
speaker = "unk"
# 天界・聖庭園のリガルタ老。
line = "天界・聖庭園のリガルタ老。"

[[dialogue]]
speaker = "unk"
# そして魔界の頽廃都市キュリオスを統べる煌嶺。
line = "そして魔界の頽廃都市キュリオスを統べる煌嶺。"

[[dialogue]]
speaker = "unk"
# 彼女の支配圏であるキュリオスに留まっていると聞いていたが、人間界に来ていたとは驚きだ。
line = "彼女の支配圏であるキュリオスに留まっていると聞いていたが、人間界に来ていたとは驚きだ。"

[[dialogue]]
speaker = "クロト"
# 「ほら、母さんが星骸布をもらってきてくれただろ。フィーニスの塔でマグダレナさんも言ってた」
line = "「ほら、母さんが星骸布をもらってきてくれただろ。フィーニスの塔でマグダレナさんも言ってた」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ああ～、どうりで聞いたことあると思ったわ！」
line = "「ああ～、どうりで聞いたことあると思ったわ！」"

[[dialogue]]
speaker = "ヘレナ"
# 「はっきり言ってまずい展開だ。理事はやつに<ruby=なび>靡</ruby>いている。このままでは新星学園は乗っ取られてしまうぞ」
line = "「はっきり言ってまずい展開だ。理事はやつに<ruby>靡<rt>なび</rt></ruby>いている。このままでは新星学園は乗っ取られてしまうぞ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そんなのダメよ！　私たちの学園を好き勝手にはさせないわ！」
line = "「そんなのダメよ！　私たちの学園を好き勝手にはさせないわ！」"

[[dialogue]]
speaker = "クロト"
# 「煌嶺という人はそんなに危険な人物なんですか？」
line = "「煌嶺という人はそんなに危険な人物なんですか？」"

[[dialogue]]
speaker = "unk"
# 魔王の血を引くとは言え、あのヘレナちゃんがそこまで警戒するほど人物なのだろうか。
line = "魔王の血を引くとは言え、あのヘレナちゃんがそこまで警戒するほど人物なのだろうか。"

[[dialogue]]
speaker = "ヘレナ"
# 「そうだな、魔界出身の者に話を聞けば、十中八九悪い評判が返ってくるだろう」
line = "「そうだな、魔界出身の者に話を聞けば、十中八九悪い評判が返ってくるだろう」"

[[dialogue]]
speaker = "ヘレナ"
# 「魔界では煌嶺の悪名は知られていてな。欲しいものを手に入れるためなら手段を選ばない」
line = "「魔界では煌嶺の悪名は知られていてな。欲しいものを手に入れるためなら手段を選ばない」"

[[dialogue]]
speaker = "ヘレナ"
# 「伝え聞く話によれば、彼女はあるものを手に入れるために、隣国に戦争を仕掛けようとした。何を欲しがったと思う？」
line = "「伝え聞く話によれば、彼女はあるものを手に入れるために、隣国に戦争を仕掛けようとした。何を欲しがったと思う？」"

[[dialogue]]
speaker = "クロト"
# 「土地とか……あるいは星骸布のような宝物とか？」
line = "「土地とか……あるいは星骸布のような宝物とか？」"

[[dialogue]]
speaker = "ヘレナ"
# 「<ruby=おもちゃ>玩具</ruby>だ」
line = "「<ruby>玩具<rt>おもちゃ</rt></ruby>だ」"

[[dialogue]]
speaker = "クロト"
# 「は……？」
line = "「は……？」"

[[dialogue]]
speaker = "ヘレナ"
# 「物見遊山の途中で、子どもが持っていた絡繰り仕掛けの<ruby=がんぐ>玩具</ruby>をたまたま見かけたそうでな。それが欲しいと言い出したのだ」
line = "「物見遊山の途中で、子どもが持っていた絡繰り仕掛けの<ruby>玩具<rt>がんぐ</rt></ruby>をたまたま見かけたそうでな。それが欲しいと言い出したのだ」"

[[dialogue]]
speaker = "ヘレナ"
# 「玩具は職人の手作りで、確かに物珍しいものではあったが、それそのものはただの遊び道具でしかない」
line = "「玩具は職人の手作りで、確かに物珍しいものではあったが、それそのものはただの遊び道具でしかない」"

[[dialogue]]
speaker = "ヘレナ"
# 「だが煌嶺はその玩具ひとつが欲しいというだけで、その国の工房と職人を丸々買い取るから値段を教えろと言い出した」
line = "「だが煌嶺はその玩具ひとつが欲しいというだけで、その国の工房と職人を丸々買い取るから値段を教えろと言い出した」"

[[dialogue]]
speaker = "ヘレナ"
# 「もし差し出せないのであれば、戦争で国ごといただこう、と悪びれもせず宣戦布告まで始めたのだ」
line = "「もし差し出せないのであれば、戦争で国ごといただこう、と悪びれもせず宣戦布告まで始めたのだ」"

[[dialogue]]
speaker = "ヘレナ"
# 「結局、隣国は圧力に負けて工房と職人……つまり、その玩具にまつわる『文化』と『製造』をキュリオスに差し出したそうだ」
line = "「結局、隣国は圧力に負けて工房と職人……つまり、その玩具にまつわる『文化』と『製造』をキュリオスに差し出したそうだ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「何それ！？　そんなのが王様をやってるなんて、めちゃくちゃじゃない！」
line = "「何それ！？　そんなのが王様をやってるなんて、めちゃくちゃじゃない！」"

[[dialogue]]
speaker = "ヘレナ"
# 「それが煌嶺なのだ。倫理や常識など関係ない。彼女が“欲しい”と思うかどうかが全て」
line = "「それが煌嶺なのだ。倫理や常識など関係ない。彼女が“欲しい”と思うかどうかが全て」"

[[dialogue]]
speaker = "ヘレナ"
# 「路傍の石であろうが、国が買える秘宝であろうが、“欲しい”と思ったなら必ず手に入れる。それが煌嶺のルールだ」
line = "「路傍の石であろうが、国が買える秘宝であろうが、“欲しい”と思ったなら必ず手に入れる。それが煌嶺のルールだ」"

[[dialogue]]
speaker = "クロト"
# 「想像していたよりも難儀な人物のようですね……」
line = "「想像していたよりも難儀な人物のようですね……」"

[[dialogue]]
speaker = "unk"
# 母さんに星骸布を与えてくれたから、話せばわかる相手かと思っていたけど、俺の考えが甘かったようだ。
line = "母さんに星骸布を与えてくれたから、話せばわかる相手かと思っていたけど、俺の考えが甘かったようだ。"

[[dialogue]]
speaker = "ヴィーナス"
# 「どうしてそんなの新星学園の理事にしちゃったのよ～！　絶対トラブルになるに決まってるじゃない！」
line = "「どうしてそんなの新星学園の理事にしちゃったのよ～！　絶対トラブルになるに決まってるじゃない！」"

[[dialogue]]
speaker = "ヘレナ"
# 「背に腹は代えられんというやつだ。実際必要だっただろう、<ruby=アレ>星骸布</ruby>は」
line = "「背に腹は代えられんというやつだ。実際必要だっただろう、<ruby>星骸布<rt>アレ</rt></ruby>は」"

[[dialogue]]
speaker = "ヴィーナス"
# 「う……」
line = "「う……」"

[[dialogue]]
speaker = "unk"
# 母さんが星骸布を持ってきてくれなければ、俺たちも、流星市国もどうなっていたか。
line = "母さんが星骸布を持ってきてくれなければ、俺たちも、流星市国もどうなっていたか。"

[[dialogue]]
speaker = "unk"
# 星騎士たちは星術を使うことができず、きっと為す術なくモンスターに蹂躙されていただろう。
line = "星騎士たちは星術を使うことができず、きっと為す術なくモンスターに蹂躙されていただろう。"

[[dialogue]]
speaker = "ヴィーナス"
# 「で、ヘレナちゃんが連れてきた学園長候補ってのは──」
line = "「で、ヘレナちゃんが連れてきた学園長候補ってのは──」"

[[dialogue]]
speaker = "？？？"
# 「すみません、遅くなりましたっ」
line = "「すみません、遅くなりましたっ」"

[[dialogue]]
speaker = "ヘレナ"
# 「本当に遅いぞ。だから迎えを寄越そうかと言ったのに」
line = "「本当に遅いぞ。だから迎えを寄越そうかと言ったのに」"

[[dialogue]]
speaker = "？？？"
# 「申し訳ありません～っ」
line = "「申し訳ありません～っ」"

[[dialogue]]
speaker = "unk"
# そこにやってきたのは、俺たちと同じ年くらいの女性。
line = "そこにやってきたのは、俺たちと同じ年くらいの女性。"

[[dialogue]]
speaker = "unk"
# けれどまとっているのは制服ではなく、ビジネスで着るようなスーツだ。
line = "けれどまとっているのは制服ではなく、ビジネスで着るようなスーツだ。"

[[dialogue]]
speaker = "ヘレナ"
# 「紹介しよう。彼女は<ruby=いざよい>十六夜</ruby>シノ。私が次の新星学園学園長として白羽の矢を立てた人物だ」
line = "「紹介しよう。彼女は<ruby>十六夜<rt>いざよい</rt></ruby>シノ。私が次の新星学園学園長として白羽の矢を立てた人物だ」"

[[dialogue]]
speaker = "シノ"
# 「初めまして。星徒会長の緋宮クロトさんと、前会長の九浄ヴィーナスさんですね」
line = "「初めまして。星徒会長の緋宮クロトさんと、前会長の九浄ヴィーナスさんですね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「えっ、この人が！？」
line = "「えっ、この人が！？」"

[[dialogue]]
speaker = "unk"
# 内心、俺もヴィーナスと同じように驚いていた。
line = "内心、俺もヴィーナスと同じように驚いていた。"

[[dialogue]]
speaker = "unk"
# セイファート前学園長、ラティエ総合学園長の後だから、相当な手練れを探してくるかと思っていた。
line = "セイファート前学園長、ラティエ総合学園長の後だから、相当な手練れを探してくるかと思っていた。"

[[dialogue]]
speaker = "unk"
# ……いや、あの２人に匹敵する人物がそうそういるとは思えないけど。
line = "……いや、あの２人に匹敵する人物がそうそういるとは思えないけど。"

[[dialogue]]
speaker = "unk"
# なんなら三界を隈なく探しても見つかる気がしない。
line = "なんなら三界を隈なく探しても見つかる気がしない。"

[[dialogue]]
speaker = "ヘレナ"
# 「言っておくが、学園長の適性に戦闘能力は関係ないぞ」
line = "「言っておくが、学園長の適性に戦闘能力は関係ないぞ」"

[[dialogue]]
speaker = "クロト"
# 「ですよね……」
line = "「ですよね……」"

[[dialogue]]
speaker = "unk"
# 学園長の仕事は教育と組織運営。
line = "学園長の仕事は教育と組織運営。"

[[dialogue]]
speaker = "unk"
# カリスマという意味では、強さもあるに越したことはないのだろうけど。
line = "カリスマという意味では、強さもあるに越したことはないのだろうけど。"

[[dialogue]]
speaker = "シノ"
# 「はは……私もヘレナさんに声をかけられた時は驚きました」
line = "「はは……私もヘレナさんに声をかけられた時は驚きました」"

[[dialogue]]
speaker = "ヘレナ"
# 「見た目で判断してはいけない。彼女はこれでも敏腕経営者だ」
line = "「見た目で判断してはいけない。彼女はこれでも敏腕経営者だ」"

[[dialogue]]
speaker = "クロト"
# 「そう言われると、テレビか何かで見たことあるような……」
line = "「そう言われると、テレビか何かで見たことあるような……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あ、そうよ！　天才学生社長って言われてた人だわ！」
line = "「あ、そうよ！　天才学生社長って言われてた人だわ！」"

[[dialogue]]
speaker = "シノ"
# 「そんな紹介のされ方もしましたね。お恥ずかしい」
line = "「そんな紹介のされ方もしましたね。お恥ずかしい」"

[[dialogue]]
speaker = "シノ"
# 「では改めまして。この度、九浄ヘレナさんに呼ばれました十六夜シノです」
line = "「では改めまして。この度、九浄ヘレナさんに呼ばれました十六夜シノです」"

[[dialogue]]
speaker = "シノ"
# 「皆さんのご存じの通り、生徒の方々と同年代ではありますが、とある会社の社長をしていました」
line = "「皆さんのご存じの通り、生徒の方々と同年代ではありますが、とある会社の社長をしていました」"

[[dialogue]]
speaker = "シノ"
# 「私の父は小さな会社を営んでいたんですが、急に倒れてしまいまして……」
line = "「私の父は小さな会社を営んでいたんですが、急に倒れてしまいまして……」"

[[dialogue]]
speaker = "シノ"
# 「私は当時通っていた学園を飛び級で卒業し、急遽社長を引き継ぐことになったんです」
line = "「私は当時通っていた学園を飛び級で卒業し、急遽社長を引き継ぐことになったんです」"

[[dialogue]]
speaker = "クロト"
# 「飛び級で……！？　そこから社長になるなんて、すごいですね……」
line = "「飛び級で……！？　そこから社長になるなんて、すごいですね……」"

[[dialogue]]
speaker = "シノ"
# 「そう言っていただくことは多いのですが、あの時は本当に必死で……飛び級も最短で社長になるためでした」
line = "「そう言っていただくことは多いのですが、あの時は本当に必死で……飛び級も最短で社長になるためでした」"

[[dialogue]]
speaker = "シノ"
# 「そうして社長になった私は、死に物狂いで会社経営を学び、なんとか会社を維持できるところまではこぎつけました」
line = "「そうして社長になった私は、死に物狂いで会社経営を学び、なんとか会社を維持できるところまではこぎつけました」"

[[dialogue]]
speaker = "シノ"
# 「その後は諸事情あり、従業員の雇用を継続したまま、大手の会社に事業を買収していただきました」
line = "「その後は諸事情あり、従業員の雇用を継続したまま、大手の会社に事業を買収していただきました」"

[[dialogue]]
speaker = "シノ"
# 「私自身は会社を離れたんですけど、それがきっかけで、人に請われて他社の経営に携わるようになって……」
line = "「私自身は会社を離れたんですけど、それがきっかけで、人に請われて他社の経営に携わるようになって……」"

[[dialogue]]
speaker = "シノ"
# 「いつの間にか、雇われ社長としていろんな会社に呼ばれるようになりました。人生分からないものですね。はは……」
line = "「いつの間にか、雇われ社長としていろんな会社に呼ばれるようになりました。人生分からないものですね。はは……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「へ～」
line = "「へ～」"

[[dialogue]]
speaker = "クロト"
# 「ヴィーナス、意味わかってる？」
line = "「ヴィーナス、意味わかってる？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ぜんぜん！」
line = "「ぜんぜん！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「雇われ社長って何？　会社って社長のものなんじゃないの？」
line = "「雇われ社長って何？　会社って社長のものなんじゃないの？」"

[[dialogue]]
speaker = "シノ"
# 「学生さんにはピンとこないですよね。私も実際に経営に携わるまでよくわかっていませんでした」
line = "「学生さんにはピンとこないですよね。私も実際に経営に携わるまでよくわかっていませんでした」"

[[dialogue]]
speaker = "シノ"
# 「たとえば、株式会社は株主のものです。出資者たる株主が、経営者に会社の運営を任せるんです」
line = "「たとえば、株式会社は株主のものです。出資者たる株主が、経営者に会社の運営を任せるんです」"

[[dialogue]]
speaker = "ヴィーナス"
# 「？？？　会社が自分のものなら、経営も自分でやればいいんじゃないの？」
line = "「？？？　会社が自分のものなら、経営も自分でやればいいんじゃないの？」"

[[dialogue]]
speaker = "シノ"
# 「そう思いますよね。でも、経営ってなかなか大変なんですよ」
line = "「そう思いますよね。でも、経営ってなかなか大変なんですよ」"

[[dialogue]]
speaker = "シノ"
# 「会社を作るのは意外と簡単なんですけど、運営していくのは難しい。だから専門家に任せるんです」
line = "「会社を作るのは意外と簡単なんですけど、運営していくのは難しい。だから専門家に任せるんです」"

[[dialogue]]
speaker = "シノ"
# 「いうなれば……車の運転手のようなものでしょうか。九浄家では運転は担当の者がいますよね？」
line = "「いうなれば……車の運転手のようなものでしょうか。九浄家では運転は担当の者がいますよね？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうね。車で出かけるときは、メイド隊の決まった人が運転してるわ」
line = "「そうね。車で出かけるときは、メイド隊の決まった人が運転してるわ」"

[[dialogue]]
speaker = "シノ"
# 「それと似たようなものです。車は九浄家の所有物ですが、ヴィーナスさんが運転するより安心でしょう？」
line = "「それと似たようなものです。車は九浄家の所有物ですが、ヴィーナスさんが運転するより安心でしょう？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「は～……なるほど！　わかった気がするわ！　シノは運転が得意なのね！」
line = "「は～……なるほど！　わかった気がするわ！　シノは運転が得意なのね！」"

[[dialogue]]
speaker = "シノ"
# 「あ、いえ、私自身は運転はしないんですけど……」
line = "「あ、いえ、私自身は運転はしないんですけど……」"

[[dialogue]]
speaker = "クロト"
# （誤解が起きている気がしないでもないけど……）
line = "（誤解が起きている気がしないでもないけど……）"

[[dialogue]]
speaker = "unk"
# だけど俺には、シノさんの説明は腑に落ちた。
line = "だけど俺には、シノさんの説明は腑に落ちた。"

[[dialogue]]
speaker = "unk"
# 餅は餅屋。運転手という職業があるように、経営の分野にも専門家が存在するということだ。
line = "餅は餅屋。運転手という職業があるように、経営の分野にも専門家が存在するということだ。"

[[dialogue]]
speaker = "ヘレナ"
# 「彼女は組織立て直しのスペシャリストだ。前学園長の失踪によって起きた綻びを直すには適任だと思ってな」
line = "「彼女は組織立て直しのスペシャリストだ。前学園長の失踪によって起きた綻びを直すには適任だと思ってな」"

[[dialogue]]
speaker = "ヘレナ"
# 「何より、私の直感が告げている」
line = "「何より、私の直感が告げている」"

[[dialogue]]
speaker = "ヘレナ"
# 「──新たな学園長にふさわしいのは彼女だとな！」
line = "「──新たな学園長にふさわしいのは彼女だとな！」"

[[dialogue]]
speaker = "シノ"
# 「あの私、まだお引き受けするとは決めていなくて……今日は詳しいお話を伺うだけと聞いていたのですが」
line = "「あの私、まだお引き受けするとは決めていなくて……今日は詳しいお話を伺うだけと聞いていたのですが」"

[[dialogue]]
speaker = "ヘレナ"
# 「む……そうだったか？　新学園長として理事たちにお披露目するつもりだったのだが」
line = "「む……そうだったか？　新学園長として理事たちにお披露目するつもりだったのだが」"

[[dialogue]]
speaker = "シノ"
# 「聞いてないですよ！？」
line = "「聞いてないですよ！？」"

[[dialogue]]
speaker = "クロト"
# 「はは……」
line = "「はは……」"

[[dialogue]]
speaker = "unk"
# 煌嶺は暴君だけど、この人もたいがい剛腕だと思う。
line = "煌嶺は暴君だけど、この人もたいがい剛腕だと思う。"

[[dialogue]]
speaker = "シノ"
# 「ですが、現会長の緋宮さんと、前会長のヴィーナスさんにお会いできたのはいい機会です」
line = "「ですが、現会長の緋宮さんと、前会長のヴィーナスさんにお会いできたのはいい機会です」"

[[dialogue]]
speaker = "シノ"
# 「現役の星騎士として、現役と先代の星徒会長として、お話を聞かせていただけませんか？」
line = "「現役の星騎士として、現役と先代の星徒会長として、お話を聞かせていただけませんか？」"
