[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「肝試しもやるとは思わなかったのだ……やっぱり海は暗いとちょっと怖いのだ……」
line = "「肝試しもやるとは思わなかったのだ……やっぱり海は暗いとちょっと怖いのだ……」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「空気も昼間より冷ややかで……風が吹くと、ぞくっとしちゃいますね……」
line = "「空気も昼間より冷ややかで……風が吹くと、ぞくっとしちゃいますね……」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「向こうのボートに置いてある鍵を持って帰れば終わり……なのだが、ボートが遠く感じるのだ」
line = "「向こうのボートに置いてある鍵を持って帰れば終わり……なのだが、ボートが遠く感じるのだ」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「ひゃっ──！？　足元に何か……あ、ヤドカリですか……。お化けかと思っちゃいました」
line = "「ひゃっ──！？　足元に何か……あ、ヤドカリですか……。お化けかと思っちゃいました」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「気を付けてください、どこから何が現れるか──」
line = "「気を付けてください、どこから何が現れるか──」"

[[dialogue]]
speaker = "幽霊？"
# 「私と一緒に死んでくれませんか？」
line = "「私と一緒に死んでくれませんか？」"

[[dialogue]]
speaker = "２人"
# 「ひぃ～～～～～っ！？」
line = "「ひぃ～～～～～っ！？」"

[[dialogue]]
speaker = "パテル"
# （アハハッ♪　マグダレナもアルモタヘルも怖がってる♪）
line = "（アハハッ♪　マグダレナもアルモタヘルも怖がってる♪）"

[[dialogue]]
speaker = "フラン"
# （いつもの顔でいつものセリフ言ってるだけじゃねえか！）
line = "（いつもの顔でいつものセリフ言ってるだけじゃねえか！）"

[[dialogue]]
speaker = "パテル"
# 「グロリア、フラン、久しぶり～♪」
line = "「グロリア、フラン、久しぶり～♪」"

[[dialogue]]
speaker = "フラン"
# 「会長が用があるっていうから来てみればパテルかよ。まぁ別にいいけどさ」
line = "「会長が用があるっていうから来てみればパテルかよ。まぁ別にいいけどさ」"

[[dialogue]]
speaker = "グロリア"
# 「久しぶりですね。プルちゃんが元気で良かったです」
line = "「久しぶりですね。プルちゃんが元気で良かったです」"

[[dialogue]]
speaker = "パテル"
# 「グロリアもね。２人を呼んでもらったのは、ちょっと手を貸してほしいからなんだ。かくかくしかじか……」
line = "「グロリアもね。２人を呼んでもらったのは、ちょっと手を貸してほしいからなんだ。かくかくしかじか……」"

[[dialogue]]
speaker = "フラン"
# 「肝試し～？　なんでオレがそんなの手伝わなきゃいけないんだよ」
line = "「肝試し～？　なんでオレがそんなの手伝わなきゃいけないんだよ」"

[[dialogue]]
speaker = "パテル"
# 「わかってないなぁ～。これは勝負なんだよ。だーかーら、あたしはフランを呼んだんだ」
line = "「わかってないなぁ～。これは勝負なんだよ。だーかーら、あたしはフランを呼んだんだ」"

[[dialogue]]
speaker = "フラン"
# 「ふーん……勝負と聞いちゃ黙ってられねぇな。相手が守護天使様ならなおさらだ」
line = "「ふーん……勝負と聞いちゃ黙ってられねぇな。相手が守護天使様ならなおさらだ」"

[[dialogue]]
speaker = "グロリア"
# 「マグダレナ様とアルモタヘル様には悪いですけど、思いっきり怖がらせてあげましょう」
line = "「マグダレナ様とアルモタヘル様には悪いですけど、思いっきり怖がらせてあげましょう」"

[[dialogue]]
speaker = "パテル"
# 「決まりだね♪　協力感謝するよ」
line = "「決まりだね♪　協力感謝するよ」"

[[dialogue]]
speaker = "パテル"
# 「それじゃ、あの２人を恐怖のどん底に突き落としてやるぞー、おー！」
line = "「それじゃ、あの２人を恐怖のどん底に突き落としてやるぞー、おー！」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「はぁ、はぁ……今のは、海で溺れた天使の亡霊でしょうか……？」
line = "「はぁ、はぁ……今のは、海で溺れた天使の亡霊でしょうか……？」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「アルモたんたちを道連れにしようとしているのだ……？　でもリゾート結界に幽霊なんていないはずなのだ……」
line = "「アルモたんたちを道連れにしようとしているのだ……？　でもリゾート結界に幽霊なんていないはずなのだ……」"

[[dialogue]]
speaker = "フラン"
# （んじゃ、次はオレの番か）
line = "（んじゃ、次はオレの番か）"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「ひゃっ！？　何かプルプルしたものが、顔に当たって……！？　何かいるんですか！？」
line = "「ひゃっ！？　何かプルプルしたものが、顔に当たって……！？　何かいるんですか！？」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「ひゃわわっ！？　暗くて何かわからないのだ！？　ひんやりしてちょっと気持ちいいけど、やっぱり怖いのだ！？」
line = "「ひゃわわっ！？　暗くて何かわからないのだ！？　ひんやりしてちょっと気持ちいいけど、やっぱり怖いのだ！？」"

[[dialogue]]
speaker = "フラン"
# （見えないところからこんにゃく吊るしてるだけでも怖がるもんなんだなぁ……）
line = "（見えないところからこんにゃく吊るしてるだけでも怖がるもんなんだなぁ……）"

[[dialogue]]
speaker = "フラン"
# （よし、後はパテルだな）
line = "（よし、後はパテルだな）"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「は、早く鍵を持って帰るのだっ！　ここにいるのはあんまりよくないのだ！」
line = "「は、早く鍵を持って帰るのだっ！　ここにいるのはあんまりよくないのだ！」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「そ、そうですね、急ぎま──」
line = "「そ、そうですね、急ぎま──」"

[[dialogue]]
speaker = "？？？"
# 「ハラ……ヘッタ……」
line = "「ハラ……ヘッタ……」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「──！？　今、声がしたような……」
line = "「──！？　今、声がしたような……」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「きっと気のせいなのだ！　だから早く行くのだ！」
line = "「きっと気のせいなのだ！　だから早く行くのだ！」"

[[dialogue]]
speaker = "？？？"
# 「クイタイ……」
line = "「クイタイ……」"

[[dialogue]]
speaker = "？？？"
# 「チイサクテ……ヤワラカイ……コドモガクイタイ……」
line = "「チイサクテ……ヤワラカイ……コドモガクイタイ……」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「気のせいじゃないぞ！　やっぱり聞こえるのだ！」
line = "「気のせいじゃないぞ！　やっぱり聞こえるのだ！」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「だ、だ、誰なんですか！？」
line = "「だ、だ、誰なんですか！？」"

[[dialogue]]
speaker = "？？？"
# 「コドモヲ──」
line = "「コドモヲ──」"

[[dialogue]]
speaker = "？？？"
# 「クワセロオオオッ！！！」
line = "「クワセロオオオッ！！！」"

[[dialogue]]
speaker = "２人"
# 「キャ～～～ッ！！？」
line = "「キャ～～～ッ！！？」"

[[dialogue]]
speaker = "パテル"
# 「アハハハッ、２人ともいい顔してたな～♪　残念ながら、肝試し試練は乗り越えられなかったね♪」
line = "「アハハハッ、２人ともいい顔してたな～♪　残念ながら、肝試し試練は乗り越えられなかったね♪」"

[[dialogue]]
speaker = "unk"
# ２人の小さな天使の悲鳴と、イタズラ好きの死神の笑い声が夜の海に響いたのだった。
line = "２人の小さな天使の悲鳴と、イタズラ好きの死神の笑い声が夜の海に響いたのだった。"
