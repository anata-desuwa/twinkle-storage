[[dialogue]]
speaker = "unk"
# 第１話,天才魔女と天才錬金術師,P
line = "第１話,天才魔女と天才錬金術師,P"

[[dialogue]]
speaker = "unk"
# トレジアンナさんが復活を果たしてから、１週間ほど経ったある日のこと。
line = "トレジアンナさんが復活を果たしてから、１週間ほど経ったある日のこと。"

[[dialogue]]
speaker = "unk"
# 俺は彼女に頼まれて、運勢不調のサチに代わり、ロストアイテムの回収を手伝うことになったのだが――
line = "俺は彼女に頼まれて、運勢不調のサチに代わり、ロストアイテムの回収を手伝うことになったのだが――"

[[dialogue]]
speaker = "トレジアンナ"
# 「――ふぅ～。お疲れ様でした～♪」
line = "「――ふぅ～。お疲れ様でした～♪」"

[[dialogue]]
speaker = "トレジアンナ"
# 「『箱庭』のロストアイテム、なんとか無事に回収成功です☆　いや～、会長さんがいてくれて助かりました～」
line = "「『箱庭』のロストアイテム、なんとか無事に回収成功です☆　いや～、会長さんがいてくれて助かりました～」"

[[dialogue]]
speaker = "unk"
# この小柄な少女こそが、サチの髪飾りや武器に憑依していたトレジアンナさんの真の姿である。
line = "この小柄な少女こそが、サチの髪飾りや武器に憑依していたトレジアンナさんの真の姿である。"

[[dialogue]]
speaker = "unk"
# 元々はロストアイテム『精神の水晶』に封印されており、最近復活を果たしたトレジアンナさん。
line = "元々はロストアイテム『精神の水晶』に封印されており、最近復活を果たしたトレジアンナさん。"

[[dialogue]]
speaker = "unk"
# その正体は、リクリエでリセットされる１つ前の時代を生きていた、古代の『魔女』である。
line = "その正体は、リクリエでリセットされる１つ前の時代を生きていた、古代の『魔女』である。"

[[dialogue]]
speaker = "トレジアンナ"
# 「それにしても、まさかドールハウス型のロストアイテムとは……。私１人だったら、脱出できなかったかもしれません」
line = "「それにしても、まさかドールハウス型のロストアイテムとは……。私１人だったら、脱出できなかったかもしれません」"

[[dialogue]]
speaker = "？？？"
# 「なるほど、アレはロストアイテムというのか。実に興味深いネ」
line = "「なるほど、アレはロストアイテムというのか。実に興味深いネ」"

[[dialogue]]
speaker = "トレジアンナ"
# 「えっ！？　あなたは……！」
line = "「えっ！？　あなたは……！」"

[[dialogue]]
speaker = "アニマ"
# 「腑に落ちたヨ。これまでも学園に不可解な現象が起きていたことには気づいてイタが、会長はキミたちと共に、そのロストアイテムを密かに回収していたというわけだナ」
line = "「腑に落ちたヨ。これまでも学園に不可解な現象が起きていたことには気づいてイタが、会長はキミたちと共に、そのロストアイテムを密かに回収していたというわけだナ」"

[[dialogue]]
speaker = "unk"
# アニマ先輩……！
line = "アニマ先輩……！"

[[dialogue]]
speaker = "トレジアンナ"
# 「人払いの魔法を使っているのに、アニマさん、どうやってここに！？」
line = "「人払いの魔法を使っているのに、アニマさん、どうやってここに！？」"

[[dialogue]]
speaker = "アニマ"
# 「フヒ♪　ネビュラという組織、そして魔女という存在を知ってから、魔法への対抗策は既に十分に用意済みだトモ」
line = "「フヒ♪　ネビュラという組織、そして魔女という存在を知ってから、魔法への対抗策は既に十分に用意済みだトモ」"

[[dialogue]]
speaker = "アニマ"
# 「例えば、新星学園内で魔力の反応があれば場所を知らせてくれる道具だったり、魔力を無効化する星術だったりネ♪」
line = "「例えば、新星学園内で魔力の反応があれば場所を知らせてくれる道具だったり、魔力を無効化する星術だったりネ♪」"

[[dialogue]]
speaker = "トレジアンナ"
# 「人払いの魔法は、何度も改修して隠蔽性を高めた自信作だったのですが……それを見破るとは、さすが学園が誇る天才錬金術師ですね」
line = "「人払いの魔法は、何度も改修して隠蔽性を高めた自信作だったのですが……それを見破るとは、さすが学園が誇る天才錬金術師ですね」"

[[dialogue]]
speaker = "アニマ"
# 「十分に対策したにも関わらず、攻略するまでに長らく時間がかかってしまったヨ。そちらこそ大した天才魔法使いダ♪」
line = "「十分に対策したにも関わらず、攻略するまでに長らく時間がかかってしまったヨ。そちらこそ大した天才魔法使いダ♪」"

[[dialogue]]
speaker = "トレジアンナ"
# 「……看破されてしまった以上、ちゃんと説明しておくべきですね」
line = "「……看破されてしまった以上、ちゃんと説明しておくべきですね」"

[[dialogue]]
speaker = "トレジアンナ"
# 「私はトレジアンナと申します。種族はもうお分かりかと思いますが、魔女で――」
line = "「私はトレジアンナと申します。種族はもうお分かりかと思いますが、魔女で――」"

[[dialogue]]
speaker = "アニマ"
# 「ああ、そこはみなまで言わずとも、ちゃんと理解しているから大丈夫だヨ、トレジアンナ。キミの正体が何にせよ――その心は『魔法少女』なのダロウ？」
line = "「ああ、そこはみなまで言わずとも、ちゃんと理解しているから大丈夫だヨ、トレジアンナ。キミの正体が何にせよ――その心は『魔法少女』なのダロウ？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「！　アニマさん、あなたは……」
line = "「！　アニマさん、あなたは……」"

[[dialogue]]
speaker = "アニマ"
# 「それよりも、キミのロマンある自己紹介を聞かせてくれたマエ。アニマが聞きたいのは、そっちの方だからネ」
line = "「それよりも、キミのロマンある自己紹介を聞かせてくれたマエ。アニマが聞きたいのは、そっちの方だからネ」"

[[dialogue]]
speaker = "トレジアンナ"
# 「わかりました。なら、その期待に応えて――変身！」
line = "「わかりました。なら、その期待に応えて――変身！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「改めまして！　マジにマジカル☆　凛とリリカル！　華麗にカレイド♪」
line = "「改めまして！　マジにマジカル☆　凛とリリカル！　華麗にカレイド♪」"

[[dialogue]]
speaker = "トレジアンナ"
# 「蒐集の魔法少女トレジャー☆アンナ、可愛く参上♪　素敵にステッキ、決めちゃいますよ～！」
line = "「蒐集の魔法少女トレジャー☆アンナ、可愛く参上♪　素敵にステッキ、決めちゃいますよ～！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「キラッ☆」
line = "「キラッ☆」"

[[dialogue]]
speaker = "アニマ"
# 「フヒッ♪　アハハハハ！　素晴らしイ♪　今の名乗りだけで伝わってきたトモ。キミが本気で魔法少女をやってイルということが」
line = "「フヒッ♪　アハハハハ！　素晴らしイ♪　今の名乗りだけで伝わってきたトモ。キミが本気で魔法少女をやってイルということが」"

[[dialogue]]
speaker = "アニマ"
# 「ならば、アニマもその本気に応えヨウ。錬金術師の名に誓って、ここに宣言スル。アニマはキミたちの活動や、ロストアイテムのことを決して口外したりしナイと」
line = "「ならば、アニマもその本気に応えヨウ。錬金術師の名に誓って、ここに宣言スル。アニマはキミたちの活動や、ロストアイテムのことを決して口外したりしナイと」"

[[dialogue]]
speaker = "トレジアンナ"
# 「アニマさん、ありがとうございます！　これから是非、仲良くして頂けると嬉しいです♪」
line = "「アニマさん、ありがとうございます！　これから是非、仲良くして頂けると嬉しいです♪」"

[[dialogue]]
speaker = "アニマ"
# 「ああ、こちらこそダ、トレジアンナ。アニマに協力できることがあれば、なんでも相談してくれたマエ♪」
line = "「ああ、こちらこそダ、トレジアンナ。アニマに協力できることがあれば、なんでも相談してくれたマエ♪」"

[[dialogue]]
speaker = "unk"
# そうして、嬉しそうに握手を交わす２人。
line = "そうして、嬉しそうに握手を交わす２人。"

[[dialogue]]
speaker = "アニマ"
# 「そうダ。お近づきの印に、アニマが発明した薬をお１ついかがカナ？」
line = "「そうダ。お近づきの印に、アニマが発明した薬をお１ついかがカナ？」"

[[dialogue]]
speaker = "unk"
# ふと、コートの内側から怪しい色の液体が入った試験管を取り出すアニマ先輩。
line = "ふと、コートの内側から怪しい色の液体が入った試験管を取り出すアニマ先輩。"

[[dialogue]]
speaker = "unk"
# ちょっ、なに渡してるんですか！？
line = "ちょっ、なに渡してるんですか！？"

[[dialogue]]
speaker = "トレジアンナ"
# 「ふふふっ、これはまた素敵なコレクションになりそうですね～♪」
line = "「ふふふっ、これはまた素敵なコレクションになりそうですね～♪」"

[[dialogue]]
speaker = "unk"
# 効果がわからないのに嬉しそう！？
line = "効果がわからないのに嬉しそう！？"

[[dialogue]]
speaker = "トレジアンナ"
# 「私、実は昔から、三界の不思議な薬をコレクションしてるんですよ～。ほら、アニマさんが作ったものなら、文句なくコレクション級ですし☆」
line = "「私、実は昔から、三界の不思議な薬をコレクションしてるんですよ～。ほら、アニマさんが作ったものなら、文句なくコレクション級ですし☆」"

[[dialogue]]
speaker = "トレジアンナ"
# 「あっ、ちなみにいつでも飲めるように、決して中身が劣化しない魔法のケースに保管しておきますから、大丈夫ですよ♪」
line = "「あっ、ちなみにいつでも飲めるように、決して中身が劣化しない魔法のケースに保管しておきますから、大丈夫ですよ♪」"

[[dialogue]]
speaker = "トレジアンナ"
# 「というわけで、アニマさん、薬の効果は後でじっくり魔法で分析しておきますね～☆」
line = "「というわけで、アニマさん、薬の効果は後でじっくり魔法で分析しておきますね～☆」"

[[dialogue]]
speaker = "アニマ"
# 「フッ……フフッ♪　フヒヒッ♪　面白イ！　まさか、アニマの薬を拒否するのではなく保存するとは……！」
line = "「フッ……フフッ♪　フヒヒッ♪　面白イ！　まさか、アニマの薬を拒否するのではなく保存するとは……！」"

[[dialogue]]
speaker = "アニマ"
# 「そんなことを言ったのは、トレジアンナ、キミが初めてだヨ♪」
line = "「そんなことを言ったのは、トレジアンナ、キミが初めてだヨ♪」"

[[dialogue]]
speaker = "トレジアンナ"
# 「いや～、実は私、『蒐集癖』があるんですよ～」
line = "「いや～、実は私、『蒐集癖』があるんですよ～」"

[[dialogue]]
speaker = "トレジアンナ"
# 「あっ。よかったら、他にもどんな薬があるか、コレクション見てみますか？」
line = "「あっ。よかったら、他にもどんな薬があるか、コレクション見てみますか？」"

[[dialogue]]
speaker = "unk"
# それから、今日話したのが初めてとは思えない程、和気あいあいと盛り上がる２人なのであった――
line = "それから、今日話したのが初めてとは思えない程、和気あいあいと盛り上がる２人なのであった――"
