[[dialogue]]
speaker = "unk"
# 第４話,人生初デート,P
line = "第４話,人生初デート,P"

[[dialogue]]
speaker = "unk"
# 先日、シズハの『魔法の研究』の話を聞いて、俺は彼女のことをカッコいいと思った。
line = "先日、シズハの『魔法の研究』の話を聞いて、俺は彼女のことをカッコいいと思った。"

[[dialogue]]
speaker = "unk"
# それ以降、これまで『可愛い』だけだった彼女のことが、何だか気になるようになって来て、いつしか異性として意識するようになってしまっていた。
line = "それ以降、これまで『可愛い』だけだった彼女のことが、何だか気になるようになって来て、いつしか異性として意識するようになってしまっていた。"

[[dialogue]]
speaker = "unk"
# そんな矢先――
line = "そんな矢先――"

[[dialogue]]
speaker = "シズハ"
# 「会長、私とデートしてもらうわよ！」
line = "「会長、私とデートしてもらうわよ！」"

[[dialogue]]
speaker = "unk"
# 彼女からいきなり誘われてしまった。
line = "彼女からいきなり誘われてしまった。"

[[dialogue]]
speaker = "unk"
# ど、どうしたんだ突然……？
line = "ど、どうしたんだ突然……？"

[[dialogue]]
speaker = "シズハ"
# 「聞いたわよ！　会長――」
line = "「聞いたわよ！　会長――」"

[[dialogue]]
speaker = "シズハ"
# 「サチちゃんとプリムラちゃん、それぞれとデートしたことがあるんでしょ！？」
line = "「サチちゃんとプリムラちゃん、それぞれとデートしたことがあるんでしょ！？」"

[[dialogue]]
speaker = "unk"
# 遊びに行ったことはあるけども……！
line = "遊びに行ったことはあるけども……！"

[[dialogue]]
speaker = "unk"
# えぇっ！？　いや確かに
line = "えぇっ！？　いや確かに"

[[dialogue]]
speaker = "シズハ"
# 「私だけ仲間外れなんてズルいわ！　私だってデートがしてみたい！」
line = "「私だけ仲間外れなんてズルいわ！　私だってデートがしてみたい！」"

[[dialogue]]
speaker = "unk"
# ずいっと顔を近づけて言われて、俺は思わずドキッとしてしまう。
line = "ずいっと顔を近づけて言われて、俺は思わずドキッとしてしまう。"

[[dialogue]]
speaker = "unk"
# 俺でよければ、構わないけど……
line = "俺でよければ、構わないけど……"

[[dialogue]]
speaker = "シズハ"
# 「いいの？　やったぁ♪　それじゃあ――」
line = "「いいの？　やったぁ♪　それじゃあ――」"

[[dialogue]]
speaker = "シズハ"
# 「今週の日曜日とか、予定は空いてるかしら？」
line = "「今週の日曜日とか、予定は空いてるかしら？」"

[[dialogue]]
speaker = "unk"
# そんなわけで週末。
line = "そんなわけで週末。"

[[dialogue]]
speaker = "unk"
# 俺はシズハと２人で、遊園地へとやって来た――
line = "俺はシズハと２人で、遊園地へとやって来た――"

[[dialogue]]
speaker = "シズハ"
# 「わあぁ～～～っ♪　これが遊園地なのね！！！」
line = "「わあぁ～～～っ♪　これが遊園地なのね！！！」"

[[dialogue]]
speaker = "unk"
# 瞳をキラキラと輝かせて、はしゃぐシズハ。
line = "瞳をキラキラと輝かせて、はしゃぐシズハ。"

[[dialogue]]
speaker = "unk"
# もしかしなくても遊園地、初めて？
line = "もしかしなくても遊園地、初めて？"

[[dialogue]]
speaker = "シズハ"
# 「うん、これが人生初よ！」
line = "「うん、これが人生初よ！」"

[[dialogue]]
speaker = "シズハ"
# 「病院にいた時から、１度でいいから来てみたいってずっと思ってたの！」
line = "「病院にいた時から、１度でいいから来てみたいってずっと思ってたの！」"

[[dialogue]]
speaker = "シズハ"
# 「おかげで昨日の夜からワクワクが止まらなくて、なかなか寝付けなくて大変だったんだから♪」
line = "「おかげで昨日の夜からワクワクが止まらなくて、なかなか寝付けなくて大変だったんだから♪」"

[[dialogue]]
speaker = "unk"
# そっか。なら沢山、楽しんでもらわないとな
line = "そっか。なら沢山、楽しんでもらわないとな"

[[dialogue]]
speaker = "シズハ"
# 「――え？　会長がエスコートしてくれるの？」
line = "「――え？　会長がエスコートしてくれるの？」"

[[dialogue]]
speaker = "シズハ"
# 「――学園に入学する前、遊園地でバイトしてたことがある？　なにそれ、すごい気になるんだけど！」
line = "「――学園に入学する前、遊園地でバイトしてたことがある？　なにそれ、すごい気になるんだけど！」"

[[dialogue]]
speaker = "unk"
# その後、俺はフリーパスのチケットを２人分購入し、遊園地デートを開始した。
line = "その後、俺はフリーパスのチケットを２人分購入し、遊園地デートを開始した。"

[[dialogue]]
speaker = "シズハ"
# 「あの、会長。デートに誘ったのは私なんだし、私の分のチケット代まで出してもらうのは悪いっていうか……」
line = "「あの、会長。デートに誘ったのは私なんだし、私の分のチケット代まで出してもらうのは悪いっていうか……」"

[[dialogue]]
speaker = "unk"
# こういう時は男が出すもんなんだよ
line = "こういう時は男が出すもんなんだよ"

[[dialogue]]
speaker = "unk"
# いいからいいから
line = "いいからいいから"

[[dialogue]]
speaker = "unk"
# ――と当たり前のように言ってみたものの、本当は好きな子の手前、男らしいところを見せたいだけだったりする。
line = "――と当たり前のように言ってみたものの、本当は好きな子の手前、男らしいところを見せたいだけだったりする。"

[[dialogue]]
speaker = "unk"
# せっかく好きな子と遊びに来ているのだ。『デートごっこ』ではなく、『本当のデート』だと思ってもらいたい気持ちが少なからずある。
line = "せっかく好きな子と遊びに来ているのだ。『デートごっこ』ではなく、『本当のデート』だと思ってもらいたい気持ちが少なからずある。"

[[dialogue]]
speaker = "シズハ"
# 「ふ、ふんっ。今時は男女平等なんだから。男だからどうだとか、会長は古いわよっ」
line = "「ふ、ふんっ。今時は男女平等なんだから。男だからどうだとか、会長は古いわよっ」"

[[dialogue]]
speaker = "unk"
# じゃあ、行こうか
line = "じゃあ、行こうか"

[[dialogue]]
speaker = "シズハ"
# 「え！？　て、手を繋ぐの？」
line = "「え！？　て、手を繋ぐの？」"

[[dialogue]]
speaker = "シズハ"
# 「――で、デートだから？　それは、そうだけど……」
line = "「――で、デートだから？　それは、そうだけど……」"

[[dialogue]]
speaker = "シズハ"
# 「あっ、いや、別に嫌ってわけじゃないわよ！？　ただ……男の人とこういう風に手を繋ぐのも生まれて初めてだから……それ故の緊張がね！？」
line = "「あっ、いや、別に嫌ってわけじゃないわよ！？　ただ……男の人とこういう風に手を繋ぐのも生まれて初めてだから……それ故の緊張がね！？」"

[[dialogue]]
speaker = "シズハ"
# 「ちょっと待って……１回深呼吸するから。――すぅ～……はぁ～……」
line = "「ちょっと待って……１回深呼吸するから。――すぅ～……はぁ～……」"

[[dialogue]]
speaker = "シズハ"
# 「うん……よしっ！　――えいっ！」
line = "「うん……よしっ！　――えいっ！」"

[[dialogue]]
speaker = "シズハ"
# 「～～～っ！」
line = "「～～～っ！」"

[[dialogue]]
speaker = "シズハ"
# （か、会長の手、思ってたより大きい……！）
line = "（か、会長の手、思ってたより大きい……！）"

[[dialogue]]
speaker = "unk"
# 彼女と繋いだ手を、俺がそっと握ると――
line = "彼女と繋いだ手を、俺がそっと握ると――"

[[dialogue]]
speaker = "シズハ"
# 「ひゃっ……！？」
line = "「ひゃっ……！？」"

[[dialogue]]
speaker = "シズハ"
# 「ば、バカバカ、会長！　何も言わずにいきなり握られたら、ビックリするでしょ！？」
line = "「ば、バカバカ、会長！　何も言わずにいきなり握られたら、ビックリするでしょ！？」"

[[dialogue]]
speaker = "unk"
# え！？　ご、ごめん
line = "え！？　ご、ごめん"

[[dialogue]]
speaker = "シズハ"
# 「も、もう……初めてなんだから、何かアクションする時はちゃんと言ってよね！」
line = "「も、もう……初めてなんだから、何かアクションする時はちゃんと言ってよね！」"

[[dialogue]]
speaker = "unk"
# そう言いつつ、シズハは俺の手を握り返して来て、俺はドキドキしてしまう。
line = "そう言いつつ、シズハは俺の手を握り返して来て、俺はドキドキしてしまう。"

[[dialogue]]
speaker = "シズハ"
# （どうしよう……）
line = "（どうしよう……）"

[[dialogue]]
speaker = "シズハ"
# （こんなこと、今まで１度もなかったのに……私――）
line = "（こんなこと、今まで１度もなかったのに……私――）"

[[dialogue]]
speaker = "シズハ"
# （なんか今日は、すっごくドキドキしてる……）
line = "（なんか今日は、すっごくドキドキしてる……）"

[[dialogue]]
speaker = "unk"
# １時間後。俺たちは遊園地の中にあるオープンカフェで休んでいた。
line = "１時間後。俺たちは遊園地の中にあるオープンカフェで休んでいた。"

[[dialogue]]
speaker = "unk"
# シズハはジェットコースターにずっと憧れていたそうで、先程一緒に乗ったのだが――
line = "シズハはジェットコースターにずっと憧れていたそうで、先程一緒に乗ったのだが――"

[[dialogue]]
speaker = "シズハ"
# 「ふぅ……会長、せっかくのデートなのに、ごめんね……」
line = "「ふぅ……会長、せっかくのデートなのに、ごめんね……」"

[[dialogue]]
speaker = "シズハ"
# 「私、１回乗っただけでダウンしちゃって……」
line = "「私、１回乗っただけでダウンしちゃって……」"

[[dialogue]]
speaker = "unk"
# シズハは聖杯の力で病気こそ治ったものの、体力そのものが強化されているわけではなかった。
line = "シズハは聖杯の力で病気こそ治ったものの、体力そのものが強化されているわけではなかった。"

[[dialogue]]
speaker = "シズハ"
# 「毎日ランニングしたり、合気道部に入って基礎トレは続けてるんだけど……それでもまだまだ、体力作りの途中で……」
line = "「毎日ランニングしたり、合気道部に入って基礎トレは続けてるんだけど……それでもまだまだ、体力作りの途中で……」"

[[dialogue]]
speaker = "unk"
# 遊園地にはまた、何度でも来ればいい
line = "遊園地にはまた、何度でも来ればいい"

[[dialogue]]
speaker = "unk"
# 気にしないで。
line = "気にしないで。"

[[dialogue]]
speaker = "unk"
# ――それよりも、大事なことはシズハが遊園地を楽しめているかどうかだ。
line = "――それよりも、大事なことはシズハが遊園地を楽しめているかどうかだ。"

[[dialogue]]
speaker = "unk"
# 俺がそれを尋ねると……
line = "俺がそれを尋ねると……"

[[dialogue]]
speaker = "シズハ"
# 「それは……もちろん。楽しめてるわよ。さっきのジェットコースターもすごくテンション上がったし。遊園地で遊ぶのは夢だったから……」
line = "「それは……もちろん。楽しめてるわよ。さっきのジェットコースターもすごくテンション上がったし。遊園地で遊ぶのは夢だったから……」"

[[dialogue]]
speaker = "シズハ"
# 「――え？　遊園地の楽しみ方には、乗り物だけじゃなくて、別のものもある？」
line = "「――え？　遊園地の楽しみ方には、乗り物だけじゃなくて、別のものもある？」"

[[dialogue]]
speaker = "シズハ"
# 「って……そ、それは……？」
line = "「って……そ、それは……？」"

[[dialogue]]
speaker = "unk"
# 俺はさっき注文してきた飲み物を、テーブルの上に置いて──
line = "俺はさっき注文してきた飲み物を、テーブルの上に置いて──"

[[dialogue]]
speaker = "unk"
# いわゆる、カップルジュースだ！
line = "いわゆる、カップルジュースだ！"

[[dialogue]]
speaker = "シズハ"
# 「なっ……はああぁぁっ！？　会長、ば、バッカじゃないのっ！？　なんか今日の会長、ちょっと変かもって思ってたけど、やっぱりおかしいわよ！？　どうしたの！？」
line = "「なっ……はああぁぁっ！？　会長、ば、バッカじゃないのっ！？　なんか今日の会長、ちょっと変かもって思ってたけど、やっぱりおかしいわよ！？　どうしたの！？」"

[[dialogue]]
speaker = "シズハ"
# 「――デートで浮かれてるのかもって？　そ、それにしたって、こんな……！」
line = "「――デートで浮かれてるのかもって？　そ、それにしたって、こんな……！」"

[[dialogue]]
speaker = "unk"
# 一緒に飲む？
line = "一緒に飲む？"

[[dialogue]]
speaker = "シズハ"
# 「ば、バカバカ！　無理に決まってるでしょ！？　手を繋ぐのだって、今日が初めてだったんだから！」
line = "「ば、バカバカ！　無理に決まってるでしょ！？　手を繋ぐのだって、今日が初めてだったんだから！」"

[[dialogue]]
speaker = "シズハ"
# 「というか、からかってるでしょ！？　会長のバカバカバカ～！」
line = "「というか、からかってるでしょ！？　会長のバカバカバカ～！」"

[[dialogue]]
speaker = "unk"
# 顔を赤くしながら、じゃれるようにポコポコと叩いて来るシズハが可愛くて、俺は思わず吹き出してしまうのだった。
line = "顔を赤くしながら、じゃれるようにポコポコと叩いて来るシズハが可愛くて、俺は思わず吹き出してしまうのだった。"

[[dialogue]]
speaker = "unk"
# しばらく休憩して、再び何かのアトラクションにチャレンジしようと俺たちは席を立つ。
line = "しばらく休憩して、再び何かのアトラクションにチャレンジしようと俺たちは席を立つ。"

[[dialogue]]
speaker = "unk"
# その際に、何気なくシズハの手を取ると――
line = "その際に、何気なくシズハの手を取ると――"

[[dialogue]]
speaker = "シズハ"
# 「じ～っ……会長って、思ってたより女慣れしてるわよね……」
line = "「じ～っ……会長って、思ってたより女慣れしてるわよね……」"

[[dialogue]]
speaker = "unk"
# と言いつつも、しっかり手を繋いでくれるシズハ。
line = "と言いつつも、しっかり手を繋いでくれるシズハ。"

[[dialogue]]
speaker = "unk"
# 口が悪くなるって知れて嬉しい
line = "口が悪くなるって知れて嬉しい"

[[dialogue]]
speaker = "unk"
# 俺は、シズハは照れると
line = "俺は、シズハは照れると"

[[dialogue]]
speaker = "シズハ"
# 「そ、それは……会長が変なことばっかりするからでしょ！？」
line = "「そ、それは……会長が変なことばっかりするからでしょ！？」"

[[dialogue]]
speaker = "シズハ"
# 「大体、同じようなことを、サチちゃんやプリムラちゃんにも言ってるんじゃないの？」
line = "「大体、同じようなことを、サチちゃんやプリムラちゃんにも言ってるんじゃないの？」"

[[dialogue]]
speaker = "unk"
# シズハだからだよ
line = "シズハだからだよ"

[[dialogue]]
speaker = "unk"
# 『バカ』って言われて嬉しいのは
line = "『バカ』って言われて嬉しいのは"

[[dialogue]]
speaker = "シズハ"
# 「なっ……！？」
line = "「なっ……！？」"

[[dialogue]]
speaker = "シズハ"
# 「あ～～～っ、も～～～っ！　会長のバカバカバカっ！」
line = "「あ～～～っ、も～～～っ！　会長のバカバカバカっ！」"

[[dialogue]]
speaker = "シズハ"
# 「会長がそんな女ったらしだなんて、思わなかったわ！　おかげで――」
line = "「会長がそんな女ったらしだなんて、思わなかったわ！　おかげで――」"

[[dialogue]]
speaker = "シズハ"
# 「初デートなのに、遊園地の感動よりも、会長の印象の方が強くなっちゃうじゃない！」
line = "「初デートなのに、遊園地の感動よりも、会長の印象の方が強くなっちゃうじゃない！」"

[[dialogue]]
speaker = "unk"
# ごめん、ちょっとやり過ぎたかな
line = "ごめん、ちょっとやり過ぎたかな"

[[dialogue]]
speaker = "シズハ"
# 「……うん。ほんと、そうよ」
line = "「……うん。ほんと、そうよ」"

[[dialogue]]
speaker = "シズハ"
# 「だから、ね……また、一緒に来てよ」
line = "「だから、ね……また、一緒に来てよ」"

[[dialogue]]
speaker = "unk"
# え……？
line = "え……？"

[[dialogue]]
speaker = "unk"
# 俺が彼女の横顔を見ると、照れたようにちらっと目線だけこちらに向けながら――
line = "俺が彼女の横顔を見ると、照れたようにちらっと目線だけこちらに向けながら――"

[[dialogue]]
speaker = "シズハ"
# 「体力作りして、デートにも慣れて、遊園地を完璧に楽しめるようになったら、また挑戦したいから」
line = "「体力作りして、デートにも慣れて、遊園地を完璧に楽しめるようになったら、また挑戦したいから」"

[[dialogue]]
speaker = "unk"
# ああ、喜んで協力するよ
line = "ああ、喜んで協力するよ"

[[dialogue]]
speaker = "シズハ"
# 「ん……♪」
line = "「ん……♪」"

[[dialogue]]
speaker = "unk"
# 彼女はこくんと頷く。
line = "彼女はこくんと頷く。"

[[dialogue]]
speaker = "シズハ"
# 「じゃあ、会長。気を取り直して――また一緒に、絶叫マシンに乗りに行くわよ！」
line = "「じゃあ、会長。気を取り直して――また一緒に、絶叫マシンに乗りに行くわよ！」"

[[dialogue]]
speaker = "unk"
# 心なしか上機嫌に、彼女は俺の手を引っ張って走り出す。
line = "心なしか上機嫌に、彼女は俺の手を引っ張って走り出す。"

[[dialogue]]
speaker = "シズハ"
# 「行け行けゴーゴー♪」
line = "「行け行けゴーゴー♪」"

[[dialogue]]
speaker = "unk"
# 俺はその手を握り返して、デートの続きへと繰り出すのだった――
line = "俺はその手を握り返して、デートの続きへと繰り出すのだった――"
