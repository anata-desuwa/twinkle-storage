[[dialogue]]
speaker = "unk"
# ……あれから。３人で『解放』のロストアイテム探しを続けるも、どうしても気まずい空気はぬぐえず──
line = "……あれから。３人で『解放』のロストアイテム探しを続けるも、どうしても気まずい空気はぬぐえず──"

[[dialogue]]
speaker = "シズハ"
# 「私、ちょっと外を飛んで、校舎の周辺を見て回って来るね！」
line = "「私、ちょっと外を飛んで、校舎の周辺を見て回って来るね！」"

[[dialogue]]
speaker = "ディーラック"
# 「まぁ、あれサ。大丈夫、シズハちゃんのことはボクが見とくからサ～」
line = "「まぁ、あれサ。大丈夫、シズハちゃんのことはボクが見とくからサ～」"

[[dialogue]]
speaker = "unk"
# シズハは、そう言うディーラックと共に、どこかへ飛び去ってしまった。
line = "シズハは、そう言うディーラックと共に、どこかへ飛び去ってしまった。"

[[dialogue]]
speaker = "サーシャ"
# 「……会長くん、さっきの話の続きだけれど――」
line = "「……会長くん、さっきの話の続きだけれど――」"

[[dialogue]]
speaker = "サーシャ"
# 「シズハちゃんのことを、どうか助けてあげて欲しいの」
line = "「シズハちゃんのことを、どうか助けてあげて欲しいの」"

[[dialogue]]
speaker = "サーシャ"
# 「私では……あの子のことを助けられないから」
line = "「私では……あの子のことを助けられないから」"

[[dialogue]]
speaker = "unk"
# ……どうしてですか？
line = "……どうしてですか？"

[[dialogue]]
speaker = "サーシャ"
# 「私は、シズハちゃんが間違ったことをしていても、それを正してあげることができない」
line = "「私は、シズハちゃんが間違ったことをしていても、それを正してあげることができない」"

[[dialogue]]
speaker = "サーシャ"
# 「……私ね、どうしても他人の気持ちを考えるのが苦手なの」
line = "「……私ね、どうしても他人の気持ちを考えるのが苦手なの」"

[[dialogue]]
speaker = "サーシャ"
# 「だから、自覚のない内に間違ったことをしてしまう。今回もそう――」
line = "「だから、自覚のない内に間違ったことをしてしまう。今回もそう――」"

[[dialogue]]
speaker = "unk"
# そうして、サーシャさんは事情を俺に打ち明けた。いや……それはサーシャさんの懺悔でもあったのかもしれない。
line = "そうして、サーシャさんは事情を俺に打ち明けた。いや……それはサーシャさんの懺悔でもあったのかもしれない。"

[[dialogue]]
speaker = "unk"
# シズハには亡くなってしまったお姉さんがいること。そして――
line = "シズハには亡くなってしまったお姉さんがいること。そして――"

[[dialogue]]
speaker = "サーシャ"
# 「私……シズハちゃんに、『お姉ちゃん』と呼んでくれてもいいって言っちゃったの」
line = "「私……シズハちゃんに、『お姉ちゃん』と呼んでくれてもいいって言っちゃったの」"

[[dialogue]]
speaker = "サーシャ"
# 「普段から口にしている、軽口の延長だったわ」
line = "「普段から口にしている、軽口の延長だったわ」"

[[dialogue]]
speaker = "サーシャ"
# 「もちろんシズハちゃんに対しても、星徒会のみんなに対しても、私なりの方法で親愛の情を示しただけ。口から出まかせを言ったわけじゃないわ」
line = "「もちろんシズハちゃんに対しても、星徒会のみんなに対しても、私なりの方法で親愛の情を示しただけ。口から出まかせを言ったわけじゃないわ」"

[[dialogue]]
speaker = "サーシャ"
# 「それでも『シズハちゃんの姉』という存在の重さを、真剣に考えていたとは言えない」
line = "「それでも『シズハちゃんの姉』という存在の重さを、真剣に考えていたとは言えない」"

[[dialogue]]
speaker = "サーシャ"
# 「『みんなのお姉ちゃん』になりたい、なんていう私の下らない欲望が、シズハちゃんにとってどんな毒になるのか、ちょっと考えればわかったはずなのに」
line = "「『みんなのお姉ちゃん』になりたい、なんていう私の下らない欲望が、シズハちゃんにとってどんな毒になるのか、ちょっと考えればわかったはずなのに」"

[[dialogue]]
speaker = "サーシャ"
# 「しかも始末に悪いのはね……こんな状況になってもなお、シズハちゃんの言葉に共感している自分がいること」
line = "「しかも始末に悪いのはね……こんな状況になってもなお、シズハちゃんの言葉に共感している自分がいること」"

[[dialogue]]
speaker = "シズハ"
# 「……か、仮に、認識が歪んでいたとして、それってそんなに困ること？」
line = "「……か、仮に、認識が歪んでいたとして、それってそんなに困ること？」"

[[dialogue]]
speaker = "シズハ"
# 「私は、サーシャさんが本当にお姉ちゃんだったら、嬉しいよ？　サーシャさんは、私が妹だったら嫌？」
line = "「私は、サーシャさんが本当にお姉ちゃんだったら、嬉しいよ？　サーシャさんは、私が妹だったら嫌？」"

[[dialogue]]
speaker = "サーシャ"
# 「シズハちゃんの本当のお姉ちゃんに成り代わってしまったことがね……私、嬉しかったのよ」
line = "「シズハちゃんの本当のお姉ちゃんに成り代わってしまったことがね……私、嬉しかったのよ」"

[[dialogue]]
speaker = "サーシャ"
# 「それだけじゃないわ。シズハちゃんの気持ちが、視線が……<b>気持ち良かったの</b>」
line = "「それだけじゃないわ。シズハちゃんの気持ちが、視線が……<b>気持ち良かったの</b>」"

[[dialogue]]
speaker = "サーシャ"
# 「シズハちゃんの目を見た……？　『この世界に頼れるのは、あなたしかいない』とでも言うような、すがるような目だったわ」
line = "「シズハちゃんの目を見た……？　『この世界に頼れるのは、あなたしかいない』とでも言うような、すがるような目だったわ」"

[[dialogue]]
speaker = "サーシャ"
# 「ソフィも昔からよく、私にああいう目を向けてきてくれたわ」
line = "「ソフィも昔からよく、私にああいう目を向けてきてくれたわ」"

[[dialogue]]
speaker = "サーシャ"
# 「私ね……妹からああいう感情を向けられると、ゾクゾクしちゃうのよ」
line = "「私ね……妹からああいう感情を向けられると、ゾクゾクしちゃうのよ」"

[[dialogue]]
speaker = "サーシャ"
# 「ふふ、呆れるでしょう？　『こんなのはよくない、物事は正しくあるべきだ』と思う理性とは別に──」
line = "「ふふ、呆れるでしょう？　『こんなのはよくない、物事は正しくあるべきだ』と思う理性とは別に──」"

[[dialogue]]
speaker = "サーシャ"
# 「『正しさなんてどうでもいい、この時のために私は<b>お姉ちゃん</b>をやっているんだ』っていう悪い私がそこにいるの」
line = "「『正しさなんてどうでもいい、この時のために私は<b>お姉ちゃん</b>をやっているんだ』っていう悪い私がそこにいるの」"

[[dialogue]]
speaker = "サーシャ"
# 「あまりにも醜悪で、自分勝手だと思わないかしら？」
line = "「あまりにも醜悪で、自分勝手だと思わないかしら？」"

[[dialogue]]
speaker = "サーシャ"
# 「だから、会長くん。どうかお願い……シズハちゃんを助けてあげて」
line = "「だから、会長くん。どうかお願い……シズハちゃんを助けてあげて」"

[[dialogue]]
speaker = "サーシャ"
# 「私ではダメなの」
line = "「私ではダメなの」"

[[dialogue]]
speaker = "サーシャ"
# 「自己中心的で、他人に無関心な私の言葉では、シズハちゃんに届かない」
line = "「自己中心的で、他人に無関心な私の言葉では、シズハちゃんに届かない」"

[[dialogue]]
speaker = "サーシャ"
# 「シズハちゃんが間違った結論を出した時に、私ではそれを正してあげることができないから」
line = "「シズハちゃんが間違った結論を出した時に、私ではそれを正してあげることができないから」"

[[dialogue]]
speaker = "unk"
# そう言って、サーシャさんは再び俺に頭を下げる。
line = "そう言って、サーシャさんは再び俺に頭を下げる。"

[[dialogue]]
speaker = "unk"
# 俺はそんな彼女に対して――首を横に振った。
line = "俺はそんな彼女に対して――首を横に振った。"

[[dialogue]]
speaker = "unk"
# それはできません
line = "それはできません"

[[dialogue]]
speaker = "サーシャ"
# 「そんな、どうして……？」
line = "「そんな、どうして……？」"

[[dialogue]]
speaker = "unk"
# 俺は、サーシャさんが他人に無関心なんて そんなことはないと思っています
line = "俺は、サーシャさんが他人に無関心なんて\nそんなことはないと思っています"

[[dialogue]]
speaker = "unk"
# サーシャさんが自分自身のことを見てきたように、俺だってサーシャさんを見てきた。決して長い時間ではないかもしれないが、密度の高い時間を過ごしてきた自負はある。
line = "サーシャさんが自分自身のことを見てきたように、俺だってサーシャさんを見てきた。決して長い時間ではないかもしれないが、密度の高い時間を過ごしてきた自負はある。"

[[dialogue]]
speaker = "unk"
# だって、ソフィアとの交換日記 今も忘れずに続けてるでしょう？
line = "だって、ソフィアとの交換日記\n今も忘れずに続けてるでしょう？"

[[dialogue]]
speaker = "サーシャ"
# 「それは……」
line = "「それは……」"

[[dialogue]]
speaker = "unk"
# 交換日記――それはお正月に、サーシャさんがソフィアと仲直りする為、これから姉妹２人でやろうと決めた約束事だ。
line = "交換日記――それはお正月に、サーシャさんがソフィアと仲直りする為、これから姉妹２人でやろうと決めた約束事だ。"

[[dialogue]]
speaker = "unk"
# あれ以来、２人は毎日１度は必ず顔を合わせて、日記の受け渡しを行っている。
line = "あれ以来、２人は毎日１度は必ず顔を合わせて、日記の受け渡しを行っている。"

[[dialogue]]
speaker = "unk"
# そんな、姉妹の絆の証――
line = "そんな、姉妹の絆の証――"

[[dialogue]]
speaker = "unk"
# 確かに、サーシャさんはヒトよりも 他人への興味が薄いのかもしれません
line = "確かに、サーシャさんはヒトよりも\n他人への興味が薄いのかもしれません"

[[dialogue]]
speaker = "unk"
# それだけでなく、意外と自分の欲望に忠実な面もある。
line = "それだけでなく、意外と自分の欲望に忠実な面もある。"

[[dialogue]]
speaker = "unk"
# ――だけど、欲望に自制が効かないわけでもないし、他人に無関心でもない。
line = "――だけど、欲望に自制が効かないわけでもないし、他人に無関心でもない。"

[[dialogue]]
speaker = "unk"
# 正直に答えて下さい。サーシャさんにとって シズハは妹のように大切な存在ですか？
line = "正直に答えて下さい。サーシャさんにとって\nシズハは妹のように大切な存在ですか？"

[[dialogue]]
speaker = "サーシャ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# 少し考えるように目を伏せた後――
line = "少し考えるように目を伏せた後――"

[[dialogue]]
speaker = "unk"
# サーシャさんは首を横に振った。
line = "サーシャさんは首を横に振った。"

[[dialogue]]
speaker = "サーシャ"
# 「私にとって、本当の妹のソフィとは比べられない。ソフィの方が大切よ」
line = "「私にとって、本当の妹のソフィとは比べられない。ソフィの方が大切よ」"

[[dialogue]]
speaker = "サーシャ"
# 「でも――」
line = "「でも――」"

[[dialogue]]
speaker = "サーシャ"
# 「シズハちゃんを見て見ぬフリはできない。だって、関わりを持ってしまったんだもの」
line = "「シズハちゃんを見て見ぬフリはできない。だって、関わりを持ってしまったんだもの」"

[[dialogue]]
speaker = "サーシャ"
# 「私の本当の妹じゃなくとも、シズハちゃんとの関係は大切にしたい。だから……助けてあげたい」
line = "「私の本当の妹じゃなくとも、シズハちゃんとの関係は大切にしたい。だから……助けてあげたい」"

[[dialogue]]
speaker = "unk"
# なら、サーシャさんは大丈夫です
line = "なら、サーシャさんは大丈夫です"

[[dialogue]]
speaker = "unk"
# ――ソフィアはサーシャさんにとって、大切な妹に違いない。けれど、それは『妹だから大切』なんじゃない。
line = "――ソフィアはサーシャさんにとって、大切な妹に違いない。けれど、それは『妹だから大切』なんじゃない。"

[[dialogue]]
speaker = "unk"
# 一緒に生まれ育ったソフィアを、大切な存在だとサーシャさんが自分で決めたのだ。
line = "一緒に生まれ育ったソフィアを、大切な存在だとサーシャさんが自分で決めたのだ。"

[[dialogue]]
speaker = "unk"
# そして、サーシャさんは自分の大切なものの為なら、どこまでも真摯になれるヒトだ。
line = "そして、サーシャさんは自分の大切なものの為なら、どこまでも真摯になれるヒトだ。"

[[dialogue]]
speaker = "unk"
# そうじゃなかったら、自分の時間を何よりも大切にするサーシャさんが、交換日記なんて続けられるはずがない。
line = "そうじゃなかったら、自分の時間を何よりも大切にするサーシャさんが、交換日記なんて続けられるはずがない。"

[[dialogue]]
speaker = "unk"
# だから、シズハを本当に大切に思うのなら 厳しくすることからも逃げないでください
line = "だから、シズハを本当に大切に思うのなら\n厳しくすることからも逃げないでください"

[[dialogue]]
speaker = "サーシャ"
# 「シズハちゃんに、きび、しく…………」
line = "「シズハちゃんに、きび、しく…………」"

[[dialogue]]
speaker = "サーシャ"
# 「……そっか。そうよね、会長くん。確かに私は、『姉妹』というわかりやすい関係に甘えてた」
line = "「……そっか。そうよね、会長くん。確かに私は、『姉妹』というわかりやすい関係に甘えてた」"

[[dialogue]]
speaker = "サーシャ"
# 「『お姉ちゃん』だから、『妹』だから……優しくして当たり前、優しくするべきだって。考えもせずに、サボってきたんだわ」
line = "「『お姉ちゃん』だから、『妹』だから……優しくして当たり前、優しくするべきだって。考えもせずに、サボってきたんだわ」"

[[dialogue]]
speaker = "サーシャ"
# 「でも……そうじゃないのね」
line = "「でも……そうじゃないのね」"

[[dialogue]]
speaker = "サーシャ"
# 「『姉妹』だからとか、『家族』だからとか、そういう枠組みにはめ込むんじゃなくて……」
line = "「『姉妹』だからとか、『家族』だからとか、そういう枠組みにはめ込むんじゃなくて……」"

[[dialogue]]
speaker = "サーシャ"
# 「私が誰を好きで、誰を大切にしたいのか……そういう自分勝手を、私自身が決める」
line = "「私が誰を好きで、誰を大切にしたいのか……そういう自分勝手を、私自身が決める」"

[[dialogue]]
speaker = "サーシャ"
# 「時には振られてしまうこともあるだろうけれど……ヒトとヒトとの関係って、そもそもそういう面倒臭いものだものね」
line = "「時には振られてしまうこともあるだろうけれど……ヒトとヒトとの関係って、そもそもそういう面倒臭いものだものね」"

[[dialogue]]
speaker = "サーシャ"
# 「その面倒臭さから、本当は……逃げちゃいけなかったんだわ」
line = "「その面倒臭さから、本当は……逃げちゃいけなかったんだわ」"

[[dialogue]]
speaker = "サーシャ"
# 「ありがとう、会長くん。私は他人に興味が持てなかったんじゃなくて、自分の気持ちに対して怠惰だったのね」
line = "「ありがとう、会長くん。私は他人に興味が持てなかったんじゃなくて、自分の気持ちに対して怠惰だったのね」"

[[dialogue]]
speaker = "サーシャ"
# 「『お姉ちゃん』だから優しくするんじゃなくて……あなたのことを大切にしたいから、厳しくする」
line = "「『お姉ちゃん』だから優しくするんじゃなくて……あなたのことを大切にしたいから、厳しくする」"

[[dialogue]]
speaker = "サーシャ"
# 「ふふ。自分から告白するのって……ちょっと怖くて、ドキドキするわね」
line = "「ふふ。自分から告白するのって……ちょっと怖くて、ドキドキするわね」"

[[dialogue]]
speaker = "サーシャ"
# 「シズハちゃんもソフィも、こんな気持ちだったのかしら？」
line = "「シズハちゃんもソフィも、こんな気持ちだったのかしら？」"

[[dialogue]]
speaker = "サーシャ"
# 「もしかしたら振られちゃうかもしれないけれど……それでも」
line = "「もしかしたら振られちゃうかもしれないけれど……それでも」"

[[dialogue]]
speaker = "サーシャ"
# 「私の気持ち、今度はちゃんとシズハちゃんに、届けてみようと思うわ」
line = "「私の気持ち、今度はちゃんとシズハちゃんに、届けてみようと思うわ」"

[[dialogue]]
speaker = "unk"
# サーシャさんは力強く、そう言ってみせるのだった。
line = "サーシャさんは力強く、そう言ってみせるのだった。"
