[[dialogue]]
speaker = "unk"
# 第３話,ジュエリーとブライダルモデル,P
line = "第３話,ジュエリーとブライダルモデル,P"

[[dialogue]]
speaker = "unk"
# ある休日、俺とジュエリーは結婚式場へやってきていた。
line = "ある休日、俺とジュエリーは結婚式場へやってきていた。"

[[dialogue]]
speaker = "女性カメラマン"
# 「じゃあ、今日はよろしくね、ジュエリーちゃん♪」
line = "「じゃあ、今日はよろしくね、ジュエリーちゃん♪」"

[[dialogue]]
speaker = "ジュエリー"
# 「ああ。こちらこそよろしく頼むよ、カメラマンさん」
line = "「ああ。こちらこそよろしく頼むよ、カメラマンさん」"

[[dialogue]]
speaker = "unk"
# 最近、ジュエリーはウェディングフォームで事件を解決するようになったことから、『花嫁探偵』と呼ばれるようになっていた。
line = "最近、ジュエリーはウェディングフォームで事件を解決するようになったことから、『花嫁探偵』と呼ばれるようになっていた。"

[[dialogue]]
speaker = "unk"
# それが有名になった結果、以前フィオナが広告の『ブライダルモデル』を務めたこの結婚式場から、今回はジュエリーにお願いできないかと依頼が来たのだ。
line = "それが有名になった結果、以前フィオナが広告の『ブライダルモデル』を務めたこの結婚式場から、今回はジュエリーにお願いできないかと依頼が来たのだ。"

[[dialogue]]
speaker = "ジュエリー"
# 「ふふっ、愛する助手と、結婚式を挙げる新郎新婦になって、写真を撮ってもらえるんだ。こんな依頼なら受け得というものさ」
line = "「ふふっ、愛する助手と、結婚式を挙げる新郎新婦になって、写真を撮ってもらえるんだ。こんな依頼なら受け得というものさ」"

[[dialogue]]
speaker = "unk"
# そうして、ジュエリーと新郎新婦になりきっての撮影が始まった。
line = "そうして、ジュエリーと新郎新婦になりきっての撮影が始まった。"

[[dialogue]]
speaker = "女性カメラマン"
# 「はい、お互いを見つめ合って～……それじゃあ、会長くん、ジュエリーちゃんの花嫁姿を褒めてあげてくれるかな～？」
line = "「はい、お互いを見つめ合って～……それじゃあ、会長くん、ジュエリーちゃんの花嫁姿を褒めてあげてくれるかな～？」"

[[dialogue]]
speaker = "unk"
# すごく似合っていて、綺麗だよ
line = "すごく似合っていて、綺麗だよ"

[[dialogue]]
speaker = "ジュエリー"
# 「ありがとう。だが、それよりも今日は……キミのタキシード姿の方がすごく決まっていてカッコいいよ」
line = "「ありがとう。だが、それよりも今日は……キミのタキシード姿の方がすごく決まっていてカッコいいよ」"

[[dialogue]]
speaker = "ジュエリー"
# 「私にとって世界一カッコいい男性の晴れ姿だ」
line = "「私にとって世界一カッコいい男性の晴れ姿だ」"

[[dialogue]]
speaker = "女性カメラマン"
# 「２人ともいいわね～！　本当のカップルだからこその表情！　そしてこのムード！　お姉さん、興奮しちゃうっ♪」
line = "「２人ともいいわね～！　本当のカップルだからこその表情！　そしてこのムード！　お姉さん、興奮しちゃうっ♪」"

[[dialogue]]
speaker = "女性カメラマン"
# 「次はジュエリーちゃん、手を差し出してみて。新郎役の会長くんはその手を取って」
line = "「次はジュエリーちゃん、手を差し出してみて。新郎役の会長くんはその手を取って」"

[[dialogue]]
speaker = "unk"
# カメラマンさんの指示に従って、俺は差し出されたジュエリーの手を取る。
line = "カメラマンさんの指示に従って、俺は差し出されたジュエリーの手を取る。"

[[dialogue]]
speaker = "ジュエリー"
# 「指輪、か……」
line = "「指輪、か……」"

[[dialogue]]
speaker = "ジュエリー"
# 「撮影の為とはいえ、これは……想像していたよりも破壊力があるな」
line = "「撮影の為とはいえ、これは……想像していたよりも破壊力があるな」"

[[dialogue]]
speaker = "unk"
# 照れ顔のジュエリーも、すごくかわいいよ
line = "照れ顔のジュエリーも、すごくかわいいよ"

[[dialogue]]
speaker = "ジュエリー"
# 「っ……そ、そんなこと言われると……ますます恥ずかしくなってしまうじゃないか……<emoji=heart04>」
line = "「っ……そ、そんなこと言われると……ますます恥ずかしくなってしまうじゃないか……<emoji=heart04>」"

[[dialogue]]
speaker = "女性カメラマン"
# 「これよ！　この雰囲気を写真に収める為に、私はウェディング写真を撮り続けているのよ！　ありがとうございますっ！！」
line = "「これよ！　この雰囲気を写真に収める為に、私はウェディング写真を撮り続けているのよ！　ありがとうございますっ！！」"

[[dialogue]]
speaker = "unk"
# 俺たちのやり取りを見て、興奮気味のカメラマンさんは夢中でシャッターを切り続けている。……ちょっと、変わってる人かもしれない。
line = "俺たちのやり取りを見て、興奮気味のカメラマンさんは夢中でシャッターを切り続けている。……ちょっと、変わってる人かもしれない。"

[[dialogue]]
speaker = "女性カメラマン"
# 「――最後は、式場の奥で２人が愛を誓い合うカットを撮りましょう」
line = "「――最後は、式場の奥で２人が愛を誓い合うカットを撮りましょう」"

[[dialogue]]
speaker = "unk"
# その提案を受け、俺はジュエリーの手を取って祭壇へ歩いていく。
line = "その提案を受け、俺はジュエリーの手を取って祭壇へ歩いていく。"

[[dialogue]]
speaker = "unk"
# そして、祭壇の前で見つめ合った。
line = "そして、祭壇の前で見つめ合った。"

[[dialogue]]
speaker = "ジュエリー"
# 「……助手。またこうして結婚式場で愛を誓い合えるなんて、嬉しいよ」
line = "「……助手。またこうして結婚式場で愛を誓い合えるなんて、嬉しいよ」"

[[dialogue]]
speaker = "ジュエリー"
# 「ふふっ、『好き』や『愛』を言葉にして誓うのは、何度やってもいいものだからね」
line = "「ふふっ、『好き』や『愛』を言葉にして誓うのは、何度やってもいいものだからね」"

[[dialogue]]
speaker = "unk"
# ジュエリー、愛してるよ
line = "ジュエリー、愛してるよ"

[[dialogue]]
speaker = "ジュエリー"
# 「ああ、私もだ。助手――」
line = "「ああ、私もだ。助手――」"

[[dialogue]]
speaker = "ジュエリー"
# 「キミは私の、『人生の助手』になってくれるかい？」
line = "「キミは私の、『人生の助手』になってくれるかい？」"

[[dialogue]]
speaker = "unk"
# 喜んで。これからもずっと、隣にいるよ
line = "喜んで。これからもずっと、隣にいるよ"

[[dialogue]]
speaker = "unk"
# 俺たちは見つめ合い、お互いに引き付けられるようにして──唇を重ね合っていた。
line = "俺たちは見つめ合い、お互いに引き付けられるようにして──唇を重ね合っていた。"

[[dialogue]]
speaker = "ジュエリー"
# 「ちゅっ……<emoji=heart04>」
line = "「ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "女性カメラマン"
# 「ちょっ、まさかのサプライズキスッ！？」
line = "「ちょっ、まさかのサプライズキスッ！？」"

[[dialogue]]
speaker = "女性カメラマン"
# 「あ、甘ぁぁぁいっ！！　こんなのもう本当の結婚式じゃない！？」
line = "「あ、甘ぁぁぁいっ！！　こんなのもう本当の結婚式じゃない！？」"

[[dialogue]]
speaker = "unk"
# シャッター音を無限に響かせながら、夢中で撮影を続けるカメラマンさんであった。
line = "シャッター音を無限に響かせながら、夢中で撮影を続けるカメラマンさんであった。"

[[dialogue]]
speaker = "unk"
# 撮影後、ＤＩＳＣのデータで写真を確認する。
line = "撮影後、ＤＩＳＣのデータで写真を確認する。"

[[dialogue]]
speaker = "女性カメラマン"
# 「ほら見て、このジュエリーちゃんの表情……すごくいいでしょ！？　これはもう、宣伝効果抜群になること間違いなしよ！」
line = "「ほら見て、このジュエリーちゃんの表情……すごくいいでしょ！？　これはもう、宣伝効果抜群になること間違いなしよ！」"

[[dialogue]]
speaker = "ジュエリー"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ジュエリー"
# 「ふふ……なんだか、思っていたよりずっと写真映りが良くて驚いてしまったよ……」
line = "「ふふ……なんだか、思っていたよりずっと写真映りが良くて驚いてしまったよ……」"

[[dialogue]]
speaker = "ジュエリー"
# 「ところで、助手。私はずっと、こんな表情をしていたのかい？」
line = "「ところで、助手。私はずっと、こんな表情をしていたのかい？」"

[[dialogue]]
speaker = "ジュエリー"
# 「この写真も……これもだ。どれを見ても頬を染めて、嬉しそうに微笑んでいる……」
line = "「この写真も……これもだ。どれを見ても頬を染めて、嬉しそうに微笑んでいる……」"

[[dialogue]]
speaker = "ジュエリー"
# 「明解に換言するならば、まるで……乙女じゃないか<emoji=heart04>」
line = "「明解に換言するならば、まるで……乙女じゃないか<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ずっとだよ。俺といる時のジュエリーの表情だ
line = "ずっとだよ。俺といる時のジュエリーの表情だ"

[[dialogue]]
speaker = "ジュエリー"
# 「そうか……そうなんだな。キミといる時、こんなにも表情が変わるのか、私は……」
line = "「そうか……そうなんだな。キミといる時、こんなにも表情が変わるのか、私は……」"

[[dialogue]]
speaker = "ジュエリー"
# 「それを改めて見せつけられると……少々照れ臭いな……<emoji=heart04>」
line = "「それを改めて見せつけられると……少々照れ臭いな……<emoji=heart04>」"

[[dialogue]]
speaker = "女性カメラマン"
# 「ふふっ、私の写真、気に入ってもらえたかしら？」
line = "「ふふっ、私の写真、気に入ってもらえたかしら？」"

[[dialogue]]
speaker = "ジュエリー"
# 「ああ。こんな素晴らしい写真を撮ってくれて、とても感謝している」
line = "「ああ。こんな素晴らしい写真を撮ってくれて、とても感謝している」"

[[dialogue]]
speaker = "ジュエリー"
# 「機会があればまた、助手と２人で写真を撮りたい。その時は――あなたにお願いしてもいいだろうか？」
line = "「機会があればまた、助手と２人で写真を撮りたい。その時は――あなたにお願いしてもいいだろうか？」"

[[dialogue]]
speaker = "女性カメラマン"
# 「もちろん！　喜んで撮らせていただくわ♪」
line = "「もちろん！　喜んで撮らせていただくわ♪」"

[[dialogue]]
speaker = "ジュエリー"
# 「ありがとう、ぜひ頼むよ」
line = "「ありがとう、ぜひ頼むよ」"

[[dialogue]]
speaker = "ジュエリー"
# 「ふふ……楽しみが増えたな、我が助手。卒業までにたくさん……いや、卒業してからも――」
line = "「ふふ……楽しみが増えたな、我が助手。卒業までにたくさん……いや、卒業してからも――」"

[[dialogue]]
speaker = "ジュエリー"
# 「２人でたくさん、写真を撮っていこう」
line = "「２人でたくさん、写真を撮っていこう」"

[[dialogue]]
speaker = "unk"
# 笑顔でそう言うジュエリーを見ながら、俺もまた未来の楽しみを思い描くのだった。
line = "笑顔でそう言うジュエリーを見ながら、俺もまた未来の楽しみを思い描くのだった。"
