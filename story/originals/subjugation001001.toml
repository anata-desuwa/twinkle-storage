[[dialogue]]
speaker = "unk"
# 某日、俺が守護天使の２人――マグダレナさんとアルモタヘルさんに頼まれて、街での買い物に付き添っている際に、アステライトが出現。
line = "某日、俺が守護天使の２人――マグダレナさんとアルモタヘルさんに頼まれて、街での買い物に付き添っている際に、アステライトが出現。"

[[dialogue]]
speaker = "unk"
# そのまま２人の力を借りて、アステラ攻略を開始し、最深部でボスモンスターと交戦したのだが――
line = "そのまま２人の力を借りて、アステラ攻略を開始し、最深部でボスモンスターと交戦したのだが――"

[[dialogue]]
speaker = "モンスター"
# 「グオォォォーーーッ……！」
line = "「グオォォォーーーッ……！」"

[[dialogue]]
speaker = "マグダレナ"
# 「――どうやら、これで終わりのようですね」
line = "「――どうやら、これで終わりのようですね」"

[[dialogue]]
speaker = "アルモタヘル"
# 「ああ、倒れた奴の体が崩壊を始めている。しかし……見たことない<ruby=しゅ>種</ruby>だな。本気を出さねば危うい程に、手強かった」
line = "「ああ、倒れた奴の体が崩壊を始めている。しかし……見たことない<ruby>種<rt>しゅ</rt></ruby>だな。本気を出さねば危うい程に、手強かった」"

[[dialogue]]
speaker = "マグダレナ"
# 「会長さまは、このモンスターをご存知ですか？」
line = "「会長さまは、このモンスターをご存知ですか？」"

[[dialogue]]
speaker = "モンスター"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# いや、初めて見るやつだ
line = "いや、初めて見るやつだ"

[[dialogue]]
speaker = "アルモタヘル"
# 「そうか。ならば、リクリエの勢力が増した影響で生まれた、新種ということであろう」
line = "「そうか。ならば、リクリエの勢力が増した影響で生まれた、新種ということであろう」"

[[dialogue]]
speaker = "マグダレナ"
# 「とりあえず、倒すことはできましたし、アステラも崩壊を始めたようです。脱出しましょう」
line = "「とりあえず、倒すことはできましたし、アステラも崩壊を始めたようです。脱出しましょう」"

[[dialogue]]
speaker = "unk"
# と、その時だった。
line = "と、その時だった。"

[[dialogue]]
speaker = "アルモタヘル"
# 「！　マグダレナ、後ろだ！」
line = "「！　マグダレナ、後ろだ！」"

[[dialogue]]
speaker = "マグダレナ"
# 「！？　モンスターの体が、リクリエの瘴気に変化して……！？」
line = "「！？　モンスターの体が、リクリエの瘴気に変化して……！？」"

[[dialogue]]
speaker = "モンスター"
# 「オオオォォォッ……！」
line = "「オオオォォォッ……！」"

[[dialogue]]
speaker = "unk"
# モンスターの体はそこで、完全に崩れ去る。
line = "モンスターの体はそこで、完全に崩れ去る。"

[[dialogue]]
speaker = "unk"
# その代わりに、禍々しい霧のような、リクリエの瘴気が出現して――
line = "その代わりに、禍々しい霧のような、リクリエの瘴気が出現して――"

[[dialogue]]
speaker = "アルモタヘル"
# 「いかん！　避けろ、人の子よ！」
line = "「いかん！　避けろ、人の子よ！」"

[[dialogue]]
speaker = "unk"
# 瘴気は俺たちに向かって、一気に押し寄せてきた。
line = "瘴気は俺たちに向かって、一気に押し寄せてきた。"

[[dialogue]]
speaker = "unk"
# 咄嗟に攻撃を放つが、霧のような瘴気にはすり抜けるだけで通じず――
line = "咄嗟に攻撃を放つが、霧のような瘴気にはすり抜けるだけで通じず――"

[[dialogue]]
speaker = "マグダレナ"
# 「これは……！？　瘴気が体に纏わりついて……！」」
line = "「これは……！？　瘴気が体に纏わりついて……！」」"

[[dialogue]]
speaker = "アルモタヘル"
# 「くっ……ぬかった……！　人の子よ、せめてお前だけでも……！」
line = "「くっ……ぬかった……！　人の子よ、せめてお前だけでも……！」"

[[dialogue]]
speaker = "マグダレナ"
# 「私たちのことはいいですから、逃げて……下さい……！」
line = "「私たちのことはいいですから、逃げて……下さい……！」"

[[dialogue]]
speaker = "unk"
# ２人が気を失って、地面に倒れてしまう。
line = "２人が気を失って、地面に倒れてしまう。"

[[dialogue]]
speaker = "unk"
# 俺は瘴気を浴びながらも、何とか意識を保ち……
line = "俺は瘴気を浴びながらも、何とか意識を保ち……"

[[dialogue]]
speaker = "unk"
# そんなこと……できるわけない……！
line = "そんなこと……できるわけない……！"

[[dialogue]]
speaker = "unk"
# ２人の体を肩に抱え上げると、薄れゆく意識の中で、アステラの出口を目指すのだった――
line = "２人の体を肩に抱え上げると、薄れゆく意識の中で、アステラの出口を目指すのだった――"

[[dialogue]]
speaker = "unk"
# ん……誰か……俺の手を握ってくれている気がする……。
line = "ん……誰か……俺の手を握ってくれている気がする……。"

[[dialogue]]
speaker = "unk"
# 次に目覚めると、そこは新星学園の保健室だった。
line = "次に目覚めると、そこは新星学園の保健室だった。"

[[dialogue]]
speaker = "unk"
# そして、ベッドで仰向けに寝ている俺の横に座り、手を握ってくれていたのは――
line = "そして、ベッドで仰向けに寝ている俺の横に座り、手を握ってくれていたのは――"

[[dialogue]]
speaker = "アニマ"
# 「おや？　お目覚めカナ？」
line = "「おや？　お目覚めカナ？」"

[[dialogue]]
speaker = "unk"
# アニマ先輩……？
line = "アニマ先輩……？"

[[dialogue]]
speaker = "アニマ"
# 「ああ、そうダとも。お馴染み、購買部の看板娘にして、キミと共に世界を救う同志。天才美少女錬金術師のアニマだ」
line = "「ああ、そうダとも。お馴染み、購買部の看板娘にして、キミと共に世界を救う同志。天才美少女錬金術師のアニマだ」"

[[dialogue]]
speaker = "アニマ"
# 「――手を握ってくれてイタのかって？　なに、こうスルと、意識はなくとも安心すると聞いたものでね。多少なりとも効果はあったカナ？」
line = "「――手を握ってくれてイタのかって？　なに、こうスルと、意識はなくとも安心すると聞いたものでね。多少なりとも効果はあったカナ？」"

[[dialogue]]
speaker = "アニマ"
# 「――そうか、効果があったなら、なによりダ。フヒ♪」
line = "「――そうか、効果があったなら、なによりダ。フヒ♪」"

[[dialogue]]
speaker = "unk"
# 彼女は新星学園３年生のアニマ先輩。
line = "彼女は新星学園３年生のアニマ先輩。"

[[dialogue]]
speaker = "unk"
# 錬金術師であり、発明品の副作用によって様々なトラブルを巻き起こしたりもするが、その一方で、学園の対リクリエ技術において欠かせない存在でもある。
line = "錬金術師であり、発明品の副作用によって様々なトラブルを巻き起こしたりもするが、その一方で、学園の対リクリエ技術において欠かせない存在でもある。"

[[dialogue]]
speaker = "unk"
# 守護天使２人が流星市国で活動する為のアバターを作り出したのも、実は彼女。まさに自他共に認める天才である。
line = "守護天使２人が流星市国で活動する為のアバターを作り出したのも、実は彼女。まさに自他共に認める天才である。"

[[dialogue]]
speaker = "unk"
# ！　そうだ、守護天使の２人は！？
line = "！　そうだ、守護天使の２人は！？"

[[dialogue]]
speaker = "アニマ"
# 「大丈夫、無事ダ。リクリエの瘴気による汚染が進行する前に、キミが学園まで運んできたおかげだナ」
line = "「大丈夫、無事ダ。リクリエの瘴気による汚染が進行する前に、キミが学園まで運んできたおかげだナ」"

[[dialogue]]
speaker = "アニマ"
# 「朦朧とする意識の中で、大したものダ！　同志として、敬意を表スル」
line = "「朦朧とする意識の中で、大したものダ！　同志として、敬意を表スル」"

[[dialogue]]
speaker = "unk"
# ２人が無事だと安堵したのも束の間、何気なく触れた自身の体に違和感を覚えた。
line = "２人が無事だと安堵したのも束の間、何気なく触れた自身の体に違和感を覚えた。"

[[dialogue]]
speaker = "アニマ"
# 「フヒ♪　気づいたカ、会長」
line = "「フヒ♪　気づいたカ、会長」"

[[dialogue]]
speaker = "アニマ"
# 「今、ベッドの前に全身鏡を作るから、見てみるとイイ。それ♪」
line = "「今、ベッドの前に全身鏡を作るから、見てみるとイイ。それ♪」"

[[dialogue]]
speaker = "unk"
# アニマ先輩が作った全身鏡。そこに映っていたのは――
line = "アニマ先輩が作った全身鏡。そこに映っていたのは――"

[[dialogue]]
speaker = "unk"
# 体が小さくなってるーーーっ！？
line = "体が小さくなってるーーーっ！？"

[[dialogue]]
speaker = "アニマ"
# 「フヒヒッ、アハハッ♪　その通り！　会長、キミは今、アニマが作った『<ruby=よう>幼</ruby>アバター』の中に精神を移した状態なんダ♪」
line = "「フヒヒッ、アハハッ♪　その通り！　会長、キミは今、アニマが作った『<ruby>幼<rt>よう</rt></ruby>アバター』の中に精神を移した状態なんダ♪」"

[[dialogue]]
speaker = "unk"
# いや、どういうこと！？
line = "いや、どういうこと！？"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「ママダレナ、ただいま戻りました～♪　って、あっ！　会長さま！」
line = "「ママダレナ、ただいま戻りました～♪　って、あっ！　会長さま！」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「お目覚めになられたのですね！　なかなか起きないから、心配してたんですよ～！」
line = "「お目覚めになられたのですね！　なかなか起きないから、心配してたんですよ～！」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「なんだと！？　おお、人の子よ！　よかったのだ！　そうだ、お肉があるぞ、お肉！」
line = "「なんだと！？　おお、人の子よ！　よかったのだ！　そうだ、お肉があるぞ、お肉！」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「沢山補充しておいたから、アルモたんと一緒に食べるのだ！　元気が出るぞ♪」
line = "「沢山補充しておいたから、アルモたんと一緒に食べるのだ！　元気が出るぞ♪」"

[[dialogue]]
speaker = "unk"
# ２人とも小さくなってるーーーーーっ！！？
line = "２人とも小さくなってるーーーーーっ！！？"

[[dialogue]]
speaker = "unk"
# 守護天使２人の衝撃的な姿を見て、自分の時よりも驚いてしまうのであった――
line = "守護天使２人の衝撃的な姿を見て、自分の時よりも驚いてしまうのであった――"
