line = "「ふんっ！　全員蹴散らしてあげるわ！　消え去りなさいっ！」"

[[dialogue]]
speaker = "アナ"
# 「……相変わらずの最強っぷり。私たち、必要なかった」
line = "「……相変わらずの最強っぷり。私たち、必要なかった」"

[[dialogue]]
speaker = "サーシャ"
# 「まあ結果は予想がついてたけれど、Ｓランクが複数出現、となったら流石にみんなで出動しなくちゃね～」
line = "「まあ結果は予想がついてたけれど、Ｓランクが複数出現、となったら流石にみんなで出動しなくちゃね～」"

[[dialogue]]
