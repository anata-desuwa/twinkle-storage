# 「……私も、もっと頑張らなきゃ」
line = "「……私も、もっと頑張らなきゃ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロト！　私の活躍、見てたかしら！」
line = "「クロト！　私の活躍、見てたかしら！」"

[[dialogue]]
speaker = "unk"
# ああ、さすがヴィーナスだ！
line = "ああ、さすがヴィーナスだ！"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふふんっ、もっと褒めてくれてもいいのよ！　いえ、もっと褒めて！」
line = "「ふふんっ、もっと褒めてくれてもいいのよ！　いえ、もっと褒めて！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ん、んふっ♪　そう、たくさん頭を撫でてくれていいのよ……？　私、頑張ったんだから♥」
line = "「ん、んふっ♪　そう、たくさん頭を撫でてくれていいのよ……？　私、頑張ったんだから♥」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……って、なによ、もう終わりなの？　ダ～メ♪　もっと撫でて？」
line = "「……って、なによ、もう終わりなの？　ダ～メ♪　もっと撫でて？」"

[[dialogue]]
speaker = "マトイ"
# 「あれ？　私の目の前にいるヴィーナスは、もしかして幻かな？」
line = "「あれ？　私の目の前にいるヴィーナスは、もしかして幻かな？」"

[[dialogue]]
speaker = "アナ"
# 「現実逃避。別に不思議じゃない。前会長は現会長に心を許してた。特に最近は」
line = "「現実逃避。別に不思議じゃない。前会長は現会長に心を許してた。特に最近は」"

[[dialogue]]
speaker = "サーシャ"
# 「あ～ん、お姉ちゃんとしての立場が～」
line = "「あ～ん、お姉ちゃんとしての立場が～」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……なに、クロト。みんなが気になるの？　別にいいじゃない、恥ずかしいことをしているわけでもないし」
line = "「……なに、クロト。みんなが気になるの？　別にいいじゃない、恥ずかしいことをしているわけでもないし」"

[[dialogue]]
speaker = "マトイ"
# 「え」
line = "「え」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それに……クロトにこうされるの、私好きだわ。前におんぶしてもらった時もそうだったけど、クロトに触れてもらえると安心するの……」
line = "「それに……クロトにこうされるの、私好きだわ。前におんぶしてもらった時もそうだったけど、クロトに触れてもらえると安心するの……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ねえねえ、私のこと……抱きしめてみて？」
line = "「ねえねえ、私のこと……抱きしめてみて？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……いいのかって、私が頼んでるんだから、いいに決まってるじゃない。ほら早く早く」
line = "「……いいのかって、私が頼んでるんだから、いいに決まってるじゃない。ほら早く早く」"

[[dialogue]]
speaker = "ヴィーナス"
# 「んっ……はぁ……んんっ。やっぱり、いいわね。なんだか守ってもらえてるみたいで、ほっとするわ」
line = "「んっ……はぁ……んんっ。やっぱり、いいわね。なんだか守ってもらえてるみたいで、ほっとするわ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……でもね、ほっとするだけじゃないことに、最近気づいたのよ」
line = "「……でもね、ほっとするだけじゃないことに、最近気づいたのよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「心臓がね、高鳴るの。どくん、どくんって。痛いくらいに。……ドキドキしてるっていうのかしらね」
