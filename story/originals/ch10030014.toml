[[dialogue]]
speaker = "ヴィーナス"
# 「私、あのカードの意味をずっと考えてたの。どうして、恋人のカードなんて出たんだろうって」
line = "「私、あのカードの意味をずっと考えてたの。どうして、恋人のカードなんて出たんだろうって」"

[[dialogue]]
speaker = "ヴィーナス"
