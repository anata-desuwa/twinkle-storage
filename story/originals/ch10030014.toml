line = "「情熱だとかときめきだとか、実際のところ私がクロトに対して思っていることを考えれば、恋人のカードが出たっておかしくないって思った」"

[[dialogue]]
speaker = "ヴィーナス"
# 「でもね、こうしてクロトに甘えさせてもらっている時……私、本当に、信じられないくらい幸せなの」
