[[dialogue]]
speaker = "ジュエリー"
# 「奇遇なことに私もウェディングフォームが発現してしまったんだ。だから結婚式の神官役を引き受けることは出来ない」
line = "「奇遇なことに私もウェディングフォームが発現してしまったんだ。だから結婚式の神官役を引き受けることは出来ない」"

[[dialogue]]
speaker = "unk"
# まさかジュエリーもウェディングフォームに……
line = "まさかジュエリーもウェディングフォームに……"

[[dialogue]]
speaker = "イレーナ"
# 「確かにそれでは神官役は難しいですね……」
line = "「確かにそれでは神官役は難しいですね……」"

[[dialogue]]
speaker = "ジュエリー"
# 「ああ、自身が花嫁になってしまっては、たとえふりでも神官として結婚を見届けることは出来ないよ」
line = "「ああ、自身が花嫁になってしまっては、たとえふりでも神官として結婚を見届けることは出来ないよ」"

[[dialogue]]
speaker = "ジュエリー"
# 「事の経緯を説明しようか。トワ先生はこの式場で、ウェディングフォームを発現させる、ウェディング因子というものについて調査していた」
line = "「事の経緯を説明しようか。トワ先生はこの式場で、ウェディングフォームを発現させる、ウェディング因子というものについて調査していた」"

[[dialogue]]
speaker = "ジュエリー"
# 「それに随行させてもらっていたところ、それが突然活性化してしまってね。その光を全身に浴びてしまったんだ」
line = "「それに随行させてもらっていたところ、それが突然活性化してしまってね。その光を全身に浴びてしまったんだ」"

[[dialogue]]
speaker = "ジュエリー"
# 「するとまばゆい光と共にウェディングフォームが発現し、他のフォームに切り替えられなくなってしまったというわけさ」
line = "「するとまばゆい光と共にウェディングフォームが発現し、他のフォームに切り替えられなくなってしまったというわけさ」"

[[dialogue]]
speaker = "ジュエリー"
# 「これはこれで素晴らしいが……助手との愛の結晶であるエクリプスフォームになれないのは問題だ」
line = "「これはこれで素晴らしいが……助手との愛の結晶であるエクリプスフォームになれないのは問題だ」"

[[dialogue]]
speaker = "unk"
# もしかしてジュエリーの相談って……
line = "もしかしてジュエリーの相談って……"

[[dialogue]]
speaker = "ジュエリー"
# 「そういうことだよ」
line = "「そういうことだよ」"

[[dialogue]]
speaker = "イレーナ"
# 「ウェディング因子……ジュエリーさんはそれを浴びた影響でウェディングフォームになったのですよね？」
line = "「ウェディング因子……ジュエリーさんはそれを浴びた影響でウェディングフォームになったのですよね？」"

[[dialogue]]
speaker = "イレーナ"
# 「ですが私はどうしてなのでしょう？　私はそういったものは浴びていないと思うのですが……」
line = "「ですが私はどうしてなのでしょう？　私はそういったものは浴びていないと思うのですが……」"

[[dialogue]]
speaker = "ジュエリー"
# 「イレーナさんは、フィオナ会長やトワ先生のウェディングフォームを解除するために、結婚式の神官役として関わり続けてきただろう？」
line = "「イレーナさんは、フィオナ会長やトワ先生のウェディングフォームを解除するために、結婚式の神官役として関わり続けてきただろう？」"

[[dialogue]]
speaker = "ジュエリー"
# 「そこでずっとこの因子を浴び続けてきたからではないかな？　それが蓄積していった結果、ついに発現するに至った……そういう事だろう」
line = "「そこでずっとこの因子を浴び続けてきたからではないかな？　それが蓄積していった結果、ついに発現するに至った……そういう事だろう」"

[[dialogue]]
speaker = "イレーナ"
# 「な、なるほど……」
line = "「な、なるほど……」"

[[dialogue]]
speaker = "イレーナ"
# （何それ、怖……）
line = "（何それ、怖……）"

[[dialogue]]
speaker = "unk"
# ところで２人は知り合い？
line = "ところで２人は知り合い？"

[[dialogue]]
speaker = "ジュエリー"
# 「おや、何故そう考えたのかな？」
line = "「おや、何故そう考えたのかな？」"

[[dialogue]]
speaker = "unk"
# お互いに初めましての挨拶が無かった
line = "お互いに初めましての挨拶が無かった"

[[dialogue]]
speaker = "ジュエリー"
# 「ほう、良い着眼だ。探偵助手としての成長が見られて私は嬉しいよ」
line = "「ほう、良い着眼だ。探偵助手としての成長が見られて私は嬉しいよ」"

[[dialogue]]
speaker = "ジュエリー"
# 「その通り、私とイレーナさんは以前会ったことがある」
line = "「その通り、私とイレーナさんは以前会ったことがある」"

[[dialogue]]
speaker = "ジュエリー"
# 「私が事件の解決のためにイタリアに赴いた時のことだ。あの事件は中々に厄介な事件だった──と、それは余談だね」
line = "「私が事件の解決のためにイタリアに赴いた時のことだ。あの事件は中々に厄介な事件だった──と、それは余談だね」"

[[dialogue]]
speaker = "ジュエリー"
# 「聖女と呼ばれる彼女に興味があって、訪ねてみたんだ。実際に会ってみて、まさに聖女と呼ぶに相応しい振る舞いに感銘を受けたものだ」
line = "「聖女と呼ばれる彼女に興味があって、訪ねてみたんだ。実際に会ってみて、まさに聖女と呼ぶに相応しい振る舞いに感銘を受けたものだ」"

[[dialogue]]
speaker = "ジュエリー"
# 「そして彼女に聞いてみた──キミは『聖女』の選星者ではないか、とね」
line = "「そして彼女に聞いてみた──キミは『聖女』の選星者ではないか、とね」"

[[dialogue]]
speaker = "イレーナ"
# 「私はたまたま聖女と呼ばれるような力を持ち合わせていただけです」
line = "「私はたまたま聖女と呼ばれるような力を持ち合わせていただけです」"

[[dialogue]]
speaker = "イレーナ"
# 「選星者は天からの啓示を受けるそうですから、もし私が選星者であるならその自覚があるはず」
line = "「選星者は天からの啓示を受けるそうですから、もし私が選星者であるならその自覚があるはず」"

[[dialogue]]
speaker = "イレーナ"
# 「しかし私に啓示はありませんでした。ですから私は選星者ではありません。きっと私などより『聖女』に相応しい方がどこかにいるのだと思います」
line = "「しかし私に啓示はありませんでした。ですから私は選星者ではありません。きっと私などより『聖女』に相応しい方がどこかにいるのだと思います」"

[[dialogue]]
speaker = "ジュエリー"
# 「あの時もキミはそう言っていたね」
line = "「あの時もキミはそう言っていたね」"

[[dialogue]]
speaker = "ジュエリー"
# 「だがキミは多くの人々の傷を癒し、心を支えてきた。選星者でなくとも、キミは立派な聖女だ。私はそう思うよ」
line = "「だがキミは多くの人々の傷を癒し、心を支えてきた。選星者でなくとも、キミは立派な聖女だ。私はそう思うよ」"

[[dialogue]]
speaker = "イレーナ"
# 「ありがとうございます。そこまで言われると恐縮です」
line = "「ありがとうございます。そこまで言われると恐縮です」"

[[dialogue]]
speaker = "ジュエリー"
# 「とまあ、私たちの関係はそんなところだ。分かってもらえたかな？」
line = "「とまあ、私たちの関係はそんなところだ。分かってもらえたかな？」"

[[dialogue]]
speaker = "unk"
# よくわかりました
line = "よくわかりました"

[[dialogue]]
speaker = "ジュエリー"
# 「では問題の解決に移ろうか」
line = "「では問題の解決に移ろうか」"

[[dialogue]]
speaker = "ジュエリー"
# 「トワ先生によれば、フォームの解除はただ結婚式を挙げればよいというわけではない」
line = "「トワ先生によれば、フォームの解除はただ結婚式を挙げればよいというわけではない」"

[[dialogue]]
speaker = "ジュエリー"
# 「きちんと花嫁修業をして、本当に結婚式を挙げる心づもりで臨まなければならないそうだ」
line = "「きちんと花嫁修業をして、本当に結婚式を挙げる心づもりで臨まなければならないそうだ」"

[[dialogue]]
speaker = "ジュエリー"
# 「神官役は探さなくてはならないが、それが見つかるまでの間、花嫁修業に励もうじゃないか」
line = "「神官役は探さなくてはならないが、それが見つかるまでの間、花嫁修業に励もうじゃないか」"

[[dialogue]]
speaker = "イレーナ"
# 「そうですね……。会長さん、申し訳ありませんが、お付き合い頂けますか？」
line = "「そうですね……。会長さん、申し訳ありませんが、お付き合い頂けますか？」"

[[dialogue]]
speaker = "unk"
# わかった
line = "わかった"

[[dialogue]]
speaker = "ジュエリー"
# 「感謝するよ。さあ我が助手、修行の場へと案内してくれたまえ」
line = "「感謝するよ。さあ我が助手、修行の場へと案内してくれたまえ」"
