[[dialogue]]
speaker = "ルルカ"
# 「えっと……フェニックス、さん？　自分を消して欲しいって、どういう……？」
line = "「えっと……フェニックス、さん？　自分を消して欲しいって、どういう……？」"

[[dialogue]]
speaker = "フェニックス"
# 「ホウちゃん、で構いません。フニが付けてくれた呼び名、私は気に入っているのです」
line = "「ホウちゃん、で構いません。フニが付けてくれた呼び名、私は気に入っているのです」"

[[dialogue]]
speaker = "フェニックス"
# 「鳳凰のホウちゃん、という意味らしいです。人間界に伝わる鳳凰は吉兆……縁起のいい名前です」
line = "「鳳凰のホウちゃん、という意味らしいです。人間界に伝わる鳳凰は吉兆……縁起のいい名前です」"

[[dialogue]]
speaker = "セシア"
# 「なら、ホウちゃん。ちゃんとあなたの事情を聞かせて欲しいわ」
line = "「なら、ホウちゃん。ちゃんとあなたの事情を聞かせて欲しいわ」"

[[dialogue]]
speaker = "セシア"
# 「わたくし、転生をしたことで、前世の蓄積のほとんど失ってしまっているの。だから、あなたのこともわたくしは思い出せないのよ」
line = "「わたくし、転生をしたことで、前世の蓄積のほとんど失ってしまっているの。だから、あなたのこともわたくしは思い出せないのよ」"

[[dialogue]]
speaker = "フェニックス"
# 「そうでしたね」
line = "「そうでしたね」"

[[dialogue]]
speaker = "unk"
# ラクシスのことも……
どうして知っているんだ？
line = "ラクシスのことも……\nどうして知っているんだ？"

[[dialogue]]
speaker = "フェニックス"
# 「幸い、この精神世界の中では、時間の流れが現実よりも遥かに遅い。まずは落ち着いて、その辺りのことを説明しましょう」
line = "「幸い、この精神世界の中では、時間の流れが現実よりも遥かに遅い。まずは落ち着いて、その辺りのことを説明しましょう」"

[[dialogue]]
speaker = "フェニックス"
# 「――私はかつて３０００年前、当時の『クルセイダース』を率いた魔王『ラクシス』と共に、リクリエと戦ったことがあります」
line = "「――私はかつて３０００年前、当時の『クルセイダース』を率いた魔王『ラクシス』と共に、リクリエと戦ったことがあります」"

[[dialogue]]
speaker = "セシア"
# 「あなた、魔王と一緒に戦う仲間だったのね」
line = "「あなた、魔王と一緒に戦う仲間だったのね」"

[[dialogue]]
speaker = "フェニックス"
# 「ええ。――リクリエとの戦いが、終わるまでは」
line = "「ええ。――リクリエとの戦いが、終わるまでは」"

[[dialogue]]
speaker = "フェニックス"
# 「私は……リクリエを撃退した後、アウクセシア――あなたと対立しました」
line = "「私は……リクリエを撃退した後、アウクセシア――あなたと対立しました」"

[[dialogue]]
speaker = "フェニックス"
# 「次のリクリエが来た時に負けない『強い世界』を作るには、淘汰や闘争の絶えない乱世を続けるべきだと、私は主張しました」
line = "「次のリクリエが来た時に負けない『強い世界』を作るには、淘汰や闘争の絶えない乱世を続けるべきだと、私は主張しました」"

[[dialogue]]
speaker = "ルルカ"
# 「どうして、そんな……」
line = "「どうして、そんな……」"

[[dialogue]]
speaker = "フェニックス"
# 「闘争なき平和な世界では、決して強さを維持できないからです。そして、不死の力を持つ私と違って、生物には基本的に寿命が存在する」
line = "「闘争なき平和な世界では、決して強さを維持できないからです。そして、不死の力を持つ私と違って、生物には基本的に寿命が存在する」"

[[dialogue]]
speaker = "フェニックス"
# 「リクリエを生き抜いた世代の多くが寿命で居なくなった時、次に残る世代の多くは、リクリエの脅威を実感せずに過ごすこととなる」
line = "「リクリエを生き抜いた世代の多くが寿命で居なくなった時、次に残る世代の多くは、リクリエの脅威を実感せずに過ごすこととなる」"

[[dialogue]]
speaker = "フェニックス"
# 「それでは次の３０００年後にリクリエが訪れる時まで、強さを維持することなどできるはずがない」
line = "「それでは次の３０００年後にリクリエが訪れる時まで、強さを維持することなどできるはずがない」"

[[dialogue]]
speaker = "フェニックス"
# 「だからこそ、私はヒトビトを争わせ続けるべきだと主張したのです」
line = "「だからこそ、私はヒトビトを争わせ続けるべきだと主張したのです」"

[[dialogue]]
speaker = "フェニックス"
# 「――そんな私に対して、誰よりも反対を示したのが、守護天使アウクセシアでした」
line = "「――そんな私に対して、誰よりも反対を示したのが、守護天使アウクセシアでした」"

[[dialogue]]
speaker = "セシア"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "フェニックス"
# 「私と彼女はやがて、魔界のこの場所で戦うことになり――結果として、敗れたのは私の方でした」
line = "「私と彼女はやがて、魔界のこの場所で戦うことになり――結果として、敗れたのは私の方でした」"

[[dialogue]]
speaker = "フェニックス"
# 「その時に、アウクセシアが言ったのです」
line = "「その時に、アウクセシアが言ったのです」"

[[dialogue]]
speaker = "フェニックス"
# 「あなたにも未来を見て、そこで判断して欲しい――と」
line = "「あなたにも未来を見て、そこで判断して欲しい――と」"

[[dialogue]]
speaker = "フェニックス"
# 「最終的に、アウクセシアが≪円環≫のラクシャの力を借りて、私に施したのが……」
line = "「最終的に、アウクセシアが≪円環≫のラクシャの力を借りて、私に施したのが……」"

[[dialogue]]
speaker = "セシア"
# 「――『転生封印』だったのね」
line = "「――『転生封印』だったのね」"

[[dialogue]]
speaker = "フェニックス"
# 「はい。未来に生まれて来る天使の中に存在を宿す――」
line = "「はい。未来に生まれて来る天使の中に存在を宿す――」"

[[dialogue]]
speaker = "ルルカ"
# 「それがフニちゃん……！」
line = "「それがフニちゃん……！」"

[[dialogue]]
speaker = "フェニックス"
# 「私はアウクセシアと本気で戦い負けた身。故に勝者である彼女の言う未来を観測しようと思い、その封印を受け入れました」
line = "「私はアウクセシアと本気で戦い負けた身。故に勝者である彼女の言う未来を観測しようと思い、その封印を受け入れました」"

[[dialogue]]
speaker = "フェニックス"
# 「しかし、誤算が１つありました」
line = "「しかし、誤算が１つありました」"

[[dialogue]]
speaker = "フェニックス"
# 「他人の中に宿るというのが一体どういうことなのか、私は予想できていなかったのです」
line = "「他人の中に宿るというのが一体どういうことなのか、私は予想できていなかったのです」"

[[dialogue]]
speaker = "unk"
# 思い出すように目を細めながら、魔獣フェニックスは続きを語る。
line = "思い出すように目を細めながら、魔獣フェニックスは続きを語る。"

[[dialogue]]
speaker = "フェニックス"
# 「――私がフニの中で目覚めたのは、彼女の最初の故郷がモンスターに襲われた時です」
line = "「――私がフニの中で目覚めたのは、彼女の最初の故郷がモンスターに襲われた時です」"

[[dialogue]]
speaker = "ルルカ"
# 「最初の故郷……？」
line = "「最初の故郷……？」"

[[dialogue]]
speaker = "フェニックス"
# 「彼女は北海道の孤児院で世話になる前、別の村に両親と住んでいたのです。フニにとっては、物心がつくよりも以前の話になります」
line = "「彼女は北海道の孤児院で世話になる前、別の村に両親と住んでいたのです。フニにとっては、物心がつくよりも以前の話になります」"

[[dialogue]]
speaker = "unk"
# その村は……？
line = "その村は……？"

[[dialogue]]
speaker = "フェニックス"
# 「……突然変異の、学園の基準ではＳランクに相当するモンスターでした。村唯一の星騎士であったフニの母親も敵わずに、住人は全滅」
line = "「……突然変異の、学園の基準ではＳランクに相当するモンスターでした。村唯一の星騎士であったフニの母親も敵わずに、住人は全滅」"

[[dialogue]]
speaker = "フェニックス"
# 「最後の生き残りであった幼いフニも瀕死状態でした。私が目覚めたのはその時」
line = "「最後の生き残りであった幼いフニも瀕死状態でした。私が目覚めたのはその時」"

[[dialogue]]
speaker = "フェニックス"
# 「意識を失ったフニの代わりに、私がモンスターを倒しました。フニは事件の奇跡的な生存者として、別の村の孤児院で過ごすことになります」
line = "「意識を失ったフニの代わりに、私がモンスターを倒しました。フニは事件の奇跡的な生存者として、別の村の孤児院で過ごすことになります」"

[[dialogue]]
speaker = "ルルカ"
# 「フニちゃん、そんな辛い経験があったなんて……」
line = "「フニちゃん、そんな辛い経験があったなんて……」"

[[dialogue]]
speaker = "フェニックス"
# 「ですが……驚いたのは、彼女の心の強さです」
line = "「ですが……驚いたのは、彼女の心の強さです」"

[[dialogue]]
speaker = "フェニックス"
# 「赤ん坊の頃に事故に遭い、両親を失っているにも関わらず、彼女がその件で泣くことは決してありませんでした」
line = "「赤ん坊の頃に事故に遭い、両親を失っているにも関わらず、彼女がその件で泣くことは決してありませんでした」"

[[dialogue]]
speaker = "フェニックス"
# 「フニはその見た目からは信じられない程に……強い心を持っていました。亡くなった両親の分も立派に生きようと、前を向いて進むことを選んだのです」
line = "「フニはその見た目からは信じられない程に……強い心を持っていました。亡くなった両親の分も立派に生きようと、前を向いて進むことを選んだのです」"

[[dialogue]]
speaker = "フェニックス"
# 「そんな彼女の健気な姿に、周りの大人も感化されていきました。村の全員が家族のように、フニのことを可愛がるようになったんです」
line = "「そんな彼女の健気な姿に、周りの大人も感化されていきました。村の全員が家族のように、フニのことを可愛がるようになったんです」"

[[dialogue]]
speaker = "フェニックス"
# 「そしてそれは――私も同じでした」
line = "「そしてそれは――私も同じでした」"

[[dialogue]]
speaker = "unk"
# その時、俺は気づく。思い出しながら語るフェニックス――ホウちゃんの目が、とても優しいものであることに。
line = "その時、俺は気づく。思い出しながら語るフェニックス――ホウちゃんの目が、とても優しいものであることに。"

[[dialogue]]
speaker = "セシア"
# 「ああ……今わかったわ。ホウちゃん、あなた――」
line = "「ああ……今わかったわ。ホウちゃん、あなた――」"

[[dialogue]]
speaker = "セシア"
# 「いつの間にか、フニの<b>ママ</b>になっていたのね」
line = "「いつの間にか、フニの<b>ママ</b>になっていたのね」"

[[dialogue]]
speaker = "フェニックス"
# 「――ママ、と言えるほど、大層なものではありません。ですが、そうですね……フニのことを娘のように愛おしく思うようになっていたことは、否定しません」
line = "「――ママ、と言えるほど、大層なものではありません。ですが、そうですね……フニのことを娘のように愛おしく思うようになっていたことは、否定しません」"

[[dialogue]]
speaker = "フェニックス"
# 「それからの経緯は、先日フニがあなた達に話していた通りです」
line = "「それからの経緯は、先日フニがあなた達に話していた通りです」"

[[dialogue]]
speaker = "フェニックス"
# 「フニは街に買い物へ出かけた際、再びモンスターの襲撃事件に遭遇し……通りがかった<b>見知らぬ子供を庇って</b>、瀕死の重傷を負いました」
line = "「フニは街に買い物へ出かけた際、再びモンスターの襲撃事件に遭遇し……通りがかった<b>見知らぬ子供を庇って</b>、瀕死の重傷を負いました」"

[[dialogue]]
speaker = "フェニックス"
# 「当時のフニは、星力にも目覚めていない……ごくごく普通の一般市民だったというのに」
line = "「当時のフニは、星力にも目覚めていない……ごくごく普通の一般市民だったというのに」"

[[dialogue]]
speaker = "セシア"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "フェニックス"
# 「そこで私の封印が更に緩んで、フニは星力に目覚めました。そして私とも、意志疎通ができるようになりました」
line = "「そこで私の封印が更に緩んで、フニは星力に目覚めました。そして私とも、意志疎通ができるようになりました」"

[[dialogue]]
speaker = "フェニックス"
# 「フニと直接話ができるようになった時は、それはもう嬉しかった」
line = "「フニと直接話ができるようになった時は、それはもう嬉しかった」"

[[dialogue]]
speaker = "フェニックス"
# 「できれば、このまま彼女が成長して行くのを、ずっと見守っていたかった……」
line = "「できれば、このまま彼女が成長して行くのを、ずっと見守っていたかった……」"

[[dialogue]]
speaker = "フェニックス"
# 「ですが、現実はそう上手くは行きませんでした……」
line = "「ですが、現実はそう上手くは行きませんでした……」"

[[dialogue]]
speaker = "フェニックス"
# 「アウクセシアの転生封印は、もともと私とフニが対等の状態で共存できるようには、作られていなかったのです」
line = "「アウクセシアの転生封印は、もともと私とフニが対等の状態で共存できるようには、作られていなかったのです」"

[[dialogue]]
speaker = "セシア"
# 「あなたの姿を実際に見て、術式の内容がわかったわ。元々はあなたの力は表に出て来ず、あくまでフニの体の中から世界を観測するだけのはずだった」
line = "「あなたの姿を実際に見て、術式の内容がわかったわ。元々はあなたの力は表に出て来ず、あくまでフニの体の中から世界を観測するだけのはずだった」"

[[dialogue]]
speaker = "セシア"
# 「そうして、フニが寿命を全うした時、初めて封印が解けて、元の姿で外に出られるはずだったのね」
line = "「そうして、フニが寿命を全うした時、初めて封印が解けて、元の姿で外に出られるはずだったのね」"

[[dialogue]]
speaker = "フェニックス"
# 「ええ。私は不死鳥ですから……」
line = "「ええ。私は不死鳥ですから……」"

[[dialogue]]
speaker = "セシア"
# 「だけど、意図しない形で封印が緩んでしまった。フニが過去に２度、<b>リクリエのモンスターによって</b>死にかけたことで」
line = "「だけど、意図しない形で封印が緩んでしまった。フニが過去に２度、<b>リクリエのモンスターによって</b>死にかけたことで」"

[[dialogue]]
speaker = "フェニックス"
# 「私とフニの力関係は、これまで奇跡的に、絶妙なバランスで保たれていたのです。しかし――」
line = "「私とフニの力関係は、これまで奇跡的に、絶妙なバランスで保たれていたのです。しかし――」"

[[dialogue]]
speaker = "セシア"
# 「フニが新たな力――クリスマスフォームを手に入れたことで、更にあなたの力を引き出せるようになった」
line = "「フニが新たな力――クリスマスフォームを手に入れたことで、更にあなたの力を引き出せるようになった」"

[[dialogue]]
speaker = "フェニックス"
# 「はい。その結果……ついにバランスが崩れてしまったのです」
line = "「はい。その結果……ついにバランスが崩れてしまったのです」"

[[dialogue]]
speaker = "ルルカ"
# 「それって……このままだと、どうなっちゃうの！？」
line = "「それって……このままだと、どうなっちゃうの！？」"

[[dialogue]]
speaker = "フェニックス"
# 「……フニと私が完全に融合して、フニの精神が消滅します」
line = "「……フニと私が完全に融合して、フニの精神が消滅します」"

[[dialogue]]
speaker = "unk"
# なっ……！？
line = "なっ……！？"

[[dialogue]]
speaker = "フェニックス"
# 「私の力に、フニの精神が耐え切れないのです。このままでは、フニの体に私の精神だけが残る形になります」
line = "「私の力に、フニの精神が耐え切れないのです。このままでは、フニの体に私の精神だけが残る形になります」"

[[dialogue]]
speaker = "ルルカ"
# 「そんな……！」
line = "「そんな……！」"

[[dialogue]]
speaker = "フェニックス"
# 「だからこそ……セシア。あなたにお願いしたくて、ここへ呼んだのです」
line = "「だからこそ……セシア。あなたにお願いしたくて、ここへ呼んだのです」"

[[dialogue]]
speaker = "フェニックス"
# 「フニの精神が消滅してしまう前に――私という存在を消して下さい」
line = "「フニの精神が消滅してしまう前に――私という存在を消して下さい」"

[[dialogue]]
speaker = "フェニックス"
# 「『蓄積』を司る守護天使のあなたならば、それができる。不死の力を持つ私であっても、存在の『蓄積』をゼロにすることで、完全消滅させることが」
line = "「『蓄積』を司る守護天使のあなたならば、それができる。不死の力を持つ私であっても、存在の『蓄積』をゼロにすることで、完全消滅させることが」"

[[dialogue]]
speaker = "セシア"
# 「……待ちなさい。いくらわたくしでも、そこまで強力な霊術は扱えないわ」
line = "「……待ちなさい。いくらわたくしでも、そこまで強力な霊術は扱えないわ」"

[[dialogue]]
speaker = "フェニックス"
# 「確かに、通常なら意思を持つ相手の存在、『蓄積』を一方的に奪うことはできないでしょう。ですが、私自身がその術に協力的であれば可能なはず。違いますか？」
line = "「確かに、通常なら意思を持つ相手の存在、『蓄積』を一方的に奪うことはできないでしょう。ですが、私自身がその術に協力的であれば可能なはず。違いますか？」"

[[dialogue]]
speaker = "セシア"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ルルカ"
# 「ま、待って！　そんなことしなくても、例えば封印をもう１度かけ直すとか、そういうのはできないの？」
line = "「ま、待って！　そんなことしなくても、例えば封印をもう１度かけ直すとか、そういうのはできないの？」"

[[dialogue]]
speaker = "フェニックス"
# 「残念ながら、それは無理なのです、ルルカ。何故なら今のセシアには、昔ほどの力はない」
line = "「残念ながら、それは無理なのです、ルルカ。何故なら今のセシアには、昔ほどの力はない」"

[[dialogue]]
speaker = "セシア"
# 「ええ、そうね。フニにかけてある封印をどうにかするのは、今のわたくしでは力不足……」
line = "「ええ、そうね。フニにかけてある封印をどうにかするのは、今のわたくしでは力不足……」"

[[dialogue]]
speaker = "フェニックス"
# 「ですが、蓄積を増やすことはできなくとも、蓄積を減らすことはできる。だから、その力で私の蓄積をゼロにして欲しいのです」
