[[dialogue]]
speaker = "unk"
# バトルウィークも折り返し地点を過ぎて、残り３日と終わりが見えてきた。
line = "バトルウィークも折り返し地点を過ぎて、残り３日と終わりが見えてきた。"

[[dialogue]]
speaker = "unk"
# 初日以降、<ruby=ラルーナ>新星寮</ruby>も<ruby=イルソーレ>流星寮</ruby>も毎朝毎放課後に組織だったパトロールを行い、両学園とも物凄い速度でスコアを稼いでいた。
line = "初日以降、<ruby>新星寮<rt>ラルーナ</rt></ruby>も<ruby>流星寮<rt>イルソーレ</rt></ruby>も毎朝毎放課後に組織だったパトロールを行い、両学園とも物凄い速度でスコアを稼いでいた。"

[[dialogue]]
speaker = "unk"
# そして、今日も早朝から寮生の報告を聞き、マムはパトロール計画の調整と各生徒への注意事項を伝えていた――
line = "そして、今日も早朝から寮生の報告を聞き、マムはパトロール計画の調整と各生徒への注意事項を伝えていた――"

[[dialogue]]
speaker = "アナ"
# 「──報告は以上になります、マム」
line = "「──報告は以上になります、マム」"

[[dialogue]]
speaker = "マハムート"
# 「ご苦労様。みんなのお陰で、数日前まであったイルソーレとのポイント差は、ほとんどなくなったと言っていいわ」
line = "「ご苦労様。みんなのお陰で、数日前まであったイルソーレとのポイント差は、ほとんどなくなったと言っていいわ」"

[[dialogue]]
speaker = "マハムート"
# 「ヒルディオーネには『僅差』なんて大見得切ったけど、実際にはそれなりに先行されていたわ。その差をほぼなかったことにできたのは、大したものね」
line = "「ヒルディオーネには『僅差』なんて大見得切ったけど、実際にはそれなりに先行されていたわ。その差をほぼなかったことにできたのは、大したものね」"

[[dialogue]]
speaker = "マハムート"
# 「会長の的確な指示も大きいわ。あなた、もしかすると、そういった才能があるのかもしれないわね」
line = "「会長の的確な指示も大きいわ。あなた、もしかすると、そういった才能があるのかもしれないわね」"

[[dialogue]]
speaker = "unk"
# マムに言われると照れますね
line = "マムに言われると照れますね"

[[dialogue]]
speaker = "マハムート"
# 「ええ、畏怖をもって光栄に思いなさい。ただし、調子に乗らずにこれからも精進すること。返事は、イエス・マムよ」
line = "「ええ、畏怖をもって光栄に思いなさい。ただし、調子に乗らずにこれからも精進すること。返事は、イエス・マムよ」"

[[dialogue]]
speaker = "マハムート"
# 「――ふふっ。良い返事だこと」
line = "「――ふふっ。良い返事だこと」"

[[dialogue]]
speaker = "マハムート"
# 「さて、話の続きだけれど……今はまだ向こうがリードしているものの、このままのペースで行けるなら、あと一手でひっくり返せるところまで来ているわ」
line = "「さて、話の続きだけれど……今はまだ向こうがリードしているものの、このままのペースで行けるなら、あと一手でひっくり返せるところまで来ているわ」"

[[dialogue]]
speaker = "マハムート"
# 「でも、そんなことは相手も重々承知のはず。今の私たちは挑戦者であることを忘れず、最後まで気を抜かないこと。いいわね！」
line = "「でも、そんなことは相手も重々承知のはず。今の私たちは挑戦者であることを忘れず、最後まで気を抜かないこと。いいわね！」"

[[dialogue]]
speaker = "アナ"
# 「イエス、マム！」
line = "「イエス、マム！」"

[[dialogue]]
speaker = "アナ"
# 「……？　どうしましたか、会長。私の顔に、何か付いていたでしょうか？」
line = "「……？　どうしましたか、会長。私の顔に、何か付いていたでしょうか？」"

[[dialogue]]
speaker = "アナ"
# 「ああ、私がここにいることについてですか？」
line = "「ああ、私がここにいることについてですか？」"

[[dialogue]]
speaker = "アナ"
# 「前にも話したかもしれませんが、私のように天界、マムのように魔界から留学してきている生徒の多くは、寮で暮らしています」
line = "「前にも話したかもしれませんが、私のように天界、マムのように魔界から留学してきている生徒の多くは、寮で暮らしています」"

[[dialogue]]
speaker = "アナ"
# 「なのでマムの命とあらば、私もラルーナの一員として戦いますよ」
line = "「なのでマムの命とあらば、私もラルーナの一員として戦いますよ」"

[[dialogue]]
speaker = "アナ"
# 「――会長、らしくないとでも言いたげな顔をしてますね？　郷に入っては郷に従え、というやつです」
line = "「――会長、らしくないとでも言いたげな顔をしてますね？　郷に入っては郷に従え、というやつです」"

[[dialogue]]
speaker = "アナ"
# 「ラルーナはいわゆる体育会系ですので。上級生の命令には絶対服従」
line = "「ラルーナはいわゆる体育会系ですので。上級生の命令には絶対服従」"

[[dialogue]]
speaker = "unk"
# 絶対服従……！？
line = "絶対服従……！？"

[[dialogue]]
speaker = "マハムート"
# 「あら、会長様は何かご不満？」
line = "「あら、会長様は何かご不満？」"

[[dialogue]]
speaker = "マハムート"
# 「体育会系なんてものになったつもりはないけれど、組織の基本は<ruby=じょういかたつ>上意下達</ruby>よ。戦場で上級生が生きて帰れと命じたら、下級生は死んでも生きて帰る義務があるわ」
line = "「体育会系なんてものになったつもりはないけれど、組織の基本は<ruby>上意下達<rt>じょういかたつ</rt></ruby>よ。戦場で上級生が生きて帰れと命じたら、下級生は死んでも生きて帰る義務があるわ」"

[[dialogue]]
speaker = "unk"
# 上級生、いい奴じゃないですか……
line = "上級生、いい奴じゃないですか……"

[[dialogue]]
speaker = "マハムート"
# 「もちろん、寮内で上級生が肩を揉めと命じたら、下級生は『もういい』と言われるまで、肩を揉み続ける義務もあるわ」
line = "「もちろん、寮内で上級生が肩を揉めと命じたら、下級生は『もういい』と言われるまで、肩を揉み続ける義務もあるわ」"

[[dialogue]]
speaker = "unk"
# （それはめちゃくちゃ体育会系だ……）
line = "（それはめちゃくちゃ体育会系だ……）"

[[dialogue]]
speaker = "アナ"
# 「ちなみに、マムの肩を揉む係は希望者が多すぎて、３ヶ月先まで予約でいっぱい」
line = "「ちなみに、マムの肩を揉む係は希望者が多すぎて、３ヶ月先まで予約でいっぱい」"

[[dialogue]]
speaker = "マハムート"
# 「ん？　――私が慕われている？　会長、あなたは何を言っているのかしら？」
line = "「ん？　――私が慕われている？　会長、あなたは何を言っているのかしら？」"

[[dialogue]]
speaker = "マハムート"
# 「下々の者がトップに媚びを売るのは当然のことよ。畏怖を持って跪くべき相手なんだから」
line = "「下々の者がトップに媚びを売るのは当然のことよ。畏怖を持って跪くべき相手なんだから」"

[[dialogue]]
speaker = "アナ"
# 「その通りです、マム」
line = "「その通りです、マム」"

[[dialogue]]
speaker = "アナ"
# 「ラルーナのモットーは『責任感・忍耐・向上心』。会長にはバッチシ」
line = "「ラルーナのモットーは『責任感・忍耐・向上心』。会長にはバッチシ」"

[[dialogue]]
speaker = "マハムート"
# 「個人的にはあまり泥臭くするのは好きではないのだけれど、この寮に伝わるモットーは私の考えている重要なものと一致するわ」
line = "「個人的にはあまり泥臭くするのは好きではないのだけれど、この寮に伝わるモットーは私の考えている重要なものと一致するわ」"

[[dialogue]]
speaker = "マハムート"
# 「前にも言ったわよね？　１人１人の星騎士がすべて一騎当千になれば、リクリエにだって勝利できるはずよ」
line = "「前にも言ったわよね？　１人１人の星騎士がすべて一騎当千になれば、リクリエにだって勝利できるはずよ」"

[[dialogue]]
speaker = "マハムート"
# 「そうした精鋭を育成するということに関して、『責任感・忍耐・向上心』はどれも欠かせない要素よ」
line = "「そうした精鋭を育成するということに関して、『責任感・忍耐・向上心』はどれも欠かせない要素よ」"

[[dialogue]]
speaker = "アナ"
# 「実際、ラルーナ寮生のプリマステラ率は、とても高い」
line = "「実際、ラルーナ寮生のプリマステラ率は、とても高い」"

[[dialogue]]
speaker = "アナ"
# 「……まあ、責任感というよりも、寮設備の格差を見せつけられて、闘争心に火が付いた生徒が多い感じですが」
line = "「……まあ、責任感というよりも、寮設備の格差を見せつけられて、闘争心に火が付いた生徒が多い感じですが」"

[[dialogue]]
speaker = "マハムート"
# 「強くなるためのきっかけなんて、別に何だっていいわ」
line = "「強くなるためのきっかけなんて、別に何だっていいわ」"

[[dialogue]]
speaker = "マハムート"
# 「それに連中、あれだけの設備を持っていながら、毎年の運営費用までこっちより多く持って行ってるのよ？　到底、許しておけないわ」
line = "「それに連中、あれだけの設備を持っていながら、毎年の運営費用までこっちより多く持って行ってるのよ？　到底、許しておけないわ」"

[[dialogue]]
speaker = "マハムート"
# 「というわけで会長、アナ。今年の学園対抗杯こそ、必ず勝つわよ」
line = "「というわけで会長、アナ。今年の学園対抗杯こそ、必ず勝つわよ」"

[[dialogue]]
speaker = "マハムート"
# 「あなたたちという優秀な新人を確保したんですもの。最後の１年、今度こそ……これまで以上に暴れてやるわ」
line = "「あなたたちという優秀な新人を確保したんですもの。最後の１年、今度こそ……これまで以上に暴れてやるわ」"

[[dialogue]]
speaker = "アナ"
# 「はい。もちろんです、マム」
line = "「はい。もちろんです、マム」"

[[dialogue]]
speaker = "マハムート"
# 「……ふん。どうやら他の子たちは、準備を終えて出発したようね」
line = "「……ふん。どうやら他の子たちは、準備を終えて出発したようね」"

[[dialogue]]
speaker = "マハムート"
# 「さて、それじゃあ私たちも行きましょうか」
line = "「さて、それじゃあ私たちも行きましょうか」"

[[dialogue]]
speaker = "マハムート"
# 「授業が始まる前に、リクリエの些細な波も全て、畏怖を持って跪かせてあげるわ……！」
line = "「授業が始まる前に、リクリエの些細な波も全て、畏怖を持って跪かせてあげるわ……！」"

[[dialogue]]
speaker = "アナ"
# 「イエス、マム！」
line = "「イエス、マム！」"

[[dialogue]]
speaker = "unk"
# 俺もアナと一緒に大きく返事をする。
line = "俺もアナと一緒に大きく返事をする。"

[[dialogue]]
speaker = "unk"
# なぜラルーナの寮生達が率先して頑張るのか。それが少しだけ分かった気がしたのだった。
line = "なぜラルーナの寮生達が率先して頑張るのか。それが少しだけ分かった気がしたのだった。"
