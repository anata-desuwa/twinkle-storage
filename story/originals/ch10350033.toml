[[dialogue]]
speaker = "unk"
# 第３話,セナリィウサギの看病,P
line = "第３話,セナリィウサギの看病,P"

[[dialogue]]
speaker = "unk"
# 季節の変わり目だろうか、風邪をひいてしまったみたいだ。
line = "季節の変わり目だろうか、風邪をひいてしまったみたいだ。"

[[dialogue]]
speaker = "unk"
# 星徒会メンバーに仕事の指示をして休んでいたら、午後になって来客がやってきた──
line = "星徒会メンバーに仕事の指示をして休んでいたら、午後になって来客がやってきた──"

[[dialogue]]
speaker = "セナリィ"
# 「会長様。風邪をひいたと聞いて、お見舞いに来ましたわ。お加減はいかがです？」
line = "「会長様。風邪をひいたと聞いて、お見舞いに来ましたわ。お加減はいかがです？」"

[[dialogue]]
speaker = "unk"
# まだちょっとだるいかな……
line = "まだちょっとだるいかな……"

[[dialogue]]
speaker = "unk"
# 熱はだいぶ下がったけど
line = "熱はだいぶ下がったけど"

[[dialogue]]
speaker = "セナリィ"
# 「そうでしたか。では私が看病いたしますわ。薬と食べ物も買ってきましたし」
line = "「そうでしたか。では私が看病いたしますわ。薬と食べ物も買ってきましたし」"

[[dialogue]]
speaker = "セナリィ"
# 「……風邪を<ruby=うつしたら>伝染したら</ruby>まずい？　何を仰っているんですの、病人は自分のことだけ考えていればいいんですわ」
line = "「……風邪を<ruby>伝染したら<rt>うつしたら</rt></ruby>まずい？　何を仰っているんですの、病人は自分のことだけ考えていればいいんですわ」"

[[dialogue]]
speaker = "セナリィ"
# 「心配はご無用。私、昔から体だけは丈夫ですので。傭兵時代から風邪一つひいたことありませんわ！」
line = "「心配はご無用。私、昔から体だけは丈夫ですので。傭兵時代から風邪一つひいたことありませんわ！」"

[[dialogue]]
speaker = "unk"
# セナリィ……ありがとう
line = "セナリィ……ありがとう"

[[dialogue]]
speaker = "セナリィ"
# 「さぁさぁ会長様。ちゃんと横になっていてください？　今から私がリンゴを剥いて差し上げますわ！」
line = "「さぁさぁ会長様。ちゃんと横になっていてください？　今から私がリンゴを剥いて差し上げますわ！」"

[[dialogue]]
speaker = "セナリィ"
# 「食欲はあるみたいですわね。安心しました」
line = "「食欲はあるみたいですわね。安心しました」"

[[dialogue]]
speaker = "セナリィ"
# 「氷枕も取り替えましたし、汗も拭き終わりましたが……まだ何かリクエストはございまして？」
line = "「氷枕も取り替えましたし、汗も拭き終わりましたが……まだ何かリクエストはございまして？」"

[[dialogue]]
speaker = "セナリィ"
# 「私たちは恋愛パートナーなのですから遠慮はいりません。貴方が元気になれることなら、何でもお願いを聞いて差し上げますわ！」
line = "「私たちは恋愛パートナーなのですから遠慮はいりません。貴方が元気になれることなら、何でもお願いを聞いて差し上げますわ！」"

[[dialogue]]
speaker = "unk"
# ……だったらお願いがあるんだけど
line = "……だったらお願いがあるんだけど"

[[dialogue]]
speaker = "セナリィ"
# 「ええ。何なりと。傭兵に二言はありません」
line = "「ええ。何なりと。傭兵に二言はありません」"

[[dialogue]]
speaker = "unk"
# バニーガールのセナリィが見てみたい
line = "バニーガールのセナリィが見てみたい"

[[dialogue]]
speaker = "セナリィ"
# 「ホワイ！？　ぜんぜん風邪とも看病とも関係ありませんわっ！？」
line = "「ホワイ！？　ぜんぜん風邪とも看病とも関係ありませんわっ！？」"

[[dialogue]]
speaker = "unk"
# きっと元気が出ると思うんだ……
line = "きっと元気が出ると思うんだ……"

[[dialogue]]
speaker = "unk"
# 恋人の可愛い姿を見たら……
line = "恋人の可愛い姿を見たら……"

[[dialogue]]
speaker = "セナリィ"
# 「そんな真面目な顔でなんと不真面目なことを……男の子って本当におバカですわね」
line = "「そんな真面目な顔でなんと不真面目なことを……男の子って本当におバカですわね」"

[[dialogue]]
speaker = "セナリィ"
# 「まあ、着替えたくらいで会長様のお加減がよくなるなら……やってあげてもよいですが」
line = "「まあ、着替えたくらいで会長様のお加減がよくなるなら……やってあげてもよいですが」"

[[dialogue]]
speaker = "セナリィ"
# 「いいですか？　看病の時にウサギの格好になっただなんて、他言無用ですわよ？　特にマインには！　では──変身します！」
line = "「いいですか？　看病の時にウサギの格好になっただなんて、他言無用ですわよ？　特にマインには！　では──変身します！」"

[[dialogue]]
speaker = "セナリィ"
# 「──こんなのでいいんですの？　まったく、服を着替えたくらいで元気が出れば医者はいりませんわ」
line = "「──こんなのでいいんですの？　まったく、服を着替えたくらいで元気が出れば医者はいりませんわ」"

[[dialogue]]
speaker = "unk"
# ──元気出てきた！！
line = "──元気出てきた！！"

[[dialogue]]
speaker = "セナリィ"
# 「単純すぎません！？　ああもうっ、起き上がるんじゃありませんわ！」
line = "「単純すぎません！？　ああもうっ、起き上がるんじゃありませんわ！」"

[[dialogue]]
speaker = "セナリィ"
# 「ほら。夜は仕事が入っていますが、それまでは傍にいて差し上げますわ。しっかり養生しなさい」
line = "「ほら。夜は仕事が入っていますが、それまでは傍にいて差し上げますわ。しっかり養生しなさい」"

[[dialogue]]
speaker = "セナリィ"
# 「──おでこを撫でてあげたら落ち着くんですの？　はぁ……お風邪を召した会長様は、ずいぶんと甘えん坊ですわ」
line = "「──おでこを撫でてあげたら落ち着くんですの？　はぁ……お風邪を召した会長様は、ずいぶんと甘えん坊ですわ」"

[[dialogue]]
speaker = "セナリィ"
# 「なでなで、なでなで……<emoji=heart04>」
line = "「なでなで、なでなで……<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
# 「私にここまでさせたんです。早く元気にならないとダメですわよ……ふふっ<emoji=heart04>」
line = "「私にここまでさせたんです。早く元気にならないとダメですわよ……ふふっ<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
# 「では、そろそろ<ruby=おいとま>お暇</ruby>いたしますわね」
line = "「では、そろそろ<ruby>お暇<rt>おいとま</rt></ruby>いたしますわね」"

[[dialogue]]
speaker = "セナリィ"
# 「もう……そんな寂しそうな顔しないでほしいですわ。さっきまでずっと傍にいたじゃありませんか。仕方ありませんわね……」
line = "「もう……そんな寂しそうな顔しないでほしいですわ。さっきまでずっと傍にいたじゃありませんか。仕方ありませんわね……」"

[[dialogue]]
speaker = "セナリィ"
# 「ん……ちゅっ<emoji=heart04>」
line = "「ん……ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 風邪が伝染っちゃうよ、セナリィ
line = "風邪が伝染っちゃうよ、セナリィ"

[[dialogue]]
speaker = "unk"
# キスなんてしたら……！？
line = "キスなんてしたら……！？"

[[dialogue]]
speaker = "セナリィ"
# 「あら。人に伝染せば治るっていうじゃありませんか……なんて。私は風邪なんて引きませんから、ご心配なさらず」
line = "「あら。人に伝染せば治るっていうじゃありませんか……なんて。私は風邪なんて引きませんから、ご心配なさらず」"

[[dialogue]]
speaker = "セナリィ"
# 「私がしたかっただけですわ。会長様とお会いして、何もなく帰るのは寂しいですし」
line = "「私がしたかっただけですわ。会長様とお会いして、何もなく帰るのは寂しいですし」"

[[dialogue]]
speaker = "セナリィ"
# 「早く体を治して、学園でお会いいたしましょう。会長様？」
line = "「早く体を治して、学園でお会いいたしましょう。会長様？」"

[[dialogue]]
speaker = "unk"
# 翌日。セナリィの献身的な看病が効いたのか、俺の体調はすっかり良くなっていた。
line = "翌日。セナリィの献身的な看病が効いたのか、俺の体調はすっかり良くなっていた。"

[[dialogue]]
speaker = "unk"
# お礼も兼ねてセナリィを朝食に誘ってみよう。そう思って電話をかけたのだが──
line = "お礼も兼ねてセナリィを朝食に誘ってみよう。そう思って電話をかけたのだが──"

[[dialogue]]
speaker = "セナリィ"
# 『ごほっ！　ごほっ！　か、会長様ですの……！？』
line = "『ごほっ！　ごほっ！　か、会長様ですの……！？』"

[[dialogue]]
speaker = "unk"
# 今度は俺が看病に行くよ！！
line = "今度は俺が看病に行くよ！！"

[[dialogue]]
speaker = "unk"
# 伝染ってるじゃないか！？
line = "伝染ってるじゃないか！？"

[[dialogue]]
speaker = "セナリィ"
# 『そ、そうしていただけると……ヒマワリたちには休みを出しているので、今日は私１人なんです……げほっ！』
line = "『そ、そうしていただけると……ヒマワリたちには休みを出しているので、今日は私１人なんです……げほっ！』"

[[dialogue]]
speaker = "unk"
# 今度は俺が女体化バニーでお見舞いに！
line = "今度は俺が女体化バニーでお見舞いに！"

[[dialogue]]
speaker = "unk"
# そうだ、効果ばっちりだったから……
line = "そうだ、効果ばっちりだったから……"

[[dialogue]]
speaker = "セナリィ"
# 『要らねぇですわよ！？　普通の格好で来なさい！！』
line = "『要らねぇですわよ！？　普通の格好で来なさい！！』"

[[dialogue]]
speaker = "unk"
# 冗談が言えるくらいには症状が軽いようで安心した。早く薬と食べ物を買って、ゴールデングースの事務所へ向かおう……！
line = "冗談が言えるくらいには症状が軽いようで安心した。早く薬と食べ物を買って、ゴールデングースの事務所へ向かおう……！"
