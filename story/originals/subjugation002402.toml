[[dialogue]]
speaker = "unk"
# 解放のロストアイテムにより、封印から解き放たれたトレジアンナさん。
line = "解放のロストアイテムにより、封印から解き放たれたトレジアンナさん。"

[[dialogue]]
speaker = "トレジアンナ"
# 「――というわけで、ついにお披露目です☆　これが私の本当の姿ですよ～♪」
line = "「――というわけで、ついにお披露目です☆　これが私の本当の姿ですよ～♪」"

[[dialogue]]
speaker = "シズハ"
# 「小さいけど、大きい！」
line = "「小さいけど、大きい！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「ふっふっふっ♪　前に言ったことありましたけど、可愛くてダイナマイトボディなのは嘘じゃなかったでしょ～？」
line = "「ふっふっふっ♪　前に言ったことありましたけど、可愛くてダイナマイトボディなのは嘘じゃなかったでしょ～？」"

[[dialogue]]
speaker = "サチ"
# 「これまでずっと一緒にいたのに、改めて本当のトレジアンナさんと向き合うと、変な感じがしますね」
line = "「これまでずっと一緒にいたのに、改めて本当のトレジアンナさんと向き合うと、変な感じがしますね」"

[[dialogue]]
speaker = "トレジアンナ"
# 「私もです♪　生身で会えて嬉しいですよ、サチさん♪」
line = "「私もです♪　生身で会えて嬉しいですよ、サチさん♪」"

[[dialogue]]
speaker = "unk"
# 嬉しそうに笑い合う２人。
line = "嬉しそうに笑い合う２人。"

[[dialogue]]
speaker = "unk"
# そこでふと、サチが思い出したように――
line = "そこでふと、サチが思い出したように――"

[[dialogue]]
speaker = "サチ"
# 「あっ、そうだ、トレジアンナさん。前にディーラックさんが言ってたことって……」
line = "「あっ、そうだ、トレジアンナさん。前にディーラックさんが言ってたことって……」"

[[dialogue]]
speaker = "トレジアンナ"
# 「そうでしたね。あの時は有耶無耶にしちゃってましたけど、復活した以上、ちゃんと素性を明かす必要があります」
line = "「そうでしたね。あの時は有耶無耶にしちゃってましたけど、復活した以上、ちゃんと素性を明かす必要があります」"

[[dialogue]]
speaker = "トレジアンナ"
# 「みなさん、まずは今まで隠していてごめんなさい。実は私の正体は――『魔女』なんです」
line = "「みなさん、まずは今まで隠していてごめんなさい。実は私の正体は――『魔女』なんです」"

[[dialogue]]
speaker = "unk"
# 以前、ディーラックが起こした、シズハの聖杯と解放のロストアイテムを巡る事件。
line = "以前、ディーラックが起こした、シズハの聖杯と解放のロストアイテムを巡る事件。"

[[dialogue]]
speaker = "unk"
# その時に、ディーラックがトレジアンナさんの正体について語っていたのだ。
line = "その時に、ディーラックがトレジアンナさんの正体について語っていたのだ。"

[[dialogue]]
speaker = "トレジアンナ"
# 「３０００年前のリクリエよりも遥か昔、リクリエによってリセットされてしまった１つ前の人類史を生きていた魔女――それが私なんです」
line = "「３０００年前のリクリエよりも遥か昔、リクリエによってリセットされてしまった１つ前の人類史を生きていた魔女――それが私なんです」"

[[dialogue]]
speaker = "トマル"
# 「確か以前、ロストアイテムはリクリエを迎えた世界の中にあっても、再構築されずに存在し続けるものだって、仰られていましたよね」
line = "「確か以前、ロストアイテムはリクリエを迎えた世界の中にあっても、再構築されずに存在し続けるものだって、仰られていましたよね」"

[[dialogue]]
speaker = "トレジアンナ"
# 「はい。私はロストアイテム『精神の水晶』の中に封印されて、ずっと眠っていました。だから、リクリエを乗り越え、存在し続けられたというわけです」
line = "「はい。私はロストアイテム『精神の水晶』の中に封印されて、ずっと眠っていました。だから、リクリエを乗り越え、存在し続けられたというわけです」"

[[dialogue]]
speaker = "トレジアンナ"
# 「ちなみに魔女は長寿種ですが、流石に１万年も生きた例はありません。私がこうして精神と肉体を保持していられたのは、あくまでも封印されていたお陰ですね」
line = "「ちなみに魔女は長寿種ですが、流石に１万年も生きた例はありません。私がこうして精神と肉体を保持していられたのは、あくまでも封印されていたお陰ですね」"

[[dialogue]]
speaker = "トレジアンナ"
# 「大昔の魔女の森では、私は『蒐集の魔女』という名で呼ばれていました。こう見えて私、当時はかなり有名な魔女だったんですよ～？」
line = "「大昔の魔女の森では、私は『蒐集の魔女』という名で呼ばれていました。こう見えて私、当時はかなり有名な魔女だったんですよ～？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「まあでも、好奇心旺盛すぎるのが祟って、元老会とは折り合いが悪かったんですけどね～」
line = "「まあでも、好奇心旺盛すぎるのが祟って、元老会とは折り合いが悪かったんですけどね～」"

[[dialogue]]
speaker = "トレジアンナ"
# 「三界には霊術を始めとした未解明の不思議な力、そしてなにより――ロストアイテムが存在していると知って、よく旅に出ては蒐集して、森の中に持ち帰ってましたから」
line = "「三界には霊術を始めとした未解明の不思議な力、そしてなにより――ロストアイテムが存在していると知って、よく旅に出ては蒐集して、森の中に持ち帰ってましたから」"

[[dialogue]]
speaker = "トレジアンナ"
# 「で、ある時、強制的にコレクションを没収されそうになって、ついに<ruby=しゅっぽん>出奔</ruby>して『<ruby=ヤーガ>はぐれ魔女</ruby>』になっちゃったというわけです」
line = "「で、ある時、強制的にコレクションを没収されそうになって、ついに<ruby>出奔<rt>しゅっぽん</rt></ruby>して『<ruby>はぐれ魔女<rt>ヤーガ</rt></ruby>』になっちゃったというわけです」"

[[dialogue]]
speaker = "トレジアンナ"
# 「それから私は、三界を旅して興味あるものを蒐集し、研究する生活を送るようになりました」
line = "「それから私は、三界を旅して興味あるものを蒐集し、研究する生活を送るようになりました」"

[[dialogue]]
speaker = "トレジアンナ"
# 「中でも、当時から見ても大昔の『はぐれ魔女』が作り出したといわれる『ロストアイテム』たちに、私は強く興味を惹かれました」
line = "「中でも、当時から見ても大昔の『はぐれ魔女』が作り出したといわれる『ロストアイテム』たちに、私は強く興味を惹かれました」"

[[dialogue]]
speaker = "トレジアンナ"
# 「研究にのめり込んで、自分でも真似して、幾つかのロストアイテムを作り出すことに成功しました」
line = "「研究にのめり込んで、自分でも真似して、幾つかのロストアイテムを作り出すことに成功しました」"

[[dialogue]]
speaker = "トレジアンナ"
# 「ですが……同時に、ロストアイテムの恐ろしいリスクに気づくことにもなりました」
line = "「ですが……同時に、ロストアイテムの恐ろしいリスクに気づくことにもなりました」"

[[dialogue]]
speaker = "シズハ"
# 「それが、ロストアイテムを使うたびに排出される『マイナスエネルギー』……」
line = "「それが、ロストアイテムを使うたびに排出される『マイナスエネルギー』……」"

[[dialogue]]
speaker = "トレジアンナ"
# 「そうです。目に見えず、物理的に計測できず。しかし概念的には確かに存在すると判明したそれが、世界に膨大な塵として溜まり続けていることに」
line = "「そうです。目に見えず、物理的に計測できず。しかし概念的には確かに存在すると判明したそれが、世界に膨大な塵として溜まり続けていることに」"

[[dialogue]]
speaker = "トレジアンナ"
# 「溜まったマイナスエネルギーがいつか大きな災害――たとえば未曽有の大爆発のような現象を引き起こすであろうことは、予想できていました」
line = "「溜まったマイナスエネルギーがいつか大きな災害――たとえば未曽有の大爆発のような現象を引き起こすであろうことは、予想できていました」"

[[dialogue]]
speaker = "トレジアンナ"
# 「それがまさか、自我を持ってディーラックさんになるとは思いもしませんでしたが……」
line = "「それがまさか、自我を持ってディーラックさんになるとは思いもしませんでしたが……」"

[[dialogue]]
speaker = "トレジアンナ"
# 「ともかく、私はマイナスエネルギーの危険性を知って、三界のロストアイテムを全て回収することを決めました。ですが、その途中でドジって――」
line = "「ともかく、私はマイナスエネルギーの危険性を知って、三界のロストアイテムを全て回収することを決めました。ですが、その途中でドジって――」"

[[dialogue]]
speaker = "プリムラ"
# 「自身がロストアイテムに封印されることになった、というわけじゃな」
line = "「自身がロストアイテムに封印されることになった、というわけじゃな」"

[[dialogue]]
speaker = "トレジアンナ"
# 「はい。その後は、以前説明した通りです。私は２年前に、リクリエの影響で目覚めて、その後にサチさんと出会ったんです」
line = "「はい。その後は、以前説明した通りです。私は２年前に、リクリエの影響で目覚めて、その後にサチさんと出会ったんです」"

[[dialogue]]
speaker = "プリムラ"
# 「ん？　でも、待てよ……」
line = "「ん？　でも、待てよ……」"

[[dialogue]]
speaker = "プリムラ"
# 「トレジアンナの正体が魔女なのはわかったが、なら貴様が『魔法少女』というものを知ったのはいつだったのじゃ？」
line = "「トレジアンナの正体が魔女なのはわかったが、なら貴様が『魔法少女』というものを知ったのはいつだったのじゃ？」"

[[dialogue]]
speaker = "プリムラ"
# 「以前サチに聞いたが、貴様は最初からサチを見て、魔法少女だと騒いでおったのじゃろう？」
line = "「以前サチに聞いたが、貴様は最初からサチを見て、魔法少女だと騒いでおったのじゃろう？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「あ～、それはですね～。実は元々、太古の魔女の森にも『魔女っ娘』って概念が存在していたんですよ。古くから伝わる伝説として」
line = "「あ～、それはですね～。実は元々、太古の魔女の森にも『魔女っ娘』って概念が存在していたんですよ。古くから伝わる伝説として」"

[[dialogue]]
speaker = "トレジアンナ"
# 「私は幼い頃から、その伝説が大好きだったんですけど、現代の日本で目覚めた時に魔法少女のアニメを見て、すごく感動したんです！」
line = "「私は幼い頃から、その伝説が大好きだったんですけど、現代の日本で目覚めた時に魔法少女のアニメを見て、すごく感動したんです！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「これこそが私が憧れた伝説の英雄の姿だ、ってね♪　それで今では、どっぷり魔法少女沼に浸かったオタクとなってしまったというわけです♪」
line = "「これこそが私が憧れた伝説の英雄の姿だ、ってね♪　それで今では、どっぷり魔法少女沼に浸かったオタクとなってしまったというわけです♪」"

[[dialogue]]
speaker = "トレジアンナ"
# 「ちなみに、私が『先代魔法少女』だと言っていたのは――ほら、最初の頃って、魔女組織のネビュラと学園が微妙な関係だったじゃないですか～」
line = "「ちなみに、私が『先代魔法少女』だと言っていたのは――ほら、最初の頃って、魔女組織のネビュラと学園が微妙な関係だったじゃないですか～」"

[[dialogue]]
speaker = "トレジアンナ"
# 「だから、変にそことの関係を疑われたくないし、だったら魔法少女を名乗っちゃおうかな～って。てへぺろ☆」
line = "「だから、変にそことの関係を疑われたくないし、だったら魔法少女を名乗っちゃおうかな～って。てへぺろ☆」"

[[dialogue]]
speaker = "トレジアンナ"
# 「あっ、あとあと！　年齢について、封印されてた期間はノーカウントですから！　永遠の美少女ってことでお願いしますね☆」
line = "「あっ、あとあと！　年齢について、封印されてた期間はノーカウントですから！　永遠の美少女ってことでお願いしますね☆」"

[[dialogue]]
speaker = "プリムラ"
# 「封印をノーカウントにしても、数百年は生きてるじゃろ」
line = "「封印をノーカウントにしても、数百年は生きてるじゃろ」"

[[dialogue]]
speaker = "シズハ"
# 「トレジアンナさん！　ちょっと失礼します！」
line = "「トレジアンナさん！　ちょっと失礼します！」"

[[dialogue]]
speaker = "unk"
# ふと、真面目な顔をしたシズハが、トレジアンナさんに近づいたかと思うと――
line = "ふと、真面目な顔をしたシズハが、トレジアンナさんに近づいたかと思うと――"

[[dialogue]]
speaker = "シズハ"
# 「えいっ♪」
line = "「えいっ♪」"

[[dialogue]]
speaker = "トレジアンナ"
# 「あんっ<emoji=heart04>」
line = "「あんっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# トレジアンナさんのお尻を揉みしだきながら、シズハは興奮した様子で言う。
line = "トレジアンナさんのお尻を揉みしだきながら、シズハは興奮した様子で言う。"

[[dialogue]]
speaker = "シズハ"
# 「やっぱり！　一目見てビビッときたわ！　このお尻は、ものすごくいいものだって！」
line = "「やっぱり！　一目見てビビッときたわ！　このお尻は、ものすごくいいものだって！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「もう<emoji=heart04>　シズハさんってば、触るならそう言って下さいよ～！　ビックリしちゃったじゃないですか～」
line = "「もう<emoji=heart04>　シズハさんってば、触るならそう言って下さいよ～！　ビックリしちゃったじゃないですか～」"

[[dialogue]]
speaker = "シズハ"
# 「あまりに魅力的なお尻だったから、つい♪」
line = "「あまりに魅力的なお尻だったから、つい♪」"

[[dialogue]]
speaker = "トレジアンナ"
# 「はっ！？　というか、気づいたんですが、直接触れるようになったのは私もじゃないですか！」
line = "「はっ！？　というか、気づいたんですが、直接触れるようになったのは私もじゃないですか！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「こうしてはいられません！　シズハさん、失礼しますね～、えいっ♪」
line = "「こうしてはいられません！　シズハさん、失礼しますね～、えいっ♪」"

[[dialogue]]
speaker = "シズハ"
# 「やんっ<emoji=heart04>」
line = "「やんっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# トレジアンナさんは嬉々として、シズハのお尻を触り返しはじめる。
line = "トレジアンナさんは嬉々として、シズハのお尻を触り返しはじめる。"

[[dialogue]]
speaker = "トレジアンナ"
# 「はああぁ～～～っ<emoji=heart04>　これが本物の魔法少女の感触……！　この瞬間、是非とも記憶魔法でコレクションしておかないとですね～」
line = "「はああぁ～～～っ<emoji=heart04>　これが本物の魔法少女の感触……！　この瞬間、是非とも記憶魔法でコレクションしておかないとですね～」"

[[dialogue]]
speaker = "unk"
# き、記憶魔法……？
line = "き、記憶魔法……？"

[[dialogue]]
speaker = "トレジアンナ"
# 「はい♪　私が昔、自作した魔法の１つで、その時感じた五感をいつでも再度味わうことができるんですよ～♪」
line = "「はい♪　私が昔、自作した魔法の１つで、その時感じた五感をいつでも再度味わうことができるんですよ～♪」"

[[dialogue]]
speaker = "トレジアンナ"
# 「私、二つ名で呼ばれてた通り『蒐集癖』がありまして～。ついついなんでも集めたくなっちゃうんですよね～♪」
line = "「私、二つ名で呼ばれてた通り『蒐集癖』がありまして～。ついついなんでも集めたくなっちゃうんですよね～♪」"

[[dialogue]]
speaker = "トレジアンナ"
# 「ということで～、えいっ<emoji=heart04>」
line = "「ということで～、えいっ<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
# 「ひゃんっ！？」
line = "「ひゃんっ！？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「むふ～っ<emoji=heart04>　これがサチさんのお尻ですか～。堪りませんね～♪」
line = "「むふ～っ<emoji=heart04>　これがサチさんのお尻ですか～。堪りませんね～♪」"

[[dialogue]]
speaker = "サチ"
# 「ちょっ……トレジアンナさん、なにやってるんですか！？　んっ<emoji=heart04>　ふあぁんっ<emoji=heart04>」
line = "「ちょっ……トレジアンナさん、なにやってるんですか！？　んっ<emoji=heart04>　ふあぁんっ<emoji=heart04>」"

[[dialogue]]
speaker = "トレジアンナ"
# 「ふふっ、このまま体の匂いも記憶させてもらっていいですか～？」
line = "「ふふっ、このまま体の匂いも記憶させてもらっていいですか～？」"

[[dialogue]]
speaker = "サチ"
# 「嫌ですよ！？　エッチなのは禁止です！」
line = "「嫌ですよ！？　エッチなのは禁止です！」"

[[dialogue]]
speaker = "プリムラ"
# 「こやつ……もしや我らは、とんでもないド変態の封印を解いてしまったのでは……」
line = "「こやつ……もしや我らは、とんでもないド変態の封印を解いてしまったのでは……」"

[[dialogue]]
speaker = "トレジアンナ"
# 「あっ、次はプリムラさんのも記憶させて下さいね☆」
line = "「あっ、次はプリムラさんのも記憶させて下さいね☆」"

[[dialogue]]
speaker = "プリムラ"
# 「絶対に嫌なのじゃ！」
line = "「絶対に嫌なのじゃ！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「まあまあ、そう言わずに～♪　そ～れ、転移魔法☆」
line = "「まあまあ、そう言わずに～♪　そ～れ、転移魔法☆」"

[[dialogue]]
speaker = "unk"
# と言った次の瞬間、プリムラに背後に回り込んでおり、お尻に触る魔法少女。
line = "と言った次の瞬間、プリムラに背後に回り込んでおり、お尻に触る魔法少女。"

[[dialogue]]
speaker = "プリムラ"
# 「ちょっ……やめっ――ひゃあぁっ！？」
line = "「ちょっ……やめっ――ひゃあぁっ！？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「あら、いい声<emoji=heart04>」
line = "「あら、いい声<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
# 「というか、さらっと今、とんでもない魔法を使ったのではないか！？」
line = "「というか、さらっと今、とんでもない魔法を使ったのではないか！？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「魔法を蒐集しまくって光魔法以外はコンプリート、全て使えるようになりましたから☆　えっへん♪」
line = "「魔法を蒐集しまくって光魔法以外はコンプリート、全て使えるようになりましたから☆　えっへん♪」"

[[dialogue]]
speaker = "トマル"
# 「それって、相当すごいのでは……？」
line = "「それって、相当すごいのでは……？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「ん～<emoji=heart04>　プリムラさんの肌、前から触ってみたかったんですよね～♪　本当に、もちもちぷりぷりで堪らない感触です～♪」
