[[dialogue]]
speaker = "マトイ"
# 「花嫁修業その２！　お掃除対決です～！」
line = "「花嫁修業その２！　お掃除対決です～！」"

[[dialogue]]
speaker = "マトイ"
# 「でも、こちらは実力差がかなりありそうですね。対決じゃなくて、教えっこにしますか？」
line = "「でも、こちらは実力差がかなりありそうですね。対決じゃなくて、教えっこにしますか？」"

[[dialogue]]
speaker = "トワ先生"
# 「そうしてもらえると非常に助かるよ……」
line = "「そうしてもらえると非常に助かるよ……」"

[[dialogue]]
speaker = "蘭美"
# 「あら、お掃除は苦手かしら？」
line = "「あら、お掃除は苦手かしら？」"

[[dialogue]]
speaker = "トワ先生"
# 「実はそうなんだよね～。ダメだと思ってるんだけど、どうしても優先度が下になっちゃって」
line = "「実はそうなんだよね～。ダメだと思ってるんだけど、どうしても優先度が下になっちゃって」"

[[dialogue]]
speaker = "ヨミ"
# 「お掃除なら、メイドの私達にお任せですね～！　手間のかからないお掃除のコツをお教えしますよ」
line = "「お掃除なら、メイドの私達にお任せですね～！　手間のかからないお掃除のコツをお教えしますよ」"

[[dialogue]]
speaker = "トワ先生"
# 「本当？　助かるよ～」
line = "「本当？　助かるよ～」"

[[dialogue]]
speaker = "蘭美"
# 「では今回は、九浄家メイド隊流お掃除術を披露しましょう。私の手にかかればこの通りっ」
line = "「では今回は、九浄家メイド隊流お掃除術を披露しましょう。私の手にかかればこの通りっ」"

[[dialogue]]
speaker = "蘭美"
# 「しゃらんら～♪」
line = "「しゃらんら～♪」"

[[dialogue]]
speaker = "unk"
# うわ！　一瞬でピカピカに！
line = "うわ！　一瞬でピカピカに！"

[[dialogue]]
speaker = "トワ先生"
# 「まるで魔法です……」
line = "「まるで魔法です……」"

[[dialogue]]
speaker = "ヨミ"
# 「よーし、私も……しゃらんら～♪」
line = "「よーし、私も……しゃらんら～♪」"

[[dialogue]]
speaker = "トワ先生"
# 「こっちも！？　九浄家メイド隊はなんなんですか、魔法少女の集団ですか？」
line = "「こっちも！？　九浄家メイド隊はなんなんですか、魔法少女の集団ですか？」"

[[dialogue]]
speaker = "マトイ"
# 「いえ、よく見て下さい」
line = "「いえ、よく見て下さい」"

[[dialogue]]
speaker = "unk"
# 普通の掃除だね
line = "普通の掃除だね"

[[dialogue]]
speaker = "unk"
# 効果音を口で言ってるだけで
line = "効果音を口で言ってるだけで"

[[dialogue]]
speaker = "蘭美"
# 「卓越した技術は魔法と区別がつかない、そういうことね」
line = "「卓越した技術は魔法と区別がつかない、そういうことね」"

[[dialogue]]
speaker = "トワ先生"
# 「そりゃそうだよね。でも高速でお掃除してるのは事実だし、ちゃんと学ばせてもらわなきゃ」
line = "「そりゃそうだよね。でも高速でお掃除してるのは事実だし、ちゃんと学ばせてもらわなきゃ」"

[[dialogue]]
speaker = "蘭美"
# 「いい心がけね。では極意を伝授してあげるわ」
line = "「いい心がけね。では極意を伝授してあげるわ」"

[[dialogue]]
speaker = "トワ先生"
# 「お、お願いします！」
line = "「お、お願いします！」"

[[dialogue]]
speaker = "蘭美"
# 「料理には愛情が大切だけど、それはお掃除においても同じなのよ」
line = "「料理には愛情が大切だけど、それはお掃除においても同じなのよ」"

[[dialogue]]
speaker = "ヨミ"
# 「相手が快適に過ごせるようにって考えたら、細かいところまで気配りする必要が出てきますからね」
line = "「相手が快適に過ごせるようにって考えたら、細かいところまで気配りする必要が出てきますからね」"

[[dialogue]]
speaker = "蘭美"
# 「ただきれいにすればいい訳ではなく、思いやりの心が大事なのよ！」
line = "「ただきれいにすればいい訳ではなく、思いやりの心が大事なのよ！」"

[[dialogue]]
speaker = "トワ先生"
# 「えっと、具体的にどうすればいいの？」
line = "「えっと、具体的にどうすればいいの？」"

[[dialogue]]
speaker = "蘭美"
# 「そうね……会長は年頃の男性だから、他者に立ち入られたくない部分があるのよ」
line = "「そうね……会長は年頃の男性だから、他者に立ち入られたくない部分があるのよ」"

[[dialogue]]
speaker = "蘭美"
# 「どんなお掃除をされたら嬉しいか、どこを掃除されたくないか。そこを常に考えてみるといいわ」
line = "「どんなお掃除をされたら嬉しいか、どこを掃除されたくないか。そこを常に考えてみるといいわ」"

[[dialogue]]
speaker = "トワ先生"
# 「わ、わかりました！　やってみます！」
line = "「わ、わかりました！　やってみます！」"

[[dialogue]]
speaker = "トワ先生"
# 「心を込めて、ふきふき♪　ふきふき♪」
line = "「心を込めて、ふきふき♪　ふきふき♪」"

[[dialogue]]
speaker = "トワ先生"
# 「お掃除のこと、今まであんまり考えてこなかったなぁ。散らかってなければそれでいいって感じで」
line = "「お掃除のこと、今まであんまり考えてこなかったなぁ。散らかってなければそれでいいって感じで」"

[[dialogue]]
speaker = "トワ先生"
# 「メイプルちゃんと同居するようになってから、お掃除もちゃんとするようになったけど……」
line = "「メイプルちゃんと同居するようになってから、お掃除もちゃんとするようになったけど……」"

[[dialogue]]
speaker = "トワ先生"
# 「誰かのために、とか……あんまり考えてなかったかもしれない」
line = "「誰かのために、とか……あんまり考えてなかったかもしれない」"

[[dialogue]]
speaker = "トワ先生"
# 「お嫁さんになるって、旦那さまと共同生活をするってことだから……こういうことも、もっとしっかり考える必要があるんだ」
line = "「お嫁さんになるって、旦那さまと共同生活をするってことだから……こういうことも、もっとしっかり考える必要があるんだ」"

[[dialogue]]
speaker = "トワ先生"
# 「ただきれいにするだけのお掃除じゃなく、誰かと快適な生活を送るための気配り」
line = "「ただきれいにするだけのお掃除じゃなく、誰かと快適な生活を送るための気配り」"

[[dialogue]]
speaker = "トワ先生"
# 「わたしには欠けてた要素かもなぁ」
line = "「わたしには欠けてた要素かもなぁ」"

[[dialogue]]
speaker = "トワ先生"
# 「終わりました～。どうですか？」
line = "「終わりました～。どうですか？」"

[[dialogue]]
speaker = "蘭美"
# 「素晴らしい掃除っぷりだったわ、お見事ね！」
line = "「素晴らしい掃除っぷりだったわ、お見事ね！」"

[[dialogue]]
speaker = "ヨミ"
# 「心を込めてお掃除しているのが伝わってきました～♪」
line = "「心を込めてお掃除しているのが伝わってきました～♪」"

[[dialogue]]
speaker = "マトイ"
# 「皆さん、お掃除お疲れさまでした！　それぞれ花嫁衣装で頑張ってる姿は、とってもお嫁さんでしたよ」
line = "「皆さん、お掃除お疲れさまでした！　それぞれ花嫁衣装で頑張ってる姿は、とってもお嫁さんでしたよ」"

[[dialogue]]
speaker = "unk"
# 掃除しても全然汚れないんだね
line = "掃除しても全然汚れないんだね"

[[dialogue]]
speaker = "トワ先生"
# 「確かに。お掃除したら多少は汚れるはずなのに」
line = "「確かに。お掃除したら多少は汚れるはずなのに」"

[[dialogue]]
speaker = "トワ先生"
# 「通常の花嫁衣装とは異なるってことかなぁ。これもウェディングフォームの特殊性かもしれないね」
line = "「通常の花嫁衣装とは異なるってことかなぁ。これもウェディングフォームの特殊性かもしれないね」"

[[dialogue]]
speaker = "蘭美"
# 「当主様に報告すべき事柄ね。喜んで頂けるといいのだけれど」
line = "「当主様に報告すべき事柄ね。喜んで頂けるといいのだけれど」"

[[dialogue]]
speaker = "unk"
# １日花嫁修業してみてどうだった？
line = "１日花嫁修業してみてどうだった？"

[[dialogue]]
speaker = "蘭美"
# 「そうね、メイドとして身に着けた技術をそのまま使える部分も確かにあったわ。だけど、やはり似て非なるものね……勉強になったわ」
line = "「そうね、メイドとして身に着けた技術をそのまま使える部分も確かにあったわ。だけど、やはり似て非なるものね……勉強になったわ」"

[[dialogue]]
speaker = "ヨミ"
# 「私はメイドとしても自分の未熟さを感じた１日でした。もっと頑張らなきゃって思いました」
line = "「私はメイドとしても自分の未熟さを感じた１日でした。もっと頑張らなきゃって思いました」"

[[dialogue]]
speaker = "マトイ"
# 「トワちゃん先生はどうでしたか？」
line = "「トワちゃん先生はどうでしたか？」"

[[dialogue]]
speaker = "トワ先生"
# 「わたしは……楽しかった、かな」
line = "「わたしは……楽しかった、かな」"

[[dialogue]]
speaker = "トワ先生"
# 「今までは、自分が結婚してお嫁さんになるってこと、全然実感できなかったんだよね」
line = "「今までは、自分が結婚してお嫁さんになるってこと、全然実感できなかったんだよね」"

[[dialogue]]
speaker = "トワ先生"
# 「でも、こうして花嫁修業をしてみて、お嫁さんになるってどういうことなのか、考えるきっかけになったと思う」
line = "「でも、こうして花嫁修業をしてみて、お嫁さんになるってどういうことなのか、考えるきっかけになったと思う」"

[[dialogue]]
speaker = "トワ先生"
# 「なんとなくふわ～っと憧れてたけど、もうちょっと地に足がついたっていうか」
line = "「なんとなくふわ～っと憧れてたけど、もうちょっと地に足がついたっていうか」"

[[dialogue]]
speaker = "トワ先生"
# 「だから、今日はみんなありがとう。すごくいい経験になりました」
line = "「だから、今日はみんなありがとう。すごくいい経験になりました」"

[[dialogue]]
speaker = "トワ先生"
# 「今日は本当に楽しかったなぁ。あんなに笑ったのは久し振りかも」
line = "「今日は本当に楽しかったなぁ。あんなに笑ったのは久し振りかも」"

[[dialogue]]
speaker = "トワ先生"
# 「でも……自分のことだからわかるんだ。星見家での事件のことからだけじゃなくて、当事者としても肌で感じてる」
line = "「でも……自分のことだからわかるんだ。星見家での事件のことからだけじゃなくて、当事者としても肌で感じてる」"

[[dialogue]]
speaker = "トワ先生"
# 「ウェディングフォームを解除する……ううん、ウェディングフォームの力を引き出すには、足りない」
line = "「ウェディングフォームを解除する……ううん、ウェディングフォームの力を引き出すには、足りない」"

[[dialogue]]
speaker = "トワ先生"
# 「やっぱり……あれをやらなきゃダメなのかなぁ？」
line = "「やっぱり……あれをやらなきゃダメなのかなぁ？」"

[[dialogue]]
speaker = "unk"
# トワ先生は小さくため息をついた。
line = "トワ先生は小さくため息をついた。"

[[dialogue]]
speaker = "unk"
# ウェディングフォームへの固定を解除する方法。
line = "ウェディングフォームへの固定を解除する方法。"

[[dialogue]]
speaker = "unk"
# それは星見家の事件に倣うならば、結婚式を挙げ、自身の結婚願望を満たすしかない。
line = "それは星見家の事件に倣うならば、結婚式を挙げ、自身の結婚願望を満たすしかない。"

[[dialogue]]
speaker = "unk"
# だが、しかし──だからといって、勢いで式を挙げてしまえるほど若くはない有明トワ（自主規制）歳なのだった。
line = "だが、しかし──だからといって、勢いで式を挙げてしまえるほど若くはない有明トワ（自主規制）歳なのだった。"
