[[dialogue]]
speaker = "unk"
# こうして俺たちは、赤ちゃんクマロボの世話をしながら、黒ベア子からの続報を待つことになったのだった。
line = "こうして俺たちは、赤ちゃんクマロボの世話をしながら、黒ベア子からの続報を待つことになったのだった。"
