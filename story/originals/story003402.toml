[[dialogue]]
speaker = "ルリエル"
# 「って……ふぇええっ！？　なんかルリエル、いつの間にか変身しちゃってます！！？」
line = "「って……ふぇええっ！？　なんかルリエル、いつの間にか変身しちゃってます！！？」"

[[dialogue]]
speaker = "ステラ"
# 「ボクと、そっくりな格好……」
line = "「ボクと、そっくりな格好……」"

[[dialogue]]
speaker = "ステラ"
# 「あれ？　でも、ボクもいつもの格好と少し違うような？」
line = "「あれ？　でも、ボクもいつもの格好と少し違うような？」"

[[dialogue]]
speaker = "ラファエロ"
# 「ぼくの服も元々着ていたものから変化しているようだね。ふむ、この格好もなかなかいいじゃないか！　気に入ったよ♪」
line = "「ぼくの服も元々着ていたものから変化しているようだね。ふむ、この格好もなかなかいいじゃないか！　気に入ったよ♪」"

[[dialogue]]
speaker = "ラファエロ"
# 「ともあれ、これらの現象は先ほどの子が引き起こした、ということでいいのかい？　よかったら詳しい話を聞かせてくれないかな？」
line = "「ともあれ、これらの現象は先ほどの子が引き起こした、ということでいいのかい？　よかったら詳しい話を聞かせてくれないかな？」"

[[dialogue]]
speaker = "unk"
# 俺は新しくやってきた２人に、黒ベア子のこと、彼女が俺たちに預けて行った赤ちゃんクマロボのことを説明した。
line = "俺は新しくやってきた２人に、黒ベア子のこと、彼女が俺たちに預けて行った赤ちゃんクマロボのことを説明した。"

[[dialogue]]
speaker = "ラファエロ"
# 「──なるほど、つまりはきみたちも厄介事を押し付けられた側で、事態の詳細は把握できてはいないということだね」
line = "「──なるほど、つまりはきみたちも厄介事を押し付けられた側で、事態の詳細は把握できてはいないということだね」"

