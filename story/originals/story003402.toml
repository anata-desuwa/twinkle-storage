[[dialogue]]
speaker = "ラファエロ"
# 「おそらくね。作品のイメージを巡らせていたら、突然目の前が真っ暗になったんだ。気が付いたらこの状況だったよ」
line = "「おそらくね。作品のイメージを巡らせていたら、突然目の前が真っ暗になったんだ。気が付いたらこの状況だったよ」"

[[dialogue]]
speaker = "ラファエロ"
# 「何が起きたのかについては、そこにいる人たちに聞いてみようか。どうやらぼくたちよりも事情に通じているようだしね」
line = "「何が起きたのかについては、そこにいる人たちに聞いてみようか。どうやらぼくたちよりも事情に通じているようだしね」"

[[dialogue]]
speaker = "ルリエル"
# 「か、会長さん。この人たちって……」
