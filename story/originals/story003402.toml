line = "「そ、そんな……どうしてボクたちなんですか？」"

[[dialogue]]
speaker = "ラファエロ"
# 「それはぼくにもわからないな。別段、赤ちゃんのお世話に長けているというわけでもないんだけどね」
line = "「それはぼくにもわからないな。別段、赤ちゃんのお世話に長けているというわけでもないんだけどね」"

