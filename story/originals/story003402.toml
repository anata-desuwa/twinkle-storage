[[dialogue]]
speaker = "unk"
# あ、ああ
line = "あ、ああ"

[[dialogue]]
speaker = "ルリエル"
# 「赤ちゃんクマロボさん、あなたのお世話はルリエルたちがちゃーんとしてあげますからね～♪」
line = "「赤ちゃんクマロボさん、あなたのお世話はルリエルたちがちゃーんとしてあげますからね～♪」"

[[dialogue]]
speaker = "赤ちゃんクマロボ"
