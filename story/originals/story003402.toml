[[dialogue]]
speaker = "unk"
# 俺は緋宮クロト
line = "俺は緋宮クロト"

[[dialogue]]
speaker = "unk"
# 俺は簡単な自己紹介と共に、ここが新しく来た２人にとって異世界である可能性が高いこと、そして過去に似たような事件が起きたことがあるのをかいつまんで説明した。
line = "俺は簡単な自己紹介と共に、ここが新しく来た２人にとって異世界である可能性が高いこと、そして過去に似たような事件が起きたことがあるのをかいつまんで説明した。"

[[dialogue]]
speaker = "ルリエル"
# 「そしてわたしがルリエルなのです！　お隣流星学園の星徒会会計なのです♪」
line = "「そしてわたしがルリエルなのです！　お隣流星学園の星徒会会計なのです♪」"

[[dialogue]]
