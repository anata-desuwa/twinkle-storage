line = "また新しく異世界から来た人たちみたいだ"

[[dialogue]]
speaker = "unk"
# ああ……
line = "ああ……"

[[dialogue]]
speaker = "黒ベア子"
# 「よかったくま！　２人ともちゃんと召喚出来てるくま！」
line = "「よかったくま！　２人ともちゃんと召喚出来てるくま！」"

[[dialogue]]
speaker = "unk"
# ２人に声をかけようとした瞬間、またしても空中にあの黒い穴が出現し、そこから黒ベア子が姿を現す。
line = "２人に声をかけようとした瞬間、またしても空中にあの黒い穴が出現し、そこから黒ベア子が姿を現す。"

[[dialogue]]
speaker = "黒ベア子"
# 「こっちの世界はお久しぶりくま♪　元気してたくまか？」
line = "「こっちの世界はお久しぶりくま♪　元気してたくまか？」"

[[dialogue]]
speaker = "黒ベア子"
# 「って、呑気に話してる時間はないんだったくま！　わたしは今、とっても忙しいくま！」
line = "「って、呑気に話してる時間はないんだったくま！　わたしは今、とっても忙しいくま！」"

[[dialogue]]
speaker = "unk"
# 父親捜しは終わったのか？
line = "父親捜しは終わったのか？"

[[dialogue]]
speaker = "unk"
# フィオナはどうしたんだ？
line = "フィオナはどうしたんだ？"

[[dialogue]]
speaker = "黒ベア子"
# 「パパ捜しは全然終わってないくま、ただいま捜索中くま！　一緒に付いてきたフィオナも、絶賛協力してもらってる最中くま！」
line = "「パパ捜しは全然終わってないくま、ただいま捜索中くま！　一緒に付いてきたフィオナも、絶賛協力してもらってる最中くま！」"

[[dialogue]]
speaker = "ルリエル"
# 「そうですかぁ……。それじゃあもうしばらくは、帰ってこれないということなのですね」
line = "「そうですかぁ……。それじゃあもうしばらくは、帰ってこれないということなのですね」"

[[dialogue]]
speaker = "黒ベア子"
# 「そういうことくま！　そんでもって、この子のことも頼んだくま♪」
line = "「そういうことくま！　そんでもって、この子のことも頼んだくま♪」"

[[dialogue]]
speaker = "unk"
# 頼むってどういうこと？
line = "頼むってどういうこと？"

[[dialogue]]
speaker = "unk"
# 赤ちゃんクマロボ！？
line = "赤ちゃんクマロボ！？"

[[dialogue]]
speaker = "赤ちゃんクマロボ"
# 「ばぶー<emoji=heart04>」
