[[dialogue]]
speaker = "黒ベア子"
# 「しばらくこの子のことを預かっていて欲しいくま。ちょっとの間だけくま♪」
line = "「しばらくこの子のことを預かっていて欲しいくま。ちょっとの間だけくま♪」"

[[dialogue]]
speaker = "黒ベア子"
# 「でも、いきなりそんなこと言われてもきっと困るくま。だからちゃんと応援を呼んでおいたくま♪」
line = "「でも、いきなりそんなこと言われてもきっと困るくま。だからちゃんと応援を呼んでおいたくま♪」"

[[dialogue]]
speaker = "ラファエロ"
# 「その応援っていうのが、ぼくたちの事かな？」
line = "「その応援っていうのが、ぼくたちの事かな？」"

[[dialogue]]
speaker = "黒ベア子"
# 「察しが良くて助かるくま♪　みんなで協力して、赤ちゃんクマロボの面倒を見るくま！」
line = "「察しが良くて助かるくま♪　みんなで協力して、赤ちゃんクマロボの面倒を見るくま！」"

[[dialogue]]
speaker = "ステラ"
# 「こ、困りますよ～！　あっ……！」
line = "「こ、困りますよ～！　あっ……！」"

[[dialogue]]
speaker = "unk"
# こちらの反論に耳を傾ける様子もなく、赤ちゃんクマロボを女の子の１人に押し付けて、黒ベア子は黒い穴の中に消え去ってしまった。
line = "こちらの反論に耳を傾ける様子もなく、赤ちゃんクマロボを女の子の１人に押し付けて、黒ベア子は黒い穴の中に消え去ってしまった。"

[[dialogue]]
speaker = "ルリエル"
# 「赤ちゃんクマロボさんの面倒を強引に押し付けられちゃった気がするんですけど……どうしましょう、会長さん！？」
line = "「赤ちゃんクマロボさんの面倒を強引に押し付けられちゃった気がするんですけど……どうしましょう、会長さん！？」"

[[dialogue]]
speaker = "unk"
# ルリエル……その格好は？
