[[dialogue]]
speaker = "unk"
# 第４話,恋愛チャージボム,P
line = "第４話,恋愛チャージボム,P"

[[dialogue]]
speaker = "unk"
# １日レンタル彼氏の一件を通して、ネーゼマインと正式な恋人として付き合うことになった――のだが、あの日以来、彼女の様子がどうもおかしい。
line = "１日レンタル彼氏の一件を通して、ネーゼマインと正式な恋人として付き合うことになった――のだが、あの日以来、彼女の様子がどうもおかしい。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「あっ、会長……どうしたの？　――私に話があるから、会いにきた？　そ、そうなんだ～」
line = "「あっ、会長……どうしたの？　――私に話があるから、会いにきた？　そ、そうなんだ～」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「えっと～、ごめ～ん♪　私、今日は用事あるから～……それじゃ！」
line = "「えっと～、ごめ～ん♪　私、今日は用事あるから～……それじゃ！」"

[[dialogue]]
speaker = "unk"
# ちょっと待って！　なんで逃げるの！？
line = "ちょっと待って！　なんで逃げるの！？"

[[dialogue]]
speaker = "ネーゼマイン"
# （思わず空き教室まで逃げてきちゃった……。あ～もう、なにやってんだ私は……これで何度目だって話だよ。まさか――）
line = "（思わず空き教室まで逃げてきちゃった……。あ～もう、なにやってんだ私は……これで何度目だって話だよ。まさか――）"

[[dialogue]]
speaker = "ネーゼマイン"
# （あの日から、会長の顔を直視できなくなっちゃうなんて……！　これじゃ、普通の女の子みたいじゃん……！）
line = "（あの日から、会長の顔を直視できなくなっちゃうなんて……！　これじゃ、普通の女の子みたいじゃん……！）"

[[dialogue]]
speaker = "ネーゼマイン"
# （なんでこうなってんの！？　なんか心にあった恋愛スイッチが押されて、爆弾が爆発したみたいに前の自分と激変しちゃってるんだけど！？）
line = "（なんでこうなってんの！？　なんか心にあった恋愛スイッチが押されて、爆弾が爆発したみたいに前の自分と激変しちゃってるんだけど！？）"

[[dialogue]]
speaker = "ネーゼマイン"
# （これって前に心理学の本で読んだ、精神のパラダイムシフトってやつ……！？　そうなるだけ私、会長に対する恋愛感情を今まで抑え込んでたってこと……！？）
line = "（これって前に心理学の本で読んだ、精神のパラダイムシフトってやつ……！？　そうなるだけ私、会長に対する恋愛感情を今まで抑え込んでたってこと……！？）"

[[dialogue]]
speaker = "ネーゼマイン"
# （会長を前にするだけで、まともに見れないし喋れないくらい、胸がドキドキしちゃうとか……！　あ～もう、どうしてこうなった……！？）
line = "（会長を前にするだけで、まともに見れないし喋れないくらい、胸がドキドキしちゃうとか……！　あ～もう、どうしてこうなった……！？）"

[[dialogue]]
speaker = "ネーゼマイン"
# （確かにいつか、普通の恋愛がしてみたいと思ってたけど、いざ自覚してみると、問題だらけなんだけど……！）
line = "（確かにいつか、普通の恋愛がしてみたいと思ってたけど、いざ自覚してみると、問題だらけなんだけど……！）"

[[dialogue]]
speaker = "unk"
# 見つけた！　マイン、話を聞いてくれ！
line = "見つけた！　マイン、話を聞いてくれ！"

[[dialogue]]
speaker = "ネーゼマイン"
# 「うわっ！？　会長、追いかけてきたの！？　待って待って！　今は心の準備が追いついてないから……！」
line = "「うわっ！？　会長、追いかけてきたの！？　待って待って！　今は心の準備が追いついてないから……！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「――最近、私の様子がおかしくてストレス解消ができてるのか心配？　あっ、ちょっ！？」
line = "「――最近、私の様子がおかしくてストレス解消ができてるのか心配？　あっ、ちょっ！？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「そんないきなり手を握って、真正面から目を見つめてくるのは、今はマズいっていうか……！」
line = "「そんないきなり手を握って、真正面から目を見つめてくるのは、今はマズいっていうか……！」"

[[dialogue]]
speaker = "ネーゼマイン"
# （あ～～～っ！　顔が近い近い近い！　ていうか、前から別に顔立ち嫌いじゃなかったけど、今はイケメンすぎて直視できない！）
line = "（あ～～～っ！　顔が近い近い近い！　ていうか、前から別に顔立ち嫌いじゃなかったけど、今はイケメンすぎて直視できない！）"

[[dialogue]]
speaker = "ネーゼマイン"
# （ヤバいヤバいヤバい、自分でわかる！　ドキドキがキャパオーバーする！　ここで更に、甘い言葉なんか囁かれたりしたら……！）
line = "（ヤバいヤバいヤバい、自分でわかる！　ドキドキがキャパオーバーする！　ここで更に、甘い言葉なんか囁かれたりしたら……！）"

[[dialogue]]
speaker = "unk"
# マインのことが好きだから、力になりたんだ
line = "マインのことが好きだから、力になりたんだ"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ぐはぁっ！！！」
line = "「ぐはぁっ！！！」"

[[dialogue]]
speaker = "unk"
# ちょっ！？　マイン！？
line = "ちょっ！？　マイン！？"

[[dialogue]]
speaker = "ネーゼマイン"
# 「――う～ん、イケメンすぎ……って、あれ？　ここは……保健室？」
line = "「――う～ん、イケメンすぎ……って、あれ？　ここは……保健室？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「あ、会長……！？　――急に倒れた私を、保健室に運んできてくれたの？　ご、ごめん……逃げたり、ぶっ倒れたり、迷惑ばっかりかけて……」
line = "「あ、会長……！？　――急に倒れた私を、保健室に運んできてくれたの？　ご、ごめん……逃げたり、ぶっ倒れたり、迷惑ばっかりかけて……」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ちゃんと事情……話さないとだよね。実はさ……」
line = "「ちゃんと事情……話さないとだよね。実はさ……」"

[[dialogue]]
speaker = "unk"
# マインはそれから、自身の心境の変化について、恥ずかしそうにしながらもちゃんと話してくれた。
line = "マインはそれから、自身の心境の変化について、恥ずかしそうにしながらもちゃんと話してくれた。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「――そういうわけで、なんか今も会長の顔を見ようとするとドキドキしちゃうから、上手く目を合わせられなくて……」
line = "「――そういうわけで、なんか今も会長の顔を見ようとするとドキドキしちゃうから、上手く目を合わせられなくて……」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「あ！　だけど、ストレス解消のことは心配しなくて大丈夫だから！」
line = "「あ！　だけど、ストレス解消のことは心配しなくて大丈夫だから！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「自分でも不思議なんだけど、今は会長見てドキドキすると、ストレスが吹っ飛んじゃう感じで、悪戯どころじゃないっていうか……」
line = "「自分でも不思議なんだけど、今は会長見てドキドキすると、ストレスが吹っ飛んじゃう感じで、悪戯どころじゃないっていうか……」"

[[dialogue]]
speaker = "unk"
# それって……俺のこと、
line = "それって……俺のこと、"

[[dialogue]]
speaker = "unk"
# 好きって思ってくれてるから？
line = "好きって思ってくれてるから？"

[[dialogue]]
speaker = "ネーゼマイン"
# 「え！？　う、うん……そうなるかな。今まで恋愛的な『好き』って、わからなかったはずなのに――」
line = "「え！？　う、うん……そうなるかな。今まで恋愛的な『好き』って、わからなかったはずなのに――」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「今はなんか、自分でも戸惑うくらいに、会長のこと……こんなに好きだったんだって自覚してる」
line = "「今はなんか、自分でも戸惑うくらいに、会長のこと……こんなに好きだったんだって自覚してる」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「なんかいざ本当に付き合い出したら、また面倒臭いことになってて、ごめん……」
line = "「なんかいざ本当に付き合い出したら、また面倒臭いことになってて、ごめん……」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「――えっ！？　あ、頭を撫でてもいいかって……いきなりなんで！？」
line = "「――えっ！？　あ、頭を撫でてもいいかって……いきなりなんで！？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「べ、別に嫌じゃないけど……さっきも言った通り、今の時点でドキドキしてるから……その――」
line = "「べ、別に嫌じゃないけど……さっきも言った通り、今の時点でドキドキしてるから……その――」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「も、もしするなら、優しくしないで欲しい……」
line = "「も、もしするなら、優しくしないで欲しい……」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「あっ……会長の手、温かい……ん……<emoji=heart04>」
line = "「あっ……会長の手、温かい……ん……<emoji=heart04>」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「か、会長ってば、優しくしないでって言ったのに嘘つき……<emoji=heart04>　こんな、優しく撫でたりして……はあぁ……<emoji=heart04>」
line = "「か、会長ってば、優しくしないでって言ったのに嘘つき……<emoji=heart04>　こんな、優しく撫でたりして……はあぁ……<emoji=heart04>」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「……ど、どうしよう……こうされるだけで私、すごく幸せを感じちゃう体になってるんだけど……<emoji=heart04>」
line = "「……ど、どうしよう……こうされるだけで私、すごく幸せを感じちゃう体になってるんだけど……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 安心できる？
line = "安心できる？"

[[dialogue]]
speaker = "ネーゼマイン"
# 「う、うん……<emoji=heart04>　ドキドキするけど、気持ちよくて落ち着く感じがする♪　これでいいのかって疑心暗鬼になりそうなくらい……<emoji=heart04>」
line = "「う、うん……<emoji=heart04>　ドキドキするけど、気持ちよくて落ち着く感じがする♪　これでいいのかって疑心暗鬼になりそうなくらい……<emoji=heart04>」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「――それなら定期的にして慣れてもらわないとな、って？　そんなこと続けられたら私、会長なしじゃ生きられなくなっちゃうんだけど……」
line = "「――それなら定期的にして慣れてもらわないとな、って？　そんなこと続けられたら私、会長なしじゃ生きられなくなっちゃうんだけど……」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「――そうなったら嬉しい？　も、もうっ、会長ってば……」
line = "「――そうなったら嬉しい？　も、もうっ、会長ってば……」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「……あのさ、会長。ずっと言えなかったけど……ようやくわかったから、改めてちゃんと言うね？」
line = "「……あのさ、会長。ずっと言えなかったけど……ようやくわかったから、改めてちゃんと言うね？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「私、会長のこと……好きだよ。前の私には、戻れないくらいに」
line = "「私、会長のこと……好きだよ。前の私には、戻れないくらいに」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「――へ！？　か、可愛くて、キスしたい気分になった！？」
line = "「――へ！？　か、可愛くて、キスしたい気分になった！？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「い、今それはドキドキし過ぎて死んじゃうから、慣れてステップアップするまで、もう少し待って欲しい……」
line = "「い、今それはドキドキし過ぎて死んじゃうから、慣れてステップアップするまで、もう少し待って欲しい……」"

[[dialogue]]
speaker = "unk"
# わかってる。これからゆっくりと付き合うよ
line = "わかってる。これからゆっくりと付き合うよ"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ん……<emoji=heart04>　ありがと、会長……♪」
line = "「ん……<emoji=heart04>　ありがと、会長……♪」"

[[dialogue]]
speaker = "unk"
# そうして、はにかみながらも――
line = "そうして、はにかみながらも――"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひ……♪」
line = "「にひひ……♪」"

[[dialogue]]
speaker = "unk"
# ネーゼマインはようやく、いつもの笑顔を見せてくれたのだった。
line = "ネーゼマインはようやく、いつもの笑顔を見せてくれたのだった。"
