[[dialogue]]
speaker = "unk"
# 第３話,ルルカと恋人ＡＳＭＲ・前編,P
line = "第３話,ルルカと恋人ＡＳＭＲ・前編,P"

[[dialogue]]
speaker = "unk"
# バレンタインの後日。
line = "バレンタインの後日。"

[[dialogue]]
speaker = "ルルカ"
# 「ふふふっ……どう？　イクシーちゃん」
line = "「ふふふっ……どう？　イクシーちゃん」"

[[dialogue]]
speaker = "イクシリオン"
# 「こ、これは……！　あっ<emoji=heart04>　ふああぁっ……<emoji=heart04>」
line = "「こ、これは……！　あっ<emoji=heart04>　ふああぁっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# い、イクシー、なんか凄い声出てるけど……
line = "い、イクシー、なんか凄い声出てるけど……"

[[dialogue]]
speaker = "イクシリオン"
# 「ひゃっ！？　か、会長！？」
line = "「ひゃっ！？　か、会長！？」"

[[dialogue]]
speaker = "ルルカ"
# 「あっ、お兄ちゃん！　もしかして迎えに来てくれたの？」
line = "「あっ、お兄ちゃん！　もしかして迎えに来てくれたの？」"

[[dialogue]]
speaker = "イクシリオン"
# 「はうぅ……<emoji=heart04>　会長に、恥ずかしいところを見られてしまいました……！」
line = "「はうぅ……<emoji=heart04>　会長に、恥ずかしいところを見られてしまいました……！」"

[[dialogue]]
speaker = "ルルカ"
# 「実はね～、イクシーちゃんが『ＡＳＭＲ』を聞いたことないって言うから、オススメ作品をイヤホンで試してもらってたんだ♪」
line = "「実はね～、イクシーちゃんが『ＡＳＭＲ』を聞いたことないって言うから、オススメ作品をイヤホンで試してもらってたんだ♪」"

[[dialogue]]
speaker = "unk"
# 実はルルカは、ＡＳＭＲ――聴覚を心地よく刺激する音声が好きで、日常的によく聴いていたりする。
line = "実はルルカは、ＡＳＭＲ――聴覚を心地よく刺激する音声が好きで、日常的によく聴いていたりする。"

[[dialogue]]
speaker = "イクシリオン"
# 「み、耳かきをしてもらう音声だとは聞いていましたが……イヤホンで聴くと、本当に耳かきをされているようで……<emoji=heart04>」
line = "「み、耳かきをしてもらう音声だとは聞いていましたが……イヤホンで聴くと、本当に耳かきをされているようで……<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
# 「み、耳がゾワゾワして、こそばゆいのに気持ちよくて……まさかここまでとは思いませんでした……<emoji=heart04>」
line = "「み、耳がゾワゾワして、こそばゆいのに気持ちよくて……まさかここまでとは思いませんでした……<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
# 「でしょ～？　いい作品は特殊なマイクで録ってるから、臨場感がほんとにすごいの♪」
line = "「でしょ～？　いい作品は特殊なマイクで録ってるから、臨場感がほんとにすごいの♪」"

[[dialogue]]
speaker = "イクシリオン"
# 「い、今のは女性がしてくれるものでしたが……これがもし……」
line = "「い、今のは女性がしてくれるものでしたが……これがもし……」"

[[dialogue]]
speaker = "ルルカ"
# 「え？　イクシーちゃん、なんて？」
line = "「え？　イクシーちゃん、なんて？」"

[[dialogue]]
speaker = "イクシリオン"
# 「あっ、いえっ！　なんでもありません！　イヤホン貸してくださって、ありがとうございます。わ、私も後で色々試してみますね……♪」
line = "「あっ、いえっ！　なんでもありません！　イヤホン貸してくださって、ありがとうございます。わ、私も後で色々試してみますね……♪」"

[[dialogue]]
speaker = "イクシリオン"
# （ルルカさんは『男性向け』だと仰っていましたが……それはつまり『女性向け』もあるということですよね……）
line = "（ルルカさんは『男性向け』だと仰っていましたが……それはつまり『女性向け』もあるということですよね……）"

[[dialogue]]
speaker = "イクシリオン"
# （そ、それってつまり……女性ではなく、男性が耳かきをしてくれる音声ということで……<emoji=heart04>）
line = "（そ、それってつまり……女性ではなく、男性が耳かきをしてくれる音声ということで……<emoji=heart04>）"

[[dialogue]]
speaker = "イクシリオン"
# 「ああっ、いけません<emoji=heart04>　そんなことを考えては……！」
line = "「ああっ、いけません<emoji=heart04>　そんなことを考えては……！」"

[[dialogue]]
speaker = "ルルカ"
# 「い、イクシーちゃん、どうしたの！？　大丈夫！？」
line = "「い、イクシーちゃん、どうしたの！？　大丈夫！？」"

[[dialogue]]
speaker = "unk"
# 顔を真っ赤にして悶えるように首を横に振るイクシーに、ルルカは何事かと目をぱちくりさせてしまうのだった。
line = "顔を真っ赤にして悶えるように首を横に振るイクシーに、ルルカは何事かと目をぱちくりさせてしまうのだった。"

[[dialogue]]
speaker = "unk"
# そんなことがあった週末。その日は、ルルカが俺の家へ遊びに来ていた。
line = "そんなことがあった週末。その日は、ルルカが俺の家へ遊びに来ていた。"

[[dialogue]]
speaker = "ルルカ"
# 「ふんふん、ふふふ～ん♪　あっ、推しサークルの新作ＡＳＭＲが配信されてる！　これは買っとかないと♪」
line = "「ふんふん、ふふふ～ん♪　あっ、推しサークルの新作ＡＳＭＲが配信されてる！　これは買っとかないと♪」"

[[dialogue]]
speaker = "unk"
# ソファーの上。俺の膝を枕にして、ルルカはＤＩＳＣを操作していた。柔らかな髪が太ももにふれて、くすぐるように揺れる。
line = "ソファーの上。俺の膝を枕にして、ルルカはＤＩＳＣを操作していた。柔らかな髪が太ももにふれて、くすぐるように揺れる。"

[[dialogue]]
speaker = "unk"
# ちなみに最近のルルカは、バレンタインフォームを気に入っているらしく、俺と過ごす時はよくこの姿に変身していた。
line = "ちなみに最近のルルカは、バレンタインフォームを気に入っているらしく、俺と過ごす時はよくこの姿に変身していた。"

[[dialogue]]
speaker = "unk"
# ルルカはＡＳＭＲ、本当に好きだよな
line = "ルルカはＡＳＭＲ、本当に好きだよな"

[[dialogue]]
speaker = "ルルカ"
# 「うん♪　元々はＶチューバーとしての勉強で聴き始めたものだったけど、気づけばすっかりハマっちゃって～」
line = "「うん♪　元々はＶチューバーとしての勉強で聴き始めたものだったけど、気づけばすっかりハマっちゃって～」"

[[dialogue]]
speaker = "ルルカ"
# 「え？　――女性向けの、男の人が喋るやつは買ったりしないのかって？　え、えっと……それはそのぉ～……」
line = "「え？　――女性向けの、男の人が喋るやつは買ったりしないのかって？　え、えっと……それはそのぉ～……」"

[[dialogue]]
speaker = "unk"
# ふぅ～～ん、やっぱり聴いたりするんだ
line = "ふぅ～～ん、やっぱり聴いたりするんだ"

[[dialogue]]
speaker = "ルルカ"
# 「あ、あれっ？　お兄ちゃん、もしかして……ちょっと嫉妬してる？　ま、待って！　最近は女性向けのは全然聴いてないから！」
line = "「あ、あれっ？　お兄ちゃん、もしかして……ちょっと嫉妬してる？　ま、待って！　最近は女性向けのは全然聴いてないから！」"

[[dialogue]]
speaker = "ルルカ"
# 「って、そんなジト目しないで！？　本当だから！　確かに前は買ってたこともあったけど――」
line = "「って、そんなジト目しないで！？　本当だから！　確かに前は買ってたこともあったけど――」"

[[dialogue]]
speaker = "ルルカ"
# 「今はね、ＡＳＭＲの男性声優さんよりも……お兄ちゃんの声の方が好きだから！」
line = "「今はね、ＡＳＭＲの男性声優さんよりも……お兄ちゃんの声の方が好きだから！」"

[[dialogue]]
speaker = "unk"
# ……声が好きって、生まれて初めて言われた
line = "……声が好きって、生まれて初めて言われた"

[[dialogue]]
speaker = "ルルカ"
# 「お、お世辞じゃないよ？　本当に……」
line = "「お、お世辞じゃないよ？　本当に……」"

[[dialogue]]
speaker = "ルルカ"
# 「あたし、お兄ちゃんとイチャイチャしてる時に、『好き』って耳元で囁かれると、胸がきゅーってなっちゃうの……<emoji=heart04>」
line = "「あたし、お兄ちゃんとイチャイチャしてる時に、『好き』って耳元で囁かれると、胸がきゅーってなっちゃうの……<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
# 「だから最近は、他の男の人の声を聴いても、全然ドキドキしなくなっちゃったっていうか……」
line = "「だから最近は、他の男の人の声を聴いても、全然ドキドキしなくなっちゃったっていうか……」"

[[dialogue]]
speaker = "unk"
# その言葉に、胸の奥がじんわり甘く溶けていく感じになる。――なら、もっと『特別な音』を聴かせてあげたくなるじゃないか。
line = "その言葉に、胸の奥がじんわり甘く溶けていく感じになる。――なら、もっと『特別な音』を聴かせてあげたくなるじゃないか。"

[[dialogue]]
speaker = "ルルカ"
# 「――えっ？　お兄ちゃんが、あたしに耳かきをしてくれるの……！？」
line = "「――えっ？　お兄ちゃんが、あたしに耳かきをしてくれるの……！？」"

[[dialogue]]
speaker = "ルルカ"
# 「そ、それってつまり……『お兄ちゃんのリアル耳かきＡＳＭＲ』ってこと……！？」
line = "「そ、それってつまり……『お兄ちゃんのリアル耳かきＡＳＭＲ』ってこと……！？」"

[[dialogue]]
speaker = "unk"
# 俺の声が好きだと言ってくれたから――
line = "俺の声が好きだと言ってくれたから――"

[[dialogue]]
speaker = "unk"
# ルルカにしてあげたいんだ、と彼女の耳に唇が触れるほどの距離で囁く。
line = "ルルカにしてあげたいんだ、と彼女の耳に唇が触れるほどの距離で囁く。"

[[dialogue]]
speaker = "ルルカ"
# 「～～～っ<emoji=heart04><emoji=heart04>」
line = "「～～～っ<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# その瞬間、ルルカの耳先がぴこっと震え、頬が一気に赤く染まった。
line = "その瞬間、ルルカの耳先がぴこっと震え、頬が一気に赤く染まった。"

[[dialogue]]
speaker = "ルルカ"
# 「お、お兄ちゃん、そんな風に言われたら……<emoji=heart04>」
line = "「お、お兄ちゃん、そんな風に言われたら……<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
# 「あたし、断れなくなっちゃうよぉ……<emoji=heart04>」
line = "「あたし、断れなくなっちゃうよぉ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺を見上げるルルカの瞳は、とろけるような甘い期待に満ちていて。俺はもう１度彼女の耳元に口を寄せて、部屋へ行こうと囁くのだった。
line = "俺を見上げるルルカの瞳は、とろけるような甘い期待に満ちていて。俺はもう１度彼女の耳元に口を寄せて、部屋へ行こうと囁くのだった。"
