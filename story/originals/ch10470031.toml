[[dialogue]]
speaker = "unk"
# 第１話,メルエルとナターシャのその後,P
line = "第１話,メルエルとナターシャのその後,P"

[[dialogue]]
speaker = "unk"
# 『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』との戦いが終わり――ようやく日常が戻ってきたと実感し始めた、ある日の放課後。
line = "『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』との戦いが終わり――ようやく日常が戻ってきたと実感し始めた、ある日の放課後。"

[[dialogue]]
speaker = "unk"
# 恋人のメルエルが、今日は教室まで迎えに来なかった。何か用事でもあったのだろうかと、彼女の教室へ向かうと……
line = "恋人のメルエルが、今日は教室まで迎えに来なかった。何か用事でもあったのだろうかと、彼女の教室へ向かうと……"

[[dialogue]]
speaker = "メルエル"
# 「ねっ、お願いナターシャちゃん！　今日は一緒に買い物に行こうっ」
line = "「ねっ、お願いナターシャちゃん！　今日は一緒に買い物に行こうっ」"

[[dialogue]]
speaker = "ナターシャ"
# 「え～、やだよ。メルエルって放課後は毎日、会長さんのところでしょ？　買い物なら、会長さんと行けばいいじゃん」
line = "「え～、やだよ。メルエルって放課後は毎日、会長さんのところでしょ？　買い物なら、会長さんと行けばいいじゃん」"

[[dialogue]]
speaker = "メルエル"
# 「うんっ！　だからその会長くんとの買い物に、ナターシャちゃんも一緒にどうかなって！」
line = "「うんっ！　だからその会長くんとの買い物に、ナターシャちゃんも一緒にどうかなって！」"

[[dialogue]]
speaker = "ナターシャ"
# 「えっ、本当に嫌。なんで私がカップルのお邪魔虫みたいなことしなきゃいけないの」
line = "「えっ、本当に嫌。なんで私がカップルのお邪魔虫みたいなことしなきゃいけないの」"

[[dialogue]]
speaker = "unk"
# ２人とも、どうかした？
line = "２人とも、どうかした？"

[[dialogue]]
speaker = "メルエル"
# 「あっ、会長くん、ごめんね。ナターシャちゃんと話してて、迎えに行けなくて……」
line = "「あっ、会長くん、ごめんね。ナターシャちゃんと話してて、迎えに行けなくて……」"

[[dialogue]]
speaker = "ナターシャ"
# 「聞いてよ会長さん。この子、会長さんとのデートに、私を連れて行こうとするんだよ。彼氏としてどう思う？」
line = "「聞いてよ会長さん。この子、会長さんとのデートに、私を連れて行こうとするんだよ。彼氏としてどう思う？」"

[[dialogue]]
speaker = "unk"
# 俺も仲良くしておきたいな
line = "俺も仲良くしておきたいな"

[[dialogue]]
speaker = "unk"
# メルエルが仲良くしたいナターシャとは
line = "メルエルが仲良くしたいナターシャとは"

[[dialogue]]
speaker = "メルエル"
# 「……！　会長くんっ<emoji=heart04>」
line = "「……！　会長くんっ<emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
# 「わお。それ、なかなか大胆な発言だね」
line = "「わお。それ、なかなか大胆な発言だね」"

[[dialogue]]
speaker = "メルエル"
# 「？　大胆って……何が？」
line = "「？　大胆って……何が？」"

[[dialogue]]
speaker = "ナターシャ"
# 「メルエルという恋人がいながら、私とも仲良くしたいってことは……私も魔王の側室に加えられちゃうってことだよ、メルエル」
line = "「メルエルという恋人がいながら、私とも仲良くしたいってことは……私も魔王の側室に加えられちゃうってことだよ、メルエル」"

[[dialogue]]
speaker = "メルエル"
# 「えぇえっ！？　会長くん、ナターシャちゃんのことも好きだったのぉ！？」
line = "「えぇえっ！？　会長くん、ナターシャちゃんのことも好きだったのぉ！？」"

[[dialogue]]
speaker = "ナターシャ"
# 「まあ？　世界を救った魔王の側室っていうのも、案外悪くないのかな？」
line = "「まあ？　世界を救った魔王の側室っていうのも、案外悪くないのかな？」"

[[dialogue]]
speaker = "ナターシャ"
# 「暗殺稼業から足を洗っても安心安全だろうし、魔王さまが甲斐性を見せてくれるなら、これ、玉の輿ってやつ？」
line = "「暗殺稼業から足を洗っても安心安全だろうし、魔王さまが甲斐性を見せてくれるなら、これ、玉の輿ってやつ？」"

[[dialogue]]
speaker = "メルエル"
# 「うぅうっ、会長くんが私以外の女の子を『好き』なのは、ちょっと胸がチクチクするけど、それでも……私のことも好きでいてくれるなら！！」
line = "「うぅうっ、会長くんが私以外の女の子を『好き』なのは、ちょっと胸がチクチクするけど、それでも……私のことも好きでいてくれるなら！！」"

[[dialogue]]
speaker = "unk"
# 俺が結婚したいのは、メルエルだけだ！
line = "俺が結婚したいのは、メルエルだけだ！"

[[dialogue]]
speaker = "unk"
# メルエル以外に好きな子なんていない！
line = "メルエル以外に好きな子なんていない！"

[[dialogue]]
speaker = "メルエル"
# 「か、会長くん……！！<emoji=heart04>」
line = "「か、会長くん……！！<emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
# 「え～？　でもさ、魔王の血筋はちゃんと残すべきじゃない？」
line = "「え～？　でもさ、魔王の血筋はちゃんと残すべきじゃない？」"

[[dialogue]]
speaker = "ナターシャ"
# 「メルエルが<b>天界の魔王を断絶させちゃう</b>わけだし？　その分、会長さんには側室を５人でも１０人でもとってもらって、たくさん子孫を残してもらわないと」
line = "「メルエルが<b>天界の魔王を断絶させちゃう</b>わけだし？　その分、会長さんには側室を５人でも１０人でもとってもらって、たくさん子孫を残してもらわないと」"

[[dialogue]]
speaker = "unk"
# 魔王の役目はもう終わっただろ？
line = "魔王の役目はもう終わっただろ？"

[[dialogue]]
speaker = "unk"
# 『ＸＥＬＯＳ』は倒したわけだし
line = "『ＸＥＬＯＳ』は倒したわけだし"

[[dialogue]]
speaker = "ナターシャ"
# 「いやいや、世界の危機なんて、いつどこから転がり込んでくるか分からないものだよ？」
line = "「いやいや、世界の危機なんて、いつどこから転がり込んでくるか分からないものだよ？」"

[[dialogue]]
speaker = "メルエル"
# 「だ、大丈夫っ！！」
line = "「だ、大丈夫っ！！」"

[[dialogue]]
speaker = "メルエル"
# 「それなら私が、会長くんの子供を１０人でも２０人でも産むからっ！！」
line = "「それなら私が、会長くんの子供を１０人でも２０人でも産むからっ！！」"

[[dialogue]]
speaker = "ナターシャ"
# 「うわ～、エロだ。それはエロだよ、メルエル」
line = "「うわ～、エロだ。それはエロだよ、メルエル」"

[[dialogue]]
speaker = "メルエル"
# 「私、エロじゃないよ！？」
line = "「私、エロじゃないよ！？」"

[[dialogue]]
speaker = "メルエル"
# 「お世継ぎの話は大事だし、全然どこにも、エッチな要素はなかったよね！？」
line = "「お世継ぎの話は大事だし、全然どこにも、エッチな要素はなかったよね！？」"

[[dialogue]]
speaker = "ナターシャ"
# 「これがカマトトってやつか～。どうやって子供ができるか知らないわけじゃあるまいし、あざといなぁ♪」
line = "「これがカマトトってやつか～。どうやって子供ができるか知らないわけじゃあるまいし、あざといなぁ♪」"

[[dialogue]]
speaker = "メルエル"
# 「もう、ナターシャちゃんっ。そういうことを堂々と言うのは、はしたないんだよっ」
line = "「もう、ナターシャちゃんっ。そういうことを堂々と言うのは、はしたないんだよっ」"

[[dialogue]]
speaker = "メルエル"
# 「と、特に、そのっ。会長くん……じゃなかった、会長くんに限らず、男の子がいるところで、女の子がそういう話をするなんてっ」
line = "「と、特に、そのっ。会長くん……じゃなかった、会長くんに限らず、男の子がいるところで、女の子がそういう話をするなんてっ」"

[[dialogue]]
speaker = "ナターシャ"
# 「うんうん、あざといあざとい♪　まあでも？　恥ずかしげもなく会長さんにデレデレしてるメルエルの姿、１周回って好きになって来ちゃったよ♪」
line = "「うんうん、あざといあざとい♪　まあでも？　恥ずかしげもなく会長さんにデレデレしてるメルエルの姿、１周回って好きになって来ちゃったよ♪」"

[[dialogue]]
speaker = "メルエル"
# 「してないよ！？」
line = "「してないよ！？」"

[[dialogue]]
speaker = "メルエル"
# 「私、確かに会長くんのこと大好きだけど、人前でデレデレはしてないもんっ。節度は守ってるつもりだよっ！」
line = "「私、確かに会長くんのこと大好きだけど、人前でデレデレはしてないもんっ。節度は守ってるつもりだよっ！」"

[[dialogue]]
speaker = "ナターシャ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ナターシャ"
# 「……審議、かな？」
line = "「……審議、かな？」"

[[dialogue]]
speaker = "メルエル"
# 「なんの審議ぃ！？」
line = "「なんの審議ぃ！？」"

[[dialogue]]
speaker = "ナターシャ"
# 「被告人メルエルの罪状は後で申し渡すとして……メルエルの情けない姿がちょっと笑えて、お気に入りなのは本当」
line = "「被告人メルエルの罪状は後で申し渡すとして……メルエルの情けない姿がちょっと笑えて、お気に入りなのは本当」"

[[dialogue]]
speaker = "ナターシャ"
# 「昔から、メルエルののん気で何も知らない、平和ボケした顔が嫌いだった」
line = "「昔から、メルエルののん気で何も知らない、平和ボケした顔が嫌いだった」"

[[dialogue]]
speaker = "ナターシャ"
# 「その癖、何かあると簡単に自己犠牲に走るところが、もっと嫌いだった」
line = "「その癖、何かあると簡単に自己犠牲に走るところが、もっと嫌いだった」"

[[dialogue]]
speaker = "ナターシャ"
# 「自分の生まれも知らないくせに、王の器ってやつ？　メルエルって大切なものを守るためだったら、簡単に命をかけちゃう危ない雰囲気があった」
line = "「自分の生まれも知らないくせに、王の器ってやつ？　メルエルって大切なものを守るためだったら、簡単に命をかけちゃう危ない雰囲気があった」"

[[dialogue]]
speaker = "メルエル"
# 「ナターシャちゃん……」
line = "「ナターシャちゃん……」"

[[dialogue]]
speaker = "ナターシャ"
# 「でも、最近のメルエルは、そういう雰囲気がなくなった」
line = "「でも、最近のメルエルは、そういう雰囲気がなくなった」"

[[dialogue]]
speaker = "ナターシャ"
# 「ちゃんと色ボケした、正真正銘、脳内ピンクのアホ天使だよ」
line = "「ちゃんと色ボケした、正真正銘、脳内ピンクのアホ天使だよ」"

[[dialogue]]
speaker = "メルエル"
# 「ナターシャちゃんっ！？」
line = "「ナターシャちゃんっ！？」"

[[dialogue]]
speaker = "ナターシャ"
# 「それはきっと――会長さんが本物の魔王で、１番偉い支配者で、メルエルがあなたに従うのが最も正しいって、心の底から信じてるからだと思うんだ」
line = "「それはきっと――会長さんが本物の魔王で、１番偉い支配者で、メルエルがあなたに従うのが最も正しいって、心の底から信じてるからだと思うんだ」"

[[dialogue]]
speaker = "ナターシャ"
# 「だから、幼なじみとして、お礼を言わせて」
line = "「だから、幼なじみとして、お礼を言わせて」"

[[dialogue]]
speaker = "ナターシャ"
# 「この子を宿命から解き放ってくれて、ありがとう。あなたが代わりに背負ってくれて、ありがとう」
line = "「この子を宿命から解き放ってくれて、ありがとう。あなたが代わりに背負ってくれて、ありがとう」"

[[dialogue]]
speaker = "ナターシャ"
# 「あなたにだったら、私の大切なものを預けてもいいよ」
line = "「あなたにだったら、私の大切なものを預けてもいいよ」"

[[dialogue]]
speaker = "unk"
# 必ず、ナターシャの宝物を守ると誓うよ
line = "必ず、ナターシャの宝物を守ると誓うよ"

[[dialogue]]
speaker = "unk"
# ありがとう。
line = "ありがとう。"

[[dialogue]]
speaker = "ナターシャ"
# 「<ruby=そこ>宝物</ruby>まで言ってない」
line = "「<ruby>宝物<rt>そこ</rt></ruby>まで言ってない」"

[[dialogue]]
speaker = "ナターシャ"
# 「でも、言質は取ったからね。……じゃあ、お邪魔虫は消えるよ。お幸せにね、お２人さん」
line = "「でも、言質は取ったからね。……じゃあ、お邪魔虫は消えるよ。お幸せにね、お２人さん」"

[[dialogue]]
speaker = "メルエル"
# 「ストーーップ！！」
line = "「ストーーップ！！」"

[[dialogue]]
speaker = "メルエル"
# 「好き放題言って、『はい、さようなら』なんてダメなんだから！　さっきも言ったでしょ？　今日は３人でお買い物だよ！」
line = "「好き放題言って、『はい、さようなら』なんてダメなんだから！　さっきも言ったでしょ？　今日は３人でお買い物だよ！」"

[[dialogue]]
speaker = "ナターシャ"
# 「……あのね、メルエル」
line = "「……あのね、メルエル」"

[[dialogue]]
speaker = "ナターシャ"
# 「あんな小っ恥ずかしい話をしておいて、そのまま買い物になんて行けるわけないでしょ」
line = "「あんな小っ恥ずかしい話をしておいて、そのまま買い物になんて行けるわけないでしょ」"

[[dialogue]]
speaker = "メルエル"
# 「私は全然恥ずかしくなかったよ！　とっても嬉しかった！」
line = "「私は全然恥ずかしくなかったよ！　とっても嬉しかった！」"

[[dialogue]]
speaker = "メルエル"
# 「だから、絶対ナターシャちゃんと一緒にお出かけしたいって思ったもん！」
line = "「だから、絶対ナターシャちゃんと一緒にお出かけしたいって思ったもん！」"

[[dialogue]]
speaker = "ナターシャ"
# 「……はぁ。ほんと、メルエルは嫌味が通じないから、嫌いだよ」
line = "「……はぁ。ほんと、メルエルは嫌味が通じないから、嫌いだよ」"

[[dialogue]]
speaker = "unk"
# そんな憎まれ口とは裏腹に――
line = "そんな憎まれ口とは裏腹に――"

[[dialogue]]
speaker = "unk"
# ナターシャの口元は、どこか嬉しそうに、ふっと緩んでいるのだった。
line = "ナターシャの口元は、どこか嬉しそうに、ふっと緩んでいるのだった。"
