[[dialogue]]
speaker = "unk"
# 第２話,海の家でアルバイト（後編）,P
line = "第２話,海の家でアルバイト（後編）,P"

[[dialogue]]
speaker = "unk"
# セドナさんと俺は、海の家のアルバイトとして働くことになったのだが──
line = "セドナさんと俺は、海の家のアルバイトとして働くことになったのだが──"

[[dialogue]]
speaker = "unk"
# お客様がやってきたら？
line = "お客様がやってきたら？"

[[dialogue]]
speaker = "unk"
# それじゃあ復習しましょう
line = "それじゃあ復習しましょう"

[[dialogue]]
speaker = "セドナ"
# 「来店を歓迎し、人数を確認し、席に通し、メニューを渡す。注文が決まったら店員を呼べと伝える。合っているか？」
line = "「来店を歓迎し、人数を確認し、席に通し、メニューを渡す。注文が決まったら店員を呼べと伝える。合っているか？」"

[[dialogue]]
speaker = "unk"
# ではスマイル、お願いします
line = "ではスマイル、お願いします"

[[dialogue]]
speaker = "unk"
# はい、その通りです
line = "はい、その通りです"

[[dialogue]]
speaker = "セドナ"
# 「ふ、ふふっ……こ、こんな感じか？」
line = "「ふ、ふふっ……こ、こんな感じか？」"

[[dialogue]]
speaker = "セドナ"
# 「──まだ硬い？　これ以上、どうしろというんだ……」
line = "「──まだ硬い？　これ以上、どうしろというんだ……」"

[[dialogue]]
speaker = "unk"
# アハハって笑ってみてください
line = "アハハって笑ってみてください"

[[dialogue]]
speaker = "unk"
# もっとこう、口角を上げて
line = "もっとこう、口角を上げて"

[[dialogue]]
speaker = "セドナ"
# 「口角を……？　こ、こうか？」
line = "「口角を……？　こ、こうか？」"

[[dialogue]]
speaker = "セドナ"
# 「ア、アハハ～……」
line = "「ア、アハハ～……」"

[[dialogue]]
speaker = "セドナ"
# 「──待て。なんだか今、とても変な笑顔を浮かべた気がする。記憶から消せ。わかったか」
line = "「──待て。なんだか今、とても変な笑顔を浮かべた気がする。記憶から消せ。わかったか」"

[[dialogue]]
speaker = "セドナ"
# 「……くそ、屈辱だ。何なのだ、笑うとはなぜこんなにも難しい……！？」
line = "「……くそ、屈辱だ。何なのだ、笑うとはなぜこんなにも難しい……！？」"

[[dialogue]]
speaker = "リップル"
# 「お２人とも準備はいいデスカー？　そろそろお客さん、入ってもらいまーす♪」
line = "「お２人とも準備はいいデスカー？　そろそろお客さん、入ってもらいまーす♪」"

[[dialogue]]
speaker = "セドナ"
# 「もうそんな時間か。仕方がない……」
line = "「もうそんな時間か。仕方がない……」"

[[dialogue]]
speaker = "セドナ"
# 「お前の言う『接客スマイル』については、営業中も練習に励むことにする。色々と迷惑をかけるかもしれんが、よろしく頼むぞ」
line = "「お前の言う『接客スマイル』については、営業中も練習に励むことにする。色々と迷惑をかけるかもしれんが、よろしく頼むぞ」"

[[dialogue]]
speaker = "リップル"
# 「メイワクだなんて！　そんなこと考えず、カイチョーも魔女さんも、タノシ～気持ちを忘れないでいてくれたらＢＩＧオッケーで～す！」
line = "「メイワクだなんて！　そんなこと考えず、カイチョーも魔女さんも、タノシ～気持ちを忘れないでいてくれたらＢＩＧオッケーで～す！」"

[[dialogue]]
speaker = "リップル"
# 「それじゃあ海の家、営業開始シマ～ス！！」
line = "「それじゃあ海の家、営業開始シマ～ス！！」"

[[dialogue]]
speaker = "セドナ"
# 「よ、よく来たな……うむ、３名か。座敷が空いているからそこへ通そう。涼みながらメニューを見るといい」
line = "「よ、よく来たな……うむ、３名か。座敷が空いているからそこへ通そう。涼みながらメニューを見るといい」"

[[dialogue]]
speaker = "セドナ"
# 「注文が決まったら私を呼べ。では、ゆっくりしていけ」
line = "「注文が決まったら私を呼べ。では、ゆっくりしていけ」"

[[dialogue]]
speaker = "セドナ"
# （──ダメだな。どうしても笑顔が硬くなる。これでは客もリラックスできないのではないか？）
line = "（──ダメだな。どうしても笑顔が硬くなる。これでは客もリラックスできないのではないか？）"

[[dialogue]]
speaker = "セドナ"
# （魔王の方は……）
line = "（魔王の方は……）"

[[dialogue]]
speaker = "unk"
# いらっしゃいませ～！
line = "いらっしゃいませ～！"

[[dialogue]]
speaker = "セドナ"
# （なんだあの弾ける笑顔は……ああいうやつが上官だと、学園の部下たちも働きやすいだろうな……）
line = "（なんだあの弾ける笑顔は……ああいうやつが上官だと、学園の部下たちも働きやすいだろうな……）"

[[dialogue]]
speaker = "セドナ"
# （私の表情が硬いと、付き従う者へ不安と緊張を与えてしまうのはわかっている。だが──）
line = "（私の表情が硬いと、付き従う者へ不安と緊張を与えてしまうのはわかっている。だが──）"

[[dialogue]]
speaker = "セドナ"
# （……笑うとは、どうすればいい？　そもそも、私が最後に肩の力を抜いて笑ったのはいつだ……？）
line = "（……笑うとは、どうすればいい？　そもそも、私が最後に肩の力を抜いて笑ったのはいつだ……？）"

[[dialogue]]
speaker = "セドナ"
# （──思い出せん。リクリエを退けるため、その重責のために己を強く律するようになってから……『楽しい』と笑った記憶がない……）
line = "（──思い出せん。リクリエを退けるため、その重責のために己を強く律するようになってから……『楽しい』と笑った記憶がない……）"

[[dialogue]]
speaker = "リップル"
# 「お疲れ様デス、魔女のお姉さん♪」
line = "「お疲れ様デス、魔女のお姉さん♪」"

[[dialogue]]
speaker = "セドナ"
# 「む──どうかしたか？」
line = "「む──どうかしたか？」"

[[dialogue]]
speaker = "リップル"
# 「ハイ♪　もうすぐお昼休みなので、順番に休憩に入りマショウ！　特製焼きそば、ゴチソウするので食べてくださ～い♪」
line = "「ハイ♪　もうすぐお昼休みなので、順番に休憩に入りマショウ！　特製焼きそば、ゴチソウするので食べてくださ～い♪」"

[[dialogue]]
speaker = "リップル"
# 「って……ンー？　お姉さん、なんだかムズカシイお顔してますねー？」
line = "「って……ンー？　お姉さん、なんだかムズカシイお顔してますねー？」"

[[dialogue]]
speaker = "セドナ"
# 「すまない。私はこの場で、あまり役に立てていないようだ」
line = "「すまない。私はこの場で、あまり役に立てていないようだ」"

[[dialogue]]
speaker = "リップル"
# 「ワオ！？　そんなことないデス！　確かにニッコリ笑顔は苦手そうですガ……」
line = "「ワオ！？　そんなことないデス！　確かにニッコリ笑顔は苦手そうですガ……」"

[[dialogue]]
speaker = "リップル"
# 「チュウモンしたがってるお客さん見つけるの、カイチョーより早いですシ～。動きもテキパキしててスゴイです！」
line = "「チュウモンしたがってるお客さん見つけるの、カイチョーより早いですシ～。動きもテキパキしててスゴイです！」"

[[dialogue]]
speaker = "リップル"
# 「ワタシは、お姉さんＢＩＧ頑張ってるとオモイマス！」
line = "「ワタシは、お姉さんＢＩＧ頑張ってるとオモイマス！」"

[[dialogue]]
speaker = "セドナ"
# 「お前は笑顔を浮かべるのが得意そうだな。いったいどうすれば、そんな風に笑えるのだろうか」
line = "「お前は笑顔を浮かべるのが得意そうだな。いったいどうすれば、そんな風に笑えるのだろうか」"

[[dialogue]]
speaker = "リップル"
# 「ン～？　あんまりソウイウノ、考えたことないデスがー……」
line = "「ン～？　あんまりソウイウノ、考えたことないデスがー……」"

[[dialogue]]
speaker = "リップル"
# 「お姉さんは肩に力、イレスギな気がします。もっと、ナカヨシのお友達と過ごしてる時みたいに、リラックスで～す♪」
line = "「お姉さんは肩に力、イレスギな気がします。もっと、ナカヨシのお友達と過ごしてる時みたいに、リラックスで～す♪」"

[[dialogue]]
speaker = "リップル"
# 「マダ初日、きっとキンチョウしてるんですネ！　そんな時はオナカいっぱい食べて、オトモダチとの楽しかった時のこと思い出すとイイです♪」
line = "「マダ初日、きっとキンチョウしてるんですネ！　そんな時はオナカいっぱい食べて、オトモダチとの楽しかった時のこと思い出すとイイです♪」"

[[dialogue]]
speaker = "リップル"
# 「デハ、手が空いたら奥に来てくださ～い！」
line = "「デハ、手が空いたら奥に来てくださ～い！」"

[[dialogue]]
speaker = "セドナ"
# （友人……そう呼べる相手は、リノくらいか？）
line = "（友人……そう呼べる相手は、リノくらいか？）"

[[dialogue]]
speaker = "セドナ"
# （思えばあいつは器用だったな。いつもニコニコとよく笑っていた気がする）
line = "（思えばあいつは器用だったな。いつもニコニコとよく笑っていた気がする）"

[[dialogue]]
speaker = "セドナ"
# （まだあいつがネビュラにいた頃は、人間界の視察も２人でこなしていた。目立つ動きはするなと厳命されていたのに、よく人間にお節介を焼いて……）
line = "（まだあいつがネビュラにいた頃は、人間界の視察も２人でこなしていた。目立つ動きはするなと厳命されていたのに、よく人間にお節介を焼いて……）"

[[dialogue]]
speaker = "セドナ"
# （迷子のこどもを見かけた時もあった。リノのやつ、駆け寄って慰めて、アイスクリームを買ってやって……）
line = "（迷子のこどもを見かけた時もあった。リノのやつ、駆け寄って慰めて、アイスクリームを買ってやって……）"

[[dialogue]]
speaker = "セドナ"
# （そうだ、あの時──）
line = "（そうだ、あの時──）"

[[dialogue]]
speaker = "リノ"
# 『こ～ら、セドナ！　怖い顔をするんじゃないの！　この子が不安になっちゃうでしょ！』
line = "『こ～ら、セドナ！　怖い顔をするんじゃないの！　この子が不安になっちゃうでしょ！』"

[[dialogue]]
speaker = "リノ"
# 『私みたいにニコ～って！　ほら、ニコ～って笑うの！』
line = "『私みたいにニコ～って！　ほら、ニコ～って笑うの！』"

[[dialogue]]
speaker = "リノ"
# 『……なんだ、やればできるじゃない！　鬼教官も泣いてるこどもには勝てないってことかしら～♪』
line = "『……なんだ、やればできるじゃない！　鬼教官も泣いてるこどもには勝てないってことかしら～♪』"

[[dialogue]]
speaker = "セドナ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "セドナ"
# 「そう、だったな。私も笑ったことがあった」
line = "「そう、だったな。私も笑ったことがあった」"

[[dialogue]]
speaker = "セドナ"
# 「あの時と同じ気持ちを、思い出せば……」
line = "「あの時と同じ気持ちを、思い出せば……」"

[[dialogue]]
speaker = "小さな女の子"
# 「どこー…………？　お母さん、どこー…………？」
line = "「どこー…………？　お母さん、どこー…………？」"

[[dialogue]]
speaker = "セドナ"
# 「む──あれは……」
line = "「む──あれは……」"

[[dialogue]]
speaker = "unk"
# 接客の波が落ち着いたタイミングで、ふとセドナさんがいなくなっていたことに気づいた。どこに行ったんだろう……？
line = "接客の波が落ち着いたタイミングで、ふとセドナさんがいなくなっていたことに気づいた。どこに行ったんだろう……？"

[[dialogue]]
speaker = "unk"
# （あ、見つけた──）
line = "（あ、見つけた──）"

[[dialogue]]
speaker = "セドナ"
# 「──なんだお前、アイスを食べた途端に泣き止んだな。少しは安心できたか？」
line = "「──なんだお前、アイスを食べた途端に泣き止んだな。少しは安心できたか？」"

[[dialogue]]
speaker = "セドナ"
# 「ああ。食べ終わったら一緒に探そう。何、心配はいらん。母親はすぐに見つけてやろう」
line = "「ああ。食べ終わったら一緒に探そう。何、心配はいらん。母親はすぐに見つけてやろう」"

[[dialogue]]
speaker = "セドナ"
# 「失せ者探しのまじないを使ってやる。特別だぞ」
line = "「失せ者探しのまじないを使ってやる。特別だぞ」"

[[dialogue]]
speaker = "unk"
# セドナさん、お疲れ様です
line = "セドナさん、お疲れ様です"

[[dialogue]]
speaker = "セドナ"
# 「魔王か。すまない。見てのとおりだ、この子が母親とはぐれたらしい。リップルにしばらく抜けると伝えてくれるか」
line = "「魔王か。すまない。見てのとおりだ、この子が母親とはぐれたらしい。リップルにしばらく抜けると伝えてくれるか」"

[[dialogue]]
speaker = "セドナ"
# 「……問題ない？　そうか、助かる。できるかぎり早く帰ることを約束しよう」
line = "「……問題ない？　そうか、助かる。できるかぎり早く帰ることを約束しよう」"

[[dialogue]]
speaker = "セドナ"
# 「……なんだ、どうした？　人の顔を見て、ニヤニヤと」
line = "「……なんだ、どうした？　人の顔を見て、ニヤニヤと」"

[[dialogue]]
speaker = "unk"
# スマイル、できるじゃないですか
line = "スマイル、できるじゃないですか"

[[dialogue]]
speaker = "セドナ"
# 「…………親子そろって似たことを言う」
line = "「…………親子そろって似たことを言う」"

[[dialogue]]
speaker = "セドナ"
# 「いや──何でもないさ。ではな、行ってくる」
line = "「いや──何でもないさ。ではな、行ってくる」"

[[dialogue]]
speaker = "unk"
# そうして迷子の女の子を送り届けた後、セドナさんは海の家に帰ってきた。
line = "そうして迷子の女の子を送り届けた後、セドナさんは海の家に帰ってきた。"

[[dialogue]]
speaker = "unk"
# それ以降のセドナさんは、笑顔のコツを掴んだのか──とても自然に微笑むことができるようになるのだった。
line = "それ以降のセドナさんは、笑顔のコツを掴んだのか──とても自然に微笑むことができるようになるのだった。"
