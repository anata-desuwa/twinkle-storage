[[dialogue]]
speaker = "unk"
# 第３話,シズハと聖杯の甘酒,P
line = "第３話,シズハと聖杯の甘酒,P"

[[dialogue]]
speaker = "unk"
# ある日の放課後。俺はシズハを附属校の教室まで迎えに行っていた。
line = "ある日の放課後。俺はシズハを附属校の教室まで迎えに行っていた。"

[[dialogue]]
speaker = "シズハ"
# 「あっ！　会長、わざわざ迎えに来てくれたの？」
line = "「あっ！　会長、わざわざ迎えに来てくれたの？」"

[[dialogue]]
speaker = "サチ"
# 「お兄さん、こんにちは。これからシズハちゃんと訓練しに行くんですか？」
line = "「お兄さん、こんにちは。これからシズハちゃんと訓練しに行くんですか？」"

[[dialogue]]
speaker = "unk"
# シズハと同じクラスのサチから挨拶されて、俺は頷く。
line = "シズハと同じクラスのサチから挨拶されて、俺は頷く。"

[[dialogue]]
speaker = "シズハ"
# 「別に、アリーナで先に待っててくれたらよかったのに～♪」
line = "「別に、アリーナで先に待っててくれたらよかったのに～♪」"

[[dialogue]]
speaker = "unk"
# 彼氏として、迎えに来たかったんだ
line = "彼氏として、迎えに来たかったんだ"

[[dialogue]]
speaker = "シズハ"
# 「！　ば、バカバカ！　クラスのみんなの前でそんなストレートに言ったら恥ずかしいでしょ<emoji=heart04>　もうっ……！」
line = "「！　ば、バカバカ！　クラスのみんなの前でそんなストレートに言ったら恥ずかしいでしょ<emoji=heart04>　もうっ……！」"

[[dialogue]]
speaker = "ディーラック"
# 「と口では素直じゃないことを言いつつ、シズハちゃん、声が高くなってるのサ」
line = "「と口では素直じゃないことを言いつつ、シズハちゃん、声が高くなってるのサ」"

[[dialogue]]
speaker = "サチ"
# 「前から思ってましたけど、シズハちゃんって、照れると素直じゃなくなっちゃうタイプなんですね」
line = "「前から思ってましたけど、シズハちゃんって、照れると素直じゃなくなっちゃうタイプなんですね」"

[[dialogue]]
speaker = "シズハ"
# 「ディーちゃん、サチちゃん！？　バカバカ、そんなことないもん！　からかわないでっ」
line = "「ディーちゃん、サチちゃん！？　バカバカ、そんなことないもん！　からかわないでっ」"

[[dialogue]]
speaker = "ディーラック"
# 「あ～、はいはい。ツンデレ乙。ボクは先に部屋に帰ってゲームをしてるのサ」
line = "「あ～、はいはい。ツンデレ乙。ボクは先に部屋に帰ってゲームをしてるのサ」"

[[dialogue]]
speaker = "シズハ"
# 「ツンデレじゃないからぁ～～～！！」
line = "「ツンデレじゃないからぁ～～～！！」"

[[dialogue]]
speaker = "unk"
# それから俺たちはアリーナを経由して仮想結界へ入る。
line = "それから俺たちはアリーナを経由して仮想結界へ入る。"

[[dialogue]]
speaker = "unk"
# 今日はシズハの晴れ着の力をより引き出すために、２人で『星術羽根突き』をすることになっていた。
line = "今日はシズハの晴れ着の力をより引き出すために、２人で『星術羽根突き』をすることになっていた。"

[[dialogue]]
speaker = "シズハ"
# 「それじゃあ会長、行くわよ～！　えいっ♪」
line = "「それじゃあ会長、行くわよ～！　えいっ♪」"

[[dialogue]]
speaker = "unk"
# シズハの晴れ着フォームの能力は、聖杯から甘酒を作り出して操ることができる、というもの。
line = "シズハの晴れ着フォームの能力は、聖杯から甘酒を作り出して操ることができる、というもの。"

[[dialogue]]
speaker = "unk"
# その星術を帯びた羽根を打ち返していると、俺はだんだんと平衡感覚がおかしくなってくることに気づく。
line = "その星術を帯びた羽根を打ち返していると、俺はだんだんと平衡感覚がおかしくなってくることに気づく。"

[[dialogue]]
speaker = "シズハ"
# 「ふふっ、会長、どう？　星術が直撃しなくても、前より<b>酔い</b>が回ってくるようになったでしょ？」
line = "「ふふっ、会長、どう？　星術が直撃しなくても、前より<b>酔い</b>が回ってくるようになったでしょ？」"

[[dialogue]]
speaker = "シズハ"
# 「甘酒星術を防がれても、相手がまとっている力に溶け込ませるように星力をコントロールすることで、酔わせられるってわかってきたのよ♪」
line = "「甘酒星術を防がれても、相手がまとっている力に溶け込ませるように星力をコントロールすることで、酔わせられるってわかってきたのよ♪」"

[[dialogue]]
speaker = "unk"
# よ、酔いを防げないのは強いな……
line = "よ、酔いを防げないのは強いな……"

[[dialogue]]
speaker = "シズハ"
# 「ふふっ、そうでしょ～？　もっと使いこなして……モンスターとの戦闘に、ロストアイテムの回収にと大活躍してぇ～<emoji=heart04>」
line = "「ふふっ、そうでしょ～？　もっと使いこなして……モンスターとの戦闘に、ロストアイテムの回収にと大活躍してぇ～<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
# 「頑張ったね～って、会長にいっぱい、褒めてもらうんだからぁ～<emoji=heart04>　えへへへへへぇ♪」
line = "「頑張ったね～って、会長にいっぱい、褒めてもらうんだからぁ～<emoji=heart04>　えへへへへへぇ♪」"

[[dialogue]]
speaker = "unk"
# あれ？　シズハ……？
line = "あれ？　シズハ……？"

[[dialogue]]
speaker = "シズハ"
# 「ん～？　なぁに、会長ぉ～？」
line = "「ん～？　なぁに、会長ぉ～？」"

[[dialogue]]
speaker = "シズハ"
# 「――私が自分の能力で、酔っ払ってるんじゃらいかって～？　やだな～、そんなわけないれしょ～？　あはははっ♪」
line = "「――私が自分の能力で、酔っ払ってるんじゃらいかって～？　やだな～、そんなわけないれしょ～？　あはははっ♪」"

[[dialogue]]
speaker = "シズハ"
# 「よ～し、そろそろカッコよく、必殺スマッシュを決めちゃうわよ～♪　大きく構えて～」
line = "「よ～し、そろそろカッコよく、必殺スマッシュを決めちゃうわよ～♪　大きく構えて～」"

[[dialogue]]
speaker = "シズハ"
# 「染井流甘酒術・壱ノ型～♪　グレイルエリク～って、あららぁ～？」
line = "「染井流甘酒術・壱ノ型～♪　グレイルエリク～って、あららぁ～？」"

[[dialogue]]
speaker = "unk"
# 大げさに攻撃を放とうとした瞬間、シズハは体勢を崩して転びそうになる。
line = "大げさに攻撃を放とうとした瞬間、シズハは体勢を崩して転びそうになる。"

[[dialogue]]
speaker = "unk"
# 俺は慌てて駆け寄り、シズハの体を支えるように抱きとめた。
line = "俺は慌てて駆け寄り、シズハの体を支えるように抱きとめた。"

[[dialogue]]
speaker = "シズハ"
# 「ふわぁ～っ<emoji=heart04>　会長に助けられちゃったぁ～<emoji=heart04>」
line = "「ふわぁ～っ<emoji=heart04>　会長に助けられちゃったぁ～<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
# 「私を気遣ったり、心配してくれる時の会長の顔、すごくカッコよくて胸がキュンってしちゃう～……<emoji=heart04>」
line = "「私を気遣ったり、心配してくれる時の会長の顔、すごくカッコよくて胸がキュンってしちゃう～……<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
# 「えへへへへへぇ<emoji=heart04>　助けてくれて、ありがとぉ～<emoji=heart04>」
line = "「えへへへへへぇ<emoji=heart04>　助けてくれて、ありがとぉ～<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
# 「ん～っ<emoji=heart04>　ちゅっ……<emoji=heart04>」
line = "「ん～っ<emoji=heart04>　ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# っ！？！？
line = "っ！？！？"

[[dialogue]]
speaker = "unk"
# なんと酔っ払っているシズハから、何気なく唇にキスをされてしまった。
line = "なんと酔っ払っているシズハから、何気なく唇にキスをされてしまった。"

[[dialogue]]
speaker = "シズハ"
# 「あっ<emoji=heart04>　えへへぇ～<emoji=heart04>　会長、顔が赤くなってる～<emoji=heart04>　キスされて、照れちゃったの～？」
line = "「あっ<emoji=heart04>　えへへぇ～<emoji=heart04>　会長、顔が赤くなってる～<emoji=heart04>　キスされて、照れちゃったの～？」"

[[dialogue]]
speaker = "シズハ"
# 「でも、そういうところも可愛くて、す・き<emoji=heart04>　ん～っ<emoji=heart04>　ちゅっ<emoji=heart04>」
line = "「でも、そういうところも可愛くて、す・き<emoji=heart04>　ん～っ<emoji=heart04>　ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# シズハから今度は頬っぺたにキスをされてしまう。俺はドキドキしながらも、『酔っ払ってるからキスはダメ』と説得する。
line = "シズハから今度は頬っぺたにキスをされてしまう。俺はドキドキしながらも、『酔っ払ってるからキスはダメ』と説得する。"

[[dialogue]]
speaker = "シズハ"
# 「え～？　なんで～？　恋人なんだから、別にキスしたって問題ないでしょ～？」
line = "「え～？　なんで～？　恋人なんだから、別にキスしたって問題ないでしょ～？」"

[[dialogue]]
speaker = "シズハ"
# 「会長、好き～<emoji=heart04>　ちゅっ<emoji=heart04>　優しくて～、ちゅっ<emoji=heart04>　カッコよくて～、ちゅっ<emoji=heart04>　可愛いところも～、ちゅっ<emoji=heart04>　全部好き～<emoji=heart04>」
line = "「会長、好き～<emoji=heart04>　ちゅっ<emoji=heart04>　優しくて～、ちゅっ<emoji=heart04>　カッコよくて～、ちゅっ<emoji=heart04>　可愛いところも～、ちゅっ<emoji=heart04>　全部好き～<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
# 「ちゅっ<emoji=heart04>　ちゅ～っ<emoji=heart04>」
line = "「ちゅっ<emoji=heart04>　ちゅ～っ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# （シズハは酔っているんだ……！）
line = "（シズハは酔っているんだ……！）"

[[dialogue]]
speaker = "unk"
# （くうぅっ、抑えろ俺……！）
line = "（くうぅっ、抑えろ俺……！）"

[[dialogue]]
speaker = "unk"
# シズハから『好き』と連呼され、唇や頬にキスされまくる状況に、理性を総動員して必死に堪える俺なのだった。
line = "シズハから『好き』と連呼され、唇や頬にキスされまくる状況に、理性を総動員して必死に堪える俺なのだった。"

[[dialogue]]
speaker = "シズハ"
# 「ん……？　あれ……？　ここは、保健室……？」
line = "「ん……？　あれ……？　ここは、保健室……？」"

[[dialogue]]
speaker = "シズハ"
# 「あ……会長……。なんで私、ここに……？」
line = "「あ……会長……。なんで私、ここに……？」"

[[dialogue]]
speaker = "unk"
# えっと、晴れ着の訓練をしてて、それで……
line = "えっと、晴れ着の訓練をしてて、それで……"

[[dialogue]]
speaker = "シズハ"
# 「晴れ着の……？　そうだ、私……甘酒の能力を使って、それで……」
line = "「晴れ着の……？　そうだ、私……甘酒の能力を使って、それで……」"

[[dialogue]]
speaker = "シズハ"
# 「か、会長と……～～～っ！」
line = "「か、会長と……～～～っ！」"

[[dialogue]]
speaker = "unk"
# どうやら思い出したらしい。シズハの顔がみるみる真っ赤に染まる。
line = "どうやら思い出したらしい。シズハの顔がみるみる真っ赤に染まる。"

[[dialogue]]
speaker = "シズハ"
# 「わ、私……か、会長と、きききキス……！？」
line = "「わ、私……か、会長と、きききキス……！？」"

[[dialogue]]
speaker = "unk"
# その……大丈夫。俺は気にしてないから……
line = "その……大丈夫。俺は気にしてないから……"

[[dialogue]]
speaker = "シズハ"
# （あああああああああっ！！　私、酔っ払って会長とキスしまくっちゃったぁぁぁ～～～っ！！！）
line = "（あああああああああっ！！　私、酔っ払って会長とキスしまくっちゃったぁぁぁ～～～っ！！！）"

[[dialogue]]
speaker = "unk"
# 俺は言葉をかけながらも、頬に込み上げてくる熱はどうにもできず、その日はシズハの顔を直視することができなかったのだった。
line = "俺は言葉をかけながらも、頬に込み上げてくる熱はどうにもできず、その日はシズハの顔を直視することができなかったのだった。"
