[[dialogue]]
speaker = "unk"
# ヴィーナスはソフィアに、ウズメイアが星徒会室に相談へやってきたことを包み隠さず話した――
line = "ヴィーナスはソフィアに、ウズメイアが星徒会室に相談へやってきたことを包み隠さず話した――"

[[dialogue]]
speaker = "ソフィア"
# 「ウズメさんがそんなことを……」
line = "「ウズメさんがそんなことを……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ウズメはわざわざ他校の星徒会室まで、ソフィアのために相談しにきたのよ！　なかなかできることじゃないって、感心しちゃったわ」
line = "「ウズメはわざわざ他校の星徒会室まで、ソフィアのために相談しにきたのよ！　なかなかできることじゃないって、感心しちゃったわ」"

[[dialogue]]
speaker = "ソフィア"
# 「ええ、もちろんわかってます。……ウズメさん、本当に裏表のないヒトですから」
line = "「ええ、もちろんわかってます。……ウズメさん、本当に裏表のないヒトですから」"

[[dialogue]]
speaker = "ソフィア"
# 「でも、私が言うのもアレですが、そこまでバラしちゃってもよかったんですか……？」
line = "「でも、私が言うのもアレですが、そこまでバラしちゃってもよかったんですか……？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「いいのよ！　だって今日は、ソフィアに本心を隠すなって言いにきたんだもの」
line = "「いいのよ！　だって今日は、ソフィアに本心を隠すなって言いにきたんだもの」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そこでまず私が本心を隠してたら、話にならないでしょう？」
line = "「そこでまず私が本心を隠してたら、話にならないでしょう？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それにほら、敵を欺くにはまず味方にしろ、って言うじゃない？」
line = "「それにほら、敵を欺くにはまず味方にしろ、って言うじゃない？」"

[[dialogue]]
speaker = "ソフィア"
# 「えっと……それは微妙にことわざが間違っているような……」
line = "「えっと……それは微妙にことわざが間違っているような……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「とにかく！　ソフィア、私たちがサーシャさんを初詣に誘うから……」
line = "「とにかく！　ソフィア、私たちがサーシャさんを初詣に誘うから……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あなたはそこでサーシャさんと決闘しなさい！」
line = "「あなたはそこでサーシャさんと決闘しなさい！」"

[[dialogue]]
speaker = "ソフィア"
# 「ま、待って下さい。意味がわからないんですが、姉さんと決闘しろっていうのは、一体どういう……？」
line = "「ま、待って下さい。意味がわからないんですが、姉さんと決闘しろっていうのは、一体どういう……？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「１度思いっきりやっちゃわないから、カコンが残るのよ！　だから――」
line = "「１度思いっきりやっちゃわないから、カコンが残るのよ！　だから――」"

[[dialogue]]
speaker = "ヴィーナス"
# 「この機会に<b>口喧嘩</b>で決闘して、スッキリしちゃいなさい！　ってことよ！」
line = "「この機会に<b>口喧嘩</b>で決闘して、スッキリしちゃいなさい！　ってことよ！」"

[[dialogue]]
speaker = "ソフィア"
# 「姉さんと、口喧嘩……」
line = "「姉さんと、口喧嘩……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「サーシャさんって、頭がよくて、弁が立つから、半端に挑めば、『あらあらうふふ♪』で返されて終わりだわ」
line = "「サーシャさんって、頭がよくて、弁が立つから、半端に挑めば、『あらあらうふふ♪』で返されて終わりだわ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「だからまずは私に、あなたの思っていること全て、ぶっちゃけなさい！」
line = "「だからまずは私に、あなたの思っていること全て、ぶっちゃけなさい！」"

[[dialogue]]
speaker = "ソフィア"
# 「い、いきなりそんなことを言われましても……」
line = "「い、いきなりそんなことを言われましても……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「心の準備が必要かしら？　なら先に、進められるところからやっちゃいましょう！」
line = "「心の準備が必要かしら？　なら先に、進められるところからやっちゃいましょう！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「まずは……そうね。ソフィア、晴れ着って持ってるかしら？」
line = "「まずは……そうね。ソフィア、晴れ着って持ってるかしら？」"

[[dialogue]]
speaker = "ソフィア"
# 「え？　いや、持ってない、ですけど……」
line = "「え？　いや、持ってない、ですけど……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「なら、ちょうどいいわ！　今から一緒に行くわよ！」
line = "「なら、ちょうどいいわ！　今から一緒に行くわよ！」"

[[dialogue]]
speaker = "ソフィア"
# 「え、ちょっ……行くってどこに？」
line = "「え、ちょっ……行くってどこに？」"

[[dialogue]]
speaker = "unk"
# ヴィーナスは有無を言わさず、ソフィアの手を取ると――
line = "ヴィーナスは有無を言わさず、ソフィアの手を取ると――"

[[dialogue]]
speaker = "ヴィーナス"
# 「さあ、善は急がば回れよ！　レッツゴー！」
line = "「さあ、善は急がば回れよ！　レッツゴー！」"

[[dialogue]]
speaker = "ソフィア"
# 「えっ……えぇ～～～っ！？」
line = "「えっ……えぇ～～～っ！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「というわけで、じゃじゃ～ん♪　まずは晴れ着の準備よ！」
line = "「というわけで、じゃじゃ～ん♪　まずは晴れ着の準備よ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ほら、ソフィアも恥ずかしがってないで、こっちにきて見せなさい♪」
line = "「ほら、ソフィアも恥ずかしがってないで、こっちにきて見せなさい♪」"

[[dialogue]]
speaker = "ソフィア"
# 「うぅ……顔がホットです……」
line = "「うぅ……顔がホットです……」"

[[dialogue]]
speaker = "ソフィア"
# 「その、着物は初めてなので、ヴィーナスさんみたいに似合うかどうか……」
line = "「その、着物は初めてなので、ヴィーナスさんみたいに似合うかどうか……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「なに言ってるの、すっごく似合うじゃない！　とっても可愛いわよ！」
line = "「なに言ってるの、すっごく似合うじゃない！　とっても可愛いわよ！」"

[[dialogue]]
speaker = "ソフィア"
# 「か、かわっ……あ、ありがとう、ございます……」
line = "「か、かわっ……あ、ありがとう、ございます……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふふっ、今ならサーシャさんが、妹を可愛いって言う気持ちもわかる気がするわ♪　私もソフィアの頭、撫でたくなっちゃうもの」
line = "「ふふっ、今ならサーシャさんが、妹を可愛いって言う気持ちもわかる気がするわ♪　私もソフィアの頭、撫でたくなっちゃうもの」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ほら、なでなで～♪」
line = "「ほら、なでなで～♪」"

[[dialogue]]
speaker = "ソフィア"
# 「ん……♪　び、ヴィーナスさんまで姉さんみたいなことを……。私、子供じゃないんですから……」
line = "「ん……♪　び、ヴィーナスさんまで姉さんみたいなことを……。私、子供じゃないんですから……」"

[[dialogue]]
speaker = "unk"
# と、その時だった。
line = "と、その時だった。"

[[dialogue]]
speaker = "ヘレナ"
# 「ほほう。我が魂に導かれて散策に来てみれば、何やら楽しそうな声がするではないか」
line = "「ほほう。我が魂に導かれて散策に来てみれば、何やら楽しそうな声がするではないか」"

[[dialogue]]
speaker = "ソフィア"
# 「え、えっと……？」
line = "「え、えっと……？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あっ、ヘレナちゃんじゃない！　屋敷の外に出て来るなんて、珍しいわね」
line = "「あっ、ヘレナちゃんじゃない！　屋敷の外に出て来るなんて、珍しいわね」"

[[dialogue]]
speaker = "ヘレナ"
# 「こら、人を引き籠もりみたいに言うでない、ヴィーナス」
line = "「こら、人を引き籠もりみたいに言うでない、ヴィーナス」"

[[dialogue]]
speaker = "ヘレナ"
# 「これまでは、我が魂の囁きによって、来るべき<b>出番を待っていた</b>というだけのことだ」
line = "「これまでは、我が魂の囁きによって、来るべき<b>出番を待っていた</b>というだけのことだ」"

[[dialogue]]
speaker = "ヘレナ"
# 「そして今、どうやらその時が来たらしいのでな」
line = "「そして今、どうやらその時が来たらしいのでな」"

[[dialogue]]
speaker = "ヘレナ"
# 「さて、初対面の者もいることだし、改めて名乗るとしよう」
line = "「さて、初対面の者もいることだし、改めて名乗るとしよう」"

[[dialogue]]
speaker = "ヘレナ"
# 「立てばプリティ、座ればゴージャス――我が名は九浄家二十六代目当主・九浄ヘレナ」
line = "「立てばプリティ、座ればゴージャス――我が名は九浄家二十六代目当主・九浄ヘレナ」"

[[dialogue]]
speaker = "ヘレナ"
# 「親しみを込めて、ヘレナちゃんと呼んでもよいぞ？」
line = "「親しみを込めて、ヘレナちゃんと呼んでもよいぞ？」"

[[dialogue]]
speaker = "ソフィア"
# 「あなたが、あの九浄ヘレナ様……！　は、はじめまして。私は流星学園星徒会書記の、奏ソフィアです」
line = "「あなたが、あの九浄ヘレナ様……！　は、はじめまして。私は流星学園星徒会書記の、奏ソフィアです」"

[[dialogue]]
speaker = "ヘレナ"
# 「うむ。知っておるぞ、ソフィア。サーシャの妹――であろう？」
line = "「うむ。知っておるぞ、ソフィア。サーシャの妹――であろう？」"

[[dialogue]]
speaker = "ヘレナ"
# 「話には聞いていたが……なるほど。実にプリティーでラブリーな姿であるな。頭を撫でてもよいか？」
line = "「話には聞いていたが……なるほど。実にプリティーでラブリーな姿であるな。頭を撫でてもよいか？」"

[[dialogue]]
speaker = "ヘレナ"
# 「ほら、なでなで～♪」
line = "「ほら、なでなで～♪」"

[[dialogue]]
speaker = "ソフィア"
# （や、やっていることが親子で同じ……！）
line = "（や、やっていることが親子で同じ……！）"

[[dialogue]]
speaker = "ヘレナ"
# 「ふふっ、<b>晴れ着フォーム</b>がよく似合っておるな。我が魂の囁きに導かれて作ったが、こういうことであったか……」
line = "「ふふっ、<b>晴れ着フォーム</b>がよく似合っておるな。我が魂の囁きに導かれて作ったが、こういうことであったか……」"

[[dialogue]]
speaker = "ソフィア"
# 「晴れ着フォーム？」
line = "「晴れ着フォーム？」"

[[dialogue]]
speaker = "ヘレナ"
# 「む？　なんだヴィーナス、まだ説明しておらぬのか？」
line = "「む？　なんだヴィーナス、まだ説明しておらぬのか？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうそう、言い忘れてたけどこれ、星騎士の戦闘服なのよね！」
line = "「そうそう、言い忘れてたけどこれ、星騎士の戦闘服なのよね！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ソフィアに似合いそうだったから思わず着せちゃったけど、説明をすっかり忘れてたわ！」
line = "「ソフィアに似合いそうだったから思わず着せちゃったけど、説明をすっかり忘れてたわ！」"

[[dialogue]]
speaker = "ヘレナ"
# 「やれやれ、仕方のない奴だ。であれば――」
line = "「やれやれ、仕方のない奴だ。であれば――」"

[[dialogue]]
speaker = "ヘレナ"
# 「おしえて！　ご当主さ～～ん！！」
line = "「おしえて！　ご当主さ～～ん！！」"

[[dialogue]]
speaker = "ソフィア"
# 「い、一体何が始まるんです……？」
line = "「い、一体何が始まるんです……？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「気にしなくて大丈夫よ！　ヘレナちゃんが何か説明する時の、決まりの口上みたいなものだから！」
line = "「気にしなくて大丈夫よ！　ヘレナちゃんが何か説明する時の、決まりの口上みたいなものだから！」"

[[dialogue]]
speaker = "ソフィア"
# 「へ、へぇ……？」
line = "「へ、へぇ……？」"

[[dialogue]]
speaker = "ソフィア"
# （ち、ちょっと変わってる人ですね……ヴィーナスさんもですけど）
line = "（ち、ちょっと変わってる人ですね……ヴィーナスさんもですけど）"

[[dialogue]]
speaker = "ヘレナ"
# 「――さて、賢明な諸君なら覚えているかもしれないが、ここ最近学園では、複数の戦闘服を持つ星騎士が何人か出現している」
line = "「――さて、賢明な諸君なら覚えているかもしれないが、ここ最近学園では、複数の戦闘服を持つ星騎士が何人か出現している」"

[[dialogue]]
speaker = "ヘレナ"
# 「最初は、夏のリゾート結界にて発現した『水着フォーム』」
line = "「最初は、夏のリゾート結界にて発現した『水着フォーム』」"

[[dialogue]]
speaker = "ソフィア"
# 「あっ……フィオナ会長も手に入れた力ですね」
line = "「あっ……フィオナ会長も手に入れた力ですね」"

[[dialogue]]
speaker = "ヘレナ"
# 「その通りだ、ソフィア。私はそれを元に、新星学園が誇る２人の天才――星徒会副会長のアナと、錬金術師のアニマに、フォームチェンジ技術の確立を依頼したのだ」
line = "「その通りだ、ソフィア。私はそれを元に、新星学園が誇る２人の天才――星徒会副会長のアナと、錬金術師のアニマに、フォームチェンジ技術の確立を依頼したのだ」"

[[dialogue]]
speaker = "ヘレナ"
# 「そして先日、紅明が自力で覚醒させたというフォームチェンジのデータを入手し、初の人工戦闘服第１号の開発に成功した」
line = "「そして先日、紅明が自力で覚醒させたというフォームチェンジのデータを入手し、初の人工戦闘服第１号の開発に成功した」"

[[dialogue]]
speaker = "ヘレナ"
# 「それがヨミヨミの、ラブリーでファンシーな『クリスマスフォーム』だ」
line = "「それがヨミヨミの、ラブリーでファンシーな『クリスマスフォーム』だ」"

[[dialogue]]
speaker = "ヘレナ"
# 「これまでの傾向から、新たな戦闘服を生み出すには、何かしらの『テーマ』が必要だということが見えてきた」
line = "「これまでの傾向から、新たな戦闘服を生み出すには、何かしらの『テーマ』が必要だということが見えてきた」"

[[dialogue]]
speaker = "ヘレナ"
# 「そんな経緯から今回、テーマとして選んだのが『正月』――」
line = "「そんな経緯から今回、テーマとして選んだのが『正月』――」"

[[dialogue]]
speaker = "ヘレナ"
# 「すなわち、今２人が着ている、晴れ着フォームというわけだ」
line = "「すなわち、今２人が着ている、晴れ着フォームというわけだ」"

[[dialogue]]
speaker = "ヘレナ"
# 「ちなみに、ヨミヨミのクリスマスフォームと、今回の晴れ着フォームのデザインは、私がした」
line = "「ちなみに、ヨミヨミのクリスマスフォームと、今回の晴れ着フォームのデザインは、私がした」"

[[dialogue]]
speaker = "ヘレナ"
# 「こう見えて、服作りが趣味でな。ふふっ……プリティーでゴージャスなセンスであろう？」
line = "「こう見えて、服作りが趣味でな。ふふっ……プリティーでゴージャスなセンスであろう？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それで、服自体はこうして出来上がったんだけど、実はまだ戦闘服としての起動が上手くいっていないのよねぇ」
line = "「それで、服自体はこうして出来上がったんだけど、実はまだ戦闘服としての起動が上手くいっていないのよねぇ」"

[[dialogue]]
speaker = "ヘレナ"
# 「残念ながら、そうなのだ。試作戦闘服の被験者として、我が魂の囁きに応じて、ウズメイアを選んだのだが……」
line = "「残念ながら、そうなのだ。試作戦闘服の被験者として、我が魂の囁きに応じて、ウズメイアを選んだのだが……」"

[[dialogue]]
speaker = "ソフィア"
# 「ウズメさんも晴れ着フォームを？」
line = "「ウズメさんも晴れ着フォームを？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうなの！　ちょっと前にその試着があって、ウズメとはそこで友達になったのよ！」
line = "「そうなの！　ちょっと前にその試着があって、ウズメとはそこで友達になったのよ！」"

[[dialogue]]
speaker = "ヘレナ"
# 「うむ。しかし、どうやら彼女も未だ、戦闘服としての起動には成功していないようだな」
line = "「うむ。しかし、どうやら彼女も未だ、戦闘服としての起動には成功していないようだな」"

[[dialogue]]
speaker = "ヘレナ"
# 「やはり、その持ち主の戦闘服へ変化するには、何かきっかけとなる<b>インシデント</b>が必要なのかもしれぬ」
line = "「やはり、その持ち主の戦闘服へ変化するには、何かきっかけとなる<b>インシデント</b>が必要なのかもしれぬ」"

[[dialogue]]
speaker = "ヘレナ"
# 「――して、２人は晴れ着を試着していたようだが、もしかすると初詣へ行く予定なのか？」
line = "「――して、２人は晴れ着を試着していたようだが、もしかすると初詣へ行く予定なのか？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうなの！　姉妹の仲直りミッションでね！」
line = "「そうなの！　姉妹の仲直りミッションでね！」"

[[dialogue]]
speaker = "ソフィア"
# 「ハッ、そうでした！　あの、私はまだ、姉さんと初詣に行くと決めたわけでは……」
line = "「ハッ、そうでした！　あの、私はまだ、姉さんと初詣に行くと決めたわけでは……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あら、迷ってるの？　どうして？」
line = "「あら、迷ってるの？　どうして？」"

[[dialogue]]
speaker = "ソフィア"
# 「どうしてって……姉妹だからって、必ずしも一緒に初詣へ行く必要は、ないっていうか……」
line = "「どうしてって……姉妹だからって、必ずしも一緒に初詣へ行く必要は、ないっていうか……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ソフィアは、サーシャさんと初詣へ行くのが嫌なの？　サーシャさんはソフィアが来てくれたら喜ぶと思うわよ？」
line = "「ソフィアは、サーシャさんと初詣へ行くのが嫌なの？　サーシャさんはソフィアが来てくれたら喜ぶと思うわよ？」"

[[dialogue]]
speaker = "ソフィア"
# 「それは…………」
line = "「それは…………」"

[[dialogue]]
speaker = "unk"
# ソフィアは言いづらそうに、目線を逸らす。
line = "ソフィアは言いづらそうに、目線を逸らす。"

[[dialogue]]
speaker = "ヴィーナス"
# 「ねぇ、ソフィア」
line = "「ねぇ、ソフィア」"

[[dialogue]]
speaker = "ヴィーナス"
