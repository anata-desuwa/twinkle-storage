[[dialogue]]
speaker = "unk"
# 第１話,極星星徒会・香堂チナ,P
line = "第１話,極星星徒会・香堂チナ,P"

[[dialogue]]
speaker = "チナ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# カフェテリアのテーブルを挟んで向かい合っている相手は、<ruby=こうどう>香堂</ruby>チナ。
line = "カフェテリアのテーブルを挟んで向かい合っている相手は、<ruby>香堂<rt>こうどう</rt></ruby>チナ。"

[[dialogue]]
speaker = "unk"
# デネブにある極星学園の星徒会に所属する星騎士だ。
line = "デネブにある極星学園の星徒会に所属する星騎士だ。"

[[dialogue]]
speaker = "unk"
# チナはアルタイルを滅ぼそうと攻撃を仕掛けたが、その目論見は俺たちが阻止した。
line = "チナはアルタイルを滅ぼそうと攻撃を仕掛けたが、その目論見は俺たちが阻止した。"

[[dialogue]]
speaker = "unk"
# その後、極星学園の星徒会長・ルヴィネの正体が、リクリエの側に立つ新たな女神であることが判明。
line = "その後、極星学園の星徒会長・ルヴィネの正体が、リクリエの側に立つ新たな女神であることが判明。"

[[dialogue]]
speaker = "unk"
# ルヴィネの真意を確かめるため、チナは俺たちと共闘することになった。
line = "ルヴィネの真意を確かめるため、チナは俺たちと共闘することになった。"

[[dialogue]]
speaker = "チナ"
# 「言っておくが、お前らの仲間になったわけじゃないぞ。アタシはデネブを守るために戦うんだ」
line = "「言っておくが、お前らの仲間になったわけじゃないぞ。アタシはデネブを守るために戦うんだ」"

[[dialogue]]
speaker = "チナ"
# 「本当にデネブとアルタイルが滅ぼし合わないといけないなら、アタシはまたアルタイルと戦う。いいな？」
line = "「本当にデネブとアルタイルが滅ぼし合わないといけないなら、アタシはまたアルタイルと戦う。いいな？」"

[[dialogue]]
speaker = "unk"
# 今はそれで構わないよ
line = "今はそれで構わないよ"

[[dialogue]]
speaker = "チナ"
# 「……少しは怒るなりビビるなりしろよ。調子狂うな……」
line = "「……少しは怒るなりビビるなりしろよ。調子狂うな……」"

[[dialogue]]
speaker = "シノ"
# 「すみません、お待たせしました」
line = "「すみません、お待たせしました」"

[[dialogue]]
speaker = "チナ"
# 「アタシたちを呼んだ張本人が来たな。アタシと魔王を会わせて何の用だ？」
line = "「アタシたちを呼んだ張本人が来たな。アタシと魔王を会わせて何の用だ？」"

[[dialogue]]
speaker = "シノ"
# 「暫定的とはいえ、チナさんと共闘という形を取るのですから、親睦を深めたいと思いまして」
line = "「暫定的とはいえ、チナさんと共闘という形を取るのですから、親睦を深めたいと思いまして」"

[[dialogue]]
speaker = "シノ"
# 「そのために古来より催されてきたのが会食です。おふたりは学生ですから、せっかくなので学園のカフェテリアを選ばせてもらいました」
line = "「そのために古来より催されてきたのが会食です。おふたりは学生ですから、せっかくなので学園のカフェテリアを選ばせてもらいました」"

[[dialogue]]
speaker = "シノ"
# 「ちなみに、これからアルタイルで生活するチナさんに、施設の使い方を覚えてもらおうという意図もあります」
line = "「ちなみに、これからアルタイルで生活するチナさんに、施設の使い方を覚えてもらおうという意図もあります」"

[[dialogue]]
speaker = "チナ"
# 「余計なお世話だ。魔王と仲良しこよしになる気はないっての」
line = "「余計なお世話だ。魔王と仲良しこよしになる気はないっての」"

[[dialogue]]
speaker = "シノ"
# 「まぁまぁ、そう仰らずに。新星・極星両校の親睦の場ですから、お代は私が持ちますし、何でも頼んでいいですよ」
line = "「まぁまぁ、そう仰らずに。新星・極星両校の親睦の場ですから、お代は私が持ちますし、何でも頼んでいいですよ」"

[[dialogue]]
speaker = "チナ"
# 「んなこと言われたって、こっちのカフェテリアのメニューなんて知らねえし……」
line = "「んなこと言われたって、こっちのカフェテリアのメニューなんて知らねえし……」"

[[dialogue]]
speaker = "unk"
# 俺はウルトラグレートスペシャルパフェ！
line = "俺はウルトラグレートスペシャルパフェ！"

[[dialogue]]
speaker = "チナ"
# 「少しは遠慮しろよ！　はぁ……考えるのも面倒だし、アタシもそれでいいや」
line = "「少しは遠慮しろよ！　はぁ……考えるのも面倒だし、アタシもそれでいいや」"

[[dialogue]]
speaker = "シノ"
# 「では私もいただきますね♪」
line = "「では私もいただきますね♪」"

[[dialogue]]
speaker = "チナ"
# 「あんたも食うのかよ」
line = "「あんたも食うのかよ」"

[[dialogue]]
speaker = "unk"
# そしてテーブルの上に、３つのウルトラグレートスペシャルパフェが鎮座する。
line = "そしてテーブルの上に、３つのウルトラグレートスペシャルパフェが鎮座する。"

[[dialogue]]
speaker = "チナ"
# 「パフェ、でかっ……！？　アタシの顔よりでかいんじゃないか……？」
line = "「パフェ、でかっ……！？　アタシの顔よりでかいんじゃないか……？」"

[[dialogue]]
speaker = "シノ"
# 「おお～、これは予想以上のボリュームですね。お味は……ぱく」
line = "「おお～、これは予想以上のボリュームですね。お味は……ぱく」"

[[dialogue]]
speaker = "シノ"
# 「ん～っ♪　味もウルトラグレート級ですね♪　ほら、チナさんと会長さんも食べてください」
line = "「ん～っ♪　味もウルトラグレート級ですね♪　ほら、チナさんと会長さんも食べてください」"

[[dialogue]]
speaker = "チナ"
# 「んじゃあ……あむっ」
line = "「んじゃあ……あむっ」"

[[dialogue]]
speaker = "チナ"
# 「んん……！？　これはいけるな……！　甘酸っぱいフルーツと、クリームのコクがマッチして……アイスもミルクの味が濃い」
line = "「んん……！？　これはいけるな……！　甘酸っぱいフルーツと、クリームのコクがマッチして……アイスもミルクの味が濃い」"

[[dialogue]]
speaker = "チナ"
# 「あむ、あむ……これならパフェがでかくても、ペロッといけちゃうかもな」
line = "「あむ、あむ……これならパフェがでかくても、ペロッといけちゃうかもな」"

[[dialogue]]
speaker = "シノ"
# 「ささ、後は若い２人にお任せしますので、私のことは気にせず仲を深めてください」
line = "「ささ、後は若い２人にお任せしますので、私のことは気にせず仲を深めてください」"

[[dialogue]]
speaker = "チナ"
# 「お見合いか。ていうかあんた、アタシたちとそんな歳変わらないだろ」
line = "「お見合いか。ていうかあんた、アタシたちとそんな歳変わらないだろ」"

[[dialogue]]
speaker = "チナ"
# 「まぁ、仏頂面でパフェつつくよりは、適当に話した方がマシか。アタシに何か聞きたいこととかあるか、魔王？」
line = "「まぁ、仏頂面でパフェつつくよりは、適当に話した方がマシか。アタシに何か聞きたいこととかあるか、魔王？」"

[[dialogue]]
speaker = "unk"
# ご趣味は？
line = "ご趣味は？"

[[dialogue]]
speaker = "チナ"
# 「お見合いか！」
line = "「お見合いか！」"

[[dialogue]]
speaker = "チナ"
# 「一応答えとくけど、アタシの趣味はゲームとスケボーだ。最近それどころじゃなくて、全然滑れてないけどな」
line = "「一応答えとくけど、アタシの趣味はゲームとスケボーだ。最近それどころじゃなくて、全然滑れてないけどな」"

[[dialogue]]
speaker = "シノ"
# 「文句を言いつつも、しっかり答えるんですね」
line = "「文句を言いつつも、しっかり答えるんですね」"

[[dialogue]]
speaker = "チナ"
# 「うるさい。あんたがこの流れにしたんだろ」
line = "「うるさい。あんたがこの流れにしたんだろ」"

[[dialogue]]
speaker = "チナ"
# 「アタシは答えたんだから、そっちも教えろ、魔王」
line = "「アタシは答えたんだから、そっちも教えろ、魔王」"

[[dialogue]]
speaker = "チナ"
# 「魔王の趣味は……漫画を読むことと、時代劇を見ること……？　へぇ、意外と渋い趣味してるんだな」
line = "「魔王の趣味は……漫画を読むことと、時代劇を見ること……？　へぇ、意外と渋い趣味してるんだな」"

[[dialogue]]
speaker = "チナ"
# 「そういや、漫画や時代劇も、きっとアルタイルじゃ残ってる作品もあるんだよな」
line = "「そういや、漫画や時代劇も、きっとアルタイルじゃ残ってる作品もあるんだよな」"

[[dialogue]]
speaker = "チナ"
# 「デネブじゃ消えた作品もある。作者やスタッフがリクリエで死んだり、データが吹っ飛んだりして……いや、だからどうってわけじゃないけど」
line = "「デネブじゃ消えた作品もある。作者やスタッフがリクリエで死んだり、データが吹っ飛んだりして……いや、だからどうってわけじゃないけど」"

[[dialogue]]
speaker = "unk"
# チナから俺に聞きたいことはある？
line = "チナから俺に聞きたいことはある？"

[[dialogue]]
speaker = "チナ"
# 「別に魔王のことなんて知りたくねえし……いや、１つだけある」
line = "「別に魔王のことなんて知りたくねえし……いや、１つだけある」"

[[dialogue]]
speaker = "チナ"
# 「お前は、アルタイルもデネブも救いたいって言ってたよな。どうしてそう思った？　自分の世界が大事じゃないのか？」
line = "「お前は、アルタイルもデネブも救いたいって言ってたよな。どうしてそう思った？　自分の世界が大事じゃないのか？」"

[[dialogue]]
speaker = "unk"
# もちろん<ruby=アルタイル>自分の世界</ruby>は大事だ。だけど俺は『誰かを救う』ために星騎士になった。
line = "もちろん<ruby>自分の世界<rt>アルタイル</rt></ruby>は大事だ。だけど俺は『誰かを救う』ために星騎士になった。"

[[dialogue]]
speaker = "unk"
# 自分がモンスターにさらわれた時にある人に助けられたこと、そして彼がきっかけで星騎士を志したことをチナに話した。
line = "自分がモンスターにさらわれた時にある人に助けられたこと、そして彼がきっかけで星騎士を志したことをチナに話した。"

[[dialogue]]
speaker = "チナ"
# 「ふーん……人に助けられて星騎士に、か」
line = "「ふーん……人に助けられて星騎士に、か」"

[[dialogue]]
speaker = "チナ"
# 「まぁ、わからなくはないが……それでも自分の世界を優先するべきだろ」
line = "「まぁ、わからなくはないが……それでも自分の世界を優先するべきだろ」"

[[dialogue]]
speaker = "unk"
# それでも俺はこの道を行く
line = "それでも俺はこの道を行く"

[[dialogue]]
speaker = "チナ"
# 「……やっぱり理解できないな。そういうの、欲張りっていうんじゃないのか？」
line = "「……やっぱり理解できないな。そういうの、欲張りっていうんじゃないのか？」"

[[dialogue]]
speaker = "unk"
# そうともいう
line = "そうともいう"

[[dialogue]]
speaker = "チナ"
# 「自覚あるんじゃねーか。とんだ魔王様だ」
line = "「自覚あるんじゃねーか。とんだ魔王様だ」"

[[dialogue]]
speaker = "チナ"
# 「何度でも言うが、アタシはデネブが大事だ。どちらかを選ぶならデネブを間違いなく優先する」
line = "「何度でも言うが、アタシはデネブが大事だ。どちらかを選ぶならデネブを間違いなく優先する」"

[[dialogue]]
speaker = "unk"
# 故郷を守りたいチナの気持ちはよく知ってるよ
line = "故郷を守りたいチナの気持ちはよく知ってるよ"

[[dialogue]]
speaker = "チナ"
# 「！　わ、わかってればいいんだよ、ふんっ」
line = "「！　わ、わかってればいいんだよ、ふんっ」"

[[dialogue]]
speaker = "シノ"
# 「なるほど……会長さんは、チナさんのことは既によくご存じだったのですね。今日は余計なお世話だったかもしれません」
line = "「なるほど……会長さんは、チナさんのことは既によくご存じだったのですね。今日は余計なお世話だったかもしれません」"

[[dialogue]]
speaker = "シノ"
# 「あ、そうそう。私からチナさんに渡すものがありまして」
line = "「あ、そうそう。私からチナさんに渡すものがありまして」"

[[dialogue]]
speaker = "チナ"
# 「渡すもの……？　ていうかその大量の本は何だ？」
line = "「渡すもの……？　ていうかその大量の本は何だ？」"

[[dialogue]]
speaker = "シノ"
# 「チナさんの分の教科書です」
line = "「チナさんの分の教科書です」"

[[dialogue]]
speaker = "チナ"
# 「え」
line = "「え」"

[[dialogue]]
speaker = "シノ"
# 「チナさんは極星学園の星騎士であり、学生でもあります」
line = "「チナさんは極星学園の星騎士であり、学生でもあります」"

[[dialogue]]
speaker = "シノ"
# 「学生の仕事は青春、そして勉強。星騎士だからといって、勉学を疎かにしていいわけではありません」
line = "「学生の仕事は青春、そして勉強。星騎士だからといって、勉学を疎かにしていいわけではありません」"

[[dialogue]]
speaker = "シノ"
# 「学園長としてチナさんの身を預かるからには、新星学園のせいで勉強ができなかったとは言わせません！」
line = "「学園長としてチナさんの身を預かるからには、新星学園のせいで勉強ができなかったとは言わせません！」"

[[dialogue]]
speaker = "チナ"
# 「ええ～～～っ！？」
line = "「ええ～～～っ！？」"

[[dialogue]]
speaker = "シノ"
# 「さ、今までの分もしっかり勉強しましょうね♪」
line = "「さ、今までの分もしっかり勉強しましょうね♪」"

[[dialogue]]
speaker = "チナ"
# 「いやちょっ、待っ──どうしてこうなるんだよ～～～っ！！？」
line = "「いやちょっ、待っ──どうしてこうなるんだよ～～～っ！！？」"
