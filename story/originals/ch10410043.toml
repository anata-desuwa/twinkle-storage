[[dialogue]]
speaker = "unk"
# 第３話,可愛い水着を見てみたい,P
line = "第３話,可愛い水着を見てみたい,P"

[[dialogue]]
speaker = "unk"
# ある日、星徒会室に遊びに来ていたマインが、ソファーに寝転がってファッション雑誌を読みながら口を開く。
line = "ある日、星徒会室に遊びに来ていたマインが、ソファーに寝転がってファッション雑誌を読みながら口を開く。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ねぇ、会長～」
line = "「ねぇ、会長～」"

[[dialogue]]
speaker = "unk"
# なんだ、マイン？
line = "なんだ、マイン？"

[[dialogue]]
speaker = "unk"
# 会長席に座って休憩していた俺は、まったりと緑茶を飲みながら聞き返す。
line = "会長席に座って休憩していた俺は、まったりと緑茶を飲みながら聞き返す。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「夏が来てから気になってたんだけど――」
line = "「夏が来てから気になってたんだけど――」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「会長って、女の子用の水着とか持ってたりしないの？」
line = "「会長って、女の子用の水着とか持ってたりしないの？」"

[[dialogue]]
speaker = "unk"
# 俺は思わず、緑茶を噴き出してしまった。
line = "俺は思わず、緑茶を噴き出してしまった。"

[[dialogue]]
speaker = "unk"
# 持ってないよ！？
line = "持ってないよ！？"

[[dialogue]]
speaker = "ネーゼマイン"
# 「えっ、そうなんだ？　意外～」
line = "「えっ、そうなんだ？　意外～」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「会長の女の子フォームなら、水着絶対似合いそうなのに～」
line = "「会長の女の子フォームなら、水着絶対似合いそうなのに～」"

[[dialogue]]
speaker = "unk"
# アニマ先輩の薬の実験等で女体に変身すること自体は、不本意ながら慣れてしまっている。しかし――
line = "アニマ先輩の薬の実験等で女体に変身すること自体は、不本意ながら慣れてしまっている。しかし――"

[[dialogue]]
speaker = "unk"
# 女体で水着姿にって……恥ずかしいじゃないか！？
line = "女体で水着姿にって……恥ずかしいじゃないか！？"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ぷっ……きゃはっ☆　きゃははははははっ！　今更！？」
line = "「ぷっ……きゃはっ☆　きゃははははははっ！　今更！？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「――水着は露出度が高いから？　きゃははははははっ！　やばっ、ちょっと待って……本当にツボった……！　お腹痛い……☆」
line = "「――水着は露出度が高いから？　きゃははははははっ！　やばっ、ちょっと待って……本当にツボった……！　お腹痛い……☆」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「くふっ……ふふふっ♪　そんなの聞くと、ますます見たくなっちゃうじゃ～ん♪」
line = "「くふっ……ふふふっ♪　そんなの聞くと、ますます見たくなっちゃうじゃ～ん♪」"

[[dialogue]]
speaker = "unk"
# 絶対に着ないよ！？
line = "絶対に着ないよ！？"

[[dialogue]]
speaker = "ネーゼマイン"
# 「え～？　いいじゃ～ん☆」
line = "「え～？　いいじゃ～ん☆」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「他の誰にも見せたりしないから、恋人のプレイとして、ね？」
line = "「他の誰にも見せたりしないから、恋人のプレイとして、ね？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「というわけで、今日は<b>女の子</b>になった会長と、水着を買いに来ちゃいました～♪」
line = "「というわけで、今日は<b>女の子</b>になった会長と、水着を買いに来ちゃいました～♪」"

[[dialogue]]
speaker = "unk"
# 結局、俺はマインの交渉術に負けてしまい、女子に性転換した状態で街にやって来た――のだが。
line = "結局、俺はマインの交渉術に負けてしまい、女子に性転換した状態で街にやって来た――のだが。"

[[dialogue]]
speaker = "リノ"
# 「わ～♪　ぱちぱちぱちぱち～♪」
line = "「わ～♪　ぱちぱちぱちぱち～♪」"

[[dialogue]]
speaker = "unk"
# なんで母さんもいるの！？
line = "なんで母さんもいるの！？"

[[dialogue]]
speaker = "リノ"
# 「ふふっ、だって、可愛い息子が女の子用の水着を買うとか、面白過ぎるじゃな～い♪」
line = "「ふふっ、だって、可愛い息子が女の子用の水着を買うとか、面白過ぎるじゃな～い♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「きゃはははっ☆　ですよね～！」
line = "「きゃはははっ☆　ですよね～！」"

[[dialogue]]
speaker = "unk"
# くっ、そうだ、マインには前科があるんだった……！
line = "くっ、そうだ、マインには前科があるんだった……！"

[[dialogue]]
speaker = "unk"
# 以前、アステラカジノの事件でバニー服に変身できるようになった時、内緒と言ったのに、トワ先生やヒトリにバラされてしまったことがあった。
line = "以前、アステラカジノの事件でバニー服に変身できるようになった時、内緒と言ったのに、トワ先生やヒトリにバラされてしまったことがあった。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ごめ～ん、リノさんに話した方が面白そうかもって、どうしても悪戯心を抑えきれなくて～☆」
line = "「ごめ～ん、リノさんに話した方が面白そうかもって、どうしても悪戯心を抑えきれなくて～☆」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「でも、安心して！　リノさんには私が責任を持って、ちゃんとネゴシエーションしてあるから♪」
line = "「でも、安心して！　リノさんには私が責任を持って、ちゃんとネゴシエーションしてあるから♪」"

[[dialogue]]
speaker = "リノ"
# 「大丈夫よ、クロト！　息子がどんな趣味でも、母さんは受け入れるわ♪」
line = "「大丈夫よ、クロト！　息子がどんな趣味でも、母さんは受け入れるわ♪」"

[[dialogue]]
speaker = "unk"
# いや、なんか勘違いしてない！？
line = "いや、なんか勘違いしてない！？"

[[dialogue]]
speaker = "ネーゼマイン"
# 「それじゃあ、会長に似合う水着を探しに、レディ～」
line = "「それじゃあ、会長に似合う水着を探しに、レディ～」"

[[dialogue]]
speaker = "リノ"
# 「ゴ～☆」
line = "「ゴ～☆」"

[[dialogue]]
speaker = "unk"
# すっかり息の合うようになった２人に背中を押され、俺は水着ショップへと向かうことになってしまうのだった――
line = "すっかり息の合うようになった２人に背中を押され、俺は水着ショップへと向かうことになってしまうのだった――"

[[dialogue]]
speaker = "unk"
# そして……買い物した後、リゾート結界にて。
line = "そして……買い物した後、リゾート結界にて。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「さあ♪　それでは、私とリノさんで選んだ会長の水着姿を、海で改めてお披露目で～す♪」
line = "「さあ♪　それでは、私とリノさんで選んだ会長の水着姿を、海で改めてお披露目で～す♪」"

[[dialogue]]
speaker = "unk"
# 俺が顔を猛烈に熱くしながら、女体化＆水着姿で海の家から出て来ると――
line = "俺が顔を猛烈に熱くしながら、女体化＆水着姿で海の家から出て来ると――"

[[dialogue]]
speaker = "リノ"
# 「きゃ～っ♪　とっても可愛いわ～、クロト～♪」
line = "「きゃ～っ♪　とっても可愛いわ～、クロト～♪」"

[[dialogue]]
speaker = "unk"
# はぅ……また１つ、女の子の階段を登ってしまった……
line = "はぅ……また１つ、女の子の階段を登ってしまった……"

[[dialogue]]
speaker = "ネーゼマイン"
# 「きゃはははははっ☆　大丈夫<emoji=heart04>」
line = "「きゃはははははっ☆　大丈夫<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 後ろから俺の両肩に手を置いたマインは、そっと耳元に唇を寄せて来て。
line = "後ろから俺の両肩に手を置いたマインは、そっと耳元に唇を寄せて来て。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「会長が女の子になって恥ずかしがってるの見ても……私、ちゃんとゾクゾクして、興奮しちゃってるから<emoji=heart04>」
line = "「会長が女の子になって恥ずかしがってるの見ても……私、ちゃんとゾクゾクして、興奮しちゃってるから<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 母さんに聞こえないくらいの声で囁くマインに、俺はドキッとさせられてしまうのだった――
line = "母さんに聞こえないくらいの声で囁くマインに、俺はドキッとさせられてしまうのだった――"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひ<emoji=heart04>」
line = "「にひひ<emoji=heart04>」"
