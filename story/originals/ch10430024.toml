[[dialogue]]
speaker = "unk"
# 第４話,サチの恋人セーフライン,P
line = "第４話,サチの恋人セーフライン,P"

[[dialogue]]
speaker = "unk"
# とある休日、サチが俺の家へ遊びに来ていた時のこと――
line = "とある休日、サチが俺の家へ遊びに来ていた時のこと――"

[[dialogue]]
speaker = "サチ"
# 「お兄さん、久しぶりに今日はゆっくりできますね」
line = "「お兄さん、久しぶりに今日はゆっくりできますね」"

[[dialogue]]
speaker = "サチ"
# 「最近はお互い忙しくて、なかなか落ち着いて２人きりになれてませんでしたから」
line = "「最近はお互い忙しくて、なかなか落ち着いて２人きりになれてませんでしたから」"

[[dialogue]]
speaker = "サチ"
# 「え？　――面白そうな映画をピックアップしておいた？」
line = "「え？　――面白そうな映画をピックアップしておいた？」"

[[dialogue]]
speaker = "サチ"
# 「あ～、映画もいいですけど……その……」
line = "「あ～、映画もいいですけど……その……」"

[[dialogue]]
speaker = "unk"
# サチはそわそわした様子で、上目遣いをしながら――
line = "サチはそわそわした様子で、上目遣いをしながら――"

[[dialogue]]
speaker = "サチ"
# 「それよりも……お兄さんと、き、キスがしたい、です……」
line = "「それよりも……お兄さんと、き、キスがしたい、です……」"

[[dialogue]]
speaker = "unk"
# えっ！？
line = "えっ！？"

[[dialogue]]
speaker = "unk"
# 俺は驚いて、ポロッとテレビのリモコンを落としてしまう。
line = "俺は驚いて、ポロッとテレビのリモコンを落としてしまう。"

[[dialogue]]
speaker = "サチ"
# 「ごめんなさい。エッチなお願いだっていうのは、わかってるんです。でも……」
line = "「ごめんなさい。エッチなお願いだっていうのは、わかってるんです。でも……」"

[[dialogue]]
speaker = "サチ"
# 「ここのところ、ずっとできていなかったので……」
line = "「ここのところ、ずっとできていなかったので……」"

[[dialogue]]
speaker = "unk"
# ――サチは周りの人目を気にするタイプなので、学園ではあまりキスをしない。忙しい時だと、特にだ。
line = "――サチは周りの人目を気にするタイプなので、学園ではあまりキスをしない。忙しい時だと、特にだ。"

[[dialogue]]
speaker = "unk"
# だから、ここ１週間くらいは、ずっとキスができていなかった。
line = "だから、ここ１週間くらいは、ずっとキスができていなかった。"

[[dialogue]]
speaker = "サチ"
# 「ダメ……ですか？」
line = "「ダメ……ですか？」"

[[dialogue]]
speaker = "unk"
# 普段真面目な彼女からそんな風に言われて、ダメなんて思うわけがない。
line = "普段真面目な彼女からそんな風に言われて、ダメなんて思うわけがない。"

[[dialogue]]
speaker = "unk"
# サチ、おいで
line = "サチ、おいで"

[[dialogue]]
speaker = "サチ"
# 「あ……はい<emoji=heart04>」
line = "「あ……はい<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
# 「お兄さん……<emoji=heart04>」
line = "「お兄さん……<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
# 「ん……<emoji=heart04>　ちゅっ<emoji=heart04>」
line = "「ん……<emoji=heart04>　ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
# 「ふぅ……はあぁ……<emoji=heart04>」
line = "「ふぅ……はあぁ……<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
# 「お兄さんと久しぶりのキス、頭の中が幸せでいっぱいになっちゃいます……<emoji=heart04>」
line = "「お兄さんと久しぶりのキス、頭の中が幸せでいっぱいになっちゃいます……<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
# 「――したかったなら、もっと早く言ってくれたらよかったのに……ですか？」
line = "「――したかったなら、もっと早く言ってくれたらよかったのに……ですか？」"

[[dialogue]]
speaker = "サチ"
# 「ごめんなさい。お兄さんも仕事で忙しいのにワガママ言うのは、なんだか恥ずかしいことみたいに思えて……言い出せなくて……」
line = "「ごめんなさい。お兄さんも仕事で忙しいのにワガママ言うのは、なんだか恥ずかしいことみたいに思えて……言い出せなくて……」"

[[dialogue]]
speaker = "unk"
# 俺も気づかなくて、ごめん
line = "俺も気づかなくて、ごめん"

[[dialogue]]
speaker = "サチ"
# 「――今度はお兄さんも、したい時は言うようにする……？」
line = "「――今度はお兄さんも、したい時は言うようにする……？」"

[[dialogue]]
speaker = "サチ"
# 「は、はい……<emoji=heart04>　恋人同士ですから、お互い欲求不満は解消し合わないとですよね<emoji=heart04>」
line = "「は、はい……<emoji=heart04>　恋人同士ですから、お互い欲求不満は解消し合わないとですよね<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
# 「あっ、でも……だからと言って、エッチなことにのめり込みすぎるのは、禁止ですからね<emoji=heart04>」
line = "「あっ、でも……だからと言って、エッチなことにのめり込みすぎるのは、禁止ですからね<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# なかなかラインを見極めるのが難しいな……
line = "なかなかラインを見極めるのが難しいな……"

[[dialogue]]
speaker = "サチ"
# 「――どこまでだったら、してもセーフなのか……？　そ、そこは、ちゃんと１つずつ相談しないと……」
line = "「――どこまでだったら、してもセーフなのか……？　そ、そこは、ちゃんと１つずつ相談しないと……」"

[[dialogue]]
speaker = "サチ"
# 「人前で頭を撫でる！？　あ、アウトです……！」
line = "「人前で頭を撫でる！？　あ、アウトです……！」"

[[dialogue]]
speaker = "サチ"
# 「だ、だって……お兄さんにされたら、その……気持ち良く、なっちゃいますから……」
line = "「だ、だって……お兄さんにされたら、その……気持ち良く、なっちゃいますから……」"

[[dialogue]]
speaker = "サチ"
# 「世の恋人は、それくらいは外でしてるんですか……？」
line = "「世の恋人は、それくらいは外でしてるんですか……？」"

[[dialogue]]
speaker = "サチ"
# 「む、むぅ。だったら…………ギリギリ、セーフでも……」
line = "「む、むぅ。だったら…………ギリギリ、セーフでも……」"

[[dialogue]]
speaker = "サチ"
# 「人前で握った手を恋人繋ぎにするぅ！！？　それはアウトです！！！」
line = "「人前で握った手を恋人繋ぎにするぅ！！？　それはアウトです！！！」"

[[dialogue]]
speaker = "サチ"
# 「遊園地の時も言いましたけど、なんか……こっそりエッチしてるみたいで、すごく恥ずかしいじゃないですか……！」
line = "「遊園地の時も言いましたけど、なんか……こっそりエッチしてるみたいで、すごく恥ずかしいじゃないですか……！」"

[[dialogue]]
speaker = "サチ"
# 「恋人だからこそ、デートの時はしてみたいって……」
line = "「恋人だからこそ、デートの時はしてみたいって……」"

[[dialogue]]
speaker = "サチ"
# 「…………お、お兄さんがどうしてもって言うなら、ギリギリのギリギリで、セーフってことにしても……」
line = "「…………お、お兄さんがどうしてもって言うなら、ギリギリのギリギリで、セーフってことにしても……」"

[[dialogue]]
speaker = "サチ"
# 「は、ハグはもう、完全にアウトです！　人前で抱き合うとか、エッチすぎます！」
line = "「は、ハグはもう、完全にアウトです！　人前で抱き合うとか、エッチすぎます！」"

[[dialogue]]
speaker = "サチ"
# 「それに……お兄さんの体温を感じたら、私も、そういう気分になっちゃいますし……」
line = "「それに……お兄さんの体温を感じたら、私も、そういう気分になっちゃいますし……」"

[[dialogue]]
speaker = "サチ"
# 「――キスも絶対にアウトですから！　今まで言ったどれよりも気持ち良くなっちゃいます！　どう考えてもエッチです！」
line = "「――キスも絶対にアウトですから！　今まで言ったどれよりも気持ち良くなっちゃいます！　どう考えてもエッチです！」"

[[dialogue]]
speaker = "unk"
# じゃあ、もうしないほうがいい？
line = "じゃあ、もうしないほうがいい？"

[[dialogue]]
speaker = "unk"
# 俺がそう言うと、彼女は照れたように顔を赤くしてから、首をふるふると横に振る。
line = "俺がそう言うと、彼女は照れたように顔を赤くしてから、首をふるふると横に振る。"

[[dialogue]]
speaker = "サチ"
# 「ひ、人前でやったらアウトなだけです。今は……２人きりですから」
line = "「ひ、人前でやったらアウトなだけです。今は……２人きりですから」"

[[dialogue]]
speaker = "サチ"
# 「もっと、して欲しいです……<emoji=heart04>」
line = "「もっと、して欲しいです……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 可愛くおねだりする彼女を、俺は堪らず抱き寄せる。
line = "可愛くおねだりする彼女を、俺は堪らず抱き寄せる。"

[[dialogue]]
speaker = "サチ"
# 「あ……<emoji=heart04>　お兄さん<emoji=heart04>」
line = "「あ……<emoji=heart04>　お兄さん<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# それから片手を恋人繋ぎにして、もう片方の手で頭を撫でる。
line = "それから片手を恋人繋ぎにして、もう片方の手で頭を撫でる。"

[[dialogue]]
speaker = "サチ"
# 「ん……<emoji=heart04>　はあぁ……<emoji=heart04>　ふうぅ……<emoji=heart04>」
line = "「ん……<emoji=heart04>　はあぁ……<emoji=heart04>　ふうぅ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そして、熱い吐息を漏らす唇に、顔を寄せて――
line = "そして、熱い吐息を漏らす唇に、顔を寄せて――"

[[dialogue]]
speaker = "サチ"
# 「あっ……今、ダメ……<emoji=heart04>　キスしちゃ<emoji=heart04>　――んむっ<emoji=heart04>」
line = "「あっ……今、ダメ……<emoji=heart04>　キスしちゃ<emoji=heart04>　――んむっ<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
# 「ちゅっ<emoji=heart04>」
line = "「ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
# 「んはぁっ……<emoji=heart04>　はあぁ……<emoji=heart04>　ダメです、お兄さん……<emoji=heart04>　そんな１度に全部されたら……<emoji=heart04>」
line = "「んはぁっ……<emoji=heart04>　はあぁ……<emoji=heart04>　ダメです、お兄さん……<emoji=heart04>　そんな１度に全部されたら……<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
# 「気持ち良く、なり過ぎちゃいます……<emoji=heart04>　ふうぅ……<emoji=heart04>」
line = "「気持ち良く、なり過ぎちゃいます……<emoji=heart04>　ふうぅ……<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
# 「え？　――何されても気持ち良くなっちゃうなんてエッチ……？　ち、違います……<emoji=heart04>」
line = "「え？　――何されても気持ち良くなっちゃうなんてエッチ……？　ち、違います……<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
# 「別になんでも気持ちいいってわけじゃなくて……好きな相手と――お兄さんとするから、気持ち良くなっちゃうんです<emoji=heart04>」
line = "「別になんでも気持ちいいってわけじゃなくて……好きな相手と――お兄さんとするから、気持ち良くなっちゃうんです<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# なら、別にアウトじゃないんだ？
line = "なら、別にアウトじゃないんだ？"

[[dialogue]]
speaker = "サチ"
# 「……今日は……久しぶりだから、今のところセーフです……<emoji=heart04>」
line = "「……今日は……久しぶりだから、今のところセーフです……<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
# 「でも……ギリギリですから、今日だけですからね……お兄さん<emoji=heart04>」
line = "「でも……ギリギリですから、今日だけですからね……お兄さん<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
# 「ん……ちゅっ<emoji=heart04>」
line = "「ん……ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 言いつつも、サチの方から唇が触れてきて、またキスをする。
line = "言いつつも、サチの方から唇が触れてきて、またキスをする。"

[[dialogue]]
speaker = "サチ"
# 「ちゅっ……<emoji=heart04>　ちゅっ<emoji=heart04>」
line = "「ちゅっ……<emoji=heart04>　ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# それからも、頭を撫でたり、抱き合ったりしながら、たっぷりと甘い時間を過ごす俺たちなのであった――
line = "それからも、頭を撫でたり、抱き合ったりしながら、たっぷりと甘い時間を過ごす俺たちなのであった――"
