[[dialogue]]
speaker = "unk"
# 第４話,２人の将来設計,P
line = "第４話,２人の将来設計,P"

[[dialogue]]
speaker = "アナ"
# 「城を作りましょう……！」
line = "「城を作りましょう……！」"

[[dialogue]]
speaker = "unk"
# 突然どうした！？
line = "突然どうした！？"

[[dialogue]]
speaker = "unk"
# ある日、アナと再びリゾート結界へ遊びに来たところで、彼女が謎の提案をし始めていた。
line = "ある日、アナと再びリゾート結界へ遊びに来たところで、彼女が謎の提案をし始めていた。"

[[dialogue]]
speaker = "アナ"
# 「すみません。言葉が足りませんでした」
line = "「すみません。言葉が足りませんでした」"

[[dialogue]]
speaker = "アナ"
# 「つまりは、砂遊びで城を作ろうという意味です」
line = "「つまりは、砂遊びで城を作ろうという意味です」"

[[dialogue]]
speaker = "アナ"
# 「これまで会長とリゾート結界へデートに来た際、水遊びはよくしていました。しかし、まだ砂遊びはしたことがなかったので」
line = "「これまで会長とリゾート結界へデートに来た際、水遊びはよくしていました。しかし、まだ砂遊びはしたことがなかったので」"

[[dialogue]]
speaker = "アナ"
# 「――どんな城を作ろうか、ですか？」
line = "「――どんな城を作ろうか、ですか？」"

[[dialogue]]
speaker = "アナ"
# 「ノープロブレム。事前に設計図を描いて、準備万端です」
line = "「ノープロブレム。事前に設計図を描いて、準備万端です」"

[[dialogue]]
speaker = "unk"
# 砂のお城に設計図！？
line = "砂のお城に設計図！？"

[[dialogue]]
speaker = "アナ"
# 「何事も準備が大事。とはいえ、これが正解というわけではありません。会長も意見があれば言って欲しい」
line = "「何事も準備が大事。とはいえ、これが正解というわけではありません。会長も意見があれば言って欲しい」"

[[dialogue]]
speaker = "アナ"
# 「せっかく２人で遊ぶわけですし。……それにこれは、恋愛の勉強としてお互いの好みを知るいい機会でもあります」
line = "「せっかく２人で遊ぶわけですし。……それにこれは、恋愛の勉強としてお互いの好みを知るいい機会でもあります」"

[[dialogue]]
speaker = "アナ"
# 「――ベリーグッド。これで、砂の城完成ですね」
line = "「――ベリーグッド。これで、砂の城完成ですね」"

[[dialogue]]
speaker = "アナ"
# 「実際の機能性を考えた、リアル志向の良い城になった気がします」
line = "「実際の機能性を考えた、リアル志向の良い城になった気がします」"

[[dialogue]]
speaker = "アナ"
# 「今日遊んだ思い出として、ＤＩＳＣで写真を撮っておきましょう」
line = "「今日遊んだ思い出として、ＤＩＳＣで写真を撮っておきましょう」"

[[dialogue]]
speaker = "アナ"
# 「ふふ……私と会長の共同作業♪　恋愛の記録フォルダに、ちゃんと保存しておかなくては……」
line = "「ふふ……私と会長の共同作業♪　恋愛の記録フォルダに、ちゃんと保存しておかなくては……」"

[[dialogue]]
speaker = "アナ"
# 「――あ、いえ、何でもありません。それより、次は横に砂の家を作って行きましょう」
line = "「――あ、いえ、何でもありません。それより、次は横に砂の家を作って行きましょう」"

[[dialogue]]
speaker = "unk"
# 何の家……？
line = "何の家……？"

[[dialogue]]
speaker = "アナ"
# 「私たちの住む家です。実際に２人で住むとしたらどんな家がいいか考えるのも、恋愛の勉強になります」
line = "「私たちの住む家です。実際に２人で住むとしたらどんな家がいいか考えるのも、恋愛の勉強になります」"

[[dialogue]]
speaker = "アナ"
# 「もちろん、家の設計図も準備済み。それに加えて、更に――」
line = "「もちろん、家の設計図も準備済み。それに加えて、更に――」"

[[dialogue]]
speaker = "アナ"
# 「現時点での、将来について考えていることも書き出して来ました」
line = "「現時点での、将来について考えていることも書き出して来ました」"

[[dialogue]]
speaker = "unk"
# まさかの将来設計まで！？
line = "まさかの将来設計まで！？"

[[dialogue]]
speaker = "アナ"
# 「ここに会長の思い描く将来の予定を加えて、一緒に住む家を考える」
line = "「ここに会長の思い描く将来の予定を加えて、一緒に住む家を考える」"

[[dialogue]]
speaker = "アナ"
# 「……って、会長？　何をそんなに動揺しているのですか？」
line = "「……って、会長？　何をそんなに動揺しているのですか？」"

[[dialogue]]
speaker = "アナ"
# 「――私が会長と同棲して、将来的に結婚しても構わない、という口ぶりだから？」
line = "「――私が会長と同棲して、将来的に結婚しても構わない、という口ぶりだから？」"

[[dialogue]]
speaker = "アナ"
# 「あ……い、言われてみれば……」
line = "「あ……い、言われてみれば……」"

[[dialogue]]
speaker = "アナ"
# 「その……自分では、そうなるのが自然だと思っていたので、伝える際の感情の機微は、計算外でした……」
line = "「その……自分では、そうなるのが自然だと思っていたので、伝える際の感情の機微は、計算外でした……」"

[[dialogue]]
speaker = "アナ"
# 「よく考えたら、これは色々……は、恥ずかしい……っ」
line = "「よく考えたら、これは色々……は、恥ずかしい……っ」"

[[dialogue]]
speaker = "アナ"
# 「か、会長は――」
line = "「か、会長は――」"

[[dialogue]]
speaker = "アナ"
# 「私とそういう将来は……考えて、いませんでしたか？」
line = "「私とそういう将来は……考えて、いませんでしたか？」"

[[dialogue]]
speaker = "unk"
# そんなことない。アナと結婚したい
line = "そんなことない。アナと結婚したい"

[[dialogue]]
speaker = "アナ"
# 「……！　ん……ふふっ<emoji=heart04>」
line = "「……！　ん……ふふっ<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
# 「何だか……プロポーズみたいに、なってしまいましたね……」
line = "「何だか……プロポーズみたいに、なってしまいましたね……」"

[[dialogue]]
speaker = "アナ"
# 「会長。いつもの場所――膝の上に座ってもいいですか？」
line = "「会長。いつもの場所――膝の上に座ってもいいですか？」"

[[dialogue]]
speaker = "unk"
# もちろん
line = "もちろん"

[[dialogue]]
speaker = "アナ"
# 「はい……<emoji=heart04>」
line = "「はい……<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
# 「ん……♪　いつもは落ち着く場所なのに、今日はちょっと、ドキドキします……<emoji=heart04>」
line = "「ん……♪　いつもは落ち着く場所なのに、今日はちょっと、ドキドキします……<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
# 「それじゃあ……改めて、砂の家を一緒に作って行きましょう。会長は将来、どんな風に考えてますか？」
line = "「それじゃあ……改めて、砂の家を一緒に作って行きましょう。会長は将来、どんな風に考えてますか？」"

[[dialogue]]
speaker = "アナ"
# 「――学園を卒業したら結婚？　な、なるほど……考えておきます……」
line = "「――学園を卒業したら結婚？　な、なるほど……考えておきます……」"

[[dialogue]]
speaker = "アナ"
# 「結婚して住む家は……なるべく大きい方がいいかと。その……大家族になっても、困りませんし……」
line = "「結婚して住む家は……なるべく大きい方がいいかと。その……大家族になっても、困りませんし……」"

[[dialogue]]
speaker = "アナ"
# 「ちなみに、会長は子供……何人くらい欲しい、ですか？」
line = "「ちなみに、会長は子供……何人くらい欲しい、ですか？」"

[[dialogue]]
speaker = "アナ"
# 「できれば私は……いっぱい欲しいです<emoji=heart04>」
line = "「できれば私は……いっぱい欲しいです<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
# 「んっ<emoji=heart04>　会長、そんなに抱き着いたら、砂の家が崩れちゃいます……」
line = "「んっ<emoji=heart04>　会長、そんなに抱き着いたら、砂の家が崩れちゃいます……」"

[[dialogue]]
speaker = "アナ"
# 「本格的にイチャイチャするのは……私たちの家を作ってからにしましょう……？」
line = "「本格的にイチャイチャするのは……私たちの家を作ってからにしましょう……？」"

[[dialogue]]
speaker = "unk"
# そんなことを言いつつも、自分もすりすりと胸板に頬擦りしてくるアナと、夫婦のようにイチャイチャし続けてしまうのだった――
line = "そんなことを言いつつも、自分もすりすりと胸板に頬擦りしてくるアナと、夫婦のようにイチャイチャし続けてしまうのだった――"
