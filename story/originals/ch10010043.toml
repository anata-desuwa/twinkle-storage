[[dialogue]]
speaker = "unk"
# 第３話,フィオナの初夢,P
line = "第３話,フィオナの初夢,P"

[[dialogue]]
speaker = "unk"
# 守護天使オオヒメの解放から少し経った朝。おせちにお雑煮と、２人で正月らしい朝食を満喫していた。
line = "守護天使オオヒメの解放から少し経った朝。おせちにお雑煮と、２人で正月らしい朝食を満喫していた。"

[[dialogue]]
speaker = "フィオナ"
# 「おせちはどれもキリカに教わって作りました。特に伊達巻は自信作です」
line = "「おせちはどれもキリカに教わって作りました。特に伊達巻は自信作です」"

[[dialogue]]
speaker = "unk"
# 以前、卵焼きマイスターとなった彼女の自信作とあっては、期待せざるを得ない。ひとつ口に運ぶ。
line = "以前、卵焼きマイスターとなった彼女の自信作とあっては、期待せざるを得ない。ひとつ口に運ぶ。"

[[dialogue]]
speaker = "unk"
# とてつもなくおいしい！
line = "とてつもなくおいしい！"

[[dialogue]]
speaker = "フィオナ"
# 「お口に合ったようで何よりです。……今まで食べた中で一番おいしい、ですか？　それはさすがに言い過ぎなのでは……？」
line = "「お口に合ったようで何よりです。……今まで食べた中で一番おいしい、ですか？　それはさすがに言い過ぎなのでは……？」"

[[dialogue]]
speaker = "フィオナ"
# 「ふわふわ食感と出汁の旨みが合わさって……まさに完璧な伊達巻？　も、もう、お上手なんですから……」
line = "「ふわふわ食感と出汁の旨みが合わさって……まさに完璧な伊達巻？　も、もう、お上手なんですから……」"

[[dialogue]]
speaker = "フィオナ"
# 「では、私も緋宮会長のお雑煮をいただきますね」
line = "「では、私も緋宮会長のお雑煮をいただきますね」"

[[dialogue]]
speaker = "フィオナ"
# 「あれ？　でもリノさんは魔女だから……うちは見様見真似？　ふふ、そうなんですね。でもちゃんとしたお雑煮に見えます」
line = "「あれ？　でもリノさんは魔女だから……うちは見様見真似？　ふふ、そうなんですね。でもちゃんとしたお雑煮に見えます」"

[[dialogue]]
speaker = "フィオナ"
# 「シンプルな醤油のすまし汁で……だからこそカツオ節をしっかり感じますね。骨太な味わいで美味しいです」
line = "「シンプルな醤油のすまし汁で……だからこそカツオ節をしっかり感じますね。骨太な味わいで美味しいです」"

[[dialogue]]
speaker = "フィオナ"
# 「今日はこれからお出かけしませんか？　２人きりで初詣に行きたいんです」
line = "「今日はこれからお出かけしませんか？　２人きりで初詣に行きたいんです」"

[[dialogue]]
speaker = "フィオナ"
# 「私に合わせて袴をレンタルしてくれたんですね。よくお似合いですよ。和服もかっこいいです」
line = "「私に合わせて袴をレンタルしてくれたんですね。よくお似合いですよ。和服もかっこいいです」"

[[dialogue]]
speaker = "unk"
# フィオナも華やかですごく綺麗だ
line = "フィオナも華やかですごく綺麗だ"

[[dialogue]]
speaker = "フィオナ"
# 「ありがとうございます。でも、やっぱり大胆すぎるような……」
line = "「ありがとうございます。でも、やっぱり大胆すぎるような……」"

[[dialogue]]
speaker = "フィオナ"
# 「いえ、せっかくあなたに綺麗だと言ってもらえたんです。堂々としています」
line = "「いえ、せっかくあなたに綺麗だと言ってもらえたんです。堂々としています」"

[[dialogue]]
speaker = "フィオナ"
# 「こんなときにモンスター！？　しかも近い！」
line = "「こんなときにモンスター！？　しかも近い！」"

[[dialogue]]
speaker = "モンスター"
# 「イ～～～～！」
line = "「イ～～～～！」"

[[dialogue]]
speaker = "フィオナ"
# 「厄介な新型もいないようですし、早く倒してしまいましょう。まずは可愛くないのから！」
line = "「厄介な新型もいないようですし、早く倒してしまいましょう。まずは可愛くないのから！」"

[[dialogue]]
speaker = "unk"
# 可愛くないのってどれ！？
line = "可愛くないのってどれ！？"

[[dialogue]]
speaker = "フィオナ"
# 「あれです！　羽の生えたやつ！　……いえ、そっちの可愛いのではなく！」
line = "「あれです！　羽の生えたやつ！　……いえ、そっちの可愛いのではなく！」"

[[dialogue]]
speaker = "モンスター"
# 「イ～～……」
line = "「イ～～……」"

[[dialogue]]
speaker = "フィオナ"
# 「うう～……仕方ありません、一気に片付けます！」
line = "「うう～……仕方ありません、一気に片付けます！」"

[[dialogue]]
speaker = "フィオナ"
# 「星見流羽根突術・曙！」
line = "「星見流羽根突術・曙！」"

[[dialogue]]
speaker = "モンスター"
# 「イ～～～～ッ！？」
line = "「イ～～～～ッ！？」"

[[dialogue]]
speaker = "フィオナ"
# 「はぁ……すみません、緋宮会長。私のせいでこんなことになってしまうなんて……」
line = "「はぁ……すみません、緋宮会長。私のせいでこんなことになってしまうなんて……」"

[[dialogue]]
speaker = "unk"
# フィオナのせい？
line = "フィオナのせい？"

[[dialogue]]
speaker = "フィオナ"
# 「戦っている最中に思い出したんです。今年の初夢を」
line = "「戦っている最中に思い出したんです。今年の初夢を」"

[[dialogue]]
speaker = "フィオナ"
# 「可愛らしいモンスターと戯れる夢だったんですが、まさか現実になってしまうなんて……」
line = "「可愛らしいモンスターと戯れる夢だったんですが、まさか現実になってしまうなんて……」"

[[dialogue]]
speaker = "unk"
# フィオナのセンスは独特だ。少しでも丸ければ、ほぼ１００パーセント可愛い判定されてしまう。例え、それがモンスターであっても。
line = "フィオナのセンスは独特だ。少しでも丸ければ、ほぼ１００パーセント可愛い判定されてしまう。例え、それがモンスターであっても。"

[[dialogue]]
speaker = "フィオナ"
# 「もちろん、モンスターは世界を脅かすもの。戦いに手加減などありえません。でも、自分の手で倒すのはちょっぴり心が痛みます……」
line = "「もちろん、モンスターは世界を脅かすもの。戦いに手加減などありえません。でも、自分の手で倒すのはちょっぴり心が痛みます……」"

[[dialogue]]
speaker = "フィオナ"
# 「どのモンスターが可愛いと思うか、ですか？　ちょっとＤＩＳＣで画像を見せてもらえます？」
line = "「どのモンスターが可愛いと思うか、ですか？　ちょっとＤＩＳＣで画像を見せてもらえます？」"

[[dialogue]]
speaker = "フィオナ"
# 「一番よく見るモンスターですね。もちろん可愛いです」
line = "「一番よく見るモンスターですね。もちろん可愛いです」"

[[dialogue]]
speaker = "フィオナ"
# 「まるまるブヨブヨで、可愛いです」
line = "「まるまるブヨブヨで、可愛いです」"

[[dialogue]]
speaker = "フィオナ"
# 「鳥型のは可愛いとは思えないですね……」
line = "「鳥型のは可愛いとは思えないですね……」"

[[dialogue]]
speaker = "フィオナ"
# 「大型モンスターなので、実際に対峙したらそれどころじゃないですけど、見た目は可愛いと思います」
line = "「大型モンスターなので、実際に対峙したらそれどころじゃないですけど、見た目は可愛いと思います」"

[[dialogue]]
speaker = "フィオナ"
# 「煌竜ヴィライアじゃないですか！　これを可愛いと思える人っているんでしょうか……」
line = "「煌竜ヴィライアじゃないですか！　これを可愛いと思える人っているんでしょうか……」"

[[dialogue]]
speaker = "unk"
# （やっぱり丸いかどうかが大事なのか……）
line = "（やっぱり丸いかどうかが大事なのか……）"

[[dialogue]]
speaker = "フィオナ"
# 「こ、これは……！！」
line = "「こ、これは……！！」"

[[dialogue]]
speaker = "フィオナ"
# 「可愛い！　文句なしの可愛さです！　緋宮会長、いつどこで遭遇したんですか！？　この画像、私のＤＩＳＣにも送ってください！」
line = "「可愛い！　文句なしの可愛さです！　緋宮会長、いつどこで遭遇したんですか！？　この画像、私のＤＩＳＣにも送ってください！」"

[[dialogue]]
speaker = "unk"
# 他にも画像を見てもらったが、ディーラックがまさかの優勝。これで俺もフィオナのことをもっとよく知れた……と思う。
line = "他にも画像を見てもらったが、ディーラックがまさかの優勝。これで俺もフィオナのことをもっとよく知れた……と思う。"

[[dialogue]]
speaker = "unk"
# 後日──
line = "後日──"

[[dialogue]]
speaker = "フィオナ"
# 「おかえりなさい、あなた。あれ、その手に持っているのは……？」
line = "「おかえりなさい、あなた。あれ、その手に持っているのは……？」"

[[dialogue]]
speaker = "unk"
# これ、よかったらもらってほしい
line = "これ、よかったらもらってほしい"

[[dialogue]]
speaker = "フィオナ"
# 「これは……モンスターのぬいぐるみ！？　どこで売って……いえ、モンスターのぬいぐみなんて、売っているはずがありません」
line = "「これは……モンスターのぬいぐるみ！？　どこで売って……いえ、モンスターのぬいぐみなんて、売っているはずがありません」"

[[dialogue]]
speaker = "フィオナ"
# 「もしかして手作り……ええ、やっぱりそうなんですね」
line = "「もしかして手作り……ええ、やっぱりそうなんですね」"

[[dialogue]]
speaker = "フィオナ"
# 「本当に嬉しいです。モンスターを可愛らしく思うことは、許されないと思っていたので……絶対に大切にします」
line = "「本当に嬉しいです。モンスターを可愛らしく思うことは、許されないと思っていたので……絶対に大切にします」"

[[dialogue]]
speaker = "フィオナ"
# 「ふふふ♪　初夢、叶っちゃいましたね」
line = "「ふふふ♪　初夢、叶っちゃいましたね」"

[[dialogue]]
speaker = "unk"
# それから、フィオナがうちにいる間、ぬいぐるみは枕元に置かれたのだった。
line = "それから、フィオナがうちにいる間、ぬいぐるみは枕元に置かれたのだった。"
