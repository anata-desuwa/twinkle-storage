speaker = "イレーナ"
# 「皆さん、下がってください。ここは私たちがお守りします」
line = "「皆さん、下がってください。ここは私たちがお守りします」"

[[dialogue]]
speaker = "イレーナ"
# 「聖なる闇よ──プリガーレ・アンドロメダ！」
line = "「聖なる闇よ──プリガーレ・アンドロメダ！」"

[[dialogue]]
speaker = "シャロン"
# 「おお、さすがイレーナさま、十字架の剣で結界を！　モンスターを寄せ付けません！」
line = "「おお、さすがイレーナさま、十字架の剣で結界を！　モンスターを寄せ付けません！」"

[[dialogue]]
speaker = "シャロン"
# 「私も負けていられませんね！　クロススプラッシュ！」
line = "「私も負けていられませんね！　クロススプラッシュ！」"

[[dialogue]]
speaker = "フワッチ"
# 「イ～～……」
line = "「イ～～……」"

[[dialogue]]
speaker = "unk"
# 聖女とシスターのコンビが頼もしい。
line = "聖女とシスターのコンビが頼もしい。"

[[dialogue]]
speaker = "unk"
# だけど──
line = "だけど──"

[[dialogue]]
speaker = "イレーナ"
# 「会長さん、どうされました？　先ほどから集中できていないようですが、気になることがあるなら仰ってください」
line = "「会長さん、どうされました？　先ほどから集中できていないようですが、気になることがあるなら仰ってください」"

[[dialogue]]
speaker = "unk"
# 前から思ってんだけど……
line = "前から思ってんだけど……"

[[dialogue]]
speaker = "イレーナ"
# 「はい？」
line = "「はい？」"

[[dialogue]]
speaker = "unk"
# 聖女とシスターなのに露出度高くない？
line = "聖女とシスターなのに露出度高くない？"

[[dialogue]]
speaker = "イレーナ"
# 「はぁっ──！？」
line = "「はぁっ──！？」"

[[dialogue]]
speaker = "イレーナ"
# 「あんた何言って──な、何をおっしゃるのですか。これは星騎士としての正装。世界を守るという責務を果たすために──」
line = "「あんた何言って──な、何をおっしゃるのですか。これは星騎士としての正装。世界を守るという責務を果たすために──」"

[[dialogue]]
speaker = "シャロン"
# 「よくぞ聞いてくれました！！」
line = "「よくぞ聞いてくれました！！」"

[[dialogue]]
speaker = "イレーナ"
# 「ひゃあっ！？」
line = "「ひゃあっ！？」"

[[dialogue]]
speaker = "シャロン"
# 「子どもは風の子といいます。ほら、冬なのに短パンで風邪をひかない子っているじゃないですか」
line = "「子どもは風の子といいます。ほら、冬なのに短パンで風邪をひかない子っているじゃないですか」"

[[dialogue]]
speaker = "シャロン"
# 「ですから私も露出を多くして体を強くしようと思ったのです！」
line = "「ですから私も露出を多くして体を強くしようと思ったのです！」"

[[dialogue]]
speaker = "イレーナ"
# 「そ、そうなのですか、それは初耳でしたね……。ですが子どもは元気だから薄着なのであって、薄着だから元気なのではない気が……」
line = "「そ、そうなのですか、それは初耳でしたね……。ですが子どもは元気だから薄着なのであって、薄着だから元気なのではない気が……」"

[[dialogue]]
speaker = "ビュンタ"
# 「イーーーッ！」
line = "「イーーーッ！」"

[[dialogue]]
speaker = "イレーナ"
# 「邪魔しないでください」
line = "「邪魔しないでください」"

[[dialogue]]
speaker = "ビュンタ"
# 「イ～～……」
line = "「イ～～……」"

[[dialogue]]
speaker = "イレーナ"
# （ヘンタイ！　スケベ！　バカ！　こんな時に何言ってんの！）
line = "（ヘンタイ！　スケベ！　バカ！　こんな時に何言ってんの！）"

[[dialogue]]
speaker = "unk"
# そのおっぱいで聖女とシスターは無理が……
line = "そのおっぱいで聖女とシスターは無理が……"

[[dialogue]]
speaker = "イレーナ"
# （はぁっ！？　どこ見てんのよ、このセクハラ星徒会長！）
line = "（はぁっ！？　どこ見てんのよ、このセクハラ星徒会長！）"

[[dialogue]]
speaker = "シャロン"
# 「はは、時々言われます！　ちなみにスリーサイズは上から──」
line = "「はは、時々言われます！　ちなみにスリーサイズは上から──」"

[[dialogue]]
speaker = "イレーナ"
# 「言わなくていいんですよ、シスターシャロン」
line = "「言わなくていいんですよ、シスターシャロン」"

[[dialogue]]
speaker = "シャロン"
# 「そういえば、イレーナさまは肩こりなどありますか？　調べてみたら胸の重さが原因だそうでして、イレーナさまももしかしてお悩みではないかと」
line = "「そういえば、イレーナさまは肩こりなどありますか？　調べてみたら胸の重さが原因だそうでして、イレーナさまももしかしてお悩みではないかと」"

[[dialogue]]
speaker = "イレーナ"
# 「あの？　シスターシャロン？　胸の話はまた後でお願いできますか」
line = "「あの？　シスターシャロン？　胸の話はまた後でお願いできますか」"

[[dialogue]]
speaker = "イレーナ"
# （こっち見てるのわかってるわよ、エロ魔王！　あんたはモンスターの相手してなさい！）
line = "（こっち見てるのわかってるわよ、エロ魔王！　あんたはモンスターの相手してなさい！）"

[[dialogue]]
speaker = "ダークキングフワッチ"
# 「～～～～～～ッ！」
line = "「～～～～～～ッ！」"

[[dialogue]]
speaker = "イレーナ"
# 「――ッ！？　またモンスターが出てきて……もう何が何だか……」
line = "「――ッ！？　またモンスターが出てきて……もう何が何だか……」"

[[dialogue]]
speaker = "シャロン"
# 「これは強敵。力を合わせて戦わないといけませんね」
line = "「これは強敵。力を合わせて戦わないといけませんね」"

[[dialogue]]
speaker = "シャロン"
# 「ところで私はブラジャーはＦカップなのですが、最近入らなくなってきて、上のサイズが必要かと考えております」
line = "「ところで私はブラジャーはＦカップなのですが、最近入らなくなってきて、上のサイズが必要かと考えております」"

[[dialogue]]
speaker = "イレーナ"
# 「シスターシャロン。戦闘に集中しましょう」
line = "「シスターシャロン。戦闘に集中しましょう」"

[[dialogue]]
speaker = "シャロン"
# 「イレーナさまもブラジャーはＦでしたっけ？」
line = "「イレーナさまもブラジャーはＦでしたっけ？」"

[[dialogue]]
speaker = "イレーナ"
# 「シャ・ロ・ン・さ・ん？」
line = "「シャ・ロ・ン・さ・ん？」"

[[dialogue]]
speaker = "ダークキングフワッチ"
# 「～～～～～ッ！！」
line = "「～～～～～ッ！！」"

[[dialogue]]
speaker = "イレーナ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "イレーナ"
# 「破滅の化身よ、安らかに眠りなさい。ミゼルコルディア・ヴィオーラ！」
line = "「破滅の化身よ、安らかに眠りなさい。ミゼルコルディア・ヴィオーラ！」"

[[dialogue]]
speaker = "ダークキングフワッチ"
# 「ーーーーッ」
line = "「ーーーーッ」"

[[dialogue]]
speaker = "イレーナ"
# 「ふぅ……ようやく終わりましたね。厳しい戦いでした」
line = "「ふぅ……ようやく終わりましたね。厳しい戦いでした」"

[[dialogue]]
speaker = "イレーナ"
# 「どうしました、会長さん？　まだ何か言いたいことがあるのですか？　この際ですから何でもお聞きしますよ」
line = "「どうしました、会長さん？　まだ何か言いたいことがあるのですか？　この際ですから何でもお聞きしますよ」"

[[dialogue]]
speaker = "unk"
# 礼拝に来た子が見たら性癖が歪みそう……
line = "礼拝に来た子が見たら性癖が歪みそう……"

[[dialogue]]
speaker = "イレーナ"
# 「はあぁああっ！？」
line = "「はあぁああっ！？」"

[[dialogue]]
speaker = "イレーナ"
# 「コホン。失礼しました。喉の調子が悪くて」
line = "「コホン。失礼しました。喉の調子が悪くて」"

[[dialogue]]
speaker = "イレーナ"
# 「シスターシャロン、会長さんを押さえておいてください。色欲の罪に溺れた会長さんに裁きを下します」
line = "「シスターシャロン、会長さんを押さえておいてください。色欲の罪に溺れた会長さんに裁きを下します」"

