# 「かしこまりました！　じっとしていてください会長さま！」
line = "「かしこまりました！　じっとしていてください会長さま！」"

[[dialogue]]
speaker = "unk"
# ちょ、待っ──ぎゃあああっ！？
line = "ちょ、待っ──ぎゃあああっ！？"

[[dialogue]]
speaker = "unk"
# その後、イレーナに癒されては切られ、切られては癒され、無間地獄を味わったのだった……
line = "その後、イレーナに癒されては切られ、切られては癒され、無間地獄を味わったのだった……"
