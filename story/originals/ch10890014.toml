[[dialogue]]
speaker = "unk"
# 第４話,誰にも言えない,P
line = "第４話,誰にも言えない,P"

[[dialogue]]
speaker = "シアン"
# 「他のヤツには絶対に言うなよ？」
line = "「他のヤツには絶対に言うなよ？」"

[[dialogue]]
speaker = "シアン"
# 「あたしは流星学園時代、ウィステリアに会っている。会っているどころか、模擬試合を挑んだことすらあるんだ」
line = "「あたしは流星学園時代、ウィステリアに会っている。会っているどころか、模擬試合を挑んだことすらあるんだ」"

[[dialogue]]
speaker = "unk"
# 向こうは覚えてなかったみたいだけど？
line = "向こうは覚えてなかったみたいだけど？"

[[dialogue]]
speaker = "シアン"
# 「……瞬殺されたんだよ」
line = "「……瞬殺されたんだよ」"

[[dialogue]]
speaker = "シアン"
# 「昔のあたしは強くて格好いい、誰からも憧れられるようなキラキラした星騎士を目指してたんだけどよ」
line = "「昔のあたしは強くて格好いい、誰からも憧れられるようなキラキラした星騎士を目指してたんだけどよ」"

[[dialogue]]
speaker = "シアン"
# 「若かった……勇敢と無謀をはき違えてたんだ」
line = "「若かった……勇敢と無謀をはき違えてたんだ」"

[[dialogue]]
speaker = "シアン"
# 「ウィステリアの模擬戦１００人抜きは、このあたしが止めてみせる！　今日、ここからあたしの星騎士伝説が始まるんだ！」
line = "「ウィステリアの模擬戦１００人抜きは、このあたしが止めてみせる！　今日、ここからあたしの星騎士伝説が始まるんだ！」"

[[dialogue]]
speaker = "シアン"
# 「行くぜ、ウィステリア！　先手必勝――」
line = "「行くぜ、ウィステリア！　先手必勝――」"

[[dialogue]]
speaker = "ウィステリア"
# 「シャドウメイルストラム！」
line = "「シャドウメイルストラム！」"

[[dialogue]]
speaker = "シアン"
# 「ぐぁああああぁああぁっ！」
line = "「ぐぁああああぁああぁっ！」"

[[dialogue]]
speaker = "unk"
# 早ーっ！？
line = "早ーっ！？"

[[dialogue]]
speaker = "シアン"
# 「メチャクチャ格好悪ぃ。恥ずかしい。死にてえ」
line = "「メチャクチャ格好悪ぃ。恥ずかしい。死にてえ」"

[[dialogue]]
speaker = "シアン"
# 「ゴングが鳴って、まばたきをした次の瞬間にはふっ飛ばされてた。ぐうの音も出ないほどの完敗だった」
line = "「ゴングが鳴って、まばたきをした次の瞬間にはふっ飛ばされてた。ぐうの音も出ないほどの完敗だった」"

[[dialogue]]
speaker = "シアン"
# 「負けたのは、ウィステリアだけじゃない。モンスターにやられて、危うく再起不能寸前。死にかけたりしてよ」
line = "「負けたのは、ウィステリアだけじゃない。モンスターにやられて、危うく再起不能寸前。死にかけたりしてよ」"

[[dialogue]]
speaker = "シアン"
# 「そこをキリカのやつに救われたこともある。まざまざと実力を――あたしの未熟さと才能のなさを見せつけられたんだ」
line = "「そこをキリカのやつに救われたこともある。まざまざと実力を――あたしの未熟さと才能のなさを見せつけられたんだ」"

[[dialogue]]
speaker = "シアン"
# 「……慰めはいらねえよ。自分のことは自分が一番よくわかってる」
line = "「……慰めはいらねえよ。自分のことは自分が一番よくわかってる」"

[[dialogue]]
speaker = "シアン"
# 「大怪我して入院してる時に、あたしはみんなの憧れの的になるような星騎士の道は諦めたんだ」
line = "「大怪我して入院してる時に、あたしはみんなの憧れの的になるような星騎士の道は諦めたんだ」"

[[dialogue]]
speaker = "シアン"
# 「今後の身の振り方に迷って、ちょっとやさぐれてたところを、どこから嗅ぎつけたのか公安委員会にスカウトされてよ」
line = "「今後の身の振り方に迷って、ちょっとやさぐれてたところを、どこから嗅ぎつけたのか公安委員会にスカウトされてよ」"

[[dialogue]]
speaker = "シアン"
# 「地味で目立たない裏方仕事に従事するようになったんだ」
line = "「地味で目立たない裏方仕事に従事するようになったんだ」"

[[dialogue]]
speaker = "シアン"
# 「そっちは案外、あたしの性に合っててさ。結構な実績を残せてたんだ。あたしにも活躍できる場があるんだって、調子に乗っちまってた」
line = "「そっちは案外、あたしの性に合っててさ。結構な実績を残せてたんだ。あたしにも活躍できる場があるんだって、調子に乗っちまってた」"

[[dialogue]]
speaker = "シアン"
# 「でも、しばらく経ってから、公安委員会の仕事ってすげえ面倒なことに気付いちまってさ」
line = "「でも、しばらく経ってから、公安委員会の仕事ってすげえ面倒なことに気付いちまってさ」"

[[dialogue]]
speaker = "シアン"
# 「もちろん、諜報活動なんてのは表には出ない。人知れず活躍したところで、ちやほやされることもない」
line = "「もちろん、諜報活動なんてのは表には出ない。人知れず活躍したところで、ちやほやされることもない」"

[[dialogue]]
speaker = "シアン"
# 「一手間違えただけで、誰にも助けを求められないまま、死んじまうような危険な任務も山ほどある」
line = "「一手間違えただけで、誰にも助けを求められないまま、死んじまうような危険な任務も山ほどある」"

[[dialogue]]
speaker = "シアン"
# 「いつか命中しちまうまで、引き金を引き続けるロシアンルーレットみたいなもんだよ」
line = "「いつか命中しちまうまで、引き金を引き続けるロシアンルーレットみたいなもんだよ」"

[[dialogue]]
speaker = "シアン"
# 「ヤバさに気付いたからって、抜けるには時すでに遅しだ。そこそこ使えるから重宝がられてたし、内側を知りすぎていた。奥まで踏み込みすぎちまってたんだ」
line = "「ヤバさに気付いたからって、抜けるには時すでに遅しだ。そこそこ使えるから重宝がられてたし、内側を知りすぎていた。奥まで踏み込みすぎちまってたんだ」"

[[dialogue]]
speaker = "シアン"
# 「抜ける機会を探っている内に、皮肉なことにますます実績を積んじまった」
line = "「抜ける機会を探っている内に、皮肉なことにますます実績を積んじまった」"

[[dialogue]]
speaker = "シアン"
# 「それで辞めるに辞められないエージェント業を続けて、今に至ってるってわけだ。不器用すぎて笑えるだろ？」
line = "「それで辞めるに辞められないエージェント業を続けて、今に至ってるってわけだ。不器用すぎて笑えるだろ？」"

[[dialogue]]
speaker = "シアン"
# 「人知れずどころか、本当の名前まで捨てて、何やってんだかって感じだよ、ハハ」
line = "「人知れずどころか、本当の名前まで捨てて、何やってんだかって感じだよ、ハハ」"

[[dialogue]]
speaker = "unk"
# 本当の名前？
line = "本当の名前？"

[[dialogue]]
speaker = "シアン"
# 「ああ。前に言わなかったか？　いや、ネーゼマインのヤツが口を滑らせたんだったな……ったく、アイツ、余計なことばかりしやがる」
line = "「ああ。前に言わなかったか？　いや、ネーゼマインのヤツが口を滑らせたんだったな……ったく、アイツ、余計なことばかりしやがる」"

[[dialogue]]
speaker = "シアン"
# 「シアン・ユーゼリアってのは偽名だよ。<ruby=こっち>新星</ruby>に来てから使ってる名前だ」
line = "「シアン・ユーゼリアってのは偽名だよ。<ruby>新星<rt>こっち</rt></ruby>に来てから使ってる名前だ」"

[[dialogue]]
speaker = "シアン"
# 「っと、本名は言えねえからな！　諜報員にとっちゃ本名なんて、何よりの弱みなんだから──」
line = "「っと、本名は言えねえからな！　諜報員にとっちゃ本名なんて、何よりの弱みなんだから──」"

[[dialogue]]
speaker = "シアン"
# 「──って、会長さんに言っちまったら駄目か！　詐称の暴露じゃねえか！」
line = "「──って、会長さんに言っちまったら駄目か！　詐称の暴露じゃねえか！」"

[[dialogue]]
speaker = "シアン"
# 「確か、星徒会長には問題のある生徒を退学させる権限すらあるんだよな……？」
line = "「確か、星徒会長には問題のある生徒を退学させる権限すらあるんだよな……？」"

[[dialogue]]
speaker = "シアン"
# 「はー……なんなんだ、さっきから格好悪ぃミスばっかり……なんで、よりによってあんたの前でやっちまうかな」
line = "「はー……なんなんだ、さっきから格好悪ぃミスばっかり……なんで、よりによってあんたの前でやっちまうかな」"

[[dialogue]]
speaker = "シアン"
# 「滅多にやらかさねえのが売りだってのによ……こんなんじゃ公安失格だぜ」
line = "「滅多にやらかさねえのが売りだってのによ……こんなんじゃ公安失格だぜ」"

[[dialogue]]
speaker = "unk"
# たまに失敗するくらいの方が可愛いですよ
line = "たまに失敗するくらいの方が可愛いですよ"

[[dialogue]]
speaker = "シアン"
# 「んなっ……！？　おまっ……面と向かって、そういう、可愛、っとか……んなぁっ……！？」
line = "「んなっ……！？　おまっ……面と向かって、そういう、可愛、っとか……んなぁっ……！？」"

[[dialogue]]
speaker = "シアン"
# 「ったく……ズリいぞ、会長さん。大した人たらしだぜ……あんたの方がよっぽど公安に向いてるんじゃねえのか」
line = "「ったく……ズリいぞ、会長さん。大した人たらしだぜ……あんたの方がよっぽど公安に向いてるんじゃねえのか」"

[[dialogue]]
speaker = "シアン"
# 「……シーナ」
line = "「……シーナ」"

[[dialogue]]
speaker = "シアン"
# 「あたしの本名だよ。姓はない。ただのシーナだ」
line = "「あたしの本名だよ。姓はない。ただのシーナだ」"

[[dialogue]]
speaker = "シアン"
# 「新星じゃ、あたしの本名は誰にも教えてない。こっちに来た時に捨てたつもりでさえいたんだ」
line = "「新星じゃ、あたしの本名は誰にも教えてない。こっちに来た時に捨てたつもりでさえいたんだ」"

[[dialogue]]
speaker = "シアン"
# 「まあ……なんだ。あんたへの信愛の証だとでも思ってくれよ」
line = "「まあ……なんだ。あんたへの信愛の証だとでも思ってくれよ」"

[[dialogue]]
speaker = "シアン"
# 「正直に言ったんだからな。おとがめはなしで頼むぜ」
line = "「正直に言ったんだからな。おとがめはなしで頼むぜ」"

[[dialogue]]
speaker = "シアン"
# 「それとな。絶対に、人前で、あたしを本名で呼ぶんじゃねえぞ？　いいな？」
line = "「それとな。絶対に、人前で、あたしを本名で呼ぶんじゃねえぞ？　いいな？」"
