[[dialogue]]
speaker = "ルリエル"
# 「ひゃぁぁ～！　冷たいっ、気持ちい～っ！　水がしょっぱいのですぅ～！」
line = "「ひゃぁぁ～！　冷たいっ、気持ちい～っ！　水がしょっぱいのですぅ～！」"

[[dialogue]]
speaker = "イクシリオン"
# 「動けば動くほど水着が股間に食い込んできて──はあぁ、背徳の味が……」
line = "「動けば動くほど水着が股間に食い込んできて──はあぁ、背徳の味が……」"

[[dialogue]]
speaker = "unk"
# ……あくまで訓練しに来たんだからね？
line = "……あくまで訓練しに来たんだからね？"

[[dialogue]]
speaker = "イクシリオン"
# 「はぅ……！　す、すみません。少々はしゃぎすぎました……！」
line = "「はぅ……！　す、すみません。少々はしゃぎすぎました……！」"

[[dialogue]]
speaker = "ルリエル"
# 「少しくらいいいじゃないですかぁ～！　わたしもイクシーさんも海は初めてなんですよぉ～！」
line = "「少しくらいいいじゃないですかぁ～！　わたしもイクシーさんも海は初めてなんですよぉ～！」"

[[dialogue]]
speaker = "イクシリオン"
# 「本当にこの水全てが塩水なんですね。どこからともなく波が押し寄せてきて不思議です……」
line = "「本当にこの水全てが塩水なんですね。どこからともなく波が押し寄せてきて不思議です……」"

[[dialogue]]
speaker = "ルリエル"
# 「女神様の考えることってよくわかりませんよね～？　どうして真水にしなかったんでしょうー？　喉が渇いた時に飲めないじゃないですかぁ」
line = "「女神様の考えることってよくわかりませんよね～？　どうして真水にしなかったんでしょうー？　喉が渇いた時に飲めないじゃないですかぁ」"

[[dialogue]]
speaker = "ルリエル"
# 「まぁおかげでトロピカルジュースの味もひとしおですけどね！　ゴクゴク──ぷっはぁ～！　あ、皆さんの分もありますよ！」
line = "「まぁおかげでトロピカルジュースの味もひとしおですけどね！　ゴクゴク──ぷっはぁ～！　あ、皆さんの分もありますよ！」"

[[dialogue]]
speaker = "イクシリオン"
# 「わぁ、ありがとうございます！　ちょうど喉がカラカラで──ハッ、あまり楽しみすぎると、会長からまた叱責が……！」
line = "「わぁ、ありがとうございます！　ちょうど喉がカラカラで──ハッ、あまり楽しみすぎると、会長からまた叱責が……！」"

[[dialogue]]
speaker = "unk"
# 初めての海って言うなら少しくらいはね
line = "初めての海って言うなら少しくらいはね"

[[dialogue]]
speaker = "ルリエル"
# 「流石は会長さん！　話がわかりますね～！」
line = "「流石は会長さん！　話がわかりますね～！」"

[[dialogue]]
speaker = "イクシリオン"
# 「会長に睨みつけられるのもそれはそれで……はぁはぁ……嬉しかったのですが……」
line = "「会長に睨みつけられるのもそれはそれで……はぁはぁ……嬉しかったのですが……」"

[[dialogue]]
speaker = "ルリエル"
# 「ではでは、気を取り直して遊びましょう！　この格好なら、どれだけ汗をかいても大丈夫ですし！　海ですぐに涼めちゃいますし！」
line = "「ではでは、気を取り直して遊びましょう！　この格好なら、どれだけ汗をかいても大丈夫ですし！　海ですぐに涼めちゃいますし！」"

[[dialogue]]
speaker = "イクシリオン"
# 「正直、落ち着きませんが……。脇も太もももお尻も、すごくスースーして……」
line = "「正直、落ち着きませんが……。脇も太もももお尻も、すごくスースーして……」"

[[dialogue]]
speaker = "ルリエル"
# 「それがいいんじゃないですかぁ～。このくらいの露出度なら街中でも着られますしね！」
line = "「それがいいんじゃないですかぁ～。このくらいの露出度なら街中でも着られますしね！」"

[[dialogue]]
speaker = "イクシリオン"
# 「この格好で街中に……っっ。か、考えるだけでも鼻血が……！」
line = "「この格好で街中に……っっ。か、考えるだけでも鼻血が……！」"

[[dialogue]]
speaker = "unk"
# その水着は自分で選んだの？
line = "その水着は自分で選んだの？"

[[dialogue]]
speaker = "ルリエル"
# 「そうですね、いくつか種類があったので。サイズも調整してもらったんですけど、かなり満足の行く仕上がりなのです！」
line = "「そうですね、いくつか種類があったので。サイズも調整してもらったんですけど、かなり満足の行く仕上がりなのです！」"

[[dialogue]]
speaker = "イクシリオン"
# 「ビ、ビキニにしようかとも思ったんですけど。あまり露出が激しすぎると妄想の世界から帰ってこられなくなりそうで……」
line = "「ビ、ビキニにしようかとも思ったんですけど。あまり露出が激しすぎると妄想の世界から帰ってこられなくなりそうで……」"

[[dialogue]]
speaker = "ルリエル"
# 「えへへ、会長さん的にどうです？　この胸元のフリルとかかわいくないですか？　水着って太もも丸出しにできるからいいですよね！」
line = "「えへへ、会長さん的にどうです？　この胸元のフリルとかかわいくないですか？　水着って太もも丸出しにできるからいいですよね！」"

[[dialogue]]
speaker = "イクシリオン"
# 「あ、あんなに胸や太ももを会長に見せつけて……！　ルリエルさんって意外と大胆な……！」
line = "「あ、あんなに胸や太ももを会長に見せつけて……！　ルリエルさんって意外と大胆な……！」"

[[dialogue]]
speaker = "ルリエル"
# 「イクシーさんはどうしてジャージなんか羽織ってるんです？　せっかく涼しい水着に着替えられたんですし、それも脱いじゃいましょうよ～」
line = "「イクシーさんはどうしてジャージなんか羽織ってるんです？　せっかく涼しい水着に着替えられたんですし、それも脱いじゃいましょうよ～」"

[[dialogue]]
speaker = "イクシリオン"
# 「ひぃあっ！？　引っ張らないでくださいっ！　競泳水着単体で過ごす勇気は私にはまだ……！」
line = "「ひぃあっ！？　引っ張らないでくださいっ！　競泳水着単体で過ごす勇気は私にはまだ……！」"

[[dialogue]]
speaker = "ルリエル"
# 「へー、それって競泳水着って言うんですね？　わたしの水着よりもピッチピチでスッベスベです～！　お尻とか苦しくないんですか？」
line = "「へー、それって競泳水着って言うんですね？　わたしの水着よりもピッチピチでスッベスベです～！　お尻とか苦しくないんですか？」"

[[dialogue]]
speaker = "イクシリオン"
# 「いえ、あの、このぴったりキツキツ具合が逆にそそられると言いますか……！」
line = "「いえ、あの、このぴったりキツキツ具合が逆にそそられると言いますか……！」"

[[dialogue]]
speaker = "unk"
# ……眩しい光景だ
line = "……眩しい光景だ"

[[dialogue]]
speaker = "ルリエル"
# 「ほえ？　確かに日差しが強いですもんねー？　わたしの帽子、貸しましょうか？」
line = "「ほえ？　確かに日差しが強いですもんねー？　わたしの帽子、貸しましょうか？」"

[[dialogue]]
speaker = "イクシリオン"
# 「そういう意味ではないかと……。でも……はぁはぁ……会長が私のくびれや太ももを舐めるように見ているかと思うと……んんっ……！」
line = "「そういう意味ではないかと……。でも……はぁはぁ……会長が私のくびれや太ももを舐めるように見ているかと思うと……んんっ……！」"

[[dialogue]]
speaker = "unk"
# と、とりあえず訓練を始めようか！
line = "と、とりあえず訓練を始めようか！"

[[dialogue]]
speaker = "ルリエル"
# 「わわっ、いきなりなんですかぁ～！　さっきは少しくらいは遊んでいいって言ってくれましたよねっ？」
line = "「わわっ、いきなりなんですかぁ～！　さっきは少しくらいは遊んでいいって言ってくれましたよねっ？」"

[[dialogue]]
speaker = "イクシリオン"
# 「心なしか会長の姿勢が前屈みになってるような……。っっ、わ、私、訓練前に一泳ぎしてきます……！！」
line = "「心なしか会長の姿勢が前屈みになってるような……。っっ、わ、私、訓練前に一泳ぎしてきます……！！」"

[[dialogue]]
speaker = "ルリエル"
# 「よーし、いきますよ～！　エレクトロコンクっ！」
line = "「よーし、いきますよ～！　エレクトロコンクっ！」"

[[dialogue]]
speaker = "イクシリオン"
# 「それでは私も……！　ライトニングファスト！」
line = "「それでは私も……！　ライトニングファスト！」"

[[dialogue]]
speaker = "ルリエル"
# 「はえ～！　すごいですね、イクシーさん！　スイカが綺麗に真っ二つになってます！　目にも止まらぬ早業ですよぉ～！」
line = "「はえ～！　すごいですね、イクシーさん！　スイカが綺麗に真っ二つになってます！　目にも止まらぬ早業ですよぉ～！」"

[[dialogue]]
speaker = "イクシリオン"
# 「ルリエルさんこそ、力強く豊かな音色でした。その綺麗な貝殻から出ているとは思えません」
line = "「ルリエルさんこそ、力強く豊かな音色でした。その綺麗な貝殻から出ているとは思えません」"

[[dialogue]]
speaker = "ルリエル"
# 「意外とわたしたち、新しい力を使いこなせてますね！　これなら早めに訓練を切り上げて、遊び回れそうです！」
line = "「意外とわたしたち、新しい力を使いこなせてますね！　これなら早めに訓練を切り上げて、遊び回れそうです！」"

[[dialogue]]
speaker = "イクシリオン"
# 「ですが、おかしいですね……。新たに身に付けた雷の力を解放したつもりなんですが、スイカに焦げ目も付いてません」
line = "「ですが、おかしいですね……。新たに身に付けた雷の力を解放したつもりなんですが、スイカに焦げ目も付いてません」"

[[dialogue]]
speaker = "ルリエル"
# 「言われてみれば、わたしもそこの砂浜にドッカーンと雷を落としたつもりだったんですが……」
line = "「言われてみれば、わたしもそこの砂浜にドッカーンと雷を落としたつもりだったんですが……」"

[[dialogue]]
speaker = "unk"
# 眩しい肌に目を眩ませた罰……か
line = "眩しい肌に目を眩ませた罰……か"

[[dialogue]]
speaker = "ルリエル"
# 「ふぇ！？　どーしたんですか会長さん、全身黒焦げなのですよぉ！？」
line = "「ふぇ！？　どーしたんですか会長さん、全身黒焦げなのですよぉ！？」"

[[dialogue]]
speaker = "イクシリオン"
# 「まさか私たちの雷が会長さんに……！？　すすす、すみません……！　すぐに治療を……！！」
line = "「まさか私たちの雷が会長さんに……！？　すすす、すみません……！　すぐに治療を……！！」"

[[dialogue]]
speaker = "ルリエル"
# 「どうやら星力の制御がうまくいっていないみたいですねー……。素直に反省ですぅ……」
line = "「どうやら星力の制御がうまくいっていないみたいですねー……。素直に反省ですぅ……」"

[[dialogue]]
speaker = "イクシリオン"
# 「こうも勝手が違うとは……。人工戦闘服を少々甘く見ていました」
line = "「こうも勝手が違うとは……。人工戦闘服を少々甘く見ていました」"

[[dialogue]]
speaker = "ルリエル"
# 「よぉーし、それなら特訓しましょう！　この綺麗なビーチで特訓するなら、わたしも頑張れそうですし！」
line = "「よぉーし、それなら特訓しましょう！　この綺麗なビーチで特訓するなら、わたしも頑張れそうですし！」"
