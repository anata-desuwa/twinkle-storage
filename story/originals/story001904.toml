[[dialogue]]
speaker = "オオヒメ"
# 「なぜだ……なぜ滅びない……？」
line = "「なぜだ……なぜ滅びない……？」"

[[dialogue]]
speaker = "unk"
# 嵐のようなオオヒメの猛攻を凌ぎつつも、連携で徐々に押し返していく。
line = "嵐のようなオオヒメの猛攻を凌ぎつつも、連携で徐々に押し返していく。"

[[dialogue]]
speaker = "unk"
# そして──
line = "そして──"

[[dialogue]]
speaker = "フィオナ"
# 「世界に光を取り戻しましょう。目を覚ましてください、オオヒメ様……！」
line = "「世界に光を取り戻しましょう。目を覚ましてください、オオヒメ様……！」"

[[dialogue]]
speaker = "オオヒメ"
# 「ぐあああっ……！？」
line = "「ぐあああっ……！？」"

[[dialogue]]
speaker = "オオヒメ"
# 「私は……私は何を……？」
line = "「私は……私は何を……？」"

[[dialogue]]
speaker = "アイリーン"
# 「オオヒメさん、消えちゃった……あー、しんどかったー！　めちゃくちゃ強かったねー……！」
line = "「オオヒメさん、消えちゃった……あー、しんどかったー！　めちゃくちゃ強かったねー……！」"

[[dialogue]]
speaker = "マグダレナ"
# 「おや……？　オオヒメの本体は、まだフィーニスの塔には戻っていないようです。これでは世界の滅びは回避できません」
line = "「おや……？　オオヒメの本体は、まだフィーニスの塔には戻っていないようです。これでは世界の滅びは回避できません」"

[[dialogue]]
speaker = "ウズメイア"
# 「それじゃ今の戦い損じゃん！　このままじゃトリシャさんの占い通りに、世界が滅んじゃうって～！」
line = "「それじゃ今の戦い損じゃん！　このままじゃトリシャさんの占い通りに、世界が滅んじゃうって～！」"

[[dialogue]]
speaker = "マグダレナ"
# 「神殿の奥底に引きこもっているようですね。そこに続く扉を固く閉ざしています」
line = "「神殿の奥底に引きこもっているようですね。そこに続く扉を固く閉ざしています」"

[[dialogue]]
speaker = "ヴィーナス"
# 「なら、神殿の扉をぶっ壊せばいいのね！　オオヒメをやっつけた時みたいに、みんなの必殺技を叩きつけてやりましょ！」
line = "「なら、神殿の扉をぶっ壊せばいいのね！　オオヒメをやっつけた時みたいに、みんなの必殺技を叩きつけてやりましょ！」"

[[dialogue]]
speaker = "マグダレナ"
# 「いいえ、そう簡単にはいきません。あの扉はオオヒメの心そのもの。強烈な攻撃を闇雲にぶつけてもこじ開けることはできはないでしょう」
line = "「いいえ、そう簡単にはいきません。あの扉はオオヒメの心そのもの。強烈な攻撃を闇雲にぶつけてもこじ開けることはできはないでしょう」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ホント？　木っ端ミジンコになりなさい！　ハッピー・ニュースター！」
line = "「ホント？　木っ端ミジンコになりなさい！　ハッピー・ニュースター！」"

[[dialogue]]
speaker = "フィオナ"
# 「ちょっと、ヴィーナスさん！？」
line = "「ちょっと、ヴィーナスさん！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私の必殺技でも傷ひとつついてないわ！　カッチカチね！」
line = "「私の必殺技でも傷ひとつついてないわ！　カッチカチね！」"

[[dialogue]]
speaker = "マグダレナ"
# 「つまり、オオヒメをフィーニスの塔へと連れ戻すには、力ずくではなく、彼女の心の扉を開かせなければいけません」
line = "「つまり、オオヒメをフィーニスの塔へと連れ戻すには、力ずくではなく、彼女の心の扉を開かせなければいけません」"

[[dialogue]]
speaker = "ヴィーナス"
# 「でも、心を開くってどうすればいいのかしら？　お菓子でも持っていく？」
line = "「でも、心を開くってどうすればいいのかしら？　お菓子でも持っていく？」"

[[dialogue]]
speaker = "ウズメイア"
# 「一緒にお茶するとか、旅行に行くとか～？　クリパはちょっと前に終わっちゃったけど～」
line = "「一緒にお茶するとか、旅行に行くとか～？　クリパはちょっと前に終わっちゃったけど～」"

[[dialogue]]
speaker = "舞亜"
# 「どうかな。あんまりぐいぐい行っても、逆に引かれちゃうかも」
line = "「どうかな。あんまりぐいぐい行っても、逆に引かれちゃうかも」"

[[dialogue]]
speaker = "フィオナ"
# 「マグダレナさん、何かいい案はないでしょうか？　オオヒメ様の性格がわかれば、何か手が思いつくかもしれませんが……」
line = "「マグダレナさん、何かいい案はないでしょうか？　オオヒメ様の性格がわかれば、何か手が思いつくかもしれませんが……」"

[[dialogue]]
speaker = "マグダレナ"
# 「ひとつ、オオヒメの扉に打ち込める楔があります」
line = "「ひとつ、オオヒメの扉に打ち込める楔があります」"

[[dialogue]]
speaker = "アイリーン"
# 「クサビ？　お寿司に入ってる鼻がツーンってするヤツ？」
line = "「クサビ？　お寿司に入ってる鼻がツーンってするヤツ？」"

[[dialogue]]
speaker = "ソフィア"
# 「それはワサビですね」
line = "「それはワサビですね」"

[[dialogue]]
speaker = "舞亜"
# 「ひゅるるるる～、どっか～～ん」
line = "「ひゅるるるる～、どっか～～ん」"

[[dialogue]]
speaker = "ソフィア"
# 「それはハナビ！　舞亜、今は真面目な話を──」
line = "「それはハナビ！　舞亜、今は真面目な話を──」"

[[dialogue]]
speaker = "マグダレナ"
# 「それです」
line = "「それです」"

[[dialogue]]
speaker = "舞亜"
# 「え？　どれ？　どういうこと？」
line = "「え？　どれ？　どういうこと？」"

[[dialogue]]
speaker = "マグダレナ"
# 「オオヒメが好きなものは『芸』です」
line = "「オオヒメが好きなものは『芸』です」"

[[dialogue]]
speaker = "ウズメイア"
# 「芸術とか芸能の『芸』？」
line = "「芸術とか芸能の『芸』？」"

[[dialogue]]
speaker = "マグダレナ"
# 「はい。今のような漫才もですが、歌、お笑い、踊り、劇、一発芸。ジャンルは問いませんが、オオヒメは心を震わせる芸事に目がないのです」
line = "「はい。今のような漫才もですが、歌、お笑い、踊り、劇、一発芸。ジャンルは問いませんが、オオヒメは心を震わせる芸事に目がないのです」"

[[dialogue]]
speaker = "ソフィア"
# 「漫才をしていたつもりはないんですけど……」
line = "「漫才をしていたつもりはないんですけど……」"

[[dialogue]]
speaker = "マグダレナ"
# 「オオヒメの心を動かすような芸を披露すれば、神殿の奥に篭っている彼女もたまらず顔を覗かせるでしょう」
line = "「オオヒメの心を動かすような芸を披露すれば、神殿の奥に篭っている彼女もたまらず顔を覗かせるでしょう」"

[[dialogue]]
speaker = "舞亜"
# 「今の漫才じゃ掴みは弱そうだったけどね」
line = "「今の漫才じゃ掴みは弱そうだったけどね」"

[[dialogue]]
speaker = "ソフィア"
# 「だから、漫才してたつもりはないってば！」
line = "「だから、漫才してたつもりはないってば！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「つまり、一足早めの隠し芸大会を開催すればいいのね！」
line = "「つまり、一足早めの隠し芸大会を開催すればいいのね！」"

[[dialogue]]
speaker = "フィオナ"
# 「ヴィーナスさん、その言い方はあまりにも緊張感が……」
line = "「ヴィーナスさん、その言い方はあまりにも緊張感が……」"

[[dialogue]]
speaker = "マグダレナ"
# 「ふふふ、それでいいのです。今必要なのは戦いではなく、心を楽しませる芸なのですから」
line = "「ふふふ、それでいいのです。今必要なのは戦いではなく、心を楽しませる芸なのですから」"

[[dialogue]]
speaker = "ソフィア"
# 「芸なら舞亜の出番ですね！」
line = "「芸なら舞亜の出番ですね！」"

[[dialogue]]
speaker = "舞亜"
# 「え、私？　隠し芸なんてできないよ？　テーブルクロス引きとか練習した方が良いかな」
line = "「え、私？　隠し芸なんてできないよ？　テーブルクロス引きとか練習した方が良いかな」"

[[dialogue]]
speaker = "ソフィア"
# 「なんで今から新しい芸を身に着けようとするの？　舞亜にはあるでしょ、ワールドクラスのスケートが」
line = "「なんで今から新しい芸を身に着けようとするの？　舞亜にはあるでしょ、ワールドクラスのスケートが」"

[[dialogue]]
speaker = "舞亜"
# 「あ、それでいいんだ。なんとなく忘年会の余興みたいなの想像してたよ」
line = "「あ、それでいいんだ。なんとなく忘年会の余興みたいなの想像してたよ」"

[[dialogue]]
speaker = "ウズメイア"
# 「おっもしろそ～！　あたしもなんかやれるかな～？」
line = "「おっもしろそ～！　あたしもなんかやれるかな～？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「もちろん、クロトもやるのよ。ほら、星徒会のみんなを爆笑の渦に巻き込んで、ドッカンドッカンいわせた一発芸があるじゃない？」
line = "「もちろん、クロトもやるのよ。ほら、星徒会のみんなを爆笑の渦に巻き込んで、ドッカンドッカンいわせた一発芸があるじゃない？」"

[[dialogue]]
speaker = "フィオナ"
# 「緋宮会長、そんなに面白い一発芸をお持ちなんですか？」
line = "「緋宮会長、そんなに面白い一発芸をお持ちなんですか？」"

[[dialogue]]
speaker = "unk"
# やった覚えがないなぁ！？
無茶振りしないで！？
line = "やった覚えがないなぁ！？
無茶振りしないで！？"

[[dialogue]]
speaker = "アイリーン"
# 「これって世界の命運がかかってるんだよね。こんなにゆるゆるで大丈夫かなー？」
line = "「これって世界の命運がかかってるんだよね。こんなにゆるゆるで大丈夫かなー？」"

[[dialogue]]
speaker = "マグダレナ"
# 「変に緊張しているよりいいのではないでしょうか？　世界の命運がかかっていると思うと、私たちも楽しめないでしょう？」
line = "「変に緊張しているよりいいのではないでしょうか？　世界の命運がかかっていると思うと、私たちも楽しめないでしょう？」"

[[dialogue]]
speaker = "アイリーン"
# 「なるほどー。じゃあ私もリラックスしよっと」
line = "「なるほどー。じゃあ私もリラックスしよっと」"

[[dialogue]]
speaker = "マグダレナ"
# 「堕ちた天使すら天に舞い上がらせる程の芸の冴え。このような機会でなくとも是非拝見したいものです」
line = "「堕ちた天使すら天に舞い上がらせる程の芸の冴え。このような機会でなくとも是非拝見したいものです」"

[[dialogue]]
speaker = "unk"
# かくして魔界の神殿を演芸場に見立て、世界の命運をかけた隠し大会が執り行われることになった──
line = "かくして魔界の神殿を演芸場に見立て、世界の命運をかけた隠し大会が執り行われることになった──"
