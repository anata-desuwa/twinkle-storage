[[dialogue]]
speaker = "unk"
# 遡ること数分前──
line = "遡ること数分前──"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふむふむ、なるほどなるほど」
line = "「ふむふむ、なるほどなるほど」"

[[dialogue]]
speaker = "unk"
# 何を見てるんだ？
line = "何を見てるんだ？"

[[dialogue]]
speaker = "ヴィーナス"
# 「ちょっと生徒たちの資料をね。そうだ、この子たちのことは知ってる？」
line = "「ちょっと生徒たちの資料をね。そうだ、この子たちのことは知ってる？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「お悩み解決倶楽部──通称おなか部って名乗ってる子たちなんだけど」
line = "「お悩み解決倶楽部──通称おなか部って名乗ってる子たちなんだけど」"

[[dialogue]]
speaker = "ヴィーナス"
# 「なんでも非プリマステラの身ながら学内外問わず色々な人のお悩み相談に乗って回ってるそうよ。ふふ、素晴らしい奉仕精神の持ち主たちじゃない」
line = "「なんでも非プリマステラの身ながら学内外問わず色々な人のお悩み相談に乗って回ってるそうよ。ふふ、素晴らしい奉仕精神の持ち主たちじゃない」"

[[dialogue]]
speaker = "unk"
# ああ、その子たちなら知ってるよ
line = "ああ、その子たちなら知ってるよ"

[[dialogue]]
speaker = "ヴィーナス"
# 「あなたって本当に顔が広いわね……。まさかまだプリマステラになってない子たちまで網羅してるなんて……」
line = "「あなたって本当に顔が広いわね……。まさかまだプリマステラになってない子たちまで網羅してるなんて……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ま、顔見知りなら話は早いわ！　この子たちを呼び出すわよ！　あなたにも色々と協力してもらうから！」
line = "「ま、顔見知りなら話は早いわ！　この子たちを呼び出すわよ！　あなたにも色々と協力してもらうから！」"

[[dialogue]]
speaker = "unk"
# 協力って何を？
line = "協力って何を？"

[[dialogue]]
speaker = "ヴィーナス"
# 「それは始まってからのお楽しみよ♪」
line = "「それは始まってからのお楽しみよ♪」"

[[dialogue]]
speaker = "シフォン"
# 「わかってますか？　くれぐれも粗相のないようにですよ……？　相手はプリマステラよりもさらに上、星騎士たちのトップたる星徒会なんですから……！」
line = "「わかってますか？　くれぐれも粗相のないようにですよ……？　相手はプリマステラよりもさらに上、星騎士たちのトップたる星徒会なんですから……！」"

[[dialogue]]
speaker = "モナカ"
# 「う、うん。でも本当に何の用なんだろう……。モナカたち、プリマステラでもないのに……」
line = "「う、うん。でも本当に何の用なんだろう……。モナカたち、プリマステラでもないのに……」"

[[dialogue]]
speaker = "シフォン"
# 「とにかく入りましょう……！　星徒会室ってここですよね……？」
line = "「とにかく入りましょう……！　星徒会室ってここですよね……？」"

[[dialogue]]
speaker = "パルミエ"
# 「違うわよ～。その隣の部屋よ～」
line = "「違うわよ～。その隣の部屋よ～」"

[[dialogue]]
speaker = "シフォン"
# 「っっ。危ないところでした……！」
line = "「っっ。危ないところでした……！」"

[[dialogue]]
speaker = "パルミエ"
# 「それと星徒会室に入る時は、お尻で扉を開けるのがマナーよ。星徒会メンバー以外、その神聖なドアノブに触れちゃいけない決まりなの」
line = "「それと星徒会室に入る時は、お尻で扉を開けるのがマナーよ。星徒会メンバー以外、その神聖なドアノブに触れちゃいけない決まりなの」"

[[dialogue]]
speaker = "シフォン"
# 「な、なんと、流石は学園のトップたる星徒会ですね……！　わかりました、お尻で開けます……！」
line = "「な、なんと、流石は学園のトップたる星徒会ですね……！　わかりました、お尻で開けます……！」"

[[dialogue]]
speaker = "モナカ"
# 「あわわ、シフォンちゃん……。きっとそれ……」
line = "「あわわ、シフォンちゃん……。きっとそれ……」"

[[dialogue]]
speaker = "シフォン"
# 「中々、んぐっ、難しいですね……！　ふぉぉ……！　お尻が<ruby=つ>攣</ruby>りそうです……！　で、でも、やっと開い──」
line = "「中々、んぐっ、難しいですね……！　ふぉぉ……！　お尻が<ruby>攣<rt>つ</rt></ruby>りそうです……！　で、でも、やっと開い──」"

[[dialogue]]
speaker = "シフォン"
# 「って、ここ倉庫じゃないですか！？　また私のこと騙しましたね！？」
line = "「って、ここ倉庫じゃないですか！？　また私のこと騙しましたね！？」"

[[dialogue]]
speaker = "パルミエ"
# 「あはは、ホントにシフォンは疑うことを知らないわね～。からかい甲斐があるわ～」
line = "「あはは、ホントにシフォンは疑うことを知らないわね～。からかい甲斐があるわ～」"

[[dialogue]]
speaker = "シフォン"
# 「こ、このおふざけクソ女はぁ……！！」
line = "「こ、このおふざけクソ女はぁ……！！」"

[[dialogue]]
speaker = "モナカ"
# 「お、落ち着いてシフォンちゃん。きっとパルちゃんなりに緊張をほぐそうとしてくれただけだから……」
line = "「お、落ち着いてシフォンちゃん。きっとパルちゃんなりに緊張をほぐそうとしてくれただけだから……」"

[[dialogue]]
speaker = "パルミエ"
# 「よしよしモナカはよくわかってるわね～。ま、早く行きましょ。あんまり待たせると心証が悪くなっちゃうでしょ？」
line = "「よしよしモナカはよくわかってるわね～。ま、早く行きましょ。あんまり待たせると心証が悪くなっちゃうでしょ？」"

[[dialogue]]
speaker = "シフォン"
# 「誰のせいで無駄な時間を使ったと思ってるんですかっ！　今度こそこの部屋ですよねっ……？　よし、開けますよ、んぐぐぐぐっ……！」
line = "「誰のせいで無駄な時間を使ったと思ってるんですかっ！　今度こそこの部屋ですよねっ……？　よし、開けますよ、んぐぐぐぐっ……！」"

[[dialogue]]
speaker = "モナカ"
# 「えと、その……。お尻で開けなきゃいけないってマナーも嘘だから……」
line = "「えと、その……。お尻で開けなきゃいけないってマナーも嘘だから……」"

[[dialogue]]
speaker = "モナカ"
# 「し、失礼します。１年Ｅ組おなか部部長のモナカ・ヘクセンハウスです……」
line = "「し、失礼します。１年Ｅ組おなか部部長のモナカ・ヘクセンハウスです……」"

[[dialogue]]
speaker = "シフォン"
# 「２年Ｆ組おなか部副部長の、くぁ、シフォン・デビルズホープです……」
line = "「２年Ｆ組おなか部副部長の、くぁ、シフォン・デビルズホープです……」"

[[dialogue]]
speaker = "パルミエ"
# 「平部員で３年のパルミエ・ダックワーズよ～」
line = "「平部員で３年のパルミエ・ダックワーズよ～」"

[[dialogue]]
speaker = "ヴィーナス"
# 「揃ったようね。ええと……約一名なんだか様子がおかしいけど」
line = "「揃ったようね。ええと……約一名なんだか様子がおかしいけど」"

[[dialogue]]
speaker = "シフォン"
# 「き、気にしないでください。少しお尻が攣りそうなだけでして……」
line = "「き、気にしないでください。少しお尻が攣りそうなだけでして……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「まぁいいわ。早速だけど今日はあなたたちに提案があるの！」
line = "「まぁいいわ。早速だけど今日はあなたたちに提案があるの！」"

[[dialogue]]
speaker = "シフォン"
# 「提案、ですか？　廃部勧告や厳重注意ではなくて……？」
line = "「提案、ですか？　廃部勧告や厳重注意ではなくて……？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええ。あなたたち、特別試験を受けてみるつもりはないかしら？」
line = "「ええ。あなたたち、特別試験を受けてみるつもりはないかしら？」"

[[dialogue]]
speaker = "モナカ"
# 「特別試験……？　一体なんの……？」
line = "「特別試験……？　一体なんの……？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「もちろん、プリマステラになるための。よ！」
line = "「もちろん、プリマステラになるための。よ！」"

[[dialogue]]
speaker = "シフォン"
# 「へ……？　ど、どういうことですか？　私たち、ろくに自分の星力も制御できないような落第生ですよ……？」
line = "「へ……？　ど、どういうことですか？　私たち、ろくに自分の星力も制御できないような落第生ですよ……？」"

[[dialogue]]
speaker = "モナカ"
# 「う、うん……。この間の試験にも落ちちゃったところで……」
line = "「う、うん……。この間の試験にも落ちちゃったところで……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「知っているわ。だけど私はそれ以上にあなたたちの直向きで献身的な精神を評価しているの」
line = "「知っているわ。だけど私はそれ以上にあなたたちの直向きで献身的な精神を評価しているの」"

[[dialogue]]
speaker = "ヴィーナス"
# 「たとえプリマステラじゃなくとも、自分たちなりに誰かのためになろうとしている、あなたたちの健気な心根をね」
line = "「たとえプリマステラじゃなくとも、自分たちなりに誰かのためになろうとしている、あなたたちの健気な心根をね」"

[[dialogue]]
speaker = "モナカ"
# 「そんな大袈裟な話じゃ……。モナカはプリマステラにもなれない落ちこぼれ、だから……。簡単なお悩み相談に乗ることくらいしかできないだけで……」
line = "「そんな大袈裟な話じゃ……。モナカはプリマステラにもなれない落ちこぼれ、だから……。簡単なお悩み相談に乗ることくらいしかできないだけで……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふふ、その行動こそが尊いのよ。私はね、あなたたちのような人たちにこそプリマステラになってほしいと思ってるの」
line = "「ふふ、その行動こそが尊いのよ。私はね、あなたたちのような人たちにこそプリマステラになってほしいと思ってるの」"

[[dialogue]]
speaker = "シフォン"
# 「ですが特別試験って一体どんな……」
line = "「ですが特別試験って一体どんな……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それはね、これよ」
line = "「それはね、これよ」"

[[dialogue]]
speaker = "モナカ"
# 「ええと……。このお手紙は……？」
line = "「ええと……。このお手紙は……？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「星徒会に届けられた相談事よ。これがちょっと厄介な依頼でね。本当は私たちで対処したいんだけど、最近は色々な事件が起きっぱなしで手が回せないものだから」
line = "「星徒会に届けられた相談事よ。これがちょっと厄介な依頼でね。本当は私たちで対処したいんだけど、最近は色々な事件が起きっぱなしで手が回せないものだから」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そこで試験を兼ねて、あなたたちに解決してもらおうと思ったわけ。もちろんモンスター退治だとか、そういうのじゃないわ」
line = "「そこで試験を兼ねて、あなたたちに解決してもらおうと思ったわけ。もちろんモンスター退治だとか、そういうのじゃないわ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「どうかしら？　決して悪い話ではないと思うんだけど」
line = "「どうかしら？　決して悪い話ではないと思うんだけど」"

[[dialogue]]
speaker = "モナカ"
# 「星徒会さんに届いた相談を、モナカたちが……」
line = "「星徒会さんに届いた相談を、モナカたちが……」"

[[dialogue]]
speaker = "シフォン"
# 「私たちにできるのでしょうか……」
line = "「私たちにできるのでしょうか……」"

[[dialogue]]
speaker = "パルミエ"
# 「いいじゃない。受けてみれば」
line = "「いいじゃない。受けてみれば」"

[[dialogue]]
speaker = "モナカ"
# 「パ、パルちゃん……？」
line = "「パ、パルちゃん……？」"

[[dialogue]]
speaker = "パルミエ"
# 「せっかくのチャンスでしょ？　私も手伝ってあげるから」
line = "「せっかくのチャンスでしょ？　私も手伝ってあげるから」"

[[dialogue]]
speaker = "シフォン"
# 「ど、どうしたんですか？　いつもなら、いの一番に面倒くさがりますのに……」
line = "「ど、どうしたんですか？　いつもなら、いの一番に面倒くさがりますのに……」"

[[dialogue]]
speaker = "パルミエ"
# 「シフォンとモナカがプリマステラになりたがってることはよーくわかってるもの。ここで愚図るほど私もワガママじゃないわ」
line = "「シフォンとモナカがプリマステラになりたがってることはよーくわかってるもの。ここで愚図るほど私もワガママじゃないわ」"

[[dialogue]]
speaker = "パルミエ"
# 「あなたたちが落ちこぼれじゃないことも、ね？　ここでビシっとそれを証明しちゃいなさいよ」
line = "「あなたたちが落ちこぼれじゃないことも、ね？　ここでビシっとそれを証明しちゃいなさいよ」"

[[dialogue]]
speaker = "シフォン"
# 「あいたっ！？　お尻叩かないでください……！　攣りそうなんですからっ……！」
line = "「あいたっ！？　お尻叩かないでください……！　攣りそうなんですからっ……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふふ、どうやら引き受けてもらえるみたいね。なら、他の相談事もお願いしちゃおうかしら」
line = "「ふふ、どうやら引き受けてもらえるみたいね。なら、他の相談事もお願いしちゃおうかしら」"

[[dialogue]]
speaker = "パルミエ"
# 「へ…………？」
line = "「へ…………？」"

[[dialogue]]
speaker = "モナカ"
# 「わわっ……。すごいお手紙の量……。これ全部、星徒会さんに届いたお悩み相談ってこと……？」
line = "「わわっ……。すごいお手紙の量……。これ全部、星徒会さんに届いたお悩み相談ってこと……？」"

[[dialogue]]
speaker = "パルミエ"
# 「ヴィ、ヴィーナスちゃ～ん……？　なんだか話が違うんじゃないかしら～……？　依頼は１つだけのはずでしょ～……？」
line = "「ヴィ、ヴィーナスちゃ～ん……？　なんだか話が違うんじゃないかしら～……？　依頼は１つだけのはずでしょ～……？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「いいじゃない。ついでよ、ついで。それにそもそも──」
line = "「いいじゃない。ついでよ、ついで。それにそもそも──」"

[[dialogue]]
speaker = "パルミエ"
# 「待った待った！　わかった、わかったわよぉ～……！」
line = "「待った待った！　わかった、わかったわよぉ～……！」"

[[dialogue]]
speaker = "シフォン"
# 「……なんでしょう。そこはかとなく怪しい雰囲気を感じるのですが」
line = "「……なんでしょう。そこはかとなく怪しい雰囲気を感じるのですが」"

[[dialogue]]
speaker = "モナカ"
# 「うん……。パルちゃんが何か誤魔化そうとしてる時の顔……だよね？」
line = "「うん……。パルちゃんが何か誤魔化そうとしてる時の顔……だよね？」"

[[dialogue]]
speaker = "パルミエ"
# 「な、何も誤魔化してなんかないわ～。ほーら行きましょ？　試験はもう始まってるわよ～」
line = "「な、何も誤魔化してなんかないわ～。ほーら行きましょ？　試験はもう始まってるわよ～」"

[[dialogue]]
speaker = "シフォン"
# 「怪しいです……」
line = "「怪しいです……」"

[[dialogue]]
speaker = "モナカ"
# 「怪しいね……」
line = "「怪しいね……」"

[[dialogue]]
speaker = "パルミエ"
# 「何も怪しくなんてないってばぁ～！」
line = "「何も怪しくなんてないってばぁ～！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「さてクロト。あなたには試験監督兼お手伝いとしておなか部のみんなについてて欲しいんだけど。お願いできるかしら？」
line = "「さてクロト。あなたには試験監督兼お手伝いとしておなか部のみんなについてて欲しいんだけど。お願いできるかしら？」"

[[dialogue]]
speaker = "unk"
# 任せてくれ
line = "任せてくれ"

[[dialogue]]
speaker = "モナカ"
# 「あ、にぃ様がモナカたちのこと見てくれるんだ……？　えへへ、良かった。にぃ様と一緒ならモナカも緊張しないでいられそう」
line = "「あ、にぃ様がモナカたちのこと見てくれるんだ……？　えへへ、良かった。にぃ様と一緒ならモナカも緊張しないでいられそう」"

[[dialogue]]
speaker = "パルミエ"
# 「ダーリン～。私の可愛さに免じて何も言わずに試験をパスさせて～？　私の可愛いほっぺにキスさせてあげるから～♪」
line = "「ダーリン～。私の可愛さに免じて何も言わずに試験をパスさせて～？　私の可愛いほっぺにキスさせてあげるから～♪」"

[[dialogue]]
speaker = "シフォン"
# 「なんだ、みんな会長さんと知り合いだったんですね？　というかダーリンとにぃ様って、どんな呼び方ですか……」
line = "「なんだ、みんな会長さんと知り合いだったんですね？　というかダーリンとにぃ様って、どんな呼び方ですか……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それじゃおなか部のみんな、健闘を祈ってるわよ！　良い報告を期待しているわ！」
line = "「それじゃおなか部のみんな、健闘を祈ってるわよ！　良い報告を期待しているわ！」"
