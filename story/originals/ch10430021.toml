[[dialogue]]
speaker = "unk"
# 第１話,嫌よ嫌よも好きのうち,P
line = "第１話,嫌よ嫌よも好きのうち,P"

[[dialogue]]
speaker = "unk"
# サチと好意を伝え合い、恋人として付き合い始めてからしばらく経った、ある日の放課後。
line = "サチと好意を伝え合い、恋人として付き合い始めてからしばらく経った、ある日の放課後。"

[[dialogue]]
speaker = "unk"
# 俺はサチと一緒に、日課の戦闘訓練を行っていた――
line = "俺はサチと一緒に、日課の戦闘訓練を行っていた――"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「や、やった……！」
line = "「や、やった……！」"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「やりましたよ、お兄さん！　２人で、ＳＳ級モンスター討伐の両学園内、最速記録達成です♪」
line = "「やりましたよ、お兄さん！　２人で、ＳＳ級モンスター討伐の両学園内、最速記録達成です♪」"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「よっし……！　えへへへへっ♪」
line = "「よっし……！　えへへへへっ♪」"

[[dialogue]]
speaker = "unk"
# 小さくガッツポーズしながら、嬉しそうに顔をほころばせるサチ。
line = "小さくガッツポーズしながら、嬉しそうに顔をほころばせるサチ。"

[[dialogue]]
speaker = "unk"
# 我が恋人ながら……すごく可愛い
line = "我が恋人ながら……すごく可愛い"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「お、お兄さん！？　い、いきなり可愛いとか、なに言ってるんですか！？」
line = "「お、お兄さん！？　い、いきなり可愛いとか、なに言ってるんですか！？」"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「そういうのは、ムードある時じゃないと……恥ずかしくなっちゃうじゃないですか、もう<emoji=heart04>」
line = "「そういうのは、ムードある時じゃないと……恥ずかしくなっちゃうじゃないですか、もう<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# フォルトゥーナフォームは慣れてきた？
line = "フォルトゥーナフォームは慣れてきた？"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「あっ、はい♪　最初は出力が高過ぎてコントロールが大変でしたけど、お兄さんが訓練に根気強く付き合ってくれたおかげで、少しずつ加減ができるようになってきました」
line = "「あっ、はい♪　最初は出力が高過ぎてコントロールが大変でしたけど、お兄さんが訓練に根気強く付き合ってくれたおかげで、少しずつ加減ができるようになってきました」"

[[dialogue]]
speaker = "unk"
# サチの新たな戦闘服『フォルトゥーナフォーム』は、トレジアンナさんがサチ専用の魔法少女衣装として作り上げたものだ。
line = "サチの新たな戦闘服『フォルトゥーナフォーム』は、トレジアンナさんがサチ専用の魔法少女衣装として作り上げたものだ。"

[[dialogue]]
speaker = "unk"
# 起動には俺のアルケインコード発動が必要だったこともあり、実質サチのノヴァフォームであるとも言える。
line = "起動には俺のアルケインコード発動が必要だったこともあり、実質サチのノヴァフォームであるとも言える。"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「あと……お兄さんとの絆で覚醒した力でもあるので、心が繋がっている感じがして、このフォームになるとすごく安心します♪」
line = "「あと……お兄さんとの絆で覚醒した力でもあるので、心が繋がっている感じがして、このフォームになるとすごく安心します♪」"

[[dialogue]]
speaker = "unk"
# 俺はサチの頭をそっと撫でる。
line = "俺はサチの頭をそっと撫でる。"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「ん……<emoji=heart04>　えへへ♪」
line = "「ん……<emoji=heart04>　えへへ♪」"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「――お兄さんも、私と一緒に戦っていると心強い、ですか？　ふふっ♪」
line = "「――お兄さんも、私と一緒に戦っていると心強い、ですか？　ふふっ♪」"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「フォルトゥーナフォームになることが増えてから、一緒に戦っても<b>ラッキースケベ</b>が起こらなくなりましたもんね♪」
line = "「フォルトゥーナフォームになることが増えてから、一緒に戦っても<b>ラッキースケベ</b>が起こらなくなりましたもんね♪」"

[[dialogue]]
speaker = "unk"
# フォルトゥーナフォームになって進化したサチの能力は『自身だけでなく周りにも幸運を授ける』というもの。
line = "フォルトゥーナフォームになって進化したサチの能力は『自身だけでなく周りにも幸運を授ける』というもの。"

[[dialogue]]
speaker = "unk"
# 更には、サチも以前より幸運のコントロールが上手くなったこともあり、ここ最近はラッキースケベが全然発生していなかった。
line = "更には、サチも以前より幸運のコントロールが上手くなったこともあり、ここ最近はラッキースケベが全然発生していなかった。"

[[dialogue]]
speaker = "サチ（覚醒）"
# （まあ、ちょっと寂しい気もするから、たまになら起きてくれても……）
line = "（まあ、ちょっと寂しい気もするから、たまになら起きてくれても……）"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「――いえ、なんでもないです！　お兄さん、訓練の続きをしましょう！」
line = "「――いえ、なんでもないです！　お兄さん、訓練の続きをしましょう！」"

[[dialogue]]
speaker = "unk"
# それから、俺たちは１対１の模擬戦をすることになった。
line = "それから、俺たちは１対１の模擬戦をすることになった。"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「ルーレットフルスロットル！　――フォーチュンバースト！」
line = "「ルーレットフルスロットル！　――フォーチュンバースト！」"

[[dialogue]]
speaker = "unk"
# 幸運の力、今日こそ突破してみせる！
line = "幸運の力、今日こそ突破してみせる！"

[[dialogue]]
speaker = "unk"
# 俺はサチの攻撃をわざと受けて防御しながら、そのまま接近戦に持ち込む。
line = "俺はサチの攻撃をわざと受けて防御しながら、そのまま接近戦に持ち込む。"

[[dialogue]]
speaker = "unk"
# 彼女も怯まず、それを受けて立とうとする。――が、その時だった。
line = "彼女も怯まず、それを受けて立とうとする。――が、その時だった。"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「きゃっ！？」
line = "「きゃっ！？」"

[[dialogue]]
speaker = "unk"
# 俺たちは同時にいきなりバランスを崩して、もつれるように転んでしまい……俺がサチを押し倒すような格好になってしまった。
line = "俺たちは同時にいきなりバランスを崩して、もつれるように転んでしまい……俺がサチを押し倒すような格好になってしまった。"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「あ……」
line = "「あ……」"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「お、起きちゃいましたね……ラッキースケベ……<emoji=heart04>」
line = "「お、起きちゃいましたね……ラッキースケベ……<emoji=heart04>」"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「あっ！　わざとじゃないですよ！？　でも……」
line = "「あっ！　わざとじゃないですよ！？　でも……」"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「最近起こらなくて寂しいって、ちょっと思っちゃったせい、かもしれません……」
line = "「最近起こらなくて寂しいって、ちょっと思っちゃったせい、かもしれません……」"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「で、でも、今は訓練中ですから……」
line = "「で、でも、今は訓練中ですから……」"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「エッチなことは禁止ですよ？　お兄さん……<emoji=heart04>」
line = "「エッチなことは禁止ですよ？　お兄さん……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そう言いつつも、俺を見上げるサチの瞳は、熱を帯びたように潤んでいて。
line = "そう言いつつも、俺を見上げるサチの瞳は、熱を帯びたように潤んでいて。"

[[dialogue]]
speaker = "unk"
# それに吸い込まれるように、俺は彼女に顔を近づけて――
line = "それに吸い込まれるように、俺は彼女に顔を近づけて――"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「あっ<emoji=heart04>　お兄さん……ダメ……<emoji=heart04>」
line = "「あっ<emoji=heart04>　お兄さん……ダメ……<emoji=heart04>」"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「んっ……<emoji=heart04>　ちゅっ<emoji=heart04>」
line = "「んっ……<emoji=heart04>　ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「はぁ……<emoji=heart04>　こんなところで、キスしちゃうなんて……エッチです……<emoji=heart04>」
line = "「はぁ……<emoji=heart04>　こんなところで、キスしちゃうなんて……エッチです……<emoji=heart04>」"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「ちゅっ……<emoji=heart04>　んちゅっ<emoji=heart04>」
line = "「ちゅっ……<emoji=heart04>　んちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# と、その時。
line = "と、その時。"

[[dialogue]]
speaker = "プリムラ"
# 「お～い、サチ！　我も訓練に付き合ってやるのじゃ。感謝せい……って」
line = "「お～い、サチ！　我も訓練に付き合ってやるのじゃ。感謝せい……って」"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「え」
line = "「え」"

[[dialogue]]
speaker = "プリムラ"
# 「……破廉恥の訓練じゃったか。このムッツリドスケベめ」
line = "「……破廉恥の訓練じゃったか。このムッツリドスケベめ」"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「プリムラっ！？　ちちち、違っ、これは……！」
line = "「プリムラっ！？　ちちち、違っ、これは……！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「ありゃりゃ～、むふふ♪　お２人共、お盛んですね～☆」
line = "「ありゃりゃ～、むふふ♪　お２人共、お盛んですね～☆」"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「ち――」
line = "「ち――」"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「違うんです～～～っ！　これは不慮の事故だったんですぅ～～～っ！！！」
line = "「違うんです～～～っ！　これは不慮の事故だったんですぅ～～～っ！！！」"

[[dialogue]]
speaker = "unk"
# 顔を赤くして叫ぶサチだったが、『幸運体質』であるが故に、決して信じてもらえないのだった――
line = "顔を赤くして叫ぶサチだったが、『幸運体質』であるが故に、決して信じてもらえないのだった――"
