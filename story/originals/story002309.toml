[[dialogue]]
speaker = "コハルコ"
# 「はぁ……すっかり騙されちゃったな」
line = "「はぁ……すっかり騙されちゃったな」"

[[dialogue]]
speaker = "unk"
# コハルコは結界に囚われながら、秋葉原を観ていた。その精神は結界と同化しつつあり、一方的に情報が流れ込んでくる。
line = "コハルコは結界に囚われながら、秋葉原を観ていた。その精神は結界と同化しつつあり、一方的に情報が流れ込んでくる。"

[[dialogue]]
speaker = "コハルコ"
# 「このままだと、秋葉原が秋葉原じゃなくなっちゃう。会長さんたちが頑張ってくれてるけど、私だって秋葉原を守らないと」
line = "「このままだと、秋葉原が秋葉原じゃなくなっちゃう。会長さんたちが頑張ってくれてるけど、私だって秋葉原を守らないと」"

[[dialogue]]
speaker = "コハルコ"
# 「星力は結界に吸収されて使えない。でも魔力を暴走させるくらいはできるはず……！」
line = "「星力は結界に吸収されて使えない。でも魔力を暴走させるくらいはできるはず……！」"

[[dialogue]]
speaker = "コハルコ"
# 「加減なしでやったら体がどうなるかわからないけど、まぁその時はその時で」
line = "「加減なしでやったら体がどうなるかわからないけど、まぁその時はその時で」"

[[dialogue]]
speaker = "コハルコ"
# 「……お父さん、もう騙されないでね。次は助けてあげられないから……騙されやすいのはお父さん譲りなのかな？　なんてね」
line = "「……お父さん、もう騙されないでね。次は助けてあげられないから……騙されやすいのはお父さん譲りなのかな？　なんてね」"

[[dialogue]]
speaker = "コハルコ"
# 「お母さんはくれぐれも体を大切にして。お母さんのシチュー、大好きだったよ」
line = "「お母さんはくれぐれも体を大切にして。お母さんのシチュー、大好きだったよ」"

[[dialogue]]
speaker = "コハルコ"
# 「ナツコ、トウコ。バカなお姉ちゃんでごめん。ふたりとも仲良くね……」
line = "「ナツコ、トウコ。バカなお姉ちゃんでごめん。ふたりとも仲良くね……」"

[[dialogue]]
speaker = "？？？"
# （…………さい）
line = "（…………さい）"

[[dialogue]]
speaker = "コハルコ"
# 「え、誰かの声？」
line = "「え、誰かの声？」"

[[dialogue]]
speaker = "？？？"
# 「フライドチキンください。私は今、あなたの心に直接話しかけています」
line = "「フライドチキンください。私は今、あなたの心に直接話しかけています」"

[[dialogue]]
speaker = "コハルコ"
# 「この人、私の心に直接！？　え、誰、誰なの！？」
line = "「この人、私の心に直接！？　え、誰、誰なの！？」"

[[dialogue]]
speaker = "トリュファイナ"
# 「申し遅れました。私、第７代光の魔女トリュファイナと申します」
line = "「申し遅れました。私、第７代光の魔女トリュファイナと申します」"

[[dialogue]]
speaker = "トリュファイナ"
# 「現代では通信魔法の際はこれが作法だと伺ったのですが、どうやら違っていたようですね。たいへん失礼いたしました」
line = "「現代では通信魔法の際はこれが作法だと伺ったのですが、どうやら違っていたようですね。たいへん失礼いたしました」"

[[dialogue]]
speaker = "コハルコ"
# 「悪いインターネッツに毒されてる！　……え、今、光の魔女って……？」
line = "「悪いインターネッツに毒されてる！　……え、今、光の魔女って……？」"

[[dialogue]]
speaker = "トリュファイナ"
# 「はいっ！　私、光の魔女ですっ！　……とはいえ、死後、世界樹に残された残留思念なのですが」
line = "「はいっ！　私、光の魔女ですっ！　……とはいえ、死後、世界樹に残された残留思念なのですが」"

[[dialogue]]
speaker = "トリュファイナ"
# 「コハルコ様は以前、世界樹を通じて魔界と通信なさったことがありましたよね？　あの時からあなた様を傍から見守っておりました」
line = "「コハルコ様は以前、世界樹を通じて魔界と通信なさったことがありましたよね？　あの時からあなた様を傍から見守っておりました」"

[[dialogue]]
speaker = "コハルコ"
# 「トリュファイナ様……。光の魔女としては、あなたが私のオリジナル……なんですよね？」
line = "「トリュファイナ様……。光の魔女としては、あなたが私のオリジナル……なんですよね？」"

[[dialogue]]
speaker = "トリュファイナ"
# 「ええ……確かに、そうかもしれません。ですが、そのような大層なものではありません。コハルコ様、あなたはあなたなのです。誰かの偽物ではないのです」
line = "「ええ……確かに、そうかもしれません。ですが、そのような大層なものではありません。コハルコ様、あなたはあなたなのです。誰かの偽物ではないのです」"

[[dialogue]]
speaker = "トリュファイナ"
# 「私たちは同じ力を持つ者同士。せっかくですから、もっと仲良くいたしましょう？」
line = "「私たちは同じ力を持つ者同士。せっかくですから、もっと仲良くいたしましょう？」"

[[dialogue]]
speaker = "トリュファイナ"
# 「私をお姉ちゃんだと思って、なんでも相談してください。あなたが妹様にそうしていたように、私もあなたを受け止めます」
line = "「私をお姉ちゃんだと思って、なんでも相談してください。あなたが妹様にそうしていたように、私もあなたを受け止めます」"

[[dialogue]]
speaker = "コハルコ"
# 「トリュファイナ……さん」
line = "「トリュファイナ……さん」"

[[dialogue]]
speaker = "トリュファイナ"
# 「昔話をいたしましょう」
line = "「昔話をいたしましょう」"

[[dialogue]]
speaker = "トリュファイナ"
# 「かつて、世界を救った英雄がおりました。彼は世界を救うため、仲間を率いて厄災と戦いました。戦いに勝利こそしましたが、厄災は彼の心身を蝕んでいました」
line = "「かつて、世界を救った英雄がおりました。彼は世界を救うため、仲間を率いて厄災と戦いました。戦いに勝利こそしましたが、厄災は彼の心身を蝕んでいました」"

[[dialogue]]
speaker = "トリュファイナ"
# 「英雄には特別な力がありました。その力を残すため、彼は自らの生涯を閉じることを選んだのです」
line = "「英雄には特別な力がありました。その力を残すため、彼は自らの生涯を閉じることを選んだのです」"

[[dialogue]]
speaker = "トリュファイナ"
# 「美しい自己犠牲だと、思われますか？」
line = "「美しい自己犠牲だと、思われますか？」"

[[dialogue]]
speaker = "トリュファイナ"
# 「……私はそうは思いません」
line = "「……私はそうは思いません」"

[[dialogue]]
speaker = "トリュファイナ"
# 「もちろん、力が及ばないときもあるでしょう。他に手段がないときもあるでしょう。けれど、けれど……」
line = "「もちろん、力が及ばないときもあるでしょう。他に手段がないときもあるでしょう。けれど、けれど……」"

[[dialogue]]
speaker = "トリュファイナ"
# 「自己犠牲が最後の手段なんて、寂しいではありませんか」
line = "「自己犠牲が最後の手段なんて、寂しいではありませんか」"

[[dialogue]]
speaker = "トリュファイナ"
# 「コハルコ様。私はよく知っております。あなたはたくさんの人を助けてきました。星騎士として、オペレーターとして、あるいはハッカーとして」
line = "「コハルコ様。私はよく知っております。あなたはたくさんの人を助けてきました。星騎士として、オペレーターとして、あるいはハッカーとして」"

[[dialogue]]
speaker = "トリュファイナ"
# 「でも、それと同じくらい、いえ、それ以上にあなたを助けたいと思っている人もいるのです」
line = "「でも、それと同じくらい、いえ、それ以上にあなたを助けたいと思っている人もいるのです」"

[[dialogue]]
speaker = "トリュファイナ"
# 「それは、苦しめられる人々を捨て置けない正義と、誰かを大切に思う愛をあなたが持っているから」
line = "「それは、苦しめられる人々を捨て置けない正義と、誰かを大切に思う愛をあなたが持っているから」"

[[dialogue]]
speaker = "トリュファイナ"
# 「困ったことや大変なことがあったら、泣いて喚いてでも、助けを求めてください。きっと誰かが助けてくれるはずです」
line = "「困ったことや大変なことがあったら、泣いて喚いてでも、助けを求めてください。きっと誰かが助けてくれるはずです」"

[[dialogue]]
speaker = "トリュファイナ"
# 「どうか独りで絶望しないで──あなたの中の光を、そして傍にある光を信じてあげてください」
line = "「どうか独りで絶望しないで──あなたの中の光を、そして傍にある光を信じてあげてください」"

[[dialogue]]
speaker = "コハルコ"
# 「……じゃあ、望みを言っても、いいですか？」
line = "「……じゃあ、望みを言っても、いいですか？」"

[[dialogue]]
speaker = "トリュファイナ"
# 「はい、もちろん」
line = "「はい、もちろん」"

[[dialogue]]
speaker = "コハルコ"
# 「お父さんと一緒にパソコン組みたい、お母さんの作ったシチューが食べたい、ナツコとトウコに服もおもちゃも買ってあげたい……ずっとずっと、家族みんなで一緒にいたい！」
line = "「お父さんと一緒にパソコン組みたい、お母さんの作ったシチューが食べたい、ナツコとトウコに服もおもちゃも買ってあげたい……ずっとずっと、家族みんなで一緒にいたい！」"

[[dialogue]]
speaker = "コハルコ"
# 「よく考えたら買ったゲームも積んだままだし、死んでるヒマなんかない！」
line = "「よく考えたら買ったゲームも積んだままだし、死んでるヒマなんかない！」"

[[dialogue]]
speaker = "コハルコ"
# 「私は、まだまだ、生きていたい！」
line = "「私は、まだまだ、生きていたい！」"

[[dialogue]]
speaker = "トリュファイナ"
# 「ふふっ、よく言えました。私から贈り物を……」
line = "「ふふっ、よく言えました。私から贈り物を……」"

[[dialogue]]
speaker = "コハルコ"
# 「これは……？」
line = "「これは……？」"

[[dialogue]]
speaker = "unk"
# トリュファイナが袖から出した光の玉。ずっしりと重く、暖かいようで、どこか恐ろしい。
line = "トリュファイナが袖から出した光の玉。ずっしりと重く、暖かいようで、どこか恐ろしい。"

[[dialogue]]
speaker = "トリュファイナ"
# 「禁じられた光の魔法です。とても危険なものですが、あなたならきっと、正しく使うことができるでしょう」
line = "「禁じられた光の魔法です。とても危険なものですが、あなたならきっと、正しく使うことができるでしょう」"

[[dialogue]]
speaker = "トリュファイナ"
# 「お迎えがいらっしゃったようですね」
line = "「お迎えがいらっしゃったようですね」"

[[dialogue]]
speaker = "コハルコ"
# 「トリュファイナさん。また、会えますか？」
line = "「トリュファイナさん。また、会えますか？」"

[[dialogue]]
speaker = "トリュファイナ"
# 「ええ、きっと。さぁ、新たな光の魔女の目覚めの時ですっ！」
line = "「ええ、きっと。さぁ、新たな光の魔女の目覚めの時ですっ！」"

[[dialogue]]
speaker = "コハルコ"
# 「はい、行ってきます！」
line = "「はい、行ってきます！」"

[[dialogue]]
speaker = "イザベラ"
# 『結界が……破られた……？　レイラの仕業……ね……』
line = "『結界が……破られた……？　レイラの仕業……ね……』"

[[dialogue]]
speaker = "イザベラ"
# 『────っ！？　この魔力はっ！』
line = "『────っ！？　この魔力はっ！』"

[[dialogue]]
speaker = "コハルコ"
# 「この命は紛い物なのかもしれない。でも、この心は本物だから」
line = "「この命は紛い物なのかもしれない。でも、この心は本物だから」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「私は朝比奈コハルコ。朝比奈家の長女で、ナツコとトウコのお姉ちゃん！　すみませんが、家族が待ってるので、家に帰らせてもらいます！」
line = "「私は朝比奈コハルコ。朝比奈家の長女で、ナツコとトウコのお姉ちゃん！　すみませんが、家族が待ってるので、家に帰らせてもらいます！」"
