[[dialogue]]
speaker = "unk"
# ボスの１人、マハムートのシャドウと戦う為に用意された仮想空間は、魔界の環境を再現したものだった。
line = "ボスの１人、マハムートのシャドウと戦う為に用意された仮想空間は、魔界の環境を再現したものだった。"

[[dialogue]]
speaker = "unk"
# そして、そこには学園最強の一角と称される、もう１人の寮長が足を踏み入れていた――
line = "そして、そこには学園最強の一角と称される、もう１人の寮長が足を踏み入れていた――"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ごきげんよう。しばらくぶりですわね、サーシャ」
line = "「ごきげんよう。しばらくぶりですわね、サーシャ」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「うふふ、久しぶり～♪　ヒルディーちゃん、やっぱりマムに挑みに来たのね～」
line = "「うふふ、久しぶり～♪　ヒルディーちゃん、やっぱりマムに挑みに来たのね～」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ええ。次の<b>星霊祭</b>に向けて、いい予行演習になりますから」
line = "「ええ。次の<b>星霊祭</b>に向けて、いい予行演習になりますから」"

[[dialogue]]
speaker = "フェニエル"
# 「サーシャ先輩、ごきげんようですっ」
line = "「サーシャ先輩、ごきげんようですっ」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「あら～、フニちゃ～ん♪　お姉ちゃん、会いたかったわ～♪　ぎゅ～っ<emoji=heart04>」
line = "「あら～、フニちゃ～ん♪　お姉ちゃん、会いたかったわ～♪　ぎゅ～っ<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
# 「ぁ、えへへっ。サーシャ先輩のハグ、なんか照れ臭くなっちゃいます……」
line = "「ぁ、えへへっ。サーシャ先輩のハグ、なんか照れ臭くなっちゃいます……」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「サーシャ、するなとは言いませんけど、程々に加減して下さいね。フニがソフィアに嫉妬されてしまいますわ」
line = "「サーシャ、するなとは言いませんけど、程々に加減して下さいね。フニがソフィアに嫉妬されてしまいますわ」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「は～い♪」
line = "「は～い♪」"

[[dialogue]]
speaker = "アニマ（覚醒）"
# 「おや、珍しい組み合わせだナ。サーシャ、ヒルディー」
line = "「おや、珍しい組み合わせだナ。サーシャ、ヒルディー」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「アニマちゃん！　それに――シュティレちゃんも♪」
line = "「アニマちゃん！　それに――シュティレちゃんも♪」"

[[dialogue]]
speaker = "シュティレ"
# 「こんにちは、サーシャお姉ちゃん。錬金術の弟子として、師匠と共に参戦しに来ました。ぶい」
line = "「こんにちは、サーシャお姉ちゃん。錬金術の弟子として、師匠と共に参戦しに来ました。ぶい」"

[[dialogue]]
speaker = "unk"
# 指をピースさせて、Ｖサインを作りながら言うシュティレ。
line = "指をピースさせて、Ｖサインを作りながら言うシュティレ。"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「あ～ん、お姉ちゃんって呼んでくれてありがと～♪　シュティレちゃんにもお姉ちゃんから、挨拶のハグ～♪　ぎゅ～っ<emoji=heart04>」
line = "「あ～ん、お姉ちゃんって呼んでくれてありがと～♪　シュティレちゃんにもお姉ちゃんから、挨拶のハグ～♪　ぎゅ～っ<emoji=heart04>」"

[[dialogue]]
speaker = "シュティレ"
# 「おぅ。サーシャお姉ちゃんのいい匂いと柔らかさで、シュティレの回路が熱くなり、処理遅延が発生してしまいます」
line = "「おぅ。サーシャお姉ちゃんのいい匂いと柔らかさで、シュティレの回路が熱くなり、処理遅延が発生してしまいます」"

[[dialogue]]
speaker = "アニマ（覚醒）"
# 「あら～♪　というやつだな。フヒ♪」
line = "「あら～♪　というやつだな。フヒ♪」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「そうだわ、私、マトイちゃんとここに来たんだけど、さっきそこで――」
line = "「そうだわ、私、マトイちゃんとここに来たんだけど、さっきそこで――」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「サーシャさ～ん！　あっ、みなさん集まって来てますね。こんにちは～」
line = "「サーシャさ～ん！　あっ、みなさん集まって来てますね。こんにちは～」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「マトイ、ごきげんよう。って、そちらは――」
line = "「マトイ、ごきげんよう。って、そちらは――」"

[[dialogue]]
speaker = "セシア"
# 「こんにちは、ヒルディオーネ。私もマムと遊ぼうと思ってやって来たわ♪　その上、マトイママともこうして会えたから、一石二鳥ね♪」
line = "「こんにちは、ヒルディオーネ。私もマムと遊ぼうと思ってやって来たわ♪　その上、マトイママともこうして会えたから、一石二鳥ね♪」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「守護天使のセシア様。あ、相変わらず行動基準がブレませんわね……」
line = "「守護天使のセシア様。あ、相変わらず行動基準がブレませんわね……」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「あはは……なんで私がママ判定なのかは、未だにピンと来てないんですが……。ヒルディオーネ先輩の方が明らかにカリスマ性あるのに」
line = "「あはは……なんで私がママ判定なのかは、未だにピンと来てないんですが……。ヒルディオーネ先輩の方が明らかにカリスマ性あるのに」"

[[dialogue]]
speaker = "セシア"
# 「母性とカリスマ性は異なるものよ、マトイママ。残念ながら、ヒルディオーネはママではないわ。寮生が呼んでいる通り『お姉様』が相応しいわね」
line = "「母性とカリスマ性は異なるものよ、マトイママ。残念ながら、ヒルディオーネはママではないわ。寮生が呼んでいる通り『お姉様』が相応しいわね」"

[[dialogue]]
speaker = "フェニエル"
# 「セッシーちゃん、ごきげんよう♪」
line = "「セッシーちゃん、ごきげんよう♪」"

[[dialogue]]
speaker = "セシア"
# 「フニ♪　あなたもここに来ていたのね。マトイママに不死鳥も加わって、まさに一石三鳥だわ。ふふふっ♪」
line = "「フニ♪　あなたもここに来ていたのね。マトイママに不死鳥も加わって、まさに一石三鳥だわ。ふふふっ♪」"

[[dialogue]]
speaker = "シュティレ"
# 「こんにちは。セシアさんもいらっしゃったのですね」
line = "「こんにちは。セシアさんもいらっしゃったのですね」"

[[dialogue]]
speaker = "セシア"
# 「シュティレ、あなたも一緒だったのね。アニマと一緒に来たのかしら？」
line = "「シュティレ、あなたも一緒だったのね。アニマと一緒に来たのかしら？」"

[[dialogue]]
speaker = "アニマ（覚醒）"
# 「そういえば、シュティレは附属校でセシアと同じクラスと言っていたナ？」
line = "「そういえば、シュティレは附属校でセシアと同じクラスと言っていたナ？」"

[[dialogue]]
speaker = "シュティレ"
# 「はい、実はそうなのです。ただ、クラスで話したりもしますが……セシアさんはよくママを探しに行ってしまう為、友好度ゲージをなかなか上げられない状態です」
line = "「はい、実はそうなのです。ただ、クラスで話したりもしますが……セシアさんはよくママを探しに行ってしまう為、友好度ゲージをなかなか上げられない状態です」"

[[dialogue]]
speaker = "セシア"
# 「あら、そうだったの？　ごめんなさい。私、てっきり友達としてもう仲良くなっているつもりでいたわ」
line = "「あら、そうだったの？　ごめんなさい。私、てっきり友達としてもう仲良くなっているつもりでいたわ」"

[[dialogue]]
speaker = "シュティレ"
# 「なんと、友達だと認識してくれていたのですね。これは朗報です。後で改めてじっくりお話したいところではありますが……」
line = "「なんと、友達だと認識してくれていたのですね。これは朗報です。後で改めてじっくりお話したいところではありますが……」"

[[dialogue]]
speaker = "シュティレ"
# 「シュティレはこの機会に、実はヒルディオーネ先輩ともお近づきになりたいと思っていたのです」
line = "「シュティレはこの機会に、実はヒルディオーネ先輩ともお近づきになりたいと思っていたのです」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「え？　私ですの？」
line = "「え？　私ですの？」"

[[dialogue]]
speaker = "シュティレ"
# 「はい。何故ならシュティレは――」
line = "「はい。何故ならシュティレは――」"

[[dialogue]]
speaker = "シュティレ"
# 「ヒルディオーネ先輩のドリルにロマンを感じているからなのです！」
line = "「ヒルディオーネ先輩のドリルにロマンを感じているからなのです！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ろ、ロマン？」
line = "「ろ、ロマン？」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「あら～♪　そういうことね～」
line = "「あら～♪　そういうことね～」"

[[dialogue]]
speaker = "シュティレ"
# 「ヒルディオーネ先輩が強くなるにつれ、その形へと進化してきたという『ドリルランス』！　そして、乱れなく美しい螺旋を描く、縦ロールヘアー！」
line = "「ヒルディオーネ先輩が強くなるにつれ、その形へと進化してきたという『ドリルランス』！　そして、乱れなく美しい螺旋を描く、縦ロールヘアー！」"

[[dialogue]]
speaker = "シュティレ"
# 「まさにドリルの体現者！　シュティレ的にはぶいぶいぶいの、ぶいっなのです！」
line = "「まさにドリルの体現者！　シュティレ的にはぶいぶいぶいの、ぶいっなのです！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「そ、そうなんですの？　まあ、この千園寺ヒルディオーネのトレードマークのようなものですから、当然ですわね！　おほほほほほっ♪」
line = "「そ、そうなんですの？　まあ、この千園寺ヒルディオーネのトレードマークのようなものですから、当然ですわね！　おほほほほほっ♪」"

[[dialogue]]
speaker = "ヒルディオーネ"
# （本当は特別ドリルにこだわりがあるわけではなくて、髪もただの癖っ毛、ドリルも何故か勝手にそうなっただけなのですけれど……）
line = "（本当は特別ドリルにこだわりがあるわけではなくて、髪もただの癖っ毛、ドリルも何故か勝手にそうなっただけなのですけれど……）"

[[dialogue]]
speaker = "シャドウマハムート"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "フェニエル"
# 「！　お姉様、マムのシャドウが現れました！」
line = "「！　お姉様、マムのシャドウが現れました！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ええ。察知してましたわ」
line = "「ええ。察知してましたわ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「それでは、歓談はここまでにして――全力で行きますわよ！」
line = "「それでは、歓談はここまでにして――全力で行きますわよ！」"

[[dialogue]]
speaker = "フェニエル"
# 「はい、お姉様！」
line = "「はい、お姉様！」"

[[dialogue]]
speaker = "unk"
# ヒルディオーネが武器を構えたのを合図に、シャドウマハムートとの戦いが開始されるのだった――
line = "ヒルディオーネが武器を構えたのを合図に、シャドウマハムートとの戦いが開始されるのだった――"
