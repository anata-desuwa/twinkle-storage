[[dialogue]]
speaker = "unk"
# 第１話,ドスケベ陰陽師でごめんやす♥,P
line = "第１話,ドスケベ陰陽師でごめんやす♥,P"

[[dialogue]]
speaker = "unk"
# ある日、俺がマトイと星徒会室で書類作業をしていると、１人の女生徒が訪ねて来た――
line = "ある日、俺がマトイと星徒会室で書類作業をしていると、１人の女生徒が訪ねて来た――"

[[dialogue]]
speaker = "ミヤハル"
# 「ごめんやす<emoji=heart04>」
line = "「ごめんやす<emoji=heart04>」"

[[dialogue]]
speaker = "ミヤハル"
# 「会長は～ん<emoji=heart04>　今日もうちとええことしまひょ<emoji=heart04>」
line = "「会長は～ん<emoji=heart04>　今日もうちとええことしまひょ<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
# 「また来たの～？　ミヤハル」
line = "「また来たの～？　ミヤハル」"

[[dialogue]]
speaker = "ミヤハル"
# 「あらぁ、マトイもおったんやねぇ<emoji=heart04>」
line = "「あらぁ、マトイもおったんやねぇ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 彼女は、流星学園２年生の<ruby=あべの>安倍野</ruby>ミヤハル。
line = "彼女は、流星学園２年生の<ruby>安倍野<rt>あべの</rt></ruby>ミヤハル。"

[[dialogue]]
speaker = "unk"
# 日本で高い知名度を誇る陰陽師・<ruby=あべのせいめい>安倍晴明</ruby>の子孫で、巫女の力と陰陽術を操るプリマステラである。
line = "日本で高い知名度を誇る陰陽師・<ruby>安倍晴明<rt>あべのせいめい</rt></ruby>の子孫で、巫女の力と陰陽術を操るプリマステラである。"

[[dialogue]]
speaker = "unk"
# 最近、マトイとルリエルが巫女フォームの修業でお世話になった時に知り合い、それ以来ちょくちょく訪ねて来るようになっていた。
line = "最近、マトイとルリエルが巫女フォームの修業でお世話になった時に知り合い、それ以来ちょくちょく訪ねて来るようになっていた。"

[[dialogue]]
speaker = "マトイ"
# 「それで？　今日は何の用で来たわけ？」
line = "「それで？　今日は何の用で来たわけ？」"

[[dialogue]]
speaker = "ミヤハル"
# 「ふふっ、決まっとりますやろ？」
line = "「ふふっ、決まっとりますやろ？」"

[[dialogue]]
speaker = "ミヤハル"
# 「それはもちろん、会長はんとセッ――」
line = "「それはもちろん、会長はんとセッ――」"

[[dialogue]]
speaker = "マトイ"
# 「ぎゃーーーっ！？！？　ちょっとはオブラートに包んでっ！！」
line = "「ぎゃーーーっ！？！？　ちょっとはオブラートに包んでっ！！」"

[[dialogue]]
speaker = "ミヤハル"
# 「あっ<emoji=heart04>　せっかくやし、マトイも一緒に３Ｐしなはる？」
line = "「あっ<emoji=heart04>　せっかくやし、マトイも一緒に３Ｐしなはる？」"

[[dialogue]]
speaker = "マトイ"
# 「するかっ！」
line = "「するかっ！」"

[[dialogue]]
speaker = "ミヤハル"
# 「そうなん？　残念やわぁ<emoji=heart04>」
line = "「そうなん？　残念やわぁ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ――とまぁ、実は彼女はこんな感じで、えっちな発言を涼しい顔で言いまくる残念京美人だったりする。
line = "――とまぁ、実は彼女はこんな感じで、えっちな発言を涼しい顔で言いまくる残念京美人だったりする。"

[[dialogue]]
speaker = "unk"
# おかげで、流星学園では『歩く１８禁』という二つ名である意味恐れられてしまっているとか……本人は全く気にしていないようだが。
line = "おかげで、流星学園では『歩く１８禁』という二つ名である意味恐れられてしまっているとか……本人は全く気にしていないようだが。"

[[dialogue]]
speaker = "ミヤハル"
# 「会長はん、マトイは遠慮するみたいやし――」
line = "「会長はん、マトイは遠慮するみたいやし――」"

[[dialogue]]
speaker = "ミヤハル"
# 「このまま２人だけでリゾート結界に行って、コテージのベッドで休憩しまひょ<emoji=heart04>」
line = "「このまま２人だけでリゾート結界に行って、コテージのベッドで休憩しまひょ<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
# 「こらこら！　当たり前のように会長の腕に抱き着くのをやめいっ！」
line = "「こらこら！　当たり前のように会長の腕に抱き着くのをやめいっ！」"

[[dialogue]]
speaker = "マトイ"
# 「というか、そんな言い方ばっかりしてると、本当にそういうことしているみたいに聞こえるからね！？」
line = "「というか、そんな言い方ばっかりしてると、本当にそういうことしているみたいに聞こえるからね！？」"

[[dialogue]]
speaker = "ミヤハル"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "マトイ"
# 「えっ、なんで急に黙ったの！？　待って！　まさか本当にしちゃったの、会長！？」
line = "「えっ、なんで急に黙ったの！？　待って！　まさか本当にしちゃったの、会長！？」"

[[dialogue]]
speaker = "unk"
# いやいやいや！　してないよ！？
line = "いやいやいや！　してないよ！？"

[[dialogue]]
speaker = "ミヤハル"
# 「ぷっ……ふふふふっ<emoji=heart04>　嘘やよ～<emoji=heart04>」
line = "「ぷっ……ふふふふっ<emoji=heart04>　嘘やよ～<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
# 「なっ！？　も～！　このドスケベ陰陽師ぃ～！」
line = "「なっ！？　も～！　このドスケベ陰陽師ぃ～！」"

[[dialogue]]
speaker = "unk"
# ２人は仲が良いなぁ
line = "２人は仲が良いなぁ"

[[dialogue]]
speaker = "マトイ"
# 「どこがかな！？」
line = "「どこがかな！？」"

[[dialogue]]
speaker = "ミヤハル"
# 「え～、マトイのいけず～<emoji=heart04>　夜遅くまで、性癖を語り合った仲やろ？」
line = "「え～、マトイのいけず～<emoji=heart04>　夜遅くまで、性癖を語り合った仲やろ？」"

[[dialogue]]
speaker = "マトイ"
# 「し～っ！　し～っ！　それは会長に言わないって約束したでしょ！？」
line = "「し～っ！　し～っ！　それは会長に言わないって約束したでしょ！？」"

[[dialogue]]
speaker = "マトイ"
# 「あ～もうっ！　星徒会の仕事中なんだから、邪魔するなら帰って！」
line = "「あ～もうっ！　星徒会の仕事中なんだから、邪魔するなら帰って！」"

[[dialogue]]
speaker = "ミヤハル"
# 「あんっ<emoji=heart04>　酷いわぁ。うち、せっかく今日はええもん持って来たのに～」
line = "「あんっ<emoji=heart04>　酷いわぁ。うち、せっかく今日はええもん持って来たのに～」"

[[dialogue]]
speaker = "マトイ"
# 「何よ、いいものって？」
line = "「何よ、いいものって？」"

[[dialogue]]
speaker = "ミヤハル"
# 「浅草にスイーツカフェやってる知り合いがおってな？　今度開店１０周年記念とかで、そこの無料クーポンを貰ったんよ」
line = "「浅草にスイーツカフェやってる知り合いがおってな？　今度開店１０周年記念とかで、そこの無料クーポンを貰ったんよ」"

[[dialogue]]
speaker = "ミヤハル"
# 「せやから、ルリはんやトマルはんも誘って、今度の休日に一緒にでもどうかな～って」
line = "「せやから、ルリはんやトマルはんも誘って、今度の休日に一緒にでもどうかな～って」"

[[dialogue]]
speaker = "マトイ"
# 「えっ！？　行く行く！　そういう話なら普通に誘ってよ！　スイーツ大好きだし！」
line = "「えっ！？　行く行く！　そういう話なら普通に誘ってよ！　スイーツ大好きだし！」"

[[dialogue]]
speaker = "マトイ"
# 「ていうか、ちゃんとした用事があるなら、最初のセクハラいらなかったでしょ……」
line = "「ていうか、ちゃんとした用事があるなら、最初のセクハラいらなかったでしょ……」"

[[dialogue]]
speaker = "ミヤハル"
# 「話には流れってもんがありますやろ？」
line = "「話には流れってもんがありますやろ？」"

[[dialogue]]
speaker = "ミヤハル"
# 「だから最初に、スケベぇな話で場を和ましてから～」
line = "「だから最初に、スケベぇな話で場を和ましてから～」"

[[dialogue]]
speaker = "マトイ"
# 「セクハラで場が和むかっ！」
line = "「セクハラで場が和むかっ！」"

[[dialogue]]
speaker = "ミヤハル"
# 「うちがドスケベ女なのは、今更やん？」
line = "「うちがドスケベ女なのは、今更やん？」"

[[dialogue]]
speaker = "マトイ"
# 「とにかく！　スイーツカフェの件は分かったから。後でまた、みんなの週末の予定を確認して――」
line = "「とにかく！　スイーツカフェの件は分かったから。後でまた、みんなの週末の予定を確認して――」"

[[dialogue]]
speaker = "ミヤハル"
# 「会長はん<emoji=heart04>　仕事忙しくて手が離せへんなら、うちが隣でお手伝いしますえ～？」
line = "「会長はん<emoji=heart04>　仕事忙しくて手が離せへんなら、うちが隣でお手伝いしますえ～？」"

[[dialogue]]
speaker = "マトイ"
# 「って、また会長にくっ付いてるし……」
line = "「って、また会長にくっ付いてるし……」"

[[dialogue]]
speaker = "ミヤハル"
# 「大丈夫や<emoji=heart04>　邪魔はせぇへんから。うちはちょっとえっちな、おっぱいクッションみたいな存在やと思って貰えば<emoji=heart04>」
line = "「大丈夫や<emoji=heart04>　邪魔はせぇへんから。うちはちょっとえっちな、おっぱいクッションみたいな存在やと思って貰えば<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
# 「集中できるかっ！」
line = "「集中できるかっ！」"

[[dialogue]]
speaker = "ミヤハル"
# 「ムラムラして？」
line = "「ムラムラして？」"

[[dialogue]]
speaker = "マトイ"
# 「ちゃうわっ！！」
line = "「ちゃうわっ！！」"

[[dialogue]]
speaker = "unk"
# 前からずっと友達であったかのように気安く話す２人に、思わずクスッと笑ってしまう俺なのだった――
line = "前からずっと友達であったかのように気安く話す２人に、思わずクスッと笑ってしまう俺なのだった――"
