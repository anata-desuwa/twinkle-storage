[[dialogue]]
speaker = "ヴィーナス"
# 「水着コンテストよ。リゾートを盛り上げるために──なんて言ってたけど、そんな殊勝な気持ちであのヘレナちゃんが企画するかしら？」
line = "「水着コンテストよ。リゾートを盛り上げるために──なんて言ってたけど、そんな殊勝な気持ちであのヘレナちゃんが企画するかしら？」"

[[dialogue]]
speaker = "アナ"
# 「まあ、むやみに疑うのもよくありませんが……」
line = "「まあ、むやみに疑うのもよくありませんが……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「なーんか企んでる気がするのよねぇ……」
line = "「なーんか企んでる気がするのよねぇ……」"

[[dialogue]]
speaker = "サーシャ"
# 「それでね、会計の役割はこうして……」
