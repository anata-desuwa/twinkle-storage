[[dialogue]]
speaker = "トリシャ"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "トリシャ"
# 「なるほど……これが星徒会の業務ですか……せ、青春という感じですね……」
line = "「なるほど……これが星徒会の業務ですか……せ、青春という感じですね……」"

[[dialogue]]
speaker = "unk"
# 星徒会の活動を見学しに来たトリシャさんは、興味深そうに皆の仕事を眺めている。
line = "星徒会の活動を見学しに来たトリシャさんは、興味深そうに皆の仕事を眺めている。"

[[dialogue]]
speaker = "マトイ"
# 「トリシャさんは何か聞いてないの？　どうして水着コンテストが行われるのか──とか」
line = "「トリシャさんは何か聞いてないの？　どうして水着コンテストが行われるのか──とか」"

[[dialogue]]
speaker = "トリシャ"
# 「わ、わかりません……ただ呼ばれただけなので……」
line = "「わ、わかりません……ただ呼ばれただけなので……」"

