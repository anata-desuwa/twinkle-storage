[[dialogue]]
speaker = "ヘレナ"
# 「新作水着を着用しての、コンテストの大々的な優勝──それは我がアパレルブランドのまたとない宣伝になるはずだ。それを思えば、出資した賞金程度安いものよ！」
line = "「新作水着を着用しての、コンテストの大々的な優勝──それは我がアパレルブランドのまたとない宣伝になるはずだ。それを思えば、出資した賞金程度安いものよ！」"

[[dialogue]]
speaker = "せつな"
# 「な、なるほどでござる……！」
line = "「な、なるほどでござる……！」"

[[dialogue]]
speaker = "閃"
