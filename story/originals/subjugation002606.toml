[[dialogue]]
speaker = "unk"
# そうして、水着コンテスト当日が迫るなか……
line = "そうして、水着コンテスト当日が迫るなか……"

[[dialogue]]
speaker = "ヴィーナス"
# 「──やっぱり怪しいわ」
