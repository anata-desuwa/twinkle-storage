speaker = "せつな"
# 「それはアパレル産業から新たに水着ブランドにも参入する──というお話でござるか？」
line = "「それはアパレル産業から新たに水着ブランドにも参入する──というお話でござるか？」"

[[dialogue]]
speaker = "ヘレナ"
# 「ああ。先日のプール開設に際して、桜十路家にも水着を売り込んできたのだが……」
line = "「ああ。先日のプール開設に際して、桜十路家にも水着を売り込んできたのだが……」"

[[dialogue]]
speaker = "ヘレナ"
# 「ふふふ。他にもちょうどよいプロモーションの機会を得られてな」
line = "「ふふふ。他にもちょうどよいプロモーションの機会を得られてな」"

[[dialogue]]
speaker = "ヘレナ"
# 「貴殿らをリゾートのリサーチに向かわせたのも、その下見だったのだ」
line = "「貴殿らをリゾートのリサーチに向かわせたのも、その下見だったのだ」"

