line = "「うむ。留守番、ご苦労であった」"

[[dialogue]]
speaker = "閃"
# 「時に当主様。本日のお出かけは、例の新ブランドの件でしたか？」
line = "「時に当主様。本日のお出かけは、例の新ブランドの件でしたか？」"

[[dialogue]]
