[[dialogue]]
speaker = "ヘレナ"
# 「トリシャだ。私は晴れ着の時の件を思い出し……彼女なら、水着もさぞ似合うだろうと思っていた」
line = "「トリシャだ。私は晴れ着の時の件を思い出し……彼女なら、水着もさぞ似合うだろうと思っていた」"

[[dialogue]]
speaker = "ヘレナ"
# 「トリシャには我がブランド『ヘレナ』の水着を着て、コンテストに優勝してもらう」
line = "「トリシャには我がブランド『ヘレナ』の水着を着て、コンテストに優勝してもらう」"

