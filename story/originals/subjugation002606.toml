line = "「いかにも。リップルはリゾートへのさらなる集客を望んでいた。そこで私は水着コンテストを提案したわけだ」"

[[dialogue]]
speaker = "ヘレナ"
# 「大規模な来客が見込めるイベント──この機を活用せぬわけにはいくまい」
line = "「大規模な来客が見込めるイベント──この機を活用せぬわけにはいくまい」"

[[dialogue]]
speaker = "ヘレナ"
