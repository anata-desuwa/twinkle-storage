[[dialogue]]
speaker = "unk"
# 第１話,司書さんと夏休み,P
line = "第１話,司書さんと夏休み,P"

[[dialogue]]
speaker = "unk"
# 訓練の末、無事に水着戦闘服を使いこなせるようになったルリエルとイクシー。
line = "訓練の末、無事に水着戦闘服を使いこなせるようになったルリエルとイクシー。"

[[dialogue]]
speaker = "unk"
# ２人の訓練を見届けた後、俺はビーチで出会ったウィステリアさんと一緒にいた。
line = "２人の訓練を見届けた後、俺はビーチで出会ったウィステリアさんと一緒にいた。"

[[dialogue]]
speaker = "ウィステリア"
# 「いくわよ～……」
line = "「いくわよ～……」"

[[dialogue]]
speaker = "ウィステリア"
# 「えいっ」
line = "「えいっ」"

[[dialogue]]
speaker = "unk"
# それなら俺も──
line = "それなら俺も──"

[[dialogue]]
speaker = "ウィステリア"
# 「きゃっ。やったわねー……」
line = "「きゃっ。やったわねー……」"

[[dialogue]]
speaker = "ウィステリア"
# 「そーれっ。ふふふ、会長くん、ずぶ濡れね。やったの私だけど♪」
line = "「そーれっ。ふふふ、会長くん、ずぶ濡れね。やったの私だけど♪」"

[[dialogue]]
speaker = "ウィステリア"
# 「学園の職員なのに、こうして生徒と一緒になってはしゃいじゃって。我ながら浮かれてるわね」
line = "「学園の職員なのに、こうして生徒と一緒になってはしゃいじゃって。我ながら浮かれてるわね」"

[[dialogue]]
speaker = "ウィステリア"
# 「でも仕方ないわよね？　そこに海があって、君がいるんだから、はしゃがないと損じゃない」
line = "「でも仕方ないわよね？　そこに海があって、君がいるんだから、はしゃがないと損じゃない」"

[[dialogue]]
speaker = "ウィステリア"
# 「会長くんも楽しんでくれてる？　……なら良かった。いつもは不運続きだけど、会長くんたちにここで会えたのは幸運ね」
line = "「会長くんも楽しんでくれてる？　……なら良かった。いつもは不運続きだけど、会長くんたちにここで会えたのは幸運ね」"

[[dialogue]]
speaker = "ウィステリア"
# 「１人でバカンスに来た時はちょっと寂しかったんだから。君のおかげでいい夏休みになりそうだわ」
line = "「１人でバカンスに来た時はちょっと寂しかったんだから。君のおかげでいい夏休みになりそうだわ」"

[[dialogue]]
speaker = "unk"
# バカンスなら誘ってくれたら良かったのに
line = "バカンスなら誘ってくれたら良かったのに"

[[dialogue]]
speaker = "ウィステリア"
# 「私もそうしたかったんだけど、会長くんは用事があるって聞いたのよ。そしたら出かけた先で会うんだから、わからないものね」
line = "「私もそうしたかったんだけど、会長くんは用事があるって聞いたのよ。そしたら出かけた先で会うんだから、わからないものね」"

[[dialogue]]
speaker = "ウィステリア"
# 「……あれ？　会長くんはヘレナさんの頼みで、イクシーさんたちの付き添いをしてたのよね」
line = "「……あれ？　会長くんはヘレナさんの頼みで、イクシーさんたちの付き添いをしてたのよね」"

[[dialogue]]
speaker = "ウィステリア"
# 「私も、夏休みを取りたいって言ったら、ヘレナさんにこのビーチを薦められて……」
line = "「私も、夏休みを取りたいって言ったら、ヘレナさんにこのビーチを薦められて……」"

[[dialogue]]
speaker = "ウィステリア"
# 「は～……やられた。会長くんたちと会ったのは、幸運でもなんでもなくて、ヘレナさんが仕組んだことじゃない」
line = "「は～……やられた。会長くんたちと会ったのは、幸運でもなんでもなくて、ヘレナさんが仕組んだことじゃない」"

[[dialogue]]
speaker = "ウィステリア"
# 「まぁ、結果的に会長くんと一緒に遊べたんだから、そこは感謝しておきましょう」
line = "「まぁ、結果的に会長くんと一緒に遊べたんだから、そこは感謝しておきましょう」"

[[dialogue]]
speaker = "ウィステリア"
# 「ん？　どうしたの？　複雑そうな表情しちゃって」
line = "「ん？　どうしたの？　複雑そうな表情しちゃって」"

[[dialogue]]
speaker = "unk"
# １人の時、男の人に声をかけられませんでした？
line = "１人の時、男の人に声をかけられませんでした？"

[[dialogue]]
speaker = "ウィステリア"
# 「あら、もしかして妬いてるの？　ふふ、かわいいところあるじゃない」
line = "「あら、もしかして妬いてるの？　ふふ、かわいいところあるじゃない」"

[[dialogue]]
speaker = "ウィステリア"
# 「そうね、確かに声をかけられたわ。会長くんと出会う前は、出会いを求めてても全然機会がなかったのに、皮肉なものね」
line = "「そうね、確かに声をかけられたわ。会長くんと出会う前は、出会いを求めてても全然機会がなかったのに、皮肉なものね」"

[[dialogue]]
speaker = "ウィステリア"
# 「でも今は会長くんがいるから、他の男なんて眼中にないの。ナンパなんて無視してやったわ」
line = "「でも今は会長くんがいるから、他の男なんて眼中にないの。ナンパなんて無視してやったわ」"

[[dialogue]]
speaker = "ウィステリア"
# 「不運のおかげで会長くんと出会えたとしたら……ふふ、この厄介な魔導書もちょっとくらいは役に立ったのかもね」
line = "「不運のおかげで会長くんと出会えたとしたら……ふふ、この厄介な魔導書もちょっとくらいは役に立ったのかもね」"

[[dialogue]]
speaker = "ウィステリア"
# 「さ、せっかく海に来てるんだから、もっと遊びましょ──」
line = "「さ、せっかく海に来てるんだから、もっと遊びましょ──」"

[[dialogue]]
speaker = "ウィステリア"
# 「ひゃっ！？　ごめんなさい、またこけちゃった……」
line = "「ひゃっ！？　ごめんなさい、またこけちゃった……」"

[[dialogue]]
speaker = "ウィステリア"
# 「会長くんに助けてもらったの、何度目かしら。被害に遭ってる会長くんには悪いけど、こうして受け止めてくれる人がいて嬉しいわ」
line = "「会長くんに助けてもらったの、何度目かしら。被害に遭ってる会長くんには悪いけど、こうして受け止めてくれる人がいて嬉しいわ」"

[[dialogue]]
speaker = "ウィステリア"
# 「顔を赤くしちゃってどうしたの、会長くん？　……胸が当たってる？」
line = "「顔を赤くしちゃってどうしたの、会長くん？　……胸が当たってる？」"

[[dialogue]]
speaker = "ウィステリア"
# 「そんなの今さらでしょ。受け止めてくれた役得ってやつよ。そんなに気になるなら、こっちから当ててあげる<emoji=heart04>」
line = "「そんなの今さらでしょ。受け止めてくれた役得ってやつよ。そんなに気になるなら、こっちから当ててあげる<emoji=heart04>」"

[[dialogue]]
speaker = "ウィステリア"
# 「えいっ<emoji=heart04>　えいっ<emoji=heart04>　ふふふ♪　いつもはちょっと鈍感な会長くんだけど、さすがに顔が真っ赤ね」
line = "「えいっ<emoji=heart04>　えいっ<emoji=heart04>　ふふふ♪　いつもはちょっと鈍感な会長くんだけど、さすがに顔が真っ赤ね」"

[[dialogue]]
speaker = "ウィステリア"
# 「水着が思ったより大胆になっちゃったけど、会長くんを照れさせられたなら悪くないかしら」
line = "「水着が思ったより大胆になっちゃったけど、会長くんを照れさせられたなら悪くないかしら」"

[[dialogue]]
speaker = "unk"
# 普通の水着は買ってなかったんですか？
line = "普通の水着は買ってなかったんですか？"

[[dialogue]]
speaker = "ウィステリア"
# 「あー……買ったんだけど、波に流されちゃって……。それなりの値段したのに。もったいない……」
line = "「あー……買ったんだけど、波に流されちゃって……。それなりの値段したのに。もったいない……」"

[[dialogue]]
speaker = "ウィステリア"
# 「でも戦闘服をいじって水着にできたし、今回ばかりは星騎士で助かったわ」
line = "「でも戦闘服をいじって水着にできたし、今回ばかりは星騎士で助かったわ」"

[[dialogue]]
speaker = "unk"
# ということは今変身を解いたら裸……？
line = "ということは今変身を解いたら裸……？"

[[dialogue]]
speaker = "ウィステリア"
# 「！？　そう言われてみれば確かに……」
line = "「！？　そう言われてみれば確かに……」"

[[dialogue]]
speaker = "ウィステリア"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ウィステリア"
# （そんなこと言われたら、裸で抱き合ってるみたいじゃない……うぅ、意識しちゃう……）
line = "（そんなこと言われたら、裸で抱き合ってるみたいじゃない……うぅ、意識しちゃう……）"

[[dialogue]]
speaker = "ウィステリア"
# 「で、でも大人なんだしね……？　学生にはできない、セクシーなところもアピールしないとね？」
line = "「で、でも大人なんだしね……？　学生にはできない、セクシーなところもアピールしないとね？」"

[[dialogue]]
speaker = "ウィステリア"
# 「ん……」
line = "「ん……」"

[[dialogue]]
speaker = "unk"
# ウィステリアさんの唇がゆっくり近づいてきて──
line = "ウィステリアさんの唇がゆっくり近づいてきて──"

[[dialogue]]
speaker = "ルリエル"
# 「あ～！　ウィステリアさんが会長さんとイチャイチャしてます～！」
line = "「あ～！　ウィステリアさんが会長さんとイチャイチャしてます～！」"

[[dialogue]]
speaker = "ウィステリア"
# 「あひゃあっ！？」
line = "「あひゃあっ！？」"

[[dialogue]]
speaker = "ルリエル"
# 「ウィステリアさんってばまた会長さんを独り占めして～。ずるいですぅ～」
line = "「ウィステリアさんってばまた会長さんを独り占めして～。ずるいですぅ～」"

[[dialogue]]
speaker = "イクシリオン"
# 「今、少しアダルティな波動を感じた気がしましたが……」
line = "「今、少しアダルティな波動を感じた気がしましたが……」"

[[dialogue]]
speaker = "ウィステリア"
# 「そ、そんなことないわよ。ね、会長くん？」
line = "「そ、そんなことないわよ。ね、会長くん？」"

[[dialogue]]
speaker = "unk"
# …………
line = "…………"

[[dialogue]]
speaker = "ウィステリア"
# 「そこで黙らないでよ！？」
line = "「そこで黙らないでよ！？」"

[[dialogue]]
speaker = "ルリエル"
# 「やっぱりイチャイチャしてたんじゃないですかー」
line = "「やっぱりイチャイチャしてたんじゃないですかー」"

[[dialogue]]
speaker = "イクシリオン"
# 「青い海！　晴れ渡る空！　開放的な気分になるのも必然ですね！」
line = "「青い海！　晴れ渡る空！　開放的な気分になるのも必然ですね！」"

[[dialogue]]
speaker = "ウィステリア"
# 「賑やかになってきたわね……じゃあ４人で遊びましょうか」
line = "「賑やかになってきたわね……じゃあ４人で遊びましょうか」"

[[dialogue]]
speaker = "ウィステリア"
# 「だから──」
line = "「だから──」"

[[dialogue]]
speaker = "ウィステリア"
# 「海でキスするのはまた後で……ね？」
line = "「海でキスするのはまた後で……ね？」"
