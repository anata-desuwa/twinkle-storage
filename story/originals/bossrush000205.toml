[[dialogue]]
speaker = "梨緒"
# 「──とまぁ、ここまでがリクリエの使徒・ジグとの戦いの顛末だ」
line = "「──とまぁ、ここまでがリクリエの使徒・ジグとの戦いの顛末だ」"

[[dialogue]]
speaker = "ジグ"
# 「やぁ、少しいいかい？」
line = "「やぁ、少しいいかい？」"

[[dialogue]]
speaker = "梨緒"
# 「ジグ？　どうしてここに？」
line = "「ジグ？　どうしてここに？」"

[[dialogue]]
speaker = "ジグ"
# 「アガサがこっちにいるって聞いてね。魔王にも言いたいことがあったし」
line = "「アガサがこっちにいるって聞いてね。魔王にも言いたいことがあったし」"

[[dialogue]]
speaker = "ジグ"
# 「リクリエの使徒として迷惑をかけてすまなかった。本当に申し訳ないことをした」
line = "「リクリエの使徒として迷惑をかけてすまなかった。本当に申し訳ないことをした」"

[[dialogue]]
speaker = "ジグ"
# 「そしてありがとう。私が今ここにいるのはみんなのおかげだよ」
line = "「そしてありがとう。私が今ここにいるのはみんなのおかげだよ」"

[[dialogue]]
speaker = "梨緒"
# 「ジグ……」
line = "「ジグ……」"

[[dialogue]]
speaker = "ジグ"
# 「それと魔王にひとつ頼みがあってね」
line = "「それと魔王にひとつ頼みがあってね」"

[[dialogue]]
speaker = "ジグ"
# 「長い間リクリエの使徒になっていたせいか、星術の扱いがしっくりこなくてね。ちょっと肩ならしに付き合ってもらいたいんだ」
line = "「長い間リクリエの使徒になっていたせいか、星術の扱いがしっくりこなくてね。ちょっと肩ならしに付き合ってもらいたいんだ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そういうことなら星徒会に任せなさい！　星徒会<ruby=バーサス>ＶＳ</ruby>選挙管理委員会のガチンコバトル、受けて立つわ！」
line = "「そういうことなら星徒会に任せなさい！　星徒会<ruby>ＶＳ<rt>バーサス</rt></ruby>選挙管理委員会のガチンコバトル、受けて立つわ！」"

[[dialogue]]
speaker = "マトイ"
# 「ええっ、今そういう流れだった！？　肩ならしって話じゃあ……」
line = "「ええっ、今そういう流れだった！？　肩ならしって話じゃあ……」"

[[dialogue]]
speaker = "アナ"
# 「こうなった前会長は止められませんね」
line = "「こうなった前会長は止められませんね」"

[[dialogue]]
speaker = "サーシャ"
# 「うふふ～、ヴィーナスちゃんは相変わらずね～」
line = "「うふふ～、ヴィーナスちゃんは相変わらずね～」"

[[dialogue]]
speaker = "ナターシャ"
# 「なになに～？　梨緒とジグがいるって聞いたから来てみたんだけど、なんか盛り上がってる感じ？」
line = "「なになに～？　梨緒とジグがいるって聞いたから来てみたんだけど、なんか盛り上がってる感じ？」"

[[dialogue]]
speaker = "アポロ"
# 「よーし、クイズ大会のリベンジだ！」
line = "「よーし、クイズ大会のリベンジだ！」"

[[dialogue]]
speaker = "ベアトリス"
# 「ふぇええ～っ、心の準備が～っ」
line = "「ふぇええ～っ、心の準備が～っ」"

[[dialogue]]
speaker = "梨緒"
# 「どうやらジグの意図に誤解があるようだが──」
line = "「どうやらジグの意図に誤解があるようだが──」"

[[dialogue]]
speaker = "梨緒"
# 「まぁいい、勝負なら受けて立つ！」
line = "「まぁいい、勝負なら受けて立つ！」"

[[dialogue]]
speaker = "ジグ"
# 「おやおや、騒がしくなってきたね」
line = "「おやおや、騒がしくなってきたね」"

[[dialogue]]
speaker = "ジグ"
# 「思っていたのと違うけど、せっかくの機会だ。遠慮なくぶつかり合おうじゃないか」
line = "「思っていたのと違うけど、せっかくの機会だ。遠慮なくぶつかり合おうじゃないか」"
