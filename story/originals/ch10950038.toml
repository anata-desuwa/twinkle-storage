[[dialogue]]
speaker = "unk"
# その日、俺はシズハと街へデートに出かけていた。
line = "その日、俺はシズハと街へデートに出かけていた。"

[[dialogue]]
speaker = "クロト"
# 「シズハ、暗くなってきちゃったし、今日はもうそろそろ帰ろうか」
line = "「シズハ、暗くなってきちゃったし、今日はもうそろそろ帰ろうか」"

[[dialogue]]
speaker = "シズハ"
# 「え？　う、うん、そうだね……！」
line = "「え？　う、うん、そうだね……！」"

[[dialogue]]
speaker = "unk"
# 日が落ちて辺りが暗くなってきたところで俺が提案すると、シズハはどこか名残惜しそうな――けれど何か言いたげな表情を浮かべる。
line = "日が落ちて辺りが暗くなってきたところで俺が提案すると、シズハはどこか名残惜しそうな――けれど何か言いたげな表情を浮かべる。"

[[dialogue]]
speaker = "シズハ"
# 「って、あれ？　なんか体が光って……！？」
line = "「って、あれ？　なんか体が光って……！？」"

[[dialogue]]
speaker = "unk"
# と、次の瞬間、彼女の身体が光に包まれる。
line = "と、次の瞬間、彼女の身体が光に包まれる。"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「勝手にヴィクトリアフォームに変身しちゃった……！？」
line = "「勝手にヴィクトリアフォームに変身しちゃった……！？」"

[[dialogue]]
speaker = "unk"
# それだけではない。周囲の空間がぐにゃりと歪み始め――
line = "それだけではない。周囲の空間がぐにゃりと歪み始め――"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「えっ！？　こ、ここって――前に来たことある『ラブホテル』……！？」
line = "「えっ！？　こ、ここって――前に来たことある『ラブホテル』……！？」"

[[dialogue]]
speaker = "unk"
# 気づけば俺たちは、大きなベッドが置かれた室内にいた。確かに、記憶と同じ場所だ。
line = "気づけば俺たちは、大きなベッドが置かれた室内にいた。確かに、記憶と同じ場所だ。"

[[dialogue]]
speaker = "クロト"
# 「いや、出入り口の上のところに、なんか変なモニターが付いてるぞ……？」
line = "「いや、出入り口の上のところに、なんか変なモニターが付いてるぞ……？」"

[[dialogue]]
speaker = "unk"
# 視線を向けると、モニターには何やら文字が映し出されていた。
line = "視線を向けると、モニターには何やら文字が映し出されていた。"

[[dialogue]]
speaker = "unk"
# ――『セックスでシズハを満足させないと出られない部屋』。
line = "――『セックスでシズハを満足させないと出られない部屋』。"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「なっ……どういうこと～～～っ！？　これってまさか、また聖杯ちゃんのしわざ……！？」
line = "「なっ……どういうこと～～～っ！？　これってまさか、また聖杯ちゃんのしわざ……！？」"

[[dialogue]]
speaker = "クロト"
# 「し、新フォームにパワーアップしたせいか、前より手が込んでいる……！」
line = "「し、新フォームにパワーアップしたせいか、前より手が込んでいる……！」"

[[dialogue]]
speaker = "unk"
# 呆れ半分、納得半分。どうやら今回も、抗う術はなさそうだ。
line = "呆れ半分、納得半分。どうやら今回も、抗う術はなさそうだ。"

[[dialogue]]
speaker = "unk"
# そんなわけで――俺たちはベッドに移動して、部屋から出るためにエッチをすることになった。
line = "そんなわけで――俺たちはベッドに移動して、部屋から出るためにエッチをすることになった。"

[[dialogue]]
speaker = "シズハ"
# 「んっ……<emoji=heart04>　ふうぅ……はあぁ……<emoji=heart04>」
line = "「んっ……<emoji=heart04>　ふうぅ……はあぁ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 恥ずかしさで体を震わせながらも、シズハはゆっくりと背を向け、お尻をこちらへ向ける。
line = "恥ずかしさで体を震わせながらも、シズハはゆっくりと背を向け、お尻をこちらへ向ける。"

[[dialogue]]
speaker = "クロト"
# 「シズハ……もしかして本当は、エッチしたいと思ってた？」
line = "「シズハ……もしかして本当は、エッチしたいと思ってた？」"

[[dialogue]]
speaker = "シズハ"
# 「なっ……ば、バカバカ！　別にそんなことないもんっ<emoji=heart04>」
line = "「なっ……ば、バカバカ！　別にそんなことないもんっ<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
# （はうぅっ……<emoji=heart04>　こんなのまるで、会長とエッチしたくてしょうがなかった欲求不満女みたいじゃないっ……<emoji=heart04>）
line = "（はうぅっ……<emoji=heart04>　こんなのまるで、会長とエッチしたくてしょうがなかった欲求不満女みたいじゃないっ……<emoji=heart04>）"

[[dialogue]]
speaker = "シズハ"
# （ううん、それ自体は本当なんだけど、バレバレなの、すごく恥ずかしい……！）
line = "（ううん、それ自体は本当なんだけど、バレバレなの、すごく恥ずかしい……！）"

[[dialogue]]
speaker = "シズハ"
# 「って、ひょっとして聖杯ちゃんの力で、私の心の声、もう聞こえちゃってる……！？」
line = "「って、ひょっとして聖杯ちゃんの力で、私の心の声、もう聞こえちゃってる……！？」"

[[dialogue]]
speaker = "unk"
# 俺は小さく頷き、正直に答える。
line = "俺は小さく頷き、正直に答える。"

[[dialogue]]
speaker = "クロト"
# 「俺も本当はエッチしたいと思ってたから、同じ気持ちで嬉しいよ」
line = "「俺も本当はエッチしたいと思ってたから、同じ気持ちで嬉しいよ」"

[[dialogue]]
speaker = "シズハ"
# 「え？　――あっ<emoji=heart04>　あんっ……<emoji=heart04>」
line = "「え？　――あっ<emoji=heart04>　あんっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 言葉と同時に、俺は彼女のお尻へと手を伸ばす。
line = "言葉と同時に、俺は彼女のお尻へと手を伸ばす。"

[[dialogue]]
speaker = "unk"
# 両手で包み込むように撫でると、むちっとした弾力が指に吸いついてきた。
line = "両手で包み込むように撫でると、むちっとした弾力が指に吸いついてきた。"

[[dialogue]]
speaker = "シズハ"
# 「はあぁっ<emoji=heart04>　会長、お尻触っちゃ……あんっ<emoji=heart04>　ふあぁっ……<emoji=heart04>」
line = "「はあぁっ<emoji=heart04>　会長、お尻触っちゃ……あんっ<emoji=heart04>　ふあぁっ……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
# 「お尻をこっちに向けてたのに？」
line = "「お尻をこっちに向けてたのに？」"

[[dialogue]]
speaker = "シズハ"
# 「んっ……<emoji=heart04>　それは、正面からするのがなんだか恥ずかしくて……<emoji=heart04>」
line = "「んっ……<emoji=heart04>　それは、正面からするのがなんだか恥ずかしくて……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺にとっては、背を向けて無防備に晒される方がよほどエッチに見える。
line = "俺にとっては、背を向けて無防備に晒される方がよほどエッチに見える。"

[[dialogue]]
speaker = "unk"
# 思わず指に力が入り、ぐっと鷲掴みにする。弾むような柔らかさが、掌いっぱいに広がった。
line = "思わず指に力が入り、ぐっと鷲掴みにする。弾むような柔らかさが、掌いっぱいに広がった。"

[[dialogue]]
speaker = "シズハ"
# 「あっ<emoji=heart04>　会長、お尻そんな、モミモミしちゃダメぇっ<emoji=heart04>」
line = "「あっ<emoji=heart04>　会長、お尻そんな、モミモミしちゃダメぇっ<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
# （ふあぁっ……<emoji=heart04>　お尻揉まれるの気持ちいいっ<emoji=heart04>）
line = "（ふあぁっ……<emoji=heart04>　お尻揉まれるの気持ちいいっ<emoji=heart04>）"

[[dialogue]]
speaker = "クロト"
# 「お尻揉まれて気持ちいいって、心の声が聞こえてきてるよ」
line = "「お尻揉まれて気持ちいいって、心の声が聞こえてきてるよ」"

[[dialogue]]
speaker = "シズハ"
# 「やぁんっ、言わないでぇ<emoji=heart04>　お尻触られて気持ちよく感じちゃってるの、恥ずかしい……<emoji=heart04>」
line = "「やぁんっ、言わないでぇ<emoji=heart04>　お尻触られて気持ちよく感じちゃってるの、恥ずかしい……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
# 「まだおま○こには触ってなかったのに、すごく濡れてきてる」
line = "「まだおま○こには触ってなかったのに、すごく濡れてきてる」"

[[dialogue]]
speaker = "unk"
# 俺は既に熱を帯びて大きく隆起したペニスを擦り付けると、秘部はすでにしっとりと濡れていた。
line = "俺は既に熱を帯びて大きく隆起したペニスを擦り付けると、秘部はすでにしっとりと濡れていた。"

[[dialogue]]
speaker = "シズハ"
# 「だって、エッチするたびに、会長が私のお尻を触ったり揉んだり、いっぱいするからぁ<emoji=heart04>　会長にお尻触られると、感じるようになっちゃったんだもん<emoji=heart04>」
line = "「だって、エッチするたびに、会長が私のお尻を触ったり揉んだり、いっぱいするからぁ<emoji=heart04>　会長にお尻触られると、感じるようになっちゃったんだもん<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
# 「思わず触りたくなっちゃうような、むちむちでエッチなお尻をしてるシズハが悪い」
line = "「思わず触りたくなっちゃうような、むちむちでエッチなお尻をしてるシズハが悪い」"

[[dialogue]]
speaker = "クロト"
# 「おかげでもう、俺も我慢できなくなっちゃってるから、挿れちゃうぞ？」
line = "「おかげでもう、俺も我慢できなくなっちゃってるから、挿れちゃうぞ？」"

[[dialogue]]
speaker = "unk"
# 愛液で濡れた先端を、ゆっくりと彼女の奥へと導く。
line = "愛液で濡れた先端を、ゆっくりと彼女の奥へと導く。"

[[dialogue]]
speaker = "シズハ"
# 「あっ<emoji=heart04>　んぁ――っ<emoji=heart04>」
line = "「あっ<emoji=heart04>　んぁ――っ<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
# 「ふああぁ～～っ<emoji=heart04><emoji=heart04>　あっ<emoji=heart04>　あんっ<emoji=heart04>　はあぁっ<emoji=heart04>　あんっ<emoji=heart04>　はあぁんっ<emoji=heart04>」
line = "「ふああぁ～～っ<emoji=heart04><emoji=heart04>　あっ<emoji=heart04>　あんっ<emoji=heart04>　はあぁっ<emoji=heart04>　あんっ<emoji=heart04>　はあぁんっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 蜜壺の中へゆっくりと押し入れた瞬間、熱く絡みつく感触が包み込んでくる。内側はとろりと濡れ、柔らかな肉壁が脈打つように締め付けてきた。
line = "蜜壺の中へゆっくりと押し入れた瞬間、熱く絡みつく感触が包み込んでくる。内側はとろりと濡れ、柔らかな肉壁が脈打つように締め付けてきた。"

[[dialogue]]
speaker = "unk"
# 俺のペニスは、そのあまりにも濃密な快楽に一瞬で呑み込まれる。
line = "俺のペニスは、そのあまりにも濃密な快楽に一瞬で呑み込まれる。"

[[dialogue]]
speaker = "シズハ"
# （会長のおっきいおち○ちんで、膣穴じゅぶじゅぶかき回されるの気持ちいいっ<emoji=heart04>　出し入れするたび、いいところ全部擦られて……最高なのぉ～っ<emoji=heart04>）
line = "（会長のおっきいおち○ちんで、膣穴じゅぶじゅぶかき回されるの気持ちいいっ<emoji=heart04>　出し入れするたび、いいところ全部擦られて……最高なのぉ～っ<emoji=heart04>）"

[[dialogue]]
speaker = "シズハ"
# 「んううぅっ<emoji=heart04>　あっ、あんっ<emoji=heart04>　はあぁっ<emoji=heart04>　あんっ<emoji=heart04>　ふああぁんっ<emoji=heart04>」
line = "「んううぅっ<emoji=heart04>　あっ、あんっ<emoji=heart04>　はあぁっ<emoji=heart04>　あんっ<emoji=heart04>　ふああぁんっ<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
# 「俺もシズハのおま○こ、すごく気持ちがいいぞ……！」
line = "「俺もシズハのおま○こ、すごく気持ちがいいぞ……！」"

[[dialogue]]
speaker = "クロト"
# 「お尻と同じで、エッチするたびに俺に合わせて変わっていってる感じがして……！」
line = "「お尻と同じで、エッチするたびに俺に合わせて変わっていってる感じがして……！」"

[[dialogue]]
speaker = "シズハ"
# 「そんなエッチなこと言っちゃダメぇ～っ<emoji=heart04>　会長ぉ、あぁああっ<emoji=heart04>」
line = "「そんなエッチなこと言っちゃダメぇ～っ<emoji=heart04>　会長ぉ、あぁああっ<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
# （会長に気持ちいいって言われたら、おま○こ嬉しくなって、私ももっと気持ちよく感じちゃうぅ～っ<emoji=heart04>）
line = "（会長に気持ちいいって言われたら、おま○こ嬉しくなって、私ももっと気持ちよく感じちゃうぅ～っ<emoji=heart04>）"

[[dialogue]]
speaker = "シズハ"
# 「んっ<emoji=heart04>　ふうぅっ<emoji=heart04>　あんっ<emoji=heart04>　はあぁんっ<emoji=heart04>　んああぁんっ<emoji=heart04>」
line = "「んっ<emoji=heart04>　ふうぅっ<emoji=heart04>　あんっ<emoji=heart04>　はあぁんっ<emoji=heart04>　んああぁんっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺はそこで、彼女のお尻に添えていた手を動かし、改めてがっしりと鷲掴みにする。
line = "俺はそこで、彼女のお尻に添えていた手を動かし、改めてがっしりと鷲掴みにする。"

[[dialogue]]
speaker = "unk"
# むにゅり、と弾む感触が掌いっぱいに広がった。
line = "むにゅり、と弾む感触が掌いっぱいに広がった。"

[[dialogue]]
speaker = "シズハ"
# 「あっ！？　会長っ<emoji=heart04>　今お尻強く揉んだら、ダメぇ～っ<emoji=heart04><emoji=heart04>」
line = "「あっ！？　会長っ<emoji=heart04>　今お尻強く揉んだら、ダメぇ～っ<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
