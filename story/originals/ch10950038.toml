line = "（おま○ことお尻が同時に感じてっ<emoji=heart04>　頭の中、気持ちいいのでおかしくなっちゃうぅ～～っ<emoji=heart04><emoji=heart04>）"

[[dialogue]]
speaker = "シズハ"
# 「ふああぁっ<emoji=heart04>　あっ<emoji=heart04>　あっ<emoji=heart04>　はあぁっ<emoji=heart04>　んああぁ～～っ<emoji=heart04><emoji=heart04>」
line = "「ふああぁっ<emoji=heart04>　あっ<emoji=heart04>　あっ<emoji=heart04>　はあぁっ<emoji=heart04>　んああぁ～～っ<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# お尻を揉むたびに、膣内が敏感に反応し、きゅうぅっと締め付けてくる。
line = "お尻を揉むたびに、膣内が敏感に反応し、きゅうぅっと締め付けてくる。"

[[dialogue]]
speaker = "unk"
# その収縮があまりにも心地よく、思わず俺の喉から熱い吐息が漏れた。
line = "その収縮があまりにも心地よく、思わず俺の喉から熱い吐息が漏れた。"

[[dialogue]]
speaker = "シズハ"
