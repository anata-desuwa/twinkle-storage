[[dialogue]]
speaker = "unk"
# 第１話,レンズの向こうに恋人水着,P
line = "第１話,レンズの向こうに恋人水着,P"

[[dialogue]]
speaker = "ルリエル"
# 「じゃじゃ～ん！　これがルリエルの水着戦闘服なのですっ！」
line = "「じゃじゃ～ん！　これがルリエルの水着戦闘服なのですっ！」"

[[dialogue]]
speaker = "ユウリ"
# 「あーはいはい。わかったわかった」
line = "「あーはいはい。わかったわかった」"

[[dialogue]]
speaker = "セーラ"
# 「似合ってる似合ってるー。いいと思うよー」
line = "「似合ってる似合ってるー。いいと思うよー」"

[[dialogue]]
speaker = "ルリエル"
# 「リアクション薄～いっ！？　せっかく披露してるんですから、もっと持て囃してくださいよぉ～！」
line = "「リアクション薄～いっ！？　せっかく披露してるんですから、もっと持て囃してくださいよぉ～！」"

[[dialogue]]
speaker = "ソフィア"
# 「ルリが毎日毎日見せびらかしてくるからでしょ？　これ以上、取れるリアクションない」
line = "「ルリが毎日毎日見せびらかしてくるからでしょ？　これ以上、取れるリアクションない」"

[[dialogue]]
speaker = "フィオナ"
# 「ふふ、いいじゃない。初めての水着がよっぽど嬉しいんだよ。毎日毎日彼氏さんを呼びつけちゃうくらいには」
line = "「ふふ、いいじゃない。初めての水着がよっぽど嬉しいんだよ。毎日毎日彼氏さんを呼びつけちゃうくらいには」"

[[dialogue]]
speaker = "ユウリ"
# 「まぁ気持ちはわかるけど──……」
line = "「まぁ気持ちはわかるけど──……」"

[[dialogue]]
speaker = "unk"
# キューティー！　マイエンジェル！
line = "キューティー！　マイエンジェル！"

[[dialogue]]
speaker = "ルリエル"
# 「えへへ～！　でしょうでしょう！　さっすがは会長さん！　マイボーイフレンド！　大変に気分が良いですぅ～！」
line = "「えへへ～！　でしょうでしょう！　さっすがは会長さん！　マイボーイフレンド！　大変に気分が良いですぅ～！」"

[[dialogue]]
speaker = "ルリエル"
# 「ほーら特別にもっと近くで見せてあげますよ～。写真も何枚でも撮らせてあげちゃいますぅ！　可愛く撮っちゃってくださいね♪」
line = "「ほーら特別にもっと近くで見せてあげますよ～。写真も何枚でも撮らせてあげちゃいますぅ！　可愛く撮っちゃってくださいね♪」"

[[dialogue]]
speaker = "ルリエル"
# 「あははっ、はしゃぎすぎですってばぁ～。ルリエルの写真集でも作っちゃうつもりですかぁ？　他の人には見せちゃダメなのですよぉ～？」
line = "「あははっ、はしゃぎすぎですってばぁ～。ルリエルの写真集でも作っちゃうつもりですかぁ？　他の人には見せちゃダメなのですよぉ～？」"

[[dialogue]]
speaker = "ユウリ"
# 「このバカップルっぷりはどうにかなんねーのか。毎日毎日暑苦しいイチャイチャを見せつけられる身にもなれって……」
line = "「このバカップルっぷりはどうにかなんねーのか。毎日毎日暑苦しいイチャイチャを見せつけられる身にもなれって……」"

[[dialogue]]
speaker = "セーラ"
# 「水着をもらってからラブラブ度合いに拍車がかかったよね～。やっぱ水着着ると開放的な気分になっちゃう的な？」
line = "「水着をもらってからラブラブ度合いに拍車がかかったよね～。やっぱ水着着ると開放的な気分になっちゃう的な？」"

[[dialogue]]
speaker = "ソフィア"
# 「最低限の羞恥心まで失ってますけどね……」
line = "「最低限の羞恥心まで失ってますけどね……」"

[[dialogue]]
speaker = "ルリエル"
# 「んもう、うるさいですよ、皆さん！　こんなのカレシカノジョなら普通ですってフツー！」
line = "「んもう、うるさいですよ、皆さん！　こんなのカレシカノジョなら普通ですってフツー！」"

[[dialogue]]
speaker = "ルリエル"
# 「水着姿って何度でもカレシに見せたくなっちゃうものなのですよ～。カレシもカレシでカノジョの水着姿は何度でも見たくなるものなのです～」
line = "「水着姿って何度でもカレシに見せたくなっちゃうものなのですよ～。カレシもカレシでカノジョの水着姿は何度でも見たくなるものなのです～」"

[[dialogue]]
speaker = "ルリエル"
# 「アチチな視線を送られすぎて、ちょっぴり恥ずかしいですけどね？　胸元とか太ももとかカレシの熱視線で日焼けしちゃいそうですも～ん、きゃっ♪」
line = "「アチチな視線を送られすぎて、ちょっぴり恥ずかしいですけどね？　胸元とか太ももとかカレシの熱視線で日焼けしちゃいそうですも～ん、きゃっ♪」"

[[dialogue]]
speaker = "セーラ"
# 「うちもヘレナさんに頼んで水着戦闘服作ってもらおうかなー。今すぐ海に飛び込みに行きたい気分」
line = "「うちもヘレナさんに頼んで水着戦闘服作ってもらおうかなー。今すぐ海に飛び込みに行きたい気分」"

[[dialogue]]
speaker = "ソフィア"
# 「そういえば今のところフィオナ会長だけですよね？　ルリの他に流星星徒会で水着戦闘服を持つのは」
line = "「そういえば今のところフィオナ会長だけですよね？　ルリの他に流星星徒会で水着戦闘服を持つのは」"

[[dialogue]]
speaker = "フィオナ"
# 「うん、リップルさんの結界で手に入れたんだけどね」
line = "「うん、リップルさんの結界で手に入れたんだけどね」"

[[dialogue]]
speaker = "ユウリ"
# 「つか改めて見るとヤベえな、フィオナの水着。よく恥ずかしげもなく、んなもん着られるっつーか……」
line = "「つか改めて見るとヤベえな、フィオナの水着。よく恥ずかしげもなく、んなもん着られるっつーか……」"

[[dialogue]]
speaker = "フィオナ"
# 「そ、そうかな……？　確かにちょっと大胆かなとは思ったけど……」
line = "「そ、そうかな……？　確かにちょっと大胆かなとは思ったけど……」"

[[dialogue]]
speaker = "ルリエル"
# 「どーしてフィオナ会長の水着で盛り上がってるんですか！　今日の主役はわたしですよっ、わたしにちゅーもくしてくださいってばぁ！」
line = "「どーしてフィオナ会長の水着で盛り上がってるんですか！　今日の主役はわたしですよっ、わたしにちゅーもくしてくださいってばぁ！」"

[[dialogue]]
speaker = "ルリエル"
# 「……む？　むむむ～！？　いま会長さん、フィオナ会長を撮ってませんでしたかっ！？」
line = "「……む？　むむむ～！？　いま会長さん、フィオナ会長を撮ってませんでしたかっ！？」"

[[dialogue]]
speaker = "ルリエル"
# 「ヒドイです、裏切りです、この浮気者～！　さっきあんなにわたしのこと褒めてましたのに～！」
line = "「ヒドイです、裏切りです、この浮気者～！　さっきあんなにわたしのこと褒めてましたのに～！」"

[[dialogue]]
speaker = "フィオナ"
# 「お、落ち着いてルリエル。緋宮会長はそんな隠し撮りのような真似しないから」
line = "「お、落ち着いてルリエル。緋宮会長はそんな隠し撮りのような真似しないから」"

[[dialogue]]
speaker = "unk"
# お、おおー……
line = "お、おおー……"

[[dialogue]]
speaker = "ルリエル"
# 「撮ってるじゃないですかぁ！？　やっぱりビキニがいいんですかっ！？」
line = "「撮ってるじゃないですかぁ！？　やっぱりビキニがいいんですかっ！？」"

[[dialogue]]
speaker = "ルリエル"
# 「いいですもん、いいですもん、そういうことなら──」
line = "「いいですもん、いいですもん、そういうことなら──」"

[[dialogue]]
speaker = "ルリエル"
# 「ふ～んだっ」
line = "「ふ～んだっ」"

[[dialogue]]
speaker = "セーラ"
# 「あらら、拗ねちった」
line = "「あらら、拗ねちった」"

[[dialogue]]
speaker = "ユウリ"
# 「ケンカすんなって。修羅場の空気も居たたまれねえから」
line = "「ケンカすんなって。修羅場の空気も居たたまれねえから」"

[[dialogue]]
speaker = "ルリエル"
# 「つーん。文句ならそこの浮気彼氏に言ってくださいよーっだ」
line = "「つーん。文句ならそこの浮気彼氏に言ってくださいよーっだ」"

[[dialogue]]
speaker = "ルリエル"
# 「会長さんには二度と水着なんて見せてあげません。どーぞお好きにフィオナ会長の水着写真集でも作っててください」
line = "「会長さんには二度と水着なんて見せてあげません。どーぞお好きにフィオナ会長の水着写真集でも作っててください」"

[[dialogue]]
speaker = "unk"
# 俺が作りたいのはルリエルの水着写真集だけだ
line = "俺が作りたいのはルリエルの水着写真集だけだ"

[[dialogue]]
speaker = "ルリエル"
# 「っっ。でも撮ってたじゃないですか、フィオナ会長の水着……。鼻の下伸ばして、おっぱいもじーっと見て」
line = "「っっ。でも撮ってたじゃないですか、フィオナ会長の水着……。鼻の下伸ばして、おっぱいもじーっと見て」"

[[dialogue]]
speaker = "unk"
# これを見てくれ！
line = "これを見てくれ！"

[[dialogue]]
speaker = "ルリエル"
# 「なんですか、ＤＩＳＣなんて渡してきて……。さっき撮ったフィオナ会長の隠し撮り写真でも見せるつもりですか？」
line = "「なんですか、ＤＩＳＣなんて渡してきて……。さっき撮ったフィオナ会長の隠し撮り写真でも見せるつもりですか？」"

[[dialogue]]
speaker = "ルリエル"
# 「ほえ……？　ない。フィオナ会長の水着写真、ＤＩＳＣに一枚もありません！」
line = "「ほえ……？　ない。フィオナ会長の水着写真、ＤＩＳＣに一枚もありません！」"

[[dialogue]]
speaker = "ルリエル"
# 「あ、ルリエルが怒ってる時の写真がっ！？　フィオナ会長のおっぱい撮ってるって思ってた時の、ほっぺ膨らませてるわたしの姿が写ってます……！」
line = "「あ、ルリエルが怒ってる時の写真がっ！？　フィオナ会長のおっぱい撮ってるって思ってた時の、ほっぺ膨らませてるわたしの姿が写ってます……！」"

[[dialogue]]
speaker = "unk"
# どれもこれもルリエルの可愛い一面だから
line = "どれもこれもルリエルの可愛い一面だから"

[[dialogue]]
speaker = "ルリエル"
# 「えへ、えへへへへぇ～。んもう、どれだけルリエルのこと大好きなんですかぁ～。わかってましたけどぉ、知ってましたけどぉ～」
line = "「えへ、えへへへへぇ～。んもう、どれだけルリエルのこと大好きなんですかぁ～。わかってましたけどぉ、知ってましたけどぉ～」"

[[dialogue]]
speaker = "ソフィア"
# 「あ、機嫌直った」
line = "「あ、機嫌直った」"

[[dialogue]]
speaker = "ルリエル"
# 「ほーら、んんっ。大好きなカノジョの水着姿ですよぉ～。存分に好きなだけ撮っちゃってください！　大胆なポーズだって、えへへ、いくらでも取ってあげますから！」
line = "「ほーら、んんっ。大好きなカノジョの水着姿ですよぉ～。存分に好きなだけ撮っちゃってください！　大胆なポーズだって、えへへ、いくらでも取ってあげますから！」"

[[dialogue]]
speaker = "セーラ"
# 「ルリちー。一応ここ、星徒会室だかんね？」
line = "「ルリちー。一応ここ、星徒会室だかんね？」"

[[dialogue]]
speaker = "ユウリ"
# 「……結局こうなんのかよ。これだからバカップルは……」
line = "「……結局こうなんのかよ。これだからバカップルは……」"

[[dialogue]]
speaker = "フィオナ"
# 「ええと……。私、当て馬に使われたような……？」
line = "「ええと……。私、当て馬に使われたような……？」"

[[dialogue]]
speaker = "ルリエル"
# 「そーだ、あとで中庭にも行きましょう！　色々な場所で撮ってもらいたいですからっ！」
line = "「そーだ、あとで中庭にも行きましょう！　色々な場所で撮ってもらいたいですからっ！」"

[[dialogue]]
speaker = "ルリエル"
# 「会長さんとわたしだけのラブラブ水着写真集、何冊も何冊も作っちゃいましょうね！」
line = "「会長さんとわたしだけのラブラブ水着写真集、何冊も何冊も作っちゃいましょうね！」"
