[[dialogue]]
speaker = "unk"
# 第４話,未知、もしくは忘却の果ての感情,P
line = "第４話,未知、もしくは忘却の果ての感情,P"

[[dialogue]]
speaker = "マリオン"
# 「会長様とデート♪　デート♪　ふふふ♪」
line = "「会長様とデート♪　デート♪　ふふふ♪」"

[[dialogue]]
speaker = "unk"
# 押しの強いマリオンに誘われ、今日一日、浅草を観光案内することになった。
line = "押しの強いマリオンに誘われ、今日一日、浅草を観光案内することになった。"

[[dialogue]]
speaker = "マリオン"
# 「肩を寄せ合い、腕を組み、手を繋ぎ……これならどこからどう見ても、恋人にしか見えませんよね」
line = "「肩を寄せ合い、腕を組み、手を繋ぎ……これならどこからどう見ても、恋人にしか見えませんよね」"

[[dialogue]]
speaker = "マリオン"
# 「誰かに見られたら、私と会長様の関係が明らかになる……学園で話題が持ちきりになってしまいそうです」
line = "「誰かに見られたら、私と会長様の関係が明らかになる……学園で話題が持ちきりになってしまいそうです」"

[[dialogue]]
speaker = "マリオン"
# 「会長様との関係が噂されるのでしたら、それはただただ喜ばしいことです」
line = "「会長様との関係が噂されるのでしたら、それはただただ喜ばしいことです」"

[[dialogue]]
speaker = "マリオン"
# 「それとも……私と噂になるのはお嫌ですか？」
line = "「それとも……私と噂になるのはお嫌ですか？」"

[[dialogue]]
speaker = "unk"
# もちろん嫌なんかじゃないですよ
line = "もちろん嫌なんかじゃないですよ"

[[dialogue]]
speaker = "マリオン"
# 「ふふふ<emoji=heart04>　でしたら、会長様との縁結びと子宝のお参りに向かいましょう<emoji=heart04>」
line = "「ふふふ<emoji=heart04>　でしたら、会長様との縁結びと子宝のお参りに向かいましょう<emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
# 「あれ？　そこにいるのって……マリオンと会長くん！？　二人きりでお出かけしてるー！　腕まで組んでるー！」
line = "「あれ？　そこにいるのって……マリオンと会長くん！？　二人きりでお出かけしてるー！　腕まで組んでるー！」"

[[dialogue]]
speaker = "マリオン"
# 「トワ！？　どうしてここに？」
line = "「トワ！？　どうしてここに？」"

[[dialogue]]
speaker = "トワ先生"
# 「どうしてってお参りをしてきたとこだけど……この距離感……甘い空気……もしかして、デ、デ、デート！？」
line = "「どうしてってお参りをしてきたとこだけど……この距離感……甘い空気……もしかして、デ、デ、デート！？」"

[[dialogue]]
speaker = "マリオン"
# （私ともあろう者が迂闊でした……よりにもよって、一番見られたくない相手に……！）
line = "（私ともあろう者が迂闊でした……よりにもよって、一番見られたくない相手に……！）"

[[dialogue]]
speaker = "マリオン"
# （会長様とのデートに浮かれて、人形の警戒を解いていました……）
line = "（会長様とのデートに浮かれて、人形の警戒を解いていました……）"

[[dialogue]]
speaker = "トワ先生"
# 「私の教え子に手を出すなんてー！　い、いつから２人はそんなラブラブな仲になったの！？」
line = "「私の教え子に手を出すなんてー！　い、いつから２人はそんなラブラブな仲になったの！？」"

[[dialogue]]
speaker = "マリオン"
# 「ま、まあまあ、トワ。これは違うんですよ。会長様とはたまたまお会いしまして──」
line = "「ま、まあまあ、トワ。これは違うんですよ。会長様とはたまたまお会いしまして──」"

[[dialogue]]
speaker = "unk"
# 俺から誘いました！
line = "俺から誘いました！"

[[dialogue]]
speaker = "unk"
# マリオンとデート中です！
line = "マリオンとデート中です！"

[[dialogue]]
speaker = "マリオン"
# 「ひゃ！？」
line = "「ひゃ！？」"

[[dialogue]]
speaker = "トワ先生"
# 「ひぇぇ、先生の目の前で肩を寄せるなんて、会長くん積極的……そんな一面もあったんだね」
line = "「ひぇぇ、先生の目の前で肩を寄せるなんて、会長くん積極的……そんな一面もあったんだね」"

[[dialogue]]
speaker = "マリオン"
# 「か、会長様、あの、今はさすがに……い、いたずらはおよしください……」
line = "「か、会長様、あの、今はさすがに……い、いたずらはおよしください……」"

[[dialogue]]
speaker = "トワ先生"
# 「ふわ～……そんなに幸せそうな顔をしているマリオンを見るのは初めてだよ～……びっくり」
line = "「ふわ～……そんなに幸せそうな顔をしているマリオンを見るのは初めてだよ～……びっくり」"

[[dialogue]]
speaker = "マリオン"
# 「えっ……？　今の私、どんな顔してるんですか……？」
line = "「えっ……？　今の私、どんな顔してるんですか……？」"

[[dialogue]]
speaker = "トワ先生"
# 「あ、自分じゃわかんないんだ～」
line = "「あ、自分じゃわかんないんだ～」"

[[dialogue]]
speaker = "トワ先生"
# 「ほら、マリオンっていつも物腰は柔らかいけど、どこか達観してて、なんでも知ってる～みたいに振る舞ってるじゃない？」
line = "「ほら、マリオンっていつも物腰は柔らかいけど、どこか達観してて、なんでも知ってる～みたいに振る舞ってるじゃない？」"

[[dialogue]]
speaker = "マリオン"
# 「そ、そうでしたか……？　そんなことないと思いますけど……」
line = "「そ、そうでしたか……？　そんなことないと思いますけど……」"

[[dialogue]]
speaker = "トワ先生"
# 「そんなことあるよ。伊達に付き合い長くないし。でもね、今のマリオンはすごく『女の子』って顔してる」
line = "「そんなことあるよ。伊達に付き合い長くないし。でもね、今のマリオンはすごく『女の子』って顔してる」"

[[dialogue]]
speaker = "マリオン"
# 「…………ッ！？」
line = "「…………ッ！？」"

[[dialogue]]
speaker = "トワ先生"
# 「マリオンが女の子にちょっかいかけるノリで、遊びで会長くんとお付き合いしてるなら、先生として咎めなきゃ！　って思ってたけど」
line = "「マリオンが女の子にちょっかいかけるノリで、遊びで会長くんとお付き合いしてるなら、先生として咎めなきゃ！　って思ってたけど」"

[[dialogue]]
speaker = "トワ先生"
# 「うん、２人が本気なら、私からは何も言うことはないよ。末永くお幸せにね」
line = "「うん、２人が本気なら、私からは何も言うことはないよ。末永くお幸せにね」"

[[dialogue]]
speaker = "トワ先生"
# 「会長くん、マリオンは面倒なところもある……ううん、面倒なところだらけだけど、可愛がってあげてね」
line = "「会長くん、マリオンは面倒なところもある……ううん、面倒なところだらけだけど、可愛がってあげてね」"

[[dialogue]]
speaker = "マリオン"
# 「か、会長様を可愛がるのは私の方です！　ですよね、会長様！？」
line = "「か、会長様を可愛がるのは私の方です！　ですよね、会長様！？」"

[[dialogue]]
speaker = "トワ先生"
# 「はいはい、そういうことにしておくね～。ふふふふ♪」
line = "「はいはい、そういうことにしておくね～。ふふふふ♪」"

[[dialogue]]
speaker = "マリオン"
# 「もう！　トワ！」
line = "「もう！　トワ！」"

[[dialogue]]
speaker = "トワ先生"
# 「でも会長くん？　学生として、星徒会長として、節度を護った恋愛を、だよ！」
line = "「でも会長くん？　学生として、星徒会長として、節度を護った恋愛を、だよ！」"

[[dialogue]]
speaker = "トワ先生"
# 「２人の邪魔しちゃ悪いから、お邪魔虫はここで退散するね！　お幸せにー！」
line = "「２人の邪魔しちゃ悪いから、お邪魔虫はここで退散するね！　お幸せにー！」"

[[dialogue]]
speaker = "マリオン"
# 「もう、トワったら……」
line = "「もう、トワったら……」"

[[dialogue]]
speaker = "unk"
# マリオンが恥ずかしがってるの珍しいね
line = "マリオンが恥ずかしがってるの珍しいね"

[[dialogue]]
speaker = "マリオン"
# 「むっ。私をからかうなんて、会長様も随分と成長なさいましたね？」
line = "「むっ。私をからかうなんて、会長様も随分と成長なさいましたね？」"

[[dialogue]]
speaker = "マリオン"
# 「ですが……そうですね。他の方ならともかく、旧知の間柄のトワにイチャついてるところを見られるのは、少しだけ気恥ずかしかったです」
line = "「ですが……そうですね。他の方ならともかく、旧知の間柄のトワにイチャついてるところを見られるのは、少しだけ気恥ずかしかったです」"

[[dialogue]]
speaker = "マリオン"
# 「以前の私ならば、そんなこともなかったはずなのですけど……自分のことながら、驚いてしまいました」
line = "「以前の私ならば、そんなこともなかったはずなのですけど……自分のことながら、驚いてしまいました」"

[[dialogue]]
speaker = "マリオン"
# 「でも……私からお誘いしたのに、会長様はかばってくださいましたね」
line = "「でも……私からお誘いしたのに、会長様はかばってくださいましたね」"

[[dialogue]]
speaker = "マリオン"
# 「力強く、グイッと引き寄せられて……愛玩動物のようにお可愛らしい会長様の意外な一面……私、ドキドキしてしまいました<emoji=heart04>」
line = "「力強く、グイッと引き寄せられて……愛玩動物のようにお可愛らしい会長様の意外な一面……私、ドキドキしてしまいました<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 押されると案外弱かったり……？
line = "押されると案外弱かったり……？"

[[dialogue]]
speaker = "unk"
# いつも押せ押せだけど
line = "いつも押せ押せだけど"

[[dialogue]]
speaker = "マリオン"
# 「ふふふ、そうかもしれません」
line = "「ふふふ、そうかもしれません」"

[[dialogue]]
speaker = "マリオン"
# 「魔女として永い年月を生きていますが……このような感情は初めてです。まだ新しく知る感情があったなんて……長生きはしてみるものですね」
line = "「魔女として永い年月を生きていますが……このような感情は初めてです。まだ新しく知る感情があったなんて……長生きはしてみるものですね」"

[[dialogue]]
speaker = "マリオン"
# 「さ、会長様。デートはまだまだこれからです。夜は長いですよ」
line = "「さ、会長様。デートはまだまだこれからです。夜は長いですよ」"

[[dialogue]]
speaker = "unk"
# 節度を護った恋愛をしないと……
line = "節度を護った恋愛をしないと……"

[[dialogue]]
speaker = "unk"
# で、でも、星徒会長として
line = "で、でも、星徒会長として"

[[dialogue]]
speaker = "マリオン"
# 「まあまあ、ご存じありませんか、会長様」
line = "「まあまあ、ご存じありませんか、会長様」"

[[dialogue]]
speaker = "マリオン"
# 「古今東西の寓話において、魔女は人の欲望を叶え、そして、堕落させる者……私とて例外ではありません」
line = "「古今東西の寓話において、魔女は人の欲望を叶え、そして、堕落させる者……私とて例外ではありません」"

[[dialogue]]
speaker = "マリオン"
# 「というか、私ばかりドキドキさせられていては不公平です。た～っぷり私にドキドキしていただかなくては、魔女の沽券に関わりますので」
line = "「というか、私ばかりドキドキさせられていては不公平です。た～っぷり私にドキドキしていただかなくては、魔女の沽券に関わりますので」"

[[dialogue]]
speaker = "マリオン"
# 「これから始まる夜こそが、魔女の時間……もっともっと、私をドキドキさせてくださいね、会長様<emoji=heart04>」
line = "「これから始まる夜こそが、魔女の時間……もっともっと、私をドキドキさせてくださいね、会長様<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 耳元で囁き、鼓膜に注がれたマリオンの言葉は、まるで魔女が窯で調合した媚薬のようで。
line = "耳元で囁き、鼓膜に注がれたマリオンの言葉は、まるで魔女が窯で調合した媚薬のようで。"

[[dialogue]]
speaker = "unk"
# この後、俺はマリオンと蜂蜜よりもねっとりと、胸焼けするほどの甘い一夜を過ごすのであった──
line = "この後、俺はマリオンと蜂蜜よりもねっとりと、胸焼けするほどの甘い一夜を過ごすのであった──"
