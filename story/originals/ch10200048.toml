line = "「結局、用意したゴム、一箱全部使っちゃいました<emoji=heart04>　もう<emoji=heart04>　これから配信だったのに……本当にエッチな彼氏さんなんだから<emoji=heart04>　はあぁぁ<emoji=heart04>」"

