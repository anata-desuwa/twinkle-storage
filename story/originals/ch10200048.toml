line = "「って、あっ……つい言っちゃった<emoji=heart04>　ごめんね、画面の向こうのお兄ちゃんたち……<emoji=heart04>　実は……配信始まる前に、我慢できなくてもうエッチしちゃってるの<emoji=heart04>」"

[[dialogue]]
