[[dialogue]]
speaker = "ルルカ"
# 「第１回が『お兄ちゃん』達に大好評だったので……今回、こうして第２回を企画しちゃいました～。いぇ～い<emoji=heart04>　ぴーすぴーす<emoji=heart04>」
line = "「第１回が『お兄ちゃん』達に大好評だったので……今回、こうして第２回を企画しちゃいました～。いぇ～い<emoji=heart04>　ぴーすぴーす<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
# 「前回に引き続き、竿役とカメラ係はデカおち○ぽな、ルカルカの彼氏さんに協力してもらってます<emoji=heart04>　お兄ちゃん、リスナーのみんなに挨拶して～」
line = "「前回に引き続き、竿役とカメラ係はデカおち○ぽな、ルカルカの彼氏さんに協力してもらってます<emoji=heart04>　お兄ちゃん、リスナーのみんなに挨拶して～」"

