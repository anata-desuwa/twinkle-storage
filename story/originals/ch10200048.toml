line = "「んんっ<emoji=heart04>　ふうぅっ……あっ<emoji=heart04>　あんっ<emoji=heart04>　もうすっごく固い……<emoji=heart04>　さっきしちゃったばかりなのに……<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
