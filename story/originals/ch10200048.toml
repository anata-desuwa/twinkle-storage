[[dialogue]]
speaker = "unk"
# 撮影とは言っても、本当にエッチなライブ配信をしたりするわけではない。前回と同じで、あくまでもそういうフリだ。
line = "撮影とは言っても、本当にエッチなライブ配信をしたりするわけではない。前回と同じで、あくまでもそういうフリだ。"

