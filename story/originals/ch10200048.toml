# 「よし……じゃあ、始めるぞ。３、２、１――」
line = "「よし……じゃあ、始めるぞ。３、２、１――」"

[[dialogue]]
speaker = "ルルカ"
# 「キュー、キュー、キューッと、おはドルフィン<emoji=heart04>　リスナーのお兄ちゃんたち、『汐ルカルカ秘密の裏配信』へようこそ<emoji=heart04>」
