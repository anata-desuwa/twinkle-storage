[[dialogue]]
speaker = "unk"
# 第１話,新衣装を披露しちゃうし♪,P
line = "第１話,新衣装を披露しちゃうし♪,P"

[[dialogue]]
speaker = "unk"
# 流星学園のギャル天使・ウズメイアと交際をするようになってから、最初のバレンタインを数日後に控えた、ある日の放課後……
line = "流星学園のギャル天使・ウズメイアと交際をするようになってから、最初のバレンタインを数日後に控えた、ある日の放課後……"

[[dialogue]]
speaker = "ウズメイア"
# 「失礼しまーす！　会長くんに用事が……あ、いたいた。ちょりっす～♪」
line = "「失礼しまーす！　会長くんに用事が……あ、いたいた。ちょりっす～♪」"

[[dialogue]]
speaker = "マトイ"
# 「ふふっ。ウズメイアさん、今日も元気いっぱいだね」
line = "「ふふっ。ウズメイアさん、今日も元気いっぱいだね」"

[[dialogue]]
speaker = "ウズメイア"
# 「元気なのが取り柄ですから！　マトイ先輩もアナちゃんもこんにちは！」
line = "「元気なのが取り柄ですから！　マトイ先輩もアナちゃんもこんにちは！」"

[[dialogue]]
speaker = "ウズメイア"
# 「……って、あれれ。今ってもしかしてお仕事中？　お邪魔だったり～……？」
line = "「……って、あれれ。今ってもしかしてお仕事中？　お邪魔だったり～……？」"

[[dialogue]]
speaker = "アナ"
# 「ノープロブレムです。年明けに溜まっていたお仕事も片付いて、数日前から星徒会は平和そのもの」
line = "「ノープロブレムです。年明けに溜まっていたお仕事も片付いて、数日前から星徒会は平和そのもの」"

[[dialogue]]
speaker = "マトイ"
# 「ちょうどお茶でもしようかって話してたところなんだ。ウズメイアさんも一緒にどうかな？」
line = "「ちょうどお茶でもしようかって話してたところなんだ。ウズメイアさんも一緒にどうかな？」"

[[dialogue]]
speaker = "ウズメイア"
# 「わー、ありがとうございます！　ぜひぜひ！」
line = "「わー、ありがとうございます！　ぜひぜひ！」"

[[dialogue]]
speaker = "アナ"
# 「会長とお付き合いするようになってから、ウズメさんもすっかり新星星徒会に馴染みましたね」
line = "「会長とお付き合いするようになってから、ウズメさんもすっかり新星星徒会に馴染みましたね」"

[[dialogue]]
speaker = "マトイ"
# 「そうだね～。いつも賑やかにしてくれるから私たちも嬉しいな。今日もゆっくりしていってね」
line = "「そうだね～。いつも賑やかにしてくれるから私たちも嬉しいな。今日もゆっくりしていってね」"

[[dialogue]]
speaker = "ウズメイア"
# 「えへへ～、それじゃあお言葉に甘えて。今日もいっぱいお喋りしちゃうし♪」
line = "「えへへ～、それじゃあお言葉に甘えて。今日もいっぱいお喋りしちゃうし♪」"

[[dialogue]]
speaker = "アナ"
# 「いつものお茶請けの話題……『今日の会長』ですが、色々と仕入れています。ウズメさんがいない時の会長エピソードはたんまり」
line = "「いつものお茶請けの話題……『今日の会長』ですが、色々と仕入れています。ウズメさんがいない時の会長エピソードはたんまり」"

[[dialogue]]
speaker = "ウズメイア"
# 「マジで！？　最高だし！　聞かせて聞かせて！」
line = "「マジで！？　最高だし！　聞かせて聞かせて！」"

[[dialogue]]
speaker = "アナ"
# 「今日のネタは、かっこいい系の話題とちょっとおちゃめな話題と、錬金術同好会で大変な目にあった話題の３種があります」
line = "「今日のネタは、かっこいい系の話題とちょっとおちゃめな話題と、錬金術同好会で大変な目にあった話題の３種があります」"

[[dialogue]]
speaker = "unk"
# 最後のは思い出させないで……！
line = "最後のは思い出させないで……！"

[[dialogue]]
speaker = "ウズメイア"
# 「えー、全部聞きたい！　お付き合いしてる会長くんのことは、いっぱい知っておきたいし～♪」
line = "「えー、全部聞きたい！　お付き合いしてる会長くんのことは、いっぱい知っておきたいし～♪」"

[[dialogue]]
speaker = "ウズメイア"
# 「教えてくれたらお礼に、今度また抹茶パフェご馳走しちゃうし！」
line = "「教えてくれたらお礼に、今度また抹茶パフェご馳走しちゃうし！」"

[[dialogue]]
speaker = "アナ"
# 「イエス。副会長権限により、知りうる会長のデータを全て進呈しましょう」
line = "「イエス。副会長権限により、知りうる会長のデータを全て進呈しましょう」"

[[dialogue]]
speaker = "ウズメイア"
# 「イェ～イ、ハイタッチ♪」
line = "「イェ～イ、ハイタッチ♪」"

[[dialogue]]
speaker = "アナ"
# 「いぇ～い」
line = "「いぇ～い」"

[[dialogue]]
speaker = "マトイ"
# 「あはは……まあ、楽しそうに盛り上がるのはいいことだよね」
line = "「あはは……まあ、楽しそうに盛り上がるのはいいことだよね」"

[[dialogue]]
speaker = "unk"
# 俺のプライベートはどこに？？？
line = "俺のプライベートはどこに？？？"

[[dialogue]]
speaker = "unk"
# 自分の話題で盛り上がられるのはちょっぴり恥ずかしいのだけど……
line = "自分の話題で盛り上がられるのはちょっぴり恥ずかしいのだけど……"

[[dialogue]]
speaker = "unk"
# ウズメは学び舎の違う俺に会うために、わざわざ出向いてくれている。そして俺に関するどんな些細な話題でも、ニコニコと嬉しそうに聞いてくれる。
line = "ウズメは学び舎の違う俺に会うために、わざわざ出向いてくれている。そして俺に関するどんな些細な話題でも、ニコニコと嬉しそうに聞いてくれる。"

[[dialogue]]
speaker = "unk"
# それがとても嬉しいから、俺は気恥ずかしさを覚えつつも『今日の会長』なんていう話題を止めることができないのだった。
line = "それがとても嬉しいから、俺は気恥ずかしさを覚えつつも『今日の会長』なんていう話題を止めることができないのだった。"

[[dialogue]]
speaker = "ウズメイア"
# 「──って！　お喋りに夢中で忘れてたし！　今日はちゃんと用事があったんだった！」
line = "「──って！　お喋りに夢中で忘れてたし！　今日はちゃんと用事があったんだった！」"

[[dialogue]]
speaker = "マトイ"
# 「そういえば部屋に入ってくる時、そんなことを言ってたね。どんなこと？」
line = "「そういえば部屋に入ってくる時、そんなことを言ってたね。どんなこと？」"

[[dialogue]]
speaker = "ウズメイア"
# 「実はあたし、新たな戦闘服を入手しました！　ついさっき！」
line = "「実はあたし、新たな戦闘服を入手しました！　ついさっき！」"

[[dialogue]]
speaker = "unk"
# どういうこと！？
line = "どういうこと！？"

[[dialogue]]
speaker = "アナ"
# 「ああ……なるほど。この間から、理事長がウキウキでバレンタインフォームのデザインを作っていましたね。あれ、ウズメさんの衣装だったんですか」
line = "「ああ……なるほど。この間から、理事長がウキウキでバレンタインフォームのデザインを作っていましたね。あれ、ウズメさんの衣装だったんですか」"

[[dialogue]]
speaker = "ウズメイア"
# 「そうなの！　んでね、さっきいきなり呼び出されて、ホイって感じでくれたの！　いぇい、祝・２着目の人工戦闘服！」
line = "「そうなの！　んでね、さっきいきなり呼び出されて、ホイって感じでくれたの！　いぇい、祝・２着目の人工戦闘服！」"

[[dialogue]]
speaker = "マトイ"
# 「そっかー。早速、会長に見てもらおうと思ってやってきたってことだね」
line = "「そっかー。早速、会長に見てもらおうと思ってやってきたってことだね」"

[[dialogue]]
speaker = "ウズメイア"
# 「はい！　というわけで～……へんし～んっ！」
line = "「はい！　というわけで～……へんし～んっ！」"

[[dialogue]]
speaker = "ウズメイア"
# 「ぢゃ～ん！　どうどう、めっっっちゃ可愛いっしょ～<emoji=heart04>　これがあたしのバレンタインフォームだし！」
line = "「ぢゃ～ん！　どうどう、めっっっちゃ可愛いっしょ～<emoji=heart04>　これがあたしのバレンタインフォームだし！」"

[[dialogue]]
speaker = "unk"
# すごく可愛いっ！！
line = "すごく可愛いっ！！"

[[dialogue]]
speaker = "マトイ"
# 「本当だね、よく似合ってる……和風喫茶のウェイトレスさんみたい！」
line = "「本当だね、よく似合ってる……和風喫茶のウェイトレスさんみたい！」"

[[dialogue]]
speaker = "アナ"
# 「普段のギャルファッションと対称的ですね。清楚な格好もよくお似合いです」
line = "「普段のギャルファッションと対称的ですね。清楚な格好もよくお似合いです」"

[[dialogue]]
speaker = "ウズメイア"
# 「えへへ、それほどでも～。人間界に留学するまでは、露出の少ないファッションばっかりだったからかな？」
line = "「えへへ、それほどでも～。人間界に留学するまでは、露出の少ないファッションばっかりだったからかな？」"

[[dialogue]]
speaker = "ウズメイア"
# 「久しぶりだけど、しっくりくる感じなんだ～。こういう格好もたまにはいいかもだし！」
line = "「久しぶりだけど、しっくりくる感じなんだ～。こういう格好もたまにはいいかもだし！」"

[[dialogue]]
speaker = "ウズメイア"
# 「バレンタインチョコ、この衣装で腕によりをかけて作るから！　期待しててね♪」
line = "「バレンタインチョコ、この衣装で腕によりをかけて作るから！　期待しててね♪」"

[[dialogue]]
speaker = "unk"
# ありがとう、すごく楽しみだよ！
line = "ありがとう、すごく楽しみだよ！"

[[dialogue]]
speaker = "ウズメイア"
# 「にひひ、女子力思いっきり見せちゃうし！　バレンタインデーまでにチョコ作りの練習、いっぱいしなきゃね～♪」
line = "「にひひ、女子力思いっきり見せちゃうし！　バレンタインデーまでにチョコ作りの練習、いっぱいしなきゃね～♪」"

[[dialogue]]
speaker = "マトイ"
# 「ウズメイアさんってお料理は得意なんだっけ？」
line = "「ウズメイアさんってお料理は得意なんだっけ？」"

[[dialogue]]
speaker = "ウズメイア"
# 「普段から自炊してるから、それなりって感じ……？　会長くんのお弁当とか、よく作ってますから自信はあります！」
line = "「普段から自炊してるから、それなりって感じ……？　会長くんのお弁当とか、よく作ってますから自信はあります！」"

[[dialogue]]
speaker = "ウズメイア"
# 「まぁでも基本和食ばっかりなんで、洋菓子はお勉強必須かも……あ、そーだっ」
line = "「まぁでも基本和食ばっかりなんで、洋菓子はお勉強必須かも……あ、そーだっ」"

[[dialogue]]
speaker = "ウズメイア"
# 「マトイ先輩ってお菓子作り、得意ですよね？　良ければご指導お願いできませんか？」
line = "「マトイ先輩ってお菓子作り、得意ですよね？　良ければご指導お願いできませんか？」"

[[dialogue]]
speaker = "マトイ"
# 「私がっ！？　だ、大丈夫かな～……お菓子作りはただの趣味だし、サランさんの方が適任だと思うけど……」
line = "「私がっ！？　だ、大丈夫かな～……お菓子作りはただの趣味だし、サランさんの方が適任だと思うけど……」"

[[dialogue]]
speaker = "アナ"
# 「そんなことはありません。マトイ先輩は和洋問わず素晴らしいお菓子を作れます」
line = "「そんなことはありません。マトイ先輩は和洋問わず素晴らしいお菓子を作れます」"

[[dialogue]]
speaker = "ウズメイア"
# 「うんうん、だよね！　さっき食べさせてもらったクッキーも超美味しかったし！」
line = "「うんうん、だよね！　さっき食べさせてもらったクッキーも超美味しかったし！」"

[[dialogue]]
speaker = "アナ"
# 「そして何より、星徒会で何度も手料理をふるまってきた経験から、マトイ先輩は会長の舌の好みを把握しています」
line = "「そして何より、星徒会で何度も手料理をふるまってきた経験から、マトイ先輩は会長の舌の好みを把握しています」"

[[dialogue]]
speaker = "アナ"
# 「会長に本命チョコを贈る上で、マトイ先輩はこれ以上ない指南役と言えるでしょう」
line = "「会長に本命チョコを贈る上で、マトイ先輩はこれ以上ない指南役と言えるでしょう」"

[[dialogue]]
speaker = "ウズメイア"
# 「──言われてみればそうじゃん！？　こんな近くにグランドマスターがいたことに今気づいたし！」
line = "「──言われてみればそうじゃん！？　こんな近くにグランドマスターがいたことに今気づいたし！」"

[[dialogue]]
speaker = "マトイ"
# 「私が……ぐ、グランドマスター！？　そんなこと……初めて言われたっ……！！」
line = "「私が……ぐ、グランドマスター！？　そんなこと……初めて言われたっ……！！」"

[[dialogue]]
speaker = "ウズメイア"
# 「師匠！　お願いします、あたしに会長くん好みのお菓子を作らせてくださいっ！」
line = "「師匠！　お願いします、あたしに会長くん好みのお菓子を作らせてくださいっ！」"

[[dialogue]]
speaker = "マトイ"
# 「師匠……！！　そそ、そこまで頼りにされたら断れないよ！　うん、任せて！　早速、今日から一緒に練習しよっか！」
line = "「師匠……！！　そそ、そこまで頼りにされたら断れないよ！　うん、任せて！　早速、今日から一緒に練習しよっか！」"

[[dialogue]]
speaker = "ウズメイア"
# 「感謝感激だし～！　あ、でもでも、流星学園のバレンタイン行事で、放課後はちょっとつぶれちゃうんですけど……」
line = "「感謝感激だし～！　あ、でもでも、流星学園のバレンタイン行事で、放課後はちょっとつぶれちゃうんですけど……」"

[[dialogue]]
speaker = "マトイ"
# 「うん、そのことは知ってるから大丈夫だよ。練習は夜からにしよっか？」
line = "「うん、そのことは知ってるから大丈夫だよ。練習は夜からにしよっか？」"

[[dialogue]]
speaker = "ウズメイア"
# 「やった～！　マトイ先輩のフォローがあるなら、もう勝ち確ってやつだし！！　アナちゃんも一緒にどお？」
line = "「やった～！　マトイ先輩のフォローがあるなら、もう勝ち確ってやつだし！！　アナちゃんも一緒にどお？」"

[[dialogue]]
speaker = "アナ"
# 「そうですね。いい機会ですしご一緒しましょう。なお私は、お菓子の味見には絶対の自信があります。お任せください」
line = "「そうですね。いい機会ですしご一緒しましょう。なお私は、お菓子の味見には絶対の自信があります。お任せください」"

[[dialogue]]
speaker = "ウズメイア"
# 「えへへっ、心強い！　楽しくなってきたし～♪」
line = "「えへへっ、心強い！　楽しくなってきたし～♪」"

[[dialogue]]
speaker = "unk"
# 恋人のウズメがこんなにもやる気を出して、俺へのチョコレートを作ってくれるだなんて。
line = "恋人のウズメがこんなにもやる気を出して、俺へのチョコレートを作ってくれるだなんて。"

[[dialogue]]
speaker = "unk"
# バレンタイン当日にどんなチョコがもらえるのか、今から楽しみになってしまうのだった──
line = "バレンタイン当日にどんなチョコがもらえるのか、今から楽しみになってしまうのだった──"
