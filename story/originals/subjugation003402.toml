[[dialogue]]
speaker = "マハムート"
# 「失礼するわ、会長」
line = "「失礼するわ、会長」"

[[dialogue]]
speaker = "unk"
# 星徒会室の扉が開いて、マムを先頭に５人の女の子が入ってきた。
line = "星徒会室の扉が開いて、マムを先頭に５人の女の子が入ってきた。"

[[dialogue]]
speaker = "unk"
# そして開口一番──
line = "そして開口一番──"

[[dialogue]]
speaker = "黒ベア子"
# 「あなたが、この子のパパくま！？」
line = "「あなたが、この子のパパくま！？」"

[[dialogue]]
speaker = "unk"
# クマのフードを被った女の子が、勢いよく俺に詰め寄ってくる。
line = "クマのフードを被った女の子が、勢いよく俺に詰め寄ってくる。"

[[dialogue]]
speaker = "unk"
# キミは確か、以前のクマロボ騒ぎの……
line = "キミは確か、以前のクマロボ騒ぎの……"

[[dialogue]]
speaker = "unk"
# 待って待って、どういうこと！？
line = "待って待って、どういうこと！？"

[[dialogue]]
speaker = "黒ベア子"
# 「黒ベア子だくま♪」
line = "「黒ベア子だくま♪」"

[[dialogue]]
speaker = "マハムート"
# 「会長、私から簡単に事情を説明してあげるわ。畏怖しながら聞きなさい」
line = "「会長、私から簡単に事情を説明してあげるわ。畏怖しながら聞きなさい」"

[[dialogue]]
speaker = "unk"
# マムから説明を受けて、およその事情は把握できた。しかし──
line = "マムから説明を受けて、およその事情は把握できた。しかし──"

[[dialogue]]
speaker = "unk"
# さすがに俺じゃないよ
line = "さすがに俺じゃないよ"

[[dialogue]]
speaker = "フィオナ"
# 「それはそうですよね……」
line = "「それはそうですよね……」"

[[dialogue]]
speaker = "黒ベア子"
# 「また違ったくま～！　これで４つ目の世界なのに、全然見つからないくま～！」
line = "「また違ったくま～！　これで４つ目の世界なのに、全然見つからないくま～！」"

[[dialogue]]
speaker = "unk"
# ４つも！？
line = "４つも！？"

[[dialogue]]
speaker = "ベア子"
# 「『ゲシュペンス島』、『芸術都市アテネス』、『スプリングガーデン』を捜してきて、この『流星市国』は４番目くま」
line = "「『ゲシュペンス島』、『芸術都市アテネス』、『スプリングガーデン』を捜してきて、この『流星市国』は４番目くま」"

[[dialogue]]
speaker = "unk"
# それにゲシュペンス島といえばアナが……
line = "それにゲシュペンス島といえばアナが……"

[[dialogue]]
speaker = "unk"
# アテネス？　アルテのいた世界？
line = "アテネス？　アルテのいた世界？"

[[dialogue]]
speaker = "ルルゥ"
# 「アナさんを知ってる、なの……！？」
line = "「アナさんを知ってる、なの……！？」"

[[dialogue]]
speaker = "unk"
# キミはアナを知ってるの？
line = "キミはアナを知ってるの？"

[[dialogue]]
speaker = "unk"
# アナはうちの副会長だよ
line = "アナはうちの副会長だよ"

[[dialogue]]
speaker = "ルルゥ"
# 「ぁ……ぅ……」
line = "「ぁ……ぅ……」"

[[dialogue]]
speaker = "マハムート"
# 「紹介が遅れたわね。この子はルルゥ。今、名前の挙がったゲシュペンス島から来たカーバンクル<ruby=むすめ>娘</ruby>よ」
line = "「紹介が遅れたわね。この子はルルゥ。今、名前の挙がったゲシュペンス島から来たカーバンクル<ruby>娘<rt>むすめ</rt></ruby>よ」"

[[dialogue]]
speaker = "マハムート"
# 「ルルゥ。彼は緋宮クロト。この学園の星徒会長を務めているわ」
line = "「ルルゥ。彼は緋宮クロト。この学園の星徒会長を務めているわ」"

[[dialogue]]
speaker = "ルルゥ"
# 「かい、ちょう……会長、さん？」
line = "「かい、ちょう……会長、さん？」"

[[dialogue]]
speaker = "マハムート"
# 「この学園のリーダー、と言えば分かるかしら？　いささか頼りない部分もあるけれどね」
line = "「この学園のリーダー、と言えば分かるかしら？　いささか頼りない部分もあるけれどね」"

[[dialogue]]
speaker = "マハムート"
# 「そうね、あなた達でいうなら、あの少年のようなポジションかしら？」
line = "「そうね、あなた達でいうなら、あの少年のようなポジションかしら？」"

[[dialogue]]
speaker = "ルルゥ"
# 「ご主人様……なんとなく、分かったかも、なの……」
line = "「ご主人様……なんとなく、分かったかも、なの……」"

[[dialogue]]
speaker = "フィオナ"
# 「そういえばアナさんも、別の世界に召喚されてしまったことがある、というお話でしたね」
line = "「そういえばアナさんも、別の世界に召喚されてしまったことがある、というお話でしたね」"

[[dialogue]]
speaker = "フィオナ"
# 「もしかして、それがゲシュペンス島だったのですか？」
line = "「もしかして、それがゲシュペンス島だったのですか？」"

[[dialogue]]
speaker = "unk"
# アナからはそう聞いてる
line = "アナからはそう聞いてる"

[[dialogue]]
speaker = "ルルゥ"
# 「ルルゥは、アナさんのこと、直接は知らない、なの……」
line = "「ルルゥは、アナさんのこと、直接は知らない、なの……」"

[[dialogue]]
speaker = "ルルゥ"
# 「でもオシュネーが、アナさんのこと話してた……すごい弓使いのヒト、なの」
line = "「でもオシュネーが、アナさんのこと話してた……すごい弓使いのヒト、なの」"

[[dialogue]]
speaker = "ルルゥ"
# 「これ、見て欲しい、なの」
line = "「これ、見て欲しい、なの」"

[[dialogue]]
speaker = "unk"
# アナの弓の装飾に似てる
line = "アナの弓の装飾に似てる"

[[dialogue]]
speaker = "unk"
# この装飾……
line = "この装飾……"

[[dialogue]]
speaker = "ルルゥ"
# 「こちらの世界に来る前に、何かの役に立つかもしれないって、オシュネーから弓を預かった、なの……」
line = "「こちらの世界に来る前に、何かの役に立つかもしれないって、オシュネーから弓を預かった、なの……」"

[[dialogue]]
speaker = "ルルゥ"
# 「そうしたら、世界を渡った時に弓と宝石がひとつになって、こんな風になってた、なの」
line = "「そうしたら、世界を渡った時に弓と宝石がひとつになって、こんな風になってた、なの」"

[[dialogue]]
speaker = "ルルゥ"
# 「燃え盛る炎の力を感じるの……」
line = "「燃え盛る炎の力を感じるの……」"

[[dialogue]]
speaker = "フィオナ"
# 「アナさんの弓とひとつになったことで炎の力が宿った、ということでしょうか？」
line = "「アナさんの弓とひとつになったことで炎の力が宿った、ということでしょうか？」"

[[dialogue]]
speaker = "ルルゥ"
# 「はい、なの……」
line = "「はい、なの……」"

[[dialogue]]
speaker = "赤ちゃんクマロボ"
# 「ばぶー<emoji=heart04>」
line = "「ばぶー<emoji=heart04>」"

[[dialogue]]
speaker = "黒ベア子"
# 「呑気に話してる場合じゃないくま！　この世界にパパがいないなら、別の世界に捜しに行くしかないくま！」
line = "「呑気に話してる場合じゃないくま！　この世界にパパがいないなら、別の世界に捜しに行くしかないくま！」"

[[dialogue]]
speaker = "マハムート"
# 「次はどこに行くつもりなのかしら？」
line = "「次はどこに行くつもりなのかしら？」"

[[dialogue]]
speaker = "黒ベア子"
# 「抜かりはないくま！　ちゃんと次の世界の案内人には目星を付けてるくま！」
line = "「抜かりはないくま！　ちゃんと次の世界の案内人には目星を付けてるくま！」"

[[dialogue]]
speaker = "黒ベア子"
# 「む～～～～っ！　いでよ、案内人！」
line = "「む～～～～っ！　いでよ、案内人！」"

[[dialogue]]
speaker = "unk"
# 黒ベア子が手をかざすと、そこに異世界に通じるであろう真っ黒な穴が出現する。
line = "黒ベア子が手をかざすと、そこに異世界に通じるであろう真っ黒な穴が出現する。"

[[dialogue]]
speaker = "unk"
# そして、そこから──
line = "そして、そこから──"

[[dialogue]]
speaker = "unk"
# 誰も現れる様子はなく、代わりにカラフルなキャンディが詰まったビンがひとつ転がり出てくる。
line = "誰も現れる様子はなく、代わりにカラフルなキャンディが詰まったビンがひとつ転がり出てくる。"

[[dialogue]]
speaker = "マハムート"
# 「…………これは、どういうことかしら？」
line = "「…………これは、どういうことかしら？」"

[[dialogue]]
speaker = "黒ベア子"
# 「次の世界の住人を、案内役として呼び出したくま。でも、どこかに落としちゃったみたいくま！」
line = "「次の世界の住人を、案内役として呼び出したくま。でも、どこかに落としちゃったみたいくま！」"

[[dialogue]]
speaker = "ベア子"
# 「どこかに落としちゃった、じゃ済まないくま！？」
line = "「どこかに落としちゃった、じゃ済まないくま！？」"

[[dialogue]]
speaker = "黒ベア子"
# 「こ、この世界にはちゃんと来てるはずくま！　きっとこの近くにいるはずだから、みんなで捜しに行くくま！」
line = "「こ、この世界にはちゃんと来てるはずくま！　きっとこの近くにいるはずだから、みんなで捜しに行くくま！」"

[[dialogue]]
speaker = "フィオナ"
# 「捜すといっても……顔も分からない相手では、捜しようがないのでは……」
line = "「捜すといっても……顔も分からない相手では、捜しようがないのでは……」"

[[dialogue]]
speaker = "unk"
# 目撃証言を募ってみよう
line = "目撃証言を募ってみよう"

[[dialogue]]
speaker = "unk"
# そうだな……
line = "そうだな……"

[[dialogue]]
speaker = "フィオナ"
# 「なるほど……よい考えかもしれません。学園の掲示板で呼びかけてみましょうか」
line = "「なるほど……よい考えかもしれません。学園の掲示板で呼びかけてみましょうか」"

[[dialogue]]
speaker = "書き込み"
# 『見慣れない服装をした、おっとりしたお姉さんを見かけました』
line = "『見慣れない服装をした、おっとりしたお姉さんを見かけました』"

[[dialogue]]
speaker = "書き込み"
# 『私も見ました。流星学園の校舎前で特大の花火をぶっ放していましたよ』
line = "『私も見ました。流星学園の校舎前で特大の花火をぶっ放していましたよ』"

[[dialogue]]
speaker = "フィオナ"
# 「早速、それらしい人の目撃情報が集まりましたね。ですが……」
line = "「早速、それらしい人の目撃情報が集まりましたね。ですが……」"

[[dialogue]]
speaker = "マハムート"
# 「校舎前で特大の花火とは、これはお仕置きが必要ね」
line = "「校舎前で特大の花火とは、これはお仕置きが必要ね」"

[[dialogue]]
speaker = "ルルゥ"
# 「突然、違う世界に呼び出されて、混乱してるだけかも、なの……大目にみてあげて欲しいかも、なの……」
line = "「突然、違う世界に呼び出されて、混乱してるだけかも、なの……大目にみてあげて欲しいかも、なの……」"

[[dialogue]]
speaker = "マハムート"
# 「ふむ……まあ被告人の<ruby=ちんじゅつ>陳述</ruby>くらいは聞いてあげようじゃないの」
line = "「ふむ……まあ被告人の<ruby>陳述<rt>ちんじゅつ</rt></ruby>くらいは聞いてあげようじゃないの」"

[[dialogue]]
speaker = "ルルゥ"
# 「何を言ってるのかはわからないけど、許してほしいのっ！？」
line = "「何を言ってるのかはわからないけど、許してほしいのっ！？」"

[[dialogue]]
speaker = "unk"
# とにかく現場に行ってみよう
line = "とにかく現場に行ってみよう"

[[dialogue]]
speaker = "マハムート"
# 「待ちなさい」
line = "「待ちなさい」"

[[dialogue]]
speaker = "マハムート"
# 「ルルゥがこの格好で学園内を歩き回れば嫌でも注目を浴びるわ。ヒトを恐れている彼女にそれを強いるのは酷というものよ」
line = "「ルルゥがこの格好で学園内を歩き回れば嫌でも注目を浴びるわ。ヒトを恐れている彼女にそれを強いるのは酷というものよ」"

[[dialogue]]
speaker = "ルルゥ"
# 「マムさん……！」
line = "「マムさん……！」"

[[dialogue]]
speaker = "フィオナ"
# 「ではルルゥさんには、ベア子さんたちと一緒にここで待っていてもらいましょうか？」
line = "「ではルルゥさんには、ベア子さんたちと一緒にここで待っていてもらいましょうか？」"

[[dialogue]]
speaker = "マハムート"
# 「それよりもいい方法があるわ。フィオナ、流星学園附属校の制服はすぐに用意出来るでしょう？」
line = "「それよりもいい方法があるわ。フィオナ、流星学園附属校の制服はすぐに用意出来るでしょう？」"

[[dialogue]]
speaker = "マハムート"
# 「あなたはそれを着て一緒についてくるのよ、いいわね」
line = "「あなたはそれを着て一緒についてくるのよ、いいわね」"

[[dialogue]]
speaker = "ルルゥ"
# 「ルルゥもそうしたい、なの。マムさんの側にいるのが、一番安心できる、なの……」
line = "「ルルゥもそうしたい、なの。マムさんの側にいるのが、一番安心できる、なの……」"

[[dialogue]]
speaker = "フィオナ"
# 「わかりました。ではすぐに用意しますね」
line = "「わかりました。ではすぐに用意しますね」"

[[dialogue]]
speaker = "ルルゥ"
# 「お願いします、なのっ」
line = "「お願いします、なのっ」"
