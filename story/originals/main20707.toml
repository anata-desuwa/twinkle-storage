[[dialogue]]
speaker = "アポロ（大人）"
# 「やましいことがないのなら、極星学園の副会長だって自分から言うべきだった。言わなかった結果、梨緒たちを騙すことになってしまった」
line = "「やましいことがないのなら、極星学園の副会長だって自分から言うべきだった。言わなかった結果、梨緒たちを騙すことになってしまった」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「でも誰だって間違える。失敗する」
line = "「でも誰だって間違える。失敗する」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「だから許してやれ」
line = "「だから許してやれ」"

[[dialogue]]
speaker = "梨緒"
# 「許す……？　私が、ベアトを……？」
line = "「許す……？　私が、ベアトを……？」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「ああ、そうだ」
line = "「ああ、そうだ」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「過ちも、失敗も、誰だって持ってる弱さだ。だからその弱さを許してやれ」
line = "「過ちも、失敗も、誰だって持ってる弱さだ。だからその弱さを許してやれ」"

[[dialogue]]
speaker = "梨緒"
# 「弱さを……許す……」
line = "「弱さを……許す……」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「弱いことは罪じゃない。恥ずかしいことでもない。誰だってそうなんだから」
line = "「弱いことは罪じゃない。恥ずかしいことでもない。誰だってそうなんだから」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「お前は選挙管理委員会の委員長なんだろう？　リーダーなら、仲間の弱さも受け止めてやれ」
line = "「お前は選挙管理委員会の委員長なんだろう？　リーダーなら、仲間の弱さも受け止めてやれ」"

[[dialogue]]
speaker = "梨緒"
# 「受け止める……」
line = "「受け止める……」"

[[dialogue]]
speaker = "梨緒"
# 「わかった……とは言えない。君の言っていることを全て理解したわけじゃない」
line = "「わかった……とは言えない。君の言っていることを全て理解したわけじゃない」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「ああ、それでいい。もう少し考えてみろ」
line = "「ああ、それでいい。もう少し考えてみろ」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「さて、思ったより長話になっちゃったな。さすがにそろそろ寝ないと明日に響く」
line = "「さて、思ったより長話になっちゃったな。さすがにそろそろ寝ないと明日に響く」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「じゃ、また明日。今度こそおやすみ」
line = "「じゃ、また明日。今度こそおやすみ」"

[[dialogue]]
speaker = "unk"
# アポロはそう言うと、空になったカップを片付けて去っていった。
line = "アポロはそう言うと、空になったカップを片付けて去っていった。"

[[dialogue]]
speaker = "梨緒"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "梨緒"
# 「私は……どうすればいい……？」
line = "「私は……どうすればいい……？」"
