[[dialogue]]
speaker = "unk"
# 第２話,アムと仲良し海デート,P
line = "第２話,アムと仲良し海デート,P"

[[dialogue]]
speaker = "unk"
# 俺はアムを誘って、リップルのリゾート結界までやってきていた。
line = "俺はアムを誘って、リップルのリゾート結界までやってきていた。"

[[dialogue]]
speaker = "unk"
# 今日は学園生以外の人達も入場できる一般開放日だ。やっぱりアムと遊ぶなら、周りも賑やかな方がテンションが上がるというもの。
line = "今日は学園生以外の人達も入場できる一般開放日だ。やっぱりアムと遊ぶなら、周りも賑やかな方がテンションが上がるというもの。"

[[dialogue]]
speaker = "アム"
# 「海だーっ！　よぉし、今日は遊ぶぞ～っ！」
line = "「海だーっ！　よぉし、今日は遊ぶぞ～っ！」"

[[dialogue]]
speaker = "アム"
# 「最近、出動ばっかりだったもんね。会長と久しぶりのデートだし、思いっきり楽しんでこ！」
line = "「最近、出動ばっかりだったもんね。会長と久しぶりのデートだし、思いっきり楽しんでこ！」"

[[dialogue]]
speaker = "アム"
# 「──って、どうかしたの会長。さっきから黙って、じーっとあたしのこと見てるけど……」
line = "「──って、どうかしたの会長。さっきから黙って、じーっとあたしのこと見てるけど……」"

[[dialogue]]
speaker = "unk"
# ついつい見惚れちゃった
line = "ついつい見惚れちゃった"

[[dialogue]]
speaker = "unk"
# 恋人のアムの水着姿だから
line = "恋人のアムの水着姿だから"

[[dialogue]]
speaker = "アム"
# 「っ<emoji=heart04>　そ、そーゆうこと、ストレートに言われるとあたしも照れるんだけど……！」
line = "「っ<emoji=heart04>　そ、そーゆうこと、ストレートに言われるとあたしも照れるんだけど……！」"

[[dialogue]]
speaker = "アム"
# 「えへ、でもありがと！　カッコいいって言われるのもいいけど、恋人の会長から『可愛い』って言われるのも嬉しい！」
line = "「えへ、でもありがと！　カッコいいって言われるのもいいけど、恋人の会長から『可愛い』って言われるのも嬉しい！」"

[[dialogue]]
speaker = "アム"
# 「それじゃーさっそくだけど、遠泳で勝負しない？　あっちの島まで先についた方が勝ち！」
line = "「それじゃーさっそくだけど、遠泳で勝負しない？　あっちの島まで先についた方が勝ち！」"

[[dialogue]]
speaker = "アム"
# 「負けた方はー……お昼ご飯をご馳走するってのはどう？　あたし、泳ぎには自信があるから勝っちゃうと思うけどね！」
line = "「負けた方はー……お昼ご飯をご馳走するってのはどう？　あたし、泳ぎには自信があるから勝っちゃうと思うけどね！」"

[[dialogue]]
speaker = "unk"
# 俺だって元ライフセーバーだ！
line = "俺だって元ライフセーバーだ！"

[[dialogue]]
speaker = "アム"
# 「会長って本当にいろんなアルバイトやってるよね……なんだか強敵の予感！　いいね、燃えてきた！　よーし……勝負スタート！」
line = "「会長って本当にいろんなアルバイトやってるよね……なんだか強敵の予感！　いいね、燃えてきた！　よーし……勝負スタート！」"

[[dialogue]]
speaker = "unk"
# アムは元気いっぱいな見た目どおり、運動神経も抜群だ。けれど俺も泳ぎには自信がある。
line = "アムは元気いっぱいな見た目どおり、運動神経も抜群だ。けれど俺も泳ぎには自信がある。"

[[dialogue]]
speaker = "unk"
# 彼氏として良いところを見せたい、そんな思いで必死に泳いで──
line = "彼氏として良いところを見せたい、そんな思いで必死に泳いで──"

[[dialogue]]
speaker = "アム"
# 「ふっふーん♪　焼きそば、ごちそうさま～♪」
line = "「ふっふーん♪　焼きそば、ごちそうさま～♪」"

[[dialogue]]
speaker = "unk"
# アム、泳ぐの速すぎない！？
line = "アム、泳ぐの速すぎない！？"

[[dialogue]]
speaker = "アム"
# 「だから言ったじゃん、泳ぎは自信あるって。いやー、やっぱり勝負に勝つのって気持ちいいな～♪」
line = "「だから言ったじゃん、泳ぎは自信あるって。いやー、やっぱり勝負に勝つのって気持ちいいな～♪」"

[[dialogue]]
speaker = "アム"
# 「にひ、でも会長もなかなかだったよ？　男の子だから体力もあるし、もうちょっと長い距離だったら負けてたんじゃないかなー、あたし」
line = "「にひ、でも会長もなかなかだったよ？　男の子だから体力もあるし、もうちょっと長い距離だったら負けてたんじゃないかなー、あたし」"

[[dialogue]]
speaker = "unk"
# またリベンジしてもいい？
line = "またリベンジしてもいい？"

[[dialogue]]
speaker = "アム"
# 「もっちろん！　勝者はいつだって挑戦を受けなきゃね！」
line = "「もっちろん！　勝者はいつだって挑戦を受けなきゃね！」"

[[dialogue]]
speaker = "アム"
# 「ふふ～、でも本当に楽しいなあ。男の子と付き合うなら、今みたいな関係がいいな～って思ってたんだ～」
line = "「ふふ～、でも本当に楽しいなあ。男の子と付き合うなら、今みたいな関係がいいな～って思ってたんだ～」"

[[dialogue]]
speaker = "アム"
# 「競い合ったり、勝負したりできるのって仲良し同士の特権じゃん？」
line = "「競い合ったり、勝負したりできるのって仲良し同士の特権じゃん？」"

[[dialogue]]
speaker = "アム"
# 「仲が悪かったら、勝ち負けを決めてもギスギスするだけだし。『バトルできるのは仲良しの証拠よ！』ってヴィーナス前会長も言ってたもん」
line = "「仲が悪かったら、勝ち負けを決めてもギスギスするだけだし。『バトルできるのは仲良しの証拠よ！』ってヴィーナス前会長も言ってたもん」"

[[dialogue]]
speaker = "アム"
# 「ま、まあそのせいで友達から『本当に会長と付き合ってるの？』って聞かれることも多いんだけど……」
line = "「ま、まあそのせいで友達から『本当に会長と付き合ってるの？』って聞かれることも多いんだけど……」"

[[dialogue]]
speaker = "アム"
# 「ほら、あたしたちってあんまり人前でいちゃいちゃとかしないじゃん？」
line = "「ほら、あたしたちってあんまり人前でいちゃいちゃとかしないじゃん？」"

[[dialogue]]
speaker = "unk"
# カッコ悪いから、って言ってたよね
line = "カッコ悪いから、って言ってたよね"

[[dialogue]]
speaker = "unk"
# そういうのを誰かに見られるのは
line = "そういうのを誰かに見られるのは"

[[dialogue]]
speaker = "アム"
# 「そう！　あたしの目標は『常に凛々しく、カッコいい星騎士になること』だからね！」
line = "「そう！　あたしの目標は『常に凛々しく、カッコいい星騎士になること』だからね！」"

[[dialogue]]
speaker = "アム"
# 「今も浜辺で腕を組んだり、キスしたりしてるカップルもたくさんいるけど……ああいうのはちょっとね～……」
line = "「今も浜辺で腕を組んだり、キスしたりしてるカップルもたくさんいるけど……ああいうのはちょっとね～……」"

[[dialogue]]
speaker = "アム"
# 「はー、美味しかった♪　ねぇ、この後なんだけど、あたしの<ruby=盾>ホバークラフト</ruby>に乗って沖まで出てみない？」
line = "「はー、美味しかった♪　ねぇ、この後なんだけど、あたしの<ruby>ホバークラフト<rt>盾</rt></ruby>に乗って沖まで出てみない？」"

[[dialogue]]
speaker = "アム"
# 「マムとの訓練中はあんまり乗せてあげられなかったでしょ。かなりスピード出るから楽しいと思うよ！」
line = "「マムとの訓練中はあんまり乗せてあげられなかったでしょ。かなりスピード出るから楽しいと思うよ！」"

[[dialogue]]
speaker = "アム"
# 「……ＯＫ？　よーしっ、それじゃあ、行こ行こ、会長っ！」
line = "「……ＯＫ？　よーしっ、それじゃあ、行こ行こ、会長っ！」"

[[dialogue]]
speaker = "unk"
# そうしてアムの操縦するホバークラフトで、浜辺からずっと離れた沖のところまでやってきた。
line = "そうしてアムの操縦するホバークラフトで、浜辺からずっと離れた沖のところまでやってきた。"

[[dialogue]]
speaker = "unk"
# ２人で寝転んで空を見上げながら、まったり食休み。
line = "２人で寝転んで空を見上げながら、まったり食休み。"

[[dialogue]]
speaker = "アム"
# 「んー……絶好の海水浴日和って感じだねー……波の音も、潮風も気持ちいい～♪」
line = "「んー……絶好の海水浴日和って感じだねー……波の音も、潮風も気持ちいい～♪」"

[[dialogue]]
speaker = "unk"
# 静かでいい気分だ
line = "静かでいい気分だ"

[[dialogue]]
speaker = "アム"
# 「ね～、浜辺は賑やかだったけど、ちょっと離れれば何だか２人きりの世界って感じだし……」
line = "「ね～、浜辺は賑やかだったけど、ちょっと離れれば何だか２人きりの世界って感じだし……」"

[[dialogue]]
speaker = "アム"
# 「それにここなら誰も見てないから……よいしょっ──と♪」
line = "「それにここなら誰も見てないから……よいしょっ──と♪」"

[[dialogue]]
speaker = "アム"
# 「──ばあっ♪」
line = "「──ばあっ♪」"

[[dialogue]]
speaker = "アム"
# 「ふふっ<emoji=heart04>　会長、驚いた～？　あんまり動いたら、盾から落ちちゃうよー？」
line = "「ふふっ<emoji=heart04>　会長、驚いた～？　あんまり動いたら、盾から落ちちゃうよー？」"

[[dialogue]]
speaker = "アム"
# 「何で覆いかぶさってきたのかって……そ、そりゃあ、そのー……<emoji=heart04>」
line = "「何で覆いかぶさってきたのかって……そ、そりゃあ、そのー……<emoji=heart04>」"

[[dialogue]]
speaker = "アム"
# 「んー……ちゅっ<emoji=heart04>」
line = "「んー……ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "アム"
# 「へへー、今日の初チューゲット♪　不意打ち成功っ」
line = "「へへー、今日の初チューゲット♪　不意打ち成功っ」"

[[dialogue]]
speaker = "アム"
# 「久しぶりのデートだし、勝負ばっかりだと、会長もがっかりしちゃうかなって思って……」
line = "「久しぶりのデートだし、勝負ばっかりだと、会長もがっかりしちゃうかなって思って……」"

[[dialogue]]
speaker = "アム"
# 「ねぇ会長？　あたし、いちゃいちゃするのはカッコ悪いから嫌だって言ったけどさ。あれ、人目がある時だけだからね？」
line = "「ねぇ会長？　あたし、いちゃいちゃするのはカッコ悪いから嫌だって言ったけどさ。あれ、人目がある時だけだからね？」"

[[dialogue]]
speaker = "アム"
# 「誰にも見られてない時なら、恋人同士がすること……チューとかいっぱいしたいって思ってるから。そこは誤解しないでね」
line = "「誰にも見られてない時なら、恋人同士がすること……チューとかいっぱいしたいって思ってるから。そこは誤解しないでね」"

[[dialogue]]
speaker = "unk"
# 大丈夫、誤解してないよ
line = "大丈夫、誤解してないよ"

[[dialogue]]
speaker = "アム"
# 「えへへ<emoji=heart04>　それならよかった♪」
line = "「えへへ<emoji=heart04>　それならよかった♪」"

[[dialogue]]
speaker = "アム"
# 「うん、いいよ。ここならバレないから。大好きな会長と、いっぱいチューしたい……<emoji=heart04>」
line = "「うん、いいよ。ここならバレないから。大好きな会長と、いっぱいチューしたい……<emoji=heart04>」"

[[dialogue]]
speaker = "アム"
# 「ん……ちゅ、ちゅぅ<emoji=heart04>　好きだよ、会長っ……んちゅっ<emoji=heart04>」
line = "「ん……ちゅ、ちゅぅ<emoji=heart04>　好きだよ、会長っ……んちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# アムは、今みたいに<ruby=ひとけ>人気</ruby>がなければたくさんのキスをしてくれる。
line = "アムは、今みたいに<ruby>人気<rt>ひとけ</rt></ruby>がなければたくさんのキスをしてくれる。"

[[dialogue]]
speaker = "unk"
# 子供っぽいところもあれど、たまに見せる恋人の仕草に俺はいつもドキドキさせられてしまうのだった──
line = "子供っぽいところもあれど、たまに見せる恋人の仕草に俺はいつもドキドキさせられてしまうのだった──"
