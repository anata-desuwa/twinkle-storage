[[dialogue]]
speaker = "unk"
# その後、星霊舞闘会でヒルディオーネが優勝したことにより、星霊祭は流星学園が総合優勝を飾り、幕を閉じた。
line = "その後、星霊舞闘会でヒルディオーネが優勝したことにより、星霊祭は流星学園が総合優勝を飾り、幕を閉じた。"

[[dialogue]]
speaker = "unk"
# しかし、全力で競い合った生徒たちは、どちらの学園も関係なく笑顔で後夜祭のパーティーに参加し、盛り上がっていた。
line = "しかし、全力で競い合った生徒たちは、どちらの学園も関係なく笑顔で後夜祭のパーティーに参加し、盛り上がっていた。"

[[dialogue]]
speaker = "フェニエル"
# 「お姉様、舞闘会優勝、おめでとうございますっ」
line = "「お姉様、舞闘会優勝、おめでとうございますっ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ありがとう、フニ」
line = "「ありがとう、フニ」"

[[dialogue]]
speaker = "寮生Ａ"
# 「お姉様！　決勝戦、本当にすごかったですわ！　私、感動しました！」
line = "「お姉様！　決勝戦、本当にすごかったですわ！　私、感動しました！」"

[[dialogue]]
speaker = "寮生Ｂ"
# 「お姉様の覚醒した姿、あまりにもカッコよくて、涙が溢れて来てしまいましたわ……！」
line = "「お姉様の覚醒した姿、あまりにもカッコよくて、涙が溢れて来てしまいましたわ……！」"

[[dialogue]]
speaker = "unk"
# そんな中で、ヒルディオーネはフェニエルや流星寮の寮生たちに囲まれ、口々に祝福される。
line = "そんな中で、ヒルディオーネはフェニエルや流星寮の寮生たちに囲まれ、口々に祝福される。"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「皆さんもありがとうございますわ。私、あなた達の全力の応援が聞こえたからこそ、ミーティアフォームに覚醒することができましたのよ」
line = "「皆さんもありがとうございますわ。私、あなた達の全力の応援が聞こえたからこそ、ミーティアフォームに覚醒することができましたのよ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「私１人では決して、マムに勝つことはできませんでしたわ」
line = "「私１人では決して、マムに勝つことはできませんでしたわ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「私が勝てたのは、皆さんのおかげですの」
line = "「私が勝てたのは、皆さんのおかげですの」"

[[dialogue]]
speaker = "寮生Ｃ"
# 「お姉様、そんな……！」
line = "「お姉様、そんな……！」"

[[dialogue]]
speaker = "寮生Ｄ"
# 「そんなこと言われたら私たち、感激してまた泣いてしまいますわ……！」
line = "「そんなこと言われたら私たち、感激してまた泣いてしまいますわ……！」"

[[dialogue]]
speaker = "フェニエル"
# 「お姉様、私も次の舞闘会は、優勝を目指して本気で頑張ります！　お姉様にも負けないくらい、強い気持ちを持って！」
line = "「お姉様、私も次の舞闘会は、優勝を目指して本気で頑張ります！　お姉様にも負けないくらい、強い気持ちを持って！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ええ、その意気ですわ。あなたがノヴァフォームを使いこなせるようになれば、私やマムも簡単には勝てないでしょう」
line = "「ええ、その意気ですわ。あなたがノヴァフォームを使いこなせるようになれば、私やマムも簡単には勝てないでしょう」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「あなたの成長、心から期待していますわよ、フニ」
line = "「あなたの成長、心から期待していますわよ、フニ」"

[[dialogue]]
speaker = "フェニエル"
# 「はいっ、けっぱります♪」
line = "「はいっ、けっぱります♪」"

[[dialogue]]
speaker = "マハムート"
# 「ヒルディオーネ」
line = "「ヒルディオーネ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「マム、星霊祭と舞闘会、お疲れ様でしたわ」
line = "「マム、星霊祭と舞闘会、お疲れ様でしたわ」"

[[dialogue]]
speaker = "マハムート"
# 「ええ。あなたもね――それで、改めて言っておきたいことがあったのよ」
line = "「ええ。あなたもね――それで、改めて言っておきたいことがあったのよ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「言っておきたいこと、ですの？」
line = "「言っておきたいこと、ですの？」"

[[dialogue]]
speaker = "マハムート"
# 「そう。口に出すと負けた気持ちになるから、今まで言って来なかったけど……」
line = "「そう。口に出すと負けた気持ちになるから、今まで言って来なかったけど……」"

[[dialogue]]
speaker = "マハムート"
# 「あなたは――『努力の天才』よ」
line = "「あなたは――『努力の天才』よ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「え……？」
line = "「え……？」"

[[dialogue]]
speaker = "マハムート"
# 「私は幼い頃から、妃竜院家の中でも歴代最強の天才だって、周りから言われて育った。だからこそ――」
line = "「私は幼い頃から、妃竜院家の中でも歴代最強の天才だって、周りから言われて育った。だからこそ――」"

[[dialogue]]
speaker = "マハムート"
# 「そんな私に追いつこうと、凄まじい成長速度で強くなり続けているあなたの存在を、ずっと脅威に感じていた」
line = "「そんな私に追いつこうと、凄まじい成長速度で強くなり続けているあなたの存在を、ずっと脅威に感じていた」"

[[dialogue]]
speaker = "マハムート"
# 「私がここまで強くなれたのは、あなたに追いつかれまいと己のプライドにかけて、努力を続けてきたからなのよ」
line = "「私がここまで強くなれたのは、あなたに追いつかれまいと己のプライドにかけて、努力を続けてきたからなのよ」"

[[dialogue]]
speaker = "マハムート"
# 「要するに、何が言いたいかっていうと――」
line = "「要するに、何が言いたいかっていうと――」"

[[dialogue]]
speaker = "マハムート"
# 「このまま勝ち逃げなんて絶対にさせないから、畏怖をもって覚悟してなさいってことよ」
line = "「このまま勝ち逃げなんて絶対にさせないから、畏怖をもって覚悟してなさいってことよ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「……私はこれからも、あなたに何度も負け続けてしまうと思いますわ」
line = "「……私はこれからも、あなたに何度も負け続けてしまうと思いますわ」"

[[dialogue]]
speaker = "マハムート"
# 「え？」
line = "「え？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「でも、今回のことで分かりましたの。何度負けたって、別に構わない」
line = "「でも、今回のことで分かりましたの。何度負けたって、別に構わない」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「そのたびに、悔しさを抱えて、諦めずに立ち上がって。私はまた強くなってみせますの。勝てるまで、何度だって」
line = "「そのたびに、悔しさを抱えて、諦めずに立ち上がって。私はまた強くなってみせますの。勝てるまで、何度だって」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「それが私――千園寺ヒルディオーネなのですわ」
line = "「それが私――千園寺ヒルディオーネなのですわ」"

[[dialogue]]
speaker = "マハムート"
# 「……ふっ、生意気ね」
line = "「……ふっ、生意気ね」"

[[dialogue]]
speaker = "マハムート"
# 「でも――それでこそ、妃竜院マハムートに勝ってみせたライバルよ」
line = "「でも――それでこそ、妃竜院マハムートに勝ってみせたライバルよ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ふふっ、当然ですわ♪」
line = "「ふふっ、当然ですわ♪」"

[[dialogue]]
speaker = "unk"
# そうして、改めて２人は微笑み合うのだった――
line = "そうして、改めて２人は微笑み合うのだった――"

[[dialogue]]
speaker = "unk"
# 翌日。
line = "翌日。"

[[dialogue]]
speaker = "unk"
# 流星学園の方では、朝からちょっとした騒ぎが起こっていた。
line = "流星学園の方では、朝からちょっとした騒ぎが起こっていた。"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「ふっ……！　はっ……！」
line = "「ふっ……！　はっ……！」"

[[dialogue]]
speaker = "寮生Ａ"
# 「ど、どうして……」
line = "「ど、どうして……」"

[[dialogue]]
speaker = "寮生Ｂ"
# 「お姉様がここに……？」
line = "「お姉様がここに……？」"

[[dialogue]]
speaker = "unk"
# 汗だくになりながらミーティアフォームで槍の素振りを続けていたヒルディオーネが、やって来た後輩たちの存在に気づいて、視線を向ける。
line = "汗だくになりながらミーティアフォームで槍の素振りを続けていたヒルディオーネが、やって来た後輩たちの存在に気づいて、視線を向ける。"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「ふぅ……あら、皆さんごきげんよう。あなた達も朝のトレーニングですの？」
line = "「ふぅ……あら、皆さんごきげんよう。あなた達も朝のトレーニングですの？」"

[[dialogue]]
speaker = "フェニエル"
# 「お姉様、おはようございます」
line = "「お姉様、おはようございます」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「フニもおはようございますわ」
line = "「フニもおはようございますわ」"

[[dialogue]]
speaker = "フェニエル"
# 「今日は、一体どうされたんですか？　朝から運動場にいらっしゃるなんて……」
line = "「今日は、一体どうされたんですか？　朝から運動場にいらっしゃるなんて……」"

[[dialogue]]
speaker = "unk"
# フェニエルも驚いていた。ヒルディオーネはこれまで、自身の努力している姿を見せるのは『エレガントではない』と、トレーニングも隠れて行うようにしていたからだ。
line = "フェニエルも驚いていた。ヒルディオーネはこれまで、自身の努力している姿を見せるのは『エレガントではない』と、トレーニングも隠れて行うようにしていたからだ。"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「ええ。そのことですが……私、わざわざ隠れて努力するのは、もうやめにしようと思いましたの」
line = "「ええ。そのことですが……私、わざわざ隠れて努力するのは、もうやめにしようと思いましたの」"

[[dialogue]]
speaker = "フェニエル"
# 「えっ？」
line = "「えっ？」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「……私、これからは自分の努力を、ちゃんと誇れるようになりたいと思ったのですわ」
line = "「……私、これからは自分の努力を、ちゃんと誇れるようになりたいと思ったのですわ」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「今更みっともないでしょうけれど……それでも『努力』とは何なのか、先輩として、ちゃんとあなた達に背中を見せられるように」
line = "「今更みっともないでしょうけれど……それでも『努力』とは何なのか、先輩として、ちゃんとあなた達に背中を見せられるように」"

[[dialogue]]
speaker = "フェニエル"
# 「――いいえ。お姉様、それは勘違いしていますよ」
line = "「――いいえ。お姉様、それは勘違いしていますよ」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「え？」
line = "「え？」"

[[dialogue]]
speaker = "寮生Ａ"
# 「私たち、お姉様がみっともないなんて思ったこと、１度だってありませんわ！」
line = "「私たち、お姉様がみっともないなんて思ったこと、１度だってありませんわ！」"

[[dialogue]]
speaker = "寮生Ｂ"
# 「ええ、そうですとも！　だって――」
line = "「ええ、そうですとも！　だって――」"

[[dialogue]]
speaker = "unk"
# フェニエルと寮生たちは顔を見合わせて微笑むと、言った。
line = "フェニエルと寮生たちは顔を見合わせて微笑むと、言った。"

[[dialogue]]
speaker = "寮生Ａ"
# 「お姉様は今までも、これからも、私たち流星学園生徒の誇りですもの！」
line = "「お姉様は今までも、これからも、私たち流星学園生徒の誇りですもの！」"

[[dialogue]]
speaker = "寮生Ｂ"
# 「お姉様はお姉様らしく、ご自身の信じる道を進み続けて下さい！」
line = "「お姉様はお姉様らしく、ご自身の信じる道を進み続けて下さい！」"

[[dialogue]]
speaker = "フェニエル"
# 「その背中を、これからも私たちは追いかけて、応援し続けますっ！」
line = "「その背中を、これからも私たちは追いかけて、応援し続けますっ！」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「……！　あなた達……」
line = "「……！　あなた達……」"

[[dialogue]]
speaker = "unk"
# ヒルディオーネは思わず、感情が込み上げてきて。
line = "ヒルディオーネは思わず、感情が込み上げてきて。"

[[dialogue]]
speaker = "寮生Ａ"
# 「えっ、お姉様！？」
line = "「えっ、お姉様！？」"

[[dialogue]]
speaker = "寮生Ｂ"
# 「泣いてらっしゃいますの！？」
line = "「泣いてらっしゃいますの！？」"

[[dialogue]]
speaker = "フェニエル"
# 「は、ハンカチを……！」
line = "「は、ハンカチを……！」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「っ……ありがとうございますわ……！」
line = "「っ……ありがとうございますわ……！」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「私、素晴らしい後輩たちに恵まれて、すごく幸せ者ですの……！」
line = "「私、素晴らしい後輩たちに恵まれて、すごく幸せ者ですの……！」"

[[dialogue]]
speaker = "unk"
# 寮生たちに背中を支えられ、ハンカチで涙を拭われながら、ヒルディオーネは心からの笑顔を浮かべるのだった――
line = "寮生たちに背中を支えられ、ハンカチで涙を拭われながら、ヒルディオーネは心からの笑顔を浮かべるのだった――"
