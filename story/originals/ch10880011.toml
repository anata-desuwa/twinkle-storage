line = "（リーナを利用してコラプサーの情報を聞き出すか？　……って、そんなに嫌そうな顔すんなよ。わかったわかった、そういうズルはやんないって）"

[[dialogue]]
speaker = "シアン"
# （ま、上からはリーナをどうこうしろって命令は受けてねえし、下手に刺激しても怖いからな）
line = "（ま、上からはリーナをどうこうしろって命令は受けてねえし、下手に刺激しても怖いからな）"

[[dialogue]]
speaker = "リーナ"
# 「次は～……あ、そろそろ帰らないとキサナお姉ちゃんに怒られちゃうかも」
line = "「次は～……あ、そろそろ帰らないとキサナお姉ちゃんに怒られちゃうかも」"

[[dialogue]]
