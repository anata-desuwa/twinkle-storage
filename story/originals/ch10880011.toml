line = "「結局戦わずじまいか。ま、平和なのはいいことだが」"

[[dialogue]]
speaker = "シアン"
# 「リーナについてはわからないことだらけだ。あたしもあたしでリーナのことを探ってみるよ」
line = "「リーナについてはわからないことだらけだ。あたしもあたしでリーナのことを探ってみるよ」"

[[dialogue]]
speaker = "シアン"
# 「だけどありゃ、本当に懐いてるのかね……？　何せ相手はコラプサーだ。気を付けろよ、会長さん」
line = "「だけどありゃ、本当に懐いてるのかね……？　何せ相手はコラプサーだ。気を付けろよ、会長さん」"
