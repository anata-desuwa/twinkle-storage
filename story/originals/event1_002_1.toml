[[dialogue]]
speaker = "unk"
# 季節は夏になり、新星学園も長期休暇を迎えた。
line = "季節は夏になり、新星学園も長期休暇を迎えた。"

[[dialogue]]
speaker = "unk"
# ヴィーナスの発案によって、星徒会での強化合宿があっという間に決定。俺達は九浄家の所有する島へとやって来ていた――
line = "ヴィーナスの発案によって、星徒会での強化合宿があっという間に決定。俺達は九浄家の所有する島へとやって来ていた――"

[[dialogue]]
speaker = "ヴィーナス"
# 「――というわけで、今日から１週間、この島で強化合宿をしていくわよ！」
line = "「――というわけで、今日から１週間、この島で強化合宿をしていくわよ！」"

[[dialogue]]
speaker = "マトイ"
# 「ヴィーナス、質問いい？」
line = "「ヴィーナス、質問いい？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「何かしら、マトイ？」
line = "「何かしら、マトイ？」"

[[dialogue]]
speaker = "マトイ"
# 「九浄家の島なのはまぁ、いいんだけど……この島見たところ、建物の１つも無くない？」
line = "「九浄家の島なのはまぁ、いいんだけど……この島見たところ、建物の１つも無くない？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「良いところに気付いたわね！　その通り、今回の合宿は――」
line = "「良いところに気付いたわね！　その通り、今回の合宿は――」"

[[dialogue]]
speaker = "ヴィーナス"
# 「無人島でサバイバル生活をするわよ！」
line = "「無人島でサバイバル生活をするわよ！」"

[[dialogue]]
speaker = "マトイ"
# 「初耳なんですけど！？」
line = "「初耳なんですけど！？」"

[[dialogue]]
speaker = "アナ"
# 「ノープロブレム。こんなこともあろうかと、サバイバルグッズの準備は万全です」
line = "「ノープロブレム。こんなこともあろうかと、サバイバルグッズの準備は万全です」"

[[dialogue]]
speaker = "マトイ"
# 「待って、アナ！　サバイバルをする前提で話を進めないで……っ」
line = "「待って、アナ！　サバイバルをする前提で話を進めないで……っ」"

[[dialogue]]
speaker = "サーシャ"
# 「うふふ、島を探検したくてワクワクしちゃうわね～。無人島の洞窟とか、何かありそうじゃない？」
line = "「うふふ、島を探検したくてワクワクしちゃうわね～。無人島の洞窟とか、何かありそうじゃない？」"

[[dialogue]]
speaker = "マトイ"
# 「探検とか言ってる場合じゃないですから！　１週間も、食料はどうするんですかっ」
line = "「探検とか言ってる場合じゃないですから！　１週間も、食料はどうするんですかっ」"

[[dialogue]]
speaker = "マトイ"
# 「……えっ、会長？　食料確保なら任せろって――」
line = "「……えっ、会長？　食料確保なら任せろって――」"

[[dialogue]]
speaker = "unk"
# サバイバルはバイトで経験がある！
line = "サバイバルはバイトで経験がある！"

[[dialogue]]
speaker = "マトイ"
# 「いや、どんなバイト！？」
line = "「いや、どんなバイト！？」"

[[dialogue]]
speaker = "マトイ"
# 「あーもう、会長もノリノリって……！　フィオナさん、この人達に何か言ってやって下さい」
line = "「あーもう、会長もノリノリって……！　フィオナさん、この人達に何か言ってやって下さい」"

[[dialogue]]
speaker = "フィオナ"
# 「ふふっ、新星学園の星徒会って、いつもこんな感じなんですね。私は好きですよ」
line = "「ふふっ、新星学園の星徒会って、いつもこんな感じなんですね。私は好きですよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうでしょう？　私の自慢の仲間達よ！」
line = "「そうでしょう？　私の自慢の仲間達よ！」"

[[dialogue]]
speaker = "フィオナ"
# 「改めて、今回は私もお招き頂いて、ありがとうございます。強化合宿の助っ人として、しっかりお手伝いさせて頂きますね」
line = "「改めて、今回は私もお招き頂いて、ありがとうございます。強化合宿の助っ人として、しっかりお手伝いさせて頂きますね」"

[[dialogue]]
speaker = "unk"
# そこまで畏まらずに、仲良く合宿を楽しもう
line = "そこまで畏まらずに、仲良く合宿を楽しもう"

[[dialogue]]
speaker = "フィオナ"
# 「はい、ありがとうございます。緋宮会長」
line = "「はい、ありがとうございます。緋宮会長」"

[[dialogue]]
speaker = "マトイ"
# 「……ところで、さっきから気になってるんだけど。そこにある変な穴も、ヴィーナスの仕込みなの？」
line = "「……ところで、さっきから気になってるんだけど。そこにある変な穴も、ヴィーナスの仕込みなの？」"

[[dialogue]]
speaker = "アナ"
# 「ちなみにマトイ先輩が言っているのは、空間に空いた謎の黒い点であり、私の名前ではありません」
line = "「ちなみにマトイ先輩が言っているのは、空間に空いた謎の黒い点であり、私の名前ではありません」"

[[dialogue]]
speaker = "マトイ"
# 「誰もそんなこと気にしてないよ！？」
line = "「誰もそんなこと気にしてないよ！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「マトイがつまらないギャグを言ったってこと？」
line = "「マトイがつまらないギャグを言ったってこと？」"

[[dialogue]]
speaker = "マトイ"
# 「冤罪すぎる……！　ああ、もう、すぐ脱線する。ヴィーナスの後ろの空間に何か穴みたいなのがあるでしょ、ほら！」
line = "「冤罪すぎる……！　ああ、もう、すぐ脱線する。ヴィーナスの後ろの空間に何か穴みたいなのがあるでしょ、ほら！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「何の話？　……って、何これ？　確かに空間に穴が開いてるわね」
line = "「何の話？　……って、何これ？　確かに空間に穴が開いてるわね」"

[[dialogue]]
speaker = "サーシャ"
# 「あら？　私もてっきり、ヴィーナスちゃんのサプライズか何かだと思ってたけど……違うの？」
line = "「あら？　私もてっきり、ヴィーナスちゃんのサプライズか何かだと思ってたけど……違うの？」"

[[dialogue]]
speaker = "フィオナ"
# 「穴の向こう側、こことは違うビーチが見えていませんか？　何か建物があるような……」
line = "「穴の向こう側、こことは違うビーチが見えていませんか？　何か建物があるような……」"

[[dialogue]]
speaker = "マトイ"
# 「うわっ！？　穴が急に広がって、吸い込まれ……きゃあぁっ！？」
line = "「うわっ！？　穴が急に広がって、吸い込まれ……きゃあぁっ！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「皆、大丈夫！？　景色が歪んで……よく見えないわ！」
line = "「皆、大丈夫！？　景色が歪んで……よく見えないわ！」"

[[dialogue]]
speaker = "フィオナ"
# 「視界が晴れて……ここって、さっきの穴から覗いていた建物、でしょうか……？」
line = "「視界が晴れて……ここって、さっきの穴から覗いていた建物、でしょうか……？」"

[[dialogue]]
speaker = "マトイ"
# 「な、何これ？　無人島に建物は無かったはずじゃ……」
line = "「な、何これ？　無人島に建物は無かったはずじゃ……」"

[[dialogue]]
speaker = "？？？"
# 「あっ！？　ヒト！？　ワタシ以外の人がイルでーす！」
line = "「あっ！？　ヒト！？　ワタシ以外の人がイルでーす！」"

[[dialogue]]
speaker = "？？？"
# 「ヘイ！　ラッシャーセー♪　リゾート結界への初めてのお客様、カンゲイしま～す♪」
line = "「ヘイ！　ラッシャーセー♪　リゾート結界への初めてのお客様、カンゲイしま～す♪」"

[[dialogue]]
speaker = "unk"
# えっ、誰！？
line = "えっ、誰！？"

[[dialogue]]
speaker = "リップル"
# 「ワタシ？　ワタシは、天使のリップルとイイまーす！」
line = "「ワタシ？　ワタシは、天使のリップルとイイまーす！」"

[[dialogue]]
speaker = "リップル"
# 「このリゾート結界で、理想の海の家をツクってます♪　アナタのお名前は？」
line = "「このリゾート結界で、理想の海の家をツクってます♪　アナタのお名前は？」"

[[dialogue]]
speaker = "リップル"
# 「――なるほど、カイチョーですか！　耳に残る良い名前だとオモうです！」
line = "「――なるほど、カイチョーですか！　耳に残る良い名前だとオモうです！」"

[[dialogue]]
speaker = "unk"
# いや、会長は名前じゃなくて役職……
line = "いや、会長は名前じゃなくて役職……"

[[dialogue]]
speaker = "リップル"
# 「よろしくオネガイします！　カイチョー♪」
line = "「よろしくオネガイします！　カイチョー♪」"

[[dialogue]]
speaker = "マトイ"
# 「ちょっ！？　いきなり何で抱き着いて……！？」
line = "「ちょっ！？　いきなり何で抱き着いて……！？」"

[[dialogue]]
speaker = "リップル"
# 「親愛のハグで～す♪　アナタのお名前も聞かせて欲シイです！」
line = "「親愛のハグで～す♪　アナタのお名前も聞かせて欲シイです！」"

[[dialogue]]
speaker = "マトイ"
# 「わ、私はマトイだけど……」
line = "「わ、私はマトイだけど……」"

[[dialogue]]
speaker = "リップル"
# 「マトイ！　素敵な日本のお名前です♪　よろしくオネガイしま～す！」
line = "「マトイ！　素敵な日本のお名前です♪　よろしくオネガイしま～す！」"

[[dialogue]]
speaker = "サーシャ"
# 「あら～♪」
line = "「あら～♪」"

[[dialogue]]
speaker = "マトイ"
# 「こ、これはいわゆる欧米的スキンシップ……！」
line = "「こ、これはいわゆる欧米的スキンシップ……！」"

[[dialogue]]
speaker = "リップル"
# 「ワタシに海の家の魅力を教えてくれた、シショ―達から学んだアイサツです♪」
line = "「ワタシに海の家の魅力を教えてくれた、シショ―達から学んだアイサツです♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「詳しい事情は後で聞かせて貰いたいところだけど、リップル。ひとまず確認よ」
line = "「詳しい事情は後で聞かせて貰いたいところだけど、リップル。ひとまず確認よ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「この場所……さっき結界って言ってたかしら。それを作ったのはあなたってことで合っているのかしら？」
line = "「この場所……さっき結界って言ってたかしら。それを作ったのはあなたってことで合っているのかしら？」"

[[dialogue]]
speaker = "リップル"
# 「はい、ソウです！　ここは、ワタシが作った常夏のリゾート結界――名付けて『エンドレスサマー』で～す♪」
line = "「はい、ソウです！　ここは、ワタシが作った常夏のリゾート結界――名付けて『エンドレスサマー』で～す♪」"

[[dialogue]]
speaker = "フィオナ"
# 「く、空間を丸ごと作り出したってことですか？　しかも、この規模で……！？　だとしたら、もの凄い星術です……！」
line = "「く、空間を丸ごと作り出したってことですか？　しかも、この規模で……！？　だとしたら、もの凄い星術です……！」"

[[dialogue]]
speaker = "リップル"
# 「セイジュツ……？　それは、どんな字を書く言葉デスか？」
line = "「セイジュツ……？　それは、どんな字を書く言葉デスか？」"

[[dialogue]]
speaker = "アナ"
# 「なんと……星術を知らない？　じゃあ、ひょっとして星力のことも……？」
line = "「なんと……星術を知らない？　じゃあ、ひょっとして星力のことも……？」"

[[dialogue]]
speaker = "フィオナ"
# 「星術を知らないのだとしたら、これだけの空間をどのようにして維持しているのでしょうか……」
line = "「星術を知らないのだとしたら、これだけの空間をどのようにして維持しているのでしょうか……」"

[[dialogue]]
speaker = "リップル"
# 「結界はワタシが目覚めた時から知ってて、使えたチカラです。なるほど、セイジュツという名前があったのデスね～」
line = "「結界はワタシが目覚めた時から知ってて、使えたチカラです。なるほど、セイジュツという名前があったのデスね～」"

[[dialogue]]
speaker = "ヴィーナス"
# 「この結界には星力が満ちているのを感じるから、リップルが使っているのは星術で間違いないわ。まさかこんなところに、これほどの力の持ち主が居るなんて……」
line = "「この結界には星力が満ちているのを感じるから、リップルが使っているのは星術で間違いないわ。まさかこんなところに、これほどの力の持ち主が居るなんて……」"

[[dialogue]]
speaker = "アナ"
# 「リップルさん、一体何者……？」
line = "「リップルさん、一体何者……？」"

[[dialogue]]
speaker = "マトイ"
# 「でも、結界を作ったのがリップルなら、術を解除して元の空間に戻れるってことよね。とりあえず、それなら安心したわ」
line = "「でも、結界を作ったのがリップルなら、術を解除して元の空間に戻れるってことよね。とりあえず、それなら安心したわ」"

[[dialogue]]
speaker = "リップル"
# 「あ～……えっと……ゴメンナサイ。それが今はデキなくて……」
line = "「あ～……えっと……ゴメンナサイ。それが今はデキなくて……」"

[[dialogue]]
speaker = "マトイ"
# 「え」
line = "「え」"

[[dialogue]]
speaker = "リップル"
# 「実はワタシ、ここでリゾート結界の製作を進めていたのデスが、なかなか上手に形にデキず……」
line = "「実はワタシ、ここでリゾート結界の製作を進めていたのデスが、なかなか上手に形にデキず……」"

[[dialogue]]
speaker = "リップル"
# 「考え過ぎて、悩んでいるのが結界に反映サレてしまったのか、その……結界の壁がユガんでしまってて……」
line = "「考え過ぎて、悩んでいるのが結界に反映サレてしまったのか、その……結界の壁がユガんでしまってて……」"

[[dialogue]]
speaker = "リップル"
# 「気付いた時には、自分でも結界から出られないというか……え～と、確かこういう状態をコトバにすると……す、ス、スゥ～？」
line = "「気付いた時には、自分でも結界から出られないというか……え～と、確かこういう状態をコトバにすると……す、ス、スゥ～？」"

[[dialogue]]
speaker = "サーシャ"
# 「スランプ？」
line = "「スランプ？」"

[[dialogue]]
speaker = "リップル"
# 「そう、ソレです！」
line = "「そう、ソレです！」"

[[dialogue]]
speaker = "フィオナ"
# 「つ、つまり……私達は結界に閉じ込められてしまった、ということでしょうか……？」
line = "「つ、つまり……私達は結界に閉じ込められてしまった、ということでしょうか……？」"

[[dialogue]]
speaker = "リップル"
# 「え～っと……」
line = "「え～っと……」"

[[dialogue]]
speaker = "リップル"
# 「なんか、ゴメンね？」
line = "「なんか、ゴメンね？」"

[[dialogue]]
speaker = "unk"
# え……
line = "え……"

[[dialogue]]
speaker = "マトイ"
# 「ええぇぇぇ～～～～～～っ！！？」
line = "「ええぇぇぇ～～～～～～っ！！？」"

[[dialogue]]
speaker = "unk"
# 果たして俺達の合宿は、常夏のリゾート結界で幕を開けるのであった――
line = "果たして俺達の合宿は、常夏のリゾート結界で幕を開けるのであった――"
