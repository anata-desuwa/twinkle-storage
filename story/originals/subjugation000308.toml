[[dialogue]]
speaker = "モネ"
# 「新しく入った本を書架に入れて……ふぅ、今日はこれで終わりかな」
line = "「新しく入った本を書架に入れて……ふぅ、今日はこれで終わりかな」"

[[dialogue]]
speaker = "モネ"
# 「出張図書コンシェルジュをやってるせいで最近忙しいけど、図書館に来てくれる人は増えてる気がする」
line = "「出張図書コンシェルジュをやってるせいで最近忙しいけど、図書館に来てくれる人は増えてる気がする」"

[[dialogue]]
speaker = "モネ"
# 「みんなも書庫でじっとしてるより、手に取って読んでもらう方がいいもんね。図書委員としてもっと頑張ろうっ。おー」
line = "「みんなも書庫でじっとしてるより、手に取って読んでもらう方がいいもんね。図書委員としてもっと頑張ろうっ。おー」"

[[dialogue]]
speaker = "モネ"
# 「だけど最近、図書館でウィステリアさんを見ないような……」
line = "「だけど最近、図書館でウィステリアさんを見ないような……」"

[[dialogue]]
speaker = "モネ"
# 「司書の仕事で忙しいのかな？　でも図書館で見なくなるような仕事っていったい……」
line = "「司書の仕事で忙しいのかな？　でも図書館で見なくなるような仕事っていったい……」"

[[dialogue]]
speaker = "モネ"
# 「あれ──」
line = "「あれ──」"

[[dialogue]]
speaker = "モネ"
# 「新星学園の図書館にこんな区画はなかったはず……まさか別の図書館？　一瞬で移動した……？」
line = "「新星学園の図書館にこんな区画はなかったはず……まさか別の図書館？　一瞬で移動した……？」"

[[dialogue]]
speaker = "モネ"
# 「いやいや、まさかそんな。とにかく新星学園の図書館に戻らないと……」
line = "「いやいや、まさかそんな。とにかく新星学園の図書館に戻らないと……」"

[[dialogue]]
speaker = "モネ"
# 「でも、こんなにたくさん本があるとワクワクしますね。それも知らない子ばかり」
line = "「でも、こんなにたくさん本があるとワクワクしますね。それも知らない子ばかり」"

[[dialogue]]
speaker = "モネ"
# 「……ちょっとくらいなら見てもいいよね？　本だって読んでもらいたそうにしてるし……ごめんなさい、失礼しまーす」
line = "「……ちょっとくらいなら見てもいいよね？　本だって読んでもらいたそうにしてるし……ごめんなさい、失礼しまーす」"

[[dialogue]]
speaker = "モネ"
# 「！？　１文字も読めない……」
line = "「！？　１文字も読めない……」"

[[dialogue]]
speaker = "モネ"
# 「それどころかどこの文字かもわからない……魔界や天界の文字とも違う……この本はいったい……？」
line = "「それどころかどこの文字かもわからない……魔界や天界の文字とも違う……この本はいったい……？」"

[[dialogue]]
speaker = "ウィステリア？"
# 「あら、侵入者かしら」
line = "「あら、侵入者かしら」"

[[dialogue]]
speaker = "モネ"
# 「！　ウィステリアさんもここにいたんですか。でもその姿は……」
line = "「！　ウィステリアさんもここにいたんですか。でもその姿は……」"

[[dialogue]]
speaker = "ウィステリア？"
# 「誰、あなた？」
line = "「誰、あなた？」"

[[dialogue]]
speaker = "モネ"
# 「ええっ！？　私です！　図書委員の紙屋敷モネです！」
line = "「ええっ！？　私です！　図書委員の紙屋敷モネです！」"

[[dialogue]]
speaker = "ウィステリア？"
# 「知らないって言ってるでしょう。力なき者にここの書を読む資格はないわ。失せなさい」
line = "「知らないって言ってるでしょう。力なき者にここの書を読む資格はないわ。失せなさい」"

[[dialogue]]
speaker = "モネ"
# 「そんな──！？」
line = "「そんな──！？」"

[[dialogue]]
speaker = "イクシリオン"
# 「はぁっ──！」
line = "「はぁっ──！」"

[[dialogue]]
speaker = "モネ"
# 「イクシーさん！？」
line = "「イクシーさん！？」"

[[dialogue]]
speaker = "イクシリオン"
# 「お怪我はありませんか？」
line = "「お怪我はありませんか？」"

[[dialogue]]
speaker = "モネ"
# 「大丈夫です、ありがとうございます。イクシーさんが助けてくれなかったら危ないところでした」
line = "「大丈夫です、ありがとうございます。イクシーさんが助けてくれなかったら危ないところでした」"

[[dialogue]]
speaker = "モネ"
# 「でもあのウィステリアさんは……？」
line = "「でもあのウィステリアさんは……？」"

[[dialogue]]
speaker = "イクシリオン"
# 「わかりません。気付いたら知らない図書館にいて、モネさんが襲われているようでしたので、助太刀いたしました」
line = "「わかりません。気付いたら知らない図書館にいて、モネさんが襲われているようでしたので、助太刀いたしました」"

[[dialogue]]
speaker = "ウィステリア？"
# 「知らないのがまた増えたわね。だけど何人来ようが敵じゃないわ」
line = "「知らないのがまた増えたわね。だけど何人来ようが敵じゃないわ」"

[[dialogue]]
speaker = "イクシリオン"
# 「何を言っているのかわかりませんが、敵には違いなさそうです。モネさんも気を付けてください」
line = "「何を言っているのかわかりませんが、敵には違いなさそうです。モネさんも気を付けてください」"

[[dialogue]]
speaker = "モネ"
# 「わ、わかりましたっ」
line = "「わ、わかりましたっ」"

[[dialogue]]
speaker = "イクシリオン"
# 「ウィステリアさんが正気を失っているのか、それとも幻影か……それがわかれば幾分か戦いやすくなるのですが」
line = "「ウィステリアさんが正気を失っているのか、それとも幻影か……それがわかれば幾分か戦いやすくなるのですが」"

[[dialogue]]
speaker = "モネ"
# 「えっと……あのウィステリアさんはおそらく偽物だと思います」
line = "「えっと……あのウィステリアさんはおそらく偽物だと思います」"

[[dialogue]]
speaker = "モネ"
# 「私、本の気持ちがわかるんですけど、あのウィステリアさんの本からは何も感じません。ですからあのウィステリアさんも……」
line = "「私、本の気持ちがわかるんですけど、あのウィステリアさんの本からは何も感じません。ですからあのウィステリアさんも……」"

[[dialogue]]
speaker = "イクシリオン"
# 「なるほど。モネさんがそう仰るなら間違いないですね」
line = "「なるほど。モネさんがそう仰るなら間違いないですね」"

[[dialogue]]
speaker = "イクシリオン"
# 「であれば全力で迎撃します。モネさんは支援をお願いします」
line = "「であれば全力で迎撃します。モネさんは支援をお願いします」"

[[dialogue]]
speaker = "モネ"
# 「は、はい！　本のみんなもいくよ」
line = "「は、はい！　本のみんなもいくよ」"

[[dialogue]]
speaker = "ウィステリア？"
# 「消えなさい」
line = "「消えなさい」"

[[dialogue]]
speaker = "モネ"
# 「くぅぅっ……みんな、耐えて……！」
line = "「くぅぅっ……みんな、耐えて……！」"

[[dialogue]]
speaker = "イクシリオン"
# 「そこです！」
line = "「そこです！」"

[[dialogue]]
speaker = "ウィステリア？"
# 「その程度で」
line = "「その程度で」"

[[dialogue]]
speaker = "イクシリオン"
# 「モンスターであれば今ので十分なのですが……やはり一筋縄にはいきませんね」
line = "「モンスターであれば今ので十分なのですが……やはり一筋縄にはいきませんね」"

[[dialogue]]
speaker = "イクシリオン"
# 「モネさん、提案があるのですが……ごにょごにょ、ごにょごにょ」
line = "「モネさん、提案があるのですが……ごにょごにょ、ごにょごにょ」"

[[dialogue]]
speaker = "モネ"
# 「はい……はい……なるほど」
line = "「はい……はい……なるほど」"

[[dialogue]]
speaker = "イクシリオン"
# 「できますか？」
line = "「できますか？」"

[[dialogue]]
speaker = "モネ"
# 「自信はないですが……やってみますっ」
line = "「自信はないですが……やってみますっ」"

[[dialogue]]
speaker = "イクシリオン"
# 「モネさんなら大丈夫ですよ。では……いきます！」
line = "「モネさんなら大丈夫ですよ。では……いきます！」"

[[dialogue]]
speaker = "イクシリオン"
# 「燃え上がれ──ヒートヘイズダンス！」
line = "「燃え上がれ──ヒートヘイズダンス！」"

[[dialogue]]
speaker = "ウィステリア？"
# 「ふん。意志と力のない者に用はないわ。失せなさい」
line = "「ふん。意志と力のない者に用はないわ。失せなさい」"

[[dialogue]]
speaker = "ウィステリア？"
# 「！？」
line = "「！？」"

[[dialogue]]
speaker = "イクシリオン"
# 「ヒートヘイズ……すなわち<ruby=かげろう>陽炎</ruby>。今あなたが攻撃したのは幻です」
line = "「ヒートヘイズ……すなわち<ruby>陽炎<rt>かげろう</rt></ruby>。今あなたが攻撃したのは幻です」"

[[dialogue]]
speaker = "イクシリオン"
# 「モネさん、力をひとつにしましょう。思い切りやってください！」
line = "「モネさん、力をひとつにしましょう。思い切りやってください！」"

[[dialogue]]
speaker = "モネ"
# 「はい、イクシーさんの星力、受け取りました」
line = "「はい、イクシーさんの星力、受け取りました」"

[[dialogue]]
speaker = "モネ"
# 「本のみんなも力を貸して。──ヴァースオブフェネクス！！」
line = "「本のみんなも力を貸して。──ヴァースオブフェネクス！！」"

[[dialogue]]
speaker = "ウィステリア？"
# 「きゃあああっ！？」
line = "「きゃあああっ！？」"

[[dialogue]]
speaker = "モネ"
# 「消えた……？」
line = "「消えた……？」"

[[dialogue]]
speaker = "モネ"
# 「やった！　やりましたぁっ！」
line = "「やった！　やりましたぁっ！」"

[[dialogue]]
speaker = "イクシリオン"
# 「お疲れ様です。力強い一撃でした」
line = "「お疲れ様です。力強い一撃でした」"

[[dialogue]]
speaker = "モネ"
# 「イクシーさんが隙を作ってくれたおかげです。自分だけでは絶対勝てませんでした」
line = "「イクシーさんが隙を作ってくれたおかげです。自分だけでは絶対勝てませんでした」"

[[dialogue]]
speaker = "ウィステリア？"
# 「このくらいじゃ認められないわ」
line = "「このくらいじゃ認められないわ」"

[[dialogue]]
speaker = "２人"
# 「きゃあああっ！？」
line = "「きゃあああっ！？」"

[[dialogue]]
speaker = "モネ"
# 「まま、また出たぁっ！？」
line = "「まま、また出たぁっ！？」"

[[dialogue]]
speaker = "イクシリオン"
# 「倒してもまた出てくるタイプでしたか……これ以上の消耗は厳しいですね……」
line = "「倒してもまた出てくるタイプでしたか……これ以上の消耗は厳しいですね……」"

[[dialogue]]
speaker = "ウィステリア"
# 「ふぅ、待たせたわね、２人とも」
line = "「ふぅ、待たせたわね、２人とも」"

[[dialogue]]
speaker = "モネ"
# 「こっちにもウィステリアさんの偽物が！？」
line = "「こっちにもウィステリアさんの偽物が！？」"

[[dialogue]]
speaker = "ウィステリア"
# 「私は本物よ！」
line = "「私は本物よ！」"

[[dialogue]]
speaker = "ウィステリア"
# 「状況はだいたい把握してるわ。さすがプリマステラね、イクシーさん。紙屋敷さんもよく頑張ったわ。後は私に任せなさい」
line = "「状況はだいたい把握してるわ。さすがプリマステラね、イクシーさん。紙屋敷さんもよく頑張ったわ。後は私に任せなさい」"

[[dialogue]]
speaker = "ウィステリア"
# 「ったく、よくも私の姿で生徒をいじめてくれたわね。たっぷりお返ししてあげなくちゃ」
line = "「ったく、よくも私の姿で生徒をいじめてくれたわね。たっぷりお返ししてあげなくちゃ」"

[[dialogue]]
speaker = "ウィステリア"
# 「闇の雷を見せてあげる。──アビススプライト！」
line = "「闇の雷を見せてあげる。──アビススプライト！」"

[[dialogue]]
speaker = "モネ"
# 「あんなにあっさりと……」
line = "「あんなにあっさりと……」"

[[dialogue]]
speaker = "イクシリオン"
# 「これが本物のウィステリアさん……」
line = "「これが本物のウィステリアさん……」"

[[dialogue]]
speaker = "ウィステリア"
# 「さ、今のうちに戻るわよ」
line = "「さ、今のうちに戻るわよ」"

[[dialogue]]
speaker = "モネ"
# 「え？　あ、ウィステリアさんの鎖が体に絡まって……」
line = "「え？　あ、ウィステリアさんの鎖が体に絡まって……」"

[[dialogue]]
speaker = "イクシリオン"
# 「く、苦しいです……」
line = "「く、苦しいです……」"

[[dialogue]]
speaker = "ウィステリア"
# 「引っ張るわよー」
line = "「引っ張るわよー」"

[[dialogue]]
speaker = "モネ"
# 「きゃあああ～～～っ！？」
line = "「きゃあああ～～～っ！？」"
