[[dialogue]]
speaker = "unk"
# ある日の放課後、俺は新星寮『ラルーナ』の寮長である<ruby=きりゅういん>妃竜院</ruby>マハムート先輩──マムから、『学園対抗杯』の月次報告書の書き方を教わっていた。
line = "ある日の放課後、俺は新星寮『ラルーナ』の寮長である<ruby>妃竜院<rt>きりゅういん</rt></ruby>マハムート先輩──マムから、『学園対抗杯』の月次報告書の書き方を教わっていた。"

[[dialogue]]
speaker = "マハムート"
# 「……そう、そこに任務管轄係から受け取った、プリマステラの出撃記録を記入して頂戴。モンスターの撃墜スコアは……そう、そっちよ。わかってきたじゃない」
line = "「……そう、そこに任務管轄係から受け取った、プリマステラの出撃記録を記入して頂戴。モンスターの撃墜スコアは……そう、そっちよ。わかってきたじゃない」"

[[dialogue]]
speaker = "マハムート"
# 「ふぅ……この調子なら、あなたに私の仕事を任せられるようになるのも近いかしら。……あら？」
line = "「ふぅ……この調子なら、あなたに私の仕事を任せられるようになるのも近いかしら。……あら？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「おーっほっほっほ！　フニ、ここが流星学園の誇る食事処、大聖堂カフェテリアですわ！」
line = "「おーっほっほっほ！　フニ、ここが流星学園の誇る食事処、大聖堂カフェテリアですわ！」"

[[dialogue]]
speaker = "フェニエル"
# 「わぁぁ……っ。凄いです、お姉様。学園の施設に、こんなところがあるなんて。都会は本当に、驚くようなことばかりです」
line = "「わぁぁ……っ。凄いです、お姉様。学園の施設に、こんなところがあるなんて。都会は本当に、驚くようなことばかりです」"

[[dialogue]]
speaker = "unk"
# 流星学園の方からやってきたのは、流星寮『イルソーレ』の寮長である<ruby=せんおんじ>千園寺</ruby>ヒルディオーネ先輩。
line = "流星学園の方からやってきたのは、流星寮『イルソーレ』の寮長である<ruby>千園寺<rt>せんおんじ</rt></ruby>ヒルディオーネ先輩。"

[[dialogue]]
speaker = "unk"
# そして、彼女に連れられているのはつい先日流星学園に転入してきたばかりの１年生、フェニエルことフニだった。
line = "そして、彼女に連れられているのはつい先日流星学園に転入してきたばかりの１年生、フェニエルことフニだった。"

[[dialogue]]
speaker = "unk"
# どうやら、イルソーレに入寮したフニは、寮長自ら学園内の施設を案内してもらっているらしい。
line = "どうやら、イルソーレに入寮したフニは、寮長自ら学園内の施設を案内してもらっているらしい。"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「大聖堂周辺は流星学園だけではなく、新星学園の生徒も利用するため、一段と広く設計されていますのよ。……あら？」
line = "「大聖堂周辺は流星学園だけではなく、新星学園の生徒も利用するため、一段と広く設計されていますのよ。……あら？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「そちらにいらっしゃるのは新星の会長と、それに私の宿命のライバル――妃竜院マハムートではありませんか！」
line = "「そちらにいらっしゃるのは新星の会長と、それに私の宿命のライバル――妃竜院マハムートではありませんか！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「おーっほっほっほ！　ごきげんようですわ♪」
line = "「おーっほっほっほ！　ごきげんようですわ♪」"

[[dialogue]]
speaker = "マハムート"
# 「こんにちは、ヒルディオーネ。相変わらずご機嫌な挨拶ね」
line = "「こんにちは、ヒルディオーネ。相変わらずご機嫌な挨拶ね」"

[[dialogue]]
speaker = "マハムート"
# 「それと、そちらのお嬢さんは初めましてかしらね？」
line = "「それと、そちらのお嬢さんは初めましてかしらね？」"

[[dialogue]]
speaker = "フェニエル"
# 「は、はひっ！　ご、ごきげんようで、ございますっ。フェ、フェ、フェ、フェニエルと申しますです！」
line = "「は、はひっ！　ご、ごきげんようで、ございますっ。フェ、フェ、フェ、フェニエルと申しますです！」"

[[dialogue]]
speaker = "unk"
# マムは見た目が怖いけど、見た目だけだから
line = "マムは見た目が怖いけど、見た目だけだから"

[[dialogue]]
speaker = "unk"
# フニ、落ち着いて
line = "フニ、落ち着いて"

[[dialogue]]
speaker = "マハムート"
# 「ちょっと会長？　どういう意味かしら……？」
line = "「ちょっと会長？　どういう意味かしら……？」"

[[dialogue]]
speaker = "unk"
# マムの冷たい視線に震えながらも、この尊敬すべき先輩が誤解されないよう、フニを落ち着けるのだった。
line = "マムの冷たい視線に震えながらも、この尊敬すべき先輩が誤解されないよう、フニを落ち着けるのだった。"
