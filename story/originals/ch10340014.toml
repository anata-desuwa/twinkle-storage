[[dialogue]]
speaker = "unk"
# 第４話,真のしもべに,P
line = "第４話,真のしもべに,P"

[[dialogue]]
speaker = "カティア"
# 「大通りにはモンスターがたくさん……今は隠れてるから見つからないけど、私じゃ突破するのは無理そう……」
line = "「大通りにはモンスターがたくさん……今は隠れてるから見つからないけど、私じゃ突破するのは無理そう……」"

[[dialogue]]
speaker = "小さな女の子"
# 「お姉ちゃん……」
line = "「お姉ちゃん……」"

[[dialogue]]
speaker = "カティア"
# 「怖くない、怖くない～。モンスターに見つかるといけないから、静かにして隠れててね」
line = "「怖くない、怖くない～。モンスターに見つかるといけないから、静かにして隠れててね」"

[[dialogue]]
speaker = "カティア"
# （うぅ……どうしてこんなことに……）
line = "（うぅ……どうしてこんなことに……）"

[[dialogue]]
speaker = "カティア"
# 「こんなところに園芸用品店があるとは思わなかった。小さいお店だけど珍しい植物もあったし、今日は収穫が多かったな～♪」
line = "「こんなところに園芸用品店があるとは思わなかった。小さいお店だけど珍しい植物もあったし、今日は収穫が多かったな～♪」"

[[dialogue]]
speaker = "小さな女の子"
# 「お姉ちゃ～ん！」
line = "「お姉ちゃ～ん！」"

[[dialogue]]
speaker = "カティア"
# 「あ、この前の……もしかしてこの辺に住んでるの？」
line = "「あ、この前の……もしかしてこの辺に住んでるの？」"

[[dialogue]]
speaker = "小さな女の子"
# 「うん、この前はありがとう！」
line = "「うん、この前はありがとう！」"

[[dialogue]]
speaker = "カティア"
# 「えへへ、魔王様のしもべとして当然のことをしただけだよ」
line = "「えへへ、魔王様のしもべとして当然のことをしただけだよ」"

[[dialogue]]
speaker = "小さな女の子"
# 「まおうさま……？　魔王って悪い人なんじゃないの？」
line = "「まおうさま……？　魔王って悪い人なんじゃないの？」"

[[dialogue]]
speaker = "カティア"
# 「そうじゃなくて……あ、いや、悪い人のはずなんだけど。魔王様っていうのは、とっても強くて偉くて、そして優しい私のご主人様なんだ」
line = "「そうじゃなくて……あ、いや、悪い人のはずなんだけど。魔王様っていうのは、とっても強くて偉くて、そして優しい私のご主人様なんだ」"

[[dialogue]]
speaker = "小さな女の子"
# 「じゃあ素敵な人なんだね！」
line = "「じゃあ素敵な人なんだね！」"

[[dialogue]]
speaker = "カティア"
# 「ふっふっふ、魔王様の魅力を理解するとは、なかなか見どころのある少女ではないか。さぁ、私と一緒に魔王様の世界征服を実現しよう……ワン！」
line = "「ふっふっふ、魔王様の魅力を理解するとは、なかなか見どころのある少女ではないか。さぁ、私と一緒に魔王様の世界征服を実現しよう……ワン！」"

[[dialogue]]
speaker = "カティア"
# 「！？　モンスター！？　しかもあんなにたくさん……どうすれば……」
line = "「！？　モンスター！？　しかもあんなにたくさん……どうすれば……」"

[[dialogue]]
speaker = "カティア"
# 「こっち来て！　とりあえず隠れよう！」
line = "「こっち来て！　とりあえず隠れよう！」"

[[dialogue]]
speaker = "カティア"
# 「あんなの私じゃ勝てないよ……そもそもプリマステラじゃないから勝手に戦っちゃいけない決まりだし……」
line = "「あんなの私じゃ勝てないよ……そもそもプリマステラじゃないから勝手に戦っちゃいけない決まりだし……」"

[[dialogue]]
speaker = "小さな女の子"
# 「わたしたち、モンスターにやられちゃうの？」
line = "「わたしたち、モンスターにやられちゃうの？」"

[[dialogue]]
speaker = "カティア"
# 「だ、大丈夫、ちゃんとおうちに帰してあげるからね」
line = "「だ、大丈夫、ちゃんとおうちに帰してあげるからね」"

[[dialogue]]
speaker = "カティア"
# （どうしよう……助けてください、魔王様……！）
line = "（どうしよう……助けてください、魔王様……！）"

[[dialogue]]
speaker = "カティア"
# （……いや、違う。こんな時、魔王様ならどうする？）
line = "（……いや、違う。こんな時、魔王様ならどうする？）"

[[dialogue]]
speaker = "カティア"
# （魔王様なら絶対この子を助ける。モンスターなんかボコボコにやっつけて、みんなを守るんだ）
line = "（魔王様なら絶対この子を助ける。モンスターなんかボコボコにやっつけて、みんなを守るんだ）"

[[dialogue]]
speaker = "カティア"
# （私は魔王様第一のしもべ……だから魔王様の代わりに頑張らないと）
line = "（私は魔王様第一のしもべ……だから魔王様の代わりに頑張らないと）"

[[dialogue]]
speaker = "カティア"
# 「魔王様に恥ずかしくないしもべになるんだ……！」
line = "「魔王様に恥ずかしくないしもべになるんだ……！」"

[[dialogue]]
speaker = "カティア"
# 「この子を助けるには……そうだ。くんくん……モンスターの匂いが薄い方は……あっちなら抜けられるかも。行くよ」
line = "「この子を助けるには……そうだ。くんくん……モンスターの匂いが薄い方は……あっちなら抜けられるかも。行くよ」"

[[dialogue]]
speaker = "小さな女の子"
# 「う、うんっ」
line = "「う、うんっ」"

[[dialogue]]
speaker = "カティア"
# 「そーっと……そーっと……見つからないように……」
line = "「そーっと……そーっと……見つからないように……」"

[[dialogue]]
speaker = "カティア"
# 「うわ～っ！？　見つかった！？」
line = "「うわ～っ！？　見つかった！？」"

[[dialogue]]
speaker = "カティア"
# 「でも私は魔王様のしもべだから……！　諦めずに戦うんだ！」
line = "「でも私は魔王様のしもべだから……！　諦めずに戦うんだ！」"

[[dialogue]]
speaker = "カティア"
# 「この子には指一本触れさせないぞ！　うお～っ！　肉球パ～ンチ！」
line = "「この子には指一本触れさせないぞ！　うお～っ！　肉球パ～ンチ！」"

[[dialogue]]
speaker = "カティア"
# 「う、思ったより硬い……でも負けない……ガオ！」
line = "「う、思ったより硬い……でも負けない……ガオ！」"

[[dialogue]]
speaker = "カティア"
# 「今度こそ……ひっさ～つ！　ケルベロス百烈けーんっ！」
line = "「今度こそ……ひっさ～つ！　ケルベロス百烈けーんっ！」"

[[dialogue]]
speaker = "カティア"
# 「はぁ、はぁ……やった！　モンスターを倒した！」
line = "「はぁ、はぁ……やった！　モンスターを倒した！」"

[[dialogue]]
speaker = "カティア"
# 「あ、ヤバ──」
line = "「あ、ヤバ──」"

[[dialogue]]
speaker = "unk"
# カティア！
line = "カティア！"

[[dialogue]]
speaker = "カティア"
# 「魔王様！？」
line = "「魔王様！？」"

[[dialogue]]
speaker = "unk"
# モンスターを蹴散らすぞ！
line = "モンスターを蹴散らすぞ！"

[[dialogue]]
speaker = "カティア"
# 「はい！　お供します！」
line = "「はい！　お供します！」"

[[dialogue]]
speaker = "カティア"
# 「はぁ……はぁ……なんとかなった……」
line = "「はぁ……はぁ……なんとかなった……」"

[[dialogue]]
speaker = "unk"
# よく頑張ったな
line = "よく頑張ったな"

[[dialogue]]
speaker = "カティア"
# 「魔王様ぁ～～～っ！！」
line = "「魔王様ぁ～～～っ！！」"

[[dialogue]]
speaker = "カティア"
# 「うぅ……ぐす……怖くて、心細くて……でも頑張って……」
line = "「うぅ……ぐす……怖くて、心細くて……でも頑張って……」"

[[dialogue]]
speaker = "カティア"
# 「魔王様が来てくれて……うぅっ……ありがとうございます……っ」
line = "「魔王様が来てくれて……うぅっ……ありがとうございます……っ」"

[[dialogue]]
speaker = "unk"
# （頭を撫でる）
line = "（頭を撫でる）"

[[dialogue]]
speaker = "カティア"
# 「あ……魔王様に撫でてもらうとポカポカして温かいです……」
line = "「あ……魔王様に撫でてもらうとポカポカして温かいです……」"

[[dialogue]]
speaker = "小さな女の子"
# 「お姉ちゃん！　助けてくれてありがとう。かっこよかったよ！」
line = "「お姉ちゃん！　助けてくれてありがとう。かっこよかったよ！」"

[[dialogue]]
speaker = "カティア"
# 「そ、そう？　そっかー、かっこよかったかー……。えへへ、褒められちゃいました」
line = "「そ、そう？　そっかー、かっこよかったかー……。えへへ、褒められちゃいました」"

[[dialogue]]
speaker = "unk"
# カティアは俺の自慢のしもべだ
line = "カティアは俺の自慢のしもべだ"

[[dialogue]]
speaker = "カティア"
# 「！　魔王様……！」
line = "「！　魔王様……！」"

[[dialogue]]
speaker = "カティア"
# 「ふっふっふ、これで私が魔王様のイチの家来です！　誰にも文句は言わせませんよ！」
line = "「ふっふっふ、これで私が魔王様のイチの家来です！　誰にも文句は言わせませんよ！」"

[[dialogue]]
speaker = "カティア"
# 「ずっとかわいがってくださいね、魔王様。ワン♪」
line = "「ずっとかわいがってくださいね、魔王様。ワン♪」"
