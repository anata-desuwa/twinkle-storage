[[dialogue]]
speaker = "unk"
# レイラが倒れた直後、秋葉原が一瞬光に包まれ、俺の行く手を阻むように結界が発生した。
line = "レイラが倒れた直後、秋葉原が一瞬光に包まれ、俺の行く手を阻むように結界が発生した。"

[[dialogue]]
speaker = "unk"
# ディマイズブレイカー！
line = "ディマイズブレイカー！"

[[dialogue]]
speaker = "unk"
# コラプサーの力か、純粋な防御力か、いくら攻撃してもビクともしない。
line = "コラプサーの力か、純粋な防御力か、いくら攻撃してもビクともしない。"

[[dialogue]]
speaker = "unk"
# しかも結界周辺にはアステラまで発生しているようだ。応援は望めない。
line = "しかも結界周辺にはアステラまで発生しているようだ。応援は望めない。"

[[dialogue]]
speaker = "レイラ"
# 「ぐっ……はぁ、はぁ、はぁ……そっか、私、負けたんだ……」
line = "「ぐっ……はぁ、はぁ、はぁ……そっか、私、負けたんだ……」"

[[dialogue]]
speaker = "レイラ"
# 「魔王さん。私はもう戦うつもりはありません……あなたの言葉で自分の過ちに気が付きました」
line = "「魔王さん。私はもう戦うつもりはありません……あなたの言葉で自分の過ちに気が付きました」"

[[dialogue]]
speaker = "レイラ"
# 「私もあの人を止め……くっ」
line = "「私もあの人を止め……くっ」"

[[dialogue]]
speaker = "unk"
# 無理に立ち上がらないで
line = "無理に立ち上がらないで"

[[dialogue]]
speaker = "レイラ"
# 「ありがとう、ございます……」
line = "「ありがとう、ございます……」"

[[dialogue]]
speaker = "unk"
# ふらつくレイラに手を貸してやる。戦闘のダメージか、力の消耗が激しいのか、かなり苦しそうだ。
line = "ふらつくレイラに手を貸してやる。戦闘のダメージか、力の消耗が激しいのか、かなり苦しそうだ。"

[[dialogue]]
speaker = "レイラ"
# 「あ……魔王さんの手、血まみれで……何度も結界を攻撃して、こんなに……」
line = "「あ……魔王さんの手、血まみれで……何度も結界を攻撃して、こんなに……」"

[[dialogue]]
speaker = "マリオン（覚醒）"
# 「申し訳ありません、コハルコ様の救出に失敗しました。魔女イザベラも怪物へと姿を変え、暴走状態にあります」
line = "「申し訳ありません、コハルコ様の救出に失敗しました。魔女イザベラも怪物へと姿を変え、暴走状態にあります」"

[[dialogue]]
speaker = "unk"
# いつの間にか、マリオンさんが戻ってきていた。姿が変わっているが、今は気にしている場合ではない。
line = "いつの間にか、マリオンさんが戻ってきていた。姿が変わっているが、今は気にしている場合ではない。"

[[dialogue]]
speaker = "マリオン（覚醒）"
# 「拠点に侵入したまではよいのですが、返り討ちに遭いました。ですが、いくつか分かったことがあります」
line = "「拠点に侵入したまではよいのですが、返り討ちに遭いました。ですが、いくつか分かったことがあります」"

[[dialogue]]
speaker = "マリオン（覚醒）"
# 「まず、コラプサーはみな、一度死を経験している。守護星であるブラックホールの力で蘇った……違いますか、レイラ様？」
line = "「まず、コラプサーはみな、一度死を経験している。守護星であるブラックホールの力で蘇った……違いますか、レイラ様？」"

[[dialogue]]
speaker = "レイラ"
# 「お気付きに、なられたのですね……そう、私たちコラプサーは本来は死人であり、ブラックホールと契約することでなんとか生き長らえています」
line = "「お気付きに、なられたのですね……そう、私たちコラプサーは本来は死人であり、ブラックホールと契約することでなんとか生き長らえています」"

[[dialogue]]
speaker = "マリオン（覚醒）"
# 「この結界は、コラプサーたちとブラックホールのリンクに干渉し、星力を奪うことで、維持されているものと思われます」
line = "「この結界は、コラプサーたちとブラックホールのリンクに干渉し、星力を奪うことで、維持されているものと思われます」"

[[dialogue]]
speaker = "マリオン（覚醒）"
# 「あなたが今、苦しんでいるのは、ブラックホールとのリンクが不安定になっているからでしょう。ネビュラで拘束しているコラプサーたちにも同様の症状が出ているはず」
line = "「あなたが今、苦しんでいるのは、ブラックホールとのリンクが不安定になっているからでしょう。ネビュラで拘束しているコラプサーたちにも同様の症状が出ているはず」"

[[dialogue]]
speaker = "マリオン（覚醒）"
# 「そしてもう１つ。この結界は、秋葉原を切り離し、魔女の森のように異空間とするものです。けして世界を救うものではありません。あなたたちコラプサーは騙されていたのです」
line = "「そしてもう１つ。この結界は、秋葉原を切り離し、魔女の森のように異空間とするものです。けして世界を救うものではありません。あなたたちコラプサーは騙されていたのです」"

[[dialogue]]
speaker = "レイラ"
# 「そう……ですか」
line = "「そう……ですか」"

[[dialogue]]
speaker = "レイラ"
# 「……だけど、なんとなくそんな気はしていました。それでも、私はあの人を信じようとしてしまった……」
line = "「……だけど、なんとなくそんな気はしていました。それでも、私はあの人を信じようとしてしまった……」"

[[dialogue]]
speaker = "レイラ"
# 「でも、どうしてこんなことを……」
line = "「でも、どうしてこんなことを……」"

[[dialogue]]
speaker = "マリオン（覚醒）"
# 「イザベラにはウェールという娘がいたのです。その魔女はネビュラに所属していましたが、任務中に消息を絶ちました……彼女の遺体は今も見つかっていません」
line = "「イザベラにはウェールという娘がいたのです。その魔女はネビュラに所属していましたが、任務中に消息を絶ちました……彼女の遺体は今も見つかっていません」"

[[dialogue]]
speaker = "マリオン（覚醒）"
# 「イザベラは絶望してしまった。世界を救うという使命に。娘のいないこの世界に」
line = "「イザベラは絶望してしまった。世界を救うという使命に。娘のいないこの世界に」"

[[dialogue]]
speaker = "マリオン（覚醒）"
# 「だから、イザベラは自分だけの世界を作ろうとした。娘が帰ってくるという希望を抱きながら、それ以外のすべてを拒絶する世界を……」
line = "「だから、イザベラは自分だけの世界を作ろうとした。娘が帰ってくるという希望を抱きながら、それ以外のすべてを拒絶する世界を……」"

[[dialogue]]
speaker = "マリオン（覚醒）"
# 「差し詰め、リジェクションウォール、といったところでしょうか」
line = "「差し詰め、リジェクションウォール、といったところでしょうか」"

[[dialogue]]
speaker = "unk"
# 早くコハルコさんを助けないと……！
line = "早くコハルコさんを助けないと……！"

[[dialogue]]
speaker = "unk"
# とうに感覚のない拳を握る。イザベラに起きたことは悲しいことだけれど、だからってコハルコさんを犠牲にしていいわけがない。
line = "とうに感覚のない拳を握る。イザベラに起きたことは悲しいことだけれど、だからってコハルコさんを犠牲にしていいわけがない。"

[[dialogue]]
speaker = "マリオン（覚醒）"
# 「この結界は星力を吸収します。会長様では結界を破壊することは不可能……申し訳ありませんが、私の魔力も限界です。応援を待つしか……」
line = "「この結界は星力を吸収します。会長様では結界を破壊することは不可能……申し訳ありませんが、私の魔力も限界です。応援を待つしか……」"

[[dialogue]]
speaker = "レイラ"
# 「……私にお任せください。私ならこの結界を突破できます」
line = "「……私にお任せください。私ならこの結界を突破できます」"

[[dialogue]]
speaker = "レイラ"
# 「信じていただけるとは思いません。ですが、私もあの人を止めたいのです。どうか……」
line = "「信じていただけるとは思いません。ですが、私もあの人を止めたいのです。どうか……」"

[[dialogue]]
speaker = "unk"
# 君を信じる。頼む！
line = "君を信じる。頼む！"

[[dialogue]]
speaker = "レイラ"
# 「……はい！」
line = "「……はい！」"

[[dialogue]]
speaker = "レイラ"
# 「はぁ、はぁ……全てを無に帰す闇よ、我が道を拓け！」
line = "「はぁ、はぁ……全てを無に帰す闇よ、我が道を拓け！」"

[[dialogue]]
speaker = "レイラ"
# 「デッドエンド・コラプサァーッ！！」
line = "「デッドエンド・コラプサァーッ！！」"

[[dialogue]]
speaker = "unk"
# 巨大なブラックホールが結界に激突し、ぽっかりと大穴が開いた。
line = "巨大なブラックホールが結界に激突し、ぽっかりと大穴が開いた。"

[[dialogue]]
speaker = "unk"
# 行くぞ！
line = "行くぞ！"

[[dialogue]]
speaker = "マリオン（覚醒）"
# 「かしこまりました」
line = "「かしこまりました」"

[[dialogue]]
speaker = "レイラ"
# 「はいっ」
line = "「はいっ」"
