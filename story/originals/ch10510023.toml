[[dialogue]]
speaker = "unk"
# 第３話,余に好き嫌いなどない！,P
line = "第３話,余に好き嫌いなどない！,P"

[[dialogue]]
speaker = "unk"
# 魔女の森に住むクラウディアは海を見たことがないらしい。そこで俺はリップルのリゾート結界に彼女を招待することにした──
line = "魔女の森に住むクラウディアは海を見たことがないらしい。そこで俺はリップルのリゾート結界に彼女を招待することにした──"

[[dialogue]]
speaker = "クラウディア"
# 「おぉ！　これが海か……！　文献で見聞きはしていたが、実に美しい！」
line = "「おぉ！　これが海か……！　文献で見聞きはしていたが、実に美しい！」"

[[dialogue]]
speaker = "クラウディア"
# 「そしてそして……バーベキューまで用意してあるとは洒落ておる！　気が利くではないか～、魔王♪」
line = "「そしてそして……バーベキューまで用意してあるとは洒落ておる！　気が利くではないか～、魔王♪」"

[[dialogue]]
speaker = "unk"
# クラウディアはお肉が好きだからね
line = "クラウディアはお肉が好きだからね"

[[dialogue]]
speaker = "クラウディア"
# 「うむ！　伴侶の好みを把握するのは大切だ。これからも励むがよい！」
line = "「うむ！　伴侶の好みを把握するのは大切だ。これからも励むがよい！」"

[[dialogue]]
speaker = "クラウディア"
# 「ほう、このタレに漬けてから食らうのだな。もぐもぐもぐ……！　うむッ、うまい！　実にうまいぞ！」
line = "「ほう、このタレに漬けてから食らうのだな。もぐもぐもぐ……！　うむッ、うまい！　実にうまいぞ！」"

[[dialogue]]
speaker = "unk"
# 野菜もおいしいよ
line = "野菜もおいしいよ"

[[dialogue]]
speaker = "クラウディア"
# 「草っ葉は嫌いだから全部お前が食え、余は肉専門だ！　うまい、うまいぞー！　もぐもぐもぐっ……！」
line = "「草っ葉は嫌いだから全部お前が食え、余は肉専門だ！　うまい、うまいぞー！　もぐもぐもぐっ……！」"

[[dialogue]]
speaker = "クラウディア"
# 「ふう。食った食った。浜辺でのバーベキュー、実に気に入ったぞ！」
line = "「ふう。食った食った。浜辺でのバーベキュー、実に気に入ったぞ！」"

[[dialogue]]
speaker = "クラウディア"
# 「……む？　どうした魔王、曇った顔をしおって」
line = "「……む？　どうした魔王、曇った顔をしおって」"

[[dialogue]]
speaker = "unk"
# 好き嫌いはよくないよ？
line = "好き嫌いはよくないよ？"

[[dialogue]]
speaker = "クラウディア"
# 「何を言うか。余は偉くて凄い存在なのだから、草っ葉など食わんでもよいのだ！」
line = "「何を言うか。余は偉くて凄い存在なのだから、草っ葉など食わんでもよいのだ！」"

[[dialogue]]
speaker = "クラウディア"
# （む……魔王のやつ、何だか不満そうじゃのう……確かにせっかく準備してくれたのに、１つも草っ葉は食わなんだが……）
line = "（む……魔王のやつ、何だか不満そうじゃのう……確かにせっかく準備してくれたのに、１つも草っ葉は食わなんだが……）"

[[dialogue]]
speaker = "クラウディア"
# （そういえばハナヨメ修行の記事に『好き嫌いをする妻は夫に好かれん』とあったな……）
line = "（そういえばハナヨメ修行の記事に『好き嫌いをする妻は夫に好かれん』とあったな……）"

[[dialogue]]
speaker = "クラウディア"
# （ま、まあ余は普通とは違う。草っ葉を食わんくらいでその魅力に陰りが出るとも思えんが……）
line = "（ま、まあ余は普通とは違う。草っ葉を食わんくらいでその魅力に陰りが出るとも思えんが……）"

[[dialogue]]
speaker = "クラウディア"
# 「な、なあ魔王よ。つかぬことを聞くが、お前はそのー……食い物の好き嫌いをせん女の方が、好きだったりするのか？」
line = "「な、なあ魔王よ。つかぬことを聞くが、お前はそのー……食い物の好き嫌いをせん女の方が、好きだったりするのか？」"

[[dialogue]]
speaker = "unk"
# 何でもおいしく食べる子が好き
line = "何でもおいしく食べる子が好き"

[[dialogue]]
speaker = "unk"
# それはもちろん
line = "それはもちろん"

[[dialogue]]
speaker = "クラウディア"
# 「なぁっ──！？」
line = "「なぁっ──！？」"

[[dialogue]]
speaker = "クラウディア"
# 「ぐ、ぐむむむ……魔王！　来週もバーベキューをするぞ、よいな！！　余にりべんじをさせい！」
line = "「ぐ、ぐむむむ……魔王！　来週もバーベキューをするぞ、よいな！！　余にりべんじをさせい！」"

[[dialogue]]
speaker = "クラウディア"
# 「余だって……余だってなぁ！　やろうと思えば、できるのだからなーっ！」
line = "「余だって……余だってなぁ！　やろうと思えば、できるのだからなーっ！」"

[[dialogue]]
speaker = "セドナ"
# 「今日の夕食の作戦はこうだ。まずこの大皿で山盛りのサラダを姫にお出しする」
line = "「今日の夕食の作戦はこうだ。まずこの大皿で山盛りのサラダを姫にお出しする」"

[[dialogue]]
speaker = "ウェンディ"
# 「お言葉ですがセドナ長官、それはあまりにも無謀かと……！」
line = "「お言葉ですがセドナ長官、それはあまりにも無謀かと……！」"

[[dialogue]]
speaker = "セドナ"
# 「聞け。この大皿はデコイ。私も姫がこれを食すとは思っていない。拒否されたタイミングでこの小皿のサラダを出すのだ」
line = "「聞け。この大皿はデコイ。私も姫がこれを食すとは思っていない。拒否されたタイミングでこの小皿のサラダを出すのだ」"

[[dialogue]]
speaker = "ウェンディ"
# 「クラウディア様がいつも使われている食器ですね。なるほど、無理難題を提示したのちにスケールの小さい本命を通す……交渉術の基本ですね！」
line = "「クラウディア様がいつも使われている食器ですね。なるほど、無理難題を提示したのちにスケールの小さい本命を通す……交渉術の基本ですね！」"

[[dialogue]]
speaker = "セドナ"
# 「フ──それだけではない。この小皿のサラダ、いつもより分量を増やしてある。姫の苦手なトマトとパプリカも１割増しだ」
line = "「フ──それだけではない。この小皿のサラダ、いつもより分量を増やしてある。姫の苦手なトマトとパプリカも１割増しだ」"

[[dialogue]]
speaker = "ウェンディ"
# 「流石です、セドナ長官……！」
line = "「流石です、セドナ長官……！」"

[[dialogue]]
speaker = "セドナ"
# 「私が皿を運んでは警戒されてしまう。行け、ウェンディ。『姫に野菜をいっぱい食べてもらおう作戦』──決行だ」
line = "「私が皿を運んでは警戒されてしまう。行け、ウェンディ。『姫に野菜をいっぱい食べてもらおう作戦』──決行だ」"

[[dialogue]]
speaker = "ウェンディ"
# 「イエス、マム！」
line = "「イエス、マム！」"

[[dialogue]]
speaker = "クラウディア"
# 「む……これが今日の夕餉か」
line = "「む……これが今日の夕餉か」"

[[dialogue]]
speaker = "ウェンディ"
# 「はい。どうぞ召し上がってください」
line = "「はい。どうぞ召し上がってください」"

[[dialogue]]
speaker = "クラウディア"
# 「うむ。いただくとしよう。もぐもぐもぐ……」
line = "「うむ。いただくとしよう。もぐもぐもぐ……」"

[[dialogue]]
speaker = "ウェンディ"
# 「なるほど、食べるのはお嫌ですか。そうですよね、では仕方ありません。こちらの小皿を──」
line = "「なるほど、食べるのはお嫌ですか。そうですよね、では仕方ありません。こちらの小皿を──」"

[[dialogue]]
speaker = "ウェンディ"
# 「って！？　食べてる～～～！？」
line = "「って！？　食べてる～～～！？」"

[[dialogue]]
speaker = "クラウディア"
# 「騒々しいぞ。食事中は静かにせんか！」
line = "「騒々しいぞ。食事中は静かにせんか！」"

[[dialogue]]
speaker = "ウェンディ"
# 「セドナ長官っ！　大変ですっ、緊急事態です！」
line = "「セドナ長官っ！　大変ですっ、緊急事態です！」"

[[dialogue]]
speaker = "セドナ"
# 「どうした敵襲か！？　──なっ！？　姫が、山盛りのサラダを……一体何が起こっているというのだ！？」
line = "「どうした敵襲か！？　──なっ！？　姫が、山盛りのサラダを……一体何が起こっているというのだ！？」"

[[dialogue]]
speaker = "ウェンディ"
# 「クラウディア様。人間界で何か悪いものでも召し上がったのですか？　拾い食いをしてはいけませんとあれほど……」
line = "「クラウディア様。人間界で何か悪いものでも召し上がったのですか？　拾い食いをしてはいけませんとあれほど……」"

[[dialogue]]
speaker = "クラウディア"
# 「しとらん！　ああもう、仕方なかろうが！　余は草っ葉を食う練習をせねばならんのだ！」
line = "「しとらん！　ああもう、仕方なかろうが！　余は草っ葉を食う練習をせねばならんのだ！」"

[[dialogue]]
speaker = "セドナ"
# 「それは結構なことですが、いったいどういう心境の変化が……」
line = "「それは結構なことですが、いったいどういう心境の変化が……」"

[[dialogue]]
speaker = "クラウディア"
# 「…………だって魔王が、食い物の好き嫌いをせん女が好きだと言うから」
line = "「…………だって魔王が、食い物の好き嫌いをせん女が好きだと言うから」"

[[dialogue]]
speaker = "セドナ"
# 「は？」
line = "「は？」"

[[dialogue]]
speaker = "クラウディア"
# 「──はっ！？　い、いや勘違いするな！　草っ葉も食えんのかと小馬鹿にされたから、見返してやるだけだ！　他意はないからな！」
line = "「──はっ！？　い、いや勘違いするな！　草っ葉も食えんのかと小馬鹿にされたから、見返してやるだけだ！　他意はないからな！」"

[[dialogue]]
speaker = "クラウディア"
# 「ほれ、とっとと出て行かんか、２人とも！」
line = "「ほれ、とっとと出て行かんか、２人とも！」"

[[dialogue]]
speaker = "ウェンディ"
# 「予想外の展開でしたが……よかったですねセドナ長官。クラウディア様が自らお野菜を召し上がられるだなんて、これは大変な進歩ですよ！」
line = "「予想外の展開でしたが……よかったですねセドナ長官。クラウディア様が自らお野菜を召し上がられるだなんて、これは大変な進歩ですよ！」"

[[dialogue]]
speaker = "セドナ"
# 「……っ」
line = "「……っ」"

[[dialogue]]
speaker = "ウェンディ"
# 「セドナ長官？　あの……？」
line = "「セドナ長官？　あの……？」"

[[dialogue]]
speaker = "セドナ"
# 「なぜだ。私がどれだけ進言しても野菜を自ら食べてはくれなかったのに……」
line = "「なぜだ。私がどれだけ進言しても野菜を自ら食べてはくれなかったのに……」"

[[dialogue]]
speaker = "セドナ"
# 「飴と鞭を使い分けたり、情操教育を子育て教本から学んだり、魔女の霊薬を用いたり、長老たちに相談もした……全て効果がなかった……！」
line = "「飴と鞭を使い分けたり、情操教育を子育て教本から学んだり、魔女の霊薬を用いたり、長老たちに相談もした……全て効果がなかった……！」"

[[dialogue]]
speaker = "セドナ"
# 「それなのに魔王の一言で……くそっ、何なのだこの感情は！？」
line = "「それなのに魔王の一言で……くそっ、何なのだこの感情は！？」"

[[dialogue]]
speaker = "セドナ"
# 「あの男に感謝はしている、だが同時にくすぶるこの怒り……どうすれば鎮められるのだ……おのれ、魔王め……！」
line = "「あの男に感謝はしている、だが同時にくすぶるこの怒り……どうすれば鎮められるのだ……おのれ、魔王め……！」"

[[dialogue]]
speaker = "unk"
# 街で偶然セドナさんに会った時、いつもの３割増しで睨まれたのだけど、俺は何か嫌われるようなことをしてしまったのだろうか……？
line = "街で偶然セドナさんに会った時、いつもの３割増しで睨まれたのだけど、俺は何か嫌われるようなことをしてしまったのだろうか……？"

[[dialogue]]
speaker = "unk"
# せっかくクラウディアがバーベキューで野菜を食べてくれて、嬉しい気分になっていたのだけれど。結局どれだけ考えても答えは出ないのだった──
line = "せっかくクラウディアがバーベキューで野菜を食べてくれて、嬉しい気分になっていたのだけれど。結局どれだけ考えても答えは出ないのだった──"
