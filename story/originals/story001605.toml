[[dialogue]]
speaker = "unk"
# ミウとヒマワリがゴールデングースに見習いとして入社し、早半月ほどが経過した。
line = "ミウとヒマワリがゴールデングースに見習いとして入社し、早半月ほどが経過した。"

[[dialogue]]
speaker = "ヒマワリ"
# 「最近はＩＴ系と金属の株が絶好調だねー。むしろ、絶好調すぎるかもー？」
line = "「最近はＩＴ系と金属の株が絶好調だねー。むしろ、絶好調すぎるかもー？」"

[[dialogue]]
speaker = "ヒマワリ"
# 「そろそろ下げそうだから、一旦利確しておこっと。ポチッと」
line = "「そろそろ下げそうだから、一旦利確しておこっと。ポチッと」"

[[dialogue]]
speaker = "セナリィ"
# （ゴールデングースの資産が増える音が聞こえたわ……実に喜ばしいことなんですけども！）
line = "（ゴールデングースの資産が増える音が聞こえたわ……実に喜ばしいことなんですけども！）"

[[dialogue]]
speaker = "セナリィ"
# 「ミウ、今着手中の依頼が１件ありましたわよね。大型ペットの捜索と捕獲依頼だったかしら」
line = "「ミウ、今着手中の依頼が１件ありましたわよね。大型ペットの捜索と捕獲依頼だったかしら」"

[[dialogue]]
speaker = "ミウ"
# 「あっ、ごめんなさい、社長。そちら、既に解決済みです」
line = "「あっ、ごめんなさい、社長。そちら、既に解決済みです」"

[[dialogue]]
speaker = "セナリィ"
# 「いつの間に！？」
line = "「いつの間に！？」"

[[dialogue]]
speaker = "ミウ"
# 「昨晩、社長の手を煩わせるまでもないと思ったので、ヒマワリちゃんとお出かけついでに解決しちゃいました……マズかったですか？」
line = "「昨晩、社長の手を煩わせるまでもないと思ったので、ヒマワリちゃんとお出かけついでに解決しちゃいました……マズかったですか？」"

[[dialogue]]
speaker = "セナリィ"
# 「……いえ、構いませんわ。お疲れさま」
line = "「……いえ、構いませんわ。お疲れさま」"

[[dialogue]]
speaker = "ミウ"
# 「捕獲対象がヘビやカエルじゃなくて良かったです。私、爬虫類や両生類が苦手なもので……」
line = "「捕獲対象がヘビやカエルじゃなくて良かったです。私、爬虫類や両生類が苦手なもので……」"

[[dialogue]]
speaker = "セナリィ"
# 「意外ですわ。ミウにも苦手なものがありますのね」
line = "「意外ですわ。ミウにも苦手なものがありますのね」"

[[dialogue]]
speaker = "ミウ"
# 「もちろんですよ。セナリィ社長は、苦手なものなんてなさそうですよね」
line = "「もちろんですよ。セナリィ社長は、苦手なものなんてなさそうですよね」"

[[dialogue]]
speaker = "セナリィ"
# 「え、ええ、当然ですわ！　仮にあったとしても、決して赤の他人に弱点を悟られてはなりませんわよ」
line = "「え、ええ、当然ですわ！　仮にあったとしても、決して赤の他人に弱点を悟られてはなりませんわよ」"

[[dialogue]]
speaker = "ミウ"
# 「あっ……そうですね。気をつけます。ヘビやカエルを生で食べろと言われたら、口を割ってしまうかもしれません」
line = "「あっ……そうですね。気をつけます。ヘビやカエルを生で食べろと言われたら、口を割ってしまうかもしれません」"

[[dialogue]]
speaker = "セナリィ"
# 「それは嫌いじゃなくてもキツそうですわね……」
line = "「それは嫌いじゃなくてもキツそうですわね……」"

[[dialogue]]
speaker = "ヒマワリ"
# 「ミウ、ちょっとこっち来てー？」
line = "「ミウ、ちょっとこっち来てー？」"

[[dialogue]]
speaker = "ミウ"
# 「はーい、どうしたの。ヒマワリちゃん」
line = "「はーい、どうしたの。ヒマワリちゃん」"

[[dialogue]]
speaker = "セナリィ"
# 「……マズいですわ」
line = "「……マズいですわ」"

[[dialogue]]
speaker = "セナリィ"
# 「私、何もしておりませんのに……偉そうに椅子にふんぞり返ってるだけで勝手に運営資金が増えていきますわ……」
line = "「私、何もしておりませんのに……偉そうに椅子にふんぞり返ってるだけで勝手に運営資金が増えていきますわ……」"

[[dialogue]]
speaker = "セナリィ"
# 「いえ、悪いことではないのですけど……優秀な社員が働いてくれてるおかげで、何もしないで左団扇……不労所得……」
line = "「いえ、悪いことではないのですけど……優秀な社員が働いてくれてるおかげで、何もしないで左団扇……不労所得……」"

[[dialogue]]
speaker = "セナリィ"
# 「社長としては最も望ましく、憧れすら抱いてた状況にもかかわらず……なんなんですの、この虚しさは！」
line = "「社長としては最も望ましく、憧れすら抱いてた状況にもかかわらず……なんなんですの、この虚しさは！」"

[[dialogue]]
speaker = "セナリィ"
# 「この１週間、あの子たちがたんまりと運営資金を稼いでる中、私は燃費の悪い戦闘服をテストしているだけ……私が一番何もしていないではありませんの！」
line = "「この１週間、あの子たちがたんまりと運営資金を稼いでる中、私は燃費の悪い戦闘服をテストしているだけ……私が一番何もしていないではありませんの！」"

[[dialogue]]
speaker = "セナリィ"
# 「マズい……マズいですわ！　このままでは社長の私が一番いらない子になってしまいます！　ゴールデングースを新人２人に乗っ取られてしまいますわー！」
line = "「マズい……マズいですわ！　このままでは社長の私が一番いらない子になってしまいます！　ゴールデングースを新人２人に乗っ取られてしまいますわー！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「社長？　どうかしましたー？」
line = "「社長？　どうかしましたー？」"

[[dialogue]]
speaker = "セナリィ"
# 「い、いえ、なんでも。２人ともよく頑張ってくれていますわね。ちゃんと休みは取っているのかしら？」
line = "「い、いえ、なんでも。２人ともよく頑張ってくれていますわね。ちゃんと休みは取っているのかしら？」"

[[dialogue]]
speaker = "ヒマワリ"
# 「もちろんですよー。その辺はミウがしっかりプランニングしてくれてるんで！」
line = "「もちろんですよー。その辺はミウがしっかりプランニングしてくれてるんで！」"

[[dialogue]]
speaker = "ミウ"
# 「ちゃんと食べて、ちゃんと寝ないと、ベストパフォーマンスは発揮できませんからね」
line = "「ちゃんと食べて、ちゃんと寝ないと、ベストパフォーマンスは発揮できませんからね」"

[[dialogue]]
speaker = "セナリィ"
# 「本当によくできた子たちですわ……」
line = "「本当によくできた子たちですわ……」"

[[dialogue]]
speaker = "ミウ"
# 「社長のプランニングも整えてるつもりでしたけど、お気に召さなかったでしょうか？」
line = "「社長のプランニングも整えてるつもりでしたけど、お気に召さなかったでしょうか？」"

[[dialogue]]
speaker = "セナリィ"
# 「まさか。ミウの提案してくれている健康的な食事のおかげで、以前より肌ツヤもハリもいいですし、睡眠の質が向上した実感がありますわ」
line = "「まさか。ミウの提案してくれている健康的な食事のおかげで、以前より肌ツヤもハリもいいですし、睡眠の質が向上した実感がありますわ」"

[[dialogue]]
speaker = "ミウ"
# 「それは何よりです。セナリィ社長の美が損なわれたりしたら、世界にとって大きな損失ですからね」
line = "「それは何よりです。セナリィ社長の美が損なわれたりしたら、世界にとって大きな損失ですからね」"

[[dialogue]]
speaker = "セナリィ"
# 「損失のスケールが大きいですわね……」
line = "「損失のスケールが大きいですわね……」"

[[dialogue]]
speaker = "セナリィ"
# 「２人とも入社したばかりだからってあまり張り切りすぎなくてもよろしくてよ？　もう少し肩の力を抜いて──」
line = "「２人とも入社したばかりだからってあまり張り切りすぎなくてもよろしくてよ？　もう少し肩の力を抜いて──」"

[[dialogue]]
speaker = "ミウ"
# 「いえ、私たちなんて、社長に比べたらまだまだです」
line = "「いえ、私たちなんて、社長に比べたらまだまだです」"

[[dialogue]]
speaker = "ヒマワリ"
# 「社長はあたしがやってる子どもの遊びなんかより、もっともっとすごいことをしてますもんね！」
line = "「社長はあたしがやってる子どもの遊びなんかより、もっともっとすごいことをしてますもんね！」"

[[dialogue]]
speaker = "セナリィ"
# 「そっ、そ、そうですわね！　社員のあなたたちにも言えない企業秘密案件を遂行中ですのよ！？」
line = "「そっ、そ、そうですわね！　社員のあなたたちにも言えない企業秘密案件を遂行中ですのよ！？」"

[[dialogue]]
speaker = "ミウ"
# 「やっぱり。詮索するつもりはありませんけど、私たちに気づかれないよう、何かこっそりとされてますよね？」
line = "「やっぱり。詮索するつもりはありませんけど、私たちに気づかれないよう、何かこっそりとされてますよね？」"

[[dialogue]]
speaker = "セナリィ"
# （こっそりしてたのにバレバレでしたわー！？）
line = "（こっそりしてたのにバレバレでしたわー！？）"

[[dialogue]]
speaker = "ヒマワリ"
# 「まだあたしたちが半人前だから教えてもらえないんですよね！　社長に認めてもらえるよう、まだまだ頑張ります！」
line = "「まだあたしたちが半人前だから教えてもらえないんですよね！　社長に認めてもらえるよう、まだまだ頑張ります！」"

[[dialogue]]
speaker = "ミウ"
# 「ところで社長。先ほどからネーゼマインさんがいらしてますけど、お話されなくていいんですか？」
line = "「ところで社長。先ほどからネーゼマインさんがいらしてますけど、お話されなくていいんですか？」"

[[dialogue]]
speaker = "セナリィ"
# 「へ……？」
line = "「へ……？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「退屈はしてないんでお構いなく～。ミウちゃんがいれてくれた紅茶、チョー美味しいね☆」
line = "「退屈はしてないんでお構いなく～。ミウちゃんがいれてくれた紅茶、チョー美味しいね☆」"

[[dialogue]]
speaker = "セナリィ"
# 「ええ、あの子の入れる紅茶は私よりも美味しく──って、マイン！？　あなた、どこに──いえ、いつからいましたの！？」
line = "「ええ、あの子の入れる紅茶は私よりも美味しく──って、マイン！？　あなた、どこに──いえ、いつからいましたの！？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「えー、最初っから、ずーっとここにいたのに、セナリィってば気づいてなかったんだ。そんなに影が薄かっただなんてマインちゃんショック☆」
line = "「えー、最初っから、ずーっとここにいたのに、セナリィってば気づいてなかったんだ。そんなに影が薄かっただなんてマインちゃんショック☆」"

[[dialogue]]
speaker = "セナリィ"
# 「自己主張強すぎるあなたの影が薄いはずがないでしょう。集中しすぎて、自分の世界に入っていただけですわ」
line = "「自己主張強すぎるあなたの影が薄いはずがないでしょう。集中しすぎて、自分の世界に入っていただけですわ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「みたいだね～。セナリィが頭抱えてぐねぐねしたり、呻いてる一部始終、見させてもらってたし。セナリィってば見てるだけで退屈しないよね～」
line = "「みたいだね～。セナリィが頭抱えてぐねぐねしたり、呻いてる一部始終、見させてもらってたし。セナリィってば見てるだけで退屈しないよね～」"

[[dialogue]]
speaker = "セナリィ"
# 「んなっ……！？　ぐねってる途中で声のひとつもかけたらどうなんですの！？」
line = "「んなっ……！？　ぐねってる途中で声のひとつもかけたらどうなんですの！？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「新入社員のヒマワリちゃんとミウちゃん、２人ともいい子だよね。成績抜群で頭良いし、仕事もできるし、これでゴールデングースも安泰だ♪」
line = "「新入社員のヒマワリちゃんとミウちゃん、２人ともいい子だよね。成績抜群で頭良いし、仕事もできるし、これでゴールデングースも安泰だ♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「でも、優秀すぎる部下ってのも考えものだよねー。社長としては肩身が狭くなってるんじゃない？」
line = "「でも、優秀すぎる部下ってのも考えものだよねー。社長としては肩身が狭くなってるんじゃない？」"

[[dialogue]]
speaker = "セナリィ"
# 「ちょっ、マイン、どこまで察してますの……！？」
line = "「ちょっ、マイン、どこまで察してますの……！？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひ♪　私とセナリィの仲じゃん。セナリィが考えてることなんて、手に取るみたいにわかっちゃうってば」
line = "「にひひ♪　私とセナリィの仲じゃん。セナリィが考えてることなんて、手に取るみたいにわかっちゃうってば」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「さってと、面白いものも見れたし、紅茶も飲み終わったことだし、私はここらでお暇しようかな」
line = "「さってと、面白いものも見れたし、紅茶も飲み終わったことだし、私はここらでお暇しようかな」"

[[dialogue]]
speaker = "セナリィ"
# 「あなた、お茶を飲みに来ただけですの？　冷やかしはお断りですわよ」
line = "「あなた、お茶を飲みに来ただけですの？　冷やかしはお断りですわよ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「違う、違う。食い扶持に困ってそうなら、メンドい案件を押し付けようと思ってただけ」
line = "「違う、違う。食い扶持に困ってそうなら、メンドい案件を押し付けようと思ってただけ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「でも今のゴールデングースなら、その必要もなさそうだしね。これは公安の方で片づけちゃうよ。シアン先輩が嫌そうな顔するのが目に浮かぶな～」
line = "「でも今のゴールデングースなら、その必要もなさそうだしね。これは公安の方で片づけちゃうよ。シアン先輩が嫌そうな顔するのが目に浮かぶな～」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「じゃ、可愛い部下の期待を裏切らないよう、せいぜい頑張ってね、社長さん☆」
line = "「じゃ、可愛い部下の期待を裏切らないよう、せいぜい頑張ってね、社長さん☆」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ミウちゃん、紅茶ごちそうさまー。ヒマワリちゃんも頑張ってねー♪」
line = "「ミウちゃん、紅茶ごちそうさまー。ヒマワリちゃんも頑張ってねー♪」"

[[dialogue]]
speaker = "ミウ"
# 「もう帰られるんですか？　何のお構いもしませんで」
line = "「もう帰られるんですか？　何のお構いもしませんで」"

[[dialogue]]
speaker = "ヒマワリ"
# 「お疲れさまでーす。また遊びに来てくださいねー」
line = "「お疲れさまでーす。また遊びに来てくださいねー」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひっ、社長業ってタイヘーン☆」
line = "「にひひっ、社長業ってタイヘーン☆」"

[[dialogue]]
speaker = "セナリィ"
# 「まったく……マインの言う通りなのが、実に癪ですわ。尊敬してくれている２人に、不甲斐ない姿を見せるわけにはいきませんわね……」
line = "「まったく……マインの言う通りなのが、実に癪ですわ。尊敬してくれている２人に、不甲斐ない姿を見せるわけにはいきませんわね……」"
