[[dialogue]]
speaker = "unk"
# 第３話,恋人でもママに甘えたい,P
line = "第３話,恋人でもママに甘えたい,P"

[[dialogue]]
speaker = "unk"
# セシアと付き合い始めてから数日経った、ある放課後のこと。
line = "セシアと付き合い始めてから数日経った、ある放課後のこと。"

[[dialogue]]
speaker = "セシア"
# 「会長、今日はプレゼントがあって、持ってきたわ♪」
line = "「会長、今日はプレゼントがあって、持ってきたわ♪」"

[[dialogue]]
speaker = "unk"
# 彼女は突然、クリスマスフォームを着て訪ねて来るなり、サンタの袋からごそごそと物を取り出して、机の上に並べて行く。
line = "彼女は突然、クリスマスフォームを着て訪ねて来るなり、サンタの袋からごそごそと物を取り出して、机の上に並べて行く。"

[[dialogue]]
speaker = "unk"
# こ、これは一体……？
line = "こ、これは一体……？"

[[dialogue]]
speaker = "セシア"
# 「ほら、わたくしたち、めでたく付き合い始めたでしょう？　だから――」
line = "「ほら、わたくしたち、めでたく付き合い始めたでしょう？　だから――」"

[[dialogue]]
speaker = "セシア"
# 「今後必要になるであろう、『赤ちゃんグッズ』を色々考えてきたのよ♪」
line = "「今後必要になるであろう、『赤ちゃんグッズ』を色々考えてきたのよ♪」"

[[dialogue]]
speaker = "unk"
# それはあまりに気が早すぎない！？
line = "それはあまりに気が早すぎない！？"

[[dialogue]]
speaker = "セシア"
# 「何か勘違いしているようだけれど、これはわたくしが使うものよ？」
line = "「何か勘違いしているようだけれど、これはわたくしが使うものよ？」"

[[dialogue]]
speaker = "unk"
# どういうこと！？
line = "どういうこと！？"

[[dialogue]]
speaker = "セシア"
# 「わたくし、昨夜気づいたの。恋人同士になったということは、それってつまり……」
line = "「わたくし、昨夜気づいたの。恋人同士になったということは、それってつまり……」"

[[dialogue]]
speaker = "セシア"
# 「これからはわたくしも甘えたい時、会長に女の子フォームに変身してもらって、『クロトママ』に甘え放題ということよね？」
line = "「これからはわたくしも甘えたい時、会長に女の子フォームに変身してもらって、『クロトママ』に甘え放題ということよね？」"

[[dialogue]]
speaker = "unk"
# 俺は以前、アニマ先輩の作った附属生の女の子アバターに魂を移して附属校に通ったことがあり、その姿でセシアからママ判定に合格。
line = "俺は以前、アニマ先輩の作った附属生の女の子アバターに魂を移して附属校に通ったことがあり、その姿でセシアからママ判定に合格。"

[[dialogue]]
speaker = "unk"
# 彼女から『クロトママ』と呼ばれていた経験がある……！
line = "彼女から『クロトママ』と呼ばれていた経験がある……！"

[[dialogue]]
speaker = "unk"
# しかも、現在ではフォームチェンジ技術の発展により、俺の別フォームの１つとしていつでも変身可能になっていたりする。
line = "しかも、現在ではフォームチェンジ技術の発展により、俺の別フォームの１つとしていつでも変身可能になっていたりする。"

[[dialogue]]
speaker = "セシア"
# 「ほら、例えば、この『おしゃぶり』」
line = "「ほら、例えば、この『おしゃぶり』」"

[[dialogue]]
speaker = "セシア"
# 「赤ちゃんに限らず、これを咥えるとヒトは安心するものらしいわ♪」
line = "「赤ちゃんに限らず、これを咥えるとヒトは安心するものらしいわ♪」"

[[dialogue]]
speaker = "unk"
# 俺のママになるという話だったのでは！？
line = "俺のママになるという話だったのでは！？"

[[dialogue]]
speaker = "セシア"
# 「もちろん、会長が甘えてくれるのなら、わたくしはあなたのママになることも、やぶさかではないわ」
line = "「もちろん、会長が甘えてくれるのなら、わたくしはあなたのママになることも、やぶさかではないわ」"

[[dialogue]]
speaker = "セシア"
# 「お互いがお互いのママになり、甘え、甘えさせてもらう……これぞまさに永久機関というものよね♪」
line = "「お互いがお互いのママになり、甘え、甘えさせてもらう……これぞまさに永久機関というものよね♪」"

[[dialogue]]
speaker = "unk"
# それはヒトをダメにする機関では……！？
line = "それはヒトをダメにする機関では……！？"

[[dialogue]]
speaker = "紅明"
# 「話は聞かせてもらったぜ！　２人とも恋人同士になったんだってな！　ヒュー☆　おめでとう！！」
line = "「話は聞かせてもらったぜ！　２人とも恋人同士になったんだってな！　ヒュー☆　おめでとう！！」"

[[dialogue]]
speaker = "セシア"
# 「紅明ママ！」
line = "「紅明ママ！」"

[[dialogue]]
speaker = "unk"
# というか、何故に紅明までサンタ衣装！？
line = "というか、何故に紅明までサンタ衣装！？"

[[dialogue]]
speaker = "unk"
# うおっ、ビックリした！？　ありがとう！！
line = "うおっ、ビックリした！？　ありがとう！！"

[[dialogue]]
speaker = "紅明"
# 「ふっ、それはもちろん、ノリだぜ☆」
line = "「ふっ、それはもちろん、ノリだぜ☆」"

[[dialogue]]
speaker = "セシア"
# 「……そわそわ」
line = "「……そわそわ」"

[[dialogue]]
speaker = "unk"
# ふと、俺はセシアが紅明に甘えたそうにしていることに気づく。
line = "ふと、俺はセシアが紅明に甘えたそうにしていることに気づく。"

[[dialogue]]
speaker = "unk"
# なので――
line = "なので――"

[[dialogue]]
speaker = "unk"
# セシア、我慢しなくていいんだぞ
line = "セシア、我慢しなくていいんだぞ"

[[dialogue]]
speaker = "セシア"
# 「え……？」
line = "「え……？」"

[[dialogue]]
speaker = "unk"
# ――セシアは恋人の俺が目の前にいるのに、紅明ママに甘えるのは問題があると遠慮したんじゃないか？
line = "――セシアは恋人の俺が目の前にいるのに、紅明ママに甘えるのは問題があると遠慮したんじゃないか？"

[[dialogue]]
speaker = "unk"
# そんな風に口にすると、セシアは驚いたように……
line = "そんな風に口にすると、セシアは驚いたように……"

[[dialogue]]
speaker = "セシア"
# 「どうして……わかったの？」
line = "「どうして……わかったの？」"

[[dialogue]]
speaker = "unk"
# セシアを見てきた『蓄積』ってやつかな
line = "セシアを見てきた『蓄積』ってやつかな"

[[dialogue]]
speaker = "セシア"
# 「……！　会長！」
line = "「……！　会長！」"

[[dialogue]]
speaker = "unk"
# セシアは、ぱぁっと嬉しそうな笑顔を浮かべながら、俺に抱き着いてきて──
line = "セシアは、ぱぁっと嬉しそうな笑顔を浮かべながら、俺に抱き着いてきて──"

[[dialogue]]
speaker = "セシア"
# 「わたくし、やっぱり会長を恋人に選んでよかったわ♪」
line = "「わたくし、やっぱり会長を恋人に選んでよかったわ♪」"

[[dialogue]]
speaker = "紅明"
# 「さっすがダーリン♪　カッコよくて、アタシも惚れ直しちゃうぜ☆」
line = "「さっすがダーリン♪　カッコよくて、アタシも惚れ直しちゃうぜ☆」"

[[dialogue]]
speaker = "紅明"
# 「というわけで、セッシー♪　ダーリンと恋人になっても、紅明ママは来る者拒まずだぜ～？」
line = "「というわけで、セッシー♪　ダーリンと恋人になっても、紅明ママは来る者拒まずだぜ～？」"

[[dialogue]]
speaker = "セシア"
# 「紅明ママ～！　わ～い♪」
line = "「紅明ママ～！　わ～い♪」"

[[dialogue]]
speaker = "紅明"
# 「お～、よしよし☆」
line = "「お～、よしよし☆」"

[[dialogue]]
speaker = "セシア"
# 「えへへ♪　やっぱり紅明ママのおっぱいは大きくて、抱き着くと安心するわ<emoji=heart04>」
line = "「えへへ♪　やっぱり紅明ママのおっぱいは大きくて、抱き着くと安心するわ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# と、その時だった。
line = "と、その時だった。"

[[dialogue]]
speaker = "ヴィーナス"
# 「話は聞かせてもらったわ！　２人とも恋人同士になったんだってね！　おめでとう！！」
line = "「話は聞かせてもらったわ！　２人とも恋人同士になったんだってね！　おめでとう！！」"

[[dialogue]]
speaker = "unk"
# ヴィーナス！？　何故に水着フォーム！？
line = "ヴィーナス！？　何故に水着フォーム！？"

[[dialogue]]
speaker = "ヴィーナス"
# 「なんかそっちの方が面白そうだと思って！」
line = "「なんかそっちの方が面白そうだと思って！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それはそうと、今ならクロトママに絶賛甘え放題サービス中だって聞いたわ。それで私、気づいたんだけど――」
line = "「それはそうと、今ならクロトママに絶賛甘え放題サービス中だって聞いたわ。それで私、気づいたんだけど――」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私、娘なのにクロトママには１度も甘えたことないのよね！　だから１度、思いっきり甘えてみたいわ♪」
line = "「私、娘なのにクロトママには１度も甘えたことないのよね！　だから１度、思いっきり甘えてみたいわ♪」"

[[dialogue]]
speaker = "unk"
# う～ん……
line = "う～ん……"

[[dialogue]]
speaker = "unk"
# 確かにセシアには他のママに甘えることをＯＫしたが、だからと言って男の俺が他の女子とスキンシップしていいことにはならない気がする。
line = "確かにセシアには他のママに甘えることをＯＫしたが、だからと言って男の俺が他の女子とスキンシップしていいことにはならない気がする。"

[[dialogue]]
speaker = "ヴィーナス"
# 「ガーン！　ダメなのぉ！？　クロトママを出して頂戴！　パパのドケチ！！」
line = "「ガーン！　ダメなのぉ！？　クロトママを出して頂戴！　パパのドケチ！！」"

[[dialogue]]
speaker = "unk"
# 甘え放題サービス中とはいかないが、変身して見せるだけなら……ということで、とりあえず附属生フォームに変身する。
line = "甘え放題サービス中とはいかないが、変身して見せるだけなら……ということで、とりあえず附属生フォームに変身する。"

[[dialogue]]
speaker = "ヴィーナス"
# 「これが噂のクロトママの姿なのね！　思っていた以上に可愛いわ！」
line = "「これが噂のクロトママの姿なのね！　思っていた以上に可愛いわ！」"

[[dialogue]]
speaker = "セシア"
# 「……ぷっく～」
line = "「……ぷっく～」"

[[dialogue]]
speaker = "unk"
# セシアが頬を膨らませて、俺の制服の袖を引っ張っていることに気づいた。
line = "セシアが頬を膨らませて、俺の制服の袖を引っ張っていることに気づいた。"

[[dialogue]]
speaker = "セシア"
# 「……なんか、他の女の子がクロトママに甘えるのは、あんまり嬉しくないわ」
line = "「……なんか、他の女の子がクロトママに甘えるのは、あんまり嬉しくないわ」"

[[dialogue]]
speaker = "unk"
# え！？　そ、それって……
line = "え！？　そ、それって……"

[[dialogue]]
speaker = "ヴィーナス"
# 「セシア、もしかして『嫉妬』しているの？」
line = "「セシア、もしかして『嫉妬』しているの？」"

[[dialogue]]
speaker = "紅明"
# 「マジか～！」
line = "「マジか～！」"

[[dialogue]]
speaker = "セシア"
# 「これが、嫉妬……？　なんか胸がこう、ちょっとモヤモヤするわ」
line = "「これが、嫉妬……？　なんか胸がこう、ちょっとモヤモヤするわ」"

[[dialogue]]
speaker = "セシア"
# 「きゃっ！？」
line = "「きゃっ！？」"

[[dialogue]]
speaker = "unk"
# 俺はそんな彼女がすごく可愛くて、思わずぎゅっと抱き締めてしまう。
line = "俺はそんな彼女がすごく可愛くて、思わずぎゅっと抱き締めてしまう。"

[[dialogue]]
speaker = "セシア"
# 「んっ……<emoji=heart04>　クロトママ<emoji=heart04>」
line = "「んっ……<emoji=heart04>　クロトママ<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
# 「えへへ<emoji=heart04>　胸が温かくなって、胸のモヤモヤがスーッと無くなっていくわ<emoji=heart04>」
line = "「えへへ<emoji=heart04>　胸が温かくなって、胸のモヤモヤがスーッと無くなっていくわ<emoji=heart04>」"

[[dialogue]]
speaker = "紅明"
# 「ヒュー☆」
line = "「ヒュー☆」"

[[dialogue]]
speaker = "ヴィーナス"
# 「なんかよく分からないけど、お熱いわね♪　クロトママ！」
line = "「なんかよく分からないけど、お熱いわね♪　クロトママ！」"

[[dialogue]]
speaker = "unk"
# それからセシアが満足するまで、俺は彼女を抱き締めたまま、頭を撫で続けるのだった――
line = "それからセシアが満足するまで、俺は彼女を抱き締めたまま、頭を撫で続けるのだった――"
