[[dialogue]]
speaker = "unk"
# 第１５話,真夜中の奇襲,B
line = "第１５話,真夜中の奇襲,B"

[[dialogue]]
speaker = "unk"
# ──４人がかりではあるが、ヴィーナスの記録を破った。その帰り道。
line = "──４人がかりではあるが、ヴィーナスの記録を破った。その帰り道。"

[[dialogue]]
speaker = "クロト"
# 「（今日はいい鍛錬ができた──けど、そのぶん体に負担がかかるってことは覚えとかないとな）」
line = "「（今日はいい鍛錬ができた──けど、そのぶん体に負担がかかるってことは覚えとかないとな）」"

[[dialogue]]
speaker = "unk"
# 俺はせめてもの努力として、明日のイメージトレーニングをしながら帰っていると……。
line = "俺はせめてもの努力として、明日のイメージトレーニングをしながら帰っていると……。"

[[dialogue]]
speaker = "クロト"
# 「……ん？」
line = "「……ん？」"

[[dialogue]]
speaker = "unk"
# 向こうから──地鳴りとともに何か崩れる音が聞こえた。
line = "向こうから──地鳴りとともに何か崩れる音が聞こえた。"

[[dialogue]]
speaker = "unk"
# そして……
line = "そして……"

[[dialogue]]
speaker = "逃げてくる女性Ａ"
# 「きゃああ！？　モ、モンスターだわ、逃げないと……っ！」
line = "「きゃああ！？　モ、モンスターだわ、逃げないと……っ！」"

[[dialogue]]
speaker = "クロト"
# 「！？　モンスターだって──？」
line = "「！？　モンスターだって──？」"

[[dialogue]]
speaker = "unk"
# 音の聞こえた方角からたくさんの人がこちらへ逃げてくる。その先には……
line = "音の聞こえた方角からたくさんの人がこちらへ逃げてくる。その先には……"

[[dialogue]]
speaker = "ダークキングフワッチ"
# 「ウィイイイイイ！！」
line = "「ウィイイイイイ！！」"

[[dialogue]]
speaker = "ダークキングフワッチ"
# 「イイイイイ！！」
line = "「イイイイイ！！」"

[[dialogue]]
speaker = "クロト"
# 「（大型モンスター──それも、大群……！！）」
line = "「（大型モンスター──それも、大群……！！）」"

[[dialogue]]
speaker = "unk"
# ５──１０──いや、視認できるだけでも２０を超えるモンスターの群れが、市街地のど真ん中を荒らし回っていた。
line = "５──１０──いや、視認できるだけでも２０を超えるモンスターの群れが、市街地のど真ん中を荒らし回っていた。"

[[dialogue]]
speaker = "unk"
# まるで百鬼夜行──あれほどの大群は、幾度となくモンスターに追い回されてきた俺でも見たことがない。
line = "まるで百鬼夜行──あれほどの大群は、幾度となくモンスターに追い回されてきた俺でも見たことがない。"

[[dialogue]]
speaker = "クロト"
# 「……っ！」
line = "「……っ！」"

[[dialogue]]
speaker = "unk"
# それを認識した瞬間、体がすくむのがわかった。幼い頃の自分が、あの中で泣いている姿を幻視してしまう。
line = "それを認識した瞬間、体がすくむのがわかった。幼い頃の自分が、あの中で泣いている姿を幻視してしまう。"

[[dialogue]]
speaker = "unk"
# だけど、今の俺は無力な子どもじゃない。
line = "だけど、今の俺は無力な子どもじゃない。"

[[dialogue]]
speaker = "unk"
# この街を、世界を守る、星騎士なんだ──。
line = "この街を、世界を守る、星騎士なんだ──。"

[[dialogue]]
speaker = "ダークキングフワッチ"
# 「イイイイイ！！」
line = "「イイイイイ！！」"

[[dialogue]]
speaker = "ダークキングフワッチ"
# 「ウイイイイ──！！」
line = "「ウイイイイ──！！」"

[[dialogue]]
speaker = "クロト"
# 「（このサイズのモンスターは──トレーニングテストに換算すれば、一体一体がＳランク級……！）」
line = "「（このサイズのモンスターは──トレーニングテストに換算すれば、一体一体がＳランク級……！）」"

[[dialogue]]
speaker = "unk"
# ──以前、アナに興味本位で訊ねてみたことがある。
line = "──以前、アナに興味本位で訊ねてみたことがある。"

[[dialogue]]
speaker = "アナ"
# 『──Ｓランクを越える設定？』
line = "『──Ｓランクを越える設定？』"

[[dialogue]]
speaker = "アナ"
# 『このトレーニングにはセーフティシステムがついてるから、実際にはありえないと思いますが』
line = "『このトレーニングにはセーフティシステムがついてるから、実際にはありえないと思いますが』"

[[dialogue]]
speaker = "アナ"
# 『そうですね。もし、Ｓランクのモンスターが同時に何十体も出てきたら──さすがの現会長でも危ういかもしれません』
line = "『そうですね。もし、Ｓランクのモンスターが同時に何十体も出てきたら──さすがの現会長でも危ういかもしれません』"

[[dialogue]]
speaker = "unk"
# あのアナでさえそう見立てを濁したほどの脅威。それが今、まさしく現実に顕現している。
line = "あのアナでさえそう見立てを濁したほどの脅威。それが今、まさしく現実に顕現している。"

[[dialogue]]
speaker = "unk"
# そんな相手に俺が単騎で挑んだら──たとえ体力全快だとしても、確実に死ぬ。
line = "そんな相手に俺が単騎で挑んだら──たとえ体力全快だとしても、確実に死ぬ。"

[[dialogue]]
speaker = "クロト"
# 「……っ」
line = "「……っ」"

[[dialogue]]
speaker = "unk"
# 呼吸が苦しい。
line = "呼吸が苦しい。"

[[dialogue]]
speaker = "unk"
# 今にも足が止まってしまいそうだ。
line = "今にも足が止まってしまいそうだ。"

[[dialogue]]
speaker = "unk"
# ああ、くそ。強くなったと思ったのに……
line = "ああ、くそ。強くなったと思ったのに……"

[[dialogue]]
speaker = "unk"
# あれから血反吐を吐く思いで努力してきたつもりだったのに……
line = "あれから血反吐を吐く思いで努力してきたつもりだったのに……"

[[dialogue]]
speaker = "unk"
# 俺は未だに、あの日見た星の輝きに追いつけないでいる──
line = "俺は未だに、あの日見た星の輝きに追いつけないでいる──"

[[dialogue]]
speaker = "逃げてくる女性Ｂ"
# 「あ──あなた、新星学園の生徒さん！？　お願い、助けて……！」
line = "「あ──あなた、新星学園の生徒さん！？　お願い、助けて……！」"

[[dialogue]]
speaker = "逃げてくる女性Ｃ"
# 「私からもお願いします──あのままじゃ、街も人もメチャクチャに……！」
line = "「私からもお願いします──あのままじゃ、街も人もメチャクチャに……！」"

[[dialogue]]
speaker = "クロト"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "unk"
# だがその時。声をかけられ、再び足に力が戻る。
line = "だがその時。声をかけられ、再び足に力が戻る。"

[[dialogue]]
speaker = "クロト"
# 「もちろんです──モンスターには近づかないようしてください！」
line = "「もちろんです──モンスターには近づかないようしてください！」"

[[dialogue]]
speaker = "unk"
# そうだ。助けるんだ。戦う力を持たない人たちを。
line = "そうだ。助けるんだ。戦う力を持たない人たちを。"

[[dialogue]]
speaker = "unk"
# ここで、誰かのために戦えないやつは──緋宮クロトなんかじゃない！
line = "ここで、誰かのために戦えないやつは──緋宮クロトなんかじゃない！"

[[dialogue]]
speaker = "クロト"
# 「──来いモンスターども！　おまえ達の大好物はここにあるぞ！」
line = "「──来いモンスターども！　おまえ達の大好物はここにあるぞ！」"
