[[dialogue]]
speaker = "unk"
# 第２話,魔王軍結成！？,P
line = "第２話,魔王軍結成！？,P"

[[dialogue]]
speaker = "カティア"
# 「魔王には強力な軍勢が不可欠──というわけで人材をスカウトしましょう！」
line = "「魔王には強力な軍勢が不可欠──というわけで人材をスカウトしましょう！」"

[[dialogue]]
speaker = "カティア"
# 「もちろん一番のしもべはこのカティアですが、ゆくゆくは四天王とか七将軍とか作りたいですよね～♪　メンバーには心当たりがあって──」
line = "「もちろん一番のしもべはこのカティアですが、ゆくゆくは四天王とか七将軍とか作りたいですよね～♪　メンバーには心当たりがあって──」"

[[dialogue]]
speaker = "カティア"
# （あ、ほら、あそこ。マリーベル先輩です）
line = "（あ、ほら、あそこ。マリーベル先輩です）"

[[dialogue]]
speaker = "カティア"
# （ブラッディ・マリーですよ、ブラッディ・マリー！　異名が血まみれとか超かっこいいじゃないですか！）
line = "（ブラッディ・マリーですよ、ブラッディ・マリー！　異名が血まみれとか超かっこいいじゃないですか！）"

[[dialogue]]
speaker = "カティア"
# （それに変身したら黒くて赤くてワルカッコイイですし。悪の幹部みたいだと思いません？）
line = "（それに変身したら黒くて赤くてワルカッコイイですし。悪の幹部みたいだと思いません？）"

[[dialogue]]
speaker = "unk"
# 確かに悪そう……
line = "確かに悪そう……"

[[dialogue]]
speaker = "マリーベル"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "モネ"
# 「今日の仕事はー、返却された本を書架に戻してー、修理する本を集めてー……あとは図書館だよりを……」
line = "「今日の仕事はー、返却された本を書架に戻してー、修理する本を集めてー……あとは図書館だよりを……」"

[[dialogue]]
speaker = "カティア"
# （じっと見てるのはモネ先輩……ですかね？　図書委員に何か用があるんでしょうか？）
line = "（じっと見てるのはモネ先輩……ですかね？　図書委員に何か用があるんでしょうか？）"

[[dialogue]]
speaker = "マリーベル"
# 「………………」
line = "「………………」"

[[dialogue]]
speaker = "カティア"
# （あの鋭い視線……う～ん、怪しすぎます。まさかマリーベル先輩はモネ先輩に何かするつもりじゃ……！？）
line = "（あの鋭い視線……う～ん、怪しすぎます。まさかマリーベル先輩はモネ先輩に何かするつもりじゃ……！？）"

[[dialogue]]
speaker = "モネ"
# 「修理する本はこれと、これと、これと……」
line = "「修理する本はこれと、これと、これと……」"

[[dialogue]]
speaker = "モネ"
# 「よっこいしょっと。あ、思ったより重い──」
line = "「よっこいしょっと。あ、思ったより重い──」"

[[dialogue]]
speaker = "モネ"
# 「わわっ！？」
line = "「わわっ！？」"

[[dialogue]]
speaker = "マリーベル"
# 「何してるの。図書委員なんだからしっかりしなさい」
line = "「何してるの。図書委員なんだからしっかりしなさい」"

[[dialogue]]
speaker = "モネ"
# 「ひゃっ！？」
line = "「ひゃっ！？」"

[[dialogue]]
speaker = "unk"
# （モネを助けた！？）
line = "（モネを助けた！？）"

[[dialogue]]
speaker = "モネ"
# 「あ、あ、あ、ありがとうございますす……」
line = "「あ、あ、あ、ありがとうございますす……」"

[[dialogue]]
speaker = "マリーベル"
# 「たまたまよ。私が人を助けるわけないでしょ」
line = "「たまたまよ。私が人を助けるわけないでしょ」"

[[dialogue]]
speaker = "カティア"
# （え～～っ、たまたまじゃなくて思いっきり見てたじゃないですか～っ）
line = "（え～～っ、たまたまじゃなくて思いっきり見てたじゃないですか～っ）"

[[dialogue]]
speaker = "マリーベル"
# 「この本、カウンターまで持っていけばいいの？」
line = "「この本、カウンターまで持っていけばいいの？」"

[[dialogue]]
speaker = "モネ"
# 「いえ、そこまでしてもらうわけには……」
line = "「いえ、そこまでしてもらうわけには……」"

[[dialogue]]
speaker = "マリーベル"
# 「図書館の本は生徒の共有財産だから。あなたが本を台無しにしてウィステリアさんに怒られようと構わないけど、いち生徒として被害を被るのはごめんよ」
line = "「図書館の本は生徒の共有財産だから。あなたが本を台無しにしてウィステリアさんに怒られようと構わないけど、いち生徒として被害を被るのはごめんよ」"

[[dialogue]]
speaker = "モネ"
# 「じゃ、じゃあお願いします……」
line = "「じゃ、じゃあお願いします……」"

[[dialogue]]
speaker = "マリーベル"
# 「ふぅ。これで終わりでいいのよね？」
line = "「ふぅ。これで終わりでいいのよね？」"

[[dialogue]]
speaker = "モネ"
# 「ひゃ、ひゃいっ、ありがとうございましたっ」
line = "「ひゃ、ひゃいっ、ありがとうございましたっ」"

[[dialogue]]
speaker = "マリーベル"
# 「助けたわけじゃないって言ってるでしょ。じゃ、私行くから」
line = "「助けたわけじゃないって言ってるでしょ。じゃ、私行くから」"

[[dialogue]]
speaker = "マリーベル"
# 「で……カティアさんは私に何か用？」
line = "「で……カティアさんは私に何か用？」"

[[dialogue]]
speaker = "カティア"
# 「わっ、見つかった！？」
line = "「わっ、見つかった！？」"

[[dialogue]]
speaker = "マリーベル"
# 「カティアさんの声がひそひそ聞こえてきてたわよ。図書館は静かだから」
line = "「カティアさんの声がひそひそ聞こえてきてたわよ。図書館は静かだから」"

[[dialogue]]
speaker = "unk"
# カティアはマリーベルと知り合い？
line = "カティアはマリーベルと知り合い？"

[[dialogue]]
speaker = "カティア"
# 「はい。私、校門前の花壇のお世話してるじゃないですか。マリーベル先輩が時々手伝ってくれるんですよ」
line = "「はい。私、校門前の花壇のお世話してるじゃないですか。マリーベル先輩が時々手伝ってくれるんですよ」"

[[dialogue]]
speaker = "カティア"
# 「うーん、このスコップもう限界かな……でもお小遣いがピンチ……」
line = "「うーん、このスコップもう限界かな……でもお小遣いがピンチ……」"

[[dialogue]]
speaker = "マリーベル"
# 「これあげる」
line = "「これあげる」"

[[dialogue]]
speaker = "カティア"
# 「いいんですか？」
line = "「いいんですか？」"

[[dialogue]]
speaker = "マリーベル"
# 「間違えて家から持ってきてしまったの。実家では庭の手入れをしてたけど、こっちでは使わないから」
line = "「間違えて家から持ってきてしまったの。実家では庭の手入れをしてたけど、こっちでは使わないから」"

[[dialogue]]
speaker = "カティア"
# 「って、ことがありまして」
line = "「って、ことがありまして」"

[[dialogue]]
speaker = "unk"
# （マリーベルって実は優しい……？）
line = "（マリーベルって実は優しい……？）"

[[dialogue]]
speaker = "マリーベル"
# 「ガーデニングはイギリス人の嗜みみたいなものだから。まぁ、気が向いた時だけだけど」
line = "「ガーデニングはイギリス人の嗜みみたいなものだから。まぁ、気が向いた時だけだけど」"

[[dialogue]]
speaker = "カティア"
# 「またまた～。こまめに様子見てるの知ってますよ。お花好きなんですね♪」
line = "「またまた～。こまめに様子見てるの知ってますよ。お花好きなんですね♪」"

[[dialogue]]
speaker = "マリーベル"
# 「……そういうのはいいから。用件は何？　会長さんと花の話をしに来たわけじゃないでしょう」
line = "「……そういうのはいいから。用件は何？　会長さんと花の話をしに来たわけじゃないでしょう」"

[[dialogue]]
speaker = "カティア"
# 「はい！　実はマリーベル先輩を魔王軍にスカウトしたいと思いまして！」
line = "「はい！　実はマリーベル先輩を魔王軍にスカウトしたいと思いまして！」"

[[dialogue]]
speaker = "マリーベル"
# 「……は？」
line = "「……は？」"

[[dialogue]]
speaker = "カティア"
# 「世界征服のために、魔王様にふさわしい、強くて悪い部下を集めてるんですよ。さぁ、マリーベル先輩も魔王様のもとで充実した世界征服ライフを送りませんか？」
line = "「世界征服のために、魔王様にふさわしい、強くて悪い部下を集めてるんですよ。さぁ、マリーベル先輩も魔王様のもとで充実した世界征服ライフを送りませんか？」"

[[dialogue]]
speaker = "マリーベル"
# 「魔王にも世界征服にも興味ないから他を当たってちょうだい。それに私なんか部下にしても不幸になるだけよ」
line = "「魔王にも世界征服にも興味ないから他を当たってちょうだい。それに私なんか部下にしても不幸になるだけよ」"

[[dialogue]]
speaker = "カティア"
# 「きっぱり断られた！？」
line = "「きっぱり断られた！？」"

[[dialogue]]
speaker = "カティア"
# 「ごめんなさい、魔王様。お役に立てませんでした……」
line = "「ごめんなさい、魔王様。お役に立てませんでした……」"

[[dialogue]]
speaker = "unk"
# よしよし、大丈夫だよ
line = "よしよし、大丈夫だよ"

[[dialogue]]
speaker = "カティア"
# 「わふ～。魔王様はお優しいです～」
line = "「わふ～。魔王様はお優しいです～」"

[[dialogue]]
speaker = "マリーベル"
# 「カティアさん、何かに似てると思っていたけど……あれね」
line = "「カティアさん、何かに似てると思っていたけど……あれね」"

[[dialogue]]
speaker = "カティア"
# 「あれ？」
line = "「あれ？」"

[[dialogue]]
speaker = "マリーベル"
# 「カティアさんを見てると、昔家で飼ってた犬を思い出すわ。元気で甘えん坊で……手のかかる子だけどかわいかった」
line = "「カティアさんを見てると、昔家で飼ってた犬を思い出すわ。元気で甘えん坊で……手のかかる子だけどかわいかった」"

[[dialogue]]
speaker = "カティア"
# 「えええ～～～～っ！？　私犬扱いですかーっ！？」
line = "「えええ～～～～っ！？　私犬扱いですかーっ！？」"
