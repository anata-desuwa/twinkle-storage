[[dialogue]]
speaker = "unk"
# 第1話,口説き魔メイド,P
line = "第1話,口説き魔メイド,P"

[[dialogue]]
speaker = "unk"
# 流星学園星徒会長であるフィオナに渡す書類があり、出向いていた時のこと。
line = "流星学園星徒会長であるフィオナに渡す書類があり、出向いていた時のこと。"

[[dialogue]]
speaker = "フィオナ"
# 「緋宮会長。わざわざ星徒会室まで足を運んでいただいて、ありがとうございます」
line = "「緋宮会長。わざわざ星徒会室まで足を運んでいただいて、ありがとうございます」"

[[dialogue]]
speaker = "フィオナ"
# 「そうだ、せっかくいらっしゃったんですし、少しお茶でも――」
line = "「そうだ、せっかくいらっしゃったんですし、少しお茶でも――」"

[[dialogue]]
speaker = "？？？"
# 「フィオナお嬢様、ご来客のところ失礼致します。お茶とお菓子をお持ちしました」
line = "「フィオナお嬢様、ご来客のところ失礼致します。お茶とお菓子をお持ちしました」"

[[dialogue]]
speaker = "フィオナ"
# 「マリオンさん！　ありがとうございます。ちょうどお茶を用意しようと思っていたところで……ひょっとして、それを見越して準備を？」
line = "「マリオンさん！　ありがとうございます。ちょうどお茶を用意しようと思っていたところで……ひょっとして、それを見越して準備を？」"

[[dialogue]]
speaker = "マリオン"
# 「ええ。お嬢様でしたらきっと、新星の会長様をもてなすだろうと思いましたので。僭越ながら、先んじて用意させていただきました」
line = "「ええ。お嬢様でしたらきっと、新星の会長様をもてなすだろうと思いましたので。僭越ながら、先んじて用意させていただきました」"

[[dialogue]]
speaker = "フィオナ"
# 「さすがマリオンさんですね。いつも素晴らしい気配りで、助かります」
line = "「さすがマリオンさんですね。いつも素晴らしい気配りで、助かります」"

[[dialogue]]
speaker = "マリオン"
# 「お褒め頂き光栄です。ああ、それにしてもフィオナお嬢様、今日も実にお可愛らしいですこと♪」
line = "「お褒め頂き光栄です。ああ、それにしてもフィオナお嬢様、今日も実にお可愛らしいですこと♪」"

[[dialogue]]
speaker = "マリオン"
# 「手の甲に失礼致しますね……ちゅっ<emoji=heart04>」
line = "「手の甲に失礼致しますね……ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "フィオナ"
# 「ひゃっ！？　ま、マリオンさん！　緋宮会長が見ている前でそんな……口づけなんて……っ」
line = "「ひゃっ！？　ま、マリオンさん！　緋宮会長が見ている前でそんな……口づけなんて……っ」"

[[dialogue]]
speaker = "マリオン"
# 「申し訳ありません。<ruby=わたくし>私</ruby>の悪い癖です。お嬢様を前にするとつい、愛おしい気持ちを抑えられなくなってしまい……お許し下さいませ」
line = "「申し訳ありません。<ruby>私<rt>わたくし</rt></ruby>の悪い癖です。お嬢様を前にするとつい、愛おしい気持ちを抑えられなくなってしまい……お許し下さいませ」"

[[dialogue]]
speaker = "マリオン"
# 「ああ、でも……ふふっ……<emoji=heart04>　こうして手の甲に口づけさせていただく度、変わらず照れた反応をして下さるお嬢様は、また実にお可愛らしく……<emoji=heart04>」
line = "「ああ、でも……ふふっ……<emoji=heart04>　こうして手の甲に口づけさせていただく度、変わらず照れた反応をして下さるお嬢様は、また実にお可愛らしく……<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
# 「――おっと……いけませんね。新星の会長様をお待たせしてしまいました」
line = "「――おっと……いけませんね。新星の会長様をお待たせしてしまいました」"

[[dialogue]]
speaker = "マリオン"
# 「大変失礼致しました、会長様。私は星見家メイド隊所属、マリオン・ネイマールと申します」
line = "「大変失礼致しました、会長様。私は星見家メイド隊所属、マリオン・ネイマールと申します」"

[[dialogue]]
speaker = "マリオン"
# 「流星学園では、メイドとして様々な雑務を担当させていただいております。以後、どうぞお見知りおきを」
line = "「流星学園では、メイドとして様々な雑務を担当させていただいております。以後、どうぞお見知りおきを」"

[[dialogue]]
speaker = "フィオナ"
# 「雑務担当とは言っても、マリオンさんは本当に処理能力がすごくて、１人で全ての雑務を回せてしまう程なんですよ」
line = "「雑務担当とは言っても、マリオンさんは本当に処理能力がすごくて、１人で全ての雑務を回せてしまう程なんですよ」"

[[dialogue]]
speaker = "フィオナ"
# 「流星学園がいつも綺麗に、快適に保たれているのは、マリオンさんが管理してくれているおかげと言っても、過言ではありません」
line = "「流星学園がいつも綺麗に、快適に保たれているのは、マリオンさんが管理してくれているおかげと言っても、過言ではありません」"

[[dialogue]]
speaker = "マリオン"
# 「ふふっ、そこまで褒めていただけて、光栄の極みです、お嬢様」
line = "「ふふっ、そこまで褒めていただけて、光栄の極みです、お嬢様」"

[[dialogue]]
speaker = "unk"
# すごいメイドさんなんですね
line = "すごいメイドさんなんですね"

[[dialogue]]
speaker = "マリオン"
# 「いえいえ、私は皆さまのお世話をできるメイドの仕事が好きでやっているだけですので」
line = "「いえいえ、私は皆さまのお世話をできるメイドの仕事が好きでやっているだけですので」"

[[dialogue]]
speaker = "マリオン"
# 「すごいというのなら、私よりも新星の会長様の方が、もっとすごいと思いますよ？　入学早々にあの九浄ヴィーナス様に勝って、星徒会長になられて……」
line = "「すごいというのなら、私よりも新星の会長様の方が、もっとすごいと思いますよ？　入学早々にあの九浄ヴィーナス様に勝って、星徒会長になられて……」"

[[dialogue]]
speaker = "マリオン"
# 「私も実は、あの御前試合を拝見させていただいてたんです。戦う会長様の雄姿は実に凛々しく……同時に、何度倒されても立ち上がる様子は健気でもあり――」
line = "「私も実は、あの御前試合を拝見させていただいてたんです。戦う会長様の雄姿は実に凛々しく……同時に、何度倒されても立ち上がる様子は健気でもあり――」"

[[dialogue]]
speaker = "マリオン"
# 「普段の純朴でお可愛らしい容姿とのギャップに、私、思わず胸がキュンとトキめいてしまいました……<emoji=heart04>」
line = "「普段の純朴でお可愛らしい容姿とのギャップに、私、思わず胸がキュンとトキめいてしまいました……<emoji=heart04>」"

[[dialogue]]
speaker = "フィオナ"
# 「え？　ま、マリオンさん……？」
line = "「え？　ま、マリオンさん……？」"

[[dialogue]]
speaker = "マリオン"
# 「そう、これはきっと運命だったのです。ここで出会ったのも見えない赤い糸に導かれてのことに違いありません。ですから――」
line = "「そう、これはきっと運命だったのです。ここで出会ったのも見えない赤い糸に導かれてのことに違いありません。ですから――」"

[[dialogue]]
speaker = "マリオン"
# 「会長様、これから是非、私とも仲良くして下さいましね……ちゅっ<emoji=heart04>」
line = "「会長様、これから是非、私とも仲良くして下さいましね……ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ファッ！？
line = "ファッ！？"

[[dialogue]]
speaker = "フィオナ"
# 「緋宮会長の手にも口づけを……！？　まさか、あのマリオンさんが――」
line = "「緋宮会長の手にも口づけを……！？　まさか、あのマリオンさんが――」"

[[dialogue]]
speaker = "フィオナ"
# 「女の人以外を口説くなんて……！　初めて見ました！」
line = "「女の人以外を口説くなんて……！　初めて見ました！」"

[[dialogue]]
speaker = "unk"
# いつもそんなことしてるの、この人！？
line = "いつもそんなことしてるの、この人！？"

[[dialogue]]
speaker = "フィオナ"
# 「マリオンさんは先程も言った通り、メイドとしてすごく有能な方なのですが……可愛い子には目がないというか……その……」
line = "「マリオンさんは先程も言った通り、メイドとしてすごく有能な方なのですが……可愛い子には目がないというか……その……」"

[[dialogue]]
speaker = "フィオナ"
# 「ちょっと、肉食系と言いますか……」
line = "「ちょっと、肉食系と言いますか……」"

[[dialogue]]
speaker = "マリオン"
# 「まあまあ、うふふ♪　私に気を遣って言葉を選ぶお嬢様も、お可愛らしいですこと<emoji=heart04>」
line = "「まあまあ、うふふ♪　私に気を遣って言葉を選ぶお嬢様も、お可愛らしいですこと<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
# 「私は可愛い女の子を目の前にするとつい、お声をかけたくなってしまうのです。悪癖でお恥ずかしい限りですが……」
line = "「私は可愛い女の子を目の前にするとつい、お声をかけたくなってしまうのです。悪癖でお恥ずかしい限りですが……」"

[[dialogue]]
speaker = "unk"
# でも、どうして男の俺に……
line = "でも、どうして男の俺に……"

[[dialogue]]
speaker = "マリオン"
# 「ふふっ<emoji=heart04>　実は私、そろそろ結婚や子育てをしてみたいと考えておりまして……」
line = "「ふふっ<emoji=heart04>　実は私、そろそろ結婚や子育てをしてみたいと考えておりまして……」"

[[dialogue]]
speaker = "フィオナ"
# 「け、結婚！？」
line = "「け、結婚！？」"

[[dialogue]]
speaker = "unk"
# 子育て！？
line = "子育て！？"

[[dialogue]]
speaker = "マリオン"
# 「はい。それで、好みのお可愛いらしい男の子を探していたところだったのです<emoji=heart04>」
line = "「はい。それで、好みのお可愛いらしい男の子を探していたところだったのです<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
# 「――おや？　会長様、可愛いと言われて戸惑った顔をされていらっしゃいますね」
line = "「――おや？　会長様、可愛いと言われて戸惑った顔をされていらっしゃいますね」"

[[dialogue]]
speaker = "マリオン"
# 「嘘ではありませんよ。会長様のお顔立ちは中性的でお可愛らしく……実に私好みですので<emoji=heart04>」
line = "「嘘ではありませんよ。会長様のお顔立ちは中性的でお可愛らしく……実に私好みですので<emoji=heart04>」"

[[dialogue]]
speaker = "フィオナ"
# 「中性的で可愛い顔……ちょっとわかる気がします」
line = "「中性的で可愛い顔……ちょっとわかる気がします」"

[[dialogue]]
speaker = "unk"
# フィオナさん！？
line = "フィオナさん！？"

[[dialogue]]
speaker = "マリオン"
# 「それに、御前試合で拝見した通り、心も体も強くていらっしゃいます」
line = "「それに、御前試合で拝見した通り、心も体も強くていらっしゃいます」"

[[dialogue]]
speaker = "マリオン"
# 「男らしく強いのに、お可愛い……そんな会長様はまさに、私が探していた男の子像にピッタリというわけです」
line = "「男らしく強いのに、お可愛い……そんな会長様はまさに、私が探していた男の子像にピッタリというわけです」"

[[dialogue]]
speaker = "マリオン"
# 「というわけで、これから是非、よろしくお願い致しますね。会長様♪」
line = "「というわけで、これから是非、よろしくお願い致しますね。会長様♪」"

[[dialogue]]
speaker = "マリオン"
# 「公私共に……ふふっ<emoji=heart04>」
line = "「公私共に……ふふっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# マリオンさんの浮かべた大人の色っぽい笑みに、思わずドキッとしてしまう俺なのだった――
line = "マリオンさんの浮かべた大人の色っぽい笑みに、思わずドキッとしてしまう俺なのだった――"
