[[dialogue]]
speaker = "unk"
# 一夜明けて朝、外に出るとせつなが修行していた。
line = "一夜明けて朝、外に出るとせつなが修行していた。"

[[dialogue]]
speaker = "せつな"
# 「せいっ！　たぁっ！　とおっ！」
line = "「せいっ！　たぁっ！　とおっ！」"

[[dialogue]]
speaker = "シズル"
# 「甘い甘い、その程度じゃ全然届きませんよ～」
line = "「甘い甘い、その程度じゃ全然届きませんよ～」"

[[dialogue]]
speaker = "せつな"
# 「喰らえ！　風花手裏剣！」
line = "「喰らえ！　風花手裏剣！」"

[[dialogue]]
speaker = "シズル"
# 「おっと、危ないです。それを正面から受け止めるのは無理ですね」
line = "「おっと、危ないです。それを正面から受け止めるのは無理ですね」"

[[dialogue]]
speaker = "ウズメイア"
# 「華麗に全部受け流してるし……さすがおししょー様でござる」
line = "「華麗に全部受け流してるし……さすがおししょー様でござる」"

[[dialogue]]
speaker = "ヨミ"
# 「……その、ござるって言うのそろそろやめません？」
line = "「……その、ござるって言うのそろそろやめません？」"

[[dialogue]]
speaker = "ウズメイア"
# 「やっぱあたしには合わないかなぁ？」
line = "「やっぱあたしには合わないかなぁ？」"

[[dialogue]]
speaker = "ヨミ"
# 「そう思います」
line = "「そう思います」"

[[dialogue]]
speaker = "ウズメイア"
# 「わかった。じゃあやめる～！　修行する時はござるに戻すけど、それ以外は普通にしゃべることにするよ」
line = "「わかった。じゃあやめる～！　修行する時はござるに戻すけど、それ以外は普通にしゃべることにするよ」"

[[dialogue]]
speaker = "ウズメイア"
# 「ニンジャコトバ、憧れだったんだけどな～」
line = "「ニンジャコトバ、憧れだったんだけどな～」"

[[dialogue]]
speaker = "せつな"
# 「はぁっ、はぁっ、はぁっ……さすが師匠！　立ち会ってみるとわかる、圧倒的な力の差でござる」
line = "「はぁっ、はぁっ、はぁっ……さすが師匠！　立ち会ってみるとわかる、圧倒的な力の差でござる」"

[[dialogue]]
speaker = "シズル"
# 「せつなもなかなかですよ。ずっと修行に励んでいた、という言葉に嘘はないようですね」
line = "「せつなもなかなかですよ。ずっと修行に励んでいた、という言葉に嘘はないようですね」"

[[dialogue]]
speaker = "せつな"
# 「嬉しい言葉でござるが、師匠を一歩でも動かしてから言われたいでござる！」
line = "「嬉しい言葉でござるが、師匠を一歩でも動かしてから言われたいでござる！」"

[[dialogue]]
speaker = "unk"
# その場から一歩も動いてない
line = "その場から一歩も動いてない"

[[dialogue]]
speaker = "unk"
# 言われてみれば
line = "言われてみれば"

[[dialogue]]
speaker = "ヨミ"
# 「動く必要もない、ということでしょうか……」
line = "「動く必要もない、ということでしょうか……」"

[[dialogue]]
speaker = "ウズメイア"
# 「なんとしてでも動かしてみたいかも」
line = "「なんとしてでも動かしてみたいかも」"

[[dialogue]]
speaker = "ヨミ"
# 「……やります？」
line = "「……やります？」"

[[dialogue]]
speaker = "ウズメイア"
# 「よし、やっちゃおう！　おししょー様、お覚悟でござる～！！」
line = "「よし、やっちゃおう！　おししょー様、お覚悟でござる～！！」"

[[dialogue]]
speaker = "せつな"
# 「ウズメ殿！？　みんなも参加するでござるか？」
line = "「ウズメ殿！？　みんなも参加するでござるか？」"

[[dialogue]]
speaker = "シズル"
# 「ふふっ、いいでしょう。全員まとめてかかってきなさい」
line = "「ふふっ、いいでしょう。全員まとめてかかってきなさい」"

[[dialogue]]
speaker = "シズル"
# 「私を一歩でも動かすことができたら、食後のデザートを出してあげますね」
line = "「私を一歩でも動かすことができたら、食後のデザートを出してあげますね」"

[[dialogue]]
speaker = "せつな"
# 「４人でかかっても完敗でござる～～」
line = "「４人でかかっても完敗でござる～～」"

[[dialogue]]
speaker = "ウズメイア"
# 「はぁっ、はぁっ……強すぎっしょ……」
line = "「はぁっ、はぁっ……強すぎっしょ……」"

[[dialogue]]
speaker = "ヨミ"
# 「まさかここまでとは思いませんでした……」
line = "「まさかここまでとは思いませんでした……」"

[[dialogue]]
speaker = "シズル"
# 「まだまだ若い子には負けませんよ。もっと修行を積んで強くなって、私に楽をさせて下さいね」
line = "「まだまだ若い子には負けませんよ。もっと修行を積んで強くなって、私に楽をさせて下さいね」"

[[dialogue]]
speaker = "せつな"
# 「ぐぬぬ、もっともっと頑張るでござる……」
line = "「ぐぬぬ、もっともっと頑張るでござる……」"

[[dialogue]]
speaker = "シズル"
# 「そうそう、傷ができたでしょう？　秘薬を塗ってあげます♪」
line = "「そうそう、傷ができたでしょう？　秘薬を塗ってあげます♪」"

[[dialogue]]
speaker = "せつな"
# 「え、それは遠慮するでござる」
line = "「え、それは遠慮するでござる」"

[[dialogue]]
speaker = "シズル"
# 「薬を塗らないと強くなれませんよ。それとも、飲み薬の方がいいですか？」
line = "「薬を塗らないと強くなれませんよ。それとも、飲み薬の方がいいですか？」"

[[dialogue]]
speaker = "せつな"
# 「飲み薬！　それなら大歓迎でござるよ～！」
line = "「飲み薬！　それなら大歓迎でござるよ～！」"

[[dialogue]]
speaker = "ウズメイア"
# 「なになに～、もしかしてめっちゃおいしい薬だったりとか？」
line = "「なになに～、もしかしてめっちゃおいしい薬だったりとか？」"

[[dialogue]]
speaker = "せつな"
# 「子どもでも飲みやすくした、あま～いお薬でござる。怪我もないのに欲しがる子が続出でござったな～」
line = "「子どもでも飲みやすくした、あま～いお薬でござる。怪我もないのに欲しがる子が続出でござったな～」"

[[dialogue]]
speaker = "シズル"
# 「懐かしいですね。はい、どうぞ、飲み薬ですよ♪」
line = "「懐かしいですね。はい、どうぞ、飲み薬ですよ♪」"

[[dialogue]]
speaker = "せつな"
# 「わあ～～い♪　いっただっきまぁ～～す！」
line = "「わあ～～い♪　いっただっきまぁ～～す！」"

[[dialogue]]
speaker = "せつな"
# 「みぎゃっ！　にがぁぁ～～～～～っ！！　師匠っ、話が違うでござるよ～～！」
line = "「みぎゃっ！　にがぁぁ～～～～～っ！！　師匠っ、話が違うでござるよ～～！」"

[[dialogue]]
speaker = "シズル"
# 「あれから反省したんです、おいしい秘薬というのはよくないなって。なので子どもが必要以上に飲みたがらないように、めっちゃにが薬に改善したんですよ♪」
line = "「あれから反省したんです、おいしい秘薬というのはよくないなって。なので子どもが必要以上に飲みたがらないように、めっちゃにが薬に改善したんですよ♪」"

[[dialogue]]
speaker = "せつな"
# 「こんなの改悪でござる～～～！！」
line = "「こんなの改悪でござる～～～！！」"

[[dialogue]]
speaker = "シズル"
# 「効能はアップしてるんですよ。なんと効き目は塗り薬以上ですっ♪」
line = "「効能はアップしてるんですよ。なんと効き目は塗り薬以上ですっ♪」"

[[dialogue]]
speaker = "シズル"
# 「ところでせつな、まだ１口しか飲んでませんよ？　ちゃんと全部飲まないと」
line = "「ところでせつな、まだ１口しか飲んでませんよ？　ちゃんと全部飲まないと」"

[[dialogue]]
speaker = "せつな"
# 「失礼！　ドロンするでござる！」
line = "「失礼！　ドロンするでござる！」"

[[dialogue]]
speaker = "シズル"
# 「逃がしませんよ～！」
line = "「逃がしませんよ～！」"

[[dialogue]]
speaker = "せつな"
# 「にゃっ！？　師匠っ、いつのまに！？」
line = "「にゃっ！？　師匠っ、いつのまに！？」"

[[dialogue]]
speaker = "シズル"
# 「たった今です♪」
line = "「たった今です♪」"

[[dialogue]]
speaker = "せつな"
# 「めちゃにが薬は勘弁して欲しいでござるぅ～～～～っ！！」
line = "「めちゃにが薬は勘弁して欲しいでござるぅ～～～～っ！！」"

[[dialogue]]
speaker = "シズル"
# 「もう、そこまで嫌がらなくてもいいのに。仕方ありませんね、普通のあま～い秘薬をあげましょう」
line = "「もう、そこまで嫌がらなくてもいいのに。仕方ありませんね、普通のあま～い秘薬をあげましょう」"

[[dialogue]]
speaker = "せつな"
# 「ほ、ほんとでござるか？　甘いと見せかけて、またにがにが薬じゃ……」
line = "「ほ、ほんとでござるか？　甘いと見せかけて、またにがにが薬じゃ……」"

[[dialogue]]
speaker = "シズル"
# 「ふふっ、用心深いのは忍として正しいです。ですが、かわいい弟子にそこまで疑われるのは、ちょっぴり寂しいですねぇ……」
line = "「ふふっ、用心深いのは忍として正しいです。ですが、かわいい弟子にそこまで疑われるのは、ちょっぴり寂しいですねぇ……」"

[[dialogue]]
speaker = "ヨミ"
# 「せつなさん……何だかシズルさんが可哀想になってきました……」
line = "「せつなさん……何だかシズルさんが可哀想になってきました……」"

[[dialogue]]
speaker = "ウズメイア"
# 「そうだよ、ござるちゃん！　大好きなおししょー様を疑っちゃダメだよ！」
line = "「そうだよ、ござるちゃん！　大好きなおししょー様を疑っちゃダメだよ！」"

[[dialogue]]
speaker = "せつな"
# 「わ、わかったでござる！　たとえこれがめっちゃ苦くても、飲み切ってみせるでござる！」
line = "「わ、わかったでござる！　たとえこれがめっちゃ苦くても、飲み切ってみせるでござる！」"

[[dialogue]]
speaker = "せつな"
# 「ごくっ、ごくっ、ごくっ……みゃ？」
line = "「ごくっ、ごくっ、ごくっ……みゃ？」"

[[dialogue]]
speaker = "せつな"
# 「あまぁ～～～～いっ！　うまっ！　めちゃうまでござるよ、師匠～！」
line = "「あまぁ～～～～いっ！　うまっ！　めちゃうまでござるよ、師匠～！」"

[[dialogue]]
speaker = "シズル"
# 「だから甘いと言ったじゃないですか。もう、私は嘘は言いませんよ」
line = "「だから甘いと言ったじゃないですか。もう、私は嘘は言いませんよ」"

[[dialogue]]
speaker = "せつな"
# 「……いや、それは無理があるでござる」
line = "「……いや、それは無理があるでござる」"

[[dialogue]]
speaker = "シズル"
# 「信じてくれないんですね。先ほども本気で逃げようとしてましたし……しょんぼりです」
line = "「信じてくれないんですね。先ほども本気で逃げようとしてましたし……しょんぼりです」"

[[dialogue]]
speaker = "せつな"
# 「あわわっ、ごめんなさいでござる～」
line = "「あわわっ、ごめんなさいでござる～」"

[[dialogue]]
speaker = "シズル"
# 「ふふっ、なんて冗談ですよ。この程度で落ち込む私じゃありませんから」
line = "「ふふっ、なんて冗談ですよ。この程度で落ち込む私じゃありませんから」"
