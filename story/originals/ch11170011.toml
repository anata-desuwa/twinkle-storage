[[dialogue]]
speaker = "unk"
# 第１話,抗えぬ誘惑,P
line = "第１話,抗えぬ誘惑,P"

[[dialogue]]
speaker = "unk"
# 先日の新星学園襲撃事件では、複数のコラプサーが一斉に捕縛された。
line = "先日の新星学園襲撃事件では、複数のコラプサーが一斉に捕縛された。"

[[dialogue]]
speaker = "unk"
# 彼女たちはネビュラ基地で拘束されることになり、俺はエンジュの元へと面会に向かった。
line = "彼女たちはネビュラ基地で拘束されることになり、俺はエンジュの元へと面会に向かった。"

[[dialogue]]
speaker = "リーリア"
# 「あっ、センパイ。私に会いに来てくれて、ありがとうございま～す☆」
line = "「あっ、センパイ。私に会いに来てくれて、ありがとうございま～す☆」"

[[dialogue]]
speaker = "リーリア"
# 「な～んて後輩の可愛らしい冗談はさておいて、エンジュさんですけど……バイタルには問題はないんですが、すごく頑なでして」
line = "「な～んて後輩の可愛らしい冗談はさておいて、エンジュさんですけど……バイタルには問題はないんですが、すごく頑なでして」"

[[dialogue]]
speaker = "リーリア"
# 「こちらが出した食事には一切手を付けてくれないんですよ～。『ネビュラは捕虜にご飯も与えず、虐待してる～！』なんて噂が広まったら、困っちゃいます」
line = "「こちらが出した食事には一切手を付けてくれないんですよ～。『ネビュラは捕虜にご飯も与えず、虐待してる～！』なんて噂が広まったら、困っちゃいます」"

[[dialogue]]
speaker = "エンジュ"
# 「……魔王か」
line = "「……魔王か」"

[[dialogue]]
speaker = "リーリア"
# 「飲まず食わずでもう３日目……普通の人なら、もう限界のはずなんですけど……」
line = "「飲まず食わずでもう３日目……普通の人なら、もう限界のはずなんですけど……」"

[[dialogue]]
speaker = "エンジュ"
# 「敵に出された飯なんかに手をつけられるものか。自白剤なんて入れられてたらたまったもんじゃないからな」
line = "「敵に出された飯なんかに手をつけられるものか。自白剤なんて入れられてたらたまったもんじゃないからな」"

[[dialogue]]
speaker = "unk"
# 食べ物を粗末にしたら、キサナが怒るよ
line = "食べ物を粗末にしたら、キサナが怒るよ"

[[dialogue]]
speaker = "unk"
# このままじゃ栄養失調で倒れるよ
line = "このままじゃ栄養失調で倒れるよ"

[[dialogue]]
speaker = "エンジュ"
# 「あたしの知ったことか。あたしがぶっ倒れて情報を得られなくて困るのはお前たちだ」
line = "「あたしの知ったことか。あたしがぶっ倒れて情報を得られなくて困るのはお前たちだ」"

[[dialogue]]
speaker = "リーリア"
# 「なんとかして食べさせてあげたいんですけど……センパイ、彼女が我慢できなくなるような大好物とかご存じないですか？　ないですよね～？」
line = "「なんとかして食べさせてあげたいんですけど……センパイ、彼女が我慢できなくなるような大好物とかご存じないですか？　ないですよね～？」"

[[dialogue]]
speaker = "メテオラ"
# 『あたしの友達がドーナツ大好きだからな！　チョーおいしいドーナツを買ってってあげようとしたんだぞ！』
line = "『あたしの友達がドーナツ大好きだからな！　チョーおいしいドーナツを買ってってあげようとしたんだぞ！』"

[[dialogue]]
speaker = "エンジュ"
# 『ドーナツはもういい！　いや、必ず美味しくいただくが、こいつを片づけた後だ！』
line = "『ドーナツはもういい！　いや、必ず美味しくいただくが、こいつを片づけた後だ！』"

[[dialogue]]
speaker = "unk"
# 今すぐ買ってくる！
line = "今すぐ買ってくる！"

[[dialogue]]
speaker = "unk"
# ドーナツだ！
line = "ドーナツだ！"

[[dialogue]]
speaker = "リーリア"
# 「えっ、知ってるんですか！？　是非お願いしま～す！」
line = "「えっ、知ってるんですか！？　是非お願いしま～す！」"

[[dialogue]]
speaker = "エンジュ"
# 「はっ、やり口がヌルいんだよ。無理やりにでもあたしの口を割らせたかったら、拷問にでもかけるんだな」
line = "「はっ、やり口がヌルいんだよ。無理やりにでもあたしの口を割らせたかったら、拷問にでもかけるんだな」"

[[dialogue]]
speaker = "リーリア"
# 「エンジュさん、差し入れですよ～。お好きだろうからって、センパイからです」
line = "「エンジュさん、差し入れですよ～。お好きだろうからって、センパイからです」"

[[dialogue]]
speaker = "エンジュ"
# 「ふん、何をチラつかされたところで、あたしは──くんくん……ん？　なんだ、この香ばしくて、甘～い匂い、まさか……！？」
line = "「ふん、何をチラつかされたところで、あたしは──くんくん……ん？　なんだ、この香ばしくて、甘～い匂い、まさか……！？」"

[[dialogue]]
speaker = "エンジュ"
# 「ドーナツだぁ……♪」
line = "「ドーナツだぁ……♪」"

[[dialogue]]
speaker = "エンジュ"
# 「なんで、あたしがドーナツ好きって──はっ！？　そうか、あの時、メテオラが余計なことを……！」
line = "「なんで、あたしがドーナツ好きって──はっ！？　そうか、あの時、メテオラが余計なことを……！」"

[[dialogue]]
speaker = "エンジュ"
# 「ふん、飢えたあたしにドーナツを与えて、口を割らせるって魂胆か……何も喋らないからな！」
line = "「ふん、飢えたあたしにドーナツを与えて、口を割らせるって魂胆か……何も喋らないからな！」"

[[dialogue]]
speaker = "unk"
# これはただの差し入れだから
line = "これはただの差し入れだから"

[[dialogue]]
speaker = "unk"
# 何も喋らなくていいよ
line = "何も喋らなくていいよ"

[[dialogue]]
speaker = "エンジュ"
# 「ほ、本当か……？　嘘じゃないだろうな……自白剤とか入れてないだろうな……！？」
line = "「ほ、本当か……？　嘘じゃないだろうな……自白剤とか入れてないだろうな……！？」"

[[dialogue]]
speaker = "リーリア"
# 「美味しいドーナツにそんなことしないですよね～。さ、エンジュさん、冷めちゃう前に召し上がれ」
line = "「美味しいドーナツにそんなことしないですよね～。さ、エンジュさん、冷めちゃう前に召し上がれ」"

[[dialogue]]
speaker = "エンジュ"
# 「じゃ、じゃあ、１個だけ……くんくん……ぺろっ……うん、怪しい匂いも味もしないな。どうやら、大丈夫なようだが……あむっ」
line = "「じゃ、じゃあ、１個だけ……くんくん……ぺろっ……うん、怪しい匂いも味もしないな。どうやら、大丈夫なようだが……あむっ」"

[[dialogue]]
speaker = "エンジュ"
# 「んんんん～～～っ♪」
line = "「んんんん～～～っ♪」"

[[dialogue]]
speaker = "リーリア"
# 「美味しそうですね☆」
line = "「美味しそうですね☆」"

[[dialogue]]
speaker = "エンジュ"
# 「ふ、ふんっ、美味しいに決まってるだろ！　プロのドーナツ屋さんが作っているんだからな！」
line = "「ふ、ふんっ、美味しいに決まってるだろ！　プロのドーナツ屋さんが作っているんだからな！」"

[[dialogue]]
speaker = "エンジュ"
# 「あむ、あむ、もぐ、もぐ……んふーっ♪　あっ……もう、なくなっちゃった……」
line = "「あむ、あむ、もぐ、もぐ……んふーっ♪　あっ……もう、なくなっちゃった……」"

[[dialogue]]
speaker = "unk"
# 全部食べていいんだよ
line = "全部食べていいんだよ"

[[dialogue]]
speaker = "エンジュ"
# 「ぜ、全部……だと……！？　１０個も独り占めしていいのか……？　言ったな！？　絶対だからな！？　あむ、あむ、あむ！」
line = "「ぜ、全部……だと……！？　１０個も独り占めしていいのか……？　言ったな！？　絶対だからな！？　あむ、あむ、あむ！」"

[[dialogue]]
speaker = "エンジュ"
# 「これはチョコか。緑のはなんだ、抹茶？　そんなのもあるんだな。こっちには白いクリームが入ってる！　ふわふわだ～♪」
line = "「これはチョコか。緑のはなんだ、抹茶？　そんなのもあるんだな。こっちには白いクリームが入ってる！　ふわふわだ～♪」"

[[dialogue]]
speaker = "unk"
# エンジュは両手にそれぞれドーナツを掴み、飲まず食わずだった３日分のカロリーを取り戻すかのような勢いで食べ進めた。
line = "エンジュは両手にそれぞれドーナツを掴み、飲まず食わずだった３日分のカロリーを取り戻すかのような勢いで食べ進めた。"

[[dialogue]]
speaker = "エンジュ"
# 「なんだ、人が食ってるとこ見て、何が面白いんだ。あんまり見るな。やらないからな」
line = "「なんだ、人が食ってるとこ見て、何が面白いんだ。あんまり見るな。やらないからな」"

[[dialogue]]
speaker = "unk"
# はい、ホットミルク
line = "はい、ホットミルク"

[[dialogue]]
speaker = "unk"
# 誰も取らないから、ゆっくりお食べ
line = "誰も取らないから、ゆっくりお食べ"

[[dialogue]]
speaker = "エンジュ"
# 「ドーナツには温かいミルクが一番合うことまで知ってるだと……！？　くそっ、卑怯だぞ、そんなの抗えるはずが……！」
line = "「ドーナツには温かいミルクが一番合うことまで知ってるだと……！？　くそっ、卑怯だぞ、そんなの抗えるはずが……！」"

[[dialogue]]
speaker = "エンジュ"
# 「ぱくぱくぱく、んくんくんく……ぷはぁっ♪」
line = "「ぱくぱくぱく、んくんくんく……ぷはぁっ♪」"

[[dialogue]]
speaker = "リーリア"
# （ふふ、食べてる食べてる。危ないコラプサーも、こうしてるとかわいいんですけどね）
line = "（ふふ、食べてる食べてる。危ないコラプサーも、こうしてるとかわいいんですけどね）"

[[dialogue]]
speaker = "エンジュ"
# 「ふう、食った食った……それにしてもわからないな。あたしに施して、お前たちに何の得がある」
line = "「ふう、食った食った……それにしてもわからないな。あたしに施して、お前たちに何の得がある」"

[[dialogue]]
speaker = "エンジュ"
# 「与えられてばかりってのは気味が悪い。上手すぎる話には裏を疑うのが当然だろう」
line = "「与えられてばかりってのは気味が悪い。上手すぎる話には裏を疑うのが当然だろう」"

[[dialogue]]
speaker = "unk"
# 世の中、損得で動いてる人ばかりじゃないんだ
line = "世の中、損得で動いてる人ばかりじゃないんだ"

[[dialogue]]
speaker = "unk"
# エンジュが幸せになれたなら良かったよ
line = "エンジュが幸せになれたなら良かったよ"

[[dialogue]]
speaker = "エンジュ"
# 「ふん、偽善者たちめ。……あと、これはただの独り言だけど」
line = "「ふん、偽善者たちめ。……あと、これはただの独り言だけど」"

[[dialogue]]
speaker = "エンジュ"
# 「ドーナツ美味かったよ。生き返った気分だ……ありがとう」
line = "「ドーナツ美味かったよ。生き返った気分だ……ありがとう」"

[[dialogue]]
speaker = "unk"
# ──それから後。
line = "──それから後。"

[[dialogue]]
speaker = "リーリア"
# 「エンジュさん。あれからネビュラで出される食事も口にするようになりまして。態度もちょっぴり柔らかくなったんです。センパイのおかげ、ですねっ☆」
line = "「エンジュさん。あれからネビュラで出される食事も口にするようになりまして。態度もちょっぴり柔らかくなったんです。センパイのおかげ、ですねっ☆」"
