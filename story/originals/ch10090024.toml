[[dialogue]]
speaker = "unk"
# 第４話,女社長になっても,P
line = "第４話,女社長になっても,P"

[[dialogue]]
speaker = "セーラ"
# 「いや～。まさかセンパイから連絡をもらえるとは思わなかったよ～」
line = "「いや～。まさかセンパイから連絡をもらえるとは思わなかったよ～」"

[[dialogue]]
speaker = "セーラ"
# 「でも久しぶりに会えて嬉しかった♪　会長さんのことも紹介できたし♪」
line = "「でも久しぶりに会えて嬉しかった♪　会長さんのことも紹介できたし♪」"

[[dialogue]]
speaker = "unk"
# 流星学園の元星徒会長さんですっけ？
line = "流星学園の元星徒会長さんですっけ？"

[[dialogue]]
speaker = "セーラ"
# 「そーそー。今は女社長として働いてる、うちの憧れの人」
line = "「そーそー。今は女社長として働いてる、うちの憧れの人」"

[[dialogue]]
speaker = "セーラ"
# 「カジノで知り合った人にセンパイと付き合いのある人がいたらしくてさ。うちが女社長目指して色々と動いてること聞いたみたい」
line = "「カジノで知り合った人にセンパイと付き合いのある人がいたらしくてさ。うちが女社長目指して色々と動いてること聞いたみたい」"

[[dialogue]]
speaker = "セーラ"
# 「今までも何度か相談の電話はしてたんだけど、本気で社長目指すようになってからはあえて連絡しないようにしてたんだよね」
line = "「今までも何度か相談の電話はしてたんだけど、本気で社長目指すようになってからはあえて連絡しないようにしてたんだよね」"

[[dialogue]]
speaker = "セーラ"
# 「立派な社長になってから堂々と会いに行こうと思って。連絡しちゃうと頼り切りになっちゃいそうだったから」
line = "「立派な社長になってから堂々と会いに行こうと思って。連絡しちゃうと頼り切りになっちゃいそうだったから」"

[[dialogue]]
speaker = "unk"
# だから今日も世間話だけだったんですね
line = "だから今日も世間話だけだったんですね"

[[dialogue]]
speaker = "セーラ"
# 「いやいや、うちは隙あらば起業へのアドバイスを聞こうとしてたよ？　でもでもセンパイのノロケ話がとまんなかったじゃん！」
line = "「いやいや、うちは隙あらば起業へのアドバイスを聞こうとしてたよ？　でもでもセンパイのノロケ話がとまんなかったじゃん！」"

[[dialogue]]
speaker = "セーラ"
# 「ていうかセンパイが結婚してたとか初耳だったんですケド！　まずうちにゆえよ！　結婚式にも呼ばれてないよ！」
line = "「ていうかセンパイが結婚してたとか初耳だったんですケド！　まずうちにゆえよ！　結婚式にも呼ばれてないよ！」"

[[dialogue]]
speaker = "セーラ"
# 「会長時代は『あたしは生涯独身を貫くつもりよ』とかゆってたクセにさ。その割に旦那さんとは学生時代に出会ったとかゆーし」
line = "「会長時代は『あたしは生涯独身を貫くつもりよ』とかゆってたクセにさ。その割に旦那さんとは学生時代に出会ったとかゆーし」"

[[dialogue]]
speaker = "セーラ"
# 「ま……大方うちに結婚報告するの恥ずかしかったんだろうけど。結婚式も身内だけで終わらせたとみたね」
line = "「ま……大方うちに結婚報告するの恥ずかしかったんだろうけど。結婚式も身内だけで終わらせたとみたね」"

[[dialogue]]
speaker = "セーラ"
# 「だからきっと誰かにノロケ話を聞いてもらいたくてウズウズしてたんだよ。ものすっごいマシンガントークだったし♪」
line = "「だからきっと誰かにノロケ話を聞いてもらいたくてウズウズしてたんだよ。ものすっごいマシンガントークだったし♪」"

[[dialogue]]
speaker = "セーラ"
# 「あれはあれで楽しかったけどね♪　あんなに女の子してるセンパイ、初めてみたよ♪」
line = "「あれはあれで楽しかったけどね♪　あんなに女の子してるセンパイ、初めてみたよ♪」"

[[dialogue]]
speaker = "セーラ"
# 「やっぱし恋は人を変えるもんだね～。あのセンパイがまさかまさかの結婚とは～」
line = "「やっぱし恋は人を変えるもんだね～。あのセンパイがまさかまさかの結婚とは～」"

[[dialogue]]
speaker = "セーラ"
# 「だけど……うん。おかげでうちも……」
line = "「だけど……うん。おかげでうちも……」"

[[dialogue]]
speaker = "unk"
# どうしました？
line = "どうしました？"

[[dialogue]]
speaker = "セーラ"
# 「っっ。な、なんでもない。それより行こっ？　暗くなったら危ないし……！」
line = "「っっ。な、なんでもない。それより行こっ？　暗くなったら危ないし……！」"

[[dialogue]]
speaker = "セーラ"
# 「あ……そろそろ分かれ道だね。会長さんと歩いてると、道のりが短いなぁ……」
line = "「あ……そろそろ分かれ道だね。会長さんと歩いてると、道のりが短いなぁ……」"

[[dialogue]]
speaker = "セーラ"
# 「あれ。こんなところにお店できてたんだ？　見て見て、ウェディングドレスのオーダーメイドだって」
line = "「あれ。こんなところにお店できてたんだ？　見て見て、ウェディングドレスのオーダーメイドだって」"

[[dialogue]]
speaker = "セーラ"
# 「センパイもこういうの着たのかなぁ。そういえば結婚式の写真は見せてもらえなかったね？　ふふ、恥ずかしかったのかな？」
line = "「センパイもこういうの着たのかなぁ。そういえば結婚式の写真は見せてもらえなかったね？　ふふ、恥ずかしかったのかな？」"

[[dialogue]]
speaker = "セーラ"
# 「うちもいつかこんなドレスを……。ウェディングドレスを着てもいいんだよね……？」
line = "「うちもいつかこんなドレスを……。ウェディングドレスを着てもいいんだよね……？」"

[[dialogue]]
speaker = "セーラ"
# 「実はさ。センパイが結婚したって聞いて安心したんだ。女社長でも結婚しちゃってもいいもんなんだーって」
line = "「実はさ。センパイが結婚したって聞いて安心したんだ。女社長でも結婚しちゃってもいいもんなんだーって」"

[[dialogue]]
speaker = "セーラ"
# 「ほら社長さんって忙しいイメージあるじゃん？　会社を経営する以上、色々考えたり、動いたりしなくちゃいけないし」
line = "「ほら社長さんって忙しいイメージあるじゃん？　会社を経営する以上、色々考えたり、動いたりしなくちゃいけないし」"

[[dialogue]]
speaker = "セーラ"
# 「だからセンパイも生涯独身宣言してるのかなーって思ってたからさ。ま、勘違いだったみたいだけどね？」
line = "「だからセンパイも生涯独身宣言してるのかなーって思ってたからさ。ま、勘違いだったみたいだけどね？」"

[[dialogue]]
speaker = "セーラ"
# 「おかげで……うん。一番の悩みの種がなくなっちゃった。センパイの話を聞けて、やっぱり良かったかも……」
line = "「おかげで……うん。一番の悩みの種がなくなっちゃった。センパイの話を聞けて、やっぱり良かったかも……」"

[[dialogue]]
speaker = "セーラ"
# 「……ねえ会長さん。改めて聞くけど、さ……？」
line = "「……ねえ会長さん。改めて聞くけど、さ……？」"

[[dialogue]]
speaker = "セーラ"
# 「もしうちが社長になって、会長さんが新星学園卒業したら……パートナーにならない？」
line = "「もしうちが社長になって、会長さんが新星学園卒業したら……パートナーにならない？」"

[[dialogue]]
speaker = "セーラ"
# 「今度のパートナーっていうのは、仕事のって意味じゃなくて、その……」
line = "「今度のパートナーっていうのは、仕事のって意味じゃなくて、その……」"

[[dialogue]]
speaker = "セーラ"
# 「その……ね？」
line = "「その……ね？」"

[[dialogue]]
speaker = "セーラ"
# 「～～っっ。こ、答えは卒業までに聞かせてくれたらいいから……！　ちっとも急ぎじゃないし、まだ早すぎる話だし……！」
line = "「～～っっ。こ、答えは卒業までに聞かせてくれたらいいから……！　ちっとも急ぎじゃないし、まだ早すぎる話だし……！」"

[[dialogue]]
speaker = "セーラ"
# 「んじゃ今日はこれで！　付き合ってくれてありがと！　今日はこのまま１人で帰るから──」
line = "「んじゃ今日はこれで！　付き合ってくれてありがと！　今日はこのまま１人で帰るから──」"

[[dialogue]]
speaker = "セーラ"
# 「──ひゃっ！？」
line = "「──ひゃっ！？」"

[[dialogue]]
speaker = "セーラ"
# 「ど……どーしたの？　そんなに抱き締められたら帰れないよ……」
line = "「ど……どーしたの？　そんなに抱き締められたら帰れないよ……」"

[[dialogue]]
speaker = "unk"
# 俺もセーラさんのところに永久就職しますから
line = "俺もセーラさんのところに永久就職しますから"

[[dialogue]]
speaker = "セーラ"
# 「～～～っっ！？　は、恥ずかしいよ、こんな街中で……。すぐ答え出さなくてもいいってゆったじゃん……」
line = "「～～～っっ！？　は、恥ずかしいよ、こんな街中で……。すぐ答え出さなくてもいいってゆったじゃん……」"

[[dialogue]]
speaker = "セーラ"
# 「でも……えへへ。嬉しい……。その言葉が欲しかったから……」
line = "「でも……えへへ。嬉しい……。その言葉が欲しかったから……」"

[[dialogue]]
speaker = "セーラ"
# 「ん……ちゅっ、んふ……<emoji=heart04>」
line = "「ん……ちゅっ、んふ……<emoji=heart04>」"

[[dialogue]]
speaker = "セーラ"
# 「卒業までに、絶対心変わりしないでね……？」
line = "「卒業までに、絶対心変わりしないでね……？」"

[[dialogue]]
speaker = "セーラ"
# 「一足先に卒業しちゃうけど……他の女の子に鼻の下伸ばしちゃダメだよ？」
line = "「一足先に卒業しちゃうけど……他の女の子に鼻の下伸ばしちゃダメだよ？」"

[[dialogue]]
speaker = "セーラ"
# 「こう見えてうち……ウサギちゃんに負けず劣らずけっこー寂しがり屋なんだから。１人にしちゃ……絶対ダメだからね？」
line = "「こう見えてうち……ウサギちゃんに負けず劣らずけっこー寂しがり屋なんだから。１人にしちゃ……絶対ダメだからね？」"

[[dialogue]]
speaker = "unk"
# 約束しますよ
line = "約束しますよ"

[[dialogue]]
speaker = "セーラ"
# 「ふふ、うんっ。なら安心だね」
line = "「ふふ、うんっ。なら安心だね」"

[[dialogue]]
speaker = "セーラ"
# 「ね。やっぱり１人で帰るの寂しいから、家まで送っていって？　遠回りして帰ろ？」
line = "「ね。やっぱり１人で帰るの寂しいから、家まで送っていって？　遠回りして帰ろ？」"

[[dialogue]]
speaker = "セーラ"
# 「うちらの明るい結婚生活の話でもしながら、ゆっくりゆーっくり帰りたいな<emoji=heart04>」
line = "「うちらの明るい結婚生活の話でもしながら、ゆっくりゆーっくり帰りたいな<emoji=heart04>」"
