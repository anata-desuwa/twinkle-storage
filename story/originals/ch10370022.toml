[[dialogue]]
speaker = "unk"
# 第２話,ふわふわハロウィンデート,P
line = "第２話,ふわふわハロウィンデート,P"

[[dialogue]]
speaker = "unk"
# 毎年、学園でのハロウィンパーティーは、流星市国で行われるハロウィンとは被らないよう、前日の開催日となっている。
line = "毎年、学園でのハロウィンパーティーは、流星市国で行われるハロウィンとは被らないよう、前日の開催日となっている。"

[[dialogue]]
speaker = "unk"
# そんなわけでハロウィン当日、サランと一緒にデートしようと街の方までやってきていた。
line = "そんなわけでハロウィン当日、サランと一緒にデートしようと街の方までやってきていた。"

[[dialogue]]
speaker = "サラン"
# 「わ～♪　街のハロウィン、昼間から賑やかだね～！　仮装してる人たちが沢山いるよ～♪　お祭りの屋台が色んなところに出てる～♪」
line = "「わ～♪　街のハロウィン、昼間から賑やかだね～！　仮装してる人たちが沢山いるよ～♪　お祭りの屋台が色んなところに出てる～♪」"

[[dialogue]]
speaker = "サラン"
# 「ぽよ？　会長ちゃん、サランの衣装をじっと見たりして、どうしたの？」
line = "「ぽよ？　会長ちゃん、サランの衣装をじっと見たりして、どうしたの？」"

[[dialogue]]
speaker = "サラン"
# 「――すごく可愛い？　えへへ～、ありがと～<emoji=heart04>　会長ちゃんに褒めてもらえて、ふわふわ～<emoji=heart04>」
line = "「――すごく可愛い？　えへへ～、ありがと～<emoji=heart04>　会長ちゃんに褒めてもらえて、ふわふわ～<emoji=heart04>」"

[[dialogue]]
speaker = "サラン"
# 「――気を付けないと、ナンパされちゃうかもって？　え～？　それは心配しすぎだよ～」
line = "「――気を付けないと、ナンパされちゃうかもって？　え～？　それは心配しすぎだよ～」"

[[dialogue]]
speaker = "サラン"
# 「でも……それなら、今日はずっとサランと手を繋いで歩こっか♪」
line = "「でも……それなら、今日はずっとサランと手を繋いで歩こっか♪」"

[[dialogue]]
speaker = "サラン"
# 「そうすれば、会長ちゃんとずっと一緒だから、ナンパされないし～。人ごみでもはぐれないし～♪　ね？」
line = "「そうすれば、会長ちゃんとずっと一緒だから、ナンパされないし～。人ごみでもはぐれないし～♪　ね？」"

[[dialogue]]
speaker = "サラン"
# 「えへへ♪　手を繋いだから、これで安心だね<emoji=heart04>　それじゃあ、ふわふわハロウィンデートにしゅっぱ～つ♪」
line = "「えへへ♪　手を繋いだから、これで安心だね<emoji=heart04>　それじゃあ、ふわふわハロウィンデートにしゅっぱ～つ♪」"

[[dialogue]]
speaker = "サラン"
# 「ん～♪　このパンプキンケーキ美味しい～♪　甘くて食べやすいのに、ちゃんとカボチャの上品な風味もして、ふわふわ～♪」
line = "「ん～♪　このパンプキンケーキ美味しい～♪　甘くて食べやすいのに、ちゃんとカボチャの上品な風味もして、ふわふわ～♪」"

[[dialogue]]
speaker = "サラン"
# 「さっきのケーキ屋台の店長さん、今度この辺りで新しいケーキ屋さんを開くんだって。本当にすっごく美味しいから、きっと人気が出ると思うんだ～♪」
line = "「さっきのケーキ屋台の店長さん、今度この辺りで新しいケーキ屋さんを開くんだって。本当にすっごく美味しいから、きっと人気が出ると思うんだ～♪」"

[[dialogue]]
speaker = "サラン"
# 「――うんっ♪　ケーキ屋さんオープンしたら、２人でまた食べに行こうね～♪」
line = "「――うんっ♪　ケーキ屋さんオープンしたら、２人でまた食べに行こうね～♪」"

[[dialogue]]
speaker = "サラン"
# 「あっ、見て見て会長ちゃん！　そこのゲームセンターの外にある、クレーンゲームの中！　ジャックちゃんの大きなぬいぐるみがある～♪」
line = "「あっ、見て見て会長ちゃん！　そこのゲームセンターの外にある、クレーンゲームの中！　ジャックちゃんの大きなぬいぐるみがある～♪」"

[[dialogue]]
speaker = "サラン"
# 「そう、カボチャ頭の幽霊、ジャック・オー・ランタン♪　サラン、大好きなんだ～♪　ハロウィンの時期には、いつもグッズ集めてるの～♪」
line = "「そう、カボチャ頭の幽霊、ジャック・オー・ランタン♪　サラン、大好きなんだ～♪　ハロウィンの時期には、いつもグッズ集めてるの～♪」"

[[dialogue]]
speaker = "サラン"
# 「あ～、でも今取っちゃうと、荷物になっちゃうよね。欲しいけど……うん！　デート終わりに挑戦しようかな～」
line = "「あ～、でも今取っちゃうと、荷物になっちゃうよね。欲しいけど……うん！　デート終わりに挑戦しようかな～」"

[[dialogue]]
speaker = "サラン"
# 「あそこ見て、会長ちゃん！　すっごく大きいジャックちゃんのぬいぐるみが飾ってあるよ～♪　わ～♪　両手で抱えないと持てないジャンボサイズ～♪」
line = "「あそこ見て、会長ちゃん！　すっごく大きいジャックちゃんのぬいぐるみが飾ってあるよ～♪　わ～♪　両手で抱えないと持てないジャンボサイズ～♪」"

[[dialogue]]
speaker = "サラン"
# 「なんか近くで宣伝してるね～。えっ、クレープの大食い大会だって～♪　あのジャックちゃん、それの優勝景品みたい～」
line = "「なんか近くで宣伝してるね～。えっ、クレープの大食い大会だって～♪　あのジャックちゃん、それの優勝景品みたい～」"

[[dialogue]]
speaker = "サラン"
# 「クレープがお腹いっぱい食べられて、ジャックちゃんのぬいぐるみも手に入る……じゅるり♪　ハッ……い、いや、ダメだよね！」
line = "「クレープがお腹いっぱい食べられて、ジャックちゃんのぬいぐるみも手に入る……じゅるり♪　ハッ……い、いや、ダメだよね！」"

[[dialogue]]
speaker = "サラン"
# 「今日はせっかく会長ちゃんとハロウィンデートに来てるんだもん。まだサラン、会長ちゃんと食べ歩きしたいし……大会が終わるまで待たせちゃうし……」
line = "「今日はせっかく会長ちゃんとハロウィンデートに来てるんだもん。まだサラン、会長ちゃんと食べ歩きしたいし……大会が終わるまで待たせちゃうし……」"

[[dialogue]]
speaker = "サラン"
# 「――え？　参加してもいいって？　で、でも……」
line = "「――え？　参加してもいいって？　で、でも……」"

[[dialogue]]
speaker = "unk"
# サランのカッコいいところ、見せて欲しいな
line = "サランのカッコいいところ、見せて欲しいな"

[[dialogue]]
speaker = "サラン"
# 「……！　わかった！　見てて、会長ちゃん！」
line = "「……！　わかった！　見てて、会長ちゃん！」"

[[dialogue]]
speaker = "サラン"
# 「それじゃあ、いただきま～す♪　あ～ん♪　ん～<emoji=heart04>　これもパンプキン味のクレープだ～♪　美味しい～<emoji=heart04>」
line = "「それじゃあ、いただきま～す♪　あ～ん♪　ん～<emoji=heart04>　これもパンプキン味のクレープだ～♪　美味しい～<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 大食いでもマイペースだ……！
line = "大食いでもマイペースだ……！"

[[dialogue]]
speaker = "unk"
# 確かにスピード勝負ではないのだが、大会がスタートすると、周りの司会者や参加者が困惑するくらいに、サランはクレープを味わいながら食べ始めた。
line = "確かにスピード勝負ではないのだが、大会がスタートすると、周りの司会者や参加者が困惑するくらいに、サランはクレープを味わいながら食べ始めた。"

[[dialogue]]
speaker = "大男"
# （隣の子はどうやら、クレープが食べたくて参加しただけのようだな。この大会、勝たせてもらうぞ……！）
line = "（隣の子はどうやら、クレープが食べたくて参加しただけのようだな。この大会、勝たせてもらうぞ……！）"

[[dialogue]]
speaker = "サラン"
# 「あ……いけないけない。美味しくてつい、いつもと同じように食べちゃってた。今日は会長ちゃんに、サランのカッコいいところ見せなきゃだもんね……よ～し！」
line = "「あ……いけないけない。美味しくてつい、いつもと同じように食べちゃってた。今日は会長ちゃんに、サランのカッコいいところ見せなきゃだもんね……よ～し！」"

[[dialogue]]
speaker = "サラン"
# 「ぱくっ、もぐっ、はむっ♪　ん～<emoji=heart04>　ふわふわ～♪」
line = "「ぱくっ、もぐっ、はむっ♪　ん～<emoji=heart04>　ふわふわ～♪」"

[[dialogue]]
speaker = "大男"
# （って、いきなりペースが爆上がりした！？　１口で１個ずつクレープが消えていく！？　どうなってるんだ！？　あんな小さな体なのに、一体どこに入るんだその量！？）
line = "（って、いきなりペースが爆上がりした！？　１口で１個ずつクレープが消えていく！？　どうなってるんだ！？　あんな小さな体なのに、一体どこに入るんだその量！？）"

[[dialogue]]
speaker = "大男"
# （俺も大食いが得意で、こういう大会で何度も優勝してきた経験があるからこそ分かる。この子は格が違い過ぎる……！　くっ……ダメだ。俺じゃ勝てない……！）
line = "（俺も大食いが得意で、こういう大会で何度も優勝してきた経験があるからこそ分かる。この子は格が違い過ぎる……！　くっ……ダメだ。俺じゃ勝てない……！）"

[[dialogue]]
speaker = "サラン"
# 「会長ちゃん、サラン優勝したよ～♪　見て～、ジャックちゃんの巨大ぬいぐるみ～♪」
line = "「会長ちゃん、サラン優勝したよ～♪　見て～、ジャックちゃんの巨大ぬいぐるみ～♪」"

[[dialogue]]
speaker = "unk"
# 見てたよ。すごくカッコよかった
line = "見てたよ。すごくカッコよかった"

[[dialogue]]
speaker = "サラン"
# 「えへへ～♪　……あれ？　あそこにいるの、さっき大会に参加してた男の人だ～」
line = "「えへへ～♪　……あれ？　あそこにいるの、さっき大会に参加してた男の人だ～」"

[[dialogue]]
speaker = "大男"
# 「ごめんな。ぬいぐるみを取ってくるなんてカッコつけてた癖に負けちゃって……」
line = "「ごめんな。ぬいぐるみを取ってくるなんてカッコつけてた癖に負けちゃって……」"

[[dialogue]]
speaker = "女の子"
# 「ううん、パパ、カッコよかったよ！　あのおねえさん、すごかったけど、パパだって２ばんだったもん！」
line = "「ううん、パパ、カッコよかったよ！　あのおねえさん、すごかったけど、パパだって２ばんだったもん！」"

[[dialogue]]
speaker = "サラン"
# 「……あの～、ちょっといいですか？」
line = "「……あの～、ちょっといいですか？」"

[[dialogue]]
speaker = "大男"
# 「あ……キミはさっきの……」
line = "「あ……キミはさっきの……」"

[[dialogue]]
speaker = "サラン"
# 「娘ちゃん、はいこれ♪　ジャックちゃんの巨大ぬいぐるみ、よかったらどうぞ～♪」
line = "「娘ちゃん、はいこれ♪　ジャックちゃんの巨大ぬいぐるみ、よかったらどうぞ～♪」"

[[dialogue]]
speaker = "女の子"
# 「え？　おねえさん、いいの……？　これ、１ばんのとくべつなものなのに……」
line = "「え？　おねえさん、いいの……？　これ、１ばんのとくべつなものなのに……」"

[[dialogue]]
speaker = "サラン"
# 「うん♪　お姉ちゃんは、クレープがいっぱい食べられただけでふわふわだから、この子は娘ちゃんにあげる～♪　お姉ちゃんの代わりに、可愛がってあげてくれるかな？」
line = "「うん♪　お姉ちゃんは、クレープがいっぱい食べられただけでふわふわだから、この子は娘ちゃんにあげる～♪　お姉ちゃんの代わりに、可愛がってあげてくれるかな？」"

[[dialogue]]
speaker = "女の子"
# 「うんっ！　私、大切にするね！　ありがとう、おねえさん♪」
line = "「うんっ！　私、大切にするね！　ありがとう、おねえさん♪」"

[[dialogue]]
speaker = "unk"
# サランは、同じくお礼を言うパパさんに巨大なぬいぐるみを手渡し、女の子と「ばいば～い♪」と別れの挨拶を交わしてから、戻ってくる。
line = "サランは、同じくお礼を言うパパさんに巨大なぬいぐるみを手渡し、女の子と「ばいば～い♪」と別れの挨拶を交わしてから、戻ってくる。"

[[dialogue]]
speaker = "サラン"
# 「ただいま～♪　――ぽよ？　ぬいぐるみ、よかったのかって？　うん♪　サランはあの子の笑顔が見られた方がふわふわだもん♪」
line = "「ただいま～♪　――ぽよ？　ぬいぐるみ、よかったのかって？　うん♪　サランはあの子の笑顔が見られた方がふわふわだもん♪」"

[[dialogue]]
speaker = "サラン"
# 「それじゃあ、待たせちゃったけど、ハロウィンデート再開しよ～♪　――行きたい場所がある？　もちろんいいよ～♪　どこどこ～？」
line = "「それじゃあ、待たせちゃったけど、ハロウィンデート再開しよ～♪　――行きたい場所がある？　もちろんいいよ～♪　どこどこ～？」"

[[dialogue]]
speaker = "サラン"
# 「ここって……さっき通ったゲームセンター？　――会長ちゃん、クレーンゲームをやるの？」
line = "「ここって……さっき通ったゲームセンター？　――会長ちゃん、クレーンゲームをやるの？」"

[[dialogue]]
speaker = "サラン"
# 「って、え～！？　数回しかやってないのに、ジャックちゃんのぬいぐるみに付いてる紐にアームを引っ掛けて……わ～、すご～い！」
line = "「って、え～！？　数回しかやってないのに、ジャックちゃんのぬいぐるみに付いてる紐にアームを引っ掛けて……わ～、すご～い！」"

[[dialogue]]
speaker = "サラン"
# 「簡単に取れちゃった～！　――ゲームセンターでバイトをしてたことがある？　……えっ、ジャックちゃんのぬいぐるみ、サランにくれるの？」
line = "「簡単に取れちゃった～！　――ゲームセンターでバイトをしてたことがある？　……えっ、ジャックちゃんのぬいぐるみ、サランにくれるの？」"

[[dialogue]]
speaker = "サラン"
# 「――大会で勝ったご褒美？　わぁ～♪　ありがと～、会長ちゃんっ♪」
line = "「――大会で勝ったご褒美？　わぁ～♪　ありがと～、会長ちゃんっ♪」"

[[dialogue]]
speaker = "サラン"
# 「えへへ～♪　サラン、こっちの方が嬉しい♪」
line = "「えへへ～♪　サラン、こっちの方が嬉しい♪」"

[[dialogue]]
speaker = "unk"
# そう言って、愛おしそうにぬいぐるみを抱き締めるサランなのだった。
line = "そう言って、愛おしそうにぬいぐるみを抱き締めるサランなのだった。"
