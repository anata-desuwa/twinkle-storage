[[dialogue]]
speaker = "キリカ"
# 「教皇庁の伝手で、開業前の結婚式場をお借りしました。式場の運営は民間とはいえ、神官が式を取り仕切ることもありますし、教皇庁とは密接な関係にありますので」
line = "「教皇庁の伝手で、開業前の結婚式場をお借りしました。式場の運営は民間とはいえ、神官が式を取り仕切ることもありますし、教皇庁とは密接な関係にありますので」"

[[dialogue]]
speaker = "トワ先生"
# 「なるほどなるほど……じゃあ後はフィオナちゃんと会長くんが結婚するだけだね！」
line = "「なるほどなるほど……じゃあ後はフィオナちゃんと会長くんが結婚するだけだね！」"

[[dialogue]]
speaker = "フィオナ"
# 「なるほどじゃありません！　私と緋宮会長が結婚って、どういうことですか！？」
line = "「なるほどじゃありません！　私と緋宮会長が結婚って、どういうことですか！？」"

[[dialogue]]
speaker = "トワ先生"
# 「結婚って言ってもふりだよ、<b>ふり</b>。本当に結婚する必要はなくて、フィオナちゃんの『結婚っていいな』欲が満たされればいいんだから」
line = "「結婚って言ってもふりだよ、<b>ふり</b>。本当に結婚する必要はなくて、フィオナちゃんの『結婚っていいな』欲が満たされればいいんだから」"

[[dialogue]]
speaker = "フィオナ"
# 「その言い方もうやめてもらっていいですか！？」
line = "「その言い方もうやめてもらっていいですか！？」"

[[dialogue]]
speaker = "フィオナ"
# 「その……この状態を解決するには、結婚式を挙げる必要があるのはわかりました。だからといって、緋宮会長を連れてこなくても……」
line = "「その……この状態を解決するには、結婚式を挙げる必要があるのはわかりました。だからといって、緋宮会長を連れてこなくても……」"

[[dialogue]]
speaker = "トワ先生"
# 「でも会長くん以外に適任がいる？　たとえふりだとしても、フィオナちゃんが結婚式をしてもいい男の人って他にいるかな？」
line = "「でも会長くん以外に適任がいる？　たとえふりだとしても、フィオナちゃんが結婚式をしてもいい男の人って他にいるかな？」"

[[dialogue]]
speaker = "フィオナ"
# 「それは…………いないですけど」
line = "「それは…………いないですけど」"

[[dialogue]]
speaker = "フィオナ"
# 「結婚式をするなら、やっぱり緋宮会長がいい──」
line = "「結婚式をするなら、やっぱり緋宮会長がいい──」"

[[dialogue]]
speaker = "unk"
# （フィオナと目が合う）
line = "（フィオナと目が合う）"

[[dialogue]]
speaker = "フィオナ"
# 「うぅ～～～っ！？　誰か殺して～～～っ！？」
line = "「うぅ～～～っ！？　誰か殺して～～～っ！？」"

[[dialogue]]
speaker = "ニャリオン"
# 「やめるニャン！　フィオナ嬢のメンタルポイントはもうゼロニャ！」
line = "「やめるニャン！　フィオナ嬢のメンタルポイントはもうゼロニャ！」"

[[dialogue]]
speaker = "unk"
# （さすがに気まずい……）
line = "（さすがに気まずい……）"

[[dialogue]]
speaker = "ナミエル"
# 「偽りの式とはいえ、緋宮会長がフィオナお嬢様と結ばれるなんて、私は反対です。きっとよからぬことを想像しているに違いありません」
line = "「偽りの式とはいえ、緋宮会長がフィオナお嬢様と結ばれるなんて、私は反対です。きっとよからぬことを想像しているに違いありません」"

[[dialogue]]
speaker = "ニャリオン"
# 「ワガハイもフィオナ嬢を嫁に出すのは早いと思うのニャン」
line = "「ワガハイもフィオナ嬢を嫁に出すのは早いと思うのニャン」"

[[dialogue]]
speaker = "フィオナ"
# 「いやこれは、戦闘服を元に戻すためだから。本当の結婚じゃないから。ね、キリカ？」
line = "「いやこれは、戦闘服を元に戻すためだから。本当の結婚じゃないから。ね、キリカ？」"

[[dialogue]]
speaker = "キリカ"
# 「私としても、フィオナお嬢様の婚姻を認めるのは本意ではありません。お嬢様にふさわしい殿方かどうか見極めてからにすべきです」
line = "「私としても、フィオナお嬢様の婚姻を認めるのは本意ではありません。お嬢様にふさわしい殿方かどうか見極めてからにすべきです」"

[[dialogue]]
speaker = "フィオナ"
# 「キリカまで！？」
line = "「キリカまで！？」"

[[dialogue]]
speaker = "イレーナ"
# 「皆さま、お待たせしました。私にご用事があると伺ったのですが──」
line = "「皆さま、お待たせしました。私にご用事があると伺ったのですが──」"

[[dialogue]]
speaker = "イレーナ"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "イレーナ"
# 「会長さん、少しこちらへ」
line = "「会長さん、少しこちらへ」"

[[dialogue]]
speaker = "イレーナ"
# 「何この修羅場？　あんた何やらかしたのよ？　……え？　戦闘服がウェディングドレスになって、元に戻すためには結婚式を挙げなきゃいけない？」
line = "「何この修羅場？　あんた何やらかしたのよ？　……え？　戦闘服がウェディングドレスになって、元に戻すためには結婚式を挙げなきゃいけない？」"

[[dialogue]]
speaker = "イレーナ"
# 「何それ、そんなことありえるの……。まぁ、どうしてあたしが呼ばれたかはわかったわ……」
line = "「何それ、そんなことありえるの……。まぁ、どうしてあたしが呼ばれたかはわかったわ……」"

[[dialogue]]
speaker = "フィオナ"
# 「お呼び立てしてすみません、イレーナさん。実は神官として式を挙げてほしくて……あ、もちろん本物の式ではないですよ。あくまでふりというか……」
line = "「お呼び立てしてすみません、イレーナさん。実は神官として式を挙げてほしくて……あ、もちろん本物の式ではないですよ。あくまでふりというか……」"

[[dialogue]]
speaker = "イレーナ"
# 「ご用件は理解しましたが……弱りましたね。若輩の身ではありますが、私は正式な神官です。ご事情がおありとはいえ、偽りの愛の誓いを見届けるのは神官の職務に反します」
line = "「ご用件は理解しましたが……弱りましたね。若輩の身ではありますが、私は正式な神官です。ご事情がおありとはいえ、偽りの愛の誓いを見届けるのは神官の職務に反します」"

[[dialogue]]
speaker = "フィオナ"
# 「ぅ……！？」
line = "「ぅ……！？」"

[[dialogue]]
speaker = "ナミエル"
# 「仰る通りですね……」
line = "「仰る通りですね……」"

[[dialogue]]
speaker = "フィオナ"
# 「あの……イレーナ神官？　私も不誠実な目的で偽りの式を挙げようというわけではないのです。星騎士の使命を果たすべく、やむなくなのです」
line = "「あの……イレーナ神官？　私も不誠実な目的で偽りの式を挙げようというわけではないのです。星騎士の使命を果たすべく、やむなくなのです」"

[[dialogue]]
speaker = "フィオナ"
# 「それに、式であれば予行演習もするもの。時には形式的な場合もあるのではないでしょうか」
line = "「それに、式であれば予行演習もするもの。時には形式的な場合もあるのではないでしょうか」"

[[dialogue]]
speaker = "イレーナ"
# 「つまり、将来行われるおふたりの式の予行演習であると？」
line = "「つまり、将来行われるおふたりの式の予行演習であると？」"

[[dialogue]]
speaker = "フィオナ"
# 「～～～～っ！？　ちち、ちがいますっ、そういう意味ではなくてっ！　その、形だけでも、お願いしたくて……！」
line = "「～～～～っ！？　ちち、ちがいますっ、そういう意味ではなくてっ！　その、形だけでも、お願いしたくて……！」"

[[dialogue]]
speaker = "イレーナ"
# 「ふふ、わかりました。では仕方ありませんね。おふたりが私の式の練習に付き合って下さっている、ということにしておきましょう」
line = "「ふふ、わかりました。では仕方ありませんね。おふたりが私の式の練習に付き合って下さっている、ということにしておきましょう」"

[[dialogue]]
speaker = "フィオナ"
# 「ありがとうございます……」
line = "「ありがとうございます……」"

[[dialogue]]
speaker = "イレーナ"
# 「新郎緋宮クロト。あなたは星見フィオナを妻とし、健やかなる時も病める時も、富める時も貧しき時も、彼女を愛し、慈しむことを誓いますか？」
line = "「新郎緋宮クロト。あなたは星見フィオナを妻とし、健やかなる時も病める時も、富める時も貧しき時も、彼女を愛し、慈しむことを誓いますか？」"

[[dialogue]]
speaker = "unk"
# ……誓います
line = "……誓います"

[[dialogue]]
speaker = "イレーナ"
# 「新婦星見フィオナ。あなたは緋宮クロトを夫とし、健やかなる時も病める時も、富める時も貧しき時も、彼を愛し、慈しむことを誓いますか？」
line = "「新婦星見フィオナ。あなたは緋宮クロトを夫とし、健やかなる時も病める時も、富める時も貧しき時も、彼を愛し、慈しむことを誓いますか？」"

[[dialogue]]
speaker = "フィオナ"
# 「は、はい……誓います」
line = "「は、はい……誓います」"

[[dialogue]]
speaker = "イレーナ"
# 「神官イレーナはここに２人の誓いを聞き届けました。女神様の名の下に、２人を夫婦として認めます」
line = "「神官イレーナはここに２人の誓いを聞き届けました。女神様の名の下に、２人を夫婦として認めます」"

[[dialogue]]
speaker = "フィオナ"
# 「これで一応誓いは立てましたが……元の戦闘服に変身してみますね」
line = "「これで一応誓いは立てましたが……元の戦闘服に変身してみますね」"

[[dialogue]]
speaker = "フィオナ"
# 「……ウェディングドレスのままですね」
line = "「……ウェディングドレスのままですね」"

[[dialogue]]
speaker = "トワ先生"
# 「う～ん……結婚式のマネだけじゃダメか。フィオナちゃんが『結婚した』って実感できないといけないみたい」
line = "「う～ん……結婚式のマネだけじゃダメか。フィオナちゃんが『結婚した』って実感できないといけないみたい」"

[[dialogue]]
speaker = "フィオナ"
# 「私が結婚を実感……？　うぅ、どうすればいいんでしょうか……」
line = "「私が結婚を実感……？　うぅ、どうすればいいんでしょうか……」"

[[dialogue]]
speaker = "イレーナ"
# 「フィオナ会長。あなたの望む結婚とはどのようなものですか？」
line = "「フィオナ会長。あなたの望む結婚とはどのようなものですか？」"

[[dialogue]]
speaker = "フィオナ"
# 「私の望む結婚……ですか？」
line = "「私の望む結婚……ですか？」"

[[dialogue]]
speaker = "イレーナ"
# 「はい。書類だけでも結婚はできますが、フィオナ会長の思い描く結婚はそういったものではないと思います」
line = "「はい。書類だけでも結婚はできますが、フィオナ会長の思い描く結婚はそういったものではないと思います」"

[[dialogue]]
speaker = "イレーナ"
# 「ですから、フィオナ会長のイメージに近づき、理想を叶えることが大事なのではないでしょうか」
line = "「ですから、フィオナ会長のイメージに近づき、理想を叶えることが大事なのではないでしょうか」"

[[dialogue]]
speaker = "フィオナ"
# 「……正直、私には結婚なんてまだ早いと思っています。でも結婚とは、口で愛を語るだけではなくて、互いに慈しみ、手を取り、支え合うものだと思うんです」
line = "「……正直、私には結婚なんてまだ早いと思っています。でも結婚とは、口で愛を語るだけではなくて、互いに慈しみ、手を取り、支え合うものだと思うんです」"

[[dialogue]]
speaker = "フィオナ"
# 「……思えば、口だけで愛を誓っても意味がないのは当然ですね。だって私は、緋宮会長を支えられる妻にまだなれていませんから」
line = "「……思えば、口だけで愛を誓っても意味がないのは当然ですね。だって私は、緋宮会長を支えられる妻にまだなれていませんから」"

[[dialogue]]
speaker = "フィオナ"
# 「ですから──」
line = "「ですから──」"

[[dialogue]]
speaker = "フィオナ"
# 「星見フィオナ、花嫁修業を始めます！」
line = "「星見フィオナ、花嫁修業を始めます！」"
