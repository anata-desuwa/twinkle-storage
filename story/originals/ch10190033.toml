[[dialogue]]
speaker = "unk"
# 第３話,シズル来訪,P
line = "第３話,シズル来訪,P"

[[dialogue]]
speaker = "unk"
# 俺たちが紫桜の里を訪れてから、しばらくが経ったある日のこと――
line = "俺たちが紫桜の里を訪れてから、しばらくが経ったある日のこと――"

[[dialogue]]
speaker = "シズル"
# 「転送成功です！　ついにやってきました～！　ようこそ流星市国！」
line = "「転送成功です！　ついにやってきました～！　ようこそ流星市国！」"

[[dialogue]]
speaker = "シズル"
# 「さあさあ、都会をめいっぱい満喫しますよ～っ！！」
line = "「さあさあ、都会をめいっぱい満喫しますよ～っ！！」"

[[dialogue]]
speaker = "せつな"
# 「師匠、はしゃぎすぎでござる……」
line = "「師匠、はしゃぎすぎでござる……」"

[[dialogue]]
speaker = "シズル"
# 「だって都会ですよ、大都会！　ああ、夢にまで見た、愛憎渦巻く欲望の都！」
line = "「だって都会ですよ、大都会！　ああ、夢にまで見た、愛憎渦巻く欲望の都！」"

[[dialogue]]
speaker = "unk"
# 欲望の都？
line = "欲望の都？"

[[dialogue]]
speaker = "unk"
# 愛憎渦巻く？
line = "愛憎渦巻く？"

[[dialogue]]
speaker = "せつな"
# 「流星市国はそこまで物騒じゃないでござるよ」
line = "「流星市国はそこまで物騒じゃないでござるよ」"

[[dialogue]]
speaker = "シズル"
# 「冗談ですよ、冗談。つい気持ちがたかぶって、誇張表現しちゃっただけじゃないですか」
line = "「冗談ですよ、冗談。つい気持ちがたかぶって、誇張表現しちゃっただけじゃないですか」"

[[dialogue]]
speaker = "シズル"
# 「でも、紫桜の里じゃ考えられないくらい男性と女性がひしめき合って暮らしていて……」
line = "「でも、紫桜の里じゃ考えられないくらい男性と女性がひしめき合って暮らしていて……」"

[[dialogue]]
speaker = "シズル"
# 「これはもう、何か起こってしまう予感しかしません！　そう思いませんか、せつな？」
line = "「これはもう、何か起こってしまう予感しかしません！　そう思いませんか、せつな？」"

[[dialogue]]
speaker = "せつな"
# 「エッチなハプニングを期待しているでござるか？」
line = "「エッチなハプニングを期待しているでござるか？」"

[[dialogue]]
speaker = "unk"
# シズルさんに限ってそんな……
line = "シズルさんに限ってそんな……"

[[dialogue]]
speaker = "unk"
# せつなじゃないんだし
line = "せつなじゃないんだし"

[[dialogue]]
speaker = "せつな"
# 「主様、騙されてはいけないでござる。師匠は房中術の達人でござるよ」
line = "「主様、騙されてはいけないでござる。師匠は房中術の達人でござるよ」"

[[dialogue]]
speaker = "せつな"
# 「せつなたち里のくノ一は皆、師匠の座学を受けているでござる」
line = "「せつなたち里のくノ一は皆、師匠の座学を受けているでござる」"

[[dialogue]]
speaker = "せつな"
# 「その房中術にかかれば、どんな男性でもきっとヘロヘロの骨抜きになってしまうでござるよ」
line = "「その房中術にかかれば、どんな男性でもきっとヘロヘロの骨抜きになってしまうでござるよ」"

[[dialogue]]
speaker = "unk"
# ごくり……
line = "ごくり……"

[[dialogue]]
speaker = "unk"
# そんなすごいの？
line = "そんなすごいの？"

[[dialogue]]
speaker = "せつな"
# 「な、なんでござるか主様、その反応は……」
line = "「な、なんでござるか主様、その反応は……」"

[[dialogue]]
speaker = "シズル"
# 「おや、もしかしてご興味がおありですか？　それなら──」
line = "「おや、もしかしてご興味がおありですか？　それなら──」"

[[dialogue]]
speaker = "せつな"
# 「ダメでござるよ！　師匠の房中術は本当にすごいのでござる！　いかな主様といえど、あれを受けたら……」
line = "「ダメでござるよ！　師匠の房中術は本当にすごいのでござる！　いかな主様といえど、あれを受けたら……」"

[[dialogue]]
speaker = "せつな"
# 「……主様を、取られちゃうでござる……」
line = "「……主様を、取られちゃうでござる……」"

[[dialogue]]
speaker = "シズル"
# 「あらまあ、可愛い♪」
line = "「あらまあ、可愛い♪」"

[[dialogue]]
speaker = "せつな"
# 「とにかく！　主様に手を出すのは師匠といえど絶対に許さないのでござる！」
line = "「とにかく！　主様に手を出すのは師匠といえど絶対に許さないのでござる！」"

[[dialogue]]
speaker = "シズル"
# 「大丈夫ですよ。興味があるのはせつなの房中術のようですし♪」
line = "「大丈夫ですよ。興味があるのはせつなの房中術のようですし♪」"

[[dialogue]]
speaker = "せつな"
# 「にゃっ！？　そ、そうなのでござるか……？」
line = "「にゃっ！？　そ、そうなのでござるか……？」"

[[dialogue]]
speaker = "unk"
# ぜひ今度お願いします
line = "ぜひ今度お願いします"

[[dialogue]]
speaker = "せつな"
# 「わ、分かったでござる……せつなの房中術はまだまだ稚拙ですが……精一杯頑張るでござる……」
line = "「わ、分かったでござる……せつなの房中術はまだまだ稚拙ですが……精一杯頑張るでござる……」"

[[dialogue]]
speaker = "シズル"
# 「いいですね～、若いって♪」
line = "「いいですね～、若いって♪」"

[[dialogue]]
speaker = "せつな"
# 「師匠っ！」
line = "「師匠っ！」"

[[dialogue]]
speaker = "シズル"
# 「それよりも時間は有限ですよ、せつな！　せっかくの都会訪問なんですから、早く街へ繰り出しましょう！」
line = "「それよりも時間は有限ですよ、せつな！　せっかくの都会訪問なんですから、早く街へ繰り出しましょう！」"

[[dialogue]]
speaker = "シズル"
# 「あいたっ！　いたたたたっ、こ、腰がっ……」
line = "「あいたっ！　いたたたたっ、こ、腰がっ……」"

[[dialogue]]
speaker = "せつな"
# 「興奮しすぎでござるよ。秘薬を塗るから腰を見せるでござる」
line = "「興奮しすぎでござるよ。秘薬を塗るから腰を見せるでござる」"

[[dialogue]]
speaker = "シズル"
# 「面目ない……よろしく頼みますよ、せつな」
line = "「面目ない……よろしく頼みますよ、せつな」"

[[dialogue]]
speaker = "せつな"
# 「無理せずのんびり参りましょう。師匠の腰も有限でござるから」
line = "「無理せずのんびり参りましょう。師匠の腰も有限でござるから」"

[[dialogue]]
speaker = "シズル"
# 「世話をかけてすみませんね……とほほ……」
line = "「世話をかけてすみませんね……とほほ……」"

[[dialogue]]
speaker = "シズル"
# 「おお～～、すごいです！　まさに絵に描いたような大都会！　ワクワクしますね～」
line = "「おお～～、すごいです！　まさに絵に描いたような大都会！　ワクワクしますね～」"

[[dialogue]]
speaker = "シズル"
# 「あっ、見て下さい！　行き交う女子の破廉恥な服装を！　あんなの裸も同然じゃありませんか！」
line = "「あっ、見て下さい！　行き交う女子の破廉恥な服装を！　あんなの裸も同然じゃありませんか！」"

[[dialogue]]
speaker = "せつな"
# 「あのくらい普通でござるよ、師匠」
line = "「あのくらい普通でござるよ、師匠」"

[[dialogue]]
speaker = "シズル"
# 「ああ、あなたも都会の風に染まってしまったんですね……。いいですよ、えっち指数急上昇です♪」
line = "「ああ、あなたも都会の風に染まってしまったんですね……。いいですよ、えっち指数急上昇です♪」"

[[dialogue]]
speaker = "せつな"
# 「都会のえっちはこんなものじゃないでござるよ。見えないところでは、あちらもこちらも破廉恥三昧でござる」
line = "「都会のえっちはこんなものじゃないでござるよ。見えないところでは、あちらもこちらも破廉恥三昧でござる」"

[[dialogue]]
speaker = "シズル"
# 「本当ですか！？　文にはそんなことちっとも書いてなかったじゃないですか！」
line = "「本当ですか！？　文にはそんなことちっとも書いてなかったじゃないですか！」"

[[dialogue]]
speaker = "シズル"
# 「大事なことですからね……今後は漏らさずしっかり報告するように。いいですね？」
line = "「大事なことですからね……今後は漏らさずしっかり報告するように。いいですね？」"

[[dialogue]]
speaker = "せつな"
# 「わかったでござる！」
line = "「わかったでござる！」"

[[dialogue]]
speaker = "シズル"
# 「さあ、行きますよ！　私を案内して下さいっ！」
line = "「さあ、行きますよ！　私を案内して下さいっ！」"

[[dialogue]]
speaker = "unk"
# こうしてシズルさんの都会観光に、付き合うことになった。
line = "こうしてシズルさんの都会観光に、付き合うことになった。"

[[dialogue]]
speaker = "unk"
# 久しぶりの大都会にシズルさんは大はしゃぎで、俺とせつなは１日中振り回されることになったのだった。
line = "久しぶりの大都会にシズルさんは大はしゃぎで、俺とせつなは１日中振り回されることになったのだった。"
