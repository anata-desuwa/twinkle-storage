[[dialogue]]
speaker = "unk"
# 第６話,昔日の陽だまり,B
line = "第６話,昔日の陽だまり,B"

[[dialogue]]
speaker = "フィオナ"
# 「……姉さんの覚悟は、よくわかりました」
line = "「……姉さんの覚悟は、よくわかりました」"

[[dialogue]]
speaker = "フィオナ"
# 「だから──ありがとうございます。小さな頃……<ruby=わたし>妹</ruby>に代わって、色々なものを背負ってくれて」
line = "「だから──ありがとうございます。小さな頃……<ruby>妹<rt>わたし</rt></ruby>に代わって、色々なものを背負ってくれて」"

[[dialogue]]
speaker = "アポロ"
# 「な……んだって……？」
line = "「な……んだって……？」"

[[dialogue]]
speaker = "unk"
# でもフィオナは──今のアポロを否定しなかった。
line = "でもフィオナは──今のアポロを否定しなかった。"

[[dialogue]]
speaker = "フィオナ"
# 「今の私になったからこそ、見えるものもあります」
line = "「今の私になったからこそ、見えるものもあります」"

[[dialogue]]
speaker = "フィオナ"
# 「姉さんから『フィオナ』を継いだことで……昔の姉さんが背負っていたものが、私にも理解できるようになりました」
line = "「姉さんから『フィオナ』を継いだことで……昔の姉さんが背負っていたものが、私にも理解できるようになりました」"

[[dialogue]]
speaker = "アポロ"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "フィオナ"
# 「星見の長女──その責務は私が想像していたよりずっと重かった」
line = "「星見の長女──その責務は私が想像していたよりずっと重かった」"

[[dialogue]]
speaker = "フィオナ"
# 「『月の壁画』に象徴される魔王伝承。そんな大前提さえ、<ruby=しせい>市井</ruby>には正しく知られていない」
line = "「『月の壁画』に象徴される魔王伝承。そんな大前提さえ、<ruby>市井<rt>しせい</rt></ruby>には正しく知られていない」"

[[dialogue]]
speaker = "フィオナ"
# 「どうすれば魔王になれるのか。血を継いでいるというだけで十分なのか。何もかもが未知数な環境でした」
line = "「どうすれば魔王になれるのか。血を継いでいるというだけで十分なのか。何もかもが未知数な環境でした」"

[[dialogue]]
speaker = "フィオナ"
# 「でも、そんな、不透明な先行きの中でも……大人たちの期待は否応なくのしかかります」
line = "「でも、そんな、不透明な先行きの中でも……大人たちの期待は否応なくのしかかります」"

[[dialogue]]
speaker = "フィオナ"
# 「幸い、星術に関しては長けたものでした。とはいえ、先代魔王の力には及ばない。教皇庁の関係者は、あらゆる手段を私に与えました」
line = "「幸い、星術に関しては長けたものでした。とはいえ、先代魔王の力には及ばない。教皇庁の関係者は、あらゆる手段を私に与えました」"

[[dialogue]]
speaker = "フィオナ"
# 「リクリエを止めるには『魔王』がいなければならない。いえ……もし魔王になれなければ、星見の長女なんて意味がない。そう思わされました」
line = "「リクリエを止めるには『魔王』がいなければならない。いえ……もし魔王になれなければ、星見の長女なんて意味がない。そう思わされました」"

[[dialogue]]
speaker = "アポロ"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "unk"
# 世界の命運が、たった一人の少女の肩に乗る。
line = "世界の命運が、たった一人の少女の肩に乗る。"

[[dialogue]]
speaker = "unk"
# その重圧は──体験した者でなければ、到底わかりえないだろう。
line = "その重圧は──体験した者でなければ、到底わかりえないだろう。"

[[dialogue]]
speaker = "フィオナ"
# 「だから……その時ようやく思ったんです。これが、姉さんの見ていたものなんだって」
line = "「だから……その時ようやく思ったんです。これが、姉さんの見ていたものなんだって」"

[[dialogue]]
speaker = "ソフィア"
# （フィオナ会長は……家のことだけで、そんなにも重荷を抱えていたんですね）
line = "（フィオナ会長は……家のことだけで、そんなにも重荷を抱えていたんですね）"

[[dialogue]]
speaker = "ヴィーナス"
# （ええ。クロトよりずっと昔──もう何年も前から……）
line = "（ええ。クロトよりずっと昔──もう何年も前から……）"

[[dialogue]]
speaker = "ルリエル"
# （それに星徒会のお仕事や、わたし達のお守りも……）
line = "（それに星徒会のお仕事や、わたし達のお守りも……）"

[[dialogue]]
speaker = "ユウリ"
# （ああ……ちょっとばかり、甘えすぎてたかもしれねえな）
line = "（ああ……ちょっとばかり、甘えすぎてたかもしれねえな）"

[[dialogue]]
speaker = "フィオナ"
# 「──それは違います。ユウリ」
line = "「──それは違います。ユウリ」"

[[dialogue]]
speaker = "ユウリ"
# 「！　地獄耳かよ」
line = "「！　地獄耳かよ」"

[[dialogue]]
speaker = "フィオナ"
# 「流星星徒会でみんなと過ごした日々は私にとって宝物でした。重荷だなんて感じたことは一度もありません」
line = "「流星星徒会でみんなと過ごした日々は私にとって宝物でした。重荷だなんて感じたことは一度もありません」"

[[dialogue]]
speaker = "フィオナ"
# 「ただ、それでも……星見の長女としての宿命は、あくまで私だけが背負うものだと思っていました。だって魔王には血統が必要なのですから」
line = "「ただ、それでも……星見の長女としての宿命は、あくまで私だけが背負うものだと思っていました。だって魔王には血統が必要なのですから」"

[[dialogue]]
speaker = "フィオナ"
# 「けれど──それはとんだ思い違いでした。信頼できる仲間がいたなら、最初から頼るべきだった」
line = "「けれど──それはとんだ思い違いでした。信頼できる仲間がいたなら、最初から頼るべきだった」"

[[dialogue]]
speaker = "フィオナ"
# 「ひとりで悩んで。抱えて。意地ばかり張っていたら、いつか……自分のことさえ見失ってしまう。私も身に染みましたから」
line = "「ひとりで悩んで。抱えて。意地ばかり張っていたら、いつか……自分のことさえ見失ってしまう。私も身に染みましたから」"

[[dialogue]]
speaker = "ユウリ"
# 「フィオナ……」
line = "「フィオナ……」"

[[dialogue]]
speaker = "unk"
# ──うんうん、と隣でヴィーナスが頷いていた。
line = "──うんうん、と隣でヴィーナスが頷いていた。"

[[dialogue]]
speaker = "フィオナ"
# 「昔──誰より姉さんのそばにいた私も。そうあるべきだったんです」
line = "「昔──誰より姉さんのそばにいた私も。そうあるべきだったんです」"

[[dialogue]]
speaker = "フィオナ"
# 「幼い頃の<ruby=エリシア>私</ruby>には……姉さんの抱えるものの大きさがわからなかった。でも、今ならわかります」
line = "「幼い頃の<ruby>私<rt>エリシア</rt></ruby>には……姉さんの抱えるものの大きさがわからなかった。でも、今ならわかります」"

[[dialogue]]
speaker = "アポロ"
# 「……今さら遅い」
line = "「……今さら遅い」"

[[dialogue]]
speaker = "フィオナ"
# 「いいえ──きっと、間に合います」
line = "「いいえ──きっと、間に合います」"

[[dialogue]]
speaker = "フィオナ"
# 「今の私って──すごいわがままなんですよ。世界を滅亡の危機に懸けてでも、あなたを救いたいって願ってる」
line = "「今の私って──すごいわがままなんですよ。世界を滅亡の危機に懸けてでも、あなたを救いたいって願ってる」"

[[dialogue]]
speaker = "フィオナ"
# 「それでも皆さんが受け止めてくれるって信じてるから。どんな無茶だって話せるんです」
line = "「それでも皆さんが受け止めてくれるって信じてるから。どんな無茶だって話せるんです」"

[[dialogue]]
speaker = "unk"
# フィオナの眼に迷いはなかった。
line = "フィオナの眼に迷いはなかった。"

[[dialogue]]
speaker = "unk"
# だから、二人に、本当に必要なのは。
line = "だから、二人に、本当に必要なのは。"

[[dialogue]]
speaker = "フィオナ"
# 「私を頼ってください、姉さん。私もあなたを頼りますから」
line = "「私を頼ってください、姉さん。私もあなたを頼りますから」"

[[dialogue]]
speaker = "フィオナ"
# 「お互い、かけがえのない双子同士──手を取り合ってみませんか？」
line = "「お互い、かけがえのない双子同士──手を取り合ってみませんか？」"

[[dialogue]]
speaker = "アポロ"
# 「──」
line = "「──」"

[[dialogue]]
speaker = "アポロ"
# 「そんなの……今さらだ……そもそも……オマ、オマエなんかに、何がわかるっていうんだっ！」
line = "「そんなの……今さらだ……そもそも……オマ、オマエなんかに、何がわかるっていうんだっ！」"

[[dialogue]]
speaker = "フィオナ"
# 「確かに……私はあくまでも星見エリシア。姉さんのことが何もかも理解できたとは言えません。けれど」
line = "「確かに……私はあくまでも星見エリシア。姉さんのことが何もかも理解できたとは言えません。けれど」"

[[dialogue]]
speaker = "フィオナ"
# 「ひとつだけ。決定的に共感できたことがあるんです」
line = "「ひとつだけ。決定的に共感できたことがあるんです」"

[[dialogue]]
speaker = "アポロ"
# 「共感──だと……？」
line = "「共感──だと……？」"

[[dialogue]]
speaker = "フィオナ"
# 「私ね。思ったんです。『フィオナ』──星見の長女としての責務は大変で、忙しくて、たくさんのものを抱え込んでしまったけど」
line = "「私ね。思ったんです。『フィオナ』──星見の長女としての責務は大変で、忙しくて、たくさんのものを抱え込んでしまったけど」"

[[dialogue]]
speaker = "フィオナ"
# 「いつも胸に抱いていた願いは……簡単なことでした」
line = "「いつも胸に抱いていた願いは……簡単なことでした」"

[[dialogue]]
speaker = "フィオナ"
# 「また、姉さんと遊べたらいいなって」
line = "「また、姉さんと遊べたらいいなって」"

[[dialogue]]
speaker = "アポロ"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "unk"
# フィオナの吐露に、アポロは思わずひるんだ。
line = "フィオナの吐露に、アポロは思わずひるんだ。"

[[dialogue]]
speaker = "フィオナ"
# 「幼かった頃の……ひだまりのような思い出が何度もよみがえるんです。重圧で、押し潰されそうになるたびに」
line = "「幼かった頃の……ひだまりのような思い出が何度もよみがえるんです。重圧で、押し潰されそうになるたびに」"

[[dialogue]]
speaker = "フィオナ"
# 「<b>だから</b>──ですよね？　姉さんが、その格好をしているのは」
line = "「<b>だから</b>──ですよね？　姉さんが、その格好をしているのは」"

[[dialogue]]
speaker = "アポロ"
# 「ッ……違う。あたしは……あたしはただ、正義のために……」
line = "「ッ……違う。あたしは……あたしはただ、正義のために……」"

[[dialogue]]
speaker = "フィオナ"
# 「私と一緒に観ていた番組。私と一緒に遊んだヒーローごっこ」
line = "「私と一緒に観ていた番組。私と一緒に遊んだヒーローごっこ」"

[[dialogue]]
speaker = "フィオナ"
# 「だから姉さんは──そうして『アポロ』を名乗っている。心のどこかで、また私と遊びたいって、願ってくれているから！」
line = "「だから姉さんは──そうして『アポロ』を名乗っている。心のどこかで、また私と遊びたいって、願ってくれているから！」"

[[dialogue]]
speaker = "アポロ"
# 「──っ！」
line = "「──っ！」"

[[dialogue]]
speaker = "unk"
# 今度こそアポロは鼻白んだ。確かな図星だったのだろう。
line = "今度こそアポロは鼻白んだ。確かな図星だったのだろう。"

[[dialogue]]
speaker = "unk"
# それ以上、アポロは二の句を継ぐこともなく、押し黙って……。
line = "それ以上、アポロは二の句を継ぐこともなく、押し黙って……。"

[[dialogue]]
speaker = "モンスター"
# 「──ヒィィィンッ！　ウォォォォォォンッ！」
line = "「──ヒィィィンッ！　ウォォォォォォンッ！」"

[[dialogue]]
speaker = "モンスター"
# 「──ゴオオオオオオウッ！　ヌゥゥゥゥンッッ！！」
line = "「──ゴオオオオオオウッ！　ヌゥゥゥゥンッッ！！」"

[[dialogue]]
speaker = "マトイ"
# 「ちょっ……いいとこなのに邪魔する気！？」
line = "「ちょっ……いいとこなのに邪魔する気！？」"

[[dialogue]]
speaker = "クロト"
# 「速やかに対処する──」
line = "「速やかに対処する──」"

[[dialogue]]
speaker = "unk"
# 配下のモンスターたちが暴れだす。
line = "配下のモンスターたちが暴れだす。"

[[dialogue]]
speaker = "unk"
# <ruby=あるじ>主</ruby>の自我を崩そうとする俺たちを、この場から排除しようとして。
line = "<ruby>主<rt>あるじ</rt></ruby>の自我を崩そうとする俺たちを、この場から排除しようとして。"

[[dialogue]]
speaker = "アポロ"
# 「黙れ……違う……あたしはっ……！」
line = "「黙れ……違う……あたしはっ……！」"

[[dialogue]]
speaker = "モンスター"
# 「──ヒヒイイイィィィィン…………ッ」
line = "「──ヒヒイイイィィィィン…………ッ」"

[[dialogue]]
speaker = "ソフィア"
# 「っ……！？」
line = "「っ……！？」"

[[dialogue]]
speaker = "セーラ"
# 「アポロちゃんが──」
line = "「アポロちゃんが──」"

[[dialogue]]
speaker = "unk"
# だが──アポロ自らが、その大剣でモンスター達を振り払った。
line = "だが──アポロ自らが、その大剣でモンスター達を振り払った。"

[[dialogue]]
speaker = "アポロ"
# 「いや……違く……ないのか……？」
line = "「いや……違く……ないのか……？」"

[[dialogue]]
speaker = "アポロ"
# 「そうだな……あたしだ。あたしは……素直じゃ、なかった。もっと昔に……言えたらよかった。それなら……使徒になんてならずに、済んだのかも」
line = "「そうだな……あたしだ。あたしは……素直じゃ、なかった。もっと昔に……言えたらよかった。それなら……使徒になんてならずに、済んだのかも」"

[[dialogue]]
speaker = "アポロ"
# 「あたしは……本当は……もっと、遊んでたかった、だけなんだ──」
line = "「あたしは……本当は……もっと、遊んでたかった、だけなんだ──」"

[[dialogue]]
speaker = "フィオナ"
# 「姉さん──！」
line = "「姉さん──！」"

[[dialogue]]
speaker = "unk"
# ２人の距離が近づいていく。そして……
line = "２人の距離が近づいていく。そして……"

[[dialogue]]
speaker = "アポロ"
# 「エリシア──あたしをここから、助けてくれ──」
line = "「エリシア──あたしをここから、助けてくれ──」"

[[dialogue]]
speaker = "unk"
# ついにこぼれた──アポロの本心。
line = "ついにこぼれた──アポロの本心。"

[[dialogue]]
speaker = "unk"
# その、たったひと言の瞬間だけ、仮面の瘴気は振り切られて……
line = "その、たったひと言の瞬間だけ、仮面の瘴気は振り切られて……"

[[dialogue]]
speaker = "フィオナ"
# 「……ええ」
line = "「……ええ」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
# 「あなたの願い──しかと受け取りました。姉さん！」
line = "「あなたの願い──しかと受け取りました。姉さん！」"

[[dialogue]]
speaker = "ルリエル"
# 「！　これは──！？」
line = "「！　これは──！？」"

[[dialogue]]
speaker = "ユウリ"
# 「<ruby=あか>緋</ruby>い<ruby=め>眼</ruby>……まさか……！」
line = "「<ruby>緋<rt>あか</rt></ruby>い<ruby>眼<rt>め</rt></ruby>……まさか……！」"

[[dialogue]]
speaker = "unk"
# 太陽の星力が拡散する。フィオナの魂が目覚める。
line = "太陽の星力が拡散する。フィオナの魂が目覚める。"

[[dialogue]]
speaker = "unk"
# それに至ったきっかけは──ついに引き出した、アポロからフィオナへの願い。
line = "それに至ったきっかけは──ついに引き出した、アポロからフィオナへの願い。"

[[dialogue]]
speaker = "ヴィーナス"
# （これって、もしかして──）
line = "（これって、もしかして──）"

[[dialogue]]
speaker = "クロト"
# （ああ──俺が、ヴィーナスに助けを求められた時と同じ……）
line = "（ああ──俺が、ヴィーナスに助けを求められた時と同じ……）"

[[dialogue]]
speaker = "unk"
# あの時もそうだった。
line = "あの時もそうだった。"

[[dialogue]]
speaker = "unk"
# 魔王として目覚める最後のトリガーはいつだって──かけがえのない家族からの叫び。
line = "魔王として目覚める最後のトリガーはいつだって──かけがえのない家族からの叫び。"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
# 「ありがとうございます……姉さん。待たせてごめんなさい、皆さん」
line = "「ありがとうございます……姉さん。待たせてごめんなさい、皆さん」"

[[dialogue]]
speaker = "unk"
# ついに、姉妹としての<ruby=よすが>縁</ruby>を取り戻したフィオナは、今──
line = "ついに、姉妹としての<ruby>縁<rt>よすが</rt></ruby>を取り戻したフィオナは、今──"

[[dialogue]]
speaker = "unk"
# 俺にも並ぶ完全なる魔王の器として、君臨する。
line = "俺にも並ぶ完全なる魔王の器として、君臨する。"

[[dialogue]]
speaker = "ニャリオン"
# 「エリシア嬢の中に眠る──魔王の真価なのニャン！」
line = "「エリシア嬢の中に眠る──魔王の真価なのニャン！」"

[[dialogue]]
speaker = "マトイ"
# 「緋宮くんと同じ……！」
line = "「緋宮くんと同じ……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「完全覚醒の魔王が２人──いいわね、最高じゃない……！」
line = "「完全覚醒の魔王が２人──いいわね、最高じゃない……！」"

[[dialogue]]
speaker = "クロト"
# 「この熱さは──太陽の……！」
line = "「この熱さは──太陽の……！」"

[[dialogue]]
speaker = "unk"
# フィオナを中心に燃え上がるようなオーラが噴き上がる。
line = "フィオナを中心に燃え上がるようなオーラが噴き上がる。"

[[dialogue]]
speaker = "unk"
# 星力──霊力──魔力──あらゆる熱量を己の色で練り上げた、魔王としての潜在能力だった。
line = "星力──霊力──魔力──あらゆる熱量を己の色で練り上げた、魔王としての潜在能力だった。"

[[dialogue]]
speaker = "unk"
# けれど……フィオナは新たに得たその力を、攻撃には使わなかった。
line = "けれど……フィオナは新たに得たその力を、攻撃には使わなかった。"
