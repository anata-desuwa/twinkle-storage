[[dialogue]]
speaker = "unk"
# 第３話,出動、プリマステラ,B
line = "第３話,出動、プリマステラ,B"

[[dialogue]]
speaker = "unk"
# そうして、アステラの出現地へ降り立った俺たちだが……
line = "そうして、アステラの出現地へ降り立った俺たちだが……"

[[dialogue]]
speaker = "モンスター"
# 「イイイーッ！」
line = "「イイイーッ！」"

[[dialogue]]
speaker = "市民Ａ"
# 「きゃああ！」
line = "「きゃああ！」"

[[dialogue]]
speaker = "クロト"
# 「街中にもモンスターが溢れてしまっているな……」
line = "「街中にもモンスターが溢れてしまっているな……」"

[[dialogue]]
speaker = "マトイ"
# 「流星の人たちもまだ来てないみたい。早く片付けないと危険かも」
line = "「流星の人たちもまだ来てないみたい。早く片付けないと危険かも」"

[[dialogue]]
speaker = "unk"
# アステラという巣からぼろぼろと零れるモンスターたちが、次々に周囲の建物を襲っていた。
line = "アステラという巣からぼろぼろと零れるモンスターたちが、次々に周囲の建物を襲っていた。"

[[dialogue]]
speaker = "unk"
# 早く食い止めなければ被害が甚大になる。
line = "早く食い止めなければ被害が甚大になる。"

[[dialogue]]
speaker = "クロト"
# 「しょうがない、まずは先にこれらを──」
line = "「しょうがない、まずは先にこれらを──」"

[[dialogue]]
speaker = "unk"
# 掃除してからアステラ内部へ向かおう。
line = "掃除してからアステラ内部へ向かおう。"

[[dialogue]]
speaker = "unk"
# そう言うより早く、どこからか差し込んだ閃光がモンスターを灰にした。
line = "そう言うより早く、どこからか差し込んだ閃光がモンスターを灰にした。"

[[dialogue]]
speaker = "紅明"
# 「こっちはアタシたちにお任せでいいぞ☆　ダーリン♪」
line = "「こっちはアタシたちにお任せでいいぞ☆　ダーリン♪」"

[[dialogue]]
speaker = "メルエル"
# 「会長くん！　お待たせ！」
line = "「会長くん！　お待たせ！」"

[[dialogue]]
speaker = "クロト"
# 「紅明、メルエル……プリマステラか！」
line = "「紅明、メルエル……プリマステラか！」"

[[dialogue]]
speaker = "紅明"
# 「うっしっし♪　街のピンチに出動する<ruby=スターナイト>星騎士</ruby>は星徒会だけじゃねーってことよ！」
line = "「うっしっし♪　街のピンチに出動する<ruby>星騎士<rt>スターナイト</rt></ruby>は星徒会だけじゃねーってことよ！」"

[[dialogue]]
speaker = "unk"
# 変身を終え、臨戦態勢で駆けつけてきた彼女たちは出動を許可されたプリマステラ。
line = "変身を終え、臨戦態勢で駆けつけてきた彼女たちは出動を許可されたプリマステラ。"

[[dialogue]]
speaker = "unk"
# 彼女たちはその星力をもって、周囲のモンスターたちを撃滅し始めた。
line = "彼女たちはその星力をもって、周囲のモンスターたちを撃滅し始めた。"

[[dialogue]]
speaker = "メルエル"
# 「紅明ちゃん！　ペアは初めてだけど、一緒に頑張ろうねっ」
line = "「紅明ちゃん！　ペアは初めてだけど、一緒に頑張ろうねっ」"

[[dialogue]]
speaker = "紅明"
# 「任せろってんだい☆　アタシとメルちーでバッキバキに活躍してやんぜ！」
line = "「任せろってんだい☆　アタシとメルちーでバッキバキに活躍してやんぜ！」"

[[dialogue]]
speaker = "マトイ"
# 「ペアが初めてとは思えないほどのコンビネーション……。うん、ここは２人に任せちゃって大丈夫そう」
line = "「ペアが初めてとは思えないほどのコンビネーション……。うん、ここは２人に任せちゃって大丈夫そう」"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロト。大事なことよ。リクリエの対処は、何も私たち星徒会だけの仕事じゃない──」
line = "「クロト。大事なことよ。リクリエの対処は、何も私たち星徒会だけの仕事じゃない──」"

[[dialogue]]
speaker = "ヴィーナス"
# 「新星学園、ううん流星学園も含めて。全星騎士が当たるべき責務なの」
line = "「新星学園、ううん流星学園も含めて。全星騎士が当たるべき責務なの」"

[[dialogue]]
speaker = "クロト"
# 「……なるほどな。任せるのも仕事ってことか」
line = "「……なるほどな。任せるのも仕事ってことか」"

[[dialogue]]
speaker = "unk"
# アステラ本拠地の攻略を俺たち星徒会の職務だとすれば──
line = "アステラ本拠地の攻略を俺たち星徒会の職務だとすれば──"

[[dialogue]]
speaker = "unk"
# 周囲に漏れ出たモンスターの処理は、駆けつけた彼女たちが担ってくれるということらしい。
line = "周囲に漏れ出たモンスターの処理は、駆けつけた彼女たちが担ってくれるということらしい。"

[[dialogue]]
speaker = "サーシャ"
# 「と言っても、プリマステラに選ばれるのも簡単じゃないからね～」
line = "「と言っても、プリマステラに選ばれるのも簡単じゃないからね～」"

[[dialogue]]
speaker = "サーシャ"
# 「そういう意味じゃ、紅明ちゃんもメルエルちゃんもエリートよ♪」
line = "「そういう意味じゃ、紅明ちゃんもメルエルちゃんもエリートよ♪」"

[[dialogue]]
speaker = "メルエル"
# 「あ、ありがとうございますっ。サーシャ先輩」
line = "「あ、ありがとうございますっ。サーシャ先輩」"

[[dialogue]]
speaker = "アナ"
# 「成績優秀者には褒賞もある。無理せず頑張るのが一番」
line = "「成績優秀者には褒賞もある。無理せず頑張るのが一番」"

[[dialogue]]
speaker = "unk"
# なんでも、３年間修行をしても出動許可が得られないなんて話も珍しくないそうで。
line = "なんでも、３年間修行をしても出動許可が得られないなんて話も珍しくないそうで。"

[[dialogue]]
speaker = "unk"
# そう考えると、アナの優秀さがより際立った気もする。
line = "そう考えると、アナの優秀さがより際立った気もする。"

[[dialogue]]
speaker = "マトイ"
# 「ありがとう、紅明さん。私たちは中に入ってくるから──こっちをよろしくね」
line = "「ありがとう、紅明さん。私たちは中に入ってくるから──こっちをよろしくね」"

[[dialogue]]
speaker = "紅明"
# 「がってんでい！　ま、ちゃちゃっと終わらせちゃってくれよな～☆」
line = "「がってんでい！　ま、ちゃちゃっと終わらせちゃってくれよな～☆」"

[[dialogue]]
speaker = "クロト"
# 「よし。それじゃ俺たちは根を絶ちに向かおう」
line = "「よし。それじゃ俺たちは根を絶ちに向かおう」"

[[dialogue]]
speaker = "unk"
# <size=40>アステライト【ガニメデ】</size>
line = "<size=40>アステライト【ガニメデ】</size>"

[[dialogue]]
speaker = "unk"
# そうして俺たちはアステラの内部へと突入する──
line = "そうして俺たちはアステラの内部へと突入する──"

[[dialogue]]
speaker = "unk"
# 俺が星徒会長に就任して以来、こうして乗り込むのも既に何度目かを迎えつつあった（流星に先を越されることも多々あったが）。
line = "俺が星徒会長に就任して以来、こうして乗り込むのも既に何度目かを迎えつつあった（流星に先を越されることも多々あったが）。"

[[dialogue]]
speaker = "unk"
# けれど、それでも……この場に来ると昔のトラウマがわずかにぶり返す。
line = "けれど、それでも……この場に来ると昔のトラウマがわずかにぶり返す。"

[[dialogue]]
speaker = "クロト"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "マトイ"
# 「緋宮くん……大丈夫？」
line = "「緋宮くん……大丈夫？」"

[[dialogue]]
speaker = "クロト"
# 「……ああ、大丈夫だ。今の俺はみんなを率いる立場なんだから──びびってる場合じゃないさ」
line = "「……ああ、大丈夫だ。今の俺はみんなを率いる立場なんだから──びびってる場合じゃないさ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふふふ、その意気ね！」
line = "「ふふふ、その意気ね！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それに日誌に言わせれば、むしろ世界がクロトにびびってるんだから。怖気づく必要はないわ！」
line = "「それに日誌に言わせれば、むしろ世界がクロトにびびってるんだから。怖気づく必要はないわ！」"

[[dialogue]]
speaker = "クロト"
# 「モンスターを掃討しつつ、最深部へ向かう。何が待ち受けるかわからないから用心するように」
line = "「モンスターを掃討しつつ、最深部へ向かう。何が待ち受けるかわからないから用心するように」"

[[dialogue]]
speaker = "マトイ"
# 「そっか……流星の人たちが会った……堕天使、だっけ？」
line = "「そっか……流星の人たちが会った……堕天使、だっけ？」"

[[dialogue]]
speaker = "アナ"
# 「それはそれで拝んでみたい気持ちもありますが」
line = "「それはそれで拝んでみたい気持ちもありますが」"

[[dialogue]]
speaker = "サーシャ"
# 「天使さんなのに黒いなんて、変よね～」
line = "「天使さんなのに黒いなんて、変よね～」"

[[dialogue]]
speaker = "unk"
# フィーニスの塔で出会った“守護天使”マグダレナさん──
line = "フィーニスの塔で出会った“守護天使”マグダレナさん──"

[[dialogue]]
speaker = "unk"
# フィオナたちが出会った時の彼女は、瘴気に冒されていたという。
line = "フィオナたちが出会った時の彼女は、瘴気に冒されていたという。"

[[dialogue]]
speaker = "クロト"
# 「もし見かけたら俺たちが解放するしかない。慎重に進もう」
line = "「もし見かけたら俺たちが解放するしかない。慎重に進もう」"
