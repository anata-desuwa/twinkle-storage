[[dialogue]]
speaker = "unk"
# 第２話,任務は忠実に,P
line = "第２話,任務は忠実に,P"

[[dialogue]]
speaker = "カヤ"
# 「ここが人間界……」
line = "「ここが人間界……」"

[[dialogue]]
speaker = "カヤ"
# 「随分と騒がしいところ……。それに死角も多い……。不意に襲われたらひとたまりもなさそう……」
line = "「随分と騒がしいところ……。それに死角も多い……。不意に襲われたらひとたまりもなさそう……」"

[[dialogue]]
speaker = "カヤ"
# 「長官は気楽にって言ってたけど……中々ハードな任務になりそう」
line = "「長官は気楽にって言ってたけど……中々ハードな任務になりそう」"

[[dialogue]]
speaker = "unk"
# ……本当にずっと付いてくるつもり？
line = "……本当にずっと付いてくるつもり？"

[[dialogue]]
speaker = "カヤ"
# 「だとしたら何？　文句は受け付けない」
line = "「だとしたら何？　文句は受け付けない」"

[[dialogue]]
speaker = "カヤ"
# 「それよりも……んっ。もっとくっつく」
line = "「それよりも……んっ。もっとくっつく」"

[[dialogue]]
speaker = "カヤ"
# 「自分が護衛対象の自覚ある？　あまり離れられるといざという時、守ることできない」
line = "「自分が護衛対象の自覚ある？　あまり離れられるといざという時、守ることできない」"

[[dialogue]]
speaker = "カヤ"
# 「それとも私が年下だと思ってやっぱり舐めてる？　これでも私の普段の任務は単独での隠密潜行。何事も一人で切り抜ける実力は備えてる」
line = "「それとも私が年下だと思ってやっぱり舐めてる？　これでも私の普段の任務は単独での隠密潜行。何事も一人で切り抜ける実力は備えてる」"

[[dialogue]]
speaker = "カヤ"
# 「それに……その場に溶け込むことに関しても得意中の得意。こうしてくっついているのだって周りを観察してのこと」
line = "「それに……その場に溶け込むことに関しても得意中の得意。こうしてくっついているのだって周りを観察してのこと」"

[[dialogue]]
speaker = "カヤ"
# 「……なに苦笑いしてる。よく見る。周囲の男女、みんなこのくらいの密着度合いで歩いてる」
line = "「……なに苦笑いしてる。よく見る。周囲の男女、みんなこのくらいの密着度合いで歩いてる」"

[[dialogue]]
speaker = "カヤ"
# 「あとは……ん。手を繋げば完璧。……にしても妙な手の繋ぎ方。あんなの見たことない……」
line = "「あとは……ん。手を繋げば完璧。……にしても妙な手の繋ぎ方。あんなの見たことない……」"

[[dialogue]]
speaker = "unk"
# それはカップルだからで……
line = "それはカップルだからで……"

[[dialogue]]
speaker = "カヤ"
# 「かっぷる……？　どういう意味？　わからない。もっとちゃんと教える」
line = "「かっぷる……？　どういう意味？　わからない。もっとちゃんと教える」"

[[dialogue]]
speaker = "カヤ"
# 「ん……。んん……？　～～っっ！！？」
line = "「ん……。んん……？　～～っっ！！？」"

[[dialogue]]
speaker = "カヤ"
# 「な、なにバカなこと言ってる……！！　私とあなた、そういう仲なわけない……！！」
line = "「な、なにバカなこと言ってる……！！　私とあなた、そういう仲なわけない……！！」"

[[dialogue]]
speaker = "カヤ"
# 「でも、だからといって離れられるのは……。離れられたらあなたを護衛しろって命令、守れない……」
line = "「でも、だからといって離れられるのは……。離れられたらあなたを護衛しろって命令、守れない……」"

[[dialogue]]
speaker = "カヤ"
# 「仕方ないから、その……このままでいい。ほ、ほら手も繋ぐっ。あの変な繋ぎ方、する……！」
line = "「仕方ないから、その……このままでいい。ほ、ほら手も繋ぐっ。あの変な繋ぎ方、する……！」"

[[dialogue]]
speaker = "カヤ"
# 「──ひゃっ！？　に、握りすぎ……！　加減考える……！　そんなに握られたら動きづらい、わからない！？」
line = "「──ひゃっ！？　に、握りすぎ……！　加減考える……！　そんなに握られたら動きづらい、わからない！？」"

[[dialogue]]
speaker = "カヤ"
# 「はぁ……もう。すごく疲れる。やっぱりこの任務、かなりハード。今までの受けてきた命令の中で一番かもしれない」
line = "「はぁ……もう。すごく疲れる。やっぱりこの任務、かなりハード。今までの受けてきた命令の中で一番かもしれない」"

[[dialogue]]
speaker = "カヤ"
# 「街の人間もみんな能天気で……危機感がまるで足りない。みんな、バカみたいにはしゃぎ回ってる」
line = "「街の人間もみんな能天気で……危機感がまるで足りない。みんな、バカみたいにはしゃぎ回ってる」"

[[dialogue]]
speaker = "カヤ"
# 「一体、何がそんなに楽しい。ただ街歩いてるだけなのに」
line = "「一体、何がそんなに楽しい。ただ街歩いてるだけなのに」"

[[dialogue]]
speaker = "unk"
# カヤはこういう雰囲気は苦手？
line = "カヤはこういう雰囲気は苦手？"

[[dialogue]]
speaker = "カヤ"
# 「別に得意でも苦手でもない。どうだっていい」
line = "「別に得意でも苦手でもない。どうだっていい」"

[[dialogue]]
speaker = "カヤ"
# 「私はただ与えられた命令を守るだけ。兵隊に感情は要らない」
line = "「私はただ与えられた命令を守るだけ。兵隊に感情は要らない」"

[[dialogue]]
speaker = "カヤ"
# 「私はネビュラが持つ一振りの剣。所有者が振り下ろそうとするのなら、振り下ろされるのを待つだけだから」
line = "「私はネビュラが持つ一振りの剣。所有者が振り下ろそうとするのなら、振り下ろされるのを待つだけだから」"

[[dialogue]]
speaker = "カヤ"
# 「あなたも私のことは空気だとでも思うといい。ああしてバカ騒ぎしたいのなら騒げばいい」
line = "「あなたも私のことは空気だとでも思うといい。ああしてバカ騒ぎしたいのなら騒げばいい」"

[[dialogue]]
speaker = "カヤ"
# 「あなたのことはなんとも思ってないけど……今はあなたを守れという命令受けてる。一人ではしゃいでる最中もきちんと守ってあげるつもり」
line = "「あなたのことはなんとも思ってないけど……今はあなたを守れという命令受けてる。一人ではしゃいでる最中もきちんと守ってあげるつもり」"

[[dialogue]]
speaker = "unk"
# ……ちょっと待ってて？
line = "……ちょっと待ってて？"

[[dialogue]]
speaker = "カヤ"
# 「なっ、どこ行く。単独行動、やめる……！」
line = "「なっ、どこ行く。単独行動、やめる……！」"

[[dialogue]]
speaker = "カヤ"
# 「……何これ？　最近、街で流行ってるカレーパン……？　別に要らない。携帯食なら持ってる」
line = "「……何これ？　最近、街で流行ってるカレーパン……？　別に要らない。携帯食なら持ってる」"

[[dialogue]]
speaker = "カヤ"
# 「……チっ。食べろ食べろ、うるさい。もしも毒が入っていたらどうする」
line = "「……チっ。食べろ食べろ、うるさい。もしも毒が入っていたらどうする」"

[[dialogue]]
speaker = "カヤ"
# 「あっ、自分で食べようとするのやめるっ。だから毒の危険が──！　……わかった、私に渡す。毒味するから」
line = "「あっ、自分で食べようとするのやめるっ。だから毒の危険が──！　……わかった、私に渡す。毒味するから」"

[[dialogue]]
speaker = "カヤ"
# 「はむ……。～～っっ！？　お、美味しい。揚げたて……ホカホカ……。はむむ……はむはむ……」
line = "「はむ……。～～っっ！？　お、美味しい。揚げたて……ホカホカ……。はむむ……はむはむ……」"

[[dialogue]]
speaker = "unk"
# 全部食べちゃったな
line = "全部食べちゃったな"

[[dialogue]]
speaker = "カヤ"
# 「こ、これは違っ。どこに毒入ってるかわからないから、でっ……！」
line = "「こ、これは違っ。どこに毒入ってるかわからないから、でっ……！」"

[[dialogue]]
speaker = "カヤ"
# 「っっ！！　そのにやけ面やめる……！　言いたいことあるならハッキリ言えばいい……！」
line = "「っっ！！　そのにやけ面やめる……！　言いたいことあるならハッキリ言えばいい……！」"

[[dialogue]]
speaker = "unk"
# 思ったより普通の子みたいで安心したよ
line = "思ったより普通の子みたいで安心したよ"

[[dialogue]]
speaker = "カヤ"
# 「～～っっ！！　私を舐めるの大概にする……！　それ以上言ったら背後からブスリと刺す……！」
line = "「～～っっ！！　私を舐めるの大概にする……！　それ以上言ったら背後からブスリと刺す……！」"

[[dialogue]]
speaker = "カヤ"
# 「無駄話は終わり……！　それより早くこの場から移動する。万が一、尾行者いたらそれで釣り出せるから……！」
line = "「無駄話は終わり……！　それより早くこの場から移動する。万が一、尾行者いたらそれで釣り出せるから……！」"

[[dialogue]]
speaker = "店員"
# 「あ、そこいくカップルさ～ん。アイスクリームは如何ですか？　美味しいですよ～？」
line = "「あ、そこいくカップルさ～ん。アイスクリームは如何ですか？　美味しいですよ～？」"

[[dialogue]]
speaker = "カヤ"
# 「あいす……くりーむ？」
line = "「あいす……くりーむ？」"

[[dialogue]]
speaker = "カヤ"
# 「……何またニヤニヤしてる。あんなの食べさせるわけにはいかない。毒入ってる可能性ある、さっきから言ってる」
line = "「……何またニヤニヤしてる。あんなの食べさせるわけにはいかない。毒入ってる可能性ある、さっきから言ってる」"

[[dialogue]]
speaker = "カヤ"
# 「でも……」
line = "「でも……」"

[[dialogue]]
speaker = "カヤ"
# 「私に、その……先に毒味させるなら、いい」
line = "「私に、その……先に毒味させるなら、いい」"
