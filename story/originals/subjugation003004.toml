[[dialogue]]
speaker = "unk"
# 翌日の放課後。アムとナミエルとスノーマンは流星学園の中庭に集まっていた。
line = "翌日の放課後。アムとナミエルとスノーマンは流星学園の中庭に集まっていた。"

[[dialogue]]
speaker = "ナミエル"
# 「それでアム先輩、スノーマンの体を作るということですが……」
line = "「それでアム先輩、スノーマンの体を作るということですが……」"

[[dialogue]]
speaker = "アム"
# 「うん！　昨日言った通り、本物の雪を使って『雪だるま』を作ってあげるんだよ♪」
line = "「うん！　昨日言った通り、本物の雪を使って『雪だるま』を作ってあげるんだよ♪」"

[[dialogue]]
speaker = "ナミエル"
# 「で、それを触媒として、霊を降ろすみたいにスノーマンが憑依すると……そんなこと可能なんですか？」
line = "「で、それを触媒として、霊を降ろすみたいにスノーマンが憑依すると……そんなこと可能なんですか？」"

[[dialogue]]
speaker = "アム"
# 「正直どうなるかはわからないけど、スノーマンと一緒に記念写真も撮りたいし、動かずに悩むよりは、とりあえず試してみようよ！」
line = "「正直どうなるかはわからないけど、スノーマンと一緒に記念写真も撮りたいし、動かずに悩むよりは、とりあえず試してみようよ！」"

[[dialogue]]
speaker = "アム"
# 「それに会長も言っていたけど、スノーマンの望みが叶うことで、もしかしたら記憶が戻るかもしれないじゃん？　それなら一石二鳥だしね♪」
line = "「それに会長も言っていたけど、スノーマンの望みが叶うことで、もしかしたら記憶が戻るかもしれないじゃん？　それなら一石二鳥だしね♪」"

[[dialogue]]
speaker = "スノーマン"
# 「ボク、体を作ってもらえるなら、嬉しい！　どんな体になるのかな？　ワクワク♪」
line = "「ボク、体を作ってもらえるなら、嬉しい！　どんな体になるのかな？　ワクワク♪」"

[[dialogue]]
speaker = "ナミエル"
# （ワクワクしているスノーマン、可愛い……）
line = "（ワクワクしているスノーマン、可愛い……）"

[[dialogue]]
speaker = "ナミエル"
# 「――こほん。とりあえず、アム先輩の言っていることも、確かに一理ありますので、やってみましょう」
line = "「――こほん。とりあえず、アム先輩の言っていることも、確かに一理ありますので、やってみましょう」"

[[dialogue]]
speaker = "ナミエル"
# 「ですが、肝心の雪はどうするつもりですか？　見ての通り、雪は全く降っていませんが……」
line = "「ですが、肝心の雪はどうするつもりですか？　見ての通り、雪は全く降っていませんが……」"

[[dialogue]]
speaker = "アム"
# 「それなら大丈夫！　ＤＩＳＣで雪が積もっている場所はちゃんとリサーチしておいたから♪」
line = "「それなら大丈夫！　ＤＩＳＣで雪が積もっている場所はちゃんとリサーチしておいたから♪」"

[[dialogue]]
speaker = "ナミエル"
# 「は？　積もっている場所って……」
line = "「は？　積もっている場所って……」"

[[dialogue]]
speaker = "アム"
# 「――よいしょっと♪　さあさあ、ナミエル、スノーマン！　ソリに乗った乗った～♪　行っくよ～？」
line = "「――よいしょっと♪　さあさあ、ナミエル、スノーマン！　ソリに乗った乗った～♪　行っくよ～？」"

[[dialogue]]
speaker = "ナミエル"
# 「えっ、足元にソリが召喚されて……？　先輩、ちょっと待っ――」
line = "「えっ、足元にソリが召喚されて……？　先輩、ちょっと待っ――」"

[[dialogue]]
speaker = "アム"
# 「トナカイアム、出発進行～～っ♪」
line = "「トナカイアム、出発進行～～っ♪」"

[[dialogue]]
speaker = "ナミエル"
# 「きゃあぁっ！？」
line = "「きゃあぁっ！？」"

[[dialogue]]
speaker = "スノーマンL"
# 「わ～♪　アム、北風よりも速い速～い♪」
line = "「わ～♪　アム、北風よりも速い速～い♪」"

[[dialogue]]
speaker = "アム"
# 「ふっふっふ～♪　これがあたしのクリスマスフォームの能力だよ！　ヒトや物をソリに乗せて、それがたとえどんなに重くても、無重力にして引っ張ることができるんだ～♪」
line = "「ふっふっふ～♪　これがあたしのクリスマスフォームの能力だよ！　ヒトや物をソリに乗せて、それがたとえどんなに重くても、無重力にして引っ張ることができるんだ～♪」"

[[dialogue]]
speaker = "ナミエル"
# 「――先輩！　アム先輩ってば！」
line = "「――先輩！　アム先輩ってば！」"

[[dialogue]]
speaker = "アム"
# 「ん？　ナミエル、どうかした？」
line = "「ん？　ナミエル、どうかした？」"

[[dialogue]]
speaker = "ナミエル"
# 「まさか、雪の積もっている地方まで向かう気なんですか！？」
line = "「まさか、雪の積もっている地方まで向かう気なんですか！？」"

[[dialogue]]
speaker = "アム"
# 「うん！　そうだけど～？」
line = "「うん！　そうだけど～？」"

[[dialogue]]
speaker = "ナミエル"
# 「別にそこまでしなくても、氷星術が得意な星騎士にお願いしてみるとかあるんじゃ！？　たとえば、新星星徒会のサーシャ先輩にとか！」
line = "「別にそこまでしなくても、氷星術が得意な星騎士にお願いしてみるとかあるんじゃ！？　たとえば、新星星徒会のサーシャ先輩にとか！」"

[[dialogue]]
speaker = "アム"
# 「はっ！　その手があったか！」
line = "「はっ！　その手があったか！」"

[[dialogue]]
speaker = "unk"
# 空中で急停止するアム。
line = "空中で急停止するアム。"

[[dialogue]]
speaker = "ナミエル"
# 「アム先輩って多分、頭よりも先に体が動くタイプですよね……」
line = "「アム先輩って多分、頭よりも先に体が動くタイプですよね……」"

[[dialogue]]
speaker = "アム"
# 「いや～、それほどでも～♪　反射神経には自信があるからね！」
line = "「いや～、それほどでも～♪　反射神経には自信があるからね！」"

[[dialogue]]
speaker = "ナミエル"
# 「いや、褒めるつもりで言ったわけではないんですけど……」
line = "「いや、褒めるつもりで言ったわけではないんですけど……」"

[[dialogue]]
speaker = "unk"
# それからすぐに学園へ引き返した２人は、サーシャに頼みに行き、雪だるま作成に必要な分の雪を出してもらえることになった。
line = "それからすぐに学園へ引き返した２人は、サーシャに頼みに行き、雪だるま作成に必要な分の雪を出してもらえることになった。"

[[dialogue]]
speaker = "サーシャ"
# 「あら～♪　お姉ちゃん、もちろん協力するわ～♪」
line = "「あら～♪　お姉ちゃん、もちろん協力するわ～♪」"

[[dialogue]]
speaker = "アム"
# 「というわけで、雪を確保して、雪だるまを作り始めたのはいいんだけど……」
line = "「というわけで、雪を確保して、雪だるまを作り始めたのはいいんだけど……」"

[[dialogue]]
speaker = "ナミエル"
# 「ふむ……」
line = "「ふむ……」"

[[dialogue]]
speaker = "unk"
# ナミエルが顎を擦りながら、見た目も大きさもスノーマンそっくりに作り上げた雪だるまを、真剣な眼差しで見つめている。
line = "ナミエルが顎を擦りながら、見た目も大きさもスノーマンそっくりに作り上げた雪だるまを、真剣な眼差しで見つめている。"

[[dialogue]]
speaker = "アム"
# 「ね、ねぇ、スノーマン？　めっちゃいい出来だと思うよね？」
line = "「ね、ねぇ、スノーマン？　めっちゃいい出来だと思うよね？」"

[[dialogue]]
speaker = "スノーマン"
# 「うん、ボクにそっくりさんだと思う！」
line = "「うん、ボクにそっくりさんだと思う！」"

[[dialogue]]
speaker = "アム"
# 「だってさ、ナミエル！　だから――」
line = "「だってさ、ナミエル！　だから――」"

[[dialogue]]
speaker = "ナミエル"
# 「いえ、これではダメです。――えいっ」
line = "「いえ、これではダメです。――えいっ」"

[[dialogue]]
speaker = "unk"
# ――グシャアァッ！！
line = "――グシャアァッ！！"

[[dialogue]]
speaker = "アム"
# 「うわあああぁぁぁっ！？　またぺしゃんこにされたぁっ！？」
line = "「うわあああぁぁぁっ！？　またぺしゃんこにされたぁっ！？」"

[[dialogue]]
speaker = "unk"
# ナミエルはスコップを勢いよく振り下ろして、雪だるまを完全粉砕してしまった。
line = "ナミエルはスコップを勢いよく振り下ろして、雪だるまを完全粉砕してしまった。"

[[dialogue]]
speaker = "スノーマン"
# 「ぼ、ボクのそっくりさん……また死んだ……！」
line = "「ぼ、ボクのそっくりさん……また死んだ……！」"

[[dialogue]]
speaker = "アム"
# 「もう完成でもいいくらい、いい出来だったのに……！」
line = "「もう完成でもいいくらい、いい出来だったのに……！」"

[[dialogue]]
speaker = "ナミエル"
# 「いいえ、残念ながらダメです。左右の目のバランスが本物のスノーマンに比べ、数ミリずれていました。あれではスノーマンの可愛さを再現できていません」
line = "「いいえ、残念ながらダメです。左右の目のバランスが本物のスノーマンに比べ、数ミリずれていました。あれではスノーマンの可愛さを再現できていません」"

[[dialogue]]
speaker = "アム"
# 「それだったら、ちょっと修正すればよくない！？　全部壊してやり直す必要ある！？」
line = "「それだったら、ちょっと修正すればよくない！？　全部壊してやり直す必要ある！？」"

[[dialogue]]
speaker = "ナミエル"
# 「アム先輩、甘いです。目が数ミリずれたまま最後の段階まで気づかなかったということは、全体のバランスのどこかに小さな歪みがあったということ」
line = "「アム先輩、甘いです。目が数ミリずれたまま最後の段階まで気づかなかったということは、全体のバランスのどこかに小さな歪みがあったということ」"

[[dialogue]]
speaker = "ナミエル"
# 「もし完璧な可愛さの黄金比に辿り着けているならば、細かい調整など必要なく、パズルのピースがぴったりハマるように、最後のズレが自然となくなるはずなんです」
line = "「もし完璧な可愛さの黄金比に辿り着けているならば、細かい調整など必要なく、パズルのピースがぴったりハマるように、最後のズレが自然となくなるはずなんです」"

[[dialogue]]
speaker = "アム"
# 「い、言ってることが高度過ぎて、全然わからない……！」
line = "「い、言ってることが高度過ぎて、全然わからない……！」"

[[dialogue]]
speaker = "unk"
# それから、ナミエルは数多の創造と破壊を繰り返し、ついに雪だるまを完成させる。
line = "それから、ナミエルは数多の創造と破壊を繰り返し、ついに雪だるまを完成させる。"

[[dialogue]]
speaker = "ナミエル"
# 「できました……！　これで寸分の狂いもなく、完璧にそっくりです！」
line = "「できました……！　これで寸分の狂いもなく、完璧にそっくりです！」"

[[dialogue]]
speaker = "アム"
# 「お、おぉう。素晴らしい出来なんじゃないかな、うん……！」
line = "「お、おぉう。素晴らしい出来なんじゃないかな、うん……！」"

[[dialogue]]
speaker = "ナミエル"
# 「我ながら傑作……！　可愛いの神髄がちょっと垣間見れた気がします……！」
line = "「我ながら傑作……！　可愛いの神髄がちょっと垣間見れた気がします……！」"

[[dialogue]]
speaker = "アム"
# 「ソダネ、スゴイネ～、アハハハ……」
line = "「ソダネ、スゴイネ～、アハハハ……」"

[[dialogue]]
speaker = "アム"
# （途中からあたしにはもう、何がどう変わったのか、全然わからなかったけども……！）
line = "（途中からあたしにはもう、何がどう変わったのか、全然わからなかったけども……！）"

[[dialogue]]
speaker = "アム"
# 「と、とりあえず完成したし、あとはスノーマンがこの雪だるまと融合できれば、目標達成ってことだよね？」
line = "「と、とりあえず完成したし、あとはスノーマンがこの雪だるまと融合できれば、目標達成ってことだよね？」"

[[dialogue]]
speaker = "スノーマン"
# 「うんっ、ボク、試してみる……！」
line = "「うんっ、ボク、試してみる……！」"

[[dialogue]]
speaker = "unk"
# スノーマンは頷くと、幽霊が憑依するみたいに、すっと雪だるまに吸い込まれていき――
line = "スノーマンは頷くと、幽霊が憑依するみたいに、すっと雪だるまに吸い込まれていき――"

[[dialogue]]
speaker = "スノーマンL"
# 「――できた……！　これでボク、本物の雪だるまの体になった♪」
line = "「――できた……！　これでボク、本物の雪だるまの体になった♪」"

[[dialogue]]
speaker = "アム"
# 「どれどれ～、ＤＩＳＣのカメラを起動して……本当だ！　スノーマン、カメラに映るようになってるよ！」
line = "「どれどれ～、ＤＩＳＣのカメラを起動して……本当だ！　スノーマン、カメラに映るようになってるよ！」"

[[dialogue]]
speaker = "ナミエル"
# 「やりましたね……！　完璧な可愛さを追求した甲斐があります」
line = "「やりましたね……！　完璧な可愛さを追求した甲斐があります」"

[[dialogue]]
speaker = "アム"
# 「それじゃあ、ナミエル、スノーマン！　このまま３人で記念撮影をしちゃおう♪」
line = "「それじゃあ、ナミエル、スノーマン！　このまま３人で記念撮影をしちゃおう♪」"

[[dialogue]]
speaker = "unk"
# アムはそれから、２人を近くに抱き寄せて、カメラの画角内に収まるようにする。
line = "アムはそれから、２人を近くに抱き寄せて、カメラの画角内に収まるようにする。"

[[dialogue]]
speaker = "ナミエル"
# 「ちょっ……アム先輩！　くっ付き過ぎです！」
line = "「ちょっ……アム先輩！　くっ付き過ぎです！」"

[[dialogue]]
speaker = "アム"
# 「物理的に離れられないんだから、仕方ないじゃん♪　ほら、スノーマンも、もうちょっと寄って寄って～♪」
line = "「物理的に離れられないんだから、仕方ないじゃん♪　ほら、スノーマンも、もうちょっと寄って寄って～♪」"

[[dialogue]]
speaker = "スノーマンL"
# 「うんっ♪」
line = "「うんっ♪」"

[[dialogue]]
speaker = "アム"
# 「あっ、冷たっ！？　スノーマン、本物の雪になったから、めっちゃ冷た～い！」
line = "「あっ、冷たっ！？　スノーマン、本物の雪になったから、めっちゃ冷た～い！」"

[[dialogue]]
speaker = "アム"
# 「って、あっ！？　間違ってタップしちゃった！　今の絶対、カッコよくない変な顔で写ってるからやり直しで～！」
line = "「って、あっ！？　間違ってタップしちゃった！　今の絶対、カッコよくない変な顔で写ってるからやり直しで～！」"

[[dialogue]]
speaker = "ナミエル"
# 「えっ、そうですか？　私は別にそこまで気にしなくてもと思いますが……」
line = "「えっ、そうですか？　私は別にそこまで気にしなくてもと思いますが……」"

[[dialogue]]
speaker = "アム"
# 「いや、絶対変顔してるし！　――ほらぁ！」
line = "「いや、絶対変顔してるし！　――ほらぁ！」"

[[dialogue]]
speaker = "unk"
# ＤＩＳＣの写真を見せて喚くアム。
line = "ＤＩＳＣの写真を見せて喚くアム。"

[[dialogue]]
speaker = "ナミエル"
# 「……ぷっ、ふふっ……！　――いえ、これで行きましょう」
line = "「……ぷっ、ふふっ……！　――いえ、これで行きましょう」"

[[dialogue]]
speaker = "アム"
# 「いや、いま笑ったよね！？」
line = "「いや、いま笑ったよね！？」"

[[dialogue]]
speaker = "スノーマン"
# 「ふふっ、写真に写ってるアムの顔、面白い……！」
line = "「ふふっ、写真に写ってるアムの顔、面白い……！」"

[[dialogue]]
speaker = "アム"
# 「スノーマンも笑ってるし！　やっぱり、やり直し～～っ！！」
line = "「スノーマンも笑ってるし！　やっぱり、やり直し～～っ！！」"

[[dialogue]]
speaker = "unk"
# そんな風にドタバタしつつも――その後、ちゃんと無事に記念写真を撮ることができた３人なのだった。
line = "そんな風にドタバタしつつも――その後、ちゃんと無事に記念写真を撮ることができた３人なのだった。"
