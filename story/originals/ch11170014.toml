[[dialogue]]
speaker = "unk"
# 第４話,素直すぎる子と素直になれない子,P
line = "第４話,素直すぎる子と素直になれない子,P"

[[dialogue]]
speaker = "unk"
# 新星学園のカフェテリアには、お腹を空かせたエンジュとメテオラの姿があった。
line = "新星学園のカフェテリアには、お腹を空かせたエンジュとメテオラの姿があった。"

[[dialogue]]
speaker = "メテオラ"
# 「ジューシーハンバーグと揚げたてドーナツ、持ってきたぞー！　めちゃめちゃうまそーだなー！」
line = "「ジューシーハンバーグと揚げたてドーナツ、持ってきたぞー！　めちゃめちゃうまそーだなー！」"

[[dialogue]]
speaker = "エンジュ"
# 「おお……ドーナツがまだじゅわじゅわ鳴ってる……！」
line = "「おお……ドーナツがまだじゅわじゅわ鳴ってる……！」"

[[dialogue]]
speaker = "メテオラ"
# 「いっただきまーす！　ばくっ！　ん～～～っ！？　なんだこれ、うまぁああぁぁ！　こんなにふわふわなのに、汁がじょばじょばなハンバーグ初めてだぞーー！」
line = "「いっただきまーす！　ばくっ！　ん～～～っ！？　なんだこれ、うまぁああぁぁ！　こんなにふわふわなのに、汁がじょばじょばなハンバーグ初めてだぞーー！」"

[[dialogue]]
speaker = "エンジュ"
# 「はぁぁん……揚げたてのドーナツは格別ぅ……！」
line = "「はぁぁん……揚げたてのドーナツは格別ぅ……！」"

[[dialogue]]
speaker = "メテオラ"
# 「ドーナツもおいしそうだなー！　あたしにも一口くれだぞ！」
line = "「ドーナツもおいしそうだなー！　あたしにも一口くれだぞ！」"

[[dialogue]]
speaker = "エンジュ"
# 「いいけど、ハンバーグとトレードだからな」
line = "「いいけど、ハンバーグとトレードだからな」"

[[dialogue]]
speaker = "メテオラ"
# 「やったー！　ぱくっ、もぐもぐ……ん～～っ！　ドーナツもうめー！」
line = "「やったー！　ぱくっ、もぐもぐ……ん～～っ！　ドーナツもうめー！」"

[[dialogue]]
speaker = "エンジュ"
# 「おい！　半分以上食べたな！　メテオラの一口は大きすぎるんだよ。まったく……ハンバーグもらうぞ、もぐもぐ」
line = "「おい！　半分以上食べたな！　メテオラの一口は大きすぎるんだよ。まったく……ハンバーグもらうぞ、もぐもぐ」"

[[dialogue]]
speaker = "エンジュ"
# 「……ッ！　なんてジューシーな……肉汁ほとばしるハンバーグだ……！　クズ肉の寄せ集めとは比べ物にならない……！」
line = "「……ッ！　なんてジューシーな……肉汁ほとばしるハンバーグだ……！　クズ肉の寄せ集めとは比べ物にならない……！」"

[[dialogue]]
speaker = "メテオラ"
# 「だろー！？　すごいよなー！　魔王オススメのお店に来て良かったなー！」
line = "「だろー！？　すごいよなー！　魔王オススメのお店に来て良かったなー！」"

[[dialogue]]
speaker = "エンジュ"
# 「……ああ。監視されてはいるが、まさかメテオラと２人で、こんな自由に行動できるとはな」
line = "「……ああ。監視されてはいるが、まさかメテオラと２人で、こんな自由に行動できるとはな」"

[[dialogue]]
speaker = "メテオラ"
# 「魔王が許してくれたらしいけど、やっぱりいいやつなんだな！　あたし、魔王のこと、好きだぞ！」
line = "「魔王が許してくれたらしいけど、やっぱりいいやつなんだな！　あたし、魔王のこと、好きだぞ！」"

[[dialogue]]
speaker = "エンジュ"
# 「そう簡単に心を許すな。隙を見せたら付けこまれるぞ。……まあ、その素直さがメテオラのいいところか」
line = "「そう簡単に心を許すな。隙を見せたら付けこまれるぞ。……まあ、その素直さがメテオラのいいところか」"

[[dialogue]]
speaker = "メテオラ"
# 「褒められたぞー！　へへへ、ありがとな！　エンジュは魔王のこと、嫌いか？」
line = "「褒められたぞー！　へへへ、ありがとな！　エンジュは魔王のこと、嫌いか？」"

[[dialogue]]
speaker = "エンジュ"
# 「は？　まあ……嫌いではない……かな」
line = "「は？　まあ……嫌いではない……かな」"

[[dialogue]]
speaker = "メテオラ"
# 「嫌いの反対は好きだな？　そっかー、エンジュも魔王が好きなんだなー！　あたしとおんなじだぞ！」
line = "「嫌いの反対は好きだな？　そっかー、エンジュも魔王が好きなんだなー！　あたしとおんなじだぞ！」"

[[dialogue]]
speaker = "エンジュ"
# 「あまり大きな声で叫ぶな。魔王に聞かれていたらどうする」
line = "「あまり大きな声で叫ぶな。魔王に聞かれていたらどうする」"

[[dialogue]]
speaker = "メテオラ"
# 「どうもしないぞー？　聞かれてたら困るのか？　好きなら好きって、はっきり言った方がいいんだぞ？　ちゃんと言わなきゃ気持ちは伝わんないからな！」
line = "「どうもしないぞー？　聞かれてたら困るのか？　好きなら好きって、はっきり言った方がいいんだぞ？　ちゃんと言わなきゃ気持ちは伝わんないからな！」"

[[dialogue]]
speaker = "エンジュ"
# 「ぐっ……もっともらしく言うじゃないか……どうせメテオラの言っている『好き』はお子様の『好き』だ。あたしみたいな大人の『好き』とは違うんだよ」
line = "「ぐっ……もっともらしく言うじゃないか……どうせメテオラの言っている『好き』はお子様の『好き』だ。あたしみたいな大人の『好き』とは違うんだよ」"

[[dialogue]]
speaker = "メテオラ"
# 「お子様の『好き』と、大人の『好き』～？　なんだそれー！　『好き』ってたくさんあるのかー！？　あたしはハンバーグも好きだし、エンジュも好きだぞ！」
line = "「お子様の『好き』と、大人の『好き』～？　なんだそれー！　『好き』ってたくさんあるのかー！？　あたしはハンバーグも好きだし、エンジュも好きだぞ！」"

[[dialogue]]
speaker = "エンジュ"
# 「いや食べ物と一緒にするな。メテオラの言っている『好き』は、なんというか……その……『抱かれてもいい』の好きじゃないだろう？」
line = "「いや食べ物と一緒にするな。メテオラの言っている『好き』は、なんというか……その……『抱かれてもいい』の好きじゃないだろう？」"

[[dialogue]]
speaker = "メテオラ"
# 「そんなことないぞ！　魔王になら抱かれたいな！」
line = "「そんなことないぞ！　魔王になら抱かれたいな！」"

[[dialogue]]
speaker = "エンジュ"
# 「んなぁっ！？　だから、お前は声がデカいんだ！　ボリュームをもっと落とせ！」
line = "「んなぁっ！？　だから、お前は声がデカいんだ！　ボリュームをもっと落とせ！」"

[[dialogue]]
speaker = "メテオラ"
# 「もががーっ！？」
line = "「もががーっ！？」"

[[dialogue]]
speaker = "エンジュ"
# 「驚かせるなよ……でもまさかメテオラがそんな言葉を知っているなんて……」
line = "「驚かせるなよ……でもまさかメテオラがそんな言葉を知っているなんて……」"

[[dialogue]]
speaker = "メテオラ"
# 「魔王にぎゅーってされちゃダメなのかー？　でも、あたしがやったら壊しちゃうしなー」
line = "「魔王にぎゅーってされちゃダメなのかー？　でも、あたしがやったら壊しちゃうしなー」"

[[dialogue]]
speaker = "エンジュ"
# 「『ぎゅーっ』？　抱かれるって、ハグのことか！？」
line = "「『ぎゅーっ』？　抱かれるって、ハグのことか！？」"

[[dialogue]]
speaker = "メテオラ"
# 「ん？　『抱かれる』って違う意味があるのか？　エンジュはあたしが知らないこといっぱい知ってるな！　賢いぞ！」
line = "「ん？　『抱かれる』って違う意味があるのか？　エンジュはあたしが知らないこといっぱい知ってるな！　賢いぞ！」"

[[dialogue]]
speaker = "エンジュ"
# 「な、ない！　『抱かれる』に他の意味なんて何もないからな！　メテオラはそのままでいてくれ！」
line = "「な、ない！　『抱かれる』に他の意味なんて何もないからな！　メテオラはそのままでいてくれ！」"

[[dialogue]]
speaker = "メテオラ"
# 「ん～？　エンジュ、顔、真っ赤だぞ」
line = "「ん～？　エンジュ、顔、真っ赤だぞ」"

[[dialogue]]
speaker = "エンジュ"
# 「赤くなんてなってない！」
line = "「赤くなんてなってない！」"

[[dialogue]]
speaker = "メテオラ"
# 「なってるぞ！　怪しいなー！　そうだ、魔王に聞いてみよう！」
line = "「なってるぞ！　怪しいなー！　そうだ、魔王に聞いてみよう！」"

[[dialogue]]
speaker = "エンジュ"
# 「ばかー！　それだけは、絶っっっっ対に駄目だ！」
line = "「ばかー！　それだけは、絶っっっっ対に駄目だ！」"

[[dialogue]]
speaker = "メテオラ"
# 「お、おう、わかった。ぜったいにダメなんだな？」
line = "「お、おう、わかった。ぜったいにダメなんだな？」"

[[dialogue]]
speaker = "エンジュ"
# （精神面はともかく、メテオラは胸も大きいし、体は立派な大人だ。メテオラの言動を勘違いした魔王が、男の欲望を露わにしたら……ん？）
line = "（精神面はともかく、メテオラは胸も大きいし、体は立派な大人だ。メテオラの言動を勘違いした魔王が、男の欲望を露わにしたら……ん？）"

[[dialogue]]
speaker = "エンジュ"
# （別にメテオラと魔王が好き合って、恋仲になったところで、あたしには何の関係も──なんでだ？　メテオラが魔王への好意を口にすると、胸がザワついて……？）
line = "（別にメテオラと魔王が好き合って、恋仲になったところで、あたしには何の関係も──なんでだ？　メテオラが魔王への好意を口にすると、胸がザワついて……？）"

[[dialogue]]
speaker = "メテオラ"
# 「エンジュー？　むつかしー顔してどうしたんだー？　おしっこかー？　漏らしちゃう前におトイレ行かなきゃダメだぞ？」
line = "「エンジュー？　むつかしー顔してどうしたんだー？　おしっこかー？　漏らしちゃう前におトイレ行かなきゃダメだぞ？」"

[[dialogue]]
speaker = "エンジュ"
# （まさか……嫉妬！？　あたしが、魔王に好意を──バカな！　そんなはずあるものか！）
line = "（まさか……嫉妬！？　あたしが、魔王に好意を──バカな！　そんなはずあるものか！）"

[[dialogue]]
speaker = "エンジュ"
# （あたしのタイプはもっとがっしりしてて、頼りがいのある熊みたいなヤツだ。あんなひ弱そうな男、ちっともあたしのタイプなんかじゃないのに……！）
line = "（あたしのタイプはもっとがっしりしてて、頼りがいのある熊みたいなヤツだ。あんなひ弱そうな男、ちっともあたしのタイプなんかじゃないのに……！）"

[[dialogue]]
speaker = "unk"
# おーい、ふたりともー！
line = "おーい、ふたりともー！"

[[dialogue]]
speaker = "メテオラ"
# 「魔王だー！　ちょうど魔王の話をしてたんだぞ！」
line = "「魔王だー！　ちょうど魔王の話をしてたんだぞ！」"

[[dialogue]]
speaker = "エンジュ"
# 「し、してない！　するわけないだろう！」
line = "「し、してない！　するわけないだろう！」"

[[dialogue]]
speaker = "メテオラ"
# 「してたぞ！？　エンジュ、ウソつくなー！」
line = "「してたぞ！？　エンジュ、ウソつくなー！」"

[[dialogue]]
speaker = "unk"
# ……悪口でも言ってたのかな？
line = "……悪口でも言ってたのかな？"

[[dialogue]]
speaker = "メテオラ"
# 「言ってないぞ。あたしもエンジュも魔王が好き──」
line = "「言ってないぞ。あたしもエンジュも魔王が好き──」"

[[dialogue]]
speaker = "エンジュ"
# 「ああ、その通りだとも！　お前に対する罵詈雑言の数々をな！　お前なんか大っ嫌いなんだからな！　フン！」
line = "「ああ、その通りだとも！　お前に対する罵詈雑言の数々をな！　お前なんか大っ嫌いなんだからな！　フン！」"

[[dialogue]]
speaker = "メテオラ"
# 「あ、待つんだぞ、エンジュ～！」
line = "「あ、待つんだぞ、エンジュ～！」"

[[dialogue]]
speaker = "unk"
# エンジュとはそれなりに打ち解けたと思っていたけど、歩み寄るにはまだまだ道のりは遠い……のだろうか？
line = "エンジュとはそれなりに打ち解けたと思っていたけど、歩み寄るにはまだまだ道のりは遠い……のだろうか？"
