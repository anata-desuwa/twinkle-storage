[[dialogue]]
speaker = "unk"
# テント設営が終わった後、今度は食料調達をすることになった。
line = "テント設営が終わった後、今度は食料調達をすることになった。"

[[dialogue]]
speaker = "unk"
# 魚を釣って食べようと、俺達は波打ち際にある岩場へ向かった――
line = "魚を釣って食べようと、俺達は波打ち際にある岩場へ向かった――"

[[dialogue]]
speaker = "サーシャ"
# 「う～ん、釣りをするのは始めてだけど、実際にやってみるとなかなか難しいのね～」
line = "「う～ん、釣りをするのは始めてだけど、実際にやってみるとなかなか難しいのね～」"

[[dialogue]]
speaker = "unk"
# 俺が教えますよ
line = "俺が教えますよ"

[[dialogue]]
speaker = "サーシャ"
# 「会長くん、ありがと～♪」
line = "「会長くん、ありがと～♪」"

[[dialogue]]
speaker = "サーシャ"
# 「テントの設営も分かりやすく教えてくれたし、頼りになるわ～」
line = "「テントの設営も分かりやすく教えてくれたし、頼りになるわ～」"

[[dialogue]]
speaker = "サーシャ"
# 「あ、うふふ♪　会長くん、照れてる～」
line = "「あ、うふふ♪　会長くん、照れてる～」"

[[dialogue]]
speaker = "サーシャ"
# 「あ～ん、可愛いわ～♪　姉心がくすぐられて、キュンキュンしちゃう♪」
line = "「あ～ん、可愛いわ～♪　姉心がくすぐられて、キュンキュンしちゃう♪」"

[[dialogue]]
speaker = "unk"
# アナは、釣りの経験は――
line = "アナは、釣りの経験は――"

[[dialogue]]
speaker = "アナ"
# 「ノープロブレム。私は大丈夫です」
line = "「ノープロブレム。私は大丈夫です」"

[[dialogue]]
speaker = "アナ"
# 「――よし、ロッドの組み立て完了です」
line = "「――よし、ロッドの組み立て完了です」"

[[dialogue]]
speaker = "サーシャ"
# 「え？　アナちゃん、それってもしかして自分の釣り竿？」
line = "「え？　アナちゃん、それってもしかして自分の釣り竿？」"

[[dialogue]]
speaker = "アナ"
# 「イエス。前の合宿の時は出番がありませんでしたが、ついにお目見えです」
line = "「イエス。前の合宿の時は出番がありませんでしたが、ついにお目見えです」"

[[dialogue]]
speaker = "アナ"
# 「いざ、フィッシング」
line = "「いざ、フィッシング」"

[[dialogue]]
speaker = "サーシャ"
# 「アナちゃん、凄いわ～♪　あれから１０分くらいしか経ってないのに」
line = "「アナちゃん、凄いわ～♪　あれから１０分くらいしか経ってないのに」"

[[dialogue]]
speaker = "unk"
# ばんばん魚を釣ってる！
line = "ばんばん魚を釣ってる！"

[[dialogue]]
speaker = "アナ"
# 「取ったど～」
line = "「取ったど～」"

[[dialogue]]
speaker = "サーシャ"
# 「また釣り上げたわ～。凄～い♪　アナちゃんは釣りが得意なのね～」
line = "「また釣り上げたわ～。凄～い♪　アナちゃんは釣りが得意なのね～」"

[[dialogue]]
speaker = "アナ"
# 「いえ、普通です」
line = "「いえ、普通です」"

[[dialogue]]
speaker = "サーシャ"
# 「あら、そうなの？　でも、釣りの動作とか、凄く手馴れているように見えたけど……」
line = "「あら、そうなの？　でも、釣りの動作とか、凄く手馴れているように見えたけど……」"

[[dialogue]]
speaker = "アナ"
# 「私より釣りが上手い人なんて、沢山いますから」
line = "「私より釣りが上手い人なんて、沢山いますから」"

[[dialogue]]
speaker = "アナ"
# 「おや、また糸が引いていますね。むっ……しかも、これはなかなか――」
line = "「おや、また糸が引いていますね。むっ……しかも、これはなかなか――」"

[[dialogue]]
speaker = "アナ"
# 「せいっ」
line = "「せいっ」"

[[dialogue]]
speaker = "サーシャ"
# 「わぁ～♪　今度釣りあげた魚は、抱えるくらい大きいわ～」
line = "「わぁ～♪　今度釣りあげた魚は、抱えるくらい大きいわ～」"

[[dialogue]]
speaker = "アナ"
# 「おー」
line = "「おー」"

[[dialogue]]
speaker = "アナ"
# 「これはＤＩＳＣで記録を残しておきましょう。自撮りモードにして……」
line = "「これはＤＩＳＣで記録を残しておきましょう。自撮りモードにして……」"

[[dialogue]]
speaker = "アナ"
# 「それから、ちょっと場所を失礼します――」
line = "「それから、ちょっと場所を失礼します――」"

[[dialogue]]
speaker = "サーシャ"
# 「あら？　アナちゃん、白い布を広げたりして、どうしたの？」
line = "「あら？　アナちゃん、白い布を広げたりして、どうしたの？」"

[[dialogue]]
speaker = "アナ"
# 「せっかくの大物なので、簡易的ですが魚拓を取っておこうかと」
line = "「せっかくの大物なので、簡易的ですが魚拓を取っておこうかと」"

[[dialogue]]
speaker = "unk"
# まさかのその場で！？
line = "まさかのその場で！？"

[[dialogue]]
speaker = "サーシャ"
# 「え～と、もしかしなくてもアナちゃんって……釣りが大好きだったりする？」
line = "「え～と、もしかしなくてもアナちゃんって……釣りが大好きだったりする？」"

[[dialogue]]
speaker = "アナ"
# 「ええ、実は」
line = "「ええ、実は」"

[[dialogue]]
speaker = "サーシャ"
# 「全然知らなかったわ～。これまでそういったことは、言ってなかったわよね？」
line = "「全然知らなかったわ～。これまでそういったことは、言ってなかったわよね？」"

[[dialogue]]
speaker = "アナ"
# 「本当に個人的な趣味で、わざわざ自分から言うほどのことではなかったので」
line = "「本当に個人的な趣味で、わざわざ自分から言うほどのことではなかったので」"

[[dialogue]]
speaker = "サーシャ"
# 「女の子としては珍しいかもしれないけど、私はいい趣味だと思うわよ？」
line = "「女の子としては珍しいかもしれないけど、私はいい趣味だと思うわよ？」"

[[dialogue]]
speaker = "unk"
# 今度、一緒にどこか釣りに行く？
line = "今度、一緒にどこか釣りに行く？"

[[dialogue]]
speaker = "アナ"
# 「え」
line = "「え」"

[[dialogue]]
speaker = "アナ"
# 「それは本当ですか？　会長」
line = "「それは本当ですか？　会長」"

[[dialogue]]
speaker = "アナ"
# 「本当なら是非」
line = "「本当なら是非」"

[[dialogue]]
speaker = "アナ"
# 「具体的に、いつにしましょう？　５日後とか？　６日後でも構わない」
line = "「具体的に、いつにしましょう？　５日後とか？　６日後でも構わない」"

[[dialogue]]
speaker = "unk"
# 圧が凄い！
line = "圧が凄い！"

[[dialogue]]
speaker = "サーシャ"
# 「あら～♪　会長くんの言葉で、見事に釣れちゃったわね～」
line = "「あら～♪　会長くんの言葉で、見事に釣れちゃったわね～」"

[[dialogue]]
speaker = "アナ"
# 「まさか会長、冗談だったとは言いませんよね？」
line = "「まさか会長、冗談だったとは言いませんよね？」"

[[dialogue]]
speaker = "アナ"
# 「男として、１度言ったことには責任を持って頂かないと」
line = "「男として、１度言ったことには責任を持って頂かないと」"

[[dialogue]]
speaker = "unk"
# わかったわかった！　約束するから！
line = "わかったわかった！　約束するから！"

[[dialogue]]
speaker = "アナ"
# 「さすが会長。そうこなくては……むふ～」
line = "「さすが会長。そうこなくては……むふ～」"

[[dialogue]]
speaker = "サーシャ"
# 「ふふっ♪　アナちゃんったら、嬉しそうな顔してる♪」
line = "「ふふっ♪　アナちゃんったら、嬉しそうな顔してる♪」"

[[dialogue]]
speaker = "アナ"
# 「せっかくの機会ですから、サーシャ先輩にも釣りの楽しさを伝えたいですね。会長と一緒に、私も釣りのやり方を教えます」
line = "「せっかくの機会ですから、サーシャ先輩にも釣りの楽しさを伝えたいですね。会長と一緒に、私も釣りのやり方を教えます」"

[[dialogue]]
speaker = "サーシャ"
# 「そうね、是非ともお願いするわ～♪」
line = "「そうね、是非ともお願いするわ～♪」"

[[dialogue]]
speaker = "unk"
# アナはそれから、サーシャさんの横に付いて釣りのやり方を教えて行き――
line = "アナはそれから、サーシャさんの横に付いて釣りのやり方を教えて行き――"

[[dialogue]]
speaker = "アナ"
# 「今です、サーシャ先輩」
line = "「今です、サーシャ先輩」"

[[dialogue]]
speaker = "サーシャ"
# 「え～い！」
line = "「え～い！」"

[[dialogue]]
speaker = "サーシャ"
# 「きゃ～♪　会長くん、アナちゃん、見て見て～！　ついに初めての魚を釣り上げたわ～♪」
line = "「きゃ～♪　会長くん、アナちゃん、見て見て～！　ついに初めての魚を釣り上げたわ～♪」"

[[dialogue]]
speaker = "unk"
# お見事です！
line = "お見事です！"

[[dialogue]]
speaker = "アナ"
# 「グッジョブ。喜んで貰えて、私も嬉しい」
line = "「グッジョブ。喜んで貰えて、私も嬉しい」"

[[dialogue]]
speaker = "サーシャ"
# 「アナちゃんが教えてくれたおかげよ～♪　ありがと～♪」
line = "「アナちゃんが教えてくれたおかげよ～♪　ありがと～♪」"

[[dialogue]]
speaker = "unk"
# サーシャさんのはしゃぐ様子に、アナもまた嬉しそうに微笑むのだった。
line = "サーシャさんのはしゃぐ様子に、アナもまた嬉しそうに微笑むのだった。"
