[[dialogue]]
speaker = "unk"
# 第３話,トリシャの布教活動,P
line = "第３話,トリシャの布教活動,P"

[[dialogue]]
speaker = "unk"
# 放課後の星徒会長は非常に忙しい。
line = "放課後の星徒会長は非常に忙しい。"

[[dialogue]]
speaker = "unk"
# 学園の行事やアステラの対策など、取り組まねばならない雑事も多種多様で、他の役員のサポートがあっても決して楽なものではない。
line = "学園の行事やアステラの対策など、取り組まねばならない雑事も多種多様で、他の役員のサポートがあっても決して楽なものではない。"

[[dialogue]]
speaker = "unk"
# 今日はかなり忙しい上に、マトイとアナも都合が悪く不在なので、正直猫の手も借りたいほどなんだが――
line = "今日はかなり忙しい上に、マトイとアナも都合が悪く不在なので、正直猫の手も借りたいほどなんだが――"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ぴょーん、ぴょーん、ぴょーん♪」
line = "「ぴょーん、ぴょーん、ぴょーん♪」"

[[dialogue]]
speaker = "トリシャ"
# 「ぴょーん、ぴょーん、ぴょーん……」
line = "「ぴょーん、ぴょーん、ぴょーん……」"

[[dialogue]]
speaker = "unk"
# ジャクリーヌならともかくトリシャさんまで
line = "ジャクリーヌならともかくトリシャさんまで"

[[dialogue]]
speaker = "unk"
# いったいどういうこと？
line = "いったいどういうこと？"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「うるさいゆ♪　余の遊びを邪魔するなゆ♪」
line = "「うるさいゆ♪　余の遊びを邪魔するなゆ♪」"

[[dialogue]]
speaker = "トリシャ"
# 「ぴょーん、ぴょーん……フフ、会長さんも一緒にどうですか？」
line = "「ぴょーん、ぴょーん……フフ、会長さんも一緒にどうですか？」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ぴょーん、ぴょーん♪　ダメなの、言わないとやらない時点で見込みないの♪」
line = "「ぴょーん、ぴょーん♪　ダメなの、言わないとやらない時点で見込みないの♪」"

[[dialogue]]
speaker = "トリシャ"
# 「見込みがないのではなく、まだ情報を知り得てないだけだと思います……」
line = "「見込みがないのではなく、まだ情報を知り得てないだけだと思います……」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「こら、ぴょんぴょんやめるなゆ♪　お前は止まれない生き物ゆ♪」
line = "「こら、ぴょんぴょんやめるなゆ♪　お前は止まれない生き物ゆ♪」"

[[dialogue]]
speaker = "unk"
# そんなの聞いてないんだけど
line = "そんなの聞いてないんだけど"

[[dialogue]]
speaker = "unk"
# 止まれない生き物！？
line = "止まれない生き物！？"

[[dialogue]]
speaker = "トリシャ"
# 「ぴょーん、ぴょーん……すみません、会長さん……映画の中ではそのような設定になっているんです……ぴょーん」
line = "「ぴょーん、ぴょーん……すみません、会長さん……映画の中ではそのような設定になっているんです……ぴょーん」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆっゆっゆ♪　この前は名演技だったゆ♪　褒めてやるゆ～♪」
line = "「ゆっゆっゆ♪　この前は名演技だったゆ♪　褒めてやるゆ～♪」"

[[dialogue]]
speaker = "トリシャ"
# 「ぴょーん、ぴょーん……ありがとう、ジャクリーヌさん……あ、そこ、ちゃんとぴょんぴょんしてください」
line = "「ぴょーん、ぴょーん……ありがとう、ジャクリーヌさん……あ、そこ、ちゃんとぴょんぴょんしてください」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「しまったぴょん♪　ぴょんぴょんを止めたらダメだったゆ～♪　ぴょーん、ぴょーん、ぴょーん♪」
line = "「しまったぴょん♪　ぴょんぴょんを止めたらダメだったゆ～♪　ぴょーん、ぴょーん、ぴょーん♪」"

[[dialogue]]
speaker = "unk"
# 俺の周りをぐるぐる回るのが謎すぎる
line = "俺の周りをぐるぐる回るのが謎すぎる"

[[dialogue]]
speaker = "unk"
# 遊ぶのはいいけど、どうしてここで？
line = "遊ぶのはいいけど、どうしてここで？"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「余はトリシャと遊んでただけゆ♪　映画の真似っこゆ～♪」
line = "「余はトリシャと遊んでただけゆ♪　映画の真似っこゆ～♪」"

[[dialogue]]
speaker = "トリシャ"
# 「ぴょんぴょんするの、楽しいですよ……」
line = "「ぴょんぴょんするの、楽しいですよ……」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「適度なジャンプは健康にもいいゆ♪　お前も暇なら一緒にぴょんぴょんするゆ～♪」
line = "「適度なジャンプは健康にもいいゆ♪　お前も暇なら一緒にぴょんぴょんするゆ～♪」"

[[dialogue]]
speaker = "トリシャ"
# 「フフフ……健康にいいのは事実ですね……」
line = "「フフフ……健康にいいのは事実ですね……」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「映画では列を作ってみんなでぴょんぴょんしてたゆ♪　とっても楽しそうだったゆ～♪」
line = "「映画では列を作ってみんなでぴょんぴょんしてたゆ♪　とっても楽しそうだったゆ～♪」"

[[dialogue]]
speaker = "トリシャ"
# 「実際にやってみると、これが意外と楽しくて……ぴょーん、ぴょーん……」
line = "「実際にやってみると、これが意外と楽しくて……ぴょーん、ぴょーん……」"

[[dialogue]]
speaker = "unk"
# ぽよんぽよんするから……
line = "ぽよんぽよんするから……"

[[dialogue]]
speaker = "unk"
# でもぴょんぴょんしてると……
line = "でもぴょんぴょんしてると……"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ぽよーん、ぽよーん……これで合ってるゆ？」
line = "「ぽよーん、ぽよーん……これで合ってるゆ？」"

[[dialogue]]
speaker = "トリシャ"
# 「はい……ジャクリーヌさんもぽよんぽよんしています……」
line = "「はい……ジャクリーヌさんもぽよんぽよんしています……」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ぽよーん、ぽよーん、ぽよーん……♪」
line = "「ぽよーん、ぽよーん、ぽよーん……♪」"

[[dialogue]]
speaker = "トリシャ"
# 「会長さんは……私の方を見ていれば大丈夫です……私なら、彼女なので……フフフ、問題ありません……」
line = "「会長さんは……私の方を見ていれば大丈夫です……私なら、彼女なので……フフフ、問題ありません……」"

[[dialogue]]
speaker = "トリシャ"
# 「でも、せっかくなら会長さんも参加してみませんか？　ぴょんぴょんしながら私の後ろについてきてください……」
line = "「でも、せっかくなら会長さんも参加してみませんか？　ぴょんぴょんしながら私の後ろについてきてください……」"

[[dialogue]]
speaker = "unk"
# ぴょーん、ぴょーん、ぴょーん♪
line = "ぴょーん、ぴょーん、ぴょーん♪"

[[dialogue]]
speaker = "unk"
# えっと、それじゃ……
line = "えっと、それじゃ……"

[[dialogue]]
speaker = "トリシャ"
# 「フフフ、お上手です……ぴょーん、ぴょーん……」
line = "「フフフ、お上手です……ぴょーん、ぴょーん……」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「お前なかなかやるの。あの映画見てないくせにうまいゆ♪」
line = "「お前なかなかやるの。あの映画見てないくせにうまいゆ♪」"

[[dialogue]]
speaker = "トリシャ"
# 「映画の中のゾンビ型幽霊は、このように集団行動をするのです……オトモダチを大勢引き連れて楽しそうにしていて……」
line = "「映画の中のゾンビ型幽霊は、このように集団行動をするのです……オトモダチを大勢引き連れて楽しそうにしていて……」"

[[dialogue]]
speaker = "unk"
# じゃあ俺もオトモダチ
line = "じゃあ俺もオトモダチ"

[[dialogue]]
speaker = "トリシャ"
# 「そう、ですね……でも……」
line = "「そう、ですね……でも……」"

[[dialogue]]
speaker = "トリシャ"
# 「オトモダチと恋人は……両立するのでしょうか……？」
line = "「オトモダチと恋人は……両立するのでしょうか……？」"

[[dialogue]]
speaker = "トリシャ"
# 「会長さんが恋人のままでも大丈夫なら……オトモダチでも……いいですよ……」
line = "「会長さんが恋人のままでも大丈夫なら……オトモダチでも……いいですよ……」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ちょっと待つゆ。試しにやらせるのはいいけど、勝手に仲間に入れるなゆ」
line = "「ちょっと待つゆ。試しにやらせるのはいいけど、勝手に仲間に入れるなゆ」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「あの映画を見てないやつはダメゆ♪　見たら仲間に入れてやってもいいゆ～♪」
line = "「あの映画を見てないやつはダメゆ♪　見たら仲間に入れてやってもいいゆ～♪」"

[[dialogue]]
speaker = "トリシャ"
# 「一理ありますね。映画を見ていないと、楽しげにぴょんぴょんしているだけになってしまいます」
line = "「一理ありますね。映画を見ていないと、楽しげにぴょんぴょんしているだけになってしまいます」"

[[dialogue]]
speaker = "トリシャ"
# 「楽しい映画でしたので……会長さんにも是非見て欲しいです……」
line = "「楽しい映画でしたので……会長さんにも是非見て欲しいです……」"

[[dialogue]]
speaker = "トリシャ"
# 「ちょうどここに布教用のデータがありますので、一緒に見ましょう」
line = "「ちょうどここに布教用のデータがありますので、一緒に見ましょう」"

[[dialogue]]
speaker = "トリシャ"
# 「いい気分転換になりますよ♪」
line = "「いい気分転換になりますよ♪」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「わぁい♪　余も見るゆ～♪」
line = "「わぁい♪　余も見るゆ～♪」"

[[dialogue]]
speaker = "トリシャ"
# 「ぴょーん、ぴょーん、ぴょーん……♪」
line = "「ぴょーん、ぴょーん、ぴょーん……♪」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ぴょーん、ぴょーん、ぴょーん♪」
line = "「ぴょーん、ぴょーん、ぴょーん♪」"

[[dialogue]]
speaker = "unk"
# ぴょーん、ぴょーん、ぴょーん♪
line = "ぴょーん、ぴょーん、ぴょーん♪"

[[dialogue]]
speaker = "unk"
# こうして布教活動を受けた俺は、見事映画にドハマりして、トリシャさんと一緒にぴょんぴょんするのだった。
line = "こうして布教活動を受けた俺は、見事映画にドハマりして、トリシャさんと一緒にぴょんぴょんするのだった。"
