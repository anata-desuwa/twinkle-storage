[[dialogue]]
speaker = "unk"
# 第３話,お肉の恨みは恐ろしい,P
line = "第３話,お肉の恨みは恐ろしい,P"

[[dialogue]]
speaker = "アルテ"
# 「ふふふ、ようやくこの時が来ましたね♪」
line = "「ふふふ、ようやくこの時が来ましたね♪」"

[[dialogue]]
speaker = "unk"
# アルテの頬が思い切り緩んでいた。
line = "アルテの頬が思い切り緩んでいた。"

[[dialogue]]
speaker = "unk"
# 何故なら、今日は以前より念願だったお店に、黒毛和牛のステーキを食べに来たからだ。
line = "何故なら、今日は以前より念願だったお店に、黒毛和牛のステーキを食べに来たからだ。"

[[dialogue]]
speaker = "アルテ"
# 「まさか本当に食べさせてもらえるとは。奥ゆかしいアピールをし続けた甲斐があったというものです」
line = "「まさか本当に食べさせてもらえるとは。奥ゆかしいアピールをし続けた甲斐があったというものです」"

[[dialogue]]
speaker = "マトイ"
# 「星徒会室に来るといつも、机の上にグルメ雑誌が拡げられてたんだけど……」
line = "「星徒会室に来るといつも、机の上にグルメ雑誌が拡げられてたんだけど……」"

[[dialogue]]
speaker = "unk"
# あれが奥ゆかしい……？
line = "あれが奥ゆかしい……？"

[[dialogue]]
speaker = "ヴィーナス"
# 「まあいいわ。せっかくこっちの世界に来てるんだから、美味しいものを食べていって欲しいじゃない」
line = "「まあいいわ。せっかくこっちの世界に来てるんだから、美味しいものを食べていって欲しいじゃない」"

[[dialogue]]
speaker = "アルテ"
# 「素晴らしい心がけです。きっと来世でも幸せな人生を送れることでしょう」
line = "「素晴らしい心がけです。きっと来世でも幸せな人生を送れることでしょう」"

[[dialogue]]
speaker = "マトイ"
# 「アルテさんが元々いた世界のお肉料理はどうだったんですか？」
line = "「アルテさんが元々いた世界のお肉料理はどうだったんですか？」"

[[dialogue]]
speaker = "アルテ"
# 「もちろん美味しいお店はありますよ。ですが館長のお財布の紐が硬いので、めったに食べさせてもらえないのです」
line = "「もちろん美味しいお店はありますよ。ですが館長のお財布の紐が硬いので、めったに食べさせてもらえないのです」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうなの？　世界で一番の美術館なんだから、お金を持っていても不思議じゃないのに」
line = "「そうなの？　世界で一番の美術館なんだから、お金を持っていても不思議じゃないのに」"

[[dialogue]]
speaker = "アルテ"
# 「お金儲けを目的に経営をしてませんからね。おかげでいつも懐が寂しいみたいです」
line = "「お金儲けを目的に経営をしてませんからね。おかげでいつも懐が寂しいみたいです」"

[[dialogue]]
speaker = "ヴィーナス"
# 「へぇ、立派な志じゃない」
line = "「へぇ、立派な志じゃない」"

[[dialogue]]
speaker = "アルテ"
# 「立派なのはお肉だけで結構です」
line = "「立派なのはお肉だけで結構です」"

[[dialogue]]
speaker = "アルテ"
# 「そうだ、この世界で食べたお肉のお味は、館長にも詳しく教えてあげましょう。きっと泣いて羨ましがるはずです」
line = "「そうだ、この世界で食べたお肉のお味は、館長にも詳しく教えてあげましょう。きっと泣いて羨ましがるはずです」"

[[dialogue]]
speaker = "アルテ"
# 「ふふ、よだれを垂らす館長の顔が目に浮かびます♪」
line = "「ふふ、よだれを垂らす館長の顔が目に浮かびます♪」"

[[dialogue]]
speaker = "unk"
# そんな話をしながら街を歩き、いよいよ念願のステーキハウスの近くまでやってくる。
line = "そんな話をしながら街を歩き、いよいよ念願のステーキハウスの近くまでやってくる。"

[[dialogue]]
speaker = "アルテ"
# 「あぁ、いよいよ念願のブランド肉を食べられるのですね」
line = "「あぁ、いよいよ念願のブランド肉を食べられるのですね」"

[[dialogue]]
speaker = "アルテ"
# 「しかし……お店の前に列が出来ていますね？　大丈夫なのですか？」
line = "「しかし……お店の前に列が出来ていますね？　大丈夫なのですか？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「大丈夫よ、ちゃんと１２時から予約してあるから」
line = "「大丈夫よ、ちゃんと１２時から予約してあるから」"

[[dialogue]]
speaker = "ヴィーナス"
# 「いつもなら予約を取るのが大変なんだけど、キャンセルが出て、たまたま空き枠ができてね。運が良かったわ」
line = "「いつもなら予約を取るのが大変なんだけど、キャンセルが出て、たまたま空き枠ができてね。運が良かったわ」"

[[dialogue]]
speaker = "アルテ"
# 「ほう、それは本当に幸運ですね。きっとお肉たちも、この天才美少女藝術家に食べられたがっているのでしょう」
line = "「ほう、それは本当に幸運ですね。きっとお肉たちも、この天才美少女藝術家に食べられたがっているのでしょう」"

[[dialogue]]
speaker = "アルテ"
# 「ん？　では、なぜこの方たちは列を作っているのでしょう？」
line = "「ん？　では、なぜこの方たちは列を作っているのでしょう？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「予約枠がいっぱいだから遅刻したら大変でしょう？　だから少し早めに来て並んでいるのね」
line = "「予約枠がいっぱいだから遅刻したら大変でしょう？　だから少し早めに来て並んでいるのね」"

[[dialogue]]
speaker = "アルテ"
# 「なるほど、そういうことでしたか」
line = "「なるほど、そういうことでしたか」"

[[dialogue]]
speaker = "マトイ"
# 「私たちの予約時間も迫ってるからね。列の後ろに並ぼう──」
line = "「私たちの予約時間も迫ってるからね。列の後ろに並ぼう──」"

[[dialogue]]
speaker = "マトイ"
# 「──！　近くでアステラが発生したみたい……！」
line = "「──！　近くでアステラが発生したみたい……！」"

[[dialogue]]
speaker = "アルテ"
# 「え……？」
line = "「え……？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「大変！　３人とも、行くわよ！」
line = "「大変！　３人とも、行くわよ！」"

[[dialogue]]
speaker = "アルテ"
# 「いやでも、星騎士の方は大勢いるのですから、ここは他の方に任せても……」
line = "「いやでも、星騎士の方は大勢いるのですから、ここは他の方に任せても……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「発生地点から近いのは私たちよ。一番早く駆けつけられるのは私たちだから！」
line = "「発生地点から近いのは私たちよ。一番早く駆けつけられるのは私たちだから！」"

[[dialogue]]
speaker = "アルテ"
# 「待ってください。それじゃお肉は──」
line = "「待ってください。それじゃお肉は──」"

[[dialogue]]
speaker = "ヴィーナス"
# 「残念だけど、おあずけね」
line = "「残念だけど、おあずけね」"

[[dialogue]]
speaker = "アルテ"
# 「そ、そんな……」
line = "「そ、そんな……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「仕方ないわ、恨むならモンスターを恨みなさい」
line = "「仕方ないわ、恨むならモンスターを恨みなさい」"

[[dialogue]]
speaker = "マトイ"
# 「アルテさん。急いで退治して戻ってきましょう」
line = "「アルテさん。急いで退治して戻ってきましょう」"

[[dialogue]]
speaker = "アルテ"
# 「…………そうですね……さっさと始末して戻ってくればいいんです」
line = "「…………そうですね……さっさと始末して戻ってくればいいんです」"

[[dialogue]]
speaker = "アルテ"
# 「ふふふ……私の……お肉の邪魔をして、ただで済むとは思わないことですね……」
line = "「ふふふ……私の……お肉の邪魔をして、ただで済むとは思わないことですね……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「アルテ、目が本気ね」
line = "「アルテ、目が本気ね」"

[[dialogue]]
speaker = "unk"
# こんなやる気のあるアルテ初めてだ
line = "こんなやる気のあるアルテ初めてだ"

[[dialogue]]
speaker = "マトイ"
# 「百人の味方を得た気分だけど、動機が不純過ぎるよ……」
line = "「百人の味方を得た気分だけど、動機が不純過ぎるよ……」"

[[dialogue]]
speaker = "アルテ"
# 「見つけました……あれがアステラとやらですね……私がこの手で葬ってあげましょう……！」
line = "「見つけました……あれがアステラとやらですね……私がこの手で葬ってあげましょう……！」"

[[dialogue]]
speaker = "アルテ"
# 「ローズブレードぉぉ～～～～っ！！！」
line = "「ローズブレードぉぉ～～～～っ！！！」"

[[dialogue]]
speaker = "モンスター"
# 「イ～～～～～～～ッ！！？」
line = "「イ～～～～～～～ッ！！？」"

[[dialogue]]
speaker = "アルテ"
# 「なんとしてでも１２時に間に合わせますよ！　高いお肉のために！」
line = "「なんとしてでも１２時に間に合わせますよ！　高いお肉のために！」"

[[dialogue]]
speaker = "unk"
# さすが天才というべきか（？）、アルテが今までにない本気を発揮し、速やかにモンスターを駆逐てくれた。
line = "さすが天才というべきか（？）、アルテが今までにない本気を発揮し、速やかにモンスターを駆逐てくれた。"

[[dialogue]]
speaker = "unk"
# その後急いでステーキハウスに戻り、アルテは念願のブランド和牛を思う存分に堪能したのだった。
line = "その後急いでステーキハウスに戻り、アルテは念願のブランド和牛を思う存分に堪能したのだった。"
