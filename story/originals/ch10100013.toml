[[dialogue]]
speaker = "unk"
# 第３話,お悩み相談守護天使,P
line = "第３話,お悩み相談守護天使,P"

[[dialogue]]
speaker = "マグダレナ"
# 「お悩みがありましたらどうぞ」
line = "「お悩みがありましたらどうぞ」"

[[dialogue]]
speaker = "モネ"
# 「はい……この前友達におすすめの小説を聞かれたんですが、つい熱く語りすぎてしまって……やっぱりいいと言われてしまいました」
line = "「はい……この前友達におすすめの小説を聞かれたんですが、つい熱く語りすぎてしまって……やっぱりいいと言われてしまいました」"

[[dialogue]]
speaker = "モネ"
# 「読んで後悔しないように、ネタバレにならない範囲で魅力を説明しようとしたんですけどうまくいかなくて……どうすれば良かったんでしょうか？」
line = "「読んで後悔しないように、ネタバレにならない範囲で魅力を説明しようとしたんですけどうまくいかなくて……どうすれば良かったんでしょうか？」"

[[dialogue]]
speaker = "マグダレナ"
# 「大丈夫ですよ。書を愛することは良いことです。時に空回りすることもあるかもしれませんが、愛を忘れないでください」
line = "「大丈夫ですよ。書を愛することは良いことです。時に空回りすることもあるかもしれませんが、愛を忘れないでください」"

[[dialogue]]
speaker = "モネ"
# 「ありがとうございます～っ」
line = "「ありがとうございます～っ」"

[[dialogue]]
speaker = "マトイ"
# 「私って特に取り柄がなくて……やっぱり特技とかあった方がいいんでしょうか？」
line = "「私って特に取り柄がなくて……やっぱり特技とかあった方がいいんでしょうか？」"

[[dialogue]]
speaker = "マグダレナ"
# 「いいえ、そのままでもマトイさまは素敵な方ですよ。少なくとも私はそう思います」
line = "「いいえ、そのままでもマトイさまは素敵な方ですよ。少なくとも私はそう思います」"

[[dialogue]]
speaker = "マトイ"
# 「マグダレナさん……ありがとうございます！」
line = "「マグダレナさん……ありがとうございます！」"

[[dialogue]]
speaker = "サーシャ"
# 「あらら、マトイちゃんまで……いつの間にか大人気ね」
line = "「あらら、マトイちゃんまで……いつの間にか大人気ね」"

[[dialogue]]
speaker = "サーシャ"
# 「……雰囲気で流されて、解決しているとは限らないみたいだけど」
line = "「……雰囲気で流されて、解決しているとは限らないみたいだけど」"

[[dialogue]]
speaker = "トワ先生"
# 「最近の若者の流行りがわからなくて……」
line = "「最近の若者の流行りがわからなくて……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「トワちゃんも……。それマグダレナに聞いてどうするのよ」
line = "「トワちゃんも……。それマグダレナに聞いてどうするのよ」"

[[dialogue]]
speaker = "マグダレナ"
# 「あら……気付いたらもうこんな時間。長く話し過ぎてしまったかもしれませんね」
line = "「あら……気付いたらもうこんな時間。長く話し過ぎてしまったかもしれませんね」"

[[dialogue]]
speaker = "unk"
# お疲れ様です
line = "お疲れ様です"

[[dialogue]]
speaker = "マグダレナ"
# 「いえいえ、私などがみなさまのお役に立てるなら嬉しいです。あなたも何か悩まれていることはありませんか？」
line = "「いえいえ、私などがみなさまのお役に立てるなら嬉しいです。あなたも何か悩まれていることはありませんか？」"

[[dialogue]]
speaker = "マグダレナ"
# 「……今のところは大丈夫？　わかりました。もし何かあればお気軽にご相談くださいね」
line = "「……今のところは大丈夫？　わかりました。もし何かあればお気軽にご相談くださいね」"

[[dialogue]]
speaker = "unk"
# ありがとうございます
line = "ありがとうございます"

[[dialogue]]
speaker = "マグダレナ"
# 「ふふふ、良い表情です」
line = "「ふふふ、良い表情です」"

[[dialogue]]
speaker = "マグダレナ"
# 「しかしみなさまのお悩みを聞いていて感じます。世界には様々な“領域”があるのだなと」
line = "「しかしみなさまのお悩みを聞いていて感じます。世界には様々な“領域”があるのだなと」"

[[dialogue]]
speaker = "unk"
# 様々な領域？
line = "様々な領域？"

[[dialogue]]
speaker = "マグダレナ"
# 「はい。友達、家族、学校……この世界はさまざまの領域が存在し、そしてそれらが重なりあっています」
line = "「はい。友達、家族、学校……この世界はさまざまの領域が存在し、そしてそれらが重なりあっています」"

[[dialogue]]
speaker = "マグダレナ"
# 「ここにも新星学園と流星学園という境界があり、それぞれの学び舎に生徒がいます。それぞれの生徒に家族があり、友人がいて、部活動や委員会もあります」
line = "「ここにも新星学園と流星学園という境界があり、それぞれの学び舎に生徒がいます。それぞれの生徒に家族があり、友人がいて、部活動や委員会もあります」"

[[dialogue]]
speaker = "マグダレナ"
# 「例えばあなたは新星学園の生徒であり、その中に学年やクラスがあり、星徒会役員でもあり、緋宮という家の一員でもあります」
line = "「例えばあなたは新星学園の生徒であり、その中に学年やクラスがあり、星徒会役員でもあり、緋宮という家の一員でもあります」"

[[dialogue]]
speaker = "マグダレナ"
# 「１人の人間でありながら複数の領域を持ち、それぞれに繋がる人と場所があります」
line = "「１人の人間でありながら複数の領域を持ち、それぞれに繋がる人と場所があります」"

[[dialogue]]
speaker = "マグダレナ"
# 「守護天使、《境界》のマグダレナが守っていたのは、天界・人間界・魔界という大きな領域です」
line = "「守護天使、《境界》のマグダレナが守っていたのは、天界・人間界・魔界という大きな領域です」"

[[dialogue]]
speaker = "マグダレナ"
# 「それに比べて小さな……と言ってしまうと語弊がありますが、それぞれの領域が存在することが興味深く思えるのです」
line = "「それに比べて小さな……と言ってしまうと語弊がありますが、それぞれの領域が存在することが興味深く思えるのです」"

[[dialogue]]
speaker = "マグダレナ"
# 「ふふふ……難しそうな顔をされていますね。きっと会長さまには当然のことなのでしょうけど、私には新鮮な発見だったのです」
line = "「ふふふ……難しそうな顔をされていますね。きっと会長さまには当然のことなのでしょうけど、私には新鮮な発見だったのです」"

[[dialogue]]
speaker = "マグダレナ"
# 「こうして肉体を得なければ気付かなかったでしょう。領域を司る守護天使なのに勉強不足でした」
line = "「こうして肉体を得なければ気付かなかったでしょう。領域を司る守護天使なのに勉強不足でした」"

[[dialogue]]
speaker = "マグダレナ"
# 「……あ」
line = "「……あ」"

[[dialogue]]
speaker = "unk"
# どうぞ
line = "どうぞ"

[[dialogue]]
speaker = "マグダレナ"
# 「実は……教皇庁の方にこの機械をいただいたのは良いのですが、使い方がわからず。アルモタヘルが何度かメッセージを送ってきているのですけど、それも見られなくて」
line = "「実は……教皇庁の方にこの機械をいただいたのは良いのですが、使い方がわからず。アルモタヘルが何度かメッセージを送ってきているのですけど、それも見られなくて」"

[[dialogue]]
speaker = "マグダレナ"
# 「良ければ使い方を教えていただけないでしょうか？　……ありがとうございます」
line = "「良ければ使い方を教えていただけないでしょうか？　……ありがとうございます」"

[[dialogue]]
speaker = "マグダレナ"
# 「……たっぷ？　すらいど？　ここを触れば……？　あっ」
line = "「……たっぷ？　すらいど？　ここを触れば……？　あっ」"

[[dialogue]]
speaker = "マグダレナ"
# 「あれ？　画面が……変わりましたね。私は今何を押したのでしょうか……？　あ、電話が繋がっているようです」
line = "「あれ？　画面が……変わりましたね。私は今何を押したのでしょうか……？　あ、電話が繋がっているようです」"

[[dialogue]]
speaker = "マグダレナ"
# 「もしもし～、アルモタヘル？　今何かメッセージ送りました？　いえ、特に用はないのですが、間違えて電話をかけてしまって」
line = "「もしもし～、アルモタヘル？　今何かメッセージ送りました？　いえ、特に用はないのですが、間違えて電話をかけてしまって」"

[[dialogue]]
speaker = "マグダレナ"
# 「あ、怒って切られてしまいました。人の文明の発達は著しいですが、その分使いこなすのが難しいものですね……」
line = "「あ、怒って切られてしまいました。人の文明の発達は著しいですが、その分使いこなすのが難しいものですね……」"

[[dialogue]]
speaker = "マグダレナ"
# 「同じ守護天使なのに、どうしてアルモタヘルはあんなに早く使いこなせるのでしょうか。不思議です」
line = "「同じ守護天使なのに、どうしてアルモタヘルはあんなに早く使いこなせるのでしょうか。不思議です」"

[[dialogue]]
speaker = "マグダレナ"
# 「しかし良い経験になりました。またわからないことがあれば、教えていただけると嬉しいです」
line = "「しかし良い経験になりました。またわからないことがあれば、教えていただけると嬉しいです」"
