[[dialogue]]
speaker = "unk"
# 第２話,変なあだ名はやめて！,P
line = "第２話,変なあだ名はやめて！,P"

[[dialogue]]
speaker = "附属生"
# 「さすがのアムでも５人がかりならいけるはず……一斉にいくよ！」
line = "「さすがのアムでも５人がかりならいけるはず……一斉にいくよ！」"

[[dialogue]]
speaker = "アム"
# 「ふっふーん！　このくらい全然へーき！」
line = "「ふっふーん！　このくらい全然へーき！」"

[[dialogue]]
speaker = "unk"
# 攻撃を全て防いでる！？
line = "攻撃を全て防いでる！？"

[[dialogue]]
speaker = "アム"
# 「よーし、反撃だ！　シールド解放──いっけー！！」
line = "「よーし、反撃だ！　シールド解放──いっけー！！」"

[[dialogue]]
speaker = "アム"
# 「勝者、あたし！　やったー！」
line = "「勝者、あたし！　やったー！」"

[[dialogue]]
speaker = "マトイ"
# 「うーん、流石はアムちゃんだね。以前に見た時よりも動きに磨きがかかってる」
line = "「うーん、流石はアムちゃんだね。以前に見た時よりも動きに磨きがかかってる」"

[[dialogue]]
speaker = "unk"
# 盾からビームが出た……！？
line = "盾からビームが出た……！？"

[[dialogue]]
speaker = "アナ"
# 「光の星力を収束させて盾の防御力を強化。その後、一気に放出させる必殺技です。何を隠そう、前会長のアドバイスで生まれた技」
line = "「光の星力を収束させて盾の防御力を強化。その後、一気に放出させる必殺技です。何を隠そう、前会長のアドバイスで生まれた技」"

[[dialogue]]
speaker = "マトイ"
# 「ヴィーナスのアイデアだったんだ、あれ」
line = "「ヴィーナスのアイデアだったんだ、あれ」"

[[dialogue]]
speaker = "アナ"
# 「ぎゅんぎゅんって溜めてどかーんってやったらどうかしら？　……みたいなことを言っていた覚えがあります」
line = "「ぎゅんぎゅんって溜めてどかーんってやったらどうかしら？　……みたいなことを言っていた覚えがあります」"

[[dialogue]]
speaker = "マトイ"
# 「相変わらずフィーリングで語るね、ヴィーナスは……」
line = "「相変わらずフィーリングで語るね、ヴィーナスは……」"

[[dialogue]]
speaker = "アム"
# 「ふぃ～。何だか物足りないなー……ぁ、会長じゃん！　それに星徒会のみなさんも！」
line = "「ふぃ～。何だか物足りないなー……ぁ、会長じゃん！　それに星徒会のみなさんも！」"

[[dialogue]]
speaker = "マトイ"
# 「アムちゃん、お疲れ様。凄かったよ！」
line = "「アムちゃん、お疲れ様。凄かったよ！」"

[[dialogue]]
speaker = "アム"
# 「えへへっ、それほどでも……あるけど！　ありがとうございます！」
line = "「えへへっ、それほどでも……あるけど！　ありがとうございます！」"

[[dialogue]]
speaker = "アナ"
# 「今の模擬戦も見事だったけれど、いつもの彼女は？」
line = "「今の模擬戦も見事だったけれど、いつもの彼女は？」"

[[dialogue]]
speaker = "アム"
# 「エルゼは誘ったんだけど断られちゃったんです。用事があるので失礼しますわ、なんて言ってさ～」
line = "「エルゼは誘ったんだけど断られちゃったんです。用事があるので失礼しますわ、なんて言ってさ～」"

[[dialogue]]
speaker = "アナ"
# 「桜十路エルデリーゼ。流星学園附属の槍使いで、彼女のライバル」
line = "「桜十路エルデリーゼ。流星学園附属の槍使いで、彼女のライバル」"

[[dialogue]]
speaker = "マトイ"
# 「有名だよね。流星附属の無敵の槍と無敵の盾。今日勝つのはどっちだー、っていつも盛り上がるんだよ！」
line = "「有名だよね。流星附属の無敵の槍と無敵の盾。今日勝つのはどっちだー、っていつも盛り上がるんだよ！」"

[[dialogue]]
speaker = "アム"
# 「今のところ１２０勝１２０敗。あ～あ、今日はエルゼ用に新技も用意してたのになぁ」
line = "「今のところ１２０勝１２０敗。あ～あ、今日はエルゼ用に新技も用意してたのになぁ」"

[[dialogue]]
speaker = "アナ"
# 「向上心が凄い。流石は『流星最硬のタンク』」
line = "「向上心が凄い。流石は『流星最硬のタンク』」"

[[dialogue]]
speaker = "アム"
# 「──はぅっ！？」
line = "「──はぅっ！？」"

[[dialogue]]
speaker = "unk"
# 流星最硬の……何だって？
line = "流星最硬の……何だって？"

[[dialogue]]
speaker = "アナ"
# 「『流星最硬のタンク』。彼女のあだ名」
line = "「『流星最硬のタンク』。彼女のあだ名」"

[[dialogue]]
speaker = "アム"
# 「アナ先輩。そのあだ名はあたし、ちょ～っと苦手というか……っていうか新星学園の方にも伝わってるの！？」
line = "「アナ先輩。そのあだ名はあたし、ちょ～っと苦手というか……っていうか新星学園の方にも伝わってるの！？」"

[[dialogue]]
speaker = "マトイ"
# 「他にもいっぱいあるよね。『盾騎士』とか『小さな要塞』とか『しんがり乙女』とか」
line = "「他にもいっぱいあるよね。『盾騎士』とか『小さな要塞』とか『しんがり乙女』とか」"

[[dialogue]]
speaker = "アム"
# 「や、やめてっ！　ていうか何それ、聞いたことないのもある！？」
line = "「や、やめてっ！　ていうか何それ、聞いたことないのもある！？」"

[[dialogue]]
speaker = "アナ"
# 「後はどんな悪条件でも生存、帰還することから『生還少女』とか『不死身シールド』とか……」
line = "「後はどんな悪条件でも生存、帰還することから『生還少女』とか『不死身シールド』とか……」"

[[dialogue]]
speaker = "アム"
# 「その２つ、ほんっと嫌い！！　広めたの誰だよほんとに～！！」
line = "「その２つ、ほんっと嫌い！！　広めたの誰だよほんとに～！！」"

[[dialogue]]
speaker = "アム"
# 「うぅううっ……どうしてみんなあたしに変なあだ名付けるんだよぅ……！」
line = "「うぅううっ……どうしてみんなあたしに変なあだ名付けるんだよぅ……！」"

[[dialogue]]
speaker = "マトイ"
# 「アムちゃんってアステラ対処でよく出動するし、危ないところを救われた生徒も多いから。人によってあだ名が違うんだよね」
line = "「アムちゃんってアステラ対処でよく出動するし、危ないところを救われた生徒も多いから。人によってあだ名が違うんだよね」"

[[dialogue]]
speaker = "アナ"
# 「そう。おまけに小さい背丈でマスコットみがあるから、いじられるのも仕方がない」
line = "「そう。おまけに小さい背丈でマスコットみがあるから、いじられるのも仕方がない」"

[[dialogue]]
speaker = "アム"
# 「それアナ先輩に言われるのは何か納得いかないんですけど！？」
line = "「それアナ先輩に言われるのは何か納得いかないんですけど！？」"

[[dialogue]]
speaker = "アナ"
# （……なお会長。あだ名を用いる際は、あんまりしつこくしないこと。でないと大変なことになる）
line = "（……なお会長。あだ名を用いる際は、あんまりしつこくしないこと。でないと大変なことになる）"

[[dialogue]]
speaker = "unk"
# それは一体、どういう？
line = "それは一体、どういう？"

[[dialogue]]
speaker = "附属生"
# 「やー、さすがはアム。今日もすごかったね！　流石は『絶壁』！」
line = "「やー、さすがはアム。今日もすごかったね！　流石は『絶壁』！」"

[[dialogue]]
speaker = "アム"
# 「ぜっぺき！？　む──むむ──むむむ──！」
line = "「ぜっぺき！？　む──むむ──むむむ──！」"

[[dialogue]]
speaker = "アム"
# 「むっかー！！　そのあだ名、一番嫌いって言ってるじゃん！！　も～あったま来た！」
line = "「むっかー！！　そのあだ名、一番嫌いって言ってるじゃん！！　も～あったま来た！」"

[[dialogue]]
speaker = "附属生"
# 「うわあああああ！？　ちょっ、悪かったってばー！」
line = "「うわあああああ！？　ちょっ、悪かったってばー！」"

[[dialogue]]
speaker = "アム"
# 「待てー！　逃げるなー！！」
line = "「待てー！　逃げるなー！！」"

[[dialogue]]
speaker = "アナ"
# 「プッツンするとビームを撃ちまくる悪癖がある。注意」
line = "「プッツンするとビームを撃ちまくる悪癖がある。注意」"

[[dialogue]]
speaker = "マトイ"
# 「あはは……アムちゃん、我慢が利かないから……」
line = "「あはは……アムちゃん、我慢が利かないから……」"

[[dialogue]]
speaker = "unk"
# 乱れ飛ぶビームを避ける生徒を見て、俺は絶対にあだ名でアムをからかわないようにしようと誓うのだった。
line = "乱れ飛ぶビームを避ける生徒を見て、俺は絶対にあだ名でアムをからかわないようにしようと誓うのだった。"

[[dialogue]]
speaker = "unk"
# なおその後、ビーム乱射のお叱りを受けたアムが反省文を書かされたのは言うまでもない。
line = "なおその後、ビーム乱射のお叱りを受けたアムが反省文を書かされたのは言うまでもない。"

[[dialogue]]
speaker = "アム"
# 「うぅ……また内申点、下がっちゃった。星徒会長になれなかったらどうしよう～……！？」
line = "「うぅ……また内申点、下がっちゃった。星徒会長になれなかったらどうしよう～……！？」"
