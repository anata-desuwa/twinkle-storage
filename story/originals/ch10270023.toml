[[dialogue]]
speaker = "unk"
# 第３話,コハルコの趣味,P
line = "第３話,コハルコの趣味,P"

[[dialogue]]
speaker = "unk"
# 今日はコハルコさんと一緒にＰＣパーツショップの店番をしていたのだが……
line = "今日はコハルコさんと一緒にＰＣパーツショップの店番をしていたのだが……"

[[dialogue]]
speaker = "コハルコ"
# 「むっすー」
line = "「むっすー」"

[[dialogue]]
speaker = "レイラ"
# 「おや、コハルコさん、ずいぶんご機嫌ナナメですね。何かあったんですか？」
line = "「おや、コハルコさん、ずいぶんご機嫌ナナメですね。何かあったんですか？」"

[[dialogue]]
speaker = "コハルコ"
# 「聞いてよレイラ。会長さんが浮気したんだよ、う～わ～き～！」
line = "「聞いてよレイラ。会長さんが浮気したんだよ、う～わ～き～！」"

[[dialogue]]
speaker = "レイラ"
# 「え、こんな<ruby=むっつりドスケベ>欲求不満女</ruby>つかまえて、他にも手を出してたんですか！？　そんな甲斐性が魔王さんにあったとは驚きですね」
line = "「え、こんな<ruby>欲求不満女<rt>むっつりドスケベ</rt></ruby>つかまえて、他にも手を出してたんですか！？　そんな甲斐性が魔王さんにあったとは驚きですね」"

[[dialogue]]
speaker = "コハルコ"
# 「はぁ！？　むっつりドスケベ！？」
line = "「はぁ！？　むっつりドスケベ！？」"

[[dialogue]]
speaker = "レイラ"
# 「だってデスクトップはエッチなゲームのショートカットでいっぱいなんでしょう？」
line = "「だってデスクトップはエッチなゲームのショートカットでいっぱいなんでしょう？」"

[[dialogue]]
speaker = "コハルコ"
# 「っ！　まさか、私のプライベートＰＣにハッキングした！？　それとも店の入荷記録を？　いや、両方とも侵入の形跡はなかったはず！」
line = "「っ！　まさか、私のプライベートＰＣにハッキングした！？　それとも店の入荷記録を？　いや、両方とも侵入の形跡はなかったはず！」"

[[dialogue]]
speaker = "レイラ"
# 「おや、ジャスティスウィザードともあろうお方が、恋人ができてあま～くなったんじゃないですか？　コハルコさんのお店の取引業者を洗えば、ゲームの納品記録は確認できます」
line = "「おや、ジャスティスウィザードともあろうお方が、恋人ができてあま～くなったんじゃないですか？　コハルコさんのお店の取引業者を洗えば、ゲームの納品記録は確認できます」"

[[dialogue]]
speaker = "レイラ"
# 「実際に販売しているのか、自家消費しているのかは分からないのでカマをかけたんですが……間抜けは見つかったようですね」
line = "「実際に販売しているのか、自家消費しているのかは分からないのでカマをかけたんですが……間抜けは見つかったようですね」"

[[dialogue]]
speaker = "コハルコ"
# 「ぐぬぬぬ……」
line = "「ぐぬぬぬ……」"

[[dialogue]]
speaker = "レイラ"
# 「ふっ、<ruby=パーフェクトビクトリー>完全勝利</ruby>」
line = "「ふっ、<ruby>完全勝利<rt>パーフェクトビクトリー</rt></ruby>」"

[[dialogue]]
speaker = "レイラ"
# 「ところで、魔王さんはコハルコさんの趣味はご存知なんですか？」
line = "「ところで、魔王さんはコハルコさんの趣味はご存知なんですか？」"

[[dialogue]]
speaker = "unk"
# まぁ、なんとなくは……
line = "まぁ、なんとなくは……"

[[dialogue]]
speaker = "レイラ"
# 「ほら。こんなに理解ある魔王さんが浮気なんてするわけないじゃないですか。何があったんですか？」
line = "「ほら。こんなに理解ある魔王さんが浮気なんてするわけないじゃないですか。何があったんですか？」"

[[dialogue]]
speaker = "レイラ"
# 「……へ？　魔王さんの次のパソコンはコハルコさんが組むって約束してたのに、お母さんからお下がりをもらっちゃった？」
line = "「……へ？　魔王さんの次のパソコンはコハルコさんが組むって約束してたのに、お母さんからお下がりをもらっちゃった？」"

[[dialogue]]
speaker = "レイラ"
# 「えぇ、しょうもな……」
line = "「えぇ、しょうもな……」"

[[dialogue]]
speaker = "コハルコ"
# 「しょうもないって言うなー！」
line = "「しょうもないって言うなー！」"

[[dialogue]]
speaker = "コハルコ"
# 「自分でもめんどくさい彼女だと思うよ。でも、私にとっては大事なことなの！」
line = "「自分でもめんどくさい彼女だと思うよ。でも、私にとっては大事なことなの！」"

[[dialogue]]
speaker = "コハルコ"
# 「会長さんと、あれいいね、これいいねって言いながらひとつのパソコンを作り上げたかった……」
line = "「会長さんと、あれいいね、これいいねって言いながらひとつのパソコンを作り上げたかった……」"

[[dialogue]]
speaker = "コハルコ"
# 「もう、こんな時にモンスター！？　いくよ、会長さん！」
line = "「もう、こんな時にモンスター！？　いくよ、会長さん！」"

[[dialogue]]
speaker = "レイラ"
# 「あ、私も行きます！」
line = "「あ、私も行きます！」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「照準補正、ターゲット確認」
line = "「照準補正、ターゲット確認」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「イルミナスシュート！」
line = "「イルミナスシュート！」"

[[dialogue]]
speaker = "unk"
# ドローンから放たれた光弾がモンスターを貫く。魔力と星力の併用にも慣れてきたようだ。
line = "ドローンから放たれた光弾がモンスターを貫く。魔力と星力の併用にも慣れてきたようだ。"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「……ふぅ、これで終わりだね」
line = "「……ふぅ、これで終わりだね」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# （あ、エッチなゲームの広告がまた変わってる……最近いろいろあったからチェックしてなかったな）
line = "（あ、エッチなゲームの広告がまた変わってる……最近いろいろあったからチェックしてなかったな）"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# （たくさん積みもあるし、帰ったらアレもプレイしなきゃ……）
line = "（たくさん積みもあるし、帰ったらアレもプレイしなきゃ……）"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# （くまさんそふとの新作……主人公の魔族の女の子は、口減らしで森に捨てられてしまう）
line = "（くまさんそふとの新作……主人公の魔族の女の子は、口減らしで森に捨てられてしまう）"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# （同じ境遇の仲間を見付けて、協力して森の出口を目指す胸熱ストーリー）
line = "（同じ境遇の仲間を見付けて、協力して森の出口を目指す胸熱ストーリー）"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# （でも選択肢を誤ると、悪い人さらいや魔獣に捕まってあんなことやこんなことを……）
line = "（でも選択肢を誤ると、悪い人さらいや魔獣に捕まってあんなことやこんなことを……）"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「むふ、むふふふふ……」
line = "「むふ、むふふふふ……」"

[[dialogue]]
speaker = "unk"
# コハルコさーん
line = "コハルコさーん"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「ハッ！？　ごめん、考えごとしてた」
line = "「ハッ！？　ごめん、考えごとしてた」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「……ケガはないかって？　うん、大丈夫。どこもケガしてないよ」
line = "「……ケガはないかって？　うん、大丈夫。どこもケガしてないよ」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「……ごめんね」
line = "「……ごめんね」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「会長さんは何も悪くないのに、勝手に拗ねたりして」
line = "「会長さんは何も悪くないのに、勝手に拗ねたりして」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「会長さんはいつも私のこと心配してくれるし、妹たちも気にかけてくれるし……優しくて、強くて、頼もしくて」
line = "「会長さんはいつも私のこと心配してくれるし、妹たちも気にかけてくれるし……優しくて、強くて、頼もしくて」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「エッチなゲームとか、パソコンとか、私の可愛くない趣味も嫌がらないでいてくれる」
line = "「エッチなゲームとか、パソコンとか、私の可愛くない趣味も嫌がらないでいてくれる」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「なのに、私は小さなことで怒って……ほんと、自分が情けないや」
line = "「なのに、私は小さなことで怒って……ほんと、自分が情けないや」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「……え、パソコンはお母さんに返す？　いいよ、そんなことしなくて。私が悪いんだし」
line = "「……え、パソコンはお母さんに返す？　いいよ、そんなことしなくて。私が悪いんだし」"

[[dialogue]]
speaker = "unk"
# 俺がコハルコさんとパソコンを組みたいんです
line = "俺がコハルコさんとパソコンを組みたいんです"

[[dialogue]]
speaker = "unk"
# まだパソコンのことはよく分からない。
line = "まだパソコンのことはよく分からない。"

[[dialogue]]
speaker = "unk"
# でも２人で一緒にパーツを選んで、組み立てる。それはとても魅力的だと思う。
line = "でも２人で一緒にパーツを選んで、組み立てる。それはとても魅力的だと思う。"

[[dialogue]]
speaker = "unk"
# コハルコさんの見ている世界を、俺も見てみたい。
line = "コハルコさんの見ている世界を、俺も見てみたい。"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「えへへ、ありがとう。会長さんが彼氏で私は幸せ者だね」
line = "「えへへ、ありがとう。会長さんが彼氏で私は幸せ者だね」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「じゃあ、パーツのこと、パソコンのこと、いっぱい教えてあげる。……さ、帰ろっか」
line = "「じゃあ、パーツのこと、パソコンのこと、いっぱい教えてあげる。……さ、帰ろっか」"

[[dialogue]]
speaker = "レイラ"
# 「あのー、助けてくださーい！　壁にはまっちゃって抜けないんですー！　魔王さーん！　コハルコさーん！　あれ、帰っちゃった？　……誰かいませんかー！？」
line = "「あのー、助けてくださーい！　壁にはまっちゃって抜けないんですー！　魔王さーん！　コハルコさーん！　あれ、帰っちゃった？　……誰かいませんかー！？」"
