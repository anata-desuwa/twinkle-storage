[[dialogue]]
speaker = "unk"
# 第１話,ラファエロのカリスマ,P
line = "第１話,ラファエロのカリスマ,P"

[[dialogue]]
speaker = "unk"
# 異邦の地アテネスから流星市国に迷い込んでしまった天才藝術家ラファエロ・サーラ。
line = "異邦の地アテネスから流星市国に迷い込んでしまった天才藝術家ラファエロ・サーラ。"

[[dialogue]]
speaker = "unk"
# 彼女にとっては見るもの全てが異端であり、さぞや不安な日々を過ごしているであろう──
line = "彼女にとっては見るもの全てが異端であり、さぞや不安な日々を過ごしているであろう──"

[[dialogue]]
speaker = "ラファエロ"
# 「この流星学園の制服、実にいいね！」
line = "「この流星学園の制服、実にいいね！」"

[[dialogue]]
speaker = "ラファエロ"
# 「同じ学び舎に通う者が一律で着用する統一性、肌触りも快適で動きやすい機能性、加えて、デザインも素晴らしい！　ぼくの魅力がより一層、引き出されてしまうよ！」
line = "「同じ学び舎に通う者が一律で着用する統一性、肌触りも快適で動きやすい機能性、加えて、デザインも素晴らしい！　ぼくの魅力がより一層、引き出されてしまうよ！」"

[[dialogue]]
speaker = "unk"
# ──と思いきや、本人は異世界を快適に楽しんでいた。
line = "──と思いきや、本人は異世界を快適に楽しんでいた。"

[[dialogue]]
speaker = "ラファエロ"
# 「しかし、この世界の人々は本当にぼくを知らないんだね」
line = "「しかし、この世界の人々は本当にぼくを知らないんだね」"

[[dialogue]]
speaker = "ラファエロ"
# 「天才藝術家のぼくの名も、さすがに異邦の地までは轟いていなかったか。いやはや、ぼくもまだまだだね」
line = "「天才藝術家のぼくの名も、さすがに異邦の地までは轟いていなかったか。いやはや、ぼくもまだまだだね」"

[[dialogue]]
speaker = "ラファエロ"
# 「アテネスではぼくの名を知らない人なんて誰ひとり、いや、猫の子１匹に至るまでいなかったくらいさ」
line = "「アテネスではぼくの名を知らない人なんて誰ひとり、いや、猫の子１匹に至るまでいなかったくらいさ」"

[[dialogue]]
speaker = "ラファエロ"
# 「そんなぼくのことを誰も知らないなんて、ちょっと驚いたけど、なんだか新鮮な気分だよ！」
line = "「そんなぼくのことを誰も知らないなんて、ちょっと驚いたけど、なんだか新鮮な気分だよ！」"

[[dialogue]]
speaker = "ソフィア"
# 「あの……ラファエロさんから見たら、ここは見知らぬ異世界……なんですよね？」
line = "「あの……ラファエロさんから見たら、ここは見知らぬ異世界……なんですよね？」"

[[dialogue]]
speaker = "ラファエロ"
# 「もちろんそうさ。見るもの聞くもの全てが初めて。このぼくの想像さえも上回るものばかりだ」
line = "「もちろんそうさ。見るもの聞くもの全てが初めて。このぼくの想像さえも上回るものばかりだ」"

[[dialogue]]
speaker = "unk"
# 不安だったりしないの？
line = "不安だったりしないの？"

[[dialogue]]
speaker = "ラファエロ"
# 「不安なんて言葉は、ぼくの辞書にはないよ」
line = "「不安なんて言葉は、ぼくの辞書にはないよ」"

[[dialogue]]
speaker = "ラファエロ"
# 「この程度のイレギュラー、天才のぼくにとっては創作のインスピレーションをかき立てるスパイスになるだけさ」
line = "「この程度のイレギュラー、天才のぼくにとっては創作のインスピレーションをかき立てるスパイスになるだけさ」"

[[dialogue]]
speaker = "ラファエロ"
# 「ああ、きみ、何か画材はないかい？　紙とペンだけでもいい！　この衝動は描き留めておかないとね」
line = "「ああ、きみ、何か画材はないかい？　紙とペンだけでもいい！　この衝動は描き留めておかないとね」"

[[dialogue]]
speaker = "ソフィア"
# 「それなら流星星徒会の備品が……これでいいでしょうか？」
line = "「それなら流星星徒会の備品が……これでいいでしょうか？」"

[[dialogue]]
speaker = "ラファエロ"
# 「十分だよ！　天才のぼくにもまだまだ伸び代があったなんて。新たな出会いに感謝しないとね！」
line = "「十分だよ！　天才のぼくにもまだまだ伸び代があったなんて。新たな出会いに感謝しないとね！」"

[[dialogue]]
speaker = "unk"
# ものすごい勢いで絵を描いている……！
line = "ものすごい勢いで絵を描いている……！"

[[dialogue]]
speaker = "ルリエル"
# 「自分で天才って言っちゃうんですねー。自信満々なだけに、すっごくお上手なのです！」
line = "「自分で天才って言っちゃうんですねー。自信満々なだけに、すっごくお上手なのです！」"

[[dialogue]]
speaker = "ソフィア"
# 「そういえば、以前に来たというアルテさんも、自分で天才って自称するタイプなんでしたっけ──？」
line = "「そういえば、以前に来たというアルテさんも、自分で天才って自称するタイプなんでしたっけ──？」"

[[dialogue]]
speaker = "ラファエロ"
# 「ん？　なんだい、この音は」
line = "「ん？　なんだい、この音は」"

[[dialogue]]
speaker = "ルリエル"
# 「モンスター出現警報なのです！」
line = "「モンスター出現警報なのです！」"

[[dialogue]]
speaker = "unk"
# 出動だ！
line = "出動だ！"

[[dialogue]]
speaker = "ソフィア"
# 「ラファエロさんはここでお待ちください！」
line = "「ラファエロさんはここでお待ちください！」"

[[dialogue]]
speaker = "ラファエロ"
# 「モンスターというのは、この世界の人に<ruby=あだ>仇</ruby>なす<ruby=いぎょう>異形</ruby>のことだね？」
line = "「モンスターというのは、この世界の人に<ruby>仇<rt>あだ</rt></ruby>なす<ruby>異形<rt>いぎょう</rt></ruby>のことだね？」"

[[dialogue]]
speaker = "ルリエル"
# 「はい！　とっても強くて、危ないのです！」
line = "「はい！　とっても強くて、危ないのです！」"

[[dialogue]]
speaker = "ラファエロ"
# 「ふむ。ぼくの世界でいうところの『死の芸術』か……」
line = "「ふむ。ぼくの世界でいうところの『死の芸術』か……」"

[[dialogue]]
speaker = "ラファエロ"
# 「ならば、ぼくも戦わせてもらうよ。例の事件で、ぼくもこの世界で戦うすべを手に入れてしまったからね」
line = "「ならば、ぼくも戦わせてもらうよ。例の事件で、ぼくもこの世界で戦うすべを手に入れてしまったからね」"

[[dialogue]]
speaker = "unk"
# 危ないと思ったら退いてくれ
line = "危ないと思ったら退いてくれ"

[[dialogue]]
speaker = "ラファエロ"
# 「ふふ、ありがとう。ご忠告感謝するよ。では、改めて──星騎士の諸君、出撃だ！」
line = "「ふふ、ありがとう。ご忠告感謝するよ。では、改めて──星騎士の諸君、出撃だ！」"

[[dialogue]]
speaker = "unk"
# 何故かラファエロが率いる形で、俺たちはモンスター反応のある地点へと向かうのだった。
line = "何故かラファエロが率いる形で、俺たちはモンスター反応のある地点へと向かうのだった。"

[[dialogue]]
speaker = "モンスター"
# 「イーーーーッ！」
line = "「イーーーーッ！」"

[[dialogue]]
speaker = "ルリエル"
# 「現場到着！　うじゃうじゃいますよ～っ！」
line = "「現場到着！　うじゃうじゃいますよ～っ！」"

[[dialogue]]
speaker = "ラファエロ"
# 「なるほど、あれがこの世界のモンスターか。見た目はさほど手強そうには見えないが……油断せずにいくよ！」
line = "「なるほど、あれがこの世界のモンスターか。見た目はさほど手強そうには見えないが……油断せずにいくよ！」"

[[dialogue]]
speaker = "ラファエロ"
# 「ぼくの真髄、見せてあげよう！」
line = "「ぼくの真髄、見せてあげよう！」"

[[dialogue]]
speaker = "unk"
# ラファエロの協力もあり、無数のモンスターたちがあっという間に蹴散らされていく。
line = "ラファエロの協力もあり、無数のモンスターたちがあっという間に蹴散らされていく。"

[[dialogue]]
speaker = "ルリエル"
# 「もうおしまいですか？　ラファエロさんのおかげで、すぐ終わっちゃいました！　楽勝なのです～！」
line = "「もうおしまいですか？　ラファエロさんのおかげで、すぐ終わっちゃいました！　楽勝なのです～！」"

[[dialogue]]
speaker = "ソフィア"
# 「待ってルリ！　５、６、７……反応より１匹足りない！　まだどこかに１匹──」
line = "「待ってルリ！　５、６、７……反応より１匹足りない！　まだどこかに１匹──」"

[[dialogue]]
speaker = "女性"
# 「きゃああああぁああぁぁっ！」
line = "「きゃああああぁああぁぁっ！」"

[[dialogue]]
speaker = "フワッチ"
# 「イ～～～ッ！」
line = "「イ～～～ッ！」"

[[dialogue]]
speaker = "ラファエロ"
# 「女性の悲鳴──そっちかっ！　イノセンス・アローッ！」
line = "「女性の悲鳴──そっちかっ！　イノセンス・アローッ！」"

[[dialogue]]
speaker = "フワッチ"
# 「イーーッ！？」
line = "「イーーッ！？」"

[[dialogue]]
speaker = "ルリエル"
# 「ラファエロさん、ナイスなのです！　間一髪でしたー！」
line = "「ラファエロさん、ナイスなのです！　間一髪でしたー！」"

[[dialogue]]
speaker = "ラファエロ"
# 「お嬢さん、大丈夫かい？　怪我はなかったかな？」
line = "「お嬢さん、大丈夫かい？　怪我はなかったかな？」"

[[dialogue]]
speaker = "女性"
# 「は、はい……助けてくださって、ありがとうございます！　初めてお見かけしましたけれど……あなたも星騎士なんですか？」
line = "「は、はい……助けてくださって、ありがとうございます！　初めてお見かけしましたけれど……あなたも星騎士なんですか？」"

[[dialogue]]
speaker = "ラファエロ"
# 「ぼくはラファエロ・サーラ。異邦から来た天才藝術家さ」
line = "「ぼくはラファエロ・サーラ。異邦から来た天才藝術家さ」"

[[dialogue]]
speaker = "女性"
# 「藝術家……？　星騎士ではないのに、私たちのために──」
line = "「藝術家……？　星騎士ではないのに、私たちのために──」"

[[dialogue]]
speaker = "ラファエロ"
# 「流星市国の人たちには、お世話になってるからね。みんなを守るためなら、喜んでこの身を捧げるよ」
line = "「流星市国の人たちには、お世話になってるからね。みんなを守るためなら、喜んでこの身を捧げるよ」"

[[dialogue]]
speaker = "女性"
# 「まあ……！　ラファエロ……ラファエロ・サーラ様<emoji=heart04>」
line = "「まあ……！　ラファエロ……ラファエロ・サーラ様<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
# 「バッチリ表情がキマってます！　流星市国の人もすっかりラファエロさんの虜なのです！」
line = "「バッチリ表情がキマってます！　流星市国の人もすっかりラファエロさんの虜なのです！」"

[[dialogue]]
speaker = "unk"
# たった一度の出撃でラファエロの存在と認知度は流星市国に広まり、市民のハートを鷲掴みにしたのだった。
line = "たった一度の出撃でラファエロの存在と認知度は流星市国に広まり、市民のハートを鷲掴みにしたのだった。"
