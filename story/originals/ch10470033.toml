[[dialogue]]
speaker = "unk"
# 第３話,メルエルは変態さん？,P
line = "第３話,メルエルは変態さん？,P"

[[dialogue]]
speaker = "unk"
# 体育終わりの昼休み。俺とメルエルは毎日、昼休みは一緒にお弁当を食べる約束をしているのだが──
line = "体育終わりの昼休み。俺とメルエルは毎日、昼休みは一緒にお弁当を食べる約束をしているのだが──"

[[dialogue]]
speaker = "unk"
# 制服に着替えたらすぐに出て来る！！
line = "制服に着替えたらすぐに出て来る！！"

[[dialogue]]
speaker = "unk"
# ごめん、メルエル！　ちょっと野暮用が！
line = "ごめん、メルエル！　ちょっと野暮用が！"

[[dialogue]]
speaker = "unk"
# 汗ばんだ体操着を星徒会室で着替えると、俺は薙刀部が起こしたトラブルを解決するべく、学園内を走りだした。
line = "汗ばんだ体操着を星徒会室で着替えると、俺は薙刀部が起こしたトラブルを解決するべく、学園内を走りだした。"

[[dialogue]]
speaker = "メルエル"
# 「会長くん、いってらっしゃ～い！」
line = "「会長くん、いってらっしゃ～い！」"

[[dialogue]]
speaker = "メルエル"
# 「って、あっという間に行っちゃった……今日はお昼、一緒に食べられなさそうだなぁ」
line = "「って、あっという間に行っちゃった……今日はお昼、一緒に食べられなさそうだなぁ」"

[[dialogue]]
speaker = "メルエル"
# （あっ、会長くんの席のところ……脱ぎたての体操着）
line = "（あっ、会長くんの席のところ……脱ぎたての体操着）"

[[dialogue]]
speaker = "メルエル"
# （ぬ、脱ぎっぱなしなのは、よくないよね！　お片付けの手伝い、するだけだから……）
line = "（ぬ、脱ぎっぱなしなのは、よくないよね！　お片付けの手伝い、するだけだから……）"

[[dialogue]]
speaker = "unk"
# 自分にそう言い聞かせながら、メルエルは汗でしっとりと濡れた体操着を拾い上げる。
line = "自分にそう言い聞かせながら、メルエルは汗でしっとりと濡れた体操着を拾い上げる。"

[[dialogue]]
speaker = "メルエル"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# 恋人の脱ぎたての体操着を手に持つ。ただそれだけなのに、なぜかメルエルはあたりをキョロキョロと見回してしまう。
line = "恋人の脱ぎたての体操着を手に持つ。ただそれだけなのに、なぜかメルエルはあたりをキョロキョロと見回してしまう。"

[[dialogue]]
speaker = "ヴィーナス"
# 「メルエル！　あなた、コソコソしていてかなり挙動不審よ！」
line = "「メルエル！　あなた、コソコソしていてかなり挙動不審よ！」"

[[dialogue]]
speaker = "メルエル"
# 「ふわぁああぁあぁっ！？」
line = "「ふわぁああぁあぁっ！？」"

[[dialogue]]
speaker = "メルエル"
# 「び、びびび、ヴィーナスちゃんっ！？」
line = "「び、びびび、ヴィーナスちゃんっ！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「何も言わなくても、全部わかっているわ！」
line = "「何も言わなくても、全部わかっているわ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ズバリ、メルエル――あなたは今、クロトの汗がしみ込んだ体操着を思い切りクンクンしたいと思っているわねっ！！」
line = "「ズバリ、メルエル――あなたは今、クロトの汗がしみ込んだ体操着を思い切りクンクンしたいと思っているわねっ！！」"

[[dialogue]]
speaker = "メルエル"
# 「思ってないよ、そんなこと！？」
line = "「思ってないよ、そんなこと！？」"

[[dialogue]]
speaker = "メルエル"
# 「やだな、ヴィーナスちゃん！！　いくら会長くんのことが大好きだからって……」
line = "「やだな、ヴィーナスちゃん！！　いくら会長くんのことが大好きだからって……」"

[[dialogue]]
speaker = "メルエル"
# 「汗をかいた体操着をクンクンしたいだなんて、そんな変態さんみたいなこと、ちょっとも考えたことないよ！？」
line = "「汗をかいた体操着をクンクンしたいだなんて、そんな変態さんみたいなこと、ちょっとも考えたことないよ！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「嘘ね！　私には通用しないわ！！」
line = "「嘘ね！　私には通用しないわ！！」"

[[dialogue]]
speaker = "メルエル"
# 「…………はいぃ。私は今、嘘をつきましたぁ」
line = "「…………はいぃ。私は今、嘘をつきましたぁ」"

[[dialogue]]
speaker = "メルエル"
# 「本当は会長くんの体操着をクンクンしてみたいと思っていた変態さんです……」
line = "「本当は会長くんの体操着をクンクンしてみたいと思っていた変態さんです……」"

[[dialogue]]
speaker = "メルエル"
# 「で、でも待って！　これはちょっと、魔が差しただけっていうか……！」
line = "「で、でも待って！　これはちょっと、魔が差しただけっていうか……！」"

[[dialogue]]
speaker = "メルエル"
# 「未遂なのっ。思っちゃっただけで、実行には移したりしてないよっ！」
line = "「未遂なのっ。思っちゃっただけで、実行には移したりしてないよっ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうなの？　したいならしちゃえばいいのに」
line = "「そうなの？　したいならしちゃえばいいのに」"

[[dialogue]]
speaker = "メルエル"
# 「ふぇええ……？」
line = "「ふぇええ……？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロトの匂いって、なんだかすっごく安心するわよね♪」
line = "「クロトの匂いって、なんだかすっごく安心するわよね♪」"

[[dialogue]]
speaker = "メルエル"
# 「そ、そうなの！　ヴィーナスちゃんもわかる！？」
line = "「そ、そうなの！　ヴィーナスちゃんもわかる！？」"

[[dialogue]]
speaker = "メルエル"
# 「安心するっていうのもあるし、会長くんに抱きしめられてるみたいでドキドキするっていうか！！」
line = "「安心するっていうのもあるし、会長くんに抱きしめられてるみたいでドキドキするっていうか！！」"

[[dialogue]]
speaker = "メルエル"
# 「ヴィーナスちゃんも、そういう気持ちになっちゃうことあるんだっ！？」
line = "「ヴィーナスちゃんも、そういう気持ちになっちゃうことあるんだっ！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ドキドキはしないし、さすがに体操着の匂いまで嗅ぎたいとは思わないわね！！」
line = "「ドキドキはしないし、さすがに体操着の匂いまで嗅ぎたいとは思わないわね！！」"

[[dialogue]]
speaker = "メルエル"
# 「はぇえええぇ～～～～！？」
line = "「はぇえええぇ～～～～！？」"

[[dialogue]]
speaker = "メルエル"
# 「今、何だかすっごく『わかる！』みたいなノリだったのに……！？」
line = "「今、何だかすっごく『わかる！』みたいなノリだったのに……！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「近くにいて安心するのは本当よ。あと、メルエルが完全にヨミヨミと同じ目をしてたから、すぐにわかったわ！」
line = "「近くにいて安心するのは本当よ。あと、メルエルが完全にヨミヨミと同じ目をしてたから、すぐにわかったわ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「でもそれって、それだけクロトのことが大好きってことでしょ？」
line = "「でもそれって、それだけクロトのことが大好きってことでしょ？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「全然悪いことではないと思うのだけれど、メルエルはどうして隠すのかしら？」
line = "「全然悪いことではないと思うのだけれど、メルエルはどうして隠すのかしら？」"

[[dialogue]]
speaker = "メルエル"
# 「だって、恋人の匂いが好きな女の子なんて……ちょっと、はしたないんじゃないかなぁ？」
line = "「だって、恋人の匂いが好きな女の子なんて……ちょっと、はしたないんじゃないかなぁ？」"

[[dialogue]]
speaker = "メルエル"
# 「会長くんの前では、ちゃんと可愛い女の子でいたいというか、なんというか……」
line = "「会長くんの前では、ちゃんと可愛い女の子でいたいというか、なんというか……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「なるほどね！　恋人のメルエルにそこまで思ってもらえるなんて、クロトは果報者だわ！」
line = "「なるほどね！　恋人のメルエルにそこまで思ってもらえるなんて、クロトは果報者だわ！」"

[[dialogue]]
speaker = "メルエル"
# 「……ヴィーナスちゃん！！」
line = "「……ヴィーナスちゃん！！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「でもメルエルはあれね！　むっつりドスケベってやつね！！」
line = "「でもメルエルはあれね！　むっつりドスケベってやつね！！」"

[[dialogue]]
speaker = "メルエル"
# 「ヴィーナスちゃん！？」
line = "「ヴィーナスちゃん！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ちなみにクロトもむっつりよ！　似た者カップルね♪」
line = "「ちなみにクロトもむっつりよ！　似た者カップルね♪」"

[[dialogue]]
speaker = "メルエル"
# 「そ、そうなの！？」
line = "「そ、そうなの！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「星徒会の仕事中もメルエルの写真をこっそり見て、１人でニヤニヤしてるんだもの！　あれはかなりのむっつりよ！」
line = "「星徒会の仕事中もメルエルの写真をこっそり見て、１人でニヤニヤしてるんだもの！　あれはかなりのむっつりよ！」"

[[dialogue]]
speaker = "メルエル"
# 「そ、そうなんだ。えへ、えへへへへへぇ<emoji=heart04>」
line = "「そ、そうなんだ。えへ、えへへへへへぇ<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
# （会長くん、私がいないところでも、私のことを想ってくれてるなんて……！　ふわぁ～っ<emoji=heart04>　嬉しすぎて、メルトしちゃうよぉ～っ<emoji=heart04><emoji=heart04>）
line = "（会長くん、私がいないところでも、私のことを想ってくれてるなんて……！　ふわぁ～っ<emoji=heart04>　嬉しすぎて、メルトしちゃうよぉ～っ<emoji=heart04><emoji=heart04>）"

[[dialogue]]
speaker = "ヴィーナス"
# 「でも、むっつりとむっつりでは話が進まないわ！」
line = "「でも、むっつりとむっつりでは話が進まないわ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「メルエル！　たまには強引に行く積極性も重要よ！！」
line = "「メルエル！　たまには強引に行く積極性も重要よ！！」"

[[dialogue]]
speaker = "メルエル"
# 「ご、強引に……」
line = "「ご、強引に……」"

[[dialogue]]
speaker = "メルエル"
# 「でも私、むしろ会長くんには……強引にされちゃいたいっていうか、なんていうかぁ……」
line = "「でも私、むしろ会長くんには……強引にされちゃいたいっていうか、なんていうかぁ……」"

[[dialogue]]
speaker = "メルエル"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "メルエル"
# 「あのね、ヴィーナスちゃんだから言うんだけど……たぶん私――Ｍだと思うんだ……！」
line = "「あのね、ヴィーナスちゃんだから言うんだけど……たぶん私――Ｍだと思うんだ……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふむふむ。それで言うなら、むっつりなだけで、クロトはＳな気がするわね」
line = "「ふむふむ。それで言うなら、むっつりなだけで、クロトはＳな気がするわね」"

[[dialogue]]
speaker = "メルエル"
# 「やっぱりそうだよねっ！　２人きりの時の会長くん、時々すっごく強引で……ぐいってされると、キュンキュンしちゃうのっ<emoji=heart04>」
line = "「やっぱりそうだよねっ！　２人きりの時の会長くん、時々すっごく強引で……ぐいってされると、キュンキュンしちゃうのっ<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
# 「でもそれならそれで、『サソイウケ』？　っていう必殺技があるらしいわ！」
line = "「でもそれならそれで、『サソイウケ』？　っていう必殺技があるらしいわ！」"

[[dialogue]]
speaker = "メルエル"
# 「さそいうけ……？　それってどういう必殺技なのっ？　私、すっごく気になるよ！！」
line = "「さそいうけ……？　それってどういう必殺技なのっ？　私、すっごく気になるよ！！」"

[[dialogue]]
speaker = "unk"
# それからも――クロト不在の星徒会室で、メルエルとヴィーナスの不穏（？）なガールズトークは、どこまでも続くのだった。
line = "それからも――クロト不在の星徒会室で、メルエルとヴィーナスの不穏（？）なガールズトークは、どこまでも続くのだった。"
