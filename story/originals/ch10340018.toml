# 「ふっ……んんんっ<emoji=heart04>　首輪締められながら、せーえき出されてっ<emoji=heart04>　メス犬ま○こイッてるぅっ<emoji=heart04>」
line = "「ふっ……んんんっ<emoji=heart04>　首輪締められながら、せーえき出されてっ<emoji=heart04>　メス犬ま○こイッてるぅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ぎゅっと収縮して悦ぶカティアの膣に締め付けられながら、最後の一滴まで注ぎ込む。
line = "ぎゅっと収縮して悦ぶカティアの膣に締め付けられながら、最後の一滴まで注ぎ込む。"

[[dialogue]]
speaker = "カティア"
# 「はぁ、あぁ……くぅん<emoji=heart04>　メス犬交尾好きぃ<emoji=heart04>　魔王様のせーし、たくさん入ってきてる……<emoji=heart04>」
line = "「はぁ、あぁ……くぅん<emoji=heart04>　メス犬交尾好きぃ<emoji=heart04>　魔王様のせーし、たくさん入ってきてる……<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
# 「ワン<emoji=heart04>　ワンワン<emoji=heart04>　わうぅ<emoji=heart04>　あ、あ、あ──くぅ～～んっ<emoji=heart04>」
line = "「ワン<emoji=heart04>　ワンワン<emoji=heart04>　わうぅ<emoji=heart04>　あ、あ、あ──くぅ～～んっ<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
# 「わふぅ……<emoji=heart04>　あ……おま○こから、せーえきこぼれちゃう……<emoji=heart04>」
line = "「わふぅ……<emoji=heart04>　あ……おま○こから、せーえきこぼれちゃう……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# もったいないと言わんばかりに、膣を締めて精液をお腹に留めようとする。
line = "もったいないと言わんばかりに、膣を締めて精液をお腹に留めようとする。"

[[dialogue]]
speaker = "unk"
# だけど溢れ出るのは止められなくて、どろりとした精液がいやらしく垂れ落ちていく。
line = "だけど溢れ出るのは止められなくて、どろりとした精液がいやらしく垂れ落ちていく。"

[[dialogue]]
speaker = "カティア"
# 「はぁ、はぁ……はあぁ……<emoji=heart04>　魔王様の精液で、お腹いっぱい……<emoji=heart04>」
line = "「はぁ、はぁ……はあぁ……<emoji=heart04>　魔王様の精液で、お腹いっぱい……<emoji=heart04>」"

[[dialogue]]
speaker = "カティア"
# 「ふあぁ……ぁ……メス犬交尾で……種付け……されちゃった<emoji=heart04>」
line = "「ふあぁ……ぁ……メス犬交尾で……種付け……されちゃった<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 荒い息を繰り返し、ぼんやりとした目で放心するカティア。
line = "荒い息を繰り返し、ぼんやりとした目で放心するカティア。"

[[dialogue]]
speaker = "unk"
# 犬のしっぽは嬉しそうに揺れていて、その表情は快楽に染まり切ったメスの顔だった。
line = "犬のしっぽは嬉しそうに揺れていて、その表情は快楽に染まり切ったメスの顔だった。"

[[dialogue]]
speaker = "クロト"
# 「また言うこと聞かなかったら片足上げておしっこさせるぞ。それとも……」
line = "「また言うこと聞かなかったら片足上げておしっこさせるぞ。それとも……」"

[[dialogue]]
speaker = "クロト"
# 「いい子にしてたらまた散歩に連れてきてやる──の方がいいか？」
line = "「いい子にしてたらまた散歩に連れてきてやる──の方がいいか？」"

[[dialogue]]
speaker = "カティア"
# 「くぅ～ん<emoji=heart04>」
line = "「くぅ～ん<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# お仕置きとご褒美が逆転してしまったカティアにそう告げると、服従を示すように、甘い声で鳴いたのだった。
line = "お仕置きとご褒美が逆転してしまったカティアにそう告げると、服従を示すように、甘い声で鳴いたのだった。"
