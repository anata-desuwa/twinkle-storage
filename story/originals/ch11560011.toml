[[dialogue]]
speaker = "unk"
# 第１話,異世界での華やかな生活,P
line = "第１話,異世界での華やかな生活,P"

[[dialogue]]
speaker = "unk"
# 陽彩との戦いに決着がつき──
line = "陽彩との戦いに決着がつき──"

[[dialogue]]
speaker = "unk"
# 『悪魔のロストアイテム』を寄生型生物から引きはがすため、オムニスと陽彩は元の世界へ転移していった。
line = "『悪魔のロストアイテム』を寄生型生物から引きはがすため、オムニスと陽彩は元の世界へ転移していった。"

[[dialogue]]
speaker = "いろは"
# 「よーし、そうと決まったらカラオケに行こっ♪」
line = "「よーし、そうと決まったらカラオケに行こっ♪」"

[[dialogue]]
speaker = "花織"
# 「あのさ、カラオケに行っても知らない曲ばっかりじゃない？　一応ここ、異世界だからね？」
line = "「あのさ、カラオケに行っても知らない曲ばっかりじゃない？　一応ここ、異世界だからね？」"

[[dialogue]]
speaker = "いろは"
# 「わかってるよ～。でも、こっちの世界の歌、どんなのがあるか気になるじゃん！」
line = "「わかってるよ～。でも、こっちの世界の歌、どんなのがあるか気になるじゃん！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「いいですね～。僭越ながらこちらの世界の魔法少女アニメの主題歌を披露しますよ☆」
line = "「いいですね～。僭越ながらこちらの世界の魔法少女アニメの主題歌を披露しますよ☆」"

[[dialogue]]
speaker = "いろは"
# 「本当！？　うっわ、テンション上がる～っ！」
line = "「本当！？　うっわ、テンション上がる～っ！」"

[[dialogue]]
speaker = "unk"
# ──いろははもうこの世界を満喫するモードに入っていた。
line = "──いろははもうこの世界を満喫するモードに入っていた。"

[[dialogue]]
speaker = "unk"
# だが花織は内心、穏やかでいられなかった。
line = "だが花織は内心、穏やかでいられなかった。"

[[dialogue]]
speaker = "花織"
# （いろはってば本当にすごいよ……こういう状況でも全然平気って感じで）
line = "（いろはってば本当にすごいよ……こういう状況でも全然平気って感じで）"

[[dialogue]]
speaker = "花織"
# （オムちゃんだけ元の世界に戻ったって、それ、ウチらだけこの世界に取り残されたってことじゃん）
line = "（オムちゃんだけ元の世界に戻ったって、それ、ウチらだけこの世界に取り残されたってことじゃん）"

[[dialogue]]
speaker = "花織"
# （トレジアンナさんは大丈夫って顔してるけど、陽彩ちゃんに取りついた寄生型悪魔を無事に切り離せるって保証もないし）
line = "（トレジアンナさんは大丈夫って顔してるけど、陽彩ちゃんに取りついた寄生型悪魔を無事に切り離せるって保証もないし）"

[[dialogue]]
speaker = "花織"
# （それにちゃんと元の世界に戻れてるのかも、もう一度ウチらのところに戻って来れるのかも……）
line = "（それにちゃんと元の世界に戻れてるのかも、もう一度ウチらのところに戻って来れるのかも……）"

[[dialogue]]
speaker = "花織"
# （なのに、なんでいろはは、あんな能天気でいられんのさ）
line = "（なのに、なんでいろはは、あんな能天気でいられんのさ）"

[[dialogue]]
speaker = "サチ"
# 「あの……」
line = "「あの……」"

[[dialogue]]
speaker = "花織"
# 「はいっ！」
line = "「はいっ！」"

[[dialogue]]
speaker = "サチ"
# 「いろいろ不安かと思いますが、こちらにいらっしゃる間、みなさんのことは私たちが全力でサポートします！」
line = "「いろいろ不安かと思いますが、こちらにいらっしゃる間、みなさんのことは私たちが全力でサポートします！」"

[[dialogue]]
speaker = "サチ"
# 「トレジアンナさんはああいう感じのヒトですが、裏では色々考えて行動する人なので……きっとオムニスさんも大丈夫ですよ」
line = "「トレジアンナさんはああいう感じのヒトですが、裏では色々考えて行動する人なので……きっとオムニスさんも大丈夫ですよ」"

[[dialogue]]
speaker = "花織"
# 「うん……ありがとう。わからないことだらけで迷惑をかけるかもだけど……よろしくね」
line = "「うん……ありがとう。わからないことだらけで迷惑をかけるかもだけど……よろしくね」"

[[dialogue]]
speaker = "サチ"
# 「はいっ、よろしくお願いします」
line = "「はいっ、よろしくお願いします」"

[[dialogue]]
speaker = "花織"
# 「あはは……」
line = "「あはは……」"

[[dialogue]]
speaker = "花織"
# （こんな年下の子に、励まされちゃって……情けないなぁ……）
line = "（こんな年下の子に、励まされちゃって……情けないなぁ……）"

[[dialogue]]
speaker = "花織"
# 「うわ……」
line = "「うわ……」"

[[dialogue]]
speaker = "いろは"
# 「なにこれ！　ここがサチちゃんたちの住んでる寮！？　ちょっと豪華すぎじゃない？」
line = "「なにこれ！　ここがサチちゃんたちの住んでる寮！？　ちょっと豪華すぎじゃない？」"

[[dialogue]]
speaker = "花織"
# （ちょっとどころじゃないんですけど！　これ本当に学園の寮なの？）
line = "（ちょっとどころじゃないんですけど！　これ本当に学園の寮なの？）"

[[dialogue]]
speaker = "花織"
# （お嬢様ばっかの<ruby=たけらほ>武良穂</ruby>に通ってる陽彩ちゃんならともかく、ウチらじゃ場違い感半端ないって！）
line = "（お嬢様ばっかの<ruby>武良穂<rt>たけらほ</rt></ruby>に通ってる陽彩ちゃんならともかく、ウチらじゃ場違い感半端ないって！）"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「おーっほっほっほ！　ようこそおいでくださいましたわ、異世界の魔法少女の方々。サチさんより事情は伺っておりますわ」
line = "「おーっほっほっほ！　ようこそおいでくださいましたわ、異世界の魔法少女の方々。サチさんより事情は伺っておりますわ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「部屋には余裕がありますので、３人程度であれば問題なく受け入れられますの。滞在中はここ『流星寮イルソーレ』でゆっくりおくつろぎくださいませ♪」
line = "「部屋には余裕がありますので、３人程度であれば問題なく受け入れられますの。滞在中はここ『流星寮イルソーレ』でゆっくりおくつろぎくださいませ♪」"

[[dialogue]]
speaker = "ここあ"
# 「ありがとうございます！　突然で申し訳ありませんが、お邪魔させてもらいますっ」
line = "「ありがとうございます！　突然で申し訳ありませんが、お邪魔させてもらいますっ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「あら、そちらの方、どうかされましたの？」
line = "「あら、そちらの方、どうかされましたの？」"

[[dialogue]]
speaker = "花織"
# 「えっ！　う、ウチ？」
line = "「えっ！　う、ウチ？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「先ほどから私のことをじーっと見つめていらっしゃったので。何か気になることでもございましたか？」
line = "「先ほどから私のことをじーっと見つめていらっしゃったので。何か気になることでもございましたか？」"

[[dialogue]]
speaker = "花織"
# 「え、ええと……すごく高貴な感じがするっていうか、オーラがすごいっていうか！　そういうのに見とれちゃって！」
line = "「え、ええと……すごく高貴な感じがするっていうか、オーラがすごいっていうか！　そういうのに見とれちゃって！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「わ、私に……？」
line = "「わ、私に……？」"

[[dialogue]]
speaker = "いろは"
# 「カオリンはえっと、なんだっけ……そうそう、ミーハーなんだよね！」
line = "「カオリンはえっと、なんだっけ……そうそう、ミーハーなんだよね！」"

[[dialogue]]
speaker = "ここあ"
# 「にゃはは、セレブみたいなのに興味ある感じ？」
line = "「にゃはは、セレブみたいなのに興味ある感じ？」"

[[dialogue]]
speaker = "花織"
# 「失礼だったらごめんなさいっ！　でもでも、すっごく素敵な方だなって！！」
line = "「失礼だったらごめんなさいっ！　でもでも、すっごく素敵な方だなって！！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「おーっほっほっほ、謝ることはありませんのよ！　高貴な者は見られるのも務め。そういうことなら、存分に眺めてもらって構いませんわ♪」
line = "「おーっほっほっほ、謝ることはありませんのよ！　高貴な者は見られるのも務め。そういうことなら、存分に眺めてもらって構いませんわ♪」"

[[dialogue]]
speaker = "花織"
# 「あ、ありがとうございます……」
line = "「あ、ありがとうございます……」"

[[dialogue]]
speaker = "花織"
# （堂々としてて凄いっ！　でも見てることがバレてると、恥ずかしくて逆に見つめられないよぉ～）
line = "（堂々としてて凄いっ！　でも見てることがバレてると、恥ずかしくて逆に見つめられないよぉ～）"

[[dialogue]]
speaker = "サチ"
# 「それではみなさん、お部屋の方にご案内しますね」
line = "「それではみなさん、お部屋の方にご案内しますね」"

[[dialogue]]
speaker = "いろは"
# 「おねがいしま～す♪」
line = "「おねがいしま～す♪」"

[[dialogue]]
speaker = "舞亜"
# 「サチちゃん、やっほ～♪」
line = "「サチちゃん、やっほ～♪」"

[[dialogue]]
speaker = "サチ"
# 「あ、舞亜先輩。大会の遠征から戻られたんですね？」
line = "「あ、舞亜先輩。大会の遠征から戻られたんですね？」"

[[dialogue]]
speaker = "舞亜"
# 「そーなの。そっちの人たちはお客様？」
line = "「そーなの。そっちの人たちはお客様？」"

[[dialogue]]
speaker = "サチ"
# 「はい、いろいろ事情があって、しばらく流星寮で過ごしてもらうことになりました」
line = "「はい、いろいろ事情があって、しばらく流星寮で過ごしてもらうことになりました」"

[[dialogue]]
speaker = "舞亜"
# 「そーなんだ。柊舞亜です、ヨロシク～」
line = "「そーなんだ。柊舞亜です、ヨロシク～」"

[[dialogue]]
speaker = "ここあ"
# 「にゃはは、よろしくね～♪」
line = "「にゃはは、よろしくね～♪」"

[[dialogue]]
speaker = "花織"
# （うっわ、何、この人！？　すっごい美人だし……芸能人！？）
line = "（うっわ、何、この人！？　すっごい美人だし……芸能人！？）"

[[dialogue]]
speaker = "いろは"
# 「えーっ、プロのフィギュアスケートの選手なの！？　すっご！！」
line = "「えーっ、プロのフィギュアスケートの選手なの！？　すっご！！」"

[[dialogue]]
speaker = "サチ"
# 「ただのプロ選手じゃありませんよ、なんと金メダルを取ったこともあるんですから」
line = "「ただのプロ選手じゃありませんよ、なんと金メダルを取ったこともあるんですから」"

[[dialogue]]
speaker = "舞亜"
# 「あはは、そんなに持ち上げられると恥ずかしいよ～」
line = "「あはは、そんなに持ち上げられると恥ずかしいよ～」"

[[dialogue]]
speaker = "花織"
# （さっきのヒルディオーネ寮長さんといい、この舞亜さんといい、すごい人ばっかり……よく見たら、なんかオーラのある人だらけ）
line = "（さっきのヒルディオーネ寮長さんといい、この舞亜さんといい、すごい人ばっかり……よく見たら、なんかオーラのある人だらけ）"

[[dialogue]]
speaker = "花織"
# （あっちの人はいかにも高貴な生まれです、って感じの雰囲気だし……）
line = "（あっちの人はいかにも高貴な生まれです、って感じの雰囲気だし……）"

[[dialogue]]
speaker = "花織"
# （あっちの人はキリッとしててカッコいい……そこら中にタダ者じゃない感じの人でいっぱいじゃん……）
line = "（あっちの人はキリッとしててカッコいい……そこら中にタダ者じゃない感じの人でいっぱいじゃん……）"

[[dialogue]]
speaker = "花織"
# （こんなトコでこれから何日も過ごすとか、ウチ、本当にやってけるの……？）
line = "（こんなトコでこれから何日も過ごすとか、ウチ、本当にやってけるの……？）"

[[dialogue]]
speaker = "unk"
# 流星寮と、そこに住まうヒトたちに圧倒される花織。
line = "流星寮と、そこに住まうヒトたちに圧倒される花織。"

[[dialogue]]
speaker = "unk"
# こうして不安でいっぱいな、魔法少女たちの異世界生活が始まったのだった。
line = "こうして不安でいっぱいな、魔法少女たちの異世界生活が始まったのだった。"
