[[dialogue]]
speaker = "モネ"
# 「図書館を利用する人と、利用しない人との違いってなんなんでしょうか」
line = "「図書館を利用する人と、利用しない人との違いってなんなんでしょうか」"

[[dialogue]]
speaker = "モネ"
# 「学生時代図書館を利用していなかった側として、ウィステリアさんはどう思いますか？」
line = "「学生時代図書館を利用していなかった側として、ウィステリアさんはどう思いますか？」"

[[dialogue]]
speaker = "ウィステリア"
# 「いつもは引っ込み思案なのに、そこで私に振るところに紙屋敷さんの胆力を感じるわ。そういうところ、私は好きよ」
line = "「いつもは引っ込み思案なのに、そこで私に振るところに紙屋敷さんの胆力を感じるわ。そういうところ、私は好きよ」"

[[dialogue]]
speaker = "モネ"
# 「え？　はい、ありがとうございます」
line = "「え？　はい、ありがとうございます」"

[[dialogue]]
speaker = "ウィステリア"
# 「そうねえ……遊びや部活で時間がなかったり、単純に字を読むのがめんどくさいってのが多いんじゃないかしら。実際私もそうだったわ」
line = "「そうねえ……遊びや部活で時間がなかったり、単純に字を読むのがめんどくさいってのが多いんじゃないかしら。実際私もそうだったわ」"

[[dialogue]]
speaker = "ウィステリア"
# 「紙屋敷さんみたいな、息をするみたいに本を読む人には理解できないでしょうけど」
line = "「紙屋敷さんみたいな、息をするみたいに本を読む人には理解できないでしょうけど」"

[[dialogue]]
speaker = "モネ"
# 「ですね。本を読むのはこんなに楽しいのに、めんどくさいなんて言う人がいるのが信じられません」
line = "「ですね。本を読むのはこんなに楽しいのに、めんどくさいなんて言う人がいるのが信じられません」"

[[dialogue]]
speaker = "モネ"
# 「今だって推理小説の続きが読みたくてうずうずしてるくらいですから」
line = "「今だって推理小説の続きが読みたくてうずうずしてるくらいですから」"

[[dialogue]]
speaker = "ウィステリア"
# 「あら、そろそろ犯人がわかるところ？」
line = "「あら、そろそろ犯人がわかるところ？」"

[[dialogue]]
speaker = "モネ"
# 「探偵事務所に依頼をしに来るはずの依頼人が行方不明になったところですね」
line = "「探偵事務所に依頼をしに来るはずの依頼人が行方不明になったところですね」"

[[dialogue]]
speaker = "ウィステリア"
# 「いきなり物騒ね。確かに続きが気になるわ」
line = "「いきなり物騒ね。確かに続きが気になるわ」"

[[dialogue]]
speaker = "ウィステリア"
# 「あと魔族──というか魔界出身者は二極化しやすい印象があるわね」
line = "「あと魔族──というか魔界出身者は二極化しやすい印象があるわね」"

[[dialogue]]
speaker = "モネ"
# 「二極化？　よく利用する人と、利用しない人にですか？」
line = "「二極化？　よく利用する人と、利用しない人にですか？」"

[[dialogue]]
speaker = "ウィステリア"
# 「そう。魔界って、人間界に比べて文明が進んでいないところが多いから、図書館なんてなかったり、本そのものが貴重な地域もあるの」
line = "「そう。魔界って、人間界に比べて文明が進んでいないところが多いから、図書館なんてなかったり、本そのものが貴重な地域もあるの」"

[[dialogue]]
speaker = "ウィステリア"
# 「だから魔界出身者は図書館に馴染みがなかったり、全然本を読まない子もいるのよ。知的好奇心を刺激されて読書に夢中になる子もいるけどね」
line = "「だから魔界出身者は図書館に馴染みがなかったり、全然本を読まない子もいるのよ。知的好奇心を刺激されて読書に夢中になる子もいるけどね」"

[[dialogue]]
speaker = "モネ"
# 「なるほど……魔界の環境について触れた本もありましたけど、私が読んだ以上に差が大きいんですね」
line = "「なるほど……魔界の環境について触れた本もありましたけど、私が読んだ以上に差が大きいんですね」"

[[dialogue]]
speaker = "モネ"
# 「ウィステリアさんも魔界出身だから、本に馴染みがない方だったんですか？」
line = "「ウィステリアさんも魔界出身だから、本に馴染みがない方だったんですか？」"

[[dialogue]]
speaker = "ウィステリア"
# 「あー……私の場合は、実家に本がたくさんあったんだけどね。それこそ小さな図書館くらいの量が。小さい頃から読まされてたから本には飽き飽きしてたの」
line = "「あー……私の場合は、実家に本がたくさんあったんだけどね。それこそ小さな図書館くらいの量が。小さい頃から読まされてたから本には飽き飽きしてたの」"

[[dialogue]]
speaker = "モネ"
# 「小さな図書館くらい……！？　しかもウィステリアさんのご実家ということは、魔界の本なんですよね？　どんな本なんでしょう、気になります」
line = "「小さな図書館くらい……！？　しかもウィステリアさんのご実家ということは、魔界の本なんですよね？　どんな本なんでしょう、気になります」"

[[dialogue]]
speaker = "ウィステリア"
# 「ええっと……小難しい学問の本とかよ。そんなに面白いものじゃないわ」
line = "「ええっと……小難しい学問の本とかよ。そんなに面白いものじゃないわ」"

[[dialogue]]
speaker = "モネ"
# 「いいえ、面白い本は小説だけではありませんよ。実用書は思考方法を学べますし、専門書の凝縮された情報量はくせになります」
line = "「いいえ、面白い本は小説だけではありませんよ。実用書は思考方法を学べますし、専門書の凝縮された情報量はくせになります」"

[[dialogue]]
speaker = "モネ"
# 「だからウィステリアさんのご実家の本も読んでみたいです！」
line = "「だからウィステリアさんのご実家の本も読んでみたいです！」"

[[dialogue]]
speaker = "ウィステリア"
# 「そ、そう……さすが紙屋敷さんね」
line = "「そ、そう……さすが紙屋敷さんね」"

[[dialogue]]
speaker = "ウィステリア"
# （うちのは読んだら呪われる本なんだけど……黙っておきましょう）
line = "（うちのは読んだら呪われる本なんだけど……黙っておきましょう）"

[[dialogue]]
speaker = "ウィステリア"
# 「まぁ、実家で蔵書を扱ってた経験もあって司書になれたのよ。数少ない実家に感謝できる点かしら」
line = "「まぁ、実家で蔵書を扱ってた経験もあって司書になれたのよ。数少ない実家に感謝できる点かしら」"

[[dialogue]]
speaker = "ウィステリア"
# 「さて、本を読まない人の意見が出たところで、読む人の意見も欲しいわね」
line = "「さて、本を読まない人の意見が出たところで、読む人の意見も欲しいわね」"

[[dialogue]]
speaker = "モネ"
# 「はい！　本の魅力はですね、まず紙とインクが混ざった匂いを肺いっぱいに吸い込んで──」
line = "「はい！　本の魅力はですね、まず紙とインクが混ざった匂いを肺いっぱいに吸い込んで──」"

[[dialogue]]
speaker = "ウィステリア"
# 「紙屋敷さんはレベルが高すぎて参考になりそうにないから、誰か別の人にしましょ」
line = "「紙屋敷さんはレベルが高すぎて参考になりそうにないから、誰か別の人にしましょ」"

[[dialogue]]
speaker = "モネ"
# 「うぅ、ウィステリアさん手厳しいです……。ちなみに私のマイブームは竹波書店の文庫本の匂いです」
line = "「うぅ、ウィステリアさん手厳しいです……。ちなみに私のマイブームは竹波書店の文庫本の匂いです」"

[[dialogue]]
speaker = "ウィステリア"
# 「上級者すぎて返しに困るわ。誰か話を聞けそうな人は──」
line = "「上級者すぎて返しに困るわ。誰か話を聞けそうな人は──」"

[[dialogue]]
speaker = "イクシリオン"
# 「むむ……むむむむ……」
line = "「むむ……むむむむ……」"

[[dialogue]]
speaker = "イクシリオン"
# 「隆々とした筋肉。惜しげもなく披露される肉体美」
line = "「隆々とした筋肉。惜しげもなく披露される肉体美」"

[[dialogue]]
speaker = "イクシリオン"
# 「そして股間の──」
line = "「そして股間の──」"

[[dialogue]]
speaker = "モネ"
# 「イクシーさん」
line = "「イクシーさん」"

[[dialogue]]
speaker = "イクシリオン"
# 「ひゃいっ！？」
line = "「ひゃいっ！？」"

[[dialogue]]
speaker = "モネ"
# 「すみません、独り言が声に出ていましたよ。図書館ですのでご協力お願いします」
line = "「すみません、独り言が声に出ていましたよ。図書館ですのでご協力お願いします」"

[[dialogue]]
speaker = "イクシリオン"
# 「あ……申し訳ありません。つい……」
line = "「あ……申し訳ありません。つい……」"

[[dialogue]]
speaker = "モネ"
# 「そんなに夢中になって、何の本を読まれてたんですか？」
line = "「そんなに夢中になって、何の本を読まれてたんですか？」"

[[dialogue]]
speaker = "イクシリオン"
# 「え、えーと……」
line = "「え、えーと……」"

[[dialogue]]
speaker = "モネ"
# 「なるほど、ギリシャ彫刻の本ですね。長い時を経ても色褪せない芸術には目を奪われます。美術、お好きなんですか？」
line = "「なるほど、ギリシャ彫刻の本ですね。長い時を経ても色褪せない芸術には目を奪われます。美術、お好きなんですか？」"

[[dialogue]]
speaker = "イクシリオン"
# 「そ、そうなんです。古代の人間界の美術は興味深いですね」
line = "「そ、そうなんです。古代の人間界の美術は興味深いですね」"

[[dialogue]]
speaker = "モネ"
# 「でしたらイクシーさんにおすすめの本がありますよ。クラシック期の彫刻について、とても詳しく解説されているんです」
line = "「でしたらイクシーさんにおすすめの本がありますよ。クラシック期の彫刻について、とても詳しく解説されているんです」"

[[dialogue]]
speaker = "イクシリオン"
# 「！　大変気になります」
line = "「！　大変気になります」"

[[dialogue]]
speaker = "モネ"
# 「あと、図書館によく来られているイクシーさんにお願いがありまして……少しお時間いいでしょうか？」
line = "「あと、図書館によく来られているイクシーさんにお願いがありまして……少しお時間いいでしょうか？」"

[[dialogue]]
speaker = "イクシリオン"
# 「もちろんです。このイクシリオン、お役に立てるなら喜んで協力させていただきますっ」
line = "「もちろんです。このイクシリオン、お役に立てるなら喜んで協力させていただきますっ」"
