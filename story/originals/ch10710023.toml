[[dialogue]]
speaker = "unk"
# 第３話,キサナがいる生活,P
line = "第３話,キサナがいる生活,P"

[[dialogue]]
speaker = "キサナ"
# 「起きろー、魔王。朝だぜ」
line = "「起きろー、魔王。朝だぜ」"

[[dialogue]]
speaker = "キサナ"
# 「チッ、なかなか起きねえな。ここは一発、ド派手にお見舞いしてやるか」
line = "「チッ、なかなか起きねえな。ここは一発、ド派手にお見舞いしてやるか」"

[[dialogue]]
speaker = "unk"
# お、おはよう！
line = "お、おはよう！"

[[dialogue]]
speaker = "キサナ"
# 「お、やっと起きやがった。朝メシの時間だ。顔洗ってこい」
line = "「お、やっと起きやがった。朝メシの時間だ。顔洗ってこい」"

[[dialogue]]
speaker = "unk"
# 恋人になった矢先、キサナは俺の家に転がり込んできた。キサナが言うには、男と女は一緒に暮らすものらしい。
line = "恋人になった矢先、キサナは俺の家に転がり込んできた。キサナが言うには、男と女は一緒に暮らすものらしい。"

[[dialogue]]
speaker = "unk"
# ちょっと戸惑ったけど、いつもキサナの顔が見れて嬉しい。
line = "ちょっと戸惑ったけど、いつもキサナの顔が見れて嬉しい。"

[[dialogue]]
speaker = "キサナ"
# 「おい、なにニヤニヤしてんだ。メシが冷めるだろーが、早く顔洗ってこいっつってんだろ！」
line = "「おい、なにニヤニヤしてんだ。メシが冷めるだろーが、早く顔洗ってこいっつってんだろ！」"

[[dialogue]]
speaker = "リノ"
# 「おはよう、クロト。キサナちゃんも起こしてきてくれてありがとうね」
line = "「おはよう、クロト。キサナちゃんも起こしてきてくれてありがとうね」"

[[dialogue]]
speaker = "キサナ"
# 「うっす」
line = "「うっす」"

[[dialogue]]
speaker = "キサナ"
# 「んじゃ、朝飯いただきます」
line = "「んじゃ、朝飯いただきます」"

[[dialogue]]
speaker = "unk"
# 母さんの料理は栄養満点だけど、味にはそこまでこだわらない。でもキサナは喜んで食べてくれるからひと安心だ。
line = "母さんの料理は栄養満点だけど、味にはそこまでこだわらない。でもキサナは喜んで食べてくれるからひと安心だ。"

[[dialogue]]
speaker = "リノ"
# 「キサナちゃん、お箸の使い方うまくなったわね～」
line = "「キサナちゃん、お箸の使い方うまくなったわね～」"

[[dialogue]]
speaker = "キサナ"
# 「あざっす。姐さんのおかげっす」
line = "「あざっす。姐さんのおかげっす」"

[[dialogue]]
speaker = "リノ"
# 「ふふ、ありがとう。食べたらお勉強する？」
line = "「ふふ、ありがとう。食べたらお勉強する？」"

[[dialogue]]
speaker = "キサナ"
# 「あー、えっと、今日はこれからコイツと出かけるんで……な、そうだろ？」
line = "「あー、えっと、今日はこれからコイツと出かけるんで……な、そうだろ？」"

[[dialogue]]
speaker = "unk"
# キサナは子どものころ教育を受けられなかったらしく、今はその分勉強中だ。
line = "キサナは子どものころ教育を受けられなかったらしく、今はその分勉強中だ。"

[[dialogue]]
speaker = "unk"
# でも今日は勉強の気分じゃないらしい。
line = "でも今日は勉強の気分じゃないらしい。"

[[dialogue]]
speaker = "unk"
# 今日は一日デートの予定
line = "今日は一日デートの予定"

[[dialogue]]
speaker = "unk"
# 特に約束はしていないけど、口裏を合わせてみた。休日だし、元々そのつもりだ。
line = "特に約束はしていないけど、口裏を合わせてみた。休日だし、元々そのつもりだ。"

[[dialogue]]
speaker = "リノ"
# 「きゃー、若いっていいわね。じゃあ、ご飯も外で食べてくるわよね？　お小遣い渡すわね」
line = "「きゃー、若いっていいわね。じゃあ、ご飯も外で食べてくるわよね？　お小遣い渡すわね」"

[[dialogue]]
speaker = "キサナ"
# 「あ、いや……」
line = "「あ、いや……」"

[[dialogue]]
speaker = "リノ"
# 「遠慮しないで受け取って。年長者からの厚意は素直に受け取るのも礼儀よ。なんたって私、３００歳いってるしね」
line = "「遠慮しないで受け取って。年長者からの厚意は素直に受け取るのも礼儀よ。なんたって私、３００歳いってるしね」"

[[dialogue]]
speaker = "キサナ"
# （……なぁ魔王。お前の母親、マジで反応に困ること言うよな）
line = "（……なぁ魔王。お前の母親、マジで反応に困ること言うよな）"

[[dialogue]]
speaker = "unk"
# （なんかごめん）
line = "（なんかごめん）"

[[dialogue]]
speaker = "キサナ"
# 「アタシが昔いたとこだと、上から小遣い渡されたら、ヤバい仕事の前フリだったんで…………姐さんが言うならもらっとく……っす」
line = "「アタシが昔いたとこだと、上から小遣い渡されたら、ヤバい仕事の前フリだったんで…………姐さんが言うならもらっとく……っす」"

[[dialogue]]
speaker = "リノ"
# 「ここではそんな心配しなくていいのよ、キサナちゃん。安心しておいしいもの食べてきて！」
line = "「ここではそんな心配しなくていいのよ、キサナちゃん。安心しておいしいもの食べてきて！」"

[[dialogue]]
speaker = "キサナ"
# 「……うっす」
line = "「……うっす」"

[[dialogue]]
speaker = "unk"
# 俺たちは遊園地併設のプールに行くことにした。ここはプールで遊ぶのはもちろん、売店でグルメも楽しめる。
line = "俺たちは遊園地併設のプールに行くことにした。ここはプールで遊ぶのはもちろん、売店でグルメも楽しめる。"

[[dialogue]]
speaker = "キサナ"
# 「あーあ、まんまと金握らされちまった。いや、不満ってワケじゃねえけど……やっぱり落ち着かねえ」
line = "「あーあ、まんまと金握らされちまった。いや、不満ってワケじゃねえけど……やっぱり落ち着かねえ」"

[[dialogue]]
speaker = "キサナ"
# 「ここはアタシのいた世界じゃねえ。それは分かってんだが、どうにもな」
line = "「ここはアタシのいた世界じゃねえ。それは分かってんだが、どうにもな」"

[[dialogue]]
speaker = "キサナ"
# 「アタシがいたのは右も左もマフィアばっかのとこだった。タダで与えられるものなんてねえ。何を得るにも代償が必要だった」
line = "「アタシがいたのは右も左もマフィアばっかのとこだった。タダで与えられるものなんてねえ。何を得るにも代償が必要だった」"

[[dialogue]]
speaker = "キサナ"
# 「それがテメエのもんか、あるいは他人のもんか。命にしろ金にしろな」
line = "「それがテメエのもんか、あるいは他人のもんか。命にしろ金にしろな」"

[[dialogue]]
speaker = "キサナ"
# 「あー、考えても仕方ねえな。肉食おうぜ肉」
line = "「あー、考えても仕方ねえな。肉食おうぜ肉」"

[[dialogue]]
speaker = "unk"
# 無理させてるならごめん
line = "無理させてるならごめん"

[[dialogue]]
speaker = "キサナ"
# 「あ？　無理なんかしてねえよ……オマエにはそう見えてんのか」
line = "「あ？　無理なんかしてねえよ……オマエにはそう見えてんのか」"

[[dialogue]]
speaker = "キサナ"
# 「それに、オマエの女になるって約束したしな。オマエと同じ世界を見てたいんだよ」
line = "「それに、オマエの女になるって約束したしな。オマエと同じ世界を見てたいんだよ」"

[[dialogue]]
speaker = "キサナ"
# 「つうか、なんか勘違いしてねえか？　アタシはオマエのこと気に入ってんだぜ。勝負に負けたからイヤイヤ一緒にいるんじゃねえぞ」
line = "「つうか、なんか勘違いしてねえか？　アタシはオマエのこと気に入ってんだぜ。勝負に負けたからイヤイヤ一緒にいるんじゃねえぞ」"

[[dialogue]]
speaker = "キサナ"
# 「……ほ、本気でイヤなら勝負だってしねえよ」
line = "「……ほ、本気でイヤなら勝負だってしねえよ」"

[[dialogue]]
speaker = "キサナ"
# 「最初は星騎士なんて口先だけの偽善者のハリボテだろうと思ってたけどよ、そうじゃなかった。世界を救うってのもやり遂げちまった」
line = "「最初は星騎士なんて口先だけの偽善者のハリボテだろうと思ってたけどよ、そうじゃなかった。世界を救うってのもやり遂げちまった」"

[[dialogue]]
speaker = "キサナ"
# 「あのガキを施設に入れたのだってそうだ。お前の言うとおりにしたから、アイツは今、なんとか楽しそうにやってる」
line = "「あのガキを施設に入れたのだってそうだ。お前の言うとおりにしたから、アイツは今、なんとか楽しそうにやってる」"

[[dialogue]]
speaker = "キサナ"
# 「オマエはちゃんと、正義の味方でいてくれた」
line = "「オマエはちゃんと、正義の味方でいてくれた」"

[[dialogue]]
speaker = "キサナ"
# 「なんていうか、アタシはオマエを認めてるんだ。だから堂々としてろよ。アタシの男なんだろ」
line = "「なんていうか、アタシはオマエを認めてるんだ。だから堂々としてろよ。アタシの男なんだろ」"

[[dialogue]]
speaker = "キサナ"
# 「つうかよ、男なら女を自分の色に染めるもんだろ。遠慮とかしてんじゃねえ。……アタシの覚悟はもうできてるからよ」
line = "「つうかよ、男なら女を自分の色に染めるもんだろ。遠慮とかしてんじゃねえ。……アタシの覚悟はもうできてるからよ」"

[[dialogue]]
speaker = "キサナ"
# 「ああもう！　余計なこと言っちまった。それもこれもテメエが情けねえツラしてっからだ！」
line = "「ああもう！　余計なこと言っちまった。それもこれもテメエが情けねえツラしてっからだ！」"

[[dialogue]]
speaker = "キサナ"
# 「肉だ、とにかく肉持ってこい！　どうせあぶく銭だ。ぱーっと使うぞ！」
line = "「肉だ、とにかく肉持ってこい！　どうせあぶく銭だ。ぱーっと使うぞ！」"

[[dialogue]]
speaker = "キサナ"
# 「んで、そのあとは遊ぶぞ！　具体的には水鉄砲の的になれ」
line = "「んで、そのあとは遊ぶぞ！　具体的には水鉄砲の的になれ」"

[[dialogue]]
speaker = "キサナ"
# 「オマエに染まる覚悟があるとは言ったけどよ、オマエにその気がないならケツに敷いてペラッペラの座布団にしてやるからな」
line = "「オマエに染まる覚悟があるとは言ったけどよ、オマエにその気がないならケツに敷いてペラッペラの座布団にしてやるからな」"

[[dialogue]]
speaker = "キサナ"
# 「ハハッ！　いいツラしてんじゃねえか！　屈服させてやるぜ！」
line = "「ハハッ！　いいツラしてんじゃねえか！　屈服させてやるぜ！」"

[[dialogue]]
speaker = "unk"
# ご飯の後、キサナの水鉄砲にへとへとになるまで追いかけまわされたのだった。
line = "ご飯の後、キサナの水鉄砲にへとへとになるまで追いかけまわされたのだった。"
