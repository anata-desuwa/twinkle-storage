[[dialogue]]
speaker = "unk"
# 第１話,師匠メイド,B
line = "第１話,師匠メイド,B"

[[dialogue]]
speaker = "キリカ"
# 「――星見家メイド隊」
line = "「――星見家メイド隊」"

[[dialogue]]
speaker = "キリカ"
# 「それは、流星市国のトップである『流星教皇』を代々襲名してきた由緒ある家系、星見家に仕えるメイドたちのことです」
line = "「それは、流星市国のトップである『流星教皇』を代々襲名してきた由緒ある家系、星見家に仕えるメイドたちのことです」"

[[dialogue]]
speaker = "キリカ"
# 「星見家メイド隊のモットーは『清らかに、厳かに、速やかに』」
line = "「星見家メイド隊のモットーは『清らかに、厳かに、速やかに』」"

[[dialogue]]
speaker = "キリカ"
# 「すなわち、伝統的なクラシックメイドの在り方こそが、私たちの目指す理想の姿なのです」
line = "「すなわち、伝統的なクラシックメイドの在り方こそが、私たちの目指す理想の姿なのです」"

[[dialogue]]
speaker = "キリカ"
# 「ここまではよろしいですか？　緋宮会長」
line = "「ここまではよろしいですか？　緋宮会長」"

[[dialogue]]
speaker = "unk"
# 師匠、それはいいんですけど……
line = "師匠、それはいいんですけど……"

[[dialogue]]
speaker = "キリカ"
# 「なんでしょう？　メイド隊の概要について、なにかわからないことでも？」
line = "「なんでしょう？　メイド隊の概要について、なにかわからないことでも？」"

[[dialogue]]
speaker = "キリカ"
# 「――そうではない、ですか？　ふむ、では、仕事内容についてでしょうか？」
line = "「――そうではない、ですか？　ふむ、では、仕事内容についてでしょうか？」"

[[dialogue]]
speaker = "unk"
# 俺がメイド服を着てることについてです！
line = "俺がメイド服を着てることについてです！"

[[dialogue]]
speaker = "マリオン"
# 「まあまあ、うふふっ♪　よくお似合いですよ、会長様」
line = "「まあまあ、うふふっ♪　よくお似合いですよ、会長様」"

[[dialogue]]
speaker = "マリオン"
# 「実にお可愛らしいですこと<emoji=heart04>　このマリオン、愛を込めて作った甲斐がありましたわ♪」
line = "「実にお可愛らしいですこと<emoji=heart04>　このマリオン、愛を込めて作った甲斐がありましたわ♪」"

[[dialogue]]
speaker = "unk"
# この格好で褒められても嬉しくないんですけど！？
line = "この格好で褒められても嬉しくないんですけど！？"

[[dialogue]]
speaker = "unk"
# そう、俺は何故か今、星見家でメイド服を着る羽目になっていた。
line = "そう、俺は何故か今、星見家でメイド服を着る羽目になっていた。"

[[dialogue]]
speaker = "unk"
# どうしてそんなことになったのかというと、遡ること数日前――
line = "どうしてそんなことになったのかというと、遡ること数日前――"

[[dialogue]]
speaker = "キリカ"
# 「――ふむ……そうですね。今日の戦闘訓練はここまでにしておきましょう」
line = "「――ふむ……そうですね。今日の戦闘訓練はここまでにしておきましょう」"

[[dialogue]]
speaker = "キリカ"
# 「以前指摘した自身の俯瞰を意識できるようになってきたようですね。まだ粗削りですが、良い傾向です。ただそれを見越した私のフェイントに対して、警戒が甘いです」
line = "「以前指摘した自身の俯瞰を意識できるようになってきたようですね。まだ粗削りですが、良い傾向です。ただそれを見越した私のフェイントに対して、警戒が甘いです」"

[[dialogue]]
speaker = "キリカ"
# 「目に見える動きだけでなく、相手の考えも読むように心がけましょう。俯瞰するとは物理的にではなく、<b>神</b>の視点から状況を見ること」
line = "「目に見える動きだけでなく、相手の考えも読むように心がけましょう。俯瞰するとは物理的にではなく、<b>神</b>の視点から状況を見ること」"

[[dialogue]]
speaker = "キリカ"
# 「それが<ruby=こうづき・>上月神</ruby>闘流における極意の１つです」
line = "「それが<ruby>上月神<rt>こうづき・</rt></ruby>闘流における極意の１つです」"

[[dialogue]]
speaker = "unk"
# 師匠、今日もご指導ありがとうございました！
line = "師匠、今日もご指導ありがとうございました！"

[[dialogue]]
speaker = "キリカ"
# 「いえ。緋宮会長に戦い方を指導しているのは、フィオナお嬢様からの命ですので、礼には及びません」
line = "「いえ。緋宮会長に戦い方を指導しているのは、フィオナお嬢様からの命ですので、礼には及びません」"

[[dialogue]]
speaker = "キリカ"
# 「ですが、しっかりと礼に始まり、礼に終わるのは、上月神闘流においても尊ばれる行為です。これからも是非、大切になさって下さい」
line = "「ですが、しっかりと礼に始まり、礼に終わるのは、上月神闘流においても尊ばれる行為です。これからも是非、大切になさって下さい」"

[[dialogue]]
speaker = "unk"
# 改めて、彼女は、俺が格闘術を教わっている師匠――上月キリカさん。
line = "改めて、彼女は、俺が格闘術を教わっている師匠――上月キリカさん。"

[[dialogue]]
speaker = "unk"
# 流星学園星徒会長のフィオナに仕える、星見家メイド隊のメイド長で、流星学園の卒業生でもある。その星騎士としての実力は、今でも１点の曇りもなく、非常に高い。
line = "流星学園星徒会長のフィオナに仕える、星見家メイド隊のメイド長で、流星学園の卒業生でもある。その星騎士としての実力は、今でも１点の曇りもなく、非常に高い。"

[[dialogue]]
speaker = "unk"
# 上月家に伝わる『上月神闘流』と呼ばれる拳法を修得している格闘家でもあり、拳で戦うスタイルが俺と似ていることから、頼み込んで弟子入りさせてもらっていた。
line = "上月家に伝わる『上月神闘流』と呼ばれる拳法を修得している格闘家でもあり、拳で戦うスタイルが俺と似ていることから、頼み込んで弟子入りさせてもらっていた。"

[[dialogue]]
speaker = "マリオン"
# 「会長様、キリカさん、見事な手合わせでしたよ。お２人の真剣な姿に思わず私、胸がキュンとなってしまいました<emoji=heart04>」
line = "「会長様、キリカさん、見事な手合わせでしたよ。お２人の真剣な姿に思わず私、胸がキュンとなってしまいました<emoji=heart04>」"

[[dialogue]]
speaker = "キリカ"
# 「マリオンさん、見ていたのですか。フィオナお嬢様から何か言伝でしょうか？」
line = "「マリオンさん、見ていたのですか。フィオナお嬢様から何か言伝でしょうか？」"

[[dialogue]]
speaker = "マリオン"
# 「いえいえ、ただの趣味ですよ。私、若い子たちの青春を見守るのが好きですから♪」
line = "「いえいえ、ただの趣味ですよ。私、若い子たちの青春を見守るのが好きですから♪」"

[[dialogue]]
speaker = "unk"
# ニコニコと優しげな笑顔を浮かべる彼女は、星見家メイド隊のマリオン・ネイマールさん。
line = "ニコニコと優しげな笑顔を浮かべる彼女は、星見家メイド隊のマリオン・ネイマールさん。"

[[dialogue]]
speaker = "unk"
# メイドとして師匠に負けず劣らず優秀な人で、その高い仕事能力をもって星見家メイド隊の仕事全体を受け持ち、一糸乱れず処理する、雑務担当。
line = "メイドとして師匠に負けず劣らず優秀な人で、その高い仕事能力をもって星見家メイド隊の仕事全体を受け持ち、一糸乱れず処理する、雑務担当。"

[[dialogue]]
speaker = "unk"
# なのだが、彼女には１つ問題があって――
line = "なのだが、彼女には１つ問題があって――"

[[dialogue]]
speaker = "マリオン"
# 「ああ、それにしても会長様。１日ぶりにお会いしましたが、今日も実にお可愛らしいお顔立ちですこと<emoji=heart04>」
line = "「ああ、それにしても会長様。１日ぶりにお会いしましたが、今日も実にお可愛らしいお顔立ちですこと<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
# 「男の子らしい凛々しさを含ませながら、純真な女の子のような愛らしさを持ち合わせた、中性的なご尊顔と声……♪」
line = "「男の子らしい凛々しさを含ませながら、純真な女の子のような愛らしさを持ち合わせた、中性的なご尊顔と声……♪」"

[[dialogue]]
speaker = "マリオン"
# 「それが今日は、青春の汗も滲んで、上気して、天然の色気まで乗せてくるなんて……！　ああ、いけませんわ、会長様。そんなお顔を私に見せてはっ<emoji=heart04>」
line = "「それが今日は、青春の汗も滲んで、上気して、天然の色気まで乗せてくるなんて……！　ああ、いけませんわ、会長様。そんなお顔を私に見せてはっ<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
# 「このマリオン、我慢が利かなくなってしまいますわ。それはもう――」
line = "「このマリオン、我慢が利かなくなってしまいますわ。それはもう――」"

[[dialogue]]
speaker = "マリオン"
# 「思わず子供が欲しくなってしまうほどに……<emoji=heart04>」
line = "「思わず子供が欲しくなってしまうほどに……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# いつものことだけど、顔が近い近い近いっ！
line = "いつものことだけど、顔が近い近い近いっ！"

[[dialogue]]
speaker = "キリカ"
# 「――上月神闘流・貫手……『<ruby=らいづき>雷月</ruby>』！」
line = "「――上月神闘流・貫手……『<ruby>雷月<rt>らいづき</rt></ruby>』！」"

[[dialogue]]
speaker = "マリオン"
# 「あんっ<emoji=heart04>」
line = "「あんっ<emoji=heart04>」"

[[dialogue]]
speaker = "キリカ"
# 「はぁ……全く……。毎度毎度懲りない人ですね、あなたは。そうやって自分の好みに合う相手を見つければ、すぐさまナンパして……」
line = "「はぁ……全く……。毎度毎度懲りない人ですね、あなたは。そうやって自分の好みに合う相手を見つければ、すぐさまナンパして……」"

[[dialogue]]
speaker = "キリカ"
# 「星見家メイド隊のベテランとして恥ずかしくない、ちゃんと『清らか』な立ち振る舞いをして下さい」
line = "「星見家メイド隊のベテランとして恥ずかしくない、ちゃんと『清らか』な立ち振る舞いをして下さい」"

[[dialogue]]
speaker = "マリオン"
# 「痺れびれ～<emoji=heart04>」
line = "「痺れびれ～<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# なんかむしろ、嬉しそうな顔してません……？
line = "なんかむしろ、嬉しそうな顔してません……？"

[[dialogue]]
speaker = "マリオン"
# 「うふふっ……<emoji=heart04>　これはキリカさんの愛情表現ですから<emoji=heart04>」
line = "「うふふっ……<emoji=heart04>　これはキリカさんの愛情表現ですから<emoji=heart04>」"

[[dialogue]]
speaker = "キリカ"
# 「違います」
line = "「違います」"

[[dialogue]]
speaker = "マリオン"
# 「そんなクールなキリカさんも、お可愛らしいですよ<emoji=heart04>」
line = "「そんなクールなキリカさんも、お可愛らしいですよ<emoji=heart04>」"

[[dialogue]]
speaker = "キリカ"
# 「……この人は、こういうところがなければ、完璧なメイドなのですが――」
line = "「……この人は、こういうところがなければ、完璧なメイドなのですが――」"

[[dialogue]]
speaker = "キリカ"
# 「くしゅんっ」
line = "「くしゅんっ」"

[[dialogue]]
speaker = "マリオン"
# 「あら？　キリカさんがくしゃみなんて珍しいですね。これはもしかして、キリカさんの可愛いところが見られる予兆だったりして……♪」
line = "「あら？　キリカさんがくしゃみなんて珍しいですね。これはもしかして、キリカさんの可愛いところが見られる予兆だったりして……♪」"

[[dialogue]]
speaker = "キリカ"
# 「なにを下らないことを言っているのですか。ちょっと喉に埃が入ってしまっただけです」
line = "「なにを下らないことを言っているのですか。ちょっと喉に埃が入ってしまっただけです」"

[[dialogue]]
speaker = "キリカ"
# 「いつまでもふざけていないで、仕事に戻りますよ」
line = "「いつまでもふざけていないで、仕事に戻りますよ」"

[[dialogue]]
speaker = "unk"
# 翌日――
line = "翌日――"

[[dialogue]]
speaker = "マリオン"
# 「あら、会長様、ごきげんよう♪」
line = "「あら、会長様、ごきげんよう♪」"

[[dialogue]]
speaker = "マリオン"
# 「――キリカさんを探してらっしゃるんですか？　それが実は……」
line = "「――キリカさんを探してらっしゃるんですか？　それが実は……」"

[[dialogue]]
speaker = "マリオン"
# 「どうも風邪を引いてしまったみたいで、今日はメイドの仕事を休んでいるんですよ」
line = "「どうも風邪を引いてしまったみたいで、今日はメイドの仕事を休んでいるんですよ」"

[[dialogue]]
speaker = "unk"
# え！？　師匠が風邪！？
line = "え！？　師匠が風邪！？"

[[dialogue]]
speaker = "unk"
# 真面目な師匠の体調不良に驚き、俺は思わず声を上げてしまうのだった。
line = "真面目な師匠の体調不良に驚き、俺は思わず声を上げてしまうのだった。"
