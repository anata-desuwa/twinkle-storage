# 俺がペニスを引き抜くと同時に、アムは体をビクビク痙攣させながら、<b>本物の</b>おしっこを漏らしてしまった。
line = "俺がペニスを引き抜くと同時に、アムは体をビクビク痙攣させながら、<b>本物の</b>おしっこを漏らしてしまった。"

[[dialogue]]
speaker = "アム"
