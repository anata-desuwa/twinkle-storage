[[dialogue]]
speaker = "unk"
# 第２話,転入生と暗殺者,P
line = "第２話,転入生と暗殺者,P"

[[dialogue]]
speaker = "unk"
# 戦闘報告書をフィオナに渡す為、流星学園の星徒会室に出向いた時のこと――
line = "戦闘報告書をフィオナに渡す為、流星学園の星徒会室に出向いた時のこと――"

[[dialogue]]
speaker = "フェニエル"
# 「はいっ、ようこそいらっしゃいました……あっ！　会長さん、ごきげんよう！」
line = "「はいっ、ようこそいらっしゃいました……あっ！　会長さん、ごきげんよう！」"

[[dialogue]]
speaker = "unk"
# フニがどうしてここに？
line = "フニがどうしてここに？"

[[dialogue]]
speaker = "unk"
# ごきげんよう……って、あれ？
line = "ごきげんよう……って、あれ？"

[[dialogue]]
speaker = "フェニエル"
# 「実は私、星見家メイド隊でバイトを始めたんですっ。何か服と雰囲気がメイドっぽいからって、熱烈なスカウトを受けまして……」
line = "「実は私、星見家メイド隊でバイトを始めたんですっ。何か服と雰囲気がメイドっぽいからって、熱烈なスカウトを受けまして……」"

[[dialogue]]
speaker = "ナミエル"
# 「緋宮会長、ごきげんよう。フィオナお嬢様に何かご用件でしょうか？」
line = "「緋宮会長、ごきげんよう。フィオナお嬢様に何かご用件でしょうか？」"

[[dialogue]]
speaker = "ナミエル"
# 「……なるほど。フィオナお嬢様は、小一時間程で戻って来ると仰っていました。報告書をお預かりしておくことも出来ますが……」
line = "「……なるほど。フィオナお嬢様は、小一時間程で戻って来ると仰っていました。報告書をお預かりしておくことも出来ますが……」"

[[dialogue]]
speaker = "unk"
# 待たせてもらいたいけど、仕事の邪魔になる？
line = "待たせてもらいたいけど、仕事の邪魔になる？"

[[dialogue]]
speaker = "ナミエル"
# 「お気になさらず。星徒会室の掃除はちょうど終わりましたし、接客もメイドの仕事ですので」
line = "「お気になさらず。星徒会室の掃除はちょうど終わりましたし、接客もメイドの仕事ですので」"

[[dialogue]]
speaker = "フェニエル"
# 「会長さん、どうぞこちらのソファーに！　ただいま、紅茶をお出ししますのでっ」
line = "「会長さん、どうぞこちらのソファーに！　ただいま、紅茶をお出ししますのでっ」"

[[dialogue]]
speaker = "フェニエル"
# 「こちらです。火傷しないようお気を付け下さい」
line = "「こちらです。火傷しないようお気を付け下さい」"

[[dialogue]]
speaker = "unk"
# 速い！？
line = "速い！？"

[[dialogue]]
speaker = "ナミエル"
# 「フニさまの作業スピードはメイド隊の中でも屈指です。バイトでなく、本採用の推薦をしたいくらいに」
line = "「フニさまの作業スピードはメイド隊の中でも屈指です。バイトでなく、本採用の推薦をしたいくらいに」"

[[dialogue]]
speaker = "フェニエル"
# 「えへへ……ナミエルちゃんに褒められると照れちゃいますね♪　地元にいた時、村の皆さんの家事をお手伝いしていたら、自然と出来るようになっただけなんですけど」
line = "「えへへ……ナミエルちゃんに褒められると照れちゃいますね♪　地元にいた時、村の皆さんの家事をお手伝いしていたら、自然と出来るようになっただけなんですけど」"

[[dialogue]]
speaker = "フェニエル"
# 「あっ、そうだ！　これもまだ会長さんに言ってなかったですけど、私、ナミエルちゃんとお友達になったんですよ！」
line = "「あっ、そうだ！　これもまだ会長さんに言ってなかったですけど、私、ナミエルちゃんとお友達になったんですよ！」"

[[dialogue]]
speaker = "unk"
# え！？
line = "え！？"

[[dialogue]]
speaker = "ナミエル"
# 「……何ですか緋宮会長、その意外そうな目は？　何か問題でも？」
line = "「……何ですか緋宮会長、その意外そうな目は？　何か問題でも？」"

[[dialogue]]
speaker = "フェニエル"
# 「最近、ナミエルちゃんにＳＮＳのやり方を教えてもらったりもして。おかげで<ruby=ディスク>ＤＩＳＣ</ruby>の扱いも大分慣れて来ましたっ」
line = "「最近、ナミエルちゃんにＳＮＳのやり方を教えてもらったりもして。おかげで<ruby>ＤＩＳＣ<rt>ディスク</rt></ruby>の扱いも大分慣れて来ましたっ」"

[[dialogue]]
speaker = "unk"
# 学園の生活にも慣れて来たみたいで良かった
line = "学園の生活にも慣れて来たみたいで良かった"

[[dialogue]]
speaker = "フェニエル"
# 「はい。これまで普通の人間のように暮らして来たので、星力に目覚めた時は凄く不安でしたけど……えへへ♪　みなさんのお陰です」
line = "「はい。これまで普通の人間のように暮らして来たので、星力に目覚めた時は凄く不安でしたけど……えへへ♪　みなさんのお陰です」"

[[dialogue]]
speaker = "ナミエル"
# 「そういえば、まったくのゼロから星力が覚醒したと言っていましたが、とても珍しいケースです。いったい、どのように……？」
line = "「そういえば、まったくのゼロから星力が覚醒したと言っていましたが、とても珍しいケースです。いったい、どのように……？」"

[[dialogue]]
speaker = "unk"
# 事故で目覚めたって、聞いたような……？
line = "事故で目覚めたって、聞いたような……？"

[[dialogue]]
speaker = "フェニエル"
# 「２ヶ月くらい前、北海道の街でモンスターの襲撃事件があったんです」
line = "「２ヶ月くらい前、北海道の街でモンスターの襲撃事件があったんです」"

[[dialogue]]
speaker = "ナミエル"
# 「！　ひょっとして、全国ニュースにもなった……」
line = "「！　ひょっとして、全国ニュースにもなった……」"

[[dialogue]]
speaker = "フェニエル"
# 「はい、その事件です。私はその日、たまたま街へ買い物に出掛けていて、事件に遭遇しました。そこでモンスターの攻撃を受けて――」
line = "「はい、その事件です。私はその日、たまたま街へ買い物に出掛けていて、事件に遭遇しました。そこでモンスターの攻撃を受けて――」"

[[dialogue]]
speaker = "フェニエル"
# 「瀕死の重傷を負い、片目を失明しました」
line = "「瀕死の重傷を負い、片目を失明しました」"

[[dialogue]]
speaker = "ナミエル"
# 「失明？　ですが……」
line = "「失明？　ですが……」"

[[dialogue]]
speaker = "フェニエル"
# 「みなさんよく、綺麗なオッドアイだって言ってくれるんですけど、金色の瞳は目覚めた力の影響によるもの……『生命の星眼』という異能の目なんです」
line = "「みなさんよく、綺麗なオッドアイだって言ってくれるんですけど、金色の瞳は目覚めた力の影響によるもの……『生命の星眼』という異能の目なんです」"

[[dialogue]]
speaker = "フェニエル"
# 「物理的な視力がない代わりに、星力を流すことで『ものを生かしている部分』を見ることが出来ます。相手の急所がわかる、って言うと分かりやすいでしょうか」
line = "「物理的な視力がない代わりに、星力を流すことで『ものを生かしている部分』を見ることが出来ます。相手の急所がわかる、って言うと分かりやすいでしょうか」"

[[dialogue]]
speaker = "フェニエル"
# 「ともかく、事件で１度、臨死体験をしたことで……私は力に目覚めました」
line = "「ともかく、事件で１度、臨死体験をしたことで……私は力に目覚めました」"

[[dialogue]]
speaker = "フェニエル"
# 「物理的に片目が見えなくなったことで、私はそれまで思い描いていた未来も、見えなくなった気がしていました」
line = "「物理的に片目が見えなくなったことで、私はそれまで思い描いていた未来も、見えなくなった気がしていました」"

[[dialogue]]
speaker = "フェニエル"
# 「村の皆と離れて１人、これから自分がどうなって行くのかも分からず、凄く不安で……」
line = "「村の皆と離れて１人、これから自分がどうなって行くのかも分からず、凄く不安で……」"

[[dialogue]]
speaker = "フェニエル"
# 「でも今は！　会長さんやトワ先生、流星寮の皆さん、それにナミエルちゃんたちメイド隊の皆さんに出会えたおかげで、前向きな気持ちになれましたから」
line = "「でも今は！　会長さんやトワ先生、流星寮の皆さん、それにナミエルちゃんたちメイド隊の皆さんに出会えたおかげで、前向きな気持ちになれましたから」"

[[dialogue]]
speaker = "フェニエル"
# 「この場所で、星騎士として、みなさんのお役に立てるように、頑張って行きたいって思っているんですっ」
line = "「この場所で、星騎士として、みなさんのお役に立てるように、頑張って行きたいって思っているんですっ」"

[[dialogue]]
speaker = "フェニエル"
# 「……って、何かすみません、無駄に張り切っちゃって……」
line = "「……って、何かすみません、無駄に張り切っちゃって……」"

[[dialogue]]
speaker = "フェニエル"
# 「ちょっと恥ずかしいです……」
line = "「ちょっと恥ずかしいです……」"

[[dialogue]]
speaker = "ナミエル"
# 「かわいい……」
line = "「かわいい……」"

[[dialogue]]
speaker = "unk"
# えっ
line = "えっ"

[[dialogue]]
speaker = "ナミエル"
# 「はっ……！」
line = "「はっ……！」"

[[dialogue]]
speaker = "ナミエル"
# 「……緋宮会長、それ以上何か言ったら掃除しますよ」
line = "「……緋宮会長、それ以上何か言ったら掃除しますよ」"

[[dialogue]]
speaker = "unk"
# 掃除って何を！？
line = "掃除って何を！？"

[[dialogue]]
speaker = "フェニエル"
# 「？」
line = "「？」"

[[dialogue]]
speaker = "フェニエル"
# 「お２人とも、何かあったんですか？」
line = "「お２人とも、何かあったんですか？」"

[[dialogue]]
speaker = "ナミエル"
# 「いえ、フ二さまはお気になさらず」
line = "「いえ、フ二さまはお気になさらず」"

[[dialogue]]
speaker = "unk"
# （……わかった気がするな）
line = "（……わかった気がするな）"

[[dialogue]]
speaker = "unk"
# （ナミエルとフ二が仲良くなった理由）
line = "（ナミエルとフ二が仲良くなった理由）"

[[dialogue]]
speaker = "unk"
# ナミエルがぬいぐるみなどの可愛いもの好きであったことを思い出し、１人納得するのであった。
line = "ナミエルがぬいぐるみなどの可愛いもの好きであったことを思い出し、１人納得するのであった。"
