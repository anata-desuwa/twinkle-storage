[[dialogue]]
speaker = "unk"
# それから開校記念パーティー当日となり、企画していた大会が開かれることとなった――
line = "それから開校記念パーティー当日となり、企画していた大会が開かれることとなった――"

[[dialogue]]
speaker = "ヴィーナス"
# 『よ～し！　それじゃあ、みんなで全力バトルを楽しむ大会“バトルフェスタ・ペンタグラム”、ここに開幕よ！！』
line = "『よ～し！　それじゃあ、みんなで全力バトルを楽しむ大会“バトルフェスタ・ペンタグラム”、ここに開幕よ！！』"

[[dialogue]]
speaker = "unk"
# ヴィーナスが宣言し、わぁっ！　と会場が盛り上がる。
line = "ヴィーナスが宣言し、わぁっ！　と会場が盛り上がる。"

[[dialogue]]
speaker = "unk"
# アリーナには新星学園、流星学園、附属校の生徒たちが一堂に集まり、賑わっていた。
line = "アリーナには新星学園、流星学園、附属校の生徒たちが一堂に集まり、賑わっていた。"

[[dialogue]]
speaker = "フィオナ"
# 『それでは、バトルフェスタのルール説明をさせて頂きます』
line = "『それでは、バトルフェスタのルール説明をさせて頂きます』"

[[dialogue]]
speaker = "フィオナ"
# 『学園の皆さんには事前に資料を配布していましたが、この大会は以前行われた作戦“オペレーション・ペンタグラム”をモチーフにしたものとなっています』
line = "『学園の皆さんには事前に資料を配布していましたが、この大会は以前行われた作戦“オペレーション・ペンタグラム”をモチーフにしたものとなっています』"

[[dialogue]]
speaker = "フィオナ"
# 『まず、ボス役となる６人の星騎士を選出。それぞれのデータを元に、今回新設された仮想結界システムを用いて、星騎士の仮想体――“シャドウ”を作り出しています』
line = "『まず、ボス役となる６人の星騎士を選出。それぞれのデータを元に、今回新設された仮想結界システムを用いて、星騎士の仮想体――“シャドウ”を作り出しています』"

[[dialogue]]
speaker = "フィオナ"
# 『その６人のシャドウを相手に、皆さんには協力して戦いを挑んで頂きます』
line = "『その６人のシャドウを相手に、皆さんには協力して戦いを挑んで頂きます』"

[[dialogue]]
speaker = "ヴィーナス"
# 『簡単に言うと、ゲームのレイドボスみたいな感じね！』
line = "『簡単に言うと、ゲームのレイドボスみたいな感じね！』"

[[dialogue]]
speaker = "ヴィーナス"
# 『そんなわけでボス役に選ばれた６人の自己紹介タイムよ！　まずは私、新星学園星徒会のフィクサー、九浄ヴィーナス！』
line = "『そんなわけでボス役に選ばれた６人の自己紹介タイムよ！　まずは私、新星学園星徒会のフィクサー、九浄ヴィーナス！』"

[[dialogue]]
speaker = "ヴィーナス"
# 『本当はうちの星徒会長を推薦したかったけど、クロトは今、全力を出せなくてデータ再現が難しいから、私が代役を務めることになったわ！』
line = "『本当はうちの星徒会長を推薦したかったけど、クロトは今、全力を出せなくてデータ再現が難しいから、私が代役を務めることになったわ！』"

[[dialogue]]
speaker = "フィオナ"
# 『続きまして、私、流星学園星徒会長である星見フィオナもボス役を務めさせて頂きます。みなさん、よろしくお願いしますね』
line = "『続きまして、私、流星学園星徒会長である星見フィオナもボス役を務めさせて頂きます。みなさん、よろしくお願いしますね』"

[[dialogue]]
speaker = "フィオナ"
# 『では、残りの４人の方々にも挨拶して頂きましょう。お願いします』
line = "『では、残りの４人の方々にも挨拶して頂きましょう。お願いします』"

[[dialogue]]
speaker = "マハムート"
# 『――新星寮ラルーナ寮長、妃竜院マハムートよ。畏怖をもって挑んできなさい』
line = "『――新星寮ラルーナ寮長、妃竜院マハムートよ。畏怖をもって挑んできなさい』"

[[dialogue]]
speaker = "マハムート"
# 『もう知っている子も多いでしょうけど、流星寮の寮長は今回、挑戦する側に回りたいそうよ。戦う気は満々みたいだから、楽しみにしているわ』
line = "『もう知っている子も多いでしょうけど、流星寮の寮長は今回、挑戦する側に回りたいそうよ。戦う気は満々みたいだから、楽しみにしているわ』"

[[dialogue]]
speaker = "unk"
# マムの次にマイクを受け取ったのは――
line = "マムの次にマイクを受け取ったのは――"

[[dialogue]]
speaker = "サチ"
# 『附属校代表ということでボス役を務めさせて頂きます。流星学園附属校、生徒会長の白詰サチです』
line = "『附属校代表ということでボス役を務めさせて頂きます。流星学園附属校、生徒会長の白詰サチです』"

[[dialogue]]
speaker = "サチ"
# 『せ、声援恐縮です。本校の先輩方も、本日はよろしくお願いしますっ……！』
line = "『せ、声援恐縮です。本校の先輩方も、本日はよろしくお願いしますっ……！』"

[[dialogue]]
speaker = "unk"
# 続いては――
line = "続いては――"

[[dialogue]]
speaker = "マリオン"
# 『ＯＧ代表ということで選出頂きました、星見家メイド隊、マリオン・ネイマールです♪　みなさま、いつも学園ではメイドとしてお世話になっております』
line = "『ＯＧ代表ということで選出頂きました、星見家メイド隊、マリオン・ネイマールです♪　みなさま、いつも学園ではメイドとしてお世話になっております』"

[[dialogue]]
speaker = "マリオン"
# 『知っている方もいらっしゃるかと思いますが、私は流星学園の卒業生で、当時星徒会長を務めさせて頂いておりました』
line = "『知っている方もいらっしゃるかと思いますが、私は流星学園の卒業生で、当時星徒会長を務めさせて頂いておりました』"

[[dialogue]]
speaker = "マリオン"
# 『本日は若い皆様のご活躍を沢山見せて頂けたら嬉しく思いますので、是非ともよろしくお願い致しますね♪』
line = "『本日は若い皆様のご活躍を沢山見せて頂けたら嬉しく思いますので、是非ともよろしくお願い致しますね♪』"

[[dialogue]]
speaker = "unk"
# そして、最後の１人は――
line = "そして、最後の１人は――"

[[dialogue]]
speaker = "リーリア"
# 『あ、あはは～、皆さんこんにちは～。新星学園１年生の渋谷リーリアです～』
line = "『あ、あはは～、皆さんこんにちは～。新星学園１年生の渋谷リーリアです～』"

[[dialogue]]
speaker = "リーリア"
# 『多分もう、皆さん知っているかとは思うんですけど……私はネビュラの魔女です。なので少し前まで、スパイとして学園に通ってました』
line = "『多分もう、皆さん知っているかとは思うんですけど……私はネビュラの魔女です。なので少し前まで、スパイとして学園に通ってました』"

[[dialogue]]
speaker = "リーリア"
# 『私がみんなの前で喋る機会なんてないと思っていたんですが、こうして機会をいただけたので……改めて、この場を借りて謝罪します。すみませんでしたっ！！』
line = "『私がみんなの前で喋る機会なんてないと思っていたんですが、こうして機会をいただけたので……改めて、この場を借りて謝罪します。すみませんでしたっ！！』"

[[dialogue]]
speaker = "unk"
# 少しざわつく会場。
line = "少しざわつく会場。"

[[dialogue]]
speaker = "リーリア"
# 『で、今日は学園の生徒ではなく、ネビュラとしてここにいるわけなんですが……』
line = "『で、今日は学園の生徒ではなく、ネビュラとしてここにいるわけなんですが……』"

[[dialogue]]
speaker = "リーリア"
# 『本当は私じゃなくて、光の魔女であるクラウディア様が選ばれてたんです。ただ、諸般の事情でネビュラ側からＮＧが出ちゃいまして』
line = "『本当は私じゃなくて、光の魔女であるクラウディア様が選ばれてたんです。ただ、諸般の事情でネビュラ側からＮＧが出ちゃいまして』"

[[dialogue]]
speaker = "リーリア"
# 『その代理ってことで、私がセドナ長官から指名を受けちゃったという感じです。まぁ、他の人たちに比べると色々ツッコミたい選出かなぁとは思うんですけど……』
line = "『その代理ってことで、私がセドナ長官から指名を受けちゃったという感じです。まぁ、他の人たちに比べると色々ツッコミたい選出かなぁとは思うんですけど……』"

[[dialogue]]
speaker = "リーリア"
# 『一応これでも、森では“魔弾の魔女”って二つ名持ちだったりするんで、お手柔らかに挑戦して頂けたらと思います～』
line = "『一応これでも、森では“魔弾の魔女”って二つ名持ちだったりするんで、お手柔らかに挑戦して頂けたらと思います～』"

[[dialogue]]
speaker = "ヴィーナス"
# 「リーリアなら大丈夫よ！　クロトも選出に納得してたし、めちゃんこ盛り上げてくれるって期待してるわ！」
line = "「リーリアなら大丈夫よ！　クロトも選出に納得してたし、めちゃんこ盛り上げてくれるって期待してるわ！」"

[[dialogue]]
speaker = "リーリア"
# 「が、頑張りま～す……あはは～」
line = "「が、頑張りま～す……あはは～」"

[[dialogue]]
speaker = "フィオナ"
# 『――では、紹介が終わったところで、またルール説明に戻りますね』
line = "『――では、紹介が終わったところで、またルール説明に戻りますね』"

[[dialogue]]
speaker = "フィオナ"
# 『ボス役のシャドウとの戦いは仮想結界システム内で行われ、挑戦する側は何人で協力して挑むのも自由とします』
line = "『ボス役のシャドウとの戦いは仮想結界システム内で行われ、挑戦する側は何人で協力して挑むのも自由とします』"

[[dialogue]]
speaker = "フィオナ"
# 『また、シャドウが倒された場合には、少し経つとまた復活しますので何度でも挑戦可能です』
line = "『また、シャドウが倒された場合には、少し経つとまた復活しますので何度でも挑戦可能です』"

[[dialogue]]
speaker = "ヴィーナス"
# 『あとね、細かい理屈はよくわからないけど、仮想空間だから、現実での星力は消費しないらしいわ！』
line = "『あとね、細かい理屈はよくわからないけど、仮想空間だから、現実での星力は消費しないらしいわ！』"

[[dialogue]]
speaker = "ヴィーナス"
# 『だから、途中でモンスターが出現して、出撃しなくちゃ～！　ってことになっても、心配しなくて大丈夫よ♪』
line = "『だから、途中でモンスターが出現して、出撃しなくちゃ～！　ってことになっても、心配しなくて大丈夫よ♪』"

[[dialogue]]
speaker = "ヴィーナス"
# 『星力がすっからかんで戦えないとか、そんな風になったりしないから、みんな安心して全力で戦っていいわよ！』
line = "『星力がすっからかんで戦えないとか、そんな風になったりしないから、みんな安心して全力で戦っていいわよ！』"

[[dialogue]]
speaker = "フィオナ"
# 『ダメージについても同様で、訓練用に痛覚が抑えられてるのと、戦闘不能になると仮想空間から１度離脱させられるシステムになっています』
line = "『ダメージについても同様で、訓練用に痛覚が抑えられてるのと、戦闘不能になると仮想空間から１度離脱させられるシステムになっています』"

[[dialogue]]
speaker = "フィオナ"
# 『受けたダメージはあくまで仮想空間のものである為、現実空間に戻れば無傷です』
line = "『受けたダメージはあくまで仮想空間のものである為、現実空間に戻れば無傷です』"

[[dialogue]]
speaker = "フィオナ"
# 『要するに、仮想結界に入った時点で、星騎士側も“自分自身と寸分違わぬ仮想体”を操っている状態になります』
line = "『要するに、仮想結界に入った時点で、星騎士側も“自分自身と寸分違わぬ仮想体”を操っている状態になります』"

[[dialogue]]
speaker = "フィオナ"
# 『ただし、体を操っている脳は自分自身のものです。集中力の消耗や疲労感、精神的ダメージはシステムでは防げません』
line = "『ただし、体を操っている脳は自分自身のものです。集中力の消耗や疲労感、精神的ダメージはシステムでは防げません』"

[[dialogue]]
speaker = "フィオナ"
# 『怪我や故障は物理的なものばかりではありませんから、そこは普段の訓練通り、油断しないよう注意して下さい』
line = "『怪我や故障は物理的なものばかりではありませんから、そこは普段の訓練通り、油断しないよう注意して下さい』"

[[dialogue]]
speaker = "ヴィーナス"
# 『仮想空間だからって、ふざけると痛い目を見ちゃうわよって話ね！』
line = "『仮想空間だからって、ふざけると痛い目を見ちゃうわよって話ね！』"

[[dialogue]]
speaker = "ヴィーナス"
# 『でも、私は特に心配してないわ。だって――』
line = "『でも、私は特に心配してないわ。だって――』"

[[dialogue]]
speaker = "ヴィーナス"
# 『学園の星騎士たちはみんな、リクリエに負けない強い心を持っているから大丈夫だって、私は信じているもの！』
line = "『学園の星騎士たちはみんな、リクリエに負けない強い心を持っているから大丈夫だって、私は信じているもの！』"

[[dialogue]]
speaker = "ヴィーナス"
# 『だから、今日はみんなで楽しくバトルをしましょう！　おー！！』
line = "『だから、今日はみんなで楽しくバトルをしましょう！　おー！！』"

[[dialogue]]
speaker = "unk"
# アリーナの中に、ヴィーナスの「おー！！」に呼応したかけ声が響き渡った。
line = "アリーナの中に、ヴィーナスの「おー！！」に呼応したかけ声が響き渡った。"

[[dialogue]]
speaker = "unk"
# 果たして、バトルフェスタ・ペンタグラムがここに幕を開けるのだった――
line = "果たして、バトルフェスタ・ペンタグラムがここに幕を開けるのだった――"
