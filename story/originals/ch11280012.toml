[[dialogue]]
speaker = "unk"
# 第２話,リコさんの友達（大人編）,P
line = "第２話,リコさんの友達（大人編）,P"

[[dialogue]]
speaker = "unk"
# とある休日、買い物に出かけている途中、リコさんがカフェでお茶しているところを見かけた。
line = "とある休日、買い物に出かけている途中、リコさんがカフェでお茶しているところを見かけた。"

[[dialogue]]
speaker = "リコリンフィア"
# 「おや、少年じゃないか。奇遇だな」
line = "「おや、少年じゃないか。奇遇だな」"

[[dialogue]]
speaker = "unk"
# 一緒に席に座っていたのは――
line = "一緒に席に座っていたのは――"

[[dialogue]]
speaker = "トワ先生"
# 「あっ、会長くん！　こんにちは～♪」
line = "「あっ、会長くん！　こんにちは～♪」"

[[dialogue]]
speaker = "マリオン"
# 「ごきげんよう。ふふっ、会長様、本日もお可愛いご尊顔ですこと♪」
line = "「ごきげんよう。ふふっ、会長様、本日もお可愛いご尊顔ですこと♪」"

[[dialogue]]
speaker = "unk"
# えっ？　リコさん、２人とは知り合いなんですか？
line = "えっ？　リコさん、２人とは知り合いなんですか？"

[[dialogue]]
speaker = "リコリンフィア"
# 「ああ。実は、トワとマリオンとは学園ＯＧの同期でな」
line = "「ああ。実は、トワとマリオンとは学園ＯＧの同期でな」"

[[dialogue]]
speaker = "トワ先生"
# 「そうなの♪　だから、リコの職業についても知ってるよ」
line = "「そうなの♪　だから、リコの職業についても知ってるよ」"

[[dialogue]]
speaker = "リコリンフィア"
# 「少年、時間があるなら、一緒にお茶でもどうだ？　お姉さんが奢るぞ？」
line = "「少年、時間があるなら、一緒にお茶でもどうだ？　お姉さんが奢るぞ？」"

[[dialogue]]
speaker = "マリオン"
# 「今日はみんな時間が空いていたので、久しぶりに友達３人で集まってお茶でもしようって話になったんですよ」
line = "「今日はみんな時間が空いていたので、久しぶりに友達３人で集まってお茶でもしようって話になったんですよ」"

[[dialogue]]
speaker = "トワ先生"
# 「リコとこうやって休日に会うのは久しぶりだよね～。いつも忙しそうにしてたし」
line = "「リコとこうやって休日に会うのは久しぶりだよね～。いつも忙しそうにしてたし」"

[[dialogue]]
speaker = "リコリンフィア"
# 「少年の活躍のおかげで、最近は比較的休みも取れるようになってな」
line = "「少年の活躍のおかげで、最近は比較的休みも取れるようになってな」"

[[dialogue]]
speaker = "unk"
# そういえば、リコさんって――
line = "そういえば、リコさんって――"

[[dialogue]]
speaker = "リコリンフィア"
# 「――ほう、私がどういう経緯で<b>委員会</b>に所属したのかが気になると？」
line = "「――ほう、私がどういう経緯で<b>委員会</b>に所属したのかが気になると？」"

[[dialogue]]
speaker = "リコリンフィア"
# 「ならば少し、お姉さんの人生語りでもしようか」
line = "「ならば少し、お姉さんの人生語りでもしようか」"

[[dialogue]]
speaker = "リコリンフィア"
# 「私は、天界生まれの、純血の天使でな。自分で言うのは何だが、昔から毒のある性格だった」
line = "「私は、天界生まれの、純血の天使でな。自分で言うのは何だが、昔から毒のある性格だった」"

[[dialogue]]
speaker = "リコリンフィア"
# 「だから天界では上手くコミュニティが築けず、両親からもそのことで口酸っぱく、ああしろこうしろと言われて窮屈に感じていた」
line = "「だから天界では上手くコミュニティが築けず、両親からもそのことで口酸っぱく、ああしろこうしろと言われて窮屈に感じていた」"

[[dialogue]]
speaker = "リコリンフィア"
# 「そんな中で、流星学園からスカウトを受けてな。私は迷わず人間界へ行く選択をしたよ」
line = "「そんな中で、流星学園からスカウトを受けてな。私は迷わず人間界へ行く選択をしたよ」"

[[dialogue]]
speaker = "リコリンフィア"
# 「そうして流星学園に入学して間もなく、当時の公安委員会本部長からスカウトされて、公安委員会所属のエージェントになった」
line = "「そうして流星学園に入学して間もなく、当時の公安委員会本部長からスカウトされて、公安委員会所属のエージェントになった」"

[[dialogue]]
speaker = "リコリンフィア"
# 「これがすごく自分の性に合ってな。公安委員会での仕事を通して、生まれて初めて悪くないと思える学園生活を送れるようになった」
line = "「これがすごく自分の性に合ってな。公安委員会での仕事を通して、生まれて初めて悪くないと思える学園生活を送れるようになった」"

[[dialogue]]
speaker = "リコリンフィア"
# 「それから学園卒業後も人間界に残り、公安委員会に所属し続けることを選んで、現在に至るというわけだ」
line = "「それから学園卒業後も人間界に残り、公安委員会に所属し続けることを選んで、現在に至るというわけだ」"

[[dialogue]]
speaker = "リコリンフィア"
# 「ちなみに、マリオンがネビュラの魔女であることについては、私は学生時代に調べて、わかっていたよ」
line = "「ちなみに、マリオンがネビュラの魔女であることについては、私は学生時代に調べて、わかっていたよ」"

[[dialogue]]
speaker = "マリオン"
# 「当時、<ruby=わたくし>私</ruby>はリコから面と向かって、正体が魔女であることを指摘されました」
line = "「当時、<ruby>私<rt>わたくし</rt></ruby>はリコから面と向かって、正体が魔女であることを指摘されました」"

[[dialogue]]
speaker = "トワ先生"
# 「え！？　そうだったの！？　私、知らなかったんだけど！」
line = "「え！？　そうだったの！？　私、知らなかったんだけど！」"

[[dialogue]]
speaker = "リコリンフィア"
# 「ああ。その上で、私は<b>知らんぷり</b>をする選択を取った。当時の本部長にも隠してな」
line = "「ああ。その上で、私は<b>知らんぷり</b>をする選択を取った。当時の本部長にも隠してな」"

[[dialogue]]
speaker = "マリオン"
# 「リコには感謝しています。今ネビュラと学園が協力関係を結べているのは、リコが私のことを信じて、秘密にしていてくれたからです」
line = "「リコには感謝しています。今ネビュラと学園が協力関係を結べているのは、リコが私のことを信じて、秘密にしていてくれたからです」"

[[dialogue]]
speaker = "unk"
# リコさん、もしかして母さんが魔女であることも……？
line = "リコさん、もしかして母さんが魔女であることも……？"

[[dialogue]]
speaker = "リコリンフィア"
# 「ああ、マリオンの裏を調べたことで、魔女の存在は知っていたからな。リノと会って親しくなってから、そう長く経たずに気づいたよ」
line = "「ああ、マリオンの裏を調べたことで、魔女の存在は知っていたからな。リノと会って親しくなってから、そう長く経たずに気づいたよ」"

[[dialogue]]
speaker = "リコリンフィア"
# 「黙っていたことが上にバレたら即懲戒ものだが、私は幸い『知らんぷり』が得意なのでな」
line = "「黙っていたことが上にバレたら即懲戒ものだが、私は幸い『知らんぷり』が得意なのでな」"

[[dialogue]]
speaker = "リコリンフィア"
# 「最終的に辻褄を合わせて、みんなが幸せになれるなら、それが１番いいだろう？」
line = "「最終的に辻褄を合わせて、みんなが幸せになれるなら、それが１番いいだろう？」"

[[dialogue]]
speaker = "リコリンフィア"
# 「その為ならば、過程における『悪』も時には許容することが必要だと私は考えている」
line = "「その為ならば、過程における『悪』も時には許容することが必要だと私は考えている」"

[[dialogue]]
speaker = "リコリンフィア"
# 「つまりは、『毒は薬にもなる』ということだ」
line = "「つまりは、『毒は薬にもなる』ということだ」"

[[dialogue]]
speaker = "トワ先生"
# 「さすが、委員会を率いてるだけあるよね。私なら色々と葛藤しちゃって、真似できないよ」
line = "「さすが、委員会を率いてるだけあるよね。私なら色々と葛藤しちゃって、真似できないよ」"

[[dialogue]]
speaker = "リコリンフィア"
# 「先程も言った通り、私の性分に合っていたというだけさ。トワが先生として星騎士たちを育成し、正しく導こうとしているようにな」
line = "「先程も言った通り、私の性分に合っていたというだけさ。トワが先生として星騎士たちを育成し、正しく導こうとしているようにな」"

[[dialogue]]
speaker = "unk"
# 今思ったんですけど……
line = "今思ったんですけど……"

[[dialogue]]
speaker = "マリオン"
# 「おや、どうしました、会長様？」
line = "「おや、どうしました、会長様？」"

[[dialogue]]
speaker = "マリオン"
# 「――トワと私が、リコの<b>附属校の制服</b>にツッコまないことについて……ですか？」
line = "「――トワと私が、リコの<b>附属校の制服</b>にツッコまないことについて……ですか？」"

[[dialogue]]
speaker = "リコリンフィア"
# 「あっ！　お姉さん、すみませ～ん♪」
line = "「あっ！　お姉さん、すみませ～ん♪」"

[[dialogue]]
speaker = "unk"
# リコさんが附属生の声色になって、カフェのウェイトレスさんを呼ぶ。
line = "リコさんが附属生の声色になって、カフェのウェイトレスさんを呼ぶ。"

[[dialogue]]
speaker = "リコリンフィア"
# 「コーヒーのお代わり、お願いしま～す♪」
line = "「コーヒーのお代わり、お願いしま～す♪」"

[[dialogue]]
speaker = "ウェイトレス"
# 「コーヒーお１つですね。さっきと同じで、お砂糖やミルクは無くて大丈夫でしたか？」
line = "「コーヒーお１つですね。さっきと同じで、お砂糖やミルクは無くて大丈夫でしたか？」"

[[dialogue]]
speaker = "リコリンフィア"
# 「はい♪　リコリン、こう見えて大人舌なので<emoji=heart04>　てへっ☆」
line = "「はい♪　リコリン、こう見えて大人舌なので<emoji=heart04>　てへっ☆」"

[[dialogue]]
speaker = "ウェイトレス"
# 「ふふっ、かしこまりました♪　お待ち下さいね～」
line = "「ふふっ、かしこまりました♪　お待ち下さいね～」"

[[dialogue]]
speaker = "リコリンフィア"
# 「ありがとうございますっ、お姉さん♪」
line = "「ありがとうございますっ、お姉さん♪」"

[[dialogue]]
speaker = "unk"
# 可愛いものを見るように微笑みながら、ウェイトレスは去って行く。
line = "可愛いものを見るように微笑みながら、ウェイトレスは去って行く。"

[[dialogue]]
speaker = "マリオン"
# 「ふふっ、さすがリコリン様、お可愛いですこと♪」
line = "「ふふっ、さすがリコリン様、お可愛いですこと♪」"

[[dialogue]]
speaker = "トワ先生"
# 「リコは学生時代から附属生になり切るフリをしてたからね～。私たちはもう、すっかり見慣れちゃったよ」
line = "「リコは学生時代から附属生になり切るフリをしてたからね～。私たちはもう、すっかり見慣れちゃったよ」"

[[dialogue]]
speaker = "unk"
# 昔からやってたんですか！？
line = "昔からやってたんですか！？"

[[dialogue]]
speaker = "リコリンフィア"
# 「――ああ。ちなみに、リコリンは年の離れた姉妹が沢山いて、本校を卒業したら、また次の姉妹が入学して来るという設定だ」
line = "「――ああ。ちなみに、リコリンは年の離れた姉妹が沢山いて、本校を卒業したら、また次の姉妹が入学して来るという設定だ」"

[[dialogue]]
speaker = "マリオン"
# 「久しぶりに、トワもなり切ってみたらどうですか？」
line = "「久しぶりに、トワもなり切ってみたらどうですか？」"

[[dialogue]]
speaker = "トワ先生"
# 「いや、やらないよ！？」
line = "「いや、やらないよ！？」"

[[dialogue]]
speaker = "リコリンフィア"
# 「え～、トワちゃん、リコリンと一緒は嫌なの～？　昔１回やってくれたのに～。うるうる」
line = "「え～、トワちゃん、リコリンと一緒は嫌なの～？　昔１回やってくれたのに～。うるうる」"

[[dialogue]]
speaker = "unk"
# その話、詳しくお願いします！
line = "その話、詳しくお願いします！"

[[dialogue]]
speaker = "トワ先生"
# 「ちょっ！？　ダメ！　先生の黒歴史だからぁぁぁ～～～！！」
line = "「ちょっ！？　ダメ！　先生の黒歴史だからぁぁぁ～～～！！」"

[[dialogue]]
speaker = "リコリンフィア"
# 「ふふっ」
line = "「ふふっ」"

[[dialogue]]
speaker = "unk"
# リコさんが楽しそうな笑みをこぼしたのを見て、心許せる友人なのだな、と思う俺なのだった――
line = "リコさんが楽しそうな笑みをこぼしたのを見て、心許せる友人なのだな、と思う俺なのだった――"
