[[dialogue]]
speaker = "unk"
# 第６話,梨緒・Ａ・クリステレス,B
line = "第６話,梨緒・Ａ・クリステレス,B"

[[dialogue]]
speaker = "unk"
# 壱の打撃が参に。弐が陸に。参が究に。
line = "壱の打撃が参に。弐が陸に。参が究に。"

[[dialogue]]
speaker = "unk"
# この世界と２つの平行世界──３つの世界を束ねた拳が乱撃となり、鋼のモンスターを打ち砕く。
line = "この世界と２つの平行世界──３つの世界を束ねた拳が乱撃となり、鋼のモンスターを打ち砕く。"

[[dialogue]]
speaker = "ドラケルス"
# 「ガアァァァ……」
line = "「ガアァァァ……」"

[[dialogue]]
speaker = "unk"
# 後から発生したモンスターごとまとめて叩き伏せ、リクリエの尖兵は断末魔とともに消え失せた。
line = "後から発生したモンスターごとまとめて叩き伏せ、リクリエの尖兵は断末魔とともに消え失せた。"

[[dialogue]]
speaker = "クロト"
# 「ふぅ……」
line = "「ふぅ……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「さっすがクロト！　魔王にかかれば新手のモンスターも木っ端ミジンコね！」
line = "「さっすがクロト！　魔王にかかれば新手のモンスターも木っ端ミジンコね！」"

[[dialogue]]
speaker = "マトイ"
# 「えーと……残骸があちこちに転がっちゃってるんだけど……」
line = "「えーと……残骸があちこちに転がっちゃってるんだけど……」"

[[dialogue]]
speaker = "クロト"
# 「多分モンスターにされた機械だな……」
line = "「多分モンスターにされた機械だな……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ま、仕方ないわね。あのままだったら街中の機械がモンスターになりかねなかったもの」
line = "「ま、仕方ないわね。あのままだったら街中の機械がモンスターになりかねなかったもの」"

[[dialogue]]
speaker = "マトイ"
# 「それはそうだけど……被害額いくらになるんだろ、これ……」
line = "「それはそうだけど……被害額いくらになるんだろ、これ……」"

[[dialogue]]
speaker = "unk"
# 鉄屑を前にしてあっけらかんと言ってのけるヴィーナスと、顔を青くするマトイ。
line = "鉄屑を前にしてあっけらかんと言ってのけるヴィーナスと、顔を青くするマトイ。"

[[dialogue]]
speaker = "unk"
# 俺たちは責務を果たしたとはいえ、確かにこの瓦礫の山は心が痛むものがあった。
line = "俺たちは責務を果たしたとはいえ、確かにこの瓦礫の山は心が痛むものがあった。"

[[dialogue]]
speaker = "サーシャ"
# 「いつもならモンスターは倒すと消えるのに、残骸が残ったわね～」
line = "「いつもならモンスターは倒すと消えるのに、残骸が残ったわね～」"

[[dialogue]]
speaker = "ヴィーナス"
# 「確か、フィーニスの塔のガーディアンもこんな感じだったわよね。倒したらスクラップになったし」
line = "「確か、フィーニスの塔のガーディアンもこんな感じだったわよね。倒したらスクラップになったし」"

[[dialogue]]
speaker = "unk"
# フィーニスの塔の中で戦ったガーディアンは、リクリエの瘴気の影響で変化し、半ばモンスター化していた。
line = "フィーニスの塔の中で戦ったガーディアンは、リクリエの瘴気の影響で変化し、半ばモンスター化していた。"

[[dialogue]]
speaker = "unk"
# 今戦ったモンスターも、あの時のガーディアン同様、街にある機械がリクリエの瘴気に侵されていたということか。
line = "今戦ったモンスターも、あの時のガーディアン同様、街にある機械がリクリエの瘴気に侵されていたということか。"

[[dialogue]]
speaker = "unk"
# それがフィーニスの塔外でも起きうる、しかも強力なモンスターに変ずるとなれば、大きな脅威だ。
line = "それがフィーニスの塔外でも起きうる、しかも強力なモンスターに変ずるとなれば、大きな脅威だ。"

[[dialogue]]
speaker = "クロト"
# 「ひとまず新星学園に戻ろう。残骸はエスメラルダ先生たちが回収して分析してくれる──」
line = "「ひとまず新星学園に戻ろう。残骸はエスメラルダ先生たちが回収して分析してくれる──」"

[[dialogue]]
speaker = "クロト"
# 「──！？」
line = "「──！？」"

[[dialogue]]
speaker = "unk"
# 今の光景は……なんだ？
line = "今の光景は……なんだ？"

[[dialogue]]
speaker = "unk"
# 俺はあの光景を知らない──
line = "俺はあの光景を知らない──"

[[dialogue]]
speaker = "unk"
# けど知っている。覚えている。
line = "けど知っている。覚えている。"

[[dialogue]]
speaker = "unk"
# 誰かの記憶の中で垣間見た光景。
line = "誰かの記憶の中で垣間見た光景。"

[[dialogue]]
speaker = "unk"
# いつかの戦いの最中に幻視した破滅の風景。
line = "いつかの戦いの最中に幻視した破滅の風景。"

[[dialogue]]
speaker = "unk"
# 摂理に抗う者の末路。
line = "摂理に抗う者の末路。"

[[dialogue]]
speaker = "unk"
# 世界が<ruby=リセットされる>無に帰す</ruby>前の、終焉の姿。
line = "世界が<ruby>無に帰す<rt>リセットされる</rt></ruby>前の、終焉の姿。"

[[dialogue]]
speaker = "クロト"
# 「はぁ……はぁ……」
line = "「はぁ……はぁ……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロト……？　顔色が悪いわよ？」
line = "「クロト……？　顔色が悪いわよ？」"

[[dialogue]]
speaker = "unk"
# あの光景が俺の心臓を鷲掴みにして離さない。
line = "あの光景が俺の心臓を鷲掴みにして離さない。"

[[dialogue]]
speaker = "unk"
# 心臓が破裂しそうにバクバクと脈打つ。
line = "心臓が破裂しそうにバクバクと脈打つ。"

[[dialogue]]
speaker = "unk"
# 血が激しく巡りすぎて頭が痛い。
line = "血が激しく巡りすぎて頭が痛い。"

[[dialogue]]
speaker = "unk"
# 冷たい汗が背中を伝う。
line = "冷たい汗が背中を伝う。"

[[dialogue]]
speaker = "unk"
# 体の芯は燃えそうに熱いのに、手足は凍ってしまいそうに寒い。
line = "体の芯は燃えそうに熱いのに、手足は凍ってしまいそうに寒い。"

[[dialogue]]
speaker = "unk"
# 壊セ壊セ壊セ壊セ壊セ壊セ壊セ壊セ壊セ壊セ壊セ壊セ壊セ壊セ壊セ──
line = "壊セ壊セ壊セ壊セ壊セ壊セ壊セ壊セ壊セ壊セ壊セ壊セ壊セ壊セ壊セ──"

[[dialogue]]
speaker = "unk"
# 滅ボセ滅ボセ滅ボセ滅ボセ滅ボセ滅ボセ滅ボセ滅ボセ滅ボセ滅ボセ──
line = "滅ボセ滅ボセ滅ボセ滅ボセ滅ボセ滅ボセ滅ボセ滅ボセ滅ボセ滅ボセ──"

[[dialogue]]
speaker = "unk"
# 俺の中に封じたリクリエの力が命ずる──いや、違う。他ならぬ俺自身が破滅を欲していた。
line = "俺の中に封じたリクリエの力が命ずる──いや、違う。他ならぬ俺自身が破滅を欲していた。"

[[dialogue]]
speaker = "クロト"
# 「みんな、俺から離れてくれ……！！」
line = "「みんな、俺から離れてくれ……！！」"

[[dialogue]]
speaker = "unk"
# さもなければみんなを……みんなを……
line = "さもなければみんなを……みんなを……"

[[dialogue]]
speaker = "unk"
# <size=60>みんなを殺してしまう！！</size>
line = "<size=60>みんなを殺してしまう！！</size>"

[[dialogue]]
speaker = "？？？"
# 「見つけたぞ、緋宮クロト」
line = "「見つけたぞ、緋宮クロト」"

[[dialogue]]
speaker = "クロト"
# 「──！？」
line = "「──！？」"

[[dialogue]]
speaker = "unk"
# 全てを無に帰さんとする衝動が臨界に達する寸前、一条の稲妻が俺を貫いた。
line = "全てを無に帰さんとする衝動が臨界に達する寸前、一条の稲妻が俺を貫いた。"

[[dialogue]]
speaker = "unk"
# その雷は不届き者に下す天誅の如く。
line = "その雷は不届き者に下す天誅の如く。"

[[dialogue]]
speaker = "unk"
# 空から真っ直ぐ撃ち下ろされた光の矢が、俺の中に渦巻く衝動を焼き尽くした。
line = "空から真っ直ぐ撃ち下ろされた光の矢が、俺の中に渦巻く衝動を焼き尽くした。"

[[dialogue]]
speaker = "？？？"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# 膝をついた俺の眼前に、矢の切っ先が向けられる。
line = "膝をついた俺の眼前に、矢の切っ先が向けられる。"

[[dialogue]]
speaker = "unk"
# クロスボウに<ruby=つが>番</ruby>えた矢を突き付けられているのだと、一瞬遅れて気付く。
line = "クロスボウに<ruby>番<rt>つが</rt></ruby>えた矢を突き付けられているのだと、一瞬遅れて気付く。"

[[dialogue]]
speaker = "unk"
# 雷光のごとく<ruby=まばゆ>眩</ruby>い金髪をなびかせた女性がそこに立っていた。
line = "雷光のごとく<ruby>眩<rt>まばゆ</rt></ruby>い金髪をなびかせた女性がそこに立っていた。"

[[dialogue]]
speaker = "クロト"
# 「誰だ……？」
line = "「誰だ……？」"

[[dialogue]]
speaker = "梨緒"
# 「私は<ruby=りお>梨緒</ruby>・<ruby=アガサ>Ａ</ruby>・クリステレス」
line = "「私は<ruby>梨緒<rt>りお</rt></ruby>・<ruby>Ａ<rt>アガサ</rt></ruby>・クリステレス」"

[[dialogue]]
speaker = "unk"
# その視線は射貫くように鋭く、動けば撃つと言外に告げていた。
line = "その視線は射貫くように鋭く、動けば撃つと言外に告げていた。"

[[dialogue]]
speaker = "unk"
# 俺はその場に縫い付けられたみたいに動くことができず、彼女の言葉を待つ。
line = "俺はその場に縫い付けられたみたいに動くことができず、彼女の言葉を待つ。"

[[dialogue]]
speaker = "梨緒"
# 「君はいずれ悪しき魔王に堕ち、世界を滅ぼす」
line = "「君はいずれ悪しき魔王に堕ち、世界を滅ぼす」"

[[dialogue]]
speaker = "梨緒"
# 「だからその前に私が君を止める」
line = "「だからその前に私が君を止める」"

[[dialogue]]
speaker = "梨緒"
# 「よって──」
line = "「よって──」"

[[dialogue]]
speaker = "梨緒"
# 「新星学園星徒会長・緋宮クロト。私は君に御前試合を申し込む！」
line = "「新星学園星徒会長・緋宮クロト。私は君に御前試合を申し込む！」"
