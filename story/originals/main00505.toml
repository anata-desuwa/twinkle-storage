[[dialogue]]
speaker = "unk"
# 第７話,おとぎの星空,B
line = "第７話,おとぎの星空,B"

[[dialogue]]
speaker = "unk"
# 長いこと塔の内部にいた気もする。
line = "長いこと塔の内部にいた気もする。"

[[dialogue]]
speaker = "unk"
# 俺たちは謎の声に促されるように、入った時と同じく光に包まれて外へ戻された。
line = "俺たちは謎の声に促されるように、入った時と同じく光に包まれて外へ戻された。"

[[dialogue]]
speaker = "unk"
# これで一息つける──そう思っていたのだが……
line = "これで一息つける──そう思っていたのだが……"

[[dialogue]]
speaker = "クロト"
# 「これは……！」
line = "「これは……！」"

[[dialogue]]
speaker = "unk"
# ようやく戻ってこれた人間界。
line = "ようやく戻ってこれた人間界。"

[[dialogue]]
speaker = "unk"
# しかしその様相は、入った時のそれとは大きく異なっていた。
line = "しかしその様相は、入った時のそれとは大きく異なっていた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「嫌な予感してたけど──これじゃ全然休む暇もないわね」
line = "「嫌な予感してたけど──これじゃ全然休む暇もないわね」"

[[dialogue]]
speaker = "フィオナ"
# 「もしやこれが……『星読事変』の兆候でしょうか？」
line = "「もしやこれが……『星読事変』の兆候でしょうか？」"

[[dialogue]]
speaker = "クロト"
# 「ああ。このオモチャみたいな星空……間違いない」
line = "「ああ。このオモチャみたいな星空……間違いない」"

[[dialogue]]
speaker = "unk"
# それに、あの声が語っていた『リクリエの使徒』とやらにも合致する。
line = "それに、あの声が語っていた『リクリエの使徒』とやらにも合致する。"

[[dialogue]]
speaker = "アポロ"
# 『わっはっは！　また会おうぞ魔王、我が宿敵よ！』
line = "『わっはっは！　また会おうぞ魔王、我が宿敵よ！』"

[[dialogue]]
speaker = "unk"
# 前回の邂逅を思い出す。
line = "前回の邂逅を思い出す。"

[[dialogue]]
speaker = "unk"
# あの時は、新星だけで事に当たらざるを得なかったが……
line = "あの時は、新星だけで事に当たらざるを得なかったが……"

[[dialogue]]
speaker = "ヴィーナス"
# 「ま～たあのガキンチョが出てくるに違いないわ。フィオナも、見た目に騙されないよう注意してね！」
line = "「ま～たあのガキンチョが出てくるに違いないわ。フィオナも、見た目に騙されないよう注意してね！」"

[[dialogue]]
speaker = "フィオナ"
# 「かしこまりました。件の少女が脅威であるという報告は、流星星徒会にも共有されておりますので」
line = "「かしこまりました。件の少女が脅威であるという報告は、流星星徒会にも共有されておりますので」"

[[dialogue]]
speaker = "クロト"
# 「助かるよ。俺たちだけじゃ取り逃がしたからな」
line = "「助かるよ。俺たちだけじゃ取り逃がしたからな」"

[[dialogue]]
speaker = "unk"
# しかし今日、フィオナの抜け目のなさを見ていると無用な心配という気もした。
line = "しかし今日、フィオナの抜け目のなさを見ていると無用な心配という気もした。"

[[dialogue]]
speaker = "unk"
# 流星星徒会のみんなが、彼女を頼るのもよくわかる──
line = "流星星徒会のみんなが、彼女を頼るのもよくわかる──"

[[dialogue]]
speaker = "ニャリオン"
# 「フィ……フィオナ嬢～～～～～！！！」
line = "「フィ……フィオナ嬢～～～～～！！！」"

[[dialogue]]
speaker = "フィオナ"
# 「ニャリオン──」
line = "「ニャリオン──」"

[[dialogue]]
speaker = "ニャリオン"
# 「あ──会いたかったニャン！　まさか召喚も遮断されるニャんて、前代未聞ニャン……！」
line = "「あ──会いたかったニャン！　まさか召喚も遮断されるニャんて、前代未聞ニャン……！」"

[[dialogue]]
speaker = "フィオナ"
# 「ふふっ、ごめんごめん……私も寂しかったよ」
line = "「ふふっ、ごめんごめん……私も寂しかったよ」"

[[dialogue]]
speaker = "マトイ"
# 「あっ、３人とも──よかった。無事だったんだ」
line = "「あっ、３人とも──よかった。無事だったんだ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「マトイじゃない。あれ、なんか怪我してる……？」
line = "「マトイじゃない。あれ、なんか怪我してる……？」"

[[dialogue]]
speaker = "ソフィア"
# 「フィオナ会長──！　ご無事でしたか！」
line = "「フィオナ会長──！　ご無事でしたか！」"

[[dialogue]]
speaker = "フィオナ"
# 「ええ、ごめんねソフィア。むしろこちらのほうが心配だけれど」
line = "「ええ、ごめんねソフィア。むしろこちらのほうが心配だけれど」"

[[dialogue]]
speaker = "サーシャ"
# 「お疲れ、クロトくんにヴィーナスちゃん。実はちょ～っと面倒なことになってて……」
line = "「お疲れ、クロトくんにヴィーナスちゃん。実はちょ～っと面倒なことになってて……」"

[[dialogue]]
speaker = "クロト"
# 「そのようですね」
line = "「そのようですね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「この夜、あのチビッコでしょ？」
line = "「この夜、あのチビッコでしょ？」"

[[dialogue]]
speaker = "サーシャ"
# 「そう。本当に困ったちゃんなの」
line = "「そう。本当に困ったちゃんなの」"

[[dialogue]]
speaker = "unk"
# サーシャ先輩は滅入った素振りで頷いた。
line = "サーシャ先輩は滅入った素振りで頷いた。"

[[dialogue]]
speaker = "サーシャ"
# 「手短に伝えると、今は大量のアステライトが関東全域を覆い尽くしているわ」
line = "「手短に伝えると、今は大量のアステライトが関東全域を覆い尽くしているわ」"

[[dialogue]]
speaker = "クロト"
# 「……！　関東！？」
line = "「……！　関東！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「エリア広すぎでしょ！？　そんなの、今まで一度だって……」
line = "「エリア広すぎでしょ！？　そんなの、今まで一度だって……」"

[[dialogue]]
speaker = "unk"
# 流星市国どころの話じゃない。
line = "流星市国どころの話じゃない。"

[[dialogue]]
speaker = "unk"
# 既にここ一帯でも相当なアステラが目につくというのに、これがより広範囲に拡大しているとなると……。
line = "既にここ一帯でも相当なアステラが目につくというのに、これがより広範囲に拡大しているとなると……。"

[[dialogue]]
speaker = "ソフィア"
# 「皆さんに手分けして対処に当たってもらっています。また、学園の<ruby=プリマステラ>星騎士部隊</ruby>にも協力を要請しました」
line = "「皆さんに手分けして対処に当たってもらっています。また、学園の<ruby>星騎士部隊<rt>プリマステラ</rt></ruby>にも協力を要請しました」"

[[dialogue]]
speaker = "フィオナ"
# 「懸命です。私のいない中、適切な指示をありがとうございます」
line = "「懸命です。私のいない中、適切な指示をありがとうございます」"

[[dialogue]]
speaker = "フィオナ"
# 「それに──ソフィアも奮闘してくれたようですね。ありがとう」
line = "「それに──ソフィアも奮闘してくれたようですね。ありがとう」"

[[dialogue]]
speaker = "ソフィア"
# 「っ……はい！　大変な敵でしたが、ソフィアも頑張りました」
line = "「っ……はい！　大変な敵でしたが、ソフィアも頑張りました」"

[[dialogue]]
speaker = "ヴィーナス"
# （もしかして、さっき途中で追い出しちゃった守護天使……？）
line = "（もしかして、さっき途中で追い出しちゃった守護天使……？）"

[[dialogue]]
speaker = "クロト"
# （かもな。けど、解決してくれたようだから後で話そう）
line = "（かもな。けど、解決してくれたようだから後で話そう）"

[[dialogue]]
speaker = "unk"
# あれはまだ余力を残していた。
line = "あれはまだ余力を残していた。"

[[dialogue]]
speaker = "unk"
# みんなが後始末を請け負ってくれたのなら、事が済んだ後に礼を言おう。
line = "みんなが後始末を請け負ってくれたのなら、事が済んだ後に礼を言おう。"

[[dialogue]]
speaker = "ヴィーナス"
# 「とりあえず事情はわかったわ。私たちも全力で加勢させてもらうから──ね、フィオナ。クロト」
line = "「とりあえず事情はわかったわ。私たちも全力で加勢させてもらうから──ね、フィオナ。クロト」"

[[dialogue]]
speaker = "フィオナ"
# 「ええ。これも魔王としての宿命ならば」
line = "「ええ。これも魔王としての宿命ならば」"

[[dialogue]]
speaker = "クロト"
# 「この手で止めるまでだな」
line = "「この手で止めるまでだな」"

[[dialogue]]
speaker = "マトイ"
# （？　フィオナさんまで、魔王って……？）
line = "（？　フィオナさんまで、魔王って……？）"

[[dialogue]]
speaker = "ソフィア"
# 「ユウリ先輩とルリエルがややピンチのようです──フィオナ会長、よければ２人のところに！」
line = "「ユウリ先輩とルリエルがややピンチのようです──フィオナ会長、よければ２人のところに！」"

[[dialogue]]
speaker = "フィオナ"
# 「はい。流星星徒会は地上のフォローに──民間への被害を最小限に抑えましょう」
line = "「はい。流星星徒会は地上のフォローに──民間への被害を最小限に抑えましょう」"

[[dialogue]]
speaker = "クロト"
# 「なら俺たちは<b>本体</b>を探そう。核を叩ければ、またこの夜も過ぎ去るはずだ」
line = "「なら俺たちは<b>本体</b>を探そう。核を叩ければ、またこの夜も過ぎ去るはずだ」"

[[dialogue]]
speaker = "unk"
# あの夜、つけ損ねた決着を求めて。
line = "あの夜、つけ損ねた決着を求めて。"

[[dialogue]]
speaker = "unk"
# 俺たちの長い夜はさらに続いていくのだった。
line = "俺たちの長い夜はさらに続いていくのだった。"
