[[dialogue]]
speaker = "unk"
# 第４話,それぞれの世界へ,P
line = "第４話,それぞれの世界へ,P"

[[dialogue]]
speaker = "unk"
# トレジアンナからの連絡を受けて、いろは、花織、ここあの３人は渋谷へと向かう。
line = "トレジアンナからの連絡を受けて、いろは、花織、ここあの３人は渋谷へと向かう。"

[[dialogue]]
speaker = "unk"
# そこは彼女たちが、異世界より最初にたどり着いた場所だった。
line = "そこは彼女たちが、異世界より最初にたどり着いた場所だった。"

[[dialogue]]
speaker = "トレジアンナ"
# 「──戻って来たようです！」
line = "「──戻って来たようです！」"

[[dialogue]]
speaker = "unk"
# トレジアンナがそう発した直後、目の前の空間が歪んだ。
line = "トレジアンナがそう発した直後、目の前の空間が歪んだ。"

[[dialogue]]
speaker = "unk"
# そして次の瞬間、オムニスを抱えた、いろはたちのよく知る陽彩の姿が現れた。
line = "そして次の瞬間、オムニスを抱えた、いろはたちのよく知る陽彩の姿が現れた。"

[[dialogue]]
speaker = "陽彩"
# 「ごめん、みんな……心配をかけた」
line = "「ごめん、みんな……心配をかけた」"

[[dialogue]]
speaker = "unk"
# 陽彩は寄生していた悪魔から、無事に解放された。
line = "陽彩は寄生していた悪魔から、無事に解放された。"

[[dialogue]]
speaker = "unk"
# 事の顛末を陽彩の口から聞いた後、いよいよいろはたちは元の世界へと戻ることになった。
line = "事の顛末を陽彩の口から聞いた後、いよいよいろはたちは元の世界へと戻ることになった。"

[[dialogue]]
speaker = "ここあ"
# 「プリちんともこれでお別れか～、寂しいにゃあ」
line = "「プリちんともこれでお別れか～、寂しいにゃあ」"

[[dialogue]]
speaker = "プリムラ"
# 「ふん……我は悪の終末兵器じゃ。こんな別れ、寂しくもなんともないのじゃ……」
line = "「ふん……我は悪の終末兵器じゃ。こんな別れ、寂しくもなんともないのじゃ……」"

[[dialogue]]
speaker = "サチ"
# 「強がっちゃって……こんな時くらい素直になればいいのに」
line = "「強がっちゃって……こんな時くらい素直になればいいのに」"

[[dialogue]]
speaker = "プリムラ"
# 「う、うるさいのじゃ！」
line = "「う、うるさいのじゃ！」"

[[dialogue]]
speaker = "プリムラ"
# 「……じゃが……まあ、貴様を手放すのは、惜しくはあるのう」
line = "「……じゃが……まあ、貴様を手放すのは、惜しくはあるのう」"

[[dialogue]]
speaker = "プリムラ"
# 「貴様は優秀な眷属じゃった。時々、言うことを聞いてくれぬが……それでも十分、我に尽くしたのじゃ」
line = "「貴様は優秀な眷属じゃった。時々、言うことを聞いてくれぬが……それでも十分、我に尽くしたのじゃ」"

[[dialogue]]
speaker = "プリムラ"
# 「我を放ってどこぞをほっつき歩いておる、第一の眷属にも見習わせたいくらいじゃ！」
line = "「我を放ってどこぞをほっつき歩いておる、第一の眷属にも見習わせたいくらいじゃ！」"

[[dialogue]]
speaker = "ここあ"
# 「にゃはは、ありがとう♪　眷属じゃなくなっても、ここあのこと、ちゃんと覚えておいて欲しいなっ」
line = "「にゃはは、ありがとう♪　眷属じゃなくなっても、ここあのこと、ちゃんと覚えておいて欲しいなっ」"

[[dialogue]]
speaker = "プリムラ"
# 「そうじゃな……特別に、覚えておいてやらんこともない」
line = "「そうじゃな……特別に、覚えておいてやらんこともない」"

[[dialogue]]
speaker = "ここあ"
# 「嬉しいよ、プリちん♪」
line = "「嬉しいよ、プリちん♪」"

[[dialogue]]
speaker = "プリムラ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "プリムラ"
# 「……いやじゃ」
line = "「……いやじゃ」"

[[dialogue]]
speaker = "サチ"
# 「プリムラ？」
line = "「プリムラ？」"

[[dialogue]]
speaker = "プリムラ"
# 「嫌じゃと言うておる！」
line = "「嫌じゃと言うておる！」"

[[dialogue]]
speaker = "プリムラ"
# 「やはり貴様は手放すに惜しい！　これから先もずっと我の眷属でおるのじゃ！」
line = "「やはり貴様は手放すに惜しい！　これから先もずっと我の眷属でおるのじゃ！」"

[[dialogue]]
speaker = "ここあ"
# 「ごめんね、プリちん。ここあもそうしたいけど、元の世界に戻らなくちゃいけないから……」
line = "「ごめんね、プリちん。ここあもそうしたいけど、元の世界に戻らなくちゃいけないから……」"

[[dialogue]]
speaker = "サチ"
# 「そうだよ、わがまま言わないの」
line = "「そうだよ、わがまま言わないの」"

[[dialogue]]
speaker = "プリムラ"
# 「わかっておる！　誰も行くなとは言っておらんじゃろうが！」
line = "「わかっておる！　誰も行くなとは言っておらんじゃろうが！」"

[[dialogue]]
speaker = "プリムラ"
# 「ただ、主従の関係を解消してやるのをやめただけじゃ！　ここあ、貴様はこれから先もずっと我の眷属じゃ！　わかったの！」
line = "「ただ、主従の関係を解消してやるのをやめただけじゃ！　ここあ、貴様はこれから先もずっと我の眷属じゃ！　わかったの！」"

[[dialogue]]
speaker = "ここあ"
# 「にゃはは……うん、わかったよ」
line = "「にゃはは……うん、わかったよ」"

[[dialogue]]
speaker = "ここあ"
# 「ここあはずっと、元の世界にもどってもプリちんの眷属だから♪」
line = "「ここあはずっと、元の世界にもどってもプリちんの眷属だから♪」"

[[dialogue]]
speaker = "プリムラ"
# 「約束じゃぞ……忘れるなよ……」
line = "「約束じゃぞ……忘れるなよ……」"

[[dialogue]]
speaker = "サチ"
# 「何よ、可愛いところあるじゃない」
line = "「何よ、可愛いところあるじゃない」"

[[dialogue]]
speaker = "プリムラ"
# 「ふん……」
line = "「ふん……」"

[[dialogue]]
speaker = "オムニス"
# 「俺がいない間に、ずいぶん仲良くなったんだな」
line = "「俺がいない間に、ずいぶん仲良くなったんだな」"

[[dialogue]]
speaker = "ここあ"
# 「にゃはは、そうなんだよ～」
line = "「にゃはは、そうなんだよ～」"

[[dialogue]]
speaker = "オムニス"
# 「ありがとう、本当にお世話になった」
line = "「ありがとう、本当にお世話になった」"

[[dialogue]]
speaker = "トレジアンナ"
# 「いえいえ、短い間でしたけど、とても楽しい時間を過ごさせていただきました」
line = "「いえいえ、短い間でしたけど、とても楽しい時間を過ごさせていただきました」"

[[dialogue]]
speaker = "トレジアンナ"
# 「これから先、いろいろ大変なことが待ち受けているでしょうが、挫けずに頑張ってください♪」
line = "「これから先、いろいろ大変なことが待ち受けているでしょうが、挫けずに頑張ってください♪」"

[[dialogue]]
speaker = "プリムラ"
# 「よいか、悪魔なぞに負けたら承知せぬぞ！」
line = "「よいか、悪魔なぞに負けたら承知せぬぞ！」"

[[dialogue]]
speaker = "オムニス"
# 「ああ、頑張るよ」
line = "「ああ、頑張るよ」"

[[dialogue]]
speaker = "ここあ"
# 「みんなで力を合わせて、そして絶対に勝つから……安心して、プリちん♪」
line = "「みんなで力を合わせて、そして絶対に勝つから……安心して、プリちん♪」"

[[dialogue]]
speaker = "ここあ"
# 「そんで平和になったら、またプリちんに会いにこの世界に来たいから……だから……」
line = "「そんで平和になったら、またプリちんに会いにこの世界に来たいから……だから……」"

[[dialogue]]
speaker = "ここあ"
# 「プリちんも絶対に守ってね、この世界を！」
line = "「プリちんも絶対に守ってね、この世界を！」"

[[dialogue]]
speaker = "プリムラ"
# 「もちろんじゃ、任せておけ！」
line = "「もちろんじゃ、任せておけ！」"

[[dialogue]]
speaker = "オムニス"
# 「それではトレジアンナさん、お願いします」
line = "「それではトレジアンナさん、お願いします」"

[[dialogue]]
speaker = "unk"
# ──こうして、突然始まったここあたちの異世界生活は幕を閉じた。
line = "──こうして、突然始まったここあたちの異世界生活は幕を閉じた。"

[[dialogue]]
speaker = "unk"
# 再び、魔法少女たちがまみえる可能性は限りなく低い。
line = "再び、魔法少女たちがまみえる可能性は限りなく低い。"

[[dialogue]]
speaker = "unk"
# だが、ゼロではないその可能性を信じて、２つの世界の魔法少女たちは、それぞれに立ちはだかる試練に向かって挑んでいくのだった。
line = "だが、ゼロではないその可能性を信じて、２つの世界の魔法少女たちは、それぞれに立ちはだかる試練に向かって挑んでいくのだった。"
