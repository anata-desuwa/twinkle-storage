[[dialogue]]
speaker = "unk"
# 紅明のひと足早いクリスマスパーティー宣言で盛り上がる中、俺はタイミングを見て、セシアに話しかけた。
line = "紅明のひと足早いクリスマスパーティー宣言で盛り上がる中、俺はタイミングを見て、セシアに話しかけた。"

[[dialogue]]
speaker = "セシア"
# 「――あら？　会長、どうしたの？」
line = "「――あら？　会長、どうしたの？」"

[[dialogue]]
speaker = "unk"
# あれから、記憶はどう？
line = "あれから、記憶はどう？"

[[dialogue]]
speaker = "セシア"
# 「わたくしのことを気にかけてくれてたのね。ありがとう」
line = "「わたくしのことを気にかけてくれてたのね。ありがとう」"

[[dialogue]]
speaker = "セシア"
# 「今日、新星寮の子たちが、クリスマスプレゼントのお礼を言いにきてくれて、笑顔を沢山見ることができたわ」
line = "「今日、新星寮の子たちが、クリスマスプレゼントのお礼を言いにきてくれて、笑顔を沢山見ることができたわ」"

[[dialogue]]
speaker = "セシア"
# 「そのおかげでわたくしの中に、力はだいぶ戻ってきたと思う。でも……」
line = "「そのおかげでわたくしの中に、力はだいぶ戻ってきたと思う。でも……」"

[[dialogue]]
speaker = "セシア"
# 「残念なことに、記憶はまだ思い出せないの。なにか、あともうちょっとで思い出せそうな気はするのだけど――」
line = "「残念なことに、記憶はまだ思い出せないの。なにか、あともうちょっとで思い出せそうな気はするのだけど――」"

[[dialogue]]
speaker = "unk"
# と、その時だった。
line = "と、その時だった。"

[[dialogue]]
speaker = "セシア"
# 「わぷっ！？」
line = "「わぷっ！？」"

[[dialogue]]
speaker = "マグダレナ"
# 「あっ……！？　申し訳ございません……！　よそ見をして、ぶつかってしまいました……！　お嬢さん、お怪我はありませんでしたか？」
line = "「あっ……！？　申し訳ございません……！　よそ見をして、ぶつかってしまいました……！　お嬢さん、お怪我はありませんでしたか？」"

[[dialogue]]
speaker = "アルモタヘル"
# 「全く、マグダレナ、お前というやつは、昼食の補給だからと浮かれてポヤポヤとしているからそうなるのだ。もぐもぐ……」
line = "「全く、マグダレナ、お前というやつは、昼食の補給だからと浮かれてポヤポヤとしているからそうなるのだ。もぐもぐ……」"

[[dialogue]]
speaker = "マグダレナ"
# 「席に着く前に焼肉定食を立ち食いし始めてるあなたに言われたくないのですが……！？」
line = "「席に着く前に焼肉定食を立ち食いし始めてるあなたに言われたくないのですが……！？」"

[[dialogue]]
speaker = "unk"
# やってきたのは、今やすっかり学園に馴染みつつある守護天使の２人――マグダレナさんと、アルモタヘルさんだった。
line = "やってきたのは、今やすっかり学園に馴染みつつある守護天使の２人――マグダレナさんと、アルモタヘルさんだった。"

[[dialogue]]
speaker = "マグダレナ"
# 「って、今はそれどころではなく……！」
line = "「って、今はそれどころではなく……！」"

[[dialogue]]
speaker = "アルモタヘル"
# 「大丈夫か、天使の子よ。マグダレナの無駄に大きい乳がクッションにはなったようだが――」
line = "「大丈夫か、天使の子よ。マグダレナの無駄に大きい乳がクッションにはなったようだが――」"

[[dialogue]]
speaker = "マグダレナ"
# 「無駄に大きいって……」
line = "「無駄に大きいって……」"

[[dialogue]]
speaker = "セシア"
# 「っ……！　今の感触は……」
line = "「っ……！　今の感触は……」"

[[dialogue]]
speaker = "セシア"
# （わたくしは、このおっぱいを知っているわ……！）
line = "（わたくしは、このおっぱいを知っているわ……！）"

[[dialogue]]
speaker = "セシア"
# （記憶を失っても、魂が覚えている……！）
line = "（記憶を失っても、魂が覚えている……！）"

[[dialogue]]
speaker = "セシア"
# 「<b>ママ</b>ダレナ……！」
line = "「<b>ママ</b>ダレナ……！」"

[[dialogue]]
speaker = "マグダレナ"
# 「えっ？　その呼び方は……？」
line = "「えっ？　その呼び方は……？」"

[[dialogue]]
speaker = "アルモタヘル"
# 「む……？　よく見ればお前、その体から出ているのは、星力ではなく『霊力』ではないか？」
line = "「む……？　よく見ればお前、その体から出ているのは、星力ではなく『霊力』ではないか？」"

[[dialogue]]
speaker = "マグダレナ"
# 「ええ。それに体は小さくなっていますが、あなたは――」
line = "「ええ。それに体は小さくなっていますが、あなたは――」"

[[dialogue]]
speaker = "アルモタヘル"
# 「まさか、アウク<b>セシア</b>か？」
line = "「まさか、アウク<b>セシア</b>か？」"

[[dialogue]]
speaker = "セシア"
# 「ああ……ママダレナ、アルモタヘル……わたくし、思い出したのだわ」
line = "「ああ……ママダレナ、アルモタヘル……わたくし、思い出したのだわ」"

[[dialogue]]
speaker = "unk"
# セシア、もしかして記憶が……？
line = "セシア、もしかして記憶が……？"

[[dialogue]]
speaker = "セシア"
# 「ええ。自分が何者なのか、思い出すことができた。わたくしは、ママダレナやアルモタヘルと同じ存在――」
line = "「ええ。自分が何者なのか、思い出すことができた。わたくしは、ママダレナやアルモタヘルと同じ存在――」"

[[dialogue]]
speaker = "セシア"
# 「『蓄積』を司る守護天使、《<ruby=ばんせい>万成</ruby>》のアウクセシア」
line = "「『蓄積』を司る守護天使、《<ruby>万成<rt>ばんせい</rt></ruby>》のアウクセシア」"

[[dialogue]]
speaker = "セシア"
# 「その転生体よ」
line = "「その転生体よ」"

[[dialogue]]
speaker = "unk"
# えええぇぇぇっ！？
line = "えええぇぇぇっ！？"

[[dialogue]]
speaker = "セシア"
# 「ふふっ、生まれ変わりの二代目だし、呼び方も気に入っているから、引き続きセシアって呼んで欲しいわ」
line = "「ふふっ、生まれ変わりの二代目だし、呼び方も気に入っているから、引き続きセシアって呼んで欲しいわ」"

[[dialogue]]
speaker = "セシア"
# 「そういうことで、改めてよろしくね、会長？」
line = "「そういうことで、改めてよろしくね、会長？」"

[[dialogue]]
speaker = "unk"
# そう言って、小さな守護天使は、どこか大人びた笑みを浮かべてみせるのだった――
line = "そう言って、小さな守護天使は、どこか大人びた笑みを浮かべてみせるのだった――"
