[[dialogue]]
speaker = "unk"
# 俺とマリオンさんがコラプサーの首領──百目騎レイラと対峙する。
line = "俺とマリオンさんがコラプサーの首領──百目騎レイラと対峙する。"

[[dialogue]]
speaker = "unk"
# しかしレイラはマリオンさんに視線を向けず、言い捨てるように告げる。
line = "しかしレイラはマリオンさんに視線を向けず、言い捨てるように告げる。"

[[dialogue]]
speaker = "レイラ"
# 「魔女の方、あなたは通っていただいてかまいません。あなたに用はありませんので」
line = "「魔女の方、あなたは通っていただいてかまいません。あなたに用はありませんので」"

[[dialogue]]
speaker = "マリオン"
# 「おや、そうでしたか。ではお言葉に甘えましょう。……会長様、私は先に参ります。人形たちを残しますから、うまく使ってください」
line = "「おや、そうでしたか。ではお言葉に甘えましょう。……会長様、私は先に参ります。人形たちを残しますから、うまく使ってください」"

[[dialogue]]
speaker = "unk"
# マリオンが優雅に一礼し、駆けていく。宣言通り、レイラに動きはない。
line = "マリオンが優雅に一礼し、駆けていく。宣言通り、レイラに動きはない。"

[[dialogue]]
speaker = "レイラ"
# 「魔王さん、先ほどの攻撃は警告です。魔王の力を十全に使えないあなたでは、私には敵いません。諦めてくださ……」
line = "「魔王さん、先ほどの攻撃は警告です。魔王の力を十全に使えないあなたでは、私には敵いません。諦めてくださ……」"

[[dialogue]]
speaker = "？？？"
# 「セルフフォメーション！！」
line = "「セルフフォメーション！！」"

[[dialogue]]
speaker = "レイラ"
# 「く──！？　あなたは行ったはずじゃ！？　しかもたくさん！？」
line = "「く──！？　あなたは行ったはずじゃ！？　しかもたくさん！？」"

[[dialogue]]
speaker = "unk"
# マリオンは通称『旅団の魔女』。自身の複製人形を何体も生み出し、物量で制圧する戦法を得意としている。秋葉原を包囲していた人形がこちらに合流してくれたようだ。
line = "マリオンは通称『旅団の魔女』。自身の複製人形を何体も生み出し、物量で制圧する戦法を得意としている。秋葉原を包囲していた人形がこちらに合流してくれたようだ。"

[[dialogue]]
speaker = "レイラ"
# 「同じ顔がいくつも……不気味な能力ですね。潰れなさい、エルゴフォースブラスター！」
line = "「同じ顔がいくつも……不気味な能力ですね。潰れなさい、エルゴフォースブラスター！」"

[[dialogue]]
speaker = "unk"
# レイラの手から放たれた黒い球体が、マリオンの人形数体を飲み込み、瞬時に消滅させた。
line = "レイラの手から放たれた黒い球体が、マリオンの人形数体を飲み込み、瞬時に消滅させた。"

[[dialogue]]
speaker = "unk"
# 単純な威力なら、今まで見てきた星術の中でも群を抜いている。
line = "単純な威力なら、今まで見てきた星術の中でも群を抜いている。"

[[dialogue]]
speaker = "レイラ"
# 「コラプサーはブラックホールと契約し、負の星力を得ています。けれど私はそれだけでなく、星術でブラックホールを生み出すことができます」
line = "「コラプサーはブラックホールと契約し、負の星力を得ています。けれど私はそれだけでなく、星術でブラックホールを生み出すことができます」"

[[dialogue]]
speaker = "レイラ"
# 「あなたの相手はブラックホールそのもの。それでも、戦いますか？」
line = "「あなたの相手はブラックホールそのもの。それでも、戦いますか？」"

[[dialogue]]
speaker = "unk"
# 戦う。コハルコさんを助けるために
line = "戦う。コハルコさんを助けるために"

[[dialogue]]
speaker = "レイラ"
# 「……分かりました。それでも私の目的を遂げます。魔王を倒し、世界を救い……私たちコラプサーは『英雄』になります」
line = "「……分かりました。それでも私の目的を遂げます。魔王を倒し、世界を救い……私たちコラプサーは『英雄』になります」"

[[dialogue]]
speaker = "レイラ"
# 「ブラックホール・ディバウアー！」
line = "「ブラックホール・ディバウアー！」"

[[dialogue]]
speaker = "unk"
# 次々にマリオンの人形たちが集まってくるが、ブラックホールに消されていく。
line = "次々にマリオンの人形たちが集まってくるが、ブラックホールに消されていく。"

[[dialogue]]
speaker = "unk"
# なら俺が──！
line = "なら俺が──！"

[[dialogue]]
speaker = "レイラ"
# 「無駄です！」
line = "「無駄です！」"

[[dialogue]]
speaker = "unk"
# 俺の攻撃はレイラには届かない。命中しているはずだが、やはりコラプサーの特性で打ち消されてしまう。
line = "俺の攻撃はレイラには届かない。命中しているはずだが、やはりコラプサーの特性で打ち消されてしまう。"

[[dialogue]]
speaker = "レイラ"
# 「あなたが攻撃する分には好都合です。私たちコラプサーは星力を吸収できますから」
line = "「あなたが攻撃する分には好都合です。私たちコラプサーは星力を吸収できますから」"

[[dialogue]]
speaker = "unk"
# それなら──
line = "それなら──"

[[dialogue]]
speaker = "unk"
# ユニゾン！
line = "ユニゾン！"

[[dialogue]]
speaker = "マリオン"
# 「会長様の力、受け取りました──セルフディヴィジョン！！」
line = "「会長様の力、受け取りました──セルフディヴィジョン！！」"

[[dialogue]]
speaker = "レイラ"
# 「きゃああああああっ！！」
line = "「きゃああああああっ！！」"

[[dialogue]]
speaker = "unk"
# 例え星力でも、魔力と重ねればコラプサーにも届くはず。俺の読み通り、レイラが大きく吹き飛ぶ。
line = "例え星力でも、魔力と重ねればコラプサーにも届くはず。俺の読み通り、レイラが大きく吹き飛ぶ。"

[[dialogue]]
speaker = "レイラ"
# 「……こんな手があるなんて。さすが歴戦の星騎士です。けれど、私も負けるわけにはいきません！」
line = "「……こんな手があるなんて。さすが歴戦の星騎士です。けれど、私も負けるわけにはいきません！」"

[[dialogue]]
speaker = "unk"
# レイラの手から、先ほどまでと同じように黒い球体が発生する。だが、それだけではない。
line = "レイラの手から、先ほどまでと同じように黒い球体が発生する。だが、それだけではない。"

[[dialogue]]
speaker = "レイラ"
# 「使いたくありませんでしたが……仕方ありません。これが私の切り札です。全てを無に帰す闇よ！」
line = "「使いたくありませんでしたが……仕方ありません。これが私の切り札です。全てを無に帰す闇よ！」"

[[dialogue]]
speaker = "unk"
# 黒い球体──ブラックホールが風船のように膨らんでいく。その大きさは今までの比ではない。
line = "黒い球体──ブラックホールが風船のように膨らんでいく。その大きさは今までの比ではない。"

[[dialogue]]
speaker = "レイラ"
# 「……もう一度聞きます。降伏する気はありませんか？　私には、魔王を降した事実があればいいのです。何もあなたの命を奪う必要はありません」
line = "「……もう一度聞きます。降伏する気はありませんか？　私には、魔王を降した事実があればいいのです。何もあなたの命を奪う必要はありません」"

[[dialogue]]
speaker = "unk"
# 君こそ、どうしてこんなことを？
line = "君こそ、どうしてこんなことを？"

[[dialogue]]
speaker = "unk"
# 英雄になりたい。それ自体は珍しくない願いだが、そのために他者を犠牲にするのは常軌を逸している。
line = "英雄になりたい。それ自体は珍しくない願いだが、そのために他者を犠牲にするのは常軌を逸している。"

[[dialogue]]
speaker = "unk"
# 彼女が進んでそんなことをする人間には見えない。現に、こうして降伏の選択肢を与え、命を奪うことを躊躇している。
line = "彼女が進んでそんなことをする人間には見えない。現に、こうして降伏の選択肢を与え、命を奪うことを躊躇している。"

[[dialogue]]
speaker = "レイラ"
# 「私にはこれしかないんです。運命に選ばれたあなたには分からないでしょう。……私だって欲しかった。百目騎の名に恥じない力が。世界を救う使命だって」
line = "「私にはこれしかないんです。運命に選ばれたあなたには分からないでしょう。……私だって欲しかった。百目騎の名に恥じない力が。世界を救う使命だって」"

[[dialogue]]
speaker = "レイラ"
# 「……お父様も、お母様ももういない。大好きだったふたりに、もう報いることはできない！　だから、せめて私は『英雄』になって、百目騎の名をこの世界に刻むんです！」
line = "「……お父様も、お母様ももういない。大好きだったふたりに、もう報いることはできない！　だから、せめて私は『英雄』になって、百目騎の名をこの世界に刻むんです！」"

[[dialogue]]
speaker = "unk"
# ──そうか。君は両親に褒めてほしかったんだ
line = "──そうか。君は両親に褒めてほしかったんだ"

[[dialogue]]
speaker = "レイラ"
# 「……え？」
line = "「……え？」"

[[dialogue]]
speaker = "レイラ"
# 「褒めて……欲しかった……？　そんな、子どもみたいな、こと……」
line = "「褒めて……欲しかった……？　そんな、子どもみたいな、こと……」"

[[dialogue]]
speaker = "レイラ父"
# 「すごいぞ、レイラ。もうこんなにプログラムが書けるようになったんだね」
line = "「すごいぞ、レイラ。もうこんなにプログラムが書けるようになったんだね」"

[[dialogue]]
speaker = "レイラ母"
# 「さすが百目騎の、私たちの娘だわ。これからも優しいあなたでいてね」
line = "「さすが百目騎の、私たちの娘だわ。これからも優しいあなたでいてね」"

[[dialogue]]
speaker = "レイラ"
# （お父様もお母様も、ほんの小さなことでもよく褒めてくれた。喜んでくれた）
line = "（お父様もお母様も、ほんの小さなことでもよく褒めてくれた。喜んでくれた）"

[[dialogue]]
speaker = "レイラ"
# （そうだ。私はふたりに笑って欲しかった）
line = "（そうだ。私はふたりに笑って欲しかった）"

[[dialogue]]
speaker = "レイラ"
# （それが叶わなかったから、両親が大切にしていた百目騎という家を、名前を、価値あるものにしようとしたんだ）
line = "（それが叶わなかったから、両親が大切にしていた百目騎という家を、名前を、価値あるものにしようとしたんだ）"

[[dialogue]]
speaker = "レイラ"
# （──今の私を、両親は褒めてくれるだろうか？）
line = "（──今の私を、両親は褒めてくれるだろうか？）"

[[dialogue]]
speaker = "レイラ"
# （世界をよりよくする。それがふたりの願い。でも、誰かを犠牲にしてよくなった世界なんて、お父様もお母様も認めない。認めたとしても、そんな両親を私は認めない）
line = "（世界をよりよくする。それがふたりの願い。でも、誰かを犠牲にしてよくなった世界なんて、お父様もお母様も認めない。認めたとしても、そんな両親を私は認めない）"

[[dialogue]]
speaker = "レイラ"
# 「……あ、ああああ、あああああっ！」
line = "「……あ、ああああ、あああああっ！」"

[[dialogue]]
speaker = "レイラ"
# 「私は……私は……道を間違えて……」
line = "「私は……私は……道を間違えて……」"

[[dialogue]]
speaker = "unk"
# レイラの嗚咽とともにブラックホールが小さくなり、やがて消えていく。
line = "レイラの嗚咽とともにブラックホールが小さくなり、やがて消えていく。"

[[dialogue]]
speaker = "レイラ"
# 「お父様、お母様……ごめんなさい」
line = "「お父様、お母様……ごめんなさい」"
