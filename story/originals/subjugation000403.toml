[[dialogue]]
speaker = "unk"
# お菓子の試食会から数日後。
line = "お菓子の試食会から数日後。"

[[dialogue]]
speaker = "unk"
# 俺達は再び集まって、計画の次の段階について話し合っていた。
line = "俺達は再び集まって、計画の次の段階について話し合っていた。"

[[dialogue]]
speaker = "セナリィ"
# 「販売するお菓子については決まりましたけれど、計画を実現する為にはまだ、通らなくてはならない関門がありますわ」
line = "「販売するお菓子については決まりましたけれど、計画を実現する為にはまだ、通らなくてはならない関門がありますわ」"

[[dialogue]]
speaker = "セナリィ"
# 「それは、『ハロウィン実行委員会』からお菓子の販売許可をもらうこと」
line = "「それは、『ハロウィン実行委員会』からお菓子の販売許可をもらうこと」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひ♪　これまた有名人の『ハロウィン<ruby=きょう>狂</ruby>』と交渉しなくちゃいけないってわけだね」
line = "「にひひ♪　これまた有名人の『ハロウィン<ruby>狂<rt>きょう</rt></ruby>』と交渉しなくちゃいけないってわけだね」"

[[dialogue]]
speaker = "unk"
# ハロウィン狂？
line = "ハロウィン狂？"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ハロウィンパーティーって毎年、新星と流星の両学園合同でやってるんだけど、それを運営するハロウィン実行委員会って組織があるのは、会長も知ってるよね？」
line = "「ハロウィンパーティーって毎年、新星と流星の両学園合同でやってるんだけど、それを運営するハロウィン実行委員会って組織があるのは、会長も知ってるよね？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「その委員会の現委員長が、大のハロウィン好きでさ。あまりの熱の入れようから、ハロウィン狂って呼ばれてるんだよ」
line = "「その委員会の現委員長が、大のハロウィン好きでさ。あまりの熱の入れようから、ハロウィン狂って呼ばれてるんだよ」"

[[dialogue]]
speaker = "サラン"
# 「あ！　サランもその人知ってるよ～♪」
line = "「あ！　サランもその人知ってるよ～♪」"

[[dialogue]]
speaker = "サラン"
# 「流星学園３年生で、眼鏡かけてて、面白い喋り方する先輩だよね～」
line = "「流星学園３年生で、眼鏡かけてて、面白い喋り方する先輩だよね～」"

[[dialogue]]
speaker = "セナリィ"
# 「委員長は、ハロウィンへのこだわりが飛び抜けて強いが故に、新しい企画提案に対しては、審査が厳しいと聞きますわ」
line = "「委員長は、ハロウィンへのこだわりが飛び抜けて強いが故に、新しい企画提案に対しては、審査が厳しいと聞きますわ」"

[[dialogue]]
speaker = "セナリィ"
# 「そこでマインには、彼女との交渉をお願いしたいんですの」
line = "「そこでマインには、彼女との交渉をお願いしたいんですの」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ですよね～。いや～、だけど、今のままだと厳しいと思うよ？」
line = "「ですよね～。いや～、だけど、今のままだと厳しいと思うよ？」"

[[dialogue]]
speaker = "サラン"
# 「お菓子試食してもらって～、美味しかったら、いいよ～って言ってくれないかなぁ？」
line = "「お菓子試食してもらって～、美味しかったら、いいよ～って言ってくれないかなぁ？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「お菓子の味で唸らせる作戦も含めて、勝率４割ってところですかね～。追加で何か、委員長を納得させられる手札がないと――」
line = "「お菓子の味で唸らせる作戦も含めて、勝率４割ってところですかね～。追加で何か、委員長を納得させられる手札がないと――」"

[[dialogue]]
speaker = "セナリィ"
# 「ふふふ、そこはもちろん、考えてありますわ♪」
line = "「ふふふ、そこはもちろん、考えてありますわ♪」"

[[dialogue]]
speaker = "unk"
# 翌日の放課後。
line = "翌日の放課後。"

[[dialogue]]
speaker = "unk"
# 大聖堂カフェテリアでは、ハロウィン実行委員会による、ハロウィンパーティーに向けての進捗確認の会議が行われていた。
line = "大聖堂カフェテリアでは、ハロウィン実行委員会による、ハロウィンパーティーに向けての進捗確認の会議が行われていた。"

[[dialogue]]
speaker = "unk"
# その場を取り仕切るのは、眼鏡をかけた流星学園３年の女子生徒――ハロウィン狂こと、実行委員長の『<ruby=うりひめ>瓜姫</ruby>キャナンシー』。
line = "その場を取り仕切るのは、眼鏡をかけた流星学園３年の女子生徒――ハロウィン狂こと、実行委員長の『<ruby>瓜姫<rt>うりひめ</rt></ruby>キャナンシー』。"

[[dialogue]]
speaker = "キャナンシー"
# 「みんなぁ～、ハロウィンパーティーの準備は楽しんでるかしらぁ～？　トリックオアトリートぉ～<emoji=heart04>」
line = "「みんなぁ～、ハロウィンパーティーの準備は楽しんでるかしらぁ～？　トリックオアトリートぉ～<emoji=heart04>」"

[[dialogue]]
speaker = "流星学園１年生"
# 「トリックオアトリート～♪」
line = "「トリックオアトリート～♪」"

[[dialogue]]
speaker = "新星学園２年生"
# 「トリックオアトリート～♪」
line = "「トリックオアトリート～♪」"

[[dialogue]]
speaker = "流星学園附属校３年生"
# 「トリックオアトリート～♪」
line = "「トリックオアトリート～♪」"

[[dialogue]]
speaker = "キャナンシー"
# 「きゃっふ～ん<emoji=heart04>　みんな、いいお返事ねぇ～<emoji=heart04>　それじゃあ、今日も楽しく、ハロウィンに向けての会議をしていくわよぉ～<emoji=heart04>」
line = "「きゃっふ～ん<emoji=heart04>　みんな、いいお返事ねぇ～<emoji=heart04>　それじゃあ、今日も楽しく、ハロウィンに向けての会議をしていくわよぉ～<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
# 「お忙しいところ、失礼致しますわ」
line = "「お忙しいところ、失礼致しますわ」"

[[dialogue]]
speaker = "キャナンシー"
# 「あらん？　どちら様かしらぁ？」
line = "「あらん？　どちら様かしらぁ？」"

[[dialogue]]
speaker = "セナリィ"
# 「お初にお目にかかりますわ、委員長様。<ruby=わたくし>私</ruby>、このようなものですの――」
line = "「お初にお目にかかりますわ、委員長様。<ruby>私<rt>わたくし</rt></ruby>、このようなものですの――」"

[[dialogue]]
speaker = "キャナンシー"
# 「名刺ぃ？　ふむふむ、秘密結社ゴールデングースの代表取締役……新星学園２年生のバンデッド・セナリィちゃん――」
line = "「名刺ぃ？　ふむふむ、秘密結社ゴールデングースの代表取締役……新星学園２年生のバンデッド・セナリィちゃん――」"

[[dialogue]]
speaker = "キャナンシー"
# 「あぁん、思い出したわぁ～ん<emoji=heart04>　傭兵の星騎士ちゃんよねぇ？　それで、私に何か用かしらぁ～？」
line = "「あぁん、思い出したわぁ～ん<emoji=heart04>　傭兵の星騎士ちゃんよねぇ？　それで、私に何か用かしらぁ～？」"

[[dialogue]]
speaker = "セナリィ"
# 「実はこの度、ハロウィンパーティーで、お菓子の販売をしたいと考えておりますの」
line = "「実はこの度、ハロウィンパーティーで、お菓子の販売をしたいと考えておりますの」"

[[dialogue]]
speaker = "セナリィ"
# 「つきましては、会場内での販売許可を頂きたいと思いまして」
line = "「つきましては、会場内での販売許可を頂きたいと思いまして」"

[[dialogue]]
speaker = "キャナンシー"
# 「……それ、私がハロウィン狂と呼ばれているのを知った上で、本気で言ってるのかしらぁ～？」
line = "「……それ、私がハロウィン狂と呼ばれているのを知った上で、本気で言ってるのかしらぁ～？」"

[[dialogue]]
speaker = "キャナンシー"
# 「お菓子を作ってくるのは別に自由よぉ～？　それを配ったり、交換するのも許可しているわぁ<emoji=heart04>　でも……あなた今、販売って言ったわよねぇ～？」
line = "「お菓子を作ってくるのは別に自由よぉ～？　それを配ったり、交換するのも許可しているわぁ<emoji=heart04>　でも……あなた今、販売って言ったわよねぇ～？」"

[[dialogue]]
speaker = "キャナンシー"
# 「その売って得たお金はどうする気なのかしらぁ～？　学園に寄付する？　それとも実行委員会の運営資金としてくれるのかしらぁ～？　違うわよねぇ～？」
line = "「その売って得たお金はどうする気なのかしらぁ～？　学園に寄付する？　それとも実行委員会の運営資金としてくれるのかしらぁ～？　違うわよねぇ～？」"

[[dialogue]]
speaker = "セナリィ"
# 「ふふっ……決まっていますわ。それは、もちろん――」
line = "「ふふっ……決まっていますわ。それは、もちろん――」"

[[dialogue]]
speaker = "セナリィ"
# 「全額、我が社の懐に入れさせて頂きますわ！　ボランティア団体ではありませんもの。<ruby=わたくし>私</ruby>、お金稼ぎが大好きなんですの♪」
line = "「全額、我が社の懐に入れさせて頂きますわ！　ボランティア団体ではありませんもの。<ruby>私<rt>わたくし</rt></ruby>、お金稼ぎが大好きなんですの♪」"

[[dialogue]]
speaker = "キャナンシー"
# 「きゃっふ～ん！　清々しいくらい言い切ったわねぇ～？　でもその自分の愛するものに対してのストレートな姿勢は、私も好きよぉ～？」
line = "「きゃっふ～ん！　清々しいくらい言い切ったわねぇ～？　でもその自分の愛するものに対してのストレートな姿勢は、私も好きよぉ～？」"

[[dialogue]]
speaker = "キャナンシー"
# 「私もハロウィンが大・大・だ～い好きだものぉ<emoji=heart04>　だからこそ――」
line = "「私もハロウィンが大・大・だ～い好きだものぉ<emoji=heart04>　だからこそ――」"

[[dialogue]]
speaker = "キャナンシー"
# 「答えはノーよぉ！　私が求めるハロウィンパーティーにお金稼ぎなんて不純な要素はいらないのぉ～<emoji=heart04>」
line = "「答えはノーよぉ！　私が求めるハロウィンパーティーにお金稼ぎなんて不純な要素はいらないのぉ～<emoji=heart04>」"

[[dialogue]]
speaker = "キャナンシー"
# 「ハロウィンに必要なのは、溢れる愛であってお金ではないのよぉ～。それがわからないあなたには、許可はあげられないわぁ～<emoji=heart04>」
line = "「ハロウィンに必要なのは、溢れる愛であってお金ではないのよぉ～。それがわからないあなたには、許可はあげられないわぁ～<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
# 「ふふふ、そう言うと思ってましたわ。ただ、委員長様、愛の形とは別に１つではありませんわよね？」
line = "「ふふふ、そう言うと思ってましたわ。ただ、委員長様、愛の形とは別に１つではありませんわよね？」"

[[dialogue]]
speaker = "キャナンシー"
# 「……どういう意味かしらぁ～？」
line = "「……どういう意味かしらぁ～？」"

[[dialogue]]
speaker = "セナリィ"
# 「<ruby=わたくし>私</ruby>、目に見えないものは信じない主義ですの。故に私は、その愛を目に見える形で証明致しますわ」
line = "「<ruby>私<rt>わたくし</rt></ruby>、目に見えないものは信じない主義ですの。故に私は、その愛を目に見える形で証明致しますわ」"

[[dialogue]]
speaker = "セナリィ"
# 「――マイン、サラン様。出番ですわよ！」
line = "「――マイン、サラン様。出番ですわよ！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「はいは～い♪」
line = "「はいは～い♪」"

[[dialogue]]
speaker = "サラン"
# 「トリックオアスイート～♪」
line = "「トリックオアスイート～♪」"

[[dialogue]]
speaker = "キャナンシー"
# 「きゃっふ～ん！？　こ、これはぁ～！？」
line = "「きゃっふ～ん！？　こ、これはぁ～！？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひ♪　いわゆる『形から入る』ってやつですよ」
line = "「にひひ♪　いわゆる『形から入る』ってやつですよ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「いくら口で言ったところで、委員長……本気のハロウィン愛を持つあなたからの信用は得られない」
line = "「いくら口で言ったところで、委員長……本気のハロウィン愛を持つあなたからの信用は得られない」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「だからこそ、私たちがハロウィンに対して本気だってことを具体的に示す必要がある。それがこの、ハロウィン衣装ってわけです」
line = "「だからこそ、私たちがハロウィンに対して本気だってことを具体的に示す必要がある。それがこの、ハロウィン衣装ってわけです」"

[[dialogue]]
speaker = "サラン"
# 「委員長さん、見て見て～♪　可愛いでしょ～？　サランはカボチャのお姫様、マインちゃんは赤ずきんちゃんの仮装なんだよ～♪」
line = "「委員長さん、見て見て～♪　可愛いでしょ～？　サランはカボチャのお姫様、マインちゃんは赤ずきんちゃんの仮装なんだよ～♪」"

[[dialogue]]
speaker = "キャナンシー"
# 「やぁぁぁ～ん<emoji=heart04>　確かに可愛いわぁぁぁ～んっ<emoji=heart04>　な、なんなの、このハイクオリティ～！？」
line = "「やぁぁぁ～ん<emoji=heart04>　確かに可愛いわぁぁぁ～んっ<emoji=heart04>　な、なんなの、このハイクオリティ～！？」"

[[dialogue]]
speaker = "キャナンシー"
# 「数多のハロウィン衣装を見て、自分でも仮装してきたからわかるわぁ～！　この衣装は素材から作り込みまで、なにもかも本気のそれよぉ～！？」
line = "「数多のハロウィン衣装を見て、自分でも仮装してきたからわかるわぁ～！　この衣装は素材から作り込みまで、なにもかも本気のそれよぉ～！？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「おわかり頂けてなによりです。これを作ってくれたのは、流星学園のＯＧ、マリオン・ネイマール様」
line = "「おわかり頂けてなによりです。これを作ってくれたのは、流星学園のＯＧ、マリオン・ネイマール様」"

[[dialogue]]
speaker = "キャナンシー"
# 「あぁ～んっ<emoji=heart04>！？　あの人形使いのマリオン様！？　そんなの、納得せざるを得ない愛らしさだわぁ～んっ！」
line = "「あぁ～んっ<emoji=heart04>！？　あの人形使いのマリオン様！？　そんなの、納得せざるを得ない愛らしさだわぁ～んっ！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「今回、我が社が全力でハロウィンに望む為に、学園最高の服職人に依頼して準備してきました」
line = "「今回、我が社が全力でハロウィンに望む為に、学園最高の服職人に依頼して準備してきました」"

[[dialogue]]
speaker = "キャナンシー"
# 「っ……だ、だとしても、それだけじゃ許可なんてあげられないわよぉ～？」
line = "「っ……だ、だとしても、それだけじゃ許可なんてあげられないわよぉ～？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ほう？　と言いますと？」
line = "「ほう？　と言いますと？」"

[[dialogue]]
speaker = "キャナンシー"
# 「確かにその仮装は愛に溢れていると認めるわぁ～ん。でもぉ、あなた達の手作りではないし、あくまで外面だけよねぇ～？　大事なのはぁ――」
line = "「確かにその仮装は愛に溢れていると認めるわぁ～ん。でもぉ、あなた達の手作りではないし、あくまで外面だけよねぇ～？　大事なのはぁ――」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「大事なのは、中身が伴っていること、ですか？　にひひ♪　なら、その中身も具体的に味わって頂きましょう♪」
line = "「大事なのは、中身が伴っていること、ですか？　にひひ♪　なら、その中身も具体的に味わって頂きましょう♪」"

[[dialogue]]
speaker = "サラン"
# 「じゃ～ん♪　どうぞ～♪　こちら、サランが作ったハロウィンカップケーキで～す♪」
line = "「じゃ～ん♪　どうぞ～♪　こちら、サランが作ったハロウィンカップケーキで～す♪」"

[[dialogue]]
speaker = "キャナンシー"
# 「サラン……？　はっ！？　ひょっとしてあなた、食の天才……隠れた名パティシエと言われる桜十路家の……！？」
line = "「サラン……？　はっ！？　ひょっとしてあなた、食の天才……隠れた名パティシエと言われる桜十路家の……！？」"

[[dialogue]]
speaker = "サラン"
# 「天才かどうかはサランにはわからないですけど～……食べてくれた人がふわふわな気持ちになってくれるように、全力で作りました～！」
line = "「天才かどうかはサランにはわからないですけど～……食べてくれた人がふわふわな気持ちになってくれるように、全力で作りました～！」"

[[dialogue]]
speaker = "キャナンシー"
# 「はあぁんっ<emoji=heart04>　こ、このカップケーキも、なんて愛らしさに溢れた見た目なのぉ～！？　み、認めたくないのに、胸がキュンキュンしちゃうわぁ～ん<emoji=heart04>」
line = "「はあぁんっ<emoji=heart04>　こ、このカップケーキも、なんて愛らしさに溢れた見た目なのぉ～！？　み、認めたくないのに、胸がキュンキュンしちゃうわぁ～ん<emoji=heart04>」"

[[dialogue]]
speaker = "サラン"
# 「えへへ、可愛いって思ってもらえたなら、嬉しいです～♪」
line = "「えへへ、可愛いって思ってもらえたなら、嬉しいです～♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「さぁさぁ、委員長、遠慮せずにパクッといっちゃってください。ほらほら、どうぞどうぞ♪」
line = "「さぁさぁ、委員長、遠慮せずにパクッといっちゃってください。ほらほら、どうぞどうぞ♪」"

[[dialogue]]
speaker = "キャナンシー"
# 「う……うぅ……お金稼ぎ目的で作られたお菓子に、私のハロウィン愛が負けるわけ……パクッ……もぐもぐ――」
line = "「う……うぅ……お金稼ぎ目的で作られたお菓子に、私のハロウィン愛が負けるわけ……パクッ……もぐもぐ――」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「<ruby=ボンッ>Ｂｏｍｂ</ruby><emoji=heart04>」
line = "「<ruby>Ｂｏｍｂ<rt>ボンッ</rt></ruby><emoji=heart04>」"

[[dialogue]]
speaker = "キャナンシー"
# 「きゃっっっふぅ～～～んっ<emoji=heart04><emoji=heart04><emoji=heart04>！！！」
