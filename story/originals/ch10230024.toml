[[dialogue]]
speaker = "unk"
# 第４話,シスターとクリスマスデート,P
line = "第４話,シスターとクリスマスデート,P"

[[dialogue]]
speaker = "シャロン"
# 「会長さま」
line = "「会長さま」"

[[dialogue]]
speaker = "シャロン"
# 「くすくす、そんなに驚かれなくとも。こんな時間にご足労いただいてありがとうございます」
line = "「くすくす、そんなに驚かれなくとも。こんな時間にご足労いただいてありがとうございます」"

[[dialogue]]
speaker = "シャロン"
# 「っと、あまり立ち話をしていると体が冷えてしまいますね。では早速、参りましょうか」
line = "「っと、あまり立ち話をしていると体が冷えてしまいますね。では早速、参りましょうか」"

[[dialogue]]
speaker = "シャロン"
# 「美味しいシェパードパイを出してくださるお店がこの近くにあるんです。ささ、どうぞ。こちらですよ」
line = "「美味しいシェパードパイを出してくださるお店がこの近くにあるんです。ささ、どうぞ。こちらですよ」"

[[dialogue]]
speaker = "シャロン"
# 「ふぅ、お腹いっぱいです。ふふ、少々食べ過ぎてしまったかもしれません」
line = "「ふぅ、お腹いっぱいです。ふふ、少々食べ過ぎてしまったかもしれません」"

[[dialogue]]
speaker = "シャロン"
# 「けれど、おかげで体も温まりました。これなら寒さを気にせず、街を歩き回ることもできそうですね」
line = "「けれど、おかげで体も温まりました。これなら寒さを気にせず、街を歩き回ることもできそうですね」"

[[dialogue]]
speaker = "シャロン"
# 「ついてきてくださいますか？　少し歩いたところにイルミネーションがとても綺麗な公園があるんです」
line = "「ついてきてくださいますか？　少し歩いたところにイルミネーションがとても綺麗な公園があるんです」"

[[dialogue]]
speaker = "シャロン"
# 「この前子ども会のプレゼントを買いに行った時に偶然見つけまして──……」
line = "「この前子ども会のプレゼントを買いに行った時に偶然見つけまして──……」"

[[dialogue]]
speaker = "シャロン"
# 「あ……すみません。１人ではしゃぎすぎていたでしょうか……？　何やら浮かない顔をされていますけど……」
line = "「あ……すみません。１人ではしゃぎすぎていたでしょうか……？　何やら浮かない顔をされていますけど……」"

[[dialogue]]
speaker = "シャロン"
# 「もしかして、その……あまり楽しくありませんでしたか？」
line = "「もしかして、その……あまり楽しくありませんでしたか？」"

[[dialogue]]
speaker = "unk"
# いや、俺に用事があるって聞いてたから……
line = "いや、俺に用事があるって聞いてたから……"

[[dialogue]]
speaker = "シャロン"
# 「はい……これがその用事ですよ……？」
line = "「はい……これがその用事ですよ……？」"

[[dialogue]]
speaker = "シャロン"
# 「せっかくのクリスマスですから……。会長さまに日々の感謝を込めて……その。お出かけでも、と思いまして……」
line = "「せっかくのクリスマスですから……。会長さまに日々の感謝を込めて……その。お出かけでも、と思いまして……」"

[[dialogue]]
speaker = "unk"
# つまり……デート？
line = "つまり……デート？"

[[dialogue]]
speaker = "シャロン"
# 「そ、そうですね。シスターがあまり口にしてよい言葉ではないのですが。そう受け取っていただけると嬉しいです……」
line = "「そ、そうですね。シスターがあまり口にしてよい言葉ではないのですが。そう受け取っていただけると嬉しいです……」"

[[dialogue]]
speaker = "シャロン"
# 「ご迷惑、だったでしょうか？　私などが会長さまをデートにお誘いするなんて……」
line = "「ご迷惑、だったでしょうか？　私などが会長さまをデートにお誘いするなんて……」"

[[dialogue]]
speaker = "unk"
# すごく嬉しいよ
line = "すごく嬉しいよ"

[[dialogue]]
speaker = "シャロン"
# 「ほ、本当ですか？　えへへ、私こそ、すごく嬉しいです……」
line = "「ほ、本当ですか？　えへへ、私こそ、すごく嬉しいです……」"

[[dialogue]]
speaker = "シャロン"
# 「なら、えと……。お、お手など繋いでしまってもよろしいでしょうか……。クリスマスで人も多いですし、万が一はぐれてしまっては大変ですので」
line = "「なら、えと……。お、お手など繋いでしまってもよろしいでしょうか……。クリスマスで人も多いですし、万が一はぐれてしまっては大変ですので」"

[[dialogue]]
speaker = "シャロン"
# 「い、いえ。ただ単に会長さまとお手を繋いで歩きたい、というのが本心ですけれど……」
line = "「い、いえ。ただ単に会長さまとお手を繋いで歩きたい、というのが本心ですけれど……」"

[[dialogue]]
speaker = "シャロン"
# 「あ……え、えへへ。繋いでしまいました……」
line = "「あ……え、えへへ。繋いでしまいました……」"

[[dialogue]]
speaker = "シャロン"
# 「いざ繋いでみると、すごく恥ずかしいものですね……？　今にも顔から火が出てしまいそうです……」
line = "「いざ繋いでみると、すごく恥ずかしいものですね……？　今にも顔から火が出てしまいそうです……」"

[[dialogue]]
speaker = "シャロン"
# 「でも、会長さまの手……とても大きくて、とても温かくて、こうして繋がせていただけるだけでもすごく安心して……」
line = "「でも、会長さまの手……とても大きくて、とても温かくて、こうして繋がせていただけるだけでもすごく安心して……」"

[[dialogue]]
speaker = "シャロン"
# 「シェパードパイで体を温める必要はなかったかもしれませんね。会長さまと手を繋いでいるだけで、えへへ、体の芯からポカポカしてしまいますもの」
line = "「シェパードパイで体を温める必要はなかったかもしれませんね。会長さまと手を繋いでいるだけで、えへへ、体の芯からポカポカしてしまいますもの」"

[[dialogue]]
speaker = "シャロン"
# 「で、では行きましょう！　イルミネーションの場所へ案内いたしますね……！」
line = "「で、では行きましょう！　イルミネーションの場所へ案内いたしますね……！」"

[[dialogue]]
speaker = "シャロン"
# 「他にもその、会長さまに喜んでいただけるようなイベントをたくさん考えてみましたから……！」
line = "「他にもその、会長さまに喜んでいただけるようなイベントをたくさん考えてみましたから……！」"

[[dialogue]]
speaker = "シャロン"
# 「どうかついてきてくださいますか？　精一杯、会長さまを楽しませてみせますので……！」
line = "「どうかついてきてくださいますか？　精一杯、会長さまを楽しませてみせますので……！」"

[[dialogue]]
speaker = "シャロン"
# 「イルミネーション、綺麗でしたね。まるで星の海を歩いているかのように、どこもかしこもキラキラと光り輝いていて。とても幻想的でした」
line = "「イルミネーション、綺麗でしたね。まるで星の海を歩いているかのように、どこもかしこもキラキラと光り輝いていて。とても幻想的でした」"

[[dialogue]]
speaker = "シャロン"
# 「公園でクリスマスマーケットが開かれていたのも嬉しい誤算でした。私、チョコレートドリンクなんて初めて飲みましたよ」
line = "「公園でクリスマスマーケットが開かれていたのも嬉しい誤算でした。私、チョコレートドリンクなんて初めて飲みましたよ」"

[[dialogue]]
speaker = "シャロン"
# 「あれは子どもたちもお好きかもしれませんね。今度のクリスマス会で用意してみてもいいかも──」
line = "「あれは子どもたちもお好きかもしれませんね。今度のクリスマス会で用意してみてもいいかも──」"

[[dialogue]]
speaker = "シャロン"
# 「あっ。す、すみません。デート中に他のことを考えてしまって」
line = "「あっ。す、すみません。デート中に他のことを考えてしまって」"

[[dialogue]]
speaker = "シャロン"
# 「え？　私らしくていい、ですか？　ふふっ、ありがとうございます。会長さまに楽しんでいただくつもりが私の方がエスコートされてしまっていますね」
line = "「え？　私らしくていい、ですか？　ふふっ、ありがとうございます。会長さまに楽しんでいただくつもりが私の方がエスコートされてしまっていますね」"

[[dialogue]]
speaker = "シャロン"
# 「ですが、あなたのそういった優しさが私は……」
line = "「ですが、あなたのそういった優しさが私は……」"

[[dialogue]]
speaker = "シャロン"
# 「その、会長さま。実はお渡ししたいものがあるのですが、受け取っていただけますでしょうか……」
line = "「その、会長さま。実はお渡ししたいものがあるのですが、受け取っていただけますでしょうか……」"

[[dialogue]]
speaker = "unk"
# これは……手編みのマフラー？
line = "これは……手編みのマフラー？"

[[dialogue]]
speaker = "シャロン"
# 「は、はい。イレーナさまに教わりながら編んでみたんです。会長さまへのクリスマスプレゼントに、と」
line = "「は、はい。イレーナさまに教わりながら編んでみたんです。会長さまへのクリスマスプレゼントに、と」"

[[dialogue]]
speaker = "シャロン"
# 「いかがでしょうか……。少し長めに作りすぎてしまったかもしれませんが……」
line = "「いかがでしょうか……。少し長めに作りすぎてしまったかもしれませんが……」"

[[dialogue]]
speaker = "unk"
# ありがとう、大切にするよ
line = "ありがとう、大切にするよ"

[[dialogue]]
speaker = "シャロン"
# 「え、えへへ。改まって感謝されるとちょっぴり気恥ずかしいですね」
line = "「え、えへへ。改まって感謝されるとちょっぴり気恥ずかしいですね」"

[[dialogue]]
speaker = "シャロン"
# 「そ、それでは次の場所に参りましょうっ。ええと、今度は近くの教会に──くしゅんっ」
line = "「そ、それでは次の場所に参りましょうっ。ええと、今度は近くの教会に──くしゅんっ」"

[[dialogue]]
speaker = "シャロン"
# 「あうぅ、風が出てきましたね……。もう少し厚着してくるべきでした……」
line = "「あうぅ、風が出てきましたね……。もう少し厚着してくるべきでした……」"

[[dialogue]]
speaker = "シャロン"
# 「あ──私にもマフラーを巻いていただいて……ありがとうございます。早速マフラーを使っていただけるなんて……」
line = "「あ──私にもマフラーを巻いていただいて……ありがとうございます。早速マフラーを使っていただけるなんて……」"

[[dialogue]]
speaker = "シャロン"
# 「でも、こういった使い方は、その……想定していませんでした……。ひとつのマフラーを一緒に巻いて使うなんて、流石に照れてしまいます……」
line = "「でも、こういった使い方は、その……想定していませんでした……。ひとつのマフラーを一緒に巻いて使うなんて、流石に照れてしまいます……」"

[[dialogue]]
speaker = "シャロン"
# 「だけど……とても温かいです。会長さまのぬくもりも、手を繋ぐ以上に伝わってきて……」
line = "「だけど……とても温かいです。会長さまのぬくもりも、手を繋ぐ以上に伝わってきて……」"

[[dialogue]]
speaker = "シャロン"
# 「えへへ。少し予定を変えてもいいですか？　もう少しだけこのまま会長さまと歩いていたいんです」
line = "「えへへ。少し予定を変えてもいいですか？　もう少しだけこのまま会長さまと歩いていたいんです」"

[[dialogue]]
speaker = "シャロン"
# 「この幸せなぬくもりを感じながら……。今だけはただのシャロンとして、あなたと過ごしていたい……」
line = "「この幸せなぬくもりを感じながら……。今だけはただのシャロンとして、あなたと過ごしていたい……」"

[[dialogue]]
speaker = "シャロン"
# 「あ……そういえば、私としたことが大切なことを伝え忘れておりました」
line = "「あ……そういえば、私としたことが大切なことを伝え忘れておりました」"

[[dialogue]]
speaker = "シャロン"
# 「メリークリスマスです、会長さま──」
line = "「メリークリスマスです、会長さま──」"
