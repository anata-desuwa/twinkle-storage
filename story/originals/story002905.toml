[[dialogue]]
speaker = "unk"
# 星霊祭前日。学園内のボルテージは最高潮に達しようとしていた。
line = "星霊祭前日。学園内のボルテージは最高潮に達しようとしていた。"

[[dialogue]]
speaker = "unk"
# その中でも、ひときわ熱くなっているのが──
line = "その中でも、ひときわ熱くなっているのが──"

[[dialogue]]
speaker = "unk"
# フラン率いる応援団だ。
line = "フラン率いる応援団だ。"

[[dialogue]]
speaker = "フラン"
# 「ついに明日から星霊祭だ！　みんな、気合入ってるなー！！？」
line = "「ついに明日から星霊祭だ！　みんな、気合入ってるなー！！？」"

[[dialogue]]
speaker = "応援団員"
# 「おーーーーっ！！！」
line = "「おーーーーっ！！！」"

[[dialogue]]
speaker = "フラン"
# 「星霊祭前日にもかかわらず、我が応援団に頼もしい仲間が加わってくれたぜ！」
line = "「星霊祭前日にもかかわらず、我が応援団に頼もしい仲間が加わってくれたぜ！」"

[[dialogue]]
speaker = "ミルフィー"
# 「ミルフィー・インセントです……よ、よろしくお願いしまーす……」
line = "「ミルフィー・インセントです……よ、よろしくお願いしまーす……」"

[[dialogue]]
speaker = "unk"
# よろしくお願いします！
line = "よろしくお願いします！"

[[dialogue]]
speaker = "unk"
# ミルフィーは新調したチア衣装、俺は黒の学ランで応援団に加わる。
line = "ミルフィーは新調したチア衣装、俺は黒の学ランで応援団に加わる。"

[[dialogue]]
speaker = "応援団員"
# 「おーーーーっ！！！」
line = "「おーーーーっ！！！」"

[[dialogue]]
speaker = "ミルフィー"
# 「大歓迎ムードなのは嬉しいんだけど……」
line = "「大歓迎ムードなのは嬉しいんだけど……」"

[[dialogue]]
speaker = "ミルフィー"
# 「昨日、決めたばかりなのに、なんでもう私用のチアガール衣装が用意されてるのー！？」
line = "「昨日、決めたばかりなのに、なんでもう私用のチアガール衣装が用意されてるのー！？」"

[[dialogue]]
speaker = "美鶴"
# 「２人の衣装はうちが一晩で用意しました。いえーい」
line = "「２人の衣装はうちが一晩で用意しました。いえーい」"

[[dialogue]]
speaker = "unk"
# シゴデキがすぎる
line = "シゴデキがすぎる"

[[dialogue]]
speaker = "ミルフィー"
# 「美鶴ちゃんっ！？　私の衣装、他のチアのみんなよりも、その、なんていうか……セ、セクシーじゃない！？」
line = "「美鶴ちゃんっ！？　私の衣装、他のチアのみんなよりも、その、なんていうか……セ、セクシーじゃない！？」"

[[dialogue]]
speaker = "美鶴"
# 「いやいや、ミルフィーパイセンの肉感は押し出していかないと」
line = "「いやいや、ミルフィーパイセンの肉感は押し出していかないと」"

[[dialogue]]
speaker = "ミルフィー"
# 「肉感って言わないで～っ！」
line = "「肉感って言わないで～っ！」"

[[dialogue]]
speaker = "美鶴"
# 「これでも初期デザインから露出は減らしたんだけどね」
line = "「これでも初期デザインから露出は減らしたんだけどね」"

[[dialogue]]
speaker = "ミルフィー"
# 「初期デザインを見るのが怖いよ！？」
line = "「初期デザインを見るのが怖いよ！？」"

[[dialogue]]
speaker = "unk"
# どんなデザインだったか気になる……
line = "どんなデザインだったか気になる……"

[[dialogue]]
speaker = "unk"
# 俺とミルフィーは応援団に加わり、先に加入していた美鶴とともに応援指導を受ける。
line = "俺とミルフィーは応援団に加わり、先に加入していた美鶴とともに応援指導を受ける。"

[[dialogue]]
speaker = "フラン"
# 「腕はもっと大きく振るんだーっ！　競技中の選手に遠くからでも見えるようにアピールするんだぞー！」
line = "「腕はもっと大きく振るんだーっ！　競技中の選手に遠くからでも見えるようにアピールするんだぞー！」"

[[dialogue]]
speaker = "美鶴"
# 「がんばれがんばれ、し・ん・せ・い」
line = "「がんばれがんばれ、し・ん・せ・い」"

[[dialogue]]
speaker = "ミルフィー"
# 「負けるな負けるな、し・ん・せ・い<emoji=heart04>」
line = "「負けるな負けるな、し・ん・せ・い<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# レッツゴーレッツゴー、し・ん・せ・い！
line = "レッツゴーレッツゴー、し・ん・せ・い！"

[[dialogue]]
speaker = "フラン"
# 「さすが、３人とも筋がいいぜ！　星霊祭の期間だけじゃなく、正式に入団してほしいくらいだ！」
line = "「さすが、３人とも筋がいいぜ！　星霊祭の期間だけじゃなく、正式に入団してほしいくらいだ！」"

[[dialogue]]
speaker = "ミルフィー"
# 「そ、それはちょっと……学級委員だから、やることいろいろあるし、会長くんも、ねえ？」
line = "「そ、それはちょっと……学級委員だから、やることいろいろあるし、会長くんも、ねえ？」"

[[dialogue]]
speaker = "unk"
# 会長職があるからね
line = "会長職があるからね"

[[dialogue]]
speaker = "美鶴"
# 「うちも既にお断りした通りね」
line = "「うちも既にお断りした通りね」"

[[dialogue]]
speaker = "フラン"
# 「そっか。いやぁ、ほんとに残念だ」
line = "「そっか。いやぁ、ほんとに残念だ」"

[[dialogue]]
speaker = "フラン"
# 「さてと、そろそろ練習ばかりじゃなくて、実際に応援の声を届けてみようぜ！　ミルフィー！　会長！　チア・オーラを高めておけよ！」
line = "「さてと、そろそろ練習ばかりじゃなくて、実際に応援の声を届けてみようぜ！　ミルフィー！　会長！　チア・オーラを高めておけよ！」"

[[dialogue]]
speaker = "ミルフィー"
# 「チア・オーラって何！？　初耳だよ！？」
line = "「チア・オーラって何！？　初耳だよ！？」"

[[dialogue]]
speaker = "美鶴"
# 「気にしないでいいよ。なんとなくで」
line = "「気にしないでいいよ。なんとなくで」"

[[dialogue]]
speaker = "カティア"
# 「あいたたたた……転ぶのも今日で６回目だワン……どうして上手くコントロールできないんだろう……」
line = "「あいたたたた……転ぶのも今日で６回目だワン……どうして上手くコントロールできないんだろう……」"

[[dialogue]]
speaker = "ヒヨ"
# 「たまにゃ曲がれるようになって、なんぼかマシになってきたけどよぉ……本番は一発勝負。一度でも派手に転んじまったら、おしめえだ」
line = "「たまにゃ曲がれるようになって、なんぼかマシになってきたけどよぉ……本番は一発勝負。一度でも派手に転んじまったら、おしめえだ」"

[[dialogue]]
speaker = "カティア"
# 「うぅぅ……今からプレッシャーかけないで──あれ？　誰かこっちに来る……？」
line = "「うぅぅ……今からプレッシャーかけないで──あれ？　誰かこっちに来る……？」"

[[dialogue]]
speaker = "ヒヨ"
# 「なんでえ、あの団体さんは……応援団か？」
line = "「なんでえ、あの団体さんは……応援団か？」"

[[dialogue]]
speaker = "ミルフィー"
# 「ヒヨちゃーん、カティアちゃーん！」
line = "「ヒヨちゃーん、カティアちゃーん！」"

[[dialogue]]
speaker = "ヒヨ"
# 「あの破廉恥な服を着てるのは──姐さんじゃねえかっ！　いけねえ、いけねえよ……！　あんなに可愛かったら野郎どもが勘違いしちまう……！」
line = "「あの破廉恥な服を着てるのは──姐さんじゃねえかっ！　いけねえ、いけねえよ……！　あんなに可愛かったら野郎どもが勘違いしちまう……！」"

[[dialogue]]
speaker = "unk"
# カティア、練習は捗ってる？
line = "カティア、練習は捗ってる？"

[[dialogue]]
speaker = "カティア"
# 「魔王様ーっ！　わざわざ来てくださって、どうしたんですか？」
line = "「魔王様ーっ！　わざわざ来てくださって、どうしたんですか？」"

[[dialogue]]
speaker = "美鶴"
# 「頑張ってる選手を、応援してあげよーと思ってさ。ま、うちはオマケね」
line = "「頑張ってる選手を、応援してあげよーと思ってさ。ま、うちはオマケね」"

[[dialogue]]
speaker = "フラン"
# 「本番前の必勝祈願だ！　いくぞ、おまえらーっ！」
line = "「本番前の必勝祈願だ！　いくぞ、おまえらーっ！」"

[[dialogue]]
speaker = "美鶴"
# 「おおおーーーっ」
line = "「おおおーーーっ」"

[[dialogue]]
speaker = "ミルフィー"
# 「おおおーーーっ！！」
line = "「おおおーーーっ！！」"

[[dialogue]]
speaker = "フラン"
# 「新星学園のぉおぉぉぉーーーっ！　勝利を願ってぇえぇぇぇぇぇーーーっ！！」
line = "「新星学園のぉおぉぉぉーーーっ！　勝利を願ってぇえぇぇぇぇぇーーーっ！！」"

[[dialogue]]
speaker = "unk"
# フレーッ、フレーッ！　カ・ティ・ア！
line = "フレーッ、フレーッ！　カ・ティ・ア！"

[[dialogue]]
speaker = "カティア"
# 「……魔王様ぁ！」
line = "「……魔王様ぁ！」"

[[dialogue]]
speaker = "ミルフィー"
# 「フレーッ、フレーッ、ヒ・ヨ・ちゃ・ん！」
line = "「フレーッ、フレーッ、ヒ・ヨ・ちゃ・ん！」"

[[dialogue]]
speaker = "ヒヨ"
# 「姐さんっ……！」
line = "「姐さんっ……！」"

[[dialogue]]
speaker = "美鶴"
# 「フレッフレッ、新星っ。フレッフレッ、新星っ！」
line = "「フレッフレッ、新星っ。フレッフレッ、新星っ！」"

[[dialogue]]
speaker = "フラン"
# 「絶対勝利だぁああぁぁぁぁーーーーっ！！！」
line = "「絶対勝利だぁああぁぁぁぁーーーーっ！！！」"

[[dialogue]]
speaker = "ミルフィー"
# 「ふうっ、ふうっ……！　どう、私たちの応援、伝わった？」
line = "「ふうっ、ふうっ……！　どう、私たちの応援、伝わった？」"

[[dialogue]]
speaker = "カティア"
# 「あ、あ、あじがどうごじゃいまずぅううっ！」
line = "「あ、あ、あじがどうごじゃいまずぅううっ！」"

[[dialogue]]
speaker = "美鶴"
# 「うわ、汗と涙でべちゃべちゃ」
line = "「うわ、汗と涙でべちゃべちゃ」"

[[dialogue]]
speaker = "カティア"
# 「私っ、私っ……すごく感動しぢゃっでぇーっ！　嬉しいですっ！　本当に！　もう絶対頑張らなきゃってぇ！」
line = "「私っ、私っ……すごく感動しぢゃっでぇーっ！　嬉しいですっ！　本当に！　もう絶対頑張らなきゃってぇ！」"

[[dialogue]]
speaker = "ヒヨ"
# 「へへっ、胸の奥がカーッと熱くなって、力が湧いてきたぜぇ。今のあたしは百人力よぉ！」
line = "「へへっ、胸の奥がカーッと熱くなって、力が湧いてきたぜぇ。今のあたしは百人力よぉ！」"

[[dialogue]]
speaker = "フラン"
# 「オレらの想い、伝わったみたいだな！」
line = "「オレらの想い、伝わったみたいだな！」"

[[dialogue]]
speaker = "カティア"
# 「はいっ！　ちょっと転んだくらいで、めげてらんないです！　ヒヨ、もうひとっ走りするガオ！」
line = "「はいっ！　ちょっと転んだくらいで、めげてらんないです！　ヒヨ、もうひとっ走りするガオ！」"

[[dialogue]]
speaker = "ヒヨ"
# 「ひとっ走りと言わず、いくらでも付き合ってやんぜ、ワン公！」
line = "「ひとっ走りと言わず、いくらでも付き合ってやんぜ、ワン公！」"

[[dialogue]]
speaker = "カティア"
# 「皆さん、本当にありがとうございます！　行っくぞガオガオガオガオー！！」
line = "「皆さん、本当にありがとうございます！　行っくぞガオガオガオガオー！！」"

[[dialogue]]
speaker = "ヒヨ"
# 「だからってあんま張り切りすぎんじゃねぇや！　すぐ調子に乗るんだからよぉ！」
line = "「だからってあんま張り切りすぎんじゃねぇや！　すぐ調子に乗るんだからよぉ！」"

[[dialogue]]
speaker = "美鶴"
# 「２人ともちょっと思いつめた顔してたけど、元気になったね。よきよき」
line = "「２人ともちょっと思いつめた顔してたけど、元気になったね。よきよき」"

[[dialogue]]
speaker = "ミルフィー"
# 「良かった……ありがとう、フランさん」
line = "「良かった……ありがとう、フランさん」"

[[dialogue]]
speaker = "フラン"
# 「なんでオレに礼を言うんだよ。２人を元気づけたのは、オレじゃなくって会長とミルフィーだ」
line = "「なんでオレに礼を言うんだよ。２人を元気づけたのは、オレじゃなくって会長とミルフィーだ」"

[[dialogue]]
speaker = "フラン"
# 「２人の声が、やる気を奮い起こしたんだ。加入初日にして、もう立派な応援団だな！」
line = "「２人の声が、やる気を奮い起こしたんだ。加入初日にして、もう立派な応援団だな！」"

[[dialogue]]
speaker = "ミルフィー"
# 「んもぉ……フランさん、上手いなぁ……」
line = "「んもぉ……フランさん、上手いなぁ……」"

[[dialogue]]
speaker = "ミルフィー"
# 「でも私の声援で、みんなが元気になってくれるのって……ちょっと気持ちいい、かも……<emoji=heart04>」
line = "「でも私の声援で、みんなが元気になってくれるのって……ちょっと気持ちいい、かも……<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
# 「練習はキツくて大変だけど、クセになっちゃうのも、わかる気がするな……」
line = "「練習はキツくて大変だけど、クセになっちゃうのも、わかる気がするな……」"

[[dialogue]]
speaker = "美鶴"
# 「ちょい悔しいけど、同感」
line = "「ちょい悔しいけど、同感」"

[[dialogue]]
speaker = "unk"
# ──この後。
line = "──この後。"

[[dialogue]]
speaker = "ヒヨ"
# 「マ、マジか……やったじゃねぇか、ワン公！」
line = "「マ、マジか……やったじゃねぇか、ワン公！」"

[[dialogue]]
speaker = "カティア"
# 「やった……やったーっ！　スピードの向こう側が見えたワン！」
line = "「やった……やったーっ！　スピードの向こう側が見えたワン！」"

[[dialogue]]
speaker = "unk"
# カティアは一度も転ぶことなく、見事、過去最速タイムを叩き出したのだった。
line = "カティアは一度も転ぶことなく、見事、過去最速タイムを叩き出したのだった。"

[[dialogue]]
speaker = "unk"
# ついに明日は星霊祭が開幕する。
line = "ついに明日は星霊祭が開幕する。"

[[dialogue]]
speaker = "unk"
# 土壇場で仕上がった学園対抗リレー選抜チーム。
line = "土壇場で仕上がった学園対抗リレー選抜チーム。"

[[dialogue]]
speaker = "unk"
# 俺たちは一丸となり、新星学園の勝利を願う……！
line = "俺たちは一丸となり、新星学園の勝利を願う……！"
