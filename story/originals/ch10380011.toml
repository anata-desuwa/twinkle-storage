[[dialogue]]
speaker = "unk"
# 第１話,保健委員の妄想天使,P
line = "第１話,保健委員の妄想天使,P"

[[dialogue]]
speaker = "モネ"
# 「あ、会長、来てくれたんですね！　モンスターに囲まれたビルの中に、人が取り残されているらしいんです」
line = "「あ、会長、来てくれたんですね！　モンスターに囲まれたビルの中に、人が取り残されているらしいんです」"

[[dialogue]]
speaker = "モネ"
# 「ビル内にもモンスターが侵入していて、早く助けに行かないと危険な状態だそうで……」
line = "「ビル内にもモンスターが侵入していて、早く助けに行かないと危険な状態だそうで……」"

[[dialogue]]
speaker = "環"
# 「よりによって、居合わせたのがボクとモネでさ。プリマステラじゃないから手の出しようがないんだよ」
line = "「よりによって、居合わせたのがボクとモネでさ。プリマステラじゃないから手の出しようがないんだよ」"

[[dialogue]]
speaker = "unk"
# 俺が突入する
line = "俺が突入する"

[[dialogue]]
speaker = "モネ"
# 「会長１人で！？　あのモンスターの数はいくら会長でも無茶なんじゃ……」
line = "「会長１人で！？　あのモンスターの数はいくら会長でも無茶なんじゃ……」"

[[dialogue]]
speaker = "モネ"
# 「……それなら私もお供します。私でも少しは役に立ちますから！」
line = "「……それなら私もお供します。私でも少しは役に立ちますから！」"

[[dialogue]]
speaker = "モンスター"
# 「イーーーーッ！」
line = "「イーーーーッ！」"

[[dialogue]]
speaker = "モネ"
# 「きゃっ！？」
line = "「きゃっ！？」"

[[dialogue]]
speaker = "イクシリオン"
# 「せやっ！」
line = "「せやっ！」"

[[dialogue]]
speaker = "イクシリオン"
# 「遅くなってすみません。イクシリオン、ただいま到着しました」
line = "「遅くなってすみません。イクシリオン、ただいま到着しました」"

[[dialogue]]
speaker = "環"
# 「イクシー！」
line = "「イクシー！」"

[[dialogue]]
speaker = "イクシリオン"
# 「詳しいお話は後で。私が会長と突入します。おふたりは外でバックアップをお願いします」
line = "「詳しいお話は後で。私が会長と突入します。おふたりは外でバックアップをお願いします」"

[[dialogue]]
speaker = "モネ"
# 「わかりました！」
line = "「わかりました！」"

[[dialogue]]
speaker = "イクシリオン"
# 「では行きましょう！」
line = "「では行きましょう！」"

[[dialogue]]
speaker = "イクシリオン"
# 「あ、お疲れ様でした、会長。皆さん無事に救助できましたね」
line = "「あ、お疲れ様でした、会長。皆さん無事に救助できましたね」"

[[dialogue]]
speaker = "イクシリオン"
# 「改めまして、私は１年生のイクシリオン・グレゴール。保健委員所属のプリマステラです。イクシーとお呼びください」
line = "「改めまして、私は１年生のイクシリオン・グレゴール。保健委員所属のプリマステラです。イクシーとお呼びください」"

[[dialogue]]
speaker = "unk"
# ありがとう、さっきは助かった
line = "ありがとう、さっきは助かった"

[[dialogue]]
speaker = "イクシリオン"
# 「いいえ、命を守るのは我々星騎士の責務ですから」
line = "「いいえ、命を守るのは我々星騎士の責務ですから」"

[[dialogue]]
speaker = "イクシリオン"
# 「それに要救助者の確保は保健委員の仕事です。私はフロレンシアさんのように治癒の星術は得意でないので、戦闘面で貢献できるように努めています」
line = "「それに要救助者の確保は保健委員の仕事です。私はフロレンシアさんのように治癒の星術は得意でないので、戦闘面で貢献できるように努めています」"

[[dialogue]]
speaker = "イクシリオン"
# 「……おや。会長もお怪我をされていませんか？」
line = "「……おや。会長もお怪我をされていませんか？」"

[[dialogue]]
speaker = "イクシリオン"
# 「上着を脱いで見せていただいても……いえ、殿方とはいえ、肌を人前に晒すのはお恥ずかしいかもしれませんね。人のいない場所に移動しましょう」
line = "「上着を脱いで見せていただいても……いえ、殿方とはいえ、肌を人前に晒すのはお恥ずかしいかもしれませんね。人のいない場所に移動しましょう」"

[[dialogue]]
speaker = "イクシリオン"
# 「ハッ──！？」
line = "「ハッ──！？」"

[[dialogue]]
speaker = "unk"
# どうかした？
line = "どうかした？"

[[dialogue]]
speaker = "イクシリオン"
# 「人気のないところで服を脱いで──なんて、ハレンチな……！」
line = "「人気のないところで服を脱いで──なんて、ハレンチな……！」"

[[dialogue]]
speaker = "イクシリオン"
# 「密室で若い男女が２人きり、何も起こらないわけはなく……」
line = "「密室で若い男女が２人きり、何も起こらないわけはなく……」"

[[dialogue]]
speaker = "イクシリオン"
# 「怪我の治療を終えた後、『こっちも診てくれ。腫れて赤くなってるんだ』とズボンに手をかけて──」
line = "「怪我の治療を終えた後、『こっちも診てくれ。腫れて赤くなってるんだ』とズボンに手をかけて──」"

[[dialogue]]
speaker = "unk"
# 何の話？
line = "何の話？"

[[dialogue]]
speaker = "イクシリオン"
# 「ハッ！？　いけません、私としたことがお恥ずかしい……」
line = "「ハッ！？　いけません、私としたことがお恥ずかしい……」"

[[dialogue]]
speaker = "イクシリオン"
# 「失礼しました。あちらにフロレンシアさんが来られてますので、怪我はそちらで診ていただきましょうか」
line = "「失礼しました。あちらにフロレンシアさんが来られてますので、怪我はそちらで診ていただきましょうか」"

[[dialogue]]
speaker = "unk"
# 絶対痛くされるからやめとく……
line = "絶対痛くされるからやめとく……"

[[dialogue]]
speaker = "イクシリオン"
# 「そんなにですか？　私には優しくしてくださったような……」
line = "「そんなにですか？　私には優しくしてくださったような……」"

[[dialogue]]
speaker = "環"
# 「お腹減ったし、帰りに何か食べようよ。あっちのコンビニ、キャンペーンでソーセージとフライドチキン増量中だってよ」
line = "「お腹減ったし、帰りに何か食べようよ。あっちのコンビニ、キャンペーンでソーセージとフライドチキン増量中だってよ」"

[[dialogue]]
speaker = "モネ"
# 「あそこはスーパーホットチキンがおすすめですよ。辛さはそこまでじゃありませんけど」
line = "「あそこはスーパーホットチキンがおすすめですよ。辛さはそこまでじゃありませんけど」"

[[dialogue]]
speaker = "環"
# 「それ言う人の辛くないってめちゃくちゃ辛いよね。ボクも辛いのは好きだからいいけど」
line = "「それ言う人の辛くないってめちゃくちゃ辛いよね。ボクも辛いのは好きだからいいけど」"

[[dialogue]]
speaker = "イクシリオン"
# 「ありがとうございます、環さん。いいことをお聞きしました。戦うとお腹が空きますからね♪」
line = "「ありがとうございます、環さん。いいことをお聞きしました。戦うとお腹が空きますからね♪」"

[[dialogue]]
speaker = "イクシリオン"
# 「ソーセージ……増量中……大きなソーセージ……」
line = "「ソーセージ……増量中……大きなソーセージ……」"

[[dialogue]]
speaker = "イクシリオン"
# 「口に入りきらないくらい太くて、お汁たっぷりで……ごくり」
line = "「口に入りきらないくらい太くて、お汁たっぷりで……ごくり」"

[[dialogue]]
speaker = "イクシリオン"
# 「大きくて立派な……会長のソーセージ……」
line = "「大きくて立派な……会長のソーセージ……」"

[[dialogue]]
speaker = "unk"
# 俺のソーセージ？
line = "俺のソーセージ？"

[[dialogue]]
speaker = "イクシリオン"
# 「いえ、何でもありませんっ。お気になさらず」
line = "「いえ、何でもありませんっ。お気になさらず」"

[[dialogue]]
speaker = "環"
# 「あー……ま、ほどほどにね……」
line = "「あー……ま、ほどほどにね……」"

[[dialogue]]
speaker = "モネ"
# 「そうですね、食べすぎには気を付けます」
line = "「そうですね、食べすぎには気を付けます」"

[[dialogue]]
speaker = "イクシリオン"
# 「さっそくコンビニに参りましょう。善は急げです！」
line = "「さっそくコンビニに参りましょう。善は急げです！」"

[[dialogue]]
speaker = "イクシリオン"
# 「ほら、会長も。買い食いは学生生活の華ですからね♪」
line = "「ほら、会長も。買い食いは学生生活の華ですからね♪」"
