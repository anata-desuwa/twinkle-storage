[[dialogue]]
speaker = "unk"
# 第２話,酒酔いトワイライト・前編,P
line = "第２話,酒酔いトワイライト・前編,P"

[[dialogue]]
speaker = "unk"
# ある日の夜、トレーニングでランニングに出掛けていた俺は、途中でトワ先生と遭遇した。
line = "ある日の夜、トレーニングでランニングに出掛けていた俺は、途中でトワ先生と遭遇した。"

[[dialogue]]
speaker = "トワ先生"
# 「あっ、会長くんらぁ～。こら～！　こんな夜遅くに学生が出歩いていちゃいけないんだぞ～？」
line = "「あっ、会長くんらぁ～。こら～！　こんな夜遅くに学生が出歩いていちゃいけないんだぞ～？」"

[[dialogue]]
speaker = "トワ先生"
# 「先生怒っちゃうんだからぁ。ぷんぷん！」
line = "「先生怒っちゃうんだからぁ。ぷんぷん！」"

[[dialogue]]
speaker = "unk"
# 先生、ひょっとして酔ってます？
line = "先生、ひょっとして酔ってます？"

[[dialogue]]
speaker = "トワ先生"
# 「ん～？　そうそう。今日、同級生の結婚式でね～。３次会まで行ったんだけど、先生ちょ～っと飲み過ぎちゃって」
line = "「ん～？　そうそう。今日、同級生の結婚式でね～。３次会まで行ったんだけど、先生ちょ～っと飲み過ぎちゃって」"

[[dialogue]]
speaker = "トワ先生"
# 「あー、大丈夫大丈夫、しばらく放っておけば治るから。へーきへーき♪」
line = "「あー、大丈夫大丈夫、しばらく放っておけば治るから。へーきへーき♪」"

[[dialogue]]
speaker = "トワ先生"
# 「先生、アルコールに強い特異体質だから」
line = "「先生、アルコールに強い特異体質だから」"

[[dialogue]]
speaker = "トワ先生"
# 「別に気持ち悪くもないし、むしろ気分が良いくらい♪　だ～か～ら～、酔いが覚めるまで、会長くん遊んれぇ～♪」
line = "「別に気持ち悪くもないし、むしろ気分が良いくらい♪　だ～か～ら～、酔いが覚めるまで、会長くん遊んれぇ～♪」"

[[dialogue]]
speaker = "トワ先生"
# 「──な～んてね♪　って……え？　いいの？」
line = "「──な～んてね♪　って……え？　いいの？」"

[[dialogue]]
speaker = "トワ先生"
# 「へ、へぇ～……って、おーっとっとっと！？」
line = "「へ、へぇ～……って、おーっとっとっと！？」"

[[dialogue]]
speaker = "トワ先生"
# 「いったぁ～い。先生転んじゃったぁ……」
line = "「いったぁ～い。先生転んじゃったぁ……」"

[[dialogue]]
speaker = "トワ先生"
# 「あっ、うん。ちょっと尻もちついちゃったらけだから、ケガとかは大丈夫だよ～」
line = "「あっ、うん。ちょっと尻もちついちゃったらけだから、ケガとかは大丈夫だよ～」"

[[dialogue]]
speaker = "トワ先生"
# （会長くん、優しいな～♪　こんな酔っ払いの相手までしてくれるなんてぇ～……会長くんならぁ、ちょっとだらしないところ見せちゃってもぉ、大丈夫かも？　なんちゃって♪）
line = "（会長くん、優しいな～♪　こんな酔っ払いの相手までしてくれるなんてぇ～……会長くんならぁ、ちょっとだらしないところ見せちゃってもぉ、大丈夫かも？　なんちゃって♪）"

[[dialogue]]
speaker = "トワ先生"
# 「あ～ん、でも先生ちょっと、足元ふらふらして歩くのは難しいかもぉ～」
line = "「あ～ん、でも先生ちょっと、足元ふらふらして歩くのは難しいかもぉ～」"

[[dialogue]]
speaker = "unk"
# そうだ。俺の家、この近所なんで──
line = "そうだ。俺の家、この近所なんで──"

[[dialogue]]
speaker = "トワ先生"
# 「ふぇ！？　酔いが覚めるまで休ませてくれるの？」
line = "「ふぇ！？　酔いが覚めるまで休ませてくれるの？」"

[[dialogue]]
speaker = "トワ先生"
# 「それはさすがに……い、いや、やっぱりお言葉に甘えちゃおうかな♪」
line = "「それはさすがに……い、いや、やっぱりお言葉に甘えちゃおうかな♪」"

[[dialogue]]
speaker = "トワ先生"
# （だったら……これはどうだ！）
line = "（だったら……これはどうだ！）"

[[dialogue]]
speaker = "トワ先生"
# 「……んっ！」
line = "「……んっ！」"

[[dialogue]]
speaker = "トワ先生"
# 「ん～？　この両手を広げたポーズは何らってぇ？」
line = "「ん～？　この両手を広げたポーズは何らってぇ？」"

[[dialogue]]
speaker = "トワ先生"
# 「こ・れ・はぁ～、お姫様抱っこして、家まで運んで欲しいってこと♪　ん～っ♪」
line = "「こ・れ・はぁ～、お姫様抱っこして、家まで運んで欲しいってこと♪　ん～っ♪」"

[[dialogue]]
speaker = "トワ先生"
# 「おやおや～？　どうしたのかな、緋宮くん」
line = "「おやおや～？　どうしたのかな、緋宮くん」"

[[dialogue]]
speaker = "トワ先生"
# 「あはは、冗談冗談！　さすがに自分で歩くよ～って、ひゃん！？」
line = "「あはは、冗談冗談！　さすがに自分で歩くよ～って、ひゃん！？」"

[[dialogue]]
speaker = "トワ先生"
# 「あんっ、キミの体、鍛えられてて凄く逞し……って、そうじゃなくて！　ええぇぇぇっ！？」
line = "「あんっ、キミの体、鍛えられてて凄く逞し……って、そうじゃなくて！　ええぇぇぇっ！？」"

[[dialogue]]
speaker = "トワ先生"
# 「なになに、何で持ち上げてるの！？　まさか本当にお姫様抱っこで運んでくれるの！？」
line = "「なになに、何で持ち上げてるの！？　まさか本当にお姫様抱っこで運んでくれるの！？」"

[[dialogue]]
speaker = "トワ先生"
# 「か、顔赤いのは酔ってるせいらから！　生徒相手なのに、照れたりなんかするわけないし！」
line = "「か、顔赤いのは酔ってるせいらから！　生徒相手なのに、照れたりなんかするわけないし！」"

[[dialogue]]
speaker = "トワ先生"
# 「いやいやいや、汗臭いとか全然気にしないでいいから！　トレーニング中らったんでしょ！？」
line = "「いやいやいや、汗臭いとか全然気にしないでいいから！　トレーニング中らったんでしょ！？」"

[[dialogue]]
speaker = "トワ先生"
# （ていうか、むしろ男の子のフェロモンって感じで、なんかくらくらする……！）
line = "（ていうか、むしろ男の子のフェロモンって感じで、なんかくらくらする……！）"

[[dialogue]]
speaker = "トワ先生"
# （何なのキミ、女性にいくら何でも甘過ぎじゃない！？　こ、こうなったら……！）
line = "（何なのキミ、女性にいくら何でも甘過ぎじゃない！？　こ、こうなったら……！）"

[[dialogue]]
speaker = "トワ先生"
# 「お、お姫様抱っこも良いけどぉ、実は先生、もっとして欲しい抱っこの仕方があって～」
line = "「お、お姫様抱っこも良いけどぉ、実は先生、もっとして欲しい抱っこの仕方があって～」"

[[dialogue]]
speaker = "トワ先生"
# 「そ、それはぁ～、先生がして欲しいのはねぇ……赤ちゃん抱っこ♪」
line = "「そ、それはぁ～、先生がして欲しいのはねぇ……赤ちゃん抱っこ♪」"

[[dialogue]]
speaker = "unk"
# えぇっ！？
line = "えぇっ！？"

[[dialogue]]
speaker = "トワ先生"
# （そうそう、そうやって動揺してくれないと。あとは今度こそ冗談だよ～♪　と流して、地面に降ろして貰えば……って、あれ？　嘘うそウソ、まさかまさかまさか！？）
line = "（そうそう、そうやって動揺してくれないと。あとは今度こそ冗談だよ～♪　と流して、地面に降ろして貰えば……って、あれ？　嘘うそウソ、まさかまさかまさか！？）"

[[dialogue]]
speaker = "トワ先生"
# 「ほ、本当にしてくれ……ひゃあっ！？」
line = "「ほ、本当にしてくれ……ひゃあっ！？」"

[[dialogue]]
speaker = "トワ先生"
# （あ゛ああああ、あああああ──！？）
line = "（あ゛ああああ、あああああ──！？）"

[[dialogue]]
speaker = "トワ先生"
# 「あ、赤ちゃん抱っこ、凄く密着するぅ……な、何でもない！　何にも言ってないから！」
line = "「あ、赤ちゃん抱っこ、凄く密着するぅ……な、何でもない！　何にも言ってないから！」"

[[dialogue]]
speaker = "トワ先生"
# （ごめんなさい！　処女どころか、この年まで彼氏居たことないアラサー女子が調子に乗ってすみませんでしたぁぁぁっ！）
line = "（ごめんなさい！　処女どころか、この年まで彼氏居たことないアラサー女子が調子に乗ってすみませんでしたぁぁぁっ！）"

[[dialogue]]
speaker = "トワ先生"
# （ひぃぃ、さっきよりも顔が近いぃぃぃ！　それと男の子フェロモンに全身包まれてる感じがぁぁぁ！？）
line = "（ひぃぃ、さっきよりも顔が近いぃぃぃ！　それと男の子フェロモンに全身包まれてる感じがぁぁぁ！？）"

[[dialogue]]
speaker = "トワ先生"
# （あと体温！　体温なにこれ！？　めっちゃ温かくて気持ち良いんですけどぉ！？　何も考えられなくなる……！）
line = "（あと体温！　体温なにこれ！？　めっちゃ温かくて気持ち良いんですけどぉ！？　何も考えられなくなる……！）"

[[dialogue]]
speaker = "トワ先生"
# （し、心臓の音の伝わり方も凄い……！　これ絶対わたしがドキドキしてるのバレちゃうよぉ……で、でも、それと同じくらい──）
line = "（し、心臓の音の伝わり方も凄い……！　これ絶対わたしがドキドキしてるのバレちゃうよぉ……で、でも、それと同じくらい──）"

[[dialogue]]
speaker = "トワ先生"
# 「……もしかして、キミもドキドキしてたり、する？」
line = "「……もしかして、キミもドキドキしてたり、する？」"

[[dialogue]]
speaker = "トワ先生"
# 「そ、そうなんだ。……えへへ♪」
line = "「そ、そうなんだ。……えへへ♪」"

[[dialogue]]
speaker = "トワ先生"
# （それってつまり……わたしのこと、ちゃんと女の子って意識してくれてるってこと、だよね♪）
line = "（それってつまり……わたしのこと、ちゃんと女の子って意識してくれてるってこと、だよね♪）"

[[dialogue]]
speaker = "トワ先生"
# 「……会長くんの、えっち♥」
line = "「……会長くんの、えっち♥」"

[[dialogue]]
speaker = "unk"
# い、いいからさっさと酔いを覚まして下さい！
line = "い、いいからさっさと酔いを覚まして下さい！"

[[dialogue]]
speaker = "トワ先生"
# 「は～い♪」
line = "「は～い♪」"

[[dialogue]]
speaker = "unk"
# 心臓が高鳴るのを誤魔化しながら、俺は自宅への道を急ぐのだった。
line = "心臓が高鳴るのを誤魔化しながら、俺は自宅への道を急ぐのだった。"
