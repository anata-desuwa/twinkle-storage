line = "（はあぁっ<emoji=heart04>　催眠にかかった会長、自分のことを本気で悪いプロデューサーだと思い込んで、ちっちゃい私をレイプしにきてるぅ<emoji=heart04>）"

[[dialogue]]
speaker = "レミカ"
# （会長以外に犯されちゃうのは絶対に嫌だけど……普段紳士的な会長が性欲のままに、小さい私の体を犯そうとしてるんだと思うと……はああぁっ<emoji=heart04>）
line = "（会長以外に犯されちゃうのは絶対に嫌だけど……普段紳士的な会長が性欲のままに、小さい私の体を犯そうとしてるんだと思うと……はああぁっ<emoji=heart04>）"

[[dialogue]]
speaker = "レミカ"
