[[dialogue]]
speaker = "unk"
# 放課後の星徒会室。その日、レミカは夜になってから、１人事務作業をしている会長のもとを訪ねていた。
line = "放課後の星徒会室。その日、レミカは夜になってから、１人事務作業をしている会長のもとを訪ねていた。"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「会長、お疲れ様」
line = "「会長、お疲れ様」"

[[dialogue]]
speaker = "クロト"
# 「あれ？　レミカ、お疲れ様。確か今日は、アイドルの仕事があるって言ってなかったっけ？」
line = "「あれ？　レミカ、お疲れ様。確か今日は、アイドルの仕事があるって言ってなかったっけ？」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「うん。でも、今日はたまたま早く終わったんだ」
line = "「うん。でも、今日はたまたま早く終わったんだ」"

[[dialogue]]
speaker = "クロト"
# 「というか、どうしてリトルフォームに？」
line = "「というか、どうしてリトルフォームに？」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「それには、ちょっと理由があって……ほら、最近お互い仕事が忙しくて、その……恋人としての時間がなかなか取れてなかったでしょ？」
line = "「それには、ちょっと理由があって……ほら、最近お互い仕事が忙しくて、その……恋人としての時間がなかなか取れてなかったでしょ？」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「だから……会長。先に謝っておくね。――ごめん！」
line = "「だから……会長。先に謝っておくね。――ごめん！」"

[[dialogue]]
speaker = "クロト"
# 「……へ？」
line = "「……へ？」"

[[dialogue]]
speaker = "unk"
# 不意を突かれて目を瞬かせる会長の前で、レミカが取り出してみせたのは、ヴィーナスがリトルフォーム時に使えるようになった武器――『ビーム銃』であった。
line = "不意を突かれて目を瞬かせる会長の前で、レミカが取り出してみせたのは、ヴィーナスがリトルフォーム時に使えるようになった武器――『ビーム銃』であった。"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「さ、催眠ゴッデスビーム！」
line = "「さ、催眠ゴッデスビーム！」"

[[dialogue]]
speaker = "クロト"
# 「催眠！？　ふにゃあ～……」
line = "「催眠！？　ふにゃあ～……」"

[[dialogue]]
speaker = "unk"
# なぜレミカがヴィーナスのビーム銃を持っているのか。そう考える間もなく、会長の意識は、糸が切れたようにふわりと落ちていくのだった。
line = "なぜレミカがヴィーナスのビーム銃を持っているのか。そう考える間もなく、会長の意識は、糸が切れたようにふわりと落ちていくのだった。"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「――ヴィーナスに相談したら貸してくれたけど……ほ、本当にこれで催眠にかかってるのかな？」
line = "「――ヴィーナスに相談したら貸してくれたけど……ほ、本当にこれで催眠にかかってるのかな？」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「えっと……会長。これから私が言うお願い、聞いてくれる？」
line = "「えっと……会長。これから私が言うお願い、聞いてくれる？」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「……あ、頷いてくれた」
line = "「……あ、頷いてくれた」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「そ、それじゃあ……ちょっと、耳を貸して？　ごにょごにょ――」
line = "「そ、それじゃあ……ちょっと、耳を貸して？　ごにょごにょ――」"

[[dialogue]]
speaker = "unk"
# レミカは少し頬を赤らめながら、会長の耳元へ顔を寄せ、ある『<b>ロールプレイ</b>』を、囁くように吹き込んでいく。
line = "レミカは少し頬を赤らめながら、会長の耳元へ顔を寄せ、ある『<b>ロールプレイ</b>』を、囁くように吹き込んでいく。"

[[dialogue]]
speaker = "unk"
# そして――
line = "そして――"

[[dialogue]]
speaker = "レミカ"
# 「――きゃっ！？　ダメだよ、プロデューサー！　どうしてこんなことを……！」
line = "「――きゃっ！？　ダメだよ、プロデューサー！　どうしてこんなことを……！」"

[[dialogue]]
speaker = "unk"
# 小さな姿のレミカは『新人アイドル』として、『担当プロデューサー』に『鍵のかけられた控え室』で襲われることになった。
line = "小さな姿のレミカは『新人アイドル』として、『担当プロデューサー』に『鍵のかけられた控え室』で襲われることになった。"

[[dialogue]]
speaker = "クロト"
# 「決まっているだろう？　プロデューサーとして、新人アイドルへの教育ってやつだ」
line = "「決まっているだろう？　プロデューサーとして、新人アイドルへの教育ってやつだ」"

[[dialogue]]
speaker = "unk"
# プロデューサーはニヤリと悪い笑みを浮かべて、レミカの太ももからお尻にかけて、いやらしい手つきで撫でていく。
line = "プロデューサーはニヤリと悪い笑みを浮かべて、レミカの太ももからお尻にかけて、いやらしい手つきで撫でていく。"

[[dialogue]]
speaker = "クロト"
# 「それに……こんな瑞々しい果実を目の前にしたら、味見したくなるというものだろう？」
line = "「それに……こんな瑞々しい果実を目の前にしたら、味見したくなるというものだろう？」"

[[dialogue]]
speaker = "レミカ"
# 「さ、最低……<emoji=heart04>　私、プロデューサーのこと、信じてたのに……<emoji=heart04>」
line = "「さ、最低……<emoji=heart04>　私、プロデューサーのこと、信じてたのに……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
# 「トップアイドルを目指すなら、こういう綺麗事だけじゃ済まないこともあるって、ちゃんと知っておかないとな」
line = "「トップアイドルを目指すなら、こういう綺麗事だけじゃ済まないこともあるって、ちゃんと知っておかないとな」"

[[dialogue]]
speaker = "レミカ"
# 「こ、これ以上は大声を出して人を呼ぶよ……！？」
line = "「こ、これ以上は大声を出して人を呼ぶよ……！？」"

[[dialogue]]
speaker = "クロト"
# 「構わないが、その場合は隠しカメラで録画しているこの映像が、後でネット上にバラまかれてしまうかもしれないぞ？」
line = "「構わないが、その場合は隠しカメラで録画しているこの映像が、後でネット上にバラまかれてしまうかもしれないぞ？」"

[[dialogue]]
speaker = "レミカ"
# 「ひ、卑怯者……<emoji=heart04>」
line = "「ひ、卑怯者……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
# 「大人しくしていれば、ちゃんと気持ちいい思いをさせてやるぞ？　こんな風に……」
line = "「大人しくしていれば、ちゃんと気持ちいい思いをさせてやるぞ？　こんな風に……」"

[[dialogue]]
speaker = "レミカ"
# 「あっ<emoji=heart04>　やっ……！<emoji=heart04>　おち○ちん、そんなところに擦り付けちゃダメぇっ<emoji=heart04>」
