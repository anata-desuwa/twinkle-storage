speaker = "unk"
# やがて、小さな子宮を満たしきってしまうような長い射精が終わり、膣内からペニスが引き抜かれる。
line = "やがて、小さな子宮を満たしきってしまうような長い射精が終わり、膣内からペニスが引き抜かれる。"

[[dialogue]]
speaker = "レミカ"
# 「あっ……<emoji=heart04>　んっ……ふうぅ……<emoji=heart04>」
line = "「あっ……<emoji=heart04>　んっ……ふうぅ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# レミカが甘い快楽の余韻に浸りながら息を整えていると、小さい膣穴に入りきらなかった白濁が溢れ出してくる。
line = "レミカが甘い快楽の余韻に浸りながら息を整えていると、小さい膣穴に入りきらなかった白濁が溢れ出してくる。"

[[dialogue]]
speaker = "レミカ"
# 「すごい……<emoji=heart04>　<b>会長</b>の精液、いつもよりいっぱい溢れてきてる……<emoji=heart04>」
line = "「すごい……<emoji=heart04>　<b>会長</b>の精液、いつもよりいっぱい溢れてきてる……<emoji=heart04>」"

[[dialogue]]
speaker = "レミカ"
# 「はあぁ……<emoji=heart04>　今日は私もすごく興奮しちゃって……。小さい体でのロールプレイ、ハマっちゃうかも……<emoji=heart04>」
line = "「はあぁ……<emoji=heart04>　今日は私もすごく興奮しちゃって……。小さい体でのロールプレイ、ハマっちゃうかも……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
# 「ん……あれ……？　レミカ……？　俺、何をして……」
line = "「ん……あれ……？　レミカ……？　俺、何をして……」"

[[dialogue]]
speaker = "unk"
# ふと、会長は寝起きのように目を瞬かせると、状況を確かめるように、ゆっくりと周囲へ視線を巡らせた。
line = "ふと、会長は寝起きのように目を瞬かせると、状況を確かめるように、ゆっくりと周囲へ視線を巡らせた。"

[[dialogue]]
speaker = "レミカ"
# 「あっ、会長。もしかして催眠、解けちゃった……？」
line = "「あっ、会長。もしかして催眠、解けちゃった……？」"

[[dialogue]]
speaker = "クロト"
# 「催眠……？　そうか、俺、悪いプロデューサーになりきって……小さいレミカとエッチして……」
line = "「催眠……？　そうか、俺、悪いプロデューサーになりきって……小さいレミカとエッチして……」"

[[dialogue]]
speaker = "unk"
# どうやら行為中の記憶は覚えているらしい。
line = "どうやら行為中の記憶は覚えているらしい。"

[[dialogue]]
speaker = "レミカ"
# 「その……ごめんね？　会長。このところ忙しくてなかなか会えなかったから……私、ムラムラしちゃって……」
line = "「その……ごめんね？　会長。このところ忙しくてなかなか会えなかったから……私、ムラムラしちゃって……」"

[[dialogue]]
speaker = "レミカ"
# 「でも、もし会長がイヤじゃなかったら――」
line = "「でも、もし会長がイヤじゃなかったら――」"

[[dialogue]]
speaker = "unk"
# レミカは再び自分の片足を上げて開いてみせながら、会長の目を見つめて言う。
line = "レミカは再び自分の片足を上げて開いてみせながら、会長の目を見つめて言う。"

[[dialogue]]
speaker = "レミカ"
# 「今日はこのままもう少し、悪いプロデューサーを続けて欲しいな<emoji=heart04>」
line = "「今日はこのままもう少し、悪いプロデューサーを続けて欲しいな<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "unk"
# すると、会長のペニスは、射精直後にも関わらず再び大きく反応してみせて。
line = "すると、会長のペニスは、射精直後にも関わらず再び大きく反応してみせて。"

[[dialogue]]
speaker = "レミカ"
# 「――あっ<emoji=heart04>　プロデューサー、ダメぇ<emoji=heart04>　これ以上されたら、本当に赤ちゃんできちゃうよぉ……<emoji=heart04>」
line = "「――あっ<emoji=heart04>　プロデューサー、ダメぇ<emoji=heart04>　これ以上されたら、本当に赤ちゃんできちゃうよぉ……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
# 「プロデューサーに催眠をかけるような悪いアイドルには、ちゃんとお仕置きをしとかないとな？」
line = "「プロデューサーに催眠をかけるような悪いアイドルには、ちゃんとお仕置きをしとかないとな？」"

[[dialogue]]
speaker = "レミカ"
# 「そんなぁ<emoji=heart04>　あっ……はあぁん……<emoji=heart04><emoji=heart04>」
line = "「そんなぁ<emoji=heart04>　あっ……はあぁん……<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そうして催眠が解けた後も、２人はロールプレイを続けたまま、エッチに興じ続けるのだった。
line = "そうして催眠が解けた後も、２人はロールプレイを続けたまま、エッチに興じ続けるのだった。"
