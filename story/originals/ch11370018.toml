line = "「これだけ濡れてれば、もう大丈夫そうだな――そろそろ、小さなアイドルの初物を味わわせてもらうぞ？」"

[[dialogue]]
speaker = "レミカ"
# 「あっ、ダメぇっ<emoji=heart04>　好きでもない人に、初めてを奪われちゃうなんてぇ……っ<emoji=heart04>」
