[[dialogue]]
speaker = "unk"
# セナリィと愉快な仲間たちの即席パーティーで挑んだ対戦の行方は――
line = "セナリィと愉快な仲間たちの即席パーティーで挑んだ対戦の行方は――"

[[dialogue]]
speaker = "シャドウリーリア"
# 「…………！」
line = "「…………！」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「倒しましたわ……！　けど――」
line = "「倒しましたわ……！　けど――」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「渋谷リーリア、クッソ強ぇですわ！？　なんなんですの、あの魔弾って！？」
line = "「渋谷リーリア、クッソ強ぇですわ！？　なんなんですの、あの魔弾って！？」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「１発でも直撃したらアウトな必殺威力を早撃ち連射できるのは、ハッキリ言ってチートですわ！？」
line = "「１発でも直撃したらアウトな必殺威力を早撃ち連射できるのは、ハッキリ言ってチートですわ！？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひ♪　セナリィ、余裕こいてたのに、終わってみればエンプレスフォーム、ボロボロだね～」
line = "「にひひ♪　セナリィ、余裕こいてたのに、終わってみればエンプレスフォーム、ボロボロだね～」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「体も明日絶対、筋肉痛確定ですわ！　うぅ……こんなはずでは……！」
line = "「体も明日絶対、筋肉痛確定ですわ！　うぅ……こんなはずでは……！」"

[[dialogue]]
speaker = "クーシェン"
# 「セナリィ！　すごいよ！！　めっちゃ強いじゃん！」
line = "「セナリィ！　すごいよ！！　めっちゃ強いじゃん！」"

[[dialogue]]
speaker = "クーシェン"
# 「なんかポンコツっぽい雰囲気出してたから、本当に強いのかな～って、正直ちょっと疑ってたんだけど――」
line = "「なんかポンコツっぽい雰囲気出してたから、本当に強いのかな～って、正直ちょっと疑ってたんだけど――」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「ポンコツ！？」
line = "「ポンコツ！？」"

[[dialogue]]
speaker = "クーシェン"
# 「ダメージ受け始めたら段々と闘争心剥き出しになって、動きがキレッキレになったのは、ボクすっごくウキウキしたよ！！」
line = "「ダメージ受け始めたら段々と闘争心剥き出しになって、動きがキレッキレになったのは、ボクすっごくウキウキしたよ！！」"

[[dialogue]]
speaker = "クーシェン"
# 「だから――この後はボクと勝負しよう！！！」
line = "「だから――この後はボクと勝負しよう！！！」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「しませんわよ！？　このボロボロな状態でやったら、筋肉痛通り越して死にますわ！」
line = "「しませんわよ！？　このボロボロな状態でやったら、筋肉痛通り越して死にますわ！」"

[[dialogue]]
speaker = "クーシェン"
# 「え～？　お互いボロボロな状態で戦うから面白いのに～」
line = "「え～？　お互いボロボロな状態で戦うから面白いのに～」"

[[dialogue]]
speaker = "ミネコ"
# 「バンデット・セナリィ……まさかあれ程とはね。これまで敵として鉢合わせなくて、運がよかったよ～」
line = "「バンデット・セナリィ……まさかあれ程とはね。これまで敵として鉢合わせなくて、運がよかったよ～」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「そうでしょ～？　セナリィはああ見えて、受けた依頼は完遂する女だからね」
line = "「そうでしょ～？　セナリィはああ見えて、受けた依頼は完遂する女だからね」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「仕事であれば、大怪盗であろうとも撃ち抜くから、気を付けたほうがいいよ？」
line = "「仕事であれば、大怪盗であろうとも撃ち抜くから、気を付けたほうがいいよ？」"

[[dialogue]]
speaker = "ミネコ"
# 「あはは♪　覚えておくよ。それに、キミもどうやら、なかなかの曲者みたいだからね。お近づきの印に、マインって呼んでも？」
line = "「あはは♪　覚えておくよ。それに、キミもどうやら、なかなかの曲者みたいだからね。お近づきの印に、マインって呼んでも？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「オッケ～♪　私もミネコって呼ぶね。というか、公安委員会で仕事してみる気はない？」
line = "「オッケ～♪　私もミネコって呼ぶね。というか、公安委員会で仕事してみる気はない？」"

[[dialogue]]
speaker = "ミネコ"
# 「ふふふ、遠慮しておくよ。私は趣味に生きたい人間なんでね」
line = "「ふふふ、遠慮しておくよ。私は趣味に生きたい人間なんでね」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「フラれちゃったか～。でもまぁ、交渉の余地はありそうな気はしてるけどね～。にひひ♪」
line = "「フラれちゃったか～。でもまぁ、交渉の余地はありそうな気はしてるけどね～。にひひ♪」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「というか、戦いよりも私、気になったことがありますのよ！　ジュエリー様！！」
line = "「というか、戦いよりも私、気になったことがありますのよ！　ジュエリー様！！」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「おや、私かい？」
line = "「おや、私かい？」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「戦闘中、瞬時に相手の思考を推理し、術の発動を無効化する手際、お見事でしたわ！　それで私、思いましたの！」
line = "「戦闘中、瞬時に相手の思考を推理し、術の発動を無効化する手際、お見事でしたわ！　それで私、思いましたの！」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「それってもしや――カジノのポーカーにも活かせるんじゃありませんの？」
line = "「それってもしや――カジノのポーカーにも活かせるんじゃありませんの？」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「ふむ……カジノで試したことはないけれど、そういったゲームは確かに得意だね。まさかとは思うけど……そういうことかい？」
line = "「ふむ……カジノで試したことはないけれど、そういったゲームは確かに得意だね。まさかとは思うけど……そういうことかい？」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「ええ！　その能力、ゴールデングースでお金に換えてみる気はありませんこと！？　是非！」
line = "「ええ！　その能力、ゴールデングースでお金に換えてみる気はありませんこと！？　是非！」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「う～ん、あいにく、私はあまりお金に対する興味は持ち合わせていなくてね」
line = "「う～ん、あいにく、私はあまりお金に対する興味は持ち合わせていなくてね」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「私は『謎』を見つけて、それを解くことが好きなんだ」
line = "「私は『謎』を見つけて、それを解くことが好きなんだ」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「でしたら是非、解いて欲しい大きな謎がありますわ！」
line = "「でしたら是非、解いて欲しい大きな謎がありますわ！」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「私が『一体どうやったらお金持ちになることができるのか』。それをズバリ、解き明かして頂きたいですわ！」
line = "「私が『一体どうやったらお金持ちになることができるのか』。それをズバリ、解き明かして頂きたいですわ！」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「ふっ……ふふっ♪　すごいね、セナリィさん。その発想は思いつかなかったよ」
line = "「ふっ……ふふっ♪　すごいね、セナリィさん。その発想は思いつかなかったよ」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「あはは♪　さすがセナっち！　面白いこと考えるな～」
line = "「あはは♪　さすがセナっち！　面白いこと考えるな～」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「紅明さん、キミの言っていた通りだったね」
line = "「紅明さん、キミの言っていた通りだったね」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「確かに、ここに集まったのは『癖のある面白いヒトたち』ばかりだよ。キミも含めてね」
line = "「確かに、ここに集まったのは『癖のある面白いヒトたち』ばかりだよ。キミも含めてね」"

[[dialogue]]
speaker = "unk"
# 
line = ""

[[dialogue]]
speaker = "紅明（羅刹）"
# 「うしし、サンキュー、ジュエりん♪　そいつはタレントとして、最高に嬉しい褒め言葉だぜ☆」
line = "「うしし、サンキュー、ジュエりん♪　そいつはタレントとして、最高に嬉しい褒め言葉だぜ☆」"

[[dialogue]]
speaker = "unk"
# こうして、紅明の引き合わせによって、また新たな交友関係が生まれたのだった――
line = "こうして、紅明の引き合わせによって、また新たな交友関係が生まれたのだった――"
