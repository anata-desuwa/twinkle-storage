[[dialogue]]
speaker = "unk"
# 第１話,マインと人工ノヴァフォーム,P
line = "第１話,マインと人工ノヴァフォーム,P"

[[dialogue]]
speaker = "unk"
# マインが『人工ノヴァフォーム』を手に入れてから、少し経ったある日のこと。
line = "マインが『人工ノヴァフォーム』を手に入れてから、少し経ったある日のこと。"

[[dialogue]]
speaker = "unk"
# 公安委員会の仕事でバディを組んでいるセナリィも呼び、俺たちは仮想結界内で戦闘訓練を行っていた。
line = "公安委員会の仕事でバディを組んでいるセナリィも呼び、俺たちは仮想結界内で戦闘訓練を行っていた。"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「それじゃあ、行くよ～♪　『シェアハートボンバー』――発射♪」
line = "「それじゃあ、行くよ～♪　『シェアハートボンバー』――発射♪」"

[[dialogue]]
speaker = "unk"
# マインの新たな武器であるバズーカから、能力で生み出された使い魔『爆弾ちゃん』が勢いよく射出される。
line = "マインの新たな武器であるバズーカから、能力で生み出された使い魔『爆弾ちゃん』が勢いよく射出される。"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「その小型戦車のような爆弾……決戦の時にも使ってましたわね」
line = "「その小型戦車のような爆弾……決戦の時にも使ってましたわね」"

[[dialogue]]
speaker = "モンスター"
# 「ギギ！」
line = "「ギギ！」"

[[dialogue]]
speaker = "unk"
# 飛来する爆弾ちゃんに対し、モンスターがビーム攻撃を放つ
line = "飛来する爆弾ちゃんに対し、モンスターがビーム攻撃を放つ"

[[dialogue]]
speaker = "unk"
# 直撃して、爆弾ちゃんは破壊された――かのように見えたが。
line = "直撃して、爆弾ちゃんは破壊された――かのように見えたが。"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「にひひ♪　その爆弾ちゃんは、簡単には止まらないよ～？」
line = "「にひひ♪　その爆弾ちゃんは、簡単には止まらないよ～？」"

[[dialogue]]
speaker = "モンスター"
# 「ギッ……！？」
line = "「ギッ……！？」"

[[dialogue]]
speaker = "unk"
# ほとんど無傷のまま、爆弾ちゃんは再びモンスターに接近を開始する。
line = "ほとんど無傷のまま、爆弾ちゃんは再びモンスターに接近を開始する。"

[[dialogue]]
speaker = "unk"
# その後も、何度も爆弾ちゃんはビームをくらいまくるが、決して破壊されることなく――
line = "その後も、何度も爆弾ちゃんはビームをくらいまくるが、決して破壊されることなく――"

[[dialogue]]
speaker = "爆弾ちゃん"
# 『にひひっ♪　こっちを見て～♪』
line = "『にひひっ♪　こっちを見て～♪』"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「――<ruby=ボンッ>Ｂｏｍｂ</ruby>♪」
line = "「――<ruby>Ｂｏｍｂ<rt>ボンッ</rt></ruby>♪」"

[[dialogue]]
speaker = "モンスター"
# 「ギーーッ！？」
line = "「ギーーッ！？」"

[[dialogue]]
speaker = "unk"
# モンスターの至近距離まで来ると、クレーターができる程の大爆発を起こして、モンスターを跡形もなく吹き飛ばしてみせた。
line = "モンスターの至近距離まで来ると、クレーターができる程の大爆発を起こして、モンスターを跡形もなく吹き飛ばしてみせた。"

[[dialogue]]
speaker = "爆弾ちゃん"
# 『ターゲット、撃破完了～♪』
line = "『ターゲット、撃破完了～♪』"

[[dialogue]]
speaker = "unk"
# だが――爆発したはずの爆弾ちゃんは、何事もなかったかのようにその場に健在であった。
line = "だが――爆発したはずの爆弾ちゃんは、何事もなかったかのようにその場に健在であった。"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「うん、耐久性も火力も、いい感じだね♪」
line = "「うん、耐久性も火力も、いい感じだね♪」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「あ、あれだけ攻撃を受けてもビクともしないどころか……爆発しても継続して戦闘可能なんて、えげつねぇ爆弾ですわ……！」
line = "「あ、あれだけ攻撃を受けてもビクともしないどころか……爆発しても継続して戦闘可能なんて、えげつねぇ爆弾ですわ……！」"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「まあ高性能な分、現状１体しか出せないっていう欠点はあるけどね～」
line = "「まあ高性能な分、現状１体しか出せないっていう欠点はあるけどね～」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「いや、十分過ぎますわ！　こんな爆弾が複数出せたら、むしろ怖すぎますわよ！」
line = "「いや、十分過ぎますわ！　こんな爆弾が複数出せたら、むしろ怖すぎますわよ！」"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「それにしても、人工戦闘服とはいえ、まさか私がノヴァフォームになれるとはね～」
line = "「それにしても、人工戦闘服とはいえ、まさか私がノヴァフォームになれるとはね～」"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「星騎士の才能が足りないって諦めてたけど……これも、セナリィがエンプレスフォームでデータを集めてくれたおかげかな？」
line = "「星騎士の才能が足りないって諦めてたけど……これも、セナリィがエンプレスフォームでデータを集めてくれたおかげかな？」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「役に立ったなら、筋肉痛になり続けた甲斐がありますわ」
line = "「役に立ったなら、筋肉痛になり続けた甲斐がありますわ」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「マイン、ずっと他の方のノヴァフォームを見て、羨ましがってましたものね？　ふふっ♪」
line = "「マイン、ずっと他の方のノヴァフォームを見て、羨ましがってましたものね？　ふふっ♪」"

[[dialogue]]
speaker = "unk"
# え？　そうだったの？
line = "え？　そうだったの？"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「ちょっ……セナリィ、なに言ってんの！」
line = "「ちょっ……セナリィ、なに言ってんの！」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「マインはポーカーフェイスが得意ですけれど――会長様の前だと、わかりやすいですわよ？」
line = "「マインはポーカーフェイスが得意ですけれど――会長様の前だと、わかりやすいですわよ？」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「会長様が他の女性と仲良く話していると、しっかり目で追ってますし……嫉妬の気配が漏れてますもの♪」
line = "「会長様が他の女性と仲良く話していると、しっかり目で追ってますし……嫉妬の気配が漏れてますもの♪」"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「セナリィ～？」
line = "「セナリィ～？」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「おっと、危ないですわ」
line = "「おっと、危ないですわ」"

[[dialogue]]
speaker = "unk"
# マインが笑顔を浮かべながら、セナリィの影から爆弾ちゃんを出現させるが、ひょいっと回避される。
line = "マインが笑顔を浮かべながら、セナリィの影から爆弾ちゃんを出現させるが、ひょいっと回避される。"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「ふふっ、他人の影からも爆弾を召喚できるようになったのは強力ですけれど――私には気配でわかりますわよ」
line = "「ふふっ、他人の影からも爆弾を召喚できるようになったのは強力ですけれど――私には気配でわかりますわよ」"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「セナリィはほんと、こういう不意打ちも、普通に避けるんだからな～」
line = "「セナリィはほんと、こういう不意打ちも、普通に避けるんだからな～」"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「でも……これならどうかな？　シェアハートボンバー♪」
line = "「でも……これならどうかな？　シェアハートボンバー♪」"

[[dialogue]]
speaker = "爆弾ちゃん"
# 『ターゲット、ロックオン♪』
line = "『ターゲット、ロックオン♪』"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「げっ！？　戦車型の標的がこっちに……！？」
line = "「げっ！？　戦車型の標的がこっちに……！？」"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「せっかくだし、セナリィに正面突破できるかどうか、試してみるのも面白そうだよね～？」
line = "「せっかくだし、セナリィに正面突破できるかどうか、試してみるのも面白そうだよね～？」"

[[dialogue]]
speaker = "爆弾ちゃん"
# 『は～い、こっちを見て～♪』
line = "『は～い、こっちを見て～♪』"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「見ませんわよ！　ミサイルストーム！」
line = "「見ませんわよ！　ミサイルストーム！」"

[[dialogue]]
speaker = "爆弾ちゃん"
# 『にひひっ♪　ざんね～ん♪』
line = "『にひひっ♪　ざんね～ん♪』"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「エンプレスフォームの火力でも、装甲が少し欠けただけ！？　ちょっ……こっちに来るんじゃねぇですわぁ～～っ！」
line = "「エンプレスフォームの火力でも、装甲が少し欠けただけ！？　ちょっ……こっちに来るんじゃねぇですわぁ～～っ！」"

[[dialogue]]
speaker = "unk"
# セナリィは引き撃ちをしながら、全力で逃走を開始する。
line = "セナリィは引き撃ちをしながら、全力で逃走を開始する。"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「ふん、しばらく解除してあげないもんね～だ」
line = "「ふん、しばらく解除してあげないもんね～だ」"

[[dialogue]]
speaker = "unk"
# マイン、ところでさっきの話って……
line = "マイン、ところでさっきの話って……"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「え？　さっきのって――わ、私がノヴァフォームを羨ましがってたって話……？」
line = "「え？　さっきのって――わ、私がノヴァフォームを羨ましがってたって話……？」"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「それはまあ……付き合ってるんだし、他の子との『絆の力』って言われたら……多少は、ね」
line = "「それはまあ……付き合ってるんだし、他の子との『絆の力』って言われたら……多少は、ね」"

[[dialogue]]
speaker = "unk"
# 俺とマインの絆が最強だって証明しないとな
line = "俺とマインの絆が最強だって証明しないとな"

[[dialogue]]
speaker = "unk"
# じゃあ、これから――
line = "じゃあ、これから――"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「最強って……そこまでは別に……」
line = "「最強って……そこまでは別に……」"

[[dialogue]]
speaker = "unk"
# 俺はこれまで、多くの星騎士が新たな力を得て、その先の可能性へと踏み出していく姿を見てきた。
line = "俺はこれまで、多くの星騎士が新たな力を得て、その先の可能性へと踏み出していく姿を見てきた。"

[[dialogue]]
speaker = "unk"
# だからこそ――マインもまた、今回の人工ノヴァフォームをきっかけに、自身の更なる可能性を広げていくと信じている。
line = "だからこそ――マインもまた、今回の人工ノヴァフォームをきっかけに、自身の更なる可能性を広げていくと信じている。"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「――私は交渉人としての才能があるから、そのうち守護星と交渉して、もっとすごい力を引き出せるようになるかもって……？」
line = "「――私は交渉人としての才能があるから、そのうち守護星と交渉して、もっとすごい力を引き出せるようになるかもって……？」"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「ぷっ……きゃはははっ♪　会長は相変わらず、面白いこと言うね～」
line = "「ぷっ……きゃはははっ♪　会長は相変わらず、面白いこと言うね～」"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「でも、その邪道な感じ……確かに私らしいかも♪」
line = "「でも、その邪道な感じ……確かに私らしいかも♪」"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「……ねぇ、会長――」
line = "「……ねぇ、会長――」"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「ありがとね♪　ちゅっ……<emoji=heart04>」
line = "「ありがとね♪　ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 不意に、マインからキスをされる。
line = "不意に、マインからキスをされる。"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「――このあと、絆の力を深める為の訓練、付き合ってくれる？」
line = "「――このあと、絆の力を深める為の訓練、付き合ってくれる？」"

[[dialogue]]
speaker = "unk"
# ああ、もちろんだ
line = "ああ、もちろんだ"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「にひひ<emoji=heart04>　じゃあ、２人きりになれる場所で……ね♪」
line = "「にひひ<emoji=heart04>　じゃあ、２人きりになれる場所で……ね♪」"

[[dialogue]]
speaker = "unk"
# 俺は頷き、マインと指を絡め――恋人繋ぎにするのだった。
line = "俺は頷き、マインと指を絡め――恋人繋ぎにするのだった。"

[[dialogue]]
speaker = "unk"
# 一方、その頃。
line = "一方、その頃。"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「ぜーっ、ぜーっ……！　この戦車爆弾、いつ止まってくれますの！？」
line = "「ぜーっ、ぜーっ……！　この戦車爆弾、いつ止まってくれますの！？」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「マイン！？　まさか解除忘れてるんじゃありませんわよね！？　マイン～！？」
line = "「マイン！？　まさか解除忘れてるんじゃありませんわよね！？　マイン～！？」"

[[dialogue]]
speaker = "爆弾ちゃん"
# 『こっちを見て～♪』
line = "『こっちを見て～♪』"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「ちょっ、近ぇですわ！　ぎゃあぁ～～っ！？」
line = "「ちょっ、近ぇですわ！　ぎゃあぁ～～っ！？」"

[[dialogue]]
speaker = "unk"
# マインが会長とイチャイチャしている間、爆弾ちゃんと追いかけっこをし続ける羽目になるセナリィなのであった。
line = "マインが会長とイチャイチャしている間、爆弾ちゃんと追いかけっこをし続ける羽目になるセナリィなのであった。"
