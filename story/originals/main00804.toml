[[dialogue]]
speaker = "unk"
# 第４話,フィーニスの塔・第三階層,B
line = "第４話,フィーニスの塔・第三階層,B"

[[dialogue]]
speaker = "ヴィーナス"
# 「着いたわね……ここが」
line = "「着いたわね……ここが」"

[[dialogue]]
speaker = "クロト"
# 「フィーニス──」
line = "「フィーニス──」"

[[dialogue]]
speaker = "フィオナ"
# 「第三階層……」
line = "「第三階層……」"

[[dialogue]]
speaker = "unk"
# 一階層と二階層の例からして、恐らく再び毛色は変わるのだろうと踏んでいたが──
line = "一階層と二階層の例からして、恐らく再び毛色は変わるのだろうと踏んでいたが──"

[[dialogue]]
speaker = "unk"
# 目の前に広がっていた景観は、予想を上回るものだった。
line = "目の前に広がっていた景観は、予想を上回るものだった。"

[[dialogue]]
speaker = "ヴィーナス"
# 「何なの……ここ。超、陰気臭いんですけど……」
line = "「何なの……ここ。超、陰気臭いんですけど……」"

[[dialogue]]
speaker = "ルリエル"
# 「そ、想像していた景色と全然違うであります……！　あの豪華な塔はどこへいってしまわれたのですか……！？」
line = "「そ、想像していた景色と全然違うであります……！　あの豪華な塔はどこへいってしまわれたのですか……！？」"

[[dialogue]]
speaker = "ソフィア"
# 「というか、こんなに中が広いのもおかしい──ような……」
line = "「というか、こんなに中が広いのもおかしい──ような……」"

[[dialogue]]
speaker = "ニャリオン"
# 「ま、前に入った時とも全然違うニャン……！？」
line = "「ま、前に入った時とも全然違うニャン……！？」"

[[dialogue]]
speaker = "セーラ"
# 「んー。異界、ってカンジなのかなー」
line = "「んー。異界、ってカンジなのかなー」"

[[dialogue]]
speaker = "クロト"
# 「確かに今までも異界が広がってはいましたが──ここまで広大な内部は初めてです」
line = "「確かに今までも異界が広がってはいましたが──ここまで広大な内部は初めてです」"

[[dialogue]]
speaker = "アナ"
# 「ＤＩＳＣの通信も不可能──これは、会長や前会長からもうかがっていた情報通りです」
line = "「ＤＩＳＣの通信も不可能──これは、会長や前会長からもうかがっていた情報通りです」"

[[dialogue]]
speaker = "マトイ"
# 「なんていうか……映画の中みたい」
line = "「なんていうか……映画の中みたい」"

[[dialogue]]
speaker = "ソフィア"
# 「そうですね……これでは、まるで……」
line = "「そうですね……これでは、まるで……」"

[[dialogue]]
speaker = "unk"
# みな、心のどこかで同じような感想を抱いていたはずだ。
line = "みな、心のどこかで同じような感想を抱いていたはずだ。"

[[dialogue]]
speaker = "unk"
# この景観をひと言で表すとするなら、そう──
line = "この景観をひと言で表すとするなら、そう──"

[[dialogue]]
speaker = "クロト"
# 「滅亡した、世界……」
line = "「滅亡した、世界……」"

[[dialogue]]
speaker = "フィオナ"
# 「……ぴったりの表現ですね。それも、滅んでしばらく経ったかのような」
line = "「……ぴったりの表現ですね。それも、滅んでしばらく経ったかのような」"

[[dialogue]]
speaker = "ルリエル"
# 「ひえ……！　い、一体何が起こったのでしょうか……！？」
line = "「ひえ……！　い、一体何が起こったのでしょうか……！？」"

[[dialogue]]
speaker = "アナ"
# 「建造物の残骸が各所に見られます。文明のあった名残──とは思いますが、私たちの世界と同一かはわかりません」
line = "「建造物の残骸が各所に見られます。文明のあった名残──とは思いますが、私たちの世界と同一かはわかりません」"

[[dialogue]]
speaker = "サーシャ"
# 「人間界に近いかしら？　でも、ただのセットかもしれないわよね」
line = "「人間界に近いかしら？　でも、ただのセットかもしれないわよね」"

[[dialogue]]
speaker = "クロト"
# 「そうですね。ただ、いずれにせよ──不吉なのは確かです」
line = "「そうですね。ただ、いずれにせよ──不吉なのは確かです」"

[[dialogue]]
speaker = "unk"
# それでも──ここがフィーニスの塔の上層である以上、俺たちのすべきことはひとつだ。
line = "それでも──ここがフィーニスの塔の上層である以上、俺たちのすべきことはひとつだ。"

[[dialogue]]
speaker = "クロト"
# 「──進もう。いくら広大に見えても、塔の中には変わりない。必ず終点があるはずだ」
line = "「──進もう。いくら広大に見えても、塔の中には変わりない。必ず終点があるはずだ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうね！　初めてのみんなも、私たちについてきて！」
line = "「そうね！　初めてのみんなも、私たちについてきて！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「奥には毎回ボスがいて──そいつを倒せば、何かしら手がかりが手に入るのよ！　簡単でしょ♪」
line = "「奥には毎回ボスがいて──そいつを倒せば、何かしら手がかりが手に入るのよ！　簡単でしょ♪」"

[[dialogue]]
speaker = "アナ"
# 「ゲームみたいですね」
line = "「ゲームみたいですね」"

[[dialogue]]
speaker = "ユウリ"
# 「そのボスっつーのが例のドラゴンってわけだな」
line = "「そのボスっつーのが例のドラゴンってわけだな」"

[[dialogue]]
speaker = "マトイ"
# 「ラ、ラジャ。ちょっと怖いけど……みんながいれば！」
line = "「ラ、ラジャ。ちょっと怖いけど……みんながいれば！」"

[[dialogue]]
speaker = "サーシャ"
# 「ふふ。こんな暗い場所は早く脱したいものね」
line = "「ふふ。こんな暗い場所は早く脱したいものね」"

[[dialogue]]
speaker = "フィオナ"
# 「前例通りなら──守護天使の方がいるかもしれません。行きましょう」
line = "「前例通りなら──守護天使の方がいるかもしれません。行きましょう」"

[[dialogue]]
speaker = "クロト"
# 「ああ。今の俺たちなら──星徒会同士の連携も取れるはずだ」
line = "「ああ。今の俺たちなら──星徒会同士の連携も取れるはずだ」"

[[dialogue]]
speaker = "unk"
# そうして、俺たちは廃れた階層を進んでいった。
line = "そうして、俺たちは廃れた階層を進んでいった。"

[[dialogue]]
speaker = "unk"
# この層の広大さは見掛け倒しではなく、どこまでも果てしなく続いているように思えた。
line = "この層の広大さは見掛け倒しではなく、どこまでも果てしなく続いているように思えた。"

[[dialogue]]
speaker = "unk"
# すると……
line = "すると……"

[[dialogue]]
speaker = "ガーディアン"
# 「ウィーン──ウィーン──侵入者発見。ピピ、ガガ、排除スル」
line = "「ウィーン──ウィーン──侵入者発見。ピピ、ガガ、排除スル」"

[[dialogue]]
speaker = "マトイ"
# 「！？　な、何これ！？」
line = "「！？　な、何これ！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「出たわねガラクタ兵器──みんな、構えて！」
line = "「出たわねガラクタ兵器──みんな、構えて！」"

[[dialogue]]
speaker = "ソフィア"
# 「見たこともないモンスターです──」
line = "「見たこともないモンスターです──」"

[[dialogue]]
speaker = "ニャリオン"
# 「正確にはモンスターではないニャン！　ガーディアンという、本来は塔を守る存在なのニャン！」
line = "「正確にはモンスターではないニャン！　ガーディアンという、本来は塔を守る存在なのニャン！」"

[[dialogue]]
speaker = "セーラ"
# 「なんかの事情で暴走してる、ってコトかなー？」
line = "「なんかの事情で暴走してる、ってコトかなー？」"

[[dialogue]]
speaker = "アナ"
# 「混沌の瘴気をまとっています──各員、長時間触れないように注意してください！」
line = "「混沌の瘴気をまとっています──各員、長時間触れないように注意してください！」"

[[dialogue]]
speaker = "ルリエル"
# 「了解でありまぁーす！」
line = "「了解でありまぁーす！」"

[[dialogue]]
speaker = "クロト"
# 「全方位から集まってきてる──各個撃破するぞ！」
line = "「全方位から集まってきてる──各個撃破するぞ！」"

[[dialogue]]
speaker = "ガーディアン"
# 「ピピ……ガガ──ピガ────ッ！！」
line = "「ピピ……ガガ──ピガ────ッ！！」"
