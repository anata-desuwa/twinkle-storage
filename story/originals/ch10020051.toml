[[dialogue]]
speaker = "unk"
# 第１話,奏姉妹とお出かけ,P
line = "第１話,奏姉妹とお出かけ,P"

[[dialogue]]
speaker = "unk"
# それは、サーシャさんが新たなお正月を迎え、『スーパー晴れ着フォーム』を手に入れるよりも数ヶ月ほど前の出来事。
line = "それは、サーシャさんが新たなお正月を迎え、『スーパー晴れ着フォーム』を手に入れるよりも数ヶ月ほど前の出来事。"

[[dialogue]]
speaker = "ソフィア"
# 「あっ、兄さん。こっちです」
line = "「あっ、兄さん。こっちです」"

[[dialogue]]
speaker = "unk"
# サーシャさんの妹であるソフィアからの『兄さん』呼びにも慣れてきた俺は、彼女に軽く手を振りながら合流する。
line = "サーシャさんの妹であるソフィアからの『兄さん』呼びにも慣れてきた俺は、彼女に軽く手を振りながら合流する。"

[[dialogue]]
speaker = "ソフィア"
# 「それで兄さん。今日のこと、姉さんには……？」
line = "「それで兄さん。今日のこと、姉さんには……？」"

[[dialogue]]
speaker = "unk"
# 大丈夫。ちゃんと秘密にしてきた
line = "大丈夫。ちゃんと秘密にしてきた"

[[dialogue]]
speaker = "ソフィア"
# 「では、このまま気づかれないように、こっそりとクールに学園の外へ出ましょう」
line = "「では、このまま気づかれないように、こっそりとクールに学園の外へ出ましょう」"

[[dialogue]]
speaker = "サーシャ"
# 「あ～ん、お姉ちゃん抜きで、内緒話なんて寂しいわ～」
line = "「あ～ん、お姉ちゃん抜きで、内緒話なんて寂しいわ～」"

[[dialogue]]
speaker = "ソフィア"
# 「って、姉さん！？　ああ、もう！　なんで姉さんは、こういう気づいて欲しくない時ばっかり、すぐに気づくんですか……！」
line = "「って、姉さん！？　ああ、もう！　なんで姉さんは、こういう気づいて欲しくない時ばっかり、すぐに気づくんですか……！」"

[[dialogue]]
speaker = "サーシャ"
# 「いくらソフィが妹でも、会長くんと内緒でイチャイチャするのはダメよ～。やるならちゃんと、お姉ちゃんの前でしてくれなくちゃ～」
line = "「いくらソフィが妹でも、会長くんと内緒でイチャイチャするのはダメよ～。やるならちゃんと、お姉ちゃんの前でしてくれなくちゃ～」"

[[dialogue]]
speaker = "ソフィア"
# 「誰が兄さんとイチャイチャしたんですかっ。品のない冗談はやめてください！」
line = "「誰が兄さんとイチャイチャしたんですかっ。品のない冗談はやめてください！」"

[[dialogue]]
speaker = "サーシャ"
# 「会長くんも、ソフィがいくら可愛いからって、こっそりはダメよ～」
line = "「会長くんも、ソフィがいくら可愛いからって、こっそりはダメよ～」"

[[dialogue]]
speaker = "サーシャ"
# 「ソフィと遊ぶなら、お姉ちゃんも一緒に構ってくれなくっちゃ。私にだって会長くんの恋人だっていうプライドはあるんだから～」
line = "「ソフィと遊ぶなら、お姉ちゃんも一緒に構ってくれなくっちゃ。私にだって会長くんの恋人だっていうプライドはあるんだから～」"

[[dialogue]]
speaker = "unk"
# そう言って、頬をぷく～っと膨らませながら、腕に抱き着いてくるサーシャさん。
line = "そう言って、頬をぷく～っと膨らませながら、腕に抱き着いてくるサーシャさん。"

[[dialogue]]
speaker = "unk"
# その仕草が猛烈に可愛いと思ってしまいつつも、俺は釈明する。
line = "その仕草が猛烈に可愛いと思ってしまいつつも、俺は釈明する。"

[[dialogue]]
speaker = "unk"
# すみません。でもこれには事情があって……
line = "すみません。でもこれには事情があって……"

[[dialogue]]
speaker = "ソフィア"
# 「はぁ……仕方ありません。私と兄さんは、姉さんの<b>誕生日プレゼント</b>を買いに行こうと計画してたんですよ」
line = "「はぁ……仕方ありません。私と兄さんは、姉さんの<b>誕生日プレゼント</b>を買いに行こうと計画してたんですよ」"

[[dialogue]]
speaker = "unk"
# その日はサーシャさんの誕生日を目前に控えた休日だった。しかし、サプライズが本人にバレてしまった俺たちは、３人で渋谷へ買い物に出かけることとなった。
line = "その日はサーシャさんの誕生日を目前に控えた休日だった。しかし、サプライズが本人にバレてしまった俺たちは、３人で渋谷へ買い物に出かけることとなった。"

[[dialogue]]
speaker = "ソフィア"
# 「バレてしまった以上は計画を変更して、姉さん本人に１番欲しい物を選んでもらおうと思います――って、姉さん？　聞いてます？」
line = "「バレてしまった以上は計画を変更して、姉さん本人に１番欲しい物を選んでもらおうと思います――って、姉さん？　聞いてます？」"

[[dialogue]]
speaker = "サーシャ"
# 「わぁ～、すごいわ～♪　こんなにキャンプ用品の品揃えがすごいお店、初めて～♪」
line = "「わぁ～、すごいわ～♪　こんなにキャンプ用品の品揃えがすごいお店、初めて～♪」"

[[dialogue]]
speaker = "unk"
# デパートの中にある有名なアウトドアショップに入って、珍しく興奮気味に瞳を輝かせているサーシャさん。
line = "デパートの中にある有名なアウトドアショップに入って、珍しく興奮気味に瞳を輝かせているサーシャさん。"

[[dialogue]]
speaker = "unk"
# ――うん、我が彼女ながら可愛い。
line = "――うん、我が彼女ながら可愛い。"

[[dialogue]]
speaker = "ソフィア"
# 「姉さんは『旅好き』なので、誕生日プレゼントを探すならここかなと、事前に兄さんと調べていたんです」
line = "「姉さんは『旅好き』なので、誕生日プレゼントを探すならここかなと、事前に兄さんと調べていたんです」"

[[dialogue]]
speaker = "サーシャ"
# 「すごいわ～。テントセットに焚き火台、キャリーケースも種類が沢山。お姉ちゃん、目移りしちゃう♪」
line = "「すごいわ～。テントセットに焚き火台、キャリーケースも種類が沢山。お姉ちゃん、目移りしちゃう♪」"

[[dialogue]]
speaker = "サーシャ"
# 「ねぇねぇ、会長くん、見て見て～♪　お姉ちゃんと一緒にキャンプに行くなら、どのテントがいいかしら～？」
line = "「ねぇねぇ、会長くん、見て見て～♪　お姉ちゃんと一緒にキャンプに行くなら、どのテントがいいかしら～？」"

[[dialogue]]
speaker = "サーシャ"
# 「やっぱり広い方が、中でイチャイチャできていいわよね～？　うふふっ<emoji=heart04>」
line = "「やっぱり広い方が、中でイチャイチャできていいわよね～？　うふふっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# サーシャさんとテントでイチャイチャ！？
line = "サーシャさんとテントでイチャイチャ！？"

[[dialogue]]
speaker = "サーシャ"
# 「そうよ～<emoji=heart04>　後で一緒にお泊りキャンプ、してみたくない？」
line = "「そうよ～<emoji=heart04>　後で一緒にお泊りキャンプ、してみたくない？」"

[[dialogue]]
speaker = "unk"
# 俺はぶんぶんと全力で首を縦に振りながら、真剣にテント選びを開始する。
line = "俺はぶんぶんと全力で首を縦に振りながら、真剣にテント選びを開始する。"

[[dialogue]]
speaker = "ソフィア"
# 「あ～、これはしばらく、ホットなイチャイチャを見せつけられることになりそうですね……」
line = "「あ～、これはしばらく、ホットなイチャイチャを見せつけられることになりそうですね……」"

[[dialogue]]
speaker = "サーシャ"
# 「ソフィもキャンプ参加する？　お姉ちゃんも一緒だったら、会長くんとイチャイチャしてもいいわよ～？」
line = "「ソフィもキャンプ参加する？　お姉ちゃんも一緒だったら、会長くんとイチャイチャしてもいいわよ～？」"

[[dialogue]]
speaker = "ソフィア"
# 「行きませんよ！？　というか、３人だったらいいんですか！？」
line = "「行きませんよ！？　というか、３人だったらいいんですか！？」"

[[dialogue]]
speaker = "unk"
# それから、俺たちは半日かけてデパートの中を色々見て回った。
line = "それから、俺たちは半日かけてデパートの中を色々見て回った。"

[[dialogue]]
speaker = "unk"
# その結果、最後にサーシャさんが選んだ物は『ちょっと高めの高級ボールペン』と『装丁がしっかりとした高級ノート』だった。
line = "その結果、最後にサーシャさんが選んだ物は『ちょっと高めの高級ボールペン』と『装丁がしっかりとした高級ノート』だった。"

[[dialogue]]
speaker = "ソフィア"
# 「確かにお洒落で良い物だと思いますが……アウトドアグッズはよかったんですか？」
line = "「確かにお洒落で良い物だと思いますが……アウトドアグッズはよかったんですか？」"

[[dialogue]]
speaker = "サーシャ"
# 「ええ。それは今度、自分で買いにくるわ。それにこれなら、ソフィとの交換日記にも使えるでしょう？」
line = "「ええ。それは今度、自分で買いにくるわ。それにこれなら、ソフィとの交換日記にも使えるでしょう？」"

[[dialogue]]
speaker = "ソフィア"
# 「……！　ま、まあ、そうですね……」
line = "「……！　ま、まあ、そうですね……」"

[[dialogue]]
speaker = "unk"
# ちょっと照れて赤くなった顔を隠すように、マフラーを指で摘まんで上げるソフィア。
line = "ちょっと照れて赤くなった顔を隠すように、マフラーを指で摘まんで上げるソフィア。"

[[dialogue]]
speaker = "サーシャ"
# 「それにね、最近私、小説を書いてみようかなって思っているの」
line = "「それにね、最近私、小説を書いてみようかなって思っているの」"

[[dialogue]]
speaker = "ソフィア"
# 「えっ、小説ですか……？」
line = "「えっ、小説ですか……？」"

[[dialogue]]
speaker = "unk"
# サーシャさんは読書家ではあるものの、小説はあまり好まない。そのことを知っているソフィアが、意外そうな声をあげる。
line = "サーシャさんは読書家ではあるものの、小説はあまり好まない。そのことを知っているソフィアが、意外そうな声をあげる。"

[[dialogue]]
speaker = "サーシャ"
# 「ノヴァフォームに覚醒して、私は『自分の大切なものは自分で決める』ことができるようになったわ」
line = "「ノヴァフォームに覚醒して、私は『自分の大切なものは自分で決める』ことができるようになったわ」"

[[dialogue]]
speaker = "サーシャ"
# 「それでもやっぱり、私は人と比べると、他人への興味や関心が薄いと思うの」
line = "「それでもやっぱり、私は人と比べると、他人への興味や関心が薄いと思うの」"

[[dialogue]]
speaker = "サーシャ"
# 「『それは一体どうしてなのか』『私は本当は何を考えているのか』。文字を書くとそういうことを深く考えられるようになるって、最近気づいたの」
line = "「『それは一体どうしてなのか』『私は本当は何を考えているのか』。文字を書くとそういうことを深く考えられるようになるって、最近気づいたの」"

[[dialogue]]
speaker = "サーシャ"
# 「これに気づけたのは、ソフィとの交換日記で、自分の考えを文字にする習慣ができたおかげよ」
line = "「これに気づけたのは、ソフィとの交換日記で、自分の考えを文字にする習慣ができたおかげよ」"

[[dialogue]]
speaker = "サーシャ"
# 「だから、自分のことをもっと知るために、小説を書いてみようかなって思ったの」
line = "「だから、自分のことをもっと知るために、小説を書いてみようかなって思ったの」"

[[dialogue]]
speaker = "ソフィア"
# 「それ……すごくいいと思います！」
line = "「それ……すごくいいと思います！」"

[[dialogue]]
speaker = "ソフィア"
# 「完成したら絶対！　絶対私にも読ませてくださいねっ。姉さんが書く小説、読んでみたいです！」
line = "「完成したら絶対！　絶対私にも読ませてくださいねっ。姉さんが書く小説、読んでみたいです！」"

[[dialogue]]
speaker = "unk"
# 俺も読んでみたいです
line = "俺も読んでみたいです"

[[dialogue]]
speaker = "サーシャ"
# 「本当？　じゃあ、お姉ちゃん、頑張って書いてみるわね♪」
line = "「本当？　じゃあ、お姉ちゃん、頑張って書いてみるわね♪」"

[[dialogue]]
speaker = "ソフィア"
# 「はいっ！　楽しみにしてますっ」
line = "「はいっ！　楽しみにしてますっ」"

[[dialogue]]
speaker = "unk"
# サーシャさんの中で芽生えた、小さくも大きな変化。俺はそのことに驚きと喜びを噛みしめながら、そっと姉妹２人を見守るのだった。
line = "サーシャさんの中で芽生えた、小さくも大きな変化。俺はそのことに驚きと喜びを噛みしめながら、そっと姉妹２人を見守るのだった。"
