[[dialogue]]
speaker = "unk"
# 第１０話,守護天使ノルン,B
line = "第１０話,守護天使ノルン,B"

[[dialogue]]
speaker = "ナターシャ"
# 「ダメかと思った……っていうか、ダメだった？　もしかしてここ天国？」
line = "「ダメかと思った……っていうか、ダメだった？　もしかしてここ天国？」"

[[dialogue]]
speaker = "クロト"
# 「ここは……？　さっきまでフィーニスの塔の頂上にいたはず……」
line = "「ここは……？　さっきまでフィーニスの塔の頂上にいたはず……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ていうか私のノヴァフォームも解けちゃってるし、何が起きたの？」
line = "「ていうか私のノヴァフォームも解けちゃってるし、何が起きたの？」"

[[dialogue]]
speaker = "？？？"
# 『強引に離脱させたからね。緊張が解けて、ノヴァフォームも解除されちゃったんじゃない？』
line = "『強引に離脱させたからね。緊張が解けて、ノヴァフォームも解除されちゃったんじゃない？』"

[[dialogue]]
speaker = "クロト"
# 「この声……ラクシャか！？」
line = "「この声……ラクシャか！？」"

[[dialogue]]
speaker = "ラクシャ"
# 「そう、ボクさ。守護天使の力で一瞬だけフィーニスの塔のコントロールを奪わせてもらった。ルヴィネは女神としては若輩だからギリギリなんとかなったよ」
line = "「そう、ボクさ。守護天使の力で一瞬だけフィーニスの塔のコントロールを奪わせてもらった。ルヴィネは女神としては若輩だからギリギリなんとかなったよ」"

[[dialogue]]
speaker = "ラクシャ"
# 「今はフィーニスの塔からキミたちを<ruby=イジェクト>排出</ruby>しているところ。塔の外に出すから少し待っててね」
line = "「今はフィーニスの塔からキミたちを<ruby>排出<rt>イジェクト</rt></ruby>しているところ。塔の外に出すから少し待っててね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ありがとう！　助かったわ、ラクシャ！」
line = "「ありがとう！　助かったわ、ラクシャ！」"

[[dialogue]]
speaker = "ラクシャ"
# 「礼には及ばないよ。女神テルルに仕える守護天使として、ルヴィネの好きにさせるわけにはいかないからさ」
line = "「礼には及ばないよ。女神テルルに仕える守護天使として、ルヴィネの好きにさせるわけにはいかないからさ」"

[[dialogue]]
speaker = "ラクシャ"
# 「で……ボクも一部始終を聞いていたけど、ルヴィネの正体がわかったみたいだね」
line = "「で……ボクも一部始終を聞いていたけど、ルヴィネの正体がわかったみたいだね」"

[[dialogue]]
speaker = "クロト"
# 「ああ。ルヴィネは新たな女神で、『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』によって生み出された存在だった」
line = "「ああ。ルヴィネは新たな女神で、『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』によって生み出された存在だった」"

[[dialogue]]
speaker = "ラクシャ"
# 「うん、これで敵が明確になった。リクリエの使徒ジグ、新たな女神ルヴィネ、そしてリクリエの化身となったディザスターハンド」
line = "「うん、これで敵が明確になった。リクリエの使徒ジグ、新たな女神ルヴィネ、そしてリクリエの化身となったディザスターハンド」"

[[dialogue]]
speaker = "ラクシャ"
# 「それらがキミたちがこれから打ち倒すべきものだ」
line = "「それらがキミたちがこれから打ち倒すべきものだ」"

[[dialogue]]
speaker = "ベアトリス"
# 「ルヴィ……」
line = "「ルヴィ……」"

[[dialogue]]
speaker = "unk"
# 目に涙を浮かべて打ちひしがれるベアトリス。
line = "目に涙を浮かべて打ちひしがれるベアトリス。"

[[dialogue]]
speaker = "unk"
# 道を違えたとはいえ、デネブを守ろうという想いは同じと信じていた。
line = "道を違えたとはいえ、デネブを守ろうという想いは同じと信じていた。"

[[dialogue]]
speaker = "unk"
# それが裏切られたとなれば衝撃を受けるのも当然だろう。
line = "それが裏切られたとなれば衝撃を受けるのも当然だろう。"

[[dialogue]]
speaker = "梨緒"
# 「軽々しく言いたくはないが……気持ちはわかる」
line = "「軽々しく言いたくはないが……気持ちはわかる」"

[[dialogue]]
speaker = "梨緒"
# 「だが俯いている時間はない。今は生き残ることを考えよう」
line = "「だが俯いている時間はない。今は生き残ることを考えよう」"

[[dialogue]]
speaker = "ベアトリス"
# 「う……うん……」
line = "「う……うん……」"

[[dialogue]]
speaker = "ラクシャ"
# 「梨緒、最後にキミの秘密を伝えておこう。キミは守護天使だ」
line = "「梨緒、最後にキミの秘密を伝えておこう。キミは守護天使だ」"

[[dialogue]]
speaker = "梨緒"
# 「守護天使！？　そんなはずはない、私はイングランド生まれの人間だ」
line = "「守護天使！？　そんなはずはない、私はイングランド生まれの人間だ」"

[[dialogue]]
speaker = "ラクシャ"
# 「そうなんだけど、キミの中に守護天使が存在している」
line = "「そうなんだけど、キミの中に守護天使が存在している」"

[[dialogue]]
speaker = "ラクシャ"
# 「確証がなかったから今までは断言しなかったんだけど、ここ数日一緒に行動して確認したから間違いない」
line = "「確証がなかったから今までは断言しなかったんだけど、ここ数日一緒に行動して確認したから間違いない」"

[[dialogue]]
speaker = "ラクシャ"
# 「実は守護天使は、幾度も繰り返されるリクリエの中で、何度か代替わりし、転生し続けてきた。ボクたち六柱は第三世代だ」
line = "「実は守護天使は、幾度も繰り返されるリクリエの中で、何度か代替わりし、転生し続けてきた。ボクたち六柱は第三世代だ」"

[[dialogue]]
speaker = "梨緒"
# 「第三世代……？　なら第一世代や第二世代もいるのか？」
line = "「第三世代……？　なら第一世代や第二世代もいるのか？」"

[[dialogue]]
speaker = "ラクシャ"
# 「そうだよ。ほら、シエルの<ruby=はこ>筐</ruby>とか鍵ってあったでしょ。あれはボクたちの１つ前の先輩──第二世代の守護天使が作ったものだ。リクリエを超えて残ったんだね」
line = "「そうだよ。ほら、シエルの<ruby>筐<rt>はこ</rt></ruby>とか鍵ってあったでしょ。あれはボクたちの１つ前の先輩──第二世代の守護天使が作ったものだ。リクリエを超えて残ったんだね」"

[[dialogue]]
speaker = "ラクシャ"
# 「それじゃ守護天使の成り立ちから説明しよう」
line = "「それじゃ守護天使の成り立ちから説明しよう」"

[[dialogue]]
speaker = "ラクシャ"
# 「最初は守護天使は存在せず、女神テルルだけで世界を運営していた。その頃は『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』に逆らうことはなかった」
line = "「最初は守護天使は存在せず、女神テルルだけで世界を運営していた。その頃は『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』に逆らうことはなかった」"

[[dialogue]]
speaker = "ラクシャ"
# 「だが女神テルルは次第にリクリエというシステムに疑問を抱き始める。だがリクリエを止めることは叶わなかった」
line = "「だが女神テルルは次第にリクリエというシステムに疑問を抱き始める。だがリクリエを止めることは叶わなかった」"

[[dialogue]]
speaker = "ラクシャ"
# 「単身でリクリエに対抗することに限界を感じた女神テルルは、自身の補佐として守護天使を生み出した」
line = "「単身でリクリエに対抗することに限界を感じた女神テルルは、自身の補佐として守護天使を生み出した」"

[[dialogue]]
speaker = "ラクシャ"
# 「そして梨緒、キミの中にいるのは第一世代、《運命》のノルン。女神によって造られた最初の守護天使だ」
line = "「そして梨緒、キミの中にいるのは第一世代、《運命》のノルン。女神によって造られた最初の守護天使だ」"

[[dialogue]]
speaker = "ラクシャ"
# 「彼女の司る摂理は“因果”。物事の原因と結果、その必然を司っている」
line = "「彼女の司る摂理は“因果”。物事の原因と結果、その必然を司っている」"

[[dialogue]]
speaker = "梨緒"
# 「《運命》のノルン……それが私の中にいるのか？　だが今の守護天使とは管理する摂理が違うようだが」
line = "「《運命》のノルン……それが私の中にいるのか？　だが今の守護天使とは管理する摂理が違うようだが」"

[[dialogue]]
speaker = "ラクシャ"
# 「それは女神なりの試行錯誤だよ」
line = "「それは女神なりの試行錯誤だよ」"

[[dialogue]]
speaker = "ラクシャ"
# 「守護天使の権能は元々女神の力。世代ごとに異なる権能を与えて、より効率的に世界を運営しようとしているんだよ」
line = "「守護天使の権能は元々女神の力。世代ごとに異なる権能を与えて、より効率的に世界を運営しようとしているんだよ」"

[[dialogue]]
speaker = "梨緒"
# 「……ノルンについてはある程度わかった。だがどうして私にそんなものが宿った？　私はただの人間だぞ」
line = "「……ノルンについてはある程度わかった。だがどうして私にそんなものが宿った？　私はただの人間だぞ」"

[[dialogue]]
speaker = "ラクシャ"
# 「んーとね……」
line = "「んーとね……」"

[[dialogue]]
speaker = "ラクシャ"
# 「わかんない」
line = "「わかんない」"

[[dialogue]]
speaker = "梨緒"
# 「は？」
line = "「は？」"

[[dialogue]]
speaker = "ラクシャ"
# 「いや、正直ボクにもなんでかはわからないんだよ」
line = "「いや、正直ボクにもなんでかはわからないんだよ」"

[[dialogue]]
speaker = "ラクシャ"
# 「可能性があるとしたら、梨緒がディザスターハンドの力でベガから飛ばされた時に、次元の狭間に漂ってたノルンの残滓と融合した……とか？」
line = "「可能性があるとしたら、梨緒がディザスターハンドの力でベガから飛ばされた時に、次元の狭間に漂ってたノルンの残滓と融合した……とか？」"

[[dialogue]]
speaker = "梨緒"
# 「なんだその自信のなさそうな説明は」
line = "「なんだその自信のなさそうな説明は」"

[[dialogue]]
speaker = "ラクシャ"
# 「だって本当にそうとしか説明できないんだよ」
line = "「だって本当にそうとしか説明できないんだよ」"

[[dialogue]]
speaker = "ラクシャ"
# 「でももしそうだとしたら、とんでもない奇跡だよ。ラクシスが世界を超える力を生まれ持っていたようにね」
line = "「でももしそうだとしたら、とんでもない奇跡だよ。ラクシスが世界を超える力を生まれ持っていたようにね」"

[[dialogue]]
speaker = "ラクシャ"
# 「その奇跡がなければ、梨緒はきっと生きていなかったはずだ」
line = "「その奇跡がなければ、梨緒はきっと生きていなかったはずだ」"

[[dialogue]]
speaker = "梨緒"
# 「つまり私は……ただの偶然で命を拾ったのか？」
line = "「つまり私は……ただの偶然で命を拾ったのか？」"

[[dialogue]]
speaker = "ラクシャ"
# 「多分そう。その偶然をどう使うかは梨緒次第さ」
line = "「多分そう。その偶然をどう使うかは梨緒次第さ」"

[[dialogue]]
speaker = "ラクシャ"
# 「おっと、そろそろ処理が終わりそうだ」
line = "「おっと、そろそろ処理が終わりそうだ」"

[[dialogue]]
speaker = "ラクシャ"
# 「さて、キミたちはこれからアルタイルに帰らないといけない。その準備は今リノたちがしてくれてるよ」
line = "「さて、キミたちはこれからアルタイルに帰らないといけない。その準備は今リノたちがしてくれてるよ」"

[[dialogue]]
speaker = "クロト"
# 「ラクシャも来るのか？　味方だってわかったんだし、また新星学園に──」
line = "「ラクシャも来るのか？　味方だってわかったんだし、また新星学園に──」"

[[dialogue]]
speaker = "ラクシャ"
# 「いや、ボクは行けない」
line = "「いや、ボクは行けない」"

[[dialogue]]
speaker = "クロト"
# 「──！」
line = "「──！」"

[[dialogue]]
speaker = "unk"
# 目の前にいたラクシャの姿がかき消える。
line = "目の前にいたラクシャの姿がかき消える。"

[[dialogue]]
speaker = "ラクシャ"
# 『ごめんね。さっきまで見せてた姿はただのイメージだ。ボクは今、第零層にいる』
line = "『ごめんね。さっきまで見せてた姿はただのイメージだ。ボクは今、第零層にいる』"

[[dialogue]]
speaker = "ラクシャ"
# 『残念ながら、フィーニスの塔にいる守護天使はみんなルヴィネに封印されていた』
line = "『残念ながら、フィーニスの塔にいる守護天使はみんなルヴィネに封印されていた』"

[[dialogue]]
speaker = "ラクシャ"
# 『ボクはフィーニスの塔のコントロールを奪うために、半身と同化した。ボクも間もなく封印されて動けなくなる』
line = "『ボクはフィーニスの塔のコントロールを奪うために、半身と同化した。ボクも間もなく封印されて動けなくなる』"

[[dialogue]]
speaker = "ラクシャ"
# 『だからここで一旦お別れだ』
line = "『だからここで一旦お別れだ』"

[[dialogue]]
speaker = "クロト"
# 「……わかった」
line = "「……わかった」"

[[dialogue]]
speaker = "クロト"
# 「いつか迎えに来るよ、環」
line = "「いつか迎えに来るよ、環」"

[[dialogue]]
speaker = "ラクシャ"
# 『あのさぁ……』
line = "『あのさぁ……』"

[[dialogue]]
speaker = "ラクシャ"
# 『それは２人っきりの時って言ったじゃん』
line = "『それは２人っきりの時って言ったじゃん』"

[[dialogue]]
speaker = "ラクシャ"
# 『じゃあフィーニスの塔の前に出すよ。行ってらっしゃい！』
line = "『じゃあフィーニスの塔の前に出すよ。行ってらっしゃい！』"

[[dialogue]]
speaker = "クロト"
# 「ああ！　後は任せてくれ！」
line = "「ああ！　後は任せてくれ！」"
