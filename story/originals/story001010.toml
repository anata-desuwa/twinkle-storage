[[dialogue]]
speaker = "unk"
# 堕天使パテルを倒して数日後。ことの経緯を改めて星徒会で報告した。
line = "堕天使パテルを倒して数日後。ことの経緯を改めて星徒会で報告した。"

[[dialogue]]
speaker = "ヴィーナス"
# 「よくやったわクロト。大変だったみたいね」
line = "「よくやったわクロト。大変だったみたいね」"

[[dialogue]]
speaker = "unk"
# いろいろあった……
line = "いろいろあった……"

[[dialogue]]
speaker = "ヴィーナス"
# 「何はともあれお疲れ様。遊園地のお土産もありがとね♪」
line = "「何はともあれお疲れ様。遊園地のお土産もありがとね♪」"

[[dialogue]]
speaker = "マトイ"
# 「あの日以来、『死神』の噂もなし。今度こそ完全解決ね。……ホッ、よかった～」
line = "「あの日以来、『死神』の噂もなし。今度こそ完全解決ね。……ホッ、よかった～」"

[[dialogue]]
speaker = "サーシャ"
# 「ところで、堕天使はどうやってフィーニスの塔から出てきたのかしら？」
line = "「ところで、堕天使はどうやってフィーニスの塔から出てきたのかしら？」"

[[dialogue]]
speaker = "アナ"
# 「ダメージを負った堕天使は身を隠し、会長たちがフィーニスの塔から帰還するのに乗じて抜け出した……そう考えれば辻褄は合います」
line = "「ダメージを負った堕天使は身を隠し、会長たちがフィーニスの塔から帰還するのに乗じて抜け出した……そう考えれば辻褄は合います」"

[[dialogue]]
speaker = "ヴィーナス"
# 「服にくっついてる虫みたいね」
line = "「服にくっついてる虫みたいね」"

[[dialogue]]
speaker = "unk"
# パテルはどうなった？
line = "パテルはどうなった？"

[[dialogue]]
speaker = "アナ"
# 「アニマ先輩の義体には適合しませんでした。やはり分裂した魂を収集するのが難しかったようです」
line = "「アニマ先輩の義体には適合しませんでした。やはり分裂した魂を収集するのが難しかったようです」"

[[dialogue]]
speaker = "unk"
# …………
line = "…………"

[[dialogue]]
speaker = "マトイ"
# 「それは残念だけど……きっとまた会えるよ」
line = "「それは残念だけど……きっとまた会えるよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうね。ちょこざいなチビっ子みたいだし、そのうちひょっこり顔を出すわよ」
line = "「そうね。ちょこざいなチビっ子みたいだし、そのうちひょっこり顔を出すわよ」"

[[dialogue]]
speaker = "サーシャ"
# 「いつか鎌仲間で会ってみたいわね～」
line = "「いつか鎌仲間で会ってみたいわね～」"

[[dialogue]]
speaker = "グロリア"
# 「あ、会長さん、こんにちは」
line = "「あ、会長さん、こんにちは」"

[[dialogue]]
speaker = "フラン"
# 「よ、遊園地以来だな」
line = "「よ、遊園地以来だな」"

[[dialogue]]
speaker = "unk"
# この前はありがとう
line = "この前はありがとう"

[[dialogue]]
speaker = "グロリア"
# 「いいえ。私こそ会長さんのおかげで助かりました」
line = "「いいえ。私こそ会長さんのおかげで助かりました」"

[[dialogue]]
speaker = "フラン"
# 「死神と戦うなんてまたとない経験ができたしな。わらわら出てくるのは予想外だったが──」
line = "「死神と戦うなんてまたとない経験ができたしな。わらわら出てくるのは予想外だったが──」"

[[dialogue]]
speaker = "フラン"
# 「あー！　先に死神倒したら御前試合って約束してたのに、結局勝負つかなかったじゃねえか！　クソッ、会長に挑戦するチャンスだったのに！」
line = "「あー！　先に死神倒したら御前試合って約束してたのに、結局勝負つかなかったじゃねえか！　クソッ、会長に挑戦するチャンスだったのに！」"

[[dialogue]]
speaker = "グロリア"
# 「ふふ、フランさんは相変わらずですね」
line = "「ふふ、フランさんは相変わらずですね」"

[[dialogue]]
speaker = "フラン"
# 「あ、グロリア。スカートの後ろめくれてんぞ」
line = "「あ、グロリア。スカートの後ろめくれてんぞ」"

[[dialogue]]
speaker = "グロリア"
# 「あっ、お恥ずかしい……失礼しました」
line = "「あっ、お恥ずかしい……失礼しました」"

[[dialogue]]
speaker = "グロリア"
# 「やはりフランさんは親切ですね。死ぬならフランさんと一緒に……」
line = "「やはりフランさんは親切ですね。死ぬならフランさんと一緒に……」"

[[dialogue]]
speaker = "unk"
# グロリアさんも変わりませんね……
line = "グロリアさんも変わりませんね……"

[[dialogue]]
speaker = "フラン"
# 「……グロリア」
line = "「……グロリア」"

[[dialogue]]
speaker = "グロリア"
# 「はい」
line = "「はい」"

[[dialogue]]
speaker = "フラン"
# 「パテルに文句つけられた時はああ言ったが、本気で生きたくないやつに『生きろ』だなんて言うつもりはねえ」
line = "「パテルに文句つけられた時はああ言ったが、本気で生きたくないやつに『生きろ』だなんて言うつもりはねえ」"

[[dialogue]]
speaker = "フラン"
# 「今も死にたいって思ってるか？」
line = "「今も死にたいって思ってるか？」"

[[dialogue]]
speaker = "グロリア"
# 「……はい」
line = "「……はい」"

[[dialogue]]
speaker = "グロリア"
# 「でも生きなければいけない。両親が繋いでくれた命ですから」
line = "「でも生きなければいけない。両親が繋いでくれた命ですから」"

[[dialogue]]
speaker = "グロリア"
# 「だけどそれだけじゃなくて……少しだけ、生きたいとも思っています」
line = "「だけどそれだけじゃなくて……少しだけ、生きたいとも思っています」"

[[dialogue]]
speaker = "グロリア"
# 「この前の遊園地は楽しかったですから。割引券ももらいましたし、また行きたいです」
line = "「この前の遊園地は楽しかったですから。割引券ももらいましたし、また行きたいです」"

[[dialogue]]
speaker = "フラン"
# 「……そうか」
line = "「……そうか」"

[[dialogue]]
speaker = "グロリア"
# 「プルちゃんも一緒だといいのですけど。アニマさんの作った義体は……」
line = "「プルちゃんも一緒だといいのですけど。アニマさんの作った義体は……」"

[[dialogue]]
speaker = "unk"
# ダメだったらしいです
line = "ダメだったらしいです"

[[dialogue]]
speaker = "グロリア"
# 「そうですか……残念です」
line = "「そうですか……残念です」"

[[dialogue]]
speaker = "フラン"
# 「フン、オレはあいつのことなんざどうでもいいっての。どうせ鬱陶しいことしか言ってこないしな」
line = "「フン、オレはあいつのことなんざどうでもいいっての。どうせ鬱陶しいことしか言ってこないしな」"

[[dialogue]]
speaker = "フラン"
# 「……だけど絶叫マシーン勝負の決着は付け損ねたな」
line = "「……だけど絶叫マシーン勝負の決着は付け損ねたな」"

[[dialogue]]
speaker = "グロリア"
# 「フランさんは素直じゃないですね」
line = "「フランさんは素直じゃないですね」"

[[dialogue]]
speaker = "フラン"
# 「うるせえ」
line = "「うるせえ」"

[[dialogue]]
speaker = "環"
# 「さぁさ、今日も魔王とヴィーナスをストーキングしますかね。ホント地道すぎて涙ちょちょぎれちゃうよ。これでもボク守護天使なのに」
line = "「さぁさ、今日も魔王とヴィーナスをストーキングしますかね。ホント地道すぎて涙ちょちょぎれちゃうよ。これでもボク守護天使なのに」"

[[dialogue]]
speaker = "パテル"
# 『聞こえますか……あたしはあなたの心に直接話しかけています……』
line = "『聞こえますか……あたしはあなたの心に直接話しかけています……』"

[[dialogue]]
speaker = "環"
# 「いや、ほんとに直接話しかけてこないでよ。守護天使《試練》のパテルがいきなり何の用さ」
line = "「いや、ほんとに直接話しかけてこないでよ。守護天使《試練》のパテルがいきなり何の用さ」"

[[dialogue]]
speaker = "パテル"
# 『ラクシャ～、体ちょうだい？』
line = "『ラクシャ～、体ちょうだい？』"

[[dialogue]]
speaker = "環"
# 「は？　パテルはリクリエに手出ししない方針でしょ？　何するつもり？」
line = "「は？　パテルはリクリエに手出ししない方針でしょ？　何するつもり？」"

[[dialogue]]
speaker = "パテル"
# 『いや～、悲しい別れを演出して、後で出てきて驚かそうと思ったらホントに義体が使えなくてさ。あたしが驚いちゃった！』
line = "『いや～、悲しい別れを演出して、後で出てきて驚かそうと思ったらホントに義体が使えなくてさ。あたしが驚いちゃった！』"

[[dialogue]]
speaker = "環"
# 「茶番じゃん。グダグダだな～」
line = "「茶番じゃん。グダグダだな～」"

[[dialogue]]
speaker = "パテル"
# 『だからお願～い、肉体作って作って～っ。あなたの権能ならできるでしょ。その体もそうやって拵えたものだし』
line = "『だからお願～い、肉体作って作って～っ。あなたの権能ならできるでしょ。その体もそうやって拵えたものだし』"

[[dialogue]]
speaker = "環"
# 「そう言われてもさ、今は守護天使の力も制限されてるし、ホイホイ出せるものじゃないんだよ？」
line = "「そう言われてもさ、今は守護天使の力も制限されてるし、ホイホイ出せるものじゃないんだよ？」"

[[dialogue]]
speaker = "パテル"
# 『そこをなんとかお願い！　死に関わる守護天使のよしみでさー』
line = "『そこをなんとかお願い！　死に関わる守護天使のよしみでさー』"

[[dialogue]]
speaker = "パテル"
# 『早くしないと遊園地の割引券使えなくなっちゃうよ～！　早く早く～！』
line = "『早くしないと遊園地の割引券使えなくなっちゃうよ～！　早く早く～！』"

[[dialogue]]
speaker = "環"
# 「うるさ～い！　駄々っ子か！　仕方ないなぁ……肉体を用意する代わり、ボクの手伝いもしてもらうからね！」
line = "「うるさ～い！　駄々っ子か！　仕方ないなぁ……肉体を用意する代わり、ボクの手伝いもしてもらうからね！」"

[[dialogue]]
speaker = "パテル"
# 『やった～！　ラクシャ大好きー！　さすが『流転』を司る守護天使様は心が広いなぁ～！』
line = "『やった～！　ラクシャ大好きー！　さすが『流転』を司る守護天使様は心が広いなぁ～！』"

[[dialogue]]
speaker = "環"
# 「言葉に心がこもってないなぁ……」
line = "「言葉に心がこもってないなぁ……」"

[[dialogue]]
speaker = "パテル"
# 『いよぉし、待っててね！　今度こそ三界を遊び尽くすぞ～！』
line = "『いよぉし、待っててね！　今度こそ三界を遊び尽くすぞ～！』"
