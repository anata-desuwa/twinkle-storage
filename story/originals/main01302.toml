[[dialogue]]
speaker = "unk"
# 第２話,グレート・ウォール,B
line = "第２話,グレート・ウォール,B"

[[dialogue]]
speaker = "unk"
# 「<b>人間界を犠牲に</b>他の二界を救う──なんて。そんなギャンビットは、あまり褒められた手ではないわね」
line = "「<b>人間界を犠牲に</b>他の二界を救う──なんて。そんなギャンビットは、あまり褒められた手ではないわね」"

[[dialogue]]
speaker = "リノ"
# 「私の息子──どこへやったのかしら？　セドナ」
line = "「私の息子──どこへやったのかしら？　セドナ」"

[[dialogue]]
speaker = "アイリーン"
# 「あっ……あなたは……？」
line = "「あっ……あなたは……？」"

[[dialogue]]
speaker = "カヤ"
# 「誰──？」
line = "「誰──？」"

[[dialogue]]
speaker = "セドナ"
# 「……リノか」
line = "「……リノか」"

[[dialogue]]
speaker = "セドナ"
# 「今さらここへ顔を出すとは──どういう風の吹き回しだ？　入場を許可した覚えはないが」
line = "「今さらここへ顔を出すとは──どういう風の吹き回しだ？　入場を許可した覚えはないが」"

[[dialogue]]
speaker = "リノ"
# 「つれないわね、相変わらず。まあ……あなたらしいと言えばらしいけど」
line = "「つれないわね、相変わらず。まあ……あなたらしいと言えばらしいけど」"

[[dialogue]]
speaker = "unk"
# リノ──人間界では緋宮リノと名乗っている──彼女は、セドナの冷徹な態度にため息をついた。
line = "リノ──人間界では緋宮リノと名乗っている──彼女は、セドナの冷徹な態度にため息をついた。"

[[dialogue]]
speaker = "アイリーン"
# 「上官──この方とは、どういうご関係なのでしょうか……？」
line = "「上官──この方とは、どういうご関係なのでしょうか……？」"

[[dialogue]]
speaker = "セドナ"
# 「昔なじみ……いや。とうに切れた縁だ」
line = "「昔なじみ……いや。とうに切れた縁だ」"

[[dialogue]]
speaker = "セドナ"
# 「森を去り、ネビュラを抜けたはみ出し者──<ruby=ヤーガ>はぐれ魔女</ruby>だよ。おまえ達、この惨めな姿を目に焼きつけておけ」
line = "「森を去り、ネビュラを抜けたはみ出し者──<ruby>はぐれ魔女<rt>ヤーガ</rt></ruby>だよ。おまえ達、この惨めな姿を目に焼きつけておけ」"

[[dialogue]]
speaker = "アイリーン"
# 「<ruby=ヤーガ>はぐれ魔女</ruby>……！　は、初めて会いました……」
line = "「<ruby>はぐれ魔女<rt>ヤーガ</rt></ruby>……！　は、初めて会いました……」"

[[dialogue]]
speaker = "カヤ"
# 「人間界で──人間に紛れて暮らしてた、ってこと……？」
line = "「人間界で──人間に紛れて暮らしてた、ってこと……？」"

[[dialogue]]
speaker = "リノ"
# 「人を珍獣みたいに言わないでくれる？　別に尻尾は出してないわよ」
line = "「人を珍獣みたいに言わないでくれる？　別に尻尾は出してないわよ」"

[[dialogue]]
speaker = "リノ"
# 「かつてのパートナーに向かって──ずいぶんな言い草じゃないかしら？」
line = "「かつてのパートナーに向かって──ずいぶんな言い草じゃないかしら？」"

[[dialogue]]
speaker = "セドナ"
# 「ほざくな。魔女の掟を破った者に、今さらかける情けなどない」
line = "「ほざくな。魔女の掟を破った者に、今さらかける情けなどない」"

[[dialogue]]
speaker = "アイリーン"
# （パートナー──そういえば……上官には昔、バディを組んでいた相方がいたとか）
line = "（パートナー──そういえば……上官には昔、バディを組んでいた相方がいたとか）"

[[dialogue]]
speaker = "カヤ"
# （噂程度だけど、聞いたことある。ネビュラの筆頭エージェントペア──二人で多くの戦果を上げたって）
line = "（噂程度だけど、聞いたことある。ネビュラの筆頭エージェントペア──二人で多くの戦果を上げたって）"

[[dialogue]]
speaker = "アイリーン"
# （でも……だったらどうして、二人は道を違えてしまったんでしょう……？）
line = "（でも……だったらどうして、二人は道を違えてしまったんでしょう……？）"

[[dialogue]]
speaker = "unk"
# アイリーンらのささやきも意に介さず、向かい合った旧縁の仲は互いを見据えていた。
line = "アイリーンらのささやきも意に介さず、向かい合った旧縁の仲は互いを見据えていた。"

[[dialogue]]
speaker = "リノ"
# 「どうも数日前から──愛しい息子の姿が見えなくってね。探してるところなのよ」
line = "「どうも数日前から──愛しい息子の姿が見えなくってね。探してるところなのよ」"

[[dialogue]]
speaker = "セドナ"
# 「息子か。いつ貴様が人間の子など身ごもったのだ？」
line = "「息子か。いつ貴様が人間の子など身ごもったのだ？」"

[[dialogue]]
speaker = "リノ"
# 「拾ったのよ。たまたまね」
line = "「拾ったのよ。たまたまね」"

[[dialogue]]
speaker = "セドナ"
# 「ふん。緋宮と名乗る人間のことなら把握している。しかし、奴は学園所属の星騎士のはずだ。訪ねる場所がお門違いではないか？」
line = "「ふん。緋宮と名乗る人間のことなら把握している。しかし、奴は学園所属の星騎士のはずだ。訪ねる場所がお門違いではないか？」"

[[dialogue]]
speaker = "リノ"
# 「アナちゃんからも聞いたわよ。ちょっと遠出してるだけだから心配しないで──ってね」
line = "「アナちゃんからも聞いたわよ。ちょっと遠出してるだけだから心配しないで──ってね」"

[[dialogue]]
speaker = "リノ"
# 「でも、もしかしたらあなたなら──何か知ってるんじゃないかと思って」
line = "「でも、もしかしたらあなたなら──何か知ってるんじゃないかと思って」"

[[dialogue]]
speaker = "セドナ"
# 「……意地の悪い女だ。そこまで掴んでいるなら、最初から素直に問えばいい」
line = "「……意地の悪い女だ。そこまで掴んでいるなら、最初から素直に問えばいい」"

[[dialogue]]
speaker = "unk"
# セドナは諦めたように嘆息し、それから淡々と語った。
line = "セドナは諦めたように嘆息し、それから淡々と語った。"

[[dialogue]]
speaker = "セドナ"
# 「確かに我々は緋宮クロト──並びに学園の生徒５名を魔界へ送った。“うろ”を通じてな。だが、それはあくまで彼らの要望を聞き届けた結果にすぎない」
line = "「確かに我々は緋宮クロト──並びに学園の生徒５名を魔界へ送った。“うろ”を通じてな。だが、それはあくまで彼らの要望を聞き届けた結果にすぎない」"

[[dialogue]]
speaker = "リノ"
# 「そうね。ヴィーナスちゃんの失踪──引くに引けない状況だったのは聞いたわ」
line = "「そうね。ヴィーナスちゃんの失踪──引くに引けない状況だったのは聞いたわ」"

[[dialogue]]
speaker = "リノ"
# 「だけど……あなたが彼らを送った理由は、他にもあるんじゃない？」
line = "「だけど……あなたが彼らを送った理由は、他にもあるんじゃない？」"

[[dialogue]]
speaker = "セドナ"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# リノから問いをぶつけられ、セドナはしばし逡巡したのち、こぼした。
line = "リノから問いをぶつけられ、セドナはしばし逡巡したのち、こぼした。"

[[dialogue]]
speaker = "セドナ"
# 「……奴らは邪魔だ。グレート・ウォール計画遂行のために」
line = "「……奴らは邪魔だ。グレート・ウォール計画遂行のために」"

[[dialogue]]
speaker = "リノ"
# 「……！　やっぱり……」
line = "「……！　やっぱり……」"

[[dialogue]]
speaker = "リノ"
# 「あなた達はそこまで見越して──<ruby=スターナイト>星騎士</ruby>の戦力減衰を狙ったのね……！」
line = "「あなた達はそこまで見越して──<ruby>星騎士<rt>スターナイト</rt></ruby>の戦力減衰を狙ったのね……！」"

[[dialogue]]
speaker = "セドナ"
# 「……ふぅ。そう鼻息を荒くするな」
line = "「……ふぅ。そう鼻息を荒くするな」"

[[dialogue]]
speaker = "セドナ"
# 「リノ。貴様はまだ計画の骨子しか知らない。まだ我々が歩むべき進路を模索していた頃の」
line = "「リノ。貴様はまだ計画の骨子しか知らない。まだ我々が歩むべき進路を模索していた頃の」"

[[dialogue]]
speaker = "セドナ"
# 「グレート・ウォールはすでに──最も実現性の高い作戦として決定づけられている。異を挟む隊員は誰もいない」
line = "「グレート・ウォールはすでに──最も実現性の高い作戦として決定づけられている。異を挟む隊員は誰もいない」"

[[dialogue]]
speaker = "セドナ"
# 「ここはもう、貴様のいた時代とは違うのだよ。魔女も、ネビュラも、人間界もな」
line = "「ここはもう、貴様のいた時代とは違うのだよ。魔女も、ネビュラも、人間界もな」"

[[dialogue]]
speaker = "リノ"
# 「っ……なら──条件が揃ったっていうの……！？」
line = "「っ……なら──条件が揃ったっていうの……！？」"

[[dialogue]]
speaker = "セドナ"
# 「ああ。喜ぶべきことに、な」
line = "「ああ。喜ぶべきことに、な」"

[[dialogue]]
speaker = "セドナ"
# 「グレート・ウォール──それは、リクリエの打破という我々の宿願を果たすための計画」
line = "「グレート・ウォール──それは、リクリエの打破という我々の宿願を果たすための計画」"

[[dialogue]]
speaker = "セドナ"
# 「そのために我々は心血を注いできた。ネビュラという組織を立ち上げ、人間界に本部を構え、着々と準備を進めてきた」
line = "「そのために我々は心血を注いできた。ネビュラという組織を立ち上げ、人間界に本部を構え、着々と準備を進めてきた」"

[[dialogue]]
speaker = "セドナ"
# 「計画の骨子はただひとつ──リクリエの計り知れない力を<b>封じ込める</b>こと」
line = "「計画の骨子はただひとつ──リクリエの計り知れない力を<b>封じ込める</b>こと」"

[[dialogue]]
speaker = "セドナ"
# 「三界を巻き込んでリセットする超常現象。その膨大なエネルギーを人間界という一点に集約させ、封鎖する」
line = "「三界を巻き込んでリセットする超常現象。その膨大なエネルギーを人間界という一点に集約させ、封鎖する」"

[[dialogue]]
speaker = "セドナ"
# 「それによって──本来なら被害が及ぶはずの魔界と天界をリクリエから防ぐ。魔力障壁によって蓋をしてな」
line = "「それによって──本来なら被害が及ぶはずの魔界と天界をリクリエから防ぐ。魔力障壁によって蓋をしてな」"

[[dialogue]]
speaker = "unk"
# それは言わば──人間界<b>でのみ</b>リクリエを起こさせる方法論だった。
line = "それは言わば──人間界<b>でのみ</b>リクリエを起こさせる方法論だった。"

[[dialogue]]
speaker = "カヤ"
# 「ん。私たちも……そう聞かされてきた。三界を救うのは難しいから、せめて二界は守るんだって」
line = "「ん。私たちも……そう聞かされてきた。三界を救うのは難しいから、せめて二界は守るんだって」"

[[dialogue]]
speaker = "アイリーン"
# 「はい──ネビュラの魔女ならば皆、障壁の魔法は十分に会得してきました」
line = "「はい──ネビュラの魔女ならば皆、障壁の魔法は十分に会得してきました」"

[[dialogue]]
speaker = "セドナ"
# 「無論──他種族が巻き込まれぬよう最善の手は尽くす。<ruby=ラーゴ・シエロ>鏡界の湖</ruby>を占拠し、被害が<ruby=でんぱ>伝播</ruby>せぬよう封鎖する。そのためのエージェントはすでに派遣済みだ」
line = "「無論──他種族が巻き込まれぬよう最善の手は尽くす。<ruby>鏡界の湖<rt>ラーゴ・シエロ</rt></ruby>を占拠し、被害が<ruby>伝播<rt>でんぱ</rt></ruby>せぬよう封鎖する。そのためのエージェントはすでに派遣済みだ」"

[[dialogue]]
speaker = "セドナ"
# 「三界に散ったあらゆるネビュラの支部が……ひとつの理想へ向けて動いている。それだけだ」
line = "「三界に散ったあらゆるネビュラの支部が……ひとつの理想へ向けて動いている。それだけだ」"

[[dialogue]]
speaker = "リノ"
# 「確かに……リクリエの阻止はネビュラの本懐。その点に関して異論はないわ」
line = "「確かに……リクリエの阻止はネビュラの本懐。その点に関して異論はないわ」"

[[dialogue]]
speaker = "リノ"
# 「……けれど、大事なことが抜けているわね。リクリエの力を閉じ込めたあと、人間界はどうなるっていうの？」
line = "「……けれど、大事なことが抜けているわね。リクリエの力を閉じ込めたあと、人間界はどうなるっていうの？」"

[[dialogue]]
speaker = "unk"
# セドナは瞑目し、冷徹に答えた。
line = "セドナは瞑目し、冷徹に答えた。"

[[dialogue]]
speaker = "セドナ"
# 「人間界は──そのまま滅ぶ。三界をまたごうという破壊に、ひとつの領域が抗えるはずもない。貴様の言う通り、<ruby=ギャンビット>代償</ruby>だ」
line = "「人間界は──そのまま滅ぶ。三界をまたごうという破壊に、ひとつの領域が抗えるはずもない。貴様の言う通り、<ruby>代償<rt>ギャンビット</rt></ruby>だ」"

[[dialogue]]
speaker = "リノ"
# 「っ……！」
line = "「っ……！」"

[[dialogue]]
speaker = "unk"
# カヤ、アイリーンの２名もまた静かに目を伏せただけだった。
line = "カヤ、アイリーンの２名もまた静かに目を伏せただけだった。"

[[dialogue]]
speaker = "unk"
# 彼女らネビュラのエージェントにとって──その結末は“現実的な解決策”として周知されていたものだった。
line = "彼女らネビュラのエージェントにとって──その結末は“現実的な解決策”として周知されていたものだった。"

[[dialogue]]
speaker = "リノ"
# 「グレート・ウォール計画は確かに……私のいた頃からひとつのビジョンとしてあった」
line = "「グレート・ウォール計画は確かに……私のいた頃からひとつのビジョンとしてあった」"

[[dialogue]]
speaker = "リノ"
# 「けれどあれには──二つの問題点があったはず。ひとつはリクリエのエネルギーを集約させるその手段。もうひとつは、障壁を維持するだけの魔力」
line = "「けれどあれには──二つの問題点があったはず。ひとつはリクリエのエネルギーを集約させるその手段。もうひとつは、障壁を維持するだけの魔力」"

[[dialogue]]
speaker = "セドナ"
# 「その通り。だが……それらの障壁は、どちらも数奇な幸運によって解消された」
line = "「その通り。だが……それらの障壁は、どちらも数奇な幸運によって解消された」"

[[dialogue]]
speaker = "セドナ"
# 「特にひとつ目──最大の難関と思われた『リクリエの集約』に関しては、我々が手を尽くすまでもなくなった」
line = "「特にひとつ目──最大の難関と思われた『リクリエの集約』に関しては、我々が手を尽くすまでもなくなった」"

[[dialogue]]
speaker = "リノ"
# 「……！　どういうこと──？」
line = "「……！　どういうこと──？」"

[[dialogue]]
speaker = "セドナ"
# 「わざわざこちらが干渉せずとも、あちらからまとまってくれたのさ。リクリエ現象にまつわる膨大なエネルギーを濃縮させた『<ruby=コア>核</ruby>』となって」
line = "「わざわざこちらが干渉せずとも、あちらからまとまってくれたのさ。リクリエ現象にまつわる膨大なエネルギーを濃縮させた『<ruby>核<rt>コア</rt></ruby>』となって」"

[[dialogue]]
speaker = "セドナ"
# 「『リクリエの使徒』──仮面を被った人間体としてな。もっとも、当人はアポロなどと名乗っていたが」
line = "「『リクリエの使徒』──仮面を被った人間体としてな。もっとも、当人はアポロなどと名乗っていたが」"

[[dialogue]]
speaker = "リノ"
# 「仮面の……！　貴女たちは、あれをそう捉えたのね」
line = "「仮面の……！　貴女たちは、あれをそう捉えたのね」"

[[dialogue]]
speaker = "セドナ"
# 「直接の交戦と、星騎士たちからの情報を踏まえて我々はひとつの結論に辿り着いた」
line = "「直接の交戦と、星騎士たちからの情報を踏まえて我々はひとつの結論に辿り着いた」"

[[dialogue]]
speaker = "セドナ"
# 「リクリエの使徒は常軌を逸した存在だ。おそらく現状はまだ、核に宿った人格が力の大部分を抑え込んでいる状態だろう」
line = "「リクリエの使徒は常軌を逸した存在だ。おそらく現状はまだ、核に宿った人格が力の大部分を抑え込んでいる状態だろう」"

[[dialogue]]
speaker = "セドナ"
# 「だが……奴の消耗が激しくなれば、その制御もいずれは解き放たれる」
line = "「だが……奴の消耗が激しくなれば、その制御もいずれは解き放たれる」"

[[dialogue]]
speaker = "セドナ"
# 「要するに、追い詰めれば追い詰めるほど、あれは新たな力に目覚めるわけだ。フフ──実にヒーローらしいではないか」
line = "「要するに、追い詰めれば追い詰めるほど、あれは新たな力に目覚めるわけだ。フフ──実にヒーローらしいではないか」"

[[dialogue]]
speaker = "unk"
# アポロはリクリエの使徒である。
line = "アポロはリクリエの使徒である。"

[[dialogue]]
speaker = "unk"
# よって、彼女が引き出す底力とはすなわち、リクリエに由来するエネルギーということになる。
line = "よって、彼女が引き出す底力とはすなわち、リクリエに由来するエネルギーということになる。"

[[dialogue]]
speaker = "セドナ"
# 「そして……これは我々にとって極めて幸運だ。リクリエというマクロな天災を相手取らずとも、人間体ひとつを対処すれば済むのだからな」
line = "「そして……これは我々にとって極めて幸運だ。リクリエというマクロな天災を相手取らずとも、人間体ひとつを対処すれば済むのだからな」"

[[dialogue]]
speaker = "リノ"
# 「仮面の使徒……ネビュラは、彼女との直接対決を望んでいるのね」
line = "「仮面の使徒……ネビュラは、彼女との直接対決を望んでいるのね」"

[[dialogue]]
speaker = "リノ"
# 「でも──使徒の見かけがいくら人間だとしても、本質がリクリエであることに変わりない。そう容易くはいかないはずよ」
line = "「でも──使徒の見かけがいくら人間だとしても、本質がリクリエであることに変わりない。そう容易くはいかないはずよ」"

[[dialogue]]
speaker = "セドナ"
# 「いかにも。真価を見せたあれとの戦闘は、それこそ人間界が耐えきれぬほどの死闘となるだろう」
line = "「いかにも。真価を見せたあれとの戦闘は、それこそ人間界が耐えきれぬほどの死闘となるだろう」"

[[dialogue]]
speaker = "セドナ"
# 「だが……構わない。この身が灰燼に帰そうとも、一族の宿願が果たされるのならば」
line = "「だが……構わない。この身が灰燼に帰そうとも、一族の宿願が果たされるのならば」"

[[dialogue]]
speaker = "リノ"
# 「セドナ……」
line = "「セドナ……」"

[[dialogue]]
speaker = "unk"
# セドナの<ruby=そうぼう>双眸</ruby>には覚悟の<ruby=ほむら>焔</ruby>がたぎっていた。
line = "セドナの<ruby>双眸<rt>そうぼう</rt></ruby>には覚悟の<ruby>焔<rt>ほむら</rt></ruby>がたぎっていた。"

[[dialogue]]
speaker = "unk"
# ネビュラ擁するグレート・ウォール計画──その真意は<ruby=アポロ>使徒</ruby>を人間界へ封じ込めることで、もろともに滅び去ってもらおうという算段だった。
line = "ネビュラ擁するグレート・ウォール計画──その真意は<ruby>使徒<rt>アポロ</rt></ruby>を人間界へ封じ込めることで、もろともに滅び去ってもらおうという算段だった。"

[[dialogue]]
speaker = "セドナ"
# 「残るひとつの懸念点──障壁を維持する根源についても、示し合わせたかのように救いの手がもたらされた」
line = "「残るひとつの懸念点──障壁を維持する根源についても、示し合わせたかのように救いの手がもたらされた」"

[[dialogue]]
speaker = "セドナ"
# 「当代における光の魔女──クラウディア様の生誕によって」
line = "「当代における光の魔女──クラウディア様の生誕によって」"

[[dialogue]]
speaker = "リノ"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "セドナ"
# 「よって、今の我々に選択の余地はない。ただリクリエから魔界と天界を守るため全力を尽くすだけだ」
line = "「よって、今の我々に選択の余地はない。ただリクリエから魔界と天界を守るため全力を尽くすだけだ」"

[[dialogue]]
speaker = "リノ"
# 「あなたは……ここが、人間界がどうなってもいいっていうの？」
line = "「あなたは……ここが、人間界がどうなってもいいっていうの？」"

[[dialogue]]
speaker = "セドナ"
# 「青い。青いな。いつからそんな甘えたことを抜かすようになった、リノ」
line = "「青い。青いな。いつからそんな甘えたことを抜かすようになった、リノ」"

[[dialogue]]
speaker = "セドナ"
# 「よいとか悪いとか──そんな次元の話ではないんだ、これは。この計画を除き、実現の可能性が高いプランは他にひとつもない」
line = "「よいとか悪いとか──そんな次元の話ではないんだ、これは。この計画を除き、実現の可能性が高いプランは他にひとつもない」"

[[dialogue]]
speaker = "セドナ"
# 「トカゲの尻尾と言うつもりはない。だが、心の臓を守るためには──腕や足さえも犠牲に払わねばならない時もある」
line = "「トカゲの尻尾と言うつもりはない。だが、心の臓を守るためには──腕や足さえも犠牲に払わねばならない時もある」"

[[dialogue]]
speaker = "セドナ"
# 「何もかも無事で済む方策……そんなものがあれば、どれほど楽だったろうかと思うよ」
line = "「何もかも無事で済む方策……そんなものがあれば、どれほど楽だったろうかと思うよ」"

[[dialogue]]
speaker = "unk"
# そう語るセドナの手は自然と力み、震えていた。
line = "そう語るセドナの手は自然と力み、震えていた。"

[[dialogue]]
speaker = "セドナ"
# 「初代『光の魔女』──真祖ディアナは森を救った。だが、その救済の法をもってしても、リクリエそのものは防げなかった」
line = "「初代『光の魔女』──真祖ディアナは森を救った。だが、その救済の法をもってしても、リクリエそのものは防げなかった」"

[[dialogue]]
speaker = "セドナ"
# 「以来、白虎暦も、朱雀暦を経ても……私たちの祖は度重なるリクリエを退けられなかった。彼女らの無念は今も森の書庫に刻まれている」
line = "「以来、白虎暦も、朱雀暦を経ても……私たちの祖は度重なるリクリエを退けられなかった。彼女らの無念は今も森の書庫に刻まれている」"

[[dialogue]]
speaker = "セドナ"
# 「ゆえに今こそ、組織の──いや、一族の悲願は果たされねばならない。その尊さは貴様も承知のはずだ、リノ！」
line = "「ゆえに今こそ、組織の──いや、一族の悲願は果たされねばならない。その尊さは貴様も承知のはずだ、リノ！」"

[[dialogue]]
speaker = "リノ"
# 「っ……私たち──魔女の……そうね……」
line = "「っ……私たち──魔女の……そうね……」"

[[dialogue]]
speaker = "unk"
# セドナの気迫を前に、リノは言葉を飲み込んだ。
line = "セドナの気迫を前に、リノは言葉を飲み込んだ。"

[[dialogue]]
speaker = "unk"
# 魔女。世界樹に棲まう、長久にして平穏なる一族。
line = "魔女。世界樹に棲まう、長久にして平穏なる一族。"

[[dialogue]]
speaker = "unk"
# 彼女たちの『森』は元来、三界とも隣接した小さなひとつの庭だった。
line = "彼女たちの『森』は元来、三界とも隣接した小さなひとつの庭だった。"

[[dialogue]]
speaker = "unk"
# 森へ迷い込んだ天使を助けたり、はたまた魔界へ紛れた魔女が魔族から施しを受けたり……他種族とも隔てなく交流していた。
line = "森へ迷い込んだ天使を助けたり、はたまた魔界へ紛れた魔女が魔族から施しを受けたり……他種族とも隔てなく交流していた。"

[[dialogue]]
speaker = "unk"
# 中でも人間たちとの交流は盛んで、互いに『森』を行き来するほどの絆を結んでいた。
line = "中でも人間たちとの交流は盛んで、互いに『森』を行き来するほどの絆を結んでいた。"

[[dialogue]]
speaker = "unk"
# しかし、彼女たちの存在はやがて他種族から疎まれるようになる。
line = "しかし、彼女たちの存在はやがて他種族から疎まれるようになる。"

[[dialogue]]
speaker = "unk"
# 当時、三界に降り掛かっていた数多の厄災のためだった。
line = "当時、三界に降り掛かっていた数多の厄災のためだった。"

[[dialogue]]
speaker = "unk"
# 現代においてそれは『リクリエ』現象として周知されているが、当時の暦に厄災を定義する言葉は存在しなかった。
line = "現代においてそれは『リクリエ』現象として周知されているが、当時の暦に厄災を定義する言葉は存在しなかった。"

[[dialogue]]
speaker = "unk"
# そして、何もかも謎めいたこの災いの数々は、やがて魔女たちのせいではないかと囁かれるようになった。
line = "そして、何もかも謎めいたこの災いの数々は、やがて魔女たちのせいではないかと囁かれるようになった。"

[[dialogue]]
speaker = "unk"
# すべての人が魔女を悪とみなしていたわけではない。
line = "すべての人が魔女を悪とみなしていたわけではない。"

[[dialogue]]
speaker = "unk"
# だが、人々の心に巣食う猜疑心はやがて、魔女への迫害という形で顕れていった。
line = "だが、人々の心に巣食う猜疑心はやがて、魔女への迫害という形で顕れていった。"

[[dialogue]]
speaker = "unk"
# 種族の危機にさらされた魔女たちは──『魔女の森』を完全に三界から切り離すことで生き延びた。
line = "種族の危機にさらされた魔女たちは──『魔女の森』を完全に三界から切り離すことで生き延びた。"

[[dialogue]]
speaker = "unk"
# より正確に表現すれば、森全体を覆う結界によって三界との空間的な繋がりを断ったのだ。
line = "より正確に表現すれば、森全体を覆う結界によって三界との空間的な繋がりを断ったのだ。"

[[dialogue]]
speaker = "unk"
# そんな秘儀を可能にしたのが、真祖ディアナによる『光の魔法』だった。
line = "そんな秘儀を可能にしたのが、真祖ディアナによる『光の魔法』だった。"

[[dialogue]]
speaker = "unk"
# その奇跡とも呼べる結界は再構成の瘴気さえ完全に遮断し、結果、魔女の森はリクリエによる災禍からも免れた。
line = "その奇跡とも呼べる結界は再構成の瘴気さえ完全に遮断し、結果、魔女の森はリクリエによる災禍からも免れた。"

[[dialogue]]
speaker = "unk"
# だが……かつて絆を結んだはずの三界は、リクリエに呑まれ滅んでしまった。
line = "だが……かつて絆を結んだはずの三界は、リクリエに呑まれ滅んでしまった。"

[[dialogue]]
speaker = "unk"
# 魔女たちは彼らを恨まなかった。
line = "魔女たちは彼らを恨まなかった。"

[[dialogue]]
speaker = "unk"
# ただ、一度は手を取り合ったはずの絆を捨て、自分たちだけが生き残ってしまったという消えない罪の意識だけが残った。
line = "ただ、一度は手を取り合ったはずの絆を捨て、自分たちだけが生き残ってしまったという消えない罪の意識だけが残った。"

[[dialogue]]
speaker = "unk"
# ディアナには人間の盟友がいた。
line = "ディアナには人間の盟友がいた。"

[[dialogue]]
speaker = "unk"
# 盟友から託された言葉が、いつまでも彼女の心に突き刺さっていた。
line = "盟友から託された言葉が、いつまでも彼女の心に突き刺さっていた。"

[[dialogue]]
speaker = "unk"
# 『この世界は直に滅んでしまうようだ。君たちだけでも逃れたほうがいい』
line = "『この世界は直に滅んでしまうようだ。君たちだけでも逃れたほうがいい』"

[[dialogue]]
speaker = "unk"
# さらに時は巡り、魔女たちは『森』でひっそりと暮らしながら幾度ものリクリエを観察した。
line = "さらに時は巡り、魔女たちは『森』でひっそりと暮らしながら幾度ものリクリエを観察した。"

[[dialogue]]
speaker = "unk"
# 魔女たちにとって、無力さを突きつけられる日々だった。
line = "魔女たちにとって、無力さを突きつけられる日々だった。"

[[dialogue]]
speaker = "unk"
# 隔絶された森から彼らに手を差し伸べることは叶わず、また実現したとてあの厄災を防げる保証などなかった。
line = "隔絶された森から彼らに手を差し伸べることは叶わず、また実現したとてあの厄災を防げる保証などなかった。"

[[dialogue]]
speaker = "unk"
# それでも魔女たちは連綿と歴史を見つめながら──『リクリエ』について見識を深めていく。
line = "それでも魔女たちは連綿と歴史を見つめながら──『リクリエ』について見識を深めていく。"

[[dialogue]]
speaker = "unk"
# 結果、多くのことがわかった。この厄災は何千年かに一度訪れ、すべてを無に帰していくのだと。
line = "結果、多くのことがわかった。この厄災は何千年かに一度訪れ、すべてを無に帰していくのだと。"

[[dialogue]]
speaker = "unk"
# そして終わりを迎えた先では、また新たな始まりがあるのだと。
line = "そして終わりを迎えた先では、また新たな始まりがあるのだと。"

[[dialogue]]
speaker = "unk"
# 魔女たちの歴史、その礎にはずっと、太古の時代に築いた三種族たちとの絆があった。
line = "魔女たちの歴史、その礎にはずっと、太古の時代に築いた三種族たちとの絆があった。"

[[dialogue]]
speaker = "unk"
# その過去を胸に、幾度も幾度も、世界の滅ぶさまを見続けてきた。
line = "その過去を胸に、幾度も幾度も、世界の滅ぶさまを見続けてきた。"

[[dialogue]]
speaker = "unk"
# そんな折だ。
line = "そんな折だ。"

[[dialogue]]
speaker = "unk"
# 旧森羅暦におけるリクリエは──『魔王』なる存在の率いたクルセイダースによって撃退された。
line = "旧森羅暦におけるリクリエは──『魔王』なる存在の率いたクルセイダースによって撃退された。"

[[dialogue]]
speaker = "unk"
# それを契機に、再び『森』は三界へのアクセスが可能となった。
line = "それを契機に、再び『森』は三界へのアクセスが可能となった。"

[[dialogue]]
speaker = "unk"
# 魔女たちにはこれまでの歴史を通じて得た膨大な叡智と魔法がある。
line = "魔女たちにはこれまでの歴史を通じて得た膨大な叡智と魔法がある。"

[[dialogue]]
speaker = "unk"
# そして魔王が予言した通り、次のリクリエはさらに数千年の時を経て必ずやってくる。
line = "そして魔王が予言した通り、次のリクリエはさらに数千年の時を経て必ずやってくる。"

[[dialogue]]
speaker = "unk"
# その規模は最高にして最大。どんな世界さえも抗えない必滅の厄災となって。
line = "その規模は最高にして最大。どんな世界さえも抗えない必滅の厄災となって。"

[[dialogue]]
speaker = "unk"
# ならば──今度こそリクリエを退ける一助となるのが自分たちの使命。魔女たちはそう考えた。
line = "ならば──今度こそリクリエを退ける一助となるのが自分たちの使命。魔女たちはそう考えた。"

[[dialogue]]
speaker = "unk"
# 今は亡き真祖ディアナの悲願を、今度こそ成就させよう、と。
line = "今は亡き真祖ディアナの悲願を、今度こそ成就させよう、と。"

[[dialogue]]
speaker = "リノ"
# （始祖たちの願い……そうね。セドナも、理解してないはずがない。それでも……）
line = "（始祖たちの願い……そうね。セドナも、理解してないはずがない。それでも……）"

[[dialogue]]
speaker = "unk"
# それでも、この非情な作戦を遂行せざるを得なかった。
line = "それでも、この非情な作戦を遂行せざるを得なかった。"

[[dialogue]]
speaker = "unk"
# 戦力差を見積もれば、今の星騎士では今代のリクリエには到底抗えないから。
line = "戦力差を見積もれば、今の星騎士では今代のリクリエには到底抗えないから。"

[[dialogue]]
speaker = "unk"
# その現実はリノも理解していただけに、ネビュラの決断は責められなかった。
line = "その現実はリノも理解していただけに、ネビュラの決断は責められなかった。"

[[dialogue]]
speaker = "カヤ"
# 「……長官。この<ruby=ヤーガ>はぐれ魔女</ruby>さん、どうする？」
line = "「……長官。この<ruby>はぐれ魔女<rt>ヤーガ</rt></ruby>さん、どうする？」"

[[dialogue]]
speaker = "セドナ"
# 「お帰り願おう。我々も準備が忙しい。流星群は勢いを強めている──直に『<ruby=コア>核</ruby>』も姿を現すはずだ」
line = "「お帰り願おう。我々も準備が忙しい。流星群は勢いを強めている──直に『<ruby>核<rt>コア</rt></ruby>』も姿を現すはずだ」"

[[dialogue]]
speaker = "リノ"
# 「──待って」
line = "「──待って」"

[[dialogue]]
speaker = "リノ"
# 「あなた達の決意は──よく理解したわ。でも、今回の流星群については、いくつか目測を見誤っていたはず」
line = "「あなた達の決意は──よく理解したわ。でも、今回の流星群については、いくつか目測を見誤っていたはず」"

[[dialogue]]
speaker = "アイリーン"
# 「……確かに、私たちの予測よりいくらか早い到来でしたが」
line = "「……確かに、私たちの予測よりいくらか早い到来でしたが」"

[[dialogue]]
speaker = "セドナ"
# 「想定より多少早まっただけだ。今後の進行に支障はない」
line = "「想定より多少早まっただけだ。今後の進行に支障はない」"

[[dialogue]]
speaker = "リノ"
# 「その分、準備はいくらか不十分なはずよね」
line = "「その分、準備はいくらか不十分なはずよね」"

[[dialogue]]
speaker = "セドナ"
# 「だったらなんだ──」
line = "「だったらなんだ──」"

[[dialogue]]
speaker = "リノ"
# 「機会を頂戴」
line = "「機会を頂戴」"

[[dialogue]]
speaker = "unk"
# セドナの言葉へ被せるように、リノはきっぱり告げた。
line = "セドナの言葉へ被せるように、リノはきっぱり告げた。"

[[dialogue]]
speaker = "セドナ"
# 「時間がない──と言ったはずだが。何のつもりだ？」
line = "「時間がない──と言ったはずだが。何のつもりだ？」"

[[dialogue]]
speaker = "リノ"
# 「グレート・ウォールの実行を止める権利は私にはない。でも、その前に、私に賭けをさせて」
line = "「グレート・ウォールの実行を止める権利は私にはない。でも、その前に、私に賭けをさせて」"

[[dialogue]]
speaker = "セドナ"
# 「……手段があるとでも？」
line = "「……手段があるとでも？」"

[[dialogue]]
speaker = "unk"
# リノは、無言で慎重に頷いた。
line = "リノは、無言で慎重に頷いた。"

[[dialogue]]
speaker = "セドナ"
# 「これより人間界を襲うのは、３０００年前のそれすら超えるリクリエの本波だ。魔女と星騎士が力を合わせたとて、打ち克つ可能性はゼロに近い」
line = "「これより人間界を襲うのは、３０００年前のそれすら超えるリクリエの本波だ。魔女と星騎士が力を合わせたとて、打ち克つ可能性はゼロに近い」"

[[dialogue]]
speaker = "リノ"
# 「確かに私たちだけでは不十分でしょう。でも、それを言うなら３０００年前もそうだった」
line = "「確かに私たちだけでは不十分でしょう。でも、それを言うなら３０００年前もそうだった」"

[[dialogue]]
speaker = "unk"
# ３０００年前のリクリエを退けたのは誰だったか？
line = "３０００年前のリクリエを退けたのは誰だったか？"

[[dialogue]]
speaker = "unk"
# リノの告げたい言葉は決まっていた──『魔王』。
line = "リノの告げたい言葉は決まっていた──『魔王』。"

[[dialogue]]
speaker = "リノ"
# 「私があの子を拾った責任……それを果たさなくちゃいけないのが、今なの」
line = "「私があの子を拾った責任……それを果たさなくちゃいけないのが、今なの」"

[[dialogue]]
speaker = "リノ"
# 「だけど、そのためには……気づいてもらう必要があるかもしれない」
line = "「だけど、そのためには……気づいてもらう必要があるかもしれない」"

[[dialogue]]
speaker = "リノ"
# 「あの子に──自分が、何者なのか」
line = "「あの子に──自分が、何者なのか」"
