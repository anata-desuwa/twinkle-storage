[[dialogue]]
speaker = "unk"
# 第４話,呪いと罪,P
line = "第４話,呪いと罪,P"

[[dialogue]]
speaker = "unk"
# 現場に駆けつけると、またマリーベルが１人でモンスターの大群と戦っていた。
line = "現場に駆けつけると、またマリーベルが１人でモンスターの大群と戦っていた。"

[[dialogue]]
speaker = "マリーベル"
# 「遅かったわね。当てにはしてないけど、前みたいにふらふらじゃないだけマシかしら」
line = "「遅かったわね。当てにはしてないけど、前みたいにふらふらじゃないだけマシかしら」"

[[dialogue]]
speaker = "マリーベル"
# 「無茶な戦い方とかあなたに言われたくないわ。言ったでしょう、私はモンスターを殺すだけ」
line = "「無茶な戦い方とかあなたに言われたくないわ。言ったでしょう、私はモンスターを殺すだけ」"

[[dialogue]]
speaker = "マリーベル"
# 「……ああ、プリマステラじゃない星騎士は勝手に戦ったらいけないんだったっけ」
line = "「……ああ、プリマステラじゃない星騎士は勝手に戦ったらいけないんだったっけ」"

[[dialogue]]
speaker = "マリーベル"
# 「こっちはそういう制度だったわね。星騎士はモンスターと戦うためにいるのに、変な仕組みだわ」
line = "「こっちはそういう制度だったわね。星騎士はモンスターと戦うためにいるのに、変な仕組みだわ」"

[[dialogue]]
speaker = "unk"
# これ以上無茶するなら退学させることもできる
line = "これ以上無茶するなら退学させることもできる"

[[dialogue]]
speaker = "マリーベル"
# 「星徒会長の強権ってやつ？　そういえばそんなのもあったわね。つくづく変な学園だわ」
line = "「星徒会長の強権ってやつ？　そういえばそんなのもあったわね。つくづく変な学園だわ」"

[[dialogue]]
speaker = "マリーベル"
# 「でも関係ない。たとえセレスティアを失っても私はモンスターと戦う。それが私の贖罪」
line = "「でも関係ない。たとえセレスティアを失っても私はモンスターと戦う。それが私の贖罪」"

[[dialogue]]
speaker = "マリーベル"
# 「あの子は私が傷つけた。だからあの子の分までモンスターを狩って、狩り尽くして、根絶やしにして……」
line = "「あの子は私が傷つけた。だからあの子の分までモンスターを狩って、狩り尽くして、根絶やしにして……」"

[[dialogue]]
speaker = "マリーベル"
# 「大きいわね。ふてぶてしくて嫌いだわ」
line = "「大きいわね。ふてぶてしくて嫌いだわ」"

[[dialogue]]
speaker = "マリーベル"
# 「また串刺しにしてあげる。ブラッディエクス──」
line = "「また串刺しにしてあげる。ブラッディエクス──」"

[[dialogue]]
speaker = "マリーベル"
# 「──ッ！　星力が暴走しかけて……首輪が……」
line = "「──ッ！　星力が暴走しかけて……首輪が……」"

[[dialogue]]
speaker = "マリーベル"
# 「く……はぁ……発作みたいなものだから、放っておいて……それより早くモンスターを……」
line = "「く……はぁ……発作みたいなものだから、放っておいて……それより早くモンスターを……」"

[[dialogue]]
speaker = "マリーベル"
# 「今ので最後……みたいね。助けられたから一応礼は言っておくわ」
line = "「今ので最後……みたいね。助けられたから一応礼は言っておくわ」"

[[dialogue]]
speaker = "トワ先生"
# 「２人とも大丈夫？　あ、マリーベルちゃん怪我してるじゃない。治してあげるね」
line = "「２人とも大丈夫？　あ、マリーベルちゃん怪我してるじゃない。治してあげるね」"

[[dialogue]]
speaker = "トワ先生"
# 「ウィステリアさんが呼んでたよ、マリーベルちゃん。会長くんもついでに来てもらおうかな」
line = "「ウィステリアさんが呼んでたよ、マリーベルちゃん。会長くんもついでに来てもらおうかな」"

[[dialogue]]
speaker = "ウィステリア"
# 「まったく、また無茶したのね。会長くんがいるなら任せておけばいいのに」
line = "「まったく、また無茶したのね。会長くんがいるなら任せておけばいいのに」"

[[dialogue]]
speaker = "マリーベル"
# 「関係ないわ、私がこの手でやらなきゃいけないの。だって私は罪人なんだから──」
line = "「関係ないわ、私がこの手でやらなきゃいけないの。だって私は罪人なんだから──」"

[[dialogue]]
speaker = "unk"
# マリーベルの罪って？
line = "マリーベルの罪って？"

[[dialogue]]
speaker = "マリーベル"
# 「彼女を傷つけたことよ」
line = "「彼女を傷つけたことよ」"

[[dialogue]]
speaker = "マリーベル"
# 「星騎士に助けられたっていうありふれた理由で、私は流星学園のイギリス分校に入った。彼女とはそこで友達になった」
line = "「星騎士に助けられたっていうありふれた理由で、私は流星学園のイギリス分校に入った。彼女とはそこで友達になった」"

[[dialogue]]
speaker = "マリーベル"
# 「不器用で、怖がりだったけど、いつも誰かを守ろうとする、優しい女の子だった」
line = "「不器用で、怖がりだったけど、いつも誰かを守ろうとする、優しい女の子だった」"

[[dialogue]]
speaker = "マリーベル"
# 「イギリスでモンスターが大量に現れた時、私は彼女と一緒に戦った」
line = "「イギリスでモンスターが大量に現れた時、私は彼女と一緒に戦った」"

[[dialogue]]
speaker = "マリーベル"
# 「モンスターが彼女に迫った時、私はとっさに星術を放った。彼女を守ろうと無我夢中だった」
line = "「モンスターが彼女に迫った時、私はとっさに星術を放った。彼女を守ろうと無我夢中だった」"

[[dialogue]]
speaker = "マリーベル"
# 「だけど私は星力の制御が利かなくて──彼女は深い傷を負った。一命は取り留めたけど、二度と戦えない体になった」
line = "「だけど私は星力の制御が利かなくて──彼女は深い傷を負った。一命は取り留めたけど、二度と戦えない体になった」"

[[dialogue]]
speaker = "マリーベル"
# 「それが『ブラッディ・マリー』と呼ばれるようになった理由。私の罪」
line = "「それが『ブラッディ・マリー』と呼ばれるようになった理由。私の罪」"

[[dialogue]]
speaker = "マリーベル"
# 「戦えなくなったあの子の分まで私は戦う。世界を守ろうとしていたあの子の代わりに、モンスターもアステラもリクリエも全部滅ぼす」
line = "「戦えなくなったあの子の分まで私は戦う。世界を守ろうとしていたあの子の代わりに、モンスターもアステラもリクリエも全部滅ぼす」"

[[dialogue]]
speaker = "マリーベル"
# 「それが私の贖罪。せめてもの罪滅ぼし」
line = "「それが私の贖罪。せめてもの罪滅ぼし」"

[[dialogue]]
speaker = "マリーベル"
# 「私は災いをもたらす存在だから。会長さんももう私に関わらない方がいいわ」
line = "「私は災いをもたらす存在だから。会長さんももう私に関わらない方がいいわ」"

[[dialogue]]
speaker = "ウィステリア"
# 「とはいえ、強すぎる星力を放っておくわけにはいかないから、私とトワちゃん先生が協力してるってわけ」
line = "「とはいえ、強すぎる星力を放っておくわけにはいかないから、私とトワちゃん先生が協力してるってわけ」"

[[dialogue]]
speaker = "トワ先生"
# 「星力の強さは人それぞれだけど、強すぎて暴走する星力なんて、ちょっと異常だからね」
line = "「星力の強さは人それぞれだけど、強すぎて暴走する星力なんて、ちょっと異常だからね」"

[[dialogue]]
speaker = "ウィステリア"
# 「マリーベルさんがいつも付けてるあの首輪。あれは私とトワちゃん先生で作ったんだけど……」
line = "「マリーベルさんがいつも付けてるあの首輪。あれは私とトワちゃん先生で作ったんだけど……」"

[[dialogue]]
speaker = "ウィステリア"
# 「制御できないほど強い星力が出そうになると呪いが発動して、首輪が絞まって星力にリミッターをかけるようになっているの」
line = "「制御できないほど強い星力が出そうになると呪いが発動して、首輪が絞まって星力にリミッターをかけるようになっているの」"

[[dialogue]]
speaker = "マリーベル"
# 「──ッ！　星力が暴走しかけて……首輪が……」
line = "「──ッ！　星力が暴走しかけて……首輪が……」"

[[dialogue]]
speaker = "マリーベル"
# 「く……はぁ……発作みたいなものだから、放っておいて……それより早くモンスターを……」
line = "「く……はぁ……発作みたいなものだから、放っておいて……それより早くモンスターを……」"

[[dialogue]]
speaker = "マリーベル"
# 「首輪を作ってくれたのは感謝してるけど、必要以上に近づかないで。私は不幸を呼ぶ『ブラッディ・マリー』なのよ」
line = "「首輪を作ってくれたのは感謝してるけど、必要以上に近づかないで。私は不幸を呼ぶ『ブラッディ・マリー』なのよ」"

[[dialogue]]
speaker = "ウィステリア"
# 「私はもう不幸だから効かないわよそんなの」
line = "「私はもう不幸だから効かないわよそんなの」"

[[dialogue]]
speaker = "トワ先生"
# 「本当にマリーベルちゃんが不幸を引き起こすなら、その“不幸”を研究するのが、星体力学の専門家のわたしの仕事だからね」
line = "「本当にマリーベルちゃんが不幸を引き起こすなら、その“不幸”を研究するのが、星体力学の専門家のわたしの仕事だからね」"

[[dialogue]]
speaker = "トワ先生"
# 「マリーベルちゃんの守護星はさそり座λ星シャウラ。それは間違いないんだけど、なんか時々数値がブレるんだよね」
line = "「マリーベルちゃんの守護星はさそり座λ星シャウラ。それは間違いないんだけど、なんか時々数値がブレるんだよね」"

[[dialogue]]
speaker = "トワ先生"
# 「それにマリーベルちゃんから懐かしい気配がする……う～ん、気のせいかなー？」
line = "「それにマリーベルちゃんから懐かしい気配がする……う～ん、気のせいかなー？」"

[[dialogue]]
speaker = "unk"
# でもマリーベルは友達を守ろうとして……
line = "でもマリーベルは友達を守ろうとして……"

[[dialogue]]
speaker = "マリーベル"
# 「あなたはきっとお人好しなのね。優しい人。それは認める」
line = "「あなたはきっとお人好しなのね。優しい人。それは認める」"

[[dialogue]]
speaker = "マリーベル"
# 「だから私のためを思うなら邪魔しないで。お願いだから」
line = "「だから私のためを思うなら邪魔しないで。お願いだから」"

[[dialogue]]
speaker = "unk"
# ……わかった
line = "……わかった"

[[dialogue]]
speaker = "マリーベル"
# 「ええ。助かるわ」
line = "「ええ。助かるわ」"

[[dialogue]]
speaker = "unk"
# だけどマリーベルの贖罪を見届ける
line = "だけどマリーベルの贖罪を見届ける"

[[dialogue]]
speaker = "マリーベル"
# 「は……？　どういう意味？　それって結局、放っておかないってことじゃない」
line = "「は……？　どういう意味？　それって結局、放っておかないってことじゃない」"

[[dialogue]]
speaker = "ウィステリア"
# 「邪魔はしてないから文句は言えないわね。ふふ、一本取られたんじゃない？」
line = "「邪魔はしてないから文句は言えないわね。ふふ、一本取られたんじゃない？」"

[[dialogue]]
speaker = "トワ先生"
# 「会長くんがついてるなら安心、かな」
line = "「会長くんがついてるなら安心、かな」"

[[dialogue]]
speaker = "マリーベル"
# 「……はぁ。頑固なのね。そこまで言うなら好きにすればいいわ」
line = "「……はぁ。頑固なのね。そこまで言うなら好きにすればいいわ」"

[[dialogue]]
speaker = "マリーベル"
# 「その代わり、あなたがどうなっても恨まないで。後悔しても知らないから。いい？」
line = "「その代わり、あなたがどうなっても恨まないで。後悔しても知らないから。いい？」"

[[dialogue]]
speaker = "unk"
# 後悔なんかしないよ
line = "後悔なんかしないよ"

[[dialogue]]
speaker = "マリーベル"
# 「そう。それならいいのだけど。じゃあ、また戦場で会いましょう」
line = "「そう。それならいいのだけど。じゃあ、また戦場で会いましょう」"
