[[dialogue]]
speaker = "unk"
# 第２話,普通の女の子,P
line = "第２話,普通の女の子,P"

[[dialogue]]
speaker = "unk"
# 昼食時、花織はサチに連れられて、学園のカフェテリアにやってきた。
line = "昼食時、花織はサチに連れられて、学園のカフェテリアにやってきた。"

[[dialogue]]
speaker = "unk"
# 話によると、ここあはプリムラと一緒に街ブラ、いろははトレジアンナの部屋に入り浸ってアニメを鑑賞しているらしい。
line = "話によると、ここあはプリムラと一緒に街ブラ、いろははトレジアンナの部屋に入り浸ってアニメを鑑賞しているらしい。"

[[dialogue]]
speaker = "花織"
# 「それじゃサチちゃんが頼りにしてるっていう人は、新星学園ってとこの会長さんなんだ」
line = "「それじゃサチちゃんが頼りにしてるっていう人は、新星学園ってとこの会長さんなんだ」"

[[dialogue]]
speaker = "サチ"
# 「そうなんです。でも今、遠征があって流星市国を離れてしまっていて……」
line = "「そうなんです。でも今、遠征があって流星市国を離れてしまっていて……」"

[[dialogue]]
speaker = "花織"
# 「ふーん、それじゃサチちゃんも不安だね」
line = "「ふーん、それじゃサチちゃんも不安だね」"

[[dialogue]]
speaker = "サチ"
# 「まあ多少そういった部分もありますが、お兄さ……いえ、会長不在の今、私が頑張らなくちゃって思うので」
line = "「まあ多少そういった部分もありますが、お兄さ……いえ、会長不在の今、私が頑張らなくちゃって思うので」"

[[dialogue]]
speaker = "花織"
# 「いいって、普段通りの呼び方で。『お兄さん』って呼んでるんでしょ？」
line = "「いいって、普段通りの呼び方で。『お兄さん』って呼んでるんでしょ？」"

[[dialogue]]
speaker = "サチ"
# 「兄妹という訳ではないので、混乱してはいけないと思ったのですが……いつも通りで良いというのであれば、お言葉に甘えて」
line = "「兄妹という訳ではないので、混乱してはいけないと思ったのですが……いつも通りで良いというのであれば、お言葉に甘えて」"

[[dialogue]]
speaker = "サチ"
# 「せっかくなのでお兄さんのこと、花織さんたちにもご紹介したかったです……」
line = "「せっかくなのでお兄さんのこと、花織さんたちにもご紹介したかったです……」"

[[dialogue]]
speaker = "花織"
# 「いろいろ事情があるみたいだし、仕方ないって」
line = "「いろいろ事情があるみたいだし、仕方ないって」"

[[dialogue]]
speaker = "花織"
# （でも、そっか……サチちゃんにとってその人は、ウチらにとってのオムちゃんみたいな存在なのかな……）
line = "（でも、そっか……サチちゃんにとってその人は、ウチらにとってのオムちゃんみたいな存在なのかな……）"

[[dialogue]]
speaker = "花織"
# 「サチちゃんは、本当にすごいね……」
line = "「サチちゃんは、本当にすごいね……」"

[[dialogue]]
speaker = "サチ"
# 「えっ、急にどうしたんですか？」
line = "「えっ、急にどうしたんですか？」"

[[dialogue]]
speaker = "花織"
# 「だって頼りにしてた人がいないって、ウチらとあんまり変わんない状況ってことでしょ？」
line = "「だって頼りにしてた人がいないって、ウチらとあんまり変わんない状況ってことでしょ？」"

[[dialogue]]
speaker = "花織"
# 「それなのに、ウチらのことにちゃんと気を配ってくれて、芯が強くてしっかり者なんだなって」
line = "「それなのに、ウチらのことにちゃんと気を配ってくれて、芯が強くてしっかり者なんだなって」"

[[dialogue]]
speaker = "サチ"
# 「そ、そんなこと言われたら恥ずかしくなっちゃいますよ！　うぅぅ……」
line = "「そ、そんなこと言われたら恥ずかしくなっちゃいますよ！　うぅぅ……」"

[[dialogue]]
speaker = "花織"
# 「あはは、ごめんね」
line = "「あはは、ごめんね」"

[[dialogue]]
speaker = "サチ"
# 「花織さんこそしっかりしていて、すごい人だと思います！」
line = "「花織さんこそしっかりしていて、すごい人だと思います！」"

[[dialogue]]
speaker = "花織"
# 「ウチが？」
line = "「ウチが？」"

[[dialogue]]
speaker = "サチ"
# 「今の状況を楽観的にならずにちゃんと受け止めて、これからどうすべきか行動を考えているように感じます」
line = "「今の状況を楽観的にならずにちゃんと受け止めて、これからどうすべきか行動を考えているように感じます」"

[[dialogue]]
speaker = "花織"
# 「まあ、いろはは基本あんな感じだし、ここあさんもたまに衝動的に行動するところがあるから……」
line = "「まあ、いろはは基本あんな感じだし、ここあさんもたまに衝動的に行動するところがあるから……」"

[[dialogue]]
speaker = "花織"
# 「オムちゃんがいない今、そういうのを考えるのはウチの役目かなって」
line = "「オムちゃんがいない今、そういうのを考えるのはウチの役目かなって」"

[[dialogue]]
speaker = "花織"
# 「そういうサチちゃんも、ウチと似たようなポジションになることが多いんじゃない？」
line = "「そういうサチちゃんも、ウチと似たようなポジションになることが多いんじゃない？」"

[[dialogue]]
speaker = "花織"
# 「プリムラちゃんは猪突猛進って感じだし、トレジアンナさんもシズハちゃんも割と自由人って感じの性格みたいだから」
line = "「プリムラちゃんは猪突猛進って感じだし、トレジアンナさんもシズハちゃんも割と自由人って感じの性格みたいだから」"

[[dialogue]]
speaker = "サチ"
# 「そうかもしれませんね……私と花織さんって、似てるのかも」
line = "「そうかもしれませんね……私と花織さんって、似てるのかも」"

[[dialogue]]
speaker = "花織"
# 「うーん、それはどうかな？　ウチと一緒って言っちゃうと、サチちゃんに申し訳ないかも」
line = "「うーん、それはどうかな？　ウチと一緒って言っちゃうと、サチちゃんに申し訳ないかも」"

[[dialogue]]
speaker = "花織"
# 「サチちゃんって主人公感があるっていうか、ちゃんと特別な人のオーラを持ってるからなぁ」
line = "「サチちゃんって主人公感があるっていうか、ちゃんと特別な人のオーラを持ってるからなぁ」"

[[dialogue]]
speaker = "サチ"
# 「私がですか？　そんなこと無いと思うんですけど……」
line = "「私がですか？　そんなこと無いと思うんですけど……」"

[[dialogue]]
speaker = "花織"
# 「だってほら、プリマステラ……だっけ？　星騎士の人たちの中でも、特にすごい存在なんでしょ？」
line = "「だってほら、プリマステラ……だっけ？　星騎士の人たちの中でも、特にすごい存在なんでしょ？」"

[[dialogue]]
speaker = "花織"
# 「それに附属校でも生徒会長やってて、輝いてるっていうか……ウチとは全然違うよ」
line = "「それに附属校でも生徒会長やってて、輝いてるっていうか……ウチとは全然違うよ」"

[[dialogue]]
speaker = "サチ"
# 「輝いてる……んー……花織さんは、輝いてないんですか？」
line = "「輝いてる……んー……花織さんは、輝いてないんですか？」"

[[dialogue]]
speaker = "花織"
# 「全く輝いてないってことは無いけど、フツーだって思ってるかな。ウチは、いろはやここあさんと違って、どこにでもいるような普通の女の子だから」
line = "「全く輝いてないってことは無いけど、フツーだって思ってるかな。ウチは、いろはやここあさんと違って、どこにでもいるような普通の女の子だから」"

[[dialogue]]
speaker = "サチ"
# 「……あれ？　普通の女の子……私の知っている方が、口癖のように言っている言葉のような……」
line = "「……あれ？　普通の女の子……私の知っている方が、口癖のように言っている言葉のような……」"

[[dialogue]]
speaker = "花織"
# 「そんな人がいるの？」
line = "「そんな人がいるの？」"

[[dialogue]]
speaker = "サチ"
# 「はい。その人もお兄さんと一緒で、今は流星市国にいないんですけど」
line = "「はい。その人もお兄さんと一緒で、今は流星市国にいないんですけど」"

[[dialogue]]
speaker = "花織"
# 「そっか～、話してみたかったかも。なんか話が合いそうだし」
line = "「そっか～、話してみたかったかも。なんか話が合いそうだし」"

[[dialogue]]
speaker = "サチ"
# 「その方も自分の『普通さ』を気にしていらっしゃっていて、常々、普通な自分から脱却しようとあれこれ模索しています」
line = "「その方も自分の『普通さ』を気にしていらっしゃっていて、常々、普通な自分から脱却しようとあれこれ模索しています」"

[[dialogue]]
speaker = "サチ"
# 「ですが、私から見るとその方も十分に特別で、それに気付いていないのは本人だけ……」
line = "「ですが、私から見るとその方も十分に特別で、それに気付いていないのは本人だけ……」"

[[dialogue]]
speaker = "花織"
# 「あ～、だとしたらウチの場合はちょっと違うかな～」
line = "「あ～、だとしたらウチの場合はちょっと違うかな～」"

[[dialogue]]
speaker = "花織"
# 「別にウチは普通であることが悪いことだとは思ってないよ？　むしろ普通であることを求めてるっていうか……」
line = "「別にウチは普通であることが悪いことだとは思ってないよ？　むしろ普通であることを求めてるっていうか……」"

[[dialogue]]
speaker = "花織"
# 「魔法少女になったのも成り行きっていうか、いろはに流されてだったんだけど、戻れるなら普通の生活に戻りたいなって思ってるくらい」
line = "「魔法少女になったのも成り行きっていうか、いろはに流されてだったんだけど、戻れるなら普通の生活に戻りたいなって思ってるくらい」"

[[dialogue]]
speaker = "花織"
# 「普通に大学に行って、普通に就職して、普通に結婚して……そういうフツーの人生が、結局一番いいんだから」
line = "「普通に大学に行って、普通に就職して、普通に結婚して……そういうフツーの人生が、結局一番いいんだから」"

[[dialogue]]
speaker = "花織"
# 「とにかくウチにとって『普通である』ってことは、一種のステータスなんだよね」
line = "「とにかくウチにとって『普通である』ってことは、一種のステータスなんだよね」"

[[dialogue]]
speaker = "花織"
# 「って、何でこんな純真な年下の子に、夢の無いことを吹き込んでるんだか！　本当にごめんね！」
line = "「って、何でこんな純真な年下の子に、夢の無いことを吹き込んでるんだか！　本当にごめんね！」"

[[dialogue]]
speaker = "サチ"
# 「いえいえ。でも、そうなんですね……わかりました」
line = "「いえいえ。でも、そうなんですね……わかりました」"

[[dialogue]]
speaker = "unk"
# そう答えたサチだったが、普通であることにこだわっているように見える花織のスタンスに、まだ少しだけ納得できないものを感じるのだった。
line = "そう答えたサチだったが、普通であることにこだわっているように見える花織のスタンスに、まだ少しだけ納得できないものを感じるのだった。"
