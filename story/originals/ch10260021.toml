[[dialogue]]
speaker = "unk"
# 第１話,２度目の告白,P
line = "第１話,２度目の告白,P"

[[dialogue]]
speaker = "unk"
# それは、リクリエとの戦いに１つの区切りがついた後――
line = "それは、リクリエとの戦いに１つの区切りがついた後――"

[[dialogue]]
speaker = "unk"
# 放課後の夕暮れ時、俺はリーリアから改めて話があると、空き教室に呼び出しを受けていた。
line = "放課後の夕暮れ時、俺はリーリアから改めて話があると、空き教室に呼び出しを受けていた。"

[[dialogue]]
speaker = "リーリア"
# 「セ～ンパイ♪」
line = "「セ～ンパイ♪」"

[[dialogue]]
speaker = "リーリア"
# 「お待たせマジカル☆　可愛い後輩のお願いを聞いてくれて、ありがとうございます♪」
line = "「お待たせマジカル☆　可愛い後輩のお願いを聞いてくれて、ありがとうございます♪」"

[[dialogue]]
speaker = "unk"
# 改まって、今日はどうしたんだ？
line = "改まって、今日はどうしたんだ？"

[[dialogue]]
speaker = "リーリア"
# 「えっと……ほら、私たちって彼氏彼女のお付き合いをしていたじゃないですか」
line = "「えっと……ほら、私たちって彼氏彼女のお付き合いをしていたじゃないですか」"

[[dialogue]]
speaker = "unk"
# そう、俺とリーリアは学園生活を通して、恋人同士となっていた――
line = "そう、俺とリーリアは学園生活を通して、恋人同士となっていた――"

[[dialogue]]
speaker = "unk"
# 俺から彼女に告白した際も、場所はこの空き教室だった。
line = "俺から彼女に告白した際も、場所はこの空き教室だった。"

[[dialogue]]
speaker = "リーリア"
# 「センパ～イ、こんなところに可愛い後輩を呼び出して、ひょっとして告白でもしちゃう気ですか～？　――なんちゃって☆」
line = "「センパ～イ、こんなところに可愛い後輩を呼び出して、ひょっとして告白でもしちゃう気ですか～？　――なんちゃって☆」"

[[dialogue]]
speaker = "unk"
# リーリア、好きだ。俺と付き合って欲しい
line = "リーリア、好きだ。俺と付き合って欲しい"

[[dialogue]]
speaker = "リーリア"
# 「ふふっ、そうですか～。やっぱり～……って、え？」
line = "「ふふっ、そうですか～。やっぱり～……って、え？」"

[[dialogue]]
speaker = "リーリア"
# 「ち、ちょっと待って下さい。いきなり何ですかセンパイ！？　何かのドッキリですか！？」
line = "「ち、ちょっと待って下さい。いきなり何ですかセンパイ！？　何かのドッキリですか！？」"

[[dialogue]]
speaker = "unk"
# マジです
line = "マジです"

[[dialogue]]
speaker = "リーリア"
# 「な、なんで……」
line = "「な、なんで……」"

[[dialogue]]
speaker = "unk"
# 俺は、リーリアは可愛いし、一緒にいると楽しいからだと伝える。
line = "俺は、リーリアは可愛いし、一緒にいると楽しいからだと伝える。"

[[dialogue]]
speaker = "unk"
# リーリアは……どうかな？
line = "リーリアは……どうかな？"

[[dialogue]]
speaker = "リーリア"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "リーリア"
# 「……わ、私も……センパイと一緒にいると楽しいです」
line = "「……わ、私も……センパイと一緒にいると楽しいです」"

[[dialogue]]
speaker = "リーリア"
# 「だから……その……」
line = "「だから……その……」"

[[dialogue]]
speaker = "リーリア"
# 「私でよければ……よ、よろしくお願いします……」
line = "「私でよければ……よ、よろしくお願いします……」"

[[dialogue]]
speaker = "unk"
# そうして、彼女は俺の告白を受け入れてくれたのだった――
line = "そうして、彼女は俺の告白を受け入れてくれたのだった――"

[[dialogue]]
speaker = "リーリア"
# 「でも……」
line = "「でも……」"

[[dialogue]]
speaker = "リーリア"
# 「私、あれから１度、ネビュラの魔女としてセンパイと戦っちゃったりして、なんか恋人を裏切る形になっちゃったじゃないですか」
line = "「私、あれから１度、ネビュラの魔女としてセンパイと戦っちゃったりして、なんか恋人を裏切る形になっちゃったじゃないですか」"

[[dialogue]]
speaker = "unk"
# 彼女の正体は『魔女』だ。
line = "彼女の正体は『魔女』だ。"

[[dialogue]]
speaker = "unk"
# 俺たち星騎士の行動を監視する為、ネビュラから新星学園へと送り込まれていたスパイ――それがリーリアだった。
line = "俺たち星騎士の行動を監視する為、ネビュラから新星学園へと送り込まれていたスパイ――それがリーリアだった。"

[[dialogue]]
speaker = "unk"
# そして彼女は、アポロやギエルとの戦いの前、ネビュラの魔女として俺たちを止めようと立ちはだかった。
line = "そして彼女は、アポロやギエルとの戦いの前、ネビュラの魔女として俺たちを止めようと立ちはだかった。"

[[dialogue]]
speaker = "unk"
# 俺は気にしてないよ。というか――
line = "俺は気にしてないよ。というか――"

[[dialogue]]
speaker = "リーリア"
# 「――薄々は、私の正体がネビュラの魔女なんじゃないかって、気づいてた……？」
line = "「――薄々は、私の正体がネビュラの魔女なんじゃないかって、気づいてた……？」"

[[dialogue]]
speaker = "リーリア"
# 「……はい。私も何となくわかってました。センパイは優しいから……私が秘密を抱えていても、それをスルーして受け入れてくれてるんだってことは」
line = "「……はい。私も何となくわかってました。センパイは優しいから……私が秘密を抱えていても、それをスルーして受け入れてくれてるんだってことは」"

[[dialogue]]
speaker = "リーリア"
# 「私が敵対して、しれっと学園に戻ってきた後も、センパイは何事もなかったように、私と恋人として付き合い続けてくれています。ただ――」
line = "「私が敵対して、しれっと学園に戻ってきた後も、センパイは何事もなかったように、私と恋人として付き合い続けてくれています。ただ――」"

[[dialogue]]
speaker = "リーリア"
# 「あやふやにしたままじゃ、私が嫌なんです」
line = "「あやふやにしたままじゃ、私が嫌なんです」"

[[dialogue]]
speaker = "リーリア"
# 「私はこれから、嘘偽りなく、センパイとの関係を続けていきたい。だから――」
line = "「私はこれから、嘘偽りなく、センパイとの関係を続けていきたい。だから――」"

[[dialogue]]
speaker = "unk"
# リーリアは一呼吸おいて、俺の目を見て告げた。
line = "リーリアは一呼吸おいて、俺の目を見て告げた。"

[[dialogue]]
speaker = "リーリア"
# 「今度こそ、私を――センパイの本当の彼女にしてください」
line = "「今度こそ、私を――センパイの本当の彼女にしてください」"

[[dialogue]]
speaker = "unk"
# 俺たちと敵対した時のように、真剣で、ちょっと不安に揺れる瞳。
line = "俺たちと敵対した時のように、真剣で、ちょっと不安に揺れる瞳。"

[[dialogue]]
speaker = "unk"
# 俺はそんな彼女の頬に触れて――
line = "俺はそんな彼女の頬に触れて――"

[[dialogue]]
speaker = "unk"
# リーリアは俺の本当の彼女だ
line = "リーリアは俺の本当の彼女だ"

[[dialogue]]
speaker = "unk"
# 大丈夫。これまでも、これからもずっと――
line = "大丈夫。これまでも、これからもずっと――"

[[dialogue]]
speaker = "リーリア"
# 「センパイ……あっ……<emoji=heart04>」
line = "「センパイ……あっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺はリーリアにそっと、キスをする。
line = "俺はリーリアにそっと、キスをする。"

[[dialogue]]
speaker = "リーリア"
# 「ん……<emoji=heart04>　ちゅっ……<emoji=heart04>」
line = "「ん……<emoji=heart04>　ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
# 「はあぁ……<emoji=heart04>　センパイ……<emoji=heart04>」
line = "「はあぁ……<emoji=heart04>　センパイ……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
# 「大好きです……<emoji=heart04>」
line = "「大好きです……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺もだ。好きだよ、リーリア
line = "俺もだ。好きだよ、リーリア"

[[dialogue]]
speaker = "リーリア"
# 「んっ……<emoji=heart04>　ちゅっ……<emoji=heart04>」
line = "「んっ……<emoji=heart04>　ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# それからも、俺たちは２度目の告白の甘い余韻に浸り続けるのだった――
line = "それからも、俺たちは２度目の告白の甘い余韻に浸り続けるのだった――"

[[dialogue]]
speaker = "unk"
# そうして気づけば、外はすっかり暗くなっていた。
line = "そうして気づけば、外はすっかり暗くなっていた。"

[[dialogue]]
speaker = "リーリア"
# 「夢中でいっぱいしちゃいましたね……センパイ<emoji=heart04>」
line = "「夢中でいっぱいしちゃいましたね……センパイ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 空き教室の片隅に座って寄り添いながら、リーリアは俺の肩に頭を乗せている。
line = "空き教室の片隅に座って寄り添いながら、リーリアは俺の肩に頭を乗せている。"

[[dialogue]]
speaker = "unk"
# 実は、リーリアに聞きたいことがあったんだ
line = "実は、リーリアに聞きたいことがあったんだ"

[[dialogue]]
speaker = "リーリア"
# 「？　はい、何でしょう？」
line = "「？　はい、何でしょう？」"

[[dialogue]]
speaker = "unk"
# リクリエとの決戦前、リーリアが俺たちを止める為に立ちはだかった時。あの場でリーリアが言っていたこと――
line = "リクリエとの決戦前、リーリアが俺たちを止める為に立ちはだかった時。あの場でリーリアが言っていたこと――"

[[dialogue]]
speaker = "リーリア"
# 「私は星騎士じゃないから、人間界とか、三界の平穏みたいなのって、実はいうほど興味ないんだ。うん。だから本当にごめん」
line = "「私は星騎士じゃないから、人間界とか、三界の平穏みたいなのって、実はいうほど興味ないんだ。うん。だから本当にごめん」"

[[dialogue]]
speaker = "unk"
# あれも、嘘だったんじゃないかなって
line = "あれも、嘘だったんじゃないかなって"

[[dialogue]]
speaker = "リーリア"
# 「嘘……ってことはないですよ。あはは、私、悪い子なんで。センパイや友達のみんな以外、本当にそこまで大事には思っていません」
line = "「嘘……ってことはないですよ。あはは、私、悪い子なんで。センパイや友達のみんな以外、本当にそこまで大事には思っていません」"

[[dialogue]]
speaker = "リーリア"
# 「頑張ってどうにかなるなら、みんな幸せハッピーエンドがいいですけど、そういうケースばっかりじゃないと思うんです」
line = "「頑張ってどうにかなるなら、みんな幸せハッピーエンドがいいですけど、そういうケースばっかりじゃないと思うんです」"

[[dialogue]]
speaker = "リーリア"
# 「露悪的だったというか、わざとらしかったと言われれば……はい、そうですね。私も悪役令嬢としての修行が足りないかもしれません」
line = "「露悪的だったというか、わざとらしかったと言われれば……はい、そうですね。私も悪役令嬢としての修行が足りないかもしれません」"

[[dialogue]]
speaker = "リーリア"
# 「あの時は、ああやって自分に発破をかけないと……センパイやアナちゃんを突き放さないと、銃を向ける覚悟ができなかったから」
line = "「あの時は、ああやって自分に発破をかけないと……センパイやアナちゃんを突き放さないと、銃を向ける覚悟ができなかったから」"

[[dialogue]]
speaker = "リーリア"
# 「人間界のこと、好きですよ。学園に来て、友達ができて、センパイと出会って、魔女の森にいた頃よりずっと楽しくて……大切な場所であることは間違いありません」
line = "「人間界のこと、好きですよ。学園に来て、友達ができて、センパイと出会って、魔女の森にいた頃よりずっと楽しくて……大切な場所であることは間違いありません」"

[[dialogue]]
speaker = "リーリア"
# 「本当はあの時も、センパイたちと一緒に人間界を守りたかった。でも……私は結局、ネビュラの魔女としての使命も捨て切れませんでした」
line = "「本当はあの時も、センパイたちと一緒に人間界を守りたかった。でも……私は結局、ネビュラの魔女としての使命も捨て切れませんでした」"

[[dialogue]]
speaker = "unk"
# 申し訳なさそうに言う彼女の頭を、俺はそっと撫でる。
line = "申し訳なさそうに言う彼女の頭を、俺はそっと撫でる。"

[[dialogue]]
speaker = "unk"
# なら、これからは一緒に守ろう
line = "なら、これからは一緒に守ろう"

[[dialogue]]
speaker = "リーリア"
# 「……！　センパイ……」
line = "「……！　センパイ……」"

[[dialogue]]
speaker = "unk"
# 嘘偽りなく、って決めたんだろ？
line = "嘘偽りなく、って決めたんだろ？"

[[dialogue]]
speaker = "リーリア"
# 「……はい。私、これからはセンパイのそばで、一緒に戦います」
line = "「……はい。私、これからはセンパイのそばで、一緒に戦います」"

[[dialogue]]
speaker = "リーリア"
# 「より一層ウィンウィンな関係――可愛い後輩彼女として！」
line = "「より一層ウィンウィンな関係――可愛い後輩彼女として！」"

[[dialogue]]
speaker = "リーリア"
# 「えへへ♪」
line = "「えへへ♪」"

[[dialogue]]
speaker = "unk"
# そう言って、彼女は俺と手を恋人繋ぎにしながら、明るく微笑むのだった。
line = "そう言って、彼女は俺と手を恋人繋ぎにしながら、明るく微笑むのだった。"
