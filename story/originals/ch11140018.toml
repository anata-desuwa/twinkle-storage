[[dialogue]]
speaker = "unk"
# 何だこの光景……すごい。めちゃくちゃ、興奮する──
line = "何だこの光景……すごい。めちゃくちゃ、興奮する──"

[[dialogue]]
speaker = "ルヴィネ"
# 「や、やだぁっ……ま、魔王の部屋、汚しちゃっ、ぅっ……とまって、とまって、ぇっ……！」
line = "「や、やだぁっ……ま、魔王の部屋、汚しちゃっ、ぅっ……とまって、とまって、ぇっ……！」"

[[dialogue]]
speaker = "クロト"
# 「──気にしなくていいよルヴィ。全部出し切っちゃおう。ほらっ」
line = "「──気にしなくていいよルヴィ。全部出し切っちゃおう。ほらっ」"

[[dialogue]]
speaker = "unk"
# ぐりっ、とルヴィの感じるおへその裏をペニスで一突きする。
line = "ぐりっ、とルヴィの感じるおへその裏をペニスで一突きする。"

[[dialogue]]
speaker = "ルヴィネ"
# 「やぁぁあっ！？　ばかぁっ<emoji=heart04>　あぁ──あぁぁぁあぁああぁぁ～～～…………っ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」
line = "「やぁぁあっ！？　ばかぁっ<emoji=heart04>　あぁ──あぁぁぁあぁああぁぁ～～～…………っ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# しゅろろろろろろっ──
line = "しゅろろろろろろっ──"

[[dialogue]]
speaker = "unk"
# そうして──たっぷり時間をかけて、ルヴィのおもらし絶頂は止まった。
line = "そうして──たっぷり時間をかけて、ルヴィのおもらし絶頂は止まった。"

[[dialogue]]
speaker = "ルヴィネ"
# 「────死にたい」
line = "「────死にたい」"

[[dialogue]]
speaker = "ルヴィネ"
# 「初エッチで……彼氏の部屋で……イキすぎておもらしだなんて……」
line = "「初エッチで……彼氏の部屋で……イキすぎておもらしだなんて……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「これは夢……？　夢であって。お願い……」
line = "「これは夢……？　夢であって。お願い……」"

[[dialogue]]
speaker = "クロト"
# 「気にしないでいいよ。掃除すればすむから」
line = "「気にしないでいいよ。掃除すればすむから」"

[[dialogue]]
speaker = "ルヴィネ"
# 「…………最悪だわ。貴方との、初めての……思い出が……」
line = "「…………最悪だわ。貴方との、初めての……思い出が……」"

[[dialogue]]
speaker = "クロト"
# 「俺は嬉しいよ。大好きなルヴィと繋がれたし……こんなになっちゃうくらい、感じてくれたってことだし」
line = "「俺は嬉しいよ。大好きなルヴィと繋がれたし……こんなになっちゃうくらい、感じてくれたってことだし」"

[[dialogue]]
speaker = "クロト"
# 「それに正直言うと、ルヴィのおもらし、偶然とはいえ見られたの……ちょっと……」
line = "「それに正直言うと、ルヴィのおもらし、偶然とはいえ見られたの……ちょっと……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……ちょっと？」
line = "「……ちょっと？」"

[[dialogue]]
speaker = "クロト"
# 「ちょっと興奮した」
line = "「ちょっと興奮した」"

[[dialogue]]
speaker = "ルヴィネ"
# 「…………ばかぁっ！」
line = "「…………ばかぁっ！」"

[[dialogue]]
speaker = "unk"
# アクシデントもあったけれど、そんな感じで俺とルヴィの初体験エッチは幕を閉じたのだった──
line = "アクシデントもあったけれど、そんな感じで俺とルヴィの初体験エッチは幕を閉じたのだった──"
