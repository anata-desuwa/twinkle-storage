[[dialogue]]
speaker = "unk"
# 週末──アナとシュティレは２人きりで街を散策していた。
line = "週末──アナとシュティレは２人きりで街を散策していた。"

[[dialogue]]
speaker = "シュティレ"
# 「まさかアナお姉ちゃんから、遊びに誘っていただけるとは。ぶいぶい」
line = "「まさかアナお姉ちゃんから、遊びに誘っていただけるとは。ぶいぶい」"

[[dialogue]]
speaker = "アナ"
# 「おお、いきなりダブルピース」
line = "「おお、いきなりダブルピース」"

[[dialogue]]
speaker = "シュティレ"
# 「イエス。私は顔つきで感情表現するのが苦手なので、身振り手振りでテンションぶち上げなことをアピールです」
line = "「イエス。私は顔つきで感情表現するのが苦手なので、身振り手振りでテンションぶち上げなことをアピールです」"

[[dialogue]]
speaker = "アナ"
# 「喜んでもらえて何よりです。ここのところ、兵器開発と出撃が続いていたので、今日は英気を養いましょう」
line = "「喜んでもらえて何よりです。ここのところ、兵器開発と出撃が続いていたので、今日は英気を養いましょう」"

[[dialogue]]
speaker = "シュティレ"
# 「承知しました。優れた戦士となるために、休養もまた戦いです」
line = "「承知しました。優れた戦士となるために、休養もまた戦いです」"

[[dialogue]]
speaker = "アナ"
# 「……ギガンドムの１８話。名言ですね」
line = "「……ギガンドムの１８話。名言ですね」"

[[dialogue]]
speaker = "シュティレ"
# 「おぉ、アナお姉ちゃん。もうそこまで視聴していただけたのですね。感激です」
line = "「おぉ、アナお姉ちゃん。もうそこまで視聴していただけたのですね。感激です」"

[[dialogue]]
speaker = "アナ"
# 「人に勧められたものは必ず見るようにしています。私のポリシーみたいなものですね」
line = "「人に勧められたものは必ず見るようにしています。私のポリシーみたいなものですね」"

[[dialogue]]
speaker = "アナ"
# 「さて、それじゃあ街をぶらつきましょうか。シュティレさんと一緒に楽しめる場所、色々と考えてきていますので」
line = "「さて、それじゃあ街をぶらつきましょうか。シュティレさんと一緒に楽しめる場所、色々と考えてきていますので」"

[[dialogue]]
speaker = "シュティレ"
# 「クレーンゲーム限定プライズ、ギガンドムキーホルダー……恐ろしい相手です。すでに数百テルス、飲まれてしまいました。形勢不利」
line = "「クレーンゲーム限定プライズ、ギガンドムキーホルダー……恐ろしい相手です。すでに数百テルス、飲まれてしまいました。形勢不利」"

[[dialogue]]
speaker = "アナ"
# 「ですが布石は打ちました。キャッチャーのアームを、傾いた体の下へ差し込んで……！」
line = "「ですが布石は打ちました。キャッチャーのアームを、傾いた体の下へ差し込んで……！」"

[[dialogue]]
speaker = "シュティレ"
# 「釣り上がりました。この状態ならば、勝利を確信しても良いかと愚考します。つまり──」
line = "「釣り上がりました。この状態ならば、勝利を確信しても良いかと愚考します。つまり──」"

[[dialogue]]
speaker = "unk"
# ギガンドムのキーホルダーが受け取りボックスへ落下するのを見た後、ハイタッチ。
line = "ギガンドムのキーホルダーが受け取りボックスへ落下するのを見た後、ハイタッチ。"

[[dialogue]]
speaker = "アナ"
# 「取ったど～」
line = "「取ったど～」"

[[dialogue]]
speaker = "シュティレ"
# 「やったど～」
line = "「やったど～」"

[[dialogue]]
speaker = "シュティレ"
# 「なるほど、これが抹茶ソフトクリーム。洋菓子をベースに、和菓子のフレーバーを追加装備している。とても美味です」
line = "「なるほど、これが抹茶ソフトクリーム。洋菓子をベースに、和菓子のフレーバーを追加装備している。とても美味です」"

[[dialogue]]
speaker = "アナ"
# 「一仕事を終えた後のスイーツは格別。このアイスの露店、休日しか姿を見せないレア店舗なので注意です」
line = "「一仕事を終えた後のスイーツは格別。このアイスの露店、休日しか姿を見せないレア店舗なので注意です」"

[[dialogue]]
speaker = "シュティレ"
# 「心得ました。しかしアナお姉ちゃんは本当に多才ですね。星徒会の副会長というから、もっと勉学と鍛錬に一筋の御方かと思っていました」
line = "「心得ました。しかしアナお姉ちゃんは本当に多才ですね。星徒会の副会長というから、もっと勉学と鍛錬に一筋の御方かと思っていました」"

[[dialogue]]
speaker = "アナ"
# 「うちの先輩方、顔が広くて色々な人とのコミュニティがあるんです。それに星徒会はトラブルシューターなところもありまして」
line = "「うちの先輩方、顔が広くて色々な人とのコミュニティがあるんです。それに星徒会はトラブルシューターなところもありまして」"

[[dialogue]]
speaker = "アナ"
# 「ゲームセンターで遊ぶのを覚えたのも、その流れというか……」
line = "「ゲームセンターで遊ぶのを覚えたのも、その流れというか……」"

[[dialogue]]
speaker = "シュティレ"
# 「理解。やはり所属するコミュニティは大事ということですね……はむ」
line = "「理解。やはり所属するコミュニティは大事ということですね……はむ」"

[[dialogue]]
speaker = "シュティレ"
# 「だったら私はやっぱり、マスターに何とか弟子入りを認めてもらわねばなりません。はむ、はむ」
line = "「だったら私はやっぱり、マスターに何とか弟子入りを認めてもらわねばなりません。はむ、はむ」"

[[dialogue]]
speaker = "アナ"
# （……表情からは読み取れませんが、気落ちしているようですね。だったら──）
line = "（……表情からは読み取れませんが、気落ちしているようですね。だったら──）"

[[dialogue]]
speaker = "アナ"
# 「シュティレさん、どうでしょう。今から例の駅前広場の方に行ってみませんか」
line = "「シュティレさん、どうでしょう。今から例の駅前広場の方に行ってみませんか」"

[[dialogue]]
speaker = "シュティレ"
# 「駅前広場……ギガンドムの立像ですか？」
line = "「駅前広場……ギガンドムの立像ですか？」"

[[dialogue]]
speaker = "アナ"
# 「ええ。以前と違って今の私は、アニメをある程度視聴しています。前回とは違った気分で鑑賞できるのではと思いまして」
line = "「ええ。以前と違って今の私は、アニメをある程度視聴しています。前回とは違った気分で鑑賞できるのではと思いまして」"

[[dialogue]]
speaker = "シュティレ"
# 「ギガンドムに会えるのならば、２４時間いつでもＯＫです。参りましょう」
line = "「ギガンドムに会えるのならば、２４時間いつでもＯＫです。参りましょう」"

[[dialogue]]
speaker = "unk"
# ギガンドムの展示されている広場は、休日ということもあり大賑わいだった。
line = "ギガンドムの展示されている広場は、休日ということもあり大賑わいだった。"

[[dialogue]]
speaker = "unk"
# ぷしゅーっと蒸気を模したスモークを吐いており、そのたびに歓声がそこかしこで上がっている──
line = "ぷしゅーっと蒸気を模したスモークを吐いており、そのたびに歓声がそこかしこで上がっている──"

[[dialogue]]
speaker = "アナ"
# 「相変わらず凄い大きさですね。アニメを見た後だと、さらに迫力があるように感じます」
line = "「相変わらず凄い大きさですね。アニメを見た後だと、さらに迫力があるように感じます」"

[[dialogue]]
speaker = "シュティレ"
# 「はい。ギガンドムの雄姿、今日もばっちりＤＩＳＣに保存できました。ぶい」
line = "「はい。ギガンドムの雄姿、今日もばっちりＤＩＳＣに保存できました。ぶい」"

[[dialogue]]
speaker = "アナ"
# 「ところでシュティレさん、このギガンドム、私が視聴中のものとは色合いが違うのですが……」
line = "「ところでシュティレさん、このギガンドム、私が視聴中のものとは色合いが違うのですが……」"

[[dialogue]]
speaker = "シュティレ"
# 「アナお姉ちゃんの見ている１８話あたりで、主人公は改良型ギガンドム・マーク２に乗り換えます」
line = "「アナお姉ちゃんの見ている１８話あたりで、主人公は改良型ギガンドム・マーク２に乗り換えます」"

[[dialogue]]
speaker = "アナ"
# 「ええ。初代ギガンドムでは強くなる敵に対して、エネルギー出力が足りないため、後継機を製造していました」
line = "「ええ。初代ギガンドムでは強くなる敵に対して、エネルギー出力が足りないため、後継機を製造していました」"

[[dialogue]]
speaker = "シュティレ"
# 「ですがこの後、さらなる強敵が現れて、マーク２も破壊されてしまうのです」
line = "「ですがこの後、さらなる強敵が現れて、マーク２も破壊されてしまうのです」"

[[dialogue]]
speaker = "シュティレ"
# 「強大な敵を倒すため、主人公は残された旧型ギガンドム──目の前にあるこの機体で最終決戦に挑むのです」
line = "「強大な敵を倒すため、主人公は残された旧型ギガンドム──目の前にあるこの機体で最終決戦に挑むのです」"

[[dialogue]]
speaker = "アナ"
# 「それは、勝てるのですか……？」
line = "「それは、勝てるのですか……？」"

[[dialogue]]
speaker = "シュティレ"
# 「スペック的には圧倒的に敗北しています。けれど主人公にはそこまで培ってきた経験と、諦めない心が宿っていて──はっ！？」
line = "「スペック的には圧倒的に敗北しています。けれど主人公にはそこまで培ってきた経験と、諦めない心が宿っていて──はっ！？」"

[[dialogue]]
speaker = "シュティレ"
# 「す、すみません。うっかりネタバレをしてしまいました……アニメを追っている方に、とんでもない失態を……！」
line = "「す、すみません。うっかりネタバレをしてしまいました……アニメを追っている方に、とんでもない失態を……！」"

[[dialogue]]
speaker = "アナ"
# 「問題ありません。優れたカルチャーは、ネタバレされてなお、味わいのあるものですから」
line = "「問題ありません。優れたカルチャーは、ネタバレされてなお、味わいのあるものですから」"

[[dialogue]]
speaker = "アナ"
# 「しかし冷静なシュティレさんがそこまで熱くなるとは……やっぱりギガンドム、大好きなんですね」
line = "「しかし冷静なシュティレさんがそこまで熱くなるとは……やっぱりギガンドム、大好きなんですね」"

[[dialogue]]
speaker = "シュティレ"
# 「はい。ロボットは私の憧れであり、ロマンの塊ですから」
line = "「はい。ロボットは私の憧れであり、ロマンの塊ですから」"

[[dialogue]]
speaker = "アナ"
# 「……シュティレさん。今ギガンドムについて語ったのと同じような、熱い想いをアニマ先輩にぶつけてみればいいのではないでしょうか？」
line = "「……シュティレさん。今ギガンドムについて語ったのと同じような、熱い想いをアニマ先輩にぶつけてみればいいのではないでしょうか？」"

[[dialogue]]
speaker = "シュティレ"
# 「え……？」
line = "「え……？」"

[[dialogue]]
speaker = "アナ"
# 「以前に『ロマンが足りない』という理由をもって、弟子入りを断られていましたよね」
line = "「以前に『ロマンが足りない』という理由をもって、弟子入りを断られていましたよね」"

[[dialogue]]
speaker = "アナ"
# 「色々と考えてみたのですが……やっぱりシュティレさんが抱えている、錬金術を学びたいという気持ちを熱く表明するのが一番かと思うんです」
line = "「色々と考えてみたのですが……やっぱりシュティレさんが抱えている、錬金術を学びたいという気持ちを熱く表明するのが一番かと思うんです」"

[[dialogue]]
speaker = "アナ"
# 「機械技術の活用に才能を持つシュティレさんが、アニマ先輩の元で錬金術を学びたい理由……」
line = "「機械技術の活用に才能を持つシュティレさんが、アニマ先輩の元で錬金術を学びたい理由……」"

[[dialogue]]
speaker = "アナ"
# 「それを熱く語ることができれば、きっと弟子入りだってできます。よろしければ、私を相手に練習してみるのはどうでしょうか？」
line = "「それを熱く語ることができれば、きっと弟子入りだってできます。よろしければ、私を相手に練習してみるのはどうでしょうか？」"

[[dialogue]]
speaker = "シュティレ"
# 「私が、アナお姉ちゃんを相手に……？」
line = "「私が、アナお姉ちゃんを相手に……？」"

[[dialogue]]
speaker = "アナ"
# 「はい。アニマ先輩の琴線に触れるトークを判断できるかはわかりませんが、熱い想い──ロマンはきっと三界で共通の感情のはず」
line = "「はい。アニマ先輩の琴線に触れるトークを判断できるかはわかりませんが、熱い想い──ロマンはきっと三界で共通の感情のはず」"

[[dialogue]]
speaker = "アナ"
# 「せっかく仲良くなれたのですから、力になりたい。私はそう思っています」
line = "「せっかく仲良くなれたのですから、力になりたい。私はそう思っています」"

[[dialogue]]
speaker = "シュティレ"
# 「……驚きました。私に対して、そこまで言ってくれるような方は今まで、いらっしゃいませんでした」
line = "「……驚きました。私に対して、そこまで言ってくれるような方は今まで、いらっしゃいませんでした」"

[[dialogue]]
speaker = "シュティレ"
# 「流石は新星学園の誇る天才。アナお姉ちゃんは、お気遣いもできる素敵な方なのですね」
line = "「流石は新星学園の誇る天才。アナお姉ちゃんは、お気遣いもできる素敵な方なのですね」"

[[dialogue]]
speaker = "アナ"
# 「……そうじゃないです。私は、お世話になっている先輩方の真似をしている、だけなんですよ」
line = "「……そうじゃないです。私は、お世話になっている先輩方の真似をしている、だけなんですよ」"

[[dialogue]]
speaker = "シュティレ"
# 「新星星徒会の……？」
line = "「新星星徒会の……？」"

[[dialogue]]
speaker = "アナ"
# 「そうです。うちの会長も、ヴィーナス前会長も、サーシャ先輩もマトイ先輩も……いつも誰かの悩みやトラブルと向き合っています」
line = "「そうです。うちの会長も、ヴィーナス前会長も、サーシャ先輩もマトイ先輩も……いつも誰かの悩みやトラブルと向き合っています」"

[[dialogue]]
speaker = "アナ"
# 「困っている人を放っておけない人達で……私も、いつも助けてもらってばかり」
line = "「困っている人を放っておけない人達で……私も、いつも助けてもらってばかり」"

[[dialogue]]
speaker = "アナ"
# （日々の雑務に置いては、私が助けることの方が多い……。でも、本質はそうじゃない）
line = "（日々の雑務に置いては、私が助けることの方が多い……。でも、本質はそうじゃない）"

[[dialogue]]
speaker = "アナ"
# （勝てないという絶望、きっと死んでしまうのだろうという恐怖、そういった本当の脅威──リクリエと向かい合った時、私はただ、会長たちに付いていくことしかできなかった）
line = "（勝てないという絶望、きっと死んでしまうのだろうという恐怖、そういった本当の脅威──リクリエと向かい合った時、私はただ、会長たちに付いていくことしかできなかった）"

[[dialogue]]
speaker = "アナ"
# （普段の私が自分の力を十分発揮できるのも、結局先輩たちがお膳立てしてくれているからだということも……わかっています）
line = "（普段の私が自分の力を十分発揮できるのも、結局先輩たちがお膳立てしてくれているからだということも……わかっています）"

[[dialogue]]
speaker = "アナ"
# 「だからでしょうか。憧れている人達と早く並びたい、そのためにまずは心構えから、あの人達と同じでありたいと思っているのかも……」
line = "「だからでしょうか。憧れている人達と早く並びたい、そのためにまずは心構えから、あの人達と同じでありたいと思っているのかも……」"

[[dialogue]]
speaker = "アナ"
# 「すみません。急にペラペラと。最近、私も伸び悩んでいるので、シュティレさんの葛藤が他人事に思えなくて」
line = "「すみません。急にペラペラと。最近、私も伸び悩んでいるので、シュティレさんの葛藤が他人事に思えなくて」"

[[dialogue]]
speaker = "シュティレ"
# 「アナお姉ちゃんが、伸び悩み……？　意外です。何でもサクサクとこなせる才女だと評判なのですが」
line = "「アナお姉ちゃんが、伸び悩み……？　意外です。何でもサクサクとこなせる才女だと評判なのですが」"

[[dialogue]]
speaker = "シュティレ"
# 「守護天使の義体制作。人工戦闘服の開発にも携わる。おまけに新入生でありながら、星徒会にも抜擢された天才……」
line = "「守護天使の義体制作。人工戦闘服の開発にも携わる。おまけに新入生でありながら、星徒会にも抜擢された天才……」"

[[dialogue]]
speaker = "シュティレ"
# 「皆さん、アナお姉ちゃんをそのように言っています。そんなアナお姉ちゃんが躓いているだなんて、驚きです」
line = "「皆さん、アナお姉ちゃんをそのように言っています。そんなアナお姉ちゃんが躓いているだなんて、驚きです」"

[[dialogue]]
speaker = "アナ"
# 「ええ。私は今、新星星徒会で一番のお荷物です。機械型モンスターに対して有利に立ち回れる、ノヴァフォームの覚醒に至っていませんから」
line = "「ええ。私は今、新星星徒会で一番のお荷物です。機械型モンスターに対して有利に立ち回れる、ノヴァフォームの覚醒に至っていませんから」"

[[dialogue]]
speaker = "アナ"
# 「うちの先輩……会長も含め、全員が慌てなくてよいと言ってくれますが、焦らないわけにはいかなくて」
line = "「うちの先輩……会長も含め、全員が慌てなくてよいと言ってくれますが、焦らないわけにはいかなくて」"

[[dialogue]]
speaker = "アナ"
# 「弱体化薬の制作を依頼したのだって、弱い自分が少しでも役に立てることを模索した結果なんです」
line = "「弱体化薬の制作を依頼したのだって、弱い自分が少しでも役に立てることを模索した結果なんです」"

[[dialogue]]
speaker = "シュティレ"
# 「……アナお姉ちゃん。そんなに悩んでいるのに、シュティレのことまで……」
line = "「……アナお姉ちゃん。そんなに悩んでいるのに、シュティレのことまで……」"

[[dialogue]]
speaker = "アナ"
# 「うちの会長の真似です。あの人はどんなに自分が辛い時でも、他人の為に頑張れる人なので……」
line = "「うちの会長の真似です。あの人はどんなに自分が辛い時でも、他人の為に頑張れる人なので……」"

[[dialogue]]
speaker = "アナ"
# 「私にとって、憧れなんですよ。あの人は」
line = "「私にとって、憧れなんですよ。あの人は」"

[[dialogue]]
speaker = "unk"
# ──アナはここまで自分の胸中を他人に喋ったことはなかった。
line = "──アナはここまで自分の胸中を他人に喋ったことはなかった。"

[[dialogue]]
speaker = "unk"
# ──そしてシュティレもまた、ここまで胸中を吐露してくれた相手に報いたいと思った。
line = "──そしてシュティレもまた、ここまで胸中を吐露してくれた相手に報いたいと思った。"

[[dialogue]]
speaker = "unk"
# ──師匠と呼ぶアニマにすら語れなかった自分の夢。そこにロマンがあるか否かを判断してもらいたいと思った。
line = "──師匠と呼ぶアニマにすら語れなかった自分の夢。そこにロマンがあるか否かを判断してもらいたいと思った。"

[[dialogue]]
speaker = "シュティレ"
# 「……アナお姉ちゃんは、巨大ロボットってどう思いますか？」
line = "「……アナお姉ちゃんは、巨大ロボットってどう思いますか？」"

[[dialogue]]
speaker = "アナ"
# 「……？　どう、とは」
line = "「……？　どう、とは」"

[[dialogue]]
speaker = "シュティレ"
# 「すみません。もっと正確に言います……」
line = "「すみません。もっと正確に言います……」"

[[dialogue]]
speaker = "シュティレ"
# 「巨大ロボットを作りたいと言う人を見て、どう思いますか？」
line = "「巨大ロボットを作りたいと言う人を見て、どう思いますか？」"

[[dialogue]]
speaker = "アナ"
# 「あの、ギガンドムみたいな？」
line = "「あの、ギガンドムみたいな？」"

[[dialogue]]
speaker = "シュティレ"
# 「そうです。あのサイズの、人が乗り込むことのできる巨大ロボット。それを現実に作りたいだなんて言う女の子を、先輩はどう思いますか？」
line = "「そうです。あのサイズの、人が乗り込むことのできる巨大ロボット。それを現実に作りたいだなんて言う女の子を、先輩はどう思いますか？」"

[[dialogue]]
speaker = "アナ"
# 「そう、ですね……私は──」
line = "「そう、ですね……私は──」"

[[dialogue]]
speaker = "unk"
# ずずん──地面が大きく揺れる。
line = "ずずん──地面が大きく揺れる。"

[[dialogue]]
speaker = "unk"
# １回では収まらず、２度。
line = "１回では収まらず、２度。"

[[dialogue]]
speaker = "unk"
# ３度──アナとシュティレは、振動する方向へ目を向ける。
line = "３度──アナとシュティレは、振動する方向へ目を向ける。"

[[dialogue]]
speaker = "アナ"
# 「…………嘘、でしょう？」
line = "「…………嘘、でしょう？」"

[[dialogue]]
speaker = "unk"
# 立像のギガンドムは、あくまで身じろぎをする程度。歩行なんてするはずがない。
line = "立像のギガンドムは、あくまで身じろぎをする程度。歩行なんてするはずがない。"

[[dialogue]]
speaker = "unk"
# それなのに、ずずん、ずずん──ギガンドムの立像は、一歩一歩、大地を踏みしめるように移動していた。
line = "それなのに、ずずん、ずずん──ギガンドムの立像は、一歩一歩、大地を踏みしめるように移動していた。"

[[dialogue]]
speaker = "シュティレ"
# 「アナお姉ちゃん、これは……！？」
line = "「アナお姉ちゃん、これは……！？」"

[[dialogue]]
speaker = "unk"
# リクリエの瘴気に、展示されていたギガンドムが侵されている──
line = "リクリエの瘴気に、展示されていたギガンドムが侵されている──"

[[dialogue]]
speaker = "アナ"
# 「シュティレさん、変身を！　民間人の避難誘導をお願いします！」
line = "「シュティレさん、変身を！　民間人の避難誘導をお願いします！」"

[[dialogue]]
speaker = "アナ"
# 「ギガンドムがモンスター化……新型の機械型モンスターと断定！　戦闘に移ります！！」
line = "「ギガンドムがモンスター化……新型の機械型モンスターと断定！　戦闘に移ります！！」"
