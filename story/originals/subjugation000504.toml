[[dialogue]]
speaker = "unk"
# 第4話,メイド長の前任,B
line = "第4話,メイド長の前任,B"

[[dialogue]]
speaker = "unk"
# メイド体験をした日から数日後、大聖堂カフェテリアにて。
line = "メイド体験をした日から数日後、大聖堂カフェテリアにて。"

[[dialogue]]
speaker = "キリカ"
# 「はぁ……」
line = "「はぁ……」"

[[dialogue]]
speaker = "unk"
# テーブルの上にノートを広げて、憂鬱そうな顔をしているキリカ師匠を見かけて、俺は声をかけた。
line = "テーブルの上にノートを広げて、憂鬱そうな顔をしているキリカ師匠を見かけて、俺は声をかけた。"

[[dialogue]]
speaker = "キリカ"
# 「――ああ、緋宮会長。ごきげんよう」
line = "「――ああ、緋宮会長。ごきげんよう」"

[[dialogue]]
speaker = "キリカ"
# 「このノートですか？　あれからまた、次のメイド長候補を誰にするか考えて、メイド隊の子達の情報を書き出したものに目を通していたところです」
line = "「このノートですか？　あれからまた、次のメイド長候補を誰にするか考えて、メイド隊の子達の情報を書き出したものに目を通していたところです」"

[[dialogue]]
speaker = "キリカ"
# 「しかし、結局は同じことを何度もループして考えている感じで……なかなか決まらずにいます」
line = "「しかし、結局は同じことを何度もループして考えている感じで……なかなか決まらずにいます」"

[[dialogue]]
speaker = "キリカ"
# 「正直、あの人に……マリオンさんに、メイド長に戻る気があれば、ここまで悩まずに済むのですが……」
line = "「正直、あの人に……マリオンさんに、メイド長に戻る気があれば、ここまで悩まずに済むのですが……」"

[[dialogue]]
speaker = "unk"
# えっ、マリオンさんが……メイド長？
line = "えっ、マリオンさんが……メイド長？"

[[dialogue]]
speaker = "キリカ"
# 「ええ、実は……あの人は私がなる前の、前任のメイド長だった人です」
line = "「ええ、実は……あの人は私がなる前の、前任のメイド長だった人です」"

[[dialogue]]
speaker = "マリオン"
# 「残念ながら、メイド長に戻る気はありませんよ」
line = "「残念ながら、メイド長に戻る気はありませんよ」"

[[dialogue]]
speaker = "キリカ"
# 「マリオンさん……」
line = "「マリオンさん……」"

[[dialogue]]
speaker = "マリオン"
# 「私は別に、この間のようにキリカさんが風邪を引いたりした際に、代理として他の子達に指示をするのは構いません」
line = "「私は別に、この間のようにキリカさんが風邪を引いたりした際に、代理として他の子達に指示をするのは構いません」"

[[dialogue]]
speaker = "マリオン"
# 「ですが、それはあくまで先輩メイドとしてです」
line = "「ですが、それはあくまで先輩メイドとしてです」"

[[dialogue]]
speaker = "マリオン"
# 「星見家のメイド長としては、私は相応しくありません。キリカさんも仰っていたでしょう？」
line = "「星見家のメイド長としては、私は相応しくありません。キリカさんも仰っていたでしょう？」"

[[dialogue]]
speaker = "マリオン"
# 「私には『清らかさ』が足りていないと」
line = "「私には『清らかさ』が足りていないと」"

[[dialogue]]
speaker = "キリカ"
# 「それは、あなたがメイドとして、わざと真面目なところを見せていないだけで……！」
line = "「それは、あなたがメイドとして、わざと真面目なところを見せていないだけで……！」"

[[dialogue]]
speaker = "マリオン"
# 「私はいつも真面目ですよ。メイドの仕事が好きですし、それと同じくらいに私は可愛い子達が好きなんです」
line = "「私はいつも真面目ですよ。メイドの仕事が好きですし、それと同じくらいに私は可愛い子達が好きなんです」"

[[dialogue]]
speaker = "マリオン"
# 「その好きを曲げてしまったら、私はメイドでいられなくなってしまいます」
line = "「その好きを曲げてしまったら、私はメイドでいられなくなってしまいます」"

[[dialogue]]
speaker = "マリオン"
# 「うふふ♪　そういうわけですから、頼まれてもメイド長に戻るつもりはありません」
line = "「うふふ♪　そういうわけですから、頼まれてもメイド長に戻るつもりはありません」"

[[dialogue]]
speaker = "マリオン"
# 「それじゃあ、キリカさん、会長様。私は好きなメイドとしての仕事に戻りますね<emoji=heart04>　カフェテリアのお掃除中でしたので♪」
line = "「それじゃあ、キリカさん、会長様。私は好きなメイドとしての仕事に戻りますね<emoji=heart04>　カフェテリアのお掃除中でしたので♪」"

[[dialogue]]
speaker = "キリカ"
# 「……勝手な人です。私に半ば強引に、メイド長の役目を押し付けておいて……」
line = "「……勝手な人です。私に半ば強引に、メイド長の役目を押し付けておいて……」"

[[dialogue]]
speaker = "unk"
# 師匠は……いつからメイド長に？
line = "師匠は……いつからメイド長に？"

[[dialogue]]
speaker = "キリカ"
# 「２年前……私が流星学園を卒業した次の日のことでした。メイドの仕事をしていた私のところに、いつものような軽い調子で話しかけてきて――」
line = "「２年前……私が流星学園を卒業した次の日のことでした。メイドの仕事をしていた私のところに、いつものような軽い調子で話しかけてきて――」"

[[dialogue]]
speaker = "キリカ"
# 「学園も卒業したことだし、そろそろメイド長の座を譲る、私がメイド長にならなくても、メイド長の座は下りると突然言い出したのです」
line = "「学園も卒業したことだし、そろそろメイド長の座を譲る、私がメイド長にならなくても、メイド長の座は下りると突然言い出したのです」"

[[dialogue]]
speaker = "キリカ"
# 「正直、なんであんなことを言い出したのか、今でもよくわかりません。あの人は昔からあんな調子ですが、メイドとしてはこの上なく優秀です」
line = "「正直、なんであんなことを言い出したのか、今でもよくわかりません。あの人は昔からあんな調子ですが、メイドとしてはこの上なく優秀です」"

[[dialogue]]
speaker = "キリカ"
# 「ナンパ癖の欠点はありますが、星見家のメイドとして、してはいけない相手には絶対にしません」
line = "「ナンパ癖の欠点はありますが、星見家のメイドとして、してはいけない相手には絶対にしません」"

[[dialogue]]
speaker = "キリカ"
# 「メイドスキルはどれもトップクラス。中でも裁縫の腕はプロ級を越えて……言い表せない超常の域です」
line = "「メイドスキルはどれもトップクラス。中でも裁縫の腕はプロ級を越えて……言い表せない超常の域です」"

[[dialogue]]
speaker = "キリカ"
# 「メイド長に必要な指導力、カリスマ性も、私では追いつけない隔たりを感じます」
line = "「メイド長に必要な指導力、カリスマ性も、私では追いつけない隔たりを感じます」"

[[dialogue]]
speaker = "キリカ"
# 「本当は今も、メイド長として立つべき人なんです。私はまだ、あの人から学ばなければならないことが、沢山あるというのに……」
line = "「本当は今も、メイド長として立つべき人なんです。私はまだ、あの人から学ばなければならないことが、沢山あるというのに……」"

[[dialogue]]
speaker = "unk"
# なら、その気持ちを伝えるべきじゃないですか？
line = "なら、その気持ちを伝えるべきじゃないですか？"

[[dialogue]]
speaker = "キリカ"
# 「え？」
line = "「え？」"

[[dialogue]]
speaker = "キリカ"
# 「――マリオンさんがメイド長に相応しいとモヤモヤしているから、次のメイド長の候補が決まらない……？」
line = "「――マリオンさんがメイド長に相応しいとモヤモヤしているから、次のメイド長の候補が決まらない……？」"

[[dialogue]]
speaker = "キリカ"
# 「……確かに、仰る通りですね」
line = "「……確かに、仰る通りですね」"

[[dialogue]]
speaker = "キリカ"
# 「私は正直、今もマリオンさんがメイド長に相応しいと思っています」
line = "「私は正直、今もマリオンさんがメイド長に相応しいと思っています」"

[[dialogue]]
speaker = "キリカ"
# 「ならば、私がすべきことは――」
line = "「ならば、私がすべきことは――」"

[[dialogue]]
speaker = "キリカ"
# 「戦うことです」
line = "「戦うことです」"

[[dialogue]]
speaker = "マリオン"
# 「まあまあ、うふふっ♪」
line = "「まあまあ、うふふっ♪」"

[[dialogue]]
speaker = "unk"
# なぜバトル展開に！？
line = "なぜバトル展開に！？"

[[dialogue]]
speaker = "キリカ"
# 「拳で語る方が早いので」
line = "「拳で語る方が早いので」"

[[dialogue]]
speaker = "unk"
# 師匠って結構、脳筋なところあるよな……。
line = "師匠って結構、脳筋なところあるよな……。"
