[[dialogue]]
speaker = "unk"
# 第４話,世界でいちばん大切な,P
line = "第４話,世界でいちばん大切な,P"

[[dialogue]]
speaker = "unk"
# その日、私はクロトと一緒に、リゾート結界のプライベートビーチへとやって来ていた。
line = "その日、私はクロトと一緒に、リゾート結界のプライベートビーチへとやって来ていた。"

[[dialogue]]
speaker = "リノ"
# 「クロト、今日は私の頼みを聞いてくれてありがとね」
line = "「クロト、今日は私の頼みを聞いてくれてありがとね」"

[[dialogue]]
speaker = "unk"
# わざわざお礼なんていいよ
line = "わざわざお礼なんていいよ"

[[dialogue]]
speaker = "unk"
# 海に行かないかと提案して誘ったのは、私の方からだった。
line = "海に行かないかと提案して誘ったのは、私の方からだった。"

[[dialogue]]
speaker = "リノ"
# 「ほら、毎年２人で海には遊びに来てたのに、今年はまだだったでしょ？　まぁ、私の方からクロトと距離を取っちゃってたせいなんだけど……」
line = "「ほら、毎年２人で海には遊びに来てたのに、今年はまだだったでしょ？　まぁ、私の方からクロトと距離を取っちゃってたせいなんだけど……」"

[[dialogue]]
speaker = "リノ"
# 「今日は私、改めてちゃんと２人で話をしたいと思ったの」
line = "「今日は私、改めてちゃんと２人で話をしたいと思ったの」"

[[dialogue]]
speaker = "unk"
# ビーチチェアーのところへ移動し腰かけてから、私は言葉を続ける。
line = "ビーチチェアーのところへ移動し腰かけてから、私は言葉を続ける。"

[[dialogue]]
speaker = "リノ"
# 「前に家で話した時、私が逃げ出しちゃったけど……『夢』のこと、話してもいい？」
line = "「前に家で話した時、私が逃げ出しちゃったけど……『夢』のこと、話してもいい？」"

[[dialogue]]
speaker = "unk"
# 隣のビーチチェアーに腰かけたクロトは、頷く。
line = "隣のビーチチェアーに腰かけたクロトは、頷く。"

[[dialogue]]
speaker = "リノ"
# 「……私ね、あの夢を見るまで、クロトとああいう関係になる自分とか、想像したことなかった」
line = "「……私ね、あの夢を見るまで、クロトとああいう関係になる自分とか、想像したことなかった」"

[[dialogue]]
speaker = "unk"
# 平行世界で恋人関係になっていた光景を思い出す。
line = "平行世界で恋人関係になっていた光景を思い出す。"

[[dialogue]]
speaker = "リノ"
# 「だから、戸惑っちゃったのよ。今まで親子として一緒に過ごして来たから、なおさら……」
line = "「だから、戸惑っちゃったのよ。今まで親子として一緒に過ごして来たから、なおさら……」"

[[dialogue]]
speaker = "unk"
# 夢を見た後、母さんは俺のこと――気持ち悪いと思った？
line = "夢を見た後、母さんは俺のこと――気持ち悪いと思った？"

[[dialogue]]
speaker = "unk"
# クロトが告げたのは、私がこの前逃げてしまった時に聞きそびれた、言葉の続きだった。
line = "クロトが告げたのは、私がこの前逃げてしまった時に聞きそびれた、言葉の続きだった。"

[[dialogue]]
speaker = "リノ"
# 「……ううん、そんなことないわ」
line = "「……ううん、そんなことないわ」"

[[dialogue]]
speaker = "リノ"
# 「むしろ私は――ドキドキしちゃってた」
line = "「むしろ私は――ドキドキしちゃってた」"

[[dialogue]]
speaker = "リノ"
# 「恥ずかしいけど、本当は私、クロトのことを１人の男の子として意識しちゃって、顔もまともに見れなくなっちゃってたのよ」
line = "「恥ずかしいけど、本当は私、クロトのことを１人の男の子として意識しちゃって、顔もまともに見れなくなっちゃってたのよ」"

[[dialogue]]
speaker = "リノ"
# 「私、魔女だし、これまで男性経験も恋愛経験も皆無だったから、そういう相手として誰かを意識するっていうのも、今回が初めてでね……」
line = "「私、魔女だし、これまで男性経験も恋愛経験も皆無だったから、そういう相手として誰かを意識するっていうのも、今回が初めてでね……」"

[[dialogue]]
speaker = "unk"
# 俺も母さんと同じだ
line = "俺も母さんと同じだ"

[[dialogue]]
speaker = "unk"
# ――それで俺、その後に色々考えたんだ。
line = "――それで俺、その後に色々考えたんだ。"

[[dialogue]]
speaker = "unk"
# クロトはそう言葉を続けて。
line = "クロトはそう言葉を続けて。"

[[dialogue]]
speaker = "unk"
# 母さん……いや、リノさん
line = "母さん……いや、リノさん"

[[dialogue]]
speaker = "unk"
# クロトは私に向き直り、目を真っすぐに見つめながら、告げる。
line = "クロトは私に向き直り、目を真っすぐに見つめながら、告げる。"

[[dialogue]]
speaker = "unk"
# 俺の恋人になって欲しい
line = "俺の恋人になって欲しい"

[[dialogue]]
speaker = "リノ"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "unk"
# ――簡単には言葉に表せないくらい色々な気持ちが入り混じってるけど、リノさんのこと、間違いなく１人の女性として好きだと感じているから。
line = "――簡単には言葉に表せないくらい色々な気持ちが入り混じってるけど、リノさんのこと、間違いなく１人の女性として好きだと感じているから。"

[[dialogue]]
speaker = "unk"
# ――これからもずっと、あなたは俺の母親で、俺は息子だけど、それでも恋人になって欲しいんだ。
line = "――これからもずっと、あなたは俺の母親で、俺は息子だけど、それでも恋人になって欲しいんだ。"

[[dialogue]]
speaker = "unk"
# クロトは真剣な顔で、そう告げた。
line = "クロトは真剣な顔で、そう告げた。"

[[dialogue]]
speaker = "リノ"
# 「……クロト、私ね」
line = "「……クロト、私ね」"

[[dialogue]]
speaker = "リノ"
# 「正直に言うと、今もまだ、自分の気持ちにはっきりと整理がついているわけじゃないの」
line = "「正直に言うと、今もまだ、自分の気持ちにはっきりと整理がついているわけじゃないの」"

[[dialogue]]
speaker = "リノ"
# 「今日は素直に今の気持ちを伝えて、変なわだかまりが解けたらってそう思ってた」
line = "「今日は素直に今の気持ちを伝えて、変なわだかまりが解けたらってそう思ってた」"

[[dialogue]]
speaker = "リノ"
# 「だから、クロトが言ってくれたのと同じで、私も色々複雑な気持ちがあって、簡単に答えは出せないけど……」
line = "「だから、クロトが言ってくれたのと同じで、私も色々複雑な気持ちがあって、簡単に答えは出せないけど……」"

[[dialogue]]
speaker = "リノ"
# 「でも、１つはっきりと言えるのは――」
line = "「でも、１つはっきりと言えるのは――」"

[[dialogue]]
speaker = "リノ"
# 「これからどっちの道を選ぶのだとしても、クロトは私にとって、世界一大切な男の子ってことよ」
line = "「これからどっちの道を選ぶのだとしても、クロトは私にとって、世界一大切な男の子ってことよ」"

[[dialogue]]
speaker = "unk"
# 俺にとっても母さんは、世界でいちばん大切な女性だよ
line = "俺にとっても母さんは、世界でいちばん大切な女性だよ"

[[dialogue]]
speaker = "リノ"
# 「ん……♪　ありがとう」
line = "「ん……♪　ありがとう」"

[[dialogue]]
speaker = "リノ"
# 「お母さん、すごく嬉しいわ」
line = "「お母さん、すごく嬉しいわ」"

[[dialogue]]
speaker = "unk"
# ふと、クロトは私に手を差し伸べる。
line = "ふと、クロトは私に手を差し伸べる。"

[[dialogue]]
speaker = "リノ"
# 「え？　――せっかく海に来たから、遊びたい？」
line = "「え？　――せっかく海に来たから、遊びたい？」"

[[dialogue]]
speaker = "リノ"
# 「ふふっ、なら男の子として、お母さんのことエスコートしてくれるかしら？」
line = "「ふふっ、なら男の子として、お母さんのことエスコートしてくれるかしら？」"

[[dialogue]]
speaker = "unk"
# 私がその手を取ると、彼は嬉しそうな微笑みと共に優しく握り返してくれる。
line = "私がその手を取ると、彼は嬉しそうな微笑みと共に優しく握り返してくれる。"

[[dialogue]]
speaker = "unk"
# もちろん、喜んで
line = "もちろん、喜んで"

[[dialogue]]
speaker = "リノ"
# 「あ……」
line = "「あ……」"

[[dialogue]]
speaker = "unk"
# その時、私の心臓がまた、ドキッと高鳴った。
line = "その時、私の心臓がまた、ドキッと高鳴った。"

[[dialogue]]
speaker = "unk"
# クロトに手を引かれて、立ち上がり、前に進む。
line = "クロトに手を引かれて、立ち上がり、前に進む。"

[[dialogue]]
speaker = "リノ"
# （これから先、私たち２人の未来は、どうなって行くのだろう）
line = "（これから先、私たち２人の未来は、どうなって行くのだろう）"

[[dialogue]]
speaker = "リノ"
# （不安はもちろんある。でも――）
line = "（不安はもちろんある。でも――）"

[[dialogue]]
speaker = "リノ"
# （今この瞬間、目の前に広がる鮮やかで美しい青い海のように、素敵なものだったらいいなと期待してしまう）
line = "（今この瞬間、目の前に広がる鮮やかで美しい青い海のように、素敵なものだったらいいなと期待してしまう）"

[[dialogue]]
speaker = "リノ"
# （――どうか、幸せでありますように）
line = "（――どうか、幸せでありますように）"

[[dialogue]]
speaker = "unk"
# そう願いながら、私は世界でいちばん大切な手を、今度はしっかりと離さずに、握り返すのだった――
line = "そう願いながら、私は世界でいちばん大切な手を、今度はしっかりと離さずに、握り返すのだった――"
