[[dialogue]]
speaker = "unk"
# 第３話,ＢＩＧ寒い冬の過ごし方,P
line = "第３話,ＢＩＧ寒い冬の過ごし方,P"

[[dialogue]]
speaker = "unk"
# 冬のある日。いつものように星徒会業務をしていると──
line = "冬のある日。いつものように星徒会業務をしていると──"

[[dialogue]]
speaker = "リップル"
# 「カイチョー！　タスケテくださーい！」
line = "「カイチョー！　タスケテくださーい！」"

[[dialogue]]
speaker = "unk"
# リップル！？　何があったんだ！？
line = "リップル！？　何があったんだ！？"

[[dialogue]]
speaker = "リップル"
# 「冬サムイです！　このままではコゴエテしまいまーす！」
line = "「冬サムイです！　このままではコゴエテしまいまーす！」"

[[dialogue]]
speaker = "マトイ"
# 「まぁ水着だもんね……。普通に制服着ればいいんじゃないの？」
line = "「まぁ水着だもんね……。普通に制服着ればいいんじゃないの？」"

[[dialogue]]
speaker = "リップル"
# 「ノー！　水着は夏のショーチョー。エンドレスサマーを大きくするタメには、ワタシが夏のココロを忘れないコトが大事です」
line = "「ノー！　水着は夏のショーチョー。エンドレスサマーを大きくするタメには、ワタシが夏のココロを忘れないコトが大事です」"

[[dialogue]]
speaker = "リップル"
# 「つまり、常に水着でいるコトが必要ナノです！」
line = "「つまり、常に水着でいるコトが必要ナノです！」"

[[dialogue]]
speaker = "マトイ"
# 「なる……ほど……？　でもさすがに服は着ないと寒いんじゃないかな……？」
line = "「なる……ほど……？　でもさすがに服は着ないと寒いんじゃないかな……？」"

[[dialogue]]
speaker = "リップル"
# 「ノンノン、そこはダイジョーブです。見えない極薄の結界をまとうコトで、服の代わりにシテいますから」
line = "「ノンノン、そこはダイジョーブです。見えない極薄の結界をまとうコトで、服の代わりにシテいますから」"

[[dialogue]]
speaker = "マトイ"
# 「そんなのアリなんだ！？」
line = "「そんなのアリなんだ！？」"

[[dialogue]]
speaker = "リップル"
# 「それでも、サムイものはサムイのでーす……。せめて冬らしいタノシミがあれば気分も違うとオモウのですが……」
line = "「それでも、サムイものはサムイのでーす……。せめて冬らしいタノシミがあれば気分も違うとオモウのですが……」"

[[dialogue]]
speaker = "unk"
# 寒いと温かいものが美味しくなるよ
line = "寒いと温かいものが美味しくなるよ"

[[dialogue]]
speaker = "リップル"
# 「温かいモノ……ラーメンとかですか？」
line = "「温かいモノ……ラーメンとかですか？」"

[[dialogue]]
speaker = "マトイ"
# 「そうだね、ラーメンもいいし……冬といえばおでんも美味しいよね♪」
line = "「そうだね、ラーメンもいいし……冬といえばおでんも美味しいよね♪」"

[[dialogue]]
speaker = "リップル"
# 「オデン……聞いたことある気がします……」
line = "「オデン……聞いたことある気がします……」"

[[dialogue]]
speaker = "マトイ"
# 「じゃあ星徒会の仕事も落ち着いたし、ちょっと買ってこよっか」
line = "「じゃあ星徒会の仕事も落ち着いたし、ちょっと買ってこよっか」"

[[dialogue]]
speaker = "unk"
# 寒風が吹く中、学園に一番近いコンビニでおでんを買いに行く。
line = "寒風が吹く中、学園に一番近いコンビニでおでんを買いに行く。"

[[dialogue]]
speaker = "unk"
# 戻ってくる頃には、体はすっかり冷え切っていた。
line = "戻ってくる頃には、体はすっかり冷え切っていた。"

[[dialogue]]
speaker = "リップル"
# 「う～っ、サムイでーす！　ブルブル……」
line = "「う～っ、サムイでーす！　ブルブル……」"

[[dialogue]]
speaker = "マトイ"
# 「確かに寒かったぁ……今日の冷え込みは一際かも。でもこういう日こそおでんが美味しくなるね」
line = "「確かに寒かったぁ……今日の冷え込みは一際かも。でもこういう日こそおでんが美味しくなるね」"

[[dialogue]]
speaker = "リップル"
# 「ソレでは……イタダキまーす！　はふはふ……オオ、これは確かにカラダが温まりますね♪」
line = "「ソレでは……イタダキまーす！　はふはふ……オオ、これは確かにカラダが温まりますね♪」"

[[dialogue]]
speaker = "マトイ"
# 「でしょ！　やっぱり冬はおでんだよ♪」
line = "「でしょ！　やっぱり冬はおでんだよ♪」"

[[dialogue]]
speaker = "マトイ"
# 「雪が積もってれば、雪合戦なんかもできるけど……今は全然降ってないから無理かな」
line = "「雪が積もってれば、雪合戦なんかもできるけど……今は全然降ってないから無理かな」"

[[dialogue]]
speaker = "リップル"
# 「フムフム……冬の楽しみ方、イロイロあるんですね～」
line = "「フムフム……冬の楽しみ方、イロイロあるんですね～」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ただいま～」
line = "「ただいま～」"

[[dialogue]]
speaker = "マトイ"
# 「あれ、ヴィーナスどこ行ってたの？」
line = "「あれ、ヴィーナスどこ行ってたの？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「購買よ。冬の楽しみ方がどうのって言ってたけど、それならこれよ！」
line = "「購買よ。冬の楽しみ方がどうのって言ってたけど、それならこれよ！」"

[[dialogue]]
speaker = "リップル"
# 「アイスクリーム……？　サムイのに冷たいもの食べるんデスか？」
line = "「アイスクリーム……？　サムイのに冷たいもの食べるんデスか？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふふん、わかってないわね。寒いからこそ、うんと暖房を効かせて、ぬくぬくしながらアイスを食べるのよ」
line = "「ふふん、わかってないわね。寒いからこそ、うんと暖房を効かせて、ぬくぬくしながらアイスを食べるのよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「アイスあげるから、リップルもやってみなさい。マトイたちの分もあるわよ」
line = "「アイスあげるから、リップルもやってみなさい。マトイたちの分もあるわよ」"

[[dialogue]]
speaker = "マトイ"
# 「ありがと、じゃあバニラもらうね」
line = "「ありがと、じゃあバニラもらうね」"

[[dialogue]]
speaker = "リップル"
# 「どれどれ……あ～ん」
line = "「どれどれ……あ～ん」"

[[dialogue]]
speaker = "ヴィーナス"
# 「どう？　美味しいでしょ？」
line = "「どう？　美味しいでしょ？」"

[[dialogue]]
speaker = "リップル"
# 「ウーン……確かにオイシイですけど、ビーチで食べるアイスの方がオイシイ気がします……」
line = "「ウーン……確かにオイシイですけど、ビーチで食べるアイスの方がオイシイ気がします……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええ～っ！？」
line = "「ええ～っ！？」"

[[dialogue]]
speaker = "マトイ"
# 「さすがに夏のビーチが比較対象なら、負けちゃうのも仕方ないかもね」
line = "「さすがに夏のビーチが比較対象なら、負けちゃうのも仕方ないかもね」"

[[dialogue]]
speaker = "リップル"
# 「う～、アイス食べたらサムクなってきました……でもオデンはもうありませーん……コマリました」
line = "「う～、アイス食べたらサムクなってきました……でもオデンはもうありませーん……コマリました」"

[[dialogue]]
speaker = "リップル"
# 「！　イイコト考えました。カイチョー、動かナイでくださいね♪」
line = "「！　イイコト考えました。カイチョー、動かナイでくださいね♪」"

[[dialogue]]
speaker = "リップル"
# 「カイチョーにハグです♪」
line = "「カイチョーにハグです♪」"

[[dialogue]]
speaker = "unk"
# わわっ
line = "わわっ"

[[dialogue]]
speaker = "リップル"
# 「こうしてカイチョーと密着してればアタタカイです♪　最初からこうすればヨカッタです♪」
line = "「こうしてカイチョーと密着してればアタタカイです♪　最初からこうすればヨカッタです♪」"

[[dialogue]]
speaker = "リップル"
# 「エヘヘ……カイチョーとくっついているとハッピーです……♪」
line = "「エヘヘ……カイチョーとくっついているとハッピーです……♪」"

[[dialogue]]
speaker = "リップル"
# 「ホッペタに～……チュッ<emoji=heart04>」
line = "「ホッペタに～……チュッ<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
# 「リップルってば大胆！？」
line = "「リップルってば大胆！？」"

[[dialogue]]
speaker = "unk"
# じゃあ俺からも……
line = "じゃあ俺からも……"

[[dialogue]]
speaker = "リップル"
# 「あ<emoji=heart04>　カイチョーにキスされちゃいました<emoji=heart04>」
line = "「あ<emoji=heart04>　カイチョーにキスされちゃいました<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
# 「会長も大胆！？」
line = "「会長も大胆！？」"

[[dialogue]]
speaker = "リップル"
# 「サムクなると、カイチョーがもっと温かく感じます。サムクていいコト、ありました。冬はギューってしていっぱい温まりましょー♪」
line = "「サムクなると、カイチョーがもっと温かく感じます。サムクていいコト、ありました。冬はギューってしていっぱい温まりましょー♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「どんな寒さもカップルの前には無力ってことね」
line = "「どんな寒さもカップルの前には無力ってことね」"

[[dialogue]]
speaker = "マトイ"
# 「はは……リップルらしいね」
line = "「はは……リップルらしいね」"
