# 「なら、もう１回頑張らないとな」
line = "「なら、もう１回頑張らないとな」"

[[dialogue]]
speaker = "サチ"
# 「んっ……<emoji=heart04>　は、はい<emoji=heart04>」
line = "「んっ……<emoji=heart04>　は、はい<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
# 「お兄さん、その……」
line = "「お兄さん、その……」"

[[dialogue]]
speaker = "サチ"
# 「……<b>ありがとうございます</b><emoji=heart04>」
line = "「……<b>ありがとうございます</b><emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
# 「エッチの最中に……好きってたくさん口に出しちゃいましたけど……」
line = "「エッチの最中に……好きってたくさん口に出しちゃいましたけど……」"

[[dialogue]]
speaker = "サチ"
# 「私はその……エッチなことよりも、お兄さんの方が――その、大好きですから<emoji=heart04>」
line = "「私はその……エッチなことよりも、お兄さんの方が――その、大好きですから<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
# 「あっ……すごいっ<emoji=heart04>　お兄さん、もう大きくなって……<emoji=heart04>」
line = "「あっ……すごいっ<emoji=heart04>　お兄さん、もう大きくなって……<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
# 「あっ<emoji=heart04>　あんっ<emoji=heart04>」
line = "「あっ<emoji=heart04>　あんっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# その後、淫紋が消えるまで、俺は何度も彼女の中に精を注ぎ込み続け、彼女はその度に『ありがとうございます』と嬉しそうにお礼を口にするのだった――
line = "その後、淫紋が消えるまで、俺は何度も彼女の中に精を注ぎ込み続け、彼女はその度に『ありがとうございます』と嬉しそうにお礼を口にするのだった――"
