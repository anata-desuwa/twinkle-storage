[[dialogue]]
speaker = "サラン"
# 「お帰りなさい、エルゼ～」
line = "「お帰りなさい、エルゼ～」"

[[dialogue]]
speaker = "unk"
# アステラを消滅させ、戻ってきた俺たちをサランが迎えてくれた。
line = "アステラを消滅させ、戻ってきた俺たちをサランが迎えてくれた。"

[[dialogue]]
speaker = "ラティエ"
# 「見事な一撃だったな、エルデリーゼ嬢」
line = "「見事な一撃だったな、エルデリーゼ嬢」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「そ、そんな！　とんでもありませんわ！」
line = "「そ、そんな！　とんでもありませんわ！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「それどころか先走って、スピードに任せて突出してしまうなんて……連携の大切さは学んできた筈ですのに」
line = "「それどころか先走って、スピードに任せて突出してしまうなんて……連携の大切さは学んできた筈ですのに」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「会長様と学園長様に助けて頂きましたわ……逆に申し訳ありませんでしたの……」
line = "「会長様と学園長様に助けて頂きましたわ……逆に申し訳ありませんでしたの……」"

[[dialogue]]
speaker = "ラティエ"
# 「とっさに思ったようには身体は動かないものさ。経験の浅いうちは仕方ない」
line = "「とっさに思ったようには身体は動かないものさ。経験の浅いうちは仕方ない」"

[[dialogue]]
speaker = "ラティエ"
# 「それを置いても良く頑張った、エルデリーゼ嬢」
line = "「それを置いても良く頑張った、エルデリーゼ嬢」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「学園長様……」
line = "「学園長様……」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「私、考えを改めましたわ……旅に連れて行って欲しいなどと、我がままを言って申し訳ありませんでした」
line = "「私、考えを改めましたわ……旅に連れて行って欲しいなどと、我がままを言って申し訳ありませんでした」"

[[dialogue]]
speaker = "ラティエ"
# 「旅の同行者となるのは諦める、ということか？」
line = "「旅の同行者となるのは諦める、ということか？」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「学園長様の剣、バラクィエルを振るった一瞬に垣間見えた力だけでも、遥かな隔たりを感じましたわ」
line = "「学園長様の剣、バラクィエルを振るった一瞬に垣間見えた力だけでも、遥かな隔たりを感じましたわ」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「旅に同行するならば、私はもっともっと強くならなければなりませんの」
line = "「旅に同行するならば、私はもっともっと強くならなければなりませんの」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「そのためにも私、この学園で研鑽を積み、実力を磨きます」
line = "「そのためにも私、この学園で研鑽を積み、実力を磨きます」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「それが星騎士としてその責任を果たすために、私が為さねばならないことなのだと思いましたわ」
line = "「それが星騎士としてその責任を果たすために、私が為さねばならないことなのだと思いましたわ」"

[[dialogue]]
speaker = "ラティエ"
# 「そうか……立派な星騎士になるだろうな、きみは」
line = "「そうか……立派な星騎士になるだろうな、きみは」"

[[dialogue]]
speaker = "ラティエ"
# 「……正直、少し安心した。いろいろ理由を付けてはいたが、本当のことを言うと私は一人旅に慣れ過ぎてしまっている」
line = "「……正直、少し安心した。いろいろ理由を付けてはいたが、本当のことを言うと私は一人旅に慣れ過ぎてしまっている」"

[[dialogue]]
speaker = "ラティエ"
# 「だから同行者ができてしまうと、私にとっての旅が旅でなくなってしまうのではないかという思いもあったのだ」
line = "「だから同行者ができてしまうと、私にとっての旅が旅でなくなってしまうのではないかという思いもあったのだ」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「ですが途中で出会った人と、共に旅することもあるのでしょう？」
line = "「ですが途中で出会った人と、共に旅することもあるのでしょう？」"

[[dialogue]]
speaker = "ラティエ"
# 「そうだな。だが、旅人はそれぞれ違った目的を胸に抱いて旅をしているものだ」
line = "「そうだな。だが、旅人はそれぞれ違った目的を胸に抱いて旅をしているものだ」"

[[dialogue]]
speaker = "ラティエ"
# 「同じ方向を向くことはあれど、全く同じ目的地になることはない。旅とはそういうものだと私は思っている」
line = "「同じ方向を向くことはあれど、全く同じ目的地になることはない。旅とはそういうものだと私は思っている」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「私が旅に求めていたのは、狭い自分の世界を広げることであり、知らなかったことを知りたいという好奇心ですわ」
line = "「私が旅に求めていたのは、狭い自分の世界を広げることであり、知らなかったことを知りたいという好奇心ですわ」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「それは、学園長様の目的とはやはり違っていますの」
line = "「それは、学園長様の目的とはやはり違っていますの」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「私の目的を果たすためには、誰かの同行者になるのではなく、自分の第一歩で私自身の旅を始めなければならないという事ですわね」
line = "「私の目的を果たすためには、誰かの同行者になるのではなく、自分の第一歩で私自身の旅を始めなければならないという事ですわね」"

[[dialogue]]
speaker = "ラティエ"
# 「そういうことだな」
line = "「そういうことだな」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「けれど学園長様……ひとつだけ言わせていただきますの」
line = "「けれど学園長様……ひとつだけ言わせていただきますの」"

[[dialogue]]
speaker = "ラティエ"
# 「ほう、何かな？」
line = "「ほう、何かな？」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「私は今日、学園長様と会えて、いろいろなお話をしていただいて本当に良かったと思っているんですの」
line = "「私は今日、学園長様と会えて、いろいろなお話をしていただいて本当に良かったと思っているんですの」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「それは私の中でずっともやもやと抱えていたものに、ひとつの形を与えてくださったからですわ」
line = "「それは私の中でずっともやもやと抱えていたものに、ひとつの形を与えてくださったからですわ」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「私は桜十路家の娘として生まれ、厳格な家庭環境の中で育ちました」
line = "「私は桜十路家の娘として生まれ、厳格な家庭環境の中で育ちました」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「家を恨む気持ちはありません。ですが自由への渇望をずっと抱え続けてきたことも事実ですの」
line = "「家を恨む気持ちはありません。ですが自由への渇望をずっと抱え続けてきたことも事実ですの」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「そんな私にとって学園長様、あなたは目指すべき理想の姿なのですわ」
line = "「そんな私にとって学園長様、あなたは目指すべき理想の姿なのですわ」"

[[dialogue]]
speaker = "unk"
# エスメラルダ先生が聞いたら頭を抱えそうな事を高らかに宣言するエルゼの表情には、清々しさがにじみ出ていた。
line = "エスメラルダ先生が聞いたら頭を抱えそうな事を高らかに宣言するエルゼの表情には、清々しさがにじみ出ていた。"

[[dialogue]]
speaker = "unk"
# ラティエ学園長は珍しく恥ずかしそうな様子で頭をかいている。
line = "ラティエ学園長は珍しく恥ずかしそうな様子で頭をかいている。"

[[dialogue]]
speaker = "unk"
# そんな２人の様子に、俺とサランは顔を見合わせては温かい気持ちになるのだった。
line = "そんな２人の様子に、俺とサランは顔を見合わせては温かい気持ちになるのだった。"
