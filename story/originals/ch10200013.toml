[[dialogue]]
speaker = "unk"
# 第３話,流行りはどんどん取り入れます,P
line = "第３話,流行りはどんどん取り入れます,P"

[[dialogue]]
speaker = "ルルカ"
# 「ふっふっふ……お兄ちゃん、もう逃げられないよ」
line = "「ふっふっふ……お兄ちゃん、もう逃げられないよ」"

[[dialogue]]
speaker = "ルルカ"
# 「今、Ｒｙｕｔｕｂｅでは耳かき動画が大流行中……」
line = "「今、Ｒｙｕｔｕｂｅでは耳かき動画が大流行中……」"

[[dialogue]]
speaker = "ルルカ"
# 「汐ルカルカのチャンネルのモットーは、人気になるなら何でもやろう、だから……」
line = "「汐ルカルカのチャンネルのモットーは、人気になるなら何でもやろう、だから……」"

[[dialogue]]
speaker = "ルルカ"
# 「えへへ。耳かきの練習台になって♪　おにーちゃん♪」
line = "「えへへ。耳かきの練習台になって♪　おにーちゃん♪」"

[[dialogue]]
speaker = "ルルカ"
# 「ふふ～。どうかなー、お兄ちゃん。後輩の女の子の膝枕♪　ドキドキする？」
line = "「ふふ～。どうかなー、お兄ちゃん。後輩の女の子の膝枕♪　ドキドキする？」"

[[dialogue]]
speaker = "unk"
# ちょっと恥ずかしいかも
line = "ちょっと恥ずかしいかも"

[[dialogue]]
speaker = "ルルカ"
# 「まだまだ。本番はこれからだよー」
line = "「まだまだ。本番はこれからだよー」"

[[dialogue]]
speaker = "ルルカ"
# 「んーっと……竹のやつだとぶすってしちゃいそうだし……綿棒の方が初心者向きだよね」
line = "「んーっと……竹のやつだとぶすってしちゃいそうだし……綿棒の方が初心者向きだよね」"

[[dialogue]]
speaker = "ルルカ"
# 「お耳の浅いところに入れて～……くるくる、くるくる……♪」
line = "「お耳の浅いところに入れて～……くるくる、くるくる……♪」"

[[dialogue]]
speaker = "unk"
# （これは……気持ちがいい……！）
line = "（これは……気持ちがいい……！）"

[[dialogue]]
speaker = "ルルカ"
# 「きゃあ♪　お兄ちゃんのお顔、すっごくふやけちゃってる。うんうん、気持ちいいよねー、お耳の中をくすぐられるのって」
line = "「きゃあ♪　お兄ちゃんのお顔、すっごくふやけちゃってる。うんうん、気持ちいいよねー、お耳の中をくすぐられるのって」"

[[dialogue]]
speaker = "ルルカ"
# 「お耳の中って迷走神経？　ってのがあるんだよ。触れるか触れないか、くらいの力でこしこしするとー……♪」
line = "「お耳の中って迷走神経？　ってのがあるんだよ。触れるか触れないか、くらいの力でこしこしするとー……♪」"

[[dialogue]]
speaker = "ルルカ"
# 「ふふふ♪　もじもじしちゃうの、止められないよね♪」
line = "「ふふふ♪　もじもじしちゃうの、止められないよね♪」"

[[dialogue]]
speaker = "ルルカ"
# 「いーい、お兄ちゃん？　これは耳かき動画を投稿するための、練習だからね？」
line = "「いーい、お兄ちゃん？　これは耳かき動画を投稿するための、練習だからね？」"

[[dialogue]]
speaker = "ルルカ"
# 「耳かきされてる人がどんなリアクションを取るか。どういう息遣いをするか。どういうペース配分がベストなのか……」
line = "「耳かきされてる人がどんなリアクションを取るか。どういう息遣いをするか。どういうペース配分がベストなのか……」"

[[dialogue]]
speaker = "ルルカ"
# 「リアリティがあればあるほど、動画のクオリティは上がるの。だから──」
line = "「リアリティがあればあるほど、動画のクオリティは上がるの。だから──」"

[[dialogue]]
speaker = "ルルカ"
# 「こしょこしょこしょ～♪　恥ずかしくっても、気持ちよかったら遠慮せずに反応しちゃっていいんだからね<emoji=heart04>」
line = "「こしょこしょこしょ～♪　恥ずかしくっても、気持ちよかったら遠慮せずに反応しちゃっていいんだからね<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
# 「感じたら、ちゃーんと声に出すこと！」
line = "「感じたら、ちゃーんと声に出すこと！」"

[[dialogue]]
speaker = "ルルカ"
# 「もじもじされると……んぅ、お兄ちゃんの髪の毛が膝に擦れて、ちょっとくすぐったいけど……それも貴重なサンプルだからね」
line = "「もじもじされると……んぅ、お兄ちゃんの髪の毛が膝に擦れて、ちょっとくすぐったいけど……それも貴重なサンプルだからね」"

[[dialogue]]
speaker = "ルルカ"
# 「かきかき……かきかき、かき……♪」
line = "「かきかき……かきかき、かき……♪」"

[[dialogue]]
speaker = "ルルカ"
# 「かきかきかき……かきかき、かき……。……うーん」
line = "「かきかきかき……かきかき、かき……。……うーん」"

[[dialogue]]
speaker = "ルルカ"
# 「……あ、あれだね。耳かき中って、けっこう緊張するね……シンとしちゃうし、どうしても」
line = "「……あ、あれだね。耳かき中って、けっこう緊張するね……シンとしちゃうし、どうしても」"

[[dialogue]]
speaker = "ルルカ"
# 「何かお話しよっか？　あんまりゲラゲラ笑っちゃうようなお喋りは、できないけど……」
line = "「何かお話しよっか？　あんまりゲラゲラ笑っちゃうようなお喋りは、できないけど……」"

[[dialogue]]
speaker = "ルルカ"
# 「うん、そうだよー。人気が出る前はねー……色んな人の企画を真似してたんだぁ」
line = "「うん、そうだよー。人気が出る前はねー……色んな人の企画を真似してたんだぁ」"

[[dialogue]]
speaker = "ルルカ"
# 「超絶難易度の死にゲーを初見で全クリするまで眠れません、みたいなやつとかー……」
line = "「超絶難易度の死にゲーを初見で全クリするまで眠れません、みたいなやつとかー……」"

[[dialogue]]
speaker = "ルルカ"
# 「視聴者参加型のパズルゲームでぼっこぼこにされたりー。うん、人気が出るためなら手段は選ばずやってきたんだよ」
line = "「視聴者参加型のパズルゲームでぼっこぼこにされたりー。うん、人気が出るためなら手段は選ばずやってきたんだよ」"

[[dialogue]]
speaker = "ルルカ"
# 「あんまり過激にしちゃうとＢＡＮされちゃうから、そこは避けてきたけど……」
line = "「あんまり過激にしちゃうとＢＡＮされちゃうから、そこは避けてきたけど……」"

[[dialogue]]
speaker = "ルルカ"
# 「……あ、そうだ。ちょっと聞いてみたい事、あったんだ」
line = "「……あ、そうだ。ちょっと聞いてみたい事、あったんだ」"

[[dialogue]]
speaker = "ルルカ"
# 「お兄ちゃんって、あたしがアップロードしてる動画でどのジャンルが好き？　チャレンジ系？　それともゲーム実況？」
line = "「お兄ちゃんって、あたしがアップロードしてる動画でどのジャンルが好き？　チャレンジ系？　それともゲーム実況？」"

[[dialogue]]
speaker = "unk"
# 歌の動画
line = "歌の動画"

[[dialogue]]
speaker = "ルルカ"
# 「──えっ」
line = "「──えっ」"

[[dialogue]]
speaker = "ルルカ"
# 「え、えへへ……そうなんだっ……歌の動画かあ……。そういえば聞いてくれてるって言ってたもんね」
line = "「え、えへへ……そうなんだっ……歌の動画かあ……。そういえば聞いてくれてるって言ってたもんね」"

[[dialogue]]
speaker = "ルルカ"
# 「活動初期から、ずっと休まず投稿してるけど……ネタ動画よりは伸びないからねー……もちろん、好きって言ってくれる人もたくさんいるから続けられてるんだけど」
line = "「活動初期から、ずっと休まず投稿してるけど……ネタ動画よりは伸びないからねー……もちろん、好きって言ってくれる人もたくさんいるから続けられてるんだけど」"

[[dialogue]]
speaker = "ルルカ"
# 「……えへへ。お兄ちゃんってけっこう変わってるかも」
line = "「……えへへ。お兄ちゃんってけっこう変わってるかも」"

[[dialogue]]
speaker = "unk"
# ルルカの歌、元気が出るから好きだよ
line = "ルルカの歌、元気が出るから好きだよ"

[[dialogue]]
speaker = "ルルカ"
# 「……そっか。ふふ。そっかー」
line = "「……そっか。ふふ。そっかー」"

[[dialogue]]
speaker = "ルルカ"
# 「けっこう嬉しかったから……お耳に、ふ～ってしてあげるね♪　……ふーっ<emoji=heart04>」
line = "「けっこう嬉しかったから……お耳に、ふ～ってしてあげるね♪　……ふーっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# くすぐったっ！？
line = "くすぐったっ！？"

[[dialogue]]
speaker = "ルルカ"
# 「ふふー♪　耳かきの締めはやっぱりこれだよね。お耳にふーってされるの、気持ちいいって聞いたんだ～」
line = "「ふふー♪　耳かきの締めはやっぱりこれだよね。お耳にふーってされるの、気持ちいいって聞いたんだ～」"

[[dialogue]]
speaker = "ルルカ"
# 「よーし、こっちのお耳は終わり。反対側をするから、向きを変えて、お兄ちゃん！」
line = "「よーし、こっちのお耳は終わり。反対側をするから、向きを変えて、お兄ちゃん！」"

[[dialogue]]
speaker = "ルルカ"
# 「かりかりかり……っと」
line = "「かりかりかり……っと」"

[[dialogue]]
speaker = "ルルカ"
# 「うん、耳かきのコツは掴めたかも。やっぱり実際にしてみると、いろいろ発見があるなぁ」
line = "「うん、耳かきのコツは掴めたかも。やっぱり実際にしてみると、いろいろ発見があるなぁ」"

[[dialogue]]
speaker = "ルルカ"
# 「で……お兄ちゃんは、寝落ちしちゃってる……？　ふふ。寝顔、とっても可愛いかも♪」
line = "「で……お兄ちゃんは、寝落ちしちゃってる……？　ふふ。寝顔、とっても可愛いかも♪」"

[[dialogue]]
speaker = "ルルカ"
# 「…………ありがとーね。お兄ちゃん。あたしの歌、褒めてくれて」
line = "「…………ありがとーね。お兄ちゃん。あたしの歌、褒めてくれて」"

[[dialogue]]
speaker = "ルルカ"
# 「ほっぺは恥ずかしいし、お耳にしちゃお……」
line = "「ほっぺは恥ずかしいし、お耳にしちゃお……」"

[[dialogue]]
speaker = "ルルカ"
# 「──ちゅっ<emoji=heart04>」
line = "「──ちゅっ<emoji=heart04>」"
