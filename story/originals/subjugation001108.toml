[[dialogue]]
speaker = "unk"
# その後――
line = "その後――"

[[dialogue]]
speaker = "unk"
# 新たなフォームに覚醒したトワ先生の活躍により、アステラの攻略に成功。
line = "新たなフォームに覚醒したトワ先生の活躍により、アステラの攻略に成功。"

[[dialogue]]
speaker = "unk"
# 後にＳランクを超えた脅威として、ＳＳランク認定される新種モンスターの討伐をもって、事態は終息を迎えた――
line = "後にＳランクを超えた脅威として、ＳＳランク認定される新種モンスターの討伐をもって、事態は終息を迎えた――"

[[dialogue]]
speaker = "メイプル"
# 「――トワ先生、怪我はもう大丈夫……？」
line = "「――トワ先生、怪我はもう大丈夫……？」"

[[dialogue]]
speaker = "トワ先生"
# 「うん！　調べてもらったけど、どこも異常ないみたいだよ」
line = "「うん！　調べてもらったけど、どこも異常ないみたいだよ」"

[[dialogue]]
speaker = "トワ先生"
# 「新しいフォームに変身した時のライズ・オーバーブーストで、全快しちゃったみたい。２人の方はどう？」
line = "「新しいフォームに変身した時のライズ・オーバーブーストで、全快しちゃったみたい。２人の方はどう？」"

[[dialogue]]
speaker = "unk"
# 反動とかは全然ないです
line = "反動とかは全然ないです"

[[dialogue]]
speaker = "メイプル"
# 「あたしも！　怪我してた足も治って、ピンピンしてるよ！」
line = "「あたしも！　怪我してた足も治って、ピンピンしてるよ！」"

[[dialogue]]
speaker = "トワ先生"
# 「それならよかった。行けるって感覚があって２人に付与したけど、万が一不備があったら問題だしね」
line = "「それならよかった。行けるって感覚があって２人に付与したけど、万が一不備があったら問題だしね」"

[[dialogue]]
speaker = "メイプル"
# 「……先生、改めてなんだけど、今回のこと、迷惑をかけてごめんなさい」
line = "「……先生、改めてなんだけど、今回のこと、迷惑をかけてごめんなさい」"

[[dialogue]]
speaker = "トワ先生"
# 「ん？　ああ、無事に帰って来れた安心感で忘れちゃってた。そうだったね……でも」
line = "「ん？　ああ、無事に帰って来れた安心感で忘れちゃってた。そうだったね……でも」"

[[dialogue]]
speaker = "トワ先生"
# 「メイプルちゃんは、自分の問題点を認めて、反省することができた。だからきっと、これからは大丈夫。そうでしょ？」
line = "「メイプルちゃんは、自分の問題点を認めて、反省することができた。だからきっと、これからは大丈夫。そうでしょ？」"

[[dialogue]]
speaker = "メイプル"
# 「うん。意地になって１人で突っ走るのは、もう止める。だけど、先生……」
line = "「うん。意地になって１人で突っ走るのは、もう止める。だけど、先生……」"

[[dialogue]]
speaker = "メイプル"
# 「あたしはその上で、やっぱり魔王を目指したい」
line = "「あたしはその上で、やっぱり魔王を目指したい」"

[[dialogue]]
speaker = "unk"
# メイプルは俺の方に視線を向けながら、言う。
line = "メイプルは俺の方に視線を向けながら、言う。"

[[dialogue]]
speaker = "メイプル"
# 「お兄ちゃんみたいな、仲間を信じて一緒に戦う魔王に！」
line = "「お兄ちゃんみたいな、仲間を信じて一緒に戦う魔王に！」"

[[dialogue]]
speaker = "トワ先生"
# 「そっか。なら先生も、メイプルちゃんに謝らせて欲しい」
line = "「そっか。なら先生も、メイプルちゃんに謝らせて欲しい」"

[[dialogue]]
speaker = "メイプル"
# 「え……？」
line = "「え……？」"

[[dialogue]]
speaker = "トワ先生"
# 「――ごめんなさい、メイプルちゃん。先生は、あなたの家庭事情を詳しく知っているわけじゃないのに、家出はよくないと勝手に決めつけてた」
line = "「――ごめんなさい、メイプルちゃん。先生は、あなたの家庭事情を詳しく知っているわけじゃないのに、家出はよくないと勝手に決めつけてた」"

[[dialogue]]
speaker = "トワ先生"
# 「あなたがどれだけ本気でここに来たのかを考えずに、大人の責任感だけで諭そうとした」
line = "「あなたがどれだけ本気でここに来たのかを考えずに、大人の責任感だけで諭そうとした」"

[[dialogue]]
speaker = "トワ先生"
# 「メイプルちゃんの気持ちと、本気で向き合えていなかった。ごめんなさい」
line = "「メイプルちゃんの気持ちと、本気で向き合えていなかった。ごめんなさい」"

[[dialogue]]
speaker = "トワ先生"
# 「だから、改めて言わせて欲しい。私は、メイプルちゃんが本気なら、その夢を応援したい」
line = "「だから、改めて言わせて欲しい。私は、メイプルちゃんが本気なら、その夢を応援したい」"

[[dialogue]]
speaker = "トワ先生"
# 「今回の新種モンスターの強さからもわかる通り、リクリエがそこまで迫ってきていることはもはや明白」
line = "「今回の新種モンスターの強さからもわかる通り、リクリエがそこまで迫ってきていることはもはや明白」"

[[dialogue]]
speaker = "トワ先生"
# 「そのことも考えて、次の大交流ではメイプルちゃんのご両親に手紙を送ろうと思う」
line = "「そのことも考えて、次の大交流ではメイプルちゃんのご両親に手紙を送ろうと思う」"

[[dialogue]]
speaker = "トワ先生"
# 「メイプルちゃん本人の希望もあり、学園の星騎士として迎え、共にリクリエと戦うことになりました。そして――」
line = "「メイプルちゃん本人の希望もあり、学園の星騎士として迎え、共にリクリエと戦うことになりました。そして――」"

[[dialogue]]
speaker = "トワ先生"
# 「彼女の保護者代理として、新星学園教師・有明トワが責任を持って面倒を見ます……ってね♪」
line = "「彼女の保護者代理として、新星学園教師・有明トワが責任を持って面倒を見ます……ってね♪」"

[[dialogue]]
speaker = "メイプル"
# 「……！　先生……！」
line = "「……！　先生……！」"

[[dialogue]]
speaker = "トワ先生"
# 「って感じでどうかな？　会長くん」
line = "「って感じでどうかな？　会長くん」"

[[dialogue]]
speaker = "unk"
# そういうことなら、大歓迎です
line = "そういうことなら、大歓迎です"

[[dialogue]]
speaker = "メイプル"
# 「お兄ちゃん！　ありがとう！」
line = "「お兄ちゃん！　ありがとう！」"

[[dialogue]]
speaker = "トワ先生"
# 「ふふっ、じゃあ、メイプルちゃんが学園に転入できるよう、上に掛け合ってみますか♪」
line = "「ふふっ、じゃあ、メイプルちゃんが学園に転入できるよう、上に掛け合ってみますか♪」"

[[dialogue]]
speaker = "メイプル"
# 「……あ、あの！　先生！」
line = "「……あ、あの！　先生！」"

[[dialogue]]
speaker = "トワ先生"
# 「ん？」
line = "「ん？」"

[[dialogue]]
speaker = "メイプル"
# 「学園に通うようになったら、住む場所が必要だよね……？」
line = "「学園に通うようになったら、住む場所が必要だよね……？」"

[[dialogue]]
speaker = "トワ先生"
# 「ああ、そっか！　確かにね。まだ案内してなかったけど、新星学園には寮があって――」
line = "「ああ、そっか！　確かにね。まだ案内してなかったけど、新星学園には寮があって――」"

[[dialogue]]
speaker = "メイプル"
# 「あたし！　その……！」
line = "「あたし！　その……！」"

[[dialogue]]
speaker = "メイプル"
# 「トワ先生が嫌じゃなければなんだけど……今のまま、先生と一緒に住んじゃダメ、かな……？」
line = "「トワ先生が嫌じゃなければなんだけど……今のまま、先生と一緒に住んじゃダメ、かな……？」"

[[dialogue]]
speaker = "メイプル"
# 「先生と一緒の暮らし……お姉ちゃんができたみたいで、楽しかったから……！」
line = "「先生と一緒の暮らし……お姉ちゃんができたみたいで、楽しかったから……！」"

[[dialogue]]
speaker = "トワ先生"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "unk"
# トワ先生は驚いたように目を丸くして、それから――
line = "トワ先生は驚いたように目を丸くして、それから――"

[[dialogue]]
speaker = "トワ先生"
# 「いいよ。メイプルちゃんが気に入ってくれたなら、これからも一緒に住もっか♪」
line = "「いいよ。メイプルちゃんが気に入ってくれたなら、これからも一緒に住もっか♪」"

[[dialogue]]
speaker = "unk"
# 微笑んで、メイプルの頭をそっと撫でた。
line = "微笑んで、メイプルの頭をそっと撫でた。"

[[dialogue]]
speaker = "メイプル"
# 「うん！　にへへ……♪」
line = "「うん！　にへへ……♪」"

[[dialogue]]
speaker = "メイプル"
# 「改めて、これからもよろしくね。先生！」
line = "「改めて、これからもよろしくね。先生！」"

[[dialogue]]
speaker = "unk"
# メイプルは心から嬉しそうな笑顔を浮かべるのだった――
line = "メイプルは心から嬉しそうな笑顔を浮かべるのだった――"

[[dialogue]]
speaker = "unk"
# 後日。
line = "後日。"

[[dialogue]]
speaker = "unk"
# 俺が星徒会室で仕事をしていると――
line = "俺が星徒会室で仕事をしていると――"

[[dialogue]]
speaker = "メイプル"
# 「お兄ちゃん♪」
line = "「お兄ちゃん♪」"

[[dialogue]]
speaker = "メイプル"
# 「じゃ～ん！　おはよう♪」
line = "「じゃ～ん！　おはよう♪」"

[[dialogue]]
speaker = "unk"
# おおっ、制服！　似合ってるな
line = "おおっ、制服！　似合ってるな"

[[dialogue]]
speaker = "メイプル"
# 「にへへ♪　ありがとう♪」
line = "「にへへ♪　ありがとう♪」"

[[dialogue]]
speaker = "メイプル"
# 「実は正式に新星学園への転入が決まって、制服が完成したから、見せたくなっちゃって♪」
line = "「実は正式に新星学園への転入が決まって、制服が完成したから、見せたくなっちゃって♪」"

[[dialogue]]
speaker = "メイプル"
# 「あとは、お兄ちゃんに伝えたいこともあってね」
line = "「あとは、お兄ちゃんに伝えたいこともあってね」"

[[dialogue]]
speaker = "unk"
# 伝えたいこと……？
line = "伝えたいこと……？"

[[dialogue]]
speaker = "unk"
# すると、メイプルは眼帯を付けて――
line = "すると、メイプルは眼帯を付けて――"

[[dialogue]]
speaker = "メイプル"
# 「我からお兄ちゃんに、改めて宣言する！」
line = "「我からお兄ちゃんに、改めて宣言する！」"

[[dialogue]]
speaker = "メイプル"
# 「先日の戦闘……アルケインコードの発動、実に見事であった！」
line = "「先日の戦闘……アルケインコードの発動、実に見事であった！」"

[[dialogue]]
speaker = "メイプル"
# 「故に我、メイプル・モノクラウンは、お兄ちゃんを今代の魔王として認める！」
line = "「故に我、メイプル・モノクラウンは、お兄ちゃんを今代の魔王として認める！」"

[[dialogue]]
speaker = "メイプル"
# 「だが、我が信じる魔王とは、血を引くか否かではなく、その在り方を示し、世界を救う者！」
line = "「だが、我が信じる魔王とは、血を引くか否かではなく、その在り方を示し、世界を救う者！」"

[[dialogue]]
speaker = "メイプル"
# 「故に、魔王は必ずしも１人である必要はない！」
line = "「故に、魔王は必ずしも１人である必要はない！」"

[[dialogue]]
speaker = "メイプル"
# 「我は魔王になる夢を諦めたりしない！　すなわち――」
line = "「我は魔王になる夢を諦めたりしない！　すなわち――」"

[[dialogue]]
speaker = "メイプル"
# 「我は今日より『魔王の妹』となることを、ここに宣言する！」
line = "「我は今日より『魔王の妹』となることを、ここに宣言する！」"

[[dialogue]]
speaker = "unk"
# え、えっと……つまり……？
line = "え、えっと……つまり……？"

[[dialogue]]
speaker = "メイプル"
# 「ふっふっふ……すなわち『兄妹魔王』の契りを結び、共に魔王道を歩むということだ！」
line = "「ふっふっふ……すなわち『兄妹魔王』の契りを結び、共に魔王道を歩むということだ！」"

[[dialogue]]
speaker = "メイプル"
# 「というわけで――」
line = "「というわけで――」"

[[dialogue]]
speaker = "メイプル"
# 「一緒に頑張って行こうね、お兄ちゃん♪」
line = "「一緒に頑張って行こうね、お兄ちゃん♪」"

[[dialogue]]
speaker = "unk"
# 自称・魔王の妹は、そう言って元気に笑ってみせるのだった――
line = "自称・魔王の妹は、そう言って元気に笑ってみせるのだった――"
