[[dialogue]]
speaker = "unk"
# 第３話,セシアのママ理論,P
line = "第３話,セシアのママ理論,P"

[[dialogue]]
speaker = "unk"
# ある日の星徒会室。遊びにきたセシアに、サーシャさんがアプローチをしていた。
line = "ある日の星徒会室。遊びにきたセシアに、サーシャさんがアプローチをしていた。"

[[dialogue]]
speaker = "サーシャ"
# 「セシアちゃ～ん、１度でいいから、私のこともママって呼んで欲しいわ～！」
line = "「セシアちゃ～ん、１度でいいから、私のこともママって呼んで欲しいわ～！」"

[[dialogue]]
speaker = "サーシャ"
# 「ほら、お姉ちゃん、裁縫が得意だから、今日はセシアちゃんの好きな蝶を、レースで沢山作ってきたのよ～？」
line = "「ほら、お姉ちゃん、裁縫が得意だから、今日はセシアちゃんの好きな蝶を、レースで沢山作ってきたのよ～？」"

[[dialogue]]
speaker = "セシア"
# 「じ～っ……」
line = "「じ～っ……」"

[[dialogue]]
speaker = "サーシャ"
# 「どうかしら？　これでママ的にプラス１ポイントだったり――」
line = "「どうかしら？　これでママ的にプラス１ポイントだったり――」"

[[dialogue]]
speaker = "セシア"
# 「蝶はとても素敵な出来だと思うけれど、サーシャはやはり、わたくしのママではないわ」
line = "「蝶はとても素敵な出来だと思うけれど、サーシャはやはり、わたくしのママではないわ」"

[[dialogue]]
speaker = "サーシャ"
# 「そんな～！」
line = "「そんな～！」"

[[dialogue]]
speaker = "unk"
# サーシャさん、今日もダメだったか……
line = "サーシャさん、今日もダメだったか……"

[[dialogue]]
speaker = "unk"
# サーシャさんが星徒会の中でも１番母性的だと思うんだけど、と俺が口にすると――
line = "サーシャさんが星徒会の中でも１番母性的だと思うんだけど、と俺が口にすると――"

[[dialogue]]
speaker = "セシア"
# 「会長、母性とは年齢も性別も関係ないものなのよ。クリスマスの時にも言ったけれど、大事なのは、そこにオギャれるバブみがあるかどうかよ」
line = "「会長、母性とは年齢も性別も関係ないものなのよ。クリスマスの時にも言ったけれど、大事なのは、そこにオギャれるバブみがあるかどうかよ」"

[[dialogue]]
speaker = "セシア"
# 「確かにサーシャは、いずれとてつもない母性を開花させる、大きな将来性を秘めていると感じるわ」
line = "「確かにサーシャは、いずれとてつもない母性を開花させる、大きな将来性を秘めていると感じるわ」"

[[dialogue]]
speaker = "セシア"
# 「だけど、今はママじゃない。何故ならば――」
line = "「だけど、今はママじゃない。何故ならば――」"

[[dialogue]]
speaker = "セシア"
# 「あなたのやっていることは、ママではなく、お姉ちゃんだからよ」
line = "「あなたのやっていることは、ママではなく、お姉ちゃんだからよ」"

[[dialogue]]
speaker = "サーシャ"
# 「お姉ちゃん、ショック！」
line = "「お姉ちゃん、ショック！」"

[[dialogue]]
speaker = "セシア"
# 「ほら、今だって、自分のことをお姉ちゃんだって言ってるじゃない。そこから変わろうとしないと、サーシャはママにはなれないわ」
line = "「ほら、今だって、自分のことをお姉ちゃんだって言ってるじゃない。そこから変わろうとしないと、サーシャはママにはなれないわ」"

[[dialogue]]
speaker = "サーシャ"
# 「うぅ……でも私、みんなのお姉ちゃんじゃなくなったら、どう生きていけば……！？」
line = "「うぅ……でも私、みんなのお姉ちゃんじゃなくなったら、どう生きていけば……！？」"

[[dialogue]]
speaker = "unk"
# そこまで悩むほど！？
line = "そこまで悩むほど！？"

[[dialogue]]
speaker = "セシア"
# 「つまりはそういうことよ、サーシャ。あなたはわたくしからママと呼ばれたいだけで、本当のママに心からなりたいと思っているわけじゃない」
line = "「つまりはそういうことよ、サーシャ。あなたはわたくしからママと呼ばれたいだけで、本当のママに心からなりたいと思っているわけじゃない」"

[[dialogue]]
speaker = "セシア"
# 「あなたは、本当はみんなのお姉ちゃんになりたいのよ」
line = "「あなたは、本当はみんなのお姉ちゃんになりたいのよ」"

[[dialogue]]
speaker = "セシア"
# 「だけど、さっきも言った通り、あなたにはママとしての大きな将来性があるわ。それはおそらく――」
line = "「だけど、さっきも言った通り、あなたにはママとしての大きな将来性があるわ。それはおそらく――」"

[[dialogue]]
speaker = "セシア"
# 「あなたが自分の子供を授かって、育てることになった時に、母性が花開くことになる。今はまだ、その時ではないわ」
line = "「あなたが自分の子供を授かって、育てることになった時に、母性が花開くことになる。今はまだ、その時ではないわ」"

[[dialogue]]
speaker = "セシア"
# 「だから、あなたは焦らずに、まずは自分の中の愛を見つけて、それをじっくりと育みなさい」
line = "「だから、あなたは焦らずに、まずは自分の中の愛を見つけて、それをじっくりと育みなさい」"

[[dialogue]]
speaker = "セシア"
# 「その蓄積が、いつか大きなバブみに変わるはずよ」
line = "「その蓄積が、いつか大きなバブみに変わるはずよ」"

[[dialogue]]
speaker = "unk"
# そう言ってセシアは、サーシャさんの頭を優しく撫でる。
line = "そう言ってセシアは、サーシャさんの頭を優しく撫でる。"

[[dialogue]]
speaker = "サーシャ"
# 「な、なんだかむしろ、セシアちゃんから母性を感じるわ……！」
line = "「な、なんだかむしろ、セシアちゃんから母性を感じるわ……！」"

[[dialogue]]
speaker = "セシア"
# 「ふふっ、体は小さいけど、わたくしは世界を愛する守護天使だもの。サーシャのことだって、自分の子供のように愛しているのよ」
line = "「ふふっ、体は小さいけど、わたくしは世界を愛する守護天使だもの。サーシャのことだって、自分の子供のように愛しているのよ」"

[[dialogue]]
speaker = "マトイ"
# 「ただいま～。って、あれ？」
line = "「ただいま～。って、あれ？」"

[[dialogue]]
speaker = "マトイ"
# 「セシアちゃん、来てたんだ。こんにちは～。今日はどうしたの？」
line = "「セシアちゃん、来てたんだ。こんにちは～。今日はどうしたの？」"

[[dialogue]]
speaker = "セシア"
# 「マトイママ～♪　セシア、ママに会いたくて、遊びに来たの～♪」
line = "「マトイママ～♪　セシア、ママに会いたくて、遊びに来たの～♪」"

[[dialogue]]
speaker = "unk"
# マトイママ！？
line = "マトイママ！？"

[[dialogue]]
speaker = "サーシャ"
# 「母性的なセシアちゃんから、一気に甘えモードに！　あ～ん！　マトイちゃん、ずるいわ～！」
line = "「母性的なセシアちゃんから、一気に甘えモードに！　あ～ん！　マトイちゃん、ずるいわ～！」"

[[dialogue]]
speaker = "マトイ"
# 「いや、そんなこと言われても……というか、相変わらず私は、セシアちゃんのママ判定のストライクゾーンなんだね……」
line = "「いや、そんなこと言われても……というか、相変わらず私は、セシアちゃんのママ判定のストライクゾーンなんだね……」"

[[dialogue]]
speaker = "マトイ"
# 「その、セシアちゃん。なんで私はママなの……？」
line = "「その、セシアちゃん。なんで私はママなの……？」"

[[dialogue]]
speaker = "セシア"
# 「ん～？　ママでないことに理由は沢山あるけど、ママであることに理由は必要ないのよ」
line = "「ん～？　ママでないことに理由は沢山あるけど、ママであることに理由は必要ないのよ」"

[[dialogue]]
speaker = "セシア"
# 「バブみがあるから、ママなのではないわ――」
line = "「バブみがあるから、ママなのではないわ――」"

[[dialogue]]
speaker = "セシア"
# 「そこにママがいるから、バブみが生まれるのよ♪」
line = "「そこにママがいるから、バブみが生まれるのよ♪」"

[[dialogue]]
speaker = "unk"
# 結局、謎判定では……？
line = "結局、謎判定では……？"

[[dialogue]]
speaker = "セシア"
# 「マトイママのバブみがわからないなんて、見る目が甘いわね、会長」
line = "「マトイママのバブみがわからないなんて、見る目が甘いわね、会長」"

[[dialogue]]
speaker = "マトイ"
# 「いや、私自身も普通にわからないんだけど……」
line = "「いや、私自身も普通にわからないんだけど……」"

[[dialogue]]
speaker = "セシア"
# 「その、普通にしてて醸し出されるバブみがいいのよ♪」
line = "「その、普通にしてて醸し出されるバブみがいいのよ♪」"

[[dialogue]]
speaker = "サーシャ"
# 「やっぱり羨ましいわ～！　マトイちゃん、私にバブみの出し方を教えて～！」
line = "「やっぱり羨ましいわ～！　マトイちゃん、私にバブみの出し方を教えて～！」"

[[dialogue]]
speaker = "マトイ"
# 「ちょっ、サーシャさん、そんなこと言われても、私にもわからないんですってば！」
line = "「ちょっ、サーシャさん、そんなこと言われても、私にもわからないんですってば！」"

[[dialogue]]
speaker = "セシア"
# 「じ～っ……」
line = "「じ～っ……」"

[[dialogue]]
speaker = "unk"
# ふと、セシアがじっと俺を見つめていることに気付く。どうしたのかと尋ねると――
line = "ふと、セシアがじっと俺を見つめていることに気付く。どうしたのかと尋ねると――"

[[dialogue]]
speaker = "セシア"
# 「う～ん、会長はやっぱり、わたくしのママではないわね」
line = "「う～ん、会長はやっぱり、わたくしのママではないわね」"

[[dialogue]]
speaker = "セシア"
# 「なんでかしら……？」
line = "「なんでかしら……？」"

[[dialogue]]
speaker = "unk"
# いや男だからでは！？
line = "いや男だからでは！？"

[[dialogue]]
speaker = "セシア"
# 「いいえ、ママに性別は関係ないのよ。あなただって、わたくしのママになる可能性があるわ」
line = "「いいえ、ママに性別は関係ないのよ。あなただって、わたくしのママになる可能性があるわ」"

[[dialogue]]
speaker = "unk"
# セシアのママ判定の基準を理解するには、どうやらまだまだ時間がかかりそうだと思う俺なのであった――
line = "セシアのママ判定の基準を理解するには、どうやらまだまだ時間がかかりそうだと思う俺なのであった――"
