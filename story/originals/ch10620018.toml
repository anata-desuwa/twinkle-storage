line = "「はぁ……んっ<emoji=heart04>　はあぁ……まだ全然……ふうぅ……息が整わない……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
# 「まさか、エッチがこんなにすごいものだなんて……<emoji=heart04>　んっ……<emoji=heart04>　文献だけでは、決して分からない衝撃だったよ……<emoji=heart04>」
line = "「まさか、エッチがこんなにすごいものだなんて……<emoji=heart04>　んっ……<emoji=heart04>　文献だけでは、決して分からない衝撃だったよ……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
# 「はあぁ……<emoji=heart04>　だけど……いや、そうだな<emoji=heart04>　キミとのエッチなんて……彼女である私じゃないと……経験できないんだから当たり前、か……<emoji=heart04>」
line = "「はあぁ……<emoji=heart04>　だけど……いや、そうだな<emoji=heart04>　キミとのエッチなんて……彼女である私じゃないと……経験できないんだから当たり前、か……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
# 「ふふ……っ<emoji=heart04>　行為の途中……キミの好きって気持ちがすごい伝わってきた……<emoji=heart04>」
line = "「ふふ……っ<emoji=heart04>　行為の途中……キミの好きって気持ちがすごい伝わってきた……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
# 「こんな幸せな気持ちになるのなら、なるほど……世の中のカップルが猿になるのも、頷けるというものだ……<emoji=heart04>」
line = "「こんな幸せな気持ちになるのなら、なるほど……世の中のカップルが猿になるのも、頷けるというものだ……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
# 「んっ……よし、やっと落ち着いてきた。まだ心臓はバクバクしているが、そんなもの、キミの隣にいたらいつものことだからな<emoji=heart04>」
line = "「んっ……よし、やっと落ち着いてきた。まだ心臓はバクバクしているが、そんなもの、キミの隣にいたらいつものことだからな<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
# 「……しょうがないだろう、こんなにも好きなんだ。私だって、いつも冷静でいられるわけじゃない」
line = "「……しょうがないだろう、こんなにも好きなんだ。私だって、いつも冷静でいられるわけじゃない」"

[[dialogue]]
speaker = "ジュエリー"
# 「んふふっ<emoji=heart04>　……ああ、そうだ。エッチの時に言った言葉、覚えているかい？」
line = "「んふふっ<emoji=heart04>　……ああ、そうだ。エッチの時に言った言葉、覚えているかい？」"

[[dialogue]]
speaker = "ジュエリー"
# 「キミの好きなところをたくさん挙げた時のことだ。その中でも……特に重要なものがあるんだ」
line = "「キミの好きなところをたくさん挙げた時のことだ。その中でも……特に重要なものがあるんだ」"

[[dialogue]]
speaker = "ジュエリー"
# 「それはだな……ふふふっ<emoji=heart04>　ズバリ、明解に換言するならば――」
line = "「それはだな……ふふふっ<emoji=heart04>　ズバリ、明解に換言するならば――」"

[[dialogue]]
speaker = "ジュエリー"
# 「私を大好きだと、ちゃんと言葉にしてくれるところだ」
line = "「私を大好きだと、ちゃんと言葉にしてくれるところだ」"

[[dialogue]]
speaker = "ジュエリー"
# 「言葉にして――形にして、ちゃんと好きだと伝えてくれる。そんなところが……私はとっても大好きなんだ<emoji=heart04>」
line = "「言葉にして――形にして、ちゃんと好きだと伝えてくれる。そんなところが……私はとっても大好きなんだ<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
# 「ふふっ<emoji=heart04>　どうだい？　私の言葉にキュンとしてくれたかい？」
line = "「ふふっ<emoji=heart04>　どうだい？　私の言葉にキュンとしてくれたかい？」"

[[dialogue]]
speaker = "ジュエリー"
# 「何でわかるのかって？　それはだね……あんなに出したばかりなのに、キミのおち○ちんがまた、反応してるからさ<emoji=heart04>」
line = "「何でわかるのかって？　それはだね……あんなに出したばかりなのに、キミのおち○ちんがまた、反応してるからさ<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
# 「なに大丈夫、そのまま我慢しろだなんて、私が言うはずがないだろう？　だから――」
line = "「なに大丈夫、そのまま我慢しろだなんて、私が言うはずがないだろう？　だから――」"

[[dialogue]]
speaker = "ジュエリー"
# 「今日はお互いの気が済むまで、とことん愛の営みをしようじゃないか……<emoji=heart04>」
line = "「今日はお互いの気が済むまで、とことん愛の営みをしようじゃないか……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# その後、俺は何度も何度も、ジュエリーへの愛を形にして伝えるのだった――
line = "その後、俺は何度も何度も、ジュエリーへの愛を形にして伝えるのだった――"
