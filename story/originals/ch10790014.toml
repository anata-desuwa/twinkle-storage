[[dialogue]]
speaker = "unk"
# 第４話,パテルとデート？,P
line = "第４話,パテルとデート？,P"

[[dialogue]]
speaker = "パテル"
# 「デート！」
line = "「デート！」"

[[dialogue]]
speaker = "unk"
# いきなりどうしたんだ？
line = "いきなりどうしたんだ？"

[[dialogue]]
speaker = "パテル"
# 「あたし、好き勝手生きるって決めたからね。だから女の子として、デートしたい時はデートするんだよ」
line = "「あたし、好き勝手生きるって決めたからね。だから女の子として、デートしたい時はデートするんだよ」"

[[dialogue]]
speaker = "パテル"
# 「前の遊園地もデートって言ってたって～？　もう、女の子がデートしたいって言ったら、付き合うのが男の甲斐性ってやつでしょ」
line = "「前の遊園地もデートって言ってたって～？　もう、女の子がデートしたいって言ったら、付き合うのが男の甲斐性ってやつでしょ」"

[[dialogue]]
speaker = "パテル"
# 「ほら、ケチケチしない。ヒアウィーゴー♪」
line = "「ほら、ケチケチしない。ヒアウィーゴー♪」"

[[dialogue]]
speaker = "パテル"
# 「あ～ぁ、魔王ってば、家を出た途端に呼び出しとはついてないね～……」
line = "「あ～ぁ、魔王ってば、家を出た途端に呼び出しとはついてないね～……」"

[[dialogue]]
speaker = "パテル"
# 「謝らなくてもいいよ、別に。あなたが忙しいのは知ってるつもりだから」
line = "「謝らなくてもいいよ、別に。あなたが忙しいのは知ってるつもりだから」"

[[dialogue]]
speaker = "パテル"
# 「で、用件は？　……予算の書類を急いで出さないといけない？　も～、そういうのは忘れちゃダメじゃん」
line = "「で、用件は？　……予算の書類を急いで出さないといけない？　も～、そういうのは忘れちゃダメじゃん」"

[[dialogue]]
speaker = "パテル"
# 「でも……ここが新星学園の星徒会室か～。こんな感じなんだ」
line = "「でも……ここが新星学園の星徒会室か～。こんな感じなんだ」"

[[dialogue]]
speaker = "パテル"
# 「あなたが多くの時間を過ごしてる空間……うん、なかなか悪くないね。ソファもふかふかだし」
line = "「あなたが多くの時間を過ごしてる空間……うん、なかなか悪くないね。ソファもふかふかだし」"

[[dialogue]]
speaker = "パテル"
# 「んじゃ、あたしは仕事が終わるまで大人しく待ってるから」
line = "「んじゃ、あたしは仕事が終わるまで大人しく待ってるから」"

[[dialogue]]
speaker = "パテル"
# 「……うずうず」
line = "「……うずうず」"

[[dialogue]]
speaker = "パテル"
# 「ふぅ～」
line = "「ふぅ～」"

[[dialogue]]
speaker = "パテル"
# 「アハハッ、ビクってした～♪　魔王は耳が弱いのかなぁ～」
