line = "「書類あと１枚で終わり？　うんうん、よく頑張ったね。守護天使パテル様が褒めてあげる♪」"

[[dialogue]]
speaker = "パテル"
# 「は～い、最後の１枚も終わり♪　じゃあ今度こそデートを──」
