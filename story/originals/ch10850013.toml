[[dialogue]]
speaker = "unk"
# 第３話,ママダレナ禁止デート,P
line = "第３話,ママダレナ禁止デート,P"

[[dialogue]]
speaker = "unk"
# とある週末、俺はマグダレナと東京へデートに出かけることになった。
line = "とある週末、俺はマグダレナと東京へデートに出かけることになった。"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「――会長、お待たせしました～♪」
line = "「――会長、お待たせしました～♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「あっ、気づいていただけましたか？　えへへ、今日はオシャレとして、ヒールローファーを履いてみたんです♪」
line = "「あっ、気づいていただけましたか？　えへへ、今日はオシャレとして、ヒールローファーを履いてみたんです♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「ちょっとヒールが高めなんですが、こうするとよりスタイルがよく見えるそうです。……どうでしょう？　似合ってますか？」
line = "「ちょっとヒールが高めなんですが、こうするとよりスタイルがよく見えるそうです。……どうでしょう？　似合ってますか？」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「――えへへ、ありがとうございます♪　じゃあ、今日は１日、ママダレナとのデートを楽しんじゃいましょうね♪」
line = "「――えへへ、ありがとうございます♪　じゃあ、今日は１日、ママダレナとのデートを楽しんじゃいましょうね♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「って、どうしましたか、会長？　――今日のデートについて、提案がある……ですか？　はい、なんでしょうか？」
line = "「って、どうしましたか、会長？　――今日のデートについて、提案がある……ですか？　はい、なんでしょうか？」"

[[dialogue]]
speaker = "unk"
# 今日は１日、ママダレナは禁止にしよう
line = "今日は１日、ママダレナは禁止にしよう"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「え！？　会長、そ、それはどういうことですか……？」
line = "「え！？　会長、そ、それはどういうことですか……？」"

[[dialogue]]
speaker = "unk"
# 今日１日、いつも以上に恋人としてのマグダレナとデートがしたい――俺はそう考えを伝える。
line = "今日１日、いつも以上に恋人としてのマグダレナとデートがしたい――俺はそう考えを伝える。"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「そんな……！　美味しいスイーツのお店で、会長にあ～んって食べさせたりとか、定番のイチャイチャを楽しみにしてたのに……！」
line = "「そんな……！　美味しいスイーツのお店で、会長にあ～んって食べさせたりとか、定番のイチャイチャを楽しみにしてたのに……！」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「それに、私が会長を甘やかしているのは、そうすることで私が会長に甘えさせてもらっていると言いますか……」
line = "「それに、私が会長を甘やかしているのは、そうすることで私が会長に甘えさせてもらっていると言いますか……」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「だから、甘やかすのを禁止されてしまったら、逆にどう会長に接したらいいか、迷ってしまいます……」
line = "「だから、甘やかすのを禁止されてしまったら、逆にどう会長に接したらいいか、迷ってしまいます……」"

[[dialogue]]
speaker = "unk"
# 大丈夫、俺がエスコートするから
line = "大丈夫、俺がエスコートするから"

[[dialogue]]
speaker = "unk"
# そう言って、マグダレナに手を差し伸べると――
line = "そう言って、マグダレナに手を差し伸べると――"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「わ、わかりました……」
line = "「わ、わかりました……」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「その……お手柔らかにお願いします……」
line = "「その……お手柔らかにお願いします……」"

[[dialogue]]
speaker = "unk"
# そうして、東京に着いた俺たちは、ウィンドウショッピングをすることになり、手を繋いで街中を歩いていた。
line = "そうして、東京に着いた俺たちは、ウィンドウショッピングをすることになり、手を繋いで街中を歩いていた。"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「か、会長と手を繋ぐのは、普段から結構しているはずなのに、いざ恋人として接しようと意識すると、やっぱりドキドキしてしまいます……」
line = "「か、会長と手を繋ぐのは、普段から結構しているはずなのに、いざ恋人として接しようと意識すると、やっぱりドキドキしてしまいます……」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「そ、その……手を繋ぐの、一旦止めちゃダメですか？」
line = "「そ、その……手を繋ぐの、一旦止めちゃダメですか？」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「緊張して、手汗がすごく出ている気がして……は、恥ずかしくて……」
line = "「緊張して、手汗がすごく出ている気がして……は、恥ずかしくて……」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「――か、可愛いって……！　そんなこと言われたら、ますます顔が熱くなってしまいます……！」
line = "「――か、可愛いって……！　そんなこと言われたら、ますます顔が熱くなってしまいます……！」"

[[dialogue]]
speaker = "unk"
# 恋人にも慣れてもらわないとね
line = "恋人にも慣れてもらわないとね"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「うぅ……会長にこれまで、ママダレナとして甘えていたツケが来てしまっています……」
line = "「うぅ……会長にこれまで、ママダレナとして甘えていたツケが来てしまっています……」"

[[dialogue]]
speaker = "unk"
# 俺たちは抹茶スイーツが人気の店に入ると、抹茶ケーキを注文して、席に座る。そして――
line = "俺たちは抹茶スイーツが人気の店に入ると、抹茶ケーキを注文して、席に座る。そして――"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「って、私があ～んをされる立場に！？　ち、ちょっと待って下さい！」
line = "「って、私があ～んをされる立場に！？　ち、ちょっと待って下さい！」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「――い、いえ、抹茶スイーツは好きですが！　会長からあ～んをされるのは初めてなので、まだ心の準備が……！」
line = "「――い、いえ、抹茶スイーツは好きですが！　会長からあ～んをされるのは初めてなので、まだ心の準備が……！」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「周りからの視線も気になりますし……た、タイミングを伺ってから……」
line = "「周りからの視線も気になりますし……た、タイミングを伺ってから……」"

[[dialogue]]
speaker = "unk"
# 遠慮せずに甘えていいんだぞ
line = "遠慮せずに甘えていいんだぞ"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「う……いつも私が同じことを言っているので、逃げ道が……！」
line = "「う……いつも私が同じことを言っているので、逃げ道が……！」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「わ、わかりました……す～……は～……す～……は～……」
line = "「わ、わかりました……す～……は～……す～……は～……」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「ど、どうぞ。あ～ん……！」
line = "「ど、どうぞ。あ～ん……！」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「あむっ♪　もぐもぐ……んっ……！」
line = "「あむっ♪　もぐもぐ……んっ……！」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「お、美味しいです……抹茶ケーキ自体もそうですけど、それだけじゃなくて……何だかすごく……<emoji=heart04>」
line = "「お、美味しいです……抹茶ケーキ自体もそうですけど、それだけじゃなくて……何だかすごく……<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「あ～んされるのって、こんな感じなんですね……はふぅ……<emoji=heart04>」
line = "「あ～んされるのって、こんな感じなんですね……はふぅ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# もっと食べる？
line = "もっと食べる？"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「は、はい……お願いします。――あ～ん<emoji=heart04>」
line = "「は、はい……お願いします。――あ～ん<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そんな風にして、今日は俺が行く場所を提案して、マグダレナをリードし続けた。やがて、帰る時間になったのだが――
line = "そんな風にして、今日は俺が行く場所を提案して、マグダレナをリードし続けた。やがて、帰る時間になったのだが――"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「きゃっ……！？」
line = "「きゃっ……！？」"

[[dialogue]]
speaker = "unk"
# おっと！　大丈夫か？
line = "おっと！　大丈夫か？"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「ありがとうございます。今日１日、緊張してドキドキし続けていたせいか、急に力が抜けて、足元がふらついてしまって……」
line = "「ありがとうございます。今日１日、緊張してドキドキし続けていたせいか、急に力が抜けて、足元がふらついてしまって……」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「って、あぁっ……！　やってしまいました……今ので靴のヒールが壊れて……」
line = "「って、あぁっ……！　やってしまいました……今ので靴のヒールが壊れて……」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「せっかくのデートだったのに、これは変身して、飛んで帰るしかなさそうですね……って」
line = "「せっかくのデートだったのに、これは変身して、飛んで帰るしかなさそうですね……って」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「か、会長、何を……きゃっ！？」
line = "「か、会長、何を……きゃっ！？」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「こ、これって……お姫様抱っこ……！？」
line = "「こ、これって……お姫様抱っこ……！？」"

[[dialogue]]
speaker = "unk"
# 恋人として、ちゃんと家まで送らないとな
line = "恋人として、ちゃんと家まで送らないとな"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「そ、そんなことしなくても、１人で飛べるのに……」
line = "「そ、そんなことしなくても、１人で飛べるのに……」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「――い、嫌ではないです。むしろ嬉しいですが……！」
line = "「――い、嫌ではないです。むしろ嬉しいですが……！」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「お姫様抱っこは初めてなので、胸が破裂しそうなくらい、ドキドキしちゃいます……<emoji=heart04>」
line = "「お姫様抱っこは初めてなので、胸が破裂しそうなくらい、ドキドキしちゃいます……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# その後、俺たちは人目も憚らずに、お姫様抱っこのままデートの帰路に着くのだった――
line = "その後、俺たちは人目も憚らずに、お姫様抱っこのままデートの帰路に着くのだった――"
