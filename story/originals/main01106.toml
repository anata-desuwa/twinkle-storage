[[dialogue]]
speaker = "unk"
# 第８話,最後のピース,B
line = "第８話,最後のピース,B"

[[dialogue]]
speaker = "ラクシャ"
# 「やーらーれーたー」
line = "「やーらーれーたー」"

[[dialogue]]
speaker = "マトイ"
# 「もうっ、ふざけてるの！？」
line = "「もうっ、ふざけてるの！？」"

[[dialogue]]
speaker = "ラクシャ"
# 「いやいや、ふざけてないって。マジで限界なんだってば」
line = "「いやいや、ふざけてないって。マジで限界なんだってば」"

[[dialogue]]
speaker = "フィオナ"
# 「っ、ふぅ──ふぅ……なんとか……」
line = "「っ、ふぅ──ふぅ……なんとか……」"

[[dialogue]]
speaker = "サーシャ"
# 「ええ──さすがは守護天使……やりづらいったらなかったわね……」
line = "「ええ──さすがは守護天使……やりづらいったらなかったわね……」"

[[dialogue]]
speaker = "クロト"
# 「悪いな、環──俺たちは先を急がせてもらう」
line = "「悪いな、環──俺たちは先を急がせてもらう」"

[[dialogue]]
speaker = "ラクシャ"
# 「負けちゃったからには仕方ない。あの森はこの先だよ」
line = "「負けちゃったからには仕方ない。あの森はこの先だよ」"

[[dialogue]]
speaker = "ラクシャ"
# 「本来なら誰も立ち入れない禁忌の領域だ。何せ、どんな物でも生き物でもぐちゃぐちゃにされちゃうからね」
line = "「本来なら誰も立ち入れない禁忌の領域だ。何せ、どんな物でも生き物でもぐちゃぐちゃにされちゃうからね」"

[[dialogue]]
speaker = "ラクシャ"
# 「でも今日ならそんな侵食も全てが<b>凍てついてる</b>。最大のチャンスだ」
line = "「でも今日ならそんな侵食も全てが<b>凍てついてる</b>。最大のチャンスだ」"

[[dialogue]]
speaker = "フィオナ"
# 「やはり──ヴィーナスさんの読み通り……」
line = "「やはり──ヴィーナスさんの読み通り……」"

[[dialogue]]
speaker = "マトイ"
# 「それに、これだけ強くなった私たちなら……！」
line = "「それに、これだけ強くなった私たちなら……！」"

[[dialogue]]
speaker = "ラクシャ"
# 「はは……確かにキミたちの成長は……確かめさせて、もらったよ。大したもんだ……」
line = "「はは……確かにキミたちの成長は……確かめさせて、もらったよ。大したもんだ……」"

[[dialogue]]
speaker = "ラクシャ"
# 「でも……それだけじゃ、彼には勝てない……」
line = "「でも……それだけじゃ、彼には勝てない……」"

[[dialogue]]
speaker = "unk"
# 仰向けに倒れた環は、遠い目をしてそう呟く。
line = "仰向けに倒れた環は、遠い目をしてそう呟く。"

[[dialogue]]
speaker = "クロト"
# 「なら──俺たちに欠けているものは何だ？」
line = "「なら──俺たちに欠けているものは何だ？」"

[[dialogue]]
speaker = "ラクシャ"
# 「さぁ？　でも、今度の相手は、モンスターなんかじゃないからね……」
line = "「さぁ？　でも、今度の相手は、モンスターなんかじゃないからね……」"

[[dialogue]]
speaker = "ラクシャ"
# 「ただ……このまま邪魔者として退散していくのも、癪だしさ……少しくらいは力を貸すよ」
line = "「ただ……このまま邪魔者として退散していくのも、癪だしさ……少しくらいは力を貸すよ」"

[[dialogue]]
speaker = "ラクシャ"
# 「まあ……これだけじゃ到底、足りないだろうけどね……」
line = "「まあ……これだけじゃ到底、足りないだろうけどね……」"

[[dialogue]]
speaker = "unk"
# そう言って、彼女がその場に取り出したものは──儚い輝石のカケラだった。
line = "そう言って、彼女がその場に取り出したものは──儚い輝石のカケラだった。"

[[dialogue]]
speaker = "フィオナ"
# 「これは──<ruby=クロスダスト>霊屑</ruby>……！」
line = "「これは──<ruby>霊屑<rt>クロスダスト</rt></ruby>……！」"

[[dialogue]]
speaker = "ラクシャ"
# 「あれ──なんだ、知ってるの……？」
line = "「あれ──なんだ、知ってるの……？」"

[[dialogue]]
speaker = "クロト"
# 「マグダレナさん──それからアルモタヘルさんの分も預かってる。<ruby=やつ>黒騎士</ruby>に対抗するための力としてな」
line = "「マグダレナさん──それからアルモタヘルさんの分も預かってる。<ruby>黒騎士<rt>やつ</rt></ruby>に対抗するための力としてな」"

[[dialogue]]
speaker = "ラクシャ"
# 「あはは……なんだ。それなら──万に一つくらいは……なんとかなるかも……ね……」
line = "「あはは……なんだ。それなら──万に一つくらいは……なんとかなるかも……ね……」"

[[dialogue]]
speaker = "ラクシャ"
# 「それじゃ……世界が無事なら、また会えるかもね──」
line = "「それじゃ……世界が無事なら、また会えるかもね──」"

[[dialogue]]
speaker = "マトイ"
# 「い……市倉さん……！？」
line = "「い……市倉さん……！？」"

[[dialogue]]
speaker = "unk"
# 環は最後にそう言い残すと。
line = "環は最後にそう言い残すと。"

[[dialogue]]
speaker = "unk"
# 眠るように目を閉じて、そのまま──
line = "眠るように目を閉じて、そのまま──"

[[dialogue]]
speaker = "サーシャ"
# 「消え……ちゃった……？」
line = "「消え……ちゃった……？」"

[[dialogue]]
speaker = "ニャリオン"
# 「マグダレニャのようニャ──依り代だったみたいニャンね」
line = "「マグダレニャのようニャ──依り代だったみたいニャンね」"

[[dialogue]]
speaker = "クロト"
# 「人騒がせなやつだ……友人として、俺からも謝っておくよ。悪いな、みんな」
line = "「人騒がせなやつだ……友人として、俺からも謝っておくよ。悪いな、みんな」"

[[dialogue]]
speaker = "フィオナ"
# 「彼女の事情については──今、詮索している場合ではありませんね」
line = "「彼女の事情については──今、詮索している場合ではありませんね」"

[[dialogue]]
speaker = "フィオナ"
# 「それよりも、大事なのは……」
line = "「それよりも、大事なのは……」"

[[dialogue]]
speaker = "クロト"
# 「ああ。三人目の守護天使からも力を託された──俺たちはそれに応えるだけだ」
line = "「ああ。三人目の守護天使からも力を託された──俺たちはそれに応えるだけだ」"

[[dialogue]]
speaker = "クロト"
# 「どんなモンスターも──魔獣も──守護天使も──俺たちは乗り越えてきた。この先に待ち受けるものだって、きっと超えられる」
line = "「どんなモンスターも──魔獣も──守護天使も──俺たちは乗り越えてきた。この先に待ち受けるものだって、きっと超えられる」"

[[dialogue]]
speaker = "サーシャ"
# 「ええ。レゾフに残した２人のためにも──負けられないわ」
line = "「ええ。レゾフに残した２人のためにも──負けられないわ」"

[[dialogue]]
speaker = "マトイ"
# 「私だって、星徒会の一員なんだから……！」
line = "「私だって、星徒会の一員なんだから……！」"

[[dialogue]]
speaker = "フィオナ"
# 「ヴィーナスさんのいる冥森林ネメシスへ──最後の一直線です！」
line = "「ヴィーナスさんのいる冥森林ネメシスへ──最後の一直線です！」"
