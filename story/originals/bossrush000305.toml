[[dialogue]]
speaker = "煌嶺"
# 「妾はこの世界を守る。たとえ他の世界を滅ぼしてもな」
line = "「妾はこの世界を守る。たとえ他の世界を滅ぼしてもな」"

[[dialogue]]
speaker = "煌嶺"
# 「生存競争であるというなら、この戦い、受けて立とうではないか！」
line = "「生存競争であるというなら、この戦い、受けて立とうではないか！」"

[[dialogue]]
speaker = "unk"
# アルタイルを守るために、デネブを滅ぼす──煌嶺はそう宣言した。
line = "アルタイルを守るために、デネブを滅ぼす──煌嶺はそう宣言した。"

[[dialogue]]
speaker = "unk"
# 煌嶺は新星学園の星騎士たちを、その戦いのための兵士にしようとしたのだ。
line = "煌嶺は新星学園の星騎士たちを、その戦いのための兵士にしようとしたのだ。"

[[dialogue]]
speaker = "unk"
# それに対抗したのは、もう１人の学園長候補であるシノさんだった。
line = "それに対抗したのは、もう１人の学園長候補であるシノさんだった。"

[[dialogue]]
speaker = "シノ"
# 「新星星徒会は、あのディザスターハンドを倒すつもりです」
line = "「新星星徒会は、あのディザスターハンドを倒すつもりです」"

[[dialogue]]
speaker = "シノ"
# 「ディザスターハンドに潰されるのに怯えながらデネブと戦うか、それとも<ruby=リクリエ>厄災</ruby>の化身たるディザスターハンドと戦うか。煌嶺殿はどちらがお好みですか？」
line = "「ディザスターハンドに潰されるのに怯えながらデネブと戦うか、それとも<ruby>厄災<rt>リクリエ</rt></ruby>の化身たるディザスターハンドと戦うか。煌嶺殿はどちらがお好みですか？」"

[[dialogue]]
speaker = "煌嶺"
# 「ふふ……くっくっく……言うではないか、シノとやら。つまり貴殿は、ディザスターハンドと戦う方が、星騎士がより輝くと言うのだな？」
line = "「ふふ……くっくっく……言うではないか、シノとやら。つまり貴殿は、ディザスターハンドと戦う方が、星騎士がより輝くと言うのだな？」"

[[dialogue]]
speaker = "煌嶺"
# 「ふふふ……これは予想外だ。人間界の経営者などつまらぬものと思っていたが、なかなか酔狂ではないか」
line = "「ふふふ……これは予想外だ。人間界の経営者などつまらぬものと思っていたが、なかなか酔狂ではないか」"

[[dialogue]]
speaker = "煌嶺"
# 「だが口先だけでは無意味。守る戦いが星騎士の本質というならば、妾が直々にその輝きを試してやろう」
line = "「だが口先だけでは無意味。守る戦いが星騎士の本質というならば、妾が直々にその輝きを試してやろう」"

[[dialogue]]
speaker = "unk"
# 煌嶺を迎え撃つのは、新星学園でも屈指の耐久力を持ち、元星徒会副会長でもあるシルヴィ先輩。
line = "煌嶺を迎え撃つのは、新星学園でも屈指の耐久力を持ち、元星徒会副会長でもあるシルヴィ先輩。"

[[dialogue]]
speaker = "シルヴィ"
# 「アステラ……！？　どうしてここに……！？」
line = "「アステラ……！？　どうしてここに……！？」"

[[dialogue]]
speaker = "煌嶺"
# 「あれは先日、我が尾に吸収したアステラだ」
line = "「あれは先日、我が尾に吸収したアステラだ」"

[[dialogue]]
speaker = "煌嶺"
# 「あのアステラを圧縮して貴様に叩き落とす。まともに受ければ跡形もなく消し飛ぶだろう」
line = "「あのアステラを圧縮して貴様に叩き落とす。まともに受ければ跡形もなく消し飛ぶだろう」"

[[dialogue]]
speaker = "煌嶺"
# 「どうする？　ここで妾に頭を垂れるなら、アステラを尾に戻してやるが」
line = "「どうする？　ここで妾に頭を垂れるなら、アステラを尾に戻してやるが」"

[[dialogue]]
speaker = "シルヴィ"
# 「答えは決まってる。──来いっ！！」
line = "「答えは決まってる。──来いっ！！」"

[[dialogue]]
speaker = "煌嶺"
# 「フ──よく言った」
line = "「フ──よく言った」"

[[dialogue]]
speaker = "煌嶺"
# 「さぁ、星の加護を受けし戦士よ。妾に抗ってみせよ──！」
line = "「さぁ、星の加護を受けし戦士よ。妾に抗ってみせよ──！」"

[[dialogue]]
speaker = "シルヴィ"
# 「おおおーーーーーっ！！」
line = "「おおおーーーーーっ！！」"

[[dialogue]]
speaker = "unk"
# アステラを弾として撃ち出す強烈無比な一撃。
line = "アステラを弾として撃ち出す強烈無比な一撃。"

[[dialogue]]
speaker = "unk"
# しかしシルヴィは耐えてみせ、星騎士の『守る』意志と力を証明した。
line = "しかしシルヴィは耐えてみせ、星騎士の『守る』意志と力を証明した。"

[[dialogue]]
speaker = "シルヴィ"
# 「ふぅ、はぁ、はぁ……どんなもんだいっ！」
line = "「ふぅ、はぁ、はぁ……どんなもんだいっ！」"

[[dialogue]]
speaker = "煌嶺"
# 「──フ」
line = "「──フ」"

[[dialogue]]
speaker = "煌嶺"
# 「フハハハハッ！　よくぞ大欲の女帝から新星学園を守り切った！」
line = "「フハハハハッ！　よくぞ大欲の女帝から新星学園を守り切った！」"

[[dialogue]]
speaker = "unk"
# シルヴィ先輩の奮闘の結果、煌嶺は星騎士たちを認め、学園長を目指すことを撤回。
line = "シルヴィ先輩の奮闘の結果、煌嶺は星騎士たちを認め、学園長を目指すことを撤回。"

[[dialogue]]
speaker = "unk"
# そしてシノさんが学園長となった。
line = "そしてシノさんが学園長となった。"

[[dialogue]]
speaker = "unk"
# その他には──
line = "その他には──"

[[dialogue]]
speaker = "煌嶺"
# 「ヤダヤダヤダヤダ！　肉まん食べたい食べたい！　肉まん食べた～い！」
line = "「ヤダヤダヤダヤダ！　肉まん食べたい食べたい！　肉まん食べた～い！」"

[[dialogue]]
speaker = "unk"
# 肉まんが食べたくて駄々をこねたり……
line = "肉まんが食べたくて駄々をこねたり……"

[[dialogue]]
speaker = "煌嶺"
# 「妾のものとなれ！」
line = "「妾のものとなれ！」"

[[dialogue]]
speaker = "モンスター"
# 「キシャー！？」
line = "「キシャー！？」"

[[dialogue]]
speaker = "unk"
# 機械型モンスターを自分のものにしたり……
line = "機械型モンスターを自分のものにしたり……"

[[dialogue]]
speaker = "unk"
# 天界に駆けつけたチナに極星従騎を貸したり……
line = "天界に駆けつけたチナに極星従騎を貸したり……"

[[dialogue]]
speaker = "unk"
# わがままを言ったり、気まぐれに俺たちを助けてくれたりと、女帝は気ままに振る舞っていた。
line = "わがままを言ったり、気まぐれに俺たちを助けてくれたりと、女帝は気ままに振る舞っていた。"
