[[dialogue]]
speaker = "ウィステリア"
# 「よーし、じゃあ開けるわよ」
line = "「よーし、じゃあ開けるわよ」"

[[dialogue]]
speaker = "モネ"
# 「はい！　せーの」
line = "「はい！　せーの」"

[[dialogue]]
speaker = "ウィステリア"
# 「ここが、新しい区画……って、あれ？　今までとあんまり変わらないわね……」
line = "「ここが、新しい区画……って、あれ？　今までとあんまり変わらないわね……」"

[[dialogue]]
speaker = "モネ"
# 「いえ！　間違いなく新しい区画です。まだ出会ったことのない本ばかりですから！」
line = "「いえ！　間違いなく新しい区画です。まだ出会ったことのない本ばかりですから！」"

[[dialogue]]
speaker = "モネ"
# （……でも、この感じ、何だろう？　初めて出会う本たちなのに、どこかで会ったような……）
line = "（……でも、この感じ、何だろう？　初めて出会う本たちなのに、どこかで会ったような……）"

[[dialogue]]
speaker = "ウィステリア"
# 「読んでもいないのに分かっちゃうのね。さすがというか、恐るべきというか」
line = "「読んでもいないのに分かっちゃうのね。さすがというか、恐るべきというか」"

[[dialogue]]
speaker = "モネ"
# 「はい。本は友達ですから。出会った子のことはちゃんと覚えてます」
line = "「はい。本は友達ですから。出会った子のことはちゃんと覚えてます」"

[[dialogue]]
speaker = "ウィステリア"
# 「もしかして今まで読んだ本の数とか覚えてたり？」
line = "「もしかして今まで読んだ本の数とか覚えてたり？」"

[[dialogue]]
speaker = "モネ"
# 「はい、もちろん。私が今まで読んだ本の数は──」
line = "「はい、もちろん。私が今まで読んだ本の数は──」"

[[dialogue]]
speaker = "ウィステリア"
# 「待って！　その先は怖いから待って！」
line = "「待って！　その先は怖いから待って！」"

[[dialogue]]
speaker = "モネ"
# 「……？　変なウィステリアさん」
line = "「……？　変なウィステリアさん」"

[[dialogue]]
speaker = "ウィステリア"
# 「それにしても、紙屋敷さんは本当に本が好きなのね。私にとって本は重荷だったから、やっぱり紙屋敷さんが羨ましいわ」
line = "「それにしても、紙屋敷さんは本当に本が好きなのね。私にとって本は重荷だったから、やっぱり紙屋敷さんが羨ましいわ」"

[[dialogue]]
speaker = "モネ"
# 「重荷、ですか？」
line = "「重荷、ですか？」"

[[dialogue]]
speaker = "ウィステリア"
# 「紙屋敷さんにも言ったことあるかしら？　私の家は魔界でも特別古い一族なの。それこそ図書館みたいな量の魔導書が家にあってね」
line = "「紙屋敷さんにも言ったことあるかしら？　私の家は魔界でも特別古い一族なの。それこそ図書館みたいな量の魔導書が家にあってね」"

[[dialogue]]
speaker = "ウィステリア"
# 「私は次期当主として生まれたものだから、子どもの頃から呪術と魔導書の扱いを叩き込まれたわ。次の世代にもそれを引き継ぐために」
line = "「私は次期当主として生まれたものだから、子どもの頃から呪術と魔導書の扱いを叩き込まれたわ。次の世代にもそれを引き継ぐために」"

[[dialogue]]
speaker = "ウィステリア"
# 「この鎖で繋がっている魔導書もそのひとつよ」
line = "「この鎖で繋がっている魔導書もそのひとつよ」"

[[dialogue]]
speaker = "ウィステリア"
# 「私にとって本は、終わらない人生の宿題──呪いそのものなの」
line = "「私にとって本は、終わらない人生の宿題──呪いそのものなの」"

[[dialogue]]
speaker = "モネ"
# 「ウィステリアさん……」
line = "「ウィステリアさん……」"

[[dialogue]]
speaker = "ウィステリア"
# 「あ、でもね、本すべてが嫌いなわけじゃないのよ。人間界に来てから好きな本にもたくさん出会えたわ」
line = "「あ、でもね、本すべてが嫌いなわけじゃないのよ。人間界に来てから好きな本にもたくさん出会えたわ」"

[[dialogue]]
speaker = "ウィステリア"
# 「流星学園に入って、クラスメイトに貸してもらったマンガを読んだ時は衝撃だったわ。なんてことない恋愛マンガだったんだけどね」
line = "「流星学園に入って、クラスメイトに貸してもらったマンガを読んだ時は衝撃だったわ。なんてことない恋愛マンガだったんだけどね」"

[[dialogue]]
speaker = "ウィステリア"
# 「田舎から都会に転校したヒロインが、いろんなトラブルを通して意中の男の子やクラスメイトの女の子と仲良くなっていくの」
line = "「田舎から都会に転校したヒロインが、いろんなトラブルを通して意中の男の子やクラスメイトの女の子と仲良くなっていくの」"

[[dialogue]]
speaker = "ウィステリア"
# 「私も魔界から出てきたばかりだから、すっごく感情移入しちゃった。恋愛の描き方もそりゃもう甘酸っぱくて。今読んだら恥ずかしくて最後まで読めないかも」
line = "「私も魔界から出てきたばかりだから、すっごく感情移入しちゃった。恋愛の描き方もそりゃもう甘酸っぱくて。今読んだら恥ずかしくて最後まで読めないかも」"

[[dialogue]]
speaker = "ウィステリア"
# 「それに何より、読んでも呪われないのよ！　人間界すごいって感動したわ。そんなの当たり前なのにね」
line = "「それに何より、読んでも呪われないのよ！　人間界すごいって感動したわ。そんなの当たり前なのにね」"

[[dialogue]]
speaker = "モネ"
# 「ウィステリアさんにそんな過去があったんですね……」
line = "「ウィステリアさんにそんな過去があったんですね……」"

[[dialogue]]
speaker = "ウィステリア"
# 「過去といえば、紙屋敷さんは子どものころから読書家なの？」
line = "「過去といえば、紙屋敷さんは子どものころから読書家なの？」"

[[dialogue]]
speaker = "モネ"
# 「はい、私も本に囲まれて育ちましたから。祖父の書斎にはたくさん本があって、幼い頃から一緒に読書をしていました」
line = "「はい、私も本に囲まれて育ちましたから。祖父の書斎にはたくさん本があって、幼い頃から一緒に読書をしていました」"

[[dialogue]]
speaker = "モネ"
# 「祖父がいなくなってからもずっと、本は私と一緒にいてくれました」
line = "「祖父がいなくなってからもずっと、本は私と一緒にいてくれました」"

[[dialogue]]
speaker = "モネ"
# 「そのうち、本の気持ちが分かるようになって……思えば、祖父を失って寂しくしていた私に寄り添ってくれていたんですね」
line = "「そのうち、本の気持ちが分かるようになって……思えば、祖父を失って寂しくしていた私に寄り添ってくれていたんですね」"

[[dialogue]]
speaker = "モネ"
# 「私が嬉しい時も、悲しい時も、切ない時も……表紙を開けば、本はその世界に優しく迎え入れてくれます」
line = "「私が嬉しい時も、悲しい時も、切ない時も……表紙を開けば、本はその世界に優しく迎え入れてくれます」"

[[dialogue]]
speaker = "モネ"
# 「本は私の友達であり隣人なんです。本は本であるというだけで、私には宝物です」
line = "「本は私の友達であり隣人なんです。本は本であるというだけで、私には宝物です」"

[[dialogue]]
speaker = "モネ"
# 「だから、本が私の友達であるように、私も本の友達でありたいんです」
line = "「だから、本が私の友達であるように、私も本の友達でありたいんです」"

[[dialogue]]
speaker = "モネ"
# 「世界中の本と友達になりたいですし、もし誰にも読まれず寂しい思いをしている本があったら、私が読んで一緒にいたいんです」
line = "「世界中の本と友達になりたいですし、もし誰にも読まれず寂しい思いをしている本があったら、私が読んで一緒にいたいんです」"

[[dialogue]]
speaker = "ウィステリア"
# 「なるほど。紙屋敷さんの本好きはお祖父さん譲りなのね」
line = "「なるほど。紙屋敷さんの本好きはお祖父さん譲りなのね」"

[[dialogue]]
speaker = "モネ"
# 「はい。その祖父が言っていたんです。本は<ruby=あしあと>足跡</ruby>だって」
line = "「はい。その祖父が言っていたんです。本は<ruby>足跡<rt>あしあと</rt></ruby>だって」"

[[dialogue]]
speaker = "ウィステリア"
# 「あしあと？」
line = "「あしあと？」"

[[dialogue]]
speaker = "モネ"
# 「ええ。小説や物語、絵本、歴史書、教科書や科学書、ルールブック、随筆やルポルタージュに至るまで、本は様々です」
line = "「ええ。小説や物語、絵本、歴史書、教科書や科学書、ルールブック、随筆やルポルタージュに至るまで、本は様々です」"

[[dialogue]]
speaker = "モネ"
# 「けれど共通しているのは、誰かが紙と、文字と、<ruby=え>図</ruby>を使って残そうとしたものだということです」
line = "「けれど共通しているのは、誰かが紙と、文字と、<ruby>図<rt>え</rt></ruby>を使って残そうとしたものだということです」"

[[dialogue]]
speaker = "モネ"
# 「本は誰かの生きた証──足跡だそうです。本が消えるとき、その足跡も消えてしまうのだと」
line = "「本は誰かの生きた証──足跡だそうです。本が消えるとき、その足跡も消えてしまうのだと」"

[[dialogue]]
speaker = "モネ"
# 「幼い私は、その意味まで理解できませんでしたけど、大切な言葉として心に残っています」
line = "「幼い私は、その意味まで理解できませんでしたけど、大切な言葉として心に残っています」"

[[dialogue]]
speaker = "ウィステリア"
# 「本は足跡、か。私を呪っている魔導書も、誰かが残そうとしたものなのかしら……それにしては物騒すぎるけど」
line = "「本は足跡、か。私を呪っている魔導書も、誰かが残そうとしたものなのかしら……それにしては物騒すぎるけど」"

[[dialogue]]
speaker = "？？？"
# 「立ち去りなさい、力なき者……」
line = "「立ち去りなさい、力なき者……」"

[[dialogue]]
speaker = "モネ"
# 「どなたですか！？　いつの間にっ！？」
line = "「どなたですか！？　いつの間にっ！？」"

[[dialogue]]
speaker = "ウィステリア"
# 「この気配は……っ！　紙屋敷さん、ごめんなさい！　強制脱出！」
line = "「この気配は……っ！　紙屋敷さん、ごめんなさい！　強制脱出！」"

[[dialogue]]
speaker = "モネ"
# 「ウィステリアさんの鎖が、また私に巻き付いて……」
line = "「ウィステリアさんの鎖が、また私に巻き付いて……」"

[[dialogue]]
speaker = "モネ"
# 「わぁ～～～っ！」
line = "「わぁ～～～っ！」"

[[dialogue]]
speaker = "ウィステリア"
# 「これでよし、と。……それで、あなたは何者なのかしら、ドラゴンさん？」
line = "「これでよし、と。……それで、あなたは何者なのかしら、ドラゴンさん？」"

[[dialogue]]
speaker = "？？？"
# 「…………」
line = "「…………」"
