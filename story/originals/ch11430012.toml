[[dialogue]]
speaker = "ソフィア"
# 「だとすると、あまりこっちの世界にラファエロさんの痕跡を残すのはよくないかもしれません」
line = "「だとすると、あまりこっちの世界にラファエロさんの痕跡を残すのはよくないかもしれません」"

[[dialogue]]
speaker = "ラファエロ"
# 「おや？　何故だい？」
line = "「おや？　何故だい？」"

[[dialogue]]
speaker = "ソフィア"
# 「これ以上人気が高まってしまうと、いざいなくなった時に、ラファエロさんロスで悲しむ人が増えてしまうと思うんです」
line = "「これ以上人気が高まってしまうと、いざいなくなった時に、ラファエロさんロスで悲しむ人が増えてしまうと思うんです」"

[[dialogue]]
speaker = "unk"
# ＳＮＳはやめた方がいいかもしれないね
line = "ＳＮＳはやめた方がいいかもしれないね"

[[dialogue]]
speaker = "ラファエロ"
# 「人気者すぎるのも罪深いものだね……悲しむ人が増えるのは、ぼくも望むところじゃない。残念だけど、ぼくのアカウントは抹消するとしよう」
line = "「人気者すぎるのも罪深いものだね……悲しむ人が増えるのは、ぼくも望むところじゃない。残念だけど、ぼくのアカウントは抹消するとしよう」"

[[dialogue]]
speaker = "ラファエロ"
# 「『諸事情あって、ぼくはＳＮＳを引退する。短い間だったけれど、とても楽しかったよ。慕ってくれた皆に無上の感謝と愛を込めて。ラファエロ・サーラ』と」
line = "「『諸事情あって、ぼくはＳＮＳを引退する。短い間だったけれど、とても楽しかったよ。慕ってくれた皆に無上の感謝と愛を込めて。ラファエロ・サーラ』と」"

[[dialogue]]
speaker = "ラファエロ"
# 「ぽちっ」
line = "「ぽちっ」"

[[dialogue]]
speaker = "ルリエル"
# 「えっ、もう消しちゃったんですか！？」
line = "「えっ、もう消しちゃったんですか！？」"

[[dialogue]]
speaker = "ソフィア"
