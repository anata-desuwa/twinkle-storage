line = "「って確か学園から、ラファエロさんにも支給されてたと思いますけど……」"

[[dialogue]]
speaker = "ラファエロ"
# 「そうじゃなくて……ルリエルの撮った写真が、その中に転送？　複製？　されただろう？」
line = "「そうじゃなくて……ルリエルの撮った写真が、その中に転送？　複製？　されただろう？」"

[[dialogue]]
speaker = "ルリエル"
# 「あっ、ＳＮＳのことですか？」
line = "「あっ、ＳＮＳのことですか？」"

[[dialogue]]
speaker = "ラファエロ"
# 「えすえぬえす？」
line = "「えすえぬえす？」"

[[dialogue]]
speaker = "ルリエル"
# 「う～んと、ルリエルもあんまり詳しいことは知らないのですが……」
line = "「う～んと、ルリエルもあんまり詳しいことは知らないのですが……」"

[[dialogue]]
speaker = "ルリエル"
# 「ここに写真をあげたり、遠くにいる人ともお喋りできたりするのです！」
line = "「ここに写真をあげたり、遠くにいる人ともお喋りできたりするのです！」"

[[dialogue]]
speaker = "ラファエロ"
# 「へぇ……ちょっとそのＤＩＳＣを借りて、エスエヌエスの様子を見させてもらってもいいかい？」
line = "「へぇ……ちょっとそのＤＩＳＣを借りて、エスエヌエスの様子を見させてもらってもいいかい？」"

[[dialogue]]
speaker = "unk"
# 快諾するルリエルからＤＩＳＣを受け取ったラファエロは、しばらく端末を操作すると──
line = "快諾するルリエルからＤＩＳＣを受け取ったラファエロは、しばらく端末を操作すると──"

[[dialogue]]
speaker = "ラファエロ"
# 「なるほど……この機械の中に何かがあるのではなく、どこかにある空間を、この機械を通じて『みんな』が見ているんだね？」
line = "「なるほど……この機械の中に何かがあるのではなく、どこかにある空間を、この機械を通じて『みんな』が見ているんだね？」"

[[dialogue]]
speaker = "ラファエロ"
# 「だからこそ、通信端末であるＤＩＳＣを通じてそれに触れることができる、と。遠方の見知らぬ誰かと交流の輪も広げられるという寸法か！」
line = "「だからこそ、通信端末であるＤＩＳＣを通じてそれに触れることができる、と。遠方の見知らぬ誰かと交流の輪も広げられるという寸法か！」"

[[dialogue]]
speaker = "ルリエル"
# 「何言ってるかわからないけど、すでにルリエルよりも詳しそうなのですっ！？」
line = "「何言ってるかわからないけど、すでにルリエルよりも詳しそうなのですっ！？」"

[[dialogue]]
speaker = "ラファエロ"
# 「ふっふっふ、ぼくは天才だからね♪　１を見れば１０も２０も知るというものさ」
line = "「ふっふっふ、ぼくは天才だからね♪　１を見れば１０も２０も知るというものさ」"

[[dialogue]]
speaker = "ラファエロ"
# 「エスエヌエスはアテネスにはないものだけど、非常に興味深いよ」
line = "「エスエヌエスはアテネスにはないものだけど、非常に興味深いよ」"

[[dialogue]]
speaker = "ルリエル"
# 「先日の大活躍もありますし、ラファエロさんがＳＮＳを始めたら、一躍有名人になれちゃいますよ～」
line = "「先日の大活躍もありますし、ラファエロさんがＳＮＳを始めたら、一躍有名人になれちゃいますよ～」"

[[dialogue]]
speaker = "ラファエロ"
# 「せっかくだし、流星市国でもぼくの存在をもっと知ってもらおうかな。あかうんと？　っていうのは、どうやって作ればいいんだい？」
line = "「せっかくだし、流星市国でもぼくの存在をもっと知ってもらおうかな。あかうんと？　っていうのは、どうやって作ればいいんだい？」"

[[dialogue]]
speaker = "ルリエル"
# 「それはですね～、こちらのボタンをぽちぽちっとしていただいて～。ここにお名前を……あ、本名じゃなくて大丈夫ですよ」
line = "「それはですね～、こちらのボタンをぽちぽちっとしていただいて～。ここにお名前を……あ、本名じゃなくて大丈夫ですよ」"

[[dialogue]]
speaker = "ラファエロ"
# 「ペンネームのようなものかな？　ぼくはラファエロ以外に語る名を持っていないが……まぁいいだろう。ここに入力して……うん、できたみたいだ」
line = "「ペンネームのようなものかな？　ぼくはラファエロ以外に語る名を持っていないが……まぁいいだろう。ここに入力して……うん、できたみたいだ」"

[[dialogue]]
speaker = "ルリエル"
# 「次は、ルリエルのアカウントをフォローしてみてください！」
line = "「次は、ルリエルのアカウントをフォローしてみてください！」"

[[dialogue]]
speaker = "ラファエロ"
# 「これがルリエルのアカウントだね。あ、こっちの子も見たことがあるよ。皆が揃いも揃って自分を撮っているのは……自撮りっていうのかい？」
line = "「これがルリエルのアカウントだね。あ、こっちの子も見たことがあるよ。皆が揃いも揃って自分を撮っているのは……自撮りっていうのかい？」"

[[dialogue]]
speaker = "ルリエル"
# 「はい、自分でカメラの位置を調整するのです。可愛く撮るには結構コツがいるんですよ！」
line = "「はい、自分でカメラの位置を調整するのです。可愛く撮るには結構コツがいるんですよ！」"

[[dialogue]]
speaker = "ラファエロ"
# 「カメラのレンズは……ここだね。斜め上からこんな感じで……」
line = "「カメラのレンズは……ここだね。斜め上からこんな感じで……」"

[[dialogue]]
speaker = "ラファエロ"
# 「あごの輪郭を隠すようにして撮っているね……これがこちらの世界の流行りなのかな？」
line = "「あごの輪郭を隠すようにして撮っているね……これがこちらの世界の流行りなのかな？」"

[[dialogue]]
speaker = "ラファエロ"
# 「なるほど、このポーズによって、顔を小さく見せる効果があるのか。なかなか綺麗に撮れているね」
line = "「なるほど、このポーズによって、顔を小さく見せる効果があるのか。なかなか綺麗に撮れているね」"

[[dialogue]]
speaker = "ルリエル"
# 「おおぉ、いきなりすごく可愛いのが撮れてるのです！？　ラファエロさん、はじめて自撮りしたんですよね！？」
line = "「おおぉ、いきなりすごく可愛いのが撮れてるのです！？　ラファエロさん、はじめて自撮りしたんですよね！？」"

[[dialogue]]
speaker = "ラファエロ"
# 「もちろんだよ。こんなに小型かつ高速で撮れるカメラは、アテネスにはないからね」
line = "「もちろんだよ。こんなに小型かつ高速で撮れるカメラは、アテネスにはないからね」"

[[dialogue]]
speaker = "ルリエル"
# 「初めてなのに、こんなに完璧だなんて……もう教えることは何もありませんっ！　免許皆伝なのですっ！」
line = "「初めてなのに、こんなに完璧だなんて……もう教えることは何もありませんっ！　免許皆伝なのですっ！」"

[[dialogue]]
speaker = "ラファエロ"
# 「ふふ、職業柄、画面の構図にはこだわっているからね。この角度から撮れば、こう写る──自分を俯瞰で見るくらい朝飯前さ」
line = "「ふふ、職業柄、画面の構図にはこだわっているからね。この角度から撮れば、こう写る──自分を俯瞰で見るくらい朝飯前さ」"

[[dialogue]]
speaker = "ルリエル"
# 「これは、ハイパーインフルエンサー爆誕の予感なのです……！」
line = "「これは、ハイパーインフルエンサー爆誕の予感なのです……！」"

[[dialogue]]
speaker = "unk"
# ラファエロのアカウントに投稿された自撮りは、端正な容姿に加え、類まれな芸術センスを生かしていて、まるで１枚の絵画のようだった。
line = "ラファエロのアカウントに投稿された自撮りは、端正な容姿に加え、類まれな芸術センスを生かしていて、まるで１枚の絵画のようだった。"

[[dialogue]]
speaker = "unk"
# その美麗さが人々の目に留まって拡散され、フォロワー数は爆発的に増加していった。
line = "その美麗さが人々の目に留まって拡散され、フォロワー数は爆発的に増加していった。"

[[dialogue]]
