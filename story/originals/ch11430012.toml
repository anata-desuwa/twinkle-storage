line = "「ひとりひとりのアカウントを見に行って、ちゃんとリプまでするとは……これが神対応、というやつでしょうか」"

[[dialogue]]
speaker = "ルリエル"
# 「ラファエロさんのＳＮＳ師匠として、ルリエルも鼻が高いのです！」
