line = "「今日のおやつ、ＳＮＳに載せちゃうのです。『午後もがんばるエネルギーです』っと！」"

[[dialogue]]
speaker = "ラファエロ"
# 「おや？　ルリエル、それはなんだい？」
line = "「おや？　ルリエル、それはなんだい？」"

[[dialogue]]
speaker = "ルリエル"
