[[dialogue]]
speaker = "女性Ｂ"
# 「生ラファエロ様を一目見たくて遠方から来ました……！　はぁ～尊い～！」
line = "「生ラファエロ様を一目見たくて遠方から来ました……！　はぁ～尊い～！」"

[[dialogue]]
speaker = "ラファエロ"
# 「ありがとう！　わざわざ遠くから駆けつけてくれてとても嬉しいよ。ただ、あまり横に広がりすぎて、他の方の迷惑にならないように注意してね」
line = "「ありがとう！　わざわざ遠くから駆けつけてくれてとても嬉しいよ。ただ、あまり横に広がりすぎて、他の方の迷惑にならないように注意してね」"

[[dialogue]]
speaker = "女性Ａ"
# 「あ、つい……すみませんっ」
