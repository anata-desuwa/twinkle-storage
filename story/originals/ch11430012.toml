line = "「ラファエロさん！　制服がヨレヨレになってますけど、大丈夫でしたか？」"

[[dialogue]]
speaker = "ラファエロ"
# 「熱烈なファンに詰め寄られたからね。これも人気者の宿命かな、ははっ」
