[[dialogue]]
speaker = "ソフィア"
# 「この写真とか背景にお店が写っちゃってます。リアルタイムで写真を投稿するのは危険ですね……」
line = "「この写真とか背景にお店が写っちゃってます。リアルタイムで写真を投稿するのは危険ですね……」"

[[dialogue]]
