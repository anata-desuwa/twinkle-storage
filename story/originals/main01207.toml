[[dialogue]]
speaker = "unk"
# 第８話,騎士の漂白,B
line = "第８話,騎士の漂白,B"

[[dialogue]]
speaker = "セイファート"
# 『強くあれ。世界を取り込まんとする力に、決して飲まれることなきように』
line = "『強くあれ。世界を取り込まんとする力に、決して飲まれることなきように』"

[[dialogue]]
speaker = "クロト"
# 「──オオオオオオオオオッ！！」
line = "「──オオオオオオオオオッ！！」"

[[dialogue]]
speaker = "セイファート"
# 「ふ──」
line = "「ふ──」"

[[dialogue]]
speaker = "セイファート"
# 「これまで、か──…………」
line = "「これまで、か──…………」"

[[dialogue]]
speaker = "unk"
# 最後まで執念で剣を握り続けていた彼の右手から……ふっと、力が消えた。
line = "最後まで執念で剣を握り続けていた彼の右手から……ふっと、力が消えた。"

[[dialogue]]
speaker = "unk"
# 鬼神のごとき彼の形相は、最後……清々しく笑っていた。
line = "鬼神のごとき彼の形相は、最後……清々しく笑っていた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「さっすがクロト──私の希望通り、最強の魔王になったわね！」
line = "「さっすがクロト──私の希望通り、最強の魔王になったわね！」"

[[dialogue]]
speaker = "クロト"
# 「誰かさんにしごかれたおかげだろうな──でも、まだ先代ほどは引き出せちゃいないさ」
line = "「誰かさんにしごかれたおかげだろうな──でも、まだ先代ほどは引き出せちゃいないさ」"

[[dialogue]]
speaker = "フィオナ"
# 「これが本当の──魔王の、力……」
line = "「これが本当の──魔王の、力……」"

[[dialogue]]
speaker = "ニャリオン"
# 「ニャ、ニャァ……まさしく本物に違いないニャン……」
line = "「ニャ、ニャァ……まさしく本物に違いないニャン……」"

[[dialogue]]
speaker = "unk"
# 今の俺には湧き上がる三種の力をすべてコントロールできていた。
line = "今の俺には湧き上がる三種の力をすべてコントロールできていた。"

[[dialogue]]
speaker = "unk"
# そして、同じく魔王の血が流れるフィオナにも、同様の隠れたトリガーがあるのだろうという奇妙な確信があった。
line = "そして、同じく魔王の血が流れるフィオナにも、同様の隠れたトリガーがあるのだろうという奇妙な確信があった。"

[[dialogue]]
speaker = "クロト"
# （けど──それより今は……）
line = "（けど──それより今は……）"

[[dialogue]]
speaker = "セイファート"
# 「私は……弱かった」
line = "「私は……弱かった」"

[[dialogue]]
speaker = "セイファート"
# 「妻が……異界に拐われ、操られているのを見て……己の在り方を、見失ってしまった」
line = "「妻が……異界に拐われ、操られているのを見て……己の在り方を、見失ってしまった」"

[[dialogue]]
speaker = "セイファート"
# 「それがなんだと吠えられるほど、強くあることができなかった……」
line = "「それがなんだと吠えられるほど、強くあることができなかった……」"

[[dialogue]]
speaker = "セイファート"
# 「リクリエの使徒として拐われたのなら……なおさら、リクリエに抗うべきだったのにな……」
line = "「リクリエの使徒として拐われたのなら……なおさら、リクリエに抗うべきだったのにな……」"

[[dialogue]]
speaker = "クロト"
# 「……あなたの総てが悪なわけじゃない。不条理の被害者であることは、間違いないだろ」
line = "「……あなたの総てが悪なわけじゃない。不条理の被害者であることは、間違いないだろ」"

[[dialogue]]
speaker = "unk"
# 俺だって彼の人生のすべてを知ったわけじゃない。
line = "俺だって彼の人生のすべてを知ったわけじゃない。"

[[dialogue]]
speaker = "unk"
# ただ、それでも……過酷で理不尽な運命に翻弄されたことは間違いないと思うから。
line = "ただ、それでも……過酷で理不尽な運命に翻弄されたことは間違いないと思うから。"

[[dialogue]]
speaker = "フィオナ"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# そして、フィオナも──彼に同情を禁じえないはずだ。
line = "そして、フィオナも──彼に同情を禁じえないはずだ。"

[[dialogue]]
speaker = "unk"
# 他ならぬ肉親をリクリエに<b>拐われた</b>立場として……。
line = "他ならぬ肉親をリクリエに<b>拐われた</b>立場として……。"

[[dialogue]]
speaker = "クロト"
# （リクリエとは意志なき厄災──だけど……果たして本当にそうなんだろうか？）
line = "（リクリエとは意志なき厄災──だけど……果たして本当にそうなんだろうか？）"

[[dialogue]]
speaker = "unk"
# ふつふつと湧き始めた疑問。しかし考える余地は与えられなかった。
line = "ふつふつと湧き始めた疑問。しかし考える余地は与えられなかった。"

[[dialogue]]
speaker = "フィオナ"
# 「！　これは──！？」
line = "「！　これは──！？」"

[[dialogue]]
speaker = "サーシャ"
# 「寒波が急激に強まってる──このままじゃ森中が凍っちゃうかも！」
line = "「寒波が急激に強まってる──このままじゃ森中が凍っちゃうかも！」"

[[dialogue]]
speaker = "ニャリオン"
# 「ニャ！　ユウリも置いてきてるし、逃げなきゃヤバイのニャン！」
line = "「ニャ！　ユウリも置いてきてるし、逃げなきゃヤバイのニャン！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「いつつ……さすがに、私もそろそろ……」
line = "「いつつ……さすがに、私もそろそろ……」"

[[dialogue]]
speaker = "マトイ"
# 「ヴィーナスの体力も危ない──緋宮くん、早く出なきゃ！」
line = "「ヴィーナスの体力も危ない──緋宮くん、早く出なきゃ！」"

[[dialogue]]
speaker = "クロト"
# 「っああ──」
line = "「っああ──」"

[[dialogue]]
speaker = "ニャリオン"
# 「と言っても──まずいニャン！　もうワガハイ達が来た道はとっくに凍ってるニャン──！？」
line = "「と言っても──まずいニャン！　もうワガハイ達が来た道はとっくに凍ってるニャン──！？」"

[[dialogue]]
speaker = "unk"
# 俺たちが慎重に踏みしめてきたルートは全面が厚い氷に覆われていた。
line = "俺たちが慎重に踏みしめてきたルートは全面が厚い氷に覆われていた。"

[[dialogue]]
speaker = "クロト"
# （……まずいな。これ以外の道を引き返そうにも、他の弊害が──）
line = "（……まずいな。これ以外の道を引き返そうにも、他の弊害が──）"

[[dialogue]]
speaker = "unk"
# 一瞬、目の前が暗くなる──が。しかし、
line = "一瞬、目の前が暗くなる──が。しかし、"

[[dialogue]]
speaker = "ラティエ"
# 「──待たせたな、生徒諸君。怪我はないかね」
line = "「──待たせたな、生徒諸君。怪我はないかね」"

[[dialogue]]
speaker = "ユウリ"
# 「ふぅっ──と！　全員いるな！？」
line = "「ふぅっ──と！　全員いるな！？」"

[[dialogue]]
speaker = "ソフィア"
# 「無事ですか、姉さん──フィオナ会長！」
line = "「無事ですか、姉さん──フィオナ会長！」"

[[dialogue]]
speaker = "サーシャ"
# 「ソフィ……！」
line = "「ソフィ……！」"

[[dialogue]]
speaker = "フィオナ"
# 「ユウリに、学園長も──レゾフの方は大丈夫でしたか！？」
line = "「ユウリに、学園長も──レゾフの方は大丈夫でしたか！？」"

[[dialogue]]
speaker = "ラティエ"
# 「一匹残らず掃討してきた。後は地下に閉じこもっていれば、寒波はやり過ごせるだろう」
line = "「一匹残らず掃討してきた。後は地下に閉じこもっていれば、寒波はやり過ごせるだろう」"

[[dialogue]]
speaker = "ニャリオン"
# 「あ、あっさり言うニャンねえ……！」
line = "「あ、あっさり言うニャンねえ……！」"

[[dialogue]]
speaker = "unk"
# <ruby=こうこ>後顧</ruby>の憂いは断てたが一刻を争う事態に変わりはない。
line = "<ruby>後顧<rt>こうこ</rt></ruby>の憂いは断てたが一刻を争う事態に変わりはない。"

[[dialogue]]
speaker = "unk"
# 急速に外周が凍結していく冥森林ネメシスから、全員で生きて帰らなくては──
line = "急速に外周が凍結していく冥森林ネメシスから、全員で生きて帰らなくては──"

[[dialogue]]
speaker = "unk"
# 倒れたままの彼と、目が合うと……
line = "倒れたままの彼と、目が合うと……"

[[dialogue]]
speaker = "セイファート"
# 「……<ruby=ゆ>征</ruby>け」
line = "「……<ruby>征<rt>ゆ</rt></ruby>け」"

[[dialogue]]
speaker = "クロト"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "unk"
# 俺の葛藤を見透かしたように──彼は言った。
line = "俺の葛藤を見透かしたように──彼は言った。"

[[dialogue]]
speaker = "セイファート"
# 「私にはもう……学園に関わる資格はない。後のことは……ラティエ、殿に……」
line = "「私にはもう……学園に関わる資格はない。後のことは……ラティエ、殿に……」"

[[dialogue]]
speaker = "クロト"
# 「……駄目だ。あんたは消えない<ruby=とが>咎</ruby>を犯した。だったら、その償いを──」
line = "「……駄目だ。あんたは消えない<ruby>咎<rt>とが</rt></ruby>を犯した。だったら、その償いを──」"

[[dialogue]]
speaker = "セイファート"
# 「征けと言っているだろう──緋宮クロト！」
line = "「征けと言っているだろう──緋宮クロト！」"

[[dialogue]]
speaker = "クロト"
# 「っ！」
line = "「っ！」"

[[dialogue]]
speaker = "unk"
# その喝破は……あらゆる理屈を貫通して、俺の骨身に響き渡った。
line = "その喝破は……あらゆる理屈を貫通して、俺の骨身に響き渡った。"

[[dialogue]]
speaker = "セイファート"
# 「人間界は……いいや、アルタイルの人間界はすでに瀬戸際にある」
line = "「人間界は……いいや、アルタイルの人間界はすでに瀬戸際にある」"

[[dialogue]]
speaker = "セイファート"
# 「ベガの世界がどんな末路を辿ったか見ただろう……この世界も早晩、あの波に呑まれる。すべてが動き出す時は近い」
line = "「ベガの世界がどんな末路を辿ったか見ただろう……この世界も早晩、あの波に呑まれる。すべてが動き出す時は近い」"

[[dialogue]]
speaker = "クロト"
# 「あなたを……置いていけと……？」
line = "「あなたを……置いていけと……？」"

[[dialogue]]
speaker = "セイファート"
# 「リクリエは……真なる魔王の力でなければ止められない。かつてのようにな。こんな老いぼれにかかずらって、手遅れになってもよいのか」
line = "「リクリエは……真なる魔王の力でなければ止められない。かつてのようにな。こんな老いぼれにかかずらって、手遅れになってもよいのか」"

[[dialogue]]
speaker = "セイファート"
# 「すべては筋書き通りなのだ……世界の再創生へ向けて、私のような存在が現れることも」
line = "「すべては筋書き通りなのだ……世界の再創生へ向けて、私のような存在が現れることも」"

[[dialogue]]
speaker = "セイファート"
# 「そんな、抗いようもない運命に抗うというのなら……甘えた未練など捨て去る覚悟を持て！」
line = "「そんな、抗いようもない運命に抗うというのなら……甘えた未練など捨て去る覚悟を持て！」"

[[dialogue]]
speaker = "unk"
# 学園長は──朽ちゆく霊力の波動でもって、俺を冷たく突き放した。
line = "学園長は──朽ちゆく霊力の波動でもって、俺を冷たく突き放した。"

[[dialogue]]
speaker = "unk"
# 彼自身がこのまま、凍結に呑まれることを望んでいる。
line = "彼自身がこのまま、凍結に呑まれることを望んでいる。"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロト、早く──！　ユウリの星術でも持ちこたえられないわよ！」
line = "「クロト、早く──！　ユウリの星術でも持ちこたえられないわよ！」"

[[dialogue]]
speaker = "クロト"
# 「っ……ああ！　すぐに行く──！」
line = "「っ……ああ！　すぐに行く──！」"

[[dialogue]]
speaker = "セイファート"
# 「さらばだ……教え子よ。私のように……道を踏み外さぬようにな」
line = "「さらばだ……教え子よ。私のように……道を踏み外さぬようにな」"

[[dialogue]]
speaker = "セイファート"
# 「マルキア……私もいつか……おまえの元に……」
line = "「マルキア……私もいつか……おまえの元に……」"

[[dialogue]]
speaker = "unk"
# 駆け出した冥森林の奥地から──吹雪の轟音にまぎれて、最期の教えが聞こえた。
line = "駆け出した冥森林の奥地から──吹雪の轟音にまぎれて、最期の教えが聞こえた。"

[[dialogue]]
speaker = "クロト"
# （さようなら──セイファート学園長。俺の憧れた男）
line = "（さようなら──セイファート学園長。俺の憧れた男）"

[[dialogue]]
speaker = "unk"
# ──あなたのことは忘れない。
line = "──あなたのことは忘れない。"

[[dialogue]]
speaker = "unk"
# 星騎士として、魔王として。
line = "星騎士として、魔王として。"

[[dialogue]]
speaker = "unk"
# 緋宮クロトは……これからの人生を通じて、かつてのあなたが抱いた意志を最後まで受け継がせてもらう。
line = "緋宮クロトは……これからの人生を通じて、かつてのあなたが抱いた意志を最後まで受け継がせてもらう。"
