[[dialogue]]
speaker = "unk"
# 第４話,デート作戦！？,P
line = "第４話,デート作戦！？,P"

[[dialogue]]
speaker = "unk"
# 今日は星徒会がないので、真っ直ぐ帰宅していると……
line = "今日は星徒会がないので、真っ直ぐ帰宅していると……"

[[dialogue]]
speaker = "煌嶺"
# 「魔王さん、デートしよ！」
line = "「魔王さん、デートしよ！」"

[[dialogue]]
speaker = "unk"
# デート！！？
line = "デート！！？"

[[dialogue]]
speaker = "煌嶺"
# 「そう、デート！　いいでしょ？　ね、デートしよ？」
line = "「そう、デート！　いいでしょ？　ね、デートしよ？」"

[[dialogue]]
speaker = "煌嶺"
# 「……え、急に言われても困る？　デートしてくれないの？」
line = "「……え、急に言われても困る？　デートしてくれないの？」"

[[dialogue]]
speaker = "煌嶺"
# 「ヤダヤダヤダヤダ！　デートしてくれないとヤダ～っ！」
line = "「ヤダヤダヤダヤダ！　デートしてくれないとヤダ～っ！」"

[[dialogue]]
speaker = "unk"
# 初めて会った時みたいに、おもちゃを買ってもらえない子どものように地面を転げ回る煌嶺。
line = "初めて会った時みたいに、おもちゃを買ってもらえない子どものように地面を転げ回る煌嶺。"

[[dialogue]]
speaker = "煌嶺"
# 「魔王さんのケチ！　ドケチ！　イジワル～！」
line = "「魔王さんのケチ！　ドケチ！　イジワル～！」"

[[dialogue]]
speaker = "煌嶺"
# 「うぅ……私の体、あんなに好きにしてたくせに……飽きたら捨てちゃうんだ……」
line = "「うぅ……私の体、あんなに好きにしてたくせに……飽きたら捨てちゃうんだ……」"

[[dialogue]]
speaker = "通行人Ａ"
# 「やだ……痴情のもつれだわ……」
line = "「やだ……痴情のもつれだわ……」"

[[dialogue]]
speaker = "通行人Ｂ"
# 「若いのにただれてるわ……やぁ～ね～」
line = "「若いのにただれてるわ……やぁ～ね～」"

[[dialogue]]
speaker = "unk"
# 周りにヒソヒソされてる！？
line = "周りにヒソヒソされてる！？"

[[dialogue]]
speaker = "煌嶺"
# 「ねぇ、魔王さん、デートしてよ～」
line = "「ねぇ、魔王さん、デートしてよ～」"

[[dialogue]]
speaker = "煌嶺"
# 「……いい？　やったぁ！　ありがと、魔王さん！」
line = "「……いい？　やったぁ！　ありがと、魔王さん！」"

[[dialogue]]
speaker = "煌嶺"
# 「それじゃ次の週末ね！　楽しみにしてるから～！」
line = "「それじゃ次の週末ね！　楽しみにしてるから～！」"

[[dialogue]]
speaker = "unk"
# そして約束通り、次の週末。
line = "そして約束通り、次の週末。"

[[dialogue]]
speaker = "煌嶺"
# 「やっほー、お待たせ～！　じゃあデートいこっか！」
line = "「やっほー、お待たせ～！　じゃあデートいこっか！」"

[[dialogue]]
speaker = "煌嶺"
# 「でもデートって何すればいいの？　人間界の映画を見てたら、デートって楽しそうって思ったんだけど、何するのかよく知らないんだよね」
line = "「でもデートって何すればいいの？　人間界の映画を見てたら、デートって楽しそうって思ったんだけど、何するのかよく知らないんだよね」"

[[dialogue]]
speaker = "煌嶺"
# 「どこに行って何するかは魔王さんにお任せするね。つまらなかったら処しちゃうかも♪」
line = "「どこに行って何するかは魔王さんにお任せするね。つまらなかったら処しちゃうかも♪」"

[[dialogue]]
speaker = "煌嶺"
# 「……とりあえずクレープ食べる？　いいね、私クレープ好きだよ。かわいいし美味しいし」
line = "「……とりあえずクレープ食べる？　いいね、私クレープ好きだよ。かわいいし美味しいし」"

[[dialogue]]
speaker = "煌嶺"
# 「こないだ私が買ったお店があるし、そこにしよっか」
line = "「こないだ私が買ったお店があるし、そこにしよっか」"

[[dialogue]]
speaker = "unk"
# 俺は王道のチョコバナナ、煌嶺は苺と生クリームのクレープを選んだ。
line = "俺は王道のチョコバナナ、煌嶺は苺と生クリームのクレープを選んだ。"

[[dialogue]]
speaker = "煌嶺"
# 「あむっ。ん～、おいし♪　さすが私が買ったお店だよ」
line = "「あむっ。ん～、おいし♪　さすが私が買ったお店だよ」"

[[dialogue]]
speaker = "煌嶺"
# 「でもこれじゃクレープ食べてるだけだよね？　１人で食べるのと変わらなくない？」
line = "「でもこれじゃクレープ食べてるだけだよね？　１人で食べるのと変わらなくない？」"

[[dialogue]]
speaker = "煌嶺"
# 「……頼んだものを２人で食べさせ合う？　へ～、そういうのもあるんだ」
line = "「……頼んだものを２人で食べさせ合う？　へ～、そういうのもあるんだ」"

[[dialogue]]
speaker = "煌嶺"
# 「じゃあはい、食べていいよ、あ～ん。……どう、美味しい？」
line = "「じゃあはい、食べていいよ、あ～ん。……どう、美味しい？」"

[[dialogue]]
speaker = "煌嶺"
# 「魔王さんのも食べさせて？　あ～ん」
line = "「魔王さんのも食べさせて？　あ～ん」"

[[dialogue]]
speaker = "煌嶺"
# 「うん、こっちも美味しい♪」
line = "「うん、こっちも美味しい♪」"

[[dialogue]]
speaker = "煌嶺"
# 「でもデートらしくできたかな？　普通に食べるのと変わらないような……違うような……う～ん」
line = "「でもデートらしくできたかな？　普通に食べるのと変わらないような……違うような……う～ん」"

[[dialogue]]
speaker = "煌嶺"
# 「ま、他にもデートらしいことしてみよっか。何がいいかな？」
line = "「ま、他にもデートらしいことしてみよっか。何がいいかな？」"

[[dialogue]]
speaker = "unk"
# 手を繋ぐとか？
line = "手を繋ぐとか？"

[[dialogue]]
speaker = "煌嶺"
# 「あ、それは映画でもやってた気がする。じゃあやってみよっか」
line = "「あ、それは映画でもやってた気がする。じゃあやってみよっか」"

[[dialogue]]
speaker = "煌嶺"
# 「魔王さんの手を失礼……っと」
line = "「魔王さんの手を失礼……っと」"

[[dialogue]]
speaker = "煌嶺"
# 「ふんふん……魔王さんの手、思ったより大きいね。それにけっこう硬くて、男の人の手って感じ……？」
line = "「ふんふん……魔王さんの手、思ったより大きいね。それにけっこう硬くて、男の人の手って感じ……？」"

[[dialogue]]
speaker = "煌嶺"
# 「ふにふに……ふにふに……お？　おお？」
line = "「ふにふに……ふにふに……お？　おお？」"

[[dialogue]]
speaker = "煌嶺"
# 「なんかこう……落ち着かないような、ちょっとふわふわするような……不思議な感じ。でも嫌いじゃない……気がする」
line = "「なんかこう……落ち着かないような、ちょっとふわふわするような……不思議な感じ。でも嫌いじゃない……気がする」"

[[dialogue]]
speaker = "煌嶺"
# 「……手を繋いでるから当たり前だけど、魔王さんと近いね」
line = "「……手を繋いでるから当たり前だけど、魔王さんと近いね」"

[[dialogue]]
speaker = "煌嶺"
# 「あ、あはは……一旦離れよっか。なんか変な気分になってきたかも……」
line = "「あ、あはは……一旦離れよっか。なんか変な気分になってきたかも……」"

[[dialogue]]
speaker = "煌嶺"
# 「じゃ、他にはデートで何するの？」
line = "「じゃ、他にはデートで何するの？」"

[[dialogue]]
speaker = "煌嶺"
# 「ふむふむ……ショッピングしたりー、ゲームセンターで写真撮ったりー……なるほどなるほど」
line = "「ふむふむ……ショッピングしたりー、ゲームセンターで写真撮ったりー……なるほどなるほど」"

[[dialogue]]
speaker = "煌嶺"
# 「じゃあそれ全部やってみよっか！」
line = "「じゃあそれ全部やってみよっか！」"

[[dialogue]]
speaker = "煌嶺"
# 「はぁ～……楽しかった♪　デートって面白いものなんだね」
line = "「はぁ～……楽しかった♪　デートって面白いものなんだね」"

[[dialogue]]
speaker = "unk"
# あの煌嶺とデートすることになった時はいろんな意味で戦々恐々としたけど、思ったより普通のデートになった。
line = "あの煌嶺とデートすることになった時はいろんな意味で戦々恐々としたけど、思ったより普通のデートになった。"

[[dialogue]]
speaker = "unk"
# 思いついたことを片っ端からしたせいで、もうクタクタだけど。
line = "思いついたことを片っ端からしたせいで、もうクタクタだけど。"

[[dialogue]]
speaker = "unk"
# 恋愛に興味ないのに、どうして急にデートを？
line = "恋愛に興味ないのに、どうして急にデートを？"

[[dialogue]]
speaker = "煌嶺"
# 「人間界の映画を見たって言ったじゃん？　一応恋愛映画みたいなんだけど……」
line = "「人間界の映画を見たって言ったじゃん？　一応恋愛映画みたいなんだけど……」"

[[dialogue]]
speaker = "煌嶺"
# 「ある女性が恋をして、死ぬとわかってても子どもを産む──みたいな話だったんだよね」
line = "「ある女性が恋をして、死ぬとわかってても子どもを産む──みたいな話だったんだよね」"

[[dialogue]]
speaker = "煌嶺"
# 「それを見て思ったの。好きな人の子どもだから、煌嶺の座を追われるとわかってても産んだのかなって」
line = "「それを見て思ったの。好きな人の子どもだから、煌嶺の座を追われるとわかってても産んだのかなって」"

[[dialogue]]
speaker = "煌嶺"
# 「だから恋をすれば、先代の煌嶺──お母さんの気持ちがわかるかもって」
line = "「だから恋をすれば、先代の煌嶺──お母さんの気持ちがわかるかもって」"

[[dialogue]]
speaker = "煌嶺"
# 「でもどうかな。やっぱりわかんないかも」
line = "「でもどうかな。やっぱりわかんないかも」"

[[dialogue]]
speaker = "煌嶺"
# 「もしかすると、人を好きになるって気持ちが理解できたら……わかるかも？」
line = "「もしかすると、人を好きになるって気持ちが理解できたら……わかるかも？」"

[[dialogue]]
speaker = "煌嶺"
# 「だからまたデートしてよ、魔王さん。もっとデートしたら、その気持ちがわかるかもしれないから」
line = "「だからまたデートしてよ、魔王さん。もっとデートしたら、その気持ちがわかるかもしれないから」"

[[dialogue]]
speaker = "unk"
# ……わかった
line = "……わかった"

[[dialogue]]
speaker = "煌嶺"
# 「うん、ありがとう」
line = "「うん、ありがとう」"

[[dialogue]]
speaker = "煌嶺"
# 「あとね。映画ではね、見つめ合って口付けしてたんだ。それもデートなんだよね？」
line = "「あとね。映画ではね、見つめ合って口付けしてたんだ。それもデートなんだよね？」"

[[dialogue]]
speaker = "unk"
# 多分そう
line = "多分そう"

[[dialogue]]
speaker = "煌嶺"
# 「そっか……じゃあ──」
line = "「そっか……じゃあ──」"

[[dialogue]]
speaker = "煌嶺"
# 「ん……」
line = "「ん……」"

[[dialogue]]
speaker = "unk"
# 柔らかい感触が唇に触れる。それがキスだと気付いたのは、一瞬遅れてからだった。
line = "柔らかい感触が唇に触れる。それがキスだと気付いたのは、一瞬遅れてからだった。"

[[dialogue]]
speaker = "煌嶺"
# 「えへへ……キスしちゃった。ふわふわするけど、この気持ちの先に何があるのか、ちゃんと知りたいな」
line = "「えへへ……キスしちゃった。ふわふわするけど、この気持ちの先に何があるのか、ちゃんと知りたいな」"

[[dialogue]]
speaker = "煌嶺"
# 「じゃ、デートの約束忘れないでね。忘れたらほんとに処しちゃうから」
line = "「じゃ、デートの約束忘れないでね。忘れたらほんとに処しちゃうから」"

[[dialogue]]
speaker = "煌嶺"
# 「またねー☆」
line = "「またねー☆」"
