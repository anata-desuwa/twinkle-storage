line = "「──背中を任せても構いませんか？　セーラ様」"

[[dialogue]]
speaker = "セーラ"
# 「ＯＫに決まってるっしょ──キリカさんっ！」
line = "「ＯＫに決まってるっしょ──キリカさんっ！」"

[[dialogue]]
speaker = "ズシオーン"
# 「──グウウウァァ…………！！」
line = "「──グウウウァァ…………！！」"

[[dialogue]]
speaker = "セーラ"
# 「ふー。これでここは大丈夫……っと」
line = "「ふー。これでここは大丈夫……っと」"

[[dialogue]]
speaker = "キリカ"
# 「さっそく、次の街へ向かいましょう。被害の広がらないうちに」
line = "「さっそく、次の街へ向かいましょう。被害の広がらないうちに」"

[[dialogue]]
speaker = "アニマ"
# 「待テ。十二時の方角から──次の流れ星が堕ちてくるゾ。迎撃されたシ」
line = "「待テ。十二時の方角から──次の流れ星が堕ちてくるゾ。迎撃されたシ」"

[[dialogue]]
speaker = "セーラ"
# 「また？　ていうか、簡単に言ってくれるけど、あれ相当だるいんだかんね？」
line = "「また？　ていうか、簡単に言ってくれるけど、あれ相当だるいんだかんね？」"

[[dialogue]]
speaker = "unk"
# 今も空には無数の流れ星が瞬いていた。
line = "今も空には無数の流れ星が瞬いていた。"

[[dialogue]]
speaker = "unk"
# 流星たちはその多くが燃え尽きて消滅するも、何発かの流れ弾が絶え間なく地表へと降り注いでいた。
line = "流星たちはその多くが燃え尽きて消滅するも、何発かの流れ弾が絶え間なく地表へと降り注いでいた。"

[[dialogue]]
speaker = "unk"
# そのうちの一発でも迎撃に失敗すれば──多くの命が危険にさらされるだろう。
line = "そのうちの一発でも迎撃に失敗すれば──多くの命が危険にさらされるだろう。"

[[dialogue]]
speaker = "アニマ"
# 「大気圏内で小惑星を破砕させれバ、摩擦も含めておよそ５ｍｍ以下の岩石片にまで分裂すル。そこまで小さくできれば、アニマの用意した結界でみんなの安全は保障するヨ」
line = "「大気圏内で小惑星を破砕させれバ、摩擦も含めておよそ５ｍｍ以下の岩石片にまで分裂すル。そこまで小さくできれば、アニマの用意した結界でみんなの安全は保障するヨ」"

[[dialogue]]
speaker = "セーラ"
# 「モンスターの方もやばげだけど──」
