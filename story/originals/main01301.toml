line = "「モンスターどころか、<ruby>巣<rt>アステラ</rt></ruby>が無限に生まれています……！　いくらなんでもキリがありませんね──」"

[[dialogue]]
speaker = "unk"
# フィヴォス流星群──
line = "フィヴォス流星群──"

[[dialogue]]
speaker = "unk"
# そう名付けられた天空の異変から向こう、地上においてもリクリエ現象の混乱が続いていた。
line = "そう名付けられた天空の異変から向こう、地上においてもリクリエ現象の混乱が続いていた。"

[[dialogue]]
speaker = "エリス"
# 「ルリエルさん。そういえば、フィオナ会長やソフィアさんはどちらに……？」
line = "「ルリエルさん。そういえば、フィオナ会長やソフィアさんはどちらに……？」"

[[dialogue]]
speaker = "ルリエル"
# 「え、え～っと……今、とんでもなく遠いところへ出張中であります！　帰りの予定は……わかりません！」
line = "「え、え～っと……今、とんでもなく遠いところへ出張中であります！　帰りの予定は……わかりません！」"

[[dialogue]]
speaker = "エリス"
# 「フィオナ会長がこんな時に出張……重大な要件があるようですね」
line = "「フィオナ会長がこんな時に出張……重大な要件があるようですね」"

[[dialogue]]
speaker = "アニュラス"
# 「問題ない。たとえ会長たちが不在でも──いや、不在だからこそ私たちの真価を示せるはずだ」
line = "「問題ない。たとえ会長たちが不在でも──いや、不在だからこそ私たちの真価を示せるはずだ」"

[[dialogue]]
speaker = "エリス"
# 「……なるほど。確かにそうかもしれません」
line = "「……なるほど。確かにそうかもしれません」"

[[dialogue]]
speaker = "ルリエル"
# 「ルリエルも信じているのです！　フィオナ会長も、緋宮会長も、ヴィーナスさんも……みんな揃って帰ってくるって！」
line = "「ルリエルも信じているのです！　フィオナ会長も、緋宮会長も、ヴィーナスさんも……みんな揃って帰ってくるって！」"

[[dialogue]]
speaker = "ルリエル"
# 「だから……どんな困難にもめげてる場合じゃないのです！」
line = "「だから……どんな困難にもめげてる場合じゃないのです！」"

[[dialogue]]
speaker = "ズシオーン"
