line = "「仕方ありませんね。この際、建物の被害には目を瞑るしかないかと。流星群を止められなければ……私たち全員も危ういのですから」"

[[dialogue]]
speaker = "アニマ"
# 「これも対リクリエの一環。進め、星騎士たちヨ！」
line = "「これも対リクリエの一環。進め、星騎士たちヨ！」"

[[dialogue]]
speaker = "セーラ"
