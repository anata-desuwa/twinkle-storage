[[dialogue]]
speaker = "unk"
# 第３話,陰なるもの,B
line = "第３話,陰なるもの,B"

[[dialogue]]
speaker = "unk"
# ──激戦は実った。
line = "──激戦は実った。"

[[dialogue]]
speaker = "unk"
# 星見エリシアによる魂の叫びが、姉アポロの内に宿る魔王としての血を呼び覚ました。
line = "星見エリシアによる魂の叫びが、姉アポロの内に宿る魔王としての血を呼び覚ました。"

[[dialogue]]
speaker = "unk"
# アポロを、魔王として覚醒させる──
line = "アポロを、魔王として覚醒させる──"

[[dialogue]]
speaker = "unk"
# そんな、誰もが予期しなかった因果によって、俺たちはついに『リクリエの使徒』を倒したのだ。
line = "そんな、誰もが予期しなかった因果によって、俺たちはついに『リクリエの使徒』を倒したのだ。"

[[dialogue]]
speaker = "リノ"
# 「さて──それじゃ、最後の後始末ね。散らばった仮面を封印しましょう」
line = "「さて──それじゃ、最後の後始末ね。散らばった仮面を封印しましょう」"

[[dialogue]]
speaker = "クロト"
# 「ああ。どんな細かい破片も残しちゃいけない」
line = "「ああ。どんな細かい破片も残しちゃいけない」"

[[dialogue]]
speaker = "アポロ"
# 「……頼んだ」
line = "「……頼んだ」"

[[dialogue]]
speaker = "unk"
# それから俺たちは手分けして、割れた仮面の破片を慎重に回収していった。
line = "それから俺たちは手分けして、割れた仮面の破片を慎重に回収していった。"

[[dialogue]]
speaker = "unk"
# 『シエルの筐』の封印力は大したもので、内部に収めたピースからは一切の瘴気を感じ取れなくなっていた。
line = "『シエルの筐』の封印力は大したもので、内部に収めたピースからは一切の瘴気を感じ取れなくなっていた。"

[[dialogue]]
speaker = "アポロ"
# 「……ありがとう。本当に、いい奴らだな」
line = "「……ありがとう。本当に、いい奴らだな」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
# 「ええ──自慢の仲間たちです」
line = "「ええ──自慢の仲間たちです」"

[[dialogue]]
speaker = "ユウリ"
# 「うし、あそこに落ちてるのがラストだな──」
line = "「うし、あそこに落ちてるのがラストだな──」"

[[dialogue]]
speaker = "マトイ"
# 「よかった……これで……」
line = "「よかった……これで……」"

[[dialogue]]
speaker = "unk"
# 最後のピースに手をかけようとする──
line = "最後のピースに手をかけようとする──"

[[dialogue]]
speaker = "unk"
# その時だった。
line = "その時だった。"

[[dialogue]]
speaker = "ギエル"
# 「ああ……いけませんねえ。英雄ともあろうものが、最後の最後でお役目を放棄してしまうなんて」
line = "「ああ……いけませんねえ。英雄ともあろうものが、最後の最後でお役目を放棄してしまうなんて」"

[[dialogue]]
speaker = "ヴィーナス"
# 「──！」
line = "「──！」"

[[dialogue]]
speaker = "マトイ"
# 「あなたは……！」
line = "「あなたは……！」"

[[dialogue]]
speaker = "クロト"
# 「ギエル──どうしてここに……」
line = "「ギエル──どうしてここに……」"

[[dialogue]]
speaker = "ギエル"
# 「どうして？　これは異なことを仰る。主のもとへ駆けつけるのは、従者として当然の定めでしょう」
line = "「どうして？　これは異なことを仰る。主のもとへ駆けつけるのは、従者として当然の定めでしょう」"

[[dialogue]]
speaker = "ギエル"
# 「本来は、地上のコントロールを命じられていたのですがね。主に何かあってはいけないと思い……ただちに馳せ参じた次第ですよ」
line = "「本来は、地上のコントロールを命じられていたのですがね。主に何かあってはいけないと思い……ただちに馳せ参じた次第ですよ」"

[[dialogue]]
speaker = "クロト"
# 「……っ！」
line = "「……っ！」"

[[dialogue]]
speaker = "unk"
# ギエルは──アポロの解放を察してここへやってきた。
line = "ギエルは──アポロの解放を察してここへやってきた。"

[[dialogue]]
speaker = "unk"
# そして彼の手元には、集めるべき最後のピースが。
line = "そして彼の手元には、集めるべき最後のピースが。"

[[dialogue]]
speaker = "アポロ"
# 「ギエル……待て。そいつを拾ったらダメだ」
line = "「ギエル……待て。そいつを拾ったらダメだ」"

[[dialogue]]
speaker = "ギエル"
# 「おやおや。アポロ様。どうされました？　仮面を脱いで、そのような者たちと馴れ合うなど」
line = "「おやおや。アポロ様。どうされました？　仮面を脱いで、そのような者たちと馴れ合うなど」"

[[dialogue]]
speaker = "アポロ"
# 「あたしは……あたしは目を覚ました。世界を壊せばいいだなんて馬鹿げてた」
line = "「あたしは……あたしは目を覚ました。世界を壊せばいいだなんて馬鹿げてた」"

[[dialogue]]
speaker = "アポロ"
# 「オマエにも──迷惑かけた。悪かった。だから、それ以上アポロの幻影を追っちゃいけない」
line = "「オマエにも──迷惑かけた。悪かった。だから、それ以上アポロの幻影を追っちゃいけない」"

[[dialogue]]
speaker = "アポロ"
# 「オマエはただの人間だ。まだ引き返せる。妹たちと一緒に」
line = "「オマエはただの人間だ。まだ引き返せる。妹たちと一緒に」"

[[dialogue]]
speaker = "ギエル"
# 「なるほど。あなたが私の主だったなら従ったでしょう──が。『使徒』を捨てたあなた様に仕える義理はありませんねぇ」
line = "「なるほど。あなたが私の主だったなら従ったでしょう──が。『使徒』を捨てたあなた様に仕える義理はありませんねぇ」"

[[dialogue]]
speaker = "ソフィア"
# 「っ、この人……！」
line = "「っ、この人……！」"

[[dialogue]]
speaker = "unk"
# 燕尾服の青年。その瞳には、紛れもない失望が宿っていた。
line = "燕尾服の青年。その瞳には、紛れもない失望が宿っていた。"

[[dialogue]]
speaker = "unk"
# 彼がこれまで付き従ってきた『<ruby=リクリエ>アポロ</ruby>』の意志は──たった今、失われてしまったのだから。
line = "彼がこれまで付き従ってきた『<ruby>アポロ<rt>リクリエ</rt></ruby>』の意志は──たった今、失われてしまったのだから。"

[[dialogue]]
speaker = "ヴィーナス"
# 「待ちなさいよ──せっかく戦いは終わったのよ！　アポロだって正気に戻って──」
line = "「待ちなさいよ──せっかく戦いは終わったのよ！　アポロだって正気に戻って──」"

[[dialogue]]
speaker = "ギエル"
# 「で？　世界は何も変わっていない。それじゃいけない」
line = "「で？　世界は何も変わっていない。それじゃいけない」"

[[dialogue]]
speaker = "ギエル"
# 「なにせ我が主は……共にこの世界を壊してしまおうと、私を<ruby=いざな>誘</ruby>ったのですから！」
line = "「なにせ我が主は……共にこの世界を壊してしまおうと、私を<ruby>誘<rt>いざな</rt></ruby>ったのですから！」"

[[dialogue]]
speaker = "アポロ"
# 「違う──違うんだ、ギエル！　待ってくれ」
line = "「違う──違うんだ、ギエル！　待ってくれ」"

[[dialogue]]
speaker = "アポロ"
# 「オマエはあたしと違って──ここの、アルタイルの人間だ。リクリエに囚われた使徒じゃない。そうだろギエル──いや……希崎レイト……！」
line = "「オマエはあたしと違って──ここの、アルタイルの人間だ。リクリエに囚われた使徒じゃない。そうだろギエル──いや……希崎レイト……！」"

[[dialogue]]
speaker = "ギエル"
# 「……ふむ。そちらはとうに捨てた名ですが」
line = "「……ふむ。そちらはとうに捨てた名ですが」"

[[dialogue]]
speaker = "リノ"
# （彼はアルタイルの人間──）
line = "（彼はアルタイルの人間──）"

[[dialogue]]
speaker = "アナ"
# （どうやら……元々アポロとは縁のない存在だったようですね……）
line = "（どうやら……元々アポロとは縁のない存在だったようですね……）"

[[dialogue]]
speaker = "アポロ"
# 「オマエをそんな風にしたのはあたしなんだ。本当に、悪かった」
line = "「オマエをそんな風にしたのはあたしなんだ。本当に、悪かった」"

[[dialogue]]
speaker = "ギエル"
# 「悪い？　何を謝られることがあるのです。私は真実、あなたに出会って救われたというのに」
line = "「悪い？　何を謝られることがあるのです。私は真実、あなたに出会って救われたというのに」"

[[dialogue]]
speaker = "ギエル"
# 「ですが、だからこそ残念でなりません。アポロ様──いえ、星見フィオナ様。あなたはこの仮面にふさわしくなかった」
line = "「ですが、だからこそ残念でなりません。アポロ様──いえ、星見フィオナ様。あなたはこの仮面にふさわしくなかった」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
# 「！　姉さんを本名で……」
line = "「！　姉さんを本名で……」"

[[dialogue]]
speaker = "ユウリ"
# （強引にでもとっ捕まえてやりてえけど──）
line = "（強引にでもとっ捕まえてやりてえけど──）"

[[dialogue]]
speaker = "クロト"
# （近づけない──なんだ、この結界めいた『影』は……）
line = "（近づけない──なんだ、この結界めいた『影』は……）"

[[dialogue]]
speaker = "アナ"
# （新月の星術──だけじゃない、何かが働いている……！？）
line = "（新月の星術──だけじゃない、何かが働いている……！？）"

[[dialogue]]
speaker = "unk"
# ──ぞくり、ぞくりと。
line = "──ぞくり、ぞくりと。"

[[dialogue]]
speaker = "unk"
# ギエルを中心に広がる、影のような暗黒色の波動が……俺たちの挙動を縛っていた。
line = "ギエルを中心に広がる、影のような暗黒色の波動が……俺たちの挙動を縛っていた。"

[[dialogue]]
speaker = "ギエル"
# 「希崎レイトなどという名は捨てた。あなたもそうだと思っていました。それが、よもやただの人間へ還るとは……口惜しくてなりません」
line = "「希崎レイトなどという名は捨てた。あなたもそうだと思っていました。それが、よもやただの人間へ還るとは……口惜しくてなりません」"

[[dialogue]]
speaker = "アポロ"
# 「あたしは……アポロとしての自分まで消し去ったわけじゃない。拭えない罪だってわかってる」
line = "「あたしは……アポロとしての自分まで消し去ったわけじゃない。拭えない罪だってわかってる」"

[[dialogue]]
speaker = "アポロ"
# 「オマエが抱えてたものも……わかってるつもりだ。何もかもなくなればいいって気持ちも」
line = "「オマエが抱えてたものも……わかってるつもりだ。何もかもなくなればいいって気持ちも」"

[[dialogue]]
speaker = "アポロ"
# 「だけど──オマエはあたしとは違う。ここの人間なんだ。オマエはまだ、この世界でやり直せるんだ！」
line = "「だけど──オマエはあたしとは違う。ここの人間なんだ。オマエはまだ、この世界でやり直せるんだ！」"

[[dialogue]]
speaker = "ギエル"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# アポロの叫びを、ギエルは虚ろな面持ちで聞いていた。
line = "アポロの叫びを、ギエルは虚ろな面持ちで聞いていた。"

[[dialogue]]
speaker = "unk"
# ふとこちらに振り向いたギエルに俺は呼びかける。
line = "ふとこちらに振り向いたギエルに俺は呼びかける。"

[[dialogue]]
speaker = "クロト"
# 「希崎レイト──か。それが、元のおまえの名前なんだな」
line = "「希崎レイト──か。それが、元のおまえの名前なんだな」"

[[dialogue]]
speaker = "ギエル"
# 「あなたには関係のない話ですよ、魔王」
line = "「あなたには関係のない話ですよ、魔王」"

[[dialogue]]
speaker = "クロト"
# 「かもしれないな。俺は……そういう意味じゃ、本来のおまえに会ったことすらないわけだし」
line = "「かもしれないな。俺は……そういう意味じゃ、本来のおまえに会ったことすらないわけだし」"

[[dialogue]]
speaker = "ギエル"
# 「会いたくもありませんでしたね。あなたと私では、到底棲む世界が違うのですから」
line = "「会いたくもありませんでしたね。あなたと私では、到底棲む世界が違うのですから」"

[[dialogue]]
speaker = "unk"
# 諦めたように微笑むギエル。
line = "諦めたように微笑むギエル。"

[[dialogue]]
speaker = "unk"
# その独白に応じて、さらなる影のオーラが彼を包み込んでいく。
line = "その独白に応じて、さらなる影のオーラが彼を包み込んでいく。"

[[dialogue]]
speaker = "ギエル"
# 「私は……私はずっと、居場所がないと感じていた。生まれてからずっとだ」
line = "「私は……私はずっと、居場所がないと感じていた。生まれてからずっとだ」"

[[dialogue]]
speaker = "ギエル"
# 「星騎士──あなた方のような眩しい存在ではいられなかった。同じように生きることも叶わなかった」
line = "「星騎士──あなた方のような眩しい存在ではいられなかった。同じように生きることも叶わなかった」"

[[dialogue]]
speaker = "ギエル"
# 「深海を生きる魚にとっては……陽の当たる場所にいることさえ、耐えがたい苦痛なのですよ」
line = "「深海を生きる魚にとっては……陽の当たる場所にいることさえ、耐えがたい苦痛なのですよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「どういうこと──あんたは、星騎士になりたかったの？」
line = "「どういうこと──あんたは、星騎士になりたかったの？」"

[[dialogue]]
speaker = "ギエル"
# 「さあ。そうとも言えるし、そうでないとも言えます。結局、自分の存在意義さえ見いだせればなんでもよかったのかもしれない」
line = "「さあ。そうとも言えるし、そうでないとも言えます。結局、自分の存在意義さえ見いだせればなんでもよかったのかもしれない」"

[[dialogue]]
speaker = "ギエル"
# 「私の両親は普通だった。育った環境も普通だった。アポロ様のような才も、血筋も私にはない」
line = "「私の両親は普通だった。育った環境も普通だった。アポロ様のような才も、血筋も私にはない」"

[[dialogue]]
speaker = "ギエル"
# 「私はちっぽけな悪だ。巨悪にも、英雄にもなれない小物でしかない」
line = "「私はちっぽけな悪だ。巨悪にも、英雄にもなれない小物でしかない」"

[[dialogue]]
speaker = "ギエル"
# 「それでも──あなたの与えてくれた従者という立場こそが唯一の居場所となった。私にとって、これ以上なく棲みやすい深淵だった」
line = "「それでも──あなたの与えてくれた従者という立場こそが唯一の居場所となった。私にとって、これ以上なく棲みやすい深淵だった」"

[[dialogue]]
speaker = "ギエル"
# 「リクリエを司りし使徒に付き従う金魚のフン。本来、その立ち場さえ出来すぎなほどでした。私のような日陰者からしてみれば」
line = "「リクリエを司りし使徒に付き従う金魚のフン。本来、その立ち場さえ出来すぎなほどでした。私のような日陰者からしてみれば」"

[[dialogue]]
speaker = "アポロ"
# 「──だったら！　あたしがまた、この世界でのオマエの居場所になってやる！」
line = "「──だったら！　あたしがまた、この世界でのオマエの居場所になってやる！」"

[[dialogue]]
speaker = "アポロ"
# 「……オマエは確かに陰気な奴だ。キラキラ輝く学園生活──なんてのとは、言っちゃ悪いけど縁遠い男だよな」
line = "「……オマエは確かに陰気な奴だ。キラキラ輝く学園生活──なんてのとは、言っちゃ悪いけど縁遠い男だよな」"

[[dialogue]]
speaker = "アポロ"
# 「だけどあたしは、そんなオマエとの会話が案外嫌いじゃなかった」
line = "「だけどあたしは、そんなオマエとの会話が案外嫌いじゃなかった」"

[[dialogue]]
speaker = "アポロ"
# 「『１日分のグミ』を小分けに用意してるマメさも、わざと量を減らしてあたしが嫌がる顔を見たがる陰湿さも、何もかも新鮮で面白かったんだ」
line = "「『１日分のグミ』を小分けに用意してるマメさも、わざと量を減らしてあたしが嫌がる顔を見たがる陰湿さも、何もかも新鮮で面白かったんだ」"

[[dialogue]]
speaker = "アポロ"
# 「何も世界をゼロから創り直さなくたって──あたしとオマエとなら、まだまだ面白いことができる」
line = "「何も世界をゼロから創り直さなくたって──あたしとオマエとなら、まだまだ面白いことができる」"

[[dialogue]]
speaker = "アポロ"
# 「恨みが──ぶつけたい想いがあるっていうなら……舞台は壊しちゃいけないだろ？」
line = "「恨みが──ぶつけたい想いがあるっていうなら……舞台は壊しちゃいけないだろ？」"

[[dialogue]]
speaker = "アポロ"
# 「あたしもオマエも、今さらヒーローなんて柄じゃない。……でも、だったらヴィランでいいじゃないか」
line = "「あたしもオマエも、今さらヒーローなんて柄じゃない。……でも、だったらヴィランでいいじゃないか」"

[[dialogue]]
speaker = "アポロ"
# 「リクリエのパシリなんかじゃなくて……今度はこの世界で、堂々と胸張って悪役をやってみようぜ」
line = "「リクリエのパシリなんかじゃなくて……今度はこの世界で、堂々と胸張って悪役をやってみようぜ」"

[[dialogue]]
speaker = "アポロ"
# 「だからあたしと一緒に来い！　今度こそあたしが──オマエの居場所になってみせるから」
line = "「だからあたしと一緒に来い！　今度こそあたしが──オマエの居場所になってみせるから」"

[[dialogue]]
speaker = "unk"
# ──アポロが手を差し伸べる。
line = "──アポロが手を差し伸べる。"

[[dialogue]]
speaker = "アポロ"
# 「<ruby=あたし>星見フィオナ</ruby>にエリシアが居たように……希崎レイトにはアポロがいる。そんなのも、悪くないだろ？」
line = "「<ruby>星見フィオナ<rt>あたし</rt></ruby>にエリシアが居たように……希崎レイトにはアポロがいる。そんなのも、悪くないだろ？」"

[[dialogue]]
speaker = "ギエル"
# 「……つまり、あなたなりに罪滅ぼしがしたいと？」
line = "「……つまり、あなたなりに罪滅ぼしがしたいと？」"

[[dialogue]]
speaker = "アポロ"
# 「え……？」
line = "「え……？」"

[[dialogue]]
speaker = "ギエル"
# 「──くっ……ははっ」
line = "「──くっ……ははっ」"

[[dialogue]]
speaker = "ギエル"
# 「──御免ですねえ！　なぜ私が、今さらあなたの罪滅ぼしなどに付き合わねばならないのです？」
line = "「──御免ですねえ！　なぜ私が、今さらあなたの罪滅ぼしなどに付き合わねばならないのです？」"

[[dialogue]]
speaker = "アポロ"
# 「違う、そういうことじゃなくて──」
line = "「違う、そういうことじゃなくて──」"

[[dialogue]]
speaker = "ギエル"
# 「そもそも私は、今更『居場所が欲しい』などとは思っていません。ただ純粋に、この世界の破滅が見たいのですよ」
line = "「そもそも私は、今更『居場所が欲しい』などとは思っていません。ただ純粋に、この世界の破滅が見たいのですよ」"

[[dialogue]]
speaker = "ギエル"
# 「確かに最初は……ありふれた鬱屈の発露だった。しかし私は気づかされただけなのです。ずっと秘めていた心の願望にね」
line = "「確かに最初は……ありふれた鬱屈の発露だった。しかし私は気づかされただけなのです。ずっと秘めていた心の願望にね」"

[[dialogue]]
speaker = "ギエル"
# 「我が主アポロはもう──この世に亡き存在です。単なる小娘に戻ったあなたに興味はありません」
line = "「我が主アポロはもう──この世に亡き存在です。単なる小娘に戻ったあなたに興味はありません」"

[[dialogue]]
speaker = "アポロ"
# 「あ──う……！」
line = "「あ──う……！」"

[[dialogue]]
speaker = "unk"
# 今のアポロでは……彼を説得できなかった。
line = "今のアポロでは……彼を説得できなかった。"

[[dialogue]]
speaker = "unk"
# 主を失った従者の暴走──それは誰にも止められない。
line = "主を失った従者の暴走──それは誰にも止められない。"

[[dialogue]]
speaker = "ギエル"
# 「──ゆえに。今。私の為すべきはひとつ」
line = "「──ゆえに。今。私の為すべきはひとつ」"

[[dialogue]]
speaker = "ギエル"
# 「元・<ruby=あるじ>主</ruby>にこれが不要というのなら……私が定めを受け継ぎ、真の終焉を拝ませていただくとしましょう！」
line = "「元・<ruby>主<rt>あるじ</rt></ruby>にこれが不要というのなら……私が定めを受け継ぎ、真の終焉を拝ませていただくとしましょう！」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
# 「──ッ！」
line = "「──ッ！」"

[[dialogue]]
speaker = "クロト"
# 「やめろギエル──おまえまで取り込まれるぞ！」
line = "「やめろギエル──おまえまで取り込まれるぞ！」"

[[dialogue]]
speaker = "unk"
# ギエルの拾い上げた最後の破片に、リクリエの瘴気が宿り始める。
line = "ギエルの拾い上げた最後の破片に、リクリエの瘴気が宿り始める。"

[[dialogue]]
speaker = "unk"
# それに対抗するかのように『シエルの筐』がかつてないほど<ruby=かくやく>赫灼</ruby>した。
line = "それに対抗するかのように『シエルの筐』がかつてないほど<ruby>赫灼<rt>かくやく</rt></ruby>した。"

[[dialogue]]
speaker = "リノ"
# 「させないわ──ソレは必ずこの場で封印する。私の命に代えても──！」
line = "「させないわ──ソレは必ずこの場で封印する。私の命に代えても──！」"

[[dialogue]]
speaker = "ギエル"
# 「天界の聖遺物……なるほど。魔女の動きは掴んでいましたが、そのアイテムは想定外だ」
line = "「天界の聖遺物……なるほど。魔女の動きは掴んでいましたが、そのアイテムは想定外だ」"

[[dialogue]]
speaker = "ギエル"
# 「ですが──無駄だ。世界を終わらせる厄災は、いかなる外殻にも縛られない！」
line = "「ですが──無駄だ。世界を終わらせる厄災は、いかなる外殻にも縛られない！」"

[[dialogue]]
speaker = "クロト"
# 「！？」
line = "「！？」"

[[dialogue]]
speaker = "unk"
# ギエルを覆っていた『影』が破片に共鳴した。
line = "ギエルを覆っていた『影』が破片に共鳴した。"

[[dialogue]]
speaker = "unk"
# すると、その現象へ呼応するかのように──『筐』内部に収めたはずの断片までもが暴走を始めた！
line = "すると、その現象へ呼応するかのように──『筐』内部に収めたはずの断片までもが暴走を始めた！"

[[dialogue]]
speaker = "ギエル"
# 「さあ──『使徒』の仮面よ！　新たな主導者の誕生を祝して集うがいい──！」
line = "「さあ──『使徒』の仮面よ！　新たな主導者の誕生を祝して集うがいい──！」"

[[dialogue]]
speaker = "ユウリ"
# 「なっ……待て！　せっかく集めた破片が──！」
line = "「なっ……待て！　せっかく集めた破片が──！」"

[[dialogue]]
speaker = "リノ"
# 「く──っ……！？　ダメ、流出が抑えられない──！」
line = "「く──っ……！？　ダメ、流出が抑えられない──！」"

[[dialogue]]
speaker = "unk"
# ギエルの掲げる一欠片へ向けて集約されていく仮面の断片！
line = "ギエルの掲げる一欠片へ向けて集約されていく仮面の断片！"

[[dialogue]]
speaker = "unk"
# その勢いはすさまじく、いくら『筐』の封印をもってしても歯止めが利かない。
line = "その勢いはすさまじく、いくら『筐』の封印をもってしても歯止めが利かない。"

[[dialogue]]
speaker = "unk"
# さらに──
line = "さらに──"

[[dialogue]]
speaker = "リノ"
# 「──！？　そん、な──」
line = "「──！？　そん、な──」"

[[dialogue]]
speaker = "ルリエル"
# 「は、筐が砕けてしまいました──！」
line = "「は、筐が砕けてしまいました──！」"

[[dialogue]]
speaker = "ギエル"
# 「──くははは！　悪くない秘策だったと褒めておきましょう。しかし──見立てが甘いと言わざるを得ませんねえ！」
line = "「──くははは！　悪くない秘策だったと褒めておきましょう。しかし──見立てが甘いと言わざるを得ませんねえ！」"

[[dialogue]]
speaker = "unk"
# ギエルという一点に集約されていく仮面の破片。
line = "ギエルという一点に集約されていく仮面の破片。"

[[dialogue]]
speaker = "unk"
# 爆発的に膨れ上がる負のエネルギーが、ギエルの全身を包み込んでいく。
line = "爆発的に膨れ上がる負のエネルギーが、ギエルの全身を包み込んでいく。"

[[dialogue]]
speaker = "アポロ"
# 「頼む、みんな──力を貸してくれ。ギエルと仮面が適合したら手遅れになる！」
line = "「頼む、みんな──力を貸してくれ。ギエルと仮面が適合したら手遅れになる！」"

[[dialogue]]
speaker = "クロト"
# 「ああ──まだ仮面が結合しないうちに食い止めるんだ！」
line = "「ああ──まだ仮面が結合しないうちに食い止めるんだ！」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
# 「ええ──決して、姉さんのようにはさせません！」
line = "「ええ──決して、姉さんのようにはさせません！」"

[[dialogue]]
speaker = "unk"
# 完全体となったアポロさえ打ち砕いた、魔王と星騎士によるフルバースト──
line = "完全体となったアポロさえ打ち砕いた、魔王と星騎士によるフルバースト──"

[[dialogue]]
speaker = "unk"
# 俺たちの持てる限りを合わせた──星術の究極がギエルを見舞う！
line = "俺たちの持てる限りを合わせた──星術の究極がギエルを見舞う！"
