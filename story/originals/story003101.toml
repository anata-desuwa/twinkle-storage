[[dialogue]]
speaker = "unk"
# 新たに迎えた元日。
line = "新たに迎えた元日。"

[[dialogue]]
speaker = "unk"
# 流星学園附属校３年生の『染井シズハ』は、サーシャと一緒に浅草の有名なお寺へ初詣にやってきていた。
line = "流星学園附属校３年生の『染井シズハ』は、サーシャと一緒に浅草の有名なお寺へ初詣にやってきていた。"

[[dialogue]]
speaker = "シズハ"
# 「わぁ～♪　すごく大きな提灯！　この門を進んだ先にお寺があるんだね～」
line = "「わぁ～♪　すごく大きな提灯！　この門を進んだ先にお寺があるんだね～」"

[[dialogue]]
speaker = "サーシャ"
# 「ふふふっ、そうよ～。昔から星騎士にとってご利益のあるお寺って言われてて、私たちも以前ここで晴れ着フォームに覚醒したの」
line = "「ふふふっ、そうよ～。昔から星騎士にとってご利益のあるお寺って言われてて、私たちも以前ここで晴れ着フォームに覚醒したの」"

[[dialogue]]
speaker = "シズハ"
# 「サーシャさんも、妹のソフィア先輩と、ここで仲直りしたんだよね？」
line = "「サーシャさんも、妹のソフィア先輩と、ここで仲直りしたんだよね？」"

[[dialogue]]
speaker = "サーシャ"
# 「ええ、そうなの。だから縁起もいいかなって。シズハちゃんもきっと、ソフィと仲良くなれると思うわ」
line = "「ええ、そうなの。だから縁起もいいかなって。シズハちゃんもきっと、ソフィと仲良くなれると思うわ」"

[[dialogue]]
speaker = "シズハ"
# 「うん……ソフィア先輩はもう少ししたら来るって？」
line = "「うん……ソフィア先輩はもう少ししたら来るって？」"

[[dialogue]]
speaker = "サーシャ"
# 「さっきＤＩＳＣでメッセージが送られてきたけど、こっちにはもう向かってるみたい」
line = "「さっきＤＩＳＣでメッセージが送られてきたけど、こっちにはもう向かってるみたい」"

[[dialogue]]
speaker = "シズハ"
# 「そっか。いざ対面するとなると、ちょっと緊張するな～……」
line = "「そっか。いざ対面するとなると、ちょっと緊張するな～……」"

[[dialogue]]
speaker = "unk"
# サーシャの妹である『奏ソフィア』。シズハがサーシャと知り合って以来、実はまだ１度も彼女と対面して話したことがなかった。
line = "サーシャの妹である『奏ソフィア』。シズハがサーシャと知り合って以来、実はまだ１度も彼女と対面して話したことがなかった。"

[[dialogue]]
speaker = "シズハ"
# （サーシャさんの<b>本物</b>の妹さんだから、私が勝手に負い目みたいなのを感じちゃってるせいなんだけど……）
line = "（サーシャさんの<b>本物</b>の妹さんだから、私が勝手に負い目みたいなのを感じちゃってるせいなんだけど……）"

[[dialogue]]
speaker = "unk"
# とある一件で、サーシャの『偽物の妹』になりすましていた経験があるシズハは、ソフィアと直接会うのを、これまでなんとなく避け続けてしまっていた。
line = "とある一件で、サーシャの『偽物の妹』になりすましていた経験があるシズハは、ソフィアと直接会うのを、これまでなんとなく避け続けてしまっていた。"

[[dialogue]]
speaker = "サーシャ"
# 「――大丈夫よ、シズハちゃん」
line = "「――大丈夫よ、シズハちゃん」"

[[dialogue]]
speaker = "unk"
# シズハが少し考え込んでいると、頭の上にサーシャの手が優しく置かれる。
line = "シズハが少し考え込んでいると、頭の上にサーシャの手が優しく置かれる。"

[[dialogue]]
speaker = "サーシャ"
# 「ソフィにも事情はある程度話してあるし、私もそばに付いてるわ。だから、大丈夫」
line = "「ソフィにも事情はある程度話してあるし、私もそばに付いてるわ。だから、大丈夫」"

[[dialogue]]
speaker = "シズハ"
# 「サーシャさん……うん、ありがとう。私、勇気を出して、ちゃんと話してみるね」
line = "「サーシャさん……うん、ありがとう。私、勇気を出して、ちゃんと話してみるね」"

[[dialogue]]
speaker = "unk"
# と、その時だった。
line = "と、その時だった。"

[[dialogue]]
speaker = "アナ"
# 「サーシャ先輩、シズハさん。ハッピニューイヤーです」
line = "「サーシャ先輩、シズハさん。ハッピニューイヤーです」"

[[dialogue]]
speaker = "サーシャ"
# 「あら、アナちゃん！　聞いていた通り今日、初詣にきたのね～♪」
line = "「あら、アナちゃん！　聞いていた通り今日、初詣にきたのね～♪」"

[[dialogue]]
speaker = "アナ"
# 「ええ。ひょっとしたら会えるかもと言っていましたが、見事に遭遇できましたね」
line = "「ええ。ひょっとしたら会えるかもと言っていましたが、見事に遭遇できましたね」"

[[dialogue]]
speaker = "リーリア"
# 「お２人共、あけおめマジカルで～す☆　アナちゃんと一緒に初詣に来ちゃいました～♪」
line = "「お２人共、あけおめマジカルで～す☆　アナちゃんと一緒に初詣に来ちゃいました～♪」"

[[dialogue]]
speaker = "サーシャ"
# 「あら～、リーリアちゃん、あけましておめでと～♪　今年もよろしくね～♪」
line = "「あら～、リーリアちゃん、あけましておめでと～♪　今年もよろしくね～♪」"

[[dialogue]]
speaker = "リーリア"
# 「はいっ☆　可愛い後輩として、今年もよろしくお願いします～♪」
line = "「はいっ☆　可愛い後輩として、今年もよろしくお願いします～♪」"

[[dialogue]]
speaker = "リーリア"
# 「シズハちゃんとは、こうして面と向かって話すのは初めてですよね？　新星学園１年、魔女の星騎士、『<ruby=しぶたに>渋谷</ruby>リーリア』で～す☆」
line = "「シズハちゃんとは、こうして面と向かって話すのは初めてですよね？　新星学園１年、魔女の星騎士、『<ruby>渋谷<rt>しぶたに</rt></ruby>リーリア』で～す☆」"

[[dialogue]]
speaker = "シズハ"
# 「初めまして、附属校３年の染井シズハです！　リーリア先輩のことは、会長や同じクラスのサチちゃんから、よく聞いていました」
line = "「初めまして、附属校３年の染井シズハです！　リーリア先輩のことは、会長や同じクラスのサチちゃんから、よく聞いていました」"

[[dialogue]]
speaker = "リーリア"
# 「ふふふっ、シズハちゃんからは、サチちゃんと同じマジカルな気配を感じていたので、前から注目していたんですよ～♪」
line = "「ふふふっ、シズハちゃんからは、サチちゃんと同じマジカルな気配を感じていたので、前から注目していたんですよ～♪」"

[[dialogue]]
speaker = "リーリア"
# 「今回、新しい『晴れ着フォーム』仲間っていう縁もできましたし、これから仲良くしましょうね～☆」
line = "「今回、新しい『晴れ着フォーム』仲間っていう縁もできましたし、これから仲良くしましょうね～☆」"

[[dialogue]]
speaker = "シズハ"
# 「はいっ、よろしくお願いします、リーリア先輩♪」
line = "「はいっ、よろしくお願いします、リーリア先輩♪」"

[[dialogue]]
speaker = "アナ"
# 「確かに。リーリアさんの言う通り、ヘレナさんから新たに晴れ着フォームをもらった４人が、奇しくも揃いましたね」
line = "「確かに。リーリアさんの言う通り、ヘレナさんから新たに晴れ着フォームをもらった４人が、奇しくも揃いましたね」"

[[dialogue]]
speaker = "unk"
# 新しいお正月に向けて、九浄ヘレナは新しい人工戦闘服を用意していた。
line = "新しいお正月に向けて、九浄ヘレナは新しい人工戦闘服を用意していた。"

[[dialogue]]
speaker = "unk"
# 今回用意できたのは４着。新たな晴れ着フォームの使用者に選ばれたのが、ここにいるアナたち４人だった。
line = "今回用意できたのは４着。新たな晴れ着フォームの使用者に選ばれたのが、ここにいるアナたち４人だった。"

[[dialogue]]
speaker = "サーシャ"
# 「うふふっ、新年から縁があるわね～♪　それにしても３人共すごく可愛い晴れ着で、お姉ちゃん、思わずハグしたくなっちゃうわ～♪　ぎゅ～っ<emoji=heart04>」
line = "「うふふっ、新年から縁があるわね～♪　それにしても３人共すごく可愛い晴れ着で、お姉ちゃん、思わずハグしたくなっちゃうわ～♪　ぎゅ～っ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そう言って、サーシャがリーリアに抱き着いて、ハグをする。
line = "そう言って、サーシャがリーリアに抱き着いて、ハグをする。"

[[dialogue]]
speaker = "リーリア"
# 「わぁっ！？　もう、サーシャさん、いきなり抱き着かれたら、ビックリしちゃいますよ～☆」
line = "「わぁっ！？　もう、サーシャさん、いきなり抱き着かれたら、ビックリしちゃいますよ～☆」"

[[dialogue]]
speaker = "リーリア"
# （すごい、サーシャさんのおっぱい、こぼれそうな程にマジカル大きい……！　これが天然物の巨乳……ぶっちゃけ羨ましいっ）
line = "（すごい、サーシャさんのおっぱい、こぼれそうな程にマジカル大きい……！　これが天然物の巨乳……ぶっちゃけ羨ましいっ）"

[[dialogue]]
speaker = "unk"
# ちなみに、リーリアの晴れ着フォームの胸は、相変わらず『幻影魔法』で盛られている。
line = "ちなみに、リーリアの晴れ着フォームの胸は、相変わらず『幻影魔法』で盛られている。"

[[dialogue]]
speaker = "unk"
# 胸元の露出が大きい服であっても、パッドで物理的に盛り上げたあと、幻影魔法でテクスチャーを貼り、他人からは巨乳にしか見えない完璧な仕上がりである。
line = "胸元の露出が大きい服であっても、パッドで物理的に盛り上げたあと、幻影魔法でテクスチャーを貼り、他人からは巨乳にしか見えない完璧な仕上がりである。"

[[dialogue]]
speaker = "アナ"
# 「サーシャ先輩は前の晴れ着フォームもセクシーでしたが、パワーアップした『スーパー晴れ着フォーム』は、色気も更にスーパーになっていますね」
line = "「サーシャ先輩は前の晴れ着フォームもセクシーでしたが、パワーアップした『スーパー晴れ着フォーム』は、色気も更にスーパーになっていますね」"

[[dialogue]]
speaker = "サーシャ"
# 「ほんとう？　ありがと～♪　私だけまた新しく作り直してもらっちゃって、なんだかちょっと申し訳ない気持ちもあるけれど……」
line = "「ほんとう？　ありがと～♪　私だけまた新しく作り直してもらっちゃって、なんだかちょっと申し訳ない気持ちもあるけれど……」"

[[dialogue]]
speaker = "アナ"
# 「そこはヘレナさん曰く、サーシャ先輩は特に晴れ着フォームとの相性がいいらしいとのことですので、それこそ縁があったと素直に喜んでいいと思いますよ」
line = "「そこはヘレナさん曰く、サーシャ先輩は特に晴れ着フォームとの相性がいいらしいとのことですので、それこそ縁があったと素直に喜んでいいと思いますよ」"

[[dialogue]]
speaker = "シズハ"
# 「そうそう！　美人なサーシャさんにイケイケゴーゴーで、すごく似合ってるし♪」
line = "「そうそう！　美人なサーシャさんにイケイケゴーゴーで、すごく似合ってるし♪」"

[[dialogue]]
speaker = "サーシャ"
# 「シズハちゃんもありがとう♪　なら、せっかく作ってもらった以上は、またちゃんと<b>起動</b>させられるように頑張らないとね～」
line = "「シズハちゃんもありがとう♪　なら、せっかく作ってもらった以上は、またちゃんと<b>起動</b>させられるように頑張らないとね～」"

[[dialogue]]
speaker = "リーリア"
# 「そこですよね～。私もまだ全然、戦闘服として起動することができなくて～」
line = "「そこですよね～。私もまだ全然、戦闘服として起動することができなくて～」"

[[dialogue]]
speaker = "アナ"
# 「フォームチェンジ技術は、私とアニマ先輩で共同研究し、日進月歩でアップデートを重ねていますが、晴れ着フォームの起動条件は未だはっきりと解明はされていません」
line = "「フォームチェンジ技術は、私とアニマ先輩で共同研究し、日進月歩でアップデートを重ねていますが、晴れ着フォームの起動条件は未だはっきりと解明はされていません」"

[[dialogue]]
speaker = "シズハ"
# 「それならせっかく４人集まったわけですし、初詣をしながらどうやったら起動できるか、色々試してみませんか？」
line = "「それならせっかく４人集まったわけですし、初詣をしながらどうやったら起動できるか、色々試してみませんか？」"

[[dialogue]]
speaker = "シズハ"
# 「サーシャさんも前に初詣へきた時、晴れ着フォームが起動したって言ってたし」
line = "「サーシャさんも前に初詣へきた時、晴れ着フォームが起動したって言ってたし」"

[[dialogue]]
speaker = "アナ"
# 「確かに、お寺への参拝を済ませることで起動条件を満たす可能性もゼロではありません。私的にはノープロブレムです」
line = "「確かに、お寺への参拝を済ませることで起動条件を満たす可能性もゼロではありません。私的にはノープロブレムです」"

[[dialogue]]
speaker = "リーリア"
# 「シズハちゃん、ナイスアイデア☆　その方が楽しい初詣になりそうだし、私も賛成～♪」
line = "「シズハちゃん、ナイスアイデア☆　その方が楽しい初詣になりそうだし、私も賛成～♪」"

[[dialogue]]
speaker = "サーシャ"
# 「うふふっ、私もいいわよ～。後でソフィ達も合流するし、他のアイディアを聞いてみるのもよさそうね～」
line = "「うふふっ、私もいいわよ～。後でソフィ達も合流するし、他のアイディアを聞いてみるのもよさそうね～」"

[[dialogue]]
speaker = "シズハ"
# 「よ～し、それじゃあみんなで、初詣にいけいけゴーゴー♪」
line = "「よ～し、それじゃあみんなで、初詣にいけいけゴーゴー♪」"

[[dialogue]]
speaker = "リーリア"
# 「お～☆」
line = "「お～☆」"

[[dialogue]]
speaker = "unk"
# そうして、門をくぐり抜けて、お寺へと向かい始める４人。
line = "そうして、門をくぐり抜けて、お寺へと向かい始める４人。"

[[dialogue]]
speaker = "unk"
# その様子を建物の影から見つめている者がいた。
line = "その様子を建物の影から見つめている者がいた。"

[[dialogue]]
speaker = "獅子舞"
# 「……ふん」
line = "「……ふん」"

[[dialogue]]
speaker = "unk"
# 新たな晴れ着を巡って、星騎士たちの初詣が始まろうとしていた。
line = "新たな晴れ着を巡って、星騎士たちの初詣が始まろうとしていた。"
