[[dialogue]]
speaker = "unk"
# メイプルと出会ってから、１週間程経ったある日のこと。
line = "メイプルと出会ってから、１週間程経ったある日のこと。"

[[dialogue]]
speaker = "unk"
# 俺はトワ先生に訓練をみてもらっていた。
line = "俺はトワ先生に訓練をみてもらっていた。"

[[dialogue]]
speaker = "トワ先生"
# 「――うん、いい感じ！　会長くん、星力の制御、上手くなったね」
line = "「――うん、いい感じ！　会長くん、星力の制御、上手くなったね」"

[[dialogue]]
speaker = "トワ先生"
# 「リクリエが迫る中、実戦を繰り返し経てきたからかな。入学当初とは段違いに良くなってるよ」
line = "「リクリエが迫る中、実戦を繰り返し経てきたからかな。入学当初とは段違いに良くなってるよ」"

[[dialogue]]
speaker = "unk"
# 先生にはまだまだ及ばないです
line = "先生にはまだまだ及ばないです"

[[dialogue]]
speaker = "unk"
# トワ先生は星力の制御に関して、俺がこれまで見てきた中でトップクラスに優れた人物だった。
line = "トワ先生は星力の制御に関して、俺がこれまで見てきた中でトップクラスに優れた人物だった。"

[[dialogue]]
speaker = "unk"
# だから、こうしてたまに、個人指導をお願いしていたのだった。
line = "だから、こうしてたまに、個人指導をお願いしていたのだった。"

[[dialogue]]
speaker = "トワ先生"
# 「えっへん♪　先生の専門は、星力と人体の影響を調べる『星体力学』だからね～」
line = "「えっへん♪　先生の専門は、星力と人体の影響を調べる『星体力学』だからね～」"

[[dialogue]]
speaker = "トワ先生"
# 「それに先生は、星騎士としての年季が全然違うしね！　会長くんとは１０年以上――」
line = "「それに先生は、星騎士としての年季が全然違うしね！　会長くんとは１０年以上――」"

[[dialogue]]
speaker = "トワ先生"
# 「って、違う！　先生はそこまで年取ってないから！！　永遠のプリティーガールだから！！！」
line = "「って、違う！　先生はそこまで年取ってないから！！　永遠のプリティーガールだから！！！」"

[[dialogue]]
speaker = "unk"
# 何も言ってませんけど！？
line = "何も言ってませんけど！？"

[[dialogue]]
speaker = "トワ先生"
# 「――コホン。さっきの発言は、可愛いトワちゃん先生の冗談として……」
line = "「――コホン。さっきの発言は、可愛いトワちゃん先生の冗談として……」"

[[dialogue]]
speaker = "トワ先生"
# 「実際は、星騎士として戦う為に、星力制御を上手くならざるを得なかったって感じかな」
line = "「実際は、星騎士として戦う為に、星力制御を上手くならざるを得なかったって感じかな」"

[[dialogue]]
speaker = "トワ先生"
# 「私の星力は、『特異体質』の影響か、極端に回復寄りの性質でね。人一倍上手く制御して反転させないと、そもそも攻撃星術すら使えないんだよ」
line = "「私の星力は、『特異体質』の影響か、極端に回復寄りの性質でね。人一倍上手く制御して反転させないと、そもそも攻撃星術すら使えないんだよ」"

[[dialogue]]
speaker = "unk"
# トワ先生の特異体質――固有の能力とでも言うべき『<ruby=オートヒール>自動回復</ruby>』。
line = "トワ先生の特異体質――固有の能力とでも言うべき『<ruby>自動回復<rt>オートヒール</rt></ruby>』。"

[[dialogue]]
speaker = "unk"
# それは先生の意思とは関係なく常時発動していて、体を元の状態に直すというものらしい。
line = "それは先生の意思とは関係なく常時発動していて、体を元の状態に直すというものらしい。"

[[dialogue]]
speaker = "unk"
# そして、先生の体は、その影響で<b>成人した今も成長しきっていない</b>と聞いている。
line = "そして、先生の体は、その影響で<b>成人した今も成長しきっていない</b>と聞いている。"

[[dialogue]]
speaker = "トワ先生"
# 「でも、どれだけ星力制御が上手くなったところで、強力な攻撃星術を持つ人達には劣る。例えば、Ｓランクモンスターにトドメを刺せちゃうメイプルちゃんとかね」
line = "「でも、どれだけ星力制御が上手くなったところで、強力な攻撃星術を持つ人達には劣る。例えば、Ｓランクモンスターにトドメを刺せちゃうメイプルちゃんとかね」"

[[dialogue]]
speaker = "トワ先生"
# 「私がそれくらい、強い星騎士だったらよかったんだろうけど……」
line = "「私がそれくらい、強い星騎士だったらよかったんだろうけど……」"

[[dialogue]]
speaker = "unk"
# 浮かない顔をするトワ先生。俺はその理由を知っていた。
line = "浮かない顔をするトワ先生。俺はその理由を知っていた。"

[[dialogue]]
speaker = "unk"
# その日の放課後。俺が空き教室で待っていると――
line = "その日の放課後。俺が空き教室で待っていると――"

[[dialogue]]
speaker = "メイプル"
# 「召喚に応じ、魔王メイプル、参上！」
line = "「召喚に応じ、魔王メイプル、参上！」"

[[dialogue]]
speaker = "メイプル"
# 「にへへ♪　お兄ちゃん、来たよ～♪　あたしに話したいことって？」
line = "「にへへ♪　お兄ちゃん、来たよ～♪　あたしに話したいことって？」"

[[dialogue]]
speaker = "トワ先生"
# 「来たね、メイプルちゃん。話したいことがあるのは、私なんだ」
line = "「来たね、メイプルちゃん。話したいことがあるのは、私なんだ」"

[[dialogue]]
speaker = "メイプル"
# 「えっ、トワちゃん……？」
line = "「えっ、トワちゃん……？」"

[[dialogue]]
speaker = "トワ先生"
# 「会長くんにも同席して欲しかったから、こういう形を取らせてもらったの」
line = "「会長くんにも同席して欲しかったから、こういう形を取らせてもらったの」"

[[dialogue]]
speaker = "トワ先生"
# 「単刀直入に聞くけど、メイプルちゃん、この１週間で何回か無断出撃してるよね？」
line = "「単刀直入に聞くけど、メイプルちゃん、この１週間で何回か無断出撃してるよね？」"

[[dialogue]]
speaker = "メイプル"
# 「うっ……！」
line = "「うっ……！」"

[[dialogue]]
speaker = "トワ先生"
# 「現場に駆け付けたプリマステラの子たちから、メイプルちゃんがモンスターと単独で戦ってるのを目撃したって報告が、複数上がってる」
line = "「現場に駆け付けたプリマステラの子たちから、メイプルちゃんがモンスターと単独で戦ってるのを目撃したって報告が、複数上がってる」"

[[dialogue]]
speaker = "トワ先生"
# 「この前も危険だからダメだって注意をしたはず。でも、聞き入れてもらえない」
line = "「この前も危険だからダメだって注意をしたはず。でも、聞き入れてもらえない」"

[[dialogue]]
speaker = "トワ先生"
# 「だから私だけじゃなくて、会長くんからも注意してもらおうと思ったの」
line = "「だから私だけじゃなくて、会長くんからも注意してもらおうと思ったの」"

[[dialogue]]
speaker = "トワ先生"
# 「……ねぇ、メイプルちゃん。なんでそんな無茶をするの？　先生、何度も説明したよね。単独での戦闘がどれだけ危険かって」
line = "「……ねぇ、メイプルちゃん。なんでそんな無茶をするの？　先生、何度も説明したよね。単独での戦闘がどれだけ危険かって」"

[[dialogue]]
speaker = "トワ先生"
# 「学園所属のプリマステラは、自己判断でモンスターと戦闘する許可が与えられている。でも、他のプリマステラと協力して、複数人で事に当たるのが基本なんだよ」
line = "「学園所属のプリマステラは、自己判断でモンスターと戦闘する許可が与えられている。でも、他のプリマステラと協力して、複数人で事に当たるのが基本なんだよ」"

[[dialogue]]
speaker = "トワ先生"
# 「その為に、学園から与えられる変身アイテムの『セレスティア』には、ＧＰＳ発信機能が付いていて――」
line = "「その為に、学園から与えられる変身アイテムの『セレスティア』には、ＧＰＳ発信機能が付いていて――」"

[[dialogue]]
speaker = "トワ先生"
# 「モンスターとの戦闘に突入した際、自動で周囲のプリマステラに協力要請シグナルが出されるようになっている」
line = "「モンスターとの戦闘に突入した際、自動で周囲のプリマステラに協力要請シグナルが出されるようになっている」"

[[dialogue]]
speaker = "トワ先生"
# 「だからもし、周囲に人が少ない場所で、メイプルちゃんが想定外の強さのモンスターに遭遇した場合」
line = "「だからもし、周囲に人が少ない場所で、メイプルちゃんが想定外の強さのモンスターに遭遇した場合」"

[[dialogue]]
speaker = "トワ先生"
# 「そのまま誰にも気づいてもらえず、１つのミスで死んでしまう可能性だってあるんだよ？」
line = "「そのまま誰にも気づいてもらえず、１つのミスで死んでしまう可能性だってあるんだよ？」"

[[dialogue]]
speaker = "メイプル"
# 「……それは、注意されたから、慎重にモンスターの力を計るようにしてる」
line = "「……それは、注意されたから、慎重にモンスターの力を計るようにしてる」"

[[dialogue]]
speaker = "トワ先生"
# 「そういうことじゃなくて、そもそも――」
line = "「そういうことじゃなくて、そもそも――」"

[[dialogue]]
speaker = "メイプル"
# 「わかってる。モンスターが……リクリエが危険なものだってことは。だってあたしは……本気でリクリエと戦う為に、家出までして来たんだから」
line = "「わかってる。モンスターが……リクリエが危険なものだってことは。だってあたしは……本気でリクリエと戦う為に、家出までして来たんだから」"

[[dialogue]]
speaker = "メイプル"
# 「あたしはリクリエを倒して、新しい魔王になると、覚悟を持ってここに来たの」
line = "「あたしはリクリエを倒して、新しい魔王になると、覚悟を持ってここに来たの」"

[[dialogue]]
speaker = "トワ先生"
# 「それだけ本気なら、メイプルちゃんはまだ若いんだし、１度魔界に帰って親御さんを説得してきなさい。先生からも、推薦状は書いてあげるから」
line = "「それだけ本気なら、メイプルちゃんはまだ若いんだし、１度魔界に帰って親御さんを説得してきなさい。先生からも、推薦状は書いてあげるから」"

[[dialogue]]
speaker = "トワ先生"
# 「その上で改めて、正式に学園に入学すれば――」
line = "「その上で改めて、正式に学園に入学すれば――」"

[[dialogue]]
speaker = "メイプル"
# 「馬鹿にしないで」
line = "「馬鹿にしないで」"

[[dialogue]]
speaker = "トワ先生"
# 「え……？」
line = "「え……？」"

[[dialogue]]
speaker = "メイプル"
# 「あたしはモノクラウン家の次期当主として、魔界に現れたモンスターとの実戦経験がある」
line = "「あたしはモノクラウン家の次期当主として、魔界に現れたモンスターとの実戦経験がある」"

[[dialogue]]
speaker = "メイプル"
# 「その上で流星市国の現状と比べれば、いかにリクリエの波が迫ってきているのかくらいわかる」
line = "「その上で流星市国の現状と比べれば、いかにリクリエの波が迫ってきているのかくらいわかる」"

[[dialogue]]
speaker = "メイプル"
# 「この先２回の大交流を挟んで、戻ってくるのが約半年後？　それでリクリエに間に合うって、トワちゃんは本気で言ってるの？」
line = "「この先２回の大交流を挟んで、戻ってくるのが約半年後？　それでリクリエに間に合うって、トワちゃんは本気で言ってるの？」"

[[dialogue]]
speaker = "トワ先生"
# 「それは……」
line = "「それは……」"

[[dialogue]]
speaker = "メイプル"
# 「結局トワちゃんも、パパやママと同じ。あたしの言うことなんか、話半分にしか聞いちゃいないんだよ」
line = "「結局トワちゃんも、パパやママと同じ。あたしの言うことなんか、話半分にしか聞いちゃいないんだよ」"

[[dialogue]]
speaker = "トワ先生"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "メイプル"
# 「トワちゃんには、行き倒れてたところを助けてもらった恩がある。でも、あたしにだって譲れないことがある」
line = "「トワちゃんには、行き倒れてたところを助けてもらった恩がある。でも、あたしにだって譲れないことがある」"

[[dialogue]]
speaker = "メイプル"
# 「あたしは魔界に帰らない。大人がなんと言おうと、あたしは魔王になる」
line = "「あたしは魔界に帰らない。大人がなんと言おうと、あたしは魔王になる」"

[[dialogue]]
speaker = "unk"
# メイプルはどうして、魔王になりたいんだ？
line = "メイプルはどうして、魔王になりたいんだ？"

[[dialogue]]
speaker = "メイプル"
# 「あたしにとって、魔王は憧れの英雄だから」
line = "「あたしにとって、魔王は憧れの英雄だから」"

[[dialogue]]
speaker = "メイプル"
# 「モノクラウン家の先祖は３０００年前、魔王の片腕として、隣で彼を支え続けた。だからモノクラウン家には、魔王の活躍を記した日記が残ってるの」
line = "「モノクラウン家の先祖は３０００年前、魔王の片腕として、隣で彼を支え続けた。だからモノクラウン家には、魔王の活躍を記した日記が残ってるの」"

[[dialogue]]
speaker = "メイプル"
# 「あたしは両親から、魔王の英雄譚を聞かされて育った。だからこそ、許せない」
line = "「あたしは両親から、魔王の英雄譚を聞かされて育った。だからこそ、許せない」"

[[dialogue]]
speaker = "メイプル"
# 「世界の危機が迫っているのに、自国に引きこもっている煌嶺も、それを見て見ぬフリして正そうとしないパパやママたちも！」
line = "「世界の危機が迫っているのに、自国に引きこもっている煌嶺も、それを見て見ぬフリして正そうとしないパパやママたちも！」"

[[dialogue]]
speaker = "メイプル"
# 「そんなヒトたちを説得してから出直して来いって？　何十、何百回と訴えてきたよ！　それがダメだったから、家出してきたの！」
line = "「そんなヒトたちを説得してから出直して来いって？　何十、何百回と訴えてきたよ！　それがダメだったから、家出してきたの！」"

[[dialogue]]
speaker = "トワ先生"
# 「……ごめん」
line = "「……ごめん」"

[[dialogue]]
speaker = "メイプル"
# 「……謝るくらいなら、あたしに星騎士の資格を頂戴」
line = "「……謝るくらいなら、あたしに星騎士の資格を頂戴」"

[[dialogue]]
speaker = "メイプル"
# 「……ちょっと熱くなっちゃったから、外で頭を冷やしてくる」
line = "「……ちょっと熱くなっちゃったから、外で頭を冷やしてくる」"

[[dialogue]]
speaker = "トワ先生"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "トワ先生"
# 「私、先生失格だね……」
line = "「私、先生失格だね……」"

[[dialogue]]
speaker = "unk"
# そんなことないと咄嗟に否定しても、それ以上の言葉が思いつかず。
line = "そんなことないと咄嗟に否定しても、それ以上の言葉が思いつかず。"

[[dialogue]]
speaker = "unk"
# ２人で黙り込んでしまうのだった――
line = "２人で黙り込んでしまうのだった――"
