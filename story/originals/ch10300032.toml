[[dialogue]]
speaker = "unk"
# 第２話,ナミエルと思い出の味,P
line = "第２話,ナミエルと思い出の味,P"

[[dialogue]]
speaker = "unk"
# クリスマスの二人三脚生活が終わってから、少し経ったある日のこと。
line = "クリスマスの二人三脚生活が終わってから、少し経ったある日のこと。"

[[dialogue]]
speaker = "unk"
# お泊り会でエルデリーゼと仲良くなったナミエルは、アムも含めて３人で昼食をすることになった。
line = "お泊り会でエルデリーゼと仲良くなったナミエルは、アムも含めて３人で昼食をすることになった。"

[[dialogue]]
speaker = "エルデリーゼ"
# 「ナミエル様、無事にクリスマスフォームから変身解除できるようになって、なによりですわ♪」
line = "「ナミエル様、無事にクリスマスフォームから変身解除できるようになって、なによりですわ♪」"

[[dialogue]]
speaker = "ナミエル"
# 「ええ、アム先輩とも無事に離れることができて、元の生活に戻れてよかったです」
line = "「ええ、アム先輩とも無事に離れることができて、元の生活に戻れてよかったです」"

[[dialogue]]
speaker = "アム"
# 「ちょっとぉ～！？　それだと、あたしと共同生活するのが嫌だったみたいじゃんかぁ～」
line = "「ちょっとぉ～！？　それだと、あたしと共同生活するのが嫌だったみたいじゃんかぁ～」"

[[dialogue]]
speaker = "ナミエル"
# 「冗談です。最初はずっと一緒にいるのが落ち着きませんでしたが、さすがにもう、慣れましたので」
line = "「冗談です。最初はずっと一緒にいるのが落ち着きませんでしたが、さすがにもう、慣れましたので」"

[[dialogue]]
speaker = "ナミエル"
# 「しばらくは１人で落ち着きたいですが……そのうちまた泊まらせてあげてもいいですよ」
line = "「しばらくは１人で落ち着きたいですが……そのうちまた泊まらせてあげてもいいですよ」"

[[dialogue]]
speaker = "アム"
# 「えっ、いいの？　絶対泊まりに行く！　来週くらいならいい？」
line = "「えっ、いいの？　絶対泊まりに行く！　来週くらいならいい？」"

[[dialogue]]
speaker = "ナミエル"
# 「訂正します。さすがに早いです。しばらく泊まりに来ないで下さい」
line = "「訂正します。さすがに早いです。しばらく泊まりに来ないで下さい」"

[[dialogue]]
speaker = "アム"
# 「ちょっとデレたと思ったら、速攻で急冷凍！？　あたし、温度差に風邪引きそうなんだけど！？」
line = "「ちょっとデレたと思ったら、速攻で急冷凍！？　あたし、温度差に風邪引きそうなんだけど！？」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「ふふっ♪　私もまた、ナミエル様とお泊り会がしたいですわ♪」
line = "「ふふっ♪　私もまた、ナミエル様とお泊り会がしたいですわ♪」"

[[dialogue]]
speaker = "ナミエル"
# 「ええ。来週にでもまた来て下さい。一緒に勉強会をしましょう♪」
line = "「ええ。来週にでもまた来て下さい。一緒に勉強会をしましょう♪」"

[[dialogue]]
speaker = "アム"
# 「冗談だよね！？　ナミエル、お泊り会するなら、あたしも混ぜてよ～！」
line = "「冗談だよね！？　ナミエル、お泊り会するなら、あたしも混ぜてよ～！」"

[[dialogue]]
speaker = "ナミエル"
# 「仕方ないですね。エルゼ先輩と一緒にくるなら、まあ……ギリギリ許可してあげなくもないですよ？　……ふふっ」
line = "「仕方ないですね。エルゼ先輩と一緒にくるなら、まあ……ギリギリ許可してあげなくもないですよ？　……ふふっ」"

[[dialogue]]
speaker = "unk"
# それから、料理を注文して、昼食を開始する３人。
line = "それから、料理を注文して、昼食を開始する３人。"

[[dialogue]]
speaker = "エルデリーゼ"
# 「ん～<emoji=heart04>　もぐもぐ♪　今日もカフェテリアのランチは美味しいですわ～♪」
line = "「ん～<emoji=heart04>　もぐもぐ♪　今日もカフェテリアのランチは美味しいですわ～♪」"

[[dialogue]]
speaker = "ナミエル"
# 「エルゼ先輩、お泊り会の時から思っていましたが、体格からは想像もできないくらい、沢山食べますよね……」
line = "「エルゼ先輩、お泊り会の時から思っていましたが、体格からは想像もできないくらい、沢山食べますよね……」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「ええ♪　私、食事は人一倍好きですの♪」
line = "「ええ♪　私、食事は人一倍好きですの♪」"

[[dialogue]]
speaker = "アム"
# 「人一倍どころじゃ済まないくらい、超大食いだけどね……」
line = "「人一倍どころじゃ済まないくらい、超大食いだけどね……」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「ナミエル様は、食べ物はどういったものがお好きですの？」
line = "「ナミエル様は、食べ物はどういったものがお好きですの？」"

[[dialogue]]
speaker = "ナミエル"
# 「私ですか？　私はＳＮＳをやっているので、投稿映えする可愛いスイーツを見つけるのが、趣味の１つですね」
line = "「私ですか？　私はＳＮＳをやっているので、投稿映えする可愛いスイーツを見つけるのが、趣味の１つですね」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「まあ♪　私もスイーツは大好きですわ！　やはりナミエル様とは気が合いますわね♪　今度一緒に是非、美味しいスイーツを食べに参りましょう♪」
line = "「まあ♪　私もスイーツは大好きですわ！　やはりナミエル様とは気が合いますわね♪　今度一緒に是非、美味しいスイーツを食べに参りましょう♪」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「スイーツ以外ですと、他に何かあったりしますの？」
line = "「スイーツ以外ですと、他に何かあったりしますの？」"

[[dialogue]]
speaker = "ナミエル"
# 「そうですね……今もちょうど食べていますが、オムライスは好きですね。昔、母によく作ってもらっていたので……」
line = "「そうですね……今もちょうど食べていますが、オムライスは好きですね。昔、母によく作ってもらっていたので……」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「お母様に……」
line = "「お母様に……」"

[[dialogue]]
speaker = "unk"
# この前のお泊り会で、エルデリーゼから部屋に飾っている両親の写真について聞かれた際、ナミエルは自身の両親が既に亡くなっていることについては、既に話していた。
line = "この前のお泊り会で、エルデリーゼから部屋に飾っている両親の写真について聞かれた際、ナミエルは自身の両親が既に亡くなっていることについては、既に話していた。"

[[dialogue]]
speaker = "エルデリーゼ"
# 「……ということは、ナミエル様にとって、オムライスは思い入れのある料理なんですのね」
line = "「……ということは、ナミエル様にとって、オムライスは思い入れのある料理なんですのね」"

[[dialogue]]
speaker = "ナミエル"
# 「はい。母の得意料理だって、言っていました。それで、私もその味を思い出しながら、今までに何度も作ってみようと挑戦をしているんですが……」
line = "「はい。母の得意料理だって、言っていました。それで、私もその味を思い出しながら、今までに何度も作ってみようと挑戦をしているんですが……」"

[[dialogue]]
speaker = "ナミエル"
# 「お恥ずかしいことに、私は料理が人一倍不得手なので、未だに母の作ってくれたオムライスを、全然再現することができなくて……」
line = "「お恥ずかしいことに、私は料理が人一倍不得手なので、未だに母の作ってくれたオムライスを、全然再現することができなくて……」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「そうなんですの……」
line = "「そうなんですの……」"

[[dialogue]]
speaker = "unk"
# エルデリーゼは少し考えるような顔をしてから、言う。
line = "エルデリーゼは少し考えるような顔をしてから、言う。"

[[dialogue]]
speaker = "エルデリーゼ"
# 「でしたら私、いいことを思いつきましたわ！」
line = "「でしたら私、いいことを思いつきましたわ！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「桜十路の伝手を使って――お母様のオムライスの味探しをしてみるのはどうしょう？」
line = "「桜十路の伝手を使って――お母様のオムライスの味探しをしてみるのはどうしょう？」"

[[dialogue]]
speaker = "ナミエル"
# 「え……？」
line = "「え……？」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「美味しいオムライスのお店を巡って、天才美食家と言われるサランお姉様の舌にも頼れば、きっとレシピが特定できますわ！」
line = "「美味しいオムライスのお店を巡って、天才美食家と言われるサランお姉様の舌にも頼れば、きっとレシピが特定できますわ！」"

[[dialogue]]
speaker = "ナミエル"
# 「オムライスのレシピを？　本当にそんなことが……？」
line = "「オムライスのレシピを？　本当にそんなことが……？」"

[[dialogue]]
speaker = "アム"
# 「エルゼ、めっちゃいいこと思いつくじゃん！　あたしもオムライスの味探し、できることがあれば協力するよ♪」
line = "「エルゼ、めっちゃいいこと思いつくじゃん！　あたしもオムライスの味探し、できることがあれば協力するよ♪」"

[[dialogue]]
speaker = "ナミエル"
# 「お２人共……ありがとうございます。私、本当にお母さんの味が見つけられる可能性があるなら……探すのに挑戦してみたいです」
line = "「お２人共……ありがとうございます。私、本当にお母さんの味が見つけられる可能性があるなら……探すのに挑戦してみたいです」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「ふふっ……では、今度一緒にお出かけしましょう♪　デザートとして、可愛くて美味しいスイーツがあるお店もピックアップして♪」
line = "「ふふっ……では、今度一緒にお出かけしましょう♪　デザートとして、可愛くて美味しいスイーツがあるお店もピックアップして♪」"

[[dialogue]]
speaker = "unk"
# そうして、その日以降、３人は定期的に、オムライスの味探しへと出かける仲になるのだった。
line = "そうして、その日以降、３人は定期的に、オムライスの味探しへと出かける仲になるのだった。"
