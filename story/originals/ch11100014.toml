[[dialogue]]
speaker = "unk"
# 第４話,プトラの手料理,P
line = "第４話,プトラの手料理,P"

[[dialogue]]
speaker = "unk"
# 『今日はみんなにあたしのお魚料理をごちそうするよ～♪』と、プトラが高らかに宣言した。
line = "『今日はみんなにあたしのお魚料理をごちそうするよ～♪』と、プトラが高らかに宣言した。"

[[dialogue]]
speaker = "プトラ"
# 「あたし、料理はけっこうやる方なんだけど、こっちの世界の料理に興味があったからいろいろ教えてもらったんだ～」
line = "「あたし、料理はけっこうやる方なんだけど、こっちの世界の料理に興味があったからいろいろ教えてもらったんだ～」"

[[dialogue]]
speaker = "プトラ"
# 「キリカさんとか蛍火にも褒めてもらっちゃった。じゃあ今作るから待っててね～」
line = "「キリカさんとか蛍火にも褒めてもらっちゃった。じゃあ今作るから待っててね～」"

[[dialogue]]
speaker = "プトラ"
# 「お待たせしました～。さあ召し上がれ～」
line = "「お待たせしました～。さあ召し上がれ～」"

[[dialogue]]
speaker = "アポロ"
# 「お～、待ちかねたぜ！　じゃさっそくいただきます。あむっ、もぐもぐ……」
line = "「お～、待ちかねたぜ！　じゃさっそくいただきます。あむっ、もぐもぐ……」"

[[dialogue]]
speaker = "プトラ"
# 「どうかな？」
line = "「どうかな？」"

[[dialogue]]
speaker = "アポロ"
# 「ん、美味いっ！」
line = "「ん、美味いっ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「こっちの天ぷらもいいわね！　サクサクしてて、中身はプリプリね♪」
line = "「こっちの天ぷらもいいわね！　サクサクしてて、中身はプリプリね♪」"

[[dialogue]]
speaker = "フィオナ"
# 「煮物の味付けも完璧です」
line = "「煮物の味付けも完璧です」"

[[dialogue]]
speaker = "プトラ"
# 「ありがとう♪　喜んでくれてよかったぁ～♪」
line = "「ありがとう♪　喜んでくれてよかったぁ～♪」"

[[dialogue]]
speaker = "プトラ"
# 「元の世界に戻ったら、特鉄隊のみんなにもご馳走してあげようっと♪」
line = "「元の世界に戻ったら、特鉄隊のみんなにもご馳走してあげようっと♪」"

[[dialogue]]
speaker = "unk"
# きっと喜んでもらえるよ
line = "きっと喜んでもらえるよ"

[[dialogue]]
speaker = "プトラ"
# 「うんっ！　えへへ～♪」
line = "「うんっ！　えへへ～♪」"

[[dialogue]]
speaker = "プトラ"
# 「よーし、場もあったまってきたことだし、とっておきのネタを披露するね～！」
line = "「よーし、場もあったまってきたことだし、とっておきのネタを披露するね～！」"

[[dialogue]]
speaker = "アポロ"
# 「おっ、何が始まるんだ？」
line = "「おっ、何が始まるんだ？」"

[[dialogue]]
speaker = "プトラ"
# 「実はあたし、まだみんなに見せていなかった隠れ特技を持ってるんだよ」
line = "「実はあたし、まだみんなに見せていなかった隠れ特技を持ってるんだよ」"

[[dialogue]]
speaker = "プトラ"
# 「お披露目できる絶好の機会をずーっと伺ってたんだけど、ちょうどいいからここで初披露しちゃうね♪」
line = "「お披露目できる絶好の機会をずーっと伺ってたんだけど、ちょうどいいからここで初披露しちゃうね♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「何が始まるのかしら。楽しみね！」
line = "「何が始まるのかしら。楽しみね！」"

[[dialogue]]
speaker = "プトラ"
# 「では、いきます……」
line = "「では、いきます……」"

[[dialogue]]
speaker = "プトラ"
# 「まずは定番！　大シケの日の海藻のまね～♪」
line = "「まずは定番！　大シケの日の海藻のまね～♪」"

[[dialogue]]
speaker = "みんな"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "プトラ"
# 「からの～、長男スライムの求愛ダンス～♪」
line = "「からの～、長男スライムの求愛ダンス～♪」"

[[dialogue]]
speaker = "みんな"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "プトラ"
# 「そして次男スライムの求愛ダンス～♪」
line = "「そして次男スライムの求愛ダンス～♪」"

[[dialogue]]
speaker = "プトラ"
# 「そしてそして～、三男スライムの求愛ダ～ンス♪」
line = "「そしてそして～、三男スライムの求愛ダ～ンス♪」"

[[dialogue]]
speaker = "みんな"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# （空気が……冷えた……）
line = "（空気が……冷えた……）"

[[dialogue]]
speaker = "アポロ"
# 「な、何ていうか……すごいな……」
line = "「な、何ていうか……すごいな……」"

[[dialogue]]
speaker = "フィオナ"
# 「ええ。スライムを見たことが無いのでよく分からないですけど、雰囲気は伝わりました……」
line = "「ええ。スライムを見たことが無いのでよく分からないですけど、雰囲気は伝わりました……」"

[[dialogue]]
speaker = "プトラ"
# 「あたしも見たことないよ～。だから雰囲気が伝わったのならオッケー！」
line = "「あたしも見たことないよ～。だから雰囲気が伝わったのならオッケー！」"

[[dialogue]]
speaker = "フィオナ"
# 「あ、あはは……そうですか……」
line = "「あ、あはは……そうですか……」"

[[dialogue]]
speaker = "プトラ"
# 「まだまだレパートリーはあるからね。どんどん行くよ～♪」
line = "「まだまだレパートリーはあるからね。どんどん行くよ～♪」"

[[dialogue]]
speaker = "フィオナ"
# 「ま、まだあるんですか？」
line = "「ま、まだあるんですか？」"

[[dialogue]]
speaker = "プトラ"
# 「いっぱいあるよ～。フレイマリンが誇る爆笑女王とはあたしのことさっ♪」
line = "「いっぱいあるよ～。フレイマリンが誇る爆笑女王とはあたしのことさっ♪」"

[[dialogue]]
speaker = "プトラ"
# 「このお笑いの腕を見込まれて、芸をやって欲しいってお願いされたことだってあるんだよ」
line = "「このお笑いの腕を見込まれて、芸をやって欲しいってお願いされたことだってあるんだよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええっ！？　すごいじゃない！」
line = "「ええっ！？　すごいじゃない！」"

[[dialogue]]
speaker = "プトラ"
# 「あたしのこと、笑顔と一緒に覚えててね！　あたしもみんなの笑顔、忘れないから！」
line = "「あたしのこと、笑顔と一緒に覚えててね！　あたしもみんなの笑顔、忘れないから！」"

[[dialogue]]
speaker = "unk"
# そしてプトラ主催のお食事会が開かれた少し後、別れの時はやってきた。
line = "そしてプトラ主催のお食事会が開かれた少し後、別れの時はやってきた。"

[[dialogue]]
speaker = "unk"
# このお祭り騒ぎを起こした黒ベア子が、ベア子という少女によって連れ戻され、アルテとプトラも元の世界へと帰っていったのだった。
line = "このお祭り騒ぎを起こした黒ベア子が、ベア子という少女によって連れ戻され、アルテとプトラも元の世界へと帰っていったのだった。"

[[dialogue]]
speaker = "アポロ"
# 「んー……」
line = "「んー……」"

[[dialogue]]
speaker = "フィオナ"
# 「ぼんやりしてどうしたんですか、姉さん」
line = "「ぼんやりしてどうしたんですか、姉さん」"

[[dialogue]]
speaker = "アポロ"
# 「いや、ちょっとな。プトラのやつ急に帰っちゃったから……」
line = "「いや、ちょっとな。プトラのやつ急に帰っちゃったから……」"

[[dialogue]]
speaker = "アポロ"
# 「まだまだ一緒に見たい流星ライダーシリーズもあったし、一緒に遊びたいこともたくさんあったのに……」
line = "「まだまだ一緒に見たい流星ライダーシリーズもあったし、一緒に遊びたいこともたくさんあったのに……」"

[[dialogue]]
speaker = "フィオナ"
# 「ふふ、寂しいんですね。そんな姉さんに、はい、どうぞ」
line = "「ふふ、寂しいんですね。そんな姉さんに、はい、どうぞ」"

[[dialogue]]
speaker = "アポロ"
# 「これは？」
line = "「これは？」"

[[dialogue]]
speaker = "フィオナ"
# 「プトラさんからの手紙です」
line = "「プトラさんからの手紙です」"

[[dialogue]]
speaker = "アポロ"
# 「……！！」
line = "「……！！」"

[[dialogue]]
speaker = "プトラ"
# 『フィオナさん、アポロさん。この手紙が読まれる時、あたしはこの世界にはいないでしょう。なーんてね♪』
line = "『フィオナさん、アポロさん。この手紙が読まれる時、あたしはこの世界にはいないでしょう。なーんてね♪』"

[[dialogue]]
speaker = "プトラ"
# 『２人には特にお世話になってるからね。いつ元の世界に帰ることになっても大丈夫なように、手紙を書いておいたよ』
line = "『２人には特にお世話になってるからね。いつ元の世界に帰ることになっても大丈夫なように、手紙を書いておいたよ』"

[[dialogue]]
speaker = "プトラ"
# 『短い間だったけど、みんなと過ごせて本当によかった』
line = "『短い間だったけど、みんなと過ごせて本当によかった』"

[[dialogue]]
speaker = "プトラ"
# 『毎日が楽しくて、いい人ばかりで、こんな素敵な世界が滅んじゃうなんて絶対ダメだと思う！　だから仲間と力を合わせて守ってください、流星ライダーレイルみたいに！』
line = "『毎日が楽しくて、いい人ばかりで、こんな素敵な世界が滅んじゃうなんて絶対ダメだと思う！　だから仲間と力を合わせて守ってください、流星ライダーレイルみたいに！』"

[[dialogue]]
speaker = "プトラ"
# 『あたしもあたしの世界を──イリスクラウドを、特鉄隊のみんなと一緒に守っていきます！』
line = "『あたしもあたしの世界を──イリスクラウドを、特鉄隊のみんなと一緒に守っていきます！』"

[[dialogue]]
speaker = "プトラ"
# 『ホントに、ホントにありがとう！　大好きです…………プトラ』
line = "『ホントに、ホントにありがとう！　大好きです…………プトラ』"

[[dialogue]]
speaker = "アポロ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "フィオナ"
# 「不思議な方でしたね。天真爛漫に見えて、いろんな事をちゃんとしっかり考えていて」
line = "「不思議な方でしたね。天真爛漫に見えて、いろんな事をちゃんとしっかり考えていて」"

[[dialogue]]
speaker = "アポロ"
# 「周りのこともちゃんと見ててな……優しくていいヤツだよ……アイツは……」
line = "「周りのこともちゃんと見ててな……優しくていいヤツだよ……アイツは……」"

[[dialogue]]
speaker = "フィオナ"
# 「姉さん。プトラさんが一番大事にしてることは何でしたか？」
line = "「姉さん。プトラさんが一番大事にしてることは何でしたか？」"

[[dialogue]]
speaker = "アポロ"
# 「……へへっ、ちゃんと分かってるよ。『笑顔でいることを忘れちゃいけない』だろ？」
line = "「……へへっ、ちゃんと分かってるよ。『笑顔でいることを忘れちゃいけない』だろ？」"

[[dialogue]]
speaker = "フィオナ"
# 「はい……」
line = "「はい……」"

[[dialogue]]
speaker = "unk"
# プトラが帰って以来、寂しそうにしていたアポロの表情に陽が差した。
line = "プトラが帰って以来、寂しそうにしていたアポロの表情に陽が差した。"

[[dialogue]]
speaker = "フィオナ"
# （ありがとう……プトラさん……）
line = "（ありがとう……プトラさん……）"

[[dialogue]]
speaker = "unk"
# そんな姉の姿を見て、フィオナは心の中で異世界の友人に感謝の言葉をつぶやいたのだった。
line = "そんな姉の姿を見て、フィオナは心の中で異世界の友人に感謝の言葉をつぶやいたのだった。"
