[[dialogue]]
speaker = "unk"
# 第４話,手料理フォーユー,P
line = "第４話,手料理フォーユー,P"

[[dialogue]]
speaker = "シフォン"
# 「とんとんとん……と。このくらいのサイズに切ればいいんですよね……？」
line = "「とんとんとん……と。このくらいのサイズに切ればいいんですよね……？」"

[[dialogue]]
speaker = "モナカ"
# 「うんうん、そのくらいかな。あんまり大きく切りすぎると、具材に味が染みづらくなっちゃうから」
line = "「うんうん、そのくらいかな。あんまり大きく切りすぎると、具材に味が染みづらくなっちゃうから」"

[[dialogue]]
speaker = "パルミエ"
# 「ご飯まーだー？　もうお腹ペッコペコよぉ～」
line = "「ご飯まーだー？　もうお腹ペッコペコよぉ～」"

[[dialogue]]
speaker = "シフォン"
# 「急かさないでください！　というかパルミエのために作ってるわけじゃありませんよっ」
line = "「急かさないでください！　というかパルミエのために作ってるわけじゃありませんよっ」"

[[dialogue]]
speaker = "パルミエ"
# 「試食係よ、試食係♪　可愛いシフォンが恋のために頑張ってるんだもの。少しでも応援してあげようと思って♪」
line = "「試食係よ、試食係♪　可愛いシフォンが恋のために頑張ってるんだもの。少しでも応援してあげようと思って♪」"

[[dialogue]]
speaker = "シフォン"
# 「べべべ、別に恋のために努力してるわけじゃないですっ！　学生の間に料理スキルくらい身につけておこうと思っただけで……！」
line = "「べべべ、別に恋のために努力してるわけじゃないですっ！　学生の間に料理スキルくらい身につけておこうと思っただけで……！」"

[[dialogue]]
speaker = "パルミエ"
# 「ん～……。出汁の塩味が強いわね。こんな不健康な料理、ダーリンに食べさせるつもり？　不合格よ、一から作り直しなさい」
line = "「ん～……。出汁の塩味が強いわね。こんな不健康な料理、ダーリンに食べさせるつもり？　不合格よ、一から作り直しなさい」"

[[dialogue]]
speaker = "シフォン"
# 「なんですかその姑ムーブ！？　むしろ心が折れるんですが！？」
line = "「なんですかその姑ムーブ！？　むしろ心が折れるんですが！？」"

[[dialogue]]
speaker = "パルミエ"
# 「あらあら。やっぱりダーリンのために作ってるんじゃな～い♪」
line = "「あらあら。やっぱりダーリンのために作ってるんじゃな～い♪」"

[[dialogue]]
speaker = "シフォン"
# 「ぐふっ……！？　い、今のはそういう意味ではなくて……！」
line = "「ぐふっ……！？　い、今のはそういう意味ではなくて……！」"

[[dialogue]]
speaker = "モナカ"
# 「えへへ、照れなくていいのに。モナカは素敵だと思うよ？　好きな人のために苦手なことを克服しようとするなんて」
line = "「えへへ、照れなくていいのに。モナカは素敵だと思うよ？　好きな人のために苦手なことを克服しようとするなんて」"

[[dialogue]]
speaker = "パルミエ"
# 「あの不器用で大雑把で口に入ればなんでもござれのシフォンがまさかの料理だものね～。どんな心境の変化があったのかしら？」
line = "「あの不器用で大雑把で口に入ればなんでもござれのシフォンがまさかの料理だものね～。どんな心境の変化があったのかしら？」"

[[dialogue]]
speaker = "シフォン"
# 「で、ですからなんでもないですってば……！　別にその、拾った雑誌のカップル特集を見て、彼氏に手料理をあ～んしてる彼女の姿に憧れたわけではありませんから……！」
line = "「で、ですからなんでもないですってば……！　別にその、拾った雑誌のカップル特集を見て、彼氏に手料理をあ～んしてる彼女の姿に憧れたわけではありませんから……！」"

[[dialogue]]
speaker = "モナカ"
# 「あはは……憧れたんだね」
line = "「あはは……憧れたんだね」"

[[dialogue]]
speaker = "パルミエ"
# 「相変わらずわかりやすい子ね～」
line = "「相変わらずわかりやすい子ね～」"

[[dialogue]]
speaker = "シフォン"
# 「なんで納得してるんですか！？　違うって言ってますのに！」
line = "「なんで納得してるんですか！？　違うって言ってますのに！」"

[[dialogue]]
speaker = "パルミエ"
# 「ほらほら私たちにツッコんでていいの～？　お鍋の調子を見る方が大事じゃなーい？」
line = "「ほらほら私たちにツッコんでていいの～？　お鍋の調子を見る方が大事じゃなーい？」"

[[dialogue]]
speaker = "シフォン"
# 「ハっ、そうでした……！　い、一応お水を足しておきましょう……。塩辛いらしいですし……」
line = "「ハっ、そうでした……！　い、一応お水を足しておきましょう……。塩辛いらしいですし……」"

[[dialogue]]
speaker = "モナカ"
# 「ふふ、にぃ様にとびっきり美味しい手料理を食べさせてあげようね？　モナカも精一杯協力するから」
line = "「ふふ、にぃ様にとびっきり美味しい手料理を食べさせてあげようね？　モナカも精一杯協力するから」"

[[dialogue]]
speaker = "シフォン"
# 「あ、ありがとうございます。まぁいつになるかはわかりませんけど……」
line = "「あ、ありがとうございます。まぁいつになるかはわかりませんけど……」"

[[dialogue]]
speaker = "パルミエ"
# 「すぐよ、すぐ♪　そろそろ来る頃じゃないかしら♪」
line = "「すぐよ、すぐ♪　そろそろ来る頃じゃないかしら♪」"

[[dialogue]]
speaker = "シフォン"
# 「……へ？　どういう意味です？」
line = "「……へ？　どういう意味です？」"

[[dialogue]]
speaker = "unk"
# あ、いたいた
line = "あ、いたいた"

[[dialogue]]
speaker = "シフォン"
# 「なっ……！？　どどど、どうして会長さんがここに！？」
line = "「なっ……！？　どどど、どうして会長さんがここに！？」"

[[dialogue]]
speaker = "パルミエ"
# 「私が呼んだのよ～。シフォンがダーリンのために手料理を作ってるから食べに来てあげてーって」
line = "「私が呼んだのよ～。シフォンがダーリンのために手料理を作ってるから食べに来てあげてーって」"

[[dialogue]]
speaker = "シフォン"
# 「聞いてないんですけど！？」
line = "「聞いてないんですけど！？」"

[[dialogue]]
speaker = "パルミエ"
# 「私からのサプライズプレゼントだもの～♪　ほーら、あーんでもなんでもしてきてあげたら？」
line = "「私からのサプライズプレゼントだもの～♪　ほーら、あーんでもなんでもしてきてあげたら？」"

[[dialogue]]
speaker = "シフォン"
# 「し、しませんよっ！　まだとても人に振る舞えるようなレベルじゃありませんし……！」
line = "「し、しませんよっ！　まだとても人に振る舞えるようなレベルじゃありませんし……！」"

[[dialogue]]
speaker = "パルミエ"
# 「んもう。大事なところで日和っちゃうのはシフォンの悪いくせよ？　ここ１ヶ月頑張ってきたじゃない。大丈夫、自信を持ちなさい？」
line = "「んもう。大事なところで日和っちゃうのはシフォンの悪いくせよ？　ここ１ヶ月頑張ってきたじゃない。大丈夫、自信を持ちなさい？」"

[[dialogue]]
speaker = "シフォン"
# 「パ、パルミエ……。あなた……」
line = "「パ、パルミエ……。あなた……」"

[[dialogue]]
speaker = "パルミエ"
# 「それにそろそろモナカの手料理が恋しいのよ～。さっさとやることやってもらって、幸せなおなか部の食卓を取り戻したいわ～」
line = "「それにそろそろモナカの手料理が恋しいのよ～。さっさとやることやってもらって、幸せなおなか部の食卓を取り戻したいわ～」"

[[dialogue]]
speaker = "シフォン"
# 「そっちが本音ですか！？　というか遠回しに私の料理をディスってますよね！？」
line = "「そっちが本音ですか！？　というか遠回しに私の料理をディスってますよね！？」"

[[dialogue]]
speaker = "モナカ"
# 「だ、大丈夫だよ、シフォンちゃん！　最初の頃より上達してるから！　お野菜の皮も剥けるようにもなったし、お塩とお砂糖の違いもわかるようになったし……！　それに──」
line = "「だ、大丈夫だよ、シフォンちゃん！　最初の頃より上達してるから！　お野菜の皮も剥けるようにもなったし、お塩とお砂糖の違いもわかるようになったし……！　それに──」"

[[dialogue]]
speaker = "シフォン"
# 「それ以上は許してください、モナカ！　そのエピソードトークはむしろ私への親愛度を下げちゃいます……！」
line = "「それ以上は許してください、モナカ！　そのエピソードトークはむしろ私への親愛度を下げちゃいます……！」"

[[dialogue]]
speaker = "シフォン"
# 「というか会長さんも会長さんですよっ。何をパルミエに言われて、ほいほいやってきてるんですかっ」
line = "「というか会長さんも会長さんですよっ。何をパルミエに言われて、ほいほいやってきてるんですかっ」"

[[dialogue]]
speaker = "シフォン"
# 「パルミエに弱みでも握られてるんですか？　罰ゲーム感覚で食べに来たんですか？　むしろそっちの方が気が楽ですが……！」
line = "「パルミエに弱みでも握られてるんですか？　罰ゲーム感覚で食べに来たんですか？　むしろそっちの方が気が楽ですが……！」"

[[dialogue]]
speaker = "unk"
# 俺のために努力してくれたって聞いて嬉しくて
line = "俺のために努力してくれたって聞いて嬉しくて"

[[dialogue]]
speaker = "シフォン"
# 「えっ……。そ、そんなこと言われたらすごく嬉し──……じゃなくて！　食べられるような出来じゃないですから……！」
line = "「えっ……。そ、そんなこと言われたらすごく嬉し──……じゃなくて！　食べられるような出来じゃないですから……！」"

[[dialogue]]
speaker = "シフォン"
# 「ですが、その……。どうしても、その……。私の手料理を食べてみたいというのなら、食べさせてあげなくもないですが……」
line = "「ですが、その……。どうしても、その……。私の手料理を食べてみたいというのなら、食べさせてあげなくもないですが……」"

[[dialogue]]
speaker = "unk"
# どうしても食べてみたいな
line = "どうしても食べてみたいな"

[[dialogue]]
speaker = "シフォン"
# 「え、えへへ……。そこまで言うなら仕方ないですね……。不味くても文句は言わないでくださいよ……？」
line = "「え、えへへ……。そこまで言うなら仕方ないですね……。不味くても文句は言わないでくださいよ……？」"

[[dialogue]]
speaker = "パルミエ"
# 「……本当にシフォンはチョロいわね。変な男に騙されないか不安になっちゃうわ」
line = "「……本当にシフォンはチョロいわね。変な男に騙されないか不安になっちゃうわ」"

[[dialogue]]
speaker = "モナカ"
# 「う、うん。相手がにぃ様で本当に良かったかも……」
line = "「う、うん。相手がにぃ様で本当に良かったかも……」"

[[dialogue]]
speaker = "シフォン"
# 「そこの２人うるさいですよ！　いいから、あっち行っててくださいっ！」
line = "「そこの２人うるさいですよ！　いいから、あっち行っててくださいっ！」"

[[dialogue]]
speaker = "シフォン"
# 「では、その……。口を開けていただけますか……？　あ～んしてあげますから……」
line = "「では、その……。口を開けていただけますか……？　あ～んしてあげますから……」"

[[dialogue]]
speaker = "シフォン"
# 「い、いいじゃないですか。恥ずかしがらないでください……！　私だって、その、顔から火が出ちゃいそうなほど恥ずかしいんです……！」
line = "「い、いいじゃないですか。恥ずかしがらないでください……！　私だって、その、顔から火が出ちゃいそうなほど恥ずかしいんです……！」"

[[dialogue]]
speaker = "シフォン"
# 「ほら、あ～ん……！　あ～んっ……！」
line = "「ほら、あ～ん……！　あ～んっ……！」"

[[dialogue]]
speaker = "シフォン"
# 「ど……どうですか？　美味しいですかね……？」
line = "「ど……どうですか？　美味しいですかね……？」"

[[dialogue]]
speaker = "unk"
# お……美味しいよ？
line = "お……美味しいよ？"

[[dialogue]]
speaker = "シフォン"
# 「そこはどもらず言い切ってくださいよぉ～！？」
line = "「そこはどもらず言い切ってくださいよぉ～！？」"
