[[dialogue]]
speaker = "unk"
# 第３話,神隠しと神殺し,B
line = "第３話,神隠しと神殺し,B"

[[dialogue]]
speaker = "セイファート"
# 「無事でいてくれ、マルキア──」
line = "「無事でいてくれ、マルキア──」"

[[dialogue]]
speaker = "unk"
# 彼女の身に何が起きたのか……私はあらゆる可能性を考えた。
line = "彼女の身に何が起きたのか……私はあらゆる可能性を考えた。"

[[dialogue]]
speaker = "unk"
# 愛する幼き<ruby=アニュラス>娘</ruby>を残して消えた、ということは、彼女の自発的な行動ではありえない。
line = "愛する幼き<ruby>娘<rt>アニュラス</rt></ruby>を残して消えた、ということは、彼女の自発的な行動ではありえない。"

[[dialogue]]
speaker = "unk"
# さらわれたか。事故にあったか。何らかの危険に巻き込まれた恐れは高かった。
line = "さらわれたか。事故にあったか。何らかの危険に巻き込まれた恐れは高かった。"

[[dialogue]]
speaker = "unk"
# 私は必死になって三界のすべてを駆けずり回ったが、全て無為に終わった。
line = "私は必死になって三界のすべてを駆けずり回ったが、全て無為に終わった。"

[[dialogue]]
speaker = "unk"
# 学生時代の仲間のいかなる星術を用いても、彼女の行方は知れなかった。
line = "学生時代の仲間のいかなる星術を用いても、彼女の行方は知れなかった。"

[[dialogue]]
speaker = "unk"
# 神隠し──あまりに不自然なその蒸発は、そう称されることもあった。
line = "神隠し──あまりに不自然なその蒸発は、そう称されることもあった。"

[[dialogue]]
speaker = "セイファート"
# 「……マルキア。どこだ。一体、どこへ行ってしまったのだ」
line = "「……マルキア。どこだ。一体、どこへ行ってしまったのだ」"

[[dialogue]]
speaker = "unk"
# 幾日、幾月、幾年と……長い時を経ても妻が帰ってくることはなかった。
line = "幾日、幾月、幾年と……長い時を経ても妻が帰ってくることはなかった。"

[[dialogue]]
speaker = "unk"
# もはや通常の手段では叶わぬ願い。
line = "もはや通常の手段では叶わぬ願い。"

[[dialogue]]
speaker = "unk"
# そう覚悟した末に、私が辿り着いたのは……
line = "そう覚悟した末に、私が辿り着いたのは……"

[[dialogue]]
speaker = "セイファート"
# 「フィーニスの、塔……」
line = "「フィーニスの、塔……」"

[[dialogue]]
speaker = "unk"
# 流星市国の神聖なるシンボル──<ruby=なんぴと>何人</ruby>も<ruby=おか>侵</ruby>せぬ女神の禁域だった。
line = "流星市国の神聖なるシンボル──<ruby>何人<rt>なんぴと</rt></ruby>も<ruby>侵<rt>おか</rt></ruby>せぬ女神の禁域だった。"

[[dialogue]]
speaker = "セイファート"
# （妻は神隠しに遭った。なら……その行方を知る者は、必然……）
line = "（妻は神隠しに遭った。なら……その行方を知る者は、必然……）"

[[dialogue]]
speaker = "unk"
# フィーニスの塔には女神と、その配下である守護天使たちが住まう。
line = "フィーニスの塔には女神と、その配下である守護天使たちが住まう。"

[[dialogue]]
speaker = "unk"
# たとえ神聖な禁域に踏み入る行為であっても、妻を失った私に退くという選択肢はなかった。
line = "たとえ神聖な禁域に踏み入る行為であっても、妻を失った私に退くという選択肢はなかった。"

[[dialogue]]
speaker = "セイファート"
# 「ここは……」
line = "「ここは……」"

[[dialogue]]
speaker = "unk"
# そこには未知の空間が広がっていた。
line = "そこには未知の空間が広がっていた。"

[[dialogue]]
speaker = "unk"
# アンティークな回廊、よどむ濃紫色の瘴気、徘徊するメカニカルな守護機兵……
line = "アンティークな回廊、よどむ濃紫色の瘴気、徘徊するメカニカルな守護機兵……"

[[dialogue]]
speaker = "？？？"
# 『お待ちなさい……人の子よ。この塔は今、深刻な瘴気に冒されています。命が惜しければ、それ以上立ち入らぬことです』
line = "『お待ちなさい……人の子よ。この塔は今、深刻な瘴気に冒されています。命が惜しければ、それ以上立ち入らぬことです』"

[[dialogue]]
speaker = "セイファート"
# 「構わぬ。もはやこの身に恐れなど存在しない──身勝手を貫かせてもらう」
line = "「構わぬ。もはやこの身に恐れなど存在しない──身勝手を貫かせてもらう」"

[[dialogue]]
speaker = "unk"
# 行く手を遮る謎の声も私は無視した。
line = "行く手を遮る謎の声も私は無視した。"

[[dialogue]]
speaker = "unk"
# 妻に会いたい。ただそれだけの願望に突き動かされて、私はフィーニスの塔を昇りつめた。
line = "妻に会いたい。ただそれだけの願望に突き動かされて、私はフィーニスの塔を昇りつめた。"

[[dialogue]]
speaker = "unk"
# そこで私は……いくつもの真実を知った。
line = "そこで私は……いくつもの真実を知った。"

[[dialogue]]
speaker = "unk"
# リクリエの本当の意義──繰り返す世界の再創生。
line = "リクリエの本当の意義──繰り返す世界の再創生。"

[[dialogue]]
speaker = "unk"
# 月と太陽の壁画の正体──救世の魔王と偽りの真実。
line = "月と太陽の壁画の正体──救世の魔王と偽りの真実。"

[[dialogue]]
speaker = "unk"
# かつて滅ぼされた異なる暦の世界──そして破滅を防いだ森羅暦。
line = "かつて滅ぼされた異なる暦の世界──そして破滅を防いだ森羅暦。"

[[dialogue]]
speaker = "unk"
# 私は執念でフィーニスの塔を昇り続け、やがて……その頂点へと至った。
line = "私は執念でフィーニスの塔を昇り続け、やがて……その頂点へと至った。"

[[dialogue]]
speaker = "unk"
# 『ようこそ。フィーニスの塔──その終点へ』
line = "『ようこそ。フィーニスの塔──その終点へ』"

[[dialogue]]
speaker = "unk"
# 『それにしても……驚きました。よもや本当に、人の身でここまで辿り着いてしまうとは』
line = "『それにしても……驚きました。よもや本当に、人の身でここまで辿り着いてしまうとは』"

[[dialogue]]
speaker = "セイファート"
# 「再三の忠告、痛み入る。だが……どうしても立ち止まるわけにはいかなかった」
line = "「再三の忠告、痛み入る。だが……どうしても立ち止まるわけにはいかなかった」"

[[dialogue]]
speaker = "セイファート"
# 「あなたの命に反してもだ。──女神テルル」
line = "「あなたの命に反してもだ。──女神テルル」"

[[dialogue]]
speaker = "unk"
# 『なるほど……私の正体にも思い至りましたか。やはり聡明なご様子』
line = "『なるほど……私の正体にも思い至りましたか。やはり聡明なご様子』"

[[dialogue]]
speaker = "unk"
# 彼女の声は塔の内部で何度も反響し続けていた。
line = "彼女の声は塔の内部で何度も反響し続けていた。"

[[dialogue]]
speaker = "unk"
# そして、この塔が女神の住まう地であるというなら、その答えも必然。
line = "そして、この塔が女神の住まう地であるというなら、その答えも必然。"

[[dialogue]]
speaker = "セイファート"
# 「私がここへ来た目的はひとつ。存在をかき消された妻──マルキアの行方を知るためだ」
line = "「私がここへ来た目的はひとつ。存在をかき消された妻──マルキアの行方を知るためだ」"

[[dialogue]]
speaker = "セイファート"
# 「神隠しの行く末。<ruby=あなた>女神</ruby>なら知っていよう」
line = "「神隠しの行く末。<ruby>女神<rt>あなた</rt></ruby>なら知っていよう」"

[[dialogue]]
speaker = "unk"
# 『……神隠し、ですか。生憎ながら……そのような現象に覚えはありません』
line = "『……神隠し、ですか。生憎ながら……そのような現象に覚えはありません』"

[[dialogue]]
speaker = "セイファート"
# 「……そうだろうな。神隠しなどというのは、あくまで古い云われにすぎない」
line = "「……そうだろうな。神隠しなどというのは、あくまで古い云われにすぎない」"

[[dialogue]]
speaker = "セイファート"
# 「だが──だとしてもあなたならわかるはずだ。マルキアは今、どこにいる？」
line = "「だが──だとしてもあなたならわかるはずだ。マルキアは今、どこにいる？」"

[[dialogue]]
speaker = "unk"
# 『残念ながら……それについても、こう答えるほかありません』
line = "『残念ながら……それについても、こう答えるほかありません』"

[[dialogue]]
speaker = "unk"
# 『どこにもいない──と』
line = "『どこにもいない──と』"

[[dialogue]]
speaker = "セイファート"
# 「……なんだと？　ならば、ヒトが一人、こつ然と消え失せたとでもいうのか？」
line = "「……なんだと？　ならば、ヒトが一人、こつ然と消え失せたとでもいうのか？」"

[[dialogue]]
speaker = "unk"
# 『……ええ』
line = "『……ええ』"

[[dialogue]]
speaker = "セイファート"
# 「なぜだ？　この世に、女神にもわからぬことがあるというのか？」
line = "「なぜだ？　この世に、女神にもわからぬことがあるというのか？」"

[[dialogue]]
speaker = "unk"
# 『…………』
line = "『…………』"

[[dialogue]]
speaker = "unk"
# 女神は沈黙した。
line = "女神は沈黙した。"

[[dialogue]]
speaker = "unk"
# それは肯定というよりも、どこかはぐらかされている気がした。
line = "それは肯定というよりも、どこかはぐらかされている気がした。"

[[dialogue]]
speaker = "unk"
# 私は憤りを抑えながら、真円に広がる雄大な空間の淵に立ち、外を覗いた。
line = "私は憤りを抑えながら、真円に広がる雄大な空間の淵に立ち、外を覗いた。"

[[dialogue]]
speaker = "セイファート"
# 「ここはフィーニスの塔の頂上──そのはずだな」
line = "「ここはフィーニスの塔の頂上──そのはずだな」"

[[dialogue]]
speaker = "unk"
# 『はい。それが……？』
line = "『はい。それが……？』"

[[dialogue]]
speaker = "セイファート"
# 「頂というからにはてっきり、ここからなら豆粒のような地上が見えるものだと思っていた」
line = "「頂というからにはてっきり、ここからなら豆粒のような地上が見えるものだと思っていた」"

[[dialogue]]
speaker = "セイファート"
# 「だが……なんだ？　この──移り変わる様々な景観は」
line = "「だが……なんだ？　この──移り変わる様々な景観は」"

[[dialogue]]
speaker = "unk"
# そこからはいくつもの光景が見通せた。
line = "そこからはいくつもの光景が見通せた。"

[[dialogue]]
speaker = "unk"
# さながら走馬灯のように切り替わっていく地上の景色の数々。
line = "さながら走馬灯のように切り替わっていく地上の景色の数々。"

[[dialogue]]
speaker = "unk"
# さらに言えば、私も訪れたことのない魔界や天界らしき様子まで──
line = "さらに言えば、私も訪れたことのない魔界や天界らしき様子まで──"

[[dialogue]]
speaker = "unk"
# ただ空間の淵に立つだけで、三界のあらゆる様子がシャボン玉のごとく浮かんできた。
line = "ただ空間の淵に立つだけで、三界のあらゆる様子がシャボン玉のごとく浮かんできた。"

[[dialogue]]
speaker = "unk"
# 『それは……この地が、そういうものだからです』
line = "『それは……この地が、そういうものだからです』"

[[dialogue]]
speaker = "unk"
# 『フィーニスの塔。その頂点。それは──分かたれし<ruby=すべ>総</ruby>ての世界線を望むことのできる、唯一の<ruby=しざ>視座</ruby>なのですから』
line = "『フィーニスの塔。その頂点。それは──分かたれし<ruby>総<rt>すべ</rt></ruby>ての世界線を望むことのできる、唯一の<ruby>視座<rt>しざ</rt></ruby>なのですから』"

[[dialogue]]
speaker = "セイファート"
# 「三界のどこでも……ということか」
line = "「三界のどこでも……ということか」"

[[dialogue]]
speaker = "unk"
# 私はそう納得しかけた──が、次いで驚くべき光景も目に飛び込んできた。
line = "私はそう納得しかけた──が、次いで驚くべき光景も目に飛び込んできた。"

[[dialogue]]
speaker = "セイファート"
# 「……！？　なんだ、この<ruby=たいはい>頽廃</ruby>した光景は──……？」
line = "「……！？　なんだ、この<ruby>頽廃<rt>たいはい</rt></ruby>した光景は──……？」"

[[dialogue]]
speaker = "unk"
# 『ああ……覗かれてしまったのですね』
line = "『ああ……覗かれてしまったのですね』"

[[dialogue]]
speaker = "セイファート"
# 「こんな破滅的な場所は見たことがない。魔界の一部か……？」
line = "「こんな破滅的な場所は見たことがない。魔界の一部か……？」"

[[dialogue]]
speaker = "unk"
# 『いいえ。そちらは魔界ではなく……人間界』
line = "『いいえ。そちらは魔界ではなく……人間界』"

[[dialogue]]
speaker = "unk"
# 『あなたもよく知る──流星市国の成れの果てです。もっとも、あなたの存在していた世界線とは異なる領域にありますが』
line = "『あなたもよく知る──流星市国の成れの果てです。もっとも、あなたの存在していた世界線とは異なる領域にありますが』"

[[dialogue]]
speaker = "セイファート"
# 「っ……！？　これが流星市国だと──？」
line = "「っ……！？　これが流星市国だと──？」"

[[dialogue]]
speaker = "unk"
# 私は驚愕を隠せなかった。しかし、女神の言葉に嘘偽りはないと思えた。
line = "私は驚愕を隠せなかった。しかし、女神の言葉に嘘偽りはないと思えた。"

[[dialogue]]
speaker = "セイファート"
# 「私の存在していた世界とは違う──別の人間界があるというのか……？」
line = "「私の存在していた世界とは違う──別の人間界があるというのか……？」"

[[dialogue]]
speaker = "セイファート"
# 「──待て。もしや、先に言っていた<b>総ての世界線</b>というのは──」
line = "「──待て。もしや、先に言っていた<b>総ての世界線</b>というのは──」"

[[dialogue]]
speaker = "unk"
# 『察しがよいですね。<ruby=ここ>頂上</ruby>は視座──分かたれし三つの世界線を観測可能な、唯一の地点なのです』
line = "『察しがよいですね。<ruby>頂上<rt>ここ</rt></ruby>は視座──分かたれし三つの世界線を観測可能な、唯一の地点なのです』"

[[dialogue]]
speaker = "セイファート"
# 「分かたれし三つの世界線……三界のことではなく？」
line = "「分かたれし三つの世界線……三界のことではなく？」"

[[dialogue]]
speaker = "unk"
# 『はい。領域的な区分ではなく、可能性的に共存している三種の宇宙』
line = "『はい。領域的な区分ではなく、可能性的に共存している三種の宇宙』"

[[dialogue]]
speaker = "unk"
# 『デネブ──アルタイル──ベガ──枝分かれしたそれぞれの可能性をそう呼び習わします』
line = "『デネブ──アルタイル──ベガ──枝分かれしたそれぞれの可能性をそう呼び習わします』"

[[dialogue]]
speaker = "unk"
# 『平行世界──などと呼び換えれば、座りもよいでしょうか』
line = "『平行世界──などと呼び換えれば、座りもよいでしょうか』"

[[dialogue]]
speaker = "セイファート"
# 「平行、世界……」
line = "「平行、世界……」"

[[dialogue]]
speaker = "unk"
# にわかには信じがたい話だったが、相手は女神。
line = "にわかには信じがたい話だったが、相手は女神。"

[[dialogue]]
speaker = "unk"
# これまでの層で得てきた真実と照らし合わせても、頭ごなしに否定はできなかった。
line = "これまでの層で得てきた真実と照らし合わせても、頭ごなしに否定はできなかった。"

[[dialogue]]
speaker = "セイファート"
# 「魔界のいずこかで──そんな言い伝えを聞いたことがある。その時は、とんだ迷信だと思っていた」
line = "「魔界のいずこかで──そんな言い伝えを聞いたことがある。その時は、とんだ迷信だと思っていた」"

[[dialogue]]
speaker = "unk"
# 『無理からぬことです』
line = "『無理からぬことです』"

[[dialogue]]
speaker = "unk"
# 三界とは別に、三つの異なる世界線が存在する。
line = "三界とは別に、三つの異なる世界線が存在する。"

[[dialogue]]
speaker = "unk"
# その理屈を真に受ければ──三種の魔界、三種の天界、三種の人間界という、計九つの場所をこの視座は見通せることになる。
line = "その理屈を真に受ければ──三種の魔界、三種の天界、三種の人間界という、計九つの場所をこの視座は見通せることになる。"

[[dialogue]]
speaker = "セイファート"
# 「確かに平行世界という理論は存在する。その場合、未来は無限に枝分かれしていくはずだが」
line = "「確かに平行世界という理論は存在する。その場合、未来は無限に枝分かれしていくはずだが」"

[[dialogue]]
speaker = "unk"
# 『私が管理するこの宇宙において、共存できる世界の総数は<b>三つに限られて</b>います』
line = "『私が管理するこの宇宙において、共存できる世界の総数は<b>三つに限られて</b>います』"

[[dialogue]]
speaker = "unk"
# 『より正確に言うなれば、無限に存在する平行世界を支える幹の数が、ですが……』
line = "『より正確に言うなれば、無限に存在する平行世界を支える幹の数が、ですが……』"

[[dialogue]]
speaker = "unk"
# 『ともあれ今重要なのは、この宇宙の命運を握る三つの世界線のお話です』
line = "『ともあれ今重要なのは、この宇宙の命運を握る三つの世界線のお話です』"

[[dialogue]]
speaker = "unk"
# 『デネブ・アルタイル・ベガ──全三種の世界線をそう呼びます』
line = "『デネブ・アルタイル・ベガ──全三種の世界線をそう呼びます』"

[[dialogue]]
speaker = "セイファート"
# 「……夏の大三角、か」
line = "「……夏の大三角、か」"

[[dialogue]]
speaker = "セイファート"
# 「なら……私のいた人間界はどれにあたる？」
line = "「なら……私のいた人間界はどれにあたる？」"

[[dialogue]]
speaker = "unk"
# 『アルタイル。同様に、あなたの知る魔界や天界も含めて、そのすべてで一つの宇宙を織りなしています』
line = "『アルタイル。同様に、あなたの知る魔界や天界も含めて、そのすべてで一つの宇宙を織りなしています』"

[[dialogue]]
speaker = "セイファート"
# 「ならば……デネブやベガといった世界にも、私と同じセイファートがいるということになるのか？」
line = "「ならば……デネブやベガといった世界にも、私と同じセイファートがいるということになるのか？」"

[[dialogue]]
speaker = "unk"
# 『ええ、その通りです』
line = "『ええ、その通りです』"

[[dialogue]]
speaker = "unk"
# 当然の帰結だった。世界が三股に分かれているなら、内部に包括される生命もまた平行して存在する。
line = "当然の帰結だった。世界が三股に分かれているなら、内部に包括される生命もまた平行して存在する。"

[[dialogue]]
speaker = "unk"
# だが──
line = "だが──"

[[dialogue]]
speaker = "セイファート"
# 「……あの世界でもか？」
line = "「……あの世界でもか？」"

[[dialogue]]
speaker = "unk"
# 『それは……不明です。他世界のあなたが無事である保証は、どこにもありません』
line = "『それは……不明です。他世界のあなたが無事である保証は、どこにもありません』"

[[dialogue]]
speaker = "unk"
# 私は再び例の頽廃した光景へ目をやった。
line = "私は再び例の頽廃した光景へ目をやった。"

[[dialogue]]
speaker = "unk"
# 女神が人間界、流星市国と称したその地は、もはや生命の息吹さえ感じぬほどに枯れ果てている。
line = "女神が人間界、流星市国と称したその地は、もはや生命の息吹さえ感じぬほどに枯れ果てている。"

[[dialogue]]
speaker = "セイファート"
# 「先の三種の世界線になぞらえて言うと──ここは？」
line = "「先の三種の世界線になぞらえて言うと──ここは？」"

[[dialogue]]
speaker = "unk"
# 『そこはベガの世界。悪しき覚醒を遂げた魔王が、滅亡させた地球の末路』
line = "『そこはベガの世界。悪しき覚醒を遂げた魔王が、滅亡させた地球の末路』"

[[dialogue]]
speaker = "セイファート"
# 「ベガ……魔王……」
line = "「ベガ……魔王……」"

[[dialogue]]
speaker = "unk"
# 私はその言葉を胸に刻んだ。
line = "私はその言葉を胸に刻んだ。"

[[dialogue]]
speaker = "セイファート"
# 「今現在……これに比べると、こちらの地球はまだ無事だ。なぜこれほど差が生じている？」
line = "「今現在……これに比べると、こちらの地球はまだ無事だ。なぜこれほど差が生じている？」"

[[dialogue]]
speaker = "unk"
# 『異なる三つの世界線にはわずかに時間のズレが生じます。それも宇宙規模で言えば、些細な誤差ですが』
line = "『異なる三つの世界線にはわずかに時間のズレが生じます。それも宇宙規模で言えば、些細な誤差ですが』"

[[dialogue]]
speaker = "セイファート"
# 「なら、いずれ<ruby=こちら>アルタイル</ruby>が<b>こうなる</b>こともありえる──と」
line = "「なら、いずれ<ruby>アルタイル<rt>こちら</rt></ruby>が<b>こうなる</b>こともありえる──と」"

[[dialogue]]
speaker = "unk"
# 『ええ。無論──未来に絶対はありませんが』
line = "『ええ。無論──未来に絶対はありませんが』"

[[dialogue]]
speaker = "unk"
# この世界──宇宙と呼ぶべきか──には常に、三種の<b>可能性</b>が存在する。
line = "この世界──宇宙と呼ぶべきか──には常に、三種の<b>可能性</b>が存在する。"

[[dialogue]]
speaker = "unk"
# そして、私の知る<ruby=アルタイル>現実</ruby>とは異なり、どこかで分岐を違えた末路がこの有り様なのだろう。
line = "そして、私の知る<ruby>現実<rt>アルタイル</rt></ruby>とは異なり、どこかで分岐を違えた末路がこの有り様なのだろう。"

[[dialogue]]
speaker = "unk"
# あまりの凄惨さに、私は<ruby=かぶり>頭</ruby>を振って光景から目を逸らした。
line = "あまりの凄惨さに、私は<ruby>頭<rt>かぶり</rt></ruby>を振って光景から目を逸らした。"

[[dialogue]]
speaker = "セイファート"
# 「平行世界というのは……どうにもならないのか？」
line = "「平行世界というのは……どうにもならないのか？」"

[[dialogue]]
speaker = "unk"
# 『はい。交わらぬ世界線同士は、交わらぬからこそ平行と称します』
line = "『はい。交わらぬ世界線同士は、交わらぬからこそ平行と称します』"

[[dialogue]]
speaker = "unk"
# 『よって本来──人の子が平行世界を覗くことさえ、ありえぬことなのです。これらは総て、世界の裏側とでも呼ぶべき事情』
line = "『よって本来──人の子が平行世界を覗くことさえ、ありえぬことなのです。これらは総て、世界の裏側とでも呼ぶべき事情』"

[[dialogue]]
speaker = "unk"
# 『ですがジェラルド・セイファート。あなたにはフィーニスの塔の“制覇者”として……この理を知る権利があります』
line = "『ですがジェラルド・セイファート。あなたにはフィーニスの塔の“制覇者”として……この理を知る権利があります』"

[[dialogue]]
speaker = "セイファート"
# 「制覇者……か。フ──光栄なことだ」
line = "「制覇者……か。フ──光栄なことだ」"

[[dialogue]]
speaker = "unk"
# これまでも私は、塔を昇るごとに新たな真実を得てきた。
line = "これまでも私は、塔を昇るごとに新たな真実を得てきた。"

[[dialogue]]
speaker = "unk"
# 頂上では女神から直々に世界の裏側を聞かされるなど、<ruby=マリウス>次期教皇</ruby>が飛んで喜びそうな話ではないか。
line = "頂上では女神から直々に世界の裏側を聞かされるなど、<ruby>次期教皇<rt>マリウス</rt></ruby>が飛んで喜びそうな話ではないか。"

[[dialogue]]
speaker = "セイファート"
# 「だが──ここまで来たことで、私は新たな疑問を抱いた」
line = "「だが──ここまで来たことで、私は新たな疑問を抱いた」"

[[dialogue]]
speaker = "unk"
# 『……それは？』
line = "『……それは？』"

[[dialogue]]
speaker = "セイファート"
# 「<b>あなたの姿が見えないこと</b>だ。フィーニスの塔は女神の住まう場所であると聞いたが」
line = "「<b>あなたの姿が見えないこと</b>だ。フィーニスの塔は女神の住まう場所であると聞いたが」"

[[dialogue]]
speaker = "unk"
# 私の問いに声は──女神は押し黙った。
line = "私の問いに声は──女神は押し黙った。"

[[dialogue]]
speaker = "unk"
# さらに言えば、今しがた見渡した平行世界のどれにも彼女らしき存在は見受けられなかった。
line = "さらに言えば、今しがた見渡した平行世界のどれにも彼女らしき存在は見受けられなかった。"

[[dialogue]]
speaker = "unk"
# 女神はこの頂点に座してなお、声だけの存在にある。
line = "女神はこの頂点に座してなお、声だけの存在にある。"

[[dialogue]]
speaker = "unk"
# なぜか？
line = "なぜか？"

[[dialogue]]
speaker = "セイファート"
# 「私が初めてこの塔へ立ち入ったとき──あなたは言った。塔の内部は今、深刻な瘴気に冒されていると」
line = "「私が初めてこの塔へ立ち入ったとき──あなたは言った。塔の内部は今、深刻な瘴気に冒されていると」"

[[dialogue]]
speaker = "unk"
# 『……ええ』
line = "『……ええ』"

[[dialogue]]
speaker = "セイファート"
# 「そして頂上まで上り詰めた今も、あなたの姿は見えないまま。これが何を意味しているのか」
line = "「そして頂上まで上り詰めた今も、あなたの姿は見えないまま。これが何を意味しているのか」"

[[dialogue]]
speaker = "unk"
# 私は続ける。女神は押し黙ったまま話を聞いていた。
line = "私は続ける。女神は押し黙ったまま話を聞いていた。"

[[dialogue]]
speaker = "セイファート"
# 「私はこの塔を巡る上で多くのことを知った」
line = "「私はこの塔を巡る上で多くのことを知った」"

[[dialogue]]
speaker = "セイファート"
# 「リクリエは世界のリセット機構──その真実を聞いて、私は当初、それは女神の意図によるものなのではないかと疑った」
line = "「リクリエは世界のリセット機構──その真実を聞いて、私は当初、それは女神の意図によるものなのではないかと疑った」"

[[dialogue]]
speaker = "セイファート"
# 「だが、違うようだ。この塔までもがリクリエの瘴気に蝕まれているのなら」
line = "「だが、違うようだ。この塔までもがリクリエの瘴気に蝕まれているのなら」"

[[dialogue]]
speaker = "unk"
# 破滅しきった──もはや手遅れとなったベガの世界を見て私は確信した。
line = "破滅しきった──もはや手遅れとなったベガの世界を見て私は確信した。"

[[dialogue]]
speaker = "セイファート"
# 「女神よ。あなたはもはや……姿かたちも保てないほどに、脆弱化しているのではあるまいか」
line = "「女神よ。あなたはもはや……姿かたちも保てないほどに、脆弱化しているのではあるまいか」"

[[dialogue]]
speaker = "unk"
# 『……あなたの眼は誤魔化せませんか』
line = "『……あなたの眼は誤魔化せませんか』"

[[dialogue]]
speaker = "unk"
# 己が弱っていることを女神は──女神の声は──認めた。
line = "己が弱っていることを女神は──女神の声は──認めた。"

[[dialogue]]
speaker = "unk"
# 『リクリエという現象は──宇宙という太極が定めた周期の終わり。その起動は阻止できず、私にできるのはうねりをコントロールすることのみ』
line = "『リクリエという現象は──宇宙という太極が定めた周期の終わり。その起動は阻止できず、私にできるのはうねりをコントロールすることのみ』"

[[dialogue]]
speaker = "unk"
# 『ですが、今回は……そのコントロールする権限さえ奪われてしまいました』
line = "『ですが、今回は……そのコントロールする権限さえ奪われてしまいました』"

[[dialogue]]
speaker = "セイファート"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "unk"
# 『私は三界の管理者として……この世界に存在しています。かの機構にとって、私はまず排除すべき障害だったのでしょう』
line = "『私は三界の管理者として……この世界に存在しています。かの機構にとって、私はまず排除すべき障害だったのでしょう』"

[[dialogue]]
speaker = "unk"
# リクリエは世界をまっさらにしたかった。
line = "リクリエは世界をまっさらにしたかった。"

[[dialogue]]
speaker = "unk"
# その上で、三界を統べている女神の存在が邪魔だった。だからまず女神を封じた。
line = "その上で、三界を統べている女神の存在が邪魔だった。だからまず女神を封じた。"

[[dialogue]]
speaker = "unk"
# それが、玄武暦とも朱雀暦とも異なる、現リクリエだけの暴走的特異性。
line = "それが、玄武暦とも朱雀暦とも異なる、現リクリエだけの暴走的特異性。"

[[dialogue]]
speaker = "unk"
# 『本来であれば……私はこの頂から、デネブ・アルタイル・ベガ──あらゆる世界の可能性を<b>活かす</b>必要がありました』
line = "『本来であれば……私はこの頂から、デネブ・アルタイル・ベガ──あらゆる世界の可能性を<b>活かす</b>必要がありました』"

[[dialogue]]
speaker = "unk"
# 『しかし今、霊力を奪われ、人の子らに星力を分け与えた身では……こうして念話を送るのが精々』
line = "『しかし今、霊力を奪われ、人の子らに星力を分け与えた身では……こうして念話を送るのが精々』"

[[dialogue]]
speaker = "unk"
# 『それどころか──平行世界の一角が崩れたことで、私という存在の絶対性はこのアルタイルにおいても揺らいでいます』
line = "『それどころか──平行世界の一角が崩れたことで、私という存在の絶対性はこのアルタイルにおいても揺らいでいます』"

[[dialogue]]
speaker = "unk"
# ベガの世界はもう手遅れ。
line = "ベガの世界はもう手遅れ。"

[[dialogue]]
speaker = "unk"
# いわば、女神はリクリエとの陣取り合戦において、すでに一世界分負けている──ということらしい。
line = "いわば、女神はリクリエとの陣取り合戦において、すでに一世界分負けている──ということらしい。"

[[dialogue]]
speaker = "セイファート"
# 「声だけを辛うじて届けられる。それほどまでに弱っている──と……」
line = "「声だけを辛うじて届けられる。それほどまでに弱っている──と……」"

[[dialogue]]
speaker = "unk"
# 『ええ。不甲斐ない限りです。守護天使にも、あなた方にも苦労をかけていることでしょう』
line = "『ええ。不甲斐ない限りです。守護天使にも、あなた方にも苦労をかけていることでしょう』"

[[dialogue]]
speaker = "セイファート"
# 「……なるほどな。ならば星騎士は──アルタイルにとっての防波堤だったわけか」
line = "「……なるほどな。ならば星騎士は──アルタイルにとっての防波堤だったわけか」"

[[dialogue]]
speaker = "unk"
# 『ええ。私にとって、人の子らの奮闘は感謝すべきものです』
line = "『ええ。私にとって、人の子らの奮闘は感謝すべきものです』"

[[dialogue]]
speaker = "unk"
# 女神はここからずっと、星騎士たちの戦いを見てきたようだ。
line = "女神はここからずっと、星騎士たちの戦いを見てきたようだ。"

[[dialogue]]
speaker = "unk"
# その上で……と彼女は告げる。
line = "その上で……と彼女は告げる。"

[[dialogue]]
speaker = "unk"
# 『制覇者ジェラルド・セイファート。あなたは──力を渇望して生きてきたはずです。人々を守る、流星の騎士として』
line = "『制覇者ジェラルド・セイファート。あなたは──力を渇望して生きてきたはずです。人々を守る、流星の騎士として』"

[[dialogue]]
speaker = "セイファート"
# 「……ああ。そうだな」
line = "「……ああ。そうだな」"

[[dialogue]]
speaker = "unk"
# 『なれば、授けましょう。あなたに……このアルタイルを救うための力を』
line = "『なれば、授けましょう。あなたに……このアルタイルを救うための力を』"

[[dialogue]]
speaker = "セイファート"
# 「！」
line = "「！」"

[[dialogue]]
speaker = "unk"
# 目の前に聖なる光の球体が浮かび、ゆらゆらと私の胸に吸い込まれていった。
line = "目の前に聖なる光の球体が浮かび、ゆらゆらと私の胸に吸い込まれていった。"

[[dialogue]]
speaker = "unk"
# 『私に残された最後の霊力──その半分をあなたに分け与えます』
line = "『私に残された最後の霊力──その半分をあなたに分け与えます』"

[[dialogue]]
speaker = "unk"
# 『この力は……平行する時空の<ruby=ことわり>理</ruby>を知る者にしか、その真価を引き出せません』
line = "『この力は……平行する時空の<ruby>理<rt>ことわり</rt></ruby>を知る者にしか、その真価を引き出せません』"

[[dialogue]]
speaker = "unk"
# 『もし、あなたほどの戦士がこれを扱えたなら……リクリエによる<ruby=わざわい>禍</ruby>も必ずや跳ね除けられるでしょう』
line = "『もし、あなたほどの戦士がこれを扱えたなら……リクリエによる<ruby>禍<rt>わざわい</rt></ruby>も必ずや跳ね除けられるでしょう』"

[[dialogue]]
speaker = "セイファート"
# 「よいのか。そんなことをすれば、あなた自身がさらに弱ってしまうのではないか」
line = "「よいのか。そんなことをすれば、あなた自身がさらに弱ってしまうのではないか」"

[[dialogue]]
speaker = "unk"
# 『よいのです。あなたがここまで昇ってきたこともまた運命。既に希薄化した私より、地上に生きる戦士のほうが大事でしょう』
line = "『よいのです。あなたがここまで昇ってきたこともまた運命。既に希薄化した私より、地上に生きる戦士のほうが大事でしょう』"

[[dialogue]]
speaker = "unk"
# 得体の知れない、けれど清らかなる力が体の底からみなぎってきた。
line = "得体の知れない、けれど清らかなる力が体の底からみなぎってきた。"

[[dialogue]]
speaker = "unk"
# 霊力──これまでに掴んだ真実からすれば、かつて失われた旧世界の法だ。
line = "霊力──これまでに掴んだ真実からすれば、かつて失われた旧世界の法だ。"

[[dialogue]]
speaker = "セイファート"
# 「平行世界という裏の<ruby=ことわり>理</ruby>に、旧世界の力……か。フィーニスの塔を昇りきったとはいえ、あまりに厚い待遇だな」
line = "「平行世界という裏の<ruby>理<rt>ことわり</rt></ruby>に、旧世界の力……か。フィーニスの塔を昇りきったとはいえ、あまりに厚い待遇だな」"

[[dialogue]]
speaker = "unk"
# 『あなたにはそれを受け取る権利があります。勇猛なる戦士ジェラルド──これまでも幾多の<ruby=わざわい>禍</ruby>を滅ぼしてきたあなたなら』
line = "『あなたにはそれを受け取る権利があります。勇猛なる戦士ジェラルド──これまでも幾多の<ruby>禍<rt>わざわい</rt></ruby>を滅ぼしてきたあなたなら』"

[[dialogue]]
speaker = "unk"
# 『──さあ、ジェラルド！　残されたアルタイルの世界を救うためにも……その力をもって、厄災の波を打ち払うのです』
line = "『──さあ、ジェラルド！　残されたアルタイルの世界を救うためにも……その力をもって、厄災の波を打ち払うのです』"

[[dialogue]]
speaker = "セイファート"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# 『……どうされましたか？　地上へは、そちらに空けたホールから──』
line = "『……どうされましたか？　地上へは、そちらに空けたホールから──』"

[[dialogue]]
speaker = "unk"
# 女神は頂きからの退出を促す──が、私は立ち止まった。
line = "女神は頂きからの退出を促す──が、私は立ち止まった。"

[[dialogue]]
speaker = "セイファート"
# 「妙だな」
line = "「妙だな」"

[[dialogue]]
speaker = "unk"
# 『妙……？』
line = "『妙……？』"

[[dialogue]]
speaker = "セイファート"
# 「ああ。実に妙だ。私を制覇者などと呼んで<ruby=ことほ>寿</ruby>ぎ、平行世界という裏の理まで告げたにもかかわらず、なぜ妻の行方だけがわからない？」
line = "「ああ。実に妙だ。私を制覇者などと呼んで<ruby>寿<rt>ことほ</rt></ruby>ぎ、平行世界という裏の理まで告げたにもかかわらず、なぜ妻の行方だけがわからない？」"

[[dialogue]]
speaker = "unk"
# 『……！』
line = "『……！』"

[[dialogue]]
speaker = "unk"
# 『……私も全知全能ではありません。今はリクリエにより、どの世界にも異常が生じている状態ですから』
line = "『……私も全知全能ではありません。今はリクリエにより、どの世界にも異常が生じている状態ですから』"

[[dialogue]]
speaker = "unk"
# 『あなたもそんな世界を救うために──流星の騎士となったはずです』
line = "『あなたもそんな世界を救うために──流星の騎士となったはずです』"

[[dialogue]]
speaker = "セイファート"
# 「ふ……ふふ」
line = "「ふ……ふふ」"

[[dialogue]]
speaker = "セイファート"
# 「私をあまり──買いかぶらないでいただこう。私は決して、英雄となるために<ruby=ここ>頂上</ruby>へ来たのではない」
line = "「私をあまり──買いかぶらないでいただこう。私は決して、英雄となるために<ruby>頂上<rt>ここ</rt></ruby>へ来たのではない」"

[[dialogue]]
speaker = "セイファート"
# 「民の、人間界の、平行世界の平和などより……失った妻に焦がれる気持ちのほうが大きい」
line = "「民の、人間界の、平行世界の平和などより……失った妻に焦がれる気持ちのほうが大きい」"

[[dialogue]]
speaker = "unk"
# 神隠し──それは確かに女神の仕業ではないのだろう。だが、彼女は何かを隠している。
line = "神隠し──それは確かに女神の仕業ではないのだろう。だが、彼女は何かを隠している。"

[[dialogue]]
speaker = "unk"
# 恐らくは私にとって……不都合な真実を！
line = "恐らくは私にとって……不都合な真実を！"

[[dialogue]]
speaker = "セイファート"
# 「既に破滅を迎えたベガ──私たちの立つアルタイル──なら他にはもうひとつ、まだ覗けていない世界があるはずだ」
line = "「既に破滅を迎えたベガ──私たちの立つアルタイル──なら他にはもうひとつ、まだ覗けていない世界があるはずだ」"

[[dialogue]]
speaker = "unk"
# ──デネブ。
line = "──デネブ。"

[[dialogue]]
speaker = "unk"
# ここが総てを見通す視座だというなら、覗けぬ可能性はないはずだ。
line = "ここが総てを見通す視座だというなら、覗けぬ可能性はないはずだ。"

[[dialogue]]
speaker = "unk"
# 『待ちなさい。それ以上の干渉は禁じます──ジェラルド』
line = "『待ちなさい。それ以上の干渉は禁じます──ジェラルド』"

[[dialogue]]
speaker = "unk"
# 『あなたにベガを見せたのはあくまでも理の理解のため。本来、平行する世界は決して交わらぬものなのです』
line = "『あなたにベガを見せたのはあくまでも理の理解のため。本来、平行する世界は決して交わらぬものなのです』"

[[dialogue]]
speaker = "セイファート"
# 「平行世界には決して干渉できないのだろう？　ただ覗くだけだ。問題はない」
line = "「平行世界には決して干渉できないのだろう？　ただ覗くだけだ。問題はない」"

[[dialogue]]
speaker = "unk"
# 『……無為なことです。そこでのあなたは、違う妻を<ruby=めと>娶</ruby>っているかもしれませんよ』
line = "『……無為なことです。そこでのあなたは、違う妻を<ruby>娶<rt>めと</rt></ruby>っているかもしれませんよ』"

[[dialogue]]
speaker = "セイファート"
# 「構わぬ。私は妻を探しに来たのだ──あらゆる世界の可能性が広がっているのなら、その総てを見通さねばならない」
line = "「構わぬ。私は妻を探しに来たのだ──あらゆる世界の可能性が広がっているのなら、その総てを見通さねばならない」"

[[dialogue]]
speaker = "セイファート"
# 「どこだ──ここか──こちらか！」
line = "「どこだ──ここか──こちらか！」"

[[dialogue]]
speaker = "unk"
# 『っ……やめなさい！　それ以上は──人の子の踏み込んでよい領域ではありません！』
line = "『っ……やめなさい！　それ以上は──人の子の踏み込んでよい領域ではありません！』"

[[dialogue]]
speaker = "unk"
# 私は再び塔の淵へ立った。
line = "私は再び塔の淵へ立った。"

[[dialogue]]
speaker = "unk"
# すでに女神の力、その半分を受け取った私にとって、彼女の制止を振り切ることは容易かった。まさに神をも恐れぬ所業だろう。
line = "すでに女神の力、その半分を受け取った私にとって、彼女の制止を振り切ることは容易かった。まさに神をも恐れぬ所業だろう。"

[[dialogue]]
speaker = "unk"
# そうだ。私は確かめなくてはならない。
line = "そうだ。私は確かめなくてはならない。"

[[dialogue]]
speaker = "unk"
# この世界に果たして──<b>救う価値があるのかどうか</b>。
line = "この世界に果たして──<b>救う価値があるのかどうか</b>。"

[[dialogue]]
speaker = "セイファート"
# （これがデネブの世界……どうやら、<ruby=こちら>アルタイル</ruby>と変わらずまだ無事のようだが……）
line = "（これがデネブの世界……どうやら、<ruby>アルタイル<rt>こちら</rt></ruby>と変わらずまだ無事のようだが……）"

[[dialogue]]
speaker = "unk"
# すでに滅亡していたベガと違って──デネブの流星市国は幾分か落ち着いていた。
line = "すでに滅亡していたベガと違って──デネブの流星市国は幾分か落ち着いていた。"

[[dialogue]]
speaker = "セイファート"
# （それもそのはずか。いくら平行世界とはいえ根は同じ……大きく運命が隔たっているほうがおかしいのだ）
line = "（それもそのはずか。いくら平行世界とはいえ根は同じ……大きく運命が隔たっているほうがおかしいのだ）"

[[dialogue]]
speaker = "unk"
# 変わらぬ風景に安堵したのもつかの間。その雲行きも次第に怪しくなっていく。
line = "変わらぬ風景に安堵したのもつかの間。その雲行きも次第に怪しくなっていく。"

[[dialogue]]
speaker = "unk"
# こちらの世界のリクリエ余波は私の知るそれよりも数段激しく、星騎士も追いつかないほどの厄災に見舞われていた。
line = "こちらの世界のリクリエ余波は私の知るそれよりも数段激しく、星騎士も追いつかないほどの厄災に見舞われていた。"

[[dialogue]]
speaker = "unk"
# やがて……見つめていたデネブ世界では十数年の時が経過していた。
line = "やがて……見つめていたデネブ世界では十数年の時が経過していた。"

[[dialogue]]
speaker = "unk"
# 様相は、ますます退廃の色を濃くしていく。
line = "様相は、ますます退廃の色を濃くしていく。"

[[dialogue]]
speaker = "セイファート"
# （やはり世界は滅ぶ運命なのか──？　それより、こちらの世界の私は何をしているのだ……！）
line = "（やはり世界は滅ぶ運命なのか──？　それより、こちらの世界の私は何をしているのだ……！）"

[[dialogue]]
speaker = "unk"
# やきもきしながら平行世界の行く末を観察していると、人々が口々に囁いているのが聞こえた。
line = "やきもきしながら平行世界の行く末を観察していると、人々が口々に囁いているのが聞こえた。"

[[dialogue]]
speaker = "unk"
# 「使徒がきた」
line = "「使徒がきた」"

[[dialogue]]
speaker = "unk"
# 「仮面の女だ」
line = "「仮面の女だ」"

[[dialogue]]
speaker = "unk"
# 「とにかく逃げろ。殺される」
line = "「とにかく逃げろ。殺される」"

[[dialogue]]
speaker = "unk"
# 人々が恐れおののき、逃げ惑う。
line = "人々が恐れおののき、逃げ惑う。"

[[dialogue]]
speaker = "unk"
# アステラか。モンスターか。どんなに強大な敵が現れたのかと、私はデネブ世界の行方を見守った。
line = "アステラか。モンスターか。どんなに強大な敵が現れたのかと、私はデネブ世界の行方を見守った。"

[[dialogue]]
speaker = "unk"
# だが。
line = "だが。"

[[dialogue]]
speaker = "unk"
# 私がそこで見たのは……あまりにも衝撃的な光景だった。
line = "私がそこで見たのは……あまりにも衝撃的な光景だった。"

[[dialogue]]
speaker = "unk"
# 謎の仮面を被った女が──街を襲っている。
line = "謎の仮面を被った女が──街を襲っている。"

[[dialogue]]
speaker = "unk"
# モンスターを従え、<ruby=せんぷ>戦斧</ruby>を振るい、リクリエの到来を叫んで人々を恐怖に陥れている。
line = "モンスターを従え、<ruby>戦斧<rt>せんぷ</rt></ruby>を振るい、リクリエの到来を叫んで人々を恐怖に陥れている。"

[[dialogue]]
speaker = "セイファート"
# 「マル……キア？」
line = "「マル……キア？」"

[[dialogue]]
speaker = "unk"
# その姿を見間違えようはずもなかった。
line = "その姿を見間違えようはずもなかった。"

[[dialogue]]
speaker = "unk"
# あれは紛れもなく──私の妻であったマルキアだ！
line = "あれは紛れもなく──私の妻であったマルキアだ！"

[[dialogue]]
speaker = "unk"
# 『ああ……視てしまったのですね』
line = "『ああ……視てしまったのですね』"

[[dialogue]]
speaker = "セイファート"
# 「な……なんだ……どういう、ことだ……これは……」
line = "「な……なんだ……どういう、ことだ……これは……」"

[[dialogue]]
speaker = "unk"
# 『本当なら……あなたに告げたくはありませんでした。この残酷な真実を』
line = "『本当なら……あなたに告げたくはありませんでした。この残酷な真実を』"

[[dialogue]]
speaker = "unk"
# 『平行世界は決して交わらぬ平行線。しかし……その大原則さえ、リクリエによってかき混ぜられているのです』
line = "『平行世界は決して交わらぬ平行線。しかし……その大原則さえ、リクリエによってかき混ぜられているのです』"

[[dialogue]]
speaker = "unk"
# 『デネブの人間がベガに──ベガの魔獣がアルタイルに──そんな、本来ありえぬ現象が、巻き起こっています』
line = "『デネブの人間がベガに──ベガの魔獣がアルタイルに──そんな、本来ありえぬ現象が、巻き起こっています』"

[[dialogue]]
speaker = "セイファート"
# 「マルキア──私の妻も、それに巻き込まれたと……？」
line = "「マルキア──私の妻も、それに巻き込まれたと……？」"

[[dialogue]]
speaker = "unk"
# マルキアは消えたのではなかった。
line = "マルキアは消えたのではなかった。"

[[dialogue]]
speaker = "unk"
# ただ、平行にあるはずの別世界へ転移してしまった。摂理の再構築どころではない──異世界への強引な転移。それが神隠しの正体だ。
line = "ただ、平行にあるはずの別世界へ転移してしまった。摂理の再構築どころではない──異世界への強引な転移。それが神隠しの正体だ。"

[[dialogue]]
speaker = "unk"
# 『それだけではありません……とりわけヒトの異動については、さらに奇怪な思惑がみられるのです』
line = "『それだけではありません……とりわけヒトの異動については、さらに奇怪な思惑がみられるのです』"

[[dialogue]]
speaker = "セイファート"
# 「それは──」
line = "「それは──」"

[[dialogue]]
speaker = "unk"
# 『……<ruby=さら>拐</ruby>われてしまうのです』
line = "『……<ruby>拐<rt>さら</rt></ruby>われてしまうのです』"

[[dialogue]]
speaker = "セイファート"
# 「拐われ──る……？」
line = "「拐われ──る……？」"

[[dialogue]]
speaker = "unk"
# 『はい。平行世界へ転移させられた者は──謎の仮面によって、存在そのものが乗っ取られてしまうのです』
line = "『はい。平行世界へ転移させられた者は──謎の仮面によって、存在そのものが乗っ取られてしまうのです』"

[[dialogue]]
speaker = "unk"
# 『──<b>リクリエの使徒</b>として』
line = "『──<b>リクリエの使徒</b>として』"

[[dialogue]]
speaker = "セイファート"
# 「リクリエの──使徒……なんなのだ、それは……！」
line = "「リクリエの──使徒……なんなのだ、それは……！」"

[[dialogue]]
speaker = "unk"
# 私は何度もデネブのマルキアを見た。
line = "私は何度もデネブのマルキアを見た。"

[[dialogue]]
speaker = "unk"
# 変わり果てた妻の姿。<ruby=そそ>楚々</ruby>として美しかった彼女が、まるで厄災の<ruby=ごんげ>権化</ruby>かのようではないか。
line = "変わり果てた妻の姿。<ruby>楚々<rt>そそ</rt></ruby>として美しかった彼女が、まるで厄災の<ruby>権化<rt>ごんげ</rt></ruby>かのようではないか。"

[[dialogue]]
speaker = "unk"
# 『細かいことは判明しておりませんが……あの仮面に乗っ取られた人物は、リクリエの到来を謳い、モンスターを従えるようになります』
line = "『細かいことは判明しておりませんが……あの仮面に乗っ取られた人物は、リクリエの到来を謳い、モンスターを従えるようになります』"

[[dialogue]]
speaker = "セイファート"
# 「ならば私も──私もあの世界へ連れて行ってくれ！　デネブとやら……この身ならいくらでも捧げる！」
line = "「ならば私も──私もあの世界へ連れて行ってくれ！　デネブとやら……この身ならいくらでも捧げる！」"

[[dialogue]]
speaker = "セイファート"
# 「私は妻を探し求めてここまで来た。ここから、彼女を救い出す方法は──」
line = "「私は妻を探し求めてここまで来た。ここから、彼女を救い出す方法は──」"

[[dialogue]]
speaker = "unk"
# 無言が訪れた。女神テルルの姿は実際には見えないが──首を振った──ような間があった。
line = "無言が訪れた。女神テルルの姿は実際には見えないが──首を振った──ような間があった。"

[[dialogue]]
speaker = "unk"
# 『残念ながら……不可能です。たとえ私が本来の力を取り戻したとて、アルタイルのあなたを動かすことはできません』
line = "『残念ながら……不可能です。たとえ私が本来の力を取り戻したとて、アルタイルのあなたを動かすことはできません』"

[[dialogue]]
speaker = "unk"
# 『平行世界は……交わらぬ可能性の並列構造。あなたがキングであれ──クイーンであれ──別の盤上へ移動することは、叶いません』
line = "『平行世界は……交わらぬ可能性の並列構造。あなたがキングであれ──クイーンであれ──別の盤上へ移動することは、叶いません』"

[[dialogue]]
speaker = "unk"
# 『これは宇宙の定めた大原則なのです。たとえ三界を司る<ruby=わたし>女神</ruby>であっても、覆すことは不可能です』
line = "『これは宇宙の定めた大原則なのです。たとえ三界を司る<ruby>女神<rt>わたし</rt></ruby>であっても、覆すことは不可能です』"

[[dialogue]]
speaker = "セイファート"
# 「どうにも──ならない、と……？」
line = "「どうにも──ならない、と……？」"

[[dialogue]]
speaker = "unk"
# 絶望する私の目の前で、仮面を被ったマルキアが<ruby=デネブ>異世界</ruby>の<ruby=あんねい>安寧</ruby>を蹂躙していく。
line = "絶望する私の目の前で、仮面を被ったマルキアが<ruby>異世界<rt>デネブ</rt></ruby>の<ruby>安寧<rt>あんねい</rt></ruby>を蹂躙していく。"

[[dialogue]]
speaker = "unk"
# 戦姫──そう謳われた実力はさらに研ぎ澄まされ、闇のオーラをまとった戦斧を振るう。
line = "戦姫──そう謳われた実力はさらに研ぎ澄まされ、闇のオーラをまとった戦斧を振るう。"

[[dialogue]]
speaker = "セイファート"
# （やめろ……その体は、おまえのものではない……！）
line = "（やめろ……その体は、おまえのものではない……！）"

[[dialogue]]
speaker = "unk"
# なんだ。なんなのだあれは。あれが本当に私の愛した妻の姿なのか。
line = "なんだ。なんなのだあれは。あれが本当に私の愛した妻の姿なのか。"

[[dialogue]]
speaker = "unk"
# やめろ──私のマルキアを返してくれ！
line = "やめろ──私のマルキアを返してくれ！"

[[dialogue]]
speaker = "unk"
# しかし、私がいくら喚こうとも<ruby=デネブ>異世界</ruby>へ手を伸ばすことは敵わなかった。
line = "しかし、私がいくら喚こうとも<ruby>異世界<rt>デネブ</rt></ruby>へ手を伸ばすことは敵わなかった。"

[[dialogue]]
speaker = "unk"
# やがて仮面の戦姫は街ひとつふたつをゆうに消し飛ばし、殺戮の限りを尽くしてから星空へと消える。
line = "やがて仮面の戦姫は街ひとつふたつをゆうに消し飛ばし、殺戮の限りを尽くしてから星空へと消える。"

[[dialogue]]
speaker = "セイファート"
# 「……くくっ。はははははっ！」
line = "「……くくっ。はははははっ！」"

[[dialogue]]
speaker = "unk"
# あまりの滑稽さに笑いがこぼれた。
line = "あまりの滑稽さに笑いがこぼれた。"

[[dialogue]]
speaker = "unk"
# なんたる末路。なんたる未来！
line = "なんたる末路。なんたる未来！"

[[dialogue]]
speaker = "unk"
# 私はこれまでリクリエを、世の終わりを果たさせまいと抗ってきた。<ruby=しんさん>辛酸</ruby>を<ruby=な>嘗</ruby>めつつも五里霧中を切り開いてきた。
line = "私はこれまでリクリエを、世の終わりを果たさせまいと抗ってきた。<ruby>辛酸<rt>しんさん</rt></ruby>を<ruby>嘗<rt>な</rt></ruby>めつつも五里霧中を切り開いてきた。"

[[dialogue]]
speaker = "unk"
# しかし、そんな霧の向こうに見えた景色がこれとは──なんとも大した仕打ちじゃないか。
line = "しかし、そんな霧の向こうに見えた景色がこれとは──なんとも大した仕打ちじゃないか。"

[[dialogue]]
speaker = "unk"
# 今まで必死に<ruby=アルタイル>現実</ruby>を守ろうとしていたのが途端に馬鹿らしく思えた。
line = "今まで必死に<ruby>現実<rt>アルタイル</rt></ruby>を守ろうとしていたのが途端に馬鹿らしく思えた。"

[[dialogue]]
speaker = "unk"
# 何より大切だった最愛の人は、女神すら手の届かないところにたやすく消えてしまった。
line = "何より大切だった最愛の人は、女神すら手の届かないところにたやすく消えてしまった。"

[[dialogue]]
speaker = "セイファート"
# 「私の妻は──そうか……リクリエの使徒と化してしまったのか。ハハ、なるほどなるほど」
line = "「私の妻は──そうか……リクリエの使徒と化してしまったのか。ハハ、なるほどなるほど」"

[[dialogue]]
speaker = "セイファート"
# 「ならば……つまり、そういうことだな。私が<ruby=アルタイル>この世界</ruby>に生きている限り、彼女との再会は果たされない」
line = "「ならば……つまり、そういうことだな。私が<ruby>この世界<rt>アルタイル</rt></ruby>に生きている限り、彼女との再会は果たされない」"

[[dialogue]]
speaker = "unk"
# 『……はい』
line = "『……はい』"

[[dialogue]]
speaker = "unk"
# 女神は嘘をつかない。<ruby=すべ>総</ruby>ては真実なのだろう。
line = "女神は嘘をつかない。<ruby>総<rt>すべ</rt></ruby>ては真実なのだろう。"

[[dialogue]]
speaker = "unk"
# 彼女をもってしても抗えないほどに、リクリエという厄災は強大なのだ。
line = "彼女をもってしても抗えないほどに、リクリエという厄災は強大なのだ。"

[[dialogue]]
speaker = "unk"
# 世界のリセット──ただそれだけを求めて駆動し続ける無限の歯車。それはもはや、意思ある存在が立ち向かえる相手ではないのかもしれない。
line = "世界のリセット──ただそれだけを求めて駆動し続ける無限の歯車。それはもはや、意思ある存在が立ち向かえる相手ではないのかもしれない。"

[[dialogue]]
speaker = "unk"
# 『これから先……同様の事象が起きる可能性は少なくありません。デネブからアルタイルへの逆流という形さえありえるでしょう』
line = "『これから先……同様の事象が起きる可能性は少なくありません。デネブからアルタイルへの逆流という形さえありえるでしょう』"

[[dialogue]]
speaker = "unk"
# 『ですが、私は今──ベガからの侵蝕を食い止めるのに力のほとんどを費やしてしまっています』
line = "『ですが、私は今──ベガからの侵蝕を食い止めるのに力のほとんどを費やしてしまっています』"

[[dialogue]]
speaker = "セイファート"
# 「……ゆえに……アルタイルには……私が必要と、いうわけか」
line = "「……ゆえに……アルタイルには……私が必要と、いうわけか」"

[[dialogue]]
speaker = "unk"
# 『はい。リクリエに抗えるとすれば……勇猛なるジェラルド、あなたしかいません』
line = "『はい。リクリエに抗えるとすれば……勇猛なるジェラルド、あなたしかいません』"

[[dialogue]]
speaker = "unk"
# 私はすべてを理解した。
line = "私はすべてを理解した。"

[[dialogue]]
speaker = "unk"
# この宇宙の裏側も、リクリエという厄災の真実も、そして何より焦がれていた妻の行方も。
line = "この宇宙の裏側も、リクリエという厄災の真実も、そして何より焦がれていた妻の行方も。"

[[dialogue]]
speaker = "セイファート"
# 「……わかった。なれば、こうだ」
line = "「……わかった。なれば、こうだ」"

[[dialogue]]
speaker = "セイファート"
# 「デネブ──アルタイル──ベガ──それら全ての世界線を束ねることができたならば、私は妻に会える」
line = "「デネブ──アルタイル──ベガ──それら全ての世界線を束ねることができたならば、私は妻に会える」"

[[dialogue]]
speaker = "unk"
# 『……！？　お待ちなさい、何を考えているのです──』
line = "『……！？　お待ちなさい、何を考えているのです──』"

[[dialogue]]
speaker = "セイファート"
# 「簡単なことだ──女神テルル。交わらぬはずの世界だろうとなんだろうと、<b>まとめて再創生</b>してしまえばいい」
line = "「簡単なことだ──女神テルル。交わらぬはずの世界だろうとなんだろうと、<b>まとめて再創生</b>してしまえばいい」"

[[dialogue]]
speaker = "セイファート"
# 「<b>よりよき新世界</b>を望むのだよ。あいにく、今の世界には救う価値を感じぬのでな」
line = "「<b>よりよき新世界</b>を望むのだよ。あいにく、今の世界には救う価値を感じぬのでな」"

[[dialogue]]
speaker = "unk"
# 『私も、守護天使も、今ある世界を守るべく全霊を尽くしています。流星の騎士──あなたも平和を願ってここまで来たはずです』
line = "『私も、守護天使も、今ある世界を守るべく全霊を尽くしています。流星の騎士──あなたも平和を願ってここまで来たはずです』"

[[dialogue]]
speaker = "セイファート"
# 「買いかぶるなと言ったはずだ。今の私にとって、重要なのは妻の行方のみ」
line = "「買いかぶるなと言ったはずだ。今の私にとって、重要なのは妻の行方のみ」"

[[dialogue]]
speaker = "unk"
# 『……！？　やめ──何をしようと──しているのですっ……ジェラルド、セイファート──！』
line = "『……！？　やめ──何をしようと──しているのですっ……ジェラルド、セイファート──！』"

[[dialogue]]
speaker = "セイファート"
# 「あなたに残った霊力の半分──確かにいただいた。だが、足りぬ。到底足りぬぞこんなものでは」
line = "「あなたに残った霊力の半分──確かにいただいた。だが、足りぬ。到底足りぬぞこんなものでは」"

[[dialogue]]
speaker = "セイファート"
# 「女神テルルよ──<b>貴様に残ったもう片割れの力</b>もよこすがいい！」
line = "「女神テルルよ──<b>貴様に残ったもう片割れの力</b>もよこすがいい！」"

[[dialogue]]
speaker = "unk"
# 『くっ──あっ……！　よしなさ──あぁぁぁぁぁっっっ…………！！！』
line = "『くっ──あっ……！　よしなさ──あぁぁぁぁぁっっっ…………！！！』"

[[dialogue]]
speaker = "unk"
# 神をも恐れぬ私は、女神テルルに残された最後の力を<ruby=さんだつ>簒奪</ruby>した。
line = "神をも恐れぬ私は、女神テルルに残された最後の力を<ruby>簒奪<rt>さんだつ</rt></ruby>した。"

[[dialogue]]
speaker = "unk"
# 霊妙なる力の根源──なけなしの一滴まで搾り取ったが最後、女神の声が塔に響くことはなかった。
line = "霊妙なる力の根源──なけなしの一滴まで搾り取ったが最後、女神の声が塔に響くことはなかった。"

[[dialogue]]
speaker = "セイファート"
# （もはや後戻りはできない。今の私は、神をも<ruby=しい>弑</ruby>した反逆者だ）
line = "（もはや後戻りはできない。今の私は、神をも<ruby>弑<rt>しい</rt></ruby>した反逆者だ）"

[[dialogue]]
speaker = "unk"
# 確かにこの世界の命運はまだ定まっていない。
line = "確かにこの世界の命運はまだ定まっていない。"

[[dialogue]]
speaker = "unk"
# ベガとは違って、こちらではリクリエの侵攻を防ぐこともありうるのかもしれない。
line = "ベガとは違って、こちらではリクリエの侵攻を防ぐこともありうるのかもしれない。"

[[dialogue]]
speaker = "unk"
# だが、そんな未来は私には不要だった。
line = "だが、そんな未来は私には不要だった。"

[[dialogue]]
speaker = "unk"
# 愛すべき妻が永劫に戻ってこないのなら──こんな世界にしがみつく必要が、どこにあろうか？
line = "愛すべき妻が永劫に戻ってこないのなら──こんな世界にしがみつく必要が、どこにあろうか？"

[[dialogue]]
speaker = "セイファート"
# （ああ……そうだ。救いの糸は最初から垂らされていた。よりよき世界への刷新──なんと甘美なことか！）
line = "（ああ……そうだ。救いの糸は最初から垂らされていた。よりよき世界への刷新──なんと甘美なことか！）"
