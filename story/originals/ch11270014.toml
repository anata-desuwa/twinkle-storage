[[dialogue]]
speaker = "unk"
# 第４話,好きと嫌いを見つけていこう,P
line = "第４話,好きと嫌いを見つけていこう,P"

[[dialogue]]
speaker = "unk"
# とある日の休日──俺はレティシアを自宅に招待していた。
line = "とある日の休日──俺はレティシアを自宅に招待していた。"

[[dialogue]]
speaker = "レティシア"
# 「まさか魔王の自宅に呼ばれるだなんてね。どういう風の吹き回し？」
line = "「まさか魔王の自宅に呼ばれるだなんてね。どういう風の吹き回し？」"

[[dialogue]]
speaker = "unk"
# もっと仲良くなりたいと思って
line = "もっと仲良くなりたいと思って"

[[dialogue]]
speaker = "レティシア"
# 「何度も言っているけれど、あなたってやっぱり変わってるのね」
line = "「何度も言っているけれど、あなたってやっぱり変わってるのね」"

[[dialogue]]
speaker = "レティシア"
# 「私みたいな女といてもつまらないでしょう？　暇をつぶすにしても、相手は選ぶべきだわ」
line = "「私みたいな女といてもつまらないでしょう？　暇をつぶすにしても、相手は選ぶべきだわ」"

[[dialogue]]
speaker = "レティシア"
# 「ベアトやグレイス、チナが相手の方が退屈しないと思うけれど」
line = "「ベアトやグレイス、チナが相手の方が退屈しないと思うけれど」"

[[dialogue]]
speaker = "unk"
# レティシアと暇をつぶしたい
line = "レティシアと暇をつぶしたい"

[[dialogue]]
speaker = "レティシア"
# 「……そう。そこまで言うなら、もう何も言わないわ」
line = "「……そう。そこまで言うなら、もう何も言わないわ」"

[[dialogue]]
speaker = "unk"
# アルタイルで過ごしてみて、どうだ？
line = "アルタイルで過ごしてみて、どうだ？"

[[dialogue]]
speaker = "レティシア"
# 「漠然とした問いかけね……でも、そうね──」
line = "「漠然とした問いかけね……でも、そうね──」"

[[dialogue]]
speaker = "レティシア"
# 「以前の私と、今の私は違うと思う……折に触れて自問自答することが増えたの」
line = "「以前の私と、今の私は違うと思う……折に触れて自問自答することが増えたの」"

[[dialogue]]
speaker = "レティシア"
# 「ルヴィの『命令』に頼って、縋って生きてきた私だけど……今は自分の意思、というか……心？　みたいなものを探ろうとしてる最中ね」
line = "「ルヴィの『命令』に頼って、縋って生きてきた私だけど……今は自分の意思、というか……心？　みたいなものを探ろうとしてる最中ね」"

[[dialogue]]
speaker = "レティシア"
# 「見えるようで、見えない感覚がもどかしい。前進できているのかもよくわからないの」
line = "「見えるようで、見えない感覚がもどかしい。前進できているのかもよくわからないの」"

[[dialogue]]
speaker = "unk"
# だったら声に出して分類してみたら？
line = "だったら声に出して分類してみたら？"

[[dialogue]]
speaker = "レティシア"
# 「『好き』か『嫌い』かを、仕分けする……そんなことして、意味があるのかしら？」
line = "「『好き』か『嫌い』かを、仕分けする……そんなことして、意味があるのかしら？」"

[[dialogue]]
speaker = "レティシア"
# 「いいわ。じゃあ、質問してみてくれる？」
line = "「いいわ。じゃあ、質問してみてくれる？」"

[[dialogue]]
speaker = "unk"
# 勉強は好きと嫌い、どっち？
line = "勉強は好きと嫌い、どっち？"

[[dialogue]]
speaker = "unk"
# 極星のみんなと過ごすのは？
line = "極星のみんなと過ごすのは？"

[[dialogue]]
speaker = "レティシア"
# 「極星のみんなと過ごすのは──もちろん『好き』よ。勉強は──そうね……『嫌い』、かしら？」
line = "「極星のみんなと過ごすのは──もちろん『好き』よ。勉強は──そうね……『嫌い』、かしら？」"

[[dialogue]]
speaker = "unk"
# 意外な『好き』や『嫌い』が見つかるかも
line = "意外な『好き』や『嫌い』が見つかるかも"

[[dialogue]]
speaker = "unk"
# こうやって分類していったら……
line = "こうやって分類していったら……"

[[dialogue]]
speaker = "レティシア"
# 「……なるほどね。確かに勉強について『嫌い』という感覚を持ったことはなかったかも」
line = "「……なるほどね。確かに勉強について『嫌い』という感覚を持ったことはなかったかも」"

[[dialogue]]
speaker = "レティシア"
# 「『できない』という事実は認めていたけれど、それより以前の自分の感情は自覚していなかった……」
line = "「『できない』という事実は認めていたけれど、それより以前の自分の感情は自覚していなかった……」"

[[dialogue]]
speaker = "レティシア"
# 「──ふふ。私、本当にヒトとして見ると半人前ね。よちよち歩きもいいところだわ」
line = "「──ふふ。私、本当にヒトとして見ると半人前ね。よちよち歩きもいいところだわ」"

[[dialogue]]
speaker = "レティシア"
# 「探すのを手伝ってくれる？　私の好きなものと、嫌いなものを……」
line = "「探すのを手伝ってくれる？　私の好きなものと、嫌いなものを……」"

[[dialogue]]
speaker = "unk"
# その後、レティシアに様々なものを問いかけて『好き』と『嫌い』を分類していくことになった。
line = "その後、レティシアに様々なものを問いかけて『好き』と『嫌い』を分類していくことになった。"

[[dialogue]]
speaker = "unk"
# 好きなものは──戦闘訓練や、あまいお菓子や、ハンバーグにオムライス（意外だ）。
line = "好きなものは──戦闘訓練や、あまいお菓子や、ハンバーグにオムライス（意外だ）。"

[[dialogue]]
speaker = "unk"
# 嫌いなものは──勉強に読書、コーヒー。そして、１人の時間（こっちも意外だ）。
line = "嫌いなものは──勉強に読書、コーヒー。そして、１人の時間（こっちも意外だ）。"

[[dialogue]]
speaker = "unk"
# レティシアとそんな会話を続けながら、ちょうどお昼時ということもあって、俺は彼女に昼食を作ることにした。
line = "レティシアとそんな会話を続けながら、ちょうどお昼時ということもあって、俺は彼女に昼食を作ることにした。"

[[dialogue]]
speaker = "レティシア"
# 「……あなた、料理ができるのね。ふうん、アルバイトで飲食店の経験があるの」
line = "「……あなた、料理ができるのね。ふうん、アルバイトで飲食店の経験があるの」"

[[dialogue]]
speaker = "レティシア"
# 「ハンバーグに、シンプルな野菜炒めの付け合わせ……」
line = "「ハンバーグに、シンプルな野菜炒めの付け合わせ……」"

[[dialogue]]
speaker = "unk"
# どう？　ピーマンは好き？
line = "どう？　ピーマンは好き？"

[[dialogue]]
speaker = "レティシア"
# 「…………驚いた。いつもグレイスのぶんを食べてあげてたのに、知らなかった」
line = "「…………驚いた。いつもグレイスのぶんを食べてあげてたのに、知らなかった」"

[[dialogue]]
speaker = "レティシア"
# 「私、<ruby=こいつ>ピーマン</ruby>のこと、『嫌い』だわ」
line = "「私、<ruby>ピーマン<rt>こいつ</rt></ruby>のこと、『嫌い』だわ」"

[[dialogue]]
speaker = "unk"
# 前に嫌そうな顔をしてたから
line = "前に嫌そうな顔をしてたから"

[[dialogue]]
speaker = "unk"
# そうだと思った
line = "そうだと思った"

[[dialogue]]
speaker = "レティシア"
# 「……そう、よく見ているのね？」
line = "「……そう、よく見ているのね？」"

[[dialogue]]
speaker = "レティシア"
# 「……わざと嫌いな食べ物をどっさり入れるだなんて、ひどくない？」
line = "「……わざと嫌いな食べ物をどっさり入れるだなんて、ひどくない？」"

[[dialogue]]
speaker = "unk"
# 食べてあげるよ。こっちの皿にどうぞ
line = "食べてあげるよ。こっちの皿にどうぞ"

[[dialogue]]
speaker = "レティシア"
# 「……ええ、お願い。ふうん……これが、グレイスの気持ち……嫌いなものを食べずにすむと、ホッとするのね」
line = "「……ええ、お願い。ふうん……これが、グレイスの気持ち……嫌いなものを食べずにすむと、ホッとするのね」"

[[dialogue]]
speaker = "レティシア"
# 「この時間までずっと分類してたけれど……もしかして私、かなり子供っぽいのかしら」
line = "「この時間までずっと分類してたけれど……もしかして私、かなり子供っぽいのかしら」"

[[dialogue]]
speaker = "レティシア"
# 「甘いものが『好き』で、味のハッキリしたハンバーグとかオムライスとかが『好き』で……」
line = "「甘いものが『好き』で、味のハッキリしたハンバーグとかオムライスとかが『好き』で……」"

[[dialogue]]
speaker = "レティシア"
# 「コーヒーとかピーマンみたいな、苦いものが『嫌い』。読書や勉強も『嫌い』……」
line = "「コーヒーとかピーマンみたいな、苦いものが『嫌い』。読書や勉強も『嫌い』……」"

[[dialogue]]
speaker = "レティシア"
# 「…………何だか、少し情けなくなってきたかもしれないわ」
line = "「…………何だか、少し情けなくなってきたかもしれないわ」"

[[dialogue]]
speaker = "unk"
# 今の方が、以前よりも魅力的だ
line = "今の方が、以前よりも魅力的だ"

[[dialogue]]
speaker = "unk"
# 等身大の自分を知ることが大事
line = "等身大の自分を知ることが大事"

[[dialogue]]
speaker = "レティシア"
# 「そんなものなの？　じゃあ、逆に聞いてもいい？」
line = "「そんなものなの？　じゃあ、逆に聞いてもいい？」"

[[dialogue]]
speaker = "レティシア"
# 「あなたって、私のこと……『好き』なの？」
line = "「あなたって、私のこと……『好き』なの？」"

[[dialogue]]
speaker = "unk"
# ぶっ──！？
line = "ぶっ──！？"

[[dialogue]]
speaker = "レティシア"
# 「どうしてそんなに驚くの？　当然の疑問じゃない。学園には他に、可愛い子や楽しい子がたくさんいるのに」
line = "「どうしてそんなに驚くの？　当然の疑問じゃない。学園には他に、可愛い子や楽しい子がたくさんいるのに」"

[[dialogue]]
speaker = "レティシア"
# 「私にばかり時間を使うのだもの。それで、お返事は？」
line = "「私にばかり時間を使うのだもの。それで、お返事は？」"

[[dialogue]]
speaker = "unk"
# ……好きだよ
line = "……好きだよ"

[[dialogue]]
speaker = "レティシア"
# 「…………そう。変わり者も、ここに極まれり、ね？」
line = "「…………そう。変わり者も、ここに極まれり、ね？」"

[[dialogue]]
speaker = "レティシア"
# 「……私？　魔王のことを、どう思うのか？」
line = "「……私？　魔王のことを、どう思うのか？」"

[[dialogue]]
speaker = "レティシア"
# 「そうね──」
line = "「そうね──」"

[[dialogue]]
speaker = "レティシア"
# 「…………『好き』よ、あなたのこと」
line = "「…………『好き』よ、あなたのこと」"

[[dialogue]]
speaker = "unk"
# しっかりと考えたレティシアからその一言が聞けて、俺の心は浮ついた。
line = "しっかりと考えたレティシアからその一言が聞けて、俺の心は浮ついた。"

[[dialogue]]
speaker = "レティシア"
# 「……極星のみんなの次くらいにはね？　だから──５番目くらいの『好き』かしら？」
line = "「……極星のみんなの次くらいにはね？　だから──５番目くらいの『好き』かしら？」"

[[dialogue]]
speaker = "unk"
# レティシアらしい独特の返事に、俺はぷっと吹き出してしまって……
line = "レティシアらしい独特の返事に、俺はぷっと吹き出してしまって……"

[[dialogue]]
speaker = "unk"
# 「ピーマンには勝てたようで何よりだよ」と返答をするのだった──
line = "「ピーマンには勝てたようで何よりだよ」と返答をするのだった──"
