[[dialogue]]
speaker = "unk"
# 第２話,お母様接近遭遇,P
line = "第２話,お母様接近遭遇,P"

[[dialogue]]
speaker = "unk"
# 今日はセナリィと恋愛パートナー契約を結んでからの初デート。
line = "今日はセナリィと恋愛パートナー契約を結んでからの初デート。"

[[dialogue]]
speaker = "セナリィ"
# 「うふふ、デート、デート♪　会長様とデート♪」
line = "「うふふ、デート、デート♪　会長様とデート♪」"

[[dialogue]]
speaker = "unk"
# ウッキウキなセナリィと手を繋いで観光をしていると──
line = "ウッキウキなセナリィと手を繋いで観光をしていると──"

[[dialogue]]
speaker = "unk"
# よりによって、デート中には絶対に出会いたくない人物を見かけてしまった。
line = "よりによって、デート中には絶対に出会いたくない人物を見かけてしまった。"

[[dialogue]]
speaker = "unk"
# セナリィ、ちょっとこっちに隠れよう！
line = "セナリィ、ちょっとこっちに隠れよう！"

[[dialogue]]
speaker = "セナリィ"
# 「きゃっ、か、会長様？　誰かいましたの？」
line = "「きゃっ、か、会長様？　誰かいましたの？」"

[[dialogue]]
speaker = "リノ"
# 「あら？　あらあらあら？　クロトじゃない！　こんなとこで会うなんて奇遇ねぇ！」
line = "「あら？　あらあらあら？　クロトじゃない！　こんなとこで会うなんて奇遇ねぇ！」"

[[dialogue]]
speaker = "unk"
# 気づかれた……
line = "気づかれた……"

[[dialogue]]
speaker = "リノ"
# 「今、ちょうど研究会の帰りなのよ。思ったより早く終わったからお買い物してたんだけど……面白いところで会っちゃったわねー♪」
line = "「今、ちょうど研究会の帰りなのよ。思ったより早く終わったからお買い物してたんだけど……面白いところで会っちゃったわねー♪」"

[[dialogue]]
speaker = "セナリィ"
# 「会長様？　こちらの綺麗な女性は？　お若いのに人妻のような風格……会長様は年上の女性にまで粉をかけてますの？」
line = "「会長様？　こちらの綺麗な女性は？　お若いのに人妻のような風格……会長様は年上の女性にまで粉をかけてますの？」"

[[dialogue]]
speaker = "unk"
# そうじゃなくってー！
line = "そうじゃなくってー！"

[[dialogue]]
speaker = "リノ"
# 「そっちの子……もしかして、クロトの彼女？」
line = "「そっちの子……もしかして、クロトの彼女？」"

[[dialogue]]
speaker = "セナリィ"
# 「ええ、会長様の彼女ですわ。私たちはラブラブデート中ですので、お邪魔虫に用はございません」
line = "「ええ、会長様の彼女ですわ。私たちはラブラブデート中ですので、お邪魔虫に用はございません」"

[[dialogue]]
speaker = "リノ"
# 「あら……？　あっ！　どこかで見た顔だと思ったら、あなた、もしかして、あのバンデット・セナリィね！」
line = "「あら……？　あっ！　どこかで見た顔だと思ったら、あなた、もしかして、あのバンデット・セナリィね！」"

[[dialogue]]
speaker = "セナリィ"
# 「ふうん……私をご存じとは光栄ですわね。でも、そうと知っていながら、<ruby=バンデット>盗賊</ruby>である私から彼を強奪しようなんて、いい度胸──」
line = "「ふうん……私をご存じとは光栄ですわね。でも、そうと知っていながら、<ruby>盗賊<rt>バンデット</rt></ruby>である私から彼を強奪しようなんて、いい度胸──」"

[[dialogue]]
speaker = "リノ"
# 「やっぱりー！？　珍しい能力の持ち主だから、前々から目をつけてたの！　こんなところで会えるなんて感激だわ！　すぐに気づけなくて、ごめんなさいねー！」
line = "「やっぱりー！？　珍しい能力の持ち主だから、前々から目をつけてたの！　こんなところで会えるなんて感激だわ！　すぐに気づけなくて、ごめんなさいねー！」"

[[dialogue]]
speaker = "セナリィ"
# 「は、はぁ……あなた、何者ですの……？」
line = "「は、はぁ……あなた、何者ですの……？」"

[[dialogue]]
speaker = "リノ"
# 「自己紹介が遅れちゃったわね。いつもクロトがお世話になってます。クロトの母のリノです」
line = "「自己紹介が遅れちゃったわね。いつもクロトがお世話になってます。クロトの母のリノです」"

[[dialogue]]
speaker = "セナリィ"
# 「母って──かっ、会長様の、お、お母様っ！？」
line = "「母って──かっ、会長様の、お、お母様っ！？」"

[[dialogue]]
speaker = "セナリィ"
# 「これはこれは、とんだご無礼を！　失礼いたしました！　突然で、何と言えばいいやら……えーと、は、はじめまして！　会長様を私にください！」
line = "「これはこれは、とんだご無礼を！　失礼いたしました！　突然で、何と言えばいいやら……えーと、は、はじめまして！　会長様を私にください！」"

[[dialogue]]
speaker = "unk"
# 何言い出してんの！？
line = "何言い出してんの！？"

[[dialogue]]
speaker = "unk"
# テンパったセナリィを他所に、俺はセナリィと付き合っていることを母さんに説明した。
line = "テンパったセナリィを他所に、俺はセナリィと付き合っていることを母さんに説明した。"

[[dialogue]]
speaker = "リノ"
# 「そうなのね、クロトにこんな可愛い彼女ができたなんて、お母さん、嬉しいわー」
line = "「そうなのね、クロトにこんな可愛い彼女ができたなんて、お母さん、嬉しいわー」"

[[dialogue]]
speaker = "セナリィ"
# 「あ、ありがとうございます」
line = "「あ、ありがとうございます」"

[[dialogue]]
speaker = "リノ"
# 「こんなところで立ち話もなんだし、お茶でもしながらゆっくりお話しない？　セナリィさんはどう？」
line = "「こんなところで立ち話もなんだし、お茶でもしながらゆっくりお話しない？　セナリィさんはどう？」"

[[dialogue]]
speaker = "セナリィ"
# 「つ、謹んでお受けいたしますわ！」
line = "「つ、謹んでお受けいたしますわ！」"

[[dialogue]]
speaker = "セナリィ"
# （まさかの会長様のお母様とのエンカウント。突発イベントにも程があるわ！）
line = "（まさかの会長様のお母様とのエンカウント。突発イベントにも程があるわ！）"

[[dialogue]]
speaker = "セナリィ"
# （でも逆に大チャンスでもある。お母様にも正式に交際を認めてもらえるよう、いいところを見せつけなくては！）
line = "（でも逆に大チャンスでもある。お母様にも正式に交際を認めてもらえるよう、いいところを見せつけなくては！）"

[[dialogue]]
speaker = "セナリィ"
# 「先ほどは大変失礼しました。あまりにもお若くて、会長様のお母様だなんて夢にも思いませんでしたわ」
line = "「先ほどは大変失礼しました。あまりにもお若くて、会長様のお母様だなんて夢にも思いませんでしたわ」"

[[dialogue]]
speaker = "リノ"
# 「やだ、お上手。聞いた？　クロト。お母さん、そんなに若く見えるんだって♪」
line = "「やだ、お上手。聞いた？　クロト。お母さん、そんなに若く見えるんだって♪」"

[[dialogue]]
speaker = "セナリィ"
# 「改めて……クロトさんとパートナー契──お付き合いさせていただいております、セナリィと申しますわ」
line = "「改めて……クロトさんとパートナー契──お付き合いさせていただいております、セナリィと申しますわ」"

[[dialogue]]
speaker = "リノ"
# 「セナリィちゃんは星徒会の人じゃないわよね？　なんだったかしら、ゴールデンウィークとかなんとか……」
line = "「セナリィちゃんは星徒会の人じゃないわよね？　なんだったかしら、ゴールデンウィークとかなんとか……」"

[[dialogue]]
speaker = "セナリィ"
# 「大型連休ではありませんわ、お母様。ゴールデングース──金のガチョウです。在学中に起業し、弊社の代表を務めております」
line = "「大型連休ではありませんわ、お母様。ゴールデングース──金のガチョウです。在学中に起業し、弊社の代表を務めております」"

[[dialogue]]
speaker = "リノ"
# 「まあ、すごい！　その若さで社長さんなのね！？」
line = "「まあ、すごい！　その若さで社長さんなのね！？」"

[[dialogue]]
speaker = "セナリィ"
# 「年商は億を超えるとか超えないとか、<ruby=まことしやか>実しやか</ruby>に囁かれておりますわ、ほほ、ほほほ」
line = "「年商は億を超えるとか超えないとか、<ruby>実しやか<rt>まことしやか</rt></ruby>に囁かれておりますわ、ほほ、ほほほ」"

[[dialogue]]
speaker = "unk"
# 代表が売上を把握してないのはダメでは？
line = "代表が売上を把握してないのはダメでは？"

[[dialogue]]
speaker = "セナリィ"
# 「最近の帳簿は、ヒマワリが管理しているんですもの……！　私よりも分かりやすくて、ミスが皆無なので重宝してますわ」
line = "「最近の帳簿は、ヒマワリが管理しているんですもの……！　私よりも分かりやすくて、ミスが皆無なので重宝してますわ」"

[[dialogue]]
speaker = "リノ"
# 「星徒会とセナリィちゃんは接点が少なそうだけど、どうやって知り合ったのかしら。ふたりの馴れ初めなんて聞いちゃってもいい？」
line = "「星徒会とセナリィちゃんは接点が少なそうだけど、どうやって知り合ったのかしら。ふたりの馴れ初めなんて聞いちゃってもいい？」"

[[dialogue]]
speaker = "セナリィ"
# 「出会いは私が星徒会に売り込みに行ったところからですわね。思い返せば、懐かしさすらありますわ」
line = "「出会いは私が星徒会に売り込みに行ったところからですわね。思い返せば、懐かしさすらありますわ」"

[[dialogue]]
speaker = "セナリィ"
# 「それから会長様と幾度も合同任務を重ね……とても危険なミッションの最中でも見事な立ち回りを見せる会長様に心を奪われてしまい……」
line = "「それから会長様と幾度も合同任務を重ね……とても危険なミッションの最中でも見事な立ち回りを見せる会長様に心を奪われてしまい……」"

[[dialogue]]
speaker = "セナリィ"
# 「そして、星徒会の合宿に参加させていただいた時……私のようなものでも優しく認めてくれる懐の深さに、心を奪われてしまったのですわ」
line = "「そして、星徒会の合宿に参加させていただいた時……私のようなものでも優しく認めてくれる懐の深さに、心を奪われてしまったのですわ」"

[[dialogue]]
speaker = "リノ"
# 「きゃ♪　クロト、やるじゃなーい。それからセナリィちゃんはゾッコンラブなのね」
line = "「きゃ♪　クロト、やるじゃなーい。それからセナリィちゃんはゾッコンラブなのね」"

[[dialogue]]
speaker = "セナリィ"
# 「ええ、会長様を愛し、会長様に愛されていることを、心より誇りとしておりますわ」
line = "「ええ、会長様を愛し、会長様に愛されていることを、心より誇りとしておりますわ」"

[[dialogue]]
speaker = "セナリィ"
# 「不束者ですが、会長様とは末永くお付き合いしたいと思っております。私たちの交際を、お母様にも認めて頂ければ」
line = "「不束者ですが、会長様とは末永くお付き合いしたいと思っております。私たちの交際を、お母様にも認めて頂ければ」"

[[dialogue]]
speaker = "リノ"
# 「……え？　なんでそんな話に？　あ、もしかしてセナリィちゃん、私が見定めてると思ってたのかな？」
line = "「……え？　なんでそんな話に？　あ、もしかしてセナリィちゃん、私が見定めてると思ってたのかな？」"

[[dialogue]]
speaker = "セナリィ"
# 「え……違いますの？」
line = "「え……違いますの？」"

[[dialogue]]
speaker = "リノ"
# 「認めるも認めないも、そこはクロトの自主性に任せてるからね。クロトはセナリィちゃんと末永～くお付き合いしたいんでしょ？」
line = "「認めるも認めないも、そこはクロトの自主性に任せてるからね。クロトはセナリィちゃんと末永～くお付き合いしたいんでしょ？」"

[[dialogue]]
speaker = "unk"
# もちろん
line = "もちろん"

[[dialogue]]
speaker = "リノ"
# 「それなら、お母さんから言うことは何にもありませーん。クロトが選ぶ人に間違いなし」
line = "「それなら、お母さんから言うことは何にもありませーん。クロトが選ぶ人に間違いなし」"

[[dialogue]]
speaker = "リノ"
# 「セナリィちゃんがクロトを心から愛していることは最初から伝わったし、噂に聞いてたよりもずっといい子じゃない」
line = "「セナリィちゃんがクロトを心から愛していることは最初から伝わったし、噂に聞いてたよりもずっといい子じゃない」"

[[dialogue]]
speaker = "リノ"
# 「お母さん、気に入っちゃった。いつでもウチに遊びに来てね」
line = "「お母さん、気に入っちゃった。いつでもウチに遊びに来てね」"

[[dialogue]]
speaker = "セナリィ"
# 「は、はい！　伺わせていただきます！」
line = "「は、はい！　伺わせていただきます！」"

[[dialogue]]
speaker = "unk"
# こうして、俺とセナリィは親公認カップルとなったわけだが。
line = "こうして、俺とセナリィは親公認カップルとなったわけだが。"

[[dialogue]]
speaker = "リノ"
# 「お母さんは空気が読める女だから！　ちゃーんと気を利かせて、イイ雰囲気になった所でふたりっきりにしてあげるから、ね♪」
line = "「お母さんは空気が読める女だから！　ちゃーんと気を利かせて、イイ雰囲気になった所でふたりっきりにしてあげるから、ね♪」"

[[dialogue]]
speaker = "unk"
# 母さん！？
line = "母さん！？"

[[dialogue]]
speaker = "セナリィ"
# 「お母様！？」
line = "「お母様！？」"

[[dialogue]]
speaker = "unk"
# そんな余計な気は回してくれなくていいと思うのであった。
line = "そんな余計な気は回してくれなくていいと思うのであった。"
