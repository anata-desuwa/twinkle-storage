[[dialogue]]
speaker = "セーラ"
# 「すっご～い♪　流石は九浄家直営のカジノ！　めっちゃ華やかじゃん！」
line = "「すっご～い♪　流石は九浄家直営のカジノ！　めっちゃ華やかじゃん！」"

[[dialogue]]
speaker = "ユーリス"
# 「しかしこうも店内が煌びやかですと、場違いになっていないか心配になってしまいますね。上手く溶け込めているとよいのですが」
line = "「しかしこうも店内が煌びやかですと、場違いになっていないか心配になってしまいますね。上手く溶け込めているとよいのですが」"

[[dialogue]]
speaker = "unk"
# ユーリスはバッチリ溶け込んでるよ
line = "ユーリスはバッチリ溶け込んでるよ"

[[dialogue]]
speaker = "ユーリス"
# 「ふふ、ありがとう。お世辞でも嬉しいよ」
line = "「ふふ、ありがとう。お世辞でも嬉しいよ」"

[[dialogue]]
speaker = "セーラ"
# 「実際めちゃくちゃ溶け込んでると思うけどね。２人ともやり手のディーラーにしか見えないってゆーか」
line = "「実際めちゃくちゃ溶け込んでると思うけどね。２人ともやり手のディーラーにしか見えないってゆーか」"

[[dialogue]]
speaker = "ユーリス"
# 「セーラさんこそカジノの看板娘の風格を感じますよ」
line = "「セーラさんこそカジノの看板娘の風格を感じますよ」"

[[dialogue]]
speaker = "セーラ"
# 「え、やっぱし？　うちもイケてる気がしてたんだよね～♪　『お客様……ドリンクはいかがですか？』」
line = "「え、やっぱし？　うちもイケてる気がしてたんだよね～♪　『お客様……ドリンクはいかがですか？』」"

[[dialogue]]
speaker = "unk"
# それに比べると……
line = "それに比べると……"

[[dialogue]]
speaker = "ユウリ"
# 「っっ。な、なんだよ、こっち見んなっ！」
line = "「っっ。な、なんだよ、こっち見んなっ！」"

[[dialogue]]
speaker = "ユーリス"
# 「ま、まだ恥ずかしがられていたんですね……」
line = "「ま、まだ恥ずかしがられていたんですね……」"

[[dialogue]]
speaker = "ユウリ"
# 「『まだ』ってなんだ『まだ』って！？　元はと言えばあんたがこんな格好させっから──」
line = "「『まだ』ってなんだ『まだ』って！？　元はと言えばあんたがこんな格好させっから──」"

[[dialogue]]
speaker = "セーラ"
# 「はいはい、ストーップ。これ以上の恥じらいボケはくどいってばユウリちゃん」
line = "「はいはい、ストーップ。これ以上の恥じらいボケはくどいってばユウリちゃん」"

[[dialogue]]
speaker = "ユウリ"
# 「ボケてるわけじゃねえんすけど！？」
line = "「ボケてるわけじゃねえんすけど！？」"

[[dialogue]]
speaker = "セーラ"
# 「ここまで来たら腹括りなって。いつまでもウジウジしてるのらしくないよ～？」
line = "「ここまで来たら腹括りなって。いつまでもウジウジしてるのらしくないよ～？」"

[[dialogue]]
speaker = "ユウリ"
# 「うっ……！　でも、だってその、ホントに恥ずかし、くて……」
line = "「うっ……！　でも、だってその、ホントに恥ずかし、くて……」"

[[dialogue]]
speaker = "セーラ"
# 「おお～……。なんかエロい……」
line = "「おお～……。なんかエロい……」"

[[dialogue]]
speaker = "ユウリ"
# 「ひゃっ！？　い、いきなり人のお尻撫でてなんのつもりっすか！？」
line = "「ひゃっ！？　い、いきなり人のお尻撫でてなんのつもりっすか！？」"

[[dialogue]]
speaker = "セーラ"
# 「や。世のおじさまたちが新人バニーガールにちょっかいかけたくなる気持ちがわかっちゃったもんで」
line = "「や。世のおじさまたちが新人バニーガールにちょっかいかけたくなる気持ちがわかっちゃったもんで」"

[[dialogue]]
speaker = "ユウリ"
# 「うえぇ……マジ帰りてぇ……」
line = "「うえぇ……マジ帰りてぇ……」"

[[dialogue]]
speaker = "ユーリス"
# 「と、とにかくあくまで主目的はカジノの警備とモンスターの調査ですから。気を引き締めて参りましょう」
line = "「と、とにかくあくまで主目的はカジノの警備とモンスターの調査ですから。気を引き締めて参りましょう」"

[[dialogue]]
speaker = "セーラ"
# 「でもでもホントにモンスターなんかいるのかな？　さっき一通りみんなで調べて回ったけど気配ひとつなかったじゃん？」
line = "「でもでもホントにモンスターなんかいるのかな？　さっき一通りみんなで調べて回ったけど気配ひとつなかったじゃん？」"

[[dialogue]]
speaker = "ユウリ"
# 「やっぱ野良モンスターが隠れてただけだったんじゃないっすか？　あたしはむしろカジノのバイトの方が心配っすよ」
line = "「やっぱ野良モンスターが隠れてただけだったんじゃないっすか？　あたしはむしろカジノのバイトの方が心配っすよ」"

[[dialogue]]
speaker = "セーラ"
# 「ゲームの種類とかルールとか全然わかんないもんね～？　洋画とかで見たことはあるケドも」
line = "「ゲームの種類とかルールとか全然わかんないもんね～？　洋画とかで見たことはあるケドも」"

[[dialogue]]
speaker = "ユーリス"
# 「見たところゲームの種類は、ルーレットにポーカー、あとバカラにブラックジャックと言ったところでしょうか。スロットもありますね」
line = "「見たところゲームの種類は、ルーレットにポーカー、あとバカラにブラックジャックと言ったところでしょうか。スロットもありますね」"

[[dialogue]]
speaker = "ユーリス"
# 「ジルラント王国のカジノに行ったことがあるので、一通りルールや遊び方は知っていますよ」
line = "「ジルラント王国のカジノに行ったことがあるので、一通りルールや遊び方は知っていますよ」"

[[dialogue]]
speaker = "セーラ"
# 「お～、王子感あるね～。あれでしょ？　そういう時に限って窃盗団とか現れるんでしょ？　そして始まる女窃盗団員とのラブロマンス！」
line = "「お～、王子感あるね～。あれでしょ？　そういう時に限って窃盗団とか現れるんでしょ？　そして始まる女窃盗団員とのラブロマンス！」"

[[dialogue]]
speaker = "ユーリス"
# 「え、映画の見過ぎかと……」
line = "「え、映画の見過ぎかと……」"

[[dialogue]]
speaker = "ユウリ"
# 「けっ。どーせＶＩＰルームでバニーガールはべらせて遊んでたんだろ？　だから人にバニーガールなんざ着せるんだ」
line = "「けっ。どーせＶＩＰルームでバニーガールはべらせて遊んでたんだろ？　だから人にバニーガールなんざ着せるんだ」"

[[dialogue]]
speaker = "ユーリス"
# 「遊びの意味合いが変わってますよね！？」
line = "「遊びの意味合いが変わってますよね！？」"

[[dialogue]]
speaker = "セーラ"
# 「でも夢あるよね～。ジルラント王国のバニーさんはレベル高いの？　今度遊びにいかせてよ～」
line = "「でも夢あるよね～。ジルラント王国のバニーさんはレベル高いの？　今度遊びにいかせてよ～」"

[[dialogue]]
speaker = "ユーリス"
# 「あ、いえ……その。祖国のカジノはリクリエの影響を受けて今はもう……」
line = "「あ、いえ……その。祖国のカジノはリクリエの影響を受けて今はもう……」"

[[dialogue]]
speaker = "セーラ"
# 「へっ？　そ、そうだったんだ。ごめんね、ノンデリ発言しちゃって……」
line = "「へっ？　そ、そうだったんだ。ごめんね、ノンデリ発言しちゃって……」"

[[dialogue]]
speaker = "ユーリス"
# 「い、いえいえ！　現在再建中ではありますので！　是非再建後は遊びにきていただけると嬉しいです！　観光客が増えれば国の財政も少しは楽になりますし……！」
line = "「い、いえいえ！　現在再建中ではありますので！　是非再建後は遊びにきていただけると嬉しいです！　観光客が増えれば国の財政も少しは楽になりますし……！」"

[[dialogue]]
speaker = "ユウリ"
# 「国の財政て……。なんか王子も大変そーだな……」
line = "「国の財政て……。なんか王子も大変そーだな……」"

[[dialogue]]
speaker = "ユーリス"
# 「そ──そうだ皆さん！　働く前に一勝負でもしてみませんか？　カジノの雰囲気を掴めるかもしれませんよ？」
line = "「そ──そうだ皆さん！　働く前に一勝負でもしてみませんか？　カジノの雰囲気を掴めるかもしれませんよ？」"

[[dialogue]]
speaker = "セーラ"
# 「い、いいねいいね！　一通り遊んでみるっ？」
