line = "「ディーラーはまずカードを２枚ずつ双方に配りまして──……」"

[[dialogue]]
speaker = "セーラ"
# 「んーと。今、会長さんがプレイヤーに、ユウリちゃんがバンカーに賭けてる状況だっけ？　ユウリちゃんは３と５で８か」
line = "「んーと。今、会長さんがプレイヤーに、ユウリちゃんがバンカーに賭けてる状況だっけ？　ユウリちゃんは３と５で８か」"

[[dialogue]]
speaker = "ユーリス"
# 「ナチュラル８ですね。もし会長のカードの合計値が０から７であれば、ユウリさんの無条件勝利です」
line = "「ナチュラル８ですね。もし会長のカードの合計値が０から７であれば、ユウリさんの無条件勝利です」"

[[dialogue]]
speaker = "ユーリス"
# 「そして会長の１枚目は……４。まだ勝ち目はあります。もう１枚が５であればナチュラル９。逆転勝利ですね」
line = "「そして会長の１枚目は……４。まだ勝ち目はあります。もう１枚が５であればナチュラル９。逆転勝利ですね」"

[[dialogue]]
speaker = "unk"
# ５……か
line = "５……か"

[[dialogue]]
speaker = "セーラ"
# 「うわ、なんかジワジワめくっていくねー？　おお、カードの下にマークが二つあんじゃん！」
line = "「うわ、なんかジワジワめくっていくねー？　おお、カードの下にマークが二つあんじゃん！」"

