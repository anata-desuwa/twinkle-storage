line = "「んじゃ最後にポーカーでもやる？　ルールもいろいろあるし楽しめるんじゃない？」"

[[dialogue]]
speaker = "ユーリス"
# 「こちらではテキサスホールデムを採用しているようですね。カジノの雰囲気を味わうにはもってこいだと思いますよ」
line = "「こちらではテキサスホールデムを採用しているようですね。カジノの雰囲気を味わうにはもってこいだと思いますよ」"

[[dialogue]]
speaker = "ユウリ"
