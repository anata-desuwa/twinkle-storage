[[dialogue]]
speaker = "ユーリス"
# 「おや。８対８で引き分けですね。タイに賭けてたセーラさんの９倍勝ちです」
line = "「おや。８対８で引き分けですね。タイに賭けてたセーラさんの９倍勝ちです」"

[[dialogue]]
