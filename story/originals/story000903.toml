line = "「じゃあじゃあ一番チップを稼いだ人が最下位の人になんでも命令していいってコトで♪」"

[[dialogue]]
speaker = "ユーリス"
# 「ふふ。それではオープンザゲームといきましょう」
line = "「ふふ。それではオープンザゲームといきましょう」"
