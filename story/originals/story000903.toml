[[dialogue]]
speaker = "ユーリス"
# 「簡単に言うとそうですね。プレイヤーとバンカーのどちらに賭けるかの勝負になります。ただしバカラのプレイヤーとは遊ぶ人のことではないですよ」
line = "「簡単に言うとそうですね。プレイヤーとバンカーのどちらに賭けるかの勝負になります。ただしバカラのプレイヤーとは遊ぶ人のことではないですよ」"

[[dialogue]]
speaker = "ユーリス"
