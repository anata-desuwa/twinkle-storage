line = "「遊び方は大体わかったけどよ。イマイチ燃えねえな。せっかくならもっとヒリつける勝負をやろうぜ」"

[[dialogue]]
speaker = "ユーリス"
# 「バカラは勝負スピードが特徴のゲームですからね。一戦だけでは確かに盛り上がらないかもしれませんね」
line = "「バカラは勝負スピードが特徴のゲームですからね。一戦だけでは確かに盛り上がらないかもしれませんね」"

[[dialogue]]
