line = "「ああもう、パッキーさんったらマグダレナさんにデレデレしちゃって……。いつもはリア先輩にあんなにもお熱なのに……」"

[[dialogue]]
speaker = "リア"
# 「しかも私以上にって、む～……！　さっきもヴィーナスちゃんのおっぱいに目移りしちゃってたし……！」
line = "「しかも私以上にって、む～……！　さっきもヴィーナスちゃんのおっぱいに目移りしちゃってたし……！」"

[[dialogue]]
speaker = "パッキー"
