[[dialogue]]
speaker = "聖沙"
# 「やっぱりここにいたのね、パッキーさん！」
line = "「やっぱりここにいたのね、パッキーさん！」"

[[dialogue]]
speaker = "リア"
# 「元の世界に帰るよ！　これ以上、可愛い後輩たちに迷惑かけちゃメっなんだから！」
line = "「元の世界に帰るよ！　これ以上、可愛い後輩たちに迷惑かけちゃメっなんだから！」"

[[dialogue]]
speaker = "？？？"
