[[dialogue]]
speaker = "パッキー"
# 「あぁ、可哀想に。おっぱいが苦しいって泣いてるぜぇ～？」
line = "「あぁ、可哀想に。おっぱいが苦しいって泣いてるぜぇ～？」"

[[dialogue]]
speaker = "ルリエル"
