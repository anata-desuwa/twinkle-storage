line = "「いえ、それが……。どうやら出現したモンスターは皆パンダのぬいぐるみの姿をしていて、巨乳の女性にセクハラして回っているようなの」"

[[dialogue]]
speaker = "聖沙"
# 「パッキーさんが増殖してるってこと！？　それはそれで大変だわ……！」
line = "「パッキーさんが増殖してるってこと！？　それはそれで大変だわ……！」"

[[dialogue]]
speaker = "リア"
# 「このままじゃ大勢の女性に心の傷を残しちゃう……！　早くどうにかしなくちゃ……！」
line = "「このままじゃ大勢の女性に心の傷を残しちゃう……！　早くどうにかしなくちゃ……！」"

[[dialogue]]
speaker = "フィオナ"
# 「──！　皆さん気を付けてください！、近くにアステラの反応です！」
line = "「──！　皆さん気を付けてください！、近くにアステラの反応です！」"

[[dialogue]]
speaker = "リア"
# 「アステラ？」
line = "「アステラ？」"

[[dialogue]]
speaker = "フィオナ"
# 「モンスターの巣のことです。このタイミング……恐らく目的の相手はアステラの奥に」
line = "「モンスターの巣のことです。このタイミング……恐らく目的の相手はアステラの奥に」"

[[dialogue]]
speaker = "聖沙"
# 「なら行きましょ。パッキーさんを連れ戻さなくちゃ」
line = "「なら行きましょ。パッキーさんを連れ戻さなくちゃ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「危険よ！　アステラの力で凶暴化しててもおかしくないわ。ここはアステラに慣れてる私たちだけで──」
line = "「危険よ！　アステラの力で凶暴化しててもおかしくないわ。ここはアステラに慣れてる私たちだけで──」"

[[dialogue]]
speaker = "リア"
# 「そんなわけにはいかないよ。私たちも一緒に戦わせて！」
line = "「そんなわけにはいかないよ。私たちも一緒に戦わせて！」"

[[dialogue]]
speaker = "聖沙"
# 「こっちの世界ではクルセイダースは大昔の英雄なんでしょ？　なら英雄らしいところを見せてあげなくちゃ」
line = "「こっちの世界ではクルセイダースは大昔の英雄なんでしょ？　なら英雄らしいところを見せてあげなくちゃ」"

[[dialogue]]
speaker = "リア"
# 「うんうん♪　後輩たちに任せて高見の見物なんて、英雄らしくも先輩らしくもないもんね♪」
line = "「うんうん♪　後輩たちに任せて高見の見物なんて、英雄らしくも先輩らしくもないもんね♪」"

[[dialogue]]
speaker = "unk"
