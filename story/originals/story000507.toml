[[dialogue]]
speaker = "聖沙"
# 「勿体ぶってないで姿を見せなさい！　隠れても無駄よ！」
line = "「勿体ぶってないで姿を見せなさい！　隠れても無駄よ！」"

[[dialogue]]
speaker = "？？？"
# 「隠れる？　ククク、隠れる必要なんてないぜ！　俺様はこの世界に来て、サイキョーの力を手に入れたんだ！」
line = "「隠れる？　ククク、隠れる必要なんてないぜ！　俺様はこの世界に来て、サイキョーの力を手に入れたんだ！」"

[[dialogue]]
speaker = "？？？"
# 「今こそ見せてやるぜ！　この世界に来て覚醒した俺様の姿を！」
line = "「今こそ見せてやるぜ！　この世界に来て覚醒した俺様の姿を！」"

[[dialogue]]
speaker = "パッキー"
# 「刮目しな！　これが大賢者パッキーさまの真の姿だ！」
line = "「刮目しな！　これが大賢者パッキーさまの真の姿だ！」"

[[dialogue]]
speaker = "ルリエル"
# 「ひゃひ！？　なんて大きさですぅ！？　手の平サイズのぬいぐるみさんって話でしたよね！？」
line = "「ひゃひ！？　なんて大きさですぅ！？　手の平サイズのぬいぐるみさんって話でしたよね！？」"

[[dialogue]]
speaker = "聖沙"
