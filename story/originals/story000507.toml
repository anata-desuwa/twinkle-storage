line = "「で、でも可愛い……！　大きくなってキュートさも倍増だわ……！　お腹の上に寝転がってお昼寝してみたいっ……！」"

[[dialogue]]
speaker = "パッキー"
# 「ククク、この力があれば憧れのリアちゃんのおっぱいを好き放題揉み回すことも夢じゃないぜ！」
line = "「ククク、この力があれば憧れのリアちゃんのおっぱいを好き放題揉み回すことも夢じゃないぜ！」"

