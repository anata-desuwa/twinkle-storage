line = "「胸の大小だけで人の価値を計る輩に私たちは決して負けません……！」"

[[dialogue]]
speaker = "ルリエル"
# 「ツルペタじゃないところを見せてあげますよ！　それもまた天使の使命です！」
line = "「ツルペタじゃないところを見せてあげますよ！　それもまた天使の使命です！」"

[[dialogue]]
