[[dialogue]]
speaker = "フィオナ"
# 「ふぅ、クルセイダースの皆さんがご一緒だとやはり心強いですね」
line = "「ふぅ、クルセイダースの皆さんがご一緒だとやはり心強いですね」"

[[dialogue]]
speaker = "リア"
# 「できれば、もっと他の戦いで力になってあげたかったけどな……」
line = "「できれば、もっと他の戦いで力になってあげたかったけどな……」"

[[dialogue]]
speaker = "聖沙"
# 「みんなが私たちの世界に来た時よりよっぽどバカらしい理由で戦うことになって恥ずかしいわ……」
line = "「みんなが私たちの世界に来た時よりよっぽどバカらしい理由で戦うことになって恥ずかしいわ……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「大変よ！　流星市国の各地でモンスターが大量発生してるって報告が……！」
line = "「大変よ！　流星市国の各地でモンスターが大量発生してるって報告が……！」"

[[dialogue]]
speaker = "ルリエル"
# 「マズいじゃないですかぁ！　ハレンチパンダさんを追いかけている場合じゃありませんよぉ！」
line = "「マズいじゃないですかぁ！　ハレンチパンダさんを追いかけている場合じゃありませんよぉ！」"

[[dialogue]]
speaker = "ヴィーナス"
