[[dialogue]]
speaker = "ヴィーナス"
# 「よし、なら全員で突撃しましょ！　これ以上、セクハラパンダの好きにはさせないわ！」
line = "「よし、なら全員で突撃しましょ！　これ以上、セクハラパンダの好きにはさせないわ！」"

[[dialogue]]
speaker = "unk"
# ああ──行こう！
line = "ああ──行こう！"

[[dialogue]]
speaker = "？？？"
# 「ククク……とびっきりムフフな世界だぜ。どこを見てもデカパイばっかで最高じゃねえか」
line = "「ククク……とびっきりムフフな世界だぜ。どこを見てもデカパイばっかで最高じゃねえか」"

[[dialogue]]
speaker = "フィオナ"
