[[dialogue]]
speaker = "unk"
# 第２話,鉄球使いのスペシャルな修行,P
line = "第２話,鉄球使いのスペシャルな修行,P"

[[dialogue]]
speaker = "unk"
# 今日はアリーナで、ヨミとウェディングフォームの実戦テストを行っていた。
line = "今日はアリーナで、ヨミとウェディングフォームの実戦テストを行っていた。"

[[dialogue]]
speaker = "ヨミ"
# 「うーん……」
line = "「うーん……」"

[[dialogue]]
speaker = "ヨミ"
# 「やっぱりいつもと感覚が違う……これは単純なパワーアップと考えない方がいいかもしれませんね」
line = "「やっぱりいつもと感覚が違う……これは単純なパワーアップと考えない方がいいかもしれませんね」"

[[dialogue]]
speaker = "unk"
# どうしたの？
line = "どうしたの？"

[[dialogue]]
speaker = "ヨミ"
# 「見て下さい、この『破邪の鈴』を。通常の戦闘服のものより巨大化しちゃってるんですよね」
line = "「見て下さい、この『破邪の鈴』を。通常の戦闘服のものより巨大化しちゃってるんですよね」"

[[dialogue]]
speaker = "ヨミ"
# 「大きくなることで攻撃力も上昇しますけど、いいことばかりじゃないみたいで」
line = "「大きくなることで攻撃力も上昇しますけど、いいことばかりじゃないみたいで」"

[[dialogue]]
speaker = "ヨミ"
# 「星力の消耗も大きくなりますし、『破邪の鈴』自体も扱いにくくなっちゃいました。これをうまく使いこなすには、修行が必要かも……」
line = "「星力の消耗も大きくなりますし、『破邪の鈴』自体も扱いにくくなっちゃいました。これをうまく使いこなすには、修行が必要かも……」"

[[dialogue]]
speaker = "ヨミ"
# 「すみません、せっかく会長が期待してくれてるのに、こんな情けないことを言って」
line = "「すみません、せっかく会長が期待してくれてるのに、こんな情けないことを言って」"

[[dialogue]]
speaker = "ヨミ"
# 「もー、ほんと私ってばダメだなぁ。メイド長は全然問題ないのに……」
line = "「もー、ほんと私ってばダメだなぁ。メイド長は全然問題ないのに……」"

[[dialogue]]
speaker = "unk"
# ヨミヨミに最高の修行をさせてあげるから！
line = "ヨミヨミに最高の修行をさせてあげるから！"

[[dialogue]]
speaker = "unk"
# わかった、俺に任せて！
line = "わかった、俺に任せて！"

[[dialogue]]
speaker = "ヨミ"
# 「ほ、本当ですか！　お願いしますっ♪」
line = "「ほ、本当ですか！　お願いしますっ♪」"

[[dialogue]]
speaker = "マハムート"
# 「ということで、会長の要請で来た、妃竜院マハムートよ」
line = "「ということで、会長の要請で来た、妃竜院マハムートよ」"

[[dialogue]]
speaker = "ヨミ"
# 「な……！？　なな、なんでマムがこんなところに！？」
line = "「な……！？　なな、なんでマムがこんなところに！？」"

[[dialogue]]
speaker = "マハムート"
# 「あなたは九浄家メイド隊のヨミね？　クリスマスの時は世話になったわ」
line = "「あなたは九浄家メイド隊のヨミね？　クリスマスの時は世話になったわ」"

[[dialogue]]
speaker = "ヨミ"
# 「ととと、とんでもない！　むしろこっちがお世話になりまくっただけです～っ！」
line = "「ととと、とんでもない！　むしろこっちがお世話になりまくっただけです～っ！」"

[[dialogue]]
speaker = "マハムート"
# 「過去のことはいいわ。それより今日は私は会長のつよ～～い要請でここに来たの」
line = "「過去のことはいいわ。それより今日は私は会長のつよ～～い要請でここに来たの」"

[[dialogue]]
speaker = "マハムート"
# 「天ヶ崎ヨミ……あなた、修行を求めているらしいわね？」
line = "「天ヶ崎ヨミ……あなた、修行を求めているらしいわね？」"

[[dialogue]]
speaker = "ヨミ"
# 「こやっ！！？　い、いったい会長はマムに何を言ったんですかぁぁぁ～～っ！？」
line = "「こやっ！！？　い、いったい会長はマムに何を言ったんですかぁぁぁ～～っ！？」"

[[dialogue]]
speaker = "マハムート"
# 「このご時世、ハードな修行を求めるなんて、とても感心だわ。あなたの心意気に、この私が応えてあげましょう」
line = "「このご時世、ハードな修行を求めるなんて、とても感心だわ。あなたの心意気に、この私が応えてあげましょう」"

[[dialogue]]
speaker = "マハムート"
# 「ということで、さっそく修行よ！！」
line = "「ということで、さっそく修行よ！！」"

[[dialogue]]
speaker = "ヨミ"
# 「こやぁぁぁん！！　その鉄球は勘弁して下さいぃ～～～っ！！」
line = "「こやぁぁぁん！！　その鉄球は勘弁して下さいぃ～～～っ！！」"

[[dialogue]]
speaker = "マハムート"
# 「同じ鉄球使いとして、私なら的確なアドバイスができるはずよ」
line = "「同じ鉄球使いとして、私なら的確なアドバイスができるはずよ」"

[[dialogue]]
speaker = "unk"
# そう思って、マムにお願いしたんだ
line = "そう思って、マムにお願いしたんだ"

[[dialogue]]
speaker = "マハムート"
# 「さあ、構えなさい！　鉄球の扱いをその身に叩き込んであげるわ！」
line = "「さあ、構えなさい！　鉄球の扱いをその身に叩き込んであげるわ！」"

[[dialogue]]
speaker = "ヨミ"
# 「こやあぁぁぁっ！　叩き込むって、そのでっかい鉄球のことですよねっ！　そんなの食らったら死んじゃう！　死んじゃいますから～～～っ！！」
line = "「こやあぁぁぁっ！　叩き込むって、そのでっかい鉄球のことですよねっ！　そんなの食らったら死んじゃう！　死んじゃいますから～～～っ！！」"

[[dialogue]]
speaker = "マハムート"
# 「安心して、ウェディングフォームの防御力を上回る攻撃はしないつもりよ」
line = "「安心して、ウェディングフォームの防御力を上回る攻撃はしないつもりよ」"

[[dialogue]]
speaker = "マハムート"
# 「まあ、うっかりクリティカルヒットしてしまうこともあるけれど。それは誤差よ。修行の一部として許容しなさい」
line = "「まあ、うっかりクリティカルヒットしてしまうこともあるけれど。それは誤差よ。修行の一部として許容しなさい」"

[[dialogue]]
speaker = "ヨミ"
# 「そんな誤差で殺されたら、たまったもんじゃありませんってばぁぁぁっ！！」
line = "「そんな誤差で殺されたら、たまったもんじゃありませんってばぁぁぁっ！！」"

[[dialogue]]
speaker = "マハムート"
# 「むむっ、今のを回避するの？　やるわね、さすがは狐魔族といったところかしら？　運動性能が想定以上に高いわ」
line = "「むむっ、今のを回避するの？　やるわね、さすがは狐魔族といったところかしら？　運動性能が想定以上に高いわ」"

[[dialogue]]
speaker = "マハムート"
# 「回避能力はかなり高そうだし。これはウェディングフォームの性能？」
line = "「回避能力はかなり高そうだし。これはウェディングフォームの性能？」"

[[dialogue]]
speaker = "ヨミ"
# 「手加減してっ！　手加減～～～っ！」
line = "「手加減してっ！　手加減～～～っ！」"

[[dialogue]]
speaker = "マハムート"
# 「逃げてばかりで恥ずかしくないの？　さぁ、あなたも反撃してきなさい！」
line = "「逃げてばかりで恥ずかしくないの？　さぁ、あなたも反撃してきなさい！」"

[[dialogue]]
speaker = "ヨミ"
# 「ええーーーーーいっっ！！」
line = "「ええーーーーーいっっ！！」"

[[dialogue]]
speaker = "マハムート"
# 「甘い！　鉄球の重さを意識して！　慣性をうまく活用するのよっ！」
line = "「甘い！　鉄球の重さを意識して！　慣性をうまく活用するのよっ！」"

[[dialogue]]
speaker = "ヨミ"
# 「そそ、そんなこと言われても無理です～～！　マムみたいにはできませんってば～！！」
line = "「そそ、そんなこと言われても無理です～～！　マムみたいにはできませんってば～！！」"

[[dialogue]]
speaker = "unk"
# ヨミヨミならできるよ！
line = "ヨミヨミならできるよ！"

[[dialogue]]
speaker = "マハムート"
# 「会長の言う通りよ！　やってやれないことはない！　いや、できるようになるまで修行あるのみよ！」
line = "「会長の言う通りよ！　やってやれないことはない！　いや、できるようになるまで修行あるのみよ！」"

[[dialogue]]
speaker = "ヨミ"
# 「こやぁぁぁんっ！！？　この人無茶苦茶言ってますよぉ～～っ！！」
line = "「こやぁぁぁんっ！！？　この人無茶苦茶言ってますよぉ～～っ！！」"

[[dialogue]]
speaker = "マハムート"
# 「体も温まってきたわね！　今日は倒れるまで修行するわよ！　あなたを私の次に優れた鉄球使いに育ててあげるわ！」
line = "「体も温まってきたわね！　今日は倒れるまで修行するわよ！　あなたを私の次に優れた鉄球使いに育ててあげるわ！」"

[[dialogue]]
speaker = "ヨミ"
# 「そこまでしてもらわなくて結構ですぅ～～～～っ！！」
line = "「そこまでしてもらわなくて結構ですぅ～～～～っ！！」"

[[dialogue]]
speaker = "ヨミ"
# 「うわぁぁん！　もう許してぇ～～～っ！！」
line = "「うわぁぁん！　もう許してぇ～～～っ！！」"

[[dialogue]]
speaker = "unk"
# こうしてヨミはマムの地獄の特訓メニューをこなすことになるのだった。
line = "こうしてヨミはマムの地獄の特訓メニューをこなすことになるのだった。"

[[dialogue]]
speaker = "unk"
# おかげでウェディングフォームで発生した違和感は解消され、ヨミは鉄球使いとして更なるレベルアップを遂げた。
line = "おかげでウェディングフォームで発生した違和感は解消され、ヨミは鉄球使いとして更なるレベルアップを遂げた。"

[[dialogue]]
speaker = "unk"
# ……その後３日くらい、話をしてくれなかったけど。
line = "……その後３日くらい、話をしてくれなかったけど。"
