[[dialogue]]
speaker = "unk"
# カフェテリアで起きた騒動の関係者として、星徒会室にジャクリーヌが連行されてきた。
line = "カフェテリアで起きた騒動の関係者として、星徒会室にジャクリーヌが連行されてきた。"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆ……許して欲しいゆ……」
line = "「ゆ……許して欲しいゆ……」"

[[dialogue]]
speaker = "マトイ"
# 「まずは事情を聞いてからですね。いったい何が起こってるのか、詳しく説明してもらえますか？」
line = "「まずは事情を聞いてからですね。いったい何が起こってるのか、詳しく説明してもらえますか？」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「わかったゆ……全部話すゆ……」
line = "「わかったゆ……全部話すゆ……」"

[[dialogue]]
speaker = "舞亜"
# 「現場にいた私たちも話を聞いてるから、その都度補足説明するね」
line = "「現場にいた私たちも話を聞いてるから、その都度補足説明するね」"

[[dialogue]]
speaker = "マトイ"
# 「ありがとうございます」
line = "「ありがとうございます」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「昨日の夜、ヒトリと一緒に映画を見たゆ。すごく面白いゾンビ映画だったゆ。あれはおすすめゆ～♪」
line = "「昨日の夜、ヒトリと一緒に映画を見たゆ。すごく面白いゾンビ映画だったゆ。あれはおすすめゆ～♪」"

[[dialogue]]
speaker = "unk"
# どういう映画なの？
line = "どういう映画なの？"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「幽霊ゾンビたちを引き連れた冥界道士が悪のゾンビたちと戦うお話ゆ！」
line = "「幽霊ゾンビたちを引き連れた冥界道士が悪のゾンビたちと戦うお話ゆ！」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「幽霊ゾンビはほんとはとっても狂暴な存在ゆ！　だけど道士の術で幽霊ゾンビたちを従えることができるゆ！」
line = "「幽霊ゾンビはほんとはとっても狂暴な存在ゆ！　だけど道士の術で幽霊ゾンビたちを従えることができるゆ！」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「そいつらにはノッポなのとか、太っちょなのとか、ちびっこいのとか色んなのがいるゆ♪　それがドジだったり、恐がりだったり、甘えん坊だったりするゆ♪」
line = "「そいつらにはノッポなのとか、太っちょなのとか、ちびっこいのとか色んなのがいるゆ♪　それがドジだったり、恐がりだったり、甘えん坊だったりするゆ♪」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「でも、ひとたび道士が命令を下すと、一致団結して悪のゾンビに立ち向かっていくゆ！　それがとってもカッコイイゆ♪」
line = "「でも、ひとたび道士が命令を下すと、一致団結して悪のゾンビに立ち向かっていくゆ！　それがとってもカッコイイゆ♪」"

[[dialogue]]
speaker = "マトイ"
# 「あ～、昔の映画だけど有名なやつだよね？　私も見たことあるかも……何てタイトルだったっけ？」
line = "「あ～、昔の映画だけど有名なやつだよね？　私も見たことあるかも……何てタイトルだったっけ？」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「その名の通り『冥界道士』ゆ！」
line = "「その名の通り『冥界道士』ゆ！」"

[[dialogue]]
speaker = "ソフィア"
# 「……それで、映画を見た後はどうしたんですか？」
line = "「……それで、映画を見た後はどうしたんですか？」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆ……面白くて、カッコよかったから…………余も欲しいって思ったゆ……」
line = "「ゆ……面白くて、カッコよかったから…………余も欲しいって思ったゆ……」"

[[dialogue]]
speaker = "マトイ"
# 「え……欲しいって、幽霊ゾンビ軍団を？　まさかそれで……」
line = "「え……欲しいって、幽霊ゾンビ軍団を？　まさかそれで……」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「近くの公園で儀式をしたゆ。でも、ちょっと気合いが入り過ぎちゃったゆ」
line = "「近くの公園で儀式をしたゆ。でも、ちょっと気合いが入り過ぎちゃったゆ」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「次から次へと幽霊ゾンビが出てきて止まらなくなっちゃったゆ……」
line = "「次から次へと幽霊ゾンビが出てきて止まらなくなっちゃったゆ……」"

[[dialogue]]
speaker = "舞亜"
# 「それが今、あちこちでお騒がせしてるアレってこと？」
line = "「それが今、あちこちでお騒がせしてるアレってこと？」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「そういうことだゆ」
line = "「そういうことだゆ」"

[[dialogue]]
speaker = "unk"
# それからどうしたの？
line = "それからどうしたの？"

[[dialogue]]
speaker = "unk"
# およそ事情はわかったけど
line = "およそ事情はわかったけど"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆ……」
line = "「ゆ……」"

[[dialogue]]
speaker = "ソフィア"
# 「答えてください、ジャクリーヌさん」
line = "「答えてください、ジャクリーヌさん」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「と、止めようと思ったゆ！　でも、全然止まらなかったゆ！　もはや余の力ではどうしようもなかったゆ！」
line = "「と、止めようと思ったゆ！　でも、全然止まらなかったゆ！　もはや余の力ではどうしようもなかったゆ！」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「それで……それで…………諦めて帰ったゆ☆」
line = "「それで……それで…………諦めて帰ったゆ☆」"

[[dialogue]]
speaker = "ソフィア"
# 「ゆ☆　じゃ、ありません！！！」
line = "「ゆ☆　じゃ、ありません！！！」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ごめんなさいだゆ！　朝になったらみんな消えていなくなると思ってたゆ！　こんな騒ぎになるとは思ってなかったゆ！」
line = "「ごめんなさいだゆ！　朝になったらみんな消えていなくなると思ってたゆ！　こんな騒ぎになるとは思ってなかったゆ！」"

[[dialogue]]
speaker = "舞亜"
# 「とまあ、そんな感じなんだけど……会長さん、どうしよっか？」
line = "「とまあ、そんな感じなんだけど……会長さん、どうしよっか？」"

[[dialogue]]
speaker = "マトイ"
# 「えっと……本当にどうする、会長？」
line = "「えっと……本当にどうする、会長？」"

[[dialogue]]
speaker = "unk"
# どんな被害が出てる？
line = "どんな被害が出てる？"

[[dialogue]]
speaker = "舞亜"
# 「それなんだけど、ぴょんぴょん飛び回ってるだけで、実害らしい実害は出てないみたいなんだよね」
line = "「それなんだけど、ぴょんぴょん飛び回ってるだけで、実害らしい実害は出てないみたいなんだよね」"

[[dialogue]]
speaker = "舞亜"
# 「とはいえ、かな～り鬱陶しいから、放っておくわけにもいかない、みたいな？」
line = "「とはいえ、かな～り鬱陶しいから、放っておくわけにもいかない、みたいな？」"

[[dialogue]]
speaker = "マトイ"
# 「ジャクリーヌちゃんの呼び出したそのゾンビは……ええと、ゾンビなんでしょうか？　幽霊なんでしょうか？」
line = "「ジャクリーヌちゃんの呼び出したそのゾンビは……ええと、ゾンビなんでしょうか？　幽霊なんでしょうか？」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「余が呼び出した眷属だから幽霊ゆ」
line = "「余が呼び出した眷属だから幽霊ゆ」"

[[dialogue]]
speaker = "ソフィア"
# 「そうですね。カフェテリアに現れた幽霊も実体が無くて捕まえることが出来ませんでした」
line = "「そうですね。カフェテリアに現れた幽霊も実体が無くて捕まえることが出来ませんでした」"

[[dialogue]]
speaker = "ウズメイア"
# 「そーそー、捕まえようとしてもスカッ！　スカッ！　って感じだし」
line = "「そーそー、捕まえようとしてもスカッ！　スカッ！　って感じだし」"

[[dialogue]]
speaker = "マトイ"
# 「ええっ、それじゃどうやって捕まえればいいの！？」
line = "「ええっ、それじゃどうやって捕まえればいいの！？」"

[[dialogue]]
speaker = "unk"
# ……専門家の力を借りた方がいいかも
line = "……専門家の力を借りた方がいいかも"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆ～っゆっゆっゆ♪　幽霊のことなら余にお任せなの♪　１番の専門家なの～♪」
line = "「ゆ～っゆっゆっゆ♪　幽霊のことなら余にお任せなの♪　１番の専門家なの～♪」"

[[dialogue]]
speaker = "ソフィア"
# 「そうかもしれませんが、あなたはどうにも出来なくて逃げ出したクチでしょう？」
line = "「そうかもしれませんが、あなたはどうにも出来なくて逃げ出したクチでしょう？」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「……そうだったゆ」
line = "「……そうだったゆ」"

[[dialogue]]
speaker = "舞亜"
# 「他に頼れそうなヒトって言ったら……ヒトリさんかな？」
line = "「他に頼れそうなヒトって言ったら……ヒトリさんかな？」"

[[dialogue]]
speaker = "ウズメイア"
# 「そうだね～、他に思い浮かばないし」
line = "「そうだね～、他に思い浮かばないし」"

[[dialogue]]
speaker = "ヘレナ"
# 「ふふふ、誰か忘れていないかな、諸君？」
line = "「ふふふ、誰か忘れていないかな、諸君？」"

[[dialogue]]
speaker = "マトイ"
# 「わっ！　ヘレナさん！？」
line = "「わっ！　ヘレナさん！？」"

[[dialogue]]
speaker = "unk"
# いつもの事ながら唐突に登場ですね
line = "いつもの事ながら唐突に登場ですね"

[[dialogue]]
speaker = "ヘレナ"
# 「今回の騒ぎは既に新星、流星学園両校の全域にまで及び、今なお拡大を続けているのだ……」
line = "「今回の騒ぎは既に新星、流星学園両校の全域にまで及び、今なお拡大を続けているのだ……」"

[[dialogue]]
speaker = "ヘレナ"
# 「速やかな鎮静化が必要となれば、ここはやはり九浄家当主にして学園理事長たるこの九浄ヘレナちゃんが動くしかあるまい！」
line = "「速やかな鎮静化が必要となれば、ここはやはり九浄家当主にして学園理事長たるこの九浄ヘレナちゃんが動くしかあるまい！」"

[[dialogue]]
speaker = "マトイ"
# 「何か対抗手段があるんですか？」
line = "「何か対抗手段があるんですか？」"

[[dialogue]]
speaker = "ヘレナ"
# 「うむ、見るがよい！　この日のために用意した、対ゾンビ型幽霊用の人工戦闘服だ！」
line = "「うむ、見るがよい！　この日のために用意した、対ゾンビ型幽霊用の人工戦闘服だ！」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆ、ゆゆっ！！？」
line = "「ゆ、ゆゆっ！！？」"

[[dialogue]]
speaker = "ミルフィー"
# 「し、失礼します……」
line = "「し、失礼します……」"

[[dialogue]]
speaker = "unk"
# ヘレナちゃんの高らかな宣言とは対極的な控えめな声とともに、ゆっくりと星徒会室のドアが開かれる。
line = "ヘレナちゃんの高らかな宣言とは対極的な控えめな声とともに、ゆっくりと星徒会室のドアが開かれる。"

[[dialogue]]
speaker = "unk"
# そして──姿を現したのは俺たちのクラスの委員長、ミルフィー・インセントだった。
line = "そして──姿を現したのは俺たちのクラスの委員長、ミルフィー・インセントだった。"
