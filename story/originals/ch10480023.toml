[[dialogue]]
speaker = "unk"
# 第３話,マムと初めての試練,P
line = "第３話,マムと初めての試練,P"

[[dialogue]]
speaker = "unk"
# とある週末、マムが俺の家へ遊びに来ることになった。
line = "とある週末、マムが俺の家へ遊びに来ることになった。"

[[dialogue]]
speaker = "リノ"
# 「それじゃあマムちゃん、クロトのことお願いね～」
line = "「それじゃあマムちゃん、クロトのことお願いね～」"

[[dialogue]]
speaker = "マハムート"
# 「はい、お任せ下さい」
line = "「はい、お任せ下さい」"

[[dialogue]]
speaker = "リノ"
# 「ふふっ、頼りになる彼女さんね♪　また今度、ゆっくりお話でもしましょうね～」
line = "「ふふっ、頼りになる彼女さんね♪　また今度、ゆっくりお話でもしましょうね～」"

[[dialogue]]
speaker = "unk"
# 母さんは手を振りながら、出かけて行く。今日はこれから用事があるとのことで、夜まで家を空けることになっていた。
line = "母さんは手を振りながら、出かけて行く。今日はこれから用事があるとのことで、夜まで家を空けることになっていた。"

[[dialogue]]
speaker = "マハムート"
# 「……ふぅ、これでリノさんへのご挨拶と、付き合い始めたことの報告は、何とか無事に終わったわね」
line = "「……ふぅ、これでリノさんへのご挨拶と、付き合い始めたことの報告は、何とか無事に終わったわね」"

[[dialogue]]
speaker = "マハムート"
# 「――って、何よ。私だって、初めてのことは緊張くらいするわよ」
line = "「――って、何よ。私だって、初めてのことは緊張くらいするわよ」"

[[dialogue]]
speaker = "マハムート"
# 「というか、会長を本当の彼氏として認めるのはまだまだこれからなんだから、後でダメでした、別れました、なんて報告をしないで済むように頑張りなさい」
line = "「というか、会長を本当の彼氏として認めるのはまだまだこれからなんだから、後でダメでした、別れました、なんて報告をしないで済むように頑張りなさい」"

[[dialogue]]
speaker = "マハムート"
# 「――具体的にはどうやったら、本当の彼氏として認めてもらえるのか？　……それは恋人として、段階的に試練を突破していくのよ」
line = "「――具体的にはどうやったら、本当の彼氏として認めてもらえるのか？　……それは恋人として、段階的に試練を突破していくのよ」"

[[dialogue]]
speaker = "マハムート"
# 「『リノさんにお付き合いを認めてもらう』というのも、その１つね。それと、今日はもう１つ――」
line = "「『リノさんにお付き合いを認めてもらう』というのも、その１つね。それと、今日はもう１つ――」"

[[dialogue]]
speaker = "マハムート"
# 「『初めて彼氏の家で遊ぶ』という試練をクリアするのよ……！」
line = "「『初めて彼氏の家で遊ぶ』という試練をクリアするのよ……！」"

[[dialogue]]
speaker = "マハムート"
# 「ん？　何よ、首を傾げたりして……」
line = "「ん？　何よ、首を傾げたりして……」"

[[dialogue]]
speaker = "unk"
# それって……俺というより
line = "それって……俺というより"

[[dialogue]]
speaker = "マハムート"
# 「――私が試練を受けるみたいになっている？」
line = "「――私が試練を受けるみたいになっている？」"

[[dialogue]]
speaker = "マハムート"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "マハムート"
# 「不公平だわ。会長、貴方も今日中に何か１つ、試練をクリアしなさい」
line = "「不公平だわ。会長、貴方も今日中に何か１つ、試練をクリアしなさい」"

[[dialogue]]
speaker = "unk"
# えぇっ！？　いきなりそんなこと言われても
line = "えぇっ！？　いきなりそんなこと言われても"

[[dialogue]]
speaker = "マハムート"
# 「さて、恋人として部屋で過ごすことになったわけだけど……」
line = "「さて、恋人として部屋で過ごすことになったわけだけど……」"

[[dialogue]]
speaker = "マハムート"
# 「彼氏としてクリアする試練、何か思い付いたかしら？」
line = "「彼氏としてクリアする試練、何か思い付いたかしら？」"

[[dialogue]]
speaker = "unk"
# マムと手を繋ぎたいです
line = "マムと手を繋ぎたいです"

[[dialogue]]
speaker = "マハムート"
# 「は？　何を言っているのかしら、貴方は……」
line = "「は？　何を言っているのかしら、貴方は……」"

[[dialogue]]
speaker = "マハムート"
# 「スキンシップはもっと……半年くらい段階を踏んでからでしょう？」
line = "「スキンシップはもっと……半年くらい段階を踏んでからでしょう？」"

[[dialogue]]
speaker = "unk"
# 手を繋ぐだけでそこまで！？
line = "手を繋ぐだけでそこまで！？"

[[dialogue]]
speaker = "unk"
# 期待が打ち砕かれて、ガックリと肩を落とすと――
line = "期待が打ち砕かれて、ガックリと肩を落とすと――"

[[dialogue]]
speaker = "マハムート"
# 「……そんなにショックを受ける程、私と手を繋ぎたかったの？」
line = "「……そんなにショックを受ける程、私と手を繋ぎたかったの？」"

[[dialogue]]
speaker = "マハムート"
# 「……やれやれ、仕方がないわね……」
line = "「……やれやれ、仕方がないわね……」"

[[dialogue]]
speaker = "unk"
# マムは手を差し出して、言う。
line = "マムは手を差し出して、言う。"

[[dialogue]]
speaker = "マハムート"
# 「そこまでやる気があるのなら……彼氏らしいところ、見せてもらおうかしら」
line = "「そこまでやる気があるのなら……彼氏らしいところ、見せてもらおうかしら」"

[[dialogue]]
speaker = "マハムート"
# 「――ほら、いいわよ……するなら私の気が変わらない内に、早くしなさい」
line = "「――ほら、いいわよ……するなら私の気が変わらない内に、早くしなさい」"

[[dialogue]]
speaker = "unk"
# マムのそういう優しいところ、好きです
line = "マムのそういう優しいところ、好きです"

[[dialogue]]
speaker = "マハムート"
# 「全く、調子がいいんだから……」
line = "「全く、調子がいいんだから……」"

[[dialogue]]
speaker = "unk"
# 俺はマムの手を、そっと握る。
line = "俺はマムの手を、そっと握る。"

[[dialogue]]
speaker = "マハムート"
# 「……！　ん…………」
line = "「……！　ん…………」"

[[dialogue]]
speaker = "マハムート"
# 「……ふぅ」
line = "「……ふぅ」"

[[dialogue]]
speaker = "マハムート"
# 「……え？　さ、さっきも言ったでしょう……私だって、初めてのことぐらいあるわよ」
line = "「……え？　さ、さっきも言ったでしょう……私だって、初めてのことぐらいあるわよ」"

[[dialogue]]
speaker = "unk"
# 照れてるマム、ちょっと可愛いです
line = "照れてるマム、ちょっと可愛いです"

[[dialogue]]
speaker = "マハムート"
# 「っ……！　そういうのは、わざわざ口にしなくていい！」
line = "「っ……！　そういうのは、わざわざ口にしなくていい！」"

[[dialogue]]
speaker = "マハムート"
# 「繋ぎ方を変えたい？　……恋人繋ぎに？　そ、それって指を絡めるアレ！？」
line = "「繋ぎ方を変えたい？　……恋人繋ぎに？　そ、それって指を絡めるアレ！？」"

[[dialogue]]
speaker = "マハムート"
# 「それはダメよ！　――なんでって、それは……」
line = "「それはダメよ！　――なんでって、それは……」"

[[dialogue]]
speaker = "マハムート"
# 「なんか、いやらしいじゃない！」
line = "「なんか、いやらしいじゃない！」"

[[dialogue]]
speaker = "unk"
# 手を繋ぐだけなのに……！
line = "手を繋ぐだけなのに……！"

[[dialogue]]
speaker = "マハムート"
# 「残念そうな顔をしたって、２度は許してあげないわよ」
line = "「残念そうな顔をしたって、２度は許してあげないわよ」"

[[dialogue]]
speaker = "マハムート"
# 「というかまた、貴方じゃなくて、私への試練みたいになってるじゃない！」
line = "「というかまた、貴方じゃなくて、私への試練みたいになってるじゃない！」"

[[dialogue]]
speaker = "マハムート"
# 「とにかく、恋人繋ぎは普通の繋ぎ方にもっと慣れてからよ」
line = "「とにかく、恋人繋ぎは普通の繋ぎ方にもっと慣れてからよ」"

[[dialogue]]
speaker = "マハムート"
# 「――じゃあこれから、もっと手を繋ぐようにしていいかって？」
line = "「――じゃあこれから、もっと手を繋ぐようにしていいかって？」"

[[dialogue]]
speaker = "マハムート"
# 「それは……まあ、１回繋いだわけだし……」
line = "「それは……まあ、１回繋いだわけだし……」"

[[dialogue]]
speaker = "マハムート"
# 「ただ、あんまり目立つ場所では無しよ。私は、威厳ある寮長なんだから……」
line = "「ただ、あんまり目立つ場所では無しよ。私は、威厳ある寮長なんだから……」"

[[dialogue]]
speaker = "unk"
# なら今度、デートに行きましょう
line = "なら今度、デートに行きましょう"

[[dialogue]]
speaker = "マハムート"
# 「そうね、デートの時なら……まあ、いいわよ」
line = "「そうね、デートの時なら……まあ、いいわよ」"

[[dialogue]]
speaker = "unk"
# マムは可愛くこくりと頷いてくれて、今から次の機会が楽しみになるのだった――
line = "マムは可愛くこくりと頷いてくれて、今から次の機会が楽しみになるのだった――"
