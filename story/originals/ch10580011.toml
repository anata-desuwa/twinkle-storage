[[dialogue]]
speaker = "unk"
# 第１話,九浄家当主、現る,P
line = "第１話,九浄家当主、現る,P"

[[dialogue]]
speaker = "unk"
# ある日、ヴィーナスと一緒に星徒会室で仕事をしていると――
line = "ある日、ヴィーナスと一緒に星徒会室で仕事をしていると――"

[[dialogue]]
speaker = "？？？"
# 「失礼するぞ、星徒会諸君」
line = "「失礼するぞ、星徒会諸君」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ヘレナちゃんじゃない！　珍しいわね、学園に顔を出すなんて」
line = "「ヘレナちゃんじゃない！　珍しいわね、学園に顔を出すなんて」"

[[dialogue]]
speaker = "ヘレナ"
# 「ふふっ、そろそろ顔見せの時だと、我が魂が囁くのでな」
line = "「ふふっ、そろそろ顔見せの時だと、我が魂が囁くのでな」"

[[dialogue]]
speaker = "ヘレナ"
# 「さて、初めましてになるな、未来の日誌に記されし魔王よ」
line = "「さて、初めましてになるな、未来の日誌に記されし魔王よ」"

[[dialogue]]
speaker = "unk"
# あなたは……？
line = "あなたは……？"

[[dialogue]]
speaker = "ヘレナ"
# 「それでは、名乗らせてもらうとしよう――」
line = "「それでは、名乗らせてもらうとしよう――」"

[[dialogue]]
speaker = "ヘレナ"
# 「立てばプリティ、座ればゴージャス」
line = "「立てばプリティ、座ればゴージャス」"

[[dialogue]]
speaker = "ヘレナ"
# 「我が名は、泣く子も黙る九浄家二十六代目当主・九浄ヘレナ」
line = "「我が名は、泣く子も黙る九浄家二十六代目当主・九浄ヘレナ」"

[[dialogue]]
speaker = "ヘレナ"
# 「友人として、ヘレナちゃんと呼んでもよいぞ？」
line = "「友人として、ヘレナちゃんと呼んでもよいぞ？」"

[[dialogue]]
speaker = "unk"
# 九浄家のご当主様！？
line = "九浄家のご当主様！？"

[[dialogue]]
speaker = "ヘレナ"
# 「ふふっ、いかにも。ひょっとしたらこれまでも、我が存在をどこかで聞かされたりしていたかもしれぬな」
line = "「ふふっ、いかにも。ひょっとしたらこれまでも、我が存在をどこかで聞かされたりしていたかもしれぬな」"

[[dialogue]]
speaker = "ヴィーナス"
# 「５年前、<b>記憶喪失</b>だった私を九浄家に迎え入れてくれた人よ。私にとっては義理のお母さんに当たるわね！」
line = "「５年前、<b>記憶喪失</b>だった私を九浄家に迎え入れてくれた人よ。私にとっては義理のお母さんに当たるわね！」"

[[dialogue]]
speaker = "unk"
# 義理の……？
line = "義理の……？"

[[dialogue]]
speaker = "ヘレナ"
# 「そこはまぁ、ひとまず置いておくがよい。別の機会で話すこともあろう」
line = "「そこはまぁ、ひとまず置いておくがよい。別の機会で話すこともあろう」"

[[dialogue]]
speaker = "ヘレナ"
# 「それよりも今日はこの、九浄ヘレナちゃんの出番が、満を持してやってきたのだ――」
line = "「それよりも今日はこの、九浄ヘレナちゃんの出番が、満を持してやってきたのだ――」"

[[dialogue]]
speaker = "ヘレナ"
# 「さあ、諸君。思う存分、私のスクショを撮るがよい」
line = "「さあ、諸君。思う存分、私のスクショを撮るがよい」"

[[dialogue]]
speaker = "unk"
# す、スクショ……？？
line = "す、スクショ……？？"

[[dialogue]]
speaker = "ヴィーナス"
# 「ヘレナちゃんは、時々こういう不思議なことを言い出すけど、気にしなくていいわよ」
line = "「ヘレナちゃんは、時々こういう不思議なことを言い出すけど、気にしなくていいわよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「いわゆる、思春期特有の<ruby=やまい>病</ruby>にかかってる、みたいな感じだから」
line = "「いわゆる、思春期特有の<ruby>病<rt>やまい</rt></ruby>にかかってる、みたいな感じだから」"

[[dialogue]]
speaker = "ヘレナ"
# 「ふっ……なにを言っているのだ、ヴィーナス。そんなわけあるまい」
line = "「ふっ……なにを言っているのだ、ヴィーナス。そんなわけあるまい」"

[[dialogue]]
speaker = "ヘレナ"
# 「これは我が内なる九浄ヘレナの魂が、時折、私の心に囁きかけてくるが故にだ」
line = "「これは我が内なる九浄ヘレナの魂が、時折、私の心に囁きかけてくるが故にだ」"

[[dialogue]]
speaker = "ヘレナ"
# 「おっと、忘れるところだった。せっかくのスクショタイムなのだから、こちらの姿も披露しておかねばな」
line = "「おっと、忘れるところだった。せっかくのスクショタイムなのだから、こちらの姿も披露しておかねばな」"

[[dialogue]]
speaker = "ヘレナ"
# 「<ruby=みやび>雅</ruby>やかに――変身」
line = "「<ruby>雅<rt>みやび</rt></ruby>やかに――変身」"

[[dialogue]]
speaker = "ヘレナ"
# 「さあ、プリティでゴージャスなこの姿、とくとスクリーンショットに焼き付けるがよい」
line = "「さあ、プリティでゴージャスなこの姿、とくとスクリーンショットに焼き付けるがよい」"

[[dialogue]]
speaker = "unk"
# ヘレナさん、星騎士だったのか！
line = "ヘレナさん、星騎士だったのか！"

[[dialogue]]
speaker = "ヘレナ"
# 「ふふっ、そう肩肘張らず、ヘレナちゃんでよい」
line = "「ふふっ、そう肩肘張らず、ヘレナちゃんでよい」"

[[dialogue]]
speaker = "ヘレナ"
# 「こう見えて、守護星の加護は健在。まだまだ現役の身だ」
line = "「こう見えて、守護星の加護は健在。まだまだ現役の身だ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ちなみに、ヘレナちゃんはめっちゃ強いのよ！　私に戦い方を教えてくれたのは、ヘレナちゃんなんだから」
line = "「ちなみに、ヘレナちゃんはめっちゃ強いのよ！　私に戦い方を教えてくれたのは、ヘレナちゃんなんだから」"

[[dialogue]]
speaker = "ヘレナ"
# 「これまではあいにく、絡まる因果に阻まれて表舞台に出てくることができなかったが――」
line = "「これまではあいにく、絡まる因果に阻まれて表舞台に出てくることができなかったが――」"

[[dialogue]]
speaker = "ヘレナ"
# 「どうやら時は満ちたようなのでな。これからは、貴殿らに助けが必要とあらば力を貸そう」
line = "「どうやら時は満ちたようなのでな。これからは、貴殿らに助けが必要とあらば力を貸そう」"

[[dialogue]]
speaker = "ヘレナ"
# 「というわけで、これからよろしく頼むぞ、新たなる魔王よ」
line = "「というわけで、これからよろしく頼むぞ、新たなる魔王よ」"

[[dialogue]]
speaker = "unk"
# こちらこそ、ヘレナちゃん
line = "こちらこそ、ヘレナちゃん"

[[dialogue]]
speaker = "ヘレナ"
# 「……！　ふふっ、ヘレナちゃんと呼んでくれたな。実に嬉しいぞ」
line = "「……！　ふふっ、ヘレナちゃんと呼んでくれたな。実に嬉しいぞ」"

[[dialogue]]
speaker = "unk"
# ヘレナちゃんと握手を交わす――と、それから彼女はもう片方の手で、俺の頬にそっと触れた。
line = "ヘレナちゃんと握手を交わす――と、それから彼女はもう片方の手で、俺の頬にそっと触れた。"

[[dialogue]]
speaker = "ヘレナ"
# 「貴殿は私好みの、なかなかにラブリーな顔立ちをしているしな」
line = "「貴殿は私好みの、なかなかにラブリーな顔立ちをしているしな」"

[[dialogue]]
speaker = "unk"
# え？
line = "え？"

[[dialogue]]
speaker = "ヴィーナス"
# 「ヘレナちゃん、もしかしてクロトみたいな男の子がタイプだったの！？」
line = "「ヘレナちゃん、もしかしてクロトみたいな男の子がタイプだったの！？」"

[[dialogue]]
speaker = "ヘレナ"
# 「ふふっ、私が可愛いもの好きであることは知っていよう？　ヴィーナスよ」
line = "「ふふっ、私が可愛いもの好きであることは知っていよう？　ヴィーナスよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そりゃあ、趣味で星見家に対抗して、九浄家メイド隊を作っちゃうくらいだし……」
line = "「そりゃあ、趣味で星見家に対抗して、九浄家メイド隊を作っちゃうくらいだし……」"

[[dialogue]]
speaker = "ヘレナ"
# 「その可愛いの対象は、男に対しても及ぶということだ。私も女なのでな」
line = "「その可愛いの対象は、男に対しても及ぶということだ。私も女なのでな」"

[[dialogue]]
speaker = "ヘレナ"
# 「ちなみにこれは、我が魂とは鏡映し。私個人の性癖というやつだ」
line = "「ちなみにこれは、我が魂とは鏡映し。私個人の性癖というやつだ」"

[[dialogue]]
speaker = "ヘレナ"
# 「故に、親しくしてくれると嬉しいぞ、魔王よ」
line = "「故に、親しくしてくれると嬉しいぞ、魔王よ」"

[[dialogue]]
speaker = "ヘレナ"
# 「ふふっ……♪」
line = "「ふふっ……♪」"

[[dialogue]]
speaker = "unk"
# ヘレナちゃんはそう言って、悪戯っぽく微笑むのだった――
line = "ヘレナちゃんはそう言って、悪戯っぽく微笑むのだった――"
