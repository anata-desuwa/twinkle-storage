[[dialogue]]
speaker = "unk"
# 第４話,新入生歓迎会,B
line = "第４話,新入生歓迎会,B"

[[dialogue]]
speaker = "unk"
# 新入生歓迎会は、ヴィーナス会長の堂々とした挨拶から始まった。
line = "新入生歓迎会は、ヴィーナス会長の堂々とした挨拶から始まった。"

[[dialogue]]
speaker = "ヴィーナス"
# 「ようこそ新入生の皆さん、新星学園へ！　私たちと一緒に、この素晴らしい世界を守りましょう！」
line = "「ようこそ新入生の皆さん、新星学園へ！　私たちと一緒に、この素晴らしい世界を守りましょう！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「──以上ッ！　新星学園星徒会長、九浄ヴィーナス！　みんな、期待してるわ！」
line = "「──以上ッ！　新星学園星徒会長、九浄ヴィーナス！　みんな、期待してるわ！」"

[[dialogue]]
speaker = "マトイ"
# 「続きましては、新星学園における日々の生活を、新入生の皆さんにムービーにてご紹介します」
line = "「続きましては、新星学園における日々の生活を、新入生の皆さんにムービーにてご紹介します」"

[[dialogue]]
speaker = "マトイ"
# 「放送委員会のコハルコさん、お願いします」
line = "「放送委員会のコハルコさん、お願いします」"

[[dialogue]]
speaker = "コハルコ"
# 「新入生の皆さん、ご入学おめでとうございます。ご紹介いただきました、放送委員会委員長のコハルコです。それではスクリーンをご覧ください」
line = "「新入生の皆さん、ご入学おめでとうございます。ご紹介いただきました、放送委員会委員長のコハルコです。それではスクリーンをご覧ください」"

[[dialogue]]
speaker = "アナ"
# 「おお……」
line = "「おお……」"

[[dialogue]]
speaker = "マトイ"
# （みんなキラキラ目を輝かせながらムービーを見てる……去年の私も、あんな感じだったのかな？）
line = "（みんなキラキラ目を輝かせながらムービーを見てる……去年の私も、あんな感じだったのかな？）"

[[dialogue]]
speaker = "マトイ"
# 「ありがとうございました。続きましては、年間予定の説明をさせていただきます」
line = "「ありがとうございました。続きましては、年間予定の説明をさせていただきます」"

[[dialogue]]
speaker = "マトイ"
# 「星徒会副会長、サーシャさん、お願いします」
line = "「星徒会副会長、サーシャさん、お願いします」"

[[dialogue]]
speaker = "サーシャ"
# 「は～い。新入生のみんな～、ご入学おめでとうございま～す」
line = "「は～い。新入生のみんな～、ご入学おめでとうございま～す」"

[[dialogue]]
speaker = "サーシャ"
# 「毎日のお勉強や訓練はすっごく大変だけど、校外学習、体育祭や文化祭、楽しいイベントも目白押しで～す。一緒に素敵な学園生活を過ごしましょうね」
line = "「毎日のお勉強や訓練はすっごく大変だけど、校外学習、体育祭や文化祭、楽しいイベントも目白押しで～す。一緒に素敵な学園生活を過ごしましょうね」"

[[dialogue]]
speaker = "サーシャ"
# 「次は、みんなの学園生活をより豊かにする部活動の紹介で～す。まずは乗馬部から～」
line = "「次は、みんなの学園生活をより豊かにする部活動の紹介で～す。まずは乗馬部から～」"

[[dialogue]]
speaker = "ユーリス"
# 「はぁっ！　ようこそ、新入生諸君！」
line = "「はぁっ！　ようこそ、新入生諸君！」"

[[dialogue]]
speaker = "ユーリス"
# 「我が乗馬部は、君たちの来訪を心待ちにしているよ！」
line = "「我が乗馬部は、君たちの来訪を心待ちにしているよ！」"

[[dialogue]]
speaker = "unk"
# 馬に乗って現れた乗馬部を皮切りに――
line = "馬に乗って現れた乗馬部を皮切りに――"

[[dialogue]]
speaker = "unk"
# 美術部は迫力あるライブペイントで、軽音部は流行りのポップソングで会場を沸かせる。
line = "美術部は迫力あるライブペイントで、軽音部は流行りのポップソングで会場を沸かせる。"

[[dialogue]]
speaker = "unk"
# １人でも多くの新入部員を欲しがる各部活は各々に派手なパフォーマンスを見せてアピールしていった。
line = "１人でも多くの新入部員を欲しがる各部活は各々に派手なパフォーマンスを見せてアピールしていった。"

[[dialogue]]
speaker = "unk"
# そして――
line = "そして――"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふふん、私も負けてられないわね！　いっくわよー！」
line = "「ふふん、私も負けてられないわね！　いっくわよー！」"

[[dialogue]]
speaker = "unk"
# 上空めがけて放った、光の星術。
line = "上空めがけて放った、光の星術。"

[[dialogue]]
speaker = "unk"
# 皆の注目の視線を集めた光弾は、遥か遥か高みへと昇り──
line = "皆の注目の視線を集めた光弾は、遥か遥か高みへと昇り──"

[[dialogue]]
speaker = "ヴィーナス"
# 「木っ端ミジンコになりなさい！　はい、ドーーーン！！！」
line = "「木っ端ミジンコになりなさい！　はい、ドーーーン！！！」"

[[dialogue]]
speaker = "unk"
# 大きく弾けて、空に大輪の花を咲かせた。
line = "大きく弾けて、空に大輪の花を咲かせた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「続けて行っくわよーー！　はいっ、はいっ、はーいっ！」
line = "「続けて行っくわよーー！　はいっ、はいっ、はーいっ！」"

[[dialogue]]
speaker = "新入生Ａ"
# 「すごい……！」
line = "「すごい……！」"

[[dialogue]]
speaker = "新入生Ｂ"
# 「あれが……ヴィーナス会長なんだ……！」
line = "「あれが……ヴィーナス会長なんだ……！」"

[[dialogue]]
speaker = "サーシャ"
# 「有言実行ね～。ヴィーナスちゃんの花火大会だわ～」
line = "「有言実行ね～。ヴィーナスちゃんの花火大会だわ～」"

[[dialogue]]
speaker = "マトイ"
# 「予算ゼロの花火大会ですか……ウチの会長は、やることなすこと無茶苦茶ですよ」
line = "「予算ゼロの花火大会ですか……ウチの会長は、やることなすこと無茶苦茶ですよ」"

[[dialogue]]
speaker = "サーシャ"
# 「うふふ、会計としては大助かり～」
line = "「うふふ、会計としては大助かり～」"

[[dialogue]]
speaker = "マトイ"
# 「花火大会も大盛り上がりで、新入生歓迎会は締めくくられました。めでたしめでたし」
line = "「花火大会も大盛り上がりで、新入生歓迎会は締めくくられました。めでたしめでたし」"

[[dialogue]]
speaker = "マトイ"
# 「──ってわけにはいかないんですよね……？」
line = "「──ってわけにはいかないんですよね……？」"

[[dialogue]]
speaker = "サーシャ"
# 「ヴィーナスちゃんは納得しないわね～」
line = "「ヴィーナスちゃんは納得しないわね～」"

[[dialogue]]
speaker = "マトイ"
# 「現会長の力を見せつけ、拍手喝采の中、新入生歓迎会は締められたのでした──って、議事録は終わらせたいんですけど」
line = "「現会長の力を見せつけ、拍手喝采の中、新入生歓迎会は締められたのでした──って、議事録は終わらせたいんですけど」"

[[dialogue]]
speaker = "マトイ"
# 「やっぱりやるしかないんですね……アレ……」
line = "「やっぱりやるしかないんですね……アレ……」"

[[dialogue]]
speaker = "サーシャ"
# 「マトイちゃんはここからが本番よ。怪我しないよう気をつけてね～」
line = "「マトイちゃんはここからが本番よ。怪我しないよう気をつけてね～」"

[[dialogue]]
speaker = "マトイ"
# 「はぁぁ……行ってきます、サーシャさん。万が一の時は骨を拾ってください」
line = "「はぁぁ……行ってきます、サーシャさん。万が一の時は骨を拾ってください」"

[[dialogue]]
speaker = "ヴィーナス"
# 「さ、みんな、歓迎の花火は楽しんでもらえたかしら！」
line = "「さ、みんな、歓迎の花火は楽しんでもらえたかしら！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「でも、宴はまだまだ続くの！　ここからが本日のメインイベントよ！」
line = "「でも、宴はまだまだ続くの！　ここからが本日のメインイベントよ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「星徒会役員同士によるバトルデモンストレーション！」
line = "「星徒会役員同士によるバトルデモンストレーション！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ヴィーナスＶＳマトイの模擬戦を始めるわ！」
line = "「ヴィーナスＶＳマトイの模擬戦を始めるわ！」"

[[dialogue]]
speaker = "マトイ"
# （まったく、ウチの会長ときたらーーーっ！）
line = "（まったく、ウチの会長ときたらーーーっ！）"
