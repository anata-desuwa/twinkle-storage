[[dialogue]]
speaker = "unk"
# 第４話,セシアの恋人体験,P
line = "第４話,セシアの恋人体験,P"

[[dialogue]]
speaker = "unk"
# セシアとの付き合いも長くなってきた、ある休日。俺は彼女に誘われて、街へと<b>デート</b>にやってきていた。
line = "セシアとの付き合いも長くなってきた、ある休日。俺は彼女に誘われて、街へと<b>デート</b>にやってきていた。"

[[dialogue]]
speaker = "セシア"
# 「会長、今日はわたくしのお願いを聞いてくれてありがとう。男の人とのデートは初めてだから、わくわくするわ♪」
line = "「会長、今日はわたくしのお願いを聞いてくれてありがとう。男の人とのデートは初めてだから、わくわくするわ♪」"

[[dialogue]]
speaker = "unk"
# そもそもなんでセシアとデートすることになったのかというと、それは昨日、セシアと一緒に、大聖堂カフェテリアで旗付きチキンライスを食べていた時のこと――
line = "そもそもなんでセシアとデートすることになったのかというと、それは昨日、セシアと一緒に、大聖堂カフェテリアで旗付きチキンライスを食べていた時のこと――"

[[dialogue]]
speaker = "セシア"
# 「会長、明日は休日でしょう？　なにか用事とかあるかしら？　もしよければなんだけど……わたくしとデートをしない？」
line = "「会長、明日は休日でしょう？　なにか用事とかあるかしら？　もしよければなんだけど……わたくしとデートをしない？」"

[[dialogue]]
speaker = "セシア"
# 「――ええ、そうよ。２人で街に出かけて、デートをするの。わたくし、最近、恋愛に興味を持っていてね」
line = "「――ええ、そうよ。２人で街に出かけて、デートをするの。わたくし、最近、恋愛に興味を持っていてね」"

[[dialogue]]
speaker = "セシア"
# 「知識としては頭の中に蓄積されているけれど、せっかく人間界を自由に動けるようになったのだし、恋愛を体験してみたいと思ったのよ。だから――」
line = "「知識としては頭の中に蓄積されているけれど、せっかく人間界を自由に動けるようになったのだし、恋愛を体験してみたいと思ったのよ。だから――」"

[[dialogue]]
speaker = "セシア"
# 「会長、わたくしと『恋人体験』してくれないかしら？」
line = "「会長、わたくしと『恋人体験』してくれないかしら？」"

[[dialogue]]
speaker = "セシア"
# 「それじゃあ、まずは恋人らしく手を繋ぎましょう」
line = "「それじゃあ、まずは恋人らしく手を繋ぎましょう」"

[[dialogue]]
speaker = "セシア"
# 「ん……♪　ふふっ、今思ったけど、会長の手を握るのはこれが初めてね」
line = "「ん……♪　ふふっ、今思ったけど、会長の手を握るのはこれが初めてね」"

[[dialogue]]
speaker = "セシア"
# 「会長の手、大きくて温かいわ。ママの手はよく握るけれど、男の人の手も悪くないわね♪」
line = "「会長の手、大きくて温かいわ。ママの手はよく握るけれど、男の人の手も悪くないわね♪」"

[[dialogue]]
speaker = "unk"
# デートの相手は、俺でよかったのか？
line = "デートの相手は、俺でよかったのか？"

[[dialogue]]
speaker = "セシア"
# 「あら、どうして？　――ママ認定できる男の人を見つけた方がよかったんじゃないかって？」
line = "「あら、どうして？　――ママ認定できる男の人を見つけた方がよかったんじゃないかって？」"

[[dialogue]]
speaker = "セシア"
# 「それはもちろん、考えてみたりしたけれど……でも、わたくしはやっぱり、デートをするならあなたがいいなって思ったのよ」
line = "「それはもちろん、考えてみたりしたけれど……でも、わたくしはやっぱり、デートをするならあなたがいいなって思ったのよ」"

[[dialogue]]
speaker = "セシア"
# 「あなたはわたくしのママじゃないから」
line = "「あなたはわたくしのママじゃないから」"

[[dialogue]]
speaker = "セシア"
# 「あなたと一緒に日々を過ごしたり、リクリエと戦ったりする中で、いざという時、頼れる男の人であることを、わたくしは知っているわ」
line = "「あなたと一緒に日々を過ごしたり、リクリエと戦ったりする中で、いざという時、頼れる男の人であることを、わたくしは知っているわ」"

[[dialogue]]
speaker = "セシア"
# 「プラスポイントが沢山ある。でも、不思議とあなたのことはママと呼ぶ気にならないの」
line = "「プラスポイントが沢山ある。でも、不思議とあなたのことはママと呼ぶ気にならないの」"

[[dialogue]]
speaker = "セシア"
# 「だから、恋人体験の相手になって欲しいって思ったのよ」
line = "「だから、恋人体験の相手になって欲しいって思ったのよ」"

[[dialogue]]
speaker = "unk"
# （なんか少し照れるな……）
line = "（なんか少し照れるな……）"

[[dialogue]]
speaker = "unk"
# それから俺たちは、街で評判のスイーツ店でパフェを食べることに。
line = "それから俺たちは、街で評判のスイーツ店でパフェを食べることに。"

[[dialogue]]
speaker = "セシア"
# 「いつもはわたくしがママたちに甘えているけど、今日は会長の恋人だもの。わたくしが甘やかす番よね♪」
line = "「いつもはわたくしがママたちに甘えているけど、今日は会長の恋人だもの。わたくしが甘やかす番よね♪」"

[[dialogue]]
speaker = "セシア"
# 「というわけで、はい。パフェを食べさせてあげるわ。あ～ん♪」
line = "「というわけで、はい。パフェを食べさせてあげるわ。あ～ん♪」"

[[dialogue]]
speaker = "unk"
# 少しどころじゃなく恥ずかしいんだけど！？
line = "少しどころじゃなく恥ずかしいんだけど！？"

[[dialogue]]
speaker = "セシア"
# 「え？　恋人はこういうことをするものだと、わたくしの中に蓄積されていたけれど、間違っていたかしら？」
line = "「え？　恋人はこういうことをするものだと、わたくしの中に蓄積されていたけれど、間違っていたかしら？」"

[[dialogue]]
speaker = "セシア"
# 「――小さい子に食べさせてもらってるのが恥ずかしい？　むむっ……なんだか今、ちょっと胸がモヤっとしたわ」
line = "「――小さい子に食べさせてもらってるのが恥ずかしい？　むむっ……なんだか今、ちょっと胸がモヤっとしたわ」"

[[dialogue]]
speaker = "セシア"
# 「会長はわたくしから食べさせてもらうのは、嫌なの？」
line = "「会長はわたくしから食べさせてもらうのは、嫌なの？」"

[[dialogue]]
speaker = "セシア"
# 「――嫌じゃないなら、やましいことをしているわけじゃないんだから、堂々としてればいいわ」
line = "「――嫌じゃないなら、やましいことをしているわけじゃないんだから、堂々としてればいいわ」"

[[dialogue]]
speaker = "セシア"
# 「ほら、あ～んっ！　じ～っ……」
line = "「ほら、あ～んっ！　じ～っ……」"

[[dialogue]]
speaker = "unk"
# おそらくセシアは、俺が食べるまで、見つめてくるのを止めないだろう。そう思った俺は、観念して――
line = "おそらくセシアは、俺が食べるまで、見つめてくるのを止めないだろう。そう思った俺は、観念して――"

[[dialogue]]
speaker = "セシア"
# 「あっ……ふふっ♪　どう？　美味しい？」
line = "「あっ……ふふっ♪　どう？　美味しい？」"

[[dialogue]]
speaker = "セシア"
# 「――ならよかった。それじゃあ、今度はわたくしが食べさせてもらう番ね♪」
line = "「――ならよかった。それじゃあ、今度はわたくしが食べさせてもらう番ね♪」"

[[dialogue]]
speaker = "セシア"
# 「だって、恋人だもの。甘やかして、甘やかされる。食べさせ合いっこは、ママとじゃできないわ」
line = "「だって、恋人だもの。甘やかして、甘やかされる。食べさせ合いっこは、ママとじゃできないわ」"

[[dialogue]]
speaker = "セシア"
# 「ほら、会長。わたくしに食べさせて？　あ～ん♪」
line = "「ほら、会長。わたくしに食べさせて？　あ～ん♪」"

[[dialogue]]
speaker = "セシア"
# 「ん……♪　ぱくっ、もぐもぐ……ふふっ、美味しくて、とっても甘いわ……♪」
line = "「ん……♪　ぱくっ、もぐもぐ……ふふっ、美味しくて、とっても甘いわ……♪」"

[[dialogue]]
speaker = "セシア"
# 「ふぅ……今日は楽しくて、あっという間だったわ。もう辺りが暗くなってしまったわね。――家まで送ってくれるの？　会長、ありがとう」
line = "「ふぅ……今日は楽しくて、あっという間だったわ。もう辺りが暗くなってしまったわね。――家まで送ってくれるの？　会長、ありがとう」"

[[dialogue]]
speaker = "セシア"
# 「でも、帰る前に、恋人体験でやっておかなくてはならないことがあるわ。というわけで――」
line = "「でも、帰る前に、恋人体験でやっておかなくてはならないことがあるわ。というわけで――」"

[[dialogue]]
speaker = "セシア"
# 「会長、わたくしとキスをしましょう」
line = "「会長、わたくしとキスをしましょう」"

[[dialogue]]
speaker = "unk"
# キス！？！？
line = "キス！？！？"

[[dialogue]]
speaker = "セシア"
# 「――さすがにそれはマズいって……どうして？　そういうことは、本当の恋人とするべき……？」
line = "「――さすがにそれはマズいって……どうして？　そういうことは、本当の恋人とするべき……？」"

[[dialogue]]
speaker = "セシア"
# 「なにを言っているの？　私たちは恋人になったのでしょう？」
line = "「なにを言っているの？　私たちは恋人になったのでしょう？」"

[[dialogue]]
speaker = "unk"
# よくよく聞いてみると、セシアが恋人体験をしてみたいと言ったのは、今日１日だけのことではなくて。
line = "よくよく聞いてみると、セシアが恋人体験をしてみたいと言ったのは、今日１日だけのことではなくて。"

[[dialogue]]
speaker = "unk"
# これから恋人として恋愛を体験していきたいという、継続的な意味だったらしい――
line = "これから恋人として恋愛を体験していきたいという、継続的な意味だったらしい――"

[[dialogue]]
speaker = "セシア"
# 「もしかして……会長は、私とじゃ嫌だったかしら？」
line = "「もしかして……会長は、私とじゃ嫌だったかしら？」"

[[dialogue]]
speaker = "セシア"
# 「――嫌じゃないけど、驚いてる？　なら、問題ないわね♪」
line = "「――嫌じゃないけど、驚いてる？　なら、問題ないわね♪」"

[[dialogue]]
speaker = "unk"
# そう言って、セシアは羽でふわりと浮くと――
line = "そう言って、セシアは羽でふわりと浮くと――"

[[dialogue]]
speaker = "セシア"
# 「……ちゅっ<emoji=heart04>」
line = "「……ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# っ！？
line = "っ！？"

[[dialogue]]
speaker = "セシア"
# 「会長はまだ心の準備ができていないみたいだから、今日のところは頬っぺたにしておくわ♪」
line = "「会長はまだ心の準備ができていないみたいだから、今日のところは頬っぺたにしておくわ♪」"

[[dialogue]]
speaker = "セシア"
# 「そういうわけで、また明日からもよろしくね、会長」
line = "「そういうわけで、また明日からもよろしくね、会長」"

[[dialogue]]
speaker = "unk"
# そう言って浮かべた大人びた笑顔に、俺はドキッとして。
line = "そう言って浮かべた大人びた笑顔に、俺はドキッとして。"

[[dialogue]]
speaker = "unk"
# 急にセシアを恋愛対象として意識し、顔が熱くなってしまうのだった――
line = "急にセシアを恋愛対象として意識し、顔が熱くなってしまうのだった――"
