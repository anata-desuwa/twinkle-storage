[[dialogue]]
speaker = "unk"
# 第８話,説得と後悔,B
line = "第８話,説得と後悔,B"

[[dialogue]]
speaker = "ルヴィネ"
# 「……ずいぶんと厄介な盾を使うようになったのね、魔王」
line = "「……ずいぶんと厄介な盾を使うようになったのね、魔王」"

[[dialogue]]
speaker = "クロト"
# 「君の方こそ、以前より遠慮がないな……！」
line = "「君の方こそ、以前より遠慮がないな……！」"

[[dialogue]]
speaker = "unk"
# ルヴィネの攻撃は、かつてデネブで相対した時とは比較にならない霊力が込められている。
line = "ルヴィネの攻撃は、かつてデネブで相対した時とは比較にならない霊力が込められている。"

[[dialogue]]
speaker = "unk"
# しかし天界でメルエルから受け取ったコード──『アルケインカオスクエーサー』のおかげで互角以上に渡り合えていた。
line = "しかし天界でメルエルから受け取ったコード──『アルケインカオスクエーサー』のおかげで互角以上に渡り合えていた。"

[[dialogue]]
speaker = "unk"
# 散々に苦しめられた、俺の身体で渦巻くリクリエの力を、逆に身を守る盾として形成する──カオスイージスの突破はルヴィネといえど容易ではない。
line = "散々に苦しめられた、俺の身体で渦巻くリクリエの力を、逆に身を守る盾として形成する──カオスイージスの突破はルヴィネといえど容易ではない。"

[[dialogue]]
speaker = "ルヴィネ"
# 「出し惜しみしている場合では、なさそうね──」
line = "「出し惜しみしている場合では、なさそうね──」"

[[dialogue]]
speaker = "unk"
# ルヴィネが手のひらに乗せた、ブラックホールを小型化させたような漆黒の球体──
line = "ルヴィネが手のひらに乗せた、ブラックホールを小型化させたような漆黒の球体──"

[[dialogue]]
speaker = "unk"
# ぞくり、と全身が粟立つ。ルヴィネが呼び出そうとしているのは、極星従騎でも使徒のシャドウでもない！
line = "ぞくり、と全身が粟立つ。ルヴィネが呼び出そうとしているのは、極星従騎でも使徒のシャドウでもない！"

[[dialogue]]
speaker = "クロト"
# 「まずい！　みんな、ルヴィネを止めるんだ──！！」
line = "「まずい！　みんな、ルヴィネを止めるんだ──！！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「もう遅いわ。あなたたちが集めたアルケインコードも、星騎士として身に着けた訓練の成果も、こいつの前では塵と同じ──」
line = "「もう遅いわ。あなたたちが集めたアルケインコードも、星騎士として身に着けた訓練の成果も、こいつの前では塵と同じ──」"

[[dialogue]]
speaker = "ルヴィネ"
# 「──来なさい。堕落せしベガの魔王……厄災の右腕！！」
line = "「──来なさい。堕落せしベガの魔王……厄災の右腕！！」"

[[dialogue]]
speaker = "unk"
# 現れてしまった。平行世界の俺──ディザスターハンド。
line = "現れてしまった。平行世界の俺──ディザスターハンド。"

[[dialogue]]
speaker = "unk"
# その破滅の拳の狙いは、一番近くにいたヴィーナス──！
line = "その破滅の拳の狙いは、一番近くにいたヴィーナス──！"

[[dialogue]]
speaker = "クロト"
# 「させるか──カオスイージスッ！！」
line = "「させるか──カオスイージスッ！！」"

[[dialogue]]
speaker = "unk"
# 不可視の防壁に、厄災の右腕がぶつかる──その瞬間、盾の展開のために掲げていた俺の腕に、凄まじい衝撃がぶつかる。
line = "不可視の防壁に、厄災の右腕がぶつかる──その瞬間、盾の展開のために掲げていた俺の腕に、凄まじい衝撃がぶつかる。"

[[dialogue]]
speaker = "クロト"
# 「ぐ、がぁッ──！？」
line = "「ぐ、がぁッ──！？」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「クロト、大丈夫っ！？」
line = "「クロト、大丈夫っ！？」"

[[dialogue]]
speaker = "クロト"
# 「あ、ああっ、通用するかと思ったんだけどな……」
line = "「あ、ああっ、通用するかと思ったんだけどな……」"

[[dialogue]]
speaker = "unk"
# 天界の神殿を受け止めた絶対の盾ですら、拮抗もできない……！
line = "天界の神殿を受け止めた絶対の盾ですら、拮抗もできない……！"

[[dialogue]]
speaker = "unk"
# 正面からぶつかるのを避け、攻撃をいなすことに集中しなければ──確実に腕を一本、持っていかれていた。
line = "正面からぶつかるのを避け、攻撃をいなすことに集中しなければ──確実に腕を一本、持っていかれていた。"

[[dialogue]]
speaker = "ルヴィネ"
# 「いい判断ね。流石だわ、緋宮クロト」
line = "「いい判断ね。流石だわ、緋宮クロト」"

[[dialogue]]
speaker = "unk"
# 今まで降臨すれば暴れまわるだけだったあの右腕が……ルヴィネの傍に控えている。まるで主人の命令を待つ獣のように──
line = "今まで降臨すれば暴れまわるだけだったあの右腕が……ルヴィネの傍に控えている。まるで主人の命令を待つ獣のように──"

[[dialogue]]
speaker = "ルヴィネ"
# 「この腕のコントロールにはずいぶん手を焼いたわ。でも、今はご覧のとおり」
line = "「この腕のコントロールにはずいぶん手を焼いたわ。でも、今はご覧のとおり」"

[[dialogue]]
speaker = "ルヴィネ"
# 「あなたたちはここで終わり。もう一切の手加減はないわ。行きなさい──ディザスターハンド」
line = "「あなたたちはここで終わり。もう一切の手加減はないわ。行きなさい──ディザスターハンド」"

[[dialogue]]
speaker = "クロト"
# 「あいつの攻撃は俺が逸らす！　みんな、ルヴィネへの攻撃を続けるんだ！！」
line = "「あいつの攻撃は俺が逸らす！　みんな、ルヴィネへの攻撃を続けるんだ！！」"

[[dialogue]]
speaker = "梨緒"
# 「倒しても倒しても使徒の影が湧き出てくる……大丈夫かアポロ？」
line = "「倒しても倒しても使徒の影が湧き出てくる……大丈夫かアポロ？」"

[[dialogue]]
speaker = "アポロ"
# 「……あたしなら平気だ。こんな幻影の言葉で、今さら悩んだりなんかしない。ヒーローになるって誓ったんだからな！」
line = "「……あたしなら平気だ。こんな幻影の言葉で、今さら悩んだりなんかしない。ヒーローになるって誓ったんだからな！」"

[[dialogue]]
speaker = "梨緒"
# 「頼もしいな。その意気だ」
line = "「頼もしいな。その意気だ」"

[[dialogue]]
speaker = "ジグ"
# 「しかし、まずい状況だね……魔王たちはまだルヴィネを止められていないらしい」
line = "「しかし、まずい状況だね……魔王たちはまだルヴィネを止められていないらしい」"

[[dialogue]]
speaker = "ジグ"
# 「このまま持久戦になれば、地上は勝ち目がないよ」
line = "「このまま持久戦になれば、地上は勝ち目がないよ」"

[[dialogue]]
speaker = "梨緒"
# 「わかっている──だが……」
line = "「わかっている──だが……」"

[[dialogue]]
speaker = "ジグ"
# 「いったい何人コレクションしてるんだ。趣味が悪いったらないね」
line = "「いったい何人コレクションしてるんだ。趣味が悪いったらないね」"

[[dialogue]]
speaker = "梨緒"
# 「……アポロ、ジグ。ここを離れて塔の頂上を目指せ」
line = "「……アポロ、ジグ。ここを離れて塔の頂上を目指せ」"

[[dialogue]]
speaker = "アポロ"
# 「っ！？　何言ってるんだ、３人でもやっとなのに……！」
line = "「っ！？　何言ってるんだ、３人でもやっとなのに……！」"

[[dialogue]]
speaker = "梨緒"
# 「このままだとジリ貧だ。ルヴィネを止めない限り、いずれ押し切られる」
line = "「このままだとジリ貧だ。ルヴィネを止めない限り、いずれ押し切られる」"

[[dialogue]]
speaker = "梨緒"
# 「それに私は１人じゃない。どうやら、ノルンを介してベガの守護星から力を受け取れば、『天蓋』を回避できるようだ」
line = "「それに私は１人じゃない。どうやら、ノルンを介してベガの守護星から力を受け取れば、『天蓋』を回避できるようだ」"

[[dialogue]]
speaker = "梨緒"
# 「偽ジグの『天機の星眼』も相殺したうえで、今の私なら上回れるだろう。要するに、相性がいい」
line = "「偽ジグの『天機の星眼』も相殺したうえで、今の私なら上回れるだろう。要するに、相性がいい」"

[[dialogue]]
speaker = "梨緒"
# 「だから学園周辺の使徒は、私１人で殲滅する──フィオナも連れて行っていい。ここは全て私に任せろ」
line = "「だから学園周辺の使徒は、私１人で殲滅する──フィオナも連れて行っていい。ここは全て私に任せろ」"

[[dialogue]]
speaker = "ジグ"
# 「……わかった。私の星眼は今、不完全だ。連続使用もできない。<ruby=しんがり>殿</ruby>を務めるなら、アガサが適任だね」
line = "「……わかった。私の星眼は今、不完全だ。連続使用もできない。<ruby>殿<rt>しんがり</rt></ruby>を務めるなら、アガサが適任だね」"

[[dialogue]]
speaker = "アポロ"
# 「おい、ジグ……！？」
line = "「おい、ジグ……！？」"

[[dialogue]]
speaker = "ジグ"
# 「女の決めた覚悟にやいやい言うのは無粋だよ、アポロ」
line = "「女の決めた覚悟にやいやい言うのは無粋だよ、アポロ」"

[[dialogue]]
speaker = "ジグ"
# 「塔の頂上に向かう──アガサはしっかり、私の幻影相手に白星を稼ぐといい」
line = "「塔の頂上に向かう──アガサはしっかり、私の幻影相手に白星を稼ぐといい」"

[[dialogue]]
speaker = "梨緒"
# 「馬鹿を言うな。こんな模造品に、本物のジグの代わりが務まるとでも？」
line = "「馬鹿を言うな。こんな模造品に、本物のジグの代わりが務まるとでも？」"

[[dialogue]]
speaker = "アポロ"
# 「…………死ぬなよ」
line = "「…………死ぬなよ」"

[[dialogue]]
speaker = "梨緒"
# 「当たり前だ。ジグに負け越したまま、逝くわけにはいかない」
line = "「当たり前だ。ジグに負け越したまま、逝くわけにはいかない」"

[[dialogue]]
speaker = "unk"
# ──アポロとジグがその場から離れ、梨緒だけが残された。
line = "──アポロとジグがその場から離れ、梨緒だけが残された。"

[[dialogue]]
speaker = "梨緒"
# 「守護天使ノルン──もう一度力を貸してくれ」
line = "「守護天使ノルン──もう一度力を貸してくれ」"

[[dialogue]]
speaker = "梨緒"
# 「アルタイルを……ベガの二の舞にはさせない！！」
line = "「アルタイルを……ベガの二の舞にはさせない！！」"

[[dialogue]]
speaker = "unk"
# ディザスターハンドの苛烈な攻撃をカオスイージスでいなしつつ、隙を見て攻撃を畳み込む。
line = "ディザスターハンドの苛烈な攻撃をカオスイージスでいなしつつ、隙を見て攻撃を畳み込む。"

[[dialogue]]
speaker = "unk"
# 何度も何度も吹き飛ばされ、ダメージが蓄積していく。けれど──それは膝を折る理由にはならない。
line = "何度も何度も吹き飛ばされ、ダメージが蓄積していく。けれど──それは膝を折る理由にはならない。"

[[dialogue]]
speaker = "ルヴィネ"
# 「傷ついて倒れるたびに、星力がより練り上げられて息を吹き返す……話には聞いていたけれど、出鱈目な能力ね」
line = "「傷ついて倒れるたびに、星力がより練り上げられて息を吹き返す……話には聞いていたけれど、出鱈目な能力ね」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……けれどその意地も、いつまでもつかしら？」
line = "「……けれどその意地も、いつまでもつかしら？」"

[[dialogue]]
speaker = "クロト"
# 「何度でも試せばいい。俺はそのたびに立ち上がって、ルヴィネ──君にリクリエをやめさせてみせる！！」
line = "「何度でも試せばいい。俺はそのたびに立ち上がって、ルヴィネ──君にリクリエをやめさせてみせる！！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……くだらない。聞き飽きたわ、その言葉は」
line = "「……くだらない。聞き飽きたわ、その言葉は」"

[[dialogue]]
speaker = "unk"
# 戦いのさなかにわかってきたことがある──
line = "戦いのさなかにわかってきたことがある──"

[[dialogue]]
speaker = "unk"
# ルヴィネは相当量の霊力で、無理やりにディザスターハンドを縛り付け、操っている様子だ。
line = "ルヴィネは相当量の霊力で、無理やりにディザスターハンドを縛り付け、操っている様子だ。"

[[dialogue]]
speaker = "unk"
# 簡単で明快な命令しか行えていない、そして彼女自身の消耗も激しい──だからこそ。
line = "簡単で明快な命令しか行えていない、そして彼女自身の消耗も激しい──だからこそ。"

[[dialogue]]
speaker = "ルヴィネ"
# 「くっ……！」
line = "「くっ……！」"

[[dialogue]]
speaker = "unk"
# 少しずつルヴィネ本体に俺の攻撃が通る機会も増えてきた。
line = "少しずつルヴィネ本体に俺の攻撃が通る機会も増えてきた。"

[[dialogue]]
speaker = "クロト"
# 「どうして極星のみんなにあんな言葉をかけられる！？　今の世界を諦めて、次の世界を始めようだなんて……どうして！！」
line = "「どうして極星のみんなにあんな言葉をかけられる！？　今の世界を諦めて、次の世界を始めようだなんて……どうして！！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「私ができるせめてものお礼とお詫びだからよ。今まであの子たちは、本当によく働いてくれた」
line = "「私ができるせめてものお礼とお詫びだからよ。今まであの子たちは、本当によく働いてくれた」"

[[dialogue]]
speaker = "ルヴィネ"
# 「あれだけ尽くしてくれたのだから、世界の滅びに際して、特別に温情を授けようと思った……何かおかしなことがある？」
line = "「あれだけ尽くしてくれたのだから、世界の滅びに際して、特別に温情を授けようと思った……何かおかしなことがある？」"

[[dialogue]]
speaker = "クロト"
# 「ふざけるな──！！」
line = "「ふざけるな──！！」"

[[dialogue]]
speaker = "クロト"
# 「彼女たちが今、どうして俺たちアルタイルに協力してくれていると思う！？」
line = "「彼女たちが今、どうして俺たちアルタイルに協力してくれていると思う！？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「私がリクリエを起こす敵だと知ったからでしょう？」
line = "「私がリクリエを起こす敵だと知ったからでしょう？」"

[[dialogue]]
speaker = "クロト"
# 「違う──未来を知ったからだ！　ジグが星眼で見た未来を……！！」
line = "「違う──未来を知ったからだ！　ジグが星眼で見た未来を……！！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「そういうこと。滅びの未来を視たのね。死にたくないと思うのは、ヒトとしてとても自然なことだわ」
line = "「そういうこと。滅びの未来を視たのね。死にたくないと思うのは、ヒトとしてとても自然なことだわ」"

[[dialogue]]
speaker = "クロト"
# 「アルタイルは滅びない！　ルヴィネ！　視たのは君が死ぬ未来だ！！」
line = "「アルタイルは滅びない！　ルヴィネ！　視たのは君が死ぬ未来だ！！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……っ！？」
line = "「……っ！？」"

[[dialogue]]
speaker = "クロト"
# 「このままリクリエを推し進めると……君は死んでしまう！　事切れた君のそばに駆け寄る、極星のみんな……それがジグの視たビジョンだ！」
line = "「このままリクリエを推し進めると……君は死んでしまう！　事切れた君のそばに駆け寄る、極星のみんな……それがジグの視たビジョンだ！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「そんな嘘で、私を惑わせるつもり？」
line = "「そんな嘘で、私を惑わせるつもり？」"

[[dialogue]]
speaker = "クロト"
# 「こんな嘘を今さら吐いて、何の意味がある！？」
line = "「こんな嘘を今さら吐いて、何の意味がある！？」"

[[dialogue]]
speaker = "クロト"
# 「極星のみんなは、君の未来を変えたいと思った！　俺たちの言葉を信じて、君を救うためにここまで来たんだ……！！」
line = "「極星のみんなは、君の未来を変えたいと思った！　俺たちの言葉を信じて、君を救うためにここまで来たんだ……！！」"

[[dialogue]]
speaker = "クロト"
# 「女神の幼体としての君の言葉なんて、聞きたくもない！」
line = "「女神の幼体としての君の言葉なんて、聞きたくもない！」"

[[dialogue]]
speaker = "クロト"
# 「極星のみんなと１０年を共に過ごした、１人の天使として話をしろ！！」
line = "「極星のみんなと１０年を共に過ごした、１人の天使として話をしろ！！」"

[[dialogue]]
speaker = "クロト"
# 「極星のみんなと１０年を共に過ごした、１人の天使として話をしろ！！」
line = "「極星のみんなと１０年を共に過ごした、１人の天使として話をしろ！！」"

[[dialogue]]
speaker = "ルヴィネ"
# （……うるさい）
line = "（……うるさい）"

[[dialogue]]
speaker = "クロト"
# 「君と彼女たちの過去を聞いた……かけがえのない時間だったんじゃないのか！？」
line = "「君と彼女たちの過去を聞いた……かけがえのない時間だったんじゃないのか！？」"

[[dialogue]]
speaker = "ルヴィネ"
# （……うるさい、うるさい）
line = "（……うるさい、うるさい）"

[[dialogue]]
speaker = "クロト"
# 「懐柔するために演技していた！？　そんな言葉、誰も信じていない！！」
line = "「懐柔するために演技していた！？　そんな言葉、誰も信じていない！！」"

[[dialogue]]
speaker = "ルヴィネ"
# （うるさいうるさいうるさい──）
line = "（うるさいうるさいうるさい──）"

[[dialogue]]
speaker = "クロト"
# 「みんな、君が好きなんだ！　大切な君に世界を滅ぼして欲しくない、今までどおり一緒に過ごしたいって……！」
line = "「みんな、君が好きなんだ！　大切な君に世界を滅ぼして欲しくない、今までどおり一緒に過ごしたいって……！」"

[[dialogue]]
speaker = "ルヴィネ"
# （──うるさい！！）
line = "（──うるさい！！）"

[[dialogue]]
speaker = "クロト"
# 「リクリエなんて起こさなくたって、世界は前に進んでいる！」
line = "「リクリエなんて起こさなくたって、世界は前に進んでいる！」"

[[dialogue]]
speaker = "クロト"
# 「これまでどおり一緒に過ごしたい──その言葉を彼女たちは待っているんだぞ！！」
line = "「これまでどおり一緒に過ごしたい──その言葉を彼女たちは待っているんだぞ！！」"

[[dialogue]]
speaker = "クロト"
# 「今からでも間に合う──ルヴィネ！！！」
line = "「今からでも間に合う──ルヴィネ！！！」"

[[dialogue]]
speaker = "ルヴィネ"
# （──間に合う？）
line = "（──間に合う？）"

[[dialogue]]
speaker = "ルヴィネ"
# （…………そんなわけ、ないじゃない）
line = "（…………そんなわけ、ないじゃない）"

[[dialogue]]
speaker = "ルヴィネ"
# 「ベアトたちを騙して、ここまでのことをして──何の成果も出せませんでした、では済まないのよ！！」
line = "「ベアトたちを騙して、ここまでのことをして──何の成果も出せませんでした、では済まないのよ！！」"

[[dialogue]]
speaker = "unk"
# 厄災の右腕に命じる──手加減はいらない。
line = "厄災の右腕に命じる──手加減はいらない。"

[[dialogue]]
speaker = "ルヴィネ"
# 「その口を、閉じなさい──！！」
line = "「その口を、閉じなさい──！！」"

[[dialogue]]
speaker = "unk"
# この諦めの悪い魔王を、今すぐ、私の眼の前から消す──！
line = "この諦めの悪い魔王を、今すぐ、私の眼の前から消す──！"

[[dialogue]]
speaker = "ベアトリス"
# 「もうやめてっ、ルヴィ──！！！」
line = "「もうやめてっ、ルヴィ──！！！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「ベアトッ……！？」
line = "「ベアトッ……！？」"

[[dialogue]]
speaker = "unk"
# 魔王を庇うようにして、ベアトが割って入ってきた。
line = "魔王を庇うようにして、ベアトが割って入ってきた。"

[[dialogue]]
speaker = "unk"
# ディザスターハンドへの指示はすでに出している──止められない。
line = "ディザスターハンドへの指示はすでに出している──止められない。"

[[dialogue]]
speaker = "unk"
# 私の命令で、絶命必至の一撃が飛んでいく。
line = "私の命令で、絶命必至の一撃が飛んでいく。"

[[dialogue]]
speaker = "ルヴィネ"
# 「──やっ、やめなさい！　止まりなさい！！　待って！　お願い──！」
line = "「──やっ、やめなさい！　止まりなさい！！　待って！　お願い──！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「──────やめて！！！！！」
line = "「──────やめて！！！！！」"

[[dialogue]]
speaker = "unk"
# そうして厄災の右腕の攻撃は──実行された。
line = "そうして厄災の右腕の攻撃は──実行された。"
