[[dialogue]]
speaker = "unk"
# 第４話,悪との付き合い方,P
line = "第４話,悪との付き合い方,P"

[[dialogue]]
speaker = "unk"
# マインの『悪いこと』をしたいという発作を知った俺は、定期的に『何でも言うことを聞く日』を作って、ストレス解消に付き合うようになっていたのだが――
line = "マインの『悪いこと』をしたいという発作を知った俺は、定期的に『何でも言うことを聞く日』を作って、ストレス解消に付き合うようになっていたのだが――"

[[dialogue]]
speaker = "ネーゼマイン"
# 「いや～、今更だけど、我ながら予想外だったな～。まさか会長と、こんな風に２人で出かけたりするようになるなんてね」
line = "「いや～、今更だけど、我ながら予想外だったな～。まさか会長と、こんな風に２人で出かけたりするようになるなんてね」"

[[dialogue]]
speaker = "unk"
# 言っておくけど、正義感とかじゃないから
line = "言っておくけど、正義感とかじゃないから"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひ♪　最初の頃はそうかなって思ってたけど、ここまで飽きもせず付き合うんだもんな～」
line = "「にひひ♪　最初の頃はそうかなって思ってたけど、ここまで飽きもせず付き合うんだもんな～」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「それとも、私と遊んでいるうちに、マゾに目覚めちゃったとか？」
line = "「それとも、私と遊んでいるうちに、マゾに目覚めちゃったとか？」"

[[dialogue]]
speaker = "unk"
# 責任を取って貰わないとな
line = "責任を取って貰わないとな"

[[dialogue]]
speaker = "ネーゼマイン"
# 「きゃははは♪　会長も言うようになったね～」
line = "「きゃははは♪　会長も言うようになったね～」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「なら、お言葉に甘えて、今日も私のストレス解消に付き合ってもらうから♪」
line = "「なら、お言葉に甘えて、今日も私のストレス解消に付き合ってもらうから♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ん？　何故今日は外に出掛けるのか？　はは～ん、さては会長、いつもみたいに室内で２人きりの方が良かったのかな？　もう、変態さんなんだから～♪」
line = "「ん？　何故今日は外に出掛けるのか？　はは～ん、さては会長、いつもみたいに室内で２人きりの方が良かったのかな？　もう、変態さんなんだから～♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「きゃははっ、嘘ウソ♪　別に会長との『ごっこ遊び』に飽きたわけじゃないよ。ただ今日は、試したいことがあってね☆　それじゃあ、しゅっぱ～つ♪」
line = "「きゃははっ、嘘ウソ♪　別に会長との『ごっこ遊び』に飽きたわけじゃないよ。ただ今日は、試したいことがあってね☆　それじゃあ、しゅっぱ～つ♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「見て見て、会長。この服良くない？　病みかわいい～♪」
line = "「見て見て、会長。この服良くない？　病みかわいい～♪」"

[[dialogue]]
speaker = "unk"
# マインはそれ系好きだよな
line = "マインはそれ系好きだよな"

[[dialogue]]
speaker = "ネーゼマイン"
# 「まぁね～。といっても、私はセナリィのゴシック趣味に比べれば、ニワカみたいなものだけど。好きっていうよりも、悪くないっていう感覚かな」
line = "「まぁね～。といっても、私はセナリィのゴシック趣味に比べれば、ニワカみたいなものだけど。好きっていうよりも、悪くないっていう感覚かな」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ちょっと病んでる風のデザインが心惹かれるかな～？　でも一般的かどうかはともかく、可愛いの範疇でしょ？　会長的にはどう？」
line = "「ちょっと病んでる風のデザインが心惹かれるかな～？　でも一般的かどうかはともかく、可愛いの範疇でしょ？　会長的にはどう？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひ、会長が似合うって言うなら、この服試着してみようかな♪　あっ、そうだ、会長も試着室入る？　着替え手伝って貰うのも、面白そうかも♪」
line = "「にひひ、会長が似合うって言うなら、この服試着してみようかな♪　あっ、そうだ、会長も試着室入る？　着替え手伝って貰うのも、面白そうかも♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「あ～！　今、少し否定するまでに間があったぞ～？　スケベな妄想したでしょ～？　きゃはははは♪」
line = "「あ～！　今、少し否定するまでに間があったぞ～？　スケベな妄想したでしょ～？　きゃはははは♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ん～、やっぱここの四川麻婆豆腐は、心トキめくよ～<emoji=heart04>」
line = "「ん～、やっぱここの四川麻婆豆腐は、心トキめくよ～<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 麻婆豆腐が好物だったのか
line = "麻婆豆腐が好物だったのか"

[[dialogue]]
speaker = "ネーゼマイン"
# 「市販の麻婆豆腐は別に好きじゃないんだけどね。ここのは特別。１度食べたら忘れられなくて、もう病みつきなんだよね～」
line = "「市販の麻婆豆腐は別に好きじゃないんだけどね。ここのは特別。１度食べたら忘れられなくて、もう病みつきなんだよね～」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ほら、会長も食べて食べて。１口食べてみれば分かるから！」
line = "「ほら、会長も食べて食べて。１口食べてみれば分かるから！」"

[[dialogue]]
speaker = "unk"
# これ、美味しいけど激辛！！！
line = "これ、美味しいけど激辛！！！"

[[dialogue]]
speaker = "unk"
# か、辛ぁぁぁあああ――――――ッ！！？
line = "か、辛ぁぁぁあああ――――――ッ！！？"

[[dialogue]]
speaker = "ネーゼマイン"
# 「きゃははははは！　会長の反応、めっちゃ良い！　ゾクゾクして写真撮る手が止まらないよ～！」
line = "「きゃははははは！　会長の反応、めっちゃ良い！　ゾクゾクして写真撮る手が止まらないよ～！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ここの激辛麻婆豆腐、心をグサッと貫くような辛さなんだよね～。それでいて、ただ辛さを盛っただけとは違う、試行錯誤の果てに作り上げたであろう上質な旨味！」
line = "「ここの激辛麻婆豆腐、心をグサッと貫くような辛さなんだよね～。それでいて、ただ辛さを盛っただけとは違う、試行錯誤の果てに作り上げたであろう上質な旨味！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「これを初めて食べた時、私は辛さこそ至高の味覚だと知ったよ。それ以来、心トキめく激辛料理を探して、食べ歩くのが趣味なんだ～」
line = "「これを初めて食べた時、私は辛さこそ至高の味覚だと知ったよ。それ以来、心トキめく激辛料理を探して、食べ歩くのが趣味なんだ～」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「てなわけで、会長。冷めないうちにどんどん食べてね♪　大丈夫、どうしても無理な時は、後で私がしっかり頂いちゃうから。それまでは……にひひ♪」
line = "「てなわけで、会長。冷めないうちにどんどん食べてね♪　大丈夫、どうしても無理な時は、後で私がしっかり頂いちゃうから。それまでは……にひひ♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「いや～、会長の限界ギリギリな表情、いっぱい堪能させてもらっちゃった～♪　でもまさか、完食しちゃうなんて驚いたよ」
line = "「いや～、会長の限界ギリギリな表情、いっぱい堪能させてもらっちゃった～♪　でもまさか、完食しちゃうなんて驚いたよ」"

[[dialogue]]
speaker = "unk"
# でも、確かに滅茶苦茶美味しかった
line = "でも、確かに滅茶苦茶美味しかった"

[[dialogue]]
speaker = "unk"
# か、辛さで死ぬかと思った……
line = "か、辛さで死ぬかと思った……"

[[dialogue]]
speaker = "ネーゼマイン"
# 「そっか～、美味しかったのか～。ならまた今度、一緒に行く？　きゃはははっ、その苦い顔！　ひーっ、今日は笑い過ぎて、お腹痛い♪」
line = "「そっか～、美味しかったのか～。ならまた今度、一緒に行く？　きゃはははっ、その苦い顔！　ひーっ、今日は笑い過ぎて、お腹痛い♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「……ふぅ、ひとしきり笑ったところで、次はどこ行こっか？　最近話題のホラー映画を観るのもいいし～、ゲームセンターで遊ぶのも捨て難いな～」
line = "「……ふぅ、ひとしきり笑ったところで、次はどこ行こっか？　最近話題のホラー映画を観るのもいいし～、ゲームセンターで遊ぶのも捨て難いな～」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「とりあえず、歩きながら決めよっか。休日なのもあって、さすがにこの辺りは人多いよね～」
line = "「とりあえず、歩きながら決めよっか。休日なのもあって、さすがにこの辺りは人多いよね～」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「私さ、悪戯好きだから、ついつい思っちゃうんだよね～。こういう人ごみの中で、周りにバレないように恥ずかしいことをするのって良くない？」
line = "「私さ、悪戯好きだから、ついつい思っちゃうんだよね～。こういう人ごみの中で、周りにバレないように恥ずかしいことをするのって良くない？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「例えばこうやって、人ごみを利用して体を密着したり……耳元で小声で喋ったりとか……<emoji=heart04>」
line = "「例えばこうやって、人ごみを利用して体を密着したり……耳元で小声で喋ったりとか……<emoji=heart04>」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「下の方で、こっそり手を繋いでみたりとか……ね<emoji=heart04>　にひひ……♪」
line = "「下の方で、こっそり手を繋いでみたりとか……ね<emoji=heart04>　にひひ……♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「会長、ひょっとしてドキドキしてる？　顔赤いよ？　激辛麻婆豆腐のせい？　ふふっ……そういうことにしておいてあげる♪」
line = "「会長、ひょっとしてドキドキしてる？　顔赤いよ？　激辛麻婆豆腐のせい？　ふふっ……そういうことにしておいてあげる♪」"

[[dialogue]]
speaker = "unk"
# （どちらかというと、デートな気が……）
line = "（どちらかというと、デートな気が……）"

[[dialogue]]
speaker = "unk"
# （今更だけど、今日のこれって）
line = "（今更だけど、今日のこれって）"

[[dialogue]]
speaker = "ネーゼマイン"
# 「なに、会長？　私の顔、じーっと見て。改めて異性として意識しちゃった？　にひひ♪」
line = "「なに、会長？　私の顔、じーっと見て。改めて異性として意識しちゃった？　にひひ♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「何でもないって、え～？　気になるな～。正直に吐かないなら、脇腹くすぐっちゃおうかな～？　つんつん<emoji=heart04>」
line = "「何でもないって、え～？　気になるな～。正直に吐かないなら、脇腹くすぐっちゃおうかな～？　つんつん<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 『悪いこと』の発散は……出来てる？
line = "『悪いこと』の発散は……出来てる？"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ん？　ああ、そういうことね。うん、大丈夫だよ」
line = "「ん？　ああ、そういうことね。うん、大丈夫だよ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「私は会長となら、普通の女の子みたいなデートが楽しめるのかって実験だったんだけど」
line = "「私は会長となら、普通の女の子みたいなデートが楽しめるのかって実験だったんだけど」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「気のせいじゃなかったみたい。だって、みんなの星徒会長様を私が独占出来てるんだもん――」
line = "「気のせいじゃなかったみたい。だって、みんなの星徒会長様を私が独占出来てるんだもん――」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「今、すっごく悪いことをしてる気分だよ♪　にひひ♪」
line = "「今、すっごく悪いことをしてる気分だよ♪　にひひ♪」"

[[dialogue]]
speaker = "unk"
# そう言ってマインは、心から楽しそうに、年頃の女の子らしい可愛い笑顔を浮かべるのだった。
line = "そう言ってマインは、心から楽しそうに、年頃の女の子らしい可愛い笑顔を浮かべるのだった。"
