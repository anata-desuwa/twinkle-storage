[[dialogue]]
speaker = "unk"
# 第１話,お母さんの訪問,P
line = "第１話,お母さんの訪問,P"

[[dialogue]]
speaker = "unk"
# 今日の放課後は星徒会室で書類仕事だ。分量を考えるだけで憂鬱になるけど、頑張らないとな──
line = "今日の放課後は星徒会室で書類仕事だ。分量を考えるだけで憂鬱になるけど、頑張らないとな──"

[[dialogue]]
speaker = "リノ"
# 「おはようございます、会長。本日の業務は何でしょうか？」
line = "「おはようございます、会長。本日の業務は何でしょうか？」"

[[dialogue]]
speaker = "リノ"
# 「あ、私は緋宮リノと言います。リクリエに対抗するために、今日も頑張っていきましょう！」
line = "「あ、私は緋宮リノと言います。リクリエに対抗するために、今日も頑張っていきましょう！」"

[[dialogue]]
speaker = "unk"
# 母さんがどうしてここに！？
line = "母さんがどうしてここに！？"

[[dialogue]]
speaker = "リノ"
# 「むー。つまんない反応ね。お母さんが星術の研究をしてるのは知ってるでしょ？　今日はお仕事で学園にお邪魔してたのよ」
line = "「むー。つまんない反応ね。お母さんが星術の研究をしてるのは知ってるでしょ？　今日はお仕事で学園にお邪魔してたのよ」"

[[dialogue]]
speaker = "リノ"
# 「トワ先生やエスメラルダ先生と一緒に、最新の研究レポートの共有とか、ディスカッションとかしてたの。実りのある時間だったわね♪」
line = "「トワ先生やエスメラルダ先生と一緒に、最新の研究レポートの共有とか、ディスカッションとかしてたの。実りのある時間だったわね♪」"

[[dialogue]]
speaker = "unk"
# ──そういえば、母さんの服装も仕事に行く時のものだ。
line = "──そういえば、母さんの服装も仕事に行く時のものだ。"

[[dialogue]]
speaker = "unk"
# 在宅で仕事をしていることも多いし、俺が帰るといつも家にいるイメージがあるけれど、母さんは星術の研究職に就いている。
line = "在宅で仕事をしていることも多いし、俺が帰るといつも家にいるイメージがあるけれど、母さんは星術の研究職に就いている。"

[[dialogue]]
speaker = "unk"
# その界隈ではかなり有名な研究者らしいのだけど、俺はその分野に明るくないため詳しくは知らない。
line = "その界隈ではかなり有名な研究者らしいのだけど、俺はその分野に明るくないため詳しくは知らない。"

[[dialogue]]
speaker = "unk"
# それにしても、仕事着を着るとかなり雰囲気が変わるなぁ……
line = "それにしても、仕事着を着るとかなり雰囲気が変わるなぁ……"

[[dialogue]]
speaker = "リノ"
# 「──で、帰る前に、ついでに息子の学園生活も見ておきたいな～って思ったの。それでお邪魔したってわけ」
line = "「──で、帰る前に、ついでに息子の学園生活も見ておきたいな～って思ったの。それでお邪魔したってわけ」"

[[dialogue]]
speaker = "unk"
# 部外者は勝手に入ったらダメだよ
line = "部外者は勝手に入ったらダメだよ"

[[dialogue]]
speaker = "アナ"
# 「しゅわっち。私が許可しました。廊下でばったりあったので、お誘いした次第です」
line = "「しゅわっち。私が許可しました。廊下でばったりあったので、お誘いした次第です」"

[[dialogue]]
speaker = "リノ"
# 「正式にお誘いされたのよ？　いくら会長の母親だからって無断で入ったりしないわよ～」
line = "「正式にお誘いされたのよ？　いくら会長の母親だからって無断で入ったりしないわよ～」"

[[dialogue]]
speaker = "アナ"
# 「リノさんは星術研究において目覚ましい論文をいくつも発表しています」
line = "「リノさんは星術研究において目覚ましい論文をいくつも発表しています」"

[[dialogue]]
speaker = "アナ"
# 「専門家の視点から様々な意見をお伺いしたいと思い、星徒会にお招きしました」
line = "「専門家の視点から様々な意見をお伺いしたいと思い、星徒会にお招きしました」"

[[dialogue]]
speaker = "unk"
# 机の上に和菓子があるけど……？
line = "机の上に和菓子があるけど……？"

[[dialogue]]
speaker = "アナ"
# 「リノさんにいただいたものですが、決して和菓子に釣られたわけではありません。純粋に学術研究の目的のためです」
line = "「リノさんにいただいたものですが、決して和菓子に釣られたわけではありません。純粋に学術研究の目的のためです」"

[[dialogue]]
speaker = "unk"
# きっと和菓子に釣られたんだろうなあと思いつつ──モンスターの対策のために有意義な話ができるのならいいことだ。
line = "きっと和菓子に釣られたんだろうなあと思いつつ──モンスターの対策のために有意義な話ができるのならいいことだ。"

[[dialogue]]
speaker = "unk"
# もう少し待てば他の星徒会メンバーもやってくるだろうし。俺も書類仕事をしながら、耳を傾けておくことにしよう──
line = "もう少し待てば他の星徒会メンバーもやってくるだろうし。俺も書類仕事をしながら、耳を傾けておくことにしよう──"

[[dialogue]]
speaker = "リノ"
# 「でねでね！　これがまだ小さい頃のクロトよ！　か～～～わいいでしょ～っ！」
line = "「でねでね！　これがまだ小さい頃のクロトよ！　か～～～わいいでしょ～っ！」"

[[dialogue]]
speaker = "アナ"
# 「確かにキュート。女の子みたいです」
line = "「確かにキュート。女の子みたいです」"

[[dialogue]]
speaker = "マトイ"
# 「本当だ！　う、うちの弟と同じくらい可愛い……！」
line = "「本当だ！　う、うちの弟と同じくらい可愛い……！」"

[[dialogue]]
speaker = "リノ"
# 「見た目は可愛いけどすっごくわんぱくだったのよ。ほら、こっちの写真。膝に絆創膏あるでしょ？　走り回ってはよく転んでね～」
line = "「見た目は可愛いけどすっごくわんぱくだったのよ。ほら、こっちの写真。膝に絆創膏あるでしょ？　走り回ってはよく転んでね～」"

[[dialogue]]
speaker = "unk"
# 星術のレクチャーどこ行った！？
line = "星術のレクチャーどこ行った！？"

[[dialogue]]
speaker = "リノ"
# 「もー、そんなにカリカリしないの。このお喋りが終わったらちゃーんと真面目な話もするんだから」
line = "「もー、そんなにカリカリしないの。このお喋りが終わったらちゃーんと真面目な話もするんだから」"

[[dialogue]]
speaker = "リノ"
# 「それよりそっち。ずいぶん書類が溜まってるわね？　うちの子、整理整頓は苦手だし……アナちゃん、迷惑かけてないかしら？」
line = "「それよりそっち。ずいぶん書類が溜まってるわね？　うちの子、整理整頓は苦手だし……アナちゃん、迷惑かけてないかしら？」"

[[dialogue]]
speaker = "アナ"
# 「ノープロブレム。むしろ会長は、前会長よりも格段に書類仕事が得意なので、私の仕事も減りました」
line = "「ノープロブレム。むしろ会長は、前会長よりも格段に書類仕事が得意なので、私の仕事も減りました」"

[[dialogue]]
speaker = "マトイ"
# 「あはは……そうだね。ヴィーナスはお仕事ほっぽり出して、すぐどこかに行っちゃってたし……」
line = "「あはは……そうだね。ヴィーナスはお仕事ほっぽり出して、すぐどこかに行っちゃってたし……」"

[[dialogue]]
speaker = "リノ"
# 「それなら良かったわ。この子が会長就任って聞いたときは不安だったけれど、ちゃんとしてるのなら安心ね」
line = "「それなら良かったわ。この子が会長就任って聞いたときは不安だったけれど、ちゃんとしてるのなら安心ね」"

[[dialogue]]
speaker = "リノ"
# 「じゃあお母さんも真面目にお話しようかしら。これでも学者としてそれなりだし、何でも聞いてね♪」
line = "「じゃあお母さんも真面目にお話しようかしら。これでも学者としてそれなりだし、何でも聞いてね♪」"

[[dialogue]]
speaker = "アナ"
# 「では、子供の時代の会長の写真を、もっとプリーズ」
line = "「では、子供の時代の会長の写真を、もっとプリーズ」"

[[dialogue]]
speaker = "リノ"
# 「あー！　それ聞いちゃう！？　聞いちゃうのね！？　ふふふっ、言っておくけど、とっておきはさっきの数倍イケるわよ！」
line = "「あー！　それ聞いちゃう！？　聞いちゃうのね！？　ふふふっ、言っておくけど、とっておきはさっきの数倍イケるわよ！」"

[[dialogue]]
speaker = "リノ"
# 「もー可愛くって可愛くって！　これから見せるのは、さっきのよりもっと幼い頃の写真なんだけど──」
line = "「もー可愛くって可愛くって！　これから見せるのは、さっきのよりもっと幼い頃の写真なんだけど──」"

[[dialogue]]
speaker = "リノ"
# 「あの伝説のセリフ……『将来はお母さんと結婚する』をこの時、言ってくれたのよ～！！」
line = "「あの伝説のセリフ……『将来はお母さんと結婚する』をこの時、言ってくれたのよ～！！」"

[[dialogue]]
speaker = "マトイ"
# 「そそそ、そんなことがっ！？　まさかのプロポーズ！？」
line = "「そそそ、そんなことがっ！？　まさかのプロポーズ！？」"

[[dialogue]]
speaker = "unk"
# 言ってないから！！
line = "言ってないから！！"

[[dialogue]]
speaker = "リノ"
# 「証拠の音声データがありまーす。ＤＩＳＣを新調するたびにバックアップもばっちりでーす」
line = "「証拠の音声データがありまーす。ＤＩＳＣを新調するたびにバックアップもばっちりでーす」"

[[dialogue]]
speaker = "アナ"
# 「ぜひ聞きたい。お茶請けもあります、準備は万端」
line = "「ぜひ聞きたい。お茶請けもあります、準備は万端」"

[[dialogue]]
speaker = "マトイ"
# 「わくわく、わくわく……！」
line = "「わくわく、わくわく……！」"

[[dialogue]]
speaker = "unk"
# 仕事を、しろーーー！！
line = "仕事を、しろーーー！！"

[[dialogue]]
speaker = "unk"
# わざわざ星徒会室にまでやってきて親バカを発揮した母さん。
line = "わざわざ星徒会室にまでやってきて親バカを発揮した母さん。"

[[dialogue]]
speaker = "unk"
# この後、ヴィーナスとサーシャさんもやってきて、俺の幼少期の頃の画像は母さんの息子自慢と一緒に赤裸々に公開されたのだった。
line = "この後、ヴィーナスとサーシャさんもやってきて、俺の幼少期の頃の画像は母さんの息子自慢と一緒に赤裸々に公開されたのだった。"

[[dialogue]]
speaker = "unk"
# 本当に何をしに来たんだよ、母さん……
line = "本当に何をしに来たんだよ、母さん……"
