[[dialogue]]
speaker = "unk"
# 俺たちは初詣をする為に、大きな門をくぐって、敷地内へ足を踏み入れた――
line = "俺たちは初詣をする為に、大きな門をくぐって、敷地内へ足を踏み入れた――"

[[dialogue]]
speaker = "ウズメイア"
# 「おぉ～！　これが元旦のお寺！　すごい沢山の人が来てて、めっちゃテンション上がるんだけど～♪」
line = "「おぉ～！　これが元旦のお寺！　すごい沢山の人が来てて、めっちゃテンション上がるんだけど～♪」"

[[dialogue]]
speaker = "unk"
# そっか。ウズメは初詣、初めてなのか
line = "そっか。ウズメは初詣、初めてなのか"

[[dialogue]]
speaker = "ウズメイア"
# 「うん！　去年の春、人間界に来るまでは天界にいたしね～」
line = "「うん！　去年の春、人間界に来るまでは天界にいたしね～」"

[[dialogue]]
speaker = "ソフィア"
# 「ウズメさんは１年と経たず、すっかり日本に染まっちゃいましたね」
line = "「ウズメさんは１年と経たず、すっかり日本に染まっちゃいましたね」"

[[dialogue]]
speaker = "ソフィア"
# 「入学したばかりの頃は、あんなに清楚な格好をしてたのに……」
line = "「入学したばかりの頃は、あんなに清楚な格好をしてたのに……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「えっ、そうなの！？」
line = "「えっ、そうなの！？」"

[[dialogue]]
speaker = "サーシャ"
# 「私も知らなかったわ～。ソフィの友達として紹介された時には、既に今時の女の子って感じだったけど……」
line = "「私も知らなかったわ～。ソフィの友達として紹介された時には、既に今時の女の子って感じだったけど……」"

[[dialogue]]
speaker = "ソフィア"
# 「まあ、入学して１ヶ月で、既にギャル化してましたね」
line = "「まあ、入学して１ヶ月で、既にギャル化してましたね」"

[[dialogue]]
speaker = "unk"
# 早くない！？
line = "早くない！？"

[[dialogue]]
speaker = "ソフィア"
# 「元凶はセーラ先輩です」
line = "「元凶はセーラ先輩です」"

[[dialogue]]
speaker = "ウズメイア"
# 「あはは♪　ソフィアが星徒会に入って、その繋がりでセーラ先輩と知り合ったんだよね～」
line = "「あはは♪　ソフィアが星徒会に入って、その繋がりでセーラ先輩と知り合ったんだよね～」"

[[dialogue]]
speaker = "ウズメイア"
# 「セーラ先輩ってオシャレじゃん？　それ見たら、自分も今時な日本のギャルファッションしたい！　ってウズウズしてきちゃって、色々教えてもらったんだよね～」
line = "「セーラ先輩ってオシャレじゃん？　それ見たら、自分も今時な日本のギャルファッションしたい！　ってウズウズしてきちゃって、色々教えてもらったんだよね～」"

[[dialogue]]
speaker = "ウズメイア"
# 「で、イメチェンしてみた、的な？」
line = "「で、イメチェンしてみた、的な？」"

[[dialogue]]
speaker = "ソフィア"
# 「当時は、日本伝統文化が好きで人間界にきたと言っていたのに、どうしてこうなったって感じでしたが……」
line = "「当時は、日本伝統文化が好きで人間界にきたと言っていたのに、どうしてこうなったって感じでしたが……」"

[[dialogue]]
speaker = "ウズメイア"
# 「いやいや、ギャルファッションだって日本文化の１つじゃん？」
line = "「いやいや、ギャルファッションだって日本文化の１つじゃん？」"

[[dialogue]]
speaker = "ウズメイア"
# 「伝統っていうのは、新しいものが積み重ねられていくことで成り立っていくものだし！」
line = "「伝統っていうのは、新しいものが積み重ねられていくことで成り立っていくものだし！」"

[[dialogue]]
speaker = "ソフィア"
# 「伝統も最新も両方追究した結果、トンチキなことになっていたりもしますが……その晴れ着とか」
line = "「伝統も最新も両方追究した結果、トンチキなことになっていたりもしますが……その晴れ着とか」"

[[dialogue]]
speaker = "ウズメイア"
# 「トンチキ！？」
line = "「トンチキ！？」"

[[dialogue]]
speaker = "unk"
# （言葉を濁さずにツッコんだ！）
line = "（言葉を濁さずにツッコんだ！）"

[[dialogue]]
speaker = "ウズメイア"
# 「え～！？　これ可愛くない？　会長くんだって、すごく似合ってるって言ってくれたし！」
line = "「え～！？　これ可愛くない？　会長くんだって、すごく似合ってるって言ってくれたし！」"

[[dialogue]]
speaker = "ソフィア"
# 「いや似合ってますけど、だいぶ魔改造ですよね、それ。ミニスカですし」
line = "「いや似合ってますけど、だいぶ魔改造ですよね、それ。ミニスカですし」"

[[dialogue]]
speaker = "ウズメイア"
# 「ミニスカ晴れ着って今時普通じゃないの！？」
line = "「ミニスカ晴れ着って今時普通じゃないの！？」"

[[dialogue]]
speaker = "ソフィア"
# 「どこ情報なんですか、それ……」
line = "「どこ情報なんですか、それ……」"

[[dialogue]]
speaker = "ウズメイア"
# 「そんな……ちゃんとネットで調べて研究したのに……」
line = "「そんな……ちゃんとネットで調べて研究したのに……」"

[[dialogue]]
speaker = "ソフィア"
# 「ウズメさん、思い込みで勘違いしやすいタイプですよね……。ネットの情報にも染まりやすいというか……」
line = "「ウズメさん、思い込みで勘違いしやすいタイプですよね……。ネットの情報にも染まりやすいというか……」"

[[dialogue]]
speaker = "unk"
# あ～、天界ってネット環境がないのか……
line = "あ～、天界ってネット環境がないのか……"

[[dialogue]]
speaker = "ウズメイア"
# 「た、確かに人間界にきて初めて、インターネットに触れたけれども……！」
line = "「た、確かに人間界にきて初めて、インターネットに触れたけれども……！」"

[[dialogue]]
speaker = "ウズメイア"
# 「で、でも、参拝のやり方とかは大丈夫なはずだし！　お賽銭を賽銭箱に入れて、鈴を鳴らしてから２回礼をして……」
line = "「で、でも、参拝のやり方とかは大丈夫なはずだし！　お賽銭を賽銭箱に入れて、鈴を鳴らしてから２回礼をして……」"

[[dialogue]]
speaker = "ウズメイア"
# 「手を２回叩いてからお祈りして、最後に一礼をする。『二礼二拍手一礼』だし！」
line = "「手を２回叩いてからお祈りして、最後に一礼をする。『二礼二拍手一礼』だし！」"

[[dialogue]]
speaker = "ソフィア"
# 「それは神社の場合ですね」
line = "「それは神社の場合ですね」"

[[dialogue]]
speaker = "ウズメイア"
# 「え」
line = "「え」"

[[dialogue]]
speaker = "ソフィア"
# 「こちらはお寺なので、手は叩かずに合掌が正しいやり方です。あと鈴もないです」
line = "「こちらはお寺なので、手は叩かずに合掌が正しいやり方です。あと鈴もないです」"

[[dialogue]]
speaker = "ウズメイア"
# 「マジで！？」
line = "「マジで！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ソフィアは物知りね！　ぶっちゃけ、あんまり気にしたことがなかったわ！」
line = "「ソフィアは物知りね！　ぶっちゃけ、あんまり気にしたことがなかったわ！」"

[[dialogue]]
speaker = "ウズメイア"
# 「日本伝統文化オタクなのに、ソフィアに負けたし……！」
line = "「日本伝統文化オタクなのに、ソフィアに負けたし……！」"

[[dialogue]]
speaker = "ソフィア"
# 「なんでそうなるんですか……」
line = "「なんでそうなるんですか……」"

[[dialogue]]
speaker = "サーシャ"
# 「うふふ♪　ちなみに、ここのお寺の隣には、神社があるのよね。お寺と神社が並んでるなんて、面白いわ～」
line = "「うふふ♪　ちなみに、ここのお寺の隣には、神社があるのよね。お寺と神社が並んでるなんて、面白いわ～」"

[[dialogue]]
speaker = "unk"
# そんなこんなで参拝の列に並ぶ前に、俺たちは事前に打ち合わせていた作戦を実行することにした。
line = "そんなこんなで参拝の列に並ぶ前に、俺たちは事前に打ち合わせていた作戦を実行することにした。"

[[dialogue]]
speaker = "サーシャ"
# 「――甘酒をもらってくる？」
line = "「――甘酒をもらってくる？」"

[[dialogue]]
speaker = "ウズメイア"
# 「はい！　あたしと会長くんとヴィーナス先輩で貰ってくるんで、サーシャ先輩はソフィアと、ここで待っていて下さい」
line = "「はい！　あたしと会長くんとヴィーナス先輩で貰ってくるんで、サーシャ先輩はソフィアと、ここで待っていて下さい」"

[[dialogue]]
speaker = "ヴィーナス"
# 「２人の分も貰ってくるから、その間に姉妹水入らずでね♪」
line = "「２人の分も貰ってくるから、その間に姉妹水入らずでね♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「サーシャさん、ソフィアとは年末から会ってなかったんでしょう？」
line = "「サーシャさん、ソフィアとは年末から会ってなかったんでしょう？」"

[[dialogue]]
speaker = "サーシャ"
# 「ええ。クリスマスパーティーの準備とかもあったし……」
line = "「ええ。クリスマスパーティーの準備とかもあったし……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「なら、ちょうどいいわね！」
line = "「なら、ちょうどいいわね！」"

[[dialogue]]
speaker = "ウズメイア"
# 「それじゃあソフィア、行ってくるね～♪」
line = "「それじゃあソフィア、行ってくるね～♪」"

[[dialogue]]
speaker = "ソフィア"
# 「はい」
line = "「はい」"

[[dialogue]]
speaker = "サーシャ"
# 「なんだか、みんなに気を利かせてもらっちゃったみたいね～」
line = "「なんだか、みんなに気を利かせてもらっちゃったみたいね～」"

[[dialogue]]
speaker = "サーシャ"
# 「まさか、ヴィーナスちゃんがソフィを初詣に連れてくるとは思わなかったわ。こうして２人きりで話すのは、久しぶりかしら？」
line = "「まさか、ヴィーナスちゃんがソフィを初詣に連れてくるとは思わなかったわ。こうして２人きりで話すのは、久しぶりかしら？」"

[[dialogue]]
speaker = "ソフィア"
# 「……ええ、そうですね。ＤＩＳＣでチャットのやり取りをすることはありましたけど、実際に会って話すのは１ヶ月ぶりくらいです」
line = "「……ええ、そうですね。ＤＩＳＣでチャットのやり取りをすることはありましたけど、実際に会って話すのは１ヶ月ぶりくらいです」"

[[dialogue]]
speaker = "サーシャ"
# 「近頃は元気にしてた？　風邪は引いてない？」
line = "「近頃は元気にしてた？　風邪は引いてない？」"

[[dialogue]]
speaker = "ソフィア"
# 「レゾフよりは寒くないので、大丈夫です」
line = "「レゾフよりは寒くないので、大丈夫です」"

[[dialogue]]
speaker = "サーシャ"
# 「そう。ウズメちゃんとも、変わらず仲良くやっているみたいね」
line = "「そう。ウズメちゃんとも、変わらず仲良くやっているみたいね」"

[[dialogue]]
speaker = "ソフィア"
# 「まあ、押しが強くて困ることもありますが……なんだかんだ仲良くしてもらっています」
line = "「まあ、押しが強くて困ることもありますが……なんだかんだ仲良くしてもらっています」"

[[dialogue]]
speaker = "サーシャ"
# 「言うのが遅くなっちゃったけど、その晴れ着、とっても似合っているわ♪　ヴィーナスちゃんから聞いたけど、ソフィのも晴れ着フォームなんでしょう？」
line = "「言うのが遅くなっちゃったけど、その晴れ着、とっても似合っているわ♪　ヴィーナスちゃんから聞いたけど、ソフィのも晴れ着フォームなんでしょう？」"

[[dialogue]]
speaker = "ソフィア"
# 「ええ。初詣にくるにあたって、もらう形になってしまいました」
line = "「ええ。初詣にくるにあたって、もらう形になってしまいました」"

[[dialogue]]
speaker = "ソフィア"
# 「あの……姉さん」
line = "「あの……姉さん」"

[[dialogue]]
speaker = "サーシャ"
# 「うん？」
line = "「うん？」"

[[dialogue]]
speaker = "ソフィア"
# 「…………えっと」
line = "「…………えっと」"

[[dialogue]]
speaker = "ソフィア"
# （事前に色々考えてきたのに、いざ面と向かって言おうとすると……上手く言葉が出てこない……）
line = "（事前に色々考えてきたのに、いざ面と向かって言おうとすると……上手く言葉が出てこない……）"

[[dialogue]]
speaker = "ソフィア"
# （どう言えばいいのか……）
line = "（どう言えばいいのか……）"

[[dialogue]]
speaker = "unk"
# と、その時。
line = "と、その時。"

[[dialogue]]
speaker = "ヴィーナス"
# （ソフィア、頑張って！）
line = "（ソフィア、頑張って！）"

[[dialogue]]
speaker = "ソフィア"
# （あ……ヴィーナスさん……？）
line = "（あ……ヴィーナスさん……？）"

[[dialogue]]
speaker = "ヴィーナス"
# （あなたならできるわ！）
line = "（あなたならできるわ！）"

[[dialogue]]
speaker = "unk"
# 物陰からソフィアを見守っていたヴィーナスは、目が合うと力強く頷いてみせる。
line = "物陰からソフィアを見守っていたヴィーナスは、目が合うと力強く頷いてみせる。"

[[dialogue]]
speaker = "ソフィア"
# （そうだ……ヴィーナスさんが言っていた――）
line = "（そうだ……ヴィーナスさんが言っていた――）"

[[dialogue]]
speaker = "ソフィア"
# 「姉さん……」
line = "「姉さん……」"

[[dialogue]]
speaker = "ソフィア"
# 「私は、姉さんに決闘を申し込みます！」
line = "「私は、姉さんに決闘を申し込みます！」"

[[dialogue]]
speaker = "サーシャ"
# 「け、決闘……！？」
line = "「け、決闘……！？」"

[[dialogue]]
speaker = "unk"
# ソフィアの宣言に、サーシャさんは目を丸くするのだった――
line = "ソフィアの宣言に、サーシャさんは目を丸くするのだった――"
