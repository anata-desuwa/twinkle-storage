[[dialogue]]
speaker = "unk"
# 第４話,ノルトハウゼンの決意,P
line = "第４話,ノルトハウゼンの決意,P"

[[dialogue]]
speaker = "リーリア"
# 「せんぱーい♪　掲示板の書き込み、見ましたよ～」
line = "「せんぱーい♪　掲示板の書き込み、見ましたよ～」"

[[dialogue]]
speaker = "リーリア"
# 「実はですね～、センパイたちが捜してる異世界から来た魔法使いさんのコト、ネビュラで保護してるんですよ～。どうです、助かっちゃいますか？」
line = "「実はですね～、センパイたちが捜してる異世界から来た魔法使いさんのコト、ネビュラで保護してるんですよ～。どうです、助かっちゃいますか？」"

[[dialogue]]
speaker = "unk"
# ノルトハウゼンがネビュラの基地に保護されてしばらくの時間が経った後──
line = "ノルトハウゼンがネビュラの基地に保護されてしばらくの時間が経った後──"

[[dialogue]]
speaker = "unk"
# おもむろに学園の掲示板を見たリーリアが、その書き込みに気付いた。
line = "おもむろに学園の掲示板を見たリーリアが、その書き込みに気付いた。"

[[dialogue]]
speaker = "unk"
# どうやら新星学園の星徒会長である緋宮クロトと、流星学園の星徒会長である星見フィオナが、ノルトハウゼンのことを捜しているようだった。
line = "どうやら新星学園の星徒会長である緋宮クロトと、流星学園の星徒会長である星見フィオナが、ノルトハウゼンのことを捜しているようだった。"

[[dialogue]]
speaker = "リーリア"
# 「どうやらノルトハウゼンさんをこの世界に呼んだ相手もいるっぽいですね～」
line = "「どうやらノルトハウゼンさんをこの世界に呼んだ相手もいるっぽいですね～」"

[[dialogue]]
speaker = "リーリア"
# 「しばらくしたらお迎えが来ると思いますよ。元の世界にも帰してもらえるんじゃないかと思います！」
line = "「しばらくしたらお迎えが来ると思いますよ。元の世界にも帰してもらえるんじゃないかと思います！」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「そうですか、ありがとうございます」
line = "「そうですか、ありがとうございます」"

[[dialogue]]
speaker = "unk"
# 程なくして、クロトたち一行がノルトハウゼンを迎えにやってくる。
line = "程なくして、クロトたち一行がノルトハウゼンを迎えにやってくる。"

[[dialogue]]
speaker = "unk"
# 何故こんなことになってしまったのかという理由も説明されたが、クロトたちも事態を完全に把握しているわけではなさそうだった。
line = "何故こんなことになってしまったのかという理由も説明されたが、クロトたちも事態を完全に把握しているわけではなさそうだった。"

[[dialogue]]
speaker = "ベア子"
# 「無事に見つかったみたいですね。よかったくま……」
line = "「無事に見つかったみたいですね。よかったくま……」"

[[dialogue]]
speaker = "黒ベア子"
# 「まったく、待たせすぎくま！　急いで次の世界に向かうくま！」
line = "「まったく、待たせすぎくま！　急いで次の世界に向かうくま！」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「あの……こちらの方々は……？」
line = "「あの……こちらの方々は……？」"

[[dialogue]]
speaker = "マハムート"
# 「あなたをこの世界に呼び出した張本人よ。次に向かうイリスクラウドという世界の案内人をさせるつもりのようね」
line = "「あなたをこの世界に呼び出した張本人よ。次に向かうイリスクラウドという世界の案内人をさせるつもりのようね」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「案内人……ですの？」
line = "「案内人……ですの？」"

[[dialogue]]
speaker = "フィオナ"
# 「この子は『赤ちゃんクマロボ』というんですけど、父親が誰か分からないんです」
line = "「この子は『赤ちゃんクマロボ』というんですけど、父親が誰か分からないんです」"

[[dialogue]]
speaker = "フィオナ"
# 「ですからベア子さんたちは、この子の父親を捜すために、過去に訪れたことのある世界を渡り歩いているんです」
line = "「ですからベア子さんたちは、この子の父親を捜すために、過去に訪れたことのある世界を渡り歩いているんです」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「まあ……それは大変ですね」
line = "「まあ……それは大変ですね」"

[[dialogue]]
speaker = "黒ベア子"
# 「この世界にもパパはいなかったくま！　だから次はあんたの世界を捜すくま！　そのための案内人くま！」
line = "「この世界にもパパはいなかったくま！　だから次はあんたの世界を捜すくま！　そのための案内人くま！」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「事情は理解しましたわ。案内人のお役目、引き受けさせていただきます」
line = "「事情は理解しましたわ。案内人のお役目、引き受けさせていただきます」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「離れ離れではさぞ心細いことでしょう。一刻も早く、この子のお父さまを見つけてさしあげませんと！」
line = "「離れ離れではさぞ心細いことでしょう。一刻も早く、この子のお父さまを見つけてさしあげませんと！」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「もし悲しくて泣いてしまうことがありましたらドリームマジックを披露しますの。わたくしの魔法で必ず笑顔にして見せますわ」
line = "「もし悲しくて泣いてしまうことがありましたらドリームマジックを披露しますの。わたくしの魔法で必ず笑顔にして見せますわ」"

[[dialogue]]
speaker = "赤ちゃんクマロボ"
# 「ばぶー<emoji=heart04>」
line = "「ばぶー<emoji=heart04>」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「よしよし、いい子ですわね～♪」
line = "「よしよし、いい子ですわね～♪」"

[[dialogue]]
speaker = "マハムート"
# 「ところでずっと気になっていたのだけど、あなたはどうして新星学園の制服を着ているのかしら？」
line = "「ところでずっと気になっていたのだけど、あなたはどうして新星学園の制服を着ているのかしら？」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「あら、いけません。わたくしリーリアさんに制服をお借りしたままでしたわ」
line = "「あら、いけません。わたくしリーリアさんに制服をお借りしたままでしたわ」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「実はネビュラのみなさんから、ハルツの魔法を見せて欲しいといわれまして」
line = "「実はネビュラのみなさんから、ハルツの魔法を見せて欲しいといわれまして」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「『虹を見たい』というリクエストにお応えしようとしたのですが、失敗してずぶ濡れになってしまったのですわ」
line = "「『虹を見たい』というリクエストにお応えしようとしたのですが、失敗してずぶ濡れになってしまったのですわ」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「その際に、リーリアさんが着替えとして予備の制服を貸してくださいまして」
line = "「その際に、リーリアさんが着替えとして予備の制服を貸してくださいまして」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「服はすぐに乾かして頂いたのですが、あまりに着心地が良かったものですから、着替えるのを忘れてしまっていましたの」
line = "「服はすぐに乾かして頂いたのですが、あまりに着心地が良かったものですから、着替えるのを忘れてしまっていましたの」"

[[dialogue]]
speaker = "マハムート"
# 「予備のものなら大丈夫よ。リーリアには私から言っておくから、記念にもらっておきなさい」
line = "「予備のものなら大丈夫よ。リーリアには私から言っておくから、記念にもらっておきなさい」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「なんだか申し訳ありません……」
line = "「なんだか申し訳ありません……」"

[[dialogue]]
speaker = "マハムート"
# 「いいのよ。あなたの制服姿、よく似合っているわ」
line = "「いいのよ。あなたの制服姿、よく似合っているわ」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「ふふっ、ありがとうございます」
line = "「ふふっ、ありがとうございます」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「ネビュラのみなさんには本当に良くしていただきました。きちんとお礼が出来なかったのが心残りです」
line = "「ネビュラのみなさんには本当に良くしていただきました。きちんとお礼が出来なかったのが心残りです」"

[[dialogue]]
speaker = "マハムート"
# 「また何かの機会に、この世界へ来ることもあるでしょう。その時に思う存分、お礼を言えばいいわ」
line = "「また何かの機会に、この世界へ来ることもあるでしょう。その時に思う存分、お礼を言えばいいわ」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「そうですわね……はい、そういたしますわ」
line = "「そうですわね……はい、そういたしますわ」"

[[dialogue]]
speaker = "unk"
# ノルトハウゼンは表情を明るくして頷く。
line = "ノルトハウゼンは表情を明るくして頷く。"

[[dialogue]]
speaker = "unk"
# その後フィオナもイリスクラウドに同行することを決め、いよいよ転移が開始されることになった。
line = "その後フィオナもイリスクラウドに同行することを決め、いよいよ転移が開始されることになった。"

[[dialogue]]
speaker = "フィオナ"
# 「必ず、この子の父親を見つけてあげましょう！」
line = "「必ず、この子の父親を見つけてあげましょう！」"

[[dialogue]]
speaker = "ノルトハウゼン"
# 「ええ、必ず！」
line = "「ええ、必ず！」"

[[dialogue]]
speaker = "unk"
# 決意を固めたノルトハウゼンとフィオナは、威勢よくイリスクラウドへと転移していくのであった。
line = "決意を固めたノルトハウゼンとフィオナは、威勢よくイリスクラウドへと転移していくのであった。"
