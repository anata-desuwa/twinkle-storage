line = "「会長くんってとっても男らしいから、もし私が会長くんに甘えられる立場の、年下の幼なじみだったら、どんな風になってたんだろうって思ったの<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「だから今日１日、『年下幼なじみごっこ』してみたいんだけど、どうかなぁ？」
line = "「だから今日１日、『年下幼なじみごっこ』してみたいんだけど、どうかなぁ？」"

