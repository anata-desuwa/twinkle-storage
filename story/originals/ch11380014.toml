line = "「ヴィーナスちゃんが褒めてもらってる時に、会長くんによく撫でてもらってるでしょ？　実は私、あれがずっと羨ましいな～って思ってて……」"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「おっきい私だと、恥ずかしくてなかなか言い出せなかったから……今日は恋人として思いっきり甘えたいな～って<emoji=heart04>」
line = "「おっきい私だと、恥ずかしくてなかなか言い出せなかったから……今日は恋人として思いっきり甘えたいな～って<emoji=heart04>」"

