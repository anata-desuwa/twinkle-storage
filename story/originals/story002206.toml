[[dialogue]]
speaker = "ダッチ"
# 「イカサマのような糾弾はやめていただきたい！　私だってリスクを負っている！　『欲望』の強さで勝てなければ、ロイヤルは作れないのですから！」
line = "「イカサマのような糾弾はやめていただきたい！　私だってリスクを負っている！　『欲望』の強さで勝てなければ、ロイヤルは作れないのですから！」"

[[dialogue]]
speaker = "ダッチ"
# 「この『欲望』のポーカーは私に生きる喜びを与えてくれる……ショウダウンして勝つたびに、私の方が強い『欲望』を持つ存在なのだと実感できるのです！」
line = "「この『欲望』のポーカーは私に生きる喜びを与えてくれる……ショウダウンして勝つたびに、私の方が強い『欲望』を持つ存在なのだと実感できるのです！」"

[[dialogue]]
speaker = "ダッチ"
# 「その実感を存分に味わい、そして美しいバニーを虜囚とする……それこそが私の存在理由なのですよ！」
line = "「その実感を存分に味わい、そして美しいバニーを虜囚とする……それこそが私の存在理由なのですよ！」"

[[dialogue]]
speaker = "ダッチ"
# 「まさかやめるとは言わないでしょう？　続行しましょう、ネーゼマイン様。想いの強さが反映されるこのポーカー。条件は同じです！　さぁ、さぁさぁ──！」
line = "「まさかやめるとは言わないでしょう？　続行しましょう、ネーゼマイン様。想いの強さが反映されるこのポーカー。条件は同じです！　さぁ、さぁさぁ──！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「……おっけ。やろっか」
line = "「……おっけ。やろっか」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ネーゼマイン様……！？」
line = "「ネーゼマイン様……！？」"

[[dialogue]]
speaker = "セナリィ"
# 「本当に大丈夫ですの、マイン……！？」
line = "「本当に大丈夫ですの、マイン……！？」"

[[dialogue]]
speaker = "ネーゼマイン"
# （大丈夫なのかって言われても……無理だよ。コイツの『欲望』は強すぎる。今の状態じゃ絶対に勝てない）
line = "（大丈夫なのかって言われても……無理だよ。コイツの『欲望』は強すぎる。今の状態じゃ絶対に勝てない）"

[[dialogue]]
speaker = "ネーゼマイン"
# （だから私がやるべきことは、たった一つだけ……！）
line = "（だから私がやるべきことは、たった一つだけ……！）"

[[dialogue]]
speaker = "ネーゼマイン"
# 「みんな……ごめん。ロイヤルフラッシュ、作れなかった……」
line = "「みんな……ごめん。ロイヤルフラッシュ、作れなかった……」"

[[dialogue]]
speaker = "セナリィ"
# 「あぁあっ……！？」
line = "「あぁあっ……！？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ネーゼマイン様のチップが、ゼロに……！」
line = "「ネーゼマイン様のチップが、ゼロに……！」"

[[dialogue]]
speaker = "ダッチ"
# 「アッハッハッハ！　手に入れた！　また手に入れてしまいました！　美しい子ウサギを！！」
line = "「アッハッハッハ！　手に入れた！　また手に入れてしまいました！　美しい子ウサギを！！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「──ああ、もうっ！！」
line = "「──ああ、もうっ！！」"

[[dialogue]]
speaker = "ダッチ"
# 「おやおや……負けて悔しいからと、テーブルを叩くだなんていけませんよ？」
line = "「おやおや……負けて悔しいからと、テーブルを叩くだなんていけませんよ？」"

[[dialogue]]
speaker = "ダッチ"
# 「カードも曲げてしまわれて……これでは星徒会長様との前に、もう一度デッキを交換しなくては……」
line = "「カードも曲げてしまわれて……これでは星徒会長様との前に、もう一度デッキを交換しなくては……」"

[[dialogue]]
speaker = "ダッチ"
# 「虜囚のウサギとなった最初の仕事です。さぁ、あちらのテーブルからデッキを持ってきてください。ウサギマイン様？」
line = "「虜囚のウサギとなった最初の仕事です。さぁ、あちらのテーブルからデッキを持ってきてください。ウサギマイン様？」"

[[dialogue]]
speaker = "ダッチ"
# 「もちろん語尾にぴょんは忘れず！　大切なことですから！」
line = "「もちろん語尾にぴょんは忘れず！　大切なことですから！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「承知いたしました……ぴょん」
line = "「承知いたしました……ぴょん」"

[[dialogue]]
speaker = "ダッチ"
# 「フオォ……不機嫌そうなぴょんもまた味わい深い！　いいですねぇ……！」
line = "「フオォ……不機嫌そうなぴょんもまた味わい深い！　いいですねぇ……！」"

[[dialogue]]
speaker = "unk"
# 新品のデッキが置いてあるテーブルに行く前に、マインが俺の近くへやってきた。
line = "新品のデッキが置いてあるテーブルに行く前に、マインが俺の近くへやってきた。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「会長、あとはお願いね」
line = "「会長、あとはお願いね」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「たぶんダッチの想いの強さ……『欲望』に勝つのは難しいと思う」
line = "「たぶんダッチの想いの強さ……『欲望』に勝つのは難しいと思う」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「だから────」
line = "「だから────」"
