[[dialogue]]
speaker = "unk"
# 第４話,今在るこの世界は,B
line = "第４話,今在るこの世界は,B"

[[dialogue]]
speaker = "unk"
# 梨緒が緋宮クロトに御前試合で敗北し、大聖堂で守護天使ラクシャと会話した後──
line = "梨緒が緋宮クロトに御前試合で敗北し、大聖堂で守護天使ラクシャと会話した後──"

[[dialogue]]
speaker = "unk"
# ＤＩＳＣの呼び出しに応え星徒会室へ赴くと、そこには呼び出した張本人に加え、<ruby=エリシア>フィオナ</ruby>の姿があった。
line = "ＤＩＳＣの呼び出しに応え星徒会室へ赴くと、そこには呼び出した張本人に加え、<ruby>フィオナ<rt>エリシア</rt></ruby>の姿があった。"

[[dialogue]]
speaker = "クロト"
# 「突然呼び出してしまって、すまない。本当なら、御前試合の疲れが癒えた後日にするべきかとも思ったんだけど……」
line = "「突然呼び出してしまって、すまない。本当なら、御前試合の疲れが癒えた後日にするべきかとも思ったんだけど……」"

[[dialogue]]
speaker = "梨緒"
# 「前置きはいらない。大事な話があると聞いたから来たんだ」
line = "「前置きはいらない。大事な話があると聞いたから来たんだ」"

[[dialogue]]
speaker = "フィオナ"
# 「では……梨緒さん。私たちはあなたに、改めて聞いておきたいことと、話しておきたいことがあります」
line = "「では……梨緒さん。私たちはあなたに、改めて聞いておきたいことと、話しておきたいことがあります」"

[[dialogue]]
speaker = "unk"
# 現・新星学園の星徒会長と、流星学園の星徒会長は、互いに目配せをして頷き合うと、話を始めた。
line = "現・新星学園の星徒会長と、流星学園の星徒会長は、互いに目配せをして頷き合うと、話を始めた。"

[[dialogue]]
speaker = "クロト"
# 「率直に話そう。梨緒、キミは『平行世界』を知っているか？」
line = "「率直に話そう。梨緒、キミは『平行世界』を知っているか？」"

[[dialogue]]
speaker = "梨緒"
# 「……当然、そういう概念があることは知っている」
line = "「……当然、そういう概念があることは知っている」"

[[dialogue]]
speaker = "クロト"
# 「オカルトやＳＦの話じゃないんだ。現実の問題として、リクリエに関連する脅威の中に、平行世界が関係している」
line = "「オカルトやＳＦの話じゃないんだ。現実の問題として、リクリエに関連する脅威の中に、平行世界が関係している」"

[[dialogue]]
speaker = "クロト"
# 「君は先日、俺の未来を知っているというようなことを言っていた」
line = "「君は先日、俺の未来を知っているというようなことを言っていた」"

[[dialogue]]
speaker = "クロト"
# 「俺たちが知り得た情報によると、この世界をとりまく平行世界間には『時間のズレ』が存在しているらしい」
line = "「俺たちが知り得た情報によると、この世界をとりまく平行世界間には『時間のズレ』が存在しているらしい」"

[[dialogue]]
speaker = "クロト"
# 「つまり君は、俺たちの世界とは異なる平行世界からやって来たんじゃないかと、俺たちは考えている」
line = "「つまり君は、俺たちの世界とは異なる平行世界からやって来たんじゃないかと、俺たちは考えている」"

[[dialogue]]
speaker = "梨緒"
# 「……！？」
line = "「……！？」"

[[dialogue]]
speaker = "unk"
# 衝撃的な話ではあったが、出鱈目と切って捨てることはできなかった。梨緒自身、身の回りで起こっていることが『異常』であると、ずっと感じ続けていたから。
line = "衝撃的な話ではあったが、出鱈目と切って捨てることはできなかった。梨緒自身、身の回りで起こっていることが『異常』であると、ずっと感じ続けていたから。"

[[dialogue]]
speaker = "unk"
# 必死の思いで深呼吸を繰り返し、動悸を鎮める。ここで取り乱しては負けだと思った。
line = "必死の思いで深呼吸を繰り返し、動悸を鎮める。ここで取り乱しては負けだと思った。"

[[dialogue]]
speaker = "梨緒"
# （ただ、そうなると……ラクシャの話のいくつかが腑に落ちてしまうところがある。嫌な感じだ）
line = "（ただ、そうなると……ラクシャの話のいくつかが腑に落ちてしまうところがある。嫌な感じだ）"

[[dialogue]]
speaker = "梨緒"
# （ともあれ、『緋宮クロトの末路』については、本人に詳しく話さないというのが守護天使との約束だ）
line = "（ともあれ、『緋宮クロトの末路』については、本人に詳しく話さないというのが守護天使との約束だ）"

[[dialogue]]
speaker = "梨緒"
# （だが、あくまで<b>アレ</b>の正体についてや、詳しい顛末を話さないのであれば、良くも悪くも『今更』の範疇だろう）
line = "（だが、あくまで<b>アレ</b>の正体についてや、詳しい顛末を話さないのであれば、良くも悪くも『今更』の範疇だろう）"

[[dialogue]]
speaker = "梨緒"
# 「……よ、要するに私は、この世界の住人ではなく、ここによく似た平行世界からやってきた異邦人だ、ということか？」
line = "「……よ、要するに私は、この世界の住人ではなく、ここによく似た平行世界からやってきた異邦人だ、ということか？」"

[[dialogue]]
speaker = "クロト"
# 「話が早くて助かる。つまりそういうことだ」
line = "「話が早くて助かる。つまりそういうことだ」"

[[dialogue]]
speaker = "クロト"
# 「女神や守護天使たちの話を総括すると、『宇宙』は１つではなく、複数の世界が俺たちの知らないところで運営されているらしい」
line = "「女神や守護天使たちの話を総括すると、『宇宙』は１つではなく、複数の世界が俺たちの知らないところで運営されているらしい」"

[[dialogue]]
speaker = "クロト"
# 「この世界とは全く異なる『オルタナティブ宇宙』も存在していて、その数や上限は俺たちでは知ることができない」
line = "「この世界とは全く異なる『オルタナティブ宇宙』も存在していて、その数や上限は俺たちでは知ることができない」"

[[dialogue]]
speaker = "クロト"
# 「ただ、この世界と関係の深い平行世界が、合計で３つ存在していることは明らかになった」
line = "「ただ、この世界と関係の深い平行世界が、合計で３つ存在していることは明らかになった」"

[[dialogue]]
speaker = "クロト"
# 「俺たちがいるこの世界は『アルタイル』。そして、残りの２つが『デネブ』と『ベガ』だ」
line = "「俺たちがいるこの世界は『アルタイル』。そして、残りの２つが『デネブ』と『ベガ』だ」"

[[dialogue]]
speaker = "クロト"
# 「アルタイルも含めた３つの世界は、たった一つの可能性から分岐した世界──故に酷似しているという話だ」
line = "「アルタイルも含めた３つの世界は、たった一つの可能性から分岐した世界──故に酷似しているという話だ」"

[[dialogue]]
speaker = "クロト"
# 「そのどちらなのかはわからないが、君はデネブか、あるいはベガからやってきた存在である、というのが俺たち両星徒会の見解だ」
line = "「そのどちらなのかはわからないが、君はデネブか、あるいはベガからやってきた存在である、というのが俺たち両星徒会の見解だ」"

[[dialogue]]
speaker = "梨緒"
# 「……なるほど。一応、話としては理解できた。納得するかどうかは別としてな」
line = "「……なるほど。一応、話としては理解できた。納得するかどうかは別としてな」"

[[dialogue]]
speaker = "梨緒"
# 「ひとつ聞きたい。なぜ、今なんだ？　恐らく君たちは、最初からその情報を持っていたわけだろう？」
line = "「ひとつ聞きたい。なぜ、今なんだ？　恐らく君たちは、最初からその情報を持っていたわけだろう？」"

[[dialogue]]
speaker = "梨緒"
# 「どうして私に、最初に出会った時点でその話をしなかったんだ？」
line = "「どうして私に、最初に出会った時点でその話をしなかったんだ？」"

[[dialogue]]
speaker = "フィオナ"
# 「そのことについては、私から説明しましょう」
line = "「そのことについては、私から説明しましょう」"

[[dialogue]]
speaker = "梨緒"
# 「エリシア……」
line = "「エリシア……」"

[[dialogue]]
speaker = "フィオナ"
# 「当然、梨緒さんが最初に現れた時から、我々は梨緒さんを平行世界人だと疑っていました」
line = "「当然、梨緒さんが最初に現れた時から、我々は梨緒さんを平行世界人だと疑っていました」"

[[dialogue]]
speaker = "フィオナ"
# 「同時に、『私たちの敵』である可能性が非常に高い、とも考えていたんです」
line = "「同時に、『私たちの敵』である可能性が非常に高い、とも考えていたんです」"

[[dialogue]]
speaker = "梨緒"
# 「私たちの、敵……？」
line = "「私たちの、敵……？」"

[[dialogue]]
speaker = "フィオナ"
# 「『リクリエの使徒』という言葉を、ご存じでしょうか？」
line = "「『リクリエの使徒』という言葉を、ご存じでしょうか？」"

[[dialogue]]
speaker = "梨緒"
# 「いや、聞いたことはない」
line = "「いや、聞いたことはない」"

[[dialogue]]
speaker = "フィオナ"
# 「アルタイルには過去、リクリエの使徒を名乗る者が現れたことがあります」
line = "「アルタイルには過去、リクリエの使徒を名乗る者が現れたことがあります」"

[[dialogue]]
speaker = "フィオナ"
# 「その者は、私の双子の姉……平行世界の星見フィオナだったんです」
line = "「その者は、私の双子の姉……平行世界の星見フィオナだったんです」"

[[dialogue]]
speaker = "梨緒"
# 「なっ！？」
line = "「なっ！？」"

[[dialogue]]
speaker = "unk"
# それからエリシアは、この世界で起こったリクリエの使徒との戦いと、現在の星見アポロが辿った顛末を語った。
line = "それからエリシアは、この世界で起こったリクリエの使徒との戦いと、現在の星見アポロが辿った顛末を語った。"

[[dialogue]]
speaker = "フィオナ"
# 「故に、平行世界から現れた梨緒さんに対し、我々は非常に警戒しました」
line = "「故に、平行世界から現れた梨緒さんに対し、我々は非常に警戒しました」"

[[dialogue]]
speaker = "フィオナ"
# 「どういう理屈なのかはわかりませんが、リクリエの使徒は異なる平行世界の人物が選ばれるらしいことまでは把握しています」
line = "「どういう理屈なのかはわかりませんが、リクリエの使徒は異なる平行世界の人物が選ばれるらしいことまでは把握しています」"

[[dialogue]]
speaker = "フィオナ"
# 「そのため、平行世界から現れたとおぼしき梨緒さんは、次の使徒なのではないかと思ったんです」
line = "「そのため、平行世界から現れたとおぼしき梨緒さんは、次の使徒なのではないかと思ったんです」"

[[dialogue]]
speaker = "クロト"
# 「だけど、梨緒にはリクリエの使徒の特徴がなかった」
line = "「だけど、梨緒にはリクリエの使徒の特徴がなかった」"

[[dialogue]]
speaker = "梨緒"
# 「リクリエの使徒の特徴……？」
line = "「リクリエの使徒の特徴……？」"

[[dialogue]]
speaker = "フィオナ"
# 「リクリエの使徒は仮面を持って現れます。また『世界の再創生』を望み、リクリエの瘴気と、モンスターを使役します」
line = "「リクリエの使徒は仮面を持って現れます。また『世界の再創生』を望み、リクリエの瘴気と、モンスターを使役します」"

[[dialogue]]
speaker = "フィオナ"
# 「梨緒さんが最初にこの世界に現れた時から、緋宮会長との御前試合の最中まで、ずっと観察させてもらいましたが、これらの特徴を梨緒さんは備えていませんでした」
line = "「梨緒さんが最初にこの世界に現れた時から、緋宮会長との御前試合の最中まで、ずっと観察させてもらいましたが、これらの特徴を梨緒さんは備えていませんでした」"

[[dialogue]]
speaker = "梨緒"
# 「なるほど……私はずっと、監視されていたんだな」
line = "「なるほど……私はずっと、監視されていたんだな」"

[[dialogue]]
speaker = "フィオナ"
# 「あえて言葉を選ばずに言わせてもらえれば……意図的に泳がせていました」
line = "「あえて言葉を選ばずに言わせてもらえれば……意図的に泳がせていました」"

[[dialogue]]
speaker = "フィオナ"
# 「そして結論ですが、梨緒さんは限りなく白です」
line = "「そして結論ですが、梨緒さんは限りなく白です」"

[[dialogue]]
speaker = "クロト"
# 「つまり俺たち視点で言えば、今のところ梨緒は、偶然アルタイルに紛れ込んだ平行世界人だ」
line = "「つまり俺たち視点で言えば、今のところ梨緒は、偶然アルタイルに紛れ込んだ平行世界人だ」"

[[dialogue]]
speaker = "クロト"
# 「とはいえ、平行世界の間の移動は女神ですらも気軽には行えないらしい。つまりただのラッキーやアンラッキーによってふらっと迷い込んだわけではない」
line = "「とはいえ、平行世界の間の移動は女神ですらも気軽には行えないらしい。つまりただのラッキーやアンラッキーによってふらっと迷い込んだわけではない」"

[[dialogue]]
speaker = "クロト"
# 「何か、世界間を移動するような、大きな事象に巻き込まれた結果として、ここに現れたとみるべきだろう」
line = "「何か、世界間を移動するような、大きな事象に巻き込まれた結果として、ここに現れたとみるべきだろう」"

[[dialogue]]
speaker = "梨緒"
# 「それは……」
line = "「それは……」"

[[dialogue]]
speaker = "梨緒"
# （世界間を移動するような、大きな事象──つまり、『世界の終焉』）
line = "（世界間を移動するような、大きな事象──つまり、『世界の終焉』）"

[[dialogue]]
speaker = "梨緒"
# （いや、だが私も、世界の滅びそのものを目撃したわけじゃない。本当に世界が滅びたのであれば、私自身だって滅びていなければ辻褄が合わない）
line = "（いや、だが私も、世界の滅びそのものを目撃したわけじゃない。本当に世界が滅びたのであれば、私自身だって滅びていなければ辻褄が合わない）"

[[dialogue]]
speaker = "梨緒"
# （私がここに存在している、ということそのものが、私の世界がまだ生きているという保証になるんじゃないだろうか……？）
line = "（私がここに存在している、ということそのものが、私の世界がまだ生きているという保証になるんじゃないだろうか……？）"

[[dialogue]]
speaker = "梨緒"
# （ともあれ、今はまだこのことを詳しく話すことはできない）
line = "（ともあれ、今はまだこのことを詳しく話すことはできない）"

[[dialogue]]
speaker = "梨緒"
# 「ひとまず、話としてはわかった」
line = "「ひとまず、話としてはわかった」"

[[dialogue]]
speaker = "梨緒"
# 「ただ正直に言って、荒唐無稽な話だとは感じている」
line = "「ただ正直に言って、荒唐無稽な話だとは感じている」"

[[dialogue]]
speaker = "梨緒"
# （この感想も、決して嘘ではない。彼らの話は辻褄の合う部分も多いが、逆に言うと筋が通っているだけで証拠は何もない）
line = "（この感想も、決して嘘ではない。彼らの話は辻褄の合う部分も多いが、逆に言うと筋が通っているだけで証拠は何もない）"

[[dialogue]]
speaker = "梨緒"
# （もしかすると、壮大な嘘で私を騙そうとしている可能性だって、まだゼロではない）
line = "（もしかすると、壮大な嘘で私を騙そうとしている可能性だって、まだゼロではない）"

[[dialogue]]
speaker = "クロト"
# 「言いたいことはわかる。突然こんな話をされても、『自分は平行世界人だったんだ！』なんていう天啓が降りてきたりはしないだろうな」
line = "「言いたいことはわかる。突然こんな話をされても、『自分は平行世界人だったんだ！』なんていう天啓が降りてきたりはしないだろうな」"

[[dialogue]]
speaker = "梨緒"
# 「ああ。どの話も私自身が見聞きしたことではないし、検証や裏取りができるようなものでもない」
line = "「ああ。どの話も私自身が見聞きしたことではないし、検証や裏取りができるようなものでもない」"

[[dialogue]]
speaker = "梨緒"
# 「ただ、話してくれたことには感謝する。鵜呑みにはできないが、頭の片隅には入れておこうと思う」
line = "「ただ、話してくれたことには感謝する。鵜呑みにはできないが、頭の片隅には入れておこうと思う」"

[[dialogue]]
speaker = "クロト"
# 「そう言ってもらえると助かるよ」
line = "「そう言ってもらえると助かるよ」"

[[dialogue]]
speaker = "フィオナ"
# 「ありがとうございます。冷静に受け取ってもらえて、私からも感謝します」
line = "「ありがとうございます。冷静に受け取ってもらえて、私からも感謝します」"

[[dialogue]]
speaker = "フィオナ"
# 「梨緒さんの当面の生活の面倒は、引き続き星見家で見させてください」
line = "「梨緒さんの当面の生活の面倒は、引き続き星見家で見させてください」"

[[dialogue]]
speaker = "フィオナ"
# 「平行世界人であろうがなかろうが、梨緒さんがリクリエ絡みの重要人物であることには変わりありません」
line = "「平行世界人であろうがなかろうが、梨緒さんがリクリエ絡みの重要人物であることには変わりありません」"

[[dialogue]]
speaker = "フィオナ"
# 「ただ、生活と安全を保障する代わりに、『梨緒さんが現れた』という異変の調査に協力してもらえれば幸いです」
line = "「ただ、生活と安全を保障する代わりに、『梨緒さんが現れた』という異変の調査に協力してもらえれば幸いです」"

[[dialogue]]
speaker = "梨緒"
# 「む……それはもしかすると、私は今後、軟禁生活になる、ということか？」
line = "「む……それはもしかすると、私は今後、軟禁生活になる、ということか？」"

[[dialogue]]
speaker = "梨緒"
# （今までの行動については、私の反応を伺うために泳がせていたという話だ。その答えが出た以上、素性の知れない人間を好き勝手させる道理はない、か？）
line = "（今までの行動については、私の反応を伺うために泳がせていたという話だ。その答えが出た以上、素性の知れない人間を好き勝手させる道理はない、か？）"

[[dialogue]]
speaker = "フィオナ"
# 「違います、違いますっ！　梨緒さんには今まで通り、自由に生活していただいて構いません」
line = "「違います、違いますっ！　梨緒さんには今まで通り、自由に生活していただいて構いません」"

[[dialogue]]
speaker = "フィオナ"
# 「もちろん、梨緒さんに悪意や企みの気配があれば、そういうことも考えました」
line = "「もちろん、梨緒さんに悪意や企みの気配があれば、そういうことも考えました」"

[[dialogue]]
speaker = "フィオナ"
# 「緋宮会長との御前試合で、あなたが卑怯な手や不審な動きをすれば、会場内に控えさせていた全戦力をもって、あなたを討っていたでしょう」
line = "「緋宮会長との御前試合で、あなたが卑怯な手や不審な動きをすれば、会場内に控えさせていた全戦力をもって、あなたを討っていたでしょう」"

[[dialogue]]
speaker = "フィオナ"
# 「しかし、あなたにそういった素振りはありませんでした」
line = "「しかし、あなたにそういった素振りはありませんでした」"

[[dialogue]]
speaker = "フィオナ"
# 「疑いが晴れた以上、リクリエの新型モンスターに単騎で対抗できる星騎士を遊ばせておく余力は、私たちにはありません」
line = "「疑いが晴れた以上、リクリエの新型モンスターに単騎で対抗できる星騎士を遊ばせておく余力は、私たちにはありません」"

[[dialogue]]
speaker = "梨緒"
# 「つまり？」
line = "「つまり？」"

[[dialogue]]
speaker = "フィオナ"
# 「今後は正式に新星学園の生徒として登録してもらい、その力を我々星徒会にもお貸しください」
line = "「今後は正式に新星学園の生徒として登録してもらい、その力を我々星徒会にもお貸しください」"

[[dialogue]]
speaker = "フィオナ"
# 「学園としても星見家としても、梨緒さんが現れた謎の究明については急務です」
line = "「学園としても星見家としても、梨緒さんが現れた謎の究明については急務です」"

[[dialogue]]
speaker = "フィオナ"
# 「不明点が多く、手探りの調査になると思いますが、共同歩調が取れれば幸いです」
line = "「不明点が多く、手探りの調査になると思いますが、共同歩調が取れれば幸いです」"

[[dialogue]]
speaker = "梨緒"
# 「なるほど。私にとってはこれ以上ない申し出だ」
line = "「なるほど。私にとってはこれ以上ない申し出だ」"

[[dialogue]]
speaker = "梨緒"
# 「ただ、私にとって『魔王の力』が危険なものであるという認識は変わらない」
line = "「ただ、私にとって『魔王の力』が危険なものであるという認識は変わらない」"

[[dialogue]]
speaker = "梨緒"
# 「君たちは信じないだろうが、私はリクリエではなく、魔王が世界を滅ぼす様をこの目で見たんだ」
line = "「君たちは信じないだろうが、私はリクリエではなく、魔王が世界を滅ぼす様をこの目で見たんだ」"

[[dialogue]]
speaker = "クロト"
# 「君の見たものを疑っているわけじゃない。ただ、魔王の力はリクリエに抗うための肝だ。危険だから手放します、というわけにはいかない」
line = "「君の見たものを疑っているわけじゃない。ただ、魔王の力はリクリエに抗うための肝だ。危険だから手放します、というわけにはいかない」"

[[dialogue]]
speaker = "梨緒"
# 「わかっている。だから私は、その力を禁じるのではなく、その力を振るう君自身を監視するとしよう」
line = "「わかっている。だから私は、その力を禁じるのではなく、その力を振るう君自身を監視するとしよう」"

[[dialogue]]
speaker = "梨緒"
# 「いざという時に君を命に代えても止める者がいれば、世界そのものが無くなってしまうという最悪の事態は防げるかもしれない」
line = "「いざという時に君を命に代えても止める者がいれば、世界そのものが無くなってしまうという最悪の事態は防げるかもしれない」"

[[dialogue]]
speaker = "梨緒"
# 「そして、そういった後ろ暗い役割は、君の仲間ではなく、私のような外の人間が担うべきだ」
line = "「そして、そういった後ろ暗い役割は、君の仲間ではなく、私のような外の人間が担うべきだ」"

[[dialogue]]
speaker = "フィオナ"
# 「それは……」
line = "「それは……」"

[[dialogue]]
speaker = "クロト"
# 「ありがとう」
line = "「ありがとう」"

[[dialogue]]
speaker = "クロト"
# 「正直、俺自身、魔王の力を使いこなせてるとは言い難いし、この力で仲間を傷つけるのが怖い」
line = "「正直、俺自身、魔王の力を使いこなせてるとは言い難いし、この力で仲間を傷つけるのが怖い」"

[[dialogue]]
speaker = "クロト"
# 「そうならないよう努力するが、いざという時に梨緒が介錯してくれるなら、気兼ねなくやれるってものだ」
line = "「そうならないよう努力するが、いざという時に梨緒が介錯してくれるなら、気兼ねなくやれるってものだ」"

[[dialogue]]
speaker = "梨緒"
# 「……悟ったようなことを言うんだな。自分の命を他人に預けることなんて、そう簡単にできないというのに」
line = "「……悟ったようなことを言うんだな。自分の命を他人に預けることなんて、そう簡単にできないというのに」"

[[dialogue]]
speaker = "梨緒"
# 「まあいい。私のやり方を認めてもらえるのなら、表立って敵対する理由はない」
line = "「まあいい。私のやり方を認めてもらえるのなら、表立って敵対する理由はない」"

[[dialogue]]
speaker = "梨緒"
# 「だが覚悟しろ、緋宮クロト」
line = "「だが覚悟しろ、緋宮クロト」"

[[dialogue]]
speaker = "梨緒"
# 「魔王という立場だけではない。新星の星徒会長としても、君が本当に相応しい人物なのかどうかを、私は常に監視し続けているからな」
line = "「魔王という立場だけではない。新星の星徒会長としても、君が本当に相応しい人物なのかどうかを、私は常に監視し続けているからな」"

[[dialogue]]
speaker = "unk"
# 梨緒の宣言に対し、緋宮クロトは満足そうに頷いた。
line = "梨緒の宣言に対し、緋宮クロトは満足そうに頷いた。"

[[dialogue]]
speaker = "unk"
# そうして、長い長い１日が終わった。
line = "そうして、長い長い１日が終わった。"

[[dialogue]]
speaker = "unk"
# 魔王、御前試合、星徒会長、そして平行世界。
line = "魔王、御前試合、星徒会長、そして平行世界。"

[[dialogue]]
speaker = "unk"
# 梨緒にとってはわからないことだらけだったが、ひとつの節目が終わり、新しい生活が始まる契機の日であったことだけは、間違いなかった。
line = "梨緒にとってはわからないことだらけだったが、ひとつの節目が終わり、新しい生活が始まる契機の日であったことだけは、間違いなかった。"
