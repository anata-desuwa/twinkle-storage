[[dialogue]]
speaker = "ジャクリーヌ"
# 「ついにこの時がやってきたゆ！　余の時代の到来だゆ！」
line = "「ついにこの時がやってきたゆ！　余の時代の到来だゆ！」"

[[dialogue]]
speaker = "unk"
# カフェテリアにやってくると、テンションの上がっているジャクリーヌの声が耳に飛び込んできた。
line = "カフェテリアにやってくると、テンションの上がっているジャクリーヌの声が耳に飛び込んできた。"

[[dialogue]]
speaker = "unk"
# 同じテーブルにはソフィアとウズメの仲良しコンビの姿も見える。
line = "同じテーブルにはソフィアとウズメの仲良しコンビの姿も見える。"

[[dialogue]]
speaker = "ウズメイア"
# 「あはは♪　ゆゆ姫ちゃん、メッチャテンション上がってるじゃん。ま、明日はハロウィンだからしゃーなしか♪」
line = "「あはは♪　ゆゆ姫ちゃん、メッチャテンション上がってるじゃん。ま、明日はハロウィンだからしゃーなしか♪」"

[[dialogue]]
speaker = "unk"
# ゆゆ姫ちゃんって？
line = "ゆゆ姫ちゃんって？"

[[dialogue]]
speaker = "ソフィア"
# 「ウズメがジャクリーヌさんにつけたあだ名です、例によって」
line = "「ウズメがジャクリーヌさんにつけたあだ名です、例によって」"

[[dialogue]]
speaker = "ソフィア"
# 「ですがジャクリーヌさん、自重してくださいね。前回のハロウィンでは、はしゃぎすぎて大変なことになったという話じゃないですか」
line = "「ですがジャクリーヌさん、自重してくださいね。前回のハロウィンでは、はしゃぎすぎて大変なことになったという話じゃないですか」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆ～……忘れて欲しいの。あれは若気の至りというやつなの」
line = "「ゆ～……忘れて欲しいの。あれは若気の至りというやつなの」"

[[dialogue]]
speaker = "ウズメイア"
# 「えー？　あたし知らないんだけど、そんな事件あったの？」
line = "「えー？　あたし知らないんだけど、そんな事件あったの？」"

[[dialogue]]
speaker = "ソフィア"
# 「ジャクリーヌさんの能力で、ハロウィンが何回も繰り返されてしまったらしいです」
line = "「ジャクリーヌさんの能力で、ハロウィンが何回も繰り返されてしまったらしいです」"

[[dialogue]]
speaker = "ウズメイア"
# 「え～っ、ちょー面白そうなこと起こってるんですけど！？　全然知らなかったし！」
line = "「え～っ、ちょー面白そうなこと起こってるんですけど！？　全然知らなかったし！」"

[[dialogue]]
speaker = "ソフィア"
# 「当日にジャクリーヌさんと接触を持った人以外は感知できない異変だったそうです」
line = "「当日にジャクリーヌさんと接触を持った人以外は感知できない異変だったそうです」"

[[dialogue]]
speaker = "ソフィア"
# 「かく言う私も、後で会長さんに教えてもらったから知っているわけで……」
line = "「かく言う私も、後で会長さんに教えてもらったから知っているわけで……」"

[[dialogue]]
speaker = "unk"
# あれは大変な事件だった
line = "あれは大変な事件だった"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「も、もうその話はいいゆ！」
line = "「も、もうその話はいいゆ！」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「それよりハロウィンパーティーでは、どんなお菓子が食べられるか今から楽しみゆ～♪」
line = "「それよりハロウィンパーティーでは、どんなお菓子が食べられるか今から楽しみゆ～♪」"

[[dialogue]]
speaker = "ウズメイア"
# 「もうハロウィン当日のことで頭がいっぱいって感じだし♪」
line = "「もうハロウィン当日のことで頭がいっぱいって感じだし♪」"

[[dialogue]]
speaker = "ソフィア"
# 「また変な事件を起こしてしまわないか心配なんですが……」
line = "「また変な事件を起こしてしまわないか心配なんですが……」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「決めたゆ！　ハロウィンは２人と遊ぶゆ！」
line = "「決めたゆ！　ハロウィンは２人と遊ぶゆ！」"

[[dialogue]]
speaker = "ソフィア"
# 「この流れでそのお誘いは恐すぎます！　絶対に何かに巻き込まれるフラグじゃないですか！」
line = "「この流れでそのお誘いは恐すぎます！　絶対に何かに巻き込まれるフラグじゃないですか！」"

[[dialogue]]
speaker = "ウズメイア"
# 「それはそれで面白そーじゃん！　そーしよーよ！」
line = "「それはそれで面白そーじゃん！　そーしよーよ！」"

[[dialogue]]
speaker = "ソフィア"
# 「ん……舞亜もフィギュアスケートの大会で居ませんし、２人では少し寂しいかもと思っていましたし……」
line = "「ん……舞亜もフィギュアスケートの大会で居ませんし、２人では少し寂しいかもと思っていましたし……」"

[[dialogue]]
speaker = "ソフィア"
# 「そうですね、ジャクリーヌさんも一緒に３人で遊んだ方が賑やかで楽しいかもしれません」
line = "「そうですね、ジャクリーヌさんも一緒に３人で遊んだ方が賑やかで楽しいかもしれません」"

[[dialogue]]
speaker = "ウズメイア"
# 「ぜーったいそうだよ！　ゆゆ姫ちゃん、一緒に思いっきり楽しもっ♪」
line = "「ぜーったいそうだよ！　ゆゆ姫ちゃん、一緒に思いっきり楽しもっ♪」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆ～♪」
line = "「ゆ～♪」"

[[dialogue]]
speaker = "ソフィア"
# 「っ！？　これは……！」
line = "「っ！？　これは……！」"

[[dialogue]]
speaker = "ウズメイア"
# 「どーゆーこと？　勝手に変身しちゃったし！」
line = "「どーゆーこと？　勝手に変身しちゃったし！」"

[[dialogue]]
speaker = "unk"
# めっ！
line = "めっ！"

[[dialogue]]
speaker = "unk"
# ジャクリーヌ！？
line = "ジャクリーヌ！？"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ち、違うゆ！　余は何もしてないゆ！」
line = "「ち、違うゆ！　余は何もしてないゆ！」"

[[dialogue]]
speaker = "ソフィア"
# 「ですが衣装的に間違いなくハロウィンっぽい感じですし……」
line = "「ですが衣装的に間違いなくハロウィンっぽい感じですし……」"

[[dialogue]]
speaker = "ウズメイア"
# 「あたしのは狼ちゃんだ。あははっ、カワイイ～♪」
line = "「あたしのは狼ちゃんだ。あははっ、カワイイ～♪」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「２人ともよく似合ってるゆ♪」
line = "「２人ともよく似合ってるゆ♪」"

[[dialogue]]
speaker = "ソフィア"
# 「似合ってるゆ♪　じゃありません！　本当に何もしてないんですか？」
line = "「似合ってるゆ♪　じゃありません！　本当に何もしてないんですか？」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「本当だゆ！」
line = "「本当だゆ！」"

[[dialogue]]
speaker = "ウズメイア"
# 「ねえねえ……なんかこの戦闘服、解除できないみたいなんだけど？」
line = "「ねえねえ……なんかこの戦闘服、解除できないみたいなんだけど？」"

[[dialogue]]
speaker = "ソフィア"
# 「そうじゃないかと思っていましたが、やっぱりですか……」
line = "「そうじゃないかと思っていましたが、やっぱりですか……」"

[[dialogue]]
speaker = "unk"
# とりあえず原因を調べてみよう
line = "とりあえず原因を調べてみよう"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「そうするゆ！　何でもかんでも余のせいにするのはよくないゆ！」
line = "「そうするゆ！　何でもかんでも余のせいにするのはよくないゆ！」"

[[dialogue]]
speaker = "ソフィア"
# 「そうですね。ではとりあえずハロウィンの異変について詳しそうな人に聞いてみましょうか」
line = "「そうですね。ではとりあえずハロウィンの異変について詳しそうな人に聞いてみましょうか」"

[[dialogue]]
speaker = "ヒトリ"
# 「ジャクリーヌちゃんが原因です……」
line = "「ジャクリーヌちゃんが原因です……」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆーーーー！！　なんでーーーーー！！！！」
line = "「ゆーーーー！！　なんでーーーーー！！！！」"

[[dialogue]]
speaker = "ヒトリ"
# 「前の時と同じように、わたしの棺桶がカボチャ色になってしまっています。これはまさしくハロウィンパワーが溜まっているという証拠で……」
line = "「前の時と同じように、わたしの棺桶がカボチャ色になってしまっています。これはまさしくハロウィンパワーが溜まっているという証拠で……」"

[[dialogue]]
speaker = "ヒトリ"
# 「ソフィアさんとウズメイアさんの変身が解けなくなってしまったのは、ジャクリーヌちゃんの力が影響していると考えて間違いないかと」
line = "「ソフィアさんとウズメイアさんの変身が解けなくなってしまったのは、ジャクリーヌちゃんの力が影響していると考えて間違いないかと」"

[[dialogue]]
speaker = "ヒトリ"
# 「でもジャクリーヌちゃんは前回のハロウィンの時にいろいろ反省しましたから、わざとやっているとは思えないですし……」
line = "「でもジャクリーヌちゃんは前回のハロウィンの時にいろいろ反省しましたから、わざとやっているとは思えないですし……」"

[[dialogue]]
speaker = "ヒトリ"
# 「も、もしかするとハロウィンが近づくにつれて、ジャクリーヌちゃんのテンションが上がってしまったことが原因かもしれません」
line = "「も、もしかするとハロウィンが近づくにつれて、ジャクリーヌちゃんのテンションが上がってしまったことが原因かもしれません」"

[[dialogue]]
speaker = "ソフィア"
# 「なるほど、無意識に周囲に影響を及ぼしてしまった、ということですね……」
line = "「なるほど、無意識に周囲に影響を及ぼしてしまった、ということですね……」"

[[dialogue]]
speaker = "ウズメイア"
# 「とりまゆゆ姫ちゃんが原因ってことは間違いないわけだ。だったらサクッと元に戻してもらえば万事解決じゃない？」
line = "「とりまゆゆ姫ちゃんが原因ってことは間違いないわけだ。だったらサクッと元に戻してもらえば万事解決じゃない？」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆっ！？　そんなこと言われても困るゆ！　どうすれば元に戻るかなんてわからないゆ！」
line = "「ゆっ！？　そんなこと言われても困るゆ！　どうすれば元に戻るかなんてわからないゆ！」"

[[dialogue]]
speaker = "ソフィア"
# 「無意識に作用してしまったということだとしたら、そう簡単にはいかないでしょう」
line = "「無意識に作用してしまったということだとしたら、そう簡単にはいかないでしょう」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆ～、余はどうすればいいゆ？」
line = "「ゆ～、余はどうすればいいゆ？」"

[[dialogue]]
speaker = "unk"
# ハロウィンパワーを発散すればいい？
line = "ハロウィンパワーを発散すればいい？"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆーっ！！！」
line = "「ゆーっ！！！」"

[[dialogue]]
speaker = "ヒトリ"
# 「それで何とかなればよいのですが……」
line = "「それで何とかなればよいのですが……」"

[[dialogue]]
speaker = "ウズメイア"
# 「前回もそれで解決したんだからいけるっしょ？　同じ感じで何とかなるって♪」
line = "「前回もそれで解決したんだからいけるっしょ？　同じ感じで何とかなるって♪」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「間違いないゆ！　それでいくゆ！　で、結局、余は何をすればいいゆ？」
line = "「間違いないゆ！　それでいくゆ！　で、結局、余は何をすればいいゆ？」"

[[dialogue]]
speaker = "unk"
# ハロウィンを思い切り楽しめば？
line = "ハロウィンを思い切り楽しめば？"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆ？　楽しめばいいゆ？」
line = "「ゆ？　楽しめばいいゆ？」"

[[dialogue]]
speaker = "ウズメイア"
# 「ま、そゆことっ。んで、あたしらはゆゆ姫ちゃんのこと思いっきり楽しくさせてあげればいいし♪」
line = "「ま、そゆことっ。んで、あたしらはゆゆ姫ちゃんのこと思いっきり楽しくさせてあげればいいし♪」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ホントかゆ？　助けてくれるゆ？」
line = "「ホントかゆ？　助けてくれるゆ？」"

[[dialogue]]
speaker = "ウズメイア"
# 「っていうか助けるとかないし、元々そーいう話だったじゃん」
line = "「っていうか助けるとかないし、元々そーいう話だったじゃん」"

[[dialogue]]
speaker = "ソフィア"
# 「そうですね。では早速いろいろと計画を立てるとしましょう」
line = "「そうですね。では早速いろいろと計画を立てるとしましょう」"

[[dialogue]]
speaker = "ヒトリ"
# 「わたしとゆーちゃんも協力します……っ！」
line = "「わたしとゆーちゃんも協力します……っ！」"

[[dialogue]]
speaker = "ゆーちゃん"
# 「ゆー♪」
line = "「ゆー♪」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆっゆっゆ～♪　ますます明日が楽しみになったゆ♪」
line = "「ゆっゆっゆ～♪　ますます明日が楽しみになったゆ♪」"

[[dialogue]]
speaker = "unk"
# こうして俺たちはハロウィンに向けて、ジャクリーヌを思いっきり楽しませるための計画を練ることになったのだった。
line = "こうして俺たちはハロウィンに向けて、ジャクリーヌを思いっきり楽しませるための計画を練ることになったのだった。"
