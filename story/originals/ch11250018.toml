[[dialogue]]
speaker = "unk"
# 今日はちょっと趣向を変えて、アポロの演技力向上も兼ねて、一風変わったシチュエーションを試していた。
line = "今日はちょっと趣向を変えて、アポロの演技力向上も兼ねて、一風変わったシチュエーションを試していた。"

[[dialogue]]
speaker = "クロト"
# 「お前の惨めな姿は全世界に配信されている。いつもお前が守ってやっているやつらに、女の部分を晒す気分はどうだ？」
line = "「お前の惨めな姿は全世界に配信されている。いつもお前が守ってやっているやつらに、女の部分を晒す気分はどうだ？」"

[[dialogue]]
speaker = "アポロ"
# 「なっ……！？　くぅぅっ……」
