[[dialogue]]
speaker = "アポロ"
# 「こんなところに連れてきて、あたしに何をするつもりだっ！？」
line = "「こんなところに連れてきて、あたしに何をするつもりだっ！？」"

[[dialogue]]
speaker = "クロト"
# 「女を捕まえてやることなんて決まっているだろう？　ここならいくら泣き叫ぼうと助けは来ないぞ」
