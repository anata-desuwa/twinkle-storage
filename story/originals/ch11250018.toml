[[dialogue]]
speaker = "アポロ（大人）"
# 「く、ぅ……ヒーローは、負けな──」
line = "「く、ぅ……ヒーローは、負けな──」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「くぁあああああっ！？」
line = "「くぁあああああっ！？」"

[[dialogue]]
speaker = "unk"
# 街を守るヒーロー、アポロは怪人に敗北した。
line = "街を守るヒーロー、アポロは怪人に敗北した。"

[[dialogue]]
speaker = "unk"
# あろうことか、怪人はアポロをアジトに連れ去って──
