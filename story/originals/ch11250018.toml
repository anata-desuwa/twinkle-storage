[[dialogue]]
speaker = "アポロ"
# 「ッ──！」
line = "「ッ──！」"

[[dialogue]]
speaker = "unk"
# ペニスを見せつけるように秘部に沿えると、一瞬アポロが怯えた表情を見せた。
