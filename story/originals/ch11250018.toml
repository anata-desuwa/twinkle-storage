[[dialogue]]
speaker = "アポロ"
# 「うぅっ……くそぉっ……」
line = "「うぅっ……くそぉっ……」"

[[dialogue]]
speaker = "unk"
# 足ごと抱きかかえられ、あられもない格好で拘束されるアポロ。
line = "足ごと抱きかかえられ、あられもない格好で拘束されるアポロ。"

[[dialogue]]
speaker = "unk"
# 先ほどの戦闘で身を守るスーツは破け、女として大事なところが剥き出しになってしまっている。
