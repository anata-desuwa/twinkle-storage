[[dialogue]]
speaker = "unk"
# 顔を真っ赤にしながら歯を食いしばり、悔しさと羞恥に震えるアポロ。
line = "顔を真っ赤にしながら歯を食いしばり、悔しさと羞恥に震えるアポロ。"

[[dialogue]]
speaker = "unk"
# 実際はカメラで撮影などしていないが、アポロの表情は真に迫っていた。
line = "実際はカメラで撮影などしていないが、アポロの表情は真に迫っていた。"

[[dialogue]]
speaker = "クロト"
# 「正義の味方が堕ちるところを民衆に見せてやる。ヒーローが犯されて無様に喘ぐ姿を見れば、希望など簡単に打ち砕かれるだろう」
line = "「正義の味方が堕ちるところを民衆に見せてやる。ヒーローが犯されて無様に喘ぐ姿を見れば、希望など簡単に打ち砕かれるだろう」"

[[dialogue]]
speaker = "アポロ"
# 「いいや、正義は悪に屈しない！　お前に穢されようと、あたしの心が折れることはない！」
line = "「いいや、正義は悪に屈しない！　お前に穢されようと、あたしの心が折れることはない！」"

[[dialogue]]
speaker = "クロト"
