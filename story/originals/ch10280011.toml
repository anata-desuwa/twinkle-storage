[[dialogue]]
speaker = "unk"
# 第１話,その可憐な美少女は……,P
line = "第１話,その可憐な美少女は……,P"

[[dialogue]]
speaker = "unk"
# ある日の放課後、マトイと星徒会の仕事をしていた時のこと――
line = "ある日の放課後、マトイと星徒会の仕事をしていた時のこと――"

[[dialogue]]
speaker = "トマル"
# 「お仕事中に、失礼致します」
line = "「お仕事中に、失礼致します」"

[[dialogue]]
speaker = "マトイ"
# 「えっ、トマル！？　こっちに来るなんて、一体どうしたの？」
line = "「えっ、トマル！？　こっちに来るなんて、一体どうしたの？」"

[[dialogue]]
speaker = "トマル"
# 「姉さまが珍しく忘れ物をされていたので、届けにきたんです」
line = "「姉さまが珍しく忘れ物をされていたので、届けにきたんです」"

[[dialogue]]
speaker = "マトイ"
# 「う～ん、忘れ物がないのは私の数少ない長所だったんだけどなぁ……。あっ、それってお母さんが今朝渡すって言ってたやつ」
line = "「う～ん、忘れ物がないのは私の数少ない長所だったんだけどなぁ……。あっ、それってお母さんが今朝渡すって言ってたやつ」"

[[dialogue]]
speaker = "トマル"
# 「はい。正確には母さまが渡すのを忘れてたんですけど、星徒会の皆さまと食べて欲しいと言っていたお菓子セットです」
line = "「はい。正確には母さまが渡すのを忘れてたんですけど、星徒会の皆さまと食べて欲しいと言っていたお菓子セットです」"

[[dialogue]]
speaker = "unk"
# 初めまして。マトイのご家族の方かな？
line = "初めまして。マトイのご家族の方かな？"

[[dialogue]]
speaker = "トマル"
# 「ご挨拶が遅れて申し訳ございません、新しい会長さま。私は――あっ……！」
line = "「ご挨拶が遅れて申し訳ございません、新しい会長さま。私は――あっ……！」"

[[dialogue]]
speaker = "トマル"
# 「あなた様は、あの時の……！」
line = "「あなた様は、あの時の……！」"

[[dialogue]]
speaker = "トマル"
# （２年程前に、親戚の神社で行われた地域振興イベントの時、巫女をやっていた私は、迷子の子を見つけて対応することになりました）
line = "（２年程前に、親戚の神社で行われた地域振興イベントの時、巫女をやっていた私は、迷子の子を見つけて対応することになりました）"

[[dialogue]]
speaker = "トマル"
# （しかし、保護者の方はなかなか見つからず、その子も泣き出してしまって……その場に居合わせた大人の男性にも、泣き止ませろと怒鳴られてしまいました）
line = "（しかし、保護者の方はなかなか見つからず、その子も泣き出してしまって……その場に居合わせた大人の男性にも、泣き止ませろと怒鳴られてしまいました）"

[[dialogue]]
speaker = "トマル"
# （そんな時、パニックになっている私の前に現れたのが――）
line = "（そんな時、パニックになっている私の前に現れたのが――）"

[[dialogue]]
speaker = "トマル"
# （その会場でイベント設営のバイトをなさっていた、会長さまでした）
line = "（その会場でイベント設営のバイトをなさっていた、会長さまでした）"

[[dialogue]]
speaker = "トマル"
# （あなた様は、子供を優しく泣き止ませ、怒鳴っていた男性もなだめて、その場の雰囲気を変えて下さいました）
line = "（あなた様は、子供を優しく泣き止ませ、怒鳴っていた男性もなだめて、その場の雰囲気を変えて下さいました）"

[[dialogue]]
speaker = "トマル"
# （そして迷子の保護者様も一緒に探して下さって、私が助けて頂いたお礼を伝えると……）
line = "（そして迷子の保護者様も一緒に探して下さって、私が助けて頂いたお礼を伝えると……）"

[[dialogue]]
speaker = "トマル"
# （困っている人が居たら、お互い様だよ、と優しく微笑んで見せたのです。その言葉は、心からの本音だと分かる、それはそれは素敵な笑顔で――）
line = "（困っている人が居たら、お互い様だよ、と優しく微笑んで見せたのです。その言葉は、心からの本音だと分かる、それはそれは素敵な笑顔で――）"

[[dialogue]]
speaker = "トマル"
# （私はその時に、初めて恋というものを知ったのです）
line = "（私はその時に、初めて恋というものを知ったのです）"

[[dialogue]]
speaker = "トマル"
# （初めて知る感情に戸惑って、その場では連絡先を聞くことも、名前を聞くことも出来ずに、別れてしまいましたが……）
line = "（初めて知る感情に戸惑って、その場では連絡先を聞くことも、名前を聞くことも出来ずに、別れてしまいましたが……）"

[[dialogue]]
speaker = "トマル"
# （まさかあの時の方が、最近姉さまのよく話す、新しい会長さまだったなんて……！）
line = "（まさかあの時の方が、最近姉さまのよく話す、新しい会長さまだったなんて……！）"

[[dialogue]]
speaker = "unk"
# キミはもしかして、以前に神社で会った――
line = "キミはもしかして、以前に神社で会った――"

[[dialogue]]
speaker = "トマル"
# 「は、はい！　あの時お世話になった、巫女をやっていた者です……！」
line = "「は、はい！　あの時お世話になった、巫女をやっていた者です……！」"

[[dialogue]]
speaker = "マトイ"
# 「えっ、何？　会長って、私の弟とまさか顔見知りだったの！？」
line = "「えっ、何？　会長って、私の弟とまさか顔見知りだったの！？」"

[[dialogue]]
speaker = "unk"
# そうか、この子はマトイの……ん？
line = "そうか、この子はマトイの……ん？"

[[dialogue]]
speaker = "トマル"
# 「わ、私、急用を思い出したので、これにて失礼致しますっ」
line = "「わ、私、急用を思い出したので、これにて失礼致しますっ」"

[[dialogue]]
speaker = "マトイ"
# 「あっ、ちょっ、トマル！？　いきなりどうしたのよ？　トマル～～～っ！」
line = "「あっ、ちょっ、トマル！？　いきなりどうしたのよ？　トマル～～～っ！」"

[[dialogue]]
speaker = "マトイ"
# 「あの子があんな反応するの、初めて見たかも……えっと、会長は何か前に会ったことがあるみたいだけど――」
line = "「あの子があんな反応するの、初めて見たかも……えっと、会長は何か前に会ったことがあるみたいだけど――」"

[[dialogue]]
speaker = "マトイ"
# 「あの子の名前は、<ruby=よみの>詠野</ruby>トマル。流星学園の附属校に通っている３年生で、さっきも言った通り――」
line = "「あの子の名前は、<ruby>詠野<rt>よみの</rt></ruby>トマル。流星学園の附属校に通っている３年生で、さっきも言った通り――」"

[[dialogue]]
speaker = "マトイ"
# 「可愛くて、普通じゃない、私の自慢の<b>弟</b>よ」
line = "「可愛くて、普通じゃない、私の自慢の<b>弟</b>よ」"

[[dialogue]]
speaker = "unk"
# ……めっちゃ可愛かったけど、弟なの？
line = "……めっちゃ可愛かったけど、弟なの？"

[[dialogue]]
speaker = "マトイ"
# 「めっちゃ可愛いけど、実は男よ！」
line = "「めっちゃ可愛いけど、実は男よ！」"

[[dialogue]]
speaker = "unk"
# 翌日の放課後――
line = "翌日の放課後――"

[[dialogue]]
speaker = "トマル"
# 「あの……失礼致します……！」
line = "「あの……失礼致します……！」"

[[dialogue]]
speaker = "トマル"
# 「き、昨日はあなた様にまともな挨拶も出来ず、突然立ち去ってしまい、大変申し訳ありませんでした……」
line = "「き、昨日はあなた様にまともな挨拶も出来ず、突然立ち去ってしまい、大変申し訳ありませんでした……」"

[[dialogue]]
speaker = "トマル"
# 「まさか、あの時の方と再会できるとは思わず、動揺してしまいまして……」
line = "「まさか、あの時の方と再会できるとは思わず、動揺してしまいまして……」"

[[dialogue]]
speaker = "トマル"
# 「改めまして、マトイ姉さまの弟、詠野トマルと申します。日頃、姉さまがお世話になっております」
line = "「改めまして、マトイ姉さまの弟、詠野トマルと申します。日頃、姉さまがお世話になっております」"

[[dialogue]]
speaker = "トマル"
# 「姉さまからも既に聞いているかとは思いますが、私、恥ずかしながら性別は男でして……」
line = "「姉さまからも既に聞いているかとは思いますが、私、恥ずかしながら性別は男でして……」"

[[dialogue]]
speaker = "unk"
# う～ん、やっぱり美少女にしか見えない……！
line = "う～ん、やっぱり美少女にしか見えない……！"

[[dialogue]]
speaker = "トマル"
# 「あ、ありがとうございます……そう言って頂けて、嬉しいです……」
line = "「あ、ありがとうございます……そう言って頂けて、嬉しいです……」"

[[dialogue]]
speaker = "トマル"
# 「姉さまのような、素敵な女の子になることが、私の目標ですので」
line = "「姉さまのような、素敵な女の子になることが、私の目標ですので」"

[[dialogue]]
speaker = "unk"
# これからまた、よろしくね
line = "これからまた、よろしくね"

[[dialogue]]
speaker = "unk"
# また会えるなんて、不思議な縁を感じるな
line = "また会えるなんて、不思議な縁を感じるな"

[[dialogue]]
speaker = "トマル"
# 「はい！　こちらこそ、よろしくお願い致します。会長さま♪」
line = "「はい！　こちらこそ、よろしくお願い致します。会長さま♪」"

[[dialogue]]
speaker = "サチ"
# 「失礼します！　お兄さん、急ぎでお願いしたいことが！」
line = "「失礼します！　お兄さん、急ぎでお願いしたいことが！」"

[[dialogue]]
speaker = "サチ"
# 「……って、トマルくん？　どうしてここに？」
line = "「……って、トマルくん？　どうしてここに？」"

[[dialogue]]
speaker = "トマル"
# 「サチさまこそ、どうかなさったんですか？　もしかして――」
line = "「サチさまこそ、どうかなさったんですか？　もしかして――」"

[[dialogue]]
speaker = "サチ"
# 「トマルくんもいるなら、ちょうどいいです！　実は新星学園の校舎に、新しいロストアイテムが現れたんです！」
line = "「トマルくんもいるなら、ちょうどいいです！　実は新星学園の校舎に、新しいロストアイテムが現れたんです！」"

[[dialogue]]
speaker = "サチ"
# 「お２人共、協力してくれませんか！」
line = "「お２人共、協力してくれませんか！」"

[[dialogue]]
speaker = "unk"
# 第２話へつづく――
line = "第２話へつづく――"
