[[dialogue]]
speaker = "マトイ"
# 「と、とりあえず……濡らして、準備するね？　……はぁぁっ<emoji=heart04>」
line = "「と、とりあえず……濡らして、準備するね？　……はぁぁっ<emoji=heart04>」"

