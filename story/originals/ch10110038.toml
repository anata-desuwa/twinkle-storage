[[dialogue]]
speaker = "unk"
# とある休日。俺は恋人のマトイと、街へデートに出かけていた。
line = "とある休日。俺は恋人のマトイと、街へデートに出かけていた。"

[[dialogue]]
speaker = "unk"
# その帰り際のこと――
line = "その帰り際のこと――"

[[dialogue]]
speaker = "クロト"
# 「辺りも暗くなってきたし、今日はそろそろ帰ろうか」
line = "「辺りも暗くなってきたし、今日はそろそろ帰ろうか」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「う、うん……」
line = "「う、うん……」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「……あ、あのね、会長！」
line = "「……あ、あのね、会長！」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「えっと、その……ね？」
line = "「えっと、その……ね？」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「今日はまだ私……帰りたくないかも～……な、なんて……」
line = "「今日はまだ私……帰りたくないかも～……な、なんて……」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「だから、もし……会長さえよければ……」
line = "「だから、もし……会長さえよければ……」"

[[dialogue]]
speaker = "unk"
# そうして、俺は珍しくマトイの方から誘われる形で、ラブホテルに入ることになった――
line = "そうして、俺は珍しくマトイの方から誘われる形で、ラブホテルに入ることになった――"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「会長……<emoji=heart04>　んっ……ちゅっ<emoji=heart04>　ちゅぷぷっ……<emoji=heart04>」
line = "「会長……<emoji=heart04>　んっ……ちゅっ<emoji=heart04>　ちゅぷぷっ……<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「んちゅっ……<emoji=heart04>　ちゅぷっ……れろちゅっ<emoji=heart04>　んむっ、ちゅっ<emoji=heart04>　ちゅうぅっ……れろちゅっ、ちゅぷぷっ<emoji=heart04>」
line = "「んちゅっ……<emoji=heart04>　ちゅぷっ……れろちゅっ<emoji=heart04>　んむっ、ちゅっ<emoji=heart04>　ちゅうぅっ……れろちゅっ、ちゅぷぷっ<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「んむっ、ちゅぱっ……ぷはぁっ<emoji=heart04>　はぁ……はぁ……はぁぁ<emoji=heart04>」
line = "「んむっ、ちゅぱっ……ぷはぁっ<emoji=heart04>　はぁ……はぁ……はぁぁ<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
# 「マトイ……」
line = "「マトイ……」"

[[dialogue]]
speaker = "unk"
# 俺がそのまま、マトイをベッドに押し倒そうとすると――
line = "俺がそのまま、マトイをベッドに押し倒そうとすると――"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「あっ、待って、会長……！　あのね、今日は……」
line = "「あっ、待って、会長……！　あのね、今日は……」"

[[dialogue]]
speaker = "unk"
# マトイから提案されたのは、彼女が上になる騎乗位だった。
line = "マトイから提案されたのは、彼女が上になる騎乗位だった。"

[[dialogue]]
speaker = "マトイ"
# 「いつも気持ちよくしてもらってるから、今日は私が、会長を気持ちよくするね……<emoji=heart04>」
line = "「いつも気持ちよくしてもらってるから、今日は私が、会長を気持ちよくするね……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
# 「それにしても、どうしてノヴァフォームに変身……？」
line = "「それにしても、どうしてノヴァフォームに変身……？」"

[[dialogue]]
speaker = "マトイ"
# 「そ、それは……このノヴァフォームのお陰で、私は星騎士として一歩前に進めた気がしてる」
line = "「そ、それは……このノヴァフォームのお陰で、私は星騎士として一歩前に進めた気がしてる」"

[[dialogue]]
speaker = "マトイ"
# 「だから恋愛に関しても、もっと積極的な自分になれたらと思ってて……」
line = "「だから恋愛に関しても、もっと積極的な自分になれたらと思ってて……」"

[[dialogue]]
speaker = "マトイ"
# 「その……私、なかなか自分からエッチしたいって言い出せなくて……いつも会長から察して、誘ってくれてたでしょ？」
line = "「その……私、なかなか自分からエッチしたいって言い出せなくて……いつも会長から察して、誘ってくれてたでしょ？」"

[[dialogue]]
speaker = "マトイ"
# 「会長のこと、好きだなぁって気持ちが高まりすぎると、切なくなって……いっぱいこうやって、触れ合いたくなっちゃう。なのにいっつも、リードされてばっかり」
line = "「会長のこと、好きだなぁって気持ちが高まりすぎると、切なくなって……いっぱいこうやって、触れ合いたくなっちゃう。なのにいっつも、リードされてばっかり」"

[[dialogue]]
speaker = "マトイ"
# 「でもこの姿なら、いつもの自分より勇気が出せるんじゃないかなぁ、って……」
line = "「でもこの姿なら、いつもの自分より勇気が出せるんじゃないかなぁ、って……」"

[[dialogue]]
speaker = "マトイ"
# 「と言いつつ、結局脱いじゃうんだけど……えへへ」
line = "「と言いつつ、結局脱いじゃうんだけど……えへへ」"

[[dialogue]]
speaker = "クロト"
# 「なるほど……わかった。じゃあ今日は、色々マトイにお願いするよ」
line = "「なるほど……わかった。じゃあ今日は、色々マトイにお願いするよ」"

[[dialogue]]
speaker = "マトイ"
# 「うんっ……頑張るね<emoji=heart04>」
line = "「うんっ……頑張るね<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
# 「でも、その代わり、手を繋いだままでいてくれると、安心するかも……<emoji=heart04>」
line = "「でも、その代わり、手を繋いだままでいてくれると、安心するかも……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺は恋人繋ぎでそっと握り返して、頷く。
line = "俺は恋人繋ぎでそっと握り返して、頷く。"

[[dialogue]]
speaker = "マトイ"
# 「はあぁ……<emoji=heart04>　改めて見ると……会長のおち○ちん、やっぱり普通じゃなくて、すごい……<emoji=heart04>」
line = "「はあぁ……<emoji=heart04>　改めて見ると……会長のおち○ちん、やっぱり普通じゃなくて、すごい……<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
# 「――もう大きくなっちゃってて、恥ずかしい？」
line = "「――もう大きくなっちゃってて、恥ずかしい？」"

[[dialogue]]
speaker = "マトイ"
# 「でも、それだけ期待、してくれてるんだよね……？　それに、強いオスって感じがして……私は、好き<emoji=heart04>」
line = "「でも、それだけ期待、してくれてるんだよね……？　それに、強いオスって感じがして……私は、好き<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
# 「はぁっ……私に対して、エッチな気持ちを抱いてくれてる、証拠でもあるし……」
line = "「はぁっ……私に対して、エッチな気持ちを抱いてくれてる、証拠でもあるし……」"

[[dialogue]]
speaker = "マトイ"
# 「それが……何だか嬉しいなぁ<emoji=heart04>」
