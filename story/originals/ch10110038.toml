line = "「俺も。すごく興奮した……」"

[[dialogue]]
speaker = "マトイ"
# 「はあぁ……んん<emoji=heart04>　お腹の中、会長でいっぱいになってて……温かくて幸せ<emoji=heart04>」
line = "「はあぁ……んん<emoji=heart04>　お腹の中、会長でいっぱいになってて……温かくて幸せ<emoji=heart04>」"

