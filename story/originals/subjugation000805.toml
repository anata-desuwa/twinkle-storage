[[dialogue]]
speaker = "unk"
# 蘭美の指導により、上手く作れたかと思われたチョコであったが、再びゴーレム化してしまった。
line = "蘭美の指導により、上手く作れたかと思われたチョコであったが、再びゴーレム化してしまった。"

[[dialogue]]
speaker = "ゴーレム"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# そして、ゴーレムは以前よりも活発な様子で、動き始める。
line = "そして、ゴーレムは以前よりも活発な様子で、動き始める。"

[[dialogue]]
speaker = "蘭美"
# 「ちょっ、どういうことぴょん！？　ありえないぴょん！」
line = "「ちょっ、どういうことぴょん！？　ありえないぴょん！」"

[[dialogue]]
speaker = "蘭美"
# 「――って、驚きのあまり、地元の方言が出てしまったわ！」
line = "「――って、驚きのあまり、地元の方言が出てしまったわ！」"

[[dialogue]]
speaker = "蘭美"
# 「でも、間違いなく、シンプルなレシピ通りに作ったはずなのに……！」
line = "「でも、間違いなく、シンプルなレシピ通りに作ったはずなのに……！」"

[[dialogue]]
speaker = "せつな"
# 「チョコが光っている時、星力の気配を感じたでござる！　や、やっぱりせつなの星術が勝手に発動してしまっているようでござる！」
line = "「チョコが光っている時、星力の気配を感じたでござる！　や、やっぱりせつなの星術が勝手に発動してしまっているようでござる！」"

[[dialogue]]
speaker = "蘭美"
# 「本当にそんなことが……！？　と、とにかく！」
line = "「本当にそんなことが……！？　と、とにかく！」"

[[dialogue]]
speaker = "蘭美"
# 「実際にゴーレム化してしまった以上、厨房から出すわけにはいかないわ！　せつな、変身して止めるわよ！」
line = "「実際にゴーレム化してしまった以上、厨房から出すわけにはいかないわ！　せつな、変身して止めるわよ！」"

[[dialogue]]
speaker = "せつな"
# 「か、かしこまりでございまする！　――変身！」
line = "「か、かしこまりでございまする！　――変身！」"

[[dialogue]]
speaker = "unk"
# 戦闘後――
line = "戦闘後――"

[[dialogue]]
speaker = "せつな"
# 「ふぅ、すぐに倒せたでござる。強さは前と変わらないみたいで、助かったでござる……」
line = "「ふぅ、すぐに倒せたでござる。強さは前と変わらないみたいで、助かったでござる……」"

[[dialogue]]
speaker = "蘭美"
# 「と、とりあえず……何故かゴーレム化するということは、これでよくわかったわ……」
line = "「と、とりあえず……何故かゴーレム化するということは、これでよくわかったわ……」"

[[dialogue]]
speaker = "蘭美"
# 「こうなったら、ゴーレム化が起きる理由をトライ＆エラーで探るのみよ！　せつなが単純に料理の腕を上げていけば、解決するかもしれないし！」
line = "「こうなったら、ゴーレム化が起きる理由をトライ＆エラーで探るのみよ！　せつなが単純に料理の腕を上げていけば、解決するかもしれないし！」"

[[dialogue]]
speaker = "せつな"
# 「はい！　せつなのバレンタイン修業のご指導、どうかよろしくお願い致しまする！」
line = "「はい！　せつなのバレンタイン修業のご指導、どうかよろしくお願い致しまする！」"

[[dialogue]]
speaker = "unk"
# そうして、再びチョコを作る２人だったが――
line = "そうして、再びチョコを作る２人だったが――"

[[dialogue]]
speaker = "ゴーレム"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "蘭美"
# 「レシピは守りつつ、前よりも細かなテクニックを駆使して、クオリティアップしたチョコでも、ダメ……！」
line = "「レシピは守りつつ、前よりも細かなテクニックを駆使して、クオリティアップしたチョコでも、ダメ……！」"

[[dialogue]]
speaker = "せつな"
# 「冷蔵庫から取り出す際、せつなも触らないようにしてみたでござるが……！」
line = "「冷蔵庫から取り出す際、せつなも触らないようにしてみたでござるが……！」"

[[dialogue]]
speaker = "蘭美"
# 「ええい、次に行くわよ、次！」
line = "「ええい、次に行くわよ、次！」"

[[dialogue]]
speaker = "ゴーレム"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "蘭美"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "蘭美"
# 「……せつな、メイド長命令よ」
line = "「……せつな、メイド長命令よ」"

[[dialogue]]
speaker = "蘭美"
# 「今すぐここで服を脱ぎなさい！」
line = "「今すぐここで服を脱ぎなさい！」"

[[dialogue]]
speaker = "せつな"
# 「にゃんと！？　いきなりどうしたでござるか！？」
line = "「にゃんと！？　いきなりどうしたでござるか！？」"

[[dialogue]]
speaker = "せつな"
# 「蘭美殿のことは尊敬しているでござるが、せつなにはあいにく百合方向の趣味はなく、貞操は主様に捧げると心に決めて――」
line = "「蘭美殿のことは尊敬しているでござるが、せつなにはあいにく百合方向の趣味はなく、貞操は主様に捧げると心に決めて――」"

[[dialogue]]
speaker = "蘭美"
# 「私にもそっちの趣味はないわよ！」
line = "「私にもそっちの趣味はないわよ！」"

[[dialogue]]
speaker = "蘭美"
# 「そうじゃなくて！　そのバレンタイン衣装のせいでゴーレム化してるんじゃないかって、怪しんでるの！　チョコがゴーレムになってるわけだし！」
line = "「そうじゃなくて！　そのバレンタイン衣装のせいでゴーレム化してるんじゃないかって、怪しんでるの！　チョコがゴーレムになってるわけだし！」"

[[dialogue]]
speaker = "せつな"
# 「なるほど！　その発想はなかったでござる！」
line = "「なるほど！　その発想はなかったでござる！」"

[[dialogue]]
speaker = "unk"
# 普段のメイド服に着替えて、チョコ作りにトライするせつなであったが――
line = "普段のメイド服に着替えて、チョコ作りにトライするせつなであったが――"

[[dialogue]]
speaker = "ゴーレム"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "せつな"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "せつな"
# 「ゴーレム化、以前健在でござる！」
line = "「ゴーレム化、以前健在でござる！」"

[[dialogue]]
speaker = "蘭美"
# 「うん！　違ったわね！　次！」
line = "「うん！　違ったわね！　次！」"

[[dialogue]]
speaker = "蘭美"
# 「……試行錯誤の末、最後のハート型に流し込む作業をせつなに任せた以外、私が全部作ってみたけど……」
line = "「……試行錯誤の末、最後のハート型に流し込む作業をせつなに任せた以外、私が全部作ってみたけど……」"

[[dialogue]]
speaker = "せつな"
# 「小さいでござる！」
line = "「小さいでござる！」"

[[dialogue]]
speaker = "蘭美"
# 「誰の背が小さいですって！？」
line = "「誰の背が小さいですって！？」"

[[dialogue]]
speaker = "せつな"
# 「蘭美殿のことは言ってないでござる！　チョコゴーレムが小さく変身していることを言ったのでござる！」
line = "「蘭美殿のことは言ってないでござる！　チョコゴーレムが小さく変身していることを言ったのでござる！」"

[[dialogue]]
speaker = "蘭美"
# 「くっ……！　せつながチョコに触れる頻度を限りなく少なくした結果でしょうけど……なんか不本意だわ！」
line = "「くっ……！　せつながチョコに触れる頻度を限りなく少なくした結果でしょうけど……なんか不本意だわ！」"

[[dialogue]]
speaker = "蘭美"
# 「こうなったらもう、せつな自身にチョコ作りを極めてもらうしかないわ！　これ以上ないくらい、最強のバレンタインチョコを作り上げるのよ！」
line = "「こうなったらもう、せつな自身にチョコ作りを極めてもらうしかないわ！　これ以上ないくらい、最強のバレンタインチョコを作り上げるのよ！」"

[[dialogue]]
speaker = "せつな"
# 「せつながでござるか！？　で、できるでござろうか……？」
line = "「せつながでござるか！？　で、できるでござろうか……？」"

[[dialogue]]
speaker = "蘭美"
# 「やるしかないでしょ！　会長に、手作りのバレンタインチョコを渡すんでしょ？」
line = "「やるしかないでしょ！　会長に、手作りのバレンタインチョコを渡すんでしょ？」"

[[dialogue]]
speaker = "せつな"
# 「は、はい……！　わかったでござる。せつな、やってみせまする……！」
line = "「は、はい……！　わかったでござる。せつな、やってみせまする……！」"

[[dialogue]]
speaker = "unk"
# 蘭美の指導を受けながら、夜遅くなるまで、何度も繰り返しチョコ作りに挑戦するせつなであったが――
line = "蘭美の指導を受けながら、夜遅くなるまで、何度も繰り返しチョコ作りに挑戦するせつなであったが――"

[[dialogue]]
speaker = "蘭美"
# 「――これでゴーレムを無力化する方法はわかったわね。星術で凍らせれば、活動を停止させたまま冷凍保存できる」
line = "「――これでゴーレムを無力化する方法はわかったわね。星術で凍らせれば、活動を停止させたまま冷凍保存できる」"

[[dialogue]]
speaker = "蘭美"
# 「よし、じゃあもう１度、最初からやるわよ！　せつな、次の準備を――」
line = "「よし、じゃあもう１度、最初からやるわよ！　せつな、次の準備を――」"

[[dialogue]]
speaker = "せつな"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "蘭美"
# 「せつな？」
line = "「せつな？」"

[[dialogue]]
speaker = "せつな"
# 「蘭美殿、もういいでござる……」
line = "「蘭美殿、もういいでござる……」"

[[dialogue]]
speaker = "蘭美"
# 「もういいって……？」
line = "「もういいって……？」"

[[dialogue]]
speaker = "せつな"
# 「せつなはどうやら、チョコ作りなどするべきではなかったようでござる……」
line = "「せつなはどうやら、チョコ作りなどするべきではなかったようでござる……」"

[[dialogue]]
speaker = "せつな"
# 「さっき作ったチョコは、蘭美殿も褒めてくれて、せつなも手応えを感じた出来でござりました。しかし……」
line = "「さっき作ったチョコは、蘭美殿も褒めてくれて、せつなも手応えを感じた出来でござりました。しかし……」"

[[dialogue]]
speaker = "せつな"
# 「結局また、ダメになってしまったでござる。せつなはこれ以上、どうやってもチョコを完成させられる気が致しませぬ……」
line = "「結局また、ダメになってしまったでござる。せつなはこれ以上、どうやってもチョコを完成させられる気が致しませぬ……」"

[[dialogue]]
speaker = "せつな"
# 「蘭美殿にも迷惑をかけて……せつなはもう、作ったチョコが無駄になるのを見たくないでござる……」
line = "「蘭美殿にも迷惑をかけて……せつなはもう、作ったチョコが無駄になるのを見たくないでござる……」"

[[dialogue]]
speaker = "蘭美"
# 「せつな……」
line = "「せつな……」"

[[dialogue]]
speaker = "unk"
# 蘭美はそこで１度、大きく深呼吸をする。それから、改めて口を開いた。
line = "蘭美はそこで１度、大きく深呼吸をする。それから、改めて口を開いた。"

[[dialogue]]
speaker = "蘭美"
# 「――悪かったわ。ごめんなさい、せつな」
line = "「――悪かったわ。ごめんなさい、せつな」"

[[dialogue]]
speaker = "蘭美"
# 「貴方の為という建前で私は、自分の指導が上手くいかないことに熱くなって、貴方の気持ちが見えなくなっていた」
line = "「貴方の為という建前で私は、自分の指導が上手くいかないことに熱くなって、貴方の気持ちが見えなくなっていた」"

[[dialogue]]
speaker = "蘭美"
# 「だけど……お願い。よく聞いて」
line = "「だけど……お願い。よく聞いて」"

[[dialogue]]
speaker = "蘭美"
# 「私、２年前のメイド・オブ・メイドの決勝戦で敗北した時、これまでの人生で１番悔しくて、これからどうしたらいいのかわからない程、心が折れそうになったわ」
line = "「私、２年前のメイド・オブ・メイドの決勝戦で敗北した時、これまでの人生で１番悔しくて、これからどうしたらいいのかわからない程、心が折れそうになったわ」"

[[dialogue]]
speaker = "蘭美"
# 「それくらい、当時の私は全力だったの。実家のメイド長からも太鼓判を押してもらえるくらい、メイドとして技術を磨いて臨んだ大会だった」
line = "「それくらい、当時の私は全力だったの。実家のメイド長からも太鼓判を押してもらえるくらい、メイドとして技術を磨いて臨んだ大会だった」"

[[dialogue]]
speaker = "蘭美"
# 「自分がついに世界一のメイドになると信じて疑わなかった。でも――」
line = "「自分がついに世界一のメイドになると信じて疑わなかった。でも――」"

[[dialogue]]
speaker = "蘭美"
# 「私は負けたの。決勝の舞台で、星見家メイド長の、<ruby=こうづき>上月</ruby>キリカに」
line = "「私は負けたの。決勝の舞台で、星見家メイド長の、<ruby>上月<rt>こうづき</rt></ruby>キリカに」"

[[dialogue]]
speaker = "unk"
# ――星見家メイド隊メイド長・上月キリカ。星見フィオナの幼い時から、そばに仕えているお付きのメイドでもある。
line = "――星見家メイド隊メイド長・上月キリカ。星見フィオナの幼い時から、そばに仕えているお付きのメイドでもある。"

[[dialogue]]
speaker = "unk"
# 星見家に古くから使える名家の令嬢であり、メイドとしての技能は言わずもがなの才女。
line = "星見家に古くから使える名家の令嬢であり、メイドとしての技能は言わずもがなの才女。"

[[dialogue]]
speaker = "unk"
# 星騎士としての実力も未だ健在。流星学園において彼女に憧れている女生徒は、決して少なくない。
line = "星騎士としての実力も未だ健在。流星学園において彼女に憧れている女生徒は、決して少なくない。"

[[dialogue]]
speaker = "蘭美"
# 「――私にとって、上月キリカに負けたことが、これまでの人生で１番の敗北だった。成功すると信じて臨んだ上で、直面した大失敗だった」
line = "「――私にとって、上月キリカに負けたことが、これまでの人生で１番の敗北だった。成功すると信じて臨んだ上で、直面した大失敗だった」"

[[dialogue]]
speaker = "蘭美"
# 「でもね。私にとっては大切な、無くてはならない失敗だったのよ」
line = "「でもね。私にとっては大切な、無くてはならない失敗だったのよ」"

[[dialogue]]
speaker = "蘭美"
# 「真に最強を目指すということは、１度も敗北せずに頂点に立つことではない」
line = "「真に最強を目指すということは、１度も敗北せずに頂点に立つことではない」"

[[dialogue]]
speaker = "蘭美"
# 「たとえ負けて、失敗しても、諦めずにまたそこから立ち上がって、何度も頂点に立ち続けることこそが最強なのよ」
line = "「たとえ負けて、失敗しても、諦めずにまたそこから立ち上がって、何度も頂点に立ち続けることこそが最強なのよ」"

[[dialogue]]
speaker = "蘭美"
# 「『最強は１度にしてならず』――それが、私が２年前の敗北で得た教訓よ」
line = "「『最強は１度にしてならず』――それが、私が２年前の敗北で得た教訓よ」"

[[dialogue]]
speaker = "蘭美"
# 「失敗することは、恥ずかしいかもしれない。でも、必要不可欠なことなのよ」
line = "「失敗することは、恥ずかしいかもしれない。でも、必要不可欠なことなのよ」"

[[dialogue]]
speaker = "蘭美"
# 「ヒトは誰しも、成功と失敗を繰り返して、成長をするの」
line = "「ヒトは誰しも、成功と失敗を繰り返して、成長をするの」"

[[dialogue]]
speaker = "蘭美"
# 「失敗は決して無駄なんかじゃない」
line = "「失敗は決して無駄なんかじゃない」"

[[dialogue]]
speaker = "蘭美"
# 「だから、せつな」
line = "「だから、せつな」"

[[dialogue]]
speaker = "蘭美"
# 「失敗を理由に、１番大切なものを諦めたりしないで」
line = "「失敗を理由に、１番大切なものを諦めたりしないで」"

[[dialogue]]
speaker = "せつな"
# 「せつなの、１番大切なもの……」
line = "「せつなの、１番大切なもの……」"

[[dialogue]]
speaker = "unk"
# その日のバレンタイン修行は、そこでお開きになった。
line = "その日のバレンタイン修行は、そこでお開きになった。"

[[dialogue]]
speaker = "unk"
# しかし、せつなはその後もずっと、蘭美に言われたことを頭の中で考え続けるのだった――
line = "しかし、せつなはその後もずっと、蘭美に言われたことを頭の中で考え続けるのだった――"
