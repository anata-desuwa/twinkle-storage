[[dialogue]]
speaker = "unk"
# 第１話,モネＶＳイクシリオン？,P
line = "第１話,モネＶＳイクシリオン？,P"

[[dialogue]]
speaker = "unk"
# 先日モネに紹介された本の感想を伝えようと思って、図書館にやってくると──
line = "先日モネに紹介された本の感想を伝えようと思って、図書館にやってくると──"

[[dialogue]]
speaker = "モネ"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# モネ、怒ってる……？
line = "モネ、怒ってる……？"

[[dialogue]]
speaker = "モネ"
# 「あっ、会長。図書館に来られていたんですね」
line = "「あっ、会長。図書館に来られていたんですね」"

[[dialogue]]
speaker = "モネ"
# 「見苦しいところをお見せしてすみません。でも会長に怒っていたわけではないんです」
line = "「見苦しいところをお見せしてすみません。でも会長に怒っていたわけではないんです」"

[[dialogue]]
speaker = "モネ"
# 「突然ですが、私にはこの世に許せないものが３つあります」
line = "「突然ですが、私にはこの世に許せないものが３つあります」"

[[dialogue]]
speaker = "モネ"
# 「１つめは本を大切にしない人。２つめは本を馬鹿にする人。３つめは本の貸出期限を過ぎても本を返却しない人です」
line = "「１つめは本を大切にしない人。２つめは本を馬鹿にする人。３つめは本の貸出期限を過ぎても本を返却しない人です」"

[[dialogue]]
speaker = "unk"
# 全部本のことだね……？
line = "全部本のことだね……？"

[[dialogue]]
speaker = "モネ"
# 「当然です。本は人類の宝ですから。その宝を粗末に扱う人は許せません」
line = "「当然です。本は人類の宝ですから。その宝を粗末に扱う人は許せません」"

[[dialogue]]
speaker = "モネ"
# 「ですので私は図書委員として、延滞した図書の返却督促に向かいます……！」
line = "「ですので私は図書委員として、延滞した図書の返却督促に向かいます……！」"

[[dialogue]]
speaker = "イクシリオン"
# 「はぁはぁ……この雄々しい肉体美……いつ見てもムラムラ……いえ、躍動感に心を奪われます」
line = "「はぁはぁ……この雄々しい肉体美……いつ見てもムラムラ……いえ、躍動感に心を奪われます」"

[[dialogue]]
speaker = "イクシリオン"
# 「女性の柔らかそうな肢体も素晴らしい……その瑞々しさたるや、触れずともその肉感が手に伝わってきて……！」
line = "「女性の柔らかそうな肢体も素晴らしい……その瑞々しさたるや、触れずともその肉感が手に伝わってきて……！」"

[[dialogue]]
speaker = "モネ"
# 「いました……！　美術の本を読まれていますね」
line = "「いました……！　美術の本を読まれていますね」"

[[dialogue]]
speaker = "unk"
# イクシーが犯人？
line = "イクシーが犯人？"

[[dialogue]]
speaker = "モネ"
# 「はい。イクシーさんは図書館によく来られていて、保健体育や性教育の本などを借りられています」
line = "「はい。イクシーさんは図書館によく来られていて、保健体育や性教育の本などを借りられています」"

[[dialogue]]
speaker = "モネ"
# 「保健委員として勉強熱心で、そういう意味では委員の鑑といえるかもしれません。あとは美術の本も借りられています」
line = "「保健委員として勉強熱心で、そういう意味では委員の鑑といえるかもしれません。あとは美術の本も借りられています」"

[[dialogue]]
speaker = "モネ"
# 「確か、エドゥアール・マネの『オランピア』が特にお好きだとか。人体の仕組みに詳しいだけでなく、美術の造詣も深くて驚かされます」
line = "「確か、エドゥアール・マネの『オランピア』が特にお好きだとか。人体の仕組みに詳しいだけでなく、美術の造詣も深くて驚かされます」"

[[dialogue]]
speaker = "モネ"
# 「……どうしたんですか、会長？　気まずそうな顔をされて」
line = "「……どうしたんですか、会長？　気まずそうな顔をされて」"

[[dialogue]]
speaker = "モネ"
# 「何でもない？　はぁ……それならいいんですけど」
line = "「何でもない？　はぁ……それならいいんですけど」"

[[dialogue]]
speaker = "モネ"
# 「私としても仲良くしていただいている１人で、心苦しくはあるのですが……図書の延滞とあれば見逃せません。行きましょう……！」
line = "「私としても仲良くしていただいている１人で、心苦しくはあるのですが……図書の延滞とあれば見逃せません。行きましょう……！」"

[[dialogue]]
speaker = "モネ"
# 「イクシーさん」
line = "「イクシーさん」"

[[dialogue]]
speaker = "イクシリオン"
# 「！？」
line = "「！？」"

[[dialogue]]
speaker = "イクシリオン"
# （いつもと違う険しい表情……もしやモネさんが怒っている……！？）
line = "（いつもと違う険しい表情……もしやモネさんが怒っている……！？）"

[[dialogue]]
speaker = "イクシリオン"
# 「も、モネさん……？　私にご用ですか……？」
line = "「も、モネさん……？　私にご用ですか……？」"

[[dialogue]]
speaker = "モネ"
# 「イクシーさん。何か後ろめたいことはありませんか？」
line = "「イクシーさん。何か後ろめたいことはありませんか？」"

[[dialogue]]
speaker = "イクシリオン"
# 「いえそんな、後ろめたいこと……なんて……」
line = "「いえそんな、後ろめたいこと……なんて……」"

[[dialogue]]
speaker = "イクシリオン"
# （ありまぁすっ！！）
line = "（ありまぁすっ！！）"

[[dialogue]]
speaker = "イクシリオン"
# （河川敷に捨てられていたエッチな本を持ち帰ったことでしょうか……あの破壊的なまでの肉感は実に眼福でした……）
line = "（河川敷に捨てられていたエッチな本を持ち帰ったことでしょうか……あの破壊的なまでの肉感は実に眼福でした……）"

[[dialogue]]
speaker = "イクシリオン"
# （それとも、体育の着替えの時に皆さんの下着をチラ見していること……？　いえ、一瞬で脳細胞に焼き付けているからバレないはず……）
line = "（それとも、体育の着替えの時に皆さんの下着をチラ見していること……？　いえ、一瞬で脳細胞に焼き付けているからバレないはず……）"

[[dialogue]]
speaker = "イクシリオン"
# （あるいは背伸びをして大人な下着を買ったことでしょうか……？　あれは大変いやらし……いえ、素晴らしい機能美でした……）
line = "（あるいは背伸びをして大人な下着を買ったことでしょうか……？　あれは大変いやらし……いえ、素晴らしい機能美でした……）"

[[dialogue]]
speaker = "モネ"
# 「イクシーさん、顔が青いですよ？」
line = "「イクシーさん、顔が青いですよ？」"

[[dialogue]]
speaker = "イクシリオン"
# 「ひぅっ！？」
line = "「ひぅっ！？」"

[[dialogue]]
speaker = "イクシリオン"
# （しかしモネさんのこの怒りよう……まさかアレがバレたのでしょうか……！？）
line = "（しかしモネさんのこの怒りよう……まさかアレがバレたのでしょうか……！？）"

[[dialogue]]
speaker = "モネ"
# 「イクシーさんは初犯ですから、速やかに渡していただければそれ以上は咎めません。早く出してください」
line = "「イクシーさんは初犯ですから、速やかに渡していただければそれ以上は咎めません。早く出してください」"

[[dialogue]]
speaker = "イクシリオン"
# （間違いありません！　バレています！　こうなっては言い逃れはできません……！）
line = "（間違いありません！　バレています！　こうなっては言い逃れはできません……！）"

[[dialogue]]
speaker = "イクシリオン"
# 「も、申し訳ありませんでしたーっ！　こちらです！」
line = "「も、申し訳ありませんでしたーっ！　こちらです！」"

[[dialogue]]
speaker = "モネ"
# 「へ……？　ＤＩＳＣを出してどうしたんですか……？」
line = "「へ……？　ＤＩＳＣを出してどうしたんですか……？」"

[[dialogue]]
speaker = "イクシリオン"
# 「え？　違うのですか？　以前リゾート結界でトレーニングにお付き合いした時に、モネさんの水着サンタ姿があまりに可憐でつい写真に収めてしまいまして……」
line = "「え？　違うのですか？　以前リゾート結界でトレーニングにお付き合いした時に、モネさんの水着サンタ姿があまりに可憐でつい写真に収めてしまいまして……」"

[[dialogue]]
speaker = "モネ"
# 「ぴやっ！？　撮ったんですか！？」
line = "「ぴやっ！？　撮ったんですか！？」"

[[dialogue]]
speaker = "イクシリオン"
# 「はい……モネさんは肌の露出が少な──いえ、いつも読書をされていて、活動的なお姿は貴重なので……この通り」
line = "「はい……モネさんは肌の露出が少な──いえ、いつも読書をされていて、活動的なお姿は貴重なので……この通り」"

[[dialogue]]
speaker = "unk"
# おお、これは際どいアングル……
line = "おお、これは際どいアングル……"

[[dialogue]]
speaker = "モネ"
# 「ひぁぁあ～～～っ！？　会長、そんなまじまじと見ないでください！」
line = "「ひぁぁあ～～～っ！？　会長、そんなまじまじと見ないでください！」"

[[dialogue]]
speaker = "イクシリオン"
# 「あれ？　モネさんが怒っていらしたのはこの件ではないのですか？」
line = "「あれ？　モネさんが怒っていらしたのはこの件ではないのですか？」"

[[dialogue]]
speaker = "モネ"
# 「違います！　図書館で借りた本を延滞しているんです！」
line = "「違います！　図書館で借りた本を延滞しているんです！」"

[[dialogue]]
speaker = "イクシリオン"
# 「延滞……？　しかし期限はまだのはずでは……？」
line = "「延滞……？　しかし期限はまだのはずでは……？」"

[[dialogue]]
speaker = "モネ"
# 「貸出の延長をした際に、期限を間違えて覚えていませんか？　ＤＩＳＣで確認し直してください」
line = "「貸出の延長をした際に、期限を間違えて覚えていませんか？　ＤＩＳＣで確認し直してください」"

[[dialogue]]
speaker = "イクシリオン"
# 「どれどれ……ああ～っ！？　大変申し訳ありませんでした……これから返しに参ります……」
line = "「どれどれ……ああ～っ！？　大変申し訳ありませんでした……これから返しに参ります……」"

[[dialogue]]
speaker = "モネ"
# 「わかればいいんです、わかれば。今後は貸出期間に気を付けてくださいね」
line = "「わかればいいんです、わかれば。今後は貸出期間に気を付けてくださいね」"

[[dialogue]]
speaker = "イクシリオン"
# 「はい、反省します……」
line = "「はい、反省します……」"

[[dialogue]]
speaker = "イクシリオン"
# 「ではこの写真は思い出の一幕として大事に保存を……」
line = "「ではこの写真は思い出の一幕として大事に保存を……」"

[[dialogue]]
speaker = "unk"
# この写真、もらっていい？
line = "この写真、もらっていい？"

[[dialogue]]
speaker = "イクシリオン"
# 「はい、もちろん♪　ですがもっとよく撮れているオススメがありまして──」
line = "「はい、もちろん♪　ですがもっとよく撮れているオススメがありまして──」"

[[dialogue]]
speaker = "モネ"
# 「それはダメです～～～～～～っ！！」
line = "「それはダメです～～～～～～っ！！」"

[[dialogue]]
speaker = "unk"
# 俺とイクシーはモネにこってり絞られた上、イクシーはＤＩＳＣの全データを消去されたのであった──
line = "俺とイクシーはモネにこってり絞られた上、イクシーはＤＩＳＣの全データを消去されたのであった──"
