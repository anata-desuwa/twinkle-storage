[[dialogue]]
speaker = "unk"
# 第４話,新春ジェラシー,P
line = "第４話,新春ジェラシー,P"

[[dialogue]]
speaker = "unk"
# 冬期休暇中であっても、多忙な星徒会に休みはない──唯一の救いは、事務仕事で首の回らない俺を手伝ってくれる人がいることだ。
line = "冬期休暇中であっても、多忙な星徒会に休みはない──唯一の救いは、事務仕事で首の回らない俺を手伝ってくれる人がいることだ。"

[[dialogue]]
speaker = "unk"
# 今日はソフィとサーシャさん。奏姉妹が応援に来てくれている──
line = "今日はソフィとサーシャさん。奏姉妹が応援に来てくれている──"

[[dialogue]]
speaker = "サーシャ"
# 「うーん。やっぱりお休みしている間に報告書が溜まってるわね。こっちの書類は片付いたわよー、会長くん」
line = "「うーん。やっぱりお休みしている間に報告書が溜まってるわね。こっちの書類は片付いたわよー、会長くん」"

[[dialogue]]
speaker = "ソフィア"
# 「こちらも終わりました。アナさんがまとめておいてくださった資料、とても分かりやすいです」
line = "「こちらも終わりました。アナさんがまとめておいてくださった資料、とても分かりやすいです」"

[[dialogue]]
speaker = "unk"
# ２人ともありがとう
line = "２人ともありがとう"

[[dialogue]]
speaker = "サーシャ"
# 「いいのよ～♪　ふふ、こんな時くらいお手伝いしないとね。それにちょうど用事もあったし」
line = "「いいのよ～♪　ふふ、こんな時くらいお手伝いしないとね。それにちょうど用事もあったし」"

[[dialogue]]
speaker = "ソフィア"
# 「そういえば姉さん、私と会長さんに聞きたいことがあると言っていましたね。お仕事しながらでいいなら、お聞きします」
line = "「そういえば姉さん、私と会長さんに聞きたいことがあると言っていましたね。お仕事しながらでいいなら、お聞きします」"

[[dialogue]]
speaker = "サーシャ"
# 「ええ♪　お姉ちゃんが聞きたいことは～……ずばり！　２人の馴れ初めよ～っ！」
line = "「ええ♪　お姉ちゃんが聞きたいことは～……ずばり！　２人の馴れ初めよ～っ！」"

[[dialogue]]
speaker = "ソフィア"
# 「──仕事中です、却下です」
line = "「──仕事中です、却下です」"

[[dialogue]]
speaker = "サーシャ"
# 「え～っ、いいじゃない。もうずいぶん長いこと作業してるし、休憩がてらお喋りしましょ？」
line = "「え～っ、いいじゃない。もうずいぶん長いこと作業してるし、休憩がてらお喋りしましょ？」"

[[dialogue]]
speaker = "ソフィア"
# 「だからって何ですか、その話題。からかわれそうなので普通に嫌です」
line = "「だからって何ですか、その話題。からかわれそうなので普通に嫌です」"

[[dialogue]]
speaker = "サーシャ"
# 「ひど～い……可愛い妹のソフィのことが気になるから聞いてるだけなのに～」
line = "「ひど～い……可愛い妹のソフィのことが気になるから聞いてるだけなのに～」"

[[dialogue]]
speaker = "ソフィア"
# 「う……またそんな恥ずかしいことをストレートに……」
line = "「う……またそんな恥ずかしいことをストレートに……」"

[[dialogue]]
speaker = "ソフィア"
# 「わ、私、お茶を入れてきます。会長さんはその間にお話を済ませておいてください」
line = "「わ、私、お茶を入れてきます。会長さんはその間にお話を済ませておいてください」"

[[dialogue]]
speaker = "サーシャ"
# 「え～。一緒にお喋りしてくれないの？」
line = "「え～。一緒にお喋りしてくれないの？」"

[[dialogue]]
speaker = "ソフィア"
# 「恥ずかしいんですっ。会長さんもあまり詳しく話さないでいいですからねっ？　それではっ！」
line = "「恥ずかしいんですっ。会長さんもあまり詳しく話さないでいいですからねっ？　それではっ！」"

[[dialogue]]
speaker = "サーシャ"
# 「ふふっ♪　ソフィったら相変わらずか～わいい<emoji=heart04>　それじゃあ会長くん、聞かせてもらえる～？　２人の馴れ初め<emoji=heart04>」
line = "「ふふっ♪　ソフィったら相変わらずか～わいい<emoji=heart04>　それじゃあ会長くん、聞かせてもらえる～？　２人の馴れ初め<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 通う学園も、年齢も違うソフィアとどのような経緯で恋人になったのかを、俺は端的に語った──
line = "通う学園も、年齢も違うソフィアとどのような経緯で恋人になったのかを、俺は端的に語った──"

[[dialogue]]
speaker = "サーシャ"
# 「ふむふむ……なるほど。あの子がパトロールをしていて、それに同行するうちに仲良くなっていったのね～」
line = "「ふむふむ……なるほど。あの子がパトロールをしていて、それに同行するうちに仲良くなっていったのね～」"

[[dialogue]]
speaker = "サーシャ"
# 「お仕事をこなして、一緒にパンケーキを食べたりして、たまにモンスターとも戦って……やぁん♪　いいわねー、青春って感じ」
line = "「お仕事をこなして、一緒にパンケーキを食べたりして、たまにモンスターとも戦って……やぁん♪　いいわねー、青春って感じ」"

[[dialogue]]
speaker = "サーシャ"
# 「何より会長くん。モンスターからソフィを守ってくれてありがとう♪　お礼にぎゅ～ってハグしてあげる～♪」
line = "「何より会長くん。モンスターからソフィを守ってくれてありがとう♪　お礼にぎゅ～ってハグしてあげる～♪」"

[[dialogue]]
speaker = "サーシャ"
# 「ぎゅぅ～っ<emoji=heart04>　ふふふっ、逃がさないわよ～<emoji=heart04>」
line = "「ぎゅぅ～っ<emoji=heart04>　ふふふっ、逃がさないわよ～<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# む、むぎゅぅ……！？
line = "む、むぎゅぅ……！？"

[[dialogue]]
speaker = "ソフィア"
# 「お待たせしました……って！？　何してるんですか姉さんっ！　会長さんから離れてくださいっ！」
line = "「お待たせしました……って！？　何してるんですか姉さんっ！　会長さんから離れてくださいっ！」"

[[dialogue]]
speaker = "ソフィア"
# 「まったく油断も隙もありませんっ。姉さんのお茶菓子は抜きですっ！」
line = "「まったく油断も隙もありませんっ。姉さんのお茶菓子は抜きですっ！」"

[[dialogue]]
speaker = "サーシャ"
# 「そんなに怒らないでもいいじゃな～い。会長くんがとっても優しい彼氏さんだったから、お姉ちゃんとしてお礼をしてただけなのに～」
line = "「そんなに怒らないでもいいじゃな～い。会長くんがとっても優しい彼氏さんだったから、お姉ちゃんとしてお礼をしてただけなのに～」"

[[dialogue]]
speaker = "ソフィア"
# 「いくら姉さんでもやって良いことと悪いことがあります！　どこの世界に、妹の彼氏にハグする姉がいるんですかっ！」
line = "「いくら姉さんでもやって良いことと悪いことがあります！　どこの世界に、妹の彼氏にハグする姉がいるんですかっ！」"

[[dialogue]]
speaker = "ソフィア"
# 「そ、それにそんな、お、おお、おっきな胸でパフパフとっ……会長さんを誘惑するのは禁止です！」
line = "「そ、それにそんな、お、おお、おっきな胸でパフパフとっ……会長さんを誘惑するのは禁止です！」"

[[dialogue]]
speaker = "unk"
# 誘惑なんてされないぞ！？
line = "誘惑なんてされないぞ！？"

[[dialogue]]
speaker = "ソフィア"
# 「それじゃあ、そのゆるみ切ったお顔は何ですかっ。ふにゃふにゃとふやけて実に幸せそうな顔をしています！」
line = "「それじゃあ、そのゆるみ切ったお顔は何ですかっ。ふにゃふにゃとふやけて実に幸せそうな顔をしています！」"

[[dialogue]]
speaker = "unk"
# そ、そんな……
line = "そ、そんな……"

[[dialogue]]
speaker = "サーシャ"
# 「でも私はお姉ちゃんだし……義弟くんにハグするのが禁止なのは辛いわ～……」
line = "「でも私はお姉ちゃんだし……義弟くんにハグするのが禁止なのは辛いわ～……」"

[[dialogue]]
speaker = "ソフィア"
# 「姉さんもしっかり反省して……って、え？　お、義弟っ！？」
line = "「姉さんもしっかり反省して……って、え？　お、義弟っ！？」"

[[dialogue]]
speaker = "サーシャ"
# 「ええ、だってソフィの恋人でしょ？　そういう未来だってお姉ちゃん、あると思うの～♪」
line = "「ええ、だってソフィの恋人でしょ？　そういう未来だってお姉ちゃん、あると思うの～♪」"

[[dialogue]]
speaker = "ソフィア"
# 「そ、そそそ、そんなことはっ……な、無きにしも非ずというか、何と言うかっ……！」
line = "「そ、そそそ、そんなことはっ……な、無きにしも非ずというか、何と言うかっ……！」"

[[dialogue]]
speaker = "サーシャ"
# 「あ、そうだ。会長くんも今から慣れておく？　私のこと、お義姉ちゃんって呼ぶ練習～<emoji=heart04>」
line = "「あ、そうだ。会長くんも今から慣れておく？　私のこと、お義姉ちゃんって呼ぶ練習～<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# お……お義姉ちゃ──
line = "お……お義姉ちゃ──"

[[dialogue]]
speaker = "ソフィア"
# 「言わなくていいですっ！　そういうのはまだ早いですからっ！」
line = "「言わなくていいですっ！　そういうのはまだ早いですからっ！」"

[[dialogue]]
speaker = "サーシャ"
# 「まだ早い～ってことは……フフフ<emoji=heart04>　その気なんじゃない、お姉ちゃん嬉しい♪　ソフィも会長くんも大好きだから～<emoji=heart04>」
line = "「まだ早い～ってことは……フフフ<emoji=heart04>　その気なんじゃない、お姉ちゃん嬉しい♪　ソフィも会長くんも大好きだから～<emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
# 「あー、もーっ！　そういうからかいは駄目です、禁止ですっ！　お仕事しますよ、ほらほらっ！」
line = "「あー、もーっ！　そういうからかいは駄目です、禁止ですっ！　お仕事しますよ、ほらほらっ！」"

[[dialogue]]
speaker = "unk"
# 妹の彼氏なのだから、将来的に私は『お義姉ちゃん』──そんな主張の元、その後もサーシャさんの姉ハグ攻撃は続いた。
line = "妹の彼氏なのだから、将来的に私は『お義姉ちゃん』──そんな主張の元、その後もサーシャさんの姉ハグ攻撃は続いた。"

[[dialogue]]
speaker = "unk"
# 恋人の姉を邪険にするだなんてできるわけもなく、ハグのたびにほっぺに押し付けられるたわわな感触に俺の顔は無条件に緩んでしまって……
line = "恋人の姉を邪険にするだなんてできるわけもなく、ハグのたびにほっぺに押し付けられるたわわな感触に俺の顔は無条件に緩んでしまって……"

[[dialogue]]
speaker = "ソフィア"
# 「か・い・ちょ・う・さ～ん？　そんなに姉さんのお胸がお好きなんですか、そぉですかっ！」
line = "「か・い・ちょ・う・さ～ん？　そんなに姉さんのお胸がお好きなんですか、そぉですかっ！」"

[[dialogue]]
speaker = "ソフィア"
# 「姉さんほどじゃなくても私だって……ない……薄焼きパンケーキとふっくらパンケーキ以上に差が……」
line = "「姉さんほどじゃなくても私だって……ない……薄焼きパンケーキとふっくらパンケーキ以上に差が……」"

[[dialogue]]
speaker = "unk"
# 俺が好きなのはソフィのおっ──
line = "俺が好きなのはソフィのおっ──"

[[dialogue]]
speaker = "ソフィア"
# 「それはそれで問題発言ですっ！」
line = "「それはそれで問題発言ですっ！」"

[[dialogue]]
speaker = "unk"
# ぷりぷり怒るソフィアの機嫌を取るために、鏡餅みたいなスペシャルパンケーキ三段重ねをご馳走する羽目になるのだった──
line = "ぷりぷり怒るソフィアの機嫌を取るために、鏡餅みたいなスペシャルパンケーキ三段重ねをご馳走する羽目になるのだった──"
