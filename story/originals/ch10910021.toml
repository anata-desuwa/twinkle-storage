[[dialogue]]
speaker = "unk"
# 第１話,梨緒と星徒会長,P
line = "第１話,梨緒と星徒会長,P"

[[dialogue]]
speaker = "マトイ"
# 「会長、これ確認してくれる？　この前の部長会議の議事録なんだけど」
line = "「会長、これ確認してくれる？　この前の部長会議の議事録なんだけど」"

[[dialogue]]
speaker = "アナ"
# 「それが終わったらこちらの書類もお願いします」
line = "「それが終わったらこちらの書類もお願いします」"

[[dialogue]]
speaker = "unk"
# 俺たちがいつも通り星徒会業務をしていると──
line = "俺たちがいつも通り星徒会業務をしていると──"

[[dialogue]]
speaker = "梨緒"
# 「邪魔させてもらうぞ」
line = "「邪魔させてもらうぞ」"

[[dialogue]]
speaker = "マトイ"
# 「あ、梨緒さんいらっしゃい。今日も選管のお仕事？」
line = "「あ、梨緒さんいらっしゃい。今日も選管のお仕事？」"

[[dialogue]]
speaker = "梨緒"
# 「ああ。私たち選挙管理委員会は、君たち星徒会が適切に業務を行っているか監視している」
line = "「ああ。私たち選挙管理委員会は、君たち星徒会が適切に業務を行っているか監視している」"

[[dialogue]]
speaker = "梨緒"
# 「特に星徒会長である魔王をな。魔王の力は強大ゆえに、道を誤れば、周囲に多大な被害をもたらす危険がある」
line = "「特に星徒会長である魔王をな。魔王の力は強大ゆえに、道を誤れば、周囲に多大な被害をもたらす危険がある」"

[[dialogue]]
speaker = "アナ"
# 「会長はもう暴走しなさそうですし、監視しなくてもよさそうなものですが」
line = "「会長はもう暴走しなさそうですし、監視しなくてもよさそうなものですが」"

[[dialogue]]
speaker = "梨緒"
# 「それでもだ。確かに今、魔王が暴走する兆候は見えないが、可能性はゼロではない」
line = "「それでもだ。確かに今、魔王が暴走する兆候は見えないが、可能性はゼロではない」"

[[dialogue]]
speaker = "梨緒"
# 「それに、普通の学校の生徒会長は選挙で選ばれるものだ」
line = "「それに、普通の学校の生徒会長は選挙で選ばれるものだ」"

[[dialogue]]
speaker = "梨緒"
# 「だが新星・流星の星徒会長は前会長からの指名で選ばれるうえに、普通の学校以上の強権が委ねられている。権力の濫用を防ぐためにも、やはり監視の目は必要だ」
line = "「だが新星・流星の星徒会長は前会長からの指名で選ばれるうえに、普通の学校以上の強権が委ねられている。権力の濫用を防ぐためにも、やはり監視の目は必要だ」"

[[dialogue]]
speaker = "マトイ"
# 「つまり梨緒さんは会長に会いに来てるってこと？」
line = "「つまり梨緒さんは会長に会いに来てるってこと？」"

[[dialogue]]
speaker = "梨緒"
# 「なっ──！？　ちち、違う！　私は個人的な感情ではなく、選管の職務として──」
line = "「なっ──！？　ちち、違う！　私は個人的な感情ではなく、選管の職務として──」"

[[dialogue]]
speaker = "アナ"
# 「個人的な感情、とはマトイ先輩は言っていませんが？」
line = "「個人的な感情、とはマトイ先輩は言っていませんが？」"

[[dialogue]]
speaker = "梨緒"
# 「あぐっ──！？」
line = "「あぐっ──！？」"

[[dialogue]]
speaker = "アナ"
# 「ここ最近、梨緒先輩は、星徒会室に来ては紅茶を飲みながら会長を眺める日々です」
line = "「ここ最近、梨緒先輩は、星徒会室に来ては紅茶を飲みながら会長を眺める日々です」"

[[dialogue]]
speaker = "マトイ"
# 「あるいは、会長と勝負してるかだよね」
line = "「あるいは、会長と勝負してるかだよね」"

[[dialogue]]
speaker = "梨緒"
# 「いやそれは、彼が星徒会長に相応しいか見極めるためで……」
line = "「いやそれは、彼が星徒会長に相応しいか見極めるためで……」"

[[dialogue]]
speaker = "マトイ"
# 「でもスコーン作りとか、テーブルマナー対決とか、星徒会関係ない勝負ばっかりしてるような……」
line = "「でもスコーン作りとか、テーブルマナー対決とか、星徒会関係ない勝負ばっかりしてるような……」"

[[dialogue]]
speaker = "アナ"
# 「なんだかんだ理由を付けて、四六時中会長と一緒にいる気がします。もう付き合っているのでは？」
line = "「なんだかんだ理由を付けて、四六時中会長と一緒にいる気がします。もう付き合っているのでは？」"

[[dialogue]]
speaker = "梨緒"
# 「付き合ってない！」
line = "「付き合ってない！」"

[[dialogue]]
speaker = "梨緒"
# 「私は選挙管理委員会の委員長として、魔王を監視しているだけで──」
line = "「私は選挙管理委員会の委員長として、魔王を監視しているだけで──」"

[[dialogue]]
speaker = "unk"
# 俺は梨緒が来てくれて嬉しいけど
line = "俺は梨緒が来てくれて嬉しいけど"

[[dialogue]]
speaker = "梨緒"
# 「にゃにゃ！？　ななな、何を言ってるんだ君は！？」
line = "「にゃにゃ！？　ななな、何を言ってるんだ君は！？」"

[[dialogue]]
speaker = "マトイ"
# 「会長、梨緒さんがいると、心なしかいつもより張り切ってる気がする」
line = "「会長、梨緒さんがいると、心なしかいつもより張り切ってる気がする」"

[[dialogue]]
speaker = "アナ"
# 「梨緒先輩にいいところを見せたいのかもしれません。男性の心理というものでしょうか」
line = "「梨緒先輩にいいところを見せたいのかもしれません。男性の心理というものでしょうか」"

[[dialogue]]
speaker = "梨緒"
# 「そ、そうなのか？　選管としては、普段の働きを見て、星徒会の業務が適切に行われているか判断したいんだが……」
line = "「そ、そうなのか？　選管としては、普段の働きを見て、星徒会の業務が適切に行われているか判断したいんだが……」"

[[dialogue]]
speaker = "マトイ"
# 「やっぱり付き合ってるんじゃ？」
line = "「やっぱり付き合ってるんじゃ？」"

[[dialogue]]
speaker = "梨緒"
# 「だから付き合ってない！」
line = "「だから付き合ってない！」"

[[dialogue]]
speaker = "アナ"
# 「ところでマトイ先輩、こんなものが見つかったんですが」
line = "「ところでマトイ先輩、こんなものが見つかったんですが」"

[[dialogue]]
speaker = "マトイ"
# 「購買のお菓子無料券？　あ、でも期限切れちゃってる。無駄になっちゃったね」
line = "「購買のお菓子無料券？　あ、でも期限切れちゃってる。無駄になっちゃったね」"

[[dialogue]]
speaker = "梨緒"
# 「無駄！？」
line = "「無駄！？」"

[[dialogue]]
speaker = "アナ"
# 「他にもありました。こっちはカフェテリアの割引券です」
line = "「他にもありました。こっちはカフェテリアの割引券です」"

[[dialogue]]
speaker = "マトイ"
# 「どれどれ……うーん……けっこう注文しないと割引が適用されないし、これは役に立たないかも……」
line = "「どれどれ……うーん……けっこう注文しないと割引が適用されないし、これは役に立たないかも……」"

[[dialogue]]
speaker = "梨緒"
# 「役に立たない！？」
line = "「役に立たない！？」"

[[dialogue]]
speaker = "梨緒"
# 「やっぱり私は弱くて、無駄で、役立たずな存在なんだ……」
line = "「やっぱり私は弱くて、無駄で、役立たずな存在なんだ……」"

[[dialogue]]
speaker = "梨緒"
# 「私は何度勝負しても魔王に勝てない、無様な人間だ……」
line = "「私は何度勝負しても魔王に勝てない、無様な人間だ……」"

[[dialogue]]
speaker = "unk"
# 気を強く持って！
line = "気を強く持って！"

[[dialogue]]
speaker = "梨緒"
# 「ハッ──！？」
line = "「ハッ──！？」"

[[dialogue]]
speaker = "梨緒"
# 「そうだ、私は誓ったんだ。今度こそ世界を守ると」
line = "「そうだ、私は誓ったんだ。今度こそ世界を守ると」"

[[dialogue]]
speaker = "梨緒"
# 「それにジグも救うことができたんだ。私は失ってばかりじゃ……ないっ！！」
line = "「それにジグも救うことができたんだ。私は失ってばかりじゃ……ないっ！！」"

[[dialogue]]
speaker = "unk"
# そうだ梨緒は強い！　かっこいい！
line = "そうだ梨緒は強い！　かっこいい！"

[[dialogue]]
speaker = "梨緒"
# 「私は強い！　かっこいい！」
line = "「私は強い！　かっこいい！」"

[[dialogue]]
speaker = "unk"
# 梨緒はかわいい！　綺麗！　美人！
line = "梨緒はかわいい！　綺麗！　美人！"

[[dialogue]]
speaker = "梨緒"
# 「私はかわいい！　綺麗だ！　美人だ！」
line = "「私はかわいい！　綺麗だ！　美人だ！」"

[[dialogue]]
speaker = "梨緒"
# 「──って、何を言わせるんだ！？」
line = "「──って、何を言わせるんだ！？」"

[[dialogue]]
speaker = "梨緒"
# 「おだててくれとは言っていないぞ……まったく君は……」
line = "「おだててくれとは言っていないぞ……まったく君は……」"

[[dialogue]]
speaker = "unk"
# 本当のことを言ったまでだよ
line = "本当のことを言ったまでだよ"

[[dialogue]]
speaker = "梨緒"
# 「う……そういうことを臆面もなく言うんだな、君は……」
line = "「う……そういうことを臆面もなく言うんだな、君は……」"

[[dialogue]]
speaker = "梨緒"
# 「だが誉め言葉を並べたところで、選挙管理委員会の監視は甘くはならないからな」
line = "「だが誉め言葉を並べたところで、選挙管理委員会の監視は甘くはならないからな」"

[[dialogue]]
speaker = "梨緒"
# 「ここ最近事件がなくて星徒会は平穏だと聞く。平和なのはいいが、油断は禁物だ。君が星徒会長に相応しいか、改めて試させてもらおう」
line = "「ここ最近事件がなくて星徒会は平穏だと聞く。平和なのはいいが、油断は禁物だ。君が星徒会長に相応しいか、改めて試させてもらおう」"

[[dialogue]]
speaker = "梨緒"
# 「では──」
line = "「では──」"

[[dialogue]]
speaker = "梨緒"
# 「勝負だ！」
line = "「勝負だ！」"

[[dialogue]]
speaker = "梨緒"
# 「くっ……負けた……！」
line = "「くっ……負けた……！」"

[[dialogue]]
speaker = "unk"
# そして俺はまた梨緒に勝利し、新星学園星徒会長の座を守ったのだった──
line = "そして俺はまた梨緒に勝利し、新星学園星徒会長の座を守ったのだった──"
