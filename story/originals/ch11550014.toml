[[dialogue]]
speaker = "unk"
# 第４話,それぞれの世界へ,P
line = "第４話,それぞれの世界へ,P"

[[dialogue]]
speaker = "unk"
# トレジアンナからの連絡を受けて、いろは、花織、ここあの３人は渋谷へと向かう。
line = "トレジアンナからの連絡を受けて、いろは、花織、ここあの３人は渋谷へと向かう。"

[[dialogue]]
speaker = "unk"
# そこは彼女たちが、異世界より最初にたどり着いた場所だった。
line = "そこは彼女たちが、異世界より最初にたどり着いた場所だった。"

[[dialogue]]
speaker = "トレジアンナ"
# 「──戻って来たようです！」
line = "「──戻って来たようです！」"

[[dialogue]]
speaker = "unk"
# トレジアンナがそう発した直後、目の前の空間が歪んだ。
line = "トレジアンナがそう発した直後、目の前の空間が歪んだ。"

[[dialogue]]
speaker = "unk"
# そして次の瞬間、オムニスを抱えた、いろはたちのよく知る陽彩の姿が現れた。
line = "そして次の瞬間、オムニスを抱えた、いろはたちのよく知る陽彩の姿が現れた。"

[[dialogue]]
speaker = "陽彩"
# 「ごめん、みんな……心配をかけた」
line = "「ごめん、みんな……心配をかけた」"

[[dialogue]]
speaker = "unk"
# 陽彩は寄生していた悪魔から、無事に解放された。
line = "陽彩は寄生していた悪魔から、無事に解放された。"

[[dialogue]]
speaker = "unk"
# 事の顛末を陽彩の口から聞いた後、いよいよいろはたちは元の世界へと戻ることになった。
line = "事の顛末を陽彩の口から聞いた後、いよいよいろはたちは元の世界へと戻ることになった。"

[[dialogue]]
speaker = "花織"
# 「いろは、帰りの準備はちゃんと出来てる？　忘れ物してても取りには戻れないんだからね？」
line = "「いろは、帰りの準備はちゃんと出来てる？　忘れ物してても取りには戻れないんだからね？」"

[[dialogue]]
speaker = "いろは"
# 「わかってるってば。でも忘れて困るって言ったら、スマホくらいじゃない？　こっちには何も持たずに来たんだから」
line = "「わかってるってば。でも忘れて困るって言ったら、スマホくらいじゃない？　こっちには何も持たずに来たんだから」"

[[dialogue]]
speaker = "いろは"
# 「あ、でも心残りがあるとしたら、もう１回くらい、トレちぇりを観ておきたかったな～。できればオムオムと一緒に！」
line = "「あ、でも心残りがあるとしたら、もう１回くらい、トレちぇりを観ておきたかったな～。できればオムオムと一緒に！」"

[[dialogue]]
speaker = "オムニス"
# 「俺も異世界のアニメは興味あるけど、さすがにアニメのために滞在期間は伸ばせないぞ……」
line = "「俺も異世界のアニメは興味あるけど、さすがにアニメのために滞在期間は伸ばせないぞ……」"

[[dialogue]]
speaker = "ここあ"
# 「いろはすも好きだね～。あれだけアンナちんのところに入り浸って、アニメ見まくってたのに」
line = "「いろはすも好きだね～。あれだけアンナちんのところに入り浸って、アニメ見まくってたのに」"

[[dialogue]]
speaker = "トレジアンナ"
# 「何らかの記録媒体に保存して持ち帰ることが出来たらよかったのですが、そちらの世界できちんと再生できるかどうかはわかりませんし」
line = "「何らかの記録媒体に保存して持ち帰ることが出来たらよかったのですが、そちらの世界できちんと再生できるかどうかはわかりませんし」"

[[dialogue]]
speaker = "トレジアンナ"
# 「それにそもそも、この世界のものを持って転移した時の影響がわかりませんからね～」
line = "「それにそもそも、この世界のものを持って転移した時の影響がわかりませんからね～」"

[[dialogue]]
speaker = "サチ"
# 「変なものを持っていった影響で、何か起こっちゃったら大変じゃないですか……」
line = "「変なものを持っていった影響で、何か起こっちゃったら大変じゃないですか……」"

[[dialogue]]
speaker = "いろは"
# 「うう～、わかってるよ～」
line = "「うう～、わかってるよ～」"

[[dialogue]]
speaker = "プリムラ"
# 「うーむ……ここ数日でサチといろははすっかり打ち解けたようじゃな」
line = "「うーむ……ここ数日でサチといろははすっかり打ち解けたようじゃな」"

[[dialogue]]
speaker = "シズハ"
# 「容赦なくツッコミするようになってるね」
line = "「容赦なくツッコミするようになってるね」"

[[dialogue]]
speaker = "サチ"
# 「いろはさん、目を離すと何かやらかしそうで、どうしても気になってしまうというか……」
line = "「いろはさん、目を離すと何かやらかしそうで、どうしても気になってしまうというか……」"

[[dialogue]]
speaker = "サチ"
# 「今となっては花織さんの気持ちがとてもよくわかります……」
line = "「今となっては花織さんの気持ちがとてもよくわかります……」"

[[dialogue]]
speaker = "花織"
# 「ううっ……まさか異世界でウチの苦労をこんなにも理解してくれる人が現れるなんて……」
line = "「ううっ……まさか異世界でウチの苦労をこんなにも理解してくれる人が現れるなんて……」"

[[dialogue]]
speaker = "サチ"
# 「元の世界に戻っても頑張ってくださいね、花織さんっ！」
line = "「元の世界に戻っても頑張ってくださいね、花織さんっ！」"

[[dialogue]]
speaker = "花織"
# 「ありがとう、サチちゃんっ！」
line = "「ありがとう、サチちゃんっ！」"

[[dialogue]]
speaker = "オムニス"
# 「俺がいない間、みんなのことをありがとう」
line = "「俺がいない間、みんなのことをありがとう」"

[[dialogue]]
speaker = "トレジアンナ"
# 「とんでもありません。みなさんと知り合えて本当によかったです……ありがとうございました」
line = "「とんでもありません。みなさんと知り合えて本当によかったです……ありがとうございました」"

[[dialogue]]
speaker = "トレジアンナ"
# 「みなさんが立ち向かっているもの……悪魔についての話を、いろいろ聞かせてもらいました」
line = "「みなさんが立ち向かっているもの……悪魔についての話を、いろいろ聞かせてもらいました」"

[[dialogue]]
speaker = "トレジアンナ"
# 「これから先、大変なことがいろいろ待ち受けているでしょう。ですが、挫けずに頑張ってください！」
line = "「これから先、大変なことがいろいろ待ち受けているでしょう。ですが、挫けずに頑張ってください！」"

[[dialogue]]
speaker = "オムニス"
# 「ああ、頑張るよ」
line = "「ああ、頑張るよ」"

[[dialogue]]
speaker = "いろは"
# 「大丈夫だよ！　みんなで力を合わせて、世界を守って見せるから！」
line = "「大丈夫だよ！　みんなで力を合わせて、世界を守って見せるから！」"

[[dialogue]]
speaker = "いろは"
# 「だから、みんなも……頑張ってね」
line = "「だから、みんなも……頑張ってね」"

[[dialogue]]
speaker = "いろは"
# 「あたしたちも、この世界のこと……いろいろ聞かせてもらった」
line = "「あたしたちも、この世界のこと……いろいろ聞かせてもらった」"

[[dialogue]]
speaker = "いろは"
# 「リクリエ、ロストアイテム、他にもいろいろ……すっごく平和そうに見えるこの世界も、たくさんの危険を抱えてるんだって」
line = "「リクリエ、ロストアイテム、他にもいろいろ……すっごく平和そうに見えるこの世界も、たくさんの危険を抱えてるんだって」"

[[dialogue]]
speaker = "いろは"
# 「そういう危険から、この世界を守ってあげて！」
line = "「そういう危険から、この世界を守ってあげて！」"

[[dialogue]]
speaker = "いろは"
# 「また絶対に会いたいから、また一緒に遊びたいから……だからお互いに、自分たちの世界を一生懸命守ろ！」
line = "「また絶対に会いたいから、また一緒に遊びたいから……だからお互いに、自分たちの世界を一生懸命守ろ！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「ええ、もちろんです」
line = "「ええ、もちろんです」"

[[dialogue]]
speaker = "いろは"
# 「『えへへ、約束だよ☆』」
line = "「『えへへ、約束だよ☆』」"

[[dialogue]]
speaker = "トレジアンナ"
# 「『バーカ、お前こそ約束だぞ。破ったら承知しねぇから』」
line = "「『バーカ、お前こそ約束だぞ。破ったら承知しねぇから』」"

[[dialogue]]
speaker = "サチ"
# 「……何のやりとりですか、それ？」
line = "「……何のやりとりですか、それ？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「わからない人はスルーで大丈夫ですよ。ね、いろはさん☆」
line = "「わからない人はスルーで大丈夫ですよ。ね、いろはさん☆」"

[[dialogue]]
speaker = "いろは"
# 「そゆこと♪」
line = "「そゆこと♪」"

[[dialogue]]
speaker = "サチ"
# 「こういうのはもっと普通でいいと思いますけど……」
line = "「こういうのはもっと普通でいいと思いますけど……」"

[[dialogue]]
speaker = "トレジアンナ"
# 「さ、それでは名残惜しいとは思いますが、そろそろ始めましょうか」
line = "「さ、それでは名残惜しいとは思いますが、そろそろ始めましょうか」"

[[dialogue]]
speaker = "オムニス"
# 「そうだな。トレジアンナさん、お願いします」
line = "「そうだな。トレジアンナさん、お願いします」"

[[dialogue]]
speaker = "unk"
# ──こうして、突然始まったいろはたちの異世界生活は幕を閉じた。
line = "──こうして、突然始まったいろはたちの異世界生活は幕を閉じた。"

[[dialogue]]
speaker = "unk"
# 再び、魔法少女たちがまみえる可能性は限りなく低い。
line = "再び、魔法少女たちがまみえる可能性は限りなく低い。"

[[dialogue]]
speaker = "unk"
# だが、ゼロではないその可能性を信じて、２つの世界の魔法少女たちは、それぞれに立ちはだかる試練に向かって挑んでいくのだった。
line = "だが、ゼロではないその可能性を信じて、２つの世界の魔法少女たちは、それぞれに立ちはだかる試練に向かって挑んでいくのだった。"
