line = "「ああ、ちなみに晴明はんと苗字が微妙に違うんは、時代が移り変わる中で、読み方が分かりにくいってなって、『野』って漢字を付け足したらしいわぁ」"

[[dialogue]]
speaker = "ミヤハル"
# 「ほんで、安倍野家は、現代まで陰陽術や巫術を使う星騎士を輩出し続けてきたんやけど……」
line = "「ほんで、安倍野家は、現代まで陰陽術や巫術を使う星騎士を輩出し続けてきたんやけど……」"

[[dialogue]]
speaker = "ミヤハル"
