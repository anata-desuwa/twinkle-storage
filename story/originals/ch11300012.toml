line = "「その中でもうちは、こう見えて晴明はんに並ぶ才能の持ち主とか呼ばれとるんよ。なんでも、陰陽五行の十属性全てを操れるのは、歴代でも晴明はん以来らしくてな？」"

[[dialogue]]
