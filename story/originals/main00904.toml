line = "「いかにモ。アニマは稀代の天才錬金術師──失せ人探しくらいお手の物ダ」"

[[dialogue]]
speaker = "アニマ"
# 「それに……大切な後輩のピンチとあっては、助けないわけにはいかないからネ」
line = "「それに……大切な後輩のピンチとあっては、助けないわけにはいかないからネ」"

[[dialogue]]
speaker = "サーシャ"
# 「あらあら……」
line = "「あらあら……」"

[[dialogue]]
speaker = "unk"
# アニマ先輩はカリキュレーター同士をいくつものコードで繋げていた。
line = "アニマ先輩はカリキュレーター同士をいくつものコードで繋げていた。"

[[dialogue]]
speaker = "unk"
# どうやらここの施設中、今は一括してアニマ先輩の管理下にあるらしい。
line = "どうやらここの施設中、今は一括してアニマ先輩の管理下にあるらしい。"

[[dialogue]]
speaker = "クロト"
# 「トレーニングシステムを連結させて……より高度な演算機能を使っていたんですか」
line = "「トレーニングシステムを連結させて……より高度な演算機能を使っていたんですか」"

[[dialogue]]
speaker = "アニマ"
# 「そうダ！　これに、アニマ特製の秘術を掛け合わせル」
line = "「そうダ！　これに、アニマ特製の秘術を掛け合わせル」"

[[dialogue]]
speaker = "マトイ"
# 「な、なんか魔法陣みたいのが浮かんでる……！」
line = "「な、なんか魔法陣みたいのが浮かんでる……！」"

[[dialogue]]
speaker = "unk"
# 巨大モニターに大小２つの真円が広がり、蛍火のような光がいくつも点滅していた。
line = "巨大モニターに大小２つの真円が広がり、蛍火のような光がいくつも点滅していた。"

[[dialogue]]
speaker = "unk"
