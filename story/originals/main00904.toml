line = "<ruby>大宇宙<rt>マクロコスモス</rt></ruby>と<ruby>小宇宙<rt>ミクロコスモス</rt></ruby>──そのマッピングだとアニマ先輩は解説する。"

[[dialogue]]
speaker = "アニマ"
# 「コスモの照応を用いルことで──対象に関する有用なデータが得られタ。少々時間はかかってしまったがナ」
line = "「コスモの照応を用いルことで──対象に関する有用なデータが得られタ。少々時間はかかってしまったがナ」"

[[dialogue]]
speaker = "クロト"
# 「……どうでしたか？」
line = "「……どうでしたか？」"

[[dialogue]]
speaker = "アニマ"
# 「……フム。良い知らせと、悪い知らせがあるヨ」
line = "「……フム。良い知らせと、悪い知らせがあるヨ」"

[[dialogue]]
speaker = "unk"
# アニマ先輩は神妙に言った。
line = "アニマ先輩は神妙に言った。"

[[dialogue]]
speaker = "アニマ"
# 「良い知らせは──ヴィーナスはまだ生命活動を維持しているということダ。これは金星とのリンクが途切れていないことを確認した」
line = "「良い知らせは──ヴィーナスはまだ生命活動を維持しているということダ。これは金星とのリンクが途切れていないことを確認した」"

[[dialogue]]
speaker = "マトイ"
# 「！　よかった……」
line = "「！　よかった……」"

[[dialogue]]
speaker = "サーシャ"
# 「でも、安心するのはまだ早いわね。どこに囚えられているのかもわからないと」
line = "「でも、安心するのはまだ早いわね。どこに囚えられているのかもわからないと」"

[[dialogue]]
speaker = "クロト"
# 「はい。それに──悪い知らせというのもあるんでしょう」
line = "「はい。それに──悪い知らせというのもあるんでしょう」"

[[dialogue]]
speaker = "アニマ"
# 「フヒッ。それについてなのだガ……」
line = "「フヒッ。それについてなのだガ……」"

[[dialogue]]
speaker = "アニマ"
# 「九浄ヴィーナスという個体は──<b>人間界のどこにもいなイ</b>」
line = "「九浄ヴィーナスという個体は──<b>人間界のどこにもいなイ</b>」"

[[dialogue]]
speaker = "マトイ"
# 「！？」
line = "「！？」"

[[dialogue]]
speaker = "セーラ"
# 「それって……フィーニスの塔が特殊な空間だから、ってこと？」
line = "「それって……フィーニスの塔が特殊な空間だから、ってこと？」"

[[dialogue]]
speaker = "アニマ"
# 「いいヤ。あの塔に関しては特に念入りに調査しタ」
line = "「いいヤ。あの塔に関しては特に念入りに調査しタ」"

[[dialogue]]
speaker = "アニマ"
# 「学園長が自ら立ち入り、内部に変哲がなかったというのも確認していル」
line = "「学園長が自ら立ち入り、内部に変哲がなかったというのも確認していル」"

[[dialogue]]
speaker = "アニマ"
# 「よって、教師陣はお手上げ状態となっていたガ──アニマは違ウ」
line = "「よって、教師陣はお手上げ状態となっていたガ──アニマは違ウ」"

[[dialogue]]
speaker = "アニマ"
# 「あらかじめ採取していタ──もとい、たまたま落ちていたヴィーナスの髪の毛をサンプルに、彼女の居所を突き止めタ！」
line = "「あらかじめ採取していタ──もとい、たまたま落ちていたヴィーナスの髪の毛をサンプルに、彼女の居所を突き止めタ！」"

[[dialogue]]
speaker = "ルリエル"
# 「居場所がわかったのですかっ！？」
line = "「居場所がわかったのですかっ！？」"

[[dialogue]]
speaker = "マトイ"
# 「えぇっ……でもさっき、人間界にいなかったって……」
line = "「えぇっ……でもさっき、人間界にいなかったって……」"

[[dialogue]]
speaker = "アニマ"
# 「そうダ。人間界のどこにもいなかったガ、人間界でないところに居タ」
line = "「そうダ。人間界のどこにもいなかったガ、人間界でないところに居タ」"

[[dialogue]]
speaker = "アニマ"
# 「人間界よりも、下なのダ。ヴィーナスがいるのはナ」
line = "「人間界よりも、下なのダ。ヴィーナスがいるのはナ」"

[[dialogue]]
speaker = "クロト"
# 「──！！」
line = "「──！！」"

[[dialogue]]
speaker = "マトイ"
# 「人間界よりも下──って、もしかして……」
line = "「人間界よりも下──って、もしかして……」"

[[dialogue]]
speaker = "ソフィア"
# 「もしかして……魔界ですかっ！？」
line = "「もしかして……魔界ですかっ！？」"

[[dialogue]]
speaker = "サーシャ"
# 「……信じられないわね。色々な意味で──」
line = "「……信じられないわね。色々な意味で──」"

[[dialogue]]
speaker = "アニマ"
# 「アニマはそう推測すル。無論、いくつもの常識的制限を無視しての話だガ」
line = "「アニマはそう推測すル。無論、いくつもの常識的制限を無視しての話だガ」"

[[dialogue]]
speaker = "ユウリ"
# 「勝手に三界までまたぎやがるとか、とんでもねえ相手だな……」
line = "「勝手に三界までまたぎやがるとか、とんでもねえ相手だな……」"

[[dialogue]]
speaker = "クロト"
# （人間界のどこにも、いない──ヴィーナスが──）
