[[dialogue]]
speaker = "unk"
# ──心臓がさらに早鐘を打つ。
line = "──心臓がさらに早鐘を打つ。"

[[dialogue]]
speaker = "unk"
# 今すぐにここを飛び出して、彼女を追いかけたい衝動に駆られた。
line = "今すぐにここを飛び出して、彼女を追いかけたい衝動に駆られた。"

[[dialogue]]
speaker = "クロト"
# （けど──駄目だ。落ち着け。学園長の言葉を思い出せ。俺が前のめりになっていたら、誰もついてこれない）
line = "（けど──駄目だ。落ち着け。学園長の言葉を思い出せ。俺が前のめりになっていたら、誰もついてこれない）"

[[dialogue]]
speaker = "unk"
# 見れば、みんな──どうすればいいんだと言わんばかりの困惑を揃って浮かべていた。
line = "見れば、みんな──どうすればいいんだと言わんばかりの困惑を揃って浮かべていた。"

[[dialogue]]
speaker = "unk"
# こんな時こそ、俺は新星の星徒会長として──リーダーにふさわしい指揮を執らなきゃならない。我武者羅に、けれど冷静に。
line = "こんな時こそ、俺は新星の星徒会長として──リーダーにふさわしい指揮を執らなきゃならない。我武者羅に、けれど冷静に。"

[[dialogue]]
speaker = "クロト"
# 「……感謝します、アニマ先輩。その計算──恐らく<ruby=ほころ>綻</ruby>びはなさそうです」
line = "「……感謝します、アニマ先輩。その計算──恐らく<ruby>綻<rt>ほころ</rt></ruby>びはなさそうです」"

[[dialogue]]
speaker = "クロト"
# 「居場所がわかった──これは紛れもない進歩だ」
line = "「居場所がわかった──これは紛れもない進歩だ」"

[[dialogue]]
speaker = "フィオナ"
# 「緋宮会長……」
line = "「緋宮会長……」"

[[dialogue]]
speaker = "unk"
# 努めて冷静に言い放つ。
line = "努めて冷静に言い放つ。"

[[dialogue]]
speaker = "unk"
# しかし、無視できない弊害もそこにはあって……
line = "しかし、無視できない弊害もそこにはあって……"

[[dialogue]]
speaker = "クロト"
# 「だけど、それは……確かに<b>悪い知らせ</b>ですね」
line = "「だけど、それは……確かに<b>悪い知らせ</b>ですね」"

[[dialogue]]
speaker = "アニマ"
# 「そうダ。なぜならもう──『大交流』の時期はとうに過ぎていル」
line = "「そうダ。なぜならもう──『大交流』の時期はとうに過ぎていル」"

[[dialogue]]
speaker = "マトイ"
# 「あっ……」
line = "「あっ……」"

[[dialogue]]
speaker = "unk"
# 大交流──
line = "大交流──"

[[dialogue]]
speaker = "unk"
# それは、人類が三界間を移動する唯一の機会。
line = "それは、人類が三界間を移動する唯一の機会。"

[[dialogue]]
speaker = "unk"
# その機に行き来できる人数は大きく限られており、また四半期に一度しか解放されないというのが常識中の常識だ。
line = "その機に行き来できる人数は大きく限られており、また四半期に一度しか解放されないというのが常識中の常識だ。"

[[dialogue]]
speaker = "マトイ"
# 「なんとか……なんとかお願いすることってできないかな！？　超緊急の事態だし──」
line = "「なんとか……なんとかお願いすることってできないかな！？　超緊急の事態だし──」"

[[dialogue]]
speaker = "アニマ"
# 「難しいだろうナ。まず──『大交流』を行うには三界の狭間である『<ruby=ラーゴ・シエロ>鏡界の湖</ruby>』へ行くことになル」
line = "「難しいだろうナ。まず──『大交流』を行うには三界の狭間である『<ruby>鏡界の湖<rt>ラーゴ・シエロ</rt></ruby>』へ行くことになル」"

[[dialogue]]
speaker = "アニマ"
# 「そして、そこから行き来に必要な『穴』を開くには満ち足りた星力が要ル。今はまだそのエネルギーが溜まっていないだろウ」
line = "「そして、そこから行き来に必要な『穴』を開くには満ち足りた星力が要ル。今はまだそのエネルギーが溜まっていないだろウ」"

[[dialogue]]
speaker = "マトイ"
# 「そんな……！」
line = "「そんな……！」"

[[dialogue]]
speaker = "クロト"
# 「だから四半期に一回しか、って話か──」
line = "「だから四半期に一回しか、って話か──」"

[[dialogue]]
speaker = "アナ"
# 「……はい。そもそも『大交流』の定員は一期につき数十名程度──極めて狭き門です」
line = "「……はい。そもそも『大交流』の定員は一期につき数十名程度──極めて狭き門です」"

[[dialogue]]
speaker = "アナ"
# 「そのため選ばれるのは各世界の要人ばかり。<ruby=わたしたち>留学生</ruby>でさえ、卒業時までは帰れません」
line = "「そのため選ばれるのは各世界の要人ばかり。<ruby>留学生<rt>わたしたち</rt></ruby>でさえ、卒業時までは帰れません」"

[[dialogue]]
speaker = "ルリエル"
# 「手続きに２週間くらいかかりましたし……そんなにもたもたしていられません！」
line = "「手続きに２週間くらいかかりましたし……そんなにもたもたしていられません！」"

[[dialogue]]
speaker = "ユウリ"
# 「どうあがいてもキツイ、って話か……」
line = "「どうあがいてもキツイ、って話か……」"

[[dialogue]]
speaker = "クロト"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# 魔族でも留学生でもない俺は当然、三界を渡ったことなどない。ないが……
line = "魔族でも留学生でもない俺は当然、三界を渡ったことなどない。ないが……"

[[dialogue]]
speaker = "クロト"
# 「何か……正規の手段以外で人間界を出る方法はないのか？」
line = "「何か……正規の手段以外で人間界を出る方法はないのか？」"

[[dialogue]]
speaker = "アニマ"
# 「そんな方法があるのなら──このアニマが知りたいくらいダ。世界中の研究者が躍起になって探しているヨ」
line = "「そんな方法があるのなら──このアニマが知りたいくらいダ。世界中の研究者が躍起になって探しているヨ」"

[[dialogue]]
speaker = "アナ"
# 「今後の世界の発展における、最重要課題でもありますからね」
line = "「今後の世界の発展における、最重要課題でもありますからね」"

[[dialogue]]
speaker = "ルリエル"
# 「！　そ、そういえば。駅前でいつか、天界エレベーターに乗せてやるって言われたことあります！」
line = "「！　そ、そういえば。駅前でいつか、天界エレベーターに乗せてやるって言われたことあります！」"

[[dialogue]]
speaker = "セーラ"
# 「それ詐欺だよルリっち。天界に行かせてやるーって言って、お金騙し取るやつ」
line = "「それ詐欺だよルリっち。天界に行かせてやるーって言って、お金騙し取るやつ」"

[[dialogue]]
speaker = "ルリエル"
# 「あ、あう……！？」
line = "「あ、あう……！？」"

[[dialogue]]
speaker = "フィオナ"
# 「それほどまでに──夢物語ということですか」
line = "「それほどまでに──夢物語ということですか」"

[[dialogue]]
speaker = "ユウリ"
# 「けどあたしらは、それで諦めるわけにもいかねえ……！」
line = "「けどあたしらは、それで諦めるわけにもいかねえ……！」"

[[dialogue]]
speaker = "クロト"
# 「──」
line = "「──」"

[[dialogue]]
speaker = "unk"
# 考えろ。考えろ。落ち込んでいる時間はない。
line = "考えろ。考えろ。落ち込んでいる時間はない。"

[[dialogue]]
speaker = "unk"
# 魔族とも天使とも人間とも、俺はこの学園生活を通じてたくさん接してきたはずだ。ヒントがないとは思えない。
line = "魔族とも天使とも人間とも、俺はこの学園生活を通じてたくさん接してきたはずだ。ヒントがないとは思えない。"

[[dialogue]]
speaker = "unk"
# 俺はいくつもの選択肢を頭の中で巡らせ、そして──
line = "俺はいくつもの選択肢を頭の中で巡らせ、そして──"

[[dialogue]]
speaker = "クロト"
# 「魔族は……魔界。天使は……天界。人間は……人間界」
line = "「魔族は……魔界。天使は……天界。人間は……人間界」"

[[dialogue]]
speaker = "マトイ"
# 「……緋宮くん？　なに当たり前のこと言って──」
line = "「……緋宮くん？　なに当たり前のこと言って──」"

[[dialogue]]
speaker = "クロト"
# 「アナ。ひとつ確認したいんだが……」
line = "「アナ。ひとつ確認したいんだが……」"

[[dialogue]]
speaker = "アナ"
# 「？　はい」
line = "「？　はい」"

[[dialogue]]
speaker = "unk"
# 俺が辿り着いたのはそれ。
line = "俺が辿り着いたのはそれ。"

[[dialogue]]
speaker = "unk"
# 今の俺たちが知る種族は──この３つで全てではない。
line = "今の俺たちが知る種族は──この３つで全てではない。"

[[dialogue]]
speaker = "クロト"
# 「<b>魔女</b>って種族。彼女たちがどこに棲んでるって言ってたか──覚えてるか？」
line = "「<b>魔女</b>って種族。彼女たちがどこに棲んでるって言ってたか──覚えてるか？」"
