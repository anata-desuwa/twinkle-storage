[[dialogue]]
speaker = "unk"
# 第２話,ルリエルの故郷,P
line = "第２話,ルリエルの故郷,P"

[[dialogue]]
speaker = "ルリエル"
# 「あ、新星の会長さん、こんにちは！　お散歩ですかぁ？」
line = "「あ、新星の会長さん、こんにちは！　お散歩ですかぁ？」"

[[dialogue]]
speaker = "ルリエル"
# 「わたしはこの近くにニンジョウヤキなるお菓子があると聞いてやってきたのですが……」
line = "「わたしはこの近くにニンジョウヤキなるお菓子があると聞いてやってきたのですが……」"

[[dialogue]]
speaker = "unk"
# ニンジョウヤキじゃなくて人形焼き
line = "ニンジョウヤキじゃなくて人形焼き"

[[dialogue]]
speaker = "ルリエル"
# 「そうなんですねっ、失礼しました～」
line = "「そうなんですねっ、失礼しました～」"

[[dialogue]]
speaker = "ルリエル"
# 「え？　でもお人形焼いちゃうのですか？　かわいいお人形を鉄板の上でジュージューと……あぁっ、そんなことしたら黒焦げになっちゃいますぅっ」
line = "「え？　でもお人形焼いちゃうのですか？　かわいいお人形を鉄板の上でジュージューと……あぁっ、そんなことしたら黒焦げになっちゃいますぅっ」"

[[dialogue]]
speaker = "ルリエル"
# 「……顔の形をした型に生地を入れて焼いたお菓子？　なんだ～、そういうことなんですね」
line = "「……顔の形をした型に生地を入れて焼いたお菓子？　なんだ～、そういうことなんですね」"

[[dialogue]]
speaker = "ルリエル"
# 「でも顔の形って、それはそれで怖いような……見てみればわかる？」
line = "「でも顔の形って、それはそれで怖いような……見てみればわかる？」"

[[dialogue]]
speaker = "ルリエル"
# 「そうですねっ。じゃあ会長さん、さっそく人形焼きを食べに行きましょ～っ！」
line = "「そうですねっ。じゃあ会長さん、さっそく人形焼きを食べに行きましょ～っ！」"

[[dialogue]]
speaker = "ルリエル"
# 「あっ、あのお店でしょうか。なるほどなるほどぉ～……こんな見た目なのですね。想像してたのと違いました」
line = "「あっ、あのお店でしょうか。なるほどなるほどぉ～……こんな見た目なのですね。想像してたのと違いました」"

[[dialogue]]
speaker = "ルリエル"
# 「こしあんに白あん、カスタード……ほぇ～、いろいろあるのですねー。どれもおいしそうなのです」
line = "「こしあんに白あん、カスタード……ほぇ～、いろいろあるのですねー。どれもおいしそうなのです」"

[[dialogue]]
speaker = "ルリエル"
# 「会長さんはカスタードですか？　じゃあわたしは普通のあんこにしますのです。おじさーんっ、人形焼くださーい」
line = "「会長さんはカスタードですか？　じゃあわたしは普通のあんこにしますのです。おじさーんっ、人形焼くださーい」"

[[dialogue]]
speaker = "おじさん"
# 「はいよ。今焼けたところだよ」
line = "「はいよ。今焼けたところだよ」"

[[dialogue]]
speaker = "ルリエル"
# 「ありがとうございまーっす！　ふっふん、焼きたてをもらってしまいましたぁ～。あったかくておいしそう……はむっ」
line = "「ありがとうございまーっす！　ふっふん、焼きたてをもらってしまいましたぁ～。あったかくておいしそう……はむっ」"

[[dialogue]]
speaker = "ルリエル"
# 「ん～っ、とっても甘くておいしいのですっ！　会長さんもあんこの食べますか？　はい、どうぞ！」
line = "「ん～っ、とっても甘くておいしいのですっ！　会長さんもあんこの食べますか？　はい、どうぞ！」"

[[dialogue]]
speaker = "unk"
# ありがとう
line = "ありがとう"

[[dialogue]]
speaker = "ルリエル"
# 「おいしいですか？　……ですよねですよねっ！」
line = "「おいしいですか？　……ですよねですよねっ！」"

[[dialogue]]
speaker = "ルリエル"
# 「というわけでカスタードの人形焼きもくださいっ。……いいんですか？　ありがとうございますっ。あ～んっ」
line = "「というわけでカスタードの人形焼きもくださいっ。……いいんですか？　ありがとうございますっ。あ～んっ」"

[[dialogue]]
speaker = "ルリエル"
# 「カスタードの人形焼きもおいしい～……。でも塔とかハトとか、人の顔以外の形もあるのですねぇ」
line = "「カスタードの人形焼きもおいしい～……。でも塔とかハトとか、人の顔以外の形もあるのですねぇ」"

[[dialogue]]
speaker = "ルリエル"
# 「昔は名所焼きと呼ばれていたこともあったと……ふむふむ、なるほどです……」
line = "「昔は名所焼きと呼ばれていたこともあったと……ふむふむ、なるほどです……」"

[[dialogue]]
speaker = "ルリエル"
# 「はぁ～……おいしいものがたくさんあるし、楽しいこといっぱいですし、人間界に来てよかったですぅ」
line = "「はぁ～……おいしいものがたくさんあるし、楽しいこといっぱいですし、人間界に来てよかったですぅ」"

[[dialogue]]
speaker = "ルリエル"
# 「え、わたしの故郷ですか？　そうですね～、天界のフィリスティアというところなんですけど……」
line = "「え、わたしの故郷ですか？　そうですね～、天界のフィリスティアというところなんですけど……」"

[[dialogue]]
speaker = "ルリエル"
# 「フィリスティアは田舎で、見渡す限り綺麗なお花畑で……それ以外本当に何もないところでした」
line = "「フィリスティアは田舎で、見渡す限り綺麗なお花畑で……それ以外本当に何もないところでした」"

[[dialogue]]
speaker = "ルリエル"
# 「天界でもウルって街はけっこう都会らしいんですけど、わたしは行ったことないです」
line = "「天界でもウルって街はけっこう都会らしいんですけど、わたしは行ったことないです」"

[[dialogue]]
speaker = "ルリエル"
# 「近辺だと子どもがわたしだけだったので、じっちゃんばっちゃんたちにすごくかわいがられていました」
line = "「近辺だと子どもがわたしだけだったので、じっちゃんばっちゃんたちにすごくかわいがられていました」"

[[dialogue]]
speaker = "ルリエル"
# 「ああ、じっちゃんばっちゃんって言っても、実の祖父や祖母じゃなくて、周りのお年寄りの天使なんですけど」
line = "「ああ、じっちゃんばっちゃんって言っても、実の祖父や祖母じゃなくて、周りのお年寄りの天使なんですけど」"

[[dialogue]]
speaker = "ルリエル"
# 「わたしが星騎士になるって決まった時は大騒ぎで、連日お祝いムードだったのです」
line = "「わたしが星騎士になるって決まった時は大騒ぎで、連日お祝いムードだったのです」"

[[dialogue]]
speaker = "unk"
# みんなの人気者だ
line = "みんなの人気者だ"

[[dialogue]]
speaker = "ルリエル"
# 「いや～、そう言われると照れてしまいますぅ」
line = "「いや～、そう言われると照れてしまいますぅ」"

[[dialogue]]
speaker = "ルリエル"
# 「でも大変なこともあったのです。天使として恥ずかしくないようにって、いろいろ礼儀とかマナーとかを教え込まれたのです」
line = "「でも大変なこともあったのです。天使として恥ずかしくないようにって、いろいろ礼儀とかマナーとかを教え込まれたのです」"

[[dialogue]]
speaker = "ルリエル"
# 「天界と人間界を繋ぐ柱になれって言われて、天使らしく高潔に、清貧に、勤勉に……って。でもそのおかげで立派な天使になれましたぁっ」
line = "「天界と人間界を繋ぐ柱になれって言われて、天使らしく高潔に、清貧に、勤勉に……って。でもそのおかげで立派な天使になれましたぁっ」"

[[dialogue]]
speaker = "ルリエル"
# 「え、今食べてる人形焼きはって……？　これは文化交流なのですっ。天使として、フィリスティアの代表として、人間界の勉強をしているのですっ」
line = "「え、今食べてる人形焼きはって……？　これは文化交流なのですっ。天使として、フィリスティアの代表として、人間界の勉強をしているのですっ」"

[[dialogue]]
speaker = "ルリエル"
# 「むぅ～、若いんですから、ちょっとぐらい遊んでもいいじゃないですかぁ」
line = "「むぅ～、若いんですから、ちょっとぐらい遊んでもいいじゃないですかぁ」"

[[dialogue]]
speaker = "ルリエル"
# 「楽しいことが多すぎる人間界がいけないんですぅ。こっちに来たら、じっちゃんばっちゃんだって大はしゃぎするに決まってますぅ～」
line = "「楽しいことが多すぎる人間界がいけないんですぅ。こっちに来たら、じっちゃんばっちゃんだって大はしゃぎするに決まってますぅ～」"

[[dialogue]]
speaker = "unk"
# それはそうかも
line = "それはそうかも"

[[dialogue]]
speaker = "ルリエル"
# 「ですよねですよね～」
line = "「ですよねですよね～」"

[[dialogue]]
speaker = "おじさん"
# 「ははは、天使さんにそんなに気に入ってもらえたら嬉しいねぇ。そうだ、この辺には人形焼き以外にも有名なお菓子があってね……」
line = "「ははは、天使さんにそんなに気に入ってもらえたら嬉しいねぇ。そうだ、この辺には人形焼き以外にも有名なお菓子があってね……」"

[[dialogue]]
speaker = "ルリエル"
# 「ふむふむ、ほぉほぉ……雷おこしですか。雷っていうくらいだからバチバチするんでしょうか？　気になりますっ」
line = "「ふむふむ、ほぉほぉ……雷おこしですか。雷っていうくらいだからバチバチするんでしょうか？　気になりますっ」"

[[dialogue]]
speaker = "ルリエル"
# 「人間界のお菓子なら雷おこしも絶対おいしいに違いありません。会長さん、雷おこしを探しに行きましょう！」
line = "「人間界のお菓子なら雷おこしも絶対おいしいに違いありません。会長さん、雷おこしを探しに行きましょう！」"
