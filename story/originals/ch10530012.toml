[[dialogue]]
speaker = "unk"
# 第２話,ウェンディの節約術,P
line = "第２話,ウェンディの節約術,P"

[[dialogue]]
speaker = "ウェンディ"
# 「おや、会長さん。お買い物ですか？　しかし微妙な表情をされていますね」
line = "「おや、会長さん。お買い物ですか？　しかし微妙な表情をされていますね」"

[[dialogue]]
speaker = "unk"
# 実はお金がなくて……
line = "実はお金がなくて……"

[[dialogue]]
speaker = "ウェンディ"
# 「お金？　会長さんが？」
line = "「お金？　会長さんが？」"

[[dialogue]]
speaker = "ウェンディ"
# 「新星学園に転入するためにアルバイトをして、節約もしていたとネビュラのデータにありました。お金に困る人ではないと思っていましたが」
line = "「新星学園に転入するためにアルバイトをして、節約もしていたとネビュラのデータにありました。お金に困る人ではないと思っていましたが」"

[[dialogue]]
speaker = "ウェンディ"
# 「……ふむふむ。バイトをやめた上、人付き合いで出費も多くなったと。なるほどそれは頷けますね」
line = "「……ふむふむ。バイトをやめた上、人付き合いで出費も多くなったと。なるほどそれは頷けますね」"

[[dialogue]]
speaker = "ウェンディ"
# 「それなら私がお役に立ちましょう。収支の正常化も私の仕事ですから」
line = "「それなら私がお役に立ちましょう。収支の正常化も私の仕事ですから」"

[[dialogue]]
speaker = "ウェンディ"
# 「お邪魔します」
line = "「お邪魔します」"

[[dialogue]]
speaker = "ウェンディ"
# 「では収入と支出のバランスを見直していきましょう。お金を使うことは悪ではありませんが、収入に見合わない支出は自分のためになりません」
line = "「では収入と支出のバランスを見直していきましょう。お金を使うことは悪ではありませんが、収入に見合わない支出は自分のためになりません」"

[[dialogue]]
speaker = "ウェンディ"
# 「お小遣いの金額と、最近お金を使ったものを教えていただけますか？　収入を増やす、支出を減らすを考える前に、可視化するのが大事です」
line = "「お小遣いの金額と、最近お金を使ったものを教えていただけますか？　収入を増やす、支出を減らすを考える前に、可視化するのが大事です」"

[[dialogue]]
speaker = "ウェンディ"
# 「あと帳簿も付けましょう。事業者ではないので、あまりきっちりしたものでなくでも構いません。記録すること、見直せることが重要ですから」
line = "「あと帳簿も付けましょう。事業者ではないので、あまりきっちりしたものでなくでも構いません。記録すること、見直せることが重要ですから」"

[[dialogue]]
speaker = "ウェンディ"
# 「ふむ。漫画雑誌に、コンビニでの買い食い、友人と出かけた時の飲食代などなど……」
line = "「ふむ。漫画雑誌に、コンビニでの買い食い、友人と出かけた時の飲食代などなど……」"

[[dialogue]]
speaker = "ウェンディ"
# 「確かにこれではお金がないと言いたくなるでしょう。しかし主だった出費はどれも減らせるものですね」
line = "「確かにこれではお金がないと言いたくなるでしょう。しかし主だった出費はどれも減らせるものですね」"

[[dialogue]]
speaker = "ウェンディ"
# 「勘違いしないでください。無駄とは言いません。その消費から得るものは少なからずあるでしょう」
line = "「勘違いしないでください。無駄とは言いません。その消費から得るものは少なからずあるでしょう」"

[[dialogue]]
speaker = "ウェンディ"
# 「ですがそれが、あなたの経済状況に見合ったものかということです」
line = "「ですがそれが、あなたの経済状況に見合ったものかということです」"

[[dialogue]]
speaker = "unk"
# 耳が痛い……！
line = "耳が痛い……！"

[[dialogue]]
speaker = "ウェンディ"
# 「今はバイトできない以上、支出を削るしかありませんね」
line = "「今はバイトできない以上、支出を削るしかありませんね」"

[[dialogue]]
speaker = "ウェンディ"
# 「まず漫画雑誌ですが、掲載作品は全て読んでいますか？　でなければ、単行本を待った方が経済的かと思います」
line = "「まず漫画雑誌ですが、掲載作品は全て読んでいますか？　でなければ、単行本を待った方が経済的かと思います」"

[[dialogue]]
speaker = "ウェンディ"
# 「最新話を読みたいのはわかります。話題の作品もありますし、うっかりネタバレを見てしまう危険もありますから」
line = "「最新話を読みたいのはわかります。話題の作品もありますし、うっかりネタバレを見てしまう危険もありますから」"

[[dialogue]]
speaker = "ウェンディ"
# 「ですから支出削減案の１つとしておきます」
line = "「ですから支出削減案の１つとしておきます」"

[[dialogue]]
speaker = "ウェンディ"
# 「次はコンビニの買い食いですが──我慢しなさい。早く家に帰ってきなさい。以上」
line = "「次はコンビニの買い食いですが──我慢しなさい。早く家に帰ってきなさい。以上」"

[[dialogue]]
speaker = "unk"
# 切り捨てられた！？
line = "切り捨てられた！？"

[[dialogue]]
speaker = "ウェンディ"
# 「半分は冗談ですよ。ショックを受けないでください」
line = "「半分は冗談ですよ。ショックを受けないでください」"

[[dialogue]]
speaker = "ウェンディ"
# 「ついつい買い食いをしてしまう場合は昼食を見直しましょう」
line = "「ついつい買い食いをしてしまう場合は昼食を見直しましょう」"

[[dialogue]]
speaker = "ウェンディ"
# 「昼食が足りないということであれば、お母様に相談すれば昼食代やお小遣いを上げてもらえるのではないですか？　入るお金を増やせるとしたら唯一ここです」
line = "「昼食が足りないということであれば、お母様に相談すれば昼食代やお小遣いを上げてもらえるのではないですか？　入るお金を増やせるとしたら唯一ここです」"

[[dialogue]]
speaker = "ウェンディ"
# 「無計画な買い食いは、カロリーや塩分の摂りすぎ、ひいては肥満など健康障害につながるので控えるべき──」
line = "「無計画な買い食いは、カロリーや塩分の摂りすぎ、ひいては肥満など健康障害につながるので控えるべき──」"

[[dialogue]]
speaker = "ウェンディ"
# 「──いけません。自分の言葉が自分に突き刺さるところでした。とりあえず、食べ過ぎは良くないということだけ言っておきます」
line = "「──いけません。自分の言葉が自分に突き刺さるところでした。とりあえず、食べ過ぎは良くないということだけ言っておきます」"

[[dialogue]]
speaker = "ウェンディ"
# 「そして友人との飲食代。これが新星学園転入後に一番支出額が増えた項目ですね」
line = "「そして友人との飲食代。これが新星学園転入後に一番支出額が増えた項目ですね」"

[[dialogue]]
speaker = "ウェンディ"
# 「まず、外で人と会うのを控えましょう。学生なら学園でできることは学園で。休日は自宅か相手のお宅に行けばいい話です」
line = "「まず、外で人と会うのを控えましょう。学生なら学園でできることは学園で。休日は自宅か相手のお宅に行けばいい話です」"

[[dialogue]]
speaker = "ウェンディ"
# 「また新星学園や流星学園は特殊な学園で、裕福──という言葉では表現できないレベルの家庭の子女もいます。心当たりありますよね？」
line = "「また新星学園や流星学園は特殊な学園で、裕福──という言葉では表現できないレベルの家庭の子女もいます。心当たりありますよね？」"

[[dialogue]]
speaker = "ウェンディ"
# 「いいですか、ああいった人たちの経済観念に影響されてはなりません。自分の収入に見合った消費を心がけてください」
line = "「いいですか、ああいった人たちの経済観念に影響されてはなりません。自分の収入に見合った消費を心がけてください」"

[[dialogue]]
speaker = "ウェンディ"
# 「そしてお金がない時は、付き合いだからと流されずに正直に言いましょう」
line = "「そしてお金がない時は、付き合いだからと流されずに正直に言いましょう」"

[[dialogue]]
speaker = "ウェンディ"
# 「だって、会長さんの周りの人はそんなことで離れていかないでしょう？」
line = "「だって、会長さんの周りの人はそんなことで離れていかないでしょう？」"

[[dialogue]]
speaker = "ウェンディ"
# 「モンスターの捕獲に協力してもらいましたから、私は会長さんのことを知っているつもりです」
line = "「モンスターの捕獲に協力してもらいましたから、私は会長さんのことを知っているつもりです」"

[[dialogue]]
speaker = "ウェンディ"
# 「ですから、少々付き合いが悪くなっても大丈夫ですよ」
line = "「ですから、少々付き合いが悪くなっても大丈夫ですよ」"

[[dialogue]]
speaker = "unk"
# ウェンディ……！
line = "ウェンディ……！"

[[dialogue]]
speaker = "ウェンディ"
# 「まぁ、私であれば……時間がある時はお相手します。私個人のお金には困っていませんし、お茶代くらいであれば出しますよ」
line = "「まぁ、私であれば……時間がある時はお相手します。私個人のお金には困っていませんし、お茶代くらいであれば出しますよ」"

[[dialogue]]
speaker = "ウェンディ"
# 「さて、話を戻しましょう。さきほど挙げたプランを実行すると……軽く計算して、毎月の支出の３０％はカットできると思います」
line = "「さて、話を戻しましょう。さきほど挙げたプランを実行すると……軽く計算して、毎月の支出の３０％はカットできると思います」"

[[dialogue]]
speaker = "unk"
# 相談に乗ってくれてありがとう
line = "相談に乗ってくれてありがとう"

[[dialogue]]
speaker = "ウェンディ"
# 「いえいえ、元はと言えば迷惑をかけたのは私ですから」
line = "「いえいえ、元はと言えば迷惑をかけたのは私ですから」"

[[dialogue]]
speaker = "ウェンディ"
# 「おっと、そろそろ時間ですね。ネビュラの活動資金を増やすために、いろいろ出向かなきゃいけないところがあるんですよ」
line = "「おっと、そろそろ時間ですね。ネビュラの活動資金を増やすために、いろいろ出向かなきゃいけないところがあるんですよ」"

[[dialogue]]
speaker = "ウェンディ"
# 「合間であれば、またお話しできると思います。それでは失礼しますね」
line = "「合間であれば、またお話しできると思います。それでは失礼しますね」"
