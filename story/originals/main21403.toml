[[dialogue]]
speaker = "unk"
# 第３話,フィーニスの塔・攻略,B
line = "第３話,フィーニスの塔・攻略,B"

[[dialogue]]
speaker = "チナ"
# 「フィーニスの塔……中はこんな風になってるんだな」
line = "「フィーニスの塔……中はこんな風になってるんだな」"

[[dialogue]]
speaker = "グレイス"
# 「時間はあまりなさそうですね！　ルヴィがいる最上階まで一気に行きましょう！」
line = "「時間はあまりなさそうですね！　ルヴィがいる最上階まで一気に行きましょう！」"

[[dialogue]]
speaker = "レティシア"
# 「そうね──と言いたいけれど……」
line = "「そうね──と言いたいけれど……」"

[[dialogue]]
speaker = "スレイプニル"
# 「ヒュゥーンッ──！！」
line = "「ヒュゥーンッ──！！」"

[[dialogue]]
speaker = "アナ"
# 「極星従騎……！　すごい数です！！」
line = "「極星従騎……！　すごい数です！！」"

[[dialogue]]
speaker = "クロト"
# 「総員、各個撃破だ。駆け上がるぞ──」
line = "「総員、各個撃破だ。駆け上がるぞ──」"

[[dialogue]]
speaker = "レティシア"
# 「少し下がってなさい、魔王」
line = "「少し下がってなさい、魔王」"

[[dialogue]]
speaker = "unk"
# レティシアが俺の前に出て、極星従騎と向かい合う。
line = "レティシアが俺の前に出て、極星従騎と向かい合う。"

[[dialogue]]
speaker = "スレイプニル"
# 「ブッ……ブルルルッ！？」
line = "「ブッ……ブルルルッ！？」"

[[dialogue]]
speaker = "ベアトリス"
# 「あっ、やっぱり私たちに対しては……」
line = "「あっ、やっぱり私たちに対しては……」"

[[dialogue]]
speaker = "レティシア"
# 「ええ。ルヴィが攻撃しないように命令を出しているわね」
line = "「ええ。ルヴィが攻撃しないように命令を出しているわね」"

[[dialogue]]
speaker = "グレイス"
# 「ルヴィ……。あなたは味方なんですか、敵なんですか……？」
line = "「ルヴィ……。あなたは味方なんですか、敵なんですか……？」"

[[dialogue]]
speaker = "チナ"
# 「今ここで考えても埒が明かない！　極星従騎の動きが鈍いなら、突破も容易だ！！」
line = "「今ここで考えても埒が明かない！　極星従騎の動きが鈍いなら、突破も容易だ！！」"

[[dialogue]]
speaker = "レティシア"
# 「魔王、ここは極星が仕切らせてもらうわ」
line = "「魔王、ここは極星が仕切らせてもらうわ」"

[[dialogue]]
speaker = "レティシア"
# 「──ヴァイオレット・ドロー」
line = "「──ヴァイオレット・ドロー」"

[[dialogue]]
speaker = "スレイプニル"
# 「ブルルッ──！？」
line = "「ブルルッ──！？」"

[[dialogue]]
speaker = "マトイ"
# 「す、すごいっ。ひと薙ぎであの極星従騎が……！」
line = "「す、すごいっ。ひと薙ぎであの極星従騎が……！」"

[[dialogue]]
speaker = "unk"
# レティシアの神速の居合切りによって極星従騎が断ち切られ、さらに星力で編まれた紫炎が亡骸すらも焼き尽くしていく。
line = "レティシアの神速の居合切りによって極星従騎が断ち切られ、さらに星力で編まれた紫炎が亡骸すらも焼き尽くしていく。"

[[dialogue]]
speaker = "サーシャ"
# 「やっぱり私との模擬戦闘では手加減してたのね？　速さが段違いだわ～♪」
line = "「やっぱり私との模擬戦闘では手加減してたのね？　速さが段違いだわ～♪」"

[[dialogue]]
speaker = "レティシア"
# 「模擬戦は模擬戦──殺し合いではないもの」
line = "「模擬戦は模擬戦──殺し合いではないもの」"

[[dialogue]]
speaker = "ベアトリス"
# 「流石だね、レティシアちゃん！」
line = "「流石だね、レティシアちゃん！」"

[[dialogue]]
speaker = "レティシア"
# 「お喋りは後よベアト。この子たち、新星学園生には構わず攻撃を仕掛けてきてる」
line = "「お喋りは後よベアト。この子たち、新星学園生には構わず攻撃を仕掛けてきてる」"

[[dialogue]]
speaker = "ベアトリス"
# 「うんっ……！　私たちが壁になって、どんどん登っていこう！」
line = "「うんっ……！　私たちが壁になって、どんどん登っていこう！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あっ、ちょっと待って！」
line = "「あっ、ちょっと待って！」"

[[dialogue]]
speaker = "ベアトリス"
# 「うん？　どうかしたの、ヴィーナスちゃん？」
line = "「うん？　どうかしたの、ヴィーナスちゃん？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「フィーニスの塔ってすっごく高いのよ！　緊急事態はこれ一択なんだから！」
line = "「フィーニスの塔ってすっごく高いのよ！　緊急事態はこれ一択なんだから！」"

[[dialogue]]
speaker = "unk"
# ヴィーナスはそう言うや否や、フィーニスの塔の天井に向かって高出力の星術をぶっ放した。
line = "ヴィーナスはそう言うや否や、フィーニスの塔の天井に向かって高出力の星術をぶっ放した。"

[[dialogue]]
speaker = "ヴィーナス"
# 「シャイニング・ゴッデスビームッ！！」
line = "「シャイニング・ゴッデスビームッ！！」"

[[dialogue]]
speaker = "ベアトリス"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "チナ"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "レティシア"
# 「あら、なかなか便利そうね」
line = "「あら、なかなか便利そうね」"

[[dialogue]]
speaker = "unk"
# ヴィーナスは以前の俺がやったように、フィーニスの塔の天井をぶち抜いて、頂上に向かってそのまま飛翔できるルートを作り上げた。
line = "ヴィーナスは以前の俺がやったように、フィーニスの塔の天井をぶち抜いて、頂上に向かってそのまま飛翔できるルートを作り上げた。"

[[dialogue]]
speaker = "アナ"
# 「移動効率は格段にアップしましたが、その分敵である極星従騎も一直線でこちらに向かってきています」
line = "「移動効率は格段にアップしましたが、その分敵である極星従騎も一直線でこちらに向かってきています」"

[[dialogue]]
speaker = "クロト"
# 「よし。極星従騎は全部倒すんじゃなくて、最低限相手にしながら、とにかく先に進むぞ！」
line = "「よし。極星従騎は全部倒すんじゃなくて、最低限相手にしながら、とにかく先に進むぞ！」"

[[dialogue]]
speaker = "チナ"
# 「アレに対してツッコミやリアクションの１つもないのは、お前らスゲーな……」
line = "「アレに対してツッコミやリアクションの１つもないのは、お前らスゲーな……」"

[[dialogue]]
speaker = "unk"
# その後も襲い来る極星従騎を、ベアトリスたちにフロントを務めてもらうことで撃破し──一つ、また一つと階層を踏破していった。
line = "その後も襲い来る極星従騎を、ベアトリスたちにフロントを務めてもらうことで撃破し──一つ、また一つと階層を踏破していった。"

[[dialogue]]
speaker = "unk"
# しかし頂上まであと一息というところで……
line = "しかし頂上まであと一息というところで……"

[[dialogue]]
speaker = "ジグ"
# 「……やり直そう、世界を」
line = "「……やり直そう、世界を」"

[[dialogue]]
speaker = "アポロ"
# 「……全部、なくなってしまえばいいんだ」
line = "「……全部、なくなってしまえばいいんだ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あ～もうっ！　ここを超えれば、頂上まであと少しなのにっ……！」
line = "「あ～もうっ！　ここを超えれば、頂上まであと少しなのにっ……！」"

[[dialogue]]
speaker = "unk"
# トワ先生が言うには、本来の６割程度の戦闘力らしいが──『未来視』や『天蓋』まで行使するシャドウたちに出し惜しみはできない！
line = "トワ先生が言うには、本来の６割程度の戦闘力らしいが──『未来視』や『天蓋』まで行使するシャドウたちに出し惜しみはできない！"

[[dialogue]]
speaker = "クロト"
# 「極星学園のみんな！　俺たち新星星徒会が時間を稼ぐ！　一足先にルヴィネのいるところに向かってくれ！」
line = "「極星学園のみんな！　俺たち新星星徒会が時間を稼ぐ！　一足先にルヴィネのいるところに向かってくれ！」"

[[dialogue]]
speaker = "グレイス"
# 「そんなっ！？　いくら本物には及ばないと言っても、相手は使徒ですよ！？」
line = "「そんなっ！？　いくら本物には及ばないと言っても、相手は使徒ですよ！？」"

[[dialogue]]
speaker = "クロト"
# 「時間がない！　今ここにシャドウの使徒が現れたということは……！」
line = "「時間がない！　今ここにシャドウの使徒が現れたということは……！」"

[[dialogue]]
speaker = "アナ"
# 「地上も、煌嶺さんが相手をしている個体だけではなさそうですね」
line = "「地上も、煌嶺さんが相手をしている個体だけではなさそうですね」"

[[dialogue]]
speaker = "サーシャ"
# 「少しでも早く、ルヴィネちゃんとコンタクトを取る必要があるわね～。ここは私たちに任せて」
line = "「少しでも早く、ルヴィネちゃんとコンタクトを取る必要があるわね～。ここは私たちに任せて」"

[[dialogue]]
speaker = "レティシア"
# 「……本当にいいの？　私たち、逆にルヴィに説得されちゃうかもしれないのに」
line = "「……本当にいいの？　私たち、逆にルヴィに説得されちゃうかもしれないのに」"

[[dialogue]]
speaker = "クロト"
# 「ルヴィネが死なない未来を掴み取る。俺たちはその点で、同じ意志を持っている。何も問題はない！」
line = "「ルヴィネが死なない未来を掴み取る。俺たちはその点で、同じ意志を持っている。何も問題はない！」"

[[dialogue]]
speaker = "ベアトリス"
# 「──はい！　みんな、ここは会長さんたちの言う通りに！」
line = "「──はい！　みんな、ここは会長さんたちの言う通りに！」"

[[dialogue]]
speaker = "クロト"
# 「新星星徒会──ノヴァフォームの使用を許可する！」
line = "「新星星徒会──ノヴァフォームの使用を許可する！」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「よーっし！　行くわよみんな！！」
line = "「よーっし！　行くわよみんな！！」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「うんっ、任せて！」
line = "「うんっ、任せて！」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「一度は戦った相手だもの。みんなと一緒なら、何も問題はないわね♪」
line = "「一度は戦った相手だもの。みんなと一緒なら、何も問題はないわね♪」"

[[dialogue]]
speaker = "アナ（覚醒）"
# 「私たちが道を切り開きます──極星学園のみなさん、タイミングを合わせてください！」
line = "「私たちが道を切り開きます──極星学園のみなさん、タイミングを合わせてください！」"

[[dialogue]]
speaker = "チナ"
# 「……恩に着る！　行くぞ！」
line = "「……恩に着る！　行くぞ！」"

[[dialogue]]
speaker = "クロト"
# 「ディマイズ──ブレイカーッ！！」
line = "「ディマイズ──ブレイカーッ！！」"

[[dialogue]]
speaker = "unk"
# 使徒に強烈な一撃を叩きこむ──その隙に、ベアトリスたちが奥へ向かうのを確認した。
line = "使徒に強烈な一撃を叩きこむ──その隙に、ベアトリスたちが奥へ向かうのを確認した。"

[[dialogue]]
speaker = "クロト"
# 「星力出力を振り切れるまで上げろ！　短期決戦だ！！」
line = "「星力出力を振り切れるまで上げろ！　短期決戦だ！！」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「木っ端ミジンコにしてあげるわ！！　──ノヴァセイクリッドアロー！」
line = "「木っ端ミジンコにしてあげるわ！！　──ノヴァセイクリッドアロー！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……戦況は<ruby=こうちゃく>膠着</ruby>中。でも、時間の問題ね」
line = "「……戦況は<ruby>膠着<rt>こうちゃく</rt></ruby>中。でも、時間の問題ね」"

[[dialogue]]
speaker = "unk"
# ルヴィネは転送装置を起動し、増援の極星従騎とモンスター──そして先刻、創造神『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』から与えられた使徒の影をデネブから呼び寄せる。
line = "ルヴィネは転送装置を起動し、増援の極星従騎とモンスター──そして先刻、創造神『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』から与えられた使徒の影をデネブから呼び寄せる。"

[[dialogue]]
speaker = "unk"
# １０年前の戦禍がなく、多数のプリマステラが生存しているアルタイル。しかしこのまま進めば、物量によってすり潰せるだろう。
line = "１０年前の戦禍がなく、多数のプリマステラが生存しているアルタイル。しかしこのまま進めば、物量によってすり潰せるだろう。"

[[dialogue]]
speaker = "unk"
# そうなれば森羅歴も終わる──しかしそれよりも前に、片付けなければならないことがルヴィネにはあった。
line = "そうなれば森羅歴も終わる──しかしそれよりも前に、片付けなければならないことがルヴィネにはあった。"

[[dialogue]]
speaker = "ルヴィネ"
# 「……来たわね」
line = "「……来たわね」"

[[dialogue]]
speaker = "ベアトリス"
# 「────ルヴィ！！！」
line = "「────ルヴィ！！！」"
