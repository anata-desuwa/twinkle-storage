speaker = "unk"
# 無意識のうちに膝が震え、奥歯が音を立てている……！
line = "無意識のうちに膝が震え、奥歯が音を立てている……！"

[[dialogue]]
speaker = "unk"
# ダメだ──俺が、こんなザマでは！！！
line = "ダメだ──俺が、こんなザマでは！！！"

[[dialogue]]
speaker = "クロト"
# 「────お前が、『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』か！！！！」
line = "「────お前が、『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』か！！！！」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「その啖呵……不敬が過ぎるわね。けれど褒めてあげましょう、緋宮クロト」
line = "「その啖呵……不敬が過ぎるわね。けれど褒めてあげましょう、緋宮クロト」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
# 「かつてディザスターハンドを相手にしても心を折らなかった、レナーテ・<ruby=ジグ>Ｚ</ruby>・サイフリート──」
line = "「かつてディザスターハンドを相手にしても心を折らなかった、レナーテ・<ruby>Ｚ<rt>ジグ</rt></ruby>・サイフリート──」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
# 「彼女の心は、お父様の御姿を見ただけでへし折れた」
line = "「彼女の心は、お父様の御姿を見ただけでへし折れた」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
# 「脆弱な人類にとって、お父様の御姿は──ただ見るだけでも多大な負荷を、脳と心にかけるもの」
line = "「脆弱な人類にとって、お父様の御姿は──ただ見るだけでも多大な負荷を、脳と心にかけるもの」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「よくぞ声を張り上げられたわね。流石は人類最後の希望と言ったところかしら」
line = "「よくぞ声を張り上げられたわね。流石は人類最後の希望と言ったところかしら」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……魔王。大丈夫？」
line = "「……魔王。大丈夫？」"

[[dialogue]]
speaker = "クロト"
# 「ああ。だけど……」
line = "「ああ。だけど……」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「あ……ぁあぁ……」
line = "「あ……ぁあぁ……」"

[[dialogue]]
speaker = "アナ（覚醒）"
# 「そんな……」
line = "「そんな……」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「こんなにも……『差』がある、だなんて──」
line = "「こんなにも……『差』がある、だなんて──」"

[[dialogue]]
speaker = "unk"
# 相対しただけで、星騎士の陣営はひどい有様だ──
line = "相対しただけで、星騎士の陣営はひどい有様だ──"

[[dialogue]]
speaker = "クロト"
# 「ルヴィネ、お願いがある──君の星力は温かい。みんなの心が折れないように、支えてあげて欲しい」
line = "「ルヴィネ、お願いがある──君の星力は温かい。みんなの心が折れないように、支えてあげて欲しい」"

[[dialogue]]
speaker = "ルヴィネ"
# 「貴方はどうするの！？　まさか──」
line = "「貴方はどうするの！？　まさか──」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「────はい。お父様。御心のままに」
line = "「────はい。お父様。御心のままに」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「高次元の存在であるお父様のお言葉を、翻訳して伝えましょう」
line = "「高次元の存在であるお父様のお言葉を、翻訳して伝えましょう」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
# 「今より『<ruby=リ・クリエイション>再創生</ruby>』を実行に移す──だそうよ？」
line = "「今より『<ruby>再創生<rt>リ・クリエイション</rt></ruby>』を実行に移す──だそうよ？」"

[[dialogue]]
speaker = "クロト"
# 「────やってみろ！　ディマイズ・ブレイカーッ！！！」
line = "「────やってみろ！　ディマイズ・ブレイカーッ！！！」"

[[dialogue]]
speaker = "unk"
# 全霊の掌打を、創造神に浴びせかけ──
line = "全霊の掌打を、創造神に浴びせかけ──"

[[dialogue]]
speaker = "クロト"
# 「くっ…………！！」
line = "「くっ…………！！」"

[[dialogue]]
speaker = "unk"
# その全てが、すり抜ける──
line = "その全てが、すり抜ける──"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「無様ね。低次元存在である貴方が、触れられるわけがないでしょう」
line = "「無様ね。低次元存在である貴方が、触れられるわけがないでしょう」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「さぁ──お父様が戯れてくださるわ。身に余る光栄を噛みしめなさい」
line = "「さぁ──お父様が戯れてくださるわ。身に余る光栄を噛みしめなさい」"

[[dialogue]]
speaker = "クロト"
# 「カオス・イージッ──」
line = "「カオス・イージッ──」"

[[dialogue]]
speaker = "クロト"
# 「が、ぁあっぁああっ──！！！！」
line = "「が、ぁあっぁああっ──！！！！」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「ク──クロトッ！？」
line = "「ク──クロトッ！？」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「緋宮会長ッ──！！」
line = "「緋宮会長ッ──！！」"

[[dialogue]]
speaker = "unk"
# 今の俺が展開できる絶対防御の盾を、『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』の攻撃が<b>素通り</b>し、肉体を直撃した。
line = "今の俺が展開できる絶対防御の盾を、『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』の攻撃が<b>素通り</b>し、肉体を直撃した。"

[[dialogue]]
speaker = "クロト"
# 「ぅ──ぐぶっ……！　がっ──ぶはぁッ──！！」
line = "「ぅ──ぐぶっ……！　がっ──ぶはぁッ──！！」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「あなたはお父様よりも低次元の生命体……故に干渉することはできない」
line = "「あなたはお父様よりも低次元の生命体……故に干渉することはできない」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「わかりやすく例えましょうか──あなたは、紙の上に描かれたキャラクターから、頬を撫でられたことはあるかしら？」
line = "「わかりやすく例えましょうか──あなたは、紙の上に描かれたキャラクターから、頬を撫でられたことはあるかしら？」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「そんなことはありえない。２次元に存在する線が、３次元のあなたに触れることはできない」
line = "「そんなことはありえない。２次元に存在する線が、３次元のあなたに触れることはできない」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
# 「けれど３次元存在であるあなたは、２次元存在に一方的に干渉することができるでしょう？」
line = "「けれど３次元存在であるあなたは、２次元存在に一方的に干渉することができるでしょう？」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
# 「ページを破ればいい。燃やせばいい。インクで塗りつぶすことだってできる──」
line = "「ページを破ればいい。燃やせばいい。インクで塗りつぶすことだってできる──」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
# 「お父様ははるか先……１１次元空間に存在する『神』。低次元存在には触れることすら叶わない」
line = "「お父様ははるか先……１１次元空間に存在する『神』。低次元存在には触れることすら叶わない」"

[[dialogue]]
speaker = "クロト"
# 「はぁっ……はぁっ……！！」
line = "「はぁっ……はぁっ……！！」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「──お父様。このルヴィネ、お父様の為される奇蹟を目に焼き付けます」
line = "「──お父様。このルヴィネ、お父様の為される奇蹟を目に焼き付けます」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「私だけの手で再創生を果たせなかった恥を胸に刻み、今後の糧といたしますので……どうかお見せください」
line = "「私だけの手で再創生を果たせなかった恥を胸に刻み、今後の糧といたしますので……どうかお見せください」"

