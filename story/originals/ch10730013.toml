[[dialogue]]
speaker = "unk"
# 第３話,風邪を引いた日,P
line = "第３話,風邪を引いた日,P"

[[dialogue]]
speaker = "リノ"
# 「ん、計測終わったかしら……３８度５分。立派な風邪ね」
line = "「ん、計測終わったかしら……３８度５分。立派な風邪ね」"

[[dialogue]]
speaker = "リノ"
# 「学園にはもう連絡しておいたから、今日は１日ゆっくり休みなさい。頑張りすぎて疲れちゃったのね、きっと」
line = "「学園にはもう連絡しておいたから、今日は１日ゆっくり休みなさい。頑張りすぎて疲れちゃったのね、きっと」"

[[dialogue]]
speaker = "unk"
# ……俺のＤＩＳＣは？
line = "……俺のＤＩＳＣは？"

[[dialogue]]
speaker = "リノ"
# 「それはお母さんが預かります。あなたが真面目な子じゃなかったら、取り上げたりしないんだけど……」
line = "「それはお母さんが預かります。あなたが真面目な子じゃなかったら、取り上げたりしないんだけど……」"

[[dialogue]]
speaker = "リノ"
# 「星徒会のお仕事のメッセージとか見ちゃったら、這ってでも出かけちゃうでしょ、きっと」
line = "「星徒会のお仕事のメッセージとか見ちゃったら、這ってでも出かけちゃうでしょ、きっと」"

[[dialogue]]
speaker = "リノ"
# 「お母さん命令よ。今日はしっかり休むこと。いいわね？」
line = "「お母さん命令よ。今日はしっかり休むこと。いいわね？」"

[[dialogue]]
speaker = "リノ"
# 「本当に緊急の要件だったらすぐに伝えてあげるから。今はとにかく休みなさい」
line = "「本当に緊急の要件だったらすぐに伝えてあげるから。今はとにかく休みなさい」"

[[dialogue]]
speaker = "リノ"
# 「食欲はある？　おかゆ作ったけど……フルーツやアイスの方がいいかしら？」
line = "「食欲はある？　おかゆ作ったけど……フルーツやアイスの方がいいかしら？」"

[[dialogue]]
speaker = "unk"
# ……食べるの、ちょっと無理かも
line = "……食べるの、ちょっと無理かも"

[[dialogue]]
speaker = "リノ"
# 「そっか……じゃあ薬だけでも飲みなさい。あんまりひどいようなら往診に来てもらうから」
line = "「そっか……じゃあ薬だけでも飲みなさい。あんまりひどいようなら往診に来てもらうから」"

[[dialogue]]
speaker = "リノ"
# 「お母さん、今日は隣の部屋で仕事してるから。何かあったらすぐに呼ぶのよ？」
line = "「お母さん、今日は隣の部屋で仕事してるから。何かあったらすぐに呼ぶのよ？」"

[[dialogue]]
speaker = "unk"
# ベッドに身を沈めた俺の胸中にあったのは、母さんへの感謝の気持ちと、ほんの少しの申し訳なさだった。
line = "ベッドに身を沈めた俺の胸中にあったのは、母さんへの感謝の気持ちと、ほんの少しの申し訳なさだった。"

[[dialogue]]
speaker = "unk"
# 俺が熱を出していると知った途端、仕事をすべてキャンセルし、食事と薬をてきぱきと整えてくれた母さん。
line = "俺が熱を出していると知った途端、仕事をすべてキャンセルし、食事と薬をてきぱきと整えてくれた母さん。"

[[dialogue]]
speaker = "unk"
# ……ありがたいよな
line = "……ありがたいよな"

[[dialogue]]
speaker = "unk"
# 世の中には、血の繋がった親子でも看病してもらえない子供がいる。
line = "世の中には、血の繋がった親子でも看病してもらえない子供がいる。"

[[dialogue]]
speaker = "unk"
# だとすると俺はとても恵まれている。あんなに優しい母さんがいるんだから……
line = "だとすると俺はとても恵まれている。あんなに優しい母さんがいるんだから……"

[[dialogue]]
speaker = "unk"
# 早く治さないといけないんだけど、こんなにしんどい体で、眠りにつけるだろうか……？
line = "早く治さないといけないんだけど、こんなにしんどい体で、眠りにつけるだろうか……？"

[[dialogue]]
speaker = "unk"
# 少し眠っては起きる──それを繰り返していた。朝に飲んだ薬の効き目も、あまり感じられない。
line = "少し眠っては起きる──それを繰り返していた。朝に飲んだ薬の効き目も、あまり感じられない。"

[[dialogue]]
speaker = "unk"
# …………
line = "…………"

[[dialogue]]
speaker = "unk"
# ……
line = "……"

[[dialogue]]
speaker = "unk"
# ──昼を過ぎた。けれど熱は、朝よりも上がったような気がする……
line = "──昼を過ぎた。けれど熱は、朝よりも上がったような気がする……"

[[dialogue]]
speaker = "unk"
# 息苦しい……汗が止まらない……
line = "息苦しい……汗が止まらない……"

[[dialogue]]
speaker = "unk"
# 体がだるいと不安な気持ちになってくる。小さい頃、アステラで１人ぼっちだった時のことを思い出して、不安で、怖くて──
line = "体がだるいと不安な気持ちになってくる。小さい頃、アステラで１人ぼっちだった時のことを思い出して、不安で、怖くて──"

[[dialogue]]
speaker = "リノ"
# 「大丈夫よ」
line = "「大丈夫よ」"

[[dialogue]]
speaker = "unk"
# 俺の額に、優しい手のひらが触れた気がした。
line = "俺の額に、優しい手のひらが触れた気がした。"

[[dialogue]]
speaker = "リノ"
# 「お母さんが傍にいるから、大丈夫。怖くないわ」
line = "「お母さんが傍にいるから、大丈夫。怖くないわ」"

[[dialogue]]
speaker = "unk"
# ひやりと冷たいのに、温かさに満ちた手のひらは、涙が出るくらいに優しくて。
line = "ひやりと冷たいのに、温かさに満ちた手のひらは、涙が出るくらいに優しくて。"

[[dialogue]]
speaker = "リノ"
# 「安心して、おやすみなさい。いい子、いい子……」
line = "「安心して、おやすみなさい。いい子、いい子……」"

[[dialogue]]
speaker = "unk"
# そこからの記憶はない。俺はあっという間に、深い眠りに落ちた──
line = "そこからの記憶はない。俺はあっという間に、深い眠りに落ちた──"

[[dialogue]]
speaker = "リノ"
# 「あら、目が覚めた？　その顔色だと、ご飯は食べられそうね」
line = "「あら、目が覚めた？　その顔色だと、ご飯は食べられそうね」"

[[dialogue]]
speaker = "リノ"
# 「消化に良さそうなもの、いっぱい準備してあるから。温め直そうか？」
line = "「消化に良さそうなもの、いっぱい準備してあるから。温め直そうか？」"

[[dialogue]]
speaker = "リノ"
# 「……ん？　どうしたの、クロト」
line = "「……ん？　どうしたの、クロト」"

[[dialogue]]
speaker = "unk"
# その……昼間はありがとう
line = "その……昼間はありがとう"

[[dialogue]]
speaker = "リノ"
# 「──ぷっ♪　急に何を言うかと思えば。お礼なんていらないわよ、息子の看病をしない母親がどこにいるの」
line = "「──ぷっ♪　急に何を言うかと思えば。お礼なんていらないわよ、息子の看病をしない母親がどこにいるの」"

[[dialogue]]
speaker = "リノ"
# 「それにしても……うん、ちょっとはマシになったけど」
line = "「それにしても……うん、ちょっとはマシになったけど」"

[[dialogue]]
speaker = "リノ"
# 「おでこ、まだほんのり熱いわね。これは明日になっても熱が引かないかも……」
line = "「おでこ、まだほんのり熱いわね。これは明日になっても熱が引かないかも……」"

[[dialogue]]
speaker = "リノ"
# 「──困る？　そうよね。うんうん。あなたなら絶対にそう言うと思ったわ」
line = "「──困る？　そうよね。うんうん。あなたなら絶対にそう言うと思ったわ」"

[[dialogue]]
speaker = "リノ"
# 「安心しなさい。お母さん、いいもの用意しておいたからね……！　熱を出した時はこれが一番！」
line = "「安心しなさい。お母さん、いいもの用意しておいたからね……！　熱を出した時はこれが一番！」"

[[dialogue]]
speaker = "リノ"
# 「ててーん、座薬～♪」
line = "「ててーん、座薬～♪」"

[[dialogue]]
speaker = "unk"
# ──エ！？
line = "──エ！？"

[[dialogue]]
speaker = "リノ"
# 「あなたがまだ小さかった頃、ひどい熱を出した時、座薬を入れたらすぐ熱が引いたでしょ？」
line = "「あなたがまだ小さかった頃、ひどい熱を出した時、座薬を入れたらすぐ熱が引いたでしょ？」"

[[dialogue]]
speaker = "リノ"
# 「あの時もすっごく嫌がったのよねー。お尻見せたくないって……でも効果はてきめんよ。飲み薬より絶対に効くから」
line = "「あの時もすっごく嫌がったのよねー。お尻見せたくないって……でも効果はてきめんよ。飲み薬より絶対に効くから」"

[[dialogue]]
speaker = "リノ"
# 「ふふ。昼間クロトのおでこを撫でてあげてた時に、昔のことをふっと思い出してね？　近くの薬局までダッシュしちゃったわ♪」
line = "「ふふ。昼間クロトのおでこを撫でてあげてた時に、昔のことをふっと思い出してね？　近くの薬局までダッシュしちゃったわ♪」"

[[dialogue]]
speaker = "unk"
# あの後、そんなことしてたの！？
line = "あの後、そんなことしてたの！？"

[[dialogue]]
speaker = "リノ"
# 「ふっふっふっふっふ……まっかせなさい♪　お母さん、座薬入れるのプロだから。クロトにしかしたことないけどね～<emoji=heart04>」
line = "「ふっふっふっふっふ……まっかせなさい♪　お母さん、座薬入れるのプロだから。クロトにしかしたことないけどね～<emoji=heart04>」"

[[dialogue]]
speaker = "リノ"
# 「恥ずかしがらないの！　ほーら、お尻向けなさい、お尻♪　お母さんが一発で治してあげるからね！」
line = "「恥ずかしがらないの！　ほーら、お尻向けなさい、お尻♪　お母さんが一発で治してあげるからね！」"

[[dialogue]]
speaker = "unk"
# ぎゃーーーーーっ！？
line = "ぎゃーーーーーっ！？"

[[dialogue]]
speaker = "リノ"
# 「そ～れ～っ♪」
line = "「そ～れ～っ♪」"

[[dialogue]]
speaker = "unk"
# 翌日は快晴。俺の体調は万全。座薬すごい。
line = "翌日は快晴。俺の体調は万全。座薬すごい。"

[[dialogue]]
speaker = "unk"
# けれど何だろう。体調と引き換えに、何か大事なものを失ったような気がしたのだった……
line = "けれど何だろう。体調と引き換えに、何か大事なものを失ったような気がしたのだった……"
