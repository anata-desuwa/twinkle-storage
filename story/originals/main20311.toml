[[dialogue]]
speaker = "unk"
# 第１１話,世界を見渡す視座,B
line = "第１１話,世界を見渡す視座,B"

[[dialogue]]
speaker = "unk"
# 星徒会は先日の事件の処理をしつつ、今後について改めて検討していた。
line = "星徒会は先日の事件の処理をしつつ、今後について改めて検討していた。"

[[dialogue]]
speaker = "マトイ"
# 「うーん……情報収集することに決めたのはいいけど、どうやって情報を集めればいいんだろ……？」
line = "「うーん……情報収集することに決めたのはいいけど、どうやって情報を集めればいいんだろ……？」"

[[dialogue]]
speaker = "クロト"
# 「エスメラルダ先生からは？」
line = "「エスメラルダ先生からは？」"

[[dialogue]]
speaker = "アナ"
# 「極星従騎とチナの分析が出ましたが……リクリエの瘴気は観測されず、ただのガーディアンと星騎士でした」
line = "「極星従騎とチナの分析が出ましたが……リクリエの瘴気は観測されず、ただのガーディアンと星騎士でした」"

[[dialogue]]
speaker = "unk"
# リクリエの使徒やそれに従う者ではない。チナが言っていることが裏付けされたことになる。
line = "リクリエの使徒やそれに従う者ではない。チナが言っていることが裏付けされたことになる。"

[[dialogue]]
speaker = "クロト"
# 「それにチナたちの足取りは追えず……か」
line = "「それにチナたちの足取りは追えず……か」"

[[dialogue]]
speaker = "クロト"
# 「チナはともかく、あのガーディアンたちが流星市国に姿を隠せるとは思えない。すでにデネブに戻っているのかも」
line = "「チナはともかく、あのガーディアンたちが流星市国に姿を隠せるとは思えない。すでにデネブに戻っているのかも」"

[[dialogue]]
speaker = "unk"
# チナたちはどうやって<ruby=アルタイル>この世界</ruby>に渡ってきたのか、それがわかれば何か進展があるかもしれないが……
line = "チナたちはどうやって<ruby>この世界<rt>アルタイル</rt></ruby>に渡ってきたのか、それがわかれば何か進展があるかもしれないが……"

[[dialogue]]
speaker = "サーシャ"
# 「ちなみに、<ruby=ラーゴ・シエロ>鏡界の湖</ruby>を通ってきたわけではなさそうね～。極星従騎が現れた時、ガーディアンも星騎士も確認されなかったそうよ」
line = "「ちなみに、<ruby>鏡界の湖<rt>ラーゴ・シエロ</rt></ruby>を通ってきたわけではなさそうね～。極星従騎が現れた時、ガーディアンも星騎士も確認されなかったそうよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「むむむ……じゃあどうすればいいのよ。このまま極星学園がまた襲ってくるのを待つわけにはいかないし……」
line = "「むむむ……じゃあどうすればいいのよ。このまま極星学園がまた襲ってくるのを待つわけにはいかないし……」"

[[dialogue]]
speaker = "unk"
# 手詰まりか……いや。
line = "手詰まりか……いや。"

[[dialogue]]
speaker = "クロト"
# 「ヴィーナス。セイファート前学園長が冥森林ネメシスで言っていたこと、覚えてるか？」
line = "「ヴィーナス。セイファート前学園長が冥森林ネメシスで言っていたこと、覚えてるか？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「えーと……どれのことかしら？　いろいろ言ってた気がするけど……」
line = "「えーと……どれのことかしら？　いろいろ言ってた気がするけど……」"

[[dialogue]]
speaker = "セイファート"
# 「ベガは滅んだ。デネブも秒読み。ここ、アルタイルの終焉さえ決せば、我が宿願は果たされる。邪魔立てはさせん──！」
line = "「ベガは滅んだ。デネブも秒読み。ここ、アルタイルの終焉さえ決せば、我が宿願は果たされる。邪魔立てはさせん──！」"

[[dialogue]]
speaker = "クロト"
# 「彼は、リクリエの完遂にはアルタイル・デネブ・ベガ、３つの世界の終焉が必要だと言っていた」
line = "「彼は、リクリエの完遂にはアルタイル・デネブ・ベガ、３つの世界の終焉が必要だと言っていた」"

[[dialogue]]
speaker = "クロト"
# 「アルタイルかデネブ、どちらかが滅びれば、もう片方が生き残るとチナは言った。だけど、セイファート前学園長の言葉からすれば、それは違うんじゃないか？」
line = "「アルタイルかデネブ、どちらかが滅びれば、もう片方が生き残るとチナは言った。だけど、セイファート前学園長の言葉からすれば、それは違うんじゃないか？」"

[[dialogue]]
speaker = "アナ"
# 「確かに矛盾しています。リクリエの使徒だった頃のアポロも──」
line = "「確かに矛盾しています。リクリエの使徒だった頃のアポロも──」"

[[dialogue]]
speaker = "アポロ"
# 「デネブの世界は片付いた。残るアルタイルさえ刷新できれば、今代のリクリエは完遂する」
line = "「デネブの世界は片付いた。残るアルタイルさえ刷新できれば、今代のリクリエは完遂する」"

[[dialogue]]
speaker = "unk"
# リクリエの使徒も、デネブの次はアルタイルだと言っていた。
line = "リクリエの使徒も、デネブの次はアルタイルだと言っていた。"

[[dialogue]]
speaker = "unk"
# だからチナの言葉には違和感を覚える。
line = "だからチナの言葉には違和感を覚える。"

[[dialogue]]
speaker = "アナ"
# 「極星学園の言葉を鵜呑みにはできません。さらなる調査が必要です」
line = "「極星学園の言葉を鵜呑みにはできません。さらなる調査が必要です」"

[[dialogue]]
speaker = "クロト"
# 「ああ、だから──」
line = "「ああ、だから──」"

[[dialogue]]
speaker = "クロト"
# 「フィーニスの塔に行こう」
line = "「フィーニスの塔に行こう」"

[[dialogue]]
speaker = "ヴィーナス"
# 「！　そうね、あそこなら何かわかるかもしれないわ」
line = "「！　そうね、あそこなら何かわかるかもしれないわ」"

[[dialogue]]
speaker = "unk"
# フィーニスの塔の頂はアルタイル・デネブ・ベガの３の世界を見通す視座となる。
line = "フィーニスの塔の頂はアルタイル・デネブ・ベガの３の世界を見通す視座となる。"

[[dialogue]]
speaker = "unk"
# 実際、セイファート前学園長はそこから、リクリエの使徒に変じてしまった妻の姿を見た。
line = "実際、セイファート前学園長はそこから、リクリエの使徒に変じてしまった妻の姿を見た。"

[[dialogue]]
speaker = "unk"
# あそこならデネブや極星学園のことも観測できるかもしれない。
line = "あそこならデネブや極星学園のことも観測できるかもしれない。"

[[dialogue]]
speaker = "サーシャ"
# 「異議な～し」
line = "「異議な～し」"

[[dialogue]]
speaker = "マトイ"
# 「うん、このまま何もしないよりはマシだよね」
line = "「うん、このまま何もしないよりはマシだよね」"

[[dialogue]]
speaker = "アナ"
# 「守護天使の本体が帰還してから、フィーニスの塔内部がどうなっているかも気になります」
line = "「守護天使の本体が帰還してから、フィーニスの塔内部がどうなっているかも気になります」"

[[dialogue]]
speaker = "ヴィーナス"
# 「よし、決まりね！」
line = "「よし、決まりね！」"

[[dialogue]]
speaker = "クロト"
# 「いつ極星学園が再攻撃を仕掛けてくるかわからない。速やかに行動しよう」
line = "「いつ極星学園が再攻撃を仕掛けてくるかわからない。速やかに行動しよう」"

[[dialogue]]
speaker = "unk"
# そうして星徒会でフィーニスの塔に向かったのだが……
line = "そうして星徒会でフィーニスの塔に向かったのだが……"

[[dialogue]]
speaker = "マトイ"
# 「今更だけど……フィーニスの塔って本当は入っちゃいけないんだよね？」
line = "「今更だけど……フィーニスの塔って本当は入っちゃいけないんだよね？」"

[[dialogue]]
speaker = "クロト"
# 「本当に今更だけどな……」
line = "「本当に今更だけどな……」"

[[dialogue]]
speaker = "unk"
# 本来は何人たりとも踏み入れてはならない聖域。
line = "本来は何人たりとも踏み入れてはならない聖域。"

[[dialogue]]
speaker = "unk"
# そもそも中に人が入ることを想定していないため、誰に許可を取ればいいのかも定かではない。
line = "そもそも中に人が入ることを想定していないため、誰に許可を取ればいいのかも定かではない。"

[[dialogue]]
speaker = "ヴィーナス"
# 「まぁ怒られたら怒られたでその時よ。さぁ行きましょ！」
line = "「まぁ怒られたら怒られたでその時よ。さぁ行きましょ！」"

[[dialogue]]
speaker = "unk"
# フィーニスの塔の中に入るのは、アポロとギエルとの戦い以来。
line = "フィーニスの塔の中に入るのは、アポロとギエルとの戦い以来。"

[[dialogue]]
speaker = "マトイ"
# 「今はリクリエに蝕まれてないし、敵はいないはず……だよね？」
line = "「今はリクリエに蝕まれてないし、敵はいないはず……だよね？」"

[[dialogue]]
speaker = "ガーディアン・オルサ"
# 「ゴゴゴゴゴ……」
line = "「ゴゴゴゴゴ……」"

[[dialogue]]
speaker = "マトイ"
# 「思いっきり立ちふさがってるんですけど！？」
line = "「思いっきり立ちふさがってるんですけど！？」"

[[dialogue]]
speaker = "アナ"
# 「以前マグダレナさんに聞いたところによると、今はフィーニスの塔内部の整理中なので、ガーディアンの機能も不完全だそうです」
line = "「以前マグダレナさんに聞いたところによると、今はフィーニスの塔内部の整理中なので、ガーディアンの機能も不完全だそうです」"

[[dialogue]]
speaker = "アナ"
# 「誤作動する可能性もあるので、もし遭遇した場合は戦闘しても構わないとのことでした」
line = "「誤作動する可能性もあるので、もし遭遇した場合は戦闘しても構わないとのことでした」"

[[dialogue]]
speaker = "マトイ"
# 「結局戦うんだ！？」
line = "「結局戦うんだ！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「仕方ないわね。ポンコツは叩いて直すわよ！」
line = "「仕方ないわね。ポンコツは叩いて直すわよ！」"
