[[dialogue]]
speaker = "unk"
# 第４話,セドナの柱に,P
line = "第４話,セドナの柱に,P"

[[dialogue]]
speaker = "セドナ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# 調子が優れないんですか
line = "調子が優れないんですか"

[[dialogue]]
speaker = "unk"
# セドナさん
line = "セドナさん"

[[dialogue]]
speaker = "セドナ"
# 「……貴様か。本当によく会うな。いや……最近の私がよく外に出ているだけか」
line = "「……貴様か。本当によく会うな。いや……最近の私がよく外に出ているだけか」"

[[dialogue]]
speaker = "セドナ"
# 「浮かない顔をしていた？　ふう──貴様に指摘されるようではおしまいだ。ま、ちょっとした悩みの種があってな」
line = "「浮かない顔をしていた？　ふう──貴様に指摘されるようではおしまいだ。ま、ちょっとした悩みの種があってな」"

[[dialogue]]
speaker = "セドナ"
# 「……聞いても面白い話ではないぞ。まったく……随分な物好きだな、貴様も」
line = "「……聞いても面白い話ではないぞ。まったく……随分な物好きだな、貴様も」"

[[dialogue]]
speaker = "セドナ"
# 「先ごろ──少々、部下と衝突してな。それ自体はさほど珍しい話でもないのだが……最近は、私の指導法で揉めることが多くなった」
line = "「先ごろ──少々、部下と衝突してな。それ自体はさほど珍しい話でもないのだが……最近は、私の指導法で揉めることが多くなった」"

[[dialogue]]
speaker = "セドナ"
# 「リクリエの打破──それこそが一族の宿願であり、そのためには手段も選ばない。それが私のポリシーだ」
line = "「リクリエの打破──それこそが一族の宿願であり、そのためには手段も選ばない。それが私のポリシーだ」"

[[dialogue]]
speaker = "セドナ"
# 「だが、それにしても私のやり方は厳格すぎる。時には柔軟に道を選ぶことも必要だ──と、言われてしまってな」
line = "「だが、それにしても私のやり方は厳格すぎる。時には柔軟に道を選ぶことも必要だ──と、言われてしまってな」"

[[dialogue]]
speaker = "セドナ"
# 「そしてその原因は恐らく……私たち魔女の中にも、徐々に人間界の文化が流入しつつあるからだろう」
line = "「そしてその原因は恐らく……私たち魔女の中にも、徐々に人間界の文化が流入しつつあるからだろう」"

[[dialogue]]
speaker = "unk"
# 人間界の影響？
line = "人間界の影響？"

[[dialogue]]
speaker = "セドナ"
# 「ああ。と言っても──悪い意味ではないぞ。単に、見える世界がこれまでより広がったというだけだ」
line = "「ああ。と言っても──悪い意味ではないぞ。単に、見える世界がこれまでより広がったというだけだ」"

[[dialogue]]
speaker = "セドナ"
# 「私たち魔女は全員、世界樹にて生を受ける。大半はそのまま、森で一生を過ごす」
line = "「私たち魔女は全員、世界樹にて生を受ける。大半はそのまま、森で一生を過ごす」"

[[dialogue]]
speaker = "セドナ"
# 「だが、一部の魔女はこうして人間界のネビュラへ配属される。結果……外界の文化にも触れる機会が多くなった」
line = "「だが、一部の魔女はこうして人間界のネビュラへ配属される。結果……外界の文化にも触れる機会が多くなった」"

[[dialogue]]
speaker = "セドナ"
# 「その影響は──少なからず組織にも表れているというところだ。無論、私も含めてな」
line = "「その影響は──少なからず組織にも表れているというところだ。無論、私も含めてな」"

[[dialogue]]
speaker = "セドナ"
# 「魔女は長命だ。ゆえに祖の願いを受け継いで、自らその務めを果たすことも……自然な成り行きと考える者は多い」
line = "「魔女は長命だ。ゆえに祖の願いを受け継いで、自らその務めを果たすことも……自然な成り行きと考える者は多い」"

[[dialogue]]
speaker = "セドナ"
# 「しかし、今。実際に外界を目の当たりにして──別の道を模索する者が増えてきたというのも、また事実」
line = "「しかし、今。実際に外界を目の当たりにして──別の道を模索する者が増えてきたというのも、また事実」"

[[dialogue]]
speaker = "セドナ"
# 「ゆえに思ったわけだ。見ようによっては、今の私のやり方は、少しばかり意固地なのかもしれないと」
line = "「ゆえに思ったわけだ。見ようによっては、今の私のやり方は、少しばかり意固地なのかもしれないと」"

[[dialogue]]
speaker = "セドナ"
# 「ま……そうは言っても、私とてネビュラという組織、魔女という一族の歯車にすぎない」
line = "「ま……そうは言っても、私とてネビュラという組織、魔女という一族の歯車にすぎない」"

[[dialogue]]
speaker = "セドナ"
# 「結局のところ、やり方を変える気はないんだがな。ただ、こんな姿を部下に見せるわけにはいかないから、ふらついていただけだ」
line = "「結局のところ、やり方を変える気はないんだがな。ただ、こんな姿を部下に見せるわけにはいかないから、ふらついていただけだ」"

[[dialogue]]
speaker = "unk"
# ご立派な上官だと思う
line = "ご立派な上官だと思う"

[[dialogue]]
speaker = "unk"
# セドナさんはセドナさん
line = "セドナさんはセドナさん"

[[dialogue]]
speaker = "セドナ"
# 「……ふっ。やれやれ。貴様に慰められる日が来ようとはな」
line = "「……ふっ。やれやれ。貴様に慰められる日が来ようとはな」"

[[dialogue]]
speaker = "セドナ"
# 「貴様には関係ない──どころか、不利益さえある話だというのに。世話焼きなやつだ」
line = "「貴様には関係ない──どころか、不利益さえある話だというのに。世話焼きなやつだ」"

[[dialogue]]
speaker = "セドナ"
# 「なぜか私に構うところもなんだか……よく似ている。繋がりはないはずなのにな」
line = "「なぜか私に構うところもなんだか……よく似ている。繋がりはないはずなのにな」"

[[dialogue]]
speaker = "unk"
# 誰に？
line = "誰に？"

[[dialogue]]
speaker = "unk"
# 似てる？
line = "似てる？"

[[dialogue]]
speaker = "セドナ"
# 「フ──なんでもないさ。おかげでいくらか気は紛れたよ」
line = "「フ──なんでもないさ。おかげでいくらか気は紛れたよ」"

[[dialogue]]
speaker = "セドナ"
# 「ん？　今後だと？　知らん──似たような衝突は起こりうるだろうが、やり方は変えん」
line = "「ん？　今後だと？　知らん──似たような衝突は起こりうるだろうが、やり方は変えん」"

[[dialogue]]
speaker = "セドナ"
# 「意見を真っ向から交えることも──時には必要だ。そのために、私も心持ちを確かにしておかねばならん」
line = "「意見を真っ向から交えることも──時には必要だ。そのために、私も心持ちを確かにしておかねばならん」"

[[dialogue]]
speaker = "セドナ"
# 「それじゃ私が潰れる……？　あのな。以前も言ったが、私はあくまでも一族の使命を遂行するためにある」
line = "「それじゃ私が潰れる……？　あのな。以前も言ったが、私はあくまでも一族の使命を遂行するためにある」"

[[dialogue]]
speaker = "セドナ"
# 「いくら疲れようと潰れようと、何も問題はない。『ネビュラ』がそれで立ち行くのならばな」
line = "「いくら疲れようと潰れようと、何も問題はない。『ネビュラ』がそれで立ち行くのならばな」"

[[dialogue]]
speaker = "セドナ"
# 「お節介は結構だが、それ以上の干渉は貴様の立ち場としても……」
line = "「お節介は結構だが、それ以上の干渉は貴様の立ち場としても……」"

[[dialogue]]
speaker = "unk"
# 俺がセドナさんを支える
line = "俺がセドナさんを支える"

[[dialogue]]
speaker = "セドナ"
# 「！？」
line = "「！？」"

[[dialogue]]
speaker = "セドナ"
# 「な、何を抜かしているんだ急に。よもやネビュラに入るとでもいうつもりか。そんな冗談は認めんぞ！」
line = "「な、何を抜かしているんだ急に。よもやネビュラに入るとでもいうつもりか。そんな冗談は認めんぞ！」"

[[dialogue]]
speaker = "unk"
# 個人的に
line = "個人的に"

[[dialogue]]
speaker = "unk"
# そうじゃなくて
line = "そうじゃなくて"

[[dialogue]]
speaker = "セドナ"
# 「個人的に──って……それはもう、なおさら……ああもう……！　貴様というやつは何を考えているのかわからん！」
line = "「個人的に──って……それはもう、なおさら……ああもう……！　貴様というやつは何を考えているのかわからん！」"

[[dialogue]]
speaker = "セドナ"
# 「はぐらかすな……だと？　く……ああもう、わかった。そんな真っ直ぐな目で見るな。一応──考えてはおく」
line = "「はぐらかすな……だと？　く……ああもう、わかった。そんな真っ直ぐな目で見るな。一応──考えてはおく」"

[[dialogue]]
speaker = "セドナ"
# 「まったく──貴様は……相手が誰だかわかっているのか。ネビュラの長官、泣く子も黙る焔の魔女なのだぞ」
line = "「まったく──貴様は……相手が誰だかわかっているのか。ネビュラの長官、泣く子も黙る焔の魔女なのだぞ」"

[[dialogue]]
speaker = "unk"
# セドナさんだから
line = "セドナさんだから"

[[dialogue]]
speaker = "unk"
# 同志なんでしょ
line = "同志なんでしょ"

[[dialogue]]
speaker = "セドナ"
# 「～～～っ……！　ああ言えばこう言う……！　そういう問題ではないというのに──！」
line = "「～～～っ……！　ああ言えばこう言う……！　そういう問題ではないというのに──！」"

[[dialogue]]
speaker = "セドナ"
# 「はあ……もう。まったく、貴様のせいで先の悩みなど消し飛んでしまった。また別の懊悩を抱えることになったではないか！」
line = "「はあ……もう。まったく、貴様のせいで先の悩みなど消し飛んでしまった。また別の懊悩を抱えることになったではないか！」"

[[dialogue]]
speaker = "セドナ"
# 「また今度──火鍋に付き合わせてやるから覚悟しておけよ。ハハッ、敵前逃亡など認めん！」
line = "「また今度──火鍋に付き合わせてやるから覚悟しておけよ。ハハッ、敵前逃亡など認めん！」"
