[[dialogue]]
speaker = "unk"
# 翌日。その日も、空き教室でブレスレット作りを進めていたのだが――
line = "翌日。その日も、空き教室でブレスレット作りを進めていたのだが――"

[[dialogue]]
speaker = "セシア"
# 「――クリスマスソング？」
line = "「――クリスマスソング？」"

[[dialogue]]
speaker = "ルルカ"
# 「うん、そうなんだ。実は悩んでて……」
line = "「うん、そうなんだ。実は悩んでて……」"

[[dialogue]]
speaker = "unk"
# 作業中の雑談で、ルルカが最近悩んでいることを口にした。
line = "作業中の雑談で、ルルカが最近悩んでいることを口にした。"

[[dialogue]]
speaker = "ルルカ"
# 「Ｖチューバ―として、クリスマスに新曲を配信する予定があるんだけど、今回は自分で作詞に挑戦しようと思ってるんだ」
line = "「Ｖチューバ―として、クリスマスに新曲を配信する予定があるんだけど、今回は自分で作詞に挑戦しようと思ってるんだ」"

[[dialogue]]
speaker = "フェニエル"
# 「自分で作詞を？　それはすごいですねっ」
line = "「自分で作詞を？　それはすごいですねっ」"

[[dialogue]]
speaker = "ルルカ"
# 「あはは、上手く行けばねぇ～……」
line = "「あはは、上手く行けばねぇ～……」"

[[dialogue]]
speaker = "ルルカ"
# 「曲の方はもうプロの作曲家さんに作って貰ってて、既に完成してるんだ。でも、作詞の方は上手く行ってなくて……」
line = "「曲の方はもうプロの作曲家さんに作って貰ってて、既に完成してるんだ。でも、作詞の方は上手く行ってなくて……」"

[[dialogue]]
speaker = "ルルカ"
# 「クリスマスまで時間も近づいて来てるし、どうしたもんかなって……」
line = "「クリスマスまで時間も近づいて来てるし、どうしたもんかなって……」"

[[dialogue]]
speaker = "unk"
# どんな曲なんだ？
line = "どんな曲なんだ？"

[[dialogue]]
speaker = "ルルカ"
# 「えっとね、クリスマスといえばってことで、恋人とのラブソングにしてみたんだ！」
line = "「えっとね、クリスマスといえばってことで、恋人とのラブソングにしてみたんだ！」"

[[dialogue]]
speaker = "フェニエル"
# 「ら、ラブソングですか？」
line = "「ら、ラブソングですか？」"

[[dialogue]]
speaker = "ルルカ"
# 「うん。あたしのお母さんが昔、アイドルをしてた頃の有名な曲で、クリスマスのラブソングがあるの。それを目指して、作ろうとしてるんだけど……」
line = "「うん。あたしのお母さんが昔、アイドルをしてた頃の有名な曲で、クリスマスのラブソングがあるの。それを目指して、作ろうとしてるんだけど……」"

[[dialogue]]
speaker = "フェニエル"
# 「え？　ルルカちゃんのお母さんって、アイドルをやっていたんですか……！？」
line = "「え？　ルルカちゃんのお母さんって、アイドルをやっていたんですか……！？」"

[[dialogue]]
speaker = "ルルカ"
# 「うん、そうなの！　あたしのお母さん、昔、『<ruby=しおなぎ>汐凪</ruby>シャルル』って芸名で活動してたんだ。魔界出身のアイドルってことで注目を浴びて、当時は結構有名な――」
line = "「うん、そうなの！　あたしのお母さん、昔、『<ruby>汐凪<rt>しおなぎ</rt></ruby>シャルル』って芸名で活動してたんだ。魔界出身のアイドルってことで注目を浴びて、当時は結構有名な――」"

[[dialogue]]
speaker = "フェニエル"
# 「汐凪シャルル！？　それって、歴代ヒットチャートの話では必ず名前が上がる、とっても有名なアイドルじゃないですか……！」
line = "「汐凪シャルル！？　それって、歴代ヒットチャートの話では必ず名前が上がる、とっても有名なアイドルじゃないですか……！」"

[[dialogue]]
speaker = "ルルカ"
# 「え、えへへ♪　友達の口から、お母さんがそんな風に言われてるのを聞くと、やっぱ照れ臭くなっちゃうね……♪」
line = "「え、えへへ♪　友達の口から、お母さんがそんな風に言われてるのを聞くと、やっぱ照れ臭くなっちゃうね……♪」"

[[dialogue]]
speaker = "セシア"
# 「ルルカのママ、そんなに有名なヒトだったのね。わたくし、興味が湧いてきたわ。今度是非、会ってみたいわ」
line = "「ルルカのママ、そんなに有名なヒトだったのね。わたくし、興味が湧いてきたわ。今度是非、会ってみたいわ」"

[[dialogue]]
speaker = "ルルカ"
# 「うん、全然いいよ～♪　あたし、流星市国の実家暮らしだから、なんなら今日の帰りとか寄ってく？　お母さんにも、お兄ちゃんや２人の話はしてるから、喜ぶと思うし」
line = "「うん、全然いいよ～♪　あたし、流星市国の実家暮らしだから、なんなら今日の帰りとか寄ってく？　お母さんにも、お兄ちゃんや２人の話はしてるから、喜ぶと思うし」"

[[dialogue]]
speaker = "セシア"
# 「今日の帰りにも、新しいママに会える！？」
line = "「今日の帰りにも、新しいママに会える！？」"

[[dialogue]]
speaker = "セシア"
# 「そういうことなら、居ても立ってもいられないわ！　今すぐ行きましょう！　そうしましょう！」
line = "「そういうことなら、居ても立ってもいられないわ！　今すぐ行きましょう！　そうしましょう！」"

[[dialogue]]
speaker = "unk"
# ちょっ、早い早い！
作業が終わるまで我慢して！
line = "ちょっ、早い早い！\n作業が終わるまで我慢して！"

[[dialogue]]
speaker = "セシア"
# 「何を言ってるの、会長！　そんな魅惑のママの話を聞いて、別のことに集中するなんて失礼はできないわ！」
line = "「何を言ってるの、会長！　そんな魅惑のママの話を聞いて、別のことに集中するなんて失礼はできないわ！」"

[[dialogue]]
speaker = "セシア"
# 「手作りプレゼントも、ちゃんとメリークリスマスの気持ちを込めなければいけないの。煩悩を貯め込んだままではいけないわ」
line = "「手作りプレゼントも、ちゃんとメリークリスマスの気持ちを込めなければいけないの。煩悩を貯め込んだままではいけないわ」"

[[dialogue]]
speaker = "セシア"
# 「だったら、新しいママに会って思う存分甘えた後、翌日集中する方が効率的というものよ！」
line = "「だったら、新しいママに会って思う存分甘えた後、翌日集中する方が効率的というものよ！」"

[[dialogue]]
speaker = "unk"
# 相変わらず、清々しいほどに煩悩が駄々洩れだ……！
line = "相変わらず、清々しいほどに煩悩が駄々洩れだ……！"

[[dialogue]]
speaker = "unk"
# その後、結局作業を早めに切り上げることとなり、俺たちはルルカの自宅へお邪魔することになった。
line = "その後、結局作業を早めに切り上げることとなり、俺たちはルルカの自宅へお邪魔することになった。"

[[dialogue]]
speaker = "フェニエル"
# 「そう言えば、ご実家は流星市国なんですね。シャルルさんは引退する時、魔界の地元に帰ったと報道されてましたが……」
line = "「そう言えば、ご実家は流星市国なんですね。シャルルさんは引退する時、魔界の地元に帰ったと報道されてましたが……」"

[[dialogue]]
speaker = "ルルカ"
# 「あはは……。あたしもお母さんと同じ地元の生まれなんだけど、留学が決まった時に『だったら家族みんなで人間界に行こう！』って話になっちゃって」
line = "「あはは……。あたしもお母さんと同じ地元の生まれなんだけど、留学が決まった時に『だったら家族みんなで人間界に行こう！』って話になっちゃって」"

[[dialogue]]
speaker = "フェニエル"
# 「ふふっ♪　家族仲がいいんですね。素敵なことだと思います」
line = "「ふふっ♪　家族仲がいいんですね。素敵なことだと思います」"

[[dialogue]]
speaker = "unk"
# そんな海野辺家の事情を聞かせてもらっているうちに、ルルカの家に到着するのだった。
line = "そんな海野辺家の事情を聞かせてもらっているうちに、ルルカの家に到着するのだった。"

[[dialogue]]
speaker = "ルルカ"
# 「お母さん、ただいま～！　ＤＩＳＣのチャットで送った通り、３人を連れて来たよ～」
line = "「お母さん、ただいま～！　ＤＩＳＣのチャットで送った通り、３人を連れて来たよ～」"

[[dialogue]]
speaker = "ルルカ母"
# 「は～い♪　会長くん、セッシーちゃん、フニちゃん、いらっしゃ～い♪」
line = "「は～い♪　会長くん、セッシーちゃん、フニちゃん、いらっしゃ～い♪」"

[[dialogue]]
speaker = "フェニエル"
# 「な、なまらすごい……！　本物の、汐凪シャルルさんです！　昔と全然容姿が変わってなくて、すごく綺麗……！」
line = "「な、なまらすごい……！　本物の、汐凪シャルルさんです！　昔と全然容姿が変わってなくて、すごく綺麗……！」"

[[dialogue]]
speaker = "ルルカ母"
# 「ふふっ、あなたがフニちゃんね？　ありがと～♪　噂の元アイドルなルルカちゃんのママ、『海野辺シャルル』で～す♪　ぶいぶいっ☆」
line = "「ふふっ、あなたがフニちゃんね？　ありがと～♪　噂の元アイドルなルルカちゃんのママ、『海野辺シャルル』で～す♪　ぶいぶいっ☆」"

[[dialogue]]
speaker = "ルルカ母"
# 「それで、あなたがセッシーちゃんかしら？」
line = "「それで、あなたがセッシーちゃんかしら？」"

[[dialogue]]
speaker = "セシア"
# 「……マ」
line = "「……マ」"

[[dialogue]]
speaker = "ルルカ母"
# 「うん？」
line = "「うん？」"

[[dialogue]]
speaker = "セシア"
# 「ママぁぁぁーーーーーーーーーっ<emoji=heart04><emoji=heart04><emoji=heart04>」
line = "「ママぁぁぁーーーーーーーーーっ<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ母"
# 「あらあら♪　は～い<emoji=heart04>　ママですよ～♪」
line = "「あらあら♪　は～い<emoji=heart04>　ママですよ～♪」"

[[dialogue]]
speaker = "unk"
# どうやら見事にクリティカルヒットしたらしいセシアは、その後、思う存分ルルカのお母さんに甘えるのであった――
line = "どうやら見事にクリティカルヒットしたらしいセシアは、その後、思う存分ルルカのお母さんに甘えるのであった――"
