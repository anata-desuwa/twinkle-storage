[[dialogue]]
speaker = "unk"
# そんなこんなで、正式に転入することになったジャクリーヌ。
line = "そんなこんなで、正式に転入することになったジャクリーヌ。"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「余は、ジャクリーヌ・オー・ランタン♪　ジャック・オー・ランタンの娘なの♪」
line = "「余は、ジャクリーヌ・オー・ランタン♪　ジャック・オー・ランタンの娘なの♪」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「好きなものはお菓子とオシャレなの♪　覚えておくゆ♪」
line = "「好きなものはお菓子とオシャレなの♪　覚えておくゆ♪」"

[[dialogue]]
speaker = "unk"
# １年生の教室で、元気に自己紹介していたのが印象的だった。
line = "１年生の教室で、元気に自己紹介していたのが印象的だった。"

[[dialogue]]
speaker = "unk"
# そんなジャクリーヌに、「それにしてもあっさり決めてしまったが、親御さんに相談とかしなくて良かったのか？」と聞いてみる。
line = "そんなジャクリーヌに、「それにしてもあっさり決めてしまったが、親御さんに相談とかしなくて良かったのか？」と聞いてみる。"

[[dialogue]]
speaker = "ヒトリ"
# 「わ、わたしも気になってました……お父さんのジャックさんに言わなくても大丈夫なのかなって……」
line = "「わ、わたしも気になってました……お父さんのジャックさんに言わなくても大丈夫なのかなって……」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「それは全然大丈夫なの！」
line = "「それは全然大丈夫なの！」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「そもそもハロウィンゲートは１年に１回、ハロウィンの日にしか繋がらないことになってるゆ」
line = "「そもそもハロウィンゲートは１年に１回、ハロウィンの日にしか繋がらないことになってるゆ」"

[[dialogue]]
speaker = "ヒトリ"
# 「ええ！？」
line = "「ええ！？」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「余の家は幽霊たちがいっぱい住んでる特殊な場所にあるから、人間界どころか魔界を飛んでっても、普通の方法じゃ辿り着けないゆ」
line = "「余の家は幽霊たちがいっぱい住んでる特殊な場所にあるから、人間界どころか魔界を飛んでっても、普通の方法じゃ辿り着けないゆ」"

[[dialogue]]
speaker = "ヒトリ"
# 「それじゃあ、つまり……」
line = "「それじゃあ、つまり……」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ヒトリが思ってる通りゆ！」
line = "「ヒトリが思ってる通りゆ！」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ハロウィンの日はとっくに過ぎてるし、それを逃した時点で最低でも１年は家には帰れないの」
line = "「ハロウィンの日はとっくに過ぎてるし、それを逃した時点で最低でも１年は家には帰れないの」"

[[dialogue]]
speaker = "ヒトリ"
# 「さ、寂しくないの？　ジャックさんとか心配しない？」
line = "「さ、寂しくないの？　ジャックさんとか心配しない？」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「可愛い子には旅をさせろって言うゆ！」
line = "「可愛い子には旅をさせろって言うゆ！」"

[[dialogue]]
speaker = "unk"
# 答えになってないような……
line = "答えになってないような……"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゲートが閉まると帰れないことは、こっちに来るときにパパからも言われて知ってたから、全然気にしてないのー！」
line = "「ゲートが閉まると帰れないことは、こっちに来るときにパパからも言われて知ってたから、全然気にしてないのー！」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「そんなことよりも、人間界にはクリスマス？　とかバレンタイン？　とかがあるって聞いたゆ！」
line = "「そんなことよりも、人間界にはクリスマス？　とかバレンタイン？　とかがあるって聞いたゆ！」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ハロウィンの他にも美味しいお菓子のイベントがいーっぱいあるって聞いたから、今はそっちに興味津々なの～♪　むしろ帰りたくない気分だゆ！」
line = "「ハロウィンの他にも美味しいお菓子のイベントがいーっぱいあるって聞いたから、今はそっちに興味津々なの～♪　むしろ帰りたくない気分だゆ！」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ヘレナがリクリエ？　とか言ってたけど、それが何なのかはよく知らないし興味ないけど、お菓子さえくれるなら一緒に戦ってやるの！」
line = "「ヘレナがリクリエ？　とか言ってたけど、それが何なのかはよく知らないし興味ないけど、お菓子さえくれるなら一緒に戦ってやるの！」"

[[dialogue]]
speaker = "ヒトリ"
# 「ジャクリーヌさんがそれでいいなら……会長さんはどう思います？」
line = "「ジャクリーヌさんがそれでいいなら……会長さんはどう思います？」"

[[dialogue]]
speaker = "unk"
# ジャクリーヌがいいならいいんじゃないか？
line = "ジャクリーヌがいいならいいんじゃないか？"

[[dialogue]]
speaker = "ゆーちゃん"
# 「ゆー！」
line = "「ゆー！」"

[[dialogue]]
speaker = "ヒトリ"
# 「ゆーちゃんもそう言うなら……」
line = "「ゆーちゃんもそう言うなら……」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「そうだ！　大事なこと思い出したゆ！」
line = "「そうだ！　大事なこと思い出したゆ！」"

[[dialogue]]
speaker = "ヒトリ"
# 「どうしたんですか？」
line = "「どうしたんですか？」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ここに来る前に、サランから友達の名前に『さん』は付けないって聞いたゆ！」
line = "「ここに来る前に、サランから友達の名前に『さん』は付けないって聞いたゆ！」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「だからヒトリも、余のことは呼び捨てにするの！」
line = "「だからヒトリも、余のことは呼び捨てにするの！」"

[[dialogue]]
speaker = "ヒトリ"
# 「え、ええ！？　そ、そそそ、そんな急に言われても、心の準備が……！」
line = "「え、ええ！？　そ、そそそ、そんな急に言われても、心の準備が……！」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「パパも会長も、『ジャクリーヌ』って呼ぶの！　ヒトリも同じにするゆ！」
line = "「パパも会長も、『ジャクリーヌ』って呼ぶの！　ヒトリも同じにするゆ！」"

[[dialogue]]
speaker = "ヒトリ"
# 「い、いいい、いくら友達になったからといって……いきなり呼び捨てはちょっとハードルが……！」
line = "「い、いいい、いくら友達になったからといって……いきなり呼び捨てはちょっとハードルが……！」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「じゃあ、ヒトリの呼びやすいのでいいゆ！」
line = "「じゃあ、ヒトリの呼びやすいのでいいゆ！」"

[[dialogue]]
speaker = "unk"
# しばしヒトリは考え込んだ後――
line = "しばしヒトリは考え込んだ後――"

[[dialogue]]
speaker = "ヒトリ"
# 「じ、じゃあ……『ジャクリーヌちゃん』でどうでしょうか……？」
line = "「じ、じゃあ……『ジャクリーヌちゃん』でどうでしょうか……？」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「いいゆ♪　ゆーっゆっゆっゆ♪　これで本当の友達になれた気がして、余もうれしいの～♪」
line = "「いいゆ♪　ゆーっゆっゆっゆ♪　これで本当の友達になれた気がして、余もうれしいの～♪」"

[[dialogue]]
speaker = "ヒトリ"
# 「よ、良かったです……改めてよろしくお願いします、ジャクリーヌちゃん♪」
line = "「よ、良かったです……改めてよろしくお願いします、ジャクリーヌちゃん♪」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「こちらこそ、ヒトリ♪」
line = "「こちらこそ、ヒトリ♪」"

[[dialogue]]
speaker = "ヒトリ"
# 「あははっ、ジャクリーヌちゃん、苦しいです……っ♪」
line = "「あははっ、ジャクリーヌちゃん、苦しいです……っ♪」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ぎゅ～～～～なの♪」
line = "「ぎゅ～～～～なの♪」"

[[dialogue]]
speaker = "unk"
# そうして、ハロウィンの化身である幽霊の女の子・ジャクリーヌが俺たちの新しい仲間に加わったのだった。
line = "そうして、ハロウィンの化身である幽霊の女の子・ジャクリーヌが俺たちの新しい仲間に加わったのだった。"
