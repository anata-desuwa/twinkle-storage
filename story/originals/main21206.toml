[[dialogue]]
speaker = "unk"
# 第６話,ニュクス流星群,B
line = "第６話,ニュクス流星群,B"

[[dialogue]]
speaker = "unk"
# 香堂チナは流星市国で生まれ、星騎士として活躍していた両親の元に生まれた。
line = "香堂チナは流星市国で生まれ、星騎士として活躍していた両親の元に生まれた。"

[[dialogue]]
speaker = "unk"
# そんな出自だからだろう、いずれ自分も星力を発現し、両親のように人々のために戦うのだろうと、未来に憧れと期待を持つ少女として育った。
line = "そんな出自だからだろう、いずれ自分も星力を発現し、両親のように人々のために戦うのだろうと、未来に憧れと期待を持つ少女として育った。"

[[dialogue]]
speaker = "unk"
# 父親は成年を迎えてからも、星力の衰えが遅い珍しい体質で、毎日アステラ対処に出撃をしていた。
line = "父親は成年を迎えてからも、星力の衰えが遅い珍しい体質で、毎日アステラ対処に出撃をしていた。"

[[dialogue]]
speaker = "unk"
# 母親は星力研究機関『ヘキサグラム』で日夜、星力研究を行う敏腕の研究者──そのためチナは、１人さみしい夕食を取ることも多かった。
line = "母親は星力研究機関『ヘキサグラム』で日夜、星力研究を行う敏腕の研究者──そのためチナは、１人さみしい夕食を取ることも多かった。"

[[dialogue]]
speaker = "unk"
# しかし世界を守るために働く両親は、彼女にとって強い憧れであり、誇りでもあった。
line = "しかし世界を守るために働く両親は、彼女にとって強い憧れであり、誇りでもあった。"

[[dialogue]]
speaker = "unk"
# 敬愛する両親がたゆまぬ努力を続けている──だから世界が守られないだなんて、あり得ない。
line = "敬愛する両親がたゆまぬ努力を続けている──だから世界が守られないだなんて、あり得ない。"

[[dialogue]]
speaker = "unk"
# 世界が破滅の一歩前まで進んでしまうだなんて、当時の香堂チナは少しも考えていなかった。
line = "世界が破滅の一歩前まで進んでしまうだなんて、当時の香堂チナは少しも考えていなかった。"

[[dialogue]]
speaker = "unk"
# そんな子供の甘い考えは、すぐに<ruby=くつがえ>覆</ruby>されることとなった。
line = "そんな子供の甘い考えは、すぐに<ruby>覆<rt>くつがえ</rt></ruby>されることとなった。"

[[dialogue]]
speaker = "unk"
# ある日、天界の聖庭園が陥落したという速報が人間界に広がった。
line = "ある日、天界の聖庭園が陥落したという速報が人間界に広がった。"

[[dialogue]]
speaker = "unk"
# さらに信じられないことに、それを成したのはたった１人。仮面を被った謎の女が、１人で聖庭園を破壊したと。
line = "さらに信じられないことに、それを成したのはたった１人。仮面を被った謎の女が、１人で聖庭園を破壊したと。"

[[dialogue]]
speaker = "unk"
# 本当のことなのか。デマではないのか──人々は、その悲報が誤りであることを祈った。
line = "本当のことなのか。デマではないのか──人々は、その悲報が誤りであることを祈った。"

[[dialogue]]
speaker = "unk"
# だが時を待たずに、今度は魔界の頽廃都市キュリオスが、跡形もなく消滅したという報せが駆け巡った。
line = "だが時を待たずに、今度は魔界の頽廃都市キュリオスが、跡形もなく消滅したという報せが駆け巡った。"

[[dialogue]]
speaker = "unk"
# 当時、魔界防衛のために人間界からは複数の星騎士が派遣されていたが、彼らは魔界に渡った後に消息を絶った──全員が殺害されたのだ。
line = "当時、魔界防衛のために人間界からは複数の星騎士が派遣されていたが、彼らは魔界に渡った後に消息を絶った──全員が殺害されたのだ。"

[[dialogue]]
speaker = "unk"
# そして……『仮面の女』は、人間界へとその姿を現した。
line = "そして……『仮面の女』は、人間界へとその姿を現した。"

[[dialogue]]
speaker = "unk"
# 人間界に、自らの頭上に──彗星の雨が降り注いだ。
line = "人間界に、自らの頭上に──彗星の雨が降り注いだ。"

[[dialogue]]
speaker = "unk"
# 教科書で見た。３０００年前に起きた、世界の滅亡が間近であることを報せるセレーネ流星群……それに比するものが、現れてしまった。
line = "教科書で見た。３０００年前に起きた、世界の滅亡が間近であることを報せるセレーネ流星群……それに比するものが、現れてしまった。"

[[dialogue]]
speaker = "流星市国民"
# 「う、うぁぁああぁぁあああぁあっ──！！」
line = "「う、うぁぁああぁぁあああぁあっ──！！」"

[[dialogue]]
speaker = "流星市国民"
# 「逃げろ！　逃げろぉおおおっ！」
line = "「逃げろ！　逃げろぉおおおっ！」"

[[dialogue]]
speaker = "流星市国民"
# 「『仮面の女』だ！！　殺されるっ！　みんな殺されるっ──！！」
line = "「『仮面の女』だ！！　殺されるっ！　みんな殺されるっ──！！」"

[[dialogue]]
speaker = "unk"
# チナは今までも、モンスターに襲われそうになったことはあった。けれどそのたび、星騎士が救ってくれていた。
line = "チナは今までも、モンスターに襲われそうになったことはあった。けれどそのたび、星騎士が救ってくれていた。"

[[dialogue]]
speaker = "unk"
# 星の輝きに守られた騎士たちが敵わない相手なんて、いなかったのに。
line = "星の輝きに守られた騎士たちが敵わない相手なんて、いなかったのに。"

[[dialogue]]
speaker = "unk"
# ──チナは懸命に逃げた。
line = "──チナは懸命に逃げた。"

[[dialogue]]
speaker = "unk"
# 何かあった時はここに行け、と両親から指示されていた記憶を頼りに、流星市国が用意していたシェルターの１つに飛び込んだ。
line = "何かあった時はここに行け、と両親から指示されていた記憶を頼りに、流星市国が用意していたシェルターの１つに飛び込んだ。"

[[dialogue]]
speaker = "チナ"
# 「おとうさん……おかあさん……！」
line = "「おとうさん……おかあさん……！」"

[[dialogue]]
speaker = "unk"
# 暗闇の中、チナはＤＩＳＣを握りしめた。画面に映る両親と自分の、３人の記念写真をぎゅうっと強く握って、祈った。
line = "暗闇の中、チナはＤＩＳＣを握りしめた。画面に映る両親と自分の、３人の記念写真をぎゅうっと強く握って、祈った。"

[[dialogue]]
speaker = "チナ"
# 「あ──」
line = "「あ──」"

[[dialogue]]
speaker = "unk"
# 持っていたＤＩＳＣに両親からメッセージが入った。
line = "持っていたＤＩＳＣに両親からメッセージが入った。"

[[dialogue]]
speaker = "unk"
# 『決してそこから出るな』と父。
line = "『決してそこから出るな』と父。"

[[dialogue]]
speaker = "unk"
# 『迎えに行くから待っていなさい』と母。
line = "『迎えに行くから待っていなさい』と母。"

[[dialogue]]
speaker = "unk"
# 娘の身を案じるにはあまりに淡白すぎる文章に、チナはどれほど状況が悪いのかを理解した。
line = "娘の身を案じるにはあまりに淡白すぎる文章に、チナはどれほど状況が悪いのかを理解した。"

[[dialogue]]
speaker = "unk"
# 何度メッセージを送っても、それ以降、両親からの返信はなかった。
line = "何度メッセージを送っても、それ以降、両親からの返信はなかった。"

[[dialogue]]
speaker = "unk"
# ………………
line = "………………"

[[dialogue]]
speaker = "unk"
# …………
line = "…………"

[[dialogue]]
speaker = "unk"
# ……
line = "……"

[[dialogue]]
speaker = "unk"
# それから幾日かが経った。
line = "それから幾日かが経った。"

[[dialogue]]
speaker = "unk"
# シェルターに備え付けられた連絡機からは、戦報が次々に飛び込んでくる。
line = "シェルターに備え付けられた連絡機からは、戦報が次々に飛び込んでくる。"

[[dialogue]]
speaker = "unk"
# 星騎士の誰それが死んだ、どこそこのシェルターが見つかって破壊された、他国の救援は絶望的、流星市国に出現するアステラの総数は平常時の２３倍──
line = "星騎士の誰それが死んだ、どこそこのシェルターが見つかって破壊された、他国の救援は絶望的、流星市国に出現するアステラの総数は平常時の２３倍──"

[[dialogue]]
speaker = "unk"
# 聞きたくないのに、聞かないわけにはいかなかった。
line = "聞きたくないのに、聞かないわけにはいかなかった。"

[[dialogue]]
speaker = "unk"
# 聞くたびに全身が震えて、叫びたいほどの恐怖が襲う、けれど声も出せない。どこかから聞きつけて、仮面の女が現れるかもしれない──
line = "聞くたびに全身が震えて、叫びたいほどの恐怖が襲う、けれど声も出せない。どこかから聞きつけて、仮面の女が現れるかもしれない──"

[[dialogue]]
speaker = "チナ"
# 「死なないで……おとうさん……おかあさん……おねがい、おねがい……」
line = "「死なないで……おとうさん……おかあさん……おねがい、おねがい……」"

[[dialogue]]
speaker = "unk"
# 爪が真っ白になるぐらい、ＤＩＳＣを強く握る。チナは熱心な流星教の信者だった。
line = "爪が真っ白になるぐらい、ＤＩＳＣを強く握る。チナは熱心な流星教の信者だった。"

[[dialogue]]
speaker = "unk"
# 愛しい人の無事を、女神様に祈る作法はよく知っていた。心からの祈りを、不眠不休で捧げ続けた。
line = "愛しい人の無事を、女神様に祈る作法はよく知っていた。心からの祈りを、不眠不休で捧げ続けた。"

[[dialogue]]
speaker = "unk"
# そして──
line = "そして──"

[[dialogue]]
speaker = "チナ"
# 「──きゃあぁぁあぁああああっ！？！？」
line = "「──きゃあぁぁあぁああああっ！？！？」"

[[dialogue]]
speaker = "unk"
# 天地がひっくり返るような爆音と衝撃がシェルターを襲った。
line = "天地がひっくり返るような爆音と衝撃がシェルターを襲った。"

[[dialogue]]
speaker = "unk"
# とうとうバレた──仮面の女が来る、血にまみれた戦斧を持って、シェルターをこじ開けてくる！！
line = "とうとうバレた──仮面の女が来る、血にまみれた戦斧を持って、シェルターをこじ開けてくる！！"

[[dialogue]]
speaker = "unk"
# 心臓が壊れるほどに早鐘を打つ。
line = "心臓が壊れるほどに早鐘を打つ。"

[[dialogue]]
speaker = "unk"
# 恐怖に震えるチナだったが──
line = "恐怖に震えるチナだったが──"

[[dialogue]]
speaker = "チナ"
# 「あ……ぅ……？」
line = "「あ……ぅ……？」"

[[dialogue]]
speaker = "unk"
# その大きな、あまりに大きな爆発の衝撃の後は──水を打ったような、静かすぎてうるさいほどの静寂が、シェルターに満たされたのだった。
line = "その大きな、あまりに大きな爆発の衝撃の後は──水を打ったような、静かすぎてうるさいほどの静寂が、シェルターに満たされたのだった。"

[[dialogue]]
speaker = "unk"
# ………………
line = "………………"

[[dialogue]]
speaker = "unk"
# …………
line = "…………"

[[dialogue]]
speaker = "unk"
# ……
line = "……"

[[dialogue]]
speaker = "unk"
# それからまた丸１日。いや──２日だろうか？
line = "それからまた丸１日。いや──２日だろうか？"

[[dialogue]]
speaker = "unk"
# チナは身を丸めて、助けを待っていた。毎日うるさいほどに届いていた通信も今は鳴りを潜めている。
line = "チナは身を丸めて、助けを待っていた。毎日うるさいほどに届いていた通信も今は鳴りを潜めている。"

[[dialogue]]
speaker = "流星市国民"
# 「外に、出てみないか……？」
line = "「外に、出てみないか……？」"

[[dialogue]]
speaker = "unk"
# 誰かがそう言った。同意する者がいた。拒否する者もいた。
line = "誰かがそう言った。同意する者がいた。拒否する者もいた。"

[[dialogue]]
speaker = "unk"
# チナは『決して外に出るな』『迎えに行く』という両親の言付けを守るため、そこに残ることを選んだ。
line = "チナは『決して外に出るな』『迎えに行く』という両親の言付けを守るため、そこに残ることを選んだ。"

[[dialogue]]
speaker = "unk"
# ──否。
line = "──否。"

[[dialogue]]
speaker = "unk"
# 選びたかった──
line = "選びたかった──"

[[dialogue]]
speaker = "モンスター"
# 「グルルルゥウ──！！」
line = "「グルルルゥウ──！！」"

[[dialogue]]
speaker = "流星市国民"
# 「──ぎゃぁぁあああああっ！？」
line = "「──ぎゃぁぁあああああっ！？」"

[[dialogue]]
speaker = "unk"
# 外の様子を見ようと扉を開けた市民が、モンスターの鋭利な爪で引き裂かれた。
line = "外の様子を見ようと扉を開けた市民が、モンスターの鋭利な爪で引き裂かれた。"

[[dialogue]]
speaker = "unk"
# モンスターが、シェルターの中に入ってこようとしている！！
line = "モンスターが、シェルターの中に入ってこようとしている！！"

[[dialogue]]
speaker = "unk"
# パニックになり、逃げ惑う人々の波に揉まれた。大人に踏みつけられ、老人に突き飛ばされ、見知らぬ女性に庇われて──
line = "パニックになり、逃げ惑う人々の波に揉まれた。大人に踏みつけられ、老人に突き飛ばされ、見知らぬ女性に庇われて──"

[[dialogue]]
speaker = "unk"
# チナは転がるようにして、幸運にもシェルターから這い出ることができたのだが──
line = "チナは転がるようにして、幸運にもシェルターから這い出ることができたのだが──"

[[dialogue]]
speaker = "チナ"
# 「空が……戻ってる……！？」
line = "「空が……戻ってる……！？」"

[[dialogue]]
speaker = "unk"
# あの恐ろしくも美しい、彗星の雨はどこかに消えていた──しかし、見慣れた街並みはどこにもなかった。
line = "あの恐ろしくも美しい、彗星の雨はどこかに消えていた──しかし、見慣れた街並みはどこにもなかった。"

[[dialogue]]
speaker = "unk"
# 建物は崩れ、地面はえぐれている。チナが大好きだった肉まんを売るお店があった場所には、何もなかった。教科書で見た、空爆の後の街並みのよう。
line = "建物は崩れ、地面はえぐれている。チナが大好きだった肉まんを売るお店があった場所には、何もなかった。教科書で見た、空爆の後の街並みのよう。"

[[dialogue]]
speaker = "unk"
# ここが、流星市国……？
line = "ここが、流星市国……？"

[[dialogue]]
speaker = "unk"
# しかも──
line = "しかも──"

[[dialogue]]
speaker = "モンスター"
# 「──シャァァアァッ！」
line = "「──シャァァアァッ！」"

[[dialogue]]
speaker = "モンスター"
# 「イイィィィイイ──！！」
line = "「イイィィィイイ──！！」"

[[dialogue]]
speaker = "unk"
# モンスターが街にあふれている。そこかしこで誰かが襲われている。
line = "モンスターが街にあふれている。そこかしこで誰かが襲われている。"

[[dialogue]]
speaker = "unk"
# そして何より、星騎士がいない。１人もいない。本当にどこにも──いない！！
line = "そして何より、星騎士がいない。１人もいない。本当にどこにも──いない！！"

[[dialogue]]
speaker = "unk"
# いつだってあの人達は、すごいスピードで飛んで来てくれるのに。
line = "いつだってあの人達は、すごいスピードで飛んで来てくれるのに。"

[[dialogue]]
speaker = "unk"
# モンスターが現れたらアラートが即座に鳴り響き、ヒーローのように駆けつけてくれるのに──
line = "モンスターが現れたらアラートが即座に鳴り響き、ヒーローのように駆けつけてくれるのに──"

[[dialogue]]
speaker = "unk"
# ここにいるのは、戦う力のない一般市民と、その天敵であるモンスターだけ。右を見ても、左を見ても、あるのは一方的な殺戮だけ。
line = "ここにいるのは、戦う力のない一般市民と、その天敵であるモンスターだけ。右を見ても、左を見ても、あるのは一方的な殺戮だけ。"

[[dialogue]]
speaker = "チナ"
# 「おとうさんっ！　おかあさんっ！　どこっ！　たすけて……！　たすけてっ！！」
line = "「おとうさんっ！　おかあさんっ！　どこっ！　たすけて……！　たすけてっ！！」"

[[dialogue]]
speaker = "unk"
# どれだけ叫んでも泣きすがっても、助けに来てくれる人は１人もいない。
line = "どれだけ叫んでも泣きすがっても、助けに来てくれる人は１人もいない。"

[[dialogue]]
speaker = "チナ"
# 「うぁっ──！？」
line = "「うぁっ──！？」"

[[dialogue]]
speaker = "モンスター"
# 「ガァァアアァアアッ──！！」
line = "「ガァァアアァアアッ──！！」"

[[dialogue]]
speaker = "unk"
# 目の前にモンスターが立ちふさがった。チナの数倍も大きな怪物が、鋭い爪を振り上げ、叩きつけようとしている。
line = "目の前にモンスターが立ちふさがった。チナの数倍も大きな怪物が、鋭い爪を振り上げ、叩きつけようとしている。"

[[dialogue]]
speaker = "チナ"
# 「だれかぁああああああ──っ！！」
line = "「だれかぁああああああ──っ！！」"

[[dialogue]]
speaker = "unk"
# 目をつぶって叫んだチナの耳が拾ったのは──
line = "目をつぶって叫んだチナの耳が拾ったのは──"

[[dialogue]]
speaker = "天使の少女"
# 「はぁあっ！！」
line = "「はぁあっ！！」"

[[dialogue]]
speaker = "unk"
# 自分の身が裂かれる音ではなく、１人の少女の声だった。
line = "自分の身が裂かれる音ではなく、１人の少女の声だった。"

[[dialogue]]
speaker = "unk"
# そして温かな、星の光の感触──おそるおそる、目を開くと。
line = "そして温かな、星の光の感触──おそるおそる、目を開くと。"

[[dialogue]]
speaker = "unk"
# チナを襲おうとしていたモンスターが、煌く光の羽根で刺し貫かれ、その動きを止めていた。
line = "チナを襲おうとしていたモンスターが、煌く光の羽根で刺し貫かれ、その動きを止めていた。"

[[dialogue]]
speaker = "unk"
# そしてチナをかばうようにしてたたずむ、１人の天使の少女──
line = "そしてチナをかばうようにしてたたずむ、１人の天使の少女──"

[[dialogue]]
speaker = "天使の少女"
# 「……間に合ってよかった。ケガはない？」
line = "「……間に合ってよかった。ケガはない？」"

[[dialogue]]
speaker = "unk"
# それが香堂チナと、天使ルヴィネの出会いだった。
line = "それが香堂チナと、天使ルヴィネの出会いだった。"
