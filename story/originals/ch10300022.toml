line = "「それに、さっき夫も家事ができないと話にならないって言ってましたし。会長さんとのこと、そこまで考えてるんですね？」"

[[dialogue]]
speaker = "ナミエル"
# 「へ……？　っっ。それは言葉の綾で……！」
line = "「へ……？　っっ。それは言葉の綾で……！」"

[[dialogue]]
