[[dialogue]]
speaker = "ナミエル"
# 「黙ってください。次に許可なくその口を開いたらモップを突っ込みますよ。そのうるさい口を掃除してあげますから」
line = "「黙ってください。次に許可なくその口を開いたらモップを突っ込みますよ。そのうるさい口を掃除してあげますから」"

[[dialogue]]
