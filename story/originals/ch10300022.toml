[[dialogue]]
speaker = "unk"
# 第２話,ナミエルと婿修行,P
line = "第２話,ナミエルと婿修行,P"

[[dialogue]]
speaker = "ナミエル"
# 「拭き取りが甘いですよ。しっかり水気を取りきらないと窓に拭き跡が残ってしまいます」
line = "「拭き取りが甘いですよ。しっかり水気を取りきらないと窓に拭き跡が残ってしまいます」"

[[dialogue]]
speaker = "フェニエル"
# 「あれ？　何してるんですか、お二人とも」
line = "「あれ？　何してるんですか、お二人とも」"

[[dialogue]]
speaker = "ナミエル"
# 「ああフニさま。緋宮会長にお掃除の指導をしていたところです」
line = "「ああフニさま。緋宮会長にお掃除の指導をしていたところです」"

[[dialogue]]
speaker = "ナミエル"
# 「今のご時世、夫も家事ができないと話になりませんからね。緋宮会長は今もそれなりですが、さらなるレベルアップをしていただく必要があります」
line = "「今のご時世、夫も家事ができないと話になりませんからね。緋宮会長は今もそれなりですが、さらなるレベルアップをしていただく必要があります」"

[[dialogue]]
speaker = "ナミエル"
# 「ほらそこ。埃が残っていますよ。隅々まで目を光らせてお掃除してください」
line = "「ほらそこ。埃が残っていますよ。隅々まで目を光らせてお掃除してください」"

[[dialogue]]
speaker = "フェニエル"
# 「ふふ、ラブラブなんだね。会長さんとお付き合いしてるのは知ってたけど、思ってた以上にナミエルちゃんが幸せそうで良かった」
line = "「ふふ、ラブラブなんだね。会長さんとお付き合いしてるのは知ってたけど、思ってた以上にナミエルちゃんが幸せそうで良かった」"

[[dialogue]]
speaker = "ナミエル"
# 「なっ。どうしてそうなるんですか。単に家事を教えているだけと言ったでしょう。おかしな勘違いしていませんか？」
line = "「なっ。どうしてそうなるんですか。単に家事を教えているだけと言ったでしょう。おかしな勘違いしていませんか？」"

[[dialogue]]
speaker = "unk"
# デートじゃなかったんだ？
line = "デートじゃなかったんだ？"

[[dialogue]]
speaker = "ナミエル"
# 「～～っっ！　違います！　誰が雇われ先でデートなんかしますかっ。馬鹿なこと言わずに手を動かしてください」
line = "「～～っっ！　違います！　誰が雇われ先でデートなんかしますかっ。馬鹿なこと言わずに手を動かしてください」"

[[dialogue]]
speaker = "フェニエル"
# 「えへへ、やっぱりラブラブじゃないですかぁ。そんなにヤイヤイ言うナミエルちゃん初めて見ましたよ～」
line = "「えへへ、やっぱりラブラブじゃないですかぁ。そんなにヤイヤイ言うナミエルちゃん初めて見ましたよ～」"

[[dialogue]]
