[[dialogue]]
speaker = "アイリーン"
# 「こちらはシャリオン地方、《万成》のアウクセシアが封印されている神殿です」
line = "「こちらはシャリオン地方、《万成》のアウクセシアが封印されている神殿です」"

[[dialogue]]
speaker = "ルリエル"
# 「シャリオン地方っていうと～……魔界のどこなんです？」
line = "「シャリオン地方っていうと～……魔界のどこなんです？」"

[[dialogue]]
speaker = "アナ"
# 「魔界でも中央にある、多くの貴族が群雄割拠する土地ですね。その中でも大きな家は“シャリオン十貴族”として恐れられています」
line = "「魔界でも中央にある、多くの貴族が群雄割拠する土地ですね。その中でも大きな家は“シャリオン十貴族”として恐れられています」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「ちなみに、私のディアーブル家もその十貴族のひとつなんですよ」
line = "「ちなみに、私のディアーブル家もその十貴族のひとつなんですよ」"

[[dialogue]]
speaker = "ルリエル"
# 「シャルレーヌさんってそんなに偉いんですか！？」
line = "「シャルレーヌさんってそんなに偉いんですか！？」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「いえいえ、貴族の権威なんて星騎士には関係ありませんから。普通の後輩として扱ってください」
line = "「いえいえ、貴族の権威なんて星騎士には関係ありませんから。普通の後輩として扱ってください」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「でもここがディアーブル家の領内で幸運でした。神殿が他の十貴族の領地だと面倒なことになったでしょうから」
line = "「でもここがディアーブル家の領内で幸運でした。神殿が他の十貴族の領地だと面倒なことになったでしょうから」"

[[dialogue]]
speaker = "アナ"
# 「助かります。根回ししている時間はありませんから」
line = "「助かります。根回ししている時間はありませんから」"

[[dialogue]]
speaker = "パテル"
# 「ヤッホー♪　このあたし、《試練》のパテルがこっちのお助けキャラだよ♪」
line = "「ヤッホー♪　このあたし、《試練》のパテルがこっちのお助けキャラだよ♪」"

[[dialogue]]
speaker = "パテル"
# 「リクリエ静観派のあたしが協力してあげるのは特別なんだから、感謝してよ。ま、本体が封印されっぱなしなのはムカつくからね」
line = "「リクリエ静観派のあたしが協力してあげるのは特別なんだから、感謝してよ。ま、本体が封印されっぱなしなのはムカつくからね」"

[[dialogue]]
speaker = "パテル"
# 「ところでアルモタヘルのチビモード見た？　ちっちゃくて、大鎌持ってて、キャラ被り甚だしいよね。営業妨害だよ！」
line = "「ところでアルモタヘルのチビモード見た？　ちっちゃくて、大鎌持ってて、キャラ被り甚だしいよね。営業妨害だよ！」"

[[dialogue]]
speaker = "アナ"
# 「でしたら天界の裁判所に訴えてください」
line = "「でしたら天界の裁判所に訴えてください」"

[[dialogue]]
speaker = "パテル"
# 「アハハ、つれないね～。じゃあ女神様に会ったら言ってみるよ」
line = "「アハハ、つれないね～。じゃあ女神様に会ったら言ってみるよ」"

[[dialogue]]
speaker = "サチ"
# 「こっちにもモンスターが！　やっぱり守護天使のところには行かせないつもりなんだ。──でも！」
line = "「こっちにもモンスターが！　やっぱり守護天使のところには行かせないつもりなんだ。──でも！」"

[[dialogue]]
speaker = "プリムラ"
# 「邪魔するなら押して通るまでじゃ！　グラトニーバイト！」
line = "「邪魔するなら押して通るまでじゃ！　グラトニーバイト！」"

[[dialogue]]
speaker = "プリムラ"
# 「我が世界征服する前に滅んでもらっては困るのでな。貴様らが先に滅べ！」
line = "「我が世界征服する前に滅んでもらっては困るのでな。貴様らが先に滅べ！」"

[[dialogue]]
speaker = "サチ"
# 「ちょっと。今私が倒そうとしてたんだけど」
line = "「ちょっと。今私が倒そうとしてたんだけど」"

[[dialogue]]
speaker = "プリムラ"
# 「フン、早い者勝ちじゃ。サチはそこで指を咥えて見ているがいい。楽ができてラッキーじゃろ？」
line = "「フン、早い者勝ちじゃ。サチはそこで指を咥えて見ているがいい。楽ができてラッキーじゃろ？」"

[[dialogue]]
speaker = "プリムラ"
# 「大事な戦いで役に立たなかったと、噂されてもいいならの話じゃがな。ハーッハッハ！」
line = "「大事な戦いで役に立たなかったと、噂されてもいいならの話じゃがな。ハーッハッハ！」"

[[dialogue]]
speaker = "サチ"
# 「むむ……──ッ！　モンスターが後ろから！」
line = "「むむ……──ッ！　モンスターが後ろから！」"

[[dialogue]]
speaker = "アム"
# 「サチ会長！」
line = "「サチ会長！」"

[[dialogue]]
speaker = "サチ"
# 「アムさん、ありがとうございます！」
line = "「アムさん、ありがとうございます！」"

[[dialogue]]
speaker = "アム"
# 「このくらい何でもないよ。あたしの盾はあんなヘナチョコじゃビクともしないからね！」
line = "「このくらい何でもないよ。あたしの盾はあんなヘナチョコじゃビクともしないからね！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「モンスターが多くてこのままでは神殿に辿り着けませんわ。アム、邪魔なモンスターを排除しますわよ！」
line = "「モンスターが多くてこのままでは神殿に辿り着けませんわ。アム、邪魔なモンスターを排除しますわよ！」"

[[dialogue]]
speaker = "アム"
# 「あたしも堕天使と戦いたかったんだけど、仕方ないな。おいしいとこはサチ会長に任せるよ。附属最強の生徒会長だってところ見せてやって！」
line = "「あたしも堕天使と戦いたかったんだけど、仕方ないな。おいしいとこはサチ会長に任せるよ。附属最強の生徒会長だってところ見せてやって！」"

[[dialogue]]
speaker = "サチ"
# 「はい、行ってきます！」
line = "「はい、行ってきます！」"

[[dialogue]]
speaker = "アム"
# 「さ～て、エルゼ、どっちが多くモンスターを倒せるか競争だよ！」
line = "「さ～て、エルゼ、どっちが多くモンスターを倒せるか競争だよ！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「競っている場合ではありませんの」
line = "「競っている場合ではありませんの」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「──と言いたいところですが、時には競うことでより成果を発揮することもあるでしょう。ここは正々堂々と勝負ですわ！」
line = "「──と言いたいところですが、時には競うことでより成果を発揮することもあるでしょう。ここは正々堂々と勝負ですわ！」"

[[dialogue]]
speaker = "アム"
# 「うん！　附属最強の盾と矛、暴れてやるよ！」
line = "「うん！　附属最強の盾と矛、暴れてやるよ！」"

[[dialogue]]
speaker = "ナミエル"
# 「モンスターがたくさん……お掃除します」
line = "「モンスターがたくさん……お掃除します」"

[[dialogue]]
speaker = "ナミエル"
# 「ふぅ……何度も押し流しているはずなのに、本当にモンスターが減りませんね……」
line = "「ふぅ……何度も押し流しているはずなのに、本当にモンスターが減りませんね……」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「それならこういうのはどうでしょう？　ブリリアンスパヒューム！」
line = "「それならこういうのはどうでしょう？　ブリリアンスパヒューム！」"

[[dialogue]]
speaker = "ナミエル"
# 「モンスターの動きが鈍りました！　これがシャルレーヌさまの星術……」
line = "「モンスターの動きが鈍りました！　これがシャルレーヌさまの星術……」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「行ってください、星徒会の皆さん。シャリオンだけじゃなくて世界の命運がかかっていますから、頑張ってくださいね」
line = "「行ってください、星徒会の皆さん。シャリオンだけじゃなくて世界の命運がかかっていますから、頑張ってくださいね」"

[[dialogue]]
speaker = "アイリーン"
# 「ミーちゃんの眼なら……見えた！　星徒会の皆さん、西側が手薄になっていますので、そこから接近してください！」
line = "「ミーちゃんの眼なら……見えた！　星徒会の皆さん、西側が手薄になっていますので、そこから接近してください！」"

[[dialogue]]
speaker = "アナ"
# 「ありがとうございます」
line = "「ありがとうございます」"

[[dialogue]]
speaker = "ルリエル"
# 「任されました！」
line = "「任されました！」"

[[dialogue]]
speaker = "セシア"
# 「全てを……無に還すわ……」
line = "「全てを……無に還すわ……」"

[[dialogue]]
speaker = "サチ"
# 「あれが堕天使……この目で見るのは初めてです。ですがどうしてセシアさんが堕天使に？」
line = "「あれが堕天使……この目で見るのは初めてです。ですがどうしてセシアさんが堕天使に？」"

[[dialogue]]
speaker = "サチ"
# 「守護天使アウクセシアは封印から逃れるため、自身を犠牲にして転生し、新たな守護天使・セシアとなった。なら堕天使アウクセシアは存在しないはずでは？」
line = "「守護天使アウクセシアは封印から逃れるため、自身を犠牲にして転生し、新たな守護天使・セシアとなった。なら堕天使アウクセシアは存在しないはずでは？」"

[[dialogue]]
speaker = "パテル"
# 「ところがどっこい、堕天使になっちゃってるんだよね～」
line = "「ところがどっこい、堕天使になっちゃってるんだよね～」"

[[dialogue]]
speaker = "パテル"
# 「どう説明するかな～……存在容量とでも言うかな。そもそも守護天使の存在は巨大で、アウクセシアの全てがセシアになったわけじゃない」
line = "「どう説明するかな～……存在容量とでも言うかな。そもそも守護天使の存在は巨大で、アウクセシアの全てがセシアになったわけじゃない」"

[[dialogue]]
speaker = "パテル"
# 「アウクセシアの残滓が、セシアの形をとってるんだ。ま、やることは一緒だよ。あれを倒せば、世界に『蓄積』の摂理が戻る」
line = "「アウクセシアの残滓が、セシアの形をとってるんだ。ま、やることは一緒だよ。あれを倒せば、世界に『蓄積』の摂理が戻る」"

[[dialogue]]
speaker = "セシア"
# 「消えなさい」
line = "「消えなさい」"

[[dialogue]]
speaker = "アナ"
# 「っ……！　非常に強力な霊力の反応です」
line = "「っ……！　非常に強力な霊力の反応です」"

[[dialogue]]
speaker = "パテル"
# 「転生前じゃ、あたしたち守護天使の中で最強だったからね。セシアに転生してくれてなかったら、もっとヤバかったかも」
line = "「転生前じゃ、あたしたち守護天使の中で最強だったからね。セシアに転生してくれてなかったら、もっとヤバかったかも」"

[[dialogue]]
speaker = "ルリエル"
# 「え～っ、もっとですかぁ！？　今でもめちゃくちゃ強いですよぉっ！」
line = "「え～っ、もっとですかぁ！？　今でもめちゃくちゃ強いですよぉっ！」"

[[dialogue]]
speaker = "クラウディア"
# 「フッ、今度こそ余の出番だな！」
line = "「フッ、今度こそ余の出番だな！」"

[[dialogue]]
speaker = "ルリエル"
# 「魔女の偉い人！？」
line = "「魔女の偉い人！？」"

[[dialogue]]
speaker = "クラウディア"
# 「余が来たからには勝利は決まったも同然──いや、すでに勝ったと言っても過言ではない」
line = "「余が来たからには勝利は決まったも同然──いや、すでに勝ったと言っても過言ではない」"

[[dialogue]]
speaker = "セドナ"
# 「どういうことだ！？　なぜ姫様が魔界にいる！？　無事か──いや、姫様ならこの程度危険はないが……」
line = "「どういうことだ！？　なぜ姫様が魔界にいる！？　無事か──いや、姫様ならこの程度危険はないが……」"

[[dialogue]]
speaker = "セドナ"
# 「しかしこれでは世界樹を制御する魔力が足らんぞ……！」
line = "「しかしこれでは世界樹を制御する魔力が足らんぞ……！」"

[[dialogue]]
speaker = "リノ"
# 「あ、ごめ～ん」
line = "「あ、ごめ～ん」"

[[dialogue]]
speaker = "セドナ"
# 「リノ？」
line = "「リノ？」"

[[dialogue]]
speaker = "リノ"
# 「さっきお手洗いから戻ってきた時に“世界樹とセドナは任せたぞ”って言われちゃって。はーい、って返事しちゃったの」
line = "「さっきお手洗いから戻ってきた時に“世界樹とセドナは任せたぞ”って言われちゃって。はーい、って返事しちゃったの」"

[[dialogue]]
speaker = "セドナ"
# 「貴様……！　なぜ行かせた！？」
line = "「貴様……！　なぜ行かせた！？」"

[[dialogue]]
speaker = "リノ"
# 「いや～、ネビュラを抜けたとはいえ、私も魔女だから光の魔女には逆らえなくてね？」
line = "「いや～、ネビュラを抜けたとはいえ、私も魔女だから光の魔女には逆らえなくてね？」"

[[dialogue]]
speaker = "セドナ"
# 「ぐぬぬ……」
line = "「ぐぬぬ……」"

[[dialogue]]
speaker = "リノ"
# 「世界樹の制御は私が手伝うから。私とセドナならなんとかなるでしょ？」
line = "「世界樹の制御は私が手伝うから。私とセドナならなんとかなるでしょ？」"

[[dialogue]]
speaker = "セドナ"
# 「はぁ……本当に思い通りにならないことばかりだ」
line = "「はぁ……本当に思い通りにならないことばかりだ」"

[[dialogue]]
speaker = "セドナ"
# 「仕方あるまい。世界樹のコントロールは私と貴様で行う。後れを取るなよ」
line = "「仕方あるまい。世界樹のコントロールは私と貴様で行う。後れを取るなよ」"

[[dialogue]]
speaker = "リノ"
# 「もっちろん。ネビュラのエースコンビ復活ね♪」
line = "「もっちろん。ネビュラのエースコンビ復活ね♪」"

[[dialogue]]
speaker = "セドナ"
# 「フンッ」
line = "「フンッ」"

[[dialogue]]
speaker = "クラウディア"
# 「せっかくだ、余の真の力を見せてやろう！」
line = "「せっかくだ、余の真の力を見せてやろう！」"

[[dialogue]]
speaker = "クラウディア（黄昏）"
# 「魔王に負けたままでは余も面白くない。せいぜい憂さ晴らしをさせてもらおうではないか」
line = "「魔王に負けたままでは余も面白くない。せいぜい憂さ晴らしをさせてもらおうではないか」"

[[dialogue]]
speaker = "クラウディア（黄昏）"
# 「星騎士たちよ、余とともに戦う栄誉をやろう。星の輝きを見せてみよ！」
line = "「星騎士たちよ、余とともに戦う栄誉をやろう。星の輝きを見せてみよ！」"

[[dialogue]]
speaker = "ルリエル"
# 「この前の戦いで見たメチャ強のやつです！　味方なら心強いことこの上ないですよ！」
line = "「この前の戦いで見たメチャ強のやつです！　味方なら心強いことこの上ないですよ！」"

[[dialogue]]
speaker = "パテル"
# 「そういえば、ま～た堕天使の相手かー。変な気分だけど、試練を与えさせてもらうよ」
line = "「そういえば、ま～た堕天使の相手かー。変な気分だけど、試練を与えさせてもらうよ」"

[[dialogue]]
speaker = "アナ"
# 「軍神の加護をこの矢に乗せて──撃ち抜きます」
line = "「軍神の加護をこの矢に乗せて──撃ち抜きます」"

[[dialogue]]
speaker = "サチ"
# 「流星附属会長、白詰サチ。附属の代表として──決めます！」
line = "「流星附属会長、白詰サチ。附属の代表として──決めます！」"
