line = "「でもね……会長と一緒だからですよ、私がこんなにはしゃいでるのは」"

[[dialogue]]
speaker = "ヨミ"
# 「さあ、行きましょう！　楽しいことがいっぱい私達を待ってますよ～っ！」
line = "「さあ、行きましょう！　楽しいことがいっぱい私達を待ってますよ～っ！」"

[[dialogue]]
speaker = "ヨミ"
# 「ほら、会長……恋人らしく、腕を組んでみませんか？」
line = "「ほら、会長……恋人らしく、腕を組んでみませんか？」"

[[dialogue]]
speaker = "ヨミ"
