line = "「うわぁぁ～、何からやろうかな～？　目移りしちゃいますね。ジェットコースターもいいし、お化け屋敷も、コーヒーカップも……」"

[[dialogue]]
speaker = "ヨミ"
# 「私をここに連れてきてくれて、ありがとうございます。今日は絶対、最高の１日になると思います！」
line = "「私をここに連れてきてくれて、ありがとうございます。今日は絶対、最高の１日になると思います！」"

[[dialogue]]
speaker = "ヨミ"
