line = "「むぎゅ～～～っ<emoji=heart04>　えへへ、会長の腕、抱き締めちゃいました<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
# 「私にしてはちょっと大胆かな～って気もしますけど……でもいいですよね、だって今日はデートなんですからっ<emoji=heart04>」
line = "「私にしてはちょっと大胆かな～って気もしますけど……でもいいですよね、だって今日はデートなんですからっ<emoji=heart04>」"

[[dialogue]]
