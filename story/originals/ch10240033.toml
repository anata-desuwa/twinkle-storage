[[dialogue]]
speaker = "unk"
# 第３話,遊園地の夜に,P
line = "第３話,遊園地の夜に,P"

[[dialogue]]
speaker = "unk"
# マムの厳しい修行を終えたヨミ。お疲れさまの意味を込めて、休日に２人で遊園地にやってきた。
line = "マムの厳しい修行を終えたヨミ。お疲れさまの意味を込めて、休日に２人で遊園地にやってきた。"

[[dialogue]]
speaker = "ヨミ"
# 「遊園地ですよ～、遊園地！　もう３６０度どこを見ても最高に楽しそうです～！」
line = "「遊園地ですよ～、遊園地！　もう３６０度どこを見ても最高に楽しそうです～！」"

[[dialogue]]
speaker = "ヨミ"
