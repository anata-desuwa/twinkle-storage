[[dialogue]]
speaker = "unk"
# 第１２話,開戦,B
line = "第１２話,開戦,B"

[[dialogue]]
speaker = "unk"
# とうとう、極星学園生全員の怪我が完治した。それを機に俺は、彼女たちを星徒会室に呼び出した──
line = "とうとう、極星学園生全員の怪我が完治した。それを機に俺は、彼女たちを星徒会室に呼び出した──"

[[dialogue]]
speaker = "グレイス"
# 「私たちのセレスティア……いいんですか？」
line = "「私たちのセレスティア……いいんですか？」"

[[dialogue]]
speaker = "クロト"
# 「ああ。本来の機能を１００％引き出せるように調整してある。使ってくれ」
line = "「ああ。本来の機能を１００％引き出せるように調整してある。使ってくれ」"

[[dialogue]]
speaker = "レティシア"
# 「寝首をかかれても知らないわよ？」
line = "「寝首をかかれても知らないわよ？」"

[[dialogue]]
speaker = "クロト"
# 「そうならないよう、努力する」
line = "「そうならないよう、努力する」"

[[dialogue]]
speaker = "チナ"
# 「……いよいよデネブに帰る。そういうことだな？」
line = "「……いよいよデネブに帰る。そういうことだな？」"

[[dialogue]]
speaker = "クロト"
# 「天界と魔界、双方からの応援が到着次第、転送装置を使ってデネブに乗り込む。今日か明日か、数日先か……でも長いこと待たせないよ」
line = "「天界と魔界、双方からの応援が到着次第、転送装置を使ってデネブに乗り込む。今日か明日か、数日先か……でも長いこと待たせないよ」"

[[dialogue]]
speaker = "クロト"
# 「それまでに各自、準備を整えておいてくれ」
line = "「それまでに各自、準備を整えておいてくれ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「いよいよ最終決戦ってわけね！　燃えてきたわ！」
line = "「いよいよ最終決戦ってわけね！　燃えてきたわ！」"

[[dialogue]]
speaker = "クロト"
# 「全員、存分に腕を振るってほしい。ただし俺たちの目的はあくまで、リクリエを止めること」
line = "「全員、存分に腕を振るってほしい。ただし俺たちの目的はあくまで、リクリエを止めること」"

[[dialogue]]
speaker = "クロト"
# 「リクリエを扇動するルヴィネを説得し、彼女の助力を持って『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』にアプローチをとる」
line = "「リクリエを扇動するルヴィネを説得し、彼女の助力を持って『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』にアプローチをとる」"

[[dialogue]]
speaker = "クロト"
# 「和平交渉になるのか、創造神を討つことになるのか……出たとこ勝負になるだろう。でも、譲るつもりはない」
line = "「和平交渉になるのか、創造神を討つことになるのか……出たとこ勝負になるだろう。でも、譲るつもりはない」"

[[dialogue]]
speaker = "クロト"
# 「アルタイルとデネブ、２つの世界を救う──掴み取ろう。俺たちの未来を！」
line = "「アルタイルとデネブ、２つの世界を救う──掴み取ろう。俺たちの未来を！」"

[[dialogue]]
speaker = "チナ"
# 「……ああ！」
line = "「……ああ！」"

[[dialogue]]
speaker = "クロト"
# 「──ジグ。今、君にはどんな未来が視える？」
line = "「──ジグ。今、君にはどんな未来が視える？」"

[[dialogue]]
speaker = "ジグ"
# 「……少し待ってくれるかい。<ruby=みらい>可能性</ruby>を探ってみよう」
line = "「……少し待ってくれるかい。<ruby>可能性<rt>みらい</rt></ruby>を探ってみよう」"

[[dialogue]]
speaker = "unk"
# 瞳を閉じるジグに、全員が固唾をのんで見守っていると──
line = "瞳を閉じるジグに、全員が固唾をのんで見守っていると──"

[[dialogue]]
speaker = "アナ"
# 「これは──！」
line = "「これは──！」"

[[dialogue]]
speaker = "マトイ"
# 「み、皆っ！　外を見て！！　空が……！！」
line = "「み、皆っ！　外を見て！！　空が……！！」"

[[dialogue]]
speaker = "サーシャ"
# 「フィヴォス流星群の時と同じ……いや、あの時以上の……！？」
line = "「フィヴォス流星群の時と同じ……いや、あの時以上の……！？」"

[[dialogue]]
speaker = "クロト"
# 「まさか乗り込んできたのか、ルヴィネ本人が！？」
line = "「まさか乗り込んできたのか、ルヴィネ本人が！？」"

[[dialogue]]
speaker = "ベアトリス"
# 「……ルヴィ。待ってて。絶対に止めて見せるから……！」
line = "「……ルヴィ。待ってて。絶対に止めて見せるから……！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「──宣戦布告よ、アルタイルの星騎士たち」
line = "「──宣戦布告よ、アルタイルの星騎士たち」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……お父様。見ていてください。これより、世界の刷新を始めます」
line = "「……お父様。見ていてください。これより、世界の刷新を始めます」"

[[dialogue]]
speaker = "unk"
# ──全員が星徒会室を飛び出して行き、部屋の中にジグだけが残された。
line = "──全員が星徒会室を飛び出して行き、部屋の中にジグだけが残された。"

[[dialogue]]
speaker = "ジグ"
# 「……残念だ」
line = "「……残念だ」"

[[dialogue]]
speaker = "ジグ"
# 「視える未来に変化はなし──ルヴィネは、死ぬ」
line = "「視える未来に変化はなし──ルヴィネは、死ぬ」"

[[dialogue]]
speaker = "ジグ"
# 「これは後味の悪い戦いになりそうだ……それとも魔王。君ならここからでも、まだ未来を変えられるのかな？」
line = "「これは後味の悪い戦いになりそうだ……それとも魔王。君ならここからでも、まだ未来を変えられるのかな？」"

[[dialogue]]
speaker = "unk"
# 元よりジグは、ルヴィネの死については致し方ないと思っている。
line = "元よりジグは、ルヴィネの死については致し方ないと思っている。"

[[dialogue]]
speaker = "unk"
# 最も知るべきは、これから緋宮クロトが辿る結末だ。
line = "最も知るべきは、これから緋宮クロトが辿る結末だ。"

[[dialogue]]
speaker = "unk"
# 星眼の連続使用は負担も大きいが、覗き見るしかない。ルヴィネの死亡よりもさらに先──世界の最後の希望である魔王が見るであろう光景を。
line = "星眼の連続使用は負担も大きいが、覗き見るしかない。ルヴィネの死亡よりもさらに先──世界の最後の希望である魔王が見るであろう光景を。"

[[dialogue]]
speaker = "ジグ"
# （あの破滅の世界が見えるのか。『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』を倒す彼が見えるのか──どっちだ？）
line = "（あの破滅の世界が見えるのか。『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』を倒す彼が見えるのか──どっちだ？）"

[[dialogue]]
speaker = "ジグ"
# （…………！？）
line = "（…………！？）"

[[dialogue]]
speaker = "unk"
# 視えたのは、一面の黒。
line = "視えたのは、一面の黒。"

[[dialogue]]
speaker = "ジグ"
# （……なんだ、これは？）
line = "（……なんだ、これは？）"

[[dialogue]]
speaker = "unk"
# 音もなく、光もなく、温かくも冷たくもない──完全な『無』が広がっている。
line = "音もなく、光もなく、温かくも冷たくもない──完全な『無』が広がっている。"

[[dialogue]]
speaker = "ジグ"
# （これが……魔王に訪れる、彼が視ることになる──未来だと？）
line = "（これが……魔王に訪れる、彼が視ることになる──未来だと？）"

[[dialogue]]
speaker = "ジグ"
# （私の能力の限界なのか。それとも……）
line = "（私の能力の限界なのか。それとも……）"

[[dialogue]]
speaker = "ジグ"
# （本当にこれが起きる、というのか……！？）
line = "（本当にこれが起きる、というのか……！？）"
