[[dialogue]]
speaker = "unk"
# クリスマスまであと１週間となった休日。
line = "クリスマスまであと１週間となった休日。"

[[dialogue]]
speaker = "unk"
# なんだかんだ、あれからブレスレット作りも順調で、その日は気晴らしにみんなで街へ遊びに来ていた。
line = "なんだかんだ、あれからブレスレット作りも順調で、その日は気晴らしにみんなで街へ遊びに来ていた。"

[[dialogue]]
speaker = "unk"
# ショッピングモールの中を歩いていると、先日の話題になる。
line = "ショッピングモールの中を歩いていると、先日の話題になる。"

[[dialogue]]
speaker = "セシア"
# 「そういえばルルカ、あれからクリスマスソングの作詞は進んでいるの？」
line = "「そういえばルルカ、あれからクリスマスソングの作詞は進んでいるの？」"

[[dialogue]]
speaker = "ルルカ"
# 「いや～、それがまだ全然で……。途中まで書いてみたんだけど、いまいちしっくり来ないというか」
line = "「いや～、それがまだ全然で……。途中まで書いてみたんだけど、いまいちしっくり来ないというか」"

[[dialogue]]
speaker = "ルルカ"
# 「これまで恋愛経験がないのに、『恋人とのラブソング』ってテーマが無茶だったかなぁって、今更ちょっと後悔してたり……あはは」
line = "「これまで恋愛経験がないのに、『恋人とのラブソング』ってテーマが無茶だったかなぁって、今更ちょっと後悔してたり……あはは」"

[[dialogue]]
speaker = "ルルカ"
# 「――あ～あ、恋人の１人でも本当にできたら、エネルギー全開になって、オリジナルソングの１つや２つ、サクッと作れちゃいそうなのにな～」
line = "「――あ～あ、恋人の１人でも本当にできたら、エネルギー全開になって、オリジナルソングの１つや２つ、サクッと作れちゃいそうなのにな～」"

[[dialogue]]
speaker = "フェニエル"
# 「あっ」
line = "「あっ」"

[[dialogue]]
speaker = "ルルカ"
# 「って、フニちゃん、立ち止まってどうしたの？」
line = "「って、フニちゃん、立ち止まってどうしたの？」"

[[dialogue]]
speaker = "フェニエル"
# 「これ、可愛い便箋と封筒だなって思って。ちょっと買って来てもいいでしょうか？」
line = "「これ、可愛い便箋と封筒だなって思って。ちょっと買って来てもいいでしょうか？」"

[[dialogue]]
speaker = "ルルカ"
# 「もちろんいいけど、誰かに手紙を送るの？」
line = "「もちろんいいけど、誰かに手紙を送るの？」"

[[dialogue]]
speaker = "フェニエル"
# 「はい。クリスマスなので、北海道の村のみんな宛に近況報告と、メリークリスマスって伝えられたらなって」
line = "「はい。クリスマスなので、北海道の村のみんな宛に近況報告と、メリークリスマスって伝えられたらなって」"

[[dialogue]]
speaker = "セシア"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "フェニエル"
# 「じゃあ私、ちょっと買いに行って来ますねっ」
line = "「じゃあ私、ちょっと買いに行って来ますねっ」"

[[dialogue]]
speaker = "セシア"
# 「――ねぇ、ルルカ。わたくし、ちょっと思ったのだけれど……」
line = "「――ねぇ、ルルカ。わたくし、ちょっと思ったのだけれど……」"

[[dialogue]]
speaker = "セシア"
# 「<b>ママへのラブソング</b>じゃ、ダメかしら？」
line = "「<b>ママへのラブソング</b>じゃ、ダメかしら？」"

[[dialogue]]
speaker = "ルルカ"
# 「え？」
line = "「え？」"

[[dialogue]]
speaker = "セシア"
# 「わたくしもルルカと同じで、恋愛経験はないわ。だから、恋人とのラブソングが書きたいということなら、上手いアドバイスはできない」
line = "「わたくしもルルカと同じで、恋愛経験はないわ。だから、恋人とのラブソングが書きたいということなら、上手いアドバイスはできない」"

[[dialogue]]
speaker = "セシア"
# 「それはわたくしの中に、恋愛に関するアドバイスを引き出せるような『蓄積』がないからよ。だけど……」
line = "「それはわたくしの中に、恋愛に関するアドバイスを引き出せるような『蓄積』がないからよ。だけど……」"

[[dialogue]]
speaker = "セシア"
# 「ラブソングで歌う愛って、必ずしも恋人が相手じゃなければダメなのかしら？　フニが北海道の村の人たち――」
line = "「ラブソングで歌う愛って、必ずしも恋人が相手じゃなければダメなのかしら？　フニが北海道の村の人たち――」"

[[dialogue]]
speaker = "セシア"
# 「家族へメリークリスマスを伝えたいと思っているのも、愛の１つではないかしら？」
line = "「家族へメリークリスマスを伝えたいと思っているのも、愛の１つではないかしら？」"

[[dialogue]]
speaker = "ルルカ"
# 「あ……！　そっか――」
line = "「あ……！　そっか――」"

[[dialogue]]
speaker = "ルルカ"
# 「そうだよね……あたし、大切なことを忘れてた。どうして、クリスマスソングを作ろうと思ったのか……」
line = "「そうだよね……あたし、大切なことを忘れてた。どうして、クリスマスソングを作ろうと思ったのか……」"

[[dialogue]]
speaker = "ルルカ"
# 「あたし……いつも応援してくれているリスナーの『お兄ちゃん』『お姉ちゃん』への感謝として、新曲を披露するつもりだったんだ」
line = "「あたし……いつも応援してくれているリスナーの『お兄ちゃん』『お姉ちゃん』への感謝として、新曲を披露するつもりだったんだ」"

[[dialogue]]
speaker = "ルルカ"
# 「それが段々、作るならちゃんとウケるようにしなくちゃって思って、『恋人とのラブソング』が定番だからとか、変にカッコつけようとして……」
line = "「それが段々、作るならちゃんとウケるようにしなくちゃって思って、『恋人とのラブソング』が定番だからとか、変にカッコつけようとして……」"

[[dialogue]]
speaker = "ルルカ"
# 「あたしはいつの間にか、自分の中にない気持ちを、歌詞にしようとしてた……」
line = "「あたしはいつの間にか、自分の中にない気持ちを、歌詞にしようとしてた……」"

[[dialogue]]
speaker = "ルルカ"
# 「そうじゃなくて、あたしが歌詞にすべきは、応援してくれるリスナーさんへの……家族のように大切な人たちへの感謝の気持ちだったんだ」
line = "「そうじゃなくて、あたしが歌詞にすべきは、応援してくれるリスナーさんへの……家族のように大切な人たちへの感謝の気持ちだったんだ」"

[[dialogue]]
speaker = "セシア"
# 「シャルルママだけじゃなくて、応援してくれる人たちが『家族』……ふふっ♪」
line = "「シャルルママだけじゃなくて、応援してくれる人たちが『家族』……ふふっ♪」"

[[dialogue]]
speaker = "セシア"
# 「ルルカはやっぱり、わたくしの見込んだ『潜在ママ<ruby=りょく>力</ruby>』の持ち主だったわね――」
line = "「ルルカはやっぱり、わたくしの見込んだ『潜在ママ<ruby>力<rt>りょく</rt></ruby>』の持ち主だったわね――」"

[[dialogue]]
speaker = "unk"
# そう言うと、セシアはクリスマスフォームに変身して――
line = "そう言うと、セシアはクリスマスフォームに変身して――"

[[dialogue]]
speaker = "セシア"
# 「フォッフォッフォ♪　ママ判定、プラス１００ポイントよ♪」
line = "「フォッフォッフォ♪　ママ判定、プラス１００ポイントよ♪」"

[[dialogue]]
speaker = "unk"
# 潜在ママ力？
line = "潜在ママ力？"

[[dialogue]]
speaker = "セシア"
# 「ええ。わたくしがルルカとフニを今回のサンタ仲間として誘ったのは、２人共、将来的に開花しそうなママとしての潜在能力が高いと思ったからなの♪」
line = "「ええ。わたくしがルルカとフニを今回のサンタ仲間として誘ったのは、２人共、将来的に開花しそうなママとしての潜在能力が高いと思ったからなの♪」"

[[dialogue]]
speaker = "unk"
# 完全に趣味！！！
line = "完全に趣味！！！"

[[dialogue]]
speaker = "セシア"
# 「いいえ、そんなことないわよ、会長。紅明ママが実際に、証明しているでしょう？」
line = "「いいえ、そんなことないわよ、会長。紅明ママが実際に、証明しているでしょう？」"

[[dialogue]]
speaker = "セシア"
# 「自分ではない誰かの為に何かをしてあげたいという、『本気で相手を想える心』。それはママにもサンタにも通じるポイントだと、わたくしは思うの」
line = "「自分ではない誰かの為に何かをしてあげたいという、『本気で相手を想える心』。それはママにもサンタにも通じるポイントだと、わたくしは思うの」"

[[dialogue]]
speaker = "セシア"
# 「だから――ルルカ。あなたはきっと、リスナーにとってのサンタになれるはずよ」
line = "「だから――ルルカ。あなたはきっと、リスナーにとってのサンタになれるはずよ」"

[[dialogue]]
speaker = "ルルカ"
# 「あたしがサンタ……うん！　あたし、改めてみんなへの感謝の気持ちを込めて、歌詞を作ってみるよ！　ありがとう、セッシーちゃん！　ううん――」
line = "「あたしがサンタ……うん！　あたし、改めてみんなへの感謝の気持ちを込めて、歌詞を作ってみるよ！　ありがとう、セッシーちゃん！　ううん――」"

[[dialogue]]
speaker = "ルルカ"
# 「ありがとう、サンタさん♪」
line = "「ありがとう、サンタさん♪」"

[[dialogue]]
speaker = "セシア"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "セシア"
# 「ふふっ、あなたに喜んでもらえたなら、わたくしも嬉しいわ♪」
line = "「ふふっ、あなたに喜んでもらえたなら、わたくしも嬉しいわ♪」"

[[dialogue]]
speaker = "ルルカ"
# 「えへへ♪」
line = "「えへへ♪」"

[[dialogue]]
speaker = "フェニエル"
# 「お待たせしました。買って来ました～」
line = "「お待たせしました。買って来ました～」"

[[dialogue]]
speaker = "フェニエル"
# 「……って、あれ？」
line = "「……って、あれ？」"

[[dialogue]]
speaker = "フェニエル"
# 「ルルカちゃん、さっきよりも、すごく明るい顔になってます。何かいい事でもありましたか？」
line = "「ルルカちゃん、さっきよりも、すごく明るい顔になってます。何かいい事でもありましたか？」"

[[dialogue]]
speaker = "ルルカ"
# 「うんっ、そうなの♪　聞いて、フニちゃん――」
line = "「うんっ、そうなの♪　聞いて、フニちゃん――」"

[[dialogue]]
speaker = "unk"
# ルルカはそれから、フニが居なかった間のやり取りを嬉しそうに話すのだった――
line = "ルルカはそれから、フニが居なかった間のやり取りを嬉しそうに話すのだった――"

[[dialogue]]
speaker = "unk"
# 翌日。
line = "翌日。"

[[dialogue]]
speaker = "ルルカ"
# 「――というわけで、昨日帰ってから、作詞が一気に進んだの！」
line = "「――というわけで、昨日帰ってから、作詞が一気に進んだの！」"

[[dialogue]]
speaker = "ルルカ"
# 「これなら、クリスマスまでにちゃんと曲が完成しそう！」
line = "「これなら、クリスマスまでにちゃんと曲が完成しそう！」"

[[dialogue]]
speaker = "セシア"
# 「そう。よかったわね、ルルカ♪」
line = "「そう。よかったわね、ルルカ♪」"

[[dialogue]]
speaker = "unk"
# 楽しみにしてる
line = "楽しみにしてる"

[[dialogue]]
speaker = "ルルカ"
# 「うん♪　完成したら、お兄ちゃん達にも披露するね♪」
line = "「うん♪　完成したら、お兄ちゃん達にも披露するね♪」"

[[dialogue]]
speaker = "unk"
# ルルカの悩みも解決して、そんな風に談笑していると――ふと気づく。
line = "ルルカの悩みも解決して、そんな風に談笑していると――ふと気づく。"

[[dialogue]]
speaker = "フェニエル"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ルルカ"
# 「あれ？　フニちゃん？」
line = "「あれ？　フニちゃん？」"

[[dialogue]]
speaker = "ルルカ"
# 「なんか今日……いつもより顔が赤くない？」
line = "「なんか今日……いつもより顔が赤くない？」"

[[dialogue]]
speaker = "フェニエル"
# 「っ……」
line = "「っ……」"

[[dialogue]]
speaker = "unk"
# 次の瞬間、フニの体がふらっと揺れて、そのまま倒れそうになる。
line = "次の瞬間、フニの体がふらっと揺れて、そのまま倒れそうになる。"

[[dialogue]]
speaker = "セシア"
# 「フニ……！？」
line = "「フニ……！？」"

[[dialogue]]
speaker = "unk"
# 俺は慌てて駆け寄り、体を支える。
line = "俺は慌てて駆け寄り、体を支える。"

[[dialogue]]
speaker = "unk"
# 大丈夫か、フニ！？
line = "大丈夫か、フニ！？"

[[dialogue]]
speaker = "unk"
# セシアがフニの額に手を触れて──
line = "セシアがフニの額に手を触れて──"

[[dialogue]]
speaker = "セシア"
# 「すごい熱だわ……！　この前測った時とは、比べものにならないくらい」
line = "「すごい熱だわ……！　この前測った時とは、比べものにならないくらい」"

[[dialogue]]
speaker = "フェニエル"
# 「……はぁ……はぁ……」
line = "「……はぁ……はぁ……」"

[[dialogue]]
speaker = "ルルカ"
# 「フニちゃん、しっかりして！　フニちゃん！」
line = "「フニちゃん、しっかりして！　フニちゃん！」"

[[dialogue]]
speaker = "unk"
# フニの意識は朦朧としているようで、俺たちの呼びかけに返事はない。
line = "フニの意識は朦朧としているようで、俺たちの呼びかけに返事はない。"

[[dialogue]]
speaker = "unk"
# ただ、小さく――
line = "ただ、小さく――"

[[dialogue]]
speaker = "フェニエル"
# 「ホウちゃんが……呼んでる……」
line = "「ホウちゃんが……呼んでる……」"

[[dialogue]]
speaker = "unk"
# そう呟いて、彼女は気を失ってしまうのだった――
line = "そう呟いて、彼女は気を失ってしまうのだった――"
