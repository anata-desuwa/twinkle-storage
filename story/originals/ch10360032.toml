[[dialogue]]
speaker = "unk"
# 第２話,子犬『ユニバース』の近況,P
line = "第２話,子犬『ユニバース』の近況,P"

[[dialogue]]
speaker = "unk"
# 以前、ヒルディー先輩は道に捨てられていた雑種の子犬（♀）を拾い、その子に『千園寺ユニバース』と名づけた。
line = "以前、ヒルディー先輩は道に捨てられていた雑種の子犬（♀）を拾い、その子に『千園寺ユニバース』と名づけた。"

[[dialogue]]
speaker = "unk"
# 流星寮で飼われることになり、今では『ユニ』という愛称で、寮生たちから可愛がられるアイドル的存在となっていた――
line = "流星寮で飼われることになり、今では『ユニ』という愛称で、寮生たちから可愛がられるアイドル的存在となっていた――"

[[dialogue]]
speaker = "フェニエル"
# 「ユニちゃん、はい♪　おやつをどうぞ～」
line = "「ユニちゃん、はい♪　おやつをどうぞ～」"

[[dialogue]]
speaker = "ユニバース"
# 「わんわん♪」
line = "「わんわん♪」"

[[dialogue]]
speaker = "unk"
# 嬉しそうに尻尾を振りながら、ぱたぱたと走ってきて、フェニエルの手の平にあるささみジャーキーを食べる。
line = "嬉しそうに尻尾を振りながら、ぱたぱたと走ってきて、フェニエルの手の平にあるささみジャーキーを食べる。"

[[dialogue]]
speaker = "フェニエル"
# 「ふふふっ、ユニちゃん、人懐っこくて、すごく可愛いです♪」
line = "「ふふふっ、ユニちゃん、人懐っこくて、すごく可愛いです♪」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ですわ♪　フニと同じように、健気でキュートですの♪」
line = "「ですわ♪　フニと同じように、健気でキュートですの♪」"

[[dialogue]]
speaker = "フェニエル"
# 「な、なんかそう言われると照れちゃいますね。えへへへ……♪」
line = "「な、なんかそう言われると照れちゃいますね。えへへへ……♪」"

[[dialogue]]
speaker = "unk"
# ちなみに、ユニバースの愛称を『ユニ』と決めたのは、先輩曰くフェニエルとちょっと雰囲気が似ていると思ったかららしい。
line = "ちなみに、ユニバースの愛称を『ユニ』と決めたのは、先輩曰くフェニエルとちょっと雰囲気が似ていると思ったかららしい。"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「――さあ、次は会長の番ですわ。今日こそ不可能を打ち破る時ですわよ！」
line = "「――さあ、次は会長の番ですわ。今日こそ不可能を打ち破る時ですわよ！」"

[[dialogue]]
speaker = "フェニエル"
# 「会長さん、けっぱって行きましょうっ」
line = "「会長さん、けっぱって行きましょうっ」"

[[dialogue]]
speaker = "unk"
# ユニ～、おやつ食べるか～？
line = "ユニ～、おやつ食べるか～？"

[[dialogue]]
speaker = "unk"
# よし……！
line = "よし……！"

[[dialogue]]
speaker = "unk"
# 俺は手の平にささみジャーキーを乗せて、ユニに呼びかける。
line = "俺は手の平にささみジャーキーを乗せて、ユニに呼びかける。"

[[dialogue]]
speaker = "ユニバース"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ヒルディオーネ"
# （ふむ、フニが呼んだ時と違って、ちょっと距離を開けたところから、立ち止まってじ～っと会長のことを見てますわね……）
line = "（ふむ、フニが呼んだ時と違って、ちょっと距離を開けたところから、立ち止まってじ～っと会長のことを見てますわね……）"

[[dialogue]]
speaker = "ヒルディオーネ"
# （ユニは前の飼い主から酷い扱いを受けていたのか、男性である会長に対しては、ずっと怖がっておりましたわ）
line = "（ユニは前の飼い主から酷い扱いを受けていたのか、男性である会長に対しては、ずっと怖がっておりましたわ）"

[[dialogue]]
speaker = "ヒルディオーネ"
# （ですが、毎日少しずつ慣れて、警戒は随分解けて来ているはずですの。だから、もうそろそろ……）
line = "（ですが、毎日少しずつ慣れて、警戒は随分解けて来ているはずですの。だから、もうそろそろ……）"

[[dialogue]]
speaker = "フェニエル"
# 「あ……！」
line = "「あ……！」"

[[dialogue]]
speaker = "ユニバース"
# 「……くんくん」
line = "「……くんくん」"

[[dialogue]]
speaker = "unk"
# ユニがそっと歩みを進めて、鼻先だけ近づけて、俺の手の匂いを嗅ぐような仕草をする。
line = "ユニがそっと歩みを進めて、鼻先だけ近づけて、俺の手の匂いを嗅ぐような仕草をする。"

[[dialogue]]
speaker = "unk"
# そして――
line = "そして――"

[[dialogue]]
speaker = "ユニバース"
# 「わぅん……！」
line = "「わぅん……！」"

[[dialogue]]
speaker = "unk"
# 俺の顔を窺うように見上げながら、あむっとささみジャーキーを口にする。
line = "俺の顔を窺うように見上げながら、あむっとささみジャーキーを口にする。"

[[dialogue]]
speaker = "フェニエル"
# 「やりましたっ♪　ユニちゃんがついに、会長さんの手からおやつを食べてくれました……！」
line = "「やりましたっ♪　ユニちゃんがついに、会長さんの手からおやつを食べてくれました……！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「エレガントですわ♪　会長、日々の努力が実りましたわね！」
line = "「エレガントですわ♪　会長、日々の努力が実りましたわね！」"

[[dialogue]]
speaker = "unk"
# 感動して、ちょっと泣きそう……
line = "感動して、ちょっと泣きそう……"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「あら、ふふっ♪　会長も涙ぐんでいるところ、私、初めて見たかもしれませんわ♪」
line = "「あら、ふふっ♪　会長も涙ぐんでいるところ、私、初めて見たかもしれませんわ♪」"

[[dialogue]]
speaker = "ユニバース"
# 「くぅ～ん……？」
line = "「くぅ～ん……？」"

[[dialogue]]
speaker = "unk"
# 自分が何か悪いことをしてしまったと思ったのか、俺の指をぺろぺろと舐めて、小首を傾げてくるユニ。
line = "自分が何か悪いことをしてしまったと思ったのか、俺の指をぺろぺろと舐めて、小首を傾げてくるユニ。"

[[dialogue]]
speaker = "unk"
# そんな姿が健気で可愛くて、俺は泣きそうになりながらも笑顔がこぼれてしまうのだった――
line = "そんな姿が健気で可愛くて、俺は泣きそうになりながらも笑顔がこぼれてしまうのだった――"

[[dialogue]]
speaker = "unk"
# それから数日経って。
line = "それから数日経って。"

[[dialogue]]
speaker = "unk"
# 俺がユニと触れ合えるようになったことで、その日はヒルディー先輩と一緒に、ユニの散歩デートをすることになった。
line = "俺がユニと触れ合えるようになったことで、その日はヒルディー先輩と一緒に、ユニの散歩デートをすることになった。"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「それで、ユニが会長と一緒に散歩できるようになったのは、喜ばしいことなのですけれど……」
line = "「それで、ユニが会長と一緒に散歩できるようになったのは、喜ばしいことなのですけれど……」"

[[dialogue]]
speaker = "ユニバース"
# 「わんわん<emoji=heart04>　きゅぅ～～ん<emoji=heart04>」
line = "「わんわん<emoji=heart04>　きゅぅ～～ん<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ユニは尻尾をぶんぶん振りながら俺の足元に駆け寄って来て、ごろんと寝転んでお腹を見せてくれる。
line = "ユニは尻尾をぶんぶん振りながら俺の足元に駆け寄って来て、ごろんと寝転んでお腹を見せてくれる。"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「あれからわずか数日で、この懐きっぷりは一体どういうことですの！？」
line = "「あれからわずか数日で、この懐きっぷりは一体どういうことですの！？」"

[[dialogue]]
speaker = "unk"
# ユニ～<emoji=heart04>　可愛いな～、よしよし<emoji=heart04>
line = "ユニ～<emoji=heart04>　可愛いな～、よしよし<emoji=heart04>"

[[dialogue]]
speaker = "ユニバース"
# 「きゅんきゅん<emoji=heart04>　くぅ～～ん<emoji=heart04><emoji=heart04>」
line = "「きゅんきゅん<emoji=heart04>　くぅ～～ん<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「会長が撫でている時の反応が、私が撫でる時よりも嬉しそうなのですけれど！？　語尾にハートマークが付いているのが、目に見えるようでしてよ！？」
line = "「会長が撫でている時の反応が、私が撫でる時よりも嬉しそうなのですけれど！？　語尾にハートマークが付いているのが、目に見えるようでしてよ！？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「――前にペットショップでバイトしていたことがあって、そこで色々な動物の撫で方スキルを学んだ？　その話は興味を惹かれますけれど……」
line = "「――前にペットショップでバイトしていたことがあって、そこで色々な動物の撫で方スキルを学んだ？　その話は興味を惹かれますけれど……」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「というか、会長の顔も、恋人の私でも滅多に見ないくらいデレデレになってますわよ！？」
line = "「というか、会長の顔も、恋人の私でも滅多に見ないくらいデレデレになってますわよ！？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「むぅ～～っ！　これはユニの散歩でもありますけれど、私とのデートでもありますのよ！」
line = "「むぅ～～っ！　これはユニの散歩でもありますけれど、私とのデートでもありますのよ！」"

[[dialogue]]
speaker = "マハムート"
# 「やれやれ、買い物しに行こうと外に出てみれば……」
line = "「やれやれ、買い物しに行こうと外に出てみれば……」"

[[dialogue]]
speaker = "マハムート"
# 「こんなところで頬を膨らませて、子犬と何を張り合っているのよ、あなたは……」
line = "「こんなところで頬を膨らませて、子犬と何を張り合っているのよ、あなたは……」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「あっ、マム！？　聞いて下さいまし！　実は会長がかくかくしかじかで――」
line = "「あっ、マム！？　聞いて下さいまし！　実は会長がかくかくしかじかで――」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「――私というものがありながら、ユニにデレデレになっておりますの！」
line = "「――私というものがありながら、ユニにデレデレになっておりますの！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「これではなんだか、私を差し置いて浮気みたいではありませんの！？」
line = "「これではなんだか、私を差し置いて浮気みたいではありませんの！？」"

[[dialogue]]
speaker = "マハムート"
# 「はぁ……仕方ないわね」
line = "「はぁ……仕方ないわね」"

[[dialogue]]
speaker = "マハムート"
# 「――<ruby=はた>端</ruby>から見ると、浮気というより、あなた達、『子連れの夫婦』みたいに見えるわよ？」
line = "「――<ruby>端<rt>はた</rt></ruby>から見ると、浮気というより、あなた達、『子連れの夫婦』みたいに見えるわよ？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ですわ！？　ふ、夫婦……！？」
line = "「ですわ！？　ふ、夫婦……！？」"

[[dialogue]]
speaker = "マハムート"
# 「ええ。会長がデレデレになっているのは、女の子に鼻の下を伸ばしているんじゃなくて、小さい子供が可愛くて仕方ないって感じじゃない？」
line = "「ええ。会長がデレデレになっているのは、女の子に鼻の下を伸ばしているんじゃなくて、小さい子供が可愛くて仕方ないって感じじゃない？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「……！　な、なるほど。そうでしたのね……」
line = "「……！　な、なるほど。そうでしたのね……」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「わ、私と会長が、夫婦……<emoji=heart04>」
line = "「わ、私と会長が、夫婦……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ――あれ？　先輩、どうかしました？
line = "――あれ？　先輩、どうかしました？"

[[dialogue]]
speaker = "unk"
# 俺はユニとの触れ合いを一旦堪能し終えたところで、マムがいつの間にかやって来ていて、ヒルディー先輩の様子が変であることに気づく。
line = "俺はユニとの触れ合いを一旦堪能し終えたところで、マムがいつの間にかやって来ていて、ヒルディー先輩の様子が変であることに気づく。"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「あっ、いえ！　なんでもありませんのよ、おほほほほっ♪」
line = "「あっ、いえ！　なんでもありませんのよ、おほほほほっ♪」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「もう大丈夫ですわ――旦那様<emoji=heart04>」
line = "「もう大丈夫ですわ――旦那様<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 旦那様！？
line = "旦那様！？"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「うふふふふ……<emoji=heart04>」
line = "「うふふふふ……<emoji=heart04>」"

[[dialogue]]
speaker = "マハムート"
# 「やれやれ。手の平回転ドリルね、あなたの飼い主は」
line = "「やれやれ。手の平回転ドリルね、あなたの飼い主は」"

[[dialogue]]
speaker = "ユニバース"
# 「わん♪」
line = "「わん♪」"

[[dialogue]]
speaker = "unk"
# マムは、挨拶するように足元にやって来たユニを抱っこすると、その頭を撫でながら、肩をすくめてみせるのだった――
line = "マムは、挨拶するように足元にやって来たユニを抱っこすると、その頭を撫でながら、肩をすくめてみせるのだった――"
