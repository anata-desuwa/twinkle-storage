[[dialogue]]
speaker = "ヴィーナス"
# 「死神……ね」
line = "「死神……ね」"

[[dialogue]]
speaker = "アナ"
# 「はい。流星市国近隣で『死神を見た』という噂が広まっています。漆黒の装束をまとい、大鎌を持った人物……いわゆる死神の姿をした何者かを目撃したと」
line = "「はい。流星市国近隣で『死神を見た』という噂が広まっています。漆黒の装束をまとい、大鎌を持った人物……いわゆる死神の姿をした何者かを目撃したと」"

[[dialogue]]
speaker = "マトイ"
# 「流星市国のあちこちで目撃される死神……なんか不吉……」
line = "「流星市国のあちこちで目撃される死神……なんか不吉……」"

[[dialogue]]
speaker = "マトイ"
# 「一応聞きますけど、サーシャさんじゃないですよね？　サーシャさんも黒いし大鎌使ってますけど」
line = "「一応聞きますけど、サーシャさんじゃないですよね？　サーシャさんも黒いし大鎌使ってますけど」"

[[dialogue]]
speaker = "サーシャ"
# 「違うわよ～。私、死神っぽくなんてないでしょ？」
line = "「違うわよ～。私、死神っぽくなんてないでしょ？」"

[[dialogue]]
speaker = "マトイ"
# 「でも戦ってる時のサーシャさんの冷たさはちょっと死神っぽいような気も……」
line = "「でも戦ってる時のサーシャさんの冷たさはちょっと死神っぽいような気も……」"

[[dialogue]]
speaker = "アナ"
# 「いえ。状況から考えるに、会長や前会長が先日戦った堕天使と推定するのが自然かと」
line = "「いえ。状況から考えるに、会長や前会長が先日戦った堕天使と推定するのが自然かと」"

[[dialogue]]
speaker = "unk"
# 数日前、俺とヴィーナス、フィオナでフィーニスの塔を探索していた時のこと。
line = "数日前、俺とヴィーナス、フィオナでフィーニスの塔を探索していた時のこと。"

[[dialogue]]
speaker = "unk"
# そこで遭遇したのは──
line = "そこで遭遇したのは──"

[[dialogue]]
speaker = "フィオナ"
# 「くっ……強い……！」
line = "「くっ……強い……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そこよ！」
line = "「そこよ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あ、避けられた！　くぅ～、すばしっこいわね！」
line = "「あ、避けられた！　くぅ～、すばしっこいわね！」"

[[dialogue]]
speaker = "フィオナ"
# 「黒いオーラに包まれて姿が捉えづらいですね……。この力、そして気配……彼女は堕天使のようです」
line = "「黒いオーラに包まれて姿が捉えづらいですね……。この力、そして気配……彼女は堕天使のようです」"

[[dialogue]]
speaker = "フィオナ"
# 「ですが好きにはさせません。まずは動きを止めます！」
line = "「ですが好きにはさせません。まずは動きを止めます！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「いい足止めよ、フィオナ！　私もいくわよ──ディバインスフィア！」
line = "「いい足止めよ、フィオナ！　私もいくわよ──ディバインスフィア！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロト！　お願い！」
line = "「クロト！　お願い！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「さすがクロト！　堕天使も木っ端ミジンコね♪」
line = "「さすがクロト！　堕天使も木っ端ミジンコね♪」"

[[dialogue]]
speaker = "unk"
# あまり手応えがなかったような……
line = "あまり手応えがなかったような……"

[[dialogue]]
speaker = "フィオナ"
# 「はい、妙にあっさりしていたような……本当に倒せたのでしょうか」
line = "「はい、妙にあっさりしていたような……本当に倒せたのでしょうか」"

[[dialogue]]
speaker = "ヴィーナス"
# 「え、そう？　うーん……恐れをなして逃げたのかしら」
line = "「え、そう？　うーん……恐れをなして逃げたのかしら」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ほんとに倒せてなかったのね……不覚だわ」
line = "「ほんとに倒せてなかったのね……不覚だわ」"

[[dialogue]]
speaker = "アナ"
# 「堕天使になっていたのは守護天使《試練》のパテル。守護する摂理は『淘汰』。……環境に適応できなかったものを滅する存在だそうです」
line = "「堕天使になっていたのは守護天使《試練》のパテル。守護する摂理は『淘汰』。……環境に適応できなかったものを滅する存在だそうです」"

[[dialogue]]
speaker = "マトイ"
# 「滅する……当然殺すって意味よね」
line = "「滅する……当然殺すって意味よね」"

[[dialogue]]
speaker = "サーシャ"
# 「つまり本物の死神ってことね～」
line = "「つまり本物の死神ってことね～」"

[[dialogue]]
speaker = "unk"
# 堕天使……死神……
line = "堕天使……死神……"

[[dialogue]]
speaker = "マトイ"
# 「その堕天使は逃げて何をしようとしているんだろ……？　前は暴れるだけだったのに」
line = "「その堕天使は逃げて何をしようとしているんだろ……？　前は暴れるだけだったのに」"

[[dialogue]]
speaker = "サーシャ"
# 「死神であるからには、あの世に連れていく人を探しているのかしら～？」
line = "「死神であるからには、あの世に連れていく人を探しているのかしら～？」"

[[dialogue]]
speaker = "マトイ"
# 「うう……怖い……」
line = "「うう……怖い……」"

[[dialogue]]
speaker = "アナ"
# 「詳しいことは不明です。今はおとなしくしてるようですが、野放しにしておくわけにはいきません」
line = "「詳しいことは不明です。今はおとなしくしてるようですが、野放しにしておくわけにはいきません」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええ！　早く見つけて今度こそ正気に戻してあげるわ！」
line = "「ええ！　早く見つけて今度こそ正気に戻してあげるわ！」"

[[dialogue]]
speaker = "unk"
# そうして星徒会は堕天使パテルの捜索を開始。
line = "そうして星徒会は堕天使パテルの捜索を開始。"

[[dialogue]]
speaker = "unk"
# しかしパトロールの途中でモンスターと遭遇し、戦闘に突入した。
line = "しかしパトロールの途中でモンスターと遭遇し、戦闘に突入した。"

[[dialogue]]
speaker = "イグニック"
# 「イィィイイイイッ！」
line = "「イィィイイイイッ！」"

[[dialogue]]
speaker = "女の子"
# 「きゃあああっ！？」
line = "「きゃあああっ！？」"

[[dialogue]]
speaker = "unk"
# 危ない！
line = "危ない！"

[[dialogue]]
speaker = "女の子"
# 「ありがとう、お兄ちゃん！」
line = "「ありがとう、お兄ちゃん！」"

[[dialogue]]
speaker = "？？？"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "？？？"
# 「ん？　ああ、あたしのことは気にせず続けて続けて。ほら、またお客さん来てるよ」
line = "「ん？　ああ、あたしのことは気にせず続けて続けて。ほら、またお客さん来てるよ」"

[[dialogue]]
speaker = "ダークキングフワッチ"
# 「ーーーーーッ！！」
line = "「ーーーーーッ！！」"

[[dialogue]]
speaker = "？？？"
# 「そいつで最後みたいだから頑張ってね～」
line = "「そいつで最後みたいだから頑張ってね～」"

[[dialogue]]
speaker = "？？？"
# 「やーお疲れさまー。虫歯のカバみたいな暴れっぷりだったね」
line = "「やーお疲れさまー。虫歯のカバみたいな暴れっぷりだったね」"

[[dialogue]]
speaker = "unk"
# どうして見ているだけだったんだ？
line = "どうして見ているだけだったんだ？"

[[dialogue]]
speaker = "？？？"
# 「あの女の子を助けられたのにって？　ん～、そだなー……」
line = "「あの女の子を助けられたのにって？　ん～、そだなー……」"

[[dialogue]]
speaker = "？？？"
# 「たとえばさ、あたしが助けた猫がネズミを殺したら、あたしがネズミを殺したことにならない？　だからあんまり手出ししたくないんだよねー」
line = "「たとえばさ、あたしが助けた猫がネズミを殺したら、あたしがネズミを殺したことにならない？　だからあんまり手出ししたくないんだよねー」"

[[dialogue]]
speaker = "？？？"
# 「ハハ、よくわかんないって顔してるね、おにーさん♪」
line = "「ハハ、よくわかんないって顔してるね、おにーさん♪」"

[[dialogue]]
speaker = "？？？"
# 「──って、あそっか、この制服着てるのにって話か。ほらあれ、あたしプリなんとか……プリンステーキじゃないし」
line = "「──って、あそっか、この制服着てるのにって話か。ほらあれ、あたしプリなんとか……プリンステーキじゃないし」"

[[dialogue]]
speaker = "？？？"
# 「縁があったらまた会おうね。シーユー♪」
line = "「縁があったらまた会おうね。シーユー♪」"

[[dialogue]]
speaker = "unk"
# 不思議な子だったな……
line = "不思議な子だったな……"

[[dialogue]]
speaker = "unk"
# その後パトロールを続けるも、堕天使パテルは発見できなかったのだった。
line = "その後パトロールを続けるも、堕天使パテルは発見できなかったのだった。"
