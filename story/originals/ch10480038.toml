[[dialogue]]
speaker = "unk"
# 休日を翌日に控えた、とある放課後。ここのところ星徒会の仕事が忙しく、俺は残業で居残っていた。
line = "休日を翌日に控えた、とある放課後。ここのところ星徒会の仕事が忙しく、俺は残業で居残っていた。"

[[dialogue]]
speaker = "unk"
# マムが遠回しな言い方ながらも、俺の家に泊まるかも？　という示唆をしていたので、久しぶりにエッチなことを期待していたのだが、すっかり夜遅くなってしまった。
line = "マムが遠回しな言い方ながらも、俺の家に泊まるかも？　という示唆をしていたので、久しぶりにエッチなことを期待していたのだが、すっかり夜遅くなってしまった。"

[[dialogue]]
speaker = "unk"
# ようやく残業が終わりＤＩＳＣで連絡を入れるも、既読表示のまま返事は無く、もしかして怒らせてしまっただろうかと不安になっていた時――
