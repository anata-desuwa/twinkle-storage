[[dialogue]]
speaker = "unk"
# 第４話,アニュラスとすれ違い……？,P
line = "第４話,アニュラスとすれ違い……？,P"

[[dialogue]]
speaker = "unk"
# 最近アニュラスが、俺と一緒にいるのを避けているような気がする。学園内で出会ってもどこかよそよそしいというか……
line = "最近アニュラスが、俺と一緒にいるのを避けているような気がする。学園内で出会ってもどこかよそよそしいというか……"

[[dialogue]]
speaker = "unk"
# 例えば、こんな感じ──
line = "例えば、こんな感じ──"

[[dialogue]]
speaker = "ヨミ"
# 「そうですね。例えばこれとか……あとはこっちのメニューをよく頼まれている気がします」
line = "「そうですね。例えばこれとか……あとはこっちのメニューをよく頼まれている気がします」"

[[dialogue]]
speaker = "アニュラス"
# 「なるほど……全体的に濃いめの味付けのものが多いな。ヘルシーなものよりも肉類が多い……？」
line = "「なるほど……全体的に濃いめの味付けのものが多いな。ヘルシーなものよりも肉類が多い……？」"

[[dialogue]]
speaker = "ヨミ"
# 「トレーニングもハードでしょうから、やっぱりお腹が空くんじゃないでしょうか？　男の子ですし、がっつり系が多い印象ですね！」
line = "「トレーニングもハードでしょうから、やっぱりお腹が空くんじゃないでしょうか？　男の子ですし、がっつり系が多い印象ですね！」"

[[dialogue]]
speaker = "アニュラス"
# 「ふむ。やはりカフェの現場で働く方の意見は参考になる……！」
line = "「ふむ。やはりカフェの現場で働く方の意見は参考になる……！」"

[[dialogue]]
speaker = "unk"
# 何の話をしてるの？
line = "何の話をしてるの？"

[[dialogue]]
speaker = "unk"
# ２人が一緒なのは新鮮だね
line = "２人が一緒なのは新鮮だね"

[[dialogue]]
speaker = "アニュラス"
# 「っ！？　か、会長！？　ななな、何でもない！　大したことじゃないんだ！　なあヨミ！」
line = "「っ！？　か、会長！？　ななな、何でもない！　大したことじゃないんだ！　なあヨミ！」"

[[dialogue]]
speaker = "ヨミ"
# 「こやっ！？　は、はいっ、ほんと些細な雑談というかっ……ここで会ったのもとっても爆裂な偶然なんですっ！」
line = "「こやっ！？　は、はいっ、ほんと些細な雑談というかっ……ここで会ったのもとっても爆裂な偶然なんですっ！」"

[[dialogue]]
speaker = "アニュラス"
# 「そうその通り！　で、ではな！　ぁ、ヨミ、参考になった。ありがとう。それでは私は失礼する──！」
line = "「そうその通り！　で、ではな！　ぁ、ヨミ、参考になった。ありがとう。それでは私は失礼する──！」"

[[dialogue]]
speaker = "unk"
# 俺が話しかけるとなぜか慌ててどこかに行ってしまうアニュラス。彼女が俺を避ける理由がまったくわからない……
line = "俺が話しかけるとなぜか慌ててどこかに行ってしまうアニュラス。彼女が俺を避ける理由がまったくわからない……"

[[dialogue]]
speaker = "unk"
# 他にはこんなこともあったっけ──
line = "他にはこんなこともあったっけ──"

[[dialogue]]
speaker = "モネ"
# 「アニュラスさん、どうでしょう。ご要望どおりの本をそろえておきましたよ。お役に立てばよいのですが……」
line = "「アニュラスさん、どうでしょう。ご要望どおりの本をそろえておきましたよ。お役に立てばよいのですが……」"

[[dialogue]]
speaker = "アニュラス"
# 「ふむ……これはいいな！　写真がたくさん載っていて工程がわかりやすい。こういうのを探していたんだ！」
line = "「ふむ……これはいいな！　写真がたくさん載っていて工程がわかりやすい。こういうのを探していたんだ！」"

[[dialogue]]
speaker = "アニュラス"
# 「モネ先輩、ありがとう。こんなにたくさんの本を集めてくれて……大変だったのではないか？」
line = "「モネ先輩、ありがとう。こんなにたくさんの本を集めてくれて……大変だったのではないか？」"

[[dialogue]]
speaker = "モネ"
# 「いえいえ。レファレンスは図書委員の本業ですから！　今後もぜひご活用くださいね」
line = "「いえいえ。レファレンスは図書委員の本業ですから！　今後もぜひご活用くださいね」"

[[dialogue]]
speaker = "unk"
# 何の本を借りてるの？
line = "何の本を借りてるの？"

[[dialogue]]
speaker = "unk"
# アニュラスが図書館なんて珍しいね
line = "アニュラスが図書館なんて珍しいね"

[[dialogue]]
speaker = "アニュラス"
# 「っ！　かかか、会長っ！？　──何でもないっ！　大したことは何もないぞっ！　なぁモネ先輩！？」
line = "「っ！　かかか、会長っ！？　──何でもないっ！　大したことは何もないぞっ！　なぁモネ先輩！？」"

[[dialogue]]
speaker = "モネ"
# 「そそそ、そうですね！　ちょっとお喋りをしていただけですので……あはは……！」
line = "「そそそ、そうですね！　ちょっとお喋りをしていただけですので……あはは……！」"

[[dialogue]]
speaker = "アニュラス"
# 「あー用事を思い出した！　そろそろ鍛錬の時間だったな！　私はこれで失礼する──！」
line = "「あー用事を思い出した！　そろそろ鍛錬の時間だったな！　私はこれで失礼する──！」"

[[dialogue]]
speaker = "unk"
# こんなことが数日続いているのだ。アニュラスと過ごせる時間が激減していて、正直けっこう辛い。
line = "こんなことが数日続いているのだ。アニュラスと過ごせる時間が激減していて、正直けっこう辛い。"

[[dialogue]]
speaker = "unk"
# だけど今日は問題ないだろう。なぜなら俺の誕生日なのだ。忙しそうなアニュラスだって、流石に一緒に過ごしてくれるはず──
line = "だけど今日は問題ないだろう。なぜなら俺の誕生日なのだ。忙しそうなアニュラスだって、流石に一緒に過ごしてくれるはず──"

[[dialogue]]
speaker = "アニュラス"
# 「すまない会長。今日は用事があるから先に帰らせてもらう」
line = "「すまない会長。今日は用事があるから先に帰らせてもらう」"

[[dialogue]]
speaker = "unk"
# えぇっ！？
line = "えぇっ！？"

[[dialogue]]
speaker = "アニュラス"
# 「ああ、そうだ、このメモを渡しておく。リノお母様からお前宛てだ。何でも学校帰りにおつかいをしてくれとのことだ。ではな」
line = "「ああ、そうだ、このメモを渡しておく。リノお母様からお前宛てだ。何でも学校帰りにおつかいをしてくれとのことだ。ではな」"

[[dialogue]]
speaker = "unk"
# …………泣いてもいいかな、俺
line = "…………泣いてもいいかな、俺"

[[dialogue]]
speaker = "unk"
# 母さんの命じたおつかいは、分厚い学術書の購入。街中の本屋をはしごすることになってしまい、自宅にたどり着いた時にはすっかり日が暮れていた。
line = "母さんの命じたおつかいは、分厚い学術書の購入。街中の本屋をはしごすることになってしまい、自宅にたどり着いた時にはすっかり日が暮れていた。"

[[dialogue]]
speaker = "unk"
# お腹は空いているし、恋人とデートもできないし、散々な誕生日だ──
line = "お腹は空いているし、恋人とデートもできないし、散々な誕生日だ──"

[[dialogue]]
speaker = "unk"
# ただいまー……
line = "ただいまー……"

[[dialogue]]
speaker = "アニュラス"
# 「お、お帰り会長！　それと……誕生日おめでとう！」
line = "「お、お帰り会長！　それと……誕生日おめでとう！」"

[[dialogue]]
speaker = "unk"
# しかも俺の好物ばかり……！！
line = "しかも俺の好物ばかり……！！"

[[dialogue]]
speaker = "unk"
# え……すごい量のご馳走が！？
line = "え……すごい量のご馳走が！？"

[[dialogue]]
speaker = "リノ"
# 「ふふ、アニュラスちゃんが全部、１人で作ったのよ？」
line = "「ふふ、アニュラスちゃんが全部、１人で作ったのよ？」"

[[dialogue]]
speaker = "リノ"
# 「学園のカフェであなたの好きなメニューの聞き取りをしたり、図書館でレシピ本を探したり。最近は毎日、放課後にうちでお料理の特訓までしてたんだから！」
line = "「学園のカフェであなたの好きなメニューの聞き取りをしたり、図書館でレシピ本を探したり。最近は毎日、放課後にうちでお料理の特訓までしてたんだから！」"

[[dialogue]]
speaker = "アニュラス"
# 「リノお母様にもたくさんサポートをしてもらったんだ。私は包丁の握り方から危うかったからな……」
line = "「リノお母様にもたくさんサポートをしてもらったんだ。私は包丁の握り方から危うかったからな……」"

[[dialogue]]
speaker = "リノ"
# 「最初はちょっぴり心配だったけど、アニュラスちゃん真面目だし素直だから教えがいがあったわ～、ふふ♪　これからも息子をよろしくね！」
line = "「最初はちょっぴり心配だったけど、アニュラスちゃん真面目だし素直だから教えがいがあったわ～、ふふ♪　これからも息子をよろしくね！」"

[[dialogue]]
speaker = "アニュラス"
# 「は、はい……！　こちらこそっ……！」
line = "「は、はい……！　こちらこそっ……！」"

[[dialogue]]
speaker = "unk"
# てっきり嫌われたのかと……
line = "てっきり嫌われたのかと……"

[[dialogue]]
speaker = "unk"
# ここのところ、よそよそしかったから
line = "ここのところ、よそよそしかったから"

[[dialogue]]
speaker = "アニュラス"
# 「そ、そんなわけないだろう！？　その、サプライズをしたかっただけなんだ。不安にさせてしまったか……？」
line = "「そ、そんなわけないだろう！？　その、サプライズをしたかっただけなんだ。不安にさせてしまったか……？」"

[[dialogue]]
speaker = "リノ"
# 「よかったわね～、クロト。こーんないい子、今後絶対に見つからないわよ？　大事にしなさい！」
line = "「よかったわね～、クロト。こーんないい子、今後絶対に見つからないわよ？　大事にしなさい！」"

[[dialogue]]
speaker = "アニュラス"
# 「じゃ、じゃあ手を洗ってきたら食べようか。会長」
line = "「じゃ、じゃあ手を洗ってきたら食べようか。会長」"

[[dialogue]]
speaker = "unk"
# その後、アニュラスと母さんの３人で、ささやかな誕生日パーティを楽しんだ。
line = "その後、アニュラスと母さんの３人で、ささやかな誕生日パーティを楽しんだ。"

[[dialogue]]
speaker = "unk"
# アニュラスの手料理はどれも頬が落ちるほどに美味しくて……家事の苦手な彼女が、俺の為に頑張ってくれたことがすごく嬉しくて。
line = "アニュラスの手料理はどれも頬が落ちるほどに美味しくて……家事の苦手な彼女が、俺の為に頑張ってくれたことがすごく嬉しくて。"

[[dialogue]]
speaker = "unk"
# アニュラスの誕生日には、俺も真心を込めてお祝いしないといけないなと思うのだった──
line = "アニュラスの誕生日には、俺も真心を込めてお祝いしないといけないなと思うのだった──"
