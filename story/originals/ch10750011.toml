[[dialogue]]
speaker = "unk"
# 第１話,おなか部のチョロ危うい副部長,P
line = "第１話,おなか部のチョロ危うい副部長,P"

[[dialogue]]
speaker = "unk"
# 彼女と初めて出会ったのは、とある休日のことだった。
line = "彼女と初めて出会ったのは、とある休日のことだった。"

[[dialogue]]
speaker = "シフォン"
# 「ええと、この辺りのはずなんですが──……わぷっ！？」
line = "「ええと、この辺りのはずなんですが──……わぷっ！？」"

[[dialogue]]
speaker = "シフォン"
# 「す、すみません、不注意でした。……って、あれ？　あなたの顔、どこかで……」
line = "「す、すみません、不注意でした。……って、あれ？　あなたの顔、どこかで……」"

[[dialogue]]
speaker = "シフォン"
# 「もしかして星徒会長さんですか？　緋宮会長さんですよね？　お近くで見るのは初めてだったので、パっとわかりませんでしたよ」
line = "「もしかして星徒会長さんですか？　緋宮会長さんですよね？　お近くで見るのは初めてだったので、パっとわかりませんでしたよ」"

[[dialogue]]
speaker = "シフォン"
# 「あ、馴れ馴れしく話し始めてしまってすみません。実は私も新星学園の生徒でして」
line = "「あ、馴れ馴れしく話し始めてしまってすみません。実は私も新星学園の生徒でして」"

[[dialogue]]
speaker = "シフォン"
# 「はじめまして。シフォン・デビルズホープです。まぁプリマステラでもない木っ端星騎士なので名乗っても仕方ないかもですが……」
line = "「はじめまして。シフォン・デビルズホープです。まぁプリマステラでもない木っ端星騎士なので名乗っても仕方ないかもですが……」"

[[dialogue]]
speaker = "シフォン"
# 「そうだ、ここで会ったのも何かの縁です。私の名前はともかく、おなか部の名前だけでも覚えていってくださいよ」
line = "「そうだ、ここで会ったのも何かの縁です。私の名前はともかく、おなか部の名前だけでも覚えていってくださいよ」"

[[dialogue]]
speaker = "シフォン"
# 「私を含めて幼馴染み３人だけの小さな部活なんですけどね？　私たちなりに人助けをして回ってるんです。私は一応、そこの副部長をしていまして」
line = "「私を含めて幼馴染み３人だけの小さな部活なんですけどね？　私たちなりに人助けをして回ってるんです。私は一応、そこの副部長をしていまして」"

[[dialogue]]
speaker = "シフォン"
# 「まぁ星徒会さんに比べたら極々小さなお悩み相談に乗ってる程度なんですけど。ゴミ拾いや迷子の猫探しが精々と言いますか」
line = "「まぁ星徒会さんに比べたら極々小さなお悩み相談に乗ってる程度なんですけど。ゴミ拾いや迷子の猫探しが精々と言いますか」"

[[dialogue]]
speaker = "unk"
# 立派な活動じゃないか
line = "立派な活動じゃないか"

[[dialogue]]
speaker = "シフォン"
# 「ふふ、そう言ってもらえると嬉しいです。一応私たちも星騎士の端くれですからね。誰かのために何かできればと思ってまして」
line = "「ふふ、そう言ってもらえると嬉しいです。一応私たちも星騎士の端くれですからね。誰かのために何かできればと思ってまして」"

[[dialogue]]
speaker = "シフォン"
# 「会長さんも何か困ったことがあれば、どしどし相談してください！　備品の買い出しから、ヴィーナスさんへの代理謝罪までなんでも引き受けますから！」
line = "「会長さんも何か困ったことがあれば、どしどし相談してください！　備品の買い出しから、ヴィーナスさんへの代理謝罪までなんでも引き受けますから！」"

[[dialogue]]
speaker = "シフォン"
# 「今もちょうど相談者さんのところへ向かっているところでして──……って、そうでした！　こうしちゃいられません……！」
line = "「今もちょうど相談者さんのところへ向かっているところでして──……って、そうでした！　こうしちゃいられません……！」"

[[dialogue]]
speaker = "シフォン"
# 「あのっ、この住所ってどこかわかりますかっ？　この辺りにある建物なんだそうですが……！」
line = "「あのっ、この住所ってどこかわかりますかっ？　この辺りにある建物なんだそうですが……！」"

[[dialogue]]
speaker = "シフォン"
# 「なるほど……！　あの廃ビルですね……！　ありがとうございます！　ちょっと行ってきます……！」
line = "「なるほど……！　あの廃ビルですね……！　ありがとうございます！　ちょっと行ってきます……！」"

[[dialogue]]
speaker = "unk"
# ちょっと待った！　何か怪しい！
line = "ちょっと待った！　何か怪しい！"

[[dialogue]]
speaker = "シフォン"
# 「ぶべっ！？　いきなり人の首根っこ掴まないでくださいよ！？　一瞬、息が止まっちゃったじゃないですかっ！」
line = "「ぶべっ！？　いきなり人の首根っこ掴まないでくださいよ！？　一瞬、息が止まっちゃったじゃないですかっ！」"

[[dialogue]]
speaker = "シフォン"
# 「そもそも怪しいってなんですかっ。相談してくれた人に失礼ですよっ。あのおじさんたち、相当切羽詰まっているみたいなんですから……！」
line = "「そもそも怪しいってなんですかっ。相談してくれた人に失礼ですよっ。あのおじさんたち、相当切羽詰まっているみたいなんですから……！」"

[[dialogue]]
speaker = "シフォン"
# 「街を散歩していた私にまで声をかけてきたくらいですっ。なんでも、撮影する映画の主役が見つからないだとかで……！」
line = "「街を散歩していた私にまで声をかけてきたくらいですっ。なんでも、撮影する映画の主役が見つからないだとかで……！」"

[[dialogue]]
speaker = "シフォン"
# 「私が映画の主役だなんて分不相応にも程がありますが──しかし、おなか部の一員として困っている人は見過ごせませんからね……！」
line = "「私が映画の主役だなんて分不相応にも程がありますが──しかし、おなか部の一員として困っている人は見過ごせませんからね……！」"

[[dialogue]]
speaker = "シフォン"
# 「言われたとおり、わざわざ制服に着替えて戻ってきたんです……！　その方が映画の価値もあがるというお話でしたし……！」
line = "「言われたとおり、わざわざ制服に着替えて戻ってきたんです……！　その方が映画の価値もあがるというお話でしたし……！」"

[[dialogue]]
speaker = "シフォン"
# 「あ、そうだっ。学生証も忘れずにと言われてましたね。よし、ちゃんとあります……！　では急いでますので私はこれで──」
line = "「あ、そうだっ。学生証も忘れずにと言われてましたね。よし、ちゃんとあります……！　では急いでますので私はこれで──」"

[[dialogue]]
speaker = "シフォン"
# 「──ぶべっ！？　また人の首根っこ掴んでなんですか！？　随分待たせてしまってるんですっ。一刻も早くおじさんたちのもとへ駆けつけてあげませんと──……」
line = "「──ぶべっ！？　また人の首根っこ掴んでなんですか！？　随分待たせてしまってるんですっ。一刻も早くおじさんたちのもとへ駆けつけてあげませんと──……」"

[[dialogue]]
speaker = "シフォン"
# 「……へ？　騙されてる？　どういう意味ですか？」
line = "「……へ？　騙されてる？　どういう意味ですか？」"

[[dialogue]]
speaker = "シフォン"
# 「あ、危ないところでした……。映画の撮影って、そういう……。あ、あのおじさんたち、人の善意に付け込んでなんて企みを……！」
line = "「あ、危ないところでした……。映画の撮影って、そういう……。あ、あのおじさんたち、人の善意に付け込んでなんて企みを……！」"

[[dialogue]]
speaker = "unk"
# 知らないおじさんについて行っちゃダメだよ
line = "知らないおじさんについて行っちゃダメだよ"

[[dialogue]]
speaker = "シフォン"
# 「ぐふっ！？　し、仕方ないじゃないですか……！　私の目には本当に困ってるように見えたんです……！」
line = "「ぐふっ！？　し、仕方ないじゃないですか……！　私の目には本当に困ってるように見えたんです……！」"

[[dialogue]]
speaker = "シフォン"
# 「……でも確かにおじさんたちの言葉を鵜呑みにしすぎていたかもしれませんね。羽根を褒められた時点で騙されていると気付くべきでした……」
line = "「……でも確かにおじさんたちの言葉を鵜呑みにしすぎていたかもしれませんね。羽根を褒められた時点で騙されていると気付くべきでした……」"

[[dialogue]]
speaker = "シフォン"
# 「こんな黒い羽根がチャームポイントになるはずありませんもん。小さい頃から変な目で見られたり、怖がられてばかりでしたから……」
line = "「こんな黒い羽根がチャームポイントになるはずありませんもん。小さい頃から変な目で見られたり、怖がられてばかりでしたから……」"

[[dialogue]]
speaker = "シフォン"
# 「私、その……。天魔と呼ばれる、天使と魔族の混血なんです。一族全員、天使のくせに羽根が黒くって……」
line = "「私、その……。天魔と呼ばれる、天使と魔族の混血なんです。一族全員、天使のくせに羽根が黒くって……」"

[[dialogue]]
speaker = "シフォン"
# 「この姿……ちっとも天使らしくありませんよね。だからと言って魔族らしくもないと言いますか……」
line = "「この姿……ちっとも天使らしくありませんよね。だからと言って魔族らしくもないと言いますか……」"

[[dialogue]]
speaker = "シフォン"
# 「性格だけは天使と魔族の特色を色濃く継いじゃってるんですがね……。一族みんな、人を疑うことを知らない上に大雑把ですし……」
line = "「性格だけは天使と魔族の特色を色濃く継いじゃってるんですがね……。一族みんな、人を疑うことを知らない上に大雑把ですし……」"

[[dialogue]]
speaker = "シフォン"
# 「子どもの頃はこの容姿のせいで辛い想いもしちゃったものですから、おじさんたちに褒められて浮かれちゃってたのかもしれません……」
line = "「子どもの頃はこの容姿のせいで辛い想いもしちゃったものですから、おじさんたちに褒められて浮かれちゃってたのかもしれません……」"

[[dialogue]]
speaker = "シフォン"
# 「あはは、我ながらチョロいですね……。幼馴染みから脳筋アホの子って言われちゃうのも当然と言いますか……」
line = "「あはは、我ながらチョロいですね……。幼馴染みから脳筋アホの子って言われちゃうのも当然と言いますか……」"

[[dialogue]]
speaker = "unk"
# 俺も羽根はすごく格好いいと思うけど
line = "俺も羽根はすごく格好いいと思うけど"

[[dialogue]]
speaker = "シフォン"
# 「へ……？　ほ、本当ですかっ？　本当にっ……！？」
line = "「へ……？　ほ、本当ですかっ？　本当にっ……！？」"

[[dialogue]]
speaker = "シフォン"
# 「って──……もう騙されませんよ！　おじさんたちにもそう言われて舞い上がっちゃったんですから……！」
line = "「って──……もう騙されませんよ！　おじさんたちにもそう言われて舞い上がっちゃったんですから……！」"

[[dialogue]]
speaker = "シフォン"
# 「あんまり私をからかわないでください。会長さんも私を変な場所へ連れて行くつもりじゃないでしょうね……！」
line = "「あんまり私をからかわないでください。会長さんも私を変な場所へ連れて行くつもりじゃないでしょうね……！」"

[[dialogue]]
speaker = "シフォン"
# 「それで、その……。実際のところどうなんですか？　本当に、その……私の羽根が格好いいと思ってくれてるんですか？」
line = "「それで、その……。実際のところどうなんですか？　本当に、その……私の羽根が格好いいと思ってくれてるんですか？」"

[[dialogue]]
speaker = "unk"
# ああ
line = "ああ"

[[dialogue]]
speaker = "シフォン"
# 「そ、そうですか、えへへ……」
line = "「そ、そうですか、えへへ……」"

[[dialogue]]
speaker = "シフォン"
# 「って！　なんですか、その顔……！　ホントにチョロいな、とか思ってますよね……！？　全然喜んでなんかいませんからね……！」
line = "「って！　なんですか、その顔……！　ホントにチョロいな、とか思ってますよね……！？　全然喜んでなんかいませんからね……！」"

[[dialogue]]
speaker = "シフォン"
# 「ともかく、ええと。危ないところを助けてくださってありがとうございました。会長さんが引き止めてくれなかったらどうなっていたことか」
line = "「ともかく、ええと。危ないところを助けてくださってありがとうございました。会長さんが引き止めてくれなかったらどうなっていたことか」"

[[dialogue]]
speaker = "シフォン"
# 「何かお礼をさせてくださいよ。困ってることとかありません？　おなか部の一員としてモンスター退治以外のことならなんでも請け負いますよ？」
line = "「何かお礼をさせてくださいよ。困ってることとかありません？　おなか部の一員としてモンスター退治以外のことならなんでも請け負いますよ？」"

[[dialogue]]
speaker = "シフォン"
# 「ふむふむ、ＤＩＳＣの調子が悪いんですか。ふふ幸運でしたね。私、こういうの直すの得意なんですよ！」
line = "「ふむふむ、ＤＩＳＣの調子が悪いんですか。ふふ幸運でしたね。私、こういうの直すの得意なんですよ！」"

[[dialogue]]
speaker = "シフォン"
# 「ちょっと貸してください！　実家のオンボロ洗濯機で培った実力を見せてあげます！　こういうのは角度が大事ですからね……！」
line = "「ちょっと貸してください！　実家のオンボロ洗濯機で培った実力を見せてあげます！　こういうのは角度が大事ですからね……！」"

[[dialogue]]
speaker = "シフォン"
# 「えいっ、えいっ！　……はい？　叩いて直るものじゃない？　いやいや機械なんて叩けば直るものなんですから。素人は黙っててください！　むしろもっと力を入れて──」
line = "「えいっ、えいっ！　……はい？　叩いて直るものじゃない？　いやいや機械なんて叩けば直るものなんですから。素人は黙っててください！　むしろもっと力を入れて──」"

[[dialogue]]
speaker = "シフォン"
# 「あっ──！？　あ、あはは～、ＤＩＳＣって脆いですね～……。ちょっと力を入れただけで真っ二つになっちゃうとは～……」
line = "「あっ──！？　あ、あはは～、ＤＩＳＣって脆いですね～……。ちょっと力を入れただけで真っ二つになっちゃうとは～……」"

[[dialogue]]
speaker = "シフォン"
# 「す──すみませんでした！　新品を買い直すので許してください！」
line = "「す──すみませんでした！　新品を買い直すので許してください！」"

[[dialogue]]
speaker = "シフォン"
# 「そ、そうだ、他に何か困ってることはありませんかっ？　今度こそ必ず力になりますから……！　ホ、ホントですってば！」
line = "「そ、そうだ、他に何か困ってることはありませんかっ？　今度こそ必ず力になりますから……！　ホ、ホントですってば！」"
