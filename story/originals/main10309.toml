[[dialogue]]
speaker = "unk"
# 第９話,これからの誓い,B
line = "第９話,これからの誓い,B"

[[dialogue]]
speaker = "unk"
# サーシャの星徒会長の任期が終わりに近づいてきたある日のこと。
line = "サーシャの星徒会長の任期が終わりに近づいてきたある日のこと。"

[[dialogue]]
speaker = "unk"
# 夕暮れが差し込む星徒会室で、シルヴィが泣いていた。
line = "夕暮れが差し込む星徒会室で、シルヴィが泣いていた。"

[[dialogue]]
speaker = "unk"
# くしゃくしゃで、まるで何かに押し潰されたあとだった。
line = "くしゃくしゃで、まるで何かに押し潰されたあとだった。"

[[dialogue]]
speaker = "サーシャ"
# 「！？　どうしたの、シルヴィ！？　お腹でも痛いの！？」
line = "「！？　どうしたの、シルヴィ！？　お腹でも痛いの！？」"

[[dialogue]]
speaker = "シルヴィ"
# 「もう。慌てすぎだよ、サーシャ……」
line = "「もう。慌てすぎだよ、サーシャ……」"

[[dialogue]]
speaker = "サーシャ"
# 「ごめんなさい……あなたが泣いてるなんて、初めて見たから」
line = "「ごめんなさい……あなたが泣いてるなんて、初めて見たから」"

[[dialogue]]
speaker = "シルヴィ"
# 「ごめん、たいしたことじゃない……わけじゃないんだけど、何から話そうかな」
line = "「ごめん、たいしたことじゃない……わけじゃないんだけど、何から話そうかな」"

[[dialogue]]
speaker = "シルヴィ"
# 「蛍火ちゃんに似てるお姉さんの話は憶えてるよね？」
line = "「蛍火ちゃんに似てるお姉さんの話は憶えてるよね？」"

[[dialogue]]
speaker = "シルヴィ"
# 「そのお姉さん、実は星騎士で、あたしたちの故郷一帯を守ってくれてたんだ……でも、そのお姉さんがモンスターとの戦いで大怪我したって」
line = "「そのお姉さん、実は星騎士で、あたしたちの故郷一帯を守ってくれてたんだ……でも、そのお姉さんがモンスターとの戦いで大怪我したって」"

[[dialogue]]
speaker = "シルヴィ"
# 「お姉さん、星力もなくなりかけだったのに、無理してたんだ……笑顔で見送ってくれたのに」
line = "「お姉さん、星力もなくなりかけだったのに、無理してたんだ……笑顔で見送ってくれたのに」"

[[dialogue]]
speaker = "シルヴィ"
# 「……あたしの町、誰も守れる人がいなくなっちゃった」
line = "「……あたしの町、誰も守れる人がいなくなっちゃった」"

[[dialogue]]
speaker = "サーシャ"
# 「どうして？　あなたの故郷……天界にも分校はあるでしょう？　星騎士だっているはずだわ」
line = "「どうして？　あなたの故郷……天界にも分校はあるでしょう？　星騎士だっているはずだわ」"

[[dialogue]]
speaker = "シルヴィ"
# 「うん……でも、星力が目覚めたばかりの子が何人かいるだけなんだよ。そのまま戦ったらきっと死んじゃう……」
line = "「うん……でも、星力が目覚めたばかりの子が何人かいるだけなんだよ。そのまま戦ったらきっと死んじゃう……」"

[[dialogue]]
speaker = "サーシャ"
# （分校と言っても規模は様々。新星学園や流星学園ほど、星騎士の育成機関として十分に機能しているわけじゃないのね）
line = "（分校と言っても規模は様々。新星学園や流星学園ほど、星騎士の育成機関として十分に機能しているわけじゃないのね）"

[[dialogue]]
speaker = "サーシャ"
# （経験あるシルヴィのお姉さんが戦えないとなると、モンスターに対処しきれなくなってしまう可能性も高いわ）
line = "（経験あるシルヴィのお姉さんが戦えないとなると、モンスターに対処しきれなくなってしまう可能性も高いわ）"

[[dialogue]]
speaker = "サーシャ"
# （――けれど、みんなを率いることができる強い星騎士が、援護に向かうことが出来たなら……）
line = "（――けれど、みんなを率いることができる強い星騎士が、援護に向かうことが出来たなら……）"

[[dialogue]]
speaker = "シルヴィ"
# 「……どうしよう、サーシャ」
line = "「……どうしよう、サーシャ」"

[[dialogue]]
speaker = "サーシャ"
# 「落ち着いて、シルヴィ」
line = "「落ち着いて、シルヴィ」"

[[dialogue]]
speaker = "シルヴィ"
# 「っ……！？」
line = "「っ……！？」"

[[dialogue]]
speaker = "サーシャ"
# 「……どうすべきか、もう分かっているんでしょう？」
line = "「……どうすべきか、もう分かっているんでしょう？」"

[[dialogue]]
speaker = "シルヴィ"
# 「う、うん……」
line = "「う、うん……」"

[[dialogue]]
speaker = "シルヴィ"
# 「でも、約束したのに！　リクリエが来たら一緒に戦おうって！」
line = "「でも、約束したのに！　リクリエが来たら一緒に戦おうって！」"

[[dialogue]]
speaker = "サーシャ"
# 「だからこそよ。あなたは言ったわ。『みんなを守りたい』って。なら、帰りなさい。あなたがみんなを守るのよ」
line = "「だからこそよ。あなたは言ったわ。『みんなを守りたい』って。なら、帰りなさい。あなたがみんなを守るのよ」"

[[dialogue]]
speaker = "シルヴィ"
# 「で、でもっ！」
line = "「で、でもっ！」"

[[dialogue]]
speaker = "サーシャ"
# 「聞いてちょうだい。……あなたが天界に帰ったら、私たちは友達じゃなくなっちゃう？」
line = "「聞いてちょうだい。……あなたが天界に帰ったら、私たちは友達じゃなくなっちゃう？」"

[[dialogue]]
speaker = "シルヴィ"
# 「ううん、ううん、ずっと友達だよっ！」
line = "「ううん、ううん、ずっと友達だよっ！」"

[[dialogue]]
speaker = "サーシャ"
# 「そうよね。だから、大丈夫。あなたが私を想ってくれれば、私があなたを想っていれば、どこにいても繋がっているのよ」
line = "「そうよね。だから、大丈夫。あなたが私を想ってくれれば、私があなたを想っていれば、どこにいても繋がっているのよ」"

[[dialogue]]
speaker = "シルヴィ"
# 「……サーシャってどきどき難しいこと言うね」
line = "「……サーシャってどきどき難しいこと言うね」"

[[dialogue]]
speaker = "サーシャ"
# 「ふふっ、そうかしら？　でも心からの言葉よ～」
line = "「ふふっ、そうかしら？　でも心からの言葉よ～」"

[[dialogue]]
speaker = "シルヴィ"
# 「ありがとう、サーシャ。やっぱり持つべきものは友達だね。でも、絶対リクリエ前に帰ってくるから！」
line = "「ありがとう、サーシャ。やっぱり持つべきものは友達だね。でも、絶対リクリエ前に帰ってくるから！」"

[[dialogue]]
speaker = "サーシャ"
# 「行ってらっしゃい、シルヴィ」
line = "「行ってらっしゃい、シルヴィ」"

[[dialogue]]
speaker = "シルヴィ"
# 「行ってきます！」
line = "「行ってきます！」"

[[dialogue]]
speaker = "サーシャ"
# 「あなたがいればって思ったときも、もちろんあるわ」
line = "「あなたがいればって思ったときも、もちろんあるわ」"

[[dialogue]]
speaker = "サーシャ"
# 「でも、あなたが故郷で頑張ってるんだって思ったら、私も頑張れたの」
line = "「でも、あなたが故郷で頑張ってるんだって思ったら、私も頑張れたの」"

[[dialogue]]
speaker = "サーシャ"
# 「みんなからすれば、いつも通りのお姉ちゃんなんだろうけど、それはシルヴィのおかげなのよ～」
line = "「みんなからすれば、いつも通りのお姉ちゃんなんだろうけど、それはシルヴィのおかげなのよ～」"

[[dialogue]]
speaker = "サーシャ"
# 「スタンピードでヴィーナスちゃんとレゾフを天秤にかけそうになったとき、あなたを思い出したわ」
line = "「スタンピードでヴィーナスちゃんとレゾフを天秤にかけそうになったとき、あなたを思い出したわ」"

[[dialogue]]
speaker = "サーシャ"
# 「なんて残酷な二択だったんだろうって」
line = "「なんて残酷な二択だったんだろうって」"

[[dialogue]]
speaker = "サーシャ"
# 「私こそごめんなさい。あの時になって、初めてあなたの気持ちをちゃんと理解できたわ」
line = "「私こそごめんなさい。あの時になって、初めてあなたの気持ちをちゃんと理解できたわ」"

[[dialogue]]
speaker = "サーシャ"
# 「でも、あなたは故郷を守り切って、この新星学園に帰ってきた」
line = "「でも、あなたは故郷を守り切って、この新星学園に帰ってきた」"

[[dialogue]]
speaker = "サーシャ"
# 「友達として、星騎士として、あなたを誇りに思う。だから、許すも許さないもないのよ～」
line = "「友達として、星騎士として、あなたを誇りに思う。だから、許すも許さないもないのよ～」"

[[dialogue]]
speaker = "サーシャ"
# 「ありがとう、シルヴィ。帰ってきてくれて嬉しいわ」
line = "「ありがとう、シルヴィ。帰ってきてくれて嬉しいわ」"

[[dialogue]]
speaker = "シルヴィ"
# 「サーシャ、サーシャぁぁぁぁっ！」
line = "「サーシャ、サーシャぁぁぁぁっ！」"

[[dialogue]]
speaker = "サーシャ"
# 「あらあら～、今日はほんとに泣き虫さんね～」
line = "「あらあら～、今日はほんとに泣き虫さんね～」"

[[dialogue]]
speaker = "サーシャ"
# 「そうね、せっかくだから、またアレやりましょうか？」
line = "「そうね、せっかくだから、またアレやりましょうか？」"

[[dialogue]]
speaker = "シルヴィ"
# 「……うん、やろう」
line = "「……うん、やろう」"

[[dialogue]]
speaker = "サーシャ"
# 「我が守護星エウロパよ。我が願いを聞き届け給え」
line = "「我が守護星エウロパよ。我が願いを聞き届け給え」"

[[dialogue]]
speaker = "シルヴィ"
# 「我が守護星アヴィオールよ。我が願いを聞き届け給え」
line = "「我が守護星アヴィオールよ。我が願いを聞き届け給え」"

[[dialogue]]
speaker = "サーシャ"
# 「私の願いは、世界を知ることです。三界すべてを、あるいはその先があるというなら、遍く見てみたい」
line = "「私の願いは、世界を知ることです。三界すべてを、あるいはその先があるというなら、遍く見てみたい」"

[[dialogue]]
speaker = "シルヴィ"
# 「あたしの願いは、みんなを守ることです。あたしの知る人、知るところ、全てを守らせてください」
line = "「あたしの願いは、みんなを守ることです。あたしの知る人、知るところ、全てを守らせてください」"

[[dialogue]]
speaker = "サーシャ"
# 「創造主たる女神よ、我が誓いを見届け給え」
line = "「創造主たる女神よ、我が誓いを見届け給え」"

[[dialogue]]
speaker = "シルヴィ"
# 「創造主たる女神よ、我が誓いを見届け給え」
line = "「創造主たる女神よ、我が誓いを見届け給え」"

[[dialogue]]
speaker = "サーシャ"
# 「星騎士サーシャ。星騎士シルヴィ・グリムランドとともに、この街を、世界を守ります」
line = "「星騎士サーシャ。星騎士シルヴィ・グリムランドとともに、この街を、世界を守ります」"

[[dialogue]]
speaker = "シルヴィ"
# 「星騎士シルヴィ・グリムランド。星騎士サーシャとともに、人々を、世界を守ります」
line = "「星騎士シルヴィ・グリムランド。星騎士サーシャとともに、人々を、世界を守ります」"

[[dialogue]]
speaker = "unk"
# ふたりの誓いに頷くかのように、二条の流星が夜空を駆け抜けた。
line = "ふたりの誓いに頷くかのように、二条の流星が夜空を駆け抜けた。"
