[[dialogue]]
speaker = "マグダレナ"
# 「いらっしゃいませ～」
line = "「いらっしゃいませ～」"

[[dialogue]]
speaker = "モネ"
# 「マグダレナさん！？　どうして守護天使さんがこんなところに……？」
line = "「マグダレナさん！？　どうして守護天使さんがこんなところに……？」"

[[dialogue]]
speaker = "unk"
# 本人の労働意欲を尊重した結果だ
line = "本人の労働意欲を尊重した結果だ"

[[dialogue]]
speaker = "モネ"
# 「は、はぁ……」
line = "「は、はぁ……」"

[[dialogue]]
speaker = "コハルコ"
# 「マグダレナさんには、ここの臨時アニメショップで働いてもらいます。いいですか？」
line = "「マグダレナさんには、ここの臨時アニメショップで働いてもらいます。いいですか？」"

[[dialogue]]
speaker = "マグダレナ"
# 「はい、お任せください」
line = "「はい、お任せください」"

[[dialogue]]
speaker = "コハルコ"
# 「会長さんは接客や販売の経験はあるよね？　マグダレナさんを補助してもらっていいかな。よろしくね」
line = "「会長さんは接客や販売の経験はあるよね？　マグダレナさんを補助してもらっていいかな。よろしくね」"

[[dialogue]]
speaker = "マグダレナ"
# 「私からもよろしくお願いいたします、会長さま」
line = "「私からもよろしくお願いいたします、会長さま」"

[[dialogue]]
speaker = "モネ"
# 「しかも会長まで……守護天使と星徒会長が一緒に働いているのって不思議な光景ですね……」
line = "「しかも会長まで……守護天使と星徒会長が一緒に働いているのって不思議な光景ですね……」"

[[dialogue]]
speaker = "マグダレナ"
# 「モネさまはどうしてこちらに？」
line = "「モネさまはどうしてこちらに？」"

[[dialogue]]
speaker = "モネ"
# 「神保町の古書店に寄ったついでに、少し足を延ばして。漫画やライトノベルも私の読書の対象ですから」
line = "「神保町の古書店に寄ったついでに、少し足を延ばして。漫画やライトノベルも私の読書の対象ですから」"

[[dialogue]]
speaker = "モネ"
# 「それに栞も集めてますので。今日ここでグッズを買うと、限定の栞がもらえるって聞きました」
line = "「それに栞も集めてますので。今日ここでグッズを買うと、限定の栞がもらえるって聞きました」"

[[dialogue]]
speaker = "マグダレナ"
# 「なるほど。ご来店ありがとうございます」
line = "「なるほど。ご来店ありがとうございます」"

[[dialogue]]
speaker = "モネ"
# 「このボールペンと……あとクリアファイルください」
line = "「このボールペンと……あとクリアファイルください」"

[[dialogue]]
speaker = "マグダレナ"
# 「かしこまりました」
line = "「かしこまりました」"

[[dialogue]]
speaker = "マグダレナ"
# 「…………？」
line = "「…………？」"

[[dialogue]]
speaker = "モネ"
# 「マグダレナさん？　固まっちゃってどうかしました？」
line = "「マグダレナさん？　固まっちゃってどうかしました？」"

[[dialogue]]
speaker = "unk"
# マグダレナさん、バーコード！
line = "マグダレナさん、バーコード！"

[[dialogue]]
speaker = "マグダレナ"
# 「おっと、そうでした。この機械で読み取るのでしたね。ピッ、ピッ、と」
line = "「おっと、そうでした。この機械で読み取るのでしたね。ピッ、ピッ、と」"

[[dialogue]]
speaker = "マグダレナ"
# 「おお、自動で金額が計算されるのですね。これは素晴らしい。これなら私でもレジのお仕事がこなせそうです」
line = "「おお、自動で金額が計算されるのですね。これは素晴らしい。これなら私でもレジのお仕事がこなせそうです」"

[[dialogue]]
speaker = "モネ"
# 「電子マネー決済でお願いします」
line = "「電子マネー決済でお願いします」"

[[dialogue]]
speaker = "マグダレナ"
# 「電子……マネー……？」
line = "「電子……マネー……？」"

[[dialogue]]
speaker = "マグダレナ"
# 「陽子マネーや中性子マネーもあるのですか？　もしや、普段私たちが使っているお金は原子マネー？」
line = "「陽子マネーや中性子マネーもあるのですか？　もしや、普段私たちが使っているお金は原子マネー？」"

[[dialogue]]
speaker = "モネ"
# 「えーと、そうじゃなくて……カードやＤＩＳＣでお金を払えるんです」
line = "「えーと、そうじゃなくて……カードやＤＩＳＣでお金を払えるんです」"

[[dialogue]]
speaker = "マグダレナ"
# 「ＤＩＳＣで？　ふむふむ……お金を使わずお買い物ができる？　なんと！　それはすごいですね」
line = "「ＤＩＳＣで？　ふむふむ……お金を使わずお買い物ができる？　なんと！　それはすごいですね」"

[[dialogue]]
speaker = "モネ"
# 「あ、いえ、タダでお買い物できるわけじゃないんです。あらかじめチャージしてそこから払うだけで」
line = "「あ、いえ、タダでお買い物できるわけじゃないんです。あらかじめチャージしてそこから払うだけで」"

[[dialogue]]
speaker = "マグダレナ"
# 「なる、ほど……？」
line = "「なる、ほど……？」"

[[dialogue]]
speaker = "モネ"
# （わかってない顔してる……！）
line = "（わかってない顔してる……！）"

[[dialogue]]
speaker = "マグダレナ"
# 「それで、電子マネーでお支払いいただくにはどうすればいいんでしょう？」
line = "「それで、電子マネーでお支払いいただくにはどうすればいいんでしょう？」"

[[dialogue]]
speaker = "unk"
# ＤＩＳＣでバーコードを出してもらって……
line = "ＤＩＳＣでバーコードを出してもらって……"

[[dialogue]]
speaker = "マグダレナ"
# 「ふむふむ……機械のここを押して……ここをああして……承知しました」
line = "「ふむふむ……機械のここを押して……ここをああして……承知しました」"

[[dialogue]]
speaker = "マグダレナ"
# 「そしてＤＩＳＣの画面をスキャンすればいいのですね。ピッと」
line = "「そしてＤＩＳＣの画面をスキャンすればいいのですね。ピッと」"

[[dialogue]]
speaker = "unk"
# それ俺のＤＩＳＣ！？
line = "それ俺のＤＩＳＣ！？"

[[dialogue]]
speaker = "マグダレナ"
# 「あら？　つまり……？」
line = "「あら？　つまり……？」"

[[dialogue]]
speaker = "モネ"
# 「会長が私のボールペンとクリアファイルのお金を払ったことになりますね……」
line = "「会長が私のボールペンとクリアファイルのお金を払ったことになりますね……」"

[[dialogue]]
speaker = "マグダレナ"
# 「それは失礼しました。取り消し……などはできるのでしょうか？　きっとこの機械を使って……あら？　あららら？」
line = "「それは失礼しました。取り消し……などはできるのでしょうか？　きっとこの機械を使って……あら？　あららら？」"

[[dialogue]]
speaker = "モネ"
# 「えーと、会長には今度ジュースか何かお返ししますね……あはは」
line = "「えーと、会長には今度ジュースか何かお返ししますね……あはは」"

[[dialogue]]
speaker = "unk"
# マグダレナさんは商品の陳列をお願いします
line = "マグダレナさんは商品の陳列をお願いします"

[[dialogue]]
speaker = "マグダレナ"
# 「かしこまりました」
line = "「かしこまりました」"

[[dialogue]]
speaker = "マグダレナ"
# 「ええと、商品をバックヤードから持ってきて……あれ、どの商品をどこに並べればいいのでしょう？」
line = "「ええと、商品をバックヤードから持ってきて……あれ、どの商品をどこに並べればいいのでしょう？」"

[[dialogue]]
speaker = "マグダレナ"
# 「こちらがカースウォーズで、あちらが電ノコ戦士……え？　２？」
line = "「こちらがカースウォーズで、あちらが電ノコ戦士……え？　２？」"

[[dialogue]]
speaker = "フィオナ"
# 「すみません、ランダム缶バッジってまだありますか──」
line = "「すみません、ランダム缶バッジってまだありますか──」"

[[dialogue]]
speaker = "フィオナ"
# 「緋宮会長！？　それにマグダレナ様！？」
line = "「緋宮会長！？　それにマグダレナ様！？」"

[[dialogue]]
speaker = "マグダレナ"
# 「おや、フィオナさま」
line = "「おや、フィオナさま」"

[[dialogue]]
speaker = "フィオナ"
# 「ち、違うんです、私はアニメや漫画が好きなわけじゃなくて、たまたまというか……」
line = "「ち、違うんです、私はアニメや漫画が好きなわけじゃなくて、たまたまというか……」"

[[dialogue]]
speaker = "フィオナ"
# 「というか……どうしてマグダレナ様がここで働いておられるんですか？」
line = "「というか……どうしてマグダレナ様がここで働いておられるんですか？」"

[[dialogue]]
speaker = "フィオナ"
# 「なるほど……人間界で使うお金を自分で稼ぎたいと。ご意志は理解できましたが、教皇庁の者が見たらなんと言うか……」
line = "「なるほど……人間界で使うお金を自分で稼ぎたいと。ご意志は理解できましたが、教皇庁の者が見たらなんと言うか……」"

[[dialogue]]
speaker = "フィオナ"
# 「………………」
line = "「………………」"

[[dialogue]]
speaker = "フィオナ"
# 「お互い……見なかったことにしませんか？」
line = "「お互い……見なかったことにしませんか？」"

[[dialogue]]
speaker = "unk"
# そうしよう！
line = "そうしよう！"

[[dialogue]]
speaker = "フィオナ"
# 「では私はこれで。失礼しました」
line = "「では私はこれで。失礼しました」"

[[dialogue]]
speaker = "マグダレナ"
# 「あ、フィオナさま、お求めの缶バッジはこちらでしょうか？　……あれ？　フィオナさま？」
line = "「あ、フィオナさま、お求めの缶バッジはこちらでしょうか？　……あれ？　フィオナさま？」"

[[dialogue]]
speaker = "コハルコ"
# 「お疲れ様、さっきフィオナさんとすれ違ったんだけど、大丈夫だった？」
line = "「お疲れ様、さっきフィオナさんとすれ違ったんだけど、大丈夫だった？」"

[[dialogue]]
speaker = "コハルコ"
# 「何その微妙な表情……──って、商品の品出し全然できてない！？」
line = "「何その微妙な表情……──って、商品の品出し全然できてない！？」"

[[dialogue]]
speaker = "マグダレナ"
# 「こちらはアイドルパラダイスで、こちらがガーデンオブアイドル……アイドルエンパイアもありますね。どう違うのでしょうか……？」
line = "「こちらはアイドルパラダイスで、こちらがガーデンオブアイドル……アイドルエンパイアもありますね。どう違うのでしょうか……？」"

[[dialogue]]
speaker = "コハルコ"
# 「あー……私も手伝うね……はは」
line = "「あー……私も手伝うね……はは」"
