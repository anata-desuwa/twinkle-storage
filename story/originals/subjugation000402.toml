[[dialogue]]
speaker = "unk"
# ――新星学園２年生、桜十路サラン。
line = "――新星学園２年生、桜十路サラン。"

[[dialogue]]
speaker = "unk"
# ヴィーナスの九浄家に並ぶ、流星市国内の名家『五名門』の１つ、『桜十路家』の令嬢である。
line = "ヴィーナスの九浄家に並ぶ、流星市国内の名家『五名門』の１つ、『桜十路家』の令嬢である。"

[[dialogue]]
speaker = "unk"
# 桜十路家は、世界中に影響力を持つ『桜十路コンツェルン』という企業グループを経営しており、グループ会社である『桜十路食品』に始まり、流星市国内のあらゆる流通を司る。
line = "桜十路家は、世界中に影響力を持つ『桜十路コンツェルン』という企業グループを経営しており、グループ会社である『桜十路食品』に始まり、流星市国内のあらゆる流通を司る。"

[[dialogue]]
speaker = "unk"
# そして、彼女自身も『美食家』として有名。食の分野において天才的なセンスを持ち、趣味でお菓子作りも得意としているが、その腕前は趣味の範疇に収まらず――
line = "そして、彼女自身も『美食家』として有名。食の分野において天才的なセンスを持ち、趣味でお菓子作りも得意としているが、その腕前は趣味の範疇に収まらず――"

[[dialogue]]
speaker = "サラン"
# 「ハロウィンパーティーで売るお菓子を考えて、色々作ってきたよ～♪　食べて食べて～♪」
line = "「ハロウィンパーティーで売るお菓子を考えて、色々作ってきたよ～♪　食べて食べて～♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「お～、チョコレートにクッキー、グミにキャンディー、ケーキまであるよ。豪華だね～」
line = "「お～、チョコレートにクッキー、グミにキャンディー、ケーキまであるよ。豪華だね～」"

[[dialogue]]
speaker = "セナリィ"
# 「昨日の今日でもう試作品を仕上げてきて下さるなんて、ありがとうございますわ、サラン様♪」
line = "「昨日の今日でもう試作品を仕上げてきて下さるなんて、ありがとうございますわ、サラン様♪」"

[[dialogue]]
speaker = "セナリィ"
# 「早速、試食してさせて頂きますわね。それでは、<ruby=わたくし>私</ruby>も好きなチョコレートから……ぱくっ……もぐもぐ――」
line = "「早速、試食してさせて頂きますわね。それでは、<ruby>私<rt>わたくし</rt></ruby>も好きなチョコレートから……ぱくっ……もぐもぐ――」"

[[dialogue]]
speaker = "セナリィ"
# 「っ……！　こ、これは……！？」
line = "「っ……！　こ、これは……！？」"

[[dialogue]]
speaker = "セナリィ"
# 「めっ……滅茶苦茶うめぇですわッ！！！　想像を遥かに上回って、思わず口の中がビックリする程に！？」
line = "「めっ……滅茶苦茶うめぇですわッ！！！　想像を遥かに上回って、思わず口の中がビックリする程に！？」"

[[dialogue]]
speaker = "unk"
# 美味しい！　やっぱりサランはすごいな！
line = "美味しい！　やっぱりサランはすごいな！"

[[dialogue]]
speaker = "サラン"
# 「えへへ～、褒めてもらってふわふわ～♪」
line = "「えへへ～、褒めてもらってふわふわ～♪」"

[[dialogue]]
speaker = "サラン"
# 「マインちゃんはどうかな？　お口に合いそう？」
line = "「マインちゃんはどうかな？　お口に合いそう？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ん……そうだね、私も美味しいと思うよ。見た目も綺麗だし、専門店で売ってるお菓子みたいだよね」
line = "「ん……そうだね、私も美味しいと思うよ。見た目も綺麗だし、専門店で売ってるお菓子みたいだよね」"

[[dialogue]]
speaker = "サラン"
# 「そっか～、それならよかった～♪　売り物だから、いつもより頑張って作ってみたの～」
line = "「そっか～、それならよかった～♪　売り物だから、いつもより頑張って作ってみたの～」"

[[dialogue]]
speaker = "セナリィ"
# 「サラン様、どれも本当にすごいですわ！　<ruby=わたくし>私</ruby>、世界中を周りながら色んな高級菓子を口にしてきましたけれど、お世辞なしにそれと渡り合える味ですわ！」
line = "「サラン様、どれも本当にすごいですわ！　<ruby>私<rt>わたくし</rt></ruby>、世界中を周りながら色んな高級菓子を口にしてきましたけれど、お世辞なしにそれと渡り合える味ですわ！」"

[[dialogue]]
speaker = "セナリィ"
# 「見た目も実に上品……それでいて若い女子層にウケそうな可愛いらしさもあって……これはまさに、天才の技！」
line = "「見た目も実に上品……それでいて若い女子層にウケそうな可愛いらしさもあって……これはまさに、天才の技！」"

[[dialogue]]
speaker = "セナリィ"
# 「これはイケる……準備数を大幅に上方修正できる程に、イケますわ！」
line = "「これはイケる……準備数を大幅に上方修正できる程に、イケますわ！」"

[[dialogue]]
speaker = "セナリィ"
# 「断言できますわ！　これは当日、爆売れしますわよ！」
line = "「断言できますわ！　これは当日、爆売れしますわよ！」"

[[dialogue]]
speaker = "サラン"
# 「本当～？　えへへ、そんな褒めてもらえると、照れちゃうかも～♪」
line = "「本当～？　えへへ、そんな褒めてもらえると、照れちゃうかも～♪」"

[[dialogue]]
speaker = "セナリィ"
# 「ただ、問題はどのお菓子を販売するかですわ。本当は全部売り出したいところですけれど、作れるのはサラン様１人」
line = "「ただ、問題はどのお菓子を販売するかですわ。本当は全部売り出したいところですけれど、作れるのはサラン様１人」"

[[dialogue]]
speaker = "セナリィ"
# 「商品の選定が悩ましいですわ……」
line = "「商品の選定が悩ましいですわ……」"

[[dialogue]]
speaker = "サラン"
# 「あ～、そっか～。数を沢山作らなきゃいけないんだもんね～」
line = "「あ～、そっか～。数を沢山作らなきゃいけないんだもんね～」"

[[dialogue]]
speaker = "サラン"
# 「マインちゃんは、どれが気に入ったとかある？」
line = "「マインちゃんは、どれが気に入ったとかある？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「私？　……う～ん、私は味オンチなところがあるからな～」
line = "「私？　……う～ん、私は味オンチなところがあるからな～」"

[[dialogue]]
speaker = "サラン"
# 「ぽよ？　そうなの？」
line = "「ぽよ？　そうなの？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「なんで、桜十路先輩は私の好みは気にしなくて大丈夫ですよ。自分が美味しいと思うお菓子を作っちゃって下さい」
line = "「なんで、桜十路先輩は私の好みは気にしなくて大丈夫ですよ。自分が美味しいと思うお菓子を作っちゃって下さい」"

[[dialogue]]
speaker = "サラン"
# 「え～？　でもサランは、マインちゃんの好みも知りたいけどな～」
line = "「え～？　でもサランは、マインちゃんの好みも知りたいけどな～」"

[[dialogue]]
speaker = "サラン"
# 「誰でも好みの味は必ずあるはずでしょ？　セナリィちゃんはチョコレートが好きみたいだし、マインちゃんだって何か好きな食べ物が――」
line = "「誰でも好みの味は必ずあるはずでしょ？　セナリィちゃんはチョコレートが好きみたいだし、マインちゃんだって何か好きな食べ物が――」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひ♪　まあまあ、私のことは置いておいて。どうせなら、会長の好みを聞いてみたらいかがですか？」
line = "「にひひ♪　まあまあ、私のことは置いておいて。どうせなら、会長の好みを聞いてみたらいかがですか？」"

[[dialogue]]
speaker = "unk"
# えっ？　俺？
line = "えっ？　俺？"

[[dialogue]]
speaker = "ネーゼマイン"
# 「そうそう。今まで、会長の好物について尋ねたことなかったし。いい機会だから教えて欲しいな～」
line = "「そうそう。今まで、会長の好物について尋ねたことなかったし。いい機会だから教えて欲しいな～」"

[[dialogue]]
speaker = "サラン"
# 「言われてみればそうかも～。会長ちゃんは、どんな食べ物が好きなの？」
line = "「言われてみればそうかも～。会長ちゃんは、どんな食べ物が好きなの？」"

[[dialogue]]
speaker = "unk"
# そうして、販売するお菓子の相談は進み、クッキーやマシュマロ、チョコレートを散りばめた『カップケーキ』を作ることに決まった。比較的王道と言えるラインナップだ。
line = "そうして、販売するお菓子の相談は進み、クッキーやマシュマロ、チョコレートを散りばめた『カップケーキ』を作ることに決まった。比較的王道と言えるラインナップだ。"

[[dialogue]]
speaker = "セナリィ"
# 「それじゃあ、会長様、マイン。今日はここまでで解散ということで」
line = "「それじゃあ、会長様、マイン。今日はここまでで解散ということで」"

[[dialogue]]
speaker = "セナリィ"
# 「<ruby=わたくし>私</ruby>はこの後、カップケーキの材料についての相談の為、サラン様のご自宅まで行ってきますわ」
line = "「<ruby>私<rt>わたくし</rt></ruby>はこの後、カップケーキの材料についての相談の為、サラン様のご自宅まで行ってきますわ」"

[[dialogue]]
speaker = "サラン"
# 「マインちゃん、会長ちゃん、また明日ね～♪」
line = "「マインちゃん、会長ちゃん、また明日ね～♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「は～い、お疲れ様で～す」
line = "「は～い、お疲れ様で～す」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「……ふぅ。さてと、私たちも帰りますかね～っと」
line = "「……ふぅ。さてと、私たちも帰りますかね～っと」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「――ん？　どうしたの、会長？」
line = "「――ん？　どうしたの、会長？」"

[[dialogue]]
speaker = "unk"
# マイン、様子が変だったけど……大丈夫？
line = "マイン、様子が変だったけど……大丈夫？"

[[dialogue]]
speaker = "ネーゼマイン"
# 「え？　あ～……よく見てるね～、会長は。気づかれちゃってるなら、隠しておけないよね」
line = "「え？　あ～……よく見てるね～、会長は。気づかれちゃってるなら、隠しておけないよね」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ここだけの話にして欲しいんだけど――」
line = "「ここだけの話にして欲しいんだけど――」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「私さ、桜十路先輩のことが、正直苦手なんだよね～」
line = "「私さ、桜十路先輩のことが、正直苦手なんだよね～」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「別に嫌ってるわけじゃないんだよ？　ただ、人間だからさ、性格の合う合わないってやっぱりあるわけじゃん？」
line = "「別に嫌ってるわけじゃないんだよ？　ただ、人間だからさ、性格の合う合わないってやっぱりあるわけじゃん？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「会長はわかってるかもしれないけど……私は自分のこと、善良な人間じゃないって自覚があるんだ」
line = "「会長はわかってるかもしれないけど……私は自分のこと、善良な人間じゃないって自覚があるんだ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「捻くれてて、悪戯好きで、腹黒くて……分類するなら、悪属性ってやつ」
line = "「捻くれてて、悪戯好きで、腹黒くて……分類するなら、悪属性ってやつ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「一方の桜十路先輩は、善属性だよね？　純真で、明るくて、ふわふわしてて――」
line = "「一方の桜十路先輩は、善属性だよね？　純真で、明るくて、ふわふわしてて――」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「普通に喋ること自体はできるけど……私、先輩と話しているとさ、なんだか眩しくなっちゃうんだよね～」
line = "「普通に喋ること自体はできるけど……私、先輩と話しているとさ、なんだか眩しくなっちゃうんだよね～」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「その善性に照らされて……自分でも面倒臭いところだと思うけど、自己嫌悪しちゃうわけ」
line = "「その善性に照らされて……自分でも面倒臭いところだと思うけど、自己嫌悪しちゃうわけ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ああ、私の心はこんなに悪側なんだ、ってさ」
line = "「ああ、私の心はこんなに悪側なんだ、ってさ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「なんというか……住んでいる世界が違うって思っちゃうんだよね～」
line = "「なんというか……住んでいる世界が違うって思っちゃうんだよね～」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「……本当はさ、今日の試食会、桜十路先輩のお菓子を食べた時に、セナリィの言うような美味しい味だってのが、私にはわからなかったんだよね」
line = "「……本当はさ、今日の試食会、桜十路先輩のお菓子を食べた時に、セナリィの言うような美味しい味だってのが、私にはわからなかったんだよね」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「私は美的感覚とか味覚が、他の人とはとことんズレてるから」
line = "「私は美的感覚とか味覚が、他の人とはとことんズレてるから」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「でも、そんなこと、相手には言えないじゃん？」
line = "「でも、そんなこと、相手には言えないじゃん？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「――つまりは、そういうこと。だから、桜十路先輩とは距離を置いて、付き合うようにするよ」
line = "「――つまりは、そういうこと。だから、桜十路先輩とは距離を置いて、付き合うようにするよ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「セナリィのよく言う、ビジネスパートナーとしてね」
line = "「セナリィのよく言う、ビジネスパートナーとしてね」"

[[dialogue]]
speaker = "unk"
# 無理に親しくなる必要はないけど――
line = "無理に親しくなる必要はないけど――"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ん？　――自分の好物くらいは、教えてあげてもいいんじゃないかって？」
line = "「ん？　――自分の好物くらいは、教えてあげてもいいんじゃないかって？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「……ん～、でもなぁ……」
line = "「……ん～、でもなぁ……」"

[[dialogue]]
speaker = "unk"
# マインは少し、考えるような顔をしたが……
line = "マインは少し、考えるような顔をしたが……"

[[dialogue]]
speaker = "unk"
# 結局、その話は適当にはぐらかされて、有耶無耶になってしまうのだった。
line = "結局、その話は適当にはぐらかされて、有耶無耶になってしまうのだった。"
