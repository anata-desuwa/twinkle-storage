[[dialogue]]
speaker = "unk"
# 八卦鏡の反応に従い、辿り着いた先は、演劇部の部室だった。
line = "八卦鏡の反応に従い、辿り着いた先は、演劇部の部室だった。"

[[dialogue]]
speaker = "藍"
# 「きゃあっ！　ごめんなさいっ、こっちに来ないでください～っ！」
line = "「きゃあっ！　ごめんなさいっ、こっちに来ないでください～っ！」"

[[dialogue]]
speaker = "メイプル"
# 「何なのこいつら！　ぴょんぴょんしながらこっちに向かってくるよ～！」
line = "「何なのこいつら！　ぴょんぴょんしながらこっちに向かってくるよ～！」"

[[dialogue]]
speaker = "ミルフィー"
# 「見つけた！　ゾンビ型幽霊！」
line = "「見つけた！　ゾンビ型幽霊！」"

[[dialogue]]
speaker = "トリシャ"
# 「これが冥界の邪霊……映画の通りの奇っ怪な動きですね……」
line = "「これが冥界の邪霊……映画の通りの奇っ怪な動きですね……」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「すばしっこいから気をつけるゆ！」
line = "「すばしっこいから気をつけるゆ！」"

[[dialogue]]
speaker = "unk"
# こっちに逃げて！
line = "こっちに逃げて！"

[[dialogue]]
speaker = "unk"
# ２人とも大丈夫！？
line = "２人とも大丈夫！？"

[[dialogue]]
speaker = "藍"
# 「会長さん！？　わかりました、すぐそちらにっ」
line = "「会長さん！？　わかりました、すぐそちらにっ」"

[[dialogue]]
speaker = "メイプル"
# 「いいところに来たよ、お兄ちゃんっ。もう、こいつなんなの～？」
line = "「いいところに来たよ、お兄ちゃんっ。もう、こいつなんなの～？」"

[[dialogue]]
speaker = "unk"
# 直接的な害はないから大丈夫
line = "直接的な害はないから大丈夫"

[[dialogue]]
speaker = "unk"
# ゾンビ型幽霊だよ
line = "ゾンビ型幽霊だよ"

[[dialogue]]
speaker = "メイプル"
# 「全然大丈夫じゃないってば！」
line = "「全然大丈夫じゃないってば！」"

[[dialogue]]
speaker = "藍"
# 「ずっとジャンプしながら移動していますね。どうしてあんなにぴょんぴょんしているんでしょうか？」
line = "「ずっとジャンプしながら移動していますね。どうしてあんなにぴょんぴょんしているんでしょうか？」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「そういうものだからゆ♪」
line = "「そういうものだからゆ♪」"

[[dialogue]]
speaker = "メイプル"
# 「このまま放置されても困るんだけど……これどうするつもり？」
line = "「このまま放置されても困るんだけど……これどうするつもり？」"

[[dialogue]]
speaker = "unk"
# 専門家の出番だよ
line = "専門家の出番だよ"

[[dialogue]]
speaker = "unk"
# ミルフィーとトリシャさんに任せよう
line = "ミルフィーとトリシャさんに任せよう"

[[dialogue]]
speaker = "ミルフィー"
# 「任せてください！　いきますよっ！」
line = "「任せてください！　いきますよっ！」"

[[dialogue]]
speaker = "トリシャ"
# 「速度はミルフィーさんの方が上……ですが、あの跳躍は御しがたい……」
line = "「速度はミルフィーさんの方が上……ですが、あの跳躍は御しがたい……」"

[[dialogue]]
speaker = "トリシャ"
# 「結界を張りましょう……この部屋からは逃がしません……」
line = "「結界を張りましょう……この部屋からは逃がしません……」"

[[dialogue]]
speaker = "ミルフィー"
# 「ありがとう、トリシャさん！　これで心置きなく捕まえられるよ！」
line = "「ありがとう、トリシャさん！　これで心置きなく捕まえられるよ！」"

[[dialogue]]
speaker = "トリシャ"
# 「結界だけではありません。ミルフィーさんのオトモとして……役に立ってみせましょう……」
line = "「結界だけではありません。ミルフィーさんのオトモとして……役に立ってみせましょう……」"

[[dialogue]]
speaker = "トリシャ"
# 「ぴょーん、ぴょーん、ぴょーん……」
line = "「ぴょーん、ぴょーん、ぴょーん……」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「すごいすごいすごい！　トリシャもぴょんぴょんしてるゆ～♪」
line = "「すごいすごいすごい！　トリシャもぴょんぴょんしてるゆ～♪」"

[[dialogue]]
speaker = "unk"
# ぴょんぴょんに何の意味が……
line = "ぴょんぴょんに何の意味が……"

[[dialogue]]
speaker = "unk"
# いったいどういうこと？
line = "いったいどういうこと？"

[[dialogue]]
speaker = "メイプル"
# 「よくわからないけど、あのおばけと同じ動きだね」
line = "「よくわからないけど、あのおばけと同じ動きだね」"

[[dialogue]]
speaker = "藍"
# 「リズムを……合わせているんでしょうか……？」
line = "「リズムを……合わせているんでしょうか……？」"

[[dialogue]]
speaker = "トリシャ"
# 「ぴょーん、ぴょーん、ぴょーん……フフ、そこです」
line = "「ぴょーん、ぴょーん、ぴょーん……フフ、そこです」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「トリシャの攻撃がヒットしたゆ！」
line = "「トリシャの攻撃がヒットしたゆ！」"

[[dialogue]]
speaker = "メイプル"
# 「えーと……ぴょんぴょんすることで攻撃が当たりやすくなるの？」
line = "「えーと……ぴょんぴょんすることで攻撃が当たりやすくなるの？」"

[[dialogue]]
speaker = "藍"
# 「そういうわけでもないような……」
line = "「そういうわけでもないような……」"

[[dialogue]]
speaker = "トリシャ"
# 「ぴょーん、ぴょーん、ぴょーん……随分とトリッキーな動きですが、コツが掴めてきました……」
line = "「ぴょーん、ぴょーん、ぴょーん……随分とトリッキーな動きですが、コツが掴めてきました……」"

[[dialogue]]
speaker = "ミルフィー"
# 「トリシャさん、そっち行ったよ！」
line = "「トリシャさん、そっち行ったよ！」"

[[dialogue]]
speaker = "トリシャ"
# 「お任せください……それっ、それっ……」
line = "「お任せください……それっ、それっ……」"

[[dialogue]]
speaker = "unk"
# （たゆんたゆんしすぎでは？）
line = "（たゆんたゆんしすぎでは？）"

[[dialogue]]
speaker = "unk"
# （でも、あんなにぴょんぴょんされると……）
line = "（でも、あんなにぴょんぴょんされると……）"

[[dialogue]]
speaker = "メイプル"
# 「……ねえお兄ちゃん、どこ見てるの？」
line = "「……ねえお兄ちゃん、どこ見てるの？」"

[[dialogue]]
speaker = "藍"
# 「もしかして……そうですよね、かなり大きいですし……」
line = "「もしかして……そうですよね、かなり大きいですし……」"

[[dialogue]]
speaker = "メイプル"
# 「お兄ちゃんがぼいんぼいんのおっぱい見てる～！　いーけないんだー！」
line = "「お兄ちゃんがぼいんぼいんのおっぱい見てる～！　いーけないんだー！」"

[[dialogue]]
speaker = "ミルフィー"
# 「か、会長くん！　真面目に戦ってるんだからエッチな目で見ないで！」
line = "「か、会長くん！　真面目に戦ってるんだからエッチな目で見ないで！」"

[[dialogue]]
speaker = "トリシャ"
# 「フフ、私も人間界に来て学びました。男性は女性の大きな胸に目を奪われるものなのです……」
line = "「フフ、私も人間界に来て学びました。男性は女性の大きな胸に目を奪われるものなのです……」"

[[dialogue]]
speaker = "ミルフィー"
# 「他人事みたいに言ってるけど、トリシャさんのことだよ！　ぴょんぴょんでぽよんぽよんなんだからっ」
line = "「他人事みたいに言ってるけど、トリシャさんのことだよ！　ぴょんぴょんでぽよんぽよんなんだからっ」"

[[dialogue]]
speaker = "メイプル"
# 「うーん、どっちもどっちな気がするけど……部長はどう思う？」
line = "「うーん、どっちもどっちな気がするけど……部長はどう思う？」"

[[dialogue]]
speaker = "ロクサーナ"
# 「うむ、そうだな」
line = "「うむ、そうだな」"

[[dialogue]]
speaker = "藍"
# 「部長！？　いつのまに……」
line = "「部長！？　いつのまに……」"

[[dialogue]]
speaker = "ロクサーナ"
# 「ついさっき来たところだ。留守にして済まなかったね」
line = "「ついさっき来たところだ。留守にして済まなかったね」"

[[dialogue]]
speaker = "ロクサーナ"
# 「しかし、これは甲乙つけがたいな。会長の熱い視線はどちらの胸にも注がれていたぞ」
line = "「しかし、これは甲乙つけがたいな。会長の熱い視線はどちらの胸にも注がれていたぞ」"

[[dialogue]]
speaker = "メイプル"
# 「だってさー！　２人とも頑張れー！」
line = "「だってさー！　２人とも頑張れー！」"

[[dialogue]]
speaker = "ミルフィー"
# 「そそそ、それってつまり……会長くんが私のお、お、おっぱ……胸を見て……？　そんなの困るよぉ」
line = "「そそそ、それってつまり……会長くんが私のお、お、おっぱ……胸を見て……？　そんなの困るよぉ」"

[[dialogue]]
speaker = "トリシャ"
# 「この戦闘スタイルはぴょんぴょんしないと駄目なので……どうしようもありませんね……」
line = "「この戦闘スタイルはぴょんぴょんしないと駄目なので……どうしようもありませんね……」"

[[dialogue]]
speaker = "ロクサーナ"
# 「２人ともさっきまでのキレキレな動きはどうした！　このままではやられてしまうぞ！」
line = "「２人ともさっきまでのキレキレな動きはどうした！　このままではやられてしまうぞ！」"

[[dialogue]]
speaker = "ミルフィー"
# 「そんなこと言われてもっ……」
line = "「そんなこと言われてもっ……」"

[[dialogue]]
speaker = "メイプル"
# 「あ、それじゃお兄ちゃんのこと目隠ししてあげる～♪　藍も手伝って」
line = "「あ、それじゃお兄ちゃんのこと目隠ししてあげる～♪　藍も手伝って」"

[[dialogue]]
speaker = "藍"
# 「は、はいっ。目隠しですね……よいしょっ」
line = "「は、はいっ。目隠しですね……よいしょっ」"

[[dialogue]]
speaker = "unk"
# わわっ！？
line = "わわっ！？"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「会長が２人のオンナに抱きつかれてるゆ～♪」
line = "「会長が２人のオンナに抱きつかれてるゆ～♪」"

[[dialogue]]
speaker = "ミルフィー"
# 「ええっ！？」
line = "「ええっ！？」"

[[dialogue]]
speaker = "メイプル"
# 「とにかく！　こっちのことはいいから、今のうちにやっちゃって！」
line = "「とにかく！　こっちのことはいいから、今のうちにやっちゃって！」"

[[dialogue]]
speaker = "トリシャ"
# 「了解です……さあ、ミルフィーさん、一気に片付けてしまいましょう……」
line = "「了解です……さあ、ミルフィーさん、一気に片付けてしまいましょう……」"

[[dialogue]]
speaker = "ミルフィー"
# 「うううっ、仕方ないのはわかるけど……なんか釈然としないって言うか……」
line = "「うううっ、仕方ないのはわかるけど……なんか釈然としないって言うか……」"

[[dialogue]]
speaker = "ミルフィー"
# 「会長くんのばかぁ～～～っ！！」
line = "「会長くんのばかぁ～～～っ！！」"

[[dialogue]]
speaker = "unk"
# こうして、不名誉な扱いと引き換えに、ゾンビ型幽霊の撃破に成功するのだった。
line = "こうして、不名誉な扱いと引き換えに、ゾンビ型幽霊の撃破に成功するのだった。"
