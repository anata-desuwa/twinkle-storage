[[dialogue]]
speaker = "unk"
# 第２話,フニとウサギとカニ,P
line = "第２話,フニとウサギとカニ,P"

[[dialogue]]
speaker = "unk"
# 普段、星見家メイド隊のバイトをしているフニ。
line = "普段、星見家メイド隊のバイトをしているフニ。"

[[dialogue]]
speaker = "unk"
# その日は、メイドとしての料理スキルを高める為、カフェテリアへやって来ていたのだが――
line = "その日は、メイドとしての料理スキルを高める為、カフェテリアへやって来ていたのだが――"

[[dialogue]]
speaker = "フェニエル"
# 「まさか……メイド長にご指導頂けるなんて……！」
line = "「まさか……メイド長にご指導頂けるなんて……！」"

[[dialogue]]
speaker = "蘭美"
# 「ふふっ、メイド長と言っても、星見家の方じゃなく、九浄家の方の――だけどね♪」
line = "「ふふっ、メイド長と言っても、星見家の方じゃなく、九浄家の方の――だけどね♪」"

[[dialogue]]
speaker = "unk"
# たまたま居合わせた九浄家メイド隊の最年少メイド長――<ruby=はねみやらび>羽宮蘭美</ruby>が、ウィンクをしながら告げる。
line = "たまたま居合わせた九浄家メイド隊の最年少メイド長――<ruby>羽宮蘭美<rt>はねみやらび</rt></ruby>が、ウィンクをしながら告げる。"

[[dialogue]]
speaker = "蘭美"
# 「カフェテリア料理長の蛍火からも教わったみたいだけど、会長からも頼まれたし、今日は私も特別に指導してあげるわ！　光栄に思いなさい♪」
line = "「カフェテリア料理長の蛍火からも教わったみたいだけど、会長からも頼まれたし、今日は私も特別に指導してあげるわ！　光栄に思いなさい♪」"

[[dialogue]]
speaker = "フェニエル"
# 「ありがとうございます、蘭美先輩っ。けっぱって、学ばせて頂きますっ」
line = "「ありがとうございます、蘭美先輩っ。けっぱって、学ばせて頂きますっ」"

[[dialogue]]
speaker = "unk"
# フニのこと、よろしくお願いします
line = "フニのこと、よろしくお願いします"

[[dialogue]]
speaker = "蘭美"
# 「ええ。それじゃあ、最速で指導スタートよ！」
line = "「ええ。それじゃあ、最速で指導スタートよ！」"

[[dialogue]]
speaker = "unk"
# それからカフェテリアの厨房の一角を借りて、料理指導が開始された。
line = "それからカフェテリアの厨房の一角を借りて、料理指導が開始された。"

[[dialogue]]
speaker = "蘭美"
# 「うんっ、なかなか器用で手際がいいじゃない、フニ！　星見家じゃなく、うちで正式にメイドとして迎えてもいいわよ？」
line = "「うんっ、なかなか器用で手際がいいじゃない、フニ！　星見家じゃなく、うちで正式にメイドとして迎えてもいいわよ？」"

[[dialogue]]
speaker = "フェニエル"
# 「え？　ありがとうございますっ。でも、星見家メイド隊の先輩たちにはなまらお世話になっているので……」
line = "「え？　ありがとうございますっ。でも、星見家メイド隊の先輩たちにはなまらお世話になっているので……」"

[[dialogue]]
speaker = "蘭美"
# 「そう、惜しいわね。でも、気が変わったらいつでも来なさい。私が最速で歓迎してあげるわ！」
line = "「そう、惜しいわね。でも、気が変わったらいつでも来なさい。私が最速で歓迎してあげるわ！」"

[[dialogue]]
speaker = "蘭美"
# 「その為にも、私の料理スキルが星見家メイド長のキリカに負けないくらいすごいってところを、見せておかないとね♪」
line = "「その為にも、私の料理スキルが星見家メイド長のキリカに負けないくらいすごいってところを、見せておかないとね♪」"

[[dialogue]]
speaker = "蘭美"
# 「というわけで、蛍火に頼んで、特別な食材を貰ってきたわ！」
line = "「というわけで、蛍火に頼んで、特別な食材を貰ってきたわ！」"

[[dialogue]]
speaker = "unk"
# そう言って、蘭美が台所の机に用意したのは――
line = "そう言って、蘭美が台所の机に用意したのは――"

[[dialogue]]
speaker = "フェニエル"
# 「これは<ruby=かに>蟹</ruby>ですか？　なまら大きいです……！」
line = "「これは<ruby>蟹<rt>かに</rt></ruby>ですか？　なまら大きいです……！」"

[[dialogue]]
speaker = "unk"
# 魔界の蟹じゃないか？
line = "魔界の蟹じゃないか？"

[[dialogue]]
speaker = "unk"
# これ、すごく美味しいって有名な
line = "これ、すごく美味しいって有名な"

[[dialogue]]
speaker = "蘭美"
# 「会長の言う通り、これは『超硬度食材』と呼ばれる魔界の大蟹――『サラタンガニ』よ！」
line = "「会長の言う通り、これは『超硬度食材』と呼ばれる魔界の大蟹――『サラタンガニ』よ！」"

[[dialogue]]
speaker = "フェニエル"
# 「あっ、それってテレビの料理番組で観たことがありますっ。星騎士でも簡単に砕けないくらい固い甲羅を持っていて、<ruby=さば>捌</ruby>くのがすごい大変だって……」
line = "「あっ、それってテレビの料理番組で観たことがありますっ。星騎士でも簡単に砕けないくらい固い甲羅を持っていて、<ruby>捌<rt>さば</rt></ruby>くのがすごい大変だって……」"

[[dialogue]]
speaker = "蘭美"
# 「そう！　今度『蟹フェス』をやるらしくて大量に仕入れたらしいんだけど、その１匹を今回特別に譲ってもらったのよ」
line = "「そう！　今度『蟹フェス』をやるらしくて大量に仕入れたらしいんだけど、その１匹を今回特別に譲ってもらったのよ」"

[[dialogue]]
speaker = "フェニエル"
# 「確か、サラタンガニを解体するには、なまらすごい包丁の技術が必要で、切り込む場所や角度も見極めないといけないんですよね……？」
line = "「確か、サラタンガニを解体するには、なまらすごい包丁の技術が必要で、切り込む場所や角度も見極めないといけないんですよね……？」"

[[dialogue]]
speaker = "フェニエル"
# 「あの……どれだけ固いのか、ちょっと甲羅を触ってみてもいいでしょうか？」
line = "「あの……どれだけ固いのか、ちょっと甲羅を触ってみてもいいでしょうか？」"

[[dialogue]]
speaker = "蘭美"
# 「ふふっ、いいわよ！　星力を込めて普通の蟹みたいに関節部分を折ろうとしても、ビクともしないんだから！」
line = "「ふふっ、いいわよ！　星力を込めて普通の蟹みたいに関節部分を折ろうとしても、ビクともしないんだから！」"

[[dialogue]]
speaker = "フェニエル"
# 「そんなにですか……！？」
line = "「そんなにですか……！？」"

[[dialogue]]
speaker = "蘭美"
# 「ええ。私でも解体できるようになるまでに、何年も包丁の技術を磨いて――」
line = "「ええ。私でも解体できるようになるまでに、何年も包丁の技術を磨いて――」"

[[dialogue]]
speaker = "unk"
# ――バキッ。
line = "――バキッ。"

[[dialogue]]
speaker = "フェニエル"
# 「あれ……！？」
line = "「あれ……！？」"

[[dialogue]]
speaker = "蘭美"
# 「えっ？」
line = "「えっ？」"

[[dialogue]]
speaker = "フェニエル"
# 「ご、ごめんなさい！　なんか星力込めてないのに、蟹の足が折れちゃいました……！」
line = "「ご、ごめんなさい！　なんか星力込めてないのに、蟹の足が折れちゃいました……！」"

[[dialogue]]
speaker = "蘭美"
# 「おかしいわね……蛍火が事前に包丁で、関節に切れ目でも入れてたのかしら？」
line = "「おかしいわね……蛍火が事前に包丁で、関節に切れ目でも入れてたのかしら？」"

[[dialogue]]
speaker = "フェニエル"
# 「あっ、いえ……関節ではなくて、足の真ん中で……」
line = "「あっ、いえ……関節ではなくて、足の真ん中で……」"

[[dialogue]]
speaker = "蘭美"
# 「は？　真ん中？」
line = "「は？　真ん中？」"

[[dialogue]]
speaker = "unk"
# フニが足の折ってしまった部分を、蘭美に見せる。
line = "フニが足の折ってしまった部分を、蘭美に見せる。"

[[dialogue]]
speaker = "蘭美"
# 「な、なにこれ……切れ目からパックリ行ったような感じじゃなくて、無理矢理力でへし折ったみたいになってるんだけど……」
line = "「な、なにこれ……切れ目からパックリ行ったような感じじゃなくて、無理矢理力でへし折ったみたいになってるんだけど……」"

[[dialogue]]
speaker = "unk"
# まさかフニ……素で割ったのか？
line = "まさかフニ……素で割ったのか？"

[[dialogue]]
speaker = "蘭美"
# 「は！？　素ってどういうこと！？」
line = "「は！？　素ってどういうこと！？」"

[[dialogue]]
speaker = "フェニエル"
# 「そう……なんですかね？」
line = "「そう……なんですかね？」"

[[dialogue]]
speaker = "蘭美"
# 「いやいやいや！　そんなわけないでしょ！？」
line = "「いやいやいや！　そんなわけないでしょ！？」"

[[dialogue]]
speaker = "蘭美"
# 「星力ありの星騎士でも、そう簡単に割れないのよ！？　フニ、試しにもう１回やってみなさい！　絶対に偶然だから！」
line = "「星力ありの星騎士でも、そう簡単に割れないのよ！？　フニ、試しにもう１回やってみなさい！　絶対に偶然だから！」"

[[dialogue]]
speaker = "フェニエル"
# 「は、はい。じゃあ――」
line = "「は、はい。じゃあ――」"

[[dialogue]]
speaker = "unk"
# フニはサラタンガニの別の足を両手で持つと、ぐっと曲げるように力を込める。
line = "フニはサラタンガニの別の足を両手で持つと、ぐっと曲げるように力を込める。"

[[dialogue]]
speaker = "フェニエル"
# 「えいっ」
line = "「えいっ」"

[[dialogue]]
speaker = "unk"
# ――バキンッ！
line = "――バキンッ！"

[[dialogue]]
speaker = "unk"
# すると、今度こそ俺たちの目の前で、サラタンガニの足が真ん中から真っ二つにへし折れてしまった。
line = "すると、今度こそ俺たちの目の前で、サラタンガニの足が真ん中から真っ二つにへし折れてしまった。"

[[dialogue]]
speaker = "蘭美"
# 「えええぇーーーっ！！？」
line = "「えええぇーーーっ！！？」"

[[dialogue]]
speaker = "フェニエル"
# 「行けちゃいました……！」
line = "「行けちゃいました……！」"

[[dialogue]]
speaker = "蘭美"
# 「どういうことぴょん！？　嘘でしょ！？」
line = "「どういうことぴょん！？　嘘でしょ！？」"

[[dialogue]]
speaker = "unk"
# 実は……フニはすごい怪力なんだ
line = "実は……フニはすごい怪力なんだ"

[[dialogue]]
speaker = "フェニエル"
# 「力にはちょっとだけ自信がありまして……えへへ♪」
line = "「力にはちょっとだけ自信がありまして……えへへ♪」"

[[dialogue]]
speaker = "蘭美"
# 「いや、おかしいでしょ！？　星力使ってないはずなのに、なんか普通の蟹の足みたいに折ってたけど！？」
line = "「いや、おかしいでしょ！？　星力使ってないはずなのに、なんか普通の蟹の足みたいに折ってたけど！？」"

[[dialogue]]
speaker = "蘭美"
# 「き、きっとこの蟹の方がおかしいのよ！　今度が私がやるわ！　見てなさい！」
line = "「き、きっとこの蟹の方がおかしいのよ！　今度が私がやるわ！　見てなさい！」"

[[dialogue]]
speaker = "蘭美"
# 「――ふんぬっ！　……はあぁ……ふうぅっ……えぇいっ！！　っ……このっ！　ふんぬううぅ～～っ！！！」
line = "「――ふんぬっ！　……はあぁ……ふうぅっ……えぇいっ！！　っ……このっ！　ふんぬううぅ～～っ！！！」"

[[dialogue]]
speaker = "unk"
# ――それからしばらくして。
line = "――それからしばらくして。"

[[dialogue]]
speaker = "蘭美"
# 「はぁ……はぁ……！　ど、どうやっても割れない……！　星力をフルパワーで使っても……！」
line = "「はぁ……はぁ……！　ど、どうやっても割れない……！　星力をフルパワーで使っても……！」"

[[dialogue]]
speaker = "フェニエル"
# 「あの……蘭美先輩、大丈夫ですか？」
line = "「あの……蘭美先輩、大丈夫ですか？」"

[[dialogue]]
speaker = "蘭美"
# 「このままじゃ終われないわ……こうなったら、フニ！」
line = "「このままじゃ終われないわ……こうなったら、フニ！」"

[[dialogue]]
speaker = "フェニエル"
# 「は、はいっ。なんでしょう？」
line = "「は、はいっ。なんでしょう？」"

[[dialogue]]
speaker = "蘭美"
# 「私はもう、意地を捨てるわ！　包丁を使って、最速でサラタンガニを解体する。だから――」
line = "「私はもう、意地を捨てるわ！　包丁を使って、最速でサラタンガニを解体する。だから――」"

[[dialogue]]
speaker = "蘭美"
# 「私のスピードと、あなたのパワー、どっちが勝つか、勝負よ！」
line = "「私のスピードと、あなたのパワー、どっちが勝つか、勝負よ！」"

[[dialogue]]
speaker = "フェニエル"
# 「えぇっ！？　私が蘭美先輩とですか！？」
line = "「えぇっ！？　私が蘭美先輩とですか！？」"

[[dialogue]]
speaker = "蘭美"
# 「そうよ！　私が認めた１人のメイドとして、受けて立ちなさい！」
line = "「そうよ！　私が認めた１人のメイドとして、受けて立ちなさい！」"

[[dialogue]]
speaker = "unk"
# その後――
line = "その後――"

[[dialogue]]
speaker = "蘭美"
# 「ま、負けたぴょおおおぉぉぉんっ！！？」
line = "「ま、負けたぴょおおおぉぉぉんっ！！？」"

[[dialogue]]
speaker = "フェニエル"
# 「やった……！　勝ちましたよ、会長さんっ！」
line = "「やった……！　勝ちましたよ、会長さんっ！」"

[[dialogue]]
speaker = "unk"
# フニ、すごいぞ！　力こそパワーだ！！
line = "フニ、すごいぞ！　力こそパワーだ！！"

[[dialogue]]
speaker = "フェニエル"
# 「ぴゃっ<emoji=heart04>　会長さんにお姫様抱っこされちゃいましたっ。えへへへっ……♪」
line = "「ぴゃっ<emoji=heart04>　会長さんにお姫様抱っこされちゃいましたっ。えへへへっ……♪」"

[[dialogue]]
speaker = "蘭美"
# 「くうぅぅ～～っ！　もっとスピードを磨いて、必ずそのパワーに勝ってみせるんだから！　次の勝負を待ってなさい、フニ！」
line = "「くうぅぅ～～っ！　もっとスピードを磨いて、必ずそのパワーに勝ってみせるんだから！　次の勝負を待ってなさい、フニ！」"

[[dialogue]]
speaker = "フェニエル"
# 「えっ！？　また勝負するんですか！？」
line = "「えっ！？　また勝負するんですか！？」"

[[dialogue]]
speaker = "unk"
# その日以降、たびたびフニのパワーに対抗心を燃やしては、スピードで挑んで来るようになる蘭美なのであった――
line = "その日以降、たびたびフニのパワーに対抗心を燃やしては、スピードで挑んで来るようになる蘭美なのであった――"
