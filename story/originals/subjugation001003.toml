[[dialogue]]
speaker = "セシア"
# 「ママダレナとアルモタヘルが転入してきたって話を聞いて、早速会いにきたわ♪」
line = "「ママダレナとアルモタヘルが転入してきたって話を聞いて、早速会いにきたわ♪」"

[[dialogue]]
speaker = "unk"
# 彼女は、附属校１年生のセシア。その正体は、守護天使《万成》のアウクセシアの転生体である。
line = "彼女は、附属校１年生のセシア。その正体は、守護天使《万成》のアウクセシアの転生体である。"

[[dialogue]]
speaker = "unk"
