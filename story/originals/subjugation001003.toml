[[dialogue]]
speaker = "unk"
# 流星学園附属校１年Ｃ組での自己紹介を終えた後、俺と守護天使２人はクラスメイト達に囲まれて、挨拶を交わすことになった。
line = "流星学園附属校１年Ｃ組での自己紹介を終えた後、俺と守護天使２人はクラスメイト達に囲まれて、挨拶を交わすことになった。"

[[dialogue]]
speaker = "unk"
# それが落ち着いた頃に、こそっと１人の見知った顔が近づいてきて――
line = "それが落ち着いた頃に、こそっと１人の見知った顔が近づいてきて――"

[[dialogue]]
speaker = "ナミエル"
# 「……小さくなった上に、女子になって附属校に通い始めるなんて、どういうことなんですか、緋宮会長」
line = "「……小さくなった上に、女子になって附属校に通い始めるなんて、どういうことなんですか、緋宮会長」"

[[dialogue]]
speaker = "unk"
# ナミエルと同じクラスだったんだね
line = "ナミエルと同じクラスだったんだね"

[[dialogue]]
speaker = "ナミエル"
# 「はい。私もまさか緋宮会長と同級生になるなんて、夢にも思いませんでした」
line = "「はい。私もまさか緋宮会長と同級生になるなんて、夢にも思いませんでした」"

[[dialogue]]
speaker = "unk"
# ナミエルは、星見家メイド隊の１人で、美化委員会にも所属する掃除のスペシャリストだ。
line = "ナミエルは、星見家メイド隊の１人で、美化委員会にも所属する掃除のスペシャリストだ。"

[[dialogue]]
speaker = "unk"
# 男に対して潔癖なところがあり、俺にもいささか手厳しい。しかしいざ話してみると、何だかんだ真面目に対応してくれる、いい子である。
line = "男に対して潔癖なところがあり、俺にもいささか手厳しい。しかしいざ話してみると、何だかんだ真面目に対応してくれる、いい子である。"

[[dialogue]]
speaker = "unk"
# ……実は元暗殺者であり、暗殺対象であったフィオナに拾ってもらったという過去があったりする。
line = "……実は元暗殺者であり、暗殺対象であったフィオナに拾ってもらったという過去があったりする。"

[[dialogue]]
speaker = "ナミエル"
# 「クラスメイトの皆さまとの会話で、体が小さくなった事情は大体わかりましたけど……本校の授業には出なくても大丈夫なんですか？」
line = "「クラスメイトの皆さまとの会話で、体が小さくなった事情は大体わかりましたけど……本校の授業には出なくても大丈夫なんですか？」"

[[dialogue]]
speaker = "ナミエル"
# 「――ヴィーナス様から、せっかくだから本体が回復するまで、附属校体験してきなさいと無茶振りされた？」
line = "「――ヴィーナス様から、せっかくだから本体が回復するまで、附属校体験してきなさいと無茶振りされた？」"

[[dialogue]]
speaker = "ナミエル"
# 「何をやっているんですか、一体……」
line = "「何をやっているんですか、一体……」"

[[dialogue]]
speaker = "ナミエル"
# 「というか、わざわざ女の体になる必要があったんですか？」
line = "「というか、わざわざ女の体になる必要があったんですか？」"

[[dialogue]]
speaker = "unk"
# それはアニマ先輩のノリで……
line = "それはアニマ先輩のノリで……"

[[dialogue]]
speaker = "ナミエル"
# 「――治療用の幼アバターは女性用しかなかった？　ふぅむ」
line = "「――治療用の幼アバターは女性用しかなかった？　ふぅむ」"

[[dialogue]]
speaker = "ナミエル"
# 「まぁ……かわいいとは、思いますけど……」
line = "「まぁ……かわいいとは、思いますけど……」"

[[dialogue]]
speaker = "unk"
# え？
line = "え？"

[[dialogue]]
speaker = "ナミエル"
# 「い、いえ。なんでもないです」
line = "「い、いえ。なんでもないです」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「あの～、ナミエル・クレシェンテさまですよね？」
line = "「あの～、ナミエル・クレシェンテさまですよね？」"

[[dialogue]]
speaker = "ナミエル"
# 「あ……！　マグダレナ様……！」
line = "「あ……！　マグダレナ様……！」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「うふふ、そんなかしこまらなくていいですよ。今日から同級生なんですから♪」
line = "「うふふ、そんなかしこまらなくていいですよ。今日から同級生なんですから♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「直接のご挨拶がまだでしたよね。初めまして、ナミエルさま。守護天使、《境界》のマグダレナです♪　これからよろしくお願いしますね♪」
line = "「直接のご挨拶がまだでしたよね。初めまして、ナミエルさま。守護天使、《境界》のマグダレナです♪　これからよろしくお願いしますね♪」"

[[dialogue]]
speaker = "ナミエル"
# 「は、はい！　こちらこそ、よろしくお願いします……！」
line = "「は、はい！　こちらこそ、よろしくお願いします……！」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「汝のことは、我も会長から聞いたことがあるぞ、ナミエルよ」
line = "「汝のことは、我も会長から聞いたことがあるぞ、ナミエルよ」"

[[dialogue]]
speaker = "ナミエル"
# 「アルモタヘル様……！」
line = "「アルモタヘル様……！」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「様付けはよい。我のことは親しみを込めて、アルモたんと呼ぶのだ！」
line = "「様付けはよい。我のことは親しみを込めて、アルモたんと呼ぶのだ！」"

[[dialogue]]
speaker = "ナミエル"
# 「い、いえ、それはちょっとハードルが……」
line = "「い、いえ、それはちょっとハードルが……」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「む～っ。この姿になっても、なかなかみんな呼んでくれないのだ。会長は呼んでくれたというのに～」
line = "「む～っ。この姿になっても、なかなかみんな呼んでくれないのだ。会長は呼んでくれたというのに～」"

[[dialogue]]
speaker = "ナミエル"
# （あ……むくれ顔、かわいい……）
line = "（あ……むくれ顔、かわいい……）"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「アルモタヘルはまだいいじゃないですか。私なんか、会長さまにもまだママダレナと呼んでもらえてないんですよ！」
line = "「アルモタヘルはまだいいじゃないですか。私なんか、会長さまにもまだママダレナと呼んでもらえてないんですよ！」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「いや、それはいささか無理があると思うのだ」
line = "「いや、それはいささか無理があると思うのだ」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「なんでですか！　新星寮の寮長であるマハムートさまは、小柄ながらもマムと呼ばれているのですよ？」
line = "「なんでですか！　新星寮の寮長であるマハムートさまは、小柄ながらもマムと呼ばれているのですよ？」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「だから私も、守護天使として皆からあんな風に、母のように慕われる存在になりたいのです。そう、<b>ママ</b>ダレナと……！」
line = "「だから私も、守護天使として皆からあんな風に、母のように慕われる存在になりたいのです。そう、<b>ママ</b>ダレナと……！」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「その為にはまず、アルモタヘルと同じように、会長さまから呼んでもらうのが第一目標です」
line = "「その為にはまず、アルモタヘルと同じように、会長さまから呼んでもらうのが第一目標です」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「というわけで会長さま、恥ずかしがらず、ママダレナと呼んで甘えてくれていいのですよ♪　ほら♪」
line = "「というわけで会長さま、恥ずかしがらず、ママダレナと呼んで甘えてくれていいのですよ♪　ほら♪」"

[[dialogue]]
speaker = "unk"
# そ、そんなキラキラした瞳で見られても……
line = "そ、そんなキラキラした瞳で見られても……"

[[dialogue]]
speaker = "ナミエル"
# 「な、なんだかお２人とも、外見だけでなく中身も少し、変わっているような……」
line = "「な、なんだかお２人とも、外見だけでなく中身も少し、変わっているような……」"

[[dialogue]]
speaker = "unk"
# 俺がアニマ先輩から聞いた説明を、ナミエルにすると――
line = "俺がアニマ先輩から聞いた説明を、ナミエルにすると――"

[[dialogue]]
speaker = "ナミエル"
# 「魂が体に引っ張られている……？　そんなことが……でも、言われてみれば緋宮会長も、仕草が女の子らしくなっていますね」
line = "「魂が体に引っ張られている……？　そんなことが……でも、言われてみれば緋宮会長も、仕草が女の子らしくなっていますね」"

[[dialogue]]
speaker = "unk"
# え！？　嘘！？
line = "え！？　嘘！？"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「自覚なかったのだ？　今に限らず、アニマの薬で女体化している時はいつも、違和感ないくらい女の仕草をしているぞ、人の子よ」
line = "「自覚なかったのだ？　今に限らず、アニマの薬で女体化している時はいつも、違和感ないくらい女の仕草をしているぞ、人の子よ」"

[[dialogue]]
