[[dialogue]]
speaker = "unk"
# 守護天使の２人と再会したことで自身が何者なのか思い出し、現在はリクリエとの戦いに力を貸してくれている。
line = "守護天使の２人と再会したことで自身が何者なのか思い出し、現在はリクリエとの戦いに力を貸してくれている。"

