[[dialogue]]
speaker = "unk"
# 第２話,一緒にゲームしよっ,P
line = "第２話,一緒にゲームしよっ,P"

[[dialogue]]
speaker = "unk"
# ミネコが選星者３人のお泊り会を提案してから迎えた週末。
line = "ミネコが選星者３人のお泊り会を提案してから迎えた週末。"

[[dialogue]]
speaker = "unk"
# さすがに俺まで泊まったりしないものの、彼女たちのレクリエーションには参加することになった。
line = "さすがに俺まで泊まったりしないものの、彼女たちのレクリエーションには参加することになった。"

[[dialogue]]
speaker = "ミネコ"
# 「――というわけで、大怪盗主催の『第２回ボードゲーム会』を開催しま～す♪」
line = "「――というわけで、大怪盗主催の『第２回ボードゲーム会』を開催しま～す♪」"

[[dialogue]]
speaker = "フェリシー"
# 「わ～♪　ぱちぱち～♪」
line = "「わ～♪　ぱちぱち～♪」"

[[dialogue]]
speaker = "ジュエリー"
# 「嫌な予感しかしないのだが……」
line = "「嫌な予感しかしないのだが……」"

[[dialogue]]
speaker = "ミネコ"
# 「今回のボードゲームはこれ♪　タイトルはズバリ『魔王を倒した勇者が死んでから』！」
line = "「今回のボードゲームはこれ♪　タイトルはズバリ『魔王を倒した勇者が死んでから』！」"

[[dialogue]]
speaker = "ミネコ"
# 「簡単に内容を言うと、魔王を復活させたい闇の勢力と、勇者の元パーティーメンバー側に別れて、どちらが勝つかを競うゲームで～す♪」
line = "「簡単に内容を言うと、魔王を復活させたい闇の勢力と、勇者の元パーティーメンバー側に別れて、どちらが勝つかを競うゲームで～す♪」"

[[dialogue]]
speaker = "ミネコ"
# 「今回は４人でプレイするから、２対２のチームに分かれて勝負しよ～♪」
line = "「今回は４人でプレイするから、２対２のチームに分かれて勝負しよ～♪」"

[[dialogue]]
speaker = "ミネコ"
# 「ってことで、まずはチーム分けから！　はい、『グーとパーで分かれましょう』をするよ～♪　はいっ、グーとッパ――」
line = "「ってことで、まずはチーム分けから！　はい、『グーとパーで分かれましょう』をするよ～♪　はいっ、グーとッパ――」"

[[dialogue]]
speaker = "ミネコ"
# 「――それじゃあ、チーム分けは私と会長で魔王側、ジュエリーとフェリシーは勇者側ってことで決定～♪」
line = "「――それじゃあ、チーム分けは私と会長で魔王側、ジュエリーとフェリシーは勇者側ってことで決定～♪」"

[[dialogue]]
speaker = "ジュエリー"
# 「むぅ。ゲームとはいえ、助手と敵対することになってしまうとは……」
line = "「むぅ。ゲームとはいえ、助手と敵対することになってしまうとは……」"

[[dialogue]]
speaker = "フェリシー"
# 「まあまあ、こういうのは１戦終わるごとに、組む相手を交代しながら楽しむものだから、一緒に頑張ろうよ♪」
line = "「まあまあ、こういうのは１戦終わるごとに、組む相手を交代しながら楽しむものだから、一緒に頑張ろうよ♪」"

[[dialogue]]
speaker = "ミネコ"
# 「会長、よろしくね～♪　私がこのゲームの面白さ、じっくりと教えてあげるから、楽しみにしててね？　ふふふっ☆」
line = "「会長、よろしくね～♪　私がこのゲームの面白さ、じっくりと教えてあげるから、楽しみにしててね？　ふふふっ☆」"

[[dialogue]]
speaker = "unk"
# そうして、ミネコにルールを教わりながら、ゲームが始まったのだが――
line = "そうして、ミネコにルールを教わりながら、ゲームが始まったのだが――"

[[dialogue]]
speaker = "ミネコ"
# 「ふふふ♪　<b>これで３連勝</b>だね、ジュエリー、フェリシー♪」
line = "「ふふふ♪　<b>これで３連勝</b>だね、ジュエリー、フェリシー♪」"

[[dialogue]]
speaker = "ジュエリー"
# 「ミネコ、キミというやつは……」
line = "「ミネコ、キミというやつは……」"

[[dialogue]]
speaker = "ジュエリー"
# 「確かに、このゲームに特別強い組み合わせは存在しない。しかし――」
line = "「確かに、このゲームに特別強い組み合わせは存在しない。しかし――」"

[[dialogue]]
speaker = "ミネコ"
# 「いや～、やっぱり理不尽に強いな～、勇者側の『長寿エルフ』と『弟子の見習い賢者』のコンビは♪　熟練者の私でも、１回も勝てないとはね～♪」
line = "「いや～、やっぱり理不尽に強いな～、勇者側の『長寿エルフ』と『弟子の見習い賢者』のコンビは♪　熟練者の私でも、１回も勝てないとはね～♪」"

[[dialogue]]
speaker = "unk"
# そう、俺とミネコは、ゲームを覚えたばかりのジュエリーとフェリシーに、フルボッコで３連敗を喫していた。
line = "そう、俺とミネコは、ゲームを覚えたばかりのジュエリーとフェリシーに、フルボッコで３連敗を喫していた。"

[[dialogue]]
speaker = "ミネコ"
# 「このゲーム、基本的にはよく出来てるんだけど、勇者側のその組み合わせだけはバグみたいに最強なんだよね～♪　いや、もうこれ、長寿エルフ誰が倒せんのっていうね♪」
line = "「このゲーム、基本的にはよく出来てるんだけど、勇者側のその組み合わせだけはバグみたいに最強なんだよね～♪　いや、もうこれ、長寿エルフ誰が倒せんのっていうね♪」"

[[dialogue]]
speaker = "フェリシー"
# 「それがわかってて、３回も選んだの！？」
line = "「それがわかってて、３回も選んだの！？」"

[[dialogue]]
speaker = "ミネコ"
# 「ふふふ……だって、フェリシー」
line = "「ふふふ……だって、フェリシー」"

[[dialogue]]
speaker = "ミネコ"
# 「――ゲームの難易度はマゾければマゾいほど、気持ちいいじゃん？」
line = "「――ゲームの難易度はマゾければマゾいほど、気持ちいいじゃん？」"

[[dialogue]]
speaker = "フェリシー"
# 「今、気持ちいいって言った！？」
line = "「今、気持ちいいって言った！？」"

[[dialogue]]
speaker = "ジュエリー"
# 「フェリシー。ミネコは理不尽が好きな『クソゲーマニア』なんだ……」
line = "「フェリシー。ミネコは理不尽が好きな『クソゲーマニア』なんだ……」"

[[dialogue]]
speaker = "フェリシー"
# 「変態さんってことぉ！？」
line = "「変態さんってことぉ！？」"

[[dialogue]]
speaker = "ミネコ"
# 「まるで私が、痛めつけられるのが好きなだけのドＭ、みたいな理解は心外かな。私はね……クソゲーで悶えている他人を見るのも、とっても大好きだよ☆」
line = "「まるで私が、痛めつけられるのが好きなだけのドＭ、みたいな理解は心外かな。私はね……クソゲーで悶えている他人を見るのも、とっても大好きだよ☆」"

[[dialogue]]
speaker = "フェリシー"
# 「何を言ってるか全然わからないよ……！？」
line = "「何を言ってるか全然わからないよ……！？」"

[[dialogue]]
speaker = "ジュエリー"
# 「明解に換言すれば、超変態ということだ」
line = "「明解に換言すれば、超変態ということだ」"

[[dialogue]]
speaker = "ミネコ"
# 「ただ、私はクソゲーを楽しんでるけど、一緒のチームをやってる会長はそうじゃないだろうし、そろそろチームシャッフルして、今度は普通の勝負を――」
line = "「ただ、私はクソゲーを楽しんでるけど、一緒のチームをやってる会長はそうじゃないだろうし、そろそろチームシャッフルして、今度は普通の勝負を――」"

[[dialogue]]
speaker = "unk"
# いいや、同じ組み合わせでもう１回やろう！
line = "いいや、同じ組み合わせでもう１回やろう！"

[[dialogue]]
speaker = "ミネコ"
# 「って、会長？」
line = "「って、会長？」"

[[dialogue]]
speaker = "ミネコ"
# 「あれ……もしかして、負けっぱなしで逆に闘志に火が点いちゃった感じ？」
line = "「あれ……もしかして、負けっぱなしで逆に闘志に火が点いちゃった感じ？」"

[[dialogue]]
speaker = "unk"
# それから俺は、これまでの敗北で学んだ経験を元に、全力でミネコをサポートして――
line = "それから俺は、これまでの敗北で学んだ経験を元に、全力でミネコをサポートして――"

[[dialogue]]
speaker = "ミネコ"
# 「えっ、ウソ……！？」
line = "「えっ、ウソ……！？」"

[[dialogue]]
speaker = "ミネコ"
# 「す……すごいすごいっ！　まさか運も味方したとはいえ、最強の組み合わせに勝てるなんて！　会長、本当にすごいよ！」
line = "「す……すごいすごいっ！　まさか運も味方したとはいえ、最強の組み合わせに勝てるなんて！　会長、本当にすごいよ！」"

[[dialogue]]
speaker = "unk"
# １回もミスしないように集中して、精神力を限界まで使ってヘトヘトになりながら、ぐっと親指をサムズアップしてみせる。
line = "１回もミスしないように集中して、精神力を限界まで使ってヘトヘトになりながら、ぐっと親指をサムズアップしてみせる。"

[[dialogue]]
speaker = "unk"
# クソゲーを攻略してやったぜ……！
line = "クソゲーを攻略してやったぜ……！"

[[dialogue]]
speaker = "ミネコ"
# 「会長、めっちゃカッコよかったよ♪　怪盗の私が、ハート盗まれちゃいそうかも♪　……なんてね、ふふふっ☆」
line = "「会長、めっちゃカッコよかったよ♪　怪盗の私が、ハート盗まれちゃいそうかも♪　……なんてね、ふふふっ☆」"

[[dialogue]]
speaker = "ミネコ"
# 「とりあえず、これで心置きなく、チームシャッフルができるね♪」
line = "「とりあえず、これで心置きなく、チームシャッフルができるね♪」"

[[dialogue]]
speaker = "ジュエリー"
# 「いや、待ちたまえ」
line = "「いや、待ちたまえ」"

[[dialogue]]
speaker = "フェリシー"
# 「……もう１回」
line = "「……もう１回」"

[[dialogue]]
speaker = "unk"
# え？
line = "え？"

[[dialogue]]
speaker = "フェリシー"
# 「もう１回やろう！　会長くん！　だって、こんなカッコいい勝ち方されて、そのまま終わりだなんて悔しすぎるもん！」
line = "「もう１回やろう！　会長くん！　だって、こんなカッコいい勝ち方されて、そのまま終わりだなんて悔しすぎるもん！」"

[[dialogue]]
speaker = "ジュエリー"
# 「そういうことだ。助手、キミなら私たちの思いに応えてくれるだろう？」
line = "「そういうことだ。助手、キミなら私たちの思いに応えてくれるだろう？」"

[[dialogue]]
speaker = "ミネコ"
# 「おやおや、これはどうやら――難易度が更に上がっちゃったみたいだね♪」
line = "「おやおや、これはどうやら――難易度が更に上がっちゃったみたいだね♪」"

[[dialogue]]
speaker = "unk"
# もう勘弁して！！！
line = "もう勘弁して！！！"

[[dialogue]]
speaker = "ミネコ"
# 「ふふっ♪　会長、もう１戦――私と一緒にクソゲーしよ<emoji=heart04>」
line = "「ふふっ♪　会長、もう１戦――私と一緒にクソゲーしよ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そう言って、楽しそうに笑うミネコなのだった――
line = "そう言って、楽しそうに笑うミネコなのだった――"
