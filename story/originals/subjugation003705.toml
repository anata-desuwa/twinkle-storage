[[dialogue]]
speaker = "unk"
# 第５話,ＶＳ星喰らいシャドウ・ジグ戦闘前,B
line = "第５話,ＶＳ星喰らいシャドウ・ジグ戦闘前,B"

[[dialogue]]
speaker = "unk"
# ベガの天界──女神の神殿前。
line = "ベガの天界──女神の神殿前。"

[[dialogue]]
speaker = "unk"
# 地球を喰らい、創造神の糧とする『星喰らい』の拠点を守護するのは、使徒ジグのシャドウ。
line = "地球を喰らい、創造神の糧とする『星喰らい』の拠点を守護するのは、使徒ジグのシャドウ。"

[[dialogue]]
speaker = "unk"
# この個体も、別拠点を守護するホロウ・ルヴィネと同じく、先のアルタイル戦よりも大幅な強化を加えられている。
line = "この個体も、別拠点を守護するホロウ・ルヴィネと同じく、先のアルタイル戦よりも大幅な強化を加えられている。"

[[dialogue]]
speaker = "ジグ"
# 「真なる神の傷さえ癒えれば……世界は再び刷新される……」
line = "「真なる神の傷さえ癒えれば……世界は再び刷新される……」"

[[dialogue]]
speaker = "ジグ"
# 「私は障害を排除する……それこそが、真なる神の騎士の役目……」
line = "「私は障害を排除する……それこそが、真なる神の騎士の役目……」"

[[dialogue]]
speaker = "unk"
# 大剣を携えて佇むシャドウジグだったが──接近しつつある脅威の気配をすぐに察知した。
line = "大剣を携えて佇むシャドウジグだったが──接近しつつある脅威の気配をすぐに察知した。"

[[dialogue]]
speaker = "ジグ"
# 「──来たな。アルタイルの星騎士たち」
line = "「──来たな。アルタイルの星騎士たち」"

[[dialogue]]
speaker = "unk"
# 厄災の右腕を束ねる魔王さえいなければ、烏合の衆。
line = "厄災の右腕を束ねる魔王さえいなければ、烏合の衆。"

[[dialogue]]
speaker = "unk"
# 一太刀の元に切り捨ててみせよう──
line = "一太刀の元に切り捨ててみせよう──"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「いたのだ！　使徒ジグのシャドウ！」
line = "「いたのだ！　使徒ジグのシャドウ！」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「これ以上、ベガの地球を好きにはさせません！　悪い子にはオシオキですっ！！」
line = "「これ以上、ベガの地球を好きにはさせません！　悪い子にはオシオキですっ！！」"

[[dialogue]]
speaker = "ジグ"
# 「────っ！？」
line = "「────っ！？」"

[[dialogue]]
speaker = "ラティエ"
# 「ほう──使徒のシャドウ。強化されているとは聞いていたが……ここまでとはね」
line = "「ほう──使徒のシャドウ。強化されているとは聞いていたが……ここまでとはね」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「ええ、油断ならない相手のようです！」
line = "「ええ、油断ならない相手のようです！」"

[[dialogue]]
speaker = "ナターシャ"
# 「共闘するのは初めてだけど、本当にあり得ない星力……ラティエ学園長が傍にいると頼もしいね」
line = "「共闘するのは初めてだけど、本当にあり得ない星力……ラティエ学園長が傍にいると頼もしいね」"

[[dialogue]]
speaker = "ジグ"
# 「な、何だ、お前たちはっ！？」
line = "「な、何だ、お前たちはっ！？」"

[[dialogue]]
speaker = "ジグ"
# 「仮にも世界の命運を懸けた戦いっ！！　これに敗北したら、お前たちは後がないはず……ど、どういうことだ！？」
line = "「仮にも世界の命運を懸けた戦いっ！！　これに敗北したら、お前たちは後がないはず……ど、どういうことだ！？」"

[[dialogue]]
speaker = "セシア"
# 「世界を支える守護天使として、あなたを見過ごすわけにはいかないわ。私の力、見せてあげる……！」
line = "「世界を支える守護天使として、あなたを見過ごすわけにはいかないわ。私の力、見せてあげる……！」"

[[dialogue]]
speaker = "アム"
# 「次期星徒会長を狙ってるあたしが、決戦の場面にいないなんてあり得ないからね！　クリスマスフォームでみんなを引っ張っちゃうよ！！」
line = "「次期星徒会長を狙ってるあたしが、決戦の場面にいないなんてあり得ないからね！　クリスマスフォームでみんなを引っ張っちゃうよ！！」"

[[dialogue]]
speaker = "ジグ"
# 「水着の次は、サンタ衣装……！？　イ、イカれてるのか、お前たちは！？」
line = "「水着の次は、サンタ衣装……！？　イ、イカれてるのか、お前たちは！？」"

[[dialogue]]
speaker = "アポロ"
# 「お前を倒すためにやってきたんだ！　幹内世界のあたしから貰ったこのヒーローの力、見せつけてやる！！」
line = "「お前を倒すためにやってきたんだ！　幹内世界のあたしから貰ったこのヒーローの力、見せつけてやる！！」"

[[dialogue]]
speaker = "ナミエル"
# 「職務上、汚れは気になる<ruby=たち>性質</ruby>でして。ベガの地球を荒らす輩……お掃除させていただきます」
line = "「職務上、汚れは気になる<ruby>性質<rt>たち</rt></ruby>でして。ベガの地球を荒らす輩……お掃除させていただきます」"

[[dialogue]]
speaker = "ジグ"
# 「パーティーの帰りか貴様ら！？　真なる神を前に、不敬にも程がある！　生きて帰れると思うな……！」
line = "「パーティーの帰りか貴様ら！？　真なる神を前に、不敬にも程がある！　生きて帰れると思うな……！」"

[[dialogue]]
speaker = "ＸＥＬＯＳ"
# 「ギィギギ────ギィ────！！」
line = "「ギィギギ────ギィ────！！」"

[[dialogue]]
speaker = "ジグ"
# 「か……神！？　今、なんと！？」
line = "「か……神！？　今、なんと！？」"

[[dialogue]]
speaker = "unk"
# ジグは神の傀儡。そのためその言語を<ruby=ひもと>繙</ruby>くことができる──
line = "ジグは神の傀儡。そのためその言語を<ruby>繙<rt>ひもと</rt></ruby>くことができる──"

[[dialogue]]
speaker = "unk"
# ──コノフザケタ連中ニ、スデニ一ヵ所デ敗北シテイル！！
line = "──コノフザケタ連中ニ、スデニ一ヵ所デ敗北シテイル！！"

[[dialogue]]
speaker = "ジグ"
# 「ええぇ……？」
line = "「ええぇ……？」"

[[dialogue]]
speaker = "unk"
# ──油断スルナ、見タ目ニ惑ワサレルナ！！
line = "──油断スルナ、見タ目ニ惑ワサレルナ！！"

[[dialogue]]
speaker = "ジグ"
# 「な、何を……」
line = "「な、何を……」"

[[dialogue]]
speaker = "unk"
# ──奴ラノ強サハ並デハナイ──！！！
line = "──奴ラノ強サハ並デハナイ──！！！"

[[dialogue]]
speaker = "ジグ"
# 「そう、言われましても……」
line = "「そう、言われましても……」"

[[dialogue]]
speaker = "ミルフィー"
# 「マグダレナ様～っ！　頑張ってくださいっ！　ゴー！　ファイト！　ウィンッ！！」
line = "「マグダレナ様～っ！　頑張ってくださいっ！　ゴー！　ファイト！　ウィンッ！！」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「ありがとうございます、ミルフィー！　ママダレナ、勇気１００倍ですよ～♪」
line = "「ありがとうございます、ミルフィー！　ママダレナ、勇気１００倍ですよ～♪」"

[[dialogue]]
speaker = "アナ"
# 「しゅわっち──あけおめ超天使・アナ。破魔矢を持ってスタンバイ」
line = "「しゅわっち──あけおめ超天使・アナ。破魔矢を持ってスタンバイ」"

[[dialogue]]
speaker = "ナターシャ"
# 「いやなんか本当に凄い組み合わせだよね。高熱が出た時に見る夢みたい」
line = "「いやなんか本当に凄い組み合わせだよね。高熱が出た時に見る夢みたい」"

[[dialogue]]
speaker = "ジグ"
# 「──どこまでも舐めるつもりか！　１人残らず斬り伏せてやる！」
line = "「──どこまでも舐めるつもりか！　１人残らず斬り伏せてやる！」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「できるものなら、やってみるといいのだ！　今のアルモたんたちは普通じゃないのだ！！」
line = "「できるものなら、やってみるといいのだ！　今のアルモたんたちは普通じゃないのだ！！」"

[[dialogue]]
speaker = "ジグ"
# 「ああ、普通じゃない！　死の恐怖を前に、頭がおかしくなったのだろう！？」
line = "「ああ、普通じゃない！　死の恐怖を前に、頭がおかしくなったのだろう！？」"

[[dialogue]]
speaker = "ジグ"
# 「こんな世界は、やはり滅びるべきだ！　消えろ、アルタイルの星騎士たち──！！！」
line = "「こんな世界は、やはり滅びるべきだ！　消えろ、アルタイルの星騎士たち──！！！」"
