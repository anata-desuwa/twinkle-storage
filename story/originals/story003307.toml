[[dialogue]]
speaker = "サメ"
# 「シャーーーーーッ！！！」
line = "「シャーーーーーッ！！！」"

[[dialogue]]
speaker = "パテル"
# 「わー、ビーチにサメがいっぱい。パテルちゃん人気者だな～♪　サメにモテても嬉しくないけど」
line = "「わー、ビーチにサメがいっぱい。パテルちゃん人気者だな～♪　サメにモテても嬉しくないけど」"

[[dialogue]]
speaker = "パテル"
# 「ちなみに魔王たちは不死の命とか興味ある？　どこかのコラプサーみたいなのになってまで生きたい？」
line = "「ちなみに魔王たちは不死の命とか興味ある？　どこかのコラプサーみたいなのになってまで生きたい？」"

[[dialogue]]
speaker = "unk"
# 俺は今の俺の命を全うするだけだよ
line = "俺は今の俺の命を全うするだけだよ"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「アルモたんもそうなのだ！　確かにアルモたんは普通じゃないけど、アルモたんなりに生きるのだ！」
line = "「アルモたんもそうなのだ！　確かにアルモたんは普通じゃないけど、アルモたんなりに生きるのだ！」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「そんな摂理に反する生き方をしたいとは思いません。大きい私でも小さい私でも、肉体を得た時からそれは変わらないです」
line = "「そんな摂理に反する生き方をしたいとは思いません。大きい私でも小さい私でも、肉体を得た時からそれは変わらないです」"

[[dialogue]]
speaker = "パテル"
# 「それなら大丈夫。今のところ魂や肉体に異変はないって、直接触って調べさせてもらったからね」
line = "「それなら大丈夫。今のところ魂や肉体に異変はないって、直接触って調べさせてもらったからね」"

[[dialogue]]
speaker = "unk"
# もしかして目隠しされた時に？
line = "もしかして目隠しされた時に？"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「あ、そういえば私も海藻を取ってもらった時に触られましたね」
line = "「あ、そういえば私も海藻を取ってもらった時に触られましたね」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「アルモたんもコチョコチョされたのだ！」
line = "「アルモたんもコチョコチョされたのだ！」"

[[dialogue]]
speaker = "パテル"
# 「そういうこと。サメが出てこなければ、種明かしをするつもりはなかったんだけどね」
line = "「そういうこと。サメが出てこなければ、種明かしをするつもりはなかったんだけどね」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「さすがパテル、抜け目がありませんね……」
line = "「さすがパテル、抜け目がありませんね……」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「でもアルモたんたちはどうすればいいのだ？　サメを操ってるのがパテルなら、パテルと戦うことになるのか？」
line = "「でもアルモたんたちはどうすればいいのだ？　サメを操ってるのがパテルなら、パテルと戦うことになるのか？」"

[[dialogue]]
speaker = "パテル"
# 「今のところ魔王やアルモタヘルたちは大丈夫だし、サメは普通に倒しちゃえばいいよ」
line = "「今のところ魔王やアルモタヘルたちは大丈夫だし、サメは普通に倒しちゃえばいいよ」"

[[dialogue]]
speaker = "パテル"
# 「ていうかこのサメは囮だと思うんだよね。パテルが一番試したいのは、多分あたしだから」
line = "「ていうかこのサメは囮だと思うんだよね。パテルが一番試したいのは、多分あたしだから」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「え……？　それってどういう……？」
line = "「え……？　それってどういう……？」"

[[dialogue]]
speaker = "サメ"
# 「シャーーーッ！！」
line = "「シャーーーッ！！」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「わぁっ！？　今はこっちに集中しないといけませんね」
line = "「わぁっ！？　今はこっちに集中しないといけませんね」"

[[dialogue]]
speaker = "リップル"
# 「ワタシも戦います！」
line = "「ワタシも戦います！」"

[[dialogue]]
speaker = "リップル"
# 「リゾート結界を荒らすサメは許しまセンよー！　ハッピーライディング！」
line = "「リゾート結界を荒らすサメは許しまセンよー！　ハッピーライディング！」"

[[dialogue]]
speaker = "サメ"
# 「シャッ！？」
line = "「シャッ！？」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「サメはまとめてキャッチなのだ！　プルガトリオキャプチャー！」
line = "「サメはまとめてキャッチなのだ！　プルガトリオキャプチャー！」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「私もいきます！　ドミニオンスコップ！」
line = "「私もいきます！　ドミニオンスコップ！」"

[[dialogue]]
speaker = "サメ"
# 「シャ～～～ッ！？」
line = "「シャ～～～ッ！？」"

[[dialogue]]
speaker = "パテル"
# 「マグダレナ、アルモタヘル、ここは任せたよ！」
line = "「マグダレナ、アルモタヘル、ここは任せたよ！」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「わかりました！」
line = "「わかりました！」"

[[dialogue]]
speaker = "パテル"
# 「魔王はあたしと一緒に来て。これだけ派手に暴れてれば、探すまでもなく、中心になってるやつを見つけられるはず」
line = "「魔王はあたしと一緒に来て。これだけ派手に暴れてれば、探すまでもなく、中心になってるやつを見つけられるはず」"

[[dialogue]]
speaker = "パテル"
# 「ほら、フカヒレくんに乗って！　いっくよ～～！」
line = "「ほら、フカヒレくんに乗って！　いっくよ～～！」"

[[dialogue]]
speaker = "unk"
# パテルと一緒にフカヒレくんに乗り、リゾート結界の海を走る。
line = "パテルと一緒にフカヒレくんに乗り、リゾート結界の海を走る。"

[[dialogue]]
speaker = "unk"
# その先には──
line = "その先には──"

[[dialogue]]
speaker = "パテル？"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# いつもの黒衣に身を包み、死神の大鎌を携えたパテルの分身が、数時間前に遊んでいた海上アスレチックの上に佇んでいた。
line = "いつもの黒衣に身を包み、死神の大鎌を携えたパテルの分身が、数時間前に遊んでいた海上アスレチックの上に佇んでいた。"

[[dialogue]]
speaker = "unk"
# 凍てつくような冷たい眼差しで俺たちを──いや、パテルを見つめている。
line = "凍てつくような冷たい眼差しで俺たちを──いや、パテルを見つめている。"

[[dialogue]]
speaker = "パテル"
# 「やぁ、来てあげたよ、かわいくないあたし」
line = "「やぁ、来てあげたよ、かわいくないあたし」"

[[dialogue]]
speaker = "パテル"
# 「わかってるよ。あなたが本当に見定めたいのはあたしなんでしょ？」
line = "「わかってるよ。あなたが本当に見定めたいのはあたしなんでしょ？」"

[[dialogue]]
speaker = "unk"
# パテルがパテルを見定める……？
line = "パテルがパテルを見定める……？"

[[dialogue]]
speaker = "パテル"
# 「簡単な話だよ」
line = "「簡単な話だよ」"

[[dialogue]]
speaker = "パテル"
# 「ラクシャの『流転』の力で肉体を得たから義体より普通の天使に近いとはいえ、あたしも守護天使が受肉した、本来ありえない命」
line = "「ラクシャの『流転』の力で肉体を得たから義体より普通の天使に近いとはいえ、あたしも守護天使が受肉した、本来ありえない命」"

[[dialogue]]
speaker = "パテル"
# 「守護天使パテルは、このあたしも試そうとしているんだよ」
line = "「守護天使パテルは、このあたしも試そうとしているんだよ」"

[[dialogue]]
speaker = "パテル？"
# 「問おう、肉体を持つ私。他の守護天使ならまだしも、死を司るお前がどうして命を得た？」
line = "「問おう、肉体を持つ私。他の守護天使ならまだしも、死を司るお前がどうして命を得た？」"

[[dialogue]]
speaker = "パテル？"
# 「お前は三界の命に理由なく関わらない主義だろう？　それが死神としての在り方ではなかったのか？」
line = "「お前は三界の命に理由なく関わらない主義だろう？　それが死神としての在り方ではなかったのか？」"

[[dialogue]]
speaker = "パテル"
# 「まぁそれはそう」
line = "「まぁそれはそう」"

[[dialogue]]
speaker = "パテル"
# 「あたしが助けた猫がネズミを殺せば、あたしはネズミを殺したことになる。死神として不公平になっちゃうから、あたしは個々の命に関わるべきじゃない」
line = "「あたしが助けた猫がネズミを殺せば、あたしはネズミを殺したことになる。死神として不公平になっちゃうから、あたしは個々の命に関わるべきじゃない」"

[[dialogue]]
speaker = "パテル"
# 「あたしは今でもそう思ってるよ」
line = "「あたしは今でもそう思ってるよ」"

[[dialogue]]
speaker = "パテル？"
# 「ではなぜ肉体を求めた？　体を得ることは命と関わること。お前の主義ではない」
line = "「ではなぜ肉体を求めた？　体を得ることは命と関わること。お前の主義ではない」"

[[dialogue]]
speaker = "パテル"
# 「今回はいつものリクリエと違う感じだったから、ちょっと気になってね」
line = "「今回はいつものリクリエと違う感じだったから、ちょっと気になってね」"

[[dialogue]]
speaker = "パテル"
# 「でもラクシャにお願いした時は……グロリアやフラン、魔王と会ったばかりで浮かれてたからだろうな～」
line = "「でもラクシャにお願いした時は……グロリアやフラン、魔王と会ったばかりで浮かれてたからだろうな～」"

[[dialogue]]
speaker = "パテル？"
# 「一時の感情で肉体を得たのは過ちではないのか？　今からでも肉体を捨てるべきではないか？」
line = "「一時の感情で肉体を得たのは過ちではないのか？　今からでも肉体を捨てるべきではないか？」"

[[dialogue]]
speaker = "パテル"
# 「言うと思ったよ。死神的には、あたしのこと消したくて消したくて仕方ないんでしょ」
line = "「言うと思ったよ。死神的には、あたしのこと消したくて消したくて仕方ないんでしょ」"

[[dialogue]]
speaker = "パテル"
# 「あなたは恐れてるし、怒ってるんだね。あたしが肉体を得て、心を動かされることに」
line = "「あなたは恐れてるし、怒ってるんだね。あたしが肉体を得て、心を動かされることに」"

[[dialogue]]
speaker = "パテル"
# 「自分の命が惜しくなって、摂理を歪めて、本来の寿命より長生きしようとするかもしれない」
line = "「自分の命が惜しくなって、摂理を歪めて、本来の寿命より長生きしようとするかもしれない」"

[[dialogue]]
speaker = "パテル"
# 「誰かが大切になって、別れたくなくて、無理やり生かそうとするかもしれない」
line = "「誰かが大切になって、別れたくなくて、無理やり生かそうとするかもしれない」"

[[dialogue]]
speaker = "パテル"
# 「でもそれはしないよ」
line = "「でもそれはしないよ」"

[[dialogue]]
speaker = "パテル"
# 「他でもないあたしが……数多の命を奪ってきた死神がそれをするのは、命への冒涜だ」
line = "「他でもないあたしが……数多の命を奪ってきた死神がそれをするのは、命への冒涜だ」"

[[dialogue]]
speaker = "パテル"
# 「せっかく魔王が見てるし、彼の前で誓うよ。あたしは『淘汰』を司る守護天使として、そんなことはしないって」
line = "「せっかく魔王が見てるし、彼の前で誓うよ。あたしは『淘汰』を司る守護天使として、そんなことはしないって」"

[[dialogue]]
speaker = "パテル？"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "パテル"
# 「どう？　満足した？　満足したならさっさと欠片に戻ってよ」
line = "「どう？　満足した？　満足したならさっさと欠片に戻ってよ」"

[[dialogue]]
speaker = "パテル？"
# 「いいや、満足などしていない。そんな言葉だけで納得するわけがない」
line = "「いいや、満足などしていない。そんな言葉だけで納得するわけがない」"

[[dialogue]]
speaker = "パテル？"
# 「試練を与えよう。お前は私が連れていく」
line = "「試練を与えよう。お前は私が連れていく」"

[[dialogue]]
speaker = "パテル"
# 「それはこっちのセリフ！　あなたこそあたしに連れていかれる方だよ！」
line = "「それはこっちのセリフ！　あなたこそあたしに連れていかれる方だよ！」"

[[dialogue]]
speaker = "パテル"
# 「さぁ、試練の時だ！」
line = "「さぁ、試練の時だ！」"
