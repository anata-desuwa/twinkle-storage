[[dialogue]]
speaker = "unk"
# 第４話,ホワイトデーは遊園地で,P
line = "第４話,ホワイトデーは遊園地で,P"

[[dialogue]]
speaker = "シャルレーヌ"
# 「ホワイトデーのお返し、てっきり何かのお菓子を貰うんだろうな～って思ってたんですけど」
line = "「ホワイトデーのお返し、てっきり何かのお菓子を貰うんだろうな～って思ってたんですけど」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「まさか会長さんから遊園地デートに誘われるだなんて、思いませんでした。ふふっ、すっごくポイント高いですよ～<emoji=heart04>」
line = "「まさか会長さんから遊園地デートに誘われるだなんて、思いませんでした。ふふっ、すっごくポイント高いですよ～<emoji=heart04>」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「それに～……くふふふふっ<emoji=heart04>　会長さんの狼男のコスプレ、よ～く似合ってます♪」
line = "「それに～……くふふふふっ<emoji=heart04>　会長さんの狼男のコスプレ、よ～く似合ってます♪」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「不思議ですねぇ、チョコをくださいの一言もなかなか言えない男の子なのに、オオカミの恰好が似合っちゃうだなんて～♪」
line = "「不思議ですねぇ、チョコをくださいの一言もなかなか言えない男の子なのに、オオカミの恰好が似合っちゃうだなんて～♪」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「本当に面白い試みです。遊園地のイベントで、月に１回のコスプレデーがあるだなんて」
line = "「本当に面白い試みです。遊園地のイベントで、月に１回のコスプレデーがあるだなんて」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「衣装を借りて着飾れば、色々なアトラクションで恩恵を得られる……いい仕組みです」
line = "「衣装を借りて着飾れば、色々なアトラクションで恩恵を得られる……いい仕組みです」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「ハロウィンを季節感なく取り入れた感じなんでしょうか……？　将来、魔界に遊園地を作る時の参考にできそうですね♪」
line = "「ハロウィンを季節感なく取り入れた感じなんでしょうか……？　将来、魔界に遊園地を作る時の参考にできそうですね♪」"

[[dialogue]]
speaker = "unk"
