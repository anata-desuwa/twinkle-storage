[[dialogue]]
speaker = "unk"
# 第４話,リコさんと大人な休日,P
line = "第４話,リコさんと大人な休日,P"

[[dialogue]]
speaker = "unk"
# リコさんと学園でもよく会って関わるようになり、しばらく経ったある休日のこと。
line = "リコさんと学園でもよく会って関わるようになり、しばらく経ったある休日のこと。"

[[dialogue]]
speaker = "unk"
# 俺はリコさんに誘われて、リゾート結界のプライベートビーチへ遊びにやって来ていた――
line = "俺はリコさんに誘われて、リゾート結界のプライベートビーチへ遊びにやって来ていた――"

[[dialogue]]
speaker = "リコリンフィア"
# 「少年、休日にすまないな。お姉さんに付き合ってくれて感謝する」
line = "「少年、休日にすまないな。お姉さんに付き合ってくれて感謝する」"

[[dialogue]]
speaker = "unk"
# 今日はまた、依頼の相談でしょうか？
line = "今日はまた、依頼の相談でしょうか？"

[[dialogue]]
speaker = "リコリンフィア"
# 「ん？　もしかして、公安委員会の依頼だと思ってしまっていたか？」
line = "「ん？　もしかして、公安委員会の依頼だと思ってしまっていたか？」"

[[dialogue]]
speaker = "リコリンフィア"
# 「そうか……だとしたらすまない。単純に、たまたまオフだったから、試しに声をかけてみただけなんだ」
line = "「そうか……だとしたらすまない。単純に、たまたまオフだったから、試しに声をかけてみただけなんだ」"

[[dialogue]]
speaker = "リコリンフィア"
# 「そうしたら、少年が即決でＯＫしてくれたものだから、つい調子に乗ってしまった」
line = "「そうしたら、少年が即決でＯＫしてくれたものだから、つい調子に乗ってしまった」"

[[dialogue]]
speaker = "リコリンフィア"
# 「昨日の夜は酒を飲んでしまっていたのもあるが……冷静に考えてみれば、そうだな。……年の離れた私から連絡が来れば、そう思うのが普通か」
line = "「昨日の夜は酒を飲んでしまっていたのもあるが……冷静に考えてみれば、そうだな。……年の離れた私から連絡が来れば、そう思うのが普通か」"

[[dialogue]]
speaker = "リコリンフィア"
# 「最近は学園でもよく会っていたから、いつの間にか感覚が麻痺してしまっていたようだ」
line = "「最近は学園でもよく会っていたから、いつの間にか感覚が麻痺してしまっていたようだ」"

[[dialogue]]
speaker = "リコリンフィア"
# 「少年からすれば私は、キミの母親であるリノの友人だというのにな……」
line = "「少年からすれば私は、キミの母親であるリノの友人だというのにな……」"

[[dialogue]]
speaker = "unk"
# そんなことないです！
line = "そんなことないです！"

[[dialogue]]
speaker = "unk"
# 俺は慌てて首を横に振り、年齢なんて気にしていないと伝える。
line = "俺は慌てて首を横に振り、年齢なんて気にしていないと伝える。"

[[dialogue]]
speaker = "リコリンフィア"
# 「気を遣わせてしまってすまない、少年。休みに付き合わせてしまっているお詫びと言ってはなんだが、今日はお姉さんが食事を何でも奢ろう」
line = "「気を遣わせてしまってすまない、少年。休みに付き合わせてしまっているお詫びと言ってはなんだが、今日はお姉さんが食事を何でも奢ろう」"

[[dialogue]]
speaker = "リコリンフィア"
# 「リゾート結界でもいいし、外の高級な飯屋で食べるのでもいいぞ？　何がいい？」
line = "「リゾート結界でもいいし、外の高級な飯屋で食べるのでもいいぞ？　何がいい？」"

[[dialogue]]
speaker = "unk"
# 俺は少し考えてから、口を開く。
line = "俺は少し考えてから、口を開く。"

[[dialogue]]
speaker = "リコリンフィア"
# 「――せっかく遊ぶんだから、変なことは気にしないで、全力で楽しまないと損……？」
line = "「――せっかく遊ぶんだから、変なことは気にしないで、全力で楽しまないと損……？」"

[[dialogue]]
speaker = "unk"
# 今日は２人で海を楽しみましょう
line = "今日は２人で海を楽しみましょう"

[[dialogue]]
speaker = "リコリンフィア"
# 「……そうか」
line = "「……そうか」"

[[dialogue]]
speaker = "リコリンフィア"
# 「なら、少年の気持ちに甘えさせてもらうとしよう」
line = "「なら、少年の気持ちに甘えさせてもらうとしよう」"

[[dialogue]]
speaker = "リコリンフィア"
# 「ちなみに、元々は海でゆっくり過ごしながら、少年に色々話を聞きたかったんだが……それについてはどうだ？」
line = "「ちなみに、元々は海でゆっくり過ごしながら、少年に色々話を聞きたかったんだが……それについてはどうだ？」"

[[dialogue]]
speaker = "リコリンフィア"
# 「私の趣味は、『情報収集』でな」
line = "「私の趣味は、『情報収集』でな」"

[[dialogue]]
speaker = "リコリンフィア"
# 「昔から知識欲が強くて、知ることが好きなんだ」
line = "「昔から知識欲が強くて、知ることが好きなんだ」"

[[dialogue]]
speaker = "リコリンフィア"
# 「少年のことについては、御前試合の時から注目して情報を追って来てはいるが、実際にじっくり話してみないと分からないことも当然あるだろう？」
line = "「少年のことについては、御前試合の時から注目して情報を追って来てはいるが、実際にじっくり話してみないと分からないことも当然あるだろう？」"

[[dialogue]]
speaker = "リコリンフィア"
# 「だから、よければビーチチェアーに座りながら、キミのことを色々と教えてくれ」
line = "「だから、よければビーチチェアーに座りながら、キミのことを色々と教えてくれ」"

[[dialogue]]
speaker = "unk"
# それから浜辺に設置されたパラソルの下、２つ並んだビーチチェアーに寝そべりながら、俺はリコさんに今までのことを話していた。
line = "それから浜辺に設置されたパラソルの下、２つ並んだビーチチェアーに寝そべりながら、俺はリコさんに今までのことを話していた。"

[[dialogue]]
speaker = "リコリンフィア"
# 「ふむふむ……なるほど」
line = "「ふむふむ……なるほど」"

[[dialogue]]
speaker = "unk"
# リコさんは、手帳にボールペンでメモを取りながら頷く。
line = "リコさんは、手帳にボールペンでメモを取りながら頷く。"

[[dialogue]]
speaker = "リコリンフィア"
# 「少年のバイト経験の話は面白いな。まさか猫耳メイド喫茶で女装して務めていたことがあるとは……」
line = "「少年のバイト経験の話は面白いな。まさか猫耳メイド喫茶で女装して務めていたことがあるとは……」"

[[dialogue]]
speaker = "unk"
# そこまで話すつもりはなかったのに……！
line = "そこまで話すつもりはなかったのに……！"

[[dialogue]]
speaker = "リコリンフィア"
# 「ふっ、私は公安委員会の本部長にまでなった女だぞ？　経歴くらい調べるのはわけもないさ」
line = "「ふっ、私は公安委員会の本部長にまでなった女だぞ？　経歴くらい調べるのはわけもないさ」"

[[dialogue]]
speaker = "リコリンフィア"
# 「それで、その時はどんな名前でメイドをやっていたんだ？」
line = "「それで、その時はどんな名前でメイドをやっていたんだ？」"

[[dialogue]]
speaker = "リコリンフィア"
# 「――クロにゃん？　ふっ……ふふっ……！」
line = "「――クロにゃん？　ふっ……ふふっ……！」"

[[dialogue]]
speaker = "リコリンフィア"
# 「可愛い名前じゃないか。その時の写真とかはないのか？」
line = "「可愛い名前じゃないか。その時の写真とかはないのか？」"

[[dialogue]]
speaker = "unk"
# ……残念ながら無いですね
line = "……残念ながら無いですね"

[[dialogue]]
speaker = "リコリンフィア"
# 「本当か？　お姉さんの目をちゃんと見てから、もう１度言ってみろ」
line = "「本当か？　お姉さんの目をちゃんと見てから、もう１度言ってみろ」"

[[dialogue]]
speaker = "リコリンフィア"
# 「じ～っ……」
line = "「じ～っ……」"

[[dialogue]]
speaker = "unk"
# チェアーから起き上がって、顔を近づけて覗き込んで来るリコさん。
line = "チェアーから起き上がって、顔を近づけて覗き込んで来るリコさん。"

[[dialogue]]
speaker = "unk"
# 俺は思わずドキッとしてしまう。
line = "俺は思わずドキッとしてしまう。"

[[dialogue]]
speaker = "リコリンフィア"
# 「ふふっ、目が泳いだぞ。その反応はやはり、写真などの記録が残っているとみた」
line = "「ふふっ、目が泳いだぞ。その反応はやはり、写真などの記録が残っているとみた」"

[[dialogue]]
speaker = "リコリンフィア"
# 「後で秋葉原のその店に行って、店長に聞き込みしてみるとしよう」
line = "「後で秋葉原のその店に行って、店長に聞き込みしてみるとしよう」"

[[dialogue]]
speaker = "unk"
# そ、それはちょっと……！
line = "そ、それはちょっと……！"

[[dialogue]]
speaker = "リコリンフィア"
# 「ああでも、猫耳メイドっぽくお願いしてくれたら、お姉さんも気が変わるかもしれないな？」
line = "「ああでも、猫耳メイドっぽくお願いしてくれたら、お姉さんも気が変わるかもしれないな？」"

[[dialogue]]
speaker = "unk"
# 勘弁してくれにゃーーーん！！！
line = "勘弁してくれにゃーーーん！！！"

[[dialogue]]
speaker = "リコリンフィア"
# 「くっ……ふふっ……！　ははっ♪　あははっ♪　あははははははっ！」
line = "「くっ……ふふっ……！　ははっ♪　あははっ♪　あははははははっ！」"

[[dialogue]]
speaker = "unk"
# これまで見たことのない爆笑を見せて、満面の笑顔を見せるリコさんなのだった――
line = "これまで見たことのない爆笑を見せて、満面の笑顔を見せるリコさんなのだった――"

[[dialogue]]
speaker = "unk"
# 学園に入学してから出会った人たちや事件のことを、リコさんはメモを取りながら、楽しそうに聞き続けて――
line = "学園に入学してから出会った人たちや事件のことを、リコさんはメモを取りながら、楽しそうに聞き続けて――"

[[dialogue]]
speaker = "リコリンフィア"
# 「――気づけば、もうこんな時間か」
line = "「――気づけば、もうこんな時間か」"

[[dialogue]]
speaker = "リコリンフィア"
# 「充実した１日だった。こんなにも長い時間、誰かと話していたのは初めてだよ」
line = "「充実した１日だった。こんなにも長い時間、誰かと話していたのは初めてだよ」"

[[dialogue]]
speaker = "リコリンフィア"
# 「ちょっとは海に入ったりもするつもりだったのだが……つい話を聞くのに夢中になってしまった。付き合わせてすまなかったな、少年」
line = "「ちょっとは海に入ったりもするつもりだったのだが……つい話を聞くのに夢中になってしまった。付き合わせてすまなかったな、少年」"

[[dialogue]]
speaker = "unk"
# なら、今度また、一緒に泳ぎに来ましょう
line = "なら、今度また、一緒に泳ぎに来ましょう"

[[dialogue]]
speaker = "リコリンフィア"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "リコリンフィア"
# 「それは、２人でという意味か？」
line = "「それは、２人でという意味か？」"

[[dialogue]]
speaker = "unk"
# 俺は頷いてみせる。
line = "俺は頷いてみせる。"

[[dialogue]]
speaker = "リコリンフィア"
# 「…………少年」
line = "「…………少年」"

[[dialogue]]
speaker = "リコリンフィア"
# 「キミがお人好しであることはもう知っているが、そんな甘い毒を振り撒いていると、お姉さんでもそのうち勘違いしてしまうかもしれないぞ？」
line = "「キミがお人好しであることはもう知っているが、そんな甘い毒を振り撒いていると、お姉さんでもそのうち勘違いしてしまうかもしれないぞ？」"

[[dialogue]]
speaker = "リコリンフィア"
# 「私は人間界に来てから今まで、異性にそこまで興味を持った経験がなかったが――」
line = "「私は人間界に来てから今まで、異性にそこまで興味を持った経験がなかったが――」"

[[dialogue]]
speaker = "unk"
# リコさんが不意に顔を近づけて来て、耳元で囁く。
line = "リコさんが不意に顔を近づけて来て、耳元で囁く。"

[[dialogue]]
speaker = "リコリンフィア"
# 「どうやらそれは、年下趣味だったから、なのかも」
line = "「どうやらそれは、年下趣味だったから、なのかも」"

[[dialogue]]
speaker = "リコリンフィア"
# 「……なんて、冗談だ。ふふっ……♪」
line = "「……なんて、冗談だ。ふふっ……♪」"

[[dialogue]]
speaker = "unk"
# 大人な笑みを浮かべて小さくウインクするリコさんに、俺はまたちょっとドキッとして、１人の女性として意識してしまうのだった――
line = "大人な笑みを浮かべて小さくウインクするリコさんに、俺はまたちょっとドキッとして、１人の女性として意識してしまうのだった――"
