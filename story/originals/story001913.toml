[[dialogue]]
speaker = "ウズメイア"
# 「は～、つきたてのお餅うま～。トリシャさんは何食べてるの？」
line = "「は～、つきたてのお餅うま～。トリシャさんは何食べてるの？」"

[[dialogue]]
speaker = "トリシャ"
# 「あむ、もむ……きな粉と黒蜜です……悪魔的甘さで……とても幸せです……」
line = "「あむ、もむ……きな粉と黒蜜です……悪魔的甘さで……とても幸せです……」"

[[dialogue]]
speaker = "ウズメイア"
# 「それ、絶対美味しいヤツじゃ～ん！　あたしも真似しよ～っと！」
line = "「それ、絶対美味しいヤツじゃ～ん！　あたしも真似しよ～っと！」"

[[dialogue]]
speaker = "トリシャ"
# 「ふふ……よければ一口どうぞ……自分でついたお餅というのも……また美味しさひとしお……ですね」
line = "「ふふ……よければ一口どうぞ……自分でついたお餅というのも……また美味しさひとしお……ですね」"

[[dialogue]]
speaker = "ウズメイア"
# 「ほんそれ～！　うまま～♪」
line = "「ほんそれ～！　うまま～♪」"

[[dialogue]]
speaker = "フィオナ"
# 「磯辺に大根おろし、みたらしにずんだまで……しょっぱいのと甘いのでいくつでも食べてしまいます」
line = "「磯辺に大根おろし、みたらしにずんだまで……しょっぱいのと甘いのでいくつでも食べてしまいます」"

[[dialogue]]
speaker = "ヴィーナス"
# 「つきたてのお餅はやっぱり格別よね！　これを食べちゃったら、もう普通のお餅には戻れないわ！」
line = "「つきたてのお餅はやっぱり格別よね！　これを食べちゃったら、もう普通のお餅には戻れないわ！」"

[[dialogue]]
speaker = "舞亜"
# 「もぐ……もぐ……とっても美味しいね、ソフィ」
line = "「もぐ……もぐ……とっても美味しいね、ソフィ」"

[[dialogue]]
speaker = "ソフィア"
# 「うん……うぅ、美味しすぎるから、気を抜くと食べすぎちゃいそうです……」
line = "「うん……うぅ、美味しすぎるから、気を抜くと食べすぎちゃいそうです……」"

[[dialogue]]
speaker = "オオヒメ"
# 「おや？　舞亜殿とソフィア殿はあまり食が進んでいないようだが……腹が減っていないのか？」
line = "「おや？　舞亜殿とソフィア殿はあまり食が進んでいないようだが……腹が減っていないのか？」"

[[dialogue]]
speaker = "舞亜"
# 「あ、ヒメさん。ううん、お腹が空いてない訳じゃないよ。本当はいろんな味を試しながら、たくさん食べたいんだけどね」
line = "「あ、ヒメさん。ううん、お腹が空いてない訳じゃないよ。本当はいろんな味を試しながら、たくさん食べたいんだけどね」"

[[dialogue]]
speaker = "ソフィア"
# 「過剰な炭水化物とカロリーはアスリートの天敵ですから……１日の許容摂取量を超えないよう、控えめにしてるんです」
line = "「過剰な炭水化物とカロリーはアスリートの天敵ですから……１日の許容摂取量を超えないよう、控えめにしてるんです」"

[[dialogue]]
speaker = "舞亜"
# 「私たち、まだまだ食べ盛りのわんぱく世代だからね。食事制限はどんな戦いよりも心が折れそうになるよ」
line = "「私たち、まだまだ食べ盛りのわんぱく世代だからね。食事制限はどんな戦いよりも心が折れそうになるよ」"

[[dialogue]]
speaker = "ソフィア"
# 「忘年会、クリスマス、お正月と……年末年始は暴飲暴食の誘惑との戦いなんです。フィギュアスケートは特に体重管理が厳しい競技ですから」
line = "「忘年会、クリスマス、お正月と……年末年始は暴飲暴食の誘惑との戦いなんです。フィギュアスケートは特に体重管理が厳しい競技ですから」"

[[dialogue]]
speaker = "オオヒメ"
# 「なんと……気が回らず、失礼した。素晴らしい芸が産まれる裏には、並々ならぬ苦労があるのだな」
line = "「なんと……気が回らず、失礼した。素晴らしい芸が産まれる裏には、並々ならぬ苦労があるのだな」"

[[dialogue]]
speaker = "オオヒメ"
# 「先日の神楽舞には、非常に感銘を受けた。今でもあの幻想的な光景は目に焼きついている」
line = "「先日の神楽舞には、非常に感銘を受けた。今でもあの幻想的な光景は目に焼きついている」"

[[dialogue]]
speaker = "舞亜"
# 「ありがと。おかげで私も自分の新しい可能性に気付けたよ。個人の技ももっと伸ばせる気がする」
line = "「ありがと。おかげで私も自分の新しい可能性に気付けたよ。個人の技ももっと伸ばせる気がする」"

[[dialogue]]
speaker = "オオヒメ"
# 「フィギュアスケートにも興味が湧いた。私にもあのような軽やかな滑りができるものなのだろうか」
line = "「フィギュアスケートにも興味が湧いた。私にもあのような軽やかな滑りができるものなのだろうか」"

[[dialogue]]
speaker = "ソフィア"
# 「守護天使様にこういうことを言ってしまうのもなんですが、どうでしょう……世界トップクラスとなると、幼少の頃からやっている方が大半です」
line = "「守護天使様にこういうことを言ってしまうのもなんですが、どうでしょう……世界トップクラスとなると、幼少の頃からやっている方が大半です」"

[[dialogue]]
speaker = "ソフィア"
# 「アイススケートでしたら今からでも滑れるとは思いますが、フィギュアとなると少し難しいかと」
line = "「アイススケートでしたら今からでも滑れるとは思いますが、フィギュアとなると少し難しいかと」"

[[dialogue]]
speaker = "舞亜"
# 「え、そんなにかな。シューッて滑って、クルクルーってやるくらいなら誰でもできるんじゃない？」
line = "「え、そんなにかな。シューッて滑って、クルクルーってやるくらいなら誰でもできるんじゃない？」"

[[dialogue]]
speaker = "ソフィア"
# 「誰でもは無理！　もう、舞亜ってば天才肌なんだから」
line = "「誰でもは無理！　もう、舞亜ってば天才肌なんだから」"

[[dialogue]]
speaker = "舞亜"
# 「ははは。でも、とりあえずやってみればいいんじゃないかな。フィギュア部に来てくれたら、ヒメさんにも滑り方教えてあげる」
line = "「ははは。でも、とりあえずやってみればいいんじゃないかな。フィギュア部に来てくれたら、ヒメさんにも滑り方教えてあげる」"

[[dialogue]]
speaker = "ソフィア"
# 「舞亜、今、話してる相手が守護天使様なの分かってます……？」
line = "「舞亜、今、話してる相手が守護天使様なの分かってます……？」"

[[dialogue]]
speaker = "舞亜"
# 「もちろん。ヒメさんは守護天使だよ？」
line = "「もちろん。ヒメさんは守護天使だよ？」"

[[dialogue]]
speaker = "オオヒメ"
# 「畏まる必要はない。今の私は守護天使であると同時に、あなたたちの演技に魅せられた１人のファンだからな」
line = "「畏まる必要はない。今の私は守護天使であると同時に、あなたたちの演技に魅せられた１人のファンだからな」"

[[dialogue]]
speaker = "ソフィア"
# 「オオヒメさんがそう言われるなら構いませんけど……」
line = "「オオヒメさんがそう言われるなら構いませんけど……」"

[[dialogue]]
speaker = "舞亜"
# 「そっか、嬉しいね。でも気に入ってくれたところ悪いけど、フィギュアスケートの選手寿命って長くないんだよね」
line = "「そっか、嬉しいね。でも気に入ってくれたところ悪いけど、フィギュアスケートの選手寿命って長くないんだよね」"

[[dialogue]]
speaker = "舞亜"
# 「ヒメさんのおかげでちょっと長生きしたけど、お餅をお腹いっぱい食べられるようになるのも、そう遠くない話かも」
line = "「ヒメさんのおかげでちょっと長生きしたけど、お餅をお腹いっぱい食べられるようになるのも、そう遠くない話かも」"

[[dialogue]]
speaker = "オオヒメ"
# 「そうか。いずれ、２人の演技が見られなくなる時が来るのだな。それは寂しい……」
line = "「そうか。いずれ、２人の演技が見られなくなる時が来るのだな。それは寂しい……」"

[[dialogue]]
speaker = "ソフィア"
# 「でも、選手生命が短いからこそ、私たちは一瞬一瞬を完全燃焼させて、悔いが残らないようにしているんです」
line = "「でも、選手生命が短いからこそ、私たちは一瞬一瞬を完全燃焼させて、悔いが残らないようにしているんです」"

[[dialogue]]
speaker = "オオヒメ"
# 「クールに見えて、内に秘めた炎は誰よりも熱いのだな……流石は私の推し、素敵だ。２人の切磋琢磨を最後まで見届けさせてもらおう。……いや、応援させてくれ」
line = "「クールに見えて、内に秘めた炎は誰よりも熱いのだな……流石は私の推し、素敵だ。２人の切磋琢磨を最後まで見届けさせてもらおう。……いや、応援させてくれ」"

[[dialogue]]
speaker = "舞亜"
# 「ふふ、心強いファンができちゃった。応援してくれるファンのために、まだまだ頑張らなきゃね」
line = "「ふふ、心強いファンができちゃった。応援してくれるファンのために、まだまだ頑張らなきゃね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふぅ……美味しすぎて、ついつい食べ過ぎちゃったわ。お腹ぽんぽこりんで眠くなってきたわね……」
line = "「ふぅ……美味しすぎて、ついつい食べ過ぎちゃったわ。お腹ぽんぽこりんで眠くなってきたわね……」"

[[dialogue]]
speaker = "トリシャ"
# 「まどろみの刻の中……余興におみくじなど……いかがでしょう……？」
line = "「まどろみの刻の中……余興におみくじなど……いかがでしょう……？」"

[[dialogue]]
speaker = "ヘレナ"
# 「うむ、良きである。ここはひとつ、今年の運勢を見てもらうとしよう」
line = "「うむ、良きである。ここはひとつ、今年の運勢を見てもらうとしよう」"

[[dialogue]]
speaker = "トリシャ"
# 「かしこまりました……ヘレナさんの……ですか？」
line = "「かしこまりました……ヘレナさんの……ですか？」"

[[dialogue]]
speaker = "ヘレナ"
# 「いや『世界』の運勢をだ。昨年は世界にとって幾度も窮地の訪れる凶年だったが、果たして今年はどう出るかな」
line = "「いや『世界』の運勢をだ。昨年は世界にとって幾度も窮地の訪れる凶年だったが、果たして今年はどう出るかな」"

[[dialogue]]
speaker = "トリシャ"
# 「世界の運勢ですか……少々、お待ちを……カシャカシャ……」
line = "「世界の運勢ですか……少々、お待ちを……カシャカシャ……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ドドンと大吉、いえ、ウルトラスーパー大吉くらいがいいわね！」
line = "「ドドンと大吉、いえ、ウルトラスーパー大吉くらいがいいわね！」"

[[dialogue]]
speaker = "フィオナ"
# 「そんなおみくじあるんでしょうか……？」
line = "「そんなおみくじあるんでしょうか……？」"

[[dialogue]]
speaker = "トリシャ"
# 「出ました……結果は『小吉』……『<ruby=いさか>諍</ruby>い──波乱万丈。艱難辛苦が待っている』……とのことです……」
line = "「出ました……結果は『小吉』……『<ruby>諍<rt>いさか</rt></ruby>い──波乱万丈。艱難辛苦が待っている』……とのことです……」"

[[dialogue]]
speaker = "フィオナ"
# 「リクリエとの戦いはまだ終わっていませんからね。さもありなんです」
line = "「リクリエとの戦いはまだ終わっていませんからね。さもありなんです」"

[[dialogue]]
speaker = "トリシャ"
# 「ですが……まだ続きがあります……『願い──諦めなければ希望あり』……と」
line = "「ですが……まだ続きがあります……『願い──諦めなければ希望あり』……と」"

[[dialogue]]
speaker = "ヴィーナス"
# 「最高のおみくじ結果ね！　私たちが諦めるなんて、空と海がひっくり返ったって有り得ないもの！」
line = "「最高のおみくじ結果ね！　私たちが諦めるなんて、空と海がひっくり返ったって有り得ないもの！」"

[[dialogue]]
speaker = "ヘレナ"
# 「ふふふ、それでこそ我が娘だ。な、魔王よ」
line = "「ふふふ、それでこそ我が娘だ。な、魔王よ」"

[[dialogue]]
speaker = "unk"
# ヴィーナスの言う通りです 俺たちは絶対に諦めません！
line = "ヴィーナスの言う通りです\n俺たちは絶対に諦めません！"

[[dialogue]]
speaker = "unk"
# これからも俺たちの前には更なる強敵が現れ、世界を救うための戦いはより激しさを増していくだろう。
line = "これからも俺たちの前には更なる強敵が現れ、世界を救うための戦いはより激しさを増していくだろう。"

[[dialogue]]
speaker = "unk"
# だが倒れるわけにはいかない。いや、倒れるはずがない。
line = "だが倒れるわけにはいかない。いや、倒れるはずがない。"

[[dialogue]]
speaker = "unk"
# 世界のため、みんなの力を貸してほしい
line = "世界のため、みんなの力を貸してほしい"

[[dialogue]]
speaker = "フィオナ"
# 「もちろんです、緋宮会長」
line = "「もちろんです、緋宮会長」"

[[dialogue]]
speaker = "トリシャ"
# 「私に可能ならば……なんなりとお申し付けください……世のため……友達のため……」
line = "「私に可能ならば……なんなりとお申し付けください……世のため……友達のため……」"

[[dialogue]]
speaker = "ウズメイア"
# 「当たり前っしょ～♪　あたしたちのズッ友パワーは無限だよね～♪」
line = "「当たり前っしょ～♪　あたしたちのズッ友パワーは無限だよね～♪」"

[[dialogue]]
speaker = "舞亜"
# 「引退するまで、世界には無事でいてもらわないとね」
line = "「引退するまで、世界には無事でいてもらわないとね」"

[[dialogue]]
speaker = "ソフィア"
# 「推してくれる守護天使様まで現れちゃいましたしね」
line = "「推してくれる守護天使様まで現れちゃいましたしね」"

[[dialogue]]
speaker = "オオヒメ"
# 「推しが引退するまで世界を滅ぼさせるわけにはいかないな。今まで不在にしていた分も、摂理の守護に努めるとしよう」
line = "「推しが引退するまで世界を滅ぼさせるわけにはいかないな。今まで不在にしていた分も、摂理の守護に努めるとしよう」"

[[dialogue]]
speaker = "マグダレナ"
# 「今追っているドラマのシーズン１０が制作予定ですからね。完結までは見届けませんと」
line = "「今追っているドラマのシーズン１０が制作予定ですからね。完結までは見届けませんと」"

[[dialogue]]
speaker = "オオヒメ"
# 「それはいつまでも終わらないやつでは……？」
line = "「それはいつまでも終わらないやつでは……？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロト、あなたは絶対に私が守ってみせるわ！」
line = "「クロト、あなたは絶対に私が守ってみせるわ！」"

[[dialogue]]
speaker = "unk"
# 俺たちはこんなにも多くの頼れる仲間同士で支え合っているのだから。
line = "俺たちはこんなにも多くの頼れる仲間同士で支え合っているのだから。"

[[dialogue]]
speaker = "unk"
# 来年も、そのまた先も、新たな年を迎えるため、俺たちは戦う決意を新たにするのだった。
line = "来年も、そのまた先も、新たな年を迎えるため、俺たちは戦う決意を新たにするのだった。"
