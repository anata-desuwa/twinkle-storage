[[dialogue]]
speaker = "unk"
# 第１話,冥森林ネメシス,B
line = "第１話,冥森林ネメシス,B"

[[dialogue]]
speaker = "クロト"
# 「冥森林──」
line = "「冥森林──」"

[[dialogue]]
speaker = "フィオナ"
# 「ネメシス──？」
line = "「ネメシス──？」"

[[dialogue]]
speaker = "unk"
# 九浄ヴィーナスの居場所を教えて欲しい──
line = "九浄ヴィーナスの居場所を教えて欲しい──"

[[dialogue]]
speaker = "unk"
# そう伝えた俺たちに返ってきたのは、そんな意味ありげな『森』の名前だった。
line = "そう伝えた俺たちに返ってきたのは、そんな意味ありげな『森』の名前だった。"

[[dialogue]]
speaker = "トリシャ"
# 「いかにも……それは口にだすのも恐ろしい、忌まわしき因縁の地……」
line = "「いかにも……それは口にだすのも恐ろしい、忌まわしき因縁の地……」"

[[dialogue]]
speaker = "フィオナ"
# （おどろおどろしい名前は気になりますが……ともあれ森、ですか）
line = "（おどろおどろしい名前は気になりますが……ともあれ森、ですか）"

[[dialogue]]
speaker = "クロト"
# （ああ……俺たちはまだ『森』を探しているとは伝えていない。それを言い当てられた……）
line = "（ああ……俺たちはまだ『森』を探しているとは伝えていない。それを言い当てられた……）"

[[dialogue]]
speaker = "unk"
# トリシャさんは凄腕の占星術師──というだけでない。
line = "トリシャさんは凄腕の占星術師──というだけでない。"

[[dialogue]]
speaker = "unk"
# 俺たちとは異なる流派ではあるが、星術を応用している、れっきとした星騎士の理の使い手なのだ。
line = "俺たちとは異なる流派ではあるが、星術を応用している、れっきとした星騎士の理の使い手なのだ。"

[[dialogue]]
speaker = "クロト"
# 「詳しくお聞かせください──トリシャさん。俺たちの仲間のところに案内します」
line = "「詳しくお聞かせください──トリシャさん。俺たちの仲間のところに案内します」"

[[dialogue]]
speaker = "トリシャ"
# 「フフフ……人がたくさん……角のないヒトに、喋るペットまで……」
line = "「フフフ……人がたくさん……角のないヒトに、喋るペットまで……」"

[[dialogue]]
speaker = "ソフィア"
# 「あ、あなたが噂の……伝説の占星術師さん？」
line = "「あ、あなたが噂の……伝説の占星術師さん？」"

[[dialogue]]
speaker = "トリシャ"
# 「フフフ……千客万来。いかにもその通り」
line = "「フフフ……千客万来。いかにもその通り」"

[[dialogue]]
speaker = "トリシャ"
# 「私の<ruby=ぼくせん>卜占</ruby>は宿星占星術──魔界占星術──そして算星術をミックスした、究極のまじない」
line = "「私の<ruby>卜占<rt>ぼくせん</rt></ruby>は宿星占星術──魔界占星術──そして算星術をミックスした、究極のまじない」"

[[dialogue]]
speaker = "トリシャ"
# 「迷える仔羊たちよ、星の声を聞くのです……」
line = "「迷える仔羊たちよ、星の声を聞くのです……」"

[[dialogue]]
speaker = "マトイ"
# （な、なんかすっごい雰囲気ありますね……！）
line = "（な、なんかすっごい雰囲気ありますね……！）"

[[dialogue]]
speaker = "ユウリ"
# （あ、ああ……得体が知れねえっつうか……）
line = "（あ、ああ……得体が知れねえっつうか……）"

[[dialogue]]
speaker = "サーシャ"
# （さすがは伝説の占い師ね……！）
line = "（さすがは伝説の占い師ね……！）"

[[dialogue]]
speaker = "ニャリオン"
# 「というか、ワガハイはペットではないニャン！」
line = "「というか、ワガハイはペットではないニャン！」"

[[dialogue]]
speaker = "unk"
# 俺とフィオナはトリシャさんをみんなに引き合わせ、彼女が星術を使ったという流れまで伝えた。
line = "俺とフィオナはトリシャさんをみんなに引き合わせ、彼女が星術を使ったという流れまで伝えた。"

[[dialogue]]
speaker = "クロト"
# 「──トリシャさん。先ほどの占いの結果を、みんなにも教えてあげてほしいんです」
line = "「──トリシャさん。先ほどの占いの結果を、みんなにも教えてあげてほしいんです」"

[[dialogue]]
speaker = "トリシャ"
# 「なるほど……しかし私は占いで生計を立てている身。タダでというわけには……ねえ？　チラッ」
line = "「なるほど……しかし私は占いで生計を立てている身。タダでというわけには……ねえ？　チラッ」"

[[dialogue]]
speaker = "ユウリ"
# 「あたしたち、そこまで大したお金は持ってないぞ……」
line = "「あたしたち、そこまで大したお金は持ってないぞ……」"

[[dialogue]]
speaker = "トリシャ"
# 「いえいえ、お……お金よりも……ハッピーになれるものが、あります。そうですよね……？　チラッ」
line = "「いえいえ、お……お金よりも……ハッピーになれるものが、あります。そうですよね……？　チラッ」"

[[dialogue]]
speaker = "クロト"
# （あ、ああ……。例の友達の件ってことか……）
line = "（あ、ああ……。例の友達の件ってことか……）"

[[dialogue]]
speaker = "クロト"
# 「もし手伝ってくれたら、ここにいるみんな、トリシャさんとは友達になりたいって思うはずです！　絶対に」
line = "「もし手伝ってくれたら、ここにいるみんな、トリシャさんとは友達になりたいって思うはずです！　絶対に」"

[[dialogue]]
speaker = "トリシャ"
# 「……本当？　なら……フフフッ。なんでも教えてあげる」
line = "「……本当？　なら……フフフッ。なんでも教えてあげる」"

[[dialogue]]
speaker = "ユウリ"
# （そんなんでいいのか……？）
line = "（そんなんでいいのか……？）"

[[dialogue]]
speaker = "ソフィア"
# （エキセントリックな方みたいですね……）
line = "（エキセントリックな方みたいですね……）"

[[dialogue]]
speaker = "フィオナ"
# 「ヴィーナスさんのいらっしゃる場所──その名が……」
line = "「ヴィーナスさんのいらっしゃる場所──その名が……」"

[[dialogue]]
speaker = "トリシャ"
# 「はい──<ruby=めいしんりん>冥森林</ruby>ネメシスです」
line = "「はい──<ruby>冥森林<rt>めいしんりん</rt></ruby>ネメシスです」"

[[dialogue]]
speaker = "サーシャ"
# 「ネッ……ネメシス！？」
line = "「ネッ……ネメシス！？」"

[[dialogue]]
speaker = "ユウリ"
# 「サーシャさん──知ってんのか？」
line = "「サーシャさん──知ってんのか？」"

[[dialogue]]
speaker = "ソフィア"
# 「……この近辺に住む魔族でしたら、知らない人はいないかと」
line = "「……この近辺に住む魔族でしたら、知らない人はいないかと」"

[[dialogue]]
speaker = "クロト"
# 「俺たちも詳しいことは聞けていない──そこはどういう場所なんだ？」
line = "「俺たちも詳しいことは聞けていない──そこはどういう場所なんだ？」"

[[dialogue]]
speaker = "トリシャ"
# 「いいでしょう。簡単にご説明します」
line = "「いいでしょう。簡単にご説明します」"

[[dialogue]]
speaker = "トリシャ"
# 「冥森林ネメシス──それは、森ならざる森へと変貌を遂げた暗黒の地」
line = "「冥森林ネメシス──それは、森ならざる森へと変貌を遂げた暗黒の地」"

[[dialogue]]
speaker = "トリシャ"
# 「そこは今……未知の魔獣と、<ruby=みぞう>未曾有</ruby>の怪奇現象が跋扈する、混沌の<ruby=るつぼ>坩堝</ruby>として知られています……」
line = "「そこは今……未知の魔獣と、<ruby>未曾有<rt>みぞう</rt></ruby>の怪奇現象が跋扈する、混沌の<ruby>坩堝<rt>るつぼ</rt></ruby>として知られています……」"

[[dialogue]]
speaker = "マトイ"
# 「なんか……恐ろしげな感じ……？」
line = "「なんか……恐ろしげな感じ……？」"

[[dialogue]]
speaker = "ユウリ"
# 「どうなんだ、サーシャさん？」
line = "「どうなんだ、サーシャさん？」"

[[dialogue]]
speaker = "サーシャ"
# 「確かに……ここからしばらく行った先に、ネメシスという名前の盆地は<b>あった</b>わ」
line = "「確かに……ここからしばらく行った先に、ネメシスという名前の盆地は<b>あった</b>わ」"

[[dialogue]]
speaker = "サーシャ"
# 「けれど……あそこはもう、地図にも載っていないはずよ。森でもないわ。だって──」
line = "「けれど……あそこはもう、地図にも載っていないはずよ。森でもないわ。だって──」"

[[dialogue]]
speaker = "ソフィア"
# 「はい。私もそう聞いています──数年前、あの一帯は丸ごと破滅に呑まれたと」
line = "「はい。私もそう聞いています──数年前、あの一帯は丸ごと破滅に呑まれたと」"

[[dialogue]]
speaker = "ソフィア"
# 「ですから……ネメシスの跡地には絶対近づいてはならないと、レゾフの住人はみんな教えられているはずです」
line = "「ですから……ネメシスの跡地には絶対近づいてはならないと、レゾフの住人はみんな教えられているはずです」"

[[dialogue]]
speaker = "クロト"
# 「破滅に──呑まれた……？」
line = "「破滅に──呑まれた……？」"

[[dialogue]]
speaker = "トリシャ"
# 「確かにネメシスは本来──山々に囲まれた盆地でした。しかし、今は森です。正確に言えば、森になったのです」
line = "「確かにネメシスは本来──山々に囲まれた盆地でした。しかし、今は森です。正確に言えば、森になったのです」"

[[dialogue]]
speaker = "トリシャ"
# 「『大禍』のうねりに呑まれ──領域そのものが創り変えられたことによって」
line = "「『大禍』のうねりに呑まれ──領域そのものが創り変えられたことによって」"

[[dialogue]]
speaker = "マトイ"
# 「大禍……？」
line = "「大禍……？」"

[[dialogue]]
speaker = "クロト"
# 「トリシャさんの言う『大禍』は──リクリエのことだ。つまり……」
line = "「トリシャさんの言う『大禍』は──リクリエのことだ。つまり……」"

[[dialogue]]
speaker = "フィオナ"
# 「リクリエの影響を受けている──いえ──受けきった末路、だと……？」
line = "「リクリエの影響を受けている──いえ──受けきった末路、だと……？」"

[[dialogue]]
speaker = "トリシャ"
# 「ネメシス盆地の周辺には山々、針葉樹林、それから魔獣の巣がありました。小さな集落なんかも」
line = "「ネメシス盆地の周辺には山々、針葉樹林、それから魔獣の巣がありました。小さな集落なんかも」"

[[dialogue]]
speaker = "トリシャ"
# 「それらがまとめて<ruby=かくはん>撹拌</ruby>された結果──ネメシスは、世にも奇妙な『冥府の森』として生まれ変わったのです」
line = "「それらがまとめて<ruby>撹拌<rt>かくはん</rt></ruby>された結果──ネメシスは、世にも奇妙な『冥府の森』として生まれ変わったのです」"

[[dialogue]]
speaker = "マトイ"
# 「ッ……」
line = "「ッ……」"

[[dialogue]]
speaker = "ユウリ"
# 「<ruby=かくはん>撹拌</ruby>……ぐちゃぐちゃにされたってことか？　魔獣も、針葉樹林も……」
line = "「<ruby>撹拌<rt>かくはん</rt></ruby>……ぐちゃぐちゃにされたってことか？　魔獣も、針葉樹林も……」"

[[dialogue]]
speaker = "ソフィア"
# 「……いつの日か大人の方から聞きました。レゾフから北西の荒野にかけては、立ち入れないほどの『うねり』が生じていると」
line = "「……いつの日か大人の方から聞きました。レゾフから北西の荒野にかけては、立ち入れないほどの『うねり』が生じていると」"

[[dialogue]]
speaker = "ソフィア"
# 「しかしそこまでの詳細は……初めて聞きました。本当なんですか……？」
line = "「しかしそこまでの詳細は……初めて聞きました。本当なんですか……？」"

[[dialogue]]
speaker = "トリシャ"
# 「フフフ。私はズヴィエダの広大な荒野を歩いてレゾフまでやってきました……この目で見た光景に間違いはないかと」
line = "「フフフ。私はズヴィエダの広大な荒野を歩いてレゾフまでやってきました……この目で見た光景に間違いはないかと」"

[[dialogue]]
speaker = "トリシャ"
# 「それより問題は──ネメシスには、今も大禍の瘴気がうねっているということ」
line = "「それより問題は──ネメシスには、今も大禍の瘴気がうねっているということ」"

[[dialogue]]
speaker = "トリシャ"
# 「ゆえに、ひと度立ち入れば──存在そのものが組み替えられてしまうでしょう。近づかぬのが賢明で、突入するなどもってのほかです」
line = "「ゆえに、ひと度立ち入れば──存在そのものが組み替えられてしまうでしょう。近づかぬのが賢明で、突入するなどもってのほかです」"

[[dialogue]]
speaker = "フィオナ"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "クロト"
# 「フィーニスの塔──よりもひどい状態、ってわけか……」
line = "「フィーニスの塔──よりもひどい状態、ってわけか……」"

[[dialogue]]
speaker = "unk"
# 『塔』の瘴気はまだ侵食中の状態だったが──
line = "『塔』の瘴気はまだ侵食中の状態だったが──"

[[dialogue]]
speaker = "unk"
# トリシャさんの話が正しければ、そのネメシスという地はすでに侵食<b>されきっている</b>。
line = "トリシャさんの話が正しければ、そのネメシスという地はすでに侵食<b>されきっている</b>。"

[[dialogue]]
speaker = "unk"
# そこへ生身で突っ込むのは──命を落としにいくようなものだ。
line = "そこへ生身で突っ込むのは──命を落としにいくようなものだ。"

[[dialogue]]
speaker = "マトイ"
# 「ほ、ほんとに……ほんとにヴィーナスがそんなところにいるの？」
line = "「ほ、ほんとに……ほんとにヴィーナスがそんなところにいるの？」"

[[dialogue]]
speaker = "トリシャ"
# 「私の占星術に間違いはない。<ruby=ヴィーナス>金星</ruby>の反応は……確実にかの森の内部から聴こえる」
line = "「私の占星術に間違いはない。<ruby>金星<rt>ヴィーナス</rt></ruby>の反応は……確実にかの森の内部から聴こえる」"

[[dialogue]]
speaker = "ユウリ"
# 「つか、そこにいて──ヴィーナスは本当に無事なのかよ！？」
line = "「つか、そこにいて──ヴィーナスは本当に無事なのかよ！？」"

[[dialogue]]
speaker = "トリシャ"
# 「常識的に考えれば、人の形を保っているのは不可能──でしょう」
line = "「常識的に考えれば、人の形を保っているのは不可能──でしょう」"

[[dialogue]]
speaker = "トリシャ"
# 「事実──この金星の反応は、時を追うごとに弱まっています。この調子ならもって数日……いえ、より短いかもしれません」
line = "「事実──この金星の反応は、時を追うごとに弱まっています。この調子ならもって数日……いえ、より短いかもしれません」"

[[dialogue]]
speaker = "マトイ"
# 「っ……！　それじゃ、急がなきゃ──」
line = "「っ……！　それじゃ、急がなきゃ──」"

[[dialogue]]
speaker = "ソフィア"
# 「ですが、そのヴィーナスさんが指定してきた日付は──」
line = "「ですが、そのヴィーナスさんが指定してきた日付は──」"

[[dialogue]]
speaker = "クロト"
# 「……ああ。ヴィーナスはあくまで『冬』を待てと送ってきた。なら信じるしかないだろう」
line = "「……ああ。ヴィーナスはあくまで『冬』を待てと送ってきた。なら信じるしかないだろう」"

[[dialogue]]
speaker = "クロト"
# 「メッセージに書かれていた『森』の正体も──どうやら間違いなさそうだしな」
line = "「メッセージに書かれていた『森』の正体も──どうやら間違いなさそうだしな」"

[[dialogue]]
speaker = "unk"
# <ruby=いつ>Ｗｈｅｎ</ruby>──<ruby=どこで>Ｗｈｅｒｅ</ruby>──<ruby=どうやって>Ｈｏｗ</ruby>──ヴィーナスからのヒントはすべて読み解けた。
line = "<ruby>Ｗｈｅｎ<rt>いつ</rt></ruby>──<ruby>Ｗｈｅｒｅ<rt>どこで</rt></ruby>──<ruby>Ｈｏｗ<rt>どうやって</rt></ruby>──ヴィーナスからのヒントはすべて読み解けた。"

[[dialogue]]
speaker = "unk"
# つまり、俺たちに求められるのは……
line = "つまり、俺たちに求められるのは……"

[[dialogue]]
speaker = "マトイ"
# 「『大いなる冬』の当日に──その『森』に行かなくちゃいけないってこと……」
line = "「『大いなる冬』の当日に──その『森』に行かなくちゃいけないってこと……」"

[[dialogue]]
speaker = "ソフィア"
# 「出歩くのも困難な日に、立ち入ることも不可能な森へ……」
line = "「出歩くのも困難な日に、立ち入ることも不可能な森へ……」"

[[dialogue]]
speaker = "ユウリ"
# 「はっ……無茶振りが加速してきやがったな」
line = "「はっ……無茶振りが加速してきやがったな」"

[[dialogue]]
speaker = "ニャリオン"
# 「ニャ！　あの娘らしいニャン！」
line = "「ニャ！　あの娘らしいニャン！」"

[[dialogue]]
speaker = "クロト"
# 「確かに無茶振りだ。けどヴィーナスがわざわざ──苦労する条件を指定してきたとは思えない」
line = "「確かに無茶振りだ。けどヴィーナスがわざわざ──苦労する条件を指定してきたとは思えない」"

[[dialogue]]
speaker = "フィオナ"
# 「混沌の森と、大いなる冬……一見、関連はなさそうですが」
line = "「混沌の森と、大いなる冬……一見、関連はなさそうですが」"

[[dialogue]]
speaker = "マトイ"
# 「えーと……そうだ！　森が屋根代わりになって、その『冬』もやり過ごせるとか？」
line = "「えーと……そうだ！　森が屋根代わりになって、その『冬』もやり過ごせるとか？」"

[[dialogue]]
speaker = "サーシャ"
# 「うーん……無理だと思うわよ。あの『冬』は単なる寒波じゃないもの」
line = "「うーん……無理だと思うわよ。あの『冬』は単なる寒波じゃないもの」"

[[dialogue]]
speaker = "サーシャ"
# 「屋根になるどころか、森ごと一瞬で凍りついておしまいじゃないかしら？」
line = "「屋根になるどころか、森ごと一瞬で凍りついておしまいじゃないかしら？」"

[[dialogue]]
speaker = "マトイ"
# 「そ、そんなにすごいんですね……」
line = "「そ、そんなにすごいんですね……」"

[[dialogue]]
speaker = "サーシャ"
# 「ええ。レゾフの住民はよく知ってるの。あの日になったら、アステラも──モンスターも──空気だって凍りそうなくらいの──あっ」
line = "「ええ。レゾフの住民はよく知ってるの。あの日になったら、アステラも──モンスターも──空気だって凍りそうなくらいの──あっ」"

[[dialogue]]
speaker = "ソフィア"
# 「！　姉さんも……気づきましたか」
line = "「！　姉さんも……気づきましたか」"

[[dialogue]]
speaker = "サーシャ"
# 「……ええ。もしかしたら……」
line = "「……ええ。もしかしたら……」"

[[dialogue]]
speaker = "ユウリ"
# 「？　な、なんだ？　どういうことだ？」
line = "「？　な、なんだ？　どういうことだ？」"

[[dialogue]]
speaker = "クロト"
# 「……ヴィーナスの意図がわかったんですか？」
line = "「……ヴィーナスの意図がわかったんですか？」"

[[dialogue]]
speaker = "サーシャ"
# 「ええ。こうは考えられないかしら？」
line = "「ええ。こうは考えられないかしら？」"

[[dialogue]]
speaker = "サーシャ"
# 「何もかも凍てつく冬の日。だからこそ、<ruby=ネメシス>冥森林</ruby>の侵食さえもフリーズする──」
line = "「何もかも凍てつく冬の日。だからこそ、<ruby>冥森林<rt>ネメシス</rt></ruby>の侵食さえもフリーズする──」"

[[dialogue]]
speaker = "ユウリ"
# 「！」
line = "「！」"

[[dialogue]]
speaker = "フィオナ"
# 「……混沌の森の侵食は、リクリエの瘴気によるものです。それでも……？」
line = "「……混沌の森の侵食は、リクリエの瘴気によるものです。それでも……？」"

[[dialogue]]
speaker = "サーシャ"
# 「ありえるわ。同じリクリエ由来のアステラさえ活動を止められてしまうんだから」
line = "「ありえるわ。同じリクリエ由来のアステラさえ活動を止められてしまうんだから」"

[[dialogue]]
speaker = "ソフィア"
# 「……でも、姉さん。あの森にはもう誰も寄りついていません。実際そうなる確証なんて……」
line = "「……でも、姉さん。あの森にはもう誰も寄りついていません。実際そうなる確証なんて……」"

[[dialogue]]
speaker = "サーシャ"
# 「もちろんないわ。でも──うふふっ。ヴィーナスちゃんが正しいと思ったのなら、私、そんなに分の悪い賭けだとは思ってないの」
line = "「もちろんないわ。でも──うふふっ。ヴィーナスちゃんが正しいと思ったのなら、私、そんなに分の悪い賭けだとは思ってないの」"

[[dialogue]]
speaker = "マトイ"
# 「確かに……。ヴィーナスって根拠がなくても、ここ一番を外したことってないのよね」
line = "「確かに……。ヴィーナスって根拠がなくても、ここ一番を外したことってないのよね」"

[[dialogue]]
speaker = "クロト"
# 「どちらも俺たちにとって脅威となる『冬』と『瘴気』──そのお互いが干渉しあう可能性、か」
line = "「どちらも俺たちにとって脅威となる『冬』と『瘴気』──そのお互いが干渉しあう可能性、か」"

[[dialogue]]
speaker = "クロト"
# 「もしヴィーナスがその線で考えていたのなら──『森』へ立ち入る唯一のチャンスになる」
line = "「もしヴィーナスがその線で考えていたのなら──『森』へ立ち入る唯一のチャンスになる」"

[[dialogue]]
speaker = "フィオナ"
# 「毒を以て毒を制す……と言ったところでしょうか」
line = "「毒を以て毒を制す……と言ったところでしょうか」"

[[dialogue]]
speaker = "unk"
# リクリエという厄災に、リクリエならざる魔界の天災をぶつけようという発想だ。
line = "リクリエという厄災に、リクリエならざる魔界の天災をぶつけようという発想だ。"

[[dialogue]]
speaker = "トリシャ"
# 「フフフ……なるほど。実に破天荒な発想……とても豪気なお方のようですね」
line = "「フフフ……なるほど。実に破天荒な発想……とても豪気なお方のようですね」"

[[dialogue]]
speaker = "トリシャ"
# 「それにどうやら──その破天荒こそが、大禍を防ぐ鍵となる様子」
line = "「それにどうやら──その破天荒こそが、大禍を防ぐ鍵となる様子」"

[[dialogue]]
speaker = "フィオナ"
# 「！　トリシャさんの<ruby=ペンデュラム>振り子</ruby>が……また反応している……？」
line = "「！　トリシャさんの<ruby>振り子<rt>ペンデュラム</rt></ruby>が……また反応している……？」"

[[dialogue]]
speaker = "トリシャ"
# 「あなた達は私の心の友……私にできることがあれば、ぜひ協力してさしあげましょう」
line = "「あなた達は私の心の友……私にできることがあれば、ぜひ協力してさしあげましょう」"

[[dialogue]]
speaker = "クロト"
# 「助かります──トリシャさん」
line = "「助かります──トリシャさん」"

[[dialogue]]
speaker = "マトイ"
# 「うん！　頼りになりそうな人でよかった」
line = "「うん！　頼りになりそうな人でよかった」"

[[dialogue]]
speaker = "ユウリ"
# 「ああ。心の友なんて、熱いじゃねえか」
line = "「ああ。心の友なんて、熱いじゃねえか」"

[[dialogue]]
speaker = "クロト"
# 「……トリシャさんは俺たちのひとつ上らしいけどね」
line = "「……トリシャさんは俺たちのひとつ上らしいけどね」"

[[dialogue]]
speaker = "ユウリ"
# 「先輩だったのか！？」
line = "「先輩だったのか！？」"

[[dialogue]]
speaker = "サーシャ"
# 「あらあら。私と同級生なのね」
line = "「あらあら。私と同級生なのね」"

[[dialogue]]
speaker = "トリシャ"
# 「フ、フフ……気にすることはない。だって私たちは友……友……にへ、にへへ……！」
line = "「フ、フフ……気にすることはない。だって私たちは友……友……にへ、にへへ……！」"

[[dialogue]]
speaker = "ソフィア"
# （ニヤつきすぎて固まってしまいました……）
line = "（ニヤつきすぎて固まってしまいました……）"

[[dialogue]]
speaker = "unk"
# 学年の差はともかく、こうして友人兼協力者が得られたのは喜ばしいことだった。
line = "学年の差はともかく、こうして友人兼協力者が得られたのは喜ばしいことだった。"

[[dialogue]]
speaker = "フィオナ"
# 「『大いなる冬』当日に──冥森林ネメシスへの突入。皆さん、それまでに戦力を整えましょう」
line = "「『大いなる冬』当日に──冥森林ネメシスへの突入。皆さん、それまでに戦力を整えましょう」"

[[dialogue]]
speaker = "ニャリオン"
# 「──了解ニャ！」
line = "「──了解ニャ！」"

[[dialogue]]
speaker = "unk"
# そうして俺たちは万全の対策を練ることになった。
line = "そうして俺たちは万全の対策を練ることになった。"

[[dialogue]]
speaker = "unk"
# 来たる『大いなる冬』の突入作戦へ向けて……。
line = "来たる『大いなる冬』の突入作戦へ向けて……。"
