line = "「魔王様、の、熱いの……出てますっ……んんっ……ぅ……あぁあ……<emoji=heart04>」"

[[dialogue]]
speaker = "エステル"
# 「私っ、知って、ますっ……精液っ……ザーメンっ……子どもを作るための……魔王様のっ……精子っ……んんっ……<emoji=heart04>」
line = "「私っ、知って、ますっ……精液っ……ザーメンっ……子どもを作るための……魔王様のっ……精子っ……んんっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺のペニスはエステルの一番深いところに突き当たったまま、先端から熱い液体を脈動と共に吐き出す。
line = "俺のペニスはエステルの一番深いところに突き当たったまま、先端から熱い液体を脈動と共に吐き出す。"

