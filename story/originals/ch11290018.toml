speaker = "unk"
# それを唇を噛み、受け止めながら、エステルは快感の余韻に身を震わせている。
line = "それを唇を噛み、受け止めながら、エステルは快感の余韻に身を震わせている。"

[[dialogue]]
speaker = "エステル"
