line = "「あっ、あああっ、や、んんっ<emoji=heart04>　ああっ、あっ、あっ、あ、あ、ああっ<emoji=heart04>　は、ああっ、あっ、や……んっ、んくぅ……っ、んんっ、ん、ぁ……」"

[[dialogue]]
speaker = "エステル"
