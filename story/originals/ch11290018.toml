line = "彼女の戸惑いを示すように、俺の脚の上でその細い体を波打たせた。"

[[dialogue]]
speaker = "エステル"
# 「ああっ……あっ……んんっ……あっ……あ……<emoji=heart04>　あっ、あっ……あああっ……<emoji=heart04>」
line = "「ああっ……あっ……んんっ……あっ……あ……<emoji=heart04>　あっ、あっ……あああっ……<emoji=heart04>」"

[[dialogue]]
speaker = "エステル"
