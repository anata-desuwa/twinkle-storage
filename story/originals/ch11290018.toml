line = "「ああっ、あっ、ふぁ……んんっ、あっ……ふぁ、ああっ……や、んんっ……あっ、ああああっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 少しずつ絶頂の余韻が引き、エステルの身体から力が抜けていく。
