[[dialogue]]
speaker = "unk"
# 第６話,作戦開始,B
line = "第６話,作戦開始,B"

[[dialogue]]
speaker = "unk"
# 母さんから帰還の説明を受けて、作戦会議をした後、俺たちは秘密基地を出発した。
line = "母さんから帰還の説明を受けて、作戦会議をした後、俺たちは秘密基地を出発した。"

[[dialogue]]
speaker = "unk"
# いつもの時間になり、フィーニスの塔に向かうルヴィネ。
line = "いつもの時間になり、フィーニスの塔に向かうルヴィネ。"

[[dialogue]]
speaker = "unk"
# ルヴィネのペースに合わせて、距離を取りながら追いかける。
line = "ルヴィネのペースに合わせて、距離を取りながら追いかける。"

[[dialogue]]
speaker = "クロト"
# （ルヴィネを追跡し、フィーニスの塔に入ったのを確認して、俺たちも塔に入る。それで間違いないな？）
line = "（ルヴィネを追跡し、フィーニスの塔に入ったのを確認して、俺たちも塔に入る。それで間違いないな？）"

[[dialogue]]
speaker = "フィオナ"
# （はい。慎重に尾行しましょう）
line = "（はい。慎重に尾行しましょう）"

[[dialogue]]
speaker = "unk"
# 今は母さんに透明化の魔法をかけてもらって、周囲から見えないようにしている。
line = "今は母さんに透明化の魔法をかけてもらって、周囲から見えないようにしている。"

[[dialogue]]
speaker = "unk"
# フィーニスの塔に入るため、極星学園に直接侵入するという危険を冒しているが、それもやむを得ないだろう。
line = "フィーニスの塔に入るため、極星学園に直接侵入するという危険を冒しているが、それもやむを得ないだろう。"

[[dialogue]]
speaker = "ヴィーナス"
# （いい、ルヴィネに気付かれちゃダメよ）
line = "（いい、ルヴィネに気付かれちゃダメよ）"

[[dialogue]]
speaker = "ラクシャ"
# （いやそれヴィーナスが一番心配だから）
line = "（いやそれヴィーナスが一番心配だから）"

[[dialogue]]
speaker = "梨緒"
# （罠は大丈夫か？）
line = "（罠は大丈夫か？）"

[[dialogue]]
speaker = "ナターシャ"
# （うん。部外者に反応する罠とかはなさそう）
line = "（うん。部外者に反応する罠とかはなさそう）"

[[dialogue]]
speaker = "ベアトリス"
# （私も、そういうのがあるっていうのは聞いたことないかな）
line = "（私も、そういうのがあるっていうのは聞いたことないかな）"

[[dialogue]]
speaker = "unk"
# ルヴィネが大聖堂の方向に消える。
line = "ルヴィネが大聖堂の方向に消える。"

[[dialogue]]
speaker = "unk"
# 俺たちもフィーニスの塔に入ろうと後を追うが──
line = "俺たちもフィーニスの塔に入ろうと後を追うが──"

[[dialogue]]
speaker = "？？？"
# 「お待ちください」
line = "「お待ちください」"

[[dialogue]]
speaker = "クロト"
# 「──！」
line = "「──！」"

[[dialogue]]
speaker = "unk"
# 背後から呼び止める声に振り返る。
line = "背後から呼び止める声に振り返る。"

[[dialogue]]
speaker = "unk"
# するとそこには、先日ルヴィネと一緒にいた極星学園の生徒が立っていた。
line = "するとそこには、先日ルヴィネと一緒にいた極星学園の生徒が立っていた。"

[[dialogue]]
speaker = "ヴィーナス"
# （おばあちゃんの魔法で見えてない……のよね？）
line = "（おばあちゃんの魔法で見えてない……のよね？）"

[[dialogue]]
speaker = "クロト"
# （そのはず……だけど）
line = "（そのはず……だけど）"

[[dialogue]]
speaker = "エステル"
# 「感知星術で私にはあなた方の姿が見えています」
line = "「感知星術で私にはあなた方の姿が見えています」"

[[dialogue]]
speaker = "クロト"
# （……！）
line = "（……！）"

[[dialogue]]
speaker = "unk"
# こちらのやりとりを見透かすように、エステルが告げる。
line = "こちらのやりとりを見透かすように、エステルが告げる。"

[[dialogue]]
speaker = "unk"
# 敵地の真ん中で見つかる窮地──かと思われたが。
line = "敵地の真ん中で見つかる窮地──かと思われたが。"

[[dialogue]]
speaker = "エステル"
# 「ルヴィネ会長にお知らせするつもりはありません。その代わりこちらへ来ていただけますか？」
line = "「ルヴィネ会長にお知らせするつもりはありません。その代わりこちらへ来ていただけますか？」"

[[dialogue]]
speaker = "フィオナ"
# （どうしますか、緋宮会長？）
line = "（どうしますか、緋宮会長？）"

[[dialogue]]
speaker = "クロト"
# （……一旦彼女に従おう）
line = "（……一旦彼女に従おう）"

[[dialogue]]
speaker = "unk"
# エステルを制圧するにしても、ルヴィネや他の極星学園生徒に気付かれずに行うのは不可能だろう。
line = "エステルを制圧するにしても、ルヴィネや他の極星学園生徒に気付かれずに行うのは不可能だろう。"

[[dialogue]]
speaker = "unk"
# それなら大人しくエステルに従った方が、穏便に済ませられる可能性はありそうだ。
line = "それなら大人しくエステルに従った方が、穏便に済ませられる可能性はありそうだ。"

[[dialogue]]
speaker = "unk"
# エステルに案内されるまま、人気のないところに誘導される。
line = "エステルに案内されるまま、人気のないところに誘導される。"

[[dialogue]]
speaker = "エステル"
# 「ここなら他の方に話を聞かれる心配はありませんね」
line = "「ここなら他の方に話を聞かれる心配はありませんね」"

[[dialogue]]
speaker = "エステル"
# 「あなたが魔王クロト様ですね？」
line = "「あなたが魔王クロト様ですね？」"

[[dialogue]]
speaker = "クロト"
# 「……ああ、そうだ」
line = "「……ああ、そうだ」"

[[dialogue]]
speaker = "unk"
# 確信を持って真っ直ぐ目つめる瞳に、肯定で返す。
line = "確信を持って真っ直ぐ目つめる瞳に、肯定で返す。"

[[dialogue]]
speaker = "unk"
# デネブの住人には、俺は『悪の魔王』と認識されているはずだが、今ここで否定しても意味はないだろう。
line = "デネブの住人には、俺は『悪の魔王』と認識されているはずだが、今ここで否定しても意味はないだろう。"

[[dialogue]]
speaker = "エステル"
# 「私はエステル・ミルフォードと申します。極星学園の１年生です」
line = "「私はエステル・ミルフォードと申します。極星学園の１年生です」"

[[dialogue]]
speaker = "エステル"
# 「そして１０年前、私はあなた様に命を救われました」
line = "「そして１０年前、私はあなた様に命を救われました」"

[[dialogue]]
speaker = "クロト"
# 「俺に……？」
line = "「俺に……？」"

[[dialogue]]
speaker = "エステル"
# 「はい。朝の登校中のことでした」
line = "「はい。朝の登校中のことでした」"

[[dialogue]]
speaker = "クロト"
# （朝の登校中……まさか）
line = "（朝の登校中……まさか）"

[[dialogue]]
speaker = "クロト"
# 『……っ、やめろ、モンスター！　おまえ達の餌はこっちにいるぞ──俺が相手になってやる！』
line = "『……っ、やめろ、モンスター！　おまえ達の餌はこっちにいるぞ──俺が相手になってやる！』"

[[dialogue]]
speaker = "unk"
# 俺が新星学園に転入して初めての朝。まだセレスティアを手にしていなかった頃。
line = "俺が新星学園に転入して初めての朝。まだセレスティアを手にしていなかった頃。"

[[dialogue]]
speaker = "unk"
# スクールバスがモンスターに襲われていて、俺が囮になってバスを助けたことがあった。
line = "スクールバスがモンスターに襲われていて、俺が囮になってバスを助けたことがあった。"

[[dialogue]]
speaker = "クロト"
# （あの時は結局、アナとサーシャさんが来てくれたんだけど。俺が初めて変身したのもあの時だったな）
line = "（あの時は結局、アナとサーシャさんが来てくれたんだけど。俺が初めて変身したのもあの時だったな）"

[[dialogue]]
speaker = "unk"
# もしかして、エステルもあのバスに乗っていたのだろうか。
line = "もしかして、エステルもあのバスに乗っていたのだろうか。"

[[dialogue]]
speaker = "unk"
# エステルはデネブの住人なので、厳密には俺が助けたわけではない。
line = "エステルはデネブの住人なので、厳密には俺が助けたわけではない。"

[[dialogue]]
speaker = "unk"
# だけどデネブでも同じようなことが起きていて、デネブの俺がエステルを助けたのかもしれなかった。
line = "だけどデネブでも同じようなことが起きていて、デネブの俺がエステルを助けたのかもしれなかった。"

[[dialogue]]
speaker = "エステル"
# 「できることならあなた様に一言お礼をしたいと、ずっと思っておりました」
line = "「できることならあなた様に一言お礼をしたいと、ずっと思っておりました」"

[[dialogue]]
speaker = "エステル"
# 「あの時助けていただいてありがとうございました、緋宮クロト様」
line = "「あの時助けていただいてありがとうございました、緋宮クロト様」"

[[dialogue]]
speaker = "unk"
# 俺に向かって深々と頭を下げるエステル。
line = "俺に向かって深々と頭を下げるエステル。"

[[dialogue]]
speaker = "unk"
# だけど彼女の感謝を、<b>俺</b>がそのまま受け取るわけにはいかない。
line = "だけど彼女の感謝を、<b>俺</b>がそのまま受け取るわけにはいかない。"

[[dialogue]]
speaker = "クロト"
# 「ごめん。君を助けた緋宮クロトは俺じゃないんだ」
line = "「ごめん。君を助けた緋宮クロトは俺じゃないんだ」"

[[dialogue]]
speaker = "エステル"
# 「え？　それはどういう……」
line = "「え？　それはどういう……」"

[[dialogue]]
speaker = "クロト"
# 「デネブの緋宮クロトは１０年前、リクリエとの戦いで命を落とした。俺はアルタイルから来たクロトだ」
line = "「デネブの緋宮クロトは１０年前、リクリエとの戦いで命を落とした。俺はアルタイルから来たクロトだ」"

[[dialogue]]
speaker = "エステル"
# 「──！　そう……だったのですね」
line = "「──！　そう……だったのですね」"

[[dialogue]]
speaker = "エステル"
# 「ルヴィネ会長から、緋宮クロトはデネブを裏切ってアルタイルに渡ったとお聞きして、私には信じられなかったのですが……」
line = "「ルヴィネ会長から、緋宮クロトはデネブを裏切ってアルタイルに渡ったとお聞きして、私には信じられなかったのですが……」"

[[dialogue]]
speaker = "エステル"
# 「私を助けてくださったあの方は、最後まで世界のために戦ったのですね……」
line = "「私を助けてくださったあの方は、最後まで世界のために戦ったのですね……」"

[[dialogue]]
speaker = "クロト"
# 「ああ、デネブの緋宮クロトは、この世界を滅ぼそうとなんかしていなかった」
line = "「ああ、デネブの緋宮クロトは、この世界を滅ぼそうとなんかしていなかった」"

[[dialogue]]
speaker = "クロト"
# 「俺もそうだ。俺はアルタイルから来たけど、デネブもリクリエから守りたいと思っている」
line = "「俺もそうだ。俺はアルタイルから来たけど、デネブもリクリエから守りたいと思っている」"

[[dialogue]]
speaker = "クロト"
# 「そのためにルヴィネと話したい。だからフィーニスの塔に行きたいんだ」
line = "「そのためにルヴィネと話したい。だからフィーニスの塔に行きたいんだ」"

[[dialogue]]
speaker = "ベアトリス"
# 「そうなんだよ。だから見逃して、エステルちゃんっ」
line = "「そうなんだよ。だから見逃して、エステルちゃんっ」"

[[dialogue]]
speaker = "エステル"
# 「ベアトリス副会長……！？　休学されていたはずでは……」
line = "「ベアトリス副会長……！？　休学されていたはずでは……」"

[[dialogue]]
speaker = "ベアトリス"
# 「え、えーと、いろいろあってアルタイルに行ってて……でもごめん、今は説明してる時間がなくて」
line = "「え、えーと、いろいろあってアルタイルに行ってて……でもごめん、今は説明してる時間がなくて」"

[[dialogue]]
speaker = "エステル"
# 「複雑な事情がおありのようですね……」
line = "「複雑な事情がおありのようですね……」"

[[dialogue]]
speaker = "エステル"
# 「わかりました。フィーニスの塔へ行くなら、念のためあちらをお通りください。あの道が一番人目を避けられると思います」
line = "「わかりました。フィーニスの塔へ行くなら、念のためあちらをお通りください。あの道が一番人目を避けられると思います」"

[[dialogue]]
speaker = "クロト"
# 「ありがとう。それじゃ通らせてもらうよ」
line = "「ありがとう。それじゃ通らせてもらうよ」"

[[dialogue]]
speaker = "unk"
# エステルと別れ、彼女の指し示す方向へ足早に進む。
line = "エステルと別れ、彼女の指し示す方向へ足早に進む。"

[[dialogue]]
speaker = "unk"
# すると誰ともすれ違うことなく、フィーニスの塔の前に辿り着くことができた。
line = "すると誰ともすれ違うことなく、フィーニスの塔の前に辿り着くことができた。"

[[dialogue]]
speaker = "フィオナ"
# 「デネブでも、フィーニスの塔とその周りはあまり変わらないようですね」
line = "「デネブでも、フィーニスの塔とその周りはあまり変わらないようですね」"

[[dialogue]]
speaker = "梨緒"
# 「……誰もいないな。ルヴィネはもう中に入ったのか？」
line = "「……誰もいないな。ルヴィネはもう中に入ったのか？」"

[[dialogue]]
speaker = "ナターシャ"
# 「そうだと思うよ。ルヴィネの足跡がここで途切れてる」
line = "「そうだと思うよ。ルヴィネの足跡がここで途切れてる」"

[[dialogue]]
speaker = "unk"
# 一度見失ってしまったが、いつもならルヴィネはフィーニスの塔に入っている時間帯だ。
line = "一度見失ってしまったが、いつもならルヴィネはフィーニスの塔に入っている時間帯だ。"

[[dialogue]]
speaker = "unk"
# もう塔の中にいると見て間違いないだろう。
line = "もう塔の中にいると見て間違いないだろう。"

[[dialogue]]
speaker = "ヴィーナス"
# 「でもデネブのフィーニスの塔に入るのは初めてね。どうやって入ればいいのかしら？」
line = "「でもデネブのフィーニスの塔に入るのは初めてね。どうやって入ればいいのかしら？」"

[[dialogue]]
speaker = "ラクシャ"
# 「フィーニスの塔は女神テルルの神域。女神の娘であるキミが念じれば、塔に入れるはずだよ」
line = "「フィーニスの塔は女神テルルの神域。女神の娘であるキミが念じれば、塔に入れるはずだよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「わかったわ。それじゃ──」
line = "「わかったわ。それじゃ──」"

[[dialogue]]
speaker = "unk"
# ヴィーナスが目をつむって塔の壁に触れる。
line = "ヴィーナスが目をつむって塔の壁に触れる。"

[[dialogue]]
speaker = "unk"
# そして──
line = "そして──"

[[dialogue]]
speaker = "ヴィーナス"
# 「行くわよ！」
line = "「行くわよ！」"

[[dialogue]]
speaker = "unk"
# ヴィーナスが目を見開いた瞬間、白い光に包まれて──
line = "ヴィーナスが目を見開いた瞬間、白い光に包まれて──"

[[dialogue]]
speaker = "unk"
# 次の瞬間には、フィーニスの塔内部へ転移していた。
line = "次の瞬間には、フィーニスの塔内部へ転移していた。"

[[dialogue]]
speaker = "フィオナ"
# 「中は私たちの知っているフィーニスの塔と変わりませんね。入ると変身するのも同じです」
line = "「中は私たちの知っているフィーニスの塔と変わりませんね。入ると変身するのも同じです」"

[[dialogue]]
speaker = "ベアトリス"
# 「これがフィーニスの塔の中……」
line = "「これがフィーニスの塔の中……」"

[[dialogue]]
speaker = "ナターシャ"
# 「ふーん、こんな感じなんだ」
line = "「ふーん、こんな感じなんだ」"

[[dialogue]]
speaker = "unk"
# 俺やヴィーナス、フィオナは慣れたものだけど、初めて塔に入ったベアトリスは目を丸くしていた。ナターシャはいつも通り飄々としているけど。
line = "俺やヴィーナス、フィオナは慣れたものだけど、初めて塔に入ったベアトリスは目を丸くしていた。ナターシャはいつも通り飄々としているけど。"

[[dialogue]]
speaker = "ラクシャ"
# 「守護天使にとっては驚きもない……というか本来の居場所だけどね」
line = "「守護天使にとっては驚きもない……というか本来の居場所だけどね」"

[[dialogue]]
speaker = "クロト"
# 「その姿は……」
line = "「その姿は……」"

[[dialogue]]
speaker = "ラクシャ"
# 「こっちが守護天使ラクシャの真の姿ってわけ。どう？　市倉環の時より強そうでしょ？」
line = "「こっちが守護天使ラクシャの真の姿ってわけ。どう？　市倉環の時より強そうでしょ？」"

[[dialogue]]
speaker = "unk"
# 外見の豪奢さもさることながら、帯びた力の質が全く違う。
line = "外見の豪奢さもさることながら、帯びた力の質が全く違う。"

[[dialogue]]
speaker = "unk"
# もし魔界で立ちふさがっていたのがこの姿だったら、どうなっていたかわからない。
line = "もし魔界で立ちふさがっていたのがこの姿だったら、どうなっていたかわからない。"

[[dialogue]]
speaker = "スレイプニル"
# 「ブルルル！」
line = "「ブルルル！」"

[[dialogue]]
speaker = "クロト"
# 「極星従騎！」
line = "「極星従騎！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「極星従騎がここにいるってことは、ルヴィネの仕業ね！」
line = "「極星従騎がここにいるってことは、ルヴィネの仕業ね！」"

[[dialogue]]
speaker = "梨緒"
# 「ひとまず倒すしかないか。梨緒・Ａ・クリステレス──ガーディアンを撃破する！」
line = "「ひとまず倒すしかないか。梨緒・Ａ・クリステレス──ガーディアンを撃破する！」"

[[dialogue]]
speaker = "ラクシャ"
# 「よーし、それじゃ守護天使ラクシャ様の力を見せてあげよっかな♪」
line = "「よーし、それじゃ守護天使ラクシャ様の力を見せてあげよっかな♪」"
