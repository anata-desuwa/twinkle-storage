line = "「待ちに待った新シリーズなのですよ！？　夢中になって当然ではないですか！？」"

[[dialogue]]
speaker = "マグダレナ"
# 「あのハラハラドキドキは何にも代えがたいもの。オオヒメだって見てみればその良さがわかります！　さぁ私とシリーズ一気見して沼に浸かりましょう！」
line = "「あのハラハラドキドキは何にも代えがたいもの。オオヒメだって見てみればその良さがわかります！　さぁ私とシリーズ一気見して沼に浸かりましょう！」"

[[dialogue]]
speaker = "オオヒメ"
# 「反省するどころか私を道連れにしようとするだと……！？　しかし沼とは何だ……？」
line = "「反省するどころか私を道連れにしようとするだと……！？　しかし沼とは何だ……？」"

[[dialogue]]
speaker = "オオヒメ"
# 「アルモタヘルは何かにつけて食べてばかりだ。特にドネルケバブ。何も食べていない時の方が珍しいのではないか……？」
line = "「アルモタヘルは何かにつけて食べてばかりだ。特にドネルケバブ。何も食べていない時の方が珍しいのではないか……？」"

[[dialogue]]
speaker = "アルモタヘル"
# 「もぐもぐ……何を言う。食こそ人の生み出した最大の文化。様々な料理を食すことで理解を深めようとしているのだ」
line = "「もぐもぐ……何を言う。食こそ人の生み出した最大の文化。様々な料理を食すことで理解を深めようとしているのだ」"

[[dialogue]]
speaker = "アルモタヘル"
# 「特にケバブは奥が深い。流星市国近辺には名店も多いぞ。お前も我とともに食べ歩きをすれば、気に入るものが見つかるはずだ」
line = "「特にケバブは奥が深い。流星市国近辺には名店も多いぞ。お前も我とともに食べ歩きをすれば、気に入るものが見つかるはずだ」"

[[dialogue]]
speaker = "オオヒメ"
# 「あなたも私をその道に<ruby=いざな>誘</ruby>おうとするのか……しかも今も食べてる……」
line = "「あなたも私をその道に<ruby>誘<rt>いざな</rt></ruby>おうとするのか……しかも今も食べてる……」"

[[dialogue]]
speaker = "オオヒメ"
# 「セシアは『新しいママよ！』と、モネ殿に膝枕と絵本の読み聞かせをせがんでいた」
line = "「セシアは『新しいママよ！』と、モネ殿に膝枕と絵本の読み聞かせをせがんでいた」"

