[[dialogue]]
speaker = "unk"
# 第２話,魔法少女の友達,P
line = "第２話,魔法少女の友達,P"

[[dialogue]]
speaker = "unk"
# あの後、トマルやサチと一緒に、新星学園敷地内に現れたロストアイテムを回収する為に奔走し――
line = "あの後、トマルやサチと一緒に、新星学園敷地内に現れたロストアイテムを回収する為に奔走し――"

[[dialogue]]
speaker = "トマル"
# 「はい、サチさま、絆創膏も貼りましたので、これで怪我の処置は終わりです」
line = "「はい、サチさま、絆創膏も貼りましたので、これで怪我の処置は終わりです」"

[[dialogue]]
speaker = "サチ"
# 「トマルくん、ありがとうございます。ロストアイテムの追跡も助かりました」
line = "「トマルくん、ありがとうございます。ロストアイテムの追跡も助かりました」"

[[dialogue]]
speaker = "トマル"
# 「いえ、サチさまも膝を擦り剥いただけで済んで、幸いです。ほっとしました」
line = "「いえ、サチさまも膝を擦り剥いただけで済んで、幸いです。ほっとしました」"

[[dialogue]]
speaker = "unk"
# トマル、手当てがすごく上手だね
line = "トマル、手当てがすごく上手だね"

[[dialogue]]
speaker = "トマル"
# 「実は私、附属校で、保健委員会に所属しているんです」
line = "「実は私、附属校で、保健委員会に所属しているんです」"

[[dialogue]]
speaker = "サチ"
# 「トマルくんの人気は男女問わずすごくて、保健室の看板娘として有名なんですよ」
line = "「トマルくんの人気は男女問わずすごくて、保健室の看板娘として有名なんですよ」"

[[dialogue]]
speaker = "トマル"
# 「そんな……大袈裟ですよ。私は男ですし……」
line = "「そんな……大袈裟ですよ。私は男ですし……」"

[[dialogue]]
speaker = "unk"
# ふと、サチのクローバーの髪飾りが点滅して、そこから声が響く。
line = "ふと、サチのクローバーの髪飾りが点滅して、そこから声が響く。"

[[dialogue]]
speaker = "トレジアンナ"
# 「男のムスメと書いて、男の娘ですから、看板娘で間違ってないかと。トマルさんは男子生徒からも、付き合って欲しいってよく告白されてますしね～」
line = "「男のムスメと書いて、男の娘ですから、看板娘で間違ってないかと。トマルさんは男子生徒からも、付き合って欲しいってよく告白されてますしね～」"

[[dialogue]]
speaker = "トマル"
# 「もう、トレジアンナさままで……私、何だか恥ずかしくて、照れてしまいます」
line = "「もう、トレジアンナさままで……私、何だか恥ずかしくて、照れてしまいます」"

[[dialogue]]
speaker = "トレジアンナ"
# 「いや～、それにしても、今回の魔法少女活動、トマルさんがいなければどうなっていたことか。持つべきものは、やはり仲間ですね～」
line = "「いや～、それにしても、今回の魔法少女活動、トマルさんがいなければどうなっていたことか。持つべきものは、やはり仲間ですね～」"

[[dialogue]]
speaker = "サチ"
# 「認識を歪めるロストアイテムがあんなにも厄介だとは思いませんでした。透明になって姿を消せるなんて……」
line = "「認識を歪めるロストアイテムがあんなにも厄介だとは思いませんでした。透明になって姿を消せるなんて……」"

[[dialogue]]
speaker = "サチ"
# 「トマルくんの式神を使って、追跡が出来たおかげで捕獲することができました。今回だけじゃないですが、いつも私たちを助けてくれて、本当にありがとうございます」
line = "「トマルくんの式神を使って、追跡が出来たおかげで捕獲することができました。今回だけじゃないですが、いつも私たちを助けてくれて、本当にありがとうございます」"

[[dialogue]]
speaker = "トマル"
# 「いえいえ、私も半年前のロストアイテムの件で助けて頂きましたから。それにもう、サチさまのことは魔法少女活動と関係なく、大切な友達だと思っていますので」
line = "「いえいえ、私も半年前のロストアイテムの件で助けて頂きましたから。それにもう、サチさまのことは魔法少女活動と関係なく、大切な友達だと思っていますので」"

[[dialogue]]
speaker = "トレジアンナ"
# 「トマルさん……相変わらず、心まで美少女！」
line = "「トマルさん……相変わらず、心まで美少女！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「サチさんとトマルさんがこんなに仲良くしてるんだから、そろそろ生徒会と保健委員会の確執もどうにかなりませんかね～」
line = "「サチさんとトマルさんがこんなに仲良くしてるんだから、そろそろ生徒会と保健委員会の確執もどうにかなりませんかね～」"

[[dialogue]]
speaker = "unk"
# そんなのがあるの？
line = "そんなのがあるの？"

[[dialogue]]
speaker = "トマル"
# 「はい、私たちより上の代の先輩が、犬猿の仲だったそうで……予算を上げる上げないで、よく揉めていたみたいです」
line = "「はい、私たちより上の代の先輩が、犬猿の仲だったそうで……予算を上げる上げないで、よく揉めていたみたいです」"

[[dialogue]]
speaker = "サチ"
# 「情けない話ですが、それを今も引きずってしまっていて、組織的に仲がよくないんです」
line = "「情けない話ですが、それを今も引きずってしまっていて、組織的に仲がよくないんです」"

[[dialogue]]
speaker = "トマル"
# 「でも、私は諦めずに委員会の皆さまへ訴えていきたいです。昔の確執を、今の私たちが持ち続ける必要はないんだって」
line = "「でも、私は諦めずに委員会の皆さまへ訴えていきたいです。昔の確執を、今の私たちが持ち続ける必要はないんだって」"

[[dialogue]]
speaker = "トマル"
# 「事実として、私はサチさまとこうして、友達になれたのですから」
line = "「事実として、私はサチさまとこうして、友達になれたのですから」"

[[dialogue]]
speaker = "サチ"
# 「私も生徒会長として、卒業までに必ず和解してみせます」
line = "「私も生徒会長として、卒業までに必ず和解してみせます」"

[[dialogue]]
speaker = "トマル"
# 「それで、サチさま。組織同士の確執はひとまず置いておいて……１人の友達として、どうしても言って置かなくてはならないことがあります」
line = "「それで、サチさま。組織同士の確執はひとまず置いておいて……１人の友達として、どうしても言って置かなくてはならないことがあります」"

[[dialogue]]
speaker = "サチ"
# 「え？　は、はい」
line = "「え？　は、はい」"

[[dialogue]]
speaker = "トマル"
# 「今回の１件についてです。結果的に、怪我も大したことはなく、ロストアイテムの回収には成功しましたが――」
line = "「今回の１件についてです。結果的に、怪我も大したことはなく、ロストアイテムの回収には成功しましたが――」"

[[dialogue]]
speaker = "トマル"
# 「それでも、やはり無茶はダメです。サチさまがいくら『幸運体質』だと言っても、ご自分のことはもっと大切になさって下さい」
line = "「それでも、やはり無茶はダメです。サチさまがいくら『幸運体質』だと言っても、ご自分のことはもっと大切になさって下さい」"

[[dialogue]]
speaker = "サチ"
# 「そうですね……ごめんなさい。私も自分の能力任せで、合理的な行動じゃなかったと反省してます……」
line = "「そうですね……ごめんなさい。私も自分の能力任せで、合理的な行動じゃなかったと反省してます……」"

[[dialogue]]
speaker = "トマル"
# 「ご自分でわかっていらっしゃるのなら、私も安心です。サチさまが傷付くと、私達も心を痛めずにはいられないのです。次はどうか、お怪我をなさらないようにしてください」
line = "「ご自分でわかっていらっしゃるのなら、私も安心です。サチさまが傷付くと、私達も心を痛めずにはいられないのです。次はどうか、お怪我をなさらないようにしてください」"

[[dialogue]]
speaker = "サチ"
# 「はい、気をつけます。心配してくれてありがとう、トマルくん」
line = "「はい、気をつけます。心配してくれてありがとう、トマルくん」"

[[dialogue]]
speaker = "トレジアンナ"
# 「ロストアイテムが悪い人達の手に渡るのを避ける為、サチさんに回収をお願いしてる私が言うのもなんですが……」
line = "「ロストアイテムが悪い人達の手に渡るのを避ける為、サチさんに回収をお願いしてる私が言うのもなんですが……」"

[[dialogue]]
speaker = "トレジアンナ"
# 「私もサチさんが怪我をするのは本意ではないですね～。サチさんにはいつも、魔法少女として可愛くいて欲しいって思ってますから♪」
line = "「私もサチさんが怪我をするのは本意ではないですね～。サチさんにはいつも、魔法少女として可愛くいて欲しいって思ってますから♪」"

[[dialogue]]
speaker = "サチ"
# 「トレジアンナさんらしいですね……でも」
line = "「トレジアンナさんらしいですね……でも」"

[[dialogue]]
speaker = "サチ"
# 「私としても、ロストアイテムを悪い人の手に渡すことはできないって、今では思っています。だから、もう少しこの活動を続けていきたいんです」
line = "「私としても、ロストアイテムを悪い人の手に渡すことはできないって、今では思っています。だから、もう少しこの活動を続けていきたいんです」"

[[dialogue]]
speaker = "サチ"
# 「それに、今はトマルくんだけじゃなく、お兄さんっていう心強い味方もいますしね」
line = "「それに、今はトマルくんだけじゃなく、お兄さんっていう心強い味方もいますしね」"

[[dialogue]]
speaker = "トマル"
# 「会長さま。私からもどうか、サチさまのことをよろしくお願い致します」
line = "「会長さま。私からもどうか、サチさまのことをよろしくお願い致します」"

[[dialogue]]
speaker = "unk"
# もちろんだ。任せてくれ
line = "もちろんだ。任せてくれ"

[[dialogue]]
speaker = "トマル"
# 「はい。あなた様になら、サチさまを安心してお願いできます」
line = "「はい。あなた様になら、サチさまを安心してお願いできます」"

[[dialogue]]
speaker = "トマル"
# 「あっ、そうだ。会長さまは今回の件で、どこかお加減の悪いところはございませんか？」
line = "「あっ、そうだ。会長さまは今回の件で、どこかお加減の悪いところはございませんか？」"

[[dialogue]]
speaker = "トマル"
# 「怪我でなくとも、具合が悪いとか、気分が優れないとか……」
line = "「怪我でなくとも、具合が悪いとか、気分が優れないとか……」"

[[dialogue]]
speaker = "トマル"
# 「私、どんな手当てでも致しますので、何でもお申しつけください」
line = "「私、どんな手当てでも致しますので、何でもお申しつけください」"

[[dialogue]]
speaker = "トマル"
# 「なんでもいいんです。なにか私に、あなた様の為にできることはございませんか？」
line = "「なんでもいいんです。なにか私に、あなた様の為にできることはございませんか？」"

[[dialogue]]
speaker = "unk"
# い、いや、本当に大丈夫だから……！
line = "い、いや、本当に大丈夫だから……！"

[[dialogue]]
speaker = "トレジアンナ"
# 「おや？　トマルさん、ご奉仕気質なのはいつものことですが、今日はなんか……」
line = "「おや？　トマルさん、ご奉仕気質なのはいつものことですが、今日はなんか……」"

[[dialogue]]
speaker = "サチ"
# 「お兄さん、わかります。トマルくんの美人な顔で迫られると、性別関係なくドキドキしちゃうんですよね……」
line = "「お兄さん、わかります。トマルくんの美人な顔で迫られると、性別関係なくドキドキしちゃうんですよね……」"

[[dialogue]]
speaker = "unk"
# その後、結局トマルの圧に押し負けて、保健室で色々お世話を焼かれてしまうのだった――
line = "その後、結局トマルの圧に押し負けて、保健室で色々お世話を焼かれてしまうのだった――"
