[[dialogue]]
speaker = "シノ"
# 『流星学園と新星学園の合同体育祭・星霊祭。初日は絶好の晴天に恵まれました。これより開会式となります』
line = "『流星学園と新星学園の合同体育祭・星霊祭。初日は絶好の晴天に恵まれました。これより開会式となります』"

[[dialogue]]
speaker = "シノ"
# 『今回の星霊祭の進行は、新星学園学園長、十六夜シノと──』
line = "『今回の星霊祭の進行は、新星学園学園長、十六夜シノと──』"

[[dialogue]]
speaker = "マグダレナ"
# 『私、《境界》のマグダレナでお送りいたします。まずは新星学園教頭のご挨拶です。よろしくお願いいたします』
line = "『私、《境界》のマグダレナでお送りいたします。まずは新星学園教頭のご挨拶です。よろしくお願いいたします』"

[[dialogue]]
speaker = "教頭"
# 『お日柄もよく、今年も例年通り、最高の体育祭日和を迎えることができた。君たちの鍛え上げられた肉体も、さぞ喜んでいるかと思うッ！』
line = "『お日柄もよく、今年も例年通り、最高の体育祭日和を迎えることができた。君たちの鍛え上げられた肉体も、さぞ喜んでいるかと思うッ！』"

[[dialogue]]
speaker = "教頭"
# 『これから１週間、諸君には筋肉を躍動させ、汗のしぶきをはじけさせ、熱く激しく、パワーを漲らせてぶつかり合っていただきたいッ！』
line = "『これから１週間、諸君には筋肉を躍動させ、汗のしぶきをはじけさせ、熱く激しく、パワーを漲らせてぶつかり合っていただきたいッ！』"

[[dialogue]]
speaker = "教頭"
# 『筋・肉・最・高ッ！　これにて開会の挨拶とさせていただくッ！』
line = "『筋・肉・最・高ッ！　これにて開会の挨拶とさせていただくッ！』"

[[dialogue]]
speaker = "マグダレナ"
# 『教頭先生のお熱い筋肉推しのご挨拶でした。これより、星霊祭、いざ開幕となります』
line = "『教頭先生のお熱い筋肉推しのご挨拶でした。これより、星霊祭、いざ開幕となります』"

[[dialogue]]
speaker = "ミルフィー"
# 「マグダレナ様がいらっしゃってるー！？　ど、どうしよう、絶対にかっこ悪いところは見せられないよー！」
line = "「マグダレナ様がいらっしゃってるー！？　ど、どうしよう、絶対にかっこ悪いところは見せられないよー！」"

[[dialogue]]
speaker = "フラン"
# 「流星学園は強力すぎるライバルだけどな！　最終日まで全競技で勝利を目指す！　声出していくぞー！　みんな気合入れろよー！」
line = "「流星学園は強力すぎるライバルだけどな！　最終日まで全競技で勝利を目指す！　声出していくぞー！　みんな気合入れろよー！」"

[[dialogue]]
speaker = "カティア"
# 「絶対負けないワン！」
line = "「絶対負けないワン！」"

[[dialogue]]
speaker = "ヒヨ"
# 「おうよ！　姐さんにいいところ見せてやるぜい！」
line = "「おうよ！　姐さんにいいところ見せてやるぜい！」"

[[dialogue]]
speaker = "シノ"
# 『最初の競技は、体育祭の定番の玉入れになります』
line = "『最初の競技は、体育祭の定番の玉入れになります』"

[[dialogue]]
speaker = "ミルフィー"
# 「うん、運動会と言えば玉入れだよね。人間界で勉強したよ」
line = "「うん、運動会と言えば玉入れだよね。人間界で勉強したよ」"

[[dialogue]]
speaker = "マグダレナ"
# 『ただし、そこは星霊祭であり、星騎士仕様です。普通の玉入れではありませんよ』
line = "『ただし、そこは星霊祭であり、星騎士仕様です。普通の玉入れではありませんよ』"

[[dialogue]]
speaker = "美鶴"
# 「……んん？　何か空を飛んでんね。モンスター？」
line = "「……んん？　何か空を飛んでんね。モンスター？」"

[[dialogue]]
speaker = "シノ"
# 『皆さんご心配なく。あれはモンスターではありません。玉入れのカゴですよ』
line = "『皆さんご心配なく。あれはモンスターではありません。玉入れのカゴですよ』"

[[dialogue]]
speaker = "ミルフィー"
# 「あれがカゴ……！？　すごくいっぱい飛んでるんだけど……普通、玉入れのカゴって１チーム１つじゃない？」
line = "「あれがカゴ……！？　すごくいっぱい飛んでるんだけど……普通、玉入れのカゴって１チーム１つじゃない？」"

[[dialogue]]
speaker = "マグダレナ"
# 『見上げればお分かりの通り、カゴがアリーナ上空に無数に設置されています。なお、カゴまでの高さは３０ｍ強』
line = "『見上げればお分かりの通り、カゴがアリーナ上空に無数に設置されています。なお、カゴまでの高さは３０ｍ強』"

[[dialogue]]
speaker = "シノ"
# 『およそ１０階建てのビルほどの高さになります。あそこに絶妙なコントロールで投げ入れるのは、歴戦の星騎士でもなかなか困難ですよ』
line = "『およそ１０階建てのビルほどの高さになります。あそこに絶妙なコントロールで投げ入れるのは、歴戦の星騎士でもなかなか困難ですよ』"

[[dialogue]]
speaker = "美鶴"
# 「あそこで３０ｍかー。見上げると結構高いね。首痛くなりそ」
line = "「あそこで３０ｍかー。見上げると結構高いね。首痛くなりそ」"

[[dialogue]]
speaker = "ミルフィー"
# 「でも投げなくても、星騎士ならあそこまで飛んでいけば──」
line = "「でも投げなくても、星騎士ならあそこまで飛んでいけば──」"

[[dialogue]]
speaker = "マグダレナ"
# 『もちろん、カゴの高さまで飛んでのダンクシュートは禁止ですよ。反則行為は減点になりますから特に気を付けてくださいね』
line = "『もちろん、カゴの高さまで飛んでのダンクシュートは禁止ですよ。反則行為は減点になりますから特に気を付けてくださいね』"

[[dialogue]]
speaker = "ミルフィー"
# 「釘を刺されちゃった……うっかり飛んじゃわないよう、気をつけないとね！」
line = "「釘を刺されちゃった……うっかり飛んじゃわないよう、気をつけないとね！」"

[[dialogue]]
speaker = "シノ"
# 『それ以外は普通の玉入れです。自軍の玉を次々と放り込み、設置されてるカゴを全部いっぱいにしてください。それでは……第１競技、レディー、ゴー！』
line = "『それ以外は普通の玉入れです。自軍の玉を次々と放り込み、設置されてるカゴを全部いっぱいにしてください。それでは……第１競技、レディー、ゴー！』"

[[dialogue]]
speaker = "unk"
# シノ学園長の凛々しいコールと同時、無数の紅白の玉が宙を飛び交う。
line = "シノ学園長の凛々しいコールと同時、無数の紅白の玉が宙を飛び交う。"

[[dialogue]]
speaker = "カティア"
# 「えいっ！　えいっ！　う～～、遠いし、カゴが小さすぎます！　なかなか入ってくれないワン！」
line = "「えいっ！　えいっ！　う～～、遠いし、カゴが小さすぎます！　なかなか入ってくれないワン！」"

[[dialogue]]
speaker = "美鶴"
# 「うちもやっと１個入ったよ。マジムズぅ」
line = "「うちもやっと１個入ったよ。マジムズぅ」"

[[dialogue]]
speaker = "ミルフィー"
# 「ふっふっふ、飛ぶのは封じられちゃったけど、実は玉入れには大量点を狙える裏技があるんだよ！」
line = "「ふっふっふ、飛ぶのは封じられちゃったけど、実は玉入れには大量点を狙える裏技があるんだよ！」"

[[dialogue]]
speaker = "ヒヨ"
# 「な、なんだってー！　それは本当かい、姐さん！」
line = "「な、なんだってー！　それは本当かい、姐さん！」"

[[dialogue]]
speaker = "ミルフィー"
# 「天使は嘘つかないよ。ヒヨちゃん、カティアちゃん！　玉をいっぱいかき集めてきて！」
line = "「天使は嘘つかないよ。ヒヨちゃん、カティアちゃん！　玉をいっぱいかき集めてきて！」"

[[dialogue]]
speaker = "カティア"
# 「はいっ！　上手くは投げられないけど、集めるだけなら私のスピードを活かせますガオ！」
line = "「はいっ！　上手くは投げられないけど、集めるだけなら私のスピードを活かせますガオ！」"

[[dialogue]]
speaker = "美鶴"
# 「裏技なんてあるんだ。面白そ。うちも手伝うよ」
line = "「裏技なんてあるんだ。面白そ。うちも手伝うよ」"

[[dialogue]]
speaker = "unk"
# いったい、何をするつもりなんだ……？
line = "いったい、何をするつもりなんだ……？"

[[dialogue]]
speaker = "unk"
# 玉入れの裏技……？
line = "玉入れの裏技……？"

[[dialogue]]
speaker = "カティア"
# 「はぁ、はぁっ、両手いっぱい集めてきたワン！」
line = "「はぁ、はぁっ、両手いっぱい集めてきたワン！」"

[[dialogue]]
speaker = "ヒヨ"
# 「姐さん、こんなもんでどうでぇ！」
line = "「姐さん、こんなもんでどうでぇ！」"

[[dialogue]]
speaker = "ミルフィー"
# 「うんっ、これだけあれば作れるよ！」
line = "「うんっ、これだけあれば作れるよ！」"

[[dialogue]]
speaker = "美鶴"
# 「作んの？　何を？」
line = "「作んの？　何を？」"

[[dialogue]]
speaker = "ミルフィー"
# 「みんなが拾い集めてくれた玉に星力を込めて……ギューーーッて固めて！」
line = "「みんなが拾い集めてくれた玉に星力を込めて……ギューーーッて固めて！」"

[[dialogue]]
speaker = "カティア"
# 「うわ！？　いっぱい集めたお手玉サイズの玉が、槍の形になったガオ！」
line = "「うわ！？　いっぱい集めたお手玉サイズの玉が、槍の形になったガオ！」"

[[dialogue]]
speaker = "美鶴"
# 「いやいやいやおかしいおかしい。しかも圧縮しすぎだし」
line = "「いやいやいやおかしいおかしい。しかも圧縮しすぎだし」"

[[dialogue]]
speaker = "ミルフィー"
# 「こうすれば１個１個投げるよりも安定するし、固めた分だけ、まとめて得点になるでしょ？」
line = "「こうすれば１個１個投げるよりも安定するし、固めた分だけ、まとめて得点になるでしょ？」"

[[dialogue]]
speaker = "美鶴"
# 「なるだろうけどさ、外したらそれだけ無駄になるじゃん？」
line = "「なるだろうけどさ、外したらそれだけ無駄になるじゃん？」"

[[dialogue]]
speaker = "ミルフィー"
# 「大丈夫、私、自信あるから！」
line = "「大丈夫、私、自信あるから！」"

[[dialogue]]
speaker = "美鶴"
# 「おお、言うね」
line = "「おお、言うね」"

[[dialogue]]
speaker = "ミルフィー"
# 「絶対に決めるっ！　カゴに狙いを定めて──イノセントノヴァ！」
line = "「絶対に決めるっ！　カゴに狙いを定めて──イノセントノヴァ！」"

[[dialogue]]
speaker = "unk"
# ミルフィーの放り投げたお手玉の槍は、３０ｍ上のカゴの中へと吸い込まれるように──
line = "ミルフィーの放り投げたお手玉の槍は、３０ｍ上のカゴの中へと吸い込まれるように──"

[[dialogue]]
speaker = "unk"
# ボスンッ！
line = "ボスンッ！"

[[dialogue]]
speaker = "ヒヨ"
# 「姐さん、ナイッシュー！」
line = "「姐さん、ナイッシュー！」"

[[dialogue]]
speaker = "マグダレナ"
# 『まあまあ、新星学園のミルフィーさん。カゴに吸い込まれるような見事なシュートですね。３００点です』
line = "『まあまあ、新星学園のミルフィーさん。カゴに吸い込まれるような見事なシュートですね。３００点です』"

[[dialogue]]
speaker = "unk"
# １個で３００点！？
line = "１個で３００点！？"

[[dialogue]]
speaker = "ミルフィー"
# 「そう、名付けて……スリーハンドレッドポイントシュート！」
line = "「そう、名付けて……スリーハンドレッドポイントシュート！」"

[[dialogue]]
speaker = "カティア"
# 「すごい！　スリーポイントシュートの１０倍ですワン！」
line = "「すごい！　スリーポイントシュートの１０倍ですワン！」"

[[dialogue]]
speaker = "美鶴"
# 「１００倍だよ」
line = "「１００倍だよ」"

[[dialogue]]
speaker = "ヒヨ"
# 「姐さん、お美事！　惚れ直しちまうねぇ！」
line = "「姐さん、お美事！　惚れ直しちまうねぇ！」"

[[dialogue]]
speaker = "ミルフィー"
# 「槍投げで鍛えてる肩は伊達じゃないよっ！　これはルール違反じゃないよね？」
line = "「槍投げで鍛えてる肩は伊達じゃないよっ！　これはルール違反じゃないよね？」"

[[dialogue]]
speaker = "マグダレナ"
# 『ちゃんと地に足をつけて玉を投げていますから、合法です♪』
line = "『ちゃんと地に足をつけて玉を投げていますから、合法です♪』"

[[dialogue]]
speaker = "マグダレナ"
# 『ちなみに、星騎士の運動会ですから、星術の使用は許可されていますよ』
line = "『ちなみに、星騎士の運動会ですから、星術の使用は許可されていますよ』"

[[dialogue]]
speaker = "美鶴"
# 「さっすが。プリマステラは伊達じゃないってわけね」
line = "「さっすが。プリマステラは伊達じゃないってわけね」"

[[dialogue]]
speaker = "流星生徒Ａ"
# 「な、なに、今の！　ウチも真似しようよ！」
line = "「な、なに、今の！　ウチも真似しようよ！」"

[[dialogue]]
speaker = "流星生徒Ｂ"
# 「無理無理！　よっぽど強肩じゃないと──そうだ、フェニエルさんならっ！？」
line = "「無理無理！　よっぽど強肩じゃないと──そうだ、フェニエルさんならっ！？」"

[[dialogue]]
speaker = "フェニエル"
# 「真似っこしてみますねっ。こうやって、ぎゅむっ、ぎゅむって固めて──えーいっ！」
line = "「真似っこしてみますねっ。こうやって、ぎゅむっ、ぎゅむって固めて──えーいっ！」"

[[dialogue]]
speaker = "フェニエル"
# 「ああっ、遠くまで飛んでいっちゃいましたー……カゴに入れるのは難しいです……！」
line = "「ああっ、遠くまで飛んでいっちゃいましたー……カゴに入れるのは難しいです……！」"

[[dialogue]]
speaker = "シノ"
# 『フェニエルさんが投げた玉が降ってきまーす！　近くの方はお気をつけくださーい！』
line = "『フェニエルさんが投げた玉が降ってきまーす！　近くの方はお気をつけくださーい！』"

[[dialogue]]
speaker = "ミネコ"
# 「わぁっ！？　鉄の塊みたいのが降ってきたんだけど！？」
line = "「わぁっ！？　鉄の塊みたいのが降ってきたんだけど！？」"

[[dialogue]]
speaker = "フェニエル"
# 「ご、ごめんなさい、ごめんなさい！　真似するのは危ないみたいです……！」
line = "「ご、ごめんなさい、ごめんなさい！　真似するのは危ないみたいです……！」"

[[dialogue]]
speaker = "ミルフィー"
# 「さー、みんな、私のところに固めてもってきてー！　片っ端からポイポイ放り込んじゃうよー！」
line = "「さー、みんな、私のところに固めてもってきてー！　片っ端からポイポイ放り込んじゃうよー！」"

[[dialogue]]
speaker = "教頭"
# 「うううう～ん、素晴らし～いっ！　やはり筋肉こそ、力！　力こそ、パワー！」
line = "「うううう～ん、素晴らし～いっ！　やはり筋肉こそ、力！　力こそ、パワー！」"

[[dialogue]]
speaker = "unk"
# 槍投げで鍛えられたミルフィーの圧倒的な投擲力と、精密なコントロールは、玉入れ勝負の明暗を分けたのだった。
line = "槍投げで鍛えられたミルフィーの圧倒的な投擲力と、精密なコントロールは、玉入れ勝負の明暗を分けたのだった。"

[[dialogue]]
speaker = "シノ"
# 『第１競技、玉入れの結果は～……言うまでもないかもしれませんね。新星学園の勝利です！』
line = "『第１競技、玉入れの結果は～……言うまでもないかもしれませんね。新星学園の勝利です！』"

[[dialogue]]
speaker = "ミルフィー"
# 「やったぁ！」
line = "「やったぁ！」"

[[dialogue]]
speaker = "フラン"
# 「いいぞ、いいぞ、ミ・ル・フィー！　いいぞ、いいぞ、し・ん・せ・い！　このまま行っけー！」
line = "「いいぞ、いいぞ、ミ・ル・フィー！　いいぞ、いいぞ、し・ん・せ・い！　このまま行っけー！」"

[[dialogue]]
speaker = "unk"
# すごいぞミルフィー！
line = "すごいぞミルフィー！"

[[dialogue]]
speaker = "ミルフィー"
# 「ありがとう♪　応援ってするのも、されるのも嬉しいね<emoji=heart04>」
line = "「ありがとう♪　応援ってするのも、されるのも嬉しいね<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ミルフィーの大活躍により星霊祭初日は新星学園のリードから始まった。
line = "ミルフィーの大活躍により星霊祭初日は新星学園のリードから始まった。"

[[dialogue]]
speaker = "unk"
# 順調な滑り出しだが、果たして次の競技は──？
line = "順調な滑り出しだが、果たして次の競技は──？"
