[[dialogue]]
speaker = "unk"
# 第2話,メイド長に弟子入り,P
line = "第2話,メイド長に弟子入り,P"

[[dialogue]]
speaker = "キリカ"
# 「お嬢様がどうしてこちらに？」
line = "「お嬢様がどうしてこちらに？」"

[[dialogue]]
speaker = "フィオナ"
# 「星騎士として、モンスターの対応をするために来たまでです。でももう終わってるし、キリカと緋宮会長が一緒にいたから少し驚いちゃった」
line = "「星騎士として、モンスターの対応をするために来たまでです。でももう終わってるし、キリカと緋宮会長が一緒にいたから少し驚いちゃった」"

[[dialogue]]
speaker = "フィオナ"
# 「さっきの、いいんじゃない。緋宮会長を弟子にしても」
line = "「さっきの、いいんじゃない。緋宮会長を弟子にしても」"

[[dialogue]]
speaker = "フィオナ"
# 「緋宮会長が強くなれば、必ず私たちの力になる。そう考えれば、緋宮会長を鍛えるのは星見家のメイドとして不自然なことではない。……でしょう？」
line = "「緋宮会長が強くなれば、必ず私たちの力になる。そう考えれば、緋宮会長を鍛えるのは星見家のメイドとして不自然なことではない。……でしょう？」"

[[dialogue]]
speaker = "フィオナ"
# 「キリカだって緋宮会長のことは気にしていたと思うけど」
line = "「キリカだって緋宮会長のことは気にしていたと思うけど」"

[[dialogue]]
speaker = "キリカ"
# 「それは戦闘スタイルが私に近いからです。星騎士には様々な戦い方がありますが、格闘戦主体の星騎士は少々珍しいので」
line = "「それは戦闘スタイルが私に近いからです。星騎士には様々な戦い方がありますが、格闘戦主体の星騎士は少々珍しいので」"

[[dialogue]]
speaker = "キリカ"
# 「……ですがお嬢様がそう仰るなら。では星見家のお屋敷にお越しください。私から指導させていただきます」
line = "「……ですがお嬢様がそう仰るなら。では星見家のお屋敷にお越しください。私から指導させていただきます」"

[[dialogue]]
speaker = "キリカ"
# 「メイドにとって、紅茶を淹れることは基礎中の基礎。これを習得せずして奉仕はできません」
line = "「メイドにとって、紅茶を淹れることは基礎中の基礎。これを習得せずして奉仕はできません」"

[[dialogue]]
speaker = "キリカ"
# 「良い紅茶を淹れるには当然茶葉の品質も大事ですが、技術と知識も必要です」
line = "「良い紅茶を淹れるには当然茶葉の品質も大事ですが、技術と知識も必要です」"

[[dialogue]]
speaker = "キリカ"
# 「まずは適切な道具選びから。紅茶の成分が鉄と反応すると味や風味が損なわれてしまいますので、鉄の含まれるティーポットは避けてください」
line = "「まずは適切な道具選びから。紅茶の成分が鉄と反応すると味や風味が損なわれてしまいますので、鉄の含まれるティーポットは避けてください」"

[[dialogue]]
speaker = "unk"
# どうして紅茶の淹れ方を……？
line = "どうして紅茶の淹れ方を……？"

[[dialogue]]
speaker = "キリカ"
# 「上月家は古来より星見家の従者を務めてきました。私が修める神闘流は、星見家を守る者として上月家が代々伝えてきたものです」
line = "「上月家は古来より星見家の従者を務めてきました。私が修める神闘流は、星見家を守る者として上月家が代々伝えてきたものです」"

[[dialogue]]
speaker = "キリカ"
# 「ですから私を師と仰ぐからには戦闘技術だけでなく、奉仕の精神を学んでいただきます。よろしいですね？」
line = "「ですから私を師と仰ぐからには戦闘技術だけでなく、奉仕の精神を学んでいただきます。よろしいですね？」"

[[dialogue]]
speaker = "unk"
# はい、師匠！
line = "はい、師匠！"

[[dialogue]]
speaker = "キリカ"
# 「良い返事です。では続きを」
line = "「良い返事です。では続きを」"

[[dialogue]]
speaker = "キリカ"
# 「紅茶を淹れる際は汲みたての水を使い、しっかり沸騰させてください」
line = "「紅茶を淹れる際は汲みたての水を使い、しっかり沸騰させてください」"

[[dialogue]]
speaker = "キリカ"
# 「茶葉を入れる前にお湯を注いでポットを温めます。冷たいままポットを使うとお湯の温度が下がり、茶葉の成分がきちんと抽出されなくなるためです」
line = "「茶葉を入れる前にお湯を注いでポットを温めます。冷たいままポットを使うとお湯の温度が下がり、茶葉の成分がきちんと抽出されなくなるためです」"

[[dialogue]]
speaker = "キリカ"
# 「使用するカップも同じ要領で温めておきましょう。次に人数分の茶葉をポットに入れ、勢いよくお湯を注ぎます」
line = "「使用するカップも同じ要領で温めておきましょう。次に人数分の茶葉をポットに入れ、勢いよくお湯を注ぎます」"

[[dialogue]]
speaker = "キリカ"
# 「そしてポットの蓋を閉めて蒸らします。蒸らす時間は短すぎても長すぎても最適の味を出すことはできません。……最後にティーカップに注げば完成です」
line = "「そしてポットの蓋を閉めて蒸らします。蒸らす時間は短すぎても長すぎても最適の味を出すことはできません。……最後にティーカップに注げば完成です」"

[[dialogue]]
speaker = "キリカ"
# 「紅茶を一杯淹れるために、これだけの工程があります。ひとつひとつは難しいものではありません。ですがその積み重ねが紅茶を美味しくするのです」
line = "「紅茶を一杯淹れるために、これだけの工程があります。ひとつひとつは難しいものではありません。ですがその積み重ねが紅茶を美味しくするのです」"

[[dialogue]]
speaker = "キリカ"
# 「では、先ほど購入してきた茶葉を使って紅茶を淹れてみてください」
line = "「では、先ほど購入してきた茶葉を使って紅茶を淹れてみてください」"

[[dialogue]]
speaker = "キリカ"
# 「基本に忠実に、私の教えた通りに……ええ、そうです。手順は合っていますよ」
line = "「基本に忠実に、私の教えた通りに……ええ、そうです。手順は合っていますよ」"

[[dialogue]]
speaker = "unk"
# どうぞ、お嬢様
line = "どうぞ、お嬢様"

[[dialogue]]
speaker = "フィオナ"
# 「ありがとう。ふふっ、すっかりうちの執事みたいですね」
line = "「ありがとう。ふふっ、すっかりうちの執事みたいですね」"

[[dialogue]]
speaker = "キリカ"
# 「お嬢様。メイドに対して男性に使う言葉としては、フットマンやヴァレットがふさわしいかと」
line = "「お嬢様。メイドに対して男性に使う言葉としては、フットマンやヴァレットがふさわしいかと」"

[[dialogue]]
speaker = "キリカ"
# 「執事とは屋敷内の職務を取り仕切り、使用人を統括する立場の者のこと。つまり私です」
line = "「執事とは屋敷内の職務を取り仕切り、使用人を統括する立場の者のこと。つまり私です」"

[[dialogue]]
speaker = "フィオナ"
# 「もう一般的に定着しているし、そこまで細かく気にしなくてもいいんじゃない？　では、いただきます」
line = "「もう一般的に定着しているし、そこまで細かく気にしなくてもいいんじゃない？　では、いただきます」"

[[dialogue]]
speaker = "フィオナ"
# 「ふむ……美味しいです。ですがいつも飲んでいるものと比べると、風味が弱いような……」
line = "「ふむ……美味しいです。ですがいつも飲んでいるものと比べると、風味が弱いような……」"

[[dialogue]]
speaker = "キリカ"
# 「こちらが私が淹れたものです。どうぞ」
line = "「こちらが私が淹れたものです。どうぞ」"

[[dialogue]]
speaker = "unk"
# 香りが全然違う……！
line = "香りが全然違う……！"

[[dialogue]]
speaker = "キリカ"
# 「手際は悪くなかったですが、蒸らす時間が少々足りなかったようです。茶葉の種類や加工によっても蒸らす時間が異なってくるので、注意してください」
line = "「手際は悪くなかったですが、蒸らす時間が少々足りなかったようです。茶葉の種類や加工によっても蒸らす時間が異なってくるので、注意してください」"

[[dialogue]]
speaker = "キリカ"
# 「私が焼いたクッキーです。紅茶と一緒にお召し上がりください」
line = "「私が焼いたクッキーです。紅茶と一緒にお召し上がりください」"

[[dialogue]]
speaker = "フィオナ"
# 「ありがとう。……うん、おいしい」
line = "「ありがとう。……うん、おいしい」"

[[dialogue]]
speaker = "フィオナ"
# 「そう落ち込まないでください、緋宮会長。キリカは私が物心ついた時からいてくれてるんですから、すぐには追いつけなくて当然ですよ」
line = "「そう落ち込まないでください、緋宮会長。キリカは私が物心ついた時からいてくれてるんですから、すぐには追いつけなくて当然ですよ」"

[[dialogue]]
speaker = "unk"
# キリカさんはすごい
line = "キリカさんはすごい"

[[dialogue]]
speaker = "フィオナ"
# 「そうですね。キリカ、いつもありがとう」
line = "「そうですね。キリカ、いつもありがとう」"

[[dialogue]]
speaker = "キリカ"
# 「メイドとして当然のことをしているまでです」
line = "「メイドとして当然のことをしているまでです」"

[[dialogue]]
speaker = "キリカ"
# 「では他にも屋敷の家事を学んでいただきます。掃除、洗濯、料理、修繕、庭の手入れに至るまで、全て使用人の仕事ですので」
line = "「では他にも屋敷の家事を学んでいただきます。掃除、洗濯、料理、修繕、庭の手入れに至るまで、全て使用人の仕事ですので」"

[[dialogue]]
speaker = "キリカ"
# 「そんなに驚いた顔をしないでください。当然のことを言っただけです」
line = "「そんなに驚いた顔をしないでください。当然のことを言っただけです」"

[[dialogue]]
speaker = "キリカ"
# 「戦闘訓練はその後に。疲労しているからといって手を抜くつもりはありませんので、そのつもりでいてください」
line = "「戦闘訓練はその後に。疲労しているからといって手を抜くつもりはありませんので、そのつもりでいてください」"

[[dialogue]]
speaker = "キリカ"
# 「ふむ……望むところ、ですか。良いでしょう、その姿勢は評価します」
line = "「ふむ……望むところ、ですか。良いでしょう、その姿勢は評価します」"

[[dialogue]]
speaker = "フィオナ"
# 「まぁまぁ、お手柔らかにね」
line = "「まぁまぁ、お手柔らかにね」"

[[dialogue]]
speaker = "フィオナ"
# 「（キリカったら、私が緋宮会長を弟子にしちゃえばって軽く言ったから、少し遊んでる？）」
line = "「（キリカったら、私が緋宮会長を弟子にしちゃえばって軽く言ったから、少し遊んでる？）」"

[[dialogue]]
speaker = "フィオナ"
# 「（緋宮会長もやる気だからいいけど……もう少し様子を見てみようかな）」
line = "「（緋宮会長もやる気だからいいけど……もう少し様子を見てみようかな）」"
