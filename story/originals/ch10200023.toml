[[dialogue]]
speaker = "unk"
# 第３話,ルカルカの人気、急上昇,P
line = "第３話,ルカルカの人気、急上昇,P"

[[dialogue]]
speaker = "unk"
# 例の水着衣装を公開してから、ルカルカチャンネルの登録者数はぐんぐん伸びているらしい。
line = "例の水着衣装を公開してから、ルカルカチャンネルの登録者数はぐんぐん伸びているらしい。"

[[dialogue]]
speaker = "unk"
# そこでお祝いもかねてルルカを誘い、カフェでお茶をすることになった。
line = "そこでお祝いもかねてルルカを誘い、カフェでお茶をすることになった。"

[[dialogue]]
speaker = "ルルカ"
# 「ん～っ♪　ケーキおいしい！　それにお兄ちゃんとのデートも久しぶり～♪」
line = "「ん～っ♪　ケーキおいしい！　それにお兄ちゃんとのデートも久しぶり～♪」"

[[dialogue]]
speaker = "ルルカ"
# 「やっぱりおめでたいことがあった時のケーキは最高だね、お兄ちゃん！」
line = "「やっぱりおめでたいことがあった時のケーキは最高だね、お兄ちゃん！」"

[[dialogue]]
speaker = "ルルカ"
# 「でも本当にいいの、ごちそうになっちゃっても。デートなんだし、あたしも半分出すよ？」
line = "「でも本当にいいの、ごちそうになっちゃっても。デートなんだし、あたしも半分出すよ？」"

[[dialogue]]
speaker = "unk"
# 今日はお祝いだから
line = "今日はお祝いだから"

[[dialogue]]
speaker = "ルルカ"
# 「えへへ～、ありがとう♪　じゃあ今度、お兄ちゃんをお祝いする時はあたしがごちそうするね！」
line = "「えへへ～、ありがとう♪　じゃあ今度、お兄ちゃんをお祝いする時はあたしがごちそうするね！」"

[[dialogue]]
speaker = "ルルカ"
# 「でも本当にびっくり。やっぱり水着って人気が出るんだね～。こんなことならもっと早くにやっておけばよかったかも」
line = "「でも本当にびっくり。やっぱり水着って人気が出るんだね～。こんなことならもっと早くにやっておけばよかったかも」"

[[dialogue]]
speaker = "ルルカ"
# 「登録者数、こんなにぐんぐん伸びるのは──」
line = "「登録者数、こんなにぐんぐん伸びるのは──」"

[[dialogue]]
speaker = "ルルカ"
# 「の、伸びるのは……あの時以来かも……」
line = "「の、伸びるのは……あの時以来かも……」"

[[dialogue]]
speaker = "ルルカ"
# 「水を飲まずに激辛焼きそばチャレンジ。初めてルカルカが『食べてみた』系の動画を上げた……」
line = "「水を飲まずに激辛焼きそばチャレンジ。初めてルカルカが『食べてみた』系の動画を上げた……」"

[[dialogue]]
speaker = "unk"
# あの鼻水とくしゃみがフルコンボの？
line = "あの鼻水とくしゃみがフルコンボの？"

[[dialogue]]
speaker = "ルルカ"
# 「黒歴史だよ！？　あの動画でバズったのは確かだけど、おかげで危うくネタ芸人枠になりかけちゃったんだから……！」
line = "「黒歴史だよ！？　あの動画でバズったのは確かだけど、おかげで危うくネタ芸人枠になりかけちゃったんだから……！」"

[[dialogue]]
speaker = "ルルカ"
# 「いまだに切り抜かれるの、嬉しいけどなんか複雑だし……！」
line = "「いまだに切り抜かれるの、嬉しいけどなんか複雑だし……！」"

[[dialogue]]
speaker = "ルルカ"
# 「でも今回のバズは、水着パワーはあれどちゃんと歌動画が伸びてるもんねっ」
line = "「でも今回のバズは、水着パワーはあれどちゃんと歌動画が伸びてるもんねっ」"

[[dialogue]]
speaker = "ルルカ"
# 「お兄ちゃんにいっぱいアドバイス貰えたし、練習もリゾート結界ですごく積んだし……」
line = "「お兄ちゃんにいっぱいアドバイス貰えたし、練習もリゾート結界ですごく積んだし……」"

[[dialogue]]
speaker = "ルルカ"
# 「ようやく本来目指していたルカルカっぽい伸び方になったんだから、もうあれは過去の話。汐ルカルカはこれから羽ばたくんだよ！」
line = "「ようやく本来目指していたルカルカっぽい伸び方になったんだから、もうあれは過去の話。汐ルカルカはこれから羽ばたくんだよ！」"

[[dialogue]]
speaker = "ルルカ"
# 「もっともっと素敵な新曲を出して、ファンのお兄ちゃんたちに『歌い手Ｖチューバー』として認知してもらわなきゃ……！」
line = "「もっともっと素敵な新曲を出して、ファンのお兄ちゃんたちに『歌い手Ｖチューバー』として認知してもらわなきゃ……！」"

[[dialogue]]
speaker = "unk"
# ……そうだな。これからも頑張ろう
line = "……そうだな。これからも頑張ろう"

[[dialogue]]
speaker = "ルルカ"
# 「……ん？　お兄ちゃん、何だかちょっぴり複雑そうな顔してるね？」
line = "「……ん？　お兄ちゃん、何だかちょっぴり複雑そうな顔してるね？」"

[[dialogue]]
speaker = "ルルカ"
# 「あ、もしかして歌動画、何かまずいところでもあったかな……？」
line = "「あ、もしかして歌動画、何かまずいところでもあったかな……？」"

[[dialogue]]
speaker = "ルルカ"
# 「……歌に不満はないの？　え、だったらどうして？」
line = "「……歌に不満はないの？　え、だったらどうして？」"

[[dialogue]]
speaker = "unk"
# ルルカのファンって男が多いだろ？
line = "ルルカのファンって男が多いだろ？"

[[dialogue]]
speaker = "ルルカ"
# 「うん、そうだね。女性Ｖチューバーはどうしても男性ファンの割合が多くなっちゃうから──って、えっ！？」
line = "「うん、そうだね。女性Ｖチューバーはどうしても男性ファンの割合が多くなっちゃうから──って、えっ！？」"

[[dialogue]]
speaker = "ルルカ"
# 「も、もしかしてー。お兄ちゃん、し、嫉妬してくれちゃってたり……！？」
line = "「も、もしかしてー。お兄ちゃん、し、嫉妬してくれちゃってたり……！？」"

[[dialogue]]
speaker = "unk"
# そりゃするよ。好きな子がモテてたら
line = "そりゃするよ。好きな子がモテてたら"

[[dialogue]]
speaker = "ルルカ"
# 「うぅ～っ……<emoji=heart04>　え、えー、何この気持ち。お兄ちゃんには悪いかもだけど、ちょっぴり嬉しいかも……」
line = "「うぅ～っ……<emoji=heart04>　え、えー、何この気持ち。お兄ちゃんには悪いかもだけど、ちょっぴり嬉しいかも……」"

[[dialogue]]
speaker = "ルルカ"
# 「……って、ご、ごめんね？　真面目な話してる時ににやにやしちゃって」
line = "「……って、ご、ごめんね？　真面目な話してる時ににやにやしちゃって」"

[[dialogue]]
speaker = "ルルカ"
# 「お兄ちゃんに嫉妬されるだなんて考えたこともなかったから、ちょっとびっくりしちゃったの」
line = "「お兄ちゃんに嫉妬されるだなんて考えたこともなかったから、ちょっとびっくりしちゃったの」"

[[dialogue]]
speaker = "ルルカ"
# 「えーっと……今なら誰も見てない、よね……？」
line = "「えーっと……今なら誰も見てない、よね……？」"

[[dialogue]]
speaker = "ルルカ"
# 「ん──ちゅっ<emoji=heart04>」
line = "「ん──ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
# 「えへ。あたしにはお兄ちゃんもお姉ちゃんもいっぱいいるけど、キスしたいって思うのは、目の前のお兄ちゃんだけだよ？」
line = "「えへ。あたしにはお兄ちゃんもお姉ちゃんもいっぱいいるけど、キスしたいって思うのは、目の前のお兄ちゃんだけだよ？」"

[[dialogue]]
speaker = "ルルカ"
# 「だから安心してね。てゆーか、あたしの方から告白したんだから、そんなこと心配しなくてもいいのに」
line = "「だから安心してね。てゆーか、あたしの方から告白したんだから、そんなこと心配しなくてもいいのに」"

[[dialogue]]
speaker = "unk"
# ……嫉妬しちゃってごめんな
line = "……嫉妬しちゃってごめんな"

[[dialogue]]
speaker = "ルルカ"
# 「ううん。優しいお兄ちゃんも好きだけど、そうやって独占欲を出してくれるところも新鮮で嬉しかったよ～♪」
line = "「ううん。優しいお兄ちゃんも好きだけど、そうやって独占欲を出してくれるところも新鮮で嬉しかったよ～♪」"

[[dialogue]]
speaker = "ルルカ"
# 「それに嫉妬してたの、あたしだけじゃなかったんだ～ってわかったし」
line = "「それに嫉妬してたの、あたしだけじゃなかったんだ～ってわかったし」"

[[dialogue]]
speaker = "ルルカ"
# 「えー……！　もしかして気づいてないの！？　星徒会のみんな、美人さんばっかりでしょっ」
line = "「えー……！　もしかして気づいてないの！？　星徒会のみんな、美人さんばっかりでしょっ」"

[[dialogue]]
speaker = "ルルカ"
# 「嫉妬しちゃうのはお兄ちゃんだけじゃないんですよー、だ」
line = "「嫉妬しちゃうのはお兄ちゃんだけじゃないんですよー、だ」"

[[dialogue]]
speaker = "unk"
# ここ最近、ルカルカの登録者数がすごく伸びて、男性フォロワーのコメントを見るたびにもやもやしていた気持ちがなくなっていった。
line = "ここ最近、ルカルカの登録者数がすごく伸びて、男性フォロワーのコメントを見るたびにもやもやしていた気持ちがなくなっていった。"

[[dialogue]]
speaker = "unk"
# そうか。ルルカも俺と同じ気持ちだったんだな──
line = "そうか。ルルカも俺と同じ気持ちだったんだな──"

[[dialogue]]
speaker = "アナ"
# 「会長。それにルルカさん、こんにちは」
line = "「会長。それにルルカさん、こんにちは」"

[[dialogue]]
speaker = "ルルカ"
# 「あ、アナちゃん。やっほー。カフェに来たってことは……」
line = "「あ、アナちゃん。やっほー。カフェに来たってことは……」"

[[dialogue]]
speaker = "アナ"
# 「はい。今お２人が食べられている和風ケーキセットが目的です。九浄家メイド隊の方々が粋を凝らして作った一品だそうで、楽しみです」
line = "「はい。今お２人が食べられている和風ケーキセットが目的です。九浄家メイド隊の方々が粋を凝らして作った一品だそうで、楽しみです」"

[[dialogue]]
speaker = "ルルカ"
# 「すっごくおいしいよ～♪　コーヒーよりは紅茶が合うかな？」
line = "「すっごくおいしいよ～♪　コーヒーよりは紅茶が合うかな？」"

[[dialogue]]
speaker = "アナ"
# 「そうですか。ありがとうございます」
line = "「そうですか。ありがとうございます」"

[[dialogue]]
speaker = "アナ"
# 「あ……ところでなんですが、お２人とも」
line = "「あ……ところでなんですが、お２人とも」"

[[dialogue]]
speaker = "ルルカ"
# 「なあに？」
line = "「なあに？」"

[[dialogue]]
speaker = "アナ"
# 「公共の場でイチャイチャするのは慎んだ方がいいと思います」
line = "「公共の場でイチャイチャするのは慎んだ方がいいと思います」"

[[dialogue]]
speaker = "ルルカ"
# 「え゛っ！？」
line = "「え゛っ！？」"

[[dialogue]]
speaker = "アナ"
# 「ルルカさん、周りを見渡していたようですが確認が甘いです。普通に私からは見えていました」
line = "「ルルカさん、周りを見渡していたようですが確認が甘いです。普通に私からは見えていました」"

[[dialogue]]
speaker = "アナ"
# 「まぁお２人は恋人同士なので、ある程度は良いと思いますが──」
line = "「まぁお２人は恋人同士なので、ある程度は良いと思いますが──」"

[[dialogue]]
speaker = "ルルカ"
# 「あ、あわわわっ──はずかし～っ！」
line = "「あ、あわわわっ──はずかし～っ！」"

[[dialogue]]
speaker = "アナ"
# 「節度を持って交際を──あ、行ってしまいました」
line = "「節度を持って交際を──あ、行ってしまいました」"

[[dialogue]]
speaker = "アナ"
# 「会長。すみません、デートの邪魔をしてしまったようです」
line = "「会長。すみません、デートの邪魔をしてしまったようです」"

[[dialogue]]
speaker = "unk"
# 謝るアナにフォローを入れてから、俺はルルカを追いかけるのだった……
line = "謝るアナにフォローを入れてから、俺はルルカを追いかけるのだった……"
