[[dialogue]]
speaker = "unk"
# 第６話,ジグが見た可能性,B
line = "第６話,ジグが見た可能性,B"

[[dialogue]]
speaker = "梨緒"
# 「くっ──！？」
line = "「くっ──！？」"

[[dialogue]]
speaker = "unk"
# ビルすら両断するジグの斬撃をギリギリで躱し、切り裂かれた金髪が焼け焦げる。
line = "ビルすら両断するジグの斬撃をギリギリで躱し、切り裂かれた金髪が焼け焦げる。"

[[dialogue]]
speaker = "ジグ"
# 「今のを避けたんだ。私の眼には君が真っ二つになる可能性が見えていたんだが……やっぱりノルンの力は相性が悪いようだね」
line = "「今のを避けたんだ。私の眼には君が真っ二つになる可能性が見えていたんだが……やっぱりノルンの力は相性が悪いようだね」"

[[dialogue]]
speaker = "梨緒"
# （ジグの言う通り、ノルンの力がなければ私は死んでいた。だがこのままでは……）
line = "（ジグの言う通り、ノルンの力がなければ私は死んでいた。だがこのままでは……）"

[[dialogue]]
speaker = "unk"
# 梨緒はかろうじて直撃を避けているが、攻める余裕などなく、防戦一方を強いられていた。
line = "梨緒はかろうじて直撃を避けているが、攻める余裕などなく、防戦一方を強いられていた。"

[[dialogue]]
speaker = "unk"
# ジグが攻撃を仕掛ける度に剣尖が掠め、逆巻く炎が梨緒の肌を焼く。
line = "ジグが攻撃を仕掛ける度に剣尖が掠め、逆巻く炎が梨緒の肌を焼く。"

[[dialogue]]
speaker = "ジグ"
# 「でもだんだん動きが鈍くなってきたよ？　私を救ってくれるんじゃなかったのかい？」
line = "「でもだんだん動きが鈍くなってきたよ？　私を救ってくれるんじゃなかったのかい？」"

[[dialogue]]
speaker = "unk"
# ジグが無造作に剣を振るうと、炎の斬撃が飛ぶ。
line = "ジグが無造作に剣を振るうと、炎の斬撃が飛ぶ。"

[[dialogue]]
speaker = "梨緒"
# 「うぁっ……！？」
line = "「うぁっ……！？」"

[[dialogue]]
speaker = "梨緒"
# （くっ……因果の糸を、読み切れない……）
line = "（くっ……因果の糸を、読み切れない……）"

[[dialogue]]
speaker = "梨緒"
# （それでも──！）
line = "（それでも──！）"

[[dialogue]]
speaker = "unk"
# ジグが剣を振るった後のわずかな隙を、ノルンの因果の糸が捉えた。
line = "ジグが剣を振るった後のわずかな隙を、ノルンの因果の糸が捉えた。"

[[dialogue]]
speaker = "unk"
# 狙うのはその瞬間。炎に呑まれながらも、ジグの剣めがけて矢を放つ。
line = "狙うのはその瞬間。炎に呑まれながらも、ジグの剣めがけて矢を放つ。"

[[dialogue]]
speaker = "ジグ"
# 「──！」
line = "「──！」"

[[dialogue]]
speaker = "unk"
# 思惑通り剣に矢が命中し、衝撃で腕が揺れた。
line = "思惑通り剣に矢が命中し、衝撃で腕が揺れた。"

[[dialogue]]
speaker = "unk"
# 剣が使えない無防備な一瞬、かすかに見えたチャンスを逃がさず撃ち抜く！
line = "剣が使えない無防備な一瞬、かすかに見えたチャンスを逃がさず撃ち抜く！"

[[dialogue]]
speaker = "梨緒"
# 「ライトニングテンペスト！！」
line = "「ライトニングテンペスト！！」"

[[dialogue]]
speaker = "unk"
# 稲妻をバチバチと迸らせながら、雷の矢がジグに迫る。
line = "稲妻をバチバチと迸らせながら、雷の矢がジグに迫る。"

[[dialogue]]
speaker = "unk"
# ──しかし目の前に飛来した矢を、ジグは手で掴んで止めてみせた。
line = "──しかし目の前に飛来した矢を、ジグは手で掴んで止めてみせた。"

[[dialogue]]
speaker = "ジグ"
# 「残念でした」
line = "「残念でした」"

[[dialogue]]
speaker = "梨緒"
# 「なっ──！？」
line = "「なっ──！？」"

[[dialogue]]
speaker = "ジグ"
# 「見えている……と言っただろう？」
line = "「見えている……と言っただろう？」"

[[dialogue]]
speaker = "unk"
# ジグの剣に炎が宿り、十数メートルの巨大な劫火の刃が生まれる。
line = "ジグの剣に炎が宿り、十数メートルの巨大な劫火の刃が生まれる。"

[[dialogue]]
speaker = "unk"
# そして剣を真っ直ぐ振り下ろし──
line = "そして剣を真っ直ぐ振り下ろし──"

[[dialogue]]
speaker = "ジグ"
# 「ブラントアングリフ」
line = "「ブラントアングリフ」"

[[dialogue]]
speaker = "梨緒"
# 「うああああっ！！？」
line = "「うああああっ！！？」"

[[dialogue]]
speaker = "unk"
# ジグの攻撃をまともに受け、梨緒が地面に叩き落とされた。
line = "ジグの攻撃をまともに受け、梨緒が地面に叩き落とされた。"

[[dialogue]]
speaker = "梨緒"
# 「ぅっ……はぁ……はぁっ……！」
line = "「ぅっ……はぁ……はぁっ……！」"

[[dialogue]]
speaker = "ジグ"
# 「まだ生きてるんだ。さすがアガサ」
line = "「まだ生きてるんだ。さすがアガサ」"

[[dialogue]]
speaker = "梨緒"
# 「負けられ、ない……」
line = "「負けられ、ない……」"

[[dialogue]]
speaker = "unk"
# 神殿の床に這いつくばりながらも、拳を握る梨緒。
line = "神殿の床に這いつくばりながらも、拳を握る梨緒。"

[[dialogue]]
speaker = "unk"
# 全身に走る激痛を堪えながら、立ち上がろうと心を奮わせる。
line = "全身に走る激痛を堪えながら、立ち上がろうと心を奮わせる。"

[[dialogue]]
speaker = "梨緒"
# 「あの時、私はジグを見捨てた……だから今度こそ君を、救わなければいけない………」
line = "「あの時、私はジグを見捨てた……だから今度こそ君を、救わなければいけない………」"

[[dialogue]]
speaker = "梨緒"
# 「私は、諦めるわけには……いかないんだ……！」
line = "「私は、諦めるわけには……いかないんだ……！」"

[[dialogue]]
speaker = "ジグ"
# 「はぁ……アガサは変わらないね。諦めが悪くて、強がることばかり得意で」
line = "「はぁ……アガサは変わらないね。諦めが悪くて、強がることばかり得意で」"

[[dialogue]]
speaker = "ジグ"
# 「君はいつもそうだ。負けても負けても、諦めずに立ち上がる。そういうところ、健気だと思うよ」
line = "「君はいつもそうだ。負けても負けても、諦めずに立ち上がる。そういうところ、健気だと思うよ」"

[[dialogue]]
speaker = "ジグ"
# 「でも私だって頑張っていたんだよ？」
line = "「でも私だって頑張っていたんだよ？」"

[[dialogue]]
speaker = "梨緒"
# 「なに……？」
line = "「なに……？」"

[[dialogue]]
speaker = "梨緒"
# （私の記憶の中のジグはいつも飄々としていた）
line = "（私の記憶の中のジグはいつも飄々としていた）"

[[dialogue]]
speaker = "梨緒"
# （努力しているところや、敵に苦戦するところなんて私には──いや誰にも見せたことはないはず）
line = "（努力しているところや、敵に苦戦するところなんて私には──いや誰にも見せたことはないはず）"

[[dialogue]]
speaker = "梨緒"
# （そんなジグが……『頑張っていた』……？）
line = "（そんなジグが……『頑張っていた』……？）"

[[dialogue]]
speaker = "unk"
# 梨緒の知るジグなら言うであろうはずのない言葉──それもリクリエの使徒となった今になって口にすることに、違和感を覚えた。
line = "梨緒の知るジグなら言うであろうはずのない言葉──それもリクリエの使徒となった今になって口にすることに、違和感を覚えた。"

[[dialogue]]
speaker = "ジグ"
# 「この神殿は外敵の侵入を防ぐため、様々な仕掛けが備わっている」
line = "「この神殿は外敵の侵入を防ぐため、様々な仕掛けが備わっている」"

[[dialogue]]
speaker = "ジグ"
# 「これはさっき拾ってきたんだけど……私もその仕掛けを利用させてもらおうかな」
line = "「これはさっき拾ってきたんだけど……私もその仕掛けを利用させてもらおうかな」"

[[dialogue]]
speaker = "unk"
# ジグの手の中には、過去の記憶を見せてきたガーディアンの残骸があった。
line = "ジグの手の中には、過去の記憶を見せてきたガーディアンの残骸があった。"

[[dialogue]]
speaker = "unk"
# そして紫の瘴気がガーディアンへと吸い込まれていく。
line = "そして紫の瘴気がガーディアンへと吸い込まれていく。"

[[dialogue]]
speaker = "梨緒"
# 「何をするつもりだ……！？」
line = "「何をするつもりだ……！？」"

[[dialogue]]
speaker = "ジグ"
# 「それは体験してみてのお楽しみ……さ♪」
line = "「それは体験してみてのお楽しみ……さ♪」"

[[dialogue]]
speaker = "ジグ"
# （ああ……この可能性もダメか）
line = "（ああ……この可能性もダメか）"

[[dialogue]]
speaker = "ジグ"
# （大地から文明が消え去り、世界が作り変えられていく光景……おそらくリクリエの果てにあるものがこれなのだろう）
line = "（大地から文明が消え去り、世界が作り変えられていく光景……おそらくリクリエの果てにあるものがこれなのだろう）"

[[dialogue]]
speaker = "ジグ"
# （私の『天機の星眼』は幾通りもの可能性を見通す）
line = "（私の『天機の星眼』は幾通りもの可能性を見通す）"

[[dialogue]]
speaker = "ジグ"
# （……３つに分かれる道を見た時、左に進んだ可能性と、真ん中に進んだ可能性、右に進んだ可能性がそれぞれ見える）
line = "（……３つに分かれる道を見た時、左に進んだ可能性と、真ん中に進んだ可能性、右に進んだ可能性がそれぞれ見える）"

[[dialogue]]
speaker = "ジグ"
# （左の道の先が崖になっていて、真ん中で土砂崩れが起き、右が安全な道だとわかれば、右の道を選ぶことができる）
line = "（左の道の先が崖になっていて、真ん中で土砂崩れが起き、右が安全な道だとわかれば、右の道を選ぶことができる）"

[[dialogue]]
speaker = "ジグ"
# （『<ruby=みらい>可能性</ruby>』の中から『最善』を選ぶことができる。それが私の力だ）
line = "（『<ruby>可能性<rt>みらい</rt></ruby>』の中から『最善』を選ぶことができる。それが私の力だ）"

[[dialogue]]
speaker = "ジグ"
# （しかしこの眼が見た可能性は、全て世界の破滅に繋がっていた）
line = "（しかしこの眼が見た可能性は、全て世界の破滅に繋がっていた）"

[[dialogue]]
speaker = "ジグ"
# （初めて<b>その可能性</b>を見たのは、星騎士となるべく、新星学園に入学してからのことだった）
line = "（初めて<b>その可能性</b>を見たのは、星騎士となるべく、新星学園に入学してからのことだった）"

[[dialogue]]
speaker = "ジグ"
# （モンスターやアステラをこの眼で見た時、<b>あの</b>破滅の光景が脳裏に浮かぶ）
line = "（モンスターやアステラをこの眼で見た時、<b>あの</b>破滅の光景が脳裏に浮かぶ）"

[[dialogue]]
speaker = "ジグ"
# （幻でも錯覚でもない。私がこの眼で見た可能性は実際に起こりうるもの）
line = "（幻でも錯覚でもない。私がこの眼で見た可能性は実際に起こりうるもの）"

[[dialogue]]
speaker = "ジグ"
# （そして選ばれた『<ruby=みらい>可能性</ruby>』は、必ず現実になる）
line = "（そして選ばれた『<ruby>可能性<rt>みらい</rt></ruby>』は、必ず現実になる）"

[[dialogue]]
speaker = "ジグ"
# （なのに全ての『<ruby=みらい>可能性</ruby>』が破滅に繋がっているのなら、世界は滅ぶしかないじゃないか）
line = "（なのに全ての『<ruby>可能性<rt>みらい</rt></ruby>』が破滅に繋がっているのなら、世界は滅ぶしかないじゃないか）"

[[dialogue]]
speaker = "ジグ"
# （私は星徒会長になり、先頭に立って数多くのモンスターを倒した）
line = "（私は星徒会長になり、先頭に立って数多くのモンスターを倒した）"

[[dialogue]]
speaker = "ジグ"
# （星騎士の育成にも力を入れた。流星市国外の人材の確保も積極的に行った）
line = "（星騎士の育成にも力を入れた。流星市国外の人材の確保も積極的に行った）"

[[dialogue]]
speaker = "ジグ"
# （市民の被害を度外視し、アステラの駆逐を優先した可能性も見た。それでもダメだった）
line = "（市民の被害を度外視し、アステラの駆逐を優先した可能性も見た。それでもダメだった）"

[[dialogue]]
speaker = "ジグ"
# （星騎士たちを兵器として使い潰して戦う可能性もあった。だけど結局、破滅を止めることはできなかった）
line = "（星騎士たちを兵器として使い潰して戦う可能性もあった。だけど結局、破滅を止めることはできなかった）"

[[dialogue]]
speaker = "ジグ"
# （幾千、幾万もの可能性を見た）
line = "（幾千、幾万もの可能性を見た）"

[[dialogue]]
speaker = "ジグ"
# （けれど同じ数の破滅が見えただけだった）
line = "（けれど同じ数の破滅が見えただけだった）"

[[dialogue]]
speaker = "ジグ"
# （いつからだろう。どれだけ濃いコーヒーを飲んでも味がしなくなったのは）
line = "（いつからだろう。どれだけ濃いコーヒーを飲んでも味がしなくなったのは）"

[[dialogue]]
speaker = "梨緒"
# 「また、救えなかった……！　私は、弱い……っ」
line = "「また、救えなかった……！　私は、弱い……っ」"

[[dialogue]]
speaker = "ジグ"
# （また泣いているのかい、アガサ）
line = "（また泣いているのかい、アガサ）"

[[dialogue]]
speaker = "ジグ"
# （自分の弱さに涙するなんて、悠長なことだ。だけどアガサが泣くのは、まだ諦めていないからかもしれないね）
line = "（自分の弱さに涙するなんて、悠長なことだ。だけどアガサが泣くのは、まだ諦めていないからかもしれないね）"

[[dialogue]]
speaker = "ジグ"
# 「やぁ、アガサ。コーヒー飲むかい？」
line = "「やぁ、アガサ。コーヒー飲むかい？」"

[[dialogue]]
speaker = "梨緒"
# 「──！　見るな……」
line = "「──！　見るな……」"

[[dialogue]]
speaker = "ジグ"
# 「君が泣き虫なのはとっくに知ってるよ。今さらじゃないか」
line = "「君が泣き虫なのはとっくに知ってるよ。今さらじゃないか」"

[[dialogue]]
speaker = "梨緒"
# 「うる……さい……」
line = "「うる……さい……」"

[[dialogue]]
speaker = "梨緒"
# 「だいたい、君は今……」
line = "「だいたい、君は今……」"

[[dialogue]]
speaker = "ジグ"
# 「出撃中のはずだって？　今日は想定よりモンスターが少なくてね、さくっと終わらせて帰ってきたよ」
line = "「出撃中のはずだって？　今日は想定よりモンスターが少なくてね、さくっと終わらせて帰ってきたよ」"

[[dialogue]]
speaker = "ジグ"
# 「いやぁ、最近出撃ばかりだったから、ようやく少し休めるね」
line = "「いやぁ、最近出撃ばかりだったから、ようやく少し休めるね」"

[[dialogue]]
speaker = "ジグ"
# （明日にはモンスターの大群が現れることは見えているんだけど……でも今は言えないか）
line = "（明日にはモンスターの大群が現れることは見えているんだけど……でも今は言えないか）"

[[dialogue]]
speaker = "梨緒"
# 「……流星市国以外にもモンスターが現れるのが当たり前になり、各地で大きな被害が出ている。関東だけでもいくつもの都市が壊滅した」
line = "「……流星市国以外にもモンスターが現れるのが当たり前になり、各地で大きな被害が出ている。関東だけでもいくつもの都市が壊滅した」"

[[dialogue]]
speaker = "梨緒"
# 「人類の生存圏は刻一刻と狭まり、今もどこかで犠牲が出ている……」
line = "「人類の生存圏は刻一刻と狭まり、今もどこかで犠牲が出ている……」"

[[dialogue]]
speaker = "ジグ"
# 「ああ、そうだね。その通りだ」
line = "「ああ、そうだね。その通りだ」"

[[dialogue]]
speaker = "ジグ"
# 「でも、勝つよ」
line = "「でも、勝つよ」"

[[dialogue]]
speaker = "ジグ"
# （勝てたらいいんだけどね）
line = "（勝てたらいいんだけどね）"

[[dialogue]]
speaker = "梨緒"
# 「だけど……！　このままでは世界は……！」
line = "「だけど……！　このままでは世界は……！」"

[[dialogue]]
speaker = "ジグ"
# 「大丈夫、何とかなるさ」
line = "「大丈夫、何とかなるさ」"

[[dialogue]]
speaker = "ジグ"
# 「根拠もなく気休めを言っているわけじゃないよ」
line = "「根拠もなく気休めを言っているわけじゃないよ」"

[[dialogue]]
speaker = "ジグ"
# 「３０００年前、以前のリクリエの時だって世界は滅亡の間際まで追い詰められた」
line = "「３０００年前、以前のリクリエの時だって世界は滅亡の間際まで追い詰められた」"

[[dialogue]]
speaker = "ジグ"
# （なんて、３０００年前がどうだったかは知らないけれど。もしかしたらすでに、３０００年前より状況は悪くなっているかもしれない）
line = "（なんて、３０００年前がどうだったかは知らないけれど。もしかしたらすでに、３０００年前より状況は悪くなっているかもしれない）"

[[dialogue]]
speaker = "ジグ"
# 「だけど世界は破滅に打ち勝った。だから今がある」
line = "「だけど世界は破滅に打ち勝った。だから今がある」"

[[dialogue]]
speaker = "ジグ"
# 「可能性は残されている。私はそう思うよ」
line = "「可能性は残されている。私はそう思うよ」"

[[dialogue]]
speaker = "梨緒"
# 「ジグ……」
line = "「ジグ……」"

[[dialogue]]
speaker = "ジグ"
# （可能性は残されている……か。我ながら口がよく回る）
line = "（可能性は残されている……か。我ながら口がよく回る）"

[[dialogue]]
speaker = "ジグ"
# （そんな可能性がないことなんて、私が一番よく知っているというのに。どこかにあるなら私が見せてほしいくらいだ）
line = "（そんな可能性がないことなんて、私が一番よく知っているというのに。どこかにあるなら私が見せてほしいくらいだ）"

[[dialogue]]
speaker = "ジグ"
# （騙してごめん、アガサ）
line = "（騙してごめん、アガサ）"

[[dialogue]]
speaker = "ジグ"
# （私は新星学園の星徒会長。つまり世界最強の星騎士だ）
line = "（私は新星学園の星徒会長。つまり世界最強の星騎士だ）"

[[dialogue]]
speaker = "ジグ"
# （もし私が『世界を救える可能性はない』と言ってしまえば、星騎士も市民も絶望してしまうだろう）
line = "（もし私が『世界を救える可能性はない』と言ってしまえば、星騎士も市民も絶望してしまうだろう）"

[[dialogue]]
speaker = "ジグ"
# （実際、その『<ruby=みらい>可能性</ruby>』も見てみた。結果は──やはり凄惨なものだった）
line = "（実際、その『<ruby>可能性<rt>みらい</rt></ruby>』も見てみた。結果は──やはり凄惨なものだった）"

[[dialogue]]
speaker = "ジグ"
# （私は諦めないふりをして、偽物の希望を示しながら、ただ奇跡を待った。破滅を覆す奇跡を）
line = "（私は諦めないふりをして、偽物の希望を示しながら、ただ奇跡を待った。破滅を覆す奇跡を）"

[[dialogue]]
speaker = "ジグ"
# （もし私が見た可能性を覆すことができるとしたら、それは奇跡に他ならない）
line = "（もし私が見た可能性を覆すことができるとしたら、それは奇跡に他ならない）"

[[dialogue]]
speaker = "ジグ"
# （だけど奇跡は起きなかった）
line = "（だけど奇跡は起きなかった）"

[[dialogue]]
speaker = "ジグ"
# （無辜の人々が死に、星騎士が倒れ、街が滅びて……私が見た『<ruby=みらい>可能性</ruby>』が刻一刻と近づいてきた）
line = "（無辜の人々が死に、星騎士が倒れ、街が滅びて……私が見た『<ruby>可能性<rt>みらい</rt></ruby>』が刻一刻と近づいてきた）"

[[dialogue]]
speaker = "ジグ"
# （私はいつしか奇跡を願うことすら忘れ、全てが早く終わることだけを願うようになっていた）
line = "（私はいつしか奇跡を願うことすら忘れ、全てが早く終わることだけを願うようになっていた）"

[[dialogue]]
speaker = "ジグ"
# （そしてエリシアもフィオナも死に、終焉が訪れた）
line = "（そしてエリシアもフィオナも死に、終焉が訪れた）"

[[dialogue]]
speaker = "梨緒"
# 「フィオ……ナ……あぁ……うぅ……」
line = "「フィオ……ナ……あぁ……うぅ……」"

[[dialogue]]
speaker = "ジグ"
# 「やぁ生きてるかい、アガサ」
line = "「やぁ生きてるかい、アガサ」"

[[dialogue]]
speaker = "梨緒"
# 「ジグ！？　まだ生きて……！？」
line = "「ジグ！？　まだ生きて……！？」"

[[dialogue]]
speaker = "ジグ"
# 「すまない、少し気を失っていたようだ。だけど私はまだ戦えるよ」
line = "「すまない、少し気を失っていたようだ。だけど私はまだ戦えるよ」"

[[dialogue]]
speaker = "ジグ"
# （出血はひどいし、死にかけなんだけど。世界の終焉に立ち会ってしまうのは、幸運なのか不運なのか……）
line = "（出血はひどいし、死にかけなんだけど。世界の終焉に立ち会ってしまうのは、幸運なのか不運なのか……）"

[[dialogue]]
speaker = "梨緒"
# 「私も……まだ、諦めていない……！　この世界を、守るんだ……！」
line = "「私も……まだ、諦めていない……！　この世界を、守るんだ……！」"

[[dialogue]]
speaker = "ジグ"
# 「ああ、それでこそアガサだ。倒れていったみんなの分まで頑張ろう」
line = "「ああ、それでこそアガサだ。倒れていったみんなの分まで頑張ろう」"

[[dialogue]]
speaker = "ジグ"
# （アガサってば、私のセリフを言葉通りに受け取って、まだ諦めてない顔をしてる）
line = "（アガサってば、私のセリフを言葉通りに受け取って、まだ諦めてない顔をしてる）"

[[dialogue]]
speaker = "ジグ"
# （この期に及んでというか、さすがアガサというか……諦めないまま死ぬことができるのは、それはそれで幸せなことかもしれない）
line = "（この期に及んでというか、さすがアガサというか……諦めないまま死ぬことができるのは、それはそれで幸せなことかもしれない）"

[[dialogue]]
speaker = "ジグ"
# （ああ、あの手が世界を滅ぼす）
line = "（ああ、あの手が世界を滅ぼす）"

[[dialogue]]
speaker = "ジグ"
# （私にはこの『<ruby=みらい>可能性</ruby>』が見えていたのに、それを現実にしてしまった）
line = "（私にはこの『<ruby>可能性<rt>みらい</rt></ruby>』が見えていたのに、それを現実にしてしまった）"

[[dialogue]]
speaker = "ジグ"
# （私は最善を尽くしたつもりで、みんなを滅びに導いただけだったのかもしれない）
line = "（私は最善を尽くしたつもりで、みんなを滅びに導いただけだったのかもしれない）"

[[dialogue]]
speaker = "ジグ"
# （ごめんね、アガサ。私がもっと強ければ、世界を救えたのに──）
line = "（ごめんね、アガサ。私がもっと強ければ、世界を救えたのに──）"

[[dialogue]]
speaker = "梨緒"
# 「あ……あああああっ……！！」
line = "「あ……あああああっ……！！」"

[[dialogue]]
speaker = "梨緒"
# 「うああ……あっ……ああぁああぁあぁっ！！」
line = "「うああ……あっ……ああぁああぁあぁっ！！」"

[[dialogue]]
speaker = "梨緒"
# 「うぁ……ぅっ……うぅぅ……ジグは……ジグは……」
line = "「うぁ……ぅっ……うぅぅ……ジグは……ジグは……」"

[[dialogue]]
speaker = "梨緒"
# 「私は……何も知らなくて……っ……うああっ……！」
line = "「私は……何も知らなくて……っ……うああっ……！」"

[[dialogue]]
speaker = "unk"
# 勘違いしていた。
line = "勘違いしていた。"

[[dialogue]]
speaker = "unk"
# ジグは誰よりも強くて、どんなに危機的な状況でも、希望を失わずに戦っているのだと。
line = "ジグは誰よりも強くて、どんなに危機的な状況でも、希望を失わずに戦っているのだと。"

[[dialogue]]
speaker = "unk"
# だけど違った。
line = "だけど違った。"

[[dialogue]]
speaker = "unk"
# ジグは絶望していた。
line = "ジグは絶望していた。"

[[dialogue]]
speaker = "unk"
# 泣いている梨緒に寄り添ってくれている間も、たった１人で、暗い闇の中にいた。
line = "泣いている梨緒に寄り添ってくれている間も、たった１人で、暗い闇の中にいた。"

[[dialogue]]
speaker = "ジグ"
# 「いやぁ、レナーテという星騎士はもう他人だと思っていたけど、赤裸々に記憶を見られるのは気恥ずかしいね」
line = "「いやぁ、レナーテという星騎士はもう他人だと思っていたけど、赤裸々に記憶を見られるのは気恥ずかしいね」"

[[dialogue]]
speaker = "unk"
# 場違いな照れ笑いを浮かべるジグ。
line = "場違いな照れ笑いを浮かべるジグ。"

[[dialogue]]
speaker = "unk"
# しかし口元の笑みを消すと、梨緒に向かってゆっくり歩いてくる。
line = "しかし口元の笑みを消すと、梨緒に向かってゆっくり歩いてくる。"

[[dialogue]]
speaker = "ジグ"
# 「アガサ」
line = "「アガサ」"

[[dialogue]]
speaker = "ジグ"
# 「私は君のことが嫌いだった」
line = "「私は君のことが嫌いだった」"

[[dialogue]]
speaker = "ジグ"
# 「私より弱いくせに諦めが悪くて、本当に不快だった」
line = "「私より弱いくせに諦めが悪くて、本当に不快だった」"

[[dialogue]]
speaker = "ジグ"
# 「世界を救えもしないのに、諦めないところだけは一人前で滑稽だったよ」
line = "「世界を救えもしないのに、諦めないところだけは一人前で滑稽だったよ」"

[[dialogue]]
speaker = "梨緒"
# 「ジグ……」
line = "「ジグ……」"

[[dialogue]]
speaker = "梨緒"
# 「私は……君のおかげで、戦うことが、できて……」
line = "「私は……君のおかげで、戦うことが、できて……」"

[[dialogue]]
speaker = "梨緒"
# 「でも私は……私はぁ……っ」
line = "「でも私は……私はぁ……っ」"

[[dialogue]]
speaker = "ジグ"
# 「ああ、何の役にも立たなかった。君は何もできなかった」
line = "「ああ、何の役にも立たなかった。君は何もできなかった」"

[[dialogue]]
speaker = "梨緒"
# 「うぅっ……うぅぅっ……」
line = "「うぅっ……うぅぅっ……」"

[[dialogue]]
speaker = "unk"
# 星徒会の仲間としてジグの近くにいたはずなのに、その絶望に気付くことができなかった。
line = "星徒会の仲間としてジグの近くにいたはずなのに、その絶望に気付くことができなかった。"

[[dialogue]]
speaker = "unk"
# それどころか、ずっとジグを頼ってばかりいた。
line = "それどころか、ずっとジグを頼ってばかりいた。"

[[dialogue]]
speaker = "unk"
# ジグの絶望の深さと、自分の無力に打ちひしがれる。
line = "ジグの絶望の深さと、自分の無力に打ちひしがれる。"

[[dialogue]]
speaker = "ジグ"
# 「でもいいんだよ」
line = "「でもいいんだよ」"

[[dialogue]]
speaker = "梨緒"
# 「え──？」
line = "「え──？」"

[[dialogue]]
speaker = "ジグ"
# 「私たちは負けた。ベガは滅びた」
line = "「私たちは負けた。ベガは滅びた」"

[[dialogue]]
speaker = "ジグ"
# 「それはもういい。だから──」
line = "「それはもういい。だから──」"

[[dialogue]]
speaker = "ジグ"
# 「一緒に世界をやり直そう、アガサ」
line = "「一緒に世界をやり直そう、アガサ」"
