[[dialogue]]
speaker = "unk"
# 第４話,ネビュラ総帥が認めてやろう,P
line = "第４話,ネビュラ総帥が認めてやろう,P"

[[dialogue]]
speaker = "クラウディア"
# 「というわけで……結局、こってり叱られてしまったぞ」
line = "「というわけで……結局、こってり叱られてしまったぞ」"

[[dialogue]]
speaker = "クラウディア"
# 「おい、聞いておるのか。お主のせいなのだぞ」
line = "「おい、聞いておるのか。お主のせいなのだぞ」"

[[dialogue]]
speaker = "クラウディア"
# 「何って──だから、この前の件だ。余のお忍び旅行がセドナに見つかってしまっただろう」
line = "「何って──だから、この前の件だ。余のお忍び旅行がセドナに見つかってしまっただろう」"

[[dialogue]]
speaker = "クラウディア"
# 「お主が余を家に『おもちかえり』してくれたおかげで──しばらく外出が禁じられてしまった。やれやれだ」
line = "「お主が余を家に『おもちかえり』してくれたおかげで──しばらく外出が禁じられてしまった。やれやれだ」"

[[dialogue]]
speaker = "unk"
# クラウディアが大事にされてる証拠だよ
line = "クラウディアが大事にされてる証拠だよ"

[[dialogue]]
speaker = "unk"
# 自分が言い出したんでしょ
line = "自分が言い出したんでしょ"

[[dialogue]]
speaker = "クラウディア"
# 「ま、余は唯一無二の存在だからの。手厚く保護されるのも当然ではあるのだが」
line = "「ま、余は唯一無二の存在だからの。手厚く保護されるのも当然ではあるのだが」"

[[dialogue]]
speaker = "クラウディア"
# 「おかげでしばし暇を持て余していてのう──だが、余は気づいたのだ」
line = "「おかげでしばし暇を持て余していてのう──だが、余は気づいたのだ」"

[[dialogue]]
speaker = "クラウディア"
# 「出かけると怒られるのなら、こうしてお主をここに呼べばよい！　余は偉いから、誰にも咎められることはない！」
line = "「出かけると怒られるのなら、こうしてお主をここに呼べばよい！　余は偉いから、誰にも咎められることはない！」"

[[dialogue]]
speaker = "unk"
# クラウディア様の仰せのままに
line = "クラウディア様の仰せのままに"

[[dialogue]]
speaker = "unk"
# 別にいいけど
line = "別にいいけど"

[[dialogue]]
speaker = "クラウディア"
# 「うむ。お主を呼び出したのも、前回の話の続きだ」
line = "「うむ。お主を呼び出したのも、前回の話の続きだ」"

[[dialogue]]
speaker = "クラウディア"
# 「やはりな、胸をもみもみしたところで大きくなるわけではないとわかった。まあ、なんとなく勘づいてはおったが」
line = "「やはりな、胸をもみもみしたところで大きくなるわけではないとわかった。まあ、なんとなく勘づいてはおったが」"

[[dialogue]]
speaker = "クラウディア"
# 「それよりだ。どうも……人間界でレディらしくあるためには、やはり男との付き合いが重要だという。これは正しいか？」
line = "「それよりだ。どうも……人間界でレディらしくあるためには、やはり男との付き合いが重要だという。これは正しいか？」"

[[dialogue]]
speaker = "unk"
# 人による
line = "人による"

[[dialogue]]
speaker = "unk"
# 正しい
line = "正しい"

[[dialogue]]
speaker = "クラウディア"
# 「やはりな。しかし、森の魔女どもはどいつもこいつも男と接したこともない腰抜けばかりだ。おぼこ、と言うのだったか？」
line = "「やはりな。しかし、森の魔女どもはどいつもこいつも男と接したこともない腰抜けばかりだ。おぼこ、と言うのだったか？」"

[[dialogue]]
speaker = "クラウディア"
# 「そこで余は考えた。余が男を知れば──きっと立派なレディとなって、大抵の魔女を出し抜くことができよう」
line = "「そこで余は考えた。余が男を知れば──きっと立派なレディとなって、大抵の魔女を出し抜くことができよう」"

[[dialogue]]
speaker = "クラウディア"
# 「さすれば、今のように小娘扱いされることもなくなる！　光の魔女としての威厳を取り戻せるというわけだ！」
line = "「さすれば、今のように小娘扱いされることもなくなる！　光の魔女としての威厳を取り戻せるというわけだ！」"

[[dialogue]]
speaker = "unk"
# あてがあるの？
line = "あてがあるの？"

[[dialogue]]
speaker = "unk"
# 男って……？
line = "男って……？"

[[dialogue]]
speaker = "クラウディア"
# 「はっはっは。何を呆けておる」
line = "「はっはっは。何を呆けておる」"

[[dialogue]]
speaker = "クラウディア"
# 「人間のことも──男のことも──とっておきのサンプルがいるではないか！　そのためにお主を呼んだのだぞ」
line = "「人間のことも──男のことも──とっておきのサンプルがいるではないか！　そのためにお主を呼んだのだぞ」"

[[dialogue]]
speaker = "クラウディア"
# 「脱ぐがよい！　余はまだまだ男のことを知らんからな──この場ではっきりとつまびらかにしてやるぞ！」
line = "「脱ぐがよい！　余はまだまだ男のことを知らんからな──この場ではっきりとつまびらかにしてやるぞ！」"

[[dialogue]]
speaker = "unk"
# セドナさんに燃やされる
line = "セドナさんに燃やされる"

[[dialogue]]
speaker = "unk"
# 絶対にダメ
line = "絶対にダメ"

[[dialogue]]
speaker = "クラウディア"
# 「ああ～ん？　なぜ渋るのだ。心配せずとも、お主が望むなら余も裸をさらけ出してやる」
line = "「ああ～ん？　なぜ渋るのだ。心配せずとも、お主が望むなら余も裸をさらけ出してやる」"

[[dialogue]]
speaker = "クラウディア"
# 「そういうのは大切な人と──だと？　お堅いやつよのう」
line = "「そういうのは大切な人と──だと？　お堅いやつよのう」"

[[dialogue]]
speaker = "クラウディア"
# 「余とて、何も知らぬわけではないぞ。男女のつがいが、仲良く抱き合っているのを『てれび』で観たのだ」
line = "「余とて、何も知らぬわけではないぞ。男女のつがいが、仲良く抱き合っているのを『てれび』で観たのだ」"

[[dialogue]]
speaker = "クラウディア"
# 「お主には余のパートナーたる資格がある。栄誉なことであろう、このクラウディアが認めると言っておるのだ」
line = "「お主には余のパートナーたる資格がある。栄誉なことであろう、このクラウディアが認めると言っておるのだ」"

[[dialogue]]
speaker = "クラウディア"
# 「うん？　もうちょっと考えたほうがいい？　お主……余が考えなしに動いているとでも思っておるのか」
line = "「うん？　もうちょっと考えたほうがいい？　お主……余が考えなしに動いているとでも思っておるのか」"

[[dialogue]]
speaker = "unk"
# 俺がいいの？
line = "俺がいいの？"

[[dialogue]]
speaker = "クラウディア"
# 「あ……当たり前だ。誰彼構わずこんなこと言うわけなかろう、たわけ」
line = "「あ……当たり前だ。誰彼構わずこんなこと言うわけなかろう、たわけ」"

[[dialogue]]
speaker = "クラウディア"
# 「なかなかに心外だぞ。好意もない相手を呼びつけたりはせん──人間界に男があふれていることくらい、余も知っておる」
line = "「なかなかに心外だぞ。好意もない相手を呼びつけたりはせん──人間界に男があふれていることくらい、余も知っておる」"

[[dialogue]]
speaker = "クラウディア"
# 「その上で余はお主を選んでいるのだ。これが栄誉でなくてなんだという」
line = "「その上で余はお主を選んでいるのだ。これが栄誉でなくてなんだという」"

[[dialogue]]
speaker = "クラウディア"
# （というか、断られたらさすがの余もそこそこ『傷つく』のだが！？）
line = "（というか、断られたらさすがの余もそこそこ『傷つく』のだが！？）"

[[dialogue]]
speaker = "unk"
# 思ったよりクラウディアもレディだった
line = "思ったよりクラウディアもレディだった"

[[dialogue]]
speaker = "unk"
# ごめん
line = "ごめん"

[[dialogue]]
speaker = "クラウディア"
# 「確かに……魔女が人間と添い遂げることはあまり認められてはいない。人の子の命は儚いからな」
line = "「確かに……魔女が人間と添い遂げることはあまり認められてはいない。人の子の命は儚いからな」"

[[dialogue]]
speaker = "クラウディア"
# 「しかし──余はお主であれば、心を許せると思っておる」
line = "「しかし──余はお主であれば、心を許せると思っておる」"

[[dialogue]]
speaker = "クラウディア"
# 「女の勘というやつは、馬鹿にできんものなのだろう？　なれば光の魔女の勘は、さらに特別製と言えよう！」
line = "「女の勘というやつは、馬鹿にできんものなのだろう？　なれば光の魔女の勘は、さらに特別製と言えよう！」"

[[dialogue]]
speaker = "unk"
# 大人になったね
line = "大人になったね"

[[dialogue]]
speaker = "unk"
# そこまで想ってくれてたとは知らなかった
line = "そこまで想ってくれてたとは知らなかった"

[[dialogue]]
speaker = "クラウディア"
# 「わかってくれたか。だから余はお主を知り、より立派なレディになりたいというわけだ」
line = "「わかってくれたか。だから余はお主を知り、より立派なレディになりたいというわけだ」"

[[dialogue]]
speaker = "クラウディア"
# 「む……そうだ！　光の魔女と魔王が結ばれれば、もしやとんでもない子が生まれるのではないか？」
line = "「む……そうだ！　光の魔女と魔王が結ばれれば、もしやとんでもない子が生まれるのではないか？」"

[[dialogue]]
speaker = "クラウディア"
# 「魔女は世界樹から生まれくるものだが──人間は男女で『こづくり』をするのだろう？　いかにして子をこさえるのだ？」
line = "「魔女は世界樹から生まれくるものだが──人間は男女で『こづくり』をするのだろう？　いかにして子をこさえるのだ？」"

[[dialogue]]
speaker = "unk"
# そろそろ帰るね
line = "そろそろ帰るね"

[[dialogue]]
speaker = "unk"
# ……
line = "……"

[[dialogue]]
speaker = "クラウディア"
# 「おい！　なぜ余から顔を背けるのだ！　まだ帰っていいとは言っておらぬぞ！」
line = "「おい！　なぜ余から顔を背けるのだ！　まだ帰っていいとは言っておらぬぞ！」"

[[dialogue]]
speaker = "クラウディア"
# 「待つのだ魔王ー！　余と一緒に、しこたま『こづくり』しようではないかー！　お～～い！！」
line = "「待つのだ魔王ー！　余と一緒に、しこたま『こづくり』しようではないかー！　お～～い！！」"
