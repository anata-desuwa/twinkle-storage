[[dialogue]]
speaker = "unk"
# 第３話,レイラの悩み？,P
line = "第３話,レイラの悩み？,P"

[[dialogue]]
speaker = "レイラ"
# 「魔王さん、そいつ空中に打ち上げてください！」
line = "「魔王さん、そいつ空中に打ち上げてください！」"

[[dialogue]]
speaker = "unk"
# わかった！
line = "わかった！"

[[dialogue]]
speaker = "レイラ"
# 「闇よ、全てを喰らい尽くせ──デッドエンド・コラプサー！」
line = "「闇よ、全てを喰らい尽くせ──デッドエンド・コラプサー！」"

[[dialogue]]
speaker = "unk"
# レイラが生み出した極小ブラックホールが、機械型モンスターを一瞬で消滅させる。
line = "レイラが生み出した極小ブラックホールが、機械型モンスターを一瞬で消滅させる。"

[[dialogue]]
speaker = "unk"
# レイラの力はコラプサーの中でも規格外で、これでも弱体化したとは思えない圧倒的な破壊力だった。
line = "レイラの力はコラプサーの中でも規格外で、これでも弱体化したとは思えない圧倒的な破壊力だった。"

[[dialogue]]
speaker = "レイラ"
# 「……ふぅ」
line = "「……ふぅ」"

[[dialogue]]
speaker = "unk"
# お疲れ様
line = "お疲れ様"

[[dialogue]]
speaker = "レイラ"
# 「はい、魔王さんもお疲れ様でした」
line = "「はい、魔王さんもお疲れ様でした」"

[[dialogue]]
speaker = "レイラ"
# 「私の場合、星術の破壊力が高すぎて、戦うのは神経を使うというか、気を抜くと街を消し飛ばしてしまいそうで……」
line = "「私の場合、星術の破壊力が高すぎて、戦うのは神経を使うというか、気を抜くと街を消し飛ばしてしまいそうで……」"

[[dialogue]]
speaker = "レイラ"
# 「だから味方を巻き込みそうで、連携も得意じゃなかったんですけど、力が弱くなったおかげで戦いやすくなった気がします」
line = "「だから味方を巻き込みそうで、連携も得意じゃなかったんですけど、力が弱くなったおかげで戦いやすくなった気がします」"

[[dialogue]]
speaker = "unk"
# 最近は任務や訓練でレイラと一緒にいることが増え、こうして話す機会も多くなった。
line = "最近は任務や訓練でレイラと一緒にいることが増え、こうして話す機会も多くなった。"

[[dialogue]]
speaker = "レイラ"
# 「うーん……」
line = "「うーん……」"

[[dialogue]]
speaker = "unk"
# どうしたの？
line = "どうしたの？"

[[dialogue]]
speaker = "レイラ"
# 「コラプサーとは別件なんですが……ネビュラのサイバー担当になったので、デスクワークが多くなっちゃって……肩こりがひどいんです」
line = "「コラプサーとは別件なんですが……ネビュラのサイバー担当になったので、デスクワークが多くなっちゃって……肩こりがひどいんです」"

[[dialogue]]
speaker = "レイラ"
# 「肩もみ、ですか？　あ、じゃあ、ちょっとだけお願いしていいですか？　肩こり本当につらくて……」
line = "「肩もみ、ですか？　あ、じゃあ、ちょっとだけお願いしていいですか？　肩こり本当につらくて……」"

[[dialogue]]
speaker = "unk"
# 綺麗な髪をかき分け、レイラの肩に触れる。
line = "綺麗な髪をかき分け、レイラの肩に触れる。"

[[dialogue]]
speaker = "unk"
# 今まで意識していなかったが、華奢な肩幅に、異性だということを思い出してしまった。
line = "今まで意識していなかったが、華奢な肩幅に、異性だということを思い出してしまった。"

[[dialogue]]
speaker = "レイラ"
# 「どうしたんです？　肩、揉んでくれないんですか？」
line = "「どうしたんです？　肩、揉んでくれないんですか？」"

[[dialogue]]
speaker = "unk"
# 本人も望んでいることだし、と意を決して手に力を込める。
line = "本人も望んでいることだし、と意を決して手に力を込める。"

[[dialogue]]
speaker = "レイラ"
# 「ん、あっ……んんっ」
line = "「ん、あっ……んんっ」"

[[dialogue]]
speaker = "レイラ"
# 「そこそこ……あっ、魔王さん、上手すぎますっ……やってたでしょっ」
line = "「そこそこ……あっ、魔王さん、上手すぎますっ……やってたでしょっ」"

[[dialogue]]
speaker = "レイラ"
# 「ああぁっ……魔王さんのが気持ちいいとこ押してきて……んっ、気持ちよすぎ……」
line = "「ああぁっ……魔王さんのが気持ちいいとこ押してきて……んっ、気持ちよすぎ……」"

[[dialogue]]
speaker = "レイラ"
# 「ありがとうございます。少し楽になりました」
line = "「ありがとうございます。少し楽になりました」"

[[dialogue]]
speaker = "レイラ"
# 「ほら、私って人よりたくさん食べるじゃないですか。だから栄養が胸に来ちゃうんですよね」
line = "「ほら、私って人よりたくさん食べるじゃないですか。だから栄養が胸に来ちゃうんですよね」"

[[dialogue]]
speaker = "レイラ"
# 「最近またサイズが大きくなっちゃって……」
line = "「最近またサイズが大きくなっちゃって……」"

[[dialogue]]
speaker = "レイラ"
# 「キサナやイングリットに聞いても肩こりなんて気にしたことないらしいし、メテオラにいたっては肩こりが何かすら知りませんでした」
line = "「キサナやイングリットに聞いても肩こりなんて気にしたことないらしいし、メテオラにいたっては肩こりが何かすら知りませんでした」"

[[dialogue]]
speaker = "レイラ"
# 「やっぱり運動の習慣をつけた方がいいんでしょうか……？」
line = "「やっぱり運動の習慣をつけた方がいいんでしょうか……？」"

[[dialogue]]
speaker = "レイラ"
# 「……魔王さん？　あのー、聞いてますか？」
line = "「……魔王さん？　あのー、聞いてますか？」"

[[dialogue]]
speaker = "unk"
# ごめん、ぼーっとしてたみたい
line = "ごめん、ぼーっとしてたみたい"

[[dialogue]]
speaker = "レイラ"
# 「お疲れなのかもしれませんね。星徒会長はご多忙ですから。肩もみなんてさせて、すみません」
line = "「お疲れなのかもしれませんね。星徒会長はご多忙ですから。肩もみなんてさせて、すみません」"

[[dialogue]]
speaker = "レイラ"
# 「でも、気持ちよかったのは本当なので……すごくすっきりしました。ありがとうございます」
line = "「でも、気持ちよかったのは本当なので……すごくすっきりしました。ありがとうございます」"

[[dialogue]]
speaker = "レイラ"
# 「今日は早くお休みくださいね。では、また」
line = "「今日は早くお休みくださいね。では、また」"

[[dialogue]]
speaker = "レイラ"
# 「──ということがあったんですけど、それ以来、魔王さんから避けられているような気がして……私、何か粗相をしてしまったのでしょうか」
line = "「──ということがあったんですけど、それ以来、魔王さんから避けられているような気がして……私、何か粗相をしてしまったのでしょうか」"

[[dialogue]]
speaker = "コハルコ"
# 「むしろ粗相しかしてないんじゃないかな？」
line = "「むしろ粗相しかしてないんじゃないかな？」"

[[dialogue]]
speaker = "レイラ"
# 「ファっ！？」
line = "「ファっ！？」"

[[dialogue]]
speaker = "コハルコ"
# 「考えてもみて。私が会長さんに『私、胸が大きいから肩こりひどいの～』なんて言ったらおかしいでしょ？」
line = "「考えてもみて。私が会長さんに『私、胸が大きいから肩こりひどいの～』なんて言ったらおかしいでしょ？」"

[[dialogue]]
speaker = "レイラ"
# 「それはもう、やべー女じゃないですか！？」
line = "「それはもう、やべー女じゃないですか！？」"

[[dialogue]]
speaker = "コハルコ"
# 「やべーのはレイラだからね！？」
line = "「やべーのはレイラだからね！？」"

[[dialogue]]
speaker = "レイラ"
# 「え、ウソ……私、そんなこと…………」
line = "「え、ウソ……私、そんなこと…………」"

[[dialogue]]
speaker = "レイラ"
# 『ほら、私って人よりたくさん食べるじゃないですか。だから栄養が胸に来ちゃうんですよね』
line = "『ほら、私って人よりたくさん食べるじゃないですか。だから栄養が胸に来ちゃうんですよね』"

[[dialogue]]
speaker = "レイラ"
# 『最近またサイズが大きくなっちゃって……』
line = "『最近またサイズが大きくなっちゃって……』"

[[dialogue]]
speaker = "レイラ"
# 「言ってる～～～～～！？」
line = "「言ってる～～～～～！？」"

[[dialogue]]
speaker = "レイラ"
# 「なんで、いつの間に！？　これが叙述トリックってやつですか！？」
line = "「なんで、いつの間に！？　これが叙述トリックってやつですか！？」"

[[dialogue]]
speaker = "コハルコ"
# 「いや、レイラの距離感がバグってるだけだよ……相手は男の子なんだから、ちゃんと節度を持って接しなさい」
line = "「いや、レイラの距離感がバグってるだけだよ……相手は男の子なんだから、ちゃんと節度を持って接しなさい」"

[[dialogue]]
speaker = "コハルコ"
# 「あと、ネットのノリをリアルに持ち込まないこと。ちょいちょい漏れ出てるからね。分かった？」
line = "「あと、ネットのノリをリアルに持ち込まないこと。ちょいちょい漏れ出てるからね。分かった？」"

[[dialogue]]
speaker = "レイラ"
# 「はい、気を付けます。……魔王さんにもちゃんと謝らなくちゃ」
line = "「はい、気を付けます。……魔王さんにもちゃんと謝らなくちゃ」"

[[dialogue]]
speaker = "unk"
# レイラとモンスターを討伐してからしばらく──
line = "レイラとモンスターを討伐してからしばらく──"

[[dialogue]]
speaker = "unk"
# 眠れない……
line = "眠れない……"

[[dialogue]]
speaker = "レイラ"
# 『ん、あっ……んんっ』
line = "『ん、あっ……んんっ』"

[[dialogue]]
speaker = "レイラ"
# 『ああぁっ……魔王さんのが気持ちいいとこ押してきて……んっ、気持ちよすぎ……』
line = "『ああぁっ……魔王さんのが気持ちいいとこ押してきて……んっ、気持ちよすぎ……』"

[[dialogue]]
speaker = "unk"
# レイラのことを思い出して眠れない夜が続く。
line = "レイラのことを思い出して眠れない夜が続く。"

[[dialogue]]
speaker = "unk"
# レイラからメッセージだ……。
line = "レイラからメッセージだ……。"
