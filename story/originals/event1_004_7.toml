[[dialogue]]
speaker = "unk"
# ロストアイテムにマーキングが成功したので、追跡する前にプリムラ達と合流することになった。
line = "ロストアイテムにマーキングが成功したので、追跡する前にプリムラ達と合流することになった。"

[[dialogue]]
speaker = "unk"
# プリムラと連絡をとって、待ち合わせ場所の保健室で待つことに。
line = "プリムラと連絡をとって、待ち合わせ場所の保健室で待つことに。"

[[dialogue]]
speaker = "unk"
# それにしても、追跡できるなんて便利だな
line = "それにしても、追跡できるなんて便利だな"

[[dialogue]]
speaker = "トマル"
# 「私の星力の特性が、『力を<ruby=とど>留</ruby>める』ことなんです。それを応用して、攻撃を当てた相手に私の星力を帯電させ、その反応を追跡することができます」
line = "「私の星力の特性が、『力を<ruby>留<rt>とど</rt></ruby>める』ことなんです。それを応用して、攻撃を当てた相手に私の星力を帯電させ、その反応を追跡することができます」"

[[dialogue]]
speaker = "サチ"
# 「トマルくんのマーキング能力は、持続時間も追跡範囲も本当に優秀なんです。ロストアイテム回収でも、これまで何度もお世話になってます」
line = "「トマルくんのマーキング能力は、持続時間も追跡範囲も本当に優秀なんです。ロストアイテム回収でも、これまで何度もお世話になってます」"

[[dialogue]]
speaker = "トレジアンナ"
# 「いや～、本当に助かりますよね～。ロストアイテムは今回みたいに逃げ回るやつが多いので、私的にはもう、トマルさんがいない状況とか想像したくないくらいですよ～」
line = "「いや～、本当に助かりますよね～。ロストアイテムは今回みたいに逃げ回るやつが多いので、私的にはもう、トマルさんがいない状況とか想像したくないくらいですよ～」"

[[dialogue]]
speaker = "トレジアンナ"
# 「トマルさん、可愛くて有能でマジ天使！　って毎回思ってます」
line = "「トマルさん、可愛くて有能でマジ天使！　って毎回思ってます」"

[[dialogue]]
speaker = "トマル"
# 「……あの、サチさま。少しよろしいでしょうか？」
line = "「……あの、サチさま。少しよろしいでしょうか？」"

[[dialogue]]
speaker = "サチ"
# 「うん？　トマルくん、どうしたの？」
line = "「うん？　トマルくん、どうしたの？」"

[[dialogue]]
speaker = "トマル"
# 「今のうちに、サチさまに伝えておきたいことがありまして。――プリムラさまのことについてです」
line = "「今のうちに、サチさまに伝えておきたいことがありまして。――プリムラさまのことについてです」"

[[dialogue]]
speaker = "サチ"
# 「……もしかして、プリムラが私に対して怒ってること？」
line = "「……もしかして、プリムラが私に対して怒ってること？」"

[[dialogue]]
speaker = "unk"
# （サチもやっぱり気にしてたんだな……）
line = "（サチもやっぱり気にしてたんだな……）"

[[dialogue]]
speaker = "トマル"
# 「ええ、そうです」
line = "「ええ、そうです」"

[[dialogue]]
speaker = "トマル"
# 「私が思うに……プリムラさまは、深刻な怒りを抱えているというよりは――」
line = "「私が思うに……プリムラさまは、深刻な怒りを抱えているというよりは――」"

[[dialogue]]
speaker = "トマル"
# 「子供のように感情的になってしまっているのではないかと、そんな感じがするんです」
line = "「子供のように感情的になってしまっているのではないかと、そんな感じがするんです」"

[[dialogue]]
speaker = "サチ"
# 「感情的に……」
line = "「感情的に……」"

[[dialogue]]
speaker = "トマル"
# 「サチさま……私は、サチさまとプリムラさまと知り合ってから半年以上、近くでお２人の関係を見てきました」
line = "「サチさま……私は、サチさまとプリムラさまと知り合ってから半年以上、近くでお２人の関係を見てきました」"

[[dialogue]]
speaker = "トマル"
# 「私がロストアイテムの事件に巻き込まれて、助けてくれた時から……お２人のことを大切な友達だと思っています」
line = "「私がロストアイテムの事件に巻き込まれて、助けてくれた時から……お２人のことを大切な友達だと思っています」"

[[dialogue]]
speaker = "トマル"
# 「でも、お２人の関係は、私とサチさまの関係とはやっぱり別のものですよね？」
line = "「でも、お２人の関係は、私とサチさまの関係とはやっぱり別のものですよね？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「多分、私とサチさんとの関係とも違いますよね～」
line = "「多分、私とサチさんとの関係とも違いますよね～」"

[[dialogue]]
speaker = "サチ"
# 「トレジアンナさんとは……そうですね。例えるなら、親戚で居候しているお姉さんみたいな……四六時中一緒にいますし……」
line = "「トレジアンナさんとは……そうですね。例えるなら、親戚で居候しているお姉さんみたいな……四六時中一緒にいますし……」"

[[dialogue]]
speaker = "トレジアンナ"
# 「お～、いいですね～♪　よかったら、今度から『お姉ちゃん』って呼んでくれてもいいんですよ？」
line = "「お～、いいですね～♪　よかったら、今度から『お姉ちゃん』って呼んでくれてもいいんですよ？」"

[[dialogue]]
speaker = "サチ"
# 「絶対に呼びません」
line = "「絶対に呼びません」"

[[dialogue]]
speaker = "トレジアンナ"
# 「ありゃ～」
line = "「ありゃ～」"

[[dialogue]]
speaker = "トマル"
# 「ふふっ……プリムラさまが怒っているのって、もしかすると……今のサチさまみたいなことなのかも」
line = "「ふふっ……プリムラさまが怒っているのって、もしかすると……今のサチさまみたいなことなのかも」"

[[dialogue]]
speaker = "サチ"
# 「え？」
line = "「え？」"

[[dialogue]]
speaker = "トマル"
# 「近しいからこそ、素直に言えないことって……あるじゃないですか」
line = "「近しいからこそ、素直に言えないことって……あるじゃないですか」"

[[dialogue]]
speaker = "トマル"
# 「サチさまとプリムラさまの関係だからこそ、言いづらい。プリムラさまの場合はほら、人一倍素直な方じゃありませんから」
line = "「サチさまとプリムラさまの関係だからこそ、言いづらい。プリムラさまの場合はほら、人一倍素直な方じゃありませんから」"

[[dialogue]]
speaker = "サチ"
# 「素直に……言えない……」
line = "「素直に……言えない……」"

[[dialogue]]
speaker = "サチ"
# （私とプリムラの関係は、一体、なんて言うべきなんだろう……？）
line = "（私とプリムラの関係は、一体、なんて言うべきなんだろう……？）"

[[dialogue]]
speaker = "サチ"
# （腐れ縁……？　それは合ってるけど、なんかもっと……違う気がする……）
line = "（腐れ縁……？　それは合ってるけど、なんかもっと……違う気がする……）"

[[dialogue]]
speaker = "マトイ"
# 「みんな、大変なの！」
line = "「みんな、大変なの！」"

[[dialogue]]
speaker = "トマル"
# 「姉さま、慌てた様子でどうされたのですか？　両手に抱えているその方々は……！？」
line = "「姉さま、慌てた様子でどうされたのですか？　両手に抱えているその方々は……！？」"

[[dialogue]]
speaker = "サチ"
# 「本校の生徒の方たちですよね！？　気を失っているみたいですけど、まさかロストアイテムの被害者ですか！？」
line = "「本校の生徒の方たちですよね！？　気を失っているみたいですけど、まさかロストアイテムの被害者ですか！？」"

[[dialogue]]
speaker = "マトイ"
# 「ここに向かってる最中にロストアイテムが現れて、この子たちを襲ってたの……！」
line = "「ここに向かってる最中にロストアイテムが現れて、この子たちを襲ってたの……！」"

[[dialogue]]
speaker = "マトイ"
# 「それだけじゃなくて、ほかの生徒たちも襲おうと暴れはじめて……！　それで、プリムラちゃんが――」
line = "「それだけじゃなくて、ほかの生徒たちも襲おうと暴れはじめて……！　それで、プリムラちゃんが――」"

[[dialogue]]
speaker = "マトイ"
# 「プリムラちゃんがロストアイテムを抑えるから、その間にみんなを保健室へ運んでって私に……！」
line = "「プリムラちゃんがロストアイテムを抑えるから、その間にみんなを保健室へ運んでって私に……！」"

[[dialogue]]
speaker = "サチ"
# 「プリムラ……！」
line = "「プリムラ……！」"

[[dialogue]]
speaker = "unk"
# サチは呟いて、険しい表情を浮かべるのだった。
line = "サチは呟いて、険しい表情を浮かべるのだった。"
