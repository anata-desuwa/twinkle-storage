[[dialogue]]
speaker = "unk"
# 第２話,新春ストロベリー,P
line = "第２話,新春ストロベリー,P"

[[dialogue]]
speaker = "unk"
# 神社でおみくじを引いた後、ソフィと手を繋いで繁華街の方まで足を伸ばすことにした。
line = "神社でおみくじを引いた後、ソフィと手を繋いで繁華街の方まで足を伸ばすことにした。"

[[dialogue]]
speaker = "ソフィア"
# 「わぁ……こっちもすごい混みようですね。道路は歩行者天国になっているのに、歩きづらいくらいです」
line = "「わぁ……こっちもすごい混みようですね。道路は歩行者天国になっているのに、歩きづらいくらいです」"

[[dialogue]]
speaker = "ソフィア"
# 「でも……気づいたことがあります。会長さん、大発見かもしれません」
line = "「でも……気づいたことがあります。会長さん、大発見かもしれません」"

[[dialogue]]
speaker = "ソフィア"
# 「人混みに揉まれていると、寒さをあまり感じません！」
line = "「人混みに揉まれていると、寒さをあまり感じません！」"

[[dialogue]]
speaker = "ソフィア"
# 「お外にいるのに、普段より２割減くらいのコールドです。そこそこにホットという感じですね」
line = "「お外にいるのに、普段より２割減くらいのコールドです。そこそこにホットという感じですね」"

[[dialogue]]
speaker = "ソフィア"
# 「今日、お出かけする前は防寒着で悩んだんです。イヤーマフとか手袋とかコートとか、どれぐらい着こんでいこうかなと……」
line = "「今日、お出かけする前は防寒着で悩んだんです。イヤーマフとか手袋とかコートとか、どれぐらい着こんでいこうかなと……」"

[[dialogue]]
speaker = "unk"
# そういえば軽装だね、今日は
line = "そういえば軽装だね、今日は"

[[dialogue]]
speaker = "ソフィア"
# 「と、当然ですっ。いろいろ悩みましたが、ほとんど置いてきました。せっかくの晴れ着が隠れちゃいますから……」
line = "「と、当然ですっ。いろいろ悩みましたが、ほとんど置いてきました。せっかくの晴れ着が隠れちゃいますから……」"

[[dialogue]]
speaker = "ソフィア"
# 「会長さんとの年明け初のお出かけですから、おめかししてるところを見て欲しかった、と言いますか……」
line = "「会長さんとの年明け初のお出かけですから、おめかししてるところを見て欲しかった、と言いますか……」"

[[dialogue]]
speaker = "ソフィア"
# 「えへ、喜んでもらえたのなら嬉しいです……けど。ぶるぶるっ……代わりに防御力を犠牲にしてしまいました」
line = "「えへ、喜んでもらえたのなら嬉しいです……けど。ぶるぶるっ……代わりに防御力を犠牲にしてしまいました」"

[[dialogue]]
speaker = "ソフィア"
# 「あまり寒さを感じないとは言いましたが、たまに吹く風はやっぱり冷たくて……コールドですっ……！　何か温かいものでも食べませんか？」
line = "「あまり寒さを感じないとは言いましたが、たまに吹く風はやっぱり冷たくて……コールドですっ……！　何か温かいものでも食べませんか？」"

[[dialogue]]
speaker = "ソフィア"
# 「おぉー……これがお汁粉、というやつですね。小豆餡の溶けたお汁に、大きめの白玉団子が３つも……！」
line = "「おぉー……これがお汁粉、というやつですね。小豆餡の溶けたお汁に、大きめの白玉団子が３つも……！」"

[[dialogue]]
speaker = "ソフィア"
# 「それにしても、繁華街に和菓子屋さんなんてあったんですね。私、パンケーキのお店ばかり調べていたので新鮮です」
line = "「それにしても、繁華街に和菓子屋さんなんてあったんですね。私、パンケーキのお店ばかり調べていたので新鮮です」"

[[dialogue]]
speaker = "unk"
# アナとよく来るんだ、ここ
line = "アナとよく来るんだ、ここ"

[[dialogue]]
speaker = "ソフィア"
# 「ああ、新星の副会長さんですね。そういえば和菓子がお好きだと聞いたことがあります」
line = "「ああ、新星の副会長さんですね。そういえば和菓子がお好きだと聞いたことがあります」"

[[dialogue]]
speaker = "ソフィア"
# 「デート中にしれっと他の女性の名前が出ましたが、今はこのおいしそうなお汁粉に免じて許しましょう♪」
line = "「デート中にしれっと他の女性の名前が出ましたが、今はこのおいしそうなお汁粉に免じて許しましょう♪」"

[[dialogue]]
speaker = "ソフィア"
# 「それにしても、おみくじ汁粉とは不思議な名前ですね……はぅう、お椀がぬくぬくで、甘い香り……とってもホットです♪」
line = "「それにしても、おみくじ汁粉とは不思議な名前ですね……はぅう、お椀がぬくぬくで、甘い香り……とってもホットです♪」"

[[dialogue]]
speaker = "ソフィア"
# 「いただきます……もぐもぐっ……ん～っ♪」
line = "「いただきます……もぐもぐっ……ん～っ♪」"

[[dialogue]]
speaker = "ソフィア"
# 「会長さん。白玉の中にチョコが入っていますよ。これは嬉しいサプライズですっ」
line = "「会長さん。白玉の中にチョコが入っていますよ。これは嬉しいサプライズですっ」"

[[dialogue]]
speaker = "unk"
# こっちは栗の甘露煮だ
line = "こっちは栗の甘露煮だ"

[[dialogue]]
speaker = "ソフィア"
# 「なるほど、だからおみくじ汁粉ですか……２つ目の白玉には……もぐ……もぐ……」
line = "「なるほど、だからおみくじ汁粉ですか……２つ目の白玉には……もぐ……もぐ……」"

[[dialogue]]
speaker = "ソフィア"
# 「あっ、いちごです……！　これは当たりですね」
line = "「あっ、いちごです……！　これは当たりですね」"

[[dialogue]]
speaker = "ソフィア"
# 「会長さんの２つ目は……ぁ、何も入ってない……？　そういうパターンもあるんですね」
line = "「会長さんの２つ目は……ぁ、何も入ってない……？　そういうパターンもあるんですね」"

[[dialogue]]
speaker = "ソフィア"
# 「私の３つ目、お箸で割ってみましょうか……あ、またいちごです。よろしければ会長さん、お１つどうですか？」
line = "「私の３つ目、お箸で割ってみましょうか……あ、またいちごです。よろしければ会長さん、お１つどうですか？」"

[[dialogue]]
speaker = "ソフィア"
# 「いちご白玉、とっても美味しかったですから、おすそ分けしますよ。はい、あ～ん♪」
line = "「いちご白玉、とっても美味しかったですから、おすそ分けしますよ。はい、あ～ん♪」"

[[dialogue]]
speaker = "unk"
# これは……美味しい！
line = "これは……美味しい！"

[[dialogue]]
speaker = "ソフィア"
# 「ふふ。喜んでもらえて私も嬉しいです。美味しいものはシェアしないとですからね」
line = "「ふふ。喜んでもらえて私も嬉しいです。美味しいものはシェアしないとですからね」"

[[dialogue]]
speaker = "unk"
# じゃあ俺もお返し。あーん
line = "じゃあ俺もお返し。あーん"

[[dialogue]]
speaker = "ソフィア"
# 「えっ？　あ、あのっ……はい<emoji=heart04>」
line = "「えっ？　あ、あのっ……はい<emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
# 「あ～んっ……<emoji=heart04>　んーっ……これは柿でしょうか。控えめな甘さがお汁粉によく合っていますね」
line = "「あ～んっ……<emoji=heart04>　んーっ……これは柿でしょうか。控えめな甘さがお汁粉によく合っていますね」"

[[dialogue]]
speaker = "ソフィア"
# 「──って、何だか恥ずかしいことしちゃってる気がします……！　誰かに見られてたら大変ですがっ……」
line = "「──って、何だか恥ずかしいことしちゃってる気がします……！　誰かに見られてたら大変ですがっ……」"

[[dialogue]]
speaker = "ソフィア"
# 「大丈夫……ですよね。これだけ人でごった返していますし、学園のお友達に見られるだなんて、そんな偶然はそうそうないでしょう」
line = "「大丈夫……ですよね。これだけ人でごった返していますし、学園のお友達に見られるだなんて、そんな偶然はそうそうないでしょう」"

[[dialogue]]
speaker = "ソフィア"
# 「──はい。お汁粉、最後まで味わってから、お外に出ましょうか」
line = "「──はい。お汁粉、最後まで味わってから、お外に出ましょうか」"

[[dialogue]]
speaker = "ソフィア"
# 「ずずず……うーん。とってもホットで、甘いです。幸せです～……<emoji=heart04>」
line = "「ずずず……うーん。とってもホットで、甘いです。幸せです～……<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
# 「うっひゃ～♪　何あれ何あれ！　２人ともラブラブじゃ～ん。窓際の席であんなにイチャイチャしちゃって～♪」
line = "「うっひゃ～♪　何あれ何あれ！　２人ともラブラブじゃ～ん。窓際の席であんなにイチャイチャしちゃって～♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「やるわねクロト……！　お互いにあーんしあうだなんて、流石は私が見込んだ魔王だわ！」
line = "「やるわねクロト……！　お互いにあーんしあうだなんて、流石は私が見込んだ魔王だわ！」"

[[dialogue]]
speaker = "ウズメイア"
# 「それって魔王は関係ないよーな？」
line = "「それって魔王は関係ないよーな？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ともかく２人で仲良くやってるのなら、それでよーし！　デートの邪魔はできないわ。ウズメ、私たちも何か食べに行くわよ！」
line = "「ともかく２人で仲良くやってるのなら、それでよーし！　デートの邪魔はできないわ。ウズメ、私たちも何か食べに行くわよ！」"

[[dialogue]]
speaker = "ウズメイア"
# 「オッケーです！　おすすめのパフェあるんで、一緒に行きましょ♪」
line = "「オッケーです！　おすすめのパフェあるんで、一緒に行きましょ♪」"

[[dialogue]]
speaker = "unk"
# その後、なぜか俺とソフィがお汁粉の食べさせあいっこをしていたことが、友人たちには余すことなく広まっており……
line = "その後、なぜか俺とソフィがお汁粉の食べさせあいっこをしていたことが、友人たちには余すことなく広まっており……"

[[dialogue]]
speaker = "unk"
# 真面目な優等生のソフィは、顔を真っ赤にして照れるのだった──
line = "真面目な優等生のソフィは、顔を真っ赤にして照れるのだった──"
