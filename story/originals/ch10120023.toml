[[dialogue]]
speaker = "unk"
# 第３話,花嫁家政婦は見た,P
line = "第３話,花嫁家政婦は見た,P"

[[dialogue]]
speaker = "キリカ"
# 「素晴らしい。清掃に関してだけ言えば、他のメイドたちと遜色ありませんね。よくぞここまで腕を磨きました」
line = "「素晴らしい。清掃に関してだけ言えば、他のメイドたちと遜色ありませんね。よくぞここまで腕を磨きました」"

[[dialogue]]
speaker = "unk"
# キリカとの未来がかかってるから
line = "キリカとの未来がかかってるから"

[[dialogue]]
speaker = "キリカ"
# 「っっ──！？　その軟派な口先だけは矯正する必要がございますね。そのような巧言で採点が甘くなると思ったら大間違いですよ？」
line = "「っっ──！？　その軟派な口先だけは矯正する必要がございますね。そのような巧言で採点が甘くなると思ったら大間違いですよ？」"

[[dialogue]]
speaker = "キリカ"
# 「とはいえ以前にも増して懸命に努力されているのもわかっているつもりです。これは何かご褒美をあげなくてはいけませんね」
line = "「とはいえ以前にも増して懸命に努力されているのもわかっているつもりです。これは何かご褒美をあげなくてはいけませんね」"

[[dialogue]]
speaker = "キリカ"
# 「……少し待っていてください。準備してきますので」
line = "「……少し待っていてください。準備してきますので」"

[[dialogue]]
speaker = "フィオナ"
# 「──ふふ、キリカと仲良く過ごされているようですね」
line = "「──ふふ、キリカと仲良く過ごされているようですね」"

[[dialogue]]
speaker = "フィオナ"
# 「こんにちは。キリカが上機嫌で廊下を歩いて行くものですから、気になってしまって」
line = "「こんにちは。キリカが上機嫌で廊下を歩いて行くものですから、気になってしまって」"

[[dialogue]]
speaker = "フィオナ"
# 「ああ、ドレス姿ですみません。せっかく身についた力ですから、より使いこなせるよう訓練していたところで」
line = "「ああ、ドレス姿ですみません。せっかく身についた力ですから、より使いこなせるよう訓練していたところで」"

[[dialogue]]
speaker = "フィオナ"
# 「それよりこのお部屋の清掃は緋宮会長が？　キリカが喜ぶわけですね。とても綺麗にお掃除されてます」
line = "「それよりこのお部屋の清掃は緋宮会長が？　キリカが喜ぶわけですね。とても綺麗にお掃除されてます」"

[[dialogue]]
speaker = "フィオナ"
# 「同棲生活も上手くいっているようですし、本当にゴールインする日もそう遠くなさそうですね？」
line = "「同棲生活も上手くいっているようですし、本当にゴールインする日もそう遠くなさそうですね？」"

[[dialogue]]
speaker = "フィオナ"
# 「……訓練でウェディングドレスを着てる自分が恥ずかしくなってきました。相手もいませんし、やはり私にはまだ早いような……」
line = "「……訓練でウェディングドレスを着てる自分が恥ずかしくなってきました。相手もいませんし、やはり私にはまだ早いような……」"

[[dialogue]]
speaker = "unk"
# フィオナもよく似合ってるよ
line = "フィオナもよく似合ってるよ"

[[dialogue]]
speaker = "フィオナ"
# 「ふふふ。私『も』ですか。褒めているようで他にもっと似合っている人がいるとでも言いたげですね。アツアツで羨ましいです」
line = "「ふふふ。私『も』ですか。褒めているようで他にもっと似合っている人がいるとでも言いたげですね。アツアツで羨ましいです」"

[[dialogue]]
speaker = "フィオナ"
# 「さて私は訓練に戻りますね。あまり長居をしてノロケ話に付き合わされるのも困っちゃいますから♪」
line = "「さて私は訓練に戻りますね。あまり長居をしてノロケ話に付き合わされるのも困っちゃいますから♪」"

[[dialogue]]
speaker = "フィオナ"
# 「あ──きゃっ！」
line = "「あ──きゃっ！」"

[[dialogue]]
speaker = "フィオナ"
# 「す、すみません。裾を踏んでしまって……。抱き止めてくださって、ありがとうございます」
line = "「す、すみません。裾を踏んでしまって……。抱き止めてくださって、ありがとうございます」"

[[dialogue]]
speaker = "フィオナ"
# 「ですが、こんなところキリカに見られたら──」
line = "「ですが、こんなところキリカに見られたら──」"

[[dialogue]]
speaker = "キリカ"
# 「コ、コホン。これがご褒美になるかはわかりませんが、久しぶりにウェディングドレスを着て参りまし──……」
line = "「コ、コホン。これがご褒美になるかはわかりませんが、久しぶりにウェディングドレスを着て参りまし──……」"

[[dialogue]]
speaker = "フィオナ"
# 「………………」
line = "「………………」"

[[dialogue]]
speaker = "キリカ"
# 「……た……？」
line = "「……た……？」"

[[dialogue]]
speaker = "フィオナ"
# 「～～っっ！！　ちちち、違うのキリカ！　これは、裾を踏んで転びそうになったところを緋宮会長に受け止めてもらっただけでっ……！」
line = "「～～っっ！！　ちちち、違うのキリカ！　これは、裾を踏んで転びそうになったところを緋宮会長に受け止めてもらっただけでっ……！」"

[[dialogue]]
speaker = "キリカ"
# 「……ふふ。慌てて弁明しなくとも私は何も気にしておりませんよ」
line = "「……ふふ。慌てて弁明しなくとも私は何も気にしておりませんよ」"

[[dialogue]]
speaker = "キリカ"
# 「急用を思い出しましたので私はこれで失礼します。おふたりのお邪魔をするのも忍びないですしね。どうか、おふたりで仲睦まじくごゆるりと」
line = "「急用を思い出しましたので私はこれで失礼します。おふたりのお邪魔をするのも忍びないですしね。どうか、おふたりで仲睦まじくごゆるりと」"

[[dialogue]]
speaker = "フィオナ"
# 「な、何をボーッとしているのですか緋宮会長！　早くキリカを追いかけて誤解を解いてください！」
line = "「な、何をボーッとしているのですか緋宮会長！　早くキリカを追いかけて誤解を解いてください！」"

[[dialogue]]
speaker = "フィオナ"
# 「あれは怒ってます！　とんでもないほど怒ってますよ！　キリカのあんな怖い笑顔、小さい頃におねしょを隠そうとしてシーツをこっそり処分しようとした時以来──」
line = "「あれは怒ってます！　とんでもないほど怒ってますよ！　キリカのあんな怖い笑顔、小さい頃におねしょを隠そうとしてシーツをこっそり処分しようとした時以来──」"

[[dialogue]]
speaker = "フィオナ"
# 「ではなくて！　とにかくものすごく怒ってますから！　急いで追いかけてください！　これがきっかけで別れ話につながるなんて、絶対に嫌ですからね！？」
line = "「ではなくて！　とにかくものすごく怒ってますから！　急いで追いかけてください！　これがきっかけで別れ話につながるなんて、絶対に嫌ですからね！？」"

[[dialogue]]
speaker = "キリカ"
# 「……これはこれは緋宮様。どうなさいましたか、そんなに息を切らせて駆け込んでこられて」
line = "「……これはこれは緋宮様。どうなさいましたか、そんなに息を切らせて駆け込んでこられて」"

[[dialogue]]
speaker = "unk"
# 俺が好きなのはキリカだから！
line = "俺が好きなのはキリカだから！"

[[dialogue]]
speaker = "キリカ"
# 「そうですかそうですか。そうは見えませんでしたけれどね？　大層力強くお嬢様を抱擁なさっていたではありませんか」
line = "「そうですかそうですか。そうは見えませんでしたけれどね？　大層力強くお嬢様を抱擁なさっていたではありませんか」"

[[dialogue]]
speaker = "キリカ"
# 「っっ……い、今更白々しく抱き締められても私は誤魔化されません」
line = "「っっ……い、今更白々しく抱き締められても私は誤魔化されません」"

[[dialogue]]
speaker = "キリカ"
# 「あれが事故だったことは理解しております。ですが緋宮様の鼻の下は確かに伸びておりましたからね」
line = "「あれが事故だったことは理解しております。ですが緋宮様の鼻の下は確かに伸びておりましたからね」"

[[dialogue]]
speaker = "キリカ"
# 「お嬢様の花嫁姿に見とれていたのでしょう？　良かったではありませんか。私のドレス姿より、さぞご褒美になったことでしょうね」
line = "「お嬢様の花嫁姿に見とれていたのでしょう？　良かったではありませんか。私のドレス姿より、さぞご褒美になったことでしょうね」"

[[dialogue]]
speaker = "unk"
# キリカの花嫁姿が一番だよ
line = "キリカの花嫁姿が一番だよ"

[[dialogue]]
speaker = "キリカ"
# 「でしたら……証明してください。お嬢様を抱き締めていた時より……もっと強く抱き締めてください」
line = "「でしたら……証明してください。お嬢様を抱き締めていた時より……もっと強く抱き締めてください」"

[[dialogue]]
speaker = "キリカ"
# 「んんっ……。も、もっとです……。私を愛していると、一番だと仰るなら、その愛の分だけ抱き締めてください……」
line = "「んんっ……。も、もっとです……。私を愛していると、一番だと仰るなら、その愛の分だけ抱き締めてください……」"

[[dialogue]]
speaker = "キリカ"
# 「ふぁ──……んふっ<emoji=heart04>　ん、ちゅっ……<emoji=heart04>　んんっ……<emoji=heart04>」
line = "「ふぁ──……んふっ<emoji=heart04>　ん、ちゅっ……<emoji=heart04>　んんっ……<emoji=heart04>」"

[[dialogue]]
speaker = "キリカ"
# 「はぁはぁ、キ、キスまでしろとは申しておりません。勝手なことをしないでくださいませ……」
line = "「はぁはぁ、キ、キスまでしろとは申しておりません。勝手なことをしないでくださいませ……」"

[[dialogue]]
speaker = "キリカ"
# 「あ──……んふぅんっ<emoji=heart04>　ちゅぁ、んちゅっ、ちゅちゅっ……<emoji=heart04>　はぁー、はぁー……ちゅあぁむぅんっ……<emoji=heart04><emoji=heart04><emoji=heart04>」
line = "「あ──……んふぅんっ<emoji=heart04>　ちゅぁ、んちゅっ、ちゅちゅっ……<emoji=heart04>　はぁー、はぁー……ちゅあぁむぅんっ……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "キリカ"
# 「も、もう。浮気者なのに強引なお方です……<emoji=heart04>」
line = "「も、もう。浮気者なのに強引なお方です……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 愛してるよ、キリカ
line = "愛してるよ、キリカ"

[[dialogue]]
speaker = "キリカ"
# 「～～っっ。し、知っておりますよ。毎晩ベッドで囁いていただいておりますから」
line = "「～～っっ。し、知っておりますよ。毎晩ベッドで囁いていただいておりますから」"

[[dialogue]]
speaker = "キリカ"
# 「私も……ん、ちゅっ。愛しています。些細なことで拗ねてしまって、申し訳ありませんでした」
line = "「私も……ん、ちゅっ。愛しています。些細なことで拗ねてしまって、申し訳ありませんでした」"

[[dialogue]]
speaker = "キリカ"
# 「けれど……ふふ。なるほどなるほど、私は拗ねてしまっていたのですね」
line = "「けれど……ふふ。なるほどなるほど、私は拗ねてしまっていたのですね」"

[[dialogue]]
speaker = "キリカ"
# 「お嬢様にヤキモチを焼いてしまう日が来るなんて思ってもいませんでした。よっぽど私は……あなたに首ったけのようです」
line = "「お嬢様にヤキモチを焼いてしまう日が来るなんて思ってもいませんでした。よっぽど私は……あなたに首ったけのようです」"

[[dialogue]]
speaker = "キリカ"
# 「遅くなりましたが……じっくり見てくださいますか？　あなたのために、ウェディングドレスへ着替え直したんです」
line = "「遅くなりましたが……じっくり見てくださいますか？　あなたのために、ウェディングドレスへ着替え直したんです」"

[[dialogue]]
speaker = "キリカ"
# 「これがご褒美になるかどうかわかりませんが……。いえ、最上級のご褒美になると確信しております」
line = "「これがご褒美になるかどうかわかりませんが……。いえ、最上級のご褒美になると確信しております」"

[[dialogue]]
speaker = "キリカ"
# 「私のことが好きで好きで仕方のないお方ですから。私のドレス姿がご褒美にならないわけがありません」
line = "「私のことが好きで好きで仕方のないお方ですから。私のドレス姿がご褒美にならないわけがありません」"

[[dialogue]]
speaker = "キリカ"
# 「しかと目に焼きつけて、弛まぬ努力を続けてくださいね？」
line = "「しかと目に焼きつけて、弛まぬ努力を続けてくださいね？」"

[[dialogue]]
speaker = "キリカ"
# 「私も……あなたの花嫁に相応しい女性になれるよう、ん、ちゅっ……<emoji=heart04>　努力を続けて参りますから……<emoji=heart04>」
line = "「私も……あなたの花嫁に相応しい女性になれるよう、ん、ちゅっ……<emoji=heart04>　努力を続けて参りますから……<emoji=heart04>」"
