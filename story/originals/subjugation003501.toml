[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆーっゆっゆっゆっ♪」
line = "「ゆーっゆっゆっゆっ♪」"

[[dialogue]]
speaker = "unk"
# 深き闇夜に木霊する笑い声、その主はジャクリーヌ・オー・ランタン。
line = "深き闇夜に木霊する笑い声、その主はジャクリーヌ・オー・ランタン。"

[[dialogue]]
speaker = "unk"
# ジャック・オー・ランタンの娘で、ひょんなことから新星学園の生徒になった幽霊の女の子だ。
line = "ジャック・オー・ランタンの娘で、ひょんなことから新星学園の生徒になった幽霊の女の子だ。"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「『冥界道士』面白かったゆ～♪　ヒトリにはいい映画を教えてもらったゆ～♪」
line = "「『冥界道士』面白かったゆ～♪　ヒトリにはいい映画を教えてもらったゆ～♪」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゾンビはあんまり好きじゃなかったゆ。でも、あの映画に出てきた幽霊ゾンビはカッコ良かったゆ～♪」
line = "「ゾンビはあんまり好きじゃなかったゆ。でも、あの映画に出てきた幽霊ゾンビはカッコ良かったゆ～♪」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「うーっ、余も幽霊ゾンビ軍団が欲しいゆ！　そいつらを引き連れて悪の幽霊ゾンビと戦いたいゆ～！」
line = "「うーっ、余も幽霊ゾンビ軍団が欲しいゆ！　そいつらを引き連れて悪の幽霊ゾンビと戦いたいゆ～！」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆゆっ！　いいこと思いついたゆ♪」
line = "「ゆゆっ！　いいこと思いついたゆ♪」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆーっゆっゆっゆーーっ♪」
line = "「ゆーっゆっゆっゆーーっ♪」"

[[dialogue]]
speaker = "unk"
# 翌日──
line = "翌日──"

[[dialogue]]
speaker = "舞亜"
# 「えっと……ジャクリーヌちゃん、何かあったのかな？」
line = "「えっと……ジャクリーヌちゃん、何かあったのかな？」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆ？」
line = "「ゆ？」"

[[dialogue]]
speaker = "ソフィア"
# 「大好物のドーナツを目の前にして、今日はどうしてそんなに大人しいんです？」
line = "「大好物のドーナツを目の前にして、今日はどうしてそんなに大人しいんです？」"

[[dialogue]]
speaker = "ウズメイア"
# 「そーそー、いつもだったらもっとテンション高いっしょ？　どうしたの？　具合でも悪いん？」
line = "「そーそー、いつもだったらもっとテンション高いっしょ？　どうしたの？　具合でも悪いん？」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「し、心配ないゆ！　余は健康そのものだゆ！」
line = "「し、心配ないゆ！　余は健康そのものだゆ！」"

[[dialogue]]
speaker = "ソフィア"
# 「そもそもジャクリーヌさんは幽霊なんですよね？　体調を悪くすることとかあるんですか？」
line = "「そもそもジャクリーヌさんは幽霊なんですよね？　体調を悪くすることとかあるんですか？」"

[[dialogue]]
speaker = "ウズメイア"
# 「偏見はよくないし～。幽霊でもあるでしょ、風邪引いたりとか、お腹を壊しちゃったりとか」
line = "「偏見はよくないし～。幽霊でもあるでしょ、風邪引いたりとか、お腹を壊しちゃったりとか」"

[[dialogue]]
speaker = "舞亜"
# 「でも、今は体調が悪いってわけじゃなさそうだし……何か悩み事がある、とか？」
line = "「でも、今は体調が悪いってわけじゃなさそうだし……何か悩み事がある、とか？」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆゆっ！？」
line = "「ゆゆっ！？」"

[[dialogue]]
speaker = "ウズメイア"
# 「え～、そうなん？　だったら遠慮せずに相談するし！　あたしら友達でしょ♪」
line = "「え～、そうなん？　だったら遠慮せずに相談するし！　あたしら友達でしょ♪」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆ……」
line = "「ゆ……」"

[[dialogue]]
speaker = "ソフィア"
# 「悩み事というと……そうですね、故郷の魔界が恋しくて憂鬱になっているとか？」
line = "「悩み事というと……そうですね、故郷の魔界が恋しくて憂鬱になっているとか？」"

[[dialogue]]
speaker = "ウズメイア"
# 「いわゆるホームシックってやつ？」
line = "「いわゆるホームシックってやつ？」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「そ、そういうのじゃないゆ」
line = "「そ、そういうのじゃないゆ」"

[[dialogue]]
speaker = "ウズメイア"
# 「じゃあ恋の悩みとか！　うわー、だったらあたし超おーえんするんだけど！」
line = "「じゃあ恋の悩みとか！　うわー、だったらあたし超おーえんするんだけど！」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆゆゆっ！　ち、違うゆ！　恋とかよくわからないゆ～！」
line = "「ゆゆゆっ！　ち、違うゆ！　恋とかよくわからないゆ～！」"

[[dialogue]]
speaker = "ウズメイア"
# 「え～、残念だし……」
line = "「え～、残念だし……」"

[[dialogue]]
speaker = "舞亜"
# 「えっと、じゃあ……いたずら成分が不足してるとか？」
line = "「えっと、じゃあ……いたずら成分が不足してるとか？」"

[[dialogue]]
speaker = "ソフィア"
# 「いたずら成分？　何ですか、それは……」
line = "「いたずら成分？　何ですか、それは……」"

[[dialogue]]
speaker = "舞亜"
# 「最近あんまりいたずら出来てなくて、それで元気がない、みたいな……何となくだけど」
line = "「最近あんまりいたずら出来てなくて、それで元気がない、みたいな……何となくだけど」"

[[dialogue]]
speaker = "ソフィア"
# 「それで元気が無くなるなんてことありますかね？」
line = "「それで元気が無くなるなんてことありますかね？」"

[[dialogue]]
speaker = "ソフィア"
# 「それにジャクリーヌさんは改心していい幽霊になったんです。ですから、いたずら出来なくて元気がないなんてこと……」
line = "「それにジャクリーヌさんは改心していい幽霊になったんです。ですから、いたずら出来なくて元気がないなんてこと……」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ソフィア"
# 「……この反応、まさか図星ですか？」
line = "「……この反応、まさか図星ですか？」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ち、違うゆ……そんな怖い顔で迫らないで欲しいゆ……」
line = "「ち、違うゆ……そんな怖い顔で迫らないで欲しいゆ……」"

[[dialogue]]
speaker = "ソフィア"
# 「悩み事というより、何か隠し事をしているようですね。ジャクリーヌさん、正直に言ってください！」
line = "「悩み事というより、何か隠し事をしているようですね。ジャクリーヌさん、正直に言ってください！」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆゆ～……じ、実は……」
line = "「ゆゆ～……じ、実は……」"

[[dialogue]]
speaker = "女生徒"
# 「きゃあああぁーーーっ！！」
line = "「きゃあああぁーーーっ！！」"

[[dialogue]]
speaker = "舞亜"
# 「何事！？」
line = "「何事！？」"

[[dialogue]]
speaker = "ソフィア"
# 「見てくださいっ！　あそこっ、謎の生命体が……いや、生命体じゃない？」
line = "「見てくださいっ！　あそこっ、謎の生命体が……いや、生命体じゃない？」"

[[dialogue]]
speaker = "ウズメイア"
# 「おばけだね～」
line = "「おばけだね～」"

[[dialogue]]
speaker = "舞亜"
# 「ゾンビっぽい感じもするよ？」
line = "「ゾンビっぽい感じもするよ？」"

[[dialogue]]
speaker = "ソフィア"
# 「どっちでもいいです！　はやく何とかしましょう！」
line = "「どっちでもいいです！　はやく何とかしましょう！」"

[[dialogue]]
speaker = "ウズメイア"
# 「りょーかいっ！　こら～、逃げるな～！」
line = "「りょーかいっ！　こら～、逃げるな～！」"

[[dialogue]]
speaker = "舞亜"
# 「任せて！　挟み撃ちにして……って、すり抜けた！？」
line = "「任せて！　挟み撃ちにして……って、すり抜けた！？」"

[[dialogue]]
speaker = "ウズメイア"
# 「ほら、やっぱりおばけだった！」
line = "「ほら、やっぱりおばけだった！」"

[[dialogue]]
speaker = "ソフィア"
# 「霊体……？　幽霊の性質を備えているようですね」
line = "「霊体……？　幽霊の性質を備えているようですね」"

[[dialogue]]
speaker = "ウズメイア"
# 「捕まえようにも、これじゃどうしようもなくない？」
line = "「捕まえようにも、これじゃどうしようもなくない？」"

[[dialogue]]
speaker = "ソフィア"
# 「むむむ……一体どうすれば……」
line = "「むむむ……一体どうすれば……」"

[[dialogue]]
speaker = "舞亜"
# 「相手が幽霊なら簡単でしょ。こっちには幽霊のお姫様がいるんだから。ねっ、ジャクリーヌちゃん」
line = "「相手が幽霊なら簡単でしょ。こっちには幽霊のお姫様がいるんだから。ねっ、ジャクリーヌちゃん」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「や、ヤバいゆ……大変なことになったゆ……」
line = "「や、ヤバいゆ……大変なことになったゆ……」"

[[dialogue]]
speaker = "舞亜"
# 「えーと……ジャクリーヌちゃん？」
line = "「えーと……ジャクリーヌちゃん？」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「なな、何でもないゆ！　あんなの余とは何の関係もないゆ！」
line = "「なな、何でもないゆ！　あんなの余とは何の関係もないゆ！」"

[[dialogue]]
speaker = "ウズメイア"
# 「この反応って間違いなく関係あるやつだし！」
line = "「この反応って間違いなく関係あるやつだし！」"

[[dialogue]]
speaker = "ソフィア"
# 「ジャクリーヌさん、ちょっとオハナシしましょうか……！」
line = "「ジャクリーヌさん、ちょっとオハナシしましょうか……！」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆゆ～～～～っ！！」
line = "「ゆゆ～～～～っ！！」"
