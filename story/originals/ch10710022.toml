[[dialogue]]
speaker = "unk"
# 第２話,キサナを賭けた決闘,P
line = "第２話,キサナを賭けた決闘,P"

[[dialogue]]
speaker = "unk"
# 『ＸＥＬＯＳ』との決戦からしばらく。滞っていた星徒会業務も片付き、時間ができたので、少し出掛けることにした。
line = "『ＸＥＬＯＳ』との決戦からしばらく。滞っていた星徒会業務も片付き、時間ができたので、少し出掛けることにした。"

[[dialogue]]
speaker = "unk"
# 行き先は子どもたちの保護施設だ。キサナとともに保護した女の子がそこでお世話になっている。
line = "行き先は子どもたちの保護施設だ。キサナとともに保護した女の子がそこでお世話になっている。"

[[dialogue]]
speaker = "キサナ"
# 「げっ、なんでテメエがここにいやがる。まさかアタシと同じじゃねえだろうな？」
line = "「げっ、なんでテメエがここにいやがる。まさかアタシと同じじゃねえだろうな？」"

[[dialogue]]
speaker = "キサナ"
# 「……ついてくんじゃねえよ。クソ、別の日にすりゃよかったぜ……でも行くって言っちまったしな……」
line = "「……ついてくんじゃねえよ。クソ、別の日にすりゃよかったぜ……でも行くって言っちまったしな……」"

[[dialogue]]
speaker = "キサナ"
# 「お、着いたな……ってコラ！　いきなりしっぽ触りにくんじゃねえよ！」
line = "「お、着いたな……ってコラ！　いきなりしっぽ触りにくんじゃねえよ！」"

[[dialogue]]
speaker = "女の子"
# 「キサナお姉ちゃんのしっぽ触ると安心する～」
line = "「キサナお姉ちゃんのしっぽ触ると安心する～」"

[[dialogue]]
speaker = "キサナ"
# 「うるせえ」
line = "「うるせえ」"

[[dialogue]]
speaker = "unk"
# 彼女がキサナと保護した女の子だ。出会った頃はほとんど話さない子だったが、見違えて明るくなった。
line = "彼女がキサナと保護した女の子だ。出会った頃はほとんど話さない子だったが、見違えて明るくなった。"

[[dialogue]]
speaker = "キサナ"
# 「ったく、来るんじゃなかったぜ」
line = "「ったく、来るんじゃなかったぜ」"

[[dialogue]]
speaker = "女の子"
# 「お兄ちゃんも久しぶり。今日はキサナお姉ちゃんと一緒なんだね……あ、もしかして、ふたりは恋人なの！？」
line = "「お兄ちゃんも久しぶり。今日はキサナお姉ちゃんと一緒なんだね……あ、もしかして、ふたりは恋人なの！？」"

[[dialogue]]
speaker = "キサナ"
# 「はぁっ！？」
line = "「はぁっ！？」"

[[dialogue]]
speaker = "キサナ"
# 「んなワケねえだろ……オマエからも言ってやれ」
line = "「んなワケねえだろ……オマエからも言ってやれ」"

[[dialogue]]
speaker = "unk"
# …………違うよ
line = "…………違うよ"

[[dialogue]]
speaker = "キサナ"
# 「なんだよ、今の間は。気持ちわりぃな……」
line = "「なんだよ、今の間は。気持ちわりぃな……」"

[[dialogue]]
speaker = "unk"
# 俺はキサナのこと好きだけど
line = "俺はキサナのこと好きだけど"

[[dialogue]]
speaker = "キサナ"
# 「はあああぁっ！？　テメエ頭おかしいんじゃねえか！？」
line = "「はあああぁっ！？　テメエ頭おかしいんじゃねえか！？」"

[[dialogue]]
speaker = "キサナ"
# 「悪いもんでも食ったか？　それとも疲れてんのか？　戦いすぎてバカになったか？」
line = "「悪いもんでも食ったか？　それとも疲れてんのか？　戦いすぎてバカになったか？」"

[[dialogue]]
speaker = "キサナ"
# 「あ～、もう意味わかんねえ…………帰る」
line = "「あ～、もう意味わかんねえ…………帰る」"

[[dialogue]]
speaker = "unk"
# 伝え方が悪かったかもしれない。キサナを困惑させてしまったようだ。
line = "伝え方が悪かったかもしれない。キサナを困惑させてしまったようだ。"

[[dialogue]]
speaker = "キサナ"
# 「ああん？　テメエ、昨日の今日で何しにきやがった？」
line = "「ああん？　テメエ、昨日の今日で何しにきやがった？」"

[[dialogue]]
speaker = "unk"
# 好きだ。付き合ってほしい
line = "好きだ。付き合ってほしい"

[[dialogue]]
speaker = "unk"
# 一晩考えても、いや、考えれば考えるほど、キサナのことが頭から離れなかった。
line = "一晩考えても、いや、考えれば考えるほど、キサナのことが頭から離れなかった。"

[[dialogue]]
speaker = "キサナ"
# 「ああ？　またそれかよ。アタシをからかってんなら容赦しねえぞ」
line = "「ああ？　またそれかよ。アタシをからかってんなら容赦しねえぞ」"

[[dialogue]]
speaker = "キサナ"
# 「どてっ腹に風穴開けてやるぜ」
line = "「どてっ腹に風穴開けてやるぜ」"

[[dialogue]]
speaker = "unk"
# 杭打機が俺の胸に突き付けられる。それでも俺の答えは変わらない。
line = "杭打機が俺の胸に突き付けられる。それでも俺の答えは変わらない。"

[[dialogue]]
speaker = "unk"
# 君が好きだ
line = "君が好きだ"

[[dialogue]]
speaker = "キサナ"
# 「……意味わかんねえ」
line = "「……意味わかんねえ」"

[[dialogue]]
speaker = "キサナ"
# 「アタシは敵で……いや今は違うけどよ、敵だったことは事実だ。なのに、アタシのどこが好きなんだ？　ウソじゃねえなら言えるよな？」
line = "「アタシは敵で……いや今は違うけどよ、敵だったことは事実だ。なのに、アタシのどこが好きなんだ？　ウソじゃねえなら言えるよな？」"

[[dialogue]]
speaker = "キサナ"
# 「……意外と子どもに優しいところ、美味しそうにご飯を食べるところ、義理堅いところ、たくましくて強いところ……おい待て、最後のそれ褒めてんのか？」
line = "「……意外と子どもに優しいところ、美味しそうにご飯を食べるところ、義理堅いところ、たくましくて強いところ……おい待て、最後のそれ褒めてんのか？」"

[[dialogue]]
speaker = "キサナ"
# 「ああもう、スラスラ出てくんじゃねえか。わーったわーった。オマエはアタシのことが好きなスキモノだよ」
line = "「ああもう、スラスラ出てくんじゃねえか。わーったわーった。オマエはアタシのことが好きなスキモノだよ」"

[[dialogue]]
speaker = "キサナ"
# 「だがな、アタシもはいそうですかって受け入れるワケねえだろ」
line = "「だがな、アタシもはいそうですかって受け入れるワケねえだろ」"

[[dialogue]]
speaker = "キサナ"
# 「アタシをオマエの女にしたいってんなら、相応しいところを見せてもらおうじゃねえか。──アタシと戦え、魔王」
line = "「アタシをオマエの女にしたいってんなら、相応しいところを見せてもらおうじゃねえか。──アタシと戦え、魔王」"

[[dialogue]]
speaker = "キサナ"
# 「ただし、チャンスは一回きりだ。アタシが勝ったら、二度とふざけたこと言うんじゃねえぞ」
line = "「ただし、チャンスは一回きりだ。アタシが勝ったら、二度とふざけたこと言うんじゃねえぞ」"

[[dialogue]]
speaker = "キサナ"
# 「ここなら邪魔は入らねえだろ」
line = "「ここなら邪魔は入らねえだろ」"

[[dialogue]]
speaker = "キサナ"
# 「ぶっ潰してやるよ！　カラミティパイル！」
line = "「ぶっ潰してやるよ！　カラミティパイル！」"

[[dialogue]]
speaker = "unk"
# パイルバンカーの打撃を拳で相殺する。衝撃が全身を走った。
line = "パイルバンカーの打撃を拳で相殺する。衝撃が全身を走った。"

[[dialogue]]
speaker = "キサナ"
# 「ハッ、この程度じゃくたばんねえよな魔王さまよぉ！　ヘヴィアウトレイジ！」
line = "「ハッ、この程度じゃくたばんねえよな魔王さまよぉ！　ヘヴィアウトレイジ！」"

[[dialogue]]
speaker = "キサナ"
# 「そらそら！　ぼーっとしてると死んじまうぞ！」
line = "「そらそら！　ぼーっとしてると死んじまうぞ！」"

[[dialogue]]
speaker = "unk"
# キサナの攻撃は容赦がない。油断していたら本当に死んでしまうかも。
line = "キサナの攻撃は容赦がない。油断していたら本当に死んでしまうかも。"

[[dialogue]]
speaker = "unk"
# でもそれが彼女の生き方だ。いつも命懸け。生きるか死ぬかの道をずっと歩んできたんだ。
line = "でもそれが彼女の生き方だ。いつも命懸け。生きるか死ぬかの道をずっと歩んできたんだ。"

[[dialogue]]
speaker = "unk"
# ──だから、俺も全力で向き合わなくちゃ。
line = "──だから、俺も全力で向き合わなくちゃ。"

[[dialogue]]
speaker = "キサナ"
# 「おい、いつまで逃げ回ってんだ。そろそろ遊びは終わりにしようぜ」
line = "「おい、いつまで逃げ回ってんだ。そろそろ遊びは終わりにしようぜ」"

[[dialogue]]
speaker = "unk"
# キサナが星力をパイルバンカーに込める。俺も拳を握る。星力と、君への想いを込めて。
line = "キサナが星力をパイルバンカーに込める。俺も拳を握る。星力と、君への想いを込めて。"

[[dialogue]]
speaker = "キサナ"
# 「リベリオン、ハウリングッ！」
line = "「リベリオン、ハウリングッ！」"

[[dialogue]]
speaker = "unk"
# キサナ、好きだあぁっ！
line = "キサナ、好きだあぁっ！"

[[dialogue]]
speaker = "キサナ"
# 「ぐあああっ！」
line = "「ぐあああっ！」"

[[dialogue]]
speaker = "unk"
# キサナの全力を、俺も全力で打ち破る。めちゃくちゃな告白だけど、でも必死だった。
line = "キサナの全力を、俺も全力で打ち破る。めちゃくちゃな告白だけど、でも必死だった。"

[[dialogue]]
speaker = "キサナ"
# 「あ～あ……アタシの負けだ」
line = "「あ～あ……アタシの負けだ」"

[[dialogue]]
speaker = "unk"
# 星力を使い切り、脱力するキサナを受け止める。
line = "星力を使い切り、脱力するキサナを受け止める。"

[[dialogue]]
speaker = "キサナ"
# 「これでアタシはオマエの女だ。満足かよ」
line = "「これでアタシはオマエの女だ。満足かよ」"

[[dialogue]]
speaker = "unk"
# 死ぬほど嬉しい
line = "死ぬほど嬉しい"

[[dialogue]]
speaker = "キサナ"
# 「マジかよ。物好きにもほどがあんだろ……まぁいい、ツラ貸せ」
line = "「マジかよ。物好きにもほどがあんだろ……まぁいい、ツラ貸せ」"

[[dialogue]]
speaker = "キサナ"
# 「──ちゅ」
line = "「──ちゅ」"

[[dialogue]]
speaker = "キサナ"
# 「喜べよ、恋人さまからのキスだぜ…………おい、なんか言えよ！　はずいだろーが！」
line = "「喜べよ、恋人さまからのキスだぜ…………おい、なんか言えよ！　はずいだろーが！」"
