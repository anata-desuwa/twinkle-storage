[[dialogue]]
speaker = "unk"
# これは『マジカミ』の魔法少女４人が、『ティンクルスターナイツ』の世界から、自分たちの世界へと帰還する途中で起きた出来事──
line = "これは『マジカミ』の魔法少女４人が、『ティンクルスターナイツ』の世界から、自分たちの世界へと帰還する途中で起きた出来事──"

[[dialogue]]
speaker = "いろは"
# 「あれ？　ここってどこだろう？」
line = "「あれ？　ここってどこだろう？」"

[[dialogue]]
speaker = "花織"
# 「なんか変なところに出ちゃったけど……」
line = "「なんか変なところに出ちゃったけど……」"

[[dialogue]]
speaker = "ここあ"
# 「ん～、向こうの世界でも見たことのない場所だね～？」
line = "「ん～、向こうの世界でも見たことのない場所だね～？」"

[[dialogue]]
speaker = "陽彩"
# 「おそらくは次元の狭間みたいな場所だと思うが……。けど、おかしい……」
line = "「おそらくは次元の狭間みたいな場所だと思うが……。けど、おかしい……」"

[[dialogue]]
speaker = "陽彩"
# 「ぼくは向こうの世界へ転移する際、こんな場所を通った記憶がない」
line = "「ぼくは向こうの世界へ転移する際、こんな場所を通った記憶がない」"

[[dialogue]]
speaker = "オムニス"
# 「俺も見覚えがないな――って！　みんな、気を付けろ！」
line = "「俺も見覚えがないな――って！　みんな、気を付けろ！」"

[[dialogue]]
speaker = "いろは"
# 「！？　あれって……」
line = "「！？　あれって……」"

[[dialogue]]
speaker = "アラクネ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "陽彩"
# 「あれは、ぼくたちの世界の<b>悪魔</b>……！？」
line = "「あれは、ぼくたちの世界の<b>悪魔</b>……！？」"

[[dialogue]]
speaker = "unk"
# 次元の狭間に現れた存在は、『マジカミ』の世界で魔法少女たちが戦っている『悪魔』と呼ばれる怪物だった。
line = "次元の狭間に現れた存在は、『マジカミ』の世界で魔法少女たちが戦っている『悪魔』と呼ばれる怪物だった。"

[[dialogue]]
speaker = "オムニス"
# 「しかも１体だけじゃないぞ……！」
line = "「しかも１体だけじゃないぞ……！」"

[[dialogue]]
speaker = "アラクネ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ここあ"
# 「んにゃ！？　いっぱい出てきた！」
line = "「んにゃ！？　いっぱい出てきた！」"

[[dialogue]]
speaker = "花織"
# 「悪魔がどうしてこんなところにっ！？」
line = "「悪魔がどうしてこんなところにっ！？」"

[[dialogue]]
speaker = "陽彩"
# 「……ここが次元の狭間だと仮定するなら」
line = "「……ここが次元の狭間だと仮定するなら」"

[[dialogue]]
speaker = "陽彩"
# 「ぼくたちが自分たちの世界へすぐに帰還できず、この場所に出たのは、こいつらのせいかもしれない」
line = "「ぼくたちが自分たちの世界へすぐに帰還できず、この場所に出たのは、こいつらのせいかもしれない」"

[[dialogue]]
speaker = "陽彩"
# 「世界を繋ぐ移動経路にたくさんの悪魔が集まったことで、渋滞が起こってこんな状況になってしまったと考えれば、説明はつく……」
line = "「世界を繋ぐ移動経路にたくさんの悪魔が集まったことで、渋滞が起こってこんな状況になってしまったと考えれば、説明はつく……」"

[[dialogue]]
speaker = "ここあ"
# 「これ、放っておいたらマズくない？　もしかしなくても、ここに集まってきてるのって……」
line = "「これ、放っておいたらマズくない？　もしかしなくても、ここに集まってきてるのって……」"

[[dialogue]]
speaker = "陽彩"
# 「ああ……ぼくのせいだ。ぼくが向こうの世界への道を開けてしまったから、ここに集まってきた。悪魔たちが向こうの世界へ行こうとして……！」
line = "「ああ……ぼくのせいだ。ぼくが向こうの世界への道を開けてしまったから、ここに集まってきた。悪魔たちが向こうの世界へ行こうとして……！」"

[[dialogue]]
speaker = "いろは"
# 「大丈夫だよ、陽彩ちゃん――」
line = "「大丈夫だよ、陽彩ちゃん――」"

[[dialogue]]
speaker = "いろは"
# 「そんなことをさせない為に、あたしたち魔法少女がいるんだから！」
line = "「そんなことをさせない為に、あたしたち魔法少女がいるんだから！」"

[[dialogue]]
speaker = "花織"
# 「……まぁ、こうなっちゃったら、ウチらがやるしかないよね。すっごく大変そうだけど」
line = "「……まぁ、こうなっちゃったら、ウチらがやるしかないよね。すっごく大変そうだけど」"

[[dialogue]]
speaker = "ここあ"
# 「にゃははっ♪　でもカオリン、なんか今日はちょっと、いつもよりやる気出てな～い？」
line = "「にゃははっ♪　でもカオリン、なんか今日はちょっと、いつもよりやる気出てな～い？」"

[[dialogue]]
speaker = "いろは"
# 「向こうの世界で魔法少女に出会ったからだったりして♪」
line = "「向こうの世界で魔法少女に出会ったからだったりして♪」"

[[dialogue]]
speaker = "花織"
# 「いやいや、向こうで知り合った友達を守る為だから！」
line = "「いやいや、向こうで知り合った友達を守る為だから！」"

[[dialogue]]
speaker = "ここあ"
# 「だよね～、サチサチたちの為にも、ここあたちが頑張らないと！」
line = "「だよね～、サチサチたちの為にも、ここあたちが頑張らないと！」"

[[dialogue]]
speaker = "いろは"
# 「うん！　ここにいる悪魔は、あたしたちで全部やっつけよう！」
line = "「うん！　ここにいる悪魔は、あたしたちで全部やっつけよう！」"

[[dialogue]]
speaker = "陽彩"
# 「だったら、ぼくも……！」
line = "「だったら、ぼくも……！」"

[[dialogue]]
speaker = "ここあ"
# 「んにゃ、あきあきは無理しちゃダメだよ。まだ体が十分に回復してないでしょ？」
line = "「んにゃ、あきあきは無理しちゃダメだよ。まだ体が十分に回復してないでしょ？」"

[[dialogue]]
speaker = "花織"
# 「ここはウチらに任せて、休んでて」
line = "「ここはウチらに任せて、休んでて」"

[[dialogue]]
speaker = "いろは"
# 「オムオム、陽彩ちゃんのこと、お願い！」
line = "「オムオム、陽彩ちゃんのこと、お願い！」"

[[dialogue]]
speaker = "オムニス"
# 「ああ、わかった！　気を付けろよ、みんな！」
line = "「ああ、わかった！　気を付けろよ、みんな！」"

[[dialogue]]
speaker = "いろは"
# 「よ～し！　カオリン、ここにゃん、行っくよ～！」
line = "「よ～し！　カオリン、ここにゃん、行っくよ～！」"

[[dialogue]]
speaker = "unk"
# こうして、魔法少女たちによる悪魔討伐が開始されるのだった。
line = "こうして、魔法少女たちによる悪魔討伐が開始されるのだった。"
