[[dialogue]]
speaker = "unk"
# 第２話,アナと惚れ薬,P
line = "第２話,アナと惚れ薬,P"

[[dialogue]]
speaker = "unk"
# 購買部まで買い物に出かけた俺は、アナとアニマ先輩が一緒にいるところを見つけた。
line = "購買部まで買い物に出かけた俺は、アナとアニマ先輩が一緒にいるところを見つけた。"

[[dialogue]]
speaker = "アニマ"
# 「頼むヨ～、アナ。この小瓶の薬を、会長にこっそり飲ませてくれるだけでいいんダ！」
line = "「頼むヨ～、アナ。この小瓶の薬を、会長にこっそり飲ませてくれるだけでいいんダ！」"

[[dialogue]]
speaker = "アナ"
# 「却下です。副作用の詳細がわからないものを、会長で試すのは感心しません。私の恋人なんですよ」
line = "「却下です。副作用の詳細がわからないものを、会長で試すのは感心しません。私の恋人なんですよ」"

[[dialogue]]
speaker = "unk"
# （アナ、俺のことを心配して……！）
line = "（アナ、俺のことを心配して……！）"

[[dialogue]]
speaker = "アニマ"
# 「このとーりダ。ほら、アナの大好きな抹茶クレープ専門店のプラチナ割引チケットもつけちゃうヨ？」
line = "「このとーりダ。ほら、アナの大好きな抹茶クレープ専門店のプラチナ割引チケットもつけちゃうヨ？」"

[[dialogue]]
speaker = "アナ"
# 「……話を聞きましょう」
line = "「……話を聞きましょう」"

[[dialogue]]
speaker = "unk"
# ――ちょっと待って！！
line = "――ちょっと待って！！"

[[dialogue]]
speaker = "アニマ"
# 「おや、会長。いつの間にそこにいたんダ？　急に声を出したら驚くじゃないカ」
line = "「おや、会長。いつの間にそこにいたんダ？　急に声を出したら驚くじゃないカ」"

[[dialogue]]
speaker = "アニマ"
# 「しかし、聞いていたのなら話は早イ！　アナはもうアニマの手中ダ。キミにはこの薬を飲んでもらうゾ！」
line = "「しかし、聞いていたのなら話は早イ！　アナはもうアニマの手中ダ。キミにはこの薬を飲んでもらうゾ！」"

[[dialogue]]
speaker = "アナ"
# 「話を聞くと言ったまでです。この前みたいに会長に翼が生え、山奥に消えてしまうようなことは避けたいです。薬の内容を教えてください」
line = "「話を聞くと言ったまでです。この前みたいに会長に翼が生え、山奥に消えてしまうようなことは避けたいです。薬の内容を教えてください」"

[[dialogue]]
speaker = "アニマ"
# 「フヒヒ、ではご紹介しよウ！　この薬は……じゃじゃん！　アニマ特製のラブラブポーションボム！」
line = "「フヒヒ、ではご紹介しよウ！　この薬は……じゃじゃん！　アニマ特製のラブラブポーションボム！」"

[[dialogue]]
speaker = "アニマ"
# 「ボムと名は付いているが、小瓶に入ってる通り飲み薬。簡単に言えば惚れ薬だナ」
line = "「ボムと名は付いているが、小瓶に入ってる通り飲み薬。簡単に言えば惚れ薬だナ」"

[[dialogue]]
speaker = "アニマ"
# 「こいつを飲めばたちまち、相手のことを好きで好きでたまらなくなり、スキンシップをしたくなるという一品サ！」
line = "「こいつを飲めばたちまち、相手のことを好きで好きでたまらなくなり、スキンシップをしたくなるという一品サ！」"

[[dialogue]]
speaker = "アナ"
# 「スキンシップなんて会長といつもしています。つまり、リスクゼロで抹茶クレープチケットをゲット。今日は良い日ですね」
line = "「スキンシップなんて会長といつもしています。つまり、リスクゼロで抹茶クレープチケットをゲット。今日は良い日ですね」"

[[dialogue]]
speaker = "unk"
# で、副作用は……？
line = "で、副作用は……？"

[[dialogue]]
speaker = "アニマ"
# 「フヒヒ♪　それはわからなイ！　わからないから試すんダロウ？　ほれアナ、チケットは渡しておこう」
line = "「フヒヒ♪　それはわからなイ！　わからないから試すんダロウ？　ほれアナ、チケットは渡しておこう」"

[[dialogue]]
speaker = "アナ"
# 「儲けました。で、この薬……私が飲ませるんですよね？」
line = "「儲けました。で、この薬……私が飲ませるんですよね？」"

[[dialogue]]
speaker = "アニマ"
# 「当たり前ダ。アニマが飲ませたら、会長がアニマに惚れちゃうかもしれないゾ？」
line = "「当たり前ダ。アニマが飲ませたら、会長がアニマに惚れちゃうかもしれないゾ？」"

[[dialogue]]
speaker = "アナ"
# 「それは絶対にダメです！　……えっと、飲ませる前に私の星力を込めるんですね」
line = "「それは絶対にダメです！　……えっと、飲ませる前に私の星力を込めるんですね」"

[[dialogue]]
speaker = "アニマ"
# 「そうダ♪　込められた星力の使い手に惚れるよう、配合してあるからナ」
line = "「そうダ♪　込められた星力の使い手に惚れるよう、配合してあるからナ」"

[[dialogue]]
speaker = "アナ"
# 「では……」
line = "「では……」"

[[dialogue]]
speaker = "アナ"
# 「薬に星力、チャージ完了です。会長、どうぞ」
line = "「薬に星力、チャージ完了です。会長、どうぞ」"

[[dialogue]]
speaker = "unk"
# ええい──ままよ！
line = "ええい──ままよ！"

[[dialogue]]
speaker = "アニマ"
# 「フヒヒッ！　いい飲みっぷりダ♪　どうだ会長、何か変化はあるかナ？」
line = "「フヒヒッ！　いい飲みっぷりダ♪　どうだ会長、何か変化はあるかナ？」"

[[dialogue]]
speaker = "unk"
# …………特に何もない？
line = "…………特に何もない？"

[[dialogue]]
speaker = "アニマ"
# 「むぅ、やはりカ。実はさっき、アニマの星力を込めた薬を、シュティレにも飲ませたんだが、効果がなかったんダ。今回の薬は失敗カ……」
line = "「むぅ、やはりカ。実はさっき、アニマの星力を込めた薬を、シュティレにも飲ませたんだが、効果がなかったんダ。今回の薬は失敗カ……」"

[[dialogue]]
speaker = "アナ"
# 「弟子を実験台にするのは感心しませんよ」
line = "「弟子を実験台にするのは感心しませんよ」"

[[dialogue]]
speaker = "アニマ"
# 「錬金術の発展のためならと、喜んで協力してくれたんダ。無理強いはしていないヨ」
line = "「錬金術の発展のためならと、喜んで協力してくれたんダ。無理強いはしていないヨ」"

[[dialogue]]
speaker = "アナ"
# 「……そういうことなら。では約束通り、チケットはいただきます。会長、今日の放課後にさっそく行きましょう。クレープ食べ放題です」
line = "「……そういうことなら。では約束通り、チケットはいただきます。会長、今日の放課後にさっそく行きましょう。クレープ食べ放題です」"

[[dialogue]]
speaker = "unk"
# 惚れ薬は失敗作。何の作用もなかったことに、俺は安堵したのだった――
line = "惚れ薬は失敗作。何の作用もなかったことに、俺は安堵したのだった――"

[[dialogue]]
speaker = "unk"
# ――翌日。
line = "――翌日。"

[[dialogue]]
speaker = "アニマ"
# 「やれやれ、なぜうまくいかなかったかナ？　配合は完ぺきだったはずなんだガ……」
line = "「やれやれ、なぜうまくいかなかったかナ？　配合は完ぺきだったはずなんだガ……」"

[[dialogue]]
speaker = "シュティレ"
# 「マスター……！」
line = "「マスター……！」"

[[dialogue]]
speaker = "アニマ"
# 「おぉシュティレ。どうかしたのカ？　キミが廊下を走るだなんて珍しい──」
line = "「おぉシュティレ。どうかしたのカ？　キミが廊下を走るだなんて珍しい──」"

[[dialogue]]
speaker = "シュティレ"
# 「──愛しています！　結婚してください！！」
line = "「──愛しています！　結婚してください！！」"

[[dialogue]]
speaker = "アニマ"
# 「ハ！？　なっ、何を急に……アニマたちは女同士だゾ。こ、こら、変なところを触るんじゃなイ！！」
line = "「ハ！？　なっ、何を急に……アニマたちは女同士だゾ。こ、こら、変なところを触るんじゃなイ！！」"

[[dialogue]]
speaker = "シュティレ"
# 「マスター、愛しています。熱いベーゼがしたいです。ぶいぶいぶいのぶいっ」
line = "「マスター、愛しています。熱いベーゼがしたいです。ぶいぶいぶいのぶいっ」"

[[dialogue]]
speaker = "アニマ"
# 「おおぉ、周囲が見えないほどテンションのネジが取れてしまっているナ……もしかしなくても、昨日の惚れ薬は遅効性カ。丸１日経過した今になって効果が出ていル！」
line = "「おおぉ、周囲が見えないほどテンションのネジが取れてしまっているナ……もしかしなくても、昨日の惚れ薬は遅効性カ。丸１日経過した今になって効果が出ていル！」"

[[dialogue]]
speaker = "アニマ"
# 「しかも、スキンシップというよリ──」
line = "「しかも、スキンシップというよリ──」"

[[dialogue]]
speaker = "シュティレ"
# 「結婚しましょう。結婚です。ハネムーン。マスターと結婚したいです、ぶいぶいっ」
line = "「結婚しましょう。結婚です。ハネムーン。マスターと結婚したいです、ぶいぶいっ」"

[[dialogue]]
speaker = "アニマ"
# 「惚れるという過程をすっ飛ばして、求婚し続けるモンスターと化しているゾ……！　まずい、早く解毒薬を作らねバ！」
line = "「惚れるという過程をすっ飛ばして、求婚し続けるモンスターと化しているゾ……！　まずい、早く解毒薬を作らねバ！」"

[[dialogue]]
speaker = "シュティレ"
# 「愛しています。さぁマスター、シュティレと一緒にゴールイン。結婚してロボットアニメのように合体しましょう。ぶいっ」
line = "「愛しています。さぁマスター、シュティレと一緒にゴールイン。結婚してロボットアニメのように合体しましょう。ぶいっ」"

[[dialogue]]
speaker = "アニマ"
# 「ＩＱの低下と異常な興奮作用が見られるナ！？　これが副作用なのカ……？」
line = "「ＩＱの低下と異常な興奮作用が見られるナ！？　これが副作用なのカ……？」"

[[dialogue]]
speaker = "アニマ"
# 「やばいゾ！　会長の効果が出たら……アナの身ガ！！」
line = "「やばいゾ！　会長の効果が出たら……アナの身ガ！！」"

[[dialogue]]
speaker = "アナ"
# 「――流石はトワ先生です。星体力学、そのような応用があるのですね」
line = "「――流石はトワ先生です。星体力学、そのような応用があるのですね」"

[[dialogue]]
speaker = "トワ先生"
# 「アナちゃんは飲み込みが早いから教え甲斐があるな～♪　これからもわからないことがあったら何でも聞いてね！」
line = "「アナちゃんは飲み込みが早いから教え甲斐があるな～♪　これからもわからないことがあったら何でも聞いてね！」"

[[dialogue]]
speaker = "unk"
# アナーーーーーー！！！
line = "アナーーーーーー！！！"

[[dialogue]]
speaker = "アナ"
# 「大きな声を出してどうしたのですか？　星徒会長ともあろうお方が、廊下を走っては……」
line = "「大きな声を出してどうしたのですか？　星徒会長ともあろうお方が、廊下を走っては……」"

[[dialogue]]
speaker = "トワ先生"
# 「そうだよ会長くん、キミはみんなのお手本にならないといけないのに──」
line = "「そうだよ会長くん、キミはみんなのお手本にならないといけないのに──」"

[[dialogue]]
speaker = "アナ"
# 「え、ちょっと顔が近いで――んむぅうっ！？」
line = "「え、ちょっと顔が近いで――んむぅうっ！？」"

[[dialogue]]
speaker = "トワ先生"
# 「ぎゃーー！？　待って待って、教師の前でそんな熱いキスを――って、本当に何で～～っ！？」
line = "「ぎゃーー！？　待って待って、教師の前でそんな熱いキスを――って、本当に何で～～っ！？」"

[[dialogue]]
speaker = "アナ"
# 「ん、ちゅ……ちゅぱっ……！　なな、何を急にっ！？」
line = "「ん、ちゅ……ちゅぱっ……！　なな、何を急にっ！？」"

[[dialogue]]
speaker = "unk"
# アナ、結婚しよう！
line = "アナ、結婚しよう！"

[[dialogue]]
speaker = "アナ"
# 「ふぁぁああ――！？」
line = "「ふぁぁああ――！？」"

[[dialogue]]
speaker = "トワ先生"
# 「何これ何これ、何が起こってるの――！？」
line = "「何これ何これ、何が起こってるの――！？」"

[[dialogue]]
speaker = "unk"
# 愛してるんだ！　結婚しよう！
line = "愛してるんだ！　結婚しよう！"

[[dialogue]]
speaker = "アナ"
# 「あ、えっと……は…………はい<emoji=heart04>」
line = "「あ、えっと……は…………はい<emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
# 「わあぁぁ！　おめでとおおお？？　って、婚期が遅れるだけでも辛いのに！　目の前で生徒に先越されちゃったーーー！！？？」
line = "「わあぁぁ！　おめでとおおお？？　って、婚期が遅れるだけでも辛いのに！　目の前で生徒に先越されちゃったーーー！！？？」"

[[dialogue]]
speaker = "アニマ"
# 「会長、目を覚ますんダ──解毒薬、シュート！！」
line = "「会長、目を覚ますんダ──解毒薬、シュート！！」"

[[dialogue]]
speaker = "アナ"
# 「お、おはようございます……会長、記憶はいかがですか？」
line = "「お、おはようございます……会長、記憶はいかがですか？」"

[[dialogue]]
speaker = "unk"
# うぅ……何も思い出せない……
line = "うぅ……何も思い出せない……"

[[dialogue]]
speaker = "アニマ"
# 「ほっ……シュティレと同じだナ。薬の効果で暴走している間の記憶は消えるらしイ！　これでめでたシ、めでたシ――」
line = "「ほっ……シュティレと同じだナ。薬の効果で暴走している間の記憶は消えるらしイ！　これでめでたシ、めでたシ――」"

[[dialogue]]
speaker = "アナ"
# 「なるわけないでしょう！　私、私っ……人前であんな恥ずかしいことを……！！」
line = "「なるわけないでしょう！　私、私っ……人前であんな恥ずかしいことを……！！」"

[[dialogue]]
speaker = "アニマ"
# 「ま、まぁいいじゃないカ。相思相愛のキミたちのことダ、きっとプロポーズまがいなイチャイチャもすでに色々しているんダロウ？」
line = "「ま、まぁいいじゃないカ。相思相愛のキミたちのことダ、きっとプロポーズまがいなイチャイチャもすでに色々しているんダロウ？」"

[[dialogue]]
speaker = "アニマ"
# 「錬金術に失敗は付きものダ！　ここは海のように広い心で、細かいことは水にながしてだナ……？」
line = "「錬金術に失敗は付きものダ！　ここは海のように広い心で、細かいことは水にながしてだナ……？」"

[[dialogue]]
speaker = "アナ"
# 「とはいえ、会長を実験台に差し出した私にも責任はあります……」
line = "「とはいえ、会長を実験台に差し出した私にも責任はあります……」"

[[dialogue]]
speaker = "アナ"
# 「２人きりの時であれば、ああいったトラブルが起きるのもやぶさかではなかったのですが……丸１日の遅効性は想定外でした」
line = "「２人きりの時であれば、ああいったトラブルが起きるのもやぶさかではなかったのですが……丸１日の遅効性は想定外でした」"

[[dialogue]]
speaker = "アニマ"
# 「お、おォう。これが『ごちそうさま』というやつなのカ……？」
line = "「お、おォう。これが『ごちそうさま』というやつなのカ……？」"

[[dialogue]]
speaker = "トワ先生"
# 「ううぅっ、流れ弾で私だけひどいダメージ……も、もういっそのこと、私も錬金術の力を借りるしか……」
line = "「ううぅっ、流れ弾で私だけひどいダメージ……も、もういっそのこと、私も錬金術の力を借りるしか……」"

[[dialogue]]
speaker = "unk"
# なぜか頬を赤らめてモジモジしているアナと、珍しくドン引きの顔をしているアニマ先輩、そしてなぜかさめざめと涙を流すトワ先生……
line = "なぜか頬を赤らめてモジモジしているアナと、珍しくドン引きの顔をしているアニマ先輩、そしてなぜかさめざめと涙を流すトワ先生……"

[[dialogue]]
speaker = "unk"
# 一体全体、何があったのか。いくら考えても、ずきずきと痛む頭では思い出せないのだった──
line = "一体全体、何があったのか。いくら考えても、ずきずきと痛む頭では思い出せないのだった──"
