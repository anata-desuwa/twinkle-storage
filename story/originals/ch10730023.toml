[[dialogue]]
speaker = "unk"
# 第３話,リノとリコリンフィア,P
line = "第３話,リノとリコリンフィア,P"

[[dialogue]]
speaker = "unk"
# ある休日、リコから話があると言われ、私はリゾート結界のプライベートビーチへと足を運んでいた。
line = "ある休日、リコから話があると言われ、私はリゾート結界のプライベートビーチへと足を運んでいた。"

[[dialogue]]
speaker = "リコリンフィア"
# 「わざわざ呼び出してすまないな、リノ」
line = "「わざわざ呼び出してすまないな、リノ」"

[[dialogue]]
speaker = "リノ"
# 「それは構わないけど……リコ、２人きりで話って何かしら？　また公安委員会の仕事？」
line = "「それは構わないけど……リコ、２人きりで話って何かしら？　また公安委員会の仕事？」"

[[dialogue]]
speaker = "リコリンフィア"
# 「いいや。今日は私情だ」
line = "「いいや。今日は私情だ」"

[[dialogue]]
speaker = "リノ"
# 「私情……？」
line = "「私情……？」"

[[dialogue]]
speaker = "リコリンフィア"
# 「まあ、海の家で落ち着いて、話そうじゃないか」
line = "「まあ、海の家で落ち着いて、話そうじゃないか」"

[[dialogue]]
speaker = "unk"
# そうしてリコに促され、海の家に入り、席に着く。
line = "そうしてリコに促され、海の家に入り、席に着く。"

[[dialogue]]
speaker = "リノ"
# 「まさか、昼間からお酒を飲んで話だなんて……」
line = "「まさか、昼間からお酒を飲んで話だなんて……」"

[[dialogue]]
speaker = "リコリンフィア"
# 「リップルに頼んで、ビールサーバーを付けといて貰ったんだ。大人同士の話し合いには、少しは毒も必要だろう？」
line = "「リップルに頼んで、ビールサーバーを付けといて貰ったんだ。大人同士の話し合いには、少しは毒も必要だろう？」"

[[dialogue]]
speaker = "リノ"
# 「毒って……」
line = "「毒って……」"

[[dialogue]]
speaker = "unk"
# リコが運んで来たビールジョッキに、私は口を付ける。
line = "リコが運んで来たビールジョッキに、私は口を付ける。"

[[dialogue]]
speaker = "リコリンフィア"
# 「感情の紐を緩めてくれる毒だ。さて、今日呼び出した本題だが――」
line = "「感情の紐を緩めてくれる毒だ。さて、今日呼び出した本題だが――」"

[[dialogue]]
speaker = "リコリンフィア"
# 「リノ、お前ぶっちゃけ、少年を異性として見ているだろう？」
line = "「リノ、お前ぶっちゃけ、少年を異性として見ているだろう？」"

[[dialogue]]
speaker = "リノ"
# 「ぶほっ！？　ごほっ！　ごほっ……！！」
line = "「ぶほっ！？　ごほっ！　ごほっ……！！」"

[[dialogue]]
speaker = "unk"
# ビールを飲んでいた私はむせてしまう。
line = "ビールを飲んでいた私はむせてしまう。"

[[dialogue]]
speaker = "リノ"
# 「な、なんで……！？」
line = "「な、なんで……！？」"

[[dialogue]]
speaker = "リコリンフィア"
# 「お前は動揺すると分かりやすいからな。この前、街で会った時なんて、明らかに挙動不審だったぞ」
line = "「お前は動揺すると分かりやすいからな。この前、街で会った時なんて、明らかに挙動不審だったぞ」"

[[dialogue]]
speaker = "リコリンフィア"
# 「で、最近は少年のことで悩んでしまっている。違うか？」
line = "「で、最近は少年のことで悩んでしまっている。違うか？」"

[[dialogue]]
speaker = "リノ"
# 「……さすがは公安委員会の本部長ね」
line = "「……さすがは公安委員会の本部長ね」"

[[dialogue]]
speaker = "リコリンフィア"
# 「ああ、私に下手な隠し事はできない。だから正直に自白してしまった方が楽になれるぞ」
line = "「ああ、私に下手な隠し事はできない。だから正直に自白してしまった方が楽になれるぞ」"

[[dialogue]]
speaker = "リノ"
# 「……そうね。わかったわ」
line = "「……そうね。わかったわ」"

[[dialogue]]
speaker = "unk"
# 私はそれから、他の誰にも打ち明けられなかった『夢』のことを、彼女に話した。
line = "私はそれから、他の誰にも打ち明けられなかった『夢』のことを、彼女に話した。"

[[dialogue]]
speaker = "リコリンフィア"
# 「なるほど……平行世界では少年と恋人関係になっていて、お互いにその記憶を体験してしまった……か」
line = "「なるほど……平行世界では少年と恋人関係になっていて、お互いにその記憶を体験してしまった……か」"

[[dialogue]]
speaker = "リノ"
# 「ええ。それ以来、私はクロトのことを前みたいに見られなくなってしまって……」
line = "「ええ。それ以来、私はクロトのことを前みたいに見られなくなってしまって……」"

[[dialogue]]
speaker = "リコリンフィア"
# 「ふむ……」
line = "「ふむ……」"

[[dialogue]]
speaker = "リコリンフィア"
# 「リノ。私は男性経験も、恋愛経験もない」
line = "「リノ。私は男性経験も、恋愛経験もない」"

[[dialogue]]
speaker = "リコリンフィア"
# 「当然、子育てをしたことはないし、魔女であるリノとは年も離れている」
line = "「当然、子育てをしたことはないし、魔女であるリノとは年も離れている」"

[[dialogue]]
speaker = "リコリンフィア"
# 「それでも、１人の友人として意見を述べさせてもらうなら――」
line = "「それでも、１人の友人として意見を述べさせてもらうなら――」"

[[dialogue]]
speaker = "リコリンフィア"
# 「少年のあの様子は、脈アリだと思うぞ」
line = "「少年のあの様子は、脈アリだと思うぞ」"

[[dialogue]]
speaker = "リノ"
# 「そ、そうなの！？」
line = "「そ、そうなの！？」"

[[dialogue]]
speaker = "リコリンフィア"
# 「ああ。情報収集が趣味の、私の直感だがな」
line = "「ああ。情報収集が趣味の、私の直感だがな」"

[[dialogue]]
speaker = "リコリンフィア"
# 「その上で、血が繋がっていないのなら、あとはお前たちの気持ちの問題だ」
line = "「その上で、血が繋がっていないのなら、あとはお前たちの気持ちの問題だ」"

[[dialogue]]
speaker = "リコリンフィア"
# 「前提として、リノと少年が、血が繋がった親子だというなら頭を抱えるところだが、幸いなことにそうじゃない」
line = "「前提として、リノと少年が、血が繋がった親子だというなら頭を抱えるところだが、幸いなことにそうじゃない」"

[[dialogue]]
speaker = "リコリンフィア"
# 「だから、後は倫理観を取るか、幸福度を取るかの話だ」
line = "「だから、後は倫理観を取るか、幸福度を取るかの話だ」"

[[dialogue]]
speaker = "リコリンフィア"
# 「端から見て気持ち悪いと感じる者は当然いるだろう。周りからそう思われたくないなら、倫理観を取ればいい」
line = "「端から見て気持ち悪いと感じる者は当然いるだろう。周りからそう思われたくないなら、倫理観を取ればいい」"

[[dialogue]]
speaker = "リコリンフィア"
# 「だが、それはお前たちにとって本当に幸福なことか？　リノが幸福を選ぶことで、周りの誰かに迷惑をかけるわけでもない」
line = "「だが、それはお前たちにとって本当に幸福なことか？　リノが幸福を選ぶことで、周りの誰かに迷惑をかけるわけでもない」"

[[dialogue]]
speaker = "リコリンフィア"
# 「それに、寿命が長い魔族が人間界に入り混じるようになって久しい昨今、人間の親子くらい年が離れた男女が結ばれるのは、そう珍しいことでもない」
line = "「それに、寿命が長い魔族が人間界に入り混じるようになって久しい昨今、人間の親子くらい年が離れた男女が結ばれるのは、そう珍しいことでもない」"

[[dialogue]]
speaker = "リコリンフィア"
# 「だから――最も大事なのは、リノがどうしたいかだ」
line = "「だから――最も大事なのは、リノがどうしたいかだ」"

[[dialogue]]
speaker = "リノ"
# 「私が、どうしたいか……」
line = "「私が、どうしたいか……」"

[[dialogue]]
speaker = "リコリンフィア"
# 「少年と親子のままでいたいのか。それとも、少年と恋人になりたいのか」
line = "「少年と親子のままでいたいのか。それとも、少年と恋人になりたいのか」"

[[dialogue]]
speaker = "unk"
# リコはそこで、おどけたようにふっと笑ってみせて。
line = "リコはそこで、おどけたようにふっと笑ってみせて。"

[[dialogue]]
speaker = "リコリンフィア"
# 「まぁ、もし恋人になったら、人前では親子として振舞わないように心がけた方がいいとは思うがな」
line = "「まぁ、もし恋人になったら、人前では親子として振舞わないように心がけた方がいいとは思うがな」"

[[dialogue]]
speaker = "リノ"
# 「……ふふっ、そうね。私なら、ついやっちゃいそう」
line = "「……ふふっ、そうね。私なら、ついやっちゃいそう」"

[[dialogue]]
speaker = "リノ"
# 「――リコ、ありがとう。私、クロトとちゃんと話してみるわ」
line = "「――リコ、ありがとう。私、クロトとちゃんと話してみるわ」"

[[dialogue]]
speaker = "リノ"
# 「私の気持ちだけじゃなくて、クロトの気持ちもちゃんと聞いてみないと」
line = "「私の気持ちだけじゃなくて、クロトの気持ちもちゃんと聞いてみないと」"

[[dialogue]]
speaker = "リコリンフィア"
# 「そうだな。……まぁ、今日は休日だ。ゆっくり酒を飲みながら、もう少し話して行こうじゃないか」
line = "「そうだな。……まぁ、今日は休日だ。ゆっくり酒を飲みながら、もう少し話して行こうじゃないか」"

[[dialogue]]
speaker = "リノ"
# 「そういえば、リコと飲むのは随分久しぶりね」
line = "「そういえば、リコと飲むのは随分久しぶりね」"

[[dialogue]]
speaker = "リコリンフィア"
# 「私は外だと一応、附属生の肩書きがあるのでな。普段は家飲みだ」
line = "「私は外だと一応、附属生の肩書きがあるのでな。普段は家飲みだ」"

[[dialogue]]
speaker = "リノ"
# 「なら今度、私たちの家に飲みに来る？」
line = "「なら今度、私たちの家に飲みに来る？」"

[[dialogue]]
speaker = "リコリンフィア"
# 「ふっ、いいのか？　少年との愛の巣にお邪魔しても」
line = "「ふっ、いいのか？　少年との愛の巣にお邪魔しても」"

[[dialogue]]
speaker = "リノ"
# 「あ、愛の巣だなんてそんな……えへへ<emoji=heart04>」
line = "「あ、愛の巣だなんてそんな……えへへ<emoji=heart04>」"

[[dialogue]]
speaker = "リコリンフィア"
# 「その反応がもう、答えになっているじゃないか。ちなみに、リノは少年のどんなところが好きなんだ？」
line = "「その反応がもう、答えになっているじゃないか。ちなみに、リノは少年のどんなところが好きなんだ？」"

[[dialogue]]
speaker = "リノ"
# 「え～？　それはもう、全部よ～、全部♪　欠点も含めてね<emoji=heart04>」
line = "「え～？　それはもう、全部よ～、全部♪　欠点も含めてね<emoji=heart04>」"

[[dialogue]]
speaker = "リコリンフィア"
# 「親バカが色恋に転じるとこうなるわけか。興味深い」
line = "「親バカが色恋に転じるとこうなるわけか。興味深い」"

[[dialogue]]
speaker = "リノ"
# 「リコ、毒舌～」
line = "「リコ、毒舌～」"

[[dialogue]]
speaker = "リコリンフィア"
# 「私は毒使いの星騎士なのでな」
line = "「私は毒使いの星騎士なのでな」"

[[dialogue]]
speaker = "unk"
# それからも私たちは、ビールを飲みながら久しぶりにゆっくりと語らうのだった――
line = "それからも私たちは、ビールを飲みながら久しぶりにゆっくりと語らうのだった――"
