[[dialogue]]
speaker = "ミア"
# 「ミアね。大きくなったらママとパパみたいな、りっぱな星騎士になるの！」
line = "「ミアね。大きくなったらママとパパみたいな、りっぱな星騎士になるの！」"

[[dialogue]]
speaker = "unk"
# それが幼い頃からの私の口癖だった。
line = "それが幼い頃からの私の口癖だった。"

[[dialogue]]
speaker = "unk"
# 私にとってママとパパは、目標で、理想で、誇りで──自分もいつかママとパパのような正義の味方になることを信じて疑わなかった。
line = "私にとってママとパパは、目標で、理想で、誇りで──自分もいつかママとパパのような正義の味方になることを信じて疑わなかった。"

[[dialogue]]
speaker = "unk"
# だけど──
line = "だけど──"

[[dialogue]]
speaker = "ミア"
# 「コラー、ケンカはやめなさーい！」
line = "「コラー、ケンカはやめなさーい！」"

[[dialogue]]
speaker = "同級生Ａ"
# 「やったなっ、おまえっ……！」
line = "「やったなっ、おまえっ……！」"

[[dialogue]]
speaker = "同級生Ｂ"
# 「おまえこそっ……！」
line = "「おまえこそっ……！」"

[[dialogue]]
speaker = "ミア"
# 「だからやめなさいってば！　言うこと聞きなさいよっ～！」
line = "「だからやめなさいってば！　言うこと聞きなさいよっ～！」"

[[dialogue]]
speaker = "同級生Ａ"
# 「うるせーなっ。いつもいつも、しゃしゃりでてくんなよ、このちんちくりんっ」
line = "「うるせーなっ。いつもいつも、しゃしゃりでてくんなよ、このちんちくりんっ」"

[[dialogue]]
speaker = "ミア"
# 「なっ……！」
line = "「なっ……！」"

[[dialogue]]
speaker = "同級生Ｂ"
# 「そーだそーだっ。とめたきゃとめてみろよっ。止められる星力も持ってないくせにっ」
line = "「そーだそーだっ。とめたきゃとめてみろよっ。止められる星力も持ってないくせにっ」"

[[dialogue]]
speaker = "ミア"
# 「あうっ……」
line = "「あうっ……」"

[[dialogue]]
speaker = "unk"
# だけど附属校に入学して現実を知った。
line = "だけど附属校に入学して現実を知った。"

[[dialogue]]
speaker = "unk"
# 私の星力は平凡もいいところで、体格に至っては同世代の子たちより圧倒的に劣っていたから。
line = "私の星力は平凡もいいところで、体格に至っては同世代の子たちより圧倒的に劣っていたから。"

[[dialogue]]
speaker = "unk"
# 同級生たちのケンカを止めることすらできなくて、そんな自分がとても歯がゆかった。
line = "同級生たちのケンカを止めることすらできなくて、そんな自分がとても歯がゆかった。"

[[dialogue]]
speaker = "同級生Ａ"
# 「ちびっ子はおとなしくその辺に隠れてろよ。出てきてもどーせ何もできねーんだから」
line = "「ちびっ子はおとなしくその辺に隠れてろよ。出てきてもどーせ何もできねーんだから」"

[[dialogue]]
speaker = "同級生Ｂ"
# 「親が星騎士だからって調子に乗るなってのっ。お前の実力じゃプリマステラなんて夢のまた夢じゃんか」
line = "「親が星騎士だからって調子に乗るなってのっ。お前の実力じゃプリマステラなんて夢のまた夢じゃんか」"

[[dialogue]]
speaker = "ミア"
# 「そんなこと、ぐすっ、ないもんっ……！」
line = "「そんなこと、ぐすっ、ないもんっ……！」"

[[dialogue]]
speaker = "unk"
# 小さいからって侮られることが悔しかった。夢を否定されることが許せなかった。
line = "小さいからって侮られることが悔しかった。夢を否定されることが許せなかった。"

[[dialogue]]
speaker = "unk"
# 何より、虚勢を張って言い返すことしかできない自分が悲しかった──
line = "何より、虚勢を張って言い返すことしかできない自分が悲しかった──"

[[dialogue]]
speaker = "ミア"
# 「何やってるんだろ私……。昔のこと思い出して、泣きながら会長さんから逃げだしちゃって……」
line = "「何やってるんだろ私……。昔のこと思い出して、泣きながら会長さんから逃げだしちゃって……」"

[[dialogue]]
speaker = "ミア"
# 「こんなことじゃ会長さんに心配されるのも当然よ……」
line = "「こんなことじゃ会長さんに心配されるのも当然よ……」"

[[dialogue]]
speaker = "ミア"
# 「せっかくプリマステラになったのに……。凡人なりに頑張って、死に物狂いで努力して、ようやくスタートラインに立てたのに……」
line = "「せっかくプリマステラになったのに……。凡人なりに頑張って、死に物狂いで努力して、ようやくスタートラインに立てたのに……」"

[[dialogue]]
speaker = "ミア"
# 「なのに駄々っ子みたいに<ruby=わめ>喚</ruby>いて、虚勢を張って、挙げ句の果てに泣きながら逃げちゃうなんて……あの頃から私、何も変わってない」
line = "「なのに駄々っ子みたいに<ruby>喚<rt>わめ</rt></ruby>いて、虚勢を張って、挙げ句の果てに泣きながら逃げちゃうなんて……あの頃から私、何も変わってない」"

[[dialogue]]
speaker = "ミア"
# 「戻ろう。戻って会長さんに謝らなくちゃ……」
line = "「戻ろう。戻って会長さんに謝らなくちゃ……」"

[[dialogue]]
speaker = "ミア"
# 「悔しいけど、みんなの言う通りだもん。エリス先輩が敵わなかった相手を一人で捕まえようだなんて無謀にも程があるわ……」
line = "「悔しいけど、みんなの言う通りだもん。エリス先輩が敵わなかった相手を一人で捕まえようだなんて無謀にも程があるわ……」"

[[dialogue]]
speaker = "ミア"
# 「私はもっと工夫を凝らさなくちゃ。体が小さい分、星力が平凡な分、みんなと協力したり、頭を使ったりして、物事に対処しないと」
line = "「私はもっと工夫を凝らさなくちゃ。体が小さい分、星力が平凡な分、みんなと協力したり、頭を使ったりして、物事に対処しないと」"

[[dialogue]]
speaker = "ミア"
# 「今一番大切なことは、私のチンケなプライドを守ることじゃなくて──エリス先輩たちを襲った犯人を捕まえることだもんっ」
line = "「今一番大切なことは、私のチンケなプライドを守ることじゃなくて──エリス先輩たちを襲った犯人を捕まえることだもんっ」"

[[dialogue]]
speaker = "ミア"
# 「でも犯人は何者……？　私たちぐらいの年頃で魔族、そして戦う力を持っているなら星騎士……」
line = "「でも犯人は何者……？　私たちぐらいの年頃で魔族、そして戦う力を持っているなら星騎士……」"

[[dialogue]]
speaker = "ミア"
# 「でも星徒会役員並みに強いエリス先輩を倒す星騎士なんて、私たちが知らないはずが……」
line = "「でも星徒会役員並みに強いエリス先輩を倒す星騎士なんて、私たちが知らないはずが……」"

[[dialogue]]
speaker = "ミア"
# 「な──何っ！？　ケンカっ！？　あっちの通りからだわ……！」
line = "「な──何っ！？　ケンカっ！？　あっちの通りからだわ……！」"

[[dialogue]]
speaker = "？？？"
# 「テメエ、今何しやがった？」
line = "「テメエ、今何しやがった？」"

[[dialogue]]
speaker = "男性"
# 「な、何って、パンを捨てただけだろっ。思ったような味じゃなかったし、いらねーんだからいいだろうがっ」
line = "「な、何って、パンを捨てただけだろっ。思ったような味じゃなかったし、いらねーんだからいいだろうがっ」"

[[dialogue]]
speaker = "？？？"
# 「あぁ？　でも食えただろうが。その口はゴミみてーなセリフをほざくためにあんのかよ」
line = "「あぁ？　でも食えただろうが。その口はゴミみてーなセリフをほざくためにあんのかよ」"

[[dialogue]]
speaker = "？？？"
# 「いいか、食い物は命を繋ぐものだ。なら食い物を粗末にするヤツは、命を粗末にされても仕方ねぇよなぁ？」
line = "「いいか、食い物は命を繋ぐものだ。なら食い物を粗末にするヤツは、命を粗末にされても仕方ねぇよなぁ？」"

[[dialogue]]
speaker = "男性"
# 「ゴホゴホっ、首が……離じっ、離じてぐれっ、ぐるじっ……！」
line = "「ゴホゴホっ、首が……離じっ、離じてぐれっ、ぐるじっ……！」"

[[dialogue]]
speaker = "ミア"
# 「その人から手を離しなさいっ！」
line = "「その人から手を離しなさいっ！」"

[[dialogue]]
speaker = "？？？"
# 「あぁ？　なんだテメエ。ガキはすっ込んでろよ」
line = "「あぁ？　なんだテメエ。ガキはすっ込んでろよ」"

[[dialogue]]
speaker = "ミア"
# 「いいから離してっ！　それ以上続けるなら実力行使に出るわよっ！」
line = "「いいから離してっ！　それ以上続けるなら実力行使に出るわよっ！」"

[[dialogue]]
speaker = "？？？"
# 「実力行使だぁ……？　……なんだ、その恰好、テメエ星騎士か。いいぜ、それなら相手になってやる」
line = "「実力行使だぁ……？　……なんだ、その恰好、テメエ星騎士か。いいぜ、それなら相手になってやる」"

[[dialogue]]
speaker = "男性"
# 「がふっ……！」
line = "「がふっ……！」"

[[dialogue]]
speaker = "ミア"
# 「！？　ちょっと！　やめなさいって言ってるのよ！」
line = "「！？　ちょっと！　やめなさいって言ってるのよ！」"

[[dialogue]]
speaker = "？？？"
# 「だから星騎士様に免じて一発殴るくらいにしてやったんだろうが」
line = "「だから星騎士様に免じて一発殴るくらいにしてやったんだろうが」"

[[dialogue]]
speaker = "？？？"
# 「アタシに指図すんじゃねえ。テメエみてえな正義の味方面したヤツを見てるとイライラすんだよ」
line = "「アタシに指図すんじゃねえ。テメエみてえな正義の味方面したヤツを見てるとイライラすんだよ」"

[[dialogue]]
speaker = "？？？"
# 「テメエが売ってきたケンカだ。お望み通り串刺しにしてやる。昨日の金髪女みてえに逃げてくれんなよ？」
line = "「テメエが売ってきたケンカだ。お望み通り串刺しにしてやる。昨日の金髪女みてえに逃げてくれんなよ？」"

[[dialogue]]
speaker = "ミア"
# 「昨日の金髪女って──……その耳、その尻尾」
line = "「昨日の金髪女って──……その耳、その尻尾」"

[[dialogue]]
speaker = "ミア"
# 「まさかあなたがエリス先輩を襲った犯人っ……！？」
line = "「まさかあなたがエリス先輩を襲った犯人っ……！？」"

[[dialogue]]
speaker = "？？？"
# 「あん？　なんだ、金髪女の仲間か？　敵討ちってわけか。ハッ、いじらしいねぇ」
line = "「あん？　なんだ、金髪女の仲間か？　敵討ちってわけか。ハッ、いじらしいねぇ」"

[[dialogue]]
speaker = "キサナ"
# 「おら、とっととかかってこいよ、正義の味方。キサナ様が身の程教えてやる」
line = "「おら、とっととかかってこいよ、正義の味方。キサナ様が身の程教えてやる」"
