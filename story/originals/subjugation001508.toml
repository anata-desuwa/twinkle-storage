[[dialogue]]
speaker = "マリーベル"
# 「スカーレットペイン！」
line = "「スカーレットペイン！」"

[[dialogue]]
speaker = "イングリット"
# 「効かんな」
line = "「効かんな」"

[[dialogue]]
speaker = "イングリット"
# 「フンッ──！」
line = "「フンッ──！」"

[[dialogue]]
speaker = "マリーベル"
# 「くうぅっ……！　さすがの攻撃力ね……」
line = "「くうぅっ……！　さすがの攻撃力ね……」"

[[dialogue]]
speaker = "カティア"
# 「わわ……戦いが激しすぎてついていけないワン……」
line = "「わわ……戦いが激しすぎてついていけないワン……」"

[[dialogue]]
speaker = "イングリット"
# 「魔王の本気が見られるかと思ったが……期待外れだ。そろそろ終わらせるとしよう」
line = "「魔王の本気が見られるかと思ったが……期待外れだ。そろそろ終わらせるとしよう」"

[[dialogue]]
speaker = "unk"
# ２人とも！　一旦引いて！
line = "２人とも！　一旦引いて！"

[[dialogue]]
speaker = "イングリット"
# 「漆黒の渦に飲まれろ──ダークネス・オブリビオン」
line = "「漆黒の渦に飲まれろ──ダークネス・オブリビオン」"

[[dialogue]]
speaker = "unk"
# イングリットの眼前に飛び込み、拳で攻撃を相殺させる──！
line = "イングリットの眼前に飛び込み、拳で攻撃を相殺させる──！"

[[dialogue]]
speaker = "unk"
# ぐっ……！
line = "ぐっ……！"

[[dialogue]]
speaker = "カティア"
# 「魔王様！？」
line = "「魔王様！？」"

[[dialogue]]
speaker = "マリーベル"
# 「会長さん、大丈夫！？」
line = "「会長さん、大丈夫！？」"

[[dialogue]]
speaker = "unk"
# なんとか……
line = "なんとか……"

[[dialogue]]
speaker = "イングリット"
# 「ほう。今の拳は良かったぞ。やればできるじゃないか」
line = "「ほう。今の拳は良かったぞ。やればできるじゃないか」"

[[dialogue]]
speaker = "マリーベル"
# 「好き勝手言ってくれるわね。……でもこのままじゃ勝機がないわ」
line = "「好き勝手言ってくれるわね。……でもこのままじゃ勝機がないわ」"

[[dialogue]]
speaker = "カティア"
# 「せめて星力を無力化されなければ戦いようがあるのに……」
line = "「せめて星力を無力化されなければ戦いようがあるのに……」"

[[dialogue]]
speaker = "マリーベル"
# 「コラプサーが星力を吸収できる量には限界があるそうだけど、彼女はまだまだ余裕そうね」
line = "「コラプサーが星力を吸収できる量には限界があるそうだけど、彼女はまだまだ余裕そうね」"

[[dialogue]]
speaker = "マリーベル"
# 「あの能力……何か抜け穴がないかしら」
line = "「あの能力……何か抜け穴がないかしら」"

[[dialogue]]
speaker = "カティア"
# 「トワちゃん先生たち曰く、コラプサーも星力を使ってるそうですが──」
line = "「トワちゃん先生たち曰く、コラプサーも星力を使ってるそうですが──」"

[[dialogue]]
speaker = "トワ先生"
# 「コラプサーが使う星力は、私たちが使っているのとは違う……負の星力とでも言うべきものなの。それに彼女たちの守護星も観測できてなくて」
line = "「コラプサーが使う星力は、私たちが使っているのとは違う……負の星力とでも言うべきものなの。それに彼女たちの守護星も観測できてなくて」"

[[dialogue]]
speaker = "カティア"
# 「？？？　守護星がないのに、星力を使えるってことです……？」
line = "「？？？　守護星がないのに、星力を使えるってことです……？」"

[[dialogue]]
speaker = "トワ先生"
# 「ううん。守護星は確実に<b>ある</b>はずなの……だけど、数値がちゃんと出ないんだ」
line = "「ううん。守護星は確実に<b>ある</b>はずなの……だけど、数値がちゃんと出ないんだ」"

[[dialogue]]
speaker = "カティア"
# 「数値が出ない？　観測できない守護星なんてあるんですか？　私の守護星なんてちっぽけな衛星でもわかったのに」
line = "「数値が出ない？　観測できない守護星なんてあるんですか？　私の守護星なんてちっぽけな衛星でもわかったのに」"

[[dialogue]]
speaker = "エスメラルダ"
# 「星力がほんの少しだとわからない場合もあるけど、守護星である以上、普通は特定できるわ」
line = "「星力がほんの少しだとわからない場合もあるけど、守護星である以上、普通は特定できるわ」"

[[dialogue]]
speaker = "トワ先生"
# 「だから守護星が観測出来ないのは、コラプサーの能力なのかもしれない」
line = "「だから守護星が観測出来ないのは、コラプサーの能力なのかもしれない」"

[[dialogue]]
speaker = "エスメラルダ"
# 「もしくは、よほど<b>特別な</b>守護星を持っているか、ね」
line = "「もしくは、よほど<b>特別な</b>守護星を持っているか、ね」"

[[dialogue]]
speaker = "マリーベル"
# 「特別な守護星……もしその力で星力を吸収しているとしたら……それに観測できないということは……」
line = "「特別な守護星……もしその力で星力を吸収しているとしたら……それに観測できないということは……」"

[[dialogue]]
speaker = "マリーベル"
# 「会長さん、知ってる？　その存在は知られていても、長い間、直接的に観測できなかった天体があることを？」
line = "「会長さん、知ってる？　その存在は知られていても、長い間、直接的に観測できなかった天体があることを？」"

[[dialogue]]
speaker = "unk"
# ブラックホール……！
line = "ブラックホール……！"

[[dialogue]]
speaker = "イングリット"
# 「そうだ。私たちコラプサーは皆ブラックホールを守護星に持っている。だがそれがわかったところで何になる」
line = "「そうだ。私たちコラプサーは皆ブラックホールを守護星に持っている。だがそれがわかったところで何になる」"

[[dialogue]]
speaker = "カティア"
# 「ブラックホールが守護星なんてアリなの！？」
line = "「ブラックホールが守護星なんてアリなの！？」"

[[dialogue]]
speaker = "マリーベル"
# 「ブラックホールは、活動を終えた恒星が、自身の膨大な質量によって収縮したもの。星の一種と言えなくもないわ」
line = "「ブラックホールは、活動を終えた恒星が、自身の膨大な質量によって収縮したもの。星の一種と言えなくもないわ」"

[[dialogue]]
speaker = "カティア"
# 「そ、そうなんですね……だけどブラックホールを破る方法なんてあるんでしょうか？」
line = "「そ、そうなんですね……だけどブラックホールを破る方法なんてあるんでしょうか？」"

[[dialogue]]
speaker = "マリーベル"
# 「ブラックホールは無限に物質を吸い込むけど、吸い込む際にエネルギーが発生し、光が放出されることもある……」
line = "「ブラックホールは無限に物質を吸い込むけど、吸い込む際にエネルギーが発生し、光が放出されることもある……」"

[[dialogue]]
speaker = "unk"
# 全部は吸収できないってこと？
line = "全部は吸収できないってこと？"

[[dialogue]]
speaker = "マリーベル"
# 「ええ、だから瞬間的に限界があるのかもしれない」
line = "「ええ、だから瞬間的に限界があるのかもしれない」"

[[dialogue]]
speaker = "カティア"
# 「つまり、とにかく巨大なエネルギーを一瞬でぶつければ何とかなるかもってことですね……！」
line = "「つまり、とにかく巨大なエネルギーを一瞬でぶつければ何とかなるかもってことですね……！」"

[[dialogue]]
speaker = "マリーベル"
# 「そうね。でも生半可じゃ通じない。一瞬ですべて出し切るつもりでいかないといけないわ」
line = "「そうね。でも生半可じゃ通じない。一瞬ですべて出し切るつもりでいかないといけないわ」"

[[dialogue]]
speaker = "unk"
# ユニゾンアタックをしかけよう！
line = "ユニゾンアタックをしかけよう！"

[[dialogue]]
speaker = "イングリット"
# 「そろそろ死ぬ準備は済んだか」
line = "「そろそろ死ぬ準備は済んだか」"

[[dialogue]]
speaker = "カティア"
# 「そんな準備はしてないガオ！」
line = "「そんな準備はしてないガオ！」"

[[dialogue]]
speaker = "マリーベル"
# 「次の攻撃であなたを倒してみせるわ」
line = "「次の攻撃であなたを倒してみせるわ」"

[[dialogue]]
speaker = "イングリット"
# 「面白い冗談だ。出来るものならやってみせろ」
line = "「面白い冗談だ。出来るものならやってみせろ」"

[[dialogue]]
speaker = "カティア"
# 「目にものを見せてやるワン──ケルベロス百裂拳！」
line = "「目にものを見せてやるワン──ケルベロス百裂拳！」"

[[dialogue]]
speaker = "マリーベル"
# 「磔にしてあげる──ドゥームローズガーデン！」
line = "「磔にしてあげる──ドゥームローズガーデン！」"

[[dialogue]]
speaker = "イングリット"
# 「同時攻撃とは面白い！　だが、私にそのような攻撃は──」
line = "「同時攻撃とは面白い！　だが、私にそのような攻撃は──」"

[[dialogue]]
speaker = "unk"
# まだだ！　いくぞカティア、マリーベル！
line = "まだだ！　いくぞカティア、マリーベル！"

[[dialogue]]
speaker = "３人"
# 「ユニゾン！」
line = "「ユニゾン！」"

[[dialogue]]
speaker = "イングリット"
# 「なにっ！？」
line = "「なにっ！？」"

[[dialogue]]
speaker = "マリーベル"
# 「ひっさ～つ！　バーニングアターック！！」
line = "「ひっさ～つ！　バーニングアターック！！」"

[[dialogue]]
speaker = "イングリット"
# 「──ぐうぅぅううう！！？」
line = "「──ぐうぅぅううう！！？」"

[[dialogue]]
speaker = "カティア"
# 「アステラが消滅した……！？　もしかして今の攻撃で？　アステラってそういうものなんですか？」
line = "「アステラが消滅した……！？　もしかして今の攻撃で？　アステラってそういうものなんですか？」"

[[dialogue]]
speaker = "マリーベル"
# 「いいえ、アステラは中のモンスターを倒すことで消滅するわ。元から普通のアステラじゃなかったってことね」
line = "「いいえ、アステラは中のモンスターを倒すことで消滅するわ。元から普通のアステラじゃなかったってことね」"

[[dialogue]]
speaker = "イングリット"
# 「はぁ、はぁ……この私の力が、敗れるだと……？」
line = "「はぁ、はぁ……この私の力が、敗れるだと……？」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「大丈夫でございますか、イングリット様……！　お気を確かに……」
line = "「大丈夫でございますか、イングリット様……！　お気を確かに……」"

[[dialogue]]
speaker = "ジュリエッテ"
# （ふふふ、ざまぁーみろでございますの！　わたくしに手間をかけさせた罰でございますの！）
line = "（ふふふ、ざまぁーみろでございますの！　わたくしに手間をかけさせた罰でございますの！）"

[[dialogue]]
speaker = "マリーベル"
# 「さて、あなたが奪ったセレスティアは返してもらうわよ」
line = "「さて、あなたが奪ったセレスティアは返してもらうわよ」"

[[dialogue]]
speaker = "イングリット"
# 「……好きにするがいい」
line = "「……好きにするがいい」"

[[dialogue]]
speaker = "カティア"
# 「これで事件解決ですね、魔王様！」
line = "「これで事件解決ですね、魔王様！」"

[[dialogue]]
speaker = "マリーベル"
# 「あとは学園まで連行すれば──」
line = "「あとは学園まで連行すれば──」"

[[dialogue]]
speaker = "カティア"
# 「わわぁっ！？」
line = "「わわぁっ！？」"

[[dialogue]]
speaker = "キサナ"
# 「そうはさせねえよ」
line = "「そうはさせねえよ」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「キサナ様！？」
line = "「キサナ様！？」"

[[dialogue]]
speaker = "キサナ"
# 「ったく、面倒かけさせやがって……任務は終わりだ。さっさと帰るぞ」
line = "「ったく、面倒かけさせやがって……任務は終わりだ。さっさと帰るぞ」"

[[dialogue]]
speaker = "マリーベル"
# 「そう簡単に逃がすわけにはいかないわ」
line = "「そう簡単に逃がすわけにはいかないわ」"

[[dialogue]]
speaker = "キサナ"
# 「そんなボロボロの体で何言ってんだ？　死にてえのか？」
line = "「そんなボロボロの体で何言ってんだ？　死にてえのか？」"

[[dialogue]]
speaker = "カティア"
# 「マリーベル先輩、さすがにこれ以上は……」
line = "「マリーベル先輩、さすがにこれ以上は……」"

[[dialogue]]
speaker = "マリーベル"
# 「……不愉快ね」
line = "「……不愉快ね」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「ええ、追わないのが賢明ですわ。それでは魔王様……わたくしもこれで失礼いたします」
line = "「ええ、追わないのが賢明ですわ。それでは魔王様……わたくしもこれで失礼いたします」"

[[dialogue]]
speaker = "マリーベル"
# 「あなた、コラプサーに無理やり従わされてるのではなかったの？」
line = "「あなた、コラプサーに無理やり従わされてるのではなかったの？」"

[[dialogue]]
speaker = "キサナ"
# 「は？　どういうこった？」
line = "「は？　どういうこった？」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「ああいえ！？　それは言葉の綾といいますか！！」
line = "「ああいえ！？　それは言葉の綾といいますか！！」"

[[dialogue]]
speaker = "キサナ"
# 「テメエ、後で詳しく話を聞かせてもらうからな」
line = "「テメエ、後で詳しく話を聞かせてもらうからな」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「うぅ……わかりましたわ……」
line = "「うぅ……わかりましたわ……」"

[[dialogue]]
speaker = "イングリット"
# 「今回は無様な姿を晒したが、次はこうはいかないぞ……首を洗って待っていろ、魔王……！」
line = "「今回は無様な姿を晒したが、次はこうはいかないぞ……首を洗って待っていろ、魔王……！」"

[[dialogue]]
speaker = "マリーベル"
# 「ひとまずお疲れ様ね」
line = "「ひとまずお疲れ様ね」"

[[dialogue]]
speaker = "カティア"
# 「やっとアステラから出られたワン……早く帰ってシャワーを浴びたいガオ～……」
line = "「やっとアステラから出られたワン……早く帰ってシャワーを浴びたいガオ～……」"

[[dialogue]]
speaker = "ジュリエッテ"
# 『コラプサーの目的は救世。あなた方と同じく世界を守ることでございます』
line = "『コラプサーの目的は救世。あなた方と同じく世界を守ることでございます』"

[[dialogue]]
speaker = "unk"
# コラプサーの目的。彼女らの守護星。
line = "コラプサーの目的。彼女らの守護星。"

[[dialogue]]
speaker = "unk"
# コラプサーのことは少しずつ明らかになってきている。
line = "コラプサーのことは少しずつ明らかになってきている。"

[[dialogue]]
speaker = "unk"
# それでも得体の知れないものがすぐそこまで迫っているような違和感を覚えるのは、気のせいだろうか……？
line = "それでも得体の知れないものがすぐそこまで迫っているような違和感を覚えるのは、気のせいだろうか……？"
