[[dialogue]]
speaker = "unk"
# 第４話,ベアトリスとナターシャの見解,B
line = "第４話,ベアトリスとナターシャの見解,B"

[[dialogue]]
speaker = "unk"
# レジスタンスとともにルヴィネの追跡を続け、５日が経過した。
line = "レジスタンスとともにルヴィネの追跡を続け、５日が経過した。"

[[dialogue]]
speaker = "unk"
# その間大きな事件はなかったものの、アルバイトしている以外にも、ルヴィネの生活パターンがわかった。
line = "その間大きな事件はなかったものの、アルバイトしている以外にも、ルヴィネの生活パターンがわかった。"

[[dialogue]]
speaker = "unk"
# ある程度の成果が得られたので、ひとまず今日で尾行は終了だ。
line = "ある程度の成果が得られたので、ひとまず今日で尾行は終了だ。"

[[dialogue]]
speaker = "ベアトリス"
# 「ナターシャちゃん、お疲れ様。一日の半分くらい尾行してたけど大丈夫？」
line = "「ナターシャちゃん、お疲れ様。一日の半分くらい尾行してたけど大丈夫？」"

[[dialogue]]
speaker = "ナターシャ"
# 「全然平気。サバイバルする訓練もしてるし、休憩挟みながらだから、このくらい大したことないよ」
line = "「全然平気。サバイバルする訓練もしてるし、休憩挟みながらだから、このくらい大したことないよ」"

[[dialogue]]
speaker = "ベアトリス"
# 「すごーい！　さすが本物の暗殺者！」
line = "「すごーい！　さすが本物の暗殺者！」"

[[dialogue]]
speaker = "unk"
# 当然と言うべきか、ルヴィネの追跡においては、やはり本職のナターシャが一番活躍してくれた。
line = "当然と言うべきか、ルヴィネの追跡においては、やはり本職のナターシャが一番活躍してくれた。"

[[dialogue]]
speaker = "クロト"
# 「ありがとう、ナターシャ。君のおかげで尾行作戦が実現できたよ」
line = "「ありがとう、ナターシャ。君のおかげで尾行作戦が実現できたよ」"

[[dialogue]]
speaker = "ナターシャ"
# 「監視対象にそう言われるのも妙な気分だけど、上手くいったならまぁいいかな。でも──」
line = "「監視対象にそう言われるのも妙な気分だけど、上手くいったならまぁいいかな。でも──」"

[[dialogue]]
speaker = "unk"
# ちらりと後ろを振り返るナターシャ。
line = "ちらりと後ろを振り返るナターシャ。"

[[dialogue]]
speaker = "unk"
# その視線の先には、険しい顔で俯く梨緒がいた。
line = "その視線の先には、険しい顔で俯く梨緒がいた。"

[[dialogue]]
speaker = "梨緒"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ベアトリス"
# 「梨緒ちゃん、大丈夫？　最近ずっと暗い顔してる気がするけど……」
line = "「梨緒ちゃん、大丈夫？　最近ずっと暗い顔してる気がするけど……」"

[[dialogue]]
speaker = "梨緒"
# 「ああ、大丈夫だ。体が不調なわけじゃない」
line = "「ああ、大丈夫だ。体が不調なわけじゃない」"

[[dialogue]]
speaker = "ナターシャ"
# 「だけどずっと悩んでるよね。もしかして私が言ったこと気にしてる？」
line = "「だけどずっと悩んでるよね。もしかして私が言ったこと気にしてる？」"

[[dialogue]]
speaker = "梨緒"
# 「……ああ。ナターシャに言われて考えたんだ。どうして私がジグに勝ちたいと思うのか」
line = "「……ああ。ナターシャに言われて考えたんだ。どうして私がジグに勝ちたいと思うのか」"

[[dialogue]]
speaker = "梨緒"
# 「だけどこれは個人的なことで、君たちに関係は……」
line = "「だけどこれは個人的なことで、君たちに関係は……」"

[[dialogue]]
speaker = "ベアトリス"
# 「関係ないことないよ！　私たち仲間なんだから、そんな寂しいこと言わないで。梨緒ちゃんの話ならいくらでも聞くから」
line = "「関係ないことないよ！　私たち仲間なんだから、そんな寂しいこと言わないで。梨緒ちゃんの話ならいくらでも聞くから」"

[[dialogue]]
speaker = "ナターシャ"
# 「尾行も一旦終わったところだし、まぁいいタイミングじゃない？　１人でウジウジしてるよりはマシでしょ」
line = "「尾行も一旦終わったところだし、まぁいいタイミングじゃない？　１人でウジウジしてるよりはマシでしょ」"

[[dialogue]]
speaker = "クロト"
# 「聞かれるのが嫌じゃなければ、俺も聞くよ。梨緒には何度か助けてもらったしな」
line = "「聞かれるのが嫌じゃなければ、俺も聞くよ。梨緒には何度か助けてもらったしな」"

[[dialogue]]
speaker = "梨緒"
# 「……ありがとう。それなら甘えさせてもらおう」
line = "「……ありがとう。それなら甘えさせてもらおう」"

[[dialogue]]
speaker = "unk"
# 梨緒は思考を整理するように目を閉じると、呼吸を整えてから話し始めた。
line = "梨緒は思考を整理するように目を閉じると、呼吸を整えてから話し始めた。"

[[dialogue]]
speaker = "梨緒"
# 「私はどうしてもジグに勝ちたい……いや、勝たなければいけないと思っている」
line = "「私はどうしてもジグに勝ちたい……いや、勝たなければいけないと思っている」"

[[dialogue]]
speaker = "梨緒"
# 「そうでなければ、私が私でなくなってしまう気がするから」
line = "「そうでなければ、私が私でなくなってしまう気がするから」"

[[dialogue]]
speaker = "ベアトリス"
# 「梨緒ちゃんが梨緒ちゃんじゃなくなる……？」
line = "「梨緒ちゃんが梨緒ちゃんじゃなくなる……？」"

[[dialogue]]
speaker = "ナターシャ"
# 「ふぅん、随分な考えだね。そう思うからには何か理由があるんだよね？」
line = "「ふぅん、随分な考えだね。そう思うからには何か理由があるんだよね？」"

[[dialogue]]
speaker = "梨緒"
# 「ああ。それはきっと……」
line = "「ああ。それはきっと……」"

[[dialogue]]
speaker = "梨緒"
# 「私は勝つために星騎士になったからだ」
line = "「私は勝つために星騎士になったからだ」"

[[dialogue]]
speaker = "ベアトリス"
# 「んん？　勝つため……？　誰に……？　でも梨緒ちゃん、世界を守りたいって言ってたよね？」
line = "「んん？　勝つため……？　誰に……？　でも梨緒ちゃん、世界を守りたいって言ってたよね？」"

[[dialogue]]
speaker = "梨緒"
# 「それが嘘だったんだ」
line = "「それが嘘だったんだ」"

[[dialogue]]
speaker = "ベアトリス"
# 「ええっ！？　そんなはずないよ！？」
line = "「ええっ！？　そんなはずないよ！？」"

[[dialogue]]
speaker = "梨緒"
# 「幼い頃、私は何もできない人間だった」
line = "「幼い頃、私は何もできない人間だった」"

[[dialogue]]
speaker = "梨緒"
# 「勉強も運動も苦手で、弱くて、情けなくて……いつも泣いていた」
line = "「勉強も運動も苦手で、弱くて、情けなくて……いつも泣いていた」"

[[dialogue]]
speaker = "梨緒"
# 「だから私は勝てる人間になりたかった。誰にも負けない自分になりたかった」
line = "「だから私は勝てる人間になりたかった。誰にも負けない自分になりたかった」"

[[dialogue]]
speaker = "梨緒"
# 「そんな願いを守護星が聞き届けてくれたのか、私は星力に目覚めた」
line = "「そんな願いを守護星が聞き届けてくれたのか、私は星力に目覚めた」"

[[dialogue]]
speaker = "梨緒"
# 「詳しく調べると、私は同年代と比べて非常に高い星力を持っていることがわかった」
line = "「詳しく調べると、私は同年代と比べて非常に高い星力を持っていることがわかった」"

[[dialogue]]
speaker = "梨緒"
# 「だから星騎士になれば、誰にも負けない存在になれると思った」
line = "「だから星騎士になれば、誰にも負けない存在になれると思った」"

[[dialogue]]
speaker = "梨緒"
# 「私は本当に嬉しかった。弱い自分と別れられると思ったから」
line = "「私は本当に嬉しかった。弱い自分と別れられると思ったから」"

[[dialogue]]
speaker = "梨緒"
# 「それが『梨緒・Ａ・クリステレス』という星騎士の始まりだったんだ……」
line = "「それが『梨緒・Ａ・クリステレス』という星騎士の始まりだったんだ……」"

[[dialogue]]
speaker = "ベアトリス"
# 「梨緒ちゃん……」
line = "「梨緒ちゃん……」"

[[dialogue]]
speaker = "ナターシャ"
# 「なるほど。梨緒にとっては、星騎士になること＝勝つことだったんだ」
line = "「なるほど。梨緒にとっては、星騎士になること＝勝つことだったんだ」"

[[dialogue]]
speaker = "梨緒"
# 「ああ、私は勝つために星騎士になった。それがリクリエと戦っているうちに、世界を救う使命感にいつの間にかすり替わっていた」
line = "「ああ、私は勝つために星騎士になった。それがリクリエと戦っているうちに、世界を救う使命感にいつの間にかすり替わっていた」"

[[dialogue]]
speaker = "梨緒"
# 「だから私はジグが許せなかった」
line = "「だから私はジグが許せなかった」"

[[dialogue]]
speaker = "梨緒"
# 「ジグに負ける度に無力さを思い知らされて、捨てたはずの弱い自分を突き付けられるから」
line = "「ジグに負ける度に無力さを思い知らされて、捨てたはずの弱い自分を突き付けられるから」"

[[dialogue]]
speaker = "梨緒"
# 「私がもっと強かったら、負けを受け止めて、前に進むことができていたのかもしれない」
line = "「私がもっと強かったら、負けを受け止めて、前に進むことができていたのかもしれない」"

[[dialogue]]
speaker = "梨緒"
# 「だけど私は負けを認めたくなくて、何度も何度も挑み続けた」
line = "「だけど私は負けを認めたくなくて、何度も何度も挑み続けた」"

[[dialogue]]
speaker = "梨緒"
# 「そのせいで、ずっと同じところで足踏みして、変わることができなかった……」
line = "「そのせいで、ずっと同じところで足踏みして、変わることができなかった……」"

[[dialogue]]
speaker = "梨緒"
# 「結局……私は弱い人間なんだな」
line = "「結局……私は弱い人間なんだな」"

[[dialogue]]
speaker = "ベアトリス"
# 「ううん、梨緒ちゃんは強いよ。諦めないって、強くないとできないことなんだから」
line = "「ううん、梨緒ちゃんは強いよ。諦めないって、強くないとできないことなんだから」"

[[dialogue]]
speaker = "ナターシャ"
# 「そこは弱みだと思うけど。諦めることができるってのも、１つの強さなんじゃない？」
line = "「そこは弱みだと思うけど。諦めることができるってのも、１つの強さなんじゃない？」"

[[dialogue]]
speaker = "ベアトリス"
# 「梨緒ちゃんは強いよ！」
line = "「梨緒ちゃんは強いよ！」"

[[dialogue]]
speaker = "ナターシャ"
# 「そうかなぁ？」
line = "「そうかなぁ？」"

[[dialogue]]
speaker = "梨緒"
# 「いや、そこで争わなくても……」
line = "「いや、そこで争わなくても……」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「じゃあ、両方ってことでいいんじゃないか」
line = "「じゃあ、両方ってことでいいんじゃないか」"

[[dialogue]]
speaker = "梨緒"
# 「アポロ……！？　帰っていたのか？」
line = "「アポロ……！？　帰っていたのか？」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「ああ、今さっき秘密基地に戻ったところだ。それで話が聞こえてきたんでな」
line = "「ああ、今さっき秘密基地に戻ったところだ。それで話が聞こえてきたんでな」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「強いところもあれば、弱いところもある。強さでもあれば、弱さでもある」
line = "「強いところもあれば、弱いところもある。強さでもあれば、弱さでもある」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「臆病さが身を守る慎重さになることもあれば、人を労わる優しさゆえに自分を犠牲にしてしまうこともある」
line = "「臆病さが身を守る慎重さになることもあれば、人を労わる優しさゆえに自分を犠牲にしてしまうこともある」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「そんなふうに複雑で、めんどくさくて、面白いのが人ってやつだ」
line = "「そんなふうに複雑で、めんどくさくて、面白いのが人ってやつだ」"

[[dialogue]]
speaker = "梨緒"
# 「面白い……？」
line = "「面白い……？」"

[[dialogue]]
speaker = "ナターシャ"
# 「そうだね、面白いよ」
line = "「そうだね、面白いよ」"

[[dialogue]]
speaker = "梨緒"
# 「は……？　君は私が弱いと言っていなかったか？」
line = "「は……？　君は私が弱いと言っていなかったか？」"

[[dialogue]]
speaker = "ナターシャ"
# 「うん、負けを認められないのは梨緒の弱いところだと思ってるけど、かわいげがあるじゃん」
line = "「うん、負けを認められないのは梨緒の弱いところだと思ってるけど、かわいげがあるじゃん」"

[[dialogue]]
speaker = "ナターシャ"
# 「何でもかんでもその調子じゃ困るけど、負けて悔しがってる梨緒を見るのは嫌いじゃないからね」
line = "「何でもかんでもその調子じゃ困るけど、負けて悔しがってる梨緒を見るのは嫌いじゃないからね」"

[[dialogue]]
speaker = "梨緒"
# 「……褒めているのか、それは？」
line = "「……褒めているのか、それは？」"

[[dialogue]]
speaker = "クロト"
# 「俺だって梨緒と似たようなものかもしれないな」
line = "「俺だって梨緒と似たようなものかもしれないな」"

[[dialogue]]
speaker = "梨緒"
# 「君も……？　どういうことだ？」
line = "「君も……？　どういうことだ？」"

[[dialogue]]
speaker = "クロト"
# 「ちゃんと星騎士になってから、モンスターと対峙しながらこう思ったことがあるんだ」
line = "「ちゃんと星騎士になってから、モンスターと対峙しながらこう思ったことがあるんだ」"

[[dialogue]]
speaker = "クロト"
# 「『なんだ、星騎士になっても結局怖いのか』って。落胆に近い気持ちだったよ」
line = "「『なんだ、星騎士になっても結局怖いのか』って。落胆に近い気持ちだったよ」"

[[dialogue]]
speaker = "梨緒"
# 「君でも怖いと思うのか？」
line = "「君でも怖いと思うのか？」"

[[dialogue]]
speaker = "クロト"
# 「ああ、怖いよ。人間より小さな小型のモンスターでも簡単に人の命を奪うことができるんだ。怖くないはずがない」
line = "「ああ、怖いよ。人間より小さな小型のモンスターでも簡単に人の命を奪うことができるんだ。怖くないはずがない」"

[[dialogue]]
speaker = "クロト"
# 「星騎士になるための訓練をしながら、きっと心のどこかでこう思っていたんだ。強くなれば、モンスターも怖くなくなるって」
line = "「星騎士になるための訓練をしながら、きっと心のどこかでこう思っていたんだ。強くなれば、モンスターも怖くなくなるって」"

[[dialogue]]
speaker = "クロト"
# 「俺が星騎士になったのは、俺自身がモンスターを恐れなくていいようになりたかったから……自分のためでもあったのかもしれない」
line = "「俺が星騎士になったのは、俺自身がモンスターを恐れなくていいようになりたかったから……自分のためでもあったのかもしれない」"

[[dialogue]]
speaker = "クロト"
# 「だから星騎士になる理由、戦う理由は人それぞれでいいんじゃないか」
line = "「だから星騎士になる理由、戦う理由は人それぞれでいいんじゃないか」"

[[dialogue]]
speaker = "ナターシャ"
# 「そうそう。誰だってしょうもない、でも譲れない理由がある。そういうものだよ」
line = "「そうそう。誰だってしょうもない、でも譲れない理由がある。そういうものだよ」"

[[dialogue]]
speaker = "梨緒"
# 「そういうもの……」
line = "「そういうもの……」"

[[dialogue]]
speaker = "梨緒"
# 「私は弱くて、ちっぽけで、つまらない理由で……自分のために星騎士になった」
line = "「私は弱くて、ちっぽけで、つまらない理由で……自分のために星騎士になった」"

[[dialogue]]
speaker = "梨緒"
# 「だけど……<b>そういうもの</b>、か」
line = "「だけど……<b>そういうもの</b>、か」"

[[dialogue]]
speaker = "ベアトリス"
# 「でも忘れないで。梨緒ちゃんは強い。誰がなんて言っても、私はそう思うよ」
line = "「でも忘れないで。梨緒ちゃんは強い。誰がなんて言っても、私はそう思うよ」"

[[dialogue]]
speaker = "ベアトリス"
# 「それに最初は勝つためでも、梨緒ちゃんはみんなのために、世界のために戦っていた」
line = "「それに最初は勝つためでも、梨緒ちゃんはみんなのために、世界のために戦っていた」"

[[dialogue]]
speaker = "ベアトリス"
# 「だから今まで戦ってきた自分を信じてあげて」
line = "「だから今まで戦ってきた自分を信じてあげて」"

[[dialogue]]
speaker = "梨緒"
# 「ありがとう、ベアト。君がそう言ってくれるなら、自分を信じられる気がする」
line = "「ありがとう、ベアト。君がそう言ってくれるなら、自分を信じられる気がする」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「さて、それじゃ夕飯にするかな！　今日はハンバーグだ！」
line = "「さて、それじゃ夕飯にするかな！　今日はハンバーグだ！」"

[[dialogue]]
speaker = "ベアトリス"
# 「やったー！」
line = "「やったー！」"

[[dialogue]]
speaker = "unk"
# 尾行作戦でアポロがいないことが多かったせいで、アポロが作った夕食は久しぶりだ。
line = "尾行作戦でアポロがいないことが多かったせいで、アポロが作った夕食は久しぶりだ。"

[[dialogue]]
speaker = "unk"
# アポロの料理は上手だから、これは期待がかかる。
line = "アポロの料理は上手だから、これは期待がかかる。"

[[dialogue]]
speaker = "ベアトリス"
# 「あ～んっ。……ん～♪　やわらかくてジューシーでおいしー！」
line = "「あ～んっ。……ん～♪　やわらかくてジューシーでおいしー！」"

[[dialogue]]
speaker = "梨緒"
# 「！　これは……店を出せる味だな」
line = "「！　これは……店を出せる味だな」"

[[dialogue]]
speaker = "unk"
# アポロのハンバーグは本当に美味しくて、みんな驚きや笑顔を見せるのだった。
line = "アポロのハンバーグは本当に美味しくて、みんな驚きや笑顔を見せるのだった。"
