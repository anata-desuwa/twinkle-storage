# 「……も、もうっ。そういうところですよ。そんなことを真顔で言われるから──私もつい甘えてしまうんですから……」
line = "「……も、もうっ。そういうところですよ。そんなことを真顔で言われるから──私もつい甘えてしまうんですから……」"

[[dialogue]]
