# 「スイカ割りやバナナボートではしゃぐなど、お子ちゃまです。大人女子はここで綺麗に肌を焼いたりするもので……」
line = "「スイカ割りやバナナボートではしゃぐなど、お子ちゃまです。大人女子はここで綺麗に肌を焼いたりするもので……」"

[[dialogue]]
speaker = "ソフィア"
# 「……スイカ割りしたくないのか、と？　……それは……したくないと言えば、嘘になりますが……」
line = "「……スイカ割りしたくないのか、と？　……それは……したくないと言えば、嘘になりますが……」"

[[dialogue]]
speaker = "ソフィア"
# 「それは──その……子どもっぽい、というか……」
line = "「それは──その……子どもっぽい、というか……」"

[[dialogue]]
speaker = "unk"
# 無理しなくていいよ
