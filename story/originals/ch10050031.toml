line = "「むしろこうして緩やかに流れていく時間さえも、優雅に愉しめてしまうのですよ……ふふふ」"

[[dialogue]]
speaker = "ルリエル"
# 「そうなんですか……？　ま～、気が向いたらいつでも来てください」
