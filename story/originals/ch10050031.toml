# なんというか、非常に嫌～……な感じのくつろぎ方をしている少女がいた。
line = "なんというか、非常に嫌～……な感じのくつろぎ方をしている少女がいた。"

[[dialogue]]
speaker = "unk"
# それはソフィアだった。
line = "それはソフィアだった。"

[[dialogue]]
speaker = "unk"
# なんでそんな格好を？
line = "なんでそんな格好を？"

[[dialogue]]
speaker = "unk"
# ソフィア……？
line = "ソフィア……？"

[[dialogue]]
speaker = "ソフィア"
# 「ん……？」
line = "「ん……？」"

[[dialogue]]
speaker = "ソフィア"
# 「夏を満喫するためですよ。大人のサマースタイルを味わいたいならこれだと、リップルさんから教わりました」
line = "「夏を満喫するためですよ。大人のサマースタイルを味わいたいならこれだと、リップルさんから教わりました」"

[[dialogue]]
speaker = "unk"
# ソフィアはどでかサングラスをスッと外し、近くに置いていた巨大なグラスをすくい上げるように持った。
line = "ソフィアはどでかサングラスをスッと外し、近くに置いていた巨大なグラスをすくい上げるように持った。"

[[dialogue]]
speaker = "unk"
# 無理しなくても……
line = "無理しなくても……"

[[dialogue]]
speaker = "ソフィア"
# 「む、無理などしていません。私もそろそろいい歳ですから──大人な夏の楽しみ方をするべきなのです」
line = "「む、無理などしていません。私もそろそろいい歳ですから──大人な夏の楽しみ方をするべきなのです」"

[[dialogue]]
speaker = "ソフィア"
# 「降り注ぐ日差しをパラソルで避けながら、優雅にトロピカルジュースを嗜む……」
line = "「降り注ぐ日差しをパラソルで避けながら、優雅にトロピカルジュースを嗜む……」"

[[dialogue]]
speaker = "ソフィア"
# 「──っとと……グ、グラスが大きすぎて、私の片手じゃ支えきれない……むぅ……なんとか両手で持って──」
line = "「──っとと……グ、グラスが大きすぎて、私の片手じゃ支えきれない……むぅ……なんとか両手で持って──」"

[[dialogue]]
speaker = "ソフィア"
# 「ちゅうちゅうちゅう……ん～、これですよこれ！　これこそ大人の女の夏の過ごし方です」
line = "「ちゅうちゅうちゅう……ん～、これですよこれ！　これこそ大人の女の夏の過ごし方です」"

[[dialogue]]
speaker = "ソフィア"
# 「……何をまじまじと見ているんですか。その、そんなに見られているとさすがに照れるんですけど……」
line = "「……何をまじまじと見ているんですか。その、そんなに見られているとさすがに照れるんですけど……」"

[[dialogue]]
speaker = "ソフィア"
# 「なぜ大人っぽくなりたいのか？　それは──だって……私が目指しているのは、フィオナ会長のような、頼れる立派な女性ですから」
line = "「なぜ大人っぽくなりたいのか？　それは──だって……私が目指しているのは、フィオナ会長のような、頼れる立派な女性ですから」"

[[dialogue]]
speaker = "ソフィア"
# 「ですから、サマーリゾートに来たとて子どものようにはしゃいでいる場合ではないのです。落ち着きをもって、ゆったりとラグジュアリーな時間を……」
line = "「ですから、サマーリゾートに来たとて子どものようにはしゃいでいる場合ではないのです。落ち着きをもって、ゆったりとラグジュアリーな時間を……」"

[[dialogue]]
speaker = "アポロ"
# 「おーい！　ソフィア～！」
line = "「おーい！　ソフィア～！」"

[[dialogue]]
speaker = "ソフィア"
# 「ん……この声は……？」
line = "「ん……この声は……？」"

[[dialogue]]
speaker = "アポロ"
# 「──いたいた。魔王も一緒か。こっち来いよ、向こう岸まで競争しよーぜ！」
line = "「──いたいた。魔王も一緒か。こっち来いよ、向こう岸まで競争しよーぜ！」"

[[dialogue]]
speaker = "ルリエル"
