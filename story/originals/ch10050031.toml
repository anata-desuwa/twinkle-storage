[[dialogue]]
speaker = "ソフィア"
# 「あぅ……そ、そうですか。無理していたこと──やはりあなたにはお見通しですよね。少し背伸びしすぎていたかもしれません……」
line = "「あぅ……そ、そうですか。無理していたこと──やはりあなたにはお見通しですよね。少し背伸びしすぎていたかもしれません……」"

