line = "「泳ぎっこ対決です！　向こうにちょうどいい小岩が浮かんでいるので、あそこまでタッチして帰ってくるんですよ！」"

[[dialogue]]
speaker = "ソフィア"
# 「競争……ですか」
line = "「競争……ですか」"

[[dialogue]]
speaker = "ソフィア"
# 「……いえ。私はこちらでゆっくりしています」
line = "「……いえ。私はこちらでゆっくりしています」"

[[dialogue]]
speaker = "アポロ"
# 「そーなのか？　せっかくの海なのに寝そべってるだけって、退屈じゃねーか？」
line = "「そーなのか？　せっかくの海なのに寝そべってるだけって、退屈じゃねーか？」"

[[dialogue]]
speaker = "ソフィア"
