# 「あ、会長さんも泳ぎっこに参加ですからね。さあ、一緒に大海原へ漕ぎ出しましょう！」
line = "「あ、会長さんも泳ぎっこに参加ですからね。さあ、一緒に大海原へ漕ぎ出しましょう！」"
