[[dialogue]]
speaker = "ルリエル"
# 「泳ぎ対決が終わったら、一緒にバナナボートに乗るのです！　でもって帰ってきたらスイカ割りですよ～！」
line = "「泳ぎ対決が終わったら、一緒にバナナボートに乗るのです！　でもって帰ってきたらスイカ割りですよ～！」"

[[dialogue]]
