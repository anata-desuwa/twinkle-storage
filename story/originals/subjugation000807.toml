[[dialogue]]
speaker = "unk"
# そうして、修業の日々を経て迎えた、バレンタイン前日の夜。
line = "そうして、修業の日々を経て迎えた、バレンタイン前日の夜。"

[[dialogue]]
speaker = "せつな"
# 「……できたでござる」
line = "「……できたでござる」"

[[dialogue]]
speaker = "せつな"
# 「ついに……！　せつなの愛を込めた、最強の主様チョコが……！」
line = "「ついに……！　せつなの愛を込めた、最強の主様チョコが……！」"

[[dialogue]]
speaker = "蘭美"
# 「まだ決戦前だけど、せつな――」
line = "「まだ決戦前だけど、せつな――」"

[[dialogue]]
speaker = "蘭美"
# 「おめでとうと言っておくわ。結構キツいことも言ったけど、よく私の指導に耐え抜いたわね」
line = "「おめでとうと言っておくわ。結構キツいことも言ったけど、よく私の指導に耐え抜いたわね」"

[[dialogue]]
speaker = "蘭美"
# 「他の料理はまだ無理だとしても、チョコ作りに関しては……私から特別に、合格点をあげるわ」
line = "「他の料理はまだ無理だとしても、チョコ作りに関しては……私から特別に、合格点をあげるわ」"

[[dialogue]]
speaker = "蘭美"
# 「光栄に思いなさい♪」
line = "「光栄に思いなさい♪」"

[[dialogue]]
speaker = "せつな"
# 「蘭美殿……！　ありがとうでございまする！」
line = "「蘭美殿……！　ありがとうでございまする！」"

[[dialogue]]
speaker = "せつな"
# 「今日まで親身にご指導下さったおかげで、せつなは手作りチョコを諦めず、形にすることができたでござる……！」
line = "「今日まで親身にご指導下さったおかげで、せつなは手作りチョコを諦めず、形にすることができたでござる……！」"

[[dialogue]]
speaker = "蘭美"
# 「これであとは、明日のバレンタイン当日、会長に渡すだけね」
line = "「これであとは、明日のバレンタイン当日、会長に渡すだけね」"

[[dialogue]]
speaker = "せつな"
# 「はい！　主様に――って」
line = "「はい！　主様に――って」"

[[dialogue]]
speaker = "せつな"
# 「ハッ……！？　し、しまったござる！　どうしよう……すっかり忘れてしまっていたでござる！」
line = "「ハッ……！？　し、しまったござる！　どうしよう……すっかり忘れてしまっていたでござる！」"

[[dialogue]]
speaker = "蘭美"
# 「え？　どうしたの？　なにをそんなに慌てて――」
line = "「え？　どうしたの？　なにをそんなに慌てて――」"

[[dialogue]]
speaker = "せつな"
# 「せつな、どうやってこのチョコを主様に渡すか、全然考えていなかったでござる！」
line = "「せつな、どうやってこのチョコを主様に渡すか、全然考えていなかったでござる！」"

[[dialogue]]
speaker = "蘭美"
# 「は？　いや、普通に会長の前に行って、どうぞって渡せばいいじゃない」
line = "「は？　いや、普通に会長の前に行って、どうぞって渡せばいいじゃない」"

[[dialogue]]
speaker = "せつな"
# 「そ、そんな恥ずかしいこと、せつなはできないでござる！」
line = "「そ、そんな恥ずかしいこと、せつなはできないでござる！」"

[[dialogue]]
speaker = "蘭美"
# 「なんでよ！？　普段から主様主様～♪　って、飼い猫みたいに懐いているでしょ！」
line = "「なんでよ！？　普段から主様主様～♪　って、飼い猫みたいに懐いているでしょ！」"

[[dialogue]]
speaker = "蘭美"
# 「日頃の感謝の気持ちとか言って渡せば、今更そんな恥ずかしいことなんてないわよ！」
line = "「日頃の感謝の気持ちとか言って渡せば、今更そんな恥ずかしいことなんてないわよ！」"

[[dialogue]]
speaker = "せつな"
# 「バレンタインに男性へチョコを渡すのは、せつなの中では恋愛的行動なのでござる！　せつなに恋愛は、刺激が強過ぎるでござる！」
line = "「バレンタインに男性へチョコを渡すのは、せつなの中では恋愛的行動なのでござる！　せつなに恋愛は、刺激が強過ぎるでござる！」"

[[dialogue]]
speaker = "蘭美"
# 「よくそれで手作りチョコを渡そうと思ったわね！？」
line = "「よくそれで手作りチョコを渡そうと思ったわね！？」"

[[dialogue]]
speaker = "せつな"
# 「だからこそ、主様にはバレンタインまで秘密にして、星徒会の会長机の上などにこっそり置いておく予定だったのでござる！」
line = "「だからこそ、主様にはバレンタインまで秘密にして、星徒会の会長机の上などにこっそり置いておく予定だったのでござる！」"

[[dialogue]]
speaker = "せつな"
# 「しかし、今回作ったチョコレートでは、それができませぬ……！」
line = "「しかし、今回作ったチョコレートでは、それができませぬ……！」"

[[dialogue]]
speaker = "せつな"
# 「かくなる上は、房中術の一環ということにして、裸にリボンを巻いたせつなのお色気で誤魔化しながら、チョコを――」
line = "「かくなる上は、房中術の一環ということにして、裸にリボンを巻いたせつなのお色気で誤魔化しながら、チョコを――」"

[[dialogue]]
speaker = "蘭美"
# 「いや、そっちの方が恥ずかしいでしょ！？　なんでエロ方面は、そんな平気なのよ！」
line = "「いや、そっちの方が恥ずかしいでしょ！？　なんでエロ方面は、そんな平気なのよ！」"

[[dialogue]]
speaker = "せつな"
# 「エロが好きという気持ちは、誰しもみんな心の奥に抱いているものだからでござる！　せつなはエロに関して、自分の気持ちを隠さない派でござる！」
line = "「エロが好きという気持ちは、誰しもみんな心の奥に抱いているものだからでござる！　せつなはエロに関して、自分の気持ちを隠さない派でござる！」"

[[dialogue]]
speaker = "蘭美"
# 「そこはもうちょっと忍びなさいよ！？」
line = "「そこはもうちょっと忍びなさいよ！？」"

[[dialogue]]
speaker = "蘭美"
# 「ああもう！　仕方ないわね！　ここまで来たら――」
line = "「ああもう！　仕方ないわね！　ここまで来たら――」"

[[dialogue]]
speaker = "蘭美"
# 「そこも私が特別に、プロデュースしてあげるわ！」
line = "「そこも私が特別に、プロデュースしてあげるわ！」"

[[dialogue]]
speaker = "unk"
# バレンタイン当日の放課後。
line = "バレンタイン当日の放課後。"

[[dialogue]]
speaker = "unk"
# 俺は蘭美に呼び出されて、アリーナへと足を運んだ――
line = "俺は蘭美に呼び出されて、アリーナへと足を運んだ――"

[[dialogue]]
speaker = "蘭美"
# 「よく来たわね、会長！　待っていたわ！」
line = "「よく来たわね、会長！　待っていたわ！」"

[[dialogue]]
speaker = "蘭美"
# 「なぜ呼び出されたかは、貴方なら何となく察しているんじゃないかしら？」
line = "「なぜ呼び出されたかは、貴方なら何となく察しているんじゃないかしら？」"

[[dialogue]]
speaker = "蘭美"
# 「でも、１つだけ言っておくと、貴方に用があるのは私じゃないわ」
line = "「でも、１つだけ言っておくと、貴方に用があるのは私じゃないわ」"

[[dialogue]]
speaker = "蘭美"
# 「というわけで、せつな！　出てきなさい！」
line = "「というわけで、せつな！　出てきなさい！」"

[[dialogue]]
speaker = "せつな"
# 「は、はいでござる……！」
line = "「は、はいでござる……！」"

[[dialogue]]
speaker = "せつな"
# 「そそそ、その、主様！　ほほほ、本日はお日柄もよく……！」
line = "「そそそ、その、主様！　ほほほ、本日はお日柄もよく……！」"

[[dialogue]]
speaker = "せつな"
# 「お忙しいところ、わざわざせつなの為に足をお運び、真に感謝致しますと共に、せせせ、せつにゃの愛を込めた、ちちち……ちゅよこをお渡ちちたく……」
line = "「お忙しいところ、わざわざせつなの為に足をお運び、真に感謝致しますと共に、せせせ、せつにゃの愛を込めた、ちちち……ちゅよこをお渡ちちたく……」"

[[dialogue]]
speaker = "蘭美"
# 「いや噛みすぎでしょ！？」
line = "「いや噛みすぎでしょ！？」"

[[dialogue]]
speaker = "蘭美"
# 「まぁでも、なんとなくそうなるんじゃないかと予想はしてたわ！　せつな、挨拶はもういいから、口寄せの星術を使いなさい！」
line = "「まぁでも、なんとなくそうなるんじゃないかと予想はしてたわ！　せつな、挨拶はもういいから、口寄せの星術を使いなさい！」"

[[dialogue]]
speaker = "せつな"
# 「か、かしこまりでござる！　口寄せ――」
line = "「か、かしこまりでござる！　口寄せ――」"

[[dialogue]]
speaker = "せつな"
# 「出でよ、チョコゴーレム！」
line = "「出でよ、チョコゴーレム！」"

[[dialogue]]
speaker = "ゴーレム"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# これは、カフェテリアの時の……！？
line = "これは、カフェテリアの時の……！？"

[[dialogue]]
speaker = "せつな"
# 「続いて、解凍の術でござる！」
line = "「続いて、解凍の術でござる！」"

[[dialogue]]
speaker = "蘭美"
# 「ふふふっ、会長、とくと味わいなさい！　これが――」
line = "「ふふふっ、会長、とくと味わいなさい！　これが――」"

[[dialogue]]
speaker = "ゴーレム"
# 「――ゴォォォッレム！！！」
line = "「――ゴォォォッレム！！！」"

[[dialogue]]
speaker = "蘭美"
# 「私とせつなで作り上げた、最強のチョコレートよ！」
line = "「私とせつなで作り上げた、最強のチョコレートよ！」"

[[dialogue]]
speaker = "unk"
# どういうこと！？！？
line = "どういうこと！？！？"

[[dialogue]]
speaker = "unk"
# 俺は思わず、全力でツッコむのだった――
line = "俺は思わず、全力でツッコむのだった――"
