[[dialogue]]
speaker = "unk"
# 第４話,梨緒との約束,P
line = "第４話,梨緒との約束,P"

[[dialogue]]
speaker = "梨緒"
# 「じー……」
line = "「じー……」"

[[dialogue]]
speaker = "梨緒"
# 「どうして私が星徒会室にいるか？　当然、選挙管理委員会として、星徒会活動が適切に行われているか確認するためだ。邪魔はしない。気にしないでくれ」
line = "「どうして私が星徒会室にいるか？　当然、選挙管理委員会として、星徒会活動が適切に行われているか確認するためだ。邪魔はしない。気にしないでくれ」"

[[dialogue]]
speaker = "梨緒"
# 「ふむ……仕事ぶりは堅実だな。私も星徒会業務をこなしていたからわかる」
line = "「ふむ……仕事ぶりは堅実だな。私も星徒会業務をこなしていたからわかる」"

[[dialogue]]
speaker = "unk"
# せっかくだしお茶でも淹れようか？
line = "せっかくだしお茶でも淹れようか？"

[[dialogue]]
speaker = "梨緒"
# 「いや、気持ちはありがたいがお断りしよう。遊びに来たわけではないし、選管が監視対象にもてなしを受けるわけにはいかない」
line = "「いや、気持ちはありがたいがお断りしよう。遊びに来たわけではないし、選管が監視対象にもてなしを受けるわけにはいかない」"

[[dialogue]]
speaker = "梨緒"
# 「それに、君はいつも忙しくしているからな。むしろお茶なら私が淹れたいくらいだ」
line = "「それに、君はいつも忙しくしているからな。むしろお茶なら私が淹れたいくらいだ」"

[[dialogue]]
speaker = "梨緒"
# 「幼い頃はイギリスに住んでいたから、紅茶には少しこだわりがある。フィオナもエリシアも、私が淹れたお茶を美味しいと言ってくれてな」
line = "「幼い頃はイギリスに住んでいたから、紅茶には少しこだわりがある。フィオナもエリシアも、私が淹れたお茶を美味しいと言ってくれてな」"

[[dialogue]]
speaker = "梨緒"
# 「紅茶ならスコーンとジャム、クロテッドクリームもあるとなおいい。いわゆるクリームティーという組み合わせだ」
line = "「紅茶ならスコーンとジャム、クロテッドクリームもあるとなおいい。いわゆるクリームティーという組み合わせだ」"

[[dialogue]]
speaker = "梨緒"
# 「スコーンを半分に割って、ジャムとクロテッドクリームを塗って……そうだ、君はどちらを先に塗る？　私はジャムが先の方が好みなんだが……」
line = "「スコーンを半分に割って、ジャムとクロテッドクリームを塗って……そうだ、君はどちらを先に塗る？　私はジャムが先の方が好みなんだが……」"

[[dialogue]]
speaker = "梨緒"
# 「特にこだわりはない？　君らしいな。ふふ」
line = "「特にこだわりはない？　君らしいな。ふふ」"

[[dialogue]]
speaker = "アナ"
# 「こんにちは、梨緒先輩」
line = "「こんにちは、梨緒先輩」"

[[dialogue]]
speaker = "梨緒"
# 「ひああぁっ！？」
line = "「ひああぁっ！？」"

[[dialogue]]
speaker = "梨緒"
# 「アナ、いつの間に来ていたんだ？」
line = "「アナ、いつの間に来ていたんだ？」"

[[dialogue]]
speaker = "アナ"
# 「おふたりがお話している間に。会長と梨緒先輩、最近よく一緒にいますね」
line = "「おふたりがお話している間に。会長と梨緒先輩、最近よく一緒にいますね」"

[[dialogue]]
speaker = "梨緒"
# 「わ、私は選管として星徒会長を監視しているだけだっ。親しくなどしていないっ」
line = "「わ、私は選管として星徒会長を監視しているだけだっ。親しくなどしていないっ」"

[[dialogue]]
speaker = "アナ"
# 「おふたりが親しくしている、とは私は一言も言っていませんが」
line = "「おふたりが親しくしている、とは私は一言も言っていませんが」"

[[dialogue]]
speaker = "梨緒"
# 「あ──！？」
line = "「あ──！？」"

[[dialogue]]
speaker = "梨緒"
# 「いや、それは……コホン。言葉の綾だ、忘れてくれ」
line = "「いや、それは……コホン。言葉の綾だ、忘れてくれ」"

[[dialogue]]
speaker = "梨緒"
# 「会長には用件がもうひとつある。この間テストがあっただろう？」
line = "「会長には用件がもうひとつある。この間テストがあっただろう？」"

[[dialogue]]
speaker = "梨緒"
# 「星徒会長たる者、学業も優秀でなければならない。よって次のテスト、どちらが高い点数を取れるか勝負だ！」
line = "「星徒会長たる者、学業も優秀でなければならない。よって次のテスト、どちらが高い点数を取れるか勝負だ！」"

[[dialogue]]
speaker = "梨緒"
# 「……受けて立つ、か。いい返事だ。しかし後悔しても知らないぞ。私は学年で総合２位を取ったこともあるからな」
line = "「……受けて立つ、か。いい返事だ。しかし後悔しても知らないぞ。私は学年で総合２位を取ったこともあるからな」"

[[dialogue]]
speaker = "マトイ"
# 「あ、また勝負してる。仲いいんだね」
line = "「あ、また勝負してる。仲いいんだね」"

[[dialogue]]
speaker = "サーシャ"
# 「あらあら、楽しそうね～」
line = "「あらあら、楽しそうね～」"

[[dialogue]]
speaker = "梨緒"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "梨緒"
# 「マトイ！？　サーシャ先輩！？　いつの間に！？」
line = "「マトイ！？　サーシャ先輩！？　いつの間に！？」"

[[dialogue]]
speaker = "サーシャ"
# 「アナちゃんと一緒に来てたわよ～」
line = "「アナちゃんと一緒に来てたわよ～」"

[[dialogue]]
speaker = "梨緒"
# 「思ったより早く来てた！？」
line = "「思ったより早く来てた！？」"

[[dialogue]]
speaker = "梨緒"
# 「……緋宮会長。言っておくが、私は君と戯れているわけではない。選挙管理委員会の職務として、君が会長にふさわしいか確かめているだけだ」
line = "「……緋宮会長。言っておくが、私は君と戯れているわけではない。選挙管理委員会の職務として、君が会長にふさわしいか確かめているだけだ」"

[[dialogue]]
speaker = "unk"
# わかってるよ
line = "わかってるよ"

[[dialogue]]
speaker = "梨緒"
# 「ならいいんだが。君が不甲斐なければ、星徒会長の座を奪いに行くつもりだ。心しておいてくれ」
line = "「ならいいんだが。君が不甲斐なければ、星徒会長の座を奪いに行くつもりだ。心しておいてくれ」"

[[dialogue]]
speaker = "梨緒"
# 「ではまた会おうっ」
line = "「ではまた会おうっ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「来るとき梨緒とすれ違ったんだけど、何かあったの？　顔が赤かった気がするけど……」
line = "「来るとき梨緒とすれ違ったんだけど、何かあったの？　顔が赤かった気がするけど……」"

[[dialogue]]
speaker = "マトイ"
# 「あはは……」
line = "「あはは……」"

[[dialogue]]
speaker = "アナ"
# 「若気の至り的なサムシングです」
line = "「若気の至り的なサムシングです」"

[[dialogue]]
speaker = "ヴィーナス"
# 「？」
line = "「？」"

[[dialogue]]
speaker = "unk"
# しばらくしてテストが返却されたのだが──
line = "しばらくしてテストが返却されたのだが──"

[[dialogue]]
speaker = "梨緒"
# 「うぅ……私はどうしようもない愚か者だ……」
line = "「うぅ……私はどうしようもない愚か者だ……」"

[[dialogue]]
speaker = "梨緒"
# 「途中から回答欄が１つずれていたとは……これでは勝負になるはずがない。私はテストひとつまともに回答できない能無しなんだ……」
line = "「途中から回答欄が１つずれていたとは……これでは勝負になるはずがない。私はテストひとつまともに回答できない能無しなんだ……」"

[[dialogue]]
speaker = "unk"
# 梨緒は立派だよ
line = "梨緒は立派だよ"

[[dialogue]]
speaker = "梨緒"
# 「！？　聞こえていたのか──いや、今なんて……梨緒は立派？」
line = "「！？　聞こえていたのか──いや、今なんて……梨緒は立派？」"

[[dialogue]]
speaker = "梨緒"
# 「なっ！？　わわ、私は立派なんかじゃないぞ！　何も守れなくて、仲間も、親友も失って……」
line = "「なっ！？　わわ、私は立派なんかじゃないぞ！　何も守れなくて、仲間も、親友も失って……」"

[[dialogue]]
speaker = "梨緒"
# 「御前試合にも勝てなくて、ひとりぼっちで……私には何ができるんだろう……」
line = "「御前試合にも勝てなくて、ひとりぼっちで……私には何ができるんだろう……」"

[[dialogue]]
speaker = "unk"
# それでも梨緒は世界を諦めてない
line = "それでも梨緒は世界を諦めてない"

[[dialogue]]
speaker = "梨緒"
# 「──！　そう、だ……私は世界を守れなった……だから今度こそ世界を救う。絶対に」
line = "「──！　そう、だ……私は世界を守れなった……だから今度こそ世界を救う。絶対に」"

[[dialogue]]
speaker = "unk"
# だから梨緒は強いよ
line = "だから梨緒は強いよ"

[[dialogue]]
speaker = "梨緒"
# 「私が強い……か。君のことだ、おだてているわけでもなさそうだ。慣れ合うわけにはいかないのに……困ったものだな」
line = "「私が強い……か。君のことだ、おだてているわけでもなさそうだ。慣れ合うわけにはいかないのに……困ったものだな」"

[[dialogue]]
speaker = "梨緒"
# 「私は君のことが嫌いなわけではない。むしろ信頼できる人物だと思っている」
line = "「私は君のことが嫌いなわけではない。むしろ信頼できる人物だと思っている」"

[[dialogue]]
speaker = "梨緒"
# 「だからこそ……君から目を離すことはできない」
line = "「だからこそ……君から目を離すことはできない」"

[[dialogue]]
speaker = "unk"
# 初めて会った時のように、梨緒がクロスボウに番えた矢を俺に突き付ける。
line = "初めて会った時のように、梨緒がクロスボウに番えた矢を俺に突き付ける。"

[[dialogue]]
speaker = "unk"
# その矢に強い決意が秘められていることを今の俺は知っている。
line = "その矢に強い決意が秘められていることを今の俺は知っている。"

[[dialogue]]
speaker = "梨緒"
# 「君が悪しき魔王に堕ちそうになったら、私が地獄の底まで追いかけて撃ち抜く。いいな」
line = "「君が悪しき魔王に堕ちそうになったら、私が地獄の底まで追いかけて撃ち抜く。いいな」"

[[dialogue]]
speaker = "unk"
# ああ、約束だ
line = "ああ、約束だ"

[[dialogue]]
speaker = "梨緒"
# 「笑ってそんな約束ができるのか。不思議なやつだな、君は」
line = "「笑ってそんな約束ができるのか。不思議なやつだな、君は」"

[[dialogue]]
speaker = "梨緒"
# 「これは君と私にしかできない約束だ。だからこの約束は必ず果たす」
line = "「これは君と私にしかできない約束だ。だからこの約束は必ず果たす」"

[[dialogue]]
speaker = "梨緒"
# 「忘れるな。いつでもこの矢が君を狙っているぞ」
line = "「忘れるな。いつでもこの矢が君を狙っているぞ」"
