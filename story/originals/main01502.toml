[[dialogue]]
speaker = "unk"
# 第３話,流星ディザスター,B
line = "第３話,流星ディザスター,B"

[[dialogue]]
speaker = "フィオナ"
# 「──はああああっっ！！」
line = "「──はああああっっ！！」"

[[dialogue]]
speaker = "アポロ"
# 「フン──少しはやるようだな」
line = "「フン──少しはやるようだな」"

[[dialogue]]
speaker = "サーシャ"
# 「フィオナちゃん……いつも以上にパワーが……！」
line = "「フィオナちゃん……いつも以上にパワーが……！」"

[[dialogue]]
speaker = "クロト"
# 「あと少しだ──フィオナ、アポロに呼びかけてやってくれ！」
line = "「あと少しだ──フィオナ、アポロに呼びかけてやってくれ！」"

[[dialogue]]
speaker = "フィオナ"
# 「ええ……！　姉さん、こっちです──２人でごっこ遊びをしていた、あの頃を思い出してください！」
line = "「ええ……！　姉さん、こっちです──２人でごっこ遊びをしていた、あの頃を思い出してください！」"

[[dialogue]]
speaker = "アポロ"
# 「っ……黙れ。あたしはおまえなど知らないと──言ってるだろう！」
line = "「っ……黙れ。あたしはおまえなど知らないと──言ってるだろう！」"

[[dialogue]]
speaker = "unk"
# フィオナとアポロにしか通じえない過去の絆。それは２人が本物の姉妹である証。
line = "フィオナとアポロにしか通じえない過去の絆。それは２人が本物の姉妹である証。"

[[dialogue]]
speaker = "unk"
# そんなフィオナの言葉は確実に、アポロの──アポロの外殻に覆われた少女の精神を揺さぶっていた。
line = "そんなフィオナの言葉は確実に、アポロの──アポロの外殻に覆われた少女の精神を揺さぶっていた。"

[[dialogue]]
speaker = "アポロ"
# 「あたしは……だって……流星ライダー、アポロ、なんだか……ら…………！」
line = "「あたしは……だって……流星ライダー、アポロ、なんだか……ら…………！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「──！　仮面にヒビが入ったわ──！」
line = "「──！　仮面にヒビが入ったわ──！」"

[[dialogue]]
speaker = "クロト"
# 「チャンスだ──一気に攻め込むぞ！」
line = "「チャンスだ──一気に攻め込むぞ！」"

[[dialogue]]
speaker = "unk"
# 取り巻きのモンスターたちを掃討し、いよいよアポロ本体に迫らんというところ。
line = "取り巻きのモンスターたちを掃討し、いよいよアポロ本体に迫らんというところ。"

[[dialogue]]
speaker = "unk"
# しかし──
line = "しかし──"

[[dialogue]]
speaker = "フィオナ"
# 「！？」
line = "「！？」"

[[dialogue]]
speaker = "unk"
# 不意に──横から差し挟まれた闇の閃撃によって、俺たちは再び距離を開けられてしまう。
line = "不意に──横から差し挟まれた闇の閃撃によって、俺たちは再び距離を開けられてしまう。"

[[dialogue]]
speaker = "unk"
# その原因は……
line = "その原因は……"

[[dialogue]]
speaker = "ギエル"
# 「ふははは──！　無駄無駄、無駄なことですよ皆様方！」
line = "「ふははは──！　無駄無駄、無駄なことですよ皆様方！」"

[[dialogue]]
speaker = "クロト"
# 「おまえは──ギエル──！」
line = "「おまえは──ギエル──！」"

[[dialogue]]
speaker = "ギエル"
# 「ご無沙汰ですねえ、星徒会の諸君。はるばる遠くの地へ旅立ったと聞いておりましたが……存外お早いご帰還の様子」
line = "「ご無沙汰ですねえ、星徒会の諸君。はるばる遠くの地へ旅立ったと聞いておりましたが……存外お早いご帰還の様子」"

[[dialogue]]
speaker = "ギエル"
# 「ですが残念ながら……今のアポロ様に浅はかな説得など通じませんよ。リクリエの<ruby=ほんぱ>本波</ruby>が近づいている今、己が『使命』もまた強まっているはずですから」
line = "「ですが残念ながら……今のアポロ様に浅はかな説得など通じませんよ。リクリエの<ruby>本波<rt>ほんぱ</rt></ruby>が近づいている今、己が『使命』もまた強まっているはずですから」"

[[dialogue]]
speaker = "ユウリ"
# 「何が使命だ──もしかして、あんたがアポロをたぶらかしたのか！？」
line = "「何が使命だ──もしかして、あんたがアポロをたぶらかしたのか！？」"

[[dialogue]]
speaker = "ギエル"
# 「まさか。私はただ、この偉大なるアポロ様にお命を拾っていただいただけの、しがない人間。その過去に偽りはありません」
line = "「まさか。私はただ、この偉大なるアポロ様にお命を拾っていただいただけの、しがない人間。その過去に偽りはありません」"

[[dialogue]]
speaker = "クロト"
# 「ただの人間……ってのは、見たところ間違いないみたいだが」
line = "「ただの人間……ってのは、見たところ間違いないみたいだが」"

[[dialogue]]
speaker = "unk"
# ギエルの発する星力は、妖しさこそあれど通常の星騎士と変わらない範疇だ。単騎で俺たちと伍するアポロとは比べるべくもない。
line = "ギエルの発する星力は、妖しさこそあれど通常の星騎士と変わらない範疇だ。単騎で俺たちと伍するアポロとは比べるべくもない。"

[[dialogue]]
speaker = "ギエル"
# 「アポロ様はリクリエの使徒として、このフィナーレを飾るべく動いておられる。無粋はしないでいただきましょうか」
line = "「アポロ様はリクリエの使徒として、このフィナーレを飾るべく動いておられる。無粋はしないでいただきましょうか」"

[[dialogue]]
speaker = "ギエル"
# 「ねえ……救世主様？」
line = "「ねえ……救世主様？」"

[[dialogue]]
speaker = "アポロ"
# 「……ああ。まったく、邪魔虫が多くていけないな」
line = "「……ああ。まったく、邪魔虫が多くていけないな」"

[[dialogue]]
speaker = "フィオナ"
# 「ッ──そんな……！」
line = "「ッ──そんな……！」"

[[dialogue]]
speaker = "クロト"
# 「仮面が──修復されてる──！？」
line = "「仮面が──修復されてる──！？」"

[[dialogue]]
speaker = "unk"
# アポロの精神はいつの間にか元に戻っていた。
line = "アポロの精神はいつの間にか元に戻っていた。"

[[dialogue]]
speaker = "unk"
# そして、確かに仮面へつけたはずの傷も……始めっからなかったかのように治りきっていて。
line = "そして、確かに仮面へつけたはずの傷も……始めっからなかったかのように治りきっていて。"

[[dialogue]]
speaker = "ギエル"
# 「いかがでしょう？　アポロ様──この、一度しかない終末劇を、あちらの特等席から観賞するというのは？」
line = "「いかがでしょう？　アポロ様──この、一度しかない終末劇を、あちらの特等席から観賞するというのは？」"

[[dialogue]]
speaker = "アポロ"
# 「……あれか」
line = "「……あれか」"

[[dialogue]]
speaker = "ヴィーナス"
# 「特等席って──」
line = "「特等席って──」"

[[dialogue]]
speaker = "unk"
# ギエルが指し示した先──
line = "ギエルが指し示した先──"

[[dialogue]]
speaker = "unk"
# それは、この超高空にたった一本だけそびえる、フィーニスの塔の頂上だった。
line = "それは、この超高空にたった一本だけそびえる、フィーニスの塔の頂上だった。"

[[dialogue]]
speaker = "アポロ"
# 「……悪くないな。何もかも滅んでいく様子が、よく見えそうだ」
line = "「……悪くないな。何もかも滅んでいく様子が、よく見えそうだ」"

[[dialogue]]
speaker = "ギエル"
# 「ええ。共にあの頂へ向かいましょう。私もお供いたします」
line = "「ええ。共にあの頂へ向かいましょう。私もお供いたします」"

[[dialogue]]
speaker = "ルリエル"
# 「フィーニスの塔の、頂──そんなところ、行けるものなのですか……！？」
line = "「フィーニスの塔の、頂──そんなところ、行けるものなのですか……！？」"

[[dialogue]]
speaker = "フィオナ"
# 「あそこに見えるのは……恐らく、人間界における最上層……！」
line = "「あそこに見えるのは……恐らく、人間界における最上層……！」"

[[dialogue]]
speaker = "unk"
# そしてアポロは、そこへいざなわれるようにゆらゆらと飛んでいく……。
line = "そしてアポロは、そこへいざなわれるようにゆらゆらと飛んでいく……。"

[[dialogue]]
speaker = "クロト"
# 「待て、アポロ──！」
line = "「待て、アポロ──！」"

[[dialogue]]
speaker = "アポロ"
# 「……ふぅ。めんどーだ」
line = "「……ふぅ。めんどーだ」"

[[dialogue]]
speaker = "アポロ"
# 「邪魔を……するな……ひーろーの──あたしの──正義を！！」
line = "「邪魔を……するな……ひーろーの──あたしの──正義を！！」"

[[dialogue]]
speaker = "ユウリ"
# 「なっ──！」
line = "「なっ──！」"

[[dialogue]]
speaker = "クロト"
# 「これは──」
line = "「これは──」"

[[dialogue]]
speaker = "unk"
# 空にまたたく無数の流れ星。その雨が──俺たち全員へ降り注ぐ！
line = "空にまたたく無数の流れ星。その雨が──俺たち全員へ降り注ぐ！"

[[dialogue]]
speaker = "フィオナ"
# 「指向性の流星群──！？」
line = "「指向性の流星群──！？」"

[[dialogue]]
speaker = "クロト"
# 「全員俺の後ろに下がれ──ひとつ残らず打ち砕く！」
line = "「全員俺の後ろに下がれ──ひとつ残らず打ち砕く！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「サポートするわ！　ちょっと数も多すぎるけど──！」
line = "「サポートするわ！　ちょっと数も多すぎるけど──！」"

[[dialogue]]
speaker = "アナ"
# 「地上へ降らせるわけにもいきません──！」
line = "「地上へ降らせるわけにもいきません──！」"

[[dialogue]]
speaker = "アポロ"
# 「集え、星の死骸たち！　流星──ディザスター！！」
line = "「集え、星の死骸たち！　流星──ディザスター！！」"

[[dialogue]]
speaker = "unk"
# 俺たちへ吸い寄せられるように急襲する星の光！
line = "俺たちへ吸い寄せられるように急襲する星の光！"

[[dialogue]]
speaker = "unk"
# かつてのアポロと比べても、あまりにも桁違いの大出力！
line = "かつてのアポロと比べても、あまりにも桁違いの大出力！"

[[dialogue]]
speaker = "クロト"
# （いつかの流星ストームとも比べ物にならない──これは凄まじすぎる──！）
line = "（いつかの流星ストームとも比べ物にならない──これは凄まじすぎる──！）"

[[dialogue]]
speaker = "unk"
# もしここが地上だったなら、衝撃波だけで周囲が消し飛んでいただろう。
line = "もしここが地上だったなら、衝撃波だけで周囲が消し飛んでいただろう。"

[[dialogue]]
speaker = "ギエル"
# 「──ふはははは！　素晴らしい！　これが選ばれしリクリエの使徒、アポロ様の真価──よもや人類の抗える存在ではありますまい！」
line = "「──ふはははは！　素晴らしい！　これが選ばれしリクリエの使徒、アポロ様の真価──よもや人類の抗える存在ではありますまい！」"

[[dialogue]]
speaker = "ユウリ"
# 「ぐっ……！　なんつう数の……進化しすぎだろっての──！」
line = "「ぐっ……！　なんつう数の……進化しすぎだろっての──！」"

[[dialogue]]
speaker = "ソフィア"
# 「ですが──私たちだって──！」
line = "「ですが──私たちだって──！」"

[[dialogue]]
speaker = "クロト"
# 「ああ──前までの俺たちとは違う！」
line = "「ああ──前までの俺たちとは違う！」"

[[dialogue]]
speaker = "unk"
# 矢のように降り注いだ流星群をやっとの思いでしのぎ切る。
line = "矢のように降り注いだ流星群をやっとの思いでしのぎ切る。"

[[dialogue]]
speaker = "ヴィーナス"
# 「隙ができたわ──さあ、反撃開始よ──！」
line = "「隙ができたわ──さあ、反撃開始よ──！」"

[[dialogue]]
speaker = "unk"
# 機は今しかない。全員が攻勢へ転じる。
line = "機は今しかない。全員が攻勢へ転じる。"

[[dialogue]]
speaker = "unk"
# だけど、アポロは静かに左手を天へと掲げて……
line = "だけど、アポロは静かに左手を天へと掲げて……"

[[dialogue]]
speaker = "アポロ"
# 「──天蓋」
line = "「──天蓋」"

[[dialogue]]
speaker = "クロト"
# 「やっぱりきたか──フィオナ！」
line = "「やっぱりきたか──フィオナ！」"

[[dialogue]]
speaker = "フィオナ"
# 「ええ。姉さんの好きには──させません！」
line = "「ええ。姉さんの好きには──させません！」"

[[dialogue]]
speaker = "unk"
# 以前の戦いから、アポロが『天蓋』を発動することはわかっていた。
line = "以前の戦いから、アポロが『天蓋』を発動することはわかっていた。"

[[dialogue]]
speaker = "unk"
# あの闇の障壁が展開されきってしまえば、俺たちは星の光を断たれてしまう。
line = "あの闇の障壁が展開されきってしまえば、俺たちは星の光を断たれてしまう。"

[[dialogue]]
speaker = "unk"
# ならアポロの手から天蓋が広がりきる前に、集中砲火で打ち砕くのみ──
line = "ならアポロの手から天蓋が広がりきる前に、集中砲火で打ち砕くのみ──"

[[dialogue]]
speaker = "アポロ"
# 「……なるほど。策は練ってきたようだ──が」
line = "「……なるほど。策は練ってきたようだ──が」"

[[dialogue]]
speaker = "アポロ"
# 「無駄だ」
line = "「無駄だ」"

[[dialogue]]
speaker = "フィオナ"
# 「！？」
line = "「！？」"

[[dialogue]]
speaker = "クロト"
# 「右手からも──！？」
line = "「右手からも──！？」"

[[dialogue]]
speaker = "unk"
# アポロは大剣を手放すと、そこから生じた闇によって２つ目の天蓋を展開させた。
line = "アポロは大剣を手放すと、そこから生じた闇によって２つ目の天蓋を展開させた。"

[[dialogue]]
speaker = "unk"
# あまりの手早さに打つ手はなく、闇のカーテンが天空へと広がっていく──
line = "あまりの手早さに打つ手はなく、闇のカーテンが天空へと広がっていく──"

[[dialogue]]
speaker = "ソフィア"
# 「あっ……」
line = "「あっ……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「うそ……」
line = "「うそ……」"

[[dialogue]]
speaker = "unk"
# 夜空を閉ざす闇の<ruby=とばり>帳</ruby>。
line = "夜空を閉ざす闇の<ruby>帳<rt>とばり</rt></ruby>。"

[[dialogue]]
speaker = "unk"
# 星との交信を絶たれたことで、星騎士たちは飛翔力さえ失ってしまう。
line = "星との交信を絶たれたことで、星騎士たちは飛翔力さえ失ってしまう。"

[[dialogue]]
speaker = "ニャリオン"
# 「ニャ──真っ逆さまだニャ──！」
line = "「ニャ──真っ逆さまだニャ──！」"

[[dialogue]]
speaker = "クロト"
# 「ッ──みんな──！」
line = "「ッ──みんな──！」"

[[dialogue]]
speaker = "unk"
# だが唯一──地球とリンクする俺だけは、まだ飛ぶことも戦うことも許されていた。
line = "だが唯一──地球とリンクする俺だけは、まだ飛ぶことも戦うことも許されていた。"

[[dialogue]]
speaker = "unk"
# 落下してゆくみんなを受け止めようと手を伸ばすが──
line = "落下してゆくみんなを受け止めようと手を伸ばすが──"

[[dialogue]]
speaker = "ギエル"
# 「おっと、つくづく余所見がお好きですね？」
line = "「おっと、つくづく余所見がお好きですね？」"

[[dialogue]]
speaker = "クロト"
# 「ぐあっ──！？」
line = "「ぐあっ──！？」"

[[dialogue]]
speaker = "ギエル"
# 「さようなら、薄汚い星騎士の皆さま──せいぜい地に這いつくばって世の終わりでも眺めているがよろしい」
line = "「さようなら、薄汚い星騎士の皆さま──せいぜい地に這いつくばって世の終わりでも眺めているがよろしい」"

[[dialogue]]
speaker = "クロト"
# 「ッ──ギエル──！」
line = "「ッ──ギエル──！」"

[[dialogue]]
speaker = "unk"
# ──墜落する。
line = "──墜落する。"

[[dialogue]]
speaker = "unk"
# 俺は必死に急降下し、この超高空で羽を失った星騎士たちを救助しに向かった……。
line = "俺は必死に急降下し、この超高空で羽を失った星騎士たちを救助しに向かった……。"
