[[dialogue]]
speaker = "unk"
# 第２話,シャルレーヌと放課後ショッピング,P
line = "第２話,シャルレーヌと放課後ショッピング,P"

[[dialogue]]
speaker = "シャルレーヌ"
# 「会長さんってー、普段はどんな服を着てるんですか？」
line = "「会長さんってー、普段はどんな服を着てるんですか？」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「トレーニングや星徒会の業務で忙しいのはわかりますけど、制服以外の服装って見たことない気がします」
line = "「トレーニングや星徒会の業務で忙しいのはわかりますけど、制服以外の服装って見たことない気がします」"

[[dialogue]]
speaker = "unk"
# ファッションはあんまり詳しくなくて……
line = "ファッションはあんまり詳しくなくて……"

[[dialogue]]
speaker = "シャルレーヌ"
# 「はぁ～。だと思いました。会長さんって星騎士に関わらないことは本当におざなりですよね」
line = "「はぁ～。だと思いました。会長さんって星騎士に関わらないことは本当におざなりですよね」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「ダメですよ、そんなんじゃ。星徒会長は学生の規範であり代表なんですから」
line = "「ダメですよ、そんなんじゃ。星徒会長は学生の規範であり代表なんですから」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「お休みの日になった途端、だっさ～い格好してたら魔王のカリスマもあったものじゃありません」
line = "「お休みの日になった途端、だっさ～い格好してたら魔王のカリスマもあったものじゃありません」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「ちょうどいい機会です。今日の放課後は空いていますか？ 　繁華街で服を見立ててあげます」
line = "「ちょうどいい機会です。今日の放課後は空いていますか？ 　繁華街で服を見立ててあげます」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「会長さん１人じゃ緊張して入れない、お高～い服屋さんをいっぱい知ってるんです。しっかりエスコートしてあげますね」
line = "「会長さん１人じゃ緊張して入れない、お高～い服屋さんをいっぱい知ってるんです。しっかりエスコートしてあげますね」"

[[dialogue]]
speaker = "unk"
# ──と、こんな流れで始まったショッピング。
line = "──と、こんな流れで始まったショッピング。"

[[dialogue]]
speaker = "unk"
# シャルレーヌとの買い物はとても賑やかで退屈しなかった。
line = "シャルレーヌとの買い物はとても賑やかで退屈しなかった。"

[[dialogue]]
speaker = "unk"
# いきなり際どい下着を２つ見せられて『どっちが私に似合います？』なんてからかわれもしたが……買い物そのものは楽しめた。
line = "いきなり際どい下着を２つ見せられて『どっちが私に似合います？』なんてからかわれもしたが……買い物そのものは楽しめた。"

[[dialogue]]
speaker = "unk"
# しかし、帰り道でまさかこんなことになろうとは……！
line = "しかし、帰り道でまさかこんなことになろうとは……！"

[[dialogue]]
speaker = "シャルレーヌ"
# 「くすくすっ♪　会長さぁん、がんばれ♪　がんばれっ♪　ゴールの電柱はすぐそこですよ～」
line = "「くすくすっ♪　会長さぁん、がんばれ♪　がんばれっ♪　ゴールの電柱はすぐそこですよ～」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「会長さんってば本当によわよわだったんですね。荷物持ちを賭けたじゃんけん……５回も連続で負けちゃうだなんて♪」
line = "「会長さんってば本当によわよわだったんですね。荷物持ちを賭けたじゃんけん……５回も連続で負けちゃうだなんて♪」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「私から言い出したことだけど～、なんだかちょっぴり可哀想になってきちゃったかもー」
line = "「私から言い出したことだけど～、なんだかちょっぴり可哀想になってきちゃったかもー」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「は～い……ゴールです、お疲れ様♪　ふふっ、それじゃあ６回戦っ。じゃ～んけんっ、ぽんっ♪　──ちょきっ♪」
line = "「は～い……ゴールです、お疲れ様♪　ふふっ、それじゃあ６回戦っ。じゃ～んけんっ、ぽんっ♪　──ちょきっ♪」"

[[dialogue]]
speaker = "unk"
# ぐわあああああ！？
line = "ぐわあああああ！？"

[[dialogue]]
speaker = "シャルレーヌ"
# 「くふふふっ♪　ざぁこざこっ♪　ウルトラざこ～♪　はーい負け犬ちゃん、ゴールはあそこのクレープ屋さんにしましょ～<emoji=heart04>」
line = "「くふふふっ♪　ざぁこざこっ♪　ウルトラざこ～♪　はーい負け犬ちゃん、ゴールはあそこのクレープ屋さんにしましょ～<emoji=heart04>」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「それにしてもー……どうやったらこんなに負けられるんでしょう？」
line = "「それにしてもー……どうやったらこんなに負けられるんでしょう？」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「ま・さ・か。真面目にやって６連敗なんて……そんなかっこ悪いわけないですよね♪」
line = "「ま・さ・か。真面目にやって６連敗なんて……そんなかっこ悪いわけないですよね♪」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「あっ！　もしかして、わざと負けてくれている……とか！？」
line = "「あっ！　もしかして、わざと負けてくれている……とか！？」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「可愛い後輩で、おまけに飼い主の女の子に、重たい荷物は持たせられない！　みたいな？」
line = "「可愛い後輩で、おまけに飼い主の女の子に、重たい荷物は持たせられない！　みたいな？」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「きゃぁ～、素敵～っ♪　会長さんってとっても紳士なんですね<emoji=heart04>」
line = "「きゃぁ～、素敵～っ♪　会長さんってとっても紳士なんですね<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ペットになった覚えはないぞ……！
line = "ペットになった覚えはないぞ……！"

[[dialogue]]
speaker = "シャルレーヌ"
# 「へー。可愛い後輩ってところは否定しないんですか。くふっ、うれし～♪」
line = "「へー。可愛い後輩ってところは否定しないんですか。くふっ、うれし～♪」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「……サービスしてあげましょうか、会長さん」
line = "「……サービスしてあげましょうか、会長さん」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「次の勝負はノーカウントにしましょう。荷物、私が交代してあげます」
line = "「次の勝負はノーカウントにしましょう。荷物、私が交代してあげます」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「じゃんけんクソよわ～な会長さんに慈悲をあげるのも、貴族の務めですからね」
line = "「じゃんけんクソよわ～な会長さんに慈悲をあげるのも、貴族の務めですからね」"

[[dialogue]]
speaker = "unk"
# 断る！　次こそ勝つ！　わからせてやる！
line = "断る！　次こそ勝つ！　わからせてやる！"

[[dialogue]]
speaker = "シャルレーヌ"
# 「わ。すごい気合いですね。う～ん、でも本当にいいんですか？　たぶん私、勝っちゃいますけど」
line = "「わ。すごい気合いですね。う～ん、でも本当にいいんですか？　たぶん私、勝っちゃいますけど」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「あ、絶対に引けないって顔してる。ほーんと男の子っておバカですよね。まあ、そこが可愛いんですけれど」
line = "「あ、絶対に引けないって顔してる。ほーんと男の子っておバカですよね。まあ、そこが可愛いんですけれど」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「さ……ちょうどチェックポイントに着きました。それじゃあ……じゃーんけんっ！」
line = "「さ……ちょうどチェックポイントに着きました。それじゃあ……じゃーんけんっ！」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「──ぽ～んっ♪」
line = "「──ぽ～んっ♪」"

[[dialogue]]
speaker = "unk"
# ──うわああああああああああああ！！！
line = "──うわああああああああああああ！！！"

[[dialogue]]
speaker = "シャルレーヌ"
# 「あれ～？　あれあれ～？　次こそは勝つんじゃなかったんですかぁ？」
line = "「あれ～？　あれあれ～？　次こそは勝つんじゃなかったんですかぁ？」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「会長さんのグーじゃあ、私のパーをわからせられませんけど～？　ざーこ<emoji=heart04>　ざこざこざこ、ざーこっ<emoji=heart04>」
line = "「会長さんのグーじゃあ、私のパーをわからせられませんけど～？　ざーこ<emoji=heart04>　ざこざこざこ、ざーこっ<emoji=heart04>」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「まぁ、勝負は勝負です。このまま学園まで帰りましょうね～。いっちに、いっちに<emoji=heart04>」
line = "「まぁ、勝負は勝負です。このまま学園まで帰りましょうね～。いっちに、いっちに<emoji=heart04>」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「この辺りでお別れにしましょうか。荷物運び、ありがと～。会長さん<emoji=heart04>」
line = "「この辺りでお別れにしましょうか。荷物運び、ありがと～。会長さん<emoji=heart04>」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「いっぱい楽しませてくれたことですし、ご褒美をあげますね」
line = "「いっぱい楽しませてくれたことですし、ご褒美をあげますね」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「はいコレ♪　会長さんみたいな、若い男の人にピッタリの香水です」
line = "「はいコレ♪　会長さんみたいな、若い男の人にピッタリの香水です」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「おしゃれは服だけじゃなくて、香りも大切な要素ですから」
line = "「おしゃれは服だけじゃなくて、香りも大切な要素ですから」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「香水はディアーブルの家業なんです。今日買った服に合わせて、使ってみてくださいね♪」
line = "「香水はディアーブルの家業なんです。今日買った服に合わせて、使ってみてくださいね♪」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「あ……それともう１つ♪」
line = "「あ……それともう１つ♪」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「会長さんってじゃんけんの時、眉の角度で出すものが全部ばれちゃってますよ？」
line = "「会長さんってじゃんけんの時、眉の角度で出すものが全部ばれちゃってますよ？」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「とっても弱くて、とっても楽しかったです。くふふ、また遊んであげますね。可愛い魔王様<emoji=heart04>」
line = "「とっても弱くて、とっても楽しかったです。くふふ、また遊んであげますね。可愛い魔王様<emoji=heart04>」"
