[[dialogue]]
speaker = "unk"
# 第３話,二人きりの勉強会,P
line = "第３話,二人きりの勉強会,P"

[[dialogue]]
speaker = "美鶴"
# 「はぁぁぁ……」
line = "「はぁぁぁ……」"

[[dialogue]]
speaker = "unk"
# 廊下でばったり出くわした美鶴は、なんだか憂鬱そうだった。
line = "廊下でばったり出くわした美鶴は、なんだか憂鬱そうだった。"

[[dialogue]]
speaker = "美鶴"
# 「え……悩み？　誰も気づかなかったのに、よく分かったね。うち、いつもやる気なさげな顔してるから、平常運転と思われてたよ」
line = "「え……悩み？　誰も気づかなかったのに、よく分かったね。うち、いつもやる気なさげな顔してるから、平常運転と思われてたよ」"

[[dialogue]]
speaker = "美鶴"
# 「や、憂鬱なのはさ……もうじき、定期テストじゃん」
line = "「や、憂鬱なのはさ……もうじき、定期テストじゃん」"

[[dialogue]]
speaker = "美鶴"
# 「頭悪いから、また赤点かな……補習はやだ……服作る時間も減っちゃうし……はぁぁ……」
line = "「頭悪いから、また赤点かな……補習はやだ……服作る時間も減っちゃうし……はぁぁ……」"

[[dialogue]]
speaker = "美鶴"
# 「なんでか勉強できるみたいに思われてるけど、正直すごく苦手。魔界じゃ学校に通ってなかったから、やり方もよく分かんなくって……」
line = "「なんでか勉強できるみたいに思われてるけど、正直すごく苦手。魔界じゃ学校に通ってなかったから、やり方もよく分かんなくって……」"

[[dialogue]]
speaker = "美鶴"
# 「授業も全然ついてけてないから、もっと分かりやすく教えてほしいんだけど、先生に聞きに行くのもなんか悪いし」
line = "「授業も全然ついてけてないから、もっと分かりやすく教えてほしいんだけど、先生に聞きに行くのもなんか悪いし」"

[[dialogue]]
speaker = "美鶴"
# 「あ、そうだ。会長さんって、成績良いんだよね」
line = "「あ、そうだ。会長さんって、成績良いんだよね」"

[[dialogue]]
speaker = "美鶴"
# 「良かったらだけど、勉強教えてくれない？　ちゃんとお礼はするから。ね」
line = "「良かったらだけど、勉強教えてくれない？　ちゃんとお礼はするから。ね」"

[[dialogue]]
speaker = "unk"
# 約束を交わして、次の週末。美鶴を招いての勉強会。
line = "約束を交わして、次の週末。美鶴を招いての勉強会。"

[[dialogue]]
speaker = "unk"
# 星徒会室や図書館も提案したのだけど、本人のたっての希望で俺の家となった。
line = "星徒会室や図書館も提案したのだけど、本人のたっての希望で俺の家となった。"

[[dialogue]]
speaker = "美鶴"
# 「お邪魔しまーす。ここに会長さん住んでるんだ。ふーん。へー」
line = "「お邪魔しまーす。ここに会長さん住んでるんだ。ふーん。へー」"

[[dialogue]]
speaker = "unk"
# 早速だけど前の解答用紙、見せてくれる？
line = "早速だけど前の解答用紙、見せてくれる？"

[[dialogue]]
speaker = "美鶴"
# 「う。お手柔らかにお願い」
line = "「う。お手柔らかにお願い」"

[[dialogue]]
speaker = "unk"
# 渋々差し出された採点済みの解答用紙を確認すると、○より×が圧倒的に多い。全部赤点だ。
line = "渋々差し出された採点済みの解答用紙を確認すると、○より×が圧倒的に多い。全部赤点だ。"

[[dialogue]]
speaker = "美鶴"
# 「可哀想な子を見る目じゃん……うちが頭悪いのは分かってるって」
line = "「可哀想な子を見る目じゃん……うちが頭悪いのは分かってるって」"

[[dialogue]]
speaker = "美鶴"
# 「難しい服を作れるんだから、地頭はいい？　……そう？　そんなこと言ってくれたの、会長さんが初めて」
line = "「難しい服を作れるんだから、地頭はいい？　……そう？　そんなこと言ってくれたの、会長さんが初めて」"

[[dialogue]]
speaker = "美鶴"
# 「でも、国語も数学も全然ダメ。なんで数字の中にＸとかＹなんて英語が混ざってるのかもさっぱり」
line = "「でも、国語も数学も全然ダメ。なんで数字の中にＸとかＹなんて英語が混ざってるのかもさっぱり」"

[[dialogue]]
speaker = "unk"
# 得意なものに置き換えると、分かりやすいかも
line = "得意なものに置き換えると、分かりやすいかも"

[[dialogue]]
speaker = "美鶴"
# 「うちが得意って言うと……服作り？　そんなことできるわけ──あ、数字をサイズに置き換えて……頭の中に型紙を広げるイメージにしたら」
line = "「うちが得意って言うと……服作り？　そんなことできるわけ──あ、数字をサイズに置き換えて……頭の中に型紙を広げるイメージにしたら」"

[[dialogue]]
speaker = "美鶴"
# 「Ｘが５の場合、Ｙが７になるから、サイズがぴったりになる……あ、そーゆーこと？」
line = "「Ｘが５の場合、Ｙが７になるから、サイズがぴったりになる……あ、そーゆーこと？」"

[[dialogue]]
speaker = "美鶴"
# 「次の問題も、Ｘの軸を身長、Ｙの軸を肩幅に見立てれば……あー、あー、分かった。これなら解ける」
line = "「次の問題も、Ｘの軸を身長、Ｙの軸を肩幅に見立てれば……あー、あー、分かった。これなら解ける」"

[[dialogue]]
speaker = "unk"
# 美鶴の独特な感性はちょっと伝わってこなかったけど、俺のアドバイスは解決の糸口になったみたいだ。
line = "美鶴の独特な感性はちょっと伝わってこなかったけど、俺のアドバイスは解決の糸口になったみたいだ。"

[[dialogue]]
speaker = "美鶴"
# 「ん、隣に会長さんがいてくれると、すごく捗る。いつもは部屋でひとりで勉強してるんだけど。服のアイデアって勉強してる時に限って降りてくるじゃん」
line = "「ん、隣に会長さんがいてくれると、すごく捗る。いつもは部屋でひとりで勉強してるんだけど。服のアイデアって勉強してる時に限って降りてくるじゃん」"

[[dialogue]]
speaker = "美鶴"
# 「１回、気ぃ取られちゃったらもうダメ。勉強そっちのけになっちゃって、気がつけば朝になってたり」
line = "「１回、気ぃ取られちゃったらもうダメ。勉強そっちのけになっちゃって、気がつけば朝になってたり」"

[[dialogue]]
speaker = "美鶴"
# 「うちと一緒に勉強してくれる子もいないからね。うちみたいなダメ子ちゃんと一緒だと迷惑かけちゃうし──って、会長さんにも迷惑かけてるよね。ごめん」
line = "「うちと一緒に勉強してくれる子もいないからね。うちみたいなダメ子ちゃんと一緒だと迷惑かけちゃうし──って、会長さんにも迷惑かけてるよね。ごめん」"

[[dialogue]]
speaker = "unk"
# わからないところは、いくらでも聞いてよ
line = "わからないところは、いくらでも聞いてよ"

[[dialogue]]
speaker = "美鶴"
# 「そーゆーもの？　迷惑じゃないならいろいろ聞くね」
line = "「そーゆーもの？　迷惑じゃないならいろいろ聞くね」"

[[dialogue]]
speaker = "unk"
# 服作りに打ち込める集中力を、勉強の方に向けられれば、勝機はありそうに思えた。
line = "服作りに打ち込める集中力を、勉強の方に向けられれば、勝機はありそうに思えた。"

[[dialogue]]
speaker = "美鶴"
# 「歴史の年号も数字だし。縦横の幅を組み合わせてイメージすれば覚えられそう。縦７センチ×横１０センチみたいな」
line = "「歴史の年号も数字だし。縦横の幅を組み合わせてイメージすれば覚えられそう。縦７センチ×横１０センチみたいな」"

[[dialogue]]
speaker = "unk"
# 覚え方は万人が真似できない独特なものだったけど、計算や暗記問題は集中することである程度解決した。
line = "覚え方は万人が真似できない独特なものだったけど、計算や暗記問題は集中することである程度解決した。"

[[dialogue]]
speaker = "unk"
# しかし、躓いたのは国語の文章問題だ。
line = "しかし、躓いたのは国語の文章問題だ。"

[[dialogue]]
speaker = "美鶴"
# 「『傍線の箇所における登場人物の感情にふさわしいものを、以下の正しいものから選べ』……う」
line = "「『傍線の箇所における登場人物の感情にふさわしいものを、以下の正しいものから選べ』……う」"

[[dialogue]]
speaker = "美鶴"
# 「や、こーゆー問題、苦手。ここに出てくる人の感情なんて分からなくない？　顔だって見えてないし」
line = "「や、こーゆー問題、苦手。ここに出てくる人の感情なんて分からなくない？　顔だって見えてないし」"

[[dialogue]]
speaker = "unk"
# 理解できなくて大丈夫。全部書いてあるよ
line = "理解できなくて大丈夫。全部書いてあるよ"

[[dialogue]]
speaker = "美鶴"
# 「え、でも……あ、ここ？『妻の形見を失い、悲しみに打ちひしがれた男』……悲しいなら『絶望』でＯＫ？」
line = "「え、でも……あ、ここ？『妻の形見を失い、悲しみに打ちひしがれた男』……悲しいなら『絶望』でＯＫ？」"

[[dialogue]]
speaker = "美鶴"
# 「やった、合ってた。テストの問題って、そーゆーものなんだ。出てくる人の気持ちを全部分からなきゃ解けないって思ってた」
line = "「やった、合ってた。テストの問題って、そーゆーものなんだ。出てくる人の気持ちを全部分からなきゃ解けないって思ってた」"

[[dialogue]]
speaker = "美鶴"
# 「……あ。もしかしてなんだけど、これってリアルでも同じだったりする？　最初は相手の気持ちが理解できてなくてもだいじょぶなんかな」
line = "「……あ。もしかしてなんだけど、これってリアルでも同じだったりする？　最初は相手の気持ちが理解できてなくてもだいじょぶなんかな」"

[[dialogue]]
speaker = "unk"
# 大丈夫だよ。段々と分かるようになるから
line = "大丈夫だよ。段々と分かるようになるから"

[[dialogue]]
speaker = "美鶴"
# 「……そーなんだ。みんな最初っから仲良さそうに話してるから、相手の気持ちが分かってるのかとばっかし」
line = "「……そーなんだ。みんな最初っから仲良さそうに話してるから、相手の気持ちが分かってるのかとばっかし」"

[[dialogue]]
speaker = "美鶴"
# 「そーだよね。最初はちょっとビビってた会長さんのことも、今はちょっとだけ分かった気がするし」
line = "「そーだよね。最初はちょっとビビってた会長さんのことも、今はちょっとだけ分かった気がするし」"

[[dialogue]]
speaker = "美鶴"
# 「はー……これ、今日、教えてもらったことの中で、一番大事なことかも。ありがと、会長さん」
line = "「はー……これ、今日、教えてもらったことの中で、一番大事なことかも。ありがと、会長さん」"

[[dialogue]]
speaker = "美鶴"
# 「ん、手始めにメイド隊のみんなに話しかけてみるかな……でも、今よりもっと仲良くなりたい人が、他にできちゃったし」
line = "「ん、手始めにメイド隊のみんなに話しかけてみるかな……でも、今よりもっと仲良くなりたい人が、他にできちゃったし」"

[[dialogue]]
speaker = "unk"
# そうなんだ。その人と仲良くなれると良いね
line = "そうなんだ。その人と仲良くなれると良いね"

[[dialogue]]
speaker = "美鶴"
# 「うん。ふふ♪」
line = "「うん。ふふ♪」"

[[dialogue]]
speaker = "unk"
# その後も、美鶴の勉強はとても捗った。
line = "その後も、美鶴の勉強はとても捗った。"

[[dialogue]]
speaker = "美鶴"
# 「それで会長さん、ここの問題なんだけどさ」
line = "「それで会長さん、ここの問題なんだけどさ」"

[[dialogue]]
speaker = "unk"
# だんだんと俺との距離が近づいてきたのは、問題が解けるようになって、勉強に夢中になってたせいに違いない。
line = "だんだんと俺との距離が近づいてきたのは、問題が解けるようになって、勉強に夢中になってたせいに違いない。"

[[dialogue]]
speaker = "美鶴"
# 「あ、会長さん」
line = "「あ、会長さん」"

[[dialogue]]
speaker = "unk"
# 定期テストはどうだった？
line = "定期テストはどうだった？"

[[dialogue]]
speaker = "美鶴"
# 「ふふ、全教科赤点回避できた。ありがと。おかげで授業も前より分かるようになったよ。ちょっとだけね」
line = "「ふふ、全教科赤点回避できた。ありがと。おかげで授業も前より分かるようになったよ。ちょっとだけね」"

[[dialogue]]
speaker = "unk"
# さすがに一朝一夕で成績が跳ね上がるとまではいかなかったが、美鶴のテスト結果はいつもより少し良くなったらしい。
line = "さすがに一朝一夕で成績が跳ね上がるとまではいかなかったが、美鶴のテスト結果はいつもより少し良くなったらしい。"

[[dialogue]]
speaker = "美鶴"
# 「まだ１人でしてると、ついついサボっちゃいそうだから。次のテスト勉強も、見てくれない？」
line = "「まだ１人でしてると、ついついサボっちゃいそうだから。次のテスト勉強も、見てくれない？」"

[[dialogue]]
speaker = "unk"
# 向上心も見受けられるし、ほんの少しでも勉強の楽しさを理解できたなら教えた甲斐があったというものだった。
line = "向上心も見受けられるし、ほんの少しでも勉強の楽しさを理解できたなら教えた甲斐があったというものだった。"
