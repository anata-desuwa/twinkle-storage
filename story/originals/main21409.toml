[[dialogue]]
speaker = "unk"
# 第９話,偽りの１０年間,B
line = "第９話,偽りの１０年間,B"

[[dialogue]]
speaker = "unk"
# ──ベアトリス・シェイド。
line = "──ベアトリス・シェイド。"

[[dialogue]]
speaker = "unk"
# お父様から命令を受けて、地上に降り立った私が最初に出会った女の子。
line = "お父様から命令を受けて、地上に降り立った私が最初に出会った女の子。"

[[dialogue]]
speaker = "ベアトリス"
# 「大変な時に人間界に来ちゃった……」
line = "「大変な時に人間界に来ちゃった……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「<ruby=ラーゴ・シエロ>鏡界の湖</ruby>から密航するだなんて、ずいぶんと無茶をしたわね」
line = "「<ruby>鏡界の湖<rt>ラーゴ・シエロ</rt></ruby>から密航するだなんて、ずいぶんと無茶をしたわね」"

[[dialogue]]
speaker = "ベアトリス"
# 「うん。到着したら人間界は大変なことになってるし……彗星の雨まで降りだしちゃうし……」
line = "「うん。到着したら人間界は大変なことになってるし……彗星の雨まで降りだしちゃうし……」"

[[dialogue]]
speaker = "ベアトリス"
# 「今朝までシェルターにいたんだけど、モンスターが入ってきちゃって……」
line = "「今朝までシェルターにいたんだけど、モンスターが入ってきちゃって……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「それで戦っていたのね。無茶をしすぎよ？」
line = "「それで戦っていたのね。無茶をしすぎよ？」"

[[dialogue]]
speaker = "ベアトリス"
# 「でもルヴィネちゃんが助けてくれたもん。結果オーライだよ、ねっ？」
line = "「でもルヴィネちゃんが助けてくれたもん。結果オーライだよ、ねっ？」"

[[dialogue]]
speaker = "unk"
# ──ちょうどいい。この子は利用できる。人間界で活動する足掛かりに、使わせてもらおう。
line = "──ちょうどいい。この子は利用できる。人間界で活動する足掛かりに、使わせてもらおう。"

[[dialogue]]
speaker = "ベアトリス"
# 「今日は大勢助けられたね！　よかったぁ！」
line = "「今日は大勢助けられたね！　よかったぁ！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「ええ。まだ戦いが終わっていないと思って、シェルターにこもっている人たちがいるはずよ。明日も頑張りましょう」
line = "「ええ。まだ戦いが終わっていないと思って、シェルターにこもっている人たちがいるはずよ。明日も頑張りましょう」"

[[dialogue]]
speaker = "ベアトリス"
# 「うん！　ルヴィネちゃんがいてくれてよかった……どんなモンスターもあっという間に倒しちゃうんだもん」
line = "「うん！　ルヴィネちゃんがいてくれてよかった……どんなモンスターもあっという間に倒しちゃうんだもん」"

[[dialogue]]
speaker = "ベアトリス"
# 「流石は女神様の遣いだね。悪い使徒もやっつけられるくらい強いだなんて！」
line = "「流石は女神様の遣いだね。悪い使徒もやっつけられるくらい強いだなんて！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「ええ──そうね」
line = "「ええ──そうね」"

[[dialogue]]
speaker = "unk"
# 彼女は私の言うことを何でも信じた。人なつっこい性格をしていて、能天気で、疑うことを知らない。
line = "彼女は私の言うことを何でも信じた。人なつっこい性格をしていて、能天気で、疑うことを知らない。"

[[dialogue]]
speaker = "unk"
# 避難民が増えるたびに、私がどれだけ有能で信頼に足る天使であるかを、頼まなくても喋ってくれる。
line = "避難民が増えるたびに、私がどれだけ有能で信頼に足る天使であるかを、頼まなくても喋ってくれる。"

[[dialogue]]
speaker = "unk"
# 現場を見たわけでもないのに『仮面の女』を倒したという嘘だって信じるのだから……間抜けもいいところ。
line = "現場を見たわけでもないのに『仮面の女』を倒したという嘘だって信じるのだから……間抜けもいいところ。"

[[dialogue]]
speaker = "unk"
# 本当に運がいい──こんな便利な子と最初に知り合いになれるだなんて。
line = "本当に運がいい──こんな便利な子と最初に知り合いになれるだなんて。"

[[dialogue]]
speaker = "unk"
# それからチナという、流星市国育ちの人間を救出した。この土地で生まれ育った彼女も、大いに私の役に立ってくれた。
line = "それからチナという、流星市国育ちの人間を救出した。この土地で生まれ育った彼女も、大いに私の役に立ってくれた。"

[[dialogue]]
speaker = "unk"
# 私の手駒は、順調に増えていった。
line = "私の手駒は、順調に増えていった。"

[[dialogue]]
speaker = "unk"
# グレイス、そしてレティシア──歳が近い少女たちを選んで、そばに置くことにした。
line = "グレイス、そしてレティシア──歳が近い少女たちを選んで、そばに置くことにした。"

[[dialogue]]
speaker = "unk"
# お父様、見ていてください。未来で起こるアルタイルとの決戦までに、最強のデネブを作り上げてみせます。
line = "お父様、見ていてください。未来で起こるアルタイルとの決戦までに、最強のデネブを作り上げてみせます。"

[[dialogue]]
speaker = "ルヴィネ"
# 「今日のベアトリスさんの行動は、褒められたものではないわ。無茶はしないように言ったでしょう？」
line = "「今日のベアトリスさんの行動は、褒められたものではないわ。無茶はしないように言ったでしょう？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「あなたが怪我をしたら、みんな悲しむわ。もちろん……私も」
line = "「あなたが怪我をしたら、みんな悲しむわ。もちろん……私も」"

[[dialogue]]
speaker = "unk"
# 心配したふりをして声をかける。
line = "心配したふりをして声をかける。"

[[dialogue]]
speaker = "unk"
# こういう行動の積み重ねが、『絆』とかいうものを育てるらしい……手間はかかるけれど、やらなくては。
line = "こういう行動の積み重ねが、『絆』とかいうものを育てるらしい……手間はかかるけれど、やらなくては。"

[[dialogue]]
speaker = "ベアトリス"
# 「ごめんなさい……でも、放っておけなくて……」
line = "「ごめんなさい……でも、放っておけなくて……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「今後は自分の安全を最優先に。危ない敵はぜんぶ私が倒すから、任せて頂戴」
line = "「今後は自分の安全を最優先に。危ない敵はぜんぶ私が倒すから、任せて頂戴」"

[[dialogue]]
speaker = "ベアトリス"
# 「う、うん。頼らせて、もらうね……？」
line = "「う、うん。頼らせて、もらうね……？」"

[[dialogue]]
speaker = "unk"
# 完璧ね──これでいい。
line = "完璧ね──これでいい。"

[[dialogue]]
speaker = "ベアトリス"
# 「でも、ごめんなさい。同じ状況になったら私、また助けに行って、ケガしちゃうと思う……」
line = "「でも、ごめんなさい。同じ状況になったら私、また助けに行って、ケガしちゃうと思う……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……なんですって？」
line = "「……なんですって？」"

[[dialogue]]
speaker = "ベアトリス"
# 「私、誰かが困ってたら見てみぬふりなんてできない……だから迷惑かけちゃうかも……ごめんね？」
line = "「私、誰かが困ってたら見てみぬふりなんてできない……だから迷惑かけちゃうかも……ごめんね？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# 出会った時は素直だと思っていたけれど……この吸血鬼、意外と頑固なのよね……
line = "出会った時は素直だと思っていたけれど……この吸血鬼、意外と頑固なのよね……"

[[dialogue]]
speaker = "ベアトリス"
# 「私、魔界で生まれた吸血鬼なんだけど……ルヴィネちゃんは『影の一族』って知ってる？」
line = "「私、魔界で生まれた吸血鬼なんだけど……ルヴィネちゃんは『影の一族』って知ってる？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「いいえ、初めて聞くわ」
line = "「いいえ、初めて聞くわ」"

[[dialogue]]
speaker = "ベアトリス"
# 「そっか。影の一族はね、すごく強い体を持ってるんだけど、太陽の下を歩けないの。日光を浴びると、すぐに死んじゃうんだ」
line = "「そっか。影の一族はね、すごく強い体を持ってるんだけど、太陽の下を歩けないの。日光を浴びると、すぐに死んじゃうんだ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……あなたは、そうじゃないみたいだけれど？」
line = "「……あなたは、そうじゃないみたいだけれど？」"

[[dialogue]]
speaker = "ベアトリス"
# 「今は星力があるから平気なだけ。もっとちっちゃい時は、ずっと洞窟に住んでたんだよ」
line = "「今は星力があるから平気なだけ。もっとちっちゃい時は、ずっと洞窟に住んでたんだよ」"

[[dialogue]]
speaker = "ベアトリス"
# 「私、吸血鬼なのに生まれつき体が弱くて。だから一族のみんなにも足手まといだって嫌われててね……」
line = "「私、吸血鬼なのに生まれつき体が弱くて。だから一族のみんなにも足手まといだって嫌われててね……」"

[[dialogue]]
speaker = "ベアトリス"
# 「ルヴィネちゃんが倒してくれた『仮面の女』……魔界で暴れてたことがあるんだけど。その時に私、捨てられたの」
line = "「ルヴィネちゃんが倒してくれた『仮面の女』……魔界で暴れてたことがあるんだけど。その時に私、捨てられたの」"

[[dialogue]]
speaker = "ベアトリス"
# 「一族が暮らしてる洞窟の近い所で、使徒が現れたって噂が届いて……」
line = "「一族が暮らしてる洞窟の近い所で、使徒が現れたって噂が届いて……」"

[[dialogue]]
speaker = "ベアトリス"
# 「私が眠ってる間に、みんな荷造りして出ていっちゃった……遠くに他の一族が使ってる洞窟があるから、そこに行こうって」
line = "「私が眠ってる間に、みんな荷造りして出ていっちゃった……遠くに他の一族が使ってる洞窟があるから、そこに行こうって」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……どうして眠っていたのに、会話の内容を知っているの？」
line = "「……どうして眠っていたのに、会話の内容を知っているの？」"

[[dialogue]]
speaker = "ベアトリス"
# 「寝たふり、してたから」
line = "「寝たふり、してたから」"

[[dialogue]]
speaker = "ルヴィネ"
# 「なぜ？　連れていってほしいと頼まないのは、合理的ではないわ」
line = "「なぜ？　連れていってほしいと頼まないのは、合理的ではないわ」"

[[dialogue]]
speaker = "ベアトリス"
# 「言えなかった。お父さんとお母さんが『目が覚めたら面倒だから、早く出よう』って。あんな言葉を聞いたら……」
line = "「言えなかった。お父さんとお母さんが『目が覚めたら面倒だから、早く出よう』って。あんな言葉を聞いたら……」"

[[dialogue]]
speaker = "ベアトリス"
# 「みんなの足を引っ張りたくなかったし……辛くて、声が出なかったし……」
line = "「みんなの足を引っ張りたくなかったし……辛くて、声が出なかったし……」"

[[dialogue]]
speaker = "ベアトリス"
# 「それで私、朝になったらおひさまの下に出ようって決めてたの。もう生きてても仕方ないって……ずっと泣いてた……」
line = "「それで私、朝になったらおひさまの下に出ようって決めてたの。もう生きてても仕方ないって……ずっと泣いてた……」"

[[dialogue]]
speaker = "unk"
# 呑気そうな彼女が明かす過去は、ひどいものだった──
line = "呑気そうな彼女が明かす過去は、ひどいものだった──"

[[dialogue]]
speaker = "ベアトリス"
# 「そうしたらね？　泣いてる私に気づいて、１人の星騎士さんが洞窟を覗いてくれたの」
line = "「そうしたらね？　泣いてる私に気づいて、１人の星騎士さんが洞窟を覗いてくれたの」"

[[dialogue]]
speaker = "ベアトリス"
# 「優しいおじさんだった。あんなに優しくしてもらったの、生まれて初めてだった」
line = "「優しいおじさんだった。あんなに優しくしてもらったの、生まれて初めてだった」"

[[dialogue]]
speaker = "ベアトリス"
# 「『私にも娘がいる』『放っておけない』って、近くの村まで連れて行ってくれて……」
line = "「『私にも娘がいる』『放っておけない』って、近くの村まで連れて行ってくれて……」"

[[dialogue]]
speaker = "ベアトリス"
# 「その人、有名な人だったみたい。村の人も『あなたの頼みなら』って、温かく私を迎えてくれた」
line = "「その人、有名な人だったみたい。村の人も『あなたの頼みなら』って、温かく私を迎えてくれた」"

[[dialogue]]
speaker = "ベアトリス"
# 「その時に、星騎士のおじさんに言われたの。『困ってる人がいたら、今度は君が助けてあげなさい』って」
line = "「その時に、星騎士のおじさんに言われたの。『困ってる人がいたら、今度は君が助けてあげなさい』って」"

[[dialogue]]
speaker = "ベアトリス"
# 「命の恩人との大切な約束だから……ごめんね？」
line = "「命の恩人との大切な約束だから……ごめんね？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……そう。ごめんなさい。あなたの覚悟に、水を差す真似をしてしまったわね」
line = "「……そう。ごめんなさい。あなたの覚悟に、水を差す真似をしてしまったわね」"

[[dialogue]]
speaker = "ベアトリス"
# 「そ、そんなっ……こっちこそ、暗い話しちゃってごめんね？」
line = "「そ、そんなっ……こっちこそ、暗い話しちゃってごめんね？」"

[[dialogue]]
speaker = "unk"
# 世界は完璧ではない──太陽の下も歩けないような種族がいるだなんて。
line = "世界は完璧ではない──太陽の下も歩けないような種族がいるだなんて。"

[[dialogue]]
speaker = "unk"
# 私が女神になった暁には、全ての吸血鬼が太陽の下を歩けるようにしてあげよう──そう思った。
line = "私が女神になった暁には、全ての吸血鬼が太陽の下を歩けるようにしてあげよう──そう思った。"

[[dialogue]]
speaker = "unk"
# ある日、私は高熱を出した。
line = "ある日、私は高熱を出した。"

[[dialogue]]
speaker = "unk"
# ヒトに親近感を持たれるようにと、霊力を帯びている以外、私は普通の天使と変わらない体の造りをしている。
line = "ヒトに親近感を持たれるようにと、霊力を帯びている以外、私は普通の天使と変わらない体の造りをしている。"

[[dialogue]]
speaker = "unk"
# 無理をすれば体調を崩す──知識で知っているのと、実際に経験するのは全くの別物。
line = "無理をすれば体調を崩す──知識で知っているのと、実際に経験するのは全くの別物。"

[[dialogue]]
speaker = "unk"
# あまりの辛さに気を失うほどで……けれど私は、みんなに救われた。
line = "あまりの辛さに気を失うほどで……けれど私は、みんなに救われた。"

[[dialogue]]
speaker = "unk"
# チナが率先して……もちろん他の皆も。手厚く看病をしてくれた。
line = "チナが率先して……もちろん他の皆も。手厚く看病をしてくれた。"

[[dialogue]]
speaker = "ルヴィネ"
# （……どうしてかしら？）
line = "（……どうしてかしら？）"

[[dialogue]]
speaker = "ルヴィネ"
# （みんなに優しくされると……胸のところが、温かい……）
line = "（みんなに優しくされると……胸のところが、温かい……）"

[[dialogue]]
speaker = "ルヴィネ"
# （汗をぬぐってくれるたび。額を優しくなでられるたび。心細い気持ちがほどけていって……）
line = "（汗をぬぐってくれるたび。額を優しくなでられるたび。心細い気持ちがほどけていって……）"

[[dialogue]]
speaker = "ルヴィネ"
# （みんなの優しさが…………うれしい──）
line = "（みんなの優しさが…………うれしい──）"

[[dialogue]]
speaker = "unk"
# 何をバカな──私は慌てて、その思いをかき消した。
line = "何をバカな──私は慌てて、その思いをかき消した。"

[[dialogue]]
speaker = "unk"
# 懐柔がうまくいっている証拠だ。
line = "懐柔がうまくいっている証拠だ。"

[[dialogue]]
speaker = "unk"
# こんなにも心配されるほどに、私は彼女たちの心を掴めているのだ。計画は順調だ──
line = "こんなにも心配されるほどに、私は彼女たちの心を掴めているのだ。計画は順調だ──"

[[dialogue]]
speaker = "unk"
# ──また１つ、嘘を吐いた。
line = "──また１つ、嘘を吐いた。"

[[dialogue]]
speaker = "ルヴィネ"
# 「私の守護星は──ポラリス。みんなと、同じ……」
line = "「私の守護星は──ポラリス。みんなと、同じ……」"

[[dialogue]]
speaker = "unk"
# 私に守護星なんてない。使うのは霊力だ。みんなとは違う。
line = "私に守護星なんてない。使うのは霊力だ。みんなとは違う。"

[[dialogue]]
speaker = "unk"
# 違うのに、仲間のふりをした。
line = "違うのに、仲間のふりをした。"

[[dialogue]]
speaker = "unk"
# その方が、信頼を得やすいと判断したから……
line = "その方が、信頼を得やすいと判断したから……"

[[dialogue]]
speaker = "unk"
# この数年間で、嘘をいくつ重ねただろう──
line = "この数年間で、嘘をいくつ重ねただろう──"

[[dialogue]]
speaker = "ベアトリス"
# 「ルヴィは今日もアルバイト？」
line = "「ルヴィは今日もアルバイト？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「ええ。ヘルプを頼まれてしまったから」
line = "「ええ。ヘルプを頼まれてしまったから」"

[[dialogue]]
speaker = "ベアトリス"
# 「そっかぁ……たまには５人で遊びたいなって思ってたんだけど」
line = "「そっかぁ……たまには５人で遊びたいなって思ってたんだけど」"

[[dialogue]]
speaker = "ルヴィネ"
# 「ごめんなさい。今度、ちゃんと時間を作るから……また誘って頂戴」
line = "「ごめんなさい。今度、ちゃんと時間を作るから……また誘って頂戴」"

[[dialogue]]
speaker = "unk"
# アルバイトを始めた理由も、人心掌握のため。
line = "アルバイトを始めた理由も、人心掌握のため。"

[[dialogue]]
speaker = "unk"
# デネブの救世主と言われる自分が市井に混じって働けば、それだけ人の目に留まる。
line = "デネブの救世主と言われる自分が市井に混じって働けば、それだけ人の目に留まる。"

[[dialogue]]
speaker = "unk"
# 手と足を動かす指導者の姿はきっとプラスに映るはずだ。そう思って始めただけ。
line = "手と足を動かす指導者の姿はきっとプラスに映るはずだ。そう思って始めただけ。"

[[dialogue]]
speaker = "ベアトリス"
# 「あ、そうだ──じゃあみんなでルヴィのバイト先に遊びに行くよ！　この前のカフェだよね？」
line = "「あ、そうだ──じゃあみんなでルヴィのバイト先に遊びに行くよ！　この前のカフェだよね？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「いいえ。今日は冷凍マグロの倉庫バイトだから」
line = "「いいえ。今日は冷凍マグロの倉庫バイトだから」"

[[dialogue]]
speaker = "ベアトリス"
# 「そんなところでも働いてるの！？」
line = "「そんなところでも働いてるの！？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「実入りがいいのよ。近々、出費がかさむから」
line = "「実入りがいいのよ。近々、出費がかさむから」"

[[dialogue]]
speaker = "ベアトリス"
# 「そうなの？　ルヴィがお願いしたら、学園からお金くらい出してもらえると思うんだけど……」
line = "「そうなの？　ルヴィがお願いしたら、学園からお金くらい出してもらえると思うんだけど……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「…………それでは意味がないのよ」
line = "「…………それでは意味がないのよ」"

[[dialogue]]
speaker = "unk"
# 数週間後──
line = "数週間後──"

[[dialogue]]
speaker = "ベアトリス"
# 「え、えっ……これって！？」
line = "「え、えっ……これって！？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「ベアト──誕生日、おめでとう」
line = "「ベアト──誕生日、おめでとう」"

[[dialogue]]
speaker = "unk"
# どうかしら？　いくらでもお金なんて自由にできる立場の私が、アルバイトで貯めたお金でプレゼントを贈る。
line = "どうかしら？　いくらでもお金なんて自由にできる立場の私が、アルバイトで貯めたお金でプレゼントを贈る。"

[[dialogue]]
speaker = "unk"
# これでまた一歩、懐柔が進んだわ──
line = "これでまた一歩、懐柔が進んだわ──"

[[dialogue]]
speaker = "ルヴィネ"
# （信頼を勝ち得た自信がある。この１０年、私は努力を欠かさなかった）
line = "（信頼を勝ち得た自信がある。この１０年、私は努力を欠かさなかった）"

[[dialogue]]
speaker = "unk"
# 確かに嘘で始まった関係ではあったが、極星学園星徒会メンバーで過ごした時間も、デネブの流星市国で積み重ねた功績も、すべて本物だ。
line = "確かに嘘で始まった関係ではあったが、極星学園星徒会メンバーで過ごした時間も、デネブの流星市国で積み重ねた功績も、すべて本物だ。"

[[dialogue]]
speaker = "ルヴィネ"
# （その嘘も、すべてはこの世界と彼女たち、ひいてはデネブ世界の住民のため）
line = "（その嘘も、すべてはこの世界と彼女たち、ひいてはデネブ世界の住民のため）"

[[dialogue]]
speaker = "unk"
# この世界も、そこに生きる彼女たちも、まだまだ不完全すぎる。
line = "この世界も、そこに生きる彼女たちも、まだまだ不完全すぎる。"

[[dialogue]]
speaker = "ルヴィネ"
# （だから──今度こそ、彼女たちのために、私は無限に成長する、新しい世界を構築する必要がある）
line = "（だから──今度こそ、彼女たちのために、私は無限に成長する、新しい世界を構築する必要がある）"

[[dialogue]]
speaker = "unk"
# そのためには、テルルが構築した今の世界の仕組みが邪魔だ。
line = "そのためには、テルルが構築した今の世界の仕組みが邪魔だ。"

[[dialogue]]
speaker = "ルヴィネ"
# （ベアトたちと一緒に、みんなが不安におびえず、明日を心配しないで済む完全な世界を作る）
line = "（ベアトたちと一緒に、みんなが不安におびえず、明日を心配しないで済む完全な世界を作る）"

[[dialogue]]
speaker = "ルヴィネ"
# （──だから、その始まりに少しの『嘘』があったことを、許してほしいの……）
line = "（──だから、その始まりに少しの『嘘』があったことを、許してほしいの……）"

[[dialogue]]
speaker = "unk"
# レティシアに「そんなことを気にしていたの？」って言ってもらえたら……
line = "レティシアに「そんなことを気にしていたの？」って言ってもらえたら……"

[[dialogue]]
speaker = "unk"
# グレイスに「ルヴィは難しいことを考えすぎです！」って言ってもらえたら……
line = "グレイスに「ルヴィは難しいことを考えすぎです！」って言ってもらえたら……"

[[dialogue]]
speaker = "unk"
# チナに「細かいことをグダグダ考えすぎなんだよ！」って言ってもらえたら……
line = "チナに「細かいことをグダグダ考えすぎなんだよ！」って言ってもらえたら……"

[[dialogue]]
speaker = "unk"
# ベアトに「まったく、ルヴィは仕方ないんだから……」って言ってもらえたら……
line = "ベアトに「まったく、ルヴィは仕方ないんだから……」って言ってもらえたら……"

[[dialogue]]
speaker = "unk"
# ただそうやって、みんなに許してもらいたかっただけだった──
line = "ただそうやって、みんなに許してもらいたかっただけだった──"

[[dialogue]]
speaker = "unk"
# そんな簡単なことに……最後の瞬間まで気付けなかったなんて！
line = "そんな簡単なことに……最後の瞬間まで気付けなかったなんて！"

[[dialogue]]
speaker = "ルヴィネ"
# 「──────やめて！！！！！」
line = "「──────やめて！！！！！」"

[[dialogue]]
speaker = "unk"
# 厄災の右腕がベアトリスに向かって振り下ろされる。
line = "厄災の右腕がベアトリスに向かって振り下ろされる。"

[[dialogue]]
speaker = "unk"
# そして絶命必至の一撃が──直撃した。
line = "そして絶命必至の一撃が──直撃した。"

[[dialogue]]
speaker = "ルヴィネ"
# 「………………ぁ」
line = "「………………ぁ」"

[[dialogue]]
speaker = "unk"
# ベアトリスの眼前に展開された、不可視の防壁──本来ならばディザスターハンドの攻撃はその程度では止まらない。
line = "ベアトリスの眼前に展開された、不可視の防壁──本来ならばディザスターハンドの攻撃はその程度では止まらない。"

[[dialogue]]
speaker = "unk"
# しかし緋宮クロトが全身全霊を懸けたカオスイージスと、ルヴィネが懸命にブレーキをかけた状態だからこそ、厄災を受け止める奇蹟は起こった。
line = "しかし緋宮クロトが全身全霊を懸けたカオスイージスと、ルヴィネが懸命にブレーキをかけた状態だからこそ、厄災を受け止める奇蹟は起こった。"

[[dialogue]]
speaker = "ベアトリス"
# 「会長さん……！？」
line = "「会長さん……！？」"

[[dialogue]]
speaker = "クロト"
# 「もう一度やれって言われても無理だ……それくらい、本当にぎりぎりだった……」
line = "「もう一度やれって言われても無理だ……それくらい、本当にぎりぎりだった……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「…………ぁあぁあ」
line = "「…………ぁあぁあ」"

[[dialogue]]
speaker = "unk"
# ルヴィネの膝から力が抜ける。
line = "ルヴィネの膝から力が抜ける。"

[[dialogue]]
speaker = "unk"
# 安堵のあまりへたり込む、その彼女の様子は──女神の迷いを示す、これ以上ない仕草だった。
line = "安堵のあまりへたり込む、その彼女の様子は──女神の迷いを示す、これ以上ない仕草だった。"
