[[dialogue]]
speaker = "エグザエル"
# 「――ついにこの日がやって参りましたな」
line = "「――ついにこの日がやって参りましたな」"

[[dialogue]]
speaker = "エグザエル"
# 「ティンクルスターナイツに我が輩が実装される、『ティンクル☆くるせいだーすコラボ２．５』開催の当日が！」
line = "「ティンクルスターナイツに我が輩が実装される、『ティンクル☆くるせいだーすコラボ２．５』開催の当日が！」"

[[dialogue]]
speaker = "ルネア"
# 「いや、実装されるのは女神のわたし！　あなたはその<ruby=オプション>武器</ruby>としてだから」
line = "「いや、実装されるのは女神のわたし！　あなたはその<ruby>武器<rt>オプション</rt></ruby>としてだから」"

[[dialogue]]
speaker = "エグザエル"
# 「ふはははは！　ルネア様、どうかお許しを！　めでたき日にて、我が輩もテンションが上がってしまっているが故！」
line = "「ふはははは！　ルネア様、どうかお許しを！　めでたき日にて、我が輩もテンションが上がってしまっているが故！」"

[[dialogue]]
speaker = "ルネア"
# 「まあ、いいわ。エグザエル！　祝いなさい、女神の<ruby=ハイライト>威光</ruby>よ！」
line = "「まあ、いいわ。エグザエル！　祝いなさい、女神の<ruby>威光<rt>ハイライト</rt></ruby>よ！」"

[[dialogue]]
speaker = "エグザエル"
# 「御意！　――世界よ、祝福の鐘の音を鳴らせ！」
line = "「御意！　――世界よ、祝福の鐘の音を鳴らせ！」"

[[dialogue]]
speaker = "エグザエル"
# 「創世の<ruby=アストレア>女神</ruby>、ルネア様のご降臨である！」
line = "「創世の<ruby>女神<rt>アストレア</rt></ruby>、ルネア様のご降臨である！」"

[[dialogue]]
speaker = "ルネア"
# 「――変身！」
line = "「――変身！」"

[[dialogue]]
speaker = "エグザエル"
# 「<ruby=リバイブ・オン>ＲＥＶＩＶＥ　ＯＮ</ruby>！」
line = "「<ruby>ＲＥＶＩＶＥ　ＯＮ<rt>リバイブ・オン</rt></ruby>！」"

[[dialogue]]
speaker = "ルネア"
# 「これが、復活したわたしの女神装束――」
line = "「これが、復活したわたしの女神装束――」"

[[dialogue]]
speaker = "ルネア"
# 「名付けて、『アストレアフォーム』よ！」
line = "「名付けて、『アストレアフォーム』よ！」"

[[dialogue]]
speaker = "エグザエル"
# 「ふ、ふつくしい……！」
line = "「ふ、ふつくしい……！」"

[[dialogue]]
speaker = "エグザエル"
# 「魔王殿に見せるため、あーでもない、こーでもないと、鏡の前でクネクネしながら作った甲斐がありますぞ！」
line = "「魔王殿に見せるため、あーでもない、こーでもないと、鏡の前でクネクネしながら作った甲斐がありますぞ！」"

[[dialogue]]
speaker = "ルネア"
# 「して、ないっ！」
line = "「して、ないっ！」"

[[dialogue]]
speaker = "エグザエル"
# 「アザマァァーースッ！？」
line = "「アザマァァーースッ！？」"

[[dialogue]]
speaker = "ルネア"
# 「全く！　ふざけてないで、さっさと行くわよ、エグザエル！」
line = "「全く！　ふざけてないで、さっさと行くわよ、エグザエル！」"

[[dialogue]]
speaker = "ルネア"
# 「シンの魔王因子を取り返す為に――ティンクルスターナイツの世界へ！」
line = "「シンの魔王因子を取り返す為に――ティンクルスターナイツの世界へ！」"

[[dialogue]]
speaker = "エグザエル"
# 「れ、<ruby=レディー・ゴー>ＲＥＡＤＹ　ＧＯ</ruby>、ですぞ……！」
line = "「れ、<ruby>ＲＥＡＤＹ　ＧＯ<rt>レディー・ゴー</rt></ruby>、ですぞ……！」"
