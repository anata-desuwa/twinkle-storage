[[dialogue]]
speaker = "unk"
# 第１話,巫女神楽修業,P
line = "第１話,巫女神楽修業,P"

[[dialogue]]
speaker = "unk"
# 舞亜から、九浄家に来てほしいと呼び出された。
line = "舞亜から、九浄家に来てほしいと呼び出された。"

[[dialogue]]
speaker = "unk"
# 意外な場所に首を傾げながら、九浄家の屋敷に向かうと──
line = "意外な場所に首を傾げながら、九浄家の屋敷に向かうと──"

[[dialogue]]
speaker = "舞亜"
# 「あ、来てくれたんだ、会長さん。ありがと」
line = "「あ、来てくれたんだ、会長さん。ありがと」"

[[dialogue]]
speaker = "ヨミ"
# 「いらっしゃいませ、会長」
line = "「いらっしゃいませ、会長」"

[[dialogue]]
speaker = "ヒヨ"
# 「なんでい、会長サンじゃねえか。会長サンもお屋敷に何か用事かい？」
line = "「なんでい、会長サンじゃねえか。会長サンもお屋敷に何か用事かい？」"

[[dialogue]]
speaker = "unk"
# どういう集まり……？
line = "どういう集まり……？"

[[dialogue]]
speaker = "舞亜"
# 「ほら私、この前巫女の戦闘服をもらったでしょ？　でも私、神楽舞は素人だから、本物の巫女さんにご教示お願いしたってわけ」
line = "「ほら私、この前巫女の戦闘服をもらったでしょ？　でも私、神楽舞は素人だから、本物の巫女さんにご教示お願いしたってわけ」"

[[dialogue]]
speaker = "ヨミ"
# 「わたしが世界的スケーターの舞亜さんに踊りを教えるなんて……！　あわわわ……おそれ多いです……」
line = "「わたしが世界的スケーターの舞亜さんに踊りを教えるなんて……！　あわわわ……おそれ多いです……」"

[[dialogue]]
speaker = "ヒヨ"
# 「スケートのことはよく知らねえが、神様に失礼があっちゃいけねぇからな。巫女を名乗るってんなら、あたしがみっちり教えてやらぁ！」
line = "「スケートのことはよく知らねえが、神様に失礼があっちゃいけねぇからな。巫女を名乗るってんなら、あたしがみっちり教えてやらぁ！」"

[[dialogue]]
speaker = "舞亜"
# 「よろしくお願いします、先生方。やるからには最高の舞を披露したいから、厳しくしてね」
line = "「よろしくお願いします、先生方。やるからには最高の舞を披露したいから、厳しくしてね」"

[[dialogue]]
speaker = "ヒヨ"
# 「おお、いい根性だ！　うちの天桐神社の神楽でよけりゃ、全部叩き込んでやるぜ！」
line = "「おお、いい根性だ！　うちの天桐神社の神楽でよけりゃ、全部叩き込んでやるぜ！」"

[[dialogue]]
speaker = "ヨミ"
# 「完璧を目指すストイックさ、恐れ入ります。ですがわたしも天ヶ崎神社の巫女……妥協はしません……！」
line = "「完璧を目指すストイックさ、恐れ入ります。ですがわたしも天ヶ崎神社の巫女……妥協はしません……！」"

[[dialogue]]
speaker = "舞亜"
# 「そうこなくっちゃ。どんなスパルタ特訓でも乗り越えてみせるよ」
line = "「そうこなくっちゃ。どんなスパルタ特訓でも乗り越えてみせるよ」"

[[dialogue]]
speaker = "舞亜"
# 「いっち、にー、さーん、しー……のリズムで動くの。はい、やってみて」
line = "「いっち、にー、さーん、しー……のリズムで動くの。はい、やってみて」"

[[dialogue]]
speaker = "ヨミ"
# 「いーち……にぃ～……さぁん……しぃ～……？」
line = "「いーち……にぃ～……さぁん……しぃ～……？」"

[[dialogue]]
speaker = "舞亜"
# 「そうじゃなくて……いっち、にー、さーん、しー」
line = "「そうじゃなくて……いっち、にー、さーん、しー」"

[[dialogue]]
speaker = "ヨミ"
# 「む……むむむ……？　な、なるほど……？」
line = "「む……むむむ……？　な、なるほど……？」"

[[dialogue]]
speaker = "ヒヨ"
# 「……どうしてこうなってんでい」
line = "「……どうしてこうなってんでい」"

[[dialogue]]
speaker = "unk"
# ヨミが舞亜に教えられてる……
line = "ヨミが舞亜に教えられてる……"

[[dialogue]]
speaker = "ヨミ"
# 「うぅ……わたしにリズム感がないばかりに……巫女として情けないですぅ……」
line = "「うぅ……わたしにリズム感がないばかりに……巫女として情けないですぅ……」"

[[dialogue]]
speaker = "ヨミ"
# 「でも舞亜さんは──」
line = "「でも舞亜さんは──」"

[[dialogue]]
speaker = "舞亜"
# 「右に振って、左、左……回って……こう、こう、こう……でいい？」
line = "「右に振って、左、左……回って……こう、こう、こう……でいい？」"

[[dialogue]]
speaker = "ヨミ"
# 「すでにほぼ完璧……！　なんなんですか天才ですか！？　天才でした！」
line = "「すでにほぼ完璧……！　なんなんですか天才ですか！？　天才でした！」"

[[dialogue]]
speaker = "ヒヨ"
# 「あたしが教えたこと、もうすっかり覚えちまいやがった。大したもんでい」
line = "「あたしが教えたこと、もうすっかり覚えちまいやがった。大したもんでい」"

[[dialogue]]
speaker = "舞亜"
# 「会長さんから見てどんな感じ？」
line = "「会長さんから見てどんな感じ？」"

[[dialogue]]
speaker = "unk"
# すごく綺麗で優雅だ
line = "すごく綺麗で優雅だ"

[[dialogue]]
speaker = "舞亜"
# 「そっかそっか。それじゃあ練習したかいあったね」
line = "「そっかそっか。それじゃあ練習したかいあったね」"

[[dialogue]]
speaker = "舞亜"
# 「なんというか……『踊り』には根本的に通ずる部分があるのかな、フィギュアとは形が違っても、なんかわかる気がする」
line = "「なんというか……『踊り』には根本的に通ずる部分があるのかな、フィギュアとは形が違っても、なんかわかる気がする」"

[[dialogue]]
speaker = "舞亜"
# 「でもやっぱり、教え方が上手いからかな。２人ともありがと」
line = "「でもやっぱり、教え方が上手いからかな。２人ともありがと」"

[[dialogue]]
speaker = "ヒヨ"
# 「へん、謙遜はいらねぇぜ。ていうか、うちの神社に来てほしいぐれぇだ。どうだい、今からでもうちの巫女になんねぇかい？」
line = "「へん、謙遜はいらねぇぜ。ていうか、うちの神社に来てほしいぐれぇだ。どうだい、今からでもうちの巫女になんねぇかい？」"

[[dialogue]]
speaker = "舞亜"
# 「うーん……魅力的な申し出だけど、今はスケートがあるから無理かな。引退してから考えてもいい？」
line = "「うーん……魅力的な申し出だけど、今はスケートがあるから無理かな。引退してから考えてもいい？」"

[[dialogue]]
speaker = "ヒヨ"
# 「おう、期待してるぜぃ！」
line = "「おう、期待してるぜぃ！」"

[[dialogue]]
speaker = "舞亜"
# 「だけど……神聖さっていうのかな？　２人みたいな厳かな雰囲気は出せてない気がするんだよね。そこは本職との差かな」
line = "「だけど……神聖さっていうのかな？　２人みたいな厳かな雰囲気は出せてない気がするんだよね。そこは本職との差かな」"

[[dialogue]]
speaker = "ヒヨ"
# 「う～ん……別に雰囲気出そうと思って出してるわけでもねぇんだが。神様が見てると思うとそうなるのかもしれねぇな」
line = "「う～ん……別に雰囲気出そうと思って出してるわけでもねぇんだが。神様が見てると思うとそうなるのかもしれねぇな」"

[[dialogue]]
speaker = "舞亜"
# 「見られてる……か。フィギュアの大会でもお客さんがいるから、見られることは意識してるつもりだけど」
line = "「見られてる……か。フィギュアの大会でもお客さんがいるから、見られることは意識してるつもりだけど」"

[[dialogue]]
speaker = "ヨミ"
# 「そうですね……見てもらうというより、捧げるということが大事なんじゃないでしょうか」
line = "「そうですね……見てもらうというより、捧げるということが大事なんじゃないでしょうか」"

[[dialogue]]
speaker = "ヨミ"
# 「神様のために、ためだけに、自分を使って表現する……それが神楽なのかもしれません」
line = "「神様のために、ためだけに、自分を使って表現する……それが神楽なのかもしれません」"

[[dialogue]]
speaker = "舞亜"
# 「捧げる……捧げる……なるほど。ちょっとイメージできたかも」
line = "「捧げる……捧げる……なるほど。ちょっとイメージできたかも」"

[[dialogue]]
speaker = "舞亜"
# 「……チラ」
line = "「……チラ」"

[[dialogue]]
speaker = "unk"
# （今、俺の方を見た……？）
line = "（今、俺の方を見た……？）"

[[dialogue]]
speaker = "舞亜"
# 「じゃあやってみるね」
line = "「じゃあやってみるね」"

[[dialogue]]
speaker = "unk"
# 扇を手に、流麗な神楽舞を披露する舞亜。
line = "扇を手に、流麗な神楽舞を披露する舞亜。"

[[dialogue]]
speaker = "unk"
# 全身を使って、空を舞う風を、降り注ぐ雨を表現し、俺たちは揃って見惚れるのだった。
line = "全身を使って、空を舞う風を、降り注ぐ雨を表現し、俺たちは揃って見惚れるのだった。"

[[dialogue]]
speaker = "舞亜"
# 「……どうかな？」
line = "「……どうかな？」"

[[dialogue]]
speaker = "ヒヨ"
# 「ほえ～……神楽ってこんなに綺麗なものだったのかい。あたしの方が驚いちまった」
line = "「ほえ～……神楽ってこんなに綺麗なものだったのかい。あたしの方が驚いちまった」"

[[dialogue]]
speaker = "ヨミ"
# 「巫女の神楽とは少し違いますけど、艶やかで綺麗です……」
line = "「巫女の神楽とは少し違いますけど、艶やかで綺麗です……」"

[[dialogue]]
speaker = "unk"
# 言葉も出ないほど美しい……
line = "言葉も出ないほど美しい……"

[[dialogue]]
speaker = "舞亜"
# 「良かった。さっきのは自分でも自信あるから」
line = "「良かった。さっきのは自分でも自信あるから」"

[[dialogue]]
speaker = "unk"
# ちなみに俺はどうして呼ばれたの？
line = "ちなみに俺はどうして呼ばれたの？"

[[dialogue]]
speaker = "舞亜"
# 「見てほしいから」
line = "「見てほしいから」"

[[dialogue]]
speaker = "舞亜"
# 「綺麗にできたら、好きな人に見てもらいたいでしょ？　今の神楽も会長さんに捧げるつもりで舞ったんだよ」
line = "「綺麗にできたら、好きな人に見てもらいたいでしょ？　今の神楽も会長さんに捧げるつもりで舞ったんだよ」"

[[dialogue]]
speaker = "ヒヨ"
# 「なんでい、のろけじゃねえか」
line = "「なんでい、のろけじゃねえか」"

[[dialogue]]
speaker = "ヨミ"
# 「こやや……ラブラブです……」
line = "「こやや……ラブラブです……」"

[[dialogue]]
speaker = "舞亜"
# 「神様じゃなくて会長さんのために舞うのは、ちょっと不敬だったかな。でもうまくいったでしょ？」
line = "「神様じゃなくて会長さんのために舞うのは、ちょっと不敬だったかな。でもうまくいったでしょ？」"

[[dialogue]]
speaker = "unk"
# 舞亜らしいクールで熱い愛情に、こそばゆさと嬉しさを感じるのだった。
line = "舞亜らしいクールで熱い愛情に、こそばゆさと嬉しさを感じるのだった。"
