[[dialogue]]
speaker = "シャロン"
# 「はぁああああああっっ！！」
line = "「はぁああああああっっ！！」"

[[dialogue]]
speaker = "イレーナ"
# 「シャロン！」
line = "「シャロン！」"

[[dialogue]]
speaker = "シャロン"
# 「ええっ！　私は右を、イレーナさまは左をですねっ！」
line = "「ええっ！　私は右を、イレーナさまは左をですねっ！」"

[[dialogue]]
speaker = "unk"
# ２人でバッタバッタ敵を……
line = "２人でバッタバッタ敵を……"

[[dialogue]]
speaker = "イレーナ"
# 「バカ。１人で前に出すぎよシャロン。張り切りすぎてまた貧血を起こしても知らないわよ」
line = "「バカ。１人で前に出すぎよシャロン。張り切りすぎてまた貧血を起こしても知らないわよ」"

[[dialogue]]
speaker = "シャロン"
# 「イレーナさまを信じておりますので。たとえ私が倒れても、いえ倒れる前に支えてくださるでしょうから」
line = "「イレーナさまを信じておりますので。たとえ私が倒れても、いえ倒れる前に支えてくださるでしょうから」"

[[dialogue]]
speaker = "イレーナ"
# 「はぁ～？　あたし頼みってこと？　ったく、こっちの身にも──なれっての！」
line = "「はぁ～？　あたし頼みってこと？　ったく、こっちの身にも──なれっての！」"

[[dialogue]]
speaker = "シャロン"
# 「ふふ。相変わらずお口は悪いのに、なんと温かなお力なのでしょうか。イレーナさまのお優しさが垣間見えますね」
line = "「ふふ。相変わらずお口は悪いのに、なんと温かなお力なのでしょうか。イレーナさまのお優しさが垣間見えますね」"

[[dialogue]]
speaker = "イレーナ"
# 「ただ普通に力を使ってるだけよっ……！　あたしに手間かけさせた分は働いてもらうから！」
line = "「ただ普通に力を使ってるだけよっ……！　あたしに手間かけさせた分は働いてもらうから！」"

[[dialogue]]
speaker = "シャロン"
# 「くすくす。承知いたしました」
line = "「くすくす。承知いたしました」"

[[dialogue]]
speaker = "イレーナ"
# 「てかそのカッコどうにかなんないの？　あたしとちょっと被ってんじゃない」
line = "「てかそのカッコどうにかなんないの？　あたしとちょっと被ってんじゃない」"

[[dialogue]]
speaker = "シャロン"
# 「サンタクロースといえば子どもの守人として有名ですので。我々にもそう在れと女神様が仰っておられるのですよ」
line = "「サンタクロースといえば子どもの守人として有名ですので。我々にもそう在れと女神様が仰っておられるのですよ」"

[[dialogue]]
speaker = "イレーナ"
# 「だからあたしまで巻き込まないでってば。あたしは自分でやったのよ」
line = "「だからあたしまで巻き込まないでってば。あたしは自分でやったのよ」"

[[dialogue]]
speaker = "シャロン"
# 「だとしたら色使いを再考なされた方がいいのではないでしょうか。聖女というには色合いが……」
line = "「だとしたら色使いを再考なされた方がいいのではないでしょうか。聖女というには色合いが……」"

[[dialogue]]
speaker = "イレーナ"
# 「これはどうしようもなかったのっ。何度も調整したけど、なぜか黒以外の色になってくれなくて……！」
line = "「これはどうしようもなかったのっ。何度も調整したけど、なぜか黒以外の色になってくれなくて……！」"

[[dialogue]]
speaker = "シャロン"
# 「それこそ女神様がイレーナさまのお側にいる証ではありませんか！　きっとお言葉遣いに品がないと<ruby=たしな>窘</ruby>めておられるのですよ！」
line = "「それこそ女神様がイレーナさまのお側にいる証ではありませんか！　きっとお言葉遣いに品がないと<ruby>窘<rt>たしな</rt></ruby>めておられるのですよ！」"

[[dialogue]]
speaker = "イレーナ"
# 「だからなんでもかんでも女神に繋げるなっての！　そういうとこが気に入らないって言ってんでしょうに！」
line = "「だからなんでもかんでも女神に繋げるなっての！　そういうとこが気に入らないって言ってんでしょうに！」"

[[dialogue]]
speaker = "unk"
# それにしても２人とも──
line = "それにしても２人とも──"

[[dialogue]]
speaker = "イレーナ"
# 「……ちょっと。なにジロジロ見てんのよ？　一応戦闘中よ、戦闘中」
line = "「……ちょっと。なにジロジロ見てんのよ？　一応戦闘中よ、戦闘中」"

[[dialogue]]
speaker = "シャロン"
# 「はて……。私どもの装束に何かおかしなところがありますでしょうか？」
line = "「はて……。私どもの装束に何かおかしなところがありますでしょうか？」"

[[dialogue]]
speaker = "unk"
# 普段以上に際どいなと……
line = "普段以上に際どいなと……"

[[dialogue]]
speaker = "イレーナ"
# 「なっ……！？　だからどこ見てんのよ、このエロ会長！」
line = "「なっ……！？　だからどこ見てんのよ、このエロ会長！」"

[[dialogue]]
speaker = "シャロン"
# 「ふふ。流石は女神様です。武器に合わせていつも以上に動きやすい召し物を授けてくださいました」
line = "「ふふ。流石は女神様です。武器に合わせていつも以上に動きやすい召し物を授けてくださいました」"

[[dialogue]]
speaker = "イレーナ"
# 「えっ、あんたそう思ってんの？　やっぱズレてるわ……」
line = "「えっ、あんたそう思ってんの？　やっぱズレてるわ……」"

[[dialogue]]
speaker = "unk"
# よし、早くモンスターを倒して戻ろう！
line = "よし、早くモンスターを倒して戻ろう！"

[[dialogue]]
speaker = "シャロン"
# 「はい！　パーティーの準備もまだまだ残っていますので！」
line = "「はい！　パーティーの準備もまだまだ残っていますので！」"

[[dialogue]]
speaker = "イレーナ"
# 「あんた、早く戻ってあたしたちをじっくり眺めたいだけなんじゃないでしょうね？　モンスターより先にこの男を退治するべきなんじゃないかしら……」
line = "「あんた、早く戻ってあたしたちをじっくり眺めたいだけなんじゃないでしょうね？　モンスターより先にこの男を退治するべきなんじゃないかしら……」"

[[dialogue]]
speaker = "シャロン"
# 「！　現れました、イレーナさま！」
line = "「！　現れました、イレーナさま！」"

[[dialogue]]
speaker = "イレーナ"
# 「はぁ……。直前にアホな話してたせいで緊張感も何もないわね」
line = "「はぁ……。直前にアホな話してたせいで緊張感も何もないわね」"

[[dialogue]]
speaker = "イレーナ"
# 「つーかモンスターまでふざけた見た目してるわ……さっさとぶっ飛ばしましょ」
line = "「つーかモンスターまでふざけた見た目してるわ……さっさとぶっ飛ばしましょ」"

[[dialogue]]
speaker = "シャロン"
# 「そうですね。私とイレーナさまが力を合わせれば、この程度のモンスターなど問題ではありません」
line = "「そうですね。私とイレーナさまが力を合わせれば、この程度のモンスターなど問題ではありません」"

[[dialogue]]
speaker = "イレーナ"
# 「さぁ行くわよ、シャロン！　この不届き者にキツーイお仕置きをプレゼントしてあげなくちゃ！」
line = "「さぁ行くわよ、シャロン！　この不届き者にキツーイお仕置きをプレゼントしてあげなくちゃ！」"

[[dialogue]]
speaker = "シャロン"
# 「ええ、背中はお任せしました、イレーナさま！」
line = "「ええ、背中はお任せしました、イレーナさま！」"

[[dialogue]]
speaker = "unk"
# （なんだかんだで仲いいなぁ……）
line = "（なんだかんだで仲いいなぁ……）"

[[dialogue]]
speaker = "イレーナ"
# 「こら、そこ！　あんたもニヤニヤしてないでとっとと構えなさい！」
line = "「こら、そこ！　あんたもニヤニヤしてないでとっとと構えなさい！」"

[[dialogue]]
speaker = "シャロン"
# 「会長さまも援護をお願いいたします！　前衛は私が務めますから！」
line = "「会長さまも援護をお願いいたします！　前衛は私が務めますから！」"

[[dialogue]]
speaker = "unk"
# ああ！
line = "ああ！"
