[[dialogue]]
speaker = "unk"
# 第４話,愛の誓いを再び,P
line = "第４話,愛の誓いを再び,P"

[[dialogue]]
speaker = "unk"
# その日、俺は焦る気持ちを抑え切れずに、大聖堂の中へと駆け込んだ。
line = "その日、俺は焦る気持ちを抑え切れずに、大聖堂の中へと駆け込んだ。"

[[dialogue]]
speaker = "ジュエリー"
# 「……やあ、助手。今日はそんなに慌てて、どうしたんだい？」
line = "「……やあ、助手。今日はそんなに慌てて、どうしたんだい？」"

[[dialogue]]
speaker = "unk"
# 手を火傷したって聞いて……！
line = "手を火傷したって聞いて……！"

[[dialogue]]
speaker = "unk"
# ミネコから、ジュエリーが
line = "ミネコから、ジュエリーが"

[[dialogue]]
speaker = "ジュエリー"
# 「……そうか。やはりキミの耳に入ってしまったか」
line = "「……そうか。やはりキミの耳に入ってしまったか」"

[[dialogue]]
speaker = "ジュエリー"
# 「ん？　――ああ、火傷は大丈夫だよ。回復星術ですぐに治してもらったから、この通り傷は全く残っていない」
line = "「ん？　――ああ、火傷は大丈夫だよ。回復星術ですぐに治してもらったから、この通り傷は全く残っていない」"

[[dialogue]]
speaker = "ジュエリー"
# 「――どうして火傷をしたのかについては……」
line = "「――どうして火傷をしたのかについては……」"

[[dialogue]]
speaker = "ジュエリー"
# 「助手……私の懺悔を聞いてくれるかい？」
line = "「助手……私の懺悔を聞いてくれるかい？」"

[[dialogue]]
speaker = "ジュエリー"
# 「実は――料理をしていて、味噌汁の入った片手鍋を引っくり返してしまったんだ」
line = "「実は――料理をしていて、味噌汁の入った片手鍋を引っくり返してしまったんだ」"

[[dialogue]]
speaker = "ジュエリー"
# 「キミに『お弁当』を作ってみようと思ってね」
line = "「キミに『お弁当』を作ってみようと思ってね」"

[[dialogue]]
speaker = "ジュエリー"
# 「……以前の私は、不得手なことは無理にする必要はない、と考えていたんだ」
line = "「……以前の私は、不得手なことは無理にする必要はない、と考えていたんだ」"

[[dialogue]]
speaker = "ジュエリー"
# 「誰にだって、得手不得手はある。今は便利な世の中になったからね。料理などできなくとも、別にどうとでもなると」
line = "「誰にだって、得手不得手はある。今は便利な世の中になったからね。料理などできなくとも、別にどうとでもなると」"

[[dialogue]]
speaker = "ジュエリー"
# 「けれど、キミと男女の付き合いを始めて、私の中に欲が湧いてしまった」
line = "「けれど、キミと男女の付き合いを始めて、私の中に欲が湧いてしまった」"

[[dialogue]]
speaker = "ジュエリー"
# 「自分の作った手料理を、キミに食べてもらって、美味しいと言ってもらえたら……それはどんなに嬉しいことだろうと、考えてしまったんだ」
line = "「自分の作った手料理を、キミに食べてもらって、美味しいと言ってもらえたら……それはどんなに嬉しいことだろうと、考えてしまったんだ」"

[[dialogue]]
speaker = "ジュエリー"
# 「それで今日、流星寮の部屋で料理に挑戦したというわけさ」
line = "「それで今日、流星寮の部屋で料理に挑戦したというわけさ」"

[[dialogue]]
speaker = "ジュエリー"
# 「その結果、鍋を引っくり返して火傷し、寮内のみんなに心配をかけて……」
line = "「その結果、鍋を引っくり返して火傷し、寮内のみんなに心配をかけて……」"

[[dialogue]]
speaker = "ジュエリー"
# 「自身の不器用さを想像以上に思い知らされて……情けなくなったよ」
line = "「自身の不器用さを想像以上に思い知らされて……情けなくなったよ」"

[[dialogue]]
speaker = "ジュエリー"
# 「それ以上に凹んだのは……キミとの愛の証――エクリプスフォームを汚してしまったことだ」
line = "「それ以上に凹んだのは……キミとの愛の証――エクリプスフォームを汚してしまったことだ」"

[[dialogue]]
speaker = "ジュエリー"
# 「――いつものように一石二鳥だと変身していて、味噌汁を引っくり返した時に、衣装に思いっきりかかってしまったんだ」
line = "「――いつものように一石二鳥だと変身していて、味噌汁を引っくり返した時に、衣装に思いっきりかかってしまったんだ」"

[[dialogue]]
speaker = "ジュエリー"
# 「仮にかからなかったとしても、少し考えれば、エプロンを付けて料理をしないと衣装が汚れてしまうと、わかったはずなのにね」
line = "「仮にかからなかったとしても、少し考えれば、エプロンを付けて料理をしないと衣装が汚れてしまうと、わかったはずなのにね」"

[[dialogue]]
speaker = "ジュエリー"
# 「戦闘服の損傷や汚れは、変身を解除すれば無かったことになる。その理屈が私のズボラさと合わさって、無意識にエプロンを付け忘れる結果へと繋がってしまった」
line = "「戦闘服の損傷や汚れは、変身を解除すれば無かったことになる。その理屈が私のズボラさと合わさって、無意識にエプロンを付け忘れる結果へと繋がってしまった」"

[[dialogue]]
speaker = "ジュエリー"
# 「物理的な汚れは消えたとしても、汚してしまった事実は消せない。私の心にも、あの汚れた光景は焼き付いてしまっている」
line = "「物理的な汚れは消えたとしても、汚してしまった事実は消せない。私の心にも、あの汚れた光景は焼き付いてしまっている」"

[[dialogue]]
speaker = "ジュエリー"
# 「我ながら、欲をかいて愚かなことをしたと、心から後悔しているよ」
line = "「我ながら、欲をかいて愚かなことをしたと、心から後悔しているよ」"

[[dialogue]]
speaker = "unk"
# 目を伏せて懺悔し、落ち込んだ顔をするジュエリー。
line = "目を伏せて懺悔し、落ち込んだ顔をするジュエリー。"

[[dialogue]]
speaker = "unk"
# 俺は床に片膝を着き、彼女と目線を合わせてから、その白い手を取る。
line = "俺は床に片膝を着き、彼女と目線を合わせてから、その白い手を取る。"

[[dialogue]]
speaker = "unk"
# 今度、俺と一緒に料理をしよう
line = "今度、俺と一緒に料理をしよう"

[[dialogue]]
speaker = "ジュエリー"
# 「え……？」
line = "「え……？」"

[[dialogue]]
speaker = "unk"
# ――ジュエリーがまだ、俺に料理を食べさせたいって思ってくれているのなら、俺がキミに料理を教える。
line = "――ジュエリーがまだ、俺に料理を食べさせたいって思ってくれているのなら、俺がキミに料理を教える。"

[[dialogue]]
speaker = "unk"
# 俺に秘密で、サプライズでお弁当を作ろうとしてくれたのは嬉しい。でも、それでジュエリーが暗い顔になってしまうのは嬉しくない。
line = "俺に秘密で、サプライズでお弁当を作ろうとしてくれたのは嬉しい。でも、それでジュエリーが暗い顔になってしまうのは嬉しくない。"

[[dialogue]]
speaker = "ジュエリー"
# 「――だったら、私と一緒に料理して、作ったものを一緒に食べたい？」
line = "「――だったら、私と一緒に料理して、作ったものを一緒に食べたい？」"

[[dialogue]]
speaker = "ジュエリー"
# 「そうすれば、嫌な思い出も良い思い出に上書きされるはずだから……？」
line = "「そうすれば、嫌な思い出も良い思い出に上書きされるはずだから……？」"

[[dialogue]]
speaker = "ジュエリー"
# 「……ああ、助手。本当にキミは――」
line = "「……ああ、助手。本当にキミは――」"

[[dialogue]]
speaker = "ジュエリー"
# 「私にとっての『お星さま』だね」
line = "「私にとっての『お星さま』だね」"

[[dialogue]]
speaker = "ジュエリー"
# 「日陰を歩かざるを得なかった私に寄り添って、キミはいつも温かな光をくれる──」
line = "「日陰を歩かざるを得なかった私に寄り添って、キミはいつも温かな光をくれる──」"

[[dialogue]]
speaker = "unk"
# と、その時だった。
line = "と、その時だった。"

[[dialogue]]
speaker = "unk"
# ジュエリーの体から星力が溢れるように白い光を放ち――
line = "ジュエリーの体から星力が溢れるように白い光を放ち――"

[[dialogue]]
speaker = "ジュエリー"
# 「これは……？」
line = "「これは……？」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「ああ……」
line = "「ああ……」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「やはり、このエクリプスフォームはキミとの愛の証だ」
line = "「やはり、このエクリプスフォームはキミとの愛の証だ」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「キミへの愛おしい気持ちが高まるほど、力が溢れてくる。その証拠にこうして勝手に変身してしまった……」
line = "「キミへの愛おしい気持ちが高まるほど、力が溢れてくる。その証拠にこうして勝手に変身してしまった……」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「ありがとう、助手。心配してくれて、私を探しに来てくれて。それから、私に温かい言葉をくれて」
line = "「ありがとう、助手。心配してくれて、私を探しに来てくれて。それから、私に温かい言葉をくれて」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「助手、私は――今、とても幸せだ」
line = "「助手、私は――今、とても幸せだ」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「私は――心から、キミが好きだ。キミのことを深く愛している」
line = "「私は――心から、キミが好きだ。キミのことを深く愛している」"

[[dialogue]]
speaker = "unk"
# ふと、愛の言葉に合わせて一瞬、エクリプスフォームの白いドレスが、<b>花嫁の衣装</b>のように見えてしまった。
line = "ふと、愛の言葉に合わせて一瞬、エクリプスフォームの白いドレスが、<b>花嫁の衣装</b>のように見えてしまった。"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「うん？　急に照れた顔をして、どうしたんだい？　助手？」
line = "「うん？　急に照れた顔をして、どうしたんだい？　助手？」"

[[dialogue]]
speaker = "unk"
# い、いや、なんでもない……
line = "い、いや、なんでもない……"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「今は隠さず、教えてくれた方が私は嬉しい、と言ってもダメかい？」
line = "「今は隠さず、教えてくれた方が私は嬉しい、と言ってもダメかい？」"

[[dialogue]]
speaker = "unk"
# そう言われてしまっては、誤魔化すわけにもいかない。
line = "そう言われてしまっては、誤魔化すわけにもいかない。"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「ふふっ、なるほど……ウェディングドレスに見えた、か。なら――」
line = "「ふふっ、なるほど……ウェディングドレスに見えた、か。なら――」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「誓いのキスでも……するかい？」
line = "「誓いのキスでも……するかい？」"

[[dialogue]]
speaker = "unk"
# そう言って、彼女はそっと顔を近づけて――
line = "そう言って、彼女はそっと顔を近づけて――"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「ん……<emoji=heart04>　ちゅっ<emoji=heart04>」
line = "「ん……<emoji=heart04>　ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「ちゅっ<emoji=heart04>　あっ、助手っ<emoji=heart04>」
line = "「ちゅっ<emoji=heart04>　あっ、助手っ<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「はぁぁ……っ<emoji=heart04>　ふふっ♪　心の底から、愛しているよ<emoji=heart04>　ちゅっ<emoji=heart04>」
line = "「はぁぁ……っ<emoji=heart04>　ふふっ♪　心の底から、愛しているよ<emoji=heart04>　ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 日傘の影に隠れながら、俺たちは何度もキスを交わすのだった――
line = "日傘の影に隠れながら、俺たちは何度もキスを交わすのだった――"
