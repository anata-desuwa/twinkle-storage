[[dialogue]]
speaker = "unk"
# 第０話,破滅の連鎖,B
line = "第０話,破滅の連鎖,B"

[[dialogue]]
speaker = "unk"
# 滅亡が具現していた。
line = "滅亡が具現していた。"

[[dialogue]]
speaker = "unk"
# “<ruby=リ・クリエイション>世界の再創生</ruby>”を命じられた<emoji=abb><emoji=abb>は既に魔王の器さえ取り込み、退廃した荒野をなお終わらぬ暴虐に巻き込んでゆく。
line = "“<ruby>世界の再創生<rt>リ・クリエイション</rt></ruby>”を命じられた<emoji=abb><emoji=abb>は既に魔王の器さえ取り込み、退廃した荒野をなお終わらぬ暴虐に巻き込んでゆく。"

[[dialogue]]
speaker = "unk"
# 創るなら、まず壊す。
line = "創るなら、まず壊す。"

[[dialogue]]
speaker = "unk"
# 単純な道理であっても、それが億万の力で実行されれば世界はひとたまりもない。
line = "単純な道理であっても、それが億万の力で実行されれば世界はひとたまりもない。"

[[dialogue]]
speaker = "？？？"
# 「グ……オ……ギ……ギギ……ガ……ゴ……ググ……」
line = "「グ……オ……ギ……ギギ……ガ……ゴ……ググ……」"

[[dialogue]]
speaker = "unk"
# 破壊の化身が唸りを上げる。
line = "破壊の化身が唸りを上げる。"

[[dialogue]]
speaker = "？？？"
# 「立て、フィオナ！　動け！　逃げろっ！！」
line = "「立て、フィオナ！　動け！　逃げろっ！！」"

[[dialogue]]
speaker = "unk"
# 残された最後の芽を摘むべく、絶望の黒き<ruby=かいな>腕</ruby>が<ruby=ぐふう>颶風</ruby>とともに迸った。
line = "残された最後の芽を摘むべく、絶望の黒き<ruby>腕<rt>かいな</rt></ruby>が<ruby>颶風<rt>ぐふう</rt></ruby>とともに迸った。"

[[dialogue]]
speaker = "フィオナ"
# （ごめん、エリシア──私のせいで）
line = "（ごめん、エリシア──私のせいで）"

[[dialogue]]
speaker = "？？？"
# 「フィオナ！　フィオナーーーーーッ！！！」
line = "「フィオナ！　フィオナーーーーーッ！！！」"

[[dialogue]]
speaker = "unk"
# 世界が１つ滅んだ。
line = "世界が１つ滅んだ。"

[[dialogue]]
speaker = "unk"
# それもまた、神すら超える秩序によって定められた運命──
line = "それもまた、神すら超える秩序によって定められた運命──"
