[[dialogue]]
speaker = "unk"
# 第２話,異世界和菓子グルメツアー,P
line = "第２話,異世界和菓子グルメツアー,P"

[[dialogue]]
speaker = "unk"
# リア先輩が俺たちの世界に来て数日。星徒会の仕事を手伝ってくれる彼女に、街を案内しようという話になって──
line = "リア先輩が俺たちの世界に来て数日。星徒会の仕事を手伝ってくれる彼女に、街を案内しようという話になって──"

[[dialogue]]
speaker = "リア"
# 「はむはむ、おいし～♪　このどら焼き、すごいクオリティだね！　甘さ控えめの上品な餡、それを包み込むふんわりした手作りの皮！　しかもアツアツの作りたて！」
line = "「はむはむ、おいし～♪　このどら焼き、すごいクオリティだね！　甘さ控えめの上品な餡、それを包み込むふんわりした手作りの皮！　しかもアツアツの作りたて！」"

[[dialogue]]
speaker = "アナ"
# 「やはりわかっていただけますか……！　このみたらし団子もどうぞ。絶妙なまでのモチモチ具合と、たっぷりかかった秘伝のタレとの組み合わせが見事な逸品で──」
line = "「やはりわかっていただけますか……！　このみたらし団子もどうぞ。絶妙なまでのモチモチ具合と、たっぷりかかった秘伝のタレとの組み合わせが見事な逸品で──」"

[[dialogue]]
speaker = "unk"
# 二人とも楽しそうだね
line = "二人とも楽しそうだね"

[[dialogue]]
speaker = "リア"
# 「もっちろん♪　知らなかったよ～。こっちの世界にこんな和菓子の聖地があったなんて♪　和菓子好きには天国だよ、天国！」
line = "「もっちろん♪　知らなかったよ～。こっちの世界にこんな和菓子の聖地があったなんて♪　和菓子好きには天国だよ、天国！」"

[[dialogue]]
speaker = "リア"
# 「案内してくれてありがとう、アナちゃん。ここに来ないで元の世界に戻っていたら一生後悔するところだったよ～」
line = "「案内してくれてありがとう、アナちゃん。ここに来ないで元の世界に戻っていたら一生後悔するところだったよ～」"

[[dialogue]]
speaker = "アナ"
# 「ノープロブレムです。私も和菓子について語り合える方と一度でいいから食べ歩きをしてみたかったものですから」
line = "「ノープロブレムです。私も和菓子について語り合える方と一度でいいから食べ歩きをしてみたかったものですから」"

[[dialogue]]
speaker = "アナ"
# 「普段はローテンションな私ですが、珍しく感情も高ぶっています。今は遮二無二、茶筅をぶん回して無性に抹茶を点てたい気分です。こんなにウキウキするのは久方ぶりです」
line = "「普段はローテンションな私ですが、珍しく感情も高ぶっています。今は遮二無二、茶筅をぶん回して無性に抹茶を点てたい気分です。こんなにウキウキするのは久方ぶりです」"

[[dialogue]]
speaker = "リア"
# 「わぁ、アナちゃんってお抹茶まで点てられるんだ♪　なら今度のお茶会は茶の湯にけって～い！　私もとびっきりの和菓子を作っていくよ～♪」
line = "「わぁ、アナちゃんってお抹茶まで点てられるんだ♪　なら今度のお茶会は茶の湯にけって～い！　私もとびっきりの和菓子を作っていくよ～♪」"

[[dialogue]]
speaker = "アナ"
# 「！！　是非！　茶室の予約は任せてください！　私もリア先輩に自作の和菓子を召し上がってもらいたいです！」
line = "「！！　是非！　茶室の予約は任せてください！　私もリア先輩に自作の和菓子を召し上がってもらいたいです！」"

[[dialogue]]
speaker = "unk"
# 俺も和菓子作りに挑戦してみようかな
line = "俺も和菓子作りに挑戦してみようかな"

[[dialogue]]
speaker = "リア"
# 「いいねいいね♪　それじゃあ三人で美味しい和菓子を作っちゃおう♪　きっと青春と友情が詰まった良いお菓子になるよ～♪」
line = "「いいねいいね♪　それじゃあ三人で美味しい和菓子を作っちゃおう♪　きっと青春と友情が詰まった良いお菓子になるよ～♪」"

[[dialogue]]
speaker = "アナ"
# 「素晴らしいアイデアです。実は私も誰かと一緒にお菓子作りをしてみたいとは常々思っていて。中々そういう機会に恵まれなかったものですから……」
line = "「素晴らしいアイデアです。実は私も誰かと一緒にお菓子作りをしてみたいとは常々思っていて。中々そういう機会に恵まれなかったものですから……」"

[[dialogue]]
speaker = "リア"
# 「そうなんだ？　新星学園には和菓子倶楽部とかないの？」
line = "「そうなんだ？　新星学園には和菓子倶楽部とかないの？」"

[[dialogue]]
speaker = "アナ"
# 「和菓子、倶楽部……？　なんですか、その心惹かれる響きの倶楽部は……」
line = "「和菓子、倶楽部……？　なんですか、その心惹かれる響きの倶楽部は……」"

[[dialogue]]
speaker = "リア"
# 「ふふん。何を隠そう、このリアお姉さんは流星学園で和菓子倶楽部だったのだ～！」
line = "「ふふん。何を隠そう、このリアお姉さんは流星学園で和菓子倶楽部だったのだ～！」"

[[dialogue]]
speaker = "アナ"
# 「！！　は、入りたい……！　ものすごく入りたいです、その倶楽部……！　私が流星学園の生徒なら絶対に入っています！」
line = "「！！　は、入りたい……！　ものすごく入りたいです、その倶楽部……！　私が流星学園の生徒なら絶対に入っています！」"

[[dialogue]]
speaker = "リア"
# 「新星学園でも作っちゃえばいいんだよ～。アナちゃんが部長になってさ」
line = "「新星学園でも作っちゃえばいいんだよ～。アナちゃんが部長になってさ」"

[[dialogue]]
speaker = "アナ"
# 「わ、私が部長ですか？　あまり自信がないです……。私、まだ一年ですし、無口で無愛想ですし、冷たい人に見られがちで……。とても人の上に立てる器では……」
line = "「わ、私が部長ですか？　あまり自信がないです……。私、まだ一年ですし、無口で無愛想ですし、冷たい人に見られがちで……。とても人の上に立てる器では……」"

[[dialogue]]
speaker = "リア"
# 「ふふ、難しく考えすぎだってば。みんなで楽しく和菓子作ってお茶会をする場所だと思えばいいんだよ」
line = "「ふふ、難しく考えすぎだってば。みんなで楽しく和菓子作ってお茶会をする場所だと思えばいいんだよ」"

[[dialogue]]
speaker = "リア"
# 「それに学年なんて関係ないよ。無口で無愛想でもないと思うよ？　和菓子について話してる時のアナちゃんの顔、すごくキラキラしてたもん」
line = "「それに学年なんて関係ないよ。無口で無愛想でもないと思うよ？　和菓子について話してる時のアナちゃんの顔、すごくキラキラしてたもん」"

[[dialogue]]
speaker = "アナ"
# 「そうでしょうか……。でも私が部長で人が集まりますかね……。実は私、星徒会のメンバー以外にあまり仲のいい友人もいないので……」
line = "「そうでしょうか……。でも私が部長で人が集まりますかね……。実は私、星徒会のメンバー以外にあまり仲のいい友人もいないので……」"

[[dialogue]]
speaker = "リア"
# 「ぜーったいに集まるよ♪　倶楽部っていうのは友達作りにも最適だしね♪　実際こうして私とアナちゃんは和菓子を通じて仲良しになってるじゃない」
line = "「ぜーったいに集まるよ♪　倶楽部っていうのは友達作りにも最適だしね♪　実際こうして私とアナちゃんは和菓子を通じて仲良しになってるじゃない」"

[[dialogue]]
speaker = "アナ"
# 「な、仲良しに」
line = "「な、仲良しに」"

[[dialogue]]
speaker = "リア"
# 「もうマブダチだもん、私たち♪」
line = "「もうマブダチだもん、私たち♪」"

[[dialogue]]
speaker = "アナ"
# 「まぶ……？　ああ、随分と古い単語を持ち出してきますね。一瞬、言葉の意味が……」
line = "「まぶ……？　ああ、随分と古い単語を持ち出してきますね。一瞬、言葉の意味が……」"

[[dialogue]]
speaker = "リア"
# 「あっちの世界での流行語が既に死語になってる！？」
line = "「あっちの世界での流行語が既に死語になってる！？」"

[[dialogue]]
speaker = "アナ"
# 「ハっ。すみません。私また、空気の読めない発言を……。やはり私に部長なんて大役は……」
line = "「ハっ。すみません。私また、空気の読めない発言を……。やはり私に部長なんて大役は……」"

[[dialogue]]
speaker = "リア"
# 「できるってば～。会長さんもそう思うよね？」
line = "「できるってば～。会長さんもそう思うよね？」"

[[dialogue]]
speaker = "unk"
# 俺も入りたいな
line = "俺も入りたいな"

[[dialogue]]
speaker = "unk"
# アナならできるよ
line = "アナならできるよ"

[[dialogue]]
speaker = "アナ"
# 「会長……。なら、頑張って設立してみてもいいかもしれません。副会長である私の傘下に会長が入るというのは不思議な感覚もしますが……」
line = "「会長……。なら、頑張って設立してみてもいいかもしれません。副会長である私の傘下に会長が入るというのは不思議な感覚もしますが……」"

[[dialogue]]
speaker = "リア"
# 「その意気だよ！　期間限定になっちゃうけど、もちろん私も入部するし♪」
line = "「その意気だよ！　期間限定になっちゃうけど、もちろん私も入部するし♪」"

[[dialogue]]
speaker = "リア"
# 「三人で和菓子倶楽部を盛り上げちゃおう♪　あ、でもでもスウィーツ同好会とはくれぐれも仲良くね？」
line = "「三人で和菓子倶楽部を盛り上げちゃおう♪　あ、でもでもスウィーツ同好会とはくれぐれも仲良くね？」"

[[dialogue]]
speaker = "アナ"
# 「スウィーツ同好会ですか？　そんな同好会うちの学園にあったでしょうか……」
line = "「スウィーツ同好会ですか？　そんな同好会うちの学園にあったでしょうか……」"

[[dialogue]]
speaker = "アナ"
# 「ですが、なんだかいいものですね。リア先輩にご提案されるまで、和菓子倶楽部を立ち上げようだなんて考えたこともありませんでした」
line = "「ですが、なんだかいいものですね。リア先輩にご提案されるまで、和菓子倶楽部を立ち上げようだなんて考えたこともありませんでした」"

[[dialogue]]
speaker = "アナ"
# 「思えば会長とこうして星徒会業務以外のことで話すこともあまりなかったような気がします。おかげで今まで以上に会長とも打ち解けられた気がしますね」
line = "「思えば会長とこうして星徒会業務以外のことで話すこともあまりなかったような気がします。おかげで今まで以上に会長とも打ち解けられた気がしますね」"

[[dialogue]]
speaker = "unk"
# 俺も同じ気持ちだよ
line = "俺も同じ気持ちだよ"

[[dialogue]]
speaker = "リア"
# 「えっへん、それが仲良しになるということなのです♪　こうやって生徒会活動以外でもバッチリ交流して、どんどん仲を深めなきゃもったいないよ」
line = "「えっへん、それが仲良しになるということなのです♪　こうやって生徒会活動以外でもバッチリ交流して、どんどん仲を深めなきゃもったいないよ」"

[[dialogue]]
speaker = "リア"
# 「モンスター退治やリクリエをとめる使命も大切だけど、まずは青春を謳歌しなくちゃね。せっかくの学園生活なんだから♪」
line = "「モンスター退治やリクリエをとめる使命も大切だけど、まずは青春を謳歌しなくちゃね。せっかくの学園生活なんだから♪」"

[[dialogue]]
speaker = "アナ"
# 「青春……。しかしプリマステラの星騎士がそんなものにうつつを抜かしてしまっていいのでしょうか……」
line = "「青春……。しかしプリマステラの星騎士がそんなものにうつつを抜かしてしまっていいのでしょうか……」"

[[dialogue]]
speaker = "リア"
# 「当たり前だよ！　クルセイダースも星騎士も軍隊じゃないんだし。楽しい日々の積み重ねが、この世界を守りたいっていう強い想いに繋がると思うんだ」
line = "「当たり前だよ！　クルセイダースも星騎士も軍隊じゃないんだし。楽しい日々の積み重ねが、この世界を守りたいっていう強い想いに繋がると思うんだ」"

[[dialogue]]
speaker = "アナ"
# 「楽しい日々の積み重ねが守りたいという想いに──……確かにそうですね。リア先輩の仰る通りです」
line = "「楽しい日々の積み重ねが守りたいという想いに──……確かにそうですね。リア先輩の仰る通りです」"

[[dialogue]]
speaker = "アナ"
# 「私、今までただプリマステラの星騎士だから、星徒会の一員だからという理由だけで戦っていた気がします。そのために知識を蓄えたり、星力を扱う訓練をしたりして」
line = "「私、今までただプリマステラの星騎士だから、星徒会の一員だからという理由だけで戦っていた気がします。そのために知識を蓄えたり、星力を扱う訓練をしたりして」"

[[dialogue]]
speaker = "アナ"
# 「でも……もっと素直に学園生活を楽しんでいいんですね。和菓子を作ったり、食べたりして、のんびりした時間を過ごしても……」
line = "「でも……もっと素直に学園生活を楽しんでいいんですね。和菓子を作ったり、食べたりして、のんびりした時間を過ごしても……」"

[[dialogue]]
speaker = "リア"
# 「その通りだよ♪　ね、会長さん？」
line = "「その通りだよ♪　ね、会長さん？」"

[[dialogue]]
speaker = "unk"
# 俺たちはこの日常を守るために戦ってるからね
line = "俺たちはこの日常を守るために戦ってるからね"

[[dialogue]]
speaker = "アナ"
# 「ふふ、意外とロマンチックだったんですね、会長は。そういった部分も初めて知りました」
line = "「ふふ、意外とロマンチックだったんですね、会長は。そういった部分も初めて知りました」"

[[dialogue]]
speaker = "アナ"
# 「私、リア先輩に出会えて本当に良かったです。和菓子を愛する同士を見つけられたことだけではなく、言葉に換言できない大切なことを教わることができました」
line = "「私、リア先輩に出会えて本当に良かったです。和菓子を愛する同士を見つけられたことだけではなく、言葉に換言できない大切なことを教わることができました」"

[[dialogue]]
speaker = "リア"
# 「くすくす、オーバーだなぁ。大したことは言ってないのに。でもでも、アナちゃんに何かが残せたのなら先輩として誇らしいな♪」
line = "「くすくす、オーバーだなぁ。大したことは言ってないのに。でもでも、アナちゃんに何かが残せたのなら先輩として誇らしいな♪」"

[[dialogue]]
speaker = "リア"
# 「じゃあ気を取り直して異世界和菓子グルメツアーを続けよう～！　アナちゃんのお勧めの和菓子店、もっともっと教えて教えて☆」
line = "「じゃあ気を取り直して異世界和菓子グルメツアーを続けよう～！　アナちゃんのお勧めの和菓子店、もっともっと教えて教えて☆」"

[[dialogue]]
speaker = "アナ"
# 「ふふ、モチのロンです。二人とも今夜は夕食を食べられないと思ってくださいね。ぜんざいにあんみつ、水ようかんに人形焼き──紹介したいお店はまだまだ残っていますから」
line = "「ふふ、モチのロンです。二人とも今夜は夕食を食べられないと思ってくださいね。ぜんざいにあんみつ、水ようかんに人形焼き──紹介したいお店はまだまだ残っていますから」"

[[dialogue]]
speaker = "unk"
# 楽しみだ
line = "楽しみだ"

[[dialogue]]
speaker = "リア"
# 「そうと決まれば、れっつご～！　ついでにお土産も買って、星徒会のみんなと茶の湯パーティーしちゃおっか♪」
line = "「そうと決まれば、れっつご～！　ついでにお土産も買って、星徒会のみんなと茶の湯パーティーしちゃおっか♪」"

[[dialogue]]
speaker = "アナ"
# 「はい、和菓子倶楽部の記念すべき初活動です！」
line = "「はい、和菓子倶楽部の記念すべき初活動です！」"
