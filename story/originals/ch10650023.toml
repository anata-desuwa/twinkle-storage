[[dialogue]]
speaker = "unk"
# 第３話,とある聖女の休日,P
line = "第３話,とある聖女の休日,P"

[[dialogue]]
speaker = "イレーナ"
# 「しゃあっ！　アイム、ウィナー！　あんたゲームけっこう弱いわね♪」
line = "「しゃあっ！　アイム、ウィナー！　あんたゲームけっこう弱いわね♪」"

[[dialogue]]
speaker = "イレーナ"
# 「約束通りコンビニへの買い出しはあんたの役目ね。ホットココアと肉まんと、なんか適当にお菓子買ってきて。ああ、あとティラミスも♪」
line = "「約束通りコンビニへの買い出しはあんたの役目ね。ホットココアと肉まんと、なんか適当にお菓子買ってきて。ああ、あとティラミスも♪」"

[[dialogue]]
speaker = "unk"
# どうしてうちにそんな格好で……
line = "どうしてうちにそんな格好で……"

[[dialogue]]
speaker = "イレーナ"
# 「いいじゃない別に。今日は母親もいないんでしょ？　てかスケベな目で見ないでよ、この変態。これは寝間着代わりよ。動きやすくて楽だし」
line = "「いいじゃない別に。今日は母親もいないんでしょ？　てかスケベな目で見ないでよ、この変態。これは寝間着代わりよ。動きやすくて楽だし」"

[[dialogue]]
speaker = "イレーナ"
# 「ほらあたし、ここんとこずーっとクリスマス会の準備やらアドベントやらで大忙しだったじゃない？」
line = "「ほらあたし、ここんとこずーっとクリスマス会の準備やらアドベントやらで大忙しだったじゃない？」"

[[dialogue]]
speaker = "イレーナ"
# 「だから……ん～……たまの休みくらい気軽に過ごせる場所で羽根を伸ばしたくって」
line = "「だから……ん～……たまの休みくらい気軽に過ごせる場所で羽根を伸ばしたくって」"

[[dialogue]]
speaker = "イレーナ"
# 「あ～今日はもう絶対この家から一歩も外に出ないわ。一日中ダラダラゲームしながら過ごしてやるの」
line = "「あ～今日はもう絶対この家から一歩も外に出ないわ。一日中ダラダラゲームしながら過ごしてやるの」"

[[dialogue]]
speaker = "イレーナ"
# 「ということで、さっさと飲み物とお菓子買ってきなさい。戻ったらもう一戦やるわよ、もう一戦！」
line = "「ということで、さっさと飲み物とお菓子買ってきなさい。戻ったらもう一戦やるわよ、もう一戦！」"

[[dialogue]]
speaker = "イレーナ"
# 「ん？　こんな時に誰かしら──げっ、シャロン！？」
line = "「ん？　こんな時に誰かしら──げっ、シャロン！？」"

[[dialogue]]
speaker = "イレーナ"
# 「うわぁ、出たくない……。またなんか面倒なこと頼まれるに決まってるし。絶対に今日は働かないわよ……！　待ちに待った休みなんだから……！」
line = "「うわぁ、出たくない……。またなんか面倒なこと頼まれるに決まってるし。絶対に今日は働かないわよ……！　待ちに待った休みなんだから……！」"

[[dialogue]]
speaker = "イレーナ"
# 「ああもう、うざったいわね……！　一体なんなのよっ！」
line = "「ああもう、うざったいわね……！　一体なんなのよっ！」"

[[dialogue]]
speaker = "イレーナ"
# 「もしもし！？　悪いけどあたし、今日は休みで──」
line = "「もしもし！？　悪いけどあたし、今日は休みで──」"

[[dialogue]]
speaker = "シャロン"
# 『ああ、ようやく繋がりました……！　どうか早く来てください、子どもたちの一大事なのです……！』
line = "『ああ、ようやく繋がりました……！　どうか早く来てください、子どもたちの一大事なのです……！』"

[[dialogue]]
speaker = "イレーナ"
# 「えっ？　どういうこと？」
line = "「えっ？　どういうこと？」"

[[dialogue]]
speaker = "シャロン"
# 『詳しい事情はのちほど……！　とにかくどうか急いでください……！　流星学園の前でお待ちしていますから……！』
line = "『詳しい事情はのちほど……！　とにかくどうか急いでください……！　流星学園の前でお待ちしていますから……！』"

[[dialogue]]
speaker = "イレーナ"
# 「んなこと言われても今日はオフで──……んもうっ。言うだけ言って切ってくれちゃってっ。ホントあの子は……！」
line = "「んなこと言われても今日はオフで──……んもうっ。言うだけ言って切ってくれちゃってっ。ホントあの子は……！」"

[[dialogue]]
speaker = "unk"
# どうするの？
line = "どうするの？"

[[dialogue]]
speaker = "イレーナ"
# 「もちろん無視よ無視。あたし、今日休みだもの。今日はめいっぱい羽根を伸ばすって決めてるの」
line = "「もちろん無視よ無視。あたし、今日休みだもの。今日はめいっぱい羽根を伸ばすって決めてるの」"

[[dialogue]]
speaker = "イレーナ"
# 「それよりほら、コンビニ行くわよコンビニ。やっぱりあたしも付き合うわ」
line = "「それよりほら、コンビニ行くわよコンビニ。やっぱりあたしも付き合うわ」"

[[dialogue]]
speaker = "イレーナ"
# 「確か学園の近くに美味しいピッツァのお店があるのよね。急にあれが食べたくなっちゃったのよ」
line = "「確か学園の近くに美味しいピッツァのお店があるのよね。急にあれが食べたくなっちゃったのよ」"

[[dialogue]]
speaker = "unk"
# ツンデレさんめ
line = "ツンデレさんめ"

[[dialogue]]
speaker = "イレーナ"
# 「なっ！？　誰がツンデレよ！　急にピッツァが食べたくなっただけって言ってるでしょ！　他意はないんだからっ！」
line = "「なっ！？　誰がツンデレよ！　急にピッツァが食べたくなっただけって言ってるでしょ！　他意はないんだからっ！」"

[[dialogue]]
speaker = "イレーナ"
# 「……で？　まさかシャロン、一大事ってのは」
line = "「……で？　まさかシャロン、一大事ってのは」"

[[dialogue]]
speaker = "女の子"
# 「わぁ～！　聖女さま、すご～い！　どんどん雪が積もっていく～！」
line = "「わぁ～！　聖女さま、すご～い！　どんどん雪が積もっていく～！」"

[[dialogue]]
speaker = "シャロン"
# 「ありがとうございます、イレーナさま！　子どもたちと雪合戦をする約束だったのですが、雪が足らずに困っていたのですよ！」
line = "「ありがとうございます、イレーナさま！　子どもたちと雪合戦をする約束だったのですが、雪が足らずに困っていたのですよ！」"

[[dialogue]]
speaker = "イレーナ"
# 「あたしは降雪機かっての……。慌てて来て損したわ……」
line = "「あたしは降雪機かっての……。慌てて来て損したわ……」"

[[dialogue]]
speaker = "シャロン"
# 「ふふ、そう仰らずに。今日はお休みとお伺いしておりましたから。せっかくならイレーナさまも一緒に雪合戦はいかがですか？」
line = "「ふふ、そう仰らずに。今日はお休みとお伺いしておりましたから。せっかくならイレーナさまも一緒に雪合戦はいかがですか？」"

[[dialogue]]
speaker = "イレーナ"
# 「あたしは会長ん家で一日ダラダラゴロゴロするつもりだったんだってば！　なのにこんなクソ寒い中、雪合戦なんて。雪降らせたら帰るからね」
line = "「あたしは会長ん家で一日ダラダラゴロゴロするつもりだったんだってば！　なのにこんなクソ寒い中、雪合戦なんて。雪降らせたら帰るからね」"

[[dialogue]]
speaker = "シャロン"
# 「まぁまぁそう仰らずに。子どもたちもイレーナさまと一緒に遊べると聞いて喜んでいたのですよ？」
line = "「まぁまぁそう仰らずに。子どもたちもイレーナさまと一緒に遊べると聞いて喜んでいたのですよ？」"

[[dialogue]]
speaker = "女の子"
# 「うん！　いっしょにあそぼ～、聖女さま～！　この間はプレゼントくれてありがとう～！」
line = "「うん！　いっしょにあそぼ～、聖女さま～！　この間はプレゼントくれてありがとう～！」"

[[dialogue]]
speaker = "イレーナ"
# 「むぅ……ったくもう。あたしなんかと遊んで何が楽しいんだか……」
line = "「むぅ……ったくもう。あたしなんかと遊んで何が楽しいんだか……」"

[[dialogue]]
speaker = "シャロン"
# 「会長さまもどうぞ！　会長さまが一緒ならイレーナさまもきっとお喜びになりますよ！」
line = "「会長さまもどうぞ！　会長さまが一緒ならイレーナさまもきっとお喜びになりますよ！」"

[[dialogue]]
speaker = "イレーナ"
# 「はぁっ！？　コイツはそういうんじゃないわよ！？　やっぱりあたし、帰っ──」
line = "「はぁっ！？　コイツはそういうんじゃないわよ！？　やっぱりあたし、帰っ──」"

[[dialogue]]
speaker = "シャロン"
# 「えいっ♪」
line = "「えいっ♪」"

[[dialogue]]
speaker = "イレーナ"
# 「ぶふっ！？　ちょっと！？　何すんの──よっ！」
line = "「ぶふっ！？　ちょっと！？　何すんの──よっ！」"

[[dialogue]]
speaker = "シャロン"
# 「きゃふっ！　お尻はくすぐったいですよ、イレーナさま」
line = "「きゃふっ！　お尻はくすぐったいですよ、イレーナさま」"

[[dialogue]]
speaker = "イレーナ"
# 「いきなり顔面に投げつけてきたあんたに言われたくないわよ！？」
line = "「いきなり顔面に投げつけてきたあんたに言われたくないわよ！？」"

[[dialogue]]
speaker = "シャロン"
# 「ふふふ。不意打ちは雪合戦の醍醐味と聞いたもので。ですが楽しいですね。雪合戦というものは」
line = "「ふふふ。不意打ちは雪合戦の醍醐味と聞いたもので。ですが楽しいですね。雪合戦というものは」"

[[dialogue]]
speaker = "イレーナ"
# 「何よ……。もしかしてシャロン、雪合戦するの初めてなの？」
line = "「何よ……。もしかしてシャロン、雪合戦するの初めてなの？」"

[[dialogue]]
speaker = "シャロン"
# 「お恥ずかしながら。幼い頃は体も今より弱くて、冬場は家にこもりきりでしたので」
line = "「お恥ずかしながら。幼い頃は体も今より弱くて、冬場は家にこもりきりでしたので」"

[[dialogue]]
speaker = "シャロン"
# 「ですので実は憧れていたのです。こうして友人と雪合戦に興じることに」
line = "「ですので実は憧れていたのです。こうして友人と雪合戦に興じることに」"

[[dialogue]]
speaker = "イレーナ"
# 「まったくもう……。んなこと言われたら帰りづらくなるじゃない。ま……あたしも雪合戦なんて聖女って呼ばれる前にした以来だし」
line = "「まったくもう……。んなこと言われたら帰りづらくなるじゃない。ま……あたしも雪合戦なんて聖女って呼ばれる前にした以来だし」"

[[dialogue]]
speaker = "イレーナ"
# 「たまには童心に帰って遊ぶのも……悪くはないかもね」
line = "「たまには童心に帰って遊ぶのも……悪くはないかもね」"

[[dialogue]]
speaker = "シャロン"
# 「ふふ、ありがとうございます！　お優しいイレーナさま！」
line = "「ふふ、ありがとうございます！　お優しいイレーナさま！」"

[[dialogue]]
speaker = "イレーナ"
# 「イ、イチイチお礼とか言わなくていいっての。やるならちゃっちゃと始めるわよ。まずはチーム分けから──」
line = "「イ、イチイチお礼とか言わなくていいっての。やるならちゃっちゃと始めるわよ。まずはチーム分けから──」"

[[dialogue]]
speaker = "イレーナ"
# 「ちょっと、ボサっとしてないであんたも来なさい。あたしの肉盾にしてやるわ」
line = "「ちょっと、ボサっとしてないであんたも来なさい。あたしの肉盾にしてやるわ」"

[[dialogue]]
speaker = "イレーナ"
# 「あんたもなんだかんだ忙しく過ごしてるんでしょ？　ふふん、思いっきり体でも動かして一緒にストレス発散しましょっ」
line = "「あんたもなんだかんだ忙しく過ごしてるんでしょ？　ふふん、思いっきり体でも動かして一緒にストレス発散しましょっ」"
