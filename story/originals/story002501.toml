[[dialogue]]
speaker = "unk"
# リクリエ──この未曽有の危機は、星騎士たちの学園にも大きな打撃を残した。
line = "リクリエ──この未曽有の危機は、星騎士たちの学園にも大きな打撃を残した。"

[[dialogue]]
speaker = "unk"
# その内の最も大きな痛手のひとつが、英雄ジェラルド・セイファートを失ったことだった。
line = "その内の最も大きな痛手のひとつが、英雄ジェラルド・セイファートを失ったことだった。"

[[dialogue]]
speaker = "unk"
# 新星学園の学園長でもあった彼は、戦士としてだけでなく、指導者としても重要な役割を果たしていたからだ。
line = "新星学園の学園長でもあった彼は、戦士としてだけでなく、指導者としても重要な役割を果たしていたからだ。"

[[dialogue]]
speaker = "unk"
# リクリエ後もモンスターの出現は収まらず、早急に指導者を見出だす必要がある。
line = "リクリエ後もモンスターの出現は収まらず、早急に指導者を見出だす必要がある。"

[[dialogue]]
speaker = "unk"
# 理事長の九浄ヘレナは、差し当たり流星学園の学園長である白夜院ラティエに、新星学園の学園長を一時的に兼任するよう依頼した。
line = "理事長の九浄ヘレナは、差し当たり流星学園の学園長である白夜院ラティエに、新星学園の学園長を一時的に兼任するよう依頼した。"

[[dialogue]]
speaker = "エスメラルダ"
# 「──という経緯は、あなたも良く知っている通りよ」
line = "「──という経緯は、あなたも良く知っている通りよ」"

[[dialogue]]
speaker = "エスメラルダ"
# 「元々あの人は、気付いたら仕事を放り出して姿を消してしまう自由人……」
line = "「元々あの人は、気付いたら仕事を放り出して姿を消してしまう自由人……」"

[[dialogue]]
speaker = "エスメラルダ"
# 「学園長を兼任すれば責任感も芽生えると思ったのだけど……考えが甘かったわね。今も行方をくらませて、何処をさまよっているのやら」
line = "「学園長を兼任すれば責任感も芽生えると思ったのだけど……考えが甘かったわね。今も行方をくらませて、何処をさまよっているのやら」"

[[dialogue]]
speaker = "unk"
# 俺に出来る仕事があれば……
line = "俺に出来る仕事があれば……"

[[dialogue]]
speaker = "エスメラルダ"
# 「気持ちは有難いわ。けれど本来ラティエ学園長の仕事であるものを、あなたに負わせるのは違うでしょう？」
line = "「気持ちは有難いわ。けれど本来ラティエ学園長の仕事であるものを、あなたに負わせるのは違うでしょう？」"

[[dialogue]]
speaker = "エスメラルダ"
# 「どうにか学園長に自覚を持って職務に当たってもらいたいものだけど……」
line = "「どうにか学園長に自覚を持って職務に当たってもらいたいものだけど……」"

[[dialogue]]
speaker = "エスメラルダ"
# 「それに……学園長には私の研究に協力をお願いしているのよね」
line = "「それに……学園長には私の研究に協力をお願いしているのよね」"

[[dialogue]]
speaker = "エスメラルダ"
# 「だから私個人としても、何とかして学園長を捕まえなくてはならないの」
line = "「だから私個人としても、何とかして学園長を捕まえなくてはならないの」"

[[dialogue]]
speaker = "エスメラルダ"
# 「でも逃げられてばかりで、最近は全くデータが取れていないのよね……はぁ……」
line = "「でも逃げられてばかりで、最近は全くデータが取れていないのよね……はぁ……」"

[[dialogue]]
speaker = "unk"
# と……エスメラルダ先生がわざわざ星徒会室までやってきて、そんな愚痴をこぼしていった。
line = "と……エスメラルダ先生がわざわざ星徒会室までやってきて、そんな愚痴をこぼしていった。"

[[dialogue]]
speaker = "unk"
# その後、新星学園は十六夜シノという学園長を迎え入れることになるのだが、それよりも少しだけ前の話──
line = "その後、新星学園は十六夜シノという学園長を迎え入れることになるのだが、それよりも少しだけ前の話──"

[[dialogue]]
speaker = "unk"
# ヘレナちゃんに呼び出され九浄家に向かうと、そこで一緒に待っていたのはエスメラルダ先生だった。
line = "ヘレナちゃんに呼び出され九浄家に向かうと、そこで一緒に待っていたのはエスメラルダ先生だった。"

[[dialogue]]
speaker = "unk"
# 何故エスメラルダ先生が？　と、その疑問を口にする前に、ヘレナちゃんが俺を呼んだ理由を話し始めた。
line = "何故エスメラルダ先生が？　と、その疑問を口にする前に、ヘレナちゃんが俺を呼んだ理由を話し始めた。"

[[dialogue]]
speaker = "ヘレナ"
# 「──我が九浄家は『五名門』の中でも、特に『人材』の分野において重要な役割を担っている」
line = "「──我が九浄家は『五名門』の中でも、特に『人材』の分野において重要な役割を担っている」"

[[dialogue]]
speaker = "ヘレナ"
# 「ひと口に人材と言っても意味は広いが、『求められた人材を紹介する』といった言葉通りの相談を受けることもある」
line = "「ひと口に人材と言っても意味は広いが、『求められた人材を紹介する』といった言葉通りの相談を受けることもある」"

[[dialogue]]
speaker = "ヘレナ"
# 「ところで……貴殿は桜十路家の経営する遊園地に、新たなプールエリアが拡張されるという話はご存知かな？」
line = "「ところで……貴殿は桜十路家の経営する遊園地に、新たなプールエリアが拡張されるという話はご存知かな？」"

[[dialogue]]
speaker = "ヘレナ"
# 「それが近日、いよいよ完成する。初日の入園チケットは既に売り切れてしまって、もう手に入らないほどの人気ぶりだ」
line = "「それが近日、いよいよ完成する。初日の入園チケットは既に売り切れてしまって、もう手に入らないほどの人気ぶりだ」"

[[dialogue]]
