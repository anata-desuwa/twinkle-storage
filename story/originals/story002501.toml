line = "……とある女性？"

[[dialogue]]
speaker = "ヘレナ"
# 「……<ruby=びゃくやいん>白夜院</ruby>ラティエ」
line = "「……<ruby>白夜院<rt>びゃくやいん</rt></ruby>ラティエ」"

[[dialogue]]
speaker = "ヘレナ"
# 「このチケットは桜十路家が是非にと送ってきたものでな。つまらない人材を派遣したのでは九浄家の沽券に関わるというものだ」
line = "「このチケットは桜十路家が是非にと送ってきたものでな。つまらない人材を派遣したのでは九浄家の沽券に関わるというものだ」"

[[dialogue]]
speaker = "ヘレナ"
# 「その点、<ruby=ひのみや>緋宮</ruby>クロトに白夜院ラティエという組み合わせはとても面白いであろう？」
line = "「その点、<ruby>緋宮<rt>ひのみや</rt></ruby>クロトに白夜院ラティエという組み合わせはとても面白いであろう？」"

[[dialogue]]
speaker = "unk"
# 面白いかどうか以前に、そもそもそれは人材派遣なのか？　という疑問が浮かぶ。
line = "面白いかどうか以前に、そもそもそれは人材派遣なのか？　という疑問が浮かぶ。"

[[dialogue]]
speaker = "unk"
# 戸惑う俺を楽しそうに見やりながら、ヘレナちゃんは言葉を続けた。
line = "戸惑う俺を楽しそうに見やりながら、ヘレナちゃんは言葉を続けた。"

[[dialogue]]
speaker = "ヘレナ"
# 「とまあ、それは表向きの理由で、ここからが本題だ」
line = "「とまあ、それは表向きの理由で、ここからが本題だ」"

[[dialogue]]
speaker = "ヘレナ"
# 「白夜院ラティエという人選は、とある相談を受けてのことでもある──そうだな、エスメラルダ」
line = "「白夜院ラティエという人選は、とある相談を受けてのことでもある──そうだな、エスメラルダ」"

[[dialogue]]
speaker = "エスメラルダ"
# 「はい……。会長さんには散々愚痴っていたのでご存知だと思いますが、相変わらずあの人の放浪癖が直らなくて」
line = "「はい……。会長さんには散々愚痴っていたのでご存知だと思いますが、相変わらずあの人の放浪癖が直らなくて」"

[[dialogue]]
speaker = "エスメラルダ"
# 「学園長としての職務も滞らせており、私もフィオナ星徒会長もほとほと困り果てていたの」
line = "「学園長としての職務も滞らせており、私もフィオナ星徒会長もほとほと困り果てていたの」"

[[dialogue]]
speaker = "エスメラルダ"
# 「それで何か良い策は無いかと理事長にご相談したところ、全面的に協力頂けるという話になって……」
line = "「それで何か良い策は無いかと理事長にご相談したところ、全面的に協力頂けるという話になって……」"

[[dialogue]]
speaker = "ヘレナ"
# 「その通りだ。あの放蕩者にはそろそろ灸を据える必要があると思っていたのだ」
line = "「その通りだ。あの放蕩者にはそろそろ灸を据える必要があると思っていたのだ」"

[[dialogue]]
speaker = "ヘレナ"
# 「奴とは少々確執があってな……奴め、私の経営するカジノを派手に荒らしていったことがある」
line = "「奴とは少々確執があってな……奴め、私の経営するカジノを派手に荒らしていったことがある」"

[[dialogue]]
speaker = "ヘレナ"
# 「常識外れの幸運で勝ちまくり、一時、我がカジノはあわや閉店というところまで追い込まれてしまった」
line = "「常識外れの幸運で勝ちまくり、一時、我がカジノはあわや閉店というところまで追い込まれてしまった」"

[[dialogue]]
speaker = "ヘレナ"
# 「申し訳なさそうな顔のひとつでもすれば可愛げがあるものの、いつもの涼し気な顔を崩さぬのだから憎らしいにも程がある！」
line = "「申し訳なさそうな顔のひとつでもすれば可愛げがあるものの、いつもの涼し気な顔を崩さぬのだから憎らしいにも程がある！」"

[[dialogue]]
speaker = "ヘレナ"
# 「ふっふっふ……この恨み、晴らさずにおくべきか、だな」
line = "「ふっふっふ……この恨み、晴らさずにおくべきか、だな」"

[[dialogue]]
speaker = "エスメラルダ"
# 「とまあ復讐に燃える理事長の協力を得て、学園長の矯正計画を始動することになったのよ」
line = "「とまあ復讐に燃える理事長の協力を得て、学園長の矯正計画を始動することになったのよ」"

[[dialogue]]
speaker = "エスメラルダ"
# 「ですが理事長、学園長は会長さんの誘いに乗ってくれるでしょうか？」
line = "「ですが理事長、学園長は会長さんの誘いに乗ってくれるでしょうか？」"

[[dialogue]]
speaker = "ヘレナ"
