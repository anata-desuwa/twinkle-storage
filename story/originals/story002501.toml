[[dialogue]]
speaker = "unk"
# 俺ってそんな風に見られてたの！？
line = "俺ってそんな風に見られてたの！？"

[[dialogue]]
speaker = "ヘレナ"
# 「まあまあ、私も無策でこんな事を頼もうとは思っていない。これを貴殿に渡しておこう」
line = "「まあまあ、私も無策でこんな事を頼もうとは思っていない。これを貴殿に渡しておこう」"

[[dialogue]]
speaker = "ヘレナ"
