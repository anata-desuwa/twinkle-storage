line = "「大丈夫、会長さんならできるわ！」"

[[dialogue]]
speaker = "unk"
# エスメラルダ先生の目はすでに、周りの物が何も映らない研究者のそれになっていた。
line = "エスメラルダ先生の目はすでに、周りの物が何も映らない研究者のそれになっていた。"

[[dialogue]]
speaker = "unk"
