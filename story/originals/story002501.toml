line = "「が……そんなプレミア付きの特別招待チケットがここに２枚ある」"

[[dialogue]]
speaker = "ヘレナ"
# 「貴殿にはこのチケットで、とある女性を誘ってプールデートを楽しんできて欲しい」
line = "「貴殿にはこのチケットで、とある女性を誘ってプールデートを楽しんできて欲しい」"

[[dialogue]]
speaker = "unk"
# というのは誰でしょうか？
line = "というのは誰でしょうか？"

[[dialogue]]
speaker = "unk"
