line = "「あやつの星力は他の者にない特別な力を秘めているからな」"

[[dialogue]]
speaker = "エスメラルダ"
# 「会長さんは学園長を誘導して、出来るだけ人工戦闘服の性能を引き出すような立ち回りをお願いね」
line = "「会長さんは学園長を誘導して、出来るだけ人工戦闘服の性能を引き出すような立ち回りをお願いね」"

[[dialogue]]
speaker = "unk"
