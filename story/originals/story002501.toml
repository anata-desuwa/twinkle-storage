line = "「確かにこの水着、布面積も少なくて……これをプレゼントしてデートに誘うのは、ちょっと気持ち悪いかも……」"

[[dialogue]]
speaker = "ヘレナ"
# 「それを言うなら、唐突に自分の通う学園の学園長をデートに誘う男はどうなのだ？」
line = "「それを言うなら、唐突に自分の通う学園の学園長をデートに誘う男はどうなのだ？」"

[[dialogue]]
speaker = "unk"
