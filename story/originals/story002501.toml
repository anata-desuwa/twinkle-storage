line = "「無論、これはただの水着ではないぞ。新たに開発された水着型の人工戦闘服だ」"

[[dialogue]]
speaker = "ヘレナ"
# 「これをプレゼントすれば、奴をプールに誘う口実にもなろう」
line = "「これをプレゼントすれば、奴をプールに誘う口実にもなろう」"

[[dialogue]]
speaker = "unk"
# それを口実にデートに誘うって……
line = "それを口実にデートに誘うって……"

[[dialogue]]
speaker = "unk"
# 水着をプレゼントって……
line = "水着をプレゼントって……"

[[dialogue]]
speaker = "エスメラルダ"
