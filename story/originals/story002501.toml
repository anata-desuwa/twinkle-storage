[[dialogue]]
speaker = "ヘレナ"
# 「これまで幾人もの女性をたらしこんできた貴殿だ、たとえ相手が学園長であっても上手くやるのではないかな？」
line = "「これまで幾人もの女性をたらしこんできた貴殿だ、たとえ相手が学園長であっても上手くやるのではないかな？」"

