[[dialogue]]
speaker = "モネ"
# 「あれ？　……ここは、学園の図書館？　そうか、ウィステリアさんが脱出させてくれたんだ……」
line = "「あれ？　……ここは、学園の図書館？　そうか、ウィステリアさんが脱出させてくれたんだ……」"

[[dialogue]]
speaker = "モネ"
# 「あの翼を持った女の子は誰なんだろう……？　ウィステリアさん、大丈夫かな……」
line = "「あの翼を持った女の子は誰なんだろう……？　ウィステリアさん、大丈夫かな……」"

[[dialogue]]
speaker = "モネ"
# 「ううん、心配してるだけじゃダメ、ウィステリアさんを助けないと。私に何ができるかわからないけど、地下図書館に戻らなくちゃ……！」
line = "「ううん、心配してるだけじゃダメ、ウィステリアさんを助けないと。私に何ができるかわからないけど、地下図書館に戻らなくちゃ……！」"

[[dialogue]]
speaker = "モネ"
# 「あ、でも入口のロックはウィステリアさんじゃないと外せないし、どうしたら……」
line = "「あ、でも入口のロックはウィステリアさんじゃないと外せないし、どうしたら……」"

[[dialogue]]
speaker = "モネ"
# 「あ、熱っ！？」
line = "「あ、熱っ！？」"

[[dialogue]]
speaker = "unk"
# 本が熱を発し、火傷しそうな痛みが走るが、それでもモネは手にした本を離さない。
line = "本が熱を発し、火傷しそうな痛みが走るが、それでもモネは手にした本を離さない。"

[[dialogue]]
speaker = "unk"
# しかしその本はモネにとっても見覚えがない一冊だった。
line = "しかしその本はモネにとっても見覚えがない一冊だった。"

[[dialogue]]
speaker = "モネ"
# 「この本、いつの間に……もしかして地下図書館から持ってきちゃったのかな。勝手に本を持ち出すなんて、図書委員としてあるまじき失態だよ……」
line = "「この本、いつの間に……もしかして地下図書館から持ってきちゃったのかな。勝手に本を持ち出すなんて、図書委員としてあるまじき失態だよ……」"

[[dialogue]]
speaker = "モネ"
# 「でも今は、手掛かりはこの本だけ。ごめんね、ちょっと読ませて……大丈夫、怖くないからね～」
line = "「でも今は、手掛かりはこの本だけ。ごめんね、ちょっと読ませて……大丈夫、怖くないからね～」"

[[dialogue]]
speaker = "モネ"
# 「そ～っと優しく……あつ～～～っ！？」
line = "「そ～っと優しく……あつ～～～っ！？」"

[[dialogue]]
speaker = "モネ"
# 「どんどん熱くなってる。熱い本なんて初めて……ふふ、やんちゃな子」
line = "「どんどん熱くなってる。熱い本なんて初めて……ふふ、やんちゃな子」"

[[dialogue]]
speaker = "モネ"
# 「読めるものなら読んでみろって？　いいよ、なら遠慮はしないからね」
line = "「読めるものなら読んでみろって？　いいよ、なら遠慮はしないからね」"

[[dialogue]]
speaker = "モネ"
# 「あなたのこと、私に教えて」
line = "「あなたのこと、私に教えて」"

[[dialogue]]
speaker = "unk"
# 指先が焦げるのも厭わず──否、全く気付かずに、モネは<ruby=ページ>頁</ruby>をめくっていく。
line = "指先が焦げるのも厭わず──否、全く気付かずに、モネは<ruby>頁<rt>ページ</rt></ruby>をめくっていく。"

[[dialogue]]
speaker = "unk"
# 呪いの炎によって身が焼かれようと、その痛みすら彼女には心地よい。
line = "呪いの炎によって身が焼かれようと、その痛みすら彼女には心地よい。"

[[dialogue]]
speaker = "モネ"
# 「──魔族が、いた」
line = "「──魔族が、いた」"

[[dialogue]]
speaker = "モネ"
# 「その魔族は、魔界の片隅で生まれた。身分は低く、野蛮で、けれど強かった。戦いは得意だった」
line = "「その魔族は、魔界の片隅で生まれた。身分は低く、野蛮で、けれど強かった。戦いは得意だった」"

[[dialogue]]
speaker = "モネ"
# 「魔界に覇を唱えんと、戦って、戦って、戦い続けた」
line = "「魔界に覇を唱えんと、戦って、戦って、戦い続けた」"

[[dialogue]]
speaker = "モネ"
# 「やがて友も得た。愛する者にも出会えた」
line = "「やがて友も得た。愛する者にも出会えた」"

[[dialogue]]
speaker = "モネ"
# 「魔界の一角を支配し、領主として地位を築き上げた」
line = "「魔界の一角を支配し、領主として地位を築き上げた」"

[[dialogue]]
speaker = "モネ"
# 「彼には力があった。それしかなかった。己の力だけを信じて生きてきた」
line = "「彼には力があった。それしかなかった。己の力だけを信じて生きてきた」"

[[dialogue]]
speaker = "モネ"
# 「栄華は長続きしなかった」
line = "「栄華は長続きしなかった」"

[[dialogue]]
speaker = "モネ"
# 「友は離反し、愛する者には裏切られた」
line = "「友は離反し、愛する者には裏切られた」"

[[dialogue]]
speaker = "モネ"
# 「それでもよかった。彼には力があったから。欲しいものはまた手に入れればいいと思っていた」
line = "「それでもよかった。彼には力があったから。欲しいものはまた手に入れればいいと思っていた」"

[[dialogue]]
speaker = "モネ"
# 「そして、滅びの竜が現れた」
line = "「そして、滅びの竜が現れた」"

[[dialogue]]
speaker = "モネ"
# 「彼は己の力を信じて、竜に挑んだ」
line = "「彼は己の力を信じて、竜に挑んだ」"

[[dialogue]]
speaker = "モネ"
# 「力は彼の全てだった。だというのに、竜には敵わなかった」
line = "「力は彼の全てだった。だというのに、竜には敵わなかった」"

[[dialogue]]
speaker = "モネ"
# 「この竜を倒せば、失ったもの全てを取り戻せると、そう信じていたのに」
line = "「この竜を倒せば、失ったもの全てを取り戻せると、そう信じていたのに」"

[[dialogue]]
speaker = "モネ"
# 「魔炎に包まれながら、彼は思った」
line = "「魔炎に包まれながら、彼は思った」"

[[dialogue]]
speaker = "モネ"
# 「もしも、もしも──友と道を違えていなかったら、愛する者がそばにいたなら、こんなことにはならなかったかもしれない」
line = "「もしも、もしも──友と道を違えていなかったら、愛する者がそばにいたなら、こんなことにはならなかったかもしれない」"

[[dialogue]]
speaker = "モネ"
# 「でも、どうすればよかったのかなんてわからない」
line = "「でも、どうすればよかったのかなんてわからない」"

[[dialogue]]
speaker = "モネ"
# 「魔族は、後悔と<ruby=おうのう>懊悩</ruby>のうちに生涯を閉じた」
line = "「魔族は、後悔と<ruby>懊悩<rt>おうのう</rt></ruby>のうちに生涯を閉じた」"

[[dialogue]]
speaker = "モネ"
# 「大丈夫、大丈夫……もう寂しくないよ」
line = "「大丈夫、大丈夫……もう寂しくないよ」"

[[dialogue]]
speaker = "unk"
# 呪いが身を焼くのも構わず、モネは本を抱き締める。
line = "呪いが身を焼くのも構わず、モネは本を抱き締める。"

[[dialogue]]
speaker = "モネ"
# 「この本は……リクリエで滅びた魔族の一生を記したもの」
line = "「この本は……リクリエで滅びた魔族の一生を記したもの」"

[[dialogue]]
speaker = "モネ"
# 「どこかで会った気がしたのは、ウィステリアさんの魔導書と雰囲気が似ていたから」
line = "「どこかで会った気がしたのは、ウィステリアさんの魔導書と雰囲気が似ていたから」"

[[dialogue]]
speaker = "モネ"
# 「きっと、地下図書館にあった他の本も、魔族たちの無念を記した本なんだ」
line = "「きっと、地下図書館にあった他の本も、魔族たちの無念を記した本なんだ」"

[[dialogue]]
speaker = "モネ"
# 「そんな子たちがあんなにたくさん、誰にも読まれないまま……」
line = "「そんな子たちがあんなにたくさん、誰にも読まれないまま……」"

[[dialogue]]
speaker = "モネ"
# 「リクリエを何度も乗り越えているなら、何千年、何万年、いや一億年だって過ぎているかもしれない。そんな長い時間、ずっと……」
line = "「リクリエを何度も乗り越えているなら、何千年、何万年、いや一億年だって過ぎているかもしれない。そんな長い時間、ずっと……」"

[[dialogue]]
speaker = "モネ"
# 「私、行かなくちゃ。ウィステリアさんと、あの子たちが待ってる」
line = "「私、行かなくちゃ。ウィステリアさんと、あの子たちが待ってる」"

[[dialogue]]
speaker = "モネ"
# 「ううん、待ってなくても、あの子たちを放っておけないよ」
line = "「ううん、待ってなくても、あの子たちを放っておけないよ」"

[[dialogue]]
speaker = "モネ"
# 「本は私の、友達だから」
line = "「本は私の、友達だから」"

[[dialogue]]
speaker = "モネ"
# 「お願い、力を貸して。あなたがいた書庫へ行きたいの」
line = "「お願い、力を貸して。あなたがいた書庫へ行きたいの」"

[[dialogue]]
speaker = "モネ"
# 「入口が開いた……。ありがとう、私を信じてくれて」
line = "「入口が開いた……。ありがとう、私を信じてくれて」"

[[dialogue]]
speaker = "モネ"
# 「紙屋敷モネ、今行きます！」
line = "「紙屋敷モネ、今行きます！」"
