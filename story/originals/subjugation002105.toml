[[dialogue]]
speaker = "unk"
# メテオラを引きつけ、俺は校舎の中へと入る。
line = "メテオラを引きつけ、俺は校舎の中へと入る。"

[[dialogue]]
speaker = "メテオラ"
# 「ぼんぼんグレネードッ！」
line = "「ぼんぼんグレネードッ！」"

[[dialogue]]
speaker = "unk"
# 爆風を伴う遠距離武器は屋内では使いづらいのではと踏んだが、メテオラは自分が巻き込まれるのもいとわず爆撃してきた。
line = "爆風を伴う遠距離武器は屋内では使いづらいのではと踏んだが、メテオラは自分が巻き込まれるのもいとわず爆撃してきた。"

[[dialogue]]
speaker = "メテオラ"
# 「あはは、どーした、どーしたー！　逃げてばっかじゃ、あたしは参ったしてやんないぞー！」
line = "「あはは、どーした、どーしたー！　逃げてばっかじゃ、あたしは参ったしてやんないぞー！」"

[[dialogue]]
speaker = "メテオラ"
# 「さっきからちっとも攻撃してこないし、やる気あるのかー？」
line = "「さっきからちっとも攻撃してこないし、やる気あるのかー？」"

[[dialogue]]
speaker = "unk"
# できればメテオラとは戦いたくない
line = "できればメテオラとは戦いたくない"

[[dialogue]]
speaker = "メテオラ"
# 「そーなのか。でも、あたしは星騎士たちと戦いたいぞ！　悪いやつはやっつけなきゃだからな！」
line = "「そーなのか。でも、あたしは星騎士たちと戦いたいぞ！　悪いやつはやっつけなきゃだからな！」"

[[dialogue]]
speaker = "unk"
# 星騎士は悪いやつじゃない
line = "星騎士は悪いやつじゃない"

[[dialogue]]
speaker = "メテオラ"
# 「ウソだ！　星騎士は悪いやつってエンジュが言ってたぞ！　エンジュはウソなんてつかないからな！」
line = "「ウソだ！　星騎士は悪いやつってエンジュが言ってたぞ！　エンジュはウソなんてつかないからな！」"

[[dialogue]]
speaker = "メテオラ"
# 「コラプサーの方が悪いやつ……？　デタラメをゆーな！　コラプサーはいいやつだ！　エンジュだって、あたしと仲良くしてくれるぞ！」
line = "「コラプサーの方が悪いやつ……？　デタラメをゆーな！　コラプサーはいいやつだ！　エンジュだって、あたしと仲良くしてくれるぞ！」"

[[dialogue]]
speaker = "unk"
# 素直なメテオラを騙してるんだ！
line = "素直なメテオラを騙してるんだ！"

[[dialogue]]
speaker = "メテオラ"
# 「違う、違う、違う！　だって、あたしは楽しく遊んでるだけなのに、みんなみんな壊れちゃうんだぞ！」
line = "「違う、違う、違う！　だって、あたしは楽しく遊んでるだけなのに、みんなみんな壊れちゃうんだぞ！」"

[[dialogue]]
speaker = "メテオラ"
# 「あたしが軽く握っただけで折れちゃうし、ちょっと押しただけで吹っ飛んじゃうし、割れちゃうんだ！」
line = "「あたしが軽く握っただけで折れちゃうし、ちょっと押しただけで吹っ飛んじゃうし、割れちゃうんだ！」"

[[dialogue]]
speaker = "メテオラ"
# 「でも、コラプサーのみんなはぶっ壊すことしかできないあたしを助けてくれた！　受け入れてくれた！」
line = "「でも、コラプサーのみんなはぶっ壊すことしかできないあたしを助けてくれた！　受け入れてくれた！」"

[[dialogue]]
speaker = "メテオラ"
# 「あんなにいいやつが！　悪いやつなわけ！　あるもんかーっ！！」
line = "「あんなにいいやつが！　悪いやつなわけ！　あるもんかーっ！！」"

[[dialogue]]
speaker = "unk"
# メテオラの周囲に、大量のミサイルが現れる。
line = "メテオラの周囲に、大量のミサイルが現れる。"

[[dialogue]]
speaker = "unk"
# 全てを星術で撃ち落とそうにも、ミサイルの数は多く、さらにはコラプサーの能力が俺の星術を阻害する。
line = "全てを星術で撃ち落とそうにも、ミサイルの数は多く、さらにはコラプサーの能力が俺の星術を阻害する。"

[[dialogue]]
speaker = "unk"
# これは──！？
line = "これは──！？"

[[dialogue]]
speaker = "？？？"
# 「ピースフルピンクッ！」
line = "「ピースフルピンクッ！」"

[[dialogue]]
speaker = "リーリア"
# 「お助けマジカル☆　センパイの大ピンチに、カワイイ後輩が参上です☆」
line = "「お助けマジカル☆　センパイの大ピンチに、カワイイ後輩が参上です☆」"

[[dialogue]]
speaker = "リーリア"
# 「もうセンパイってば女の子に優しいのもほどほどにしてくださいね。後輩として妬いちゃいますよ」
line = "「もうセンパイってば女の子に優しいのもほどほどにしてくださいね。後輩として妬いちゃいますよ」"

[[dialogue]]
speaker = "unk"
# ありがとう、リーリア
line = "ありがとう、リーリア"

[[dialogue]]
speaker = "リーリア"
# 「どういたしまして。ここは私に任せてくださいっ」
line = "「どういたしまして。ここは私に任せてくださいっ」"

[[dialogue]]
speaker = "メテオラ"
# 「んー？　おまえがあたしの相手をするのか？　魔王より弱っちそうだぞ」
line = "「んー？　おまえがあたしの相手をするのか？　魔王より弱っちそうだぞ」"

[[dialogue]]
speaker = "リーリア"
# 「そうですね。センパイには敵いませんけど、戦いと恋愛には相性ってものがあるんですよ」
line = "「そうですね。センパイには敵いませんけど、戦いと恋愛には相性ってものがあるんですよ」"

[[dialogue]]
speaker = "メテオラ"
# 「なんだ？　そんなへなちょこ玉、避けるまでもないぞっ！　あたしたちに星騎士の攻撃は効かないんだからな！」
line = "「なんだ？　そんなへなちょこ玉、避けるまでもないぞっ！　あたしたちに星騎士の攻撃は効かないんだからな！」"

[[dialogue]]
speaker = "リーリア"
# 「ふふん、それはどうでしょう？　私の魔弾はどこまでも届いて、あなたの胸を撃ち抜きますよ」
line = "「ふふん、それはどうでしょう？　私の魔弾はどこまでも届いて、あなたの胸を撃ち抜きますよ」"

[[dialogue]]
speaker = "メテオラ"
# 「んぅぐっ！？　この攻撃、消えないぞっ！？」
line = "「んぅぐっ！？　この攻撃、消えないぞっ！？」"

[[dialogue]]
speaker = "リーリア"
# 「マジカルヒット☆　続けていっちゃうよ～☆　<ruby=バァン>ＢＡＮＧ</ruby>、<ruby=バァン>ＢＡＮＧ</ruby>☆」
line = "「マジカルヒット☆　続けていっちゃうよ～☆　<ruby>ＢＡＮＧ<rt>バァン</rt></ruby>、<ruby>ＢＡＮＧ<rt>バァン</rt></ruby>☆」"

[[dialogue]]
speaker = "メテオラ"
# 「ぐっ！？　んぅ、痛ぁ！？　な、なんでだぞ！？」
line = "「ぐっ！？　んぅ、痛ぁ！？　な、なんでだぞ！？」"

[[dialogue]]
speaker = "リーリア"
# 「コラプサーが吸収できるのは星力だけですからね。魔女の攻撃の源である魔力は、ブラックホールにも吸い込まれません」
line = "「コラプサーが吸収できるのは星力だけですからね。魔女の攻撃の源である魔力は、ブラックホールにも吸い込まれません」"

[[dialogue]]
speaker = "メテオラ"
# 「まりょく～？　それ何なんだ！？　わけわかんないぞ！？」
line = "「まりょく～？　それ何なんだ！？　わけわかんないぞ！？」"

[[dialogue]]
speaker = "リーリア"
# 「センパイ、２人がかりでちょっぴりズルですけど、このままやっつけちゃいましょう。たっぷりと話を聞き出すのは捕縛した後で──」
line = "「センパイ、２人がかりでちょっぴりズルですけど、このままやっつけちゃいましょう。たっぷりと話を聞き出すのは捕縛した後で──」"

[[dialogue]]
speaker = "メテオラ"
# 「うわ～ん！　エンジュ～っ！！」
line = "「うわ～ん！　エンジュ～っ！！」"

[[dialogue]]
speaker = "エンジュ"
# 「やけに騒がしいと思えば……やはり、あたしたちに立ちはだかるのはお前か、魔王っ……！」
line = "「やけに騒がしいと思えば……やはり、あたしたちに立ちはだかるのはお前か、魔王っ……！」"

[[dialogue]]
speaker = "リーリア"
# 「──！　２人目のコラプサー！」
line = "「──！　２人目のコラプサー！」"

[[dialogue]]
speaker = "メテオラ"
# 「エンジュー！　こいつら２対１でズルいんだぞ！　やっぱり悪いやつだー！」
line = "「エンジュー！　こいつら２対１でズルいんだぞ！　やっぱり悪いやつだー！」"

[[dialogue]]
speaker = "エンジュ"
# 「メテオラ、お前の体ならあんな豆鉄砲、何発喰らったところで大したダメージにもならないだろ」
line = "「メテオラ、お前の体ならあんな豆鉄砲、何発喰らったところで大したダメージにもならないだろ」"

[[dialogue]]
speaker = "メテオラ"
# 「……うん？　ホントだ！　ちょっと痛かったけど、大したことないぞ。消せなくても問題ないな！」
line = "「……うん？　ホントだ！　ちょっと痛かったけど、大したことないぞ。消せなくても問題ないな！」"

[[dialogue]]
speaker = "リーリア"
# 「え～っ、けっこう本気で魔力込めてるんですけど～！？　ナチュラルに頑丈すぎじゃないですか！？」
line = "「え～っ、けっこう本気で魔力込めてるんですけど～！？　ナチュラルに頑丈すぎじゃないですか！？」"

[[dialogue]]
speaker = "メテオラ"
# 「エンジュ、ターゲットは見つかったのかー？」
line = "「エンジュ、ターゲットは見つかったのかー？」"

[[dialogue]]
speaker = "エンジュ"
# 「ああ、居場所の目星はついた。問題ない」
line = "「ああ、居場所の目星はついた。問題ない」"

[[dialogue]]
speaker = "unk"
# 狙いは新星学園の破壊じゃないのか？
line = "狙いは新星学園の破壊じゃないのか？"

[[dialogue]]
speaker = "unk"
# ターゲット？
line = "ターゲット？"

[[dialogue]]
speaker = "エンジュ"
# 「何を言っている。お門違いもいいところだ」
line = "「何を言っている。お門違いもいいところだ」"

[[dialogue]]
speaker = "エンジュ"
# 「だが、余計なお喋りをするつもりも、情報を与えるつもりもない。これで２対２だ。お互い、相手にとって不足はないだろ？」
line = "「だが、余計なお喋りをするつもりも、情報を与えるつもりもない。これで２対２だ。お互い、相手にとって不足はないだろ？」"

[[dialogue]]
speaker = "エンジュ"
# 「情報を引き出したいなら、あたしらをとっ捕まえて拷問にでもかけるんだな！」
line = "「情報を引き出したいなら、あたしらをとっ捕まえて拷問にでもかけるんだな！」"

[[dialogue]]
speaker = "リーリア"
# 「センパイ、私と共同作業する準備はＯＫですか？」
line = "「センパイ、私と共同作業する準備はＯＫですか？」"

[[dialogue]]
speaker = "unk"
# 俺とリーリアの相性を２人に見せつけてやろう
line = "俺とリーリアの相性を２人に見せつけてやろう"

[[dialogue]]
speaker = "リーリア"
# 「もう、センパイってば私を乗せるの上手ですね。そんな風に言われちゃったら、頑張らないわけにはいきません！」
line = "「もう、センパイってば私を乗せるの上手ですね。そんな風に言われちゃったら、頑張らないわけにはいきません！」"

[[dialogue]]
speaker = "エンジュ"
# 「行くぞ、メテオラっ！」
line = "「行くぞ、メテオラっ！」"

[[dialogue]]
speaker = "メテオラ"
# 「ぶっぱなすぞ、エンジュっ！」
line = "「ぶっぱなすぞ、エンジュっ！」"

[[dialogue]]
speaker = "リーリア"
# 「来ますよ、センパイっ！」
line = "「来ますよ、センパイっ！」"
