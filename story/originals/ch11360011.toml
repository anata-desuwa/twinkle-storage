[[dialogue]]
speaker = "unk"
# 第１話,バレンタインモンスター誕生秘話,P
line = "第１話,バレンタインモンスター誕生秘話,P"

[[dialogue]]
speaker = "unk"
# ウルスラが起こしたバレンタインの騒動が落ち着いて数日後──
line = "ウルスラが起こしたバレンタインの騒動が落ち着いて数日後──"

[[dialogue]]
speaker = "シャロン"
# 「今年は大変なバレンタインでしたね」
line = "「今年は大変なバレンタインでしたね」"

[[dialogue]]
speaker = "イレーナ"
# 「はぁ……バレンタインはしばらく懲り懲り～って感じ。ま、ウルスラも次のバレンタインまではおとなしくしてるでしょ。今頃どこにいるのかも知らないけど──」
line = "「はぁ……バレンタインはしばらく懲り懲り～って感じ。ま、ウルスラも次のバレンタインまではおとなしくしてるでしょ。今頃どこにいるのかも知らないけど──」"

[[dialogue]]
speaker = "ウルスラ"
# 「あら、もしかして私の話をされていました？」
line = "「あら、もしかして私の話をされていました？」"

[[dialogue]]
speaker = "シャロン"
# 「ウルスラさま！？」
line = "「ウルスラさま！？」"

[[dialogue]]
speaker = "unk"
# 噂をすればなんとやら！
line = "噂をすればなんとやら！"

[[dialogue]]
speaker = "ウルスラ"
# 「こんにちは、たまたま通りすがったら見知った皆さんがいらしたので、ご挨拶を──と思ったのですけど……」
line = "「こんにちは、たまたま通りすがったら見知った皆さんがいらしたので、ご挨拶を──と思ったのですけど……」"

[[dialogue]]
speaker = "ウルスラ"
# 「イレーナさん、そんなに身構えないでください」
line = "「イレーナさん、そんなに身構えないでください」"

[[dialogue]]
speaker = "イレーナ"
# 「身構えもするわよ。よくもまぁ、のうのうと顔を出せたものね」
line = "「身構えもするわよ。よくもまぁ、のうのうと顔を出せたものね」"

[[dialogue]]
speaker = "ウルスラ"
# 「ええ、まあ、イレーナさんたちと敵対しているわけではありませんし……していませんよね？」
line = "「ええ、まあ、イレーナさんたちと敵対しているわけではありませんし……していませんよね？」"

[[dialogue]]
speaker = "イレーナ"
# 「敵か味方かで言ったらギリギリ敵のラインよ」
line = "「敵か味方かで言ったらギリギリ敵のラインよ」"

[[dialogue]]
speaker = "シャロン"
# 「まあまあ、イレーナさま。ウルスラさまも悪気があったわけではないでしょうし」
line = "「まあまあ、イレーナさま。ウルスラさまも悪気があったわけではないでしょうし」"

[[dialogue]]
speaker = "イレーナ"
# 「あんなの悪意でやった方がまだ救いようがあるわよ」
line = "「あんなの悪意でやった方がまだ救いようがあるわよ」"

[[dialogue]]
speaker = "シャロン"
# 「まあまあまあ、イレーナさま。ウルスラさまにもきっと深～い事情がおありなんですよ」
line = "「まあまあまあ、イレーナさま。ウルスラさまにもきっと深～い事情がおありなんですよ」"

[[dialogue]]
speaker = "イレーナ"
# 「随分とウルスラの肩を持つじゃない。……ま、相手の事情も知らずに頭ごなしに否定するのもよくないわね。一応神官だし、懺悔する気があるなら聞いてあげる」
line = "「随分とウルスラの肩を持つじゃない。……ま、相手の事情も知らずに頭ごなしに否定するのもよくないわね。一応神官だし、懺悔する気があるなら聞いてあげる」"

[[dialogue]]
speaker = "イレーナ"
# 「あんたがそこまでバレンタインに固執する理由、話してくれない？　納得できたら、警戒を解く……かもしれないわ」
line = "「あんたがそこまでバレンタインに固執する理由、話してくれない？　納得できたら、警戒を解く……かもしれないわ」"

[[dialogue]]
speaker = "ウルスラ"
# 「本当ですか？　しかしそんなに深い話でも、面白い話でもないので恐縮なのですけど」
line = "「本当ですか？　しかしそんなに深い話でも、面白い話でもないので恐縮なのですけど」"

[[dialogue]]
speaker = "unk"
# バレンタインに惚れこんだのはいつから？
line = "バレンタインに惚れこんだのはいつから？"

[[dialogue]]
speaker = "ウルスラ"
# 「天界にいた頃から人間界にバレンタインというイベントがあると噂では聞いていましたが、本格的に知ったのは流星市国に来てからです」
line = "「天界にいた頃から人間界にバレンタインというイベントがあると噂では聞いていましたが、本格的に知ったのは流星市国に来てからです」"

[[dialogue]]
speaker = "シャロン"
# 「人間界にいらっしゃったのは、星騎士になるため……ですか？」
line = "「人間界にいらっしゃったのは、星騎士になるため……ですか？」"

[[dialogue]]
speaker = "ウルスラ"
# 「はい、人間界に足を踏み入れて初めて、最前線のモンスターやアステラを目の当たりにしまして、恐るべき脅威を肌で感じたんです」
line = "「はい、人間界に足を踏み入れて初めて、最前線のモンスターやアステラを目の当たりにしまして、恐るべき脅威を肌で感じたんです」"

[[dialogue]]
speaker = "ウルスラ"
# 「人命や社会というのは、大いなる力の気まぐれで簡単に壊され、風が吹けば飛んでしまうような、とても儚いものだと……」
line = "「人命や社会というのは、大いなる力の気まぐれで簡単に壊され、風が吹けば飛んでしまうような、とても儚いものだと……」"

[[dialogue]]
speaker = "シャロン"
# 「それは……確かにそうですね」
line = "「それは……確かにそうですね」"

[[dialogue]]
speaker = "イレーナ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ウルスラ"
# 「立っている地面が脆く崩れてしまうような不安に、軽い絶望を覚えていた矢先──私は１年に一度の大イベントに遭遇したのです！」
line = "「立っている地面が脆く崩れてしまうような不安に、軽い絶望を覚えていた矢先──私は１年に一度の大イベントに遭遇したのです！」"

[[dialogue]]
speaker = "ウルスラ"
# 「甘いお菓子に想いを乗せて、意中の相手に秘めた想いを告げる一大イベント──バレンタインデー！」
line = "「甘いお菓子に想いを乗せて、意中の相手に秘めた想いを告げる一大イベント──バレンタインデー！」"

[[dialogue]]
speaker = "ウルスラ"
# 「まさか国を挙げてのイベントだとは思っていなくて！　その熱狂ぶりにすっかり魅せられてしまったんです！」
line = "「まさか国を挙げてのイベントだとは思っていなくて！　その熱狂ぶりにすっかり魅せられてしまったんです！」"

[[dialogue]]
speaker = "イレーナ"
# 「別に国は挙げちゃいなくない？」
line = "「別に国は挙げちゃいなくない？」"

[[dialogue]]
speaker = "シャロン"
# 「２月に入ると町中やメディアもバレンタインムードになりますし、そう思われるのも無理ないと思いますよ」
line = "「２月に入ると町中やメディアもバレンタインムードになりますし、そう思われるのも無理ないと思いますよ」"

[[dialogue]]
speaker = "ウルスラ"
# 「『愛は素晴らしい。だけど熱中しすぎれば周囲を傷つけ、大切なものを失ってしまう』……それが両親の教えでした」
line = "「『愛は素晴らしい。だけど熱中しすぎれば周囲を傷つけ、大切なものを失ってしまう』……それが両親の教えでした」"

[[dialogue]]
speaker = "ウルスラ"
# 「ですが！　恋愛は小さな胸に秘めて育むものと考えていた私にとって──それは天啓でした！」
line = "「ですが！　恋愛は小さな胸に秘めて育むものと考えていた私にとって──それは天啓でした！」"

[[dialogue]]
speaker = "ウルスラ"
# 「皆が恋に積極的になるバレンタインデーは、雷に打たれたかのようなカルチャーショックだったのですよ！」
line = "「皆が恋に積極的になるバレンタインデーは、雷に打たれたかのようなカルチャーショックだったのですよ！」"

[[dialogue]]
speaker = "unk"
# そんなに
line = "そんなに"

[[dialogue]]
speaker = "ウルスラ"
# 「そんなにです！　明日訪れるかもしれない世界の崩壊を恐れるよりも、乙女は熱い恋に胸を焦がす……！」
line = "「そんなにです！　明日訪れるかもしれない世界の崩壊を恐れるよりも、乙女は熱い恋に胸を焦がす……！」"

[[dialogue]]
speaker = "ウルスラ"
# 「チョコレートに想いを託す乙女の勇気に感銘を受け、私の中で劇的な変化が起きました」
line = "「チョコレートに想いを託す乙女の勇気に感銘を受け、私の中で劇的な変化が起きました」"

[[dialogue]]
speaker = "ウルスラ"
# 「『人生は短い』『恋は必ずしも美しく実るものではない』──ならばどうすればいいでしょう？」
line = "「『人生は短い』『恋は必ずしも美しく実るものではない』──ならばどうすればいいでしょう？」"

[[dialogue]]
speaker = "シャロン"
# 「ど、どうすればいいんでしょう……？」
line = "「ど、どうすればいいんでしょう……？」"

[[dialogue]]
speaker = "ウルスラ"
# 「よくぞ聞いてくださいました！　私の行きついた答えは──」
line = "「よくぞ聞いてくださいました！　私の行きついた答えは──」"

[[dialogue]]
speaker = "ウルスラ"
# 「行動あるのみ！　前進あるのみ！　告白あるのみ！　です！！」
line = "「行動あるのみ！　前進あるのみ！　告白あるのみ！　です！！」"

[[dialogue]]
speaker = "シャロン"
# 「パワフルですっ！　とても良いと思いますっ！」
line = "「パワフルですっ！　とても良いと思いますっ！」"

[[dialogue]]
speaker = "イレーナ"
# 「ああ……そこ、シャロンは同調しちゃうとこよね……」
line = "「ああ……そこ、シャロンは同調しちゃうとこよね……」"

[[dialogue]]
speaker = "ウルスラ"
# 「『命短し恋せよ乙女』！　勇気を持って、一途に邁進することこそが、乙女の為すべき恋愛！」
line = "「『命短し恋せよ乙女』！　勇気を持って、一途に邁進することこそが、乙女の為すべき恋愛！」"

[[dialogue]]
speaker = "ウルスラ"
# 「恋を全うするのに、命はあまりにも儚く短い。故に性急さと大胆さが必要なのです」
line = "「恋を全うするのに、命はあまりにも儚く短い。故に性急さと大胆さが必要なのです」"

[[dialogue]]
speaker = "ウルスラ"
# 「一度目がつまづいても二度目があります、二度目で転んでも次の恋があります！　七転び八起き！　恋の可能性とは出会った人の数だけあるのですから！　ふんす！」
line = "「一度目がつまづいても二度目があります、二度目で転んでも次の恋があります！　七転び八起き！　恋の可能性とは出会った人の数だけあるのですから！　ふんす！」"

[[dialogue]]
speaker = "ウルスラ"
# 「そうして、青春を恋で燃やす乙女たちの背中を押したいと願うようになった結果──」
line = "「そうして、青春を恋で燃やす乙女たちの背中を押したいと願うようになった結果──」"

[[dialogue]]
speaker = "イレーナ"
# 「自分の姓そのものに『バレンタイン』を冠する怪人が誕生しちゃった……ってわけね」
line = "「自分の姓そのものに『バレンタイン』を冠する怪人が誕生しちゃった……ってわけね」"

[[dialogue]]
speaker = "ウルスラ"
# 「しかも私の星力は、地球から守護星が見えるバレンタイン付近が最も強くなります」
line = "「しかも私の星力は、地球から守護星が見えるバレンタイン付近が最も強くなります」"

[[dialogue]]
speaker = "ウルスラ"
# 「つまり私、バレンタインだけは無敵なのです<emoji=heart04>　私とバレンタインは相思相愛……<emoji=heart04>」
line = "「つまり私、バレンタインだけは無敵なのです<emoji=heart04>　私とバレンタインは相思相愛……<emoji=heart04>」"

[[dialogue]]
speaker = "ウルスラ"
# 「シーズンオフは戦力として心許ないかもしれませんが、恋愛相談でしたら、いつでも気軽に声をかけてください」
line = "「シーズンオフは戦力として心許ないかもしれませんが、恋愛相談でしたら、いつでも気軽に声をかけてください」"

[[dialogue]]
speaker = "unk"
# 守護星の影響を受ける星騎士は、季節によって星力量が多少上下することがある。
line = "守護星の影響を受ける星騎士は、季節によって星力量が多少上下することがある。"

[[dialogue]]
speaker = "unk"
# だがウルスラほど極端な例は聞いたことがない。
line = "だがウルスラほど極端な例は聞いたことがない。"

[[dialogue]]
speaker = "シャロン"
# 「ウルスラさま、やっぱり悪い人ではありませんねっ」
line = "「ウルスラさま、やっぱり悪い人ではありませんねっ」"

[[dialogue]]
speaker = "イレーナ"
# 「シャロンとは息が合いそうね……。ま、バレンタインを過ぎたら悪さはできなくなるみたいだし、当分は大丈夫……なのかしら？」
line = "「シャロンとは息が合いそうね……。ま、バレンタインを過ぎたら悪さはできなくなるみたいだし、当分は大丈夫……なのかしら？」"

[[dialogue]]
speaker = "ウルスラ"
# 「購買部にいる時もありますので、いつでもいらしてくださいね。では<emoji=heart04>」
line = "「購買部にいる時もありますので、いつでもいらしてくださいね。では<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ウルスラは小さく会釈し、大聖堂を去っていった。
line = "ウルスラは小さく会釈し、大聖堂を去っていった。"

[[dialogue]]
speaker = "unk"
# それからウルスラは、ちょくちょく大聖堂に顔を覗かせては、シャロンと（時々イレーナと）談話に花を咲かせるようになったのである。
line = "それからウルスラは、ちょくちょく大聖堂に顔を覗かせては、シャロンと（時々イレーナと）談話に花を咲かせるようになったのである。"
