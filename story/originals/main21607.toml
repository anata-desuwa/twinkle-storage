[[dialogue]]
speaker = "unk"
# 第７話,招かれざる来訪者,B
line = "第７話,招かれざる来訪者,B"

[[dialogue]]
speaker = "クロト"
# 「カオス──テンペスト！！！」
line = "「カオス──テンペスト！！！」"

[[dialogue]]
speaker = "unk"
# 大群のホロウ・ルヴィネたちを、天界・魔界の増援たちに捌いてもらい、俺は『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』への攻撃に集中する。
line = "大群のホロウ・ルヴィネたちを、天界・魔界の増援たちに捌いてもらい、俺は『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』への攻撃に集中する。"

[[dialogue]]
speaker = "ＸＥＬＯＳ"
# 「────ッ！！」
line = "「────ッ！！」"

[[dialogue]]
speaker = "unk"
# 真の姿を現した『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』の攻撃は、先ほどの比ではない。直撃すれば絶命は免れないことには変わりないが──
line = "真の姿を現した『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』の攻撃は、先ほどの比ではない。直撃すれば絶命は免れないことには変わりないが──"

[[dialogue]]
speaker = "メルエル（覚醒）"
# 「立朽さん！　援護をお願い！！」
line = "「立朽さん！　援護をお願い！！」"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「お任せ！　爆弾ちゃんバズーカ、ゴー♪」
line = "「お任せ！　爆弾ちゃんバズーカ、ゴー♪」"

[[dialogue]]
speaker = "unk"
# 俺たちの心は決して折れない──！！
line = "俺たちの心は決して折れない──！！"

[[dialogue]]
speaker = "ＸＥＬＯＳ"
# 「────────ッ！！！！」
line = "「────────ッ！！！！」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# （……お父様。今しばらくお待ちください。もうすぐ、最後の手駒が到着いたします……！）
line = "（……お父様。今しばらくお待ちください。もうすぐ、最後の手駒が到着いたします……！）"

[[dialogue]]
speaker = "unk"
# 一方その頃、アルタイルでは──
line = "一方その頃、アルタイルでは──"

[[dialogue]]
speaker = "チナ"
# 「に、逃げなきゃっ……こっちだ、みんな……！！」
line = "「に、逃げなきゃっ……こっちだ、みんな……！！」"

[[dialogue]]
speaker = "unk"
# ホロウ・ルヴィネによる市街地への攻撃は苛烈を極め、同一存在がデネブに移動したことにより、アルタイルのチナたちは同時に目覚めていた。
line = "ホロウ・ルヴィネによる市街地への攻撃は苛烈を極め、同一存在がデネブに移動したことにより、アルタイルのチナたちは同時に目覚めていた。"

[[dialogue]]
speaker = "unk"
# 襲撃された病院から抜け出し、全員で避難をしていたのだ。
line = "襲撃された病院から抜け出し、全員で避難をしていたのだ。"

[[dialogue]]
speaker = "グレイス"
# 「え、エステルちゃんでしたかっ？　大丈夫です、怖くないですよ……！」
line = "「え、エステルちゃんでしたかっ？　大丈夫です、怖くないですよ……！」"

[[dialogue]]
speaker = "エステル"
# 「は、はいっ……あ、あれ？　あの髪の長い子は……！？」
line = "「は、はいっ……あ、あれ？　あの髪の長い子は……！？」"

[[dialogue]]
speaker = "レティシア"
# 「ぁ──ぅ────」
line = "「ぁ──ぅ────」"

[[dialogue]]
speaker = "チナ"
# 「転んでたのかっ──アタシが行く！　２人とも先に逃げろ！！」
line = "「転んでたのかっ──アタシが行く！　２人とも先に逃げろ！！」"

[[dialogue]]
speaker = "unk"
# 直前まで面識がなかった４人は、同じ病室で同時に目覚めてから共に行動をしていた。
line = "直前まで面識がなかった４人は、同じ病室で同時に目覚めてから共に行動をしていた。"

[[dialogue]]
speaker = "unk"
# モンスターを従えて暴れる謎の天使から逃げ回る短い間に、幼い彼女たちには絆が芽生え始めていた。
line = "モンスターを従えて暴れる謎の天使から逃げ回る短い間に、幼い彼女たちには絆が芽生え始めていた。"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「……そのヘイロー。レティシアね。そう。こちらのあなたは、まだ星力に目覚めていないようね」
line = "「……そのヘイロー。レティシアね。そう。こちらのあなたは、まだ星力に目覚めていないようね」"

[[dialogue]]
speaker = "レティシア"
# 「あ、ぁ……！？」
line = "「あ、ぁ……！？」"

[[dialogue]]
speaker = "チナ"
# 「レティシア！　行くぞ、立てるか！？」
line = "「レティシア！　行くぞ、立てるか！？」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「魂を回収してあげましょう。大丈夫、じっとしていれば一瞬で終わるから」
line = "「魂を回収してあげましょう。大丈夫、じっとしていれば一瞬で終わるから」"

[[dialogue]]
speaker = "？？？"
# 「──トルネードランスッ！！」
line = "「──トルネードランスッ！！」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
# 「ッ──！？　お前は……なんだ、<b>あがり</b>も間近。脅威ですらない、出涸らしの星騎士ね」
line = "「ッ──！？　お前は……なんだ、<b>あがり</b>も間近。脅威ですらない、出涸らしの星騎士ね」"

[[dialogue]]
speaker = "チナの父"
# 「チナ！　友達を連れて、逃げるんだ！」
line = "「チナ！　友達を連れて、逃げるんだ！」"

[[dialogue]]
speaker = "チナ"
# 「おとうさん！？　で、でも──！」
line = "「おとうさん！？　で、でも──！」"

[[dialogue]]
speaker = "チナの父"
# 「守りながら戦える相手じゃない──早く行きなさい！！」
line = "「守りながら戦える相手じゃない──早く行きなさい！！」"

[[dialogue]]
speaker = "チナの父"
# （負けるわけにはいかない……チナを何としても守らなくては──！！）
line = "（負けるわけにはいかない……チナを何としても守らなくては──！！）"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# （不思議ね、この男。戦闘経験の豊富な星騎士に見える……私に勝てないことくらい承知しているはずなのに……）
line = "（不思議ね、この男。戦闘経験の豊富な星騎士に見える……私に勝てないことくらい承知しているはずなのに……）"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# （愛しい娘を守るために、捨て身で我が子を守ろうとしている……？）
line = "（愛しい娘を守るために、捨て身で我が子を守ろうとしている……？）"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
# （なるほど────<b>使えそうね</b>）
line = "（なるほど────<b>使えそうね</b>）"

[[dialogue]]
speaker = "チナの父"
# 「──カラミティ・バスターッ！！」
line = "「──カラミティ・バスターッ！！」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「……弱すぎる。無駄な抵抗、ご苦労様」
line = "「……弱すぎる。無駄な抵抗、ご苦労様」"

[[dialogue]]
speaker = "チナの父"
# 「無敵か……こいつは──！？」
line = "「無敵か……こいつは──！？」"

[[dialogue]]
speaker = "チナの父"
# 「──ぐぁあぁああッ！？」
line = "「──ぐぁあぁああッ！？」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「戦闘服の維持もできなくなったようね。それでも、まだ我が子を庇うために立ち上がるだなんて……ふふ」
line = "「戦闘服の維持もできなくなったようね。それでも、まだ我が子を庇うために立ち上がるだなんて……ふふ」"

[[dialogue]]
speaker = "チナ"
# 「お、おとうさんっ！」
line = "「お、おとうさんっ！」"

[[dialogue]]
speaker = "チナの父"
# 「まだ、いたのか……！？　早く離れなさい！！」
line = "「まだ、いたのか……！？　早く離れなさい！！」"

[[dialogue]]
speaker = "チナ"
# 「いやだ！　おとうさんが死んじゃう……！　いやだっ！！」
line = "「いやだ！　おとうさんが死んじゃう……！　いやだっ！！」"

[[dialogue]]
speaker = "アポロ"
# 「どっりゃああぁああっ──！」
line = "「どっりゃああぁああっ──！」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
# 「チッ──学園に釘付けにしていたはずなのに。向こうの私は何をしているの！？」
line = "「チッ──学園に釘付けにしていたはずなのに。向こうの私は何をしているの！？」"

[[dialogue]]
speaker = "アポロ"
# 「とっくに片付けてやったよ！　今のあたしを止めたきゃ、あの倍は連れてこい！！」
line = "「とっくに片付けてやったよ！　今のあたしを止めたきゃ、あの倍は連れてこい！！」"

[[dialogue]]
speaker = "キリカ"
# 「香堂様、よくぞ耐えてくれました。ここは私共にお任せください」
line = "「香堂様、よくぞ耐えてくれました。ここは私共にお任せください」"

[[dialogue]]
speaker = "トリュファイナ"
# 「アポロ様の持久力は、私が補います！　癒しの力を！」
line = "「アポロ様の持久力は、私が補います！　癒しの力を！」"

[[dialogue]]
speaker = "アポロ"
# 「恩に着るぞ、トリュファイナ！　いっくぜー！」
line = "「恩に着るぞ、トリュファイナ！　いっくぜー！」"

[[dialogue]]
speaker = "unk"
# 頼もしい増援はアポロたちだけではない。チナが顔を上げると、新星学園の星騎士たち──
line = "頼もしい増援はアポロたちだけではない。チナが顔を上げると、新星学園の星騎士たち──"

[[dialogue]]
speaker = "unk"
# そして流星学園の星騎士たち。
line = "そして流星学園の星騎士たち。"

[[dialogue]]
speaker = "unk"
# その中には、フィオナが平行世界を渡る前に、黄金の魔導書を用いて覚醒させていた、神霊猫ニャメニア・ワールフリオンの姿もあった。
line = "その中には、フィオナが平行世界を渡る前に、黄金の魔導書を用いて覚醒させていた、神霊猫ニャメニア・ワールフリオンの姿もあった。"

[[dialogue]]
speaker = "チナ"
# 「わぁああ……！」
line = "「わぁああ……！」"

[[dialogue]]
speaker = "unk"
# そして幼いチナの視線は、父親の危機を救ってくれた星騎士に釘付けになる。
line = "そして幼いチナの視線は、父親の危機を救ってくれた星騎士に釘付けになる。"

[[dialogue]]
speaker = "チナ"
# 「……あのお姉さんは？」
line = "「……あのお姉さんは？」"

[[dialogue]]
speaker = "キリカ"
# 「あの御方は……そうですね。正義のヒーロー──流星ライダー、アポロ様です」
line = "「あの御方は……そうですね。正義のヒーロー──流星ライダー、アポロ様です」"

[[dialogue]]
speaker = "チナ"
# 「流星ライダー……ヒーロー！？」
line = "「流星ライダー……ヒーロー！？」"

[[dialogue]]
speaker = "アポロ"
# 「行くぞ複製体っ──手加減なしだ！　パーフェクト・ワールドッ！！」
line = "「行くぞ複製体っ──手加減なしだ！　パーフェクト・ワールドッ！！」"

[[dialogue]]
speaker = "unk"
# アルタイルでも、多くの星騎士たちが刻を稼ぎ続けていた──
line = "アルタイルでも、多くの星騎士たちが刻を稼ぎ続けていた──"

[[dialogue]]
speaker = "unk"
# 一方、デネブ──
line = "一方、デネブ──"

[[dialogue]]
speaker = "クロト"
# （善戦しているのは間違いない……けれどっ！）
line = "（善戦しているのは間違いない……けれどっ！）"

[[dialogue]]
speaker = "神族の星騎士"
# 「きゃああぁぁあっ！？」
line = "「きゃああぁぁあっ！？」"

[[dialogue]]
speaker = "unk"
# 拮抗していたのは、つい先ほどまで。とうとう押し返され始めた……！
line = "拮抗していたのは、つい先ほどまで。とうとう押し返され始めた……！"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
# 「お父様は一度対応された攻撃は決して繰り返さない。その粘り、いつまでも持つかしら？」
line = "「お父様は一度対応された攻撃は決して繰り返さない。その粘り、いつまでも持つかしら？」"

[[dialogue]]
speaker = "梨緒"
# 「くそ……『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』の底は、限界はどこにある！？　このままでは……！！」
line = "「くそ……『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』の底は、限界はどこにある！？　このままでは……！！」"

[[dialogue]]
speaker = "ジグ"
# 「無敵、無限、無尽蔵……そんなものを認めたくはないが──くっ！？」
line = "「無敵、無限、無尽蔵……そんなものを認めたくはないが──くっ！？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「魔王。どこかで勝負に出る必要があるわ……時が経てば経つほど、こちらは不利になっていく……！」
line = "「魔王。どこかで勝負に出る必要があるわ……時が経てば経つほど、こちらは不利になっていく……！」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「応援に来てくれたみんなが、ホロウを抑えてくれてるけど……！！」
line = "「応援に来てくれたみんなが、ホロウを抑えてくれてるけど……！！」"

[[dialogue]]
speaker = "クロト"
# 「ああ、わかってる……どうにかして隙を──」
line = "「ああ、わかってる……どうにかして隙を──」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「──ふふふふふっ」
line = "「──ふふふふふっ」"

[[dialogue]]
speaker = "クロト"
# 「……！？」
line = "「……！？」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「──待ち侘びたわ、この時を。ようやく解放させることができた……」
line = "「──待ち侘びたわ、この時を。ようやく解放させることができた……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「──まさか！？」
line = "「──まさか！？」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
# 「お帰りなさい──厄災の右腕」
line = "「お帰りなさい──厄災の右腕」"

[[dialogue]]
speaker = "煌嶺"
# 「……やはり戻ってきたか、厄災！　妾のものにできぬならば、滅しきるまでよ！！」
line = "「……やはり戻ってきたか、厄災！　妾のものにできぬならば、滅しきるまでよ！！」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「やってみるといいわ……可能ならばね？」
line = "「やってみるといいわ……可能ならばね？」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
# 「さぁ緋宮クロト……お前はこの盤面を、どうひっくり返してくれるのかしら？」
line = "「さぁ緋宮クロト……お前はこの盤面を、どうひっくり返してくれるのかしら？」"
