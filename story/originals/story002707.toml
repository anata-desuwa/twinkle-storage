[[dialogue]]
speaker = "unk"
# マトイやルリエルが放課後に巫女修行をするようになってから、数週間が経った。
line = "マトイやルリエルが放課後に巫女修行をするようになってから、数週間が経った。"

[[dialogue]]
speaker = "unk"
# そして、ついに――
line = "そして、ついに――"

[[dialogue]]
speaker = "ミヤハル"
# 「マトイにルリはん、巫女の力のコントロール、大分できるようになりましたなぁ」
line = "「マトイにルリはん、巫女の力のコントロール、大分できるようになりましたなぁ」"

[[dialogue]]
speaker = "ミヤハル"
# 「そろそろ修行の大詰めとして、巫女の力を使っての試験と行きまひょか<emoji=heart04>」
line = "「そろそろ修行の大詰めとして、巫女の力を使っての試験と行きまひょか<emoji=heart04>」"

[[dialogue]]
speaker = "ミヤハル"
# 「<b>２対２</b>の実戦形式で」
line = "「<b>２対２</b>の実戦形式で」"

[[dialogue]]
speaker = "unk"
# ミヤハルが再び、ルリエルとマトイに戦いを持ちかける。
line = "ミヤハルが再び、ルリエルとマトイに戦いを持ちかける。"

[[dialogue]]
speaker = "マトイ"
# 「２対２で……？　それだと、組み合わせは――」
line = "「２対２で……？　それだと、組み合わせは――」"

[[dialogue]]
speaker = "トマル"
# 「巫女修行の先達として、私がミヤハルさまと共に相手をさせて頂きます」
line = "「巫女修行の先達として、私がミヤハルさまと共に相手をさせて頂きます」"

[[dialogue]]
speaker = "ルリエル"
# 「トマルさんが……？」
line = "「トマルさんが……？」"

[[dialogue]]
speaker = "トマル"
# 「はい。私も全力で参ります」
line = "「はい。私も全力で参ります」"

[[dialogue]]
speaker = "トマル"
# 「――フォームチェンジ」
line = "「――フォームチェンジ」"

[[dialogue]]
speaker = "マトイ"
# 「えっ！？」
line = "「えっ！？」"

[[dialogue]]
speaker = "unk"
# マトイが驚き、目を見開いた、次の瞬間。
line = "マトイが驚き、目を見開いた、次の瞬間。"

[[dialogue]]
speaker = "トマル（覚醒）"
# 「これが私の、巫女修行を経て覚醒した姿です」
line = "「これが私の、巫女修行を経て覚醒した姿です」"

[[dialogue]]
speaker = "マトイ"
# 「トマルの新フォーム……！？」
line = "「トマルの新フォーム……！？」"

[[dialogue]]
speaker = "トマル（覚醒）"
# 「はい。実は姉さまを驚かせたくて、今日まで秘密にしていたんです」
line = "「はい。実は姉さまを驚かせたくて、今日まで秘密にしていたんです」"

[[dialogue]]
speaker = "マトイ"
# （巫女の力は感じるけど、それと同時に魔力の気配も感じる……。もしかして、これって<b>魔法少女</b>の！？）
line = "（巫女の力は感じるけど、それと同時に魔力の気配も感じる……。もしかして、これって<b>魔法少女</b>の！？）"

[[dialogue]]
speaker = "ルリエル"
# 「わぁっ♪　トマルさんの新フォーム、すごく可愛いのです！」
line = "「わぁっ♪　トマルさんの新フォーム、すごく可愛いのです！」"

[[dialogue]]
speaker = "トマル（覚醒）"
# 「ふふっ、ありがとうございます。ルリさま♪」
line = "「ふふっ、ありがとうございます。ルリさま♪」"

[[dialogue]]
speaker = "ミヤハル"
# 「さあ、うちも今回は陰陽術を解禁して戦うから、マトイとルリはんも遠慮せんと、全力でおいでやす<emoji=heart04>　さもないと――」
line = "「さあ、うちも今回は陰陽術を解禁して戦うから、マトイとルリはんも遠慮せんと、全力でおいでやす<emoji=heart04>　さもないと――」"

[[dialogue]]
speaker = "ミヤハル"
# 「うちには絶対、勝たれへんよ？」
line = "「うちには絶対、勝たれへんよ？」"

[[dialogue]]
speaker = "unk"
# マトイとルリエルは、ミヤハル達への挑戦を開始するのだった――
line = "マトイとルリエルは、ミヤハル達への挑戦を開始するのだった――"

[[dialogue]]
speaker = "unk"
# マトイはミヤハルと戦いながら、修業の中に言われたことを思い出していた――
line = "マトイはミヤハルと戦いながら、修業の中に言われたことを思い出していた――"

[[dialogue]]
speaker = "ミヤハル"
# 「『煩悩解脱』っていうのはな。煩悩を捨て去ることが真ではないんよ」
line = "「『煩悩解脱』っていうのはな。煩悩を捨て去ることが真ではないんよ」"

[[dialogue]]
speaker = "ミヤハル"
# 「人は決して、煩悩の全てを捨て去ることはできないって言われとる。スケベぇなことばっかり考えとるうちなんか、特にそうや」
line = "「人は決して、煩悩の全てを捨て去ることはできないって言われとる。スケベぇなことばっかり考えとるうちなんか、特にそうや」"

[[dialogue]]
speaker = "ミヤハル"
# 「にも関わらず、うちは神聖な星力である巫女の力を使えとる。なんでか不思議に思うやろ？」
line = "「にも関わらず、うちは神聖な星力である巫女の力を使えとる。なんでか不思議に思うやろ？」"

[[dialogue]]
speaker = "ミヤハル"
# 「自分の心と向き合うて、煩悩をちゃんと見つめて……ほんで、そんままの自分を認めること。うちはそれが、悟りちゅうもんやと思うてるんよ」
line = "「自分の心と向き合うて、煩悩をちゃんと見つめて……ほんで、そんままの自分を認めること。うちはそれが、悟りちゅうもんやと思うてるんよ」"

[[dialogue]]
speaker = "ミヤハル"
# 「言ってしまえば、ある種の<b>開き直り</b>やね」
line = "「言ってしまえば、ある種の<b>開き直り</b>やね」"

[[dialogue]]
speaker = "ミヤハル"
# 「……力とは使い方次第で、良くも悪くもなる」
line = "「……力とは使い方次第で、良くも悪くもなる」"

[[dialogue]]
speaker = "ミヤハル"
# 「無邪気な力は決して真ではなく、邪気を理解した上で、清く使う。それこそが真の力となる」
line = "「無邪気な力は決して真ではなく、邪気を理解した上で、清く使う。それこそが真の力となる」"

[[dialogue]]
speaker = "ミヤハル"
# 「あとは感覚で、それを掴めるかどうか……」
line = "「あとは感覚で、それを掴めるかどうか……」"

[[dialogue]]
speaker = "ミヤハル"
# 「煩悩を解放して開き直る感覚。そこで１度裏返った精神を、自身の意思で良き方向へと導く――」
line = "「煩悩を解放して開き直る感覚。そこで１度裏返った精神を、自身の意思で良き方向へと導く――」"

[[dialogue]]
speaker = "ミヤハル"
# 「それこそが悪しきを浄化する、『巫女の力』の境地や」
line = "「それこそが悪しきを浄化する、『巫女の力』の境地や」"

[[dialogue]]
speaker = "ルリエル"
# 「ルリエルは！　美味しいものがいっぱい食べたいのですーーーっ！！」
line = "「ルリエルは！　美味しいものがいっぱい食べたいのですーーーっ！！」"

[[dialogue]]
speaker = "マトイ"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "unk"
# 戦闘が続く中、ルリエルの不意に大きく叫ぶ声が聞こえて、はっと我に返るマトイ。
line = "戦闘が続く中、ルリエルの不意に大きく叫ぶ声が聞こえて、はっと我に返るマトイ。"

[[dialogue]]
speaker = "ルリエル"
# 「でんでん♪　なのですっ！」
line = "「でんでん♪　なのですっ！」"

[[dialogue]]
speaker = "unk"
# 合わせて太鼓を叩き、雨の星術を発動してミヤハルとトマルに攻撃する。
line = "合わせて太鼓を叩き、雨の星術を発動してミヤハルとトマルに攻撃する。"

[[dialogue]]
speaker = "unk"
# マトイはそんなルリエルの横顔を見て――
line = "マトイはそんなルリエルの横顔を見て――"

[[dialogue]]
speaker = "マトイ"
# （ああ……すごい）
line = "（ああ……すごい）"

[[dialogue]]
speaker = "マトイ"
# （やっぱり、ルリちゃんは普通じゃないね）
line = "（やっぱり、ルリちゃんは普通じゃないね）"

[[dialogue]]
speaker = "マトイ"
# （だから、私も――）
line = "（だから、私も――）"

[[dialogue]]
speaker = "unk"
# マトイは１度大きく息を吸ってから、叫ぶ。
line = "マトイは１度大きく息を吸ってから、叫ぶ。"

[[dialogue]]
speaker = "マトイ"
# 「私も！　太るのなんか気にせずに、美味しい物をいっぱい食べたいっ！！」
line = "「私も！　太るのなんか気にせずに、美味しい物をいっぱい食べたいっ！！」"

[[dialogue]]
speaker = "unk"
# 二刀流の刀を交差させた斬撃星術を放つ。
line = "二刀流の刀を交差させた斬撃星術を放つ。"

[[dialogue]]
speaker = "ミヤハル"
# 「そんな風に、ただ煩悩を叫べばええってわけじゃあらへんよ？　──陰陽術！」
line = "「そんな風に、ただ煩悩を叫べばええってわけじゃあらへんよ？　──陰陽術！」"

[[dialogue]]
speaker = "unk"
# ミヤハルが五芒星を描き、収束した膨大な魔力から巨大な式神が生まれて、マトイとルリエルの攻撃を吹き飛ばす。
line = "ミヤハルが五芒星を描き、収束した膨大な魔力から巨大な式神が生まれて、マトイとルリエルの攻撃を吹き飛ばす。"

[[dialogue]]
speaker = "unk"
# それでも――
line = "それでも――"

[[dialogue]]
speaker = "ルリエル"
# 「友達を沢山作りたいのです！」
line = "「友達を沢山作りたいのです！」"

[[dialogue]]
speaker = "マトイ"
# 「普通じゃない力が欲しい！」
line = "「普通じゃない力が欲しい！」"

[[dialogue]]
speaker = "ルリエル"
# 「セクシーな服を着てみたいのです！」
line = "「セクシーな服を着てみたいのです！」"

[[dialogue]]
speaker = "マトイ"
# 「ヴィーナスよりも強くなりたい！」
line = "「ヴィーナスよりも強くなりたい！」"

[[dialogue]]
speaker = "ルリエル"
# 「もっといっぱい、友達を作りたいのです！」
line = "「もっといっぱい、友達を作りたいのです！」"

[[dialogue]]
speaker = "マトイ"
# 「物語のカッコいいヒロインみたいになりたい！」
line = "「物語のカッコいいヒロインみたいになりたい！」"

[[dialogue]]
speaker = "unk"
# ２人は思い浮かぶ煩悩を、心のままに口にする。
line = "２人は思い浮かぶ煩悩を、心のままに口にする。"

[[dialogue]]
speaker = "ルリエル"
# 「――ミヤハルさんとも、友達になりたいのですっ！！」
line = "「――ミヤハルさんとも、友達になりたいのですっ！！」"

[[dialogue]]
speaker = "ミヤハル"
# 「えっ……」
line = "「えっ……」"

[[dialogue]]
speaker = "マトイ"
# 「……そうだね。こんなに強いんだから」
line = "「……そうだね。こんなに強いんだから」"

[[dialogue]]
speaker = "マトイ"
# 「――もっと前線に出て来て、私たちと一緒に戦ってよっ！！　ミヤハルッ！！！」
line = "「――もっと前線に出て来て、私たちと一緒に戦ってよっ！！　ミヤハルッ！！！」"

[[dialogue]]
speaker = "ミヤハル"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "トマル（覚醒）"
# 「この光は……！」
line = "「この光は……！」"

[[dialogue]]
speaker = "マトイ"
# 「息を合わせて行こう、ルリちゃん！」
line = "「息を合わせて行こう、ルリちゃん！」"

[[dialogue]]
speaker = "ルリエル"
# 「はいなのです！　マトイさん！」
line = "「はいなのです！　マトイさん！」"

[[dialogue]]
speaker = "マトイ"
# 「レディー！！」
line = "「レディー！！」"

[[dialogue]]
speaker = "ルリエル"
# 「ゴーなのです！！！」
line = "「ゴーなのです！！！」"

[[dialogue]]
speaker = "unk"
# ２人は清く眩い巫女の力を纏いながら、再びミヤハル達へと立ち向かうのだった――
line = "２人は清く眩い巫女の力を纏いながら、再びミヤハル達へと立ち向かうのだった――"
