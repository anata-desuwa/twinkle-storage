[[dialogue]]
speaker = "シャロン"
# 「ばたんきゅ～」
line = "「ばたんきゅ～」"

[[dialogue]]
speaker = "unk"
# あっけなく撃破した……
line = "あっけなく撃破した……"

[[dialogue]]
speaker = "イレーナ"
# 「２対１なのに真正面から挑んできたら、こっちが勝つに決まってるわよ」
line = "「２対１なのに真正面から挑んできたら、こっちが勝つに決まってるわよ」"

[[dialogue]]
speaker = "シャロン"
# 「勝敗がわかりきっていても……女にはやらなきゃいけない時があるんですよぅ……」
line = "「勝敗がわかりきっていても……女にはやらなきゃいけない時があるんですよぅ……」"

[[dialogue]]
speaker = "イレーナ"
# 「それ絶対今じゃないでしょ」
line = "「それ絶対今じゃないでしょ」"

[[dialogue]]
speaker = "イレーナ"
# 「まだ立ち上がるつもりなら、相手になるけど？　何度やっても、あたしと会長のタッグには勝てっこないわよ？」
line = "「まだ立ち上がるつもりなら、相手になるけど？　何度やっても、あたしと会長のタッグには勝てっこないわよ？」"

[[dialogue]]
speaker = "シャロン"
# 「そうですよね……２人の連携は完璧……相性抜群……私が付け入る隙なんてないですもんね……」
line = "「そうですよね……２人の連携は完璧……相性抜群……私が付け入る隙なんてないですもんね……」"

[[dialogue]]
speaker = "イレーナ"
# 「誤解されそうな言い回し、やめてくれる？　あたしとこいつはそういうんじゃないから」
line = "「誤解されそうな言い回し、やめてくれる？　あたしとこいつはそういうんじゃないから」"

[[dialogue]]
speaker = "イレーナ"
# 「それにあたしはね、チョコを渡すことを全否定してるんじゃないの。赤の他人に無理強いされて、チョコを渡すのがイヤなだけよ」
line = "「それにあたしはね、チョコを渡すことを全否定してるんじゃないの。赤の他人に無理強いされて、チョコを渡すのがイヤなだけよ」"

[[dialogue]]
speaker = "シャロン"
# 「つまり、時が来れば、イレーナさまもチョコをお渡しになる……と？」
line = "「つまり、時が来れば、イレーナさまもチョコをお渡しになる……と？」"

[[dialogue]]
speaker = "イレーナ"
# 「まぁ……そうね、いつかそういう時も来るかもしれないわ。でも、それは少なくとも今じゃない」
line = "「まぁ……そうね、いつかそういう時も来るかもしれないわ。でも、それは少なくとも今じゃない」"

[[dialogue]]
speaker = "イレーナ"
# 「バレンタインのチョコってのはつまり……気持ちなわけでしょ？」
line = "「バレンタインのチョコってのはつまり……気持ちなわけでしょ？」"

[[dialogue]]
speaker = "イレーナ"
# 「それを他人に言われて渡すのって、自分の気持ちに人の気持ちが混ざるみたいで嫌じゃない？」
line = "「それを他人に言われて渡すのって、自分の気持ちに人の気持ちが混ざるみたいで嫌じゃない？」"

[[dialogue]]
speaker = "シャロン"
# 「──ッ！！　その通りです！　わたしが間違っていました！」
line = "「──ッ！！　その通りです！　わたしが間違っていました！」"

[[dialogue]]
speaker = "シャロン"
# 「イレーナさまはイレーナさまの意志でチョコを渡すべきです。私もウルスラさまをやっつけるのに協力します！」
line = "「イレーナさまはイレーナさまの意志でチョコを渡すべきです。私もウルスラさまをやっつけるのに協力します！」"

[[dialogue]]
speaker = "イレーナ"
# 「うんうん。物分かりがよくて助かるわ」
line = "「うんうん。物分かりがよくて助かるわ」"

[[dialogue]]
speaker = "unk"
# シャロンの手のひらが高速回転している
line = "シャロンの手のひらが高速回転している"

[[dialogue]]
speaker = "イレーナ"
# 「──ってわけで、どこかで聞いてるんでしょ、ウルスラ！　シャロンは取り返したわよ！」
line = "「──ってわけで、どこかで聞いてるんでしょ、ウルスラ！　シャロンは取り返したわよ！」"

[[dialogue]]
speaker = "ウルスラ"
# 『残念です。シャロンさんとは分かり合えたと思っていたのに……』
line = "『残念です。シャロンさんとは分かり合えたと思っていたのに……』"

[[dialogue]]
speaker = "シャロン"
# 「ごめんなさい、ウルスラさま。でもやっぱり、ムリヤリっていうのは良くないですっ！」
line = "「ごめんなさい、ウルスラさま。でもやっぱり、ムリヤリっていうのは良くないですっ！」"

[[dialogue]]
speaker = "イレーナ"
# 「あんたを見つけて、みんなでボッコボコにしてあげるから、首を洗って待ってなさい！」
line = "「あんたを見つけて、みんなでボッコボコにしてあげるから、首を洗って待ってなさい！」"

[[dialogue]]
speaker = "ウルスラ"
# 『あら、わざわざ見つけるのに労力を割いていただかなくても──』
line = "『あら、わざわざ見つけるのに労力を割いていただかなくても──』"

[[dialogue]]
speaker = "ウルスラ"
# 『私は大聖堂にいますので』
line = "『私は大聖堂にいますので』"

[[dialogue]]
speaker = "イレーナ"
# 「居場所を教えてくれるなんて、余裕綽々じゃない」
line = "「居場所を教えてくれるなんて、余裕綽々じゃない」"

[[dialogue]]
speaker = "ウルスラ"
# 『はい。私、無敵ですから<emoji=heart04>』
line = "『はい。私、無敵ですから<emoji=heart04>』"

[[dialogue]]
speaker = "ウルスラ"
# 『チョコを渡すにせよ、私と戦うにせよ。心の準備は万全に整えてからいらしてくださいね』
line = "『チョコを渡すにせよ、私と戦うにせよ。心の準備は万全に整えてからいらしてくださいね』"

[[dialogue]]
speaker = "イレーナ"
# 「癪に障るけど、探す手間が省けたわ。みんな、気を引き締めていくわよ！」
line = "「癪に障るけど、探す手間が省けたわ。みんな、気を引き締めていくわよ！」"

[[dialogue]]
speaker = "シャロン"
# 「おーっ！」
line = "「おーっ！」"

[[dialogue]]
speaker = "シャロン"
# 「で、イレーナさまは会長さま用のチョコをご用意されてるんですか？」
line = "「で、イレーナさまは会長さま用のチョコをご用意されてるんですか？」"

[[dialogue]]
speaker = "イレーナ"
# 「そ、そんなこと、今はどうでもいいでしょ！　とっとと大聖堂に行ってウルスラをぶちのめすわよ！」
line = "「そ、そんなこと、今はどうでもいいでしょ！　とっとと大聖堂に行ってウルスラをぶちのめすわよ！」"

[[dialogue]]
speaker = "unk"
# 大聖堂の雰囲気は明らかにいつもと違っていた。
line = "大聖堂の雰囲気は明らかにいつもと違っていた。"

[[dialogue]]
speaker = "シャロン"
# 「ああっ……！　大聖堂からウルスラさまの歪んだバレンタインの波動を感じます……！」
line = "「ああっ……！　大聖堂からウルスラさまの歪んだバレンタインの波動を感じます……！」"

[[dialogue]]
speaker = "イレーナ"
# 「今更だけど、そのバレンタインの波動ってなんなの……？」
line = "「今更だけど、そのバレンタインの波動ってなんなの……？」"

[[dialogue]]
speaker = "ウルスラ"
# 「ふふふ……あなたも感じてみれば理解できますよ」
line = "「ふふふ……あなたも感じてみれば理解できますよ」"

[[dialogue]]
speaker = "イレーナ"
# 「──！　出たわね、ウルスラ！」
line = "「──！　出たわね、ウルスラ！」"

[[dialogue]]
speaker = "ウルスラ"
# 「ようこそ、イレーナさん。会長さんにチョコを渡す準備はできましたか？」
line = "「ようこそ、イレーナさん。会長さんにチョコを渡す準備はできましたか？」"

[[dialogue]]
speaker = "イレーナ"
# 「くどいわね。渡さないって何度も言ってるでしょ」
line = "「くどいわね。渡さないって何度も言ってるでしょ」"

[[dialogue]]
speaker = "イレーナ"
# 「あたしたちの目的は、ただひとつ。あんたを叩きのめして、こんなバカげた空間から脱出することよ！」
line = "「あたしたちの目的は、ただひとつ。あんたを叩きのめして、こんなバカげた空間から脱出することよ！」"

[[dialogue]]
speaker = "ウルスラ"
# 「まあ。あのモンスターを一撃で倒した私の実力を見てなお、挑もうというのですか？」
line = "「まあ。あのモンスターを一撃で倒した私の実力を見てなお、挑もうというのですか？」"

[[dialogue]]
speaker = "ウルスラ"
# 「勇気と無謀は紙一重。バレンタインデーの私は、ただの星騎士ではありませんよ？」
line = "「勇気と無謀は紙一重。バレンタインデーの私は、ただの星騎士ではありませんよ？」"

[[dialogue]]
speaker = "イレーナ"
# 「はっ、もう勝ったつもり？　油断してると足をすくわれるわよ？」
line = "「はっ、もう勝ったつもり？　油断してると足をすくわれるわよ？」"

[[dialogue]]
speaker = "ウルスラ"
# 「うーん……実際に試してみないことにはご納得いただけないのでしょうか……」
line = "「うーん……実際に試してみないことにはご納得いただけないのでしょうか……」"

[[dialogue]]
speaker = "ウルスラ"
# 「では、しばらくの間、私はここに立っていますね」
line = "「では、しばらくの間、私はここに立っていますね」"

[[dialogue]]
speaker = "ウルスラ"
# 「一切反撃しませんので、全力で挑んでみてください。サービスタイムです<emoji=heart04>」
line = "「一切反撃しませんので、全力で挑んでみてください。サービスタイムです<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
# 「あたしと星徒会長相手に舐めプだなんていい度胸じゃない……！」
line = "「あたしと星徒会長相手に舐めプだなんていい度胸じゃない……！」"

[[dialogue]]
speaker = "シャロン"
# 「そうですよ！　失礼しちゃいますっ！」
line = "「そうですよ！　失礼しちゃいますっ！」"

[[dialogue]]
speaker = "シャロン"
# 「……ナメプってなんですか？　ナメコのお友達ですか？」
line = "「……ナメプってなんですか？　ナメコのお友達ですか？」"

[[dialogue]]
speaker = "unk"
# 舐めたプレイの略だよ
line = "舐めたプレイの略だよ"

[[dialogue]]
speaker = "シャロン"
# 「なめた……プレイ……？　お祈りでしょうか？」
line = "「なめた……プレイ……？　お祈りでしょうか？」"

[[dialogue]]
speaker = "イレーナ"
# 「そっちの<ruby=プレイ>ｐｒａｙ</ruby>じゃないわよ！」
line = "「そっちの<ruby>ｐｒａｙ<rt>プレイ</rt></ruby>じゃないわよ！」"

[[dialogue]]
speaker = "イレーナ"
# 「要はあたしたちをおちょくってるってこと。後悔させてあげようじゃないっ……２人とも行くわよっ！」
line = "「要はあたしたちをおちょくってるってこと。後悔させてあげようじゃないっ……２人とも行くわよっ！」"
