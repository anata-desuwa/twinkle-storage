[[dialogue]]
speaker = "unk"
# 第２話,魔王の現状,B
line = "第２話,魔王の現状,B"

[[dialogue]]
speaker = "ダークキングフワッチ"
# 「イーーーーーッ！」
line = "「イーーーーーッ！」"

[[dialogue]]
speaker = "クロト"
# 「アビスインパクト！」
line = "「アビスインパクト！」"

[[dialogue]]
speaker = "ダークキングフワッチ"
# 「イ～～……」
line = "「イ～～……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ま、クロトなら魔王の力を使わなくてもこのくらい余裕よね」
line = "「ま、クロトなら魔王の力を使わなくてもこのくらい余裕よね」"

[[dialogue]]
speaker = "クロト"
# 「みんなが付き合ってくれたおかげだよ」
line = "「みんなが付き合ってくれたおかげだよ」"

[[dialogue]]
speaker = "unk"
# 以前、破滅した世界のビジョンが見えると同時に、魔王の力が暴走しかけた。
line = "以前、破滅した世界のビジョンが見えると同時に、魔王の力が暴走しかけた。"

[[dialogue]]
speaker = "unk"
# だから今は魔王の力を封印し、自分の星力だけで戦うトレーニングをしていた。
line = "だから今は魔王の力を封印し、自分の星力だけで戦うトレーニングをしていた。"

[[dialogue]]
speaker = "マトイ"
# 「でも、緋宮くんの中で何が起きたの？　いまだによくわかってないんだけど……」
line = "「でも、緋宮くんの中で何が起きたの？　いまだによくわかってないんだけど……」"

[[dialogue]]
speaker = "アナ"
# 「では整理しましょう。緋宮会長には魔王の力が２つありました」
line = "「では整理しましょう。緋宮会長には魔王の力が２つありました」"

[[dialogue]]
speaker = "アナ"
# 「ひとつは、オルタナティブ世界から先代魔王ラクシスが持ち帰った因子によるもの」
line = "「ひとつは、オルタナティブ世界から先代魔王ラクシスが持ち帰った因子によるもの」"

[[dialogue]]
speaker = "アナ"
# 「霊力と魔力、そして星力を融合させることで、さらに高次元の力を引き出すものです」
line = "「霊力と魔力、そして星力を融合させることで、さらに高次元の力を引き出すものです」"

[[dialogue]]
speaker = "アナ"
# 「この魔王因子は星見家などラクシスの子孫にも受け継がれています」
line = "「この魔王因子は星見家などラクシスの子孫にも受け継がれています」"

[[dialogue]]
speaker = "マトイ"
# 「うん、フィオナさんやアポロちゃんがそうだよね」
line = "「うん、フィオナさんやアポロちゃんがそうだよね」"

[[dialogue]]
speaker = "アナ"
# 「そしてもう１つが──」
line = "「そしてもう１つが──」"

[[dialogue]]
speaker = "クロト"
# 「ラクシスが先天的に持っていた、世界を超える力──だな」
line = "「ラクシスが先天的に持っていた、世界を超える力──だな」"

[[dialogue]]
speaker = "unk"
# 先代魔王ラクシスの生まれ変わりである俺だけが、その力を受け継いでいる。
line = "先代魔王ラクシスの生まれ変わりである俺だけが、その力を受け継いでいる。"

[[dialogue]]
speaker = "unk"
# ラクシスの力は、異なる世界を渡るばかりか、平行世界の可能性を呼び寄せることもできた。
line = "ラクシスの力は、異なる世界を渡るばかりか、平行世界の可能性を呼び寄せることもできた。"

[[dialogue]]
speaker = "アナ"
# 「緋宮会長は、その力を自覚する前から無意識に使っていたと思われます」
line = "「緋宮会長は、その力を自覚する前から無意識に使っていたと思われます」"

[[dialogue]]
speaker = "クロト"
# 「ああ、今思えば心当たりがあるよ」
line = "「ああ、今思えば心当たりがあるよ」"

[[dialogue]]
speaker = "ギエル"
# 「ふ──さすがは魔王の血族。中々やるようですが、所詮はただの空拳……」
line = "「ふ──さすがは魔王の血族。中々やるようですが、所詮はただの空拳……」"

[[dialogue]]
speaker = "ギエル"
# 「っ！？」
line = "「っ！？」"

[[dialogue]]
speaker = "unk"
# あの時、一度は防がれたはずの拳がギエルに命中していた。
line = "あの時、一度は防がれたはずの拳がギエルに命中していた。"

[[dialogue]]
speaker = "unk"
# あれは平行世界から呼び出された俺の拳が、ギエルに打撃を与えていたのだ。
line = "あれは平行世界から呼び出された俺の拳が、ギエルに打撃を与えていたのだ。"

[[dialogue]]
speaker = "unk"
# 以前暴走しかけたのは、ラクシスが元々持っていた『世界を超える力』の方だ。
line = "以前暴走しかけたのは、ラクシスが元々持っていた『世界を超える力』の方だ。"

[[dialogue]]
speaker = "unk"
# だからラクシスの力を使わずに戦う訓練を積んでいたけど、無意識のうちに使っていた力を、意識的に封印するのはなかなか難しい。
line = "だからラクシスの力を使わずに戦う訓練を積んでいたけど、無意識のうちに使っていた力を、意識的に封印するのはなかなか難しい。"

[[dialogue]]
speaker = "クロト"
# 「今の俺は、普通の星騎士と同じように自分の星力だけで戦っている。星徒会長なんだから、それでも最強じゃないとな」
line = "「今の俺は、普通の星騎士と同じように自分の星力だけで戦っている。星徒会長なんだから、それでも最強じゃないとな」"

[[dialogue]]
speaker = "unk"
# みんなのおかげで、魔王の力を全力で引き出した時ほどではなくても、かなり戦えるようになった。
line = "みんなのおかげで、魔王の力を全力で引き出した時ほどではなくても、かなり戦えるようになった。"

[[dialogue]]
speaker = "unk"
# そうでなければ梨緒との御前試合も勝てなかっただろう。
line = "そうでなければ梨緒との御前試合も勝てなかっただろう。"

[[dialogue]]
speaker = "マトイ"
# 「な、なるほど……理解できた気がする」
line = "「な、なるほど……理解できた気がする」"

[[dialogue]]
speaker = "サーシャ"
# 「でも、どうしてラクシスの力が暴走しかけたのかしら～？」
line = "「でも、どうしてラクシスの力が暴走しかけたのかしら～？」"

[[dialogue]]
speaker = "クロト"
# 「それなんですが──」
line = "「それなんですが──」"

[[dialogue]]
speaker = "unk"
# あれは梨緒との御前試合があった日の夕方のこと。
line = "あれは梨緒との御前試合があった日の夕方のこと。"

[[dialogue]]
speaker = "unk"
# 俺とフィオナが梨緒を呼び出し、重要な話し合いを行った最後に、梨緒は言った。
line = "俺とフィオナが梨緒を呼び出し、重要な話し合いを行った最後に、梨緒は言った。"

[[dialogue]]
speaker = "梨緒"
# 「新星学園の制服を着た守護天使から伝言だ」
line = "「新星学園の制服を着た守護天使から伝言だ」"

[[dialogue]]
speaker = "梨緒"
# 「『魔王は他の世界で敗北しているから、その可能性を収束させれば、同じ末路を辿ることが確定してしまう』」
line = "「『魔王は他の世界で敗北しているから、その可能性を収束させれば、同じ末路を辿ることが確定してしまう』」"

[[dialogue]]
speaker = "クロト"
# 「──！」
line = "「──！」"

[[dialogue]]
speaker = "梨緒"
# 「詳しく聞かれても私にはわからない……が、その顔を見る限り、意味は伝わったようだな」
line = "「詳しく聞かれても私にはわからない……が、その顔を見る限り、意味は伝わったようだな」"

[[dialogue]]
speaker = "クロト"
# 「俺は──緋宮クロトは、平行世界ベガとデネブでリクリエに屈している。つまり敗北の可能性を収束させれば──」
line = "「俺は──緋宮クロトは、平行世界ベガとデネブでリクリエに屈している。つまり敗北の可能性を収束させれば──」"

[[dialogue]]
speaker = "サーシャ"
# 「アルタイルの緋宮クロトが勝利しても、２対１で負けちゃう──ってわけね～」
line = "「アルタイルの緋宮クロトが勝利しても、２対１で負けちゃう──ってわけね～」"

[[dialogue]]
speaker = "サーシャ"
# 「なるほど～、そういうことなら納得だわ～。可能性を収束させるっていっても、いいことばかりじゃないのね～」
line = "「なるほど～、そういうことなら納得だわ～。可能性を収束させるっていっても、いいことばかりじゃないのね～」"

[[dialogue]]
speaker = "unk"
# 俺たちがいるこの世界はアルタイル。そしてベガとデネブという２つの平行世界が他に存在している。
line = "俺たちがいるこの世界はアルタイル。そしてベガとデネブという２つの平行世界が他に存在している。"

[[dialogue]]
speaker = "unk"
# おそらくベガとデネブの俺は良くて死……最悪、暴走した俺のように世界を破滅させる側に回っているだろう。
line = "おそらくベガとデネブの俺は良くて死……最悪、暴走した俺のように世界を破滅させる側に回っているだろう。"

[[dialogue]]
speaker = "ヴィーナス"
# 「じゃあ何、前の戦いの時はたまたま上手くいってただけってこと？」
line = "「じゃあ何、前の戦いの時はたまたま上手くいってただけってこと？」"

[[dialogue]]
speaker = "クロト"
# 「そうかもしれない。あるいは力を自覚し、強力になることで、余計なものまで引き寄せてしまったのか……」
line = "「そうかもしれない。あるいは力を自覚し、強力になることで、余計なものまで引き寄せてしまったのか……」"

[[dialogue]]
speaker = "クロト"
# 「どの道、今のままじゃ魔王の力は全力で使えない」
line = "「どの道、今のままじゃ魔王の力は全力で使えない」"

[[dialogue]]
speaker = "マトイ"
# 「オルタナティブ世界の魔王の力があるなら、それでラクシスの力を抑え込んだりできないの？」
line = "「オルタナティブ世界の魔王の力があるなら、それでラクシスの力を抑え込んだりできないの？」"

[[dialogue]]
speaker = "アナ"
# 「おそらく会長は、生来持っていたラクシスの力の方が根幹にあるものと思われます」
line = "「おそらく会長は、生来持っていたラクシスの力の方が根幹にあるものと思われます」"

[[dialogue]]
speaker = "アナ"
# 「それにオルタナティブ世界の魔王の力は、星力・魔力・霊力を融合させ、さらなる力を得るもの」
line = "「それにオルタナティブ世界の魔王の力は、星力・魔力・霊力を融合させ、さらなる力を得るもの」"

[[dialogue]]
speaker = "アナ"
# 「暴走した会長がその力を使った場合、さらに手が付けられなくなる可能性があります」
line = "「暴走した会長がその力を使った場合、さらに手が付けられなくなる可能性があります」"

[[dialogue]]
speaker = "unk"
# それはまさに最悪のケースだ。
line = "それはまさに最悪のケースだ。"

[[dialogue]]
speaker = "unk"
# 力を御すことができなければ、この世界に牙を剥くことになるだろう。
line = "力を御すことができなければ、この世界に牙を剥くことになるだろう。"

[[dialogue]]
speaker = "マトイ"
# 「な、なるほど……それはヤバいどころじゃないね……」
line = "「な、なるほど……それはヤバいどころじゃないね……」"

[[dialogue]]
speaker = "マトイ"
# 「じゃあ今、強い敵が来たらとんでもないピンチに……」
line = "「じゃあ今、強い敵が来たらとんでもないピンチに……」"

[[dialogue]]
speaker = "サーシャ"
# 「ふふ、だからこうして、少しでも強くなろうとしているんでしょ～？」
line = "「ふふ、だからこうして、少しでも強くなろうとしているんでしょ～？」"

[[dialogue]]
speaker = "マトイ"
# 「それはそうですけど……いえ、そうですね。星徒会が弱音なんて言ってられませんっ」
line = "「それはそうですけど……いえ、そうですね。星徒会が弱音なんて言ってられませんっ」"

[[dialogue]]
speaker = "マトイ"
# 「この数ヶ月で、星徒会もノヴァフォームの獲得に成功したわけだし……いざとなったら私たちが緋宮くんを守るよ！」
line = "「この数ヶ月で、星徒会もノヴァフォームの獲得に成功したわけだし……いざとなったら私たちが緋宮くんを守るよ！」"

[[dialogue]]
speaker = "クロト"
# 「ありがとう。頼りにしてる」
line = "「ありがとう。頼りにしてる」"

[[dialogue]]
speaker = "unk"
# 暗いニュースばかりではない。
line = "暗いニュースばかりではない。"

[[dialogue]]
speaker = "unk"
# マトイ、サーシャ先輩、アナはこの数ヶ月の間に、強力な力を有する新戦闘服、ノヴァフォームを手に入れていた。
line = "マトイ、サーシャ先輩、アナはこの数ヶ月の間に、強力な力を有する新戦闘服、ノヴァフォームを手に入れていた。"

[[dialogue]]
speaker = "unk"
# とは言え──その力があれば、魔神ギエル級の厄災に太刀打ちできるのかといえば、難しいと言わざるを得ない。
line = "とは言え──その力があれば、魔神ギエル級の厄災に太刀打ちできるのかといえば、難しいと言わざるを得ない。"

[[dialogue]]
speaker = "unk"
# リクリエの本波や魔王の力は、単純な力比べとは異なる、文字通り異次元の力だった。
line = "リクリエの本波や魔王の力は、単純な力比べとは異なる、文字通り異次元の力だった。"

[[dialogue]]
speaker = "unk"
# だからこそ、『魔王の力を封印した状態でのパワーアップ』と同時に、『魔王の力の制御』を取り戻す方法も探る必要がある。
line = "だからこそ、『魔王の力を封印した状態でのパワーアップ』と同時に、『魔王の力の制御』を取り戻す方法も探る必要がある。"

[[dialogue]]
speaker = "unk"
# やらなければならないことは山積みだが、やれるところからやっていくしかない。今の俺たちにできることをするんだ。
line = "やらなければならないことは山積みだが、やれるところからやっていくしかない。今の俺たちにできることをするんだ。"
