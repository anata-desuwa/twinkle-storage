[[dialogue]]
speaker = "リィベル"
# 「ふっ…………んん…………ふー…………はぁ…………」
line = "「ふっ…………んん…………ふー…………はぁ…………」"

[[dialogue]]
speaker = "unk"
# リィベルの乳房は小さいけどちゃんと柔らかくて、力を入れる度に指が食い込む。
line = "リィベルの乳房は小さいけどちゃんと柔らかくて、力を入れる度に指が食い込む。"

