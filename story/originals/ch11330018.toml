[[dialogue]]
speaker = "リィベル"
# 「んっ……」
line = "「んっ……」"

[[dialogue]]
speaker = "unk"
# するとリィベルがわずかに声を漏らした……ような気がする。
line = "するとリィベルがわずかに声を漏らした……ような気がする。"

[[dialogue]]
speaker = "クロト"
# 「今ので感じた？」
line = "「今ので感じた？」"

[[dialogue]]
speaker = "リィベル"
# 「そんなわけないでしょ」
line = "「そんなわけないでしょ」"

[[dialogue]]
speaker = "unk"
# 即座に否定し、冷たい表情を崩さないリィベル。
line = "即座に否定し、冷たい表情を崩さないリィベル。"

[[dialogue]]
speaker = "unk"
# それならこのまま愛撫を続けさせてもらおう。
