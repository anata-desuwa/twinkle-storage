speaker = "リィベル"
# 「んん……どうして胸を触るの？　セックスなんだから、私の膣に入れるんじゃないの？」
line = "「んん……どうして胸を触るの？　セックスなんだから、私の膣に入れるんじゃないの？」"

[[dialogue]]
speaker = "クロト"
