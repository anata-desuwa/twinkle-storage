[[dialogue]]
speaker = "unk"
# ある日、俺はリィベルに呼ばれて地下図書館に来ていた。
line = "ある日、俺はリィベルに呼ばれて地下図書館に来ていた。"

[[dialogue]]
speaker = "クロト"
# 「俺に何か用？」
line = "「俺に何か用？」"

[[dialogue]]
speaker = "リィベル"
# 「これを見て」
line = "「これを見て」"

[[dialogue]]
speaker = "unk"
# そう言ってリィベルが差し出した本は──俺が自分の部屋に隠していたエッチな漫画だった！
line = "そう言ってリィベルが差し出した本は──俺が自分の部屋に隠していたエッチな漫画だった！"

[[dialogue]]
speaker = "クロト"
# 「な！？　どうしてそれをリィベルが！？」
line = "「な！？　どうしてそれをリィベルが！？」"

[[dialogue]]
speaker = "リィベル"
# 「あなたの部屋で見つけたに決まっているでしょう。少し借りさせてもらったわ」
line = "「あなたの部屋で見つけたに決まっているでしょう。少し借りさせてもらったわ」"

[[dialogue]]
speaker = "リィベル"
# 「中身を見てみたけど、女がこんな簡単に快感を感じるわけないわ。やはり漫画は俗な本ね」
line = "「中身を見てみたけど、女がこんな簡単に快感を感じるわけないわ。やはり漫画は俗な本ね」"

[[dialogue]]
speaker = "クロト"
# 「そう言われても……本当にこのくらい感じるかもしれないし……」
line = "「そう言われても……本当にこのくらい感じるかもしれないし……」"

[[dialogue]]
speaker = "リィベル"
# 「いいえ、ありえないわ。エロ漫画なんて所詮フィクション。ファンタジーよ」
line = "「いいえ、ありえないわ。エロ漫画なんて所詮フィクション。ファンタジーよ」"

[[dialogue]]
speaker = "リィベル"
# 「特に何なの、このセリフ。『おち○ぽ大好き』とか、『おま○こ壊れちゃう』とか、『イッちゃう～』とか、こんなのセックスの最中に言うわけないじゃない」
line = "「特に何なの、このセリフ。『おち○ぽ大好き』とか、『おま○こ壊れちゃう』とか、『イッちゃう～』とか、こんなのセックスの最中に言うわけないじゃない」"

[[dialogue]]
speaker = "クロト"
# 「いや、そこまで否定しなくていいだろ。実際そう言う女の子もいるかもしれない」
line = "「いや、そこまで否定しなくていいだろ。実際そう言う女の子もいるかもしれない」"

[[dialogue]]
speaker = "リィベル"
# 「なら、あなたが私に言わせてみせなさい。私は感じないし、この漫画が虚構だということを証明してみせるわ」
line = "「なら、あなたが私に言わせてみせなさい。私は感じないし、この漫画が虚構だということを証明してみせるわ」"

[[dialogue]]
speaker = "クロト"
# 「えええ～～っ！！？」
line = "「えええ～～っ！！？」"

[[dialogue]]
speaker = "unk"
# そうしてお互い服を脱ぎ、リィベルが俺の膝の上に乗る。
line = "そうしてお互い服を脱ぎ、リィベルが俺の膝の上に乗る。"

[[dialogue]]
speaker = "unk"
# 素肌を晒し、胸や秘部を露わにしているが、人形のような澄まし顔は変わらない。
line = "素肌を晒し、胸や秘部を露わにしているが、人形のような澄まし顔は変わらない。"

[[dialogue]]
speaker = "unk"
# リィベルは深淵書庫の管理システムが魔族の形を取ったもの。だがその白い肌や、直接触れて感じる柔らかさには、男として昂りを覚えずにはいられなかった。
line = "リィベルは深淵書庫の管理システムが魔族の形を取ったもの。だがその白い肌や、直接触れて感じる柔らかさには、男として昂りを覚えずにはいられなかった。"

[[dialogue]]
speaker = "リィベル"
# 「ほら、どうしたの。さっさと手を出しなさいよ」
line = "「ほら、どうしたの。さっさと手を出しなさいよ」"

[[dialogue]]
speaker = "クロト"
# 「本当にいいんだな……？」
line = "「本当にいいんだな……？」"

[[dialogue]]
speaker = "リィベル"
# 「ええ。いいからやりなさい。どうせ私は何も感じないから」
line = "「ええ。いいからやりなさい。どうせ私は何も感じないから」"

[[dialogue]]
speaker = "unk"
# そこまで言われたら退く選択肢はない。
