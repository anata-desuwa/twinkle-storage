[[dialogue]]
speaker = "シャロン"
# 「カヌレは甘いですけど、攻撃は甘くないですよっ！　それっ！」
line = "「カヌレは甘いですけど、攻撃は甘くないですよっ！　それっ！」"

[[dialogue]]
speaker = "イレーナ"
# 「いい加減にしなさい！」
line = "「いい加減にしなさい！」"

[[dialogue]]
speaker = "ウルスラ"
# 「おふたりの星術は、モンスター退治の際に見させていただきました。残念ながらその程度の力では──」
line = "「おふたりの星術は、モンスター退治の際に見させていただきました。残念ながらその程度の力では──」"

[[dialogue]]
speaker = "ウルスラ"
# 「──私の羽１枚散らせませんよ」
line = "「──私の羽１枚散らせませんよ」"

[[dialogue]]
speaker = "シャロン"
# 「簡単に弾かれちゃいましたっ！　でもっ！」
line = "「簡単に弾かれちゃいましたっ！　でもっ！」"

[[dialogue]]
speaker = "イレーナ"
# 「あたしたち２人じゃダメでも、星徒会長の一撃ならどう！？」
line = "「あたしたち２人じゃダメでも、星徒会長の一撃ならどう！？」"

[[dialogue]]
speaker = "unk"
# ディマイズブレイカー！
line = "ディマイズブレイカー！"

[[dialogue]]
speaker = "ウルスラ"
# 「おっとっと。会長さんの攻撃は、ちょっと重いですね。それでも私に傷をつけるには至りませんけれど」
line = "「おっとっと。会長さんの攻撃は、ちょっと重いですね。それでも私に傷をつけるには至りませんけれど」"

[[dialogue]]
speaker = "ウルスラ"
# 「まだまだサービスタイム継続中です。ご延長、なさいます？」
line = "「まだまだサービスタイム継続中です。ご延長、なさいます？」"

[[dialogue]]
speaker = "シャロン"
# 「もちろんですっ！　おかわりどうぞっ！」
line = "「もちろんですっ！　おかわりどうぞっ！」"

[[dialogue]]
speaker = "イレーナ"
# 「くっ……いくら当てても、全然効いてないっ……！　鉄板でもぶん殴ってるみたいな気分だわ……！」
line = "「くっ……いくら当てても、全然効いてないっ……！　鉄板でもぶん殴ってるみたいな気分だわ……！」"

[[dialogue]]
speaker = "シャロン"
# 「カカオ９９％どころか、こんなの１００％、いえ１０００％ですよーっ！」
line = "「カカオ９９％どころか、こんなの１００％、いえ１０００％ですよーっ！」"

[[dialogue]]
speaker = "ウルスラ"
# 「無駄だとお分かりになったようですし、そろそろサービスタイム終了でよろしいでしょうか？　反撃、行きますよ」
line = "「無駄だとお分かりになったようですし、そろそろサービスタイム終了でよろしいでしょうか？　反撃、行きますよ」"

[[dialogue]]
speaker = "ウルスラ"
# 「愛の一矢、受け止めてください。ラヴスティンガー<emoji=heart04>」
line = "「愛の一矢、受け止めてください。ラヴスティンガー<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
# 「──ッ！　あたしを狙って──」
line = "「──ッ！　あたしを狙って──」"

[[dialogue]]
speaker = "シャロン"
# 「危ない、イレーナさまーっ！」
line = "「危ない、イレーナさまーっ！」"

[[dialogue]]
speaker = "イレーナ"
# 「えっ、シャロンっ！？」
line = "「えっ、シャロンっ！？」"

[[dialogue]]
speaker = "シャロン"
# 「きゃあぁあぁぁっ！？」
line = "「きゃあぁあぁぁっ！？」"

[[dialogue]]
speaker = "unk"
# シャロンが身を挺してイレーナを……！
line = "シャロンが身を挺してイレーナを……！"

[[dialogue]]
speaker = "イレーナ"
# 「あんたねえ！　献身的なのもいい加減にしなさいよっ！」
line = "「あんたねえ！　献身的なのもいい加減にしなさいよっ！」"

[[dialogue]]
speaker = "シャロン"
# 「だ、大丈夫です、大したダメージはありません」
line = "「だ、大丈夫です、大したダメージはありません」"

[[dialogue]]
speaker = "イレーナ"
# 「直撃してるのに、大丈夫なわけないでしょう！？　自分の回復に専念して！」
line = "「直撃してるのに、大丈夫なわけないでしょう！？　自分の回復に専念して！」"

[[dialogue]]
speaker = "シャロン"
# 「私の身を案じてくださるなんて……あぁん、イレーナさま、しゅきぃっ……<emoji=heart04>」
line = "「私の身を案じてくださるなんて……あぁん、イレーナさま、しゅきぃっ……<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
# 「んなっ！？　ちょ、抱きつくなっ……シャロン、戦闘中に何してんの！？」
line = "「んなっ！？　ちょ、抱きつくなっ……シャロン、戦闘中に何してんの！？」"

[[dialogue]]
speaker = "シャロン"
# 「会長さま～<emoji=heart04>　イレーナさま～<emoji=heart04>　あぁあぁんっ、しゅきしゅきだいしゅきです～<emoji=heart04>」
line = "「会長さま～<emoji=heart04>　イレーナさま～<emoji=heart04>　あぁあぁんっ、しゅきしゅきだいしゅきです～<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 強烈すぎるハグ！？
line = "強烈すぎるハグ！？"

[[dialogue]]
speaker = "イレーナ"
# 「突然、抱きつき魔になるなんて……シャロンの様子がおかしいっ……！」
line = "「突然、抱きつき魔になるなんて……シャロンの様子がおかしいっ……！」"

[[dialogue]]
speaker = "イレーナ"
# 「ウルスラ！　あんた、何かやったわね！？」
line = "「ウルスラ！　あんた、何かやったわね！？」"

[[dialogue]]
speaker = "ウルスラ"
# 「はい<emoji=heart04>　これが私のハートの矢の効果です」
line = "「はい<emoji=heart04>　これが私のハートの矢の効果です」"

[[dialogue]]
speaker = "ウルスラ"
# 「私の矢を胸に受けると、その人の抱えている愛情が風船のように大きく膨れ上がるんです」
line = "「私の矢を胸に受けると、その人の抱えている愛情が風船のように大きく膨れ上がるんです」"

[[dialogue]]
speaker = "ウルスラ"
# 「シャロンさんは、会長さんにもイレーナさんにも好意を寄せていたようですから、御覧のように──」
line = "「シャロンさんは、会長さんにもイレーナさんにも好意を寄せていたようですから、御覧のように──」"

[[dialogue]]
speaker = "シャロン"
# 「あぁん、イレーナさま、イレーナさまぁ<emoji=heart04>　凛々しいお顔、気品ある佇まい、お慕い申し上げております、しゅきしゅきしゅきしゅきぃいぃぃっ<emoji=heart04>」
line = "「あぁん、イレーナさま、イレーナさまぁ<emoji=heart04>　凛々しいお顔、気品ある佇まい、お慕い申し上げております、しゅきしゅきしゅきしゅきぃいぃぃっ<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
# 「会長さまもお優しくって格好よくって、しゅきしゅきしゅきしゅきぃ～～っ<emoji=heart04>」
line = "「会長さまもお優しくって格好よくって、しゅきしゅきしゅきしゅきぃ～～っ<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
# 「何よそれ！？　もう星術っていうより新手の洗脳でしょ！？　ああ、もうっ！　離れなさいってばっ！　正気に返れっ！」
line = "「何よそれ！？　もう星術っていうより新手の洗脳でしょ！？　ああ、もうっ！　離れなさいってばっ！　正気に返れっ！」"

[[dialogue]]
speaker = "ウルスラ"
# 「お生憎さま。愛が満たされるまで、矢の効果は切れません。もうしばらくはかかるかと」
line = "「お生憎さま。愛が満たされるまで、矢の効果は切れません。もうしばらくはかかるかと」"

[[dialogue]]
speaker = "ウルスラ"
# 「そして、私の矢は１本だけではありません<emoji=heart04>」
line = "「そして、私の矢は１本だけではありません<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ぺろっと唇を舐めながら、ウルスラは矢をつがえ、再び弓を引き絞る。
line = "ぺろっと唇を舐めながら、ウルスラは矢をつがえ、再び弓を引き絞る。"

[[dialogue]]
speaker = "unk"
# 狙いは当然、イレーナの胸。
line = "狙いは当然、イレーナの胸。"

[[dialogue]]
speaker = "ウルスラ"
# 「イレーナさんに当てたら、どのような激しい愛情表現を見せてくれるのか……私、とっても興味があります<emoji=heart04>」
line = "「イレーナさんに当てたら、どのような激しい愛情表現を見せてくれるのか……私、とっても興味があります<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
# 「なっ……！？」
line = "「なっ……！？」"

[[dialogue]]
speaker = "ウルスラ"
# 「シャロンさん、２人を抱きとめて、動きを抑えててくださいねー<emoji=heart04>」
line = "「シャロンさん、２人を抱きとめて、動きを抑えててくださいねー<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
# 「しゅきしゅきしゅきしゅきしゅきーっ！」
line = "「しゅきしゅきしゅきしゅきしゅきーっ！」"

[[dialogue]]
speaker = "イレーナ"
# 「あー、もうっ！　こらシャロン！　離れなさーい！」
line = "「あー、もうっ！　こらシャロン！　離れなさーい！」"

[[dialogue]]
speaker = "unk"
# ごめん、シャロンっ！
line = "ごめん、シャロンっ！"

[[dialogue]]
speaker = "シャロン"
# 「きゃーっ！？　イレーナさまっ、会長さまっ、逃げちゃやですーっ！」
line = "「きゃーっ！？　イレーナさまっ、会長さまっ、逃げちゃやですーっ！」"

[[dialogue]]
speaker = "イレーナ"
# 「あんなの死んでも喰らってやるもんですか！　一旦距離を取るわよっ！」
line = "「あんなの死んでも喰らってやるもんですか！　一旦距離を取るわよっ！」"

[[dialogue]]
speaker = "ウルスラ"
# 「ふふふ、それで逃げられるとお思いですか？」
line = "「ふふふ、それで逃げられるとお思いですか？」"

[[dialogue]]
speaker = "ウルスラ"
# 「皆さんはもう学園どころか、この大聖堂からも出られないんです。逃げ場なんて、どこにもありませんよ<emoji=heart04>」
line = "「皆さんはもう学園どころか、この大聖堂からも出られないんです。逃げ場なんて、どこにもありませんよ<emoji=heart04>」"

[[dialogue]]
speaker = "ウルスラ"
# 「観念して……愛に素直になってください<emoji=heart04>」
line = "「観念して……愛に素直になってください<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 恍惚の笑みを浮かべて迫りくるウルスラ。その魔矢から、逃れられる術はあるのだろうか──
line = "恍惚の笑みを浮かべて迫りくるウルスラ。その魔矢から、逃れられる術はあるのだろうか──"
