[[dialogue]]
speaker = "unk"
# 第４話,力の代償,B
line = "第４話,力の代償,B"

[[dialogue]]
speaker = "ヴィーナス"
# 「外さないわよ！」
line = "「外さないわよ！」"

[[dialogue]]
speaker = "unk"
# 巨大モンスターすら呑み込む極大の光条がルヴィネを襲う。
line = "巨大モンスターすら呑み込む極大の光条がルヴィネを襲う。"

[[dialogue]]
speaker = "ルヴィネ"
# 「その程度？」
line = "「その程度？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「んなっ……！」
line = "「んなっ……！」"

[[dialogue]]
speaker = "unk"
# けれどルヴィネにはダメージがなく、極星の制服も汚れひとつない。
line = "けれどルヴィネにはダメージがなく、極星の制服も汚れひとつない。"

[[dialogue]]
speaker = "unk"
# さっきから俺たちの攻撃がまるっきり通用していなかった。
line = "さっきから俺たちの攻撃がまるっきり通用していなかった。"

[[dialogue]]
speaker = "unk"
# それでも今は間髪入れず攻撃を叩き込む……！
line = "それでも今は間髪入れず攻撃を叩き込む……！"

[[dialogue]]
speaker = "クロト"
# 「ヴィーナス！」
line = "「ヴィーナス！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええ、頼んだわよ、クロト！」
line = "「ええ、頼んだわよ、クロト！」"

[[dialogue]]
speaker = "unk"
# ヴィーナスから受け取った光を拳に宿し、ルヴィネに突進する──！
line = "ヴィーナスから受け取った光を拳に宿し、ルヴィネに突進する──！"

[[dialogue]]
speaker = "クロト"
# 「カオステンペスト──！！」
line = "「カオステンペスト──！！」"

[[dialogue]]
speaker = "unk"
# 拳に乗せた星力を至近距離で炸裂させ、嵐のような爆発が巻き起こる。
line = "拳に乗せた星力を至近距離で炸裂させ、嵐のような爆発が巻き起こる。"

[[dialogue]]
speaker = "unk"
# だが──
line = "だが──"

[[dialogue]]
speaker = "ルヴィネ"
# 「消えなさい」
line = "「消えなさい」"

[[dialogue]]
speaker = "クロト"
# 「──！？」
line = "「──！？」"

[[dialogue]]
speaker = "unk"
# ルヴィネの掌から鮮烈な光が放たれ、肉薄していた俺を吹き飛ばす。
line = "ルヴィネの掌から鮮烈な光が放たれ、肉薄していた俺を吹き飛ばす。"

[[dialogue]]
speaker = "クロト"
# 「がっ……！？」
line = "「がっ……！？」"

[[dialogue]]
speaker = "unk"
# 拳が届く距離まで接近していた俺が回避できるわけもなく、閃光を浴びて地面に打ち付けられた。
line = "拳が届く距離まで接近していた俺が回避できるわけもなく、閃光を浴びて地面に打ち付けられた。"

[[dialogue]]
speaker = "unk"
# さらにルヴィネのマントが白い光を宿して──
line = "さらにルヴィネのマントが白い光を宿して──"

[[dialogue]]
speaker = "ルヴィネ"
# 「裁きを下すわ」
line = "「裁きを下すわ」"

[[dialogue]]
speaker = "クロト"
# 「ぐあああぁああっ！！？」
line = "「ぐあああぁああっ！！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「きゃあああぁあっ！？」
line = "「きゃあああぁあっ！？」"

[[dialogue]]
speaker = "unk"
# 神々しさすら覚える光の爆撃が、俺たちを容赦なく打ちのめす。
line = "神々しさすら覚える光の爆撃が、俺たちを容赦なく打ちのめす。"

[[dialogue]]
speaker = "ヴィーナス"
# 「っ……はぁはぁ……今の、なんなの……」
line = "「っ……はぁはぁ……今の、なんなの……」"

[[dialogue]]
speaker = "クロト"
# 「くっ……はぁ……」
line = "「くっ……はぁ……」"

[[dialogue]]
speaker = "unk"
# 魔王の力が万全に使えないとはいえ、ルヴィネの力がここまでとは思わなかった。
line = "魔王の力が万全に使えないとはいえ、ルヴィネの力がここまでとは思わなかった。"

[[dialogue]]
speaker = "unk"
# チナも強敵ではあったが、会長であるルヴィネとは比較にもならない。
line = "チナも強敵ではあったが、会長であるルヴィネとは比較にもならない。"

[[dialogue]]
speaker = "クロト"
# （だけどルヴィネは何者なんだ……？）
line = "（だけどルヴィネは何者なんだ……？）"

[[dialogue]]
speaker = "クロト"
# （世界を救った英雄と呼ばれ、魔王でもなく、リクリエの使徒でもなく、単身でここまでの力を持つ……）
line = "（世界を救った英雄と呼ばれ、魔王でもなく、リクリエの使徒でもなく、単身でここまでの力を持つ……）"

[[dialogue]]
speaker = "クロト"
# （しかも彼女は変身すらしていない。ルヴィネは本当に星騎士なのか……？）
line = "（しかも彼女は変身すらしていない。ルヴィネは本当に星騎士なのか……？）"

[[dialogue]]
speaker = "ルヴィネ"
# 「緋宮クロトは魔王の力を十全に使えない……チナが言っていた通りね。やはりあの子は優秀だわ」
line = "「緋宮クロトは魔王の力を十全に使えない……チナが言っていた通りね。やはりあの子は優秀だわ」"

[[dialogue]]
speaker = "クロト"
# 「それでも──！」
line = "「それでも──！」"

[[dialogue]]
speaker = "unk"
# チナとの戦いと同じように、己の中で暴れる<ruby=リクリエ>破滅</ruby>の力を解き放つ。
line = "チナとの戦いと同じように、己の中で暴れる<ruby>破滅<rt>リクリエ</rt></ruby>の力を解き放つ。"

[[dialogue]]
speaker = "unk"
# 俺を食い破らんと内側から牙を突き立てる毒蛇を、拳に宿す──！
line = "俺を食い破らんと内側から牙を突き立てる毒蛇を、拳に宿す──！"

[[dialogue]]
speaker = "クロト"
# 「デッドリー……クラスターーーッ！！！」
line = "「デッドリー……クラスターーーッ！！！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「！？」
line = "「！？」"

[[dialogue]]
speaker = "unk"
# ルヴィネにようやく攻撃が届いた──
line = "ルヴィネにようやく攻撃が届いた──"

[[dialogue]]
speaker = "ルヴィネ"
# 「まだ動けたとは驚きね。しぶとさも魔王の才能なのかしら」
line = "「まだ動けたとは驚きね。しぶとさも魔王の才能なのかしら」"

[[dialogue]]
speaker = "unk"
# そう思ったのも束の間、ルヴィネは冷静な表情を取り戻し、マントを盾にして拳を受け止めていた。
line = "そう思ったのも束の間、ルヴィネは冷静な表情を取り戻し、マントを盾にして拳を受け止めていた。"

[[dialogue]]
speaker = "ルヴィネ"
# 「肉体の中に封じたリクリエを、自分の力にして技を繰り出す。……無茶をしたものね。チナにもそれで勝ったのかしら」
line = "「肉体の中に封じたリクリエを、自分の力にして技を繰り出す。……無茶をしたものね。チナにもそれで勝ったのかしら」"

[[dialogue]]
speaker = "ルヴィネ"
# 「でも苦しみたくないなら、あまりやらない方がいいわ」
line = "「でも苦しみたくないなら、あまりやらない方がいいわ」"

[[dialogue]]
speaker = "クロト"
# 「何……？」
line = "「何……？」"

[[dialogue]]
speaker = "unk"
# 戦場に場違いな、俺を気遣う言葉。
line = "戦場に場違いな、俺を気遣う言葉。"

[[dialogue]]
speaker = "unk"
# 次の瞬間──
line = "次の瞬間──"

[[dialogue]]
speaker = "クロト"
# 「……ッ！？」
line = "「……ッ！？」"

[[dialogue]]
speaker = "unk"
# 痛い。痛い。痛い。
line = "痛い。痛い。痛い。"

[[dialogue]]
speaker = "unk"
# 体を巡る血が焼けるように熱い。
line = "体を巡る血が焼けるように熱い。"

[[dialogue]]
speaker = "unk"
# 全身の神経に針を突き立てられたように、気の触れそうな痛みが絶え間なく襲ってくる。
line = "全身の神経に針を突き立てられたように、気の触れそうな痛みが絶え間なく襲ってくる。"

[[dialogue]]
speaker = "クロト"
# 「アッ……ガッ……アアアアッ！」
line = "「アッ……ガッ……アアアアッ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロト！？　大丈夫！？　しっかりして！？」
line = "「クロト！？　大丈夫！？　しっかりして！？」"

[[dialogue]]
speaker = "unk"
# あまりの激痛に、獣じみた叫びを上げてのたうち回る。
line = "あまりの激痛に、獣じみた叫びを上げてのたうち回る。"

[[dialogue]]
speaker = "unk"
# 敵の前で情けない──なんて考える余裕もなく、ただ悶えることしかできない。
line = "敵の前で情けない──なんて考える余裕もなく、ただ悶えることしかできない。"

[[dialogue]]
speaker = "ルヴィネ"
# 「リクリエなんかに頼って、何の代償もないと思った？　魔王とはいえ、世界を滅ぼす力を自分の中で飼おうとすれば、それくらい当然よ」
line = "「リクリエなんかに頼って、何の代償もないと思った？　魔王とはいえ、世界を滅ぼす力を自分の中で飼おうとすれば、それくらい当然よ」"

[[dialogue]]
speaker = "unk"
# ルヴィネが憐れむような視線で、這いつくばる俺を見下ろす。
line = "ルヴィネが憐れむような視線で、這いつくばる俺を見下ろす。"

[[dialogue]]
speaker = "ルヴィネ"
# 「もう苦しまなくていいわ。楽になりなさい」
line = "「もう苦しまなくていいわ。楽になりなさい」"

[[dialogue]]
speaker = "unk"
# そして慈悲の光が俺を包み込んで──
line = "そして慈悲の光が俺を包み込んで──"

[[dialogue]]
speaker = "unk"
# クロトたちがルヴィネと戦っている間、デネブの広場でも戦闘が起きていた。
line = "クロトたちがルヴィネと戦っている間、デネブの広場でも戦闘が起きていた。"

[[dialogue]]
speaker = "unk"
# 極星従騎が蹄で宙を蹴り、フィオナに襲いかかる。
line = "極星従騎が蹄で宙を蹴り、フィオナに襲いかかる。"

[[dialogue]]
speaker = "スレイプニル"
# 「ヒィン……！」
line = "「ヒィン……！」"

[[dialogue]]
speaker = "フィオナ"
# 「目を覚ましたら見知らぬ場所にいましたが、ここはおそらくデネブの流星市国……つまり敵地」
line = "「目を覚ましたら見知らぬ場所にいましたが、ここはおそらくデネブの流星市国……つまり敵地」"

[[dialogue]]
speaker = "フィオナ"
# 「迷い込んだアルタイルの星騎士は抹殺する……というわけですね」
line = "「迷い込んだアルタイルの星騎士は抹殺する……というわけですね」"

[[dialogue]]
speaker = "フィオナ"
# 「ですが、ここで倒れるわけにはいきません。──アストラルエッジ！」
line = "「ですが、ここで倒れるわけにはいきません。──アストラルエッジ！」"

[[dialogue]]
speaker = "unk"
# フィオナが召喚した剣の雨が降り注ぎ、四方八方から貫かれた極星従騎が消滅した。
line = "フィオナが召喚した剣の雨が降り注ぎ、四方八方から貫かれた極星従騎が消滅した。"

[[dialogue]]
speaker = "unk"
# だが──
line = "だが──"

[[dialogue]]
speaker = "unk"
# 極星従騎の数は増え続け、フィオナを圧殺せんと包囲する。
line = "極星従騎の数は増え続け、フィオナを圧殺せんと包囲する。"

[[dialogue]]
speaker = "フィオナ"
# 「くっ……！　魔王の力が使えれば……」
line = "「くっ……！　魔王の力が使えれば……」"

[[dialogue]]
speaker = "unk"
# フィオナが手に入れたアルケインコード──アルケインソーラーブレイズは魔王因子を強く活性化させる。
line = "フィオナが手に入れたアルケインコード──アルケインソーラーブレイズは魔王因子を強く活性化させる。"

[[dialogue]]
speaker = "unk"
# 魔王化によって強力無比な力を発揮できる反面、使用後は一時的に魔王因子が機能しなくなる欠点を持っていた。
line = "魔王化によって強力無比な力を発揮できる反面、使用後は一時的に魔王因子が機能しなくなる欠点を持っていた。"

[[dialogue]]
speaker = "unk"
# つまり今のフィオナは魔王ではなく、ただの１人の星騎士に過ぎない。
line = "つまり今のフィオナは魔王ではなく、ただの１人の星騎士に過ぎない。"

[[dialogue]]
speaker = "unk"
# 星徒会長は学園最強の星騎士とはいえ、戦力で圧倒されているのは明らかだった。
line = "星徒会長は学園最強の星騎士とはいえ、戦力で圧倒されているのは明らかだった。"

[[dialogue]]
speaker = "フィオナ"
# 「それでも……私は負けません！　プロミネンスフォース！」
line = "「それでも……私は負けません！　プロミネンスフォース！」"

[[dialogue]]
speaker = "unk"
# フィオナが星術を唱えると、虚空から光でできた剣や槍、矢が無数に呼び出される。
line = "フィオナが星術を唱えると、虚空から光でできた剣や槍、矢が無数に呼び出される。"

[[dialogue]]
speaker = "unk"
# 元よりフィオナの得意とする星術は召喚。劣勢といえど、多数を相手にするには適した星術だ。
line = "元よりフィオナの得意とする星術は召喚。劣勢といえど、多数を相手にするには適した星術だ。"

[[dialogue]]
speaker = "フィオナ"
# （必ず戻りますから……姉さん！）
line = "（必ず戻りますから……姉さん！）"

[[dialogue]]
speaker = "unk"
# デネブに飛ばされる前に再会した姉の顔が思い浮かぶ。魔界から帰ってからまだろくに話せていない。
line = "デネブに飛ばされる前に再会した姉の顔が思い浮かぶ。魔界から帰ってからまだろくに話せていない。"

[[dialogue]]
speaker = "unk"
# それに自分たちが憧れるヒーローなら、最後の最後まで諦めはしない……そう思って自分を奮い立たせる。
line = "それに自分たちが憧れるヒーローなら、最後の最後まで諦めはしない……そう思って自分を奮い立たせる。"

[[dialogue]]
speaker = "ホルン"
# 「クルルルーーッ！」
line = "「クルルルーーッ！」"

[[dialogue]]
speaker = "フィオナ"
# 「──！？」
line = "「──！？」"

[[dialogue]]
speaker = "unk"
# しかし剣と槍の防壁の隙間を突き破り、背後から極星従騎が突進する──！
line = "しかし剣と槍の防壁の隙間を突き破り、背後から極星従騎が突進する──！"

[[dialogue]]
speaker = "ナターシャ"
# 「や、こんにちは。あなた、流星学園のフィオナ会長だよね？」
line = "「や、こんにちは。あなた、流星学園のフィオナ会長だよね？」"

[[dialogue]]
speaker = "ナターシャ"
# 「私は散乃ナターシャ。新星学園の選挙管理員員会で、魔王を監視する聖庭園のエージェントだよ」
line = "「私は散乃ナターシャ。新星学園の選挙管理員員会で、魔王を監視する聖庭園のエージェントだよ」"

[[dialogue]]
speaker = "フィオナ"
# 「助けていただいてありがとうございます。あなたは味方……なんですよね？」
line = "「助けていただいてありがとうございます。あなたは味方……なんですよね？」"

[[dialogue]]
speaker = "ナターシャ"
# 「まぁね。同じアルタイルの星騎士同士、頑張って生き残ろうよ」
line = "「まぁね。同じアルタイルの星騎士同士、頑張って生き残ろうよ」"

[[dialogue]]
speaker = "unk"
# 背中合わせに極星従騎と対峙するフィオナとナターシャ。
line = "背中合わせに極星従騎と対峙するフィオナとナターシャ。"

[[dialogue]]
speaker = "unk"
# だが包囲網はさらに狭まっており、今まさに極星従騎が殺到しようとしている。
line = "だが包囲網はさらに狭まっており、今まさに極星従騎が殺到しようとしている。"

[[dialogue]]
speaker = "ナターシャ"
# 「ま、こっちが２人になっても不利なのは変わらないんだけどね。魔王の力でドカーンってやっつけられないの？」
line = "「ま、こっちが２人になっても不利なのは変わらないんだけどね。魔王の力でドカーンってやっつけられないの？」"

[[dialogue]]
speaker = "フィオナ"
# 「ごめんなさい。アルケインコードの反動で、今は魔王の力が使えないんです……」
line = "「ごめんなさい。アルケインコードの反動で、今は魔王の力が使えないんです……」"

[[dialogue]]
speaker = "ナターシャ"
# 「あらら。マジでピンチじゃん」
line = "「あらら。マジでピンチじゃん」"

[[dialogue]]
speaker = "ホルン"
# 「クルルーッ！」
line = "「クルルーッ！」"

[[dialogue]]
speaker = "スレイプニル"
# 「ブルルル……！」
line = "「ブルルル……！」"

[[dialogue]]
speaker = "ナターシャ"
# 「えーっと……敵の数が１……１０……ダメだ、数えられないね。絶体絶命かも？」
line = "「えーっと……敵の数が１……１０……ダメだ、数えられないね。絶体絶命かも？」"

[[dialogue]]
speaker = "unk"
# 周囲を取り囲む極星従騎の数は、ゆうに１００体を超える。
line = "周囲を取り囲む極星従騎の数は、ゆうに１００体を超える。"

[[dialogue]]
speaker = "unk"
# そして極星従騎が一斉に攻撃態勢に入り──
line = "そして極星従騎が一斉に攻撃態勢に入り──"

[[dialogue]]
speaker = "フィオナ"
# 「ッ──！？」
line = "「ッ──！？」"

[[dialogue]]
speaker = "unk"
# フィオナたちに攻撃が届く寸前、何者かの斬撃が極星従騎の群れを切り裂く。
line = "フィオナたちに攻撃が届く寸前、何者かの斬撃が極星従騎の群れを切り裂く。"

[[dialogue]]
speaker = "unk"
# 閃光が晴れると、敵の影はひとつ残らず消えていた。
line = "閃光が晴れると、敵の影はひとつ残らず消えていた。"

[[dialogue]]
speaker = "ナターシャ"
# 「おやまた増援？」
line = "「おやまた増援？」"

[[dialogue]]
speaker = "フィオナ"
# 「──！？　あなたは──」
line = "「──！？　あなたは──」"
