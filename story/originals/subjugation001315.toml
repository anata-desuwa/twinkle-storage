[[dialogue]]
speaker = "マグダレナ"
# 「ああ……どうして世界は３つに分かたれた……」
line = "「ああ……どうして世界は３つに分かたれた……」"

[[dialogue]]
speaker = "マグダレナ"
# 「世界は１つでいい……秩序で支配された、１つの世界があれば……」
line = "「世界は１つでいい……秩序で支配された、１つの世界があれば……」"

[[dialogue]]
speaker = "フィオナ"
# 「マグダレナ様らしくないお言葉ですね。世界はひとつになれないからこそ、“領域”を守るあなたのお力が必要なのです」
line = "「マグダレナ様らしくないお言葉ですね。世界はひとつになれないからこそ、“領域”を守るあなたのお力が必要なのです」"

[[dialogue]]
speaker = "フィオナ"
# 「姉さん！」
line = "「姉さん！」"

[[dialogue]]
speaker = "アポロ"
# 「ああ、あのセリフだな！」
line = "「ああ、あのセリフだな！」"

[[dialogue]]
speaker = "２人"
# 「天空に座す炎の星よ──私に正義の力を！」
line = "「天空に座す炎の星よ──私に正義の力を！」"

[[dialogue]]
speaker = "アポロ"
# 「悪を断つ刃──メテオライトキャリバー！！」
line = "「悪を断つ刃──メテオライトキャリバー！！」"

[[dialogue]]
speaker = "マグダレナ"
# 「──ッ！」
line = "「──ッ！」"

[[dialogue]]
speaker = "アポロ"
# 「ちなみにさっきのは流星ライダーアポロの前半の決めゼリフだ。２９話で後半バージョンに変わったけどな」
line = "「ちなみにさっきのは流星ライダーアポロの前半の決めゼリフだ。２９話で後半バージョンに変わったけどな」"

[[dialogue]]
speaker = "フィオナ"
# 「違います、変わったのは２８話ですよ」
line = "「違います、変わったのは２８話ですよ」"

[[dialogue]]
speaker = "アポロ"
# 「あ、そうだったか。さすがフィオナ、そこまで覚えてるんだな」
line = "「あ、そうだったか。さすがフィオナ、そこまで覚えてるんだな」"

[[dialogue]]
speaker = "フィオナ"
# 「あ……つい……」
line = "「あ……つい……」"

[[dialogue]]
speaker = "梨緒"
# 「魔女イニシュ、まだ戦えるか？」
line = "「魔女イニシュ、まだ戦えるか？」"

[[dialogue]]
speaker = "イニシュ"
# 「当然です。世界の滅びは認めない。それが私の──魔女の意志です」
line = "「当然です。世界の滅びは認めない。それが私の──魔女の意志です」"

[[dialogue]]
speaker = "イニシュ"
# 「私の魔力を回します。コントロールをあなたに」
line = "「私の魔力を回します。コントロールをあなたに」"

[[dialogue]]
speaker = "梨緒"
# 「君の力、受け取った。貫け──ディヴァインサンダーボルト！」
line = "「君の力、受け取った。貫け──ディヴァインサンダーボルト！」"

[[dialogue]]
speaker = "マグダレナ"
# 「ぐ……が……！」
line = "「ぐ……が……！」"

[[dialogue]]
speaker = "マグダレナ"
# 「混沌の先に、秩序を……静寂なる１つの世界を……」
line = "「混沌の先に、秩序を……静寂なる１つの世界を……」"

[[dialogue]]
speaker = "unk"
# ミルフィー、今度こそ終わらせるぞ！
line = "ミルフィー、今度こそ終わらせるぞ！"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええ、あなたに託すわ！」
line = "「ええ、あなたに託すわ！」"

[[dialogue]]
speaker = "ヒヨ"
# 「姐さん！　全力ぶつけるぜぃっ！」
line = "「姐さん！　全力ぶつけるぜぃっ！」"

[[dialogue]]
speaker = "ミルフィー"
# 「ありがとう、みんなの温かい力、伝わったよ！」
line = "「ありがとう、みんなの温かい力、伝わったよ！」"

[[dialogue]]
speaker = "ミルフィー"
# 「闇を<ruby=うが>穿</ruby>て、星の光──エンシェント・スターストリーム！！」
line = "「闇を<ruby>穿<rt>うが</rt></ruby>て、星の光──エンシェント・スターストリーム！！」"

[[dialogue]]
speaker = "マグダレナ"
# 「ああ──」
line = "「ああ──」"

[[dialogue]]
speaker = "マグダレナ"
# 「アアアーーーーーッ！！！」
line = "「アアアーーーーーッ！！！」"

[[dialogue]]
speaker = "マグダレナ"
# 「あぁ……これは……」
line = "「あぁ……これは……」"

[[dialogue]]
speaker = "マグダレナ"
# 「皆様のおかげで、元に戻れたようですね……」
line = "「皆様のおかげで、元に戻れたようですね……」"

[[dialogue]]
speaker = "マグダレナ"
# 「本当にありがとうございました、皆様……そして……ミルフィー……」
line = "「本当にありがとうございました、皆様……そして……ミルフィー……」"

[[dialogue]]
speaker = "ミルフィー"
# 「マグダレナ様……そんな、畏れ多いです……」
line = "「マグダレナ様……そんな、畏れ多いです……」"

[[dialogue]]
speaker = "コハルコ"
# 『堕天使マグダレナおよび神殿周囲のモンスター反応消失。流星市国で起きていた異常現象も収束しました』
line = "『堕天使マグダレナおよび神殿周囲のモンスター反応消失。流星市国で起きていた異常現象も収束しました』"

[[dialogue]]
speaker = "コハルコ"
# 『堕天使５体全ての撃破を確認。オペレーション・ペンタグラム──完了です！』
line = "『堕天使５体全ての撃破を確認。オペレーション・ペンタグラム──完了です！』"

[[dialogue]]
speaker = "ヒヨ"
# 「おっしゃああっ！」
line = "「おっしゃああっ！」"

[[dialogue]]
speaker = "ミルフィー"
# 「やったぁ！」
line = "「やったぁ！」"

[[dialogue]]
speaker = "ウェンディ"
# 「ふぅ、何とかなりましたね……。始末書のことは……今は忘れましょう……」
line = "「ふぅ、何とかなりましたね……。始末書のことは……今は忘れましょう……」"

[[dialogue]]
speaker = "アポロ"
# 「正義は勝つ！　ということだ！　ハーッハッハッハ！」
line = "「正義は勝つ！　ということだ！　ハーッハッハッハ！」"

[[dialogue]]
speaker = "アポロ"
# 「ま、これで少しくらいは罪滅ぼしできたかな」
line = "「ま、これで少しくらいは罪滅ぼしできたかな」"

[[dialogue]]
speaker = "フィオナ"
# 「姉さん……」
line = "「姉さん……」"

[[dialogue]]
speaker = "アポロ"
# 「そんな寂しそうな顔をするな。今日はみんなの役に立てて嬉しかったぞ」
line = "「そんな寂しそうな顔をするな。今日はみんなの役に立てて嬉しかったぞ」"

[[dialogue]]
speaker = "フィオナ"
# 「……はい。帰ったらゆっくり休みましょう」
line = "「……はい。帰ったらゆっくり休みましょう」"

[[dialogue]]
speaker = "梨緒"
# 「緋宮会長、体に変化はないか？」
line = "「緋宮会長、体に変化はないか？」"

[[dialogue]]
speaker = "unk"
# ああ、疲れた以外は何ともないよ
line = "ああ、疲れた以外は何ともないよ"

[[dialogue]]
speaker = "梨緒"
# 「それはみんな同じだ。その様子なら平気そうだな」
line = "「それはみんな同じだ。その様子なら平気そうだな」"

[[dialogue]]
speaker = "イニシュ"
# 「皆さんお疲れ様でした」
line = "「皆さんお疲れ様でした」"

[[dialogue]]
speaker = "イニシュ"
# 「──と、言いたいところですが、残念ながら休息している時間はありません。今すぐ帰還しなければ、当分世界樹が使えなくなってしまいます」
line = "「──と、言いたいところですが、残念ながら休息している時間はありません。今すぐ帰還しなければ、当分世界樹が使えなくなってしまいます」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それって魔界に取り残されるってことじゃない！　大交流まで帰れないとかたまったもんじゃないわ！」
line = "「それって魔界に取り残されるってことじゃない！　大交流まで帰れないとかたまったもんじゃないわ！」"

[[dialogue]]
speaker = "イニシュ"
# 「では世界樹を開きますが、本来想定していない人数ですので、私の魔力でも世界樹を繋げられる時間はわずかです。全速力での帰還を推奨します」
line = "「では世界樹を開きますが、本来想定していない人数ですので、私の魔力でも世界樹を繋げられる時間はわずかです。全速力での帰還を推奨します」"

[[dialogue]]
speaker = "ヴィーナス"
# 「もうくたくたなのに、かっ飛ばさないといけないの？　最後まで疲れるわね～」
line = "「もうくたくたなのに、かっ飛ばさないといけないの？　最後まで疲れるわね～」"

[[dialogue]]
speaker = "ミルフィー"
# 「はぁ～、ほんとにへとへと……帰ったらカスタードのたい焼き食べたいなぁ～」
line = "「はぁ～、ほんとにへとへと……帰ったらカスタードのたい焼き食べたいなぁ～」"

[[dialogue]]
speaker = "ヒヨ"
# 「あたしはあんこ派でい！　いくら姐さんでもそこは譲れねえぜ」
line = "「あたしはあんこ派でい！　いくら姐さんでもそこは譲れねえぜ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私はどっちも好きだけど、栗あんとかもいいわよね。みんなは？」
line = "「私はどっちも好きだけど、栗あんとかもいいわよね。みんなは？」"

[[dialogue]]
speaker = "アポロ"
# 「あたしはチョコクリームも好きだぞ！」
line = "「あたしはチョコクリームも好きだぞ！」"

[[dialogue]]
speaker = "フィオナ"
# 「抹茶あんも捨てがたいです」
line = "「抹茶あんも捨てがたいです」"

[[dialogue]]
speaker = "unk"
# ツナとかもあり
line = "ツナとかもあり"

[[dialogue]]
speaker = "梨緒"
# 「私は……そうだな、以前どこかで食べたクリームチーズ入りが美味しかったな」
line = "「私は……そうだな、以前どこかで食べたクリームチーズ入りが美味しかったな」"

[[dialogue]]
speaker = "イニシュ"
# 「私はラーメンがいいです」
line = "「私はラーメンがいいです」"

[[dialogue]]
speaker = "ヒヨ"
# 「たい焼き関係ねえじゃねえか！」
line = "「たい焼き関係ねえじゃねえか！」"

[[dialogue]]
speaker = "ミルフィー"
# 「ふふふっ、たくさん動いてお腹減ったし、たまにはラーメンもいいかなー」
line = "「ふふふっ、たくさん動いてお腹減ったし、たまにはラーメンもいいかなー」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ま、たい焼きでもラーメンでも好きなもの食べればいいわ。私たちが守った世界だもの」
line = "「ま、たい焼きでもラーメンでも好きなもの食べればいいわ。私たちが守った世界だもの」"

[[dialogue]]
speaker = "ヴィーナス"
# 「さ、帰るわよ！　きっとみんな待ちくたびれてるわ！」
line = "「さ、帰るわよ！　きっとみんな待ちくたびれてるわ！」"
