[[dialogue]]
speaker = "unk"
# 第３話,恩返しチョコ,P
line = "第３話,恩返しチョコ,P"

[[dialogue]]
speaker = "unk"
# 俺とせつなが恋人になってから迎えた、初めてのバレンタイン。
line = "俺とせつなが恋人になってから迎えた、初めてのバレンタイン。"

[[dialogue]]
speaker = "unk"
# 色々あったが、『主様チョコ』兼『本命チョコ』を無事受け取ることができた。その翌日──
line = "色々あったが、『主様チョコ』兼『本命チョコ』を無事受け取ることができた。その翌日──"

[[dialogue]]
speaker = "せつな"
# 「それではさっそく、紫桜の里やメイド隊の仲間に配るチョコレートを作っていくでござる！」
line = "「それではさっそく、紫桜の里やメイド隊の仲間に配るチョコレートを作っていくでござる！」"

[[dialogue]]
speaker = "せつな"
# 「えへへぇ～♪　主様と厨房に並んでいると、ちょっと新婚さん気分でござる」
line = "「えへへぇ～♪　主様と厨房に並んでいると、ちょっと新婚さん気分でござる」"

[[dialogue]]
speaker = "せつな"
# 「へ？　せつなも恋愛の話がちょっとはできるようになってきた、でござるか……？」
line = "「へ？　せつなも恋愛の話がちょっとはできるようになってきた、でござるか……？」"

[[dialogue]]
speaker = "せつな"
# 「た、確かに……！　公共の場で新婚さんごっこなんて、せつなはすっかり露出狂の変態さんになってしまったでござる！？」
line = "「た、確かに……！　公共の場で新婚さんごっこなんて、せつなはすっかり露出狂の変態さんになってしまったでござる！？」"

[[dialogue]]
speaker = "unk"
# 恋愛は恥ずかしいことじゃないんだって！
line = "恋愛は恥ずかしいことじゃないんだって！"

[[dialogue]]
speaker = "せつな"
# 「いえいえ……！　もうわかってるでござりまする！　これはあくまで、せつなの個人的な価値感の話……」
line = "「いえいえ……！　もうわかってるでござりまする！　これはあくまで、せつなの個人的な価値感の話……」"

[[dialogue]]
speaker = "せつな"
# 「とはいえ、せつなの中では、エッチな話をするよりも、恋愛の話をする方が恥ずかしいというのは、変えられない事実でござる」
line = "「とはいえ、せつなの中では、エッチな話をするよりも、恋愛の話をする方が恥ずかしいというのは、変えられない事実でござる」"

[[dialogue]]
speaker = "せつな"
# 「はい♪　せつなの個性をありのまま受け入れてくださる主様が、せつなは大好きでござる<emoji=heart04>」
line = "「はい♪　せつなの個性をありのまま受け入れてくださる主様が、せつなは大好きでござる<emoji=heart04>」"

[[dialogue]]
speaker = "せつな"
# 「はっ！？　ま、またでござる……。主様のことが大好きだったのは、最初からあまり変わっていないでござるが、それを口にするハードルが最近下がりまくってるでござる」
line = "「はっ！？　ま、またでござる……。主様のことが大好きだったのは、最初からあまり変わっていないでござるが、それを口にするハードルが最近下がりまくってるでござる」"

[[dialogue]]
speaker = "せつな"
# 「もちろん、嫌ではないでござる……！」
line = "「もちろん、嫌ではないでござる……！」"

[[dialogue]]
speaker = "せつな"
# 「むしろ、せつなの体どころか、心まで主様に調教されてしまったようで、ちょっと興奮するでござる<emoji=heart04>」
line = "「むしろ、せつなの体どころか、心まで主様に調教されてしまったようで、ちょっと興奮するでござる<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# これそもそも何の話だったんだ！？
line = "これそもそも何の話だったんだ！？"

[[dialogue]]
speaker = "unk"
# 人聞きが悪すぎる上に、
line = "人聞きが悪すぎる上に、"

[[dialogue]]
speaker = "せつな"
# 「そうでござる！　公共の場でイチャイチャばかりしていたら、せっかくこの場を貸してくださった<ruby=けいか>蛍火</ruby>殿にも面目が立たないでござる」
line = "「そうでござる！　公共の場でイチャイチャばかりしていたら、せっかくこの場を貸してくださった<ruby>蛍火<rt>けいか</rt></ruby>殿にも面目が立たないでござる」"

[[dialogue]]
speaker = "せつな"
# 「さあ、主様！　さっそくチョコレートを作っていくでござる！　蘭美殿に仕込まれたせつなのチョコレートさばき、披露するでござりまする」
line = "「さあ、主様！　さっそくチョコレートを作っていくでござる！　蘭美殿に仕込まれたせつなのチョコレートさばき、披露するでござりまする」"

[[dialogue]]
speaker = "せつな"
# 「できたでござる～♪」
line = "「できたでござる～♪」"

[[dialogue]]
speaker = "unk"
# 特訓しただけあって、流石の腕前だった
line = "特訓しただけあって、流石の腕前だった"

[[dialogue]]
speaker = "せつな"
# 「いえいえ、主様のサポートあってのものでござる」
line = "「いえいえ、主様のサポートあってのものでござる」"

[[dialogue]]
speaker = "せつな"
# 「せつなも集中して１つのチョコレートだけ作るなら、流石にもうミスはしないでござるが……」
line = "「せつなも集中して１つのチョコレートだけ作るなら、流石にもうミスはしないでござるが……」"

[[dialogue]]
speaker = "せつな"
# 「数十個レベルのチョコレートを手際よく作るのは、まだ難しいでござる」
line = "「数十個レベルのチョコレートを手際よく作るのは、まだ難しいでござる」"

[[dialogue]]
speaker = "せつな"
# 「材料を入れ忘れたり、手順を間違えそうになったり、調理器具を落としそうになったり……」
line = "「材料を入れ忘れたり、手順を間違えそうになったり、調理器具を落としそうになったり……」"

[[dialogue]]
speaker = "せつな"
# 「そういうミスをせつながしそうになるたびに、さりげなく手助けしてくれた、主様のお陰でござりまする！」
line = "「そういうミスをせつながしそうになるたびに、さりげなく手助けしてくれた、主様のお陰でござりまする！」"

[[dialogue]]
speaker = "unk"
# チョコ星術も発動しそうになってたしね……
line = "チョコ星術も発動しそうになってたしね……"

[[dialogue]]
speaker = "せつな"
# 「面目次第もないでござる……」
line = "「面目次第もないでござる……」"

[[dialogue]]
speaker = "せつな"
# 「暴発しないように制御することはできるようになったでござるが、別のことに意識を取られていると、やっぱり勝手に発動してチョコがゴーレムになってしまうみたいでござる」
line = "「暴発しないように制御することはできるようになったでござるが、別のことに意識を取られていると、やっぱり勝手に発動してチョコがゴーレムになってしまうみたいでござる」"

[[dialogue]]
speaker = "unk"
# あれ、このミニゴーレムは？
line = "あれ、このミニゴーレムは？"

[[dialogue]]
speaker = "unk"
# 相変わらず原理不明の星術だ……
line = "相変わらず原理不明の星術だ……"

[[dialogue]]
speaker = "せつな"
# 「これは星術ではなく、せつなが自分で作ったチョコでござる！」
line = "「これは星術ではなく、せつなが自分で作ったチョコでござる！」"

[[dialogue]]
speaker = "せつな"
# 「紫桜の里にいる師匠には、このゴーレムチョコを贈るでござりまする！」
line = "「紫桜の里にいる師匠には、このゴーレムチョコを贈るでござりまする！」"

[[dialogue]]
speaker = "せつな"
# 「はい♪　九浄家メイド隊で学んだこと、新星学園で学んだこと、そして主様から学んだことを手紙に書いて、チョコと一緒に送るのでござりまする」
line = "「はい♪　九浄家メイド隊で学んだこと、新星学園で学んだこと、そして主様から学んだことを手紙に書いて、チョコと一緒に送るのでござりまする」"

[[dialogue]]
speaker = "せつな"
# 「痕跡が残る故、忍者はあまり手紙という手段を用いないでござる。連絡手段として使う時も、読んだら燃やすのが鉄則でござる」
line = "「痕跡が残る故、忍者はあまり手紙という手段を用いないでござる。連絡手段として使う時も、読んだら燃やすのが鉄則でござる」"

[[dialogue]]
speaker = "せつな"
# 「しかし、今はヒトとヒトが争う時代ではござりませぬ！　であればこそ、忍者であっても手紙を避ける理由はないのでござる」
line = "「しかし、今はヒトとヒトが争う時代ではござりませぬ！　であればこそ、忍者であっても手紙を避ける理由はないのでござる」"

[[dialogue]]
speaker = "せつな"
# 「なにより、せつなは主様からいただいた恋文が、本当に本当に、嬉しかったのでござる！」
line = "「なにより、せつなは主様からいただいた恋文が、本当に本当に、嬉しかったのでござる！」"

[[dialogue]]
speaker = "せつな"
# 「大切な想いを<ruby=ふみ>文</ruby>にして送ると、もらったヒトはそれをいつでも読み返すことができまする。そんな当たり前で大切なことを、せつなは主様から教えていただいたでござる」
line = "「大切な想いを<ruby>文<rt>ふみ</rt></ruby>にして送ると、もらったヒトはそれをいつでも読み返すことができまする。そんな当たり前で大切なことを、せつなは主様から教えていただいたでござる」"

[[dialogue]]
speaker = "せつな"
# 「だから今度は、せつなが師匠に教える番でござる！」
line = "「だから今度は、せつなが師匠に教える番でござる！」"

[[dialogue]]
speaker = "unk"
# きっと喜んでもらえると思う
line = "きっと喜んでもらえると思う"

[[dialogue]]
speaker = "せつな"
# 「はいでござる♪」
line = "「はいでござる♪」"

[[dialogue]]
speaker = "せつな"
# 「……とは言ったものの、せつなは文章を書くのが苦手でござる」
line = "「……とは言ったものの、せつなは文章を書くのが苦手でござる」"

[[dialogue]]
speaker = "せつな"
# 「主様、今度２人で、師匠に送る手紙の文章を考えて欲しいでござる……」
line = "「主様、今度２人で、師匠に送る手紙の文章を考えて欲しいでござる……」"

[[dialogue]]
speaker = "unk"
# 上目遣いで可愛いおねだりをしてくる恋人の頭を、「もちろん」という言葉と共に撫でた。
line = "上目遣いで可愛いおねだりをしてくる恋人の頭を、「もちろん」という言葉と共に撫でた。"

[[dialogue]]
speaker = "せつな"
# 「えへへぇ～♪　主様、大好きでござる<emoji=heart04>」
line = "「えへへぇ～♪　主様、大好きでござる<emoji=heart04>」"
