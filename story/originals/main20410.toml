[[dialogue]]
speaker = "unk"
# 第１０話,女帝・煌嶺,B
line = "第１０話,女帝・煌嶺,B"

[[dialogue]]
speaker = "クロト"
# 「煌嶺──！？　君があの……！？」
line = "「煌嶺──！？　君があの……！？」"

[[dialogue]]
speaker = "unk"
# さっきまでの彼女は歳相応……それどころか、ところどころ幼さが垣間見える女の子に見えた。
line = "さっきまでの彼女は歳相応……それどころか、ところどころ幼さが垣間見える女の子に見えた。"

[[dialogue]]
speaker = "unk"
# だが今目の前にいる彼女は、見知らぬ者でも思わずひれ伏すような威圧感を放っており、皇帝という名乗りが嘘ではないのだと理解させられる。
line = "だが今目の前にいる彼女は、見知らぬ者でも思わずひれ伏すような威圧感を放っており、皇帝という名乗りが嘘ではないのだと理解させられる。"

[[dialogue]]
speaker = "煌嶺"
# 「遠い親戚といったであろう。３０００年の時を超え、自身の末裔と対面した気分はどうだ？　魔王ラクシス」
line = "「遠い親戚といったであろう。３０００年の時を超え、自身の末裔と対面した気分はどうだ？　魔王ラクシス」"

[[dialogue]]
speaker = "クロト"
# 「そこまで知っているのか。──で、魔王の俺に用なのか？」
line = "「そこまで知っているのか。──で、魔王の俺に用なのか？」"

[[dialogue]]
speaker = "煌嶺"
# 「なぁに、遊行の最中に偶然出くわしただけだ」
line = "「なぁに、遊行の最中に偶然出くわしただけだ」"

[[dialogue]]
speaker = "煌嶺"
# 「だがちょうどいい。貴様に問うておこう。デネブを滅ぼす気があるのか──な」
line = "「だがちょうどいい。貴様に問うておこう。デネブを滅ぼす気があるのか──な」"

[[dialogue]]
speaker = "クロト"
# 「──！」
line = "「──！」"

[[dialogue]]
speaker = "unk"
# 宝石のような瞳が、冷たい視線を俺に向ける。
line = "宝石のような瞳が、冷たい視線を俺に向ける。"

[[dialogue]]
speaker = "unk"
# 心臓を突くように鋭い──けれどその心を魅了する、蠱惑的な眼差しだ。
line = "心臓を突くように鋭い──けれどその心を魅了する、蠱惑的な眼差しだ。"

[[dialogue]]
speaker = "煌嶺"
# 「まさか魔王ともあろう者が、デネブと戦うことに臆しているのではあるまいな？」
line = "「まさか魔王ともあろう者が、デネブと戦うことに臆しているのではあるまいな？」"

[[dialogue]]
speaker = "煌嶺"
# 「妾はデネブを滅ぼすことも<ruby=いと>厭</ruby>わん。<ruby=きゃつ>彼奴</ruby>らがしかけてきた戦だ。受けて立って何が悪い？」
line = "「妾はデネブを滅ぼすことも<ruby>厭<rt>いと</rt></ruby>わん。<ruby>彼奴<rt>きゃつ</rt></ruby>らがしかけてきた戦だ。受けて立って何が悪い？」"

[[dialogue]]
speaker = "クロト"
# 「デネブの自分自身と殺し合うことになっても？」
line = "「デネブの自分自身と殺し合うことになっても？」"

[[dialogue]]
speaker = "煌嶺"
# 「ならばなおのことだ。煌嶺の名は受け継ぐものとはいえ、現世に煌嶺は２人もいらぬ」
line = "「ならばなおのことだ。煌嶺の名は受け継ぐものとはいえ、現世に煌嶺は２人もいらぬ」"

[[dialogue]]
speaker = "unk"
# この戦いが生存競争であるというなら、彼女の言うことも間違いではない。
line = "この戦いが生存競争であるというなら、彼女の言うことも間違いではない。"

[[dialogue]]
speaker = "unk"
# だが──
line = "だが──"

[[dialogue]]
speaker = "クロト"
# 「俺はあなたとは違う」
line = "「俺はあなたとは違う」"

[[dialogue]]
speaker = "クロト"
# 「俺は守るために星騎士になった。だから全て救う。アルタイルも、デネブも」
line = "「俺は守るために星騎士になった。だから全て救う。アルタイルも、デネブも」"

[[dialogue]]
speaker = "煌嶺"
# 「それができぬから戦いになるのだろう？　戦えぬというなら、それができる会長に代わるべきではないか？」
line = "「それができぬから戦いになるのだろう？　戦えぬというなら、それができる会長に代わるべきではないか？」"

[[dialogue]]
speaker = "クロト"
# 「星騎士の責務は命を守ることだ。それは譲れない」
line = "「星騎士の責務は命を守ることだ。それは譲れない」"

[[dialogue]]
speaker = "煌嶺"
# 「綺麗事を言うものだな。妾が学園長になったら、まずは星徒会長を挿げ替えてやろう」
line = "「綺麗事を言うものだな。妾が学園長になったら、まずは星徒会長を挿げ替えてやろう」"

[[dialogue]]
speaker = "クロト"
# 「できるならそうすればいい。後のことはヘレナちゃんとシノさんに任せてる」
line = "「できるならそうすればいい。後のことはヘレナちゃんとシノさんに任せてる」"

[[dialogue]]
speaker = "煌嶺"
# 「シノ……？　それが九浄ヘレナが連れてきた学園長候補か。次の理事会で見えるのを楽しみにしておくとしよう」
line = "「シノ……？　それが九浄ヘレナが連れてきた学園長候補か。次の理事会で見えるのを楽しみにしておくとしよう」"

[[dialogue]]
speaker = "煌嶺"
# 「──ああそうだ、ついでに言伝を頼もうか。メイプルめに伝えておくことがあってな」
line = "「──ああそうだ、ついでに言伝を頼もうか。メイプルめに伝えておくことがあってな」"

[[dialogue]]
speaker = "クロト"
# 「メイプルに？」
line = "「メイプルに？」"

[[dialogue]]
speaker = "unk"
# メイプルは煌嶺の治めるキュリオスを勝手に出てきた身だ。
line = "メイプルは煌嶺の治めるキュリオスを勝手に出てきた身だ。"

[[dialogue]]
speaker = "unk"
# 彼女を強制的に連れ戻す、あるいは罰するつもりではないかと警戒を強める。
line = "彼女を強制的に連れ戻す、あるいは罰するつもりではないかと警戒を強める。"

[[dialogue]]
speaker = "煌嶺"
# 「魔王になるというやつの言葉を笑ったが、まさか流星市国に密航するとは思わなかった。妾が先を越されるとはな」
line = "「魔王になるというやつの言葉を笑ったが、まさか流星市国に密航するとは思わなかった。妾が先を越されるとはな」"

[[dialogue]]
speaker = "煌嶺"
# 「分不相応で滑稽な野望には変わりないが、その覚悟は舐めていた。いささか見直したぞ」
line = "「分不相応で滑稽な野望には変わりないが、その覚悟は舐めていた。いささか見直したぞ」"

[[dialogue]]
speaker = "煌嶺"
# 「妾はやつを追わぬ。好きに生きよと伝えろ」
line = "「妾はやつを追わぬ。好きに生きよと伝えろ」"

[[dialogue]]
speaker = "クロト"
# 「意外だな。暴君で有名な煌嶺なら、メイプルを処罰するのかと思ったけど」
line = "「意外だな。暴君で有名な煌嶺なら、メイプルを処罰するのかと思ったけど」"

[[dialogue]]
speaker = "煌嶺"
# 「ああ、責めはあやつの両親に負わせたのでな」
line = "「ああ、責めはあやつの両親に負わせたのでな」"

[[dialogue]]
speaker = "クロト"
# 「何……？」
line = "「何……？」"

[[dialogue]]
speaker = "煌嶺"
# 「メイプルはキュリオスの秘宝たるアルケインコードを持ち出した。あれは強大な兵器になりうるもの」
line = "「メイプルはキュリオスの秘宝たるアルケインコードを持ち出した。あれは強大な兵器になりうるもの」"

[[dialogue]]
speaker = "煌嶺"
# 「我がキュリオスを脅かすこともありうるのだ。極刑は当然であろう？」
line = "「我がキュリオスを脅かすこともありうるのだ。極刑は当然であろう？」"

[[dialogue]]
speaker = "煌嶺"
# 「だがメイプルの親が、泣きながら地面に頭を擦り付けて、許してくれと詫びるものでな。代わりに両親を処すことにしたのだ」
line = "「だがメイプルの親が、泣きながら地面に頭を擦り付けて、許してくれと詫びるものでな。代わりに両親を処すことにしたのだ」"

[[dialogue]]
speaker = "煌嶺"
# 「確かあれは……メイプルがキュリオスを出ていったばかりの頃だったか。２人仲良く魔獣の群れに喰わせてやった」
line = "「確かあれは……メイプルがキュリオスを出ていったばかりの頃だったか。２人仲良く魔獣の群れに喰わせてやった」"

[[dialogue]]
speaker = "煌嶺"
# 「生きたまま牙を突き立てられ、臓腑を貪られ、苦悶の声を上げる様は、なかなか愉快であったぞ」
line = "「生きたまま牙を突き立てられ、臓腑を貪られ、苦悶の声を上げる様は、なかなか愉快であったぞ」"

[[dialogue]]
speaker = "クロト"
# 「な──！！」
line = "「な──！！」"

[[dialogue]]
speaker = "unk"
# 瞬間、血が沸くように熱くなる。
line = "瞬間、血が沸くように熱くなる。"

[[dialogue]]
speaker = "unk"
# あまりに無惨な行為と、それを平然と言ってのける冷徹さに、怒りを覚えずにはいられない。
line = "あまりに無惨な行為と、それを平然と言ってのける冷徹さに、怒りを覚えずにはいられない。"

[[dialogue]]
speaker = "メイプル"
# 「あっ、お兄ちゃ～ん！　ママから桃まん届いたから、一緒に食べよー！」
line = "「あっ、お兄ちゃ～ん！　ママから桃まん届いたから、一緒に食べよー！」"

[[dialogue]]
speaker = "クロト"
# 「え？　メイプルのママから……？」
line = "「え？　メイプルのママから……？」"

[[dialogue]]
speaker = "unk"
# メイプルの両親は死んだはずじゃ……？
line = "メイプルの両親は死んだはずじゃ……？"

[[dialogue]]
speaker = "unk"
# 桃まんは生前作ったもの……？　いやでも、メイプルが出ていった直後に処刑したと言っていて……？
line = "桃まんは生前作ったもの……？　いやでも、メイプルが出ていった直後に処刑したと言っていて……？"

[[dialogue]]
speaker = "メイプル"
# 「──こ、煌嶺様！？　どうして煌嶺様がここにっ！？」
line = "「──こ、煌嶺様！？　どうして煌嶺様がここにっ！？」"

[[dialogue]]
speaker = "煌嶺"
# 「クッ……クク…………アッハッハッハ！」
line = "「クッ……クク…………アッハッハッハ！」"

[[dialogue]]
speaker = "煌嶺"
# 「あはは、引っかかった引っかかった～♪　魔王さんってば、わけがわからないって顔してる～♪」
line = "「あはは、引っかかった引っかかった～♪　魔王さんってば、わけがわからないって顔してる～♪」"

[[dialogue]]
speaker = "クロト"
# 「引っかかった……？　じゃあさっきのは……」
line = "「引っかかった……？　じゃあさっきのは……」"

[[dialogue]]
speaker = "煌嶺"
# 「ウソウソ。処刑とかしてないよ。メイプルちゃん<ruby=ち>家</ruby>の桃まんは絶品だからね」
line = "「ウソウソ。処刑とかしてないよ。メイプルちゃん<ruby>家<rt>ち</rt></ruby>の桃まんは絶品だからね」"

[[dialogue]]
speaker = "煌嶺"
# 「メイプルちゃん、久しぶり～！　元気してた？」
line = "「メイプルちゃん、久しぶり～！　元気してた？」"

[[dialogue]]
speaker = "メイプル"
# 「えっ……あ、はい……元気、ですけど……」
line = "「えっ……あ、はい……元気、ですけど……」"

[[dialogue]]
speaker = "煌嶺"
# 「こっちで星騎士として頑張ってるって聞いたよ～？　メイプルちゃんのこと応援はしてないけど、キュリオスの魔族として情けないところ見せちゃダメだからね？」
line = "「こっちで星騎士として頑張ってるって聞いたよ～？　メイプルちゃんのこと応援はしてないけど、キュリオスの魔族として情けないところ見せちゃダメだからね？」"

[[dialogue]]
speaker = "煌嶺"
# 「あ、さっき肉まん食べそびれたし、桃まんはもらうよ。じゃ～ね～♪」
line = "「あ、さっき肉まん食べそびれたし、桃まんはもらうよ。じゃ～ね～♪」"

[[dialogue]]
speaker = "unk"
# 煌嶺はメイプルから桃まんをひょいと取り上げると、笑顔で手を振りながら去っていく。
line = "煌嶺はメイプルから桃まんをひょいと取り上げると、笑顔で手を振りながら去っていく。"

[[dialogue]]
speaker = "メイプル"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# 俺とメイプルは、２人して唖然としたまま、煌嶺の姿が見えなくなるのを見届けた。
line = "俺とメイプルは、２人して唖然としたまま、煌嶺の姿が見えなくなるのを見届けた。"

[[dialogue]]
speaker = "メイプル"
# 「あ～～っ！？　桃まん取られた～～っ！？」
line = "「あ～～っ！？　桃まん取られた～～っ！？」"

[[dialogue]]
speaker = "クロト"
# 「……鮮やかな手口だった」
line = "「……鮮やかな手口だった」"

[[dialogue]]
speaker = "unk"
# あまりに自然に持っていったものだから、反応するのが遅れてしまった。
line = "あまりに自然に持っていったものだから、反応するのが遅れてしまった。"

[[dialogue]]
speaker = "クロト"
# 「あれが煌嶺……なんだな」
line = "「あれが煌嶺……なんだな」"

[[dialogue]]
speaker = "メイプル"
# 「うん。久々に会ったけど、やっぱり嫌なやつだった……」
line = "「うん。久々に会ったけど、やっぱり嫌なやつだった……」"

[[dialogue]]
speaker = "クロト"
# 「……メイプルはすごいな」
line = "「……メイプルはすごいな」"

[[dialogue]]
speaker = "メイプル"
# 「え？　何が？」
line = "「え？　何が？」"

[[dialogue]]
speaker = "unk"
# あの煌嶺相手に『魔王になる』とよく言ったのだと、改めてメイプルに感心する。
line = "あの煌嶺相手に『魔王になる』とよく言ったのだと、改めてメイプルに感心する。"

[[dialogue]]
speaker = "クロト"
# 「ところで……魔界から桃まんって送れるのか？　腐らない？」
line = "「ところで……魔界から桃まんって送れるのか？　腐らない？」"

[[dialogue]]
speaker = "メイプル"
# 「ああ、それには保存用の星術があってね──」
line = "「ああ、それには保存用の星術があってね──」"

[[dialogue]]
speaker = "unk"
# あれが煌嶺。頽廃都市キュリオスの支配者にして、魔王の力を強く受け継いだ末裔。
line = "あれが煌嶺。頽廃都市キュリオスの支配者にして、魔王の力を強く受け継いだ末裔。"

[[dialogue]]
speaker = "unk"
# リクリエに与する者ではないが、また厄介な相手が現れたと思わされたのだった。
line = "リクリエに与する者ではないが、また厄介な相手が現れたと思わされたのだった。"
