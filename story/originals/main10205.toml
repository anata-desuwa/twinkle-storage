[[dialogue]]
speaker = "unk"
# 第５話,湖を護る魔女,B
line = "第５話,湖を護る魔女,B"

[[dialogue]]
speaker = "せつな"
# 「しかし、先ほどは手裏剣を反射してきたでござる。せつなたちの攻撃が、まるっと返ってきたりはしないでござろうか？」
line = "「しかし、先ほどは手裏剣を反射してきたでござる。せつなたちの攻撃が、まるっと返ってきたりはしないでござろうか？」"

[[dialogue]]
speaker = "ヨミ"
# 「イの一番に手裏剣を投げた人とは思えない慎重さですね」
line = "「イの一番に手裏剣を投げた人とは思えない慎重さですね」"

[[dialogue]]
speaker = "美鶴"
# 「手裏剣１個じゃ軽すぎたんでしょ。３人がかりの一斉攻撃なら絶対に割れるって」
line = "「手裏剣１個じゃ軽すぎたんでしょ。３人がかりの一斉攻撃なら絶対に割れるって」"

[[dialogue]]
speaker = "せつな"
# 「ええ～……本当でござるか～？」
line = "「ええ～……本当でござるか～？」"

[[dialogue]]
speaker = "美鶴"
# 「まあ、反射されたらその時はその時で。うっかり全滅しちゃったらごめんねー」
line = "「まあ、反射されたらその時はその時で。うっかり全滅しちゃったらごめんねー」"

[[dialogue]]
speaker = "ヨミ"
# 「いきあたりばったりな上に軽いですね！？」
line = "「いきあたりばったりな上に軽いですね！？」"

[[dialogue]]
speaker = "美鶴"
# 「それじゃ、行くよ。揃えて。ごー・よーん・さーん」
line = "「それじゃ、行くよ。揃えて。ごー・よーん・さーん」"

[[dialogue]]
speaker = "ヨミ"
# 「こやぁっ！？　せめてテンカウントでお願いしますよぉ！　にー！」
line = "「こやぁっ！？　せめてテンカウントでお願いしますよぉ！　にー！」"

[[dialogue]]
speaker = "せつな"
# 「１個で足りぬなら１００個放つまで！　いーち！」
line = "「１個で足りぬなら１００個放つまで！　いーち！」"

[[dialogue]]
speaker = "美鶴"
# 「ぜーろっ」
line = "「ぜーろっ」"

[[dialogue]]
speaker = "せつな"
# 「紫電旋風！」
line = "「紫電旋風！」"

[[dialogue]]
speaker = "ヨミ"
# 「爆烈鈴音！」
line = "「爆烈鈴音！」"

[[dialogue]]
speaker = "美鶴"
# 「<ruby=つるのつらぬき>鶴の一貫</ruby>」
line = "「<ruby>鶴の一貫<rt>つるのつらぬき</rt></ruby>」"

[[dialogue]]
speaker = "美鶴"
# 「よーし、手応えあり。２人の攻撃、つよつよだね」
line = "「よーし、手応えあり。２人の攻撃、つよつよだね」"

[[dialogue]]
speaker = "せつな"
# 「ふふん、こう見えて、これまで無数の修羅場を潜ってるでござる」
line = "「ふふん、こう見えて、これまで無数の修羅場を潜ってるでござる」"

[[dialogue]]
speaker = "ヨミ"
# 「入学した頃と比べたら、随分と強くなってますから」
line = "「入学した頃と比べたら、随分と強くなってますから」"

[[dialogue]]
speaker = "ヨミ"
# 「見た目は特に変わってなさそうですけど、鏡が割れたような音がしましたね」
line = "「見た目は特に変わってなさそうですけど、鏡が割れたような音がしましたね」"

[[dialogue]]
speaker = "せつな"
# 「おおっ、無限ループがなくなってるでござる！　これで迷子の心配はなくなりそうですな！」
line = "「おおっ、無限ループがなくなってるでござる！　これで迷子の心配はなくなりそうですな！」"

[[dialogue]]
speaker = "ヨミ"
# 「安心するのは早いですよ。<ruby=ラーゴ・シエロ>鏡界の湖</ruby>にはまだ辿り着けていないんですから」
line = "「安心するのは早いですよ。<ruby>鏡界の湖<rt>ラーゴ・シエロ</rt></ruby>にはまだ辿り着けていないんですから」"

[[dialogue]]
speaker = "美鶴"
# 「そゆことよね。結界を張っていたのが何者かも突き止めないといけないだろうし……」
line = "「そゆことよね。結界を張っていたのが何者かも突き止めないといけないだろうし……」"

[[dialogue]]
speaker = "せつな"
# 「承知したでござる！　気を引き締めて、先へ進むでござるよ！」
line = "「承知したでござる！　気を引き締めて、先へ進むでござるよ！」"

[[dialogue]]
speaker = "せつな"
# 「なんとも煌びやかな湖が見えてきたでござる。ひとっ走り、様子を見て──にゃん？」
line = "「なんとも煌びやかな湖が見えてきたでござる。ひとっ走り、様子を見て──にゃん？」"

[[dialogue]]
speaker = "美鶴"
# 「せつな、ちょい待ち。２人とも警戒態勢」
line = "「せつな、ちょい待ち。２人とも警戒態勢」"

[[dialogue]]
speaker = "美鶴"
# 「そこにいるの、誰。出てきなよ」
line = "「そこにいるの、誰。出てきなよ」"

[[dialogue]]
speaker = "ヨミ"
# 「え……人の気配なんて──」
line = "「え……人の気配なんて──」"

[[dialogue]]
speaker = "？？？"
# 「よく気づきましたね」
line = "「よく気づきましたね」"

[[dialogue]]
speaker = "せつな"
# 「ひゃ！？　幽霊かと思ったでござる！」
line = "「ひゃ！？　幽霊かと思ったでござる！」"

[[dialogue]]
speaker = "？？？"
# 「随分なご挨拶ですね。せっかく張った結界を壊してしまうなんて……並々ならぬコストがかかっているんですよ？」
line = "「随分なご挨拶ですね。せっかく張った結界を壊してしまうなんて……並々ならぬコストがかかっているんですよ？」"

[[dialogue]]
speaker = "ヨミ"
# 「あなたが結界を張った術士……どうしてこんなことをしたんです？」
line = "「あなたが結界を張った術士……どうしてこんなことをしたんです？」"

[[dialogue]]
speaker = "？？？"
# 「わざわざご丁寧に、お話する必要がありますか？」
line = "「わざわざご丁寧に、お話する必要がありますか？」"

[[dialogue]]
speaker = "美鶴"
# 「冥途の土産に話してくれてもいいじゃん。メイドはうちらの方だけど」
line = "「冥途の土産に話してくれてもいいじゃん。メイドはうちらの方だけど」"

[[dialogue]]
speaker = "？？？"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "せつな"
# 「おや？　もしや先方には伝わっていないでござるか？」
line = "「おや？　もしや先方には伝わっていないでござるか？」"

[[dialogue]]
speaker = "美鶴"
# 「いや、ふつーにスルーされただけでしょ。そもそも話してくれるとも思ってないし」
line = "「いや、ふつーにスルーされただけでしょ。そもそも話してくれるとも思ってないし」"

[[dialogue]]
speaker = "美鶴"
# 「第一、こんなトコに結界張って陣取ってるヤツが、うちらと仲良くするつもりなんてないだろーしね」
line = "「第一、こんなトコに結界張って陣取ってるヤツが、うちらと仲良くするつもりなんてないだろーしね」"

[[dialogue]]
speaker = "美鶴"
# 「うちらをオジャマするってコトは……あんたが<ruby=ラーゴ・シエロ>鏡界の湖</ruby>を守ってるボスキャラでいいのかな？」
line = "「うちらをオジャマするってコトは……あんたが<ruby>鏡界の湖<rt>ラーゴ・シエロ</rt></ruby>を守ってるボスキャラでいいのかな？」"

[[dialogue]]
speaker = "？？？"
# 「ボスキャラ……まぁそれでいいでしょう」
line = "「ボスキャラ……まぁそれでいいでしょう」"

[[dialogue]]
speaker = "湖の魔女"
# 「私は<ruby=ラーゴ・シエロ>鏡界の湖</ruby>を守護する魔女。この先に進みたければ、私を倒すしかありません」
line = "「私は<ruby>鏡界の湖<rt>ラーゴ・シエロ</rt></ruby>を守護する魔女。この先に進みたければ、私を倒すしかありません」"

[[dialogue]]
speaker = "湖の魔女"
# 「ボスらしく、取り巻きも呼んでおきましょうか──出なさい」
line = "「ボスらしく、取り巻きも呼んでおきましょうか──出なさい」"

[[dialogue]]
speaker = "鏡像"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "せつな"
# 「なんと！？　いったいどこに潜んでたでござるか！？　さては隠れ蓑の術でござるな！？」
line = "「なんと！？　いったいどこに潜んでたでござるか！？　さては隠れ蓑の術でござるな！？」"

[[dialogue]]
speaker = "美鶴"
# 「この子たち、血が通った人間じゃないね。魔女さんお得意の鏡を利用した……鏡像ってトコ？」
line = "「この子たち、血が通った人間じゃないね。魔女さんお得意の鏡を利用した……鏡像ってトコ？」"

[[dialogue]]
speaker = "湖の魔女"
# 「ご名答です。聡明ですね」
line = "「ご名答です。聡明ですね」"

[[dialogue]]
speaker = "湖の魔女"
# 「私の同僚を写した鏡像です。複製品とはいえ、戦闘力は本人にも負けず劣らず。侮ったら痛い目を見ますよ」
line = "「私の同僚を写した鏡像です。複製品とはいえ、戦闘力は本人にも負けず劣らず。侮ったら痛い目を見ますよ」"

[[dialogue]]
speaker = "湖の魔女"
# 「こちらも３人、あなたたちも３人。戦うならちょうどいいでしょう」
line = "「こちらも３人、あなたたちも３人。戦うならちょうどいいでしょう」"

[[dialogue]]
speaker = "せつな"
# 「やるしかないでござるっ！」
line = "「やるしかないでござるっ！」"

[[dialogue]]
speaker = "ヨミ"
# 「やりましょう、美鶴さん！」
line = "「やりましょう、美鶴さん！」"

[[dialogue]]
speaker = "美鶴"
# 「真っ向から出会っちゃったからには、しゃーない。やったりますか」
line = "「真っ向から出会っちゃったからには、しゃーない。やったりますか」"
