[[dialogue]]
speaker = "unk"
# 第３話,カフェテリアの新メニュー・完結編,P
line = "第３話,カフェテリアの新メニュー・完結編,P"

[[dialogue]]
speaker = "サラン"
# 「会長ちゃ～ん、どうかな～？　サラン、クロール出来るようになったよ～♪」
line = "「会長ちゃ～ん、どうかな～？　サラン、クロール出来るようになったよ～♪」"

[[dialogue]]
speaker = "unk"
# 日焼け止めを塗り終わった俺たちはプールに入る。
line = "日焼け止めを塗り終わった俺たちはプールに入る。"

[[dialogue]]
speaker = "unk"
# 最初は水に浮くことさえおぼつかなかったサランだが、しばらく教えると、どうにか泳ぐことはできるようになっていた。
line = "最初は水に浮くことさえおぼつかなかったサランだが、しばらく教えると、どうにか泳ぐことはできるようになっていた。"

[[dialogue]]
speaker = "unk"
# でも、泳げてるからＯＫ！
line = "でも、泳げてるからＯＫ！"

[[dialogue]]
speaker = "unk"
# どちらかというと犬かきだけど……
line = "どちらかというと犬かきだけど……"

[[dialogue]]
speaker = "サラン"
# 「今からそこまで泳いでいくよ～。会長ちゃんは動かないでね～」
line = "「今からそこまで泳いでいくよ～。会長ちゃんは動かないでね～」"

[[dialogue]]
speaker = "unk"
# バシャバシャバシャ……
line = "バシャバシャバシャ……"

[[dialogue]]
speaker = "unk"
# バシャバシャバシャ……！
line = "バシャバシャバシャ……！"

[[dialogue]]
speaker = "unk"
# バシャバシャバシャ！！
line = "バシャバシャバシャ！！"

[[dialogue]]
speaker = "サラン"
# 「えーーーーい！」
line = "「えーーーーい！」"

[[dialogue]]
speaker = "unk"
# バッシャーーーン！！！
line = "バッシャーーーン！！！"

[[dialogue]]
speaker = "unk"
# ギリギリ何とか俺のところまで泳ぎ着いたサランが俺に飛びついてくる。
line = "ギリギリ何とか俺のところまで泳ぎ着いたサランが俺に飛びついてくる。"

[[dialogue]]
speaker = "unk"
# 顔面に思いっきり水が打ち付けた。
line = "顔面に思いっきり水が打ち付けた。"

[[dialogue]]
speaker = "unk"
# と同時に、ものすごく気持ちいい弾力が俺の胸に押しあてられる。
line = "と同時に、ものすごく気持ちいい弾力が俺の胸に押しあてられる。"

[[dialogue]]
speaker = "サラン"
# 「えへへ、やった～。ちゃんと会長ちゃんのところまで泳ぎついたよ～♪」
line = "「えへへ、やった～。ちゃんと会長ちゃんのところまで泳ぎついたよ～♪」"

[[dialogue]]
speaker = "サラン"
# 「なんだか、だんだん泳ぐのが楽しくなってきたかも～」
line = "「なんだか、だんだん泳ぐのが楽しくなってきたかも～」"

[[dialogue]]
speaker = "サラン"
# 「これも会長ちゃんが泳ぎ方を教えてくれたおかげだね～、ありがとう～♪」
line = "「これも会長ちゃんが泳ぎ方を教えてくれたおかげだね～、ありがとう～♪」"

[[dialogue]]
speaker = "unk"
# ２つの大きなスイカが……
line = "２つの大きなスイカが……"

[[dialogue]]
speaker = "サラン"
# 「ぽよ？」
line = "「ぽよ？」"

[[dialogue]]
speaker = "サラン"
# 「そっか～。サランたちはデザートのアイデアを考えるためにプールに来たんだよね～」
line = "「そっか～。サランたちはデザートのアイデアを考えるためにプールに来たんだよね～」"

[[dialogue]]
speaker = "サラン"
# 「遊ぶのに夢中になってて、サラン、すっかり忘れちゃってたよ～」
line = "「遊ぶのに夢中になってて、サラン、すっかり忘れちゃってたよ～」"

[[dialogue]]
speaker = "サラン"
# 「んっと……会長ちゃん的には、夏と言えばスイカってこと？」
line = "「んっと……会長ちゃん的には、夏と言えばスイカってこと？」"

[[dialogue]]
speaker = "unk"
# そ、それが言いたかった！
line = "そ、それが言いたかった！"

[[dialogue]]
speaker = "サラン"
# 「ん……ん～、なんだかイメージが湧いてきたかも……」
line = "「ん……ん～、なんだかイメージが湧いてきたかも……」"

[[dialogue]]
speaker = "サラン"
# 「会長ちゃん、急いでカフェテリアに戻ろ～！」
line = "「会長ちゃん、急いでカフェテリアに戻ろ～！」"

[[dialogue]]
speaker = "unk"
# カフェテリアに戻ったサランは、厨房に入って早速何かを作り始める。
line = "カフェテリアに戻ったサランは、厨房に入って早速何かを作り始める。"

[[dialogue]]
speaker = "蛍火"
# 「どんなデザートを思いついたんでしょうか……？」
line = "「どんなデザートを思いついたんでしょうか……？」"

[[dialogue]]
speaker = "unk"
# 皆が関心を寄せる中、サランが厨房から姿を現した。
line = "皆が関心を寄せる中、サランが厨房から姿を現した。"

[[dialogue]]
speaker = "unk"
# その視線は、彼女の手にしているデザートグラスに集まる。
line = "その視線は、彼女の手にしているデザートグラスに集まる。"

[[dialogue]]
speaker = "サラン"
# 「はい、ふたつのおっきなスイカアイスだよ～♪」
line = "「はい、ふたつのおっきなスイカアイスだよ～♪」"

[[dialogue]]
speaker = "unk"
# ……！！！！？？？
line = "……！！！！？？？"

[[dialogue]]
speaker = "unk"
# グラスには薄緑色の球形のアイスが２つ。
line = "グラスには薄緑色の球形のアイスが２つ。"

[[dialogue]]
speaker = "unk"
# スイカをイメージして、チョコレートのラインが入っている。
line = "スイカをイメージして、チョコレートのラインが入っている。"

[[dialogue]]
speaker = "蛍火"
# 「なるほど、これはまさに夏っぽいです！！！」
line = "「なるほど、これはまさに夏っぽいです！！！」"

[[dialogue]]
speaker = "蛍火"
# 「かわいらしさもあって、これは女の子にも人気が出ますよ！」
line = "「かわいらしさもあって、これは女の子にも人気が出ますよ！」"

[[dialogue]]
speaker = "サラン"
# 「えへへ～、そうだよね～？」
line = "「えへへ～、そうだよね～？」"

[[dialogue]]
speaker = "蛍火"
# 「でも、どうして『ふたつの』『おっきな』スイカアイスなんでしょうか？」
line = "「でも、どうして『ふたつの』『おっきな』スイカアイスなんでしょうか？」"

[[dialogue]]
speaker = "サラン"
# 「それはね～、会長ちゃんからアイデアを貰ったからだよ～」
line = "「それはね～、会長ちゃんからアイデアを貰ったからだよ～」"

[[dialogue]]
speaker = "サラン"
# 「プールで泳いでたらね～。急に会長ちゃんがそんなことを言い出したの～」
line = "「プールで泳いでたらね～。急に会長ちゃんがそんなことを言い出したの～」"

[[dialogue]]
speaker = "サラン"
# 「それで理由を聞いてみたら、夏っぽいデザートと言えば『ふたつのおっきなスイカ』だ、って～♪」
line = "「それで理由を聞いてみたら、夏っぽいデザートと言えば『ふたつのおっきなスイカ』だ、って～♪」"

[[dialogue]]
speaker = "蛍火"
# 「……………………」
line = "「……………………」"

[[dialogue]]
speaker = "サラン"
# 「ちょっとだけ泳げるようになってはしゃいでたから、メニュー作りのこと忘れかけちゃってたんだ～」
line = "「ちょっとだけ泳げるようになってはしゃいでたから、メニュー作りのこと忘れかけちゃってたんだ～」"

[[dialogue]]
speaker = "サラン"
# 「でも、会長ちゃんのひと言で、ぱぁ～ってアイデアが広がったんだよね～♪」
line = "「でも、会長ちゃんのひと言で、ぱぁ～ってアイデアが広がったんだよね～♪」"

[[dialogue]]
speaker = "unk"
# そ、そんな目で見ないで！！！
line = "そ、そんな目で見ないで！！！"

[[dialogue]]
speaker = "蛍火"
# 「師匠が何を見て、そんな発想をしたのかは分かりませんが……こちらはカフェテリアのメニューに加えさせていただいてもいいですか？」
line = "「師匠が何を見て、そんな発想をしたのかは分かりませんが……こちらはカフェテリアのメニューに加えさせていただいてもいいですか？」"

[[dialogue]]
speaker = "サラン"
# 「もちろんだよ～♪」
line = "「もちろんだよ～♪」"

[[dialogue]]
speaker = "unk"
# というわけで、カフェテリアに新しいメニューが加えられた。
line = "というわけで、カフェテリアに新しいメニューが加えられた。"

[[dialogue]]
speaker = "unk"
# それは瞬く間に人気メニューとなったが、なぜそんな名前なのかを訊ねられると、関係者は一様に口を閉ざしている。
line = "それは瞬く間に人気メニューとなったが、なぜそんな名前なのかを訊ねられると、関係者は一様に口を閉ざしている。"

[[dialogue]]
speaker = "unk"
# 俺には、できれば永遠にその理由が明かされないことを願うしかなかった。
line = "俺には、できれば永遠にその理由が明かされないことを願うしかなかった。"
