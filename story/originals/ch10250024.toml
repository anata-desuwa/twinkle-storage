[[dialogue]]
speaker = "unk"
# 第４話,新たな演技,P
line = "第４話,新たな演技,P"

[[dialogue]]
speaker = "舞亜"
# 「それじゃいくよー」
line = "「それじゃいくよー」"

[[dialogue]]
speaker = "ソフィア"
# 「うん、準備できてるよ」
line = "「うん、準備できてるよ」"

[[dialogue]]
speaker = "ウズメイア"
# 「ついていくだけでも大変だけど、頑張るしっ」
line = "「ついていくだけでも大変だけど、頑張るしっ」"

[[dialogue]]
speaker = "unk"
# 神殿での隠し芸大会の時と同じく、星術で空中に銀盤を作り、スケートで滑る舞亜たち。
line = "神殿での隠し芸大会の時と同じく、星術で空中に銀盤を作り、スケートで滑る舞亜たち。"

[[dialogue]]
speaker = "unk"
# その技のひとつひとつが美しく、彼女たちのパフォーマンスにはさらに磨きがかかっていた。
line = "その技のひとつひとつが美しく、彼女たちのパフォーマンスにはさらに磨きがかかっていた。"

[[dialogue]]
speaker = "unk"
# でも隠し芸大会は終わったんじゃ……？
line = "でも隠し芸大会は終わったんじゃ……？"

[[dialogue]]
speaker = "舞亜"
# 「うん、特に披露する予定はないよ。だけど、星術を使った演技があれっきりってのももったいないし、フィギュアの練習がてらやってるんだ」
line = "「うん、特に披露する予定はないよ。だけど、星術を使った演技があれっきりってのももったいないし、フィギュアの練習がてらやってるんだ」"

[[dialogue]]
speaker = "ソフィア"
# 「難度が高いので、いい刺激になりますね。星術のトレーニングにもなりますし」
line = "「難度が高いので、いい刺激になりますね。星術のトレーニングにもなりますし」"

[[dialogue]]
speaker = "ウズメイア"
# 「うちはフィギュア部じゃないんだけど……楽しいからよし！」
line = "「うちはフィギュア部じゃないんだけど……楽しいからよし！」"

[[dialogue]]
speaker = "オオヒメ"
# 「美しい……」
line = "「美しい……」"

[[dialogue]]
speaker = "舞亜"
# 「あ、いつの間にかヒメさんがいる」
line = "「あ、いつの間にかヒメさんがいる」"

[[dialogue]]
speaker = "オオヒメ"
# 「すまない、勝手に見学させてもらった。あなたたちの演技はいつ見ても素晴らしいな。しかも以前より技の冴えが増している」
line = "「すまない、勝手に見学させてもらった。あなたたちの演技はいつ見ても素晴らしいな。しかも以前より技の冴えが増している」"

[[dialogue]]
speaker = "オオヒメ"
# 「しかし、フィギュアでは多人数で滑るのは珍しいのではなかったかな？」
line = "「しかし、フィギュアでは多人数で滑るのは珍しいのではなかったかな？」"

[[dialogue]]
speaker = "舞亜"
# 「そうだね。シングル──１人で滑るのが基本だよ。限られたリンクの上を複数人で、さらに連携して滑るのは難しいからね」
line = "「そうだね。シングル──１人で滑るのが基本だよ。限られたリンクの上を複数人で、さらに連携して滑るのは難しいからね」"

[[dialogue]]
speaker = "舞亜"
# 「だけどフィギュアにはアイスダンスとペアもあるんだよ。これは男女２人で滑るやつで、技やルールが違うんだ」
line = "「だけどフィギュアにはアイスダンスとペアもあるんだよ。これは男女２人で滑るやつで、技やルールが違うんだ」"

[[dialogue]]
speaker = "舞亜"
# 「アイスダンスは基本的にジャンプがなくて、優雅さや男女の協調を見るもの」
line = "「アイスダンスは基本的にジャンプがなくて、優雅さや男女の協調を見るもの」"

[[dialogue]]
speaker = "舞亜"
# 「ペアは男性が女性を投げて空中で回転させたり、よりアクロバティックな演技が要求される。ジャンプがある分、こっちの方がシングルの延長って言えるかもね」
line = "「ペアは男性が女性を投げて空中で回転させたり、よりアクロバティックな演技が要求される。ジャンプがある分、こっちの方がシングルの延長って言えるかもね」"

[[dialogue]]
speaker = "オオヒメ"
# 「ふむ、興味深い。しかし舞亜殿はシングルの選手だから、アイスダンスやペアの演技が見られないのが残念だ」
line = "「ふむ、興味深い。しかし舞亜殿はシングルの選手だから、アイスダンスやペアの演技が見られないのが残念だ」"

[[dialogue]]
speaker = "舞亜"
# 「そうなんだけど……せっかくだしやってみようか、会長さん」
line = "「そうなんだけど……せっかくだしやってみようか、会長さん」"

[[dialogue]]
speaker = "舞亜"
# 「えっ、て驚くところじゃないでしょ。男の人は今会長さんしかいないんだから。大丈夫、星騎士だからちょっとやそっとじゃ怪我しないよ」
line = "「えっ、て驚くところじゃないでしょ。男の人は今会長さんしかいないんだから。大丈夫、星騎士だからちょっとやそっとじゃ怪我しないよ」"

[[dialogue]]
speaker = "舞亜"
# 「会長さんも前教えて、軽く滑れるくらいになったんだし、やってみない？」
line = "「会長さんも前教えて、軽く滑れるくらいになったんだし、やってみない？」"

[[dialogue]]
speaker = "unk"
# そういうことならやってみようか
line = "そういうことならやってみようか"

[[dialogue]]
speaker = "舞亜"
# 「ありがと。じゃあ私のパートナーお願いね。教えながらいくよ」
line = "「ありがと。じゃあ私のパートナーお願いね。教えながらいくよ」"

[[dialogue]]
speaker = "舞亜"
# 「じゃあまずは簡単な動きをやってみようかな。会長さんの腰に手を添えて、エスコートするみたいに……すぃーっと」
line = "「じゃあまずは簡単な動きをやってみようかな。会長さんの腰に手を添えて、エスコートするみたいに……すぃーっと」"

[[dialogue]]
speaker = "舞亜"
# 「これは男性パートナーが、女性パートナーにやるやつ。まずは逆でやってるよ」
line = "「これは男性パートナーが、女性パートナーにやるやつ。まずは逆でやってるよ」"

[[dialogue]]
speaker = "舞亜"
# 「じゃあ会長さんもやってみて。私の腰に手を当てて……そうそう、そんな感じ。このまま……すいーっと。ほら、なんかそれっぽくなったでしょ」
line = "「じゃあ会長さんもやってみて。私の腰に手を当てて……そうそう、そんな感じ。このまま……すいーっと。ほら、なんかそれっぽくなったでしょ」"

[[dialogue]]
speaker = "オオヒメ"
# 「ふむ……基本的な動作だけでも様になるものだな。しかし並ぶと舞亜殿と魔王の力量の差が際立つな……」
line = "「ふむ……基本的な動作だけでも様になるものだな。しかし並ぶと舞亜殿と魔王の力量の差が際立つな……」"

[[dialogue]]
speaker = "ウズメイア"
# 「あはは、手厳しー！」
line = "「あはは、手厳しー！」"

[[dialogue]]
speaker = "舞亜"
# 「回るのもやってみよっか。会長さん、社交ダンスみたいに私の肩を持って」
line = "「回るのもやってみよっか。会長さん、社交ダンスみたいに私の肩を持って」"

[[dialogue]]
speaker = "舞亜"
# 「……胸が当たってる？　私、スケート選手にしてはおっぱい大きいから仕方ないね。大丈夫、会長さんなら気にしないよ」
line = "「……胸が当たってる？　私、スケート選手にしてはおっぱい大きいから仕方ないね。大丈夫、会長さんなら気にしないよ」"

[[dialogue]]
speaker = "unk"
# （そういう問題じゃないような……）
line = "（そういう問題じゃないような……）"

[[dialogue]]
speaker = "舞亜"
# 「会長さん、力を抜いて。そのまま上体を反らして……くるくるーっと」
line = "「会長さん、力を抜いて。そのまま上体を反らして……くるくるーっと」"

[[dialogue]]
speaker = "オオヒメ"
# 「ほう……美しい動きだ。だがその……思っていたより大胆なのだな？」
line = "「ほう……美しい動きだ。だがその……思っていたより大胆なのだな？」"

[[dialogue]]
speaker = "ソフィア"
# 「素人の会長さんと一緒に回れる舞亜の体幹とバランスはすごいんだけど……ちょっと密着しすぎじゃない？」
line = "「素人の会長さんと一緒に回れる舞亜の体幹とバランスはすごいんだけど……ちょっと密着しすぎじゃない？」"

[[dialogue]]
speaker = "舞亜"
# 「いやいや、私真面目にやってるからね？　会長さん、最後にツイストリフトってのやろうか。女性パートナーが男性パートナーに投げてもらって、空中で回るの」
line = "「いやいや、私真面目にやってるからね？　会長さん、最後にツイストリフトってのやろうか。女性パートナーが男性パートナーに投げてもらって、空中で回るの」"

[[dialogue]]
speaker = "舞亜"
# 「ほら、私の腰を持って。ここここ──」
line = "「ほら、私の腰を持って。ここここ──」"

[[dialogue]]
speaker = "舞亜"
# 「あっ<emoji=heart04>」
line = "「あっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 変な声出た！？
line = "変な声出た！？"

[[dialogue]]
speaker = "舞亜"
# 「あはは、ごめんごめん、会長さんの触り方が上手だったから声出ちゃった♪」
line = "「あはは、ごめんごめん、会長さんの触り方が上手だったから声出ちゃった♪」"

[[dialogue]]
speaker = "舞亜"
# 「それじゃ滑りながら加速して～……投げるっ」
line = "「それじゃ滑りながら加速して～……投げるっ」"

[[dialogue]]
speaker = "舞亜"
# 「空中で回って──」
line = "「空中で回って──」"

[[dialogue]]
speaker = "舞亜"
# 「そして受け止める──っと。思ったより上手くいったね。やっぱり私のパートナーは会長さんじゃないと」
line = "「そして受け止める──っと。思ったより上手くいったね。やっぱり私のパートナーは会長さんじゃないと」"

[[dialogue]]
speaker = "舞亜"
# 「ありがと……ちゅっ<emoji=heart04>」
line = "「ありがと……ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "オオヒメ"
# 「今のも技か！？　技なのか！？」
line = "「今のも技か！？　技なのか！？」"

[[dialogue]]
speaker = "ソフィア"
# 「そんなハレンチな技あるわけないじゃないですか！　演技にかこつけてイチャイチャしてるだけですよ」
line = "「そんなハレンチな技あるわけないじゃないですか！　演技にかこつけてイチャイチャしてるだけですよ」"

[[dialogue]]
speaker = "ウズメイア"
# 「あははっ、舞亜ってばだいた～んっ！」
line = "「あははっ、舞亜ってばだいた～んっ！」"

[[dialogue]]
speaker = "舞亜"
# 「とまぁ、アイスダンスやペアってこんな感じ。フィギュアスケートにもいろいろあるんだよ」
line = "「とまぁ、アイスダンスやペアってこんな感じ。フィギュアスケートにもいろいろあるんだよ」"

[[dialogue]]
speaker = "舞亜"
# 「ほんと……フィギュアスケートっていろいろあるよね」
line = "「ほんと……フィギュアスケートっていろいろあるよね」"

[[dialogue]]
speaker = "unk"
# 舞亜……？　どうかした？
line = "舞亜……？　どうかした？"

[[dialogue]]
speaker = "舞亜"
# 「私は普段、競技の世界でスケートをやってる。勝つためにやってる」
line = "「私は普段、競技の世界でスケートをやってる。勝つためにやってる」"

[[dialogue]]
speaker = "舞亜"
# 「でも魔界での隠し芸大会で、勝つためじゃない、誰かを楽しませるためのスケートをした。そういうのもありなんだって気付けた」
line = "「でも魔界での隠し芸大会で、勝つためじゃない、誰かを楽しませるためのスケートをした。そういうのもありなんだって気付けた」"

[[dialogue]]
speaker = "舞亜"
# 「これから競技レベルの演技ができなくなって、選手を引退しても、魅せるスケートはできるかもしない」
line = "「これから競技レベルの演技ができなくなって、選手を引退しても、魅せるスケートはできるかもしない」"

[[dialogue]]
speaker = "舞亜"
# 「それなら魔界や天界みたいな、フィギュアスケートが盛んじゃないところで滑るのもありかもって思うんだ」
line = "「それなら魔界や天界みたいな、フィギュアスケートが盛んじゃないところで滑るのもありかもって思うんだ」"

[[dialogue]]
speaker = "舞亜"
# 「もし魔界や天界で滑りたいって言ったら、会長さんはついてきてくれる？」
line = "「もし魔界や天界で滑りたいって言ったら、会長さんはついてきてくれる？」"

[[dialogue]]
speaker = "unk"
# もちろん
line = "もちろん"

[[dialogue]]
speaker = "舞亜"
# 「お、即答だね。心強いや」
line = "「お、即答だね。心強いや」"

[[dialogue]]
speaker = "unk"
# 俺も舞亜の滑りをもっと見たいから
line = "俺も舞亜の滑りをもっと見たいから"

[[dialogue]]
speaker = "舞亜"
# 「……そっか。思ったより長いスケーター人生になりそうだ」
line = "「……そっか。思ったより長いスケーター人生になりそうだ」"

[[dialogue]]
speaker = "舞亜"
# 「さっきの言葉、本気しちゃうから……責任取ってね、会長さん」
line = "「さっきの言葉、本気しちゃうから……責任取ってね、会長さん」"
