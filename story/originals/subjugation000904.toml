[[dialogue]]
speaker = "unk"
# 俺とフェリシーは今回の調査について改めて、カフェテリアで話し合うことになった。
line = "俺とフェリシーは今回の調査について改めて、カフェテリアで話し合うことになった。"

[[dialogue]]
speaker = "フェリシー"
# 「――そっか、会長くんは今回の件、保健室で詳しい話を聞くようにって言われてたんだね？」
line = "「――そっか、会長くんは今回の件、保健室で詳しい話を聞くようにって言われてたんだね？」"

[[dialogue]]
speaker = "フェリシー"
# 「じゃあ、説明していくと……」
line = "「じゃあ、説明していくと……」"

[[dialogue]]
speaker = "フェリシー"
# 「最近、夜になると、学園を徘徊する不審者が現れる、っていう報告が幾つも上がってきてるみたいなの」
line = "「最近、夜になると、学園を徘徊する不審者が現れる、っていう報告が幾つも上がってきてるみたいなの」"

[[dialogue]]
speaker = "フェリシー"
# 「その報告の中で、不審者が出入りしてる場所っていうのが――」
line = "「その報告の中で、不審者が出入りしてる場所っていうのが――」"

[[dialogue]]
speaker = "unk"
# 新星学園の保健室？
line = "新星学園の保健室？"

[[dialogue]]
speaker = "フェリシー"
# 「そう。誰もいなかったはずの保健室から人影が出て来るのを見た……とか。保健室に戻って行ったと思ったら、姿が消えていた……とか。そんな感じみたい」
line = "「そう。誰もいなかったはずの保健室から人影が出て来るのを見た……とか。保健室に戻って行ったと思ったら、姿が消えていた……とか。そんな感じみたい」"

[[dialogue]]
speaker = "フェリシー"
# 「報告を受けた学園側が先に調査をしたらしいんだけど、それらしい侵入者や学園生の痕跡は確認できなかったんだって」
line = "「報告を受けた学園側が先に調査をしたらしいんだけど、それらしい侵入者や学園生の痕跡は確認できなかったんだって」"

[[dialogue]]
speaker = "フェリシー"
# 「にもかかわらず、目撃情報は上がり続けてる。生徒達の間では、悪霊か悪魔の仕業じゃないかっていう噂も広がってるの」
line = "「にもかかわらず、目撃情報は上がり続けてる。生徒達の間では、悪霊か悪魔の仕業じゃないかっていう噂も広がってるの」"

[[dialogue]]
speaker = "フェリシー"
# 「そこで、『ロールスター』である私の元に依頼が来たっていうわけ」
line = "「そこで、『ロールスター』である私の元に依頼が来たっていうわけ」"

[[dialogue]]
speaker = "unk"
# ロールスター？　それって――
line = "ロールスター？　それって――"

[[dialogue]]
speaker = "フェリシー"
# 「あっ、そっか。ごめん、日本では『<ruby=せんせいしゃ>選星者</ruby>』って呼び方のほうがよかったかな？」
line = "「あっ、そっか。ごめん、日本では『<ruby>選星者<rt>せんせいしゃ</rt></ruby>』って呼び方のほうがよかったかな？」"

[[dialogue]]
speaker = "フェリシー"
# 「ひょっとしたらもう知ってるかもしれないけど……ジュエリーと同じで、私も実は、選星者の内の１人なんだ！」
line = "「ひょっとしたらもう知ってるかもしれないけど……ジュエリーと同じで、私も実は、選星者の内の１人なんだ！」"

[[dialogue]]
speaker = "unk"
# 選星者――それは、日傘探偵のジュエリー曰く、女神様から『<ruby=ロール>役職</ruby>』を授けられた者のことを指すという。
line = "選星者――それは、日傘探偵のジュエリー曰く、女神様から『<ruby>役職<rt>ロール</rt></ruby>』を授けられた者のことを指すという。"

[[dialogue]]
speaker = "unk"
# 選星者は天からの啓示により、生まれながらにそのことを自覚し、役職に応じた特殊な能力を与えられている。
line = "選星者は天からの啓示により、生まれながらにそのことを自覚し、役職に応じた特殊な能力を与えられている。"

[[dialogue]]
speaker = "unk"
# ジュエリーの役職は『名探偵』。他には『大怪盗』『予言者』などが存在しているらしい。
line = "ジュエリーの役職は『名探偵』。他には『大怪盗』『予言者』などが存在しているらしい。"

[[dialogue]]
speaker = "フェリシー"
# 「――で、私の役職は『祓魔師』」
line = "「――で、私の役職は『祓魔師』」"

[[dialogue]]
speaker = "フェリシー"
# 「改めて、エクソシストの仕事についてしっかりと説明しておくと……個人的にあまり好きな言い方じゃないんだけど、『悪魔祓い』のことなんだ」
line = "「改めて、エクソシストの仕事についてしっかりと説明しておくと……個人的にあまり好きな言い方じゃないんだけど、『悪魔祓い』のことなんだ」"

[[dialogue]]
speaker = "フェリシー"
# 「この世界には、星力以外にもまだ解明されていない不思議な力が幾つもある。たとえば、幽霊とかもその１つ」
line = "「この世界には、星力以外にもまだ解明されていない不思議な力が幾つもある。たとえば、幽霊とかもその１つ」"

[[dialogue]]
speaker = "フェリシー"
# 「幽霊はちゃんと実在していて……ほら、確か新星学園にも幽霊を連れている子がいたでしょ？」
line = "「幽霊はちゃんと実在していて……ほら、確か新星学園にも幽霊を連れている子がいたでしょ？」"

[[dialogue]]
speaker = "フェリシー"
# 「人と同じで、あの子が連れているみたいな良い幽霊もいれば、他者に害を為そうとする悪霊も存在する」
line = "「人と同じで、あの子が連れているみたいな良い幽霊もいれば、他者に害を為そうとする悪霊も存在する」"

[[dialogue]]
speaker = "フェリシー"
# 「エクソシストはそういった悪霊を、お祈りによって鎮めるのが、仕事の１つなんだ」
line = "「エクソシストはそういった悪霊を、お祈りによって鎮めるのが、仕事の１つなんだ」"

[[dialogue]]
speaker = "フェリシー"
# 「他には、リクリエの瘴気で異変が起きた土地や建物を元に戻したり、悪魔憑き――異形化してしまった人の体の一部を治したりとかね」
line = "「他には、リクリエの瘴気で異変が起きた土地や建物を元に戻したり、悪魔憑き――異形化してしまった人の体の一部を治したりとかね」"

[[dialogue]]
speaker = "フェリシー"
# 「それで、今回の保健室の件に話を戻すけど……」
line = "「それで、今回の保健室の件に話を戻すけど……」"

[[dialogue]]
speaker = "フェリシー"
# 「目撃されている不審者について、星力やリクリエの気配は検知されてないらしいんだ。だから、悪霊の仕業なんじゃないかって噂になっているんだと思う」
line = "「目撃されている不審者について、星力やリクリエの気配は検知されてないらしいんだ。だから、悪霊の仕業なんじゃないかって噂になっているんだと思う」"

[[dialogue]]
speaker = "unk"
# フェリシーの専門分野ってことか
line = "フェリシーの専門分野ってことか"

[[dialogue]]
speaker = "フェリシー"
# 「そういうこと！　それに――」
line = "「そういうこと！　それに――」"

[[dialogue]]
speaker = "フェリシー"
# 「依頼とは別に私個人としても、噂の正体をちゃんと確かめたいんだ」
line = "「依頼とは別に私個人としても、噂の正体をちゃんと確かめたいんだ」"

[[dialogue]]
speaker = "フェリシー"
# 「あのね、実は……今回の件、不審者の正体はソフレなんじゃないかって疑われてるの」
line = "「あのね、実は……今回の件、不審者の正体はソフレなんじゃないかって疑われてるの」"

[[dialogue]]
speaker = "フェリシー"
# 「『暴虐の吸血鬼』が、何やらよからぬことを企んでいるんじゃないかって……」
line = "「『暴虐の吸血鬼』が、何やらよからぬことを企んでいるんじゃないかって……」"

[[dialogue]]
speaker = "unk"
# 暴虐の吸血鬼？
line = "暴虐の吸血鬼？"

[[dialogue]]
speaker = "フェリシー"
# 「うん。ソフレは今からちょうど１００年前――」
line = "「うん。ソフレは今からちょうど１００年前――」"

[[dialogue]]
speaker = "フェリシー"
# 「流星市国で暴れて、人々に恐れられた、伝説の吸血鬼なんだ」
line = "「流星市国で暴れて、人々に恐れられた、伝説の吸血鬼なんだ」"
