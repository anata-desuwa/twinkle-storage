[[dialogue]]
speaker = "unk"
# 第３話,染井シズハは諦めない,P
line = "第３話,染井シズハは諦めない,P"

[[dialogue]]
speaker = "unk"
# ある日、俺とサーシャさんは、シズハから呼び出しを受けた。
line = "ある日、俺とサーシャさんは、シズハから呼び出しを受けた。"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「シズハちゃ～ん♪　ごきげんよう♪」
line = "「シズハちゃ～ん♪　ごきげんよう♪」"

[[dialogue]]
speaker = "シズハ"
# 「サーシャさん！　えへへ、ごきげんよう♪」
line = "「サーシャさん！　えへへ、ごきげんよう♪」"

[[dialogue]]
speaker = "トレジアンナ"
# 「会長さん、サーシャさん、こんにちは～♪」
line = "「会長さん、サーシャさん、こんにちは～♪」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「あら♪　トレジアンナさん、今日はサチちゃんと一緒じゃないの？」
line = "「あら♪　トレジアンナさん、今日はサチちゃんと一緒じゃないの？」"

[[dialogue]]
speaker = "unk"
# トレジアンナさんの声は、シズハが手に持っている四つ葉のクローバー型の髪飾りから聞こえてきた。
line = "トレジアンナさんの声は、シズハが手に持っている四つ葉のクローバー型の髪飾りから聞こえてきた。"

[[dialogue]]
speaker = "シズハ"
# 「サチちゃんに頼んで、借りてきたの。トレジアンナさんに見てもらいたいものがあって」
line = "「サチちゃんに頼んで、借りてきたの。トレジアンナさんに見てもらいたいものがあって」"

[[dialogue]]
speaker = "シズハ"
# 「ねぇ、会長、サーシャさん。お願いがあるんだけど――」
line = "「ねぇ、会長、サーシャさん。お願いがあるんだけど――」"

[[dialogue]]
speaker = "シズハ"
# 「私に、魔王だけが使える技――『アルケインコード』を見せてもらえないかしら？」
line = "「私に、魔王だけが使える技――『アルケインコード』を見せてもらえないかしら？」"

[[dialogue]]
speaker = "unk"
# アルケインコードは、以前、新星学園に転入して来た生徒――クルセイダースの子孫であるメイプル・モノクラウンから伝えられた、先代魔王が使っていたという秘技である。
line = "アルケインコードは、以前、新星学園に転入して来た生徒――クルセイダースの子孫であるメイプル・モノクラウンから伝えられた、先代魔王が使っていたという秘技である。"

[[dialogue]]
speaker = "unk"
# その真名は『アルケインノヴァエクストリーム』。メイプル曰く、魔王と絆で結ばれた仲間の潜在能力を覚醒させる技、とのことだ。
line = "その真名は『アルケインノヴァエクストリーム』。メイプル曰く、魔王と絆で結ばれた仲間の潜在能力を覚醒させる技、とのことだ。"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「１度変身に成功していれば、会長くんが近くにいなくてもノヴァフォームに変身可能だとは判明しているけれど……」
line = "「１度変身に成功していれば、会長くんが近くにいなくてもノヴァフォームに変身可能だとは判明しているけれど……」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「シズハちゃんとトレジアンナさんが見たいのは、アルケインコードの発動ってことよね？」
line = "「シズハちゃんとトレジアンナさんが見たいのは、アルケインコードの発動ってことよね？」"

[[dialogue]]
speaker = "シズハ"
# 「うん。お願い！」
line = "「うん。お願い！」"

[[dialogue]]
speaker = "unk"
# 俺は、サーシャさんと目を合わせて頷き、技を唱える。
line = "俺は、サーシャさんと目を合わせて頷き、技を唱える。"

[[dialogue]]
speaker = "unk"
# アルケインノヴァエクストリーム！
line = "アルケインノヴァエクストリーム！"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「チェンジ――ノヴァフォーム！」
line = "「チェンジ――ノヴァフォーム！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「おおぉ～～～っ！　これが魔王だけが使える技ですか～！」
line = "「おおぉ～～～っ！　これが魔王だけが使える技ですか～！」"

[[dialogue]]
speaker = "シズハ"
# 「サーシャさんのパワーアップした戦闘服、やっぱり素敵だわ♪　氷の女王様って感じで、神々しくて、すっごく綺麗♪」
line = "「サーシャさんのパワーアップした戦闘服、やっぱり素敵だわ♪　氷の女王様って感じで、神々しくて、すっごく綺麗♪」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「ふふっ、ありがと～♪　あれから試してわかったんだけど、ノヴァフォームは会長くんが近くにいた方が、魔王の力と共鳴して、より強い力を発揮できるみたい」
line = "「ふふっ、ありがと～♪　あれから試してわかったんだけど、ノヴァフォームは会長くんが近くにいた方が、魔王の力と共鳴して、より強い力を発揮できるみたい」"

[[dialogue]]
speaker = "トレジアンナ"
# 「ふむふむ、今見た感じ、アルケインコードは星力以外の力も使っているようですね～」
line = "「ふむふむ、今見た感じ、アルケインコードは星力以外の力も使っているようですね～」"

[[dialogue]]
speaker = "トレジアンナ"
# 「発動の瞬間、星力、霊力、魔力――３種の力を感じました。それらのミックスが必要となる為に、この技は魔王のみが使えるということなのでしょう」
line = "「発動の瞬間、星力、霊力、魔力――３種の力を感じました。それらのミックスが必要となる為に、この技は魔王のみが使えるということなのでしょう」"

[[dialogue]]
speaker = "トレジアンナ"
# 「そして、術式の基盤はどうやら『魔法』となっているようですね。つまりこれは、一般に普及していない『新魔法』と言えるでしょう！」
line = "「そして、術式の基盤はどうやら『魔法』となっているようですね。つまりこれは、一般に普及していない『新魔法』と言えるでしょう！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「古い時代の魔界では、新しい魔法はそう珍しいものではありませんでしたが……いやはや、しかしこれ程の完成度のものは、滅多にお目にかかれませんよ！」
line = "「古い時代の魔界では、新しい魔法はそう珍しいものではありませんでしたが……いやはや、しかしこれ程の完成度のものは、滅多にお目にかかれませんよ！」"

[[dialogue]]
speaker = "シズハ"
# 「トレジアンナさん。私にも『新魔法』……作れるかな？」
line = "「トレジアンナさん。私にも『新魔法』……作れるかな？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「確証はないですが、実例が目の前にある以上、可能性はありますよ！」
line = "「確証はないですが、実例が目の前にある以上、可能性はありますよ！」"

[[dialogue]]
speaker = "unk"
# そう言って、２人で何やら盛り上がるシズハとトレジアンナさん。
line = "そう言って、２人で何やら盛り上がるシズハとトレジアンナさん。"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「それで、アルケインコードを見たかったのには、どんな事情があるのかしら？」
line = "「それで、アルケインコードを見たかったのには、どんな事情があるのかしら？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「はい。実はですね、シズハさんから『新しい魔法が作れないか？』というご相談を受けまして」
line = "「はい。実はですね、シズハさんから『新しい魔法が作れないか？』というご相談を受けまして」"

[[dialogue]]
speaker = "unk"
# シズハはどうしてそんなものを？
line = "シズハはどうしてそんなものを？"

[[dialogue]]
speaker = "シズハ"
# 「えっと、それはね――」
line = "「えっと、それはね――」"

[[dialogue]]
speaker = "unk"
# ――ある日、シズハはサチとトレジアンナと空き教室に呼んで、１つの相談をしていた。
line = "――ある日、シズハはサチとトレジアンナと空き教室に呼んで、１つの相談をしていた。"

[[dialogue]]
speaker = "トレジアンナ"
# 「なっ……！？　『聖杯』を怪我や病気の人の治療に使いたいですって～～～！？」
line = "「なっ……！？　『聖杯』を怪我や病気の人の治療に使いたいですって～～～！？」"

[[dialogue]]
speaker = "シズハ"
# 「うん、そう。……ダメかな？」
line = "「うん、そう。……ダメかな？」"

[[dialogue]]
speaker = "unk"
# シズハは自身の胸に手を当てながら言う。『願望』のロストアイテム――『願いの聖杯』は、シズハの心臓の部分にあり、融合している。
line = "シズハは自身の胸に手を当てながら言う。『願望』のロストアイテム――『願いの聖杯』は、シズハの心臓の部分にあり、融合している。"

[[dialogue]]
speaker = "トレジアンナ"
# 「だ、だだだ、ダメですよ！　絶対に禁止です！　いや、先に相談して下さってありがとうございます！！！」
line = "「だ、だだだ、ダメですよ！　絶対に禁止です！　いや、先に相談して下さってありがとうございます！！！」"

[[dialogue]]
speaker = "サチ"
# 「え？　私はすごくいいことだと思うんだけど、そんなに慌てるほどダメなの？」
line = "「え？　私はすごくいいことだと思うんだけど、そんなに慌てるほどダメなの？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「ロストアイテムは、リクリエすら超越し得る『超常の力』です」
line = "「ロストアイテムは、リクリエすら超越し得る『超常の力』です」"

[[dialogue]]
speaker = "トレジアンナ"
# 「特に聖杯は、『過程を飛ばして結果を手に入れる』『結果を手に入れたことで現在が書き換わる』――」
line = "「特に聖杯は、『過程を飛ばして結果を手に入れる』『結果を手に入れたことで現在が書き換わる』――」"

[[dialogue]]
speaker = "トレジアンナ"
# 「すなわち『因果律に干渉する』力。ロストアイテムの中でも、トップクラスにヤバい代物です」
line = "「すなわち『因果律に干渉する』力。ロストアイテムの中でも、トップクラスにヤバい代物です」"

[[dialogue]]
speaker = "トレジアンナ"
# 「世界にも『自己修復力』とでも呼ぶような、『不自然の辻褄を勝手に合わせてくれる』能力があります」
line = "「世界にも『自己修復力』とでも呼ぶような、『不自然の辻褄を勝手に合わせてくれる』能力があります」"

[[dialogue]]
speaker = "トレジアンナ"
# 「守護天使が一時不在でも、急に世界が崩壊しないのはこの力のお陰ですし……」
line = "「守護天使が一時不在でも、急に世界が崩壊しないのはこの力のお陰ですし……」"

[[dialogue]]
speaker = "トレジアンナ"
# 「ロストアイテムが多少使われるくらいの『不自然』なら、ヒトの体の傷が勝手に癒えるように、問題にはなりません」
line = "「ロストアイテムが多少使われるくらいの『不自然』なら、ヒトの体の傷が勝手に癒えるように、問題にはなりません」"

[[dialogue]]
speaker = "トレジアンナ"
# 「つまり、シズハさんが戦闘に聖杯を用いるくらいなら問題にはならない」
line = "「つまり、シズハさんが戦闘に聖杯を用いるくらいなら問題にはならない」"

[[dialogue]]
speaker = "トレジアンナ"
# 「ですが、死せる運命の人を、それも何人、何十人と救うのは、世界を大きく歪める原因になり得ます」
line = "「ですが、死せる運命の人を、それも何人、何十人と救うのは、世界を大きく歪める原因になり得ます」"

[[dialogue]]
speaker = "サチ"
# 「じゃあ、ロストアイテムで人を治療するのは……」
line = "「じゃあ、ロストアイテムで人を治療するのは……」"

[[dialogue]]
speaker = "トレジアンナ"
# 「やめておいた方がいいと思いますね～。三界の摂理が壊れて、そこから次のリクリエが始まっちゃう可能性だってありますよ！」
line = "「やめておいた方がいいと思いますね～。三界の摂理が壊れて、そこから次のリクリエが始まっちゃう可能性だってありますよ！」"

[[dialogue]]
speaker = "サチ"
# 「なるほど……ロストアイテムの危険性って、具体的にはそういうことだったんですね」
line = "「なるほど……ロストアイテムの危険性って、具体的にはそういうことだったんですね」"

[[dialogue]]
speaker = "シズハ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "シズハ"
# 「世界に『自己修復力』があるというのは、仮説じゃなくて……間違いないのかな？」
line = "「世界に『自己修復力』があるというのは、仮説じゃなくて……間違いないのかな？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「はい。それは確かです。これでも私、昔は研究者をやっていたので！」
line = "「はい。それは確かです。これでも私、昔は研究者をやっていたので！」"

[[dialogue]]
speaker = "シズハ"
# 「それなら、ロストアイテムの能力を使って人を治療するんじゃなくて……」
line = "「それなら、ロストアイテムの能力を使って人を治療するんじゃなくて……」"

[[dialogue]]
speaker = "シズハ"
# 「聖杯ちゃんの魔力を用いて、私の『魔法』で人を治療するのなら……どうかな？」
line = "「聖杯ちゃんの魔力を用いて、私の『魔法』で人を治療するのなら……どうかな？」"

[[dialogue]]
speaker = "シズハ"
# 「つまりは、今ある医療や回復星術では治せない怪我や病気を治療する――『新魔法』を作るの」
line = "「つまりは、今ある医療や回復星術では治せない怪我や病気を治療する――『新魔法』を作るの」"

[[dialogue]]
speaker = "シズハ"
# 「そんなわけで、新魔法の参考として、会長の『アルケインノヴァエクストリーム』を見せてもらいたかったの」
line = "「そんなわけで、新魔法の参考として、会長の『アルケインノヴァエクストリーム』を見せてもらいたかったの」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「シズハちゃんはすごいことを考えるのね～」
line = "「シズハちゃんはすごいことを考えるのね～」"

[[dialogue]]
speaker = "シズハ"
# 「えへへ♪　私、諦めないことに関しては、人一倍自信があるから！」
line = "「えへへ♪　私、諦めないことに関しては、人一倍自信があるから！」"

[[dialogue]]
speaker = "シズハ"
# 「……前にも話したかもしれないけど、聖杯ちゃんと出会わなければ、私は余命わずかで、そのまま死ぬところだった」
line = "「……前にも話したかもしれないけど、聖杯ちゃんと出会わなければ、私は余命わずかで、そのまま死ぬところだった」"

[[dialogue]]
speaker = "シズハ"
# 「だからね、入院生活の中で、人生の意味みたいなものをよく考えてたの」
line = "「だからね、入院生活の中で、人生の意味みたいなものをよく考えてたの」"

[[dialogue]]
speaker = "シズハ"
# 「私は、全ての命に生まれた意味がある『とは思わない』わ」
line = "「私は、全ての命に生まれた意味がある『とは思わない』わ」"

[[dialogue]]
speaker = "シズハ"
# 「何事も成せずに死んでいく命は多くある。実際に病院で見てきたし……」
line = "「何事も成せずに死んでいく命は多くある。実際に病院で見てきたし……」"

[[dialogue]]
speaker = "シズハ"
# 「だからこそ私は、生き延びた今日に感謝して、自分の生き残った意味を未来に、少しでも多く残したいって思うの」
line = "「だからこそ私は、生き延びた今日に感謝して、自分の生き残った意味を未来に、少しでも多く残したいって思うの」"

[[dialogue]]
speaker = "シズハ"
# 「生きた証が偉業である必要はないと思う。けれど、私は『聖杯』の所持者になってしまったから」
line = "「生きた証が偉業である必要はないと思う。けれど、私は『聖杯』の所持者になってしまったから」"

[[dialogue]]
speaker = "シズハ"
# 「それによって救える何かがあるなら、可能性を諦めたくないの」
line = "「それによって救える何かがあるなら、可能性を諦めたくないの」"

[[dialogue]]
speaker = "シズハ"
# 「……寿命の短い人間でしかない私が生きてるうちに、『新魔法』は完成しないかもしれない」
line = "「……寿命の短い人間でしかない私が生きてるうちに、『新魔法』は完成しないかもしれない」"

[[dialogue]]
speaker = "シズハ"
# 「トレジアンナさんが言うには、素晴らしい魔法は何百年、何千年という積み重ねの果てに生まれるものであって、そうそう完成はしないんだって」
line = "「トレジアンナさんが言うには、素晴らしい魔法は何百年、何千年という積み重ねの果てに生まれるものであって、そうそう完成はしないんだって」"

[[dialogue]]
speaker = "シズハ"
# 「でもね……私の死は、私が何かを諦める理由にはならないわ」
line = "「でもね……私の死は、私が何かを諦める理由にはならないわ」"

[[dialogue]]
speaker = "シズハ"
# 「私の始めた研究を、いつかトレジアンナさんや、未来の星騎士や魔族のヒトが完成させてくれるかもしれない」
line = "「私の始めた研究を、いつかトレジアンナさんや、未来の星騎士や魔族のヒトが完成させてくれるかもしれない」"

[[dialogue]]
speaker = "シズハ"
# 「だから私は目指すわ――命を救う『新魔法』の実現を！」
line = "「だから私は目指すわ――命を救う『新魔法』の実現を！」"

[[dialogue]]
speaker = "unk"
# シズハ、なんだかカッコいいな
line = "シズハ、なんだかカッコいいな"

[[dialogue]]
speaker = "シズハ"
# 「え？　そうかな？　会長に言われると、なんだか照れるわね♪」
line = "「え？　そうかな？　会長に言われると、なんだか照れるわね♪」"

[[dialogue]]
speaker = "unk"
# 年下で普段は無邪気な姿を見せることも多い彼女なのに、今日はなんだか大人っぽく見えた。
line = "年下で普段は無邪気な姿を見せることも多い彼女なのに、今日はなんだか大人っぽく見えた。"

[[dialogue]]
speaker = "unk"
# 新魔法の研究、もちろん協力するよ
line = "新魔法の研究、もちろん協力するよ"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「研究で私が手伝えることは少ないかもしれないけど、実験だったらいくらでも付き合うから、何でも言ってね♪」
line = "「研究で私が手伝えることは少ないかもしれないけど、実験だったらいくらでも付き合うから、何でも言ってね♪」"

[[dialogue]]
speaker = "シズハ"
# 「会長、サーシャさん、本当にありがとう！！」
line = "「会長、サーシャさん、本当にありがとう！！」"

[[dialogue]]
speaker = "unk"
# 俺たちが協力を約束すると、彼女は嬉しそうに微笑むのだった。
line = "俺たちが協力を約束すると、彼女は嬉しそうに微笑むのだった。"
