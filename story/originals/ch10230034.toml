[[dialogue]]
speaker = "unk"
# 第４話,最高のペアリング（後編）,P
line = "第４話,最高のペアリング（後編）,P"

[[dialogue]]
speaker = "シャロン"
# 「お邪魔しますっ。わぁ、会長さまのお家……♪」
line = "「お邪魔しますっ。わぁ、会長さまのお家……♪」"

[[dialogue]]
speaker = "シャロン"
# 「ではさっそくお菓子の封を開けて……ん～っ<emoji=heart04>　甘くて香ばしい匂いでいっぱいですね♪」
line = "「ではさっそくお菓子の封を開けて……ん～っ<emoji=heart04>　甘くて香ばしい匂いでいっぱいですね♪」"

[[dialogue]]
speaker = "シャロン"
# 「お店にいる時からずっと我慢できなかったんですっ。早速ですけど、おやつの時間にしましょう」
line = "「お店にいる時からずっと我慢できなかったんですっ。早速ですけど、おやつの時間にしましょう」"

[[dialogue]]
speaker = "シャロン"
# 「ではお紅茶のためにお湯を沸かして……お菓子はトースターで少し温めましょうか」
line = "「ではお紅茶のためにお湯を沸かして……お菓子はトースターで少し温めましょうか」"

[[dialogue]]
speaker = "シャロン"
# 「カフェで皆さまとワイワイお話ししながらのお茶会も好きですけど……」
line = "「カフェで皆さまとワイワイお話ししながらのお茶会も好きですけど……」"

[[dialogue]]
speaker = "シャロン"
# 「会長さまとふたりきりのティータイム……準備しているだけでもドキドキして、すごく楽しいですっ<emoji=heart04>」
line = "「会長さまとふたりきりのティータイム……準備しているだけでもドキドキして、すごく楽しいですっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# シャロンがポットに沸いたお湯を注ぐ。茶葉が開くと、ふわりとバラの香りが広がった。
line = "シャロンがポットに沸いたお湯を注ぐ。茶葉が開くと、ふわりとバラの香りが広がった。"

[[dialogue]]
speaker = "unk"
# これがシャロンのブレンドティー？
line = "これがシャロンのブレンドティー？"

[[dialogue]]
speaker = "シャロン"
# 「ふふ、そうです。でもまだ完成じゃないですよ。ここにお砂糖とミルクを入れまして……」
line = "「ふふ、そうです。でもまだ完成じゃないですよ。ここにお砂糖とミルクを入れまして……」"

[[dialogue]]
speaker = "シャロン"
# 「できました。ほんのりとバラの香る、あなたの心を癒す甘々ミルクティー……名付けて、マイ・スイートハート・ブレンドですっ、えへへ<emoji=heart04>」
line = "「できました。ほんのりとバラの香る、あなたの心を癒す甘々ミルクティー……名付けて、マイ・スイートハート・ブレンドですっ、えへへ<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
# 「会長さまのお茶は、まだ淹れないんですか？」
line = "「会長さまのお茶は、まだ淹れないんですか？」"

[[dialogue]]
speaker = "unk"
# 順番、順番
line = "順番、順番"

[[dialogue]]
speaker = "シャロン"
# 「はぁ……順番ですか……？」
line = "「はぁ……順番ですか……？」"

[[dialogue]]
speaker = "シャロン"
# 「ちなみにこのお紅茶は、サランさまがおっしゃるには、こちらのマカロンと合わせるといいそうで……」
line = "「ちなみにこのお紅茶は、サランさまがおっしゃるには、こちらのマカロンと合わせるといいそうで……」"

[[dialogue]]
speaker = "シャロン"
# 「半分っこしましょうね。はい、会長さま、お口あけてくださーい。あーん♪」
line = "「半分っこしましょうね。はい、会長さま、お口あけてくださーい。あーん♪」"

[[dialogue]]
speaker = "シャロン"
# 「どうです？　美味しいですか？」
line = "「どうです？　美味しいですか？」"

[[dialogue]]
speaker = "unk"
# シャロンのあーんで１００倍美味しい
line = "シャロンのあーんで１００倍美味しい"

[[dialogue]]
speaker = "シャロン"
# 「そんなにですか？　でしたら会長さま、私にもあーんしてください<emoji=heart04>」
line = "「そんなにですか？　でしたら会長さま、私にもあーんしてください<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
# 「あーん……♪」
line = "「あーん……♪」"

[[dialogue]]
speaker = "シャロン"
# 「もぐもぐ……ふふ、本当ですね。会長さまにあーんしてもらうと、試食した時よりも格別に美味しいですっ。確かに１００倍美味しいですねっ」
line = "「もぐもぐ……ふふ、本当ですね。会長さまにあーんしてもらうと、試食した時よりも格別に美味しいですっ。確かに１００倍美味しいですねっ」"

[[dialogue]]
speaker = "シャロン"
# 「お口の中が幸せなうちに、ミルクティーを一口……ずず」
line = "「お口の中が幸せなうちに、ミルクティーを一口……ずず」"

[[dialogue]]
speaker = "シャロン"
# 「んんーーーっ！！？　お口の中にバラが咲きましたっ！？」
line = "「んんーーーっ！！？　お口の中にバラが咲きましたっ！？」"

[[dialogue]]
speaker = "unk"
# 甘みと香りが大爆発！
line = "甘みと香りが大爆発！"

[[dialogue]]
speaker = "シャロン"
# 「ふぁぁ……<emoji=heart04>　お花畑でティーパーティーしてるみたいです……美味しすぎて、うっとりしちゃいますっ……<emoji=heart04>」
line = "「ふぁぁ……<emoji=heart04>　お花畑でティーパーティーしてるみたいです……美味しすぎて、うっとりしちゃいますっ……<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
# 「さすがはサランさまのオススメです……フードペアリングで美味しさが何倍にもなりました……！」
line = "「さすがはサランさまのオススメです……フードペアリングで美味しさが何倍にもなりました……！」"

[[dialogue]]
speaker = "シャロン"
# 「では、そろそろ会長さまのブレンドティーを……どのお菓子と合わせるんですか？」
line = "「では、そろそろ会長さまのブレンドティーを……どのお菓子と合わせるんですか？」"

[[dialogue]]
speaker = "unk"
# 俺が合わせるお菓子はこのカヌレだよ
line = "俺が合わせるお菓子はこのカヌレだよ"

[[dialogue]]
speaker = "シャロン"
# 「えっ……？　カヌレはあのお店には置いていなかったと思いますけど……その包装は──」
line = "「えっ……？　カヌレはあのお店には置いていなかったと思いますけど……その包装は──」"

[[dialogue]]
speaker = "シャロン"
# 「あっ！？　もしかして、私が差し上げたカヌレですか！？　まだ残っていたんですか！？」
line = "「あっ！？　もしかして、私が差し上げたカヌレですか！？　まだ残っていたんですか！？」"

[[dialogue]]
speaker = "unk"
# シャロンからもらったカヌレを、さっき冷蔵庫から取り出して温め直した。
line = "シャロンからもらったカヌレを、さっき冷蔵庫から取り出して温め直した。"

[[dialogue]]
speaker = "unk"
# 大事な大事な大本命のバレンタインプレゼントだ。なくなってしまうのがもったいなくて、ちょっとずつゆっくり食べていた。
line = "大事な大事な大本命のバレンタインプレゼントだ。なくなってしまうのがもったいなくて、ちょっとずつゆっくり食べていた。"

[[dialogue]]
speaker = "シャロン"
# 「もう、会長さまってば……言ってくれれば、いつでも作りますのに……それと、こちらのブレンドティーは……」
line = "「もう、会長さまってば……言ってくれれば、いつでも作りますのに……それと、こちらのブレンドティーは……」"

[[dialogue]]
speaker = "unk"
# チョコに合う紅茶だよ
line = "チョコに合う紅茶だよ"

[[dialogue]]
speaker = "シャロン"
# 「優しくて、爽やかないい香り……なんだか会長さまらしいです」
line = "「優しくて、爽やかないい香り……なんだか会長さまらしいです」"

[[dialogue]]
speaker = "シャロン"
# 「まずはカヌレを……会長さまが食べさせてくださるのですか？　あーんっ……もぐっ♪」
line = "「まずはカヌレを……会長さまが食べさせてくださるのですか？　あーんっ……もぐっ♪」"

[[dialogue]]
speaker = "シャロン"
# 「会長さまも、あーんしてくらはい♪」
line = "「会長さまも、あーんしてくらはい♪」"

[[dialogue]]
speaker = "シャロン"
# 「もぐもぐ……自画自賛になってしまいますけど、とても美味しくできましたね。では、会長さまのお紅茶を……ずず……」
line = "「もぐもぐ……自画自賛になってしまいますけど、とても美味しくできましたね。では、会長さまのお紅茶を……ずず……」"

[[dialogue]]
speaker = "unk"
# シャロンの手作りカヌレとブレンドティーの相性は抜群だ。カヌレの香ばしさが、紅茶の熱で広がって──
line = "シャロンの手作りカヌレとブレンドティーの相性は抜群だ。カヌレの香ばしさが、紅茶の熱で広がって──"

[[dialogue]]
speaker = "シャロン"
# 「っ……う、うぅぅっ……ひぅぅ……っ！」
line = "「っ……う、うぅぅっ……ひぅぅ……っ！」"

[[dialogue]]
speaker = "unk"
# 美味しくなかった……！？
line = "美味しくなかった……！？"

[[dialogue]]
speaker = "シャロン"
# 「違います違います！　ごめんなさいっ、この涙は、その、嬉し泣きなんです。勝手に涙が出てきちゃっただけで……！」
line = "「違います違います！　ごめんなさいっ、この涙は、その、嬉し泣きなんです。勝手に涙が出てきちゃっただけで……！」"

[[dialogue]]
speaker = "シャロン"
# 「とっても……とっても美味しくって、最高の組み合わせで……！」
line = "「とっても……とっても美味しくって、最高の組み合わせで……！」"

[[dialogue]]
speaker = "シャロン"
# 「私のお菓子との相性を一番に考えてくれたのが、とっても、とっても嬉しくって……」
line = "「私のお菓子との相性を一番に考えてくれたのが、とっても、とっても嬉しくって……」"

[[dialogue]]
speaker = "シャロン"
# 「会長さまが恋人で、私、今すっごく幸せなんです。ますます、あなたを好きになってしまいました……<emoji=heart04>」
line = "「会長さまが恋人で、私、今すっごく幸せなんです。ますます、あなたを好きになってしまいました……<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
# 「また作りますから、また一緒に食べましょうね。あなたのブレンドティーも添えて」
line = "「また作りますから、また一緒に食べましょうね。あなたのブレンドティーも添えて」"

[[dialogue]]
speaker = "シャロン"
# 「大好きです……愛してます、会長さま……ちゅっ<emoji=heart04>」
line = "「大好きです……愛してます、会長さま……ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# シャロンと重ねた唇から、チョコレートと紅茶の香りが漂う。
line = "シャロンと重ねた唇から、チョコレートと紅茶の香りが漂う。"

[[dialogue]]
speaker = "unk"
# どんなスイーツよりも甘くて、幸せだった。
line = "どんなスイーツよりも甘くて、幸せだった。"
