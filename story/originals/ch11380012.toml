[[dialogue]]
speaker = "unk"
# 第２話,メルエルと百合スキンシップ,P
line = "第２話,メルエルと百合スキンシップ,P"

[[dialogue]]
speaker = "unk"
# 望みを叶えたことで無事、メルエルは元の１人へと戻ることができた。
line = "望みを叶えたことで無事、メルエルは元の１人へと戻ることができた。"

[[dialogue]]
speaker = "unk"
# それから１週間後のこと。
line = "それから１週間後のこと。"

[[dialogue]]
speaker = "メルエル"
# 「か、会長くん、あのね……すぅ～、はぁ～……よし！」
line = "「か、会長くん、あのね……すぅ～、はぁ～……よし！」"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「――私、実はまた、会長くんにお願いしたいことがあるの！」
line = "「――私、実はまた、会長くんにお願いしたいことがあるの！」"

[[dialogue]]
speaker = "unk"
# メルエルは『リトルフォーム』として、自分の意思で小さな姿に変身できるようになっていた。
line = "メルエルは『リトルフォーム』として、自分の意思で小さな姿に変身できるようになっていた。"

[[dialogue]]
speaker = "unk"
# そうして勇気を出す為に変身することで、前より自分が望んでいることを積極的に口にするようになっていた。
line = "そうして勇気を出す為に変身することで、前より自分が望んでいることを積極的に口にするようになっていた。"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「私……女の子に変身した会長くんとも、イチャイチャしてみたくて！」
line = "「私……女の子に変身した会長くんとも、イチャイチャしてみたくて！」"

[[dialogue]]
speaker = "unk"
# ん！？　なんて！？
line = "ん！？　なんて！？"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「その……会長くんにも一応『リトルフォーム』があるでしょ？　前にそれで一時期、附属校に通ってたことがあるじゃない？」
line = "「その……会長くんにも一応『リトルフォーム』があるでしょ？　前にそれで一時期、附属校に通ってたことがあるじゃない？」"

[[dialogue]]
speaker = "unk"
# 元々はアニマ先輩が趣味で作っていたという、俺専用の附属生女子の義体のことだ。
line = "元々はアニマ先輩が趣味で作っていたという、俺専用の附属生女子の義体のことだ。"

[[dialogue]]
speaker = "unk"
# 現在はフォームチェンジ技術の発展によって、いつでも変身できるようになっていた。
line = "現在はフォームチェンジ技術の発展によって、いつでも変身できるようになっていた。"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「会長くんは、女の子に変身するの恥ずかしいから、あんまり変身しないようにしてるって言ってたけど……」
line = "「会長くんは、女の子に変身するの恥ずかしいから、あんまり変身しないようにしてるって言ってたけど……」"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「私、女の子の会長くんとも仲良くしてみたいな～って、本当は思ってて……！」
line = "「私、女の子の会長くんとも仲良くしてみたいな～って、本当は思ってて……！」"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「だってだって！　大好きな恋人の男の子が、可愛い女の子に変身できるんだよ！？」
line = "「だってだって！　大好きな恋人の男の子が、可愛い女の子に変身できるんだよ！？」"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「恋人として触れ合うとどんな感じがするのかって、好奇心で色々妄想しちゃうというか……<emoji=heart04>」
line = "「恋人として触れ合うとどんな感じがするのかって、好奇心で色々妄想しちゃうというか……<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「――前にも見たことあるんじゃないかって？　う、うん。でもあの時は、会長くんから変に思われるのが恥ずかしくて……」
line = "「――前にも見たことあるんじゃないかって？　う、うん。でもあの時は、会長くんから変に思われるのが恥ずかしくて……」"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「でも、会長くんともっと親密になる為にも、試してみたいな～って……ダメかなぁ？」
line = "「でも、会長くんともっと親密になる為にも、試してみたいな～って……ダメかなぁ？」"

[[dialogue]]
speaker = "unk"
# わ、わかった。そこまで言うなら……
line = "わ、わかった。そこまで言うなら……"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「本当！？　ありがとう<emoji=heart04>　会長くん、大好きっ<emoji=heart04>」
line = "「本当！？　ありがとう<emoji=heart04>　会長くん、大好きっ<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「はあぁ～～<emoji=heart04>　会長くんのリトルフォーム、改めて見てもやっぱり可愛いよぉ<emoji=heart04>」
line = "「はあぁ～～<emoji=heart04>　会長くんのリトルフォーム、改めて見てもやっぱり可愛いよぉ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺の家へと移動して２人きりになったところで、附属生女子の姿に変身してみせると、メルエルは目を輝かせながら眺めてくる。
line = "俺の家へと移動して２人きりになったところで、附属生女子の姿に変身してみせると、メルエルは目を輝かせながら眺めてくる。"

[[dialogue]]
speaker = "unk"
# 一応、大きい女体化フォームもあるけど……
line = "一応、大きい女体化フォームもあるけど……"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「そ、そっちも興味はあるけど……おっきい方は美人過ぎて刺激が強いから、まずは附属生の女の子になった会長くんから……<emoji=heart04>」
line = "「そ、そっちも興味はあるけど……おっきい方は美人過ぎて刺激が強いから、まずは附属生の女の子になった会長くんから……<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「じゃあその……会長くん、触れてみても、いいかな？」
line = "「じゃあその……会長くん、触れてみても、いいかな？」"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「――それじゃあ、えっと……まずは髪を触るね？」
line = "「――それじゃあ、えっと……まずは髪を触るね？」"

[[dialogue]]
speaker = "unk"
# そう言って、メルエルの手が優しく、俺の長くなった髪を撫でてくる。
line = "そう言って、メルエルの手が優しく、俺の長くなった髪を撫でてくる。"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「はあぁぁ……<emoji=heart04>　すごくさらさらで、綺麗な黒髪……それに、会長くんの肌も……」
line = "「はあぁぁ……<emoji=heart04>　すごくさらさらで、綺麗な黒髪……それに、会長くんの肌も……」"

[[dialogue]]
speaker = "unk"
# 今度は俺の頬に、メルエルの指が触れる。
line = "今度は俺の頬に、メルエルの指が触れる。"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「へ、変な感じ……<emoji=heart04>　今は同性なのに、相手が会長くんだって思うと、胸がドキドキしてきちゃう<emoji=heart04>」
line = "「へ、変な感じ……<emoji=heart04>　今は同性なのに、相手が会長くんだって思うと、胸がドキドキしてきちゃう<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「ね、ねぇ、会長くん……抱きしめてみても、いいかなっ？」
line = "「ね、ねぇ、会長くん……抱きしめてみても、いいかなっ？」"

[[dialogue]]
speaker = "unk"
# 俺は頷くと、お互いに背中へと手を回して、そっと抱き合う。
line = "俺は頷くと、お互いに背中へと手を回して、そっと抱き合う。"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「ん……<emoji=heart04>　いつも抱き合う時とは、違う感覚<emoji=heart04>　女の子の体って、こんなに柔らかいんだ……<emoji=heart04>」
line = "「ん……<emoji=heart04>　いつも抱き合う時とは、違う感覚<emoji=heart04>　女の子の体って、こんなに柔らかいんだ……<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「それに、会長くんの匂いも、いつもと違う……<emoji=heart04>」
line = "「それに、会長くんの匂いも、いつもと違う……<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「――ううん、全然イヤな匂いじゃないよ<emoji=heart04>　男の子の時よりも甘い感じの匂いで……もっとイチャイチャしたい気分になってきちゃう<emoji=heart04>」
line = "「――ううん、全然イヤな匂いじゃないよ<emoji=heart04>　男の子の時よりも甘い感じの匂いで……もっとイチャイチャしたい気分になってきちゃう<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺も……このままキス、してもいい？
line = "俺も……このままキス、してもいい？"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「！　そ、そうだよね。見た目は女の子でも、会長くんは男の子だもん。こんな風にくっ付いてたら……キス、してきたくなっちゃうよね<emoji=heart04>」
line = "「！　そ、そうだよね。見た目は女の子でも、会長くんは男の子だもん。こんな風にくっ付いてたら……キス、してきたくなっちゃうよね<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「私も……大丈夫<emoji=heart04>　ドキドキしてて、凄くしたいって気分に、なってるから……<emoji=heart04>」
line = "「私も……大丈夫<emoji=heart04>　ドキドキしてて、凄くしたいって気分に、なってるから……<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「どうぞ<emoji=heart04>　んっ……<emoji=heart04>」
line = "「どうぞ<emoji=heart04>　んっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そう言って目を閉じるメルエルの唇に、俺はそっと唇を落とす。
line = "そう言って目を閉じるメルエルの唇に、俺はそっと唇を落とす。"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「ちゅっ<emoji=heart04>　んむっ……<emoji=heart04>」
line = "「ちゅっ<emoji=heart04>　んむっ……<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「――はあぁあっ<emoji=heart04>　会長くん……<emoji=heart04>」
line = "「――はあぁあっ<emoji=heart04>　会長くん……<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「すごい……<emoji=heart04>　女の子同士のキスでも、メルトしちゃいそう……<emoji=heart04>」
line = "「すごい……<emoji=heart04>　女の子同士のキスでも、メルトしちゃいそう……<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「私、もし会長くんが女の子だったとしても……やっぱり同じように恋に落ちてたんじゃないかって気がするよぉ<emoji=heart04>」
line = "「私、もし会長くんが女の子だったとしても……やっぱり同じように恋に落ちてたんじゃないかって気がするよぉ<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「だって……触れ合ってるとこんなに甘くて、ドキドキしちゃうんだもん<emoji=heart04>」
line = "「だって……触れ合ってるとこんなに甘くて、ドキドキしちゃうんだもん<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「ねぇ……もっと試してもいいかなぁ？」
line = "「ねぇ……もっと試してもいいかなぁ？」"

[[dialogue]]
speaker = "unk"
# 俺は頷くと、メルエルの体をまた抱き寄せる。
line = "俺は頷くと、メルエルの体をまた抱き寄せる。"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「あっ<emoji=heart04>　んんっ……ちゅっ<emoji=heart04>」
line = "「あっ<emoji=heart04>　んんっ……ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# その日は女の子の体に変身したままで、メルエルとたくさん触れ合って過ごすのだった。
line = "その日は女の子の体に変身したままで、メルエルとたくさん触れ合って過ごすのだった。"
