[[dialogue]]
speaker = "unk"
# 第２話,ラブレター大作戦,P
line = "第２話,ラブレター大作戦,P"

[[dialogue]]
speaker = "unk"
# せつなに告白すると決めた俺は、ヨミに相談に乗ってもらい、ラブレターを書くことに決めた。
line = "せつなに告白すると決めた俺は、ヨミに相談に乗ってもらい、ラブレターを書くことに決めた。"

[[dialogue]]
speaker = "unk"
# そうして書き上げたラブレターを教室の机の上に置き、コソコソと隠れているせつなに声をかける。
line = "そうして書き上げたラブレターを教室の机の上に置き、コソコソと隠れているせつなに声をかける。"

[[dialogue]]
speaker = "unk"
# せつなに大事な話があって手紙を書いた！
line = "せつなに大事な話があって手紙を書いた！"

[[dialogue]]
speaker = "せつな"
# 「はいでござる……」
line = "「はいでござる……」"

[[dialogue]]
speaker = "せつな"
# 「その……ここ数日、主様から逃げ回るような真似をして、申し訳ございませぬ」
line = "「その……ここ数日、主様から逃げ回るような真似をして、申し訳ございませぬ」"

[[dialogue]]
speaker = "せつな"
# 「もちろん、主様の近くにはずっと控えていて、何かあればいつでも役目を果たせるようにはしていたでござるが、よく考えたらちょっとストーカーっぽかったでござる……」
line = "「もちろん、主様の近くにはずっと控えていて、何かあればいつでも役目を果たせるようにはしていたでござるが、よく考えたらちょっとストーカーっぽかったでござる……」"

[[dialogue]]
speaker = "せつな"
# 「全然気にしてない……でござるか？　うぅぅ……自分の感情すら殺せぬ不甲斐ない忍者で、面目次第もないでござる」
line = "「全然気にしてない……でござるか？　うぅぅ……自分の感情すら殺せぬ不甲斐ない忍者で、面目次第もないでござる」"

[[dialogue]]
speaker = "unk"
# むしろ俺の方が主様失格じゃないか心配だ
line = "むしろ俺の方が主様失格じゃないか心配だ"

[[dialogue]]
speaker = "せつな"
# 「そんなことは絶対にありえませぬ……！　せつなの主様は、主様だけでござる」
line = "「そんなことは絶対にありえませぬ……！　せつなの主様は、主様だけでござる」"

[[dialogue]]
speaker = "せつな"
# 「ただ……せつなもこんなことは生まれて初めての経験で、どうしていいのかわからないのでござる」
line = "「ただ……せつなもこんなことは生まれて初めての経験で、どうしていいのかわからないのでござる」"

[[dialogue]]
speaker = "せつな"
# 「主様も同じでござるか……？　そう、なのでござりまするか」
line = "「主様も同じでござるか……？　そう、なのでござりまするか」"

[[dialogue]]
speaker = "せつな"
# 「うぅぅ……恥ずかしくて、どうしていいのか本当にわからないのでござるが、それでも主様の専属忍者として、逃げたくはないでござる」
line = "「うぅぅ……恥ずかしくて、どうしていいのか本当にわからないのでござるが、それでも主様の専属忍者として、逃げたくはないでござる」"

[[dialogue]]
speaker = "unk"
# 手紙はせつなへのラブレターだ……！
line = "手紙はせつなへのラブレターだ……！"

[[dialogue]]
speaker = "unk"
# 騙し打ちにならないように宣言しておくと
line = "騙し打ちにならないように宣言しておくと"

[[dialogue]]
speaker = "せつな"
# 「ら、ラブレター……要するに、恋文でござるか？」
line = "「ら、ラブレター……要するに、恋文でござるか？」"

[[dialogue]]
speaker = "せつな"
# 「な、なるほど。主様の、せつなへの気持ちを綴った文章、でござるか……」
line = "「な、なるほど。主様の、せつなへの気持ちを綴った文章、でござるか……」"

[[dialogue]]
speaker = "せつな"
# 「確かに、心の準備をせずに読んだら、心臓が止まってしまう可能性があったでござる……」
line = "「確かに、心の準備をせずに読んだら、心臓が止まってしまう可能性があったでござる……」"

[[dialogue]]
speaker = "せつな"
# 「そ、それはもちろん、察するところもあったでござるが……主様本人から宣言されるかどうかでは、準備のほどが変わるでござる」
line = "「そ、それはもちろん、察するところもあったでござるが……主様本人から宣言されるかどうかでは、準備のほどが変わるでござる」"

[[dialogue]]
speaker = "unk"
# ゆっくり読んで、気が向いたら返事が欲しい
line = "ゆっくり読んで、気が向いたら返事が欲しい"

[[dialogue]]
speaker = "unk"
# 俺がここに居たら読みづらいと思うから
line = "俺がここに居たら読みづらいと思うから"

[[dialogue]]
speaker = "せつな"
# 「ま、待ってほしいでござる……！」
line = "「ま、待ってほしいでござる……！」"

[[dialogue]]
speaker = "せつな"
# 「確かにせつなには、主様から直接告白を聞く度胸がありませぬ……！」
line = "「確かにせつなには、主様から直接告白を聞く度胸がありませぬ……！」"

[[dialogue]]
speaker = "せつな"
# 「そんなせつなのことを思いやって、恋文をしたためてくださったことは、本当に嬉しく思いまする！」
line = "「そんなせつなのことを思いやって、恋文をしたためてくださったことは、本当に嬉しく思いまする！」"

[[dialogue]]
speaker = "せつな"
# 「主様の目の前でこの文章を読むことも、きっとまだせつなにはできませぬ。そんなことをしたら、きっとせつなの顔と心臓は、爆発してしまいまするっ」
line = "「主様の目の前でこの文章を読むことも、きっとまだせつなにはできませぬ。そんなことをしたら、きっとせつなの顔と心臓は、爆発してしまいまするっ」"

[[dialogue]]
speaker = "せつな"
# 「ですが、せつなはここまでして下さった主様から、これ以上逃げたくはないでござるっ」
line = "「ですが、せつなはここまでして下さった主様から、これ以上逃げたくはないでござるっ」"

[[dialogue]]
speaker = "せつな"
# 「どうしたらいいのか、せつなにはわからないでござる。だけど、もう主様の気持ちから、自分から遠ざかりたくはないのでござる」
line = "「どうしたらいいのか、せつなにはわからないでござる。だけど、もう主様の気持ちから、自分から遠ざかりたくはないのでござる」"

[[dialogue]]
speaker = "unk"
# わかった。それなら……
line = "わかった。それなら……"

[[dialogue]]
speaker = "せつな"
# 「せつなが恋文を読み終わるまで、背中を向けたまま一緒に教室で待つ……でござるか？」
line = "「せつなが恋文を読み終わるまで、背中を向けたまま一緒に教室で待つ……でござるか？」"

[[dialogue]]
speaker = "unk"
# せつなには自分のペース読んで欲しい
line = "せつなには自分のペース読んで欲しい"

[[dialogue]]
speaker = "unk"
# 焦らなくていい。何時間でも待つから
line = "焦らなくていい。何時間でも待つから"

[[dialogue]]
speaker = "unk"
# 正直、赤裸々な自分の好意を綴った文章を、本人に目の前で読まれるのは恥ずかしすぎて死ねるシチュエーションではあったが……
line = "正直、赤裸々な自分の好意を綴った文章を、本人に目の前で読まれるのは恥ずかしすぎて死ねるシチュエーションではあったが……"

[[dialogue]]
speaker = "unk"
# きっとせつなも同じような気持ちを味わっていると思えば、覚悟を決めるしかない。
line = "きっとせつなも同じような気持ちを味わっていると思えば、覚悟を決めるしかない。"

[[dialogue]]
speaker = "せつな"
# 「はいっ。ありがとうございまする、主様……！」
line = "「はいっ。ありがとうございまする、主様……！」"

[[dialogue]]
speaker = "せつな"
# 「お、お待たせいたしました、主様……」
line = "「お、お待たせいたしました、主様……」"

[[dialogue]]
speaker = "せつな"
# 「主様の恋文……すべて、読み終わったでござる」
line = "「主様の恋文……すべて、読み終わったでござる」"

[[dialogue]]
speaker = "せつな"
# 「それで……そのっ、せつなも主様に、返事がしたいでござる……っ」
line = "「それで……そのっ、せつなも主様に、返事がしたいでござる……っ」"

[[dialogue]]
speaker = "unk"
# せつなの言葉で、彼女の方を振り返る。
line = "せつなの言葉で、彼女の方を振り返る。"

[[dialogue]]
speaker = "unk"
# せつなの顔は見たこともないくらい真っ赤に染まっていたが、きっと俺の顔も似たようなものだと思う。
line = "せつなの顔は見たこともないくらい真っ赤に染まっていたが、きっと俺の顔も似たようなものだと思う。"

[[dialogue]]
speaker = "せつな"
# 「せつなは……今まで、恋愛というものを真面目に考えていなかったでござる」
line = "「せつなは……今まで、恋愛というものを真面目に考えていなかったでござる」"

[[dialogue]]
speaker = "せつな"
# 「そういうのはもっと大人になってからするものだし、そもそも忍びは主に仕えるもので、自分の気持ちと向き合う必要性を、あまり考えていなかったでござる」
line = "「そういうのはもっと大人になってからするものだし、そもそも忍びは主に仕えるもので、自分の気持ちと向き合う必要性を、あまり考えていなかったでござる」"

[[dialogue]]
speaker = "せつな"
# 「だけど、せつなは主様に『可愛い』と言ってもらうことがあって……それがとてもとても、嬉しかったのでござる」
line = "「だけど、せつなは主様に『可愛い』と言ってもらうことがあって……それがとてもとても、嬉しかったのでござる」"

[[dialogue]]
speaker = "せつな"
# 「けれど同時に、主様にもっと『可愛い』と言ってもらいたい欲が自分の中に生まれてしまって……それがとてもはしたなく、破廉恥だと思うようになったでござる」
line = "「けれど同時に、主様にもっと『可愛い』と言ってもらいたい欲が自分の中に生まれてしまって……それがとてもはしたなく、破廉恥だと思うようになったでござる」"

[[dialogue]]
speaker = "せつな"
# 「なのに主様は、せつなのことを何度も何度も『可愛い』って言うようになって……せつなの中にある欲望も、隠さなくていいって言ってくださって……」
line = "「なのに主様は、せつなのことを何度も何度も『可愛い』って言うようになって……せつなの中にある欲望も、隠さなくていいって言ってくださって……」"

[[dialogue]]
speaker = "せつな"
# 「せつなは忍びなのに、こんなに幸せになってしまって、いいのでありまするか？　なんだかせつなは、怖いのでござりまする……」
line = "「せつなは忍びなのに、こんなに幸せになってしまって、いいのでありまするか？　なんだかせつなは、怖いのでござりまする……」"

[[dialogue]]
speaker = "unk"
# せつなも自分も、全部幸せにする
line = "せつなも自分も、全部幸せにする"

[[dialogue]]
speaker = "unk"
# 俺は魔王だから
line = "俺は魔王だから"

[[dialogue]]
speaker = "せつな"
# 「主様……！　はいっ、せつなは最強の魔王にお仕えする、専属忍者にござりまする！」
line = "「主様……！　はいっ、せつなは最強の魔王にお仕えする、専属忍者にござりまする！」"

[[dialogue]]
speaker = "せつな"
# 「魔王様がそう言うのでござれば、一介の忍者など、幸せになってしまうしか道はござりませんっ」
line = "「魔王様がそう言うのでござれば、一介の忍者など、幸せになってしまうしか道はござりませんっ」"

[[dialogue]]
speaker = "せつな"
# 「そのっ、やっぱり恋愛は恥ずかしくて、今も頭爆発しそうでござりまするが、それでもやっぱりせつなは……っ」
line = "「そのっ、やっぱり恋愛は恥ずかしくて、今も頭爆発しそうでござりまするが、それでもやっぱりせつなは……っ」"

[[dialogue]]
speaker = "せつな"
# 「せつなは主様のことが、大好きでござる……っ！」
line = "「せつなは主様のことが、大好きでござる……っ！」"

[[dialogue]]
speaker = "せつな"
# 「にゃぁぁ……～～～～っ。や、やっと、やっと言えたでござるっ」
line = "「にゃぁぁ……～～～～っ。や、やっと、やっと言えたでござるっ」"

[[dialogue]]
speaker = "unk"
# 改めて、恋人になって欲しい
line = "改めて、恋人になって欲しい"

[[dialogue]]
speaker = "unk"
# 俺もせつなのことが好きだ
line = "俺もせつなのことが好きだ"

[[dialogue]]
speaker = "せつな"
# 「は、はいでござる……っ。不束者ではございますが、せつなのこと、主様の恋人にしてほしいでござりまするっ」
line = "「は、はいでござる……っ。不束者ではございますが、せつなのこと、主様の恋人にしてほしいでござりまするっ」"

[[dialogue]]
speaker = "せつな"
# 「で、ですが……！　恋人であっても、せつなは一生、主様の専属忍者でございまする！」
line = "「で、ですが……！　恋人であっても、せつなは一生、主様の専属忍者でございまする！」"

[[dialogue]]
speaker = "せつな"
# 「今後もきちんと、せつなのことは従者として扱ってほしいでござりまする！」
line = "「今後もきちんと、せつなのことは従者として扱ってほしいでござりまする！」"

[[dialogue]]
speaker = "unk"
# そんなことを申し出るせつなと、忍者と恋人をどうやって両立させていくのかという、ちょっとおかしな相談を始める俺たちなのであった──
line = "そんなことを申し出るせつなと、忍者と恋人をどうやって両立させていくのかという、ちょっとおかしな相談を始める俺たちなのであった──"
