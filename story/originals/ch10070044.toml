[[dialogue]]
speaker = "unk"
# 第４話,キミとならどこでも,P
line = "第４話,キミとならどこでも,P"

[[dialogue]]
speaker = "unk"
# その日、俺は神社へ行き、ルリエルの巫女修行を手伝っていたのだが――
line = "その日、俺は神社へ行き、ルリエルの巫女修行を手伝っていたのだが――"

[[dialogue]]
speaker = "ルリエル"
# 「うぅ～、まさか雨が止まらなくなってしまうなんてぇ～……」
line = "「うぅ～、まさか雨が止まらなくなってしまうなんてぇ～……」"

[[dialogue]]
speaker = "unk"
# ルリエルの巫女フォームの能力である『天気を操る星術』。その制御が利かなくなってしまい、空は晴れたままなのに、神社の敷地内にだけ雨が降り続けていた。
line = "ルリエルの巫女フォームの能力である『天気を操る星術』。その制御が利かなくなってしまい、空は晴れたままなのに、神社の敷地内にだけ雨が降り続けていた。"

[[dialogue]]
speaker = "ルリエル"
# 「会長さん、ごめんなさいなのです。ずぶ濡れにさせちゃって……。ルリエルが調子に乗って、カッコいいところを見せようと思ったばっかりに……」
line = "「会長さん、ごめんなさいなのです。ずぶ濡れにさせちゃって……。ルリエルが調子に乗って、カッコいいところを見せようと思ったばっかりに……」"

[[dialogue]]
speaker = "unk"
# 気にしなくていい
line = "気にしなくていい"

[[dialogue]]
speaker = "ルリエル"
# 「あっ……ルリエルの頭、撫でてくれるのですか？　――訓練を頑張っているから？」
line = "「あっ……ルリエルの頭、撫でてくれるのですか？　――訓練を頑張っているから？」"

[[dialogue]]
speaker = "ルリエル"
# 「えへへへへへぇ♪　ありがとうなのです、会長さん<emoji=heart04>」
line = "「えへへへへへぇ♪　ありがとうなのです、会長さん<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# それから、雨が止むまでの間、俺たちは神社の縁側で休憩することになった。
line = "それから、雨が止むまでの間、俺たちは神社の縁側で休憩することになった。"

[[dialogue]]
speaker = "ルリエル"
# 「会長さん、せっかくですから、煩悩解放の修業をしませんか？」
line = "「会長さん、せっかくですから、煩悩解放の修業をしませんか？」"

[[dialogue]]
speaker = "unk"
# 今回の煩悩はどんなのだ？
line = "今回の煩悩はどんなのだ？"

[[dialogue]]
speaker = "ルリエル"
# 「ふふふっ、えっとですね～♪　体が濡れちゃったので～、くっ付いてルリエルのことを温めて欲しいのです<emoji=heart04>」
line = "「ふふふっ、えっとですね～♪　体が濡れちゃったので～、くっ付いてルリエルのことを温めて欲しいのです<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
# 「こんな風に手を恋人繋ぎにして、肩に寄りかかって～<emoji=heart04>」
line = "「こんな風に手を恋人繋ぎにして、肩に寄りかかって～<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
# 「はふぅ……<emoji=heart04>　会長さんの体温が伝わって来て、落ち着きます<emoji=heart04>」
line = "「はふぅ……<emoji=heart04>　会長さんの体温が伝わって来て、落ち着きます<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
# 「――あっ、そうだ。わたし、前から会長さんに聞いてみたかったことがあるのです！」
line = "「――あっ、そうだ。わたし、前から会長さんに聞いてみたかったことがあるのです！」"

[[dialogue]]
speaker = "ルリエル"
# 「いつもルリエルの煩悩を聞いてもらってばかりで、会長さんは何か煩悩ってあったりしますか？」
line = "「いつもルリエルの煩悩を聞いてもらってばかりで、会長さんは何か煩悩ってあったりしますか？」"

[[dialogue]]
speaker = "unk"
# ……変なこと言ってもいい？
line = "……変なこと言ってもいい？"

[[dialogue]]
speaker = "ルリエル"
# 「変なことですか？　……大丈夫ですよ♪　どんなことなのです？」
line = "「変なことですか？　……大丈夫ですよ♪　どんなことなのです？」"

[[dialogue]]
speaker = "unk"
# 俺は最近ちょっと抱いていた欲望を口にする。
line = "俺は最近ちょっと抱いていた欲望を口にする。"

[[dialogue]]
speaker = "ルリエル"
# 「――えっ？　本当は、わざと人目があるところで抱きしめたり、キスしてみたい？」
line = "「――えっ？　本当は、わざと人目があるところで抱きしめたり、キスしてみたい？」"

[[dialogue]]
speaker = "ルリエル"
# 「ふむふむ、なるほどぉ……ちなみにどういった理由でそんなことを？」
line = "「ふむふむ、なるほどぉ……ちなみにどういった理由でそんなことを？」"

[[dialogue]]
speaker = "ルリエル"
# 「──ルリエルが自分の恋人だって、色んな人に主張しちゃいたい……？　ふむふむ、独占欲ですかぁ」
line = "「──ルリエルが自分の恋人だって、色んな人に主張しちゃいたい……？　ふむふむ、独占欲ですかぁ」"

[[dialogue]]
speaker = "ルリエル"
# 「いいですよ♪　今度カフェテリアとか、沢山の人がいるところで見せつけちゃいますか？」
line = "「いいですよ♪　今度カフェテリアとか、沢山の人がいるところで見せつけちゃいますか？」"

[[dialogue]]
speaker = "ルリエル"
# 「ちょっといけないことをしているみたいでドキドキしちゃいそうですけど……でも、会長さんのお願いは叶えてあげたいのです♪」
line = "「ちょっといけないことをしているみたいでドキドキしちゃいそうですけど……でも、会長さんのお願いは叶えてあげたいのです♪」"

[[dialogue]]
speaker = "unk"
# 俺は愛おしさで堪らなくなって、彼女を抱き締めて、キスをする。
line = "俺は愛おしさで堪らなくなって、彼女を抱き締めて、キスをする。"

[[dialogue]]
speaker = "ルリエル"
# 「あっ<emoji=heart04>　会長さん<emoji=heart04>」
line = "「あっ<emoji=heart04>　会長さん<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
# 「んっ……<emoji=heart04>　ちゅっ……<emoji=heart04>」
line = "「んっ……<emoji=heart04>　ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ルリエル、大好きだ
line = "ルリエル、大好きだ"

[[dialogue]]
speaker = "ルリエル"
# 「わたしもなのです<emoji=heart04>　愛してます、会長さん<emoji=heart04>」
line = "「わたしもなのです<emoji=heart04>　愛してます、会長さん<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
# 「んむっ……<emoji=heart04>　ちゅっ<emoji=heart04>　ちゅっ……<emoji=heart04>」
line = "「んむっ……<emoji=heart04>　ちゅっ<emoji=heart04>　ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
# 「――もっとしたいのですか？　えへへ、いいですよ<emoji=heart04>」
line = "「――もっとしたいのですか？　えへへ、いいですよ<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
# 「ミヤハルさんが帰って来ちゃうかもしれませんけど……その時はさっそく、見せつけちゃいましょう<emoji=heart04>」
line = "「ミヤハルさんが帰って来ちゃうかもしれませんけど……その時はさっそく、見せつけちゃいましょう<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
# 「んっ……<emoji=heart04>　ちゅっ……<emoji=heart04>　んちゅっ<emoji=heart04>」
line = "「んっ……<emoji=heart04>　ちゅっ……<emoji=heart04>　んちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# なかなか降り止まないと思っていた雨も、ルリエルと肌を重ねて温め合っていると、いつの間にか止んでいて。
line = "なかなか降り止まないと思っていた雨も、ルリエルと肌を重ねて温め合っていると、いつの間にか止んでいて。"

[[dialogue]]
speaker = "ルリエル"
# 「わぁっ♪　見て下さい、会長さん！　お空に虹がかかってますよ♪」
line = "「わぁっ♪　見て下さい、会長さん！　お空に虹がかかってますよ♪」"

[[dialogue]]
speaker = "ルリエル"
# 「すごく綺麗なのです♪　天気雨だったからでしょうか？」
line = "「すごく綺麗なのです♪　天気雨だったからでしょうか？」"

[[dialogue]]
speaker = "unk"
# ルリエル、さっきの話なんだけど……
line = "ルリエル、さっきの話なんだけど……"

[[dialogue]]
speaker = "ルリエル"
# 「――人前でイチャイチャしたいという話、ですか？」
line = "「――人前でイチャイチャしたいという話、ですか？」"

[[dialogue]]
speaker = "unk"
# 俺は頷く。ああは言ったものの、俺もルリエルも星徒会のメンバーだし、実際にカフェテリアでベタベタし過ぎるのは問題だろう。
line = "俺は頷く。ああは言ったものの、俺もルリエルも星徒会のメンバーだし、実際にカフェテリアでベタベタし過ぎるのは問題だろう。"

[[dialogue]]
speaker = "ルリエル"
# 「――だから、ちょっと遠くに出かけて、そこでイチャイチャを？」
line = "「――だから、ちょっと遠くに出かけて、そこでイチャイチャを？」"

[[dialogue]]
speaker = "ルリエル"
# 「わぁ～♪　会長さんと遠くにお出かけ、すごく楽しそうなのです♪　行きましょう！　今週末にでも！」
line = "「わぁ～♪　会長さんと遠くにお出かけ、すごく楽しそうなのです♪　行きましょう！　今週末にでも！」"

[[dialogue]]
speaker = "ルリエル"
# 「あと、今は空のお散歩にも出かけたいのです♪　虹が出ているうちに、一緒に近くまで見に行きましょう！」
line = "「あと、今は空のお散歩にも出かけたいのです♪　虹が出ているうちに、一緒に近くまで見に行きましょう！」"

[[dialogue]]
speaker = "unk"
# 虹はそばに行くと消えちゃうぞ？
line = "虹はそばに行くと消えちゃうぞ？"

[[dialogue]]
speaker = "ルリエル"
# 「えっ、そうなのですか！？　う～ん、でも……やっぱり行ってみたいのです！」
line = "「えっ、そうなのですか！？　う～ん、でも……やっぱり行ってみたいのです！」"

[[dialogue]]
speaker = "ルリエル"
# 「だって――」
line = "「だって――」"

[[dialogue]]
speaker = "ルリエル"
# 「会長さんとなら、どこでも絶対に楽しいですから♪」
line = "「会長さんとなら、どこでも絶対に楽しいですから♪」"

[[dialogue]]
speaker = "unk"
# それから、愛しの天使に手を引かれて、俺は空のデートを楽しむのだった――
line = "それから、愛しの天使に手を引かれて、俺は空のデートを楽しむのだった――"
