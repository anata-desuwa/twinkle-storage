# 「妾のものとなれ」
line = "「妾のものとなれ」"

[[dialogue]]
speaker = "unk"
# 傲岸な声が響いた瞬間、アステラが空間の歪みごと炎に包まれた。
line = "傲岸な声が響いた瞬間、アステラが空間の歪みごと炎に包まれた。"

[[dialogue]]
speaker = "unk"
# そして巨大な炎は小さな火の玉となり、彼女の尾に吸い込まれて──
line = "そして巨大な炎は小さな火の玉となり、彼女の尾に吸い込まれて──"

[[dialogue]]
speaker = "煌嶺"
# 「名乗るのが遅れたな。妾は煌嶺。キュリオスを統べる皇帝だ」
line = "「名乗るのが遅れたな。妾は煌嶺。キュリオスを統べる皇帝だ」"
