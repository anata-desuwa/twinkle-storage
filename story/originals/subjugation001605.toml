line = "「チョコレートどうぞです～♪　わたしの奢りです！」"

[[dialogue]]
speaker = "流星学園１年生"
# 「かわいいダンスを見せてくださったお礼ですの！　どんどん食べてくださいまし！」
line = "「かわいいダンスを見せてくださったお礼ですの！　どんどん食べてくださいまし！」"

[[dialogue]]
speaker = "新星学園２年生"
# 「いえーい！　わたしからはクッキーをどうぞ！」
line = "「いえーい！　わたしからはクッキーをどうぞ！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「おぉ～♪　みんながジャクリーヌちゃんにお菓子を恵んでるよ～♪」
line = "「おぉ～♪　みんながジャクリーヌちゃんにお菓子を恵んでるよ～♪」"

[[dialogue]]
speaker = "ヒトリ"
# 「あ、あわわ……あんなにたくさん買っちゃって……みなさん、お金とか大丈夫なんでしょうか……」
line = "「あ、あわわ……あんなにたくさん買っちゃって……みなさん、お金とか大丈夫なんでしょうか……」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「きゃははっ♪　これも一つの推し活ってやつ？　ヒトリさんも気持ちはわかるんじゃない？」
line = "「きゃははっ♪　これも一つの推し活ってやつ？　ヒトリさんも気持ちはわかるんじゃない？」"

[[dialogue]]
speaker = "ヒトリ"
# 「そ、それはそうですけど……なんだか嫌な予感しかしなくて……」
line = "「そ、それはそうですけど……なんだか嫌な予感しかしなくて……」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「それは私もだけどね～。まあ、セナリィが楽しそうだから、いいんじゃないかな？」
line = "「それは私もだけどね～。まあ、セナリィが楽しそうだから、いいんじゃないかな？」"

