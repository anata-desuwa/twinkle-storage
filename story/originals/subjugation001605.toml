line = "「そんなの知りませんわ～！　売れるのでしたらもう何も気にしませんわー！」"

[[dialogue]]
speaker = "ヒトリ"
# 「ひゃっ！？　お、おおお、押さないでくださいー！？」
line = "「ひゃっ！？　お、おおお、押さないでくださいー！？」"

[[dialogue]]
speaker = "ゆーちゃん"
