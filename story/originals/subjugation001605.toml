# 「これは迷っちゃうね～♪　うーん……あのカボチャさんに惹かれちゃったから、私はこのおっきなカボチャケーキをもらいます！」
line = "「これは迷っちゃうね～♪　うーん……あのカボチャさんに惹かれちゃったから、私はこのおっきなカボチャケーキをもらいます！」"

[[dialogue]]
speaker = "附属校３年生"
# 「どれも美味しそうです～<emoji=heart04>　わたしには、このドーナツを頂戴な<emoji=heart04>」
line = "「どれも美味しそうです～<emoji=heart04>　わたしには、このドーナツを頂戴な<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「ほ～ほっほ♪　毎度お買い上げありがとうございますですわ～♪」
line = "「ほ～ほっほ♪　毎度お買い上げありがとうございますですわ～♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひひっ♪　セナリィってば、懲りずに今度は娘さんにまで芸をお願いするなんて、ホントおっかし～！」
line = "「にひひひっ♪　セナリィってば、懲りずに今度は娘さんにまで芸をお願いするなんて、ホントおっかし～！」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「ジャクリーヌ様はお菓子が食べたい、私はその横でお菓子を売りたい、目的が一致したまでのことですわ！」
line = "「ジャクリーヌ様はお菓子が食べたい、私はその横でお菓子を売りたい、目的が一致したまでのことですわ！」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「それにしても前回に引き続き、今回も飛ぶように売れて……感謝いたしますわ、ヒトリ様！」
line = "「それにしても前回に引き続き、今回も飛ぶように売れて……感謝いたしますわ、ヒトリ様！」"

[[dialogue]]
speaker = "ヒトリ"
# 「お菓子を売ってる……というか、食べてるのはジャクリーヌさんで、わたしは何もしていませんから……」
line = "「お菓子を売ってる……というか、食べてるのはジャクリーヌさんで、わたしは何もしていませんから……」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「何を言ってますの、ヒトリ様！　前回も今回も、あなた様の『幽霊と対話できる』という特別な力がなければ、このように楽しい時間は生まれませんでしたわ」
line = "「何を言ってますの、ヒトリ様！　前回も今回も、あなた様の『幽霊と対話できる』という特別な力がなければ、このように楽しい時間は生まれませんでしたわ」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「だから感謝しておりますの。ありがとうございますわ、ヒトリ様」
line = "「だから感謝しておりますの。ありがとうございますわ、ヒトリ様」"

[[dialogue]]
speaker = "ヒトリ"
# 「いえ、そんな……この力のこと、そういう風に言ってもらえるなんて思ってなくて……こちらこそ、ありがとうございます……」
line = "「いえ、そんな……この力のこと、そういう風に言ってもらえるなんて思ってなくて……こちらこそ、ありがとうございます……」"

[[dialogue]]
speaker = "ヒトリ"
# 「た、ただ……ジャクリーヌさんをこのままにして、大丈夫なんでしょうか？　前回も最後はあんなことになっちゃいましたし……ね、ゆーちゃんもそう思うよね？」
line = "「た、ただ……ジャクリーヌさんをこのままにして、大丈夫なんでしょうか？　前回も最後はあんなことになっちゃいましたし……ね、ゆーちゃんもそう思うよね？」"

[[dialogue]]
speaker = "ゆーちゃん"
# 「ゆー！　ゆー！」
line = "「ゆー！　ゆー！」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「そうそう同じことは二度も起こりませんわ！　だから大丈夫に決まっておりますの！」
line = "「そうそう同じことは二度も起こりませんわ！　だから大丈夫に決まっておりますの！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「そうかな～？　二度あることは三度あるって言うしなぁ～」
line = "「そうかな～？　二度あることは三度あるって言うしなぁ～」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「今回はカボチャ頭になってる方はいませんし！　いざとなったら会長様が何とかしてくださいますわ！　ね！？」
line = "「今回はカボチャ頭になってる方はいませんし！　いざとなったら会長様が何とかしてくださいますわ！　ね！？」"

[[dialogue]]
speaker = "unk"
# ま、まあ、その時が来たらね
line = "ま、まあ、その時が来たらね"

[[dialogue]]
speaker = "ネーゼマイン"
# 「そう簡単に上手くいくかな～？」
line = "「そう簡単に上手くいくかな～？」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「うるさいですわ！　今回こそは絶対に、大丈夫なはずですのよ～！」
line = "「うるさいですわ！　今回こそは絶対に、大丈夫なはずですのよ～！」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆーっゆっゆっゆっゆ♪　トリック＆トリート♪　ダンスのお礼にいーっぱいお菓子よこすゆ♪」
line = "「ゆーっゆっゆっゆっゆ♪　トリック＆トリート♪　ダンスのお礼にいーっぱいお菓子よこすゆ♪」"

[[dialogue]]
speaker = "附属校３年生"
