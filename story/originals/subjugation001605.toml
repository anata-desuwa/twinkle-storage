line = "「ゆー！？　ゆー！？」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「ふ、ふふ、ふふふふ！　ほーほっほっほっほ♪　こんなに上手くいくなんて、まるで夢のようですわ～！」
line = "「ふ、ふふ、ふふふふ！　ほーほっほっほっほ♪　こんなに上手くいくなんて、まるで夢のようですわ～！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「あーあ、こりゃもう何も見えてないや……自分でフラグ立てちゃってるけど大丈夫～？」
line = "「あーあ、こりゃもう何も見えてないや……自分でフラグ立てちゃってるけど大丈夫～？」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「ほほ♪　ほほほ♪　ほーほっほっほっほ♪　これで私も億万長者ですわ～！」
line = "「ほほ♪　ほほほ♪　ほーほっほっほっほ♪　これで私も億万長者ですわ～！」"

[[dialogue]]
speaker = "unk"
# 無事セナリィの目標である金額に売り上げが達したそうだが、この騒ぎはハロウィンの終了ぎりぎりまで続いたのだった。
line = "無事セナリィの目標である金額に売り上げが達したそうだが、この騒ぎはハロウィンの終了ぎりぎりまで続いたのだった。"

[[dialogue]]
speaker = "unk"
# その後、とんでもないことが起こるとも知らずに……。
line = "その後、とんでもないことが起こるとも知らずに……。"
