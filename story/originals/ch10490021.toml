[[dialogue]]
speaker = "unk"
# 第１話,笑顔の似合う彼女,P
line = "第１話,笑顔の似合う彼女,P"

[[dialogue]]
speaker = "unk"
# 紅明と恋人関係になって、クリスマスが近付いてきたある日のこと。２人でデートに行こうと待ち合わせていたのだが――
line = "紅明と恋人関係になって、クリスマスが近付いてきたある日のこと。２人でデートに行こうと待ち合わせていたのだが――"

[[dialogue]]
speaker = "紅明"
# 「ダーリン～♪　お待たせ～☆」
line = "「ダーリン～♪　お待たせ～☆」"

[[dialogue]]
speaker = "unk"
# 紅明、その格好は……！？
line = "紅明、その格好は……！？"

[[dialogue]]
speaker = "紅明"
# 「うしし♪　驚いた？　変装っしょ、変装♪」
line = "「うしし♪　驚いた？　変装っしょ、変装♪」"

[[dialogue]]
speaker = "紅明"
# 「――逆に目立つと思う？　こういうのは堂々としてる方が逆にバレないもんだって♪」
line = "「――逆に目立つと思う？　こういうのは堂々としてる方が逆にバレないもんだって♪」"

[[dialogue]]
speaker = "紅明"
# 「というわけで、ひと足早いクリスマス気分で、デートにレッツゴ～♪」
line = "「というわけで、ひと足早いクリスマス気分で、デートにレッツゴ～♪」"

[[dialogue]]
speaker = "紅明"
# 「ダーリン、見て見て、これ！　めっちゃ可愛くない？　アタシにピッタリの牛モチーフのリング♪　あっ、しかも色違いもあるじゃ～ん☆」
line = "「ダーリン、見て見て、これ！　めっちゃ可愛くない？　アタシにピッタリの牛モチーフのリング♪　あっ、しかも色違いもあるじゃ～ん☆」"

[[dialogue]]
speaker = "紅明"
# 「プチプラのアクセサリーだから安いし、ペアで買っちゃう？　――高いのじゃなくていいのかって？」
line = "「プチプラのアクセサリーだから安いし、ペアで買っちゃう？　――高いのじゃなくていいのかって？」"

[[dialogue]]
speaker = "紅明"
# 「アタシはプチプラ――値段が安いアクセサリーって好きなんだよね～。学生らしさっていうかさ。それに安いからこそ、面白いのもあるしね！」
line = "「アタシはプチプラ――値段が安いアクセサリーって好きなんだよね～。学生らしさっていうかさ。それに安いからこそ、面白いのもあるしね！」"

[[dialogue]]
speaker = "unk"
# 紅明が付けたら、またバズるかもしれないな
line = "紅明が付けたら、またバズるかもしれないな"

[[dialogue]]
speaker = "紅明"
# 「いや～、現代のＳＮＳってすごいよね～。アタシ的には、好きだと感じたものを投稿してるだけなんだけど、あっという間に広まって、インフルエンサーなんて呼ばれたりしてさ」
line = "「いや～、現代のＳＮＳってすごいよね～。アタシ的には、好きだと感じたものを投稿してるだけなんだけど、あっという間に広まって、インフルエンサーなんて呼ばれたりしてさ」"

[[dialogue]]
speaker = "紅明"
# 「タレント冥利には尽きるんだけどね。バズった影響で商品が売れたりして、喜んでくれる人もいたりして。でも、有名になると、それはそれで――」
line = "「タレント冥利には尽きるんだけどね。バズった影響で商品が売れたりして、喜んでくれる人もいたりして。でも、有名になると、それはそれで――」"

[[dialogue]]
speaker = "女性Ａ"
# 「ねぇ、あのサンタコスのめっちゃ可愛い子、もしかして芸能人の紅明ちゃんじゃない……！？」
line = "「ねぇ、あのサンタコスのめっちゃ可愛い子、もしかして芸能人の紅明ちゃんじゃない……！？」"

[[dialogue]]
speaker = "女性Ｂ"
# 「え、マジ？　うわっ、本物じゃん……！　一緒に写真撮りたいんだけど～！」
line = "「え、マジ？　うわっ、本物じゃん……！　一緒に写真撮りたいんだけど～！」"

[[dialogue]]
speaker = "女性Ａ"
# 「あのっ、牛紅明ちゃんですよね？　私、大ファンです……！　よかったら、サインもらえないでしょうか……！」
line = "「あのっ、牛紅明ちゃんですよね？　私、大ファンです……！　よかったら、サインもらえないでしょうか……！」"

[[dialogue]]
speaker = "紅明"
# 「変装がバレた！？」
line = "「変装がバレた！？」"

[[dialogue]]
speaker = "unk"
# ですよねー
line = "ですよねー"

[[dialogue]]
speaker = "紅明"
# 「堂々としてたら逆にバレない説、ダメだったか～！　うぅ～……アタシの大ファンだって、言ってくれるのは嬉しいけど……！」
line = "「堂々としてたら逆にバレない説、ダメだったか～！　うぅ～……アタシの大ファンだって、言ってくれるのは嬉しいけど……！」"

[[dialogue]]
speaker = "紅明"
# 「今日はオフなんだ、すまねぇ！　逃げるぜ、ダーリン！」
line = "「今日はオフなんだ、すまねぇ！　逃げるぜ、ダーリン！」"

[[dialogue]]
speaker = "女性Ｂ"
# 「あっ、待って、紅明ちゃん！　せめて握手！　握手だけでも～！」
line = "「あっ、待って、紅明ちゃん！　せめて握手！　握手だけでも～！」"

[[dialogue]]
speaker = "紅明"
# 「あ～、今日のデートも、ファンの子たちにバレちった……。ごめんね、ダーリン」
line = "「あ～、今日のデートも、ファンの子たちにバレちった……。ごめんね、ダーリン」"

[[dialogue]]
speaker = "unk"
# なんだか、告白した日のことを思い出すな
line = "なんだか、告白した日のことを思い出すな"

[[dialogue]]
speaker = "紅明"
# 「あはは、そうだよね。前に街でデートした時――」
line = "「あはは、そうだよね。前に街でデートした時――」"

[[dialogue]]
speaker = "紅明"
# 「今日みたいにファンの子に見つかっちゃって、何度もデートが中断になっちゃって……」
line = "「今日みたいにファンの子に見つかっちゃって、何度もデートが中断になっちゃって……」"

[[dialogue]]
speaker = "紅明"
# 「落ち込んでたアタシに、ダーリンが『これからもデートの機会は沢山あるから大丈夫』って言ってくれたんだよね」
line = "「落ち込んでたアタシに、ダーリンが『これからもデートの機会は沢山あるから大丈夫』って言ってくれたんだよね」"

[[dialogue]]
speaker = "紅明"
# 「アタシのことが好きだから、デートするのが大変でも気にしないって、笑顔で。んモー、ときめきＭＡＸハートだったよね」
line = "「アタシのことが好きだから、デートするのが大変でも気にしないって、笑顔で。んモー、ときめきＭＡＸハートだったよね」"

[[dialogue]]
speaker = "紅明"
# 「今日はさ、アタシ的にその時のリベンジデートのつもりだったんよ。でも、やっぱそう上手くはいかんね……」
line = "「今日はさ、アタシ的にその時のリベンジデートのつもりだったんよ。でも、やっぱそう上手くはいかんね……」"

[[dialogue]]
speaker = "紅明"
# 「ダーリンに迷惑かけたくないし、気分切り替えて、家デートにしよっか。いつも通りになっちゃうけど……」
line = "「ダーリンに迷惑かけたくないし、気分切り替えて、家デートにしよっか。いつも通りになっちゃうけど……」"

[[dialogue]]
speaker = "unk"
# 紅明に悲しそうな顔は似合わない
line = "紅明に悲しそうな顔は似合わない"

[[dialogue]]
speaker = "紅明"
# 「え？　ダーリン……？」
line = "「え？　ダーリン……？」"

[[dialogue]]
speaker = "紅明"
# 「ヘイ！　アタシのファンだと言ってくれた、そこの女の子たち！　世の為人の為、元気なサンタが戻ってきたぜ☆」
line = "「ヘイ！　アタシのファンだと言ってくれた、そこの女の子たち！　世の為人の為、元気なサンタが戻ってきたぜ☆」"

[[dialogue]]
speaker = "女性Ａ"
# 「えっ、紅明ちゃん！？　なんで……！？」
line = "「えっ、紅明ちゃん！？　なんで……！？」"

[[dialogue]]
speaker = "紅明"
# 「さっきは断っちゃったけど、アタシ、ファンの子たちには笑顔になって欲しいからさ。サインと、一緒に写真撮りたいって、言ってたじゃん？　リベンジさせてくれないかな？」
line = "「さっきは断っちゃったけど、アタシ、ファンの子たちには笑顔になって欲しいからさ。サインと、一緒に写真撮りたいって、言ってたじゃん？　リベンジさせてくれないかな？」"

[[dialogue]]
speaker = "女性Ｂ"
# 「わ、私たちの為にわざわざ……！？　やばっ……なんか感激で涙出てきたんだけど……！」
line = "「わ、私たちの為にわざわざ……！？　やばっ……なんか感激で涙出てきたんだけど……！」"

[[dialogue]]
speaker = "紅明"
# 「って、そこは笑わんか～い！　なんつってね♪　あと、サンタとして……はいこれ、クリスマスプレゼント☆」
line = "「って、そこは笑わんか～い！　なんつってね♪　あと、サンタとして……はいこれ、クリスマスプレゼント☆」"

[[dialogue]]
speaker = "紅明"
# 「中身は、アタシが最近気に入ってる、プチプラのアクセなんだけど、気に入ってくれたら嬉しいな♪」
line = "「中身は、アタシが最近気に入ってる、プチプラのアクセなんだけど、気に入ってくれたら嬉しいな♪」"

[[dialogue]]
speaker = "紅明"
# 「日が落ちて、アタシに気付く人もいなくなってきたかな？」
line = "「日が落ちて、アタシに気付く人もいなくなってきたかな？」"

[[dialogue]]
speaker = "紅明"
# 「ダーリン、ありがとね。ファンの人たちの笑顔を沢山見れて、すごく嬉しかったよ」
line = "「ダーリン、ありがとね。ファンの人たちの笑顔を沢山見れて、すごく嬉しかったよ」"

[[dialogue]]
speaker = "unk"
# 俺が提案したのは、バレるのを気にせずデートをして、紅明に気付いてくれたファンがいたら、足を止めてきちんと対応するというものだった。
line = "俺が提案したのは、バレるのを気にせずデートをして、紅明に気付いてくれたファンがいたら、足を止めてきちんと対応するというものだった。"

[[dialogue]]
speaker = "紅明"
# 「だけど、ダーリンは楽しかった？　人の数が多くて対応しきれない時に、マネージャーっぽいことをやらせちゃってたけど……」
line = "「だけど、ダーリンは楽しかった？　人の数が多くて対応しきれない時に、マネージャーっぽいことをやらせちゃってたけど……」"

[[dialogue]]
speaker = "unk"
# 俺も、紅明の笑顔が見れて嬉しかった
line = "俺も、紅明の笑顔が見れて嬉しかった"

[[dialogue]]
speaker = "紅明"
# 「ダーリン……！　やっぱりアタシ、今のダーリンが大好きっしょ<emoji=heart04>」
line = "「ダーリン……！　やっぱりアタシ、今のダーリンが大好きっしょ<emoji=heart04>」"

[[dialogue]]
speaker = "紅明"
# 「ん～、ちゅっちゅっ<emoji=heart04>」
line = "「ん～、ちゅっちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ちょっ！？　暗くてもキスはバレるから！
line = "ちょっ！？　暗くてもキスはバレるから！"

[[dialogue]]
speaker = "紅明"
# 「えへへ～<emoji=heart04>　それじゃあ、続きはこの後、アタシの家に行ったら、ゆっくりと……ね？」
line = "「えへへ～<emoji=heart04>　それじゃあ、続きはこの後、アタシの家に行ったら、ゆっくりと……ね？」"

[[dialogue]]
speaker = "紅明"
# 「手を繋いで帰るくらいはいいっしょ？　それに、ほら――」
line = "「手を繋いで帰るくらいはいいっしょ？　それに、ほら――」"

[[dialogue]]
speaker = "紅明"
# 「恋人繋ぎした手をこうして……ダーリンのコートのポケットに入れれば、バレないっしょ<emoji=heart04>」
line = "「恋人繋ぎした手をこうして……ダーリンのコートのポケットに入れれば、バレないっしょ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# その後はファンに見つかることなく、紅明とぴったり寄り添いながら、帰り道の時間を過ごすだった――
line = "その後はファンに見つかることなく、紅明とぴったり寄り添いながら、帰り道の時間を過ごすだった――"
