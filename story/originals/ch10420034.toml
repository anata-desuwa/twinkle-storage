[[dialogue]]
speaker = "unk"
# 第４話,愛する彼女へご奉仕を,P
line = "第４話,愛する彼女へご奉仕を,P"

[[dialogue]]
speaker = "unk"
# ある週末の休日。俺はフニと一緒に、彼女の故郷である北海道にやって来ていた。
line = "ある週末の休日。俺はフニと一緒に、彼女の故郷である北海道にやって来ていた。"

[[dialogue]]
speaker = "unk"
# そして、村近くの森で彼女とピクニックに出かけることになった――
line = "そして、村近くの森で彼女とピクニックに出かけることになった――"

[[dialogue]]
speaker = "フェニエル"
# 「今日は晴れて暖かくなりましたし、ピクニック日和ですね♪」
line = "「今日は晴れて暖かくなりましたし、ピクニック日和ですね♪」"

[[dialogue]]
speaker = "unk"
# 合宿の時よりもゆっくり過ごせるな
line = "合宿の時よりもゆっくり過ごせるな"

[[dialogue]]
speaker = "フェニエル"
# 「はい♪　昨日も村の人たちとゆっくりお話ができて、よかったです」
line = "「はい♪　昨日も村の人たちとゆっくりお話ができて、よかったです」"

[[dialogue]]
speaker = "unk"
# 星霊祭の前に合宿でやって来た時は合宿で忙しかったので、今回改めて帰省しにきたのだ。
line = "星霊祭の前に合宿でやって来た時は合宿で忙しかったので、今回改めて帰省しにきたのだ。"

[[dialogue]]
speaker = "unk"
# 村の人たち、みんないい人だったな
line = "村の人たち、みんないい人だったな"

[[dialogue]]
speaker = "unk"
# 昨日はフニが育った孤児院に泊まらせてもらったのだが、そこに村の人たちが集まり、わざわざ俺の歓迎会を開いてくれて。
line = "昨日はフニが育った孤児院に泊まらせてもらったのだが、そこに村の人たちが集まり、わざわざ俺の歓迎会を開いてくれて。"

[[dialogue]]
speaker = "unk"
# それはもう楽しいどんちゃん騒ぎで、俺はすっかり村の人たちのことを好きになってしまっていた。
line = "それはもう楽しいどんちゃん騒ぎで、俺はすっかり村の人たちのことを好きになってしまっていた。"

[[dialogue]]
speaker = "フェニエル"
# 「はい♪　血は繋がってなくても、昔から私のことを気にかけてお世話してくれて……私はみんなを本当の家族のように思ってます」
line = "「はい♪　血は繋がってなくても、昔から私のことを気にかけてお世話してくれて……私はみんなを本当の家族のように思ってます」"

[[dialogue]]
speaker = "フェニエル"
# 「だから、大切な故郷のみんなが平和に生活を送れるようにする為にも、私は星騎士として、もっと強くなりたいんです」
line = "「だから、大切な故郷のみんなが平和に生活を送れるようにする為にも、私は星騎士として、もっと強くなりたいんです」"

[[dialogue]]
speaker = "フェニエル"
# 「今回帰郷して、改めてそう感じました。――リクリエの危機がまたやって来ても、会長さんと一緒に打ち勝てるように」
line = "「今回帰郷して、改めてそう感じました。――リクリエの危機がまたやって来ても、会長さんと一緒に打ち勝てるように」"

[[dialogue]]
speaker = "unk"
# ああ、俺もフニのこと守るって約束したしな
line = "ああ、俺もフニのこと守るって約束したしな"

[[dialogue]]
speaker = "フェニエル"
# 「あ……えへへ<emoji=heart04>　今回、村の人たちに彼氏として紹介しちゃいましたもんね<emoji=heart04>」
line = "「あ……えへへ<emoji=heart04>　今回、村の人たちに彼氏として紹介しちゃいましたもんね<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そこで俺は、村の人たちから「フニのことを頼む」と任されていた。
line = "そこで俺は、村の人たちから「フニのことを頼む」と任されていた。"

[[dialogue]]
speaker = "フェニエル"
# 「え？　――お互い強くなる為にも、絆の力をあげないと……ですか？」
line = "「え？　――お互い強くなる為にも、絆の力をあげないと……ですか？」"

[[dialogue]]
speaker = "フェニエル"
# 「じゃ、じゃあ……<emoji=heart04>」
line = "「じゃ、じゃあ……<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「今日もノヴァフォームで、何かご奉仕を――」
line = "「今日もノヴァフォームで、何かご奉仕を――」"

[[dialogue]]
speaker = "unk"
# いや、今日は俺の番だ
line = "いや、今日は俺の番だ"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「え……？　――き、今日は会長さんが私にご奉仕をする、ですか……！？」
line = "「え……？　――き、今日は会長さんが私にご奉仕をする、ですか……！？」"

[[dialogue]]
speaker = "unk"
# 俺は頷き、北海道へ来る前に用意しておいた物を取り出す。
line = "俺は頷き、北海道へ来る前に用意しておいた物を取り出す。"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「――天使の羽用のお手入れセット一式……？　それで、私の羽のブラッシングを……！？」
line = "「――天使の羽用のお手入れセット一式……？　それで、私の羽のブラッシングを……！？」"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「か、会長さんからのブラッシング……<emoji=heart04>　そ、その……じゃあ、今日は甘えさせて頂いてもいいですか……？」
line = "「か、会長さんからのブラッシング……<emoji=heart04>　そ、その……じゃあ、今日は甘えさせて頂いてもいいですか……？」"

[[dialogue]]
speaker = "unk"
# 俺はそれから、ブラシで彼女の天使の羽を撫でて、手入れをしていく。
line = "俺はそれから、ブラシで彼女の天使の羽を撫でて、手入れをしていく。"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「はぅ……<emoji=heart04>　会長さんの、上手くて……あっ<emoji=heart04>　んん……<emoji=heart04>」
line = "「はぅ……<emoji=heart04>　会長さんの、上手くて……あっ<emoji=heart04>　んん……<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「声、出ちゃいます……<emoji=heart04>　はあぁっ……んふぅ……<emoji=heart04>」
line = "「声、出ちゃいます……<emoji=heart04>　はあぁっ……んふぅ……<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「こ、これ、普通に撫でられるのと違う気持ち良さがあって……んっ<emoji=heart04>　ふうぅ……<emoji=heart04>」
line = "「こ、これ、普通に撫でられるのと違う気持ち良さがあって……んっ<emoji=heart04>　ふうぅ……<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「ドキドキしてきちゃいます……<emoji=heart04>　あっ……<emoji=heart04>　はふぅ……<emoji=heart04>」
line = "「ドキドキしてきちゃいます……<emoji=heart04>　あっ……<emoji=heart04>　はふぅ……<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「え？　次は頭の羽……ですか？」
line = "「え？　次は頭の羽……ですか？」"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「は、はい<emoji=heart04>　でも、頭の羽の方が背中よりも敏感なので、優しくして頂けると……<emoji=heart04>」
line = "「は、はい<emoji=heart04>　でも、頭の羽の方が背中よりも敏感なので、優しくして頂けると……<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「あっ――ぴゃうっ<emoji=heart04><emoji=heart04>　会長さんの手つき、優しいのにゾクゾクしちゃいますぅ……<emoji=heart04>」
line = "「あっ――ぴゃうっ<emoji=heart04><emoji=heart04>　会長さんの手つき、優しいのにゾクゾクしちゃいますぅ……<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「んっ<emoji=heart04>　ぴぃっ<emoji=heart04><emoji=heart04>　へ、変な声が漏れちゃいますぅ……<emoji=heart04>　はうぅ……<emoji=heart04>」
line = "「んっ<emoji=heart04>　ぴぃっ<emoji=heart04><emoji=heart04>　へ、変な声が漏れちゃいますぅ……<emoji=heart04>　はうぅ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 恥ずかしがって、羽で顔を隠す仕草をしてしまうフニ。
line = "恥ずかしがって、羽で顔を隠す仕草をしてしまうフニ。"

[[dialogue]]
speaker = "unk"
# 俺はそんな彼女の羽をどけて、正面から見つめ合う形になる。
line = "俺はそんな彼女の羽をどけて、正面から見つめ合う形になる。"

[[dialogue]]
speaker = "unk"
# フニ、恥ずかしがらないで、顔を見せて
line = "フニ、恥ずかしがらないで、顔を見せて"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「あ……会長さん……<emoji=heart04>」
line = "「あ……会長さん……<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「んっ……<emoji=heart04>」
line = "「んっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 恥ずかしさで赤くなった照れ顔が可愛くて、俺は思わずキスをしてしまう。
line = "恥ずかしさで赤くなった照れ顔が可愛くて、俺は思わずキスをしてしまう。"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「んむっ……<emoji=heart04>　ちゅっ……<emoji=heart04>」
line = "「んむっ……<emoji=heart04>　ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ……俺が奉仕するはずだったのに、ごめん
line = "……俺が奉仕するはずだったのに、ごめん"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「んっ――はあぁ……<emoji=heart04>　気にしないで下さい……<emoji=heart04>」
line = "「んっ――はあぁ……<emoji=heart04>　気にしないで下さい……<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「私も……ドキドキして、して欲しいって思っちゃってましたから、両想いです……<emoji=heart04>」
line = "「私も……ドキドキして、して欲しいって思っちゃってましたから、両想いです……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# フ二、好きだ
line = "フ二、好きだ"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「はい、私もです。会長さん……愛してます<emoji=heart04>」
line = "「はい、私もです。会長さん……愛してます<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「ん……<emoji=heart04>　ちゅっ……<emoji=heart04>」
line = "「ん……<emoji=heart04>　ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「好き……<emoji=heart04>　好きです……<emoji=heart04>　ずっとおそばに居させて下さい、会長さん……<emoji=heart04>」
line = "「好き……<emoji=heart04>　好きです……<emoji=heart04>　ずっとおそばに居させて下さい、会長さん……<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「ちゅっ……<emoji=heart04>　ちゅっ……<emoji=heart04>」
line = "「ちゅっ……<emoji=heart04>　ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# それからはお互いにそっと背中に手を回して、キスに夢中になってしまうのだった――
line = "それからはお互いにそっと背中に手を回して、キスに夢中になってしまうのだった――"
