[[dialogue]]
speaker = "unk"
# 巨大な竜と化したマム。俺たちは全員で挑み、激戦の末に――
line = "巨大な竜と化したマム。俺たちは全員で挑み、激戦の末に――"

[[dialogue]]
speaker = "マハムート"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "マハムート"
# 「…………残念だけど、私の負けね。竜化で想像以上に星力を消耗してしまったわ」
line = "「…………残念だけど、私の負けね。竜化で想像以上に星力を消耗してしまったわ」"

[[dialogue]]
speaker = "マハムート"
# 「負けた以上、サンタごっこも見過ごすしかない。もう勝手にしなさい」
line = "「負けた以上、サンタごっこも見過ごすしかない。もう勝手にしなさい」"

[[dialogue]]
speaker = "ヨミ"
# （マム、もしかして、わざと負けて……？）
line = "（マム、もしかして、わざと負けて……？）"

[[dialogue]]
speaker = "セシア"
# 「……ねぇ、紅明ママ。ちょっといいかしら？」
line = "「……ねぇ、紅明ママ。ちょっといいかしら？」"

[[dialogue]]
speaker = "紅明"
# 「ん？　どうした、セッシー？」
line = "「ん？　どうした、セッシー？」"

[[dialogue]]
speaker = "セシア"
# 「あのね……こしょこしょ――」
line = "「あのね……こしょこしょ――」"

[[dialogue]]
speaker = "紅明"
# 「ふむふむ……あはは☆　なるほどね♪　うん、もちろんいいぜ！　元々そのつもりだったしね……はい、これ♪」
line = "「ふむふむ……あはは☆　なるほどね♪　うん、もちろんいいぜ！　元々そのつもりだったしね……はい、これ♪」"

[[dialogue]]
speaker = "セシア"
# 「ありがとう、紅明ママ♪　行ってくるわね」
line = "「ありがとう、紅明ママ♪　行ってくるわね」"

[[dialogue]]
speaker = "セシア"
# 「――改めて、初めまして。マム」
line = "「――改めて、初めまして。マム」"

[[dialogue]]
speaker = "マハムート"
# 「ああ、そういえば、挨拶がまだだったわね。初めまして、セシア」
line = "「ああ、そういえば、挨拶がまだだったわね。初めまして、セシア」"

[[dialogue]]
speaker = "セシア"
# 「セシアたち、サンタごっこを続けてもいいのよね？　そしたら――」
line = "「セシアたち、サンタごっこを続けてもいいのよね？　そしたら――」"

[[dialogue]]
speaker = "セシア"
# 「マムにもクリスマスプレゼントを渡したいの。はい、これ。受け取って欲しいわ」
line = "「マムにもクリスマスプレゼントを渡したいの。はい、これ。受け取って欲しいわ」"

[[dialogue]]
speaker = "マハムート"
# 「…………！」
line = "「…………！」"

[[dialogue]]
speaker = "ヨミ"
# 「あっ……！　新星寮の生徒たちにクリスマスプレゼントを配るってことは、紅明先輩とセシアちゃん、最初から……！」
line = "「あっ……！　新星寮の生徒たちにクリスマスプレゼントを配るってことは、紅明先輩とセシアちゃん、最初から……！」"

[[dialogue]]
speaker = "マハムート"
# 「ふっ……やれやれ、仕方ないわね。全く、優しい悪戯っ子がいたものだわ…」
line = "「ふっ……やれやれ、仕方ないわね。全く、優しい悪戯っ子がいたものだわ…」"

[[dialogue]]
speaker = "マハムート"
# 「ありがとう、貰っておくわ。小さなサンタさん」
line = "「ありがとう、貰っておくわ。小さなサンタさん」"

[[dialogue]]
speaker = "セシア"
# 「ふふっ♪　今日１番嬉しい笑顔だわ♪」
line = "「ふふっ♪　今日１番嬉しい笑顔だわ♪」"

[[dialogue]]
speaker = "unk"
# 笑顔を浮かべ合う２人を見て、俺たちは心が温かくなるのだった――
line = "笑顔を浮かべ合う２人を見て、俺たちは心が温かくなるのだった――"

[[dialogue]]
speaker = "マハムート"
# 「あ、ちなみに会長だけは後で死刑ね」
line = "「あ、ちなみに会長だけは後で死刑ね」"

[[dialogue]]
speaker = "unk"
# なぜ俺だけ！？
line = "なぜ俺だけ！？"

[[dialogue]]
speaker = "unk"
# その後、クリスマスプレゼントは無事に全て配り終えて、その帰り道――
line = "その後、クリスマスプレゼントは無事に全て配り終えて、その帰り道――"

[[dialogue]]
speaker = "セシア"
# 「すぅ……すぅ……」
line = "「すぅ……すぅ……」"

[[dialogue]]
speaker = "ヨミ"
# 「セシアちゃん、疲れて眠っちゃいましたね」
line = "「セシアちゃん、疲れて眠っちゃいましたね」"

[[dialogue]]
speaker = "紅明"
# 「善哉善哉♪　これにて一件落着。世はなべて、こともなしってね☆」
line = "「善哉善哉♪　これにて一件落着。世はなべて、こともなしってね☆」"

[[dialogue]]
speaker = "ヨミ"
# 「紅明先輩、セシアちゃんは私と同じで九浄家のお屋敷に住んでますから、私がおぶるの代わりますよ」
line = "「紅明先輩、セシアちゃんは私と同じで九浄家のお屋敷に住んでますから、私がおぶるの代わりますよ」"

[[dialogue]]
speaker = "紅明"
# 「そうかい？　じゃあ、お言葉に甘えさせてもらおうかな」
line = "「そうかい？　じゃあ、お言葉に甘えさせてもらおうかな」"

[[dialogue]]
speaker = "ヨミ"
# 「よいしょっと……はい、確かに承りました」
line = "「よいしょっと……はい、確かに承りました」"

[[dialogue]]
speaker = "ヨミ"
# 「そういえば私、紅明先輩に聞きたかったことがあって」
line = "「そういえば私、紅明先輩に聞きたかったことがあって」"

[[dialogue]]
speaker = "紅明"
# 「ん？」
line = "「ん？」"

[[dialogue]]
speaker = "ヨミ"
# 「今回、新星寮に忍び込もうと思ったのって、もしかしてセシアちゃんに、クリスマスを楽しんでもらいたかったからですか？」
line = "「今回、新星寮に忍び込もうと思ったのって、もしかしてセシアちゃんに、クリスマスを楽しんでもらいたかったからですか？」"

[[dialogue]]
speaker = "紅明"
# 「…………！」
line = "「…………！」"

[[dialogue]]
speaker = "紅明"
# 「よくわかったね。ヨミヨミの言う通りだよ」
line = "「よくわかったね。ヨミヨミの言う通りだよ」"

[[dialogue]]
speaker = "紅明"
# 「もちろん、セッシーの記憶を取り戻す手助けになればとは思ってたけど、ぶっちゃけ、アタシにはどうすれば早く記憶が戻るなんて、わからんからさ」
line = "「もちろん、セッシーの記憶を取り戻す手助けになればとは思ってたけど、ぶっちゃけ、アタシにはどうすれば早く記憶が戻るなんて、わからんからさ」"

[[dialogue]]
speaker = "紅明"
# 「でも、楽しい思い出ってのは今からでも作れるっしょ？　せっかくのクリスマスだもん。記憶がなくたって、セッシーに元気になってもらいたいじゃん？」
line = "「でも、楽しい思い出ってのは今からでも作れるっしょ？　せっかくのクリスマスだもん。記憶がなくたって、セッシーに元気になってもらいたいじゃん？」"

[[dialogue]]
speaker = "紅明"
# 「ただ、ヨミヨミとダーリンには、咄嗟のノリに巻き込んじゃって、悪かったと思ってるよ。ごめんね」
line = "「ただ、ヨミヨミとダーリンには、咄嗟のノリに巻き込んじゃって、悪かったと思ってるよ。ごめんね」"

[[dialogue]]
speaker = "紅明"
# 「――あっ、そうだ。サンタ大作戦の締めを忘れてた」
line = "「――あっ、そうだ。サンタ大作戦の締めを忘れてた」"

[[dialogue]]
speaker = "紅明"
# 「サンタの袋から取り出しますは～、ほい♪　２人にもクリスマスプレゼント☆」
line = "「サンタの袋から取り出しますは～、ほい♪　２人にもクリスマスプレゼント☆」"

[[dialogue]]
speaker = "ヨミ"
# 「えっ？」
line = "「えっ？」"

[[dialogue]]
speaker = "紅明"
# 「うしし♪　全員にプレゼント渡すっていうなら、２人も例外じゃないっしょ？」
line = "「うしし♪　全員にプレゼント渡すっていうなら、２人も例外じゃないっしょ？」"

[[dialogue]]
speaker = "紅明"
# 「それから寝ちゃってるけど、セッシーにもね。ヨミヨミ、こっそり枕元に置いといてくれないかな？　セッシーはよい子にしてたから、特別に２つ目ってことで♪」
line = "「それから寝ちゃってるけど、セッシーにもね。ヨミヨミ、こっそり枕元に置いといてくれないかな？　セッシーはよい子にしてたから、特別に２つ目ってことで♪」"

[[dialogue]]
speaker = "セシア"
# 「むにゃむにゃ……」
line = "「むにゃむにゃ……」"

[[dialogue]]
speaker = "ヨミ"
# 「あ、あの！　紅明先輩……！」
line = "「あ、あの！　紅明先輩……！」"

[[dialogue]]
speaker = "紅明"
# 「んじゃ、サンタクロースは元気に去るぜ☆　２人共、メリークリスマス！」
line = "「んじゃ、サンタクロースは元気に去るぜ☆　２人共、メリークリスマス！」"

[[dialogue]]
speaker = "ヨミ"
# 「ちょっ……！」
line = "「ちょっ……！」"

[[dialogue]]
speaker = "ヨミ"
# 「……ああもう、お礼もちゃんと言わせてくれないんですから」
line = "「……ああもう、お礼もちゃんと言わせてくれないんですから」"

[[dialogue]]
speaker = "ヨミ"
# 「紅明先輩、実際に会ってみると、戸惑っちゃうくらい爆裂ハイテンションで、ノリで行動するのが悪い癖ですけど――」
line = "「紅明先輩、実際に会ってみると、戸惑っちゃうくらい爆裂ハイテンションで、ノリで行動するのが悪い癖ですけど――」"

[[dialogue]]
speaker = "ヨミ"
# 「こうやって人を喜ばせてくるから、困っちゃいます」
line = "「こうやって人を喜ばせてくるから、困っちゃいます」"

[[dialogue]]
speaker = "unk"
# さすが人気タレントだよね
line = "さすが人気タレントだよね"

[[dialogue]]
speaker = "ヨミ"
# 「はい。つい目を離せなくて……なんだかんだ尊敬しちゃう先輩です」
line = "「はい。つい目を離せなくて……なんだかんだ尊敬しちゃう先輩です」"

[[dialogue]]
speaker = "ヨミ"
# 「――会長、それで思いついたことがあるんですけど……」
line = "「――会長、それで思いついたことがあるんですけど……」"

[[dialogue]]
speaker = "unk"
# ヨミの提案に、俺は頷くのだった。
line = "ヨミの提案に、俺は頷くのだった。"
