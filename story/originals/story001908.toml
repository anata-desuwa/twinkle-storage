[[dialogue]]
speaker = "ソフィア"
# 「舞亜、こんなところに呼び出してどうしたの？」
line = "「舞亜、こんなところに呼び出してどうしたの？」"

[[dialogue]]
speaker = "舞亜"
# 「これは今までに着たことない巫女衣装が、ヒントになったんだけど……オオヒメさんに神様を呼ぶ踊り──神楽を捧げようと思うんだ」
line = "「これは今までに着たことない巫女衣装が、ヒントになったんだけど……オオヒメさんに神様を呼ぶ踊り──神楽を捧げようと思うんだ」"

[[dialogue]]
speaker = "舞亜"
# 「でも、それをやるには、私ひとりじゃ体が足りない。みんな、力を貸して。お願いします」
line = "「でも、それをやるには、私ひとりじゃ体が足りない。みんな、力を貸して。お願いします」"

[[dialogue]]
speaker = "unk"
# 何か考えがあるんだ？
line = "何か考えがあるんだ？"

[[dialogue]]
speaker = "舞亜"
# 「うん。もう一度、オオヒメさんに私の……私たちの演技を見せつける。星術を使った、私たちにしかできない神楽舞を」
line = "「うん。もう一度、オオヒメさんに私の……私たちの演技を見せつける。星術を使った、私たちにしかできない神楽舞を」"

[[dialogue]]
speaker = "ウズメイア"
# 「んん～？　それならもうやったでしょ？」
line = "「んん～？　それならもうやったでしょ？」"

[[dialogue]]
speaker = "舞亜"
# 「ううん、自信のある演技を披露しただけで、あれは神楽舞じゃない。それにあれは『星術でリンクを再現したフィギュアスケート』。氷でリンクを作っただけだよ」
line = "「ううん、自信のある演技を披露しただけで、あれは神楽舞じゃない。それにあれは『星術でリンクを再現したフィギュアスケート』。氷でリンクを作っただけだよ」"

[[dialogue]]
speaker = "舞亜"
# 「これからやろうとしているのは『星術とスケートをフル活用した舞台』……テーマパークとかであるよね。なんだっけ……プロテクション……ラッピング……？」
line = "「これからやろうとしているのは『星術とスケートをフル活用した舞台』……テーマパークとかであるよね。なんだっけ……プロテクション……ラッピング……？」"

[[dialogue]]
speaker = "トリシャ"
# 「プロテクション……？　防御系の星術でしょうか……」
line = "「プロテクション……？　防御系の星術でしょうか……」"

[[dialogue]]
speaker = "舞亜"
# 「じゃなくて、ほら、映像を、こう、スクリーンに映して……？　火が出たり、水が出たり、花が咲いたり……」
line = "「じゃなくて、ほら、映像を、こう、スクリーンに映して……？　火が出たり、水が出たり、花が咲いたり……」"

[[dialogue]]
speaker = "unk"
# プロジェクション・マッピング？
line = "プロジェクション・マッピング？"

[[dialogue]]
speaker = "舞亜"
# 「それそれ。星術で舞台を作るだけじゃなくて、キラキラな演出に使用するの」
line = "「それそれ。星術で舞台を作るだけじゃなくて、キラキラな演出に使用するの」"

[[dialogue]]
speaker = "舞亜"
# 「大会後にエキシヴィションであるんだよね。審査を度外視した、ただ楽しいだけのフィギュアスケート」
line = "「大会後にエキシヴィションであるんだよね。審査を度外視した、ただ楽しいだけのフィギュアスケート」"

[[dialogue]]
speaker = "ソフィア"
# 「男女の役を入れ替えたり、漫画やアニメのキャラのコスプレをしたりとか。お祭りみたいな感じなんです」
line = "「男女の役を入れ替えたり、漫画やアニメのキャラのコスプレをしたりとか。お祭りみたいな感じなんです」"

[[dialogue]]
speaker = "舞亜"
# 「ソフィ、さっき言ってたよね。私の演技は完璧だったけど、あれを超える『個人技』なんて考えつかないって」
line = "「ソフィ、さっき言ってたよね。私の演技は完璧だったけど、あれを超える『個人技』なんて考えつかないって」"

[[dialogue]]
speaker = "ソフィア"
# 「……言ってたかな。言ってたかも」
line = "「……言ってたかな。言ってたかも」"

[[dialogue]]
speaker = "舞亜"
# 「私の演技は大会用の個人技に偏りすぎてたんだ。勝つための表現にばかり特化していた」
line = "「私の演技は大会用の個人技に偏りすぎてたんだ。勝つための表現にばかり特化していた」"

[[dialogue]]
speaker = "舞亜"
# 「個人技である必要はない。だって、メダルを狙うための正確な演技じゃなくって、人を喜ばせるための隠し芸なんだから。力を合わせた団体競技でいいんだよね」
line = "「個人技である必要はない。だって、メダルを狙うための正確な演技じゃなくって、人を喜ばせるための隠し芸なんだから。力を合わせた団体競技でいいんだよね」"

[[dialogue]]
speaker = "舞亜"
# 「だから、力を貸して。お願いします」
line = "「だから、力を貸して。お願いします」"

[[dialogue]]
speaker = "ウズメイア"
# 「モチのロ～ン！」
line = "「モチのロ～ン！」"

[[dialogue]]
speaker = "ソフィア"
# 「そういうことならいくらでも。頼りにされるのは嬉しいから」
line = "「そういうことならいくらでも。頼りにされるのは嬉しいから」"

[[dialogue]]
speaker = "舞亜"
# 「ありがと。じゃあ早速、練習するから、会長さんは他の人たちに話を通してくれると──」
line = "「ありがと。じゃあ早速、練習するから、会長さんは他の人たちに話を通してくれると──」"

[[dialogue]]
speaker = "ヴィーナス"
# 「話は全て聞かせてもらったわ！　つまり、私たちが派手派手な舞台装置になればいいのね！」
line = "「話は全て聞かせてもらったわ！　つまり、私たちが派手派手な舞台装置になればいいのね！」"

[[dialogue]]
speaker = "フィオナ"
# 「すみません……立ち聞きはよくないと思いつつ」
line = "「すみません……立ち聞きはよくないと思いつつ」"

[[dialogue]]
speaker = "トリシャ"
# 「友達が困っていたら……救いの手を差し出すのが、ゆ、友情というものです……にへ、にへへ」
line = "「友達が困っていたら……救いの手を差し出すのが、ゆ、友情というものです……にへ、にへへ」"

[[dialogue]]
speaker = "舞亜"
# 「むしろ、説明とお願いをする手間が省けて良かった。えっと……お願いしても？」
line = "「むしろ、説明とお願いをする手間が省けて良かった。えっと……お願いしても？」"

[[dialogue]]
speaker = "フィオナ"
# 「もちろんです、舞亜さん。喜んで協力させてもらいます」
line = "「もちろんです、舞亜さん。喜んで協力させてもらいます」"

[[dialogue]]
speaker = "ソフィア"
# 「会長たちがいてくれるだけで心強いです。皆さん、スケートの経験は？」
line = "「会長たちがいてくれるだけで心強いです。皆さん、スケートの経験は？」"

[[dialogue]]
speaker = "トリシャ"
# 「氷に覆われてるレゾフではアイススケートも盛んではありましたが……私はまったく……申し訳ありません、お役に立てず……」
line = "「氷に覆われてるレゾフではアイススケートも盛んではありましたが……私はまったく……申し訳ありません、お役に立てず……」"

[[dialogue]]
speaker = "ウズメイア"
# 「あたしはお遊びでちょっとやったことあるくらい～。舞亜たちみたいに空中３回スピンなんてできないよ～？」
line = "「あたしはお遊びでちょっとやったことあるくらい～。舞亜たちみたいに空中３回スピンなんてできないよ～？」"

[[dialogue]]
speaker = "舞亜"
# 「少し滑れるくらいで問題ないよ。競技じゃないから高難度技は……ちょっとしか入れないし」
line = "「少し滑れるくらいで問題ないよ。競技じゃないから高難度技は……ちょっとしか入れないし」"

[[dialogue]]
speaker = "ウズメイア"
# 「ちょっとは入れるんだ～！？」
line = "「ちょっとは入れるんだ～！？」"

[[dialogue]]
speaker = "舞亜"
# 「本当に難しいところは私とソフィでなんとかするよ」
line = "「本当に難しいところは私とソフィでなんとかするよ」"

[[dialogue]]
speaker = "ソフィア"
# 「そうやって、しれっと無茶振りしてくるんだから……まぁ、でも、やる」
line = "「そうやって、しれっと無茶振りしてくるんだから……まぁ、でも、やる」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうと決まれば、悠長にしてる時間はないわね！　今から特訓よ！　そのためにアリーナを借り切ったんでしょ？」
line = "「そうと決まれば、悠長にしてる時間はないわね！　今から特訓よ！　そのためにアリーナを借り切ったんでしょ？」"

[[dialogue]]
speaker = "舞亜"
# 「会長さんは全体的な仕上がりを客観的に見て、遠慮なくダメ出しして。フィギュアチームのプロデュース、よろしくね」
line = "「会長さんは全体的な仕上がりを客観的に見て、遠慮なくダメ出しして。フィギュアチームのプロデュース、よろしくね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そのくらい、アイドルプロデュース経験もあるクロトならお茶の子さいさいね！」
line = "「そのくらい、アイドルプロデュース経験もあるクロトならお茶の子さいさいね！」"

[[dialogue]]
speaker = "ソフィア"
# 「えっ、そうなんですか。新星の会長さんはなんでもやられてるんですね」
line = "「えっ、そうなんですか。新星の会長さんはなんでもやられてるんですね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「なんたって、あの『アーネスト』の名付け親はクロトだもの！　海賊船に乗ったつもりで安心なさい！」
line = "「なんたって、あの『アーネスト』の名付け親はクロトだもの！　海賊船に乗ったつもりで安心なさい！」"

[[dialogue]]
speaker = "unk"
# そして、即席フィギュアスケートチームの短期特訓が始まった。
line = "そして、即席フィギュアスケートチームの短期特訓が始まった。"

[[dialogue]]
speaker = "unk"
# ウズメ、立ち位置ズレてるよ 舞亜、ソフィア、急かしすぎ
line = "ウズメ、立ち位置ズレてるよ\n舞亜、ソフィア、急かしすぎ"

[[dialogue]]
speaker = "ウズメイア"
# 「んひぃ～、覚えること多すぎ～っ！」
line = "「んひぃ～、覚えること多すぎ～っ！」"

[[dialogue]]
speaker = "舞亜"
# 「ごめん、みんなに無茶させちゃってる？　もう少し難易度を下げても──」
line = "「ごめん、みんなに無茶させちゃってる？　もう少し難易度を下げても──」"

[[dialogue]]
speaker = "ソフィア"
# 「大丈夫。思ってたよりペース早いし、これならすぐ形にできるよ」
line = "「大丈夫。思ってたよりペース早いし、これならすぐ形にできるよ」"

[[dialogue]]
speaker = "ウズメイア"
# 「ソフィってば乗せ上手なんだから～。んしっ、もう一本ふぁいとっ！」
line = "「ソフィってば乗せ上手なんだから～。んしっ、もう一本ふぁいとっ！」"

[[dialogue]]
speaker = "フィオナ"
# 「皆の走った軌跡を、星術で彩る……思っていた以上に精密な星力操作を要求されますね……！」
line = "「皆の走った軌跡を、星術で彩る……思っていた以上に精密な星力操作を要求されますね……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ここで一発、花火をドーン！　ほら、フィオナもやりなさい！　さっきの恥ずかしさを吹っ飛ばすつもりで！」
line = "「ここで一発、花火をドーン！　ほら、フィオナもやりなさい！　さっきの恥ずかしさを吹っ飛ばすつもりで！」"

[[dialogue]]
speaker = "フィオナ"
# 「蒸し返さないでいいですからっ！　まったく……ヴィーナスさんの出力についていける星騎士がどれだけいると思っているんですか」
line = "「蒸し返さないでいいですからっ！　まったく……ヴィーナスさんの出力についていける星騎士がどれだけいると思っているんですか」"

[[dialogue]]
speaker = "ヴィーナス"
# 「その内のひとりがあなたじゃない。ここでふんばらないと世界がなくなっちゃうのよ？」
line = "「その内のひとりがあなたじゃない。ここでふんばらないと世界がなくなっちゃうのよ？」"

[[dialogue]]
speaker = "unk"
# わずかな休憩時間だけで特訓は進み、ようやく全体の完成図が見えてきた頃──
line = "わずかな休憩時間だけで特訓は進み、ようやく全体の完成図が見えてきた頃──"

[[dialogue]]
speaker = "トリシャ"
# 「これは……凶兆の空模様……崩壊に至るまでのカウントが……着実に進んでいます……」
line = "「これは……凶兆の空模様……崩壊に至るまでのカウントが……着実に進んでいます……」"

[[dialogue]]
speaker = "フィオナ"
# 「特訓はここまでにしましょうか。疲れた体では本番にも差し障ります」
line = "「特訓はここまでにしましょうか。疲れた体では本番にも差し障ります」"

[[dialogue]]
speaker = "ソフィア"
# 「プログラムを組んで、通しで１回やっただけですよ？　まだ仕上がりの甘いところも多く……」
line = "「プログラムを組んで、通しで１回やっただけですよ？　まだ仕上がりの甘いところも多く……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ほとんどぶっつけ本番ね！　あとはアドリブでなんとかしましょ！」
line = "「ほとんどぶっつけ本番ね！　あとはアドリブでなんとかしましょ！」"

[[dialogue]]
speaker = "舞亜"
# 「うん。今いい感じにできてるから、この感覚を忘れなければいけると思うよ」
line = "「うん。今いい感じにできてるから、この感覚を忘れなければいけると思うよ」"

[[dialogue]]
speaker = "ソフィア"
# 「舞亜がそう言うなら……いえ、私も覚悟を決めました。行きましょう」
line = "「舞亜がそう言うなら……いえ、私も覚悟を決めました。行きましょう」"

[[dialogue]]
speaker = "トリシャ"
# 「今度こそ、オオヒメさんの心の扉を開き……フィーニスの塔へと戻しましょう……！」
line = "「今度こそ、オオヒメさんの心の扉を開き……フィーニスの塔へと戻しましょう……！」"
