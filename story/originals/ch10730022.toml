[[dialogue]]
speaker = "unk"
# 第２話,いつもと違うお出かけ,P
line = "第２話,いつもと違うお出かけ,P"

[[dialogue]]
speaker = "unk"
# その日、私はクロトと一緒に街へ買い物にやって来ていたのだが――
line = "その日、私はクロトと一緒に街へ買い物にやって来ていたのだが――"

[[dialogue]]
speaker = "unk"
# これで必要な物は揃ったかな？
line = "これで必要な物は揃ったかな？"

[[dialogue]]
speaker = "リノ"
# 「え、ええ。今日はわざわざ付き合ってくれてありがとうね、クロト」
line = "「え、ええ。今日はわざわざ付き合ってくれてありがとうね、クロト」"

[[dialogue]]
speaker = "リノ"
# 「――こうして２人で出かけるの、久しぶりだって？」
line = "「――こうして２人で出かけるの、久しぶりだって？」"

[[dialogue]]
speaker = "リノ"
# 「そ、そうね……。なかなか最近タイミングが合わなくて……」
line = "「そ、そうね……。なかなか最近タイミングが合わなくて……」"

[[dialogue]]
speaker = "リノ"
# （本当は、私がクロトと２人で出かけるのをなんとなく避けてしまっていたからなんだけど……）
line = "（本当は、私がクロトと２人で出かけるのをなんとなく避けてしまっていたからなんだけど……）"

[[dialogue]]
speaker = "unk"
# 今日はクロトが積極的に付いて来たいと言い出して、断り切れなかったのだ。
line = "今日はクロトが積極的に付いて来たいと言い出して、断り切れなかったのだ。"

[[dialogue]]
speaker = "リノ"
# （あれから距離を取ってしまっているのは、さすがにクロトも分かってるわよね……）
line = "（あれから距離を取ってしまっているのは、さすがにクロトも分かってるわよね……）"

[[dialogue]]
speaker = "リノ"
# （可愛い息子のはずなのに、こんなわざと冷たくするようなことをして……なんだかすごく自己嫌悪してしまうわ……）
line = "（可愛い息子のはずなのに、こんなわざと冷たくするようなことをして……なんだかすごく自己嫌悪してしまうわ……）"

[[dialogue]]
speaker = "unk"
# 私が黙り込んでしまっていると、クロトが口を開く。
line = "私が黙り込んでしまっていると、クロトが口を開く。"

[[dialogue]]
speaker = "unk"
# 母さん、せっかく出かけたんだし――
line = "母さん、せっかく出かけたんだし――"

[[dialogue]]
speaker = "リノ"
# 「きゃっ……！？」
line = "「きゃっ……！？」"

[[dialogue]]
speaker = "unk"
# 不意に手を握られて、ドキッとしてしまう。
line = "不意に手を握られて、ドキッとしてしまう。"

[[dialogue]]
speaker = "unk"
# そのままクロトは私の手を引っ張って、歩き始める。
line = "そのままクロトは私の手を引っ張って、歩き始める。"

[[dialogue]]
speaker = "リノ"
# 「く、クロト、どこに行くの？」
line = "「く、クロト、どこに行くの？」"

[[dialogue]]
speaker = "リノ"
# 「――え？　寄り道？」
line = "「――え？　寄り道？」"

[[dialogue]]
speaker = "unk"
# クロトに提案されて立ち寄ったのは、以前寄ったことのあるスイーツカフェだった。
line = "クロトに提案されて立ち寄ったのは、以前寄ったことのあるスイーツカフェだった。"

[[dialogue]]
speaker = "unk"
# 母さん、このアイス美味しいよ
line = "母さん、このアイス美味しいよ"

[[dialogue]]
speaker = "リノ"
# 「え、ええ。確かに美味しそうね。お母さんも今度来た時はそのフレーバーを頼んでみようかしら」
line = "「え、ええ。確かに美味しそうね。お母さんも今度来た時はそのフレーバーを頼んでみようかしら」"

[[dialogue]]
speaker = "リノ"
# 「――って、えっ！？　ひと口食べてみるかって？」
line = "「――って、えっ！？　ひと口食べてみるかって？」"

[[dialogue]]
speaker = "unk"
# ほら、口開けて？　あ～ん
line = "ほら、口開けて？　あ～ん"

[[dialogue]]
speaker = "リノ"
# 「ちょ、ちょっと待って！　親子でそんな大胆な……！」
line = "「ちょ、ちょっと待って！　親子でそんな大胆な……！」"

[[dialogue]]
speaker = "リノ"
# 「へ？　――２人でおやつを食べる時は、違うフレーバーを選んでシェアするのが緋宮家のルールでしょって？」
line = "「へ？　――２人でおやつを食べる時は、違うフレーバーを選んでシェアするのが緋宮家のルールでしょって？」"

[[dialogue]]
speaker = "リノ"
# 「そ、それはそうなんだけど……！」
line = "「そ、それはそうなんだけど……！」"

[[dialogue]]
speaker = "リノ"
# （前は普通にできてたことなのに、なんだか今はとてつもなく恥ずかしく感じるわ……！）
line = "（前は普通にできてたことなのに、なんだか今はとてつもなく恥ずかしく感じるわ……！）"

[[dialogue]]
speaker = "リノ"
# （というか、今日のクロト、いつもより積極的じゃない……！？）
line = "（というか、今日のクロト、いつもより積極的じゃない……！？）"

[[dialogue]]
speaker = "unk"
# それからもクロトが提案して、色々な店に寄り道を続けて――
line = "それからもクロトが提案して、色々な店に寄り道を続けて――"

[[dialogue]]
speaker = "リノ"
# 「く、クロト、そんなに荷物持って、重くない……？」
line = "「く、クロト、そんなに荷物持って、重くない……？」"

[[dialogue]]
speaker = "unk"
# 大丈夫。この学術書、欲しかったんでしょ？
line = "大丈夫。この学術書、欲しかったんでしょ？"

[[dialogue]]
speaker = "unk"
# 私が買ったものを全部持ってくれて、優しく微笑むクロト。
line = "私が買ったものを全部持ってくれて、優しく微笑むクロト。"

[[dialogue]]
speaker = "リノ"
# （はぅっ……そんなイケメンスマイルを向けるのはダメよ、クロト……！）
line = "（はぅっ……そんなイケメンスマイルを向けるのはダメよ、クロト……！）"

[[dialogue]]
speaker = "リノ"
# （私、お母さんなのに、またドキドキしちゃう……！）
line = "（私、お母さんなのに、またドキドキしちゃう……！）"

[[dialogue]]
speaker = "unk"
# そうして、２人で街を歩いていると――
line = "そうして、２人で街を歩いていると――"

[[dialogue]]
speaker = "リコリンフィア"
# 「おや？　渋谷で会うとは奇遇だな、リノ、少年」
line = "「おや？　渋谷で会うとは奇遇だな、リノ、少年」"

[[dialogue]]
speaker = "リノ"
# 「あっ、リコ……！」
line = "「あっ、リコ……！」"

[[dialogue]]
speaker = "unk"
# 彼女はリコリンフィア。私とは仕事の繋がりで知り合った、公安委員会所属の友人だ。
line = "彼女はリコリンフィア。私とは仕事の繋がりで知り合った、公安委員会所属の友人だ。"

[[dialogue]]
speaker = "リコリンフィア"
# 「今日は親子で仲良く買い物か？」
line = "「今日は親子で仲良く買い物か？」"

[[dialogue]]
speaker = "unk"
# はい、そうなんです
line = "はい、そうなんです"

[[dialogue]]
speaker = "リコリンフィア"
# 「なんだか随分と嬉しそうじゃないか、少年。いいことでもあったのか？」
line = "「なんだか随分と嬉しそうじゃないか、少年。いいことでもあったのか？」"

[[dialogue]]
speaker = "リコリンフィア"
# 「――久しぶりにリノと出かけたから？　そうだったのか」
line = "「――久しぶりにリノと出かけたから？　そうだったのか」"

[[dialogue]]
speaker = "リノ"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "リノ"
# （クロト、私と出かけて、そんなに嬉しかったんだ……）
line = "（クロト、私と出かけて、そんなに嬉しかったんだ……）"

[[dialogue]]
speaker = "リコリンフィア"
# 「――ほう、アイスの食べさせ合いっこをした？　ふっ、相変わらず恋人と勘違いされそうなことをするな」
line = "「――ほう、アイスの食べさせ合いっこをした？　ふっ、相変わらず恋人と勘違いされそうなことをするな」"

[[dialogue]]
speaker = "リノ"
# 「へぇっ！？　こここっ、恋人！？　私とクロトが？」
line = "「へぇっ！？　こここっ、恋人！？　私とクロトが？」"

[[dialogue]]
speaker = "リコリンフィア"
# 「ん……？　どうしたんだリノ？　そんな動揺して。お前たち親子が傍から見たらカップルみたいな仲良しムーブをしているのは、今更だろう？」
line = "「ん……？　どうしたんだリノ？　そんな動揺して。お前たち親子が傍から見たらカップルみたいな仲良しムーブをしているのは、今更だろう？」"

[[dialogue]]
speaker = "リノ"
# 「え？　…………そ、そうね」
line = "「え？　…………そ、そうね」"

[[dialogue]]
speaker = "リノ"
# （今まで何とも思わなかったのに、改めて指摘されるとすごく恥ずかしく感じるわ……！）
line = "（今まで何とも思わなかったのに、改めて指摘されるとすごく恥ずかしく感じるわ……！）"

[[dialogue]]
speaker = "リノ"
# （というか、今日って、ただの買い物だったはずなのに――）
line = "（というか、今日って、ただの買い物だったはずなのに――）"

[[dialogue]]
speaker = "リノ"
# （振り返ると私、クロトとまるでデートをしていたみたいな……）
line = "（振り返ると私、クロトとまるでデートをしていたみたいな……）"

[[dialogue]]
speaker = "unk"
# そう思ったら、顔が猛烈に熱くなって来てしまう。
line = "そう思ったら、顔が猛烈に熱くなって来てしまう。"

[[dialogue]]
speaker = "リコリンフィア"
# 「……？」
line = "「……？」"

[[dialogue]]
speaker = "unk"
# 怪訝そうな顔でこちらを見つめるリコに、その時の私は気づかなかったのだった――
line = "怪訝そうな顔でこちらを見つめるリコに、その時の私は気づかなかったのだった――"
