[[dialogue]]
speaker = "モンスター"
# 「ギッ！　ギァ！　ギァ！　ギァァ！」
line = "「ギッ！　ギァ！　ギァ！　ギァァ！」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「あいたたたた！　どうすればいいんですの！？　せめて、一撃分の星力が、この体に残っていれば！」
line = "「あいたたたた！　どうすればいいんですの！？　せめて、一撃分の星力が、この体に残っていれば！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「社長ーっ！　社長ーっ！」
line = "「社長ーっ！　社長ーっ！」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「ヒマワリ！？　まだいたんですの！？　危険だから、あなたたちは避難なさい！」
line = "「ヒマワリ！？　まだいたんですの！？　危険だから、あなたたちは避難なさい！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「社長を置いて逃げたりしませんよー！　この場を乗り切る最強プランを、ミウが考えてくれましたー！」
line = "「社長を置いて逃げたりしませんよー！　この場を乗り切る最強プランを、ミウが考えてくれましたー！」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「な、なんですってー！？　だったら、早くそれをおやりなさい！　あまり長くはもちませんわー！」
line = "「な、なんですってー！？　だったら、早くそれをおやりなさい！　あまり長くはもちませんわー！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「でも、これをやっちゃうと、社長がとんでもないことになっちゃいそうなんですけどー」
line = "「でも、これをやっちゃうと、社長がとんでもないことになっちゃいそうなんですけどー」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「私がとんでもないことって、どうなりますの！？　詳しい説明を求めますわ！　あいたたたた！」
line = "「私がとんでもないことって、どうなりますの！？　詳しい説明を求めますわ！　あいたたたた！」"

[[dialogue]]
speaker = "ミウ"
# 「説明してる時間はありません！　許可さえいただければ、速やかに実行に移ります！」
line = "「説明してる時間はありません！　許可さえいただければ、速やかに実行に移ります！」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「分かった、分かりましたわ！　後で判子でもなんでも押すから、最強プランとやらを早くなさい！」
line = "「分かった、分かりましたわ！　後で判子でもなんでも押すから、最強プランとやらを早くなさい！」"

[[dialogue]]
speaker = "ミウ"
# 「言質取りました！　それじゃ、やりますから、後で怒らないでくださいね！」
line = "「言質取りました！　それじゃ、やりますから、後で怒らないでくださいね！」"

[[dialogue]]
speaker = "ミウ"
# 「ヒマワリちゃん！　社長に向けて放って！」
line = "「ヒマワリちゃん！　社長に向けて放って！」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「はぁ！？　いったい何をするつもり──」
line = "「はぁ！？　いったい何をするつもり──」"

[[dialogue]]
speaker = "ヒマワリ"
# 「リスクなき投資なし！　オーバースペキュレーション！」
line = "「リスクなき投資なし！　オーバースペキュレーション！」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「ふぉっ！？　力が……失われたはずの星力が、回復していきます……！」
line = "「ふぉっ！？　力が……失われたはずの星力が、回復していきます……！」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「み・な・ぎっ・て・きましたワーーーッ！　どっせぇいっ！」
line = "「み・な・ぎっ・て・きましたワーーーッ！　どっせぇいっ！」"

[[dialogue]]
speaker = "モンスター"
# 「ギァァァァ！？」
line = "「ギァァァァ！？」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「まさか、ヒマワリの能力は、<ruby=エンプレス>女帝</ruby>フォームを満たすほどの星力を分け与えられるんですの……！？」
line = "「まさか、ヒマワリの能力は、<ruby>女帝<rt>エンプレス</rt></ruby>フォームを満たすほどの星力を分け与えられるんですの……！？」"

[[dialogue]]
speaker = "ヒマワリ"
# 「──とか、社長は思ってるのかな？　あはは、さすがにあたしにそこまでの力はないよー」
line = "「──とか、社長は思ってるのかな？　あはは、さすがにあたしにそこまでの力はないよー」"

[[dialogue]]
speaker = "ミウ"
# 「ヒマワリちゃんにそこまでの力があったら、敵のオヤブンさんだって倒せてますしね」
line = "「ヒマワリちゃんにそこまでの力があったら、敵のオヤブンさんだって倒せてますしね」"

[[dialogue]]
speaker = "ヒマワリ"
# 「あたしの星術は『投資』対象に星力を与えることができる。でもね、もちろんタダじゃない。そして、タダより高いものはないってね」
line = "「あたしの星術は『投資』対象に星力を与えることができる。でもね、もちろんタダじゃない。そして、タダより高いものはないってね」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「うらうらうらうらぁっ！　消えやがれですわー！」
line = "「うらうらうらうらぁっ！　消えやがれですわー！」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「あら、弾が……！？　また星力切れですの！？」
line = "「あら、弾が……！？　また星力切れですの！？」"

[[dialogue]]
speaker = "ミウ"
# 「社長の星力が切れたところで、ヒマワリちゃんは社長から星力を取り立てようとします！」
line = "「社長の星力が切れたところで、ヒマワリちゃんは社長から星力を取り立てようとします！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「キャピタルドレイン！」
line = "「キャピタルドレイン！」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「ひっぎぃいいいいい！？　雑巾になった気分ですわ～～～っ！？」
line = "「ひっぎぃいいいいい！？　雑巾になった気分ですわ～～～っ！？」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「でも搾り取ろうにも、私の星力はカラッカラですわよ！？」
line = "「でも搾り取ろうにも、私の星力はカラッカラですわよ！？」"

[[dialogue]]
speaker = "ヒマワリ"
# 「それでも、あたしのスキルは意地でも相手から取り立てるんですよー！」
line = "「それでも、あたしのスキルは意地でも相手から取り立てるんですよー！」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「まるで、借金の取り立て人ですわね！　そういう仕事をしたこともありますけど！」
line = "「まるで、借金の取り立て人ですわね！　そういう仕事をしたこともありますけど！」"

[[dialogue]]
speaker = "ミウ"
# 「スキル対象に支払い能力がないと判断した場合、不足分の取り立ての対象は──」
line = "「スキル対象に支払い能力がないと判断した場合、不足分の取り立ての対象は──」"

[[dialogue]]
speaker = "ミウ"
# 「セナリィ社長に力を与えている守護星になります！」
line = "「セナリィ社長に力を与えている守護星になります！」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「むちゃくちゃですわね！？　守護星は連帯保証人じゃありませんのよ！？」
line = "「むちゃくちゃですわね！？　守護星は連帯保証人じゃありませんのよ！？」"

[[dialogue]]
speaker = "ミウ"
# 「なので、社長！　ヒマワリちゃんに《強奪の星眼》を！」
line = "「なので、社長！　ヒマワリちゃんに《強奪の星眼》を！」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「どどどういうことですのっ！？」
line = "「どどどういうことですのっ！？」"

[[dialogue]]
speaker = "ヒマワリ"
# 「いいから早くーっ！　あたしが星力を得るスキルを社長が奪うのっ！」
line = "「いいから早くーっ！　あたしが星力を得るスキルを社長が奪うのっ！」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「な、なるほど！？《<ruby=バンデット>強奪</ruby>》！」
line = "「な、なるほど！？《<ruby>強奪<rt>バンデット</rt></ruby>》！」"

[[dialogue]]
speaker = "ミウ"
# 「ヒマワリちゃんから奪ったスキルを《<ruby=リリース>解放</ruby>》してくださいっ！」
line = "「ヒマワリちゃんから奪ったスキルを《<ruby>解放<rt>リリース</rt></ruby>》してくださいっ！」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「──《<ruby=リリース>解放</ruby>》！　キャピタルドレイン！」
line = "「──《<ruby>解放<rt>リリース</rt></ruby>》！　キャピタルドレイン！」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「ほぁ～～～～～～～～っ！！？」
line = "「ほぁ～～～～～～～～っ！！？」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「星力が流れ込んできますわーーーーっ！？」
line = "「星力が流れ込んできますわーーーーっ！？」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「この力、馴染みます！　実に馴染みますわっ！　今なら、どんな敵にも負ける気がしませんっ！　いてこましたりますわーーっ！」
line = "「この力、馴染みます！　実に馴染みますわっ！　今なら、どんな敵にも負ける気がしませんっ！　いてこましたりますわーーっ！」"

[[dialogue]]
speaker = "ミウ"
# 「キャピタルドレインで吸い取ってる対象は、社長の力の源の守護星ですからね。よく馴染んで当然です」
line = "「キャピタルドレインで吸い取ってる対象は、社長の力の源の守護星ですからね。よく馴染んで当然です」"

[[dialogue]]
speaker = "ヒマワリ"
# 「つまり、社長の守護星から、あたしに流れてくるはずだった社長の星力を──」
line = "「つまり、社長の守護星から、あたしに流れてくるはずだった社長の星力を──」"

[[dialogue]]
speaker = "ミウ"
# 「社長自身に流し込んだ。社長の守護星から強制的に星力を前借りしてるんです！」
line = "「社長自身に流し込んだ。社長の守護星から強制的に星力を前借りしてるんです！」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「そんな無茶苦茶がまかり通るんですの！？　いえまかり通ってますわねぇ！」
line = "「そんな無茶苦茶がまかり通るんですの！？　いえまかり通ってますわねぇ！」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「ハッ！？　つまり、今、この瞬間も守護星から力を吸い取り続けてるわけで、早く決めないと──」
line = "「ハッ！？　つまり、今、この瞬間も守護星から力を吸い取り続けてるわけで、早く決めないと──」"

[[dialogue]]
speaker = "ミウ"
# 「守護星の力までカラッカラになっちゃったら、どうなっちゃうのかまでは、さすがに想像がつかないですね」
line = "「守護星の力までカラッカラになっちゃったら、どうなっちゃうのかまでは、さすがに想像がつかないですね」"

[[dialogue]]
speaker = "ミウ"
# 「例えば……爆発したり、ブラックホール化しちゃう……とか？　それは洒落にならないですよね」
line = "「例えば……爆発したり、ブラックホール化しちゃう……とか？　それは洒落にならないですよね」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「うぉおぉぉぉ！？　早いとこ、死に晒せですわーっ！　このボス、思ってたより硬いですわねぇーっ！」
line = "「うぉおぉぉぉ！？　早いとこ、死に晒せですわーっ！　このボス、思ってたより硬いですわねぇーっ！」"

[[dialogue]]
speaker = "モンスター"
# 「ギャヒィイィィィ！？」
line = "「ギャヒィイィィィ！？」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「い・い・加・減に・しやがれですわーっ！　ガトリングゥ、パーーーーティーーーーーーッッッ！！！」
line = "「い・い・加・減に・しやがれですわーっ！　ガトリングゥ、パーーーーティーーーーーーッッッ！！！」"

[[dialogue]]
speaker = "モンスター"
# 「グェエエエエエ……」
line = "「グェエエエエエ……」"

[[dialogue]]
speaker = "ヒマワリ"
# 「ミウ、このプラン、いくらなんでも血も涙もなさすぎだったんじゃない？」
line = "「ミウ、このプラン、いくらなんでも血も涙もなさすぎだったんじゃない？」"

[[dialogue]]
speaker = "ミウ"
# 「そういうヒマワリちゃんも、結構ノリノリでやってたよね？」
line = "「そういうヒマワリちゃんも、結構ノリノリでやってたよね？」"

[[dialogue]]
speaker = "ヒマワリ"
# 「てへぺろ☆」
line = "「てへぺろ☆」"

[[dialogue]]
speaker = "セナリィ"
# 「はぁ、はぁ、はぁっ……やっと……倒せましたわ……今までで最も手ごわい相手でした……二度とやり合いたくはないですわね……」
line = "「はぁ、はぁ、はぁっ……やっと……倒せましたわ……今までで最も手ごわい相手でした……二度とやり合いたくはないですわね……」"

[[dialogue]]
speaker = "セナリィ"
# 「でも、きっと……第二、第三の新モンスターが現れる……奴らの全てを滅ぼすその時まで、私は膝をつくことは許されませんわ……」
line = "「でも、きっと……第二、第三の新モンスターが現れる……奴らの全てを滅ぼすその時まで、私は膝をつくことは許されませんわ……」"

[[dialogue]]
speaker = "ヒマワリ"
# 「社長、ご無事でー！」
line = "「社長、ご無事でー！」"

[[dialogue]]
speaker = "ミウ"
# 「絶対に勝つと信じてましたっ！」
line = "「絶対に勝つと信じてましたっ！」"

[[dialogue]]
speaker = "セナリィ"
# 「ヒマワリ！　ミウ！　あなたたちねぇ！　もうちょっとマシなプランはなかったんですの！？」
line = "「ヒマワリ！　ミウ！　あなたたちねぇ！　もうちょっとマシなプランはなかったんですの！？」"

[[dialogue]]
speaker = "ミウ"
# 「あれが私たちにできる唯一のプランだったんです。ぶっつけ本番だったから、成功するかも五分五分だったんです」
line = "「あれが私たちにできる唯一のプランだったんです。ぶっつけ本番だったから、成功するかも五分五分だったんです」"

[[dialogue]]
speaker = "ヒマワリ"
# 「でも、できましたね！　社長の大活躍が見られて最高でした！　今日も格好良かったよー！」
line = "「でも、できましたね！　社長の大活躍が見られて最高でした！　今日も格好良かったよー！」"

[[dialogue]]
speaker = "セナリィ"
# 「まったく……！　まあ、敵は殲滅しましたし、<ruby=エンプレス>女帝</ruby>フォームのデータもたくさん取れましたし、結果オーライということで」
line = "「まったく……！　まあ、敵は殲滅しましたし、<ruby>女帝<rt>エンプレス</rt></ruby>フォームのデータもたくさん取れましたし、結果オーライということで」"

[[dialogue]]
speaker = "セナリィ"
# 「ゴールデングース、凱旋ですわよ」
line = "「ゴールデングース、凱旋ですわよ」"

[[dialogue]]
speaker = "ミウ＆ヒマワリ"
# 「了解っ！」
line = "「了解っ！」"
