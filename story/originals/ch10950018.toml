line = "「なんかそんなに疲れてないっていうか……むしろ、まだまだ元気、かも……？」"

[[dialogue]]
speaker = "シズハ"
# 「聖杯ちゃんが絶好調っていうか……えっと、つまり……」
line = "「聖杯ちゃんが絶好調っていうか……えっと、つまり……」"

[[dialogue]]
speaker = "シズハ"
# 「私もまだまだ頑張れるっていうか……その……」
line = "「私もまだまだ頑張れるっていうか……その……」"

[[dialogue]]
speaker = "シズハ"
# 「会長は……どう、かな？」
line = "「会長は……どう、かな？」"

[[dialogue]]
speaker = "unk"
# 自制しようと思っていたのに、可愛い上目遣いでそんな風に言われたら、我慢できるはずもなく――
line = "自制しようと思っていたのに、可愛い上目遣いでそんな風に言われたら、我慢できるはずもなく――"

[[dialogue]]
speaker = "シズハ"
# 「あっ……会長……<emoji=heart04>　ふあぁぁっ<emoji=heart04>」
line = "「あっ……会長……<emoji=heart04>　ふあぁぁっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# その後も聖杯の力を言い訳にしつつ、俺たちは何度も体を重ね続けてしまうのだった――
line = "その後も聖杯の力を言い訳にしつつ、俺たちは何度も体を重ね続けてしまうのだった――"
