[[dialogue]]
speaker = "unk"
# 第１話,学園の偵察だ,P
line = "第１話,学園の偵察だ,P"

[[dialogue]]
speaker = "セドナ"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# セドナさん？
line = "セドナさん？"

[[dialogue]]
speaker = "unk"
# あれは……
line = "あれは……"

[[dialogue]]
speaker = "セドナ"
# 「──貴様か。何、たまたま近くを通りかかったものでな。どんなものかと様子を見に来たまで」
line = "「──貴様か。何、たまたま近くを通りかかったものでな。どんなものかと様子を見に来たまで」"

[[dialogue]]
speaker = "セドナ"
# 「そう警戒するな。心配せずともすぐに立ち去るさ」
line = "「そう警戒するな。心配せずともすぐに立ち去るさ」"

[[dialogue]]
speaker = "セドナ"
# 「……何？　中を見学してみないか、だと？　それは……どういう了見なのだ」
line = "「……何？　中を見学してみないか、だと？　それは……どういう了見なのだ」"

[[dialogue]]
speaker = "unk"
# 仲間になれるなら越したことはない
line = "仲間になれるなら越したことはない"

[[dialogue]]
speaker = "unk"
# 同じ志の間柄ですから
line = "同じ志の間柄ですから"

[[dialogue]]
speaker = "セドナ"
# 「フ……確かに。我々『ネビュラ』と貴様ら学園はともに対リクリエを祈る組織同士。何も間違ってはいないな」
line = "「フ……確かに。我々『ネビュラ』と貴様ら学園はともに対リクリエを祈る組織同士。何も間違ってはいないな」"

[[dialogue]]
speaker = "セドナ"
# 「いいだろう。以前より、一度はこの目で確認したいと思っていた──貴様が隣にいるなら文句はあるまい。ゆくぞ」
line = "「いいだろう。以前より、一度はこの目で確認したいと思っていた──貴様が隣にいるなら文句はあるまい。ゆくぞ」"

[[dialogue]]
speaker = "ザコモンスター"
# 「ウィイーッ」
line = "「ウィイーッ」"

[[dialogue]]
speaker = "セドナ"
# 「ふむ……なるほどな。仮想モンスターのスイッチ、トライアルスコアの表示──実践訓練の機能面は充実しているようだ」
line = "「ふむ……なるほどな。仮想モンスターのスイッチ、トライアルスコアの表示──実践訓練の機能面は充実しているようだ」"

[[dialogue]]
speaker = "セドナ"
# 「……ん？　なんだ貴様、鳩が豆鉄砲を食ったような顔をして」
line = "「……ん？　なんだ貴様、鳩が豆鉄砲を食ったような顔をして」"

[[dialogue]]
speaker = "unk"
# なんでここ？
line = "なんでここ？"

[[dialogue]]
speaker = "セドナ"
# 「星騎士として研鑽を積んでいる場を視察するのは当然だろう。むしろ、他にどこを見学するというんだ？」
line = "「星騎士として研鑽を積んでいる場を視察するのは当然だろう。むしろ、他にどこを見学するというんだ？」"

[[dialogue]]
speaker = "セドナ"
# 「放課後……？　部活……？　弛んでいる。そのような甘えた学生気分で、世界の終わりに抗えると思うな」
line = "「放課後……？　部活……？　弛んでいる。そのような甘えた学生気分で、世界の終わりに抗えると思うな」"

[[dialogue]]
speaker = "unk"
# ストイックですね……
line = "ストイックですね……"

[[dialogue]]
speaker = "unk"
# 学生ですから……
line = "学生ですから……"

[[dialogue]]
speaker = "セドナ"
# 「全く腑抜けたことを。むしろ貴様を、一度ネビュラの訓練に招待したくなってきたぞ」
line = "「全く腑抜けたことを。むしろ貴様を、一度ネビュラの訓練に招待したくなってきたぞ」"

[[dialogue]]
speaker = "セドナ"
# 「まあいい。次は姉妹校の様子を見せてもらおうか。我々としても、情報はあればあるほどいい」
line = "「まあいい。次は姉妹校の様子を見せてもらおうか。我々としても、情報はあればあるほどいい」"

[[dialogue]]
speaker = "セドナ"
# 「む──さすがに姉妹校の中までは連れていけない？　ふむ。それもそうか」
line = "「む──さすがに姉妹校の中までは連れていけない？　ふむ。それもそうか」"

[[dialogue]]
speaker = "セドナ"
# 「なればそろそろ戻るとするか。いい加減、油を売っているわけにも──」
line = "「なればそろそろ戻るとするか。いい加減、油を売っているわけにも──」"

[[dialogue]]
speaker = "セーラ"
# 「……あれ？　そこにいんの、ネビュラのお偉いさんじゃね？」
line = "「……あれ？　そこにいんの、ネビュラのお偉いさんじゃね？」"

[[dialogue]]
speaker = "ルリエル"
# 「おおっ、どこかで見たと思えば！　新星会長さんと一緒にいらっしゃいますね？」
line = "「おおっ、どこかで見たと思えば！　新星会長さんと一緒にいらっしゃいますね？」"

[[dialogue]]
speaker = "セドナ"
# 「む──貴様らは確か、こちらの星徒会人員か」
line = "「む──貴様らは確か、こちらの星徒会人員か」"

[[dialogue]]
speaker = "ルリエル"
# 「さようです！　そだ、せっかくですからお２人も我々のクレープ祭りにお誘いしましょう！」
line = "「さようです！　そだ、せっかくですからお２人も我々のクレープ祭りにお誘いしましょう！」"

[[dialogue]]
speaker = "セーラ"
# 「おー、グッドアイディア。まー祭りって言ってもただの買い食いなんだけど」
line = "「おー、グッドアイディア。まー祭りって言ってもただの買い食いなんだけど」"

[[dialogue]]
speaker = "セドナ"
# 「か、買い食いだと？　そんなもの私が付き合うわけ──ってなんで貴様は乗り気なのだ！？」
line = "「か、買い食いだと？　そんなもの私が付き合うわけ──ってなんで貴様は乗り気なのだ！？」"

[[dialogue]]
speaker = "unk"
# 郷に入りては郷に従えですよ
line = "郷に入りては郷に従えですよ"

[[dialogue]]
speaker = "セーラ"
# 「そーそー。今日はせっかく長閑な昼下がりなんだしさあ、平和はキョージュしないと損ってもんじゃん？」
line = "「そーそー。今日はせっかく長閑な昼下がりなんだしさあ、平和はキョージュしないと損ってもんじゃん？」"

[[dialogue]]
speaker = "セドナ"
# 「む、むう……！？　ま、待て。わかったから腕を組もうとするな──！」
line = "「む、むう……！？　ま、待て。わかったから腕を組もうとするな──！」"

[[dialogue]]
speaker = "ルリエル"
# 「──いやー絶品ですね！　このチョコシナモンマウンテンクレープは！　長時間並んだ甲斐があったというものです！」
line = "「──いやー絶品ですね！　このチョコシナモンマウンテンクレープは！　長時間並んだ甲斐があったというものです！」"

[[dialogue]]
speaker = "セドナ"
# 「あ、ああ……悪くはないな。この手のものは初めてだが……」
line = "「あ、ああ……悪くはないな。この手のものは初めてだが……」"

[[dialogue]]
speaker = "セーラ"
# 「ネビュラさんはツナとレタスでお食事系だったけど、それで良かったん？」
line = "「ネビュラさんはツナとレタスでお食事系だったけど、それで良かったん？」"

[[dialogue]]
speaker = "セドナ"
# 「セドナと呼べ。甘いものはあまり得意でなくてな──こちらの方が舌に合う」
line = "「セドナと呼べ。甘いものはあまり得意でなくてな──こちらの方が舌に合う」"

[[dialogue]]
speaker = "セドナ"
# 「にしても、この……立ったまま食事を行うというのは。どうにも粗相をしているようで、落ち着かんな……」
line = "「にしても、この……立ったまま食事を行うというのは。どうにも粗相をしているようで、落ち着かんな……」"

[[dialogue]]
speaker = "ルリエル"
# 「あはは！　すぐに慣れますよぉ、これが醍醐味というものなのです！」
line = "「あはは！　すぐに慣れますよぉ、これが醍醐味というものなのです！」"

[[dialogue]]
speaker = "unk"
# 学園生活を体験してもらえて何より
line = "学園生活を体験してもらえて何より"

[[dialogue]]
speaker = "セドナ"
# 「………………は！」
line = "「………………は！」"

[[dialogue]]
speaker = "セドナ"
# （わ……私は何をしているんだ！　星騎士どもの様子を軽くうかがう予定だったのに──気づけばこんな学生と一緒に戯れて）
line = "（わ……私は何をしているんだ！　星騎士どもの様子を軽くうかがう予定だったのに──気づけばこんな学生と一緒に戯れて）"

[[dialogue]]
speaker = "セドナ"
# （今に帰ろう。私はこんな甘ちゃんどもとは違う──基地に戻って部下を指揮せねばならない……！）
line = "（今に帰ろう。私はこんな甘ちゃんどもとは違う──基地に戻って部下を指揮せねばならない……！）"

[[dialogue]]
speaker = "リーリア"
# 「もーお腹ペコペコ！　ここの新作のためにお昼抜いてきちゃったしー、やっぱ学生生活といえば放課後買い食いだよねー♪」
line = "「もーお腹ペコペコ！　ここの新作のためにお昼抜いてきちゃったしー、やっぱ学生生活といえば放課後買い食いだよねー♪」"

[[dialogue]]
speaker = "リーリア"
# 「え？」
line = "「え？」"

[[dialogue]]
speaker = "セドナ"
# 「あ」
line = "「あ」"

[[dialogue]]
speaker = "リーリア"
# （え……じょ、上官？　クレープ片手に？　ていうかセンパイと流星の子まで一緒にいるし何コレどういう状況？）
line = "（え……じょ、上官？　クレープ片手に？　ていうかセンパイと流星の子まで一緒にいるし何コレどういう状況？）"

[[dialogue]]
speaker = "セドナ"
# （ま、待て──と声をかけるのもまずい。しかし、このままでは私のメンツが……！）
line = "（ま、待て──と声をかけるのもまずい。しかし、このままでは私のメンツが……！）"

[[dialogue]]
speaker = "unk"
# どういう関係……？
line = "どういう関係……？"

[[dialogue]]
speaker = "unk"
# ２人とも……？
line = "２人とも……？"

[[dialogue]]
speaker = "リーリア"
# 「よ、よくわかんないけどお邪魔しました──！」
line = "「よ、よくわかんないけどお邪魔しました──！」"

[[dialogue]]
speaker = "セドナ"
# 「あ──ま、待てっ！」
line = "「あ──ま、待てっ！」"

[[dialogue]]
speaker = "ルリエル"
# 「……？　今のお方は……？」
line = "「……？　今のお方は……？」"

[[dialogue]]
speaker = "セドナ"
# 「いや……なんでもない。なんでも……ない、さ…………」
line = "「いや……なんでもない。なんでも……ない、さ…………」"
