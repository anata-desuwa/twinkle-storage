[[dialogue]]
speaker = "unk"
# 第４話,ラファエロの素顔？,P
line = "第４話,ラファエロの素顔？,P"

[[dialogue]]
speaker = "unk"
# ＳＮＳアカウントは抹消したものの、そこにいるだけで圧倒的な存在感を放つラファエロは、相変わらずの人気者ぶりだった。
line = "ＳＮＳアカウントは抹消したものの、そこにいるだけで圧倒的な存在感を放つラファエロは、相変わらずの人気者ぶりだった。"

[[dialogue]]
speaker = "unk"
# しかし、彼女が元の世界へ戻る時は確実に近づいている。
line = "しかし、彼女が元の世界へ戻る時は確実に近づいている。"

[[dialogue]]
speaker = "ラファエロ"
# 「ふむ。さすがはぼく、ＳＮＳをやめても人気は相変わらずだ」
line = "「ふむ。さすがはぼく、ＳＮＳをやめても人気は相変わらずだ」"

[[dialogue]]
speaker = "ラファエロ"
# 「街を歩けば声をかけられ、握手やサインを求められる。向こうと変わらない人気者の証明だね」
line = "「街を歩けば声をかけられ、握手やサインを求められる。向こうと変わらない人気者の証明だね」"

[[dialogue]]
speaker = "ラファエロ"
# 「……うん、悪い気はしない」
line = "「……うん、悪い気はしない」"

[[dialogue]]
speaker = "ラファエロ"
# 「ぼくを慕ってくれる人がたくさんいるのは正直嬉しい。この地から離れるのが名残惜しくなってしまうくらいにね……」
line = "「ぼくを慕ってくれる人がたくさんいるのは正直嬉しい。この地から離れるのが名残惜しくなってしまうくらいにね……」"

[[dialogue]]
speaker = "ラファエロ"
# 「……彼らがぼくにＳＮＳをやめさせたのは、そういう理由もあったのかな？　心遣いに感謝しないとね」
line = "「……彼らがぼくにＳＮＳをやめさせたのは、そういう理由もあったのかな？　心遣いに感謝しないとね」"

[[dialogue]]
speaker = "ラファエロ"
# 「ぼくはもうすぐ元いた場所に帰るけれど……その前にひとつ、作品を残していこうかな」
line = "「ぼくはもうすぐ元いた場所に帰るけれど……その前にひとつ、作品を残していこうかな」"

[[dialogue]]
speaker = "ラファエロ"
# 「ぼくの存在がこの世界から失われたとしても──誰もがぼくを忘れられなくなるような、とびっきりの」
line = "「ぼくの存在がこの世界から失われたとしても──誰もがぼくを忘れられなくなるような、とびっきりの」"

[[dialogue]]
speaker = "ラファエロ"
# 「流星市国にぼくという天才、ラファエロ・サーラが存在していた証を！」
line = "「流星市国にぼくという天才、ラファエロ・サーラが存在していた証を！」"

[[dialogue]]
speaker = "unk"
# 俺とルリエルが大聖堂を訪れると、ラファエロがいつになく真剣な眼差しで、一心不乱に手を動かしていた。
line = "俺とルリエルが大聖堂を訪れると、ラファエロがいつになく真剣な眼差しで、一心不乱に手を動かしていた。"

[[dialogue]]
speaker = "ルリエル"
# 「ラファエロさん、何してるん──わ、紙がいっぱいなのです！」
line = "「ラファエロさん、何してるん──わ、紙がいっぱいなのです！」"

[[dialogue]]
speaker = "ラファエロ"
# 「おっと、きみたちか。ぼくに会いに来てくれたのかい？」
line = "「おっと、きみたちか。ぼくに会いに来てくれたのかい？」"

[[dialogue]]
speaker = "unk"
# この大量の紙は……？
line = "この大量の紙は……？"

[[dialogue]]
speaker = "ラファエロ"
# 「ああ、これか。サプライズにしようと思っていたんだけど、これだけ広げていたらサプライズにはならないか」
line = "「ああ、これか。サプライズにしようと思っていたんだけど、これだけ広げていたらサプライズにはならないか」"

[[dialogue]]
speaker = "ラファエロ"
# 「この紙束は見ての通りのドローイング。線画だよ」
line = "「この紙束は見ての通りのドローイング。線画だよ」"

[[dialogue]]
speaker = "ルリエル"
# 「ドローイング、ですかぁ。あ。この絵は美味しそうなサンドイッチ、こっちは学園の校舎ですね！」
line = "「ドローイング、ですかぁ。あ。この絵は美味しそうなサンドイッチ、こっちは学園の校舎ですね！」"

[[dialogue]]
speaker = "ルリエル"
# 「こっちは会長さんとルリエルなのです。あ、流星学園や新星学園のみんなもいます！　みんなそっくりなのです！」
line = "「こっちは会長さんとルリエルなのです。あ、流星学園や新星学園のみんなもいます！　みんなそっくりなのです！」"

[[dialogue]]
speaker = "ラファエロ"
# 「こちらの世界で見てきたもの、出会ったもの、楽しかったものを片っ端から描き留めていたのさ。ここぞという時の作品の着想を得るためにね」
line = "「こちらの世界で見てきたもの、出会ったもの、楽しかったものを片っ端から描き留めていたのさ。ここぞという時の作品の着想を得るためにね」"

[[dialogue]]
speaker = "ルリエル"
# 「はわ～……ちゃんと準備されるんですね～……」
line = "「はわ～……ちゃんと準備されるんですね～……」"

[[dialogue]]
speaker = "ルリエル"
# 「しかも、このドローイングだけでもとってもお上手なのです。ルリエルが一生かかっても真似できる気がしません……」
line = "「しかも、このドローイングだけでもとってもお上手なのです。ルリエルが一生かかっても真似できる気がしません……」"

[[dialogue]]
speaker = "unk"
# 藝術家ってすごい……！
line = "藝術家ってすごい……！"

[[dialogue]]
speaker = "ラファエロ"
# 「感心するのはまだ早いよ。ぼくの作品はこれから出来上がるんだからね」
line = "「感心するのはまだ早いよ。ぼくの作品はこれから出来上がるんだからね」"

[[dialogue]]
speaker = "ルリエル"
# 「ラファエロさん、このバラバラのドローイングからは何を作っているのか、まったく想像できないのですが……何を描くつもりなのですか？」
line = "「ラファエロさん、このバラバラのドローイングからは何を作っているのか、まったく想像できないのですが……何を描くつもりなのですか？」"

[[dialogue]]
speaker = "ラファエロ"
# 「それはまだ秘密だよ。完成をお楽しみに」
line = "「それはまだ秘密だよ。完成をお楽しみに」"

[[dialogue]]
speaker = "ルリエル"
# 「早く見てみたいのです！　わくわく！」
line = "「早く見てみたいのです！　わくわく！」"

[[dialogue]]
speaker = "ラファエロ"
# 「ありがとう。天才として、その期待には応えなければいけないね」
line = "「ありがとう。天才として、その期待には応えなければいけないね」"

[[dialogue]]
speaker = "unk"
# だけどラファエロはいずれ元の世界に……
line = "だけどラファエロはいずれ元の世界に……"

[[dialogue]]
speaker = "ルリエル"
# 「あ……」
line = "「あ……」"

[[dialogue]]
speaker = "ラファエロ"
# 「もともと、ぼくは異邦人さ。いるべきでない者が消えるだけ。気にすることはないよ」
line = "「もともと、ぼくは異邦人さ。いるべきでない者が消えるだけ。気にすることはないよ」"

[[dialogue]]
speaker = "ラファエロ"
# 「それでも、自分のいた世界に足跡を残したいと思ってしまう。ちょっとしたわがままに付き合ってほしいな」
line = "「それでも、自分のいた世界に足跡を残したいと思ってしまう。ちょっとしたわがままに付き合ってほしいな」"

[[dialogue]]
speaker = "unk"
# それはわがままじゃないと思う
line = "それはわがままじゃないと思う"

[[dialogue]]
speaker = "ラファエロ"
# 「──そうか。そうだね。言い換えよう」
line = "「──そうか。そうだね。言い換えよう」"

[[dialogue]]
speaker = "ラファエロ"
# 「この世界に作品を残したい──これは藝術家としてのサガなのさ」
line = "「この世界に作品を残したい──これは藝術家としてのサガなのさ」"

[[dialogue]]
speaker = "ラファエロ"
# 「ぼくがここで生きていた証を、きみたちに見届けてほしい」
line = "「ぼくがここで生きていた証を、きみたちに見届けてほしい」"

[[dialogue]]
speaker = "ルリエル"
# 「もちろんです！」
line = "「もちろんです！」"

[[dialogue]]
speaker = "ラファエロ"
# 「──とはいえ、天才たるぼくの大作だからね。一朝一夕にできあがるものではない」
line = "「──とはいえ、天才たるぼくの大作だからね。一朝一夕にできあがるものではない」"

[[dialogue]]
speaker = "ラファエロ"
# 「もうしばらく、こちらにお邪魔させてもらうとするよ。最高の作品を作り上げると、きみたちの女神様にも誓おう」
line = "「もうしばらく、こちらにお邪魔させてもらうとするよ。最高の作品を作り上げると、きみたちの女神様にも誓おう」"

[[dialogue]]
speaker = "ラファエロ"
# 「期待は決して裏切らない──いや、軽く飛び越えてみせるとも！」
line = "「期待は決して裏切らない──いや、軽く飛び越えてみせるとも！」"

[[dialogue]]
speaker = "unk"
# あれからしばくして、ベア子たちから連絡がきた翌日の早朝──
line = "あれからしばくして、ベア子たちから連絡がきた翌日の早朝──"

[[dialogue]]
speaker = "unk"
# どうやら徹夜をしていた様子のラファエロが、星徒会室を訪ねてきた。
line = "どうやら徹夜をしていた様子のラファエロが、星徒会室を訪ねてきた。"

[[dialogue]]
speaker = "ラファエロ"
# 「ぼくが手掛けていた作品が完成したんだ。大聖堂に置かせてもらっているから、後で見に行ってくれるかい？」
line = "「ぼくが手掛けていた作品が完成したんだ。大聖堂に置かせてもらっているから、後で見に行ってくれるかい？」"

[[dialogue]]
speaker = "unk"
# ああ、絶対に見に行くよ
line = "ああ、絶対に見に行くよ"

[[dialogue]]
speaker = "ラファエロ"
# 「ベア子たちから連絡も来たし、作品も完成したし、そろそろお別れの時間かな」
line = "「ベア子たちから連絡も来たし、作品も完成したし、そろそろお別れの時間かな」"

[[dialogue]]
speaker = "ラファエロ"
# 「きみたちもぼくにとって大切な人となったけど、向こうにもかけがえのない人たちがいるからね」
line = "「きみたちもぼくにとって大切な人となったけど、向こうにもかけがえのない人たちがいるからね」"

[[dialogue]]
speaker = "ラファエロ"
# 「首を長くして、ぼくの帰りを待っているだろうし……これ以上長居していたら、こちらの世界が愛おしくなって、もっと離れ難くなってしまうからね」
line = "「首を長くして、ぼくの帰りを待っているだろうし……これ以上長居していたら、こちらの世界が愛おしくなって、もっと離れ難くなってしまうからね」"

[[dialogue]]
speaker = "ラファエロ"
# 「短い間だったけど、きみたちと過ごした日々は忘れないよ」
line = "「短い間だったけど、きみたちと過ごした日々は忘れないよ」"

[[dialogue]]
speaker = "unk"
# ありがとう、ラファエロ
line = "ありがとう、ラファエロ"

[[dialogue]]
speaker = "ラファエロ"
# 「さようならは言わないよ。また会おう。そして──」
line = "「さようならは言わないよ。また会おう。そして──」"

[[dialogue]]
speaker = "ラファエロ"
# 「──ありがとう、勇ましき星騎士たち！」
line = "「──ありがとう、勇ましき星騎士たち！」"

[[dialogue]]
speaker = "unk"
# そしてラファエロたち異世界からの来訪者は、元の世界へと帰っていった。
line = "そしてラファエロたち異世界からの来訪者は、元の世界へと帰っていった。"

[[dialogue]]
speaker = "unk"
# 大聖堂には１枚の絵画が掲げられている。
line = "大聖堂には１枚の絵画が掲げられている。"

[[dialogue]]
speaker = "unk"
# 題は『悪しきを倒す星騎士』。
line = "題は『悪しきを倒す星騎士』。"

[[dialogue]]
speaker = "unk"
# アテネスからやってきた天才藝術家は、宣言通りに大きな足跡を残していったのだった。
line = "アテネスからやってきた天才藝術家は、宣言通りに大きな足跡を残していったのだった。"
