[[dialogue]]
speaker = "unk"
# 第８話,天使のきざはし,B
line = "第８話,天使のきざはし,B"

[[dialogue]]
speaker = "アポロ"
# 「ふん……こんな壁は、壊せばいいだけだ。どいつもこいつも小賢しい」
line = "「ふん……こんな壁は、壊せばいいだけだ。どいつもこいつも小賢しい」"

[[dialogue]]
speaker = "アポロ"
# 「やはり一度、思い知らせなきゃならないようだな……！」
line = "「やはり一度、思い知らせなきゃならないようだな……！」"

[[dialogue]]
speaker = "クロト"
# 「仮面から<ruby=あお>碧</ruby>色の炎──あれは……」
line = "「仮面から<ruby>碧<rt>あお</rt></ruby>色の炎──あれは……」"

[[dialogue]]
speaker = "unk"
# アポロの仮面へ向かって、天から碧色のオーラが吸収されていた。
line = "アポロの仮面へ向かって、天から碧色のオーラが吸収されていた。"

[[dialogue]]
speaker = "unk"
# その様子を見て俺は彼の最期を思い出す──
line = "その様子を見て俺は彼の最期を思い出す──"

[[dialogue]]
speaker = "セイファート"
# 「ああ、そうだ……最後に伝えておこう。少年」
line = "「ああ、そうだ……最後に伝えておこう。少年」"

[[dialogue]]
speaker = "セイファート"
# 「妻を操っていた使徒の仮面……あれには、休息の瞬間がある」
line = "「妻を操っていた使徒の仮面……あれには、休息の瞬間がある」"

[[dialogue]]
speaker = "クロト"
# 「休息──だって……？」
line = "「休息──だって……？」"

[[dialogue]]
speaker = "セイファート"
# 「リクリエが根源とはいえ……常に活動を続けられるわけではない。宇宙から、絶えず力を補給している」
line = "「リクリエが根源とはいえ……常に活動を続けられるわけではない。宇宙から、絶えず力を補給している」"

[[dialogue]]
speaker = "セイファート"
# 「その信号こそが……<ruby=あお>碧</ruby>色のオーラだ。私は……戦い疲れた妻が、何度もそうするのを見た」
line = "「その信号こそが……<ruby>碧<rt>あお</rt></ruby>色のオーラだ。私は……戦い疲れた妻が、何度もそうするのを見た」"

[[dialogue]]
speaker = "クロト"
# 「リクリエのエネルギーは無尽蔵じゃない──アポロは今、新たに宇宙から力をたくわえている」
line = "「リクリエのエネルギーは無尽蔵じゃない──アポロは今、新たに宇宙から力をたくわえている」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あれ、充電中ってことね……！？」
line = "「あれ、充電中ってことね……！？」"

[[dialogue]]
speaker = "アナ"
# 「グレート・ウォールの内部で力を限りなく発散させたことで──ガス欠になっているのでしょう」
line = "「グレート・ウォールの内部で力を限りなく発散させたことで──ガス欠になっているのでしょう」"

[[dialogue]]
speaker = "アポロ"
# 「だったらなんだ？　あたしはもっと強くなる。オマエたちなんかヨユーで消し飛ばせるくらいの力をもらってるんだ」
line = "「だったらなんだ？　あたしはもっと強くなる。オマエたちなんかヨユーで消し飛ばせるくらいの力をもらってるんだ」"

[[dialogue]]
speaker = "unk"
# 確かにこれは危機だ。
line = "確かにこれは危機だ。"

[[dialogue]]
speaker = "unk"
# でも、もし、この局面さえ凌げれば──アポロを枯渇させるチャンスでもある。
line = "でも、もし、この局面さえ凌げれば──アポロを枯渇させるチャンスでもある。"

[[dialogue]]
speaker = "クロト"
# 「なら──やることはひとつ、だな」
line = "「なら──やることはひとつ、だな」"

[[dialogue]]
speaker = "アポロ"
# 「……！　なんだ──？」
line = "「……！　なんだ──？」"

[[dialogue]]
speaker = "unk"
# 退路も断たれた結界の内部。対峙するのはリクリエの化身と化した少女。
line = "退路も断たれた結界の内部。対峙するのはリクリエの化身と化した少女。"

[[dialogue]]
speaker = "unk"
# もはや、出し惜しみする理由はどこにもない。
line = "もはや、出し惜しみする理由はどこにもない。"

[[dialogue]]
speaker = "クロト"
# 「外に被害が及ぶ心配はない──なら、アポロに宿るエネルギーをすべて、<b>使い果たさせる</b>ことだって可能なはずだ」
line = "「外に被害が及ぶ心配はない──なら、アポロに宿るエネルギーをすべて、<b>使い果たさせる</b>ことだって可能なはずだ」"

[[dialogue]]
speaker = "マトイ"
# 「！」
line = "「！」"

[[dialogue]]
speaker = "セーラ"
# 「うちらが<ruby=も>保</ruby>つ限り……だね」
line = "「うちらが<ruby>保<rt>も</rt></ruby>つ限り……だね」"

[[dialogue]]
speaker = "ユウリ"
# 「保たせるさ。血反吐吐いてもな」
line = "「保たせるさ。血反吐吐いてもな」"

[[dialogue]]
speaker = "ヴィーナス"
# 「必ずあの仮面からアポロを解き放って──お姉さんを取り戻すわよ！　ついでにリクリエもやっつけちゃうんだから！」
line = "「必ずあの仮面からアポロを解き放って──お姉さんを取り戻すわよ！　ついでにリクリエもやっつけちゃうんだから！」"

[[dialogue]]
speaker = "unk"
# 一致団結。俺たちの覚悟はとうに決した。
line = "一致団結。俺たちの覚悟はとうに決した。"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
# 「ありがとうございます──皆さん。私も、それに応えます」
line = "「ありがとうございます──皆さん。私も、それに応えます」"

[[dialogue]]
speaker = "unk"
# フィオナの全身が照り輝く。そして、日輪が祈りに応えた。
line = "フィオナの全身が照り輝く。そして、日輪が祈りに応えた。"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
# 「──アポロニア・レイ──」
line = "「──アポロニア・レイ──」"

[[dialogue]]
speaker = "unk"
# 天上の雲間から──放射状の光が差し込んだ。
line = "天上の雲間から──放射状の光が差し込んだ。"

[[dialogue]]
speaker = "unk"
# それは、今までありえなかった、天使の階段とも呼ばれる太陽の兆し──
line = "それは、今までありえなかった、天使の階段とも呼ばれる太陽の兆し──"

[[dialogue]]
speaker = "アナ"
# 「天蓋に裂け目が生じています……！　これなら、星とのリンクも元通りになるかもしれません──！」
line = "「天蓋に裂け目が生じています……！　これなら、星とのリンクも元通りになるかもしれません──！」"

[[dialogue]]
speaker = "ルリエル"
# 「本当です──！　むしろ、いつもより力が湧いてくるような……！」
line = "「本当です──！　むしろ、いつもより力が湧いてくるような……！」"

[[dialogue]]
speaker = "クロト"
# 「ああ──俺たちにまで熱さが<ruby=たぎ>滾</ruby>ってくる」
line = "「ああ──俺たちにまで熱さが<ruby>滾<rt>たぎ</rt></ruby>ってくる」"

[[dialogue]]
speaker = "ユウリ"
# 「へへっ、気持ちいいじゃねーか──ハートまでガツンとくるっつうか」
line = "「へへっ、気持ちいいじゃねーか──ハートまでガツンとくるっつうか」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それが……フィオナの力なのね」
line = "「それが……フィオナの力なのね」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
# 「ええ。私と太陽の熱量は……地上にいる者すべてを逃しません」
line = "「ええ。私と太陽の熱量は……地上にいる者すべてを逃しません」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
# 「私の灼熱で──あなたの心の鎧を脱がせてみせます。姉さん」
line = "「私の灼熱で──あなたの心の鎧を脱がせてみせます。姉さん」"

[[dialogue]]
speaker = "アポロ"
# 「ちっ……なんだこの──熱さは。ああ、鬱陶しい……」
line = "「ちっ……なんだこの──熱さは。ああ、鬱陶しい……」"

[[dialogue]]
speaker = "unk"
# グレート・ウォールの内部に広がっていく灼熱。
line = "グレート・ウォールの内部に広がっていく灼熱。"

[[dialogue]]
speaker = "unk"
# 俺たちにとっては心地よい温もりだった。
line = "俺たちにとっては心地よい温もりだった。"

[[dialogue]]
speaker = "unk"
# けれど相対するアポロはまるで、蒸し焼きにされたかのような疲弊を感じていた。
line = "けれど相対するアポロはまるで、蒸し焼きにされたかのような疲弊を感じていた。"

[[dialogue]]
speaker = "unk"
# この熱さはいわば──フィオナが姉を想うことによって生じる、情熱的な告白の顕現。
line = "この熱さはいわば──フィオナが姉を想うことによって生じる、情熱的な告白の顕現。"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
# 「──すぅっ」
line = "「──すぅっ」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
# 「『正義は太陽と共にある』」
line = "「『正義は太陽と共にある』」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
# 「『よこしまな悪党はまとめて全部──私の光で救ってみせよう』
line = "「『よこしまな悪党はまとめて全部──私の光で救ってみせよう』"

[[dialogue]]
speaker = "アポロ"
# 「！」
line = "「！」"

[[dialogue]]
speaker = "アポロ"
# 「その……セリフは……」
line = "「その……セリフは……」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
# 「ふふ。見せ場を取ってしまったでしょうか」
line = "「ふふ。見せ場を取ってしまったでしょうか」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
# 「いずれにせよこれで──最終話です。姉さん。共に、ハッピーエンドを迎えましょう！」
line = "「いずれにせよこれで──最終話です。姉さん。共に、ハッピーエンドを迎えましょう！」"
