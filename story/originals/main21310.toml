[[dialogue]]
speaker = "煌嶺"
# 「そういえば、あなたがチナちゃんなんだね♪　新星の学園長からは色々聞いてるよ～」
line = "「そういえば、あなたがチナちゃんなんだね♪　新星の学園長からは色々聞いてるよ～」"

[[dialogue]]
