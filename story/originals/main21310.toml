line = "「あ～♪　魔王さんご一行だ～、いらっしゃーい♪　肉肉飯店へようこそ♪」"

[[dialogue]]
speaker = "チナ"
# 「あ。のぼりに写ってる女だ……キャンペーンガールかなんかか？」
line = "「あ。のぼりに写ってる女だ……キャンペーンガールかなんかか？」"

[[dialogue]]
speaker = "煌嶺"
# 「ううん、ただのスポンサーだよ～♪　みんなじゃんじゃん買っていってね～♪」
line = "「ううん、ただのスポンサーだよ～♪　みんなじゃんじゃん買っていってね～♪」"

[[dialogue]]
speaker = "クロト"
