[[dialogue]]
speaker = "unk"
# 第１０話,肉肉飯店にて,B
line = "第１０話,肉肉飯店にて,B"

[[dialogue]]
speaker = "unk"
# レティシアの脱走事件から数日──俺はその日、アナと共にチナの外出に同伴していた。
line = "レティシアの脱走事件から数日──俺はその日、アナと共にチナの外出に同伴していた。"

[[dialogue]]
speaker = "チナ"
# 「……いったいどんな手品を使ったんだ？　あのレティシアが、アタシたち以外に心を開くだなんて」
line = "「……いったいどんな手品を使ったんだ？　あのレティシアが、アタシたち以外に心を開くだなんて」"

[[dialogue]]
speaker = "アナ"
# 「会長たちの必死の説得が実を結んだ……と言いたいところですが」
line = "「会長たちの必死の説得が実を結んだ……と言いたいところですが」"

[[dialogue]]
speaker = "クロト"
# 「心の底から信用はされてないよ。一時的な協力関係を承知してもらっただけだ」
line = "「心の底から信用はされてないよ。一時的な協力関係を承知してもらっただけだ」"

[[dialogue]]
speaker = "チナ"
# 「いや、それでもよっぽどだよ。あのレティシアがなあ……本当に意外だ」
line = "「いや、それでもよっぽどだよ。あのレティシアがなあ……本当に意外だ」"

[[dialogue]]
speaker = "アナ"
# 「意外というなら、チナさんが今日までまったくと言っていいほど外出したがらなかったのも驚きです」
line = "「意外というなら、チナさんが今日までまったくと言っていいほど外出したがらなかったのも驚きです」"

[[dialogue]]
speaker = "アナ"
# 「グレイスさんほどでなくとも、あなたもアクティブなタイプかと思っていましたが」
line = "「グレイスさんほどでなくとも、あなたもアクティブなタイプかと思っていましたが」"

[[dialogue]]
speaker = "チナ"
# 「……もしかしたら滅ぼすかもしれない街なんて、歩きたくないだろ。グレイスは単純でいいよな」
line = "「……もしかしたら滅ぼすかもしれない街なんて、歩きたくないだろ。グレイスは単純でいいよな」"

[[dialogue]]
speaker = "unk"
# チナはずっと『デネブのために真実を確かめる』というスタンスを保っている。
line = "チナはずっと『デネブのために真実を確かめる』というスタンスを保っている。"

[[dialogue]]
speaker = "unk"
# そしてルヴィネの言葉次第では俺たちと敵対もするだろうと、はっきりと伝えられた。
line = "そしてルヴィネの言葉次第では俺たちと敵対もするだろうと、はっきりと伝えられた。"

[[dialogue]]
speaker = "unk"
# だからこそ『ルヴィネの死』という未来を視た件も、伝えるのは慎重を期す必要があると思い……未だに言い出せていない。
line = "だからこそ『ルヴィネの死』という未来を視た件も、伝えるのは慎重を期す必要があると思い……未だに言い出せていない。"

[[dialogue]]
speaker = "アナ"
# 「でも今日はお出かけする気分になった、と」
line = "「でも今日はお出かけする気分になった、と」"

[[dialogue]]
speaker = "チナ"
# 「たまには外の空気も吸わないとってだけだよ。<ruby=ふるさと>故郷</ruby>の味も気になるしな！」
line = "「たまには外の空気も吸わないとってだけだよ。<ruby>故郷<rt>ふるさと</rt></ruby>の味も気になるしな！」"

[[dialogue]]
speaker = "アナ"
# 「到着しました、<ruby=ローローハンテン>肉肉飯店</ruby>。和菓子以外のお店には私も詳しくないので、今から楽しみです。じゅるり」
line = "「到着しました、<ruby>肉肉飯店<rt>ローローハンテン</rt></ruby>。和菓子以外のお店には私も詳しくないので、今から楽しみです。じゅるり」"

[[dialogue]]
speaker = "チナ"
# 「ここは一味も二味も違うからな……って？　な、なんだこれ！？　アタシの知ってる肉肉飯店と全然ちがうぞ……！？」
line = "「ここは一味も二味も違うからな……って？　な、なんだこれ！？　アタシの知ってる肉肉飯店と全然ちがうぞ……！？」"

[[dialogue]]
speaker = "チナ"
# 「なんか魔族の女がプリントされたのぼりがあるし……店も二回りくらいでかいし……えぇえぇ……？」
line = "「なんか魔族の女がプリントされたのぼりがあるし……店も二回りくらいでかいし……えぇえぇ……？」"

[[dialogue]]
speaker = "煌嶺"
