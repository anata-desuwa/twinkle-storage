line = "「だから煌嶺、あなたも戦う準備をしておいてくれ。俺たちは必ず、全員で『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』と<ruby>相対<rt>あいたい</rt></ruby>することになる」"

