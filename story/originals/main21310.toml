line = "「店長が作った新作の肉まん、す～っごく美味しかったから。この前さらに資金援助してあげたんだ～♪　このまま流星市国１のお店になってもらおうって♪」"

[[dialogue]]
speaker = "チナ"
# 「アタシの思い出の店が……どんどん変わっていく……」
line = "「アタシの思い出の店が……どんどん変わっていく……」"

[[dialogue]]
speaker = "チナ"
