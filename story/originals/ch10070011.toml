[[dialogue]]
speaker = "unk"
# ピンボールのように弾かれて向こうに……
line = "ピンボールのように弾かれて向こうに……"

[[dialogue]]
speaker = "セーラ"
# 「え～っ、そんなんあるっ！？　あはははっ！　もう面白くなってきた、お腹痛い……」
line = "「え～っ、そんなんあるっ！？　あはははっ！　もう面白くなってきた、お腹痛い……」"

[[dialogue]]
speaker = "セーラ"
# 「ルリちーはとりあえず角笛取りにダッシュ！　うちと会長さんでこじ開けてやるからガンバレ！」
line = "「ルリちーはとりあえず角笛取りにダッシュ！　うちと会長さんでこじ開けてやるからガンバレ！」"

[[dialogue]]
speaker = "ルリエル"
# 「はい～っ！」
line = "「はい～っ！」"

[[dialogue]]
speaker = "ルリエル"
# 「はぁ、はぁ、はぁ……角笛、ゲットォ～！」
line = "「はぁ、はぁ、はぁ……角笛、ゲットォ～！」"

[[dialogue]]
speaker = "ルリエル"
# 「三度目の正直……ルリエルいきまーすっ」
line = "「三度目の正直……ルリエルいきまーすっ」"

[[dialogue]]
speaker = "セーラ"
# 「よし来た！　一気に決めるよ、会長さんっ！」
line = "「よし来た！　一気に決めるよ、会長さんっ！」"

[[dialogue]]
speaker = "セーラ"
# 「お疲れ～。星力めっちゃ使ったけど、まぁなんとかなったね。はは」
line = "「お疲れ～。星力めっちゃ使ったけど、まぁなんとかなったね。はは」"

[[dialogue]]
speaker = "ルリエル"
# 「今日はすみませんでした～っ！」
line = "「今日はすみませんでした～っ！」"

[[dialogue]]
speaker = "セーラ"
# 「ルリちーもやればできる子なんだけどねー。ま、今日はルリちーの噂してた誰かさんが悪いということで……ダメ？」
line = "「ルリちーもやればできる子なんだけどねー。ま、今日はルリちーの噂してた誰かさんが悪いということで……ダメ？」"

[[dialogue]]
speaker = "unk"
# それでいいです
line = "それでいいです"

[[dialogue]]
speaker = "セーラ"
# 「あはは、ありがとー」
line = "「あはは、ありがとー」"

[[dialogue]]
speaker = "ルリエル"
# 「今日はありがとうございました、新星の会長さん」
line = "「今日はありがとうございました、新星の会長さん」"

[[dialogue]]
speaker = "ルリエル"
# 「今度一緒に戦う時はちゃんとサポートしてみせますので、またよろしくお願いしますっ！」
line = "「今度一緒に戦う時はちゃんとサポートしてみせますので、またよろしくお願いしますっ！」"

[[dialogue]]
speaker = "セーラ"
# 「まぁ……めげないところはルリちーのいいとこ、かな？　またよろしくね～」
line = "「まぁ……めげないところはルリちーのいいとこ、かな？　またよろしくね～」"
