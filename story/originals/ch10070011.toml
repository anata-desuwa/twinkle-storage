[[dialogue]]
speaker = "unk"
# 第１話,ドジっ子ルリエル,P
line = "第１話,ドジっ子ルリエル,P"

[[dialogue]]
speaker = "unk"
# モンスター出現の知らせを聞いて急行していると……
line = "モンスター出現の知らせを聞いて急行していると……"

[[dialogue]]
speaker = "ルリエル"
# 「わわわっ！？」
line = "「わわわっ！？」"

[[dialogue]]
speaker = "ルリエル"
# 「あたたた～……あっ！　すみません、慌ててて……大丈夫ですかっ？」
line = "「あたたた～……あっ！　すみません、慌ててて……大丈夫ですかっ？」"

[[dialogue]]
speaker = "unk"
# 俺は大丈夫だけど、君は？
line = "俺は大丈夫だけど、君は？"

[[dialogue]]
speaker = "ルリエル"
# 「ご心配ありがとうございますっ。わたしはこの通りピンピンしてますっ、ヘーキなのですっ」
line = "「ご心配ありがとうございますっ。わたしはこの通りピンピンしてますっ、ヘーキなのですっ」"

[[dialogue]]
speaker = "ルリエル"
# 「ん？　どこかでお会いしたような……あ～っ、新星の会長さんじゃないですか！」
line = "「ん？　どこかでお会いしたような……あ～っ、新星の会長さんじゃないですか！」"

[[dialogue]]
speaker = "ルリエル"
# 「わ～～～っ！？」
line = "「わ～～～っ！？」"

[[dialogue]]
speaker = "セーラ"
# 「ルリちー、先走りすぎ……あ、会長さんじゃん。やっほー、うちのルリちーがごめんね～」
line = "「ルリちー、先走りすぎ……あ、会長さんじゃん。やっほー、うちのルリちーがごめんね～」"

[[dialogue]]
speaker = "セーラ"
# 「せっかくだし、今日は一緒に戦おっか？　ルリちーもいいよね？」
line = "「せっかくだし、今日は一緒に戦おっか？　ルリちーもいいよね？」"

[[dialogue]]
speaker = "ルリエル"
# 「はいっ。ルリエルはここから挽回しますよ～っ」
line = "「はいっ。ルリエルはここから挽回しますよ～っ」"

[[dialogue]]
speaker = "セーラ"
# 「うちが援護するから、会長さんは前衛いってもらっていい？　ルリちーはうちらに加護をお願い」
line = "「うちが援護するから、会長さんは前衛いってもらっていい？　ルリちーはうちらに加護をお願い」"

[[dialogue]]
speaker = "ルリエル"
# 「はーいっ」
line = "「はーいっ」"

[[dialogue]]
speaker = "unk"
# はい！
line = "はい！"

[[dialogue]]
speaker = "セーラ"
# 「こいつらけっこう硬いね～。まぁルリちーにバフかけてもらえばラクショー……」
line = "「こいつらけっこう硬いね～。まぁルリちーにバフかけてもらえばラクショー……」"

[[dialogue]]
speaker = "ルリエル"
# 「すー……」
line = "「すー……」"

[[dialogue]]
speaker = "セーラ"
# 「ルリちー、ぶちかませ～！」
line = "「ルリちー、ぶちかませ～！」"

[[dialogue]]
speaker = "ルリエル"
# 「んにゅ……ふ……ふ……」
line = "「んにゅ……ふ……ふ……」"

[[dialogue]]
speaker = "セーラ"
# 「ルリちー？」
line = "「ルリちー？」"

[[dialogue]]
speaker = "ルリエル"
# 「ふぇーくっしょんっ！！」
line = "「ふぇーくっしょんっ！！」"

[[dialogue]]
speaker = "セーラ"
# 「ルリちー～！」
line = "「ルリちー～！」"

[[dialogue]]
speaker = "ルリエル"
# 「すみませんっ……ふぇ、ふぇ……ふぇ～っくしょんっ！！」
line = "「すみませんっ……ふぇ、ふぇ……ふぇ～っくしょんっ！！」"

[[dialogue]]
speaker = "セーラ"
# 「うわっ、モンスターめっちゃきた！　こうなったら手数で押し返すよ。ルリちーはとりあえずバフ！」
line = "「うわっ、モンスターめっちゃきた！　こうなったら手数で押し返すよ。ルリちーはとりあえずバフ！」"

[[dialogue]]
speaker = "ルリエル"
# 「はい、もうくしゃみはしませんっ。今度こそ……」
line = "「はい、もうくしゃみはしませんっ。今度こそ……」"

[[dialogue]]
speaker = "ルリエル"
# 「くちゅんっ」
line = "「くちゅんっ」"

[[dialogue]]
speaker = "セーラ"
# 「あ、角笛落とした」
line = "「あ、角笛落とした」"

[[dialogue]]
speaker = "ルリエル"
# 「角笛がモンスターに蹴飛ばされて……」
