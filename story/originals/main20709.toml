[[dialogue]]
speaker = "unk"
# 第９話,アポロの弱さ,B
line = "第９話,アポロの弱さ,B"

[[dialogue]]
speaker = "unk"
# ベアトリスを探すため、秘密基地を出た梨緒、ナターシャ、アポロ。
line = "ベアトリスを探すため、秘密基地を出た梨緒、ナターシャ、アポロ。"

[[dialogue]]
speaker = "アポロ（大人）"
# 「今はリノの魔法で空間をねじれさせて、デネブの一般人に見えるようにしている。よほどのことがないとバレないが、あんまり目立つなよ」
line = "「今はリノの魔法で空間をねじれさせて、デネブの一般人に見えるようにしている。よほどのことがないとバレないが、あんまり目立つなよ」"

[[dialogue]]
speaker = "ナターシャ"
# 「はーい。秘密基地に隠蔽魔法に、魔女様様だね」
line = "「はーい。秘密基地に隠蔽魔法に、魔女様様だね」"

[[dialogue]]
speaker = "ナターシャ"
# 「だけどどうやってベアトを探そっか。極星学園に戻ってたら探しようがなくない？」
line = "「だけどどうやってベアトを探そっか。極星学園に戻ってたら探しようがなくない？」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「バックアップメンバーが極星学園周辺を監視してくれているが、ベアトは学園には戻っていないらしい。今も街のどこかにいると思ってよさそうだ」
line = "「バックアップメンバーが極星学園周辺を監視してくれているが、ベアトは学園には戻っていないらしい。今も街のどこかにいると思ってよさそうだ」"

[[dialogue]]
speaker = "ナターシャ"
# 「なるほど。でも街中から探すのは大変そうだなー。どうする、委員長？」
line = "「なるほど。でも街中から探すのは大変そうだなー。どうする、委員長？」"

[[dialogue]]
speaker = "梨緒"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ナターシャ"
# 「……梨緒？」
line = "「……梨緒？」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「どうした、朝飯が足りなかったか？」
line = "「どうした、朝飯が足りなかったか？」"

[[dialogue]]
speaker = "梨緒"
# 「アポロ。君は私に『弱さを許せ』と言った」
line = "「アポロ。君は私に『弱さを許せ』と言った」"

[[dialogue]]
speaker = "梨緒"
# 「そう言う君は、誰かに弱さを許してもらったことがあるのか？」
line = "「そう言う君は、誰かに弱さを許してもらったことがあるのか？」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「んー……そうだな、話しておくか」
line = "「んー……そうだな、話しておくか」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「……ああ、そうだ。あたしも自分の弱さを受け止めてもらって、助けてもらった」
line = "「……ああ、そうだ。あたしも自分の弱さを受け止めてもらって、助けてもらった」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「あたしは星見家の長女として生まれ、魔王になって世界を救う宿命を背負っていた」
line = "「あたしは星見家の長女として生まれ、魔王になって世界を救う宿命を背負っていた」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「だが幼い頃のあたしは、その重圧に耐え切れなかった」
line = "「だが幼い頃のあたしは、その重圧に耐え切れなかった」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「あたしだけが頑張らないといけない世界は間違ってる。そんな世界は壊れてしまえばいい」
line = "「あたしだけが頑張らないといけない世界は間違ってる。そんな世界は壊れてしまえばいい」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「だから世界をまっさらにしてやる──そう思ってしまった」
line = "「だから世界をまっさらにしてやる──そう思ってしまった」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「そこを付け込まれて、あたしはリクリエの使徒になった」
line = "「そこを付け込まれて、あたしはリクリエの使徒になった」"

[[dialogue]]
speaker = "梨緒"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ナターシャ"
# 「なるほど。その気持ちわかるかも」
line = "「なるほど。その気持ちわかるかも」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「使徒になってから、謝って許されないこともたくさんした。流星市国を襲って、街を破壊して、世界を滅ぼす一歩手前までいった」
line = "「使徒になってから、謝って許されないこともたくさんした。流星市国を襲って、街を破壊して、世界を滅ぼす一歩手前までいった」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「でもフィオナや魔王はあたしを責めなかった。それどころか、あたしを救おうと手を差し伸べてくれた」
line = "「でもフィオナや魔王はあたしを責めなかった。それどころか、あたしを救おうと手を差し伸べてくれた」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「あたしが何度その手を跳ねのけても、諦めずに手を伸ばしてくれたんだ」
line = "「あたしが何度その手を跳ねのけても、諦めずに手を伸ばしてくれたんだ」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「そのおかげで、あたしは今ここにいる」
line = "「そのおかげで、あたしは今ここにいる」"

[[dialogue]]
speaker = "ナターシャ"
# 「魔王に助けられたって話だったね。アルタイルのアポロにも聞いてるよ」
line = "「魔王に助けられたって話だったね。アルタイルのアポロにも聞いてるよ」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「そっか、その辺は向こうのあたしも一緒だったな。だけど──」
line = "「そっか、その辺は向こうのあたしも一緒だったな。だけど──」"

[[dialogue]]
speaker = "ナターシャ"
# 「だけど？」
line = "「だけど？」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「それだけじゃないんだ」
line = "「それだけじゃないんだ」"

[[dialogue]]
speaker = "梨緒"
# 「どういう意味だ……？」
line = "「どういう意味だ……？」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「もしあたしがリクリエの使徒になっていなければ、エリシアと一緒に戦えてたかもしれない」
line = "「もしあたしがリクリエの使徒になっていなければ、エリシアと一緒に戦えてたかもしれない」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「エリシアを死なせずに済んだかもしれない。世界を守れたかもしれない」
line = "「エリシアを死なせずに済んだかもしれない。世界を守れたかもしれない」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「あたしのせいで、アルタイルだけじゃなくてデネブでも、いろんな人が死んだかもしれない」
line = "「あたしのせいで、アルタイルだけじゃなくてデネブでも、いろんな人が死んだかもしれない」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「だけどリノはあたしを責めなかった。あいつだって息子を亡くしてるのに、エリシアが死んで泣いてるあたしを抱き締めてくれた」
line = "「だけどリノはあたしを責めなかった。あいつだって息子を亡くしてるのに、エリシアが死んで泣いてるあたしを抱き締めてくれた」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「だからあたしは過ぎた過去を振り返るのはやめた。今度こそヒーローになるって約束したしな」
line = "「だからあたしは過ぎた過去を振り返るのはやめた。今度こそヒーローになるって約束したしな」"

[[dialogue]]
speaker = "梨緒"
# 「もし……」
line = "「もし……」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「ん？　どうした？」
line = "「ん？　どうした？」"

[[dialogue]]
speaker = "梨緒"
# 「もしリクリエの使徒になっていなければ、エリシアを死なせなかったかもしれない……君はそう言った。だが本当にそうか？」
line = "「もしリクリエの使徒になっていなければ、エリシアを死なせなかったかもしれない……君はそう言った。だが本当にそうか？」"

[[dialogue]]
speaker = "梨緒"
# 「私の世界──ベガにはフィオナもエリシアもいた。私もジグもいた。それでも世界は滅んだ」
line = "「私の世界──ベガにはフィオナもエリシアもいた。私もジグもいた。それでも世界は滅んだ」"

[[dialogue]]
speaker = "梨緒"
# 「だから、その……きっと君がいても結果は変わらなかったんじゃないか？」
line = "「だから、その……きっと君がいても結果は変わらなかったんじゃないか？」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「んん？　何が言いたい？」
line = "「んん？　何が言いたい？」"

[[dialogue]]
speaker = "ナターシャ"
# 「それってアポロが弱いって意味？」
line = "「それってアポロが弱いって意味？」"

[[dialogue]]
speaker = "梨緒"
# 「いや！　そうじゃなくて、その……」
line = "「いや！　そうじゃなくて、その……」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「あたしは悪くない、って言いたいのか？」
line = "「あたしは悪くない、って言いたいのか？」"

[[dialogue]]
speaker = "梨緒"
# 「そ、そうだ！　そう言いたかったんだ！」
line = "「そ、そうだ！　そう言いたかったんだ！」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「フ……ハハハッ！　お前、言い方が下手だな！　最初はけなされてるのかと思ったぞ」
line = "「フ……ハハハッ！　お前、言い方が下手だな！　最初はけなされてるのかと思ったぞ」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「でもありがとな。それが弱さを許すってことだ。ちゃんとできてるじゃないか」
line = "「でもありがとな。それが弱さを許すってことだ。ちゃんとできてるじゃないか」"

[[dialogue]]
speaker = "梨緒"
# 「そ、そうなのか……？」
line = "「そ、そうなのか……？」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「そうだよ。ま、偉そうに言ってるあたしもまだまだヒーローになろうとしてる途中だけどな」
line = "「そうだよ。ま、偉そうに言ってるあたしもまだまだヒーローになろうとしてる途中だけどな」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「そしてヒーローは弱さを強さに変えるものだ」
line = "「そしてヒーローは弱さを強さに変えるものだ」"

[[dialogue]]
speaker = "梨緒"
# 「弱さを……強さに……」
line = "「弱さを……強さに……」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「ああ。強くなりたいなら、弱さと向き合わなくちゃいけない」
line = "「ああ。強くなりたいなら、弱さと向き合わなくちゃいけない」"

[[dialogue]]
speaker = "梨緒"
# 「それが『許す』ことなのか？」
line = "「それが『許す』ことなのか？」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「ああ、そういうことだ」
line = "「ああ、そういうことだ」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「誰かを『赦す』ってことは、もちろん口で言うほど簡単なことじゃない。だけどそこまでわかってるなら大丈夫だろ」
line = "「誰かを『赦す』ってことは、もちろん口で言うほど簡単なことじゃない。だけどそこまでわかってるなら大丈夫だろ」"

[[dialogue]]
speaker = "梨緒"
# 「許す……赦す……」
line = "「許す……赦す……」"

[[dialogue]]
speaker = "梨緒"
# 「正直、君の言っていることが全て理解できたわけじゃない」
line = "「正直、君の言っていることが全て理解できたわけじゃない」"

[[dialogue]]
speaker = "梨緒"
# 「それでもなんとなく……なんとなくだが、ベアトリスに話すべきことが浮かんできた気がする」
line = "「それでもなんとなく……なんとなくだが、ベアトリスに話すべきことが浮かんできた気がする」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「ならお節介焼いた甲斐があるってもんだ。お前は見るからに危なっかしいから、ついつい口が出ちゃうんだよ」
line = "「ならお節介焼いた甲斐があるってもんだ。お前は見るからに危なっかしいから、ついつい口が出ちゃうんだよ」"

[[dialogue]]
speaker = "梨緒"
# 「……余計なお世話だ」
line = "「……余計なお世話だ」"

[[dialogue]]
speaker = "ナターシャ"
# 「梨緒が何か掴んだのはいいんだけどー、ベアト探しは全然進んでないんだよね。いっそベアトの方から見つけてもらうとか？」
line = "「梨緒が何か掴んだのはいいんだけどー、ベアト探しは全然進んでないんだよね。いっそベアトの方から見つけてもらうとか？」"

[[dialogue]]
speaker = "梨緒"
# 「ここは敵地だ。見境なく自分たちの居場所を知らせるわけにはいかない。それに今のままではベアトは私たちを避けるだろう」
line = "「ここは敵地だ。見境なく自分たちの居場所を知らせるわけにはいかない。それに今のままではベアトは私たちを避けるだろう」"

[[dialogue]]
speaker = "梨緒"
# 「ベアトにだけ伝わるメッセージでもあればいいんだが……」
line = "「ベアトにだけ伝わるメッセージでもあればいいんだが……」"

[[dialogue]]
speaker = "ナターシャ"
# 「ベアトにだけ伝わる……か」
line = "「ベアトにだけ伝わる……か」"

[[dialogue]]
speaker = "ナターシャ"
# 「あ、いいこと思いついた♪」
line = "「あ、いいこと思いついた♪」"
