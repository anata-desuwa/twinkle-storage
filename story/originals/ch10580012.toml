[[dialogue]]
speaker = "unk"
# 第２話,教えて！　ご当主さん！！,P
line = "第２話,教えて！　ご当主さん！！,P"

[[dialogue]]
speaker = "ヘレナ"
# 「『おしえて！　ご当主さ～ん！！』」
line = "「『おしえて！　ご当主さ～ん！！』」"

[[dialogue]]
speaker = "ヘレナ"
# 「ようこそ星徒会の諸君、帰ってきた『おしえて！　ご当主さ～ん！！』のコーナーへ」
line = "「ようこそ星徒会の諸君、帰ってきた『おしえて！　ご当主さ～ん！！』のコーナーへ」"

[[dialogue]]
speaker = "unk"
# なんの話！？　というか、なぜ俺の家！？
line = "なんの話！？　というか、なぜ俺の家！？"

[[dialogue]]
speaker = "ヘレナ"
# 「それは、いわゆる大人の事情というやつだ」
line = "「それは、いわゆる大人の事情というやつだ」"

[[dialogue]]
speaker = "リノ"
# 「わ～♪　ぱちぱちぱち～♪」
line = "「わ～♪　ぱちぱちぱち～♪」"

[[dialogue]]
speaker = "unk"
# 母さんもなんかノリノリだし！
line = "母さんもなんかノリノリだし！"

[[dialogue]]
speaker = "ヘレナ"
# 「今回は、魔王も気になっているであろう、この九浄ヘレナのパーソナリティについて少し語っていこうと思ってな」
line = "「今回は、魔王も気になっているであろう、この九浄ヘレナのパーソナリティについて少し語っていこうと思ってな」"

[[dialogue]]
speaker = "リノ"
# 「は～い、質問～！　ヘレナちゃんって確か、新星学園の運営に関わっているのよね？」
line = "「は～い、質問～！　ヘレナちゃんって確か、新星学園の運営に関わっているのよね？」"

[[dialogue]]
speaker = "ヘレナ"
# 「いかにも。それに触れるにはまず、九浄家のことについて説明した方がいいだろう」
line = "「いかにも。それに触れるにはまず、九浄家のことについて説明した方がいいだろう」"

[[dialogue]]
speaker = "ヘレナ"
# 「魔王は既に聞いたことがあるかもしれないが、九浄家は流星市国において『五名門』といわれる家の１つだ。ほかに挙げると『<ruby=さくらじゅうじけ>桜十路家</ruby>』『<ruby=せんおんじけ>千園寺家</ruby>』などだな」
line = "「魔王は既に聞いたことがあるかもしれないが、九浄家は流星市国において『五名門』といわれる家の１つだ。ほかに挙げると『<ruby>桜十路家<rt>さくらじゅうじけ</rt></ruby>』『<ruby>千園寺家<rt>せんおんじけ</rt></ruby>』などだな」"

[[dialogue]]
speaker = "ヘレナ"
# 「ちなみに誤解されやすいのだが、『星見家』はこれに含まれない。かの家はまた特殊なルーツを持っているからな」
line = "「ちなみに誤解されやすいのだが、『星見家』はこれに含まれない。かの家はまた特殊なルーツを持っているからな」"

[[dialogue]]
speaker = "ヘレナ"
# 「『五名門』は必ずしも歴史が長い家というわけではない。それぞれ得意な分野の事業で、流星市国に大きな影響を与えていることから、そう言われている」
line = "「『五名門』は必ずしも歴史が長い家というわけではない。それぞれ得意な分野の事業で、流星市国に大きな影響を与えていることから、そう言われている」"

[[dialogue]]
speaker = "ヘレナ"
# 「例えば、桜十路家は『食品流通』、千園寺家は『宇宙開発』などで有名だ」
line = "「例えば、桜十路家は『食品流通』、千園寺家は『宇宙開発』などで有名だ」"

[[dialogue]]
speaker = "ヘレナ"
# 「そして、九浄家が担っているのは『人材育成』。才能ある者たちをスカウトして、育成し世に送り出す、キャリアマネジメントを多く手がけている」
line = "「そして、九浄家が担っているのは『人材育成』。才能ある者たちをスカウトして、育成し世に送り出す、キャリアマネジメントを多く手がけている」"

[[dialogue]]
speaker = "ヘレナ"
# 「といっても、九浄家は古くから存在する家だが、財閥として息を吹き返したのは最近のこと」
line = "「といっても、九浄家は古くから存在する家だが、財閥として息を吹き返したのは最近のこと」"

[[dialogue]]
speaker = "ヘレナ"
# 「私が当主の座についたばかりの時は、資金難で没落寸前の家だった」
line = "「私が当主の座についたばかりの時は、資金難で没落寸前の家だった」"

[[dialogue]]
speaker = "unk"
# そうだったのか。想像できないな
line = "そうだったのか。想像できないな"

[[dialogue]]
speaker = "ヘレナ"
# 「歴史の長い家は、血統にこだわるものでな。跡継ぎを手に入れる為に、無駄金を使いまくったのだ」
line = "「歴史の長い家は、血統にこだわるものでな。跡継ぎを手に入れる為に、無駄金を使いまくったのだ」"

[[dialogue]]
speaker = "ヘレナ"
# 「おっと、無駄金というのもよくないな。当時の当主が無能だったわけではない。どうやら、ある種の『呪い』をかけられていたらしく、とにかく跡継ぎに恵まれなかったのだ」
line = "「おっと、無駄金というのもよくないな。当時の当主が無能だったわけではない。どうやら、ある種の『呪い』をかけられていたらしく、とにかく跡継ぎに恵まれなかったのだ」"

[[dialogue]]
speaker = "ヘレナ"
# 「その後、色々あって私が生まれたわけだが、その頃の九浄家は相当やばかった」
line = "「その後、色々あって私が生まれたわけだが、その頃の九浄家は相当やばかった」"

[[dialogue]]
speaker = "ヘレナ"
# 「私は当主の座を引き継いだ後、失った資産を取り返すべく、さまざまな事業を展開した。ベンチャー企業への支援、通信パーツの開発、環境ファンド、デイトレード――」
line = "「私は当主の座を引き継いだ後、失った資産を取り返すべく、さまざまな事業を展開した。ベンチャー企業への支援、通信パーツの開発、環境ファンド、デイトレード――」"

[[dialogue]]
speaker = "ヘレナ"
# 「幸い私は、勝負運というものには恵まれていてな。手がけたビジネスは成功して、今では資金力で星騎士たちを支えられる立場になったというわけだ」
line = "「幸い私は、勝負運というものには恵まれていてな。手がけたビジネスは成功して、今では資金力で星騎士たちを支えられる立場になったというわけだ」"

[[dialogue]]
speaker = "ヘレナ"
# 「それから、流星教皇庁に声をかけられて、新たな事業として手がけたのが新星学園の設立と運営だった」
line = "「それから、流星教皇庁に声をかけられて、新たな事業として手がけたのが新星学園の設立と運営だった」"

[[dialogue]]
speaker = "ヘレナ"
# 「学園運営の資金や対外的な折衝は私が担当し、学内の統括は、学園長であるジェラルド・セイファートに任せている」
line = "「学園運営の資金や対外的な折衝は私が担当し、学内の統括は、学園長であるジェラルド・セイファートに任せている」"

[[dialogue]]
speaker = "リノ"
# 「なるほどね～。ヘレナちゃんがいたからこそ、新星学園が生まれたというわけね！」
line = "「なるほどね～。ヘレナちゃんがいたからこそ、新星学園が生まれたというわけね！」"

[[dialogue]]
speaker = "ヘレナ"
# 「ふふっ、そこは我ながら、いい仕事をしたと自負している」
line = "「ふふっ、そこは我ながら、いい仕事をしたと自負している」"

[[dialogue]]
speaker = "ヘレナ"
# 「こうして魔王が新星学園に現れたのも、なにかの運命であろう」
line = "「こうして魔王が新星学園に現れたのも、なにかの運命であろう」"

[[dialogue]]
speaker = "ヘレナ"
# 「あとはそうだな……我が魂のことについても、一応言っておいた方がいいだろう」
line = "「あとはそうだな……我が魂のことについても、一応言っておいた方がいいだろう」"

[[dialogue]]
speaker = "ヘレナ"
# 「もっとも、信じるどうかは貴殿次第だが――」
line = "「もっとも、信じるどうかは貴殿次第だが――」"

[[dialogue]]
speaker = "ヘレナ"
# 「魔王よ、私の魂は九浄ヘレナの鏡映し。姿形は違えど、同一のものだ」
line = "「魔王よ、私の魂は九浄ヘレナの鏡映し。姿形は違えど、同一のものだ」"

[[dialogue]]
speaker = "unk"
# それはどういう……？
line = "それはどういう……？"

[[dialogue]]
speaker = "ヘレナ"
# 「なに、ちょっとしたオカルトだ。理解できずとも別によい」
line = "「なに、ちょっとしたオカルトだ。理解できずとも別によい」"

[[dialogue]]
speaker = "ヘレナ"
# 「ただ、我が魂が皆に、久しぶりと言いたくなった――というだけのことだ」
line = "「ただ、我が魂が皆に、久しぶりと言いたくなった――というだけのことだ」"

[[dialogue]]
speaker = "ヘレナ"
# 「それよりもほかに、ヘレナちゃんに聞きたいことはないか？　質問があれば答えるぞ」
line = "「それよりもほかに、ヘレナちゃんに聞きたいことはないか？　質問があれば答えるぞ」"

[[dialogue]]
speaker = "リノ"
# 「じゃあ、は～い！　ヘレナちゃんの趣味はなんですか～？」
line = "「じゃあ、は～い！　ヘレナちゃんの趣味はなんですか～？」"

[[dialogue]]
speaker = "ヘレナ"
# 「よい質問だ。いくつかあるが、『服作り』は特に好きだな」
line = "「よい質問だ。いくつかあるが、『服作り』は特に好きだな」"

[[dialogue]]
speaker = "ヘレナ"
# 「『ヘレナ』というアパレルブランドもやっていたりする。九浄家メイド隊のメイド服も、実は私が手がけたデザインなのだ」
line = "「『ヘレナ』というアパレルブランドもやっていたりする。九浄家メイド隊のメイド服も、実は私が手がけたデザインなのだ」"

[[dialogue]]
speaker = "リノ"
# 「若い女の子にも人気のブランドじゃない！　ヘレナちゃん、そんなところでも活躍してたのね～！」
line = "「若い女の子にも人気のブランドじゃない！　ヘレナちゃん、そんなところでも活躍してたのね～！」"

[[dialogue]]
speaker = "ヘレナ"
# 「あと他には、時代劇を観るのは好きだな」
line = "「あと他には、時代劇を観るのは好きだな」"

[[dialogue]]
speaker = "リノ"
# 「あら、そうなの！？　クロトと同じ趣味ね！」
line = "「あら、そうなの！？　クロトと同じ趣味ね！」"

[[dialogue]]
speaker = "ヘレナ"
# 「おかげで、魔王とはよくその話で盛り上がる。ふふっ、意外な共通点だったな」
line = "「おかげで、魔王とはよくその話で盛り上がる。ふふっ、意外な共通点だったな」"

[[dialogue]]
speaker = "リノ"
# 「ハッ……！　もしかして、ヘレナちゃんが今日やってきたのって、共通の趣味を通して親密な仲になったからだったり……！？」
line = "「ハッ……！　もしかして、ヘレナちゃんが今日やってきたのって、共通の趣味を通して親密な仲になったからだったり……！？」"

[[dialogue]]
speaker = "ヘレナ"
# 「なるほど。そう考えると、今回はある意味、家族への顔合わせと言えるかもしれぬな。ふふっ♪」
line = "「なるほど。そう考えると、今回はある意味、家族への顔合わせと言えるかもしれぬな。ふふっ♪」"

[[dialogue]]
speaker = "unk"
# いや、突然の訪問だったよね！？
line = "いや、突然の訪問だったよね！？"

[[dialogue]]
speaker = "リノ"
# 「ヘレナちゃん！　そういうことなら、これからは私とも仲良くしましょう♪」
line = "「ヘレナちゃん！　そういうことなら、これからは私とも仲良くしましょう♪」"

[[dialogue]]
speaker = "ヘレナ"
# 「ああ、ちょうど私も気の合う友達になれそうな気がしていたところだ。こちらこそよろしく頼むぞ、リノ♪」
line = "「ああ、ちょうど私も気の合う友達になれそうな気がしていたところだ。こちらこそよろしく頼むぞ、リノ♪」"

[[dialogue]]
speaker = "ヘレナ"
# 「――ああ、ちなみにだが」
line = "「――ああ、ちなみにだが」"

[[dialogue]]
speaker = "ヘレナ"
# 「私たちが何歳なのかという質問については……」
line = "「私たちが何歳なのかという質問については……」"

[[dialogue]]
speaker = "リノ"
# 「女の秘密だから、ノーコメントよ♪」
line = "「女の秘密だから、ノーコメントよ♪」"

[[dialogue]]
speaker = "unk"
# なにも言ってないよ！？
line = "なにも言ってないよ！？"

[[dialogue]]
speaker = "unk"
# 急にユニゾンし出す２人にツッコむ俺なのだった――
line = "急にユニゾンし出す２人にツッコむ俺なのだった――"
