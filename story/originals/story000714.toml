[[dialogue]]
speaker = "unk"
# ヴィーナスの提案で、俺たちはおみくじを引くことになった――
line = "ヴィーナスの提案で、俺たちはおみくじを引くことになった――"

[[dialogue]]
speaker = "ヴィーナス"
# 「それじゃあ、みんな引いてきたわね？　さっきジャンケンで決めた順番で開封タイムよ！」
line = "「それじゃあ、みんな引いてきたわね？　さっきジャンケンで決めた順番で開封タイムよ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「まずは１番手、サーシャさんから！」
line = "「まずは１番手、サーシャさんから！」"

[[dialogue]]
speaker = "サーシャ"
# 「は～い♪　私のは～」
line = "「は～い♪　私のは～」"

[[dialogue]]
speaker = "サーシャ"
# 「やったわ～、大吉よ～♪　前回の初詣に続いて、２回目ね～♪」
line = "「やったわ～、大吉よ～♪　前回の初詣に続いて、２回目ね～♪」"

[[dialogue]]
speaker = "アナ"
# 「お～。サーシャ先輩はソフィアさんと仲直りしましたし、今年は幸先良さそうですね」
line = "「お～。サーシャ先輩はソフィアさんと仲直りしましたし、今年は幸先良さそうですね」"

[[dialogue]]
speaker = "アナ"
# 「次は、私の番です。どれどれ――」
line = "「次は、私の番です。どれどれ――」"

[[dialogue]]
speaker = "アナ"
# 「ふむ、中吉ですね。待ち人きたると書いてあります」
line = "「ふむ、中吉ですね。待ち人きたると書いてあります」"

[[dialogue]]
speaker = "アナ"
# 「私的には、浅草周辺の甘味処で美味しい和菓子をご馳走してくれる、気前のよい男性が現れてくれると嬉しいのですが……チラッ」
line = "「私的には、浅草周辺の甘味処で美味しい和菓子をご馳走してくれる、気前のよい男性が現れてくれると嬉しいのですが……チラッ」"

[[dialogue]]
speaker = "unk"
# おねだりの強い視線を感じる……！
line = "おねだりの強い視線を感じる……！"

[[dialogue]]
speaker = "マトイ"
# 「次は私か～。ただ、私の場合、おみくじの内容はもう決まってるのよね～」
line = "「次は私か～。ただ、私の場合、おみくじの内容はもう決まってるのよね～」"

[[dialogue]]
speaker = "サーシャ"
# 「マトイちゃん、決まってるってどういうこと？」
line = "「マトイちゃん、決まってるってどういうこと？」"

[[dialogue]]
speaker = "マトイ"
# 「実際にやってみせると――ほら、やっぱり。『吉』です」
line = "「実際にやってみせると――ほら、やっぱり。『吉』です」"

[[dialogue]]
speaker = "マトイ"
# 「私、おみくじは昔から、吉しか引けないんですよね～」
line = "「私、おみくじは昔から、吉しか引けないんですよね～」"

[[dialogue]]
speaker = "アナ"
# 「しかし、吉は大吉の次に運が良いという解釈もあります。逆にいつも幸運だと言えるかもしれません」
line = "「しかし、吉は大吉の次に運が良いという解釈もあります。逆にいつも幸運だと言えるかもしれません」"

[[dialogue]]
speaker = "マトイ"
# 「アナ、フォローありがとう。でもね――」
line = "「アナ、フォローありがとう。でもね――」"

[[dialogue]]
speaker = "マトイ"
# 「出ないからこそ、１度でいいから大吉を拝んでみたいという気持ちもあるのよ……！」
line = "「出ないからこそ、１度でいいから大吉を拝んでみたいという気持ちもあるのよ……！」"

[[dialogue]]
speaker = "アナ"
# 「なるほど」
line = "「なるほど」"

[[dialogue]]
speaker = "サーシャ"
# 「ふふっ♪　でも、マトイちゃんはおみくじの内容を大切にしそうだから、引き直したりはしなさそうね～」
line = "「ふふっ♪　でも、マトイちゃんはおみくじの内容を大切にしそうだから、引き直したりはしなさそうね～」"

[[dialogue]]
speaker = "マトイ"
# 「あはは、実はそうなんですよね～。おみくじの示す通りに頑張った方が、結果的に縁起がよくなりそうな気がして」
line = "「あはは、実はそうなんですよね～。おみくじの示す通りに頑張った方が、結果的に縁起がよくなりそうな気がして」"

[[dialogue]]
speaker = "unk"
# そこがマトイのいいところだな
line = "そこがマトイのいいところだな"

[[dialogue]]
speaker = "マトイ"
# 「え！？　も、もう会長ってば、そんなこと言われると、なんか照れるじゃん……！」
line = "「え！？　も、もう会長ってば、そんなこと言われると、なんか照れるじゃん……！」"

[[dialogue]]
speaker = "アナ"
# 「マトイ先輩、大吉を引いたかのような笑顔ですね」
line = "「マトイ先輩、大吉を引いたかのような笑顔ですね」"

[[dialogue]]
speaker = "サーシャ"
# 「あら～♪」
line = "「あら～♪」"

[[dialogue]]
speaker = "マトイ"
# 「なっ、アナ、そんなんじゃないから！　サーシャさんも！」
line = "「なっ、アナ、そんなんじゃないから！　サーシャさんも！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「次はいよいよ、私の番ね！　大吉こい、大吉こい、大吉こ～い！」
line = "「次はいよいよ、私の番ね！　大吉こい、大吉こい、大吉こ～い！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「開けゴマよ！　え～いっ！　…………チラッ」
line = "「開けゴマよ！　え～いっ！　…………チラッ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ぬわあああぁぁぁっ！　また大凶～～～っ！！」
line = "「ぬわあああぁぁぁっ！　また大凶～～～っ！！」"

[[dialogue]]
speaker = "アナ"
# 「オチがつきましたね」
line = "「オチがつきましたね」"

[[dialogue]]
speaker = "unk"
# そうなりそうな気はしてた
line = "そうなりそうな気はしてた"

[[dialogue]]
speaker = "マトイ"
# 「ていうか、大凶って本当にあるんだ？　確か前に、凶がいちばん下って聞いたこともあるような……」
line = "「ていうか、大凶って本当にあるんだ？　確か前に、凶がいちばん下って聞いたこともあるような……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あるのよ！　ほら！」
line = "「あるのよ！　ほら！」"

[[dialogue]]
speaker = "マトイ"
# 「うん、本当だ……実在するんだね……」
line = "「うん、本当だ……実在するんだね……」"

[[dialogue]]
speaker = "アナ"
# 「……神社のおみくじは、大凶を作っていないところも多い。入れるとしても引く確率は１．２％くらいだとか」
line = "「……神社のおみくじは、大凶を作っていないところも多い。入れるとしても引く確率は１．２％くらいだとか」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ゲームのガチャで最高レアを引くよりも低い確率じゃない！　それを２回連続引くってどういうこと！？」
line = "「ゲームのガチャで最高レアを引くよりも低い確率じゃない！　それを２回連続引くってどういうこと！？」"

[[dialogue]]
speaker = "アナ"
# 「２枚抜きおめでとうございます」
line = "「２枚抜きおめでとうございます」"

[[dialogue]]
speaker = "ヴィーナス"
# 「全然嬉しくないんだけど！？」
line = "「全然嬉しくないんだけど！？」"

[[dialogue]]
speaker = "サーシャ"
# 「ちなみに大凶って、内容はどんなことが書いてあるのかしら？」
line = "「ちなみに大凶って、内容はどんなことが書いてあるのかしら？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「控えめに言って……フルボッコよ！」
line = "「控えめに言って……フルボッコよ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「こことか特に酷いわ！　『生死しすべし』って書いてあるのよ！」
line = "「こことか特に酷いわ！　『生死しすべし』って書いてあるのよ！」"

[[dialogue]]
speaker = "マトイ"
# 「いや、さすがにそれは冗談……うわっ！？　本当に書いてある！？　えっ、これ、どういう意味なの！？」
line = "「いや、さすがにそれは冗談……うわっ！？　本当に書いてある！？　えっ、これ、どういう意味なの！？」"

[[dialogue]]
speaker = "サーシャ"
# 「すご～い！　大凶の内容って面白いのね～♪　写真に撮っておいて、後で調べてみましょうか」
line = "「すご～い！　大凶の内容って面白いのね～♪　写真に撮っておいて、後で調べてみましょうか」"

[[dialogue]]
speaker = "アナ"
# 「あっ、でも、『待ち人きたる』とも書いてあります」
line = "「あっ、でも、『待ち人きたる』とも書いてあります」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そこは当然よ！　私には魔王クロトがついているんだから！」
line = "「そこは当然よ！　私には魔王クロトがついているんだから！」"

[[dialogue]]
speaker = "unk"
# 責任重大だな
line = "責任重大だな"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええ、頼りにしてるわ♪　私がピンチの時は、必ず助けにきて頂戴」
line = "「ええ、頼りにしてるわ♪　私がピンチの時は、必ず助けにきて頂戴」"

[[dialogue]]
speaker = "ヴィーナス"
# 「――さて、最後はクロトの番ね！　魔王の運勢、見せてみなさい！」
line = "「――さて、最後はクロトの番ね！　魔王の運勢、見せてみなさい！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「開封したわね――どう？」
line = "「開封したわね――どう？」"

[[dialogue]]
speaker = "unk"
# 大吉だ、やったぜ
line = "大吉だ、やったぜ"

[[dialogue]]
speaker = "ヴィーナス"
# 「よし！　リクリエに勝ったわね！　帰りましょう」
line = "「よし！　リクリエに勝ったわね！　帰りましょう」"

[[dialogue]]
speaker = "マトイ"
# 「いや、お参りしていこうよ！？」
line = "「いや、お参りしていこうよ！？」"

[[dialogue]]
speaker = "unk"
# おみくじで盛り上がった後、俺たちはみんなで本堂にお参りすることになった――
line = "おみくじで盛り上がった後、俺たちはみんなで本堂にお参りすることになった――"

[[dialogue]]
speaker = "ヴィーナス"
# 「お賽銭を入れて――と」
line = "「お賽銭を入れて――と」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それじゃあ、一緒に合掌しましょう」
line = "「それじゃあ、一緒に合掌しましょう」"

[[dialogue]]
speaker = "ヴィーナス"
# 「今年、みんなでリクリエに勝てますように！」
line = "「今年、みんなでリクリエに勝てますように！」"

[[dialogue]]
speaker = "マトイ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "アナ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "サーシャ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……よし、これで必勝確実ね！」
line = "「……よし、これで必勝確実ね！」"

[[dialogue]]
speaker = "マトイ"
# 「ふぅ……この後はどうしよっか？　みんな、何か予定ある？」
line = "「ふぅ……この後はどうしよっか？　みんな、何か予定ある？」"

[[dialogue]]
speaker = "サーシャ"
# 「せっかく浅草に来たんだし、街を散策するのも面白そうよね～」
line = "「せっかく浅草に来たんだし、街を散策するのも面白そうよね～」"

[[dialogue]]
speaker = "アナ"
# 「ズバリ、浅草の甘味処に行きたいです」
line = "「ズバリ、浅草の甘味処に行きたいです」"

[[dialogue]]
speaker = "ヴィーナス"
# 「いいわね！　みんなでお茶しに行きましょうか♪」
line = "「いいわね！　みんなでお茶しに行きましょうか♪」"

[[dialogue]]
speaker = "unk"
# それなら、オススメの店がある
line = "それなら、オススメの店がある"

[[dialogue]]
speaker = "マトイ"
# 「え？　――前にバイトしてた甘味処が近くにある？」
line = "「え？　――前にバイトしてた甘味処が近くにある？」"

[[dialogue]]
speaker = "マトイ"
# 「――抹茶スイーツが絶品？　わぁ～、それはすごく気になるかも♪」
line = "「――抹茶スイーツが絶品？　わぁ～、それはすごく気になるかも♪」"

[[dialogue]]
speaker = "アナ"
# 「すぐ行きましょう。戦闘服で即飛んでいきましょう。じゅるり……♪」
line = "「すぐ行きましょう。戦闘服で即飛んでいきましょう。じゅるり……♪」"

[[dialogue]]
speaker = "サーシャ"
# 「あらあらうふふ♪　アナちゃんたら、もう変身しちゃってる♪」
line = "「あらあらうふふ♪　アナちゃんたら、もう変身しちゃってる♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あっ、そうだ。危うく忘れるところだったわ！」
line = "「あっ、そうだ。危うく忘れるところだったわ！」"

[[dialogue]]
speaker = "マトイ"
# 「どうしたの？」
line = "「どうしたの？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「お参りが終わってから、言おうと思ってたことがあるのよ」
line = "「お参りが終わってから、言おうと思ってたことがあるのよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「改めて――」
line = "「改めて――」"

[[dialogue]]
speaker = "ヴィーナス"
# 「今年もどうぞよろしくね、みんな！」
line = "「今年もどうぞよろしくね、みんな！」"

[[dialogue]]
speaker = "マトイ"
# 「あ～、そういうこと」
line = "「あ～、そういうこと」"

[[dialogue]]
speaker = "アナ"
# 「ノープロブレム。こちらこそ、どうぞよろしくお願いします」
line = "「ノープロブレム。こちらこそ、どうぞよろしくお願いします」"

[[dialogue]]
speaker = "サーシャ"
# 「みんなで仲良く頑張りましょうね～♪」
line = "「みんなで仲良く頑張りましょうね～♪」"

[[dialogue]]
speaker = "unk"
# よし、抹茶スイーツを食べに行くぞ！
line = "よし、抹茶スイーツを食べに行くぞ！"

[[dialogue]]
speaker = "みんな"
# 「お～！」
line = "「お～！」"

[[dialogue]]
speaker = "unk"
# こうして、俺たち新星星徒会の新年は晴れやかに、スタートしたのだった――
line = "こうして、俺たち新星星徒会の新年は晴れやかに、スタートしたのだった――"
