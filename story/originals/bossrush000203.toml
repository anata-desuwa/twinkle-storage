[[dialogue]]
speaker = "unk"
# それからジグは、新星星徒会が極星学園と戦った後に現れ、俺に接触してきた。
line = "それからジグは、新星星徒会が極星学園と戦った後に現れ、俺に接触してきた。"

[[dialogue]]
speaker = "ジグ"
# 『いや、しかし失態だ。記念すべきアルタイルとデネブの星騎士の初邂逅を見届けに来たのだけど、遅くなってしまった』
line = "『いや、しかし失態だ。記念すべきアルタイルとデネブの星騎士の初邂逅を見届けに来たのだけど、遅くなってしまった』"

[[dialogue]]
speaker = "ジグ"
# 『まあ終わってしまったものは仕方がない。挨拶も済んだことだし、出直すとしよう』
line = "『まあ終わってしまったものは仕方がない。挨拶も済んだことだし、出直すとしよう』"

[[dialogue]]
speaker = "ジグ"
# 『でもお土産くらいは──置いていこうかな』
line = "『でもお土産くらいは──置いていこうかな』"

[[dialogue]]
speaker = "unk"
# そしてジグは俺にリクリエの力を植え付け、その場を去って行った。
line = "そしてジグは俺にリクリエの力を植え付け、その場を去って行った。"

[[dialogue]]
speaker = "unk"
# そのリクリエの力は俺の体の中に巣食い、俺を暴走させた。
line = "そのリクリエの力は俺の体の中に巣食い、俺を暴走させた。"

[[dialogue]]
speaker = "unk"
# 梨緒とヴィーナスが止めてくれなければ、きっと俺はリクリエに堕ちていただろう。
line = "梨緒とヴィーナスが止めてくれなければ、きっと俺はリクリエに堕ちていただろう。"

[[dialogue]]
speaker = "梨緒"
# 「その後、私たち選挙管理員会は、再びジグと戦った」
line = "「その後、私たち選挙管理員会は、再びジグと戦った」"

[[dialogue]]
speaker = "梨緒"
# 「だが──」
line = "「だが──」"

[[dialogue]]
speaker = "梨緒"
# 『私は今度こそ世界を救う！』
line = "『私は今度こそ世界を救う！』"

[[dialogue]]
speaker = "ジグ"
# 『リクリエを退けることが救いだとは思わないけど、君たちの言葉を借りてあえて言おう』
line = "『リクリエを退けることが救いだとは思わないけど、君たちの言葉を借りてあえて言おう』"

[[dialogue]]
speaker = "ジグ"
# 『世界を救うなんて君たちにはできないよ』
line = "『世界を救うなんて君たちにはできないよ』"

[[dialogue]]
speaker = "ジグ"
# 『可能性は──ない』
line = "『可能性は──ない』"

[[dialogue]]
speaker = "梨緒"
# 「戦いの中で、一瞬だけジグを正気に戻すことができた」
line = "「戦いの中で、一瞬だけジグを正気に戻すことができた」"

[[dialogue]]
speaker = "梨緒"
# 「だがジグを取り戻すことはできなかった」
line = "「だがジグを取り戻すことはできなかった」"

[[dialogue]]
speaker = "梨緒"
# 『戻ってこい、ジグ！　私と一緒に、今度こそ世界を救おう！』
line = "『戻ってこい、ジグ！　私と一緒に、今度こそ世界を救おう！』"

[[dialogue]]
speaker = "ジグ"
# 『世界を……救う……』
line = "『世界を……救う……』"

[[dialogue]]
speaker = "ジグ"
# 『いいや、それは無理だ』
line = "『いいや、それは無理だ』"

[[dialogue]]
speaker = "ジグ"
# 『私は可能性を見た。だけど世界を救える未来なんてどこにもなかった』
line = "『私は可能性を見た。だけど世界を救える未来なんてどこにもなかった』"

[[dialogue]]
speaker = "梨緒"
# 『可能性……？　君は何を言って……？』
line = "『可能性……？　君は何を言って……？』"

[[dialogue]]
speaker = "ジグ"
# 『レナーテ・<ruby=ジグ>Ｚ</ruby>・サイフリート……ふむ、確かに私はそう呼ばれていたこともあったようだ。君が正しかったみたいね、そこは謝ろう』
line = "『レナーテ・<ruby>Ｚ<rt>ジグ</rt></ruby>・サイフリート……ふむ、確かに私はそう呼ばれていたこともあったようだ。君が正しかったみたいね、そこは謝ろう』"

[[dialogue]]
speaker = "ジグ"
# 『でも今の私には、遠い昔……まるで前世のことのように感じるよ』
line = "『でも今の私には、遠い昔……まるで前世のことのように感じるよ』"

[[dialogue]]
speaker = "ジグ"
# 『もう一度言おう。私は“真なる神の騎士”。かつてベガで戦っていた星騎士とは別の存在だ』
line = "『もう一度言おう。私は“真なる神の騎士”。かつてベガで戦っていた星騎士とは別の存在だ』"

[[dialogue]]
speaker = "梨緒"
# 「可能性はないと、あの時ジグは言っていた」
line = "「可能性はないと、あの時ジグは言っていた」"

[[dialogue]]
speaker = "梨緒"
# 「その言葉にあんな意味があったとはな……」
line = "「その言葉にあんな意味があったとはな……」"
