[[dialogue]]
speaker = "unk"
# 第２話,プランこねこねお散歩タイム,P
line = "第２話,プランこねこねお散歩タイム,P"

[[dialogue]]
speaker = "unk"
# ゴールデングースとの合同任務から数日後──
line = "ゴールデングースとの合同任務から数日後──"

[[dialogue]]
speaker = "ミウ"
# 「あっ、会長さん、こんにちは。会長さんもお散歩ですか？」
line = "「あっ、会長さん、こんにちは。会長さんもお散歩ですか？」"

[[dialogue]]
speaker = "ミウ"
# 「私、お散歩しつつ、考えごとをするのが趣味……というか癖になってまして」
line = "「私、お散歩しつつ、考えごとをするのが趣味……というか癖になってまして」"

[[dialogue]]
speaker = "ミウ"
# 「歩いている時って、不意にアイデアが湧くんです。まるで、天から降ってくるみたいに」
line = "「歩いている時って、不意にアイデアが湧くんです。まるで、天から降ってくるみたいに」"

[[dialogue]]
speaker = "ミウ"
# 「よろしかったら、会長さんも一緒にお散歩してみませんか？」
line = "「よろしかったら、会長さんも一緒にお散歩してみませんか？」"

[[dialogue]]
speaker = "unk"
# 考え事してるなら、お邪魔じゃない？
line = "考え事してるなら、お邪魔じゃない？"

[[dialogue]]
speaker = "ミウ"
# 「いえいえ、人と話すことでもアイデアが湧くこともありますから。何が閃きの鍵になるかわからない意外性が、すごく面白いんです」
line = "「いえいえ、人と話すことでもアイデアが湧くこともありますから。何が閃きの鍵になるかわからない意外性が、すごく面白いんです」"

[[dialogue]]
speaker = "unk"
# どうやら迷惑ではなさそうなので、ミウの散歩に付き合うことにした。
line = "どうやら迷惑ではなさそうなので、ミウの散歩に付き合うことにした。"

[[dialogue]]
speaker = "ミウ"
# 「ふう、結構歩きましたね。ちょっと休憩しましょう」
line = "「ふう、結構歩きましたね。ちょっと休憩しましょう」"

[[dialogue]]
speaker = "ミウ"
# 「そうだ。先日の任務では私のプランに付き合っていただき、ありがとうございます」
line = "「そうだ。先日の任務では私のプランに付き合っていただき、ありがとうございます」"

[[dialogue]]
speaker = "ミウ"
# 「会長さんのおかげで、想定以上の結果を残せました。まさか、たったひとりで、引き付けた敵のほとんどを倒してしまうなんて」
line = "「会長さんのおかげで、想定以上の結果を残せました。まさか、たったひとりで、引き付けた敵のほとんどを倒してしまうなんて」"

[[dialogue]]
speaker = "unk"
# 倒しちゃダメとは言われてなかったからね
line = "倒しちゃダメとは言われてなかったからね"

[[dialogue]]
speaker = "ミウ"
# 「頭数を減らしてくれて、本当に助かりました。おかげで私もサポートに専念できましたし、会長さんの戦力値はすごく高めに見積った方が良さそうですね」
line = "「頭数を減らしてくれて、本当に助かりました。おかげで私もサポートに専念できましたし、会長さんの戦力値はすごく高めに見積った方が良さそうですね」"

[[dialogue]]
speaker = "ミウ"
# 「……え？　私に聞きたいことですか？　別に構いませんけど」
line = "「……え？　私に聞きたいことですか？　別に構いませんけど」"

[[dialogue]]
speaker = "ミウ"
# 「そうですね、私ばかり一方的に知っているのもフェアじゃありませんし、改めて、自己紹介させていただきますね」
line = "「そうですね、私ばかり一方的に知っているのもフェアじゃありませんし、改めて、自己紹介させていただきますね」"

[[dialogue]]
speaker = "ミウ"
# 「深沢ミウ、附属の２年生で、ゴールデングースの見習い社員です。よろしくお願いします」
line = "「深沢ミウ、附属の２年生で、ゴールデングースの見習い社員です。よろしくお願いします」"

[[dialogue]]
speaker = "ミウ"
# 「親友はヒマワリちゃん。趣味はスマホゲームとお散歩……あとはゴールデングースでの活動ですかね」
line = "「親友はヒマワリちゃん。趣味はスマホゲームとお散歩……あとはゴールデングースでの活動ですかね」"

[[dialogue]]
speaker = "ミウ"
# 「家族構成……ですか？　父は銀行員で、母は会社員です。兄弟はいません」
line = "「家族構成……ですか？　父は銀行員で、母は会社員です。兄弟はいません」"

[[dialogue]]
speaker = "ミウ"
# 「家庭環境は至って良好な部類だと思います。一人っ子なのもあって、両親にはしっかりと愛情を注いでもらったと思ってます……なんでそんなことを聞かれるんです？」
line = "「家庭環境は至って良好な部類だと思います。一人っ子なのもあって、両親にはしっかりと愛情を注いでもらったと思ってます……なんでそんなことを聞かれるんです？」"

[[dialogue]]
speaker = "unk"
# ミウってプランニングが得意だよね？
line = "ミウってプランニングが得意だよね？"

[[dialogue]]
speaker = "ミウ"
# 「はい、セナリィ社長にもプランニング能力を買ってもらってますね。私の発想が社長のお役に立ててるなら、こんなに嬉しいことはないです」
line = "「はい、セナリィ社長にもプランニング能力を買ってもらってますね。私の発想が社長のお役に立ててるなら、こんなに嬉しいことはないです」"

[[dialogue]]
speaker = "ミウ"
# 「どうしてそんなに容赦がないのか……？　おっしゃっている意味がよく分かりません」
line = "「どうしてそんなに容赦がないのか……？　おっしゃっている意味がよく分かりません」"

[[dialogue]]
speaker = "ミウ"
# 「自分や大切な人に危害を加えようとしてくる敵を確実に倒すのって、当然じゃないですか？」
line = "「自分や大切な人に危害を加えようとしてくる敵を確実に倒すのって、当然じゃないですか？」"

[[dialogue]]
speaker = "ミウ"
# 「禍根を残したら、いずれ反撃されるかもしれませんし、やるからには草の根まで潰さないと、ですよね」
line = "「禍根を残したら、いずれ反撃されるかもしれませんし、やるからには草の根まで潰さないと、ですよね」"

[[dialogue]]
speaker = "ミウ"
# 「特に社長やヒマワリちゃんを傷つけるような悪い人に情けはかけないです。もちろん、会長さんの敵にも」
line = "「特に社長やヒマワリちゃんを傷つけるような悪い人に情けはかけないです。もちろん、会長さんの敵にも」"

[[dialogue]]
speaker = "unk"
# 無邪気で可愛い笑顔の裏に、どんな凄惨な過去や闇を抱えているのかと不安になったけれど、彼女のこれは生まれもっての性格らしい。
line = "無邪気で可愛い笑顔の裏に、どんな凄惨な過去や闇を抱えているのかと不安になったけれど、彼女のこれは生まれもっての性格らしい。"

[[dialogue]]
speaker = "unk"
# （それはそれでちょっと危ない子かも……）
line = "（それはそれでちょっと危ない子かも……）"

[[dialogue]]
speaker = "ミウ"
# 「あとはそうですね……尊敬している人はセナリィ社長、好きなのはヒマワリちゃんとクマのぬいぐるみ……あっ、鯛焼きも大好物です！」
line = "「あとはそうですね……尊敬している人はセナリィ社長、好きなのはヒマワリちゃんとクマのぬいぐるみ……あっ、鯛焼きも大好物です！」"

[[dialogue]]
speaker = "ミウ"
# 「逆に苦手なものといえば、これはあまり言いたくないんですけど──」
line = "「逆に苦手なものといえば、これはあまり言いたくないんですけど──」"

[[dialogue]]
speaker = "unk"
# あっ、カエル
line = "あっ、カエル"

[[dialogue]]
speaker = "ミウ"
# 「きっ──きぃやあぁあぁああぁぁぁぁっ！！」
line = "「きっ──きぃやあぁあぁああぁぁぁぁっ！！」"

[[dialogue]]
speaker = "ミウ"
# 「ダ、ダメなんです！　カエルとかヘビとかヌメヌメしてて何考えてるかわかんない顔してる生き物はっ！　生理的に無理なんですぅうぅぅーっ！」
line = "「ダ、ダメなんです！　カエルとかヘビとかヌメヌメしてて何考えてるかわかんない顔してる生き物はっ！　生理的に無理なんですぅうぅぅーっ！」"

[[dialogue]]
speaker = "ミウ"
# 「見えないとこにどけてください、追い払ってください！　お願いしますお願いします！　なんでもっ、なんでもしますからぁぁーっ！」
line = "「見えないとこにどけてください、追い払ってください！　お願いしますお願いします！　なんでもっ、なんでもしますからぁぁーっ！」"

[[dialogue]]
speaker = "unk"
# 追い払ったよ
line = "追い払ったよ"

[[dialogue]]
speaker = "ミウ"
# 「はーっ、はーっ、はーっ……！　あ、ありがとうございます……助かりました……会長さんは命の恩人です……！」
line = "「はーっ、はーっ、はーっ……！　あ、ありがとうございます……助かりました……会長さんは命の恩人です……！」"

[[dialogue]]
speaker = "ミウ"
# 「お、大袈裟じゃないんですよぉ……っ！　はーっ、はーっ……ふぅぅぅ……やっと落ち着いてきましたぁ……」
line = "「お、大袈裟じゃないんですよぉ……っ！　はーっ、はーっ……ふぅぅぅ……やっと落ち着いてきましたぁ……」"

[[dialogue]]
speaker = "ミウ"
# 「この付近のカエルを絶滅させるにはどうすればいいでしょうか……」
line = "「この付近のカエルを絶滅させるにはどうすればいいでしょうか……」"

[[dialogue]]
speaker = "ミウ"
# 「繁殖地域一帯を、爆薬で吹き飛ばせば……いえ、現実的ではありませんし、外部からまた入ってきますね。巣の捜索と駆除、天敵の導入に……」
line = "「繁殖地域一帯を、爆薬で吹き飛ばせば……いえ、現実的ではありませんし、外部からまた入ってきますね。巣の捜索と駆除、天敵の導入に……」"

[[dialogue]]
speaker = "unk"
# ストップ、ストップ、ストーップ！
line = "ストップ、ストップ、ストーップ！"

[[dialogue]]
speaker = "unk"
# まるで、一度火が点いたら消すのが困難な導火線。ミウの取り扱いには気をつけようと思うのだった。
line = "まるで、一度火が点いたら消すのが困難な導火線。ミウの取り扱いには気をつけようと思うのだった。"
