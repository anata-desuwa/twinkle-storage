[[dialogue]]
speaker = "unk"
# 第２話,人間界の冬,P
line = "第２話,人間界の冬,P"

[[dialogue]]
speaker = "クラウディア"
# 「──寒い！」
line = "「──寒い！」"

[[dialogue]]
speaker = "クラウディア"
# 「寒い、寒すぎるぞ……！　ここはなんだ、氷の中か！？　体が震えて仕方がない……うーぶるぶる」
line = "「寒い、寒すぎるぞ……！　ここはなんだ、氷の中か！？　体が震えて仕方がない……うーぶるぶる」"

[[dialogue]]
speaker = "クラウディア"
# 「人間界の冬はこんなにも厳しいのか！　余はこのまま冬を越せる自信がなくなってきたぞ……」
line = "「人間界の冬はこんなにも厳しいのか！　余はこのまま冬を越せる自信がなくなってきたぞ……」"

[[dialogue]]
speaker = "unk"
# そんなに寒くなかった？
line = "そんなに寒くなかった？"

[[dialogue]]
speaker = "unk"
# 魔女の森は……
line = "魔女の森は……"

[[dialogue]]
speaker = "クラウディア"
# 「うむ。というより、魔女の森には四季の移ろいというものがあまりなくてな」
line = "「うむ。というより、魔女の森には四季の移ろいというものがあまりなくてな」"

[[dialogue]]
speaker = "クラウディア"
# 「暑いだの寒いだのと気候を意識することもあまりなかったのだ。まあ、もとより三界からは隔絶された領域だからな」
line = "「暑いだの寒いだのと気候を意識することもあまりなかったのだ。まあ、もとより三界からは隔絶された領域だからな」"

[[dialogue]]
speaker = "クラウディア"
# 「だからこそ驚きだ……人間はなぜ、このような寒さに耐えられるのだ」
line = "「だからこそ驚きだ……人間はなぜ、このような寒さに耐えられるのだ」"

[[dialogue]]
speaker = "クラウディア"
# 「みな、余には見えていないだけで、ペンギンのような羽毛を生やしておるのか！？」
line = "「みな、余には見えていないだけで、ペンギンのような羽毛を生やしておるのか！？」"

[[dialogue]]
speaker = "unk"
# 知恵もある
line = "知恵もある"

[[dialogue]]
speaker = "unk"
# ただの慣れだ
line = "ただの慣れだ"

[[dialogue]]
speaker = "クラウディア"
# 「ほう。人間には寒さを凌ぐ知恵が豊富……とな」
line = "「ほう。人間には寒さを凌ぐ知恵が豊富……とな」"

[[dialogue]]
speaker = "クラウディア"
# 「余も少しは知っておるぞ。カイロだの、湯たんぽだのというやつだろう。ウェンディがありがたがっておった」
line = "「余も少しは知っておるぞ。カイロだの、湯たんぽだのというやつだろう。ウェンディがありがたがっておった」"

[[dialogue]]
speaker = "クラウディア"
# 「む──あちらに何やら、最新の防寒グッズとやらが売られておるぞ」
line = "「む──あちらに何やら、最新の防寒グッズとやらが売られておるぞ」"

[[dialogue]]
speaker = "unk"
# クラウディアは立ち並ぶ電器屋の店頭ディスプレイに目をつけた。
line = "クラウディアは立ち並ぶ電器屋の店頭ディスプレイに目をつけた。"

[[dialogue]]
speaker = "クラウディア"
# 「どれどれ……ネックウォーマーに……電気で温まるベスト……むむ、毛皮の靴下なんてのもあるぞ！」
line = "「どれどれ……ネックウォーマーに……電気で温まるベスト……むむ、毛皮の靴下なんてのもあるぞ！」"

[[dialogue]]
speaker = "クラウディア"
# 「あっちには……なんだ、脚の隠れたちゃぶ台が置かれておるな」
line = "「あっちには……なんだ、脚の隠れたちゃぶ台が置かれておるな」"

[[dialogue]]
speaker = "unk"
# 伝統的な暖房器具だ
line = "伝統的な暖房器具だ"

[[dialogue]]
speaker = "unk"
# あれはこたつ
line = "あれはこたつ"

[[dialogue]]
speaker = "クラウディア"
# 「ほー！　あれが噂に聞くこたつか！　何やらみかんまでセットで置いてあるではないか」
line = "「ほー！　あれが噂に聞くこたつか！　何やらみかんまでセットで置いてあるではないか」"

[[dialogue]]
speaker = "クラウディア"
# 「この寒さに耐えんがため、人間も様々な知恵を巡らせておるのだな。いくつか余の部屋にも持ち帰りたくなってきたぞ」
line = "「この寒さに耐えんがため、人間も様々な知恵を巡らせておるのだな。いくつか余の部屋にも持ち帰りたくなってきたぞ」"

[[dialogue]]
speaker = "クラウディア"
# 「寒いなら買うか、と？　いや……それより、だ。余はもっとよい寒さしのぎの方法を見つけたぞ」
line = "「寒いなら買うか、と？　いや……それより、だ。余はもっとよい寒さしのぎの方法を見つけたぞ」"

[[dialogue]]
speaker = "クラウディア"
# 「ふふふ……魔王で暖を取るのだ！　こうしてぴったんことくっついていれば、どんなに気温が下がったとて平気だぞ！」
line = "「ふふふ……魔王で暖を取るのだ！　こうしてぴったんことくっついていれば、どんなに気温が下がったとて平気だぞ！」"

[[dialogue]]
speaker = "クラウディア"
# 「余に風邪をひかせぬためにも、お主はいつでも余のそばにいることだ。これは命令だぞ」
line = "「余に風邪をひかせぬためにも、お主はいつでも余のそばにいることだ。これは命令だぞ」"

[[dialogue]]
speaker = "クラウディア"
# 「ふっふっふ……まさに名案というものだ！」
line = "「ふっふっふ……まさに名案というものだ！」"

[[dialogue]]
speaker = "クラウディア"
# 「しかし……さっきも思ったが、１２月の人間界は本当にクリスマス一色なのだのう」
line = "「しかし……さっきも思ったが、１２月の人間界は本当にクリスマス一色なのだのう」"

[[dialogue]]
speaker = "クラウディア"
# 「余としては、自分の誕生日を上書きされているようで、まるで面白くないが……」
line = "「余としては、自分の誕生日を上書きされているようで、まるで面白くないが……」"

[[dialogue]]
speaker = "unk"
# 恋人同士は祝うもの
line = "恋人同士は祝うもの"

[[dialogue]]
speaker = "unk"
# 楽しんだほうがトク
line = "楽しんだほうがトク"

[[dialogue]]
speaker = "クラウディア"
# 「む……！　言われてみれば、確かにそうだ。せっかくのお祭りムードをかき消すなど、なんだかもったいない気もしてきたぞ！」
line = "「む……！　言われてみれば、確かにそうだ。せっかくのお祭りムードをかき消すなど、なんだかもったいない気もしてきたぞ！」"

[[dialogue]]
speaker = "クラウディア"
# 「誕生日も、クリスマスも、どっちも楽しむのがオツというものか」
line = "「誕生日も、クリスマスも、どっちも楽しむのがオツというものか」"

[[dialogue]]
speaker = "クラウディア"
# 「魔王よ！　余にクリスマスの楽しみ方を教えてくれ。魔女の森にこんな風習はなかったものでな、初めてなのだ」
line = "「魔王よ！　余にクリスマスの楽しみ方を教えてくれ。魔女の森にこんな風習はなかったものでな、初めてなのだ」"

[[dialogue]]
speaker = "クラウディア"
# 「ほう。あそこに売られている樹木に秘密があると？」
line = "「ほう。あそこに売られている樹木に秘密があると？」"

[[dialogue]]
speaker = "クラウディア"
# 「なに？　あれは樹でなくケーキとな！？　ほう、そんなものがあるとは！」
line = "「なに？　あれは樹でなくケーキとな！？　ほう、そんなものがあるとは！」"

[[dialogue]]
speaker = "クラウディア"
# 「ぶっしゅどのえる……というのか。ケーキと聞いたら、急にうまそうに見えてきたぞ。セドナに隠れてこっそり食べてしまおうぞ、魔王♪」
line = "「ぶっしゅどのえる……というのか。ケーキと聞いたら、急にうまそうに見えてきたぞ。セドナに隠れてこっそり食べてしまおうぞ、魔王♪」"

[[dialogue]]
speaker = "クラウディア"
# 「他には何がある？　ほほう、プレゼント交換なるものもあるのか」
line = "「他には何がある？　ほほう、プレゼント交換なるものもあるのか」"

[[dialogue]]
speaker = "クラウディア"
# 「サンタではなく、友人同士でプレゼントを持ち寄り……なるほど！　実に面白そうな試みではないか！」
line = "「サンタではなく、友人同士でプレゼントを持ち寄り……なるほど！　実に面白そうな試みではないか！」"

[[dialogue]]
speaker = "クラウディア"
# 「向こうで行われているのは……ほう、クリスマス限定くじとな！　クリスマスには特別なイベントが満載なのだな！」
line = "「向こうで行われているのは……ほう、クリスマス限定くじとな！　クリスマスには特別なイベントが満載なのだな！」"

[[dialogue]]
speaker = "クラウディア"
# 「余もうずうずしてきたぞ。さあ、さっそくくじを引きに参ろう──！」
line = "「余もうずうずしてきたぞ。さあ、さっそくくじを引きに参ろう──！」"

[[dialogue]]
speaker = "クラウディア"
# 「──はっはっ、なかなか愉快な催しであった。１等とはならなかったが──たんまりお菓子ももらえたしな」
line = "「──はっはっ、なかなか愉快な催しであった。１等とはならなかったが──たんまりお菓子ももらえたしな」"

[[dialogue]]
speaker = "クラウディア"
# 「しかし、ふむ……何やらここに集った人間はみな、揃ってあの樹を見上げているようだな」
line = "「しかし、ふむ……何やらここに集った人間はみな、揃ってあの樹を見上げているようだな」"

[[dialogue]]
speaker = "unk"
# クラウディアが目に留めたのは、駅に展示されている巨大なツリーだった。
line = "クラウディアが目に留めたのは、駅に展示されている巨大なツリーだった。"

[[dialogue]]
speaker = "クラウディア"
# 「あそこには何があるのだ？」
line = "「あそこには何があるのだ？」"

[[dialogue]]
speaker = "クラウディア"
# 「ほう。イルミネーションとな。確かにツリー全体がきらびやかに彩られておる」
line = "「ほう。イルミネーションとな。確かにツリー全体がきらびやかに彩られておる」"

[[dialogue]]
speaker = "クラウディア"
# 「しかし……ふーむ……光いろどるイルミネーション、か。それにしては少々、光が足らぬのではないか？」
line = "「しかし……ふーむ……光いろどるイルミネーション、か。それにしては少々、光が足らぬのではないか？」"

[[dialogue]]
speaker = "クラウディア"
# 「何をするつもりか──と？　ふふ、余なりの『さーびすせいしん』というやつだ」
line = "「何をするつもりか──と？　ふふ、余なりの『さーびすせいしん』というやつだ」"

[[dialogue]]
speaker = "クラウディア"
# 「それ──光の魔女が、ツリーに光の魔法をかけてやるぞ！　あっはっは、これでライトアップ１００倍だ！」
line = "「それ──光の魔女が、ツリーに光の魔法をかけてやるぞ！　あっはっは、これでライトアップ１００倍だ！」"

[[dialogue]]
speaker = "unk"
# やりすぎだ！
line = "やりすぎだ！"

[[dialogue]]
speaker = "unk"
# まぶしい！
line = "まぶしい！"

[[dialogue]]
speaker = "クラウディア"
# 「なあに、余の光は人の目にも優しい！　心配いらん！」
line = "「なあに、余の光は人の目にも優しい！　心配いらん！」"

[[dialogue]]
speaker = "クラウディア"
# 「せっかくの光の祭典ならば、大いに盛り上げなくては損と思ってのう！」
line = "「せっかくの光の祭典ならば、大いに盛り上げなくては損と思ってのう！」"

[[dialogue]]
speaker = "unk"
# クラウディアとの付き合いは、いつまで経っても退屈しないものだった……。
line = "クラウディアとの付き合いは、いつまで経っても退屈しないものだった……。"
