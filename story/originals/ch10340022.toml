[[dialogue]]
speaker = "unk"
# 第２話,世界征服プランニング,P
line = "第２話,世界征服プランニング,P"

[[dialogue]]
speaker = "カティア"
# 「魔王様、こっちですガオ！」
line = "「魔王様、こっちですガオ！」"

[[dialogue]]
speaker = "unk"
# 俺に合わせたい人って誰？
line = "俺に合わせたい人って誰？"

[[dialogue]]
speaker = "カティア"
# 「ふっふっふー、魔王様、最近、ちっとも世界征服が進んでないとは思いませんか？」
line = "「ふっふっふー、魔王様、最近、ちっとも世界征服が進んでないとは思いませんか？」"

[[dialogue]]
speaker = "unk"
# （進めてないからね）
line = "（進めてないからね）"

[[dialogue]]
speaker = "unk"
# ちっとも進んでないね
line = "ちっとも進んでないね"

[[dialogue]]
speaker = "カティア"
# 「それではいけないと思った私は、悪事のスペシャリストの噂を耳にし、その人たちに話を聞くチャンスをゲットしたワン！」
line = "「それではいけないと思った私は、悪事のスペシャリストの噂を耳にし、その人たちに話を聞くチャンスをゲットしたワン！」"

[[dialogue]]
speaker = "カティア"
# 「その悪い人たちがいるのが……」
line = "「その悪い人たちがいるのが……」"

[[dialogue]]
speaker = "カティア"
# 「ここですガオ！」
line = "「ここですガオ！」"

[[dialogue]]
speaker = "unk"
# ゴールデングースの事務所！
line = "ゴールデングースの事務所！"

[[dialogue]]
speaker = "unk"
# ここって！
line = "ここって！"

[[dialogue]]
speaker = "ヒマワリ"
# 「会長さん、カティア先輩、こんにちはー！　附属校２年にしてゴールデングース社員、鈴野ヒマワリです！」
line = "「会長さん、カティア先輩、こんにちはー！　附属校２年にしてゴールデングース社員、鈴野ヒマワリです！」"

[[dialogue]]
speaker = "ミウ"
# 「ようこそ、ゴールデングースへ。同じく附属校２年にしてゴールデングース社員、深沢ミウです」
line = "「ようこそ、ゴールデングースへ。同じく附属校２年にしてゴールデングース社員、深沢ミウです」"

[[dialogue]]
speaker = "ヒマワリ"
# 「ごめんね、セナリィ社長はどうしても外せない仕事があるから、私たちで対応してってさ」
line = "「ごめんね、セナリィ社長はどうしても外せない仕事があるから、私たちで対応してってさ」"

[[dialogue]]
speaker = "ミウ"
# 「なんでもカティア先輩は私たちに伺いたいことがあると」
line = "「なんでもカティア先輩は私たちに伺いたいことがあると」"

[[dialogue]]
speaker = "カティア"
# 「はい！　悪の秘密結社のゴールデングースの皆さんに聞きたいことがありますガオ！」
line = "「はい！　悪の秘密結社のゴールデングースの皆さんに聞きたいことがありますガオ！」"

[[dialogue]]
speaker = "ミウ"
# 「はい、私たちに答えられることでしたら、なんなりと。そのために時間も取っていますし」
line = "「はい、私たちに答えられることでしたら、なんなりと。そのために時間も取っていますし」"

[[dialogue]]
speaker = "ヒマワリ"
# 「法に触れるようなことは黙秘するけどねー。お互いの利益になるお話ができるといいよね！」
line = "「法に触れるようなことは黙秘するけどねー。お互いの利益になるお話ができるといいよね！」"

[[dialogue]]
speaker = "カティア"
# 「相談なんですけど……魔王様の世界征服がなかなか進んでませんガオ……」
line = "「相談なんですけど……魔王様の世界征服がなかなか進んでませんガオ……」"

[[dialogue]]
speaker = "カティア"
# 「どうすれば、もっとみんなが魔王様の偉大さに気づいて、ひれ伏すようになるでしょう……？」
line = "「どうすれば、もっとみんなが魔王様の偉大さに気づいて、ひれ伏すようになるでしょう……？」"

[[dialogue]]
speaker = "ミウ"
# 「なるほど……世界征服ですか。素敵な野望ですね」
line = "「なるほど……世界征服ですか。素敵な野望ですね」"

[[dialogue]]
speaker = "カティア"
# 「笑わずに聞いてくれるんですガオ？」
line = "「笑わずに聞いてくれるんですガオ？」"

[[dialogue]]
speaker = "ヒマワリ"
# 「なんで笑うの？　私たちゴールデングースも目指すところは、世界中の裏社会を陰から牛耳ることだもんね！」
line = "「なんで笑うの？　私たちゴールデングースも目指すところは、世界中の裏社会を陰から牛耳ることだもんね！」"

[[dialogue]]
speaker = "カティア"
# 「お、おお～……すごいです……？」
line = "「お、おお～……すごいです……？」"

[[dialogue]]
speaker = "ミウ"
# 「具体的にはどういったプランで世界征服を目論んでいるんですか？」
line = "「具体的にはどういったプランで世界征服を目論んでいるんですか？」"

[[dialogue]]
speaker = "カティア"
# 「魔王様の強さと偉大さと素晴らしさを世界に広めるんだワン！」
line = "「魔王様の強さと偉大さと素晴らしさを世界に広めるんだワン！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「ほうほう、それで？」
line = "「ほうほう、それで？」"

[[dialogue]]
speaker = "カティア"
# 「それだけですよ？　そうすれば自然と世界は魔王様に平伏するワン！」
line = "「それだけですよ？　そうすれば自然と世界は魔王様に平伏するワン！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「うーん、会長さんが強くて凄くて格好いい～！　っていうのはわかるけど……どう思う、ミウ？」
line = "「うーん、会長さんが強くて凄くて格好いい～！　っていうのはわかるけど……どう思う、ミウ？」"

[[dialogue]]
speaker = "ミウ"
# 「そうですね……会長さんの力を誇示するだけで世界を取ろうというのは無謀すぎるかと。まずは小さなところからコツコツとですよ」
line = "「そうですね……会長さんの力を誇示するだけで世界を取ろうというのは無謀すぎるかと。まずは小さなところからコツコツとですよ」"

[[dialogue]]
speaker = "ヒマワリ"
# 「あたしたちゴールデングースもちょっとずつ知名度を上げてきたからね！」
line = "「あたしたちゴールデングースもちょっとずつ知名度を上げてきたからね！」"

[[dialogue]]
speaker = "カティア"
# 「でもあんまりゆっくりしてたら、魔王様の卒業までに間に合わなくないですか？」
line = "「でもあんまりゆっくりしてたら、魔王様の卒業までに間に合わなくないですか？」"

[[dialogue]]
speaker = "ミウ"
# 「だからこそ一歩ずつ着実に、です。急がば回れと言いますからね」
line = "「だからこそ一歩ずつ着実に、です。急がば回れと言いますからね」"

[[dialogue]]
speaker = "ミウ"
# 「最高権力者である会長さんは、既に新星学園を支配下に置いていると言っても過言ではありません」
line = "「最高権力者である会長さんは、既に新星学園を支配下に置いていると言っても過言ではありません」"

[[dialogue]]
speaker = "unk"
# 過言じゃないかな……
line = "過言じゃないかな……"

[[dialogue]]
speaker = "ミウ"
# 「となると次は流星学園……流星市国全域といったところでしょうか」
line = "「となると次は流星学園……流星市国全域といったところでしょうか」"

[[dialogue]]
speaker = "ヒマワリ"
# 「そういえば、この前の星霊祭、カティア先輩は大活躍だったよね！」
line = "「そういえば、この前の星霊祭、カティア先輩は大活躍だったよね！」"

[[dialogue]]
speaker = "カティア"
# 「見ててくれてたガオ？　えへへ、お恥ずかしいです……」
line = "「見ててくれてたガオ？　えへへ、お恥ずかしいです……」"

[[dialogue]]
speaker = "ミウ"
# 「星霊祭の勝利により、新星は流星よりも少し優位に立てたわけですよね。勝利へと導いた会長さんの凄さも流星に広まったでしょうし」
line = "「星霊祭の勝利により、新星は流星よりも少し優位に立てたわけですよね。勝利へと導いた会長さんの凄さも流星に広まったでしょうし」"

[[dialogue]]
speaker = "ミウ"
# 「流星市国を手中に収めるのは時間の問題でしょう。でも世界全土となると、まだまだ時間はかかりそうです」
line = "「流星市国を手中に収めるのは時間の問題でしょう。でも世界全土となると、まだまだ時間はかかりそうです」"

[[dialogue]]
speaker = "ミウ"
# 「そもそも、何をもって世界を征服したとするのか、漠然としすぎなんですよね」
line = "「そもそも、何をもって世界を征服したとするのか、漠然としすぎなんですよね」"

[[dialogue]]
speaker = "ミウ"
# 「『世界』と一言にいっても、世の中には様々な『世界』があるじゃないですか」
line = "「『世界』と一言にいっても、世の中には様々な『世界』があるじゃないですか」"

[[dialogue]]
speaker = "カティア"
# 「……？　世界はひとつじゃないガオ……？」
line = "「……？　世界はひとつじゃないガオ……？」"

[[dialogue]]
speaker = "ミウ"
# 「私たちの人間界だけでなく、魔界、天界もありますけど『世界』によって征服の形は異なります」
line = "「私たちの人間界だけでなく、魔界、天界もありますけど『世界』によって征服の形は異なります」"

[[dialogue]]
speaker = "カティア"
# 「……わふ？」
line = "「……わふ？」"

[[dialogue]]
speaker = "ヒマワリ"
# 「例えばさ、世界経済を牛耳る征服！　なんてのもあるよね。何気ない一言で世界中の株価がドーンと上がっちゃったり下がっちゃったり」
line = "「例えばさ、世界経済を牛耳る征服！　なんてのもあるよね。何気ない一言で世界中の株価がドーンと上がっちゃったり下がっちゃったり」"

[[dialogue]]
speaker = "ヒマワリ"
# 「ネット界でトップ・オブ・トップの動画配信者やインフルエンサーになるのも、ある意味征服じゃないかなー」
line = "「ネット界でトップ・オブ・トップの動画配信者やインフルエンサーになるのも、ある意味征服じゃないかなー」"

[[dialogue]]
speaker = "カティア"
# 「な、なるほど～……？」
line = "「な、なるほど～……？」"

[[dialogue]]
speaker = "ミウ"
# 「一番わかりやすいのは、隣国を次々と制圧する暴君ですね」
line = "「一番わかりやすいのは、隣国を次々と制圧する暴君ですね」"

[[dialogue]]
speaker = "ミウ"
# 「圧政を強いて、支配した地域の人民を奴隷とし、反乱を起こす気力すらなくなるまで労働力としてこき使う──」
line = "「圧政を強いて、支配した地域の人民を奴隷とし、反乱を起こす気力すらなくなるまで労働力としてこき使う──」"

[[dialogue]]
speaker = "カティア"
# 「ガオッ！？　そ、そういうのはよくないです！　魔王様には怖いことはしてほしくないです！」
line = "「ガオッ！？　そ、そういうのはよくないです！　魔王様には怖いことはしてほしくないです！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「カティア先輩は、会長さんに何をしてほしいの？」
line = "「カティア先輩は、会長さんに何をしてほしいの？」"

[[dialogue]]
speaker = "カティア"
# 「が、がお……？　えーと……世界で一番すごくて強くて偉い人になってほしいガオ！」
line = "「が、がお……？　えーと……世界で一番すごくて強くて偉い人になってほしいガオ！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「会長さんが世界的に認められてほしいってことかな？　『世界で最も知名度のある１００人』に選ばれるとか」
line = "「会長さんが世界的に認められてほしいってことかな？　『世界で最も知名度のある１００人』に選ばれるとか」"

[[dialogue]]
speaker = "カティア"
# 「う～～ん？　それは嬉しいですけど、なんだか違う気がします……」
line = "「う～～ん？　それは嬉しいですけど、なんだか違う気がします……」"

[[dialogue]]
speaker = "ミウ"
# 「そうですね……もっとわかりやすく直接的に世界征服に向けたプランでしたら──あ、カティア先輩、お耳を近づけてください」
line = "「そうですね……もっとわかりやすく直接的に世界征服に向けたプランでしたら──あ、カティア先輩、お耳を近づけてください」"

[[dialogue]]
speaker = "カティア"
# 「わふ？　ひゃんっ、くすぐったいですぅ」
line = "「わふ？　ひゃんっ、くすぐったいですぅ」"

[[dialogue]]
speaker = "ミウ"
# 「例えばですね……会長さんの周りにいる女性たちを虜にして……ごにょ、ごにょ、ごにょ……」
line = "「例えばですね……会長さんの周りにいる女性たちを虜にして……ごにょ、ごにょ、ごにょ……」"

[[dialogue]]
speaker = "カティア"
# 「えぇえええぇっ！？　そ、それはいくらなんでもひどすぎませんかー！？」
line = "「えぇえええぇっ！？　そ、それはいくらなんでもひどすぎませんかー！？」"

[[dialogue]]
speaker = "ミウ"
# 「どんな女性でもときめかせちゃう会長さんのカリスマ性なら、これが現実的だと思うんですけど」
line = "「どんな女性でもときめかせちゃう会長さんのカリスマ性なら、これが現実的だと思うんですけど」"

[[dialogue]]
speaker = "カティア"
# 「でもでも魔王様は１人しかいないですし、１日に何回もなんて、いくらなんでも体がもたないっていうか……」
line = "「でもでも魔王様は１人しかいないですし、１日に何回もなんて、いくらなんでも体がもたないっていうか……」"

[[dialogue]]
speaker = "unk"
# どんな世界征服プランを！？
line = "どんな世界征服プランを！？"

[[dialogue]]
speaker = "ミウ"
# 「昔から『英雄色を好む』って言いますし、そのくらい会長さんなら序の口ですよ。そこから派生した別のプランですと……ごにょ、ごにょ、ごにょ」
line = "「昔から『英雄色を好む』って言いますし、そのくらい会長さんなら序の口ですよ。そこから派生した別のプランですと……ごにょ、ごにょ、ごにょ」"

[[dialogue]]
speaker = "カティア"
# 「そ、それはダメですー！　絶対っ！　ま、魔王様、聞こえてないですよね！？」
line = "「そ、それはダメですー！　絶対っ！　ま、魔王様、聞こえてないですよね！？」"

[[dialogue]]
speaker = "unk"
# ちっとも聞こえなかった
line = "ちっとも聞こえなかった"

[[dialogue]]
speaker = "ミウ"
# 「えー、ダメですかー？　みんなが幸せになれる素敵なプランだと思うんですけど」
line = "「えー、ダメですかー？　みんなが幸せになれる素敵なプランだと思うんですけど」"

[[dialogue]]
speaker = "カティア"
# 「わ、私には刺激が強すぎるガオーっ！」
line = "「わ、私には刺激が強すぎるガオーっ！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「あ、そろそろ相談時間終わりだね。どう、カティア先輩、参考になったかな？」
line = "「あ、そろそろ相談時間終わりだね。どう、カティア先輩、参考になったかな？」"

[[dialogue]]
speaker = "カティア"
# 「うぅぅ……難しくてよくわかんないとこもあったけど……そこまでやらなきゃいけないんですガオ……？」
line = "「うぅぅ……難しくてよくわかんないとこもあったけど……そこまでやらなきゃいけないんですガオ……？」"

[[dialogue]]
speaker = "ミウ"
# 「あ、これは注意点なんですけど……世界を手に入れようとする者同士、どうしてもぶつかる時ってあると思うんです」
line = "「あ、これは注意点なんですけど……世界を手に入れようとする者同士、どうしてもぶつかる時ってあると思うんです」"

[[dialogue]]
speaker = "ミウ"
# 「セナリィ社長に危害を加えたり、私たちゴールデングースの邪魔をするようでしたら、考えつく限りの全力で排除させていただきますので」
line = "「セナリィ社長に危害を加えたり、私たちゴールデングースの邪魔をするようでしたら、考えつく限りの全力で排除させていただきますので」"

[[dialogue]]
speaker = "ミウ"
# 「くれぐれも、気をつけてくださいね♪」
line = "「くれぐれも、気をつけてくださいね♪」"

[[dialogue]]
speaker = "カティア"
# 「ひぃっ！？　き、気をつけますワン！」
line = "「ひぃっ！？　き、気をつけますワン！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「お互い世界を牛耳れるように頑張ろうねっ♪」
line = "「お互い世界を牛耳れるように頑張ろうねっ♪」"

[[dialogue]]
speaker = "カティア"
# 「は、はぃぃ……まだまだ世界征服の道は遠いですワン……」
line = "「は、はぃぃ……まだまだ世界征服の道は遠いですワン……」"

[[dialogue]]
speaker = "unk"
# ホンモノの世界征服プランに、カティアはとてつもないカルチャーショックを受けたらしい。
line = "ホンモノの世界征服プランに、カティアはとてつもないカルチャーショックを受けたらしい。"

[[dialogue]]
speaker = "unk"
# まだまだカティアの目指す世界征服への道のりは遠いようであった。
line = "まだまだカティアの目指す世界征服への道のりは遠いようであった。"
