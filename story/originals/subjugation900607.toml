[[dialogue]]
speaker = "イレーナ"
# 「っしゃあ！　やったわね、シャロン！」
line = "「っしゃあ！　やったわね、シャロン！」"

[[dialogue]]
speaker = "シャロン"
# 「はい！　イレーナさまのご助力のおかげです！」
line = "「はい！　イレーナさまのご助力のおかげです！」"

[[dialogue]]
speaker = "unk"
# これで一件落着だな
line = "これで一件落着だな"

[[dialogue]]
speaker = "シャロン"
# 「いいえ、まだですっ！　本番は聖誕祭なのですからっ！　準備の続きをいたしましょう、イレーナさま！」
line = "「いいえ、まだですっ！　本番は聖誕祭なのですからっ！　準備の続きをいたしましょう、イレーナさま！」"

[[dialogue]]
speaker = "イレーナ"
# 「あー……それはもうシャロンに任せたわ」
line = "「あー……それはもうシャロンに任せたわ」"

[[dialogue]]
speaker = "シャロン"
# 「え？　どういう意味でしょう……？」
line = "「え？　どういう意味でしょう……？」"

[[dialogue]]
speaker = "イレーナ"
# 「今回のでちょっと懲りたっていうか……あたしは信仰心の欠片もないエセ聖女だもの。女神様の聖誕祭にそんなヤツが混じってても困るでしょ？」
line = "「今回のでちょっと懲りたっていうか……あたしは信仰心の欠片もないエセ聖女だもの。女神様の聖誕祭にそんなヤツが混じってても困るでしょ？」"

[[dialogue]]
speaker = "イレーナ"
# 「あたしの仕事はさっきのモンスター退治で終わり。このまま教皇庁にでも行って、神官を引退してくるわ」
line = "「あたしの仕事はさっきのモンスター退治で終わり。このまま教皇庁にでも行って、神官を引退してくるわ」"

[[dialogue]]
speaker = "シャロン"
# 「な、なぜですっ。たとえ女神様を信じておられなくとも、イレーナさまは真の聖女様であらせられるではありませんかっ」
line = "「な、なぜですっ。たとえ女神様を信じておられなくとも、イレーナさまは真の聖女様であらせられるではありませんかっ」"

[[dialogue]]
speaker = "イレーナ"
# 「いやそれは聖女としてダメでしょ普通に」
line = "「いやそれは聖女としてダメでしょ普通に」"

[[dialogue]]
speaker = "イレーナ"
# 「あたしなりのけじめよ、けじめ。ついカっとなってシャロンに酷いこと言っちゃったし……」
line = "「あたしなりのけじめよ、けじめ。ついカっとなってシャロンに酷いこと言っちゃったし……」"

[[dialogue]]
speaker = "シャロン"
# 「え……？　今、なんと……」
line = "「え……？　今、なんと……」"

[[dialogue]]
speaker = "イレーナ"
# 「とにかく決めたの！　あたしは神官をやめて普通の女の子に戻る！　じゃあね！」
line = "「とにかく決めたの！　あたしは神官をやめて普通の女の子に戻る！　じゃあね！」"

[[dialogue]]
speaker = "シャロン"
# 「あ……イレーナさま……」
line = "「あ……イレーナさま……」"

[[dialogue]]
speaker = "unk"
# クリスマスパーティー当日──
line = "クリスマスパーティー当日──"

[[dialogue]]
speaker = "イレーナ"
# 「はぁ～……クリスマス前だから忙しいって、教皇庁のやつら、どいつもこいつも取り合ってくれなかったわ……」
line = "「はぁ～……クリスマス前だから忙しいって、教皇庁のやつら、どいつもこいつも取り合ってくれなかったわ……」"

[[dialogue]]
speaker = "イレーナ"
# 「結局まだ神官やめられてない……ブラック企業を抜け出せない社会人ってこんな感じなのかしら……」
line = "「結局まだ神官やめられてない……ブラック企業を抜け出せない社会人ってこんな感じなのかしら……」"

[[dialogue]]
speaker = "イレーナ"
# 「ていうか、あたしも律儀に大聖堂なんて来なきゃいいのに……組織人の習性が抜けないわ」
line = "「ていうか、あたしも律儀に大聖堂なんて来なきゃいいのに……組織人の習性が抜けないわ」"

[[dialogue]]
speaker = "イレーナ"
# 「でもこれだけはシャロンに渡さなきゃ……」
line = "「でもこれだけはシャロンに渡さなきゃ……」"

[[dialogue]]
speaker = "unk"
# イレーナ！　モンスターが出た！
line = "イレーナ！　モンスターが出た！"

[[dialogue]]
speaker = "イレーナ"
# 「は！？　何よいきなり……はいはい、行けばいいんでしょっ」
line = "「は！？　何よいきなり……はいはい、行けばいいんでしょっ」"

[[dialogue]]
speaker = "イレーナ"
# 「こんなところにモンスターが……？　ＤＩＳＣにも反応がないし何かの間違いじゃ──」
line = "「こんなところにモンスターが……？　ＤＩＳＣにも反応がないし何かの間違いじゃ──」"

[[dialogue]]
speaker = "シャロン"
# 「メリークリスマス！」
line = "「メリークリスマス！」"

[[dialogue]]
speaker = "イレーナ"
# 「へ？」
line = "「へ？」"

[[dialogue]]
speaker = "サラン"
# 「メリ～クリスマ～ス♪」
line = "「メリ～クリスマ～ス♪」"

[[dialogue]]
speaker = "蛍火"
# 「メリークリスマス、です」
line = "「メリークリスマス、です」"

[[dialogue]]
speaker = "イレーナ"
# 「え……？　これ、は……？」
line = "「え……？　これ、は……？」"

[[dialogue]]
speaker = "子どもＡ"
# 「わーいっ、サプライズ大成功～！」
line = "「わーいっ、サプライズ大成功～！」"

[[dialogue]]
speaker = "子どもＢ"
# 「えへへ、聖女さまの驚いた顔はじめて見た～！」
line = "「えへへ、聖女さまの驚いた顔はじめて見た～！」"

[[dialogue]]
speaker = "蛍火"
# 「先日は面目ありません。大事の際に留守にしてしまって……」
line = "「先日は面目ありません。大事の際に留守にしてしまって……」"

[[dialogue]]
speaker = "サラン"
# 「でもでも、その分みんなでいろいろがんばったんだ～♪」
line = "「でもでも、その分みんなでいろいろがんばったんだ～♪」"

[[dialogue]]
speaker = "イレーナ"
# 「どういうこと……？」
line = "「どういうこと……？」"

[[dialogue]]
speaker = "シャロン"
# 「ふふ、こうでもしないときっとイレーナさまは来ないと、会長さまが仰ったのです。うまくいったようですね」
line = "「ふふ、こうでもしないときっとイレーナさまは来ないと、会長さまが仰ったのです。うまくいったようですね」"

[[dialogue]]
speaker = "イレーナ"
# 「何よ……。やっぱりモンスター騒ぎはウソってこと？　一体どうしてこんなことを……」
line = "「何よ……。やっぱりモンスター騒ぎはウソってこと？　一体どうしてこんなことを……」"

[[dialogue]]
speaker = "シャロン"
# 「そんなの──決まっているではありませんか」
line = "「そんなの──決まっているではありませんか」"

[[dialogue]]
speaker = "子どもＡ"
# 「ありがとう、聖女さま！　わたしたちのこと、たすけてくれて！」
line = "「ありがとう、聖女さま！　わたしたちのこと、たすけてくれて！」"

[[dialogue]]
speaker = "子どもＢ"
# 「蛍火さんやサランさんに教わりながらね、みんなでお料理やお菓子たくさんつくったの～！」
line = "「蛍火さんやサランさんに教わりながらね、みんなでお料理やお菓子たくさんつくったの～！」"

[[dialogue]]
speaker = "子どもＣ"
# 「はやくたべてたべて～！　こころをこめてつくったから～！」
line = "「はやくたべてたべて～！　こころをこめてつくったから～！」"

[[dialogue]]
speaker = "イレーナ"
# 「この前助けた子たち……？　わわっ、押さないでくださいっ。どうして私ばっかり……！」
line = "「この前助けた子たち……？　わわっ、押さないでくださいっ。どうして私ばっかり……！」"

[[dialogue]]
speaker = "シャロン"
# 「皆イレーナさまと聖誕祭を楽しみたいのです。イレーナさまに感謝しているのですよ」
line = "「皆イレーナさまと聖誕祭を楽しみたいのです。イレーナさまに感謝しているのですよ」"

[[dialogue]]
speaker = "シャロン"
# 「たとえイレーナさまがご自身のことを偽りの聖女だと思われていても……こうして皆に愛と感謝を捧げられるだけのことを、イレーナさまは日々なされておられるのです」
line = "「たとえイレーナさまがご自身のことを偽りの聖女だと思われていても……こうして皆に愛と感謝を捧げられるだけのことを、イレーナさまは日々なされておられるのです」"

[[dialogue]]
speaker = "シャロン"
# 「イレーナさまの善き行いが、今こうしてイレーナさまに返ってきているのです」
line = "「イレーナさまの善き行いが、今こうしてイレーナさまに返ってきているのです」"

[[dialogue]]
speaker = "イレーナ"
# 「はぁ……ったくもう。だからそれが面倒だって言ってんでしょうに……。そういうのが積み重なって聖女にさせられたんだから……」
line = "「はぁ……ったくもう。だからそれが面倒だって言ってんでしょうに……。そういうのが積み重なって聖女にさせられたんだから……」"

[[dialogue]]
speaker = "イレーナ"
# 「でも……まぁ。悪い気はしないけど」
line = "「でも……まぁ。悪い気はしないけど」"

[[dialogue]]
speaker = "unk"
# 相変わらず素直じゃないな……
line = "相変わらず素直じゃないな……"

[[dialogue]]
speaker = "イレーナ"
# 「……あぁん？　何か言ったかしら？」
line = "「……あぁん？　何か言ったかしら？」"

[[dialogue]]
speaker = "unk"
# なんでもありません！
line = "なんでもありません！"

[[dialogue]]
speaker = "子どもＡ"
# 「こそこそお話してないで早くお料理たべよ～！　お腹すいたよ～」
line = "「こそこそお話してないで早くお料理たべよ～！　お腹すいたよ～」"

[[dialogue]]
speaker = "子どもＢ"
# 「聖女さま～、わたし、ケーキたべたーい。はやく切り分けて～」
line = "「聖女さま～、わたし、ケーキたべたーい。はやく切り分けて～」"

[[dialogue]]
speaker = "イレーナ"
# 「はいはい。その前に皆さん、手を洗いましょうね。それと先程のような悪戯はほどほどにしないとブラックサンタにお仕置きされてしまいますよ」
line = "「はいはい。その前に皆さん、手を洗いましょうね。それと先程のような悪戯はほどほどにしないとブラックサンタにお仕置きされてしまいますよ」"

[[dialogue]]
speaker = "子どもＣ"
# 「は～い！」
line = "「は～い！」"

[[dialogue]]
speaker = "イレーナ"
# 「では私も、パーティーにふさわしい装いに着替えましょうか」
line = "「では私も、パーティーにふさわしい装いに着替えましょうか」"

[[dialogue]]
speaker = "イレーナ"
# 「クリスマスといえばサンタクロースですからね。今日のために用意した装いなんですから披露しませんと」
line = "「クリスマスといえばサンタクロースですからね。今日のために用意した装いなんですから披露しませんと」"

[[dialogue]]
speaker = "シャロン"
# 「ふふ。私たちはプレゼントを取りに行きましょうか。お手伝いいただけますよね、会長さま？」
line = "「ふふ。私たちはプレゼントを取りに行きましょうか。お手伝いいただけますよね、会長さま？」"

[[dialogue]]
speaker = "unk"
# もちろん！
line = "もちろん！"
