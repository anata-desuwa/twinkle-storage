[[dialogue]]
speaker = "unk"
# 第３話,たとえそれが運命でも,P
line = "第３話,たとえそれが運命でも,P"

[[dialogue]]
speaker = "unk"
# ある日、ヴィーナスは晴れ着フォームの能力を活かして、おみくじ占いをやっていたのだが――
line = "ある日、ヴィーナスは晴れ着フォームの能力を活かして、おみくじ占いをやっていたのだが――"

[[dialogue]]
speaker = "ヴィーナス"
# 「な、なによこれ……」
line = "「な、なによこれ……」"

[[dialogue]]
speaker = "ヘレナ"
# 「む？　顔色が冴えないが、占いがどうかしたのか、ヴィーナス？」
line = "「む？　顔色が冴えないが、占いがどうかしたのか、ヴィーナス？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ヘレナちゃん……！　見てよ、これ！　おみくじの『縁談』のところ！」
line = "「ヘレナちゃん……！　見てよ、これ！　おみくじの『縁談』のところ！」"

[[dialogue]]
speaker = "ヘレナ"
# 「なになに？　『恋の運命』は最悪？　今世で結ばれることなし、誰にも祝福されず、過酷な運命が待つ？」
line = "「なになに？　『恋の運命』は最悪？　今世で結ばれることなし、誰にも祝福されず、過酷な運命が待つ？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「これってどう考えても、私とクロトの恋人関係が破局しちゃう流れじゃない！」
line = "「これってどう考えても、私とクロトの恋人関係が破局しちゃう流れじゃない！」"

[[dialogue]]
speaker = "ヘレナ"
# 「なるほど、これは酷い。しかも、ヴィーナスの占いはよく当たるからな。まるでそれが運命であるかのように」
line = "「なるほど、これは酷い。しかも、ヴィーナスの占いはよく当たるからな。まるでそれが運命であるかのように」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうでしょ！？　理不尽な結果だわ！」
line = "「そうでしょ！？　理不尽な結果だわ！」"

[[dialogue]]
speaker = "ヘレナ"
# 「して、お前はこのまま、占いの結果を信じて、受け入れるのか？　ヴィーナスよ」
line = "「して、お前はこのまま、占いの結果を信じて、受け入れるのか？　ヴィーナスよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……！　いいえ！　そんなわけないわ！　私のクロトに対する『好き』は、はいそうですかと簡単に諦められるようなものじゃないんだから！」
line = "「……！　いいえ！　そんなわけないわ！　私のクロトに対する『好き』は、はいそうですかと簡単に諦められるようなものじゃないんだから！」"

[[dialogue]]
speaker = "ヘレナ"
# 「であろうな。ならば、話は簡単。我々がリクリエという運命に抗うのと同じだ、ヴィーナスよ――」
line = "「であろうな。ならば、話は簡単。我々がリクリエという運命に抗うのと同じだ、ヴィーナスよ――」"

[[dialogue]]
speaker = "ヘレナ"
# 「お前も、恋の運命に抗うしかあるまい」
line = "「お前も、恋の運命に抗うしかあるまい」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……そうね。そうだわ！　ありがとう、ヘレナちゃん。私、頑張ってみる！」
line = "「……そうね。そうだわ！　ありがとう、ヘレナちゃん。私、頑張ってみる！」"

[[dialogue]]
speaker = "ヘレナ"
# 「ふふっ、それでこそ、九浄家の娘だ」
line = "「ふふっ、それでこそ、九浄家の娘だ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「よ～し、やってやるわ！」
line = "「よ～し、やってやるわ！」"

[[dialogue]]
speaker = "unk"
# それから１週間ほど経って――
line = "それから１週間ほど経って――"

[[dialogue]]
speaker = "ヴィーナス"
# 「うぅ～！　卵焼きを巻くのって、難しいわ！　どうしても崩れちゃう……」
line = "「うぅ～！　卵焼きを巻くのって、難しいわ！　どうしても崩れちゃう……」"

[[dialogue]]
speaker = "蛍火"
# 「ヴィーナスさん、頑張ってください！　少しずつですが、前よりできるようになってますから！」
line = "「ヴィーナスさん、頑張ってください！　少しずつですが、前よりできるようになってますから！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ありがと、蛍火！　私、頑張るわ！」
line = "「ありがと、蛍火！　私、頑張るわ！」"

[[dialogue]]
speaker = "unk"
# ヴィーナス、料理を教わってたのか
line = "ヴィーナス、料理を教わってたのか"

[[dialogue]]
speaker = "蛍火"
# 「あっ、師匠……！」
line = "「あっ、師匠……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「えっ、クロト！？　どうしてここにいることが……！？」
line = "「えっ、クロト！？　どうしてここにいることが……！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「って、ああぁぁ～～～っ！　よそ見したら、卵焼きがぐちゃって、スクランブルエッグにぃ～～～っ！？」
line = "「って、ああぁぁ～～～っ！　よそ見したら、卵焼きがぐちゃって、スクランブルエッグにぃ～～～っ！？」"

[[dialogue]]
speaker = "unk"
# ヴィーナスのちょっと焦げたスクランブルエッグが出来上がった後、カフェテリアの席で話を聞くことになった。
line = "ヴィーナスのちょっと焦げたスクランブルエッグが出来上がった後、カフェテリアの席で話を聞くことになった。"

[[dialogue]]
speaker = "ヴィーナス"
# 「あむっ……もぐもぐ……また卵焼き失敗だわ……」
line = "「あむっ……もぐもぐ……また卵焼き失敗だわ……」"

[[dialogue]]
speaker = "unk"
# 変なタイミングで話しかけてごめん
line = "変なタイミングで話しかけてごめん"

[[dialogue]]
speaker = "ヴィーナス"
# 「ううん。私がクロトに隠し事をしてたのが原因なんだし……」
line = "「ううん。私がクロトに隠し事をしてたのが原因なんだし……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「でも、秘密にしてたのに、どうして私がカフェテリアにいるってわかったの？」
line = "「でも、秘密にしてたのに、どうして私がカフェテリアにいるってわかったの？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「――最近忙しそうにしてたから、ヘレナちゃんに聞いたら場所を教えてくれた？　もう、ヘレナちゃんたら……」
line = "「――最近忙しそうにしてたから、ヘレナちゃんに聞いたら場所を教えてくれた？　もう、ヘレナちゃんたら……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「――なんで蛍火から料理を教わってたのか？　それは……ちょっと言いづらい事情があるというか……」
line = "「――なんで蛍火から料理を教わってたのか？　それは……ちょっと言いづらい事情があるというか……」"

[[dialogue]]
speaker = "unk"
# 俺はヴィーナスの頭に手を置き、髪を撫でながら言った。
line = "俺はヴィーナスの頭に手を置き、髪を撫でながら言った。"

[[dialogue]]
speaker = "unk"
# 俺はヴィーナスの恋人なんだから
line = "俺はヴィーナスの恋人なんだから"

[[dialogue]]
speaker = "unk"
# なにかあるなら頼って欲しい
line = "なにかあるなら頼って欲しい"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロト……」
line = "「クロト……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あのね、実は……」
line = "「あのね、実は……」"

[[dialogue]]
speaker = "unk"
# 彼女から、おみくじ占いのことを打ち明けられる。
line = "彼女から、おみくじ占いのことを打ち明けられる。"

[[dialogue]]
speaker = "ヴィーナス"
# 「でも、私は占い通りに恋人関係がダメになっちゃうのは嫌だったから……だったら、花嫁修行をしよう、って思ったの！」
line = "「でも、私は占い通りに恋人関係がダメになっちゃうのは嫌だったから……だったら、花嫁修行をしよう、って思ったの！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「誰から見ても恋人として相応しい、いい女になれば、周りからちゃんと祝福してもらえるでしょ？」
line = "「誰から見ても恋人として相応しい、いい女になれば、周りからちゃんと祝福してもらえるでしょ？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「だからまずは、料理とか、家事をできるようになろうと思って」
line = "「だからまずは、料理とか、家事をできるようになろうと思って」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それでね、私が花嫁修業を全部終えて、クロトに相応しい女の子だって宣言できるようになったら……」
line = "「それでね、私が花嫁修業を全部終えて、クロトに相応しい女の子だって宣言できるようになったら……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「その時は、正々堂々とプロポーズをするわ──！」
line = "「その時は、正々堂々とプロポーズをするわ──！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「だからクロト、覚悟して待ってなさい」
line = "「だからクロト、覚悟して待ってなさい」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私、必ずやり遂げてみせるから！」
line = "「私、必ずやり遂げてみせるから！」"

[[dialogue]]
speaker = "unk"
# どこまでも真っ直ぐな瞳で言うヴィーナスを前に、俺はスクランブルエッグを素早く口に運んで、全部頬張る。
line = "どこまでも真っ直ぐな瞳で言うヴィーナスを前に、俺はスクランブルエッグを素早く口に運んで、全部頬張る。"

[[dialogue]]
speaker = "ヴィーナス"
# 「ク、クロト……？」
line = "「ク、クロト……？」"

[[dialogue]]
speaker = "unk"
# 飲み込んでから、俺は言った。
line = "飲み込んでから、俺は言った。"

[[dialogue]]
speaker = "unk"
# なら、俺は花嫁修行を手伝う！
line = "なら、俺は花嫁修行を手伝う！"

[[dialogue]]
speaker = "ヴィーナス"
# 「へ？」
line = "「へ？」"

[[dialogue]]
speaker = "unk"
# ヴィーナスは呆気にとられたように、目をぱちくりさせるのだった――
line = "ヴィーナスは呆気にとられたように、目をぱちくりさせるのだった――"
