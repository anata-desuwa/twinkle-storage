[[dialogue]]
speaker = "unk"
# 第２話,メスガキリラクゼーション,P
line = "第２話,メスガキリラクゼーション,P"

[[dialogue]]
speaker = "シャルレーヌ"
# 「ん～……会長さん、何だか顔色が優れませんね。もしかしてお疲れですか？」
line = "「ん～……会長さん、何だか顔色が優れませんね。もしかしてお疲れですか？」"

[[dialogue]]
speaker = "unk"
# ここのところハードワークなんだ
line = "ここのところハードワークなんだ"

[[dialogue]]
speaker = "シャルレーヌ"
# 「ちょっと本格的にお辛そうですねぇ……よろしければ、私が<ruby=い>癒</ruby>やしてあげましょうか<emoji=heart04>　ちょうど２人きりですし」
line = "「ちょっと本格的にお辛そうですねぇ……よろしければ、私が<ruby>癒<rt>い</rt></ruby>やしてあげましょうか<emoji=heart04>　ちょうど２人きりですし」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「……あ～<emoji=heart04>　今、何かいやらしいことを想像しました？　言っておきますけど、まっとうな癒やしですよ？」
line = "「……あ～<emoji=heart04>　今、何かいやらしいことを想像しました？　言っておきますけど、まっとうな癒やしですよ？」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「これでも香水で名を馳せた家の娘ですから。リラックスさせる方法はたくさん知ってるんです♪」
line = "「これでも香水で名を馳せた家の娘ですから。リラックスさせる方法はたくさん知ってるんです♪」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「それじゃあ始めちゃいますね。シャルレーヌの、リラクゼーションコースっ<emoji=heart04>」
line = "「それじゃあ始めちゃいますね。シャルレーヌの、リラクゼーションコースっ<emoji=heart04>」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「疲れを取るためには、まず体を温めることが先決です♪　香りの良いローズヒップティーを淹れてみました。ご賞味ください<emoji=heart04>」
line = "「疲れを取るためには、まず体を温めることが先決です♪　香りの良いローズヒップティーを淹れてみました。ご賞味ください<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# どうしてバレンタインフォームに？
line = "どうしてバレンタインフォームに？"

[[dialogue]]
speaker = "unk"
# それはありがたいんだけど……
line = "それはありがたいんだけど……"

[[dialogue]]
speaker = "シャルレーヌ"
# 「会長さんってエッチな男の子でしょう？　露出の多い恰好の方が癒やされるかな～って♪　キャハハっ<emoji=heart04>」
line = "「会長さんってエッチな男の子でしょう？　露出の多い恰好の方が癒やされるかな～って♪　キャハハっ<emoji=heart04>」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「ほぉら、シャルレーヌが心を込めて注いだお紅茶、お残ししちゃダメですよ～？」
line = "「ほぉら、シャルレーヌが心を込めて注いだお紅茶、お残ししちゃダメですよ～？」"

[[dialogue]]
speaker = "unk"
# あっ。すごくおいしい……！
line = "あっ。すごくおいしい……！"

[[dialogue]]
speaker = "シャルレーヌ"
# 「ふふっ。ローズヒップは酸味の強い紅茶です」
line = "「ふふっ。ローズヒップは酸味の強い紅茶です」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「ビタミンがと～っても豊富ですし、気分の落ち着く薔薇の香りもたっぷり。体がほぐれていくでしょう？」
line = "「ビタミンがと～っても豊富ですし、気分の落ち着く薔薇の香りもたっぷり。体がほぐれていくでしょう？」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「香水の原料にもなる薔薇ですからね。あ、でも香りが気に入らなければ言ってください」
line = "「香水の原料にもなる薔薇ですからね。あ、でも香りが気に入らなければ言ってください」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「どんなにいい香りでも、感じ方には個人差があるので」
line = "「どんなにいい香りでも、感じ方には個人差があるので」"

[[dialogue]]
speaker = "unk"
# 大丈夫、すごくいい香りだよ
line = "大丈夫、すごくいい香りだよ"

[[dialogue]]
speaker = "シャルレーヌ"
# 「それは良かったです♪　会長さんにぴったりの薔薇だと以前から思ってたので……やっぱり似た者同士、肌に合うんでしょうか<emoji=heart04>」
line = "「それは良かったです♪　会長さんにぴったりの薔薇だと以前から思ってたので……やっぱり似た者同士、肌に合うんでしょうか<emoji=heart04>」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「あ、ご存じないんですか～？　ローズヒップの和名を……♪」
line = "「あ、ご存じないんですか～？　ローズヒップの和名を……♪」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「『犬薔薇』って言うんですよ♪　私にいっつも負けちゃってる、可愛いワンちゃんな会長さんには、ぴったりでしたね～<emoji=heart04>」
line = "「『犬薔薇』って言うんですよ♪　私にいっつも負けちゃってる、可愛いワンちゃんな会長さんには、ぴったりでしたね～<emoji=heart04>」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「くふふ<emoji=heart04>　それじゃあ体も温まったでしょうし、ここからはコリをほぐしちゃいましょう」
line = "「くふふ<emoji=heart04>　それじゃあ体も温まったでしょうし、ここからはコリをほぐしちゃいましょう」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「こうやって、デスクワークで凝った肩をお揉みしてあげますね～……わぁ、ガッチガチ～<emoji=heart04>」
line = "「こうやって、デスクワークで凝った肩をお揉みしてあげますね～……わぁ、ガッチガチ～<emoji=heart04>」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「ダメじゃないですかあ、会長さん。こぉんなにガチガチに硬くしちゃったら～<emoji=heart04>」
line = "「ダメじゃないですかあ、会長さん。こぉんなにガチガチに硬くしちゃったら～<emoji=heart04>」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「いっぱい、溜めちゃったんですねー……<emoji=heart04>　溜めすぎは体に毒ですよー？　溜まっちゃう前に、定期的に発散しないと～<emoji=heart04>」
line = "「いっぱい、溜めちゃったんですねー……<emoji=heart04>　溜めすぎは体に毒ですよー？　溜まっちゃう前に、定期的に発散しないと～<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ま、負けないぞ……！
line = "ま、負けないぞ……！"

[[dialogue]]
speaker = "シャルレーヌ"
# 「え～？　これ、リラクゼーションのためのマッサージですよぉ？　勝ち負けの話なんてしてましたっけ～<emoji=heart04>」
line = "「え～？　これ、リラクゼーションのためのマッサージですよぉ？　勝ち負けの話なんてしてましたっけ～<emoji=heart04>」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「おっといけない♪　疲れを体の外に出すおまじない、ちゃーんとしなくちゃ<emoji=heart04>」
line = "「おっといけない♪　疲れを体の外に出すおまじない、ちゃーんとしなくちゃ<emoji=heart04>」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「ほぉら出せ<emoji=heart04>　思いっきり出せ<emoji=heart04>　シャルレーヌのモミモミマッサージで～……い～っぱい<emoji=heart04>　出せ出せ出せ出せ出せっ<emoji=heart04><emoji=heart04><emoji=heart04>」
line = "「ほぉら出せ<emoji=heart04>　思いっきり出せ<emoji=heart04>　シャルレーヌのモミモミマッサージで～……い～っぱい<emoji=heart04>　出せ出せ出せ出せ出せっ<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ──もう負けでいいです！　許して！！
line = "──もう負けでいいです！　許して！！"

[[dialogue]]
speaker = "シャルレーヌ"
# 「え～。さっきまで負けないって言ってたのに。手のひら大回転ですね～<emoji=heart04>　なっさけなぁ～い<emoji=heart04>」
line = "「え～。さっきまで負けないって言ってたのに。手のひら大回転ですね～<emoji=heart04>　なっさけなぁ～い<emoji=heart04>」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「──あら、誰か来たみたいね」
line = "「──あら、誰か来たみたいね」"

[[dialogue]]
speaker = "マトイ"
# 「会長、お疲れ様～……って？　シャルレーヌちゃんだ！」
line = "「会長、お疲れ様～……って？　シャルレーヌちゃんだ！」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「マトイ先輩。ご無沙汰しております」
line = "「マトイ先輩。ご無沙汰しております」"

[[dialogue]]
speaker = "マトイ"
# 「久しぶりだね。星徒会に何か用事かな？」
line = "「久しぶりだね。星徒会に何か用事かな？」"

