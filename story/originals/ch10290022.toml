speaker = "シャルレーヌ"
# 「はい、ですがもう用事は終わりました。今は会長さんにお茶をお出ししていたところなんです」
line = "「はい、ですがもう用事は終わりました。今は会長さんにお茶をお出ししていたところなんです」"

[[dialogue]]
speaker = "マトイ"
# 「そうだったんだ。でもごめんね、お客様にお茶を出させちゃうだなんて」
line = "「そうだったんだ。でもごめんね、お客様にお茶を出させちゃうだなんて」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「いえ。私から頼み込んだんです。何だか会長さん、すごく疲れが溜まってたみたいでしたから……」
line = "「いえ。私から頼み込んだんです。何だか会長さん、すごく疲れが溜まってたみたいでしたから……」"

[[dialogue]]
speaker = "マトイ"
# 「そっかぁ～。うちの会長の心配をしてくれてありがとね、シャルレーヌちゃん。流石はお付き合いしてる彼女さんってところかな？」
line = "「そっかぁ～。うちの会長の心配をしてくれてありがとね、シャルレーヌちゃん。流石はお付き合いしてる彼女さんってところかな？」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「私、会長さんとお付き合いはしていませんよ？」
line = "「私、会長さんとお付き合いはしていませんよ？」"

[[dialogue]]
speaker = "マトイ"
# 「ええっ、そうなの！？　よく一緒にいるから、てっきり……！」
line = "「ええっ、そうなの！？　よく一緒にいるから、てっきり……！」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「たかが魔界の一貴族と、世界を救った魔王様では、釣り合いも取れませんから♪」
line = "「たかが魔界の一貴族と、世界を救った魔王様では、釣り合いも取れませんから♪」"

[[dialogue]]
speaker = "マトイ"
# 「む～、そんなことないと思うけどなぁ。会長だってシャルレーヌちゃんのこと、大切に思ってるはずだし……」
line = "「む～、そんなことないと思うけどなぁ。会長だってシャルレーヌちゃんのこと、大切に思ってるはずだし……」"

[[dialogue]]
speaker = "マトイ"
# 「──っと。ヴィーナスからメッセージだ。……え～っ、何でそんなことになってるの！？」
line = "「──っと。ヴィーナスからメッセージだ。……え～っ、何でそんなことになってるの！？」"

[[dialogue]]
speaker = "マトイ"
# 「ごめん会長、またちょっと出かけてくるね！　シャルレーヌちゃんもお客様なんだから、ゆっくりしていってね！」
line = "「ごめん会長、またちょっと出かけてくるね！　シャルレーヌちゃんもお客様なんだから、ゆっくりしていってね！」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「ありがとうございます、マトイ先輩♪　いってらっしゃいませ」
line = "「ありがとうございます、マトイ先輩♪　いってらっしゃいませ」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「くふふっ<emoji=heart04>　マトイ先輩、私たちがお付き合いしていると思ってたみたいですよ？　そういう噂が流れてるんでしょうか？」
line = "「くふふっ<emoji=heart04>　マトイ先輩、私たちがお付き合いしていると思ってたみたいですよ？　そういう噂が流れてるんでしょうか？」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「いっそのこと、噂を本当のモノにしちゃいますー？　私に屈服します～って宣言、しちゃいますか～？」
line = "「いっそのこと、噂を本当のモノにしちゃいますー？　私に屈服します～って宣言、しちゃいますか～？」"

[[dialogue]]
