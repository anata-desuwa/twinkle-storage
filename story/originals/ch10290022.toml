[[dialogue]]
speaker = "シャルレーヌ"
# 「キャハハ<emoji=heart04>　そうやって強がりする会長さん、嫌いじゃないですよ？」
line = "「キャハハ<emoji=heart04>　そうやって強がりする会長さん、嫌いじゃないですよ？」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「それじゃあマッサージの続きをしましょうか～<emoji=heart04>　ほおら、いっぱい出ぁせ<emoji=heart04>　しこたま出せ<emoji=heart04>　出せ出せ、出～せっ<emoji=heart04>」
line = "「それじゃあマッサージの続きをしましょうか～<emoji=heart04>　ほおら、いっぱい出ぁせ<emoji=heart04>　しこたま出せ<emoji=heart04>　出せ出せ、出～せっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そうして俺は再び、シャルレーヌに過激なマッサージを仕掛けられ、目を白黒させるのだった──
line = "そうして俺は再び、シャルレーヌに過激なマッサージを仕掛けられ、目を白黒させるのだった──"
