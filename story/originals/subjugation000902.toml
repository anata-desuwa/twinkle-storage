[[dialogue]]
speaker = "unk"
# ある日の放課後。
line = "ある日の放課後。"

[[dialogue]]
speaker = "unk"
# 俺は、学園から星徒会に依頼があって、保健室へと調査にやってきていた。
line = "俺は、学園から星徒会に依頼があって、保健室へと調査にやってきていた。"

[[dialogue]]
speaker = "unk"
# すると――
line = "すると――"

[[dialogue]]
speaker = "ソフレ"
# 「すぅ……すぅ……。スヤスヤ……♪」
line = "「すぅ……すぅ……。スヤスヤ……♪」"

[[dialogue]]
speaker = "unk"
# 見たことがない子だ。制服から、流星学園の生徒のようだが、どうして新星学園の保健室で眠っているのだろうと思ってると――
line = "見たことがない子だ。制服から、流星学園の生徒のようだが、どうして新星学園の保健室で眠っているのだろうと思ってると――"

[[dialogue]]
speaker = "ソフレ"
# 「ん……。ふわぁ～……」
line = "「ん……。ふわぁ～……」"

[[dialogue]]
speaker = "ソフレ"
# 「お前……誰なの？」
line = "「お前……誰なの？」"

[[dialogue]]
speaker = "ソフレ"
# 「――新星学園の星徒会長？　ああ、そういえば、転入してすぐに会長になったっていう話を、どこかで聞いたような気もするのだわ」
line = "「――新星学園の星徒会長？　ああ、そういえば、転入してすぐに会長になったっていう話を、どこかで聞いたような気もするのだわ」"

[[dialogue]]
speaker = "unk"
# キミの名前は？
line = "キミの名前は？"

[[dialogue]]
speaker = "ソフレ"
# 「ソフレは、流星学園の……今年は２年生だったわね」
line = "「ソフレは、流星学園の……今年は２年生だったわね」"

[[dialogue]]
speaker = "ソフレ"
# 「<b>吸血鬼</b>の、ソフレ・ヴァートリンよ」
line = "「<b>吸血鬼</b>の、ソフレ・ヴァートリンよ」"

[[dialogue]]
speaker = "ソフレ"
# 「……なに？　ソフレが吸血鬼であることに驚いているの？」
line = "「……なに？　ソフレが吸血鬼であることに驚いているの？」"

[[dialogue]]
speaker = "ソフレ"
# 「でも、事実なのだわ。こう見えて、２００年以上生きているんだから……ふわぁ～……」
line = "「でも、事実なのだわ。こう見えて、２００年以上生きているんだから……ふわぁ～……」"

[[dialogue]]
speaker = "ソフレ"
# 「スヤァ～♪」
line = "「スヤァ～♪」"

[[dialogue]]
speaker = "ソフレ"
# 「スヤスヤ……♪」
line = "「スヤスヤ……♪」"

[[dialogue]]
speaker = "unk"
# って、いきなり寝た！？
line = "って、いきなり寝た！？"

[[dialogue]]
speaker = "ソフレ"
# 「ん～……体を揺すったりして、なんなのだわ」
line = "「ん～……体を揺すったりして、なんなのだわ」"

[[dialogue]]
speaker = "ソフレ"
# 「――体調は大丈夫なのかって？　別に平気なのよ」
line = "「――体調は大丈夫なのかって？　別に平気なのよ」"

[[dialogue]]
speaker = "ソフレ"
# 「ソフレはただ、お昼寝するのが好きなだけなのだわ。だから、邪魔して起こさないで欲しいのよ」
line = "「ソフレはただ、お昼寝するのが好きなだけなのだわ。だから、邪魔して起こさないで欲しいのよ」"

[[dialogue]]
speaker = "ソフレ"
# 「ただでさえ、最近はうるさい奴のせいで、安心してお昼寝できる場所がなくなっているっていうのに……」
line = "「ただでさえ、最近はうるさい奴のせいで、安心してお昼寝できる場所がなくなっているっていうのに……」"

[[dialogue]]
speaker = "unk"
# うるさい奴……？
line = "うるさい奴……？"

[[dialogue]]
speaker = "ソフレ"
# 「この場所はまだ見つかってない、ソフレお気に入りのお昼寝スポットなのよ」
line = "「この場所はまだ見つかってない、ソフレお気に入りのお昼寝スポットなのよ」"

[[dialogue]]
speaker = "フェリシー"
# 「失礼しま～す！　って――」
line = "「失礼しま～す！　って――」"

[[dialogue]]
speaker = "フェリシー"
# 「あーーーっ！　ソフレ！　いつの間にか教室からいなくなってると思ったら、こんなところに！」
line = "「あーーーっ！　ソフレ！　いつの間にか教室からいなくなってると思ったら、こんなところに！」"

[[dialogue]]
speaker = "ソフレ"
# 「ギャーーーッ！？　フェリシー！？　見つかったのだわ！」
line = "「ギャーーーッ！？　フェリシー！？　見つかったのだわ！」"

[[dialogue]]
speaker = "ソフレ"
# 「ソフレの、心のオアシスが……！」
line = "「ソフレの、心のオアシスが……！」"

[[dialogue]]
speaker = "フェリシー"
# 「というか、一緒にいるのは新星学園の会長さん……？　えっと……どういうことなの？」
line = "「というか、一緒にいるのは新星学園の会長さん……？　えっと……どういうことなの？」"

[[dialogue]]
speaker = "ソフレ"
# 「ソフレの方が聞きたいのだわ！」
line = "「ソフレの方が聞きたいのだわ！」"

[[dialogue]]
speaker = "unk"
# そんな形で、俺は保健室で新たな出会いをしたのだった――
line = "そんな形で、俺は保健室で新たな出会いをしたのだった――"
