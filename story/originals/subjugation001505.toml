[[dialogue]]
speaker = "ジュリエッテ"
# 「きゅぅ」
line = "「きゅぅ」"

[[dialogue]]
speaker = "マリーベル"
# 「はぁ、はぁ……どうにかなったわね」
line = "「はぁ、はぁ……どうにかなったわね」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「こ、こんなはずでは……」
line = "「こ、こんなはずでは……」"

[[dialogue]]
speaker = "ジュリエッテ"
# （どういうことでございますの……！？　さっきわたくしがトドメを刺そうとしたら、膨大な星力に吹き飛ばされて……）
line = "（どういうことでございますの……！？　さっきわたくしがトドメを刺そうとしたら、膨大な星力に吹き飛ばされて……）"

[[dialogue]]
speaker = "ジュリエッテ"
# （この方の星力は吸い尽くしたはず。ですのに、まだ星力を残していた……？）
line = "（この方の星力は吸い尽くしたはず。ですのに、まだ星力を残していた……？）"

[[dialogue]]
speaker = "ジュリエッテ"
# （いいえ……この方、守護星が<b>２つ</b>あった……！？　そんなのありでございますの……！？）
line = "（いいえ……この方、守護星が<b>２つ</b>あった……！？　そんなのありでございますの……！？）"

[[dialogue]]
speaker = "マリーベル"
# 「私１人に負けるなんて、あなた本当にコラプサーなの？」
line = "「私１人に負けるなんて、あなた本当にコラプサーなの？」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「わたくし、単独での戦闘能力はコラプサーでも最弱でございまして……」
line = "「わたくし、単独での戦闘能力はコラプサーでも最弱でございまして……」"

[[dialogue]]
speaker = "ジュリエッテ"
# （うぅ～～～っ！　屈辱！　屈辱でございますわ！　わたくしがこんな、プリマステラでもないザコ星騎士にやられるなんて～っ！）
line = "（うぅ～～～っ！　屈辱！　屈辱でございますわ！　わたくしがこんな、プリマステラでもないザコ星騎士にやられるなんて～っ！）"

[[dialogue]]
speaker = "マリーベル"
# 「ぐっ……首輪が……」
line = "「ぐっ……首輪が……」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「どうされましたか？」
line = "「どうされましたか？」"

[[dialogue]]
speaker = "マリーベル"
# 「敵に教える義理はないんだけど……まぁいいわ。私は星力を制御しきれなくて、力を出し過ぎると首輪が絞まって止めるようになってるの」
line = "「敵に教える義理はないんだけど……まぁいいわ。私は星力を制御しきれなくて、力を出し過ぎると首輪が絞まって止めるようになってるの」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「何ですのそれ。生きた爆弾みてーなやつでございますわね……」
line = "「何ですのそれ。生きた爆弾みてーなやつでございますわね……」"

[[dialogue]]
speaker = "マリーベル"
# 「生きた爆弾……まぁそんなものね」
line = "「生きた爆弾……まぁそんなものね」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「笑うところじゃねーでございますの」
line = "「笑うところじゃねーでございますの」"

[[dialogue]]
speaker = "unk"
# マリーベル！
line = "マリーベル！"

[[dialogue]]
speaker = "マリーベル"
# 「会長さん？　どうしてこんなところに？」
line = "「会長さん？　どうしてこんなところに？」"

[[dialogue]]
speaker = "unk"
# カティアを追ってきたんだ
line = "カティアを追ってきたんだ"

[[dialogue]]
speaker = "マリーベル"
# 「カティアさんもこのアステラにいるの？　それは心配ね……」
line = "「カティアさんもこのアステラにいるの？　それは心配ね……」"

[[dialogue]]
speaker = "マリーベル"
# 「何か言いたそうね？　プリマステラではない星騎士がアステラに入ってはいけないって？」
line = "「何か言いたそうね？　プリマステラではない星騎士がアステラに入ってはいけないって？」"

[[dialogue]]
speaker = "unk"
# 危ないし規則違反だよ
line = "危ないし規則違反だよ"

[[dialogue]]
speaker = "マリーベル"
# 「現に私は無事なんだら別にいいでしょ。理解に苦しむ制度だわ」
line = "「現に私は無事なんだら別にいいでしょ。理解に苦しむ制度だわ」"

[[dialogue]]
speaker = "マリーベル"
# 「それよりも会長さん、丁度コラプサーを捕まえたのだけど」
line = "「それよりも会長さん、丁度コラプサーを捕まえたのだけど」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「はじめまして、魔王様……わたくし、ジュリエッテ・ハルヴィーノと申しますの」
line = "「はじめまして、魔王様……わたくし、ジュリエッテ・ハルヴィーノと申しますの」"

[[dialogue]]
speaker = "unk"
# 君がセレスティアを奪った犯人？
line = "君がセレスティアを奪った犯人？"

[[dialogue]]
speaker = "ジュリエッテ"
# 「いいえ、違うでございますわ……ですが、その犯人について心当たりがありましてよ」
line = "「いいえ、違うでございますわ……ですが、その犯人について心当たりがありましてよ」"

[[dialogue]]
speaker = "マリーベル"
# 「犯人がどこにいるか知っているの？」
line = "「犯人がどこにいるか知っているの？」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「ふふ、その質問に答えるには、いくつか条件がございましてよ」
line = "「ふふ、その質問に答えるには、いくつか条件がございましてよ」"

[[dialogue]]
speaker = "マリーベル"
# 「あなた、自分の立場を理解しているの？」
line = "「あなた、自分の立場を理解しているの？」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「もちろん理解していましてよ。わたくしは哀れな捕虜……焼くなり煮るなり好きにしてくださいまし……」
line = "「もちろん理解していましてよ。わたくしは哀れな捕虜……焼くなり煮るなり好きにしてくださいまし……」"

[[dialogue]]
speaker = "マリーベル"
# 「そんなことはしないわよ。それよりも、仲間のコラプサーについて教えてほしいのだけど」
line = "「そんなことはしないわよ。それよりも、仲間のコラプサーについて教えてほしいのだけど」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「もちろんオッケーでございますわ」
line = "「もちろんオッケーでございますわ」"

[[dialogue]]
speaker = "unk"
# そんな簡単に仲間を裏切っていいの？
line = "そんな簡単に仲間を裏切っていいの？"

[[dialogue]]
speaker = "ジュリエッテ"
# 「実はわたくし……コラプサーに無理やり従わされているんでございますよ……」
line = "「実はわたくし……コラプサーに無理やり従わされているんでございますよ……」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「わたくし、本当は星騎士の方々と対立するのなんて、嫌で嫌で仕方ないのですけど……あの悪鬼羅刹のごときコラプサーたちに脅されて仕方なく……うう……」
line = "「わたくし、本当は星騎士の方々と対立するのなんて、嫌で嫌で仕方ないのですけど……あの悪鬼羅刹のごときコラプサーたちに脅されて仕方なく……うう……」"

[[dialogue]]
speaker = "マリーベル"
# 「その割にはいきなり襲ってきたけれど」
line = "「その割にはいきなり襲ってきたけれど」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「本当はあなた様を攻撃した時も心を酷く痛めていましたの……。わたくし演技派でございますので、そうは見えなかったでしょうが……」
line = "「本当はあなた様を攻撃した時も心を酷く痛めていましたの……。わたくし演技派でございますので、そうは見えなかったでしょうが……」"

[[dialogue]]
speaker = "マリーベル"
# 「……会長さんはどう思う？　彼女を信用していいと思うかしら」
line = "「……会長さんはどう思う？　彼女を信用していいと思うかしら」"

[[dialogue]]
speaker = "unk"
# 正直怪しい……けど、貴重な手がかりだから
line = "正直怪しい……けど、貴重な手がかりだから"

[[dialogue]]
speaker = "マリーベル"
# 「そうね、カティアさんも心配だし、今は少しでも情報が欲しいわ」
line = "「そうね、カティアさんも心配だし、今は少しでも情報が欲しいわ」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「でしたら、今からわたくしたちは仲間ですわね……！」
line = "「でしたら、今からわたくしたちは仲間ですわね……！」"

[[dialogue]]
speaker = "マリーベル"
# 「一時休戦……といったところかしら。怪しい動きを見せれば串刺しにするわ」
line = "「一時休戦……といったところかしら。怪しい動きを見せれば串刺しにするわ」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「まあ、少しも警戒心を緩めないなんて素敵でございますわね」
line = "「まあ、少しも警戒心を緩めないなんて素敵でございますわね」"

[[dialogue]]
speaker = "マリーベル"
# 「私には仲間なんていらないのよ」
line = "「私には仲間なんていらないのよ」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「あらまあ、悲しい人でございますわね。魔王様はわたくしと仲良くしてくださいますよね？」
line = "「あらまあ、悲しい人でございますわね。魔王様はわたくしと仲良くしてくださいますよね？」"

[[dialogue]]
speaker = "unk"
# 今のところはね
line = "今のところはね"

[[dialogue]]
speaker = "ジュリエッテ"
# 「その言葉で充分でございますわ♪　それでは、もう１人のコラプサー……イングリット様の元へ向かいましょう」
line = "「その言葉で充分でございますわ♪　それでは、もう１人のコラプサー……イングリット様の元へ向かいましょう」"
