[[dialogue]]
speaker = "モンスター"
# 「ンギャァアアアッス！！」
line = "「ンギャァアアアッス！！」"

[[dialogue]]
speaker = "モンスター"
# 「ンゴォォォッ！！」
line = "「ンゴォォォッ！！」"

[[dialogue]]
speaker = "リーナ"
# 「あはは、モンスターいっぱいいるー！」
line = "「あはは、モンスターいっぱいいるー！」"

[[dialogue]]
speaker = "イングリット"
# 「……邪魔をするな。私の獲物だっ！」
line = "「……邪魔をするな。私の獲物だっ！」"

[[dialogue]]
speaker = "キサナ"
# 「だってよ、どうする？」
line = "「だってよ、どうする？」"

[[dialogue]]
speaker = "レイラ"
# 「知ーらない。コラプサーの首領は私だもん。行くよ、キサナ、リーナ！」
line = "「知ーらない。コラプサーの首領は私だもん。行くよ、キサナ、リーナ！」"

[[dialogue]]
speaker = "キサナ"
# 「よっしゃ、ひと暴れすっか！　来い、雑魚モンスターども！」
line = "「よっしゃ、ひと暴れすっか！　来い、雑魚モンスターども！」"

[[dialogue]]
speaker = "unk"
# キサナの銃撃がイングリットを取り囲んでいたモンスターに降り注いだ。攻撃を受けたモンスターの注意がキサナへ向く。
line = "キサナの銃撃がイングリットを取り囲んでいたモンスターに降り注いだ。攻撃を受けたモンスターの注意がキサナへ向く。"

[[dialogue]]
speaker = "イングリット"
# 「ちっ、余計なことを」
line = "「ちっ、余計なことを」"

[[dialogue]]
speaker = "キサナ"
# 「言ってろ！」
line = "「言ってろ！」"

[[dialogue]]
speaker = "リーナ"
# 「スイカ割りできなかったから、代わりにモンスター割りするね！」
line = "「スイカ割りできなかったから、代わりにモンスター割りするね！」"

[[dialogue]]
speaker = "モンスター"
# 「ギャッ！？」
line = "「ギャッ！？」"

[[dialogue]]
speaker = "リーナ"
# 「そ～れ♪」
line = "「そ～れ♪」"

[[dialogue]]
speaker = "リーナ"
# 「あははは！　えい！　えい！　えい！」
line = "「あははは！　えい！　えい！　えい！」"

[[dialogue]]
speaker = "unk"
# リーナがバットを振り回すたび、モンスターが木っ端微塵に砕けていく。
line = "リーナがバットを振り回すたび、モンスターが木っ端微塵に砕けていく。"

[[dialogue]]
speaker = "レイラ"
# 「ＯＨ～、ワイルド……。じゃあ私も……それ！」
line = "「ＯＨ～、ワイルド……。じゃあ私も……それ！」"

[[dialogue]]
speaker = "unk"
# モンスターの頭上にマイクロブラックホールが落ち、触れたそばからモンスターが形を歪めながら吸い込まれていく。
line = "モンスターの頭上にマイクロブラックホールが落ち、触れたそばからモンスターが形を歪めながら吸い込まれていく。"

[[dialogue]]
speaker = "イングリット"
# 「……くっ、私ひとりで、十分だと言っているだろう……！」
line = "「……くっ、私ひとりで、十分だと言っているだろう……！」"

[[dialogue]]
speaker = "キサナ"
# 「はっ、そう言いながらフラフラじゃねぇか。それにテメェに指図される謂れはねぇ！」
line = "「はっ、そう言いながらフラフラじゃねぇか。それにテメェに指図される謂れはねぇ！」"

[[dialogue]]
speaker = "キサナ"
# 「オラオラ、ハチの巣にされたいヤツからかかってこい！」
line = "「オラオラ、ハチの巣にされたいヤツからかかってこい！」"

[[dialogue]]
speaker = "キサナ"
# 「ハハ！　いつものも悪くねぇが、やっぱ銃は使いやすいな！」
line = "「ハハ！　いつものも悪くねぇが、やっぱ銃は使いやすいな！」"

[[dialogue]]
speaker = "モンスター"
# 「クルルァアッ！！」
line = "「クルルァアッ！！」"

[[dialogue]]
speaker = "レイラ"
# 「リーナ、お願い！」
line = "「リーナ、お願い！」"

[[dialogue]]
speaker = "リーナ"
# 「うん、レイラお姉ちゃんの力受け取ったよ！」
line = "「うん、レイラお姉ちゃんの力受け取ったよ！」"

[[dialogue]]
speaker = "リーナ"
# 「いっけー！　トゲトゲスマーッシュ！」
line = "「いっけー！　トゲトゲスマーッシュ！」"

[[dialogue]]
speaker = "unk"
# リーナのバットがモンスターを叩き潰し、衝撃でクーラーボックスが宙に投げ出される。
line = "リーナのバットがモンスターを叩き潰し、衝撃でクーラーボックスが宙に投げ出される。"

[[dialogue]]
speaker = "レイラ"
# 「おっとっと……キャァッチ！　クーラーボックス、獲ったどー！」
line = "「おっとっと……キャァッチ！　クーラーボックス、獲ったどー！」"

[[dialogue]]
speaker = "キサナ"
# 「よし、大物は仕留めたな。こっちも片ぁつけんぞ」
line = "「よし、大物は仕留めたな。こっちも片ぁつけんぞ」"

[[dialogue]]
speaker = "イングリット"
# 「……うるさい」
line = "「……うるさい」"

[[dialogue]]
speaker = "キサナ"
# 「あ？　テメェ、なんかおかしいぞ。いや、いつも頭おかしいけどよ」
line = "「あ？　テメェ、なんかおかしいぞ。いや、いつも頭おかしいけどよ」"

[[dialogue]]
speaker = "キサナ"
# 「ま、そっちはレイラの仕事だ。アタシには関係ねえ」
line = "「ま、そっちはレイラの仕事だ。アタシには関係ねえ」"

[[dialogue]]
speaker = "キサナ"
# 「これで終わりだ！　スプラッシュザッパー！」
line = "「これで終わりだ！　スプラッシュザッパー！」"

[[dialogue]]
speaker = "レイラ"
# 「イングリット、大丈夫！？」
line = "「イングリット、大丈夫！？」"

[[dialogue]]
speaker = "イングリット"
# 「……これで、邪魔者はいなく、なった。私と、戦え……」
line = "「……これで、邪魔者はいなく、なった。私と、戦え……」"

[[dialogue]]
speaker = "レイラ"
# 「イングリット！？」
line = "「イングリット！？」"

[[dialogue]]
speaker = "イングリット"
# 「すー……すー……」
line = "「すー……すー……」"

[[dialogue]]
speaker = "レイラ"
# 「あ、寝てる……ふふ、寝顔だけは天使みたいなんだから」
line = "「あ、寝てる……ふふ、寝顔だけは天使みたいなんだから」"

[[dialogue]]
speaker = "リーナ"
# 「イングリットお姉ちゃん、もともと天使だよ？」
line = "「イングリットお姉ちゃん、もともと天使だよ？」"

[[dialogue]]
speaker = "イングリット"
# 「むにゃ……ふはは、私の、勝ちだ……むにゃ……」
line = "「むにゃ……ふはは、私の、勝ちだ……むにゃ……」"

[[dialogue]]
speaker = "キサナ"
# 「こいつ、夢の中でも戦ってんのかよ……」
line = "「こいつ、夢の中でも戦ってんのかよ……」"

[[dialogue]]
speaker = "レイラ"
# 「もう。イングリット、本当に変わらないんだから……つんつん」
line = "「もう。イングリット、本当に変わらないんだから……つんつん」"

[[dialogue]]
speaker = "イングリット"
# 「ん……んみゅ……」
line = "「ん……んみゅ……」"
