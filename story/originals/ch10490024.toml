[[dialogue]]
speaker = "unk"
# 第４話,紅明の子守唄,P
line = "第４話,紅明の子守唄,P"

[[dialogue]]
speaker = "unk"
# もうすぐ冬が終わろうという季節の変わり目に、俺は風邪を引いてしまった。しかし、母さんが仕事で家を空けている為、自炊しようと起き上がっていると――
line = "もうすぐ冬が終わろうという季節の変わり目に、俺は風邪を引いてしまった。しかし、母さんが仕事で家を空けている為、自炊しようと起き上がっていると――"

[[dialogue]]
speaker = "紅明"
# 「おいっす、ダーリンっ。『見るエナジードリンク』ことアタシ、牛紅明が元気をお届けにきたっしょ♪」
line = "「おいっす、ダーリンっ。『見るエナジードリンク』ことアタシ、牛紅明が元気をお届けにきたっしょ♪」"

[[dialogue]]
speaker = "紅明"
# 「ん？　いつもよりテンション控えめ？　今日はダーリンの看病にきたからね～」
line = "「ん？　いつもよりテンション控えめ？　今日はダーリンの看病にきたからね～」"

[[dialogue]]
speaker = "紅明"
# 「――風邪が移るかも？　そこは気を付けるから大丈夫。それより愛するダーリンに何もしないことの方が、アタシ的には嫌だし」
line = "「――風邪が移るかも？　そこは気を付けるから大丈夫。それより愛するダーリンに何もしないことの方が、アタシ的には嫌だし」"

[[dialogue]]
speaker = "紅明"
# 「だから、看病させて欲しいな。早くダーリンに元気になって欲しいし」
line = "「だから、看病させて欲しいな。早くダーリンに元気になって欲しいし」"

[[dialogue]]
speaker = "unk"
# 正直、紅明が来てくれて嬉しい
line = "正直、紅明が来てくれて嬉しい"

[[dialogue]]
speaker = "紅明"
# 「ふふっ、心細かったんだ？　風邪の時あるあるだよね～」
line = "「ふふっ、心細かったんだ？　風邪の時あるあるだよね～」"

[[dialogue]]
speaker = "紅明"
# 「大丈夫、今日はアタシがずっと一緒にいるから、寂しくないよ。遠慮せずに甘えていいからね、ダーリン♪」
line = "「大丈夫、今日はアタシがずっと一緒にいるから、寂しくないよ。遠慮せずに甘えていいからね、ダーリン♪」"

[[dialogue]]
speaker = "紅明"
# 「それじゃあ、まずは食事でも作りますか☆　ちょうどお腹空いてたんじゃない？」
line = "「それじゃあ、まずは食事でも作りますか☆　ちょうどお腹空いてたんじゃない？」"

[[dialogue]]
speaker = "紅明"
# 「あはは、顔を見ればわかるよ～。大好きなダーリンのことだもん」
line = "「あはは、顔を見ればわかるよ～。大好きなダーリンのことだもん」"

[[dialogue]]
speaker = "紅明"
# 「ほら、ダーリンはソファに座って休んでて。今日はアタシが将来の奥さんとして、家庭的なところを見せちゃうから♪」
line = "「ほら、ダーリンはソファに座って休んでて。今日はアタシが将来の奥さんとして、家庭的なところを見せちゃうから♪」"

[[dialogue]]
speaker = "unk"
# そうしてキッチンに立った紅明は、手馴れた様子で料理を作って、持ってきてくれて――
line = "そうしてキッチンに立った紅明は、手馴れた様子で料理を作って、持ってきてくれて――"

[[dialogue]]
speaker = "紅明"
# 「風邪の時に食べやすいものといえば、お粥っしょ☆　というわけで、卵と鰹節入りで作ってみました～」
line = "「風邪の時に食べやすいものといえば、お粥っしょ☆　というわけで、卵と鰹節入りで作ってみました～」"

[[dialogue]]
speaker = "紅明"
# 「あっ、せっかくだし、ダーリンはそのままでいいよ。アタシが食べさせたげる<emoji=heart04>」
line = "「あっ、せっかくだし、ダーリンはそのままでいいよ。アタシが食べさせたげる<emoji=heart04>」"

[[dialogue]]
speaker = "紅明"
# 「それじゃあ、熱いのふーふーして冷ますから待っててね。ふ～、ふ～」
line = "「それじゃあ、熱いのふーふーして冷ますから待っててね。ふ～、ふ～」"

[[dialogue]]
speaker = "紅明"
# 「はい、ダーリン、口開けて？　あ～ん<emoji=heart04>」
line = "「はい、ダーリン、口開けて？　あ～ん<emoji=heart04>」"

[[dialogue]]
speaker = "紅明"
# 「どう？　ダーリンの口に合うといいんだけど……」
line = "「どう？　ダーリンの口に合うといいんだけど……」"

[[dialogue]]
speaker = "unk"
# うまい！
line = "うまい！"

[[dialogue]]
speaker = "紅明"
# 「えへへ～<emoji=heart04>　それならよかった♪」
line = "「えへへ～<emoji=heart04>　それならよかった♪」"

[[dialogue]]
speaker = "紅明"
# 「うん、料理はこう見えて得意なんだぜ？　なにせ、前世ではお母さんをやってたからね～」
line = "「うん、料理はこう見えて得意なんだぜ？　なにせ、前世ではお母さんをやってたからね～」"

[[dialogue]]
speaker = "紅明"
# 「お粥を食べ終わったら、ダーリンはゆっくり休んでてね。家事はアタシが全部やっちゃうからさ☆」
line = "「お粥を食べ終わったら、ダーリンはゆっくり休んでてね。家事はアタシが全部やっちゃうからさ☆」"

[[dialogue]]
speaker = "unk"
# 紅明はその後、掃除と洗濯もテキパキとこなして、終わらせてしまった。
line = "紅明はその後、掃除と洗濯もテキパキとこなして、終わらせてしまった。"

[[dialogue]]
speaker = "紅明"
# 「ふふっ、どうよダーリン、アタシの奥さん力は。なかなかのもんっしょ？」
line = "「ふふっ、どうよダーリン、アタシの奥さん力は。なかなかのもんっしょ？」"

[[dialogue]]
speaker = "unk"
# 惚れ直した
line = "惚れ直した"

[[dialogue]]
speaker = "紅明"
# 「んモー、ダーリンってば<emoji=heart04>　嬉しいから、膝枕サービスもしちゃう<emoji=heart04>　ほら、横になって？」
line = "「んモー、ダーリンってば<emoji=heart04>　嬉しいから、膝枕サービスもしちゃう<emoji=heart04>　ほら、横になって？」"

[[dialogue]]
speaker = "紅明"
# 「よいしょっと☆　――こうして頭撫でると、気分も落ち着くっしょ」
line = "「よいしょっと☆　――こうして頭撫でると、気分も落ち着くっしょ」"

[[dialogue]]
speaker = "紅明"
# 「あはっ、ダーリン、子供みたいな顔してて可愛い<emoji=heart04>　なでなで♪」
line = "「あはっ、ダーリン、子供みたいな顔してて可愛い<emoji=heart04>　なでなで♪」"

[[dialogue]]
speaker = "紅明"
# 「ん～？　――アタシが本当にお母さんみたいだから？　そうなんよ～」
line = "「ん～？　――アタシが本当にお母さんみたいだから？　そうなんよ～」"

[[dialogue]]
speaker = "unk"
# 普段はそんな風に見えないから、ギャップがある
line = "普段はそんな風に見えないから、ギャップがある"

[[dialogue]]
speaker = "紅明"
# 「だとしたら、それは多分――」
line = "「だとしたら、それは多分――」"

[[dialogue]]
speaker = "紅明"
# 「現在進行形で、ダーリンに恋してるからじゃないかな？」
line = "「現在進行形で、ダーリンに恋してるからじゃないかな？」"

[[dialogue]]
speaker = "紅明"
# 「あ～、ダーリン、今もしかして、ドキっとしたっしょ～？　ふふっ、キスして欲しそうな顔してるし<emoji=heart04>」
line = "「あ～、ダーリン、今もしかして、ドキっとしたっしょ～？　ふふっ、キスして欲しそうな顔してるし<emoji=heart04>」"

[[dialogue]]
speaker = "紅明"
# 「うん<emoji=heart04>　大好きなダーリンのことだから、お見通し<emoji=heart04>」
line = "「うん<emoji=heart04>　大好きなダーリンのことだから、お見通し<emoji=heart04>」"

[[dialogue]]
speaker = "紅明"
# 「――風邪が移るといけないから？　う～ん、確かに……」
line = "「――風邪が移るといけないから？　う～ん、確かに……」"

[[dialogue]]
speaker = "紅明"
# 「でも……ちゅっ……<emoji=heart04>」
line = "「でも……ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "紅明"
# 「――えへへ<emoji=heart04>　ダーリンが可愛くて、アタシも我慢できなくなっちゃった。ごめんね<emoji=heart04>」
line = "「――えへへ<emoji=heart04>　ダーリンが可愛くて、アタシも我慢できなくなっちゃった。ごめんね<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# どうなっても知らないからな
line = "どうなっても知らないからな"

[[dialogue]]
speaker = "紅明"
# 「その時は、責任取ってね。色々と<emoji=heart04>」
line = "「その時は、責任取ってね。色々と<emoji=heart04>」"

[[dialogue]]
speaker = "紅明"
# 「ん……<emoji=heart04>　ダーリン……<emoji=heart04>　ちゅっ……<emoji=heart04>」
line = "「ん……<emoji=heart04>　ダーリン……<emoji=heart04>　ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そうして、紅明と甘い時を過ごした後――
line = "そうして、紅明と甘い時を過ごした後――"

[[dialogue]]
speaker = "紅明"
# 「ダーリン、疲れて眠くなってきちゃった？　このまま膝枕の上で寝ちゃってもいいからね」
line = "「ダーリン、疲れて眠くなってきちゃった？　このまま膝枕の上で寝ちゃってもいいからね」"

[[dialogue]]
speaker = "紅明"
# 「大丈夫、今日はアタシ、ずっと一緒にいるって言ったでしょ？　だから気にしないで、眠っていいよ」
line = "「大丈夫、今日はアタシ、ずっと一緒にいるって言ったでしょ？　だから気にしないで、眠っていいよ」"

[[dialogue]]
speaker = "unk"
# 紅明が頭を撫でてくれて、俺は安心した気持ちになる。彼女は穏やかな声で歌を口ずさんで――
line = "紅明が頭を撫でてくれて、俺は安心した気持ちになる。彼女は穏やかな声で歌を口ずさんで――"

[[dialogue]]
speaker = "紅明"
# 「ね～んねん、ころり～よ、おころりよ～♪」
line = "「ね～んねん、ころり～よ、おころりよ～♪」"

[[dialogue]]
speaker = "紅明"
# 「――ん？　そう、子守唄。よく眠れるって、子供たちに評判だったんだ」
line = "「――ん？　そう、子守唄。よく眠れるって、子供たちに評判だったんだ」"

[[dialogue]]
speaker = "紅明"
# 「――今すっごく、奥さんにしたい気分？　ふふっ……<emoji=heart04>」
line = "「――今すっごく、奥さんにしたい気分？　ふふっ……<emoji=heart04>」"

[[dialogue]]
speaker = "紅明"
# 「アタシは出会った時から、ダーリンと夫婦になりたい気分だったけどね<emoji=heart04>」
line = "「アタシは出会った時から、ダーリンと夫婦になりたい気分だったけどね<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺はそのまま、心地良い微睡みに身を任せて、目を閉じる。
line = "俺はそのまま、心地良い微睡みに身を任せて、目を閉じる。"

[[dialogue]]
speaker = "紅明"
# 「おやすみ、ダーリン<emoji=heart04>　ちゅっ……<emoji=heart04>」
line = "「おやすみ、ダーリン<emoji=heart04>　ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 紅明はおでこにキスしてくれた後、俺が眠るまで、子守唄を口ずさんでくれたのだった――
line = "紅明はおでこにキスしてくれた後、俺が眠るまで、子守唄を口ずさんでくれたのだった――"
