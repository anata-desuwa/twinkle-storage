[[dialogue]]
speaker = "unk"
# 第２話,仮面の謎,P
line = "第２話,仮面の謎,P"

[[dialogue]]
speaker = "派手な女生徒"
# （ね、ねえ、なんでアニュラスさんって、いつも仮面を被ってるのかな……）
line = "（ね、ねえ、なんでアニュラスさんって、いつも仮面を被ってるのかな……）"

[[dialogue]]
speaker = "地味な女生徒"
# （わ、わかんないよ。体育の時間とかもずっと被ってるんでしょ？　クラスメイトでさえ、素顔見たことないって噂だもん）
line = "（わ、わかんないよ。体育の時間とかもずっと被ってるんでしょ？　クラスメイトでさえ、素顔見たことないって噂だもん）"

[[dialogue]]
speaker = "アニュラス"
# 「…………気になるのなら、直接聞きにくればいいだろうに」
line = "「…………気になるのなら、直接聞きにくればいいだろうに」"

[[dialogue]]
speaker = "unk"
# なんでずっと仮面を被ってるんだ？
line = "なんでずっと仮面を被ってるんだ？"

[[dialogue]]
speaker = "アニュラス"
# 「……人の話を盗み聞きするのは騎士道精神に反するな。あまり褒められた行為ではないぞ、新星の会長」
line = "「……人の話を盗み聞きするのは騎士道精神に反するな。あまり褒められた行為ではないぞ、新星の会長」"

[[dialogue]]
speaker = "アニュラス"
# 「なに、私も前に盗み聞きしてた？　あ、あれは観察だと言っただろう！」
line = "「なに、私も前に盗み聞きしてた？　あ、あれは観察だと言っただろう！」"

[[dialogue]]
speaker = "アニュラス"
# 「む、むぅ……まあ、たまたま聞こえてきただけというのなら、仕方のないことだ」
line = "「む、むぅ……まあ、たまたま聞こえてきただけというのなら、仕方のないことだ」"

[[dialogue]]
speaker = "アニュラス"
# 「……それで、仮面のことだったか。この仮面は実技試験の最優秀成績を収めた時に、お父様から贈られたものだ」
line = "「……それで、仮面のことだったか。この仮面は実技試験の最優秀成績を収めた時に、お父様から贈られたものだ」"

[[dialogue]]
speaker = "アニュラス"
# 「微力ながら星力を高める力があるらしい。お父様の現役時代に使っていたものだから、私も愛用させてもらっている」
line = "「微力ながら星力を高める力があるらしい。お父様の現役時代に使っていたものだから、私も愛用させてもらっている」"

[[dialogue]]
speaker = "unk"
# いつも付けている必要なくない？
line = "いつも付けている必要なくない？"

[[dialogue]]
speaker = "アニュラス"
# 「それを言うのなら、いつも付けない理由もないだろう」
line = "「それを言うのなら、いつも付けない理由もないだろう」"

[[dialogue]]
speaker = "アニュラス"
# 「みんなだって、お気に入りのアクセサリーを身に着けたりするだろう？　それと同じ感覚だ。大切なものだから、いつも身に着けている」
line = "「みんなだって、お気に入りのアクセサリーを身に着けたりするだろう？　それと同じ感覚だ。大切なものだから、いつも身に着けている」"

[[dialogue]]
speaker = "アニュラス"
# 「納得したか？　――そうか、ならばよし」
line = "「納得したか？　――そうか、ならばよし」"

[[dialogue]]
speaker = "unk"
# ……で、その附属生用の計算ドリルは何？
line = "……で、その附属生用の計算ドリルは何？"

[[dialogue]]
speaker = "アニュラス"
# 「見てわからないのか。計算ドリルなのだから、計算の勉強をしていたのだ」
line = "「見てわからないのか。計算ドリルなのだから、計算の勉強をしていたのだ」"

[[dialogue]]
speaker = "アニュラス"
# 「……ん？　いや待て。いまお前、これを附属生用と言ったか？」
line = "「……ん？　いや待て。いまお前、これを附属生用と言ったか？」"

[[dialogue]]
speaker = "アニュラス"
# 「これは、筆記試験の成績がふるわなかった私に、先生が復習用にと渡したものだぞ？　だから私もこうして、休み時間に解いていたわけで――」
line = "「これは、筆記試験の成績がふるわなかった私に、先生が復習用にと渡したものだぞ？　だから私もこうして、休み時間に解いていたわけで――」"

[[dialogue]]
speaker = "アニュラス"
# 「……え、これ本当に附属生用？」
line = "「……え、これ本当に附属生用？」"

[[dialogue]]
speaker = "アニュラス"
# 「じ、冗談はよせ。この計算ドリル、半分もわからなかったんだぞ。さすがの私でもそこまでではないはずだ。……ないよね？」
line = "「じ、冗談はよせ。この計算ドリル、半分もわからなかったんだぞ。さすがの私でもそこまでではないはずだ。……ないよね？」"

[[dialogue]]
speaker = "unk"
# いや………………附属生用、ですね
line = "いや………………附属生用、ですね"

[[dialogue]]
speaker = "アニュラス"
# 「う、嘘だっ！　待て、じゃあこの歴史の問題集は？　こっちの漢字の問題集も見ろ！」
line = "「う、嘘だっ！　待て、じゃあこの歴史の問題集は？　こっちの漢字の問題集も見ろ！」"

[[dialogue]]
speaker = "アニュラス"
# 「あと英語も出ているんだ、ほら！　さすがに全部が全部、そんな」
line = "「あと英語も出ているんだ、ほら！　さすがに全部が全部、そんな」"

[[dialogue]]
speaker = "unk"
# 全部…………附属生用、ですね
line = "全部…………附属生用、ですね"

[[dialogue]]
speaker = "アニュラス"
# 「なん、だと……？」
line = "「なん、だと……？」"

[[dialogue]]
speaker = "アニュラス"
# 「…………わ、私には勉強など不要だ。いいか、立派な星騎士になるのに必要なのは、掛け算や割り算じゃない。剣の腕だ」
line = "「…………わ、私には勉強など不要だ。いいか、立派な星騎士になるのに必要なのは、掛け算や割り算じゃない。剣の腕だ」"

[[dialogue]]
speaker = "unk"
# 掛け算と割り算も怪しいレベル！？
line = "掛け算と割り算も怪しいレベル！？"

[[dialogue]]
speaker = "アニュラス"
# 「バカにするな！　今のは言葉の綾だ！　さすがの私も掛け算はできる！　九九の計算を間違えたら、ご飯が抜きになったあの日々を忘れるものか！」
line = "「バカにするな！　今のは言葉の綾だ！　さすがの私も掛け算はできる！　九九の計算を間違えたら、ご飯が抜きになったあの日々を忘れるものか！」"

[[dialogue]]
speaker = "アニュラス"
# 「割り算は……割り算は知らん！　あんなもの日常で使わんだろう！？」
line = "「割り算は……割り算は知らん！　あんなもの日常で使わんだろう！？」"

[[dialogue]]
speaker = "unk"
# いや、意外と使うよ……！？
line = "いや、意外と使うよ……！？"

[[dialogue]]
speaker = "アニュラス"
# 「……まさか、先生は私のレベルを見越して、この附属生用の計算ドリルを渡してくれたのか？」
line = "「……まさか、先生は私のレベルを見越して、この附属生用の計算ドリルを渡してくれたのか？」"

[[dialogue]]
speaker = "アニュラス"
# 「さすが教師と言わざるを得ないな。私のことをよく見ている……」
line = "「さすが教師と言わざるを得ないな。私のことをよく見ている……」"

[[dialogue]]
speaker = "アニュラス"
# 「だが、残念だ。この計算ドリルも、私にとっては少しレベルが高いようだ……」
line = "「だが、残念だ。この計算ドリルも、私にとっては少しレベルが高いようだ……」"

[[dialogue]]
speaker = "アニュラス"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "アニュラス"
# 「いや、凹んでいる暇はない。ひとまずこのドリルを終わらせよう。話はそれからだ」
line = "「いや、凹んでいる暇はない。ひとまずこのドリルを終わらせよう。話はそれからだ」"

[[dialogue]]
speaker = "unk"
# よければ、俺が勉強教えようか？
line = "よければ、俺が勉強教えようか？"

[[dialogue]]
speaker = "アニュラス"
# 「な、何？　お前は勉強ができるのか！？　なるほどそうか、お前は新星学園に途中編入したのだったな」
line = "「な、何？　お前は勉強ができるのか！？　なるほどそうか、お前は新星学園に途中編入したのだったな」"

[[dialogue]]
speaker = "アニュラス"
# 「む、むぅ……申し出は嬉しく思うが、新星の会長に借りを作るわけにはいかない」
line = "「む、むぅ……申し出は嬉しく思うが、新星の会長に借りを作るわけにはいかない」"

[[dialogue]]
speaker = "アニュラス"
# 「……教えてくれる知り合い？　い、いないが？　何か問題でも？」
line = "「……教えてくれる知り合い？　い、いないが？　何か問題でも？」"

[[dialogue]]
speaker = "アニュラス"
# 「赤点でも退学になったりはしないが……んぅ、お父様の期待は裏切ってしまうな……」
line = "「赤点でも退学になったりはしないが……んぅ、お父様の期待は裏切ってしまうな……」"

[[dialogue]]
speaker = "アニュラス"
# 「できれば成績を安定させて、お父様には安心して欲しいのだが……むむぅ……」
line = "「できれば成績を安定させて、お父様には安心して欲しいのだが……むむぅ……」"

[[dialogue]]
speaker = "unk"
# 勉強を教える代わりに、稽古をつけてくれ
line = "勉強を教える代わりに、稽古をつけてくれ"

[[dialogue]]
speaker = "アニュラス"
# 「……なるほど。そういえばこの前、私を実力で納得させると言っていたな」
line = "「……なるほど。そういえばこの前、私を実力で納得させると言っていたな」"

[[dialogue]]
speaker = "アニュラス"
# 「いいだろう。交換条件なら、私も頼みやすい」
line = "「いいだろう。交換条件なら、私も頼みやすい」"

[[dialogue]]
speaker = "アニュラス"
# 「すまない、気を遣わせてしまったな。その申し出、嬉しく思う。ぜひ私に勉強を教えて欲しい」
line = "「すまない、気を遣わせてしまったな。その申し出、嬉しく思う。ぜひ私に勉強を教えて欲しい」"

[[dialogue]]
speaker = "アニュラス"
# 「代わりに稽古をつけることを約束しよう。新星の会長の戦い方は徒手空拳だったか。専門ではないが、アドバイスできることもあろう」
line = "「代わりに稽古をつけることを約束しよう。新星の会長の戦い方は徒手空拳だったか。専門ではないが、アドバイスできることもあろう」"

[[dialogue]]
speaker = "アニュラス"
# 「……あと、私に仮面のことを聞いてくれて、感謝する」
line = "「……あと、私に仮面のことを聞いてくれて、感謝する」"

[[dialogue]]
speaker = "アニュラス"
# 「あそこにいた生徒も私たちの会話に耳をそばだてていたようだから、謎は解けただろう。これで陰口を言われることもなくなる」
line = "「あそこにいた生徒も私たちの会話に耳をそばだてていたようだから、謎は解けただろう。これで陰口を言われることもなくなる」"

[[dialogue]]
speaker = "アニュラス"
# 「……強さとは、優しさと厳しさを持ち合わせているものだと、お父様は言っていた」
line = "「……強さとは、優しさと厳しさを持ち合わせているものだと、お父様は言っていた」"

[[dialogue]]
speaker = "アニュラス"
# 「ふっ、お前にはそれが揃っているのかもしれないな」
line = "「ふっ、お前にはそれが揃っているのかもしれないな」"

[[dialogue]]
speaker = "unk"
# 仮面越しだったけれど、アニュラスが優しく微笑んだような、そんな気がしたのだった。
line = "仮面越しだったけれど、アニュラスが優しく微笑んだような、そんな気がしたのだった。"
