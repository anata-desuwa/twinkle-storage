[[dialogue]]
speaker = "unk"
# 第１話,出会いはショッキングピンク,P
line = "第１話,出会いはショッキングピンク,P"

[[dialogue]]
speaker = "unk"
# 新星学園１学年、アナの在籍するクラスにて──
line = "新星学園１学年、アナの在籍するクラスにて──"

[[dialogue]]
speaker = "リーリア"
# 「凄～い♪　さすが男の子だね！　キミのおかげでマジカル助かっちゃった☆」
line = "「凄～い♪　さすが男の子だね！　キミのおかげでマジカル助かっちゃった☆」"

[[dialogue]]
speaker = "男子生徒"
# 「い、いや、これくらい大したことないよ。また困ったことがあったら、遠慮せずに言ってね！　じゃあ、オレはこれで」
line = "「い、いや、これくらい大したことないよ。また困ったことがあったら、遠慮せずに言ってね！　じゃあ、オレはこれで」"

[[dialogue]]
speaker = "リーリア"
# 「ありがと～♪　その時はまたお願いするね☆」
line = "「ありがと～♪　その時はまたお願いするね☆」"

[[dialogue]]
speaker = "アナ"
# 「全く、ペットボトルの蓋くらい、自分で開けたらどうですか？　リーリアさん」
line = "「全く、ペットボトルの蓋くらい、自分で開けたらどうですか？　リーリアさん」"

[[dialogue]]
speaker = "リーリア"
# 「あっ、アナちゃん見てたの？　だって～、蓋が固いやつだったし～」
line = "「あっ、アナちゃん見てたの？　だって～、蓋が固いやつだったし～」"

[[dialogue]]
speaker = "アナ"
# 「いや、星騎士なんですから、握力に関してはノープロブレムでしょう」
line = "「いや、星騎士なんですから、握力に関してはノープロブレムでしょう」"

[[dialogue]]
speaker = "リーリア"
# 「う～ん……でも、可愛い美少女であるところの私に甘えられたり、頼られたりすることは、全生命体にとってウィンウィン☆　幸せ、ってことでしょ？」
line = "「う～ん……でも、可愛い美少女であるところの私に甘えられたり、頼られたりすることは、全生命体にとってウィンウィン☆　幸せ、ってことでしょ？」"

[[dialogue]]
speaker = "リーリア"
# 「だからちゃんと、人に甘えられる場面では、モテ系甘えムーヴを実践しないとね☆　ラブ＆ピースだよ♪」
line = "「だからちゃんと、人に甘えられる場面では、モテ系甘えムーヴを実践しないとね☆　ラブ＆ピースだよ♪」"

[[dialogue]]
speaker = "アナ"
# 「異常思想」
line = "「異常思想」"

[[dialogue]]
speaker = "リーリア"
# 「てへぺろ☆」
line = "「てへぺろ☆」"

[[dialogue]]
speaker = "リーリア"
# 「それはそうとアナちゃん。今日の放課後、星徒会長さんを紹介して貰う約束、お願いね♪」
line = "「それはそうとアナちゃん。今日の放課後、星徒会長さんを紹介して貰う約束、お願いね♪」"

[[dialogue]]
speaker = "アナ"
# 「ノープロブレム。既に会長にはアポを取ってあります」
line = "「ノープロブレム。既に会長にはアポを取ってあります」"

[[dialogue]]
speaker = "リーリア"
# 「口では注意しつつも、可愛い私の為にお願い聞いてくれるなんて♪　もう、ツンデレさんなんだから☆　ハグしちゃうぞ～？」
line = "「口では注意しつつも、可愛い私の為にお願い聞いてくれるなんて♪　もう、ツンデレさんなんだから☆　ハグしちゃうぞ～？」"

[[dialogue]]
speaker = "アナ"
# 「断固否定。あなたが余りにも毎日しつこいので、面倒を会長に押し付けただけ」
line = "「断固否定。あなたが余りにも毎日しつこいので、面倒を会長に押し付けただけ」"

[[dialogue]]
speaker = "アナ"
# 「というわけで会長、前に言っていた同じクラスの子を連れて来ました」
line = "「というわけで会長、前に言っていた同じクラスの子を連れて来ました」"

[[dialogue]]
speaker = "リーリア"
# 「はじめまして、センパイ♪　紹介にあずかりました、新星学園１年生──」
line = "「はじめまして、センパイ♪　紹介にあずかりました、新星学園１年生──」"

[[dialogue]]
speaker = "リーリア"
# 「渋谷リーリアです☆　どうぞ下の名前で、リーリアって呼んで下さい♪」
line = "「渋谷リーリアです☆　どうぞ下の名前で、リーリアって呼んで下さい♪」"

[[dialogue]]
speaker = "unk"
# わかった。よろしくな、リーリア
line = "わかった。よろしくな、リーリア"

[[dialogue]]
speaker = "リーリア"
# 「……！　へぇ～☆　センパイって意外と、女の子の扱いに慣れてるんですね♪」
line = "「……！　へぇ～☆　センパイって意外と、女の子の扱いに慣れてるんですね♪」"

[[dialogue]]
speaker = "リーリア"
# 「でも、名前で呼んでくれてマジカル嬉しい～♪　なにせ『一目惚れ』の相手ですもん☆」
line = "「でも、名前で呼んでくれてマジカル嬉しい～♪　なにせ『一目惚れ』の相手ですもん☆」"

[[dialogue]]
speaker = "unk"
# ひ、一目惚れ……！？
line = "ひ、一目惚れ……！？"

[[dialogue]]
speaker = "アナ"
# 「…………（リーリアにジト目）
line = "「…………（リーリアにジト目）"

[[dialogue]]
speaker = "リーリア"
# 「はい<emoji=heart04>　実は私、この前の御前試合でセンパイのこと見てて……あの雄姿が本当に格好良くって、好きになっちゃったんです～♪」
line = "「はい<emoji=heart04>　実は私、この前の御前試合でセンパイのこと見てて……あの雄姿が本当に格好良くって、好きになっちゃったんです～♪」"

[[dialogue]]
speaker = "リーリア"
# 「それで是非、お近付きになりたいってアナちゃんに相談してて～。今日こうして、ようやくお会い出来たんですっ」
line = "「それで是非、お近付きになりたいってアナちゃんに相談してて～。今日こうして、ようやくお会い出来たんですっ」"

[[dialogue]]
speaker = "リーリア"
# 「でも、センパイを前にしたら私……もう自分の気持ち抑えられそうにありませんっ。出来ればセンパイと、もっと親密な関係になりたいって思ってるんですけど──」
line = "「でも、センパイを前にしたら私……もう自分の気持ち抑えられそうにありませんっ。出来ればセンパイと、もっと親密な関係になりたいって思ってるんですけど──」"

[[dialogue]]
speaker = "unk"
# そう言って近付いてきた彼女は、俺の手を両手で取って、上目遣いで──
line = "そう言って近付いてきた彼女は、俺の手を両手で取って、上目遣いで──"

[[dialogue]]
speaker = "リーリア"
# 「もし嫌じゃなければ、私と付き合って、もらえませんか……？」
line = "「もし嫌じゃなければ、私と付き合って、もらえませんか……？」"

[[dialogue]]
speaker = "リーリア"
# （完っっ璧に決まった……！　一目惚れ発言でドキッとさせてからの、私の可愛い上目遣いと、ボディータッチという流れるような３連コンボ！）
line = "（完っっ璧に決まった……！　一目惚れ発言でドキッとさせてからの、私の可愛い上目遣いと、ボディータッチという流れるような３連コンボ！）"

[[dialogue]]
speaker = "リーリア"
# （そして、女子慣れしているといっても、可愛い私から告白されて、明らかに照れて喜んでいる！　勝った……！）
line = "（そして、女子慣れしているといっても、可愛い私から告白されて、明らかに照れて喜んでいる！　勝った……！）"

[[dialogue]]
speaker = "アナ"
# 「……どういう意図か知りませんが、考えが和菓子のように甘いですよ。リーリアさん」
line = "「……どういう意図か知りませんが、考えが和菓子のように甘いですよ。リーリアさん」"

[[dialogue]]
speaker = "リーリア"
# 「え……？」
line = "「え……？」"

[[dialogue]]
speaker = "unk"
# 一目惚れと言ってくれるのは嬉しいけど──
line = "一目惚れと言ってくれるのは嬉しいけど──"

[[dialogue]]
speaker = "リーリア"
# （私の手を片方だけ解いて、握手の形に直した……？）
line = "（私の手を片方だけ解いて、握手の形に直した……？）"

[[dialogue]]
speaker = "unk"
# 何事も、段階を踏むのは大事だと思う。俺は何より、リーリアのことをまだよく知らない。彼女にそう伝える。
line = "何事も、段階を踏むのは大事だと思う。俺は何より、リーリアのことをまだよく知らない。彼女にそう伝える。"

[[dialogue]]
speaker = "unk"
# ──だから、これからキミを知っていけたら嬉しい
line = "──だから、これからキミを知っていけたら嬉しい"

[[dialogue]]
speaker = "リーリア"
# 「な……！」
line = "「な……！」"

[[dialogue]]
speaker = "アナ"
# 「ふっ……まあ、会長はこういう人なんで。リーリアさんも変に猫被らなくていいと思いますよ？」
line = "「ふっ……まあ、会長はこういう人なんで。リーリアさんも変に猫被らなくていいと思いますよ？」"

[[dialogue]]
speaker = "リーリア"
# 「な、なんでそこで、アナちゃんが勝ち誇ったような顔をするのかな……？」
line = "「な、なんでそこで、アナちゃんが勝ち誇ったような顔をするのかな……？」"

[[dialogue]]
speaker = "unk"
# そうして１人、星徒会室から退散したリーリアだったが──
line = "そうして１人、星徒会室から退散したリーリアだったが──"

[[dialogue]]
speaker = "リーリア"
# 「ま、まさか任務に失敗するなんて……！」
line = "「ま、まさか任務に失敗するなんて……！」"

[[dialogue]]
speaker = "リーリア"
# 「私の可愛さは通用していたし、好きな人がいないこともリサーチ済みだったのに。……どうして！？」
line = "「私の可愛さは通用していたし、好きな人がいないこともリサーチ済みだったのに。……どうして！？」"

[[dialogue]]
speaker = "リーリア"
# 「利害一致しているはずなのに……！　全然分からない！　う～、悔しい～！！！」
line = "「利害一致しているはずなのに……！　全然分からない！　う～、悔しい～！！！」"

[[dialogue]]
speaker = "リーリア"
# 「おのれパイセン……！　このまま、あの紳士面で居させてなるものか！」
line = "「おのれパイセン……！　このまま、あの紳士面で居させてなるものか！」"

[[dialogue]]
speaker = "リーリア"
# 「私のプライドに賭けて必ず、私にデレデレにさせてみせるんだから！」
line = "「私のプライドに賭けて必ず、私にデレデレにさせてみせるんだから！」"
