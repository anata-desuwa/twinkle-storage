[[dialogue]]
speaker = "ラティエ"
# 「へえ、それじゃここのメニューは全部きみが考えたメニューなのかい？」
line = "「へえ、それじゃここのメニューは全部きみが考えたメニューなのかい？」"

[[dialogue]]
speaker = "サラン"
# 「そうなんです。今日はサービスでなんでも頼んでいいですよ」
line = "「そうなんです。今日はサービスでなんでも頼んでいいですよ」"

[[dialogue]]
speaker = "ラティエ"
# 「ありがとう。けれど私はこういったスイーツには疎いから、きみのオススメをもらっていいかな？」
line = "「ありがとう。けれど私はこういったスイーツには疎いから、きみのオススメをもらっていいかな？」"

[[dialogue]]
speaker = "サラン"
# 「分かりました。少々お待ちくださいね」
line = "「分かりました。少々お待ちくださいね」"

[[dialogue]]
speaker = "ラティエ"
# 「プールデートという話だったから、それを楽しみにしていたのだが、こうなってくると食事の方も期待してしまうな」
line = "「プールデートという話だったから、それを楽しみにしていたのだが、こうなってくると食事の方も期待してしまうな」"

[[dialogue]]
speaker = "ラティエ"
# 「サラン嬢のデザートは魔界を旅している時もよく耳にした」
line = "「サラン嬢のデザートは魔界を旅している時もよく耳にした」"

[[dialogue]]
speaker = "unk"
# すごいな、サランは
line = "すごいな、サランは"

[[dialogue]]
speaker = "ラティエ"
# 「人間界に戻ったら食べてみたいと思っていたが、まさかここで念願が叶うとは」
line = "「人間界に戻ったら食べてみたいと思っていたが、まさかここで念願が叶うとは」"

[[dialogue]]
speaker = "ラティエ"
# 「案内人として彼女を呼んでくれたきみにも感謝しなければ」
line = "「案内人として彼女を呼んでくれたきみにも感謝しなければ」"

[[dialogue]]
speaker = "サラン"
# 「お待たせしました」
line = "「お待たせしました」"

[[dialogue]]
speaker = "ラティエ"
# 「おやおや、随分とたくさん持ってきてくれたのだね？　ありがとう」
line = "「おやおや、随分とたくさん持ってきてくれたのだね？　ありがとう」"

[[dialogue]]
speaker = "unk"
# サランの持ってきてくれたスイーツや飲み物で、あっという間にテーブルが埋まってしまう。
line = "サランの持ってきてくれたスイーツや飲み物で、あっという間にテーブルが埋まってしまう。"

[[dialogue]]
speaker = "ラティエ"
# 「どれも可愛らしいスイーツだ。これらはきみのイメージに合わせてつくられたものかな？」
line = "「どれも可愛らしいスイーツだ。これらはきみのイメージに合わせてつくられたものかな？」"

[[dialogue]]
speaker = "サラン"
# 「はい。こちらのスイーツはサランのアイデアで作られたものです」
line = "「はい。こちらのスイーツはサランのアイデアで作られたものです」"

[[dialogue]]
speaker = "ラティエ"
# 「どれどれ、さっそく頂こう」
line = "「どれどれ、さっそく頂こう」"

[[dialogue]]
speaker = "unk"
# こんなにあると食べきれそうにないよ
line = "こんなにあると食べきれそうにないよ"

[[dialogue]]
speaker = "サラン"
# 「ぽよ？　そうなの～？」
line = "「ぽよ？　そうなの～？」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「会長様が小食なことは知っておりましたけど、学園長様も小食ですのね？」
line = "「会長様が小食なことは知っておりましたけど、学園長様も小食ですのね？」"

[[dialogue]]
speaker = "ラティエ"
# 「そうだね。どれもとても美味しそうだけれど、とても私だけでは食べきれそうにないな」
line = "「そうだね。どれもとても美味しそうだけれど、とても私だけでは食べきれそうにないな」"

[[dialogue]]
speaker = "ラティエ"
# 「お嬢様たちも、一緒にどうかな？」
line = "「お嬢様たちも、一緒にどうかな？」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「仕方ありませんわね。お姉さま、私たちもご一緒させて頂きましょう」
line = "「仕方ありませんわね。お姉さま、私たちもご一緒させて頂きましょう」"

[[dialogue]]
speaker = "サラン"
# 「いいの？　嬉しいな～」
line = "「いいの？　嬉しいな～」"

[[dialogue]]
speaker = "ラティエ"
# 「これは……素晴らしい味だね。世界各地でいろいろなものを食べてきたけれど、これほど美味しいスイーツはお目にかかったことがない」
line = "「これは……素晴らしい味だね。世界各地でいろいろなものを食べてきたけれど、これほど美味しいスイーツはお目にかかったことがない」"

[[dialogue]]
speaker = "サラン"
# 「えへへ～、嬉しい。ありがとうございます～」
line = "「えへへ～、嬉しい。ありがとうございます～」"

[[dialogue]]
speaker = "サラン"
# 「けれど世界中を旅したら、きっとまだサランの知らないスイーツもあるんでしょうね～」
line = "「けれど世界中を旅したら、きっとまだサランの知らないスイーツもあるんでしょうね～」"

[[dialogue]]
speaker = "ラティエ"
# 「はっはっは、私はあまり舌が肥えている方ではないから気にしたことはなかったけれど」
line = "「はっはっは、私はあまり舌が肥えている方ではないから気にしたことはなかったけれど」"

[[dialogue]]
speaker = "ラティエ"
# 「それでも美味しいものはあった。食は見知らぬ土地を訊ねる時の楽しみの一つだね」
line = "「それでも美味しいものはあった。食は見知らぬ土地を訊ねる時の楽しみの一つだね」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「旅の魅力──いろいろお伺いしたいですわ」
line = "「旅の魅力──いろいろお伺いしたいですわ」"

[[dialogue]]
speaker = "ラティエ"
# 「そうだね。いろいろあるが……やはり出会いだな」
line = "「そうだね。いろいろあるが……やはり出会いだな」"

[[dialogue]]
speaker = "ラティエ"
# 「世界は広い。色々な土地にいろいろな人が住んでいる」
line = "「世界は広い。色々な土地にいろいろな人が住んでいる」"

[[dialogue]]
speaker = "ラティエ"
# 「新たな地を目指す時、そこにはどんな人たちが住んでいるのか、想像を巡らせながら歩いていくのさ」
line = "「新たな地を目指す時、そこにはどんな人たちが住んでいるのか、想像を巡らせながら歩いていくのさ」"

[[dialogue]]
speaker = "ラティエ"
# 「それは旅の困難を忘れさせてくれる楽しい想像だし、大抵の場合、想像を上回る楽しい出会いが待っている」
line = "「それは旅の困難を忘れさせてくれる楽しい想像だし、大抵の場合、想像を上回る楽しい出会いが待っている」"

[[dialogue]]
speaker = "サラン"
# 「まるでご飯を食べる前みたいだね～」
line = "「まるでご飯を食べる前みたいだね～」"

[[dialogue]]
speaker = "サラン"
# 「どんなお料理が出てくるんだろう？　このお料理はどんな味がするんだろう？　って想像しながらまってると、心がフワフワするの～♪」
line = "「どんなお料理が出てくるんだろう？　このお料理はどんな味がするんだろう？　って想像しながらまってると、心がフワフワするの～♪」"

[[dialogue]]
speaker = "ラティエ"
# 「まさにそれだな。旅と食事はよく似ている」
line = "「まさにそれだな。旅と食事はよく似ている」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「旅先で知り合った方と、一緒に旅をすることもあるのでしょうか？」
line = "「旅先で知り合った方と、一緒に旅をすることもあるのでしょうか？」"

[[dialogue]]
speaker = "ラティエ"
# 「そうだね。偶然、同じ目的を持った旅人と出会うこともある。そんな時はその偶然を大事にするようにしているよ」
line = "「そうだね。偶然、同じ目的を持った旅人と出会うこともある。そんな時はその偶然を大事にするようにしているよ」"

[[dialogue]]
speaker = "ラティエ"
# 「偶然と言えば、きみとは魔界で偶然出会ったのだったな」
line = "「偶然と言えば、きみとは魔界で偶然出会ったのだったな」"

[[dialogue]]
speaker = "unk"
# すごく助かりましたけど
line = "すごく助かりましたけど"

[[dialogue]]
speaker = "unk"
# まさか学園長とは思いませんでした
line = "まさか学園長とは思いませんでした"

[[dialogue]]
speaker = "ラティエ"
# 「あの時はヴィーナス嬢を救うために、魔女の協力を得て魔界にやってきていたのだったかな？」
line = "「あの時はヴィーナス嬢を救うために、魔女の協力を得て魔界にやってきていたのだったかな？」"

[[dialogue]]
speaker = "unk"
# そう言って学園長は、魔界のレゾフに訪れた時のことを話す。
line = "そう言って学園長は、魔界のレゾフに訪れた時のことを話す。"

[[dialogue]]
speaker = "unk"
# あの時、レゾフに立ち寄ったのは本当に偶然だったそうだ。
line = "あの時、レゾフに立ち寄ったのは本当に偶然だったそうだ。"

[[dialogue]]
speaker = "unk"
# 学園長の助けがなければ『スタンピード』の脅威を凌げなかっただろうことを考えると、俺たちは本当に運が良かったのだと思う。
line = "学園長の助けがなければ『スタンピード』の脅威を凌げなかっただろうことを考えると、俺たちは本当に運が良かったのだと思う。"

[[dialogue]]
speaker = "ラティエ"
# 「いやはや、懐かしい思い出だ」
line = "「いやはや、懐かしい思い出だ」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「旅……私が経験したことのないものですわ……」
line = "「旅……私が経験したことのないものですわ……」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「学園長様にとって旅とは一体どのようなものなのでしょう」
line = "「学園長様にとって旅とは一体どのようなものなのでしょう」"

[[dialogue]]
speaker = "ラティエ"
# 「……そうだな」
line = "「……そうだな」"

[[dialogue]]
speaker = "ラティエ"
# 「少し真面目な話をしてしまうと、私はいろいろなことを自分の目で確かめなければ気が済まない性質なんだ」
line = "「少し真面目な話をしてしまうと、私はいろいろなことを自分の目で確かめなければ気が済まない性質なんだ」"

[[dialogue]]
speaker = "ラティエ"
# 「最初はただの非常勤講師だった私だが、ヘレナや教師陣からの推薦を受けて学園長になった」
line = "「最初はただの非常勤講師だった私だが、ヘレナや教師陣からの推薦を受けて学園長になった」"

[[dialogue]]
speaker = "ラティエ"
# 「私の就任に疑問を呈する者も多かったが、その疑問は何より私が一番抱いていたよ」
line = "「私の就任に疑問を呈する者も多かったが、その疑問は何より私が一番抱いていたよ」"

[[dialogue]]
speaker = "ラティエ"
# 「リクリエという未曽有の危機に対して、世界が採らねばならない選択は私の中で決まっていた」
line = "「リクリエという未曽有の危機に対して、世界が採らねばならない選択は私の中で決まっていた」"

[[dialogue]]
speaker = "ラティエ"
# 「それは即ち、滅びの運命に抗えるほどの強さを手に入れること、だ」
line = "「それは即ち、滅びの運命に抗えるほどの強さを手に入れること、だ」"

[[dialogue]]
speaker = "ラティエ"
# 「そして、学園長としてその責任を果たすために私の為さねばならないことは……学園長室で書類と向き合う事ではない」
line = "「そして、学園長としてその責任を果たすために私の為さねばならないことは……学園長室で書類と向き合う事ではない」"

[[dialogue]]
speaker = "ラティエ"
# 「世界を歩き、見て、知り、星騎士がリクリエに抗う強さを手に入れる……その方法を模索することが私の為すべきことだと結論づけたのだよ」
line = "「世界を歩き、見て、知り、星騎士がリクリエに抗う強さを手に入れる……その方法を模索することが私の為すべきことだと結論づけたのだよ」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「だから……学園長様は、世界中のいろんな場所を旅していらっしゃったのですね……」
line = "「だから……学園長様は、世界中のいろんな場所を旅していらっしゃったのですね……」"

[[dialogue]]
speaker = "unk"
# そうだったのか……
line = "そうだったのか……"

[[dialogue]]
speaker = "エスメラルダ"
# 『ちょっと会長くん！　あなたまで何を聞き入っているの！』
line = "『ちょっと会長くん！　あなたまで何を聞き入っているの！』"

[[dialogue]]
speaker = "エスメラルダ"
# 『いい風に言ってますけど、結局職務を放り出して自由に生きていることには変わりないんですからね！』
line = "『いい風に言ってますけど、結局職務を放り出して自由に生きていることには変わりないんですからね！』"

[[dialogue]]
speaker = "unk"
# （た、確かに……！）
line = "（た、確かに……！）"

[[dialogue]]
speaker = "エルデリーゼ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「……決めましたわ」
line = "「……決めましたわ」"

[[dialogue]]
speaker = "サラン"
# 「ぽよ？　何をきめたの？」
line = "「ぽよ？　何をきめたの？」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「ラティエ学園長様！　私を旅に連れて行ってくださいませ！！！」
line = "「ラティエ学園長様！　私を旅に連れて行ってくださいませ！！！」"
