line = "「ついでに現代の文化に興味があるとのことでしたので……こちら」"

[[dialogue]]
speaker = "シュティレ"
# 「シュティレのＤＩＳＣにダウンロードしてあるロボットアニメを厳選し、視聴大会をしていた次第です」
line = "「シュティレのＤＩＳＣにダウンロードしてあるロボットアニメを厳選し、視聴大会をしていた次第です」"

[[dialogue]]
speaker = "トリュファイナ"
# 「魔王様。私、知りませんでした！　ドリルとロケットパンチは永遠のロマンなのですよね、ふふふっ♪」
line = "「魔王様。私、知りませんでした！　ドリルとロケットパンチは永遠のロマンなのですよね、ふふふっ♪」"

[[dialogue]]
speaker = "トリュファイナ"
# 「あんなに音と光がどっかーん、どっかーんと！　こんな娯楽は初めてです。現代の文化とは、奥が深いのですね！」
line = "「あんなに音と光がどっかーん、どっかーんと！　こんな娯楽は初めてです。現代の文化とは、奥が深いのですね！」"

[[dialogue]]
speaker = "unk"
# （ネビュラの人達にバレたら大変そう）
line = "（ネビュラの人達にバレたら大変そう）"

[[dialogue]]
speaker = "unk"
