line = "「ほぇえ～……なるほど。ドリルはロマンなのですね。勉強になりますっ」"

[[dialogue]]
speaker = "シュティレ"
# 「その通りです。超機動武神ギガンドム──必殺攻撃の掛け声、覚えられましたか？」
