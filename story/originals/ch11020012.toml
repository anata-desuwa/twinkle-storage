line = "「マーベラス。さすがは光の魔女様です」"

[[dialogue]]
speaker = "unk"
# 何をやってるの！？
line = "何をやってるの！？"

[[dialogue]]
speaker = "トリュファイナ"
# 「あ、魔王様！　ご無沙汰しております！」
line = "「あ、魔王様！　ご無沙汰しております！」"

[[dialogue]]
speaker = "シュティレ"
# 「マスターに頼まれて、先ほどまでトリュファイナさんの義体の調整をしていたのです」
line = "「マスターに頼まれて、先ほどまでトリュファイナさんの義体の調整をしていたのです」"

[[dialogue]]
speaker = "シュティレ"
