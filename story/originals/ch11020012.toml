line = "「シュティレ様。私、ろぼっとあにめ……？　以外の映像も拝聴したいです！」"

[[dialogue]]
speaker = "シュティレ"
# 「さらに深みを目指すと？　なるほど、承りました」
line = "「さらに深みを目指すと？　なるほど、承りました」"

[[dialogue]]
speaker = "シュティレ"
# 「では……そうですね。次は漫才のライブ映像などどうでしょう？」
line = "「では……そうですね。次は漫才のライブ映像などどうでしょう？」"

[[dialogue]]
speaker = "シュティレ"
# 「何を隠そう、私はお笑い番組も大好物なのです」
line = "「何を隠そう、私はお笑い番組も大好物なのです」"

[[dialogue]]
speaker = "シュティレ"
# 「ちなみにお笑い番組を見始めたのは、この無表情な顔でも友達の輪に溶け込める話題を作りたい、という切実で政治的な理由になります」
line = "「ちなみにお笑い番組を見始めたのは、この無表情な顔でも友達の輪に溶け込める話題を作りたい、という切実で政治的な理由になります」"

[[dialogue]]
speaker = "unk"
# 意外と理由が悲しい……！！
line = "意外と理由が悲しい……！！"

[[dialogue]]
speaker = "シュティレ"
# 「結果、友達の輪はあまり広がりませんでしたが、キャラ付けにはなったので良しです。ぶい」
line = "「結果、友達の輪はあまり広がりませんでしたが、キャラ付けにはなったので良しです。ぶい」"

[[dialogue]]
speaker = "シュティレ"
# 「ではトリュファイナさん、漫才ライブ、再生します」
line = "「ではトリュファイナさん、漫才ライブ、再生します」"

[[dialogue]]
speaker = "トリュファイナ"
# 「はいっ！　よろしくお願いいたします♪」
line = "「はいっ！　よろしくお願いいたします♪」"

[[dialogue]]
speaker = "トリュファイナ"
# 「ほぇえ～……なるほど。『なんでやねーん』と言うこれが、『ツッコミ』というものなのですか～……」
line = "「ほぇえ～……なるほど。『なんでやねーん』と言うこれが、『ツッコミ』というものなのですか～……」"

[[dialogue]]
speaker = "シュティレ"
# 「その通りです。事実とずれた事柄を指摘する際、大げさな身振り手振りと共にこれを行うことで、場が引き締まるのです」
line = "「その通りです。事実とずれた事柄を指摘する際、大げさな身振り手振りと共にこれを行うことで、場が引き締まるのです」"

[[dialogue]]
speaker = "トリュファイナ"
# 「なんでやねーん……すごいのですね。機会があれば、ぜひ一度、会話で使ってみたいです」
line = "「なんでやねーん……すごいのですね。機会があれば、ぜひ一度、会話で使ってみたいです」"

[[dialogue]]
speaker = "unk"
# 光の魔女にこんなこと教えて……
line = "光の魔女にこんなこと教えて……"

[[dialogue]]
speaker = "unk"
# 本当に大丈夫なのかな……
line = "本当に大丈夫なのかな……"

[[dialogue]]
speaker = "ウェンディ"
# 「あっ、会長さん！　探しましたよ、星徒会室にいらっしゃらないから……」
line = "「あっ、会長さん！　探しましたよ、星徒会室にいらっしゃらないから……」"

[[dialogue]]
speaker = "unk"
# げっ！　ウェンディ！？
line = "げっ！　ウェンディ！？"

[[dialogue]]
speaker = "シュティレ"
# 「む。新キャラですね」
line = "「む。新キャラですね」"

[[dialogue]]
speaker = "ウェンディ"
# 「こちら、次回のネビュラと新星学園の合同訓練の資料です。できればすぐに目を通して、ご意見をいただきたくて……」
line = "「こちら、次回のネビュラと新星学園の合同訓練の資料です。できればすぐに目を通して、ご意見をいただきたくて……」"

[[dialogue]]
speaker = "トリュファイナ"
# 「まあ。魔女が学園と合同訓練……時が経つごとに仲良しになっておりますね。私、嬉しいです♪」
line = "「まあ。魔女が学園と合同訓練……時が経つごとに仲良しになっておりますね。私、嬉しいです♪」"

[[dialogue]]
speaker = "ウェンディ"
# 「──って！？　あ、あああ、あなた様は……光の魔女っ……ト、ト、ト──トリュファイナ様っ！？！？」
line = "「──って！？　あ、あああ、あなた様は……光の魔女っ……ト、ト、ト──トリュファイナ様っ！？！？」"

