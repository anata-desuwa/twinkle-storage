[[dialogue]]
speaker = "トリュファイナ"
# 「あ……なるほど♪　実践してみましょう！」
line = "「あ……なるほど♪　実践してみましょう！」"

[[dialogue]]
speaker = "トリュファイナ"
# 「な──なんでやねーん！」
