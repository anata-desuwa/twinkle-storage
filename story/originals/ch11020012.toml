line = "「お笑いはタイミングが命。テンポと言う名の鮮度があります。次回からは、間髪入れず『なんでやねん』を使えるようになりましょう」"

[[dialogue]]
speaker = "トリュファイナ"
# 「ほぇえ～。奥が深いのですね、ツッコミ……」
