[[dialogue]]
speaker = "トリュファイナ"
# 「えっと……『外道の貴様らには地獄すら生ぬるい！　ギガンドリル・プレッシャー！！』」
line = "「えっと……『外道の貴様らには地獄すら生ぬるい！　ギガンドリル・プレッシャー！！』」"

[[dialogue]]
