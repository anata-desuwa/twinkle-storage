line = "トリュファイナさん、もうやめて！"

[[dialogue]]
speaker = "ウェンディ"
# 「会長さん！？　あの！　これは！　一体……な、なんで！？　なんでやねーーーん！？」
line = "「会長さん！？　あの！　これは！　一体……な、なんで！？　なんでやねーーーん！？」"

[[dialogue]]
speaker = "unk"
# うつってるよ、ウェンディ！？
line = "うつってるよ、ウェンディ！？"

[[dialogue]]
speaker = "ウェンディ"
# 「うつりもしますよ！　あなた、光の魔女に何てことを教えてるんですか──！？」
line = "「うつりもしますよ！　あなた、光の魔女に何てことを教えてるんですか──！？」"

[[dialogue]]
speaker = "unk"
# 教えたの、俺じゃないって！！
