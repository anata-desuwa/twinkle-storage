[[dialogue]]
speaker = "シュティレ"
# 「いざという時にすばやく繰り出せるよう、素振りは大事です。なんでやねん、なんでやねん──はい、どうぞ」
line = "「いざという時にすばやく繰り出せるよう、素振りは大事です。なんでやねん、なんでやねん──はい、どうぞ」"

[[dialogue]]
speaker = "トリュファイナ"
# 「はい！　──なんでやねん！　──なんでやねん！」
line = "「はい！　──なんでやねん！　──なんでやねん！」"

[[dialogue]]
speaker = "unk"
