speaker = "トリュファイナ"
# 「あ、そんなに畏まらず。光の魔女であったのはもう大昔のこと。今はただの、魔女トリュファイナに過ぎないのですから」
line = "「あ、そんなに畏まらず。光の魔女であったのはもう大昔のこと。今はただの、魔女トリュファイナに過ぎないのですから」"

[[dialogue]]
speaker = "トリュファイナ"
# 「とはいえ、魔女の森にも帰らず、元老会からも認識されていない私は、立派な<ruby=ヤーガ>はぐれ魔女</ruby>になってしまったのでしょうか？」
line = "「とはいえ、魔女の森にも帰らず、元老会からも認識されていない私は、立派な<ruby>はぐれ魔女<rt>ヤーガ</rt></ruby>になってしまったのでしょうか？」"

[[dialogue]]
speaker = "ウェンディ"
# 「な、ななな、何故トリュファイナ様がこんなところに！？　というか、あわわっ、私なんかが会話していいお方なのでしょうか！？」
line = "「な、ななな、何故トリュファイナ様がこんなところに！？　というか、あわわっ、私なんかが会話していいお方なのでしょうか！？」"

[[dialogue]]
speaker = "シュティレ"
# 「トリュファイナさん、今です。こういう時にさっきのツッコミを使うのですよ」
