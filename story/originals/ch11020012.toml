[[dialogue]]
speaker = "ウェンディ"
# 「はェエ──────！？！？！？」
line = "「はェエ──────！？！？！？」"

[[dialogue]]
speaker = "トリュファイナ"
# 「私は今代の光の魔女じゃ、なっ、ないのですよー！？　かしこまったら、あ、あかんでー！！」
line = "「私は今代の光の魔女じゃ、なっ、ないのですよー！？　かしこまったら、あ、あかんでー！！」"

[[dialogue]]
speaker = "ウェンディ"
