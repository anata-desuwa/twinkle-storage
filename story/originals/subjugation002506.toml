[[dialogue]]
speaker = "unk"
# シャドウマハムートに挑んだヒルディオーネたち。そして――
line = "シャドウマハムートに挑んだヒルディオーネたち。そして――"

[[dialogue]]
speaker = "シャドウマハムート"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「はぁ……はぁ……。なんとか勝ちましたわね」
line = "「はぁ……はぁ……。なんとか勝ちましたわね」"

[[dialogue]]
speaker = "フェニエル"
# 「お姉様、すごいです！　あのマムのノヴァフォームを倒しちゃいました！」
line = "「お姉様、すごいです！　あのマムのノヴァフォームを倒しちゃいました！」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「ヒルディーちゃん、すごいわ～！　お姉ちゃん、思わずハグして頭なでなでしたくなっちゃう♪」
line = "「ヒルディーちゃん、すごいわ～！　お姉ちゃん、思わずハグして頭なでなでしたくなっちゃう♪」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「サーシャさん、ヒルディオーネ先輩は同級生ですよ……」
line = "「サーシャさん、ヒルディオーネ先輩は同級生ですよ……」"

[[dialogue]]
speaker = "アニマ（覚醒）"
# 「しかし驚いたヨ。まさか、<b>あんな新技</b>を編み出していたとはネ。いやはや、『努力の天才』とはよく言ったものダ」
line = "「しかし驚いたヨ。まさか、<b>あんな新技</b>を編み出していたとはネ。いやはや、『努力の天才』とはよく言ったものダ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ええ。次の星霊祭で、マムに勝つ為の切り札ですわ」
line = "「ええ。次の星霊祭で、マムに勝つ為の切り札ですわ」"

[[dialogue]]
speaker = "シュティレ"
# 「やはり、ドリルこそが最強なのです。ぶい」
line = "「やはり、ドリルこそが最強なのです。ぶい」"

[[dialogue]]
speaker = "シュティレ"
# 「ヒルディオーネ先輩、いえ、ヒルディーお姉様。後で是非ドリルについて熱く語り合わせて下さい！」
line = "「ヒルディオーネ先輩、いえ、ヒルディーお姉様。後で是非ドリルについて熱く語り合わせて下さい！」"

[[dialogue]]
speaker = "unk"
# そう言ってキラキラした瞳でヒルディオーネを見上げ、握手を求めて来るシュティレ。
line = "そう言ってキラキラした瞳でヒルディオーネを見上げ、握手を求めて来るシュティレ。"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「え、ええ。そうですわね、おほほほ♪」
line = "「え、ええ。そうですわね、おほほほ♪」"

[[dialogue]]
speaker = "ヒルディオーネ"
# （期待の眼差しがすごくて、断りづらいですわ……！　先にドリルについて、色々学んでおきませんと）
line = "（期待の眼差しがすごくて、断りづらいですわ……！　先にドリルについて、色々学んでおきませんと）"

[[dialogue]]
speaker = "シュティレ"
# 「フニ先輩もすごかったです。シュティレは飛行能力に自信があったのですが、先輩のキレッキレな飛び方にはロマンを感じました」
line = "「フニ先輩もすごかったです。シュティレは飛行能力に自信があったのですが、先輩のキレッキレな飛び方にはロマンを感じました」"

[[dialogue]]
speaker = "フェニエル"
# 「わ、私ですかっ？　ありがとうございます、シュティレちゃん」
line = "「わ、私ですかっ？　ありがとうございます、シュティレちゃん」"

[[dialogue]]
speaker = "フェニエル"
# 「私の中に宿っている不死鳥、ホウちゃんから教わったんです。よかったら今度、一緒に訓練してみますか？」
line = "「私の中に宿っている不死鳥、ホウちゃんから教わったんです。よかったら今度、一緒に訓練してみますか？」"

[[dialogue]]
speaker = "シュティレ"
# 「いいのですか？　今日はシュティレの友好の輪が一気に広がり、実に素晴らしき日です。ぶいぶいっ」
line = "「いいのですか？　今日はシュティレの友好の輪が一気に広がり、実に素晴らしき日です。ぶいぶいっ」"

[[dialogue]]
speaker = "セシア"
# 「フニ、先輩として慕われる母性を身に付けて、また１つママとしての階段を登ったわね♪　ふふふっ」
line = "「フニ、先輩として慕われる母性を身に付けて、また１つママとしての階段を登ったわね♪　ふふふっ」"

[[dialogue]]
speaker = "アニマ（覚醒）"
# 「セッシー、人工戦闘服のクリスマスフォーム、上手く使いこなしているようだナ」
line = "「セッシー、人工戦闘服のクリスマスフォーム、上手く使いこなしているようだナ」"

[[dialogue]]
speaker = "アニマ（覚醒）"
# 「いや、それどころか、元の想定を超えて独自に成長しつつある。さすがは蓄積を司る守護天使ダ」
line = "「いや、それどころか、元の想定を超えて独自に成長しつつある。さすがは蓄積を司る守護天使ダ」"

[[dialogue]]
speaker = "セシア"
# 「アニマ、あなたが私用にこまめにメンテナンスしてくれているおかげよ」
line = "「アニマ、あなたが私用にこまめにメンテナンスしてくれているおかげよ」"

[[dialogue]]
speaker = "セシア"
# 「あなたもママではないけれど、その研究成果を蓄積し続ける姿勢はプラス５ポイント以上あるわ。いつもありがとう♪」
line = "「あなたもママではないけれど、その研究成果を蓄積し続ける姿勢はプラス５ポイント以上あるわ。いつもありがとう♪」"

[[dialogue]]
speaker = "アニマ（覚醒）"
# 「フヒ、こちらこそダ♪　セッシーの蓄積データは人工ノヴァフォームのアップデートに大いに役立っていル。これからもよろしく頼むヨ」
line = "「フヒ、こちらこそダ♪　セッシーの蓄積データは人工ノヴァフォームのアップデートに大いに役立っていル。これからもよろしく頼むヨ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「……ノヴァフォーム、それにしても大した代物ですわね」
line = "「……ノヴァフォーム、それにしても大した代物ですわね」"

[[dialogue]]
speaker = "アニマ（覚醒）"
# 「ム？　なんだ、ヒルディー、ノヴァフォームに興味があるのカ？」
line = "「ム？　なんだ、ヒルディー、ノヴァフォームに興味があるのカ？」"

[[dialogue]]
speaker = "アニマ（覚醒）"
# 「ならば、アニマが力を貸すゾ？　会長にも言えば、快く相談に乗ってくれるだろウ」
line = "「ならば、アニマが力を貸すゾ？　会長にも言えば、快く相談に乗ってくれるだろウ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ええ。考えておきますわ」
line = "「ええ。考えておきますわ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# （確かに今日、私は新技でマムのノヴァフォームを倒すことができましたわ。ですが……）
line = "（確かに今日、私は新技でマムのノヴァフォームを倒すことができましたわ。ですが……）"

[[dialogue]]
speaker = "ヒルディオーネ"
# （それはこの場にノヴァフォームの星騎士たちが、サーシャ、アニマ、マトイと３人揃っていたからこそできたこと）
line = "（それはこの場にノヴァフォームの星騎士たちが、サーシャ、アニマ、マトイと３人揃っていたからこそできたこと）"

[[dialogue]]
speaker = "ヒルディオーネ"
# （私１人だったらおそらく、倒すことはできなかったでしょう）
line = "（私１人だったらおそらく、倒すことはできなかったでしょう）"

[[dialogue]]
speaker = "ヒルディオーネ"
# （やはり、私も目指すしかありませんわ――）
line = "（やはり、私も目指すしかありませんわ――）"

[[dialogue]]
speaker = "ヒルディオーネ"
# （自身の限界を超えた――<b>覚醒</b>の<ruby=いただき>頂</ruby>を）
line = "（自身の限界を超えた――<b>覚醒</b>の<ruby>頂<rt>いただき</rt></ruby>を）"

[[dialogue]]
speaker = "unk"
# 千園寺ヒルディオーネは、そうして決意を新たにするのだった――
line = "千園寺ヒルディオーネは、そうして決意を新たにするのだった――"
