[[dialogue]]
speaker = "アニュラス"
# 「ではそろそろ、本題に入ろうか。具体的な計画について話していこう。寮長殿からのオーダーは確か……」
line = "「ではそろそろ、本題に入ろうか。具体的な計画について話していこう。寮長殿からのオーダーは確か……」"

[[dialogue]]
speaker = "舞亜"
# 「『流星寮の品格に相応しいクリスマスパーティー』って言ってたけど、それって具体的にどういうこと？」
line = "「『流星寮の品格に相応しいクリスマスパーティー』って言ってたけど、それって具体的にどういうこと？」"

[[dialogue]]
speaker = "アポロ"
# 「楽しいだけじゃダメなのか？」
line = "「楽しいだけじゃダメなのか？」"

[[dialogue]]
speaker = "アニュラス"
# 「パーティーが楽しいのは当然だからな、加えて格式高いパーティーであることを求められているのだろう」
line = "「パーティーが楽しいのは当然だからな、加えて格式高いパーティーであることを求められているのだろう」"

[[dialogue]]
speaker = "unk"
# 例えば？
line = "例えば？"

[[dialogue]]
speaker = "アニュラス"
# 「そうだな……伝統に則った儀式や厳かな精神性を求めているのではないか？」
line = "「そうだな……伝統に則った儀式や厳かな精神性を求めているのではないか？」"

[[dialogue]]
speaker = "アニュラス"
# 「クリスマスの歴史を紐解き、古くから行われていた行事を踏襲してみるのはどうだろうか」
line = "「クリスマスの歴史を紐解き、古くから行われていた行事を踏襲してみるのはどうだろうか」"

[[dialogue]]
speaker = "アニュラス"
# 「詳細はこれから練っていくとして、まず最初に寮長殿の挨拶、その後皆で聖歌の合唱、食事も聖餐と呼ばれる特別メニューを用意して……」
line = "「詳細はこれから練っていくとして、まず最初に寮長殿の挨拶、その後皆で聖歌の合唱、食事も聖餐と呼ばれる特別メニューを用意して……」"

[[dialogue]]
speaker = "舞亜"
# 「アニュラスはそういうのが好きなの？」
line = "「アニュラスはそういうのが好きなの？」"

[[dialogue]]
speaker = "アニュラス"
# 「んん……特に考えたことはなかったが、歴史ある儀式には興味が湧く」
line = "「んん……特に考えたことはなかったが、歴史ある儀式には興味が湧く」"

[[dialogue]]
speaker = "舞亜"
# 「例えば……叙爵式とかそういうかっこいい感じとか？」
line = "「例えば……叙爵式とかそういうかっこいい感じとか？」"

[[dialogue]]
speaker = "アニュラス"
# 「そうだな！　クリスマスもかくあるべきだと思う。世俗に塗れた騒がしい宴ではなく、静かに祈りを捧げることこそ、寮長殿が求めたものだろう」
line = "「そうだな！　クリスマスもかくあるべきだと思う。世俗に塗れた騒がしい宴ではなく、静かに祈りを捧げることこそ、寮長殿が求めたものだろう」"

[[dialogue]]
speaker = "アポロ"
# 「うーん……」
line = "「うーん……」"

[[dialogue]]
speaker = "アニュラス"
# 「どうしたアポロ、難しい顔をして？」
line = "「どうしたアポロ、難しい顔をして？」"

[[dialogue]]
speaker = "アポロ"
# 「あたしもかっこいいのは好きだ。でも、アニュラスのアイデアは……うーん……」
line = "「あたしもかっこいいのは好きだ。でも、アニュラスのアイデアは……うーん……」"

[[dialogue]]
speaker = "アニュラス"
# 「ふむ……アポロのイメージするパーティーとは違うのか？」
line = "「ふむ……アポロのイメージするパーティーとは違うのか？」"

[[dialogue]]
speaker = "アポロ"
# 「パーティーというのはもっと賑やかで楽しい感じのものだろ！」
line = "「パーティーというのはもっと賑やかで楽しい感じのものだろ！」"

[[dialogue]]
speaker = "舞亜"
# 「言ってることは分かるけど、アニュラスのアイデアはちょっと硬いかもしれないね」
line = "「言ってることは分かるけど、アニュラスのアイデアはちょっと硬いかもしれないね」"

[[dialogue]]
speaker = "アポロ"
# 「そう、それだ！」
line = "「そう、それだ！」"

[[dialogue]]
speaker = "アニュラス"
# 「硬い、か……自分でもそういう風に思うことはある」
line = "「硬い、か……自分でもそういう風に思うことはある」"

[[dialogue]]
speaker = "アニュラス"
# 「もっと柔軟な思考を持ちたいところだが……例えばアポロであればどんなパーティーを考える？」
line = "「もっと柔軟な思考を持ちたいところだが……例えばアポロであればどんなパーティーを考える？」"

[[dialogue]]
speaker = "アポロ"
# 「そうだな……例えばトナカイのそりレースなんてどうだ？」
line = "「そうだな……例えばトナカイのそりレースなんてどうだ？」"

[[dialogue]]
speaker = "アポロ"
# 「トナカイに引かせたそりでレースとか、聞いただけでワクワクしちゃうぜ！」
line = "「トナカイに引かせたそりでレースとか、聞いただけでワクワクしちゃうぜ！」"

[[dialogue]]
speaker = "舞亜"
# 「確かにワクワクするね。どのトナカイが勝つか予想するのも楽しそう」
line = "「確かにワクワクするね。どのトナカイが勝つか予想するのも楽しそう」"

[[dialogue]]
speaker = "アニュラス"
# 「ああ、だがトナカイやそり、それにレースする場所も確保するのはかなり困難だぞ？」
line = "「ああ、だがトナカイやそり、それにレースする場所も確保するのはかなり困難だぞ？」"

[[dialogue]]
speaker = "アポロ"
# 「そこをなんとかするのが実行委員会だ」
line = "「そこをなんとかするのが実行委員会だ」"

[[dialogue]]
speaker = "アニュラス"
# 「ふむ、そうか……他には何かあるか？」
line = "「ふむ、そうか……他には何かあるか？」"

[[dialogue]]
speaker = "アポロ"
# 「実物大のブッシュドノエルとかどうだ？　でっかい丸太のケーキを作ってみんなで食べるんだ！」
line = "「実物大のブッシュドノエルとかどうだ？　でっかい丸太のケーキを作ってみんなで食べるんだ！」"

[[dialogue]]
speaker = "アニュラス"
# 「そんなに大きなケーキを作って食べきれるのか？」
line = "「そんなに大きなケーキを作って食べきれるのか？」"

[[dialogue]]
speaker = "アポロ"
# 「寮生たくさんいるし大丈夫なんじゃないか？」
line = "「寮生たくさんいるし大丈夫なんじゃないか？」"

[[dialogue]]
speaker = "舞亜"
# 「流星寮にはエルゼちゃんもいるしね」
line = "「流星寮にはエルゼちゃんもいるしね」"

[[dialogue]]
speaker = "アニュラス"
# 「だったら実物大でも問題なさそうだな」
line = "「だったら実物大でも問題なさそうだな」"

[[dialogue]]
speaker = "アポロ"
# 「あとは巨大クリスマスツリー！　これなら簡単じゃないか？」
line = "「あとは巨大クリスマスツリー！　これなら簡単じゃないか？」"

[[dialogue]]
speaker = "アポロ"
# 「こういうのがやりたいっていう画像があるんだ、これを見てくれ」
line = "「こういうのがやりたいっていう画像があるんだ、これを見てくれ」"

[[dialogue]]
speaker = "アニュラス"
# 「……むむ、これは！　天を衝くような巨木だな！」
line = "「……むむ、これは！　天を衝くような巨木だな！」"

[[dialogue]]
speaker = "舞亜"
# 「ツリーが高すぎると飾り付けをするのが大変そうだね」
line = "「ツリーが高すぎると飾り付けをするのが大変そうだね」"

[[dialogue]]
speaker = "アポロ"
# 「飛べるやつばっかりなんだから問題ないだろ」
line = "「飛べるやつばっかりなんだから問題ないだろ」"

[[dialogue]]
speaker = "アニュラス"
# 「そうだな……。しかし、このような巨木、どこから調達するんだ？　置き場にも困るだろう」
line = "「そうだな……。しかし、このような巨木、どこから調達するんだ？　置き場にも困るだろう」"

[[dialogue]]
speaker = "アポロ"
# 「寮の外にでーんと立てよう！」
line = "「寮の外にでーんと立てよう！」"

[[dialogue]]
speaker = "舞亜"
# 「寮長さんは派手なの好きそうだし、千園寺家パワーで何とかしちゃうんじゃない？」
line = "「寮長さんは派手なの好きそうだし、千園寺家パワーで何とかしちゃうんじゃない？」"

[[dialogue]]
speaker = "アニュラス"
# 「なるほどな……アポロの抱いているクリスマスパーティーのイメージは何となく分かった」
line = "「なるほどな……アポロの抱いているクリスマスパーティーのイメージは何となく分かった」"

[[dialogue]]
speaker = "アニュラス"
# 「だが、それらは寮長殿の『流星寮の品格に相応しいクリスマスパーティー』という要望に沿わないのではないか？」
line = "「だが、それらは寮長殿の『流星寮の品格に相応しいクリスマスパーティー』という要望に沿わないのではないか？」"

[[dialogue]]
speaker = "舞亜"
# 「まあ、それは……多分沿わないと思う」
line = "「まあ、それは……多分沿わないと思う」"

[[dialogue]]
speaker = "アポロ"
# 「でも格式とかにこだわって、面白くないパーティーになったら本末テントーってやつじゃないか」
line = "「でも格式とかにこだわって、面白くないパーティーになったら本末テントーってやつじゃないか」"

[[dialogue]]
speaker = "アニュラス"
# 「それはその通りだ……うーん……」
line = "「それはその通りだ……うーん……」"

[[dialogue]]
speaker = "舞亜"
# 「とりあえず色々アイデアは出たし、今日はこんな所でいいんじゃない？」
line = "「とりあえず色々アイデアは出たし、今日はこんな所でいいんじゃない？」"

[[dialogue]]
speaker = "アニュラス"
# 「そうだな、一度持ち帰ってアイデアを練ってこよう」
line = "「そうだな、一度持ち帰ってアイデアを練ってこよう」"

[[dialogue]]
speaker = "アポロ"
# 「わかった、次に集まる時までにあたしも考えてくる」
line = "「わかった、次に集まる時までにあたしも考えてくる」"

[[dialogue]]
speaker = "unk"
# 次に集まる日を決めて、第１回流星寮クリスマスパーティー実行委員会の初回の会合は終わった。
line = "次に集まる日を決めて、第１回流星寮クリスマスパーティー実行委員会の初回の会合は終わった。"

[[dialogue]]
speaker = "unk"
# アニュラスの抱くパーティーのイメージと、アポロの抱くパーティーのイメージ。
line = "アニュラスの抱くパーティーのイメージと、アポロの抱くパーティーのイメージ。"

[[dialogue]]
speaker = "unk"
# それが全く逆の方向を向いていて、これをまとめるのは難航しそうな予感があった──
line = "それが全く逆の方向を向いていて、これをまとめるのは難航しそうな予感があった──"

[[dialogue]]
speaker = "舞亜"
# 「会長さん♪」
line = "「会長さん♪」"

[[dialogue]]
speaker = "unk"
# どうしたの？
line = "どうしたの？"

[[dialogue]]
speaker = "unk"
# 舞亜？
line = "舞亜？"

[[dialogue]]
speaker = "舞亜"
# 「ちょっと考え事に付き合って欲しくて、この後いいかな？」
line = "「ちょっと考え事に付き合って欲しくて、この後いいかな？」"
