[[dialogue]]
speaker = "コハルコ"
# 「次に起きたのが、プリマステラ襲撃事件」
line = "「次に起きたのが、プリマステラ襲撃事件」"

[[dialogue]]
speaker = "コハルコ"
# 「その犯人はコラプサーの１人──イングリット」
line = "「その犯人はコラプサーの１人──イングリット」"

[[dialogue]]
speaker = "コハルコ"
# 「プリマステラになれるのは星騎士の中でも優秀な者だけ──のはずなんだけど、イングリットはそのプリマステラを容易く蹴散らしてしまった」
line = "「プリマステラになれるのは星騎士の中でも優秀な者だけ──のはずなんだけど、イングリットはそのプリマステラを容易く蹴散らしてしまった」"

[[dialogue]]
speaker = "コハルコ"
# 「この時イングリットは星力を奪って回っていたんだけど、ついでに倒したプリマステラのセレスティアも取っていったんだよね……」
line = "「この時イングリットは星力を奪って回っていたんだけど、ついでに倒したプリマステラのセレスティアも取っていったんだよね……」"

[[dialogue]]
speaker = "コハルコ"
# 「カティアさんが調査に協力してくれたけど、イングリットとともにアステラに囚われてしまった」
line = "「カティアさんが調査に協力してくれたけど、イングリットとともにアステラに囚われてしまった」"

[[dialogue]]
speaker = "コハルコ"
# 「一方、単独で動いていたマリーベルさんは、別行動していたジュリエッテを拘束した」
line = "「一方、単独で動いていたマリーベルさんは、別行動していたジュリエッテを拘束した」"

[[dialogue]]
speaker = "ジュリエッテ"
# 『コラプサーの目的は救世。あなた方と同じく世界を守ることでございます』
line = "『コラプサーの目的は救世。あなた方と同じく世界を守ることでございます』"

[[dialogue]]
speaker = "コハルコ"
# 「そのおかげで、ジュリエッテからコラプサーの目的の一端を知ることができた。それと……」
line = "「そのおかげで、ジュリエッテからコラプサーの目的の一端を知ることができた。それと……」"

[[dialogue]]
speaker = "イングリット"
# 『そうだ。私たちコラプサーは皆ブラックホールを守護星に持っている。だがそれがわかったところで何になる』
line = "『そうだ。私たちコラプサーは皆ブラックホールを守護星に持っている。だがそれがわかったところで何になる』"

[[dialogue]]
speaker = "コハルコ"
# 「コラプサーはブラックホールを守護星に持っていること、星力吸収能力は守護星に由来していることが判明したね」
line = "「コラプサーはブラックホールを守護星に持っていること、星力吸収能力は守護星に由来していることが判明したね」"

[[dialogue]]
speaker = "コハルコ"
# 「最終的には会長さん、マリーベルさん、カティアさんのユニゾンアタックでイングリットを撃破。セレスティアの奪還に成功した」
line = "「最終的には会長さん、マリーベルさん、カティアさんのユニゾンアタックでイングリットを撃破。セレスティアの奪還に成功した」"

[[dialogue]]
speaker = "コハルコ"
# 「だけどキサナの介入で、イングリットとジュリエッテには逃げられちゃった」
line = "「だけどキサナの介入で、イングリットとジュリエッテには逃げられちゃった」"

[[dialogue]]
speaker = "コハルコ"
# 「イングリットとジュリエッテのデータも再現してみたから、体験してみてね」
line = "「イングリットとジュリエッテのデータも再現してみたから、体験してみてね」"
