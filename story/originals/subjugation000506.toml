[[dialogue]]
speaker = "unk"
# 第6話,キリカの気持ち,B
line = "第6話,キリカの気持ち,B"

[[dialogue]]
speaker = "unk"
# 模擬戦に敗北した次の日。キリカは<b>ただの</b>メイドとして、食事の用意に掃除に洗濯と……日課の仕事を真面目にこなしていた。
line = "模擬戦に敗北した次の日。キリカは<b>ただの</b>メイドとして、食事の用意に掃除に洗濯と……日課の仕事を真面目にこなしていた。"

[[dialogue]]
speaker = "キリカ"
# 「（この後のタスクは、メイド隊全体の作業状況を確認して、日間スケジュールの再調整を――）」
line = "「（この後のタスクは、メイド隊全体の作業状況を確認して、日間スケジュールの再調整を――）」"

[[dialogue]]
speaker = "キリカ"
# 「（って、それはメイド長がするべき仕事ですよね。私が今やるべきことは、星見家のメイドとして速やかに、厳かに仕事をこなすこと……）」
line = "「（って、それはメイド長がするべき仕事ですよね。私が今やるべきことは、星見家のメイドとして速やかに、厳かに仕事をこなすこと……）」"

[[dialogue]]
speaker = "キリカ"
# 「（なのに……どうして今の私は、清らかな気持ちでいられないのでしょう？）」
line = "「（なのに……どうして今の私は、清らかな気持ちでいられないのでしょう？）」"

[[dialogue]]
speaker = "キリカ"
# 「ふぅ……」
line = "「ふぅ……」"

[[dialogue]]
speaker = "ニャリオン"
# 「なんニャ、キリカ、いつもは口うるさい癖して、今日は妙に静かで調子が狂うニャン。ぺろぺろ……」
line = "「なんニャ、キリカ、いつもは口うるさい癖して、今日は妙に静かで調子が狂うニャン。ぺろぺろ……」"

[[dialogue]]
speaker = "キリカ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ニャリオン"
# 「って、ワガハイを無視するニャ！　いつもなら掃除の邪魔とか言って、抱っこしてどかしてくるのに、なんで今日はスルーするニャン！？」
line = "「って、ワガハイを無視するニャ！　いつもなら掃除の邪魔とか言って、抱っこしてどかしてくるのに、なんで今日はスルーするニャン！？」"

[[dialogue]]
speaker = "キリカ"
# 「あ、なんだ、そこにいたのですか、ニャリオン。気づきませんでした」
line = "「あ、なんだ、そこにいたのですか、ニャリオン。気づきませんでした」"

[[dialogue]]
speaker = "ニャリオン"
# 「お前が部屋に入ってきてからずっと、ここで毛づくろいしてたニャン！　フィオナ嬢の使い魔であるワガハイに挨拶の１つもなしとか、失礼なのニャ！」
line = "「お前が部屋に入ってきてからずっと、ここで毛づくろいしてたニャン！　フィオナ嬢の使い魔であるワガハイに挨拶の１つもなしとか、失礼なのニャ！」"

[[dialogue]]
speaker = "キリカ"
# 「……申し訳ないですが、今はあなたに構うような気分ではないので、そこで大人しく毛づくろいしてて下さい」
line = "「……申し訳ないですが、今はあなたに構うような気分ではないので、そこで大人しく毛づくろいしてて下さい」"

[[dialogue]]
speaker = "ニャリオン"
# 「もしかしてお前、またこの間みたいに風邪でも引いてるニャン？」
line = "「もしかしてお前、またこの間みたいに風邪でも引いてるニャン？」"

[[dialogue]]
speaker = "キリカ"
# 「なんでですか。引いてませんよ、別に」
line = "「なんでですか。引いてませんよ、別に」"

[[dialogue]]
speaker = "ニャリオン"
# 「でも、風邪引いた時みたいに元気がないニャ。さっきもため息ついてたニャン」
line = "「でも、風邪引いた時みたいに元気がないニャ。さっきもため息ついてたニャン」"

[[dialogue]]
speaker = "ニャリオン"
# 「大丈夫なのかニャン？　本当に具合が悪いなら、メイド長だからってカッコつけてないで、ちゃんとみんなに言うべきニャ」
line = "「大丈夫なのかニャン？　本当に具合が悪いなら、メイド長だからってカッコつけてないで、ちゃんとみんなに言うべきニャ」"

[[dialogue]]
speaker = "キリカ"
# 「別に病気とかではないので、大丈夫です。それに私はもう、メイド長ではありませんから」
line = "「別に病気とかではないので、大丈夫です。それに私はもう、メイド長ではありませんから」"

[[dialogue]]
speaker = "ニャリオン"
# 「何を言ってるのニャ？　キリカがメイド長じゃないって、どういうことニャン？」
line = "「何を言ってるのニャ？　キリカがメイド長じゃないって、どういうことニャン？」"

[[dialogue]]
speaker = "キリカ"
# 「私は元々、メイド長には相応しくなかったんです。だから、本来あるべき形に戻った……それだけのことです」
line = "「私は元々、メイド長には相応しくなかったんです。だから、本来あるべき形に戻った……それだけのことです」"

[[dialogue]]
speaker = "フィオナ"
# 「――あなたは本当にそれでいいと思ってるの？　キリカ」
line = "「――あなたは本当にそれでいいと思ってるの？　キリカ」"

[[dialogue]]
speaker = "キリカ"
# 「……！　フィオナお嬢様……」
line = "「……！　フィオナお嬢様……」"

[[dialogue]]
speaker = "フィオナ"
# 「緋宮会長が、私のところにきて、事情を話してくれたわ」
line = "「緋宮会長が、私のところにきて、事情を話してくれたわ」"

[[dialogue]]
speaker = "フィオナ"
# 「キリカ、あなたは真面目すぎる。そこが良いところだけど、悪いところでもある」
line = "「キリカ、あなたは真面目すぎる。そこが良いところだけど、悪いところでもある」"

[[dialogue]]
speaker = "フィオナ"
# 「もう１度聞くわ。あなたは本当に、メイド長じゃなくなっていいの？」
line = "「もう１度聞くわ。あなたは本当に、メイド長じゃなくなっていいの？」"

[[dialogue]]
speaker = "キリカ"
# 「……構いません。マリオンさんの方が、私より強くて、優秀で、相応しいメイドだと思いますから」
line = "「……構いません。マリオンさんの方が、私より強くて、優秀で、相応しいメイドだと思いますから」"

[[dialogue]]
speaker = "フィオナ"
# 「じゃあなんで、そんなに不貞腐れてるの？」
line = "「じゃあなんで、そんなに不貞腐れてるの？」"

[[dialogue]]
speaker = "キリカ"
# 「えっ……不貞腐れてる……？　私が……？」
line = "「えっ……不貞腐れてる……？　私が……？」"

[[dialogue]]
speaker = "フィオナ"
# 「それ以外にないでしょ。負けて、突然メイド長の座を奪われたから、不貞腐れて、塞ぎ込んでる」
line = "「それ以外にないでしょ。負けて、突然メイド長の座を奪われたから、不貞腐れて、塞ぎ込んでる」"

[[dialogue]]
speaker = "キリカ"
# 「そんなことは……」
line = "「そんなことは……」"

[[dialogue]]
speaker = "フィオナ"
# 「わかるよ、私には。キリカがたとえ、自分では認めたくないんだとしてもね。だって――」
line = "「わかるよ、私には。キリカがたとえ、自分では認めたくないんだとしてもね。だって――」"

[[dialogue]]
speaker = "フィオナ"
# 「私は幼なじみとして、キリカのことをずっと見てきたんだから」
line = "「私は幼なじみとして、キリカのことをずっと見てきたんだから」"

[[dialogue]]
speaker = "キリカ"
# 「フィオナお嬢様……」
line = "「フィオナお嬢様……」"

[[dialogue]]
speaker = "フィオナ"
# 「キリカ、昔、私に言ってくれたことがあったよね？」
line = "「キリカ、昔、私に言ってくれたことがあったよね？」"

[[dialogue]]
speaker = "フィオナ"
# 「私が星見フィオナであろうとした時に、自分を忘れないで欲しい、って」
line = "「私が星見フィオナであろうとした時に、自分を忘れないで欲しい、って」"

[[dialogue]]
speaker = "フィオナ"
# 「それと同じことを今、私も言うね」
line = "「それと同じことを今、私も言うね」"

[[dialogue]]
speaker = "フィオナ"
# 「キリカ、あなたの真面目さを、私は心から尊敬してる。あなたの背中を見ることで、私は今日まで<b>星見フィオナ</b>をやってこれた」
line = "「キリカ、あなたの真面目さを、私は心から尊敬してる。あなたの背中を見ることで、私は今日まで<b>星見フィオナ</b>をやってこれた」"

[[dialogue]]
speaker = "フィオナ"
# 「だけどね、そうやって真面目であろうとするあなたに、自分の気持ちを忘れないで欲しいって、私は思う」
line = "「だけどね、そうやって真面目であろうとするあなたに、自分の気持ちを忘れないで欲しいって、私は思う」"

[[dialogue]]
speaker = "フィオナ"
# 「キリカ、相応しいとか、相応しくないとか、そんなこと今更考えなくていいんだよ」
line = "「キリカ、相応しいとか、相応しくないとか、そんなこと今更考えなくていいんだよ」"

[[dialogue]]
speaker = "フィオナ"
# 「あなたは２年間、星見家のメイド長として、どこに出ても恥ずかしくない真面目な働きをしてきた。そのことは主人である私が保証する」
line = "「あなたは２年間、星見家のメイド長として、どこに出ても恥ずかしくない真面目な働きをしてきた。そのことは主人である私が保証する」"

[[dialogue]]
speaker = "フィオナ"
# 「だから後は、キリカの気持ちの問題なんだよ」
line = "「だから後は、キリカの気持ちの問題なんだよ」"

[[dialogue]]
speaker = "フィオナ"
# 「キリカがメイド長の仕事が好きなのか、嫌いなのか、これはそういう話なの」
line = "「キリカがメイド長の仕事が好きなのか、嫌いなのか、これはそういう話なの」"

[[dialogue]]
speaker = "ニャリオン"
# 「ニャーニャッニャッニャッ♪　なんかもうそれって、キリカのさっきまでの態度で、答え出てるようなものニャン？」
line = "「ニャーニャッニャッニャッ♪　なんかもうそれって、キリカのさっきまでの態度で、答え出てるようなものニャン？」"

[[dialogue]]
speaker = "キリカ"
# 「……お嬢様、ありがとうございます。それと――」
line = "「……お嬢様、ありがとうございます。それと――」"

[[dialogue]]
speaker = "キリカ"
# 「ニャリオン、あなたにも」
line = "「ニャリオン、あなたにも」"

[[dialogue]]
speaker = "ニャリオン"
# 「ニャニャッ！？　き、キリカがワガハイにお礼を……！？　明日は槍でも降るんじゃないかニャン！？」
line = "「ニャニャッ！？　き、キリカがワガハイにお礼を……！？　明日は槍でも降るんじゃないかニャン！？」"

[[dialogue]]
speaker = "キリカ"
# 「失礼な猫ですね、人がわざわざ礼を言っているのに、素直に受け取らないとは……」
line = "「失礼な猫ですね、人がわざわざ礼を言っているのに、素直に受け取らないとは……」"

[[dialogue]]
speaker = "フィオナ"
# 「ふふっ♪　キリカ、少しは元気が出たようですね」
line = "「ふふっ♪　キリカ、少しは元気が出たようですね」"

[[dialogue]]
speaker = "マリオン"
# 「――メイド長の座、取り戻しにきましたか」
line = "「――メイド長の座、取り戻しにきましたか」"

[[dialogue]]
speaker = "キリカ"
# 「はい」
line = "「はい」"

[[dialogue]]
speaker = "マリオン"
# 「それでは改めて聞きましょう、キリカさん。何故あなたは、メイド長になりたいのですか？」
line = "「それでは改めて聞きましょう、キリカさん。何故あなたは、メイド長になりたいのですか？」"

[[dialogue]]
speaker = "キリカ"
# 「それは私の――失いたくない『誇り』だからです」
line = "「それは私の――失いたくない『誇り』だからです」"

[[dialogue]]
speaker = "キリカ"
# 「私は２年前、あなたから押し付けられるようにメイド長になりました。だから別に、執着なんてないと、そう思っていました」
line = "「私は２年前、あなたから押し付けられるようにメイド長になりました。だから別に、執着なんてないと、そう思っていました」"

[[dialogue]]
speaker = "キリカ"
# 「ですが、いざメイド長の座を失って、初めて気づきました。私はいつの間にか、メイド長であることを誇りに思っていたんです」
line = "「ですが、いざメイド長の座を失って、初めて気づきました。私はいつの間にか、メイド長であることを誇りに思っていたんです」"

[[dialogue]]
speaker = "キリカ"
# 「だから……申し訳ありませんが、あなたにはやはり、メイド長の座を返すことはできません」
line = "「だから……申し訳ありませんが、あなたにはやはり、メイド長の座を返すことはできません」"

[[dialogue]]
speaker = "キリカ"
# 「私は今日、自分の意志で、メイド長になります」
line = "「私は今日、自分の意志で、メイド長になります」"

[[dialogue]]
speaker = "unk"
# 師匠……！
line = "師匠……！"

[[dialogue]]
speaker = "マリオン"
# 「うふふふ<emoji=heart04>　なるほど」
line = "「うふふふ<emoji=heart04>　なるほど」"

[[dialogue]]
speaker = "マリオン"
# 「どうやら、この前よりも、いい勝負が期待できそうですね♪」
line = "「どうやら、この前よりも、いい勝負が期待できそうですね♪」"

[[dialogue]]
speaker = "マリオン"
# 「――人形縫製」
line = "「――人形縫製」"

[[dialogue]]
speaker = "マリオン"
# 「さあ、キリカさん、見せて下さい。本気になったあなたの力を！」
line = "「さあ、キリカさん、見せて下さい。本気になったあなたの力を！」"

[[dialogue]]
speaker = "キリカ"
# 「――変身」
line = "「――変身」"

[[dialogue]]
speaker = "キリカ"
# 「――マリオンさん。いえ、前メイド長」
line = "「――マリオンさん。いえ、前メイド長」"

[[dialogue]]
speaker = "キリカ"
# 「私はメイド長の誇りにかけて、あなたに勝ちます！」
line = "「私はメイド長の誇りにかけて、あなたに勝ちます！」"

[[dialogue]]
speaker = "unk"
# ２人のメイド星騎士による激闘が、幕を開けるのだった。
line = "２人のメイド星騎士による激闘が、幕を開けるのだった。"
