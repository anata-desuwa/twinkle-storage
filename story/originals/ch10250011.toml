[[dialogue]]
speaker = "unk"
# 第１話,天才スケーター,P
line = "第１話,天才スケーター,P"

[[dialogue]]
speaker = "マトイ"
# 「おはよう、昨日の試合見た？　……え、ウソ！？　フィギュアスケート見てなかったの！？　柊舞亜ちゃんが金メダル取ってたじゃない！」
line = "「おはよう、昨日の試合見た？　……え、ウソ！？　フィギュアスケート見てなかったの！？　柊舞亜ちゃんが金メダル取ってたじゃない！」"

[[dialogue]]
speaker = "マトイ"
# 「は～、さすが舞亜ちゃん。隙のないショートプログラムもすごかったけど、優雅なのに静かな情熱を感じさせるフリーも……あぁっ、表現する言葉が足りないっ」
line = "「は～、さすが舞亜ちゃん。隙のないショートプログラムもすごかったけど、優雅なのに静かな情熱を感じさせるフリーも……あぁっ、表現する言葉が足りないっ」"

[[dialogue]]
speaker = "マトイ"
# 「ほら動画見て。すごいでしょ？　この前の世界選手権も優勝してたし、あの氷のようなクールさと透明感……まさに銀盤の妖精、リンクの星だよ！」
line = "「ほら動画見て。すごいでしょ？　この前の世界選手権も優勝してたし、あの氷のようなクールさと透明感……まさに銀盤の妖精、リンクの星だよ！」"

[[dialogue]]
speaker = "マトイ"
# 「あっ、ごめん、熱くなりすぎちゃった……。今日流星に行くんだったよね。よろしく～」
line = "「あっ、ごめん、熱くなりすぎちゃった……。今日流星に行くんだったよね。よろしく～」"

[[dialogue]]
speaker = "ソフィア"
# 「会長さん、こんにちは。今日もよろしくお願いします。――あ」
line = "「会長さん、こんにちは。今日もよろしくお願いします。――あ」"

[[dialogue]]
speaker = "舞亜"
# 「ただいま」
line = "「ただいま」"

[[dialogue]]
speaker = "ソフィア"
# 「お疲れ様です。昨日の試合お見事でした、舞亜さん」
line = "「お疲れ様です。昨日の試合お見事でした、舞亜さん」"

[[dialogue]]
speaker = "unk"
# どこかで見たことあるような……
line = "どこかで見たことあるような……"

[[dialogue]]
speaker = "マトイ"
# 「は～、さすが舞亜ちゃん。隙のないショートプログラムもすごかったけど、優雅なのに静かな情熱を感じさせるフリーも……あぁっ、表現する言葉が足りないっ」
line = "「は～、さすが舞亜ちゃん。隙のないショートプログラムもすごかったけど、優雅なのに静かな情熱を感じさせるフリーも……あぁっ、表現する言葉が足りないっ」"

[[dialogue]]
speaker = "マトイ"
# 「ほら動画見て。すごいでしょ？　この前の世界選手権も優勝してたし、あの氷のようなクールさと透明感……まさに銀盤の妖精、リンクの星だよ！」
line = "「ほら動画見て。すごいでしょ？　この前の世界選手権も優勝してたし、あの氷のようなクールさと透明感……まさに銀盤の妖精、リンクの星だよ！」"

[[dialogue]]
speaker = "unk"
# ！？
line = "！？"

[[dialogue]]
speaker = "舞亜"
# 「ソフィ、この人は？」
line = "「ソフィ、この人は？」"

[[dialogue]]
speaker = "ソフィア"
# 「新星学園の会長さんです。最近リクリエの兆候がありますし、さまざまな事件も起きていますから、足を運んでいただいて対策を検討しているんです」
line = "「新星学園の会長さんです。最近リクリエの兆候がありますし、さまざまな事件も起きていますから、足を運んでいただいて対策を検討しているんです」"

[[dialogue]]
speaker = "舞亜"
# 「そうなんだ。流星学園一年、柊舞亜です。よろしくお願いします」
line = "「そうなんだ。流星学園一年、柊舞亜です。よろしくお願いします」"

[[dialogue]]
speaker = "舞亜"
# 「……あれ、会長さん驚いてる。どうかした？　私の顔に見覚えでも？」
line = "「……あれ、会長さん驚いてる。どうかした？　私の顔に見覚えでも？」"

[[dialogue]]
speaker = "ソフィア"
# 「昨日金メダル取ったんですから当然でしょう」
line = "「昨日金メダル取ったんですから当然でしょう」"

[[dialogue]]
speaker = "ソフィア"
# 「会長さんが驚かれるのも無理はありませんが、彼女は正真正銘本物の、フィギュアスケーター柊舞亜です」
line = "「会長さんが驚かれるのも無理はありませんが、彼女は正真正銘本物の、フィギュアスケーター柊舞亜です」"

[[dialogue]]
speaker = "舞亜"
# 「私、流星のフィギュアスケート部なんだけど、あんまり学園来れてないからできるだけ顔出しておこうと思って」
line = "「私、流星のフィギュアスケート部なんだけど、あんまり学園来れてないからできるだけ顔出しておこうと思って」"

[[dialogue]]
speaker = "ソフィア"
# 「帰国したばかりでお疲れでしょうし、ゆっくりしていて良かったんですよ。テレビ出演とかはいいんですか？」
line = "「帰国したばかりでお疲れでしょうし、ゆっくりしていて良かったんですよ。テレビ出演とかはいいんですか？」"

[[dialogue]]
speaker = "舞亜"
# 「ふふっ、ソフィに会いたかったんだよ。ちなみにテレビ取材は明日」
line = "「ふふっ、ソフィに会いたかったんだよ。ちなみにテレビ取材は明日」"

[[dialogue]]
speaker = "舞亜"
# 「本当はソフィも試合の見学に連れて行きたかったんだけど、星徒会で忙しくしてたしね。ソフィのこと話したら、ミランダもアシュリーも会いたがってたけど」
line = "「本当はソフィも試合の見学に連れて行きたかったんだけど、星徒会で忙しくしてたしね。ソフィのこと話したら、ミランダもアシュリーも会いたがってたけど」"

[[dialogue]]
speaker = "ソフィア"
# 「そもそも場違いにもほどがあるのですが……。そのミランダさんもアシュリーさんも表彰台常連のトップクラスの選手じゃないですか」
line = "「そもそも場違いにもほどがあるのですが……。そのミランダさんもアシュリーさんも表彰台常連のトップクラスの選手じゃないですか」"

[[dialogue]]
speaker = "舞亜"
# 「ま、大会とかでけっこう会うからね。ライバルだけど友達なんだ」
line = "「ま、大会とかでけっこう会うからね。ライバルだけど友達なんだ」"

[[dialogue]]
speaker = "unk"
# 遠い世界の会話だ……
line = "遠い世界の会話だ……"

[[dialogue]]
speaker = "舞亜"
# 「あれ？　でも新星の会長さんって女の人じゃなかったっけ？　すごくエネルギーのある人だったような」
line = "「あれ？　でも新星の会長さんって女の人じゃなかったっけ？　すごくエネルギーのある人だったような」"

[[dialogue]]
speaker = "ソフィア"
# 「御前試合でヴィーナス前会長に勝利して新会長になったんです。あのヴィーナスさんを破ったのは少し信じがたいことではありますが」
line = "「御前試合でヴィーナス前会長に勝利して新会長になったんです。あのヴィーナスさんを破ったのは少し信じがたいことではありますが」"

[[dialogue]]
speaker = "舞亜"
# 「ごぜん……じあい……？」
line = "「ごぜん……じあい……？」"

[[dialogue]]
speaker = "unk"
# よくそういう顔される
line = "よくそういう顔される"

[[dialogue]]
speaker = "舞亜"
# 「ああ、ごめんなさい。あまりに聞きなれない言葉だったから」
line = "「ああ、ごめんなさい。あまりに聞きなれない言葉だったから」"

[[dialogue]]
speaker = "舞亜"
# 「でも私たちスケーターは観客の前で演技するから、いつも御前試合しているようなもの……でもないか。はは」
line = "「でも私たちスケーターは観客の前で演技するから、いつも御前試合しているようなもの……でもないか。はは」"

[[dialogue]]
speaker = "ソフィア"
# 「制度としては残っていましたが、近年では行われたことがない幻の行事でしたからね」
line = "「制度としては残っていましたが、近年では行われたことがない幻の行事でしたからね」"

[[dialogue]]
speaker = "舞亜"
# 「会長さん、そんなに強いんだ。すごいね」
line = "「会長さん、そんなに強いんだ。すごいね」"

[[dialogue]]
speaker = "unk"
# 君だってすごい
line = "君だってすごい"

[[dialogue]]
speaker = "舞亜"
# 「そう？　私はちょっと有名なだけだってば」
line = "「そう？　私はちょっと有名なだけだってば」"

[[dialogue]]
speaker = "舞亜"
# 「よし、最近ご無沙汰だったしソフィの練習見てあげる。課題はちゃんとできるようになった？」
line = "「よし、最近ご無沙汰だったしソフィの練習見てあげる。課題はちゃんとできるようになった？」"

[[dialogue]]
speaker = "ソフィア"
# 「もちろんです。星徒会の仕事があるとはいえ、練習を欠かすことはありません」
line = "「もちろんです。星徒会の仕事があるとはいえ、練習を欠かすことはありません」"

[[dialogue]]
speaker = "舞亜"
# 「さすがソフィ、そうこなくちゃ。それとお土産」
line = "「さすがソフィ、そうこなくちゃ。それとお土産」"

[[dialogue]]
speaker = "ソフィア"
# 「あ、どうも――ってこれ昨日の金メダル！？」
line = "「あ、どうも――ってこれ昨日の金メダル！？」"

[[dialogue]]
speaker = "舞亜"
# 「え？　ああ、ごめん、出し間違えた」
line = "「え？　ああ、ごめん、出し間違えた」"

[[dialogue]]
speaker = "舞亜"
# 「カロリー低めで美味しそうなお菓子があったから買ってきたんだけど……ユニちゃんに入れたはず……あれ、ない。ポケットにも……ない」
line = "「カロリー低めで美味しそうなお菓子があったから買ってきたんだけど……ユニちゃんに入れたはず……あれ、ない。ポケットにも……ない」"

[[dialogue]]
speaker = "舞亜"
# 「うーん……ええっと……あ、そうだ」
line = "「うーん……ええっと……あ、そうだ」"

[[dialogue]]
speaker = "舞亜"
# 「ごめん、さっき自分で食べたの忘れてた。どうりでお腹空いてないわけだ。はは」
line = "「ごめん、さっき自分で食べたの忘れてた。どうりでお腹空いてないわけだ。はは」"

[[dialogue]]
speaker = "unk"
# …………
line = "…………"

[[dialogue]]
speaker = "ソフィア"
# 「ぽかんとしないでください、会長さん。舞亜さんはこういう人なんです」
line = "「ぽかんとしないでください、会長さん。舞亜さんはこういう人なんです」"

[[dialogue]]
speaker = "舞亜"
# 「今度は空港に忘れないようにしようと思ったんだけどなぁ……。次こそはちゃんと買ってくるから。ね？」
line = "「今度は空港に忘れないようにしようと思ったんだけどなぁ……。次こそはちゃんと買ってくるから。ね？」"
