[[dialogue]]
speaker = "モネ"
# 「リィベルさん、図書委員のお仕事にはもう慣れましたか？」
line = "「リィベルさん、図書委員のお仕事にはもう慣れましたか？」"

[[dialogue]]
speaker = "リィベル"
# 「ええ。普通の本は魔本みたいに勝手に動いたりしないから気楽ね。貸出の受付もやり方は憶えたわ」
line = "「ええ。普通の本は魔本みたいに勝手に動いたりしないから気楽ね。貸出の受付もやり方は憶えたわ」"

[[dialogue]]
speaker = "リィベル"
# 「でも、利用者が来ない間は本を読んでいたいわ。用があれば、呼び鈴でも鳴らせばいいのに」
line = "「でも、利用者が来ない間は本を読んでいたいわ。用があれば、呼び鈴でも鳴らせばいいのに」"

[[dialogue]]
speaker = "モネ"
# 「あはは……本の貸出は図書委員の大事なお仕事ですから、我慢しましょうね……」
line = "「あはは……本の貸出は図書委員の大事なお仕事ですから、我慢しましょうね……」"

[[dialogue]]
speaker = "モネ"
# （深淵書庫の事件から一週間が経った）
line = "（深淵書庫の事件から一週間が経った）"

[[dialogue]]
speaker = "モネ"
# （リィベルさんはひとりの魔族として新星学園に転入し、そして図書委員の一員になった）
line = "（リィベルさんはひとりの魔族として新星学園に転入し、そして図書委員の一員になった）"

[[dialogue]]
speaker = "モネ"
# （図書委員の仕事の傍ら、魔将の適合者を探しているみたい）
line = "（図書委員の仕事の傍ら、魔将の適合者を探しているみたい）"

[[dialogue]]
speaker = "リィベル"
# 「あの魔族、立ち振る舞いが強そうね。魔将にできないかしら」
line = "「あの魔族、立ち振る舞いが強そうね。魔将にできないかしら」"

[[dialogue]]
speaker = "モネ"
# 「利用者をジロジロみるのは控えましょうね……」
line = "「利用者をジロジロみるのは控えましょうね……」"

[[dialogue]]
speaker = "リィベル"
# 「ところで、あなたが持っているその紙は？」
line = "「ところで、あなたが持っているその紙は？」"

[[dialogue]]
speaker = "モネ"
# 「これは私が書いた小説です。ウィステリアさんに読んでもらう約束をしてるんです」
line = "「これは私が書いた小説です。ウィステリアさんに読んでもらう約束をしてるんです」"

[[dialogue]]
speaker = "リィベル"
# 「ふぅん……私にも読ませなさい、ほら」
line = "「ふぅん……私にも読ませなさい、ほら」"

[[dialogue]]
speaker = "モネ"
# 「え、でも……その……面白いかは分かりませんが、それでもよければ……どうぞ」
line = "「え、でも……その……面白いかは分かりませんが、それでもよければ……どうぞ」"

[[dialogue]]
speaker = "unk"
# リィベルはひったくるように原稿を手にすると、機械のようなスピードで目を通していく。
line = "リィベルはひったくるように原稿を手にすると、機械のようなスピードで目を通していく。"

[[dialogue]]
speaker = "リィベル"
# 「……………」
line = "「……………」"

[[dialogue]]
speaker = "モネ"
# （は、反応がない！　リィベルさんはもともと無表情だから分かりづらいとはいえ、やっぱり面白くなかったかな……？）
line = "（は、反応がない！　リィベルさんはもともと無表情だから分かりづらいとはいえ、やっぱり面白くなかったかな……？）"

[[dialogue]]
speaker = "リィベル"
# 「…………ふぅ」
line = "「…………ふぅ」"

[[dialogue]]
speaker = "モネ"
# 「ど、どうでした……？」
line = "「ど、どうでした……？」"

[[dialogue]]
speaker = "リィベル"
# 「面白かったわ。主人公が筋金入りの頑固者で、誰かさんみたい」
line = "「面白かったわ。主人公が筋金入りの頑固者で、誰かさんみたい」"

[[dialogue]]
speaker = "モネ"
# 「っ、ありがとうございます！　実は、賞にも応募してみようかな～なんて思ってたり……」
line = "「っ、ありがとうございます！　実は、賞にも応募してみようかな～なんて思ってたり……」"

[[dialogue]]
speaker = "モネ"
# 「ああいや、自分でもよく書けたなって思ってて、あいや、でも、自意識過剰過ぎですよね！？」
line = "「ああいや、自分でもよく書けたなって思ってて、あいや、でも、自意識過剰過ぎですよね！？」"

[[dialogue]]
speaker = "リィベル"
# 「必要以上の謙遜はただの卑屈、卑屈も過ぎれば傲慢よ。あなたらしいといえばあなたらしいけど」
line = "「必要以上の謙遜はただの卑屈、卑屈も過ぎれば傲慢よ。あなたらしいといえばあなたらしいけど」"

[[dialogue]]
speaker = "リィベル"
# 「そうね。あなたの言葉を借りるなら……」
line = "「そうね。あなたの言葉を借りるなら……」"

[[dialogue]]
speaker = "リィベル"
# 「この小説も読まれたがっているわ。迷ってる暇があるならさっさと応募しなさい」
line = "「この小説も読まれたがっているわ。迷ってる暇があるならさっさと応募しなさい」"

[[dialogue]]
speaker = "モネ"
# 「読まれたがっている……」
line = "「読まれたがっている……」"

[[dialogue]]
speaker = "ウィステリア"
# 「あ、それ、紙屋敷さんが前に言ってたやつね」
line = "「あ、それ、紙屋敷さんが前に言ってたやつね」"

[[dialogue]]
speaker = "モネ"
# 「ウィステリアさん、お帰りなさい」
line = "「ウィステリアさん、お帰りなさい」"

[[dialogue]]
speaker = "リィベル"
# 「司書が図書館を離れてどこほっつき歩いてたの？　さすが怠惰の魔将はサボリが得意なのね」
line = "「司書が図書館を離れてどこほっつき歩いてたの？　さすが怠惰の魔将はサボリが得意なのね」"

[[dialogue]]
speaker = "ウィステリア"
# 「サボリじゃないわよ！　ＤＩＳＣを落としたから探してただけ！」
line = "「サボリじゃないわよ！　ＤＩＳＣを落としたから探してただけ！」"

[[dialogue]]
speaker = "モネ"
# 「ＤＩＳＣは見つかったんですか？」
line = "「ＤＩＳＣは見つかったんですか？」"

[[dialogue]]
speaker = "ウィステリア"
# 「コハルコさんに位置情報を探してもらってるんだけど、まだ見つかってないのよ～。これで３日連続だわ」
line = "「コハルコさんに位置情報を探してもらってるんだけど、まだ見つかってないのよ～。これで３日連続だわ」"

[[dialogue]]
speaker = "モネ"
# （ウィステリアさんの不運はいつも通り……ううん、いつもなら１日で済むから、もっと酷いかも？）
line = "（ウィステリアさんの不運はいつも通り……ううん、いつもなら１日で済むから、もっと酷いかも？）"

[[dialogue]]
speaker = "リィベル"
# 「よほど日頃の行いが悪いのね」
line = "「よほど日頃の行いが悪いのね」"

[[dialogue]]
speaker = "ウィステリア"
# 「私の運が悪いのは魔導書の呪いのせい！　あなたもその一部なんだから他人事みたいに言わないでよね」
line = "「私の運が悪いのは魔導書の呪いのせい！　あなたもその一部なんだから他人事みたいに言わないでよね」"

[[dialogue]]
speaker = "ウィステリア"
# 「紙屋敷さんの小説、あとで私も読ませてもらうわね。もう応募はしたの？」
line = "「紙屋敷さんの小説、あとで私も読ませてもらうわね。もう応募はしたの？」"

[[dialogue]]
speaker = "モネ"
# 「いえ、まだ……でも、必ず」
line = "「いえ、まだ……でも、必ず」"

[[dialogue]]
speaker = "モネ"
# 「ＤＩＳＣからアラーム……緊急速報！？」
line = "「ＤＩＳＣからアラーム……緊急速報！？」"

[[dialogue]]
speaker = "リィベル"
# 「やかましいわね、何事？」
line = "「やかましいわね、何事？」"

[[dialogue]]
speaker = "モネ"
# 「リィベルさん、ＤＩＳＣは持ってないんですか？」
line = "「リィベルさん、ＤＩＳＣは持ってないんですか？」"

[[dialogue]]
speaker = "リィベル"
# 「うるさいから部屋に置いてきたわ」
line = "「うるさいから部屋に置いてきたわ」"

[[dialogue]]
speaker = "モネ"
# 「ＤＩＳＣはマナーモードもあるんですよ！？」
line = "「ＤＩＳＣはマナーモードもあるんですよ！？」"

[[dialogue]]
speaker = "ウィステリア"
# 「紙屋敷さん、私ＤＩＳＣ持ってないから内容教えてくれる？」
line = "「紙屋敷さん、私ＤＩＳＣ持ってないから内容教えてくれる？」"

[[dialogue]]
speaker = "モネ"
# 「はい。どれどれ……えっ！？　流星市国に小型の隕石が落下して、マンションの一室が吹き飛んだって……」
line = "「はい。どれどれ……えっ！？　流星市国に小型の隕石が落下して、マンションの一室が吹き飛んだって……」"

[[dialogue]]
speaker = "モネ"
# 「あ、これ、現場の写真です。奇跡的に死傷者なし、とのことで……怪我した人がいなくてよかったです」
line = "「あ、これ、現場の写真です。奇跡的に死傷者なし、とのことで……怪我した人がいなくてよかったです」"

[[dialogue]]
speaker = "ウィステリア"
# 「あ、あああ、ああああ……」
line = "「あ、あああ、ああああ……」"

[[dialogue]]
speaker = "モネ"
# 「ウィステリアさん、どうしたんですか！？」
line = "「ウィステリアさん、どうしたんですか！？」"

[[dialogue]]
speaker = "ウィステリア"
# 「ソノマンション、ワタシノ、ヘヤ…………」
line = "「ソノマンション、ワタシノ、ヘヤ…………」"

[[dialogue]]
speaker = "モネ"
# 「あ……」
line = "「あ……」"

[[dialogue]]
speaker = "モネ"
# （やっぱりウィステリアさんの不運、酷くなってる……）
line = "（やっぱりウィステリアさんの不運、酷くなってる……）"

[[dialogue]]
speaker = "ウィステリア"
# 「不運だわ～～～～～～～～！！」
line = "「不運だわ～～～～～～～～！！」"
