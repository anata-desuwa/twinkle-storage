[[dialogue]]
speaker = "unk"
# 第９話,ＶＳ星喰らいシャドウ・魔神ギエル戦闘前,B
line = "第９話,ＶＳ星喰らいシャドウ・魔神ギエル戦闘前,B"

[[dialogue]]
speaker = "魔神ギエル"
# 「アルタイルから乗り込んできた星騎士たちの侵攻を、許している──？」
line = "「アルタイルから乗り込んできた星騎士たちの侵攻を、許している──？」"

[[dialogue]]
speaker = "ＸＥＬＯＳ"
# 「ギ…………ギギギ、ギ…………」
line = "「ギ…………ギギギ、ギ…………」"

[[dialogue]]
speaker = "unk"
# ──コノママデハ、地球ヲ喰ラウコトガデキナイ！
line = "──コノママデハ、地球ヲ喰ラウコトガデキナイ！"

[[dialogue]]
speaker = "unk"
# ──何トシテモ勝テ。コレ以上の失態は許サレナイ！！
line = "──何トシテモ勝テ。コレ以上の失態は許サレナイ！！"

[[dialogue]]
speaker = "魔神ギエル"
# （フン……他の拠点の者たちの、不甲斐ないことといったら……主の足を引っ張るなど、神の従僕としての誇りはないのか？）
line = "（フン……他の拠点の者たちの、不甲斐ないことといったら……主の足を引っ張るなど、神の従僕としての誇りはないのか？）"

[[dialogue]]
speaker = "魔神ギエル"
# 「お任せください……我が主。私にとってもこれは雪辱の機会。再び主に目をかけられ、現世へと返り咲くことができたのです……！」
line = "「お任せください……我が主。私にとってもこれは雪辱の機会。再び主に目をかけられ、現世へと返り咲くことができたのです……！」"

[[dialogue]]
speaker = "魔神ギエル"
# 「真なる神の側近として、この魔神ギエル──十二分の働きをお約束いたしましょう……！」
line = "「真なる神の側近として、この魔神ギエル──十二分の働きをお約束いたしましょう……！」"

[[dialogue]]
speaker = "unk"
# この魔神は、かつてアルタイルの塔の頂上で、緋宮クロトに敗れた個体の精巧なレプリカである。
line = "この魔神は、かつてアルタイルの塔の頂上で、緋宮クロトに敗れた個体の精巧なレプリカである。"

[[dialogue]]
speaker = "unk"
# 記憶、経験、そして星騎士と世界に対する憎しみ。その全てを忠実に再現した上で、『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』から強大な霊力を賜っていた。
line = "記憶、経験、そして星騎士と世界に対する憎しみ。その全てを忠実に再現した上で、『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』から強大な霊力を賜っていた。"

[[dialogue]]
speaker = "魔神ギエル"
# 「あの魔王さえいなければ、所詮は雑魚の集まり。蹴散らしてごらんにいれましょう……！」
line = "「あの魔王さえいなければ、所詮は雑魚の集まり。蹴散らしてごらんにいれましょう……！」"

[[dialogue]]
speaker = "ＸＥＬＯＳ"
# 「ギュゥウウ…………ガガガァ…………！！」
line = "「ギュゥウウ…………ガガガァ…………！！」"

[[dialogue]]
speaker = "unk"
# ──魔神ギエル、オ前ヲ更ナル超越者ヘト導コウ。
line = "──魔神ギエル、オ前ヲ更ナル超越者ヘト導コウ。"

[[dialogue]]
speaker = "魔神ギエル"
# 「おぉおおっ！？　力を……さらに与えてくださるとは！？」
line = "「おぉおおっ！？　力を……さらに与えてくださるとは！？」"

[[dialogue]]
speaker = "魔神ギエル"
# （主は私に期待なされている！　何という栄誉か！）
line = "（主は私に期待なされている！　何という栄誉か！）"

[[dialogue]]
speaker = "unk"
# ──奴ラガ来ル！
line = "──奴ラガ来ル！"

[[dialogue]]
speaker = "unk"
# ──見タ目コソ珍妙ダガ、奴ラハ強イ……！！
line = "──見タ目コソ珍妙ダガ、奴ラハ強イ……！！"

[[dialogue]]
speaker = "魔神ギエル"
# 「……珍妙？」
line = "「……珍妙？」"

[[dialogue]]
speaker = "unk"
# 創造神からの的を得ない忠告に、魔神が首を傾げたその時──
line = "創造神からの的を得ない忠告に、魔神が首を傾げたその時──"

[[dialogue]]
speaker = "クラウディア"
# 「待たせたのう、魔神ギエルとやら！！」
line = "「待たせたのう、魔神ギエルとやら！！」"

[[dialogue]]
speaker = "リーリア"
# 「これ以上、ベガの地球を傷つけるのは許しませんよ！　マジカル晴れ着でお相手します！！」
line = "「これ以上、ベガの地球を傷つけるのは許しませんよ！　マジカル晴れ着でお相手します！！」"

[[dialogue]]
speaker = "魔神ギエル"
# 「…………ぬぅ！？」
line = "「…………ぬぅ！？」"

[[dialogue]]
speaker = "トワ先生"
# 「みんな気を付けて！　フィヴォス流星群の時より、この個体は強力になってる……油断しちゃダメだからね！」
line = "「みんな気を付けて！　フィヴォス流星群の時より、この個体は強力になってる……油断しちゃダメだからね！」"

[[dialogue]]
speaker = "リノ"
# 「敵の攻撃は私の空間魔法でずらしてみせるわ──安心してちょうだい！」
line = "「敵の攻撃は私の空間魔法でずらしてみせるわ──安心してちょうだい！」"

[[dialogue]]
speaker = "魔神ギエル"
# 「…………な────なん、だ────！？」
line = "「…………な────なん、だ────！？」"

[[dialogue]]
speaker = "クラウディア"
# 「ふはははは！　見よ、あやつの顔を！　余たちの戦力に恐れをなしておるようだのう！！」
line = "「ふはははは！　見よ、あやつの顔を！　余たちの戦力に恐れをなしておるようだのう！！」"

[[dialogue]]
speaker = "ウェンディ"
# 「単純に混乱しているだけだと思いますが……私が敵の立場でも同じリアクションをしたと思います……」
line = "「単純に混乱しているだけだと思いますが……私が敵の立場でも同じリアクションをしたと思います……」"

[[dialogue]]
speaker = "クラウディア"
# 「ふふん！　敵が浮足立っているのなら僥倖というものよ！　余は先刻から、魔力がうずいて仕方がないぞ！」
line = "「ふふん！　敵が浮足立っているのなら僥倖というものよ！　余は先刻から、魔力がうずいて仕方がないぞ！」"

[[dialogue]]
speaker = "トリュファイナ"
# 「クラウディア。張り切っているのは結構ですが、力に溺れて油断してはいけませんよ？」
line = "「クラウディア。張り切っているのは結構ですが、力に溺れて油断してはいけませんよ？」"

[[dialogue]]
speaker = "クラウディア"
# 「わかっておるとも！　先代との貴重な共闘だ──今代の光の魔女の実力、とくと見てもらおうではないか！」
line = "「わかっておるとも！　先代との貴重な共闘だ──今代の光の魔女の実力、とくと見てもらおうではないか！」"

[[dialogue]]
speaker = "トリュファイナ"
# 「ええ。私も、できうる限りのサポートをさせていただきましょう！」
line = "「ええ。私も、できうる限りのサポートをさせていただきましょう！」"

[[dialogue]]
speaker = "クラウディア"
# 「──というわけで魔神よ！　メリークラウディアバースデーだ！」
line = "「──というわけで魔神よ！　メリークラウディアバースデーだ！」"

[[dialogue]]
speaker = "リーリア"
# 「今日はクラウディア様のお誕生日じゃありませんけどー……？」
line = "「今日はクラウディア様のお誕生日じゃありませんけどー……？」"

[[dialogue]]
speaker = "クラウディア"
# 「細かいことを言うな！　せっかく幹内世界からクリスマスフォームを取り寄せたのだ！」
line = "「細かいことを言うな！　せっかく幹内世界からクリスマスフォームを取り寄せたのだ！」"

[[dialogue]]
speaker = "クラウディア"
# 「よって今日は臨時で、余の誕生日ということにする！　あとでプレゼントを準備するのだ、皆の者！」
line = "「よって今日は臨時で、余の誕生日ということにする！　あとでプレゼントを準備するのだ、皆の者！」"

[[dialogue]]
speaker = "ウェンディ"
# 「あぁ、もう滅茶苦茶です……！」
line = "「あぁ、もう滅茶苦茶です……！」"

[[dialogue]]
speaker = "クラウディア"
# 「魔神よ！　クリスマスはサンタがメインのイベントではないぞ！　余の誕生日──いや！」
line = "「魔神よ！　クリスマスはサンタがメインのイベントではないぞ！　余の誕生日──いや！」"

[[dialogue]]
speaker = "クラウディア"
# 「クリスマスは余と先代の誕生日である──それを覚えた上で逝くがよい！！」
line = "「クリスマスは余と先代の誕生日である──それを覚えた上で逝くがよい！！」"

[[dialogue]]
speaker = "トリュファイナ"
# 「あれ、私も……？」
line = "「あれ、私も……？」"

[[dialogue]]
speaker = "クラウディア"
# 「当然だ、余だけ祝っては先代に申し訳が立たんであろう！　ふははははっ！」
line = "「当然だ、余だけ祝っては先代に申し訳が立たんであろう！　ふははははっ！」"

[[dialogue]]
speaker = "トリュファイナ"
# 「まあ。お気遣いありがとうございます、クラウディア」
line = "「まあ。お気遣いありがとうございます、クラウディア」"

[[dialogue]]
speaker = "魔神ギエル"
# 「な、何を話しているのです……この魔女たちは！？」
line = "「な、何を話しているのです……この魔女たちは！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「よーっし！　ネビュラのみんなに負けてられないわ！　美鶴、新星学園の強さを見せつけるわよー！」
line = "「よーっし！　ネビュラのみんなに負けてられないわ！　美鶴、新星学園の強さを見せつけるわよー！」"

[[dialogue]]
speaker = "美鶴"
# 「ほーい。ま、適度に頑張りまーす。ふれ、ふれー。お嬢様～……っと」
line = "「ほーい。ま、適度に頑張りまーす。ふれ、ふれー。お嬢様～……っと」"

[[dialogue]]
speaker = "魔神ギエル"
# 「こいつらもおかしい！？　世界の支配者を決める戦いを、何だと思っている……！？」
line = "「こいつらもおかしい！？　世界の支配者を決める戦いを、何だと思っている……！？」"

[[dialogue]]
speaker = "煌嶺"
# 「あは♪　一度は世界を滅ぼしかけた魔神だ～って聞いてたのに。これしきのことで動揺するだなんて。ずいぶんと小物みたいだね～♪」
line = "「あは♪　一度は世界を滅ぼしかけた魔神だ～って聞いてたのに。これしきのことで動揺するだなんて。ずいぶんと小物みたいだね～♪」"

[[dialogue]]
speaker = "魔神ギエル"
# 「何ッ……！？　聞き捨てならない──誰だ、貴様は！！」
line = "「何ッ……！？　聞き捨てならない──誰だ、貴様は！！」"

[[dialogue]]
speaker = "煌嶺"
# 「こんにちは～♪　私は頽廃都市キュリオスの皇帝、煌嶺だよ～♪」
line = "「こんにちは～♪　私は頽廃都市キュリオスの皇帝、煌嶺だよ～♪」"

[[dialogue]]
speaker = "煌嶺"
# 「それでこっちの子は、同郷の星騎士。メイプルちゃん～♪」
line = "「それでこっちの子は、同郷の星騎士。メイプルちゃん～♪」"

[[dialogue]]
speaker = "メイプル"
# 「あ……はい。ど、どうも……」
line = "「あ……はい。ど、どうも……」"

[[dialogue]]
speaker = "煌嶺"
# 「あれあれ？　どーしてそんなにビクビクしてるのかなあ♪　一緒に戦う仲間なんだから、シャンとしてくれないと～♪」
line = "「あれあれ？　どーしてそんなにビクビクしてるのかなあ♪　一緒に戦う仲間なんだから、シャンとしてくれないと～♪」"

[[dialogue]]
speaker = "メイプル"
# （お兄ちゃんっ！？　どーしてあたしが煌嶺様とチームなの！？　めちゃくちゃ怖いんだけどっ！？）
line = "（お兄ちゃんっ！？　どーしてあたしが煌嶺様とチームなの！？　めちゃくちゃ怖いんだけどっ！？）"

[[dialogue]]
speaker = "ヴィーナス"
# 「ちょっとメイプル！　そんなんじゃダメよ、これからギエルとバトルするんだから、ガツンと気合入れないと！」
line = "「ちょっとメイプル！　そんなんじゃダメよ、これからギエルとバトルするんだから、ガツンと気合入れないと！」"

[[dialogue]]
speaker = "メイプル"
# 「えっ！？」
line = "「えっ！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あなた、前に格好良くタンカ切ってたじゃない！　『煌嶺は魔界に引きこもってる臆病者だから、私が魔王になって活を入れてやるんだ』、だっけ？」
line = "「あなた、前に格好良くタンカ切ってたじゃない！　『煌嶺は魔界に引きこもってる臆病者だから、私が魔王になって活を入れてやるんだ』、だっけ？」"

[[dialogue]]
speaker = "メイプル"
# 「女神様に誓って、絶対そこまで言ってないよ！？」
line = "「女神様に誓って、絶対そこまで言ってないよ！？」"

[[dialogue]]
speaker = "煌嶺"
# 「へぇ～～～～～♪　なになに？　メイプルちゃん、思ってたより凄いこと言うんだね？　ちょっと見直しちゃったぁ♪」
line = "「へぇ～～～～～♪　なになに？　メイプルちゃん、思ってたより凄いこと言うんだね？　ちょっと見直しちゃったぁ♪」"

[[dialogue]]
speaker = "メイプル"
# 「言ってません！！！　見直さないでくださいっ！！」
line = "「言ってません！！！　見直さないでくださいっ！！」"

[[dialogue]]
speaker = "煌嶺"
# 「でもメイプルちゃんは、魔王になりたいんでしょう？　それも嘘だったってこと？」
line = "「でもメイプルちゃんは、魔王になりたいんでしょう？　それも嘘だったってこと？」"

[[dialogue]]
speaker = "メイプル"
# 「その夢だけは嘘じゃないです！！！　譲れないです！！　殺さないでください！！！」
line = "「その夢だけは嘘じゃないです！！！　譲れないです！！　殺さないでください！！！」"

[[dialogue]]
speaker = "煌嶺"
# 「メイプルちゃんは、本当に可愛いね～♪　今目の前に、魔王の血統の、現役の皇帝がいるのに～♪　それでも魔王になりたいんだ～？」
line = "「メイプルちゃんは、本当に可愛いね～♪　今目の前に、魔王の血統の、現役の皇帝がいるのに～♪　それでも魔王になりたいんだ～？」"

[[dialogue]]
speaker = "メイプル"
# 「アッ、アッ……アッ……」
line = "「アッ、アッ……アッ……」"

[[dialogue]]
speaker = "煌嶺"
# 「メイプルちゃんのかっこいい啖呵、私も聞いてみたいな～♪　ほらほら～、さん、はい♪」
line = "「メイプルちゃんのかっこいい啖呵、私も聞いてみたいな～♪　ほらほら～、さん、はい♪」"

[[dialogue]]
speaker = "トワ先生"
# 「こらーっ！　それ以上は先生として見過ごせないよっ！　メイプルちゃんをいじめちゃダメなんだからっ！」
line = "「こらーっ！　それ以上は先生として見過ごせないよっ！　メイプルちゃんをいじめちゃダメなんだからっ！」"

[[dialogue]]
speaker = "煌嶺"
# 「え～♪　いじめるだなんて人聞きが悪いな～♪　仲良くお喋りしてただけなのに～♪」
line = "「え～♪　いじめるだなんて人聞きが悪いな～♪　仲良くお喋りしてただけなのに～♪」"

[[dialogue]]
speaker = "メイプル"
# 「トワちゃん、トワちゃんっ！！　トワちゃ～～～んっ！！！　うわぁぁぁ～～～～～んっ」
line = "「トワちゃん、トワちゃんっ！！　トワちゃ～～～んっ！！！　うわぁぁぁ～～～～～んっ」"

[[dialogue]]
speaker = "魔神ギエル"
# 「ク……ククク…………！！！」
line = "「ク……ククク…………！！！」"

[[dialogue]]
speaker = "リーリア"
# 「あ、あれれ？　もしかしなくても魔神さん、怒っちゃってません……？」
line = "「あ、あれれ？　もしかしなくても魔神さん、怒っちゃってません……？」"

[[dialogue]]
speaker = "ウェンディ"
# 「無理もないですよっ！　こんな格好の敵が現れて、目の前で一生雑談してたら、神経逆撫でに決まってます！！」
line = "「無理もないですよっ！　こんな格好の敵が現れて、目の前で一生雑談してたら、神経逆撫でに決まってます！！」"

[[dialogue]]
speaker = "魔神ギエル"
# 「情けない……いくら星力が強化されているからといって、こんな奴らに敗北しているなどと……」
line = "「情けない……いくら星力が強化されているからといって、こんな奴らに敗北しているなどと……」"

[[dialogue]]
speaker = "魔神ギエル"
# 「おふざけの同窓会はそこまでです！　パワーアップした魔神の力で、貴様らを地獄に送ってやる！！」
line = "「おふざけの同窓会はそこまでです！　パワーアップした魔神の力で、貴様らを地獄に送ってやる！！」"

[[dialogue]]
speaker = "リノ"
# 「みんな、来るわよ──構えて！！」
line = "「みんな、来るわよ──構えて！！」"

[[dialogue]]
speaker = "クラウディア"
# 「ゆくぞ、死にぞこないの魔神よ！　唸れ、ホーリー・ベル！！」
line = "「ゆくぞ、死にぞこないの魔神よ！　唸れ、ホーリー・ベル！！」"
