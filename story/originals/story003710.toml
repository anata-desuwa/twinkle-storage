[[dialogue]]
speaker = "イングリット"
# （私は天界の武闘都市ウリルに生まれた。ウリルは戦士の街。天界中から戦士が集められ、鍛錬を積んでいる）
line = "（私は天界の武闘都市ウリルに生まれた。ウリルは戦士の街。天界中から戦士が集められ、鍛錬を積んでいる）"

[[dialogue]]
speaker = "イングリット"
# （私は代々、守護天使を祀る家系で、当然、戦士の家系だ。母様も星騎士だったと聞いている）
line = "（私は代々、守護天使を祀る家系で、当然、戦士の家系だ。母様も星騎士だったと聞いている）"

[[dialogue]]
speaker = "イングリット"
# （私も星騎士になるのだと自然に思って鍛錬を積んでいた。だが、私は星騎士にはなれなかった）
line = "（私も星騎士になるのだと自然に思って鍛錬を積んでいた。だが、私は星騎士にはなれなかった）"

[[dialogue]]
speaker = "イングリット"
# （星力に目覚め、流星市国に旅立つ戦士たちを見送りながら、私はそれでも鍛錬を続けた。武の極致に至れば、星騎士すら超えられる──そう信じて）
line = "（星力に目覚め、流星市国に旅立つ戦士たちを見送りながら、私はそれでも鍛錬を続けた。武の極致に至れば、星騎士すら超えられる──そう信じて）"

[[dialogue]]
speaker = "イングリット"
# （そんなある日、ウリルにモンスターが現れた。私は戦った。星力はなくても勝てると信じていた。私は、私の力を信じていた）
line = "（そんなある日、ウリルにモンスターが現れた。私は戦った。星力はなくても勝てると信じていた。私は、私の力を信じていた）"

[[dialogue]]
speaker = "イングリット"
# （現実は残酷だった。モンスターに私の攻撃は効かず、爪に引き裂かれ、私は一度死んだ。めちゃくちゃ痛かった）
line = "（現実は残酷だった。モンスターに私の攻撃は効かず、爪に引き裂かれ、私は一度死んだ。めちゃくちゃ痛かった）"

[[dialogue]]
speaker = "イングリット"
# （だが、悪いことばかりではなかった。その瞬間、私はコラプサーとしてよみがえった）
line = "（だが、悪いことばかりではなかった。その瞬間、私はコラプサーとしてよみがえった）"

[[dialogue]]
speaker = "イングリット"
# （あの昂りは今でも忘れようがない。目覚めた時、私の手には刀が握られていた。全身に湧き上がる力が、私を動かした）
line = "（あの昂りは今でも忘れようがない。目覚めた時、私の手には刀が握られていた。全身に湧き上がる力が、私を動かした）"

[[dialogue]]
speaker = "イングリット"
# （何が起きたかなど分からない。分かるのは脳髄が焼けるような興奮、衝動だけ。その昂りのままに、私はモンスターを斬り続けた）
line = "（何が起きたかなど分からない。分かるのは脳髄が焼けるような興奮、衝動だけ。その昂りのままに、私はモンスターを斬り続けた）"

[[dialogue]]
speaker = "イングリット"
# （モンスターがいなくなったら、ウリルの戦士相手に戦いを挑んだ。だが、あがりを待つだけの衰えた星騎士では相手にならなかった）
line = "（モンスターがいなくなったら、ウリルの戦士相手に戦いを挑んだ。だが、あがりを待つだけの衰えた星騎士では相手にならなかった）"

[[dialogue]]
speaker = "イングリット"
# （強い星騎士と戦いたい。私はその本能のままに流星市国を目指した。大交流に紛れようとして、道に迷った）
line = "（強い星騎士と戦いたい。私はその本能のままに流星市国を目指した。大交流に紛れようとして、道に迷った）"

[[dialogue]]
speaker = "イングリット"
# （そんなときだった。レイラと出会ったのは）
line = "（そんなときだった。レイラと出会ったのは）"

[[dialogue]]
speaker = "イングリット"
# （見るからに戦士とは程遠い奴だと思った。まず、覇気がない。隙だらけで、のろまで、戦場が似合わない奴だと思った）
line = "（見るからに戦士とは程遠い奴だと思った。まず、覇気がない。隙だらけで、のろまで、戦場が似合わない奴だと思った）"

[[dialogue]]
speaker = "イングリット"
# （けれど、それは私の間違いだった）
line = "（けれど、それは私の間違いだった）"

[[dialogue]]
speaker = "イングリット"
# （大地を消し飛ばす圧倒的な力。得体のしれないブラックホール。私は敗北した）
line = "（大地を消し飛ばす圧倒的な力。得体のしれないブラックホール。私は敗北した）"

[[dialogue]]
speaker = "イングリット"
# （当然、悔しかった。同時に、歓喜した）
line = "（当然、悔しかった。同時に、歓喜した）"

[[dialogue]]
speaker = "イングリット"
# （この世界には私の知らない強者がまだまだいる。それはつまり、私はもっと強くなれるということだ！）
line = "（この世界には私の知らない強者がまだまだいる。それはつまり、私はもっと強くなれるということだ！）"

[[dialogue]]
speaker = "イングリット"
# （私は全ての強者を倒して、倒して、倒して、最強のその先、真の最強になってみせる！）
line = "（私は全ての強者を倒して、倒して、倒して、最強のその先、真の最強になってみせる！）"

[[dialogue]]
speaker = "イングリット"
# （まずは貴様だ──レイラ！　貴様を倒さずして、私は最強にはなれない！）
line = "（まずは貴様だ──レイラ！　貴様を倒さずして、私は最強にはなれない！）"

[[dialogue]]
speaker = "イングリット"
# 「私は貴様に負け、コラプサーに入った。貴様と再び戦い、勝つために」
line = "「私は貴様に負け、コラプサーに入った。貴様と再び戦い、勝つために」"

[[dialogue]]
speaker = "イングリット"
# 「だが、貴様は私との戦いから逃げ続けた。あーだこーだと理由を付け戦わなかった」
line = "「だが、貴様は私との戦いから逃げ続けた。あーだこーだと理由を付け戦わなかった」"

[[dialogue]]
speaker = "イングリット"
# 「それどころか、魔王などというぽっと出に負ける体たらくだ。記録映像を見たが、敵の前で泣き出すなど情けないにもほどがある！」
line = "「それどころか、魔王などというぽっと出に負ける体たらくだ。記録映像を見たが、敵の前で泣き出すなど情けないにもほどがある！」"

[[dialogue]]
speaker = "unk"
# 水着戦闘服に着替えたイングリットの得物は二振りのチャンバラ刀。オモチャにも見えるが、星力の込め方で斬撃にも打撃にも使える優れ物だ。
line = "水着戦闘服に着替えたイングリットの得物は二振りのチャンバラ刀。オモチャにも見えるが、星力の込め方で斬撃にも打撃にも使える優れ物だ。"

[[dialogue]]
speaker = "レイラ"
# 「あ、あれは自分でもよくなかったとは思ってますっ」
line = "「あ、あれは自分でもよくなかったとは思ってますっ」"

[[dialogue]]
speaker = "unk"
# 対して、レイラは以前よりブラックホールを自在に扱えるようになっていた。超小型のブラックホールをピストルのジェスチャーをした指先から生み出す。
line = "対して、レイラは以前よりブラックホールを自在に扱えるようになっていた。超小型のブラックホールをピストルのジェスチャーをした指先から生み出す。"

[[dialogue]]
speaker = "イングリット"
# 「そもそも、あのまま星術を撃っていれば貴様の勝利だったろうに。理解に苦しむ」
line = "「そもそも、あのまま星術を撃っていれば貴様の勝利だったろうに。理解に苦しむ」"

[[dialogue]]
speaker = "レイラ"
# 「いや、撃ってたら秋葉原壊滅してたからね！？」
line = "「いや、撃ってたら秋葉原壊滅してたからね！？」"

[[dialogue]]
speaker = "イングリット"
# 「知らん。全力で戦えないなら戦場に立つな。私に失礼だろうが」
line = "「知らん。全力で戦えないなら戦場に立つな。私に失礼だろうが」"

[[dialogue]]
speaker = "レイラ"
# 「相手に失礼、じゃなくて？　イングリットに？」
line = "「相手に失礼、じゃなくて？　イングリットに？」"

[[dialogue]]
speaker = "イングリット"
# 「そうだ。私に勝った貴様が負けたら、私まで弱く見えるだろう。私が勝つまで、誰にも負けるな！」
line = "「そうだ。私に勝った貴様が負けたら、私まで弱く見えるだろう。私が勝つまで、誰にも負けるな！」"

[[dialogue]]
speaker = "レイラ"
# 「えぇ……」
line = "「えぇ……」"

[[dialogue]]
speaker = "イングリット"
# 「だいたい、貴様はもっと私の気持ちを考えろ！　私とは戦わないくせに、私以外とはぽんぽん戦うじゃないか。当てつけか」
line = "「だいたい、貴様はもっと私の気持ちを考えろ！　私とは戦わないくせに、私以外とはぽんぽん戦うじゃないか。当てつけか」"

[[dialogue]]
speaker = "レイラ"
# 「今度はめんどくさい彼女みたいなこと言い出した……」
line = "「今度はめんどくさい彼女みたいなこと言い出した……」"

[[dialogue]]
speaker = "イングリット"
# 「貴様は、私が真の最強に至るために越えなければならない壁だ。その自覚を持て！」
line = "「貴様は、私が真の最強に至るために越えなければならない壁だ。その自覚を持て！」"

[[dialogue]]
speaker = "レイラ"
# 「え。それは……私を倒すのがイングリットの目標……ってコト？」
line = "「え。それは……私を倒すのがイングリットの目標……ってコト？」"

[[dialogue]]
speaker = "イングリット"
# 「だからそうだと言っている。……何が可笑しい？　気色悪いにやけ面をやめろ」
line = "「だからそうだと言っている。……何が可笑しい？　気色悪いにやけ面をやめろ」"

[[dialogue]]
speaker = "レイラ"
# 「ごめん、イングリット。それ無理かも」
line = "「ごめん、イングリット。それ無理かも」"

[[dialogue]]
speaker = "レイラ"
# （イングリットが私のことをそんな風に思ってたなんて知らなかった。せいぜい取り損ねた実績トロフィーくらいだろうと思ってたから）
line = "（イングリットが私のことをそんな風に思ってたなんて知らなかった。せいぜい取り損ねた実績トロフィーくらいだろうと思ってたから）"

[[dialogue]]
speaker = "レイラ"
# （でも、違った。イングリットは私のことを認めてくれていたんだ。めちゃくちゃ迷惑な基準だけど！）
line = "（でも、違った。イングリットは私のことを認めてくれていたんだ。めちゃくちゃ迷惑な基準だけど！）"

[[dialogue]]
speaker = "レイラ"
# 「私が負けたら、イングリットはコラプサー辞めちゃうんだよね？」
line = "「私が負けたら、イングリットはコラプサー辞めちゃうんだよね？」"

[[dialogue]]
speaker = "イングリット"
# 「当然だ。そしてもっと強い奴と戦いに行く。両学園の星徒会ども……それに、デネブとやらに殴り込みをかけるのも面白そうだ」
line = "「当然だ。そしてもっと強い奴と戦いに行く。両学園の星徒会ども……それに、デネブとやらに殴り込みをかけるのも面白そうだ」"

[[dialogue]]
speaker = "レイラ"
# 「じゃあ負けられないね。安心して、イングリット。あなたはまだまだコラプサーだよ」
line = "「じゃあ負けられないね。安心して、イングリット。あなたはまだまだコラプサーだよ」"

[[dialogue]]
speaker = "イングリット"
# 「ほざけ、私が勝つ！　ツインリッパーッ！」
line = "「ほざけ、私が勝つ！　ツインリッパーッ！」"

[[dialogue]]
speaker = "レイラ"
# 「ラスターグリルシュートッ！」
line = "「ラスターグリルシュートッ！」"

[[dialogue]]
speaker = "unk"
# レイラが打ち出した超小型ブラックホールは、二振りの剣に簡単に弾かれた。
line = "レイラが打ち出した超小型ブラックホールは、二振りの剣に簡単に弾かれた。"

[[dialogue]]
speaker = "レイラ"
# 「やっぱりイングリットに小細工は通用しないよね。──じゃあ！　ムーンウォッチクレーター！」
line = "「やっぱりイングリットに小細工は通用しないよね。──じゃあ！　ムーンウォッチクレーター！」"

[[dialogue]]
speaker = "イングリット"
# 「甘い！　ブレイドクロスシザー！」
line = "「甘い！　ブレイドクロスシザー！」"

[[dialogue]]
speaker = "unk"
# レイラのブラックホールが膨らむ前に、イングリットの斬撃がブラックホールを叩き斬った。お互いに手の内は知れている。戦闘服が変わっても戦い方の根本は変わらない。
line = "レイラのブラックホールが膨らむ前に、イングリットの斬撃がブラックホールを叩き斬った。お互いに手の内は知れている。戦闘服が変わっても戦い方の根本は変わらない。"

[[dialogue]]
speaker = "イングリット"
# 「大きなブラックホールを生み出す隙は与えん！　そらそら、逃げ回るだけでは勝てんぞ！」
line = "「大きなブラックホールを生み出す隙は与えん！　そらそら、逃げ回るだけでは勝てんぞ！」"

[[dialogue]]
speaker = "レイラ"
# 「くっ！」
line = "「くっ！」"

[[dialogue]]
speaker = "unk"
# イングリットは打撃と斬撃、面と線の攻撃を使い分けてレイラを襲う。
line = "イングリットは打撃と斬撃、面と線の攻撃を使い分けてレイラを襲う。"

[[dialogue]]
speaker = "unk"
# レイラはただ、逃げるように飛んでいた。
line = "レイラはただ、逃げるように飛んでいた。"

[[dialogue]]
speaker = "レイラ"
# （初めて会った日、美しいと思ってしまった。たとえイングリットがこの世で最も愚かな天使だとしても、その剣の閃きの前では些細なことに思える）
line = "（初めて会った日、美しいと思ってしまった。たとえイングリットがこの世で最も愚かな天使だとしても、その剣の閃きの前では些細なことに思える）"

[[dialogue]]
speaker = "レイラ"
# （いつもはちゃめちゃで自分勝手で、戦うことしか考えてない人格破綻者だけど、それがイングリットだ）
line = "（いつもはちゃめちゃで自分勝手で、戦うことしか考えてない人格破綻者だけど、それがイングリットだ）"

[[dialogue]]
speaker = "レイラ"
# （だから私は勝たなくちゃ。私が勝ち続ける限り、あなたはコラプサーでいてくれるから）
line = "（だから私は勝たなくちゃ。私が勝ち続ける限り、あなたはコラプサーでいてくれるから）"

[[dialogue]]
speaker = "イングリット"
# 「これで終わりだ！　ザンブレイクセイバー！」
line = "「これで終わりだ！　ザンブレイクセイバー！」"

[[dialogue]]
speaker = "unk"
# 二刀を重ねた巨大な剣を構え、レイラの上空から迫るイングリット。だが──
line = "二刀を重ねた巨大な剣を構え、レイラの上空から迫るイングリット。だが──"

[[dialogue]]
speaker = "レイラ"
# 「ふっ、それはどうかな？　巨人の<ruby=あぎと>顎</ruby>よ！」
line = "「ふっ、それはどうかな？　巨人の<ruby>顎<rt>あぎと</rt></ruby>よ！」"

[[dialogue]]
speaker = "イングリット"
# 「なっ！？」
line = "「なっ！？」"

[[dialogue]]
speaker = "unk"
# レイラの真下からブラックホールが現れた。
line = "レイラの真下からブラックホールが現れた。"

[[dialogue]]
speaker = "レイラ"
# 「グランコロッサスイーター！」
line = "「グランコロッサスイーター！」"

[[dialogue]]
speaker = "イングリット"
# 「がああぁっ！！」
line = "「がああぁっ！！」"

[[dialogue]]
speaker = "レイラ"
# 「ぐうぅっ！」
line = "「ぐうぅっ！」"

[[dialogue]]
speaker = "unk"
# レイラは逃げながら超小型ブラックホールを生成し、このタイミングで一気に解放したのだった。
line = "レイラは逃げながら超小型ブラックホールを生成し、このタイミングで一気に解放したのだった。"

[[dialogue]]
speaker = "イングリット"
# 「…………ぱたり」
line = "「…………ぱたり」"

[[dialogue]]
speaker = "レイラ"
# 「はぁ、はぁ……<ruby=パーフェクトビクトリー>完全勝利</ruby>！」
line = "「はぁ、はぁ……<ruby>完全勝利<rt>パーフェクトビクトリー</rt></ruby>！」"

[[dialogue]]
speaker = "unk"
# 暗闇が消えると、海岸のクレーターにレイラが立っていた。
line = "暗闇が消えると、海岸のクレーターにレイラが立っていた。"
