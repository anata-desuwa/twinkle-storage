[[dialogue]]
speaker = "unk"
# 第１話,竜と呪いの書,P
line = "第１話,竜と呪いの書,P"

[[dialogue]]
speaker = "モネ"
# 「あ、会長、こんにちは」
line = "「あ、会長、こんにちは」"

[[dialogue]]
speaker = "unk"
# 地下図書館で事件があったって聞いたけど
line = "地下図書館で事件があったって聞いたけど"

[[dialogue]]
speaker = "モネ"
# 「はい、地下図書館──別名『深淵書庫』の一件で、私とウィステリアさんは魔将となりました」
line = "「はい、地下図書館──別名『深淵書庫』の一件で、私とウィステリアさんは魔将となりました」"

[[dialogue]]
speaker = "モネ"
# 「魔将とは、リクリエで非業の死を遂げた魔族たちの無念を背負う者」
line = "「魔将とは、リクリエで非業の死を遂げた魔族たちの無念を背負う者」"

[[dialogue]]
speaker = "モネ"
# 「本という形で深淵書庫に収蔵された、魔族の怒りや悲しみ、怨嗟を力に変えて戦います」
line = "「本という形で深淵書庫に収蔵された、魔族の怒りや悲しみ、怨嗟を力に変えて戦います」"

[[dialogue]]
speaker = "モネ"
# 「私が『傲慢』の魔将に、ウィステリアさんが『怠惰』の魔将になりましたが、ゆくゆくは他の魔将も見つける必要があります」
line = "「私が『傲慢』の魔将に、ウィステリアさんが『怠惰』の魔将になりましたが、ゆくゆくは他の魔将も見つける必要があります」"

[[dialogue]]
speaker = "モネ"
# 「そして、こちらが──」
line = "「そして、こちらが──」"

[[dialogue]]
speaker = "リィベル"
# 「リィベル・ビブリオテーク。深淵書庫の管理システムよ。この新星学園に転入という形になったわ」
line = "「リィベル・ビブリオテーク。深淵書庫の管理システムよ。この新星学園に転入という形になったわ」"

[[dialogue]]
speaker = "リィベル"
# 「そのマント。あなたが星徒会長……いえ、魔王ね。一応、よろしくと言っておきましょう」
line = "「そのマント。あなたが星徒会長……いえ、魔王ね。一応、よろしくと言っておきましょう」"

[[dialogue]]
speaker = "リィベル"
# 「……この角が気になる？　それはそうでしょうね」
line = "「……この角が気になる？　それはそうでしょうね」"

[[dialogue]]
speaker = "リィベル"
# 「察しの通り、この角は煌竜ヴィライアのもので間違いないわ。あなたたちがフィーニスの塔で倒した煌竜ヴィライアの因子と魔力から私は生まれた」
line = "「察しの通り、この角は煌竜ヴィライアのもので間違いないわ。あなたたちがフィーニスの塔で倒した煌竜ヴィライアの因子と魔力から私は生まれた」"

[[dialogue]]
speaker = "unk"
# 煌竜ヴィライア。かつて新星・流星の両星徒会がフィーニスの塔の中で遭遇し、全滅しかけた破滅の化身だ。
line = "煌竜ヴィライア。かつて新星・流星の両星徒会がフィーニスの塔の中で遭遇し、全滅しかけた破滅の化身だ。"

[[dialogue]]
speaker = "リィベル"
# 「今はウィステリアの監視の下、深淵書庫の暴走を防ぐため、そしてリクリエと戦うために魔将の候補者を探しているわ」
line = "「今はウィステリアの監視の下、深淵書庫の暴走を防ぐため、そしてリクリエと戦うために魔将の候補者を探しているわ」"

[[dialogue]]
speaker = "リィベル"
# 「あなたが前回のリクリエを退けたことは知っているわ。あなたの前身たるラクシスがその前のリクリエを止めたことも。まさしく救世の英雄ね」
line = "「あなたが前回のリクリエを退けたことは知っているわ。あなたの前身たるラクシスがその前のリクリエを止めたことも。まさしく救世の英雄ね」"

[[dialogue]]
speaker = "リィベル"
# 「だけど、次のリクリエを止めるのは私たちよ。そして、それを最後のリクリエにしてみせる。魔王の出る幕はないわ」
line = "「だけど、次のリクリエを止めるのは私たちよ。そして、それを最後のリクリエにしてみせる。魔王の出る幕はないわ」"

[[dialogue]]
speaker = "リィベル"
# 「私からはそれだけ。本を読まないならさっさと帰りなさい」
line = "「私からはそれだけ。本を読まないならさっさと帰りなさい」"

[[dialogue]]
speaker = "リィベル"
# 「それじゃ、私は図書委員の仕事があるから」
line = "「それじゃ、私は図書委員の仕事があるから」"

[[dialogue]]
speaker = "モネ"
# 「あ、リィベルさんっ」
line = "「あ、リィベルさんっ」"

[[dialogue]]
speaker = "モネ"
# 「行っちゃった……」
line = "「行っちゃった……」"

[[dialogue]]
speaker = "unk"
# なかなか個性的な子みたいだ
line = "なかなか個性的な子みたいだ"

[[dialogue]]
speaker = "モネ"
# 「すみません、リィベルさん、ずっとあんな調子で……」
line = "「すみません、リィベルさん、ずっとあんな調子で……」"

[[dialogue]]
speaker = "モネ"
# 「でもリィベルさんは真剣にリクリエと戦っていますし、リィベルさんなりに図書委員の仕事もしてくれているんです」
line = "「でもリィベルさんは真剣にリクリエと戦っていますし、リィベルさんなりに図書委員の仕事もしてくれているんです」"

[[dialogue]]
speaker = "モネ"
# 「会長もあの子のこと、よろしくお願いしますね」
line = "「会長もあの子のこと、よろしくお願いしますね」"

[[dialogue]]
speaker = "unk"
# モンスター出現の報せを受け、現場へと急行すると──
line = "モンスター出現の報せを受け、現場へと急行すると──"

[[dialogue]]
speaker = "リィベル"
# 「カースドパブリケーション」
line = "「カースドパブリケーション」"

[[dialogue]]
speaker = "unk"
# 虚空から書架が現れ、本の雨がモンスターに降り注いだ。本が宙を舞う度、モンスターの数が減っていく。
line = "虚空から書架が現れ、本の雨がモンスターに降り注いだ。本が宙を舞う度、モンスターの数が減っていく。"

[[dialogue]]
speaker = "リィベル"
# 「あら、魔王。遅かったわね」
line = "「あら、魔王。遅かったわね」"

[[dialogue]]
speaker = "リィベル"
# 「モンスターなら片付けたわ。前も言った通り、あなたの出る幕は……」
line = "「モンスターなら片付けたわ。前も言った通り、あなたの出る幕は……」"

[[dialogue]]
speaker = "モンスター"
# 「イーーッ」
line = "「イーーッ」"

[[dialogue]]
speaker = "unk"
# モンスターが増えた……！
line = "モンスターが増えた……！"

[[dialogue]]
speaker = "リィベル"
# 「懲りないのね。あなたたちもすぐに消してあげるわ。……行きなさい、魔本たち」
line = "「懲りないのね。あなたたちもすぐに消してあげるわ。……行きなさい、魔本たち」"

[[dialogue]]
speaker = "unk"
# 再び本の雨がモンスターに降り注ぐ。だが、全てのモンスターを倒すには至らない。
line = "再び本の雨がモンスターに降り注ぐ。だが、全てのモンスターを倒すには至らない。"

[[dialogue]]
speaker = "モンスター"
# 「イーーーッ！！」
line = "「イーーーッ！！」"

[[dialogue]]
speaker = "unk"
# 危ない！
line = "危ない！"

[[dialogue]]
speaker = "リィベル"
# 「何故、あなたが私を庇うの？　私はあなたの仲間でもなんでもないのよ」
line = "「何故、あなたが私を庇うの？　私はあなたの仲間でもなんでもないのよ」"

[[dialogue]]
speaker = "unk"
# 新星学園の生徒だし、リクリエと戦うなら仲間だ
line = "新星学園の生徒だし、リクリエと戦うなら仲間だ"

[[dialogue]]
speaker = "リィベル"
# 「ふぅん……仲間、ねぇ……」
line = "「ふぅん……仲間、ねぇ……」"

[[dialogue]]
speaker = "リィベル"
# 「まぁいいわ。邪魔だけはしないでちょうだい」
line = "「まぁいいわ。邪魔だけはしないでちょうだい」"

[[dialogue]]
speaker = "リィベル"
# 「書架４０番起動、フォビドゥンインデックス」
line = "「書架４０番起動、フォビドゥンインデックス」"

[[dialogue]]
speaker = "unk"
# リィベルが開いた本から魔力が迸り、モンスターへと殺到する。だが、まだだ。
line = "リィベルが開いた本から魔力が迸り、モンスターへと殺到する。だが、まだだ。"

[[dialogue]]
speaker = "モンスター"
# 「イーーーッ！！」
line = "「イーーーッ！！」"

[[dialogue]]
speaker = "リィベル"
# 「しつこいわね……あまり使いたくはなかったけど」
line = "「しつこいわね……あまり使いたくはなかったけど」"

[[dialogue]]
speaker = "リィベル"
# 「６６６番書架、解錠」
line = "「６６６番書架、解錠」"

[[dialogue]]
speaker = "unk"
# リィベルが虚空から取り出した一冊の本。背筋が凍るような、禍々しい気配を感じる。
line = "リィベルが虚空から取り出した一冊の本。背筋が凍るような、禍々しい気配を感じる。"

[[dialogue]]
speaker = "リィベル"
# 「……これの危険性が分かるようね。さすが魔王、といったところかしら」
line = "「……これの危険性が分かるようね。さすが魔王、といったところかしら」"

[[dialogue]]
speaker = "リィベル"
# 「私の力の源は、呪いの魔本。そしてこれはその中でも、特に強い呪いを秘めた一冊よ」
line = "「私の力の源は、呪いの魔本。そしてこれはその中でも、特に強い呪いを秘めた一冊よ」"

[[dialogue]]
speaker = "リィベル"
# 「闇の底に沈みなさい……ネイムレスグリモワール」
line = "「闇の底に沈みなさい……ネイムレスグリモワール」"

[[dialogue]]
speaker = "モンスター"
# 「イ～～～～……」
line = "「イ～～～～……」"

[[dialogue]]
speaker = "unk"
# 魔本から放たれた呪いの奔流がモンスターを飲み込み、喰らうように消滅させていく。
line = "魔本から放たれた呪いの奔流がモンスターを飲み込み、喰らうように消滅させていく。"

[[dialogue]]
speaker = "リィベル"
# 「これで理解したでしょう。私はあなたたちのような、守護星を持った星騎士ではないわ。勝手に仲間扱いしないで」
line = "「これで理解したでしょう。私はあなたたちのような、守護星を持った星騎士ではないわ。勝手に仲間扱いしないで」"

[[dialogue]]
speaker = "リィベル"
# 「それから、不用意に近付くと呪われるから。じゃ」
line = "「それから、不用意に近付くと呪われるから。じゃ」"

[[dialogue]]
speaker = "unk"
# そう告げると、リィベルは雑踏の中に消えていった……
line = "そう告げると、リィベルは雑踏の中に消えていった……"
