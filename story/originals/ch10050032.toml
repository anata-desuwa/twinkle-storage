speaker = "ソフィア"
# 「ん？　確かに──そうだ、思いついたことがあったんです」
line = "「ん？　確かに──そうだ、思いついたことがあったんです」"

[[dialogue]]
speaker = "ソフィア"
# 「……………………よし」
line = "「……………………よし」"

[[dialogue]]
speaker = "unk"
