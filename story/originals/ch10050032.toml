[[dialogue]]
speaker = "ソフィア"
# 「きっと、何度も落ちてしまうでしょうから……その度に私を助けてくださいね？　会長さん<emoji=heart04>」
line = "「きっと、何度も落ちてしまうでしょうから……その度に私を助けてくださいね？　会長さん<emoji=heart04>」"
