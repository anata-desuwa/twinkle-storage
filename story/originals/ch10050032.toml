[[dialogue]]
speaker = "ソフィア"
# 「なんなんですか、これは。まるで安定しません……！　波に乗るどころか、ボードの上に立つことすらままならないじゃないですか」
line = "「なんなんですか、これは。まるで安定しません……！　波に乗るどころか、ボードの上に立つことすらままならないじゃないですか」"

[[dialogue]]
speaker = "ソフィア"
# 「んっ、しょ……よっ……ほっ……このまま……重心を崩さずに………………あっ！？」
line = "「んっ、しょ……よっ……ほっ……このまま……重心を崩さずに………………あっ！？」"

[[dialogue]]
speaker = "ソフィア"
# 「ごぼごぼごぼごぼ……！！！」
line = "「ごぼごぼごぼごぼ……！！！」"

[[dialogue]]
speaker = "ソフィア"
