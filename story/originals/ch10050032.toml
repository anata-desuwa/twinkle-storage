line = "「はい！　これで天然のスケートリンク完成です！」"

[[dialogue]]
speaker = "ソフィア"
# 「まさか？　ええ、もちろん。そのまさかです。この上を直接滑れば──海に乗るという意味では同じ！　実質サーフィンみたいなものです！」
line = "「まさか？　ええ、もちろん。そのまさかです。この上を直接滑れば──海に乗るという意味では同じ！　実質サーフィンみたいなものです！」"

[[dialogue]]
speaker = "unk"
# でこぼこだらけだ
