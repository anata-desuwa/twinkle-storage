# 「フィギュアにおいてリンク上の穴は大敵です。下手にハマってしまうと大怪我の危険もありますからね。丁寧に、こう、<ruby=なら>均</ruby>してっと……」
line = "「フィギュアにおいてリンク上の穴は大敵です。下手にハマってしまうと大怪我の危険もありますからね。丁寧に、こう、<ruby>均<rt>なら</rt></ruby>してっと……」"

[[dialogue]]
speaker = "ソフィア"
# 「──ふふふん♪　どうですか、私の華麗なるサーフィンは♪　２回転だってお手の物です♪」
line = "「──ふふふん♪　どうですか、私の華麗なるサーフィンは♪　２回転だってお手の物です♪」"

