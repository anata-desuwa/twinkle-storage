line = "「確かに……一朝一夕でどうこうなるものではありませんか……」"

[[dialogue]]
speaker = "ソフィア"
# 「私のスケートもそうですが、ただ見ているのと、実際にやってみるのとでは、大きな違いがありますからね」
line = "「私のスケートもそうですが、ただ見ているのと、実際にやってみるのとでは、大きな違いがありますからね」"

