[[dialogue]]
speaker = "unk"
# 第２話,ソフィア流サーフィン,P
line = "第２話,ソフィア流サーフィン,P"

[[dialogue]]
speaker = "ソフィア"
# 「──サーフィン、ですか？」
line = "「──サーフィン、ですか？」"

[[dialogue]]
speaker = "ソフィア"
# 「なるほど……私もやってみてはどうか、と。確かにフィオナ会長もさっそうと波に乗っていましたね」
line = "「なるほど……私もやってみてはどうか、と。確かにフィオナ会長もさっそうと波に乗っていましたね」"

[[dialogue]]
speaker = "ソフィア"
# 「それに、サーフィンといえば大人らしい趣味のイメージがあります」
line = "「それに、サーフィンといえば大人らしい趣味のイメージがあります」"

[[dialogue]]
speaker = "ソフィア"
# 「いずれ私もフィオナ会長と同じビッグウェーブに乗れれば、きっと違った目で見てくれるはずです」
line = "「いずれ私もフィオナ会長と同じビッグウェーブに乗れれば、きっと違った目で見てくれるはずです」"

[[dialogue]]
speaker = "unk"
# かもしれない
line = "かもしれない"

[[dialogue]]
speaker = "unk"
# 冬だけどね
line = "冬だけどね"

[[dialogue]]
speaker = "ソフィア"
# 「はい！　ふふ、会長さんはサーフィンもお手のものなんですよね？　そうお聞きしましたよ」
line = "「はい！　ふふ、会長さんはサーフィンもお手のものなんですよね？　そうお聞きしましたよ」"

[[dialogue]]
speaker = "ソフィア"
# 「ぜひ私にも教えてください。これもひと夏の体験というものです！」
