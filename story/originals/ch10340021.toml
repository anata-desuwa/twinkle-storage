[[dialogue]]
speaker = "unk"
# 第１話,満腹フードファイト,P
line = "第１話,満腹フードファイト,P"

[[dialogue]]
speaker = "カティア"
# 「魔王様とご飯ですガオー♪　でも食べ放題をご馳走してくれるなんて、本当にいいんですか？」
line = "「魔王様とご飯ですガオー♪　でも食べ放題をご馳走してくれるなんて、本当にいいんですか？」"

[[dialogue]]
speaker = "unk"
# 頑張ったご褒美だよ
line = "頑張ったご褒美だよ"

[[dialogue]]
speaker = "unk"
# 学園対抗リレー、お疲れさま
line = "学園対抗リレー、お疲れさま"

[[dialogue]]
speaker = "カティア"
# 「そういうことでしたらお言葉に甘えちゃいますワン♪」
line = "「そういうことでしたらお言葉に甘えちゃいますワン♪」"

[[dialogue]]
speaker = "カティア"
# 「ここにあるものなんでも食べ放題なんて……うぅ、目移りしちゃう──あれ？」
line = "「ここにあるものなんでも食べ放題なんて……うぅ、目移りしちゃう──あれ？」"

[[dialogue]]
speaker = "ヒヨ"
# 「おっ、ワン公じゃねえか」
line = "「おっ、ワン公じゃねえか」"

[[dialogue]]
speaker = "ミルフィー"
# 「カティアちゃんも会長くんもお疲れ様♪」
line = "「カティアちゃんも会長くんもお疲れ様♪」"

[[dialogue]]
speaker = "カティア"
# 「なんでヒヨたちもここにいるワン！？」
line = "「なんでヒヨたちもここにいるワン！？」"

[[dialogue]]
speaker = "ヒヨ"
# 「そりゃこっちのセリフだ！　姐さんがご馳走してくれるっていうから、お腹ペコペコにして来たんでい！」
line = "「そりゃこっちのセリフだ！　姐さんがご馳走してくれるっていうから、お腹ペコペコにして来たんでい！」"

[[dialogue]]
speaker = "ミルフィー"
# 「あはは、会長くんも考えることは同じだ。星霊祭の打ち上げで、食べ放題ビュッフェは定番だもんね」
line = "「あはは、会長くんも考えることは同じだ。星霊祭の打ち上げで、食べ放題ビュッフェは定番だもんね」"

[[dialogue]]
speaker = "ミルフィー"
# 「カティアちゃんと会長くんも、良かったら一緒の席で食べない？」
line = "「カティアちゃんと会長くんも、良かったら一緒の席で食べない？」"

[[dialogue]]
speaker = "カティア"
# 「はい！　きっとその方が楽しいですガオ！」
line = "「はい！　きっとその方が楽しいですガオ！」"

[[dialogue]]
speaker = "カティア"
# 「あ……お腹の音が……」
line = "「あ……お腹の音が……」"

[[dialogue]]
speaker = "ヒヨ"
# 「あたしもお腹と背中がくっついちまいそうだぜぃ……」
line = "「あたしもお腹と背中がくっついちまいそうだぜぃ……」"

[[dialogue]]
speaker = "ミルフィー"
# 「ふふ、好きなものを好きなだけ取ってきていいからね」
line = "「ふふ、好きなものを好きなだけ取ってきていいからね」"

[[dialogue]]
speaker = "カティア"
# 「夢のようだワン♪　行ってきまーす！」
line = "「夢のようだワン♪　行ってきまーす！」"

[[dialogue]]
speaker = "unk"
# ずらりと並んだ料理の方へ、子犬のように小走りで駆けていくカティア。
line = "ずらりと並んだ料理の方へ、子犬のように小走りで駆けていくカティア。"

[[dialogue]]
speaker = "unk"
# 少しすると、お皿に肉を山盛りにして戻ってきた。
line = "少しすると、お皿に肉を山盛りにして戻ってきた。"

[[dialogue]]
speaker = "カティア"
# 「お肉たっぷり取ってきましたー！」
line = "「お肉たっぷり取ってきましたー！」"

[[dialogue]]
speaker = "unk"
# ミートマウンテンだ！
line = "ミートマウンテンだ！"

[[dialogue]]
speaker = "unk"
# てんこ盛りの肉、肉、肉！
line = "てんこ盛りの肉、肉、肉！"

[[dialogue]]
speaker = "ヒヨ"
# 「おいおい、欲張りすぎじゃねえのかい、ワン公」
line = "「おいおい、欲張りすぎじゃねえのかい、ワン公」"

[[dialogue]]
speaker = "カティア"
# 「ふふん、このくらいペロリだワン。いっぱい食べないと、強い体は作れないですガオ」
line = "「ふふん、このくらいペロリだワン。いっぱい食べないと、強い体は作れないですガオ」"

[[dialogue]]
speaker = "カティア"
# 「いっぱい食べて、ヒヨよりものすごーく強くて速くなってやるワン♪」
line = "「いっぱい食べて、ヒヨよりものすごーく強くて速くなってやるワン♪」"

[[dialogue]]
speaker = "ヒヨ"
# 「なにをぉ？　そいつぁ聞き捨てならねえな。あたしも追加で盛ってくるぜい！」
line = "「なにをぉ？　そいつぁ聞き捨てならねえな。あたしも追加で盛ってくるぜい！」"

[[dialogue]]
speaker = "ミルフィー"
# 「ちょ、ちょっとヒヨちゃん？　今でも結構モリモリだよ！？」
line = "「ちょ、ちょっとヒヨちゃん？　今でも結構モリモリだよ！？」"

[[dialogue]]
speaker = "ヒヨ"
# 「止めないでおくんなせえ。女のプライドに賭けて、どんなことでもワン公に負けるわけにゃいかねえんだ」
line = "「止めないでおくんなせえ。女のプライドに賭けて、どんなことでもワン公に負けるわけにゃいかねえんだ」"

[[dialogue]]
speaker = "カティア"
# 「それじゃ……いただきまーす！」
line = "「それじゃ……いただきまーす！」"

[[dialogue]]
speaker = "ヒヨ"
# 「あたしもいただくぜぃ！」
line = "「あたしもいただくぜぃ！」"

[[dialogue]]
speaker = "カティア"
# 「あむっ！　ん～～～～っ！？　美味っしい～～～っっ！！」
line = "「あむっ！　ん～～～～っ！？　美味っしい～～～っっ！！」"

[[dialogue]]
speaker = "ヒヨ"
# 「めちゃくちゃうめぇなあ！　これならいつまでも食い続けられるぜえ！」
line = "「めちゃくちゃうめぇなあ！　これならいつまでも食い続けられるぜえ！」"

[[dialogue]]
speaker = "カティア"
# 「お口の中で肉汁がほとばしる～……お塩もソースもバッチリ合いますし、無限に食べられます、あむあむあむ」
line = "「お口の中で肉汁がほとばしる～……お塩もソースもバッチリ合いますし、無限に食べられます、あむあむあむ」"

[[dialogue]]
speaker = "ミルフィー"
# 「うわぁ、すごい食べっぷり……！」
line = "「うわぁ、すごい食べっぷり……！」"

[[dialogue]]
speaker = "カティア"
# 「ミルフィー先輩は食べないんですガオ？」
line = "「ミルフィー先輩は食べないんですガオ？」"

[[dialogue]]
speaker = "ミルフィー"
# 「お腹いっぱい食べたいのはやまやまなんだけど、ほどほどにしておかないと全部自分のお肉になっちゃうから……あはは」
line = "「お腹いっぱい食べたいのはやまやまなんだけど、ほどほどにしておかないと全部自分のお肉になっちゃうから……あはは」"

[[dialogue]]
speaker = "カティア"
# 「こういう時くらい、気にしないで食べた方がいいと思いますよ？　おかわり行ってきま～す！」
line = "「こういう時くらい、気にしないで食べた方がいいと思いますよ？　おかわり行ってきま～す！」"

[[dialogue]]
speaker = "ヒヨ"
# 「あたしもおかわりでい！」
line = "「あたしもおかわりでい！」"

[[dialogue]]
speaker = "ミルフィー"
# 「２人とも早っ！　よく噛んで食べてねー！？」
line = "「２人とも早っ！　よく噛んで食べてねー！？」"

[[dialogue]]
speaker = "unk"
# 肉が盛られた皿を次々に空にしていくカティアとヒヨ。
line = "肉が盛られた皿を次々に空にしていくカティアとヒヨ。"

[[dialogue]]
speaker = "unk"
# 本当に無限に食べ続けるのではないかと思われた２人だったが──
line = "本当に無限に食べ続けるのではないかと思われた２人だったが──"

[[dialogue]]
speaker = "カティア"
# 「あむ、あむ……あむ、あむ……ヒヨ、そろそろ限界じゃないんですかー？　けぷっ」
line = "「あむ、あむ……あむ、あむ……ヒヨ、そろそろ限界じゃないんですかー？　けぷっ」"

[[dialogue]]
speaker = "ヒヨ"
# 「そういうワン公こそよお……スピードダウンしてるぜえ」
line = "「そういうワン公こそよお……スピードダウンしてるぜえ」"

[[dialogue]]
speaker = "カティア"
# 「ま、まだまだ食べられますガオ！？　お残しは厳禁、その時点で負けですワン！」
line = "「ま、まだまだ食べられますガオ！？　お残しは厳禁、その時点で負けですワン！」"

[[dialogue]]
speaker = "カティア"
# （ぐぬぬぬぅ……正直、そろそろ限界……！　お腹百分目だワン……でも、でもでもでも！）
line = "（ぐぬぬぬぅ……正直、そろそろ限界……！　お腹百分目だワン……でも、でもでもでも！）"

[[dialogue]]
speaker = "カティア"
# 「絶対お残しはしないです！　どんな悪行よりも食べ物を粗末にするのだけはいけないんです！」
line = "「絶対お残しはしないです！　どんな悪行よりも食べ物を粗末にするのだけはいけないんです！」"

[[dialogue]]
speaker = "カティア"
# 「私の胃袋はブラックホールだガオー！　もぐもぐもぐもぐもぐもぐ！」
line = "「私の胃袋はブラックホールだガオー！　もぐもぐもぐもぐもぐもぐ！」"

[[dialogue]]
speaker = "ミルフィー"
# 「カティアちゃん、一気に行ったー！　これ食べきったらカティアちゃんの勝ちだねっ」
line = "「カティアちゃん、一気に行ったー！　これ食べきったらカティアちゃんの勝ちだねっ」"

[[dialogue]]
speaker = "ヒヨ"
# 「んだとぉっ！　負けるわけにはいかねえっ！　もぎゅもぎゅもぎゅもぎゅっ！」
line = "「んだとぉっ！　負けるわけにはいかねえっ！　もぎゅもぎゅもぎゅもぎゅっ！」"

[[dialogue]]
speaker = "unk"
# ヒヨもいったーーっ！
line = "ヒヨもいったーーっ！"

[[dialogue]]
speaker = "カティア"
# 「んんぐっ！？」
line = "「んんぐっ！？」"

[[dialogue]]
speaker = "ヒヨ"
# 「がふっ！？」
line = "「がふっ！？」"

[[dialogue]]
speaker = "カティア"
# 「も、もう食べられないです……がくっ」
line = "「も、もう食べられないです……がくっ」"

[[dialogue]]
speaker = "ヒヨ"
# 「あたしもこいつでギブアップだ……がくっ」
line = "「あたしもこいつでギブアップだ……がくっ」"

[[dialogue]]
speaker = "unk"
# ２人の負けず嫌いは筋金入りだね
