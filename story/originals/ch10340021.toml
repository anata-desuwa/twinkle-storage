[[dialogue]]
speaker = "ミルフィー"
# 「この勝負、引き分けっ！」
line = "「この勝負、引き分けっ！」"

[[dialogue]]
speaker = "ミルフィー"
# 「もう、２人とも苦しくなるまで食べたり、お店に迷惑かけちゃダメっ！」
line = "「もう、２人とも苦しくなるまで食べたり、お店に迷惑かけちゃダメっ！」"

[[dialogue]]
speaker = "ミルフィー"
# 「今後、大食いで勝負するのは禁止！　ご飯は美味しく楽しく、だからねっ！」
line = "「今後、大食いで勝負するのは禁止！　ご飯は美味しく楽しく、だからねっ！」"

[[dialogue]]
speaker = "ヒヨ"
# 「面目ねえ……」
line = "「面目ねえ……」"

[[dialogue]]
speaker = "カティア"
# 「はぁい……ごめんなさい……うぷ」
line = "「はぁい……ごめんなさい……うぷ」"

[[dialogue]]
speaker = "カティア"
# 「でも、まだまだ食べきれないくらいお料理、たくさんありますよね……残っちゃったらどうするのかな？」
line = "「でも、まだまだ食べきれないくらいお料理、たくさんありますよね……残っちゃったらどうするのかな？」"

[[dialogue]]
speaker = "unk"
# 環境に優しい人がいるから……
line = "環境に優しい人がいるから……"

[[dialogue]]
speaker = "unk"
# 大丈夫じゃないかな
line = "大丈夫じゃないかな"

[[dialogue]]
speaker = "カティア"
# 「わふ？　魔王様、心当たりがあるんですか？」
line = "「わふ？　魔王様、心当たりがあるんですか？」"

[[dialogue]]
speaker = "カティア"
# 「え？　ブラックホール？　どういうことですか……？」
line = "「え？　ブラックホール？　どういうことですか……？」"

[[dialogue]]
speaker = "？？？"
# 「ああ、食べ放題ビュッフェ、なんて素晴らしいシステムなんでしょう……！」
line = "「ああ、食べ放題ビュッフェ、なんて素晴らしいシステムなんでしょう……！」"

[[dialogue]]
speaker = "？？？"
# 「ハンバーグもカレーも唐揚げもどれだけ食べても怒られないだなんて……うめ、うめ……うめうめ」
line = "「ハンバーグもカレーも唐揚げもどれだけ食べても怒られないだなんて……うめ、うめ……うめうめ」"

[[dialogue]]
speaker = "？？？"
# 「ひゅごっ……ひゅごっ……」
line = "「ひゅごっ……ひゅごっ……」"

[[dialogue]]
speaker = "unk"
# ビュッフェで提供されている料理は、全て美味しくいただかれております。廃棄率０％ですのでご安心ください。
line = "ビュッフェで提供されている料理は、全て美味しくいただかれております。廃棄率０％ですのでご安心ください。"
