[[dialogue]]
speaker = "unk"
# そして、ついにクリスマスパーティーの日がやってきた。
line = "そして、ついにクリスマスパーティーの日がやってきた。"

[[dialogue]]
speaker = "unk"
# 実行委員のメンバーは会場である流星寮に先行し、スタンバイしている。
line = "実行委員のメンバーは会場である流星寮に先行し、スタンバイしている。"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「おーっほっほっほ！　最高のパーティー日和ですわね！」
line = "「おーっほっほっほ！　最高のパーティー日和ですわね！」"

[[dialogue]]
speaker = "unk"
# 会場までエスコートします
line = "会場までエスコートします"

[[dialogue]]
speaker = "unk"
# 夜ですけどね
line = "夜ですけどね"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「あら会長、紳士ですわね。ありがとうございます、ではお願いしますわ」
line = "「あら会長、紳士ですわね。ありがとうございます、ではお願いしますわ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「皆さんの用意したパーティー、この目でしっかりと見届けさせていただきますわよ！」
line = "「皆さんの用意したパーティー、この目でしっかりと見届けさせていただきますわよ！」"

[[dialogue]]
speaker = "アポロ"
# 「喰らえ！　流星ライダーキィーーーーーックっ！！！」
line = "「喰らえ！　流星ライダーキィーーーーーックっ！！！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「にょわぁぁぁ～～～～っ、危ない！　入っていきなりキックとは物騒ですわね！」
line = "「にょわぁぁぁ～～～～っ、危ない！　入っていきなりキックとは物騒ですわね！」"

[[dialogue]]
speaker = "アニュラス"
# 「今のを回避するとは、さすが寮長殿だ！　では、私からは祝砲を！」
line = "「今のを回避するとは、さすが寮長殿だ！　では、私からは祝砲を！」"

[[dialogue]]
speaker = "アニュラス"
# 「メリークリスマーーースッッ！！」
line = "「メリークリスマーーースッッ！！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ぎゃあああ～～～～っ！！」
line = "「ぎゃあああ～～～～っ！！」"

[[dialogue]]
speaker = "アニュラス"
# 「大丈夫だ、安心安全の非殺傷タイプだからな！」
line = "「大丈夫だ、安心安全の非殺傷タイプだからな！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「……安心安全？　どこがですの！　至近距離からバズーカぶっ放すなんて、正気の沙汰とは思えませんわ！」
line = "「……安心安全？　どこがですの！　至近距離からバズーカぶっ放すなんて、正気の沙汰とは思えませんわ！」"

[[dialogue]]
speaker = "舞亜"
# 「ごめんなさい、寮長さん。もう、事前に伝えてから発射してって言ったじゃない」
line = "「ごめんなさい、寮長さん。もう、事前に伝えてから発射してって言ったじゃない」"

[[dialogue]]
speaker = "アニュラス"
# 「おっと、そうだったな。すまない、寮長殿の姿を見てつい気が急いてしまった」
line = "「おっと、そうだったな。すまない、寮長殿の姿を見てつい気が急いてしまった」"

[[dialogue]]
speaker = "舞亜"
# 「クラッカーのゴミ、回収しますね。少しじっとしてて下さい」
line = "「クラッカーのゴミ、回収しますね。少しじっとしてて下さい」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「え、ええ……よろしく、頼みますわ……」
line = "「え、ええ……よろしく、頼みますわ……」"

[[dialogue]]
speaker = "舞亜"
# 「くるくるくる～～っと、はい完了。次はきちんと警告してから撃たせますので」
line = "「くるくるくる～～っと、はい完了。次はきちんと警告してから撃たせますので」"

[[dialogue]]
speaker = "舞亜"
# 「それじゃ、失礼しますね～っ」
line = "「それじゃ、失礼しますね～っ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ごきげんよう……」
line = "「ごきげんよう……」"

[[dialogue]]
speaker = "unk"
# ついてきてます？
line = "ついてきてます？"

[[dialogue]]
speaker = "unk"
# 大丈夫ですか？
line = "大丈夫ですか？"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「もう、訳がわかりませんわ！　誰でもいいから説明してくださいますこと？」
line = "「もう、訳がわかりませんわ！　誰でもいいから説明してくださいますこと？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「今のはクリスマスフォームですわよね？　そちらは報告を受けていますので、驚きはしましたけどまあ良しとしますわ」
line = "「今のはクリスマスフォームですわよね？　そちらは報告を受けていますので、驚きはしましたけどまあ良しとしますわ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「そ・れ・よ・り！　私のオーダーは『流星寮の品格に相応しいクリスマスパーティー』だったはずですわよね？」
line = "「そ・れ・よ・り！　私のオーダーは『流星寮の品格に相応しいクリスマスパーティー』だったはずですわよね？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「それが初っ端からこの騒ぎ、これのどこに流星寮の品格があるといいますの！」
line = "「それが初っ端からこの騒ぎ、これのどこに流星寮の品格があるといいますの！」"

[[dialogue]]
speaker = "舞亜"
# 「そうですか？　ほら、あっちを見て下さい」
line = "「そうですか？　ほら、あっちを見て下さい」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「いったい何ですの？　あれは……聖歌隊ですわね。きちんとした出し物もありますのね」
line = "「いったい何ですの？　あれは……聖歌隊ですわね。きちんとした出し物もありますのね」"

[[dialogue]]
speaker = "舞亜"
# 「しっとり上品なコーナーです。伝統的なクリスマスを希望する人は、あっちで楽しんでもらう感じですね」
line = "「しっとり上品なコーナーです。伝統的なクリスマスを希望する人は、あっちで楽しんでもらう感じですね」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「……なるほど、そういうことですのね……私の要望もきちんと取り入れられている、と」
line = "「……なるほど、そういうことですのね……私の要望もきちんと取り入れられている、と」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「しかしっ、全体的にあまりにカオスですわ！　これはいったい誰の仕業ですの！」
line = "「しかしっ、全体的にあまりにカオスですわ！　これはいったい誰の仕業ですの！」"

[[dialogue]]
speaker = "アニュラス"
# 「すまない、寮長殿。これは私が言い出したことだ」
line = "「すまない、寮長殿。これは私が言い出したことだ」"

[[dialogue]]
speaker = "舞亜"
# 「アニュラス１人じゃないでしょ。というか言い出しっぺは私なんだから、１人で背負おうとしないでよ」
line = "「アニュラス１人じゃないでしょ。というか言い出しっぺは私なんだから、１人で背負おうとしないでよ」"

[[dialogue]]
speaker = "unk"
# もちろん俺も協力者だから
line = "もちろん俺も協力者だから"

[[dialogue]]
speaker = "unk"
# ごめんね
line = "ごめんね"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「揃いも揃って勝手なことを……どうしてですか？　理由を簡潔に説明なさい！」
line = "「揃いも揃って勝手なことを……どうしてですか？　理由を簡潔に説明なさい！」"

[[dialogue]]
speaker = "アニュラス"
# 「簡潔に……そうだな、これが我々が求めたクリスマスパーティーだからだ」
line = "「簡潔に……そうだな、これが我々が求めたクリスマスパーティーだからだ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「皆で騒ぎ立てるばかりの、この混沌としたサバトのような宴が？」
line = "「皆で騒ぎ立てるばかりの、この混沌としたサバトのような宴が？」"

[[dialogue]]
speaker = "アニュラス"
# 「そこだけ見れば、寮長殿のオーダーからは逸脱していると言ってもいい」
line = "「そこだけ見れば、寮長殿のオーダーからは逸脱していると言ってもいい」"

[[dialogue]]
speaker = "アニュラス"
# 「しかし、私は流星の騎士を志す者として誓ったんだ。パーティーに参加する皆が楽しめるようにする、とな」
line = "「しかし、私は流星の騎士を志す者として誓ったんだ。パーティーに参加する皆が楽しめるようにする、とな」"

[[dialogue]]
speaker = "舞亜"
# 「見てください、騒がしくてカオスなのは事実だけど、みんなクリスマスを楽しんでますから」
line = "「見てください、騒がしくてカオスなのは事実だけど、みんなクリスマスを楽しんでますから」"

[[dialogue]]
speaker = "アポロ"
# 「わははははっ、とおーーっ！！」
line = "「わははははっ、とおーーっ！！」"

[[dialogue]]
speaker = "流星寮の寮生"
# 「すごい角度のキックです～！」
line = "「すごい角度のキックです～！」"

[[dialogue]]
speaker = "アポロ"
# 「流星ライダーここに参上！　さあ、怪人！　かかってこい！」
line = "「流星ライダーここに参上！　さあ、怪人！　かかってこい！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「……ほんと、めちゃくちゃですわね」
line = "「……ほんと、めちゃくちゃですわね」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「跳び蹴りをする者がいると思えば、満面の笑顔でチキンにかぶりつく者、周囲のことなど気にせず熱唱する者まで」
line = "「跳び蹴りをする者がいると思えば、満面の笑顔でチキンにかぶりつく者、周囲のことなど気にせず熱唱する者まで」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「めいめいがしたいことを好き勝手に行っている。そのはずですのに、不思議と交流が生まれ、会話が弾んでいる……」
line = "「めいめいがしたいことを好き勝手に行っている。そのはずですのに、不思議と交流が生まれ、会話が弾んでいる……」"

[[dialogue]]
speaker = "アニュラス"
# 「バズーカもあるぞ。もう１発撃とうか？」
line = "「バズーカもあるぞ。もう１発撃とうか？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「もう結構ですわよ。他の子が撃たれたそうにしているから行ってさしあげて」
line = "「もう結構ですわよ。他の子が撃たれたそうにしているから行ってさしあげて」"

[[dialogue]]
speaker = "アニュラス"
# 「了解だ！　おおーいっ、私のバズーカを受けたい者は名乗りを上げるがいい！」
line = "「了解だ！　おおーいっ、私のバズーカを受けたい者は名乗りを上げるがいい！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ほんともう、何なんですの……」
line = "「ほんともう、何なんですの……」"

[[dialogue]]
speaker = "舞亜"
# 「ごめんなさい。寮長さんの希望と違うことは分かってました。それでも私たちはみんなで楽しめるパーティーにしたかったんです」
line = "「ごめんなさい。寮長さんの希望と違うことは分かってました。それでも私たちはみんなで楽しめるパーティーにしたかったんです」"

[[dialogue]]
speaker = "舞亜"
# 「みんな何かに追われるように日々を送っています。私もそうですし、きっと他の子たちも多かれ少なかれ、そういうところはあると思います」
line = "「みんな何かに追われるように日々を送っています。私もそうですし、きっと他の子たちも多かれ少なかれ、そういうところはあると思います」"

[[dialogue]]
speaker = "舞亜"
# 「でも、せめてパーティーのときくらい、全てから解放されて思いっきりはしゃいで欲しい。笑顔になって欲しい」
line = "「でも、せめてパーティーのときくらい、全てから解放されて思いっきりはしゃいで欲しい。笑顔になって欲しい」"

[[dialogue]]
speaker = "舞亜"
# 「年齢も立場も関係なく、みんなが楽しめる。そんな空間が作りたかったんです」
line = "「年齢も立場も関係なく、みんなが楽しめる。そんな空間が作りたかったんです」"

[[dialogue]]
speaker = "アポロ"
# 「あははははっ、なんかもうめちゃくちゃ楽しいぞ！」
line = "「あははははっ、なんかもうめちゃくちゃ楽しいぞ！」"

[[dialogue]]
speaker = "アポロ"
# 「クリスマスがこんなに楽しいなんて知らなかった！　こんなに楽しいなら、毎日ずっとクリスマスでもいいぞ！」
line = "「クリスマスがこんなに楽しいなんて知らなかった！　こんなに楽しいなら、毎日ずっとクリスマスでもいいぞ！」"

[[dialogue]]
speaker = "アポロ"
# 「メリークリスマス！　みんなっ、メリークリスマス！　メリークリスマスだぁっ！！」
line = "「メリークリスマス！　みんなっ、メリークリスマス！　メリークリスマスだぁっ！！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「……………………」
line = "「……………………」"

[[dialogue]]
speaker = "unk"
# でも、楽しいってことは伝わってくる
line = "でも、楽しいってことは伝わってくる"

[[dialogue]]
speaker = "unk"
# あんなにはしゃいだら疲れそう
line = "あんなにはしゃいだら疲れそう"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「そうですわね……あの調子では、すぐに力尽きてしまいそうですわ」
line = "「そうですわね……あの調子では、すぐに力尽きてしまいそうですわ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「でも……本当に素敵な笑顔ですわ。あの笑顔を見ていると、これで良かったのだと認めざるを得ないのかもしれませんわね」
line = "「でも……本当に素敵な笑顔ですわ。あの笑顔を見ていると、これで良かったのだと認めざるを得ないのかもしれませんわね」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「私は本質を忘れておりましたわ」
line = "「私は本質を忘れておりましたわ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「学び舎は、心と体を育む場であると。それは寮も同じですわ」
line = "「学び舎は、心と体を育む場であると。それは寮も同じですわ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「正しかったのはあなた方なのでしょう。あなた方はパーティーの主役である寮生の皆さんを思い、楽しませようとしたのですから」
line = "「正しかったのはあなた方なのでしょう。あなた方はパーティーの主役である寮生の皆さんを思い、楽しませようとしたのですから」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ありがとうございます、こんな素晴らしいクリスマスパーティーを企画してくださって」
line = "「ありがとうございます、こんな素晴らしいクリスマスパーティーを企画してくださって」"

[[dialogue]]
speaker = "舞亜"
# 「……いや、それはさすがに持ち上げすぎでは？」
line = "「……いや、それはさすがに持ち上げすぎでは？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「人が折角いいことを言っているのに、ひっくり返さないでくださいまし」
line = "「人が折角いいことを言っているのに、ひっくり返さないでくださいまし」"

[[dialogue]]
speaker = "舞亜"
# 「あはははっ、神妙な顔してるより、笑った方がいいですよ。アニュラスもそう望んでるはずです」
line = "「あはははっ、神妙な顔してるより、笑った方がいいですよ。アニュラスもそう望んでるはずです」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「そうですわね……」
line = "「そうですわね……」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「もうどうなっても構いませんわ！　今日はとことん無礼講で盛り上がりますわよ～～っ！！」
line = "「もうどうなっても構いませんわ！　今日はとことん無礼講で盛り上がりますわよ～～っ！！」"
