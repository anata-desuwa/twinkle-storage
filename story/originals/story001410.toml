[[dialogue]]
speaker = "リーリア"
# 「も～……マジで、容赦なさすぎ……流れ的に、ここは私に花を持たせとくところですよね……」
line = "「も～……マジで、容赦なさすぎ……流れ的に、ここは私に花を持たせとくところですよね……」"

[[dialogue]]
speaker = "セドナ"
# 「知らん、私は空気が読めないらしいからな……」
line = "「知らん、私は空気が読めないらしいからな……」"

[[dialogue]]
speaker = "リーリア"
# 「あ～、そうでしたね」
line = "「あ～、そうでしたね」"

[[dialogue]]
speaker = "セドナ"
# 「だが今までで一番、よかったぞ……合宿に来た成果は十分あったようだ」
line = "「だが今までで一番、よかったぞ……合宿に来た成果は十分あったようだ」"

[[dialogue]]
speaker = "リーリア"
# 「だから合宿じゃなくて親睦会だって、何度言えばわかるんですか。って、あ――」
line = "「だから合宿じゃなくて親睦会だって、何度言えばわかるんですか。って、あ――」"

[[dialogue]]
speaker = "リーリア"
# 「すごい……綺麗な花火……」
line = "「すごい……綺麗な花火……」"

[[dialogue]]
speaker = "セドナ"
# 「そういえばこの結界は、夏を楽しんで欲しいという想いが込められている、という話だったな」
line = "「そういえばこの結界は、夏を楽しんで欲しいという想いが込められている、という話だったな」"

[[dialogue]]
speaker = "セドナ"
# 「この打ち上げ花火も、結界の主による夏の演出、というわけか」
line = "「この打ち上げ花火も、結界の主による夏の演出、というわけか」"

[[dialogue]]
speaker = "リーリア"
# 「気が利いてますね……あ～あ、これを一緒に見上げてるのがセンパイだったら、最高だったのに」
line = "「気が利いてますね……あ～あ、これを一緒に見上げてるのがセンパイだったら、最高だったのに」"

[[dialogue]]
speaker = "セドナ"
# 「ふっ、ぬかせ……」
line = "「ふっ、ぬかせ……」"

[[dialogue]]
speaker = "セドナ"
# 「この度はご招待頂いて心より感謝する。実に充実した時間を過ごすことができた」
line = "「この度はご招待頂いて心より感謝する。実に充実した時間を過ごすことができた」"

[[dialogue]]
speaker = "ヴィーナス"
# 「こちらこそ楽しかったわ。また一緒に遊びましょう！」
line = "「こちらこそ楽しかったわ。また一緒に遊びましょう！」"

[[dialogue]]
speaker = "セドナ"
# 「遊ぶ……か。ふっ、そうだな。またよろしく頼む」
line = "「遊ぶ……か。ふっ、そうだな。またよろしく頼む」"

[[dialogue]]
speaker = "アイリーン"
# 「おぉ、セドナ長官が遊びのお誘いに応じるなんて」
line = "「おぉ、セドナ長官が遊びのお誘いに応じるなんて」"

[[dialogue]]
speaker = "ヴィーナス"
# 「やっぱりアレじゃない？　リーリアの熱い想いをぶつけられて心境の変化が――」
line = "「やっぱりアレじゃない？　リーリアの熱い想いをぶつけられて心境の変化が――」"

[[dialogue]]
speaker = "リーリア"
# 「やめてくださいよ！　思い出すだけでも恥ずかしいんですから！」
line = "「やめてくださいよ！　思い出すだけでも恥ずかしいんですから！」"

[[dialogue]]
speaker = "リーリア"
# 「酷いですよ、みんなで隠れて全部見てたなんて……」
line = "「酷いですよ、みんなで隠れて全部見てたなんて……」"

[[dialogue]]
speaker = "unk"
# でもリーリア、かっこよかったよ
line = "でもリーリア、かっこよかったよ"

[[dialogue]]
speaker = "unk"
# 覗き見してたのはごめん
line = "覗き見してたのはごめん"

[[dialogue]]
speaker = "リーリア"
# 「うぅう……恥ずかしいけど、センパイに褒めてもらえるのは嬉しいかも」
line = "「うぅう……恥ずかしいけど、センパイに褒めてもらえるのは嬉しいかも」"

[[dialogue]]
speaker = "リーリア"
# 「私、もっともっと頑張りますからっ。よく出来た時には、ちゃんと責任持ってマジカル可愛い後輩のことを褒めるんですよ！」
line = "「私、もっともっと頑張りますからっ。よく出来た時には、ちゃんと責任持ってマジカル可愛い後輩のことを褒めるんですよ！」"

[[dialogue]]
speaker = "unk"
# 任せてくれ
line = "任せてくれ"

[[dialogue]]
speaker = "リーリア"
# 「はいっ」
line = "「はいっ」"

[[dialogue]]
speaker = "セドナ"
# 「そうだな、リーリアにはこれからも頑張ってもらわねば困る」
line = "「そうだな、リーリアにはこれからも頑張ってもらわねば困る」"

[[dialogue]]
speaker = "リーリア"
# 「うー、また……分かってますよ、日々の訓練は欠かしませんから」
line = "「うー、また……分かってますよ、日々の訓練は欠かしませんから」"

[[dialogue]]
speaker = "セドナ"
# 「いや、お前は全く分かっていない」
line = "「いや、お前は全く分かっていない」"

[[dialogue]]
speaker = "セドナ"
# 「お前にはこれからも、新星学園と友好な関係を築くために、頑張ってもらわねば困ると言いたかったのだ」
line = "「お前にはこれからも、新星学園と友好な関係を築くために、頑張ってもらわねば困ると言いたかったのだ」"

[[dialogue]]
speaker = "リーリア"
# 「え……」
line = "「え……」"

[[dialogue]]
speaker = "セドナ"
# 「……頼んだぞ」
line = "「……頼んだぞ」"

[[dialogue]]
speaker = "リーリア"
# 「は、はいっ！」
line = "「は、はいっ！」"

[[dialogue]]
speaker = "unk"
# こうして、俺たち新星星徒会とネビュラによる親睦会は――
line = "こうして、俺たち新星星徒会とネビュラによる親睦会は――"

[[dialogue]]
speaker = "unk"
# 目には見えないところでも、大きな成果を残して幕を下ろしたのだった。
line = "目には見えないところでも、大きな成果を残して幕を下ろしたのだった。"

[[dialogue]]
speaker = "セドナ"
# 「ああ、無論日々の研鑽も欠かさぬようにな。水着フォームでの戦闘についても反省点が多い。基地に戻ったらすぐにミーティングだ」
line = "「ああ、無論日々の研鑽も欠かさぬようにな。水着フォームでの戦闘についても反省点が多い。基地に戻ったらすぐにミーティングだ」"

[[dialogue]]
speaker = "リーリア"
# 「もーっ、結局そういうとこは変わってないんですからっ！！」
line = "「もーっ、結局そういうとこは変わってないんですからっ！！」"
