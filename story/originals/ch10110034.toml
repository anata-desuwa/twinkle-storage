[[dialogue]]
speaker = "unk"
# 第４話,マトイと普通の朝,P
line = "第４話,マトイと普通の朝,P"

[[dialogue]]
speaker = "unk"
# マトイが以前遊びに来て母さんと挨拶をしてから、彼女は毎朝のように、家まで迎えに来てくれるようになった。
line = "マトイが以前遊びに来て母さんと挨拶をしてから、彼女は毎朝のように、家まで迎えに来てくれるようになった。"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「会長、そろそろ時間だし、学園に行こっか」
line = "「会長、そろそろ時間だし、学園に行こっか」"

[[dialogue]]
speaker = "リノ"
# 「マトイちゃん、朝早いのに、いつもクロトを迎えに来てくれて、ありがとね♪」
line = "「マトイちゃん、朝早いのに、いつもクロトを迎えに来てくれて、ありがとね♪」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「いえいえ！　私が好きでやってることなので。星徒会が忙しい日でも、朝ならその……恋人の時間を過ごせるというか……」
line = "「いえいえ！　私が好きでやってることなので。星徒会が忙しい日でも、朝ならその……恋人の時間を過ごせるというか……」"

[[dialogue]]
speaker = "リノ"
# 「あらあら、うふふっ♪　クロトったら、愛されてるわね～」
line = "「あらあら、うふふっ♪　クロトったら、愛されてるわね～」"

[[dialogue]]
speaker = "unk"
# 今度、俺もまた、マトイの家に迎えに行くよ
line = "今度、俺もまた、マトイの家に迎えに行くよ"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「うん！　お父さんお母さんも、また朝食を一緒にどうかって行ってたから、喜ぶと思う♪」
line = "「うん！　お父さんお母さんも、また朝食を一緒にどうかって行ってたから、喜ぶと思う♪」"

[[dialogue]]
speaker = "リノ"
# 「ふふっ、マモリちゃんとススムさんには、私からも息子をよろしくお願いしますって言ってたって、伝えておいてね♪」
line = "「ふふっ、マモリちゃんとススムさんには、私からも息子をよろしくお願いしますって言ってたって、伝えておいてね♪」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「はい、必ず。……それじゃあ、リノさん、そろそろ行って来ます」
line = "「はい、必ず。……それじゃあ、リノさん、そろそろ行って来ます」"

[[dialogue]]
speaker = "リノ"
# 「は～い♪　２人とも、元気に行ってらっしゃ～い♪」
line = "「は～い♪　２人とも、元気に行ってらっしゃ～い♪」"

[[dialogue]]
speaker = "unk"
# そうして俺とマトイは、２人で並んで通学路を歩いて行く。
line = "そうして俺とマトイは、２人で並んで通学路を歩いて行く。"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「きょ、今日もいい朝だね～。何か、いつもよりも気分が高揚してくるというか～……」
line = "「きょ、今日もいい朝だね～。何か、いつもよりも気分が高揚してくるというか～……」"

[[dialogue]]
speaker = "unk"
# なんか緊張してるような……
line = "なんか緊張してるような……"

[[dialogue]]
speaker = "unk"
# ？　……マトイ、どうかしたか？
line = "？　……マトイ、どうかしたか？"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「えっ！？　じ、実は、その……会長、あのね――」
line = "「えっ！？　じ、実は、その……会長、あのね――」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「今日は、手を繋いで登校とか……どうかなって！」
line = "「今日は、手を繋いで登校とか……どうかなって！」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「い、今までは、恥ずかしくて……人目がない時とかにしてたけど……」
line = "「い、今までは、恥ずかしくて……人目がない時とかにしてたけど……」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「会長と恋人になってから、時間も経って慣れて来たし……あとその、もう新星学園生なら全員に、私たちが恋人同士だってバレちゃってるし……」
line = "「会長と恋人になってから、時間も経って慣れて来たし……あとその、もう新星学園生なら全員に、私たちが恋人同士だってバレちゃってるし……」"

[[dialogue]]
speaker = "unk"
# まあ……確かに
line = "まあ……確かに"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「それはもう、全然構わないんだけど……」
line = "「それはもう、全然構わないんだけど……」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「あとはそう、この前のノヴァフォームの一件とかもあって……私、会長の恋人として、もうちょっと自信を持てるようになりたいなって！」
line = "「あとはそう、この前のノヴァフォームの一件とかもあって……私、会長の恋人として、もうちょっと自信を持てるようになりたいなって！」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「だから、手を繋いで歩くくらいは、人目を気にしないで堂々とできるようになれたらと……！」
line = "「だから、手を繋いで歩くくらいは、人目を気にしないで堂々とできるようになれたらと……！」"

[[dialogue]]
speaker = "unk"
# そういうことなら、喜んで
line = "そういうことなら、喜んで"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「う、うん♪　じゃあ、失礼して――」
line = "「う、うん♪　じゃあ、失礼して――」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「ん……<emoji=heart04>」
line = "「ん……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# マトイの方から、そっと俺の手を取って、繋ぐ。
line = "マトイの方から、そっと俺の手を取って、繋ぐ。"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「い、意識しちゃうと、ちょっとドキドキするけど……えへへ♪　会長の手、温かくて心地良いな<emoji=heart04>」
line = "「い、意識しちゃうと、ちょっとドキドキするけど……えへへ♪　会長の手、温かくて心地良いな<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「って、会長、どうしたの？　なんか驚いたような顔してるけど……」
line = "「って、会長、どうしたの？　なんか驚いたような顔してるけど……」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「――手を繋ぐといっても、恋人繋ぎだとは思わなかった？　えっ、恋人だから、そっちの方が普通かなって思ったんだけど……」
line = "「――手を繋ぐといっても、恋人繋ぎだとは思わなかった？　えっ、恋人だから、そっちの方が普通かなって思ったんだけど……」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「ふ、普通の繋ぎ方にした方が、よかったかな？　……やめちゃう？」
line = "「ふ、普通の繋ぎ方にした方が、よかったかな？　……やめちゃう？」"

[[dialogue]]
speaker = "unk"
# ……いや、マトイがいいなら、それがいい
line = "……いや、マトイがいいなら、それがいい"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「いいの？　……えへへ<emoji=heart04>　ありがと、会長……<emoji=heart04>」
line = "「いいの？　……えへへ<emoji=heart04>　ありがと、会長……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そう言ってマトイは嬉しそうに、ぎゅっと恋人繋ぎの手を握り直すのだった。
line = "そう言ってマトイは嬉しそうに、ぎゅっと恋人繋ぎの手を握り直すのだった。"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「って、気づいたらもう、学園の前まで来ちゃったね……よしっ」
line = "「って、気づいたらもう、学園の前まで来ちゃったね……よしっ」"

[[dialogue]]
speaker = "unk"
# マトイはそっと繋いでいた手を離して──
line = "マトイはそっと繋いでいた手を離して──"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「ＴＰＯは弁えなきゃだもんね！　普通モードに切り替えて、教室に行こう！」
line = "「ＴＰＯは弁えなきゃだもんね！　普通モードに切り替えて、教室に行こう！」"

[[dialogue]]
speaker = "unk"
# 早くも頭を切り替えて『普通のクラスメイト』の顔になるマトイに、少しの名残り惜しさを感じていると――
line = "早くも頭を切り替えて『普通のクラスメイト』の顔になるマトイに、少しの名残り惜しさを感じていると――"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「…………ん～～。誰もこっち、注目してないよね？」
line = "「…………ん～～。誰もこっち、注目してないよね？」"

[[dialogue]]
speaker = "unk"
# マトイ？　キョロキョロして一体どうし──
line = "マトイ？　キョロキョロして一体どうし──"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「会長……<emoji=heart04>」
line = "「会長……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 次の瞬間、マトイが校門の影に俺を引っ張り、覗き込むように顔を近づけてきたかと思うと――
line = "次の瞬間、マトイが校門の影に俺を引っ張り、覗き込むように顔を近づけてきたかと思うと――"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「ちゅっ……<emoji=heart04>」
line = "「ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# っ……！？！？
line = "っ……！？！？"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「えへへ♪　学園まで来たら自重するつもりだったのに……しちゃった<emoji=heart04>」
line = "「えへへ♪　学園まで来たら自重するつもりだったのに……しちゃった<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「続きは……また２人きりになった時に、ね<emoji=heart04>」
line = "「続きは……また２人きりになった時に、ね<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 離れて照れた笑みを浮かべながら、小さい声で言うマトイ。
line = "離れて照れた笑みを浮かべながら、小さい声で言うマトイ。"

[[dialogue]]
speaker = "unk"
# こ、攻撃力が高すぎる……！
line = "こ、攻撃力が高すぎる……！"

[[dialogue]]
speaker = "クラスの女子"
# 「マトイ、おはよ～！」
line = "「マトイ、おはよ～！」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「うん、おはよ～♪　ねぇ、昨日のドラマ観た？　――ヤバかったよね～」
line = "「うん、おはよ～♪　ねぇ、昨日のドラマ観た？　――ヤバかったよね～」"

[[dialogue]]
speaker = "unk"
# 俺は教室に行ってからもドキドキがまだ収まらず、普通モードでクラスメイトと話しているマトイに、ちらっと視線を向けていると――
line = "俺は教室に行ってからもドキドキがまだ収まらず、普通モードでクラスメイトと話しているマトイに、ちらっと視線を向けていると――"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「……！　えへへ……<emoji=heart04>」
line = "「……！　えへへ……<emoji=heart04>」"

[[dialogue]]
speaker = "クラスの女子"
# 「？　どうしたのマトイ、急に笑顔になったりして？」
line = "「？　どうしたのマトイ、急に笑顔になったりして？」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「ううん、何でもない♪」
line = "「ううん、何でもない♪」"

[[dialogue]]
speaker = "unk"
# クラスメイトの子の視線に入らない位置で小さく手を振って、微笑み返してくれる彼女が可愛すぎて、内心悶えてしまう俺なのであった――
line = "クラスメイトの子の視線に入らない位置で小さく手を振って、微笑み返してくれる彼女が可愛すぎて、内心悶えてしまう俺なのであった――"
