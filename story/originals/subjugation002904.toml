[[dialogue]]
speaker = "unk"
# 星霊舞闘会の２回戦で激突することになったフェニエルとマハムート。
line = "星霊舞闘会の２回戦で激突することになったフェニエルとマハムート。"

[[dialogue]]
speaker = "unk"
# その勝敗の行方は――
line = "その勝敗の行方は――"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「っ……」
line = "「っ……」"

[[dialogue]]
speaker = "ホウちゃん"
# 「不死鳥の力を上回るとは……これが今を生きる竜の力……お見事です」
line = "「不死鳥の力を上回るとは……これが今を生きる竜の力……お見事です」"

[[dialogue]]
speaker = "マハムート"
# 「不死鳥からの畏怖、光栄よ。そして――」
line = "「不死鳥からの畏怖、光栄よ。そして――」"

[[dialogue]]
speaker = "マハムート"
# 「フニ、あなたも大したものだわ。竜たる私の全力を受けて、最後まで立ち続けていた」
line = "「フニ、あなたも大したものだわ。竜たる私の全力を受けて、最後まで立ち続けていた」"

[[dialogue]]
speaker = "マハムート"
# 「ただ、惜しむらくは……未だ完全には不死鳥の力を使いこなせていないこと」
line = "「ただ、惜しむらくは……未だ完全には不死鳥の力を使いこなせていないこと」"

[[dialogue]]
speaker = "マハムート"
# 「それともう１つ。この私に勝つという強いイメージが、まだ持てていなかった。次に挑戦する時は、誰よりも――」
line = "「それともう１つ。この私に勝つという強いイメージが、まだ持てていなかった。次に挑戦する時は、誰よりも――」"

[[dialogue]]
speaker = "マハムート"
# 「ヒルディオーネよりも強く、自分が優勝するつもりで来なさい」
line = "「ヒルディオーネよりも強く、自分が優勝するつもりで来なさい」"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「……！　イエス・マム。ありがとうございました……！」
line = "「……！　イエス・マム。ありがとうございました……！」"

[[dialogue]]
speaker = "マハムート"
# 「ええ。期待しているわ」
line = "「ええ。期待しているわ」"

[[dialogue]]
speaker = "unk"
# マハムートは軽く手を振ると、背中を向けて会場から去って行く。
line = "マハムートは軽く手を振ると、背中を向けて会場から去って行く。"

[[dialogue]]
speaker = "紅明"
# 『試合終了ーーっ！　勝者は新星寮寮長、マム選手だ～～っ！！』
line = "『試合終了ーーっ！　勝者は新星寮寮長、マム選手だ～～っ！！』"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「お姉様、ごめんなさい……。私、マムに勝つことができませんでした……」
line = "「お姉様、ごめんなさい……。私、マムに勝つことができませんでした……」"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「やっぱり、マムはなまら強かったです……」
line = "「やっぱり、マムはなまら強かったです……」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「いいえ。謝る必要なんて全くありませんわよ、フニ。あなたは本当によく頑張りましたわ」
line = "「いいえ。謝る必要なんて全くありませんわよ、フニ。あなたは本当によく頑張りましたわ」"

[[dialogue]]
speaker = "unk"
# そう言って、ヒルディオーネはフェニエルの頭に手を置き、その髪を優しく撫でる。
line = "そう言って、ヒルディオーネはフェニエルの頭に手を置き、その髪を優しく撫でる。"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「１年生でありながら、あのマムに本気を出させて、全力で渡り合った末に負けたんですもの」
line = "「１年生でありながら、あのマムに本気を出させて、全力で渡り合った末に負けたんですもの」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「次は……私が先輩として頑張る姿を見せる番ですわ」
line = "「次は……私が先輩として頑張る姿を見せる番ですわ」"

[[dialogue]]
speaker = "unk"
# そこから星霊祭と並行して、トーナメントが進み――
line = "そこから星霊祭と並行して、トーナメントが進み――"

[[dialogue]]
speaker = "unk"
# 星霊祭最終日の７日目。
line = "星霊祭最終日の７日目。"

[[dialogue]]
speaker = "unk"
# 学園の生徒や関係者で満員になったアリーナで、星霊舞闘会は決勝戦の時を迎える。
line = "学園の生徒や関係者で満員になったアリーナで、星霊舞闘会は決勝戦の時を迎える。"

[[dialogue]]
speaker = "マハムート"
# 「――やはり、勝ち上がってきたわね。ヒルディオーネ」
line = "「――やはり、勝ち上がってきたわね。ヒルディオーネ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ええ。流星寮の寮長として……あなたと戦うまでに負けるわけにはいきませんもの」
line = "「ええ。流星寮の寮長として……あなたと戦うまでに負けるわけにはいきませんもの」"

[[dialogue]]
speaker = "マハムート"
# 「そう……それで？」
line = "「そう……それで？」"

[[dialogue]]
speaker = "マハムート"
# 「負けるわけにはいかないというからには、この私に勝つイメージ、ちゃんと出来ているのかしら？」
line = "「負けるわけにはいかないというからには、この私に勝つイメージ、ちゃんと出来ているのかしら？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「当然ですわ――」
line = "「当然ですわ――」"

[[dialogue]]
speaker = "unk"
# ヒルディオーネは槍を構えながら、告げる。
line = "ヒルディオーネは槍を構えながら、告げる。"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「この世界で１番あなたに勝ちたいと思っているのは――この私、千園寺ヒルディオーネなのですから！！」
line = "「この世界で１番あなたに勝ちたいと思っているのは――この私、千園寺ヒルディオーネなのですから！！」"

[[dialogue]]
speaker = "マハムート"
# 「相変わらず、いい度胸ね。であれば――」
line = "「相変わらず、いい度胸ね。であれば――」"

[[dialogue]]
speaker = "unk"
# マムが鉄球の鎖を振るいながら、答える。
line = "マムが鉄球の鎖を振るいながら、答える。"

[[dialogue]]
speaker = "マハムート"
# 「畏怖をもって、本気で跪かせてあげる」
line = "「畏怖をもって、本気で跪かせてあげる」"

[[dialogue]]
speaker = "紅明"
# 『――それでは、両雄準備が整ったみたいだし、元気に行くぜ～！』
line = "『――それでは、両雄準備が整ったみたいだし、元気に行くぜ～！』"

[[dialogue]]
speaker = "紅明"
# 『星霊舞闘会、決勝戦！　千園寺ヒルディオーネＶＳ妃竜院マハムート！！　いざ――』
line = "『星霊舞闘会、決勝戦！　千園寺ヒルディオーネＶＳ妃竜院マハムート！！　いざ――』"

[[dialogue]]
speaker = "unk"
# アリーナの中央フィールドに仮想結界が展開され――そして。
line = "アリーナの中央フィールドに仮想結界が展開され――そして。"

[[dialogue]]
speaker = "紅明"
# 『試合開始ィィィーーーッ！！！』
line = "『試合開始ィィィーーーッ！！！』"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「――スパイラルストリームッ！！」
line = "「――スパイラルストリームッ！！」"

[[dialogue]]
speaker = "マハムート"
# 「――メテオインパクトッ！」
line = "「――メテオインパクトッ！」"

[[dialogue]]
speaker = "unk"
# ２つの極星がついに、激突を開始するのだった――
line = "２つの極星がついに、激突を開始するのだった――"
