[[dialogue]]
speaker = "ユーリス"
# 「それじゃあ行くよ？」
line = "「それじゃあ行くよ？」"

[[dialogue]]
speaker = "ユーリス"
# 「勇者スキル──『早着替え』！！」
line = "「勇者スキル──『早着替え』！！」"

[[dialogue]]
speaker = "ユーリス"
# 「どうかな？　この格好ならカジノで働いていても不自然には見えないよね？」
line = "「どうかな？　この格好ならカジノで働いていても不自然には見えないよね？」"

[[dialogue]]
speaker = "unk"
# 一瞬でカジノのディーラーに……！
line = "一瞬でカジノのディーラーに……！"

[[dialogue]]
speaker = "ユーリス"
# 「スキルにまで昇華された『早着替え』は単なる着替えを超え、戦闘服すら変化させる。どう、似合ってるかな？」
line = "「スキルにまで昇華された『早着替え』は単なる着替えを超え、戦闘服すら変化させる。どう、似合ってるかな？」"

[[dialogue]]
speaker = "unk"
# すごく似合ってる
line = "すごく似合ってる"

[[dialogue]]
speaker = "ユーリス"
# 「ありがとう。会長もディーラーの服装、様になってるよ」
line = "「ありがとう。会長もディーラーの服装、様になってるよ」"

[[dialogue]]
speaker = "ユーリス"
# 「ところで、念を押させてもらうけど……私が女だって知ってるのは会長だけだから。私のことは終始男扱いしてもらえると助かるよ」
line = "「ところで、念を押させてもらうけど……私が女だって知ってるのは会長だけだから。私のことは終始男扱いしてもらえると助かるよ」"

[[dialogue]]
speaker = "unk"
# わかってる
line = "わかってる"

[[dialogue]]
speaker = "ユーリス"
# 「ありがとう。色々と迷惑をかけてしまうかもしれないけどよろしくね？」
line = "「ありがとう。色々と迷惑をかけてしまうかもしれないけどよろしくね？」"

[[dialogue]]
speaker = "unk"
# どうしてこんなことをしているのか。
line = "どうしてこんなことをしているのか。"

[[dialogue]]
speaker = "unk"
# その経緯は少し時を遡る──
line = "その経緯は少し時を遡る──"

[[dialogue]]
speaker = "ユウリ"
# 「あたしたちに九浄家の経営するカジノの警備を？」
line = "「あたしたちに九浄家の経営するカジノの警備を？」"

[[dialogue]]
speaker = "ユーリス"
# 「私はともかく、他の面々が星徒会役員ということは、ただごとではなさそうですね」
line = "「私はともかく、他の面々が星徒会役員ということは、ただごとではなさそうですね」"

[[dialogue]]
speaker = "ヘレナ"
# 「うむ。先日ちょっとしたモンスター騒ぎがあってな。念のため、カジノの警備とモンスターの調査を依頼したい」
line = "「うむ。先日ちょっとしたモンスター騒ぎがあってな。念のため、カジノの警備とモンスターの調査を依頼したい」"

[[dialogue]]
speaker = "セーラ"
# 「調査ってことは、普通のモンスターじゃないんですよね？」
line = "「調査ってことは、普通のモンスターじゃないんですよね？」"

[[dialogue]]
speaker = "ヘレナ"
# 「無論。さすが流星の副会長、察しがいいな」
line = "「無論。さすが流星の副会長、察しがいいな」"

[[dialogue]]
speaker = "ヘレナ"
# 「いかに五名門の九浄家とはいえ星騎士を、しかも両学園の最高戦力たる星徒会を、私的に運営している施設の警備につけるわけにはいかない」
line = "「いかに五名門の九浄家とはいえ星騎士を、しかも両学園の最高戦力たる星徒会を、私的に運営している施設の警備につけるわけにはいかない」"

[[dialogue]]
speaker = "ヘレナ"
# 「だが事件に特殊性があれば話は別だ」
line = "「だが事件に特殊性があれば話は別だ」"

[[dialogue]]
speaker = "ユウリ"
# 「それほど強力なモンスターってことっすか？」
line = "「それほど強力なモンスターってことっすか？」"

[[dialogue]]
speaker = "ヘレナ"
# 「いいや？　この前は私が瞬殺したから大した脅威ではなかった。だが不可解な点があってな……目撃者の話ではどこからともなく急に出現したというのだ」
line = "「いいや？　この前は私が瞬殺したから大した脅威ではなかった。だが不可解な点があってな……目撃者の話ではどこからともなく急に出現したというのだ」"

[[dialogue]]
speaker = "ヘレナ"
# 「周囲でアステラが発生したわけでもなく、外から侵入した形跡もなかった。さすがに不気味だろう？」
line = "「周囲でアステラが発生したわけでもなく、外から侵入した形跡もなかった。さすがに不気味だろう？」"

[[dialogue]]
speaker = "ヘレナ"
# 「今のところ被害は小さいが、軽く見るべきではない。そう判断したのだ」
line = "「今のところ被害は小さいが、軽く見るべきではない。そう判断したのだ」"

[[dialogue]]
speaker = "セーラ"
# 「なるほど、それで調査をってことですね。それならＯＫですよ♪」
line = "「なるほど、それで調査をってことですね。それならＯＫですよ♪」"

[[dialogue]]
speaker = "ヘレナ"
# 「うむ、助かる。カジノで働きながら、それとなく店内に気を配ってもらいたい」
line = "「うむ、助かる。カジノで働きながら、それとなく店内に気を配ってもらいたい」"

[[dialogue]]
speaker = "ユウリ"
# 「働きながら？　警備の依頼ですよね？」
line = "「働きながら？　警備の依頼ですよね？」"

[[dialogue]]
speaker = "ヘレナ"
# 「モンスターの調査のためにも、貴殿らにはカジノにできるだけ溶け込んでもらいたいのだ。もちろんカジノで働いてもらった分の報酬も支払うつもりだ。ほれ」
line = "「モンスターの調査のためにも、貴殿らにはカジノにできるだけ溶け込んでもらいたいのだ。もちろんカジノで働いてもらった分の報酬も支払うつもりだ。ほれ」"

[[dialogue]]
speaker = "ユウリ"
# 「ちょっ、なんすかこの額……！　バイトでもらっていい金額じゃねーっ……！？」
line = "「ちょっ、なんすかこの額……！　バイトでもらっていい金額じゃねーっ……！？」"

[[dialogue]]
speaker = "ヘレナ"
# 「む、そうか？　確かに相場よりも色を付けたつもりではあるが」
line = "「む、そうか？　確かに相場よりも色を付けたつもりではあるが」"

[[dialogue]]
speaker = "ユウリ"
# 「やべーバイトにしか見えないっすよ……。でも、ここんとこ金欠続きだしな……」
line = "「やべーバイトにしか見えないっすよ……。でも、ここんとこ金欠続きだしな……」"

[[dialogue]]
speaker = "セーラ"
# 「ユウリちゃん、この前寮の子に奢ってたもんね～？」
line = "「ユウリちゃん、この前寮の子に奢ってたもんね～？」"

[[dialogue]]
speaker = "ユウリ"
# 「えっ、何で知ってるんすか？　魔界の出で小遣いなくて、腹減ったって言うから牛丼奢ってやったんすけど」
line = "「えっ、何で知ってるんすか？　魔界の出で小遣いなくて、腹減ったって言うから牛丼奢ってやったんすけど」"

[[dialogue]]
speaker = "セーラ"
# 「さっすが～♪　その子がめっちゃありがたかったって、興奮気味に話してたよ」
line = "「さっすが～♪　その子がめっちゃありがたかったって、興奮気味に話してたよ」"

[[dialogue]]
speaker = "ユウリ"
# 「それはそれでハズいな……。別に世話を焼いてるつもりもねーし……」
line = "「それはそれでハズいな……。別に世話を焼いてるつもりもねーし……」"

[[dialogue]]
speaker = "ユーリス"
# 「しかしバイト代としては本当に破格ですね……。私も少々金銭面で困っているのでありがたいですが……」
line = "「しかしバイト代としては本当に破格ですね……。私も少々金銭面で困っているのでありがたいですが……」"

[[dialogue]]
speaker = "ユウリ"
# 「じゃあ変身してカジノで働きゃいいんですか？　なんか場違いですけど」
line = "「じゃあ変身してカジノで働きゃいいんですか？　なんか場違いですけど」"

[[dialogue]]
speaker = "ヘレナ"
# 「そこが問題だ。今までであればクリスマスや正月の晴れ着のように、その場に合った戦闘服も用意するところだが……何分急でな」
line = "「そこが問題だ。今までであればクリスマスや正月の晴れ着のように、その場に合った戦闘服も用意するところだが……何分急でな」"

[[dialogue]]
speaker = "ヘレナ"
# 「しかし星騎士が戦闘服で見回りをしていては客の勝負っ気が削がれてしまうだろう？　せっかくの興奮に水を差すのは避けたい」
line = "「しかし星騎士が戦闘服で見回りをしていては客の勝負っ気が削がれてしまうだろう？　せっかくの興奮に水を差すのは避けたい」"

[[dialogue]]
speaker = "ユーリス"
# 「そういうことであれば私にお任せください。私の勇者スキル『早着替え』を使って皆さんの戦闘服をカジノ用に最適化しましょう」
line = "「そういうことであれば私にお任せください。私の勇者スキル『早着替え』を使って皆さんの戦闘服をカジノ用に最適化しましょう」"

[[dialogue]]
speaker = "セーラ"
# 「えっ、王子、そんなことできるの？」
line = "「えっ、王子、そんなことできるの？」"

[[dialogue]]
speaker = "ユーリス"
# 「ええ。この聖剣には代々の担い手の技──つまり優れた星騎士の技が記録されていますから」
line = "「ええ。この聖剣には代々の担い手の技──つまり優れた星騎士の技が記録されていますから」"

[[dialogue]]
speaker = "ユーリス"
# 「──うん、会長も無事に戦闘服を最適化できているね。どこからどう見てもカジノのディーラーだ」
line = "「──うん、会長も無事に戦闘服を最適化できているね。どこからどう見てもカジノのディーラーだ」"

[[dialogue]]
speaker = "unk"
# なんだか楽しみになってきた
line = "なんだか楽しみになってきた"

[[dialogue]]
speaker = "ユーリス"
# 「ふふ、そうだね。実を言うと私も少しワクワクしてるんだ。あまりこういう仕事に携わったことがないからね」
line = "「ふふ、そうだね。実を言うと私も少しワクワクしてるんだ。あまりこういう仕事に携わったことがないからね」"

[[dialogue]]
speaker = "ユーリス"
# 「中々使う機会に恵まれていなかった勇者スキルも披露できそうだ。この『早着替え』も久しぶりに使わせてもらったよ」
line = "「中々使う機会に恵まれていなかった勇者スキルも披露できそうだ。この『早着替え』も久しぶりに使わせてもらったよ」"

[[dialogue]]
speaker = "ユウリ"
# 「んじゃ、あたしらの番か。……ほんとに着替えてるところ見えねえんだろうな？」
line = "「んじゃ、あたしらの番か。……ほんとに着替えてるところ見えねえんだろうな？」"

[[dialogue]]
speaker = "ユーリス"
# 「はい。『早着替え』といっても、スキルですからね。実際に着替えてもらうわけではありませんよ」
line = "「はい。『早着替え』といっても、スキルですからね。実際に着替えてもらうわけではありませんよ」"

[[dialogue]]
speaker = "セーラ"
# 「王子の聖剣すっご～い！　何でもできちゃうんだ、一家に一台ほし～」
line = "「王子の聖剣すっご～い！　何でもできちゃうんだ、一家に一台ほし～」"

[[dialogue]]
speaker = "unk"
# （念のため着替えの瞬間は見ないようにしよう）
line = "（念のため着替えの瞬間は見ないようにしよう）"

[[dialogue]]
speaker = "ユーリス"
# 「それでは──勇者スキル『早着替え』！」
line = "「それでは──勇者スキル『早着替え』！」"

[[dialogue]]
speaker = "ユウリ"
# 「へぇ、これが早着替え……──っておいコラ王子！！」
line = "「へぇ、これが早着替え……──っておいコラ王子！！」"

[[dialogue]]
speaker = "ユーリス"
# 「きゃっ！？」
line = "「きゃっ！？」"

[[dialogue]]
speaker = "ユウリ"
# 「こりゃいったいどういう了見だ！？　ふざけてんのか！？」
line = "「こりゃいったいどういう了見だ！？　ふざけてんのか！？」"

[[dialogue]]
speaker = "セーラ"
# 「ユウリちゃん落ち着きなーって。超似合ってるじゃーん」
line = "「ユウリちゃん落ち着きなーって。超似合ってるじゃーん」"

[[dialogue]]
speaker = "ユウリ"
# 「お、落ち着けるわけないじゃないっすかっ……！！　このムッツリエロ王子っ、あたしになんてもの着させてんだっ……！！」
line = "「お、落ち着けるわけないじゃないっすかっ……！！　このムッツリエロ王子っ、あたしになんてもの着させてんだっ……！！」"

[[dialogue]]
speaker = "ユーリス"
# 「え、えっと、これは私としても……」
line = "「え、えっと、これは私としても……」"

[[dialogue]]
speaker = "ユウリ"
# 「あぁ！？　気に入るわけねえだろ！！　どうしてあたしとセーラさんの衣装が──」
line = "「あぁ！？　気に入るわけねえだろ！！　どうしてあたしとセーラさんの衣装が──」"

[[dialogue]]
speaker = "ユウリ"
# 「バニーなんだよ！！？」
line = "「バニーなんだよ！！？」"
