line = "「あなたと完全に融合したわ」"

[[dialogue]]
speaker = "フェニエル"
# 「融合……！？」
line = "「融合……！？」"

[[dialogue]]
speaker = "セシア"
# 「そう。封印を解いた上で、フニと存在が１つになったの。それで、ホウちゃんママはあなたの意識が表に出ることを望んだ」
line = "「そう。封印を解いた上で、フニと存在が１つになったの。それで、ホウちゃんママはあなたの意識が表に出ることを望んだ」"

[[dialogue]]
speaker = "フェニエル"
# 「ホウちゃんの意識は……！？」
line = "「ホウちゃんの意識は……！？」"

[[dialogue]]
speaker = "セシア"
# 「あなたの中で見守っているわ。これまでと同じように。ただ、前のように意思疎通はできないけれど……」
line = "「あなたの中で見守っているわ。これまでと同じように。ただ、前のように意思疎通はできないけれど……」"

[[dialogue]]
speaker = "フェニエル"
# 「……！　ホウちゃん……また、私を守って……」
line = "「……！　ホウちゃん……また、私を守って……」"

[[dialogue]]
speaker = "セシア"
# 「ええ。今の形が、ホウちゃんママと戦うことで得られた、わたくしの『蓄積』の限界だった」
line = "「ええ。今の形が、ホウちゃんママと戦うことで得られた、わたくしの『蓄積』の限界だった」"

[[dialogue]]
speaker = "セシア"
# 「でもね、フニ」
line = "「でもね、フニ」"

[[dialogue]]
speaker = "セシア"
# 「あなたもまた、自分の力でホウちゃんママを守ったのよ」
line = "「あなたもまた、自分の力でホウちゃんママを守ったのよ」"

[[dialogue]]
speaker = "フェニエル"
# 「私が……？ それって、どういう……？」
line = "「私が……？ それって、どういう……？」"

[[dialogue]]
speaker = "セシア"
# 「フニ。あなたはホウちゃんママと融合したことで、新しい星術を使えるようになった。その名を今から言うわ。唱えてごらんなさい――」
line = "「フニ。あなたはホウちゃんママと融合したことで、新しい星術を使えるようになった。その名を今から言うわ。唱えてごらんなさい――」"

[[dialogue]]
speaker = "unk"
# セシアが星術名を読み上げる。
line = "セシアが星術名を読み上げる。"

[[dialogue]]
speaker = "unk"
# フニはその後に続いて、唱える。その術の名は――
line = "フニはその後に続いて、唱える。その術の名は――"

[[dialogue]]
speaker = "フェニエル"
# 「――レリーズフェニックス」
line = "「――レリーズフェニックス」"

[[dialogue]]
speaker = "フェニエル"
# 「ん……」
line = "「ん……」"

[[dialogue]]
speaker = "unk"
# 眩しい光に目を閉じていたフニが、ゆっくりと<ruby=まぶた>瞼</ruby>を開く。
line = "眩しい光に目を閉じていたフニが、ゆっくりと<ruby>瞼<rt>まぶた</rt></ruby>を開く。"

[[dialogue]]
speaker = "unk"
# そこにあったのは――
line = "そこにあったのは――"

[[dialogue]]
speaker = "フェニックス"
# 「――フニ」
line = "「――フニ」"

[[dialogue]]
speaker = "フェニエル"
# 「ホウ、ちゃん……！？」
line = "「ホウ、ちゃん……！？」"

[[dialogue]]
speaker = "フェニックス"
# 「はい。紛れもなく――本物です」
line = "「はい。紛れもなく――本物です」"

[[dialogue]]
speaker = "フェニエル"
# 「ホウちゃんっ！！！」
line = "「ホウちゃんっ！！！」"

[[dialogue]]
speaker = "unk"
# フニはホウちゃんに駆け寄り、その大きな体を抱き締める。
line = "フニはホウちゃんに駆け寄り、その大きな体を抱き締める。"

[[dialogue]]
speaker = "フェニエル"
# 「よかった！ 私、もうホウちゃんと話せないのかと……！」
line = "「よかった！ 私、もうホウちゃんと話せないのかと……！」"

[[dialogue]]
speaker = "フェニックス"
# 「セシアのおかげです。そして、フニが私のことを大切に想ってくれたから、こうして直接会うことができるようになりました」
line = "「セシアのおかげです。そして、フニが私のことを大切に想ってくれたから、こうして直接会うことができるようになりました」"

[[dialogue]]
speaker = "セシア"
# 「――わたくしだけの蓄積では、その星術は決して叶わなかった」
line = "「――わたくしだけの蓄積では、その星術は決して叶わなかった」"

[[dialogue]]
speaker = "セシア"
# 「だけど、ホウちゃんママと戦っていて、わたくしの中に強い<b>想い</b>が流れ込んできたの」
line = "「だけど、ホウちゃんママと戦っていて、わたくしの中に強い<b>想い</b>が流れ込んできたの」"

[[dialogue]]
speaker = "セシア"
# 「フニとホウちゃんママ、２人が互いを想い合う強い気持ちが」
line = "「フニとホウちゃんママ、２人が互いを想い合う強い気持ちが」"

[[dialogue]]
speaker = "セシア"
# 「だから、２人が築き上げた絆の蓄積を『力』に変えることにしたのよ」
line = "「だから、２人が築き上げた絆の蓄積を『力』に変えることにしたのよ」"

[[dialogue]]
speaker = "セシア"
# 「そうして生まれたのが、『フニと融合した不死鳥を召喚する』星術。これが今のわたくしにできる精一杯――」
line = "「そうして生まれたのが、『フニと融合した不死鳥を召喚する』星術。これが今のわたくしにできる精一杯――」"

[[dialogue]]
speaker = "セシア"
# 「フニ。あなたにあげられる、クリスマスプレゼントよ」
line = "「フニ。あなたにあげられる、クリスマスプレゼントよ」"

[[dialogue]]
speaker = "フェニエル"
# 「セシアちゃん……！」
line = "「セシアちゃん……！」"

[[dialogue]]
speaker = "フェニエル"
# 「それに、ルルカちゃんと、会長さんも……！　私……ごめんなさい……！」
line = "「それに、ルルカちゃんと、会長さんも……！　私……ごめんなさい……！」"

[[dialogue]]
speaker = "フェニエル"
# 「すぐに気づけませんでした……！　よく見たら、みなさん、全身<b>ボロボロ</b>になって……！　一体どれだけの時間を戦って……」
line = "「すぐに気づけませんでした……！　よく見たら、みなさん、全身<b>ボロボロ</b>になって……！　一体どれだけの時間を戦って……」"

[[dialogue]]
speaker = "ルルカ"
# 「ん？　ああ、これ？」
line = "「ん？　ああ、これ？」"

[[dialogue]]
speaker = "ルルカ"
# 「そんな大した時間じゃないよ。ねっ？　セッシーちゃん、お兄ちゃん？」
line = "「そんな大した時間じゃないよ。ねっ？　セッシーちゃん、お兄ちゃん？」"

[[dialogue]]
speaker = "unk"
# ルルカが俺たちの方を向いて、こっそりウィンクする。
line = "ルルカが俺たちの方を向いて、こっそりウィンクする。"

[[dialogue]]
speaker = "セシア"
# 「ええ、フニが無事だったんだし、気にする程のことじゃないわ。せいぜい――」
line = "「ええ、フニが無事だったんだし、気にする程のことじゃないわ。せいぜい――」"

[[dialogue]]
speaker = "unk"
# 日が暮れる程度の時間さ
line = "日が暮れる程度の時間さ"

[[dialogue]]
speaker = "unk"
# そう、どれだけ時間が掛かったかなんて、些細なことだ。
line = "そう、どれだけ時間が掛かったかなんて、些細なことだ。"

[[dialogue]]
speaker = "unk"
# あれから丸１日以上戦い続けてヘトヘトになっていても、こうしてフニもホウちゃんも救うことができたのだから。
line = "あれから丸１日以上戦い続けてヘトヘトになっていても、こうしてフニもホウちゃんも救うことができたのだから。"

[[dialogue]]
speaker = "unk"
# 俺たちは顔を見合わせて、笑い合うのだった――
line = "俺たちは顔を見合わせて、笑い合うのだった――"

[[dialogue]]
speaker = "unk"
# あの後、精神世界から現実へと戻ってきた俺たちは、熱が下がり目覚めたフニと無事を喜びあった。
line = "あの後、精神世界から現実へと戻ってきた俺たちは、熱が下がり目覚めたフニと無事を喜びあった。"

[[dialogue]]
speaker = "unk"
# 翌日から、再びクリスマスに向けての準備を再開。ブレスレット作りの予定がずれ込んで、夜遅くまで作業することになってしまう日が出つつも――
line = "翌日から、再びクリスマスに向けての準備を再開。ブレスレット作りの予定がずれ込んで、夜遅くまで作業することになってしまう日が出つつも――"

[[dialogue]]
speaker = "セシア"
# 「終わったわ……」
line = "「終わったわ……」"

[[dialogue]]
speaker = "セシア"
# 「手作りブレスレット、最後の１つ――出来上がりよ」
line = "「手作りブレスレット、最後の１つ――出来上がりよ」"

[[dialogue]]
speaker = "ルルカ"
# 「やったぁぁぁ！　前日だけど、間に合った～！」
line = "「やったぁぁぁ！　前日だけど、間に合った～！」"

[[dialogue]]
speaker = "unk"
# みんな、お疲れ！
line = "みんな、お疲れ！"

[[dialogue]]
speaker = "フェニエル"
# 「達成感がなまらすごいです！　これで明日の本番を迎えられますね！」
line = "「達成感がなまらすごいです！　これで明日の本番を迎えられますね！」"

[[dialogue]]
speaker = "unk"
# そうして迎えた、クリスマス当日――
line = "そうして迎えた、クリスマス当日――"

[[dialogue]]
speaker = "セシア"
# 「フォッフォッフォ♪　メリークリスマスじゃよ♪」
line = "「フォッフォッフォ♪　メリークリスマスじゃよ♪」"

[[dialogue]]
speaker = "ルルカ"
# 「メリ～クリスマス！　キラキラプレゼントだよ♪」
line = "「メリ～クリスマス！　キラキラプレゼントだよ♪」"

[[dialogue]]
speaker = "フェニエル"
# 「みなさん、メリークリスマスですっ。心を込めて作りました♪」
line = "「みなさん、メリークリスマスですっ。心を込めて作りました♪」"

[[dialogue]]
speaker = "セシア"
# 「グラスはみんな持ったかしら？　それじゃあ――」
line = "「グラスはみんな持ったかしら？　それじゃあ――」"

[[dialogue]]
speaker = "セシア"
# 「プレゼント配り、お疲れさま。カンパ～イ♪」
line = "「プレゼント配り、お疲れさま。カンパ～イ♪」"

[[dialogue]]
speaker = "３人"
# 「カンパ～イ♪」
line = "「カンパ～イ♪」"

[[dialogue]]
speaker = "unk"
# 手分けして学園の人たち全員に手作りブレスレットを配り終えた後、俺たちはジュースの入ったグラスで乾杯する。
line = "手分けして学園の人たち全員に手作りブレスレットを配り終えた後、俺たちはジュースの入ったグラスで乾杯する。"

[[dialogue]]
speaker = "ルルカ"
# 「んっ……ぷは～っ♪　仕事終わりの一杯が美味し～♪」
line = "「んっ……ぷは～っ♪　仕事終わりの一杯が美味し～♪」"

[[dialogue]]
speaker = "ルルカ"
# 「サンタになるのはドキドキしたけど、みんなプレゼントを受け取って喜んでくれたよ♪」
line = "「サンタになるのはドキドキしたけど、みんなプレゼントを受け取って喜んでくれたよ♪」"

[[dialogue]]
speaker = "フェニエル"
# 「プレゼントの包装、可愛かったですしね♪」
line = "「プレゼントの包装、可愛かったですしね♪」"

[[dialogue]]
speaker = "セシア"
# 「そこだけはちょっとズルをして、クリスマスフォームの能力を使っちゃったわ」
line = "「そこだけはちょっとズルをして、クリスマスフォームの能力を使っちゃったわ」"

[[dialogue]]
speaker = "ルルカ"
# 「プレゼント作るのに必死で、忘れちゃってたしね～。あはは♪」
line = "「プレゼント作るのに必死で、忘れちゃってたしね～。あはは♪」"

[[dialogue]]
speaker = "フェニエル"
# 「ふふっ♪　でも、メリークリスマスの気持ちは、みなさんに伝わったと思います」
line = "「ふふっ♪　でも、メリークリスマスの気持ちは、みなさんに伝わったと思います」"

[[dialogue]]
speaker = "ルルカ"
# 「うん♪　カフェテリアにいる生徒のみんな――たくさんの人たちがブレスレットを付けてくれてるもんね！」
line = "「うん♪　カフェテリアにいる生徒のみんな――たくさんの人たちがブレスレットを付けてくれてるもんね！」"

[[dialogue]]
speaker = "セシア"
# 「ええ。実際に見ると……すごく嬉しいわ♪」
line = "「ええ。実際に見ると……すごく嬉しいわ♪」"

[[dialogue]]
speaker = "フェニエル"
# 「あの、セシアちゃん」
line = "「あの、セシアちゃん」"

[[dialogue]]
speaker = "セシア"
# 「うん？　どうしたの、フニ？」
line = "「うん？　どうしたの、フニ？」"

[[dialogue]]
speaker = "フェニエル"
# 「改めて、この前は助けてくれて、ありがとうございました」
line = "「改めて、この前は助けてくれて、ありがとうございました」"

[[dialogue]]
speaker = "フェニエル"
# 「私とホウちゃんが今一緒にいられるのは、セシアちゃんがあの時、私の願いを叶えようと頑張ってくれたおかげです」
line = "「私とホウちゃんが今一緒にいられるのは、セシアちゃんがあの時、私の願いを叶えようと頑張ってくれたおかげです」"

[[dialogue]]
speaker = "セシア"
# 「だって、フニは友達だもの。友達が必死に頑張ろうとしてるなら、それを手助けしたくなるのは当然でしょう？」
line = "「だって、フニは友達だもの。友達が必死に頑張ろうとしてるなら、それを手助けしたくなるのは当然でしょう？」"

[[dialogue]]
speaker = "セシア"
# 「それに――新しく見つけたホウちゃんママを失うのは、世界にとっての損失よ。ふふっ♪」
line = "「それに――新しく見つけたホウちゃんママを失うのは、世界にとっての損失よ。ふふっ♪」"

[[dialogue]]
speaker = "フェニエル"
# 「セシアちゃんらしいですね♪　だけど私は今日、ちゃんと伝えたかったんです――」
line = "「セシアちゃんらしいですね♪　だけど私は今日、ちゃんと伝えたかったんです――」"

[[dialogue]]
speaker = "unk"
# そう言うと、フニはセシアに微笑んで……
line = "そう言うと、フニはセシアに微笑んで……"

[[dialogue]]
speaker = "フェニエル"
# 「ありがとうございます、サンタさん♪　私に、最高のプレゼントくれて……！」
line = "「ありがとうございます、サンタさん♪　私に、最高のプレゼントくれて……！」"

[[dialogue]]
speaker = "セシア"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "セシア"
# 「ふふっ、どう致しまして♪」
line = "「ふふっ、どう致しまして♪」"

[[dialogue]]
speaker = "セシア"
# 「その言葉が、わたくしにとって最高のプレゼントだわ♪」
line = "「その言葉が、わたくしにとって最高のプレゼントだわ♪」"

[[dialogue]]
speaker = "フェニエル"
# 「あと、あの……もう１つあって――」
line = "「あと、あの……もう１つあって――」"

[[dialogue]]
speaker = "フェニエル"
# 「その……私もセシアちゃんのこと……『セッシーちゃん』って、呼んでもいいですか……？」
line = "「その……私もセシアちゃんのこと……『セッシーちゃん』って、呼んでもいいですか……？」"

[[dialogue]]
speaker = "セシア"
# 「あ……！」
line = "「あ……！」"

[[dialogue]]
speaker = "セシア"
# 「やっと、愛称で呼んでくれたわね、フニ。わたくし、嬉しいわ♪」
line = "「やっと、愛称で呼んでくれたわね、フニ。わたくし、嬉しいわ♪」"

[[dialogue]]
speaker = "フェニエル"
# 「えへへ♪　じゃあ、セッシーちゃん♪」
line = "「えへへ♪　じゃあ、セッシーちゃん♪」"

[[dialogue]]
speaker = "セシア"
# 「はい♪　これからもっと、仲良くしましょう、フニ。ふふふっ♪」
line = "「はい♪　これからもっと、仲良くしましょう、フニ。ふふふっ♪」"

[[dialogue]]
speaker = "ルルカ"
# 「――じゃあ、フニちゃんといい感じになったところで、次はあたしの番かな～？」
line = "「――じゃあ、フニちゃんといい感じになったところで、次はあたしの番かな～？」"

[[dialogue]]
speaker = "セシア"
# 「ルルカ？」
line = "「ルルカ？」"

[[dialogue]]
speaker = "ルルカ"
# 「ちょっと能力を使うね♪　えいっ」
line = "「ちょっと能力を使うね♪　えいっ」"

[[dialogue]]
speaker = "unk"
# そうしてルルカのマイクが光ったかと思うと――
line = "そうしてルルカのマイクが光ったかと思うと――"

[[dialogue]]
speaker = "unk"
# 俺たちは隣の大聖堂へと移動していた。
line = "俺たちは隣の大聖堂へと移動していた。"

[[dialogue]]
speaker = "unk"
# だが、それにしては妙だ。クリスマスで礼拝に来ているヒトがもっと居てもいいはずなのに、俺たち以外には人影がなかった。
line = "だが、それにしては妙だ。クリスマスで礼拝に来ているヒトがもっと居てもいいはずなのに、俺たち以外には人影がなかった。"

[[dialogue]]
speaker = "セシア"
# 「ここは大聖堂……？ いえ、それを模して作られた、仮想空間かしら？」
line = "「ここは大聖堂……？ いえ、それを模して作られた、仮想空間かしら？」"

[[dialogue]]
speaker = "ルルカ"
# 「うん、正解♪　あたしのクリスマスフォームの能力で再現したんだ」
line = "「うん、正解♪　あたしのクリスマスフォームの能力で再現したんだ」"

[[dialogue]]
speaker = "ルルカ"
# 「あたしからも、渡したいクリスマスプレゼントがあってね」
line = "「あたしからも、渡したいクリスマスプレゼントがあってね」"

[[dialogue]]
speaker = "ルルカ"
# 「それじゃあ、コホン――」
line = "「それじゃあ、コホン――」"

[[dialogue]]
speaker = "ルルカ"
# 「今日もキュー、キュー、キューッとおはドルフィン☆」
line = "「今日もキュー、キュー、キューッとおはドルフィン☆」"

[[dialogue]]
speaker = "ルルカ"
# 「お兄ちゃんお姉ちゃんたちの可愛い妹アイドル、汐ルカルカだよ♪」
line = "「お兄ちゃんお姉ちゃんたちの可愛い妹アイドル、汐ルカルカだよ♪」"

[[dialogue]]
speaker = "ルルカ"
# 「今日は待ちに待ったクリスマス！　ということで、覚えてくれてるよね？」
line = "「今日は待ちに待ったクリスマス！　ということで、覚えてくれてるよね？」"

[[dialogue]]
speaker = "ルルカ"
# 「前に言ってたクリスマスソングが、ついに完成しました～！」
line = "「前に言ってたクリスマスソングが、ついに完成しました～！」"

[[dialogue]]
speaker = "ルルカ"
# 「ということで、ここにいるお兄ちゃんお姉ちゃんたちには、一足先に独占ライブで披露しちゃうよ～！　ドンドン、パフパフ～♪」
line = "「ということで、ここにいるお兄ちゃんお姉ちゃんたちには、一足先に独占ライブで披露しちゃうよ～！　ドンドン、パフパフ～♪」"

[[dialogue]]
speaker = "フェニエル"
# 「わぁ♪」
line = "「わぁ♪」"

[[dialogue]]
speaker = "セシア"
# 「これは……ふふっ♪　嬉しいサプライズプレゼントね♪」
line = "「これは……ふふっ♪　嬉しいサプライズプレゼントね♪」"

[[dialogue]]
speaker = "ルルカ"
# 「では――あたしに家族への感謝の気持ちを教えてくれた、セッシーちゃん、フニちゃんに！」
line = "「では――あたしに家族への感謝の気持ちを教えてくれた、セッシーちゃん、フニちゃんに！」"

[[dialogue]]
speaker = "ルルカ"
# 「そして、いつもルルカの応援をしてくれるお兄ちゃんに！」
line = "「そして、いつもルルカの応援をしてくれるお兄ちゃんに！」"

[[dialogue]]
speaker = "ルルカ"
# 「心からの感謝と愛を込めて！　曲のタイトルは――」
line = "「心からの感謝と愛を込めて！　曲のタイトルは――」"

[[dialogue]]
speaker = "ルルカ"
# 「『妹からのＭｅｒｒｙ Ｌｏｖｅ』！」
line = "「『妹からのＭｅｒｒｙ Ｌｏｖｅ』！」"

[[dialogue]]
speaker = "unk"
# そうして、ルルカの綺麗な歌声が、大聖堂の中だけでなく俺たちの心にまで、深く響き渡るのだった――
line = "そうして、ルルカの綺麗な歌声が、大聖堂の中だけでなく俺たちの心にまで、深く響き渡るのだった――"
