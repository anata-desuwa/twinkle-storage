[[dialogue]]
speaker = "unk"
# 第１話,私たち結婚しました！？,P
line = "第１話,私たち結婚しました！？,P"

[[dialogue]]
speaker = "梨緒"
# 「２人とも、忙しいのに呼びつけてすまない。君たちに確認したいことがあったんだ」
line = "「２人とも、忙しいのに呼びつけてすまない。君たちに確認したいことがあったんだ」"

[[dialogue]]
speaker = "unk"
# 緊張感を漂わせる梨緒。彼女は選挙管理員会として、俺が星徒会長として相応しいか、常日頃から監視している。
line = "緊張感を漂わせる梨緒。彼女は選挙管理員会として、俺が星徒会長として相応しいか、常日頃から監視している。"

[[dialogue]]
speaker = "unk"
# その呼び出しとあっては、こちらも居住まいを正さざるを得ない。
line = "その呼び出しとあっては、こちらも居住まいを正さざるを得ない。"

[[dialogue]]
speaker = "梨緒"
# 「単刀直入に聞こう…………君たちは、結婚しているのか？」
line = "「単刀直入に聞こう…………君たちは、結婚しているのか？」"

[[dialogue]]
speaker = "フィオナ"
# 「け、けけけけっ！？」
line = "「け、けけけけっ！？」"

[[dialogue]]
speaker = "unk"
# 落ち着いて、フィオナ
line = "落ち着いて、フィオナ"

[[dialogue]]
speaker = "フィオナ"
# 「すー、はー…………いえ、私たちはいたって普通の関係です。婚姻関係ではありません。キリッ」
line = "「すー、はー…………いえ、私たちはいたって普通の関係です。婚姻関係ではありません。キリッ」"

[[dialogue]]
speaker = "フィオナ"
# 「えっと、その……どうして私たちが結婚していると思われたんですか？」
line = "「えっと、その……どうして私たちが結婚していると思われたんですか？」"

[[dialogue]]
speaker = "梨緒"
# 「どうしてと言われても……君が私と一緒に出撃するとき、だいたいウェディングドレスじゃないか？」
line = "「どうしてと言われても……君が私と一緒に出撃するとき、だいたいウェディングドレスじゃないか？」"

[[dialogue]]
speaker = "フィオナ"
# 「はうっ！？」
line = "「はうっ！？」"

[[dialogue]]
speaker = "フィオナ"
# 「こほん……私は複数の戦闘服を持っています。ウェディングドレスの選択が多いのは、たまたま梨緒さんの星術と相性がいいからです」
line = "「こほん……私は複数の戦闘服を持っています。ウェディングドレスの選択が多いのは、たまたま梨緒さんの星術と相性がいいからです」"

[[dialogue]]
speaker = "フィオナ"
# 「ウェディングドレスはあくまで戦闘服で、実際に結婚したわけではなく……星力の暴走と私の『結婚っていいな』欲が合わさって生まれた偶発的なもので──」
line = "「ウェディングドレスはあくまで戦闘服で、実際に結婚したわけではなく……星力の暴走と私の『結婚っていいな』欲が合わさって生まれた偶発的なもので──」"

[[dialogue]]
speaker = "フィオナ"
# 「その言い方もうやめてもらっていいですか！？」
line = "「その言い方もうやめてもらっていいですか！？」"

[[dialogue]]
speaker = "梨緒"
# 「私は何も言ってないぞ！？」
line = "「私は何も言ってないぞ！？」"

[[dialogue]]
speaker = "unk"
# 見事な自爆……
line = "見事な自爆……"

[[dialogue]]
speaker = "フィオナ"
# 「私と緋宮会長は星徒会長同士、連携のために親睦を深めているのは事実です。しかし、決してやましい関係では……」
line = "「私と緋宮会長は星徒会長同士、連携のために親睦を深めているのは事実です。しかし、決してやましい関係では……」"

[[dialogue]]
speaker = "梨緒"
# 「今の私は、星見家に世話になっている身だ。そして、学園にいる間は選挙管理委員会として会長を監視している」
line = "「今の私は、星見家に世話になっている身だ。そして、学園にいる間は選挙管理委員会として会長を監視している」"

[[dialogue]]
speaker = "梨緒"
# 「常にどちらかと行動を共にしているから、さすがにただならぬ関係であることは分かるさ」
line = "「常にどちらかと行動を共にしているから、さすがにただならぬ関係であることは分かるさ」"

[[dialogue]]
speaker = "梨緒"
# 「時間さえあればお互いの顔を見に行くし、お昼はいつも一緒だし、なんならあーんしているところも見た」
line = "「時間さえあればお互いの顔を見に行くし、お昼はいつも一緒だし、なんならあーんしているところも見た」"

[[dialogue]]
speaker = "梨緒"
# 「ズバリ、君たちは相思相愛の新婚カップルと見た！」
line = "「ズバリ、君たちは相思相愛の新婚カップルと見た！」"

[[dialogue]]
speaker = "フィオナ"
# 「きゃーーーーっ！？」
line = "「きゃーーーーっ！？」"

[[dialogue]]
speaker = "梨緒"
# 「忙しくて会えない日なんかは、『緋宮会長が今日何をしていたかレポート』をねだられるくらいだ」
line = "「忙しくて会えない日なんかは、『緋宮会長が今日何をしていたかレポート』をねだられるくらいだ」"

[[dialogue]]
speaker = "フィオナ"
# 「ぐはっ！？」
line = "「ぐはっ！？」"

[[dialogue]]
speaker = "unk"
# そうなの？
line = "そうなの？"

[[dialogue]]
speaker = "フィオナ"
# 「…………はい。だって会えないと寂しくて……」
line = "「…………はい。だって会えないと寂しくて……」"

[[dialogue]]
speaker = "フィオナ"
# 「もう、梨緒さん、あんまりからかわないでください。まるで私が幸せのあまりウェディングドレスを見せびらかして、四六時中イチャイチャしている女みたいじゃないですか」
line = "「もう、梨緒さん、あんまりからかわないでください。まるで私が幸せのあまりウェディングドレスを見せびらかして、四六時中イチャイチャしている女みたいじゃないですか」"

[[dialogue]]
speaker = "梨緒"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# …………
line = "…………"

[[dialogue]]
speaker = "フィオナ"
# 「何か言ってください！　私ホントにそう見えているんですか！？」
line = "「何か言ってください！　私ホントにそう見えているんですか！？」"

[[dialogue]]
speaker = "アポロ"
# 「ふっ、面白そうな話をしてるじゃないか」
line = "「ふっ、面白そうな話をしてるじゃないか」"

[[dialogue]]
speaker = "フィオナ"
# 「姉さん！」
line = "「姉さん！」"

[[dialogue]]
speaker = "アポロ"
# 「盗み聞きするつもりはなかったんだが、可愛い妹の悲鳴が聞こえて、ついな」
line = "「盗み聞きするつもりはなかったんだが、可愛い妹の悲鳴が聞こえて、ついな」"

[[dialogue]]
speaker = "アポロ"
# 「おい梨緒、勝手にうちの妹をイジめるんじゃない」
line = "「おい梨緒、勝手にうちの妹をイジめるんじゃない」"

[[dialogue]]
speaker = "フィオナ"
# 「姉さん……」
line = "「姉さん……」"

[[dialogue]]
speaker = "アポロ"
# 「そういう話をするなら、あたしも呼べ！」
line = "「そういう話をするなら、あたしも呼べ！」"

[[dialogue]]
speaker = "フィオナ"
# 「姉さんっ！」
line = "「姉さんっ！」"

[[dialogue]]
speaker = "アポロ"
# 「だって、知らない間に妹がウェディングドレス着てたら、誰だってビックリするだろ～？」
line = "「だって、知らない間に妹がウェディングドレス着てたら、誰だってビックリするだろ～？」"

[[dialogue]]
speaker = "アポロ"
# 「あの甘えんぼのエリシアが結婚とはなー」
line = "「あの甘えんぼのエリシアが結婚とはなー」"

[[dialogue]]
speaker = "フィオナ"
# 「姉さんまで！　だからまだ結婚してません！」
line = "「姉さんまで！　だからまだ結婚してません！」"

[[dialogue]]
speaker = "梨緒"
# 「まだ、か。つまり、将来的には予定があるということだな」
line = "「まだ、か。つまり、将来的には予定があるということだな」"

[[dialogue]]
speaker = "フィオナ"
# 「緋宮会長～！　梨緒さんがイジワルです～！」
line = "「緋宮会長～！　梨緒さんがイジワルです～！」"

[[dialogue]]
speaker = "梨緒"
# 「不躾なことを聞いて悪かった。……私は会長の敵になるかもしれない人間だが、君のことも友人だと思っている。だから２人がどれだけ近しいか確認しておきたかったんだ」
line = "「不躾なことを聞いて悪かった。……私は会長の敵になるかもしれない人間だが、君のことも友人だと思っている。だから２人がどれだけ近しいか確認しておきたかったんだ」"

[[dialogue]]
speaker = "梨緒"
# 「君がそばにいれば、安心できる気がする。会長が世界を滅ぼす魔王に堕ちないよう、その愛で支えてやってほしい」
line = "「君がそばにいれば、安心できる気がする。会長が世界を滅ぼす魔王に堕ちないよう、その愛で支えてやってほしい」"

[[dialogue]]
speaker = "フィオナ"
# 「ええ、もちろん。私は緋宮会長を愛しています。世界を滅ぼさせたりなんてしません」
line = "「ええ、もちろん。私は緋宮会長を愛しています。世界を滅ぼさせたりなんてしません」"

[[dialogue]]
speaker = "梨緒"
# 「全ての問題が解決して、二人が本当に式を挙げるとき…………私も式に参列してもいいだろうか？」
line = "「全ての問題が解決して、二人が本当に式を挙げるとき…………私も式に参列してもいいだろうか？」"

[[dialogue]]
speaker = "フィオナ"
# 「はい、必ず」
line = "「はい、必ず」"

[[dialogue]]
speaker = "梨緒"
# 「その日が来ることを、心から楽しみにしているよ」
line = "「その日が来ることを、心から楽しみにしているよ」"

[[dialogue]]
speaker = "アポロ"
# 「もちろんあたしも式に出るからな！」
line = "「もちろんあたしも式に出るからな！」"

[[dialogue]]
speaker = "フィオナ"
# 「……姉さんはしばらくグミ抜きです」
line = "「……姉さんはしばらくグミ抜きです」"

[[dialogue]]
speaker = "アポロ"
# 「ええ～っ！？」
line = "「ええ～っ！？」"

[[dialogue]]
speaker = "unk"
# フィオナを怒らせたアポロは、流星ライダーグミを許してもらうまで、しばらくかかったのだった。
line = "フィオナを怒らせたアポロは、流星ライダーグミを許してもらうまで、しばらくかかったのだった。"
