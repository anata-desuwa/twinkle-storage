[[dialogue]]
speaker = "unk"
# 第１話,あの日のお返し,P
line = "第１話,あの日のお返し,P"

[[dialogue]]
speaker = "unk"
# 先日、ネビュラのモンスターが逃げた一件。
line = "先日、ネビュラのモンスターが逃げた一件。"

[[dialogue]]
speaker = "unk"
# あの騒動で星徒会のお使いを果たせなかった俺は、また買い物に来ていた。
line = "あの騒動で星徒会のお使いを果たせなかった俺は、また買い物に来ていた。"

[[dialogue]]
speaker = "ウェンディ"
# 「こんにちは、会長さん」
line = "「こんにちは、会長さん」"

[[dialogue]]
speaker = "unk"
# ウェンディ！？
line = "ウェンディ！？"

[[dialogue]]
speaker = "ウェンディ"
# 「そんなに驚かないでください。今日は厄介ごとを持ち込みにきたわけじゃないんですから」
line = "「そんなに驚かないでください。今日は厄介ごとを持ち込みにきたわけじゃないんですから」"

[[dialogue]]
speaker = "unk"
# 忙しいんじゃないのか？
line = "忙しいんじゃないのか？"

[[dialogue]]
speaker = "ウェンディ"
# 「ええ……さすがに２０％の活動費増ですからね……」
line = "「ええ……さすがに２０％の活動費増ですからね……」"

[[dialogue]]
speaker = "ウェンディ"
# 「その代わり、セドナ長官は資金関係以外の仕事が来ないよう配慮してくれました。……単に信用がなくて仕事を任せられないだけかもしれませんが」
line = "「その代わり、セドナ長官は資金関係以外の仕事が来ないよう配慮してくれました。……単に信用がなくて仕事を任せられないだけかもしれませんが」"

[[dialogue]]
speaker = "ウェンディ"
# 「まぁ、なんとかやってみせます。長官の信頼を取り戻さないといけませんからね」
line = "「まぁ、なんとかやってみせます。長官の信頼を取り戻さないといけませんからね」"

[[dialogue]]
speaker = "ウェンディ"
# 「会長さんは何のご用事で？　……星徒会の買い物？　ああ、先日は私が邪魔したから買い物ができなかったんですね。すみません……」
line = "「会長さんは何のご用事で？　……星徒会の買い物？　ああ、先日は私が邪魔したから買い物ができなかったんですね。すみません……」"

[[dialogue]]
speaker = "ウェンディ"
# 「ですが、それなら星徒会の方々と来ればよかったのでは？」
line = "「ですが、それなら星徒会の方々と来ればよかったのでは？」"

[[dialogue]]
speaker = "アナ"
# 「先日のアステラ同時発生の一件、会長も現場にいたのですね」
line = "「先日のアステラ同時発生の一件、会長も現場にいたのですね」"

[[dialogue]]
speaker = "サーシャ"
# 「モンスターがたくさん出て大変だったけど、魔女の人たちがモンスターを蹴散らしたって聞いたわ～。やっぱりセドナさんって強いのね～」
line = "「モンスターがたくさん出て大変だったけど、魔女の人たちがモンスターを蹴散らしたって聞いたわ～。やっぱりセドナさんって強いのね～」"

[[dialogue]]
speaker = "ヴィーナス"
# 「もう、そこは星徒会長がバシッと決めないと！　手柄を魔女に取られちゃダメなんだから！」
line = "「もう、そこは星徒会長がバシッと決めないと！　手柄を魔女に取られちゃダメなんだから！」"

[[dialogue]]
speaker = "マトイ"
# 「まぁまぁ、本当なら私たちも一緒に行ってたわけだしね。むしろ会長には申し訳ないというか」
line = "「まぁまぁ、本当なら私たちも一緒に行ってたわけだしね。むしろ会長には申し訳ないというか」"

[[dialogue]]
speaker = "マトイ"
# 「そうだ、今度こそ星徒会のみんなで行こうよ。リベンジじゃないけどさ」
line = "「そうだ、今度こそ星徒会のみんなで行こうよ。リベンジじゃないけどさ」"

[[dialogue]]
speaker = "ウェンディ"
# 「でもまた他の人は用事が入ってしまったと。私が言うのもなんですけど……会長さん、呪われてるんですか？」
line = "「でもまた他の人は用事が入ってしまったと。私が言うのもなんですけど……会長さん、呪われてるんですか？」"

[[dialogue]]
speaker = "ウェンディ"
# 「ですがそれならちょうどよかったです。私も似たような用事でしたので」
line = "「ですがそれならちょうどよかったです。私も似たような用事でしたので」"

[[dialogue]]
speaker = "ウェンディ"
# 「星徒会の買い物って文房具やお茶菓子なんかでしょう？　私も仕事に使っているのがありますから、おすすめを紹介しますよ」
line = "「星徒会の買い物って文房具やお茶菓子なんかでしょう？　私も仕事に使っているのがありますから、おすすめを紹介しますよ」"

[[dialogue]]
speaker = "ウェンディ"
# 「言ったでしょう、私個人でできることならしますよって。それくらいで先日の埋め合わせになるとは思ってませんけど」
line = "「言ったでしょう、私個人でできることならしますよって。それくらいで先日の埋め合わせになるとは思ってませんけど」"

[[dialogue]]
speaker = "unk"
# じゃあお願いするよ
line = "じゃあお願いするよ"

[[dialogue]]
speaker = "ウェンディ"
# 「ええ、ではさっそく行きましょうか」
line = "「ええ、ではさっそく行きましょうか」"

[[dialogue]]
speaker = "ウェンディ"
# 「ペンなら……これがおすすめです。若干値段が高く感じられますが、書き心地がなめらかで、インクも長持ちします。価格以上の品質があります」
line = "「ペンなら……これがおすすめです。若干値段が高く感じられますが、書き心地がなめらかで、インクも長持ちします。価格以上の品質があります」"

[[dialogue]]
speaker = "ウェンディ"
# 「値段につられて安物買いの銭失いになっていけませんよ」
line = "「値段につられて安物買いの銭失いになっていけませんよ」"

[[dialogue]]
speaker = "ウェンディ"
# 「あ、領収書はちゃんともらいましたか？　レシートでも構わないですが、購入した品物、場所、日時、金額がわかるものが必要です」
line = "「あ、領収書はちゃんともらいましたか？　レシートでも構わないですが、購入した品物、場所、日時、金額がわかるものが必要です」"

[[dialogue]]
speaker = "ウェンディ"
# 「会長さんのような善良な人にはピンと来ないかもしれませんが、証拠がないと簡単に不正ができてしまうんです」
line = "「会長さんのような善良な人にはピンと来ないかもしれませんが、証拠がないと簡単に不正ができてしまうんです」"

[[dialogue]]
speaker = "ウェンディ"
# 「たとえば１００テルスのお菓子を買ったのに、１００テルスのペンを買ったと申告したりですね」
line = "「たとえば１００テルスのお菓子を買ったのに、１００テルスのペンを買ったと申告したりですね」"

[[dialogue]]
speaker = "ウェンディ"
# 「ちなみにくしゃくしゃになったレシートを後でまとめて出すのはＮＧです。万死に値します」
line = "「ちなみにくしゃくしゃになったレシートを後でまとめて出すのはＮＧです。万死に値します」"

[[dialogue]]
speaker = "ウェンディ"
# 「あと、書類をまとめるファイルならこれがおすすめです。今は書類もデータが多いですが、紙もまだ使われているでしょう」
line = "「あと、書類をまとめるファイルならこれがおすすめです。今は書類もデータが多いですが、紙もまだ使われているでしょう」"

[[dialogue]]
speaker = "ウェンディ"
# 「オフィスならチェアーもマストですが、星徒会ではそこまで必要ないでしょう。星徒会の予算で買えるものでもありませんしね」
line = "「オフィスならチェアーもマストですが、星徒会ではそこまで必要ないでしょう。星徒会の予算で買えるものでもありませんしね」"

[[dialogue]]
speaker = "ウェンディ"
# 「お茶菓子は──あ」
line = "「お茶菓子は──あ」"

[[dialogue]]
speaker = "unk"
# どうかした？
line = "どうかした？"

[[dialogue]]
speaker = "ウェンディ"
# 「ほらあそこ、プリンで有名なお店なんです。期間限定クリームチーズプリン……うぅ、気になります……」
line = "「ほらあそこ、プリンで有名なお店なんです。期間限定クリームチーズプリン……うぅ、気になります……」"

[[dialogue]]
speaker = "ウェンディ"
# 「買えばいいのに……ってそんなに簡単に言わないでください。油断したらすぐに肉が付くって言ったじゃないですか」
line = "「買えばいいのに……ってそんなに簡単に言わないでください。油断したらすぐに肉が付くって言ったじゃないですか」"

[[dialogue]]
speaker = "ウェンディ"
# 「気にしなくていいとか、我慢は体に悪いとか、他人事だからそんなことが言えるんです」
line = "「気にしなくていいとか、我慢は体に悪いとか、他人事だからそんなことが言えるんです」"

[[dialogue]]
speaker = "ウェンディ"
# 「タイツでごまかしてますが、今のスカートだってちょっときつくて……以前だってスカートを破きかけたことが……」
line = "「タイツでごまかしてますが、今のスカートだってちょっときつくて……以前だってスカートを破きかけたことが……」"

[[dialogue]]
speaker = "ウェンディ"
# 「あ」
line = "「あ」"

[[dialogue]]
speaker = "ウェンディ"
# 「コホン。男性の前ではしたない話をしてしまいました。申し訳ありません」
line = "「コホン。男性の前ではしたない話をしてしまいました。申し訳ありません」"

[[dialogue]]
speaker = "unk"
# いいものを食べていい仕事をすればいい
line = "いいものを食べていい仕事をすればいい"

[[dialogue]]
speaker = "ウェンディ"
# 「──！」
line = "「──！」"

[[dialogue]]
speaker = "ウェンディ"
# 「そう、今は激務……脳を動かすのに糖分が必要……つまりネビュラとセドナ長官のため……」
line = "「そう、今は激務……脳を動かすのに糖分が必要……つまりネビュラとセドナ長官のため……」"

[[dialogue]]
speaker = "ウェンディ"
# 「そうですね、今は私が太る太らないなんて些末なこと。パフォーマンス向上のために必要なら仕方ないですね！」
line = "「そうですね、今は私が太る太らないなんて些末なこと。パフォーマンス向上のために必要なら仕方ないですね！」"

[[dialogue]]
speaker = "unk"
# 俺も星徒会のみんなにプリンを買って帰ると、とても好評だった。
line = "俺も星徒会のみんなにプリンを買って帰ると、とても好評だった。"

[[dialogue]]
speaker = "unk"
# しかしウェンディの体重は順調に増加し、彼女の悩みはさらに重みを増すのであった──
line = "しかしウェンディの体重は順調に増加し、彼女の悩みはさらに重みを増すのであった──"
