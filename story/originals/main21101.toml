[[dialogue]]
speaker = "unk"
# 第１話,ジグの企み,B
line = "第１話,ジグの企み,B"

[[dialogue]]
speaker = "梨緒"
# 「女神の神殿を、聖庭園に衝突させる……だと！？」
line = "「女神の神殿を、聖庭園に衝突させる……だと！？」"

[[dialogue]]
speaker = "ナターシャ"
# 「そんなことできるの？　聖庭園でも神殿の機能を全部把握してるわけじゃないけど……」
line = "「そんなことできるの？　聖庭園でも神殿の機能を全部把握してるわけじゃないけど……」"

[[dialogue]]
speaker = "ジグ"
# 「この神殿の奥はコントロールルームになっていてね、魔王たちと極星星徒会が戦っている間に掌握させてもらったんだ」
line = "「この神殿の奥はコントロールルームになっていてね、魔王たちと極星星徒会が戦っている間に掌握させてもらったんだ」"

[[dialogue]]
speaker = "ジグ"
# 「神殿は普段、天界の空を周回しているけど、聖庭園にぶつかるように軌道を変えた」
line = "「神殿は普段、天界の空を周回しているけど、聖庭園にぶつかるように軌道を変えた」"

[[dialogue]]
speaker = "ジグ"
# 「このまま神殿が聖庭園に激突すれば、神殿は破壊され、聖庭園ともども天使と天界は消え失せる」
line = "「このまま神殿が聖庭園に激突すれば、神殿は破壊され、聖庭園ともども天使と天界は消え失せる」"

[[dialogue]]
speaker = "ジグ"
# 「どうだい？　普通に神殿を壊すより愉快だろう？」
line = "「どうだい？　普通に神殿を壊すより愉快だろう？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ぜんっぜん愉快じゃないわよ！」
line = "「ぜんっぜん愉快じゃないわよ！」"

[[dialogue]]
speaker = "unk"
# グレイスを倒した俺たちの前に、突如現れたリクリエの使徒・ジグ。
line = "グレイスを倒した俺たちの前に、突如現れたリクリエの使徒・ジグ。"

[[dialogue]]
speaker = "unk"
# 彼女はその内容とは裏腹な軽い口調で、危機はまだ続いているのだと宣告する。
line = "彼女はその内容とは裏腹な軽い口調で、危機はまだ続いているのだと宣告する。"

[[dialogue]]
speaker = "グレイス"
# 「彼女は何者ですか！？」
line = "「彼女は何者ですか！？」"

[[dialogue]]
speaker = "ナターシャ"
# 「ベガから来たリクリエの使徒だよ。まぁ、あれはアルタイルにとってもデネブにとっても敵なんじゃないかな」
line = "「ベガから来たリクリエの使徒だよ。まぁ、あれはアルタイルにとってもデネブにとっても敵なんじゃないかな」"

[[dialogue]]
speaker = "グレイス"
# 「リクリエの使徒──！？」
line = "「リクリエの使徒──！？」"

[[dialogue]]
speaker = "unk"
# ジグと初めて遭遇したグレイスだが、ナターシャの言葉を聞いて顔色を変える。
line = "ジグと初めて遭遇したグレイスだが、ナターシャの言葉を聞いて顔色を変える。"

[[dialogue]]
speaker = "ジグ"
# 「今もこの神殿は聖庭園に向かっている。私が嘘を言っていないことは、自分の体で理解できるだろう？」
line = "「今もこの神殿は聖庭園に向かっている。私が嘘を言っていないことは、自分の体で理解できるだろう？」"

[[dialogue]]
speaker = "梨緒"
# 「くっ……！」
line = "「くっ……！」"

[[dialogue]]
speaker = "unk"
# さっきから地響きが止まらない。
line = "さっきから地響きが止まらない。"

[[dialogue]]
speaker = "unk"
# ジグの言う通り、これは神殿が本来の軌道を離れて聖庭園に向かっている証拠なのだろう。
line = "ジグの言う通り、これは神殿が本来の軌道を離れて聖庭園に向かっている証拠なのだろう。"

[[dialogue]]
speaker = "ジグ"
# 「止めたければ、神殿の奥に行くといい。もちろん私が相手になるけどね」
line = "「止めたければ、神殿の奥に行くといい。もちろん私が相手になるけどね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええ、ここであんたをぶっ飛ばして、神殿も止めさせてもらうわ！」
line = "「ええ、ここであんたをぶっ飛ばして、神殿も止めさせてもらうわ！」"

[[dialogue]]
speaker = "ジグ"
# 「威勢がいいね。だけど本当にできるのかい？」
line = "「威勢がいいね。だけど本当にできるのかい？」"

[[dialogue]]
speaker = "アポロ"
# 「ぐぐ……力が出ない……」
line = "「ぐぐ……力が出ない……」"

[[dialogue]]
speaker = "メルエル"
# 「ごめん、私もダメ……何が起こってるの……？」
line = "「ごめん、私もダメ……何が起こってるの……？」"

[[dialogue]]
speaker = "ジグ"
# 「この神殿の機能で、魔王の力を封じたんだよ。君たちの星力は、魔王因子を通して強制的に放出される」
line = "「この神殿の機能で、魔王の力を封じたんだよ。君たちの星力は、魔王因子を通して強制的に放出される」"

[[dialogue]]
speaker = "クロト"
# 「すまない、俺も力が……」
line = "「すまない、俺も力が……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それなら……！　あんなやつ、私１人でギッタンギッタンにしてやるんだから！」
line = "「それなら……！　あんなやつ、私１人でギッタンギッタンにしてやるんだから！」"

[[dialogue]]
speaker = "ジグ"
# 「ふぅん、どうやら君は魔王の因子が弱いようだね。怪我の功名、というやつかな」
line = "「ふぅん、どうやら君は魔王の因子が弱いようだね。怪我の功名、というやつかな」"

[[dialogue]]
speaker = "ヴィーナス"
# 「チクチクうるさいわね！　先手必勝よ！　チェンジ、ノヴァフォーム──！！」
line = "「チクチクうるさいわね！　先手必勝よ！　チェンジ、ノヴァフォーム──！！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「って、あれ！？　ノヴァフォームになれない！？」
line = "「って、あれ！？　ノヴァフォームになれない！？」"

[[dialogue]]
speaker = "クロト"
# 「下がれ、ヴィーナス！　影響は少なくても、封印は効いているみたいだ！」
line = "「下がれ、ヴィーナス！　影響は少なくても、封印は効いているみたいだ！」"

[[dialogue]]
speaker = "メルエル"
# （やっぱり魔王の力が原因……じゃあ同じように戦えなくなっている私も魔王なの……？）
line = "（やっぱり魔王の力が原因……じゃあ同じように戦えなくなっている私も魔王なの……？）"

[[dialogue]]
speaker = "グレイス"
# 「私がデネブで女神の神殿を探索した時はそんな機能ありませんでしたよ！　というかそんなのあったら私が勝ったんですが！」
line = "「私がデネブで女神の神殿を探索した時はそんな機能ありませんでしたよ！　というかそんなのあったら私が勝ったんですが！」"

[[dialogue]]
speaker = "ジグ"
# 「この神殿は２０００年前、悪しき魔王に狙われた。その教訓から、魔王の血族への対策がいくつか施されている」
line = "「この神殿は２０００年前、悪しき魔王に狙われた。その教訓から、魔王の血族への対策がいくつか施されている」"

[[dialogue]]
speaker = "ジグ"
# 「しかし未完成の部分もあってね。私がシステムをいじってさっき完成させたんだ」
line = "「しかし未完成の部分もあってね。私がシステムをいじってさっき完成させたんだ」"

[[dialogue]]
speaker = "ジグ"
# 「このシステムは、魔王の血族が持つ魔王因子を通じて、星力や魔力を強制的に放出させるものだよ」
line = "「このシステムは、魔王の血族が持つ魔王因子を通じて、星力や魔力を強制的に放出させるものだよ」"

[[dialogue]]
speaker = "グレイス"
# 「な……！？　リクリエの使徒はそんなことまでできるんですか！？」
line = "「な……！？　リクリエの使徒はそんなことまでできるんですか！？」"

[[dialogue]]
speaker = "ジグ"
# 「“真なる神”の力であれば、女神の神殿ごときを改造するなんて容易いことさ。まぁ、私自身の力も少し使わせてもらったけどね」
line = "「“真なる神”の力であれば、女神の神殿ごときを改造するなんて容易いことさ。まぁ、私自身の力も少し使わせてもらったけどね」"

[[dialogue]]
speaker = "ジグ"
# 「さて、どうするんだい、魔王？　私を倒さなければ、天使も天界も消滅してしまうよ」
line = "「さて、どうするんだい、魔王？　私を倒さなければ、天使も天界も消滅してしまうよ」"

[[dialogue]]
speaker = "クロト"
# （そうだ。こうしている間にも、天界の破滅は刻一刻と近づいている）
line = "（そうだ。こうしている間にも、天界の破滅は刻一刻と近づいている）"

[[dialogue]]
speaker = "unk"
# しかし俺は星力すらまともに使うことができず、ジグに戦って勝つのは絶望的。
line = "しかし俺は星力すらまともに使うことができず、ジグに戦って勝つのは絶望的。"

[[dialogue]]
speaker = "unk"
# 唯一使えるのは、俺の体に封印されたリクリエの力だが……
line = "唯一使えるのは、俺の体に封印されたリクリエの力だが……"

[[dialogue]]
speaker = "ジグ"
# 「君が考えていることを当ててあげるよ、魔王」
line = "「君が考えていることを当ててあげるよ、魔王」"

[[dialogue]]
speaker = "ジグ"
# 「星力すら使えない状態ではジグに勝てない。リクリエの力を使ったとしても、自分が先に倒れてしまう」
line = "「星力すら使えない状態ではジグに勝てない。リクリエの力を使ったとしても、自分が先に倒れてしまう」"

[[dialogue]]
speaker = "ジグ"
# 「ならどうすればいいか……そんなの簡単じゃないか」
line = "「ならどうすればいいか……そんなの簡単じゃないか」"

[[dialogue]]
speaker = "ジグ"
# 「ラクシスの力を使えばいい」
line = "「ラクシスの力を使えばいい」"

[[dialogue]]
speaker = "クロト"
# 「──！」
line = "「──！」"

[[dialogue]]
speaker = "ジグ"
# 「あれは魔王因子とは異なる、緋宮クロトだけに備わった力だ。神殿のシステムには阻害されないはずだよ」
line = "「あれは魔王因子とは異なる、緋宮クロトだけに備わった力だ。神殿のシステムには阻害されないはずだよ」"

[[dialogue]]
speaker = "クロト"
# （ラクシスの力は、世界を超える力。平行世界の可能性を呼び寄せることもできる）
line = "（ラクシスの力は、世界を超える力。平行世界の可能性を呼び寄せることもできる）"

[[dialogue]]
speaker = "クロト"
# （だが俺が逆に平行世界の可能性に浸食されることもありうる）
line = "（だが俺が逆に平行世界の可能性に浸食されることもありうる）"

[[dialogue]]
speaker = "クロト"
# （実際、俺はベガやデネブで敗北した緋宮クロトに引きずられ、暴走しそうになった）
line = "（実際、俺はベガやデネブで敗北した緋宮クロトに引きずられ、暴走しそうになった）"

[[dialogue]]
speaker = "unk"
# 今ヴィーナスが俺の中のラクシスの力を解放すれば、可能性に引っ張られて、俺までディザスターハンドに堕ちかねない。
line = "今ヴィーナスが俺の中のラクシスの力を解放すれば、可能性に引っ張られて、俺までディザスターハンドに堕ちかねない。"

[[dialogue]]
speaker = "クロト"
# 「神殿の奥に到達したのなら、そのまま神殿を破壊して天使を消滅させればよかったはずだ」
line = "「神殿の奥に到達したのなら、そのまま神殿を破壊して天使を消滅させればよかったはずだ」"

[[dialogue]]
speaker = "クロト"
# 「だけどそうしなかったということは、ジグの真の目的は──」
line = "「だけどそうしなかったということは、ジグの真の目的は──」"

[[dialogue]]
speaker = "ジグ"
# 「ああ、私もディザスターハンドが欲しくてね。君もベガの緋宮クロトのように、ディザスターハンドになってくれない？」
line = "「ああ、私もディザスターハンドが欲しくてね。君もベガの緋宮クロトのように、ディザスターハンドになってくれない？」"

[[dialogue]]
speaker = "梨緒"
# 「──！！」
line = "「──！！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ラクシスの力の封印は解かないわよ！　クロトをディザスターハンドになんて、絶対させないんだから！」
line = "「ラクシスの力の封印は解かないわよ！　クロトをディザスターハンドになんて、絶対させないんだから！」"

[[dialogue]]
speaker = "unk"
# ジグは天界の危機に乗じて、俺をディザスターハンドにしようとしている。
line = "ジグは天界の危機に乗じて、俺をディザスターハンドにしようとしている。"

[[dialogue]]
speaker = "unk"
# 思えば、以前俺にリクリエの力を注ぎ込み、暴走させようとしたのも、それが目的だったんだろう。
line = "思えば、以前俺にリクリエの力を注ぎ込み、暴走させようとしたのも、それが目的だったんだろう。"

[[dialogue]]
speaker = "ジグ"
# 「うかうかしていると、神殿が聖庭園にぶつかってしまうよ？　それでもいいのかい？」
line = "「うかうかしていると、神殿が聖庭園にぶつかってしまうよ？　それでもいいのかい？」"

[[dialogue]]
speaker = "ナターシャ"
# 「いいわけないでしょ。でもこの状況はかなりまずいなぁ……」
line = "「いいわけないでしょ。でもこの状況はかなりまずいなぁ……」"

[[dialogue]]
speaker = "アポロ"
# 「あたしが戦えたら……ぐ……すまん……」
line = "「あたしが戦えたら……ぐ……すまん……」"

[[dialogue]]
speaker = "unk"
# 俺やヴィーナス、アポロやメルエルはまともに戦うことができず、今の戦力ではジグに勝つどころか、時間を稼げるかすら怪しい。
line = "俺やヴィーナス、アポロやメルエルはまともに戦うことができず、今の戦力ではジグに勝つどころか、時間を稼げるかすら怪しい。"

[[dialogue]]
speaker = "ジグ"
# 「私としてはこのまま神殿がぶつかるのを待ってもいいんだけど……」
line = "「私としてはこのまま神殿がぶつかるのを待ってもいいんだけど……」"

[[dialogue]]
speaker = "ジグ"
# 「タイムリミットの前に、君たちを狩ってしまってもいいよね？」
line = "「タイムリミットの前に、君たちを狩ってしまってもいいよね？」"

[[dialogue]]
speaker = "クロト"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "unk"
# ジグが大剣を携えて、ゆっくりと俺に近づいてくる。
line = "ジグが大剣を携えて、ゆっくりと俺に近づいてくる。"

[[dialogue]]
speaker = "unk"
# だが今の俺に抵抗する力はなくて──
line = "だが今の俺に抵抗する力はなくて──"

[[dialogue]]
speaker = "スレイプニル"
# 「ブルルルッ！！」
line = "「ブルルルッ！！」"

[[dialogue]]
speaker = "グレイス"
# 「極星従騎！？　しかし私の手持ちは全て倒されたはずです……！」
line = "「極星従騎！？　しかし私の手持ちは全て倒されたはずです……！」"

[[dialogue]]
speaker = "unk"
# 俺たちとジグの間に割って入るように、馬型の極星従騎──スレイプニルが現れた。
line = "俺たちとジグの間に割って入るように、馬型の極星従騎──スレイプニルが現れた。"

[[dialogue]]
speaker = "クロト"
# （ジグの配下か……！？　いや、ジグが従えていたのは機械型モンスターのはず……）
line = "（ジグの配下か……！？　いや、ジグが従えていたのは機械型モンスターのはず……）"

[[dialogue]]
speaker = "チナ"
# 「何やってるか知らねえが、リクリエの使徒の好きにはさせないぞ！」
line = "「何やってるか知らねえが、リクリエの使徒の好きにはさせないぞ！」"

[[dialogue]]
speaker = "グレイス"
# 「チナ！？」
line = "「チナ！？」"
