[[dialogue]]
speaker = "unk"
# 第２話,熱戦？　休日チェス勝負！,P
line = "第２話,熱戦？　休日チェス勝負！,P"

[[dialogue]]
speaker = "unk"
# そして、翌日。
line = "そして、翌日。"

[[dialogue]]
speaker = "フラン"
# 「来たぜ、会長！」
line = "「来たぜ、会長！」"

[[dialogue]]
speaker = "アナ"
# 「こんにちは、フラン先輩。本日の勝負は私が立ち会います」
line = "「こんにちは、フラン先輩。本日の勝負は私が立ち会います」"

[[dialogue]]
speaker = "フラン"
# 「おう、助かるぜ。公平にジャッジしてくれよな」
line = "「おう、助かるぜ。公平にジャッジしてくれよな」"

[[dialogue]]
speaker = "フラン"
# 「勝負の方法は？　オレはなんでもいいぜ！　どんな内容だろうが、逃げも隠れもしねえ！」
line = "「勝負の方法は？　オレはなんでもいいぜ！　どんな内容だろうが、逃げも隠れもしねえ！」"

[[dialogue]]
speaker = "unk"
# 平和的にゲームで勝負だ
line = "平和的にゲームで勝負だ"

[[dialogue]]
speaker = "フラン"
# 「ゲームぅ？　拳と拳でやり合うんじゃないのかよ。もちろんいいけどよ」
line = "「ゲームぅ？　拳と拳でやり合うんじゃないのかよ。もちろんいいけどよ」"

[[dialogue]]
speaker = "アナ"
# 「フラン先輩の得意なゲームはなんですか？」
line = "「フラン先輩の得意なゲームはなんですか？」"

[[dialogue]]
speaker = "フラン"
# 「オレが得意なゲーム……？　ははぁん、なるほど。オレの得意なゲームでコテンパンにして、ぐうの音も言わせなくするって魂胆か？」
line = "「オレが得意なゲーム……？　ははぁん、なるほど。オレの得意なゲームでコテンパンにして、ぐうの音も言わせなくするって魂胆か？」"

[[dialogue]]
speaker = "フラン"
# 「でも、オレはオレが負けたと思うまで挑み続けるぜ！　デカく成長した時にリベンジするからな！」
line = "「でも、オレはオレが負けたと思うまで挑み続けるぜ！　デカく成長した時にリベンジするからな！」"

[[dialogue]]
speaker = "フラン"
# 「ちなみにオレの得意なゲームはチェスだ」
line = "「ちなみにオレの得意なゲームはチェスだ」"

[[dialogue]]
speaker = "アナ"
# 「なるほど。こう見えて、フラン先輩は学力テストでは必ず学年５０位以内には入る秀才ですから。意外と頭脳派なのですね」
line = "「なるほど。こう見えて、フラン先輩は学力テストでは必ず学年５０位以内には入る秀才ですから。意外と頭脳派なのですね」"

[[dialogue]]
speaker = "フラン"
# 「こう見えてとか意外ととか本人の前で言うなよ」
line = "「こう見えてとか意外ととか本人の前で言うなよ」"

[[dialogue]]
speaker = "フラン"
# 「ま、成績のことはほんとだがな。生きることは戦いだ。オレは勉強からもテストからも逃げねえ」
line = "「ま、成績のことはほんとだがな。生きることは戦いだ。オレは勉強からもテストからも逃げねえ」"

[[dialogue]]
speaker = "アナ"
# 「さて。会長はチェスはお得意ですか」
line = "「さて。会長はチェスはお得意ですか」"

[[dialogue]]
speaker = "unk"
# いや、よくわからない
line = "いや、よくわからない"

[[dialogue]]
speaker = "フラン"
# 「そっか、そっか、よくわか――はぁ？　マジかよ！？　チェスわからない人類なんて存在するのか！？」
line = "「そっか、そっか、よくわか――はぁ？　マジかよ！？　チェスわからない人類なんて存在するのか！？」"

[[dialogue]]
speaker = "アナ"
# 「確かにチェスは世界最大のマインドゲームですが、フラン先輩の主語は大きいですね」
line = "「確かにチェスは世界最大のマインドゲームですが、フラン先輩の主語は大きいですね」"

[[dialogue]]
speaker = "アナ"
# 「フラン先輩、チェス初心者の会長をコテンパンにするチャンスです。どうぞ」
line = "「フラン先輩、チェス初心者の会長をコテンパンにするチャンスです。どうぞ」"

[[dialogue]]
speaker = "フラン"
# 「いやなんでそっちがノリノリなんだよ」
line = "「いやなんでそっちがノリノリなんだよ」"

[[dialogue]]
speaker = "フラン"
# 「右も左もわからねえやつを倒して、何も面白くねえし、勝ったところで何の栄誉も得られねえ」
line = "「右も左もわからねえやつを倒して、何も面白くねえし、勝ったところで何の栄誉も得られねえ」"

[[dialogue]]
speaker = "フラン"
# 「むしろ、初心者狩りで会長に勝ったなんて自慢したら、末代までの笑いものだぜ」
line = "「むしろ、初心者狩りで会長に勝ったなんて自慢したら、末代までの笑いものだぜ」"

[[dialogue]]
speaker = "フラン"
# 「よし、せっかくだからコマの動かし方からレクチャーしてやる。まずはポーンだけどよ……」
line = "「よし、せっかくだからコマの動かし方からレクチャーしてやる。まずはポーンだけどよ……」"

[[dialogue]]
speaker = "フラン"
# 「チェックだ」
line = "「チェックだ」"

[[dialogue]]
speaker = "アナ"
# 「逃れる術はありませんね。チェックメイトです」
line = "「逃れる術はありませんね。チェックメイトです」"

[[dialogue]]
speaker = "unk"
# 強い……負けました
line = "強い……負けました"

[[dialogue]]
speaker = "フラン"
# 「これでオレの３戦３勝だな」
line = "「これでオレの３戦３勝だな」"

[[dialogue]]
speaker = "アナ"
# 「コテンパンですね、会長。そろそろ休憩にしましょう。もぐもぐタイムです」
line = "「コテンパンですね、会長。そろそろ休憩にしましょう。もぐもぐタイムです」"

[[dialogue]]
speaker = "フラン"
# 「さすがは会長、筋がいいな。一戦ごとにいい動きになってやがる。でも、オレにはまだ遠く及ばねえ」
line = "「さすがは会長、筋がいいな。一戦ごとにいい動きになってやがる。でも、オレにはまだ遠く及ばねえ」"

[[dialogue]]
speaker = "フラン"
# 「ま、もう少しやれば、ハンデ付きなら勝てるようになるかもな」
line = "「ま、もう少しやれば、ハンデ付きなら勝てるようになるかもな」"

[[dialogue]]
speaker = "フラン"
# 「チェック！」
line = "「チェック！」"

[[dialogue]]
speaker = "アナ"
# 「どうあがいても４手後に会長の敗北ですね」
line = "「どうあがいても４手後に会長の敗北ですね」"

[[dialogue]]
speaker = "フラン"
# 「っしゃ！　７戦７勝……っと、つい喜んじまった」
line = "「っしゃ！　７戦７勝……っと、つい喜んじまった」"

[[dialogue]]
speaker = "フラン"
# 「途中、ちょっとヤバい局面もあったなー。うかうかしてたら、あっという間に追いつかれちまいそうだぜ」
line = "「途中、ちょっとヤバい局面もあったなー。うかうかしてたら、あっという間に追いつかれちまいそうだぜ」"

[[dialogue]]
speaker = "アナ"
# 「フラン先輩は手ほどきがお上手です。何かコツでも？」
line = "「フラン先輩は手ほどきがお上手です。何かコツでも？」"

[[dialogue]]
speaker = "フラン"
# 「コツってもんでもねえけどさ。手ほどきって応援みたいなもんだろ？」
line = "「コツってもんでもねえけどさ。手ほどきって応援みたいなもんだろ？」"

[[dialogue]]
speaker = "unk"
# わかるようなわからないような
line = "わかるようなわからないような"

[[dialogue]]
speaker = "フラン"
# 「へへ、でも、まだまだ負けてやんないぜ。せめて、卒業までに一矢報いてくれよな」
line = "「へへ、でも、まだまだ負けてやんないぜ。せめて、卒業までに一矢報いてくれよな」"

[[dialogue]]
speaker = "フラン"
# 「って、もうこんな時間か！　時間を忘れて遊んじまったぜ」
line = "「って、もうこんな時間か！　時間を忘れて遊んじまったぜ」"

[[dialogue]]
speaker = "フラン"
# 「てっきり今日は会長と熱い勝負ができるもんだと思ってたのによ。ちょっと騙された気分だぜ」
line = "「てっきり今日は会長と熱い勝負ができるもんだと思ってたのによ。ちょっと騙された気分だぜ」"

[[dialogue]]
speaker = "アナ"
# 「ですが、フラン先輩は非常に楽しまれていたようですが」
line = "「ですが、フラン先輩は非常に楽しまれていたようですが」"

[[dialogue]]
speaker = "フラン"
# 「ああ、めちゃくちゃ楽しかったぜ！」
line = "「ああ、めちゃくちゃ楽しかったぜ！」"

[[dialogue]]
speaker = "フラン"
# 「才能溢れるやつが、みるみる成長していくのを目の前で見てたんだからな。応援のし甲斐もあるってもんだ。これだから強いやつとやり合うのはたまんねえ」
line = "「才能溢れるやつが、みるみる成長していくのを目の前で見てたんだからな。応援のし甲斐もあるってもんだ。これだから強いやつとやり合うのはたまんねえ」"

[[dialogue]]
speaker = "unk"
# また遊ぼう！
line = "また遊ぼう！"

[[dialogue]]
speaker = "フラン"
# 「ああ！　めいっぱい遊ぶつもりじゃなかったんだけどな……ま、いいか！」
line = "「ああ！　めいっぱい遊ぶつもりじゃなかったんだけどな……ま、いいか！」"

[[dialogue]]
speaker = "フラン"
# 「すっげえ楽しい休日だったよ。会長、ありがとな！」
line = "「すっげえ楽しい休日だったよ。会長、ありがとな！」"

[[dialogue]]
speaker = "アナ"
# 「フラン先輩がチェスが好きなこと、ご存じでしたか？」
line = "「フラン先輩がチェスが好きなこと、ご存じでしたか？」"

[[dialogue]]
speaker = "アナ"
# 「真っ向から戦うのではなく、彼女を気持ちよく楽しませてやりこめる。猪突猛進な彼女にはない発想でしたね」
line = "「真っ向から戦うのではなく、彼女を気持ちよく楽しませてやりこめる。猪突猛進な彼女にはない発想でしたね」"

[[dialogue]]
speaker = "アナ"
# 「これが勝負に負けて戦いに勝つ……ということでしょうか」
line = "「これが勝負に負けて戦いに勝つ……ということでしょうか」"
