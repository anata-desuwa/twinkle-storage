[[dialogue]]
speaker = "unk"
# 第４話,アニマ・スイートドリーム,P
line = "第４話,アニマ・スイートドリーム,P"

[[dialogue]]
speaker = "unk"
# とある週末、アニマ先輩が俺の家に遊びに来ていた――
line = "とある週末、アニマ先輩が俺の家に遊びに来ていた――"

[[dialogue]]
speaker = "アニマ"
# 「～～♪　～～～♪」
line = "「～～♪　～～～♪」"

[[dialogue]]
speaker = "アニマ"
# 「――フヒ、よし♪　会長、完成したゾ」
line = "「――フヒ、よし♪　会長、完成したゾ」"

[[dialogue]]
speaker = "unk"
# 彼女はそう言って、キッチンからお皿を持って来る。
line = "彼女はそう言って、キッチンからお皿を持って来る。"

[[dialogue]]
speaker = "アニマ"
# 「アニマ特製の煮込みハンバーグだ♪」
line = "「アニマ特製の煮込みハンバーグだ♪」"

[[dialogue]]
speaker = "unk"
# 今日は母さんが不在で、代わりにアニマ先輩がお昼ご飯を作ってくれていた。
line = "今日は母さんが不在で、代わりにアニマ先輩がお昼ご飯を作ってくれていた。"

[[dialogue]]
speaker = "アニマ"
# 「リノさんから教わった栄養たっぷりのレシピを元に、更にアニマなりに味も追及してみタ」
line = "「リノさんから教わった栄養たっぷりのレシピを元に、更にアニマなりに味も追及してみタ」"

[[dialogue]]
speaker = "アニマ"
# 「って……おや？　会長、アニマをじっと眺めたりして、どうかしたカ？」
line = "「って……おや？　会長、アニマをじっと眺めたりして、どうかしたカ？」"

[[dialogue]]
speaker = "アニマ"
# 「――アニマが家で料理をしていると、いつものエプロンがなんだか奥さんっぽいって？」
line = "「――アニマが家で料理をしていると、いつものエプロンがなんだか奥さんっぽいって？」"

[[dialogue]]
speaker = "アニマ"
# 「フヒ♪　会長、またそんなことを言って……。なら、今日は――」
line = "「フヒ♪　会長、またそんなことを言って……。なら、今日は――」"

[[dialogue]]
speaker = "アニマ"
# 「２人きりだし、アニマと新婚さんごっこでもしてみるカ？　フヒ<emoji=heart04>」
line = "「２人きりだし、アニマと新婚さんごっこでもしてみるカ？　フヒ<emoji=heart04>」"

[[dialogue]]
speaker = "アニマ"
# 「おぉう……想像以上の食いつきだゾ<emoji=heart04>　そんなに嬉しかったのカ？」
line = "「おぉう……想像以上の食いつきだゾ<emoji=heart04>　そんなに嬉しかったのカ？」"

[[dialogue]]
speaker = "アニマ"
# 「フヒっ♪　それじゃあ、早速」
line = "「フヒっ♪　それじゃあ、早速」"

[[dialogue]]
speaker = "アニマ"
# 「会長、あ～ん♪」
line = "「会長、あ～ん♪」"

[[dialogue]]
speaker = "アニマ"
# 「――さて、お味のほどはいかがカナ？」
line = "「――さて、お味のほどはいかがカナ？」"

[[dialogue]]
speaker = "unk"
# うまい！
line = "うまい！"

[[dialogue]]
speaker = "アニマ"
# 「そうか、それはよかっタ♪　キミの為に作ったから、美味しいと言ってもらえて、すごく嬉しイ<emoji=heart04>」
line = "「そうか、それはよかっタ♪　キミの為に作ったから、美味しいと言ってもらえて、すごく嬉しイ<emoji=heart04>」"

[[dialogue]]
speaker = "アニマ"
# 「――ナニ？　アニマは料理上手だって？」
line = "「――ナニ？　アニマは料理上手だって？」"

[[dialogue]]
speaker = "アニマ"
# 「料理は錬金術と、工程が似ているからナ。とはいえ、本格的に料理を実験するようになったのは、つい最近なのだが」
line = "「料理は錬金術と、工程が似ているからナ。とはいえ、本格的に料理を実験するようになったのは、つい最近なのだが」"

[[dialogue]]
speaker = "アニマ"
# 「――フヒ♪　キミと恋人になったからだナ。だって……好きな人には喜んでもらいたいダロウ？」
line = "「――フヒ♪　キミと恋人になったからだナ。だって……好きな人には喜んでもらいたいダロウ？」"

[[dialogue]]
speaker = "アニマ"
# 「というわけで、冷めない内にどんどん召し上がれダ♪　はい、あ～ん♪」
line = "「というわけで、冷めない内にどんどん召し上がれダ♪　はい、あ～ん♪」"

[[dialogue]]
speaker = "unk"
# それから、アニマ先輩は何度も優しく食べさせてくれるのだった。
line = "それから、アニマ先輩は何度も優しく食べさせてくれるのだった。"

[[dialogue]]
speaker = "unk"
# 食事が終わった後、俺たちはソファーでまったりと過ごしていた。
line = "食事が終わった後、俺たちはソファーでまったりと過ごしていた。"

[[dialogue]]
speaker = "アニマ"
# 「フヒ……<emoji=heart04>」
line = "「フヒ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# アニマ先輩はというと、俺の膝の上に座っていた。手を恋人繋ぎにして、それから――
line = "アニマ先輩はというと、俺の膝の上に座っていた。手を恋人繋ぎにして、それから――"

[[dialogue]]
speaker = "アニマ"
# 「スリスリ……<emoji=heart04>」
line = "「スリスリ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 猫のように俺に頬ずりをして来る。
line = "猫のように俺に頬ずりをして来る。"

[[dialogue]]
speaker = "アニマ"
# 「ん？　どうしたんダ、会長？　くすぐったかったカ？」
line = "「ん？　どうしたんダ、会長？　くすぐったかったカ？」"

[[dialogue]]
speaker = "unk"
# アニマ先輩、すごく可愛くなりましたよね
line = "アニマ先輩、すごく可愛くなりましたよね"

[[dialogue]]
speaker = "unk"
# もちろん、付き合う前から先輩は可愛かった。しかし最近は更に、可愛さが増して行っている。
line = "もちろん、付き合う前から先輩は可愛かった。しかし最近は更に、可愛さが増して行っている。"

[[dialogue]]
speaker = "アニマ"
# 「――アニマから甘くて良い匂いがして、くっ付いてるだけでドキドキしてしまう？」
line = "「――アニマから甘くて良い匂いがして、くっ付いてるだけでドキドキしてしまう？」"

[[dialogue]]
speaker = "アニマ"
# 「フヒ<emoji=heart04>　キミに相応しい女の子になれるよう、最近は以前よりオシャレに気を遣っているからナ」
line = "「フヒ<emoji=heart04>　キミに相応しい女の子になれるよう、最近は以前よりオシャレに気を遣っているからナ」"

[[dialogue]]
speaker = "アニマ"
# 「実はちょっと、アニマ特製のさり気ない香水を使っていたりするんだが、効果あったみたいだナ<emoji=heart04>」
line = "「実はちょっと、アニマ特製のさり気ない香水を使っていたりするんだが、効果あったみたいだナ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# それに、甘えてくれるようになったなって
line = "それに、甘えてくれるようになったなって"

[[dialogue]]
speaker = "unk"
# 恋人関係になってからしばらく経つが、アニマ先輩はだんだん慣れてきたというか、どんどん甘えるようになって来て――
line = "恋人関係になってからしばらく経つが、アニマ先輩はだんだん慣れてきたというか、どんどん甘えるようになって来て――"

[[dialogue]]
speaker = "アニマ"
# 「それはキミのせいだゾ？　キミがいつも甘い言葉を囁くから、アニマはすっかりメロメロになってしまったんダ。もはやキミなしではいられない程に」
line = "「それはキミのせいだゾ？　キミがいつも甘い言葉を囁くから、アニマはすっかりメロメロになってしまったんダ。もはやキミなしではいられない程に」"

[[dialogue]]
speaker = "アニマ"
# 「おかげで、アニマは夢が１つ増えてしまった」
line = "「おかげで、アニマは夢が１つ増えてしまった」"

[[dialogue]]
speaker = "unk"
# その夢って……？
line = "その夢って……？"

[[dialogue]]
speaker = "アニマ"
# 「前にも言った、魂の根源を明らかにしたいという気持ちは、今も強くある。だが、それと同じくらい……肉体を捨てるのが惜しくなってしまっタ」
line = "「前にも言った、魂の根源を明らかにしたいという気持ちは、今も強くある。だが、それと同じくらい……肉体を捨てるのが惜しくなってしまっタ」"

[[dialogue]]
speaker = "アニマ"
# 「魂だけになってしまうと……キミとの子供が望めないからナ<emoji=heart04>」
line = "「魂だけになってしまうと……キミとの子供が望めないからナ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そ、それって……
line = "そ、それって……"

[[dialogue]]
speaker = "アニマ"
# 「アニマにとって……キミとの未来が、譲れないくらい大きな夢になったということダ」
line = "「アニマにとって……キミとの未来が、譲れないくらい大きな夢になったということダ」"

[[dialogue]]
speaker = "unk"
# アニマ先輩は正面から向き合うように、俺の膝の上で座り直すと――
line = "アニマ先輩は正面から向き合うように、俺の膝の上で座り直すと――"

[[dialogue]]
speaker = "アニマ"
# 「会長……ん……<emoji=heart04>」
line = "「会長……ん……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 目を閉じ、唇をちょっと突き出して、キスのおねだり。
line = "目を閉じ、唇をちょっと突き出して、キスのおねだり。"

[[dialogue]]
speaker = "unk"
# ドキドキしながらも理性で抑えていたのに、そんな風に可愛く誘われては、我慢できず。
line = "ドキドキしながらも理性で抑えていたのに、そんな風に可愛く誘われては、我慢できず。"

[[dialogue]]
speaker = "アニマ"
# 「んっ……ちゅっ……<emoji=heart04>」
line = "「んっ……ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺はアニマ先輩を抱き締めながら、キスをする。
line = "俺はアニマ先輩を抱き締めながら、キスをする。"

[[dialogue]]
speaker = "アニマ"
# 「ちゅっ……んむっ……ちゅっ<emoji=heart04>」
line = "「ちゅっ……んむっ……ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "アニマ"
# 「ちゅっ……はあぁ……<emoji=heart04>　ハグしながらのキス、すごくドキドキするゾ<emoji=heart04>」
line = "「ちゅっ……はあぁ……<emoji=heart04>　ハグしながらのキス、すごくドキドキするゾ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 好きです、アニマ先輩
line = "好きです、アニマ先輩"

[[dialogue]]
speaker = "アニマ"
# 「ん……<emoji=heart04>　アニマも好きダ、会長……<emoji=heart04>　ちゅっ……<emoji=heart04>」
line = "「ん……<emoji=heart04>　アニマも好きダ、会長……<emoji=heart04>　ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "アニマ"
# 「アニマはキミのことを、世界で１番愛してイル<emoji=heart04>」
line = "「アニマはキミのことを、世界で１番愛してイル<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# アニマ先輩、俺と結婚して下さい
line = "アニマ先輩、俺と結婚して下さい"

[[dialogue]]
speaker = "アニマ"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "unk"
# 胸の奥から溢れてくる愛おしさが抑え切れなくて、思わずそんなことを口走ってしまうが――
line = "胸の奥から溢れてくる愛おしさが抑え切れなくて、思わずそんなことを口走ってしまうが――"

[[dialogue]]
speaker = "unk"
# しかし、アニマ先輩は嬉しそうに微笑んで……
line = "しかし、アニマ先輩は嬉しそうに微笑んで……"

[[dialogue]]
speaker = "アニマ"
# 「フヒ<emoji=heart04>　ああ、もちろんいいとも」
line = "「フヒ<emoji=heart04>　ああ、もちろんいいとも」"

[[dialogue]]
speaker = "アニマ"
# 「じゃあ、学園を卒業したら、その時に……ナ？」
line = "「じゃあ、学園を卒業したら、その時に……ナ？」"

[[dialogue]]
speaker = "アニマ"
# 「んっ……ちゅっ……<emoji=heart04>」
line = "「んっ……ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# それからも俺たちは、時間が過ぎるのも忘れて、甘々な実験に没頭してしまうのだった――
line = "それからも俺たちは、時間が過ぎるのも忘れて、甘々な実験に没頭してしまうのだった――"
