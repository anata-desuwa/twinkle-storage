[[dialogue]]
speaker = "unk"
# 第１話,海と水着と暗殺者,P
line = "第１話,海と水着と暗殺者,P"

[[dialogue]]
speaker = "unk"
# ある日。ナターシャから連絡が来て、ビーチに向かうと……
line = "ある日。ナターシャから連絡が来て、ビーチに向かうと……"

[[dialogue]]
speaker = "若い男"
# 「君、かわいいね。俺と一緒にひと泳ぎしない？」
line = "「君、かわいいね。俺と一緒にひと泳ぎしない？」"

[[dialogue]]
speaker = "ナターシャ"
# 「ん～、今は泳ぎたい気分じゃないかな～」
line = "「ん～、今は泳ぎたい気分じゃないかな～」"

[[dialogue]]
speaker = "若い男"
# 「なら美味しい物でも食べようよ。奢るからさ」
line = "「なら美味しい物でも食べようよ。奢るからさ」"

[[dialogue]]
speaker = "ナターシャ"
# 「それはちょっと魅力的だけど。でもこれから人と約束があるから遠慮しとくね」
line = "「それはちょっと魅力的だけど。でもこれから人と約束があるから遠慮しとくね」"

[[dialogue]]
speaker = "若い男"
# 「そうつれないこと言わないで。楽しい時間を約束するからさ～」
line = "「そうつれないこと言わないで。楽しい時間を約束するからさ～」"

[[dialogue]]
speaker = "unk"
# デジャブを感じる光景だ……
line = "デジャブを感じる光景だ……"

[[dialogue]]
speaker = "ナターシャ"
# 「あ、来た来た。おーい遅いよ、彼氏～」
line = "「あ、来た来た。おーい遅いよ、彼氏～」"

[[dialogue]]
speaker = "若い男"
# 「あ、彼氏？　なんだよ、彼氏いんなら最初からそう言えよ」
line = "「あ、彼氏？　なんだよ、彼氏いんなら最初からそう言えよ」"

[[dialogue]]
speaker = "ナターシャ"
# 「ふー、ようやく行った。わざわざ呼びつけちゃってごめんね、会長さん。ナイスタイミングだったよ」
line = "「ふー、ようやく行った。わざわざ呼びつけちゃってごめんね、会長さん。ナイスタイミングだったよ」"

[[dialogue]]
speaker = "unk"
# それは構わないけど……彼氏？
line = "それは構わないけど……彼氏？"

[[dialogue]]
speaker = "ナターシャ"
# 「前の一件で私は学んだんだ。ああいう、しつこいナンパ男を撃退するには、男と一緒にいるのが一番だってね」
line = "「前の一件で私は学んだんだ。ああいう、しつこいナンパ男を撃退するには、男と一緒にいるのが一番だってね」"

[[dialogue]]
speaker = "ナターシャ"
# 「所謂ナンパ避けってやつ？　今日は会長さんにその役をお願いしたくて呼んだわけ」
line = "「所謂ナンパ避けってやつ？　今日は会長さんにその役をお願いしたくて呼んだわけ」"

[[dialogue]]
speaker = "ナターシャ"
# 「実はすっごく困っててさ。ビーチに来てからナンパの量が半端なくて。１人でいると、すーぐ誰かしら声かけてくるの」
line = "「実はすっごく困っててさ。ビーチに来てからナンパの量が半端なくて。１人でいると、すーぐ誰かしら声かけてくるの」"

[[dialogue]]
speaker = "ナターシャ"
# 「のんびりする暇もないっていうか。おちおち食事も取れなくて。海の家の列に並んでるだけでも喋りかけられるし」
line = "「のんびりする暇もないっていうか。おちおち食事も取れなくて。海の家の列に並んでるだけでも喋りかけられるし」"

[[dialogue]]
speaker = "ナターシャ"
# 「他にいくらでも女性客がいるのにね。あんまり目立つ行動も取らないようにしてるつもりなんだけどなぁ」
line = "「他にいくらでも女性客がいるのにね。あんまり目立つ行動も取らないようにしてるつもりなんだけどなぁ」"

[[dialogue]]
speaker = "unk"
# その格好で１人佇んでたらまぁ……
line = "その格好で１人佇んでたらまぁ……"

[[dialogue]]
speaker = "ナターシャ"
# 「ふふふ、なになに？　なんか会長さん、ナンパ男たちと同じような顔しちゃってるけど」
line = "「ふふふ、なになに？　なんか会長さん、ナンパ男たちと同じような顔しちゃってるけど」"

[[dialogue]]
speaker = "ナターシャ"
# 「ナンパ避けが、ナンパ男にならないでね？　そういう視線はメルエルにでも──」
line = "「ナンパ避けが、ナンパ男にならないでね？　そういう視線はメルエルにでも──」"

[[dialogue]]
speaker = "ナターシャ"
# 「いや、ううん……なんでもない。とにかくビーチを満喫するためにも、彼氏役としてちょっと付き合ってよ♪」
line = "「いや、ううん……なんでもない。とにかくビーチを満喫するためにも、彼氏役としてちょっと付き合ってよ♪」"

[[dialogue]]
speaker = "ナターシャ"
# 「いつか恋人ができた時の練習だと思って接してくれていいからさ♪　私も会長さんの監視ができるしＷｉｎ－Ｗｉｎでしょ？」
line = "「いつか恋人ができた時の練習だと思って接してくれていいからさ♪　私も会長さんの監視ができるしＷｉｎ－Ｗｉｎでしょ？」"

[[dialogue]]
speaker = "ナターシャ"
# 「さっきから鼻の下伸ばして眺めてる私の水着姿も……ふふふ。好きなだけ目に焼きつけちゃってくれていいし♪」
line = "「さっきから鼻の下伸ばして眺めてる私の水着姿も……ふふふ。好きなだけ目に焼きつけちゃってくれていいし♪」"

[[dialogue]]
speaker = "ナターシャ"
# 「あはは、今更目を逸らしたって遅いよ♪　会長さんも男の子だね～♪」
line = "「あはは、今更目を逸らしたって遅いよ♪　会長さんも男の子だね～♪」"

[[dialogue]]
speaker = "ナターシャ"
# 「ま、いくらでも見てくれていいよ？　元々そういう目的で、この水着フォームもカスタマイズしたつもりだし♪」
line = "「ま、いくらでも見てくれていいよ？　元々そういう目的で、この水着フォームもカスタマイズしたつもりだし♪」"

[[dialogue]]
speaker = "ナターシャ"
# 「監視対象をいつでも色仕掛けで堕とせるようにってね♪　そういう意味の機能性も重視してるってわけ♪」
line = "「監視対象をいつでも色仕掛けで堕とせるようにってね♪　そういう意味の機能性も重視してるってわけ♪」"

[[dialogue]]
speaker = "ナターシャ"
# 「どうでも良いナンパ男たちまで寄ってたかって来るのは想定外だったけどね。珍しく遊びたい気分なのに、邪魔されてばっかでさー」
line = "「どうでも良いナンパ男たちまで寄ってたかって来るのは想定外だったけどね。珍しく遊びたい気分なのに、邪魔されてばっかでさー」"

[[dialogue]]
speaker = "ナターシャ"
# 「というわけで、行こ行こ♪　お腹ぺっこぺこなんだ♪」
line = "「というわけで、行こ行こ♪　お腹ぺっこぺこなんだ♪」"

[[dialogue]]
speaker = "ナターシャ"
# 「ふ～、ようやく買えた。やっぱり男の人と一緒だと、ナンパも寄ってこないね～」
line = "「ふ～、ようやく買えた。やっぱり男の人と一緒だと、ナンパも寄ってこないね～」"

[[dialogue]]
speaker = "ナターシャ"
# 「ここのたこ焼き、すごく美味しいって評判らしいからさ。ほら、会長さんも食べて」
line = "「ここのたこ焼き、すごく美味しいって評判らしいからさ。ほら、会長さんも食べて」"

[[dialogue]]
speaker = "ナターシャ"
# 「そうだ、恋人っぽくあーんでもしてあげよっか？　あはは、遠慮しなくていいから。ナンパ避けに使わせてもらってるお礼だよ♪」
line = "「そうだ、恋人っぽくあーんでもしてあげよっか？　あはは、遠慮しなくていいから。ナンパ避けに使わせてもらってるお礼だよ♪」"

[[dialogue]]
speaker = "ナターシャ"
# 「ほらほら早く口開けて。急がないとメルエルに食べられちゃう──」
line = "「ほらほら早く口開けて。急がないとメルエルに食べられちゃう──」"

[[dialogue]]
speaker = "ナターシャ"
# 「っと……メルエルはいないんだった。習慣っていうのは怖いね、まったく……」
line = "「っと……メルエルはいないんだった。習慣っていうのは怖いね、まったく……」"

[[dialogue]]
speaker = "unk"
# まだ仲直りはしてないんだ？
line = "まだ仲直りはしてないんだ？"

[[dialogue]]
speaker = "ナターシャ"
# 「仲直りっていうか……ま、隠してたこと全部バラしちゃったしね。面と向かって、嫌いとも言ったし」
line = "「仲直りっていうか……ま、隠してたこと全部バラしちゃったしね。面と向かって、嫌いとも言ったし」"

[[dialogue]]
speaker = "ナターシャ"
# 「むしろ今は清々してるくらいだよ。溜まってたもの、あの子にぶちまけられてさ」
line = "「むしろ今は清々してるくらいだよ。溜まってたもの、あの子にぶちまけられてさ」"

[[dialogue]]
speaker = "ナターシャ"
# 「こうして前より自分の時間も取れるようになったしね。ま、もちろんメルエルの護衛と監視は今も続けてるけど」
line = "「こうして前より自分の時間も取れるようになったしね。ま、もちろんメルエルの護衛と監視は今も続けてるけど」"

[[dialogue]]
speaker = "ナターシャ"
# 「おかげでいい気分だよ。美味しいもの好きに食べられるし、ビーチでのんびり過ごせるし、すごく心が晴れやかで……」
line = "「おかげでいい気分だよ。美味しいもの好きに食べられるし、ビーチでのんびり過ごせるし、すごく心が晴れやかで……」"

[[dialogue]]
speaker = "unk"
# らしくないことばかりしてるように見えるけど
line = "らしくないことばかりしてるように見えるけど"

[[dialogue]]
speaker = "ナターシャ"
# 「はぁ……会長さんの目からもそう見えちゃうか」
line = "「はぁ……会長さんの目からもそう見えちゃうか」"

[[dialogue]]
speaker = "ナターシャ"
# 「なんだろうね。自分でもよくわかんないや。すっきりしたはずなのに、どこかモヤモヤしてる」
line = "「なんだろうね。自分でもよくわかんないや。すっきりしたはずなのに、どこかモヤモヤしてる」"

[[dialogue]]
speaker = "ナターシャ"
# 「だから人気のたこ焼きを並んで買うとか、ビーチでのんびり過ごすとか、普段しないことしちゃってるのかな……」
line = "「だから人気のたこ焼きを並んで買うとか、ビーチでのんびり過ごすとか、普段しないことしちゃってるのかな……」"

[[dialogue]]
speaker = "ナターシャ"
# 「ホントは食べものにもリゾートにも興味ないのにね。会長さんにはバレバレだったか。これじゃ暗殺者失格だね」
line = "「ホントは食べものにもリゾートにも興味ないのにね。会長さんにはバレバレだったか。これじゃ暗殺者失格だね」"

[[dialogue]]
speaker = "ナターシャ"
# 「……でもなんだか嬉しいな。会長さんが私のこと、わかっててくれて」
line = "「……でもなんだか嬉しいな。会長さんが私のこと、わかっててくれて」"

[[dialogue]]
speaker = "ナターシャ"
# 「おかげで、ちょっぴり心のモヤモヤが晴れた気がする。ふふ、会長さんを呼びつけて正解だったかも」
line = "「おかげで、ちょっぴり心のモヤモヤが晴れた気がする。ふふ、会長さんを呼びつけて正解だったかも」"

[[dialogue]]
speaker = "ナターシャ"
# 「ね、会長さん。２人でパーッとひと泳ぎしに行かない？　そのたこ焼き、全部食べちゃっていいからさ」
line = "「ね、会長さん。２人でパーッとひと泳ぎしに行かない？　そのたこ焼き、全部食べちゃっていいからさ」"

[[dialogue]]
speaker = "ナターシャ"
# 「なんでもいいから体を動かしたい気分なんだ。私をわかってくれてる人と一緒に」
line = "「なんでもいいから体を動かしたい気分なんだ。私をわかってくれてる人と一緒に」"

[[dialogue]]
speaker = "ナターシャ"
# 「もしかしたら一日中付き合わせちゃうかもしれないけど……」
line = "「もしかしたら一日中付き合わせちゃうかもしれないけど……」"

[[dialogue]]
speaker = "ナターシャ"
# 「その分、ふふふ、サービスもしてあげるつもりだから♪」
line = "「その分、ふふふ、サービスもしてあげるつもりだから♪」"
