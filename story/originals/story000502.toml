line = "「良かったんですか、先輩？　魔族を逃がしちゃったりして」"

[[dialogue]]
speaker = "リア"
# 「ふふ、きっとシン君ならこうしたと思うから」
line = "「ふふ、きっとシン君ならこうしたと思うから」"

[[dialogue]]
speaker = "リア"
# 「それより今は──」
