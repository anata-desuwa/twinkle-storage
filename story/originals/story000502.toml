line = "「手伝ってくれてありがとう、ございます。それで、えっと……あなたたちは？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「自己紹介が遅れたわね。私は九浄ヴィーナス。流星市国、新星学園所属の星騎士よ。こっちの男は星徒会長の──」
line = "「自己紹介が遅れたわね。私は九浄ヴィーナス。流星市国、新星学園所属の星騎士よ。こっちの男は星徒会長の──」"

[[dialogue]]
speaker = "unk"
# 緋宮クロトです
line = "緋宮クロトです"

[[dialogue]]
speaker = "聖沙"
# 「流星市国……？　新星学園……？　星騎士……？　それに九浄って……」
line = "「流星市国……？　新星学園……？　星騎士……？　それに九浄って……」"

[[dialogue]]
speaker = "フィオナ"
# 「どうも聞きなじみのないご様子です。やはりここは流星市国の外みたいですね」
line = "「どうも聞きなじみのないご様子です。やはりここは流星市国の外みたいですね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうね。でも星騎士なら流星市国の名前くらいは知っていてもよさそうなものだけど」
line = "「そうね。でも星騎士なら流星市国の名前くらいは知っていてもよさそうなものだけど」"

[[dialogue]]
speaker = "リア"
# 「ええと……それで皆さんはその新星学園の生徒さんなのかな？」
line = "「ええと……それで皆さんはその新星学園の生徒さんなのかな？」"

[[dialogue]]
speaker = "フィオナ"
# 「あ、いえ。私は流星学園に通っていまして──星見フィオナです。流星学園で星徒会長を務めさせていただいています」
line = "「あ、いえ。私は流星学園に通っていまして──星見フィオナです。流星学園で星徒会長を務めさせていただいています」"

[[dialogue]]
speaker = "聖沙"
# 「流星学園の生徒会長ぉ！？」
line = "「流星学園の生徒会長ぉ！？」"

[[dialogue]]
speaker = "リア"
# 「うーん……。聞けば聞くほど頭がこんがらがっちゃうね……」
line = "「うーん……。聞けば聞くほど頭がこんがらがっちゃうね……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「どういうこと？」
line = "「どういうこと？」"

[[dialogue]]
speaker = "リア"
# 「落ち着いて聞いてね？　ここは流星学園なの。そして、私と聖沙ちゃんは流星学園の<b>生徒会</b>メンバーなんだ」
line = "「落ち着いて聞いてね？　ここは流星学園なの。そして、私と聖沙ちゃんは流星学園の<b>生徒会</b>メンバーなんだ」"

[[dialogue]]
speaker = "フィオナ"
# 「ここが流星学園、ですか？　それにあなた方が生徒会の一員……？」
line = "「ここが流星学園、ですか？　それにあなた方が生徒会の一員……？」"

[[dialogue]]
speaker = "聖沙"
# 「ええ。私は聖沙・Ｂ・クリステレス。流星学園生徒会の副会長よ」
line = "「ええ。私は聖沙・Ｂ・クリステレス。流星学園生徒会の副会長よ」"

[[dialogue]]
speaker = "リア"
# 「私は九浄リア。今はもう肩書きは譲っちゃったけど、これでも元生徒会長だよ」
line = "「私は九浄リア。今はもう肩書きは譲っちゃったけど、これでも元生徒会長だよ」"

[[dialogue]]
speaker = "フィオナ"
# 「す、すみません。理解が追いつかなくて……。実際に私は流星学園の星徒会長ですし……」
line = "「す、すみません。理解が追いつかなくて……。実際に私は流星学園の星徒会長ですし……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それに今、九浄って……」
line = "「それに今、九浄って……」"

[[dialogue]]
speaker = "リア"
# 「色々と疑問があると思うけど、その前に私からも質問させてもらっていいかな？」
line = "「色々と疑問があると思うけど、その前に私からも質問させてもらっていいかな？」"

[[dialogue]]
speaker = "リア"
# 「さっきの戦い……それにその姿。あなたたちは一体どこでその力を手に入れたの？」
line = "「さっきの戦い……それにその姿。あなたたちは一体どこでその力を手に入れたの？」"

[[dialogue]]
speaker = "リア"
# 「あの力はクルセイダースである私たちにしか使えないはず。ううん、正確には私たちと力の出所が違うみたいだけど」
line = "「あの力はクルセイダースである私たちにしか使えないはず。ううん、正確には私たちと力の出所が違うみたいだけど」"

[[dialogue]]
speaker = "unk"
# クルセイダース？
line = "クルセイダース？"

[[dialogue]]
speaker = "ヴィーナス"
# 「ま、待って。クルセイダースって言ったら！」
line = "「ま、待って。クルセイダースって言ったら！」"

[[dialogue]]
speaker = "フィオナ"
# 「３０００年前にリクリエを退けたという英雄の……！」
line = "「３０００年前にリクリエを退けたという英雄の……！」"

[[dialogue]]
speaker = "聖沙"
# 「大昔の、英雄？　先輩……私、頭が痛くなってきました。この子たち、魔族の精神攻撃でも受けているんじゃ？」
line = "「大昔の、英雄？　先輩……私、頭が痛くなってきました。この子たち、魔族の精神攻撃でも受けているんじゃ？」"

[[dialogue]]
speaker = "リア"
# 「うーん……。私たちの認識とは色々とズレていることは確かだね。まずはその辺りを擦り合わせることが大切かも」
line = "「うーん……。私たちの認識とは色々とズレていることは確かだね。まずはその辺りを擦り合わせることが大切かも」"

[[dialogue]]
speaker = "リア"
# 「よく聞いてね？　あなたたちがいるこの町は流星町。そして私たちは流星学園、生徒会」
line = "「よく聞いてね？　あなたたちがいるこの町は流星町。そして私たちは流星学園、生徒会」"

[[dialogue]]
speaker = "リア"
# 「リ・クリエを阻止するためにこの力を使って、日夜魔族と戦っている──流星クルセイダース、だよ」
line = "「リ・クリエを阻止するためにこの力を使って、日夜魔族と戦っている──流星クルセイダース、だよ」"

[[dialogue]]
speaker = "フィオナ"
# 「あの伝説のクルセイダースが目の前にいらっしゃるなんて、にわかには信じられません……」
line = "「あの伝説のクルセイダースが目の前にいらっしゃるなんて、にわかには信じられません……」"

[[dialogue]]
speaker = "フィオナ"
# 「しかしクルセイダースが魔族と戦っていたという伝説は聞いたことがありません」
line = "「しかしクルセイダースが魔族と戦っていたという伝説は聞いたことがありません」"

[[dialogue]]
speaker = "フィオナ"
# 「それに流星町という地名も。過去の世界というわけではなさそうです」
line = "「それに流星町という地名も。過去の世界というわけではなさそうです」"

[[dialogue]]
speaker = "聖沙"
# 「謎は深まるばかりね。事情を聞く限り、境界の乱れっていうものに巻き込まれたのが関係していそうだけど」
line = "「謎は深まるばかりね。事情を聞く限り、境界の乱れっていうものに巻き込まれたのが関係していそうだけど」"

[[dialogue]]
speaker = "リア"
# 「ところどころ共通点はあるもんね。ヴィーナスちゃんたちもフィーニスの塔については知っているみたいだし」
line = "「ところどころ共通点はあるもんね。ヴィーナスちゃんたちもフィーニスの塔については知っているみたいだし」"

[[dialogue]]
speaker = "リア"
# 「あ、そうだ。お姉ちゃん──理事長の九浄ヘレナなら何か知ってるかも」
line = "「あ、そうだ。お姉ちゃん──理事長の九浄ヘレナなら何か知ってるかも」"

[[dialogue]]
speaker = "ヴィーナス"
