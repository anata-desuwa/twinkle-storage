line = "「九浄──ヘレナ！？」"

[[dialogue]]
speaker = "リア"
# 「あれ？　お姉ちゃんのことは知ってるの？」
line = "「あれ？　お姉ちゃんのことは知ってるの？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「知ってるも何も、私のお義母さまよ。私、九浄家の養子だから。確かＤＩＳＣに写真が……」
line = "「知ってるも何も、私のお義母さまよ。私、九浄家の養子だから。確かＤＩＳＣに写真が……」"

[[dialogue]]
speaker = "リア"
# 「ええっと…… この人が九浄ヘレナ、さん？ お姉ちゃんとは似ても似つかないような…… 」
line = "「ええっと…… この人が九浄ヘレナ、さん？ お姉ちゃんとは似ても似つかないような…… 」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうは言っても、これが私の知る九浄ヘレナよ！」
line = "「そうは言っても、これが私の知る九浄ヘレナよ！」"

[[dialogue]]
speaker = "リア"
# 「同姓同名の別人…… ？ でも、お姉ちゃんがそれを知ったら──」
line = "「同姓同名の別人…… ？ でも、お姉ちゃんがそれを知ったら──」"

[[dialogue]]
speaker = "リア"
# 「『ドッペルゲンガーは見つけ次第、始末する。でなければ次は俺が死んでしまうからな』とか言いそうだしなぁ…… 」
line = "「『ドッペルゲンガーは見つけ次第、始末する。でなければ次は俺が死んでしまうからな』とか言いそうだしなぁ…… 」"

[[dialogue]]
speaker = "リア"
# 「そもそも、流星町で九浄家のヘレナを名乗るなんて、正気の沙汰じゃないよ」
line = "「そもそも、流星町で九浄家のヘレナを名乗るなんて、正気の沙汰じゃないよ」"

[[dialogue]]
speaker = "フィオナ"
# 「どういうことでしょう……」
line = "「どういうことでしょう……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「わかったわ！　ここはきっと平行世界なのよ！」
line = "「わかったわ！　ここはきっと平行世界なのよ！」"

[[dialogue]]
speaker = "unk"
# 平行世界？
line = "平行世界？"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええ、漫画で見たわ！　この世界は私たちの世界と似て非なる場所ってこと！」
line = "「ええ、漫画で見たわ！　この世界は私たちの世界と似て非なる場所ってこと！」"

[[dialogue]]
speaker = "フィオナ"
# 「へ、平行世界っ……！！　今風に言えばマルチバース──いえ正確には似て非なるものですが、違う世界に同じ人間がいるなんてロマンが……！！」
line = "「へ、平行世界っ……！！　今風に言えばマルチバース──いえ正確には似て非なるものですが、違う世界に同じ人間がいるなんてロマンが……！！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「フィオナ？」
line = "「フィオナ？」"

[[dialogue]]
speaker = "フィオナ"
# 「──ハッ。コ、コホン……。少々取り乱しました。私はただ理に適っていると思っただけです」
line = "「──ハッ。コ、コホン……。少々取り乱しました。私はただ理に適っていると思っただけです」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そ、そう？　冗談半分で言ったつもりだったんだけど……」
line = "「そ、そう？　冗談半分で言ったつもりだったんだけど……」"

[[dialogue]]
speaker = "マグダレナ"
# 「いいえ──あながち的外れではありません」
line = "「いいえ──あながち的外れではありません」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ひゃっ！？　マグダレナ、いたのっ！？」
line = "「ひゃっ！？　マグダレナ、いたのっ！？」"

[[dialogue]]
speaker = "マグダレナ"
# 「はい。お邪魔しないようにずっと傍に控えておりました」
line = "「はい。お邪魔しないようにずっと傍に控えておりました」"

[[dialogue]]
speaker = "聖沙"
# 「……ついに喋り始めてしまったわ。触れるとさらにややこしくなりそうだったから、あえて触れずにいたのに……」
line = "「……ついに喋り始めてしまったわ。触れるとさらにややこしくなりそうだったから、あえて触れずにいたのに……」"

[[dialogue]]
speaker = "リア"
# 「あの人、明らかに天使だよね？　輪っかや羽根も付いてるし……」
line = "「あの人、明らかに天使だよね？　輪っかや羽根も付いてるし……」"

[[dialogue]]
speaker = "フィオナ"
# 「やはり平行世界なのですねっ？　守護天使さまの言うことなら間違いありませんよね！？」
line = "「やはり平行世界なのですねっ？　守護天使さまの言うことなら間違いありませんよね！？」"

[[dialogue]]
speaker = "聖沙"
# 「守護天使ぃ！？　天使は天使でも守護天使ぃ！？」
line = "「守護天使ぃ！？　天使は天使でも守護天使ぃ！？」"

[[dialogue]]
speaker = "リア"
# 「は、初めて見た……。人の形をした守護天使なんて……」
line = "「は、初めて見た……。人の形をした守護天使なんて……」"

[[dialogue]]
speaker = "聖沙"
# 「クルセイダースって、このロザリオの中に宿る守護天使の力を借りて戦っているんですよね……？　この人がいたらもう、私たちの存在価値なくなっちゃうんじゃ……」
line = "「クルセイダースって、このロザリオの中に宿る守護天使の力を借りて戦っているんですよね……？　この人がいたらもう、私たちの存在価値なくなっちゃうんじゃ……」"

[[dialogue]]
speaker = "マグダレナ"
# 「そんなことはありませんよ。この世界の守護天使の力と私の持つ力もまた、似て非なるもののようですから」
line = "「そんなことはありませんよ。この世界の守護天使の力と私の持つ力もまた、似て非なるもののようですから」"

[[dialogue]]
speaker = "リア"
# 「そ、そうなんだ……。それにしても平行世界って……」
line = "「そ、そうなんだ……。それにしても平行世界って……」"

[[dialogue]]
speaker = "マグダレナ"
# 「思うに、こちらの世界でも近頃フィーニスの塔に何か異変が起こっていたのではありませんか？」
line = "「思うに、こちらの世界でも近頃フィーニスの塔に何か異変が起こっていたのではありませんか？」"

[[dialogue]]
speaker = "リア"
# 「それは……うん。実は数日前から妙な気配を放っていて……」
line = "「それは……うん。実は数日前から妙な気配を放っていて……」"

[[dialogue]]
speaker = "マグダレナ"
# 「恐らく、こちらの世界でも私たちの世界と同じく境界の乱れが発生していたのでしょう。そして偶然にも異なる世界でフィーニスの塔同士がリンクしてしまった」
line = "「恐らく、こちらの世界でも私たちの世界と同じく境界の乱れが発生していたのでしょう。そして偶然にも異なる世界でフィーニスの塔同士がリンクしてしまった」"

[[dialogue]]
speaker = "マグダレナ"
# 「その結果、フィーニスの塔の近くにいた我々が次元の層を飛び越えて、こちらの世界に転移してしまったのです」
line = "「その結果、フィーニスの塔の近くにいた我々が次元の層を飛び越えて、こちらの世界に転移してしまったのです」"

[[dialogue]]
speaker = "リア"
# 「でも私はなんともなかったよ？　昨日もフィーニスの塔に様子を見に行ったけれど」
line = "「でも私はなんともなかったよ？　昨日もフィーニスの塔に様子を見に行ったけれど」"

[[dialogue]]
speaker = "マグダレナ"
# 「何か条件があるのかもしれません。次元の境界が大きく乱れてしまうような出来事か何かが」
line = "「何か条件があるのかもしれません。次元の境界が大きく乱れてしまうような出来事か何かが」"

[[dialogue]]
speaker = "ヴィーナス"
# 「フィーニスの塔に行けばすんなり元の世界に戻れるってわけでもないわけね」
line = "「フィーニスの塔に行けばすんなり元の世界に戻れるってわけでもないわけね」"

[[dialogue]]
speaker = "フィオナ"
# 「それに、もしかするとルリエルもこちらの世界に迷い込んでしまったのかもしれません。私たちと同じように……」
line = "「それに、もしかするとルリエルもこちらの世界に迷い込んでしまったのかもしれません。私たちと同じように……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「大いに有り得るわね。元の世界に戻る方法を探しながら、彼女のことも探してみましょ」
line = "「大いに有り得るわね。元の世界に戻る方法を探しながら、彼女のことも探してみましょ」"

[[dialogue]]
speaker = "フィオナ"
# 「はい！　では早速散策してみましょう……！　平行世界を歩き回れるなんて、滅多に出来ない体験ですから……！」
line = "「はい！　では早速散策してみましょう……！　平行世界を歩き回れるなんて、滅多に出来ない体験ですから……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「わわっ、そんなに引っ張らなくても……！　珍しいわね、フィオナがそこまでテンションを上げるなんて……」
line = "「わわっ、そんなに引っ張らなくても……！　珍しいわね、フィオナがそこまでテンションを上げるなんて……」"

[[dialogue]]
speaker = "フィオナ"
# 「そ、そのようなつもりは。私は、えと、ルリエルのことが心配で心配で堪らないだけで」
line = "「そ、そのようなつもりは。私は、えと、ルリエルのことが心配で心配で堪らないだけで」"

[[dialogue]]
speaker = "聖沙"
# 「なら私たちが案内してあげるわ。いいですよね、先輩？」
line = "「なら私たちが案内してあげるわ。いいですよね、先輩？」"

[[dialogue]]
speaker = "リア"
# 「もっちろん♪　困っている人の助けになるのも流星クルセイダースの務めだから。ね♪」
line = "「もっちろん♪　困っている人の助けになるのも流星クルセイダースの務めだから。ね♪」"
