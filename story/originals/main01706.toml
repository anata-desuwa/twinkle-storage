[[dialogue]]
speaker = "unk"
# 第７話,リ・クリエ,B
line = "第７話,リ・クリエ,B"

[[dialogue]]
speaker = "クロト"
# 「おおおおおおお────っ！！」
line = "「おおおおおおお────っ！！」"

[[dialogue]]
speaker = "魔神ギエル"
# 「ムゥゥゥゥゥゥゥゥン──────！！！」
line = "「ムゥゥゥゥゥゥゥゥン──────！！！」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
# 「ぐ──っ────！！」
line = "「ぐ──っ────！！」"

[[dialogue]]
speaker = "アポロ"
# 「まだだ──あの玉を砕くまで油断するな！」
line = "「まだだ──あの玉を砕くまで油断するな！」"

[[dialogue]]
speaker = "unk"
# 互いのとどめの一撃は、最後まで拮抗する──！
line = "互いのとどめの一撃は、最後まで拮抗する──！"

[[dialogue]]
speaker = "魔神ギエル"
# 「よく粘ル──ダガ──『リクリエ』が宿ッテイル限り、私ハ不滅ダ──！」
line = "「よく粘ル──ダガ──『リクリエ』が宿ッテイル限り、私ハ不滅ダ──！」"

[[dialogue]]
speaker = "アナ"
# 「ッ、修復しました──！」
line = "「ッ、修復しました──！」"

[[dialogue]]
speaker = "クロト"
# 「問題ない──波状攻撃を仕掛けるぞ！」
line = "「問題ない──波状攻撃を仕掛けるぞ！」"

[[dialogue]]
speaker = "ユウリ"
# 「ああ──『使徒』相手のやり方は、もう十分学んだってんだ！」
line = "「ああ──『使徒』相手のやり方は、もう十分学んだってんだ！」"

[[dialogue]]
speaker = "unk"
# ギエルの『影』が俺たち全員を呑み込まんと迫る。
line = "ギエルの『影』が俺たち全員を呑み込まんと迫る。"

[[dialogue]]
speaker = "unk"
# 確かに絶望的な強さだ。
line = "確かに絶望的な強さだ。"

[[dialogue]]
speaker = "unk"
# だけど、俺たちはそんな絶望的な敵を何度だって乗り越えてきた。
line = "だけど、俺たちはそんな絶望的な敵を何度だって乗り越えてきた。"

[[dialogue]]
speaker = "unk"
# 魔王の三重奏を主軸に──ギエルの再生を上回る速度で攻撃を叩き込んでいく。
line = "魔王の三重奏を主軸に──ギエルの再生を上回る速度で攻撃を叩き込んでいく。"

[[dialogue]]
speaker = "リノ"
# 「いいわよみんな、このままいけばこっちが優勢──」
line = "「いいわよみんな、このままいけばこっちが優勢──」"

[[dialogue]]
speaker = "unk"
# ──かと思われた、が。
line = "──かと思われた、が。"

[[dialogue]]
speaker = "魔神ギエル"
# 「……フゥ」
line = "「……フゥ」"

[[dialogue]]
speaker = "魔神ギエル"
# 「イイダロウ……もはや、遊ンデヤルのも飽きたトコロダ」
line = "「イイダロウ……もはや、遊ンデヤルのも飽きたトコロダ」"

[[dialogue]]
speaker = "unk"
# ──ふっ、と。
line = "──ふっ、と。"

[[dialogue]]
speaker = "unk"
# マグマのように噴き上げていたギエルの瘴気が……途端に勢いを失った。
line = "マグマのように噴き上げていたギエルの瘴気が……途端に勢いを失った。"

[[dialogue]]
speaker = "ルリエル"
# 「え……？」
line = "「え……？」"

[[dialogue]]
speaker = "マトイ"
# 「や、やったの──？」
line = "「や、やったの──？」"

[[dialogue]]
speaker = "unk"
# 闇の領域も──『影』による侵蝕も何もかも静まった。
line = "闇の領域も──『影』による侵蝕も何もかも静まった。"

[[dialogue]]
speaker = "unk"
# 辺りはただ、不気味な静寂に支配される。
line = "辺りはただ、不気味な静寂に支配される。"

[[dialogue]]
speaker = "クロト"
# （力尽きた──いや、違う。なんだ……この、おぞましい気配は）
line = "（力尽きた──いや、違う。なんだ……この、おぞましい気配は）"

[[dialogue]]
speaker = "魔神ギエル"
# 「喜べ。人間界へ広ゲテイタあらゆるリクリエ現象ヲ、鎮メテやったぞ」
line = "「喜べ。人間界へ広ゲテイタあらゆるリクリエ現象ヲ、鎮メテやったぞ」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
# 「あ……」
line = "「あ……」"

[[dialogue]]
speaker = "unk"
# 遠くを眺める。まだ彼方に浮かんでいたアステラの影が、ことごとく消えていた。
line = "遠くを眺める。まだ彼方に浮かんでいたアステラの影が、ことごとく消えていた。"

[[dialogue]]
speaker = "ルリエル"
# 「う、嘘ですよね？　え……なんで……？」
line = "「う、嘘ですよね？　え……なんで……？」"

[[dialogue]]
speaker = "ニャリオン"
# 「ほ……本当みたいニャン。地上はなんだか落ち着いてるニャンよ……？」
line = "「ほ……本当みたいニャン。地上はなんだか落ち着いてるニャンよ……？」"

[[dialogue]]
speaker = "アポロ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# 総てのアステライトが消滅した。
line = "総てのアステライトが消滅した。"

[[dialogue]]
speaker = "unk"
# 総てのモンスターが去っていった。
line = "総てのモンスターが去っていった。"

[[dialogue]]
speaker = "unk"
# だが──喜べる気配は微塵もなかった。その<b>代わり</b>とでも言うべきかのように、ギエルに集う再創生の瘴気が格段に高まっていく！
line = "だが──喜べる気配は微塵もなかった。その<b>代わり</b>とでも言うべきかのように、ギエルに集う再創生の瘴気が格段に高まっていく！"

[[dialogue]]
speaker = "魔神ギエル"
# 「クフフ……サア──森羅万象を司リシ崇高なるリクリエノ覇気ヨ、我ガ心臓ニ集ウがイイ──！」
line = "「クフフ……サア──森羅万象を司リシ崇高なるリクリエノ覇気ヨ、我ガ心臓ニ集ウがイイ──！」"

[[dialogue]]
speaker = "ソフィア"
# 「なっ──！」
line = "「なっ──！」"

[[dialogue]]
speaker = "セーラ"
# 「気ぃつけて──まだ終わってないよ！」
line = "「気ぃつけて──まだ終わってないよ！」"

[[dialogue]]
speaker = "unk"
# 全世界規模で消滅した何千、何万というアステラ・モンスターの芯すべてが──ギエルの覇霊玉へ集約されていく──！
line = "全世界規模で消滅した何千、何万というアステラ・モンスターの芯すべてが──ギエルの覇霊玉へ集約されていく──！"

[[dialogue]]
speaker = "魔神ギエル"
# 「コレガ……絶望ノ、真ナル姿ダ────！！」
line = "「コレガ……絶望ノ、真ナル姿ダ────！！」"

[[dialogue]]
speaker = "クロト"
# 「──」
line = "「──」"

[[dialogue]]
speaker = "マトイ"
# 「そんな……」
line = "「そんな……」"

[[dialogue]]
speaker = "ソフィア"
# 「まだ、力を残して……」
line = "「まだ、力を残して……」"

[[dialogue]]
speaker = "unk"
# 邪悪なる異形の化身が──天高くに君臨していた。
line = "邪悪なる異形の化身が──天高くに君臨していた。"

[[dialogue]]
speaker = "unk"
# それは、アポロでさえも到達しえなかった、<ruby=リクリエ>終焉</ruby>との完全なる融合体。
line = "それは、アポロでさえも到達しえなかった、<ruby>終焉<rt>リクリエ</rt></ruby>との完全なる融合体。"

[[dialogue]]
speaker = "unk"
# 希崎レイトの──ギエルが人間であった頃の面影はもはや、ない。
line = "希崎レイトの──ギエルが人間であった頃の面影はもはや、ない。"

[[dialogue]]
speaker = "魔神ギエル"
# 「リクリエハ、止メラレナイモノダ」
line = "「リクリエハ、止メラレナイモノダ」"

[[dialogue]]
speaker = "魔神ギエル"
# 「星ノ運行ガ揺ルギナイヨウニ。総テハ、宇宙ノ摂理ダカラダ」
line = "「星ノ運行ガ揺ルギナイヨウニ。総テハ、宇宙ノ摂理ダカラダ」"

[[dialogue]]
speaker = "unk"
# そんな変わり果てた姿のギエルが、告げる。
line = "そんな変わり果てた姿のギエルが、告げる。"

[[dialogue]]
speaker = "魔神ギエル"
# 「──マクロ・ノヴァ・ブラスト──」
line = "「──マクロ・ノヴァ・ブラスト──」"

[[dialogue]]
speaker = "クロト"
# 「ぐ──おおおおおおおおッッッ！！」
line = "「ぐ──おおおおおおおおッッッ！！」"

[[dialogue]]
speaker = "アポロ"
# 「下がれ魔王──ここはあたしが──っ！」
line = "「下がれ魔王──ここはあたしが──っ！」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
# 「いいえ、私も──く────ッッ──────！！！」
line = "「いいえ、私も──く────ッッ──────！！！」"

[[dialogue]]
speaker = "unk"
# ギエルの手元に生成された闇の球体──
line = "ギエルの手元に生成された闇の球体──"

[[dialogue]]
speaker = "unk"
# 超質量を誇るその天体は、目のくらむ輝きを放って大爆発を引き起こした。
line = "超質量を誇るその天体は、目のくらむ輝きを放って大爆発を引き起こした。"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロト──ッ！」
line = "「クロト──ッ！」"

[[dialogue]]
speaker = "ソフィア"
# 「フィオナ会長──！」
line = "「フィオナ会長──！」"

[[dialogue]]
speaker = "魔神ギエル"
# 「ククク……ハハハハ！　<ruby=ツイ>終</ruby>ニ！　終ニ魔王ヲ<ruby=タオ>斃</ruby>シタゾ！　復讐ハ為ッタ！　崇高ナルチャカパラ神ニ大イナル祝福ヲ！！」
line = "「ククク……ハハハハ！　<ruby>終<rt>ツイ</rt></ruby>ニ！　終ニ魔王ヲ<ruby>斃<rt>タオ</rt></ruby>シタゾ！　復讐ハ為ッタ！　崇高ナルチャカパラ神ニ大イナル祝福ヲ！！」"

[[dialogue]]
speaker = "クロト"
# 「ぐ──づっ、うっ……ッ……！」
line = "「ぐ──づっ、うっ……ッ……！」"

[[dialogue]]
speaker = "unk"
# 倒れ伏した俺たちの頭上から、高らかな笑い声が聞こえる。
line = "倒れ伏した俺たちの頭上から、高らかな笑い声が聞こえる。"

[[dialogue]]
speaker = "unk"
# 全員が、未経験の衝撃に打ちのめされていた。
line = "全員が、未経験の衝撃に打ちのめされていた。"

[[dialogue]]
speaker = "アナ"
# 「マクロ・ノヴァ──別称キロノヴァ……新星爆発の１０００倍近い輝度を放つ、天体爆発現象……」
line = "「マクロ・ノヴァ──別称キロノヴァ……新星爆発の１０００倍近い輝度を放つ、天体爆発現象……」"

[[dialogue]]
speaker = "セーラ"
# 「──なんでもあり、すぎるっしょ……！　今のって、グレートウォールがなかったら……」
line = "「──なんでもあり、すぎるっしょ……！　今のって、グレートウォールがなかったら……」"

[[dialogue]]
speaker = "リノ"
# 「人間界どころか──月まで消し飛んでいたでしょうね……！」
line = "「人間界どころか──月まで消し飛んでいたでしょうね……！」"

[[dialogue]]
speaker = "アナ"
# 「ありえません──こんなの……！　従者どころか──彼が、リクリエを従えてる……！？」
line = "「ありえません──こんなの……！　従者どころか──彼が、リクリエを従えてる……！？」"

[[dialogue]]
speaker = "魔神ギエル"
# 「リクリエノ使徒──今ノ私コソガ、ソノ完全ナル姿ダ」
line = "「リクリエノ使徒──今ノ私コソガ、ソノ完全ナル姿ダ」"

[[dialogue]]
speaker = "魔神ギエル"
# 「使徒、トイウ呼称サエ、モハヤ適切デハナイ。今ノ私ハ──スデニ『リクリエ』ソノモノデアル」
line = "「使徒、トイウ呼称サエ、モハヤ適切デハナイ。今ノ私ハ──スデニ『リクリエ』ソノモノデアル」"

[[dialogue]]
speaker = "クロト"
# 「────」
line = "「────」"

[[dialogue]]
speaker = "unk"
# その言葉は……俺たちの心を折るのに十分だった。
line = "その言葉は……俺たちの心を折るのに十分だった。"

[[dialogue]]
speaker = "unk"
# 仮面の瘴気──敗残者の血筋──覇霊玉──その総てと結合した今のギエルは、リクリエの本波と完全な一体化を果たした。
line = "仮面の瘴気──敗残者の血筋──覇霊玉──その総てと結合した今のギエルは、リクリエの本波と完全な一体化を果たした。"

[[dialogue]]
speaker = "unk"
# 文字通り、人の型に押し留めた、宇宙災厄。
line = "文字通り、人の型に押し留めた、宇宙災厄。"

[[dialogue]]
speaker = "マトイ"
# （私たち星騎士は──リクリエに対抗するもの──だけど──）
line = "（私たち星騎士は──リクリエに対抗するもの──だけど──）"

[[dialogue]]
speaker = "ソフィア"
# （こんなの……勝てるはず……ありません……）
line = "（こんなの……勝てるはず……ありません……）"

[[dialogue]]
speaker = "unk"
# マトイやソフィアを責めることはできない。
line = "マトイやソフィアを責めることはできない。"

[[dialogue]]
speaker = "unk"
# なぜなら俺も、怯えていた。
line = "なぜなら俺も、怯えていた。"

[[dialogue]]
speaker = "unk"
# 目の前の魔神に。リクリエに。自分たちが相対しているものの強大さに。
line = "目の前の魔神に。リクリエに。自分たちが相対しているものの強大さに。"

[[dialogue]]
speaker = "unk"
# 心の底から──生命体としての本能が屈服してしまうほどの、純然たる恐怖。
line = "心の底から──生命体としての本能が屈服してしまうほどの、純然たる恐怖。"

[[dialogue]]
speaker = "魔神ギエル"
# 「コノ体ハ力ヲ留メテオクノガ難シイナ。ツイ足踏ミヲシタダケデ、ブラックホールガ生マレテシマウ」
line = "「コノ体ハ力ヲ留メテオクノガ難シイナ。ツイ足踏ミヲシタダケデ、ブラックホールガ生マレテシマウ」"

[[dialogue]]
speaker = "クロト"
# （なんだ……なんなんだ……この化け物は……！）
line = "（なんだ……なんなんだ……この化け物は……！）"

[[dialogue]]
speaker = "unk"
# アステラやモンスターと戦って、俺たちはリクリエの脅威を正しく理解しているつもりでいた。
line = "アステラやモンスターと戦って、俺たちはリクリエの脅威を正しく理解しているつもりでいた。"

[[dialogue]]
speaker = "unk"
# でも、甘かった。俺たちは所詮、爪先ほどしか認識できていなかった。
line = "でも、甘かった。俺たちは所詮、爪先ほどしか認識できていなかった。"

[[dialogue]]
speaker = "unk"
# 宇宙そのものを創り変えるほどの理を前に──人類の力なんて、どれほどちっぽけなことか。
line = "宇宙そのものを創り変えるほどの理を前に──人類の力なんて、どれほどちっぽけなことか。"
