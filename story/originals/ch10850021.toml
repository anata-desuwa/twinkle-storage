[[dialogue]]
speaker = "unk"
# 第１話,ママダレナと甘やかしバカンス,P
line = "第１話,ママダレナと甘やかしバカンス,P"

[[dialogue]]
speaker = "unk"
# とある休日。俺は恋人のマグダレナと、リゾート結界のプライベートビーチへ遊びに来ていた。
line = "とある休日。俺は恋人のマグダレナと、リゾート結界のプライベートビーチへ遊びに来ていた。"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「会長、おはようございます～♪」
line = "「会長、おはようございます～♪」"

[[dialogue]]
speaker = "unk"
# マグダレナが附属生の小さな体で着ているのは、最近手に入れた水着フォームだった。
line = "マグダレナが附属生の小さな体で着ているのは、最近手に入れた水着フォームだった。"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「え？　――今日も水着が似合ってて可愛い、ですか？」
line = "「え？　――今日も水着が似合ってて可愛い、ですか？」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「えへへ<emoji=heart04>　ありがとうございます～<emoji=heart04>　会長に褒められると、ママダレナ、愛が溢れてキュンキュンしちゃいます～<emoji=heart04>」
line = "「えへへ<emoji=heart04>　ありがとうございます～<emoji=heart04>　会長に褒められると、ママダレナ、愛が溢れてキュンキュンしちゃいます～<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 改めて、ちゃんと褒めたかったんだ
line = "改めて、ちゃんと褒めたかったんだ"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「――今日は恋人同士、２人きりのデートだから？　ふふっ♪　なら今日は、ママダレナとゆっくりバカンスを楽しんじゃいましょうね♪」
line = "「――今日は恋人同士、２人きりのデートだから？　ふふっ♪　なら今日は、ママダレナとゆっくりバカンスを楽しんじゃいましょうね♪」"

[[dialogue]]
speaker = "unk"
# それから海で軽く遊んだあとは、砂浜のパラソルの下に敷いたビーチマットで、まったりくつろぐことにした。
line = "それから海で軽く遊んだあとは、砂浜のパラソルの下に敷いたビーチマットで、まったりくつろぐことにした。"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「会長、こちらへどうぞ～♪　ママダレナが、た～っぷり甘やかして差し上げますね<emoji=heart04>」
line = "「会長、こちらへどうぞ～♪　ママダレナが、た～っぷり甘やかして差し上げますね<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 誘われるまま、俺はマグダレナの太ももに頭を預け、膝枕をしてもらう。
line = "誘われるまま、俺はマグダレナの太ももに頭を預け、膝枕をしてもらう。"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「ふふっ……ママダレナのお膝、気持ちいいですか～？」
line = "「ふふっ……ママダレナのお膝、気持ちいいですか～？」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「――気持ち良くて眠くなっちゃいそう……？　よかったです～♪　会長、いつもお仕事を頑張ってますもんね♪」
line = "「――気持ち良くて眠くなっちゃいそう……？　よかったです～♪　会長、いつもお仕事を頑張ってますもんね♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「眠くなったら、そのまま寝ちゃって大丈夫ですよ～。ママダレナがずっと撫でててあげますからね<emoji=heart04>」
line = "「眠くなったら、そのまま寝ちゃって大丈夫ですよ～。ママダレナがずっと撫でててあげますからね<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「ほら……会長、いつも頑張ってえらいえらい♪　よしよし……なでなで♪」
line = "「ほら……会長、いつも頑張ってえらいえらい♪　よしよし……なでなで♪」"

[[dialogue]]
speaker = "unk"
# 俺がしばらく膝枕に身をゆだねていると、マグダレナがクーラーボックスから小さく切ったメロンを取り出した。
line = "俺がしばらく膝枕に身をゆだねていると、マグダレナがクーラーボックスから小さく切ったメロンを取り出した。"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「はい、会長♪　ママダレナのメロンをどうぞ……あ～ん<emoji=heart04>」
line = "「はい、会長♪　ママダレナのメロンをどうぞ……あ～ん<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「えへへ～<emoji=heart04>　ちゃんと食べてくれましたね<emoji=heart04>　会長をお世話できると……ママダレナ、とっても幸せな気持ちになります～<emoji=heart04>」
line = "「えへへ～<emoji=heart04>　ちゃんと食べてくれましたね<emoji=heart04>　会長をお世話できると……ママダレナ、とっても幸せな気持ちになります～<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# じゃあ、次は俺からもしてあげたい
line = "じゃあ、次は俺からもしてあげたい"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「いいんですか？　ふふっ、じゃあ恋人として、ママダレナもちょっと甘えちゃいますね<emoji=heart04>」
line = "「いいんですか？　ふふっ、じゃあ恋人として、ママダレナもちょっと甘えちゃいますね<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「――あ～ん<emoji=heart04>　あむっ……もぐもぐ♪」
line = "「――あ～ん<emoji=heart04>　あむっ……もぐもぐ♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「ん～♪　えへへ、おいしいです～<emoji=heart04>　会長に食べさせてもらうと、愛でもっと甘く感じちゃいます<emoji=heart04>」
line = "「ん～♪　えへへ、おいしいです～<emoji=heart04>　会長に食べさせてもらうと、愛でもっと甘く感じちゃいます<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# フルーツの甘さを分け合ったあと、マグダレナが俺の顔を覗き込んでくる。
line = "フルーツの甘さを分け合ったあと、マグダレナが俺の顔を覗き込んでくる。"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「会長……このまま膝枕でもいいんですが、もう１つ甘えてもいいですか？」
line = "「会長……このまま膝枕でもいいんですが、もう１つ甘えてもいいですか？」"

[[dialogue]]
speaker = "unk"
# 俺が頷くと、マグダレナは嬉しそうに微笑んだ。
line = "俺が頷くと、マグダレナは嬉しそうに微笑んだ。"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「じゃあ、横に失礼しますね♪　……よいしょっ<emoji=heart04>」
line = "「じゃあ、横に失礼しますね♪　……よいしょっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# マグダレナは寄り添うように俺のすぐ隣に寝転ぶ。
line = "マグダレナは寄り添うように俺のすぐ隣に寝転ぶ。"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「えへへ<emoji=heart04>　ママダレナ、添い寝しちゃいます<emoji=heart04>　このままハグ……しますね♪」
line = "「えへへ<emoji=heart04>　ママダレナ、添い寝しちゃいます<emoji=heart04>　このままハグ……しますね♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「はい、ぎゅ～……です<emoji=heart04>」
line = "「はい、ぎゅ～……です<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺は優しく頭を抱き込まれ、ゆっくりと撫でられる。
line = "俺は優しく頭を抱き込まれ、ゆっくりと撫でられる。"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「ふふっ……どうですか？　会長、安心して眠れそうですか？」
line = "「ふふっ……どうですか？　会長、安心して眠れそうですか？」"

[[dialogue]]
speaker = "unk"
# 安心できるが……一方でこの抱き方だと、どうしてもマグダレナの大きな胸が顔に触れてしまうわけで。
line = "安心できるが……一方でこの抱き方だと、どうしてもマグダレナの大きな胸が顔に触れてしまうわけで。"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「え？　――眠るよりも、イチャイチャしたい気分になってきちゃった……？」
line = "「え？　――眠るよりも、イチャイチャしたい気分になってきちゃった……？」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「ふふっ……ママダレナのおっぱいが顔に当たっちゃったせい、ですか？　会長、かわいいです～<emoji=heart04>　甘えん坊の恋人さんですね♪　よしよし<emoji=heart04>」
line = "「ふふっ……ママダレナのおっぱいが顔に当たっちゃったせい、ですか？　会長、かわいいです～<emoji=heart04>　甘えん坊の恋人さんですね♪　よしよし<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「もちろんいいですよ～。ママダレナが、いっぱい甘やかして差し上げますね<emoji=heart04>」
line = "「もちろんいいですよ～。ママダレナが、いっぱい甘やかして差し上げますね<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「ん～<emoji=heart04>　ちゅっ<emoji=heart04>」
line = "「ん～<emoji=heart04>　ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# おでこに軽く触れる、柔らかなキス。
line = "おでこに軽く触れる、柔らかなキス。"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「……えへへっ<emoji=heart04>　会長、ドキッとしましたか～？」
line = "「……えへへっ<emoji=heart04>　会長、ドキッとしましたか～？」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「じゃあ……次は、もっと甘い気分にしちゃいますね♪　ん～っ<emoji=heart04>　ちゅっ……<emoji=heart04>」
line = "「じゃあ……次は、もっと甘い気分にしちゃいますね♪　ん～っ<emoji=heart04>　ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 今度は正面から、そっと唇が触れ合う。
line = "今度は正面から、そっと唇が触れ合う。"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「ふふっ……会長の甘えてる時の顔、すごく好きです……<emoji=heart04>」
line = "「ふふっ……会長の甘えてる時の顔、すごく好きです……<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「今度は、会長の方から……甘えてほしいです<emoji=heart04>」
line = "「今度は、会長の方から……甘えてほしいです<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「ん～っ……<emoji=heart04>　ちゅっ……ちゅっ……<emoji=heart04>」
line = "「ん～っ……<emoji=heart04>　ちゅっ……ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# その後もしばらく、お互いに甘えたり甘やかされたりして、フルーツよりも甘いバカンスを満喫するのだった。
line = "その後もしばらく、お互いに甘えたり甘やかされたりして、フルーツよりも甘いバカンスを満喫するのだった。"
