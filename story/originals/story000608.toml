[[dialogue]]
speaker = "unk"
# 以前、俺は何度も新星寮へ出入りして、内部構造をよく知っていた。それにより、俺が移動指示を担当。潜入ミッションは今のところ順調に進んでいた――
line = "以前、俺は何度も新星寮へ出入りして、内部構造をよく知っていた。それにより、俺が移動指示を担当。潜入ミッションは今のところ順調に進んでいた――"

[[dialogue]]
speaker = "紅明"
# 「よし、次はここの部屋っしょ。セッシー、お願い」
line = "「よし、次はここの部屋っしょ。セッシー、お願い」"

[[dialogue]]
speaker = "セシア"
# 「わかったわ、紅明ママ♪　妖精を出すわね」
line = "「わかったわ、紅明ママ♪　妖精を出すわね」"

[[dialogue]]
speaker = "unk"
# 各部屋の鍵は紅明がサンタの袋から出した鍵で解錠。セシアが星力で羽の生えた小さな妖精を作り出し、それにプレゼントを持たせると――
line = "各部屋の鍵は紅明がサンタの袋から出した鍵で解錠。セシアが星力で羽の生えた小さな妖精を作り出し、それにプレゼントを持たせると――"

[[dialogue]]
speaker = "セシア"
# 「ドアの隙間からそ～っと、音を立てないように枕元まで……うん、枕元に置けたわ。メリークリスマス……よい夢を♪」
line = "「ドアの隙間からそ～っと、音を立てないように枕元まで……うん、枕元に置けたわ。メリークリスマス……よい夢を♪」"

[[dialogue]]
speaker = "ヨミ"
# 「セシアちゃんの妖精、爆裂便利ですね……視覚情報まで共有できるなんて」
line = "「セシアちゃんの妖精、爆裂便利ですね……視覚情報まで共有できるなんて」"

[[dialogue]]
speaker = "セシア"
# 「クリスマスプレゼントを配って、力が蓄積されたことで使えるようになったのよ。複数出すこともできるわ」
line = "「クリスマスプレゼントを配って、力が蓄積されたことで使えるようになったのよ。複数出すこともできるわ」"

[[dialogue]]
speaker = "ヨミ"
# 「っ……！？　皆さん、静かに……！」
line = "「っ……！？　皆さん、静かに……！」"

[[dialogue]]
speaker = "unk"
# ヨミは魔族として、この中で１番嗅覚と聴覚が優れていることを活かし、周囲の警戒を担当していた。
line = "ヨミは魔族として、この中で１番嗅覚と聴覚が優れていることを活かし、周囲の警戒を担当していた。"

[[dialogue]]
speaker = "unk"
# ということは、まさか……！？
line = "ということは、まさか……！？"

[[dialogue]]
speaker = "ヨミ"
# 「か、隠れて下さいっ。あの人が……マムがきます……！」
line = "「か、隠れて下さいっ。あの人が……マムがきます……！」"

[[dialogue]]
speaker = "紅明"
# 「マジか……！　ヤバい……！」
line = "「マジか……！　ヤバい……！」"

[[dialogue]]
speaker = "セシア"
# 「マム、どんな人か観察したいけど……」
line = "「マム、どんな人か観察したいけど……」"

[[dialogue]]
speaker = "ヨミ"
# 「絶対にダメですっ」
line = "「絶対にダメですっ」"

[[dialogue]]
speaker = "セシア"
# 「残念だわ……」
line = "「残念だわ……」"

[[dialogue]]
speaker = "セシア"
# 「あっ、床板を踏んだら、軋んで音が……！」
line = "「あっ、床板を踏んだら、軋んで音が……！」"

[[dialogue]]
speaker = "unk"
# マズい、セシアこっちに隠れてっ
line = "マズい、セシアこっちに隠れてっ"

[[dialogue]]
speaker = "マハムート"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ヨミ"
# （ひいぃっ……！）
line = "（ひいぃっ……！）"

[[dialogue]]
speaker = "セシア"
# （暗くてよく見えないわね……）
line = "（暗くてよく見えないわね……）"

[[dialogue]]
speaker = "紅明"
# （相変わらずマム、お師匠様みたいな迫力だぜ……！）
line = "（相変わらずマム、お師匠様みたいな迫力だぜ……！）"

[[dialogue]]
speaker = "マハムート"
# 「……どうやら、気のせいみたいね」
line = "「……どうやら、気のせいみたいね」"

[[dialogue]]
speaker = "unk"
# （た、助かった……）
line = "（た、助かった……）"

[[dialogue]]
speaker = "セシア"
# 「会長、さっきはわたくしを抱っこして隠れてくれたおかげで、助かったわ。ありがとう」
line = "「会長、さっきはわたくしを抱っこして隠れてくれたおかげで、助かったわ。ありがとう」"

[[dialogue]]
speaker = "セシア"
# 「男の人に抱っこされたのは初めてだからかしら。ママの母性とは違う、不思議な感じがしたわ」
line = "「男の人に抱っこされたのは初めてだからかしら。ママの母性とは違う、不思議な感じがしたわ」"

[[dialogue]]
speaker = "unk"
# 嫌じゃなかった？
line = "嫌じゃなかった？"

[[dialogue]]
speaker = "セシア"
# 「大丈夫よ。むしろさっきの不思議な感じは興味があるわ。でも、それよりも今は、サンタ大作戦を成功させないとね」
line = "「大丈夫よ。むしろさっきの不思議な感じは興味があるわ。でも、それよりも今は、サンタ大作戦を成功させないとね」"

[[dialogue]]
speaker = "紅明"
# 「仕切り直して、ダーリン、次の指示をお願い。マムの去っていった方とは逆方向から攻めた方がいいと思うんだよね――」
line = "「仕切り直して、ダーリン、次の指示をお願い。マムの去っていった方とは逆方向から攻めた方がいいと思うんだよね――」"

[[dialogue]]
speaker = "unk"
# それから再び、俺たちはサンタ大作戦を進めていたのだが――
line = "それから再び、俺たちはサンタ大作戦を進めていたのだが――"

[[dialogue]]
speaker = "unk"
# その時は突然やってきた。
line = "その時は突然やってきた。"

[[dialogue]]
speaker = "マハムート"
# 「……やはり、誰かいるわね」
line = "「……やはり、誰かいるわね」"

[[dialogue]]
speaker = "セシア"
# 「え？」
line = "「え？」"

[[dialogue]]
speaker = "ヨミ"
# 「こやあぁぁぁっ！？」
line = "「こやあぁぁぁっ！？」"

[[dialogue]]
speaker = "紅明"
# 「ちょっ、いきなり鉄球が飛んできた！？　マジか！」
line = "「ちょっ、いきなり鉄球が飛んできた！？　マジか！」"

[[dialogue]]
speaker = "ヨミ"
# 「に、逃げて下さいっ！　マムです！」
line = "「に、逃げて下さいっ！　マムです！」"

[[dialogue]]
speaker = "マハムート"
# 「……逃がさないわ」
line = "「……逃がさないわ」"

[[dialogue]]
speaker = "ヨミ"
# 「ひいぃっ！　超スピードで追ってきますぅっ！」
line = "「ひいぃっ！　超スピードで追ってきますぅっ！」"

[[dialogue]]
speaker = "紅明"
# 「ヤバいヤバいヤバい！　みんな逃げるっしょぉぉぉっ！」
line = "「ヤバいヤバいヤバい！　みんな逃げるっしょぉぉぉっ！」"

[[dialogue]]
speaker = "unk"
# 俺たちは全力でその場から逃走を開始した――
line = "俺たちは全力でその場から逃走を開始した――"

[[dialogue]]
speaker = "ヨミ"
# 「こやあぁぁぁっ！　マム、警告なしで容赦なく鉄球飛ばしまくってくるんですけどぉぉぉっ！？」
line = "「こやあぁぁぁっ！　マム、警告なしで容赦なく鉄球飛ばしまくってくるんですけどぉぉぉっ！？」"

[[dialogue]]
speaker = "紅明"
# 「いやマジでシャレにならないんだが！？　これ当たったら死ぬって！」
line = "「いやマジでシャレにならないんだが！？　これ当たったら死ぬって！」"

[[dialogue]]
speaker = "マハムート"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "紅明"
# 「ぎゃあぁぁぁっ！　危なぁぁぁっ！？　今ちょっと掠ったんだけどっ！？　ていうか無言で追ってくるの超怖ぇぇぇっ！」
line = "「ぎゃあぁぁぁっ！　危なぁぁぁっ！？　今ちょっと掠ったんだけどっ！？　ていうか無言で追ってくるの超怖ぇぇぇっ！」"

[[dialogue]]
speaker = "ヨミ"
# 「だから侵入するの止めようって言ったじゃないですかぁぁっ！」
line = "「だから侵入するの止めようって言ったじゃないですかぁぁっ！」"

[[dialogue]]
speaker = "セシア"
# 「やっぱり……！　遠目に見るだけでも、強力なママの波動を感じるわ♪」
line = "「やっぱり……！　遠目に見るだけでも、強力なママの波動を感じるわ♪」"

[[dialogue]]
speaker = "ヨミ"
# 「セシアちゃんはなんでそんな爆裂嬉しそうなんですか！？」
line = "「セシアちゃんはなんでそんな爆裂嬉しそうなんですか！？」"

[[dialogue]]
speaker = "セシア"
# 「ヨミヨミ、なにを言っているの？　ママと鬼ごっこをして嬉しくならない子供がいるとでも？」
line = "「ヨミヨミ、なにを言っているの？　ママと鬼ごっこをして嬉しくならない子供がいるとでも？」"

[[dialogue]]
speaker = "ヨミ"
# 「鉄球が飛んでくるこの状況で！？」
line = "「鉄球が飛んでくるこの状況で！？」"

[[dialogue]]
speaker = "紅明"
# 「っ……！　そうだ、このままじゃセッシーが危ない……！」
line = "「っ……！　そうだ、このままじゃセッシーが危ない……！」"

[[dialogue]]
speaker = "ヨミ"
# 「紅明先輩！？　立ち止まったりして、どうしたんですか！？　すぐにマムに追いつかれちゃいますよ！？」
line = "「紅明先輩！？　立ち止まったりして、どうしたんですか！？　すぐにマムに追いつかれちゃいますよ！？」"

[[dialogue]]
speaker = "紅明"
# 「ヨミヨミ、ダーリン。ここはアタシに任せて、先に行け！　アタシがマムと戦って、足止めをする……！」
line = "「ヨミヨミ、ダーリン。ここはアタシに任せて、先に行け！　アタシがマムと戦って、足止めをする……！」"

[[dialogue]]
speaker = "ヨミ"
# 「馬鹿ですか！？　死にますよ！？」
line = "「馬鹿ですか！？　死にますよ！？」"

[[dialogue]]
speaker = "マハムート"
# 「……残念だけど、牛紅明。どっちみち全員逃さないわよ」
line = "「……残念だけど、牛紅明。どっちみち全員逃さないわよ」"

[[dialogue]]
speaker = "ヨミ"
# 「こやあぁぁぁっ！？　追いつかれちゃいましたぁぁぁっ！」
line = "「こやあぁぁぁっ！？　追いつかれちゃいましたぁぁぁっ！」"

[[dialogue]]
speaker = "マハムート"
# 「……侵入者は、あなたたちだったのね」
line = "「……侵入者は、あなたたちだったのね」"

[[dialogue]]
speaker = "セシア"
# 「一目でわかるわ。圧倒的なママオーラ……！　間違いなく、わたくしの新しいママね♪」
line = "「一目でわかるわ。圧倒的なママオーラ……！　間違いなく、わたくしの新しいママね♪」"

[[dialogue]]
speaker = "マハムート"
# 「……ちょっとそっちの小さい子は何を言っているのかわからないけど、私と戦うということでいいのかしら？　紅明」
line = "「……ちょっとそっちの小さい子は何を言っているのかわからないけど、私と戦うということでいいのかしら？　紅明」"

[[dialogue]]
speaker = "紅明"
# 「おうよ！　こうなった以上、もはや逃げも隠れもしないぜ！　あんたをここで倒して、クリスマスプレゼントを配り切る！」
line = "「おうよ！　こうなった以上、もはや逃げも隠れもしないぜ！　あんたをここで倒して、クリスマスプレゼントを配り切る！」"

[[dialogue]]
speaker = "マハムート"
# 「……そう。あなたとは１度、本気で戦ってみたかったから、いい機会だわ」
line = "「……そう。あなたとは１度、本気で戦ってみたかったから、いい機会だわ」"

[[dialogue]]
speaker = "紅明"
# 「マムからそう言ってもらえるなんて、光栄だね」
line = "「マムからそう言ってもらえるなんて、光栄だね」"

[[dialogue]]
speaker = "マハムート"
# 「……あなた、前からずっと思っていたんだけど――」
line = "「……あなた、前からずっと思っていたんだけど――」"

[[dialogue]]
speaker = "マハムート"
# 「強いのに、実力を隠しているでしょう？」
line = "「強いのに、実力を隠しているでしょう？」"

[[dialogue]]
speaker = "マハムート"
# 「どういう理由かわからないけど、あなたからは私よりもずっと、戦い慣れた強者の匂いがするのよ」
line = "「どういう理由かわからないけど、あなたからは私よりもずっと、戦い慣れた強者の匂いがするのよ」"

[[dialogue]]
speaker = "紅明"
# 「説明が簡単じゃないからアレだけど……まあ、戦い慣れてるのは合ってるよ。昔、歴史に残るようなとびきり強い連中と、色々あってね」
line = "「説明が簡単じゃないからアレだけど……まあ、戦い慣れてるのは合ってるよ。昔、歴史に残るようなとびきり強い連中と、色々あってね」"

[[dialogue]]
speaker = "unk"
# 言葉を交わしつつ、両者は戦闘態勢に入る。
line = "言葉を交わしつつ、両者は戦闘態勢に入る。"

[[dialogue]]
speaker = "セシア"
# 「２人のママが戦うの？　セシアは一体どっちの応援をしたら……」
line = "「２人のママが戦うの？　セシアは一体どっちの応援をしたら……」"

[[dialogue]]
speaker = "unk"
# そこは紅明ママの応援では！？
line = "そこは紅明ママの応援では！？"

[[dialogue]]
speaker = "unk"
# ふと、その時、セシアの体が光り出し――
line = "ふと、その時、セシアの体が光り出し――"

[[dialogue]]
speaker = "セシア"
# 「あら？　なんだか、力が湧いてきて……」
line = "「あら？　なんだか、力が湧いてきて……」"

[[dialogue]]
speaker = "セシア"
# 「これは……？」
line = "「これは……？」"

[[dialogue]]
speaker = "ヨミ"
# 「セシアちゃんが変身しました……！」
line = "「セシアちゃんが変身しました……！」"

[[dialogue]]
speaker = "セシア"
# 「変身？　じゃあこれが、わたくしの戦闘服……？」
line = "「変身？　じゃあこれが、わたくしの戦闘服……？」"

[[dialogue]]
speaker = "unk"
# すると今度は、それに共鳴するかのように、マムの体が光り出して――
line = "すると今度は、それに共鳴するかのように、マムの体が光り出して――"

[[dialogue]]
speaker = "マハムート"
# 「…………！？」
line = "「…………！？」"

[[dialogue]]
speaker = "マハムート"
# 「体が勝手に『竜化』した……？」
line = "「体が勝手に『竜化』した……？」"

[[dialogue]]
speaker = "ヨミ"
# 「こやあぁぁぁっ！？　マムがとんでもない姿に変身したぁぁぁっ！？」
line = "「こやあぁぁぁっ！？　マムがとんでもない姿に変身したぁぁぁっ！？」"

[[dialogue]]
speaker = "マハムート"
# 「いや、本来の竜化とはまた違う……だとすれば、これはその子の力なのかしら？」
line = "「いや、本来の竜化とはまた違う……だとすれば、これはその子の力なのかしら？」"

[[dialogue]]
speaker = "セシア"
# 「ママが大きな竜になったのだわ……！　これはこれでアリね♪」
line = "「ママが大きな竜になったのだわ……！　これはこれでアリね♪」"

[[dialogue]]
speaker = "unk"
# アリなの！？
line = "アリなの！？"

[[dialogue]]
speaker = "紅明"
# 「おいおい、マジか……こいつはマジで本気出さんと勝てなさそうだぜ……！」
line = "「おいおい、マジか……こいつはマジで本気出さんと勝てなさそうだぜ……！」"

[[dialogue]]
speaker = "マハムート"
# 「……いずれにせよ、あなた達へのお仕置きにはちょうどいいわ――」
line = "「……いずれにせよ、あなた達へのお仕置きにはちょうどいいわ――」"

[[dialogue]]
speaker = "マハムート"
# 「さあ、いくわよ！」
line = "「さあ、いくわよ！」"

[[dialogue]]
speaker = "unk"
# 竜形態になったマムは咆哮すると、俺たちの前に立ちはだかるのだった――
line = "竜形態になったマムは咆哮すると、俺たちの前に立ちはだかるのだった――"
