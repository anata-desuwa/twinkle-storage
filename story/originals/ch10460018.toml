# 「あんっ<emoji=heart04>　おち○ちん抜けちゃ……<emoji=heart04>」
line = "「あんっ<emoji=heart04>　おち○ちん抜けちゃ……<emoji=heart04>」"

[[dialogue]]
speaker = "閃"
# 「んっ……はあぁ<emoji=heart04>　精子、中から溢れて来ちゃいます……<emoji=heart04>　会長さん、出し過ぎです……<emoji=heart04>　本当に１回で孕んじゃいますよ<emoji=heart04>」
line = "「んっ……はあぁ<emoji=heart04>　精子、中から溢れて来ちゃいます……<emoji=heart04>　会長さん、出し過ぎです……<emoji=heart04>　本当に１回で孕んじゃいますよ<emoji=heart04>」"

[[dialogue]]
speaker = "閃"
# 「初めてのセックス、お嬢様の部屋でしちゃいました……<emoji=heart04>　んっ……き、気持ち良かったかなんて、わざわざ聞かないで下さい……<emoji=heart04>」
line = "「初めてのセックス、お嬢様の部屋でしちゃいました……<emoji=heart04>　んっ……き、気持ち良かったかなんて、わざわざ聞かないで下さい……<emoji=heart04>」"

[[dialogue]]
speaker = "閃"
# 「会長さんこそ、どうだったんですか……？　気持ち良かったなら……その、よかったですけど……」
line = "「会長さんこそ、どうだったんですか……？　気持ち良かったなら……その、よかったですけど……」"

[[dialogue]]
speaker = "閃"
# 「えっと……それで……さっき言ったことって、本気なんですか……？」
line = "「えっと……それで……さっき言ったことって、本気なんですか……？」"

[[dialogue]]
speaker = "閃"
# 「は、孕ませたいって……お嬢様から寝取る、って言ったことです」
line = "「は、孕ませたいって……お嬢様から寝取る、って言ったことです」"

[[dialogue]]
speaker = "閃"
# 「本気……そ、そう、ですか……」
line = "「本気……そ、そう、ですか……」"

[[dialogue]]
speaker = "閃"
# 「え？　クローゼットから出る？　あ、ああ、後片付け……そうですよね、ぼーっとしてたら、お嬢様が戻って来ちゃいますし……」
line = "「え？　クローゼットから出る？　あ、ああ、後片付け……そうですよね、ぼーっとしてたら、お嬢様が戻って来ちゃいますし……」"

[[dialogue]]
speaker = "閃"
# 「……あ、あの、会長さん」
line = "「……あ、あの、会長さん」"

[[dialogue]]
speaker = "閃"
# 「少しだけ……いいですか？　顔をちょっと近付けて下さい……そう、それくらいで……」
line = "「少しだけ……いいですか？　顔をちょっと近付けて下さい……そう、それくらいで……」"

[[dialogue]]
speaker = "閃"
# 「んっ……<emoji=heart04>　ちゅっ……<emoji=heart04>」
line = "「んっ……<emoji=heart04>　ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "閃"
# 「えっと……今のは、会長さんの本気に対する、私の返事というか……つまり――」
line = "「えっと……今のは、会長さんの本気に対する、私の返事というか……つまり――」"

[[dialogue]]
speaker = "閃"
# 「私も、会長さんのこと……好き、です<emoji=heart04>」
line = "「私も、会長さんのこと……好き、です<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そう言って閃は目を逸らしながら、恥ずかしそうに顔を赤くするのだった。
line = "そう言って閃は目を逸らしながら、恥ずかしそうに顔を赤くするのだった。"
