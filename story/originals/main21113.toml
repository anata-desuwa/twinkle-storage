[[dialogue]]
speaker = "unk"
# 第１３話,終息,B
line = "第１３話,終息,B"

[[dialogue]]
speaker = "unk"
# 緋宮クロトが女神の神殿を止めたのと同時刻。
line = "緋宮クロトが女神の神殿を止めたのと同時刻。"

[[dialogue]]
speaker = "unk"
# 衛兵隊長であるケイティは聖庭園の破壊のために残ったが、住民は他の空中島に繋がる道に避難していた。
line = "衛兵隊長であるケイティは聖庭園の破壊のために残ったが、住民は他の空中島に繋がる道に避難していた。"

[[dialogue]]
speaker = "アポロ"
# 「神殿が止まった……！？」
line = "「神殿が止まった……！？」"

[[dialogue]]
speaker = "チナ"
# 「みたいだな……。なんか巨大な陽炎みたいなのが現れたと思ったら、急に神殿が止まったように見えたが」
line = "「みたいだな……。なんか巨大な陽炎みたいなのが現れたと思ったら、急に神殿が止まったように見えたが」"

[[dialogue]]
speaker = "アポロ"
# 「あれが新しいアルケインコードの力ってことなのか！？　後で魔王に詳しい話を聞かなくちゃな！」
line = "「あれが新しいアルケインコードの力ってことなのか！？　後で魔王に詳しい話を聞かなくちゃな！」"

[[dialogue]]
speaker = "unk"
# 遠目にも、神殿が停止しているのは明らかだった。
line = "遠目にも、神殿が停止しているのは明らかだった。"

[[dialogue]]
speaker = "unk"
# 聖庭園の市民も不安が緩み、安心の表情が浮かんでいる。
line = "聖庭園の市民も不安が緩み、安心の表情が浮かんでいる。"

[[dialogue]]
speaker = "アポロ"
# 「ジグの方も気になるが……いや、きっとそっちも上手くやっただろ。選管はあたしの仲間だからな」
line = "「ジグの方も気になるが……いや、きっとそっちも上手くやっただろ。選管はあたしの仲間だからな」"

[[dialogue]]
speaker = "シノ"
# 『守護天使の神殿も防衛に成功しました。これで天界を守り切れましたね』
line = "『守護天使の神殿も防衛に成功しました。これで天界を守り切れましたね』"

[[dialogue]]
speaker = "チナ"
# 「この声は……新星の学園長か」
line = "「この声は……新星の学園長か」"

[[dialogue]]
speaker = "アポロ"
# 「てことは、あたしたちの勝ちだな！」
line = "「てことは、あたしたちの勝ちだな！」"

[[dialogue]]
speaker = "チナ"
# 「別にアタシの勝ちじゃあないけどな……」
line = "「別にアタシの勝ちじゃあないけどな……」"

[[dialogue]]
speaker = "チナ"
# 「でも……グレイスとレティシアはどうなるんだ？」
line = "「でも……グレイスとレティシアはどうなるんだ？」"

[[dialogue]]
speaker = "シノ"
# 『おふたりの身柄は新星学園が預かります。処遇も各所と協議済みですし、身の安全は保障しますよ』
line = "『おふたりの身柄は新星学園が預かります。処遇も各所と協議済みですし、身の安全は保障しますよ』"

[[dialogue]]
speaker = "チナ"
# 「ほっ……」
line = "「ほっ……」"

[[dialogue]]
speaker = "シノ"
# 『彼女たちは確かに天使たちの命を脅かしましたが、デネブとともにリクリエと戦うというアルタイルの方針は変わりません。もちろん丁重に扱います』
line = "『彼女たちは確かに天使たちの命を脅かしましたが、デネブとともにリクリエと戦うというアルタイルの方針は変わりません。もちろん丁重に扱います』"

[[dialogue]]
speaker = "シノ"
# 『それに彼女たちにもお話を聞かないといけませんから。私たちが正しい選択をするためには、多くの情報が必要です』
line = "『それに彼女たちにもお話を聞かないといけませんから。私たちが正しい選択をするためには、多くの情報が必要です』"

[[dialogue]]
speaker = "アポロ"
# （情報……ルヴィネのこともきっと……）
line = "（情報……ルヴィネのこともきっと……）"

[[dialogue]]
speaker = "unk"
# 極星学園の星徒会長・ルヴィネ。
line = "極星学園の星徒会長・ルヴィネ。"

[[dialogue]]
speaker = "unk"
# 彼女は創造神『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』によって生み出された、新たな女神だという。
line = "彼女は創造神『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』によって生み出された、新たな女神だという。"

[[dialogue]]
speaker = "unk"
# ルヴィネと対峙するためにも、デネブや極星学園、極星星徒会のことを知る必要があると、アポロも思うのだった。
line = "ルヴィネと対峙するためにも、デネブや極星学園、極星星徒会のことを知る必要があると、アポロも思うのだった。"

[[dialogue]]
speaker = "unk"
# ……アルタイルの天界襲撃から３日。
line = "……アルタイルの天界襲撃から３日。"

[[dialogue]]
speaker = "unk"
# 遠く離れた、平行世界のデネブでは──
line = "遠く離れた、平行世界のデネブでは──"

[[dialogue]]
speaker = "ルヴィネ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ルヴィネ"
# （──アルタイルの天界襲撃を指示してから、もう３日）
line = "（──アルタイルの天界襲撃を指示してから、もう３日）"

[[dialogue]]
speaker = "ルヴィネ"
# （観測していない以上、断言はできない。けれど……）
line = "（観測していない以上、断言はできない。けれど……）"

[[dialogue]]
speaker = "unk"
# グレイスもレティシアも未だ、デネブに帰還してこない。
line = "グレイスもレティシアも未だ、デネブに帰還してこない。"

[[dialogue]]
speaker = "unk"
# つまり──アルタイルの破壊に失敗した。その可能性が極めて高い。
line = "つまり──アルタイルの破壊に失敗した。その可能性が極めて高い。"

[[dialogue]]
speaker = "ルヴィネ"
# （……私の失態ね。見誤ったわ）
line = "（……私の失態ね。見誤ったわ）"

[[dialogue]]
speaker = "unk"
# 新しく製造した転送装置を再び失った。そして『極星学園星徒会』という、ルヴィネ自身が所有する最大の戦力すらも自由に扱えない状況となってしまった。
line = "新しく製造した転送装置を再び失った。そして『極星学園星徒会』という、ルヴィネ自身が所有する最大の戦力すらも自由に扱えない状況となってしまった。"

[[dialogue]]
speaker = "unk"
# そうとなれば──
line = "そうとなれば──"

[[dialogue]]
speaker = "ルヴィネ"
# 「……報告に、いかなくてはね」
line = "「……報告に、いかなくてはね」"

[[dialogue]]
speaker = "unk"
# ルヴィネは極星学園の星徒会室を出て、フィーニスの塔へと向かう。
line = "ルヴィネは極星学園の星徒会室を出て、フィーニスの塔へと向かう。"

[[dialogue]]
speaker = "unk"
# 失態の報告に、今後の計画の修正方針。そして未だ帰ってこない、友人の安否への不安。様々な要素が、ルヴィネの足取りを重くしていた。
line = "失態の報告に、今後の計画の修正方針。そして未だ帰ってこない、友人の安否への不安。様々な要素が、ルヴィネの足取りを重くしていた。"

[[dialogue]]
speaker = "ルヴィネ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# その日はよく晴れた夜だった。うるさいほどに、星々が頭上に瞬いている。
line = "その日はよく晴れた夜だった。うるさいほどに、星々が頭上に瞬いている。"

[[dialogue]]
speaker = "unk"
# 星の輝きを見ると、どうしても女神テルルを連想せずにはいられない。
line = "星の輝きを見ると、どうしても女神テルルを連想せずにはいられない。"

[[dialogue]]
speaker = "ルヴィネ"
# 「……忌々しい」
line = "「……忌々しい」"

[[dialogue]]
speaker = "unk"
# 満天の星空を不愉快に感じる存在など、この世にはそういない。だからこれは、極星学園の友人たちにも見せられない姿だった。
line = "満天の星空を不愉快に感じる存在など、この世にはそういない。だからこれは、極星学園の友人たちにも見せられない姿だった。"

[[dialogue]]
speaker = "unk"
# そのまま通い慣れた道をたどり、ルヴィネはフィーニスの塔の頂上へとやってきた──
line = "そのまま通い慣れた道をたどり、ルヴィネはフィーニスの塔の頂上へとやってきた──"

[[dialogue]]
speaker = "ルヴィネ"
# （……大丈夫。計画に支障はないわ）
line = "（……大丈夫。計画に支障はないわ）"

[[dialogue]]
speaker = "ルヴィネ"
# （世界はまもなく刷新される。他ならぬ私──女神ルヴィネの手によって）
line = "（世界はまもなく刷新される。他ならぬ私──女神ルヴィネの手によって）"

[[dialogue]]
speaker = "unk"
# ──無礼があってはならない。
line = "──無礼があってはならない。"

[[dialogue]]
speaker = "unk"
# ルヴィネは極限の集中力を発揮して、慎重に言葉を選ぶ。
line = "ルヴィネは極限の集中力を発揮して、慎重に言葉を選ぶ。"

[[dialogue]]
speaker = "ルヴィネ"
# 「──私です。お姿を、お見せいただけますか」
line = "「──私です。お姿を、お見せいただけますか」"

[[dialogue]]
speaker = "unk"
# 虚空に消えるルヴィネの言葉。
line = "虚空に消えるルヴィネの言葉。"

[[dialogue]]
speaker = "unk"
# しかし、確かに『届いている』。その実感がルヴィネにはある。
line = "しかし、確かに『届いている』。その実感がルヴィネにはある。"

[[dialogue]]
speaker = "ルヴィネ"
# 「あ……」
line = "「あ……」"

[[dialogue]]
speaker = "unk"
# やがてルヴィネの頭上に『それ』は現れた。
line = "やがてルヴィネの頭上に『それ』は現れた。"

[[dialogue]]
speaker = "unk"
# 緋宮クロトたちが『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』と呼称する存在。
line = "緋宮クロトたちが『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』と呼称する存在。"

[[dialogue]]
speaker = "unk"
# 女神テルルすらも創造した、この世界の真なる神。すべてのはじまり。
line = "女神テルルすらも創造した、この世界の真なる神。すべてのはじまり。"

[[dialogue]]
speaker = "unk"
# ルヴィネは恭しく頭を下げて『それ』に語りかける。
line = "ルヴィネは恭しく頭を下げて『それ』に語りかける。"

[[dialogue]]
speaker = "ルヴィネ"
# 「……お会いできて光栄です」
line = "「……お会いできて光栄です」"

[[dialogue]]
speaker = "ルヴィネ"
# 「──<b>お父様</b>」
line = "「──<b>お父様</b>」"
