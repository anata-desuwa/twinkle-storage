[[dialogue]]
speaker = "unk"
# 第３話,愛してるゲーム……？,P
line = "第３話,愛してるゲーム……？,P"

[[dialogue]]
speaker = "unk"
# レミカはクールなアイドルとして一世を風靡しているが、笑いの沸点が異様に低いという意外な一面を持っている。
line = "レミカはクールなアイドルとして一世を風靡しているが、笑いの沸点が異様に低いという意外な一面を持っている。"

[[dialogue]]
speaker = "unk"
# 本人は頑なに認めようとしない。曰く、『完璧なアイドルはげらげら笑ったりしない』ということらしいが……
line = "本人は頑なに認めようとしない。曰く、『完璧なアイドルはげらげら笑ったりしない』ということらしいが……"

[[dialogue]]
speaker = "unk"
# ある日の休日、俺の家でくつろいでいたレミカが、ＤＩＳＣで何かの記事を見つけたようだった。
line = "ある日の休日、俺の家でくつろいでいたレミカが、ＤＩＳＣで何かの記事を見つけたようだった。"

[[dialogue]]
speaker = "レミカ"
# 「──あ。会長、これ見て。『愛してるゲーム』だって……ちょっと前に流行ってたみたい」
line = "「──あ。会長、これ見て。『愛してるゲーム』だって……ちょっと前に流行ってたみたい」"

[[dialogue]]
speaker = "レミカ"
# 「えーっと……カップル間での遊びの１つ。お互いが向かい合って『愛してる』って言って、照れた方が負けなんだって。面白そうじゃん」
line = "「えーっと……カップル間での遊びの１つ。お互いが向かい合って『愛してる』って言って、照れた方が負けなんだって。面白そうじゃん」"

[[dialogue]]
speaker = "レミカ"
# 「ちょうど暇してるし。やってみない？」
line = "「ちょうど暇してるし。やってみない？」"

[[dialogue]]
speaker = "unk"
# レミカ、本当にできる？
line = "レミカ、本当にできる？"

[[dialogue]]
speaker = "レミカ"
# 「え、何それ。できるよ。私、こんな簡単なゲームもできないと思われてるの？」
line = "「え、何それ。できるよ。私、こんな簡単なゲームもできないと思われてるの？」"

[[dialogue]]
speaker = "レミカ"
# 「──受けて立つよ。アイドル業で培った囁きテクで会長をメロメロにしてあげる」
line = "「──受けて立つよ。アイドル業で培った囁きテクで会長をメロメロにしてあげる」"

[[dialogue]]
speaker = "レミカ"
# 「んっ……こうやって近くで向かい合って、目を合わせて……いいよ。まずは会長が先行で」
line = "「んっ……こうやって近くで向かい合って、目を合わせて……いいよ。まずは会長が先行で」"

[[dialogue]]
speaker = "unk"
# （じーっと見つめる）
line = "（じーっと見つめる）"

[[dialogue]]
speaker = "unk"
# それじゃあ……
line = "それじゃあ……"

[[dialogue]]
speaker = "レミカ"
# 「……へぇ、これけっこうドキドキするかも。こんな間近で見つめあうって、なかなかないし」
line = "「……へぇ、これけっこうドキドキするかも。こんな間近で見つめあうって、なかなかないし」"

[[dialogue]]
speaker = "レミカ"
# 「…………ちょ、ちょっと、早く愛してるって言いなよ。そんなじーっと真面目な顔で見るだけって……」
line = "「…………ちょ、ちょっと、早く愛してるって言いなよ。そんなじーっと真面目な顔で見るだけって……」"

[[dialogue]]
speaker = "unk"
# （じーっと見つめる）
line = "（じーっと見つめる）"

[[dialogue]]
speaker = "レミカ"
# 「ぷっ……ん、ふっ──ふふふふっ……！！」
line = "「ぷっ……ん、ふっ──ふふふふっ……！！」"

[[dialogue]]
speaker = "unk"
# ゲームにならないと思った
line = "ゲームにならないと思った"

[[dialogue]]
speaker = "unk"
# やっぱり！
line = "やっぱり！"

[[dialogue]]
speaker = "レミカ"
# 「ちょ、ちょっと待って……！　そんなことないから。はいっ……もう大丈夫、ほらっ……！」
line = "「ちょ、ちょっと待って……！　そんなことないから。はいっ……もう大丈夫、ほらっ……！」"

[[dialogue]]
speaker = "レミカ"
# 「黙ったまま見つめあうって、なんか変な感じ……ふふっ……」
line = "「黙ったまま見つめあうって、なんか変な感じ……ふふっ……」"

[[dialogue]]
speaker = "レミカ"
# 「──ぷっ！　ぷふふふっ……♪　だから、そんな無言でじっと見るの、ゲームと違うって……！　ほら、愛してるって言わなきゃ負けにするよ……！」
line = "「──ぷっ！　ぷふふふっ……♪　だから、そんな無言でじっと見るの、ゲームと違うって……！　ほら、愛してるって言わなきゃ負けにするよ……！」"

[[dialogue]]
speaker = "unk"
# 愛してるよ、レミカ（イケボ）
line = "愛してるよ、レミカ（イケボ）"

[[dialogue]]
speaker = "レミカ"
# 「──ぶっふぅうっ！　あ、あはっ……あはははっ……！」
line = "「──ぶっふぅうっ！　あ、あはっ……あはははっ……！」"

[[dialogue]]
speaker = "レミカ"
# 「今のは卑怯っ……わざとお腹に力入れて、ヘンにいい声出してっ……！　ドキドキさせるんじゃなく、笑わせようとしてるじゃん……！」
line = "「今のは卑怯っ……わざとお腹に力入れて、ヘンにいい声出してっ……！　ドキドキさせるんじゃなく、笑わせようとしてるじゃん……！」"

[[dialogue]]
speaker = "レミカ"
# 「ふぅっ……ふふっ……ふふふっ……！　る、ルール違反するのは勝手だけど、照れさせなきゃ勝てないんだけど……！？」
line = "「ふぅっ……ふふっ……ふふふっ……！　る、ルール違反するのは勝手だけど、照れさせなきゃ勝てないんだけど……！？」"

[[dialogue]]
speaker = "unk"
# （もっと笑わせたくなってきたな）
line = "（もっと笑わせたくなってきたな）"

[[dialogue]]
speaker = "レミカ"
# 「はぁっ！？　なんで会長、戦闘服になってるの……！？　待って待って、おかしいって！」
line = "「はぁっ！？　なんで会長、戦闘服になってるの……！？　待って待って、おかしいって！」"

[[dialogue]]
speaker = "レミカ"
# 「ちょっと、前髪かき上げるなっ……ポーズ決めないで！　ん、ふふふふっ、あ、あははっ……！」
line = "「ちょっと、前髪かき上げるなっ……ポーズ決めないで！　ん、ふふふふっ、あ、あははっ……！」"

[[dialogue]]
speaker = "unk"
# 愛してるよ、レミカ（イケボ）
line = "愛してるよ、レミカ（イケボ）"

[[dialogue]]
speaker = "レミカ"
# 「～～～～～～っ♪　あはははっ！　あははははっ！　ま、待って、ほんと無理っ……！　ぷふぅっ……ふぅっ……ふぅうっ……！！」
line = "「～～～～～～っ♪　あはははっ！　あははははっ！　ま、待って、ほんと無理っ……！　ぷふぅっ……ふぅっ……ふぅうっ……！！」"

[[dialogue]]
speaker = "unk"
# 以前までのレミカは、笑いの沸点が低いことを『自身の目指すカッコ可愛いアイドル像』からかけ離れているため、それを隠そう、認めまいとすることが多かった。
line = "以前までのレミカは、笑いの沸点が低いことを『自身の目指すカッコ可愛いアイドル像』からかけ離れているため、それを隠そう、認めまいとすることが多かった。"

[[dialogue]]
speaker = "unk"
# けれど恋人関係になってから、俺の前では肩の力を抜いてくれることも多くなったと思う。大笑いしてくれるようになったのがその証拠だ。
line = "けれど恋人関係になってから、俺の前では肩の力を抜いてくれることも多くなったと思う。大笑いしてくれるようになったのがその証拠だ。"

[[dialogue]]
speaker = "unk"
# だが調子に乗って笑わせすぎた報いは当然やってくるものだ。
line = "だが調子に乗って笑わせすぎた報いは当然やってくるものだ。"

[[dialogue]]
speaker = "レミカ"
# 「こちょこちょこちょこちょこちょ～っ！」
line = "「こちょこちょこちょこちょこちょ～っ！」"

[[dialogue]]
speaker = "unk"
# 降参！　降参します！
line = "降参！　降参します！"

[[dialogue]]
speaker = "unk"
# 待って待って待って！
line = "待って待って待って！"

[[dialogue]]
speaker = "レミカ"
# 「えー。私がお腹痛いからやめてって言ったのに、笑わせ続けたのはどこの彼氏さんでしたっけー？」
line = "「えー。私がお腹痛いからやめてって言ったのに、笑わせ続けたのはどこの彼氏さんでしたっけー？」"

[[dialogue]]
speaker = "レミカ"
# 「会長が泣くまで、くすぐるのやめないから♪　ほぉら、こちょこちょこちょこちょ～っ♪」
line = "「会長が泣くまで、くすぐるのやめないから♪　ほぉら、こちょこちょこちょこちょ～っ♪」"

[[dialogue]]
speaker = "unk"
# あははははははっ……！！
line = "あははははははっ……！！"

[[dialogue]]
speaker = "レミカ"
# 「愛してるよー、会長<emoji=heart04>　ほぉら、脇腹～♪　こちょこちょこちょーっ……！」
line = "「愛してるよー、会長<emoji=heart04>　ほぉら、脇腹～♪　こちょこちょこちょーっ……！」"

[[dialogue]]
speaker = "unk"
# 愛してるゲームはどこに行ったのか──最終的に相手をより笑わせた方が勝ちという意味不明なゲームへと変貌していて。
line = "愛してるゲームはどこに行ったのか──最終的に相手をより笑わせた方が勝ちという意味不明なゲームへと変貌していて。"

[[dialogue]]
speaker = "unk"
# 漫画や映画などの娯楽を一切使わずとも、延々と時間をつぶせる俺たちなのだった。
line = "漫画や映画などの娯楽を一切使わずとも、延々と時間をつぶせる俺たちなのだった。"
