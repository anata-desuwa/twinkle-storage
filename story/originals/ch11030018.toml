line = "「はぁぁ……脳をインスピレーションが駆け巡っている……この快感と感動を忘れぬ内に書き留めたいのはやまやまだが、今は執筆よりもお前とのセックスを優先したい」"

[[dialogue]]
speaker = "クロト"
# 「……え？」
line = "「……え？」"

[[dialogue]]
speaker = "ロクサーナ"
# 「言っただろう。『貞淑なシスターが淫らな快楽にその身を堕とす』と。この程度の不貞では堕落とは言わん」
line = "「言っただろう。『貞淑なシスターが淫らな快楽にその身を堕とす』と。この程度の不貞では堕落とは言わん」"

[[dialogue]]
speaker = "ロクサーナ"
# 「お前のち○ぽもこれだけ出していながら、既に勃ち上がろうとしているのだからな。ちっとも満足していないのだろう？」
line = "「お前のち○ぽもこれだけ出していながら、既に勃ち上がろうとしているのだからな。ちっとも満足していないのだろう？」"

[[dialogue]]
speaker = "ロクサーナ"
# 「未知の快感を教えてくれた、せめてもの礼だ。キンタマが空っぽになるまで私の体を使わせてやる」
line = "「未知の快感を教えてくれた、せめてもの礼だ。キンタマが空っぽになるまで私の体を使わせてやる」"

[[dialogue]]
speaker = "ロクサーナ"
# 「いつも私にいいようにやられているんだ。仕返しのひとつもしてみせろ」
line = "「いつも私にいいようにやられているんだ。仕返しのひとつもしてみせろ」"

[[dialogue]]
speaker = "ロクサーナ"
# 「私の性への探求心とお前の精力、どっちが先に尽きるか、勝負といこうじゃないか、くっくっく<emoji=heart04>」
line = "「私の性への探求心とお前の精力、どっちが先に尽きるか、勝負といこうじゃないか、くっくっく<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
# 「思いっきり中に出しといてなんだけど……避妊具は？」
line = "「思いっきり中に出しといてなんだけど……避妊具は？」"

[[dialogue]]
speaker = "ロクサーナ"
# 「一度、中に出したなら二度も三度も大して変わらん。もしお前の子を孕んでしまったら、私が責任を取ってお前を養ってやる」
line = "「一度、中に出したなら二度も三度も大して変わらん。もしお前の子を孕んでしまったら、私が責任を取ってお前を養ってやる」"

[[dialogue]]
speaker = "ロクサーナ"
# 「さぁ、来い。どこまでも、私を愛してみせろ<emoji=heart04>」
line = "「さぁ、来い。どこまでも、私を愛してみせろ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そのまま俺たちはお互いの精魂が尽き、足腰が立たなくなるまで、神の御前で堕落の一途を辿るのであった──
line = "そのまま俺たちはお互いの精魂が尽き、足腰が立たなくなるまで、神の御前で堕落の一途を辿るのであった──"
