[[dialogue]]
speaker = "unk"
# 断崖絶壁に立ち、レイラが海に向かって叫ぶ。
line = "断崖絶壁に立ち、レイラが海に向かって叫ぶ。"

[[dialogue]]
speaker = "レイラ"
# 「イングリット～！　私を倒しにいらっしゃ～い！」
line = "「イングリット～！　私を倒しにいらっしゃ～い！」"

[[dialogue]]
speaker = "リーナ"
# 「レイラお姉ちゃん、何やってるの？」
line = "「レイラお姉ちゃん、何やってるの？」"

[[dialogue]]
speaker = "レイラ"
# 「今言っとかないと一生言う機会ないと思って」
line = "「今言っとかないと一生言う機会ないと思って」"

[[dialogue]]
speaker = "キサナ"
# 「なくていいだろ永遠に」
line = "「なくていいだろ永遠に」"

[[dialogue]]
speaker = "レイラ"
# 「さて、というわけで、今日はまずイングリットとの合流を目指します」
line = "「さて、というわけで、今日はまずイングリットとの合流を目指します」"

[[dialogue]]
speaker = "キサナ"
# 「アイツならもうくたばってんじゃねえか。ってか、その方がいいだろ」
line = "「アイツならもうくたばってんじゃねえか。ってか、その方がいいだろ」"

[[dialogue]]
speaker = "レイラ"
# 「こーら、そんなこと言わないの。それに、簡単にくたばらないのがコラプサーだよ」
line = "「こーら、そんなこと言わないの。それに、簡単にくたばらないのがコラプサーだよ」"

[[dialogue]]
speaker = "unk"
# コラプサーたちは全員、それぞれの覚醒時、そして秋葉原での決戦で、２回も命を拾っている。
line = "コラプサーたちは全員、それぞれの覚醒時、そして秋葉原での決戦で、２回も命を拾っている。"

[[dialogue]]
speaker = "unk"
# すでに三度目の生といっても過言ではない。
line = "すでに三度目の生といっても過言ではない。"

[[dialogue]]
speaker = "リーナ"
# 「今日はもっと奥まで行ってみようよ！　見たことない果物ばっかりだったから、お土産にするんだ～！」
line = "「今日はもっと奥まで行ってみようよ！　見たことない果物ばっかりだったから、お土産にするんだ～！」"

[[dialogue]]
speaker = "レイラ"
# 「うん。手掛かりもないし、行ってみようか。モンスターも見付けたら倒そうね。バーベキューセットの仇だし」
line = "「うん。手掛かりもないし、行ってみようか。モンスターも見付けたら倒そうね。バーベキューセットの仇だし」"

[[dialogue]]
speaker = "キサナ"
# 「しっかしあちーな。さっさと終わらせてぇ」
line = "「しっかしあちーな。さっさと終わらせてぇ」"

[[dialogue]]
speaker = "リーナ"
# 「見て見て！　見たことない貝だ～！　持って帰ったらお兄ちゃん喜んでくれるかな？」
line = "「見て見て！　見たことない貝だ～！　持って帰ったらお兄ちゃん喜んでくれるかな？」"

[[dialogue]]
speaker = "レイラ"
# （２人はいつも通りだな～。コラプサーの日常風景って感じ）
line = "（２人はいつも通りだな～。コラプサーの日常風景って感じ）"

[[dialogue]]
speaker = "レイラ"
# 「……コラプサーの日常、か」
line = "「……コラプサーの日常、か」"

[[dialogue]]
speaker = "キサナ"
# 「どうした？」
line = "「どうした？」"

[[dialogue]]
speaker = "レイラ"
# 「キサナとリーナは……コラプサーが解散したらって考えたことある？」
line = "「キサナとリーナは……コラプサーが解散したらって考えたことある？」"

[[dialogue]]
speaker = "キサナ"
# 「ああ？」
line = "「ああ？」"

[[dialogue]]
speaker = "リーナ"
# 「え？　コラプサーなくなっちゃうの？」
line = "「え？　コラプサーなくなっちゃうの？」"

[[dialogue]]
speaker = "レイラ"
# 「ううん。もしもの話だよ。……私たちコラプサーの目的は『救世』。でも、元凶を倒してリクリエもなくなったから、それも成し遂げちゃった」
line = "「ううん。もしもの話だよ。……私たちコラプサーの目的は『救世』。でも、元凶を倒してリクリエもなくなったから、それも成し遂げちゃった」"

[[dialogue]]
speaker = "レイラ"
# 「この世界に、私たちコラプサーの居場所はあるのかなって……そう思っただけ」
line = "「この世界に、私たちコラプサーの居場所はあるのかなって……そう思っただけ」"

[[dialogue]]
speaker = "リーナ"
# 「……リーナ、よく分かんない」
line = "「……リーナ、よく分かんない」"

[[dialogue]]
speaker = "リーナ"
# 「でもね、お兄ちゃんがいるところがリーナの居場所だから。ずっとずっと会えなかったんだもん。これからはず～っと一緒だよ！」
line = "「でもね、お兄ちゃんがいるところがリーナの居場所だから。ずっとずっと会えなかったんだもん。これからはず～っと一緒だよ！」"

[[dialogue]]
speaker = "レイラ"
# 「リーナはお兄ちゃんが一番大事だもんね」
line = "「リーナはお兄ちゃんが一番大事だもんね」"

[[dialogue]]
speaker = "リーナ"
# 「うん！　リーナ、お兄ちゃんがいてくれればそれだけで幸せなの！」
line = "「うん！　リーナ、お兄ちゃんがいてくれればそれだけで幸せなの！」"

[[dialogue]]
speaker = "キサナ"
# 「居場所なんざ、アタシにはどうでもいい。メシが食えればそれでいいんだよ」
line = "「居場所なんざ、アタシにはどうでもいい。メシが食えればそれでいいんだよ」"

[[dialogue]]
speaker = "レイラ"
# 「ふふっ。キサナはぶれないね」
line = "「ふふっ。キサナはぶれないね」"

[[dialogue]]
speaker = "キサナ"
# 「つうか、メシ食うより大事なことあんのかよ。アタシにはその方が分かんねえ」
line = "「つうか、メシ食うより大事なことあんのかよ。アタシにはその方が分かんねえ」"

[[dialogue]]
speaker = "レイラ"
# （うん。２人とも、なんて答えるか聞かなくても分かってた。一緒にいたいって、私が言って欲しかっただけ）
line = "（うん。２人とも、なんて答えるか聞かなくても分かってた。一緒にいたいって、私が言って欲しかっただけ）"

[[dialogue]]
speaker = "レイラ"
# （コラプサーのみんなは私の新しい家族……だけど、それは私の片思いなんだろうな）
line = "（コラプサーのみんなは私の新しい家族……だけど、それは私の片思いなんだろうな）"

[[dialogue]]
speaker = "レイラ"
# （きっと、いつかコラプサーはバラバラになって、それぞれの道を歩むことになる。それは分かってたこと）
line = "（きっと、いつかコラプサーはバラバラになって、それぞれの道を歩むことになる。それは分かってたこと）"

[[dialogue]]
speaker = "レイラ"
# （だって、家族はずっと一緒にはいられないんだから）
line = "（だって、家族はずっと一緒にはいられないんだから）"

[[dialogue]]
speaker = "キサナ"
# 「──！　この音は……あのヤロウ、生きてやがったな」
line = "「──！　この音は……あのヤロウ、生きてやがったな」"

[[dialogue]]
speaker = "イングリット"
# 「てやあぁっ！」
line = "「てやあぁっ！」"

[[dialogue]]
speaker = "モンスター"
# 「ギャアァアアアアッ！」
line = "「ギャアァアアアアッ！」"

[[dialogue]]
speaker = "イングリット"
# 「ふん、その程度の攻撃で私がやられるか！　はぁっ！」
line = "「ふん、その程度の攻撃で私がやられるか！　はぁっ！」"

[[dialogue]]
speaker = "キサナ"
# 「イングリットのやつ、まさか昨日からずっと戦ってやがったのか？」
line = "「イングリットのやつ、まさか昨日からずっと戦ってやがったのか？」"

[[dialogue]]
speaker = "レイラ"
# 「イングリット、反対側の浜辺にいたんだ。……気付かなくてごめんね」
line = "「イングリット、反対側の浜辺にいたんだ。……気付かなくてごめんね」"

[[dialogue]]
speaker = "リーナ"
# 「あ、あれ！」
line = "「あ、あれ！」"

[[dialogue]]
speaker = "リーナ"
# 「レイラお姉ちゃんのクーラーボックスがモンスターにひっかかってる！　あんなところにあったんだ～！」
line = "「レイラお姉ちゃんのクーラーボックスがモンスターにひっかかってる！　あんなところにあったんだ～！」"

[[dialogue]]
speaker = "レイラ"
# 「お肉はダメでも調味料は無事なはず！　あれがあれば美味しいバーべキューができる！　コラプサー戦闘態勢！　イングリットと合流してモンスターを倒して！」
line = "「お肉はダメでも調味料は無事なはず！　あれがあれば美味しいバーべキューができる！　コラプサー戦闘態勢！　イングリットと合流してモンスターを倒して！」"

[[dialogue]]
speaker = "レイラ"
# 「バーべキューの時間だぁっ！！」
line = "「バーべキューの時間だぁっ！！」"
