[[dialogue]]
speaker = "unk"
# 第８話,運命の始原者,B
line = "第８話,運命の始原者,B"

[[dialogue]]
speaker = "クロト"
# 「────」
line = "「────」"

[[dialogue]]
speaker = "unk"
# 遠ざかっていた自我が戻ってくる。
line = "遠ざかっていた自我が戻ってくる。"

[[dialogue]]
speaker = "unk"
# この映像が、俺にしか共有されなかった理由も、完璧にわかった。
line = "この映像が、俺にしか共有されなかった理由も、完璧にわかった。"

[[dialogue]]
speaker = "クロト"
# （<ruby=ラクシス>先代魔王</ruby>の記憶は──俺自身の記憶で……）
line = "（<ruby>先代魔王<rt>ラクシス</rt></ruby>の記憶は──俺自身の記憶で……）"

[[dialogue]]
speaker = "クロト"
# （それに──母さん……）
line = "（それに──母さん……）"

[[dialogue]]
speaker = "unk"
# 血の繋がりがないことは知っていた。俺に幼い頃の記憶がないのも。
line = "血の繋がりがないことは知っていた。俺に幼い頃の記憶がないのも。"

[[dialogue]]
speaker = "unk"
# でも、あんな出会い方をしていただなんて知らなかった。明かせない事情がまだあったのだろう。
line = "でも、あんな出会い方をしていただなんて知らなかった。明かせない事情がまだあったのだろう。"

[[dialogue]]
speaker = "unk"
# フィオナと俺は何が違うのか？　その疑問にも答えが出た。
line = "フィオナと俺は何が違うのか？　その疑問にも答えが出た。"

[[dialogue]]
speaker = "クロト"
# （自らが封印されることも、未来へ子孫を残すことも……どちらも、ラクシスが選んだ道だったんだ）
line = "（自らが封印されることも、未来へ子孫を残すことも……どちらも、ラクシスが選んだ道だったんだ）"

[[dialogue]]
speaker = "unk"
# ３０００年という長き時を経て、彼の願いはその双方ともに結実した。
line = "３０００年という長き時を経て、彼の願いはその双方ともに結実した。"

[[dialogue]]
speaker = "unk"
# フィオナ──そして星見の一族はきっと、あの時ラクシスと結ばれたフェリシアの<ruby=まつえい>末裔</ruby>。
line = "フィオナ──そして星見の一族はきっと、あの時ラクシスと結ばれたフェリシアの<ruby>末裔<rt>まつえい</rt></ruby>。"

[[dialogue]]
speaker = "unk"
# その血は脈々と受け継がれ、現代に至るまでその血統は三界にも散らばった。
line = "その血は脈々と受け継がれ、現代に至るまでその血統は三界にも散らばった。"

[[dialogue]]
speaker = "unk"
# だからこそ彼女は魔王の血統──
line = "だからこそ彼女は魔王の血統──"

[[dialogue]]
speaker = "unk"
# 対して、俺は末裔なんかじゃない。魔王そのものが生まれ変わった、同じ魂の存在なんだ。
line = "対して、俺は末裔なんかじゃない。魔王そのものが生まれ変わった、同じ魂の存在なんだ。"

[[dialogue]]
speaker = "unk"
# <ruby=ラクシス>先代魔王</ruby>がＳから授かった魔王の因子が、そのまま今の俺には眠っている──ってことなんだろう。
line = "<ruby>先代魔王<rt>ラクシス</rt></ruby>がＳから授かった魔王の因子が、そのまま今の俺には眠っている──ってことなんだろう。"

[[dialogue]]
speaker = "unk"
# だから……言うなら俺は、ニャリオンと同じだ。かつてのリクリエを戦った前世がある。
line = "だから……言うなら俺は、ニャリオンと同じだ。かつてのリクリエを戦った前世がある。"

[[dialogue]]
speaker = "クロト"
# （先代の、魔王──ラクシス……あなたは……いや、俺は──）
line = "（先代の、魔王──ラクシス……あなたは……いや、俺は──）"

[[dialogue]]
speaker = "unk"
# 小さい頃から、よくモンスターに襲われた。
line = "小さい頃から、よくモンスターに襲われた。"

[[dialogue]]
speaker = "unk"
# それでも俺は星騎士になって、世界を救ってやりたいと思った。
line = "それでも俺は星騎士になって、世界を救ってやりたいと思った。"

[[dialogue]]
speaker = "unk"
# これまで歩んできた人生の軌跡に、答え合わせがなされたような気がした。
line = "これまで歩んできた人生の軌跡に、答え合わせがなされたような気がした。"

[[dialogue]]
speaker = "クロト"
# （自分のことなのに……ふ。実感が湧かないのはなんでだろうな。やっぱり、完全に同一じゃないってことか）
line = "（自分のことなのに……ふ。実感が湧かないのはなんでだろうな。やっぱり、完全に同一じゃないってことか）"

[[dialogue]]
speaker = "unk"
# 思いがけず明かされた緋宮クロトという人間のルーツに、俺はどこか他人事めいた情感を抱いていた。
line = "思いがけず明かされた緋宮クロトという人間のルーツに、俺はどこか他人事めいた情感を抱いていた。"

[[dialogue]]
speaker = "unk"
# だが……今は感傷に浸っている場合でもない。
line = "だが……今は感傷に浸っている場合でもない。"

[[dialogue]]
speaker = "unk"
# 俺は俺。彼ではない。けれど、彼の願いを継いだ者として、使命を果たさなくちゃならないのだから。
line = "俺は俺。彼ではない。けれど、彼の願いを継いだ者として、使命を果たさなくちゃならないのだから。"

[[dialogue]]
speaker = "ガーディアン"
# 「ピ……ガ……侵入禁止。侵入禁止。直ちに立チ去レ」
line = "「ピ……ガ……侵入禁止。侵入禁止。直ちに立チ去レ」"

[[dialogue]]
speaker = "ガーディアン"
# 「これより先は人間界。《境界》の侵犯は認められない」
line = "「これより先は人間界。《境界》の侵犯は認められない」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ちょ──なんなの！　もうボスは倒したってのに……まだ立ちふさがる気！？」
line = "「ちょ──なんなの！　もうボスは倒したってのに……まだ立ちふさがる気！？」"

[[dialogue]]
speaker = "フィオナ"
# 「なんという数──あれだけ生産されていたガーディアンは、ここに配備されていたようですね……！」
line = "「なんという数──あれだけ生産されていたガーディアンは、ここに配備されていたようですね……！」"

[[dialogue]]
speaker = "unk"
# 人間界まであと一歩。
line = "人間界まであと一歩。"

[[dialogue]]
speaker = "unk"
# そこまで昇りつめた俺たちを待ち受けていたのは、おびただしいガーディアンの軍勢だった。
line = "そこまで昇りつめた俺たちを待ち受けていたのは、おびただしいガーディアンの軍勢だった。"

[[dialogue]]
speaker = "ガーディアン"
# 「《境界》守護天使からの応答を確認……エラー。エラー。自律迎撃へ移行する」
line = "「《境界》守護天使からの応答を確認……エラー。エラー。自律迎撃へ移行する」"

[[dialogue]]
speaker = "サーシャ"
# 「魔界から人間界をまたいじゃダメ──って言いたいのかしら」
line = "「魔界から人間界をまたいじゃダメ──って言いたいのかしら」"

[[dialogue]]
speaker = "ソフィア"
# 「《境界》──ってマグダレナさんの……？　主を失って暴走しているのでしょうか」
line = "「《境界》──ってマグダレナさんの……？　主を失って暴走しているのでしょうか」"

[[dialogue]]
speaker = "ヴィーナス"
# 「人間界はすぐそこよ！　引き下がるわけにはいかないんだから！」
line = "「人間界はすぐそこよ！　引き下がるわけにはいかないんだから！」"

[[dialogue]]
speaker = "ユウリ"
# 「つっても、これだけの数を掃除してくのは骨が折れるぜ──！」
line = "「つっても、これだけの数を掃除してくのは骨が折れるぜ──！」"

[[dialogue]]
speaker = "unk"
# ヴィーナスは何度も言った。俺は真の魔王になるんだって。
line = "ヴィーナスは何度も言った。俺は真の魔王になるんだって。"

[[dialogue]]
speaker = "unk"
# でも、もしかしたら俺は……最初からそうだったのかもしれない。
line = "でも、もしかしたら俺は……最初からそうだったのかもしれない。"

[[dialogue]]
speaker = "クロト"
# 「……みんな。俺に任せてくれ」
line = "「……みんな。俺に任せてくれ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロト──？」
line = "「クロト──？」"

[[dialogue]]
speaker = "クロト"
# 「境界を越えるなら──それはきっと、俺の役目だ」
line = "「境界を越えるなら──それはきっと、俺の役目だ」"

[[dialogue]]
speaker = "unk"
# 一歩踏み出す。その時ふと、Ｓが<ruby=おれ>魔王</ruby>に残した言葉がよみがえった。
line = "一歩踏み出す。その時ふと、Ｓが<ruby>魔王<rt>おれ</rt></ruby>に残した言葉がよみがえった。"

[[dialogue]]
speaker = "unk"
# 『平行する全ての可能性を切り<ruby=ひら>拓</ruby>く力──それは他の誰にもない、君だけのものだ』
line = "『平行する全ての可能性を切り<ruby>拓<rt>ひら</rt></ruby>く力──それは他の誰にもない、君だけのものだ』"

[[dialogue]]
speaker = "unk"
# かつての<ruby=おれ>魔王</ruby>はオルタナティブ宇宙を切り拓いた。
line = "かつての<ruby>魔王<rt>おれ</rt></ruby>はオルタナティブ宇宙を切り拓いた。"

[[dialogue]]
speaker = "unk"
# 花びらのように重なった無数の可能性から、唯一の道筋を選び取った。
line = "花びらのように重なった無数の可能性から、唯一の道筋を選び取った。"

[[dialogue]]
speaker = "クロト"
# （なら……今の俺にも同じ資質が受け継がれているんだろう。それは、決してＳにさえ真似できなかったもの）
line = "（なら……今の俺にも同じ資質が受け継がれているんだろう。それは、決してＳにさえ真似できなかったもの）"

[[dialogue]]
speaker = "unk"
# そして、過去の己を覗いてわかったことがもうひとつある。
line = "そして、過去の己を覗いてわかったことがもうひとつある。"

[[dialogue]]
speaker = "クロト"
# （デネブも、ベガも、アルタイルも……元々この宇宙にはなかった。ラクシスが生きたのも、ひとつの運命だけだったんだ）
line = "（デネブも、ベガも、アルタイルも……元々この宇宙にはなかった。ラクシスが生きたのも、ひとつの運命だけだったんだ）"

[[dialogue]]
speaker = "unk"
# だけど、世界は三つに分かたれた。
line = "だけど、世界は三つに分かたれた。"

[[dialogue]]
speaker = "unk"
# 『花』と称されたラクシスが世界樹へ眠り、緋宮クロトという人間が誕生したことによって、予言通り揺らぎが生じた。
line = "『花』と称されたラクシスが世界樹へ眠り、緋宮クロトという人間が誕生したことによって、予言通り揺らぎが生じた。"

[[dialogue]]
speaker = "unk"
# いわば俺は──広がる平行世界の『根』となったのだ。
line = "いわば俺は──広がる平行世界の『根』となったのだ。"

[[dialogue]]
speaker = "unk"
# 可能性を広げるどころか、同時に三種もの未来を存続させうる根源に。
line = "可能性を広げるどころか、同時に三種もの未来を存続させうる根源に。"

[[dialogue]]
speaker = "クロト"
# （だから──今の俺は、あらゆる可能性を束ね、そのすべてを切り拓く存在──）
line = "（だから──今の俺は、あらゆる可能性を束ね、そのすべてを切り拓く存在──）"

[[dialogue]]
speaker = "クロト"
# 「──フロンティアドライブ──」
line = "「──フロンティアドライブ──」"

[[dialogue]]
speaker = "ガーディアン"
# 「ピガ────────ッ！！！」
line = "「ピガ────────ッ！！！」"

[[dialogue]]
speaker = "マトイ"
# 「！　一気にまとめて……！」
line = "「！　一気にまとめて……！」"

[[dialogue]]
speaker = "フィオナ"
# 「さらなる覚醒──いえ、これは……魔力や霊力ではなく──？」
line = "「さらなる覚醒──いえ、これは……魔力や霊力ではなく──？」"

[[dialogue]]
speaker = "unk"
# 一発の拳で十の敵を。十発の拳で百の敵を。
line = "一発の拳で十の敵を。十発の拳で百の敵を。"

[[dialogue]]
speaker = "unk"
# 繰り出す俺の一挙手一投足に──追撃の影が生じていた！
line = "繰り出す俺の一挙手一投足に──追撃の影が生じていた！"

[[dialogue]]
speaker = "クロト"
# （この感覚は……いつかも感じたことのある──）
line = "（この感覚は……いつかも感じたことのある──）"

[[dialogue]]
speaker = "ギエル"
# 『っ！？』
line = "『っ！？』"

[[dialogue]]
speaker = "ギエル"
# 『……。今、何を……』
line = "『……。今、何を……』"

[[dialogue]]
speaker = "unk"
# 今。俺の拳は間違いなく防がれた。
line = "今。俺の拳は間違いなく防がれた。"

[[dialogue]]
speaker = "unk"
# だが……防がれた後で、もう一撃が命中した。
line = "だが……防がれた後で、もう一撃が命中した。"

[[dialogue]]
speaker = "クロト"
# （……なんだ……？　今の感覚は……？）
line = "（……なんだ……？　今の感覚は……？）"

[[dialogue]]
speaker = "unk"
# これまでも幾度か生じていた<ruby=ダブルアクション>多重追撃</ruby>──だけど、意識的にコントロールできたのは初めてだった。
line = "これまでも幾度か生じていた<ruby>多重追撃<rt>ダブルアクション</rt></ruby>──だけど、意識的にコントロールできたのは初めてだった。"

[[dialogue]]
speaker = "クロト"
# 「……ようやく理屈を理解できた。これは、魔王の特権じゃない」
line = "「……ようやく理屈を理解できた。これは、魔王の特権じゃない」"

[[dialogue]]
speaker = "unk"
# 平行世界の根源たる俺だからこそ可能な動き。
line = "平行世界の根源たる俺だからこそ可能な動き。"

[[dialogue]]
speaker = "unk"
# それは──「あらゆる可能性を束ねる」一撃だった。
line = "それは──「あらゆる可能性を束ねる」一撃だった。"

[[dialogue]]
speaker = "クロト"
# （なら──もっと！）
line = "（なら──もっと！）"

[[dialogue]]
speaker = "unk"
# たとえ、千にひとつ、いや万にひとつしか希望がなかったとしても──
line = "たとえ、千にひとつ、いや万にひとつしか希望がなかったとしても──"

[[dialogue]]
speaker = "unk"
# 俺はこの手で、あらゆる世界の可能性を切り拓いてみせる！
line = "俺はこの手で、あらゆる世界の可能性を切り拓いてみせる！"

[[dialogue]]
speaker = "ソフィア"
# 「なんという連撃──」
line = "「なんという連撃──」"

[[dialogue]]
speaker = "ユウリ"
# 「一回のパンチで──何発入れてやがんだ……！？」
line = "「一回のパンチで──何発入れてやがんだ……！？」"

[[dialogue]]
speaker = "unk"
# 無数のガーディアンを退け、最後に現れたのは高くそびえる一面の壁だった。
line = "無数のガーディアンを退け、最後に現れたのは高くそびえる一面の壁だった。"

[[dialogue]]
speaker = "クロト"
# 「──壁か」
line = "「──壁か」"

[[dialogue]]
speaker = "unk"
# 魔界と人間界とを決定的に隔てる、最後の砦に違いない。
line = "魔界と人間界とを決定的に隔てる、最後の砦に違いない。"

[[dialogue]]
speaker = "クロト"
# 「ガーディアンが<ruby=うえ>人間界</ruby>へ逆流する恐れも捨てきれないが……手段を選んでる場合じゃない。強引にでも通してもらうぞ」
line = "「ガーディアンが<ruby>人間界<rt>うえ</rt></ruby>へ逆流する恐れも捨てきれないが……手段を選んでる場合じゃない。強引にでも通してもらうぞ」"

[[dialogue]]
speaker = "unk"
# 刹那の間に撃ち込む──万を超える正拳の乱打！
line = "刹那の間に撃ち込む──万を超える正拳の乱打！"

[[dialogue]]
speaker = "マトイ"
# 「やった……！？」
line = "「やった……！？」"

[[dialogue]]
speaker = "ニャリオン"
# 「開通ニャ！」
line = "「開通ニャ！」"

[[dialogue]]
speaker = "クロト"
# 「行こう。みんなが俺たちを待っている」
line = "「行こう。みんなが俺たちを待っている」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええっ！」
line = "「ええっ！」"
