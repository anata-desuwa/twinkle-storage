[[dialogue]]
speaker = "unk"
# 第４話,瞳を開いて,P
line = "第４話,瞳を開いて,P"

[[dialogue]]
speaker = "unk"
# 閃と話すようになってから、数ヶ月が経ったある日のこと――
line = "閃と話すようになってから、数ヶ月が経ったある日のこと――"

[[dialogue]]
speaker = "閃"
# 「会長さん。お嬢様の指示とはいえ、困ったことになってしまいましたね……」
line = "「会長さん。お嬢様の指示とはいえ、困ったことになってしまいましたね……」"

[[dialogue]]
speaker = "閃"
# 「まさか私と会長さん、２人のコンビネーション技を開発して来いだなんて……」
line = "「まさか私と会長さん、２人のコンビネーション技を開発して来いだなんて……」"

[[dialogue]]
speaker = "unk"
# いつもながら、なかなかの無茶振り……
line = "いつもながら、なかなかの無茶振り……"

[[dialogue]]
speaker = "unk"
# ヴィーナスが突然思いつき、「最近仲が良いみたいだから、戦闘中の連携も強化しておきなさい！」と言い出したのだった。
line = "ヴィーナスが突然思いつき、「最近仲が良いみたいだから、戦闘中の連携も強化しておきなさい！」と言い出したのだった。"

[[dialogue]]
speaker = "閃"
# 「どうしましょうか、会長さん」
line = "「どうしましょうか、会長さん」"

[[dialogue]]
speaker = "閃"
# 「一緒に訓練して、連携を強化することは賛成ですし、出来ると思いますが……」
line = "「一緒に訓練して、連携を強化することは賛成ですし、出来ると思いますが……」"

[[dialogue]]
speaker = "閃"
# 「お嬢様の要望は、あくまでコンビネーション技……２人の必殺技なんですよね……」
line = "「お嬢様の要望は、あくまでコンビネーション技……２人の必殺技なんですよね……」"

[[dialogue]]
speaker = "unk"
# とりあえず、やってみようか
line = "とりあえず、やってみようか"

[[dialogue]]
speaker = "unk"
# 考えていても仕方ない
line = "考えていても仕方ない"

[[dialogue]]
speaker = "閃"
# 「……そうですね、お嬢様がこの場に居たら、会長さんと同じことを言うはずです」
line = "「……そうですね、お嬢様がこの場に居たら、会長さんと同じことを言うはずです」"

[[dialogue]]
speaker = "閃"
# 「何事もまずは挑戦っ。会長さんの相方、全力で務めさせていただきます！」
line = "「何事もまずは挑戦っ。会長さんの相方、全力で務めさせていただきます！」"

[[dialogue]]
speaker = "閃"
# 「……と意気込んでみたものの、やはり簡単には行きませんね」
line = "「……と意気込んでみたものの、やはり簡単には行きませんね」"

[[dialogue]]
speaker = "unk"
# ごめん、俺が足を引っ張ってるな
line = "ごめん、俺が足を引っ張ってるな"

[[dialogue]]
speaker = "閃"
# 「いえ、私は星眼で未来を予知しているわけですから、会長さんの技量はむしろ驚くべき高さです」
line = "「いえ、私は星眼で未来を予知しているわけですから、会長さんの技量はむしろ驚くべき高さです」"

[[dialogue]]
speaker = "閃"
# 「反省すべきは私の方です……。会長さんと息を合わせようと星眼の出力を落とすと、素の技量ではまるで会長さんに及びません」
line = "「反省すべきは私の方です……。会長さんと息を合わせようと星眼の出力を落とすと、素の技量ではまるで会長さんに及びません」"

[[dialogue]]
speaker = "閃"
# 「会長さんがいかに多くの実戦をくぐり抜けてきたのか、逆に自分の剣術がいかに星眼頼りだったのかを痛感します……」
line = "「会長さんがいかに多くの実戦をくぐり抜けてきたのか、逆に自分の剣術がいかに星眼頼りだったのかを痛感します……」"

[[dialogue]]
speaker = "閃"
# 「こんな未熟な私では、会長さんとコンビネーション技を作り出すなんて、とても――」
line = "「こんな未熟な私では、会長さんとコンビネーション技を作り出すなんて、とても――」"

[[dialogue]]
speaker = "unk"
# ならあえて、星眼を全力解放しよう
line = "ならあえて、星眼を全力解放しよう"

[[dialogue]]
speaker = "閃"
# 「いくら会長さんの技量が高くても、星眼と同じレベルで未来が見えるわけじゃありません」
line = "「いくら会長さんの技量が高くても、星眼と同じレベルで未来が見えるわけじゃありません」"

[[dialogue]]
speaker = "閃"
# 「やっぱり、私の方が会長さんに合わせるべき――」
line = "「やっぱり、私の方が会長さんに合わせるべき――」"

[[dialogue]]
speaker = "unk"
# 閃の動きなら予測できる
line = "閃の動きなら予測できる"

[[dialogue]]
speaker = "unk"
# 未来は予測できなくても
line = "未来は予測できなくても"

[[dialogue]]
speaker = "閃"
# 「……え？」
line = "「……え？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……昔、交通事故に遭ったトラウマで、星眼が解除できない？」
line = "「……昔、交通事故に遭ったトラウマで、星眼が解除できない？」"

[[dialogue]]
speaker = "閃"
# 「はい……出力を落とすことは出来ます。だけど……起きている間は、どうしても能力を解除する勇気が持てないんです……」
line = "「はい……出力を落とすことは出来ます。だけど……起きている間は、どうしても能力を解除する勇気が持てないんです……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「なるほどね！　確かに未来を見れる力があったら、それが見えなくなるのは怖いことかもしれないわ」
line = "「なるほどね！　確かに未来を見れる力があったら、それが見えなくなるのは怖いことかもしれないわ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「でも、大丈夫。いつかそんなトラウマを忘れちゃうくらい、一緒にさえ居れば安心できる人が現れるはずよ！」
line = "「でも、大丈夫。いつかそんなトラウマを忘れちゃうくらい、一緒にさえ居れば安心できる人が現れるはずよ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「根拠？　もちろんあるわ！　だって私は今、自分のピンチが想像できないくらい、センちゃんの護衛を信頼しているんだもの！」
line = "「根拠？　もちろんあるわ！　だって私は今、自分のピンチが想像できないくらい、センちゃんの護衛を信頼しているんだもの！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あなたにだってそういう相手が現れるわ。必ずよ！　だって人生は、サイオウ窯なんだから……！」
line = "「あなたにだってそういう相手が現れるわ。必ずよ！　だって人生は、サイオウ窯なんだから……！」"

[[dialogue]]
speaker = "閃"
# （凄い……！　会長さんの動きがどんどんキレを増して来てます。これなら、本当に……！）
line = "（凄い……！　会長さんの動きがどんどんキレを増して来てます。これなら、本当に……！）"

[[dialogue]]
speaker = "unk"
# 閃、今だ！
line = "閃、今だ！"

[[dialogue]]
speaker = "閃"
# 「はい！　はあぁぁぁっ！」
line = "「はい！　はあぁぁぁっ！」"

[[dialogue]]
speaker = "閃"
# 「本当に……星眼の予測に追いつきました！」
line = "「本当に……星眼の予測に追いつきました！」"

[[dialogue]]
speaker = "unk"
# やったな、閃！
line = "やったな、閃！"

[[dialogue]]
speaker = "閃"
# 「会長さん、本当に凄いです……！　蓋を開けてみたら、わずか数時間で技の完成が見えるところまで漕ぎ着けました……！」
line = "「会長さん、本当に凄いです……！　蓋を開けてみたら、わずか数時間で技の完成が見えるところまで漕ぎ着けました……！」"

[[dialogue]]
speaker = "閃"
# （私が後ろ向きになっていたところで背中を押してくれたポジティブさ。気付けば周囲を導いて問題を解決しているカリスマ性）
line = "（私が後ろ向きになっていたところで背中を押してくれたポジティブさ。気付けば周囲を導いて問題を解決しているカリスマ性）"

[[dialogue]]
speaker = "閃"
# （会長さんはそう……どこか、お嬢様に似ているような――」）
line = "（会長さんはそう……どこか、お嬢様に似ているような――」）"

[[dialogue]]
speaker = "閃"
# 「ただ、会長さん。どうして私の攻撃に合わせられたんですか？」
line = "「ただ、会長さん。どうして私の攻撃に合わせられたんですか？」"

[[dialogue]]
speaker = "unk"
# 閃の動きは信用……いや、信頼できるから
line = "閃の動きは信用……いや、信頼できるから"

[[dialogue]]
speaker = "閃"
# 「えっ」
line = "「えっ」"

[[dialogue]]
speaker = "閃"
# 「会長さんは、私のことを……その……し、信頼って、つまりどういう……」
line = "「会長さんは、私のことを……その……し、信頼って、つまりどういう……」"

[[dialogue]]
speaker = "閃"
# 「って、会長さん！？　い、いきなり近付いて来て、どうしたんですか？」
line = "「って、会長さん！？　い、いきなり近付いて来て、どうしたんですか？」"

[[dialogue]]
speaker = "unk"
# 本当に、凄く綺麗だなと思って
line = "本当に、凄く綺麗だなと思って"

[[dialogue]]
speaker = "unk"
# 閃が瞳を開いたところ、初めて見たから
line = "閃が瞳を開いたところ、初めて見たから"

[[dialogue]]
speaker = "閃"
# 「なっ……！　ななな、な……っ！」
line = "「なっ……！　ななな、な……っ！」"

[[dialogue]]
speaker = "閃"
# 「喉が乾いてしまったので水分補給に行ってきます～～～っ！」
line = "「喉が乾いてしまったので水分補給に行ってきます～～～っ！」"

[[dialogue]]
speaker = "閃"
# （会長さん相手に、何をドキッとしているんですか、私は……！）
line = "（会長さん相手に、何をドキッとしているんですか、私は……！）"

[[dialogue]]
speaker = "閃"
# （私にはそもそも、お嬢様というものが……でも……）
line = "（私にはそもそも、お嬢様というものが……でも……）"

[[dialogue]]
speaker = "閃"
# （ううんっ。ちがう、違うの……っ！　この胸の高鳴りは、違うんです……！）
line = "（ううんっ。ちがう、違うの……っ！　この胸の高鳴りは、違うんです……！）"

[[dialogue]]
speaker = "unk"
# 否定しつつも、先程言われたことを思い出すたびに、どうしようもなく顔が熱くなってしまう閃なのだった。
line = "否定しつつも、先程言われたことを思い出すたびに、どうしようもなく顔が熱くなってしまう閃なのだった。"
