[[dialogue]]
speaker = "unk"
# 第４話,膝の上の恋人,P
line = "第４話,膝の上の恋人,P"

[[dialogue]]
speaker = "マトイ"
# 「ねぇ、アナ。そういえば、気になってたことがあるんだけど……」
line = "「ねぇ、アナ。そういえば、気になってたことがあるんだけど……」"

[[dialogue]]
speaker = "アナ"
# 「はい？　なんでしょうか、マトイ先輩」
line = "「はい？　なんでしょうか、マトイ先輩」"

[[dialogue]]
speaker = "unk"
# 俺たちが星徒会の書類仕事をしていると、マトイがふと口を開いた。その声に、アナは顔を上げる。
line = "俺たちが星徒会の書類仕事をしていると、マトイがふと口を開いた。その声に、アナは顔を上げる。"

[[dialogue]]
speaker = "マトイ"
# 「最近、アナって会長の膝の上に、あんまり乗らなくなったよね」
line = "「最近、アナって会長の膝の上に、あんまり乗らなくなったよね」"

[[dialogue]]
speaker = "アナ"
# 「少し前に友人から指摘されまして……人前でそういうことをするのは、はしたないと学びました」
line = "「少し前に友人から指摘されまして……人前でそういうことをするのは、はしたないと学びました」"

[[dialogue]]
speaker = "アナ"
# 「それに、私と会長は深い絆で結ばれているので、人前で見せつけるような行為は必要ありません」
line = "「それに、私と会長は深い絆で結ばれているので、人前で見せつけるような行為は必要ありません」"

[[dialogue]]
speaker = "マトイ"
# 「お、大人だっ！？　でも、会長の方はちょっと寂しかったりして～？」
line = "「お、大人だっ！？　でも、会長の方はちょっと寂しかったりして～？」"

[[dialogue]]
speaker = "unk"
# 俺はアナの意思を尊重したいと思ってるよ
line = "俺はアナの意思を尊重したいと思ってるよ"

[[dialogue]]
speaker = "マトイ"
# 「へぇ～！　カップルって付き合う期間が長くなってくると落ち着いてくるって、本当だったんだ～」
line = "「へぇ～！　カップルって付き合う期間が長くなってくると落ち着いてくるって、本当だったんだ～」"

[[dialogue]]
speaker = "unk"
# 寂しくないというのは嘘じゃない。なぜなら――
line = "寂しくないというのは嘘じゃない。なぜなら――"

[[dialogue]]
speaker = "アナ"
# 「やっぱり、会長の膝の上はベストプレイス。むふ～<emoji=heart04>」
line = "「やっぱり、会長の膝の上はベストプレイス。むふ～<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺の部屋のベッドで、アナは俺の膝の上に腰を下ろし、安堵するように息をつく。
line = "俺の部屋のベッドで、アナは俺の膝の上に腰を下ろし、安堵するように息をつく。"

[[dialogue]]
speaker = "unk"
# 放課後になると、アナはほとんど毎日のように俺の部屋へやって来て、時間が許す限り膝の上で過ごすのが当たり前になっていた。
line = "放課後になると、アナはほとんど毎日のように俺の部屋へやって来て、時間が許す限り膝の上で過ごすのが当たり前になっていた。"

[[dialogue]]
speaker = "アナ"
# 「会長？　どうかしましたか？」
line = "「会長？　どうかしましたか？」"

[[dialogue]]
speaker = "アナ"
# 「もしかして……私が膝の上に乗っているから、足がしびれてしまいましたか？　重かったでしょうか？」
line = "「もしかして……私が膝の上に乗っているから、足がしびれてしまいましたか？　重かったでしょうか？」"

[[dialogue]]
speaker = "unk"
# 晴れ着のアナが可愛くて、見惚れちゃってた
line = "晴れ着のアナが可愛くて、見惚れちゃってた"

[[dialogue]]
speaker = "アナ"
# 「んぅ<emoji=heart04>　ふふふっ<emoji=heart04>　会長はいつもそうやって褒めてくれるので……胸がキュンってして、私のイチャイチャスイッチがオンになっちゃいます……<emoji=heart04>」
line = "「んぅ<emoji=heart04>　ふふふっ<emoji=heart04>　会長はいつもそうやって褒めてくれるので……胸がキュンってして、私のイチャイチャスイッチがオンになっちゃいます……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そこで俺は今日の星徒会室でのやり取りを思い出して、改めてアナに聞いてみる。
line = "そこで俺は今日の星徒会室でのやり取りを思い出して、改めてアナに聞いてみる。"

[[dialogue]]
speaker = "アナ"
# 「――どうして星徒会で膝に乗らなくなったのか、ですか？」
line = "「――どうして星徒会で膝に乗らなくなったのか、ですか？」"

[[dialogue]]
speaker = "アナ"
# 「その……私は会長とスキンシップをしていると、無意識にデレデレな顔と声になってしまっているらしいので……」
line = "「その……私は会長とスキンシップをしていると、無意識にデレデレな顔と声になってしまっているらしいので……」"

[[dialogue]]
speaker = "アナ"
# 「そういう恥ずかしいところは……会長以外には見せたくないな、と……」
line = "「そういう恥ずかしいところは……会長以外には見せたくないな、と……」"

[[dialogue]]
speaker = "アナ"
# 「あ、でも……会長の希望を優先したい、したいです。会長はどうでしょうか？　外でも、もっとイチャイチャ、したいですか……？」
line = "「あ、でも……会長の希望を優先したい、したいです。会長はどうでしょうか？　外でも、もっとイチャイチャ、したいですか……？」"

[[dialogue]]
speaker = "unk"
# 頬を赤らめ、上目遣いでもじもじしながら、俺を見上げてくるアナ。
line = "頬を赤らめ、上目遣いでもじもじしながら、俺を見上げてくるアナ。"

[[dialogue]]
speaker = "unk"
# そのいじらしい姿があまりにも可愛くて、思わず膝上のアナを抱き締めてしまう。
line = "そのいじらしい姿があまりにも可愛くて、思わず膝上のアナを抱き締めてしまう。"

[[dialogue]]
speaker = "アナ"
# 「あっ<emoji=heart04>　会長……<emoji=heart04>」
line = "「あっ<emoji=heart04>　会長……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺も、アナの可愛いところは独り占めしたい
line = "俺も、アナの可愛いところは独り占めしたい"

[[dialogue]]
speaker = "アナ"
# 「んぅ……えへへへへへぇ<emoji=heart04>　それなら、万事ノープロブレムです<emoji=heart04>」
line = "「んぅ……えへへへへへぇ<emoji=heart04>　それなら、万事ノープロブレムです<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺たちカップルのよくある過ごし方として、部屋でぴったりと寄り添いながら、それぞれ別の本を読むことが多かった。
line = "俺たちカップルのよくある過ごし方として、部屋でぴったりと寄り添いながら、それぞれ別の本を読むことが多かった。"

[[dialogue]]
speaker = "アナ"
# 「……こうしていつも会長の膝の上で本を読んでいると、会長の息遣いまで聞こえてきて、すごく安心します」
line = "「……こうしていつも会長の膝の上で本を読んでいると、会長の息遣いまで聞こえてきて、すごく安心します」"

[[dialogue]]
speaker = "アナ"
# 「ここまでリラックスできる場所は他にありませんから、おかげでとても読書に集中できます」
line = "「ここまでリラックスできる場所は他にありませんから、おかげでとても読書に集中できます」"

[[dialogue]]
speaker = "アナ"
# 「――えっ、会長はあまり集中できないんですか？　私の体温や息遣いを感じると、ドキドキしちゃうから……？」
line = "「――えっ、会長はあまり集中できないんですか？　私の体温や息遣いを感じると、ドキドキしちゃうから……？」"

[[dialogue]]
speaker = "アナ"
# 「もうっ、そんなことを言われたら、私までドキドキして集中できなくなっちゃうじゃないですかっ」
line = "「もうっ、そんなことを言われたら、私までドキドキして集中できなくなっちゃうじゃないですかっ」"

[[dialogue]]
speaker = "アナ"
# 「会長のいじわる<emoji=heart04>」
line = "「会長のいじわる<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ぷくっと頬を膨れさせてみせるアナの仕草が可愛くて、俺は堪えきれずキスをしてしまう。
line = "ぷくっと頬を膨れさせてみせるアナの仕草が可愛くて、俺は堪えきれずキスをしてしまう。"

[[dialogue]]
speaker = "アナ"
# 「あっ<emoji=heart04>　んっ……ちゅっ<emoji=heart04>」
line = "「あっ<emoji=heart04>　んっ……ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
# 「はふぅ……<emoji=heart04>　もう、会長は私がキスをすれば、機嫌が直ると思ってますね？」
line = "「はふぅ……<emoji=heart04>　もう、会長は私がキスをすれば、機嫌が直ると思ってますね？」"

[[dialogue]]
speaker = "アナ"
# 「まあ、おおむね間違いではないんですが……」
line = "「まあ、おおむね間違いではないんですが……」"

[[dialogue]]
speaker = "アナ"
# 「イチャイチャするのもいいですが、将来のためには勉強も必要ですよ」
line = "「イチャイチャするのもいいですが、将来のためには勉強も必要ですよ」"

[[dialogue]]
speaker = "アナ"
# 「ほら、見てください会長。これが以前言っていた、『モデルロケット』の作り方です」
line = "「ほら、見てください会長。これが以前言っていた、『モデルロケット』の作り方です」"

[[dialogue]]
speaker = "unk"
# そう言って、アナは読んでいた本のページを俺に見せてくれる。
line = "そう言って、アナは読んでいた本のページを俺に見せてくれる。"

[[dialogue]]
speaker = "アナ"
# 「お、ロケットと聞いて会長も目の色が変わりましたね。さすがは男の子」
line = "「お、ロケットと聞いて会長も目の色が変わりましたね。さすがは男の子」"

[[dialogue]]
speaker = "アナ"
# 「『モデルロケット』は固体燃料を使って打ち上げる、小型のロケットです」
line = "「『モデルロケット』は固体燃料を使って打ち上げる、小型のロケットです」"

[[dialogue]]
speaker = "アナ"
# 「個人でも作って打ち上げることができて、高さは数１００メートル飛んだりもします。回収用にパラシュートが付いていたりすることが多いみたいですね」
line = "「個人でも作って打ち上げることができて、高さは数１００メートル飛んだりもします。回収用にパラシュートが付いていたりすることが多いみたいですね」"

[[dialogue]]
speaker = "アナ"
# 「次の目標としては、これを作ってみようと思ってるんです」
line = "「次の目標としては、これを作ってみようと思ってるんです」"

[[dialogue]]
speaker = "アナ"
# 「ただ本やデータを読み漁るばかりではなく、アニマ先輩のようにもっと実物を作ったり動かすことで、宇宙に関することを学んでみたいんです」
line = "「ただ本やデータを読み漁るばかりではなく、アニマ先輩のようにもっと実物を作ったり動かすことで、宇宙に関することを学んでみたいんです」"

[[dialogue]]
speaker = "アナ"
# 「――会長も手伝ってくれるんですか？　ふふっ、それを聞いて、ますます楽しみになってきました」
line = "「――会長も手伝ってくれるんですか？　ふふっ、それを聞いて、ますます楽しみになってきました」"

[[dialogue]]
speaker = "アナ"
# 「それじゃあ、今度の休日はロケット制作デート、ですね♪」
line = "「それじゃあ、今度の休日はロケット制作デート、ですね♪」"

[[dialogue]]
speaker = "アナ"
# 「リクリエとの戦いも、イチャイチャも、将来の勉強も、計画的に全部やりましょう」
line = "「リクリエとの戦いも、イチャイチャも、将来の勉強も、計画的に全部やりましょう」"

[[dialogue]]
speaker = "アナ"
# 「どこまでも欲張りに行きたいです。だって私は、最強の魔王の恋人なんですから<emoji=heart04>」
line = "「どこまでも欲張りに行きたいです。だって私は、最強の魔王の恋人なんですから<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# じゃあ、この後のイチャイチャの計画は？
line = "じゃあ、この後のイチャイチャの計画は？"

[[dialogue]]
speaker = "アナ"
# 「ふふっ<emoji=heart04>　仕方ないですね。魔王様のイチャイチャスイッチがすっかり入ってしまったようなので、恋人として満足させなければいけません」
line = "「ふふっ<emoji=heart04>　仕方ないですね。魔王様のイチャイチャスイッチがすっかり入ってしまったようなので、恋人として満足させなければいけません」"

[[dialogue]]
speaker = "unk"
# アナはそう言うと、１度膝の上から降りて、俺と向き合うように座り直す。
line = "アナはそう言うと、１度膝の上から降りて、俺と向き合うように座り直す。"

[[dialogue]]
speaker = "アナ"
# 「よいしょっと……会長、これでキスの準備はノープロブレムです<emoji=heart04>」
line = "「よいしょっと……会長、これでキスの準備はノープロブレムです<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
# 「アナのこと、たくさん可愛がってくださいね……会長<emoji=heart04>」
line = "「アナのこと、たくさん可愛がってくださいね……会長<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
# 「んむっ<emoji=heart04>　ちゅっ……会長<emoji=heart04>　ちゅっ<emoji=heart04>」
line = "「んむっ<emoji=heart04>　ちゅっ……会長<emoji=heart04>　ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そして俺たちは、本のことも忘れ、何度も唇を重ねながら、甘く蕩ける時間に溺れていくのだった。
line = "そして俺たちは、本のことも忘れ、何度も唇を重ねながら、甘く蕩ける時間に溺れていくのだった。"
