line = "「からかってなんかいないのに。じゃあごめんなさい、緋宮会長。ユウリをお借りしますね」"

[[dialogue]]
speaker = "ユウリ"
# 「いやあたしはこいつのもんじゃねーし」
line = "「いやあたしはこいつのもんじゃねーし」"

[[dialogue]]
speaker = "ユウリ"
# 「またな、新星の会長さん。今日は付き合ってくれてありがとな」
line = "「またな、新星の会長さん。今日は付き合ってくれてありがとな」"
