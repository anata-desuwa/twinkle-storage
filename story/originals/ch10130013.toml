[[dialogue]]
speaker = "ユウリ"
# 「おわあっ！？」
line = "「おわあっ！？」"

[[dialogue]]
speaker = "ユウリ"
# 「見てたのか？　どこから見てた？　いや、言わなくていい！　いいから忘れろ～！」
line = "「見てたのか？　どこから見てた？　いや、言わなくていい！　いいから忘れろ～！」"

[[dialogue]]
speaker = "unk"
# お、落ち着いて！
line = "お、落ち着いて！"

[[dialogue]]
speaker = "ユウリ"
# 「はぁ～……さっき見たの、他の誰にも言うんじゃねーぞ。特にソフィアとかルリとかには」
line = "「はぁ～……さっき見たの、他の誰にも言うんじゃねーぞ。特にソフィアとかルリとかには」"

[[dialogue]]
speaker = "ユウリ"
# 「意外とか言うなよ？　あたしはこんな性格だが、別に男になった覚えはねー。れっきとした年頃の女子だっての」
line = "「意外とか言うなよ？　あたしはこんな性格だが、別に男になった覚えはねー。れっきとした年頃の女子だっての」"

[[dialogue]]
speaker = "ユウリ"
# 「あたしだって化粧品のひとつやふたつ持ってるし……ほとんどフィオナからもらったやつだけど」
line = "「あたしだって化粧品のひとつやふたつ持ってるし……ほとんどフィオナからもらったやつだけど」"

[[dialogue]]
speaker = "ユウリ"
# 「アホ猫みたいに、『ユウリのくせに色気づいてるニャン！』とか言ったらぶっ飛ばすからな」
line = "「アホ猫みたいに、『ユウリのくせに色気づいてるニャン！』とか言ったらぶっ飛ばすからな」"

[[dialogue]]
speaker = "unk"
# さっきの服、似合うと思う
line = "さっきの服、似合うと思う"

[[dialogue]]
speaker = "ユウリ"
# 「！」
line = "「！」"

[[dialogue]]
speaker = "ユウリ"
# 「そ、そうか……まぁ、話半分に受け取っとく」
line = "「そ、そうか……まぁ、話半分に受け取っとく」"

[[dialogue]]
speaker = "ユウリ"
# 「なんだその残念そうな顔は。まさか本気で着てほしいとか思ってないだろうな？」
line = "「なんだその残念そうな顔は。まさか本気で着てほしいとか思ってないだろうな？」"

[[dialogue]]
speaker = "ユウリ"
# 「いやそこで期待した顔すんなよ。どっかのアホ猫みたいな反応されるよりはいいけどさ」
line = "「いやそこで期待した顔すんなよ。どっかのアホ猫みたいな反応されるよりはいいけどさ」"

[[dialogue]]
speaker = "ユウリ"
# 「あと街に出たついでに画材見るのは……やめとくか。買っても荷物になりそうだし」
line = "「あと街に出たついでに画材見るのは……やめとくか。買っても荷物になりそうだし」"

[[dialogue]]
speaker = "ユウリ"
# 「ああ、言ったことあったっけ？　下手の横好きで人に見せられたもんじゃねーが、油絵をちょっとな」
line = "「ああ、言ったことあったっけ？　下手の横好きで人に見せられたもんじゃねーが、油絵をちょっとな」"

[[dialogue]]
speaker = "ユウリ"
# 「キャンバスに向かって集中するのってかっこいいなー、って思ってなんとなくでやってみたらけっこうはまってさ」
line = "「キャンバスに向かって集中するのってかっこいいなー、って思ってなんとなくでやってみたらけっこうはまってさ」"

[[dialogue]]
speaker = "ユウリ"
# 「絵を描くのは難しいけど、体を動かすのとは違う気持ち良さがあるんだよな。……なんて、本気で絵を描いてるやつに言ったら怒られるかもしれないけど」
line = "「絵を描くのは難しいけど、体を動かすのとは違う気持ち良さがあるんだよな。……なんて、本気で絵を描いてるやつに言ったら怒られるかもしれないけど」"

[[dialogue]]
speaker = "ユウリ"
# 「……あ」
line = "「……あ」"

[[dialogue]]
speaker = "ユウリ"
# 「まだ待ち合わせに時間あるし、なんか食うか。行こうぜ」
line = "「まだ待ち合わせに時間あるし、なんか食うか。行こうぜ」"

[[dialogue]]
speaker = "ユウリ"
# 「ぺろぺろ……やっぱりこの店のキャラメルバニラアイスは最高だな。……そんなにじっと見てもやらねーぞ。自分の食え」
line = "「ぺろぺろ……やっぱりこの店のキャラメルバニラアイスは最高だな。……そんなにじっと見てもやらねーぞ。自分の食え」"

[[dialogue]]
speaker = "ユウリ"
# 「それじゃもひとつ……ぺろっ。食べ過ぎだって？　普段運動してんだからこれくらい平気だっての」
line = "「それじゃもひとつ……ぺろっ。食べ過ぎだって？　普段運動してんだからこれくらい平気だっての」"

[[dialogue]]
speaker = "ユウリ"
# 「ていうか、いくら食べても太ったことねえ。ソフィアやセーラさんには羨ましいって言われるけどな」
line = "「ていうか、いくら食べても太ったことねえ。ソフィアやセーラさんには羨ましいって言われるけどな」"

[[dialogue]]
speaker = "フィオナ"
# 「ユウリ、お待たせ。……あれ、緋宮会長？」
line = "「ユウリ、お待たせ。……あれ、緋宮会長？」"

[[dialogue]]
speaker = "ニャリオン"
# 「なんで新星の会長がいるニャン？　ユウリのくせにデートしてたのニャ？」
line = "「なんで新星の会長がいるニャン？　ユウリのくせにデートしてたのニャ？」"

[[dialogue]]
speaker = "ユウリ"
# 「んだとコラ。ていうかちげーよ。あたしが服見てたら偶然出くわしただけだ」
line = "「んだとコラ。ていうかちげーよ。あたしが服見てたら偶然出くわしただけだ」"

[[dialogue]]
speaker = "ニャリオン"
# 「ユウリが服を～？　やっぱり色気づいてるニャ」
line = "「ユウリが服を～？　やっぱり色気づいてるニャ」"

[[dialogue]]
speaker = "ユウリ"
# 「うっせー。アホ猫はマタタビでもやってろ」
line = "「うっせー。アホ猫はマタタビでもやってろ」"

[[dialogue]]
speaker = "フィオナ"
# 「最近いろいろ任せてごめんね。はい、マカロン好きだったでしょ」
line = "「最近いろいろ任せてごめんね。はい、マカロン好きだったでしょ」"

[[dialogue]]
speaker = "ユウリ"
# 「お、サンキュー」
line = "「お、サンキュー」"

[[dialogue]]
speaker = "ニャリオン"
# 「ユウリにマカロンとか全然似合わニャいニャン。プロテインでも飲んでるがいいニャ」
line = "「ユウリにマカロンとか全然似合わニャいニャン。プロテインでも飲んでるがいいニャ」"

[[dialogue]]
speaker = "ユウリ"
# 「ははっ、キャットフードばっか食べてる猫にはマカロンの味はわかんねーだろうなー」
line = "「ははっ、キャットフードばっか食べてる猫にはマカロンの味はわかんねーだろうなー」"

