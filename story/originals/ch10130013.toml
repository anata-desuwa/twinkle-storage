line = "「ところで緋宮会長、ユウリはどんな服を見てたんですか？　……ふむふむ、なるほど。試着ぐらいしてみても良かったんじゃない？」"

[[dialogue]]
speaker = "ユウリ"
# 「いや、ソフィアやルリならともかくあたしには絶対似合わないだろ」
line = "「いや、ソフィアやルリならともかくあたしには絶対似合わないだろ」"

[[dialogue]]
speaker = "フィオナ"
# 「ユウリが着たところ見てみたかったんだけどな～。ねぇ、緋宮会長」
line = "「ユウリが着たところ見てみたかったんだけどな～。ねぇ、緋宮会長」"

[[dialogue]]
speaker = "unk"
# すごく見てみたい！
line = "すごく見てみたい！"

[[dialogue]]
speaker = "フィオナ"
# 「ふふっ。ですよねー」
line = "「ふふっ。ですよねー」"

[[dialogue]]
speaker = "ユウリ"
# 「はぁっ！？　似合わないっつってんだろーが！」
line = "「はぁっ！？　似合わないっつってんだろーが！」"

[[dialogue]]
speaker = "ユウリ"
# 「変なところで仲良くなるな、星徒会長コンビ！　ったく、からかうんじゃねーぞ」
