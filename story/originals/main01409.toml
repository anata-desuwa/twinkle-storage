[[dialogue]]
speaker = "unk"
# 第１２話,使徒のさだめ,B
line = "第１２話,使徒のさだめ,B"

[[dialogue]]
speaker = "アポロ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# ──天空の<ruby=いただき>頂</ruby>で、少女は破滅を眺めていた。
line = "──天空の<ruby>頂<rt>いただき</rt></ruby>で、少女は破滅を眺めていた。"

[[dialogue]]
speaker = "unk"
# 無尽蔵に生まれゆくアステライト、絶え間なく降り注ぐ流星群……。
line = "無尽蔵に生まれゆくアステライト、絶え間なく降り注ぐ流星群……。"

[[dialogue]]
speaker = "アポロ"
# 「……これでいいはずだ。なあ、ギエル」
line = "「……これでいいはずだ。なあ、ギエル」"

[[dialogue]]
speaker = "ギエル"
# 「──ええ。もちろんですとも」
line = "「──ええ。もちろんですとも」"

[[dialogue]]
speaker = "unk"
# その傍らには従者ギエル。
line = "その傍らには従者ギエル。"

[[dialogue]]
speaker = "unk"
# 彼女が<ruby=アルタイル>この世界線</ruby>に生まれ落ちて初めて、その資質を見出した人間だった。
line = "彼女が<ruby>この世界線<rt>アルタイル</rt></ruby>に生まれ落ちて初めて、その資質を見出した人間だった。"

[[dialogue]]
speaker = "アポロ"
# 「最近、よく夢を見る」
line = "「最近、よく夢を見る」"

[[dialogue]]
speaker = "ギエル"
# 「夢……でございますか？」
line = "「夢……でございますか？」"

[[dialogue]]
speaker = "アポロ"
# 「そうだ。私に似た女と、庭でかけっこしたり、変な映像を見たりする夢だ」
line = "「そうだ。私に似た女と、庭でかけっこしたり、変な映像を見たりする夢だ」"

[[dialogue]]
speaker = "アポロ"
# 「これは──オマエがいつか言っていた……デネブ、とかいうセカイに関わりがあるのか？」
line = "「これは──オマエがいつか言っていた……デネブ、とかいうセカイに関わりがあるのか？」"

[[dialogue]]
speaker = "ギエル"
# 「……かもしれませんね」
line = "「……かもしれませんね」"

[[dialogue]]
speaker = "アポロ"
# 「あたしは……その夢を見ると、なんだか虚しくなる」
line = "「あたしは……その夢を見ると、なんだか虚しくなる」"

[[dialogue]]
speaker = "アポロ"
# 「その夢は何なのか。今のあたしは何なのか。あたしは、このままでいいのかって……」
line = "「その夢は何なのか。今のあたしは何なのか。あたしは、このままでいいのかって……」"

[[dialogue]]
speaker = "ギエル"
# 「──アポロ様。僭越ながら、そのような些事を気にされる必要はないかと」
line = "「──アポロ様。僭越ながら、そのような些事を気にされる必要はないかと」"

[[dialogue]]
speaker = "ギエル"
# 「あなた様はこの世界を創り変えし真の英雄──ささやかな夢ごときに惑わされる道理はありません」
line = "「あなた様はこの世界を創り変えし真の英雄──ささやかな夢ごときに惑わされる道理はありません」"

[[dialogue]]
speaker = "アポロ"
# 「フ……それもそうか」
line = "「フ……それもそうか」"

[[dialogue]]
speaker = "unk"
# ギエルの説得を受け、アポロはふっと笑った。
line = "ギエルの説得を受け、アポロはふっと笑った。"

[[dialogue]]
speaker = "ギエル"
# 「私はあなた様と出会い、救われました。あの日……無為に散らそうとしていたこの命が未だ永らえているのも、あなた様のおかげです」
line = "「私はあなた様と出会い、救われました。あの日……無為に散らそうとしていたこの命が未だ永らえているのも、あなた様のおかげです」"

[[dialogue]]
speaker = "アポロ"
# 「そう──そう……だったか。悪い。なんだか、昔のことはあまりうまく思い出せない」
line = "「そう──そう……だったか。悪い。なんだか、昔のことはあまりうまく思い出せない」"

[[dialogue]]
speaker = "ギエル"
# 「思い出せぬのなら何度でも語ってしんぜましょう。あなた様との出会いは、私にとって忘れがたき運命の始点でありました」
line = "「思い出せぬのなら何度でも語ってしんぜましょう。あなた様との出会いは、私にとって忘れがたき運命の始点でありました」"

[[dialogue]]
speaker = "ギエル"
# 「このギエルという名も、立ち場も！　総てはアポロ様──あなたに授かったものなのですから」
line = "「このギエルという名も、立ち場も！　総てはアポロ様──あなたに授かったものなのですから」"

[[dialogue]]
speaker = "unk"
# ギエルの陶酔に偽りはない。
line = "ギエルの陶酔に偽りはない。"

[[dialogue]]
speaker = "unk"
# 執事として、従者として──彼女がリクリエという野望を完遂させるまで尽力すると誓っていた。
line = "執事として、従者として──彼女がリクリエという野望を完遂させるまで尽力すると誓っていた。"

[[dialogue]]
speaker = "アポロ"
# 「そうか……うむ……そうだな。初心わするべからず、だ」
line = "「そうか……うむ……そうだな。初心わするべからず、だ」"

[[dialogue]]
speaker = "アポロ"
# 「魔王を倒す。なぜならあたしはヒーローだからだ。そして、世界はリクリエによって生まれ変わるのだ！」
line = "「魔王を倒す。なぜならあたしはヒーローだからだ。そして、世界はリクリエによって生まれ変わるのだ！」"

[[dialogue]]
speaker = "ギエル"
# 「ええ……その通り。それでこそアポロ様」
line = "「ええ……その通り。それでこそアポロ様」"

[[dialogue]]
speaker = "ギエル"
# 「人も、魔女も、星騎士も──何もかも呑み込めばよいのです。それが、宇宙のあるべき姿なのですから」
line = "「人も、魔女も、星騎士も──何もかも呑み込めばよいのです。それが、宇宙のあるべき姿なのですから」"

[[dialogue]]
speaker = "unk"
# ──最後の決戦へ向けて。
line = "──最後の決戦へ向けて。"

[[dialogue]]
speaker = "unk"
# 星見る夜は、混沌と深まっていく……。
line = "星見る夜は、混沌と深まっていく……。"
