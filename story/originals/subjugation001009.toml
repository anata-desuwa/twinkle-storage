[[dialogue]]
speaker = "unk"
# 果たして、新種のモンスターは見事に討ち果たされ、今度こそ瘴気も残らず、完全な消滅が確認された。
line = "果たして、新種のモンスターは見事に討ち果たされ、今度こそ瘴気も残らず、完全な消滅が確認された。"

[[dialogue]]
speaker = "unk"
# そして――
line = "そして――"

[[dialogue]]
speaker = "unk"
# みんな、お疲れ様！　乾杯！
line = "みんな、お疲れ様！　乾杯！"

[[dialogue]]
speaker = "クラスメイト達"
# 「カンパーイ！！！」
line = "「カンパーイ！！！」"

[[dialogue]]
speaker = "unk"
# モンスターを倒した後、みんなでお疲れ様会をすることになった。
line = "モンスターを倒した後、みんなでお疲れ様会をすることになった。"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「カンパーイ♪　そして、いただきますなのだ～！　もぐもぐ♪」
line = "「カンパーイ♪　そして、いただきますなのだ～！　もぐもぐ♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「もう、アルモタヘルったら、またそんな沢山、肉料理を頼んで。１人だけガッツリ夕食みたいになってるじゃないですか」
line = "「もう、アルモタヘルったら、またそんな沢山、肉料理を頼んで。１人だけガッツリ夕食みたいになってるじゃないですか」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「鬼ごっこに戦闘にと、沢山動き回ってお腹が空いたから、その分の補給なのだ！」
line = "「鬼ごっこに戦闘にと、沢山動き回ってお腹が空いたから、その分の補給なのだ！」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「それにこうして、美味なお肉を食べていると、生きていてよかったと実感できるのだ♪　もぐもぐ♪」
line = "「それにこうして、美味なお肉を食べていると、生きていてよかったと実感できるのだ♪　もぐもぐ♪」"

[[dialogue]]
speaker = "ナミエル"
# 「一時はどうなるかと思いましたが、お２人が無事でよかったです」
line = "「一時はどうなるかと思いましたが、お２人が無事でよかったです」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「ありがとうございます、ナミエル。私たちのことを諦めずに戦ってくれて」
line = "「ありがとうございます、ナミエル。私たちのことを諦めずに戦ってくれて」"

[[dialogue]]
speaker = "ナミエル"
# 「いえ。あれはその、星騎士として……当然のことをしただけと言いますか……」
line = "「いえ。あれはその、星騎士として……当然のことをしただけと言いますか……」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「それに皆さま、ママダレナって呼んでくれて、とても嬉しかったです♪」
line = "「それに皆さま、ママダレナって呼んでくれて、とても嬉しかったです♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「ナミエルも、ね？　ふふっ♪」
line = "「ナミエルも、ね？　ふふっ♪」"

[[dialogue]]
speaker = "ナミエル"
# 「う……」
line = "「う……」"

[[dialogue]]
speaker = "ナミエル"
# 「そ、そう呼んで欲しいって言っていましたから……」
line = "「そ、そう呼んで欲しいって言っていましたから……」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「我のことも、ちゃんとアルモたんと呼んでくれて、嬉しかったぞ！」
line = "「我のことも、ちゃんとアルモたんと呼んでくれて、嬉しかったぞ！」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「皆さまのおかげで、こうしてこの場にいられます」
line = "「皆さまのおかげで、こうしてこの場にいられます」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「だから改めて、ナミエル」
line = "「だから改めて、ナミエル」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「これから友達として、仲よくして頂けますか？」
line = "「これから友達として、仲よくして頂けますか？」"

[[dialogue]]
speaker = "ナミエル"
# 「……！　はい。それは、もちろんです」
line = "「……！　はい。それは、もちろんです」"

[[dialogue]]
speaker = "ナミエル"
# 「出会いは大切にしたいですから。その……ママダレナ」
line = "「出会いは大切にしたいですから。その……ママダレナ」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「はい♪」
line = "「はい♪」"

[[dialogue]]
speaker = "ナミエル"
# 「アルモたん」
line = "「アルモたん」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「うむ！」
line = "「うむ！」"

[[dialogue]]
speaker = "ナミエル"
# 「友達として、これからよろしくお願いします」
line = "「友達として、これからよろしくお願いします」"

[[dialogue]]
speaker = "セシア"
# 「じ～っ……」
line = "「じ～っ……」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「お？　セシア、どうしたのだ？　ナミエルにママ判定か？」
line = "「お？　セシア、どうしたのだ？　ナミエルにママ判定か？」"

[[dialogue]]
speaker = "セシア"
# 「……いいえ、違うわ。ナミエルは残念ながら、わたくしのママではないわ。でも――」
line = "「……いいえ、違うわ。ナミエルは残念ながら、わたくしのママではないわ。でも――」"

[[dialogue]]
speaker = "セシア"
# 「２人が親しく呼ばれているのに、わたくしだけ仲間外れは悲しいと思って」
line = "「２人が親しく呼ばれているのに、わたくしだけ仲間外れは悲しいと思って」"

[[dialogue]]
speaker = "ナミエル"
# 「じ、じゃあ……セッシ―」
line = "「じ、じゃあ……セッシ―」"

[[dialogue]]
speaker = "セシア"
# 「ふふっ♪　プラス１ポイントね、ナミエル。附属校の１年生同士、これから仲よくしましょう♪」
line = "「ふふっ♪　プラス１ポイントね、ナミエル。附属校の１年生同士、これから仲よくしましょう♪」"

[[dialogue]]
speaker = "ナミエル"
# 「はい。こちらこそ、よろしくお願いします」
line = "「はい。こちらこそ、よろしくお願いします」"

[[dialogue]]
speaker = "unk"
# 握手を交わす、ナミエルとセシア。
line = "握手を交わす、ナミエルとセシア。"

[[dialogue]]
speaker = "アニマ"
# 「フヒ♪　趣味で作った幼アバターだったガ、どうやらいい化学反応を起こしたようダ」
line = "「フヒ♪　趣味で作った幼アバターだったガ、どうやらいい化学反応を起こしたようダ」"

[[dialogue]]
speaker = "unk"
# アニマ先輩、助けに来てくれてありがとう
line = "アニマ先輩、助けに来てくれてありがとう"

[[dialogue]]
speaker = "アニマ"
# 「なに、お互い様サ。会長もアニマのことを信じて、待っていてくれたダロウ？」
line = "「なに、お互い様サ。会長もアニマのことを信じて、待っていてくれたダロウ？」"

[[dialogue]]
speaker = "アニマ"
# 「……保健室で攻撃された時、手に持っていたＤＩＳＣが壊れて、すぐに連絡することができなカッタ」
line = "「……保健室で攻撃された時、手に持っていたＤＩＳＣが壊れて、すぐに連絡することができなカッタ」"

[[dialogue]]
speaker = "アニマ"
# 「会長が時間を稼いでくれなかったら、ワクチンの完成は間に合わなかったかもしれナイ」
line = "「会長が時間を稼いでくれなかったら、ワクチンの完成は間に合わなかったかもしれナイ」"

[[dialogue]]
speaker = "アニマ"
# 「だから、信じていてくれて、こちらこそ嬉しかったヨ。ありがとダ、会長♪」
line = "「だから、信じていてくれて、こちらこそ嬉しかったヨ。ありがとダ、会長♪」"

[[dialogue]]
speaker = "アニマ"
# 「――フヒ♪」
line = "「――フヒ♪」"

[[dialogue]]
speaker = "unk"
# ところで、俺たちの体は――
line = "ところで、俺たちの体は――"

[[dialogue]]
speaker = "アニマ"
# 「ああ、瘴気は完全に取り除かれたから、いつでも戻ることが可能だヨ」
line = "「ああ、瘴気は完全に取り除かれたから、いつでも戻ることが可能だヨ」"

[[dialogue]]
speaker = "アニマ"
# 「会長はもう、元の体に戻りたいのカナ？」
line = "「会長はもう、元の体に戻りたいのカナ？」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「えっ、会長。附属校に通うのを止めてしまわれるのですか？」
line = "「えっ、会長。附属校に通うのを止めてしまわれるのですか？」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「え～！　アルモたんは寂しいのだ！」
line = "「え～！　アルモたんは寂しいのだ！」"

[[dialogue]]
speaker = "ナミエル"
# 「男に戻らず、もうそのままでいればいいのでは？」
line = "「男に戻らず、もうそのままでいればいいのでは？」"

[[dialogue]]
speaker = "unk"
# いやいや、会長としての仕事があるし！
line = "いやいや、会長としての仕事があるし！"

[[dialogue]]
speaker = "unk"
# それにずっとこの体でいると、いつか心まで女の子になってしまいそうなのが怖い！
line = "それにずっとこの体でいると、いつか心まで女の子になってしまいそうなのが怖い！"

[[dialogue]]
speaker = "アニマ"
# 「アニマ的にはどっちもアリだぞ？　フヒ♪」
line = "「アニマ的にはどっちもアリだぞ？　フヒ♪」"

[[dialogue]]
speaker = "セシア"
# 「元の会長も悪くはないけど、セシアはやっぱりクロトママの方にプラス１ポイントね♪」
line = "「元の会長も悪くはないけど、セシアはやっぱりクロトママの方にプラス１ポイントね♪」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「それなら、多数決を取るのだ！　会長にまだ、附属校に通って欲しい人～！」
line = "「それなら、多数決を取るのだ！　会長にまだ、附属校に通って欲しい人～！」"

[[dialogue]]
speaker = "クラスメイト達"
# 「は～い！！！」
line = "「は～い！！！」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「全員なのだ！」
line = "「全員なのだ！」"

[[dialogue]]
speaker = "unk"
# いや、そう言ってくれるのは嬉しいけども！
line = "いや、そう言ってくれるのは嬉しいけども！"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「ふふっ、１度仲よくなった以上、会長も附属生アバターをこまめに使っていかないといけませんね♪」
line = "「ふふっ、１度仲よくなった以上、会長も附属生アバターをこまめに使っていかないといけませんね♪」"

[[dialogue]]
speaker = "ナミエル"
# 「男として、責任は取らないと」
line = "「男として、責任は取らないと」"

[[dialogue]]
speaker = "ナミエル"
# 「――ですよね？　緋宮会長」
line = "「――ですよね？　緋宮会長」"

[[dialogue]]
speaker = "unk"
# どうやら俺の附属生女子としての生活は、これからも並行して続いていくらしかった――
line = "どうやら俺の附属生女子としての生活は、これからも並行して続いていくらしかった――"
