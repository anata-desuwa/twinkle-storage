[[dialogue]]
speaker = "unk"
# 第１話,もう１人の転入生,P
line = "第１話,もう１人の転入生,P"

[[dialogue]]
speaker = "unk"
# ある日、トワ先生と街へ買い出しに出掛けていた時のこと――
line = "ある日、トワ先生と街へ買い出しに出掛けていた時のこと――"

[[dialogue]]
speaker = "トワ先生"
# 「いや～、キミが備品の買い出しを手伝ってくれて、先生助かっちゃったよ～♪」
line = "「いや～、キミが備品の買い出しを手伝ってくれて、先生助かっちゃったよ～♪」"

[[dialogue]]
speaker = "unk"
# 困った時は手伝いますから、言って下さい
line = "困った時は手伝いますから、言って下さい"

[[dialogue]]
speaker = "トワ先生"
# 「ありがとう♪　その時はまたお願いしちゃおうかな。……あれ？」
line = "「ありがとう♪　その時はまたお願いしちゃおうかな。……あれ？」"

[[dialogue]]
speaker = "フェニエル"
# 「うぅ……都会の街はなまら複雑で、まるで迷路です……」
line = "「うぅ……都会の街はなまら複雑で、まるで迷路です……」"

[[dialogue]]
speaker = "unk"
# 何か困り事ですか？
line = "何か困り事ですか？"

[[dialogue]]
speaker = "unk"
# こんにちは
line = "こんにちは"

[[dialogue]]
speaker = "フェニエル"
# 「ぴぃっ！？　ど、同年代の男の人……！」
line = "「ぴぃっ！？　ど、同年代の男の人……！」"

[[dialogue]]
speaker = "フェニエル"
# 「どどどどうしよう、声掛けてもらったのは嬉しいけど、私、人見知りだし、知らない男の人だし……あわわわ……」
line = "「どどどどうしよう、声掛けてもらったのは嬉しいけど、私、人見知りだし、知らない男の人だし……あわわわ……」"

[[dialogue]]
speaker = "トワ先生"
# 「えっと、驚かせちゃってごめんね？　私は新星学園というところで教師をしている、トワって言うの」
line = "「えっと、驚かせちゃってごめんね？　私は新星学園というところで教師をしている、トワって言うの」"

[[dialogue]]
speaker = "トワ先生"
# 「こっちの男の子は、その学園の星徒会長で……だから、怪しい者じゃないから安心して？」
line = "「こっちの男の子は、その学園の星徒会長で……だから、怪しい者じゃないから安心して？」"

[[dialogue]]
speaker = "フェニエル"
# 「新星学園……！　それって、流星学園の隣にある……？」
line = "「新星学園……！　それって、流星学園の隣にある……？」"

[[dialogue]]
speaker = "フェニエル"
# 「し、失礼しました……私、初めての上京で、緊張してしまって……」
line = "「し、失礼しました……私、初めての上京で、緊張してしまって……」"

[[dialogue]]
speaker = "フェニエル"
# 「私の名前は、フェニエルって言います。この度、流星学園に入学することになった、転入生ですっ」
line = "「私の名前は、フェニエルって言います。この度、流星学園に入学することになった、転入生ですっ」"

[[dialogue]]
speaker = "unk"
# じゃあ、俺と同じだ
line = "じゃあ、俺と同じだ"

[[dialogue]]
speaker = "unk"
# 転入生！
line = "転入生！"

[[dialogue]]
speaker = "フェニエル"
# 「えっ、会長さんも転入生だったんですか……？　でも、会長をされているんですよね？」
line = "「えっ、会長さんも転入生だったんですか……？　でも、会長をされているんですよね？」"

[[dialogue]]
speaker = "トワ先生"
# 「ふふっ、やっぱりそう思うよね！　それがアニメとか漫画みたいな展開でね――」
line = "「ふふっ、やっぱりそう思うよね！　それがアニメとか漫画みたいな展開でね――」"

[[dialogue]]
speaker = "フェニエル"
# 「そんなことが……！　転入してすぐに会長になっちゃうなんて、なまら凄いです！」
line = "「そんなことが……！　転入してすぐに会長になっちゃうなんて、なまら凄いです！」"

[[dialogue]]
speaker = "unk"
# 自分でもまだ実感湧かないんだけどね
line = "自分でもまだ実感湧かないんだけどね"

[[dialogue]]
speaker = "フェニエル"
# 「私も同じです。まさか自分が星騎士になるだなんて、ついこの間までは思ってませんでしたから……」
line = "「私も同じです。まさか自分が星騎士になるだなんて、ついこの間までは思ってませんでしたから……」"

[[dialogue]]
speaker = "トワ先生"
# 「え？　それってどういう……」
line = "「え？　それってどういう……」"

[[dialogue]]
speaker = "フェニエル"
# 「実は私、この間まで星力を持ってなかったんです。事故に遭って、能力に目覚めて……」
line = "「実は私、この間まで星力を持ってなかったんです。事故に遭って、能力に目覚めて……」"

[[dialogue]]
speaker = "トワ先生"
# 「後天的に突然覚醒したってこと！？　驚いた。かなり珍しいケースだよ……！」
line = "「後天的に突然覚醒したってこと！？　驚いた。かなり珍しいケースだよ……！」"

[[dialogue]]
speaker = "フェニエル"
# 「それどころか、これまで私、自分のことを人間だと思ってたんです。でも、いざ能力に覚醒したら、頭に羽が生えて来て……どうやら私、純血の天使だったみたいで」
line = "「それどころか、これまで私、自分のことを人間だと思ってたんです。でも、いざ能力に覚醒したら、頭に羽が生えて来て……どうやら私、純血の天使だったみたいで」"

[[dialogue]]
speaker = "unk"
# えっ、でもご両親は……？
line = "えっ、でもご両親は……？"

[[dialogue]]
speaker = "フェニエル"
# 「ああ、えっと私、北海道の孤児院で育ったんです。といっても、子供は私しか居なくて、廃業していた院長先生がご厚意で育てて下さってただけなんですけど」
line = "「ああ、えっと私、北海道の孤児院で育ったんです。といっても、子供は私しか居なくて、廃業していた院長先生がご厚意で育てて下さってただけなんですけど」"

[[dialogue]]
speaker = "フェニエル"
# 「両親は昔、事故で亡くなってて……天使だった両親が、どうして人間界で暮らしていたのかは、よく分かっていないんです」
line = "「両親は昔、事故で亡くなってて……天使だった両親が、どうして人間界で暮らしていたのかは、よく分かっていないんです」"

[[dialogue]]
speaker = "unk"
# 変なこと聞いて、ごめん
line = "変なこと聞いて、ごめん"

[[dialogue]]
speaker = "unk"
# そうだったんだ……
line = "そうだったんだ……"

[[dialogue]]
speaker = "フェニエル"
# 「いえ！　言い出したのは私ですし、私自身も純血の天使だと知った時は同じ疑問を持ちましたから、お気になさらないで下さい！」
line = "「いえ！　言い出したのは私ですし、私自身も純血の天使だと知った時は同じ疑問を持ちましたから、お気になさらないで下さい！」"

[[dialogue]]
speaker = "フェニエル"
# 「それに村の皆さんが私を家族だと言ってくれて、実の娘のように育ててくれたので……境遇が不幸だとか、悲しいとか思ったことは全然ないんです」
line = "「それに村の皆さんが私を家族だと言ってくれて、実の娘のように育ててくれたので……境遇が不幸だとか、悲しいとか思ったことは全然ないんです」"

[[dialogue]]
speaker = "フェニエル"
# 「むしろ上京して、皆と離れてしまったことが不安で、ちょっと寂しかったんですけど……こうして、会長さんやトワ先生とも出会えましたし！」
line = "「むしろ上京して、皆と離れてしまったことが不安で、ちょっと寂しかったんですけど……こうして、会長さんやトワ先生とも出会えましたし！」"

[[dialogue]]
speaker = "フェニエル"
# 「どうぞ私のことは、『フニ』と呼んで下さい。院長先生が付けてくれた、お気に入りの愛称なんですっ」
line = "「どうぞ私のことは、『フニ』と呼んで下さい。院長先生が付けてくれた、お気に入りの愛称なんですっ」"

[[dialogue]]
speaker = "unk"
# わかった。よろしくね、フニ
line = "わかった。よろしくね、フニ"

[[dialogue]]
speaker = "トワ先生"
# 「フニちゃん、学園は違いますけど、困ったことがあれば先生を頼って下さいね！　連絡先も交換しましょう♪」
line = "「フニちゃん、学園は違いますけど、困ったことがあれば先生を頼って下さいね！　連絡先も交換しましょう♪」"

[[dialogue]]
speaker = "フェニエル"
# 「はいっ、ありがとうございます、トワ先生！」
line = "「はいっ、ありがとうございます、トワ先生！」"

[[dialogue]]
speaker = "unk"
# フニは何に困っていたんだ？
line = "フニは何に困っていたんだ？"

[[dialogue]]
speaker = "unk"
# それで、話は戻るけど
line = "それで、話は戻るけど"

[[dialogue]]
speaker = "フェニエル"
# 「えっと、実は……お恥ずかしながら、こんな大都会に来るのは、初めてで……」
line = "「えっと、実は……お恥ずかしながら、こんな大都会に来るのは、初めてで……」"

[[dialogue]]
speaker = "フェニエル"
# 「流星学園までの道が分からなくて、迷ってしまいました……」
line = "「流星学園までの道が分からなくて、迷ってしまいました……」"

[[dialogue]]
speaker = "トワ先生"
# 「それなら、先生達も学園に帰るところだったから、一緒に行こう♪　あ、ただその前に、買い出しの荷物が山のようにあって――」
line = "「それなら、先生達も学園に帰るところだったから、一緒に行こう♪　あ、ただその前に、買い出しの荷物が山のようにあって――」"

[[dialogue]]
speaker = "トワ先生"
# 「宅配便で送る手配をしなくちゃいけないから、その後で大丈夫かな？」
line = "「宅配便で送る手配をしなくちゃいけないから、その後で大丈夫かな？」"

[[dialogue]]
speaker = "フェニエル"
# 「それは全然大丈夫です！　……でも、荷物というのは、そこに積んでらっしゃるもので全部ですか？」
line = "「それは全然大丈夫です！　……でも、荷物というのは、そこに積んでらっしゃるもので全部ですか？」"

[[dialogue]]
speaker = "トワ先生"
# 「うん、ここの縦一列の段ボールで全部……って、フニちゃん！？」
line = "「うん、ここの縦一列の段ボールで全部……って、フニちゃん！？」"

[[dialogue]]
speaker = "フェニエル"
# 「でしたら……」
line = "「でしたら……」"

[[dialogue]]
speaker = "トワ先生"
# 「ちょっと待って、それ全部は持ち上げられないし、危ないよ！」
line = "「ちょっと待って、それ全部は持ち上げられないし、危ないよ！」"

[[dialogue]]
speaker = "フェニエル"
# 「よっと」
line = "「よっと」"

[[dialogue]]
speaker = "トワ先生"
# 「え……ええぇぇぇっ！？」
line = "「え……ええぇぇぇっ！？」"

[[dialogue]]
speaker = "unk"
# 軽々と持ち上げた！？
line = "軽々と持ち上げた！？"

[[dialogue]]
speaker = "トワ先生"
# 「えっ！？　変身してないどころか、星力使ってないよね！？　どうやってるのそれ！？」
line = "「えっ！？　変身してないどころか、星力使ってないよね！？　どうやってるのそれ！？」"

[[dialogue]]
speaker = "フェニエル"
# 「昔から村の人たちのお手伝いをしていたら、自然と力持ちになりました」
line = "「昔から村の人たちのお手伝いをしていたら、自然と力持ちになりました」"

[[dialogue]]
speaker = "フェニエル"
# 「だからこれも、私に優しくしてくれた皆さんのおかげです♪」
line = "「だからこれも、私に優しくしてくれた皆さんのおかげです♪」"

[[dialogue]]
speaker = "トワ先生"
# 「力持ちとか、そういうレベルかな……！？　物理法則が歪んで見えるけど！」
line = "「力持ちとか、そういうレベルかな……！？　物理法則が歪んで見えるけど！」"

[[dialogue]]
speaker = "unk"
# ──こうして、俺はもう１人の転入生と知り合いになったのだった。
line = "──こうして、俺はもう１人の転入生と知り合いになったのだった。"
