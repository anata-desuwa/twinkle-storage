[[dialogue]]
speaker = "unk"
# 第４話,ミルフィーとドキドキデート,P
line = "第４話,ミルフィーとドキドキデート,P"

[[dialogue]]
speaker = "ミルフィー"
# （ど、どうしよう……約束の１時間前に着いちゃった……！　これじゃあ、会長くんとのデートをめちゃくちゃ楽しみにしてるみたいだよ！）
line = "（ど、どうしよう……約束の１時間前に着いちゃった……！　これじゃあ、会長くんとのデートをめちゃくちゃ楽しみにしてるみたいだよ！）"

[[dialogue]]
speaker = "ミルフィー"
# （いや、実際に楽しみにしてるんだけど！　会長くんに知られたら絶対引かれちゃう！）
line = "（いや、実際に楽しみにしてるんだけど！　会長くんに知られたら絶対引かれちゃう！）"

[[dialogue]]
speaker = "ミルフィー"
# 「というか今日の私、変じゃないかな？　髪型とか、服とか変じゃないよね？　……って、誰に話しかけてるの私！」
line = "「というか今日の私、変じゃないかな？　髪型とか、服とか変じゃないよね？　……って、誰に話しかけてるの私！」"

[[dialogue]]
speaker = "ミルフィー"
# 「はううっ……落ち着け、落ち着いて私……。大丈夫、大丈夫……いつも通りいつも通り……」
line = "「はううっ……落ち着け、落ち着いて私……。大丈夫、大丈夫……いつも通りいつも通り……」"

[[dialogue]]
speaker = "ミルフィー"
# 「いや、デートでいつも通りじゃダメなんじゃ！？」
line = "「いや、デートでいつも通りじゃダメなんじゃ！？」"

[[dialogue]]
speaker = "unk"
# ミルフィー？
line = "ミルフィー？"

[[dialogue]]
speaker = "ミルフィー"
# 「ひゃあああぁぁぁ！！　会長くん！？」
line = "「ひゃあああぁぁぁ！！　会長くん！？」"

[[dialogue]]
speaker = "ミルフィー"
# 「会長くんちょっと来るの早くない！？　って、私も早く来ちゃったんだけど……！」
line = "「会長くんちょっと来るの早くない！？　って、私も早く来ちゃったんだけど……！」"

[[dialogue]]
speaker = "ミルフィー"
# 「えと、でも私は、会長くんに早く会いたくて来ちゃったわけで！」
line = "「えと、でも私は、会長くんに早く会いたくて来ちゃったわけで！」"

[[dialogue]]
speaker = "ミルフィー"
# 「じゃなくて！　早く起きちゃったから！　そう、早起きしちゃったからだよ！」
line = "「じゃなくて！　早く起きちゃったから！　そう、早起きしちゃったからだよ！」"

[[dialogue]]
speaker = "unk"
# 俺もミルフィーに会いたくて早く来ちゃった
line = "俺もミルフィーに会いたくて早く来ちゃった"

[[dialogue]]
speaker = "ミルフィー"
# 「ちゃんと聞かれてるぅ！　……って、会長くんも？」
line = "「ちゃんと聞かれてるぅ！　……って、会長くんも？」"

[[dialogue]]
speaker = "ミルフィー"
# 「～～～～～～～～っ！！！」
line = "「～～～～～～～～っ！！！」"

[[dialogue]]
speaker = "ミルフィー"
# （ど、どうしようっ、嬉しいっ……。会長くんも、私と同じなんだ……）
line = "（ど、どうしようっ、嬉しいっ……。会長くんも、私と同じなんだ……）"

[[dialogue]]
speaker = "ミルフィー"
# （ああでもどうしようっ……意識したら、恥ずかしくなってきたっ……。今の私、会長くんにどんな風に見られてるんだろう……？）
line = "（ああでもどうしようっ……意識したら、恥ずかしくなってきたっ……。今の私、会長くんにどんな風に見られてるんだろう……？）"

[[dialogue]]
speaker = "ミルフィー"
# 「か、会長くん……今日の私、変じゃないかな？　……変じゃない？　そ、そっか……よかった……変じゃないんだ……」
line = "「か、会長くん……今日の私、変じゃないかな？　……変じゃない？　そ、そっか……よかった……変じゃないんだ……」"

[[dialogue]]
speaker = "unk"
# いつも通り可愛いよ
line = "いつも通り可愛いよ"

[[dialogue]]
speaker = "ミルフィー"
# 「かかかかかっ、くぁわいいですか！？」
line = "「かかかかかっ、くぁわいいですか！？」"

[[dialogue]]
speaker = "ミルフィー"
# 「ちょっと待って！　照れるっ！　照れるからそういうの急に言わないで！」
line = "「ちょっと待って！　照れるっ！　照れるからそういうの急に言わないで！」"

[[dialogue]]
speaker = "ミルフィー"
# 「嫌じゃないっ……！　むしろ嬉しいんだけど、ちょっと恥ずかしいかも……」
line = "「嫌じゃないっ……！　むしろ嬉しいんだけど、ちょっと恥ずかしいかも……」"

[[dialogue]]
speaker = "ミルフィー"
# 「だよね、会長くんも照れてるよね……顔も赤くなってるし……」
line = "「だよね、会長くんも照れてるよね……顔も赤くなってるし……」"

[[dialogue]]
speaker = "ミルフィー"
# 「あ、あはは……このまま突っ立っててもしょうがないし、歩こうか」
line = "「あ、あはは……このまま突っ立っててもしょうがないし、歩こうか」"

[[dialogue]]
speaker = "ミルフィー"
# 「その、デートはじめよ？」
line = "「その、デートはじめよ？」"

[[dialogue]]
speaker = "unk"
# ミルフィーとのデートは順調に進んでいた。
line = "ミルフィーとのデートは順調に進んでいた。"

[[dialogue]]
speaker = "unk"
# 最初はお互い照れてぎこちなかったけれど、徐々に笑顔が増えてきて──
line = "最初はお互い照れてぎこちなかったけれど、徐々に笑顔が増えてきて──"

[[dialogue]]
speaker = "ミルフィー"
# 「会長くん、さっきのパフェ美味しかったねっ」
line = "「会長くん、さっきのパフェ美味しかったねっ」"

[[dialogue]]
speaker = "ミルフィー"
# 「２人で１つのパフェを食べるのは、少し恥ずかしかったけど……なんか、デートっぽくて楽しかった……」
line = "「２人で１つのパフェを食べるのは、少し恥ずかしかったけど……なんか、デートっぽくて楽しかった……」"

[[dialogue]]
speaker = "ミルフィー"
# 「さ、お腹もいっぱいになったし、次はどこに行こっか？」
line = "「さ、お腹もいっぱいになったし、次はどこに行こっか？」"

[[dialogue]]
speaker = "モンスター"
# 「イ～～～～ッ！」
line = "「イ～～～～ッ！」"

[[dialogue]]
speaker = "ミルフィー"
# 「会長くん、モンスターが！　早く助けに行かなきゃ！」
line = "「会長くん、モンスターが！　早く助けに行かなきゃ！」"

[[dialogue]]
speaker = "ミルフィー"
# 「……うん！　準備万端！」
line = "「……うん！　準備万端！」"

[[dialogue]]
speaker = "ミルフィー"
# 「あなたたちのせいで、せっかくのデートが台無しじゃない！　もう怒ったんだからね！」
line = "「あなたたちのせいで、せっかくのデートが台無しじゃない！　もう怒ったんだからね！」"

[[dialogue]]
speaker = "ミルフィー"
# 「一撃で仕留める！　光よ貫け──シャイニング・ペネトレーター！」
line = "「一撃で仕留める！　光よ貫け──シャイニング・ペネトレーター！」"

[[dialogue]]
speaker = "モンスター"
# 「イ～～……」
line = "「イ～～……」"

[[dialogue]]
speaker = "ミルフィー"
# 「ふう……怪我人はいないみたいだね……。会長くんも大丈夫？」
line = "「ふう……怪我人はいないみたいだね……。会長くんも大丈夫？」"

[[dialogue]]
speaker = "ミルフィー"
# 「ん？　どうしたの会長くん。さっきから目を合わせてくれないけど……」
line = "「ん？　どうしたの会長くん。さっきから目を合わせてくれないけど……」"

[[dialogue]]
speaker = "unk"
# いやその、何と言いますか……露出度が……
line = "いやその、何と言いますか……露出度が……"

[[dialogue]]
speaker = "ミルフィー"
# 「露出……？　って、まさか会長くんっ……！」
line = "「露出……？　って、まさか会長くんっ……！」"

[[dialogue]]
speaker = "ミルフィー"
# 「～～～～～～～～～～～っ！！！」
line = "「～～～～～～～～～～～っ！！！」"

[[dialogue]]
speaker = "ミルフィー"
# 「ちょ、ちょっと露出が多いかもしれないけど、これは機動力を重視というか、戦闘の効率を上げるためであって、私の趣味じゃないから！」
line = "「ちょ、ちょっと露出が多いかもしれないけど、これは機動力を重視というか、戦闘の効率を上げるためであって、私の趣味じゃないから！」"

[[dialogue]]
speaker = "ミルフィー"
# 「というか、星徒会長が戦う女の子をエッチな目で見ちゃダメ！」
line = "「というか、星徒会長が戦う女の子をエッチな目で見ちゃダメ！」"

[[dialogue]]
speaker = "unk"
# ごめん、でもその姿のミルフィーも魅力的だから
line = "ごめん、でもその姿のミルフィーも魅力的だから"

[[dialogue]]
speaker = "ミルフィー"
# 「そっか……そうなんだ……」
line = "「そっか……そうなんだ……」"

[[dialogue]]
speaker = "ミルフィー"
# 「ちなみにさ、魅力的なのって……エッチな意味でも……？」
line = "「ちなみにさ、魅力的なのって……エッチな意味でも……？」"

[[dialogue]]
speaker = "ミルフィー"
# 「あ、あわわわわ……！　い、言いきっちゃうんだ……星徒会長なのに……」
line = "「あ、あわわわわ……！　い、言いきっちゃうんだ……星徒会長なのに……」"

[[dialogue]]
speaker = "ミルフィー"
# （どうしよう……やっぱり私、エッチな目で見られて、嬉しくなっちゃってるっ……）
line = "（どうしよう……やっぱり私、エッチな目で見られて、嬉しくなっちゃってるっ……）"

[[dialogue]]
speaker = "ミルフィー"
# 「戦う女の子をエッチな目で見るのはよくないけど……けど……」
line = "「戦う女の子をエッチな目で見るのはよくないけど……けど……」"

[[dialogue]]
speaker = "ミルフィー"
# 「特別に、私だけなら……いいよ……。会長くんになら、そういう目で見られても……イヤじゃないから……」
line = "「特別に、私だけなら……いいよ……。会長くんになら、そういう目で見られても……イヤじゃないから……」"

[[dialogue]]
speaker = "ミルフィー"
# 「って、今のナシ！　クラス委員長がこんなこと言ったらダメだよね……あはは……」
line = "「って、今のナシ！　クラス委員長がこんなこと言ったらダメだよね……あはは……」"

[[dialogue]]
speaker = "unk"
# 今のすごくドキドキした
line = "今のすごくドキドキした"

[[dialogue]]
speaker = "ミルフィー"
# 「そ、そうなんだ……ドキドキしてくれたんだ……」
line = "「そ、そうなんだ……ドキドキしてくれたんだ……」"

[[dialogue]]
speaker = "ミルフィー"
# 「じゃ、じゃあ……会長くんだけ、特別……ね。特別だから……」
line = "「じゃ、じゃあ……会長くんだけ、特別……ね。特別だから……」"

[[dialogue]]
speaker = "unk"
# それからお互い顔中真っ赤にしながら、デートの続きを楽しんだのだった──
line = "それからお互い顔中真っ赤にしながら、デートの続きを楽しんだのだった──"
