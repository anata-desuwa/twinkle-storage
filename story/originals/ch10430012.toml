[[dialogue]]
speaker = "unk"
# 第２話,アンラッキーデー,P
line = "第２話,アンラッキーデー,P"

[[dialogue]]
speaker = "unk"
# サチと知り合ってからしばらく経ったある日、彼女は憂鬱そうな顔を浮かべて再び星徒会室へとやってきた――
line = "サチと知り合ってからしばらく経ったある日、彼女は憂鬱そうな顔を浮かべて再び星徒会室へとやってきた――"

[[dialogue]]
speaker = "サチ"
# 「ついにこの日が来てしまいました……１年に１度やって来る、私の『アンラッキーデー』が……！」
line = "「ついにこの日が来てしまいました……１年に１度やって来る、私の『アンラッキーデー』が……！」"

[[dialogue]]
speaker = "unk"
# それって、不運な日ってこと……？
line = "それって、不運な日ってこと……？"

[[dialogue]]
speaker = "トレジアンナ"
# 「説明しましょう！　『アンラッキーデー』とは、サチさんが普段、異常なまでの幸運を引き寄せていることで、偏りに偏った確率のバランスを取る為に起こる現象――」
line = "「説明しましょう！　『アンラッキーデー』とは、サチさんが普段、異常なまでの幸運を引き寄せていることで、偏りに偏った確率のバランスを取る為に起こる現象――」"

[[dialogue]]
speaker = "トレジアンナ"
# 「不運の波が纏めて押し寄せて来る、大凶日のことなのです！　この日のサチさんは普段とは逆の、まさに『不幸体質』！　戦闘でも全く役に立たない無能状態です！」
line = "「不運の波が纏めて押し寄せて来る、大凶日のことなのです！　この日のサチさんは普段とは逆の、まさに『不幸体質』！　戦闘でも全く役に立たない無能状態です！」"

[[dialogue]]
speaker = "サチ"
# 「合ってるけど酷い！」
line = "「合ってるけど酷い！」"

[[dialogue]]
speaker = "プリムラ"
# 「プッ……ブハハハッ！　ウケるのじゃ！　幸運の化け物たるサチにも、意外と人間らしい弱点があったということじゃな！」
line = "「プッ……ブハハハッ！　ウケるのじゃ！　幸運の化け物たるサチにも、意外と人間らしい弱点があったということじゃな！」"

[[dialogue]]
speaker = "サチ"
# 「いや私、普段から半分は人間だから！　人間界生まれ、流星市国育ちのハーフ魔族だから！」
line = "「いや私、普段から半分は人間だから！　人間界生まれ、流星市国育ちのハーフ魔族だから！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「しかし今回、幸いなことに、新星学園の星徒会室は特別な運気の流れが支配している場所のようで、どうやら比較的アンラッキーデーの影響を受けないようです」
line = "「しかし今回、幸いなことに、新星学園の星徒会室は特別な運気の流れが支配している場所のようで、どうやら比較的アンラッキーデーの影響を受けないようです」"

[[dialogue]]
speaker = "サチ"
# 「なので申し訳ないんですけど、今日だけ星徒会室に避難させて貰いたいんです。お兄さん、お願いできないでしょうか……？」
line = "「なので申し訳ないんですけど、今日だけ星徒会室に避難させて貰いたいんです。お兄さん、お願いできないでしょうか……？」"

[[dialogue]]
speaker = "サチ"
# 「油断して外を歩こうものなら、交通事故で死にかねないので……」
line = "「油断して外を歩こうものなら、交通事故で死にかねないので……」"

[[dialogue]]
speaker = "unk"
# そこまで！？
line = "そこまで！？"

[[dialogue]]
speaker = "unk"
# サチを迫り来る不幸から守る為、俺は護衛として、一緒に星徒会室で泊まり込むことになった――
line = "サチを迫り来る不幸から守る為、俺は護衛として、一緒に星徒会室で泊まり込むことになった――"

[[dialogue]]
speaker = "サチ"
# 「ああ、すごいです……！　アンラッキーデーなのに、こんなに穏やかに過ごせているのは生まれて初めてです」
line = "「ああ、すごいです……！　アンラッキーデーなのに、こんなに穏やかに過ごせているのは生まれて初めてです」"

[[dialogue]]
speaker = "サチ"
# 「今のところ、寝袋のチャックだけ壊れたり、ＤＩＳＣが突然爆発したり、私の分の食べ物だけ何故か痛んでいたくらいしか、問題が発生してないです。なんという平和……！」
line = "「今のところ、寝袋のチャックだけ壊れたり、ＤＩＳＣが突然爆発したり、私の分の食べ物だけ何故か痛んでいたくらいしか、問題が発生してないです。なんという平和……！」"

[[dialogue]]
speaker = "unk"
# いや全然平和じゃなくない！？
line = "いや全然平和じゃなくない！？"

[[dialogue]]
speaker = "サチ"
# 「いやいや、例年より全然マシですよ」
line = "「いやいや、例年より全然マシですよ」"

[[dialogue]]
speaker = "サチ"
# 「テロに巻き込まれたり、隕石が降って来たり、次元の裂け目が自宅に発生したりすることに比べれば」
line = "「テロに巻き込まれたり、隕石が降って来たり、次元の裂け目が自宅に発生したりすることに比べれば」"

[[dialogue]]
speaker = "unk"
# 問題のスケールが段違いだった！
line = "問題のスケールが段違いだった！"

[[dialogue]]
speaker = "プリムラ"
# 「フハハハ、愚か者め！　そんな日に我を近くに置いておくとは、油断が過ぎるぞ！　せいぜい寝首をかかれぬように注意するのじゃな！」
line = "「フハハハ、愚か者め！　そんな日に我を近くに置いておくとは、油断が過ぎるぞ！　せいぜい寝首をかかれぬように注意するのじゃな！」"

[[dialogue]]
speaker = "サチ"
# 「いや、アンタは今日は何もしないでしょ」
line = "「いや、アンタは今日は何もしないでしょ」"

[[dialogue]]
speaker = "プリムラ"
# 「なぬ？　何を根拠に……」
line = "「なぬ？　何を根拠に……」"

[[dialogue]]
speaker = "サチ"
# 「だって、アンタは不運な私に勝っても嬉しくないでしょ？　力を取り戻してリベンジするって息まいているんだから。違う？」
line = "「だって、アンタは不運な私に勝っても嬉しくないでしょ？　力を取り戻してリベンジするって息まいているんだから。違う？」"

[[dialogue]]
speaker = "プリムラ"
# 「……ふん、変な予防線を張りおって。そんなもの、貴様の勝手な思い込みじゃ」
line = "「……ふん、変な予防線を張りおって。そんなもの、貴様の勝手な思い込みじゃ」"

[[dialogue]]
speaker = "サチ"
# 「あ、でも、隙見てペンダントを奪うのもダメだから。そっちはさっきから狙ってるの、分かってるからね」
line = "「あ、でも、隙見てペンダントを奪うのもダメだから。そっちはさっきから狙ってるの、分かってるからね」"

[[dialogue]]
speaker = "プリムラ"
# 「ちっ……バレてたか……」
line = "「ちっ……バレてたか……」"

[[dialogue]]
speaker = "unk"
# ２人は最初、戦ってたんだっけ？
line = "２人は最初、戦ってたんだっけ？"

[[dialogue]]
speaker = "プリムラ"
# 「今も現在進行形で戦ってる最中じゃ！　我はこやつが身に着けてるロストアイテムで、無理やり言うことを聞かされてるだけにすぎんっ」
line = "「今も現在進行形で戦ってる最中じゃ！　我はこやつが身に着けてるロストアイテムで、無理やり言うことを聞かされてるだけにすぎんっ」"

[[dialogue]]
speaker = "プリムラ"
# 「……だがまあ、我の支配する世界が、そのロストアイテム共で破壊されても面白くない。それらを全て回収するまでは、ひとまず手を貸してやらないこともないのじゃ」
line = "「……だがまあ、我の支配する世界が、そのロストアイテム共で破壊されても面白くない。それらを全て回収するまでは、ひとまず手を貸してやらないこともないのじゃ」"

[[dialogue]]
speaker = "サチ"
# 「私はそれまでに、この自称・悪の終末兵器を更生させるのが目標ですね」
line = "「私はそれまでに、この自称・悪の終末兵器を更生させるのが目標ですね」"

[[dialogue]]
speaker = "プリムラ"
# 「自称でないわ！　というか、誰が更生なんぞするか！」
line = "「自称でないわ！　というか、誰が更生なんぞするか！」"

[[dialogue]]
speaker = "サチ"
# 「いいや、更生して貰うから。私が責任持つって学園側に言っちゃったんだから」
line = "「いいや、更生して貰うから。私が責任持つって学園側に言っちゃったんだから」"

[[dialogue]]
speaker = "プリムラ"
# 「頼んどらんわ！　我は必ず力を取り戻して、世界征服をしてやるのじゃ！」
line = "「頼んどらんわ！　我は必ず力を取り戻して、世界征服をしてやるのじゃ！」"

[[dialogue]]
speaker = "サチ"
# 「またそういう、世界征服とか子供みたいなこと言って！　具体性が全然ない癖に！」
line = "「またそういう、世界征服とか子供みたいなこと言って！　具体性が全然ない癖に！」"

[[dialogue]]
speaker = "プリムラ"
# 「ええい、我を子供扱いすなぁ～～～っ！」
line = "「ええい、我を子供扱いすなぁ～～～っ！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「いや～、お２人共、仲が良いですよね～」
line = "「いや～、お２人共、仲が良いですよね～」"

[[dialogue]]
speaker = "unk"
# そうして、一夜明けて――
line = "そうして、一夜明けて――"

[[dialogue]]
speaker = "サチ"
# 「うう～ん、むにゃむにゃ……」
line = "「うう～ん、むにゃむにゃ……」"

[[dialogue]]
speaker = "unk"
# 何か……柔らかくて、良い匂いがする……
line = "何か……柔らかくて、良い匂いがする……"

[[dialogue]]
speaker = "サチ"
# 「ん……もう朝ですか……って、え！？」
line = "「ん……もう朝ですか……って、え！？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「おや、サチさんも会長さんも、ちょうど起きたようですね。グッモーニン♪　いや～、昨晩はお楽しみでしたね！　なんちゃって☆」
line = "「おや、サチさんも会長さんも、ちょうど起きたようですね。グッモーニン♪　いや～、昨晩はお楽しみでしたね！　なんちゃって☆」"

[[dialogue]]
speaker = "unk"
# 俺の寝袋の中にサチが！？
line = "俺の寝袋の中にサチが！？"

[[dialogue]]
speaker = "プリムラ"
# 「どういう寝相をしてたらそうなるんじゃ……ハレンチな……」
line = "「どういう寝相をしてたらそうなるんじゃ……ハレンチな……」"

[[dialogue]]
speaker = "サチ"
# 「ああ、あああ……！」
line = "「ああ、あああ……！」"

[[dialogue]]
speaker = "サチ"
# 「エッチなことは禁止です～～～～～～～～～っ！！！」
line = "「エッチなことは禁止です～～～～～～～～～っ！！！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「『ラッキースケベ』が起こるってことは、どうやら『アンラッキーデー』は終わったみたいですね！」
line = "「『ラッキースケベ』が起こるってことは、どうやら『アンラッキーデー』は終わったみたいですね！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「めでたし、めでたし♪」
line = "「めでたし、めでたし♪」"
