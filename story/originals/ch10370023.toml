[[dialogue]]
speaker = "unk"
# 第３話,ふわふわダイエット,P
line = "第３話,ふわふわダイエット,P"

[[dialogue]]
speaker = "unk"
# 最近、サランがいつもハロウィンフォームのまま過ごしている。……そのことが気になって、尋ねてみると――
line = "最近、サランがいつもハロウィンフォームのまま過ごしている。……そのことが気になって、尋ねてみると――"

[[dialogue]]
speaker = "サラン"
# 「ぽよっ！？　そ、それは……ジャックちゃんが帰った後も、新しい戦闘服として残してくれた力だから……！」
line = "「ぽよっ！？　そ、それは……ジャックちゃんが帰った後も、新しい戦闘服として残してくれた力だから……！」"

[[dialogue]]
speaker = "サラン"
# 「ハロウィンの時期は過ぎちゃったけど、使わなくちゃ損かな～って……えへへ」
line = "「ハロウィンの時期は過ぎちゃったけど、使わなくちゃ損かな～って……えへへ」"

[[dialogue]]
speaker = "サラン"
# 「――そ、それだけじゃないって……？　食事量が前より明らかに減ってる？」
line = "「――そ、それだけじゃないって……？　食事量が前より明らかに減ってる？」"

[[dialogue]]
speaker = "unk"
# どこか具合が悪いのか……？
line = "どこか具合が悪いのか……？"

[[dialogue]]
speaker = "サラン"
# 「う……会長ちゃん、ごめんね……心配させちゃってた……？　ちゃんと正直に言うね……」
line = "「う……会長ちゃん、ごめんね……心配させちゃってた……？　ちゃんと正直に言うね……」"

[[dialogue]]
speaker = "サラン"
# 「実はね……その……サラン、少し太っちゃって……」
line = "「実はね……その……サラン、少し太っちゃって……」"

[[dialogue]]
speaker = "サラン"
# 「制服を着ると……ちょっと色んな場所がキツくて～……。だけど戦闘服は、変身する時、体にぴったりフィットするように出現するから……」
line = "「制服を着ると……ちょっと色んな場所がキツくて～……。だけど戦闘服は、変身する時、体にぴったりフィットするように出現するから……」"

[[dialogue]]
speaker = "サラン"
# 「最近ね、会長ちゃんと一緒にいると、ふわふわな気持ちになるから食が進んで、前はそんなことなかったのに、なんか体重が増えてきちゃったの～……」
line = "「最近ね、会長ちゃんと一緒にいると、ふわふわな気持ちになるから食が進んで、前はそんなことなかったのに、なんか体重が増えてきちゃったの～……」"

[[dialogue]]
speaker = "unk"
# 言われてみれば、少しふっくらしたかも……
line = "言われてみれば、少しふっくらしたかも……"

[[dialogue]]
speaker = "サラン"
# 「ぽよっ！？」
line = "「ぽよっ！？」"

[[dialogue]]
speaker = "サラン"
# 「う～……さ、サラン、ダイエットする～～～っ！」
line = "「う～……さ、サラン、ダイエットする～～～っ！」"

[[dialogue]]
speaker = "unk"
# というわけで、サランはその日からダイエットを開始。積極的に運動をするようになり、俺はそれをサポートすることになった。
line = "というわけで、サランはその日からダイエットを開始。積極的に運動をするようになり、俺はそれをサポートすることになった。"

[[dialogue]]
speaker = "サラン"
# 「ふぅ……Ｓランクモンスター、サランでもなんとか倒せたぁ……」
line = "「ふぅ……Ｓランクモンスター、サランでもなんとか倒せたぁ……」"

[[dialogue]]
speaker = "unk"
# えらいぞ！　確実に強くなってる！
line = "えらいぞ！　確実に強くなってる！"

[[dialogue]]
speaker = "サラン"
# 「そ、そうかな～……えへへ～♪　――って」
line = "「そ、そうかな～……えへへ～♪　――って」"

[[dialogue]]
speaker = "サラン"
# 「今はサラン、強くなりたいんじゃなくて、痩せたいんだよぉ～っ！　リクリエも大変だけど、その前にサランの体重が大変なの～っ！」
line = "「今はサラン、強くなりたいんじゃなくて、痩せたいんだよぉ～っ！　リクリエも大変だけど、その前にサランの体重が大変なの～っ！」"

[[dialogue]]
speaker = "サラン"
# 「あぅ……いっぱい戦ったら、お腹減ってきちゃった……」
line = "「あぅ……いっぱい戦ったら、お腹減ってきちゃった……」"

[[dialogue]]
speaker = "サラン"
# 「で、でも、間食は我慢して、３食規則正しく食べるようにしないと……！　サラン、頑張る～……！」
line = "「で、でも、間食は我慢して、３食規則正しく食べるようにしないと……！　サラン、頑張る～……！」"

[[dialogue]]
speaker = "unk"
# そこまで無理してやらなくていいんだぞ
line = "そこまで無理してやらなくていいんだぞ"

[[dialogue]]
speaker = "サラン"
# 「――もっとゆっくりやればいい？　……確かに、サランは食べるの大好きだから、食事制限は辛いけど……」
line = "「――もっとゆっくりやればいい？　……確かに、サランは食べるの大好きだから、食事制限は辛いけど……」"

[[dialogue]]
speaker = "サラン"
# 「でも、会長ちゃんには、太った女の子だって思われたくないもん……」
line = "「でも、会長ちゃんには、太った女の子だって思われたくないもん……」"

[[dialogue]]
speaker = "サラン"
# 「サランね、今までは体重とか、全然気にならなかったんだ」
line = "「サランね、今までは体重とか、全然気にならなかったんだ」"

[[dialogue]]
speaker = "サラン"
# 「だけど、会長ちゃんのこと好きになってから、自分の体重とか体型を気にしちゃう女の子たちの気持ちが、わかるようになったの」
line = "「だけど、会長ちゃんのこと好きになってから、自分の体重とか体型を気にしちゃう女の子たちの気持ちが、わかるようになったの」"

[[dialogue]]
speaker = "サラン"
# 「サランは会長ちゃんから、可愛いって思ってもらいたくて……だから――」
line = "「サランは会長ちゃんから、可愛いって思ってもらいたくて……だから――」"

[[dialogue]]
speaker = "unk"
# （サランを抱き締める）
line = "（サランを抱き締める）"

[[dialogue]]
speaker = "サラン"
# 「ふわっ！？　か、会長ちゃん、待って……い、今は……！」
line = "「ふわっ！？　か、会長ちゃん、待って……い、今は……！」"

[[dialogue]]
speaker = "サラン"
# 「いっぱい汗かいた後だから……サラン、変な匂いとかしちゃうかも……！」
line = "「いっぱい汗かいた後だから……サラン、変な匂いとかしちゃうかも……！」"

[[dialogue]]
speaker = "サラン"
# 「――恥ずかしがってるサランも可愛い？　だ、だって～、サランは会長ちゃんに嫌われなくないんだもん……」
line = "「――恥ずかしがってるサランも可愛い？　だ、だって～、サランは会長ちゃんに嫌われなくないんだもん……」"

[[dialogue]]
speaker = "unk"
# 嫌いになったりしない。好きだよ
line = "嫌いになったりしない。好きだよ"

[[dialogue]]
speaker = "サラン"
# 「あ……会長ちゃん……ん……<emoji=heart04>　ちゅっ……<emoji=heart04>」
line = "「あ……会長ちゃん……ん……<emoji=heart04>　ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# サランとキスをして、それからしばらく頭や顔を撫でたり、抱き締め合ったりしながら過ごす――
line = "サランとキスをして、それからしばらく頭や顔を撫でたり、抱き締め合ったりしながら過ごす――"

[[dialogue]]
speaker = "unk"
# と、その時だった。
line = "と、その時だった。"

[[dialogue]]
speaker = "サラン"
# 「……あれ？　なんだろ～？　なんか――」
line = "「……あれ？　なんだろ～？　なんか――」"

[[dialogue]]
speaker = "サラン"
# 「さっきまで感じてた空腹感が、なくなったかも？」
line = "「さっきまで感じてた空腹感が、なくなったかも？」"

[[dialogue]]
speaker = "サラン"
# 「そういうわけで、サランは会長ちゃんのおかげでダイエットに成功したの～♪」
line = "「そういうわけで、サランは会長ちゃんのおかげでダイエットに成功したの～♪」"

[[dialogue]]
speaker = "サラン"
# 「えへへ～♪　会長ちゃんとスキンシップして、ふわふわ気分でお腹いっぱいになれば、食事量を減らしても大丈夫ってわかったんだ～♪」
line = "「えへへ～♪　会長ちゃんとスキンシップして、ふわふわ気分でお腹いっぱいになれば、食事量を減らしても大丈夫ってわかったんだ～♪」"

[[dialogue]]
speaker = "蛍火"
# 「な、なるほど。そんなことがあったのですね……ただ――」
line = "「な、なるほど。そんなことがあったのですね……ただ――」"

[[dialogue]]
speaker = "蛍火"
# 「心なしか、その……今度は師匠が痩せてるような……」
line = "「心なしか、その……今度は師匠が痩せてるような……」"

[[dialogue]]
speaker = "unk"
# なんかスキンシップにハマったらしくて……
line = "なんかスキンシップにハマったらしくて……"

[[dialogue]]
speaker = "サラン"
# 「ん～<emoji=heart04>　会長ちゃんに、頬っぺたすりすり～<emoji=heart04>　ふわふわ～<emoji=heart04>」
line = "「ん～<emoji=heart04>　会長ちゃんに、頬っぺたすりすり～<emoji=heart04>　ふわふわ～<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 一方のサランは、絶好調で綺麗なつやつや肌なのだった。
line = "一方のサランは、絶好調で綺麗なつやつや肌なのだった。"
