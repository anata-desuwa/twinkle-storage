[[dialogue]]
speaker = "unk"
# 第３話,串の達人,P
line = "第３話,串の達人,P"

[[dialogue]]
speaker = "unk"
# カフェテリアで試作メニューの試食会が行われることになり、そこに両学園の教員や星徒会も呼ばれた。
line = "カフェテリアで試作メニューの試食会が行われることになり、そこに両学園の教員や星徒会も呼ばれた。"

[[dialogue]]
speaker = "セーラ"
# 「カフェテリアに串カツ～？　あははっ、ざんし～ん♪」
line = "「カフェテリアに串カツ～？　あははっ、ざんし～ん♪」"

[[dialogue]]
speaker = "トワ先生"
# 「フライとかチキンカツは元々あるし、串カツがあっても不思議じゃない……のかな？」
line = "「フライとかチキンカツは元々あるし、串カツがあっても不思議じゃない……のかな？」"

[[dialogue]]
speaker = "マリーベル"
# 「私を呼んだ？」
line = "「私を呼んだ？」"

[[dialogue]]
speaker = "unk"
# うわ！？
line = "うわ！？"

[[dialogue]]
speaker = "マリーベル"
# 「串と言えば私、私と言えば串よ。私抜きで串カツをやるなんて聞き捨てならないわ」
line = "「串と言えば私、私と言えば串よ。私抜きで串カツをやるなんて聞き捨てならないわ」"

[[dialogue]]
speaker = "マトイ"
# 「一応、一般生徒は参加できないことになってるんだけど……」
line = "「一応、一般生徒は参加できないことになってるんだけど……」"

[[dialogue]]
speaker = "マリーベル"
# 「串カツは具材が小さいからパン粉はもっと細かいのがいいわ。チキンカツと同じ粗めのパン粉だから、具材が衣のボリュームに負けてしまっているわね」
line = "「串カツは具材が小さいからパン粉はもっと細かいのがいいわ。チキンカツと同じ粗めのパン粉だから、具材が衣のボリュームに負けてしまっているわね」"

[[dialogue]]
speaker = "マトイ"
# 「聞いてない！？　しかももう食べてる！？」
line = "「聞いてない！？　しかももう食べてる！？」"

[[dialogue]]
speaker = "マリーベル"
# 「試食だと揚げたてを食べられるけど、営業中はある程度作り置きになるはず。時間が経つと食感が失われるのが気になるわね」
line = "「試食だと揚げたてを食べられるけど、営業中はある程度作り置きになるはず。時間が経つと食感が失われるのが気になるわね」"

[[dialogue]]
speaker = "マリーベル"
# 「それに串カツは具材が重要。鮮度のいい食材が欲しいけど……カフェテリアだから妥協は必要でしょうね。そこは努力していると思うわ」
line = "「それに串カツは具材が重要。鮮度のいい食材が欲しいけど……カフェテリアだから妥協は必要でしょうね。そこは努力していると思うわ」"

[[dialogue]]
speaker = "マリーベル"
# 「そして串カツは串カツだけでは成り立たない。そう、ソースも大事な要素だわ」
line = "「そして串カツは串カツだけでは成り立たない。そう、ソースも大事な要素だわ」"

[[dialogue]]
speaker = "マリーベル"
# 「濃すぎても薄すぎてもいけない。果実の甘酸っぱさとコク、酢の酸味、香辛料のスパイシーさ、それらが合わさって串カツに最適のソースになるの」
line = "「濃すぎても薄すぎてもいけない。果実の甘酸っぱさとコク、酢の酸味、香辛料のスパイシーさ、それらが合わさって串カツに最適のソースになるの」"

[[dialogue]]
speaker = "マリーベル"
# 「そうそう、串カツのルールはわかってるかしら。ソースは二度漬け禁止。足りない時はキャベツですくってかけるの。これは鉄の掟よ」
line = "「そうそう、串カツのルールはわかってるかしら。ソースは二度漬け禁止。足りない時はキャベツですくってかけるの。これは鉄の掟よ」"

[[dialogue]]
speaker = "unk"
# マリーベルって大阪出身？
line = "マリーベルって大阪出身？"

[[dialogue]]
speaker = "マリーベル"
# 「何言ってるの。れっきとしたイギリス人よ」
line = "「何言ってるの。れっきとしたイギリス人よ」"

[[dialogue]]
speaker = "マトイ"
# 「新世界の人かと思った……」
line = "「新世界の人かと思った……」"

[[dialogue]]
speaker = "マリーベル"
# 「あなたたちに本物の串カツを食べさせてあげる。パン粉もソースも自家製よ」
line = "「あなたたちに本物の串カツを食べさせてあげる。パン粉もソースも自家製よ」"

[[dialogue]]
speaker = "unk"
# そして串カツが揚がるのを待つこと少し──
line = "そして串カツが揚がるのを待つこと少し──"

[[dialogue]]
speaker = "マリーベル"
# 「できたわ。冷めないうちに食べなさい」
line = "「できたわ。冷めないうちに食べなさい」"

[[dialogue]]
speaker = "セーラ"
# 「うっま……！　何これ、めっちゃサクサクじゃん！　ソースも串カツに合ってるし、いくらでも食べられそう♪」
line = "「うっま……！　何これ、めっちゃサクサクじゃん！　ソースも串カツに合ってるし、いくらでも食べられそう♪」"

[[dialogue]]
speaker = "トワ先生"
# 「おいしい～♪　でもこの味、昔食べたことあるような……」
line = "「おいしい～♪　でもこの味、昔食べたことあるような……」"

[[dialogue]]
speaker = "マトイ"
# 「お店出せるレベル……ていうか、こんなお店あったら足繁く通っちゃうかも」
line = "「お店出せるレベル……ていうか、こんなお店あったら足繁く通っちゃうかも」"

[[dialogue]]
speaker = "マリーベル"
# 「当然よ、下拵えから串打ち、油の温度管理まで全て私がやったんだから。揚げ時間も完璧よ」
line = "「当然よ、下拵えから串打ち、油の温度管理まで全て私がやったんだから。揚げ時間も完璧よ」"

[[dialogue]]
speaker = "マリーベル"
# 「追加で揚げるけど、希望があるなら聞くわ。ちなみに私のおすすめは紅ショウガね」
line = "「追加で揚げるけど、希望があるなら聞くわ。ちなみに私のおすすめは紅ショウガね」"

[[dialogue]]
speaker = "マトイ"
# 「通ね……やっぱり大阪の人なのでは……？」
line = "「通ね……やっぱり大阪の人なのでは……？」"

[[dialogue]]
speaker = "マリーベル"
# 「そういえば会長さんの口から感想を聞いてなかったわね。私の串カツはどうだった？」
line = "「そういえば会長さんの口から感想を聞いてなかったわね。私の串カツはどうだった？」"

[[dialogue]]
speaker = "unk"
# すごくおいしかった！
line = "すごくおいしかった！"

[[dialogue]]
speaker = "マリーベル"
# 「そう。まぁ、答えはわかっていたけれど」
line = "「そう。まぁ、答えはわかっていたけれど」"

[[dialogue]]
speaker = "unk"
# モンスター以外も串刺しにするんだな
line = "モンスター以外も串刺しにするんだな"

[[dialogue]]
speaker = "マリーベル"
# 「そうね。串カツだけじゃなくて、焼き鳥、シシケバブ、シュラスコとか、串焼きもできるわ」
line = "「そうね。串カツだけじゃなくて、焼き鳥、シシケバブ、シュラスコとか、串焼きもできるわ」"

[[dialogue]]
speaker = "トワ先生"
# 「どうしてそんなに串にこだわるの……？」
line = "「どうしてそんなに串にこだわるの……？」"

[[dialogue]]
speaker = "マリーベル"
# 「串を見るとなぜか魂が疼くのよ」
line = "「串を見るとなぜか魂が疼くのよ」"

[[dialogue]]
speaker = "マリーベル"
# 「まるで誰かが乗り移ったみたいに、いつのまにかそうなっていたの」
line = "「まるで誰かが乗り移ったみたいに、いつのまにかそうなっていたの」"

[[dialogue]]
speaker = "セーラ"
# 「へ～、変なのー」
line = "「へ～、変なのー」"

[[dialogue]]
speaker = "蛍火"
# 「確かに見事な串カツです」
line = "「確かに見事な串カツです」"

[[dialogue]]
speaker = "マリーベル"
# 「！　あなたは……東雲蛍火、だったかしら」
line = "「！　あなたは……東雲蛍火、だったかしら」"

[[dialogue]]
speaker = "蛍火"
# 「ええ。しがない料理人です」
line = "「ええ。しがない料理人です」"

[[dialogue]]
speaker = "蛍火"
# 「先ほどカフェテリアが出した串カツは私が作ったものではありません。ですがこのカフェテリアの料理人として、マリーベルさんの串カツのみが称賛されるのは看過できません」
line = "「先ほどカフェテリアが出した串カツは私が作ったものではありません。ですがこのカフェテリアの料理人として、マリーベルさんの串カツのみが称賛されるのは看過できません」"

[[dialogue]]
speaker = "マリーベル"
# 「つまり？」
line = "「つまり？」"

[[dialogue]]
speaker = "蛍火"
# 「私の作った串カツもご賞味いただきましょう。その上でどちらの串カツがより美味だったかご判断ください」
line = "「私の作った串カツもご賞味いただきましょう。その上でどちらの串カツがより美味だったかご判断ください」"

[[dialogue]]
speaker = "マリーベル"
# 「なるほど。やる気ってわけね」
line = "「なるほど。やる気ってわけね」"

[[dialogue]]
speaker = "セーラ"
# 「うっひゃ～。なんかすごいバチバチしてる……」
line = "「うっひゃ～。なんかすごいバチバチしてる……」"

[[dialogue]]
speaker = "蛍火"
# 「良い機会です。串カツ以外の串料理も品評してはいかがでしょうか」
line = "「良い機会です。串カツ以外の串料理も品評してはいかがでしょうか」"

[[dialogue]]
speaker = "マリーベル"
# 「いいわ、受けて立ちましょう。言っておくけど負ける気はないから」
line = "「いいわ、受けて立ちましょう。言っておくけど負ける気はないから」"

[[dialogue]]
speaker = "蛍火"
# 「勝負に臨む以上当然です。では──」
line = "「勝負に臨む以上当然です。では──」"

[[dialogue]]
speaker = "マリーベル"
# 「串料理五番勝負──」
line = "「串料理五番勝負──」"

[[dialogue]]
speaker = "蛍火"
# 「始め！」
line = "「始め！」"

[[dialogue]]
speaker = "マトイ"
# 「え？　え？　どうしてそうなるの？　新メニューの試食はどこ行ったの～！？」
line = "「え？　え？　どうしてそうなるの？　新メニューの試食はどこ行ったの～！？」"

[[dialogue]]
speaker = "unk"
# そして星徒会や教員を巻き込んで、カフェテリアで熾烈な串バトルが繰り広げられたのだった……
line = "そして星徒会や教員を巻き込んで、カフェテリアで熾烈な串バトルが繰り広げられたのだった……"
