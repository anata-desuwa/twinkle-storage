[[dialogue]]
speaker = "unk"
# ここが『死神』の目撃情報があったという遊園地。
line = "ここが『死神』の目撃情報があったという遊園地。"

[[dialogue]]
speaker = "unk"
# 星徒会のみんなには他の目撃場所を当たってもらっている。無事に堕天使を討伐できればいいのだが。
line = "星徒会のみんなには他の目撃場所を当たってもらっている。無事に堕天使を討伐できればいいのだが。"

[[dialogue]]
speaker = "フラン"
# 「ん？」
line = "「ん？」"

[[dialogue]]
speaker = "グロリア"
# 「あら」
line = "「あら」"

[[dialogue]]
speaker = "フラン"
# 「よお、会長じゃねえか！　こんなところに１人で何の用だ？　いや用なんていいからオレと勝負しようぜ！」
line = "「よお、会長じゃねえか！　こんなところに１人で何の用だ？　いや用なんていいからオレと勝負しようぜ！」"

[[dialogue]]
speaker = "グロリア"
# 「こんなところでお会いしたのも何かの縁──私と一緒に死んでくれませんか？」
line = "「こんなところでお会いしたのも何かの縁──私と一緒に死んでくれませんか？」"

[[dialogue]]
speaker = "unk"
# 再会した途端、個性的な反応をする２人。
line = "再会した途端、個性的な反応をする２人。"

[[dialogue]]
speaker = "unk"
# 彼女たちとの出会いは──
line = "彼女たちとの出会いは──"

[[dialogue]]
speaker = "グロリア"
# 「女神様、どうか加護を……」
line = "「女神様、どうか加護を……」"

[[dialogue]]
speaker = "グロリア"
# 「ふぅ。今日もお迎えは来そうにありませんね」
line = "「ふぅ。今日もお迎えは来そうにありませんね」"

[[dialogue]]
speaker = "unk"
# （あ……ＤＩＳＣが落ちてる）
line = "（あ……ＤＩＳＣが落ちてる）"

[[dialogue]]
speaker = "unk"
# それから彼女を探して……
line = "それから彼女を探して……"

[[dialogue]]
speaker = "グロリア"
# 「あら？　あなたは星徒会の……どうかされましたか？　え、ＤＩＳＣ……？」
line = "「あら？　あなたは星徒会の……どうかされましたか？　え、ＤＩＳＣ……？」"

[[dialogue]]
speaker = "グロリア"
# 「ああ、本当です……！　まさかＤＩＳＣを落としてしまうなんて、このままでは大変不便な思いをするところでした」
line = "「ああ、本当です……！　まさかＤＩＳＣを落としてしまうなんて、このままでは大変不便な思いをするところでした」"

[[dialogue]]
speaker = "グロリア"
# 「ありがとうございます。多忙な中、わざわざ私を探して届けてくださったのですね。なんとお優しいお方……」
line = "「ありがとうございます。多忙な中、わざわざ私を探して届けてくださったのですね。なんとお優しいお方……」"

[[dialogue]]
speaker = "グロリア"
# 「ぜひ──」
line = "「ぜひ──」"

[[dialogue]]
speaker = "グロリア"
# 「私と一緒に死んでいただけませんか？」
line = "「私と一緒に死んでいただけませんか？」"

[[dialogue]]
speaker = "unk"
# ！！？？
line = "！！？？"

[[dialogue]]
speaker = "フラン"
# 「おーい、グロリアー……って、またアレやってんのかよ！」
line = "「おーい、グロリアー……って、またアレやってんのかよ！」"

[[dialogue]]
speaker = "フラン"
# 「わりぃな。本人はいたって真面目なんだが……いろいろあるんだ。気にしないでやってくれ」
line = "「わりぃな。本人はいたって真面目なんだが……いろいろあるんだ。気にしないでやってくれ」"

[[dialogue]]
speaker = "フラン"
# 「コラ、グロリア。死んでくれっつうのはオレだけにしとけって言ってんだろ」
line = "「コラ、グロリア。死んでくれっつうのはオレだけにしとけって言ってんだろ」"

[[dialogue]]
speaker = "グロリア"
# 「フランさん、私を気遣ってくれるのですね。……やっぱり一緒に死んでもらえませんか？」
line = "「フランさん、私を気遣ってくれるのですね。……やっぱり一緒に死んでもらえませんか？」"

[[dialogue]]
speaker = "フラン"
# 「誰が死ぬかァ！」
line = "「誰が死ぬかァ！」"

[[dialogue]]
speaker = "フラン"
# 「ん？　あんた星徒会長じゃねえか。よしオレと御前試合しようぜ！」
line = "「ん？　あんた星徒会長じゃねえか。よしオレと御前試合しようぜ！」"

[[dialogue]]
speaker = "unk"
# いきなり！？
line = "いきなり！？"

[[dialogue]]
speaker = "グロリア"
# 「フランさん、星徒会長になりたかったのですね。知りませんでした」
line = "「フランさん、星徒会長になりたかったのですね。知りませんでした」"

[[dialogue]]
speaker = "フラン"
# 「いや全然」
line = "「いや全然」"

[[dialogue]]
speaker = "グロリア"
# 「おや。でしたらどうして？」
line = "「おや。でしたらどうして？」"

[[dialogue]]
speaker = "フラン"
# 「決まってんだろ。星徒会長といやあ、その学園の最強だ。戦士たる者、強いやつと戦いたいじゃねえか！」
line = "「決まってんだろ。星徒会長といやあ、その学園の最強だ。戦士たる者、強いやつと戦いたいじゃねえか！」"

[[dialogue]]
speaker = "unk"
# 悪いけど御前試合は簡単にはできない
line = "悪いけど御前試合は簡単にはできない"

[[dialogue]]
speaker = "フラン"
# 「……そうか。まぁいいぜ」
line = "「……そうか。まぁいいぜ」"

[[dialogue]]
speaker = "フラン"
# 「なんせ会長は最強だからな。オレがもっと強くなって、あんたが戦うにふさわしい相手と認められるようになったら、その時は御前試合を受けてくれ」
line = "「なんせ会長は最強だからな。オレがもっと強くなって、あんたが戦うにふさわしい相手と認められるようになったら、その時は御前試合を受けてくれ」"

[[dialogue]]
speaker = "フラン"
# 「オレは、フラン・アーテリアル。ちなみに部活は応援団だ」
line = "「オレは、フラン・アーテリアル。ちなみに部活は応援団だ」"

[[dialogue]]
speaker = "グロリア"
# 「改めまして、グロリア・アンビュラスと申します。以後お見知りおきを、優しい会長さん」
line = "「改めまして、グロリア・アンビュラスと申します。以後お見知りおきを、優しい会長さん」"

[[dialogue]]
speaker = "unk"
# ２人はどうして遊園地に？
line = "２人はどうして遊園地に？"

[[dialogue]]
speaker = "フラン"
# 「死神と戦うためさ。この遊園地には出るんだろ？　大鎌持ってあの世に連れてくやつを吟味してる死神がよ」
line = "「死神と戦うためさ。この遊園地には出るんだろ？　大鎌持ってあの世に連れてくやつを吟味してる死神がよ」"

[[dialogue]]
speaker = "グロリア"
# 「私も同じく死神様とお会いするために……。死神様ならきっと私を連れていってくださると思いますから」
line = "「私も同じく死神様とお会いするために……。死神様ならきっと私を連れていってくださると思いますから」"

[[dialogue]]
speaker = "フラン"
# 「グロリアには悪いがオレが勝つぜ。オレは強いからな」
line = "「グロリアには悪いがオレが勝つぜ。オレは強いからな」"

[[dialogue]]
speaker = "グロリア"
# 「それは困ります……」
line = "「それは困ります……」"

[[dialogue]]
speaker = "unk"
# 実は『死神』のことだけど……
line = "実は『死神』のことだけど……"

[[dialogue]]
speaker = "フラン"
# 「ふーん、会長も死神を探してんのか。……本当は堕天使？」
line = "「ふーん、会長も死神を探してんのか。……本当は堕天使？」"

[[dialogue]]
speaker = "フラン"
# 「堕天使になってるのは《試練》のパテル様か……ハッ、守護天使様に腕試しできるたぁちょうどいいじゃねえか！」
line = "「堕天使になってるのは《試練》のパテル様か……ハッ、守護天使様に腕試しできるたぁちょうどいいじゃねえか！」"

[[dialogue]]
speaker = "グロリア"
# 「死神様ではなかったのですね……」
line = "「死神様ではなかったのですね……」"

[[dialogue]]
speaker = "グロリア"
# 「……でも《試練》のパテル様なら実質死神では？　お迎えに来てくださる？」
line = "「……でも《試練》のパテル様なら実質死神では？　お迎えに来てくださる？」"

[[dialogue]]
speaker = "フラン"
# 「気を取り直すの早いな」
line = "「気を取り直すの早いな」"

[[dialogue]]
speaker = "フラン"
# 「よし、それじゃオレたちも一緒に探すぜ。オレと会長、どっちが死神を倒すか勝負だ！　オレが勝ったら御前試合を受けてもらおうじゃねえか！」
line = "「よし、それじゃオレたちも一緒に探すぜ。オレと会長、どっちが死神を倒すか勝負だ！　オレが勝ったら御前試合を受けてもらおうじゃねえか！」"

[[dialogue]]
speaker = "グロリア"
# 「いつもながらフランさんは勝負事がお好きですねぇ」
line = "「いつもながらフランさんは勝負事がお好きですねぇ」"

[[dialogue]]
speaker = "フラン"
# 「おう。オレの家は代々天界の戦士の家系でな、生きることは戦いだって親父から教わってきたんだ」
line = "「おう。オレの家は代々天界の戦士の家系でな、生きることは戦いだって親父から教わってきたんだ」"

[[dialogue]]
speaker = "フラン"
# 「つまり戦うことは生きるってことだろ？　だからオレは何が相手だって戦うぜ！」
line = "「つまり戦うことは生きるってことだろ？　だからオレは何が相手だって戦うぜ！」"

[[dialogue]]
speaker = "グロリア"
# 「逆になっている気がしますが……でも私はフランさんのそういうところ好きですよ」
line = "「逆になっている気がしますが……でも私はフランさんのそういうところ好きですよ」"

[[dialogue]]
speaker = "unk"
# 動機はともかく、プリマステラである２人の戦力は心強い。
line = "動機はともかく、プリマステラである２人の戦力は心強い。"

[[dialogue]]
speaker = "unk"
# こうして、彼女たちと一緒に遊園地を回ることになったのだった。
line = "こうして、彼女たちと一緒に遊園地を回ることになったのだった。"

[[dialogue]]
speaker = "？？？"
# 「……」
line = "「……」"
