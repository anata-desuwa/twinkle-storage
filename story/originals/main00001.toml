[[dialogue]]
speaker = "unk"
# <size=40>【Vega】</size>
line = "<size=40>【Vega】</size>"

[[dialogue]]
speaker = "unk"
# 滅亡が具現していた。
line = "滅亡が具現していた。"

[[dialogue]]
speaker = "unk"
# “世界の<emoji=abb><emoji=abb><emoji=abb>”を命じられた<emoji=abb><emoji=abb>は既に魔王の器さえ取り込み、退廃した荒野をなお終わらぬ暴虐に巻き込んでゆく。
line = "“世界の<emoji=abb><emoji=abb><emoji=abb>”を命じられた<emoji=abb><emoji=abb>は既に魔王の器さえ取り込み、退廃した荒野をなお終わらぬ暴虐に巻き込んでゆく。"

[[dialogue]]
speaker = "unk"
# 創るなら、まず壊す。
line = "創るなら、まず壊す。"

[[dialogue]]
speaker = "unk"
# 単純な道理であっても、それが億万の力で実行されれば世界はひとたまりもない。
line = "単純な道理であっても、それが億万の力で実行されれば世界はひとたまりもない。"

[[dialogue]]
speaker = "？？？"
# 「グ……オ……ギ……ギギ……ガ……ゴ……ググ……」
line = "「グ……オ……ギ……ギギ……ガ……ゴ……ググ……」"

[[dialogue]]
speaker = "unk"
# 破壊の化身が唸りを上げる。
line = "破壊の化身が唸りを上げる。"

[[dialogue]]
speaker = "unk"
# 残された最後の芽を摘むべく、絶望の黒き<ruby=かいな>腕</ruby>が<ruby=ぐふう>颶風</ruby>とともに迸った。
line = "残された最後の芽を摘むべく、絶望の黒き<ruby>腕<rt>かいな</rt></ruby>が<ruby>颶風<rt>ぐふう</rt></ruby>とともに迸った。"

[[dialogue]]
speaker = "フィオナ"
# 「（ごめん、エリシア──私のせいで）」
line = "「（ごめん、エリシア──私のせいで）」"

[[dialogue]]
speaker = "unk"
# 世界を支えていた生命の砦がついに崩れる。
line = "世界を支えていた生命の砦がついに崩れる。"

[[dialogue]]
speaker = "unk"
# 抑えきれないほど膨れ上がった神の残滓は、闇とともにこの宇宙を呑み込んでいった──。
line = "抑えきれないほど膨れ上がった神の残滓は、闇とともにこの宇宙を呑み込んでいった──。"

[[dialogue]]
speaker = "unk"
# <size=40>【Vega→Altair】</size>
line = "<size=40>【Vega→Altair】</size>"

[[dialogue]]
speaker = "ヴィーナス"
# 「聞きなさい。これは決定事項……この私が命じる限りね」
line = "「聞きなさい。これは決定事項……この私が命じる限りね」"

[[dialogue]]
speaker = "unk"
# はつらつな声が凛と響く。
line = "はつらつな声が凛と響く。"

[[dialogue]]
speaker = "unk"
# たなびく純白のマントが、俺の制服へ装着された。
line = "たなびく純白のマントが、俺の制服へ装着された。"

[[dialogue]]
speaker = "ヴィーナス"
# 「あなたを今日付けでここ、新星学園星徒会──星徒会長に任命するわ。そして」
line = "「あなたを今日付けでここ、新星学園星徒会──星徒会長に任命するわ。そして」"

[[dialogue]]
speaker = "unk"
# 憧れていた学園への転入。いくらかのアクシデントくらいは心構えもしていた。
line = "憧れていた学園への転入。いくらかのアクシデントくらいは心構えもしていた。"

[[dialogue]]
speaker = "unk"
# しかし、こんな展開は予想だにしていなかった。
line = "しかし、こんな展開は予想だにしていなかった。"

[[dialogue]]
speaker = "ヴィーナス"
# 「緋宮クロト──あなたは魔王となって、この世界を救うのよ！」
line = "「緋宮クロト──あなたは魔王となって、この世界を救うのよ！」"

[[dialogue]]
speaker = "クロト"
# 「…………………………え？」
line = "「…………………………え？」"

[[dialogue]]
speaker = "unk"
# ……一体。
line = "……一体。"

[[dialogue]]
speaker = "unk"
# どうして、こんなことになったんだっけ──
line = "どうして、こんなことになったんだっけ──"
