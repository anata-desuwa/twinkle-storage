line = "「何ライダーだか知らないけど……あんたみたいのは、星騎士として放っておけるわけないんだから！　おとなしくお縄につきなさい！」"

[[dialogue]]
speaker = "アポロ"
# 「へ──やーだよっと！　お星さまを捕まえたいなら、３回祈って手を伸ばすのだ！」
line = "「へ──やーだよっと！　お星さまを捕まえたいなら、３回祈って手を伸ばすのだ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あっ──こら！」
line = "「あっ──こら！」"

[[dialogue]]
speaker = "unk"
# しかしアポロは大剣を担ぎながら、バッタのように建物と建物を飛び回って逃げてしまう。
line = "しかしアポロは大剣を担ぎながら、バッタのように建物と建物を飛び回って逃げてしまう。"

[[dialogue]]
speaker = "アポロ"
# 「そんなチンケな状態の『魔王』を倒したって面白くない！　せっかく出会えたんだからな──もっとどんちゃん騒ぎにしてやるぜ！」
line = "「そんなチンケな状態の『魔王』を倒したって面白くない！　せっかく出会えたんだからな──もっとどんちゃん騒ぎにしてやるぜ！」"

[[dialogue]]
speaker = "アポロ"
# 「ひゃっほーう！　パーティの始まりだ～！」
line = "「ひゃっほーう！　パーティの始まりだ～！」"

[[dialogue]]
speaker = "モンスター"
# 「ウィイイイン！！」
line = "「ウィイイイン！！」"

[[dialogue]]
speaker = "モンスター"
# 「ィィィィッ──！！」
line = "「ィィィィッ──！！」"

[[dialogue]]
speaker = "サーシャ"
# 「も～。滅茶苦茶やってくれるわね～」
line = "「も～。滅茶苦茶やってくれるわね～」"

[[dialogue]]
speaker = "アナ"
# 「追わないと。被害がどんどん広がる」
line = "「追わないと。被害がどんどん広がる」"

[[dialogue]]
speaker = "マトイ"
# 「でも、モンスターが……！」
line = "「でも、モンスターが……！」"

[[dialogue]]
speaker = "unk"
# 逃げたアポロを追うのも簡単じゃない。
line = "逃げたアポロを追うのも簡単じゃない。"

[[dialogue]]
speaker = "unk"
# 彼女が移動するにも大剣を振るいまくるので、破壊とモンスターの創生が高回転で行われていくのだ。
line = "彼女が移動するにも大剣を振るいまくるので、破壊とモンスターの創生が高回転で行われていくのだ。"

[[dialogue]]
speaker = "クロト"
# 「悪い、みんな。どうやら俺が招いた存在らしいが──とにかく緊急の対処を頼む」
line = "「悪い、みんな。どうやら俺が招いた存在らしいが──とにかく緊急の対処を頼む」"

[[dialogue]]
speaker = "ヴィーナス"
# 「当たり前よ！　モンスターの掃討をしつつ、あのコを追うわ！」
line = "「当たり前よ！　モンスターの掃討をしつつ、あのコを追うわ！」"
