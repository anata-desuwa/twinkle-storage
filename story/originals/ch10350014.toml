[[dialogue]]
speaker = "unk"
# 第４話,幸せの形,P
line = "第４話,幸せの形,P"

[[dialogue]]
speaker = "unk"
# セナリィとの付き合いも長くなって来た、ある日のこと。星徒会の合宿に、セナリィ、ネーゼマイン、紅明の３人も参加することになった――
line = "セナリィとの付き合いも長くなって来た、ある日のこと。星徒会の合宿に、セナリィ、ネーゼマイン、紅明の３人も参加することになった――"

[[dialogue]]
speaker = "セナリィ"
# 「会長様。言われていた通り、人数分の寝袋、用意し終わりましたわよ」
line = "「会長様。言われていた通り、人数分の寝袋、用意し終わりましたわよ」"

[[dialogue]]
speaker = "セナリィ"
# 「全く、なぜ傭兵の私が、合宿になんて参加しているのか……」
line = "「全く、なぜ傭兵の私が、合宿になんて参加しているのか……」"

[[dialogue]]
speaker = "セナリィ"
# 「ええ、分かっていますわよ。いつも会長様の人脈に頼っているから、その代わりにお願いを１つ聞いてくれというお話でしたわよね」
line = "「ええ、分かっていますわよ。いつも会長様の人脈に頼っているから、その代わりにお願いを１つ聞いてくれというお話でしたわよね」"

[[dialogue]]
speaker = "セナリィ"
# 「だからって、どうしてお金ではなく、私の合宿参加を望まれるのか……正直意味が分かりませんわ」
line = "「だからって、どうしてお金ではなく、私の合宿参加を望まれるのか……正直意味が分かりませんわ」"

[[dialogue]]
speaker = "セナリィ"
# 「私のモットーは悪即善。悪行は儲かるからするのであって、儲からないことは良しとしない……基本的にお金にならないことはしない主義ですから」
line = "「私のモットーは悪即善。悪行は儲かるからするのであって、儲からないことは良しとしない……基本的にお金にならないことはしない主義ですから」"

[[dialogue]]
speaker = "unk"
# いつから、そう考えるようになったの？
line = "いつから、そう考えるようになったの？"

[[dialogue]]
speaker = "セナリィ"
# 「何です、暇つぶしの会話ですの？　……まぁ、別に構いませんけど」
line = "「何です、暇つぶしの会話ですの？　……まぁ、別に構いませんけど」"

[[dialogue]]
speaker = "セナリィ"
# 「つまらない昔話になりますわよ……最初に会長様と会った時に、私が武器商人の下で傭兵として働いていた……というのは、話しましたでしょう？」
line = "「つまらない昔話になりますわよ……最初に会長様と会った時に、私が武器商人の下で傭兵として働いていた……というのは、話しましたでしょう？」"

[[dialogue]]
speaker = "セナリィ"
# 「何故、武器商人の傭兵になったのかといえば……私は両親から売られたのですわ。生まれつき星力持ちで、星眼が使える武器として、人身売買されたのです」
line = "「何故、武器商人の傭兵になったのかといえば……私は両親から売られたのですわ。生まれつき星力持ちで、星眼が使える武器として、人身売買されたのです」"

[[dialogue]]
speaker = "セナリィ"
# 「中南米のバル・デベル共和国……私はそこのスラム街出身で、両親は貧乏でしたの。おまけに当時は内戦も起きていて、武器の需要が高かったのですわ」
line = "「中南米のバル・デベル共和国……私はそこのスラム街出身で、両親は貧乏でしたの。おまけに当時は内戦も起きていて、武器の需要が高かったのですわ」"

[[dialogue]]
speaker = "セナリィ"
# 「幸運だったのは、私を買った武器商人が変わり者だったことでしょうか。未来への投資だとか言って、私を煽ったのですわ――」
line = "「幸運だったのは、私を買った武器商人が変わり者だったことでしょうか。未来への投資だとか言って、私を煽ったのですわ――」"

[[dialogue]]
speaker = "セナリィ"
# 「親に売られたことが悔しければ、一人前の傭兵になって借金を返せ。そうすれば自由の身にしてやる……とね。心底ムカつきましたわ、両親にも、目の前の武器商人にもね」
line = "「親に売られたことが悔しければ、一人前の傭兵になって借金を返せ。そうすれば自由の身にしてやる……とね。心底ムカつきましたわ、両親にも、目の前の武器商人にもね」"

[[dialogue]]
speaker = "セナリィ"
# 「その時に決意したのですわ、私を売ったことを後悔させるくらい成り上がる、目の前の武器商人を顎で扱えるような大富豪になってやる、とね」
line = "「その時に決意したのですわ、私を売ったことを後悔させるくらい成り上がる、目の前の武器商人を顎で扱えるような大富豪になってやる、とね」"

[[dialogue]]
speaker = "セナリィ"
# 「武器商人は裏の世界では<ruby=アームドエンプレス>『武装女帝』</ruby>と呼ばれる有名な人物で、銃の扱いから戦闘技術、悪の何たるか等……生き抜く術を学びましたわ」
line = "「武器商人は裏の世界では<ruby>『武装女帝』<rt>アームドエンプレス</rt></ruby>と呼ばれる有名な人物で、銃の扱いから戦闘技術、悪の何たるか等……生き抜く術を学びましたわ」"

[[dialogue]]
speaker = "セナリィ"
# 「悪が儲かると知ったのは、そうやって裏の世界で生きて、見て来たからですわね。武器の存在は悪で……何千万、何億という金額が簡単に動きますのよ」
line = "「悪が儲かると知ったのは、そうやって裏の世界で生きて、見て来たからですわね。武器の存在は悪で……何千万、何億という金額が簡単に動きますのよ」"

[[dialogue]]
speaker = "セナリィ"
# 「それから、私はやがて傭兵として武器商人から認められるようになり、給料を貰えるようになりましたわ」
line = "「それから、私はやがて傭兵として武器商人から認められるようになり、給料を貰えるようになりましたわ」"

[[dialogue]]
speaker = "セナリィ"
# 「そして、自分で稼いだお金を手にした時……私はそれまで荒んでいた心が、初めて満たされて行くのを感じましたの」
line = "「そして、自分で稼いだお金を手にした時……私はそれまで荒んでいた心が、初めて満たされて行くのを感じましたの」"

[[dialogue]]
speaker = "セナリィ"
# 「ああ、これが幸せという感覚なんだと……充実するということなのだと、実感を得たのですわ」
line = "「ああ、これが幸せという感覚なんだと……充実するということなのだと、実感を得たのですわ」"

[[dialogue]]
speaker = "セナリィ"
# 「よく幸せとは、愛とか友情とか、目に見えないものだと言いますわよね？　私はあいにく、そういったものは信用出来ませんの」
line = "「よく幸せとは、愛とか友情とか、目に見えないものだと言いますわよね？　私はあいにく、そういったものは信用出来ませんの」"

[[dialogue]]
speaker = "セナリィ"
# 「一方でお金は、目に見える幸せですわ。お金を出せば、好きなことが出来る。お金は目に見える幸福……具体的な幸せの形なのですわ」
line = "「一方でお金は、目に見える幸せですわ。お金を出せば、好きなことが出来る。お金は目に見える幸福……具体的な幸せの形なのですわ」"

[[dialogue]]
speaker = "セナリィ"
# 「故に、お金＝幸せ。悪＝儲かる。幸福＝善きこと。悪即善というわけですわ」
line = "「故に、お金＝幸せ。悪＝儲かる。幸福＝善きこと。悪即善というわけですわ」"

[[dialogue]]
speaker = "unk"
# お金が欲しいだけなんだよね？
line = "お金が欲しいだけなんだよね？"

[[dialogue]]
speaker = "unk"
# セナリィは悪いことがしたいんじゃなく
line = "セナリィは悪いことがしたいんじゃなく"

[[dialogue]]
speaker = "セナリィ"
# 「あら、悪という響きは嫌いじゃありませんわよ？　箔が付いて、格好いいでしょう？」
line = "「あら、悪という響きは嫌いじゃありませんわよ？　箔が付いて、格好いいでしょう？」"

[[dialogue]]
speaker = "セナリィ"
# 「ただ……悪とは手段ですわ。武器は使い方によって、人を傷付ける物にも、人を守る物にも変わる。悪もそれと同じ。どう使うかですわ」
line = "「ただ……悪とは手段ですわ。武器は使い方によって、人を傷付ける物にも、人を守る物にも変わる。悪もそれと同じ。どう使うかですわ」"

[[dialogue]]
speaker = "セナリィ"
# 「私は傭兵で、戦いのプロですけれど、しなくて済むのであれば、ぶっちゃけ戦うのは嫌いまでありますわね」
line = "「私は傭兵で、戦いのプロですけれど、しなくて済むのであれば、ぶっちゃけ戦うのは嫌いまでありますわね」"

[[dialogue]]
speaker = "セナリィ"
# 「驚いた顔をしてますわね？　だって……面倒臭いでしょう？」
line = "「驚いた顔をしてますわね？　だって……面倒臭いでしょう？」"

[[dialogue]]
speaker = "セナリィ"
# 「私、さっきも言いましたけど、お金にならないことはしたくない主義ですの」
line = "「私、さっきも言いましたけど、お金にならないことはしたくない主義ですの」"

[[dialogue]]
speaker = "セナリィ"
# 「……と、まぁ、私自身の話はそんなところでしょうか。……ね？　つまらない話だったでしょう？」
line = "「……と、まぁ、私自身の話はそんなところでしょうか。……ね？　つまらない話だったでしょう？」"

[[dialogue]]
speaker = "unk"
# セナリィのことが知れて良かった
line = "セナリィのことが知れて良かった"

[[dialogue]]
speaker = "セナリィ"
# 「私を育てた武器商人とは違いますけれど……会長様も大概、変わり者ですわ」
line = "「私を育てた武器商人とは違いますけれど……会長様も大概、変わり者ですわ」"

[[dialogue]]
speaker = "セナリィ"
# 「お人好しなのに、私のようなアウトローにも寛容というか……普通はもっと、距離を置くものだと思いますけれど……」
line = "「お人好しなのに、私のようなアウトローにも寛容というか……普通はもっと、距離を置くものだと思いますけれど……」"

[[dialogue]]
speaker = "unk"
# それは、セナリィだからだよ
line = "それは、セナリィだからだよ"

[[dialogue]]
speaker = "セナリィ"
# 「っ……！」
line = "「っ……！」"

[[dialogue]]
speaker = "セナリィ"
# 「な、何を言ってますの！？　やっぱり意味が分かりませんわ！」
line = "「な、何を言ってますの！？　やっぱり意味が分かりませんわ！」"

[[dialogue]]
speaker = "セナリィ"
# （どうして、昔の話なんかしてしまったのかしら。自分でもあまり思い出したくないし、知られたくない過去のはずなのに……）
line = "（どうして、昔の話なんかしてしまったのかしら。自分でもあまり思い出したくないし、知られたくない過去のはずなのに……）"

[[dialogue]]
speaker = "セナリィ"
# （この合宿への参加だって、別に断ることだって出来たはずなのに……昔の私だったら、ビジネスパートナーの頼みとはいえ、イエスとは言わなかったはず）
line = "（この合宿への参加だって、別に断ることだって出来たはずなのに……昔の私だったら、ビジネスパートナーの頼みとはいえ、イエスとは言わなかったはず）"

[[dialogue]]
speaker = "セナリィ"
# （私が、少しずつ変わって来ているとでもいうの……？　戦場でバンデット・セナリィと恐れられた私が？）
line = "（私が、少しずつ変わって来ているとでもいうの……？　戦場でバンデット・セナリィと恐れられた私が？）"

[[dialogue]]
speaker = "セナリィ"
# （でも、こうして会長様と一緒に居る自分が、決して嫌じゃないとも感じていて……それどころか、むしろ……）
line = "（でも、こうして会長様と一緒に居る自分が、決して嫌じゃないとも感じていて……それどころか、むしろ……）"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ただいま～♪　買い出し行って来たよ～……って、ありゃ？　おやおや～？」
line = "「ただいま～♪　買い出し行って来たよ～……って、ありゃ？　おやおや～？」"

[[dialogue]]
speaker = "セナリィ"
# 「な、何ですの？　人の顔を見て、ニヤニヤと……」
line = "「な、何ですの？　人の顔を見て、ニヤニヤと……」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「いや～、セナリィが見たことないメスの顔になってるから、ひょっとして会長と２人きりで、何か良いことあったのかな～って思って♪」
line = "「いや～、セナリィが見たことないメスの顔になってるから、ひょっとして会長と２人きりで、何か良いことあったのかな～って思って♪」"

[[dialogue]]
speaker = "セナリィ"
# 「誰がメス顔ですの！？　べ、別に何も無いですわよ！」
line = "「誰がメス顔ですの！？　べ、別に何も無いですわよ！」"

[[dialogue]]
speaker = "紅明"
# 「そっかそっか～♪　セナっちもダーリンのこと……大丈夫！　アタシ的には一夫多妻制でも、セナっちなら大歓迎だぜ☆」
line = "「そっかそっか～♪　セナっちもダーリンのこと……大丈夫！　アタシ的には一夫多妻制でも、セナっちなら大歓迎だぜ☆」"

[[dialogue]]
speaker = "セナリィ"
# 「勝手に将来設計進めないで頂けます！？」
line = "「勝手に将来設計進めないで頂けます！？」"

[[dialogue]]
speaker = "unk"
# そうやって友達２人に囲まれるセナリィが、いつかお金以外の幸せにも気付けたらいいなと思うのであった。
line = "そうやって友達２人に囲まれるセナリィが、いつかお金以外の幸せにも気付けたらいいなと思うのであった。"
