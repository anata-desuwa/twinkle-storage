[[dialogue]]
speaker = "unk"
# ルリエルの煩悩が具現化した影に引っ張られ、４人は渋谷へとやって来ていた――
line = "ルリエルの煩悩が具現化した影に引っ張られ、４人は渋谷へとやって来ていた――"

[[dialogue]]
speaker = "ミヤハル"
# 「この展開は全然予想してなかったわぁ」
line = "「この展開は全然予想してなかったわぁ」"

[[dialogue]]
speaker = "ドッペルリエル"
# 「ルリエルはみんなと遊びたいのです♪」
line = "「ルリエルはみんなと遊びたいのです♪」"

[[dialogue]]
speaker = "トマル"
# 「ふふっ。ルリエルさまらしい、可愛らしい煩悩ですね」
line = "「ふふっ。ルリエルさまらしい、可愛らしい煩悩ですね」"

[[dialogue]]
speaker = "マトイ"
# 「あはは、確かに」
line = "「あはは、確かに」"

[[dialogue]]
speaker = "ルリエル"
# 「いや～、それ程でも、なのです♪」
line = "「いや～、それ程でも、なのです♪」"

[[dialogue]]
speaker = "ルリエル"
# 「ところで、ミヤハルさんはどこか行きたいところとかないのですか？」
line = "「ところで、ミヤハルさんはどこか行きたいところとかないのですか？」"

[[dialogue]]
speaker = "ミヤハル"
# 「うち？　ん～、そんないきなり言われてもなぁ」
line = "「うち？　ん～、そんないきなり言われてもなぁ」"

[[dialogue]]
speaker = "ミヤハル"
# 「うちは今まで、一緒に出かけるような友達もおらんかったし……」
line = "「うちは今まで、一緒に出かけるような友達もおらんかったし……」"

[[dialogue]]
speaker = "ルリエル"
# 「え？　そうなのですか？」
line = "「え？　そうなのですか？」"

[[dialogue]]
speaker = "ミヤハル"
# 「うちはスケベぇなことが好きやし、それを特に隠す気もあらへんし……だから、昔から周りに距離を置かれてしまうんよ」
line = "「うちはスケベぇなことが好きやし、それを特に隠す気もあらへんし……だから、昔から周りに距離を置かれてしまうんよ」"

[[dialogue]]
speaker = "マトイ"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "マトイ"
# （ミヤハルさん、友達いないのか……）
line = "（ミヤハルさん、友達いないのか……）"

[[dialogue]]
speaker = "ルリエル"
# 「そういうことなら、ルリエルにお任せなのです！　ここは――」
line = "「そういうことなら、ルリエルにお任せなのです！　ここは――」"

[[dialogue]]
speaker = "ドッペルリエル"
# 「みんなで食べ歩きをしましょう！」
line = "「みんなで食べ歩きをしましょう！」"

[[dialogue]]
speaker = "ルリエル"
# 「さすがもう１人のわたし！　考えることが一緒なのです♪」
line = "「さすがもう１人のわたし！　考えることが一緒なのです♪」"

[[dialogue]]
speaker = "ルリエル"
# 「渋谷には何度も遊びに来ているので、ルリエルがオススメの美味しいお店をガイドしちゃうのですよ～♪」
line = "「渋谷には何度も遊びに来ているので、ルリエルがオススメの美味しいお店をガイドしちゃうのですよ～♪」"

[[dialogue]]
speaker = "unk"
# それから、ルリエルがオススメする飲食店を周ることになったのだが――
line = "それから、ルリエルがオススメする飲食店を周ることになったのだが――"

[[dialogue]]
speaker = "マトイ"
# 「ここのケーキ、美味しい！」
line = "「ここのケーキ、美味しい！」"

[[dialogue]]
speaker = "ルリエル"
# 「ですよねですよね♪　ルリエルが最近見つけた、イチオシのケーキ店なのです！」
line = "「ですよねですよね♪　ルリエルが最近見つけた、イチオシのケーキ店なのです！」"

[[dialogue]]
speaker = "トマル"
# 「本当にとても美味しいです。今度、会長さまともご一緒したいくらい……」
line = "「本当にとても美味しいです。今度、会長さまともご一緒したいくらい……」"

[[dialogue]]
speaker = "ルリエル"
# 「マトイさん、トマルさんに比べて、すごくいっぱい食べますね！　そんなに食べて、太ったりしないんでしょうか？」
line = "「マトイさん、トマルさんに比べて、すごくいっぱい食べますね！　そんなに食べて、太ったりしないんでしょうか？」"

[[dialogue]]
speaker = "マトイ"
# 「――むぐっ！？　ごほっ、ごほごほごほっ！　ルリエルちゃん、ストレートに聞くね！？」
line = "「――むぐっ！？　ごほっ、ごほごほごほっ！　ルリエルちゃん、ストレートに聞くね！？」"

[[dialogue]]
speaker = "マトイ"
# 「そんなこと言ったら、ミヤハルさんだって同じくらい食べてるし……！」
line = "「そんなこと言ったら、ミヤハルさんだって同じくらい食べてるし……！」"

[[dialogue]]
speaker = "ミヤハル"
# 「ん？　ああ、うちは性欲旺盛やけど欲求不満が溜まってるから、食欲で補っとるんよ<emoji=heart04>」
line = "「ん？　ああ、うちは性欲旺盛やけど欲求不満が溜まってるから、食欲で補っとるんよ<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
# 「どういう理屈！？」
line = "「どういう理屈！？」"

[[dialogue]]
speaker = "ルリエル"
# 「つまり、マトイさんも性欲が不満なのですか？」
line = "「つまり、マトイさんも性欲が不満なのですか？」"

[[dialogue]]
speaker = "マトイ"
# 「ルリエルちゃん！？　違うから！」
line = "「ルリエルちゃん！？　違うから！」"

[[dialogue]]
speaker = "ミヤハル"
# 「それに、うちはいつも胸に栄養が行くから、あんまり気にしたことはないんよ」
line = "「それに、うちはいつも胸に栄養が行くから、あんまり気にしたことはないんよ」"

[[dialogue]]
speaker = "マトイ"
# 「えっ、それはずるくない！？　私はいつも体重計と睨めっこしてるのに……！」
line = "「えっ、それはずるくない！？　私はいつも体重計と睨めっこしてるのに……！」"

[[dialogue]]
speaker = "ルリエル"
# 「やっぱり食べ過ぎると、太るのですね！」
line = "「やっぱり食べ過ぎると、太るのですね！」"

[[dialogue]]
speaker = "マトイ"
# 「ケーキがこれ以上食べられなくなるから、言葉にしないで！」
line = "「ケーキがこれ以上食べられなくなるから、言葉にしないで！」"

[[dialogue]]
speaker = "ミヤハル"
# 「あっ、そういえばうち、行きたいところ１つ思いついたんやけど」
line = "「あっ、そういえばうち、行きたいところ１つ思いついたんやけど」"

[[dialogue]]
speaker = "ルリエル"
# 「本当ですか？　行きましょう！　どこなのです？」
line = "「本当ですか？　行きましょう！　どこなのです？」"

[[dialogue]]
speaker = "ミヤハル"
# 「大人のおもちゃのお店<emoji=heart04>」
line = "「大人のおもちゃのお店<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
# 「いや普通に考えてダメでしょ！？」
line = "「いや普通に考えてダメでしょ！？」"

[[dialogue]]
speaker = "ルリエル"
# 「『大人のおもちゃ』とは、一体どういうおもちゃなのです？」
line = "「『大人のおもちゃ』とは、一体どういうおもちゃなのです？」"

[[dialogue]]
speaker = "トマル"
# 「わ、私もそういうところは、まだ入ったことがなくて……」
line = "「わ、私もそういうところは、まだ入ったことがなくて……」"

[[dialogue]]
speaker = "ドッペルリエル"
# 「ルリエル、気になるのです！」
line = "「ルリエル、気になるのです！」"

[[dialogue]]
speaker = "ミヤハル"
# 「ふふっ、それはやね～<emoji=heart04>」
line = "「ふふっ、それはやね～<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
# 「待て待て待てぇいっ！　後輩たちに変なこと教えるんじゃな～～～いっ！！」
line = "「待て待て待てぇいっ！　後輩たちに変なこと教えるんじゃな～～～いっ！！」"

[[dialogue]]
speaker = "unk"
# そうして、街で食べ歩きを堪能した後、ルリエルの影はお腹を擦りながら、満足した様子で消えていった。
line = "そうして、街で食べ歩きを堪能した後、ルリエルの影はお腹を擦りながら、満足した様子で消えていった。"

[[dialogue]]
speaker = "unk"
# 神社に帰って来ると、ミヤハルはほっと息をつく。
line = "神社に帰って来ると、ミヤハルはほっと息をつく。"

[[dialogue]]
speaker = "ミヤハル"
# 「やれやれ、ようやっとルリエルはんの『遊びたい』って煩悩が満たされたみたいやねぇ」
line = "「やれやれ、ようやっとルリエルはんの『遊びたい』って煩悩が満たされたみたいやねぇ」"

[[dialogue]]
speaker = "ルリエル"
# 「はい♪　みんなでお出かけして、すごく楽しかったのです！」
line = "「はい♪　みんなでお出かけして、すごく楽しかったのです！」"

[[dialogue]]
speaker = "ドッペルリエル"
# 「次はお泊り会がしたいのです！」
line = "「次はお泊り会がしたいのです！」"

[[dialogue]]
speaker = "マトイ"
# 「って、あれ！？　いつの間にか、また復活してる！？」
line = "「って、あれ！？　いつの間にか、また復活してる！？」"

[[dialogue]]
speaker = "ルリエル"
# 「お泊り会！？　それはまた、すごく楽しそうなのです♪」
line = "「お泊り会！？　それはまた、すごく楽しそうなのです♪」"

[[dialogue]]
speaker = "トマル"
# 「わ、私は参加していいものなのでしょうか……？」
line = "「わ、私は参加していいものなのでしょうか……？」"

[[dialogue]]
speaker = "ミヤハル"
# 「……ルリエルはんの煩悩の強さ、うち舐めとったわぁ」
line = "「……ルリエルはんの煩悩の強さ、うち舐めとったわぁ」"

[[dialogue]]
speaker = "unk"
# そんなわけで急遽、神社でのお泊り会が開催されることになるのだった――
line = "そんなわけで急遽、神社でのお泊り会が開催されることになるのだった――"
