[[dialogue]]
speaker = "unk"
# ＤＩＳＣでメッセージを受け取った俺――緋宮クロトは、星見家に向かった。
line = "ＤＩＳＣでメッセージを受け取った俺――緋宮クロトは、星見家に向かった。"

[[dialogue]]
speaker = "アム"
# 「あっ、会長～！　見て見て、じゃじゃ～ん♪　これがあたし達のクリスマスフォームだよっ♪」
line = "「あっ、会長～！　見て見て、じゃじゃ～ん♪　これがあたし達のクリスマスフォームだよっ♪」"

[[dialogue]]
speaker = "unk"
# すると、そこで出迎えたのは、クリスマス衣装に身を包んだアムであった。
line = "すると、そこで出迎えたのは、クリスマス衣装に身を包んだアムであった。"

[[dialogue]]
speaker = "unk"
# すごく可愛くて、よく似合ってる
line = "すごく可愛くて、よく似合ってる"

[[dialogue]]
speaker = "アム"
# 「えへへっ、そうでしょ～？　って……ん？　今、カッコいいじゃなくて、可愛いって言った？」
line = "「えへへっ、そうでしょ～？　って……ん？　今、カッコいいじゃなくて、可愛いって言った？」"

[[dialogue]]
speaker = "ナミエル"
# 「じ～っ……」
line = "「じ～っ……」"

[[dialogue]]
speaker = "unk"
# アムの後ろに隠れてるんだ？
line = "アムの後ろに隠れてるんだ？"

[[dialogue]]
speaker = "unk"
# えっと……ナミエルはどうして
line = "えっと……ナミエルはどうして"

[[dialogue]]
speaker = "ナミエル"
# 「会長、あまりこちらを見ないで下さいっ。目線がいやらしいですよ……！」
line = "「会長、あまりこちらを見ないで下さいっ。目線がいやらしいですよ……！」"

[[dialogue]]
speaker = "アム"
# 「ナミエルは恥ずかしがり屋だなぁ～。似合っているんだから、隠れたりしてないで堂々と見せなよ！　ほらっ♪」
line = "「ナミエルは恥ずかしがり屋だなぁ～。似合っているんだから、隠れたりしてないで堂々と見せなよ！　ほらっ♪」"

[[dialogue]]
speaker = "ナミエル"
# 「ちょっ、アム先輩……！？　あっ……！」
line = "「ちょっ、アム先輩……！？　あっ……！」"

[[dialogue]]
speaker = "unk"
# ズバリ可愛くて、マジ天使、だ！
line = "ズバリ可愛くて、マジ天使、だ！"

[[dialogue]]
speaker = "unk"
# ナミエル、あえて包み隠さずに言おう……
line = "ナミエル、あえて包み隠さずに言おう……"

[[dialogue]]
speaker = "ナミエル"
# 「ななな、何をサムズアップしながらドヤ顔で言ってるんですか！？　ふざけてます！？　処しますよ！？」
line = "「ななな、何をサムズアップしながらドヤ顔で言ってるんですか！？　ふざけてます！？　処しますよ！？」"

[[dialogue]]
speaker = "ナミエル"
# 「大体、このクリスマスフォーム、別に会長に見せようと着ていたわけじゃなくて、変身解除ができないだけですから！」
line = "「大体、このクリスマスフォーム、別に会長に見せようと着ていたわけじゃなくて、変身解除ができないだけですから！」"

[[dialogue]]
speaker = "unk"
# 変身解除できない……？
line = "変身解除できない……？"

[[dialogue]]
speaker = "ナミエル"
# 「はい。どうやら以前、ウェディングフォームになってしまった時と似たような現象が起きてしまっているみたいで……」
line = "「はい。どうやら以前、ウェディングフォームになってしまった時と似たような現象が起きてしまっているみたいで……」"

[[dialogue]]
speaker = "アム"
# 「どうやら会長にも見えていないみたいだね。スノーマンのこと」
line = "「どうやら会長にも見えていないみたいだね。スノーマンのこと」"

[[dialogue]]
speaker = "スノーマン"
# 「うん……ボク、やっぱり他の人には、姿だけじゃなく、声も聞こえていないみたい……」
line = "「うん……ボク、やっぱり他の人には、姿だけじゃなく、声も聞こえていないみたい……」"

[[dialogue]]
speaker = "unk"
# 俺には姿が見えないスノーマンとは、一体なんなのか。首を傾げながら、２人に事情を尋ねると――
line = "俺には姿が見えないスノーマンとは、一体なんなのか。首を傾げながら、２人に事情を尋ねると――"

[[dialogue]]
speaker = "ナミエル"
# 「私のクリスマスフォームの一部にもなっているこのシルクハット……これに触れた瞬間、私とアム先輩の２人だけが、スノーマンの存在を認識できるようになったんです」
line = "「私のクリスマスフォームの一部にもなっているこのシルクハット……これに触れた瞬間、私とアム先輩の２人だけが、スノーマンの存在を認識できるようになったんです」"

[[dialogue]]
speaker = "アム"
# 「スノーマンは冬の精霊で、その影響であたし達はクリスマスフォームの力に目覚めたようなんだけど……変身解除はどうやってもできなくてさ」
line = "「スノーマンは冬の精霊で、その影響であたし達はクリスマスフォームの力に目覚めたようなんだけど……変身解除はどうやってもできなくてさ」"

[[dialogue]]
speaker = "アム"
# 「スノーマン自身も、なんでか記憶がなくて、自分がどうしてここにいるのかとか、シルクハットを落とした理由とか、よくわからないらしいんだよね」
line = "「スノーマン自身も、なんでか記憶がなくて、自分がどうしてここにいるのかとか、シルクハットを落とした理由とか、よくわからないらしいんだよね」"

[[dialogue]]
speaker = "スノーマン"
# 「ボク、自分がスノーマンであること以外、思い出せなくて、色々できたはずの冬の力も今は全然使えない……」
line = "「ボク、自分がスノーマンであること以外、思い出せなくて、色々できたはずの冬の力も今は全然使えない……」"

[[dialogue]]
speaker = "ナミエル"
# 「それで以前、守護天使のセシア様――セッシーが初めて学園に来た時も、一時的に記憶喪失になっていたと聞いたことがあって……」
line = "「それで以前、守護天使のセシア様――セッシーが初めて学園に来た時も、一時的に記憶喪失になっていたと聞いたことがあって……」"

[[dialogue]]
speaker = "アム"
# 「会長はこういう謎のトラブル経験が豊富だっていうのも知ってたからさ。相談してみようって話になったんだ」
line = "「会長はこういう謎のトラブル経験が豊富だっていうのも知ってたからさ。相談してみようって話になったんだ」"

[[dialogue]]
speaker = "アム"
# 「あっ、ちなみに星見家まで来てもらったのは、ナミエルがクリスマスフォームのままで外にいるのが恥ずかしいからって理由で……」
line = "「あっ、ちなみに星見家まで来てもらったのは、ナミエルがクリスマスフォームのままで外にいるのが恥ずかしいからって理由で……」"

[[dialogue]]
speaker = "ナミエル"
# 「当たり前です。むしろ、なんでアム先輩は堂々としていられるんですか……」
line = "「当たり前です。むしろ、なんでアム先輩は堂々としていられるんですか……」"

[[dialogue]]
speaker = "アム"
# 「えっ？　このクリスマスフォーム、カッコいいから別によくない？　それに、あたしはもう普段から、水着フォームで戦うのにも慣れてるし♪」
line = "「えっ？　このクリスマスフォーム、カッコいいから別によくない？　それに、あたしはもう普段から、水着フォームで戦うのにも慣れてるし♪」"

[[dialogue]]
speaker = "ナミエル"
# 「えぇ……」
line = "「えぇ……」"

[[dialogue]]
speaker = "アム"
# 「そうだ！　会長、変身解除できないこともそうだけど、それよりもっと困ったことがあってさ――」
line = "「そうだ！　会長、変身解除できないこともそうだけど、それよりもっと困ったことがあってさ――」"

[[dialogue]]
speaker = "アム"
# 「あたしとナミエル、不思議な力で、<b>物理的に</b>離れることができなくなっちゃってるんだよ！」
line = "「あたしとナミエル、不思議な力で、<b>物理的に</b>離れることができなくなっちゃってるんだよ！」"

[[dialogue]]
speaker = "ナミエル"
# 「……調べたところ、半径約１メートル以上の距離を空けようとすると、不思議な力で磁石のように引っ張られてしまうみたいなんです」
line = "「……調べたところ、半径約１メートル以上の距離を空けようとすると、不思議な力で磁石のように引っ張られてしまうみたいなんです」"

[[dialogue]]
speaker = "unk"
# たった１メートル……！？
line = "たった１メートル……！？"

[[dialogue]]
speaker = "アム"
# 「そうなんだよ！　常に二人三脚しているのと変わらないみたいな感じで、さすがになんとかしないと、不便でさ～」
line = "「そうなんだよ！　常に二人三脚しているのと変わらないみたいな感じで、さすがになんとかしないと、不便でさ～」"

[[dialogue]]
speaker = "unk"
# ２人から事情を聞いた俺は、以前のクリスマスでセシアと出会った時の話をしつつ、アドバイスする。
line = "２人から事情を聞いた俺は、以前のクリスマスでセシアと出会った時の話をしつつ、アドバイスする。"

[[dialogue]]
speaker = "ナミエル"
# 「――スノーマンが望んでいることを叶えたら、記憶が戻って、クリスマスフォームの力も解除できるようになるかもしれない……？　なるほど……」
line = "「――スノーマンが望んでいることを叶えたら、記憶が戻って、クリスマスフォームの力も解除できるようになるかもしれない……？　なるほど……」"

[[dialogue]]
speaker = "アム"
# 「スノーマンは、何か叶えたいって思うこと、ある？」
line = "「スノーマンは、何か叶えたいって思うこと、ある？」"

[[dialogue]]
speaker = "スノーマン"
# 「ボクが望んでいること……？　う～ん、わからない……」
line = "「ボクが望んでいること……？　う～ん、わからない……」"

[[dialogue]]
speaker = "アム"
# 「そっか。記憶喪失だから、そこも思い浮かばない感じか～。参ったな～、どうしよっか？」
line = "「そっか。記憶喪失だから、そこも思い浮かばない感じか～。参ったな～、どうしよっか？」"

[[dialogue]]
speaker = "ナミエル"
# 「ふむ……とりあえず、今すぐに解決できる問題ではないということはわかりました」
line = "「ふむ……とりあえず、今すぐに解決できる問題ではないということはわかりました」"

[[dialogue]]
speaker = "ナミエル"
# 「であれば――次の対策に移る必要があります」
line = "「であれば――次の対策に移る必要があります」"

[[dialogue]]
speaker = "アム"
# 「ナミエル、何か考えがあるの？」
line = "「ナミエル、何か考えがあるの？」"

[[dialogue]]
speaker = "ナミエル"
# 「簡単に問題解決できない可能性は、当然想定していました。ですので、その場合には、当面の状態で生活する覚悟を決める必要があります」
line = "「簡単に問題解決できない可能性は、当然想定していました。ですので、その場合には、当面の状態で生活する覚悟を決める必要があります」"

[[dialogue]]
speaker = "ナミエル"
# 「つまりは、『クリスマスフォームで二人三脚生活をする』という現状を受け入れ、それでも附属校の授業にはきちんと出なければならない、という覚悟をです」
line = "「つまりは、『クリスマスフォームで二人三脚生活をする』という現状を受け入れ、それでも附属校の授業にはきちんと出なければならない、という覚悟をです」"

[[dialogue]]
speaker = "アム"
# 「えっ、この状態で授業に出るの！？　いやいや、あたし達、離れてそれぞれの教室に向かうのは、物理的に不可能なんだけど！？」
line = "「えっ、この状態で授業に出るの！？　いやいや、あたし達、離れてそれぞれの教室に向かうのは、物理的に不可能なんだけど！？」"

[[dialogue]]
speaker = "ナミエル"
# 「承知しています。ですが、余程のことでもない限り、学園の授業はちゃんと受けなければなりません。何故なら――」
line = "「承知しています。ですが、余程のことでもない限り、学園の授業はちゃんと受けなければなりません。何故なら――」"

[[dialogue]]
speaker = "ナミエル"
# 「私たち星騎士は、世界を守る代表として、人々の模範となる<b>クリーン</b>な行動を取らなくてはならないからです！」
line = "「私たち星騎士は、世界を守る代表として、人々の模範となる<b>クリーン</b>な行動を取らなくてはならないからです！」"

[[dialogue]]
speaker = "アム"
# 「真面目かっ！！！　いや、その志はめっちゃ偉いけども！」
line = "「真面目かっ！！！　いや、その志はめっちゃ偉いけども！」"

[[dialogue]]
speaker = "ナミエル"
# 「物理的に、私たちのどちらか１人は授業を欠席せざるを得ないというのが心苦しいところですが……ここは平等に、ジャンケンで決めましょう」
line = "「物理的に、私たちのどちらか１人は授業を欠席せざるを得ないというのが心苦しいところですが……ここは平等に、ジャンケンで決めましょう」"

[[dialogue]]
speaker = "ナミエル"
# 「私はここまで、学園の授業は綺麗に無遅刻無欠席の皆勤賞……！　だからこそ、この勝負……決して負けるわけにはいきません！」
line = "「私はここまで、学園の授業は綺麗に無遅刻無欠席の皆勤賞……！　だからこそ、この勝負……決して負けるわけにはいきません！」"

[[dialogue]]
speaker = "ナミエル"
# 「はぁ～……ふぅ～。――さあ、アム先輩。己の誇りをかけて、運命のジャンケンです……！」
line = "「はぁ～……ふぅ～。――さあ、アム先輩。己の誇りをかけて、運命のジャンケンです……！」"

[[dialogue]]
speaker = "アム"
# 「こんなにやりづらい勝負、生まれて初めてなんだけど！？　だったらもう、あたしの負けでいいよ！？」
line = "「こんなにやりづらい勝負、生まれて初めてなんだけど！？　だったらもう、あたしの負けでいいよ！？」"

[[dialogue]]
speaker = "ナミエル"
# 「いいえ、ダメです、アム先輩。――不戦勝は、決して綺麗な勝利ではありません」
line = "「いいえ、ダメです、アム先輩。――不戦勝は、決して綺麗な勝利ではありません」"

[[dialogue]]
speaker = "アム"
# 「真面目通り越して、意外と面倒臭いな、この子！？」
line = "「真面目通り越して、意外と面倒臭いな、この子！？」"

[[dialogue]]
speaker = "unk"
# その後――流星学園附属校の教室にて。
line = "その後――流星学園附属校の教室にて。"

[[dialogue]]
speaker = "女性教師"
# 「えっと……ナミエルさん？」
line = "「えっと……ナミエルさん？」"

[[dialogue]]
speaker = "ナミエル"
# 「はい。なんでしょうか、先生」
line = "「はい。なんでしょうか、先生」"

[[dialogue]]
speaker = "女性教師"
# 「えっと……そのクリスマスチックな戦闘服は、一体どうしたのかしら？」
line = "「えっと……そのクリスマスチックな戦闘服は、一体どうしたのかしら？」"

[[dialogue]]
speaker = "ナミエル"
# 「事情は後でちゃんと説明致しますので、お気になさらず。それよりも今は他のみなさんの勉学の時間を減らさないよう、授業の方を優先して頂ければ」
line = "「事情は後でちゃんと説明致しますので、お気になさらず。それよりも今は他のみなさんの勉学の時間を減らさないよう、授業の方を優先して頂ければ」"

[[dialogue]]
speaker = "女性教師"
# 「わ、わかりました。衣装のことは一旦了承しましたけど、もう１つ、どうしても気になるのが……」
line = "「わ、わかりました。衣装のことは一旦了承しましたけど、もう１つ、どうしても気になるのが……」"

[[dialogue]]
speaker = "アム"
# 「あ、あはは……どうも～」
line = "「あ、あはは……どうも～」"

[[dialogue]]
speaker = "女性教師"
# 「えっと……白楯アムさん、ですよね？　３年生の……」
line = "「えっと……白楯アムさん、ですよね？　３年生の……」"

[[dialogue]]
speaker = "アム"
# 「はい……お邪魔してます～」
line = "「はい……お邪魔してます～」"

[[dialogue]]
speaker = "女性教師"
# 「なんで１年生の教室に？　しかも、ナミエルさんの隣で、クリスマスチックな衣装もお揃いで……」
line = "「なんで１年生の教室に？　しかも、ナミエルさんの隣で、クリスマスチックな衣装もお揃いで……」"

[[dialogue]]
speaker = "アム"
# 「えっと……ひとまず、お気になさらず～。あははは……」
line = "「えっと……ひとまず、お気になさらず～。あははは……」"

[[dialogue]]
speaker = "女性教師"
# 「えぇ……？」
line = "「えぇ……？」"

[[dialogue]]
speaker = "unk"
# 真面目な顔で授業を受ける準備万端なナミエルの横で、苦笑いを浮かべるアムなのだった。
line = "真面目な顔で授業を受ける準備万端なナミエルの横で、苦笑いを浮かべるアムなのだった。"
