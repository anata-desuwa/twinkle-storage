line = "「胸をたぷたぷにする秘訣なら、聞かなくもない」"

[[dialogue]]
speaker = "ヴィーナス"
# 「うるさーい！　なんでもいいから聞きなさい！」
line = "「うるさーい！　なんでもいいから聞きなさい！」"

[[dialogue]]
speaker = "unk"
# 一喝されてしまった。
line = "一喝されてしまった。"

[[dialogue]]
speaker = "unk"
