[[dialogue]]
speaker = "unk"
# 中身はほとんど読めていなかったが、先生だし、隣でサーシャ先輩がチェックしてくれていたので平気と信じよう。
line = "中身はほとんど読めていなかったが、先生だし、隣でサーシャ先輩がチェックしてくれていたので平気と信じよう。"

