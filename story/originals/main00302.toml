line = "「ひーのーみーやーくーん！　ここの資料にサインちょーだーい！」"

[[dialogue]]
speaker = "クロト"
# 「なんで先生までてんてこまいなんですか……！？」
line = "「なんで先生までてんてこまいなんですか……！？」"

[[dialogue]]
speaker = "サーシャ"
# 「先生たちが作る資料にも、なぜか星徒会長の署名欄があるのよね～。悪しき習慣だわ～」
line = "「先生たちが作る資料にも、なぜか星徒会長の署名欄があるのよね～。悪しき習慣だわ～」"

[[dialogue]]
speaker = "クロト"
# 「ええと、こういう資料はいつもアナに…………っていない！」
line = "「ええと、こういう資料はいつもアナに…………っていない！」"

[[dialogue]]
speaker = "サーシャ"
