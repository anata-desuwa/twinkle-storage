[[dialogue]]
speaker = "ヴィーナス"
# 「アナ、説明よろしく」
line = "「アナ、説明よろしく」"

[[dialogue]]
speaker = "アナ"
# 「太陽の壁画。今から２０００年前、何者かによって描かれた歴史上の一場面」
line = "「太陽の壁画。今から２０００年前、何者かによって描かれた歴史上の一場面」"

[[dialogue]]
speaker = "unk"
# 悠久の歴史を思わせる古い石版。
line = "悠久の歴史を思わせる古い石版。"

[[dialogue]]
speaker = "unk"
# そこに描かれていたのは、黒く歪んだ悪者らしき人物が倒れ伏している様子だ。
line = "そこに描かれていたのは、黒く歪んだ悪者らしき人物が倒れ伏している様子だ。"

[[dialogue]]
speaker = "サーシャ"
# 「確か～。“前回”のリクリエで暴れてた魔王様が、懲らしめられてる様子よね～」
line = "「確か～。“前回”のリクリエで暴れてた魔王様が、懲らしめられてる様子よね～」"

[[dialogue]]
speaker = "アナ"
# 「はい。“前”のリクリエの年代については３０００年前と云われていますが……」
line = "「はい。“前”のリクリエの年代については３０００年前と云われていますが……」"

[[dialogue]]
speaker = "アナ"
# 「ここに描かれている『魔王』は当時、世界を破壊しようとする巨悪だったと伝えられていますね」
line = "「ここに描かれている『魔王』は当時、世界を破壊しようとする巨悪だったと伝えられていますね」"

[[dialogue]]
speaker = "マトイ"
# 「大聖堂に来たら、すぐ目に入っちゃうよね」
line = "「大聖堂に来たら、すぐ目に入っちゃうよね」"

[[dialogue]]
speaker = "unk"
# この『太陽の壁画』は学園生徒なら誰しも目にしたことのある有名なもののようだった。
line = "この『太陽の壁画』は学園生徒なら誰しも目にしたことのある有名なもののようだった。"

[[dialogue]]
speaker = "unk"
# 打倒リクリエを掲げる星騎士にとって、誇り高きシンボルでもあるのだろう。
line = "打倒リクリエを掲げる星騎士にとって、誇り高きシンボルでもあるのだろう。"

[[dialogue]]
speaker = "クロト"
# 「にしても……２０００年前か。想像もつかないくらい昔ではあるけど」
line = "「にしても……２０００年前か。想像もつかないくらい昔ではあるけど」"

[[dialogue]]
speaker = "クロト"
# 「リクリエが起こったっていう３０００年前のものじゃないんだな」
line = "「リクリエが起こったっていう３０００年前のものじゃないんだな」"

[[dialogue]]
speaker = "サーシャ"
# 「ま～、さすがにそんな大昔のものは残ってないんじゃないかしら」
line = "「ま～、さすがにそんな大昔のものは残ってないんじゃないかしら」"

[[dialogue]]
speaker = "アナ"
# 「ただ、それでもこちらの絵の内容は長らく受け継がれてきたものとされています」
line = "「ただ、それでもこちらの絵の内容は長らく受け継がれてきたものとされています」"

[[dialogue]]
speaker = "アナ"
# 「もちろん、抽象的な描写ではありますが……」
line = "「もちろん、抽象的な描写ではありますが……」"

[[dialogue]]
speaker = "サーシャ"
# 「この『魔王』さんは、あくまでも<ruby=やくさい>厄災</ruby>の擬人化とか言われたかしら？」
line = "「この『魔王』さんは、あくまでも<ruby>厄災<rt>やくさい</rt></ruby>の擬人化とか言われたかしら？」"

[[dialogue]]
speaker = "アナ"
# 「諸説ありますね。絵画として収めるために、人物として描写した──とも」
line = "「諸説ありますね。絵画として収めるために、人物として描写した──とも」"

[[dialogue]]
speaker = "マトイ"
# 「絵だもんね。そーゆーこともありそう」
line = "「絵だもんね。そーゆーこともありそう」"

[[dialogue]]
speaker = "クロト"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# 倒れ伏した人間の姿を見る。
line = "倒れ伏した人間の姿を見る。"

[[dialogue]]
speaker = "unk"
# これが、魔王。
line = "これが、魔王。"

[[dialogue]]
speaker = "unk"
# 幾千年も昔のリクリエで暗躍し、ついには打ち倒されたという悪の権化。
line = "幾千年も昔のリクリエで暗躍し、ついには打ち倒されたという悪の権化。"

[[dialogue]]
speaker = "クロト"
# （……）
line = "（……）"

[[dialogue]]
speaker = "unk"
# ──でも、なぜだ。
line = "──でも、なぜだ。"

[[dialogue]]
speaker = "unk"
# この濁った瞳の深淵に、引き込まれてしまうような──
line = "この濁った瞳の深淵に、引き込まれてしまうような──"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふふふ……クロトは気づいたようね」
line = "「ふふふ……クロトは気づいたようね」"

[[dialogue]]
speaker = "マトイ"
# 「えっ……？」
line = "「えっ……？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そう。『魔王』が<ruby=やくさい>厄災</ruby>の権化なんていうのは全くの嘘っぱち──」
line = "「そう。『魔王』が<ruby>厄災<rt>やくさい</rt></ruby>の権化なんていうのは全くの嘘っぱち──」"

[[dialogue]]
speaker = "ヴィーナス"
# 「本来の『魔王』はむしろ、かつてのリクリエから世界を救った真の英雄なの！」
line = "「本来の『魔王』はむしろ、かつてのリクリエから世界を救った真の英雄なの！」"

[[dialogue]]
speaker = "unk"
# 大聖堂のど真ん中で高らかに新説を謳うヴィーナス。
line = "大聖堂のど真ん中で高らかに新説を謳うヴィーナス。"

[[dialogue]]
speaker = "unk"
# いつもの彼女……と思いきや、アナがちょんちょんとその側面をつついた。
line = "いつもの彼女……と思いきや、アナがちょんちょんとその側面をつついた。"

[[dialogue]]
speaker = "アナ"
# 「前会長。ちゃんと順を追って話しましょう、また呆れられています」
line = "「前会長。ちゃんと順を追って話しましょう、また呆れられています」"

[[dialogue]]
speaker = "ヴィーナス"
# 「っとと。早とちりはよくない癖ね！」
line = "「っとと。早とちりはよくない癖ね！」"

[[dialogue]]
speaker = "アナ"
# 「いちお、前会長にも根拠があるので、聞いたげてください」
line = "「いちお、前会長にも根拠があるので、聞いたげてください」"

[[dialogue]]
speaker = "unk"
# アナにそう言われると、ヴィーナスは例の日誌を取り出して広げた。
line = "アナにそう言われると、ヴィーナスは例の日誌を取り出して広げた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「ここのページを見なさい！　魔王についての真実が記されているわ！」
line = "「ここのページを見なさい！　魔王についての真実が記されているわ！」"

[[dialogue]]
speaker = "サーシャ"
# 「ヴィーナスちゃんのいつもの日記ね～」
line = "「ヴィーナスちゃんのいつもの日記ね～」"

[[dialogue]]
speaker = "クロト"
# 「えーと……何々……」
line = "「えーと……何々……」"

[[dialogue]]
speaker = "unk"
# 『終焉を打ち砕きし魔王の真実は未だ偽りの悪に虚飾されている。この世界に根を張る日輪の図が、過去の因果を捻じ曲げているのだ』
line = "『終焉を打ち砕きし魔王の真実は未だ偽りの悪に虚飾されている。この世界に根を張る日輪の図が、過去の因果を捻じ曲げているのだ』"

[[dialogue]]
speaker = "unk"
# 『真実を描いた月輪の図はどこかに隠されているという。私は、その在り処を求めるべく友の力を借りた』
line = "『真実を描いた月輪の図はどこかに隠されているという。私は、その在り処を求めるべく友の力を借りた』"

[[dialogue]]
speaker = "ヴィーナス"
# 「……と、いうワケよ！」
line = "「……と、いうワケよ！」"

[[dialogue]]
speaker = "マトイ"
# 「……どゆこと？」
line = "「……どゆこと？」"

[[dialogue]]
speaker = "サーシャ"
# 「ちょっと示唆的な感じね～」
line = "「ちょっと示唆的な感じね～」"

[[dialogue]]
speaker = "クロト"
