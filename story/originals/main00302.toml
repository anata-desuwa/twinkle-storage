[[dialogue]]
speaker = "マトイ"
# 「わ、私が行っておくから──緋宮くんは意見書のほうを……！」
line = "「わ、私が行っておくから──緋宮くんは意見書のほうを……！」"

[[dialogue]]
speaker = "クロト"
