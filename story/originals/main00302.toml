line = "「思うにこの『日輪の図』っていうのがこの太陽の壁画を指していて──」"

[[dialogue]]
speaker = "クロト"
# 「魔王が英雄だったはずの栄光は、今この時代には隠されている──ってことか？」
line = "「魔王が英雄だったはずの栄光は、今この時代には隠されている──ってことか？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ベストアンサー！」
line = "「ベストアンサー！」"

[[dialogue]]
speaker = "アナ"
# 「補足します」
line = "「補足します」"

[[dialogue]]
speaker = "アナ"
# 「終焉を打ち砕いた魔王。しかしその真実は、偽りの過去によって虚飾されている」
line = "「終焉を打ち砕いた魔王。しかしその真実は、偽りの過去によって虚飾されている」"

[[dialogue]]
speaker = "アナ"
# 「ゆえにこの『太陽の壁画』は、英雄であるはずの魔王を悪の権化として描いている──という解釈ですね」
line = "「ゆえにこの『太陽の壁画』は、英雄であるはずの魔王を悪の権化として描いている──という解釈ですね」"

[[dialogue]]
speaker = "マトイ"
# 「そ、そんな見方ができるの……！？」
line = "「そ、そんな見方ができるの……！？」"

[[dialogue]]
speaker = "サーシャ"
# 「うふふ。でも、そう考えると面白いわね。誰が描いたのかしら？」
line = "「うふふ。でも、そう考えると面白いわね。誰が描いたのかしら？」"

[[dialogue]]
speaker = "unk"
# 三千年前にリクリエを撃退したはずの『魔王』。しかしその存在は、世界そのものによって欺かれていると日誌は告げる。
line = "三千年前にリクリエを撃退したはずの『魔王』。しかしその存在は、世界そのものによって欺かれていると日誌は告げる。"

[[dialogue]]
speaker = "ヴィーナス"
# 「とにかく私が言いたいのはひとつ、魔王っていうのは英雄の証ってこと」
line = "「とにかく私が言いたいのはひとつ、魔王っていうのは英雄の証ってこと」"

[[dialogue]]
speaker = "ヴィーナス"
# 「だからこの壁画は偽りのデタラメの嘘っぱち！　後世に捏造されたプロパンガスなのだわ！！」
line = "「だからこの壁画は偽りのデタラメの嘘っぱち！　後世に捏造されたプロパンガスなのだわ！！」"

[[dialogue]]
speaker = "アナ"
# 「プロパガンダです」
line = "「プロパガンダです」"

[[dialogue]]
speaker = "unk"
# 人目をはばからず堂々と宣言するヴィーナスを見て、すぐさまどよめきが周囲に広がっていった。
line = "人目をはばからず堂々と宣言するヴィーナスを見て、すぐさまどよめきが周囲に広がっていった。"

[[dialogue]]
speaker = "女子生徒Ａ"
# 「ねえ……あれって新星の前会長の……」
line = "「ねえ……あれって新星の前会長の……」"

[[dialogue]]
speaker = "女子生徒Ｂ"
# 「魔王が英雄なんて……何言ってるの……？」
line = "「魔王が英雄なんて……何言ってるの……？」"

[[dialogue]]
speaker = "女子生徒Ｃ"
# 「御前試合で負けておかしくなったんじゃないですか……？」
line = "「御前試合で負けておかしくなったんじゃないですか……？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「失礼ね！　元からこうよ！」
line = "「失礼ね！　元からこうよ！」"

[[dialogue]]
speaker = "マトイ"
# 「反論になってないような……」
line = "「反論になってないような……」"

[[dialogue]]
speaker = "アナ"
# 「大注目を集めてしまいましたね」
line = "「大注目を集めてしまいましたね」"

[[dialogue]]
speaker = "サーシャ"
# 「無理もないわ。こうやって飾られてる壁画を悪く言うなんて……」
line = "「無理もないわ。こうやって飾られてる壁画を悪く言うなんて……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「しょうがないじゃない！　日誌に書かれてる以上、これは事実なんだから！」
line = "「しょうがないじゃない！　日誌に書かれてる以上、これは事実なんだから！」"

[[dialogue]]
speaker = "unk"
# 魔王を英雄などとうそぶくのは、邪神を信仰していると公言するようなものなのかも。
line = "魔王を英雄などとうそぶくのは、邪神を信仰していると公言するようなものなのかも。"

[[dialogue]]
speaker = "unk"
# 星徒会メンバーが集まってこんな話をしているのは不穏当だ。
line = "星徒会メンバーが集まってこんな話をしているのは不穏当だ。"

[[dialogue]]
speaker = "unk"
# しかし……
line = "しかし……"

[[dialogue]]
speaker = "unk"
# 思えば出会った時から俺のことを《魔王》と認定していたヴィーナス。
line = "思えば出会った時から俺のことを《魔王》と認定していたヴィーナス。"

[[dialogue]]
speaker = "unk"
# あれも別に俺を敵視していたわけではなく、むしろ英雄視していたと考えればしっくり来る。
line = "あれも別に俺を敵視していたわけではなく、むしろ英雄視していたと考えればしっくり来る。"

[[dialogue]]
speaker = "クロト"
# 「ヴィーナスは……俺のことを<b>そう</b>だと言いたいのか」
line = "「ヴィーナスは……俺のことを<b>そう</b>だと言いたいのか」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええ。言ったでしょう、クロト。私は──あなたのことを信じているのよ」
line = "「ええ。言ったでしょう、クロト。私は──あなたのことを信じているのよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「よく見てみなさい、この『魔王』の姿を。クロトに似てると思わない？」
line = "「よく見てみなさい、この『魔王』の姿を。クロトに似てると思わない？」"

[[dialogue]]
speaker = "クロト"
# 「そうか……？」
line = "「そうか……？」"

[[dialogue]]
speaker = "マトイ"
# 「倒れてて顔が見えないもん」
line = "「倒れてて顔が見えないもん」"

[[dialogue]]
speaker = "アナ"
# 「というか、この絵柄では誰に似てるとかの問題ではない気もしますが」
line = "「というか、この絵柄では誰に似てるとかの問題ではない気もしますが」"

[[dialogue]]
speaker = "ヴィーナス"
# 「どう見てもそっくりよ！　耳の形なんか、ホラ！」
line = "「どう見てもそっくりよ！　耳の形なんか、ホラ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「御前試合の際に目覚めたあの力もそう！　クロトが魔王の資質を眠らせてるってだけなのよ！」
line = "「御前試合の際に目覚めたあの力もそう！　クロトが魔王の資質を眠らせてるってだけなのよ！」"

[[dialogue]]
speaker = "マトイ"
# 「なんかますます主人公……！　わ、私にも秘めたる力ってないのかな……？」
line = "「なんかますます主人公……！　わ、私にも秘めたる力ってないのかな……？」"

[[dialogue]]
speaker = "サーシャ"
# 「マトイちゃんはそのままが一番可愛いのよ～」
line = "「マトイちゃんはそのままが一番可愛いのよ～」"

[[dialogue]]
speaker = "クロト"
