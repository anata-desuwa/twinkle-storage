[[dialogue]]
speaker = "教頭"
# 「無論だ！　星徒会長は全星騎士を束ねる長──流星市国の治安を守るのに君以上の適任はいない！」
line = "「無論だ！　星徒会長は全星騎士を束ねる長──流星市国の治安を守るのに君以上の適任はいない！」"

[[dialogue]]
speaker = "クロト"
# 「わ、わかりました……自分でよければ」
