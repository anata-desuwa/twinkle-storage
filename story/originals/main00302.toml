line = "ヴィーナスは、アナから『日誌』を渡されると改めて俺たちへ向き直る。"

[[dialogue]]
speaker = "ヴィーナス"
# 「大事な話というのは他でもないわ──」
line = "「大事な話というのは他でもないわ──」"

[[dialogue]]
speaker = "ヴィーナス"
# 「『魔王』についてよ」
line = "「『魔王』についてよ」"

[[dialogue]]
speaker = "マトイ"
# 「魔王っていうと……」
line = "「魔王っていうと……」"

[[dialogue]]
speaker = "アナ"
# 「前会長が新会長に執着する理由、ですね」
line = "「前会長が新会長に執着する理由、ですね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええ。でもって、その根拠になるのが──これよ！」
line = "「ええ。でもって、その根拠になるのが──これよ！」"

[[dialogue]]
speaker = "unk"
# ヴィーナスに先導された先には、見上げるほどの大きな壁画があった。
line = "ヴィーナスに先導された先には、見上げるほどの大きな壁画があった。"

[[dialogue]]
speaker = "クロト"
# 「この絵って──確か、教科書にも載ってた……」
line = "「この絵って──確か、教科書にも載ってた……」"

[[dialogue]]
speaker = "unk"
# そこに描かれていたのは星騎士学の教科書に載っていた挿絵──そのオリジナルだった。
line = "そこに描かれていたのは星騎士学の教科書に載っていた挿絵──そのオリジナルだった。"

[[dialogue]]
speaker = "unk"
# 実物は、こちらが圧倒されてしまうほどのサイズだ。
line = "実物は、こちらが圧倒されてしまうほどのサイズだ。"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロトにはまだあまり馴染みがないかもしれないわね」
