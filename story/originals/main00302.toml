line = "「──はじめまして失礼します！　自分は今年入ったばかりの新米星騎士なのですが、ぜひ御前試合を制した星徒会長殿に稽古をつけていただきたいと……！」"

[[dialogue]]
speaker = "クロト"
# 「インタビューと道場破りは現在受け付けておりません！　次の方どうぞ！」
line = "「インタビューと道場破りは現在受け付けておりません！　次の方どうぞ！」"

[[dialogue]]
speaker = "サーシャ"
# 「あらあら。千客万来ね～」
