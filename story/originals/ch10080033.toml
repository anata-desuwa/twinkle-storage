[[dialogue]]
speaker = "unk"
# 第３話,アナのスペシャルスイーツ,P
line = "第３話,アナのスペシャルスイーツ,P"

[[dialogue]]
speaker = "アナ"
# 「会長、こちらの書類のチェックをお願いします」
line = "「会長、こちらの書類のチェックをお願いします」"

[[dialogue]]
speaker = "unk"
# すごい量だ……！
line = "すごい量だ……！"

[[dialogue]]
speaker = "アナ"
# 「はい、ですが期日も迫っています。ちょっと大変ですが、今日は終わるまで星徒会室で頑張ってください」
line = "「はい、ですが期日も迫っています。ちょっと大変ですが、今日は終わるまで星徒会室で頑張ってください」"

[[dialogue]]
speaker = "アナ"
# 「本当は私も最後までお手伝いしたいですが、どうしても承認印など、会長でないと処理できないものがありますから……」
line = "「本当は私も最後までお手伝いしたいですが、どうしても承認印など、会長でないと処理できないものがありますから……」"

[[dialogue]]
speaker = "unk"
# アナ、お疲れ様！
line = "アナ、お疲れ様！"

[[dialogue]]
speaker = "unk"
# わかった、任せてくれ
line = "わかった、任せてくれ"

[[dialogue]]
speaker = "アナ"
# 「はい、お疲れ様でした。それではお先に失礼します」
line = "「はい、お疲れ様でした。それではお先に失礼します」"

[[dialogue]]
speaker = "アナ"
# 「今日はオフ。このまま寮に帰っても良いのですが……あの書類の量と、会長の今までの手際から見て……きっと夜中までかかるはず」
line = "「今日はオフ。このまま寮に帰っても良いのですが……あの書類の量と、会長の今までの手際から見て……きっと夜中までかかるはず」"

[[dialogue]]
speaker = "アナ"
# 「となれば……うん。何か夜食を調達することにしましょう。頭脳労働ですし、甘いものなんかが良さそうですね」
line = "「となれば……うん。何か夜食を調達することにしましょう。頭脳労働ですし、甘いものなんかが良さそうですね」"

[[dialogue]]
speaker = "アナ"
# 「カフェテリアのテイクアウト、あまり使ったことがないですね。星徒会でおやつを食べる時は、だいたいマトイ先輩のお手製ですし」
line = "「カフェテリアのテイクアウト、あまり使ったことがないですね。星徒会でおやつを食べる時は、だいたいマトイ先輩のお手製ですし」"

[[dialogue]]
speaker = "アナ"
# 「クッキー……キャンディ……色々ありますが……う～ん。何がいいでしょうか」
line = "「クッキー……キャンディ……色々ありますが……う～ん。何がいいでしょうか」"

[[dialogue]]
speaker = "サラン"
# 「ぽよ？　あ～、アナちゃんだ～！」
line = "「ぽよ？　あ～、アナちゃんだ～！」"

[[dialogue]]
speaker = "アナ"
# 「あ……サラン先輩。こんにちは」
line = "「あ……サラン先輩。こんにちは」"

[[dialogue]]
speaker = "サラン"
# 「どうかしたの～？　お菓子コーナーなのに、すっごく真剣なお顔してるけど～」
line = "「どうかしたの～？　お菓子コーナーなのに、すっごく真剣なお顔してるけど～」"

[[dialogue]]
speaker = "アナ"
# 「ええ。ちょっと……今日は会長が残業なので、何か差し入れでもと思いまして」
line = "「ええ。ちょっと……今日は会長が残業なので、何か差し入れでもと思いまして」"

[[dialogue]]
speaker = "サラン"
# 「そっか～♪　アナちゃん、優しいんだね～<emoji=heart04>」
line = "「そっか～♪　アナちゃん、優しいんだね～<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
# 「よろしければサラン先輩、テイクアウトできるスイーツのオススメを教えていただけませんか？」
line = "「よろしければサラン先輩、テイクアウトできるスイーツのオススメを教えていただけませんか？」"

[[dialogue]]
speaker = "アナ"
# 「お菓子にかける情熱と実力は、私が知る限りサラン先輩が一番の人だと思っていますので」
line = "「お菓子にかける情熱と実力は、私が知る限りサラン先輩が一番の人だと思っていますので」"

[[dialogue]]
speaker = "サラン"
# 「わ～、責任重大かも～♪　うん、サランに任せて！」
line = "「わ～、責任重大かも～♪　うん、サランに任せて！」"

[[dialogue]]
speaker = "サラン"
# 「そ～だねぇ。カフェテリアのワッフルもマフィンも～、と～っても美味しいけど～……せっかくだし、今から手作りするのもいいかも～？」
line = "「そ～だねぇ。カフェテリアのワッフルもマフィンも～、と～っても美味しいけど～……せっかくだし、今から手作りするのもいいかも～？」"

[[dialogue]]
speaker = "アナ"
# 「え……？　今から、ですか？」
line = "「え……？　今から、ですか？」"

[[dialogue]]
speaker = "サラン"
# 「うん！　テイクアウトのマフィンって冷めてるよね？　でも出来立ては、ふわ～っと温かくて、バターのいい香りがするの～♪」
line = "「うん！　テイクアウトのマフィンって冷めてるよね？　でも出来立ては、ふわ～っと温かくて、バターのいい香りがするの～♪」"

[[dialogue]]
speaker = "サラン"
# 「出来立ての焼き菓子ちゃん、と～っても美味しいから喜ばれると思うな～<emoji=heart04>」
line = "「出来立ての焼き菓子ちゃん、と～っても美味しいから喜ばれると思うな～<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
# 「なるほど……では、ご依頼できますか？　サラン先輩に手掛けていただければ、きっと素敵な差し入れになると思います」
line = "「なるほど……では、ご依頼できますか？　サラン先輩に手掛けていただければ、きっと素敵な差し入れになると思います」"

[[dialogue]]
speaker = "サラン"
# 「ぽよ？　違うよー、アナちゃんが作るんだよ～♪」
line = "「ぽよ？　違うよー、アナちゃんが作るんだよ～♪」"

[[dialogue]]
speaker = "アナ"
# 「……私が？」
line = "「……私が？」"

[[dialogue]]
speaker = "サラン"
# 「お付き合いしてる女の子から、手作りお菓子～<emoji=heart04>　きっと会長ちゃん、とーってもふわふわ～な気持ちにになってくれるよー♪」
line = "「お付き合いしてる女の子から、手作りお菓子～<emoji=heart04>　きっと会長ちゃん、とーってもふわふわ～な気持ちにになってくれるよー♪」"

[[dialogue]]
speaker = "アナ"
# 「でも私は、お菓子は食べる専門で……調理の経験もほとんどないのですが……」
line = "「でも私は、お菓子は食べる専門で……調理の経験もほとんどないのですが……」"

[[dialogue]]
speaker = "サラン"
# 「大丈夫～<emoji=heart04>　サランが付きっきりで教えてあげるから～！　よーし、調理室に、れっつごー！」
line = "「大丈夫～<emoji=heart04>　サランが付きっきりで教えてあげるから～！　よーし、調理室に、れっつごー！」"

[[dialogue]]
speaker = "unk"
# あと一頑張りで書類のチェックが終わるところまで来た……のだけれど。
line = "あと一頑張りで書類のチェックが終わるところまで来た……のだけれど。"

[[dialogue]]
speaker = "unk"
# お腹、空いたなあ……
line = "お腹、空いたなあ……"

[[dialogue]]
speaker = "アナ"
# 「おお会長よ、お腹が空くとは情けない──なんちゃって」
line = "「おお会長よ、お腹が空くとは情けない──なんちゃって」"

[[dialogue]]
speaker = "アナ"
# 「どうぞ。頑張っている会長に、出来立てのあつあつマフィンをデリバリーです」
line = "「どうぞ。頑張っている会長に、出来立てのあつあつマフィンをデリバリーです」"

[[dialogue]]
speaker = "unk"
# ありがとう、アナ！
line = "ありがとう、アナ！"

[[dialogue]]
speaker = "アナ"
# 「しかもなんと、給食委員会のサラン先輩のお手製です。調理室で味見しましたが、ほっぺが落ちる美味しさでした」
line = "「しかもなんと、給食委員会のサラン先輩のお手製です。調理室で味見しましたが、ほっぺが落ちる美味しさでした」"

[[dialogue]]
speaker = "アナ"
# 「どうぞ、召し上がってください」
line = "「どうぞ、召し上がってください」"

[[dialogue]]
speaker = "unk"
# ……美味しい！
line = "……美味しい！"

[[dialogue]]
speaker = "アナ"
# 「流石は桜十字のご令嬢です。なんてことない焼き菓子を、ここまでの逸品に仕立て上げるとは」
line = "「流石は桜十字のご令嬢です。なんてことない焼き菓子を、ここまでの逸品に仕立て上げるとは」"

[[dialogue]]
speaker = "アナ"
# 「普段は和菓子派の私ですが、これはお見事という他ありません」
line = "「普段は和菓子派の私ですが、これはお見事という他ありません」"

[[dialogue]]
speaker = "アナ"
# 「……って、すごいですね会長。あっという間に完食して……本当にお腹ペコペコだったんですね」
line = "「……って、すごいですね会長。あっという間に完食して……本当にお腹ペコペコだったんですね」"

[[dialogue]]
speaker = "unk"
# アナ、その後ろ手に持っているのは……
line = "アナ、その後ろ手に持っているのは……"

[[dialogue]]
speaker = "unk"
# ……あれ？
line = "……あれ？"

[[dialogue]]
speaker = "アナ"
# 「あ……はい。こっちの箱に入っているのもマフィンです。ですが……その……」
line = "「あ……はい。こっちの箱に入っているのもマフィンです。ですが……その……」"

[[dialogue]]
speaker = "アナ"
# 「こっちはちょっと不格好なんですよ。えーっと、私が作ったものなので……」
line = "「こっちはちょっと不格好なんですよ。えーっと、私が作ったものなので……」"

[[dialogue]]
speaker = "unk"
# そっちも食べたいな！
line = "そっちも食べたいな！"

[[dialogue]]
speaker = "unk"
# アナの手作り……！
line = "アナの手作り……！"

[[dialogue]]
speaker = "アナ"
# 「そ、そうですか。では……ど、どうぞ。サラン先輩のものに比べて、味は落ちるかと思いますが……」
line = "「そ、そうですか。では……ど、どうぞ。サラン先輩のものに比べて、味は落ちるかと思いますが……」"

[[dialogue]]
speaker = "unk"
# ──すごく美味しいよ、アナ！
line = "──すごく美味しいよ、アナ！"

[[dialogue]]
speaker = "アナ"
# 「……良かった。そう言っていただけると、私も嬉しいです」
line = "「……良かった。そう言っていただけると、私も嬉しいです」"

[[dialogue]]
speaker = "アナ"
# 「自分が作ったものを食べてもらえるのって、嬉しいですね。会長も私のために抹茶プリンを作ってくださることがありましたが……」
line = "「自分が作ったものを食べてもらえるのって、嬉しいですね。会長も私のために抹茶プリンを作ってくださることがありましたが……」"

[[dialogue]]
speaker = "アナ"
# 「これからは、私もたくさんお料理、勉強しようと思います」
line = "「これからは、私もたくさんお料理、勉強しようと思います」"

[[dialogue]]
speaker = "アナ"
# 「その……会長との将来を考えると、いずれ自炊のスキルは大切になってくるとも、思いますし……」
line = "「その……会長との将来を考えると、いずれ自炊のスキルは大切になってくるとも、思いますし……」"

[[dialogue]]
speaker = "アナ"
# 「──はい。頑張ります。よろしければまた、私の料理の感想を聞かせてください、会長♪」
line = "「──はい。頑張ります。よろしければまた、私の料理の感想を聞かせてください、会長♪」"

[[dialogue]]
speaker = "unk"
# サランのものに比べて、アナのマフィンは確かに形が不ぞろいでこそあったけれど。
line = "サランのものに比べて、アナのマフィンは確かに形が不ぞろいでこそあったけれど。"

[[dialogue]]
speaker = "unk"
# 大好きな恋人が自分のために作ってくれた。その事実が、とてもとても嬉しいのだった──
line = "大好きな恋人が自分のために作ってくれた。その事実が、とてもとても嬉しいのだった──"
