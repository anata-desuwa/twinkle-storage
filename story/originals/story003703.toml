[[dialogue]]
speaker = "レイラ"
# 「……ここはどこ、私はレイラ……はっ、みんなは！？」
line = "「……ここはどこ、私はレイラ……はっ、みんなは！？」"

[[dialogue]]
speaker = "レイラ"
# 「……さっきのではぐれちゃったみたい。見たことないモンスターだったけど……というかなんで『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』を倒したのにモンスターが？」
line = "「……さっきのではぐれちゃったみたい。見たことないモンスターだったけど……というかなんで『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』を倒したのにモンスターが？」"

[[dialogue]]
speaker = "レイラ"
# 「ううん、今は早くみんなと合流しなくちゃ。キサナー！　リーナー！　イングリットー！　いたら返事してー！」
line = "「ううん、今は早くみんなと合流しなくちゃ。キサナー！　リーナー！　イングリットー！　いたら返事してー！」"

[[dialogue]]
speaker = "キサナ"
# 「うるせぇ、ここにいるっての」
line = "「うるせぇ、ここにいるっての」"

[[dialogue]]
speaker = "レイラ"
# 「うわいた！？」
line = "「うわいた！？」"

[[dialogue]]
speaker = "キサナ"
# 「呼んどいて自分で驚いてんじゃねえ。近くからオマエの匂いがすると思って来たんだよ」
line = "「呼んどいて自分で驚いてんじゃねえ。近くからオマエの匂いがすると思って来たんだよ」"

[[dialogue]]
speaker = "レイラ"
# 「さすが獣人系魔族……すごい嗅覚だね。でも私の匂いってどんなのだろ？　花のような爽やかな匂いだったりする？」
line = "「さすが獣人系魔族……すごい嗅覚だね。でも私の匂いってどんなのだろ？　花のような爽やかな匂いだったりする？」"

[[dialogue]]
speaker = "キサナ"
# 「ハンバーガーの匂いだよ。自分のこと美化してんじゃねえ」
line = "「ハンバーガーの匂いだよ。自分のこと美化してんじゃねえ」"

[[dialogue]]
speaker = "キサナ"
# 「あー、オマエのせいで腹減ってきた……なんか食うもんねえか？」
line = "「あー、オマエのせいで腹減ってきた……なんか食うもんねえか？」"

[[dialogue]]
speaker = "レイラ"
# 「うーん、バーベキューセットはモンスターに吹き飛ばされちゃったし……あ、チョコバーならあるよ。キサナ、これ好きだと思って持ってきてたの」
line = "「うーん、バーベキューセットはモンスターに吹き飛ばされちゃったし……あ、チョコバーならあるよ。キサナ、これ好きだと思って持ってきてたの」"

[[dialogue]]
speaker = "キサナ"
# 「別に好物じゃねえけど……まあいい、よこせ。……って、溶けてドロドロじゃねえか」
line = "「別に好物じゃねえけど……まあいい、よこせ。……って、溶けてドロドロじゃねえか」"

[[dialogue]]
speaker = "レイラ"
# 「要らないなら私が食べるけど？」
line = "「要らないなら私が食べるけど？」"

[[dialogue]]
speaker = "キサナ"
# 「食うに決まってんだろ！」
line = "「食うに決まってんだろ！」"

[[dialogue]]
speaker = "レイラ"
# 「ふふっ、なんか懐かしいね」
line = "「ふふっ、なんか懐かしいね」"

[[dialogue]]
speaker = "キサナ"
# 「ふん、言ってろ」
line = "「ふん、言ってろ」"

[[dialogue]]
speaker = "キサナ"
# （アタシが生まれたのは魔界、セントリア西部。マフィア同士が血で血を洗う、とにかくクソみてぇなとこだった）
line = "（アタシが生まれたのは魔界、セントリア西部。マフィア同士が血で血を洗う、とにかくクソみてぇなとこだった）"

[[dialogue]]
speaker = "キサナ"
# （弱いやつは、死ぬ。優しいやつも、死ぬ。馬鹿もついでに死ぬ。生き残るのは強いやつ、誰も信じねえやつ、騙すやつだ）
line = "（弱いやつは、死ぬ。優しいやつも、死ぬ。馬鹿もついでに死ぬ。生き残るのは強いやつ、誰も信じねえやつ、騙すやつだ）"

[[dialogue]]
speaker = "キサナ"
# （気が付けば、アタシも一人前の悪党になってた。それがメシを食うってことだと思ってた。生き残れば、それが正しいんだ）
line = "（気が付けば、アタシも一人前の悪党になってた。それがメシを食うってことだと思ってた。生き残れば、それが正しいんだ）"

[[dialogue]]
speaker = "キサナ"
# （星騎士ってのを知るまでは）
line = "（星騎士ってのを知るまでは）"

[[dialogue]]
speaker = "アネゴ"
# 「知ってるか、キサナ。モンスターとか、星騎士とか、世の中にはそういうのがいるらしい」
line = "「知ってるか、キサナ。モンスターとか、星騎士とか、世の中にはそういうのがいるらしい」"

[[dialogue]]
speaker = "キサナ"
# 「はぁ……なんすか、いきなり」
line = "「はぁ……なんすか、いきなり」"

[[dialogue]]
speaker = "アネゴ"
# 「モンスターは世界を滅ぼすバケモノで、星騎士はモンスターから人々を守る英雄なんだとよ。この前死んだ司祭が言ってた」
line = "「モンスターは世界を滅ぼすバケモノで、星騎士はモンスターから人々を守る英雄なんだとよ。この前死んだ司祭が言ってた」"

[[dialogue]]
speaker = "キサナ"
# 「あのアル中の？　じゃあウソッパチじゃないっすか」
line = "「あのアル中の？　じゃあウソッパチじゃないっすか」"

[[dialogue]]
speaker = "アネゴ"
# 「だよな。アタシもそう思う」
line = "「だよな。アタシもそう思う」"

[[dialogue]]
speaker = "キサナ"
# （アネゴも、それからすぐに死んだ。アタシを庇って死んだ。そんなのは弱いやつのすることだって教えてくれたのはアネゴだったのに）
line = "（アネゴも、それからすぐに死んだ。アタシを庇って死んだ。そんなのは弱いやつのすることだって教えてくれたのはアネゴだったのに）"

[[dialogue]]
speaker = "キサナ"
# （それから、アネゴから聞いた星騎士の話が頭を離れなかった）
line = "（それから、アネゴから聞いた星騎士の話が頭を離れなかった）"

[[dialogue]]
speaker = "キサナ"
# （見ず知らずの連中のために戦う正義の味方。世界を救う英雄。そんなのがいてたまるか）
line = "（見ず知らずの連中のために戦う正義の味方。世界を救う英雄。そんなのがいてたまるか）"

[[dialogue]]
speaker = "キサナ"
# （そんなのが本当にいるなら、アタシは何だ？　騙して、傷付けて、奪って……）
line = "（そんなのが本当にいるなら、アタシは何だ？　騙して、傷付けて、奪って……）"

[[dialogue]]
speaker = "キサナ"
# （アタシは、何なんだよ……）
line = "（アタシは、何なんだよ……）"

[[dialogue]]
speaker = "キサナ"
# （そんな時だった。<ruby=そいつ>星騎士</ruby>は突然、降ってきた）
line = "（そんな時だった。<ruby>星騎士<rt>そいつ</rt></ruby>は突然、降ってきた）"

[[dialogue]]
speaker = "キサナ"
# （デカいドンパチが起きて、うちのファミリーはほとんど死んで、アタシもヘマして腹にタマもらっちまった）
line = "（デカいドンパチが起きて、うちのファミリーはほとんど死んで、アタシもヘマして腹にタマもらっちまった）"

[[dialogue]]
speaker = "キサナ"
# （今でも忘れやしねぇ。腹がすーすーする感覚。死にかけの……いや、本当に死んでんだっけか……まぁいいや）
line = "（今でも忘れやしねぇ。腹がすーすーする感覚。死にかけの……いや、本当に死んでんだっけか……まぁいいや）"

[[dialogue]]
speaker = "？？？"
# 「そ、双方、武器を捨てなさい……っ！　言うことを聞かないなら……ブラックホール・ディバウアー！」
line = "「そ、双方、武器を捨てなさい……っ！　言うことを聞かないなら……ブラックホール・ディバウアー！」"

[[dialogue]]
speaker = "キサナ"
# （あれは愉快だった。荒野に大穴を開けられて、どいつもこいつもビビりちらかして……いつもあんなに威張り散らしてたくせによ）
line = "（あれは愉快だった。荒野に大穴を開けられて、どいつもこいつもビビりちらかして……いつもあんなに威張り散らしてたくせによ）"

[[dialogue]]
speaker = "？？？"
# 「赤毛でネコっぽい魔族……あ、いたいた。あなたがキサナさんですね？」
line = "「赤毛でネコっぽい魔族……あ、いたいた。あなたがキサナさんですね？」"

[[dialogue]]
speaker = "キサナ"
# 「テメエ……何モンだ」
line = "「テメエ……何モンだ」"

[[dialogue]]
speaker = "レイラ"
# 「私は百目騎レイラ……いえ、こう言いましょう」
line = "「私は百目騎レイラ……いえ、こう言いましょう」"

[[dialogue]]
speaker = "レイラ"
# 「私たちはコラプサー……星の光を喰らう者です」
line = "「私たちはコラプサー……星の光を喰らう者です」"

[[dialogue]]
speaker = "キサナ"
# 「星の、光を……？」
line = "「星の、光を……？」"

[[dialogue]]
speaker = "レイラ"
# 「具体的にはブラックホールを守護星とする星騎士なのですが……」
line = "「具体的にはブラックホールを守護星とする星騎士なのですが……」"

[[dialogue]]
speaker = "キサナ"
# 「星騎士？　テメエ、星騎士なのかよ？」
line = "「星騎士？　テメエ、星騎士なのかよ？」"

[[dialogue]]
speaker = "レイラ"
# 「あなたも、です。あなたもすでに力に目覚めているはずです。だから見付けることができた」
line = "「あなたも、です。あなたもすでに力に目覚めているはずです。だから見付けることができた」"

[[dialogue]]
speaker = "レイラ"
# 「あなたもコラプサーになりませんか？　私たちコラプサーの目的は世界を救うこと。それが叶えば、私たちは『英雄』になります」
line = "「あなたもコラプサーになりませんか？　私たちコラプサーの目的は世界を救うこと。それが叶えば、私たちは『英雄』になります」"

[[dialogue]]
speaker = "キサナ"
# 「英雄だと？　……そんなもんに興味はねえ。アタシはメシが食えればそれでいい」
line = "「英雄だと？　……そんなもんに興味はねえ。アタシはメシが食えればそれでいい」"

[[dialogue]]
speaker = "レイラ"
# 「では約束します。世界を救い、英雄になれば食いっぱぐれたりしないと」
line = "「では約束します。世界を救い、英雄になれば食いっぱぐれたりしないと」"

[[dialogue]]
speaker = "キサナ"
# 「ならいい。嘘だったら、どてっ腹ぶち抜くからな」
line = "「ならいい。嘘だったら、どてっ腹ぶち抜くからな」"

[[dialogue]]
speaker = "キサナ"
# 「……あー、それにしても腹へったな」
line = "「……あー、それにしても腹へったな」"

[[dialogue]]
speaker = "レイラ"
# 「え、チョコバーならあるけど……」
line = "「え、チョコバーならあるけど……」"

[[dialogue]]
speaker = "キサナ"
# 「よこせ。……なんだこりゃ、ドロドロじゃねえか。まあいい、味は……うめぇ！　もっとよこせ！」
line = "「よこせ。……なんだこりゃ、ドロドロじゃねえか。まあいい、味は……うめぇ！　もっとよこせ！」"

[[dialogue]]
speaker = "レイラ"
# 「うぅ……私のチョコバーがぁ……」
line = "「うぅ……私のチョコバーがぁ……」"

[[dialogue]]
speaker = "キサナ"
# 「んなこともあったな……」
line = "「んなこともあったな……」"

[[dialogue]]
speaker = "レイラ"
# 「マフィアが血みどろの抗争してて、めちゃくちゃ怖かった思い出。人探すってレベルじゃねーぞって感じ」
line = "「マフィアが血みどろの抗争してて、めちゃくちゃ怖かった思い出。人探すってレベルじゃねーぞって感じ」"

[[dialogue]]
speaker = "キサナ"
# 「つうかついでに思い出したけどよ、流星市国でメシ抜き現場待機させられたこと、アタシは忘れてねえからな」
line = "「つうかついでに思い出したけどよ、流星市国でメシ抜き現場待機させられたこと、アタシは忘れてねえからな」"

[[dialogue]]
speaker = "レイラ"
# 「え、連絡用に渡してたＤＩＳＣでお買い物できたよ？　足がつかないように対策もしてたし」
line = "「え、連絡用に渡してたＤＩＳＣでお買い物できたよ？　足がつかないように対策もしてたし」"

[[dialogue]]
speaker = "キサナ"
# 「なら使い方もちゃんと説明しとけっつーの！　<ruby=あの変態>ヴァレリー</ruby>が来るまで廃棄弁当漁ってたんだぞこっちは！」
line = "「なら使い方もちゃんと説明しとけっつーの！　<ruby>ヴァレリー<rt>あの変態</rt></ruby>が来るまで廃棄弁当漁ってたんだぞこっちは！」"

[[dialogue]]
speaker = "レイラ"
# 「いだだだ、こめかみグリグリしないで～！　ごめんってば～！」
line = "「いだだだ、こめかみグリグリしないで～！　ごめんってば～！」"
