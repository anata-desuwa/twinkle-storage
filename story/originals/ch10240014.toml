[[dialogue]]
speaker = "unk"
# 第４話,匂いが好きな人,P
line = "第４話,匂いが好きな人,P"

[[dialogue]]
speaker = "unk"
# 休日に買い物へ出掛けていた俺は、ゲリラ豪雨に遭遇した。
line = "休日に買い物へ出掛けていた俺は、ゲリラ豪雨に遭遇した。"

[[dialogue]]
speaker = "unk"
# バッグに折り畳み傘を持っていたので事なきを得て、雨はすぐに止んだのだが──
line = "バッグに折り畳み傘を持っていたので事なきを得て、雨はすぐに止んだのだが──"

[[dialogue]]
speaker = "ヨミ"
# 「あっ、会長。こんにちはです……」
line = "「あっ、会長。こんにちはです……」"

[[dialogue]]
speaker = "unk"
# って、服びっしゃびしゃだけど！？
line = "って、服びっしゃびしゃだけど！？"

[[dialogue]]
speaker = "unk"
# こんにちはヨミヨミ……
line = "こんにちはヨミヨミ……"

[[dialogue]]
speaker = "ヨミ"
# 「買い出しに出ていたんですが、傘を持ってなくて……」
line = "「買い出しに出ていたんですが、傘を持ってなくて……」"

[[dialogue]]
speaker = "ヨミ"
# 「ありがとうございます、会長。タオルだけじゃなく、着替えまで貸して頂いて……」
line = "「ありがとうございます、会長。タオルだけじゃなく、着替えまで貸して頂いて……」"

[[dialogue]]
speaker = "unk"
# 乾燥機でメイド服を乾かし終わり、今はインナーを乾かしている最中だった。ヨミが現在、メイド服の下に何を着ているかというと──
line = "乾燥機でメイド服を乾かし終わり、今はインナーを乾かしている最中だった。ヨミが現在、メイド服の下に何を着ているかというと──"

[[dialogue]]
speaker = "unk"
# 俺のＴシャツなんかで申し訳ない……
line = "俺のＴシャツなんかで申し訳ない……"

[[dialogue]]
speaker = "ヨミ"
# 「いえ、気になさらないで下さい。お母様の服を勝手に使うわけにも行きませんし」
line = "「いえ、気になさらないで下さい。お母様の服を勝手に使うわけにも行きませんし」"

[[dialogue]]
speaker = "ヨミ"
# 「……あっ、お茶ですか？　いえ、ほんとにお構いなく」
line = "「……あっ、お茶ですか？　いえ、ほんとにお構いなく」"

[[dialogue]]
speaker = "ヨミ"
# 「はい、わざわざありがとうございます。…………ん～、くんくん」
line = "「はい、わざわざありがとうございます。…………ん～、くんくん」"

[[dialogue]]
speaker = "unk"
# 熱い緑茶でも淹れようとキッチンに行っている間に、メイド服の襟部分を引っ張って、中の匂いを嗅いでいるヨミの姿が目に入った。
line = "熱い緑茶でも淹れようとキッチンに行っている間に、メイド服の襟部分を引っ張って、中の匂いを嗅いでいるヨミの姿が目に入った。"

[[dialogue]]
speaker = "unk"
# ごめん、やっぱり男臭いかな？
line = "ごめん、やっぱり男臭いかな？"

[[dialogue]]
speaker = "ヨミ"
# 「こやっ！？　い、いえっ、違うんです！」
line = "「こやっ！？　い、いえっ、違うんです！」"

[[dialogue]]
speaker = "ヨミ"
# 「これは、その……」
line = "「これは、その……」"

[[dialogue]]
speaker = "ヨミ"
# 「──Ｔシャツから会長の良い匂いがするので気になっちゃうだけです！」
line = "「──Ｔシャツから会長の良い匂いがするので気になっちゃうだけです！」"

[[dialogue]]
speaker = "ヨミ"
# 「……あ。……こ、こやあぁぁぁっ！？」
line = "「……あ。……こ、こやあぁぁぁっ！？」"

[[dialogue]]
speaker = "ヨミ"
# 「し、失言でした……今のはえっと……その……うぅ……！」
line = "「し、失言でした……今のはえっと……その……うぅ……！」"

[[dialogue]]
speaker = "unk"
# 匂いフェチ……ってやつ？
line = "匂いフェチ……ってやつ？"

[[dialogue]]
speaker = "unk"
# ヨミヨミって前から思ってたけど、
line = "ヨミヨミって前から思ってたけど、"

[[dialogue]]
speaker = "ヨミ"
# 「そ……そうです、その通りですよ！　悪いですか！？」
line = "「そ……そうです、その通りですよ！　悪いですか！？」"

[[dialogue]]
speaker = "ヨミ"
# 「鼻が敏感なので、自分とは違う匂いだと意識しちゃうんですっ」
line = "「鼻が敏感なので、自分とは違う匂いだと意識しちゃうんですっ」"

[[dialogue]]
speaker = "ヨミ"
# 「ふ、服が乾いたみたいなので、着替えて来ます！！」
line = "「ふ、服が乾いたみたいなので、着替えて来ます！！」"

[[dialogue]]
speaker = "ヨミ"
# 「そ、それでは会長、ありがとうございました。服も乾いたので、これでお暇させて頂きますね！」
line = "「そ、それでは会長、ありがとうございました。服も乾いたので、これでお暇させて頂きますね！」"

[[dialogue]]
speaker = "ヨミ"
# 「Ｔシャツの方は洗ってから後日、お返しさせて頂きます」
line = "「Ｔシャツの方は洗ってから後日、お返しさせて頂きます」"

[[dialogue]]
speaker = "unk"
# 別にそのまま、洗濯機に放り込んでくれれば大丈夫だよ？
line = "別にそのまま、洗濯機に放り込んでくれれば大丈夫だよ？"

[[dialogue]]
speaker = "ヨミ"
# 「そういうわけにはいきません。一応その……女子が着たものですから」
line = "「そういうわけにはいきません。一応その……女子が着たものですから」"

[[dialogue]]
speaker = "ヨミ"
# 「あっ！　言っておきますけど、変なことに使ったりとかしませんから！」
line = "「あっ！　言っておきますけど、変なことに使ったりとかしませんから！」"

[[dialogue]]
speaker = "ヨミ"
# 「本当に本当ですよ！？　変な風に誤解しないで下さいね？」
line = "「本当に本当ですよ！？　変な風に誤解しないで下さいね？」"

[[dialogue]]
speaker = "ヨミ"
# 「そんなわけで、本日はお世話になりましたっ」
line = "「そんなわけで、本日はお世話になりましたっ」"

[[dialogue]]
speaker = "unk"
# 匂いフェチがバレたのが未だ恥ずかしいのか、ヨミは足早に帰って行くのだった。
line = "匂いフェチがバレたのが未だ恥ずかしいのか、ヨミは足早に帰って行くのだった。"

[[dialogue]]
speaker = "unk"
# 後日──
line = "後日──"

[[dialogue]]
speaker = "ヨミ"
# 「会長、先日はありがとうございました。Ｔシャツを洗って来ましたので、お返し致しますね」
line = "「会長、先日はありがとうございました。Ｔシャツを洗って来ましたので、お返し致しますね」"

[[dialogue]]
speaker = "ヨミ"
# 「お詫びの菓子折りも持って来たので、後で召し上がって下さい」
line = "「お詫びの菓子折りも持って来たので、後で召し上がって下さい」"

[[dialogue]]
speaker = "unk"
# ……あれ？　このＴシャツ、新品っぽくない？
line = "……あれ？　このＴシャツ、新品っぽくない？"

[[dialogue]]
speaker = "ヨミ"
# 「そ、そんなわけないじゃないですか。アイロンで整えたからですよ」
line = "「そ、そんなわけないじゃないですか。アイロンで整えたからですよ」"

[[dialogue]]
speaker = "ヨミ"
# 「九浄メイド隊のクリーニング術を舐めてはいけません。洗濯は得意なのです！」
line = "「九浄メイド隊のクリーニング術を舐めてはいけません。洗濯は得意なのです！」"

[[dialogue]]
speaker = "unk"
# でも、値札付いてるけど……
line = "でも、値札付いてるけど……"

[[dialogue]]
speaker = "ヨミ"
# 「え」
line = "「え」"

[[dialogue]]
speaker = "ヨミ"
# 「……ち、違うんです。それはですね、実は家に帰ってからちょっとした事故があって、Ｔシャツを破いてしまい……」
line = "「……ち、違うんです。それはですね、実は家に帰ってからちょっとした事故があって、Ｔシャツを破いてしまい……」"

[[dialogue]]
speaker = "ヨミ"
# 「それで……新品でお詫びしようとしたわけで。偽ったのは、あくまで変な誤解を避ける為というか……だからその……」
line = "「それで……新品でお詫びしようとしたわけで。偽ったのは、あくまで変な誤解を避ける為というか……だからその……」"

[[dialogue]]
speaker = "ヨミ"
# 「──こ、これは決して、会長の匂いがするＴシャツが惜しかったとかそんなんじゃありませんからっ！！！」
line = "「──こ、これは決して、会長の匂いがするＴシャツが惜しかったとかそんなんじゃありませんからっ！！！」"

[[dialogue]]
speaker = "ヨミ"
# 「……あ」
line = "「……あ」"

[[dialogue]]
speaker = "ヨミ"
# 「こ……こやあああああぁぁぁ──っ！！！」
line = "「こ……こやあああああぁぁぁ──っ！！！」"

[[dialogue]]
speaker = "unk"
# その場に１人残された俺は──
line = "その場に１人残された俺は──"

[[dialogue]]
speaker = "unk"
# 今度からヨミと、どんな顔して会えばいいんだ……
line = "今度からヨミと、どんな顔して会えばいいんだ……"

[[dialogue]]
speaker = "unk"
# こんなことで急にヨミの異性を感じてしまい、熱くなった頬を両手で押さえるのだった。
line = "こんなことで急にヨミの異性を感じてしまい、熱くなった頬を両手で押さえるのだった。"
