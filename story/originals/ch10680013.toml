[[dialogue]]
speaker = "unk"
# 第３話,ご対面！　守護天使さま！,P
line = "第３話,ご対面！　守護天使さま！,P"

[[dialogue]]
speaker = "リア"
# 「えへへ、楽しかった～。付き合ってくれてありがとう、会長さん♪　実はこっちの世界に来てからずっと気になってたの」
line = "「えへへ、楽しかった～。付き合ってくれてありがとう、会長さん♪　実はこっちの世界に来てからずっと気になってたの」"

[[dialogue]]
speaker = "リア"
# 「ぶいあーるだっけ？　すごいね、未来の世界は。あの機器を身につけるだけで、深海を自由に歩き回ったり、宇宙を飛び回ったりできるんだもん」
line = "「ぶいあーるだっけ？　すごいね、未来の世界は。あの機器を身につけるだけで、深海を自由に歩き回ったり、宇宙を飛び回ったりできるんだもん」"

[[dialogue]]
speaker = "unk"
# ご一緒できて俺も楽しかったです
line = "ご一緒できて俺も楽しかったです"

[[dialogue]]
speaker = "リア"
# 「あ、もう！　なにニヤニヤしてるの？　もしかしなくても、あのこと思い出しちゃってるよねっ？」
line = "「あ、もう！　なにニヤニヤしてるの？　もしかしなくても、あのこと思い出しちゃってるよねっ？」"

[[dialogue]]
speaker = "リア"
# 「きゃああっ～！？　オ、オバケっ！！　オバケが追いかけてくるっ！！　どこにいるの会長さん！？　一人じゃこんなの無理～！！」
line = "「きゃああっ～！？　オ、オバケっ！！　オバケが追いかけてくるっ！！　どこにいるの会長さん！？　一人じゃこんなの無理～！！」"

[[dialogue]]
speaker = "リア"
# 「む～。私、忘れないからね？　会長さんにいじわるされたこと。先輩を騙して真夜中の廃病院に一人きりにするなんてぜーったいにいけないんだからー！」
line = "「む～。私、忘れないからね？　会長さんにいじわるされたこと。先輩を騙して真夜中の廃病院に一人きりにするなんてぜーったいにいけないんだからー！」"

[[dialogue]]
speaker = "unk"
# リア先輩が一人でも怖くないって言ったから……
line = "リア先輩が一人でも怖くないって言ったから……"

[[dialogue]]
speaker = "リア"
# 「べ、別に怖くはなかったよっ？　ちょっぴりビックリしちゃっただけで。私は肝試しで怖がるようなヤワな先輩ではありませんから。えっへん！」
line = "「べ、別に怖くはなかったよっ？　ちょっぴりビックリしちゃっただけで。私は肝試しで怖がるようなヤワな先輩ではありませんから。えっへん！」"

[[dialogue]]
speaker = "unk"
# あ、野生のオバケが
line = "あ、野生のオバケが"

[[dialogue]]
speaker = "リア"
# 「きゃああーっ！？　どこどこ！？　どこにいるの！？　捕まったら今度こそ呪われちゃう！！」
line = "「きゃああーっ！？　どこどこ！？　どこにいるの！？　捕まったら今度こそ呪われちゃう！！」"

[[dialogue]]
speaker = "リア"
# 「って、もおーーっ！　会長さんのバカバカバカ！　また先輩のことからかって！　そーいうことしちゃダメだゾ！　いじわるが過ぎると女の子に嫌われちゃうんだから！」
line = "「って、もおーーっ！　会長さんのバカバカバカ！　また先輩のことからかって！　そーいうことしちゃダメだゾ！　いじわるが過ぎると女の子に嫌われちゃうんだから！」"

[[dialogue]]
speaker = "unk"
# あはは、すみません
line = "あはは、すみません"

[[dialogue]]
speaker = "リア"
# 「む～、全然反省しているように見えない。これは元の世界に戻る前に、ちゃんと指導をしておかないと──」
line = "「む～、全然反省しているように見えない。これは元の世界に戻る前に、ちゃんと指導をしておかないと──」"

[[dialogue]]
speaker = "アルモタヘル"
# 「そこの少女よ。このティッシュを受け取れ。ひとつと言わず箱ごと持っていくのだ」
line = "「そこの少女よ。このティッシュを受け取れ。ひとつと言わず箱ごと持っていくのだ」"

[[dialogue]]
speaker = "リア"
# 「えっ？　ティッシュ？　箱ごと？」
line = "「えっ？　ティッシュ？　箱ごと？」"

[[dialogue]]
speaker = "マグダレナ"
# 「ですからアルモタヘル。そのように強引に迫っては誰にも受け取っては──って、あら？　リアさまと会長さまではありませんか」
line = "「ですからアルモタヘル。そのように強引に迫っては誰にも受け取っては──って、あら？　リアさまと会長さまではありませんか」"

[[dialogue]]
speaker = "リア"
# 「マグダレナさま？　ええと守護天使さまがこんな街中で一体何を……？」
line = "「マグダレナさま？　ええと守護天使さまがこんな街中で一体何を……？」"

[[dialogue]]
speaker = "マグダレナ"
# 「アルバイトです。といっても私はアルモタヘルのお手伝いをしているだけですが」
line = "「アルバイトです。といっても私はアルモタヘルのお手伝いをしているだけですが」"

[[dialogue]]
speaker = "リア"
# 「バ、バイト！？　守護天使さまが！？　それにこの気配……。もしかして、そちらの方も……」
line = "「バ、バイト！？　守護天使さまが！？　それにこの気配……。もしかして、そちらの方も……」"

[[dialogue]]
speaker = "アルモタヘル"
# 「む……そのロザリオから気配を感じる。我らとは似て非なるもののようだが」
line = "「む……そのロザリオから気配を感じる。我らとは似て非なるもののようだが」"

[[dialogue]]
speaker = "マグダレナ"
# 「紹介しますね。この方は──」
line = "「紹介しますね。この方は──」"

[[dialogue]]
speaker = "アルモタヘル"
# 「なるほど。そういえば数日前にもマグダレナが話していたな。守護天使の力を頼りに戦うクルセイダースなる者が平行世界から訪れていると」
line = "「なるほど。そういえば数日前にもマグダレナが話していたな。守護天使の力を頼りに戦うクルセイダースなる者が平行世界から訪れていると」"

[[dialogue]]
speaker = "マグダレナ"
# 「元の世界にお送りするのが遅くなってしまい申し訳ありません。中々あちらの世界とのリンクが重ならないものでして」
line = "「元の世界にお送りするのが遅くなってしまい申し訳ありません。中々あちらの世界とのリンクが重ならないものでして」"

[[dialogue]]
speaker = "リア"
# 「い、いえ。みんなと遊んだり、観光をしたり色々と楽しんでいますから。それよりも守護天使さまがアルバイトなんて……」
line = "「い、いえ。みんなと遊んだり、観光をしたり色々と楽しんでいますから。それよりも守護天使さまがアルバイトなんて……」"

[[dialogue]]
speaker = "アルモタヘル"
# 「何かおかしいか？　労働を対価に金銭を得るというのがこの世界の決まりだろう？　それともお前の世界では労せずともケバブが出てくるのか？」
line = "「何かおかしいか？　労働を対価に金銭を得るというのがこの世界の決まりだろう？　それともお前の世界では労せずともケバブが出てくるのか？」"

[[dialogue]]
speaker = "リア"
# 「そ、そんなことは。みんな働いてお金を稼いでいますけど……」
line = "「そ、そんなことは。みんな働いてお金を稼いでいますけど……」"

[[dialogue]]
speaker = "アルモタヘル"
# 「であれば何も不思議なことはないはずだ。さて、次はこのオーバーイーツとやらに応募してみるか。歩合制の出前配達らしいが……」
line = "「であれば何も不思議なことはないはずだ。さて、次はこのオーバーイーツとやらに応募してみるか。歩合制の出前配達らしいが……」"

[[dialogue]]
speaker = "マグダレナ"
# 「出前の配達はやめておいた方がいいのでは？　いつかのように空腹を刺激されて倒れてしまいそうですし。この引っ越しバイトはどうでしょう？　バイト代も高くて──」
line = "「出前の配達はやめておいた方がいいのでは？　いつかのように空腹を刺激されて倒れてしまいそうですし。この引っ越しバイトはどうでしょう？　バイト代も高くて──」"

[[dialogue]]
speaker = "リア"
# 「しゅ、守護天使さまがまるで金欠続きで困窮しきっている学生のような会話を……」
line = "「しゅ、守護天使さまがまるで金欠続きで困窮しきっている学生のような会話を……」"

[[dialogue]]
speaker = "アルモタヘル"
# 「ぬ！　あれを見ろ、マグダレナ！　ケバブ屋が割り引きクーポンを配っているぞ！　皆でもらいにいけば都合４枚手に入れることができる！」
line = "「ぬ！　あれを見ろ、マグダレナ！　ケバブ屋が割り引きクーポンを配っているぞ！　皆でもらいにいけば都合４枚手に入れることができる！」"

[[dialogue]]
speaker = "リア"
# 「ああっ、そんなセコイことまで……！！　守護天使さまのイメージが崩れちゃうぅ……！！」
line = "「ああっ、そんなセコイことまで……！！　守護天使さまのイメージが崩れちゃうぅ……！！」"

[[dialogue]]
speaker = "リア"
# 「て、手伝います。私にもティッシュを配らせてください……！」
line = "「て、手伝います。私にもティッシュを配らせてください……！」"

[[dialogue]]
speaker = "アルモタヘル"
# 「ふむ？　手伝いたいというのなら我は大歓迎だが。何故お前はそんなにも悲しいものを見る目をしている？」
line = "「ふむ？　手伝いたいというのなら我は大歓迎だが。何故お前はそんなにも悲しいものを見る目をしている？」"

[[dialogue]]
speaker = "マグダレナ"
# 「はて……何か心苦しいものでも目撃してしまったのでしょうか……？」
line = "「はて……何か心苦しいものでも目撃してしまったのでしょうか……？」"

[[dialogue]]
speaker = "アルモタヘル"
# 「うむ、今日は大量にティッシュをさばけたな。箱のおかわりまでしたのは初めてだったぞ。お前のおかげだ」
line = "「うむ、今日は大量にティッシュをさばけたな。箱のおかわりまでしたのは初めてだったぞ。お前のおかげだ」"

[[dialogue]]
speaker = "マグダレナ"
# 「ええ、本当に。アルモタヘルもリアさまのように、笑顔で優しくティッシュを差し出すことを覚えないとですね」
line = "「ええ、本当に。アルモタヘルもリアさまのように、笑顔で優しくティッシュを差し出すことを覚えないとですね」"

[[dialogue]]
speaker = "リア"
# 「あ、あはは……。お役に立てたのであれば良かったです……」
line = "「あ、あはは……。お役に立てたのであれば良かったです……」"

[[dialogue]]
speaker = "アルモタヘル"
# 「クルセイダース、か。お前のような者が戦っているのであれば平行世界は安心だろう」
line = "「クルセイダース、か。お前のような者が戦っているのであれば平行世界は安心だろう」"

[[dialogue]]
speaker = "リア"
# 「え？　どういうことですか？」
line = "「え？　どういうことですか？」"

[[dialogue]]
speaker = "アルモタヘル"
# 「お前からは清き心と揺るがぬ信念を感じる。強大なリクリエの力に負けず、乗り越えていける強い心の持ち主だ」
line = "「お前からは清き心と揺るがぬ信念を感じる。強大なリクリエの力に負けず、乗り越えていける強い心の持ち主だ」"

[[dialogue]]
speaker = "マグダレナ"
# 「ふふ、私も同感です。平行世界の守護天使も、きっとリアさまに力を貸せることを誇らしく思っていることでしょう」
line = "「ふふ、私も同感です。平行世界の守護天使も、きっとリアさまに力を貸せることを誇らしく思っていることでしょう」"

[[dialogue]]
speaker = "リア"
# 「アルモタヘルさま……。マグダレナさま……」
line = "「アルモタヘルさま……。マグダレナさま……」"

[[dialogue]]
speaker = "アルモタヘル"
# 「自信を持って己が世界を救済するといい。お前になら必ずできる。これは我からの餞別と激励だ」
line = "「自信を持って己が世界を救済するといい。お前になら必ずできる。これは我からの餞別と激励だ」"

[[dialogue]]
speaker = "リア"
# 「あんなに大切にされていたケバブ屋さんのクーポン……」
line = "「あんなに大切にされていたケバブ屋さんのクーポン……」"

[[dialogue]]
speaker = "マグダレナ"
# 「リアさま方の未来に大いなる幸のあらんことを。たとえ異なる世界に属していても、守護天使としてクルセイダースの無事と勝利を心から願っていますよ」
line = "「リアさま方の未来に大いなる幸のあらんことを。たとえ異なる世界に属していても、守護天使としてクルセイダースの無事と勝利を心から願っていますよ」"

[[dialogue]]
speaker = "アルモタヘル"
# 「ケバブ屋では我の名を出すといい。ケバブの肉の量くらいはサービスしてもらえるはずだ」
line = "「ケバブ屋では我の名を出すといい。ケバブの肉の量くらいはサービスしてもらえるはずだ」"

[[dialogue]]
speaker = "unk"
# 行っちゃいましたね
line = "行っちゃいましたね"

[[dialogue]]
speaker = "リア"
# 「ふふ。やっぱり守護天使さまは守護天使さまだったよ。思った通りの方々だった」
line = "「ふふ。やっぱり守護天使さまは守護天使さまだったよ。思った通りの方々だった」"

[[dialogue]]
speaker = "リア"
# 「私も気を引き締め直さなくっちゃ！　２人の守護天使さまに恥じないように、流星クルセイダースとして私たちの世界を必ず守ってみせるよ！」
line = "「私も気を引き締め直さなくっちゃ！　２人の守護天使さまに恥じないように、流星クルセイダースとして私たちの世界を必ず守ってみせるよ！」"

[[dialogue]]
speaker = "リア"
# 「さぁケバブ屋さんに行こう、会長さん！　お肉のたっぷり入ったケバブを食べて、精進しなくちゃね！」
line = "「さぁケバブ屋さんに行こう、会長さん！　お肉のたっぷり入ったケバブを食べて、精進しなくちゃね！」"
