[[dialogue]]
speaker = "unk"
# 第１話,九浄家メイド隊のクエスト受付嬢,P
line = "第１話,九浄家メイド隊のクエスト受付嬢,P"

[[dialogue]]
speaker = "unk"
# ヴィーナスと昼食を取りにカフェテリアへやって来ていた、ある日のこと──
line = "ヴィーナスと昼食を取りにカフェテリアへやって来ていた、ある日のこと──"

[[dialogue]]
speaker = "ヨミ"
# 「ヴィーナスお嬢様、ご歓談のところ失礼致します」
line = "「ヴィーナスお嬢様、ご歓談のところ失礼致します」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あら、どうしたの？　あなたも昼食？」
line = "「あら、どうしたの？　あなたも昼食？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうだ！　私たちもこれからだから、一緒に食べない？　……って、それ私のお財布？」
line = "「そうだ！　私たちもこれからだから、一緒に食べない？　……って、それ私のお財布？」"

[[dialogue]]
speaker = "ヨミ"
# 「朝、お屋敷の玄関にお忘れでしたよ。おそらくポケットから滑り落ちたんじゃないかと」
line = "「朝、お屋敷の玄関にお忘れでしたよ。おそらくポケットから滑り落ちたんじゃないかと」"

[[dialogue]]
speaker = "ヴィーナス"
# 「本当だわ、いつもポケットに入れてるから気付かなかった！　ありがとう、ヨミヨミ～♪」
line = "「本当だわ、いつもポケットに入れてるから気付かなかった！　ありがとう、ヨミヨミ～♪」"

[[dialogue]]
speaker = "ヨミ"
# 「わぁっ……くんくん、お嬢様良い匂い♪　……って、そうじゃなくて！」
line = "「わぁっ……くんくん、お嬢様良い匂い♪　……って、そうじゃなくて！」"

[[dialogue]]
speaker = "ヨミ"
# 「公の場で抱き付かないで下さい、あとヨミヨミって呼ぶのも止めて下さいっ。恥ずかしいですから！」
line = "「公の場で抱き付かないで下さい、あとヨミヨミって呼ぶのも止めて下さいっ。恥ずかしいですから！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「え～？　ヨミヨミ可愛いのに～」
line = "「え～？　ヨミヨミ可愛いのに～」"

[[dialogue]]
speaker = "ヨミ"
# 「会長さんも居るんですから、九浄家のメイドとしての体裁があるんですっ。お嬢様もちゃんと令嬢らしく振る舞って下さいっ」
line = "「会長さんも居るんですから、九浄家のメイドとしての体裁があるんですっ。お嬢様もちゃんと令嬢らしく振る舞って下さいっ」"

[[dialogue]]
speaker = "unk"
# 君は確か、いつも任務の受付をしてくれている……
line = "君は確か、いつも任務の受付をしてくれている……"

[[dialogue]]
speaker = "ヴィーナス"
# 「ああ！　そういえばまだ、ちゃんと紹介したことがなかったわね」
line = "「ああ！　そういえばまだ、ちゃんと紹介したことがなかったわね」"

[[dialogue]]
speaker = "ヨミ"
# 「改めて初めまして、会長。新星学園１年の天ヶ崎ヨミと申します。クエスト受付の際は、いつもお世話になっております」
line = "「改めて初めまして、会長。新星学園１年の天ヶ崎ヨミと申します。クエスト受付の際は、いつもお世話になっております」"

[[dialogue]]
speaker = "ヨミ"
# 「私、ヴィーナスお嬢様の九浄家でお世話になっておりまして、九浄家メイド隊の一員として働かせてもらっております」
line = "「私、ヴィーナスお嬢様の九浄家でお世話になっておりまして、九浄家メイド隊の一員として働かせてもらっております」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ヨミヨミは今年からうちのメイド隊に入った期待の新人なの！　何事も真面目で、コミュ力も高くて、優秀なんだから！」
line = "「ヨミヨミは今年からうちのメイド隊に入った期待の新人なの！　何事も真面目で、コミュ力も高くて、優秀なんだから！」"

[[dialogue]]
speaker = "unk"
# とても個性的な雰囲気、あるよね……
line = "とても個性的な雰囲気、あるよね……"

[[dialogue]]
speaker = "unk"
# 九浄家メイド隊って何かその……
line = "九浄家メイド隊って何かその……"

[[dialogue]]
speaker = "ヴィーナス"
# 「ああ、カタギじゃなさそうな、やべー雰囲気ってこと？」
line = "「ああ、カタギじゃなさそうな、やべー雰囲気ってこと？」"

[[dialogue]]
speaker = "ヨミ"
# 「お嬢様！？」
line = "「お嬢様！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「九浄家が、ギャンブル施設の管理とか、お祭りやイベントの開催、ボディーガードの人材派遣とかを事業としてやってるのよね」
line = "「九浄家が、ギャンブル施設の管理とか、お祭りやイベントの開催、ボディーガードの人材派遣とかを事業としてやってるのよね」"

[[dialogue]]
speaker = "ヨミ"
# 「そうです！　九浄家は決して、反社会的な商売は行っておりませんっ！」
line = "「そうです！　九浄家は決して、反社会的な商売は行っておりませんっ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「まあ、スーツを着た強面の男共がよく家に出入りしていることもあって、実際よく間違われるんだけどね」
line = "「まあ、スーツを着た強面の男共がよく家に出入りしていることもあって、実際よく間違われるんだけどね」"

[[dialogue]]
speaker = "ヨミ"
# 「こやあぁぁぁんっ！？」
line = "「こやあぁぁぁんっ！？」"

[[dialogue]]
speaker = "ヨミ"
# 「お嬢様！　そんなこと言ってはダメですっ！　ご当主様が悲しみます！」
line = "「お嬢様！　そんなこと言ってはダメですっ！　ご当主様が悲しみます！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あの人がそんなタマなわけないでしょ。……とにかくそんな家だから、メイド隊もその雰囲気に染まっちゃってるのよね」
line = "「あの人がそんなタマなわけないでしょ。……とにかくそんな家だから、メイド隊もその雰囲気に染まっちゃってるのよね」"

[[dialogue]]
speaker = "ヨミ"
# 「その……ですね？　九浄家メイド隊は、ご当主様が星見家メイド隊に対抗して作った組織なんです……それでちょっと星見家の反対をいっているというか……」
line = "「その……ですね？　九浄家メイド隊は、ご当主様が星見家メイド隊に対抗して作った組織なんです……それでちょっと星見家の反対をいっているというか……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「というより、あの人がメイド好きで、星見家が羨ましい、うちにも可愛いメイドが欲しい！　って嫉妬した結果らしいわよ。要するに趣味ね！」
line = "「というより、あの人がメイド好きで、星見家が羨ましい、うちにも可愛いメイドが欲しい！　って嫉妬した結果らしいわよ。要するに趣味ね！」"

[[dialogue]]
speaker = "ヨミ"
# 「こやっ！？　それ私、いま初めて知ったんですが！？　対抗してって、そういうことなんですか！？」
line = "「こやっ！？　それ私、いま初めて知ったんですが！？　対抗してって、そういうことなんですか！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「メイド隊はお屋敷の仕事はもちろんだけど、学園運営の手伝いをしてくれているの。ヨミヨミの場合は、この大聖堂カフェテリアで任務管轄係をやってくれているわ」
line = "「メイド隊はお屋敷の仕事はもちろんだけど、学園運営の手伝いをしてくれているの。ヨミヨミの場合は、この大聖堂カフェテリアで任務管轄係をやってくれているわ」"

[[dialogue]]
speaker = "ヨミ"
# 「ええと……いわゆる『クエスト受付嬢』ですね。会長もご存知かと思いますが、任務関係の案内役を承らせてもらっています」
line = "「ええと……いわゆる『クエスト受付嬢』ですね。会長もご存知かと思いますが、任務関係の案内役を承らせてもらっています」"

[[dialogue]]
speaker = "unk"
# 正式名称は『任務管轄係』だったのか
line = "正式名称は『任務管轄係』だったのか"

[[dialogue]]
speaker = "ヨミ"
# 「く、クエスト受付嬢ですっ。そんな名前は知りませんっ」
line = "「く、クエスト受付嬢ですっ。そんな名前は知りませんっ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ぷぷっ……ヨミヨミったら、任務管轄係って名称が嫌いらしいのよ。略すと『ニンカツ係』でエッチ過ぎるからって……！」
line = "「ぷぷっ……ヨミヨミったら、任務管轄係って名称が嫌いらしいのよ。略すと『ニンカツ係』でエッチ過ぎるからって……！」"

[[dialogue]]
speaker = "ヨミ"
# 「こやぁあああっ！？　お嬢様、それは誰にも言わないって約束したじゃないですかっ！」
line = "「こやぁあああっ！？　お嬢様、それは誰にも言わないって約束したじゃないですかっ！」"

[[dialogue]]
speaker = "ヨミ"
# 「もうバカバカバカ！　お嬢様のバカ！　爆裂恥ずかしいでしょうっ！？」
line = "「もうバカバカバカ！　お嬢様のバカ！　爆裂恥ずかしいでしょうっ！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あははははっ！　ごめん！　ごめんって！　私が悪かったから叩かないでヨミヨミ！」
line = "「あははははっ！　ごめん！　ごめんって！　私が悪かったから叩かないでヨミヨミ！」"

[[dialogue]]
speaker = "ヨミ"
# 「か、会長、違うんです！　私はそこまで任務管轄係の名称がいやらしいとか、思ってませんから！」
line = "「か、会長、違うんです！　私はそこまで任務管轄係の名称がいやらしいとか、思ってませんから！」"

[[dialogue]]
speaker = "ヨミ"
# 「ただ、お嬢様みたいに略して茶化す人が居ると嫌だなって……だったらクエスト受付嬢の方が。しっくり来ますよねって話であって……」
line = "「ただ、お嬢様みたいに略して茶化す人が居ると嫌だなって……だったらクエスト受付嬢の方が。しっくり来ますよねって話であって……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「いや、そもそもニンカツ係って略さなくない？」
line = "「いや、そもそもニンカツ係って略さなくない？」"

[[dialogue]]
speaker = "ヨミ"
# 「え」
line = "「え」"

[[dialogue]]
speaker = "ヴィーナス"
# 「任務係でいいでしょ。そっちの方が短いし」
line = "「任務係でいいでしょ。そっちの方が短いし」"

[[dialogue]]
speaker = "ヨミ"
# 「こ……こやぁあああ──っ！！！」
line = "「こ……こやぁあああ──っ！！！」"

[[dialogue]]
speaker = "ヨミ"
# 「なんでもっと早くそれを教えてくれないんですか、バカバカバカ、お嬢様のばかぁぁぁっ！」
line = "「なんでもっと早くそれを教えてくれないんですか、バカバカバカ、お嬢様のばかぁぁぁっ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あはははははっ！　だってヨミヨミが可愛いからっ……んふふっ、あはははははっ！！！」
line = "「あはははははっ！　だってヨミヨミが可愛いからっ……んふふっ、あはははははっ！！！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ひーっ、ふひーっ……と、とりあえず、ヨミヨミはこんな感じで、凄く面白くて可愛い子なの！　仲良くしてあげてねっ」
line = "「ひーっ、ふひーっ……と、とりあえず、ヨミヨミはこんな感じで、凄く面白くて可愛い子なの！　仲良くしてあげてねっ」"

[[dialogue]]
speaker = "ヨミ"
# 「お嬢様、爆裂笑い過ぎです！　うぅ……会長にこんな、挨拶したばっかりで恥ずかしいところを見られてしまうなんて……」
line = "「お嬢様、爆裂笑い過ぎです！　うぅ……会長にこんな、挨拶したばっかりで恥ずかしいところを見られてしまうなんて……」"

[[dialogue]]
speaker = "unk"
# これからよろしく頼むよ、ヨミヨミ！
line = "これからよろしく頼むよ、ヨミヨミ！"

[[dialogue]]
speaker = "ヨミ"
# 「は、はい。とりあえず、こちらこそよろしくお願いします……って──」
line = "「は、はい。とりあえず、こちらこそよろしくお願いします……って──」"

[[dialogue]]
speaker = "ヨミ"
# 「会長に、ヨミヨミ呼びが感染してるじゃないですかぁぁぁっ！　お嬢様のバカバカバカ、ばかぁぁぁ──っ！！！」
line = "「会長に、ヨミヨミ呼びが感染してるじゃないですかぁぁぁっ！　お嬢様のバカバカバカ、ばかぁぁぁ──っ！！！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええっ！？　それは私、関係なくない！？」
line = "「ええっ！？　それは私、関係なくない！？」"

[[dialogue]]
speaker = "unk"
# 快晴の青空に、ヨミヨミの可愛い叫び声が木霊するのであった。
line = "快晴の青空に、ヨミヨミの可愛い叫び声が木霊するのであった。"
