speaker = "クロト"
# 「ああっ──俺ももう出るっ。メルエルっ！！」
line = "「ああっ──俺ももう出るっ。メルエルっ！！」"

[[dialogue]]
speaker = "メルエル"
# 「ああ、あぁ、ああっ、あぁ、あぁあっ<emoji=heart04>　ふあぁああぁ～～～っ<emoji=heart04><emoji=heart04>　イクイクイクイクイクぅ～<emoji=heart04><emoji=heart04><emoji=heart04>」
line = "「ああ、あぁ、ああっ、あぁ、あぁあっ<emoji=heart04>　ふあぁああぁ～～～っ<emoji=heart04><emoji=heart04>　イクイクイクイクイクぅ～<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
# 「メルエルっ、孕めっ！！！」
line = "「メルエルっ、孕めっ！！！」"

[[dialogue]]
speaker = "メルエル"
# 「んああぁあっ、ふああああぁぁ～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」
line = "「んああぁあっ、ふああああぁぁ～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
# 「イックうぅぅぅぅーーーーーっ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>　ふわぁあああぁああぁあああ～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」
line = "「イックうぅぅぅぅーーーーーっ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>　ふわぁあああぁああぁあああ～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
# 「あぁああっ<emoji=heart04><emoji=heart04>　ふわあああぁあぁぁ～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>　おま○この中、たくさん出してもらえてるよぉ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」
line = "「あぁああっ<emoji=heart04><emoji=heart04>　ふわあああぁあぁぁ～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>　おま○この中、たくさん出してもらえてるよぉ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
# 「あああっ<emoji=heart04>　またイっちゃぅぅっ<emoji=heart04>　イクイクっ<emoji=heart04>　んああぁあぁ～～っ<emoji=heart04><emoji=heart04>」
line = "「あああっ<emoji=heart04>　またイっちゃぅぅっ<emoji=heart04>　イクイクっ<emoji=heart04>　んああぁあぁ～～っ<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
# 「あぁあっ<emoji=heart04>　子宮の奥っ、熱い精液、どくどく感じちゃってるぅぅ～～っ<emoji=heart04><emoji=heart04>」
line = "「あぁあっ<emoji=heart04>　子宮の奥っ、熱い精液、どくどく感じちゃってるぅぅ～～っ<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
# 「ふああぁあっ<emoji=heart04><emoji=heart04>　受精イキ、しちゃってるよぉ<emoji=heart04><emoji=heart04>　精子に卵子キスされちゃうのっ、気持ちいいのぉ～～っ<emoji=heart04><emoji=heart04>」
line = "「ふああぁあっ<emoji=heart04><emoji=heart04>　受精イキ、しちゃってるよぉ<emoji=heart04><emoji=heart04>　精子に卵子キスされちゃうのっ、気持ちいいのぉ～～っ<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
# 「あんっ<emoji=heart04>　はふぅぅう……<emoji=heart04>　んんぅ<emoji=heart04>」
line = "「あんっ<emoji=heart04>　はふぅぅう……<emoji=heart04>　んんぅ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# なんだか、いつも以上に深いイキ方をしてしまった気がする……頭の奥が多幸感の余韻で、まだ甘くしびれていた。
line = "なんだか、いつも以上に深いイキ方をしてしまった気がする……頭の奥が多幸感の余韻で、まだ甘くしびれていた。"

[[dialogue]]
speaker = "メルエル"
# 「えへへっ<emoji=heart04>　会長くん、私の排卵おま○こ、どうだった……？<emoji=heart04>　ちゃんとキミのこと、気持ちよくできてたかなぁ<emoji=heart04>」
line = "「えへへっ<emoji=heart04>　会長くん、私の排卵おま○こ、どうだった……？<emoji=heart04>　ちゃんとキミのこと、気持ちよくできてたかなぁ<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
# 「めちゃくちゃ気持ちよかった……１回じゃ、満足できないくらい」
line = "「めちゃくちゃ気持ちよかった……１回じゃ、満足できないくらい」"

[[dialogue]]
speaker = "メルエル"
# 「……！　わあぁっ<emoji=heart04>　会長くんのおち○ちん、あんなにたくさん出してくれたのに、もうカチカチだぁ<emoji=heart04>」
line = "「……！　わあぁっ<emoji=heart04>　会長くんのおち○ちん、あんなにたくさん出してくれたのに、もうカチカチだぁ<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
# 「まあ……１回で満足できないのなんて、今日に限ったことじゃないんだけど」
line = "「まあ……１回で満足できないのなんて、今日に限ったことじゃないんだけど」"

[[dialogue]]
speaker = "メルエル"
# 「えへへへへへっ<emoji=heart04>　はあぁ……っ<emoji=heart04>　私で興奮してくれるの、すっごく嬉しいっ<emoji=heart04>」
line = "「えへへへへへっ<emoji=heart04>　はあぁ……っ<emoji=heart04>　私で興奮してくれるの、すっごく嬉しいっ<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
# 「あの、ねっ<emoji=heart04>　会長くんの赤ちゃん、今日は絶対、孕める気がするんだぁ<emoji=heart04><emoji=heart04>」
line = "「あの、ねっ<emoji=heart04>　会長くんの赤ちゃん、今日は絶対、孕める気がするんだぁ<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
# 「でもね……絶対ぜぇたいっ<emoji=heart04>　１日でも早く、会長くんの赤ちゃんを孕ませて、ほしいからっ<emoji=heart04>」
line = "「でもね……絶対ぜぇたいっ<emoji=heart04>　１日でも早く、会長くんの赤ちゃんを孕ませて、ほしいからっ<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
# 「今日もたくさん、私に中出しして、赤ちゃん作らせてくださいっ<emoji=heart04>」
line = "「今日もたくさん、私に中出しして、赤ちゃん作らせてくださいっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 私がそう懇願すると、会長くんは嬉しそうに微笑んで、キスをしてくれるのだった──
line = "私がそう懇願すると、会長くんは嬉しそうに微笑んで、キスをしてくれるのだった──"
