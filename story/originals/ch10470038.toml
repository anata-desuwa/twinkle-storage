[[dialogue]]
speaker = "メルエル"
# 「あぁああぁぁあああっ<emoji=heart04><emoji=heart04>　おっきいのくるっ<emoji=heart04>　一緒に、会長くんも一緒にぃ<emoji=heart04>　あっ、ああ、あ、あああっ<emoji=heart04>」
