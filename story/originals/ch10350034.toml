[[dialogue]]
speaker = "unk"
# 第４話,きれいなおめめ,P
line = "第４話,きれいなおめめ,P"

[[dialogue]]
speaker = "セナリィ"
# 「バンデット・セナリィ推参ですわ──何でも人手が足りないそうですわね？」
line = "「バンデット・セナリィ推参ですわ──何でも人手が足りないそうですわね？」"

[[dialogue]]
speaker = "セナリィ"
# 「それで依頼内容は？　報酬さえ弾んでいただければ、どんな悪でもこなしますわよ」
line = "「それで依頼内容は？　報酬さえ弾んでいただければ、どんな悪でもこなしますわよ」"

[[dialogue]]
speaker = "セナリィ"
# 「……仕事はカフェテリアで行うのですか？　あら……珍しい。ではご一緒に参りましょう」
line = "「……仕事はカフェテリアで行うのですか？　あら……珍しい。ではご一緒に参りましょう」"

[[dialogue]]
speaker = "シャロン"
# 「ありがとうございます！　今日の子ども会、ハサミやカッターで工作を楽しむ交流会でして……少しでも大人の目が欲しかったので助かります！」
line = "「ありがとうございます！　今日の子ども会、ハサミやカッターで工作を楽しむ交流会でして……少しでも大人の目が欲しかったので助かります！」"

[[dialogue]]
speaker = "セナリィ"
# 「子ども会！？　工作！？　聞いてませんわよ！？」
line = "「子ども会！？　工作！？　聞いてませんわよ！？」"

[[dialogue]]
speaker = "シャロン"
# 「は～い、注目してください！　こちら、みなさんのお手伝いをしてくださる星騎士さまですよー！」
line = "「は～い、注目してください！　こちら、みなさんのお手伝いをしてくださる星騎士さまですよー！」"

[[dialogue]]
speaker = "シャロン"
# 「お名前は──えっと、すみません。セナリィさまの苗字、そう言えばお聞きしたことが無かったですね……」
line = "「お名前は──えっと、すみません。セナリィさまの苗字、そう言えばお聞きしたことが無かったですね……」"

[[dialogue]]
speaker = "セナリィ"
# 「……私に苗字はありませんわ。というかこんな仕事は私の出る幕では──」
line = "「……私に苗字はありませんわ。というかこんな仕事は私の出る幕では──」"

[[dialogue]]
speaker = "unk"
# バンデット・セナリィさんだ！！
line = "バンデット・セナリィさんだ！！"

[[dialogue]]
speaker = "unk"
# みんな、このお姉さんの名前は──
line = "みんな、このお姉さんの名前は──"

[[dialogue]]
speaker = "女の子"
# 「ばんでっと……！？」
line = "「ばんでっと……！？」"

[[dialogue]]
speaker = "男の子"
# 「か、かっけぇ～！！」
line = "「か、かっけぇ～！！」"

[[dialogue]]
speaker = "セナリィ"
# 「普通にセナリィでよろしいでしょう！？　何で二つ名を教えてますの！？」
line = "「普通にセナリィでよろしいでしょう！？　何で二つ名を教えてますの！？」"

[[dialogue]]
speaker = "シャロン"
# 「ふふ♪　早速、子どもたちに大人気ですね。セナリィさま！」
line = "「ふふ♪　早速、子どもたちに大人気ですね。セナリィさま！」"

[[dialogue]]
speaker = "セナリィ"
# 「嬉しくねえですわよ～！？」
line = "「嬉しくねえですわよ～！？」"

[[dialogue]]
speaker = "セナリィ"
# 「会長様、マジですの？　マジで私に、こんなガキンチョたちの子守りをやらせるつもりですの！？」
line = "「会長様、マジですの？　マジで私に、こんなガキンチョたちの子守りをやらせるつもりですの！？」"

[[dialogue]]
speaker = "unk"
# 人手が足りないんだ
line = "人手が足りないんだ"

[[dialogue]]
speaker = "セナリィ"
# 「明らかな人選ミス！　あぁもう、どうなっても知りませんわよ！？」
line = "「明らかな人選ミス！　あぁもう、どうなっても知りませんわよ！？」"

[[dialogue]]
speaker = "セナリィ"
# 「はあ……私は悪の総帥ですのに……ガキンチョどもの相手なんてしてられませんわ……」
line = "「はあ……私は悪の総帥ですのに……ガキンチョどもの相手なんてしてられませんわ……」"

[[dialogue]]
speaker = "男の子"
# 「ばんでっとのおねーさん。みて、みて！　ちゃんときれた！」
line = "「ばんでっとのおねーさん。みて、みて！　ちゃんときれた！」"

[[dialogue]]
speaker = "セナリィ"
# 「ファ！？　ちょっと、カッターをブンブンするんじゃありませんわ！　貴方、ケガしたらどうするんですの！」
line = "「ファ！？　ちょっと、カッターをブンブンするんじゃありませんわ！　貴方、ケガしたらどうするんですの！」"

[[dialogue]]
speaker = "セナリィ"
# 「使い終わったらちゃんと刃をしまっておくのですわ。工作の時のエチケットです！」
line = "「使い終わったらちゃんと刃をしまっておくのですわ。工作の時のエチケットです！」"

[[dialogue]]
speaker = "男の子"
# 「はーい！」
line = "「はーい！」"

[[dialogue]]
speaker = "セナリィ"
# 「ガキンチョは危なっかしくて仕方ありませんわね……あら、あの子……？」
line = "「ガキンチョは危なっかしくて仕方ありませんわね……あら、あの子……？」"

[[dialogue]]
speaker = "女の子"
# 「ぅー……ぜんぜん、きれない……んー……！」
line = "「ぅー……ぜんぜん、きれない……んー……！」"

[[dialogue]]
speaker = "セナリィ"
# 「貴女、ハサミが紙に噛んでいませんわよ？」
line = "「貴女、ハサミが紙に噛んでいませんわよ？」"

[[dialogue]]
speaker = "女の子"
# 「なんでー？　どーしてこれ、みんなみたいにきれないの？」
line = "「なんでー？　どーしてこれ、みんなみたいにきれないの？」"

[[dialogue]]
speaker = "セナリィ"
# 「ハサミが合っていないんですわ。貴女、利き腕は？」
line = "「ハサミが合っていないんですわ。貴女、利き腕は？」"

[[dialogue]]
speaker = "女の子"
# 「ききうで？」
line = "「ききうで？」"

[[dialogue]]
speaker = "セナリィ"
# 「……スプーンを持つのは、どっちの手です？」
line = "「……スプーンを持つのは、どっちの手です？」"

[[dialogue]]
speaker = "女の子"
# 「こっち！」
line = "「こっち！」"

[[dialogue]]
speaker = "セナリィ"
# 「やっぱり。そのハサミは右利き用です。ほら、こちらのハサミを使うんですわ」
line = "「やっぱり。そのハサミは右利き用です。ほら、こちらのハサミを使うんですわ」"

[[dialogue]]
speaker = "女の子"
# 「おてほん、みせて！」
line = "「おてほん、みせて！」"

[[dialogue]]
speaker = "セナリィ"
# 「手間がかかりますわね……私、両利きでよかったですわ。ほら。左手でハサミをこう、持って……チョキチョキチョキ、と♪」
line = "「手間がかかりますわね……私、両利きでよかったですわ。ほら。左手でハサミをこう、持って……チョキチョキチョキ、と♪」"

[[dialogue]]
speaker = "女の子"
# 「わ～……！」
line = "「わ～……！」"

[[dialogue]]
speaker = "セナリィ"
# 「……貴女、なぜ私の手元でなく、顔を見るんですの？」
line = "「……貴女、なぜ私の手元でなく、顔を見るんですの？」"

[[dialogue]]
speaker = "女の子"
# 「おめめ！　みぎとひだりで、いろがちがう！　なんでー？」
line = "「おめめ！　みぎとひだりで、いろがちがう！　なんでー？」"

[[dialogue]]
speaker = "セナリィ"
# 「話題の飛躍！　あぁもう、だからガキンチョは嫌いなんですわ～！」
line = "「話題の飛躍！　あぁもう、だからガキンチョは嫌いなんですわ～！」"

[[dialogue]]
speaker = "シャロン"
# 「本日はありがとうございました！　子どもたちもとても喜んでおりましたよ」
line = "「本日はありがとうございました！　子どもたちもとても喜んでおりましたよ」"

[[dialogue]]
speaker = "セナリィ"
# 「クッソ疲れましたわ……銃撃戦の方がどんなに楽か……」
line = "「クッソ疲れましたわ……銃撃戦の方がどんなに楽か……」"

[[dialogue]]
speaker = "セナリィ"
# 「ともかくこれでわかったでしょう。私には向いておりませんので、今後はこのような依頼は控えてほしいですわ……」
line = "「ともかくこれでわかったでしょう。私には向いておりませんので、今後はこのような依頼は控えてほしいですわ……」"

[[dialogue]]
speaker = "シャロン"
# 「そんなことは。子どもたち、セナリィさまにとても懐いていたではありませんか。ね、会長さま？」
line = "「そんなことは。子どもたち、セナリィさまにとても懐いていたではありませんか。ね、会長さま？」"

[[dialogue]]
speaker = "unk"
# 大人気だったね
line = "大人気だったね"

[[dialogue]]
speaker = "セナリィ"
# 「会長様までそんな世迷い事を……」
line = "「会長様までそんな世迷い事を……」"

[[dialogue]]
speaker = "女の子"
# 「あー、いた～！　きれいなおめめのおねーさん！　これ、あげる！」
line = "「あー、いた～！　きれいなおめめのおねーさん！　これ、あげる！」"

[[dialogue]]
speaker = "セナリィ"
# 「え……？　これは貴女が頑張って工作したおもちゃでしょう？　ちゃんとお家に持って帰るべきですわ」
line = "「え……？　これは貴女が頑張って工作したおもちゃでしょう？　ちゃんとお家に持って帰るべきですわ」"

[[dialogue]]
speaker = "女の子"
# 「ぷれぜんと！　おねーさんにあげる！　アカとキイロでぬったの。おねーさんのおめめとおなじいろ！」
line = "「ぷれぜんと！　おねーさんにあげる！　アカとキイロでぬったの。おねーさんのおめめとおなじいろ！」"

[[dialogue]]
speaker = "セナリィ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "セナリィ"
# 「……今日は散々でしたわ。荒事で銃がぶっ放せるかと思いきや、やかましい子どもの世話にかかりっきり」
line = "「……今日は散々でしたわ。荒事で銃がぶっ放せるかと思いきや、やかましい子どもの世話にかかりっきり」"

[[dialogue]]
speaker = "セナリィ"
# 「おまけにこんな、お金にもならない贈り物まで……」
line = "「おまけにこんな、お金にもならない贈り物まで……」"

[[dialogue]]
speaker = "unk"
# でも悪い気はしなかったんじゃない？
line = "でも悪い気はしなかったんじゃない？"

[[dialogue]]
speaker = "セナリィ"
# 「……そうですわね。ああいうひと時も悪くないかも、なんて思っている自分がいることも否定はしませんわ」
line = "「……そうですわね。ああいうひと時も悪くないかも、なんて思っている自分がいることも否定はしませんわ」"

[[dialogue]]
speaker = "セナリィ"
# 「会長様とのお付き合いで私、だいぶヌルい性格に変わってきてしまっているようですわ。はあ、悪の総帥が聞いて呆れます」
line = "「会長様とのお付き合いで私、だいぶヌルい性格に変わってきてしまっているようですわ。はあ、悪の総帥が聞いて呆れます」"

[[dialogue]]
speaker = "セナリィ"
# 「でも……ええ。本当に悪くないですわね。星眼のせいで両親に売られた私ですが……この瞳を綺麗だと言ってもらえました」
line = "「でも……ええ。本当に悪くないですわね。星眼のせいで両親に売られた私ですが……この瞳を綺麗だと言ってもらえました」"

[[dialogue]]
speaker = "セナリィ"
# 「生まれて初めてですわね。この目を持ってよかったと思えたのは」
line = "「生まれて初めてですわね。この目を持ってよかったと思えたのは」"

[[dialogue]]
speaker = "セナリィ"
# 「いつか私も、自分の子供を愛する時が来るのでしょうか。親に捨てられ、武器商人の元で育った、苗字もない女でも……」
line = "「いつか私も、自分の子供を愛する時が来るのでしょうか。親に捨てられ、武器商人の元で育った、苗字もない女でも……」"

[[dialogue]]
speaker = "unk"
# いつか俺と同じ苗字を名乗って欲しいな
