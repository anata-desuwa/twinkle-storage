[[dialogue]]
speaker = "セナリィ"
# 「……フフ♪　会長様ってば、ずいぶんと気が早いんですのね？　ですが……ええ、そういう未来もあるかもしれません<emoji=heart04>」
line = "「……フフ♪　会長様ってば、ずいぶんと気が早いんですのね？　ですが……ええ、そういう未来もあるかもしれません<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
# 「──でも次からは！　今日みたいなのではなく、ちゃんと私向けのガッポリ稼げる仕事のご紹介、頼みますわよ！」
line = "「──でも次からは！　今日みたいなのではなく、ちゃんと私向けのガッポリ稼げる仕事のご紹介、頼みますわよ！」"

[[dialogue]]
speaker = "unk"
# あ、そうだ。今日の報酬を払わなきゃ！
line = "あ、そうだ。今日の報酬を払わなきゃ！"

[[dialogue]]
speaker = "セナリィ"
# 「……今日の分はよろしいですわ」
line = "「……今日の分はよろしいですわ」"

[[dialogue]]
speaker = "セナリィ"
# 「だってもう──いただきましたもの！」
line = "「だってもう──いただきましたもの！」"

[[dialogue]]
speaker = "unk"
# 女の子のお手製のおもちゃを持ってはにかむセナリィ。
line = "女の子のお手製のおもちゃを持ってはにかむセナリィ。"

[[dialogue]]
speaker = "unk"
# 裏社会とお金に執着し、悪の道をひた走り──
line = "裏社会とお金に執着し、悪の道をひた走り──"

[[dialogue]]
speaker = "unk"
# けれど心の底には優しさを兼ね備えた彼女をこれからも支えていきたい……俺はそう思うのだった。
line = "けれど心の底には優しさを兼ね備えた彼女をこれからも支えていきたい……俺はそう思うのだった。"
