[[dialogue]]
speaker = "unk"
# 第３話,人気者はつらいよ,P
line = "第３話,人気者はつらいよ,P"

[[dialogue]]
speaker = "unk"
# 流星寮のクリスマスパーティーは夜の部に突入する。
line = "流星寮のクリスマスパーティーは夜の部に突入する。"

[[dialogue]]
speaker = "unk"
# みんなの大騒ぎは更にエスカレートしていた。
line = "みんなの大騒ぎは更にエスカレートしていた。"

[[dialogue]]
speaker = "アポロ"
# 「ヒルディオーネ！　ちょっとかくまってくれ！」
line = "「ヒルディオーネ！　ちょっとかくまってくれ！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「アポロさん、いったいどうしましたの？」
line = "「アポロさん、いったいどうしましたの？」"

[[dialogue]]
speaker = "アポロ"
# 「どこに行っても抱きつかれたり、撫でられたりして困ってるんだ」
line = "「どこに行っても抱きつかれたり、撫でられたりして困ってるんだ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「あー……心中お察ししますわ」
line = "「あー……心中お察ししますわ」"

[[dialogue]]
speaker = "アポロ"
# 「みんな楽しそうだから、ちょっとくらいならいいけどな！　パーティーの実行委員としては、楽しんでくれるのが一番だ！」
line = "「みんな楽しそうだから、ちょっとくらいならいいけどな！　パーティーの実行委員としては、楽しんでくれるのが一番だ！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「あら、意外とご立派なことを仰いますのね。アポロさんは楽しんでいる側だと思っていましたが」
line = "「あら、意外とご立派なことを仰いますのね。アポロさんは楽しんでいる側だと思っていましたが」"

[[dialogue]]
speaker = "アポロ"
# 「もちろんあたしも楽しんでるぞ。でも、実行委員なんだから、自分だけ楽しければいいってわけにはいかないんだ」
line = "「もちろんあたしも楽しんでるぞ。でも、実行委員なんだから、自分だけ楽しければいいってわけにはいかないんだ」"

[[dialogue]]
speaker = "アポロ"
# 「ああ、ただ、ちょっぴり気に食わないこともあるな」
line = "「ああ、ただ、ちょっぴり気に食わないこともあるな」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「あら、なんですの？」
line = "「あら、なんですの？」"

[[dialogue]]
speaker = "アポロ"
# 「魔王がなかなか捕まらないんだ。恋人を放っておくなんて許せないぞ！」
line = "「魔王がなかなか捕まらないんだ。恋人を放っておくなんて許せないぞ！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「それは許せませんわね。緋宮会長ならば……ほら、あちらにいらっしゃるようですわよ？」
line = "「それは許せませんわね。緋宮会長ならば……ほら、あちらにいらっしゃるようですわよ？」"

[[dialogue]]
speaker = "アポロ"
# 「おっ、そうか！　ありがとう、行ってくるぞ！」
line = "「おっ、そうか！　ありがとう、行ってくるぞ！」"

[[dialogue]]
speaker = "アポロ"
# 「見つけたぞ、魔王！」
line = "「見つけたぞ、魔王！」"

[[dialogue]]
speaker = "unk"
# パーティー楽しんでる？
line = "パーティー楽しんでる？"

[[dialogue]]
speaker = "unk"
# アポロ
line = "アポロ"

[[dialogue]]
speaker = "アポロ"
# 「すっごく楽しんでる！　でも、あたしはおまえとも一緒に楽しみたいぞ！」
line = "「すっごく楽しんでる！　でも、あたしはおまえとも一緒に楽しみたいぞ！」"

[[dialogue]]
speaker = "アポロ"
# 「新星の星徒会長だから、いろんな人から引っ張りだこなのはわかるけどな」
line = "「新星の星徒会長だから、いろんな人から引っ張りだこなのはわかるけどな」"

[[dialogue]]
speaker = "unk"
# じゃあこっちにおいで
line = "じゃあこっちにおいで"

[[dialogue]]
speaker = "アポロ"
# 「わわっ、ちょっ、いきなり何を──！」
line = "「わわっ、ちょっ、いきなり何を──！」"

[[dialogue]]
speaker = "アポロ"
# 「いきなり抱っこしてきて……こういうのは好きじゃない、困ってるって言っただろ！」
line = "「いきなり抱っこしてきて……こういうのは好きじゃない、困ってるって言っただろ！」"

[[dialogue]]
speaker = "unk"
# ……釈放
line = "……釈放"

[[dialogue]]
speaker = "アポロ"
# 「あーーーーっ！！　ダメだ！　おまえは特別だから、ずっと抱っこしてていい！」
line = "「あーーーーっ！！　ダメだ！　おまえは特別だから、ずっと抱っこしてていい！」"

[[dialogue]]
speaker = "アポロ"
# 「その代わり恋人なんだから、ちゃんと隠して放さないでくれよ？」
line = "「その代わり恋人なんだから、ちゃんと隠して放さないでくれよ？」"

[[dialogue]]
speaker = "unk"
# わかった、抱き締めてあげる
line = "わかった、抱き締めてあげる"

[[dialogue]]
speaker = "アポロ"
# 「えへへへ～、あたしはちっちゃいから簡単に隠れちゃうな」
line = "「えへへへ～、あたしはちっちゃいから簡単に隠れちゃうな」"

[[dialogue]]
speaker = "アポロ"
# 「ふわふわもこもこで、抱き心地いいってみんな言ってるけど魔王はどうだ？」
line = "「ふわふわもこもこで、抱き心地いいってみんな言ってるけど魔王はどうだ？」"

[[dialogue]]
speaker = "アポロ"
# 「こら、むぎゅ～～ってするな。返事はちゃんと口で言え」
line = "「こら、むぎゅ～～ってするな。返事はちゃんと口で言え」"

[[dialogue]]
speaker = "アポロ"
# 「でも、おまえの気持ちは伝わったぞ。おまえもクリスマスフォームを気に入ってくれてるんだな？」
line = "「でも、おまえの気持ちは伝わったぞ。おまえもクリスマスフォームを気に入ってくれてるんだな？」"

[[dialogue]]
speaker = "アポロ"
# 「おまえが好きって思ってくれるなら……たまにはこういう可愛い格好も悪くないかもな」
line = "「おまえが好きって思ってくれるなら……たまにはこういう可愛い格好も悪くないかもな」"

[[dialogue]]
speaker = "アポロ"
# 「ふふふ、最高の隠れ場所だな、ここは<emoji=heart04>」
line = "「ふふふ、最高の隠れ場所だな、ここは<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
# 「もうちょっとだけ……あたしを隠しててくれるか？」
line = "「もうちょっとだけ……あたしを隠しててくれるか？」"

[[dialogue]]
speaker = "unk"
# 見つかるまで抱っこするよ
line = "見つかるまで抱っこするよ"

[[dialogue]]
speaker = "unk"
# ずっとこうしててあげる
line = "ずっとこうしててあげる"

[[dialogue]]
speaker = "アポロ"
# 「えへへ、うれしいぞ……<emoji=heart04>　今日はもう無理かもって思ってたから」
line = "「えへへ、うれしいぞ……<emoji=heart04>　今日はもう無理かもって思ってたから」"

[[dialogue]]
speaker = "アポロ"
# 「こんな風に恋人同士っぽくいちゃいちゃしてるのもいいけど、普通におまえとクリスマスを楽しみたい気もするな」
line = "「こんな風に恋人同士っぽくいちゃいちゃしてるのもいいけど、普通におまえとクリスマスを楽しみたい気もするな」"

[[dialogue]]
speaker = "アポロ"
# 「隠れるのをやめて、思いっきり突撃してみるか？　こそこそするのはあたしの性に合わないしな！　魔王もそうだろ！？」
line = "「隠れるのをやめて、思いっきり突撃してみるか？　こそこそするのはあたしの性に合わないしな！　魔王もそうだろ！？」"

[[dialogue]]
speaker = "unk"
# 一緒にパーティーを楽しもう！
line = "一緒にパーティーを楽しもう！"

[[dialogue]]
speaker = "unk"
# 俺も同じだ！
line = "俺も同じだ！"

[[dialogue]]
speaker = "アポロ"
# 「行くぞ！　魔王と一緒にやりたいこともあるんだ、ついてこい！」
line = "「行くぞ！　魔王と一緒にやりたいこともあるんだ、ついてこい！」"

[[dialogue]]
speaker = "アポロ"
# 「捕まったら、その時はその時だ！　あたしのこと、ちゃんと守ってくれよ！」
line = "「捕まったら、その時はその時だ！　あたしのこと、ちゃんと守ってくれよ！」"

[[dialogue]]
speaker = "unk"
# アポロと手を繋ぎ、クリスマスパーティーの会場に突撃する。
line = "アポロと手を繋ぎ、クリスマスパーティーの会場に突撃する。"

[[dialogue]]
speaker = "unk"
# 当然、アポロを狙って大勢が押し寄せてきたが、体を張ってそれを守った。
line = "当然、アポロを狙って大勢が押し寄せてきたが、体を張ってそれを守った。"

[[dialogue]]
speaker = "unk"
# 腕の中で守られているアポロは、終始幸せそうな笑顔を浮かべていたのだった。
line = "腕の中で守られているアポロは、終始幸せそうな笑顔を浮かべていたのだった。"
