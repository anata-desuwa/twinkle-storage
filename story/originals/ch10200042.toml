[[dialogue]]
speaker = "ルルカ"
# 「フニちゃんたちにはもう知られちゃってるし、リーリアちゃんたちにも、あたしがルカルカの中の人だって、話しておきたい」
line = "「フニちゃんたちにはもう知られちゃってるし、リーリアちゃんたちにも、あたしがルカルカの中の人だって、話しておきたい」"

[[dialogue]]
speaker = "ルルカ"
# 「だけど……カミングアウトしたら、やっぱり怒っちゃうかな？　ずっと黙ってたわけだし……」
line = "「だけど……カミングアウトしたら、やっぱり怒っちゃうかな？　ずっと黙ってたわけだし……」"

[[dialogue]]
speaker = "unk"
# 大丈夫だよ。２人なら怒ったりしない
line = "大丈夫だよ。２人なら怒ったりしない"

[[dialogue]]
speaker = "ルルカ"
# 「そうだよね……でも、いざ自分から明かそうと思うと、やっぱり怖いんだ。だから――」
line = "「そうだよね……でも、いざ自分から明かそうと思うと、やっぱり怖いんだ。だから――」"

[[dialogue]]
speaker = "ルルカ"
# 「お兄ちゃん、勇気を貰ってもいい？」
line = "「お兄ちゃん、勇気を貰ってもいい？」"

[[dialogue]]
speaker = "ルルカ"
# 「ぎゅ～ってハグして、お兄ちゃんパワーを充電して欲しい。そうしたらあたし、頑張れるから」
