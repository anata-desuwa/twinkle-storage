[[dialogue]]
speaker = "unk"
# 第２話,友達への秘密,P
line = "第２話,友達への秘密,P"

[[dialogue]]
speaker = "unk"
# 色々あったクリスマスも終わり、俺はルルカとカフェテリアでのんびりしていた。
line = "色々あったクリスマスも終わり、俺はルルカとカフェテリアでのんびりしていた。"

[[dialogue]]
speaker = "unk"
# そこへ、ルルカのクラスメイトであるリーリアが通りかかって、３人でお茶することになり――
line = "そこへ、ルルカのクラスメイトであるリーリアが通りかかって、３人でお茶することになり――"

[[dialogue]]
speaker = "ルルカ"
# 「あ～、ほんとに疲れた～。クリスマス前日の夜まで、ずっとドタバタしてて……」
line = "「あ～、ほんとに疲れた～。クリスマス前日の夜まで、ずっとドタバタしてて……」"

[[dialogue]]
speaker = "リーリア"
# 「あはは♪　ルルカちゃん、お疲れマジカル～☆」
line = "「あはは♪　ルルカちゃん、お疲れマジカル～☆」"

[[dialogue]]
speaker = "リーリア"
# 「でも、私にもプレゼントくれて、嬉しかったよ♪　手作りのブレスレット、大切にするね」
line = "「でも、私にもプレゼントくれて、嬉しかったよ♪　手作りのブレスレット、大切にするね」"

[[dialogue]]
speaker = "ルルカ"
# 「うんっ。頑張って用意したから、喜んでもらえたなら嬉しいな♪」
line = "「うんっ。頑張って用意したから、喜んでもらえたなら嬉しいな♪」"

[[dialogue]]
speaker = "ルルカ"
# 「なんにしても、忙しいクリスマスは終わったし、今日はだらーんと過ごすつもり～」
line = "「なんにしても、忙しいクリスマスは終わったし、今日はだらーんと過ごすつもり～」"

[[dialogue]]
speaker = "unk"
# でも、年末はまた忙しいんじゃない？
line = "でも、年末はまた忙しいんじゃない？"

[[dialogue]]
speaker = "ルルカ"
# 「うっ。思い出させないでよ、お兄ちゃん」
line = "「うっ。思い出させないでよ、お兄ちゃん」"

[[dialogue]]
speaker = "リーリア"
# 「何か面倒な用事でもあるの？」
line = "「何か面倒な用事でもあるの？」"

[[dialogue]]
speaker = "ルルカ"
# 「面倒っていうか、別に嫌ではないんだけどね～。それなりに手間なのは確かかなぁ」
line = "「面倒っていうか、別に嫌ではないんだけどね～。それなりに手間なのは確かかなぁ」"

[[dialogue]]
speaker = "ルルカ"
# 「とにかく！　今日だけはそういうのもぜ～んぶ忘れて、のんびり休むって決めたの！」
line = "「とにかく！　今日だけはそういうのもぜ～んぶ忘れて、のんびり休むって決めたの！」"

[[dialogue]]
speaker = "ルルカ"
# 「だから、お兄ちゃん、カフェオレ飲ませて～<emoji=heart04>」
line = "「だから、お兄ちゃん、カフェオレ飲ませて～<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# はいはい、カフェオレをどうぞ、可愛い妹様
line = "はいはい、カフェオレをどうぞ、可愛い妹様"

[[dialogue]]
speaker = "ルルカ"
# 「んっ……ぷぁ～～っ♪　甘くておいし～<emoji=heart04>　ありがとね、お兄ちゃん。愛してる<emoji=heart04>」
line = "「んっ……ぷぁ～～っ♪　甘くておいし～<emoji=heart04>　ありがとね、お兄ちゃん。愛してる<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺も世界一愛してるぞ
line = "俺も世界一愛してるぞ"

[[dialogue]]
speaker = "ルルカ"
# 「えへへ～<emoji=heart04>　世界一とか照れちゃうな～～、んもぅ<emoji=heart04>」
line = "「えへへ～<emoji=heart04>　世界一とか照れちゃうな～～、んもぅ<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
# 「あ～、はいはい。ご馳走さまです～」
line = "「あ～、はいはい。ご馳走さまです～」"

[[dialogue]]
speaker = "リーリア"
# 「というか、可愛い後輩を差し置いて、イチャイチャ見せつけてくれるじゃないですか、センパイ。すっかりルルカちゃんとのカップリングが板についちゃってる感じで」
line = "「というか、可愛い後輩を差し置いて、イチャイチャ見せつけてくれるじゃないですか、センパイ。すっかりルルカちゃんとのカップリングが板についちゃってる感じで」"

[[dialogue]]
speaker = "ルルカ"
# 「あっ、ごめん、つい……なんか見せつけるようなことしちゃって」
line = "「あっ、ごめん、つい……なんか見せつけるようなことしちゃって」"

[[dialogue]]
speaker = "リーリア"
# 「あ～、いいのいいの。ルルカちゃんが幸せそうなのを見るのは、私も嬉しいんで♪」
line = "「あ～、いいのいいの。ルルカちゃんが幸せそうなのを見るのは、私も嬉しいんで♪」"

[[dialogue]]
speaker = "リーリア"
# 「ただセンパイには、ちょっと色々文句は言いたいですけどね！　ぷんぷん！」
line = "「ただセンパイには、ちょっと色々文句は言いたいですけどね！　ぷんぷん！」"

[[dialogue]]
speaker = "リーリア"
# 「――でも今は、そんなことより！　ルルカちゃんはもう見た？」
line = "「――でも今は、そんなことより！　ルルカちゃんはもう見た？」"

[[dialogue]]
speaker = "リーリア"
# 「<ruby=うしお>汐</ruby>ルカルカの新衣装！　クリスマスツリーがモチーフで、め～っちゃ可愛かった～♪」
line = "「<ruby>汐<rt>うしお</rt></ruby>ルカルカの新衣装！　クリスマスツリーがモチーフで、め～っちゃ可愛かった～♪」"

[[dialogue]]
speaker = "ルルカ"
# 「ギクッ……！」
line = "「ギクッ……！」"

[[dialogue]]
speaker = "ルルカ"
# 「う、うん、そうだね。すごく可愛かった～。さすがルカルカ～って感じで。あははっ……」
line = "「う、うん、そうだね。すごく可愛かった～。さすがルカルカ～って感じで。あははっ……」"

[[dialogue]]
speaker = "リーリア"
# 「でもあの衣装、ルルカちゃんのクリスマスフォームに似てたよね～」
line = "「でもあの衣装、ルルカちゃんのクリスマスフォームに似てたよね～」"

[[dialogue]]
speaker = "ルルカ"
# 「ギクギクッ……！」
line = "「ギクギクッ……！」"

[[dialogue]]
speaker = "リーリア"
# 「メン限の配信で先行公開とかされてた感じ？　あたし、見逃しちゃってたかな……？」
line = "「メン限の配信で先行公開とかされてた感じ？　あたし、見逃しちゃってたかな……？」"

[[dialogue]]
speaker = "リーリア"
# 「でも、すぐに合わせてくるなんて、さすがルルカちゃん、筋金入りの『お姉ちゃん』だね！」
line = "「でも、すぐに合わせてくるなんて、さすがルルカちゃん、筋金入りの『お姉ちゃん』だね！」"

[[dialogue]]
speaker = "unk"
# ──『お姉ちゃん』とは、Ｖチューバールカルカの女性リスナーを指す呼び名である。
line = "──『お姉ちゃん』とは、Ｖチューバールカルカの女性リスナーを指す呼び名である。"

[[dialogue]]
speaker = "unk"
# ルルカが汐ルカルカの『中の人』である事実は、俺を始めとした一部のヒトしか知らない。リーリアに対しては、ルルカは『ルカルカの熱心なファン』ということになっている。
line = "ルルカが汐ルカルカの『中の人』である事実は、俺を始めとした一部のヒトしか知らない。リーリアに対しては、ルルカは『ルカルカの熱心なファン』ということになっている。"

[[dialogue]]
speaker = "リーリア"
# 「そうだ！　よかったらまた、クリスマスフォーム見せてくれない？」
line = "「そうだ！　よかったらまた、クリスマスフォーム見せてくれない？」"

[[dialogue]]
speaker = "ルルカ"
# 「え！？　こ、ここで……？」
line = "「え！？　こ、ここで……？」"

[[dialogue]]
speaker = "リーリア"
# 「ダメ？」
line = "「ダメ？」"

[[dialogue]]
speaker = "ルルカ"
# 「ダメってわけじゃないけど……ちょっと場所的に目立つというかぁ……」
line = "「ダメってわけじゃないけど……ちょっと場所的に目立つというかぁ……」"

[[dialogue]]
speaker = "リーリア"
# 「大丈夫！　私とセンパイで隠すから。ね、お願い♪」
line = "「大丈夫！　私とセンパイで隠すから。ね、お願い♪」"

[[dialogue]]
speaker = "ルルカ"
# 「わかった。それなら……。じゃあ、変身するよ？　チェンジ、クリスマスフォーム！」
line = "「わかった。それなら……。じゃあ、変身するよ？　チェンジ、クリスマスフォーム！」"

[[dialogue]]
speaker = "リーリア"
# 「おお～♪　うんっ、やっぱりルカルカにそっくり♪　すごく可愛い！」
line = "「おお～♪　うんっ、やっぱりルカルカにそっくり♪　すごく可愛い！」"

[[dialogue]]
speaker = "ルルカ"
# 「そ、そう？　まぁ、あたしは最古参『お姉ちゃん』だからね～。あははっ……」
line = "「そ、そう？　まぁ、あたしは最古参『お姉ちゃん』だからね～。あははっ……」"

[[dialogue]]
speaker = "リーリア"
# 「さっすが～♪　ねぇねぇ、もっとよく見せてくれない？　配信だと、後ろとかよく見えなかったからさ。どうなってるのかなって」
line = "「さっすが～♪　ねぇねぇ、もっとよく見せてくれない？　配信だと、後ろとかよく見えなかったからさ。どうなってるのかなって」"

[[dialogue]]
speaker = "ルルカ"
# 「い、いいけど、撮影はなしでお願いね？」
line = "「い、いいけど、撮影はなしでお願いね？」"

[[dialogue]]
speaker = "リーリア"
# 「え～、撮っちゃダメ～？　すっごく可愛いのに」
line = "「え～、撮っちゃダメ～？　すっごく可愛いのに」"

[[dialogue]]
speaker = "ルルカ"
# 「さ、さすがに目立っちゃうから！　お兄ちゃんも壁役の強化をお願いっ」
line = "「さ、さすがに目立っちゃうから！　お兄ちゃんも壁役の強化をお願いっ」"

[[dialogue]]
speaker = "リーリア"
# 「むぅ～、じゃあ見るだけで我慢する～……おお～っ、ここはこうなってるんだ！　へぇぇ～～っ」
line = "「むぅ～、じゃあ見るだけで我慢する～……おお～っ、ここはこうなってるんだ！　へぇぇ～～っ」"

[[dialogue]]
speaker = "リーリア"
# 「――うんっ、満足した！　撮影はまた今度の機会にってことで♪」
line = "「――うんっ、満足した！　撮影はまた今度の機会にってことで♪」"

[[dialogue]]
speaker = "ルルカ"
# 「諦めてなかったんだ……」
line = "「諦めてなかったんだ……」"

[[dialogue]]
speaker = "リーリア"
# 「だって、私はルルカちゃんほどじゃないけど、これでもルカルカのメンバーシップに入会して応援してる『お姉ちゃん』だから♪」
line = "「だって、私はルルカちゃんほどじゃないけど、これでもルカルカのメンバーシップに入会して応援してる『お姉ちゃん』だから♪」"

[[dialogue]]
speaker = "リーリア"
# 「――っと、いけない、話し込んでたらもうこんな時間！」
line = "「――っと、いけない、話し込んでたらもうこんな時間！」"

[[dialogue]]
speaker = "リーリア"
# 「ごめん、用事があるから行くね！　ルルカちゃん、センパイ、お先に失礼しまーす♪」
line = "「ごめん、用事があるから行くね！　ルルカちゃん、センパイ、お先に失礼しまーす♪」"

[[dialogue]]
speaker = "ルルカ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ルルカ"
# 「……ねえ、お兄ちゃん」
line = "「……ねえ、お兄ちゃん」"

[[dialogue]]
speaker = "unk"
# リーリアに教えたくなった？
line = "リーリアに教えたくなった？"

[[dialogue]]
speaker = "ルルカ"
# 「うん。リーリアちゃんは友達だもん。あと、アナちゃんにも」
