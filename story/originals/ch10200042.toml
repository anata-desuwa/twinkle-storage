line = "「あのね、あたし、２人に秘密にしてたことがあるの――」"

[[dialogue]]
speaker = "リーリア"
# 「うん。実は、私もなんだ」
line = "「うん。実は、私もなんだ」"

[[dialogue]]
speaker = "ルルカ"
# 「え？」
line = "「え？」"

[[dialogue]]
speaker = "unk"
# こうして友達同士、３人はカミングアウトを果たすのだった――
line = "こうして友達同士、３人はカミングアウトを果たすのだった――"
