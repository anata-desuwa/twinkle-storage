line = "「ルカルカのファンとして、ルルカさんのことをこれからも全力で応援するって」"

[[dialogue]]
speaker = "アナ"
# 「今度は私も一緒に、２人の友達として立ち会いますから」
line = "「今度は私も一緒に、２人の友達として立ち会いますから」"

[[dialogue]]
speaker = "リーリア"
