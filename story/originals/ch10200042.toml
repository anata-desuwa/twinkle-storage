# 「うん。――んっ……♪」
line = "「うん。――んっ……♪」"

[[dialogue]]
speaker = "ルルカ"
# 「ねぇ、お兄ちゃん。もしちゃんとリーリアちゃんとアナちゃんに伝えられたら、ご褒美にキスしてくれる？」
line = "「ねぇ、お兄ちゃん。もしちゃんとリーリアちゃんとアナちゃんに伝えられたら、ご褒美にキスしてくれる？」"

[[dialogue]]
speaker = "unk"
# ああ。沢山してやる
line = "ああ。沢山してやる"

[[dialogue]]
speaker = "ルルカ"
# 「えへへ♪　なら、必ず伝えて戻ってくるから――」
line = "「えへへ♪　なら、必ず伝えて戻ってくるから――」"

[[dialogue]]
speaker = "ルルカ"
# 「そしたら、いっぱいいっぱい、あたしのこと甘やかしてね、お兄ちゃん<emoji=heart04>」
line = "「そしたら、いっぱいいっぱい、あたしのこと甘やかしてね、お兄ちゃん<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
# 「……よしっ。じゃあ、気合い入れて、行ってきます！」
line = "「……よしっ。じゃあ、気合い入れて、行ってきます！」"

[[dialogue]]
speaker = "unk"
# と、その様子を、カフェテリアの入り口から覗いている人物が２人――
