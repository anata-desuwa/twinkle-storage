line = "「そうなんだけど～。途中で気づいちゃったせいで、こっちもずっと言えずにいたなんて、今のルルカちゃんと同じぐらい気まずいってば～」"

[[dialogue]]
speaker = "アナ"
# 「ですが、ルルカさんはもう、決断したみたいですよ。ほら、今度こそ上手く伝えて下さい」
line = "「ですが、ルルカさんはもう、決断したみたいですよ。ほら、今度こそ上手く伝えて下さい」"

[[dialogue]]
speaker = "アナ"
