line = "「アナちゃん……！」"

[[dialogue]]
speaker = "リーリア"
# 「――よしっ、こっちも勇気出た！　私もルルカちゃんに本当のことを伝えて来るね」
line = "「――よしっ、こっちも勇気出た！　私もルルカちゃんに本当のことを伝えて来るね」"

[[dialogue]]
speaker = "アナ"
