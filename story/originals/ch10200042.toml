line = "「ねぇ、ルルカちゃん。ちょっと話があるんだけど――」"

[[dialogue]]
speaker = "ルルカ"
# 「あれ？　リーリアちゃんとアナちゃん！　ちょうどよかった、あたしも２人に大事な話があって……！」
line = "「あれ？　リーリアちゃんとアナちゃん！　ちょうどよかった、あたしも２人に大事な話があって……！」"

[[dialogue]]
speaker = "ルルカ"
