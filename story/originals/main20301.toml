[[dialogue]]
speaker = "unk"
# 第１話,嵐の槍,B
line = "第１話,嵐の槍,B"

[[dialogue]]
speaker = "チナ"
# 「くたばれ、魔王……！」
line = "「くたばれ、魔王……！」"

[[dialogue]]
speaker = "unk"
# 嵐が大槍を包み、風雷の塊と化した一撃が俺めがけて迫る。
line = "嵐が大槍を包み、風雷の塊と化した一撃が俺めがけて迫る。"

[[dialogue]]
speaker = "クロト"
# 「ぐっ……！」
line = "「ぐっ……！」"

[[dialogue]]
speaker = "unk"
# 暴威を紙一重で躱すも、余波だけで体が切り刻まれる。
line = "暴威を紙一重で躱すも、余波だけで体が切り刻まれる。"

[[dialogue]]
speaker = "unk"
# 直撃せずとも並のモンスターなら細切れになる破壊力だ。
line = "直撃せずとも並のモンスターなら細切れになる破壊力だ。"

[[dialogue]]
speaker = "チナ"
# 「お前のせいで、アタシの家族は……！」
line = "「お前のせいで、アタシの家族は……！」"

[[dialogue]]
speaker = "クロト"
# 「君の家族……？　なんのことだ、君はいったい！？」
line = "「君の家族……？　なんのことだ、君はいったい！？」"

[[dialogue]]
speaker = "チナ"
# 「お前はアタシたちの世界を破壊した……！　この魔王め……！」
line = "「お前はアタシたちの世界を破壊した……！　この魔王め……！」"

[[dialogue]]
speaker = "unk"
# 小柄な体躯で大きな槍を振り回し、執拗に俺を襲う。
line = "小柄な体躯で大きな槍を振り回し、執拗に俺を襲う。"

[[dialogue]]
speaker = "unk"
# 彼女から感じる星力は並外れていて、容赦なく繰り出される連撃に防戦一方になっていた。
line = "彼女から感じる星力は並外れていて、容赦なく繰り出される連撃に防戦一方になっていた。"

[[dialogue]]
speaker = "チナ"
# 「緋宮クロト！　お前はここで終わらせる！」
line = "「緋宮クロト！　お前はここで終わらせる！」"

[[dialogue]]
speaker = "unk"
# そして一撃一撃から感じる、強い敵意と憎悪。
line = "そして一撃一撃から感じる、強い敵意と憎悪。"

[[dialogue]]
speaker = "unk"
# ともすれば向けられただけで絶命しそうな殺気が、俺を狙っていた。
line = "ともすれば向けられただけで絶命しそうな殺気が、俺を狙っていた。"

[[dialogue]]
speaker = "クロト"
# （魔王の力が使えれば……いや、今はダメだ）
line = "（魔王の力が使えれば……いや、今はダメだ）"

[[dialogue]]
speaker = "unk"
# 今また俺が暴走すれば、流星市国がどうなるかわかったものではない。
line = "今また俺が暴走すれば、流星市国がどうなるかわかったものではない。"

[[dialogue]]
speaker = "unk"
# 最悪、敗北どころでは済まない。この世界が崩壊してしまう。
line = "最悪、敗北どころでは済まない。この世界が崩壊してしまう。"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロトばっかり狙ってるんじゃないわよ！　好き勝手はさせないわ！」
line = "「クロトばっかり狙ってるんじゃないわよ！　好き勝手はさせないわ！」"

[[dialogue]]
speaker = "チナ"
# 「行け、極星従騎・スレイプニル！」
line = "「行け、極星従騎・スレイプニル！」"

[[dialogue]]
speaker = "unk"
# 俺を助けようとしたヴィーナスたちの前に、先ほど戦っていたガーディアンが立ちはだかる。
line = "俺を助けようとしたヴィーナスたちの前に、先ほど戦っていたガーディアンが立ちはだかる。"

[[dialogue]]
speaker = "マトイ"
# 「さっきのガーディアン……まだいたんだ……」
line = "「さっきのガーディアン……まだいたんだ……」"

[[dialogue]]
speaker = "スレイプニル"
# 「ブルルル……！」
line = "「ブルルル……！」"

[[dialogue]]
speaker = "unk"
# “極星従騎”と呼ばれたガーディアンが、その剣に光をまとわせて突進する。
line = "“極星従騎”と呼ばれたガーディアンが、その剣に光をまとわせて突進する。"

[[dialogue]]
speaker = "マトイ"
# 「っ……やっぱり強い……！」
line = "「っ……やっぱり強い……！」"

[[dialogue]]
speaker = "クロト"
# 「君は何者だ！？　何のために街を破壊する！」
line = "「君は何者だ！？　何のために街を破壊する！」"

[[dialogue]]
speaker = "チナ"
# 「あん？」
line = "「あん？」"

[[dialogue]]
speaker = "unk"
# 配下を率いて街を蹂躙する彼女の行いは、リクリエの使徒として現れたアポロを思い起させる。
line = "配下を率いて街を蹂躙する彼女の行いは、リクリエの使徒として現れたアポロを思い起させる。"

[[dialogue]]
speaker = "クロト"
# 「まさか新しいリクリエの使徒……なのか？　だけど仮面は──」
line = "「まさか新しいリクリエの使徒……なのか？　だけど仮面は──」"

[[dialogue]]
speaker = "チナ"
# 「リクリエの使徒？　アタシが……？」
line = "「リクリエの使徒？　アタシが……？」"

[[dialogue]]
speaker = "unk"
# 問われた彼女は若干の逡巡を見せて──
line = "問われた彼女は若干の逡巡を見せて──"

[[dialogue]]
speaker = "チナ"
# <size=50>「んなわけねえだろうがっ！！」</size>
line = "<size=50>「んなわけねえだろうがっ！！」</size>"

[[dialogue]]
speaker = "unk"
# 同刻。
line = "同刻。"

[[dialogue]]
speaker = "unk"
# 選挙管理委員会の４人も、街を破壊するガーディアンと対峙していた。
line = "選挙管理委員会の４人も、街を破壊するガーディアンと対峙していた。"

[[dialogue]]
speaker = "アポロ"
# 「モンスターだろうが、ガーディアンだろうが、好きにはさせない！　そら！」
line = "「モンスターだろうが、ガーディアンだろうが、好きにはさせない！　そら！」"

[[dialogue]]
speaker = "スレイプニル"
# 「ヒィイン……！」
line = "「ヒィイン……！」"

[[dialogue]]
speaker = "梨緒"
# 「今のを弾いたか。手強いな……！」
line = "「今のを弾いたか。手強いな……！」"

[[dialogue]]
speaker = "unk"
# 空を疾駆しながら街を破壊するガーディアン。
line = "空を疾駆しながら街を破壊するガーディアン。"

[[dialogue]]
speaker = "unk"
# その剣は舗装された地面を切り裂き、蹄がビルを蹴ると、砕けたコンクリートが散乱する。
line = "その剣は舗装された地面を切り裂き、蹄がビルを蹴ると、砕けたコンクリートが散乱する。"

[[dialogue]]
speaker = "ベアトリス"
# 「えっと、えっと、えっと……」
line = "「えっと、えっと、えっと……」"

[[dialogue]]
speaker = "ベアトリス"
# （デネブからの攻撃が始まったってこと？　こんなに早くに始まるなんて──）
line = "（デネブからの攻撃が始まったってこと？　こんなに早くに始まるなんて──）"

[[dialogue]]
speaker = "スレイプニル"
# 「ヒヒィイン！」
line = "「ヒヒィイン！」"

[[dialogue]]
speaker = "梨緒"
# 「ベアト、逃げろ！」
line = "「ベアト、逃げろ！」"

[[dialogue]]
speaker = "ベアトリス"
# 「あ──！？」
line = "「あ──！？」"

[[dialogue]]
speaker = "unk"
# ベアトリスにガーディアンの刃が迫るが──
line = "ベアトリスにガーディアンの刃が迫るが──"

[[dialogue]]
speaker = "スレイプニル"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# しかしベアトリスに届く寸前、切っ先が止まった。
line = "しかしベアトリスに届く寸前、切っ先が止まった。"

[[dialogue]]
speaker = "ベアトリス"
# 「え……？」
line = "「え……？」"

[[dialogue]]
speaker = "梨緒"
# 「動かなくなった！？」
line = "「動かなくなった！？」"

[[dialogue]]
speaker = "梨緒"
# 「理由はわからないが──好機だ！」
line = "「理由はわからないが──好機だ！」"

[[dialogue]]
speaker = "アポロ"
# 「今度は仕留めるぞ！　力を合わせろ！」
line = "「今度は仕留めるぞ！　力を合わせろ！」"

[[dialogue]]
speaker = "ナターシャ"
# 「了解。ちゃんと決めてね」
line = "「了解。ちゃんと決めてね」"

[[dialogue]]
speaker = "アポロ"
# 「任せろ！　メテオライトキャリバーッ！！」
line = "「任せろ！　メテオライトキャリバーッ！！」"

[[dialogue]]
speaker = "梨緒"
# 「対象撃破。大丈夫か、ベアト？」
line = "「対象撃破。大丈夫か、ベアト？」"

[[dialogue]]
speaker = "ベアトリス"
# 「は、はい……」
line = "「は、はい……」"

[[dialogue]]
speaker = "梨緒"
# 「戦闘中に気を抜くな。無事だったから良かったものの、さっきは危なかったぞ」
line = "「戦闘中に気を抜くな。無事だったから良かったものの、さっきは危なかったぞ」"

[[dialogue]]
speaker = "ベアトリス"
# 「すみません……」
line = "「すみません……」"

[[dialogue]]
speaker = "ナターシャ"
# 「おや、また敬語？　戻っちゃった？」
line = "「おや、また敬語？　戻っちゃった？」"

[[dialogue]]
speaker = "ベアトリス"
# 「ああいえ、その、ごめんなさいっ」
line = "「ああいえ、その、ごめんなさいっ」"

[[dialogue]]
speaker = "梨緒"
# 「出遅れてしまったが、星徒会と早く合流しよう。魔王の方が気になる──」
line = "「出遅れてしまったが、星徒会と早く合流しよう。魔王の方が気になる──」"

[[dialogue]]
speaker = "？？？"
# 「さて、私もそろそろ舞台に上がろうか」
line = "「さて、私もそろそろ舞台に上がろうか」"

[[dialogue]]
speaker = "梨緒"
# 「！？　この声は──」
line = "「！？　この声は──」"

[[dialogue]]
speaker = "unk"
# 梨緒が咄嗟に背後を振り返る。
line = "梨緒が咄嗟に背後を振り返る。"

[[dialogue]]
speaker = "unk"
# そして次の瞬間、梨緒の眼が驚愕に見開かれた。
line = "そして次の瞬間、梨緒の眼が驚愕に見開かれた。"

[[dialogue]]
speaker = "梨緒"
# 「ジグ……！？」
line = "「ジグ……！？」"

[[dialogue]]
speaker = "ジグ"
# 「おや。私のことを知っているのかい？　どこかで会ったかな」
line = "「おや。私のことを知っているのかい？　どこかで会ったかな」"

[[dialogue]]
speaker = "アポロ"
# 「あたしは知らないぞ。誰だオマエは！？」
line = "「あたしは知らないぞ。誰だオマエは！？」"

[[dialogue]]
speaker = "ジグ"
# 「そうだね、初対面だから名乗らせてもらおう」
line = "「そうだね、初対面だから名乗らせてもらおう」"

[[dialogue]]
speaker = "ジグ"
# 「私は<ruby=ジグ>Ｚ</ruby>。“真なる神の騎士”だ」
line = "「私は<ruby>Ｚ<rt>ジグ</rt></ruby>。“真なる神の騎士”だ」"
