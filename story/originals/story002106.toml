[[dialogue]]
speaker = "アポロ"
# 「よっしゃーいくぞ魔王！　スペシャル流星スパーイクッ！」
line = "「よっしゃーいくぞ魔王！　スペシャル流星スパーイクッ！」"

[[dialogue]]
speaker = "マトイ"
# 「ひゃあっ！？」
line = "「ひゃあっ！？」"

[[dialogue]]
speaker = "アナ"
# 「なんて鋭いスパイク──さすが、あの大剣を振り回していただけはありますね」
line = "「なんて鋭いスパイク──さすが、あの大剣を振り回していただけはありますね」"

[[dialogue]]
speaker = "アポロ"
# 「わっはっは！　これで我がアポロ様軍のリードだな！」
line = "「わっはっは！　これで我がアポロ様軍のリードだな！」"

[[dialogue]]
speaker = "ルリエル"
# 「アポロ様軍ではなく、流星学園チームですから！」
line = "「アポロ様軍ではなく、流星学園チームですから！」"

[[dialogue]]
speaker = "ユウリ"
# 「そーだぞ。チーム一丸となってだな……」
line = "「そーだぞ。チーム一丸となってだな……」"

[[dialogue]]
speaker = "ユウリ"
# 「ってあれ？　うちらのリーダーのはずのフィオナがいねえな」
line = "「ってあれ？　うちらのリーダーのはずのフィオナがいねえな」"

[[dialogue]]
speaker = "アポロ"
# 「問題ない！　フィオナの分まであたしが大活躍すればいいのだ！　魔王には負けんぞ！」
line = "「問題ない！　フィオナの分まであたしが大活躍すればいいのだ！　魔王には負けんぞ！」"

[[dialogue]]
speaker = "マトイ"
# 「まずいよ会長……このままじゃ私たちの負けになっちゃう」
line = "「まずいよ会長……このままじゃ私たちの負けになっちゃう」"

[[dialogue]]
speaker = "unk"
# まだ追いつける
line = "まだ追いつける"

[[dialogue]]
speaker = "unk"
# 新星は負けない
line = "新星は負けない"

[[dialogue]]
speaker = "ヴィーナス"
# 「──その意気よ！　ビーチバレーだってなんだって、負けるわけにはいかないんだから！」
line = "「──その意気よ！　ビーチバレーだってなんだって、負けるわけにはいかないんだから！」"

[[dialogue]]
speaker = "セーラ"
# 「あんなこと言ってるよ、ソフィアちゃん～？」
line = "「あんなこと言ってるよ、ソフィアちゃん～？」"

[[dialogue]]
speaker = "ソフィア"
# 「フフ……私のブリザードサーブで、息の根を止めて差し上げましょう」
line = "「フフ……私のブリザードサーブで、息の根を止めて差し上げましょう」"

[[dialogue]]
speaker = "unk"
# と、その時……
line = "と、その時……"

[[dialogue]]
speaker = "ソフィア"
# 「──ひゃああああああああああああああっっ！！！」
line = "「──ひゃああああああああああああああっっ！！！」"

[[dialogue]]
speaker = "unk"
# この冷風は……！
line = "この冷風は……！"

[[dialogue]]
speaker = "unk"
# 冬のイタズラだ
line = "冬のイタズラだ"

[[dialogue]]
speaker = "マトイ"
# 「寒かったぁ……！　もう、ホントいきなり吹くんだから」
line = "「寒かったぁ……！　もう、ホントいきなり吹くんだから」"

[[dialogue]]
speaker = "アナ"
# 「例の隙間風というやつですね。またしても『冬』が入り込んできてしまいましたか──」
line = "「例の隙間風というやつですね。またしても『冬』が入り込んできてしまいましたか──」"

[[dialogue]]
speaker = "ソフィア"
# 「うぅぅ許せません……！　こんな悪がはびこっていては、ろくにリゾートライフを満喫できません……！」
line = "「うぅぅ許せません……！　こんな悪がはびこっていては、ろくにリゾートライフを満喫できません……！」"

[[dialogue]]
speaker = "ルリエル"
# 「着替え早すぎ！？　いつの間に！？」
line = "「着替え早すぎ！？　いつの間に！？」"

[[dialogue]]
speaker = "リップル"
# 「──タ、タイヘンで～す！　ドナタか～！」
line = "「──タ、タイヘンで～す！　ドナタか～！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あら、リップルの声ね。行ってみましょう」
line = "「あら、リップルの声ね。行ってみましょう」"

[[dialogue]]
speaker = "アポロ"
# 「あ！　待てオマエ達、勝負はまだついてないぞ～！」
line = "「あ！　待てオマエ達、勝負はまだついてないぞ～！」"

[[dialogue]]
speaker = "ユウリ"
# 「──どうした、またかき氷が増えたか！？」
line = "「──どうした、またかき氷が増えたか！？」"

[[dialogue]]
speaker = "フィオナ"
# 「いえ、今度は鏡餅がなぜか突然降ってきて……」
line = "「いえ、今度は鏡餅がなぜか突然降ってきて……」"

[[dialogue]]
speaker = "ユウリ"
# 「冬のモンならなんでもアリなのか……？」
line = "「冬のモンならなんでもアリなのか……？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ていうかここにいたのね、フィオナ」
line = "「ていうかここにいたのね、フィオナ」"

[[dialogue]]
speaker = "ニャリオン"
# 「鏡餅だけじゃニャいニャン。海の家のメニューに、いつの間にかカニ鍋やおでんが書き加えられていたニャン！」
line = "「鏡餅だけじゃニャいニャン。海の家のメニューに、いつの間にかカニ鍋やおでんが書き加えられていたニャン！」"

[[dialogue]]
speaker = "リップル"
# 「シカシ、参りましたネ～。今年のフユは厳しいと聞きましたが、これほどトハ……」
line = "「シカシ、参りましたネ～。今年のフユは厳しいと聞きましたが、これほどトハ……」"

[[dialogue]]
speaker = "マトイ"
# 「これ、冬とかいう問題なの……？」
line = "「これ、冬とかいう問題なの……？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「けど、前までこんなことなかったのは確かね」
line = "「けど、前までこんなことなかったのは確かね」"

[[dialogue]]
speaker = "セーラ"
# 「うーん……だとしたら、リゾートの中に原因があったりしないかな？」
line = "「うーん……だとしたら、リゾートの中に原因があったりしないかな？」"

[[dialogue]]
speaker = "unk"
# 同感だ
line = "同感だ"

[[dialogue]]
speaker = "unk"
# 結界内は外の影響を受けない
line = "結界内は外の影響を受けない"

[[dialogue]]
speaker = "リップル"
# 「確かにデース！　リゾート結界もずいぶん広くナッテきましたから……チェックを怠っていたかもしれまセーン！」
line = "「確かにデース！　リゾート結界もずいぶん広くナッテきましたから……チェックを怠っていたかもしれまセーン！」"

[[dialogue]]
speaker = "アナ"
# 「確かに一理ありそうです」
line = "「確かに一理ありそうです」"

[[dialogue]]
speaker = "ソフィア"
# 「く……許せません！　なんとしても原因を突き止めるのです！」
line = "「く……許せません！　なんとしても原因を突き止めるのです！」"

[[dialogue]]
speaker = "ルリエル"
# 「おおっ、ソフィアが燃えています！」
line = "「おおっ、ソフィアが燃えています！」"

[[dialogue]]
speaker = "unk"
# 皆でビーチ内に散らばった怪しい異変がないかどうか探す。
line = "皆でビーチ内に散らばった怪しい異変がないかどうか探す。"

[[dialogue]]
speaker = "ソフィア"
# 「！　皆さん──こちらです！　こちらに来てください！」
line = "「！　皆さん──こちらです！　こちらに来てください！」"

[[dialogue]]
speaker = "ソフィア"
# 「ここです──ここに結界の『隙間』が生じています！」
line = "「ここです──ここに結界の『隙間』が生じています！」"

[[dialogue]]
speaker = "サーシャ"
# 「あら、ほんと。エアコンみたいに、冷たい風が入ってくるのを感じるわ」
line = "「あら、ほんと。エアコンみたいに、冷たい風が入ってくるのを感じるわ」"

[[dialogue]]
speaker = "unk"
# 目には見えないが……
line = "目には見えないが……"

[[dialogue]]
speaker = "unk"
# 確かに異質さを感じる
line = "確かに異質さを感じる"

[[dialogue]]
speaker = "リップル"
# 「ムム！　確かに結界にホコロビが生じてイマース」
line = "「ムム！　確かに結界にホコロビが生じてイマース」"

[[dialogue]]
speaker = "リップル"
# 「これもワタシのメンテ不足デース。ナルホド、隙間風はコレが原因でしタカ……」
line = "「これもワタシのメンテ不足デース。ナルホド、隙間風はコレが原因でしタカ……」"

[[dialogue]]
speaker = "ルリエル"
# 「とすると、他の『冬のイタズラ』も……？」
line = "「とすると、他の『冬のイタズラ』も……？」"

[[dialogue]]
speaker = "アナ"
# 「いえ。これだけではかき氷が増えたりする説明はつきません」
line = "「いえ。これだけではかき氷が増えたりする説明はつきません」"

[[dialogue]]
speaker = "アナ"
# 「それに、海の家のメニューを書き換えるなんて、何者かが動いていなければ難しいでしょう」
line = "「それに、海の家のメニューを書き換えるなんて、何者かが動いていなければ難しいでしょう」"

[[dialogue]]
speaker = "マトイ"
# 「確かに……隙間風ならまだしも……」
line = "「確かに……隙間風ならまだしも……」"

[[dialogue]]
speaker = "ソフィア"
# 「！　待ってください──今、そこで何かが動いたような」
line = "「！　待ってください──今、そこで何かが動いたような」"

[[dialogue]]
speaker = "アポロ"
# 「ム……そこか！？」
line = "「ム……そこか！？」"

[[dialogue]]
speaker = "？？？"
# 「くっくっく……バレてはシカタないナ」
line = "「くっくっく……バレてはシカタないナ」"

[[dialogue]]
speaker = "？？？"
# 「シカシ無駄なことデース。冬の訪れは止められナイのです」
line = "「シカシ無駄なことデース。冬の訪れは止められナイのです」"

[[dialogue]]
speaker = "アポロ"
# 「そ……その声は！？」
line = "「そ……その声は！？」"
