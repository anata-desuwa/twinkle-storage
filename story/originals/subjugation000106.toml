line = "「アルモタヘルさんは威圧感があるのと、あと食いしん坊なところでしょうか。燃費は義体の性能によるところが大きいと思うけど……」"

[[dialogue]]
speaker = "アルモタヘル"
# 「ううむ、難儀だな。性能を調整するには義体そのものを作り直す必要があるかもしれん」
line = "「ううむ、難儀だな。性能を調整するには義体そのものを作り直す必要があるかもしれん」"

[[dialogue]]
speaker = "アルモタヘル"
