[[dialogue]]
speaker = "マグダレナ"
# 「フィーニスの塔と世界の摂理を守護すること以外、私に何ができるのでしょうか」
line = "「フィーニスの塔と世界の摂理を守護すること以外、私に何ができるのでしょうか」"

[[dialogue]]
speaker = "コハルコ"
# 「ものすごく大変なお仕事だと思いますけど……」
line = "「ものすごく大変なお仕事だと思いますけど……」"

[[dialogue]]
speaker = "マグダレナ"
# 「いえ、今はそのフィーニスの塔さえ守れずに堕天使に身を堕としてしまいました。申し訳ありません、私はダメな守護天使です……」
line = "「いえ、今はそのフィーニスの塔さえ守れずに堕天使に身を堕としてしまいました。申し訳ありません、私はダメな守護天使です……」"

[[dialogue]]
speaker = "アルモタヘル"
# 「仕事には大なり小なり専門性があり、まず習得することから始めなければならない。働くことがこれほど難しいとは……ヒトは皆苦労しているのだな」
line = "「仕事には大なり小なり専門性があり、まず習得することから始めなければならない。働くことがこれほど難しいとは……ヒトは皆苦労しているのだな」"

[[dialogue]]
speaker = "アルモタヘル"
# 「しかし働いている間に腹が空いたらどうしているのだ？　皆そんなに我慢強いのか？　むぅ……想像を超える忍耐だ」
line = "「しかし働いている間に腹が空いたらどうしているのだ？　皆そんなに我慢強いのか？　むぅ……想像を超える忍耐だ」"

[[dialogue]]
speaker = "コハルコ"
# 「それはアルモタヘルさんだからのような……」
line = "「それはアルモタヘルさんだからのような……」"

[[dialogue]]
speaker = "マグダレナ"
# 「重ね重ね迷惑をおかけしてすみません。私には引きこもってドラマをエンドレス視聴するのがお似合いです……」
line = "「重ね重ね迷惑をおかけしてすみません。私には引きこもってドラマをエンドレス視聴するのがお似合いです……」"

[[dialogue]]
speaker = "アルモタヘル"
# 「我も働くことを甘く見ていた。我は物を食らうことしか能のない愚鈍な守護天使だ……」
line = "「我も働くことを甘く見ていた。我は物を食らうことしか能のない愚鈍な守護天使だ……」"

[[dialogue]]
speaker = "コハルコ"
# 「うーん、そろそろほんとに教皇庁に怒られそう……」
line = "「うーん、そろそろほんとに教皇庁に怒られそう……」"

[[dialogue]]
speaker = "コハルコ"
