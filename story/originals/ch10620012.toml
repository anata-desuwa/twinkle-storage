[[dialogue]]
speaker = "unk"
# 第２話,日傘探偵の秘密,P
line = "第２話,日傘探偵の秘密,P"

[[dialogue]]
speaker = "unk"
# ジュエリーと知り合ってから少し経ったある日のこと。
line = "ジュエリーと知り合ってから少し経ったある日のこと。"

[[dialogue]]
speaker = "unk"
# スケジュールがたまたま空いたのを見計らったかのように、彼女から大聖堂で会わないかと呼び出しを受けた――
line = "スケジュールがたまたま空いたのを見計らったかのように、彼女から大聖堂で会わないかと呼び出しを受けた――"

[[dialogue]]
speaker = "ジュエリー"
# 「やあ、我が助手。呼び出しに応じてくれて、ありがとう」
line = "「やあ、我が助手。呼び出しに応じてくれて、ありがとう」"

[[dialogue]]
speaker = "ジュエリー"
# 「ん？　何を読んでいたのかって？　私は昔から、謎や事件が大好物でね」
line = "「ん？　何を読んでいたのかって？　私は昔から、謎や事件が大好物でね」"

[[dialogue]]
speaker = "ジュエリー"
# 「推理小説はよく読むんだ。キミを待つついでに、昔たくさん読んだ懐かしい作品を読み返していたところさ」
line = "「推理小説はよく読むんだ。キミを待つついでに、昔たくさん読んだ懐かしい作品を読み返していたところさ」"

[[dialogue]]
speaker = "ジュエリー"
# 「この大聖堂は、この国に来てからお気に入りの場所でね。推理小説を読む時や、静かに過ごしたい時はよく足を運んでいるんだ」
line = "「この大聖堂は、この国に来てからお気に入りの場所でね。推理小説を読む時や、静かに過ごしたい時はよく足を運んでいるんだ」"

[[dialogue]]
speaker = "ジュエリー"
# 「その際には、こうして戦闘服に変身するのがお決まりになっている。ほらこれ、シスター服に似ているだろう？」
line = "「その際には、こうして戦闘服に変身するのがお決まりになっている。ほらこれ、シスター服に似ているだろう？」"

[[dialogue]]
speaker = "ジュエリー"
# 「自前で本当のシスター服も持っているのだが、こっちの方が着替えも一瞬で済むし、持ち歩かずに済むから面倒がなくていい。ふふっ、便利で助かっているよ」
line = "「自前で本当のシスター服も持っているのだが、こっちの方が着替えも一瞬で済むし、持ち歩かずに済むから面倒がなくていい。ふふっ、便利で助かっているよ」"

[[dialogue]]
speaker = "ジュエリー"
# 「それで、今回キミを呼び出した理由だけど、我が助手になったキミに、私のパーソナル情報を話しておこうと思ってね」
line = "「それで、今回キミを呼び出した理由だけど、我が助手になったキミに、私のパーソナル情報を話しておこうと思ってね」"

[[dialogue]]
speaker = "unk"
# いや、助手はまだ認めてないけどね！？
line = "いや、助手はまだ認めてないけどね！？"

[[dialogue]]
speaker = "ジュエリー"
# 「はは、私の想像では、すぐに認めることになっているよ」
line = "「はは、私の想像では、すぐに認めることになっているよ」"

[[dialogue]]
speaker = "ジュエリー"
# 「まあ、キミは星徒会長なわけだし、プリマステラでもある私のことを詳しく知っておいて、損はないだろう？」
line = "「まあ、キミは星徒会長なわけだし、プリマステラでもある私のことを詳しく知っておいて、損はないだろう？」"

[[dialogue]]
speaker = "ジュエリー"
# 「私が探偵だと、先日キミに知ってもらったわけだが、私の言う探偵というものは、おそらくキミが思っているものと、実は意味合いが違っていてね」
line = "「私が探偵だと、先日キミに知ってもらったわけだが、私の言う探偵というものは、おそらくキミが思っているものと、実は意味合いが違っていてね」"

[[dialogue]]
speaker = "ジュエリー"
# 「自分で言うのも恥ずかしいけれど、私は『名探偵』という役職なんだよ。生まれながらにね」
line = "「自分で言うのも恥ずかしいけれど、私は『名探偵』という役職なんだよ。生まれながらにね」"

[[dialogue]]
speaker = "ジュエリー"
# 「聞いたことはないかもしれないが、１つ、この世界に昔から存在しているワードを出そう。それは『<ruby=せんせいしゃ>選星者</ruby>』――海外では『ロールスター』とも呼ばれている」
line = "「聞いたことはないかもしれないが、１つ、この世界に昔から存在しているワードを出そう。それは『<ruby>選星者<rt>せんせいしゃ</rt></ruby>』――海外では『ロールスター』とも呼ばれている」"

[[dialogue]]
speaker = "ジュエリー"
# 「その名の通り、星に選ばれた者であり、『<ruby=ロール>役職</ruby>』という運命の星の元に生まれて来た者のことを指す。そして、その選星者の１人が、私なんだ」
line = "「その名の通り、星に選ばれた者であり、『<ruby>役職<rt>ロール</rt></ruby>』という運命の星の元に生まれて来た者のことを指す。そして、その選星者の１人が、私なんだ」"

[[dialogue]]
speaker = "ジュエリー"
# 「私の役職は、<b>名探偵</b>。ちなみに、他に例を挙げると『予言者』『大怪盗』などがある」
line = "「私の役職は、<b>名探偵</b>。ちなみに、他に例を挙げると『予言者』『大怪盗』などがある」"

[[dialogue]]
speaker = "ジュエリー"
# 「予言者は先日、キミにも少し話したね。キミが運命の相手であると教えてくれた、私の友人だよ。もう１つの大怪盗の方は、幾度となく取り逃がしている私の宿敵さ」
line = "「予言者は先日、キミにも少し話したね。キミが運命の相手であると教えてくれた、私の友人だよ。もう１つの大怪盗の方は、幾度となく取り逃がしている私の宿敵さ」"

[[dialogue]]
speaker = "ジュエリー"
# 「大怪盗『フランボウ』。現在進行形で、流星市国にも出没しているよ」
line = "「大怪盗『フランボウ』。現在進行形で、流星市国にも出没しているよ」"

[[dialogue]]
speaker = "ジュエリー"
# 「正体は私の想像も働かなくて、未だに分からない。そのうちキミの力を借りることもあるかもしれないね」
line = "「正体は私の想像も働かなくて、未だに分からない。そのうちキミの力を借りることもあるかもしれないね」"

[[dialogue]]
speaker = "ジュエリー"
# 「それはさておき、星に選ばれた名探偵としての私の使命は、世界に隠された謎を解き明かすことにある。リクリエがまさにそれさ」
line = "「それはさておき、星に選ばれた名探偵としての私の使命は、世界に隠された謎を解き明かすことにある。リクリエがまさにそれさ」"

[[dialogue]]
speaker = "ジュエリー"
# 「リクリエが何故起きるのか。その背景にはどうも、私は何者かの存在を感じずにはいられない。名探偵としての能力でね」
line = "「リクリエが何故起きるのか。その背景にはどうも、私は何者かの存在を感じずにはいられない。名探偵としての能力でね」"

[[dialogue]]
speaker = "ジュエリー"
# 「選星者はどうやって自らが選ばれた存在だと知るのかといえば、天からの啓示があるんだ。いつ啓示を受けたかは分からないけれど――」
line = "「選星者はどうやって自らが選ばれた存在だと知るのかといえば、天からの啓示があるんだ。いつ啓示を受けたかは分からないけれど――」"

[[dialogue]]
speaker = "ジュエリー"
# 「気付いた時には、確かに自分は選星者であり、どんな役目なのか、何の能力を持っているのかを自覚しているんだ」
line = "「気付いた時には、確かに自分は選星者であり、どんな役目なのか、何の能力を持っているのかを自覚しているんだ」"

[[dialogue]]
speaker = "ジュエリー"
# 「名探偵に与えられる能力は『事件が起きる場所を直感で察知出来る』というものだ。私はそれを使って、リクリエに関する痕跡を追って来た」
line = "「名探偵に与えられる能力は『事件が起きる場所を直感で察知出来る』というものだ。私はそれを使って、リクリエに関する痕跡を追って来た」"

[[dialogue]]
speaker = "ジュエリー"
# 「その結論として、裏で誰かが動いているという確信を得た。リクリエが迫りつつある現在、近いうちにその何者かは動き出すだろう」
line = "「その結論として、裏で誰かが動いているという確信を得た。リクリエが迫りつつある現在、近いうちにその何者かは動き出すだろう」"

[[dialogue]]
speaker = "ジュエリー"
# 「名探偵としての直感がそう告げている。だから会長、キミには私の助手として、リクリエの黒幕を捕まえる手伝いをして欲しいのさ」
line = "「名探偵としての直感がそう告げている。だから会長、キミには私の助手として、リクリエの黒幕を捕まえる手伝いをして欲しいのさ」"

[[dialogue]]
speaker = "ジュエリー"
# 「愛しているから側に置きたいという理由を抜きにしても、ね」
line = "「愛しているから側に置きたいという理由を抜きにしても、ね」"

[[dialogue]]
speaker = "unk"
# そういうことなら、ぜひ協力する
line = "そういうことなら、ぜひ協力する"

[[dialogue]]
speaker = "ジュエリー"
# 「ははっ、キミならそう言ってくれるだろうと想像していたよ。さすがは私が見込んだ男だ」
line = "「ははっ、キミならそう言ってくれるだろうと想像していたよ。さすがは私が見込んだ男だ」"

[[dialogue]]
speaker = "ジュエリー"
# 「引き受けてくれてありがとう。愛しているよ、我が助手♪」
line = "「引き受けてくれてありがとう。愛しているよ、我が助手♪」"

[[dialogue]]
speaker = "unk"
# そうして、俺はジュエリーの差し出した手を取り、握手を交わした。それが終わると、彼女は先程まで読んでいた推理小説を手渡して来た――
line = "そうして、俺はジュエリーの差し出した手を取り、握手を交わした。それが終わると、彼女は先程まで読んでいた推理小説を手渡して来た――"

[[dialogue]]
speaker = "ジュエリー"
# 「助手になってくれたキミに、私のもう１つ重要なパーソナリティーを明かそう」
line = "「助手になってくれたキミに、私のもう１つ重要なパーソナリティーを明かそう」"

[[dialogue]]
speaker = "ジュエリー"
# 「その推理小説――『ブラウン神父の童心』に登場する探偵のことを、キミは知っているかい？」
line = "「その推理小説――『ブラウン神父の童心』に登場する探偵のことを、キミは知っているかい？」"

[[dialogue]]
speaker = "unk"
# 蝙蝠傘を持っている探偵だっけ？
line = "蝙蝠傘を持っている探偵だっけ？"

[[dialogue]]
speaker = "unk"
# ブラウン神父……
line = "ブラウン神父……"

[[dialogue]]
speaker = "ジュエリー"
# 「世界三大探偵と呼ばれている内の１人さ。本名は『Ｊ・ブラウン』という」
line = "「世界三大探偵と呼ばれている内の１人さ。本名は『Ｊ・ブラウン』という」"

[[dialogue]]
speaker = "ジュエリー"
# 「イギリスを始めとして世界を飛び回り、各地の教会で司祭を勤めていた……アマチュアの探偵だ」
line = "「イギリスを始めとして世界を飛び回り、各地の教会で司祭を勤めていた……アマチュアの探偵だ」"

[[dialogue]]
speaker = "ジュエリー"
# 「好奇心旺盛で、謎や事件が大好物、真相を見抜くコツは『自分が犯人になりきること』だそうだよ。いやはや、笑ってしまうね」
line = "「好奇心旺盛で、謎や事件が大好物、真相を見抜くコツは『自分が犯人になりきること』だそうだよ。いやはや、笑ってしまうね」"

[[dialogue]]
speaker = "ジュエリー"
# 「どんな人だったのか、手に取るように想像が出来てしまう」
line = "「どんな人だったのか、手に取るように想像が出来てしまう」"

[[dialogue]]
speaker = "ジュエリー"
# 「それじゃあ、改めて名乗らせて貰うよ」
line = "「それじゃあ、改めて名乗らせて貰うよ」"

[[dialogue]]
speaker = "ジュエリー"
# 「私の名前は、<ruby=Ｊ>ジュエリー</ruby>・<b>ブラウン</b>。その小説で活躍が描かれた、ブラウン神父の子孫――」
line = "「私の名前は、<ruby>ジュエリー<rt>Ｊ</rt></ruby>・<b>ブラウン</b>。その小説で活躍が描かれた、ブラウン神父の子孫――」"

[[dialogue]]
speaker = "ジュエリー"
# 「日傘を差した名探偵さ」
line = "「日傘を差した名探偵さ」"
