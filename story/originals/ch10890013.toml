[[dialogue]]
speaker = "unk"
# 第３話,かつての強敵との邂逅,P
line = "第３話,かつての強敵との邂逅,P"

[[dialogue]]
speaker = "unk"
# 星徒会で借りた本の返却と資料の追加レンタルのため、図書館を訪れると、先客のシアン先輩の姿があった。
line = "星徒会で借りた本の返却と資料の追加レンタルのため、図書館を訪れると、先客のシアン先輩の姿があった。"

[[dialogue]]
speaker = "シアン"
# 「地図に観光ガイド……ああ、スラング辞典も借りておくか。他に必要なのは、っと……あんまり抱えてると目立っちまうか……？」
line = "「地図に観光ガイド……ああ、スラング辞典も借りておくか。他に必要なのは、っと……あんまり抱えてると目立っちまうか……？」"

[[dialogue]]
speaker = "シアン"
# 「ウィステリアは、いねえよな……？　ったく、なんでこんなコソコソしなきゃいけねえんだか……」
line = "「ウィステリアは、いねえよな……？　ったく、なんでこんなコソコソしなきゃいけねえんだか……」"

[[dialogue]]
speaker = "unk"
# たくさん本抱えて、何してるんです？
line = "たくさん本抱えて、何してるんです？"

[[dialogue]]
speaker = "シアン"
# 「うおっ、な、なんだ、会長さんか。あっちに気を取られて、気づけなかったぜ……不覚」
line = "「うおっ、な、なんだ、会長さんか。あっちに気を取られて、気づけなかったぜ……不覚」"

[[dialogue]]
speaker = "シアン"
# 「次の任務の資料探ししてるとこだよ。現地の地図や初めて行く国なら、独自の文化も事前に調べておかなきゃなんねえからな」
line = "「次の任務の資料探ししてるとこだよ。現地の地図や初めて行く国なら、独自の文化も事前に調べておかなきゃなんねえからな」"

[[dialogue]]
speaker = "シアン"
# 「現地人として潜入した時は些細なところでボロを出しちまいがちなんだ。こういう地味な仕事がわりと大事なんだぜ」
line = "「現地人として潜入した時は些細なところでボロを出しちまいがちなんだ。こういう地味な仕事がわりと大事なんだぜ」"

[[dialogue]]
speaker = "unk"
# 大変そうだし、なんか手伝いますよ
line = "大変そうだし、なんか手伝いますよ"

[[dialogue]]
speaker = "シアン"
# 「そりゃありがてえけど、面倒をかけるわけにはいかねえ。気持ちだけ受け取──」
line = "「そりゃありがてえけど、面倒をかけるわけにはいかねえ。気持ちだけ受け取──」"

[[dialogue]]
speaker = "シアン"
# 「──そ、そうだ、会長さん！　ここの資料の貸し出し、会長さんの名義でお願いできねえか？」
line = "「──そ、そうだ、会長さん！　ここの資料の貸し出し、会長さんの名義でお願いできねえか？」"

[[dialogue]]
speaker = "シアン"
# 「いや、人の名前で借りるのは良くないってのは、もちろんわかってるけどよ。あまり顔を合わせたくねえヤツがいてさ」
line = "「いや、人の名前で借りるのは良くないってのは、もちろんわかってるけどよ。あまり顔を合わせたくねえヤツがいてさ」"

[[dialogue]]
speaker = "シアン"
# 「ここの司書には、ちょっとばかし因縁が──」
line = "「ここの司書には、ちょっとばかし因縁が──」"

[[dialogue]]
speaker = "？？？"
# 「図書館ではお静かに」
line = "「図書館ではお静かに」"

[[dialogue]]
speaker = "シアン"
# 「ぎくっ！？」
line = "「ぎくっ！？」"

[[dialogue]]
speaker = "ウィステリア"
# 「会長くん、こんにちは」
line = "「会長くん、こんにちは」"

[[dialogue]]
speaker = "ウィステリア"
# 「読書？　それとも調べ物かしら？　会長の仕事で忙しいのに勤勉ね。偉いじゃない」
line = "「読書？　それとも調べ物かしら？　会長の仕事で忙しいのに勤勉ね。偉いじゃない」"

[[dialogue]]
speaker = "ウィステリア"
# 「でも、声のボリュームには気をつけて。周りの迷惑になるから……あら？」
line = "「でも、声のボリュームには気をつけて。周りの迷惑になるから……あら？」"

[[dialogue]]
speaker = "シアン"
# 「そろ～っ……」
line = "「そろ～っ……」"

[[dialogue]]
speaker = "ウィステリア"
# 「そちらのあなた、新星の生徒かしら？　あまり見ない顔だけれど」
line = "「そちらのあなた、新星の生徒かしら？　あまり見ない顔だけれど」"

[[dialogue]]
speaker = "シアン"
# 「あ、あ、あ、あたし！？　もちろんよ！　新星に転校してきたばかりで、シアンって言うの！」
line = "「あ、あ、あ、あたし！？　もちろんよ！　新星に転校してきたばかりで、シアンって言うの！」"

[[dialogue]]
speaker = "ウィステリア"
# 「あら……そうなの、ごめんなさい。シアンさんっていうの。とても良い名前ね」
line = "「あら……そうなの、ごめんなさい。シアンさんっていうの。とても良い名前ね」"

[[dialogue]]
speaker = "シアン"
# 「あ、あ、ありがとう。私も気に入ってる名前なの、オホ、オホホホホ」
line = "「あ、あ、ありがとう。私も気に入ってる名前なの、オホ、オホホホホ」"

[[dialogue]]
speaker = "ウィステリア"
# 「ん？　シアンさん……私、あなたと前にどこかで会ったことないかしら……」
line = "「ん？　シアンさん……私、あなたと前にどこかで会ったことないかしら……」"

[[dialogue]]
speaker = "シアン"
# 「い、いいえ？　全然？　ちっとも？　これっぽっちもあなたと会ったことなんてございませんわね」
line = "「い、いいえ？　全然？　ちっとも？　これっぽっちもあなたと会ったことなんてございませんわね」"

[[dialogue]]
speaker = "ウィステリア"
# 「そうかしら──あっ……もしかして」
line = "「そうかしら──あっ……もしかして」"

[[dialogue]]
speaker = "ウィステリア"
# 「ごめんなさい。きっと他人の空似ね。世の中には似た人が３人はいるというものね」
line = "「ごめんなさい。きっと他人の空似ね。世の中には似た人が３人はいるというものね」"

[[dialogue]]
speaker = "シアン"
# 「そうねー、きっとそっくりさんねー。そうに違いないわ。絶対そうよ。あたしに似てる人、会ってみたいなー」
line = "「そうねー、きっとそっくりさんねー。そうに違いないわ。絶対そうよ。あたしに似てる人、会ってみたいなー」"

[[dialogue]]
speaker = "ウィステリア"
# 「いけないいけない。まだ整頓が片付いてないのに、あまりお喋りしてたら夜中になっちゃうわ」
line = "「いけないいけない。まだ整頓が片付いてないのに、あまりお喋りしてたら夜中になっちゃうわ」"

[[dialogue]]
speaker = "ウィステリア"
# 「では、会長くん、シアンさん、ごゆっくり。くれぐれも、図書館ではお静かに」
line = "「では、会長くん、シアンさん、ごゆっくり。くれぐれも、図書館ではお静かに」"

[[dialogue]]
speaker = "シアン"
# 「どうも～……気をつけます～……」
line = "「どうも～……気をつけます～……」"

[[dialogue]]
speaker = "シアン"
# 「ふう……やれやれ、どうやら気づかれなかったみたいだな」
line = "「ふう……やれやれ、どうやら気づかれなかったみたいだな」"

[[dialogue]]
speaker = "シアン"
# 「ホッとしたけど、覚えられてなかったっつうのも屈辱だな……くそっ、どっちに転んでも複雑だぜ」
line = "「ホッとしたけど、覚えられてなかったっつうのも屈辱だな……くそっ、どっちに転んでも複雑だぜ」"

[[dialogue]]
speaker = "unk"
# 今のは……何？
line = "今のは……何？"

[[dialogue]]
speaker = "シアン"
# 「あ゛ー……あんまり言いたかねえんだけど……無理だよなあ……あれは気になっちまうよなあ……」
line = "「あ゛ー……あんまり言いたかねえんだけど……無理だよなあ……あれは気になっちまうよなあ……」"

[[dialogue]]
speaker = "シアン"
# 「やっちまったな……一応言っておくけど、いつもの任務じゃ、あんな失態はやらかしてねえからな……？」
line = "「やっちまったな……一応言っておくけど、いつもの任務じゃ、あんな失態はやらかしてねえからな……？」"

[[dialogue]]
speaker = "シアン"
# 「わかったわかった、話すよ。ただ場所は変えさせてくれ。またウィステリアに目をつけられてもなんだし」
line = "「わかったわかった、話すよ。ただ場所は変えさせてくれ。またウィステリアに目をつけられてもなんだし」"

[[dialogue]]
speaker = "シアン"
# 「でも、もう一度、顔合わせたら今度こそ気づかれるかもしれねえし……会長さん、これ借りてきてくれねえか？」
line = "「でも、もう一度、顔合わせたら今度こそ気づかれるかもしれねえし……会長さん、これ借りてきてくれねえか？」"

[[dialogue]]
speaker = "unk"
# 結局、俺の名義でシアンの任務資料を借りたのだった。
line = "結局、俺の名義でシアンの任務資料を借りたのだった。"

[[dialogue]]
speaker = "シアン"
# 「サンキュー。恩に着るよ、会長さん」
line = "「サンキュー。恩に着るよ、会長さん」"

[[dialogue]]
speaker = "unk"
# 礼には及ばないけれど、シアン先輩が一風変わった側面を見せてくれたお代ということにしておこう。
line = "礼には及ばないけれど、シアン先輩が一風変わった側面を見せてくれたお代ということにしておこう。"
