[[dialogue]]
speaker = "フィオナ"
# 「今まで尽くしてくれてありがとう。感謝しています」
line = "「今まで尽くしてくれてありがとう。感謝しています」"

[[dialogue]]
speaker = "ナオミ"
# 「いえ、もったいないお言葉です、フィオナお嬢様……」
line = "「いえ、もったいないお言葉です、フィオナお嬢様……」"

[[dialogue]]
speaker = "unk"
# 彼女はナオミ。メイド隊として１０年星見家に仕えてくれた女性で、今日が最後の勤務日だ。
line = "彼女はナオミ。メイド隊として１０年星見家に仕えてくれた女性で、今日が最後の勤務日だ。"

[[dialogue]]
speaker = "unk"
# 彼女は星見家メイド隊を辞め、故郷に帰って幼なじみの男性と結婚する。
line = "彼女は星見家メイド隊を辞め、故郷に帰って幼なじみの男性と結婚する。"

[[dialogue]]
speaker = "キリカ"
# 「今日までお疲れ様でした。メイド隊で培った技術と経験を活かし、夫を支えられる妻となって、良き家族を築いてください」
line = "「今日までお疲れ様でした。メイド隊で培った技術と経験を活かし、夫を支えられる妻となって、良き家族を築いてください」"

[[dialogue]]
speaker = "ナオミ"
# 「ぐす……先代メイド長のマリオンさんと、現在のメイド長のキリカさんには、厳しくも温かい指導を頂きました。おふたりに教わったことは忘れません」
line = "「ぐす……先代メイド長のマリオンさんと、現在のメイド長のキリカさんには、厳しくも温かい指導を頂きました。おふたりに教わったことは忘れません」"

[[dialogue]]
speaker = "フィオナ"
# 「ちょうどジューンブライドの時期だね。狙ったの？」
line = "「ちょうどジューンブライドの時期だね。狙ったの？」"

[[dialogue]]
speaker = "ナオミ"
# 「えへへ……ちょっと。運よく式場の予約が取れました」
line = "「えへへ……ちょっと。運よく式場の予約が取れました」"

[[dialogue]]
speaker = "フィオナ"
# 「ふふ。競争率高いって聞くもんね。きっといい式になるよ」
line = "「ふふ。競争率高いって聞くもんね。きっといい式になるよ」"

[[dialogue]]
speaker = "フィオナ"
# 「お幸せにね、ナオミ」
line = "「お幸せにね、ナオミ」"

[[dialogue]]
speaker = "ナオミ"
# 「はい。今まで本当に……ありがとうございました」
line = "「はい。今まで本当に……ありがとうございました」"

[[dialogue]]
speaker = "unk"
# 涙で顔をくしゃくしゃにしながら、幸せそうに笑うナオミを、晴れやかな気持ちで送り出した──
line = "涙で顔をくしゃくしゃにしながら、幸せそうに笑うナオミを、晴れやかな気持ちで送り出した──"

[[dialogue]]
speaker = "unk"
# ナオミが星見家を出た、その夜。
line = "ナオミが星見家を出た、その夜。"

[[dialogue]]
speaker = "ナミエル"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "フィオナ"
# 「真剣な顔してどうしたの、ナミエル？」
line = "「真剣な顔してどうしたの、ナミエル？」"

[[dialogue]]
speaker = "ナミエル"
# 「──！　申し訳ありません、つい考え込んでしまいました。すぐに業務に戻ります」
line = "「──！　申し訳ありません、つい考え込んでしまいました。すぐに業務に戻ります」"

[[dialogue]]
speaker = "フィオナ"
# 「ううん、別に責めてるわけじゃないよ。何か気になることがあるのかなと思って」
line = "「ううん、別に責めてるわけじゃないよ。何か気になることがあるのかなと思って」"

[[dialogue]]
speaker = "ナミエル"
# 「それは……その……」
line = "「それは……その……」"

[[dialogue]]
speaker = "フィオナ"
# 「ナオミのこと？」
line = "「ナオミのこと？」"

[[dialogue]]
speaker = "ナミエル"
# 「……はい。ナオミさんと……その家族について考えていました」
line = "「……はい。ナオミさんと……その家族について考えていました」"

[[dialogue]]
speaker = "ナミエル"
# 「お嬢様もご存じの通り、私は幼い頃に家族を事故で亡くしました。ですから両親のことはよく覚えておりません」
line = "「お嬢様もご存じの通り、私は幼い頃に家族を事故で亡くしました。ですから両親のことはよく覚えておりません」"

[[dialogue]]
speaker = "ナミエル"
# 「だから想像できないのです。ナオミさんがどのような家族を築くのか……良い家族とはどのようなものなのか……」
line = "「だから想像できないのです。ナオミさんがどのような家族を築くのか……良い家族とはどのようなものなのか……」"

[[dialogue]]
speaker = "フィオナ"
# 「ナミエル……」
line = "「ナミエル……」"

[[dialogue]]
speaker = "ナミエル"
# 「すみません。このようなめでたい日に、こんなお話を……」
line = "「すみません。このようなめでたい日に、こんなお話を……」"

[[dialogue]]
speaker = "フィオナ"
# 「ううん。いつかナミエルも、いい家族を持てるといいね」
line = "「ううん。いつかナミエルも、いい家族を持てるといいね」"

[[dialogue]]
speaker = "ナミエル"
# 「私が……家族を……」
line = "「私が……家族を……」"

[[dialogue]]
speaker = "ナミエル"
# 「そうですね。ありがとうございます、お嬢様。ではおやすみなさいませ」
line = "「そうですね。ありがとうございます、お嬢様。ではおやすみなさいませ」"

[[dialogue]]
speaker = "フィオナ"
# 「うん、ナミエルもおやすみ」
line = "「うん、ナミエルもおやすみ」"

[[dialogue]]
speaker = "キリカ"
# 「お嬢様。寝間着のお着替えをお持ちしました」
line = "「お嬢様。寝間着のお着替えをお持ちしました」"

[[dialogue]]
speaker = "フィオナ"
# 「うん、ありがと。……ところで、キリカは結婚したいって思うことある？」
line = "「うん、ありがと。……ところで、キリカは結婚したいって思うことある？」"

[[dialogue]]
speaker = "キリカ"
# 「当然です。代々星見家に仕えてきた上月家の者として、次の世代も育んでいかないといけませんから」
line = "「当然です。代々星見家に仕えてきた上月家の者として、次の世代も育んでいかないといけませんから」"

[[dialogue]]
speaker = "フィオナ"
# 「うーん、それは結婚願望とは違う気がするけど……」
line = "「うーん、それは結婚願望とは違う気がするけど……」"

[[dialogue]]
speaker = "フィオナ"
# （でもキリカが結婚について考えてたのはちょっと意外かも……）
line = "（でもキリカが結婚について考えてたのはちょっと意外かも……）"

[[dialogue]]
speaker = "フィオナ"
# 「キリカもそろそろ今日の仕事おしまいだよね。おやすみ」
line = "「キリカもそろそろ今日の仕事おしまいだよね。おやすみ」"

[[dialogue]]
speaker = "キリカ"
# 「はい、おやすみなさいませ。良い夜を」
line = "「はい、おやすみなさいませ。良い夜を」"

[[dialogue]]
speaker = "フィオナ"
# 「ジューンブライドかぁ……」
line = "「ジューンブライドかぁ……」"

[[dialogue]]
speaker = "unk"
# 結婚について、考えたことがない──というとウソになる。
line = "結婚について、考えたことがない──というとウソになる。"

[[dialogue]]
speaker = "unk"
# とはいえ、ちゃんとした考えがあるわけでもない。
line = "とはいえ、ちゃんとした考えがあるわけでもない。"

[[dialogue]]
speaker = "unk"
# 好きな人が隣にいて、綺麗な式場で、純白のドレスを着て式を挙げる──小さな女の子の憧れのような、そんな漠然とした想像だ。
line = "好きな人が隣にいて、綺麗な式場で、純白のドレスを着て式を挙げる──小さな女の子の憧れのような、そんな漠然とした想像だ。"

[[dialogue]]
speaker = "unk"
# でも──
line = "でも──"

[[dialogue]]
speaker = "フィオナ"
# 「結婚……いいなぁ……」
line = "「結婚……いいなぁ……」"

[[dialogue]]
speaker = "unk"
# その夜。
line = "その夜。"

[[dialogue]]
speaker = "unk"
# 数年に一度の規模の、強烈な太陽フレアが発生した。
line = "数年に一度の規模の、強烈な太陽フレアが発生した。"

[[dialogue]]
speaker = "unk"
# 太陽フレアは強い電磁波を生じさせるものの、現行の電子機器は対策されており、影響が起きることはない。
line = "太陽フレアは強い電磁波を生じさせるものの、現行の電子機器は対策されており、影響が起きることはない。"

[[dialogue]]
speaker = "unk"
# ないのだが……
line = "ないのだが……"

[[dialogue]]
speaker = "unk"
# 繁華街にアステラが出現。流星星徒会のメンバーで討伐に当たる。
line = "繁華街にアステラが出現。流星星徒会のメンバーで討伐に当たる。"

[[dialogue]]
speaker = "フィオナ"
# 「行くよ、みんな！」
line = "「行くよ、みんな！」"

[[dialogue]]
speaker = "ユウリ"
# 「おわっ！？　フィオナ、なんだその格好は！？」
line = "「おわっ！？　フィオナ、なんだその格好は！？」"

[[dialogue]]
speaker = "セーラ"
# 「お～、フィオナちゃん大胆♪」
line = "「お～、フィオナちゃん大胆♪」"

[[dialogue]]
speaker = "ルリエル"
# 「ほぇ～、とってもお綺麗なのです♪」
line = "「ほぇ～、とってもお綺麗なのです♪」"

[[dialogue]]
speaker = "フィオナ"
# 「え？　私、変な格好してる……？　大胆？　綺麗？」
line = "「え？　私、変な格好してる……？　大胆？　綺麗？」"

[[dialogue]]
speaker = "ソフィア"
# 「もしかして気付いておられないんですか？　その、ご自分で確認された方が……」
line = "「もしかして気付いておられないんですか？　その、ご自分で確認された方が……」"

[[dialogue]]
speaker = "unk"
# 星徒会のみんなの反応を不思議に思って、自分の姿をＤＩＳＣのカメラで映すと──
line = "星徒会のみんなの反応を不思議に思って、自分の姿をＤＩＳＣのカメラで映すと──"

[[dialogue]]
speaker = "フィオナ"
# 「えええ～～～っ！！？」
line = "「えええ～～～っ！！？」"
