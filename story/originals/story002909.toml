[[dialogue]]
speaker = "unk"
# 滞りなくプログラムは進み、『星霊祭』６日目。
line = "滞りなくプログラムは進み、『星霊祭』６日目。"

[[dialogue]]
speaker = "マグダレナ"
# 『本日の最初の競技は槍投げです。新星学園からはミルフィーさんが出場ですね』
line = "『本日の最初の競技は槍投げです。新星学園からはミルフィーさんが出場ですね』"

[[dialogue]]
speaker = "ミルフィー"
# 「すぅ、ふぅ、すぅ、ふぅ……！」
line = "「すぅ、ふぅ、すぅ、ふぅ……！」"

[[dialogue]]
speaker = "シノ"
# 『ミルフィーさん、呼吸を整えて、槍を構えます。玉入れでも大活躍でしたし、大記録を打ち立ててくれそうな勢いを感じますね』
line = "『ミルフィーさん、呼吸を整えて、槍を構えます。玉入れでも大活躍でしたし、大記録を打ち立ててくれそうな勢いを感じますね』"

[[dialogue]]
speaker = "ミルフィー"
# （まだ、まだだよ……焦らなくていい……雰囲気に飲まれちゃダメ……心は落ち着かせて……精神を研ぎ澄まして……）
line = "（まだ、まだだよ……焦らなくていい……雰囲気に飲まれちゃダメ……心は落ち着かせて……精神を研ぎ澄まして……）"

[[dialogue]]
speaker = "ヒヨ"
# 「姐さーん！　思いっきりやっちまえー！」
line = "「姐さーん！　思いっきりやっちまえー！」"

[[dialogue]]
speaker = "unk"
# 決めろ、ミルフィーッ！
line = "決めろ、ミルフィーッ！"

[[dialogue]]
speaker = "ミルフィー"
# （こんなにも激しい大歓声の中でも……聞こえたよ、ヒヨちゃんと会長くんの声！）
line = "（こんなにも激しい大歓声の中でも……聞こえたよ、ヒヨちゃんと会長くんの声！）"

[[dialogue]]
speaker = "シノ"
# 『ミルフィーさん、駆け出す！　いい助走ですね。これは──出ますよ』
line = "『ミルフィーさん、駆け出す！　いい助走ですね。これは──出ますよ』"

[[dialogue]]
speaker = "ミルフィー"
# 「てぇぃりゃああぁぁぁぁぁぁっ！」
line = "「てぇぃりゃああぁぁぁぁぁぁっ！」"

[[dialogue]]
speaker = "シノ"
# 『気合一閃！　ミルフィーさんの放った槍は空を裂き、なんとアリーナの端まで飛んでいきました！』
line = "『気合一閃！　ミルフィーさんの放った槍は空を裂き、なんとアリーナの端まで飛んでいきました！』"

[[dialogue]]
speaker = "マグダレナ"
# 『まあまあまあ。文句なしの大会新記録ですね』
line = "『まあまあまあ。文句なしの大会新記録ですね』"

[[dialogue]]
speaker = "ミルフィー"
# 「はぁ、はぁっ、はぁっ……やったぁっ……！　マグダレナ様と、みんなに格好いいとこ見せられたよねっ！」
line = "「はぁ、はぁっ、はぁっ……やったぁっ……！　マグダレナ様と、みんなに格好いいとこ見せられたよねっ！」"

[[dialogue]]
speaker = "シノ"
# 『さぁ星霊祭も、ついに残るは最終競技、学園対抗リレーを残すのみとなりました』
line = "『さぁ星霊祭も、ついに残るは最終競技、学園対抗リレーを残すのみとなりました』"

[[dialogue]]
speaker = "マグダレナ"
# 『現時点では僅かながら新星学園がリードしていますが、学園対抗リレーは高得点。逆転の可能性も十分にあり得ますね』
line = "『現時点では僅かながら新星学園がリードしていますが、学園対抗リレーは高得点。逆転の可能性も十分にあり得ますね』"

[[dialogue]]
speaker = "フラン"
# 「最終競技は、待ちに待った学園対抗リレーだぜ！　応援にも力が入るってもんだ！」
line = "「最終競技は、待ちに待った学園対抗リレーだぜ！　応援にも力が入るってもんだ！」"

[[dialogue]]
speaker = "ミルフィー"
# 「リレーは大量得点だからね！　ここで勝てば、大きくアドバンテージを取れるよ！」
line = "「リレーは大量得点だからね！　ここで勝てば、大きくアドバンテージを取れるよ！」"

[[dialogue]]
speaker = "美鶴"
# 「逆に言うと、ここを落としたら逆転されるね。何が何でも勝っとかないと」
line = "「逆に言うと、ここを落としたら逆転されるね。何が何でも勝っとかないと」"

[[dialogue]]
speaker = "カティア"
# 「大玉転がしの雪辱を果たすワン！　むふーっ！」
line = "「大玉転がしの雪辱を果たすワン！　むふーっ！」"

[[dialogue]]
speaker = "ヒヨ"
# 「鼻息荒くしすぎて転ぶんじゃねえぞ」
line = "「鼻息荒くしすぎて転ぶんじゃねえぞ」"

[[dialogue]]
speaker = "フラン"
# 「新星ーっ！　ファイッオー！」
line = "「新星ーっ！　ファイッオー！」"

[[dialogue]]
speaker = "美鶴"
# 「ゴー・ファイト・ウィン」
line = "「ゴー・ファイト・ウィン」"

[[dialogue]]
speaker = "ミルフィー"
# 「ヒヨちゃん、カティアちゃん、あれだけ練習したんだもん、絶対に大丈夫！　悔いが残らないようにね！」
line = "「ヒヨちゃん、カティアちゃん、あれだけ練習したんだもん、絶対に大丈夫！　悔いが残らないようにね！」"

[[dialogue]]
speaker = "ヒヨ"
# 「姐さん……！　よっしゃ、行ってくるぜい！」
line = "「姐さん……！　よっしゃ、行ってくるぜい！」"

[[dialogue]]
speaker = "カティア"
# 「行ってきますワン！　魔王様っ、応援してくださいね！」
line = "「行ってきますワン！　魔王様っ、応援してくださいね！」"

[[dialogue]]
speaker = "マグダレナ"
# 『泣いても笑っても、最終競技です。学園対抗リレー、位置について──よーい……ドン♪』
line = "『泣いても笑っても、最終競技です。学園対抗リレー、位置について──よーい……ドン♪』"

[[dialogue]]
speaker = "unk"
# ピストルの合図とともに、第一走者が勢いよくスタートを切った。
line = "ピストルの合図とともに、第一走者が勢いよくスタートを切った。"

[[dialogue]]
speaker = "unk"
# 抜いては抜かれ、抜かれては抜き、走者を交代しながら一進一退のレースが続く。
line = "抜いては抜かれ、抜かれては抜き、走者を交代しながら一進一退のレースが続く。"

[[dialogue]]
speaker = "ミルフィー"
# 「行っけー行け行け、新星！　押っせー押せ押せ、し・ん・せ・いっ！」
line = "「行っけー行け行け、新星！　押っせー押せ押せ、し・ん・せ・いっ！」"

[[dialogue]]
speaker = "シノ"
# 『さあ、学園対抗リレーも終盤戦。両校ともに応援も白熱しています』
line = "『さあ、学園対抗リレーも終盤戦。両校ともに応援も白熱しています』"

[[dialogue]]
speaker = "マグダレナ"
# 『テイクオーバーゾーンには５人目のランナーが控えています。アンカーにバトンを託す重要な役目ですね』
line = "『テイクオーバーゾーンには５人目のランナーが控えています。アンカーにバトンを託す重要な役目ですね』"

[[dialogue]]
speaker = "ヒヨ"
# 「ふーっ、さすがに緊張してきたぜぇ……手汗がすげえや」
line = "「ふーっ、さすがに緊張してきたぜぇ……手汗がすげえや」"

[[dialogue]]
speaker = "ヒヨ"
# 「あたしがぶっちぎって、ワン公にバトンを渡す……それだけ考えてりゃいい……！」
line = "「あたしがぶっちぎって、ワン公にバトンを渡す……それだけ考えてりゃいい……！」"

[[dialogue]]
speaker = "ミルフィー"
# 「頑張って、ヒヨちゃーんっ！」
line = "「頑張って、ヒヨちゃーんっ！」"

[[dialogue]]
speaker = "ヒヨ"
# 「姐さんの期待にも応えなきゃ──」
line = "「姐さんの期待にも応えなきゃ──」"

[[dialogue]]
speaker = "マグダレナ"
# 『新星学園がわずかにリード。５人目のランナー、ヒヨ選手にバトンが渡ります』
line = "『新星学園がわずかにリード。５人目のランナー、ヒヨ選手にバトンが渡ります』"

[[dialogue]]
speaker = "新星陸上部"
# 「ヒヨ、お願い──あっ！？」
line = "「ヒヨ、お願い──あっ！？」"

[[dialogue]]
speaker = "ヒヨ"
# 「あっ！？　しまったぁ！」
line = "「あっ！？　しまったぁ！」"

[[dialogue]]
speaker = "シノ"
# 『汗で滑ってしまったようですね。渡されたはずのバトンは弾かれて転がってしまいました。痛恨のパスミスです』
line = "『汗で滑ってしまったようですね。渡されたはずのバトンは弾かれて転がってしまいました。痛恨のパスミスです』"

[[dialogue]]
speaker = "流星生徒Ａ"
# 「ラッキー！　お先にっ！」
line = "「ラッキー！　お先にっ！」"

[[dialogue]]
speaker = "マグダレナ"
# 『一方、流星学園のバトンパスはスムーズにおこなわれました。ここで順位が入れ替わります』
line = "『一方、流星学園のバトンパスはスムーズにおこなわれました。ここで順位が入れ替わります』"

[[dialogue]]
speaker = "ヒヨ"
# 「ちいっ！　まだ諦めるような差じゃねえやっ！」
line = "「ちいっ！　まだ諦めるような差じゃねえやっ！」"

[[dialogue]]
speaker = "ミルフィー"
# 「大丈夫っ、大丈夫だよっ！　がんばれ、ヒヨーっ！」
line = "「大丈夫っ、大丈夫だよっ！　がんばれ、ヒヨーっ！」"

[[dialogue]]
speaker = "ミルフィー"
# 「みんなも声援を送って！　名前を呼んであげてーっ！」
line = "「みんなも声援を送って！　名前を呼んであげてーっ！」"

[[dialogue]]
speaker = "美鶴"
# 「みんな、いくよー。ヒーヨッ、ヒーヨッ、ヒーヨッ」
line = "「みんな、いくよー。ヒーヨッ、ヒーヨッ、ヒーヨッ」"

[[dialogue]]
speaker = "応援団員"
# 「ヒーヨッ！　ヒーヨッ！　ヒーヨッ！　ヒーヨッ！」
line = "「ヒーヨッ！　ヒーヨッ！　ヒーヨッ！　ヒーヨッ！」"

[[dialogue]]
speaker = "unk"
# ヒーヨッ！　ヒーヨッ！　ヒーヨッ！　ヒーヨッ！
line = "ヒーヨッ！　ヒーヨッ！　ヒーヨッ！　ヒーヨッ！"

[[dialogue]]
speaker = "unk"
# 新星学園の生徒たち一斉のヒヨコールはアリーナを揺るがす。
line = "新星学園の生徒たち一斉のヒヨコールはアリーナを揺るがす。"

[[dialogue]]
speaker = "ヒヨ"
# 「こっ恥ずかしいったらありゃしねえ！　だけど、不思議なことにもりもりと力が湧いてくる！」
line = "「こっ恥ずかしいったらありゃしねえ！　だけど、不思議なことにもりもりと力が湧いてくる！」"

[[dialogue]]
speaker = "ヒヨ"
# 「姐さんたちの応援がありゃ、百人力さあっ！」
line = "「姐さんたちの応援がありゃ、百人力さあっ！」"

[[dialogue]]
speaker = "シノ"
# 『ヒヨ選手、超加速です！　彼女の小さな体のどこに、これだけの瞬発力が眠っていたのでしょう！』
line = "『ヒヨ選手、超加速です！　彼女の小さな体のどこに、これだけの瞬発力が眠っていたのでしょう！』"

[[dialogue]]
speaker = "ヒヨ"
# 「小さいは余計でえっ！　もうちょい、もうちょいなのによぉ！　くそっ、これでも、届かねえかっ！」
line = "「小さいは余計でえっ！　もうちょい、もうちょいなのによぉ！　くそっ、これでも、届かねえかっ！」"

[[dialogue]]
speaker = "カティア"
# 「ヒヨーっ！　こっちこっちー！」
line = "「ヒヨーっ！　こっちこっちー！」"

[[dialogue]]
speaker = "ヒヨ"
# 「リード作って、ワン公に楽させるつもりだったのによぉ……まったく不甲斐ねえ」
line = "「リード作って、ワン公に楽させるつもりだったのによぉ……まったく不甲斐ねえ」"

[[dialogue]]
speaker = "ヒヨ"
# 「頼んだぜ、ワン公！　おまえさんのトップスピード、見せつけてやんなあ！」
line = "「頼んだぜ、ワン公！　おまえさんのトップスピード、見せつけてやんなあ！」"

[[dialogue]]
speaker = "unk"
# パシッ！
line = "パシッ！"

[[dialogue]]
speaker = "カティア"
# 「やってやるワーンっ！」
line = "「やってやるワーンっ！」"

[[dialogue]]
speaker = "マグダレナ"
# 『今度は大丈夫ですね。アンカーのカティア選手へと、バトンは確実に託されました』
line = "『今度は大丈夫ですね。アンカーのカティア選手へと、バトンは確実に託されました』"

[[dialogue]]
speaker = "ヒヨ"
# 「ああ……そういや、ワン公のヤツ、どんなに壁に突っ込んだり、転んだりしてもよぉ」
line = "「ああ……そういや、ワン公のヤツ、どんなに壁に突っ込んだり、転んだりしてもよぉ」"

[[dialogue]]
speaker = "ヒヨ"
# 「あたしとのバトンタッチをミスったことは、一度もなかったなぁ……」
line = "「あたしとのバトンタッチをミスったことは、一度もなかったなぁ……」"

[[dialogue]]
speaker = "ヒヨ"
# 「やっちまえーっ！　カティアーっ！」
line = "「やっちまえーっ！　カティアーっ！」"

[[dialogue]]
speaker = "カティア"
# 「ワォオォォォォォォォンッ！！」
line = "「ワォオォォォォォォォンッ！！」"

[[dialogue]]
speaker = "ヒヨ"
# 「へへ、いい返事じゃねえか……」
line = "「へへ、いい返事じゃねえか……」"

[[dialogue]]
speaker = "ミルフィー"
# 「ヒヨちゃん、大丈夫っ！？　すごい走りだったよっ！　頑張ったね！　私、感動しちゃったよ！」
line = "「ヒヨちゃん、大丈夫っ！？　すごい走りだったよっ！　頑張ったね！　私、感動しちゃったよ！」"

[[dialogue]]
speaker = "ヒヨ"
# 「へへ、ちょっと星力を使いすぎちまったみてえで……ちょいとだけ姐さんの胸の中で、休ませてくんなあ」
line = "「へへ、ちょっと星力を使いすぎちまったみてえで……ちょいとだけ姐さんの胸の中で、休ませてくんなあ」"

[[dialogue]]
speaker = "unk"
# 学園対抗リレーの勝負の行方は、アンカーのカティアに託された──
line = "学園対抗リレーの勝負の行方は、アンカーのカティアに託された──"
