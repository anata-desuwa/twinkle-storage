[[dialogue]]
speaker = "unk"
# 第１６話,摂理の再構築,B
line = "第１６話,摂理の再構築,B"

[[dialogue]]
speaker = "ガーディアン・オルサ"
# 「ピ……ピ……ガガ──ピ──────戦闘不能。戦闘不能。侵入者データヲ上層ヘ送……信……」
line = "「ピ……ピ……ガガ──ピ──────戦闘不能。戦闘不能。侵入者データヲ上層ヘ送……信……」"

[[dialogue]]
speaker = "クロト"
# 「──終わったか」
line = "「──終わったか」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふう……最後だけあって、なかなか手強かったわね！」
line = "「ふう……最後だけあって、なかなか手強かったわね！」"

[[dialogue]]
speaker = "ニャリオン"
# 「ニャーッニャッニャッ！　それでもワガハイとフィオナ嬢にかかれば容易いことなのニャン！」
line = "「ニャーッニャッニャッ！　それでもワガハイとフィオナ嬢にかかれば容易いことなのニャン！」"

[[dialogue]]
speaker = "フィオナ"
# 「（最後の音声は、なかなか不穏に聞こえましたが……）」
line = "「（最後の音声は、なかなか不穏に聞こえましたが……）」"

[[dialogue]]
speaker = "unk"
# ボスガーディアンを打倒した俺たち。
line = "ボスガーディアンを打倒した俺たち。"

[[dialogue]]
speaker = "unk"
# すると、フロアの中心に謎の光が瞬き出した。
line = "すると、フロアの中心に謎の光が瞬き出した。"

[[dialogue]]
speaker = "フィオナ"
# 「この輝きは……」
line = "「この輝きは……」"

[[dialogue]]
speaker = "マグダレナ"
# 「ようこそここまでおいてくださいました……星騎士の者たち。それに、御子よ」
line = "「ようこそここまでおいてくださいました……星騎士の者たち。それに、御子よ」"

[[dialogue]]
speaker = "ニャリオン"
# 「ニャ！　あの時の堕天使なのニャン！」
line = "「ニャ！　あの時の堕天使なのニャン！」"

[[dialogue]]
speaker = "クロト"
# 「ってことは、《境界》の──！」
line = "「ってことは、《境界》の──！」"

[[dialogue]]
speaker = "unk"
# 聖なる輝きをまとって現れた一人の天使──
line = "聖なる輝きをまとって現れた一人の天使──"

[[dialogue]]
speaker = "unk"
# ニャリオンとフィオナが遭遇した、アステラに囚われていたマグダレナという存在だった。
line = "ニャリオンとフィオナが遭遇した、アステラに囚われていたマグダレナという存在だった。"

[[dialogue]]
speaker = "クロト"
# 「ヴィーナスを呼んでた声って……もしかして？」
line = "「ヴィーナスを呼んでた声って……もしかして？」"

[[dialogue]]
speaker = "マグダレナ"
# 「ここはフィーニスの塔の第一階層──その終着点にあたります。塔に生じている異常から、辿り着くのも容易ではなかったでしょう」
line = "「ここはフィーニスの塔の第一階層──その終着点にあたります。塔に生じている異常から、辿り着くのも容易ではなかったでしょう」"

[[dialogue]]
speaker = "フィオナ"
# 「はい。マグダレナ様、私たちは貴女より授かった栞を手に参じました。これは一体……？」
line = "「はい。マグダレナ様、私たちは貴女より授かった栞を手に参じました。これは一体……？」"

[[dialogue]]
speaker = "マグダレナ"
# 「私は守護天使。元来、フィーニスの塔を守る者。しかし……今、その本体はここから遠く離れた地に縛められています」
line = "「私は守護天使。元来、フィーニスの塔を守る者。しかし……今、その本体はここから遠く離れた地に縛められています」"

[[dialogue]]
speaker = "ヴィーナス"
# 「第一階層……って言ってたけど、守護天使って他にもいるの？」
line = "「第一階層……って言ってたけど、守護天使って他にもいるの？」"

[[dialogue]]
speaker = "マグダレナ"
# 「恐らく私はこのまま堕天使として呑まれるでしょう。あなた方がここに来られたのであれば心配は要りませんが……」
line = "「恐らく私はこのまま堕天使として呑まれるでしょう。あなた方がここに来られたのであれば心配は要りませんが……」"

[[dialogue]]
speaker = "ニャリオン"
# 「さっきからあまり返答になっていないのニャ……？」
line = "「さっきからあまり返答になっていないのニャ……？」"

[[dialogue]]
speaker = "クロト"
# 「──マグダレナさん。こちらの声が聞こえますか」
line = "「──マグダレナさん。こちらの声が聞こえますか」"

[[dialogue]]
speaker = "unk"
# 返事はない。
line = "返事はない。"

[[dialogue]]
speaker = "unk"
# それによくよく聞くと受け答えにズレがあるというか……会話が成立していない？
line = "それによくよく聞くと受け答えにズレがあるというか……会話が成立していない？"

[[dialogue]]
speaker = "マグダレナ"
# 「今の私はこの地に紐付けられただけの思念体──こちらから一方的にお話することをお許しください」
line = "「今の私はこの地に紐付けられただけの思念体──こちらから一方的にお話することをお許しください」"

[[dialogue]]
speaker = "フィオナ"
# 「ホログラムみたいなもの……ということでしょうか」
line = "「ホログラムみたいなもの……ということでしょうか」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ほんとだ、実体がない」
line = "「ほんとだ、実体がない」"

[[dialogue]]
speaker = "unk"
# ヴィーナスの伸ばした手が空を切る。
line = "ヴィーナスの伸ばした手が空を切る。"

[[dialogue]]
speaker = "unk"
# 守護天使──マグダレナさんは、ここではないどこかに別の本体があると言った。
line = "守護天使──マグダレナさんは、ここではないどこかに別の本体があると言った。"

[[dialogue]]
speaker = "unk"
# 質問することはできないので、俺たちはそのまま彼女の言葉を待つ。
line = "質問することはできないので、俺たちはそのまま彼女の言葉を待つ。"

[[dialogue]]
speaker = "マグダレナ"
# 「御子よ。そこにおりますね。これより三界に生じている事象を説明いたします」
line = "「御子よ。そこにおりますね。これより三界に生じている事象を説明いたします」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ミコって……やっぱり私？」
line = "「ミコって……やっぱり私？」"

[[dialogue]]
speaker = "キリカ"
# 「これまでの文脈を踏まえますと、恐らく」
line = "「これまでの文脈を踏まえますと、恐らく」"

[[dialogue]]
speaker = "unk"
# ミコ──
line = "ミコ──"

[[dialogue]]
speaker = "unk"
# 発音こそ変わらなかったが、マグダレナさんの発したニュアンスは“巫女”ではないように聞こえた。
line = "発音こそ変わらなかったが、マグダレナさんの発したニュアンスは“巫女”ではないように聞こえた。"

[[dialogue]]
speaker = "マグダレナ"
# 「端的に申し上げましょう。リクリエとは主の意思すらも越えた──摂理の再構築によるものです」
line = "「端的に申し上げましょう。リクリエとは主の意思すらも越えた──摂理の再構築によるものです」"

[[dialogue]]
speaker = "クロト"
# 「……！　摂理の、再構築──？」
line = "「……！　摂理の、再構築──？」"

[[dialogue]]
speaker = "フィオナ"
# 「主の意志すらも……つまり……女神様の意図によるものではない、と？」
line = "「主の意志すらも……つまり……女神様の意図によるものではない、と？」"

[[dialogue]]
speaker = "unk"
# 訊きたいことは今にも山ほどあった。
line = "訊きたいことは今にも山ほどあった。"

[[dialogue]]
speaker = "unk"
# だが、対話はできないのでおとなしく言葉を待つ。
line = "だが、対話はできないのでおとなしく言葉を待つ。"

[[dialogue]]
speaker = "マグダレナ"
# 「今、世界は未曾有の危機にさらされています。この塔に起きている異常もその一端にすぎません」
line = "「今、世界は未曾有の危機にさらされています。この塔に起きている異常もその一端にすぎません」"

[[dialogue]]
speaker = "マグダレナ"
# 「三界の『徹底的な破滅』。その未来がすぐにでも近づいているのです」
line = "「三界の『徹底的な破滅』。その未来がすぐにでも近づいているのです」"

[[dialogue]]
speaker = "フィオナ"
# 「……穏当な響きではありませんね」
line = "「……穏当な響きではありませんね」"

[[dialogue]]
speaker = "ニャリオン"
# 「でも、最近の騒がしさを考えるとしっくり来るニャン……」
line = "「でも、最近の騒がしさを考えるとしっくり来るニャン……」"

[[dialogue]]
speaker = "unk"
# 三千年前にクルセイダースたちが撃退したという前回のリクリエ。
line = "三千年前にクルセイダースたちが撃退したという前回のリクリエ。"

[[dialogue]]
speaker = "unk"
# その揺り戻しは、彼女たち──守護天使にとっても想定外なほど大きいという。
line = "その揺り戻しは、彼女たち──守護天使にとっても想定外なほど大きいという。"

[[dialogue]]
speaker = "マグダレナ"
# 「御子よ。あなたはあなたの使命を果たすのです。あなたは、既にそれを授かっているはず」
line = "「御子よ。あなたはあなたの使命を果たすのです。あなたは、既にそれを授かっているはず」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私の……使命……」
line = "「私の……使命……」"

[[dialogue]]
speaker = "unk"
# マグダレナさん──の映像──は、明確にヴィーナスのみに語りかけていた。
line = "マグダレナさん──の映像──は、明確にヴィーナスのみに語りかけていた。"

[[dialogue]]
speaker = "unk"
# その真意は、ヴィーナス本人さえもわかっていないように見える。
line = "その真意は、ヴィーナス本人さえもわかっていないように見える。"

[[dialogue]]
speaker = "マグダレナ"
# 「私が主に託された力の一端を御子に捧げます。どうかお役立てください──」
line = "「私が主に託された力の一端を御子に捧げます。どうかお役立てください──」"

[[dialogue]]
speaker = "ヴィーナス"
# 「────っっ……！！」
line = "「────っっ……！！」"

[[dialogue]]
speaker = "クロト"
# 「ヴィーナス──！」
line = "「ヴィーナス──！」"

[[dialogue]]
speaker = "unk"
# マグダレナさんの差し出した両掌から、光の球体のようなものがヴィーナスへ吸い込まれていった。
line = "マグダレナさんの差し出した両掌から、光の球体のようなものがヴィーナスへ吸い込まれていった。"

[[dialogue]]
speaker = "unk"
# そのまばゆい白き光は、日誌と共鳴したあの栞に宿っていたものと同じで──
line = "そのまばゆい白き光は、日誌と共鳴したあの栞に宿っていたものと同じで──"

[[dialogue]]
speaker = "ニャリオン"
# 「九浄の娘が進化したのニャ！」
line = "「九浄の娘が進化したのニャ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「もっと別の言い方ないの……？」
line = "「もっと別の言い方ないの……？」"

[[dialogue]]
speaker = "マグダレナ"
# 「御子よ。この塔の頂を目指すのです。そして……」
line = "「御子よ。この塔の頂を目指すのです。そして……」"

[[dialogue]]
speaker = "マグダレナ"
# 「──星見フィオナ。緋宮クロト。この２名こそが、あなたの使命を果たす鍵となるでしょう」
line = "「──星見フィオナ。緋宮クロト。この２名こそが、あなたの使命を果たす鍵となるでしょう」"

[[dialogue]]
speaker = "フィオナ"
# 「！」
line = "「！」"

[[dialogue]]
speaker = "クロト"
# 「俺たちが……？」
line = "「俺たちが……？」"

[[dialogue]]
speaker = "unk"
# マグダレナさんはこの場に俺たちが揃っていることまでは想定していなかった。
line = "マグダレナさんはこの場に俺たちが揃っていることまでは想定していなかった。"

[[dialogue]]
speaker = "unk"
# どうやら“御子”とは違った意味で──俺たちを重視しているらしく……
line = "どうやら“御子”とは違った意味で──俺たちを重視しているらしく……"

[[dialogue]]
speaker = "マグダレナ"
# 「できればこのままあなた方を導いて差し上げたいところですが……そうもいかないようですね」
line = "「できればこのままあなた方を導いて差し上げたいところですが……そうもいかないようですね」"

[[dialogue]]
speaker = "クロト"
# 「！　まずい、映像が──」
line = "「！　まずい、映像が──」"

[[dialogue]]
speaker = "unk"
# マグダレナさんの存在感が乱れ始める。
line = "マグダレナさんの存在感が乱れ始める。"

[[dialogue]]
speaker = "マグダレナ"
# 「御子よ──この──っ──塔を──昇るのです──さすれば────」
line = "「御子よ──この──っ──塔を──昇るのです──さすれば────」"

[[dialogue]]
speaker = "unk"
# マグダレナさんが全てを言い終えるより早く──
line = "マグダレナさんが全てを言い終えるより早く──"

[[dialogue]]
speaker = "unk"
# 発生した紫色の瘴気が、彼女ごと包み込んで消してしまった。
line = "発生した紫色の瘴気が、彼女ごと包み込んで消してしまった。"

[[dialogue]]
speaker = "ニャリオン"
# 「い、今の影は見覚えがあるニャン」
line = "「い、今の影は見覚えがあるニャン」"

[[dialogue]]
speaker = "フィオナ"
# 「……アステラで彼女を“堕天使”たらしめていたものと同じですね」
line = "「……アステラで彼女を“堕天使”たらしめていたものと同じですね」"

[[dialogue]]
speaker = "クロト"
# 「彼女の本体はこの後、堕天使に堕ちた──ってことか？」
line = "「彼女の本体はこの後、堕天使に堕ちた──ってことか？」"

[[dialogue]]
speaker = "unk"
# だとしても、俺たちにこれ以上追う術はなさそうだった。
line = "だとしても、俺たちにこれ以上追う術はなさそうだった。"

[[dialogue]]
speaker = "キリカ"
# 「守護天使……こうして塔に配置されていた以上、彼女は恐らく極めて高位の天使であったことが推察されます。それが……」
line = "「守護天使……こうして塔に配置されていた以上、彼女は恐らく極めて高位の天使であったことが推察されます。それが……」"

[[dialogue]]
speaker = "フィオナ"
# 「ええ。堕天使として呑まれ、私たちに希望を託さざるを得なかった状況……ただ事ではありませんね」
line = "「ええ。堕天使として呑まれ、私たちに希望を託さざるを得なかった状況……ただ事ではありませんね」"

[[dialogue]]
speaker = "unk"
# そして、これらの事象は全て……あるひとつの原因に端を発している。
line = "そして、これらの事象は全て……あるひとつの原因に端を発している。"

[[dialogue]]
speaker = "クロト"
# 「リクリエ……か」
line = "「リクリエ……か」"

[[dialogue]]
speaker = "unk"
# 事態はどうやら──俺たちが考えていたよりも深刻なのかもしれない。
line = "事態はどうやら──俺たちが考えていたよりも深刻なのかもしれない。"

[[dialogue]]
speaker = "フィオナ"
# 「それに……ヴィーナスさんは大丈夫？　何かを渡されたみたいだけど……頭痛はもうない？」
line = "「それに……ヴィーナスさんは大丈夫？　何かを渡されたみたいだけど……頭痛はもうない？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「う、うん。平気というか、むしろパワーアップした感じというか…………バッチリよ！」
line = "「う、うん。平気というか、むしろパワーアップした感じというか…………バッチリよ！」"

[[dialogue]]
speaker = "unk"
# 調子はいつものヴィーナスだった。
line = "調子はいつものヴィーナスだった。"

[[dialogue]]
speaker = "unk"
# どころか、確かに以前より覇気が強まっているのを感じる。
line = "どころか、確かに以前より覇気が強まっているのを感じる。"

[[dialogue]]
speaker = "ヴィーナス"
# 「それに……何でかわからないけど……」
line = "「それに……何でかわからないけど……」"

[[dialogue]]
speaker = "クロト"
# 「？」
line = "「？」"

[[dialogue]]
speaker = "unk"
# ヴィーナスはかの日誌を取り出すと、中身をめくってから顔を上げて言った。
line = "ヴィーナスはかの日誌を取り出すと、中身をめくってから顔を上げて言った。"

[[dialogue]]
speaker = "ヴィーナス"
# 「また──増えてるの。未来の記述が……もっと、先まで」
line = "「また──増えてるの。未来の記述が……もっと、先まで」"

[[dialogue]]
speaker = "unk"
# それは。
line = "それは。"

[[dialogue]]
speaker = "unk"
# 俺たちを混沌へ誘う、ほんの序章にすぎないのかもしれなかった。
line = "俺たちを混沌へ誘う、ほんの序章にすぎないのかもしれなかった。"

[[dialogue]]
speaker = "ギエル"
# 「……守護天使の消滅を確認。ガーディアンは一機残らず再起不能。フィーニスの塔第一階層は事実上の陥落を呈しています」
line = "「……守護天使の消滅を確認。ガーディアンは一機残らず再起不能。フィーニスの塔第一階層は事実上の陥落を呈しています」"

[[dialogue]]
speaker = "ギエル"
# 「いかがいたしましょう、アポロ様」
line = "「いかがいたしましょう、アポロ様」"

[[dialogue]]
speaker = "アポロ"
# 「決まってんじゃん。あたしはそろそろ暴れたくてウズウズしてんのさ！」
line = "「決まってんじゃん。あたしはそろそろ暴れたくてウズウズしてんのさ！」"

[[dialogue]]
speaker = "ギエル"
# 「は。流石は偉大なる英雄アポロ様──このギエル、感服の至りに存じます」
line = "「は。流石は偉大なる英雄アポロ様──このギエル、感服の至りに存じます」"

[[dialogue]]
speaker = "アポロ"
# 「わっはっは！　そう褒めるなギエル！　褒めるならグミくれ」
line = "「わっはっは！　そう褒めるなギエル！　褒めるならグミくれ」"

[[dialogue]]
speaker = "ギエル"
# 「今日の分は既にお渡ししました。なんなら明日の分も」
line = "「今日の分は既にお渡ししました。なんなら明日の分も」"

[[dialogue]]
speaker = "アポロ"
# 「ちぇっ」
line = "「ちぇっ」"

[[dialogue]]
speaker = "アポロ"
# 「──まあいい！　これでようやくヒーローの活躍する舞台が整ったってわけだからな！」
line = "「──まあいい！　これでようやくヒーローの活躍する舞台が整ったってわけだからな！」"

[[dialogue]]
speaker = "アポロ"
# 「魔王だって旧世界だって……このアポロ様がひとつ残らずぐっちゃぐちゃにしてやるぜ！」
line = "「魔王だって旧世界だって……このアポロ様がひとつ残らずぐっちゃぐちゃにしてやるぜ！」"
