[[dialogue]]
speaker = "unk"
# 第４話,ちょっと早めに,P
line = "第４話,ちょっと早めに,P"

[[dialogue]]
speaker = "unk"
# 夕霧庵で提供するスイーツの試作を重ねていた俺とナナカ。
line = "夕霧庵で提供するスイーツの試作を重ねていた俺とナナカ。"

[[dialogue]]
speaker = "unk"
# やっと完成したので、みんなに試食をしてもらうことになった。
line = "やっと完成したので、みんなに試食をしてもらうことになった。"

[[dialogue]]
speaker = "ナナカ"
# 「じゃじゃーん！　これが夕霧庵の新メニュー候補、そば茶プリンでーすっ！」
line = "「じゃじゃーん！　これが夕霧庵の新メニュー候補、そば茶プリンでーすっ！」"

[[dialogue]]
speaker = "ロロット"
# 「おお～、ちょうどおいしいおやつがほしいと思っていたところなのです～」
line = "「おお～、ちょうどおいしいおやつがほしいと思っていたところなのです～」"

[[dialogue]]
speaker = "ナナカ"
# 「よかったら、食べて感想聞かせて。ロロちゃんだけじゃなくて、ルリちゃんもね」
line = "「よかったら、食べて感想聞かせて。ロロちゃんだけじゃなくて、ルリちゃんもね」"

[[dialogue]]
speaker = "ルリエル"
# 「はいっ、試食の大役、しっかり務めさせて頂きますっ！」
line = "「はいっ、試食の大役、しっかり務めさせて頂きますっ！」"

[[dialogue]]
speaker = "ナナカ"
# 「あんがとね。ほんとはもっと人数いたらよかったんだけど、みんな捕まらなくてさ」
line = "「あんがとね。ほんとはもっと人数いたらよかったんだけど、みんな捕まらなくてさ」"

[[dialogue]]
speaker = "ナナカ"
# 「ま、何はともあれ、さっそく試食いってみよう♪　はい、スプーン持って～」
line = "「ま、何はともあれ、さっそく試食いってみよう♪　はい、スプーン持って～」"

[[dialogue]]
speaker = "unk"
# いただきます！
line = "いただきます！"

[[dialogue]]
speaker = "ロロット"
# 「こ、これは……！　とってもなめらかで、おいしいのです～！」
line = "「こ、これは……！　とってもなめらかで、おいしいのです～！」"

[[dialogue]]
speaker = "ルリエル"
# 「そば茶の香りが落ち着きますね。甘さも優しくて、わたし、好きかもです」
line = "「そば茶の香りが落ち着きますね。甘さも優しくて、わたし、好きかもです」"

[[dialogue]]
speaker = "ナナカ"
# 「よかった～。なかなかの好感触、だよね？」
line = "「よかった～。なかなかの好感触、だよね？」"

[[dialogue]]
speaker = "ロロット"
# 「プリンでありながら和の香りを感じますし、食後のデザートにもさっぱりと食べられそうなのです。これは別腹もお腹いっぱいになってしまいそうですねぇ～」
line = "「プリンでありながら和の香りを感じますし、食後のデザートにもさっぱりと食べられそうなのです。これは別腹もお腹いっぱいになってしまいそうですねぇ～」"

[[dialogue]]
speaker = "ルリエル"
# 「こんなスイーツ初めてです。向こうに戻ったら食べられなくなっちゃうのが残念ですね」
line = "「こんなスイーツ初めてです。向こうに戻ったら食べられなくなっちゃうのが残念ですね」"

[[dialogue]]
speaker = "ナナカ"
# 「それなら、会長が作れるからさ、食べたくなったら頼めばいいと思うよ」
line = "「それなら、会長が作れるからさ、食べたくなったら頼めばいいと思うよ」"

[[dialogue]]
speaker = "ロロット"
# 「ふむ……これだけでも満足ですが、おソバを食べた後のデザートとして味わうのも、魅力的かもしれませんねぇ。おっと、食いしん坊ではありませんよ」
line = "「ふむ……これだけでも満足ですが、おソバを食べた後のデザートとして味わうのも、魅力的かもしれませんねぇ。おっと、食いしん坊ではありませんよ」"

[[dialogue]]
speaker = "ナナカ"
# 「ロロちゃん、いいこと言った！　次はおソバとセットにして試してみよう！」
line = "「ロロちゃん、いいこと言った！　次はおソバとセットにして試してみよう！」"

[[dialogue]]
speaker = "unk"
# 夕霧庵に移動する？
line = "夕霧庵に移動する？"

[[dialogue]]
speaker = "ナナカ"
# 「うーん、それは明日にしとこうかな。うちも営業中だしね」
line = "「うーん、それは明日にしとこうかな。うちも営業中だしね」"

[[dialogue]]
speaker = "ロロット"
# 「となると、予定が空いてしまいましたね。皆さんは、この後どうされるのでしょう？」
line = "「となると、予定が空いてしまいましたね。皆さんは、この後どうされるのでしょう？」"

[[dialogue]]
speaker = "ルリエル"
# 「わたしはフィオナ会長のところに行こうかなって思ってます」
line = "「わたしはフィオナ会長のところに行こうかなって思ってます」"

[[dialogue]]
speaker = "ロロット"
# 「おお！　では、わたしもご一緒させてもらいましょう。あの方とも、もっとお話しがしたいのです♪」
line = "「おお！　では、わたしもご一緒させてもらいましょう。あの方とも、もっとお話しがしたいのです♪」"

[[dialogue]]
speaker = "ルリエル"
# 「どうぞどうぞ～。ロロットさんならフィオナ会長も大歓迎ですよ～」
line = "「どうぞどうぞ～。ロロットさんならフィオナ会長も大歓迎ですよ～」"

[[dialogue]]
speaker = "unk"
# こっちはどうする？
line = "こっちはどうする？"

[[dialogue]]
speaker = "ナナカ"
# 「そうさねぇ……」
line = "「そうさねぇ……」"

[[dialogue]]
speaker = "ナナカ"
# 「おっ、そうだっ！　よければ流星町をもうちょっとだけ案内させてよ」
line = "「おっ、そうだっ！　よければ流星町をもうちょっとだけ案内させてよ」"

[[dialogue]]
speaker = "ナナカ"
# 「せっかくだし、アタシしか知らないような穴場にも連れて行きたいんだ～。ね、いいでしょ？」
line = "「せっかくだし、アタシしか知らないような穴場にも連れて行きたいんだ～。ね、いいでしょ？」"

[[dialogue]]
speaker = "ナナカ"
# 「ふぅ～、遊んだ遊んだ～」
line = "「ふぅ～、遊んだ遊んだ～」"

[[dialogue]]
speaker = "ナナカ"
# 「どう？　流星町もなかなかのもんでしょ？」
line = "「どう？　流星町もなかなかのもんでしょ？」"

[[dialogue]]
speaker = "ナナカ"
# 「会長はもうすぐ帰っちゃうけどさ、それでもアタシたちが暮らすこの町のこと、ちょっとでも好きになってくれたら、嬉しいなってね」
line = "「会長はもうすぐ帰っちゃうけどさ、それでもアタシたちが暮らすこの町のこと、ちょっとでも好きになってくれたら、嬉しいなってね」"

[[dialogue]]
speaker = "unk"
# とても楽しかったよ
line = "とても楽しかったよ"

[[dialogue]]
speaker = "ナナカ"
# 「そうっしょ、そうっしょ。なんたって、このアタシのエスコートなんだから！」
line = "「そうっしょ、そうっしょ。なんたって、このアタシのエスコートなんだから！」"

[[dialogue]]
speaker = "ナナカ"
# 「ま、ほんとなら、もっといっぱい色んなとこ連れてってあげたかったんだけど……タイムアップかね」
line = "「ま、ほんとなら、もっといっぱい色んなとこ連れてってあげたかったんだけど……タイムアップかね」"

[[dialogue]]
speaker = "ナナカ"
# 「っていうか、アタシがスウィーツ同好会の活動や新メニューの考案に付き合わせたりしなきゃ、もっといろいろ出来たんだろうけどさ」
line = "「っていうか、アタシがスウィーツ同好会の活動や新メニューの考案に付き合わせたりしなきゃ、もっといろいろ出来たんだろうけどさ」"

[[dialogue]]
speaker = "ナナカ"
# 「会長は特に振り回しちゃったよね。シンにもよく注意されるんだけど、アタシってばこういう性格なもんでね～」
line = "「会長は特に振り回しちゃったよね。シンにもよく注意されるんだけど、アタシってばこういう性格なもんでね～」"

[[dialogue]]
speaker = "unk"
# ナナカらしくていいと思うよ
line = "ナナカらしくていいと思うよ"

[[dialogue]]
speaker = "ナナカ"
# 「うん、アタシもそう思う。シンだって、アタシはこのままでいいって、言ってくれてるしさ」
line = "「うん、アタシもそう思う。シンだって、アタシはこのままでいいって、言ってくれてるしさ」"

[[dialogue]]
speaker = "ナナカ"
# 「たははっ、のろけちゃって悪いねぇ。会長もメルエルのことで、のろけちまってもいいんじゃないの？」
line = "「たははっ、のろけちゃって悪いねぇ。会長もメルエルのことで、のろけちまってもいいんじゃないの？」"

[[dialogue]]
speaker = "ナナカ"
# 「どうなのさ、相談とか、してみちゃったりする？」
line = "「どうなのさ、相談とか、してみちゃったりする？」"

[[dialogue]]
speaker = "unk"
# 大事なことだから自分で考えるよ
line = "大事なことだから自分で考えるよ"

[[dialogue]]
speaker = "ナナカ"
# 「おっ、そいつはそうだね。うんうん、そうしてあげて♪」
line = "「おっ、そいつはそうだね。うんうん、そうしてあげて♪」"

[[dialogue]]
speaker = "ナナカ"
# 「アタシも、シンのことはなかなか他の人には相談出来ないし」
line = "「アタシも、シンのことはなかなか他の人には相談出来ないし」"

[[dialogue]]
speaker = "ナナカ"
# 「あ、今こうやって話してんのは、相談じゃないからねっ。誤解しないよーに」
line = "「あ、今こうやって話してんのは、相談じゃないからねっ。誤解しないよーに」"

[[dialogue]]
speaker = "ナナカ"
# 「まぁ結局さ……大事なことは、自分で考えて決めなきゃいけないんだよね……そんなことわかってるってのに」
line = "「まぁ結局さ……大事なことは、自分で考えて決めなきゃいけないんだよね……そんなことわかってるってのに」"

[[dialogue]]
speaker = "ナナカ"
# 「メルエルのことも、勝手にいろいろ言っちゃってごめんね。余計なお世話だったかもしんない」
line = "「メルエルのことも、勝手にいろいろ言っちゃってごめんね。余計なお世話だったかもしんない」"

[[dialogue]]
speaker = "ナナカ"
# 「でもっ、メルエルの話を聞いて、会長のこと、もっと知れたから、結果オーライかな」
line = "「でもっ、メルエルの話を聞いて、会長のこと、もっと知れたから、結果オーライかな」"

[[dialogue]]
speaker = "ナナカ"
# 「今回は、ほんとあんがとねっ。スウィーツのことも、それ以外のことも」
line = "「今回は、ほんとあんがとねっ。スウィーツのことも、それ以外のことも」"

[[dialogue]]
speaker = "ナナカ"
# 「会長はもうすぐ帰っちゃうけどさ、きっとまた会えるよね？」
line = "「会長はもうすぐ帰っちゃうけどさ、きっとまた会えるよね？」"

[[dialogue]]
speaker = "unk"
# きっと会えるよ
line = "きっと会えるよ"

[[dialogue]]
speaker = "ナナカ"
# 「だよねっ。１回どころか２回も来てるんだし、こりゃ３回目もあるってこった！」
line = "「だよねっ。１回どころか２回も来てるんだし、こりゃ３回目もあるってこった！」"

[[dialogue]]
speaker = "ナナカ"
# 「どうせまた、何かのトラブルに巻き込まれちゃうんだろうけど……それはそれか」
line = "「どうせまた、何かのトラブルに巻き込まれちゃうんだろうけど……それはそれか」"

[[dialogue]]
speaker = "ナナカ"
# 「そんじゃ、あっちに帰る時は他にも大勢いると思うから、今ここで言っとくよ」
line = "「そんじゃ、あっちに帰る時は他にも大勢いると思うから、今ここで言っとくよ」"

[[dialogue]]
speaker = "ナナカ"
# 「またね！　次は、もっともっと一緒に遊ぼうじゃないの！」
line = "「またね！　次は、もっともっと一緒に遊ぼうじゃないの！」"

[[dialogue]]
speaker = "unk"
# またね、ナナカ
line = "またね、ナナカ"

[[dialogue]]
speaker = "ナナカ"
# 「あいよっ。ってことで、ちょっと早めのお別れ終了～♪」
line = "「あいよっ。ってことで、ちょっと早めのお別れ終了～♪」"

[[dialogue]]
speaker = "ナナカ"
# 「これで当日は泣かないで済むね。あっ、アタシじゃないよ、会長のことに決まってるでしょうが」
line = "「これで当日は泣かないで済むね。あっ、アタシじゃないよ、会長のことに決まってるでしょうが」"

[[dialogue]]
speaker = "unk"
# こうして俺とナナカは、一足早い別れを済ませたのだった。
line = "こうして俺とナナカは、一足早い別れを済ませたのだった。"
