[[dialogue]]
speaker = "unk"
# 第１話,選挙管理委員会,B
line = "第１話,選挙管理委員会,B"

[[dialogue]]
speaker = "梨緒"
# 「ライトニングテンペスト！！」
line = "「ライトニングテンペスト！！」"

[[dialogue]]
speaker = "クロト"
# 「ディマイズブレイカー！！」
line = "「ディマイズブレイカー！！」"

[[dialogue]]
speaker = "ラティエ"
# 「勝者──緋宮クロト！」
line = "「勝者──緋宮クロト！」"

[[dialogue]]
speaker = "unk"
# 季節外れの転入生・梨緒との御前試合に勝利してから数ヶ月。
line = "季節外れの転入生・梨緒との御前試合に勝利してから数ヶ月。"

[[dialogue]]
speaker = "unk"
# 新種の機械型モンスターは引き続き出現している。
line = "新種の機械型モンスターは引き続き出現している。"

[[dialogue]]
speaker = "unk"
# 確かに強力ではあるものの、星騎士たちの成長や戦闘データの蓄積によって、対処もしやすくなってきた。
line = "確かに強力ではあるものの、星騎士たちの成長や戦闘データの蓄積によって、対処もしやすくなってきた。"

[[dialogue]]
speaker = "unk"
# リクリエが完全に収まる様子は見えないが、フィヴォス流星群のような大規模な破滅の兆候もない。今は比較的平和が続いているといえるだろう。
line = "リクリエが完全に収まる様子は見えないが、フィヴォス流星群のような大規模な破滅の兆候もない。今は比較的平和が続いているといえるだろう。"

[[dialogue]]
speaker = "unk"
# そして梨緒はというと──
line = "そして梨緒はというと──"

[[dialogue]]
speaker = "梨緒"
# 「緋宮会長。選挙管理委員会として、君に勝負を申し込む！」
line = "「緋宮会長。選挙管理委員会として、君に勝負を申し込む！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「また性懲りもなく勝負を仕掛けるつもり？」
line = "「また性懲りもなく勝負を仕掛けるつもり？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「だいたい、新星学園には星徒会選挙なんてないでしょう。星徒会長は前会長の指名で決まるんだから」
line = "「だいたい、新星学園には星徒会選挙なんてないでしょう。星徒会長は前会長の指名で決まるんだから」"

[[dialogue]]
speaker = "梨緒"
# 「そうだ、この学園に選挙はない。通常の場合はな」
line = "「そうだ、この学園に選挙はない。通常の場合はな」"

[[dialogue]]
speaker = "梨緒"
# 「だが全校生徒の３分の２の賛成があれば、星徒会長をリコールすることが可能だ。その場合、星徒会長を選挙で決めることになる」
line = "「だが全校生徒の３分の２の賛成があれば、星徒会長をリコールすることが可能だ。その場合、星徒会長を選挙で決めることになる」"

[[dialogue]]
speaker = "梨緒"
# 「もし星徒会長がその職責にふさわしくない行為を行った場合、全校生徒に対してリコールを発議する」
line = "「もし星徒会長がその職責にふさわしくない行為を行った場合、全校生徒に対してリコールを発議する」"

[[dialogue]]
speaker = "梨緒"
# 「それが私の立ち上げた選挙管理委員会──選管だ」
line = "「それが私の立ち上げた選挙管理委員会──選管だ」"

[[dialogue]]
speaker = "梨緒"
# 「よって、私は緋宮クロトが星徒会長に値する人物か、監視する責務がある」
line = "「よって、私は緋宮クロトが星徒会長に値する人物か、監視する責務がある」"

[[dialogue]]
speaker = "梨緒"
# 「もし緋宮クロトが驕り、会長にふさわしくない人物となったなら、容赦なく引き摺り下ろさせてもらう」
line = "「もし緋宮クロトが驕り、会長にふさわしくない人物となったなら、容赦なく引き摺り下ろさせてもらう」"

[[dialogue]]
speaker = "unk"
# 俺が御前試合で勝ってからも、梨緒は俺を会長の座から降ろそうとしていた。
line = "俺が御前試合で勝ってからも、梨緒は俺を会長の座から降ろそうとしていた。"

[[dialogue]]
speaker = "梨緒"
# 「君はいずれ悪しき魔王に堕ち、世界を滅ぼす」
line = "「君はいずれ悪しき魔王に堕ち、世界を滅ぼす」"

[[dialogue]]
speaker = "unk"
# もちろん悪の魔王になるつもりはないけど、リクリエの力を内に封じた俺に、異変が起こらないという保証はない。
line = "もちろん悪の魔王になるつもりはないけど、リクリエの力を内に封じた俺に、異変が起こらないという保証はない。"

[[dialogue]]
speaker = "unk"
# だから星徒会長としての責務を果たせなくなった時、俺を止めてくれる存在は居てくれた方がいいし、会長として気を抜けないのも悪いことではないと思うのだ。
line = "だから星徒会長としての責務を果たせなくなった時、俺を止めてくれる存在は居てくれた方がいいし、会長として気を抜けないのも悪いことではないと思うのだ。"

[[dialogue]]
speaker = "ヴィーナス"
# 「ちなみにあなた、今まで何回負けてるんだっけ？」
line = "「ちなみにあなた、今まで何回負けてるんだっけ？」"

[[dialogue]]
speaker = "梨緒"
# 「……１２７回だ」
line = "「……１２７回だ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「なんでそこまでちゃんと数えてるのよ……」
line = "「なんでそこまでちゃんと数えてるのよ……」"

[[dialogue]]
speaker = "梨緒"
# 「私は敗北を忘れない。悔しさを糧にするためにな」
line = "「私は敗北を忘れない。悔しさを糧にするためにな」"

[[dialogue]]
speaker = "unk"
# 梨緒とはいろんな勝負をしてきた。
line = "梨緒とはいろんな勝負をしてきた。"

[[dialogue]]
speaker = "unk"
# モンスターの討伐はもちろん、書類の整理だったり、ＤＩＳＣの連絡先の数だったり。
line = "モンスターの討伐はもちろん、書類の整理だったり、ＤＩＳＣの連絡先の数だったり。"

[[dialogue]]
speaker = "unk"
# 僅差で危ないことはあったが、梨緒の言った１２７戦、全て俺が勝ってきた。
line = "僅差で危ないことはあったが、梨緒の言った１２７戦、全て俺が勝ってきた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「心構えは立派だと思うけど、さすがに負けすぎじゃない？」
line = "「心構えは立派だと思うけど、さすがに負けすぎじゃない？」"

[[dialogue]]
speaker = "梨緒"
# 「うっ」
line = "「うっ」"

[[dialogue]]
speaker = "サーシャ"
# 「あ、会長くん、ちょっといい？　ベリーダンス部の臨時予算申請なんだけど、根拠が弱い気がするのよね～」
line = "「あ、会長くん、ちょっといい？　ベリーダンス部の臨時予算申請なんだけど、根拠が弱い気がするのよね～」"

[[dialogue]]
speaker = "梨緒"
# 「弱い！？」
line = "「弱い！？」"

[[dialogue]]
speaker = "サーシャ"
# 「それと新しく設置を検討しているグラウンドのフェンス、改めて見直すと必要ないかもしれないわ～」
line = "「それと新しく設置を検討しているグラウンドのフェンス、改めて見直すと必要ないかもしれないわ～」"

[[dialogue]]
speaker = "梨緒"
# 「必要ない！？」
line = "「必要ない！？」"

[[dialogue]]
speaker = "梨緒"
# 「うぅ……私は１２７回勝負して１勝もできない、弱くて、誰からも必要とされない人間なんだ……」
line = "「うぅ……私は１２７回勝負して１勝もできない、弱くて、誰からも必要とされない人間なんだ……」"

[[dialogue]]
speaker = "クロト"
# 「梨緒のことじゃないんだけど……」
line = "「梨緒のことじゃないんだけど……」"

[[dialogue]]
speaker = "unk"
# 梨緒は何度も俺に勝負を挑む反面、些細なことで傷つく一面もあった。
line = "梨緒は何度も俺に勝負を挑む反面、些細なことで傷つく一面もあった。"

[[dialogue]]
speaker = "unk"
# 自信がないのか、自分に向けられた言葉でなくても反応してしまうようだ。
line = "自信がないのか、自分に向けられた言葉でなくても反応してしまうようだ。"

[[dialogue]]
speaker = "梨緒"
# 「私なんて、コネクタが合わない充電器のように不要で空しい存在なんだ……」
line = "「私なんて、コネクタが合わない充電器のように不要で空しい存在なんだ……」"

[[dialogue]]
speaker = "クロト"
# 「それは確かに空しいけど……」
line = "「それは確かに空しいけど……」"

[[dialogue]]
speaker = "梨緒"
# 「──いや。私は諦めるわけにはいかない。折れるわけにはいかない。世界を救うその時まで」
line = "「──いや。私は諦めるわけにはいかない。折れるわけにはいかない。世界を救うその時まで」"

[[dialogue]]
speaker = "梨緒"
# 「緋宮会長。さぁ、勝負だ！」
line = "「緋宮会長。さぁ、勝負だ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ここまでくると見上げた根性というか、大したものだわ……」
line = "「ここまでくると見上げた根性というか、大したものだわ……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「でも、委員会なのに他の委員はいないの？　選挙管理委員会はあなた以外見たことないんだけど」
line = "「でも、委員会なのに他の委員はいないの？　選挙管理委員会はあなた以外見たことないんだけど」"

[[dialogue]]
speaker = "梨緒"
# 「……委員は現在募集中だ」
line = "「……委員は現在募集中だ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あ、ごめん。気にしてたのね」
line = "「あ、ごめん。気にしてたのね」"

[[dialogue]]
speaker = "クロト"
# 「勝負するのはいいけど、何の勝負にする？　この前はカフェテリアの皿洗いもやったし……」
line = "「勝負するのはいいけど、何の勝負にする？　この前はカフェテリアの皿洗いもやったし……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「自信があるって言ってた紅茶の淹れ方対決も負けちゃったしね」
line = "「自信があるって言ってた紅茶の淹れ方対決も負けちゃったしね」"

[[dialogue]]
speaker = "梨緒"
# 「うっ……！　あれはみんなが緋宮会長の淹れ方に慣れていたからだ！　私の紅茶は負けてない！」
line = "「うっ……！　あれはみんなが緋宮会長の淹れ方に慣れていたからだ！　私の紅茶は負けてない！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「見た目はクールなのに往生際が悪いわね。会長とか選管とか関係なく、クロトに勝ちたいだけなんじゃないの？」
line = "「見た目はクールなのに往生際が悪いわね。会長とか選管とか関係なく、クロトに勝ちたいだけなんじゃないの？」"

[[dialogue]]
speaker = "梨緒"
# 「！？　それは……ちが……」
line = "「！？　それは……ちが……」"

[[dialogue]]
speaker = "unk"
# 反論しようとして言葉に詰まる梨緒。
line = "反論しようとして言葉に詰まる梨緒。"

[[dialogue]]
speaker = "unk"
# 確かに梨緒との勝負は、星騎士も星徒会長も関係ないものが多くなっている。それでも……
line = "確かに梨緒との勝負は、星騎士も星徒会長も関係ないものが多くなっている。それでも……"

[[dialogue]]
speaker = "クロト"
# 「梨緒はすごいな」
line = "「梨緒はすごいな」"

[[dialogue]]
speaker = "梨緒"
# 「は……？　すごい？」
line = "「は……？　すごい？」"

[[dialogue]]
speaker = "クロト"
# 「だって、何回負けても勝つのを諦めてないだろ？　普通だったらとっくに諦めてる」
line = "「だって、何回負けても勝つのを諦めてないだろ？　普通だったらとっくに諦めてる」"

[[dialogue]]
speaker = "梨緒"
# 「……皮肉か？」
line = "「……皮肉か？」"

[[dialogue]]
speaker = "クロト"
# 「いいや。本当にすごいと思ってる。梨緒は弱くなんかないよ」
line = "「いいや。本当にすごいと思ってる。梨緒は弱くなんかないよ」"

[[dialogue]]
speaker = "クロト"
# 「諦めないって、強くないとできないことだからさ」
line = "「諦めないって、強くないとできないことだからさ」"

[[dialogue]]
speaker = "梨緒"
# 「──！？」
line = "「──！？」"

[[dialogue]]
speaker = "梨緒"
# 「私は強くなんか……負けっぱなしの役立たずで……」
line = "「私は強くなんか……負けっぱなしの役立たずで……」"

[[dialogue]]
speaker = "梨緒"
# 「あ……ぅ……今日の勝負は預けるっ。ではまた会おうっ」
line = "「あ……ぅ……今日の勝負は預けるっ。ではまた会おうっ」"

[[dialogue]]
speaker = "unk"
# 梨緒が捨てゼリフを残し、廊下の向こう側へと消えていく。
line = "梨緒が捨てゼリフを残し、廊下の向こう側へと消えていく。"

[[dialogue]]
speaker = "サーシャ"
# 「行っちゃったわね～。これも梨緒ちゃんの負けに入るのかしら？」
line = "「行っちゃったわね～。これも梨緒ちゃんの負けに入るのかしら？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あの子の勝負、別に受けなくていいんじゃないの？　星徒会長関係なくなってるし」
line = "「あの子の勝負、別に受けなくていいんじゃないの？　星徒会長関係なくなってるし」"

[[dialogue]]
speaker = "クロト"
# 「負担になってるわけじゃないから大丈夫だよ」
line = "「負担になってるわけじゃないから大丈夫だよ」"

[[dialogue]]
speaker = "クロト"
# 「それに、あの諦めない姿勢や気持ちはなんというかこう……シンパシー？　みたいなのを感じるんだ」
line = "「それに、あの諦めない姿勢や気持ちはなんというかこう……シンパシー？　みたいなのを感じるんだ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「シンパシー？　ま、確かにクロトも諦めが悪いものね」
line = "「シンパシー？　ま、確かにクロトも諦めが悪いものね」"

[[dialogue]]
speaker = "unk"
# 母さんに星騎士になるのを反対された時は、バイトで入学資金を貯めて新星学園に転入した。
line = "母さんに星騎士になるのを反対された時は、バイトで入学資金を貯めて新星学園に転入した。"

[[dialogue]]
speaker = "unk"
# ヴィーナスとの御前試合では、何度も打ちのめされながら立ち上がった。
line = "ヴィーナスとの御前試合では、何度も打ちのめされながら立ち上がった。"

[[dialogue]]
speaker = "unk"
# ギエルとの戦いでも、幾度も地に伏し、その度にしぶとく再起して勝利を掴んだ。
line = "ギエルとの戦いでも、幾度も地に伏し、その度にしぶとく再起して勝利を掴んだ。"

[[dialogue]]
speaker = "unk"
# 俺だって諦めの悪さは負けてない。
line = "俺だって諦めの悪さは負けてない。"

[[dialogue]]
speaker = "クロト"
# 「じゃあ、行こうか」
line = "「じゃあ、行こうか」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええ、付き合うわ」
line = "「ええ、付き合うわ」"

[[dialogue]]
speaker = "unk"
# これから向かうのは星徒会室──ではなく地下のトレーニング施設だ。
line = "これから向かうのは星徒会室──ではなく地下のトレーニング施設だ。"
