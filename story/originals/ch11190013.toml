[[dialogue]]
speaker = "unk"
# 第３話,怪盗との初デート,P
line = "第３話,怪盗との初デート,P"

[[dialogue]]
speaker = "unk"
# ミネコと知り合ってからしばらく経った、ある日のこと。
line = "ミネコと知り合ってからしばらく経った、ある日のこと。"

[[dialogue]]
speaker = "unk"
# 俺は彼女から初めてのデートに誘われて、秋葉原にやって来ていたのだが――
line = "俺は彼女から初めてのデートに誘われて、秋葉原にやって来ていたのだが――"

[[dialogue]]
speaker = "ミネコ"
# 「～～♪　～～～♪」
line = "「～～♪　～～～♪」"

[[dialogue]]
speaker = "ミネコ"
# 「――ん？　会長、私のこと、じっと見つめてどうかした？」
line = "「――ん？　会長、私のこと、じっと見つめてどうかした？」"

[[dialogue]]
speaker = "ミネコ"
# 「もしかして、いよいよ私に惚れちゃったのかな～？」
line = "「もしかして、いよいよ私に惚れちゃったのかな～？」"

[[dialogue]]
speaker = "ミネコ"
# 「いや～、ようやくか～。そろそろ好感度がイイ感じに貯まってきてると思ってたんだよね～♪」
line = "「いや～、ようやくか～。そろそろ好感度がイイ感じに貯まってきてると思ってたんだよね～♪」"

[[dialogue]]
speaker = "ミネコ"
# 「――って、そうじゃないって？　ふむふむ……どうして私が、戦闘服を着ているのか気になった？」
line = "「――って、そうじゃないって？　ふむふむ……どうして私が、戦闘服を着ているのか気になった？」"

[[dialogue]]
speaker = "ミネコ"
# 「それはね～、秋葉原でデートってことで、コスプレ的なノリで着てきたんだよ♪」
line = "「それはね～、秋葉原でデートってことで、コスプレ的なノリで着てきたんだよ♪」"

[[dialogue]]
speaker = "ミネコ"
# 「ほら、どう？　私の怪盗衣装♪　ここまでじっくり見られるのは、会長が初めてってくらいレアなんだよ～？」
line = "「ほら、どう？　私の怪盗衣装♪　ここまでじっくり見られるのは、会長が初めてってくらいレアなんだよ～？」"

[[dialogue]]
speaker = "ミネコ"
# 「普段は大怪盗の能力で『認識阻害』をかけてるから、変身中の私は怪盗っぽい人影にしか見えないようになってるからね」
line = "「普段は大怪盗の能力で『認識阻害』をかけてるから、変身中の私は怪盗っぽい人影にしか見えないようになってるからね」"

[[dialogue]]
speaker = "ミネコ"
# 「ちなみに今は、周りには学園の制服姿にしか見えないようにしてるんだ♪　つまりは、この怪盗姿が見えているのは、会長だけってわけ」
line = "「ちなみに今は、周りには学園の制服姿にしか見えないようにしてるんだ♪　つまりは、この怪盗姿が見えているのは、会長だけってわけ」"

[[dialogue]]
speaker = "ミネコ"
# 「どう？　嬉しい？　ふふふ♪」
line = "「どう？　嬉しい？　ふふふ♪」"

[[dialogue]]
speaker = "unk"
# からかうようにそう言って、楽しそうに笑うミネコ。
line = "からかうようにそう言って、楽しそうに笑うミネコ。"

[[dialogue]]
speaker = "unk"
# 相手が世界を騒がす大怪盗であっても、男としては正直嬉しい気分になってしまうから、反応に困る。
line = "相手が世界を騒がす大怪盗であっても、男としては正直嬉しい気分になってしまうから、反応に困る。"

[[dialogue]]
speaker = "ミネコ"
# 「って、あっ！　見てみて、会長！　あそこに輸入雑貨店があるよ」
line = "「って、あっ！　見てみて、会長！　あそこに輸入雑貨店があるよ」"

[[dialogue]]
speaker = "ミネコ"
# 「ふふふ♪　面白そうな『お宝』がありそうな匂いがする♪　レッツゴー☆」
line = "「ふふふ♪　面白そうな『お宝』がありそうな匂いがする♪　レッツゴー☆」"

[[dialogue]]
speaker = "unk"
# そうして、店で気に入った物を購入し、ニコニコ顔のミネコ。
line = "そうして、店で気に入った物を購入し、ニコニコ顔のミネコ。"

[[dialogue]]
speaker = "ミネコ"
# 「ふぅ～♪　素晴らしいお店だった……！　まさか世界中の変なお菓子を、あそこまでラインナップ豊かに取り揃えているとは！」
line = "「ふぅ～♪　素晴らしいお店だった……！　まさか世界中の変なお菓子を、あそこまでラインナップ豊かに取り揃えているとは！」"

[[dialogue]]
speaker = "ミネコ"
# 「ほら、これとかすごくそそられるよ！　トルクメニスタン産の『干しメロンチョコレート』！」
line = "「ほら、これとかすごくそそられるよ！　トルクメニスタン産の『干しメロンチョコレート』！」"

[[dialogue]]
speaker = "ミネコ"
# 「ネットで調べたら、トルクメニスタンって夏場に大量のメロンが採れるんだって♪」
line = "「ネットで調べたら、トルクメニスタンって夏場に大量のメロンが採れるんだって♪」"

[[dialogue]]
speaker = "ミネコ"
# 「その特産であるメロンを細く切って干して、チョコレートコーティングしたお菓子、ってことみたいだね☆」
line = "「その特産であるメロンを細く切って干して、チョコレートコーティングしたお菓子、ってことみたいだね☆」"

[[dialogue]]
speaker = "unk"
# ドライフルーツチョコみたいな？
line = "ドライフルーツチョコみたいな？"

[[dialogue]]
speaker = "ミネコ"
# 「そう言われると美味しそうな気がして来るけど、はてさて――」
line = "「そう言われると美味しそうな気がして来るけど、はてさて――」"

[[dialogue]]
speaker = "ミネコ"
# 「いざ、実食！　はい、会長も一緒に！」
line = "「いざ、実食！　はい、会長も一緒に！」"

[[dialogue]]
speaker = "ミネコ"
# 「――せ～のっ♪　……あむっ！」
line = "「――せ～のっ♪　……あむっ！」"

[[dialogue]]
speaker = "ミネコ"
# 「もぐもぐ……んんっ！　これは……！」
line = "「もぐもぐ……んんっ！　これは……！」"

[[dialogue]]
speaker = "unk"
# ものすごく……メンマです……
line = "ものすごく……メンマです……"

[[dialogue]]
speaker = "ミネコ"
# 「メロンの風味は……正直あまりないね♪　うん！　食感がメンマに似てて、ズバリ『チョコに漬けたメンマ』って感じ♪」
line = "「メロンの風味は……正直あまりないね♪　うん！　食感がメンマに似てて、ズバリ『チョコに漬けたメンマ』って感じ♪」"

[[dialogue]]
speaker = "ミネコ"
# 「ふふふ……<emoji=heart04>　また１つ、変なお菓子に出会ってしまった<emoji=heart04>　なぜチョコレートコーティングをしたのかが、全然わからない……！」
line = "「ふふふ……<emoji=heart04>　また１つ、変なお菓子に出会ってしまった<emoji=heart04>　なぜチョコレートコーティングをしたのかが、全然わからない……！」"

[[dialogue]]
speaker = "ミネコ"
# 「これは２人でも、全部食べ切るのに苦労しそうだね☆」
line = "「これは２人でも、全部食べ切るのに苦労しそうだね☆」"

[[dialogue]]
speaker = "unk"
# 俺も手伝うことになってる！？
line = "俺も手伝うことになってる！？"

[[dialogue]]
speaker = "ミネコ"
# 「女の子が量を食べ切れない時に、『俺が食べるよ』ってイケボで言ってくれるのが、男の子ってものでしょ？」
line = "「女の子が量を食べ切れない時に、『俺が食べるよ』ってイケボで言ってくれるのが、男の子ってものでしょ？」"

[[dialogue]]
speaker = "unk"
# 自分から嬉々として買ったんだよね！？
line = "自分から嬉々として買ったんだよね！？"

[[dialogue]]
speaker = "ミネコ"
# 「ふふふ♪　だって、会長――」
line = "「ふふふ♪　だって、会長――」"

[[dialogue]]
speaker = "ミネコ"
# 「変な味のお菓子ってこう、挑戦したくて興味をそそられるでしょ？」
line = "「変な味のお菓子ってこう、挑戦したくて興味をそそられるでしょ？」"

[[dialogue]]
speaker = "unk"
# クソゲー好きの変態思考だこれ！
line = "クソゲー好きの変態思考だこれ！"

[[dialogue]]
speaker = "unk"
# と、その時だった。
line = "と、その時だった。"

[[dialogue]]
speaker = "女性の声"
# 「キャーッ！　モンスターよー！」
line = "「キャーッ！　モンスターよー！」"

[[dialogue]]
speaker = "男性の声"
# 「うわぁーっ！　逃げろーっ！」
line = "「うわぁーっ！　逃げろーっ！」"

[[dialogue]]
speaker = "ミネコ"
# 「……！　まさか、会長と初デートに来ている日に限って、邪魔が入るとはね」
line = "「……！　まさか、会長と初デートに来ている日に限って、邪魔が入るとはね」"

[[dialogue]]
speaker = "ミネコ"
# 「――来い！　スティールファントム！」
line = "「――来い！　スティールファントム！」"

[[dialogue]]
speaker = "unk"
# ミネコが技のようにその名を呼ぶと、彼女の背後から『長身の怪盗紳士』と言うべき大きな人影が立ち上がる。
line = "ミネコが技のようにその名を呼ぶと、彼女の背後から『長身の怪盗紳士』と言うべき大きな人影が立ち上がる。"

[[dialogue]]
speaker = "unk"
# それは彼女の能力が具現化した『大怪盗の化身』。
line = "それは彼女の能力が具現化した『大怪盗の化身』。"

[[dialogue]]
speaker = "ミネコ"
# 「あいにく全然興味をそそられないから、速攻でちょちょいっと片付けちゃうよ」
line = "「あいにく全然興味をそそられないから、速攻でちょちょいっと片付けちゃうよ」"

[[dialogue]]
speaker = "unk"
# それから数分と経たぬ内に、モンスターは大怪盗の手であっという間に掃討された。
line = "それから数分と経たぬ内に、モンスターは大怪盗の手であっという間に掃討された。"

[[dialogue]]
speaker = "unk"
# 俺も変身して加勢したが、その必要が全くないくらい鮮やかな、ミネコのワンサイドゲームだった。
line = "俺も変身して加勢したが、その必要が全くないくらい鮮やかな、ミネコのワンサイドゲームだった。"

[[dialogue]]
speaker = "ミネコ"
# 「――よし、終わりっと。これでデートを再開できるね♪」
line = "「――よし、終わりっと。これでデートを再開できるね♪」"

[[dialogue]]
speaker = "ミネコ"
# 「ん？　どうしたの、会長？」
line = "「ん？　どうしたの、会長？」"

[[dialogue]]
speaker = "unk"
# ミネコ、プリマステラにならないか？
line = "ミネコ、プリマステラにならないか？"

[[dialogue]]
speaker = "unk"
# 星徒会長の権限を持っている俺が推薦すれば、ミネコはすぐにでもプリマステラの資格を得ることができるだろう。
line = "星徒会長の権限を持っている俺が推薦すれば、ミネコはすぐにでもプリマステラの資格を得ることができるだろう。"

[[dialogue]]
speaker = "unk"
# 新種の機械型モンスターの群れを瞬殺できる程の実力なら、間違いなく学園トップクラスの星騎士である。
line = "新種の機械型モンスターの群れを瞬殺できる程の実力なら、間違いなく学園トップクラスの星騎士である。"

[[dialogue]]
speaker = "unk"
# しかし、ミネコは首を横に振った。
line = "しかし、ミネコは首を横に振った。"

[[dialogue]]
speaker = "ミネコ"
# 「悪いけど……私は、世界を救うことにはあまり興味ないんだ」
line = "「悪いけど……私は、世界を救うことにはあまり興味ないんだ」"

[[dialogue]]
speaker = "ミネコ"
# 「――うん、そう。私には怪盗稼業の方があるからね」
line = "「――うん、そう。私には怪盗稼業の方があるからね」"

[[dialogue]]
speaker = "ミネコ"
# 「私は女神に選ばれたから『大怪盗』をしているんじゃない。前にも言ったけど、これは私にとって大事な『趣味』なんだよ」
line = "「私は女神に選ばれたから『大怪盗』をしているんじゃない。前にも言ったけど、これは私にとって大事な『趣味』なんだよ」"

[[dialogue]]
speaker = "ミネコ"
# 「私は、鮮やかな手口でお宝を盗み出すことに、『ロマン』を感じているんだ」
line = "「私は、鮮やかな手口でお宝を盗み出すことに、『ロマン』を感じているんだ」"

[[dialogue]]
speaker = "ミネコ"
# 「私の原動力は、ロマンなんだよ、会長」
line = "「私の原動力は、ロマンなんだよ、会長」"

[[dialogue]]
speaker = "ミネコ"
# 「世界を救うことに、私はあまりロマンを感じない。それは星騎士や選星者としての使命ってやつだからね」
line = "「世界を救うことに、私はあまりロマンを感じない。それは星騎士や選星者としての使命ってやつだからね」"

[[dialogue]]
speaker = "ミネコ"
# 「そして、私は別に正義の味方になりたいわけじゃない。というより、そもそもがヒトのお宝を盗む悪党だからね」
line = "「そして、私は別に正義の味方になりたいわけじゃない。というより、そもそもがヒトのお宝を盗む悪党だからね」"

[[dialogue]]
speaker = "ミネコ"
# 「あはっ♪　今更だけど、星徒会長として悪党の存在は見過ごせない？　プリマステラにならないなら、捕まっちゃったりして」
line = "「あはっ♪　今更だけど、星徒会長として悪党の存在は見過ごせない？　プリマステラにならないなら、捕まっちゃったりして」"

[[dialogue]]
speaker = "unk"
# 俺たち星騎士は、警察とは違う
line = "俺たち星騎士は、警察とは違う"

[[dialogue]]
speaker = "unk"
# 俺個人は『善くありたい』と思っているが、法では裁けない人がいたり、ルールを守っていては救えない人がいるのも事実だ。
line = "俺個人は『善くありたい』と思っているが、法では裁けない人がいたり、ルールを守っていては救えない人がいるのも事実だ。"

[[dialogue]]
speaker = "unk"
# 女神テルルが選星者の中に『大怪盗』という悪人にしかなりえない役割を定めたのにも、きっと『善き者』だけでは成し遂げられないことがあると考えたからだと思っている。
line = "女神テルルが選星者の中に『大怪盗』という悪人にしかなりえない役割を定めたのにも、きっと『善き者』だけでは成し遂げられないことがあると考えたからだと思っている。"

[[dialogue]]
speaker = "unk"
# だから俺個人は、法律を遵守することを殊更重視はしていない――そうミネコに伝えた。
line = "だから俺個人は、法律を遵守することを殊更重視はしていない――そうミネコに伝えた。"

[[dialogue]]
speaker = "ミネコ"
# 「ふふふっ♪　いいねいいね、それでこそジュエリーが選んだ助手だよ。最初は冗談半分って感じだったのに、なんかマジになっちゃいそうだなぁ、私……」
line = "「ふふふっ♪　いいねいいね、それでこそジュエリーが選んだ助手だよ。最初は冗談半分って感じだったのに、なんかマジになっちゃいそうだなぁ、私……」"

[[dialogue]]
speaker = "ミネコ"
# 「まあ、そういうわけなんで、世界を救うのはキミに任せるよ、魔王様☆」
line = "「まあ、そういうわけなんで、世界を救うのはキミに任せるよ、魔王様☆」"

[[dialogue]]
speaker = "ミネコ"
# 「どうしても『大怪盗』の力が必要になったら、私を呼んで？　星騎士の使命なんかじゃなくて、会長の個人的なお願いだったら、１回くらいは命をかけてあげてもいいよ♪」
line = "「どうしても『大怪盗』の力が必要になったら、私を呼んで？　星騎士の使命なんかじゃなくて、会長の個人的なお願いだったら、１回くらいは命をかけてあげてもいいよ♪」"

[[dialogue]]
speaker = "ミネコ"
# 「その代わりと言ってはなんだけど──私が今、一番ロマンを感じているお宝を盗むの、手伝ってほしいかな♪」
line = "「その代わりと言ってはなんだけど──私が今、一番ロマンを感じているお宝を盗むの、手伝ってほしいかな♪」"

[[dialogue]]
speaker = "unk"
# ……見逃すのと手伝うのは、話が違うぞ？
line = "……見逃すのと手伝うのは、話が違うぞ？"

[[dialogue]]
speaker = "ミネコ"
# 「大丈夫、大丈夫♪　実はそれを盗み出すのは、犯罪じゃないから♪」
line = "「大丈夫、大丈夫♪　実はそれを盗み出すのは、犯罪じゃないから♪」"

[[dialogue]]
speaker = "ミネコ"
# 「だって今、私が特にロマンを感じているのは――」
line = "「だって今、私が特にロマンを感じているのは――」"

[[dialogue]]
speaker = "unk"
# 彼女はそう言って顔を近づけると、俺の胸に人差し指を突き付けて……
line = "彼女はそう言って顔を近づけると、俺の胸に人差し指を突き付けて……"

[[dialogue]]
speaker = "ミネコ"
# 「会長のハートを盗むことだもん♪　ふふふっ<emoji=heart04>」
line = "「会長のハートを盗むことだもん♪　ふふふっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ミネコの言葉に、思わずドキッとしてしまう。
line = "ミネコの言葉に、思わずドキッとしてしまう。"

[[dialogue]]
speaker = "ミネコ"
# 「――というわけで会長、デートの続き、行こっか♪」
line = "「――というわけで会長、デートの続き、行こっか♪」"

[[dialogue]]
speaker = "unk"
# 彼女はそう言って俺の手を取り、再び街へ歩き出すのだった――
line = "彼女はそう言って俺の手を取り、再び街へ歩き出すのだった――"
