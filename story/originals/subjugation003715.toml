[[dialogue]]
speaker = "unk"
# 第１５話,愛おしい世界の形（前編）,B
line = "第１５話,愛おしい世界の形（前編）,B"

[[dialogue]]
speaker = "unk"
# 終焉世界ベガでの決着から、１ヵ月の月日が経った。
line = "終焉世界ベガでの決着から、１ヵ月の月日が経った。"

[[dialogue]]
speaker = "ルヴィネ"
# 「……そう。新市街の復興は順調のようね。報告をありがとう。また後日、顔を出すわ」
line = "「……そう。新市街の復興は順調のようね。報告をありがとう。また後日、顔を出すわ」"

[[dialogue]]
speaker = "unk"
# ルヴィネはＤＩＳＣの通話機能をオフにして、手元のタブレット端末に伝え聞いた進捗状況を入力していく。
line = "ルヴィネはＤＩＳＣの通話機能をオフにして、手元のタブレット端末に伝え聞いた進捗状況を入力していく。"

[[dialogue]]
speaker = "unk"
# デネブの流星市国は、『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』との一次決戦を行った場所──今でも多くの戦禍が街には刻まれたままだ。
line = "デネブの流星市国は、『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』との一次決戦を行った場所──今でも多くの戦禍が街には刻まれたままだ。"

[[dialogue]]
speaker = "ルヴィネ"
# （でも、デネブの人達は逞しい……きっとすぐに、流星市国は元の姿を取り戻す……）
line = "（でも、デネブの人達は逞しい……きっとすぐに、流星市国は元の姿を取り戻す……）"

[[dialogue]]
speaker = "unk"
# 損壊した学園の施設も、復興は進んでいる。創造神との戦いの傷は、日に日に癒えつつあるのだ──
line = "損壊した学園の施設も、復興は進んでいる。創造神との戦いの傷は、日に日に癒えつつあるのだ──"

[[dialogue]]
speaker = "unk"
# ルヴィネは会長日誌を手に取り、そこへ手書きの記述を始める。
line = "ルヴィネは会長日誌を手に取り、そこへ手書きの記述を始める。"

[[dialogue]]
speaker = "unk"
# 記入する文句は非常に短い。けれど、それこそが世界が平和になった証と言えた。
line = "記入する文句は非常に短い。けれど、それこそが世界が平和になった証と言えた。"

[[dialogue]]
speaker = "ルヴィネ"
# 「……ん。こんなところね」
line = "「……ん。こんなところね」"

[[dialogue]]
speaker = "unk"
# 『本日も快晴。アステラの発生はなし』──そう書きつけて、ぱたりと日誌を閉じる。
line = "『本日も快晴。アステラの発生はなし』──そう書きつけて、ぱたりと日誌を閉じる。"

[[dialogue]]
speaker = "レティシア"
# 「ルヴィ、お疲れ様。紅茶をどうぞ？」
line = "「ルヴィ、お疲れ様。紅茶をどうぞ？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「ありがとう、レティシア」
line = "「ありがとう、レティシア」"

[[dialogue]]
speaker = "チナ"
# 「グレイス、仕事はちゃんと終わらせたか？　今日から数日、デネブを空けるんだからな」
line = "「グレイス、仕事はちゃんと終わらせたか？　今日から数日、デネブを空けるんだからな」"

[[dialogue]]
speaker = "グレイス"
# 「もちろんバッチリですっ。むっふっふ、昨日の夜のうちに全部片づけちゃいました！」
line = "「もちろんバッチリですっ。むっふっふ、昨日の夜のうちに全部片づけちゃいました！」"

[[dialogue]]
speaker = "チナ"
# 「珍しいこともあるもんだ……って、お前この書類！　チェックしてないじゃないか！？」
line = "「珍しいこともあるもんだ……って、お前この書類！　チェックしてないじゃないか！？」"

[[dialogue]]
speaker = "グレイス"
# 「あれぇ！？　そんなっ──チナ、手伝ってください！」
line = "「あれぇ！？　そんなっ──チナ、手伝ってください！」"

[[dialogue]]
speaker = "チナ"
# 「あ～も～！　しょうがねえな、すぐにやるぞ！」
line = "「あ～も～！　しょうがねえな、すぐにやるぞ！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……ふふっ」
line = "「……ふふっ」"

[[dialogue]]
speaker = "レティシア"
# 「ルヴィ、どうかした？」
line = "「ルヴィ、どうかした？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「──いいえ。何でもないわ」
line = "「──いいえ。何でもないわ」"

[[dialogue]]
speaker = "unk"
# 愛しい友人たちとの、緩やかな午後の時間。
line = "愛しい友人たちとの、緩やかな午後の時間。"

[[dialogue]]
speaker = "unk"
# それはまさに、ルヴィネが今わの際で見た、あの夢の光景そのものだった。
line = "それはまさに、ルヴィネが今わの際で見た、あの夢の光景そのものだった。"

[[dialogue]]
speaker = "ベアトリス"
# 「みんな、お待たせーっ！」
line = "「みんな、お待たせーっ！」"

[[dialogue]]
speaker = "レティシア"
# 「ふふ。新星学園の制服を着たベアトは久しぶりに見たわね」
line = "「ふふ。新星学園の制服を着たベアトは久しぶりに見たわね」"

[[dialogue]]
speaker = "エステル"
# 「失礼します。私にもお声がけいただけて、嬉しいです」
line = "「失礼します。私にもお声がけいただけて、嬉しいです」"

[[dialogue]]
speaker = "ルヴィネ"
# 「いらっしゃい、エステル。じきに連絡が来るはずだから、少し待っていてくれるかしら」
line = "「いらっしゃい、エステル。じきに連絡が来るはずだから、少し待っていてくれるかしら」"

[[dialogue]]
speaker = "エステル"
# 「はい、ルヴィネ会長。ところで、その──」
line = "「はい、ルヴィネ会長。ところで、その──」"

[[dialogue]]
speaker = "グレイス"
# 「えーっと……この数字はＯＫ。こっちもＯＫですね──あ、チナ。そこ間違えてますよ？」
line = "「えーっと……この数字はＯＫ。こっちもＯＫですね──あ、チナ。そこ間違えてますよ？」"

[[dialogue]]
speaker = "チナ"
# 「──あ、ほんとだ。お前、抜けてるくせに相変わらず計算だけは速いよなぁ」
line = "「──あ、ほんとだ。お前、抜けてるくせに相変わらず計算だけは速いよなぁ」"

[[dialogue]]
speaker = "グレイス"
# 「なにおう～！？」
line = "「なにおう～！？」"

[[dialogue]]
speaker = "エステル"
# 「チナ先輩たちは、何をしているのでしょうか？　大急ぎでお仕事をしているようですが……」
line = "「チナ先輩たちは、何をしているのでしょうか？　大急ぎでお仕事をしているようですが……」"

[[dialogue]]
speaker = "レティシア"
# 「最後の書類仕事を片付けているところよ。グレイスがうっかりしてたみたいね」
line = "「最後の書類仕事を片付けているところよ。グレイスがうっかりしてたみたいね」"

[[dialogue]]
speaker = "ベアトリス"
# 「あはは。いつも通りって感じだね～……」
line = "「あはは。いつも通りって感じだね～……」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「邪魔するぞ、極星学園のみんな！」
line = "「邪魔するぞ、極星学園のみんな！」"

[[dialogue]]
speaker = "リノ"
# 「もう全員、揃っているみたいね」
line = "「もう全員、揃っているみたいね」"

[[dialogue]]
speaker = "ルヴィネ"
# 「ええ。待っていたわ、２人とも」
line = "「ええ。待っていたわ、２人とも」"

[[dialogue]]
speaker = "ルヴィネ"
# 「今日は私たちの申し出を快く引き受けてくれてありがとう。あなた達なら、安心して任せられるわ」
line = "「今日は私たちの申し出を快く引き受けてくれてありがとう。あなた達なら、安心して任せられるわ」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「魔王たちからの頼みでもあるしな。気兼ねなく向こうの世界を満喫してくるといいさ」
line = "「魔王たちからの頼みでもあるしな。気兼ねなく向こうの世界を満喫してくるといいさ」"

[[dialogue]]
speaker = "リノ"
# 「子供のお世話は慣れてるから、ゆっくり羽を伸ばしてきてね」
line = "「子供のお世話は慣れてるから、ゆっくり羽を伸ばしてきてね」"

[[dialogue]]
speaker = "レティシア"
# 「そう言ってくれると頼もしいわ。私たちの留守中、星徒会室は自由に使ってくれていいから」
line = "「そう言ってくれると頼もしいわ。私たちの留守中、星徒会室は自由に使ってくれていいから」"

[[dialogue]]
speaker = "グレイス"
# 「──今の音はっ！」
line = "「──今の音はっ！」"

[[dialogue]]
speaker = "チナ"
# 「魔王たちからの連絡じゃないか！？　あと少しだ、さっさと片付けるぞ……！」
line = "「魔王たちからの連絡じゃないか！？　あと少しだ、さっさと片付けるぞ……！」"

[[dialogue]]
speaker = "unk"
# 極星学園の星徒会室──ルヴィネの会長席のすぐ近くに設置されている機器が発光している。
line = "極星学園の星徒会室──ルヴィネの会長席のすぐ近くに設置されている機器が発光している。"

[[dialogue]]
speaker = "unk"
# 一見すると、大理石を削りだして作ったモノリスのような置物。
line = "一見すると、大理石を削りだして作ったモノリスのような置物。"

[[dialogue]]
speaker = "unk"
# それは『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』戦後に改良を施された、次元転送装置の姿だった。
line = "それは『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』戦後に改良を施された、次元転送装置の姿だった。"

[[dialogue]]
speaker = "unk"
# １つはデネブの極星学園に、もう１つはアルタイルの新星学園に設置されている固定式で──
line = "１つはデネブの極星学園に、もう１つはアルタイルの新星学園に設置されている固定式で──"

[[dialogue]]
speaker = "クロト"
# 『──ルヴィネ、聴こえるか？』
line = "『──ルヴィネ、聴こえるか？』"

[[dialogue]]
speaker = "unk"
# 片方を起動すると、もう片方も呼応する。平行世界間を超越した通話さえ可能となっていた。
line = "片方を起動すると、もう片方も呼応する。平行世界間を超越した通話さえ可能となっていた。"

[[dialogue]]
speaker = "ルヴィネ"
# 「ええ、問題なく──」
line = "「ええ、問題なく──」"

[[dialogue]]
speaker = "グレイス"
# 「ばっちり聴こえますっ、魔王さん！！」
line = "「ばっちり聴こえますっ、魔王さん！！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「グレイス、声が大きいわ。魔王がびっくりするでしょう」
line = "「グレイス、声が大きいわ。魔王がびっくりするでしょう」"

[[dialogue]]
speaker = "クロト"
# 『ははっ、グレイスは相変わらずだな。他の皆も、そこに？』
line = "『ははっ、グレイスは相変わらずだな。他の皆も、そこに？』"

[[dialogue]]
speaker = "レティシア"
# 「ええ、魔王」
line = "「ええ、魔王」"

[[dialogue]]
speaker = "ベアトリス"
# 「お久しぶりですね、会長さん！」
line = "「お久しぶりですね、会長さん！」"

[[dialogue]]
speaker = "チナ"
# 「アタシもいるぞ、魔王っ！」
line = "「アタシもいるぞ、魔王っ！」"

[[dialogue]]
speaker = "クロト"
# 『元気そうだな。ルヴィネ、こっちの準備はできてるよ』
line = "『元気そうだな。ルヴィネ、こっちの準備はできてるよ』"

[[dialogue]]
speaker = "クロト"
# 『<b>アルタイルのみんな</b>、早くそっちに行きたくてうずうずしてるみたいだ』
line = "『<b>アルタイルのみんな</b>、早くそっちに行きたくてうずうずしてるみたいだ』"

[[dialogue]]
speaker = "クロト"
# 『母さんとアポロも、もう来てくれてるのか？』
line = "『母さんとアポロも、もう来てくれてるのか？』"

[[dialogue]]
speaker = "アポロ（大人）"
# 「ああ、いるぞ魔王！」
line = "「ああ、いるぞ魔王！」"

[[dialogue]]
speaker = "リノ"
# 「ええ。そっちの親御さんたちに、安心してって伝えてくれる？」
line = "「ええ。そっちの親御さんたちに、安心してって伝えてくれる？」"

[[dialogue]]
speaker = "クロト"
# 『もちろん。それじゃあルヴィネ──準備はいいか？』
line = "『もちろん。それじゃあルヴィネ──準備はいいか？』"

[[dialogue]]
speaker = "ルヴィネ"
# 「ええっと……」
line = "「ええっと……」"

[[dialogue]]
speaker = "グレイス"
# 「ぎりぎり滑り込みセーフっ！　終わりましたっ！！」
line = "「ぎりぎり滑り込みセーフっ！　終わりましたっ！！」"

[[dialogue]]
speaker = "チナ"
# 「ぜぇ、ぜぇっ……なぁルヴィ。アタシとグレイスの役職、交代しないか？　もうヒラでいいよこいつ……」
line = "「ぜぇ、ぜぇっ……なぁルヴィ。アタシとグレイスの役職、交代しないか？　もうヒラでいいよこいつ……」"

[[dialogue]]
speaker = "グレイス"
# 「なんてことを言うんですかチナ！？」
line = "「なんてことを言うんですかチナ！？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「ふふ、その辺りはまた今度、話しましょう。魔王、それじゃあ転送装置を起動するわ」
line = "「ふふ、その辺りはまた今度、話しましょう。魔王、それじゃあ転送装置を起動するわ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「<ruby=パラレルゲート>平行世界門</ruby>、<ruby=オープン>解放</ruby>──」
line = "「<ruby>平行世界門<rt>パラレルゲート</rt></ruby>、<ruby>解放<rt>オープン</rt></ruby>──」"

[[dialogue]]
speaker = "unk"
# 固定式の改良版転送装置が、中心から２つに割れ、光り輝く世界門が現れる。
line = "固定式の改良版転送装置が、中心から２つに割れ、光り輝く世界門が現れる。"

[[dialogue]]
speaker = "unk"
# これは『錬金術師』アニマと、『蒐集の魔女』トレジアンナ。そして２つの世界に同時に存在する、『空間の魔女』リノによって作り出された機構。
line = "これは『錬金術師』アニマと、『蒐集の魔女』トレジアンナ。そして２つの世界に同時に存在する、『空間の魔女』リノによって作り出された機構。"

[[dialogue]]
speaker = "ルヴィネ"
# （声のみを平行世界に飛ばし合う通話機能。そして、転送門をくぐれる大きさならば、どんなものでも移送することができる──）
line = "（声のみを平行世界に飛ばし合う通話機能。そして、転送門をくぐれる大きさならば、どんなものでも移送することができる──）"

[[dialogue]]
speaker = "クロト"
# 『タイミングを合わせるぞ──』
line = "『タイミングを合わせるぞ──』"

[[dialogue]]
speaker = "ルヴィネ"
# 「ええ！」
line = "「ええ！」"

[[dialogue]]
speaker = "ベアトリス"
# 「それじゃあルヴィ、また後で！」
line = "「それじゃあルヴィ、また後で！」"

[[dialogue]]
speaker = "レティシア"
# 「魔王たちに挨拶はすませておくわね」
line = "「魔王たちに挨拶はすませておくわね」"

[[dialogue]]
speaker = "エステル"
# 「ルヴィネ会長、よろしくお願いいたします！」
line = "「ルヴィネ会長、よろしくお願いいたします！」"

[[dialogue]]
speaker = "グレイス"
# 「アルタイルでの再会──とっても楽しみです！」
line = "「アルタイルでの再会──とっても楽しみです！」"

[[dialogue]]
speaker = "チナ"
# 「いよいよ、かぁ……緊張してきた……」
line = "「いよいよ、かぁ……緊張してきた……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「それじゃあ魔王──せえ、の──！」
line = "「それじゃあ魔王──せえ、の──！」"

[[dialogue]]
speaker = "クロト"
# 『────<ruby=ブレイク・ボーダー>境界突破</ruby>！』
line = "『────<ruby>境界突破<rt>ブレイク・ボーダー</rt></ruby>！』"

[[dialogue]]
speaker = "unk"
# 光り輝く転送門を、ベアトリス、レティシア、グレイス、チナ、エステルの５名がくぐる。
line = "光り輝く転送門を、ベアトリス、レティシア、グレイス、チナ、エステルの５名がくぐる。"

[[dialogue]]
speaker = "unk"
# そして間を置かず、やってきたのは──
line = "そして間を置かず、やってきたのは──"

[[dialogue]]
speaker = "チナ"
# 「こ、ここがっ……でねぶ？　１０年先の、未来の流星市国！？」
line = "「こ、ここがっ……でねぶ？　１０年先の、未来の流星市国！？」"

[[dialogue]]
speaker = "unk"
# アルタイルにいる彼女たちの、同一存在だった。
line = "アルタイルにいる彼女たちの、同一存在だった。"

[[dialogue]]
speaker = "グレイス"
# 「す、すごいですっ！　新星学園と違いますっ……ここが、極星学園……！！」
line = "「す、すごいですっ！　新星学園と違いますっ……ここが、極星学園……！！」"

[[dialogue]]
speaker = "ルヴィネ"
# （……同一存在同士が、同時に世界門をくぐれば、意識の昏倒は起こらない）
line = "（……同一存在同士が、同時に世界門をくぐれば、意識の昏倒は起こらない）"

[[dialogue]]
speaker = "unk"
# これも２人いるリノが自分自身で実験し、判明した事実。そしてこの機能こそが、新型次元転送装置の本懐だ。
line = "これも２人いるリノが自分自身で実験し、判明した事実。そしてこの機能こそが、新型次元転送装置の本懐だ。"

[[dialogue]]
speaker = "ルヴィネ"
# （本当に……錬金術師と魔女たちの力には、驚くばかりね）
line = "（本当に……錬金術師と魔女たちの力には、驚くばかりね）"

[[dialogue]]
speaker = "レティシア"
# 「あ……え、えっと……」
line = "「あ……え、えっと……」"

[[dialogue]]
speaker = "エステル"
# 「レティシアさん？　そんな、わたしの後ろにかくれなくても……」
line = "「レティシアさん？　そんな、わたしの後ろにかくれなくても……」"

[[dialogue]]
speaker = "ルヴィネ"
# （……みんな生きている。懐かしいわ。１０年前と同じ……そっくり……）
line = "（……みんな生きている。懐かしいわ。１０年前と同じ……そっくり……）"

[[dialogue]]
speaker = "unk"
# そしてルヴィネは──幼い彼女たちの一番後ろにいる少女と向かい合った。
line = "そしてルヴィネは──幼い彼女たちの一番後ろにいる少女と向かい合った。"

[[dialogue]]
speaker = "ルヴィネ"
# 「……初めまして」
line = "「……初めまして」"

[[dialogue]]
speaker = "ベアトリス"
# 「あ、は、はいっ……あなたが、ルヴィネ、さん……？」
line = "「あ、は、はいっ……あなたが、ルヴィネ、さん……？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「そうよ。デネブの貴女の幼なじみなの。会えて嬉しいわ──ベアト」
line = "「そうよ。デネブの貴女の幼なじみなの。会えて嬉しいわ──ベアト」"

[[dialogue]]
speaker = "ベアトリス"
# 「べあと……え、えへへ！　そんな風に呼んでもらえるの、初めてです……！」
line = "「べあと……え、えへへ！　そんな風に呼んでもらえるの、初めてです……！」"

[[dialogue]]
speaker = "チナ"
# 「なんだ、そう呼んで欲しかったんなら、呼んでやるのに。じゃあ──おまえ、今日からベアトな！」
line = "「なんだ、そう呼んで欲しかったんなら、呼んでやるのに。じゃあ──おまえ、今日からベアトな！」"

[[dialogue]]
speaker = "グレイス"
# 「ベアト！」
line = "「ベアト！」"

[[dialogue]]
speaker = "エステル"
# 「べあと──さん？」
line = "「べあと──さん？」"

[[dialogue]]
speaker = "レティシア"
# 「ベアト……」
line = "「ベアト……」"

[[dialogue]]
speaker = "ベアトリス"
# 「え、えへへへっ……！」
line = "「え、えへへへっ……！」"

[[dialogue]]
speaker = "ルヴィネ"
# （あの時と同じ笑顔ね──貴女は）
line = "（あの時と同じ笑顔ね──貴女は）"

[[dialogue]]
speaker = "チナ"
# 「んじゃあ、ルヴィネは『ルヴィ』で決まりな！　ベアトリスは何て呼んで欲しいんだ？」
line = "「んじゃあ、ルヴィネは『ルヴィ』で決まりな！　ベアトリスは何て呼んで欲しいんだ？」"

[[dialogue]]
speaker = "ベアトリス"
# 「え、ええっと……」
line = "「え、ええっと……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「『ベアトリス』の愛称は……『ベティー』とか『トリクシー』とかが一般的なようね」
line = "「『ベアトリス』の愛称は……『ベティー』とか『トリクシー』とかが一般的なようね」"

[[dialogue]]
speaker = "グレイス"
# 「むむむ。どっちにするか悩みますね……！」
line = "「むむむ。どっちにするか悩みますね……！」"

[[dialogue]]
speaker = "チナ"
# 「いや、何でグレイスが悩んでるんだよ……？」
line = "「いや、何でグレイスが悩んでるんだよ……？」"

[[dialogue]]
speaker = "ベアトリス"
# 「じゃあ、あの……『ベアト』って呼んで欲しいかも……！」
line = "「じゃあ、あの……『ベアト』って呼んで欲しいかも……！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「わかったわ。でも──どうして『ベアト』？　何かこだわりでもあるのかしら」
line = "「わかったわ。でも──どうして『ベアト』？　何かこだわりでもあるのかしら」"

[[dialogue]]
speaker = "ベアトリス"
# 「えへへ……ルヴィネちゃんが、名前の後ろを切って『ルヴィ』って縮めてるから。私も──おんなじがいいなって！」
line = "「えへへ……ルヴィネちゃんが、名前の後ろを切って『ルヴィ』って縮めてるから。私も──おんなじがいいなって！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「…………そう」
line = "「…………そう」"

[[dialogue]]
speaker = "グレイス"
# 「なるほど、そういう決め方もありなんですね！　じゃあ、チナは──チ？」
line = "「なるほど、そういう決め方もありなんですね！　じゃあ、チナは──チ？」"

[[dialogue]]
speaker = "チナ"
# 「略すな！　呼び捨てでいいだろ！？」
line = "「略すな！　呼び捨てでいいだろ！？」"

[[dialogue]]
speaker = "レティシア"
# 「…………チ」
line = "「…………チ」"

[[dialogue]]
speaker = "チナ"
# 「たまに喋ったと思ったら──お前まで乗るな、レティシア！！」
line = "「たまに喋ったと思ったら──お前まで乗るな、レティシア！！」"

[[dialogue]]
speaker = "unk"
# ベアトリス。その名の意味は『祝福をもたらす者』だ。
line = "ベアトリス。その名の意味は『祝福をもたらす者』だ。"

[[dialogue]]
speaker = "unk"
# 周囲に祝福をもたらすには──何よりもまず、本人が幸せでなければならない。ルヴィネは創造神との戦いを経て、そのことを学んだ。
line = "周囲に祝福をもたらすには──何よりもまず、本人が幸せでなければならない。ルヴィネは創造神との戦いを経て、そのことを学んだ。"

[[dialogue]]
speaker = "unk"
# だから──願う。どうかアルタイルの彼女には、これから数多くの幸福が訪れんことを。
line = "だから──願う。どうかアルタイルの彼女には、これから数多くの幸福が訪れんことを。"

[[dialogue]]
speaker = "ルヴィネ"
# 「……みんな。せっかく訪ねて来てくれて早々、悪いのだけれど。私もしばらくしたら、アルタイルに向かわなくてはならないの」
line = "「……みんな。せっかく訪ねて来てくれて早々、悪いのだけれど。私もしばらくしたら、アルタイルに向かわなくてはならないの」"

[[dialogue]]
speaker = "ルヴィネ"
# 「だからデネブにいる間は、ここにいる人たちにお世話をしてもらって頂戴ね」
line = "「だからデネブにいる間は、ここにいる人たちにお世話をしてもらって頂戴ね」"

[[dialogue]]
speaker = "リノ"
# 「みんな可愛いわ～♪　クロトが小さかった頃を思い出すわね。ふふ、しっかりばっちりお世話してあげる！」
line = "「みんな可愛いわ～♪　クロトが小さかった頃を思い出すわね。ふふ、しっかりばっちりお世話してあげる！」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「ああ！　いいかチビども、あたしたちの言うこと、ちゃんと聞くんだぞ！」
line = "「ああ！　いいかチビども、あたしたちの言うこと、ちゃんと聞くんだぞ！」"

[[dialogue]]
speaker = "チナ"
# 「っ！？　流星ライダー……ヒーローのお姉ちゃんだ！！」
line = "「っ！？　流星ライダー……ヒーローのお姉ちゃんだ！！」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「えっ……！？」
line = "「えっ……！？」"

[[dialogue]]
speaker = "グレイス"
# 「あ……本当ですっ！　流星ライダーのお姉さんですっ！」
line = "「あ……本当ですっ！　流星ライダーのお姉さんですっ！」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「お前ら……あたしのこと、知ってる、のか……？」
line = "「お前ら……あたしのこと、知ってる、のか……？」"

[[dialogue]]
speaker = "エステル"
# 「は、はい……！　アルタイルで──どういつ、そんざい？　のお姉さんに、助けてもらいました……！」
line = "「は、はい……！　アルタイルで──どういつ、そんざい？　のお姉さんに、助けてもらいました……！」"

[[dialogue]]
speaker = "チナ"
# 「おとうさんを助けてくれてありがとう！　ヒーローのお姉ちゃん！！」
line = "「おとうさんを助けてくれてありがとう！　ヒーローのお姉ちゃん！！」"

[[dialogue]]
speaker = "アポロ（大人）"
# （…………そうか）
line = "（…………そうか）"

[[dialogue]]
speaker = "アポロ"
# 「たくさん迷惑かけて……悪かったな。今度こそ、本物のヒーローになれるよう、頑張ってみるさ」
line = "「たくさん迷惑かけて……悪かったな。今度こそ、本物のヒーローになれるよう、頑張ってみるさ」"

[[dialogue]]
speaker = "unk"
# ──１０年前。あの誓いを胸に、今日まで生きてきた。
line = "──１０年前。あの誓いを胸に、今日まで生きてきた。"

[[dialogue]]
speaker = "unk"
# けれどデネブに帰ってきたら、世界は大きく様変わりしていて。
line = "けれどデネブに帰ってきたら、世界は大きく様変わりしていて。"

[[dialogue]]
speaker = "unk"
# 魔王も、<ruby=エリシア>妹</ruby>も──この世からいなくなっていて──
line = "魔王も、<ruby>妹<rt>エリシア</rt></ruby>も──この世からいなくなっていて──"

[[dialogue]]
speaker = "unk"
# それでもアポロは誓いを果たすため、戦い続けてきた──
line = "それでもアポロは誓いを果たすため、戦い続けてきた──"

[[dialogue]]
speaker = "アポロ（大人）"
# （…………向こうのあたしは、ヒーローになれたんだな）
line = "（…………向こうのあたしは、ヒーローになれたんだな）"

[[dialogue]]
speaker = "unk"
# あの時の決意は、同一存在同士、共有されている。デネブの自分の誓いの言葉は、アルタイルの自分にも余すことなく伝わっている──
line = "あの時の決意は、同一存在同士、共有されている。デネブの自分の誓いの言葉は、アルタイルの自分にも余すことなく伝わっている──"

[[dialogue]]
speaker = "unk"
# そして今、自分は──初対面の幼い子供から、ヒーローと呼ばれた。
line = "そして今、自分は──初対面の幼い子供から、ヒーローと呼ばれた。"

[[dialogue]]
speaker = "アポロ（大人）"
# （……エリシア。ようやくお前に、胸が張れるかな？）
line = "（……エリシア。ようやくお前に、胸が張れるかな？）"

[[dialogue]]
speaker = "アポロ（大人）"
# 「よ、よぉしっ！　それじゃあヒーローのお姉さんが思いっきりもてなしてやる！　まずはバイクに乗って流星市国を一周するか！！」
line = "「よ、よぉしっ！　それじゃあヒーローのお姉さんが思いっきりもてなしてやる！　まずはバイクに乗って流星市国を一周するか！！」"

[[dialogue]]
speaker = "チナ"
# 「バイク！？　乗りたい！！」
line = "「バイク！？　乗りたい！！」"

[[dialogue]]
speaker = "リノ"
# 「アポロ。おもてなしするのはいいけど、あんまりはしゃぎすぎないようにね？」
line = "「アポロ。おもてなしするのはいいけど、あんまりはしゃぎすぎないようにね？」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「わかってるさ、リノ！！」
line = "「わかってるさ、リノ！！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「あ……最後の客人が着いたみたいね。どうぞ入って頂戴」
line = "「あ……最後の客人が着いたみたいね。どうぞ入って頂戴」"

[[dialogue]]
speaker = "ルヴィネ"
# 「────学園長」
line = "「────学園長」"
