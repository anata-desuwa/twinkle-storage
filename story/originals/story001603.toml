[[dialogue]]
speaker = "セナリィ"
# 「気になる最初の入社試験は──」
line = "「気になる最初の入社試験は──」"

[[dialogue]]
speaker = "セナリィ"
# 「実戦ですわ！」
line = "「実戦ですわ！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「いきなりですかー！？」
line = "「いきなりですかー！？」"

[[dialogue]]
speaker = "セナリィ"
# 「依頼は突然やってくるもの。この程度で驚いていては、我が社の社員は務まりませんわよ」
line = "「依頼は突然やってくるもの。この程度で驚いていては、我が社の社員は務まりませんわよ」"

[[dialogue]]
speaker = "セナリィ"
# （この子たちの試験を考えてて、うっかり今晩の依頼を忘れるところだったわ……ギリギリ思い出せて良かった）
line = "（この子たちの試験を考えてて、うっかり今晩の依頼を忘れるところだったわ……ギリギリ思い出せて良かった）"

[[dialogue]]
speaker = "セナリィ"
# （その依頼を試験にするというのは、当意即妙な冴えたアイデアね。さすがは私！）
line = "（その依頼を試験にするというのは、当意即妙な冴えたアイデアね。さすがは私！）"

[[dialogue]]
speaker = "セナリィ"
# 「依頼は、とある闇グループの尻尾を掴むこと」
line = "「依頼は、とある闇グループの尻尾を掴むこと」"

[[dialogue]]
speaker = "ミウ"
# 「闇グループですか……どのような悪辣な組織なんですか？」
line = "「闇グループですか……どのような悪辣な組織なんですか？」"

[[dialogue]]
speaker = "セナリィ"
# 「なんでも人間界を訪れたばかりで右も左もわからない魔族や天使を騙し、違法な契約書に判を押させ、星騎士を私的に働かせるのだとか」
line = "「なんでも人間界を訪れたばかりで右も左もわからない魔族や天使を騙し、違法な契約書に判を押させ、星騎士を私的に働かせるのだとか」"

[[dialogue]]
speaker = "セナリィ"
# 「犯罪の片棒を担がせたり、借金の連帯保証人にさせたりと……異変を感じた被害者の訴えで、明るみに出たとのことですわ」
line = "「犯罪の片棒を担がせたり、借金の連帯保証人にさせたりと……異変を感じた被害者の訴えで、明るみに出たとのことですわ」"

[[dialogue]]
speaker = "ミウ"
# 「なるほど……被害者に気付かれるなんて随分と甘いんですね。その程度の組織でしたら、きっと尻尾を掴んでみせます」
line = "「なるほど……被害者に気付かれるなんて随分と甘いんですね。その程度の組織でしたら、きっと尻尾を掴んでみせます」"

[[dialogue]]
speaker = "ヒマワリ"
# 「現場の空気を味わえるなんて感激です！　セナリィ社長の活躍をかぶりつきで見られるなんて！」
line = "「現場の空気を味わえるなんて感激です！　セナリィ社長の活躍をかぶりつきで見られるなんて！」"

[[dialogue]]
speaker = "セナリィ"
# 「悠長にしていられるのも、今だけですわよ」
line = "「悠長にしていられるのも、今だけですわよ」"

[[dialogue]]
speaker = "セナリィ"
# 「くれぐれも私の仕事の邪魔をしないように。そして、命の危険を感じたらすぐさま撤退なさい」
line = "「くれぐれも私の仕事の邪魔をしないように。そして、命の危険を感じたらすぐさま撤退なさい」"

[[dialogue]]
speaker = "セナリィ"
# 「ただし、撤退した時点で不合格とみなします。二度と危険な世界に近づこうだなんて思わないことですわ」
line = "「ただし、撤退した時点で不合格とみなします。二度と危険な世界に近づこうだなんて思わないことですわ」"

[[dialogue]]
speaker = "ミウ＆ヒマワリ"
# 「了解です、社長！」
line = "「了解です、社長！」"

[[dialogue]]
speaker = "セナリィ"
# （いざ現場に立ったら、ビビるに違いないわ。裏の仕事は決して格好いいことばかりではないの。理想と現実は違うのよ）
line = "（いざ現場に立ったら、ビビるに違いないわ。裏の仕事は決して格好いいことばかりではないの。理想と現実は違うのよ）"

[[dialogue]]
speaker = "セナリィ"
# 「ここもハズレ。目星はついているんですけど、何処ももぬけの殻。なかなか見つかりませんわね」
line = "「ここもハズレ。目星はついているんですけど、何処ももぬけの殻。なかなか見つかりませんわね」"

[[dialogue]]
speaker = "セナリィ"
# 「にしても、先行したあの子たちは何処へ……？　怪我していないといいんですけれど──」
line = "「にしても、先行したあの子たちは何処へ……？　怪我していないといいんですけれど──」"

[[dialogue]]
speaker = "男"
# 「うわあああああ！？」
line = "「うわあああああ！？」"

[[dialogue]]
speaker = "セナリィ"
# 「今の声は！？」
line = "「今の声は！？」"

[[dialogue]]
speaker = "ヒマワリ"
# 「たくさんいたお仲間も、残るはあんただけー。早いとこ、口を割った方が幸せだと思うけどー？」
line = "「たくさんいたお仲間も、残るはあんただけー。早いとこ、口を割った方が幸せだと思うけどー？」"

[[dialogue]]
speaker = "男"
# 「てめぇらみたいなガキどもにやられちまうとはな……だがよ、んな簡単に口を割るわきゃねーだろーが。オレらはこの道のプロだぜ？」
line = "「てめぇらみたいなガキどもにやられちまうとはな……だがよ、んな簡単に口を割るわきゃねーだろーが。オレらはこの道のプロだぜ？」"

[[dialogue]]
speaker = "ヒマワリ"
# 「ふーん、それなら動けなくしてから問い詰めるからいいけどね。後悔しても知んないよー？」
line = "「ふーん、それなら動けなくしてから問い詰めるからいいけどね。後悔しても知んないよー？」"

[[dialogue]]
speaker = "男"
# 「ナメんな、ガキが！」
line = "「ナメんな、ガキが！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「子どもだと思って舐めてかかると痛い目見るんだよー！　オーバースペキュレーション！」
line = "「子どもだと思って舐めてかかると痛い目見るんだよー！　オーバースペキュレーション！」"

[[dialogue]]
speaker = "男"
# 「な、なんだ！？　体にすげぇ力が溢れて……？」
line = "「な、なんだ！？　体にすげぇ力が溢れて……？」"

[[dialogue]]
speaker = "ヒマワリ"
# 「それが、あたしの能力だよ。今、あんたにあたしの力を『投資』した」
line = "「それが、あたしの能力だよ。今、あんたにあたしの力を『投資』した」"

[[dialogue]]
speaker = "男"
# 「な、なんだと……？　力を寄こす相手を間違ってんじゃねぇのか、ありがたく使わせてもらうぜ！」
line = "「な、なんだと……？　力を寄こす相手を間違ってんじゃねぇのか、ありがたく使わせてもらうぜ！」"

[[dialogue]]
speaker = "ミウ"
# 「強くなったからといって、調子に乗らない方が良いですよ。底上げになったあなたから『投資』を『回収』する。それがヒマワリちゃんの能力です」
line = "「強くなったからといって、調子に乗らない方が良いですよ。底上げになったあなたから『投資』を『回収』する。それがヒマワリちゃんの能力です」"

[[dialogue]]
speaker = "ヒマワリ"
# 「そ！　資産価値が上がったところで全投資売却！　返してもらうね！　キャピタルドレイン！」
line = "「そ！　資産価値が上がったところで全投資売却！　返してもらうね！　キャピタルドレイン！」"

[[dialogue]]
speaker = "男"
# 「ぎゃっ！？　力が……オレの力が抜けて……！？　ふにゃふにゃ～……」
line = "「ぎゃっ！？　力が……オレの力が抜けて……！？　ふにゃふにゃ～……」"

[[dialogue]]
speaker = "ヒマワリ"
# 「いっちょあがりぃ！　あたしの力、傷つけずに無力化するのに便利なんだよねー」
line = "「いっちょあがりぃ！　あたしの力、傷つけずに無力化するのに便利なんだよねー」"

[[dialogue]]
speaker = "セナリィ"
# 「あなたたち、大丈夫──あら？　これは……あなたたちがやりましたの？」
line = "「あなたたち、大丈夫──あら？　これは……あなたたちがやりましたの？」"

[[dialogue]]
speaker = "ミウ"
# 「はい、無事に鎮圧しました」
line = "「はい、無事に鎮圧しました」"

[[dialogue]]
speaker = "男"
# 「バンデット・セナリィ……か……？　ちっ、こいつらはお前の部下かよ……」
line = "「バンデット・セナリィ……か……？　ちっ、こいつらはお前の部下かよ……」"

[[dialogue]]
speaker = "セナリィ"
# 「あなた、所属組織は？　契約している星騎士は何処に閉じ込めてますの？」
line = "「あなた、所属組織は？　契約している星騎士は何処に閉じ込めてますの？」"

[[dialogue]]
speaker = "男"
# 「ハッ、言うわけねぇだろうが。殺るならとっとと殺れよ」
line = "「ハッ、言うわけねぇだろうが。殺るならとっとと殺れよ」"

[[dialogue]]
speaker = "セナリィ"
# 「口を割らせるのは少々骨が折れそうですわね」
line = "「口を割らせるのは少々骨が折れそうですわね」"

[[dialogue]]
speaker = "ミウ"
# 「ちょっとだけ素直になってくれるだけでいいんですけど……セナリィ社長、ペンチってありますか？」
line = "「ちょっとだけ素直になってくれるだけでいいんですけど……セナリィ社長、ペンチってありますか？」"

[[dialogue]]
speaker = "セナリィ"
# 「ペンチ？　潜入工作の七つ道具だから持っていますけど……何に使うつもりなのかしら？」
line = "「ペンチ？　潜入工作の七つ道具だから持っていますけど……何に使うつもりなのかしら？」"

[[dialogue]]
speaker = "ミウ"
# 「オーソドックスなやり方ですけど、とりあえず生爪を１枚ずつ剥がそうかと思いまして」
line = "「オーソドックスなやり方ですけど、とりあえず生爪を１枚ずつ剥がそうかと思いまして」"

[[dialogue]]
speaker = "セナリィ"
# 「そう、生爪……なまづめ！？　微笑み浮かべながら吐くセリフじゃありませんわね！？」
line = "「そう、生爪……なまづめ！？　微笑み浮かべながら吐くセリフじゃありませんわね！？」"

[[dialogue]]
speaker = "ミウ"
# 「何枚目で口を割ってくれるかなぁ。強情そうだから、片手くらいじゃ足りませんよね。そうだ、足の指からにしましょうか」
line = "「何枚目で口を割ってくれるかなぁ。強情そうだから、片手くらいじゃ足りませんよね。そうだ、足の指からにしましょうか」"

[[dialogue]]
speaker = "ヒマワリ"
# 「あーあ。だから、早いとこ、口を割った方が良いって言ったのにー。本気になったミウはヤバいよー？」
line = "「あーあ。だから、早いとこ、口を割った方が良いって言ったのにー。本気になったミウはヤバいよー？」"

[[dialogue]]
speaker = "ヒマワリ"
# 「ま、最後まで正気を保っていられるといいねー」
line = "「ま、最後まで正気を保っていられるといいねー」"

[[dialogue]]
speaker = "男"
# 「ヒッ……！？」
line = "「ヒッ……！？」"

[[dialogue]]
speaker = "ミウ"
# 「他に尋問に使えそうな道具は、っと……そこに水道がありますね。お水は簡単に手に入る上、用途がいろいろあるので便利ですよね」
line = "「他に尋問に使えそうな道具は、っと……そこに水道がありますね。お水は簡単に手に入る上、用途がいろいろあるので便利ですよね」"

[[dialogue]]
speaker = "ミウ"
# 「あっ、あそこにいい感じの麻袋がありますね。ゴムホースもあるじゃないですか。アレも使えそうです」
line = "「あっ、あそこにいい感じの麻袋がありますね。ゴムホースもあるじゃないですか。アレも使えそうです」"

[[dialogue]]
speaker = "セナリィ"
# 「水と麻袋とゴムホースをどんな風に使うつもりですの！？　いえ、あんまり聞きたくはないですけど！」
line = "「水と麻袋とゴムホースをどんな風に使うつもりですの！？　いえ、あんまり聞きたくはないですけど！」"

[[dialogue]]
speaker = "ミウ"
# 「またまたぁ、人が悪いです。悪のエリートのセナリィ様なら当然お気づきですよね？　あ、それとも、これも試験の一環なんですか？」
line = "「またまたぁ、人が悪いです。悪のエリートのセナリィ様なら当然お気づきですよね？　あ、それとも、これも試験の一環なんですか？」"

[[dialogue]]
speaker = "セナリィ"
# （いやいやいや、まさかアレをやるつもり！？　どこの特殊部隊の出身！？）
line = "（いやいやいや、まさかアレをやるつもり！？　どこの特殊部隊の出身！？）"

[[dialogue]]
speaker = "ミウ"
# 「捕縛した人はたくさんいますし、最初に口を割った方は軽～い尋問で済ませてあげましょう。ふふふ、皆さんの絆を試す楽しい時間になりそうです♪」
line = "「捕縛した人はたくさんいますし、最初に口を割った方は軽～い尋問で済ませてあげましょう。ふふふ、皆さんの絆を試す楽しい時間になりそうです♪」"

[[dialogue]]
speaker = "男"
# 「ヒィィッ！？　わ、わっ、わかった！　話す！　もうなんでも話すから勘弁してくれ！」
line = "「ヒィィッ！？　わ、わっ、わかった！　話す！　もうなんでも話すから勘弁してくれ！」"

[[dialogue]]
speaker = "ミウ"
# 「えー？　まだ何の準備もしてないのに……どうしましょうか、セナリィ社長」
line = "「えー？　まだ何の準備もしてないのに……どうしましょうか、セナリィ社長」"

[[dialogue]]
speaker = "セナリィ"
# 「ま、まあ、洗いざらい吐くと約束したことですし、今日の所は突き出すだけで勘弁してあげましょうか」
line = "「ま、まあ、洗いざらい吐くと約束したことですし、今日の所は突き出すだけで勘弁してあげましょうか」"

[[dialogue]]
speaker = "ミウ"
# 「わぁ、美しいだけじゃなくて、そんなにお優しいなんて！　皆さん、社長に感謝してくださいね」
line = "「わぁ、美しいだけじゃなくて、そんなにお優しいなんて！　皆さん、社長に感謝してくださいね」"

[[dialogue]]
speaker = "セナリィ"
# （なんなのこの子！？　かわいい顔してめちゃヤバじゃないの！？）
line = "（なんなのこの子！？　かわいい顔してめちゃヤバじゃないの！？）"

[[dialogue]]
speaker = "セナリィ"
# 「一網打尽にして、見事解決。いつも以上の完遂でしたわ」
line = "「一網打尽にして、見事解決。いつも以上の完遂でしたわ」"

[[dialogue]]
speaker = "ヒマワリ"
# 「セナリィ社長？　あたしたちの試験はどうですか？」
line = "「セナリィ社長？　あたしたちの試験はどうですか？」"

[[dialogue]]
speaker = "セナリィ"
# 「え？　試験……あ、あー、そうでしたわね。２人ともなかなかの働きぶりを見せてくれましたわね！」
line = "「え？　試験……あ、あー、そうでしたわね。２人ともなかなかの働きぶりを見せてくれましたわね！」"

[[dialogue]]
speaker = "セナリィ"
# 「よって……第一次試験は合格としますわ」
line = "「よって……第一次試験は合格としますわ」"

[[dialogue]]
speaker = "ミウ"
# 「やった！　次も頑張りますね♪」
line = "「やった！　次も頑張りますね♪」"

[[dialogue]]
speaker = "セナリィ"
# （先ほどの悪魔と同一人物とは思えない天使の笑顔ね……さて、二次試験はどうしたものでしょう）
line = "（先ほどの悪魔と同一人物とは思えない天使の笑顔ね……さて、二次試験はどうしたものでしょう）"
