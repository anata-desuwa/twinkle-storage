[[dialogue]]
speaker = "unk"
# 第１１話,マントは受け継がれる,B
line = "第１１話,マントは受け継がれる,B"

[[dialogue]]
speaker = "マトイ"
# 「──とまぁ、紆余曲折ありながら、新星星徒会は今に至ったの」
line = "「──とまぁ、紆余曲折ありながら、新星星徒会は今に至ったの」"

[[dialogue]]
speaker = "ヴィーナス"
# 「つまり、クロトがつけてるマントは、サーシャさんが作り、私から受け継がれた由緒正しい会長の証なのよ！」
line = "「つまり、クロトがつけてるマントは、サーシャさんが作り、私から受け継がれた由緒正しい会長の証なのよ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「どう？　重みを感じるでしょう？　もーっとありたがりなさい！　えっへん」
line = "「どう？　重みを感じるでしょう？　もーっとありたがりなさい！　えっへん」"

[[dialogue]]
speaker = "unk"
# サーシャさんからヴィーナスへ、ヴィーナスから俺へ。
line = "サーシャさんからヴィーナスへ、ヴィーナスから俺へ。"

[[dialogue]]
speaker = "unk"
# そう思うと身が引き締まる。俺も誰かにこのマントを渡す日が来るのだろうか。
line = "そう思うと身が引き締まる。俺も誰かにこのマントを渡す日が来るのだろうか。"

[[dialogue]]
speaker = "アナ"
# 「つまり、きなこクッキーは星徒会の結束の証なのです。会長も食べてください」
line = "「つまり、きなこクッキーは星徒会の結束の証なのです。会長も食べてください」"

[[dialogue]]
speaker = "マトイ"
# 「あはは、良かったら食べて。緋宮くんの口に合うと良いんだけど」
line = "「あはは、良かったら食べて。緋宮くんの口に合うと良いんだけど」"

[[dialogue]]
speaker = "クロト"
# 「もちろん、いただくよ」
line = "「もちろん、いただくよ」"

[[dialogue]]
speaker = "unk"
# シンプルで飾り気のないキツネ色のクッキーを１枚手に取り、口に運ぶ。
line = "シンプルで飾り気のないキツネ色のクッキーを１枚手に取り、口に運ぶ。"

[[dialogue]]
speaker = "unk"
# 一口かじると、口の中でホロホロと崩れて、きな粉の自然な甘みと香ばしさが広がった。
line = "一口かじると、口の中でホロホロと崩れて、きな粉の自然な甘みと香ばしさが広がった。"

[[dialogue]]
speaker = "マトイ"
# 「どう……かな？」
line = "「どう……かな？」"

[[dialogue]]
speaker = "クロト"
# 「うん、美味しいよ。しつこくないから、毎日でも食べられそうだ」
line = "「うん、美味しいよ。しつこくないから、毎日でも食べられそうだ」"

[[dialogue]]
speaker = "unk"
# サクサクと軽い口当たりで、あっという間に１枚を食べきる。すぐさま２枚目に手を伸ばしたくなる気持ちがよくわかった。
line = "サクサクと軽い口当たりで、あっという間に１枚を食べきる。すぐさま２枚目に手を伸ばしたくなる気持ちがよくわかった。"

[[dialogue]]
speaker = "サーシャ"
# 「『俺のために毎日、作ってくれ』？　あらあら、それってプロポーズ～？」
line = "「『俺のために毎日、作ってくれ』？　あらあら、それってプロポーズ～？」"

[[dialogue]]
speaker = "マトイ"
# 「お味噌汁じゃないんだから！　緋宮くんだってそんな意味で言ったわけじゃないよね？　ね？」
line = "「お味噌汁じゃないんだから！　緋宮くんだってそんな意味で言ったわけじゃないよね？　ね？」"

[[dialogue]]
speaker = "アナ"
# 「ふふ、やはり星徒会は笑いの絶えない楽しい職場です」
line = "「ふふ、やはり星徒会は笑いの絶えない楽しい職場です」"

[[dialogue]]
speaker = "マトイ"
# 「求人情報誌に載ってそうなフレーズだ！？」
line = "「求人情報誌に載ってそうなフレーズだ！？」"

[[dialogue]]
speaker = "アナ"
# 「そんなわけで皆さん、お茶が入りました」
line = "「そんなわけで皆さん、お茶が入りました」"

[[dialogue]]
speaker = "クロト"
# 「うん、アナの入れてくれたお茶美味しいよ。ほのかな渋みが、きなこクッキーとぴったりだ」
line = "「うん、アナの入れてくれたお茶美味しいよ。ほのかな渋みが、きなこクッキーとぴったりだ」"

[[dialogue]]
speaker = "アナ"
# 「オフコースです。私とマトイ先輩はベストマッチングですから」
line = "「オフコースです。私とマトイ先輩はベストマッチングですから」"

[[dialogue]]
speaker = "マトイ"
# 「アナ……！」
line = "「アナ……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「はー……お菓子とお茶が美味しいってだけで幸せよねー。今日はのんびり、何もしたくないわー」
line = "「はー……お菓子とお茶が美味しいってだけで幸せよねー。今日はのんびり、何もしたくないわー」"

[[dialogue]]
speaker = "マトイ"
# 「ヴィーナスはいつものんびりしてるでしょ……」
line = "「ヴィーナスはいつものんびりしてるでしょ……」"

[[dialogue]]
speaker = "サーシャ"
# 「そんなこと言ってると、急に忙しくなっちゃうのよね～」
line = "「そんなこと言ってると、急に忙しくなっちゃうのよね～」"

[[dialogue]]
speaker = "アナ"
# 「モンスターアラームです。即フラグ回収ですね」
line = "「モンスターアラームです。即フラグ回収ですね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「んもう！　お茶のおかわりが欲しかったのにー！」
line = "「んもう！　お茶のおかわりが欲しかったのにー！」"

[[dialogue]]
speaker = "マトイ"
# 「お茶会の続きは、アステラを片づけたらね」
line = "「お茶会の続きは、アステラを片づけたらね」"

[[dialogue]]
speaker = "アナ"
# 「なるはやで終わらせましょう」
line = "「なるはやで終わらせましょう」"

[[dialogue]]
speaker = "サーシャ"
# 「みんなとの絆を深めたところで、会長くん、格好よく決めてね～」
line = "「みんなとの絆を深めたところで、会長くん、格好よく決めてね～」"

[[dialogue]]
speaker = "unk"
# 俺は食べかけのきなこクッキーを口に放り込み、会長の証であるマントを翻す。
line = "俺は食べかけのきなこクッキーを口に放り込み、会長の証であるマントを翻す。"

[[dialogue]]
speaker = "クロト"
# 「新星星徒会、行くぞ！」
line = "「新星星徒会、行くぞ！」"

[[dialogue]]
speaker = "みんな"
# 「了解っ！」
line = "「了解っ！」"

[[dialogue]]
speaker = "unk"
# こうして俺たち新星学園星徒会は、今日も平和の守護者としての使命を果たすのだった。
line = "こうして俺たち新星学園星徒会は、今日も平和の守護者としての使命を果たすのだった。"
