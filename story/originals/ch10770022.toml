[[dialogue]]
speaker = "unk"
# 第２話,恋もお仕事も,P
line = "第２話,恋もお仕事も,P"

[[dialogue]]
speaker = "unk"
# 渋谷の街を歩いていると、あちこちからクリスマスの曲が流れてくる。そんな中を、俺と蘭美はいつものように２人で寄り添い合いながら歩いていた。
line = "渋谷の街を歩いていると、あちこちからクリスマスの曲が流れてくる。そんな中を、俺と蘭美はいつものように２人で寄り添い合いながら歩いていた。"

[[dialogue]]
speaker = "unk"
# クリスマスも間近に迫ってきて、街中のイルミネーションも華やいでいる。それを片っ端から見て回ろうじゃないか、というデートプランだった。
line = "クリスマスも間近に迫ってきて、街中のイルミネーションも華やいでいる。それを片っ端から見て回ろうじゃないか、というデートプランだった。"

[[dialogue]]
speaker = "unk"
# 当然、１日では時間が全然足りない。そのため、クリスマスに向けて俺たちは毎日のようにあちこち出かけているのだ。
line = "当然、１日では時間が全然足りない。そのため、クリスマスに向けて俺たちは毎日のようにあちこち出かけているのだ。"

[[dialogue]]
speaker = "蘭美"
# 「ふふっ、渋谷のイルミネーションも綺麗だったわね。青いライトが『冬』を感じさせてロマンチックだったわ」
line = "「ふふっ、渋谷のイルミネーションも綺麗だったわね。青いライトが『冬』を感じさせてロマンチックだったわ」"

[[dialogue]]
speaker = "蘭美"
# 「いろいろ見て回ったけど、今のところ貴方的にはどこが一番だったかしら？」
line = "「いろいろ見て回ったけど、今のところ貴方的にはどこが一番だったかしら？」"

[[dialogue]]
speaker = "unk"
# 正直甲乙つけがたい
line = "正直甲乙つけがたい"

[[dialogue]]
speaker = "unk"
# どれも綺麗だったからな……
line = "どれも綺麗だったからな……"

[[dialogue]]
speaker = "蘭美"
# 「ふふっ、そうね。どれも素晴らしいものだったわ！」
line = "「ふふっ、そうね。どれも素晴らしいものだったわ！」"

[[dialogue]]
speaker = "蘭美"
# 「今まではあまり気にしていなかったけど、人間界にはこんなにいろんなイルミネーションがあったのね」
line = "「今まではあまり気にしていなかったけど、人間界にはこんなにいろんなイルミネーションがあったのね」"

[[dialogue]]
speaker = "蘭美"
# 「しかも、まだまだ見ていないところが沢山残っていると言うんだから……クリスマスまでいっぱい楽しめそうね。明日はどこに行きましょうか？」
line = "「しかも、まだまだ見ていないところが沢山残っていると言うんだから……クリスマスまでいっぱい楽しめそうね。明日はどこに行きましょうか？」"

[[dialogue]]
speaker = "unk"
# 嬉しいけど、大丈夫なの？
line = "嬉しいけど、大丈夫なの？"

[[dialogue]]
speaker = "蘭美"
# 「あら、もしかして私のお仕事のことを気にしてくれたのかしら？」
line = "「あら、もしかして私のお仕事のことを気にしてくれたのかしら？」"

[[dialogue]]
speaker = "蘭美"
# 「大丈夫よ。学園とお屋敷の仕事は、デート前に最速で終わらせてきたから」
line = "「大丈夫よ。学園とお屋敷の仕事は、デート前に最速で終わらせてきたから」"

[[dialogue]]
speaker = "蘭美"
# 「それに貴方と過ごす時間は、私にとってとても重要なの」
line = "「それに貴方と過ごす時間は、私にとってとても重要なの」"

[[dialogue]]
speaker = "蘭美"
# 「貴方との時間を疎かにして、恋人関係を解消された……なんて事になったら、悔やんでも悔やみきれないわ」
line = "「貴方との時間を疎かにして、恋人関係を解消された……なんて事になったら、悔やんでも悔やみきれないわ」"

[[dialogue]]
speaker = "蘭美"
# 「だから私の仕事のことは気にしなくても大丈夫よ」
line = "「だから私の仕事のことは気にしなくても大丈夫よ」"

[[dialogue]]
speaker = "unk"
# メイドのお仕事はどうするの？
line = "メイドのお仕事はどうするの？"

[[dialogue]]
speaker = "unk"
# もし俺と結婚したら
line = "もし俺と結婚したら"

[[dialogue]]
speaker = "蘭美"
# 「ん……それは、あまりちゃんとは考えていなかったわね」
line = "「ん……それは、あまりちゃんとは考えていなかったわね」"

[[dialogue]]
speaker = "蘭美"
# 「もちろん私にとって、メイドの仕事は大切なものよ」
line = "「もちろん私にとって、メイドの仕事は大切なものよ」"

[[dialogue]]
speaker = "蘭美"
# 「憧れである師匠を超えて世界１位のメイドになる、という夢もまだ叶えてないしね……簡単に捨て去れるものではないわ」
line = "「憧れである師匠を超えて世界１位のメイドになる、という夢もまだ叶えてないしね……簡単に捨て去れるものではないわ」"

[[dialogue]]
speaker = "蘭美"
# 「けれど、妻として貴方に尽くしたいという気持ちも、それと同じくらい大きいの」
line = "「けれど、妻として貴方に尽くしたいという気持ちも、それと同じくらい大きいの」"

[[dialogue]]
speaker = "蘭美"
# 「これは難しい問題ね……私１人で簡単に答えを出せそうにないわ。ねえ、貴方はどうして欲しいかしら？」
line = "「これは難しい問題ね……私１人で簡単に答えを出せそうにないわ。ねえ、貴方はどうして欲しいかしら？」"

[[dialogue]]
speaker = "unk"
# 蘭美の望むようにして欲しい
line = "蘭美の望むようにして欲しい"

[[dialogue]]
speaker = "unk"
# 俺は……
line = "俺は……"

[[dialogue]]
speaker = "蘭美"
# 「私の好きなようにしていいの？　ふふ……優しいのね」
line = "「私の好きなようにしていいの？　ふふ……優しいのね」"

[[dialogue]]
speaker = "蘭美"
# 「そうね。だったら……こういうのはどうかしら？　結婚してもメイドは続ける──」
line = "「そうね。だったら……こういうのはどうかしら？　結婚してもメイドは続ける──」"

[[dialogue]]
speaker = "蘭美"
# 「けれど、九浄のお屋敷からはお<ruby=いとま>暇</ruby>を頂くことにするわ」
line = "「けれど、九浄のお屋敷からはお<ruby>暇<rt>いとま</rt></ruby>を頂くことにするわ」"

[[dialogue]]
speaker = "蘭美"
# 「そうして貴方だけに仕える、貴方だけのメイドになってあげる。これなら家庭とメイドを両立できるでしょう？」
line = "「そうして貴方だけに仕える、貴方だけのメイドになってあげる。これなら家庭とメイドを両立できるでしょう？」"

[[dialogue]]
speaker = "蘭美"
# 「貴方に誠心誠意仕えることで、私はメイドとしての腕を磨き──そして世界１位のメイドになる。それが最高の選択じゃないかしら？」
line = "「貴方に誠心誠意仕えることで、私はメイドとしての腕を磨き──そして世界１位のメイドになる。それが最高の選択じゃないかしら？」"

[[dialogue]]
speaker = "unk"
# 蘭美が、俺だけのメイド……
line = "蘭美が、俺だけのメイド……"

[[dialogue]]
speaker = "蘭美"
# 「ふふふ……鼻の下が伸びてるわね。もしかして貴方だけのメイドになった私を想像して、エッチなことでも考えたのかしら？」
line = "「ふふふ……鼻の下が伸びてるわね。もしかして貴方だけのメイドになった私を想像して、エッチなことでも考えたのかしら？」"

[[dialogue]]
speaker = "蘭美"
# 「そんなことない、って……どうかしら？　その慌てっぷりは怪しいものね」
line = "「そんなことない、って……どうかしら？　その慌てっぷりは怪しいものね」"

[[dialogue]]
speaker = "蘭美"
# 「でもまあ……貴方は私の主であり夫になるわけだから、多少はそういった求めにも、応じなければならないかしら？」
line = "「でもまあ……貴方は私の主であり夫になるわけだから、多少はそういった求めにも、応じなければならないかしら？」"

[[dialogue]]
speaker = "蘭美"
# 「どんな命令をされてしまうのか……今から恐ろしくて仕方がないわ。ふふっ♪」
line = "「どんな命令をされてしまうのか……今から恐ろしくて仕方がないわ。ふふっ♪」"

[[dialogue]]
speaker = "unk"
# 震えるようなリアクションを取りながらも、蘭美の声は明るく弾んでいた。
line = "震えるようなリアクションを取りながらも、蘭美の声は明るく弾んでいた。"

[[dialogue]]
speaker = "unk"
# そして、未来に想いを馳せる蘭美の顔は、期待にキラキラと輝いているように見えたのだった。
line = "そして、未来に想いを馳せる蘭美の顔は、期待にキラキラと輝いているように見えたのだった。"
