[[dialogue]]
speaker = "unk"
# 第２話,シズハとゲームオフ会,P
line = "第２話,シズハとゲームオフ会,P"

[[dialogue]]
speaker = "unk"
# その日、俺の仕事が終わるのを、シズハがソファーに座って待ってくれていた。
line = "その日、俺の仕事が終わるのを、シズハがソファーに座って待ってくれていた。"

[[dialogue]]
speaker = "シズハ"
# 「よ～し、ディーちゃん、いくよ～。えいっ♪」
line = "「よ～し、ディーちゃん、いくよ～。えいっ♪」"

[[dialogue]]
speaker = "ディーラック"
# 「甘いね、シズハちゃん。それじゃあ勝てないよ……よっと！」
line = "「甘いね、シズハちゃん。それじゃあ勝てないよ……よっと！」"

[[dialogue]]
speaker = "シズハ"
# 「あ～、負けた～！　ディーちゃん、本当にこのゲーム強いね～」
line = "「あ～、負けた～！　ディーちゃん、本当にこのゲーム強いね～」"

[[dialogue]]
speaker = "ディーラック"
# 「一時期、檻から出られなかった時に、暇つぶしによく遊んでたからね」
line = "「一時期、檻から出られなかった時に、暇つぶしによく遊んでたからね」"

[[dialogue]]
speaker = "シズハ"
# 「――あっ、会長！　仕事終わったの？」
line = "「――あっ、会長！　仕事終わったの？」"

[[dialogue]]
speaker = "unk"
# ２人でなんのゲームをしてたんだ？
line = "２人でなんのゲームをしてたんだ？"

[[dialogue]]
speaker = "シズハ"
# 「えっとね、『マッドスタンパー』っていうゲームなんだけど～、会長は知ってる？」
line = "「えっとね、『マッドスタンパー』っていうゲームなんだけど～、会長は知ってる？」"

[[dialogue]]
speaker = "unk"
# 俺は頷く。『マッドスタンパー』――携帯機で遊べるＦＰＳゲームだ。以前、ネビュラの知り合いの魔女から教えてもらったことがある。
line = "俺は頷く。『マッドスタンパー』――携帯機で遊べるＦＰＳゲームだ。以前、ネビュラの知り合いの魔女から教えてもらったことがある。"

[[dialogue]]
speaker = "unk"
# ……もっとも、その内容はかなり特殊だ。
line = "……もっとも、その内容はかなり特殊だ。"

[[dialogue]]
speaker = "unk"
# 『自己紹介乙』『効いてて草』などの煽りスタンプを武器に、ひたすら『煽りポイント』を稼ぎ合うという、なんとも尖ったゲームである。
line = "『自己紹介乙』『効いてて草』などの煽りスタンプを武器に、ひたすら『煽りポイント』を稼ぎ合うという、なんとも尖ったゲームである。"

[[dialogue]]
speaker = "シズハ"
# 「――あはは、確かにちょ～っと人を選ぶ感じはあるよね～。でも、全世界で３０００万人がプレイしてるぐらい人気なんだよね」
line = "「――あはは、確かにちょ～っと人を選ぶ感じはあるよね～。でも、全世界で３０００万人がプレイしてるぐらい人気なんだよね」"

[[dialogue]]
speaker = "ディーラック"
# 「ヒトカスの作ったゲームにしては、なかなか悪くないのサ。思いっきり煽りまくれるしね」
line = "「ヒトカスの作ったゲームにしては、なかなか悪くないのサ。思いっきり煽りまくれるしね」"

[[dialogue]]
speaker = "シズハ"
# 「ディーちゃんね、最近はゲーム内でよく一緒にチームを組む『友達』もできたらしくて～」
line = "「ディーちゃんね、最近はゲーム内でよく一緒にチームを組む『友達』もできたらしくて～」"

[[dialogue]]
speaker = "ディーラック"
# 「友達じゃない。あくまでゲーム内で登録する『フレンド』。野良の下手クソと組むよりは勝率が上がるから、共闘してやってるだけサ」
line = "「友達じゃない。あくまでゲーム内で登録する『フレンド』。野良の下手クソと組むよりは勝率が上がるから、共闘してやってるだけサ」"

[[dialogue]]
speaker = "シズハ"
# 「それでね、私もフレンド登録してもらったんだけど、ディーちゃんに負けないくらい、すっごく強いんだよ！」
line = "「それでね、私もフレンド登録してもらったんだけど、ディーちゃんに負けないくらい、すっごく強いんだよ！」"

[[dialogue]]
speaker = "シズハ"
# 「えっとね、２人いるんだけど、プレイヤーネームが『フランボウ』さんと、『アブラマシマシ』さんって言って……」
line = "「えっとね、２人いるんだけど、プレイヤーネームが『フランボウ』さんと、『アブラマシマシ』さんって言って……」"

[[dialogue]]
speaker = "unk"
# えっ、その名前……
line = "えっ、その名前……"

[[dialogue]]
speaker = "シズハ"
# 「？　どうしたの会長？」
line = "「？　どうしたの会長？」"

[[dialogue]]
speaker = "unk"
# 数日後。
line = "数日後。"

[[dialogue]]
speaker = "シズハ"
# 「まさか……フレンドの２人が、会長と知り合いだったなんて……！」
line = "「まさか……フレンドの２人が、会長と知り合いだったなんて……！」"

[[dialogue]]
speaker = "ミネコ"
# 「いや～、やっぱ会長と友達やってると面白いよね～♪　まさかゲームのフレンドと、こうしてオフ会することになるなんて思わなかったよ～」
line = "「いや～、やっぱ会長と友達やってると面白いよね～♪　まさかゲームのフレンドと、こうしてオフ会することになるなんて思わなかったよ～」"

[[dialogue]]
speaker = "unk"
# マッドスタンパーのプレイヤーネーム『フランボウ』こと、流星学園１年生『ミネコ・フランボワーズ』。
line = "マッドスタンパーのプレイヤーネーム『フランボウ』こと、流星学園１年生『ミネコ・フランボワーズ』。"

[[dialogue]]
speaker = "イニシュ"
# 「さすが魔王。マシマシ系ラーメンのようにリアルフレンドも豊富ですね」
line = "「さすが魔王。マシマシ系ラーメンのようにリアルフレンドも豊富ですね」"

[[dialogue]]
speaker = "unk"
# プレイヤーネーム『アブラマシマシ』こと、俺にマッドスタンパーを教えてくれた張本人――ネビュラ所属の魔女『イニシュ』。
line = "プレイヤーネーム『アブラマシマシ』こと、俺にマッドスタンパーを教えてくれた張本人――ネビュラ所属の魔女『イニシュ』。"

[[dialogue]]
speaker = "イニシュ"
# 「しかしあの『バッドラッカー』が、まさかヒトではなく使い魔だったとは思いませんでした」
line = "「しかしあの『バッドラッカー』が、まさかヒトではなく使い魔だったとは思いませんでした」"

[[dialogue]]
speaker = "ディーラック"
# 「ふん……別にいいだろ。そんなこと言ったら、お前だって魔女じゃん」
line = "「ふん……別にいいだろ。そんなこと言ったら、お前だって魔女じゃん」"

[[dialogue]]
speaker = "unk"
# 『バッドラッカー』とは、ディーちゃんのプレイヤーネームである。
line = "『バッドラッカー』とは、ディーちゃんのプレイヤーネームである。"

[[dialogue]]
speaker = "unk"
# ちなみに、ディーちゃんが『エネルギー生命体』であることは下手に説明できない為、シズハの能力で召喚された使い魔的な存在ということにしていた。
line = "ちなみに、ディーちゃんが『エネルギー生命体』であることは下手に説明できない為、シズハの能力で召喚された使い魔的な存在ということにしていた。"

[[dialogue]]
speaker = "ミネコ"
# 「そういえば、シズハは附属校の３年生なんだよね？　なら、私の後輩だ♪」
line = "「そういえば、シズハは附属校の３年生なんだよね？　なら、私の後輩だ♪」"

[[dialogue]]
speaker = "シズハ"
# 「はい♪　よろしくお願いしますね、ミネコ先輩！」
line = "「はい♪　よろしくお願いしますね、ミネコ先輩！」"

[[dialogue]]
speaker = "ミネコ"
# 「そういえば前から気になってたんだけどさ～。シズハのプレイヤーネーム――」
line = "「そういえば前から気になってたんだけどさ～。シズハのプレイヤーネーム――」"

[[dialogue]]
speaker = "ミネコ"
# 「『グレイルヒップ』ってどういう意味なの？」
line = "「『グレイルヒップ』ってどういう意味なの？」"

[[dialogue]]
speaker = "イニシュ"
# 「フランボウやバッドラッカーは、本人由来と推察することができます。ですが『グレイルヒップ』の由来はわかりません」
line = "「フランボウやバッドラッカーは、本人由来と推察することができます。ですが『グレイルヒップ』の由来はわかりません」"

[[dialogue]]
speaker = "シズハ"
# 「あっ……えっと～、ちょっと恥ずかしいんですけど～」
line = "「あっ……えっと～、ちょっと恥ずかしいんですけど～」"

[[dialogue]]
speaker = "シズハ"
# 「『グレイル』は、なんとなく『聖杯』って、神聖でカッコいいなと思って……」
line = "「『グレイル』は、なんとなく『聖杯』って、神聖でカッコいいなと思って……」"

[[dialogue]]
speaker = "unk"
# そう言って少し頬を染めたあと――なぜかそこからは、やけに堂々と続ける。
line = "そう言って少し頬を染めたあと――なぜかそこからは、やけに堂々と続ける。"

[[dialogue]]
speaker = "シズハ"
# 「――で、ヒップの方は率直に『お尻』って意味です！　私、お尻が大好きなので♪」
line = "「――で、ヒップの方は率直に『お尻』って意味です！　私、お尻が大好きなので♪」"

[[dialogue]]
speaker = "unk"
# お尻よりも聖杯の方が恥ずかしいんだ……
line = "お尻よりも聖杯の方が恥ずかしいんだ……"

[[dialogue]]
speaker = "シズハ"
# 「え？　うん。だって聖杯ってなんか仰々しいし……お尻は普通でしょ？」
line = "「え？　うん。だって聖杯ってなんか仰々しいし……お尻は普通でしょ？」"

[[dialogue]]
speaker = "ミネコ"
# 「えっと……その『お尻が好き』っていうのは、どういう……？」
line = "「えっと……その『お尻が好き』っていうのは、どういう……？」"

[[dialogue]]
speaker = "シズハ"
# 「あっ、そうだ！　お近づきの印に、ミネコ先輩とイニシュさんのお尻、触ってもいいですか♪」
line = "「あっ、そうだ！　お近づきの印に、ミネコ先輩とイニシュさんのお尻、触ってもいいですか♪」"

[[dialogue]]
speaker = "ミネコ"
# 「ちょっと待って！？　触るってどういうこと！？」
line = "「ちょっと待って！？　触るってどういうこと！？」"

[[dialogue]]
speaker = "イニシュ"
# 「お尻が好きというのは、それがシズハの『性癖』ということでしょうか？」
line = "「お尻が好きというのは、それがシズハの『性癖』ということでしょうか？」"

[[dialogue]]
speaker = "シズハ"
# 「いえいえ！　好きなのは確かですけど――私にとって、お尻は『コミュニケーション』なんです！」
line = "「いえいえ！　好きなのは確かですけど――私にとって、お尻は『コミュニケーション』なんです！」"

[[dialogue]]
speaker = "シズハ"
# 「日本で一緒にお風呂に入ることを『裸の付き合い』って言いますよね？」
line = "「日本で一緒にお風呂に入ることを『裸の付き合い』って言いますよね？」"

[[dialogue]]
speaker = "シズハ"
# 「それと同じで――互いのお尻を触り合えば『お尻合い』になれる、というイメージが近いです！」
line = "「それと同じで――互いのお尻を触り合えば『お尻合い』になれる、というイメージが近いです！」"

[[dialogue]]
speaker = "イニシュ"
# 「人間界にはそのような文化があるのですね。初耳です」
line = "「人間界にはそのような文化があるのですね。初耳です」"

[[dialogue]]
speaker = "ミネコ"
# 「いや、私も半分日本人だけど、知らないよ！？」
line = "「いや、私も半分日本人だけど、知らないよ！？」"

[[dialogue]]
speaker = "ディーラック"
# 「さすがシズハちゃん。マッドスタンパーの煽り合いが得意なプレイヤーでも、さすがに引いてるのサ」
line = "「さすがシズハちゃん。マッドスタンパーの煽り合いが得意なプレイヤーでも、さすがに引いてるのサ」"

[[dialogue]]
speaker = "シズハ"
# 「だって、せっかく顔を合わせたんですし、リアルでも仲良くなりたいな～って♪　なので、お尻を――」
line = "「だって、せっかく顔を合わせたんですし、リアルでも仲良くなりたいな～って♪　なので、お尻を――」"

[[dialogue]]
speaker = "ミネコ"
# 「お尻は一旦置いとこうか！？」
line = "「お尻は一旦置いとこうか！？」"

[[dialogue]]
speaker = "ミネコ"
# 「と、友達になること自体は、もちろん大歓迎だよ♪　ディスクの連絡先、交換しよっか！」
line = "「と、友達になること自体は、もちろん大歓迎だよ♪　ディスクの連絡先、交換しよっか！」"

[[dialogue]]
speaker = "シズハ"
# 「はい♪　ありがとうございます！」
line = "「はい♪　ありがとうございます！」"

[[dialogue]]
speaker = "イニシュ"
# 「友達……」
line = "「友達……」"

[[dialogue]]
speaker = "シズハ"
# 「イニシュさんは、どうでしょうか……？」
line = "「イニシュさんは、どうでしょうか……？」"

[[dialogue]]
speaker = "イニシュ"
# 「……はい。そうですね。友達は――いいものです。私も構いません」
line = "「……はい。そうですね。友達は――いいものです。私も構いません」"

[[dialogue]]
speaker = "シズハ"
# 「やった♪　えへへ、イニシュさんの連絡先も教えてください♪」
line = "「やった♪　えへへ、イニシュさんの連絡先も教えてください♪」"

[[dialogue]]
speaker = "シズハ"
# 「ディーちゃんも、この前ＤＩＳＣを買ったんだから、みんなと交換しよ？」
line = "「ディーちゃんも、この前ＤＩＳＣを買ったんだから、みんなと交換しよ？」"

[[dialogue]]
speaker = "ディーラック"
# 「え～、ボクは別にいいよ。シズハちゃんが連絡先交換しとけば、十分でしょ」
line = "「え～、ボクは別にいいよ。シズハちゃんが連絡先交換しとけば、十分でしょ」"

[[dialogue]]
speaker = "ミネコ"
# 「私は知っときたいな～。ディーラック、キミ、なかなか面白そうだし♪」
line = "「私は知っときたいな～。ディーラック、キミ、なかなか面白そうだし♪」"

[[dialogue]]
speaker = "ディーラック"
# 「フランボウ……な～んか面倒な感じがするんだよなぁ……」
line = "「フランボウ……な～んか面倒な感じがするんだよなぁ……」"

[[dialogue]]
speaker = "イニシュ"
# 「ディーラック。マッドスタンパー的に言うなら、それは『自己紹介乙』ということでしょうか？」
line = "「ディーラック。マッドスタンパー的に言うなら、それは『自己紹介乙』ということでしょうか？」"

[[dialogue]]
speaker = "ディーラック"
# 「おい待て。クールな顔して、それ煽ってるよね？」
line = "「おい待て。クールな顔して、それ煽ってるよね？」"

[[dialogue]]
speaker = "シズハ"
# 「ふふっ、ディーちゃん、友達増えてよかったね♪」
line = "「ふふっ、ディーちゃん、友達増えてよかったね♪」"

[[dialogue]]
speaker = "イニシュ"
# 「シズハ。今の流れでそれは、なかなか煽りポイントが高いです」
line = "「シズハ。今の流れでそれは、なかなか煽りポイントが高いです」"

[[dialogue]]
speaker = "シズハ"
# 「え？　私、何か変なこと言っちゃいました？」
line = "「え？　私、何か変なこと言っちゃいました？」"

[[dialogue]]
speaker = "ミネコ"
# 「ぷっ……あはははっ♪」
line = "「ぷっ……あはははっ♪」"

[[dialogue]]
speaker = "unk"
# こうしてオフ会をきっかけに、シズハたちは新たな友人関係を築くのだった。
line = "こうしてオフ会をきっかけに、シズハたちは新たな友人関係を築くのだった。"
