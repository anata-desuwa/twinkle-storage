[[dialogue]]
speaker = "unk"
# 第４話,一緒におじいさんとおばあさんに,P
line = "第４話,一緒におじいさんとおばあさんに,P"

[[dialogue]]
speaker = "ナミエル"
# 「やはりもう……終わりにしないとです」
line = "「やはりもう……終わりにしないとです」"

[[dialogue]]
speaker = "ナミエル"
# 「ん……ひゃっ！？　な、なぜ緋宮会長がこちらにっ……」
line = "「ん……ひゃっ！？　な、なぜ緋宮会長がこちらにっ……」"

[[dialogue]]
speaker = "ナミエル"
# 「あ……いつの間にかこんな時間に……。買い出しから中々帰ってこない私を探しに来た、ということですか？」
line = "「あ……いつの間にかこんな時間に……。買い出しから中々帰ってこない私を探しに来た、ということですか？」"

[[dialogue]]
speaker = "ナミエル"
# 「ご心配をおかけしました。しかし大丈夫です。買い物帰りにふと式場が目に入って。それでつい立ち寄ってしまっただけなので」
line = "「ご心配をおかけしました。しかし大丈夫です。買い物帰りにふと式場が目に入って。それでつい立ち寄ってしまっただけなので」"

[[dialogue]]
speaker = "unk"
# 俺との結婚を意識してくれてた？
line = "俺との結婚を意識してくれてた？"

[[dialogue]]
speaker = "ナミエル"
# 「……馬鹿言わないでください。しませんよ、結婚なんて。学生時代の恋人が結婚まで到達することなんてほとんどありません」
line = "「……馬鹿言わないでください。しませんよ、結婚なんて。学生時代の恋人が結婚まで到達することなんてほとんどありません」"

[[dialogue]]
speaker = "ナミエル"
# 「私も最近は少々浮かれすぎておりました。きっと先日の花嫁騒動も相まって頭に虫でも湧いていたのですね」
line = "「私も最近は少々浮かれすぎておりました。きっと先日の花嫁騒動も相まって頭に虫でも湧いていたのですね」"

[[dialogue]]
speaker = "ナミエル"
# 「その虫は綺麗さっぱり掃除いたしました。……ああ、そうです。ちょうど緋宮会長にお話したいこともあったんです」
line = "「その虫は綺麗さっぱり掃除いたしました。……ああ、そうです。ちょうど緋宮会長にお話したいこともあったんです」"

[[dialogue]]
speaker = "ナミエル"
# 「今までとても楽しい時間を過ごさせていただきました。だけどもう、私とは別れ──」
line = "「今までとても楽しい時間を過ごさせていただきました。だけどもう、私とは別れ──」"

[[dialogue]]
speaker = "unk"
# 絶対に別れないよ
line = "絶対に別れないよ"

[[dialogue]]
speaker = "ナミエル"
# 「……何故ですか。女性のお知り合いでしたら私の他にもいくらでもおりますよね。私でなくてもいいはずです」
line = "「……何故ですか。女性のお知り合いでしたら私の他にもいくらでもおりますよね。私でなくてもいいはずです」"

[[dialogue]]
speaker = "ナミエル"
# 「私は……やっぱり１人がいいです。１人の方が気楽だと、あなたとお付き合いして気付きました」
line = "「私は……やっぱり１人がいいです。１人の方が気楽だと、あなたとお付き合いして気付きました」"

[[dialogue]]
speaker = "unk"
# 俺のことが嫌いになったのか？
line = "俺のことが嫌いになったのか？"

[[dialogue]]
speaker = "ナミエル"
# 「そうではありません。むしろ……」
line = "「そうではありません。むしろ……」"

[[dialogue]]
speaker = "ナミエル"
# 「私は、怖いんです。あなたとお付き合いしていて幸せになっていく自分が」
line = "「私は、怖いんです。あなたとお付き合いしていて幸せになっていく自分が」"

[[dialogue]]
speaker = "ナミエル"
# 「あなたをどんどん好きになっていく自分が。恋人に留まらず、結婚や、子供ができた時のことまで考えてしまう自分が」
line = "「あなたをどんどん好きになっていく自分が。恋人に留まらず、結婚や、子供ができた時のことまで考えてしまう自分が」"

[[dialogue]]
speaker = "ナミエル"
# 「以前お話しましたよね。私は幼い頃に事故で両親を亡くしてしまい、以来、暗殺者として育てられるようになった……と」
line = "「以前お話しましたよね。私は幼い頃に事故で両親を亡くしてしまい、以来、暗殺者として育てられるようになった……と」"

[[dialogue]]
speaker = "ナミエル"
# 「もう忘れたと思っていたのに……緋宮会長と過ごしていると、暗殺者時代になくしたはずの感情が蘇ってくるんです」
line = "「もう忘れたと思っていたのに……緋宮会長と過ごしていると、暗殺者時代になくしたはずの感情が蘇ってくるんです」"

[[dialogue]]
speaker = "ナミエル"
# 「家族みんなで幸せに暮らしていた頃を。二度と戻ってこないあのキラキラした毎日を……」
line = "「家族みんなで幸せに暮らしていた頃を。二度と戻ってこないあのキラキラした毎日を……」"

[[dialogue]]
speaker = "ナミエル"
# 「だからこそ、怖いんです。これ以上あなたと仲良くなることが。このままお付き合いを続けてしまうことが」
line = "「だからこそ、怖いんです。これ以上あなたと仲良くなることが。このままお付き合いを続けてしまうことが」"

[[dialogue]]
speaker = "ナミエル"
# 「私は……あなたが思っている以上にあなたを好きなんです。このまま恋人でいたら、必ず結婚してしまうほど愛しているんです」
line = "「私は……あなたが思っている以上にあなたを好きなんです。このまま恋人でいたら、必ず結婚してしまうほど愛しているんです」"

[[dialogue]]
speaker = "ナミエル"
# 「結婚生活はきっと、いいえ、絶対に幸せで幸せでたまりません。毎日が楽しくて楽しくて仕方ないと容易に想像できます」
line = "「結婚生活はきっと、いいえ、絶対に幸せで幸せでたまりません。毎日が楽しくて楽しくて仕方ないと容易に想像できます」"

[[dialogue]]
speaker = "ナミエル"
# 「だけど私は……それが怖い、恐ろしい。あなたが大切になればなるほど、幸せな明日を想像すればするほど」
line = "「だけど私は……それが怖い、恐ろしい。あなたが大切になればなるほど、幸せな明日を想像すればするほど」"

[[dialogue]]
speaker = "ナミエル"
# 「失ってしまった時のことを考えて苦しくなります。私は命の儚さを知っていますから」
line = "「失ってしまった時のことを考えて苦しくなります。私は命の儚さを知っていますから」"

[[dialogue]]
speaker = "ナミエル"
# 「もしあなたが私の前からいなくなったらと思うと……それだけで耐えられません──！」
line = "「もしあなたが私の前からいなくなったらと思うと……それだけで耐えられません──！」"

[[dialogue]]
speaker = "ナミエル"
# 「だからお別れしてください。私をこれ以上、幸せになんてしないで──……んんっ！？」
line = "「だからお別れしてください。私をこれ以上、幸せになんてしないで──……んんっ！？」"

[[dialogue]]
speaker = "ナミエル"
# 「んっ……！！」
line = "「んっ……！！」"

[[dialogue]]
speaker = "unk"
# 俺はナミエルの前から絶対にいなくならないよ
line = "俺はナミエルの前から絶対にいなくならないよ"

[[dialogue]]
speaker = "ナミエル"
# 「うぅ……！　そんなこと囁かないでください。優しく抱き締めないでください」
line = "「うぅ……！　そんなこと囁かないでください。優しく抱き締めないでください」"

[[dialogue]]
speaker = "ナミエル"
# 「別れが、ひっく、辛くなります。別れたく、ぐす、なくなっちゃいます」
line = "「別れが、ひっく、辛くなります。別れたく、ぐす、なくなっちゃいます」"

[[dialogue]]
speaker = "unk"
# 一緒におじいさんとおばあさんになるって誓うよ
line = "一緒におじいさんとおばあさんになるって誓うよ"

[[dialogue]]
speaker = "ナミエル"
# 「緋宮、会長……」
line = "「緋宮、会長……」"

[[dialogue]]
speaker = "ナミエル"
# 「なんですか、これ……。どうして私、変身なんかして……」
line = "「なんですか、これ……。どうして私、変身なんかして……」"

[[dialogue]]
speaker = "ナミエル"
# 「これじゃまるで、ひっく、私がプロポーズを受け入れてるみたいじゃないですか。なぜ涙が、ぐすっ、とまらないのです……」
line = "「これじゃまるで、ひっく、私がプロポーズを受け入れてるみたいじゃないですか。なぜ涙が、ぐすっ、とまらないのです……」"

[[dialogue]]
speaker = "ナミエル"
# 「本当に……誓ってくださるのですか？　私の前から絶対にいなくなりませんか？」
line = "「本当に……誓ってくださるのですか？　私の前から絶対にいなくなりませんか？」"

[[dialogue]]
speaker = "ナミエル"
# 「あっ……ん、んちゅっ、ふぁ、んふぅん……<emoji=heart04>」
line = "「あっ……ん、んちゅっ、ふぁ、んふぅん……<emoji=heart04>」"

[[dialogue]]
speaker = "ナミエル"
# 「バ、バカですか。返事の仕方が、えっちいです……。あんまりそういうえっちなことばかりすると、お掃除しますからね……？」
line = "「バ、バカですか。返事の仕方が、えっちいです……。あんまりそういうえっちなことばかりすると、お掃除しますからね……？」"

[[dialogue]]
speaker = "ナミエル"
# 「だけど……ふふ。嬉しいです。とても、幸せです……」
line = "「だけど……ふふ。嬉しいです。とても、幸せです……」"

[[dialogue]]
speaker = "ナミエル"
# 「私はもうとっくにあなたから、んっ、ちゅっ……<emoji=heart04>　離れられなくなっていたのですね……<emoji=heart04>」
line = "「私はもうとっくにあなたから、んっ、ちゅっ……<emoji=heart04>　離れられなくなっていたのですね……<emoji=heart04>」"

[[dialogue]]
speaker = "ナミエル"
# 「別れるのはやめにします。あなたを信じて、あなたと結婚してあげることにします」
line = "「別れるのはやめにします。あなたを信じて、あなたと結婚してあげることにします」"

[[dialogue]]
speaker = "ナミエル"
# 「幸せに、してくださいね？　私、最期の最期まで笑っていたいです」
line = "「幸せに、してくださいね？　私、最期の最期まで笑っていたいです」"

[[dialogue]]
speaker = "ナミエル"
# 「あなたと結婚して良かったって、最期の最期までそう思っていられる人生にしたいです」
line = "「あなたと結婚して良かったって、最期の最期までそう思っていられる人生にしたいです」"

[[dialogue]]
speaker = "ナミエル"
# 「私も頑張りますから。差し当たってはお料理のお勉強に励もうと思います」
line = "「私も頑張りますから。差し当たってはお料理のお勉強に励もうと思います」"

[[dialogue]]
speaker = "ナミエル"
# 「長寿のためには健康管理が大事ですからね。栄養のある美味しいものを、あなたに……だ、旦那様に作ってあげたいんです」
line = "「長寿のためには健康管理が大事ですからね。栄養のある美味しいものを、あなたに……だ、旦那様に作ってあげたいんです」"

[[dialogue]]
speaker = "ナミエル"
# 「食べて、くれますか？　私の手料理、毎日食べていただけますか……？」
line = "「食べて、くれますか？　私の手料理、毎日食べていただけますか……？」"

[[dialogue]]
speaker = "ナミエル"
# 「私をあなたの花嫁に……お嫁さんに、していただけますか？」
line = "「私をあなたの花嫁に……お嫁さんに、していただけますか？」"

[[dialogue]]
speaker = "ナミエル"
# 「あ……んっ、んふ、んちゅっ、んんっ……<emoji=heart04>」
line = "「あ……んっ、んふ、んちゅっ、んんっ……<emoji=heart04>」"

[[dialogue]]
speaker = "ナミエル"
# 「えへへ……だから返事の仕方がえっちいですよ<emoji=heart04>」
line = "「えへへ……だから返事の仕方がえっちいですよ<emoji=heart04>」"

[[dialogue]]
speaker = "ナミエル"
# 「不束者ですが末永くよろしくお願いしますね？」
line = "「不束者ですが末永くよろしくお願いしますね？」"

[[dialogue]]
speaker = "ナミエル"
# 「私の世界で一番大好きな……旦那、さま……<emoji=heart04>」
line = "「私の世界で一番大好きな……旦那、さま……<emoji=heart04>」"
