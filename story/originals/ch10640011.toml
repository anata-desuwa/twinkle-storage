[[dialogue]]
speaker = "unk"
# 第１話,ブラッディ・マリー,P
line = "第１話,ブラッディ・マリー,P"

[[dialogue]]
speaker = "unk"
# 風邪を引いて病院に向かっている途中、運悪くアステラ発生の知らせが届いた。
line = "風邪を引いて病院に向かっている途中、運悪くアステラ発生の知らせが届いた。"

[[dialogue]]
speaker = "unk"
# いち早く駆けつけ、単身突入すると──
line = "いち早く駆けつけ、単身突入すると──"

[[dialogue]]
speaker = "モンスター"
# 「イ～～～～～ッ！」
line = "「イ～～～～～ッ！」"

[[dialogue]]
speaker = "？？？"
# 「スカーレットペイン！」
line = "「スカーレットペイン！」"

[[dialogue]]
speaker = "マリーベル"
# 「邪魔よ。突っ立ってるならそこをどいて」
line = "「邪魔よ。突っ立ってるならそこをどいて」"

[[dialogue]]
speaker = "unk"
# 君はプリマステラ？
line = "君はプリマステラ？"

[[dialogue]]
speaker = "マリーベル"
# 「違うわ。だから何？」
line = "「違うわ。だから何？」"

[[dialogue]]
speaker = "マリーベル"
# 「モンスターを狩るのが星騎士の仕事でしょう。目の前にモンスターの巣があるのに何もしない方がどうかしてるわ」
line = "「モンスターを狩るのが星騎士の仕事でしょう。目の前にモンスターの巣があるのに何もしない方がどうかしてるわ」"

[[dialogue]]
speaker = "unk"
# この数を１人で相手にしていたのか？
line = "この数を１人で相手にしていたのか？"

[[dialogue]]
speaker = "マリーベル"
# 「もしかして私を心配してるの？　なら余計な心配ね。このくらい１人で片付けられる」
line = "「もしかして私を心配してるの？　なら余計な心配ね。このくらい１人で片付けられる」"

[[dialogue]]
speaker = "マリーベル"
# 「星徒会長だか何だか知らないけど、あなたこそ自分の心配をしたら？」
line = "「星徒会長だか何だか知らないけど、あなたこそ自分の心配をしたら？」"

[[dialogue]]
speaker = "マリーベル"
# 「私は嫌われ者の『ブラッディ・マリー』。怪我したくなかったら、私に近づかないことね」
line = "「私は嫌われ者の『ブラッディ・マリー』。怪我したくなかったら、私に近づかないことね」"

[[dialogue]]
speaker = "モンスター"
# 「～～～ッ！」
line = "「～～～ッ！」"

[[dialogue]]
speaker = "マリーベル"
# 「あれがこのアステラの主──」
line = "「あれがこのアステラの主──」"

[[dialogue]]
speaker = "モンスター"
# 「～～～～～ッ！」
line = "「～～～～～ッ！」"

[[dialogue]]
speaker = "マリーベル"
# 「とも限らないようね。大型モンスターが２体……いいわ、まとめて串刺しにしてあげる」
line = "「とも限らないようね。大型モンスターが２体……いいわ、まとめて串刺しにしてあげる」"

[[dialogue]]
speaker = "unk"
# 俺も戦う
line = "俺も戦う"

[[dialogue]]
speaker = "マリーベル"
# 「言っておくけど、あなたが強かろうと弱かろうと力を借りるつもりはないわ。私は１人で戦える」
line = "「言っておくけど、あなたが強かろうと弱かろうと力を借りるつもりはないわ。私は１人で戦える」"

[[dialogue]]
speaker = "モンスター"
# 「～～～～～ッ！」
line = "「～～～～～ッ！」"

[[dialogue]]
speaker = "マリーベル"
# 「──ッ」
line = "「──ッ」"

[[dialogue]]
speaker = "unk"
# 無茶だ！
line = "無茶だ！"

[[dialogue]]
speaker = "マリーベル"
# 「ごちゃごちゃとうるさい──！」
line = "「ごちゃごちゃとうるさい──！」"

[[dialogue]]
speaker = "モンスター"
# 「イ～～～……」
line = "「イ～～～……」"

[[dialogue]]
speaker = "マリーベル"
# 「後ろにモンスターがいたわよ。人にとやかく言う前に自分が気を付けなさい」
line = "「後ろにモンスターがいたわよ。人にとやかく言う前に自分が気を付けなさい」"

[[dialogue]]
speaker = "イレーナ"
# 「皆さん、ご無事ですか？　あれ、あなたは──」
line = "「皆さん、ご無事ですか？　あれ、あなたは──」"

[[dialogue]]
speaker = "マリーベル"
# 「ブラッディエクスキューション！」
line = "「ブラッディエクスキューション！」"

[[dialogue]]
speaker = "イレーナ"
# 「きゃあっ！？」
line = "「きゃあっ！？」"

[[dialogue]]
speaker = "モンスター"
# 「～～～～～～ッ」
line = "「～～～～～～ッ」"

[[dialogue]]
speaker = "マリーベル"
# 「これでモンスターは殺し尽くしたわね。アステラも消滅するでしょう」
line = "「これでモンスターは殺し尽くしたわね。アステラも消滅するでしょう」"

[[dialogue]]
speaker = "マリーベル"
# 「……戦い方が危険？　だから何？　あなたがどう思おうと関係ない」
line = "「……戦い方が危険？　だから何？　あなたがどう思おうと関係ない」"

[[dialogue]]
speaker = "マリーベル"
# 「私はもっともっとモンスターを殺して、罪を償わないといけないの。こんなところで死ぬ気はないわ」
line = "「私はもっともっとモンスターを殺して、罪を償わないといけないの。こんなところで死ぬ気はないわ」"

[[dialogue]]
speaker = "マリーベル"
# 「あなたこそ、ふらふらのくせに出てこないで。気が散る──」
line = "「あなたこそ、ふらふらのくせに出てこないで。気が散る──」"

[[dialogue]]
speaker = "マリーベル"
# 「──ッ！？」
line = "「──ッ！？」"

[[dialogue]]
speaker = "マリーベル"
# 「くっ……ぁ……首輪が……」
line = "「くっ……ぁ……首輪が……」"

[[dialogue]]
speaker = "unk"
# 大丈夫か！？
line = "大丈夫か！？"

[[dialogue]]
speaker = "マリーベル"
# 「私のことはほっといて…………っ……」
line = "「私のことはほっといて…………っ……」"

[[dialogue]]
speaker = "イレーナ"
# 「行っちゃった……感じわる。まぁいいわ、あたしたちもさっさと脱出するわよ」
line = "「行っちゃった……感じわる。まぁいいわ、あたしたちもさっさと脱出するわよ」"

[[dialogue]]
speaker = "イレーナ"
# 「はぁ、せっかく来たのに出番なかったわ。……ん？　あんた、なんか顔色悪い？　ってか足元ふらついてるじゃない」
line = "「はぁ、せっかく来たのに出番なかったわ。……ん？　あんた、なんか顔色悪い？　ってか足元ふらついてるじゃない」"

[[dialogue]]
speaker = "イレーナ"
# 「風邪～？　この国じゃバカは風邪引かないんじゃなかったの？　ったく、見てらんないから治してあげる」
line = "「風邪～？　この国じゃバカは風邪引かないんじゃなかったの？　ったく、見てらんないから治してあげる」"

[[dialogue]]
speaker = "イレーナ"
# 「お礼はいいわよ。聖女だから言われまくってるし」
line = "「お礼はいいわよ。聖女だから言われまくってるし」"

[[dialogue]]
speaker = "unk"
# あの星騎士は……
line = "あの星騎士は……"

[[dialogue]]
speaker = "イレーナ"
# 「マリーベル・エルズワースのこと？　確か、流星学園のイギリス分校にいたのよね。あたしもヨーロッパにいたから噂は聞いたことがあるわ」
line = "「マリーベル・エルズワースのこと？　確か、流星学園のイギリス分校にいたのよね。あたしもヨーロッパにいたから噂は聞いたことがあるわ」"

[[dialogue]]
speaker = "イレーナ"
# 「マリーベルはとても強い星力を持っていて、将来有望って言われてたらしいの」
line = "「マリーベルはとても強い星力を持っていて、将来有望って言われてたらしいの」"

[[dialogue]]
speaker = "イレーナ"
# 「だけど彼女は戦闘中、味方ごとモンスターを攻撃した。巻き込まれた子は大きな怪我を負って、星騎士として復帰するのは絶望的だとか」
line = "「だけど彼女は戦闘中、味方ごとモンスターを攻撃した。巻き込まれた子は大きな怪我を負って、星騎士として復帰するのは絶望的だとか」"

[[dialogue]]
speaker = "イレーナ"
# 「それ以来、『ブラッディ・マリー』って呼ばれて疫病神扱いされてたんだって。プリマステラと認められないのは、実力じゃなくて経歴が問題だったんでしょう」
line = "「それ以来、『ブラッディ・マリー』って呼ばれて疫病神扱いされてたんだって。プリマステラと認められないのは、実力じゃなくて経歴が問題だったんでしょう」"

[[dialogue]]
speaker = "イレーナ"
# 「以上、あたしが知ってるのはこんな感じ。彼女が噂通り危険な人間かどうか、気になるなら自分で確かめてみれば」
line = "「以上、あたしが知ってるのはこんな感じ。彼女が噂通り危険な人間かどうか、気になるなら自分で確かめてみれば」"
