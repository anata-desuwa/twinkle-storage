[[dialogue]]
speaker = "unk"
# 第１話,運命の君,P
line = "第１話,運命の君,P"

[[dialogue]]
speaker = "unk"
# 昼休み、星徒会で使う資料が校舎隅の倉庫にあると聞き、昼食も食べ終えたので取りにやって来たのだが――
line = "昼休み、星徒会で使う資料が校舎隅の倉庫にあると聞き、昼食も食べ終えたので取りにやって来たのだが――"

[[dialogue]]
speaker = "ジュエリー"
# 「もぐもぐ……おや？」
line = "「もぐもぐ……おや？」"

[[dialogue]]
speaker = "ジュエリー"
# 「やあ、来たか。そろそろだと思って、トマトサンドを食べながら待っていたよ。我が『運命の君』」
line = "「やあ、来たか。そろそろだと思って、トマトサンドを食べながら待っていたよ。我が『運命の君』」"

[[dialogue]]
speaker = "ジュエリー"
# 「運命の君、とは何かって？　なるほど当然の疑問だね」
line = "「運命の君、とは何かって？　なるほど当然の疑問だね」"

[[dialogue]]
speaker = "ジュエリー"
# 「なに、私の友人にちょっと『預言者』が居てね。彼女に言われたのさ」
line = "「なに、私の友人にちょっと『預言者』が居てね。彼女に言われたのさ」"

[[dialogue]]
speaker = "ジュエリー"
# 「新星学園で運命の人との出会いがある。そして、それは会長――キミであるとね」
line = "「新星学園で運命の人との出会いがある。そして、それは会長――キミであるとね」"

[[dialogue]]
speaker = "ジュエリー"
# 「ならば１度会ってみようじゃないかと、キミの転入初日からタイミングを伺っていたのだが、これがいざ実行しようとすると、なかなか思うように行かない」
line = "「ならば１度会ってみようじゃないかと、キミの転入初日からタイミングを伺っていたのだが、これがいざ実行しようとすると、なかなか思うように行かない」"

[[dialogue]]
speaker = "ジュエリー"
# 「それはもう、面白いくらいにね。無視出来ない事件が発生したり、キミに別の出会いがあったりして、気付けば今日まで待つことになってしまった」
line = "「それはもう、面白いくらいにね。無視出来ない事件が発生したり、キミに別の出会いがあったりして、気付けば今日まで待つことになってしまった」"

[[dialogue]]
speaker = "ジュエリー"
# 「なるほど、まさに運命のようじゃないか、と私は思ったよ。実に面白いね」
line = "「なるほど、まさに運命のようじゃないか、と私は思ったよ。実に面白いね」"

[[dialogue]]
speaker = "ジュエリー"
# 「ああ、申し遅れたね。私の名前は、ジュエリーという。隣の流星学園に通う１年生だ」
line = "「ああ、申し遅れたね。私の名前は、ジュエリーという。隣の流星学園に通う１年生だ」"

[[dialogue]]
speaker = "ジュエリー"
# 「自分で言っておいて何だが、キミより後輩だったのを今思い出したよ。敬語については……すまない、あまり得意ではないんだ。この口調のままで許してくれるだろうか？」
line = "「自分で言っておいて何だが、キミより後輩だったのを今思い出したよ。敬語については……すまない、あまり得意ではないんだ。この口調のままで許してくれるだろうか？」"

[[dialogue]]
speaker = "ジュエリー"
# 「ありがとう。キミの寛大さに感謝するよ、星徒会長」
line = "「ありがとう。キミの寛大さに感謝するよ、星徒会長」"

[[dialogue]]
speaker = "ジュエリー"
# 「……ん？　どうしてここに来るのが分かったのか？　なに、ちょっとした想像だよ。私は何かを批評するのが得意なものでね」
line = "「……ん？　どうしてここに来るのが分かったのか？　なに、ちょっとした想像だよ。私は何かを批評するのが得意なものでね」"

[[dialogue]]
speaker = "ジュエリー"
# 「付け加えるなら、私の体質的に都合が良かった、というのもある。私は生まれつき、肌が弱くてね」
line = "「付け加えるなら、私の体質的に都合が良かった、というのもある。私は生まれつき、肌が弱くてね」"

[[dialogue]]
speaker = "ジュエリー"
# 「太陽光が強く差す場所は苦手なのさ。その点、この校舎隅は絶妙に日陰が出来て、うってつけだったというわけだ」
line = "「太陽光が強く差す場所は苦手なのさ。その点、この校舎隅は絶妙に日陰が出来て、うってつけだったというわけだ」"

[[dialogue]]
speaker = "unk"
# 屋内なら日傘を差さなくてもよくない？
line = "屋内なら日傘を差さなくてもよくない？"

[[dialogue]]
speaker = "ジュエリー"
# 「ふふっ、よく言われるよ。なぜ屋内でも日傘を使うのかとね。しかし、それにはちゃんとした理由がある」
line = "「ふふっ、よく言われるよ。なぜ屋内でも日傘を使うのかとね。しかし、それにはちゃんとした理由がある」"

[[dialogue]]
speaker = "ジュエリー"
# 「私はこれまでの人生経験上、うっかりどこかに傘を置き忘れてしまうことが多くてね」
line = "「私はこれまでの人生経験上、うっかりどこかに傘を置き忘れてしまうことが多くてね」"

[[dialogue]]
speaker = "ジュエリー"
# 「昔１度、真夏の昼間にやらかして、日傘を紛失した結果、日が落ちるまで家に帰れなくなったことがあった。いや、あれは、今思い出しても苦い経験だよ」
line = "「昔１度、真夏の昼間にやらかして、日傘を紛失した結果、日が落ちるまで家に帰れなくなったことがあった。いや、あれは、今思い出しても苦い経験だよ」"

[[dialogue]]
speaker = "ジュエリー"
# 「それ以来、そんな面倒を避ける為にはどうしたらいいかと考えてね。思い付いたのが『常に日傘を差していればなくさない』というアイデアだったわけさ」
line = "「それ以来、そんな面倒を避ける為にはどうしたらいいかと考えてね。思い付いたのが『常に日傘を差していればなくさない』というアイデアだったわけさ」"

[[dialogue]]
speaker = "ジュエリー"
# 「どうだい？　実に明解かつ合理的な妙案だろう？」
line = "「どうだい？　実に明解かつ合理的な妙案だろう？」"

[[dialogue]]
speaker = "unk"
# （変人だ……）
line = "（変人だ……）"

[[dialogue]]
speaker = "ジュエリー"
# 「ああ、もちろん人にぶつからないように注意を払っているし、周りにも体質のことは話すようにしているよ。これならば合法だろう？」
line = "「ああ、もちろん人にぶつからないように注意を払っているし、周りにも体質のことは話すようにしているよ。これならば合法だろう？」"

[[dialogue]]
speaker = "ジュエリー"
# 「さて、話は戻すが、我が運命の君。ズバリ批評させてもらうのだが――」
line = "「さて、話は戻すが、我が運命の君。ズバリ批評させてもらうのだが――」"

[[dialogue]]
speaker = "ジュエリー"
# 「キミは以前、掃除業者のバイトをしたことがあるんじゃないかね？」
line = "「キミは以前、掃除業者のバイトをしたことがあるんじゃないかね？」"

[[dialogue]]
speaker = "ジュエリー"
# 「その驚いた顔を見るに、正解のようだね。何故分かったのか？　細かく順を追うと話が長くなってしまうので、明解に換言するならば――」
line = "「その驚いた顔を見るに、正解のようだね。何故分かったのか？　細かく順を追うと話が長くなってしまうので、明解に換言するならば――」"

[[dialogue]]
speaker = "ジュエリー"
# 「キミがこの学園に遅れて転入して来る理由を考えた時に、学費を貯めていたという結論に辿り着いた。そして、キミが校内で清掃している時の様子を見て……と言ったところかな」
line = "「キミがこの学園に遅れて転入して来る理由を考えた時に、学費を貯めていたという結論に辿り着いた。そして、キミが校内で清掃している時の様子を見て……と言ったところかな」"

[[dialogue]]
speaker = "ジュエリー"
# 「ふふっ、なに、推理なんて大したものじゃないよ。私はただ、キミの批評をしただけさ」
line = "「ふふっ、なに、推理なんて大したものじゃないよ。私はただ、キミの批評をしただけさ」"

[[dialogue]]
speaker = "ジュエリー"
# 「それで、何故そんなことを指摘したのかというと、私からキミにちょっとしたバイトを依頼したいのだよ」
line = "「それで、何故そんなことを指摘したのかというと、私からキミにちょっとしたバイトを依頼したいのだよ」"

[[dialogue]]
speaker = "ジュエリー"
# 「私は批評だけは得意なのだが、生活能力はお世辞にも高いとは言い難くてね。明解に換言するならば、多少ズボラな性格、とでも言うべきか」
line = "「私は批評だけは得意なのだが、生活能力はお世辞にも高いとは言い難くてね。明解に換言するならば、多少ズボラな性格、とでも言うべきか」"

[[dialogue]]
speaker = "ジュエリー"
# 「部屋を片付けるのが苦手で、普段から散らかしがちでね。そろそろ掃除しなくてはと思っていたところだったのだよ」
line = "「部屋を片付けるのが苦手で、普段から散らかしがちでね。そろそろ掃除しなくてはと思っていたところだったのだよ」"

[[dialogue]]
speaker = "ジュエリー"
# 「業者に頼めばいいんじゃないかって？　それも考えたのだが、たまたまキミのタイミングが良さそうだったのでね」
line = "「業者に頼めばいいんじゃないかって？　それも考えたのだが、たまたまキミのタイミングが良さそうだったのでね」"

[[dialogue]]
speaker = "ジュエリー"
# 「私の想像が正しいのなら、キミはちょうど今日、星徒会の仕事が休みで、放課後に手が空くんじゃないかな？」
line = "「私の想像が正しいのなら、キミはちょうど今日、星徒会の仕事が休みで、放課後に手が空くんじゃないかな？」"

[[dialogue]]
speaker = "ジュエリー"
# 「ふむ、これも正解のようだね。であれば業者に頼むよりも、キミに依頼料を弾んだ方が、繋がりも出来て一石二鳥だろうと思ってね」
line = "「ふむ、これも正解のようだね。であれば業者に頼むよりも、キミに依頼料を弾んだ方が、繋がりも出来て一石二鳥だろうと思ってね」"

[[dialogue]]
speaker = "unk"
# キミは一体、何者なんだ……？
line = "キミは一体、何者なんだ……？"

[[dialogue]]
speaker = "ジュエリー"
# 「ふふっ、人呼んで『日傘探偵』さ」
line = "「ふふっ、人呼んで『日傘探偵』さ」"

[[dialogue]]
speaker = "ジュエリー"
# 「やあ、我が運命の君。ちょうど今の時間は、手が空いているんじゃないかと思ったのだが……合っているかい？」
line = "「やあ、我が運命の君。ちょうど今の時間は、手が空いているんじゃないかと思ったのだが……合っているかい？」"

[[dialogue]]
speaker = "unk"
# 探偵、凄いな……
line = "探偵、凄いな……"

[[dialogue]]
speaker = "ジュエリー"
# 「ははっ、ちょっとした批評から、想像を膨らませただけだよ。それで今日来たのは、まず清掃バイトの件でお礼を言いたくてね」
line = "「ははっ、ちょっとした批評から、想像を膨らませただけだよ。それで今日来たのは、まず清掃バイトの件でお礼を言いたくてね」"

[[dialogue]]
speaker = "ジュエリー"
# 「昨日はありがとう。部屋の片付けを手伝ってくれて、非常に助かったよ。久しぶりに綺麗な環境で眠れて、今朝の目覚めは実に爽やかなものだった」
line = "「昨日はありがとう。部屋の片付けを手伝ってくれて、非常に助かったよ。久しぶりに綺麗な環境で眠れて、今朝の目覚めは実に爽やかなものだった」"

[[dialogue]]
speaker = "ジュエリー"
# 「それで、優雅に朝食を口にしていた時、ある１つのアイデアを思い付いてね。お礼を言うついでに、キミに提案したいと思ったんだ」
line = "「それで、優雅に朝食を口にしていた時、ある１つのアイデアを思い付いてね。お礼を言うついでに、キミに提案したいと思ったんだ」"

[[dialogue]]
speaker = "ジュエリー"
# 「星徒会長。是非私の――助手になってくれないだろうか？」
line = "「星徒会長。是非私の――助手になってくれないだろうか？」"

[[dialogue]]
speaker = "unk"
# 助手……！？
line = "助手……！？"

[[dialogue]]
speaker = "ジュエリー"
# 「掃除の手際は見事だったし、その後に私がお腹を鳴らしたら、残り物で美味しい夕飯を作ってくれただろう？　それに私は、キミの顔も嫌いじゃない」
line = "「掃除の手際は見事だったし、その後に私がお腹を鳴らしたら、残り物で美味しい夕飯を作ってくれただろう？　それに私は、キミの顔も嫌いじゃない」"

[[dialogue]]
speaker = "ジュエリー"
# 「一緒に居て、親しみが持てるとでも言うべきか。何より予言者曰く、運命の相手らしいしね。それらのことを踏まえると――」
line = "「一緒に居て、親しみが持てるとでも言うべきか。何より予言者曰く、運命の相手らしいしね。それらのことを踏まえると――」"

[[dialogue]]
speaker = "ジュエリー"
# 「つまりこれは、『好き』ってことじゃないか？　という結論に至ったのだよ」
line = "「つまりこれは、『好き』ってことじゃないか？　という結論に至ったのだよ」"

[[dialogue]]
speaker = "unk"
# その推理はよく分からないな！？
line = "その推理はよく分からないな！？"

[[dialogue]]
speaker = "ジュエリー"
# 「まあ、まだお互い出会ったばかり。私の考えが正解かどうかはこれからさ。というわけで――」
line = "「まあ、まだお互い出会ったばかり。私の考えが正解かどうかはこれからさ。というわけで――」"

[[dialogue]]
speaker = "ジュエリー"
# 「これからよろしく頼むよ。我が助手」
line = "「これからよろしく頼むよ。我が助手」"

[[dialogue]]
speaker = "unk"
# そう言って、日傘を差した探偵は、実に面白そうに微笑むのだった――
line = "そう言って、日傘を差した探偵は、実に面白そうに微笑むのだった――"
