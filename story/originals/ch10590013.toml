[[dialogue]]
speaker = "unk"
# 第３話,楽しい時をいつまでも,P
line = "第３話,楽しい時をいつまでも,P"

[[dialogue]]
speaker = "unk"
# ある日、リップルからリゾート結界の新機能について紹介したいと、２校の星徒会長である俺とフィオナは呼び出しを受けた――
line = "ある日、リップルからリゾート結界の新機能について紹介したいと、２校の星徒会長である俺とフィオナは呼び出しを受けた――"

[[dialogue]]
speaker = "リップル"
# 「２人共、お忙しい中来てくれて、アリガトございます！」
line = "「２人共、お忙しい中来てくれて、アリガトございます！」"

[[dialogue]]
speaker = "フィオナ"
# 「いえいえ、リゾート結界は生徒達からも人気で、学園の新しい施設と言ってもいいくらいですから。その運営を手伝うのも、星徒会の仕事のうちですよ」
line = "「いえいえ、リゾート結界は生徒達からも人気で、学園の新しい施設と言ってもいいくらいですから。その運営を手伝うのも、星徒会の仕事のうちですよ」"

[[dialogue]]
speaker = "unk"
# スケジュール調整して来たから、大丈夫だよ
line = "スケジュール調整して来たから、大丈夫だよ"

[[dialogue]]
speaker = "フィオナ"
# 「それでリップルさん、新機能とは一体、どのようなものなんですか？」
line = "「それでリップルさん、新機能とは一体、どのようなものなんですか？」"

[[dialogue]]
speaker = "リップル"
# 「実際に試して貰えば、効果が分かりやすいとオモいます！　久しぶりにこの３人で揃いましたし――」
line = "「実際に試して貰えば、効果が分かりやすいとオモいます！　久しぶりにこの３人で揃いましたし――」"

[[dialogue]]
speaker = "リップル"
# 「海でサーフィンをして遊びましょう♪」
line = "「海でサーフィンをして遊びましょう♪」"

[[dialogue]]
speaker = "フィオナ"
# 「よし、大きな波が来ましたね。私も夏合宿から更に練習を重ねて出来るようになった大技……２人に披露します！」
line = "「よし、大きな波が来ましたね。私も夏合宿から更に練習を重ねて出来るようになった大技……２人に披露します！」"

[[dialogue]]
speaker = "フィオナ"
# 「波に乗って……行きます！　はあぁぁぁっ、パイプライン！　――からの！」
line = "「波に乗って……行きます！　はあぁぁぁっ、パイプライン！　――からの！」"

[[dialogue]]
speaker = "リップル"
# 「ワオッ！？　ただのエアリアルじゃありません……！　空中でバック転する最高難易度の大技！」
line = "「ワオッ！？　ただのエアリアルじゃありません……！　空中でバック転する最高難易度の大技！」"

[[dialogue]]
speaker = "フィオナ"
# 「ロデオフリップ！！！」
line = "「ロデオフリップ！！！」"

[[dialogue]]
speaker = "リップル"
# 「わあぁぁぁっ！　やりました！　フィオナ、本当にロデオフリップを成功させちゃいマシタぁぁぁっ！」
line = "「わあぁぁぁっ！　やりました！　フィオナ、本当にロデオフリップを成功させちゃいマシタぁぁぁっ！」"

[[dialogue]]
speaker = "フィオナ"
# 「ふぅ……よしっ！　見てくれましたか、リップルさん、会長さんっ」
line = "「ふぅ……よしっ！　見てくれましたか、リップルさん、会長さんっ」"

[[dialogue]]
speaker = "リップル"
# 「ハイ♪　見ました！　見てましたよ！　今の星力なしデスよね！？　ワタシでも滅多に成功しないのに、ＢＩＧ凄いです！　感動で～す♪」
line = "「ハイ♪　見ました！　見てましたよ！　今の星力なしデスよね！？　ワタシでも滅多に成功しないのに、ＢＩＧ凄いです！　感動で～す♪」"

[[dialogue]]
speaker = "フィオナ"
# 「ふふっ、あれからすっかりサーフィンにハマっちゃいまして。リゾート結界のおかげで場所も困りませんし、休日に息抜きがてら、よく練習してたんです」
line = "「ふふっ、あれからすっかりサーフィンにハマっちゃいまして。リゾート結界のおかげで場所も困りませんし、休日に息抜きがてら、よく練習してたんです」"

[[dialogue]]
speaker = "unk"
# すっかり追い抜かれちゃったな
line = "すっかり追い抜かれちゃったな"

[[dialogue]]
speaker = "フィオナ"
# 「いえ、私も出来るようになったんですから、多才な会長さんならすぐに覚えられますよ」
line = "「いえ、私も出来るようになったんですから、多才な会長さんならすぐに覚えられますよ」"

[[dialogue]]
speaker = "リップル"
# 「ソウですよ！　カイチョーだって、あれからもうエアリアルが出来るようになってるんデスから！」
line = "「ソウですよ！　カイチョーだって、あれからもうエアリアルが出来るようになってるんデスから！」"

[[dialogue]]
speaker = "リップル"
# 「フィオナに負けないように、ワタシと一緒にロデオフリップを練習しましょー！」
line = "「フィオナに負けないように、ワタシと一緒にロデオフリップを練習しましょー！」"

[[dialogue]]
speaker = "unk"
# 待って、最高難易度って言ってなかった！？
line = "待って、最高難易度って言ってなかった！？"

[[dialogue]]
speaker = "フィオナ"
# 「サーフィン仲間として、私も会長さんのロデオフリップ習得を全力で応援します。ですから、会長さんも一緒にサーフィンの高みへ登り詰めましょう――さあ」
line = "「サーフィン仲間として、私も会長さんのロデオフリップ習得を全力で応援します。ですから、会長さんも一緒にサーフィンの高みへ登り詰めましょう――さあ」"

[[dialogue]]
speaker = "リップル"
# 「さあさあ♪　カイチョーもレッツ、サーフィンで～す！」
line = "「さあさあ♪　カイチョーもレッツ、サーフィンで～す！」"

[[dialogue]]
speaker = "unk"
# ちょっ……ええぇぇぇ～～～っ！？
line = "ちょっ……ええぇぇぇ～～～っ！？"

[[dialogue]]
speaker = "unk"
# それからロデオフリップの特訓が続き――
line = "それからロデオフリップの特訓が続き――"

[[dialogue]]
speaker = "フィオナ"
# 「ふぅ……長いこと練習に夢中になってしまいましたね。そろそろ海を上がりましょうか」
line = "「ふぅ……長いこと練習に夢中になってしまいましたね。そろそろ海を上がりましょうか」"

[[dialogue]]
speaker = "リップル"
# 「ハイ、そうデスね！　１度、海の家で休憩しましょー♪」
line = "「ハイ、そうデスね！　１度、海の家で休憩しましょー♪」"

[[dialogue]]
speaker = "フィオナ"
# 「会長さんがまだロデオフリップを習得出来てないのに、切り上げるのは心苦しいですが……」
line = "「会長さんがまだロデオフリップを習得出来てないのに、切り上げるのは心苦しいですが……」"

[[dialogue]]
speaker = "unk"
# いや、今日中に習得は無理だよ！？
line = "いや、今日中に習得は無理だよ！？"

[[dialogue]]
speaker = "フィオナ"
# 「――そういえば、すっかり忘れてしまってましたが、結界の新機能って一体何だったのでしょう？　目立って変わった様子はありませんでしたが……」
line = "「――そういえば、すっかり忘れてしまってましたが、結界の新機能って一体何だったのでしょう？　目立って変わった様子はありませんでしたが……」"

[[dialogue]]
speaker = "リップル"
# 「フッフッフ、今こそそれを明かす時デスね！　実はその『変わらない』というのが、今回のポイントなのです！」
line = "「フッフッフ、今こそそれを明かす時デスね！　実はその『変わらない』というのが、今回のポイントなのです！」"

[[dialogue]]
speaker = "リップル"
# 「２人共、あれを見て下さい！」
line = "「２人共、あれを見て下さい！」"

[[dialogue]]
speaker = "フィオナ"
# 「リップルさんの指差した先……海の家にある時計、ですか？　――え？」
line = "「リップルさんの指差した先……海の家にある時計、ですか？　――え？」"

[[dialogue]]
speaker = "unk"
# 時刻が……入って来た時の時間と同じ？
line = "時刻が……入って来た時の時間と同じ？"

[[dialogue]]
speaker = "リップル"
# 「ソウで～す♪　今はまだ半日程度が限界ですが、これがエンドレスサマーで新しく実装を考えている機能――」
line = "「ソウで～す♪　今はまだ半日程度が限界ですが、これがエンドレスサマーで新しく実装を考えている機能――」"

[[dialogue]]
speaker = "リップル"
# 「結界内の時間経過を停止する、名付けて『エターナル・バケーション・システム』で～す！」
line = "「結界内の時間経過を停止する、名付けて『エターナル・バケーション・システム』で～す！」"

[[dialogue]]
speaker = "フィオナ"
# 「え……えぇぇぇっ！？　時間を止める！？　そんなこと出来るはず……」
line = "「え……えぇぇぇっ！？　時間を止める！？　そんなこと出来るはず……」"

[[dialogue]]
speaker = "リップル"
# 「ソウ言うと思ってました！　結界を解除して、現実世界に戻りま～す♪」
line = "「ソウ言うと思ってました！　結界を解除して、現実世界に戻りま～す♪」"

[[dialogue]]
speaker = "フィオナ"
# 「新星学園の星徒会室……時計は！？　なっ……じ、時間が本当に、リゾート結界に入った時のままです！」
line = "「新星学園の星徒会室……時計は！？　なっ……じ、時間が本当に、リゾート結界に入った時のままです！」"

[[dialogue]]
speaker = "unk"
# 嘘ぉ！？
line = "嘘ぉ！？"

[[dialogue]]
speaker = "リップル"
# 「フフフ！　これで引き続き、サーフィンの練習が出来ますね♪」
line = "「フフフ！　これで引き続き、サーフィンの練習が出来ますね♪」"

[[dialogue]]
speaker = "リップル"
# 「ドウですか、カイチョー、フィオナ！　この機能が完成し、実装された暁には、学園の皆はもっとハッピーになれるはずです！」
line = "「ドウですか、カイチョー、フィオナ！　この機能が完成し、実装された暁には、学園の皆はもっとハッピーになれるはずです！」"

[[dialogue]]
speaker = "リップル"
# 「ユクユクはこれを一般にも広めて、リゾート結界へ沢山の人をヨビコミます。その人達から夏が好きという気持ちをちょっとずつ分けて貰い――」
line = "「ユクユクはこれを一般にも広めて、リゾート結界へ沢山の人をヨビコミます。その人達から夏が好きという気持ちをちょっとずつ分けて貰い――」"

[[dialogue]]
speaker = "リップル"
# 「それをエネルギーに変換して、結界サイズを拡張。やがては流星市国を覆って、常夏の世界実現への足掛かりに……！」
line = "「それをエネルギーに変換して、結界サイズを拡張。やがては流星市国を覆って、常夏の世界実現への足掛かりに……！」"

[[dialogue]]
speaker = "unk"
# あ、アウトォ――ッ！！！
line = "あ、アウトォ――ッ！！！"

[[dialogue]]
speaker = "リップル"
# 「えぇっ、カイチョー、何故デスか！？」
line = "「えぇっ、カイチョー、何故デスか！？」"

[[dialogue]]
speaker = "フィオナ"
# 「リップルさん、これはダメです！　凄いけど、実装したら色々問題なやつです！」
line = "「リップルさん、これはダメです！　凄いけど、実装したら色々問題なやつです！」"

[[dialogue]]
speaker = "リップル"
# 「ソウなのですか？　皆ハッピーになれる、素敵なアイデアだと思ったのデスが……」
line = "「ソウなのですか？　皆ハッピーになれる、素敵なアイデアだと思ったのデスが……」"
