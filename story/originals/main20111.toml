[[dialogue]]
speaker = "unk"
# 第１４話,新たな決着,B
line = "第１４話,新たな決着,B"

[[dialogue]]
speaker = "梨緒"
# 「ふぅ……はぁ……はぁ……」
line = "「ふぅ……はぁ……はぁ……」"

[[dialogue]]
speaker = "クロト"
# 「はぁ、はぁ……」
line = "「はぁ、はぁ……」"

[[dialogue]]
speaker = "unk"
# 技と技の激突を重ね、お互いに息を切らせる。
line = "技と技の激突を重ね、お互いに息を切らせる。"

[[dialogue]]
speaker = "unk"
# ボロボロになった拳から血がにじむ。力が抜けた足がガクガクと震える。
line = "ボロボロになった拳から血がにじむ。力が抜けた足がガクガクと震える。"

[[dialogue]]
speaker = "unk"
# ここから覚醒して逆転──なんてことはない。
line = "ここから覚醒して逆転──なんてことはない。"

[[dialogue]]
speaker = "ヴィーナス"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# アリーナ席を振り返る余裕はない。だけど見守ってくれているみんなの気配を感じる。俺の勝利を信じてくれる仲間たちがいる。
line = "アリーナ席を振り返る余裕はない。だけど見守ってくれているみんなの気配を感じる。俺の勝利を信じてくれる仲間たちがいる。"

[[dialogue]]
speaker = "unk"
# ヴィーナスの時みたいな華々しい戦いを期待している生徒には、地味で泥臭い試合に見えるかもしれない。
line = "ヴィーナスの時みたいな華々しい戦いを期待している生徒には、地味で泥臭い試合に見えるかもしれない。"

[[dialogue]]
speaker = "unk"
# だけど俺にとっては、今の全力をぶつけた戦いなんだ。
line = "だけど俺にとっては、今の全力をぶつけた戦いなんだ。"

[[dialogue]]
speaker = "梨緒"
# 「吹きすさべ嵐よ──！」
line = "「吹きすさべ嵐よ──！」"

[[dialogue]]
speaker = "クロト"
# 「俺はこの道を進む──！」
line = "「俺はこの道を進む──！」"

[[dialogue]]
speaker = "unk"
# おそらくお互い繰り出せるのはあと一発。
line = "おそらくお互い繰り出せるのはあと一発。"

[[dialogue]]
speaker = "unk"
# すでに全力を振り絞った己に鞭打ち、ありったけの気力を拳に乗せる──！
line = "すでに全力を振り絞った己に鞭打ち、ありったけの気力を拳に乗せる──！"

[[dialogue]]
speaker = "梨緒"
# 「ライトニングテンペスト！！」
line = "「ライトニングテンペスト！！」"

[[dialogue]]
speaker = "クロト"
# 「ディマイズブレイカー！！」
line = "「ディマイズブレイカー！！」"

[[dialogue]]
speaker = "梨緒"
# 「うおおおおっ！！」
line = "「うおおおおっ！！」"

[[dialogue]]
speaker = "クロト"
# 「おおおおおおおっ！！」
line = "「おおおおおおおっ！！」"

[[dialogue]]
speaker = "梨緒"
# 「くっ……」
line = "「くっ……」"

[[dialogue]]
speaker = "unk"
# 眼が眩む閃光が晴れ、梨緒がとうとう膝を折る。
line = "眼が眩む閃光が晴れ、梨緒がとうとう膝を折る。"

[[dialogue]]
speaker = "unk"
# アリーナの全員が彼女に注目し、沈黙が広がる。
line = "アリーナの全員が彼女に注目し、沈黙が広がる。"

[[dialogue]]
speaker = "unk"
# しかし彼女は地に伏したまま立ち上がれなくて──
line = "しかし彼女は地に伏したまま立ち上がれなくて──"

[[dialogue]]
speaker = "ラティエ"
# 「勝者──緋宮クロト！」
line = "「勝者──緋宮クロト！」"

[[dialogue]]
speaker = "ラティエ"
# 「よい戦いだった。おめでとう、君は星徒会長に値するとここに証明された」
line = "「よい戦いだった。おめでとう、君は星徒会長に値するとここに証明された」"

[[dialogue]]
speaker = "クロト"
# 「ありがとう……ございます」
line = "「ありがとう……ございます」"

[[dialogue]]
speaker = "unk"
# ラティエ総合学園長が勝ち名乗りを上げた瞬間、緊張の糸が切れてその場に<ruby=くずお>頽</ruby>れた。
line = "ラティエ総合学園長が勝ち名乗りを上げた瞬間、緊張の糸が切れてその場に<ruby>頽<rt>くずお</rt></ruby>れた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロト～～～！！」
line = "「クロト～～～！！」"

[[dialogue]]
speaker = "クロト"
# 「わっ」
line = "「わっ」"

[[dialogue]]
speaker = "unk"
# アリーナ席から飛び出したヴィーナスが俺を抱き締める。
line = "アリーナ席から飛び出したヴィーナスが俺を抱き締める。"

[[dialogue]]
speaker = "ヴィーナス"
# 「もうっ、思ったよりギリギリじゃない。ハラハラさせるんじゃないわよっ」
line = "「もうっ、思ったよりギリギリじゃない。ハラハラさせるんじゃないわよっ」"

[[dialogue]]
speaker = "クロト"
# 「はは……それだけ彼女が強かったんだよ。でも勝ったから」
line = "「はは……それだけ彼女が強かったんだよ。でも勝ったから」"

[[dialogue]]
speaker = "マトイ"
# 「前の御前試合の時よりボロボロね……でもかっこよかった」
line = "「前の御前試合の時よりボロボロね……でもかっこよかった」"

[[dialogue]]
speaker = "サーシャ"
# 「祝勝会でもする～？　紅茶と緑茶ならどっちがいいかしら～？」
line = "「祝勝会でもする～？　紅茶と緑茶ならどっちがいいかしら～？」"

[[dialogue]]
speaker = "アナ"
# 「今日は私がお薦めの和菓子を持ってきました。とっておきです」
line = "「今日は私がお薦めの和菓子を持ってきました。とっておきです」"

[[dialogue]]
speaker = "unk"
# 星徒会のみんながいつの間にか近くに来ていて、俺を囲んでいる。
line = "星徒会のみんながいつの間にか近くに来ていて、俺を囲んでいる。"

[[dialogue]]
speaker = "unk"
# みんなが俺の勝利を喜んでくれているのが嬉しい。
line = "みんなが俺の勝利を喜んでくれているのが嬉しい。"

[[dialogue]]
speaker = "クロト"
# 「……ありがとう、みんな」
line = "「……ありがとう、みんな」"

[[dialogue]]
speaker = "unk"
# 俺はヴィーナスに求められて星徒会長になった。そこに後悔はないし、むしろ誇らしく思っている。
line = "俺はヴィーナスに求められて星徒会長になった。そこに後悔はないし、むしろ誇らしく思っている。"

[[dialogue]]
speaker = "unk"
# でもそれはヴィーナスに応えたかっただけで、星徒会長になったのはただの結果だと思っていた。
line = "でもそれはヴィーナスに応えたかっただけで、星徒会長になったのはただの結果だと思っていた。"

[[dialogue]]
speaker = "unk"
# それが今では、俺自身が星徒会長でありたいと望むようになっていた。
line = "それが今では、俺自身が星徒会長でありたいと望むようになっていた。"

[[dialogue]]
speaker = "unk"
# そして今日もう一度、星徒会長になった。他の誰でもない自分の意志で。
line = "そして今日もう一度、星徒会長になった。他の誰でもない自分の意志で。"

[[dialogue]]
speaker = "unk"
# 御前試合の後、梨緒は保健委員の救護を受けずにアリーナを去った。
line = "御前試合の後、梨緒は保健委員の救護を受けずにアリーナを去った。"

[[dialogue]]
speaker = "unk"
# １人になりたかったのもそうだし、惨めな敗者である自分が施しを受けたら、精神に多大なダメージを受けそうだったからだ。
line = "１人になりたかったのもそうだし、惨めな敗者である自分が施しを受けたら、精神に多大なダメージを受けそうだったからだ。"

[[dialogue]]
speaker = "梨緒"
# 「負けた……か……」
line = "「負けた……か……」"

[[dialogue]]
speaker = "梨緒"
# 「だが私は諦めない。魔王は私が必ず止める……！」
line = "「だが私は諦めない。魔王は私が必ず止める……！」"

[[dialogue]]
speaker = "？？？"
# 「魔王は２つの平行世界で決定的な敗北を喫している。その可能性を収束させれば、同じ末路を辿るのはまぁ必然だよね」
line = "「魔王は２つの平行世界で決定的な敗北を喫している。その可能性を収束させれば、同じ末路を辿るのはまぁ必然だよね」"

[[dialogue]]
speaker = "梨緒"
# 「君は……？」
line = "「君は……？」"

[[dialogue]]
speaker = "ラクシャ"
# 「ああごめん独り言。さっきはお疲れ、いい勝負だったね」
line = "「ああごめん独り言。さっきはお疲れ、いい勝負だったね」"

[[dialogue]]
speaker = "ラクシャ"
# 「ボクは守護天使《円環》のラクシャ。わけあって新星学園の制服を着てるけど、コスプレみたいなものだから」
line = "「ボクは守護天使《円環》のラクシャ。わけあって新星学園の制服を着てるけど、コスプレみたいなものだから」"

[[dialogue]]
speaker = "ラクシャ"
# 「あ、いや、コスプレで制服着てるのってなんだかいかがわしいな。ははっ、まぁなんでもいっか」
line = "「あ、いや、コスプレで制服着てるのってなんだかいかがわしいな。ははっ、まぁなんでもいっか」"

[[dialogue]]
speaker = "梨緒"
# 「守護天使がいったいどうして……？　私に用なのか？」
line = "「守護天使がいったいどうして……？　私に用なのか？」"

[[dialogue]]
speaker = "ラクシャ"
# 「うん、キミに興味があってね。みんなが知らないこといろいろ知ってそうだし……ちょ～っとお話聞かせてもらえるかな？」
line = "「うん、キミに興味があってね。みんなが知らないこといろいろ知ってそうだし……ちょ～っとお話聞かせてもらえるかな？」"
