[[dialogue]]
speaker = "unk"
# 第３話,風紀委員とデート,P
line = "第３話,風紀委員とデート,P"

[[dialogue]]
speaker = "エリス"
# 「ボンジュール、会長さん」
line = "「ボンジュール、会長さん」"

[[dialogue]]
speaker = "エリス"
# 「あ、すみません。時々出てしまうんです。母国にいた時のくせで」
line = "「あ、すみません。時々出てしまうんです。母国にいた時のくせで」"

[[dialogue]]
speaker = "unk"
# オシャレでいいと思う
line = "オシャレでいいと思う"

[[dialogue]]
speaker = "エリス"
# 「そう……でしょうか？　会長さんがそう言うなら気にしないことにします」
line = "「そう……でしょうか？　会長さんがそう言うなら気にしないことにします」"

[[dialogue]]
speaker = "エリス"
# 「今日は休日なのに、私のわがままにお付き合いいただいてありがとうございます」
line = "「今日は休日なのに、私のわがままにお付き合いいただいてありがとうございます」"

[[dialogue]]
speaker = "unk"
# 以前、流星学園で会った時に――
line = "以前、流星学園で会った時に――"

[[dialogue]]
speaker = "エリス"
# 「私に悩み──ですか？」
line = "「私に悩み──ですか？」"

[[dialogue]]
speaker = "エリス"
# 「もちろんありますよ。風紀委員として注意する際は、なぜそのルールがあるのかを理解してもらうよう努めていますが、ちゃんと伝えられているかどうか……」
line = "「もちろんありますよ。風紀委員として注意する際は、なぜそのルールがあるのかを理解してもらうよう努めていますが、ちゃんと伝えられているかどうか……」"

[[dialogue]]
speaker = "エリス"
# 「それに取り締まる立場になると、人は時に驕ります。ちゃんと風紀委員の責務を果たせているか自省する日々です」
line = "「それに取り締まる立場になると、人は時に驕ります。ちゃんと風紀委員の責務を果たせているか自省する日々です」"

[[dialogue]]
speaker = "エリス"
# 「それとつまらないことなのですが……同年代の女の子がどんな遊びをしているのかわからなくて」
line = "「それとつまらないことなのですが……同年代の女の子がどんな遊びをしているのかわからなくて」"

[[dialogue]]
speaker = "エリス"
# 「フランスでは勉学や武術に時間をかけていましたし、私は風紀委員ですから他の生徒の模範にならなくてはいけません」
line = "「フランスでは勉学や武術に時間をかけていましたし、私は風紀委員ですから他の生徒の模範にならなくてはいけません」"

[[dialogue]]
speaker = "エリス"
# 「一緒に遊ぶとしても、風紀委員がいては堅苦しく感じるかもしれませんし……私も年頃の女の子ですから人並に遊びたい気持ちはあるのですが……」
line = "「一緒に遊ぶとしても、風紀委員がいては堅苦しく感じるかもしれませんし……私も年頃の女の子ですから人並に遊びたい気持ちはあるのですが……」"

[[dialogue]]
speaker = "ユウリ"
# 「話は聞かせてもらった！」
line = "「話は聞かせてもらった！」"

[[dialogue]]
speaker = "エリス"
# 「ユウリさん……！？」
line = "「ユウリさん……！？」"

[[dialogue]]
speaker = "ユウリ"
# 「それなら実際に遊びに行くのが早いだろ。ついでに会長さんも行こうぜ！」
line = "「それなら実際に遊びに行くのが早いだろ。ついでに会長さんも行こうぜ！」"

[[dialogue]]
speaker = "unk"
# というわけで今日は、エリスに普通の女の子の遊びを体験してもらうことになったのだが……
line = "というわけで今日は、エリスに普通の女の子の遊びを体験してもらうことになったのだが……"

[[dialogue]]
speaker = "エリス"
# 「ユウリさんは……他の人助けがあるから行けなくなった？　ふふ、ユウリさんらしいですね」
line = "「ユウリさんは……他の人助けがあるから行けなくなった？　ふふ、ユウリさんらしいですね」"

[[dialogue]]
speaker = "エリス"
# 「え、でも伝言がある？」
line = "「え、でも伝言がある？」"

[[dialogue]]
speaker = "エリス"
# 「女の子らしい遊びと言えばウインドウショッピング、スイーツの食べ歩き……なるほど、どれもあまり経験がないですね」
line = "「女の子らしい遊びと言えばウインドウショッピング、スイーツの食べ歩き……なるほど、どれもあまり経験がないですね」"

[[dialogue]]
speaker = "エリス"
# 「ではまずは食べ歩きがしたいです。スイーツには興味がありますから」
line = "「ではまずは食べ歩きがしたいです。スイーツには興味がありますから」"

[[dialogue]]
speaker = "エリス"
# 「これがクリームブリュレクレープ……フランスでは見ないですが、とても魅力的に感じます。それでは……はむ」
line = "「これがクリームブリュレクレープ……フランスでは見ないですが、とても魅力的に感じます。それでは……はむ」"

[[dialogue]]
speaker = "エリス"
# 「ん～っ！　クリームの甘さとブリュレの香ばしさ、バニラの風味……これは素晴らしい……！」
line = "「ん～っ！　クリームの甘さとブリュレの香ばしさ、バニラの風味……これは素晴らしい……！」"

[[dialogue]]
speaker = "エリス"
# 「ミルクレープもそうでしたが、フランスで生まれたものがこうも変わるのですね。美味しくて面白いです」
line = "「ミルクレープもそうでしたが、フランスで生まれたものがこうも変わるのですね。美味しくて面白いです」"

[[dialogue]]
speaker = "エリス"
# 「あら……頬にクリームが付いています。いえ、そちらではなく左側……ああ、もう少し下です」
line = "「あら……頬にクリームが付いています。いえ、そちらではなく左側……ああ、もう少し下です」"

[[dialogue]]
speaker = "エリス"
# 「ふふ、私が拭いてあげますね。ほら、綺麗になりましたよ」
line = "「ふふ、私が拭いてあげますね。ほら、綺麗になりましたよ」"

[[dialogue]]
speaker = "エリス"
# 「……あ、顔が近かったですね。あはは……」
line = "「……あ、顔が近かったですね。あはは……」"

[[dialogue]]
speaker = "unk"
# 次はショッピング！
line = "次はショッピング！"

[[dialogue]]
speaker = "エリス"
# 「あ……この口紅、とっても艶やかで綺麗……。私にも似合うでしょうか？」
line = "「あ……この口紅、とっても艶やかで綺麗……。私にも似合うでしょうか？」"

[[dialogue]]
speaker = "unk"
# 似合うけど色っぽくて刺激的かも
line = "似合うけど色っぽくて刺激的かも"

[[dialogue]]
speaker = "エリス"
# 「色っぽいなんて初めて言われました。女性として魅力的……と受け止めていいのでしょうか」
line = "「色っぽいなんて初めて言われました。女性として魅力的……と受け止めていいのでしょうか」"

[[dialogue]]
speaker = "エリス"
# 「風紀委員としては問題かもしれませんが、言われると嬉しい言葉なのですね」
line = "「風紀委員としては問題かもしれませんが、言われると嬉しい言葉なのですね」"

[[dialogue]]
speaker = "エリス"
# 「この口紅、ほんとに買っちゃおうかな……」
line = "「この口紅、ほんとに買っちゃおうかな……」"

[[dialogue]]
speaker = "エリス"
# 「あれ……？　会長さんと私。男性と二人きりで街を出歩いて……」
line = "「あれ……？　会長さんと私。男性と二人きりで街を出歩いて……」"

[[dialogue]]
speaker = "エリス"
# （よく考えたら、これはデートなのでは……！？）
line = "（よく考えたら、これはデートなのでは……！？）"

[[dialogue]]
speaker = "エリス"
# 「え……？　顔が赤い、ですか……？　いえいえいえ、お気遣いなくっ。あはは、あははは……」
line = "「え……？　顔が赤い、ですか……？　いえいえいえ、お気遣いなくっ。あはは、あははは……」"

[[dialogue]]
speaker = "unk"
# 最後はカラオケ！
line = "最後はカラオケ！"

[[dialogue]]
speaker = "エリス"
# 「！　行きたいです！」
line = "「！　行きたいです！」"

[[dialogue]]
speaker = "エリス"
# 「前々から興味があったのですが、なかなか決心がつかなくて……憧れだったんです、この国のカラオケ」
line = "「前々から興味があったのですが、なかなか決心がつかなくて……憧れだったんです、この国のカラオケ」"

[[dialogue]]
speaker = "エリス"
# 「遅くなってはいけないので１８時までです。もちろん、２人きりだからといってふしだらなことはいけませんよ」
line = "「遅くなってはいけないので１８時までです。もちろん、２人きりだからといってふしだらなことはいけませんよ」"

[[dialogue]]
speaker = "エリス"
# 「母から教わった日本の歌もあるんです。では……時間の限り楽しみましょう！」
line = "「母から教わった日本の歌もあるんです。では……時間の限り楽しみましょう！」"

[[dialogue]]
speaker = "エリス"
# 「ふふふ、気の向くままに歌うことがこんなに楽しいとは思いませんでした。また行ってみたいです」
line = "「ふふふ、気の向くままに歌うことがこんなに楽しいとは思いませんでした。また行ってみたいです」"

[[dialogue]]
speaker = "エリス"
# 「あれ、会長さん、大丈夫ですか？　ぐったりされているようですが……平気？　ならいいんですけど」
line = "「あれ、会長さん、大丈夫ですか？　ぐったりされているようですが……平気？　ならいいんですけど」"

[[dialogue]]
speaker = "unk"
# （実はすごい音痴だったなんて言えない……）
line = "（実はすごい音痴だったなんて言えない……）"

[[dialogue]]
speaker = "エリス"
# 「今日は、会長さんのおかげで初めてのところにたくさん行くことができました。とても楽しかったです。ありがとうございます」
line = "「今日は、会長さんのおかげで初めてのところにたくさん行くことができました。とても楽しかったです。ありがとうございます」"

[[dialogue]]
speaker = "エリス"
# 「……だから会長さんに折り入ってお願いがあるんです。会長さんにしか頼めないことで……その……」
line = "「……だから会長さんに折り入ってお願いがあるんです。会長さんにしか頼めないことで……その……」"

[[dialogue]]
speaker = "エリス"
# 「わ、私を口説いてくれませんか！？」
line = "「わ、私を口説いてくれませんか！？」"
