[[dialogue]]
speaker = "unk"
# 第６話,ベアトリスの追想,B
line = "第６話,ベアトリスの追想,B"

[[dialogue]]
speaker = "unk"
# ベアトリスは星徒会室を離れ、チナがいる会議室に向かう。
line = "ベアトリスは星徒会室を離れ、チナがいる会議室に向かう。"

[[dialogue]]
speaker = "ベアトリス"
# （梨緒ちゃんたちにはああいったけど、チナちゃんと話すの久しぶりだから緊張しちゃうな……──って、弱気になっちゃダメ）
line = "（梨緒ちゃんたちにはああいったけど、チナちゃんと話すの久しぶりだから緊張しちゃうな……──って、弱気になっちゃダメ）"

[[dialogue]]
speaker = "ベアトリス"
# （チナちゃんとお話しできるように……自分の気持ちを、ちゃんと自分の言葉にできるようにしないと）
line = "（チナちゃんとお話しできるように……自分の気持ちを、ちゃんと自分の言葉にできるようにしないと）"

[[dialogue]]
speaker = "ベアトリス"
# （ルヴィは、テルル様に代わる新しい女神だった）
line = "（ルヴィは、テルル様に代わる新しい女神だった）"

[[dialogue]]
speaker = "ベアトリス"
# （びっくりした……なんて言葉も出ないくらい、思いもしないことだった）
line = "（びっくりした……なんて言葉も出ないくらい、思いもしないことだった）"

[[dialogue]]
speaker = "ベアトリス"
# （ずっと一緒にデネブを守ってきた友達が女神様だったなんて、信じられない……はずなんだけど、ちょっと納得できた気がする）
line = "（ずっと一緒にデネブを守ってきた友達が女神様だったなんて、信じられない……はずなんだけど、ちょっと納得できた気がする）"

[[dialogue]]
speaker = "ベアトリス"
# （だってルヴィはそれくらい特別な存在だったから。私たちとは違う次元の存在だって、なんとなく感じていたから）
line = "（だってルヴィはそれくらい特別な存在だったから。私たちとは違う次元の存在だって、なんとなく感じていたから）"

[[dialogue]]
speaker = "ベアトリス"
# （だけど──）
line = "（だけど──）"

[[dialogue]]
speaker = "ベアトリス"
# （ルヴィはディザスターハンドと一緒にいて、ディザスターハンドは梨緒ちゃんの世界を滅ぼした存在で……）
line = "（ルヴィはディザスターハンドと一緒にいて、ディザスターハンドは梨緒ちゃんの世界を滅ぼした存在で……）"

[[dialogue]]
speaker = "ベアトリス"
# （つまりルヴィは、リクリエを起こす側にいるってこと）
line = "（つまりルヴィは、リクリエを起こす側にいるってこと）"

[[dialogue]]
speaker = "ベアトリス"
# （ずっとルヴィはデネブを守るふりをして、リクリエを起こそうとしていたのかな……）
line = "（ずっとルヴィはデネブを守るふりをして、リクリエを起こそうとしていたのかな……）"

[[dialogue]]
speaker = "ベアトリス"
# （リクリエからデネブを守るために戦ってきたはずなのに……なんだろ、今までのいろいろなことが無駄になったような気がする）
line = "（リクリエからデネブを守るために戦ってきたはずなのに……なんだろ、今までのいろいろなことが無駄になったような気がする）"

[[dialogue]]
speaker = "ベアトリス"
# （私たち極星学園も、今まで知らず知らずのうちに、リクリエを起こす手助けをしていたのかも……）
line = "（私たち極星学園も、今まで知らず知らずのうちに、リクリエを起こす手助けをしていたのかも……）"

[[dialogue]]
speaker = "ベアトリス"
# （今さらになって、私に裏切られた梨緒ちゃんの気持ちがわかった気がする。裏切られるのってこんな感じなんだ……）
line = "（今さらになって、私に裏切られた梨緒ちゃんの気持ちがわかった気がする。裏切られるのってこんな感じなんだ……）"

[[dialogue]]
speaker = "ベアトリス"
# （だけど……もしかしたら、ルヴィはディザスターハンドや『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』に操られてるのかもしれない。何か仕方ない理由があるのかもしれない）
line = "（だけど……もしかしたら、ルヴィはディザスターハンドや『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』に操られてるのかもしれない。何か仕方ない理由があるのかもしれない）"

[[dialogue]]
speaker = "ベアトリス"
# （いや……本当はルヴィの意志じゃないって、私がそう思いたいだけかもしれない。裏切られたって信じたくないだけかもしれない）
line = "（いや……本当はルヴィの意志じゃないって、私がそう思いたいだけかもしれない。裏切られたって信じたくないだけかもしれない）"

[[dialogue]]
speaker = "ベアトリス"
# （……『かもしれない』だらけだ）
line = "（……『かもしれない』だらけだ）"

[[dialogue]]
speaker = "ベアトリス"
# （デネブを滅ぼすことが正しいと思ってるなら、ルヴィはきっと本当にデネブを滅ぼす）
line = "（デネブを滅ぼすことが正しいと思ってるなら、ルヴィはきっと本当にデネブを滅ぼす）"

[[dialogue]]
speaker = "ベアトリス"
# （だってルヴィはいつも正しくて、合理的だから）
line = "（だってルヴィはいつも正しくて、合理的だから）"

[[dialogue]]
speaker = "ベアトリス"
# （でもルヴィは、誰よりも率先してモンスターと戦って、みんなを守って……）
line = "（でもルヴィは、誰よりも率先してモンスターと戦って、みんなを守って……）"

[[dialogue]]
speaker = "ベアトリス"
# （アルバイトしながら流星市国の人々と交流して、私たちが呆れるほど担々麺が好きで……）
line = "（アルバイトしながら流星市国の人々と交流して、私たちが呆れるほど担々麺が好きで……）"

[[dialogue]]
speaker = "ベアトリス"
# （ルヴィは、デネブを、流星市国を愛してると思う）
line = "（ルヴィは、デネブを、流星市国を愛してると思う）"

[[dialogue]]
speaker = "ベアトリス"
# （それに私を止めようとしてくれたルヴィは本気だった）
line = "（それに私を止めようとしてくれたルヴィは本気だった）"

[[dialogue]]
speaker = "ベアトリス"
# （私がいずれリクリエで消滅するものだと、そう考えているようには見えなかった）
line = "（私がいずれリクリエで消滅するものだと、そう考えているようには見えなかった）"

[[dialogue]]
speaker = "ベアトリス"
# （だから、ルヴィはまだ仲間だと思ってる）
line = "（だから、ルヴィはまだ仲間だと思ってる）"

[[dialogue]]
speaker = "ベアトリス"
# （私は心のどこかで、まだルヴィを信じてるんだ……）
line = "（私は心のどこかで、まだルヴィを信じてるんだ……）"

[[dialogue]]
speaker = "ベアトリス"
# 「……ふぅ」
line = "「……ふぅ」"

[[dialogue]]
speaker = "ベアトリス"
# （もしルヴィが『新しい世界のために滅びて』って言ったら、私はどうするだろう？）
line = "（もしルヴィが『新しい世界のために滅びて』って言ったら、私はどうするだろう？）"

[[dialogue]]
speaker = "ベアトリス"
# （ルヴィが言うなら、ってちょっと受け入れちゃうかもしれない。でも何か違う気がする）
line = "（ルヴィが言うなら、ってちょっと受け入れちゃうかもしれない。でも何か違う気がする）"

[[dialogue]]
speaker = "ベアトリス"
# （もしルヴィが敵だって確信できたら、私は戦えるだろうか）
line = "（もしルヴィが敵だって確信できたら、私は戦えるだろうか）"

[[dialogue]]
speaker = "ベアトリス"
# （もしルヴィを討たないと世界を守れないとしたら……いや、それは私には無理だよ……）
line = "（もしルヴィを討たないと世界を守れないとしたら……いや、それは私には無理だよ……）"

[[dialogue]]
speaker = "ベアトリス"
# （ルヴィは私のこと、どう思ってるんだろう？　私はルヴィに、何をすればいいんだろう？）
line = "（ルヴィは私のこと、どう思ってるんだろう？　私はルヴィに、何をすればいいんだろう？）"

[[dialogue]]
speaker = "ベアトリス"
# （結局、わかんないことだらけだなぁ……）
line = "（結局、わかんないことだらけだなぁ……）"

[[dialogue]]
speaker = "ベアトリス"
# 「でも、逃げないよ」
line = "「でも、逃げないよ」"

[[dialogue]]
speaker = "ベアトリス"
# 「何もわからないからって、逃げたり諦めたりしたら、きっともうルヴィに近づけなくなっちゃうから」
line = "「何もわからないからって、逃げたり諦めたりしたら、きっともうルヴィに近づけなくなっちゃうから」"

[[dialogue]]
speaker = "ベアトリス"
# 「だからせめて、逃げることだけはしない」
line = "「だからせめて、逃げることだけはしない」"

[[dialogue]]
speaker = "ベアトリス"
# 「ルヴィが敵でも、そうじゃなくても、本人の口から直接聞かないと納得できない」
line = "「ルヴィが敵でも、そうじゃなくても、本人の口から直接聞かないと納得できない」"

[[dialogue]]
speaker = "ベアトリス"
# 「簡単にはまた会えないだろうけど、諦めないから」
line = "「簡単にはまた会えないだろうけど、諦めないから」"

[[dialogue]]
speaker = "ベアトリス"
# 「９００回負けても諦めない梨緒ちゃんみたいに、ルヴィにもう一度会うまで諦めないんだから……！」
line = "「９００回負けても諦めない梨緒ちゃんみたいに、ルヴィにもう一度会うまで諦めないんだから……！」"

[[dialogue]]
speaker = "unk"
# そしてベアトリスが会議室の前に到着する。
line = "そしてベアトリスが会議室の前に到着する。"

[[dialogue]]
speaker = "unk"
# 呼吸を整え、そしてドアを開く。
line = "呼吸を整え、そしてドアを開く。"

[[dialogue]]
speaker = "ベアトリス"
# 「入るよ、チナちゃん」
line = "「入るよ、チナちゃん」"
