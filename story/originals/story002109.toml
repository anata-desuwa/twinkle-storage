[[dialogue]]
speaker = "unk"
# リゾート結界の隙間から入り込み、数々の冬現象を起こす雪女。
line = "リゾート結界の隙間から入り込み、数々の冬現象を起こす雪女。"

[[dialogue]]
speaker = "unk"
# 彼女の力はさらに勢いを増していく……！
line = "彼女の力はさらに勢いを増していく……！"

[[dialogue]]
speaker = "雪女"
# 「喰らいなさい……ブッシュ・ド・ノエル砲──！」
line = "「喰らいなさい……ブッシュ・ド・ノエル砲──！」"

[[dialogue]]
speaker = "ルリエル"
# 「ひゃあああっっ……！　つ、冷たい──極寒の風ですーっ！」
line = "「ひゃあああっっ……！　つ、冷たい──極寒の風ですーっ！」"

[[dialogue]]
speaker = "アナ"
# 「これは──大寒波……！」
line = "「これは──大寒波……！」"

[[dialogue]]
speaker = "ユウリ"
# 「あたし達の炎でなんとか対抗すんぞ──！」
line = "「あたし達の炎でなんとか対抗すんぞ──！」"

[[dialogue]]
speaker = "アポロ"
# 「ああ、あたしも協力するぜ──！　つっても、寒ぃ～！」
line = "「ああ、あたしも協力するぜ──！　つっても、寒ぃ～！」"

[[dialogue]]
speaker = "雪女"
# 「ムダなテイコウはよすのです！　この調子で吹雪も起こしてやるのデ～ス！」
line = "「ムダなテイコウはよすのです！　この調子で吹雪も起こしてやるのデ～ス！」"

[[dialogue]]
speaker = "アナ"
# 「く……お雑煮に寒波……！　なんて手強い──私たちの火力だけでは……！」
line = "「く……お雑煮に寒波……！　なんて手強い──私たちの火力だけでは……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「火力ならここにあるわよ！」
line = "「火力ならここにあるわよ！」"

[[dialogue]]
speaker = "アナ"
# 「え……？」
line = "「え……？」"

[[dialogue]]
speaker = "マトイ"
# 「こ、この炎って……」
line = "「こ、この炎って……」"

[[dialogue]]
speaker = "セドナ"
# 「強引に引きずり込まれたかと思えば──これで良かったのか？」
line = "「強引に引きずり込まれたかと思えば──これで良かったのか？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええ、ばっちりよ！　助かったわ」
line = "「ええ、ばっちりよ！　助かったわ」"

[[dialogue]]
speaker = "ユウリ"
# 「あ、あんたは──」
line = "「あ、あんたは──」"

[[dialogue]]
speaker = "unk"
# セドナさん！？
line = "セドナさん！？"

[[dialogue]]
speaker = "unk"
# 水着！？
line = "水着！？"

[[dialogue]]
speaker = "セドナ"
# 「たまたま学園を訪ねていてな。すると、いきなりゲートが開いて彼女が……」
line = "「たまたま学園を訪ねていてな。すると、いきなりゲートが開いて彼女が……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「雪女って言うからには火に弱いはずよね──炎使い、炎使いはどこ……！？」
line = "「雪女って言うからには火に弱いはずよね──炎使い、炎使いはどこ……！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「──あ！　いたわ！　最高の火力担当がこんなところに……まさに激アツね！」
line = "「──あ！　いたわ！　最高の火力担当がこんなところに……まさに激アツね！」"

[[dialogue]]
speaker = "セドナ"
# 「ん、九浄の娘──？　なんだ、私が激アツ？」
line = "「ん、九浄の娘──？　なんだ、私が激アツ？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええ！　事情は後よ、今すぐ来てちょうだい──もちろん水着でね！」
line = "「ええ！　事情は後よ、今すぐ来てちょうだい──もちろん水着でね！」"

[[dialogue]]
speaker = "セドナ"
# 「そんなこんなで連れてこられたわけだ。まったく相変わらずの強引さで困る」
line = "「そんなこんなで連れてこられたわけだ。まったく相変わらずの強引さで困る」"

[[dialogue]]
speaker = "ヴィーナス"
# 「なんだかんだで水着になってくれる魔女さんナイス～♪」
line = "「なんだかんだで水着になってくれる魔女さんナイス～♪」"

[[dialogue]]
speaker = "雪女"
# 「く……まさか助太刀とは予想外デース。雪女は炎に弱いデース……！」
line = "「く……まさか助太刀とは予想外デース。雪女は炎に弱いデース……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あいつをやっつけたら、あなたもこのビーチでゆっくりしていけるわよ！　さあレッツファイト！」
line = "「あいつをやっつけたら、あなたもこのビーチでゆっくりしていけるわよ！　さあレッツファイト！」"

[[dialogue]]
speaker = "セドナ"
# 「ええい、勝手に決めつけるんじゃない！」
line = "「ええい、勝手に決めつけるんじゃない！」"

[[dialogue]]
speaker = "セドナ"
# 「──だが、しかし……あれは新しい水着フォームか？　そのための調査と考えれば……案外悪くもないのやもしれぬ……」
line = "「──だが、しかし……あれは新しい水着フォームか？　そのための調査と考えれば……案外悪くもないのやもしれぬ……」"

[[dialogue]]
speaker = "セドナ"
# 「いいだろう。強火をご所望なら、私も少しは手を貸してやる」
line = "「いいだろう。強火をご所望なら、私も少しは手を貸してやる」"

[[dialogue]]
speaker = "リップル"
# 「頼りになりマース！　雪女サンを改心させてあげてクダサイ！　夏の魅力で彼女の冷た～いハートを溶かしてやるのデース！」
line = "「頼りになりマース！　雪女サンを改心させてあげてクダサイ！　夏の魅力で彼女の冷た～いハートを溶かしてやるのデース！」"

[[dialogue]]
speaker = "アポロ"
# 「へっ、面白いことになってきやがったな！　さっき食ったアイスの分、ここで腹ごなしといくか！」
line = "「へっ、面白いことになってきやがったな！　さっき食ったアイスの分、ここで腹ごなしといくか！」"

[[dialogue]]
speaker = "ルリエル"
# 「はい！」
line = "「はい！」"

[[dialogue]]
speaker = "雪女"
# 「あ～っズルいデスぞ！　さっきはお年玉拾おうとしてたくせに、手のひら返してワタシを退治しようなんて──あっ熱っ！？」
line = "「あ～っズルいデスぞ！　さっきはお年玉拾おうとしてたくせに、手のひら返してワタシを退治しようなんて──あっ熱っ！？」"

[[dialogue]]
speaker = "ユウリ"
# 「ええい、もうこうなりゃ最大火力だ──！」
line = "「ええい、もうこうなりゃ最大火力だ──！」"

[[dialogue]]
speaker = "アナ"
# 「我々の力を結集しましょう──！」
line = "「我々の力を結集しましょう──！」"

[[dialogue]]
speaker = "リップル"
# 「──お願いシマス！　ワタシも、残された夏パワーを最大限に引き出します──！」
line = "「──お願いシマス！　ワタシも、残された夏パワーを最大限に引き出します──！」"

[[dialogue]]
speaker = "マトイ"
# 「す、すごい火力……！　これだけの熱さなら雪女も……！」
line = "「す、すごい火力……！　これだけの熱さなら雪女も……！」"

[[dialogue]]
speaker = "雪女"
# 「なんと！？　お雑煮がまとめて焼かれてしまいました……これはピンチです──！」
line = "「なんと！？　お雑煮がまとめて焼かれてしまいました……これはピンチです──！」"

[[dialogue]]
speaker = "雪女"
# 「ですが……グヌヌ……！　や、やられてなるモノか──デスぅ……！」
line = "「ですが……グヌヌ……！　や、やられてなるモノか──デスぅ……！」"

[[dialogue]]
speaker = "リップル"
# 「確かにワタシはマダマダ冬の醍醐味を知ったばかり──サマーナイズドするには未完成なのかもシレマセン」
line = "「確かにワタシはマダマダ冬の醍醐味を知ったばかり──サマーナイズドするには未完成なのかもシレマセン」"

[[dialogue]]
speaker = "リップル"
# 「ですがイズレ──夏にも楽しめるスノボやこたつを開発してみせマース！　それマデ雪女サンもじっくり待つがヨイのデース！」
line = "「ですがイズレ──夏にも楽しめるスノボやこたつを開発してみせマース！　それマデ雪女サンもじっくり待つがヨイのデース！」"

[[dialogue]]
speaker = "雪女"
# 「ぐわ～～～っ！　や～ら～れ～た～デ～ス～～～！！！」
line = "「ぐわ～～～っ！　や～ら～れ～た～デ～ス～～～！！！」"

[[dialogue]]
speaker = "unk"
# そうして、隙間から入り込んだ雪女はリゾート結界から消え去っていくのだった……。
line = "そうして、隙間から入り込んだ雪女はリゾート結界から消え去っていくのだった……。"
