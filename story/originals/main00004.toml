[[dialogue]]
speaker = "サーシャ"
# 「これでひと段落かしら？　ふふっ、あっさりだったわね」
line = "「これでひと段落かしら？　ふふっ、あっさりだったわね」"

[[dialogue]]
speaker = "マトイ"
# 「もうっ。どうしてモンスターを連れてきちゃうんですか、サーシャさん」
line = "「もうっ。どうしてモンスターを連れてきちゃうんですか、サーシャさん」"

[[dialogue]]
speaker = "サーシャ"
# 「固いこと言わないの～。マトイちゃんのおかげで助かったんだから」
line = "「固いこと言わないの～。マトイちゃんのおかげで助かったんだから」"

[[dialogue]]
speaker = "unk"
# 幾度かの交戦を経て付近のモンスターは無事一掃されたようだった。
line = "幾度かの交戦を経て付近のモンスターは無事一掃されたようだった。"

[[dialogue]]
speaker = "サーシャ"
# 「それと……クロトくん、だったかしら？　一緒に戦ってくれてありがとねぇ」
line = "「それと……クロトくん、だったかしら？　一緒に戦ってくれてありがとねぇ」"

[[dialogue]]
speaker = "クロト"
# 「あ……はい」
line = "「あ……はい」"

[[dialogue]]
speaker = "クロト"
# 「（あれ……俺、自分の名前なんて名乗ったっけ？）」
line = "「（あれ……俺、自分の名前なんて名乗ったっけ？）」"

[[dialogue]]
speaker = "マトイ"
# 「それにしても……こんな町中でいきなり湧いてくるなんて。油断も隙もありませんね」
line = "「それにしても……こんな町中でいきなり湧いてくるなんて。油断も隙もありませんね」"

[[dialogue]]
speaker = "アナ"
# 「近辺にアステラはなし。ただのはぐれモンスターですね」
line = "「近辺にアステラはなし。ただのはぐれモンスターですね」"

[[dialogue]]
speaker = "サーシャ"
# 「ふふ。いつもこれくらい可愛い相手なら助かるのだけど」
line = "「ふふ。いつもこれくらい可愛い相手なら助かるのだけど」"

[[dialogue]]
speaker = "クロト"
# 「（彼女たちは……）」
line = "「（彼女たちは……）」"

[[dialogue]]
speaker = "unk"
# 特徴的な戦闘服──
line = "特徴的な戦闘服──"

[[dialogue]]
speaker = "unk"
# 間違いない。新星学園の<ruby=スターナイト>星騎士</ruby>たちだ。
line = "間違いない。新星学園の<ruby>星騎士<rt>スターナイト</rt></ruby>たちだ。"

[[dialogue]]
speaker = "unk"
# そして、この手渡された変身アイテム……
line = "そして、この手渡された変身アイテム……"

[[dialogue]]
speaker = "クロト"
# 「あのっ──」
line = "「あのっ──」"

[[dialogue]]
speaker = "サーシャ"
# 「あら。もうそろそろ始業の時間だわ、急いで戻らないと」
line = "「あら。もうそろそろ始業の時間だわ、急いで戻らないと」"

[[dialogue]]
speaker = "マトイ"
# 「ですねっ。協力してくれてありがと、でも遅刻しないように！」
line = "「ですねっ。協力してくれてありがと、でも遅刻しないように！」"

[[dialogue]]
speaker = "アナ"
# 「とんぼがえり～」
line = "「とんぼがえり～」"

[[dialogue]]
speaker = "unk"
# 言うが早いか、彼女たちはそのまま飛翔して学園のほうへ去っていってしまった。
line = "言うが早いか、彼女たちはそのまま飛翔して学園のほうへ去っていってしまった。"

[[dialogue]]
speaker = "unk"
# 俺も飛──べない。
line = "俺も飛──べない。"

[[dialogue]]
speaker = "クロト"
# 「やばい、時間が」
line = "「やばい、時間が」"

[[dialogue]]
speaker = "unk"
# 今度は景色に浸る余裕もなく、俺は自分の脚で残る通学路を駆けていった。
line = "今度は景色に浸る余裕もなく、俺は自分の脚で残る通学路を駆けていった。"
