[[dialogue]]
speaker = "unk"
# 第９話,正義のヒーロー,B
line = "第９話,正義のヒーロー,B"

[[dialogue]]
speaker = "unk"
# 次々と産み落とされるモンスターをその度に討伐しつつ、彼女を追う。
line = "次々と産み落とされるモンスターをその度に討伐しつつ、彼女を追う。"

[[dialogue]]
speaker = "unk"
# ようやく少女──アポロへ追いつく頃には学園近くの繁華街にまでやってきていた。
line = "ようやく少女──アポロへ追いつく頃には学園近くの繁華街にまでやってきていた。"

[[dialogue]]
speaker = "サーシャ"
# 「ここにも人がたくさん……これ以上暴れられたら大変ね」
line = "「ここにも人がたくさん……これ以上暴れられたら大変ね」"

[[dialogue]]
speaker = "クロト"
# 「ええ。一刻も早く彼女を止めましょう」
line = "「ええ。一刻も早く彼女を止めましょう」"

[[dialogue]]
speaker = "unk"
# そうして、俺たちが彼女へ歩み寄ろうとすると……
line = "そうして、俺たちが彼女へ歩み寄ろうとすると……"

[[dialogue]]
speaker = "ギエル"
# 「おっと……これほど早く到着されるとは。星騎士の粋を集めた組織というのは伊達ではないようですね」
line = "「おっと……これほど早く到着されるとは。星騎士の粋を集めた組織というのは伊達ではないようですね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「！　何よ、あんた」
line = "「！　何よ、あんた」"

[[dialogue]]
speaker = "unk"
# 先ほどもずっとアポロに付き従っていた男が現れた。
line = "先ほどもずっとアポロに付き従っていた男が現れた。"

[[dialogue]]
speaker = "クロト"
# 「あなたは誰だ。なぜこんな真似をする」
line = "「あなたは誰だ。なぜこんな真似をする」"

[[dialogue]]
speaker = "ギエル"
# 「答える必要のなきこと。この身はただ、アポロ様の意のままにお仕えするだけ」
line = "「答える必要のなきこと。この身はただ、アポロ様の意のままにお仕えするだけ」"

[[dialogue]]
speaker = "ギエル"
# 「この身は大した戦力になりえませんが……アポロ様の前座くらいなら務まるかと」
line = "「この身は大した戦力になりえませんが……アポロ様の前座くらいなら務まるかと」"

[[dialogue]]
speaker = "unk"
# アポロ様──
line = "アポロ様──"

[[dialogue]]
speaker = "unk"
# 執事のような風体の男がそう称したところをみるに、あの少女とは主従の関係にあるというのか。
line = "執事のような風体の男がそう称したところをみるに、あの少女とは主従の関係にあるというのか。"

[[dialogue]]
speaker = "アポロ"
# 「よい、ギエル。下がれ」
line = "「よい、ギエル。下がれ」"

[[dialogue]]
speaker = "ギエル"
# 「は。仰せのままに」
line = "「は。仰せのままに」"

[[dialogue]]
speaker = "unk"
# 軽々と宙を翔けてやってくるアポロ。
line = "軽々と宙を翔けてやってくるアポロ。"

[[dialogue]]
speaker = "unk"
# ギエルと呼ばれた男は<ruby=いんぎん>慇懃</ruby>に礼をして引き下がった。
line = "ギエルと呼ばれた男は<ruby>慇懃<rt>いんぎん</rt></ruby>に礼をして引き下がった。"

[[dialogue]]
speaker = "ヴィーナス"
# （“アポロ”はテレビ番組だって言ってたけど、それならあの男は……？）
line = "（“アポロ”はテレビ番組だって言ってたけど、それならあの男は……？）"

[[dialogue]]
speaker = "アナ"
# （あれは知らない）
line = "（あれは知らない）"

[[dialogue]]
speaker = "サーシャ"
# （女の子のほうだけ、コスプレってことかしら？）
line = "（女の子のほうだけ、コスプレってことかしら？）"

[[dialogue]]
speaker = "アポロ"
# 「ふふん。よくあたしに追いついたな、褒めてやろう！」
line = "「ふふん。よくあたしに追いついたな、褒めてやろう！」"

[[dialogue]]
speaker = "クロト"
# 「アポロ。君は何者だ。その剣といい、モンスターを扱う能力といい……ただの女の子じゃないな」
line = "「アポロ。君は何者だ。その剣といい、モンスターを扱う能力といい……ただの女の子じゃないな」"

[[dialogue]]
speaker = "アポロ"
# 「無論だ！　あたしは流星ライダー・アポロ──世界を守る正義のヒーローなのだからな！」
line = "「無論だ！　あたしは流星ライダー・アポロ──世界を守る正義のヒーローなのだからな！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「正義のヒーローって……」
line = "「正義のヒーローって……」"

[[dialogue]]
speaker = "マトイ"
# 「やってることは真逆だと思うんですけど！」
line = "「やってることは真逆だと思うんですけど！」"

[[dialogue]]
speaker = "アポロ"
# 「何ぃ？」
line = "「何ぃ？」"

[[dialogue]]
speaker = "ギエル"
# 「そんなことはありません。世界の混沌を払うのは、ヒーローの果たすべき立派な使命でございます」
line = "「そんなことはありません。世界の混沌を払うのは、ヒーローの果たすべき立派な使命でございます」"

[[dialogue]]
speaker = "unk"
# こちらが正論で諭そうとしても、お付きの男がすぐに彼女を立てていた。
line = "こちらが正論で諭そうとしても、お付きの男がすぐに彼女を立てていた。"

[[dialogue]]
speaker = "アポロ"
# 「緋宮クロト──あたしの目的はただひとつ。本気のおまえと相まみえることだ」
line = "「緋宮クロト──あたしの目的はただひとつ。本気のおまえと相まみえることだ」"

[[dialogue]]
speaker = "アポロ"
# 「つまり──こう！」
line = "「つまり──こう！」"

[[dialogue]]
speaker = "クロト"
# 「──っ！？」
line = "「──っ！？」"

[[dialogue]]
speaker = "市民Ａ"
# 「きゃあああ──っ！？」
line = "「きゃあああ──っ！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロト──！」
line = "「クロト──！」"

[[dialogue]]
speaker = "クロト"
# 「大丈夫だ──が、随分なことをしてくれるな」
line = "「大丈夫だ──が、随分なことをしてくれるな」"

[[dialogue]]
speaker = "アポロ"
# 「はっはっは！　いい反応だ！」
line = "「はっはっは！　いい反応だ！」"

[[dialogue]]
speaker = "unk"
# アポロが気まぐれで振るった大剣は、危うくビルを吹き飛ばして大勢の被害を出すところだった。
line = "アポロが気まぐれで振るった大剣は、危うくビルを吹き飛ばして大勢の被害を出すところだった。"

[[dialogue]]
speaker = "unk"
# すんでのところで受け止めたが──彼女はかえって満足そうな様子で。
line = "すんでのところで受け止めたが──彼女はかえって満足そうな様子で。"

[[dialogue]]
speaker = "アポロ"
# 「だがまだ足りない。魔王の底力はそんなもんじゃないはずだ」
line = "「だがまだ足りない。魔王の底力はそんなもんじゃないはずだ」"

[[dialogue]]
speaker = "クロト"
# 「君は──なぜ、そう俺と戦いたがる」
line = "「君は──なぜ、そう俺と戦いたがる」"

[[dialogue]]
speaker = "アポロ"
# 「愚問だ。緋宮クロト──おまえこそが魔王であり、そして、魔王を倒すのはヒーローの宿命だと、太古の昔から決まっているからだ！」
line = "「愚問だ。緋宮クロト──おまえこそが魔王であり、そして、魔王を倒すのはヒーローの宿命だと、太古の昔から決まっているからだ！」"

[[dialogue]]
speaker = "アポロ"
# 「でもっておまえ達は魔王の家来だろう！　ならまとめてぶちのめしてやるのもヒーローの流儀！」
line = "「でもっておまえ達は魔王の家来だろう！　ならまとめてぶちのめしてやるのもヒーローの流儀！」"

[[dialogue]]
speaker = "サーシャ"
# 「あらあら……家来ではなく仲間なのだけれど」
line = "「あらあら……家来ではなく仲間なのだけれど」"

[[dialogue]]
speaker = "マトイ"
# 「魔王をやっつけるなんて……ホントにヒーロー気取りっていうか」
line = "「魔王をやっつけるなんて……ホントにヒーロー気取りっていうか」"

[[dialogue]]
speaker = "ヴィーナス"
# 「もう！　だから魔王は悪いやつじゃないんだってば！」
line = "「もう！　だから魔王は悪いやつじゃないんだってば！」"

[[dialogue]]
speaker = "アポロ"
# 「へ！　悪もんはみんなそう言うのさ！」
line = "「へ！　悪もんはみんなそう言うのさ！」"

[[dialogue]]
speaker = "unk"
# アポロは大剣を担ぎ、夜空の高みからこちらを<ruby=へいげい>睥睨</ruby>する。
line = "アポロは大剣を担ぎ、夜空の高みからこちらを<ruby>睥睨<rt>へいげい</rt></ruby>する。"

[[dialogue]]
speaker = "unk"
# ──来る気か。
line = "──来る気か。"

[[dialogue]]
speaker = "アポロ"
# 「手は抜くなよ。もし、中途半端なバトルであたしを満足させられなかったら…………そうだな～」
line = "「手は抜くなよ。もし、中途半端なバトルであたしを満足させられなかったら…………そうだな～」"

[[dialogue]]
speaker = "unk"
# アポロは視線を上にやって考えたのち、片手をピースサインにしてこちらへ向けた。
line = "アポロは視線を上にやって考えたのち、片手をピースサインにしてこちらへ向けた。"

[[dialogue]]
speaker = "unk"
# ……２？
line = "……２？"

[[dialogue]]
speaker = "アポロ"
# 「確かおまえ達の学園って、２つあるんだったよな」
line = "「確かおまえ達の学園って、２つあるんだったよな」"

[[dialogue]]
speaker = "クロト"
# 「？　ああ……」
line = "「？　ああ……」"

[[dialogue]]
speaker = "unk"
# その意味を、俺がわからずにいると──
line = "その意味を、俺がわからずにいると──"

[[dialogue]]
speaker = "アポロ"
# 「なら、あたしが<b>片っぽ消してきてやるよ</b>。これなら本気でやれるだろ？」
line = "「なら、あたしが<b>片っぽ消してきてやるよ</b>。これなら本気でやれるだろ？」"

[[dialogue]]
speaker = "クロト"
# 「────」
line = "「────」"

[[dialogue]]
speaker = "ヴィーナス"
# 「な──こいつ……っ」
line = "「な──こいつ……っ」"

[[dialogue]]
speaker = "アナ"
# 「冗談──ではなさそうですね」
line = "「冗談──ではなさそうですね」"

[[dialogue]]
speaker = "unk"
# 笑えない脅迫。しかし少女の表情は、仮面の上からもわかるほど楽しげに笑っていた。
line = "笑えない脅迫。しかし少女の表情は、仮面の上からもわかるほど楽しげに笑っていた。"

[[dialogue]]
speaker = "ギエル"
# 「おお。至らなかったとしても半分残そうとはなんという慈悲深さ。このギエル、心の底から感服するばかり」
line = "「おお。至らなかったとしても半分残そうとはなんという慈悲深さ。このギエル、心の底から感服するばかり」"

[[dialogue]]
speaker = "アポロ"
# 「わっはっは、そうだろうそうだろう。ヒーローには優しさもつきものだからな！」
line = "「わっはっは、そうだろうそうだろう。ヒーローには優しさもつきものだからな！」"

[[dialogue]]
speaker = "サーシャ"
# 「やるしかなさそうね、クロトくん」
line = "「やるしかなさそうね、クロトくん」"

[[dialogue]]
speaker = "クロト"
# 「ええ。お力、お借りします」
line = "「ええ。お力、お借りします」"

[[dialogue]]
speaker = "クロト"
# 「アポロ──受けて立とう。こっちはこっちで気にかかっていたんだ。俺が本当に『魔王』なのかどうか」
line = "「アポロ──受けて立とう。こっちはこっちで気にかかっていたんだ。俺が本当に『魔王』なのかどうか」"

[[dialogue]]
speaker = "クロト"
# 「君がヒーローを名乗るのなら、君を倒して確かめさせてもらうとしよう」
line = "「君がヒーローを名乗るのなら、君を倒して確かめさせてもらうとしよう」"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロト……」
line = "「クロト……」"

[[dialogue]]
speaker = "アポロ"
# 「くくく、その意気だ。実にたかぶるぞ！」
line = "「くくく、その意気だ。実にたかぶるぞ！」"

[[dialogue]]
speaker = "クロト"
# 「──全員、戦闘準備。こちらが勝ったら──悪いが仮面を脱いでもらうぞ！」
line = "「──全員、戦闘準備。こちらが勝ったら──悪いが仮面を脱いでもらうぞ！」"

[[dialogue]]
speaker = "アポロ"
# 「かかってこい悪党ども！　このアポロ様が成敗してやる！」
line = "「かかってこい悪党ども！　このアポロ様が成敗してやる！」"
