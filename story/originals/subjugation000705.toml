[[dialogue]]
speaker = "ミア"
# 「え…………？　私、生きて……る？」
line = "「え…………？　私、生きて……る？」"

[[dialogue]]
speaker = "unk"
# １人でよく頑張った
line = "１人でよく頑張った"

[[dialogue]]
speaker = "ミア"
# 「会長さん……！」
line = "「会長さん……！」"

[[dialogue]]
speaker = "unk"
# 俺が相手だ！
line = "俺が相手だ！"

[[dialogue]]
speaker = "キサナ"
# 「ハハハッ！　随分とドラマチックに登場してくれるじゃねえか！　いいぜぇ、それでこそ正義のヒーロー様だ……！」
line = "「ハハハッ！　随分とドラマチックに登場してくれるじゃねえか！　いいぜぇ、それでこそ正義のヒーロー様だ……！」"

[[dialogue]]
speaker = "キサナ"
# 「イラつくんだよ……！　絶体絶命の窮地に現れて、か弱いやつを颯爽と守りますってその態度……！」
line = "「イラつくんだよ……！　絶体絶命の窮地に現れて、か弱いやつを颯爽と守りますってその態度……！」"

[[dialogue]]
speaker = "キサナ"
# 「お望み通り、ぶちのめしてやるよ！　ヒーロー気取りのその面っ──徹底的に歪ませてやらぁっ！」
line = "「お望み通り、ぶちのめしてやるよ！　ヒーロー気取りのその面っ──徹底的に歪ませてやらぁっ！」"

[[dialogue]]
speaker = "ミア"
# 「気を付けてっ。そいつは星力を打ち消す力を持ってるわ……！」
line = "「気を付けてっ。そいつは星力を打ち消す力を持ってるわ……！」"

[[dialogue]]
speaker = "ミア"
# 「星力を使った身体能力向上も、星力を使った直接攻撃も、全部無効化されちゃう……！　だからきっとエリス先輩もっ……！」
line = "「星力を使った身体能力向上も、星力を使った直接攻撃も、全部無効化されちゃう……！　だからきっとエリス先輩もっ……！」"

[[dialogue]]
speaker = "キサナ"
# 「あぁ？　アタシのこと舐めてんじゃねえぞガキ。確かにこの力は便利だけどよ」
line = "「あぁ？　アタシのこと舐めてんじゃねえぞガキ。確かにこの力は便利だけどよ」"

[[dialogue]]
speaker = "キサナ"
# 「この力に頼り切ってるアタシじゃ──ねえ！」
line = "「この力に頼り切ってるアタシじゃ──ねえ！」"

[[dialogue]]
speaker = "unk"
# 強いっ……！
line = "強いっ……！"

[[dialogue]]
speaker = "キサナ"
# 「おらおら、どうしたよ、ヒーローさん？　格好付けて登場した割に及び腰じゃねえか」
line = "「おらおら、どうしたよ、ヒーローさん？　格好付けて登場した割に及び腰じゃねえか」"

[[dialogue]]
speaker = "キサナ"
# 「星力が使えなきゃ一般市民と同じですってか？　魔王サマの実力ってのはこんなもんなのかよ？」
line = "「星力が使えなきゃ一般市民と同じですってか？　魔王サマの実力ってのはこんなもんなのかよ？」"

[[dialogue]]
speaker = "unk"
# 俺のことを知ってるのか？
line = "俺のことを知ってるのか？"

[[dialogue]]
speaker = "キサナ"
# 「面だけはよーく知ってるぜ。無駄に覚えさせられたからな」
line = "「面だけはよーく知ってるぜ。無駄に覚えさせられたからな」"

[[dialogue]]
speaker = "キサナ"
# 「どーしてアイツらがテメエを気にしてるのかは知らねえし、興味もねえが……笑えるぜ」
line = "「どーしてアイツらがテメエを気にしてるのかは知らねえし、興味もねえが……笑えるぜ」"

[[dialogue]]
speaker = "キサナ"
# 「魔王なんて大層な肩書き付けてる癖に、星騎士どもとつるんで正義の味方側を気取ってるなんてなぁ！」
line = "「魔王なんて大層な肩書き付けてる癖に、星騎士どもとつるんで正義の味方側を気取ってるなんてなぁ！」"

[[dialogue]]
speaker = "ミア"
# 「えっ？　──ひっ！」
line = "「えっ？　──ひっ！」"

[[dialogue]]
speaker = "unk"
# 大丈夫か？
line = "大丈夫か？"

[[dialogue]]
speaker = "ミア"
# 「会長さんっ！？　わ、私を庇って……」
line = "「会長さんっ！？　わ、私を庇って……」"

[[dialogue]]
speaker = "キサナ"
# 「ハハハッ、正義の味方は大変だな。雑魚を守りながら戦わなくちゃなんねえんだから」
line = "「ハハハッ、正義の味方は大変だな。雑魚を守りながら戦わなくちゃなんねえんだから」"

[[dialogue]]
speaker = "キサナ"
# 「それでテメエがやられちまったら世話ねえぜ。んなチビほっときゃいいのによォ」
line = "「それでテメエがやられちまったら世話ねえぜ。んなチビほっときゃいいのによォ」"

[[dialogue]]
speaker = "ミア"
# 「そ、そいつの言う通りよ……！　私のことなんか放っておいてっ……！」
line = "「そ、そいつの言う通りよ……！　私のことなんか放っておいてっ……！」"

[[dialogue]]
speaker = "ミア"
# 「このままじゃ会長さんもやられちゃうっ……！　私のことなんか守らなくていいからっ……！」
line = "「このままじゃ会長さんもやられちゃうっ……！　私のことなんか守らなくていいからっ……！」"

[[dialogue]]
speaker = "キサナ"
# 「今にも小便漏らしそうだったガキが強がるじゃねえか。んで、魔王サマはどう出るんだ！」
line = "「今にも小便漏らしそうだったガキが強がるじゃねえか。んで、魔王サマはどう出るんだ！」"

[[dialogue]]
speaker = "ミア"
# 「っっ……！！」
line = "「っっ……！！」"

[[dialogue]]
speaker = "ミア"
# 「あぁっ！？　会長さんっ……！！」
line = "「あぁっ！？　会長さんっ……！！」"

[[dialogue]]
speaker = "キサナ"
# 「ハハァ！　随分とお優しいこった！　そのチビはそこまでボロボロになって守るような女かよ」
line = "「ハハァ！　随分とお優しいこった！　そのチビはそこまでボロボロになって守るような女かよ」"

[[dialogue]]
speaker = "キサナ"
# 「代わりなんていくらでもいんだろぉ？　アタシがチビをぶっ殺してる間に殴ってくりゃいいじゃねえか」
line = "「代わりなんていくらでもいんだろぉ？　アタシがチビをぶっ殺してる間に殴ってくりゃいいじゃねえか」"

[[dialogue]]
speaker = "キサナ"
# 「アタシの世界じゃみんなそうしてきたぜ！　でなきゃ自分が生き残れねえからよぉっ！」
line = "「アタシの世界じゃみんなそうしてきたぜ！　でなきゃ自分が生き残れねえからよぉっ！」"

[[dialogue]]
speaker = "ミア"
# 「っっ！　もうやめてっ……！　私なんか守らないで……！」
line = "「っっ！　もうやめてっ……！　私なんか守らないで……！」"

[[dialogue]]
speaker = "ミア"
# 「そいつの言う通りだから……！　私の代わりなんて、いくらでもいるもん……！」
line = "「そいつの言う通りだから……！　私の代わりなんて、いくらでもいるもん……！」"

[[dialogue]]
speaker = "ミア"
# 「こんなっ、こんな弱くて未熟な私なんて、見捨ててくれれば──」
line = "「こんなっ、こんな弱くて未熟な私なんて、見捨ててくれれば──」"

[[dialogue]]
speaker = "unk"
# そんなこと──できない！
line = "そんなこと──できない！"

[[dialogue]]
speaker = "ミア"
# 「か、会長さん……」
line = "「か、会長さん……」"

[[dialogue]]
speaker = "キサナ"
# 「いいねぇ、そのヒーローっぷり。惚れちまいそうだ」
line = "「いいねぇ、そのヒーローっぷり。惚れちまいそうだ」"

[[dialogue]]
speaker = "キサナ"
# 「けどアタシのいた世界じゃな……テメエみてえなヤツから死んでくんだよ！」
line = "「けどアタシのいた世界じゃな……テメエみてえなヤツから死んでくんだよ！」"

[[dialogue]]
speaker = "ミア"
# 「っっ……！？　あいつの後ろにモンスターが！」
line = "「っっ……！？　あいつの後ろにモンスターが！」"

[[dialogue]]
speaker = "キサナ"
# 「チッ、ついてねえな……。コイツらぶっ殺してる間に襲われねえとも限らねえし……」
line = "「チッ、ついてねえな……。コイツらぶっ殺してる間に襲われねえとも限らねえし……」"

[[dialogue]]
speaker = "キサナ"
# 「ああもうダリぃ……完全に萎えちまった。モンスターの相手なんざ面倒なだけだしな……」
line = "「ああもうダリぃ……完全に萎えちまった。モンスターの相手なんざ面倒なだけだしな……」"

[[dialogue]]
speaker = "ミア"
# 「えっ……。に、逃げた……？　助かった、の……？」
line = "「えっ……。に、逃げた……？　助かった、の……？」"

[[dialogue]]
speaker = "ミア"
# 「っっ。いえ、まだモンスターが……！　会長さんだってボロボロじゃない……！　私も、はぁはぁ、戦うわ……！」
line = "「っっ。いえ、まだモンスターが……！　会長さんだってボロボロじゃない……！　私も、はぁはぁ、戦うわ……！」"

[[dialogue]]
speaker = "ミア"
# 「庇ってもらったおかげで、うくっっ……！　モンスターを倒すくらいの力は戻ってきたから……！」
line = "「庇ってもらったおかげで、うくっっ……！　モンスターを倒すくらいの力は戻ってきたから……！」"

[[dialogue]]
speaker = "ミア"
# 「会長さんは絶対にやらせない……！　この人を、私のせいで失うわけにはいかないもの……！」
line = "「会長さんは絶対にやらせない……！　この人を、私のせいで失うわけにはいかないもの……！」"
