[[dialogue]]
speaker = "unk"
# 第１０話,第１０話『クラウディア生誕祭』,B
line = "第１０話,第１０話『クラウディア生誕祭』,B"

[[dialogue]]
speaker = "unk"
# ネビュラ基地にて──
line = "ネビュラ基地にて──"

[[dialogue]]
speaker = "クラウディア"
# 「！　こ、これは──一体どういうことだ」
line = "「！　こ、これは──一体どういうことだ」"

[[dialogue]]
speaker = "クラウディア"
# 「カーテンの裏に隠れて、テープやらクラッカーやら……飾り付けの準備まで……」
line = "「カーテンの裏に隠れて、テープやらクラッカーやら……飾り付けの準備まで……」"

[[dialogue]]
speaker = "クラウディア"
# 「それに、こっちには『クラウディアさま　おたんじょうびおめでとうございます』と……」
line = "「それに、こっちには『クラウディアさま　おたんじょうびおめでとうございます』と……」"

[[dialogue]]
speaker = "セドナ"
# 「姫様に見つからぬよう──誕生日パーティーの準備を進めていたのですよ」
line = "「姫様に見つからぬよう──誕生日パーティーの準備を進めていたのですよ」"

[[dialogue]]
speaker = "クラウディア"
# 「な、なんだとー！？」
line = "「な、なんだとー！？」"

[[dialogue]]
speaker = "アイリーン"
# 「あはは……結局バレちゃいましたね」
line = "「あはは……結局バレちゃいましたね」"

[[dialogue]]
speaker = "クラウディア"
# 「アイリーン──お主、まさか」
line = "「アイリーン──お主、まさか」"

[[dialogue]]
speaker = "アイリーン"
# 「はい♪　さっきはとぼけちゃいましたけど──私たちがクラウディア様のお誕生日を忘れるなんてありえません♪」
line = "「はい♪　さっきはとぼけちゃいましたけど──私たちがクラウディア様のお誕生日を忘れるなんてありえません♪」"

[[dialogue]]
speaker = "ウェンディ"
# 「サプライズのつもりで、気取られないようにしていたんです」
line = "「サプライズのつもりで、気取られないようにしていたんです」"

[[dialogue]]
speaker = "ウェンディ"
# 「でも、おかげで最近、寂しい思いをさせてしまっていたかもしれません。ごめんなさい」
line = "「でも、おかげで最近、寂しい思いをさせてしまっていたかもしれません。ごめんなさい」"

[[dialogue]]
speaker = "クラウディア"
# 「そ、そうだったのか……」
line = "「そ、そうだったのか……」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「良かったね、クラウディア様」
line = "「良かったね、クラウディア様」"

[[dialogue]]
speaker = "クラウディア"
# 「うむ……うむ！　お主らも、なかなか粋なはからいをするではないか！」
line = "「うむ……うむ！　お主らも、なかなか粋なはからいをするではないか！」"

[[dialogue]]
speaker = "クラウディア"
# 「よもやこんな準備をしているとは思わなかったぞ！」
line = "「よもやこんな準備をしているとは思わなかったぞ！」"

[[dialogue]]
speaker = "セドナ"
# 「魔女と人間界は交流を始めたばかりです。姫様の誕生日と知れ渡るのは、まだ先になるかと」
line = "「魔女と人間界は交流を始めたばかりです。姫様の誕生日と知れ渡るのは、まだ先になるかと」"

[[dialogue]]
speaker = "セドナ"
# 「ですが──我々にとっては何より記念すべき日であることに変わりありません」
line = "「ですが──我々にとっては何より記念すべき日であることに変わりありません」"

[[dialogue]]
speaker = "セドナ"
# 「姫様がお生まれになってくれたことはもちろん──」
line = "「姫様がお生まれになってくれたことはもちろん──」"

[[dialogue]]
speaker = "セドナ"
# 「数千年に一度となる、光の魔女の生誕……森に残っている魔女たちにとっても同様でしょう」
line = "「数千年に一度となる、光の魔女の生誕……森に残っている魔女たちにとっても同様でしょう」"

[[dialogue]]
speaker = "クラウディア"
# 「みな……忘れていたわけではなかったのだな」
line = "「みな……忘れていたわけではなかったのだな」"

[[dialogue]]
speaker = "クラウディア"
# 「……仕方あるまい。人間界に知らしめるのは、またの機会としよう！」
line = "「……仕方あるまい。人間界に知らしめるのは、またの機会としよう！」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「ふふっ。それじゃ、プレゼント活動はもういい？」
line = "「ふふっ。それじゃ、プレゼント活動はもういい？」"

[[dialogue]]
speaker = "クラウディア"
# 「うむ。あれはあれで楽しかったが……今はお主たちに祝ってもらえれば、満足だ！」
line = "「うむ。あれはあれで楽しかったが……今はお主たちに祝ってもらえれば、満足だ！」"

[[dialogue]]
speaker = "クラウディア"
# 「というわけで早速──な？」
line = "「というわけで早速──な？」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「？　『な？』……って？」
line = "「？　『な？』……って？」"

[[dialogue]]
speaker = "クラウディア"
# 「パーティーの開始に決まっていよう！　見つけてしまったからには、もう２５日までなど待てん！」
line = "「パーティーの開始に決まっていよう！　見つけてしまったからには、もう２５日までなど待てん！」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「ええっ！　もう誕生日パーティーやっちゃうの！？」
line = "「ええっ！　もう誕生日パーティーやっちゃうの！？」"

[[dialogue]]
speaker = "ウェンディ"
# 「ふう……そんなことになると思ってました」
line = "「ふう……そんなことになると思ってました」"

[[dialogue]]
speaker = "セドナ"
# 「だから必死に隠していたのだが……ウェンディ。頼んでいた例のものは大丈夫か？」
line = "「だから必死に隠していたのだが……ウェンディ。頼んでいた例のものは大丈夫か？」"

[[dialogue]]
speaker = "ウェンディ"
# 「はい。予定を前倒しでバースデーケーキを作ってもらうようお願いしておきました。お誕生日の前倒しなんて、聞いたことありませんけど……」
line = "「はい。予定を前倒しでバースデーケーキを作ってもらうようお願いしておきました。お誕生日の前倒しなんて、聞いたことありませんけど……」"

[[dialogue]]
speaker = "セドナ"
# 「ま、姫様らしくていい。今日はお誕生日仕様で姫様を祝うとしよう」
line = "「ま、姫様らしくていい。今日はお誕生日仕様で姫様を祝うとしよう」"

[[dialogue]]
speaker = "クラウディア"
# 「あっはっは！　気分がよいとはこのことだ！」
line = "「あっはっは！　気分がよいとはこのことだ！」"

[[dialogue]]
speaker = "クラウディア"
# 「……待てよ。お誕生日仕様ということは……もしや今日は、野菜を食べずともよいのではないか！？」
line = "「……待てよ。お誕生日仕様ということは……もしや今日は、野菜を食べずともよいのではないか！？」"

[[dialogue]]
speaker = "セドナ"
# 「まあ、今日くらいはいいでしょう」
line = "「まあ、今日くらいはいいでしょう」"

[[dialogue]]
speaker = "クラウディア"
# 「わっはっは！　毎日がお誕生日会だ！　みなの者、プレゼントを用意するがよい！」
line = "「わっはっは！　毎日がお誕生日会だ！　みなの者、プレゼントを用意するがよい！」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「いぇーい！　改めてクラウディア様、誕生日おめでとーう！」
line = "「いぇーい！　改めてクラウディア様、誕生日おめでとーう！」"

[[dialogue]]
speaker = "セドナ"
# 「フッ──たまにはこんな年があっても、悪くないか」
line = "「フッ──たまにはこんな年があっても、悪くないか」"

[[dialogue]]
speaker = "unk"
# クラウディアのフライングバースデーパーティーは、本人が疲れて眠るまで大いに盛り上がるのだった……。
line = "クラウディアのフライングバースデーパーティーは、本人が疲れて眠るまで大いに盛り上がるのだった……。"

[[dialogue]]
speaker = "unk"
# そうして、時は過ぎていき……
line = "そうして、時は過ぎていき……"

[[dialogue]]
speaker = "クラウディア"
# 「んん……むにゃむにゃ……もう朝か……」
line = "「んん……むにゃむにゃ……もう朝か……」"

[[dialogue]]
speaker = "クラウディア"
# 「いつもなら二度寝といきたいところだが……むくっ！　今日は違うぞ」
line = "「いつもなら二度寝といきたいところだが……むくっ！　今日は違うぞ」"

[[dialogue]]
speaker = "unk"
# クラウディアはシャキシャキと立ち上がり、ひとりでパジャマから着替え、顔を洗った。
line = "クラウディアはシャキシャキと立ち上がり、ひとりでパジャマから着替え、顔を洗った。"

[[dialogue]]
speaker = "クラウディア"
# 「──さあ！　いよいよ今日は１２月２５日──余の誕生日当日だ！」
line = "「──さあ！　いよいよ今日は１２月２５日──余の誕生日当日だ！」"

[[dialogue]]
speaker = "クラウディア"
# 「どんな馳走とプレゼントに出会えるか、楽しみだのう！」
line = "「どんな馳走とプレゼントに出会えるか、楽しみだのう！」"

[[dialogue]]
speaker = "クラウディア"
# 「──皆のもの、ご苦労！」
line = "「──皆のもの、ご苦労！」"

[[dialogue]]
speaker = "ウェンディ"
# 「クラウディア様、おはようございます」
line = "「クラウディア様、おはようございます」"

[[dialogue]]
speaker = "アイリーン"
# 「おはようございまーす」
line = "「おはようございまーす」"

[[dialogue]]
speaker = "クラウディア"
# 「……？」
line = "「……？」"

[[dialogue]]
speaker = "クラウディア"
# 「おい、ちぇちゅーりえ。今日もご苦労さんだ！」
line = "「おい、ちぇちゅーりえ。今日もご苦労さんだ！」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「おはよー」
line = "「おはよー」"

[[dialogue]]
speaker = "クラウディア"
# 「……それだけか？」
line = "「……それだけか？」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「あ、お誕生日おめでとうございます──ですね♪　今日も頑張りましょ～」
line = "「あ、お誕生日おめでとうございます──ですね♪　今日も頑張りましょ～」"

[[dialogue]]
speaker = "クラウディア"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "クラウディア"
# 「ど、どういうことだこれは……セドナ！」
line = "「ど、どういうことだこれは……セドナ！」"

[[dialogue]]
speaker = "セドナ"
# 「おはようございます、姫様。今日は早起きですね、よい心がけです」
line = "「おはようございます、姫様。今日は早起きですね、よい心がけです」"

[[dialogue]]
speaker = "クラウディア"
# 「ああ──じゃなくて！　みな、そっけないにも程があるぞ！」
line = "「ああ──じゃなくて！　みな、そっけないにも程があるぞ！」"

[[dialogue]]
speaker = "クラウディア"
# 「今日は余の誕生日であろう！？　<b>たんぷれ</b>はどうした？　ケーキは！？」
line = "「今日は余の誕生日であろう！？　<b>たんぷれ</b>はどうした？　ケーキは！？」"

[[dialogue]]
speaker = "セドナ"
# 「たんぷれ？　誕生日プレゼントのことであれば先日お渡ししたはずですが。ケーキについても同様です」
line = "「たんぷれ？　誕生日プレゼントのことであれば先日お渡ししたはずですが。ケーキについても同様です」"

[[dialogue]]
speaker = "クラウディア"
# 「なぁっ！？」
line = "「なぁっ！？」"

[[dialogue]]
speaker = "クラウディア"
# 「も、もうプレゼントもケーキもないというのか……！？」
line = "「も、もうプレゼントもケーキもないというのか……！？」"

[[dialogue]]
speaker = "セドナ"
# 「もちろん。あれは予定を前倒ししただけですから」
line = "「もちろん。あれは予定を前倒ししただけですから」"

[[dialogue]]
speaker = "セドナ"
# 「ちなみに今日のお昼の献立はナスとほうれん草のソテーです」
line = "「ちなみに今日のお昼の献立はナスとほうれん草のソテーです」"

[[dialogue]]
speaker = "クラウディア"
# 「はーーーーっ！？　あ、ありえぬーーーー！！　余の誕生日にそんな──そんな……がくっ」
line = "「はーーーーっ！？　あ、ありえぬーーーー！！　余の誕生日にそんな──そんな……がくっ」"

[[dialogue]]
speaker = "クラウディア"
# 「しくしく……肝心の誕生日当日に、楽しみがなくなってしまうとは……余としたことが……うう……」
line = "「しくしく……肝心の誕生日当日に、楽しみがなくなってしまうとは……余としたことが……うう……」"

[[dialogue]]
speaker = "クラウディア"
# 「余としたことが何というミスだ。誕生日は、年に一度しか回ってこないというのに……これでは焦って消化してしまったみたいではないか」
line = "「余としたことが何というミスだ。誕生日は、年に一度しか回ってこないというのに……これでは焦って消化してしまったみたいではないか」"

[[dialogue]]
speaker = "アイリーン"
# 「──あ、そうだ。姫様あてにお届け物がありますよ」
line = "「──あ、そうだ。姫様あてにお届け物がありますよ」"

[[dialogue]]
speaker = "セドナ"
# 「うん……？　学園からか？」
line = "「うん……？　学園からか？」"

[[dialogue]]
speaker = "アイリーン"
# 「いえ、それが──私にもよくわからないんですけど、クラウディア様あてのお手紙がたくさん届いているみたいです。ほら」
line = "「いえ、それが──私にもよくわからないんですけど、クラウディア様あてのお手紙がたくさん届いているみたいです。ほら」"

[[dialogue]]
speaker = "クラウディア"
# 「──なんと？」
line = "「──なんと？」"

[[dialogue]]
speaker = "セドナ"
# 「姫様に？」
line = "「姫様に？」"

[[dialogue]]
speaker = "アイリーン"
# 「はい。可愛らしい便せんが何通も……危険性はなさそうですよ」
line = "「はい。可愛らしい便せんが何通も……危険性はなさそうですよ」"

[[dialogue]]
speaker = "クラウディア"
# 「ふむ、よこすがよい！」
line = "「ふむ、よこすがよい！」"

[[dialogue]]
speaker = "クラウディア"
# 「えーと……『ひかりのまじょさまへ　プレゼントをくれてありがとうございます』」
line = "「えーと……『ひかりのまじょさまへ　プレゼントをくれてありがとうございます』」"

[[dialogue]]
speaker = "クラウディア"
# 「こっちは……『おかしおいしかった　またらいねんもきてね　たんじょうびおめでとう！』」
line = "「こっちは……『おかしおいしかった　またらいねんもきてね　たんじょうびおめでとう！』」"

[[dialogue]]
speaker = "クラウディア"
# 「これは──余がプレゼントを配った者たちからの手紙ではないか！」
line = "「これは──余がプレゼントを配った者たちからの手紙ではないか！」"

[[dialogue]]
speaker = "アイリーン"
# 「すごい、クラウディア様、大人気ですね！」
line = "「すごい、クラウディア様、大人気ですね！」"

[[dialogue]]
speaker = "クラウディア"
# 「こっちも……こっちもだ！　皆、お礼とともに余の誕生日を祝福してくれておる」
line = "「こっちも……こっちもだ！　皆、お礼とともに余の誕生日を祝福してくれておる」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「あ、来客もあるみたいだよ」
line = "「あ、来客もあるみたいだよ」"

[[dialogue]]
speaker = "クラウディア"
# 「なぬ？」
line = "「なぬ？」"

[[dialogue]]
speaker = "マトイ"
# 「ごめんくださーい」
line = "「ごめんくださーい」"

[[dialogue]]
speaker = "トワ先生"
# 「うわ、何ここ！？　こんなところあったんだ！」
line = "「うわ、何ここ！？　こんなところあったんだ！」"

[[dialogue]]
speaker = "セーラ"
# 「お邪魔します♪」
line = "「お邪魔します♪」"

[[dialogue]]
speaker = "ユウリ"
# 「基地に入んのは久しぶりだな……」
line = "「基地に入んのは久しぶりだな……」"

[[dialogue]]
speaker = "クラウディア"
# 「ほう。学園の者どもではないか！」
line = "「ほう。学園の者どもではないか！」"

[[dialogue]]
speaker = "クラウディア"
# 「揃ってここへ来るなどどうしたのだ。珍しい者もおるようだが」
line = "「揃ってここへ来るなどどうしたのだ。珍しい者もおるようだが」"

[[dialogue]]
speaker = "マトイ"
# 「何って……ほら、プレゼントもらったから。お返しあげなくちゃと思って」
line = "「何って……ほら、プレゼントもらったから。お返しあげなくちゃと思って」"

[[dialogue]]
speaker = "クラウディア"
# 「なぬ？」
line = "「なぬ？」"

[[dialogue]]
