line = "「１２月２５日──誕生日なんだろ？」"

[[dialogue]]
speaker = "セーラ"
# 「だったらお祝いしなきゃって思って、みんなプレゼント持ってきたんだ♪」
line = "「だったらお祝いしなきゃって思って、みんなプレゼント持ってきたんだ♪」"

[[dialogue]]
speaker = "トワ先生"
# 「ここ来るのは初めてだったけど……最近は学園とも仲いいって聞くし。いいかなって」
line = "「ここ来るのは初めてだったけど……最近は学園とも仲いいって聞くし。いいかなって」"

[[dialogue]]
speaker = "ルリエル"
