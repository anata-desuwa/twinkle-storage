line = "「せっかくだ。今日は皆でクリスマスを祝うとしよう、今の余なら<ruby>快<rt>こころよ</rt></ruby>く受け入れられる気がするぞ！」"

[[dialogue]]
speaker = "セドナ"
# 「仕方ありません。特別に基地の一角の使用を許可します」
line = "「仕方ありません。特別に基地の一角の使用を許可します」"

[[dialogue]]
speaker = "クラウディア"
# 「おお、セドナにしては話がわかるではないか！」
line = "「おお、セドナにしては話がわかるではないか！」"

