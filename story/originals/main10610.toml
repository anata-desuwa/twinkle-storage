line = "「みんなでクラウディアさんのことを考えてプレゼントを選んできましたよ！」"

[[dialogue]]
speaker = "クラウディア"
# 「お、おお……！　お主たち──そうなのか！」
line = "「お、おお……！　お主たち──そうなのか！」"

[[dialogue]]
speaker = "セドナ"
