line = "「うむ……そうだな！　これはこれで、悪くない成果だ」"

[[dialogue]]
speaker = "クラウディア"
# 「なるほど──プレゼントというのは、もらうだけじゃなく、与えるのも楽しいものなのだな！」
line = "「なるほど──プレゼントというのは、もらうだけじゃなく、与えるのも楽しいものなのだな！」"

[[dialogue]]
speaker = "アイリーン"
