[[dialogue]]
speaker = "unk"
# 第３話,世界で１番の幸運（前編）,P
line = "第３話,世界で１番の幸運（前編）,P"

[[dialogue]]
speaker = "unk"
# サチとの付き合いも長くなってきて、俺はよく一緒にトレーニングをするようになっていた――
line = "サチとの付き合いも長くなってきて、俺はよく一緒にトレーニングをするようになっていた――"

[[dialogue]]
speaker = "サチ"
# 「ふぅ……お兄さん、実践組手ありがとうございました。今日は私の負けですね……」
line = "「ふぅ……お兄さん、実践組手ありがとうございました。今日は私の負けですね……」"

[[dialogue]]
speaker = "サチ"
# 「お兄さんは日に日に強くなっていきますね。お兄さんに対しては、私の幸運が相性良くないのもありますけど、格闘戦では敵わなくなってきてます」
line = "「お兄さんは日に日に強くなっていきますね。お兄さんに対しては、私の幸運が相性良くないのもありますけど、格闘戦では敵わなくなってきてます」"

[[dialogue]]
speaker = "unk"
# 星徒会長として強くならないとだし――
line = "星徒会長として強くならないとだし――"

[[dialogue]]
speaker = "サチ"
# 「――私にも先輩らしいところ見せたい？　ふふ、男の意地ってやつですか？　そういうの、私は嫌いじゃないですよ」
line = "「――私にも先輩らしいところ見せたい？　ふふ、男の意地ってやつですか？　そういうの、私は嫌いじゃないですよ」"

[[dialogue]]
speaker = "サチ"
# 「私もお兄さんに負けて、闘志が燃え上って来てますから。附属校の生徒会長として、もっと頑張らないと」
line = "「私もお兄さんに負けて、闘志が燃え上って来てますから。附属校の生徒会長として、もっと頑張らないと」"

[[dialogue]]
speaker = "サチ"
# 「私は、附属最強だけでなく、全ての星騎士の中でも最強を目指していますので」
line = "「私は、附属最強だけでなく、全ての星騎士の中でも最強を目指していますので」"

[[dialogue]]
speaker = "サチ"
# 「だから、ヴィーナスさんや、フィオナさん、お兄さんも、私にとってはライバルなんですからね！」
line = "「だから、ヴィーナスさんや、フィオナさん、お兄さんも、私にとってはライバルなんですからね！」"

[[dialogue]]
speaker = "unk"
# そういうのカッコよくて、俺は好きだな
line = "そういうのカッコよくて、俺は好きだな"

[[dialogue]]
speaker = "サチ"
# 「えっ……す、好きって……」
line = "「えっ……す、好きって……」"

[[dialogue]]
speaker = "施設アナウンス"
# 「施設内を解析開始――」
line = "「施設内を解析開始――」"

[[dialogue]]
speaker = "サチ"
# 「ん？　ああ、自動清掃の時間ですかね？　そしたら、一旦外に出て――」
line = "「ん？　ああ、自動清掃の時間ですかね？　そしたら、一旦外に出て――」"

[[dialogue]]
speaker = "施設アナウンス"
# 「解析終了。施設内に人が残っていないことを確認しました。これよりトレーニング施設内は、自動清掃に入ります。利用可能になるまで、少々外でお待ち下さい。繰り返します――」
line = "「解析終了。施設内に人が残っていないことを確認しました。これよりトレーニング施設内は、自動清掃に入ります。利用可能になるまで、少々外でお待ち下さい。繰り返します――」"

[[dialogue]]
speaker = "サチ"
# 「え！？　いや、中にまだ私達が残ってますよね！？　システムの誤作動じゃ――」
line = "「え！？　いや、中にまだ私達が残ってますよね！？　システムの誤作動じゃ――」"

[[dialogue]]
speaker = "unk"
# 足元の整備用ハッチが突然開いて……！？
line = "足元の整備用ハッチが突然開いて……！？"

[[dialogue]]
speaker = "サチ"
# 「きゃあぁっ！？」
line = "「きゃあぁっ！？」"

[[dialogue]]
speaker = "サチ"
# 「う、うぅ～ん……な、何とか無事っぽいですけど……何か凄く狭い……って」
line = "「う、うぅ～ん……な、何とか無事っぽいですけど……何か凄く狭い……って」"

[[dialogue]]
speaker = "サチ"
# 「ひゃあっ！？　お兄さん、近い近い近い！　またいつもみたいな、密着状態ですか！？」
line = "「ひゃあっ！？　お兄さん、近い近い近い！　またいつもみたいな、密着状態ですか！？」"

[[dialogue]]
speaker = "サチ"
# 「ここ、メンテナンス用のハッチですよね！？　１人でもギリギリ入れるくらいのところに落ちちゃうなんて……」
line = "「ここ、メンテナンス用のハッチですよね！？　１人でもギリギリ入れるくらいのところに落ちちゃうなんて……」"

[[dialogue]]
speaker = "サチ"
# 「もう！　お兄さんと一緒に居ると、どうしてこんなアンラッキーなことばかり起こるんですか……！」
line = "「もう！　お兄さんと一緒に居ると、どうしてこんなアンラッキーなことばかり起こるんですか……！」"

[[dialogue]]
speaker = "unk"
# なんかゴメン……
line = "なんかゴメン……"

[[dialogue]]
speaker = "サチ"
# 「あ……ち、違うんです。私はただ、お兄さんともっと普通に……」
line = "「あ……ち、違うんです。私はただ、お兄さんともっと普通に……」"

[[dialogue]]
speaker = "サチ"
# 「とりあえず、まずはここから脱出しましょう。私の背じゃ届きませんが、お兄さんなら、ハッチの縁に手が届いたりしませんか？」
line = "「とりあえず、まずはここから脱出しましょう。私の背じゃ届きませんが、お兄さんなら、ハッチの縁に手が届いたりしませんか？」"

[[dialogue]]
speaker = "サチ"
# 「頑張ればいけそうですか？　では、お願いします……って、んっ……！」
line = "「頑張ればいけそうですか？　では、お願いします……って、んっ……！」"

[[dialogue]]
speaker = "サチ"
# 「（お、お兄さんが動くと、体が擦れて……お兄さんって一見細く見えますけど、凄く鍛えていて、引き締まった体付きをしているんですよね……）」
line = "「（お、お兄さんが動くと、体が擦れて……お兄さんって一見細く見えますけど、凄く鍛えていて、引き締まった体付きをしているんですよね……）」"

[[dialogue]]
speaker = "サチ"
# 「（それに近いので、男の人の……お兄さんの匂いがします……体を動かしていたので汗をかいてますけど、嫌じゃなくて……むしろ何か胸がドキドキしてきて……）」
line = "「（それに近いので、男の人の……お兄さんの匂いがします……体を動かしていたので汗をかいてますけど、嫌じゃなくて……むしろ何か胸がドキドキしてきて……）」"

[[dialogue]]
speaker = "サチ"
# 「（というか、よく考えるとこれって、お兄さんに抱き締められているような体勢ですよね……そう思ったら、体が熱くなってきちゃう……<emoji=heart04>）」
line = "「（というか、よく考えるとこれって、お兄さんに抱き締められているような体勢ですよね……そう思ったら、体が熱くなってきちゃう……<emoji=heart04>）」"

[[dialogue]]
speaker = "サチ"
# 「あっ、耳にお兄さんの息が当たって……<emoji=heart04>　んっ<emoji=heart04>　耳は敏感な場所で……変な声が出ちゃ――」
line = "「あっ、耳にお兄さんの息が当たって……<emoji=heart04>　んっ<emoji=heart04>　耳は敏感な場所で……変な声が出ちゃ――」"

[[dialogue]]
speaker = "サチ"
# 「ふあぁぁんっ<emoji=heart04>　あ――」
line = "「ふあぁぁんっ<emoji=heart04>　あ――」"

[[dialogue]]
speaker = "サチ"
# 「え、エッチなことは禁止ですっ！」
line = "「え、エッチなことは禁止ですっ！」"

[[dialogue]]
speaker = "unk"
# ごめん、我慢してくれ
line = "ごめん、我慢してくれ"

[[dialogue]]
speaker = "サチ"
# 「えっ、もう少しで手が届きそう？　は、はい！」
line = "「えっ、もう少しで手が届きそう？　は、はい！」"

[[dialogue]]
speaker = "サチ"
# 「（って、ひょっとしてドキドキしてるのって私だけなのでは！？）」
line = "「（って、ひょっとしてドキドキしてるのって私だけなのでは！？）」"

[[dialogue]]
speaker = "サチ"
# 「（思えば、お兄さんはいつもこういう状況になると、真面目に何とか状況を脱しようとしてくれていて……私はいつも、叫んでばかりで……）」
line = "「（思えば、お兄さんはいつもこういう状況になると、真面目に何とか状況を脱しようとしてくれていて……私はいつも、叫んでばかりで……）」"

[[dialogue]]
speaker = "サチ"
# 「（本当は、エッチで変態で悪い子なのは、私……）」
line = "「（本当は、エッチで変態で悪い子なのは、私……）」"

[[dialogue]]
speaker = "サチ"
# 「っ……お兄さん……いつもごめんなさい……」
line = "「っ……お兄さん……いつもごめんなさい……」"

[[dialogue]]
speaker = "unk"
# サチ？　もしかして、泣いてるのか……？
line = "サチ？　もしかして、泣いてるのか……？"

[[dialogue]]
speaker = "プリムラ"
# 「なんじゃ、姿が見当たらんから探しに来てみれば、貴様ら２人して何をしておるのじゃ……またハレンチな……」
line = "「なんじゃ、姿が見当たらんから探しに来てみれば、貴様ら２人して何をしておるのじゃ……またハレンチな……」"

[[dialogue]]
speaker = "サチ"
# 「その声……プリムラ？」
line = "「その声……プリムラ？」"

[[dialogue]]
speaker = "プリムラ"
# 「なに？　我に助けろとな？　後でチョコを献上？　我を馬鹿にしておるのか！　……しかし、眷族の頼みなら仕方あるまい！　感謝するのだぞ！」
line = "「なに？　我に助けろとな？　後でチョコを献上？　我を馬鹿にしておるのか！　……しかし、眷族の頼みなら仕方あるまい！　感謝するのだぞ！」"

[[dialogue]]
speaker = "プリムラ"
# 「ほれ、引っ張り出してやったぞ……って、サチ？　貴様、何を泣いて……」
line = "「ほれ、引っ張り出してやったぞ……って、サチ？　貴様、何を泣いて……」"

[[dialogue]]
speaker = "サチ"
# 「私のせいです……」
line = "「私のせいです……」"

[[dialogue]]
speaker = "サチ"
# 「私がエッチだから、いつもお兄さんに迷惑をかけてたんです。私もう、お兄さんに顔向けできません……！」
line = "「私がエッチだから、いつもお兄さんに迷惑をかけてたんです。私もう、お兄さんに顔向けできません……！」"

[[dialogue]]
speaker = "unk"
# サチ！　一体どうしたっていうんだ……
line = "サチ！　一体どうしたっていうんだ……"

[[dialogue]]
speaker = "プリムラ"
# 「……我には、男女関係のことはよくわからん。ただ、貴様ら２人のことならよくわかる」
line = "「……我には、男女関係のことはよくわからん。ただ、貴様ら２人のことならよくわかる」"

[[dialogue]]
speaker = "プリムラ"
# 「眷族よ、サチが泣いているのは、貴様と何かあったからじゃ」
line = "「眷族よ、サチが泣いているのは、貴様と何かあったからじゃ」"

[[dialogue]]
speaker = "プリムラ"
# 「だから、さっさと追い駆けて、はよ仲直りしてこい！」
line = "「だから、さっさと追い駆けて、はよ仲直りしてこい！」"

[[dialogue]]
speaker = "unk"
# プリムラ……ありがとう！
line = "プリムラ……ありがとう！"

[[dialogue]]
speaker = "プリムラ"
# 「フハハハ！　サチ共々、この借りは後でたっぷり返して貰うからな！　覚悟しておくがよい！」
line = "「フハハハ！　サチ共々、この借りは後でたっぷり返して貰うからな！　覚悟しておくがよい！」"

[[dialogue]]
speaker = "unk"
# プリムラの激励に背中を押されながら、俺はサチの後を追って走り出すのだった。
line = "プリムラの激励に背中を押されながら、俺はサチの後を追って走り出すのだった。"
