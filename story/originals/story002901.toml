[[dialogue]]
speaker = "unk"
# 『<ruby=せいれいさい>星霊祭</ruby>』とは、流星学園と新星学園の合同体育祭だ。
line = "『<ruby>星霊祭<rt>せいれいさい</rt></ruby>』とは、流星学園と新星学園の合同体育祭だ。"

[[dialogue]]
speaker = "unk"
# それぞれの学園に所属する生徒たちは、７日間に渡って、競技と舞闘会でぶつかり合う。
line = "それぞれの学園に所属する生徒たちは、７日間に渡って、競技と舞闘会でぶつかり合う。"

[[dialogue]]
speaker = "unk"
# そんな一大イベントである『星霊祭』の開催まで、あと数日に迫っていた。
line = "そんな一大イベントである『星霊祭』の開催まで、あと数日に迫っていた。"

[[dialogue]]
speaker = "ヒヨ"
# 「えっほ、えっほ。早くゴールを目指さなきゃなぁ」
line = "「えっほ、えっほ。早くゴールを目指さなきゃなぁ」"

[[dialogue]]
speaker = "カティア"
# 「遅ーい！　そんなゆっくり走ってたら抜かれちゃうワン！」
line = "「遅ーい！　そんなゆっくり走ってたら抜かれちゃうワン！」"

[[dialogue]]
speaker = "ヒヨ"
# 「そんなに急かすんじゃねえや。まだ足慣らしでい！」
line = "「そんなに急かすんじゃねえや。まだ足慣らしでい！」"

[[dialogue]]
speaker = "unk"
# 新星学園の敷地内の運動場に行くと、学園対抗リレーの選手に選ばれたカティアとヒヨが走り込みをしていた。
line = "新星学園の敷地内の運動場に行くと、学園対抗リレーの選手に選ばれたカティアとヒヨが走り込みをしていた。"

[[dialogue]]
speaker = "ミルフィー"
# 「あはは、あの２人の練習中って、いつもあんな感じなんだよね……」
line = "「あはは、あの２人の練習中って、いつもあんな感じなんだよね……」"

[[dialogue]]
speaker = "ミルフィー"
# 「リレーって連携が大事だから、あんな風にバチバチしてると、ちょっぴり不安になっちゃうよね」
line = "「リレーって連携が大事だから、あんな風にバチバチしてると、ちょっぴり不安になっちゃうよね」"

[[dialogue]]
speaker = "unk"
# ミルフィーはリレーには参加しないのか？
line = "ミルフィーはリレーには参加しないのか？"

[[dialogue]]
speaker = "ミルフィー"
# 「私は投擲競技が専門だから、リレーと同じ日の槍投げに出場するんだ。まあ、あんまり足も速い方じゃないしね」
line = "「私は投擲競技が専門だから、リレーと同じ日の槍投げに出場するんだ。まあ、あんまり足も速い方じゃないしね」"

[[dialogue]]
speaker = "unk"
# ……なるほど
line = "……なるほど"

[[dialogue]]
speaker = "ミルフィー"
# 「どこ見て納得したの！？　もうっ！」
line = "「どこ見て納得したの！？　もうっ！」"

[[dialogue]]
speaker = "ヒヨ"
# 「おっ、会長サンじゃねえか。何用だい？　まさか、姐さんに手ぇ出しちゃいねぇだろうなあ？」
line = "「おっ、会長サンじゃねえか。何用だい？　まさか、姐さんに手ぇ出しちゃいねぇだろうなあ？」"

[[dialogue]]
speaker = "ミルフィー"
# 「だ、出されてないよ！」
line = "「だ、出されてないよ！」"

[[dialogue]]
speaker = "ミルフィー"
# （ちょっとくらい出してくれてもいいのになーとは思ってるけど……）
line = "（ちょっとくらい出してくれてもいいのになーとは思ってるけど……）"

[[dialogue]]
speaker = "unk"
# ミルフィー？
line = "ミルフィー？"

[[dialogue]]
speaker = "ミルフィー"
# 「う、ううん、何でもないよ、何でも！　あはは……」
line = "「う、ううん、何でもないよ、何でも！　あはは……」"

[[dialogue]]
speaker = "カティア"
# 「よくいらっしゃいました、魔王様！　見ての通り、私とヒヨはリレーの特訓中ですガオ！」
line = "「よくいらっしゃいました、魔王様！　見ての通り、私とヒヨはリレーの特訓中ですガオ！」"

[[dialogue]]
speaker = "カティア"
# 「最終日の『舞闘会』決勝戦に繋げるために、学園対抗リレーは絶対勝ちたいですワン！」
line = "「最終日の『舞闘会』決勝戦に繋げるために、学園対抗リレーは絶対勝ちたいですワン！」"

[[dialogue]]
speaker = "unk"
# 競技と舞闘会は７日間に分けて行われる。
line = "競技と舞闘会は７日間に分けて行われる。"

[[dialogue]]
speaker = "unk"
# 競技は６日目で終了し、『星霊祭』の華である舞闘会決勝戦は最終日の７日目だ。
line = "競技は６日目で終了し、『星霊祭』の華である舞闘会決勝戦は最終日の７日目だ。"

[[dialogue]]
speaker = "ミルフィー"
# 「ここ３年、舞闘会では新星学園が優勝してるんだけど、総合優勝は３年連続で流星学園に負けてて、辛酸を舐めてるんだよね」
line = "「ここ３年、舞闘会では新星学園が優勝してるんだけど、総合優勝は３年連続で流星学園に負けてて、辛酸を舐めてるんだよね」"

[[dialogue]]
speaker = "カティア"
# 「今年こそは私たち、新星学園の完勝で飾りたいです！」
line = "「今年こそは私たち、新星学園の完勝で飾りたいです！」"

[[dialogue]]
speaker = "ヒヨ"
# 「狙ってることは相手サンだって同じさあ。途中の競技もぶっちぎりで勝って、舞闘会の決勝戦でも大勝利って寸法でい」
line = "「狙ってることは相手サンだって同じさあ。途中の競技もぶっちぎりで勝って、舞闘会の決勝戦でも大勝利って寸法でい」"

[[dialogue]]
speaker = "カティア"
# 「流星学園の４連勝なんてさせないですワン！　ふんす！」
line = "「流星学園の４連勝なんてさせないですワン！　ふんす！」"

[[dialogue]]
speaker = "ミルフィー"
# 「うん！　『星霊祭』、絶対勝とうね！」
line = "「うん！　『星霊祭』、絶対勝とうね！」"

[[dialogue]]
speaker = "ヒヨ"
# 「おう、姐さん！　でもよ、ワン公、その服、おめえさんとは相性が悪いんじゃねえのかい？」
line = "「おう、姐さん！　でもよ、ワン公、その服、おめえさんとは相性が悪いんじゃねえのかい？」"

[[dialogue]]
speaker = "カティア"
# 「そ、そんなことないワン！」
line = "「そ、そんなことないワン！」"

[[dialogue]]
speaker = "unk"
# そういえば、いつもの戦闘服じゃないんだね
line = "そういえば、いつもの戦闘服じゃないんだね"

[[dialogue]]
speaker = "カティア"
# 「お気づきでしたか！　はいっ、簡易戦闘服の体操服フォームなんです！」
line = "「お気づきでしたか！　はいっ、簡易戦闘服の体操服フォームなんです！」"

[[dialogue]]
speaker = "unk"
# カティアが着ているのは、自分用の戦闘服を発現させられない星騎士が着用する簡易戦闘服だ。
line = "カティアが着ているのは、自分用の戦闘服を発現させられない星騎士が着用する簡易戦闘服だ。"

[[dialogue]]
speaker = "unk"
# 星霊祭では、競技も各自の戦闘服を着用して参加するのが通例なのだが……
line = "星霊祭では、競技も各自の戦闘服を着用して参加するのが通例なのだが……"

[[dialogue]]
speaker = "カティア"
# 「本当は未熟な星騎士が着るものなんですが……私の場合、いつもの戦闘服だと、星力が戦闘服の維持に使われちゃうので、こっちの方が速いんですワン」
line = "「本当は未熟な星騎士が着るものなんですが……私の場合、いつもの戦闘服だと、星力が戦闘服の維持に使われちゃうので、こっちの方が速いんですワン」"

[[dialogue]]
speaker = "カティア"
# 「でもスピードに自信はあります！　百聞はなんとかです！　魔王様、見ててください……ガオ！」
line = "「でもスピードに自信はあります！　百聞はなんとかです！　魔王様、見ててください……ガオ！」"

[[dialogue]]
speaker = "ミルフィー"
# 「あっ、カティアちゃん！　あんまり調子に乗ると──」
line = "「あっ、カティアちゃん！　あんまり調子に乗ると──」"

[[dialogue]]
speaker = "カティア"
# 「よーい……ドン！」
line = "「よーい……ドン！」"

[[dialogue]]
speaker = "unk"
# 速っ！？
line = "速っ！？"

[[dialogue]]
speaker = "unk"
# 一歩を踏み出したその瞬間から、カティアはトップスピード。あっという間に、あんな遠くに──
line = "一歩を踏み出したその瞬間から、カティアはトップスピード。あっという間に、あんな遠くに──"

[[dialogue]]
speaker = "ミルフィー"
# 「瞬発力は、普段の戦闘服の比じゃなくって、トップスピードは光のごとく！　……なんだけどね」
line = "「瞬発力は、普段の戦闘服の比じゃなくって、トップスピードは光のごとく！　……なんだけどね」"

[[dialogue]]
speaker = "unk"
# なんだけど……？
line = "なんだけど……？"

[[dialogue]]
speaker = "カティア"
# 「ぎゃわーん！」
line = "「ぎゃわーん！」"

[[dialogue]]
speaker = "unk"
# ものすごい勢いのまま、転がるように壁に突っ込んだ。
line = "ものすごい勢いのまま、転がるように壁に突っ込んだ。"

[[dialogue]]
speaker = "カティア"
# 「あいたたた……また転んじゃったガオ……」
line = "「あいたたた……また転んじゃったガオ……」"

[[dialogue]]
speaker = "ヒヨ"
# 「コロコロコロコロと、さっきからなんべん転がってやがんでえ！　達磨だってもっと上手く転がらあ！」
line = "「コロコロコロコロと、さっきからなんべん転がってやがんでえ！　達磨だってもっと上手く転がらあ！」"

[[dialogue]]
speaker = "カティア"
# 「は、走り出した私は、急に止まれないんだワン！」
line = "「は、走り出した私は、急に止まれないんだワン！」"

[[dialogue]]
speaker = "ヒヨ"
# 「犬じゃなくて猪ってことかい？　十二支がひとつ後ろに下がったなあ」
line = "「犬じゃなくて猪ってことかい？　十二支がひとつ後ろに下がったなあ」"

[[dialogue]]
speaker = "カティア"
# 「じゅうにし……？　それ美味しいの？」
line = "「じゅうにし……？　それ美味しいの？」"

[[dialogue]]
speaker = "ヒヨ"
# 「ああ、魔族だからわかんねぇのか。毎年、子、丑、寅、卯、辰、巳、午、未、申、酉、戌、亥って巡っていくのさ」
line = "「ああ、魔族だからわかんねぇのか。毎年、子、丑、寅、卯、辰、巳、午、未、申、酉、戌、亥って巡っていくのさ」"

[[dialogue]]
speaker = "カティア"
# 「なるほど！　犬の次は猪──って、誰が猪だガオ！」
line = "「なるほど！　犬の次は猪──って、誰が猪だガオ！」"

[[dialogue]]
speaker = "ヒヨ"
# 「おめえさんだよ！　文句はちゃんと曲がれるようになってから言いやがれってんだ」
line = "「おめえさんだよ！　文句はちゃんと曲がれるようになってから言いやがれってんだ」"

[[dialogue]]
speaker = "カティア"
# 「ぐぬぬぬぬぬぬー！　言い返せないワン……」
line = "「ぐぬぬぬぬぬぬー！　言い返せないワン……」"

[[dialogue]]
speaker = "ミルフィー"
# 「あはは……ご覧の通り、スピード調整がすごく難しいみたいでね……」
line = "「あはは……ご覧の通り、スピード調整がすごく難しいみたいでね……」"

[[dialogue]]
speaker = "ミルフィー"
# 「まっすぐはまだいいんだけど、カーブが難しいみたい。勢いがつきすぎてバランスが崩れると、派手に転んじゃうんだ……さっきみたいに」
line = "「まっすぐはまだいいんだけど、カーブが難しいみたい。勢いがつきすぎてバランスが崩れると、派手に転んじゃうんだ……さっきみたいに」"

[[dialogue]]
speaker = "ミルフィー"
# 「私は走るの専門じゃないし、加速系の星術が得意なわけでもないからコツも教えられないし……」
line = "「私は走るの専門じゃないし、加速系の星術が得意なわけでもないからコツも教えられないし……」"

[[dialogue]]
speaker = "ミルフィー"
# 「お手伝いしたいのはやまやまなんだけど、体で覚える以外なさそうなんだよね」
line = "「お手伝いしたいのはやまやまなんだけど、体で覚える以外なさそうなんだよね」"

[[dialogue]]
speaker = "ミルフィー"
# 「スパルタになっちゃうけど、反復練習あるのみ、かな。見守ることしかできないのは、ちょっともどかしい──あっ」
line = "「スパルタになっちゃうけど、反復練習あるのみ、かな。見守ることしかできないのは、ちょっともどかしい──あっ」"

[[dialogue]]
speaker = "カティア"
# 「あいたーーー！！」
line = "「あいたーーー！！」"

[[dialogue]]
speaker = "ヒヨ"
# 「また壁に突っ込んでんじゃねえか、ワン公！　ったく、そんなドジがあたしのライバルかと思うと泣けてくらあ」
line = "「また壁に突っ込んでんじゃねえか、ワン公！　ったく、そんなドジがあたしのライバルかと思うと泣けてくらあ」"

[[dialogue]]
speaker = "unk"
# カティアの悲鳴と、ヒヨの叱咤が響く。
line = "カティアの悲鳴と、ヒヨの叱咤が響く。"

[[dialogue]]
speaker = "unk"
# 果たしてカティアは『星霊祭』までにちゃんと走れるようになるのだろうか……？
line = "果たしてカティアは『星霊祭』までにちゃんと走れるようになるのだろうか……？"
