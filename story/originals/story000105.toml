[[dialogue]]
speaker = "マハムート"
# 「戦場において、星騎士が最も重要視するべきなのは、個人の戦闘能力よ」
line = "「戦場において、星騎士が最も重要視するべきなのは、個人の戦闘能力よ」"

[[dialogue]]
speaker = "unk"
# 言ってることが千園寺先輩と真逆！？
line = "言ってることが千園寺先輩と真逆！？"

[[dialogue]]
speaker = "unk"
# バトルウィークが始まって２日目の放課後──昨日の意趣返しということらしく、今日はマムがフニをラルーナに招いていた。
line = "バトルウィークが始まって２日目の放課後──昨日の意趣返しということらしく、今日はマムがフニをラルーナに招いていた。"

[[dialogue]]
speaker = "フェニエル"
# 「え、えっと……マム。お姉様の考えは間違っている……ということでしょうか？」
line = "「え、えっと……マム。お姉様の考えは間違っている……ということでしょうか？」"

[[dialogue]]
speaker = "マハムート"
# 「いいえ、そんなことはないわ。リクリエと戦って行く上で、大きなチームとしての連携力は、確かに重要なものよ」
line = "「いいえ、そんなことはないわ。リクリエと戦って行く上で、大きなチームとしての連携力は、確かに重要なものよ」"

[[dialogue]]
speaker = "マハムート"
# 「だけど……星力を持ち、星騎士になれる者は非常に限られているわ」
line = "「だけど……星力を持ち、星騎士になれる者は非常に限られているわ」"

[[dialogue]]
speaker = "フェニエル"
# 「あ……」
line = "「あ……」"

[[dialogue]]
speaker = "マハムート"
# 「流星市国周辺でこそ、モンスターの巣であるアステライトには、精鋭である星徒会メンバーが攻略にあたることになっている」
line = "「流星市国周辺でこそ、モンスターの巣であるアステライトには、精鋭である星徒会メンバーが攻略にあたることになっている」"

[[dialogue]]
speaker = "マハムート"
# 「けれど、考えてもみなさい。もし、その場に星力を持つ者が、自分１人しかいなかったとしたら？」
line = "「けれど、考えてもみなさい。もし、その場に星力を持つ者が、自分１人しかいなかったとしたら？」"

[[dialogue]]
speaker = "マハムート"
# 「仲間はいない。助けも呼べない。なのに、モンスターはアステラから湧き出てくる――そんな絶望的な状況よ」
line = "「仲間はいない。助けも呼べない。なのに、モンスターはアステラから湧き出てくる――そんな絶望的な状況よ」"

[[dialogue]]
speaker = "フェニエル"
# 「も、もちろん、巣を壊すために、アステラに突入しますっ。なまら怖いっ、ですけど……」
line = "「も、もちろん、巣を壊すために、アステラに突入しますっ。なまら怖いっ、ですけど……」"

[[dialogue]]
speaker = "マハムート"
# 「そう、あなたはいい子ね。フニ」
line = "「そう、あなたはいい子ね。フニ」"

[[dialogue]]
speaker = "マハムート"
# 「……でも、もしそういう状況になっても、<b>今の</b>あなたの実力のままなら、迷わず逃げなさい」
line = "「……でも、もしそういう状況になっても、<b>今の</b>あなたの実力のままなら、迷わず逃げなさい」"

[[dialogue]]
speaker = "マハムート"
# 「救援要請に３日かかっても、１ヵ月かかってでも、別の星騎士を呼びに行くべきよ。一刻も早くね」
line = "「救援要請に３日かかっても、１ヵ月かかってでも、別の星騎士を呼びに行くべきよ。一刻も早くね」"

[[dialogue]]
speaker = "フェニエル"
# 「は、はい……」
line = "「は、はい……」"

[[dialogue]]
speaker = "マハムート"
# 「だけど……そうも言ってられない状況というのは、いつか必ずやってくる。世界を滅ぼすような厄災が迫りつつある今、決して逃げられない戦いの時がね」
line = "「だけど……そうも言ってられない状況というのは、いつか必ずやってくる。世界を滅ぼすような厄災が迫りつつある今、決して逃げられない戦いの時がね」"

[[dialogue]]
speaker = "マハムート"
# 「だからこそ、星騎士には一騎当千の戦闘能力が求められるの」
line = "「だからこそ、星騎士には一騎当千の戦闘能力が求められるの」"

[[dialogue]]
speaker = "マハムート"
# 「流星市国は、リクリエの特異点と呼ばれているわ。アステラの発生も、モンスターの出現も、その他の地域の１００倍はゆうに超えているはずよ」
line = "「流星市国は、リクリエの特異点と呼ばれているわ。アステラの発生も、モンスターの出現も、その他の地域の１００倍はゆうに超えているはずよ」"

[[dialogue]]
speaker = "マハムート"
# 「でもね……その他の地域、例えば星騎士の支援がほとんど及ばない魔界にだって、モンスターは現れるの」
line = "「でもね……その他の地域、例えば星騎士の支援がほとんど及ばない魔界にだって、モンスターは現れるの」"

[[dialogue]]
speaker = "マハムート"
# 「私は魔界にある古い一族の出身で、私たち一族はその一帯の安全を司っているわ」
line = "「私は魔界にある古い一族の出身で、私たち一族はその一帯の安全を司っているわ」"

[[dialogue]]
speaker = "マハムート"
# 「──だから、妃竜院家の者には、たった１人で数千万人の命を守る使命があるの」
line = "「──だから、妃竜院家の者には、たった１人で数千万人の命を守る使命があるの」"

[[dialogue]]
speaker = "マハムート"
# 「そしてその使命は、あらゆる星騎士の元に、ある日突然降りかかってくる可能性がある」
line = "「そしてその使命は、あらゆる星騎士の元に、ある日突然降りかかってくる可能性がある」"

[[dialogue]]
speaker = "マハムート"
# 「だから私は、<ruby=ラルーナ>自分の寮</ruby>生には厳しいわよ」
line = "「だから私は、<ruby>自分の寮<rt>ラルーナ</rt></ruby>生には厳しいわよ」"

[[dialogue]]
speaker = "マハムート"
# 「私の元で鍛える以上、全員が一騎当千の力を望むわ。才能のある無しなんて関係ない」
line = "「私の元で鍛える以上、全員が一騎当千の力を望むわ。才能のある無しなんて関係ない」"

[[dialogue]]
speaker = "マハムート"
# 「強くなりたいと本気で望めば、守護星は応えてくれるものなのよ」
line = "「強くなりたいと本気で望めば、守護星は応えてくれるものなのよ」"

[[dialogue]]
speaker = "マハムート"
# 「事実、私はそうして、どこまでも強く成長し続ける奴を１人知っている。……凄く生意気だけどね」
line = "「事実、私はそうして、どこまでも強く成長し続ける奴を１人知っている。……凄く生意気だけどね」"

[[dialogue]]
speaker = "マハムート"
# 「そういうわけでフニ、あなたも心しておくことね。もしこの寮に編入されるようなことがあったら、その時は私の手でビシバシしごいてやるから」
line = "「そういうわけでフニ、あなたも心しておくことね。もしこの寮に編入されるようなことがあったら、その時は私の手でビシバシしごいてやるから」"

[[dialogue]]
speaker = "フェニエル"
# 「いえすっ、マムっ！」
line = "「いえすっ、マムっ！」"

[[dialogue]]
speaker = "フェニエル"
# 「あっ、いえっ！　お、お姉様とイルソーレは、決して負けません……っ」
line = "「あっ、いえっ！　お、お姉様とイルソーレは、決して負けません……っ」"

[[dialogue]]
speaker = "フェニエル"
# 「でも……戦いの心構え、のようなものは……少しだけですが、わかった気がします」
line = "「でも……戦いの心構え、のようなものは……少しだけですが、わかった気がします」"

[[dialogue]]
speaker = "フェニエル"
# 「ご教授いただき、ありがとうございます。マム」
line = "「ご教授いただき、ありがとうございます。マム」"

[[dialogue]]
speaker = "マハムート"
# 「あら、あなたは何を言っているのかしら？　私は敵に塩を送るような真似、した覚えはないのだけれど？」
line = "「あら、あなたは何を言っているのかしら？　私は敵に塩を送るような真似、した覚えはないのだけれど？」"

[[dialogue]]
speaker = "マハムート"
# 「ただ、ラルーナに来たらイジメてやるから、覚悟なさいと言っただけよ。変な勘違いをしてないで、畏怖をもって跪きなさい」
line = "「ただ、ラルーナに来たらイジメてやるから、覚悟なさいと言っただけよ。変な勘違いをしてないで、畏怖をもって跪きなさい」"

[[dialogue]]
speaker = "フェニエル"
# 「？　……マムはとても優しい人、だと思います」
line = "「？　……マムはとても優しい人、だと思います」"

[[dialogue]]
speaker = "マハムート"
# 「やれやれ、困った子ね。会長からもちゃんと、この子に警戒心を身に着けるように言ってやって頂戴」
line = "「やれやれ、困った子ね。会長からもちゃんと、この子に警戒心を身に着けるように言ってやって頂戴」"

[[dialogue]]
speaker = "unk"
# マムは優しくていい人ですよ
line = "マムは優しくていい人ですよ"

[[dialogue]]
speaker = "マハムート"
# 「なっ……！？　あなたね……！」
line = "「なっ……！？　あなたね……！」"

[[dialogue]]
speaker = "フェニエル"
# 「あれ？　マムのお顔、少し赤くなっていますか……？」
line = "「あれ？　マムのお顔、少し赤くなっていますか……？」"

[[dialogue]]
speaker = "マハムート"
# 「っ……ふっ……ふふふふっ……会長？　年長者を恥ずかしがらせて悦に浸るとは、どうやら躾が足りてなかったようね……？」
line = "「っ……ふっ……ふふふふっ……会長？　年長者を恥ずかしがらせて悦に浸るとは、どうやら躾が足りてなかったようね……？」"

[[dialogue]]
speaker = "マハムート"
# 「――八つ当たりは大人げないですって？　ええい、問答無用よ！　私のけん玉で百叩きにしてあげるから、そこに直りなさい！」
line = "「――八つ当たりは大人げないですって？　ええい、問答無用よ！　私のけん玉で百叩きにしてあげるから、そこに直りなさい！」"

[[dialogue]]
speaker = "unk"
# ちょっ、それっておもちゃの方ですよね！？
line = "ちょっ、それっておもちゃの方ですよね！？"

[[dialogue]]
speaker = "マハムート"
# 「――変身後の武器だったら死んじゃう？　大丈夫よ、星力を集中させてガードすれば、ギリギリ死なないわ」
line = "「――変身後の武器だったら死んじゃう？　大丈夫よ、星力を集中させてガードすれば、ギリギリ死なないわ」"

[[dialogue]]
speaker = "フェニエル"
# 「なるほどですっ。こうやって日頃から、マムは寮生を鍛えてくれてるんですね……っ」
line = "「なるほどですっ。こうやって日頃から、マムは寮生を鍛えてくれてるんですね……っ」"

[[dialogue]]
speaker = "unk"
# やめてフニ！　これ以上マムを煽らないで！
line = "やめてフニ！　これ以上マムを煽らないで！"

[[dialogue]]
speaker = "マハムート"
# 「ふっ……ふふふふふ………」
line = "「ふっ……ふふふふふ………」"

[[dialogue]]
speaker = "マハムート"
# 「メテオインパクトォーーーッ！！！」
line = "「メテオインパクトォーーーッ！！！」"

[[dialogue]]
speaker = "unk"
# ちょっ、やめっ……アッーーーーーー！！！
line = "ちょっ、やめっ……アッーーーーーー！！！"

[[dialogue]]
speaker = "unk"
# そうして、突然始まったマム直々のしごきを、俺は必死に受けることになるのだった。
line = "そうして、突然始まったマム直々のしごきを、俺は必死に受けることになるのだった。"

[[dialogue]]
speaker = "unk"
# ──いやこれ、並みの星騎士が喰らったら死ぬけど！？　やっぱりマムは普通に怖い！
line = "──いやこれ、並みの星騎士が喰らったら死ぬけど！？　やっぱりマムは普通に怖い！"
