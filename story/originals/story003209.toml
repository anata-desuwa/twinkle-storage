[[dialogue]]
speaker = "unk"
# 俺たちの背後には固く閉ざされた扉があり、正面にはうっとりと甘い笑みを浮かべたウルスラがいる。
line = "俺たちの背後には固く閉ざされた扉があり、正面にはうっとりと甘い笑みを浮かべたウルスラがいる。"

[[dialogue]]
speaker = "unk"
# 逃げ場はない。
line = "逃げ場はない。"

[[dialogue]]
speaker = "ウルスラ"
# 「ふふ、イレーナさん、会長さん。お覚悟を<emoji=heart04>」
line = "「ふふ、イレーナさん、会長さん。お覚悟を<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
# 「はぁっ、はっ、はふぅん……<emoji=heart04>　追い詰めちゃいました……<emoji=heart04>」
line = "「はぁっ、はっ、はふぅん……<emoji=heart04>　追い詰めちゃいました……<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
# 「くっ……万事休すね……」
line = "「くっ……万事休すね……」"

[[dialogue]]
speaker = "ウルスラ"
# 「そんな怖い顔をしないでください。せっかくの綺麗な顔が台無しになってしまいます」
line = "「そんな怖い顔をしないでください。せっかくの綺麗な顔が台無しになってしまいます」"

[[dialogue]]
speaker = "シャロン"
# 「イレーナさま、別に痛い想いをするわけではないんですよ？」
line = "「イレーナさま、別に痛い想いをするわけではないんですよ？」"

[[dialogue]]
speaker = "ウルスラ"
# 「そう。ただ、自分の想いに、素直になるだけ」
line = "「そう。ただ、自分の想いに、素直になるだけ」"

[[dialogue]]
speaker = "ウルスラ"
# 「身にまとう衣服を脱ぎ捨てて生まれたままの姿になるように……胸に秘めた想いを表に解き放つだけ……<emoji=heart04>」
line = "「身にまとう衣服を脱ぎ捨てて生まれたままの姿になるように……胸に秘めた想いを表に解き放つだけ……<emoji=heart04>」"

[[dialogue]]
speaker = "ウルスラ"
# 「得られるのは圧倒的な解放感……<emoji=heart04>　それって、と～～っても気持ちいいんですよ<emoji=heart04>」
line = "「得られるのは圧倒的な解放感……<emoji=heart04>　それって、と～～っても気持ちいいんですよ<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
# 「ふざけんなっ！　心を丸裸にさせられるなんて、ヌードになるよりよっぽどひどい辱めだわ！」
line = "「ふざけんなっ！　心を丸裸にさせられるなんて、ヌードになるよりよっぽどひどい辱めだわ！」"

[[dialogue]]
speaker = "unk"
# つまり矢に撃たれるくらいなら脱ぐと……？
line = "つまり矢に撃たれるくらいなら脱ぐと……？"

[[dialogue]]
speaker = "イレーナ"
# 「今あんた変な想像したでしょ？　後でボコすわよ？」
line = "「今あんた変な想像したでしょ？　後でボコすわよ？」"

[[dialogue]]
speaker = "シャロン"
# 「イ、イレーナさまのヌードっ……！？　そ、そんなの、想像しただけで……ぶふぅっ！」
line = "「イ、イレーナさまのヌードっ……！？　そ、そんなの、想像しただけで……ぶふぅっ！」"

[[dialogue]]
speaker = "イレーナ"
# 「シャロンまで何考えてんのよ！？」
line = "「シャロンまで何考えてんのよ！？」"

[[dialogue]]
speaker = "ウルスラ"
# 「あら……シャロンさんには刺激が強すぎたのでしょうか……妄想だけで鼻血を噴いて倒れてしまいました」
line = "「あら……シャロンさんには刺激が強すぎたのでしょうか……妄想だけで鼻血を噴いて倒れてしまいました」"

[[dialogue]]
speaker = "ウルスラ"
# 「ああ……見たいです。見せてください、全てのヴェールを取り払ったイレーナさんの想い……<emoji=heart04>」
line = "「ああ……見たいです。見せてください、全てのヴェールを取り払ったイレーナさんの想い……<emoji=heart04>」"

[[dialogue]]
speaker = "ウルスラ"
# 「秘めた想いをさらけ出し、愛欲に溺れるあなたの姿を一目……<emoji=heart04>」
line = "「秘めた想いをさらけ出し、愛欲に溺れるあなたの姿を一目……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# やらせないっ！
line = "やらせないっ！"

[[dialogue]]
speaker = "イレーナ"
# 「あんた……！」
line = "「あんた……！」"

[[dialogue]]
speaker = "ウルスラ"
# 「まあ、今度は会長さんが盾になって……困りました。バレンタインは女性からチョコを渡すのがしきたり。今は会長さんを撃つわけにはいきません」
line = "「まあ、今度は会長さんが盾になって……困りました。バレンタインは女性からチョコを渡すのがしきたり。今は会長さんを撃つわけにはいきません」"

[[dialogue]]
speaker = "unk"
# なら諦めて、俺たちをここから出せ！
line = "なら諦めて、俺たちをここから出せ！"

[[dialogue]]
speaker = "ウルスラ"
# 「それで言うことを聞くなら、最初からこんなことしていませんよ」
line = "「それで言うことを聞くなら、最初からこんなことしていませんよ」"

[[dialogue]]
speaker = "ウルスラ"
# 「ねえ、会長さん？」
line = "「ねえ、会長さん？」"

[[dialogue]]
speaker = "ウルスラ"
# 「感情を丸裸にしたイレーナさんが、頬を赤らめてチョコを手渡す姿……見たくはないですか？」
line = "「感情を丸裸にしたイレーナさんが、頬を赤らめてチョコを手渡す姿……見たくはないですか？」"

[[dialogue]]
speaker = "シャロン"
# 「見たいです！！」
line = "「見たいです！！」"

[[dialogue]]
speaker = "シャロン"
# 「バタッ」
line = "「バタッ」"

[[dialogue]]
speaker = "イレーナ"
# 「また倒れた！？　倒れるか倒れないのかどっちかにしなさい！」
line = "「また倒れた！？　倒れるか倒れないのかどっちかにしなさい！」"

[[dialogue]]
speaker = "イレーナ"
# 「ふざけないで！　あたしは絶対そんな風にならないから！　会長もウルスラの言うことなんか聞いちゃダメよ！」
line = "「ふざけないで！　あたしは絶対そんな風にならないから！　会長もウルスラの言うことなんか聞いちゃダメよ！」"

[[dialogue]]
speaker = "ウルスラ"
# 「ほら、想像してみてください。チョコレートのように甘～いイレーナさんを」
line = "「ほら、想像してみてください。チョコレートのように甘～いイレーナさんを」"

[[dialogue]]
speaker = "イレーナ"
# 「これ……バレンタインのチョコ、あげる」
line = "「これ……バレンタインのチョコ、あげる」"

[[dialogue]]
speaker = "イレーナ"
# 「会長さんのこと、ずっと好きだったの……<emoji=heart04>」
line = "「会長さんのこと、ずっと好きだったの……<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
# 「えへへ、だ～い好き<emoji=heart04>」
line = "「えへへ、だ～い好き<emoji=heart04>」"

[[dialogue]]
speaker = "ウルスラ"
# 「どうです会長さん？　甘～く気持ちを告白するイレーナさん、見たくないですか？」
line = "「どうです会長さん？　甘～く気持ちを告白するイレーナさん、見たくないですか？」"

[[dialogue]]
speaker = "unk"
# 見たい！
line = "見たい！"

[[dialogue]]
speaker = "イレーナ"
# 「ちょっ、あんた！？」
line = "「ちょっ、あんた！？」"

[[dialogue]]
speaker = "unk"
# でも素直になれないイレーナが一番可愛い！！
line = "でも素直になれないイレーナが一番可愛い！！"

[[dialogue]]
speaker = "イレーナ"
# 「はぁっ！？　い、いきなり何を！？」
line = "「はぁっ！？　い、いきなり何を！？」"

[[dialogue]]
speaker = "ウルスラ"
# 「くっ……この揺らぎは……！？　会長さんから迸るバレンタインの波動が私に干渉している……！？」
line = "「くっ……この揺らぎは……！？　会長さんから迸るバレンタインの波動が私に干渉している……！？」"

[[dialogue]]
speaker = "イレーナ"
# 「どういうこと！？　言ってる意味が何ひとつわかんないんだけど！？」
line = "「どういうこと！？　言ってる意味が何ひとつわかんないんだけど！？」"

[[dialogue]]
speaker = "イレーナ"
# 「でも今なら……それっ！」
line = "「でも今なら……それっ！」"

[[dialogue]]
speaker = "ウルスラ"
# 「きゃあぁぁぁっ！？　私のバレンタインの波動が、弱まっている……！？」
line = "「きゃあぁぁぁっ！？　私のバレンタインの波動が、弱まっている……！？」"

[[dialogue]]
speaker = "イレーナ"
# 「やっぱり！　バレンタインの無敵効果も弱くなってる！　攻撃が通るわ！」
line = "「やっぱり！　バレンタインの無敵効果も弱くなってる！　攻撃が通るわ！」"

[[dialogue]]
speaker = "unk"
# イレーナは素直じゃないところがいい！
line = "イレーナは素直じゃないところがいい！"

[[dialogue]]
speaker = "イレーナ"
# 「～～～っ！！　何かムカつくから後でボコすの決定！　でもその前に！」
line = "「～～～っ！！　何かムカつくから後でボコすの決定！　でもその前に！」"

[[dialogue]]
speaker = "イレーナ"
# 「あたしとあんたの力、あのバレンタインモンスターに見せつけてやるわよ！」
line = "「あたしとあんたの力、あのバレンタインモンスターに見せつけてやるわよ！」"
