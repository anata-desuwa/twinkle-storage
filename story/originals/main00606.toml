[[dialogue]]
speaker = "unk"
# 第８話,ディザスター・ハンド,B
line = "第８話,ディザスター・ハンド,B"

[[dialogue]]
speaker = "アポロ"
# 「っっっ──！！」
line = "「っっっ──！！」"

[[dialogue]]
speaker = "クロト"
# （星術じゃない──別種の力──）
line = "（星術じゃない──別種の力──）"

[[dialogue]]
speaker = "アナ"
# （──まさか）
line = "（──まさか）"

[[dialogue]]
speaker = "アイリーン"
# 「はあ、はあ……今度こそ！」
line = "「はあ、はあ……今度こそ！」"

[[dialogue]]
speaker = "セドナ"
# 「ご苦労」
line = "「ご苦労」"

[[dialogue]]
speaker = "unk"
# 謎の新勢力の力も借りて、ついにアポロを追い詰めた俺たち。
line = "謎の新勢力の力も借りて、ついにアポロを追い詰めた俺たち。"

[[dialogue]]
speaker = "unk"
# 何度も邪魔をしてきたギエルも今度ばかりは伸びており、もはや邪魔は入らない。
line = "何度も邪魔をしてきたギエルも今度ばかりは伸びており、もはや邪魔は入らない。"

[[dialogue]]
speaker = "ネビュラ隊員Ａ"
# 「射撃用意──！」
line = "「射撃用意──！」"

[[dialogue]]
speaker = "unk"
# 彼女たちは一糸乱れぬ隊列で、それぞれが独特な銃を構えた。
line = "彼女たちは一糸乱れぬ隊列で、それぞれが独特な銃を構えた。"

[[dialogue]]
speaker = "unk"
# 完膚なきまでに無力化する気だ。
line = "完膚なきまでに無力化する気だ。"

[[dialogue]]
speaker = "エリシア"
# 「──姉さん……！」
line = "「──姉さん……！」"

[[dialogue]]
speaker = "クロト"
# 「っ……待ってください！　あれは、彼女の姉の姿をしていて──！」
line = "「っ……待ってください！　あれは、彼女の姉の姿をしていて──！」"

[[dialogue]]
speaker = "セドナ"
# 「悪いがかける情けはない。やれ」
line = "「悪いがかける情けはない。やれ」"

[[dialogue]]
speaker = "ネビュラ隊員Ｂ"
# 「は──！！」
line = "「は──！！」"

[[dialogue]]
speaker = "エリシア"
# 「っ……！」
line = "「っ……！」"

[[dialogue]]
speaker = "unk"
# エリシアは彼女たちを止めることなく、ただ黙して目をつむった。
line = "エリシアは彼女たちを止めることなく、ただ黙して目をつむった。"

[[dialogue]]
speaker = "unk"
# たとえ姉の姿かたちをしているとしても、世界の脅威として打倒されるのは仕方ないと……
line = "たとえ姉の姿かたちをしているとしても、世界の脅威として打倒されるのは仕方ないと……"

[[dialogue]]
speaker = "unk"
# ──だが。
line = "──だが。"

[[dialogue]]
speaker = "ネビュラ隊員Ａ"
# 「え……？」
line = "「え……？」"

[[dialogue]]
speaker = "ネビュラ隊員Ｂ"
# 「も……目標、増加……？」
line = "「も……目標、増加……？」"

[[dialogue]]
speaker = "unk"
# 彼女らの一斉掃射は阻まれていた。
line = "彼女らの一斉掃射は阻まれていた。"

[[dialogue]]
speaker = "unk"
# 現れた謎の存在が、気を失ったアポロに屋根を作っている。
line = "現れた謎の存在が、気を失ったアポロに屋根を作っている。"

[[dialogue]]
speaker = "ネビュラ隊員Ａ"
# 「な……なんでしょう、アレは……」
line = "「な……なんでしょう、アレは……」"

[[dialogue]]
speaker = "アイリーン"
# 「手……？　のように、見えますが……？」
line = "「手……？　のように、見えますが……？」"

[[dialogue]]
speaker = "セドナ"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# そう。それは<b>手</b>だった。
line = "そう。それは<b>手</b>だった。"

[[dialogue]]
speaker = "unk"
# 他に表現のしようもない、ただ途方もない大きさをしているだけの、手。
line = "他に表現のしようもない、ただ途方もない大きさをしているだけの、手。"

[[dialogue]]
speaker = "unk"
# それが、ゆっくりと、アポロを守るように包んでいる。
line = "それが、ゆっくりと、アポロを守るように包んでいる。"

[[dialogue]]
speaker = "アポロ"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# 当のアポロはまるで揺り籠にでも揺られているかのようだ。
line = "当のアポロはまるで揺り籠にでも揺られているかのようだ。"

[[dialogue]]
speaker = "unk"
# 意識を失った彼女の寝顔は、年相応の無垢な少女にしか見えない。
line = "意識を失った彼女の寝顔は、年相応の無垢な少女にしか見えない。"

[[dialogue]]
speaker = "エリシア"
# 「姉、さん……？」
line = "「姉、さん……？」"

[[dialogue]]
speaker = "unk"
# ふらりとエリシアが彼女を呼ぶ。
line = "ふらりとエリシアが彼女を呼ぶ。"

[[dialogue]]
speaker = "unk"
# すると手が中指を弾いた。
line = "すると手が中指を弾いた。"

[[dialogue]]
speaker = "unk"
# いわゆる、デコピンだ。
line = "いわゆる、デコピンだ。"

[[dialogue]]
speaker = "unk"
# すると──
line = "すると──"

[[dialogue]]
speaker = "セドナ"
# 「っ──」
line = "「っ──」"

[[dialogue]]
speaker = "アイリーン"
# 「なっ──くあっ！？」
line = "「なっ──くあっ！？」"

[[dialogue]]
speaker = "エリシア"
# 「っっっ────！！」
line = "「っっっ────！！」"

[[dialogue]]
speaker = "ニャリオン"
# 「エリシア嬢っ──！！」
line = "「エリシア嬢っ──！！」"

[[dialogue]]
speaker = "unk"
# 直撃を受けたエリシアは、その颶風により遥か彼方まで吹き飛ばされる。
line = "直撃を受けたエリシアは、その颶風により遥か彼方まで吹き飛ばされる。"

[[dialogue]]
speaker = "unk"
# 余波を受けた俺たちや新手の彼女たちさえ、あわや地割れに飲まれかねなかった。
line = "余波を受けた俺たちや新手の彼女たちさえ、あわや地割れに飲まれかねなかった。"

[[dialogue]]
speaker = "ユウリ"
# 「フィオナばっかり、狙われすぎだろ──！！」
line = "「フィオナばっかり、狙われすぎだろ──！！」"

[[dialogue]]
speaker = "エリシア"
# 「ユウリッ──」
line = "「ユウリッ──」"

[[dialogue]]
speaker = "unk"
# 飛び出したユウリがエリシアをかばうように盾を展開する。
line = "飛び出したユウリがエリシアをかばうように盾を展開する。"

[[dialogue]]
speaker = "unk"
# だが……手はそれ以上の追撃をしてこなかった。
line = "だが……手はそれ以上の追撃をしてこなかった。"

[[dialogue]]
speaker = "unk"
# ただ、気絶したアポロを優しく乗せて……
line = "ただ、気絶したアポロを優しく乗せて……"

[[dialogue]]
speaker = "ギエル"
# 「ぐ……ふっ。さあ……一度、引きましょうか……アポロ、様」
line = "「ぐ……ふっ。さあ……一度、引きましょうか……アポロ、様」"

[[dialogue]]
speaker = "アポロ"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# 起き上がったギエルもそれに乗り、手は夜空へと上昇していった。
line = "起き上がったギエルもそれに乗り、手は夜空へと上昇していった。"

[[dialogue]]
speaker = "ネビュラ隊員Ｂ"
# 「逃げます！」
line = "「逃げます！」"

[[dialogue]]
speaker = "セドナ"
# 「狙え」
line = "「狙え」"

[[dialogue]]
speaker = "アイリーン"
# 「掃射──！」
line = "「掃射──！」"

[[dialogue]]
speaker = "unk"
# 黒色の弾幕が謎の手に吸い込まれていくも止まらない。
line = "黒色の弾幕が謎の手に吸い込まれていくも止まらない。"

[[dialogue]]
speaker = "unk"
# 眠りについたアポロと共に、星空の彼方へと消え去っていって……
line = "眠りについたアポロと共に、星空の彼方へと消え去っていって……"

[[dialogue]]
speaker = "エリシア"
# 「フィオナ──姉さああああああんっっ！！！」
line = "「フィオナ──姉さああああああんっっ！！！」"

[[dialogue]]
speaker = "unk"
# 決死のその叫びだけが、いつまでも夜空に木霊していた。
line = "決死のその叫びだけが、いつまでも夜空に木霊していた。"

[[dialogue]]
speaker = "クロト"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# だが……なぜなのだろう。
line = "だが……なぜなのだろう。"

[[dialogue]]
speaker = "unk"
# エリシアがフィオナと呼んだ彼女と。
line = "エリシアがフィオナと呼んだ彼女と。"

[[dialogue]]
speaker = "unk"
# あの、恐ろしくも巨大な掌を見ていると……
line = "あの、恐ろしくも巨大な掌を見ていると……"

[[dialogue]]
speaker = "unk"
# 言いようのない寂しさが、胸の奥深くまで去来していた。
line = "言いようのない寂しさが、胸の奥深くまで去来していた。"
