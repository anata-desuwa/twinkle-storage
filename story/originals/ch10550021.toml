[[dialogue]]
speaker = "unk"
# 第１話,２人の恋の始まり,P
line = "第１話,２人の恋の始まり,P"

[[dialogue]]
speaker = "エルデリーゼ"
# 「ふふ、ようやくお待ちかねのお昼です。会長様は今日は何にしますの？」
line = "「ふふ、ようやくお待ちかねのお昼です。会長様は今日は何にしますの？」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「私はパスタの気分ですわ。カルボナーラにしようと思いますの♪」
line = "「私はパスタの気分ですわ。カルボナーラにしようと思いますの♪」"

[[dialogue]]
speaker = "unk"
# そうだな……じゃあ俺は──
line = "そうだな……じゃあ俺は──"

[[dialogue]]
speaker = "アム"
# 「見つけた。まーた２人でお昼を食べてるの？」
line = "「見つけた。まーた２人でお昼を食べてるの？」"

[[dialogue]]
speaker = "アム"
# 「冷たいじゃん、今までは一緒にお昼ごはんを食べることも多かったのに、最近は会長とばかり一緒で」
line = "「冷たいじゃん、今までは一緒にお昼ごはんを食べることも多かったのに、最近は会長とばかり一緒で」"

[[dialogue]]
speaker = "アム"
# 「お昼ごはんだけじゃないよ。放課後も会長とばっかり過ごしてるでしょ？　どうなってるの！」
line = "「お昼ごはんだけじゃないよ。放課後も会長とばっかり過ごしてるでしょ？　どうなってるの！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「そ、そんなことはありませんのよ。気のせいじゃありませんか？」
line = "「そ、そんなことはありませんのよ。気のせいじゃありませんか？」"

[[dialogue]]
speaker = "アム"
# 「エルゼ……何かあたしに隠してることがあるよね？」
line = "「エルゼ……何かあたしに隠してることがあるよね？」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「か、隠し事なんて……ありませんわよ……」
line = "「か、隠し事なんて……ありませんわよ……」"

[[dialogue]]
speaker = "アム"
# 「伊達にライバルを名乗ってるわけじゃないよ。エルゼの嘘なんてすぐに分かるんだから！」
line = "「伊達にライバルを名乗ってるわけじゃないよ。エルゼの嘘なんてすぐに分かるんだから！」"

[[dialogue]]
speaker = "unk"
# エルゼ……
line = "エルゼ……"

[[dialogue]]
speaker = "エルデリーゼ"
# 「うう、そうですわね……アムに隠し事をし続けるのも胸が苦しいと思っておりましたし」
line = "「うう、そうですわね……アムに隠し事をし続けるのも胸が苦しいと思っておりましたし」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「お察しの通りですわ。あなたに黙っていたことがありますの」
line = "「お察しの通りですわ。あなたに黙っていたことがありますの」"

[[dialogue]]
speaker = "アム"
# 「そうだよね。さあ、正直に告白して」
line = "「そうだよね。さあ、正直に告白して」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「私……会長様とお付き合いを始めましたの……」
line = "「私……会長様とお付き合いを始めましたの……」"

[[dialogue]]
speaker = "unk"
# それはつい先日のことだった。
line = "それはつい先日のことだった。"

[[dialogue]]
speaker = "unk"
# 寮を抜け出したエルゼと一緒に、地下アイドルのライブに行き、そしてその帰り道──
line = "寮を抜け出したエルゼと一緒に、地下アイドルのライブに行き、そしてその帰り道──"

[[dialogue]]
speaker = "エルデリーゼ"
# 「──今日も本当に素晴らしいライブでしたわね」
line = "「──今日も本当に素晴らしいライブでしたわね」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「会長様も私に付き合っているうちに、すっかり常連になってしまいましたわ」
line = "「会長様も私に付き合っているうちに、すっかり常連になってしまいましたわ」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「……会長様……会長様は寮を抜け出すのを見つける度、それを見逃してくださいましたわ」
line = "「……会長様……会長様は寮を抜け出すのを見つける度、それを見逃してくださいましたわ」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「それどころか最近では、私の夜遊びに付き合うようになってくださいまして……」
line = "「それどころか最近では、私の夜遊びに付き合うようになってくださいまして……」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「会長様はどうして……そんなに私に良くしてくださいますの？」
line = "「会長様はどうして……そんなに私に良くしてくださいますの？」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「私が悪いことをする、その手伝いをしていれば一緒に叱られてしまうかもしれませんのに」
line = "「私が悪いことをする、その手伝いをしていれば一緒に叱られてしまうかもしれませんのに」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「なのにどうして、会長様は私と一緒にいてくださいますの？」
line = "「なのにどうして、会長様は私と一緒にいてくださいますの？」"

[[dialogue]]
speaker = "unk"
# エルゼに問われて、言葉に詰まった。
line = "エルゼに問われて、言葉に詰まった。"

[[dialogue]]
speaker = "unk"
# そして俺は、それまで漠然と抱えていたエルゼへの好意を言葉にして、はっきりと伝えたのだった。
line = "そして俺は、それまで漠然と抱えていたエルゼへの好意を言葉にして、はっきりと伝えたのだった。"

[[dialogue]]
speaker = "エルデリーゼ"
# 「会長様のお気持ちを聞いて、嬉しかったですの……ああ、会長様も同じ気持ちだったのだ、と」
line = "「会長様のお気持ちを聞いて、嬉しかったですの……ああ、会長様も同じ気持ちだったのだ、と」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「そんなことがありまして……私たち、お付き合いをすることになったんですわ。アム、黙っていてごめんなさい」
line = "「そんなことがありまして……私たち、お付き合いをすることになったんですわ。アム、黙っていてごめんなさい」"

[[dialogue]]
speaker = "アム"
# 「やっぱり……そういうことだったんだね」
line = "「やっぱり……そういうことだったんだね」"

[[dialogue]]
speaker = "アム"
# 「本当にゆるせない！　おかげでずーっとおめでとうって言えなくてモヤモヤしてたんだから！」
line = "「本当にゆるせない！　おかげでずーっとおめでとうって言えなくてモヤモヤしてたんだから！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「喜んでくれるんですの？」
line = "「喜んでくれるんですの？」"

[[dialogue]]
speaker = "アム"
# 「当たり前でしょ。親友の幸せを喜ばないわけがないんだから！」
line = "「当たり前でしょ。親友の幸せを喜ばないわけがないんだから！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「ありがとうございます、アム……」
line = "「ありがとうございます、アム……」"

[[dialogue]]
speaker = "アム"
# 「でもエルゼに先を越されちゃったのは、ちょっぴり悔しいかも……」
line = "「でもエルゼに先を越されちゃったのは、ちょっぴり悔しいかも……」"

[[dialogue]]
speaker = "アム"
# 「何といっても箱入りのお嬢様だし、まさかあたしより先に彼氏が出来るなんて思ってなかったもん」
line = "「何といっても箱入りのお嬢様だし、まさかあたしより先に彼氏が出来るなんて思ってなかったもん」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「自分でも不思議な気持ちですわ」
line = "「自分でも不思議な気持ちですわ」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「でも……ずっと一緒にいたら、いつの間にか好きになってしまっていたんですの」
line = "「でも……ずっと一緒にいたら、いつの間にか好きになってしまっていたんですの」"

[[dialogue]]
speaker = "アム"
# 「そんなに一緒にいたの？」
line = "「そんなに一緒にいたの？」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「寮を抜け出してお菓子を買いに行くのに付き合っていただいたり……」
line = "「寮を抜け出してお菓子を買いに行くのに付き合っていただいたり……」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「寮を抜け出してライブに行くのに付き合っていただいたり……」
line = "「寮を抜け出してライブに行くのに付き合っていただいたり……」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「寮を抜け出してプールに泳ぎに行くのに付き合っていただいたり……」
line = "「寮を抜け出してプールに泳ぎに行くのに付き合っていただいたり……」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「そんな風にして一緒に時間を過ごしているうちに、気が付けば会長様のことばかり考えるようになっていたんですの」
line = "「そんな風にして一緒に時間を過ごしているうちに、気が付けば会長様のことばかり考えるようになっていたんですの」"

[[dialogue]]
speaker = "アム"
# 「……思った以上にやりたい放題やってるね、この子」
line = "「……思った以上にやりたい放題やってるね、この子」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「頑張りましたのよ♪　おかげで私の『悪いことリスト』にも、だいぶチェックが付きましたわ」
line = "「頑張りましたのよ♪　おかげで私の『悪いことリスト』にも、だいぶチェックが付きましたわ」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「この調子なら、卒業までに全部達成できそうです♪」
line = "「この調子なら、卒業までに全部達成できそうです♪」"

[[dialogue]]
speaker = "アム"
# 「いい加減、ヒルディオーネ先輩に報告しといた方がいい気がしてきた……」
line = "「いい加減、ヒルディオーネ先輩に報告しといた方がいい気がしてきた……」"

[[dialogue]]
speaker = "アム"
# 「っていうか会長！　新星学園の星徒会長という立場でありながら、悪の道に走ろうとするエルゼを止めようとしないのは酷くないっ？」
line = "「っていうか会長！　新星学園の星徒会長という立場でありながら、悪の道に走ろうとするエルゼを止めようとしないのは酷くないっ？」"

[[dialogue]]
speaker = "unk"
# エルゼにもっと人生を楽しんで欲しくて
line = "エルゼにもっと人生を楽しんで欲しくて"

[[dialogue]]
speaker = "unk"
# 箱入りだった分を取り返して欲しい
line = "箱入りだった分を取り返して欲しい"

[[dialogue]]
speaker = "アム"
# 「そ、それはあたしも同じ思いだけど、エルゼに万が一のことがあったらどうするの！」
line = "「そ、それはあたしも同じ思いだけど、エルゼに万が一のことがあったらどうするの！」"

[[dialogue]]
speaker = "unk"
# その為に俺がいるから
line = "その為に俺がいるから"

[[dialogue]]
speaker = "アム"
# 「むぅ……」
line = "「むぅ……」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「大丈夫ですのよ。本当に危険なことは致しませんし、会長様もきちんと止めてくださいます」
line = "「大丈夫ですのよ。本当に危険なことは致しませんし、会長様もきちんと止めてくださいます」"

[[dialogue]]
speaker = "アム"
# 「会長が側にいてくれるのはそういう意味でも安心だね……」
line = "「会長が側にいてくれるのはそういう意味でも安心だね……」"

[[dialogue]]
speaker = "アム"
# 「とにかくエルゼのことちゃんと守ってよ、いい？」
line = "「とにかくエルゼのことちゃんと守ってよ、いい？」"

[[dialogue]]
speaker = "unk"
# 必ず守るって約束するよ
line = "必ず守るって約束するよ"

[[dialogue]]
speaker = "unk"
# わかった
line = "わかった"

[[dialogue]]
speaker = "unk"
# 力強く宣言してみせる俺に、アムは幾分か安心したような笑みを浮かべるのだった。
line = "力強く宣言してみせる俺に、アムは幾分か安心したような笑みを浮かべるのだった。"
