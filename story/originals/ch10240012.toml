[[dialogue]]
speaker = "unk"
# 第２話,クルセイダースの後継者,P
line = "第２話,クルセイダースの後継者,P"

[[dialogue]]
speaker = "unk"
# 日課をこなす為にトレーニング施設へ行くと、先客でヨミとヴィーナスの姿があった。
line = "日課をこなす為にトレーニング施設へ行くと、先客でヨミとヴィーナスの姿があった。"

[[dialogue]]
speaker = "ヴィーナス"
# 「ナイスコンビネーションだったわよ、ヨミヨミ～♪」
line = "「ナイスコンビネーションだったわよ、ヨミヨミ～♪」"

[[dialogue]]
speaker = "ヨミ"
# 「お嬢様、どさくさに紛れて尻尾モフらないで下さい！」
line = "「お嬢様、どさくさに紛れて尻尾モフらないで下さい！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「巫女服も可愛くて、尻尾はモフモフで癒されるとか、ヨミヨミ最強ね！」
line = "「巫女服も可愛くて、尻尾はモフモフで癒されるとか、ヨミヨミ最強ね！」"

[[dialogue]]
speaker = "ヨミ"
# 「星騎士として褒めてないですよね！？」
line = "「星騎士として褒めてないですよね！？」"

[[dialogue]]
speaker = "unk"
# ヴィーナス、俺にもモフらせてくれないか？
line = "ヴィーナス、俺にもモフらせてくれないか？"

[[dialogue]]
speaker = "ヨミ"
# 「私の尻尾なんですけど！？」
line = "「私の尻尾なんですけど！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロトが男じゃなかったら、許せたんだけどね……」
line = "「クロトが男じゃなかったら、許せたんだけどね……」"

[[dialogue]]
speaker = "unk"
# ヴィーナス、後で女装の仕方を教えて欲しい！
line = "ヴィーナス、後で女装の仕方を教えて欲しい！"

[[dialogue]]
speaker = "ヴィーナス"
# 「女装なんてチャチなこと言ってないで、アニマ先輩から女体化薬を貰えば一発よ！」
line = "「女装なんてチャチなこと言ってないで、アニマ先輩から女体化薬を貰えば一発よ！」"

[[dialogue]]
speaker = "ヨミ"
# 「２人とも尻尾生やす薬をもらえばいいんじゃないですかね！？」
line = "「２人とも尻尾生やす薬をもらえばいいんじゃないですかね！？」"

[[dialogue]]
speaker = "ヨミ"
# 「……いやもう、何しに来たんですか会長。日課のトレーニングなんじゃないんですか？　……いま思い出したって顔ですね」
line = "「……いやもう、何しに来たんですか会長。日課のトレーニングなんじゃないんですか？　……いま思い出したって顔ですね」"

[[dialogue]]
speaker = "unk"
# 星騎士姿は巫女（？）っぽいね
line = "星騎士姿は巫女（？）っぽいね"

[[dialogue]]
speaker = "unk"
# ところでヨミヨミはメイドなのに、
line = "ところでヨミヨミはメイドなのに、"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふふっ！　巫女っぽいじゃなくて、ヨミヨミは本当に巫女なのよ」
line = "「ふふっ！　巫女っぽいじゃなくて、ヨミヨミは本当に巫女なのよ」"

[[dialogue]]
speaker = "ヨミ"
# 「魔界にあるアマツミカ地方で『天ヶ崎神宮』というところがあるのですが……私はそこの生まれなんです」
line = "「魔界にあるアマツミカ地方で『天ヶ崎神宮』というところがあるのですが……私はそこの生まれなんです」"

[[dialogue]]
speaker = "ヴィーナス"
# 「天ヶ崎神宮はなんと、３０００年前からある由緒正しき大神宮なのよ！　ヨミヨミはその一族の巫女というわけね」
line = "「天ヶ崎神宮はなんと、３０００年前からある由緒正しき大神宮なのよ！　ヨミヨミはその一族の巫女というわけね」"

[[dialogue]]
speaker = "ヨミ"
# 「初代巫女は、前回のリクリエを鎮めた英雄パーティーの一員であったそうです」
line = "「初代巫女は、前回のリクリエを鎮めた英雄パーティーの一員であったそうです」"

[[dialogue]]
speaker = "unk"
# それって、伝説のクルセイダースじゃないか！
line = "それって、伝説のクルセイダースじゃないか！"

[[dialogue]]
speaker = "ヨミ"
# 「はい。そして、そのクルセイダースが使っていた武器が、私の使っているアーティファクト『破邪の鈴』なのです」
line = "「はい。そして、そのクルセイダースが使っていた武器が、私の使っているアーティファクト『破邪の鈴』なのです」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ヨミヨミは凄いのよ！　破邪の鈴は、初代巫女以外は３０００年間、誰も契約者と認めて来なかったの。その新たな契約者として、ヨミヨミは唯一選ばれたのよ！」
line = "「ヨミヨミは凄いのよ！　破邪の鈴は、初代巫女以外は３０００年間、誰も契約者と認めて来なかったの。その新たな契約者として、ヨミヨミは唯一選ばれたのよ！」"

[[dialogue]]
speaker = "ヨミ"
# 「天ヶ崎の始祖──初代巫女様は、それはそれは美しい巫女舞を踊られる方だったそうで。その舞に感銘を受けた女神様が、破邪の鈴を授けたと言われています」
line = "「天ヶ崎の始祖──初代巫女様は、それはそれは美しい巫女舞を踊られる方だったそうで。その舞に感銘を受けた女神様が、破邪の鈴を授けたと言われています」"

[[dialogue]]
speaker = "ヨミ"
# 「破邪の鈴にはリクリエの瘴気を祓う力が宿っており、契約者の巫女舞が真に完成する時、本当の力を取り戻すのだそうです」
line = "「破邪の鈴にはリクリエの瘴気を祓う力が宿っており、契約者の巫女舞が真に完成する時、本当の力を取り戻すのだそうです」"

[[dialogue]]
speaker = "unk"
# ヨミヨミはクルセイダースの後継者ってことか！
line = "ヨミヨミはクルセイダースの後継者ってことか！"

[[dialogue]]
speaker = "ヨミ"
# 「巫女舞は爆裂未熟なんですけどね……」
line = "「巫女舞は爆裂未熟なんですけどね……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「とにかく、ヨミヨミは本物の巫女で、かつ本物のメイドっていう、最強の萌え萌えハイブリッドってことよ！　萌え系喫茶の巫女ウェイトレスだって出来るんじゃないかしら？」
line = "「とにかく、ヨミヨミは本物の巫女で、かつ本物のメイドっていう、最強の萌え萌えハイブリッドってことよ！　萌え系喫茶の巫女ウェイトレスだって出来るんじゃないかしら？」"

[[dialogue]]
speaker = "ヨミ"
# 「も、萌え……？」
line = "「も、萌え……？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうだ、休憩用に持ってきてたティーセットで、さっき緑茶を淹れてくれたじゃない？」
line = "「そうだ、休憩用に持ってきてたティーセットで、さっき緑茶を淹れてくれたじゃない？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロトには最強萌えメイドとして、プリティーに給仕してあげなさい！」
line = "「クロトには最強萌えメイドとして、プリティーに給仕してあげなさい！」"

[[dialogue]]
speaker = "ヨミ"
# 「っ……え、ええ！　……もちろん、出来ますとも！」
line = "「っ……え、ええ！　……もちろん、出来ますとも！」"

[[dialogue]]
speaker = "unk"
# （さっき首傾げてなかった……？）
line = "（さっき首傾げてなかった……？）"

[[dialogue]]
speaker = "ヨミ"
# 「九浄家メイド隊たるもの、給仕くらい爆裂簡単にこなせなくてはなりません！」
line = "「九浄家メイド隊たるもの、給仕くらい爆裂簡単にこなせなくてはなりません！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「さすがヨミヨミね！　わくわく」
line = "「さすがヨミヨミね！　わくわく」"

[[dialogue]]
speaker = "ヨミ"
# 「そ、それでは会長……すぐにご準備しますのでお待ちをっ」
line = "「そ、それでは会長……すぐにご準備しますのでお待ちをっ」"

[[dialogue]]
speaker = "ヨミ"
# 「い、いらっしゃませ～。本日の給仕を勤めさせて頂きます、巫女ウェイトレスのよ、ヨミヨミです……<emoji=heart04>」
line = "「い、いらっしゃませ～。本日の給仕を勤めさせて頂きます、巫女ウェイトレスのよ、ヨミヨミです……<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
# 「本日のご注文はいかがしますか？　美味しい緑茶を１つですね、かしこまりましたぁ……」
line = "「本日のご注文はいかがしますか？　美味しい緑茶を１つですね、かしこまりましたぁ……」"

[[dialogue]]
speaker = "ヨミ"
# 「はい、お持ちしました。ええと……熱いので、ふ、ふーふー、しますね？　……あ、でもこれちょっと恥ずかし……やっぱ今のなしで！」
line = "「はい、お持ちしました。ええと……熱いので、ふ、ふーふー、しますね？　……あ、でもこれちょっと恥ずかし……やっぱ今のなしで！」"

[[dialogue]]
speaker = "ヨミ"
# 「か、代わりに……そう、尻尾……！　尻尾です！　少しだけ、モフモフサービスします……！」
line = "「か、代わりに……そう、尻尾……！　尻尾です！　少しだけ、モフモフサービスします……！」"

[[dialogue]]
speaker = "unk"
# 何……だと……？
line = "何……だと……？"

[[dialogue]]
speaker = "ヨミ"
# 「で、でも、本当に少しだけ、ですからね？　いやらしく触るのは禁止です！　すー……はー……よし！　どうぞ！」
line = "「で、でも、本当に少しだけ、ですからね？　いやらしく触るのは禁止です！　すー……はー……よし！　どうぞ！」"

[[dialogue]]
speaker = "ヨミ"
# 「んっ……あっ……会長っ！　そんなっ……付け根の方は……ふあぁっ……！」
line = "「んっ……あっ……会長っ！　そんなっ……付け根の方は……ふあぁっ……！」"

[[dialogue]]
speaker = "ヨミ"
# 「……はっ、待った！　よく考えたら、さっきのトレーニングで汗臭いかも……！　モフモフ一旦待って下さい！」
line = "「……はっ、待った！　よく考えたら、さっきのトレーニングで汗臭いかも……！　モフモフ一旦待って下さい！」"

[[dialogue]]
speaker = "ヨミ"
# 「気にしないって……私が気にするんです！　だからダメですって……待った待った！　ちょっ……あっ……こやんっ……や、やっぱダメぇぇぇ──ッ！！！」
line = "「気にしないって……私が気にするんです！　だからダメですって……待った待った！　ちょっ……あっ……こやんっ……や、やっぱダメぇぇぇ──ッ！！！」"

[[dialogue]]
speaker = "ヨミ"
# 「ごめんなさいぃ！　やっぱ私には巫女ウェイトレス無理ですぅぅぅ──ッ！！！」
line = "「ごめんなさいぃ！　やっぱ私には巫女ウェイトレス無理ですぅぅぅ──ッ！！！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ヨミヨミって見栄っ張りよね」
line = "「ヨミヨミって見栄っ張りよね」"

[[dialogue]]
speaker = "unk"
# 開店はいつですか？
line = "開店はいつですか？"

[[dialogue]]
speaker = "ヴィーナス"
# 「<ruby=あのひと>九浄家当主</ruby>に相談してみるわ！」
line = "「<ruby>九浄家当主<rt>あのひと</rt></ruby>に相談してみるわ！」"

[[dialogue]]
speaker = "ヨミ"
# 「冗談じゃなくなっちゃうから、ほんと止めて下さいっ！」
line = "「冗談じゃなくなっちゃうから、ほんと止めて下さいっ！」"

[[dialogue]]
speaker = "unk"
# 恥ずかしさに顔を真っ赤にしたヨミが可愛らしく、その後もついついイジってしまう俺たちなのであった。
line = "恥ずかしさに顔を真っ赤にしたヨミが可愛らしく、その後もついついイジってしまう俺たちなのであった。"
