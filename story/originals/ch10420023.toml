[[dialogue]]
speaker = "ルルカ"
# 「ほらほら～？　愛しの会長さんもこう言ってるよ～」
line = "「ほらほら～？　愛しの会長さんもこう言ってるよ～」"

[[dialogue]]
speaker = "フェニエル"
# 「か、会長さんが聞きたいって言うなら……うううっ。でもでもっ、歌うのはさすがに……でも会長さんの希望だし……」
line = "「か、会長さんが聞きたいって言うなら……うううっ。でもでもっ、歌うのはさすがに……でも会長さんの希望だし……」"

[[dialogue]]
speaker = "フェニエル"
# 「わ、わかりました！　ただ、お願いがありますっ」
line = "「わ、わかりました！　ただ、お願いがありますっ」"

[[dialogue]]
speaker = "フェニエル"
# 「会長さん……いいえっ、ご主人様！　私に『どんなに恥ずかしくても、人前で歌い切ってみせろ』と、厳しくご命令くださいっ」
line = "「会長さん……いいえっ、ご主人様！　私に『どんなに恥ずかしくても、人前で歌い切ってみせろ』と、厳しくご命令くださいっ」"

[[dialogue]]
speaker = "ルルカ"
# 「ご、ご主人様ぁ！？」
line = "「ご、ご主人様ぁ！？」"

[[dialogue]]
speaker = "フェニエル"
# 「お願いや希望ではなく、ご命令をください、ご主人様っ。そうすれば私は、例えどんな恥辱であろうとも、耐えられるはずです！」
line = "「お願いや希望ではなく、ご命令をください、ご主人様っ。そうすれば私は、例えどんな恥辱であろうとも、耐えられるはずです！」"

[[dialogue]]
speaker = "ルルカ"
# 「ど、どどど、どういうことかな、お兄ちゃんっ！？」
line = "「ど、どどど、どういうことかな、お兄ちゃんっ！？」"

[[dialogue]]
speaker = "ルルカ"
# 「まさかとは思うけど、フニちゃんと２人きりの時は、日常的にそんな風に呼ばせてるの！？」
line = "「まさかとは思うけど、フニちゃんと２人きりの時は、日常的にそんな風に呼ばせてるの！？」"

[[dialogue]]
speaker = "unk"
# （完全には否定しづらい！）
line = "（完全には否定しづらい！）"

[[dialogue]]
speaker = "ルルカ"
# 「い、言いよどんだぁ！？　クロだよ、クロ！　その反応は絶対やってるもん！　これは問題だよ、お兄ちゃん！」
line = "「い、言いよどんだぁ！？　クロだよ、クロ！　その反応は絶対やってるもん！　これは問題だよ、お兄ちゃん！」"

[[dialogue]]
speaker = "フェニエル"
# 「ご命令ください、ご主人様<emoji=heart04>」
line = "「ご命令ください、ご主人様<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ──それから、場の混乱を鎮めるのには１時間以上の時間を要した。
line = "──それから、場の混乱を鎮めるのには１時間以上の時間を要した。"

[[dialogue]]
speaker = "unk"
# ちなみに、ルルカとデュエットしたフニの歌は結構上手く、日々練習を欠かさないルルカの方が若干悔しがっているのだった。
line = "ちなみに、ルルカとデュエットしたフニの歌は結構上手く、日々練習を欠かさないルルカの方が若干悔しがっているのだった。"
