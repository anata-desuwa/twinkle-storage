line = "「歌！？　む、無理です無理ですっ。ルルカちゃんは上手ですけど、私なんて民謡くらいしか歌ったことないですからっ」"

[[dialogue]]
speaker = "ルルカ"
# 「民謡！？　な、なるほど……そういうジャンルもあるのかぁ。もしかして、歌ってみたとかで使えるかも？」
line = "「民謡！？　な、なるほど……そういうジャンルもあるのかぁ。もしかして、歌ってみたとかで使えるかも？」"

[[dialogue]]
