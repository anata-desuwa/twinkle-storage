[[dialogue]]
speaker = "ルルカ"
# 「はっ！？　そうだった！」
line = "「はっ！？　そうだった！」"

[[dialogue]]
speaker = "ルルカ"
# 「ふっふっふっ。だけどフニちゃん、この攻撃から逃れることはできるかな……？」
line = "「ふっふっふっ。だけどフニちゃん、この攻撃から逃れることはできるかな……？」"

[[dialogue]]
speaker = "フェニエル"
# 「攻撃……ですか？」
line = "「攻撃……ですか？」"

[[dialogue]]
speaker = "ルルカ"
# 「お兄ちゃん！　可愛い彼女の歌声を、聞いてみたいと思わない！？」
line = "「お兄ちゃん！　可愛い彼女の歌声を、聞いてみたいと思わない！？」"

[[dialogue]]
speaker = "unk"
# うっ。ちょっと、聞いてみたい……
