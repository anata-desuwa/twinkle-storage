[[dialogue]]
speaker = "unk"
# 第３話,ご命令ください、ご主人様,P
line = "第３話,ご命令ください、ご主人様,P"

[[dialogue]]
speaker = "unk"
# フニにとある頼み事をするために、俺は流星学園を訪れていた。
line = "フニにとある頼み事をするために、俺は流星学園を訪れていた。"

[[dialogue]]
speaker = "フェニエル"
# 「会長さんの頼み事なら、もちろん何でもさせていただきますっ」
line = "「会長さんの頼み事なら、もちろん何でもさせていただきますっ」"

[[dialogue]]
speaker = "unk"
# 内容を聞かなくていいの！？
line = "内容を聞かなくていいの！？"

[[dialogue]]
speaker = "フェニエル"
# 「はい。会長さんが私の嫌がることをするわけない……ですからっ」
line = "「はい。会長さんが私の嫌がることをするわけない……ですからっ」"

[[dialogue]]
speaker = "フェニエル"
# 「そこまで全面的に信頼されると困っちゃう……ですか？　ふふっ、そういうところですよ、会長さん♪」
line = "「そこまで全面的に信頼されると困っちゃう……ですか？　ふふっ、そういうところですよ、会長さん♪」"

[[dialogue]]
speaker = "フェニエル"
# 「そんな会長さんだからこそ大好きで……何でも、したくなっちゃうんです<emoji=heart04>」
line = "「そんな会長さんだからこそ大好きで……何でも、したくなっちゃうんです<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# フニはいつか騙されそうで心配だなぁ
line = "フニはいつか騙されそうで心配だなぁ"

[[dialogue]]
speaker = "フェニエル"
# 「会長さんになら、騙されたって構いませんっ」
line = "「会長さんになら、騙されたって構いませんっ」"

[[dialogue]]
speaker = "フェニエル"
# 「あ、でも……もしかしてお断りした方が、よかったでしょうか？　なんとなく会長さんから、そういう空気を感じたのですが……」
line = "「あ、でも……もしかしてお断りした方が、よかったでしょうか？　なんとなく会長さんから、そういう空気を感じたのですが……」"

[[dialogue]]
speaker = "unk"
# 鋭い。ただここで誤魔化して、後で俺がいないところでややこしい話になるのも困る。俺は深呼吸して、覚悟を決めるのだった。
line = "鋭い。ただここで誤魔化して、後で俺がいないところでややこしい話になるのも困る。俺は深呼吸して、覚悟を決めるのだった。"

[[dialogue]]
speaker = "ルルカ"
# 「フニちゃん！　来てくれたんだっ、ありがとう～！！」
line = "「フニちゃん！　来てくれたんだっ、ありがとう～！！」"

[[dialogue]]
speaker = "フェニエル"
# 「ルルカちゃん？　私に協力して欲しいのって、ルルカちゃんだったんですか？」
line = "「ルルカちゃん？　私に協力して欲しいのって、ルルカちゃんだったんですか？」"

[[dialogue]]
speaker = "ルルカ"
# 「そうだけど……もしかしてお兄ちゃんから説明聞いてない？」
line = "「そうだけど……もしかしてお兄ちゃんから説明聞いてない？」"

[[dialogue]]
speaker = "フェニエル"
# 「はい。会長さんのお願いだったので」
line = "「はい。会長さんのお願いだったので」"

[[dialogue]]
speaker = "ルルカ"
# 「お、お兄ちゃんの頼み事だったら、内容聞かないでＯＫしちゃうんだ……」
line = "「お、お兄ちゃんの頼み事だったら、内容聞かないでＯＫしちゃうんだ……」"

[[dialogue]]
speaker = "フェニエル"
# 「……？　はい。もちろんです」
line = "「……？　はい。もちろんです」"

[[dialogue]]
speaker = "ルルカ"
# 「ちょっとお兄ちゃん！　頼み事してるあたしが言うのもなんだけど、こういうのはあんまり良くないと思うな！」
line = "「ちょっとお兄ちゃん！　頼み事してるあたしが言うのもなんだけど、こういうのはあんまり良くないと思うな！」"

[[dialogue]]
speaker = "unk"
# ルルカからも、もっと言ってやってくれ
line = "ルルカからも、もっと言ってやってくれ"

[[dialogue]]
speaker = "unk"
# 俺もそう思う。
line = "俺もそう思う。"

[[dialogue]]
speaker = "ルルカ"
# 「今時亭主関白なんて流行らないんだよ！　いいかな、お兄ちゃん？　年下の彼女っていうのはね……って、なんでお兄ちゃんが同意してるのぉ！？」
line = "「今時亭主関白なんて流行らないんだよ！　いいかな、お兄ちゃん？　年下の彼女っていうのはね……って、なんでお兄ちゃんが同意してるのぉ！？」"

[[dialogue]]
speaker = "ルルカ"
# 「自分を慕ってくれる恋人に、恋人であっても男の言葉はもっと疑ってかかれとは説教できない……ううっ、それは、確かに」
line = "「自分を慕ってくれる恋人に、恋人であっても男の言葉はもっと疑ってかかれとは説教できない……ううっ、それは、確かに」"

[[dialogue]]
speaker = "フェニエル"
# 「私は会長さんやルルカちゃんにだったら、騙されてもいいと思っているので、大丈夫ですよっ！」
line = "「私は会長さんやルルカちゃんにだったら、騙されてもいいと思っているので、大丈夫ですよっ！」"

[[dialogue]]
speaker = "ルルカ"
# 「全然大丈夫じゃないし、言いたいことはまったく伝わってないんだけど、お兄ちゃんが苦労してるポイントは理解できたよ！」
line = "「全然大丈夫じゃないし、言いたいことはまったく伝わってないんだけど、お兄ちゃんが苦労してるポイントは理解できたよ！」"

[[dialogue]]
speaker = "フェニエル"
# 「大掃除から荷物運びまで、雑用であればメイド隊でひと通り仕込まれてますっ。なんなりとご命令ください♪」
line = "「大掃除から荷物運びまで、雑用であればメイド隊でひと通り仕込まれてますっ。なんなりとご命令ください♪」"

[[dialogue]]
speaker = "unk"
# やる気になったフニがぐいぐいとトレーニング施設の掃除を始めてしまいそうだったのを何とか押しとどめて、ルルカは説明を続行した。
line = "やる気になったフニがぐいぐいとトレーニング施設の掃除を始めてしまいそうだったのを何とか押しとどめて、ルルカは説明を続行した。"

[[dialogue]]
speaker = "ルルカ"
# 「前置きが長くなっちゃったけど、本題に入るよ、フニちゃん！」
line = "「前置きが長くなっちゃったけど、本題に入るよ、フニちゃん！」"

[[dialogue]]
speaker = "ルルカ"
# 「変・身！　クリスマスフォーム！！」
line = "「変・身！　クリスマスフォーム！！」"

[[dialogue]]
speaker = "ルルカ"
# 「はい、次はフニちゃんの番だよ」
line = "「はい、次はフニちゃんの番だよ」"

[[dialogue]]
speaker = "フェニエル"
# 「ええっ！？　ど、どうして突然……？」
line = "「ええっ！？　ど、どうして突然……？」"

[[dialogue]]
speaker = "ルルカ"
# 「いいから、いいからっ。さあ、早く変身だよ♪」
line = "「いいから、いいからっ。さあ、早く変身だよ♪」"

[[dialogue]]
speaker = "フェニエル"
# 「わ、わかりました……。クリスマスフォーームっ！！」
line = "「わ、わかりました……。クリスマスフォーームっ！！」"

[[dialogue]]
speaker = "ルルカ"
# 「おお～、これこれ！　フニちゃんのクリスマスフォーム、改めてじっくり見てみたかったんだよね～」
line = "「おお～、これこれ！　フニちゃんのクリスマスフォーム、改めてじっくり見てみたかったんだよね～」"

[[dialogue]]
speaker = "フェニエル"
# 「……それはいいんですが、どうしてＤＩＳＣをこっちに向けているんでしょうか？」
line = "「……それはいいんですが、どうしてＤＩＳＣをこっちに向けているんでしょうか？」"

[[dialogue]]
speaker = "ルルカ"
# 「もちろん撮影するためだよ♪」
