[[dialogue]]
speaker = "フェニエル"
# 「さ、撮影、ですかぁ！？」
line = "「さ、撮影、ですかぁ！？」"

[[dialogue]]
speaker = "ルルカ"
# 「そう！　今日はあたしとフニちゃんのクリスマスフォームの撮影をするの！」
line = "「そう！　今日はあたしとフニちゃんのクリスマスフォームの撮影をするの！」"

[[dialogue]]
speaker = "unk"
# Ｖチューバーなのにリアルで撮影するんだ？
line = "Ｖチューバーなのにリアルで撮影するんだ？"

[[dialogue]]
speaker = "unk"
# 今更なんだけど……
line = "今更なんだけど……"

[[dialogue]]
speaker = "フェニエル"
# 「ふぇぇっ！？　わ、私、ルルカちゃんみたいなＶチューバーなんて、できないですよっ」
line = "「ふぇぇっ！？　わ、私、ルルカちゃんみたいなＶチューバーなんて、できないですよっ」"

[[dialogue]]
speaker = "フェニエル"
# 「ああ、いえ、何でもやらせていただくと言った手前ではあるんですが！　ご迷惑をかけてしまうといいますかっ」
line = "「ああ、いえ、何でもやらせていただくと言った手前ではあるんですが！　ご迷惑をかけてしまうといいますかっ」"

[[dialogue]]
speaker = "ルルカ"
# 「違う違う！　フニちゃんをＶチューバーデビューさせたいとか、そういう話じゃなくってね」
line = "「違う違う！　フニちゃんをＶチューバーデビューさせたいとか、そういう話じゃなくってね」"

[[dialogue]]
speaker = "ルルカ"
# 「この間、コスプレイヤーさんがやる『あわせ』っていう撮影会があるのを知ってね。あたしとフニちゃんで一緒にやったら、楽しいんじゃないかな～って思ったの！」
line = "「この間、コスプレイヤーさんがやる『あわせ』っていう撮影会があるのを知ってね。あたしとフニちゃんで一緒にやったら、楽しいんじゃないかな～って思ったの！」"

[[dialogue]]
speaker = "ルルカ"
# 「写真自体はＶチューバー活動では使えないけど、何事も経験が大事って言うでしょ！　配信の企画は、こういう日々の活動から生まれるんだよ！」
line = "「写真自体はＶチューバー活動では使えないけど、何事も経験が大事って言うでしょ！　配信の企画は、こういう日々の活動から生まれるんだよ！」"

[[dialogue]]
speaker = "フェニエル"
# 「な、なるほどです……そういうことなら、ご協力させていただきますっ」
line = "「な、なるほどです……そういうことなら、ご協力させていただきますっ」"

[[dialogue]]
speaker = "unk"
# 恥ずかしいなら、無理しなくても……
