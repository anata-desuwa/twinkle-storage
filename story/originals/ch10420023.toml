[[dialogue]]
speaker = "フェニエル"
# 「いえ、ルルカちゃんが私と楽しいことをしたいって言ってくれてるんです。確かにちょっと、恥ずかしいですが……。が、頑張りますっ」
line = "「いえ、ルルカちゃんが私と楽しいことをしたいって言ってくれてるんです。確かにちょっと、恥ずかしいですが……。が、頑張りますっ」"

[[dialogue]]
speaker = "ルルカ"
# 「フニちゃん、ありがとう～！　さて、許可も取れたことだし、どんどん撮っていくよ～！」
line = "「フニちゃん、ありがとう～！　さて、許可も取れたことだし、どんどん撮っていくよ～！」"

[[dialogue]]
speaker = "ルルカ"
# 「いいね、いいね！　可愛い写真がたくさん撮れたよ！」
line = "「いいね、いいね！　可愛い写真がたくさん撮れたよ！」"

[[dialogue]]
speaker = "ルルカ"
# 「そうだ！　次は歌も入れて動画撮っちゃおうか！」
line = "「そうだ！　次は歌も入れて動画撮っちゃおうか！」"

