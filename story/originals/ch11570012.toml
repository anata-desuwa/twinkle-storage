[[dialogue]]
speaker = "unk"
# 第２話,ピーマン克服法,P
line = "第２話,ピーマン克服法,P"

[[dialogue]]
speaker = "サチ"
# 「ちょっとプリムラ！　またピーマン残そうとしてるじゃない。ちゃんと食べなきゃダメだよ！」
line = "「ちょっとプリムラ！　またピーマン残そうとしてるじゃない。ちゃんと食べなきゃダメだよ！」"

[[dialogue]]
speaker = "プリムラ"
# 「ピーマンは我の舌の好みに合わぬから残してもよいのじゃ」
line = "「ピーマンは我の舌の好みに合わぬから残してもよいのじゃ」"

[[dialogue]]
speaker = "サチ"
# 「よくないでしょ、ちゃんと食べなさい！」
line = "「よくないでしょ、ちゃんと食べなさい！」"

[[dialogue]]
speaker = "プリムラ"
# 「い～や～じゃ！　なぜ我がそのようなことを強いられねばならん。何を食らい、何を食らわずとも我の勝手じゃ！」
line = "「い～や～じゃ！　なぜ我がそのようなことを強いられねばならん。何を食らい、何を食らわずとも我の勝手じゃ！」"

[[dialogue]]
speaker = "ここあ"
# 「んにゃ？　サチサチにプリちん、こんちゃーっす♪」
line = "「んにゃ？　サチサチにプリちん、こんちゃーっす♪」"

[[dialogue]]
speaker = "プリムラ"
# 「おお、我が眷属ではないか。貴様も食事か？　ならば我の隣に座るのじゃ」
line = "「おお、我が眷属ではないか。貴様も食事か？　ならば我の隣に座るのじゃ」"

[[dialogue]]
speaker = "ここあ"
# 「いいの？　にゃはは、あざまーす♪」
line = "「いいの？　にゃはは、あざまーす♪」"

[[dialogue]]
speaker = "プリムラ"
# 「よしよし、座ったな？　では少しの間だけ目を瞑るのじゃ」
line = "「よしよし、座ったな？　では少しの間だけ目を瞑るのじゃ」"

[[dialogue]]
speaker = "ここあ"
# 「こんな感じでいーの？　なになに？　何か面白い事でも始まるのかにゃ？」
line = "「こんな感じでいーの？　なになに？　何か面白い事でも始まるのかにゃ？」"

[[dialogue]]
speaker = "プリムラ"
# 「しばらくそのままじゃぞ？　さささっ！」
line = "「しばらくそのままじゃぞ？　さささっ！」"

[[dialogue]]
speaker = "サチ"
# 「あっ、プリムラ！　今、ピーマンをここあさんのお皿に──！」
line = "「あっ、プリムラ！　今、ピーマンをここあさんのお皿に──！」"

[[dialogue]]
speaker = "プリムラ"
# 「わ～わ～わ～、サチが何を騒いでいるのか、我にはトンと分からないのじゃ～」
line = "「わ～わ～わ～、サチが何を騒いでいるのか、我にはトンと分からないのじゃ～」"

[[dialogue]]
speaker = "ここあ"
# 「んにゃにゃ？　なんか目を閉じてる間に、ここあのおかずが少し増えたような気がするにゃ～」
line = "「んにゃにゃ？　なんか目を閉じてる間に、ここあのおかずが少し増えたような気がするにゃ～」"

[[dialogue]]
speaker = "プリムラ"
# 「ぴゅ～ぴゅ～♪　それは全くの気のせいじゃろ～♪」
line = "「ぴゅ～ぴゅ～♪　それは全くの気のせいじゃろ～♪」"

[[dialogue]]
speaker = "ここあ"
# 「ふふ～ん、甘いにゃあ、プリちん……」
line = "「ふふ～ん、甘いにゃあ、プリちん……」"

[[dialogue]]
speaker = "プリムラ"
# 「な、何じゃと！？　いつの間にやらここあの皿に移したはずのピーマンが戻ってきておる！？」
line = "「な、何じゃと！？　いつの間にやらここあの皿に移したはずのピーマンが戻ってきておる！？」"

[[dialogue]]
speaker = "ここあ"
# 「弟たちの常とう手段だったからね～。ここあにその技は通じないよ～」
line = "「弟たちの常とう手段だったからね～。ここあにその技は通じないよ～」"

[[dialogue]]
speaker = "プリムラ"
# 「くっ……小癪なっ！　これでどうじゃ！　そりゃそりゃそりゃっ！！」
line = "「くっ……小癪なっ！　これでどうじゃ！　そりゃそりゃそりゃっ！！」"

[[dialogue]]
speaker = "ここあ"
# 「ふふ～ん♪」
line = "「ふふ～ん♪」"

[[dialogue]]
speaker = "プリムラ"
# 「何故じゃ！？　移しても移してもピーマンが減らんじゃと！」
line = "「何故じゃ！？　移しても移してもピーマンが減らんじゃと！」"

[[dialogue]]
speaker = "ここあ"
# 「甘い甘い。そんなぬるい攻撃じゃここあのガードは破れないよん♪」
line = "「甘い甘い。そんなぬるい攻撃じゃここあのガードは破れないよん♪」"

[[dialogue]]
speaker = "サチ"
# 「すごい……まさに鉄壁です……」
line = "「すごい……まさに鉄壁です……」"

[[dialogue]]
speaker = "ここあ"
# 「うちの弟たちは双子で同時に攻撃を仕掛けてきてたからね。それと比べたらプリちんはベリーイージーでしょ～♪」
line = "「うちの弟たちは双子で同時に攻撃を仕掛けてきてたからね。それと比べたらプリちんはベリーイージーでしょ～♪」"

[[dialogue]]
speaker = "プリムラ"
# 「ぐぬぬぬぬ！！！」
line = "「ぐぬぬぬぬ！！！」"

[[dialogue]]
speaker = "ここあ"
# 「そういう事だから諦めなさい♪　騙されたと思って食べてみたら、案外美味しかったりするかもよ～」
line = "「そういう事だから諦めなさい♪　騙されたと思って食べてみたら、案外美味しかったりするかもよ～」"

[[dialogue]]
speaker = "ここあ"
# 「１人で食べられないなら、ここあが食べさせてあげよっか？　お膝の上に抱っこして、あ～んって♪」
line = "「１人で食べられないなら、ここあが食べさせてあげよっか？　お膝の上に抱っこして、あ～んって♪」"

[[dialogue]]
speaker = "プリムラ"
# 「そんな子供のような真似、出来ぬに決まっているのじゃ！」
line = "「そんな子供のような真似、出来ぬに決まっているのじゃ！」"

[[dialogue]]
speaker = "ここあ"
# 「ふーん、でも嫌いなお野菜を残す方が、子供っぽいと思うけどな～」
line = "「ふーん、でも嫌いなお野菜を残す方が、子供っぽいと思うけどな～」"

[[dialogue]]
speaker = "ここあ"
# 「ひと口だけでもいいからさ、食べてみようよ♪　ね、お願いっ☆」
line = "「ひと口だけでもいいからさ、食べてみようよ♪　ね、お願いっ☆」"

[[dialogue]]
speaker = "プリムラ"
# 「むむむ、眷属にそこまでお願いされると弱いのじゃ……。仕方ないのぉ、ひと口だけじゃぞ……」
line = "「むむむ、眷属にそこまでお願いされると弱いのじゃ……。仕方ないのぉ、ひと口だけじゃぞ……」"

[[dialogue]]
speaker = "プリムラ"
# 「んんん～……あむっ！」
line = "「んんん～……あむっ！」"

[[dialogue]]
speaker = "プリムラ"
# 「ん……なんじゃ、これ？　苦みが全然ないぞ？　どういうことじゃ？」
line = "「ん……なんじゃ、これ？　苦みが全然ないぞ？　どういうことじゃ？」"

[[dialogue]]
speaker = "ここあ"
# 「ほら、食べてみると案外いけるでしょ？」
line = "「ほら、食べてみると案外いけるでしょ？」"

[[dialogue]]
speaker = "プリムラ"
# 「そうじゃな。ふふふ、見たか、サチよ！　我の大人っぷりを」
line = "「そうじゃな。ふふふ、見たか、サチよ！　我の大人っぷりを」"

[[dialogue]]
speaker = "サチ"
# 「そんな事で胸を張られても困るんだけど……」
line = "「そんな事で胸を張られても困るんだけど……」"

[[dialogue]]
speaker = "サチ"
# 「でも……ここあさん、もしかして何かやったんですか……？」
line = "「でも……ここあさん、もしかして何かやったんですか……？」"

[[dialogue]]
speaker = "ここあ"
# 「にゃはは、サチサチは鋭いにゃ～♪」
line = "「にゃはは、サチサチは鋭いにゃ～♪」"

[[dialogue]]
speaker = "ここあ"
# 「実は厨房の人にお願いして、ピーマンが苦手なコも食べられるような味付けにしてもらったんだよ」
line = "「実は厨房の人にお願いして、ピーマンが苦手なコも食べられるような味付けにしてもらったんだよ」"

[[dialogue]]
speaker = "ここあ"
# 「それでプリちんにお皿に戻したピーマンは、ぜーんぶここあのピーマンとすり替え済み」
line = "「それでプリちんにお皿に戻したピーマンは、ぜーんぶここあのピーマンとすり替え済み」"

[[dialogue]]
speaker = "ここあ"
# 「弟たちの好き嫌いを直すのにいっぱい研究したからね～。プリちんもあれなら美味しく食べられるはずだから♪」
line = "「弟たちの好き嫌いを直すのにいっぱい研究したからね～。プリちんもあれなら美味しく食べられるはずだから♪」"

[[dialogue]]
speaker = "サチ"
# 「さ、流石ここあさんです……」
line = "「さ、流石ここあさんです……」"

[[dialogue]]
speaker = "プリムラ"
# 「フハハハハ！　ピーマンを克服した我に敵はないのじゃ！　あむっ、もぐもぐ……」
line = "「フハハハハ！　ピーマンを克服した我に敵はないのじゃ！　あむっ、もぐもぐ……」"

[[dialogue]]
speaker = "unk"
# 美味しそうにピーマンを頬張るプリムラに楽しそうな視線を向けるここあ。
line = "美味しそうにピーマンを頬張るプリムラに楽しそうな視線を向けるここあ。"

[[dialogue]]
speaker = "unk"
# 後日──
line = "後日──"

[[dialogue]]
speaker = "unk"
# ここあ秘伝の味付けを施されていないピーマンを、無防備に頬張ったプリムラが悲鳴を上げたのは言うまでもない。
line = "ここあ秘伝の味付けを施されていないピーマンを、無防備に頬張ったプリムラが悲鳴を上げたのは言うまでもない。"

[[dialogue]]
speaker = "プリムラ"
# 「何故じゃーーーっ！　今日のピーマン、何でこんなに苦いのじゃーーーっ！！！」
line = "「何故じゃーーーっ！　今日のピーマン、何でこんなに苦いのじゃーーーっ！！！」"
