[[dialogue]]
speaker = "unk"
# 第１話,ヴィーナスの使命,B
line = "第１話,ヴィーナスの使命,B"

[[dialogue]]
speaker = "アポロ"
# 「ふっふっふっふ！　<b>どこ</b>から持ってきたのか知らないけど、そんなアイテムこのアポロ様の前では無力！」
line = "「ふっふっふっふ！　<b>どこ</b>から持ってきたのか知らないけど、そんなアイテムこのアポロ様の前では無力！」"

[[dialogue]]
speaker = "アポロ"
# 「なぜなら正義のヒーローとは！　どんな悲惨な運命でもひっくり返すからヒーローなのだ！」
line = "「なぜなら正義のヒーローとは！　どんな悲惨な運命でもひっくり返すからヒーローなのだ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……ふぅ」
line = "「……ふぅ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "クロト"
# 「ヴィーナス──ここにいたか。探したよ」
line = "「ヴィーナス──ここにいたか。探したよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あ……クロト。よくわかったわね」
line = "「あ……クロト。よくわかったわね」"

[[dialogue]]
speaker = "unk"
# トレーニングホールの中でヴィーナスを見つける。
line = "トレーニングホールの中でヴィーナスを見つける。"

[[dialogue]]
speaker = "unk"
# 先ほどまで星術の音が響いていたから、一人で訓練をしていたようだ。
line = "先ほどまで星術の音が響いていたから、一人で訓練をしていたようだ。"

[[dialogue]]
speaker = "クロト"
# 「みんな星徒会室に集まってるけど……まだ、気になってるのか？」
line = "「みんな星徒会室に集まってるけど……まだ、気になってるのか？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「うん──まあね」
line = "「うん──まあね」"

[[dialogue]]
speaker = "unk"
# 彼女が開いたのは例の……未来の日誌だ。
line = "彼女が開いたのは例の……未来の日誌だ。"

[[dialogue]]
speaker = "ヴィーナス"
# 『<ruby=あらたか>荒鷹</ruby>ノ月十六日。“魔王”は着実に力を取り戻していき、かつての片鱗を見せ始める』
line = "『<ruby>荒鷹<rt>あらたか</rt></ruby>ノ月十六日。“魔王”は着実に力を取り戻していき、かつての片鱗を見せ始める』"

[[dialogue]]
speaker = "ヴィーナス"
# 『人間界にさしたる異変はなし。星雲巣の脅威もなき今のうちに、対リクリエの準備を進めるとしよう……』
line = "『人間界にさしたる異変はなし。星雲巣の脅威もなき今のうちに、対リクリエの準備を進めるとしよう……』"

[[dialogue]]
speaker = "ヴィーナス"
# 「……って書いてあるけど。アテになるかはわからないわね」
line = "「……って書いてあるけど。アテになるかはわからないわね」"

[[dialogue]]
speaker = "クロト"
# 「ヴィーナス……」
line = "「ヴィーナス……」"

[[dialogue]]
speaker = "unk"
# 物憂げに笑うヴィーナス。
line = "物憂げに笑うヴィーナス。"

[[dialogue]]
speaker = "unk"
# 彼女のこんな面持ちは初めて見た。
line = "彼女のこんな面持ちは初めて見た。"

[[dialogue]]
speaker = "unk"
# 敗戦──というわけでもなかったが、絶対と信じていた未来の日誌を裏切られた衝撃が大きいのだろう。
line = "敗戦──というわけでもなかったが、絶対と信じていた未来の日誌を裏切られた衝撃が大きいのだろう。"

[[dialogue]]
speaker = "クロト"
# 「……ちょっと来てくれないか？」
line = "「……ちょっと来てくれないか？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「？　いいけど」
line = "「？　いいけど」"

[[dialogue]]
speaker = "unk"
# 俺は、沈み気味なヴィーナスを連れてトレーニングホールを出た。
line = "俺は、沈み気味なヴィーナスを連れてトレーニングホールを出た。"

[[dialogue]]
speaker = "unk"
# 大聖堂を訪れた俺たち。
line = "大聖堂を訪れた俺たち。"

[[dialogue]]
speaker = "unk"
# 今はちょうど人もほとんどおらず、異端な話をするにはうってつけだった。
line = "今はちょうど人もほとんどおらず、異端な話をするにはうってつけだった。"

[[dialogue]]
speaker = "クロト"
# 「ヴィーナスは前に……言ってたよな。魔王は英雄なんだって」
line = "「ヴィーナスは前に……言ってたよな。魔王は英雄なんだって」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええ」
line = "「ええ」"

[[dialogue]]
speaker = "クロト"
# 「あの子──アポロも、俺のことを“魔王”と呼んだ」
line = "「あの子──アポロも、俺のことを“魔王”と呼んだ」"

[[dialogue]]
speaker = "クロト"
# 「これは偶然か？」
line = "「これは偶然か？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「偶然……では、ないでしょうね。恐らくだけどあの子も──何らかの経緯でクロトこそ魔王だと確信してる」
line = "「偶然……では、ないでしょうね。恐らくだけどあの子も──何らかの経緯でクロトこそ魔王だと確信してる」"

[[dialogue]]
speaker = "クロト"
# 「何らかの経緯か……ヴィーナスにとっては、それが」
line = "「何らかの経緯か……ヴィーナスにとっては、それが」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええ。例の日誌だった」
line = "「ええ。例の日誌だった」"

[[dialogue]]
speaker = "unk"
# 緋宮クロトこそが魔王である。
line = "緋宮クロトこそが魔王である。"

[[dialogue]]
speaker = "unk"
# 他の情報を一切捨て置いたとしても、かの日誌にはそう記されていたという。
line = "他の情報を一切捨て置いたとしても、かの日誌にはそう記されていたという。"

[[dialogue]]
speaker = "ヴィーナス"
# 「<b>魔王</b>は──前回のリクリエを食い止め、世界を救った英雄のこと」
line = "「<b>魔王</b>は──前回のリクリエを食い止め、世界を救った英雄のこと」"

[[dialogue]]
speaker = "ヴィーナス"
# 「だから私には使命があったの。緋宮クロトを鍛え直すっていう」
line = "「だから私には使命があったの。緋宮クロトを鍛え直すっていう」"

[[dialogue]]
speaker = "クロト"
# 「使命……」
line = "「使命……」"

[[dialogue]]
speaker = "unk"
# それについては前回、聞きそびれてしまった内容だった。
line = "それについては前回、聞きそびれてしまった内容だった。"

[[dialogue]]
speaker = "ヴィーナス"
# 『黄雀ノ月三日。緋宮クロトが新星学園へ入学する』
line = "『黄雀ノ月三日。緋宮クロトが新星学園へ入学する』"

[[dialogue]]
speaker = "ヴィーナス"
# 『黄雀ノ月四日。私は彼に眠る“魔王”の素質を引き出すべく、退学を懸けた御前試合を突きつける』
line = "『黄雀ノ月四日。私は彼に眠る“魔王”の素質を引き出すべく、退学を懸けた御前試合を突きつける』"

[[dialogue]]
speaker = "ヴィーナス"
# 『今の彼ではリクリエに抗し得ない。世界を救うためにも、試練を与えなくてはならない』
line = "『今の彼ではリクリエに抗し得ない。世界を救うためにも、試練を与えなくてはならない』"

[[dialogue]]
speaker = "クロト"
# 「！」
line = "「！」"

[[dialogue]]
speaker = "ヴィーナス"
# 『黄雀ノ月十一日。彼と一対一の勝負を執り行い、私は全力を尽くすも敗れる。彼は自身に眠る“魔王”としての力の一部を開花させる』
line = "『黄雀ノ月十一日。彼と一対一の勝負を執り行い、私は全力を尽くすも敗れる。彼は自身に眠る“魔王”としての力の一部を開花させる』"

[[dialogue]]
speaker = "ヴィーナス"
# 『その後、新星学園星徒会は彼を中心とした新たな組織に生まれ変わる。リクリエを阻止すべく、魔王を育む揺籃として……』
line = "『その後、新星学園星徒会は彼を中心とした新たな組織に生まれ変わる。リクリエを阻止すべく、魔王を育む揺籃として……』"

[[dialogue]]
speaker = "unk"
# ヴィーナスが読み上げた内容。
line = "ヴィーナスが読み上げた内容。"

[[dialogue]]
speaker = "unk"
# それは、俺が入学してから今の体制に至るまでの記述だった。
line = "それは、俺が入学してから今の体制に至るまでの記述だった。"

[[dialogue]]
speaker = "クロト"
# 「それも……俺が来る前から書かれていた、ってことなのか」
line = "「それも……俺が来る前から書かれていた、ってことなのか」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええ。私は、あなたを覚醒させるための存在だった。ううん今もそう」
line = "「ええ。私は、あなたを覚醒させるための存在だった。ううん今もそう」"

[[dialogue]]
speaker = "ヴィーナス"
# 「魔王として。英雄として。クロトを今より、もっともっと強くしなくちゃって思ってる」
line = "「魔王として。英雄として。クロトを今より、もっともっと強くしなくちゃって思ってる」"

[[dialogue]]
speaker = "unk"
# ヴィーナスは真剣にそう語った。
line = "ヴィーナスは真剣にそう語った。"

[[dialogue]]
speaker = "ヴィーナス"
# 「私は……この日誌に従っていれば、全部うまくいくと思っていたの」
line = "「私は……この日誌に従っていれば、全部うまくいくと思っていたの」"

[[dialogue]]
speaker = "unk"
# 全てが日誌の通りに行けば、俺が《魔王》の力に目覚めてリクリエを打破する──そんな未来が待っているはずだった。
line = "全てが日誌の通りに行けば、俺が《魔王》の力に目覚めてリクリエを打破する──そんな未来が待っているはずだった。"

[[dialogue]]
speaker = "unk"
# そんな、いわばハッピーエンドまでの台本を改ざんされてしまったからこそ、ヴィーナスの自信は揺らいでいる。
line = "そんな、いわばハッピーエンドまでの台本を改ざんされてしまったからこそ、ヴィーナスの自信は揺らいでいる。"

[[dialogue]]
speaker = "クロト"
# 「……なるほどな」
line = "「……なるほどな」"

[[dialogue]]
speaker = "クロト"
# 「あの仕合の時、必死に俺に呼びかけていた理由は……よくわかった」
line = "「あの仕合の時、必死に俺に呼びかけていた理由は……よくわかった」"

[[dialogue]]
speaker = "クロト"
# 「だけど」
line = "「だけど」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "unk"
# 肝心なことが聞けていない。
line = "肝心なことが聞けていない。"

[[dialogue]]
speaker = "unk"
# 俺は、距離を詰めて改めて問う。
line = "俺は、距離を詰めて改めて問う。"

[[dialogue]]
speaker = "クロト"
# 「……ヴィーナスは」
line = "「……ヴィーナスは」"

[[dialogue]]
speaker = "クロト"
# 「ヴィーナスは、どうして俺の近くにいてくれる？」
line = "「ヴィーナスは、どうして俺の近くにいてくれる？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「へ、へ……？　だから、日誌に……」
line = "「へ、へ……？　だから、日誌に……」"

[[dialogue]]
speaker = "クロト"
# 「──日誌じゃなくて。いくら台本が決められてたって、ヴィーナスは素直に従うような子でもないだろ」
line = "「──日誌じゃなくて。いくら台本が決められてたって、ヴィーナスは素直に従うような子でもないだろ」"

[[dialogue]]
speaker = "unk"
# 日誌に記されていたから。
line = "日誌に記されていたから。"

[[dialogue]]
speaker = "unk"
# 待ち受ける者として定められていたから。
line = "待ち受ける者として定められていたから。"

[[dialogue]]
speaker = "unk"
# それらはたとえ理由にはなっていたとしても、どれにも彼女本人の意志が介在していない。
line = "それらはたとえ理由にはなっていたとしても、どれにも彼女本人の意志が介在していない。"

[[dialogue]]
speaker = "ヴィーナス"
# 「…………世界を……世界を救ってほしい、から？」
line = "「…………世界を……世界を救ってほしい、から？」"

[[dialogue]]
speaker = "クロト"
# 「それは──<b>俺に</b>じゃなきゃダメなのか？　それとも、力を持つ者なら誰でもよかったのか？」
line = "「それは──<b>俺に</b>じゃなきゃダメなのか？　それとも、力を持つ者なら誰でもよかったのか？」"

[[dialogue]]
speaker = "unk"
# この学園にいる星騎士たちは皆リクリエから世界を救うために活動している。
line = "この学園にいる星騎士たちは皆リクリエから世界を救うために活動している。"

[[dialogue]]
speaker = "unk"
# 大目標であり大前提だ。
line = "大目標であり大前提だ。"

[[dialogue]]
speaker = "unk"
# でも彼女は違う。彼女だけは……<b>俺に</b>救ってほしいと頼んでいる。
line = "でも彼女は違う。彼女だけは……<b>俺に</b>救ってほしいと頼んでいる。"

[[dialogue]]
speaker = "unk"
# 星徒会長として、学園で最強の座に立っていた者のセリフとは思えない他力本願さだ。
line = "星徒会長として、学園で最強の座に立っていた者のセリフとは思えない他力本願さだ。"

[[dialogue]]
speaker = "クロト"
# 「……もし、俺がその魔王だったとしても」
line = "「……もし、俺がその魔王だったとしても」"

[[dialogue]]
speaker = "クロト"
# 「リクリエってやつは……“魔王”じゃなきゃ止められないのか？　他のみんなを鍛えようとはならないのか？」
line = "「リクリエってやつは……“魔王”じゃなきゃ止められないのか？　他のみんなを鍛えようとはならないのか？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それ、は……」
line = "「それ、は……」"

[[dialogue]]
speaker = "unk"
# もし自分じゃ無理だと思ってるなら弱気だし、彼女らしくない。
line = "もし自分じゃ無理だと思ってるなら弱気だし、彼女らしくない。"

[[dialogue]]
speaker = "unk"
# それに……いくら日誌に記されていたからって俺とヴィーナスはあの時が初対面だった。
line = "それに……いくら日誌に記されていたからって俺とヴィーナスはあの時が初対面だった。"

[[dialogue]]
speaker = "unk"
# だけどもし、それ以上の何かがあるのなら。
line = "だけどもし、それ以上の何かがあるのなら。"

[[dialogue]]
speaker = "ヴィーナス"
# 「別にその、嫌々でやってるわけじゃないの……ホントよ！　自分だって頑張るつもりだし。みんなもだし。だから……その……うー……！」
line = "「別にその、嫌々でやってるわけじゃないの……ホントよ！　自分だって頑張るつもりだし。みんなもだし。だから……その……うー……！」"

[[dialogue]]
speaker = "unk"
# ヴィーナスの顔がみるみる俯いていく。
line = "ヴィーナスの顔がみるみる俯いていく。"

[[dialogue]]
speaker = "unk"
# うまく言えなくてもどかしいのか、ようやく顔を上げた頃には吹っ切れていた。
line = "うまく言えなくてもどかしいのか、ようやく顔を上げた頃には吹っ切れていた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「んんんん…………わかんない！　けど私はそういうものなんだって思って、ずっとクロトのことを待ってた」
line = "「んんんん…………わかんない！　けど私はそういうものなんだって思って、ずっとクロトのことを待ってた」"

[[dialogue]]
speaker = "ヴィーナス"
# 「だからさっきの質問に答えるなら──そう！　私はクロトがいいの！　クロトじゃなきゃダメなの！　それが本音！」
line = "「だからさっきの質問に答えるなら──そう！　私はクロトがいいの！　クロトじゃなきゃダメなの！　それが本音！」"

[[dialogue]]
speaker = "クロト"
# 「そ──そうか……なら、いいんだけど」
line = "「そ──そうか……なら、いいんだけど」"

[[dialogue]]
speaker = "unk"
# 今度は逆に距離を詰められてしまった。
line = "今度は逆に距離を詰められてしまった。"

[[dialogue]]
speaker = "unk"
# 顔と顔の距離が近くて、ヘンにどぎまぎしてしまう。
line = "顔と顔の距離が近くて、ヘンにどぎまぎしてしまう。"

[[dialogue]]
speaker = "ヴィーナス"
# 「リクリエが魔王じゃなきゃ止められないのかどうかは……わかんない。でも、前回からしてもその線が濃厚で」
line = "「リクリエが魔王じゃなきゃ止められないのかどうかは……わかんない。でも、前回からしてもその線が濃厚で」"

[[dialogue]]
speaker = "ヴィーナス"
# 「日誌に書かれてたのも……これは私の使命なんだって。言われてる気がして」
line = "「日誌に書かれてたのも……これは私の使命なんだって。言われてる気がして」"

[[dialogue]]
speaker = "クロト"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "マグダレナ"
# 「御子よ。あなたはあなたの使命を果たすのです。あなたは、既にそれを授かっているはず」
line = "「御子よ。あなたはあなたの使命を果たすのです。あなたは、既にそれを授かっているはず」"

[[dialogue]]
speaker = "unk"
# あれはかつて──
line = "あれはかつて──"

[[dialogue]]
speaker = "unk"
# フィーニス第一層の最奥で、守護天使さんに言われた言葉だったか。
line = "フィーニス第一層の最奥で、守護天使さんに言われた言葉だったか。"

[[dialogue]]
speaker = "クロト"
# （まだ、俺も彼女も知らない謎が俺たちにはある。恐らく）
line = "（まだ、俺も彼女も知らない謎が俺たちにはある。恐らく）"

[[dialogue]]
speaker = "クロト"
# （その謎こそが、ヴィーナスが俺にこだわる理由で、本当の因果。でも今の彼女には言語化ができない）
line = "（その謎こそが、ヴィーナスが俺にこだわる理由で、本当の因果。でも今の彼女には言語化ができない）"

[[dialogue]]
speaker = "クロト"
# （そしてヴィーナスの記憶には鍵がかかっている。それを外すには……）
line = "（そしてヴィーナスの記憶には鍵がかかっている。それを外すには……）"
