[[dialogue]]
speaker = "unk"
# 第１話,生真面目な１年生,P
line = "第１話,生真面目な１年生,P"

[[dialogue]]
speaker = "ソフィア"
# 「くちゅんっ」
line = "「くちゅんっ」"

[[dialogue]]
speaker = "ソフィア"
# 「うぅ……ビル風がコールド……どうして皆さんは平気なんですか……？」
line = "「うぅ……ビル風がコールド……どうして皆さんは平気なんですか……？」"

[[dialogue]]
speaker = "unk"
# 大丈夫？
line = "大丈夫？"

[[dialogue]]
speaker = "ソフィア"
# 「ああいえ、大丈夫です。お気遣いありがとうございます」
line = "「ああいえ、大丈夫です。お気遣いありがとうございます」"

[[dialogue]]
speaker = "ソフィア"
# 「――って、新星学園の星徒会長さんじゃないですか。こんにちは、流星学園星徒会書記の奏ソフィアです」
line = "「――って、新星学園の星徒会長さんじゃないですか。こんにちは、流星学園星徒会書記の奏ソフィアです」"

[[dialogue]]
speaker = "ソフィア"
# 「しばしば附属生と間違われますが、れっきとした本校一年生です。飛び級とかでもありません」
line = "「しばしば附属生と間違われますが、れっきとした本校一年生です。飛び級とかでもありません」"

[[dialogue]]
speaker = "unk"
# （念を押された）
line = "（念を押された）"

[[dialogue]]
speaker = "ソフィア"
# 「そんな私はただいま街のパトロールをしているところです」
line = "「そんな私はただいま街のパトロールをしているところです」"

[[dialogue]]
speaker = "ソフィア"
# 「流星学園と新星学園の星徒会は、生徒を代表してモンスターやアステラに対処し、リクリエに対抗するのが本分ですから」
line = "「流星学園と新星学園の星徒会は、生徒を代表してモンスターやアステラに対処し、リクリエに対抗するのが本分ですから」"

[[dialogue]]
speaker = "ソフィア"
# 「とはいえモンスターの発生場所がわかるわけではありませんし、パトロールができるのも手が空いている時だけですが……」
line = "「とはいえモンスターの発生場所がわかるわけではありませんし、パトロールができるのも手が空いている時だけですが……」"

[[dialogue]]
speaker = "ソフィア"
# 「それでは私はこれで……一緒に行く？　いえ、これは私が自主的にしていることですから気にしないでください」
line = "「それでは私はこれで……一緒に行く？　いえ、これは私が自主的にしていることですから気にしないでください」"

[[dialogue]]
speaker = "unk"
# ２人の方が心強いから
line = "２人の方が心強いから"

[[dialogue]]
speaker = "ソフィア"
# 「それは……そうですけど。私の戦力を低く見積もられている気もしなくもないですが、戦闘では不測の事態が起きるもの。単独行動を避けるのはクールな判断です」
line = "「それは……そうですけど。私の戦力を低く見積もられている気もしなくもないですが、戦闘では不測の事態が起きるもの。単独行動を避けるのはクールな判断です」"

[[dialogue]]
speaker = "ソフィア"
# 「でもいいんですか？　会長さんも何か用事があったのでは……」
line = "「でもいいんですか？　会長さんも何か用事があったのでは……」"

[[dialogue]]
speaker = "ソフィア"
# 「ただの買い物──そうですか。ではよろしくお願いします、会長さん。とりあえずこの辺りを一回り……」
line = "「ただの買い物──そうですか。ではよろしくお願いします、会長さん。とりあえずこの辺りを一回り……」"

[[dialogue]]
speaker = "ソフィア"
# 「じー……」
line = "「じー……」"

[[dialogue]]
speaker = "ソフィア"
# 「あ、いえ、何も見てませんよ、何も。気になるお店とかありませんから」
line = "「あ、いえ、何も見てませんよ、何も。気になるお店とかありませんから」"

[[dialogue]]
speaker = "ソフィア"
# 「ところで、前会長に“御前試合”で勝利して会長になったとホットな話題になりましたが、どうしてそんなことになったんですか？」
line = "「ところで、前会長に“御前試合”で勝利して会長になったとホットな話題になりましたが、どうしてそんなことになったんですか？」"

[[dialogue]]
speaker = "ソフィア"
# 「よくわからない？　成り行き？　それは……すごいですね、会長さんも、ヴィーナスさんも」
line = "「よくわからない？　成り行き？　それは……すごいですね、会長さんも、ヴィーナスさんも」"

[[dialogue]]
speaker = "ソフィア"
# 「……え、私が星徒会に入った理由ですか？」
line = "「……え、私が星徒会に入った理由ですか？」"

[[dialogue]]
speaker = "ソフィア"
# 「それはですねっ、あれは私が流星学園に入学したばかりの頃……フィオナ会長を一目見た瞬間、まばゆいオーラに目を奪われました」
line = "「それはですねっ、あれは私が流星学園に入学したばかりの頃……フィオナ会長を一目見た瞬間、まばゆいオーラに目を奪われました」"

[[dialogue]]
speaker = "ソフィア"
# 「文武両道、眉目秀麗……聡明で、知的で、物腰柔らかく優雅で、でも戦闘の時は凛々しくて、フィオナ会長はまさしく私の理想でした」
line = "「文武両道、眉目秀麗……聡明で、知的で、物腰柔らかく優雅で、でも戦闘の時は凛々しくて、フィオナ会長はまさしく私の理想でした」"

[[dialogue]]
speaker = "ソフィア"
# 「まさに完璧を形にしたようでした。ひとつしか年が違わないのに、こんな人が本当にいるのかと衝撃を受けたくらいです」
line = "「まさに完璧を形にしたようでした。ひとつしか年が違わないのに、こんな人が本当にいるのかと衝撃を受けたくらいです」"

[[dialogue]]
speaker = "ソフィア"
# 「何せ私の周りの年上の女性といえば……いえ、それは置いておくとして」
line = "「何せ私の周りの年上の女性といえば……いえ、それは置いておくとして」"

[[dialogue]]
speaker = "ソフィア"
# 「フィオナ会長は、私の出会った中で最も尊敬する人と言っても過言ではありません」
line = "「フィオナ会長は、私の出会った中で最も尊敬する人と言っても過言ではありません」"

[[dialogue]]
speaker = "ソフィア"
# 「ですからフィオナ会長に近づくために、フィオナ会長のような人になるために星徒会を志したのですっ」
line = "「ですからフィオナ会長に近づくために、フィオナ会長のような人になるために星徒会を志したのですっ」"

[[dialogue]]
speaker = "ソフィア"
# 「……あ」
line = "「……あ」"

[[dialogue]]
speaker = "ソフィア"
# 「──コホン。すみません、ついヒートアップしてしまいました。パトロールを続けましょう」
line = "「──コホン。すみません、ついヒートアップしてしまいました。パトロールを続けましょう」"

[[dialogue]]
speaker = "ソフィア"
# （チラッ）
line = "（チラッ）"

[[dialogue]]
speaker = "ソフィア"
# 「いえ、何でもないです。集中しましょう」
line = "「いえ、何でもないです。集中しましょう」"

[[dialogue]]
speaker = "ソフィア"
# 「お疲れさ──くちゅんっ」
line = "「お疲れさ──くちゅんっ」"

[[dialogue]]
speaker = "ソフィア"
# 「失礼しました。いつものことですのでお気になさらず」
line = "「失礼しました。いつものことですのでお気になさらず」"

[[dialogue]]
speaker = "ソフィア"
# 「改めてお疲れ様でした。何事もなくて良かったです」
line = "「改めてお疲れ様でした。何事もなくて良かったです」"

[[dialogue]]
speaker = "unk"
# さっき見ていたお店に行く？
line = "さっき見ていたお店に行く？"

[[dialogue]]
speaker = "ソフィア"
# 「べ、別に私はパンケーキのお店なんて気になってませんからっ。今日は遊びではなくパトロールに来たんですから──」
line = "「べ、別に私はパンケーキのお店なんて気になってませんからっ。今日は遊びではなくパトロールに来たんですから──」"

[[dialogue]]
speaker = "ソフィア"
# 「──あっ！？　いえっ、パンケーキが好きなわけじゃないですっ！　たまたま目に付いただけですからっ！」
line = "「──あっ！？　いえっ、パンケーキが好きなわけじゃないですっ！　たまたま目に付いただけですからっ！」"

[[dialogue]]
speaker = "ソフィア"
# 「……え？　パトロールに付き合ったから、代わりに付き合ってほしい？　雰囲気的に男一人じゃ入れない？」
line = "「……え？　パトロールに付き合ったから、代わりに付き合ってほしい？　雰囲気的に男一人じゃ入れない？」"

[[dialogue]]
speaker = "ソフィア"
# 「そこまで言うなら……行きましょうか。でも遊びじゃないですからね。栄養補給ですから。いいですね？」
line = "「そこまで言うなら……行きましょうか。でも遊びじゃないですからね。栄養補給ですから。いいですね？」"
