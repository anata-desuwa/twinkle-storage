[[dialogue]]
speaker = "unk"
# 第１１話,２０００年前の魔王,B
line = "第１１話,２０００年前の魔王,B"

[[dialogue]]
speaker = "ケイティ"
# 「フッ──！」
line = "「フッ──！」"

[[dialogue]]
speaker = "unk"
# ケイティさんの大剣が極星従騎の首を絶ち、残骸が光となって消えていく。
line = "ケイティさんの大剣が極星従騎の首を絶ち、残骸が光となって消えていく。"

[[dialogue]]
speaker = "ケイティ"
# 「ふぅ……これが極星従騎……噂に違わぬ強敵でした」
line = "「ふぅ……これが極星従騎……噂に違わぬ強敵でした」"

[[dialogue]]
speaker = "ナターシャ"
# 「とか言ってバッサリじゃん。さすが制圧天使だね」
line = "「とか言ってバッサリじゃん。さすが制圧天使だね」"

[[dialogue]]
speaker = "ケイティ"
# 「だからその名前はやめてください……」
line = "「だからその名前はやめてください……」"

[[dialogue]]
speaker = "クロト"
# （確かに制圧天使の名に恥じない戦いぶりだったな……）
line = "（確かに制圧天使の名に恥じない戦いぶりだったな……）"

[[dialogue]]
speaker = "unk"
# お淑やかな人だから、どんな戦い方をするのかと思いきや、二振りの大剣を用いての正面切っての斬り合いだった。
line = "お淑やかな人だから、どんな戦い方をするのかと思いきや、二振りの大剣を用いての正面切っての斬り合いだった。"

[[dialogue]]
speaker = "unk"
# 見かけに似合わぬ剛腕で、さすが衛兵隊長だ。
line = "見かけに似合わぬ剛腕で、さすが衛兵隊長だ。"

[[dialogue]]
speaker = "ケイティ"
# 「では今のうちに女神様の神殿へ向かいましょう。私は聖庭園を離れることはできませんが、途中までは同行いたします」
line = "「では今のうちに女神様の神殿へ向かいましょう。私は聖庭園を離れることはできませんが、途中までは同行いたします」"

[[dialogue]]
speaker = "ナターシャ"
# 「それじゃ、私と姉さんについてきて」
line = "「それじゃ、私と姉さんについてきて」"

[[dialogue]]
speaker = "クロト"
# 「ああ、よろしく頼む！」
line = "「ああ、よろしく頼む！」"

[[dialogue]]
speaker = "unk"
# 聖庭園議会を離れ、ナターシャとケイティさんの案内で女神の神殿を目指す。
line = "聖庭園議会を離れ、ナターシャとケイティさんの案内で女神の神殿を目指す。"

[[dialogue]]
speaker = "unk"
# ここは聖庭園のはずれで、視界の先には空と雲、そして空中島の群れが見える。
line = "ここは聖庭園のはずれで、視界の先には空と雲、そして空中島の群れが見える。"

[[dialogue]]
speaker = "アポロ"
# 「おお～、すごい眺めだ！　神殿に行く途中じゃなかったら、もっと見ていたかったんだけどな」
line = "「おお～、すごい眺めだ！　神殿に行く途中じゃなかったら、もっと見ていたかったんだけどな」"

[[dialogue]]
speaker = "ベアトリス"
# 「でも女神の神殿は大丈夫かな？　極星従騎の襲撃からけっこう経つんだよね？　今頃危ないんじゃ……」
line = "「でも女神の神殿は大丈夫かな？　極星従騎の襲撃からけっこう経つんだよね？　今頃危ないんじゃ……」"

[[dialogue]]
speaker = "ケイティ"
# 「女神様の神殿には強力なガーディアンが配置されており、侵入者を迎撃します。そう簡単に近づくことはできません」
line = "「女神様の神殿には強力なガーディアンが配置されており、侵入者を迎撃します。そう簡単に近づくことはできません」"

[[dialogue]]
speaker = "梨緒"
# 「だが相手は極星星徒会だ。突破してくるのも時間の問題だろう」
line = "「だが相手は極星星徒会だ。突破してくるのも時間の問題だろう」"

[[dialogue]]
speaker = "ヴィーナス"
# 「でも女神の神殿って、とっても大事な場所なんでしょ？　どうして聖庭園だけが場所を知ってるの？」
line = "「でも女神の神殿って、とっても大事な場所なんでしょ？　どうして聖庭園だけが場所を知ってるの？」"

[[dialogue]]
speaker = "ナターシャ"
# 「存在ごと忘却して隠そうとしたんだよ。神殿を守るためにね」
line = "「存在ごと忘却して隠そうとしたんだよ。神殿を守るためにね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「忘却？」
line = "「忘却？」"

[[dialogue]]
speaker = "ナターシャ"
# 「太陽の壁画ってあるよね？　絵に描かれてるものはともかく、アレ、内容的には嘘じゃないんだよ」
line = "「太陽の壁画ってあるよね？　絵に描かれてるものはともかく、アレ、内容的には嘘じゃないんだよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「んん？　どうして壁画の話になるのよ？　今そんな話してる場合じゃないでしょ？」
line = "「んん？　どうして壁画の話になるのよ？　今そんな話してる場合じゃないでしょ？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それに正しいのは『月の壁画』で、魔王は世界を救った英雄。悪の魔王が倒されるのを描いた『太陽の壁画』は真っ赤な嘘よ！」
line = "「それに正しいのは『月の壁画』で、魔王は世界を救った英雄。悪の魔王が倒されるのを描いた『太陽の壁画』は真っ赤な嘘よ！」"

[[dialogue]]
speaker = "unk"
# 『太陽の壁画』は、流星市国のファリア大聖堂に収められている画だ。
line = "『太陽の壁画』は、流星市国のファリア大聖堂に収められている画だ。"

[[dialogue]]
speaker = "unk"
# 人間・魔族・天使の三種族が力を合わせ、世界を破滅に導こうとした魔王を打ち倒した様子が描かれている。
line = "人間・魔族・天使の三種族が力を合わせ、世界を破滅に導こうとした魔王を打ち倒した様子が描かれている。"

[[dialogue]]
speaker = "unk"
# 一般の人々にはこちらの内容が信じられており、魔王は悪の存在と認識されている。
line = "一般の人々にはこちらの内容が信じられており、魔王は悪の存在と認識されている。"

[[dialogue]]
speaker = "unk"
# 一方、星見家で保管されている『月の壁画』は、魔王がリクリエに勝利した場面を画にしたものだ。
line = "一方、星見家で保管されている『月の壁画』は、魔王がリクリエに勝利した場面を画にしたものだ。"

[[dialogue]]
speaker = "unk"
# 俺やヴィーナスはこの『月の壁画』が真実だと思っていたのだが……
line = "俺やヴィーナスはこの『月の壁画』が真実だと思っていたのだが……"

[[dialogue]]
speaker = "ナターシャ"
# 「それがね、『太陽の壁画』と『月の壁画』はどっちも本当なんだよ」
line = "「それがね、『太陽の壁画』と『月の壁画』はどっちも本当なんだよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「はぁっ！？」
line = "「はぁっ！？」"

[[dialogue]]
speaker = "ナターシャ"
# 「魔王と呼ばれる存在は、ラクシスだけじゃなかったってこと」
line = "「魔王と呼ばれる存在は、ラクシスだけじゃなかったってこと」"

[[dialogue]]
speaker = "ナターシャ"
# 「『月の壁画』は３０００年前のもので、リクリエに打ち克った魔王ラクシスを描いたもの」
line = "「『月の壁画』は３０００年前のもので、リクリエに打ち克った魔王ラクシスを描いたもの」"

[[dialogue]]
speaker = "ナターシャ"
# 「だけど２０００年前にも魔王は現れた。ラクシスの子孫である彼は──彼女かもしれないけど、彼にしとくね」
line = "「だけど２０００年前にも魔王は現れた。ラクシスの子孫である彼は──彼女かもしれないけど、彼にしとくね」"

[[dialogue]]
speaker = "ナターシャ"
# 「魔王の血筋に生まれた彼は、英雄の子孫と崇められ、祖先のようにリクリエとの戦いで活躍することを期待されていた」
line = "「魔王の血筋に生まれた彼は、英雄の子孫と崇められ、祖先のようにリクリエとの戦いで活躍することを期待されていた」"

[[dialogue]]
speaker = "ナターシャ"
# 「だけどそれが驕りを生んだのか、彼はいつしかよからぬ野望を抱くようになり、彼は三界の支配を企てて世界に破壊を巻き起こした」
line = "「だけどそれが驕りを生んだのか、彼はいつしかよからぬ野望を抱くようになり、彼は三界の支配を企てて世界に破壊を巻き起こした」"

[[dialogue]]
speaker = "ナターシャ"
# 「その後、三種族が力を合わせて悪い魔王を倒したってわけ」
line = "「その後、三種族が力を合わせて悪い魔王を倒したってわけ」"

[[dialogue]]
speaker = "ナターシャ"
# 「太陽の壁画は、悪の魔王が生まれてしまったことを踏まえ、『魔王に頼りきりにならずに自分たちもリクリエと戦おう』って反省を表したものだった」
line = "「太陽の壁画は、悪の魔王が生まれてしまったことを踏まえ、『魔王に頼りきりにならずに自分たちもリクリエと戦おう』って反省を表したものだった」"

[[dialogue]]
speaker = "ナターシャ"
# 「まぁ、それが後世では『魔王は悪者だった』ってことにされちゃったんだけどね」
line = "「まぁ、それが後世では『魔王は悪者だった』ってことにされちゃったんだけどね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「太陽の壁画にはそんな意味があったのね……」
line = "「太陽の壁画にはそんな意味があったのね……」"

[[dialogue]]
speaker = "unk"
# ラクシスと俺の間に魔王と呼ばれる者がいたとは知らなかった。
line = "ラクシスと俺の間に魔王と呼ばれる者がいたとは知らなかった。"

[[dialogue]]
speaker = "unk"
# そして『太陽の壁画』が、真実を上塗りするための虚構ではなく、これもまた事実の断片であったことにも驚く。
line = "そして『太陽の壁画』が、真実を上塗りするための虚構ではなく、これもまた事実の断片であったことにも驚く。"

[[dialogue]]
speaker = "アポロ"
# 「おぉ～、知られざる歴史ってやつだな！　なんかカッコイイぞ！」
line = "「おぉ～、知られざる歴史ってやつだな！　なんかカッコイイぞ！」"

[[dialogue]]
speaker = "アポロ"
# 「だけどあたし以外にも、悪に堕ちた魔王がいたんだな……」
line = "「だけどあたし以外にも、悪に堕ちた魔王がいたんだな……」"

[[dialogue]]
speaker = "ベアトリス"
# 「いやいや、アポロちゃんはリクリエの使徒だったんだし、また別じゃないかな？」
line = "「いやいや、アポロちゃんはリクリエの使徒だったんだし、また別じゃないかな？」"

[[dialogue]]
speaker = "ナターシャ"
# 「うーん、あながち別でもないかもね？　リクリエ側の誰かが２０００年前の魔王を唆したのかもしれないし」
line = "「うーん、あながち別でもないかもね？　リクリエ側の誰かが２０００年前の魔王を唆したのかもしれないし」"

[[dialogue]]
speaker = "ナターシャ"
# 「ま、２０００年前の出来事をあれこれ言っても仕方ないかな。私が『太陽の壁画』について知ってることは以上だよ」
line = "「ま、２０００年前の出来事をあれこれ言っても仕方ないかな。私が『太陽の壁画』について知ってることは以上だよ」"

[[dialogue]]
speaker = "クロト"
# 「だけど、どうして君がそんなことを知っているんだ？　まさかナターシャも魔王の子孫……？」
line = "「だけど、どうして君がそんなことを知っているんだ？　まさかナターシャも魔王の子孫……？」"

[[dialogue]]
speaker = "ナターシャ"
# 「そんなわけないじゃん。だったらとっくに覚醒して大暴れしてるって」
line = "「そんなわけないじゃん。だったらとっくに覚醒して大暴れしてるって」"

[[dialogue]]
speaker = "ナターシャ"
# 「でも聖庭園直属の私がこういう話をするってことは、どういう繋がりか分かるんじゃない？」
line = "「でも聖庭園直属の私がこういう話をするってことは、どういう繋がりか分かるんじゃない？」"

[[dialogue]]
speaker = "unk"
# そう、ナターシャは天界の聖庭園のエージェント。
line = "そう、ナターシャは天界の聖庭園のエージェント。"

[[dialogue]]
speaker = "unk"
# そして聖庭園には、魔王の系譜たるリガルタ翁がいると聞いている。
line = "そして聖庭園には、魔王の系譜たるリガルタ翁がいると聞いている。"

[[dialogue]]
speaker = "クロト"
# 「まさか──」
line = "「まさか──」"

[[dialogue]]
speaker = "ナターシャ"
# 「そう、リガルタは２０００年前に世界を破壊しようとした魔王の血族だよ」
line = "「そう、リガルタは２０００年前に世界を破壊しようとした魔王の血族だよ」"

[[dialogue]]
speaker = "ナターシャ"
# 「どうして『太陽の壁画』と『月の壁画』の真実が明かされないか。それは現存する魔王の血族の迫害に繋がる可能性があるから」
line = "「どうして『太陽の壁画』と『月の壁画』の真実が明かされないか。それは現存する魔王の血族の迫害に繋がる可能性があるから」"

[[dialogue]]
speaker = "ナターシャ"
# 「結局のところ、魔王の系譜にある者が一度悪に堕ちた事実は変わらないからね」
line = "「結局のところ、魔王の系譜にある者が一度悪に堕ちた事実は変わらないからね」"

[[dialogue]]
speaker = "メルエル"
# 「ナターシャちゃんはそこまで知ってたんだ……」
line = "「ナターシャちゃんはそこまで知ってたんだ……」"

[[dialogue]]
speaker = "ナターシャ"
# 「まぁ仕事柄ね。だけど個人の名誉に関わる話だから、今聞いたことはオフレコでお願い」
line = "「まぁ仕事柄ね。だけど個人の名誉に関わる話だから、今聞いたことはオフレコでお願い」"

[[dialogue]]
speaker = "メルエル"
# 「うん。２０００年前の魔王や、リガルタ様のことは絶対言わないよ」
line = "「うん。２０００年前の魔王や、リガルタ様のことは絶対言わないよ」"

[[dialogue]]
speaker = "ナターシャ"
# 「……うん、よろしく」
line = "「……うん、よろしく」"

[[dialogue]]
speaker = "ヴィーナス"
# 「で、その２０００年前の魔王がどうして女神の神殿と関係あるのよ」
line = "「で、その２０００年前の魔王がどうして女神の神殿と関係あるのよ」"

[[dialogue]]
speaker = "ナターシャ"
# 「世界を支配しようとした彼は、女神の神殿を占拠することで、天界全体を人質にとった」
line = "「世界を支配しようとした彼は、女神の神殿を占拠することで、天界全体を人質にとった」"

[[dialogue]]
speaker = "ナターシャ"
# 「その反省として、ガーディアンが配置され、その所在も隠されてたってわけ」
line = "「その反省として、ガーディアンが配置され、その所在も隠されてたってわけ」"

[[dialogue]]
speaker = "梨緒"
# 「なるほど……そういう経緯があったのか」
line = "「なるほど……そういう経緯があったのか」"

[[dialogue]]
speaker = "unk"
# ベガの俺がディザスターハンドになったように、魔王は悪に堕ちる可能性を持った存在だ。
line = "ベガの俺がディザスターハンドになったように、魔王は悪に堕ちる可能性を持った存在だ。"

[[dialogue]]
speaker = "unk"
# ナターシャが語った通り、２０００年前の魔王もその『可能性』に染まってしまったのだろう。
line = "ナターシャが語った通り、２０００年前の魔王もその『可能性』に染まってしまったのだろう。"

[[dialogue]]
speaker = "アポロ"
# 「女神の神殿の場所が秘密になっている理由はわかった。だが今のところ空しか見えないぞ？」
line = "「女神の神殿の場所が秘密になっている理由はわかった。だが今のところ空しか見えないぞ？」"

[[dialogue]]
speaker = "ケイティ"
# 「女神様の神殿は雲に紛れ、星の公転のごとく天界の空を周回しています。今の季節ならここから東に飛んだところに……」
line = "「女神様の神殿は雲に紛れ、星の公転のごとく天界の空を周回しています。今の季節ならここから東に飛んだところに……」"

[[dialogue]]
speaker = "ナターシャ"
# 「あ、あった。視力強化の星術使ったら見えたよ」
line = "「あ、あった。視力強化の星術使ったら見えたよ」"

[[dialogue]]
speaker = "unk"
# まだ距離が遠くて俺たちには見えないが、ナターシャの目は神殿の姿をしっかり捉えたようだ。
line = "まだ距離が遠くて俺たちには見えないが、ナターシャの目は神殿の姿をしっかり捉えたようだ。"

[[dialogue]]
speaker = "ナターシャ"
# 「じゃあ姉さん。私たちここから飛ばしていくから」
line = "「じゃあ姉さん。私たちここから飛ばしていくから」"

[[dialogue]]
speaker = "ケイティ"
# 「はい、私は聖庭園に戻ります。皆さん、ご武運を！」
line = "「はい、私は聖庭園に戻ります。皆さん、ご武運を！」"

[[dialogue]]
speaker = "メルエル"
# 「うん、ケイティお姉ちゃんも聖庭園の防衛頑張って！」
line = "「うん、ケイティお姉ちゃんも聖庭園の防衛頑張って！」"

[[dialogue]]
speaker = "梨緒"
# 「行けるか、ベアト？　おそらく極星星徒会とぶつかることになるぞ」
line = "「行けるか、ベアト？　おそらく極星星徒会とぶつかることになるぞ」"

[[dialogue]]
speaker = "ベアトリス"
# 「うん、大丈夫。天界を守らないといけないから」
line = "「うん、大丈夫。天界を守らないといけないから」"

[[dialogue]]
speaker = "ベアトリス"
# 「それに天界を消滅させるなんて残酷なこと、レティシアちゃんやグレイスちゃんにさせたくない！」
line = "「それに天界を消滅させるなんて残酷なこと、レティシアちゃんやグレイスちゃんにさせたくない！」"

[[dialogue]]
speaker = "アポロ"
# 「それでこそベアトだ。頼りにしてるぞ！」
line = "「それでこそベアトだ。頼りにしてるぞ！」"

[[dialogue]]
speaker = "クロト"
# 「よし行こう、みんな！　天界を守るぞ！」
line = "「よし行こう、みんな！　天界を守るぞ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええ、何としてでも極星星徒会を止めるわよ！」
line = "「ええ、何としてでも極星星徒会を止めるわよ！」"

[[dialogue]]
speaker = "unk"
# ケイティさんに見送られながら、女神の神殿に向かって全速力で飛び出した。
line = "ケイティさんに見送られながら、女神の神殿に向かって全速力で飛び出した。"
