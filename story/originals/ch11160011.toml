[[dialogue]]
speaker = "unk"
# 第１話,破壊者メテオラ,P
line = "第１話,破壊者メテオラ,P"

[[dialogue]]
speaker = "unk"
# 新星学園襲撃事件の後、捕縛されたコラプサーたちの身柄はネビュラに預けられることになった。
line = "新星学園襲撃事件の後、捕縛されたコラプサーたちの身柄はネビュラに預けられることになった。"

[[dialogue]]
speaker = "unk"
# 様々な信念で動いているコラプサーの中でも、純粋に組織を正義と信じるメテオラは異色な存在だ。
line = "様々な信念で動いているコラプサーの中でも、純粋に組織を正義と信じるメテオラは異色な存在だ。"

[[dialogue]]
speaker = "unk"
# コラプサーの仲間たちと切り離され、不安な毎日を過ごす彼女は、果たしてどんな生活を送っているのだろうか。
line = "コラプサーの仲間たちと切り離され、不安な毎日を過ごす彼女は、果たしてどんな生活を送っているのだろうか。"

[[dialogue]]
speaker = "unk"
# 爛漫な彼女から笑顔が消えていないことを祈るばかりだが──
line = "爛漫な彼女から笑顔が消えていないことを祈るばかりだが──"

[[dialogue]]
speaker = "メテオラ"
# 「うま！　うまいなー！　こんなうまいご飯食べたことないぞ！　リーリア、おかわりー！」
line = "「うま！　うまいなー！　こんなうまいご飯食べたことないぞ！　リーリア、おかわりー！」"

[[dialogue]]
speaker = "unk"
# メテオラは拍子抜けするほど満面の笑顔で、出された昼食を食べていた。
line = "メテオラは拍子抜けするほど満面の笑顔で、出された昼食を食べていた。"

[[dialogue]]
speaker = "リーリア"
# 「一応……というか普通に捕まってる立場なんですが、気にせずもりもり食べてますね……順応し過ぎじゃないですか？」
line = "「一応……というか普通に捕まってる立場なんですが、気にせずもりもり食べてますね……順応し過ぎじゃないですか？」"

[[dialogue]]
speaker = "メテオラ"
# 「もぐもぐ……おー！　魔王だー！　あたしに会いに来たのかー！　あたしも会いたかったぞ！」
line = "「もぐもぐ……おー！　魔王だー！　あたしに会いに来たのかー！　あたしも会いたかったぞ！」"

[[dialogue]]
speaker = "メテオラ"
# 「なーなー、リーリアに聞いたんだけどな？　星騎士が悪いやつじゃないってゆーのはホントか？　魔王も悪いやつじゃないのかー？」
line = "「なーなー、リーリアに聞いたんだけどな？　星騎士が悪いやつじゃないってゆーのはホントか？　魔王も悪いやつじゃないのかー？」"

[[dialogue]]
speaker = "unk"
# 本当だよ
line = "本当だよ"

[[dialogue]]
speaker = "メテオラ"
# 「ホントなのかー……コラプサーのみんなは悪いやつって言ってたのになー」
line = "「ホントなのかー……コラプサーのみんなは悪いやつって言ってたのになー」"

[[dialogue]]
speaker = "キサナ"
# 「星騎士の連中は、毎日旨いものばかり食ってやがんだ。ズリぃと思わねぇか？」
line = "「星騎士の連中は、毎日旨いものばかり食ってやがんだ。ズリぃと思わねぇか？」"

[[dialogue]]
speaker = "メテオラ"
# 「ズリーなー！　あたしも美味いもん食いたいぞ！」
line = "「ズリーなー！　あたしも美味いもん食いたいぞ！」"

[[dialogue]]
speaker = "ヴァレリー"
# 「星騎士の皆さんは、世界中の美しい物の全てを独り占めしようとしてるんです。とてもいけないことですね」
line = "「星騎士の皆さんは、世界中の美しい物の全てを独り占めしようとしてるんです。とてもいけないことですね」"

[[dialogue]]
speaker = "メテオラ"
# 「いけないなー！　キレイなのはみんなのだぞ！」
line = "「いけないなー！　キレイなのはみんなのだぞ！」"

[[dialogue]]
speaker = "リーナ"
# 「星騎士の人たちはね、リーナから大切なお兄ちゃんを奪おうとしているの。そんなの絶対許せないよね許しちゃいけない許さない許さない許さない許さない許さない」
line = "「星騎士の人たちはね、リーナから大切なお兄ちゃんを奪おうとしているの。そんなの絶対許せないよね許しちゃいけない許さない許さない許さない許さない許さない」"

[[dialogue]]
speaker = "メテオラ"
# 「お、おー？　許せないなー？」
line = "「お、おー？　許せないなー？」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「星騎士は世界を支配するつもりなのでございますわ」
line = "「星騎士は世界を支配するつもりなのでございますわ」"

[[dialogue]]
speaker = "メテオラ"
# 「なんだとー！　そんなの絶対悪いやつだぞ！」
line = "「なんだとー！　そんなの絶対悪いやつだぞ！」"

[[dialogue]]
speaker = "イングリット"
# 「やつらは弱いくせに生意気だ。プリマステラが優秀など、笑わせてくれる」
line = "「やつらは弱いくせに生意気だ。プリマステラが優秀など、笑わせてくれる」"

[[dialogue]]
speaker = "メテオラ"
# 「弱っちいのに偉そうなのはダメだなー！　エンジュも言ってた！」
line = "「弱っちいのに偉そうなのはダメだなー！　エンジュも言ってた！」"

[[dialogue]]
speaker = "エンジュ"
# 「あたしは星騎士に辱められたんだ。あの屈辱は一生忘れやしない……！」
line = "「あたしは星騎士に辱められたんだ。あの屈辱は一生忘れやしない……！」"

[[dialogue]]
speaker = "メテオラ"
# 「エンジュをイジめるやつは、あたしの敵だー！」
line = "「エンジュをイジめるやつは、あたしの敵だー！」"

[[dialogue]]
speaker = "リーリア"
# 「それは……どうなんですかね」
line = "「それは……どうなんですかね」"

[[dialogue]]
speaker = "unk"
# ヴァレリー以外は素で言ってそう……
line = "ヴァレリー以外は素で言ってそう……"

[[dialogue]]
speaker = "リーリア"
# 「コラプサーって、個性的な人の集まりなんですね……」
line = "「コラプサーって、個性的な人の集まりなんですね……」"

[[dialogue]]
speaker = "メテオラ"
# 「でもコラプサーはいいやつらなんだぞ！　あたしを受け入れてくれたんだ！」
line = "「でもコラプサーはいいやつらなんだぞ！　あたしを受け入れてくれたんだ！」"

[[dialogue]]
speaker = "リーリア"
# 「受け入れてくれた……ということは──」
line = "「受け入れてくれた……ということは──」"

[[dialogue]]
speaker = "unk"
# 他の所では受け入れられなかった……？
line = "他の所では受け入れられなかった……？"

[[dialogue]]
speaker = "メテオラ"
# 「んー……そーかもなー……」
line = "「んー……そーかもなー……」"

[[dialogue]]
speaker = "メテオラ"
# 「あたし、コラプサーの前は施設にいたんだ。家族がいない子とかが来る施設らしいぞ」
line = "「あたし、コラプサーの前は施設にいたんだ。家族がいない子とかが来る施設らしいぞ」"

[[dialogue]]
speaker = "リーリア"
# 「じゃあメテオラさんの家族は……」
line = "「じゃあメテオラさんの家族は……」"

[[dialogue]]
speaker = "メテオラ"
# 「いや、パパもママもいるぞ！」
line = "「いや、パパもママもいるぞ！」"

[[dialogue]]
speaker = "リーリア"
# 「え？　じゃあどうして施設に？」
line = "「え？　じゃあどうして施設に？」"

[[dialogue]]
speaker = "メテオラ"
# 「あたし、生まれた時から力が強くて、普通にしてたつもりなのに、いろんなものを壊しちゃうんだ」
line = "「あたし、生まれた時から力が強くて、普通にしてたつもりなのに、いろんなものを壊しちゃうんだ」"

[[dialogue]]
speaker = "メテオラ"
# 「コップとか、お皿とか、ドアとか、触ったものはだいたい壊してた気がするぞ」
line = "「コップとか、お皿とか、ドアとか、触ったものはだいたい壊してた気がするぞ」"

[[dialogue]]
speaker = "メテオラ"
# 「あたしのせいで、家がボロボロになっちゃったからなー。パパとママはあたしがちゃんとできるように施設に預けたんだぞ」
line = "「あたしのせいで、家がボロボロになっちゃったからなー。パパとママはあたしがちゃんとできるように施設に預けたんだぞ」"

[[dialogue]]
speaker = "メテオラ"
# 「施設にいた子たちもな、最初は優しかったんだぞ。力持ちなあたしを褒めてくれてたんだ」
line = "「施設にいた子たちもな、最初は優しかったんだぞ。力持ちなあたしを褒めてくれてたんだ」"

[[dialogue]]
speaker = "メテオラ"
# 「でも、みんな、だんだんとあたしを怖がるんだ。軽く触ったり、お相撲するだけで怪我しちゃうし……」
line = "「でも、みんな、だんだんとあたしを怖がるんだ。軽く触ったり、お相撲するだけで怪我しちゃうし……」"

[[dialogue]]
speaker = "メテオラ"
# 「あたしはみんなと一緒に遊びたかっただけなのに……みんな、あたしから離れてくし……パパとママにも会えなくなっちゃったし……」
line = "「あたしはみんなと一緒に遊びたかっただけなのに……みんな、あたしから離れてくし……パパとママにも会えなくなっちゃったし……」"

[[dialogue]]
speaker = "メテオラ"
# 「あたしを止めようとしてくれたのに、大好きな施設の先生も叩いちゃって……怪我させちゃって……」
line = "「あたしを止めようとしてくれたのに、大好きな施設の先生も叩いちゃって……怪我させちゃって……」"

[[dialogue]]
speaker = "メテオラ"
# 「あたし、危ない子なんだ。パパもママも友達も先生も好きなのに……一緒に暮らしてたら、絶対にいつかヤバいことになっちゃうと思って……内緒で施設を出たんだ」
line = "「あたし、危ない子なんだ。パパもママも友達も先生も好きなのに……一緒に暮らしてたら、絶対にいつかヤバいことになっちゃうと思って……内緒で施設を出たんだ」"

[[dialogue]]
speaker = "メテオラ"
# 「そんでうろうろしてたら、『コラプサーに入らないかー』って声をかけられたんだ」
line = "「そんでうろうろしてたら、『コラプサーに入らないかー』って声をかけられたんだ」"

[[dialogue]]
speaker = "メテオラ"
# 「あたし、すぐになんでも壊しちゃうからダメって言ったんだけどなー」
line = "「あたし、すぐになんでも壊しちゃうからダメって言ったんだけどなー」"

[[dialogue]]
speaker = "メテオラ"
# 「でもコラプサーならいくらでも壊していいって言われたんだ！　壊したら喜んでくれたんだ！」
line = "「でもコラプサーならいくらでも壊していいって言われたんだ！　壊したら喜んでくれたんだ！」"

[[dialogue]]
speaker = "リーリア"
# 「それは……確かについていっちゃう気持ちもわかりますね……」
line = "「それは……確かについていっちゃう気持ちもわかりますね……」"

[[dialogue]]
speaker = "リーリア"
# （コラプサーの他のメンバーも、社会とは相容れない性格や境遇ばかりでした。世の中から弾き出された者を拾っている……という側面もあるんでしょうね）
line = "（コラプサーの他のメンバーも、社会とは相容れない性格や境遇ばかりでした。世の中から弾き出された者を拾っている……という側面もあるんでしょうね）"

[[dialogue]]
speaker = "リーリア"
# （もちろんそれで、今までの行いが許されるわけではないですけど）
line = "（もちろんそれで、今までの行いが許されるわけではないですけど）"

[[dialogue]]
speaker = "メテオラ"
# 「ん？　どうしたー、何かあったのか？」
line = "「ん？　どうしたー、何かあったのか？」"

[[dialogue]]
speaker = "リーリア"
# 「いえいえ、大した話じゃないですよ。それよりデザートのプリン食べます？」
line = "「いえいえ、大した話じゃないですよ。それよりデザートのプリン食べます？」"

[[dialogue]]
speaker = "メテオラ"
# 「やったー！　プリン食べるぞー！」
line = "「やったー！　プリン食べるぞー！」"

[[dialogue]]
speaker = "メテオラ"
# 「あ、なんか手に当たったぞ」
line = "「あ、なんか手に当たったぞ」"

[[dialogue]]
speaker = "リーリア"
# 「あ～～っ、壁に穴がーーーっ！？」
line = "「あ～～っ、壁に穴がーーーっ！？」"

[[dialogue]]
speaker = "unk"
# 無自覚に物を破壊してしまうコラプサー、メテオラ。
line = "無自覚に物を破壊してしまうコラプサー、メテオラ。"

[[dialogue]]
speaker = "unk"
# 彼女と向き合っていくには、根気と忍耐が必要とされる……かもしれない。
line = "彼女と向き合っていくには、根気と忍耐が必要とされる……かもしれない。"
