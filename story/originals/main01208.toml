speaker = "アニュラス"
# 「お父様とも……長らく連絡がついていない。どこかできっと、この騒ぎも聞きつけていると思うのだが」
line = "「お父様とも……長らく連絡がついていない。どこかできっと、この騒ぎも聞きつけていると思うのだが」"

[[dialogue]]
speaker = "アニュラス"
# 「……どうしてだろうな。今は私が、父の代わりに頑張らねばならない気がする。セイファートの、名にかけて……」
line = "「……どうしてだろうな。今は私が、父の代わりに頑張らねばならない気がする。セイファートの、名にかけて……」"

[[dialogue]]
speaker = "アナ"
# （アニュラスさん……仮面でわかりづらいけど、泣いてる……？）
line = "（アニュラスさん……仮面でわかりづらいけど、泣いてる……？）"

[[dialogue]]
speaker = "アニュラス"
# 「……すまない。うまく言えないが……使命感が湧き上がってきている。そんな気がするんだ。星騎士なら皆かもしれないが」
line = "「……すまない。うまく言えないが……使命感が湧き上がってきている。そんな気がするんだ。星騎士なら皆かもしれないが」"

[[dialogue]]
speaker = "アニュラス"
# 「今はただ……無性に剣を振るいたい。これまでに鍛えてきた私の力が、人々を救えるはずだと信じて」
line = "「今はただ……無性に剣を振るいたい。これまでに鍛えてきた私の力が、人々を救えるはずだと信じて」"

[[dialogue]]
speaker = "アニュラス"
# 「私の尊敬する父ならきっと──全力を尽くせと言うだろうからな。どんなに強大な相手でも」
line = "「私の尊敬する父ならきっと──全力を尽くせと言うだろうからな。どんなに強大な相手でも」"

[[dialogue]]
speaker = "キリカ"
# 「……星騎士として、素晴らしい心がけかと」
line = "「……星騎士として、素晴らしい心がけかと」"

[[dialogue]]
speaker = "セーラ"
# 「そーいえば、会長さんがライバルなんだもんね？　今のうちに超活躍して、戻ってきたときびっくりさせちゃお！」
line = "「そーいえば、会長さんがライバルなんだもんね？　今のうちに超活躍して、戻ってきたときびっくりさせちゃお！」"

[[dialogue]]
speaker = "アナ"
# 「確かに。ここで目覚ましい戦果を挙げれば──会長も一目置くこと間違いなし」
line = "「確かに。ここで目覚ましい戦果を挙げれば──会長も一目置くこと間違いなし」"

[[dialogue]]
speaker = "キリカ"
# 「なるほど。認めてほしい方というのが、お父上以外にもいらっしゃるのですね」
line = "「なるほど。認めてほしい方というのが、お父上以外にもいらっしゃるのですね」"

[[dialogue]]
speaker = "ルリエル"
# 「あはは！　アニュラスさんは戦う乙女なのです！」
line = "「あはは！　アニュラスさんは戦う乙女なのです！」"

[[dialogue]]
speaker = "アニュラス"
# 「ば、馬鹿にするなっ！　私はただ父の背を追いかけているだけだ──あの男など眼中にない！　いや、多少はあるが……」
line = "「ば、馬鹿にするなっ！　私はただ父の背を追いかけているだけだ──あの男など眼中にない！　いや、多少はあるが……」"

[[dialogue]]
speaker = "アニュラス"
# 「いいからとっとと出動するぞ──星徒会！　私に遅れを取るんじゃないぞ──！」
line = "「いいからとっとと出動するぞ──星徒会！　私に遅れを取るんじゃないぞ──！」"
