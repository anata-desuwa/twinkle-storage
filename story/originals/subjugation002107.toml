[[dialogue]]
speaker = "unk"
# 星力を打ち消すブラックホールの力には限界があるのは、以前のコラプサーとの戦闘で判明している。
line = "星力を打ち消すブラックホールの力には限界があるのは、以前のコラプサーとの戦闘で判明している。"

[[dialogue]]
speaker = "unk"
# コラプサーは星騎士の天敵ではあるが、無敵ではない。
line = "コラプサーは星騎士の天敵ではあるが、無敵ではない。"

[[dialogue]]
speaker = "メテオラ"
# 「んがっ！　魔王の攻撃、ちょっと痛いぞっ！？」
line = "「んがっ！　魔王の攻撃、ちょっと痛いぞっ！？」"

[[dialogue]]
speaker = "エンジュ"
# 「くそっ、攻撃の全ては吸いきれなくなってきたか……！」
line = "「くそっ、攻撃の全ては吸いきれなくなってきたか……！」"

[[dialogue]]
speaker = "コハルコ"
# 「会長さん、右からエンジュの攻撃が来ます！　リーリアさんは左方向からのミサイルを撃ち落として！　そのままメテオラに追撃を！」
line = "「会長さん、右からエンジュの攻撃が来ます！　リーリアさんは左方向からのミサイルを撃ち落として！　そのままメテオラに追撃を！」"

[[dialogue]]
speaker = "リーリア"
# 「ラジャーですっ！　そこ！」
line = "「ラジャーですっ！　そこ！」"

[[dialogue]]
speaker = "メテオラ"
# 「くっ……！」
line = "「くっ……！」"

[[dialogue]]
speaker = "unk"
# 確かにエンジュとメテオラの連携は厄介だが、コハルコさんは幾多の戦場で星騎士たちを導いてきた、熟練のオペレーターだ。
line = "確かにエンジュとメテオラの連携は厄介だが、コハルコさんは幾多の戦場で星騎士たちを導いてきた、熟練のオペレーターだ。"

[[dialogue]]
speaker = "unk"
# コハルコさんがサポートに徹することで、俺達は最適解で動くことができ、リーリアを軸とした攻撃で反撃に転じていた。
line = "コハルコさんがサポートに徹することで、俺達は最適解で動くことができ、リーリアを軸とした攻撃で反撃に転じていた。"

[[dialogue]]
speaker = "unk"
# 観念したらどうだ！
line = "観念したらどうだ！"

[[dialogue]]
speaker = "コハルコ"
# 「そうだよ、おとなしく投降すれば悪いようには──」
line = "「そうだよ、おとなしく投降すれば悪いようには──」"

[[dialogue]]
speaker = "エンジュ"
# 「ふざけるな！　あたしは星騎士だけには負けるわけにはいかないんだ！」
line = "「ふざけるな！　あたしは星騎士だけには負けるわけにはいかないんだ！」"

[[dialogue]]
speaker = "リーリア"
# 「どうして星騎士をそんなに憎むの！？」
line = "「どうして星騎士をそんなに憎むの！？」"

[[dialogue]]
speaker = "エンジュ"
# 「決まっているだろう！　星騎士なんてどいつもこいつも生まれ持った力に胡坐をかいた偽善者ばかり！」
line = "「決まっているだろう！　星騎士なんてどいつもこいつも生まれ持った力に胡坐をかいた偽善者ばかり！」"

[[dialogue]]
speaker = "エンジュ"
# 「大した力もないクセに威張り散らかし、いざ窮地に陥れば尻尾を巻いて逃げ出す卑怯者ばかりだ！　そんな奴らに、あたしは辱めをっ……！」
line = "「大した力もないクセに威張り散らかし、いざ窮地に陥れば尻尾を巻いて逃げ出す卑怯者ばかりだ！　そんな奴らに、あたしは辱めをっ……！」"

[[dialogue]]
speaker = "リーリア"
# 「そんなひどい人なんていない！　私の知ってる星騎士は、力ない人を守ろうとするいい人ばかりだよ！」
line = "「そんなひどい人なんていない！　私の知ってる星騎士は、力ない人を守ろうとするいい人ばかりだよ！」"

[[dialogue]]
speaker = "コハルコ"
# 「会長さんは無闇に誰かを傷つけたりしない。権力を笠に偉ぶったりもしない。あなただって、メテオラだって、薄々気づいてるんじゃないの？」
line = "「会長さんは無闇に誰かを傷つけたりしない。権力を笠に偉ぶったりもしない。あなただって、メテオラだって、薄々気づいてるんじゃないの？」"

[[dialogue]]
speaker = "メテオラ"
# 「うぅ、確かに魔王はちょっといい人だぞ……」
line = "「うぅ、確かに魔王はちょっといい人だぞ……」"

[[dialogue]]
speaker = "エンジュ"
# 「それなら──」
line = "「それなら──」"

[[dialogue]]
speaker = "エンジュ"
# 「どうしてあの時！　あたしを助けてくれなかった！」
line = "「どうしてあの時！　あたしを助けてくれなかった！」"

[[dialogue]]
speaker = "エンジュ"
# 「虐げられ、笑われ、土下座までさせられて、心にもないことを誓わされ、足蹴にされたあたしを！」
line = "「虐げられ、笑われ、土下座までさせられて、心にもないことを誓わされ、足蹴にされたあたしを！」"

[[dialogue]]
speaker = "コハルコ"
# 「くっ……！？　エンジュの力が、より強くっ……！」
line = "「くっ……！？　エンジュの力が、より強くっ……！」"

[[dialogue]]
speaker = "エンジュ"
# 「受けた屈辱を万倍にして返すその時まで、あたしは星騎士たちをぶちのめし続ける！」
line = "「受けた屈辱を万倍にして返すその時まで、あたしは星騎士たちをぶちのめし続ける！」"

[[dialogue]]
speaker = "コハルコ"
# 「そんなの逆恨みだよ！」
line = "「そんなの逆恨みだよ！」"

[[dialogue]]
speaker = "エンジュ"
# 「うるさいうるさいうるさぁいっ！　メテオラ、こいつらの戯言に耳を貸すな！」
line = "「うるさいうるさいうるさぁいっ！　メテオラ、こいつらの戯言に耳を貸すな！」"

[[dialogue]]
speaker = "メテオラ"
# 「わかったぞ！　エンジュをイジめるやつは、みんな悪いやつだ！　あたしがぶっ壊してやるっ！」
line = "「わかったぞ！　エンジュをイジめるやつは、みんな悪いやつだ！　あたしがぶっ壊してやるっ！」"

[[dialogue]]
speaker = "リーリア"
# 「あなたに何があったかは知らない。そんなに強く恨むだけの理由があるんだと思う。──それでも！」
line = "「あなたに何があったかは知らない。そんなに強く恨むだけの理由があるんだと思う。──それでも！」"

[[dialogue]]
speaker = "リーリア"
# 「星騎士のみんなは、魔女で、スパイで、その上人間界を見捨てようとした私だって受け入れてくれた」
line = "「星騎士のみんなは、魔女で、スパイで、その上人間界を見捨てようとした私だって受け入れてくれた」"

[[dialogue]]
speaker = "リーリア"
# 「そんなみんなを、仲間を、悪いやつなんて言わせないよ！」
line = "「そんなみんなを、仲間を、悪いやつなんて言わせないよ！」"

[[dialogue]]
speaker = "エンジュ"
# 「なら、その仲間ともどもくたばれ！　行くぞ、メテオラ！」
line = "「なら、その仲間ともどもくたばれ！　行くぞ、メテオラ！」"

[[dialogue]]
speaker = "メテオラ"
# 「おう！　合体アタックいっくぞー！」
line = "「おう！　合体アタックいっくぞー！」"

[[dialogue]]
speaker = "unk"
# ２人の星力が融合して、異常に高まってる……！
line = "２人の星力が融合して、異常に高まってる……！"

[[dialogue]]
speaker = "リーリア"
# 「ちょ、ちょっ、コハルコ先輩が消し炭になっちゃったら、連れて帰るどころじゃなくないですか！？」
line = "「ちょ、ちょっ、コハルコ先輩が消し炭になっちゃったら、連れて帰るどころじゃなくないですか！？」"

[[dialogue]]
speaker = "コハルコ"
# 「怖いこと言わないで！　これ、防げるの！？」
line = "「怖いこと言わないで！　これ、防げるの！？」"

[[dialogue]]
speaker = "エンジュ"
# 「あたしらの怒り、思い知れっ！　ツイステッド・ヴェンデッタァァァァッ！」
line = "「あたしらの怒り、思い知れっ！　ツイステッド・ヴェンデッタァァァァッ！」"

[[dialogue]]
speaker = "unk"
# リーリアっ！
line = "リーリアっ！"

[[dialogue]]
speaker = "unk"
# コハルコさん！
line = "コハルコさん！"

[[dialogue]]
speaker = "unk"
# 身を呈して、彼女たちの壁になろうとしたその時──
line = "身を呈して、彼女たちの壁になろうとしたその時──"

[[dialogue]]
speaker = "？？？"
# 「緋宮会長、格好よくキメているところ、お邪魔させていただきますわ！」
line = "「緋宮会長、格好よくキメているところ、お邪魔させていただきますわ！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ミラージュ──ブレイカーッ！！」
line = "「ミラージュ──ブレイカーッ！！」"

[[dialogue]]
speaker = "メテオラ"
# 「あれれれれぇ！？　あたしが撃ったミサイルがどっか行っちゃったぞ！？」
line = "「あれれれれぇ！？　あたしが撃ったミサイルがどっか行っちゃったぞ！？」"

[[dialogue]]
speaker = "エンジュ"
# 「ドリル女……お前、何をした！？」
line = "「ドリル女……お前、何をした！？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「おーっほっほっ！　星術を無効化するのは、あなた方の専売特許ではなくてよ」
line = "「おーっほっほっ！　星術を無効化するのは、あなた方の専売特許ではなくてよ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「あなた方の攻撃も技である以上、私の力で打ち破れますの。思い通りにいかず、残念でしたわね！」
line = "「あなた方の攻撃も技である以上、私の力で打ち破れますの。思い通りにいかず、残念でしたわね！」"

[[dialogue]]
speaker = "コハルコ"
# 「ヒルディオーネさん！　どうしてここに！？」
line = "「ヒルディオーネさん！　どうしてここに！？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「実家から戻ったら、街にはモンスターと負傷者が溢れかえっていたものですから。偶然アステラには突入していませんでしたの」
line = "「実家から戻ったら、街にはモンスターと負傷者が溢れかえっていたものですから。偶然アステラには突入していませんでしたの」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「しかしそれが<ruby=ぎょうこう>僥倖</ruby>でしたわね。何やら新星学園が騒がしかったので、こうして駆けつけた次第ですわ」
line = "「しかしそれが<ruby>僥倖<rt>ぎょうこう</rt></ruby>でしたわね。何やら新星学園が騒がしかったので、こうして駆けつけた次第ですわ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「皆様とはティータイムのお約束をしていますから。こんなところで倒れてもらっては困りますのよ」
line = "「皆様とはティータイムのお約束をしていますから。こんなところで倒れてもらっては困りますのよ」"

[[dialogue]]
speaker = "メテオラ"
# 「ぐうう！　おまえ、ムカつくぞー！」
line = "「ぐうう！　おまえ、ムカつくぞー！」"

[[dialogue]]
speaker = "エンジュ"
# 「今更、星騎士が１人増えたところで！　メテオラ、もう一撃──」
line = "「今更、星騎士が１人増えたところで！　メテオラ、もう一撃──」"

[[dialogue]]
speaker = "unk"
# このチャンスは逃がさない！
line = "このチャンスは逃がさない！"

[[dialogue]]
speaker = "unk"
# ありがとう、ヒルディー先輩！
line = "ありがとう、ヒルディー先輩！"

[[dialogue]]
speaker = "リーリア"
# 「センパイと私からのお返し、いっきますよ～☆」
line = "「センパイと私からのお返し、いっきますよ～☆」"

[[dialogue]]
speaker = "コハルコ"
# 「私も忘れないでね、リーリアさん！」
line = "「私も忘れないでね、リーリアさん！」"

[[dialogue]]
speaker = "リーリア"
# 「彩愛の魔弾・アオハルレインボーッ！」
line = "「彩愛の魔弾・アオハルレインボーッ！」"

[[dialogue]]
speaker = "メテオラ"
# 「エ、エンジュッ、吸い取れないぞっ……！？」
line = "「エ、エンジュッ、吸い取れないぞっ……！？」"

[[dialogue]]
speaker = "エンジュ"
# 「ぐぅっ、この、程度……あ、あたしは負ける、わけにはっ……！」
line = "「ぐぅっ、この、程度……あ、あたしは負ける、わけにはっ……！」"

[[dialogue]]
speaker = "２人"
# 「うわああぁぁあぁぁっ！！」
line = "「うわああぁぁあぁぁっ！！」"

[[dialogue]]
speaker = "リーリア"
# 「私とセンパイの愛の共同作業、炸☆裂☆　ちょ～っとやりすぎちゃったかな？」
line = "「私とセンパイの愛の共同作業、炸☆裂☆　ちょ～っとやりすぎちゃったかな？」"

[[dialogue]]
speaker = "コハルコ"
# 「えーと、私もいたんだけど？」
line = "「えーと、私もいたんだけど？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「文字通りの横槍でしたが、貢献はできましたわね」
line = "「文字通りの横槍でしたが、貢献はできましたわね」"

[[dialogue]]
speaker = "リーリア"
# 「いやぁ、本当に助かりましたよ～。消し飛ばされるかと思ったんですから」
line = "「いやぁ、本当に助かりましたよ～。消し飛ばされるかと思ったんですから」"

[[dialogue]]
speaker = "unk"
# 俺たちのユニゾンにより、手強いコラプサーたちとの決着はついた──かに見えた。
line = "俺たちのユニゾンにより、手強いコラプサーたちとの決着はついた──かに見えた。"
