[[dialogue]]
speaker = "unk"
# 第３話,不知火ヒトリは百合オタクである,P
line = "第３話,不知火ヒトリは百合オタクである,P"

[[dialogue]]
speaker = "unk"
# ──星徒会の用事が片付き、手持ち無沙汰になったので街をパトロールしていた。
line = "──星徒会の用事が片付き、手持ち無沙汰になったので街をパトロールしていた。"

[[dialogue]]
speaker = "アナ"
# 「……こんな暇ができるとは思ってもみませんでした。前会長の時には、仕事が終わって暇になるなんて瞬間はありえませんでしたから」
line = "「……こんな暇ができるとは思ってもみませんでした。前会長の時には、仕事が終わって暇になるなんて瞬間はありえませんでしたから」"

[[dialogue]]
speaker = "アナ"
# 「ん……あそこにいるのは、不知火さんじゃないですか」
line = "「ん……あそこにいるのは、不知火さんじゃないですか」"

[[dialogue]]
speaker = "ヒトリ"
# 「か、買っちゃった……ゆーちゃん、買っちゃったよ、わたしっ……！」
line = "「か、買っちゃった……ゆーちゃん、買っちゃったよ、わたしっ……！」"

[[dialogue]]
speaker = "ヒトリ"
# 「こ、これ、話題になってたちょっと過激なやつだよね……！　どどど、どうしよう、読む前から緊張してきたよ……っ」
line = "「こ、これ、話題になってたちょっと過激なやつだよね……！　どどど、どうしよう、読む前から緊張してきたよ……っ」"

[[dialogue]]
speaker = "アナ"
# 「……確かに、ゆーちゃんが見えていないと、独り言を言っているようにしか見えないですね」
line = "「……確かに、ゆーちゃんが見えていないと、独り言を言っているようにしか見えないですね」"

[[dialogue]]
speaker = "unk"
# 言わないであげて
line = "言わないであげて"

[[dialogue]]
speaker = "アナ"
# 「お疲れ様です、不知火さん。本屋から出てきたようですが、参考書か何かを？」
line = "「お疲れ様です、不知火さん。本屋から出てきたようですが、参考書か何かを？」"

[[dialogue]]
speaker = "ヒトリ"
# 「ひ、ひぁっ！？！？　あ、あああ、アナさんっ！？　ど、どうしてここに！？」
line = "「ひ、ひぁっ！？！？　あ、あああ、アナさんっ！？　ど、どうしてここに！？」"

[[dialogue]]
speaker = "アナ"
# 「星徒会の仕事がひと段落したのでパトロール中です。会長もいます」
line = "「星徒会の仕事がひと段落したのでパトロール中です。会長もいます」"

[[dialogue]]
speaker = "ヒトリ"
# 「か、会長さんも……っ、えっと、えっと、こ、これは、違くて、ふ、不純な気持ちで買ったわけじゃなくて、本当にっ」
line = "「か、会長さんも……っ、えっと、えっと、こ、これは、違くて、ふ、不純な気持ちで買ったわけじゃなくて、本当にっ」"

[[dialogue]]
speaker = "アナ"
# 「なるほど、漫画ですか」
line = "「なるほど、漫画ですか」"

[[dialogue]]
speaker = "ヒトリ"
# 「うっ……そ、そうです……ど、どうしてバレたんですか」
line = "「うっ……そ、そうです……ど、どうしてバレたんですか」"

[[dialogue]]
speaker = "アナ"
# 「特に理由は。不知火さんが美術部であることや、漫画を描いていることは活動報告書にも書かれていたので。単純な推理」
line = "「特に理由は。不知火さんが美術部であることや、漫画を描いていることは活動報告書にも書かれていたので。単純な推理」"

[[dialogue]]
speaker = "unk"
# あっ、もしかして『百合』の漫画？
line = "あっ、もしかして『百合』の漫画？"

[[dialogue]]
speaker = "ヒトリ"
# 「ううっ……！　そ、そうでした、会長さんにはこの前、話してしまったんでした……」
line = "「ううっ……！　そ、そうでした、会長さんにはこの前、話してしまったんでした……」"

[[dialogue]]
speaker = "アナ"
# 「……百合漫画、とは？」
line = "「……百合漫画、とは？」"

[[dialogue]]
speaker = "ヒトリ"
# 「あ、う……そ、その、お、女の子同士が恋愛したりする、そういうジャンルの漫画のことです……」
line = "「あ、う……そ、その、お、女の子同士が恋愛したりする、そういうジャンルの漫画のことです……」"

[[dialogue]]
speaker = "アナ"
# 「なるほど、興味深い。具体的に、どんな内容なのでしょうか？」
line = "「なるほど、興味深い。具体的に、どんな内容なのでしょうか？」"

[[dialogue]]
speaker = "ヒトリ"
# 「へっ！？　ぐ、具体的に、ですか！？」
line = "「へっ！？　ぐ、具体的に、ですか！？」"

[[dialogue]]
speaker = "ヒトリ"
# 「た、例えばですけど……仲の良い友達がいて、その友達にとっての１番でありたい……そんな想いが発展して恋心になってしまったりするんです」
line = "「た、例えばですけど……仲の良い友達がいて、その友達にとっての１番でありたい……そんな想いが発展して恋心になってしまったりするんです」"

[[dialogue]]
speaker = "ヒトリ"
# 「自分にないものを持っている人に対して、羨ましいのに凄く惹かれたりして、その鬱屈した気持ちが恋愛に発展したり……」
line = "「自分にないものを持っている人に対して、羨ましいのに凄く惹かれたりして、その鬱屈した気持ちが恋愛に発展したり……」"

[[dialogue]]
speaker = "ヒトリ"
# 「異性には見せられないような、女の子たちのちょっとしたエゴみたいなのを……ぶつけ合ったりもするんです」
line = "「異性には見せられないような、女の子たちのちょっとしたエゴみたいなのを……ぶつけ合ったりもするんです」"

[[dialogue]]
speaker = "ヒトリ"
# 「それって、とっても特別な関係だなと思って……そ、そう思いませんか？」
line = "「それって、とっても特別な関係だなと思って……そ、そう思いませんか？」"

[[dialogue]]
speaker = "アナ"
# 「ふむ……私は恋愛事については、正直疎い自覚があります。でも、不知火さんがその関係を特別だと思う理由はわかる」
line = "「ふむ……私は恋愛事については、正直疎い自覚があります。でも、不知火さんがその関係を特別だと思う理由はわかる」"

[[dialogue]]
speaker = "アナ"
# 「ヒトは通常、エゴを他人に見せることは少ない。もしその関係がエゴで成り立っているのなら、間違いなく特別」
line = "「ヒトは通常、エゴを他人に見せることは少ない。もしその関係がエゴで成り立っているのなら、間違いなく特別」"

[[dialogue]]
speaker = "ヒトリ"
# 「そ、そういうこと……なのかは微妙ですけど、た、多分解釈は間違ってないと思います……」
line = "「そ、そういうこと……なのかは微妙ですけど、た、多分解釈は間違ってないと思います……」"

[[dialogue]]
speaker = "アナ"
# 「つまり不知火さんは、女の子と恋愛したい？」
line = "「つまり不知火さんは、女の子と恋愛したい？」"

[[dialogue]]
speaker = "ヒトリ"
# 「ふぇっ！？　ど、どうしてそんな解釈に！？」
line = "「ふぇっ！？　ど、どうしてそんな解釈に！？」"

[[dialogue]]
speaker = "unk"
# え！？　そういうことだったの！？
line = "え！？　そういうことだったの！？"

[[dialogue]]
speaker = "ヒトリ"
# 「ちちち、違いますよっ！？　お、女の子はすっごく可愛いと思いますし大好きですけど！　恋愛したいとか、そういうことじゃないですっ！」
line = "「ちちち、違いますよっ！？　お、女の子はすっごく可愛いと思いますし大好きですけど！　恋愛したいとか、そういうことじゃないですっ！」"

[[dialogue]]
speaker = "ヒトリ"
# 「む、むしろわたしがそういう関係性の中にいるなんて、あまりにおこがましいことですっ……百合に失礼ですっ」
line = "「む、むしろわたしがそういう関係性の中にいるなんて、あまりにおこがましいことですっ……百合に失礼ですっ」"

[[dialogue]]
speaker = "アナ"
# 「でも、不知火さんは男性が苦手」
line = "「でも、不知火さんは男性が苦手」"

[[dialogue]]
speaker = "ヒトリ"
# 「そ、それはそうですけど……でも、最近は会長さんとよくお話させてもらっているので、前よりは大分ましになりました」
line = "「そ、それはそうですけど……でも、最近は会長さんとよくお話させてもらっているので、前よりは大分ましになりました」"

[[dialogue]]
speaker = "ヒトリ"
# 「……まだ、会長さんとしか話せないですけど」
line = "「……まだ、会長さんとしか話せないですけど」"

[[dialogue]]
speaker = "ゆーちゃん"
# 「てーてー！」
line = "「てーてー！」"

[[dialogue]]
speaker = "ヒトリ"
# 「なっ、何言ってるのゆーちゃん！？　てぇてぇじゃないよっ！　会長さんに失礼だからっ、やめてっ！」
line = "「なっ、何言ってるのゆーちゃん！？　てぇてぇじゃないよっ！　会長さんに失礼だからっ、やめてっ！」"

[[dialogue]]
speaker = "アナ"
# 「てーてーとは？」
line = "「てーてーとは？」"

[[dialogue]]
speaker = "unk"
# 尊い、って意味らしい
line = "尊い、って意味らしい"

[[dialogue]]
speaker = "ヒトリ"
# 「ご、ごめんなさい会長さん……ゆーちゃんが変なこと言って……」
line = "「ご、ごめんなさい会長さん……ゆーちゃんが変なこと言って……」"

[[dialogue]]
speaker = "ヒトリ"
# 「わたしがまともに話せる初めての男の人だから、なんか勘違いしちゃってて……す、すみません」
line = "「わたしがまともに話せる初めての男の人だから、なんか勘違いしちゃってて……す、すみません」"

[[dialogue]]
speaker = "ヒトリ"
# 「ゆーちゃんっ、会長さんとはそういう仲じゃないんだからね！？　確かに百合に興味持ってくれて、また語りたいとは思ってるけど……（チラッ）」
line = "「ゆーちゃんっ、会長さんとはそういう仲じゃないんだからね！？　確かに百合に興味持ってくれて、また語りたいとは思ってるけど……（チラッ）」"

[[dialogue]]
speaker = "アナ"
# 「ほほう。会長、不知火さんといつの間に……」
line = "「ほほう。会長、不知火さんといつの間に……」"

[[dialogue]]
speaker = "unk"
# 俺にも後でその漫画、読ませてくれる？
line = "俺にも後でその漫画、読ませてくれる？"

[[dialogue]]
speaker = "ヒトリ"
# 「えっ、か、会長さんも読みたいんですか？　は、はい……！　わかりましたっ」
line = "「えっ、か、会長さんも読みたいんですか？　は、はい……！　わかりましたっ」"

[[dialogue]]
speaker = "ヒトリ"
# 「それで、その……もしよかったら、後で感想を語ったりとか……どうでしょう？　会長さんが百合をどう感じるか、気になるな……なんて」
line = "「それで、その……もしよかったら、後で感想を語ったりとか……どうでしょう？　会長さんが百合をどう感じるか、気になるな……なんて」"

[[dialogue]]
speaker = "ヒトリ"
# 「い、いいんですか？　は、はいっ。じゃあ、すぐ読んで、明日にでもお貸ししますねっ……！」
line = "「い、いいんですか？　は、はいっ。じゃあ、すぐ読んで、明日にでもお貸ししますねっ……！」"

[[dialogue]]
speaker = "アナ"
# 「……ふむ、なるほど。これが、てーてー」
line = "「……ふむ、なるほど。これが、てーてー」"

[[dialogue]]
speaker = "ゆーちゃん"
# 「てーてー！」
line = "「てーてー！」"

[[dialogue]]
speaker = "unk"
# 何故か納得したように、ゆーちゃんと顔を見合せて、頷くアナなのだった。
line = "何故か納得したように、ゆーちゃんと顔を見合せて、頷くアナなのだった。"
