[[dialogue]]
speaker = "unk"
# 第４話,スーパーパタンナーの本領発揮,P
line = "第４話,スーパーパタンナーの本領発揮,P"

[[dialogue]]
speaker = "美鶴"
# 「会長さんのおかげで赤点も回避できたし、勉強を教えてもらったお礼もしなきゃね。体で払えばいい？」
line = "「会長さんのおかげで赤点も回避できたし、勉強を教えてもらったお礼もしなきゃね。体で払えばいい？」"

[[dialogue]]
speaker = "unk"
# 体で！？
line = "体で！？"

[[dialogue]]
speaker = "美鶴"
# 「なんでそんな驚いてんの。うちができることって言ったら、やっぱり服作りだから。会長さん専用の服、作ろうと思って」
line = "「なんでそんな驚いてんの。うちができることって言ったら、やっぱり服作りだから。会長さん専用の服、作ろうと思って」"

[[dialogue]]
speaker = "美鶴"
# 「社交界でも着られるスーツなんてどう？　いざという時用にオーダーメイドのスーツが１着あると、会長として箔がつくかも」
line = "「社交界でも着られるスーツなんてどう？　いざという時用にオーダーメイドのスーツが１着あると、会長として箔がつくかも」"

[[dialogue]]
speaker = "美鶴"
# 「じゃ、決まりね。今日の放課後、会長さんの採寸やらせて」
line = "「じゃ、決まりね。今日の放課後、会長さんの採寸やらせて」"

[[dialogue]]
speaker = "ヴィーナス"
# 「へぇ、その採寸を星徒会室でやるってわけね」
line = "「へぇ、その採寸を星徒会室でやるってわけね」"

[[dialogue]]
speaker = "マトイ"
# 「プロのお仕事ぶり、見てみたかったから楽しみ。ワクワク♪」
line = "「プロのお仕事ぶり、見てみたかったから楽しみ。ワクワク♪」"

[[dialogue]]
speaker = "美鶴"
# 「見ててあんまり面白いものじゃないと思いますけど……まぁいいか」
line = "「見ててあんまり面白いものじゃないと思いますけど……まぁいいか」"

[[dialogue]]
speaker = "美鶴"
# 「会長さん、測ってる時はあまり動かないでね。ミリ単位のズレも、できあがった時には大きなズレになるから」
line = "「会長さん、測ってる時はあまり動かないでね。ミリ単位のズレも、できあがった時には大きなズレになるから」"

[[dialogue]]
speaker = "美鶴"
# 「胸囲、腹囲、股上、股下……いろいろ測るけど、腕や脚を通す時の快適さも大切。データがあればあるだけ、着心地のいい服が作れるし」
line = "「胸囲、腹囲、股上、股下……いろいろ測るけど、腕や脚を通す時の快適さも大切。データがあればあるだけ、着心地のいい服が作れるし」"

[[dialogue]]
speaker = "美鶴"
# 「ピシッと決めてても、動きにくいんじゃ本末転倒。そこはうちの腕の見せ所」
line = "「ピシッと決めてても、動きにくいんじゃ本末転倒。そこはうちの腕の見せ所」"

[[dialogue]]
speaker = "unk"
# プロの仕事、期待してるよ
line = "プロの仕事、期待してるよ"

[[dialogue]]
speaker = "美鶴"
# 「ん。男の人の服を作るのは初めてだから、ちょっと緊張してる」
line = "「ん。男の人の服を作るのは初めてだから、ちょっと緊張してる」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そういえば、うちのメイド隊には男の人はいないものね」
line = "「そういえば、うちのメイド隊には男の人はいないものね」"

[[dialogue]]
speaker = "美鶴"
# 「そーです。だから、会長さんが、うちの初めての<ruby=ひと>男</ruby>」
line = "「そーです。だから、会長さんが、うちの初めての<ruby>男<rt>ひと</rt></ruby>」"

[[dialogue]]
speaker = "マトイ"
# 「美鶴ちゃん、ちょっとその言い方は……」
line = "「美鶴ちゃん、ちょっとその言い方は……」"

[[dialogue]]
speaker = "美鶴"
# 「……？　なんか変でした？」
line = "「……？　なんか変でした？」"

[[dialogue]]
speaker = "マトイ"
# 「べ、別にー！　なんにも変じゃないよ、大丈夫！」
line = "「べ、別にー！　なんにも変じゃないよ、大丈夫！」"

[[dialogue]]
speaker = "美鶴"
# 「だからって、会長さんまで緊張しないでね。筋肉が強張ってても体型に影響出るし。それじゃ、始めます」
line = "「だからって、会長さんまで緊張しないでね。筋肉が強張ってても体型に影響出るし。それじゃ、始めます」"

[[dialogue]]
speaker = "マトイ"
# （美鶴ちゃん、会長に対して、すごく自然体で話すんだね）
line = "（美鶴ちゃん、会長に対して、すごく自然体で話すんだね）"

[[dialogue]]
speaker = "ヴィーナス"
# （『美鶴の心を開け大作戦』が功を奏したようね。さすがは私だわ！）
line = "（『美鶴の心を開け大作戦』が功を奏したようね。さすがは私だわ！）"

[[dialogue]]
speaker = "unk"
# 美鶴は武器のように構えた巻き尺を俺の体に当て、数字をメモっていく。
line = "美鶴は武器のように構えた巻き尺を俺の体に当て、数字をメモっていく。"

[[dialogue]]
speaker = "美鶴"
# 「身長……肩幅……袖丈……と。ふんふん、やっぱり女の子の数字と違う」
line = "「身長……肩幅……袖丈……と。ふんふん、やっぱり女の子の数字と違う」"

[[dialogue]]
speaker = "美鶴"
# 「腕周りも、細身なのにちゃんと筋肉があるから、可動域もちゃんと考えなきゃだね」
line = "「腕周りも、細身なのにちゃんと筋肉があるから、可動域もちゃんと考えなきゃだね」"

[[dialogue]]
speaker = "美鶴"
# 「胸囲と腰回り測るから、手ぇ上げて。はい、バンザイ」
line = "「胸囲と腰回り測るから、手ぇ上げて。はい、バンザイ」"

[[dialogue]]
speaker = "美鶴"
# 「女の人だとバストトップとアンダーを測るけど、男の人ならいらないよね。あ、細身なのに胸板ある」
line = "「女の人だとバストトップとアンダーを測るけど、男の人ならいらないよね。あ、細身なのに胸板ある」"

[[dialogue]]
speaker = "美鶴"
# 「さわ、さわ……胸が柔らかくないの不思議。ちゃんと筋肉ついてるし、男らしい体つきって、こーゆーことなんだ」
line = "「さわ、さわ……胸が柔らかくないの不思議。ちゃんと筋肉ついてるし、男らしい体つきって、こーゆーことなんだ」"

[[dialogue]]
speaker = "unk"
# あの、美鶴。ちょっとくすぐったい
line = "あの、美鶴。ちょっとくすぐったい"

[[dialogue]]
speaker = "美鶴"
# 「ごめん。でも、これ、採寸だから」
line = "「ごめん。でも、これ、採寸だから」"

[[dialogue]]
speaker = "ヴィーナス"
# 「採寸なら仕方ないわね！　クロト、男の子ならくすぐったいのくらい我慢しなさい」
line = "「採寸なら仕方ないわね！　クロト、男の子ならくすぐったいのくらい我慢しなさい」"

[[dialogue]]
speaker = "美鶴"
# 「次はウエスト……細く見えてたけど、やっぱり女の人より結構あるね。腹筋もカチカチで割れてる。会長さん、しっかり鍛えてるじゃん……さわさわ」
line = "「次はウエスト……細く見えてたけど、やっぱり女の人より結構あるね。腹筋もカチカチで割れてる。会長さん、しっかり鍛えてるじゃん……さわさわ」"

[[dialogue]]
speaker = "マトイ"
# 「これも採寸なら仕方ない……ね？　結構スキンシップが激しいものなんだね」
line = "「これも採寸なら仕方ない……ね？　結構スキンシップが激しいものなんだね」"

[[dialogue]]
speaker = "美鶴"
# 「そう、仕方ない仕方ない。はい、上半身終わり。次は下半身」
line = "「そう、仕方ない仕方ない。はい、上半身終わり。次は下半身」"

[[dialogue]]
speaker = "マトイ"
# 「か、下半身もやるんだ！？」
line = "「か、下半身もやるんだ！？」"

[[dialogue]]
speaker = "美鶴"
# 「うん。スーツを作るなら上下セットじゃないとおかしいでしょ。あ、ズボンは脱がないでいいよ。そのままで平気」
line = "「うん。スーツを作るなら上下セットじゃないとおかしいでしょ。あ、ズボンは脱がないでいいよ。そのままで平気」"

[[dialogue]]
speaker = "美鶴"
# 「ヒップ……へー、お尻も硬いね。女の人と違う。太もももムチムチしてない。脂肪の付き方の違いかな……さわさわ」
line = "「ヒップ……へー、お尻も硬いね。女の人と違う。太もももムチムチしてない。脂肪の付き方の違いかな……さわさわ」"

[[dialogue]]
speaker = "美鶴"
# 「それじゃ股下。会長さん、ちょっと足開いて。脚の丈、内側から測るから」
line = "「それじゃ股下。会長さん、ちょっと足開いて。脚の丈、内側から測るから」"

[[dialogue]]
speaker = "unk"
# 内股から！？
line = "内股から！？"

[[dialogue]]
speaker = "美鶴"
# 「そーだよ。こっちからじゃないと、ちゃんとした数字分かんないし。裾が短くても長くても格好良くないからさ」
line = "「そーだよ。こっちからじゃないと、ちゃんとした数字分かんないし。裾が短くても長くても格好良くないからさ」"

[[dialogue]]
speaker = "美鶴"
# 「際どいとこだけど、変なとこは触んないし、採寸だから。プロのうちの仕事を信じて」
line = "「際どいとこだけど、変なとこは触んないし、採寸だから。プロのうちの仕事を信じて」"

[[dialogue]]
speaker = "マトイ"
# 「私の気のせいかもしれないけど『採寸』って単語、免罪符になってないかなー！？」
line = "「私の気のせいかもしれないけど『採寸』って単語、免罪符になってないかなー！？」"

[[dialogue]]
speaker = "美鶴"
# 「気のせい、気のせい。ん、しょ……わ、会長さん、足長いね。もうちょい上から測らないとダメかな」
line = "「気のせい、気のせい。ん、しょ……わ、会長さん、足長いね。もうちょい上から測らないとダメかな」"

[[dialogue]]
speaker = "マトイ"
# 「わ、わ、わ！　そこより上はセンシティブだよ！？」
line = "「わ、わ、わ！　そこより上はセンシティブだよ！？」"

[[dialogue]]
speaker = "unk"
# （際どい、際どい……！）
line = "（際どい、際どい……！）"

[[dialogue]]
speaker = "美鶴"
# 「はい、おしまい。お疲れさまです」
line = "「はい、おしまい。お疲れさまです」"

[[dialogue]]
speaker = "unk"
# 立ってただけなのに、ドッと疲れた……
line = "立ってただけなのに、ドッと疲れた……"

[[dialogue]]
speaker = "美鶴"
# 「どしたの？　会長さん、顔真っ赤じゃん、ふふ。もしかして──」
line = "「どしたの？　会長さん、顔真っ赤じゃん、ふふ。もしかして──」"

[[dialogue]]
speaker = "美鶴"
# 「──えっちなこと、考えちゃってた？」
line = "「──えっちなこと、考えちゃってた？」"

[[dialogue]]
speaker = "美鶴"
# 「みんなが見てるのに、そんなことするわけないじゃん。うちは真面目に仕事してただけ」
line = "「みんなが見てるのに、そんなことするわけないじゃん。うちは真面目に仕事してただけ」"

[[dialogue]]
speaker = "マトイ"
# 「ふう……見てただけなのに、私もヒヤヒヤしちゃった……これで採寸は終わったんだよね？」
line = "「ふう……見てただけなのに、私もヒヤヒヤしちゃった……これで採寸は終わったんだよね？」"

[[dialogue]]
speaker = "美鶴"
# 「必要な数字は揃ったから、これでバッチシ。超本気で作るから、完成を楽しみにしてて」
line = "「必要な数字は揃ったから、これでバッチシ。超本気で作るから、完成を楽しみにしてて」"

[[dialogue]]
speaker = "unk"
# それから、わずか数日後。星徒会室で美鶴の作った俺専用スーツのお披露目会が行われた。
line = "それから、わずか数日後。星徒会室で美鶴の作った俺専用スーツのお披露目会が行われた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「毎晩忙しそうにしてたみたいだけど、もう完成したの！？　はちゃめちゃ早いわね！」
line = "「毎晩忙しそうにしてたみたいだけど、もう完成したの！？　はちゃめちゃ早いわね！」"

[[dialogue]]
speaker = "美鶴"
# 「はい。初めての男性の服だったので、気合入れちゃいました。自信作です。会長さん、試着してみてください」
line = "「はい。初めての男性の服だったので、気合入れちゃいました。自信作です。会長さん、試着してみてください」"

[[dialogue]]
speaker = "unk"
# 袖を通した美鶴ブランドのスーツは、ピッタリと体に張りつくようなフィット感なのに、動きやすくて、通気性も抜群。
line = "袖を通した美鶴ブランドのスーツは、ピッタリと体に張りつくようなフィット感なのに、動きやすくて、通気性も抜群。"

[[dialogue]]
speaker = "マトイ"
# 「おお、格好いい……いつもより背が伸びて、なんだか脚も長く見えるね」
line = "「おお、格好いい……いつもより背が伸びて、なんだか脚も長く見えるね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「さすがは美鶴、いい仕事だわ！」
line = "「さすがは美鶴、いい仕事だわ！」"

[[dialogue]]
speaker = "美鶴"
# 「この世に唯一無二、会長さんの体型に合わせた専用スーツなんで。あんまり痩せたり太ったりして体型が変わると、着れなくなるから気をつけて」
line = "「この世に唯一無二、会長さんの体型に合わせた専用スーツなんで。あんまり痩せたり太ったりして体型が変わると、着れなくなるから気をつけて」"

[[dialogue]]
speaker = "美鶴"
# 「ま、その時はまた隅々まで採寸して調整するから」
line = "「ま、その時はまた隅々まで採寸して調整するから」"

[[dialogue]]
speaker = "unk"
# どうやらヴィーナスの『美鶴の心を開け大作戦』は大成功──
line = "どうやらヴィーナスの『美鶴の心を開け大作戦』は大成功──"

[[dialogue]]
speaker = "美鶴"
# 「でも、今度はふたりきりがいいかも……ふふ♪」
line = "「でも、今度はふたりきりがいいかも……ふふ♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ん？　んんー？　ちょっと美鶴ー？」
line = "「ん？　んんー？　ちょっと美鶴ー？」"

[[dialogue]]
speaker = "美鶴"
# 「なんでしょう、お嬢様。何か問題でも？」
line = "「なんでしょう、お嬢様。何か問題でも？」"

[[dialogue]]
speaker = "unk"
# もしかすると、大成功しすぎたのかもしれなかった。
line = "もしかすると、大成功しすぎたのかもしれなかった。"
