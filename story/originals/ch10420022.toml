line = "「でも、まだ買い物終わってませんし……」"

[[dialogue]]
speaker = "ルルカ"
# 「強がっちゃダメだよ！　無理してもいいことなんて、何もないんだから」
line = "「強がっちゃダメだよ！　無理してもいいことなんて、何もないんだから」"

[[dialogue]]
speaker = "ルルカ"
# 「というわけで、残りはあたしが買ってくるから、お兄ちゃんはフニちゃんを介抱してあげることっ！　彼氏なんだからしっかりお願いね～」
line = "「というわけで、残りはあたしが買ってくるから、お兄ちゃんはフニちゃんを介抱してあげることっ！　彼氏なんだからしっかりお願いね～」"

[[dialogue]]
speaker = "unk"
# フニと俺は座って休憩できる場所ということで、近場の喫茶店へと入っていた。
