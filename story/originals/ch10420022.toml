[[dialogue]]
speaker = "ルルカ"
# 「あいたっ……くもないけど。も～、わかってるよぉ。調子に乗り過ぎました」
line = "「あいたっ……くもないけど。も～、わかってるよぉ。調子に乗り過ぎました」"

[[dialogue]]
speaker = "ルルカ"
