[[dialogue]]
speaker = "unk"
# 第２話,こんなに幸せでいいのかな,P
line = "第２話,こんなに幸せでいいのかな,P"

[[dialogue]]
speaker = "unk"
# とある放課後。ばったり出会ったルルカと一緒に、星徒会の備品を買いに来ていた。
line = "とある放課後。ばったり出会ったルルカと一緒に、星徒会の備品を買いに来ていた。"

[[dialogue]]
speaker = "ルルカ"
# 「買い物リストを見せて、お兄ちゃん」
line = "「買い物リストを見せて、お兄ちゃん」"

[[dialogue]]
speaker = "ルルカ"
# 「ん、どれどれ～。これはいくつか回らないとダメみたいだね」
line = "「ん、どれどれ～。これはいくつか回らないとダメみたいだね」"

[[dialogue]]
speaker = "ルルカ"
# 「ちょうどあたしも暇してたし、気にしないでいいよ～。それより買い物が終わったらご褒美お願いねっ、お兄ちゃん♪」
line = "「ちょうどあたしも暇してたし、気にしないでいいよ～。それより買い物が終わったらご褒美お願いねっ、お兄ちゃん♪」"

[[dialogue]]
speaker = "unk"
# わかってるよ
line = "わかってるよ"

[[dialogue]]
speaker = "ルルカ"
# 「よ～しっ！　それじゃあさっさと済ませちゃおう！」
line = "「よ～しっ！　それじゃあさっさと済ませちゃおう！」"

[[dialogue]]
speaker = "ルルカ"
# 「って、あそこにいるの、フニちゃんじゃない？　おーい、フニちゃーん」
line = "「って、あそこにいるの、フニちゃんじゃない？　おーい、フニちゃーん」"

[[dialogue]]
speaker = "フェニエル"
# 「あっ！　会長さん♪」
line = "「あっ！　会長さん♪」"

[[dialogue]]
speaker = "ルルカ"
# 「も～。声をかけたのはあたしなんですけど～？」
line = "「も～。声をかけたのはあたしなんですけど～？」"

[[dialogue]]
speaker = "フェニエル"
# 「ご、ごめんなさい、ルルカちゃん」
line = "「ご、ごめんなさい、ルルカちゃん」"

[[dialogue]]
speaker = "ルルカ"
# 「それよりどうしたの？　メイド隊のお仕事中？」
line = "「それよりどうしたの？　メイド隊のお仕事中？」"

[[dialogue]]
speaker = "フェニエル"
# 「ううん、自分の手紙を出してきただけだよ。ルルカちゃんたちは？」
line = "「ううん、自分の手紙を出してきただけだよ。ルルカちゃんたちは？」"

[[dialogue]]
speaker = "ルルカ"
# 「お兄ちゃんの買い出しにつきあってたとこ！　結構数が多くて大変そうなんだよ～」
line = "「お兄ちゃんの買い出しにつきあってたとこ！　結構数が多くて大変そうなんだよ～」"

[[dialogue]]
speaker = "unk"
# フニも一緒に来ない？
line = "フニも一緒に来ない？"

[[dialogue]]
speaker = "フェニエル"
# 「は、はい。私の用事は済みましたから、ご一緒できるなら……」
line = "「は、はい。私の用事は済みましたから、ご一緒できるなら……」"

[[dialogue]]
speaker = "ルルカ"
# 「も～～！　白々しいよ、お兄ちゃん！　ネタはあがってるんだからねっ」
line = "「も～～！　白々しいよ、お兄ちゃん！　ネタはあがってるんだからねっ」"

[[dialogue]]
speaker = "ルルカ"
# 「たまたまそこにいたから声かけましたー、なんて誘い方してるけど、あたしの目はごまかせないんだから！」
line = "「たまたまそこにいたから声かけましたー、なんて誘い方してるけど、あたしの目はごまかせないんだから！」"

[[dialogue]]
speaker = "フェニエル"
# 「る、ルルカちゃん！？」
line = "「る、ルルカちゃん！？」"

[[dialogue]]
speaker = "ルルカ"
# 「フニちゃんは何も言わなくていいの！」
line = "「フニちゃんは何も言わなくていいの！」"

[[dialogue]]
speaker = "ルルカ"
# 「お兄ちゃん！　フニちゃんとお付き合いしてるんでしょ！　隠さず白状しなさい！」
line = "「お兄ちゃん！　フニちゃんとお付き合いしてるんでしょ！　隠さず白状しなさい！」"

[[dialogue]]
speaker = "unk"
# 隠してないよ。フニと付き合ってる
line = "隠してないよ。フニと付き合ってる"

[[dialogue]]
speaker = "ルルカ"
# 「えええっ！？　隠してなかったのぉ！？」
line = "「えええっ！？　隠してなかったのぉ！？」"

[[dialogue]]
speaker = "フェニエル"
# 「う、うん。付き合い始めました～って、わざわざ言って回るのも、おかしいかなって……」
line = "「う、うん。付き合い始めました～って、わざわざ言って回るのも、おかしいかなって……」"

[[dialogue]]
speaker = "ルルカ"
# 「それもそうだけどぉ……黙ってるなんて水臭いよ！」
line = "「それもそうだけどぉ……黙ってるなんて水臭いよ！」"

[[dialogue]]
speaker = "ルルカ"
# 「特にお兄ちゃん！　そういうことは妹であるあたしに、真っ先に報告すべきじゃないかなっ！」
line = "「特にお兄ちゃん！　そういうことは妹であるあたしに、真っ先に報告すべきじゃないかなっ！」"

[[dialogue]]
speaker = "unk"
# いや、ルルカは妹じゃないし
line = "いや、ルルカは妹じゃないし"

[[dialogue]]
speaker = "ルルカ"
# 「お、お兄ちゃん……ついに言ってはならないことを口にしてしまったね？」
line = "「お、お兄ちゃん……ついに言ってはならないことを口にしてしまったね？」"

[[dialogue]]
speaker = "unk"
# 男は全力で潔白を証明しなきゃじゃないか？
line = "男は全力で潔白を証明しなきゃじゃないか？"

[[dialogue]]
speaker = "unk"
# 恋人の前で血縁のない女子に妹面されたら
line = "恋人の前で血縁のない女子に妹面されたら"

[[dialogue]]
speaker = "ルルカ"
# 「それはそう！！」
line = "「それはそう！！」"

[[dialogue]]
speaker = "ルルカ"
# 「ふむ。どうやらお兄ちゃんは、あたしの試練を無事クリアしてみせたようだね！」
line = "「ふむ。どうやらお兄ちゃんは、あたしの試練を無事クリアしてみせたようだね！」"

[[dialogue]]
speaker = "フェニエル"
# 「はぁぁっ。会長さん、私のために、そんなことまで考えてくれてたんですか？」
line = "「はぁぁっ。会長さん、私のために、そんなことまで考えてくれてたんですか？」"

[[dialogue]]
speaker = "フェニエル"
# 「あっ、えへへぇ<emoji=heart04>　『当たり前だろ』って、そんな……ルルカちゃんの前なんですから、頭撫でたりしちゃ、ダメです♪」
line = "「あっ、えへへぇ<emoji=heart04>　『当たり前だろ』って、そんな……ルルカちゃんの前なんですから、頭撫でたりしちゃ、ダメです♪」"

[[dialogue]]
speaker = "ルルカ"
# 「お兄ちゃんたち、想像以上に人前でイチャつくね！？」
line = "「お兄ちゃんたち、想像以上に人前でイチャつくね！？」"

[[dialogue]]
speaker = "フェニエル"
# 「はっ！　ご、ごめんなさいっ。はしたない所を見せてしまいました……」
line = "「はっ！　ご、ごめんなさいっ。はしたない所を見せてしまいました……」"

[[dialogue]]
speaker = "ルルカ"
# 「あっ、ごめんごめん！　全然いいんだよ、フニちゃんはそれで。今の今まで気づかれてなかったことに衝撃を受けてただけだから！」
line = "「あっ、ごめんごめん！　全然いいんだよ、フニちゃんはそれで。今の今まで気づかれてなかったことに衝撃を受けてただけだから！」"

[[dialogue]]
speaker = "ルルカ"
# 「……それにしても、お兄ちゃんと一緒にいる時のフニちゃん、いい顔で笑うね！」
line = "「……それにしても、お兄ちゃんと一緒にいる時のフニちゃん、いい顔で笑うね！」"

[[dialogue]]
speaker = "ルルカ"
# 「なんというか、安心しきってるのがわかるよ。フニちゃん、笑うと可愛いのに、緊張しちゃってることが多いから」
line = "「なんというか、安心しきってるのがわかるよ。フニちゃん、笑うと可愛いのに、緊張しちゃってることが多いから」"

[[dialogue]]
speaker = "ルルカ"
# 「守ってくれる心強い味方がいると、こんなにも笑ってくれるんだなって、あたし感心しちゃった」
line = "「守ってくれる心強い味方がいると、こんなにも笑ってくれるんだなって、あたし感心しちゃった」"

[[dialogue]]
speaker = "unk"
# ルルカにはあげないぞ？
