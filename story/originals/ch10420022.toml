[[dialogue]]
speaker = "ルルカ"
# 「え～～？　そんなケチくさいこと言わないで、たまにはあたしにもフニちゃん貸してよ、お兄ちゃん」
line = "「え～～？　そんなケチくさいこと言わないで、たまにはあたしにもフニちゃん貸してよ、お兄ちゃん」"

[[dialogue]]
speaker = "フェニエル"
# 「はぅぅぅ～。ルルカちゃんに報告しなかったことは謝りますから、これ以上いじめないでくださぃ……」
line = "「はぅぅぅ～。ルルカちゃんに報告しなかったことは謝りますから、これ以上いじめないでくださぃ……」"

[[dialogue]]
speaker = "ルルカ"
# 「ど、どうしよう、お兄ちゃん！　そんな気はなかったのに、涙声のフニちゃん見てたら、背筋がゾクゾクしてきちゃったよ……？」
line = "「ど、どうしよう、お兄ちゃん！　そんな気はなかったのに、涙声のフニちゃん見てたら、背筋がゾクゾクしてきちゃったよ……？」"

[[dialogue]]
