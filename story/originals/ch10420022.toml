[[dialogue]]
speaker = "フェニエル"
# 「は、はいっ。お供します！」
line = "「は、はいっ。お供します！」"

[[dialogue]]
speaker = "ルルカ"
# 「というわけで気を取り直して、３人で買い出しにレッツゴー！」
