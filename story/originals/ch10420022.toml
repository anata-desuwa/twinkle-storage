# 「私も、会長さんが寂しく思ってる時は、こうして抱きしめてあげられるくらい、強くなりたいです」
line = "「私も、会長さんが寂しく思ってる時は、こうして抱きしめてあげられるくらい、強くなりたいです」"

[[dialogue]]
speaker = "フェニエル"
