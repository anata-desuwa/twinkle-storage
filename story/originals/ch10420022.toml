line = "「ほら、フニちゃん。２人がラブラブなのはよくわかったから、一緒に行こ？」"

[[dialogue]]
speaker = "ルルカ"
# 「どうせなら買い出しもみんなですぐ終わらせて、遊びに行こうよ♪」
