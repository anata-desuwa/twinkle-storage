[[dialogue]]
speaker = "フェニエル"
# 「メイド隊のナミエルちゃんも、いつも気にかけてくれてて……私がミスしそうになったら、こっそりフォローしてくれるんですよ」
line = "「メイド隊のナミエルちゃんも、いつも気にかけてくれてて……私がミスしそうになったら、こっそりフォローしてくれるんですよ」"

[[dialogue]]
speaker = "フェニエル"
# 「ヒルディオーネお姉様は、私が落ち込んでいたら力強く叱咤して励ましてくれるんです」
line = "「ヒルディオーネお姉様は、私が落ち込んでいたら力強く叱咤して励ましてくれるんです」"

[[dialogue]]
speaker = "フェニエル"
# 「セッシーちゃんも……マムも……それから会長さんも……みんなみんな……」
line = "「セッシーちゃんも……マムも……それから会長さんも……みんなみんな……」"

[[dialogue]]
speaker = "フェニエル"
# 「大好きなんです、本当に。だから……っっ……」
line = "「大好きなんです、本当に。だから……っっ……」"

[[dialogue]]
