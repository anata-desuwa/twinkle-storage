[[dialogue]]
speaker = "unk"
# 第３話,ボランティア活動,P
line = "第３話,ボランティア活動,P"

[[dialogue]]
speaker = "シャロン"
# 「今日は子ども会ボランティアへのご参加ありがとうございます！　よろしくお願いします！」
line = "「今日は子ども会ボランティアへのご参加ありがとうございます！　よろしくお願いします！」"

[[dialogue]]
speaker = "蛍火"
# 「……よろしくお願いいたします」
line = "「……よろしくお願いいたします」"

[[dialogue]]
speaker = "イレーナ"
# 「よろしくお願いします。会長さんも私と同じく初参加でしたね」
line = "「よろしくお願いします。会長さんも私と同じく初参加でしたね」"

[[dialogue]]
speaker = "シャロン"
# 「では私たちの活動について改めて説明をいたしましょう」
line = "「では私たちの活動について改めて説明をいたしましょう」"

[[dialogue]]
speaker = "シャロン"
# 「私がお世話になっている修道院では、流星市国内の子ども会のお手伝いをさせていただいております」
line = "「私がお世話になっている修道院では、流星市国内の子ども会のお手伝いをさせていただいております」"

[[dialogue]]
speaker = "シャロン"
# 「本日のお食事会もその一環で、蛍火さまには今までも何度かお力をお借りしているのです。いつもありがとうございます！」
line = "「本日のお食事会もその一環で、蛍火さまには今までも何度かお力をお借りしているのです。いつもありがとうございます！」"

[[dialogue]]
speaker = "シャロン"
# 「そして今日はイレーナさまにもご協力いただけることになりました。まさか聖女様にご参加いただけるなんて感激です！」
line = "「そして今日はイレーナさまにもご協力いただけることになりました。まさか聖女様にご参加いただけるなんて感激です！」"

[[dialogue]]
speaker = "イレーナ"
# 「いえいえ、聖女と謳われようと私はいち神官に過ぎませんから。力になれるのなら光栄です」
line = "「いえいえ、聖女と謳われようと私はいち神官に過ぎませんから。力になれるのなら光栄です」"

[[dialogue]]
speaker = "シャロン"
# 「今回はカフェテリアのスペースをお貸しいただけたので、いつもより賑やかになりそうですね」
line = "「今回はカフェテリアのスペースをお貸しいただけたので、いつもより賑やかになりそうですね」"

[[dialogue]]
speaker = "蛍火"
# 「ですがすみません。昨日の営業が盛況で、カフェテリアの食材が切れているようです」
line = "「ですがすみません。昨日の営業が盛況で、カフェテリアの食材が切れているようです」"

[[dialogue]]
speaker = "シャロン"
# 「では、手分けしていきましょう。私と会長さまは買い出しを。蛍火さまとイレーナさまはお子様たちの遊び相手や勉強をお願いします！」
line = "「では、手分けしていきましょう。私と会長さまは買い出しを。蛍火さまとイレーナさまはお子様たちの遊び相手や勉強をお願いします！」"

[[dialogue]]
speaker = "蛍火"
# 「──！？」
line = "「──！？」"

[[dialogue]]
speaker = "シャロン"
# 「ニンジン、玉ねぎ、ジャガイモ、お肉……うん、ちゃんとありますね。荷物を持っていただいてありがとうございます、会長さま」
line = "「ニンジン、玉ねぎ、ジャガイモ、お肉……うん、ちゃんとありますね。荷物を持っていただいてありがとうございます、会長さま」"

[[dialogue]]
speaker = "シャロン"
# 「さすが殿方、頼もしいです。今日はたくさん子どもたちが来られるので、材料もたくさん必要なのですよ」
line = "「さすが殿方、頼もしいです。今日はたくさん子どもたちが来られるので、材料もたくさん必要なのですよ」"

[[dialogue]]
speaker = "unk"
# でもあっちは大丈夫かな
line = "でもあっちは大丈夫かな"

[[dialogue]]
speaker = "シャロン"
# 「蛍火さまのことですか？　大丈夫ですよ、カフェテリアの場所を提供するようお話を通してくださったのが彼女ですから。きっと子ども好きに違いありません！」
line = "「蛍火さまのことですか？　大丈夫ですよ、カフェテリアの場所を提供するようお話を通してくださったのが彼女ですから。きっと子ども好きに違いありません！」"

[[dialogue]]
speaker = "シャロン"
# 「イレーナさまも母国ではボランティアの経験が豊富と聞きましたので、大丈夫だと思います！」
line = "「イレーナさまも母国ではボランティアの経験が豊富と聞きましたので、大丈夫だと思います！」"

[[dialogue]]
speaker = "unk"
# （ちょっと心配だなー……）
line = "（ちょっと心配だなー……）"

[[dialogue]]
speaker = "シャロン"
# 「地域の子どもやご家族の交流になればと始まった会でしたが、今では評判が広がって、たくさんの子どもたちに来ていただけるようになりました」
line = "「地域の子どもやご家族の交流になればと始まった会でしたが、今では評判が広がって、たくさんの子どもたちに来ていただけるようになりました」"

[[dialogue]]
speaker = "シャロン"
# 「参加する子どもたちはいつも楽しそうで、生きるには食べ物の栄養だけでなく心の栄養も必要なのだと、子どもたちには気付かされます」
line = "「参加する子どもたちはいつも楽しそうで、生きるには食べ物の栄養だけでなく心の栄養も必要なのだと、子どもたちには気付かされます」"

[[dialogue]]
speaker = "シャロン"
# 「子どもたちが笑顔になってくれてとても嬉しいです！　やりがいがあります！」
line = "「子どもたちが笑顔になってくれてとても嬉しいです！　やりがいがあります！」"

[[dialogue]]
speaker = "シャロン"
# 「では一刻も早く学園に戻り――」
line = "「では一刻も早く学園に戻り――」"

[[dialogue]]
speaker = "シャロン"
# 「！　モンスター……行きましょう、会長さま」
line = "「！　モンスター……行きましょう、会長さま」"

[[dialogue]]
speaker = "シャロン"
# 「みなさん、お怪我はありませんか？　落ち着いて避難してください！」
line = "「みなさん、お怪我はありませんか？　落ち着いて避難してください！」"

[[dialogue]]
speaker = "女の子"
# 「お姉ちゃん、助けてー！」
line = "「お姉ちゃん、助けてー！」"

[[dialogue]]
speaker = "シャロン"
# 「！？　モンスターが子どもに──」
line = "「！？　モンスターが子どもに──」"

[[dialogue]]
speaker = "シャロン"
# 「セラフィックレイン！」
line = "「セラフィックレイン！」"

[[dialogue]]
speaker = "unk"
# お見事！
line = "お見事！"

[[dialogue]]
speaker = "シャロン"
# 「ふぅ、これで大丈夫ですね……あ──」
line = "「ふぅ、これで大丈夫ですね……あ──」"

[[dialogue]]
speaker = "unk"
# ふらついて倒れるシャロンを、咄嗟に受け止める。
line = "ふらついて倒れるシャロンを、咄嗟に受け止める。"

[[dialogue]]
speaker = "シャロン"
# 「ありがとうございます……会長さまはお優しいですね……」
line = "「ありがとうございます……会長さまはお優しいですね……」"

[[dialogue]]
speaker = "シャロン"
# 「実は私、もともと貧血気味でして……普段は支障はないのですが、星力を使い過ぎると倒れてしまうのです」
line = "「実は私、もともと貧血気味でして……普段は支障はないのですが、星力を使い過ぎると倒れてしまうのです」"

[[dialogue]]
speaker = "シャロン"
# 「ですがシスターとして、星騎士として、見過ごすわけにはいきません……」
line = "「ですがシスターとして、星騎士として、見過ごすわけにはいきません……」"

[[dialogue]]
speaker = "unk"
# どうしてシャロンはシスターに？
line = "どうしてシャロンはシスターに？"

[[dialogue]]
speaker = "シャロン"
# 「そうですね……天使は元から人より神に近い存在ですから、天界生まれのシスターはいささか珍しいかもしれません」
line = "「そうですね……天使は元から人より神に近い存在ですから、天界生まれのシスターはいささか珍しいかもしれません」"

[[dialogue]]
speaker = "シャロン"
# 「幼い頃、まだ天界にいた時のことです。私は原因不明の病に侵され、生死の境をさまよっていました」
line = "「幼い頃、まだ天界にいた時のことです。私は原因不明の病に侵され、生死の境をさまよっていました」"

[[dialogue]]
speaker = "シャロン"
# 「高熱にうなされ、全身の痛みに呻きながら、朦朧とした意識で私はもう死ぬのだと思いました」
line = "「高熱にうなされ、全身の痛みに呻きながら、朦朧とした意識で私はもう死ぬのだと思いました」"

[[dialogue]]
speaker = "シャロン"
# 「ですが私は病に伏せながら、縋る気持ちで女神様に祈りました。『助けてください、死にたくありません』――と」
line = "「ですが私は病に伏せながら、縋る気持ちで女神様に祈りました。『助けてください、死にたくありません』――と」"

[[dialogue]]
speaker = "シャロン"
# 「もちろん病に倒れるまで女神様を信じていなかったわけではありません。ですがあれほど真摯に祈ったのもあの時が初めてでしょう」
line = "「もちろん病に倒れるまで女神様を信じていなかったわけではありません。ですがあれほど真摯に祈ったのもあの時が初めてでしょう」"

[[dialogue]]
speaker = "シャロン"
# 「程なくして、病は原因不明のまま快方に向かい、私は一命をとりとめました。きっと女神様が祈りを聞き届けて、私を救ってくださったのだと思います」
line = "「程なくして、病は原因不明のまま快方に向かい、私は一命をとりとめました。きっと女神様が祈りを聞き届けて、私を救ってくださったのだと思います」"

[[dialogue]]
speaker = "シャロン"
# 「そして私は女神様に救われたご恩に報いるために、神に仕えるシスターとなりました」
line = "「そして私は女神様に救われたご恩に報いるために、神に仕えるシスターとなりました」"

[[dialogue]]
speaker = "シャロン"
# 「貧血気味になったのも病気をしてからです。ですがこの体質も、神の恩寵を忘れぬためのものと思っております」
line = "「貧血気味になったのも病気をしてからです。ですがこの体質も、神の恩寵を忘れぬためのものと思っております」"

[[dialogue]]
speaker = "女の子"
# 「お姉ちゃん……ごめんなさい、わたしのせいで……」
line = "「お姉ちゃん……ごめんなさい、わたしのせいで……」"

[[dialogue]]
speaker = "シャロン"
# 「いいえ、気にしないでください。ちょっと休めば良くなりますから」
line = "「いいえ、気にしないでください。ちょっと休めば良くなりますから」"

[[dialogue]]
speaker = "シャロン"
# 「それより……もしかして、これから子ども会にいくところですか？」
line = "「それより……もしかして、これから子ども会にいくところですか？」"

[[dialogue]]
speaker = "女の子"
# 「え？　うん、そうだけど……」
line = "「え？　うん、そうだけど……」"

[[dialogue]]
speaker = "シャロン"
# 「ならちょうど良かったです。今買い出しに行ってたところなんですよ」
line = "「ならちょうど良かったです。今買い出しに行ってたところなんですよ」"

[[dialogue]]
speaker = "シャロン"
# 「美味しいお料理たくさん作りますから、楽しみにしていてください！」
line = "「美味しいお料理たくさん作りますから、楽しみにしていてください！」"

[[dialogue]]
speaker = "女の子"
# 「……うん！」
line = "「……うん！」"

[[dialogue]]
speaker = "シャロン"
# 「良いお返事です。ふふふ、腕の振るいがいがありますね！」
line = "「良いお返事です。ふふふ、腕の振るいがいがありますね！」"
