[[dialogue]]
speaker = "ヒルディオーネ"
# 「やりましたわ……大勝利です！　一時はどうなることかと！」
line = "「やりましたわ……大勝利です！　一時はどうなることかと！」"

[[dialogue]]
speaker = "セナリィ"
# 「借りを作ってしまいましたわね、マイン？」
line = "「借りを作ってしまいましたわね、マイン？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「２人のおかげで色々観察できたしね～。みんなの勝利ってことでいいんじゃない？」
line = "「２人のおかげで色々観察できたしね～。みんなの勝利ってことでいいんじゃない？」"

[[dialogue]]
speaker = "ダッチ"
# 「フフ……ラビットガーデンを造って以来、初めての敗北……」
line = "「フフ……ラビットガーデンを造って以来、初めての敗北……」"

[[dialogue]]
speaker = "ダッチ"
# 「残念ですが、ここまで集めていた子ウサギたちも解放しなくてはならないようです」
line = "「残念ですが、ここまで集めていた子ウサギたちも解放しなくてはならないようです」"

[[dialogue]]
speaker = "ダッチ"
# 「では皆様。『欲望』を口に出していただけますか？」
line = "「では皆様。『欲望』を口に出していただけますか？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひ♪　そんなの決まってるよねー？」
line = "「にひ♪　そんなの決まってるよねー？」"

[[dialogue]]
speaker = "セナリィ"
# 「ええ、もちろんですわ。私たちは九浄家のカジノから依頼を受けた星騎士……お役目を果たさなくては」
line = "「ええ、もちろんですわ。私たちは九浄家のカジノから依頼を受けた星騎士……お役目を果たさなくては」"

[[dialogue]]
speaker = "unk"
# 先輩が代表してどうぞ
line = "先輩が代表してどうぞ"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「おーっほっほっほ！　美味しいところを譲っていただけるとは、感謝いたしますわ！」
line = "「おーっほっほっほ！　美味しいところを譲っていただけるとは、感謝いたしますわ！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「では──ダッチ。私たちは願いますわ！」
line = "「では──ダッチ。私たちは願いますわ！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「その願いは……『暴力行為の禁止』を解除、ですわ！！」
line = "「その願いは……『暴力行為の禁止』を解除、ですわ！！」"

[[dialogue]]
speaker = "ダッチ"
# 「──何ですって！？　こ、ここから出せという願いは……！？」
line = "「──何ですって！？　こ、ここから出せという願いは……！？」"

[[dialogue]]
speaker = "セナリィ"
# 「そんなもの、貴方をボコって再起不能にすれば、自然に達成できるじゃありませんの♪」
line = "「そんなもの、貴方をボコって再起不能にすれば、自然に達成できるじゃありませんの♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひぃ♪　ダッチには散々振り回されたしね～？」
line = "「にひぃ♪　ダッチには散々振り回されたしね～？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「貴方を倒し、このカジノを破壊して、失踪された方々をみな帰還させる……すべて成し遂げればいいだけでしてよ！」
line = "「貴方を倒し、このカジノを破壊して、失踪された方々をみな帰還させる……すべて成し遂げればいいだけでしてよ！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「嫁入り前の乙女にこんなハレンチな衣装を着させた罪……！」
line = "「嫁入り前の乙女にこんなハレンチな衣装を着させた罪……！」"

[[dialogue]]
speaker = "セナリィ"
# 「血を持って償っていただきますわ。覚悟の準備はよろしくて？」
line = "「血を持って償っていただきますわ。覚悟の準備はよろしくて？」"

[[dialogue]]
speaker = "ダッチ"
# 「フ、フフ……！　フハハハハハ！！　流石は星騎士！　私の息の根を止めようというのですね！！」
line = "「フ、フフ……！　フハハハハハ！！　流石は星騎士！　私の息の根を止めようというのですね！！」"

[[dialogue]]
speaker = "ダッチ"
# 「素晴らしい！　貴女がたはいつも私の予想の上をいく！　許可しましょう、暴力行為の禁止ルールを解除します！！」
line = "「素晴らしい！　貴女がたはいつも私の予想の上をいく！　許可しましょう、暴力行為の禁止ルールを解除します！！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「……あれ？　なんかバニーガールのまま武器が出せるようになってる！」
line = "「……あれ？　なんかバニーガールのまま武器が出せるようになってる！」"

[[dialogue]]
speaker = "ダッチ"
# 「衣装が馴染んできたのでしょう。貴女がた星騎士は、精神的なブレイクスルーによって戦闘服を増やせることは知っております」
line = "「衣装が馴染んできたのでしょう。貴女がた星騎士は、精神的なブレイクスルーによって戦闘服を増やせることは知っております」"

[[dialogue]]
speaker = "ダッチ"
# 「つまり皆様……心の底ではバニー姿のご自身を気に入っておられるのですよ！」
line = "「つまり皆様……心の底ではバニー姿のご自身を気に入っておられるのですよ！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ですわっ！？」
line = "「ですわっ！？」"

[[dialogue]]
speaker = "セナリィ"
# 「ふざけんじゃねえですわよ！？」
line = "「ふざけんじゃねえですわよ！？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「私はけっこー気に入ってるけどね。にひ、会長ってばず～っとチラチラ、私たちのおっぱい見てくるし～♪」
line = "「私はけっこー気に入ってるけどね。にひ、会長ってばず～っとチラチラ、私たちのおっぱい見てくるし～♪」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「緋宮会長！　そんなことをしてましたの！？」
line = "「緋宮会長！　そんなことをしてましたの！？」"

[[dialogue]]
speaker = "unk"
# そりゃ男ですから、つい見ちゃいますよ！？
line = "そりゃ男ですから、つい見ちゃいますよ！？"

[[dialogue]]
speaker = "ダッチ"
# 「今の貴女は女性ですが？？？」
line = "「今の貴女は女性ですが？？？」"

[[dialogue]]
speaker = "unk"
# コイツ……許さん！！
line = "コイツ……許さん！！"

[[dialogue]]
speaker = "ダッチ"
# 「ふふ、皆様の星力がどんどん高まって……恐ろしいほどですが。私だって黙ってやられるわけにはいかない！」
line = "「ふふ、皆様の星力がどんどん高まって……恐ろしいほどですが。私だって黙ってやられるわけにはいかない！」"

[[dialogue]]
speaker = "ダッチ"
# 「お見せしましょう……『欲望』のロストアイテムの戦闘形態を……！」
line = "「お見せしましょう……『欲望』のロストアイテムの戦闘形態を……！」"

[[dialogue]]
speaker = "ダッチ"
# 「ウォオォオオオ──！！　かかってきなさい、星騎士の皆様！」
line = "「ウォオォオオオ──！！　かかってきなさい、星騎士の皆様！」"

[[dialogue]]
speaker = "セナリィ"
# 「凄まじい闘気ですわ……でも！」
line = "「凄まじい闘気ですわ……でも！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「うん、面倒なゲームよりわかりやすい！」
line = "「うん、面倒なゲームよりわかりやすい！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「おーっほっほっほ！　行きますわよ皆様方！　不埒な変態紳士を成敗いたしますわ！！」
line = "「おーっほっほっほ！　行きますわよ皆様方！　不埒な変態紳士を成敗いたしますわ！！」"
