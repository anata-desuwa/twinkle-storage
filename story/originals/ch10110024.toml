[[dialogue]]
speaker = "unk"
# 第４話,マトイの初体験,P
line = "第４話,マトイの初体験,P"

[[dialogue]]
speaker = "unk"
# マトイと恋人になってからしばらくが経ち、俺たちはまたリゾート結界へデートしに来ていた――
line = "マトイと恋人になってからしばらくが経ち、俺たちはまたリゾート結界へデートしに来ていた――"

[[dialogue]]
speaker = "ギャル風の女"
# 「え～<emoji=heart04>　こんなところで恥ずかしいよ～。んっ……<emoji=heart04>」
line = "「え～<emoji=heart04>　こんなところで恥ずかしいよ～。んっ……<emoji=heart04>」"

[[dialogue]]
speaker = "チャラい男"
# 「大丈夫だって。周りもカップル多いから、これくらい気にしねぇよ……」
line = "「大丈夫だって。周りもカップル多いから、これくらい気にしねぇよ……」"

[[dialogue]]
speaker = "マトイ"
# （う、うわぁ～！　あそこのカップル、こんな人が多いところでキスしちゃってる……！　いくら何でも大胆過ぎない！？）
line = "（う、うわぁ～！　あそこのカップル、こんな人が多いところでキスしちゃってる……！　いくら何でも大胆過ぎない！？）"

[[dialogue]]
speaker = "マトイ"
# （そ、そういえば、会長と付き合い始めてしばらく経つけど、キスはまだしたことがないなぁ……）
line = "（そ、そういえば、会長と付き合い始めてしばらく経つけど、キスはまだしたことがないなぁ……）"

[[dialogue]]
speaker = "マトイ"
# （キスって、どれくらい経ってからするのが普通なんだろう……？　は、半年とか……？）
line = "（キスって、どれくらい経ってからするのが普通なんだろう……？　は、半年とか……？）"

[[dialogue]]
speaker = "unk"
# マトイ、お待たせ～
line = "マトイ、お待たせ～"

[[dialogue]]
speaker = "マトイ"
# 「あっ、か、会長……！　私の分も飲み物買って来てくれてありがとね」
line = "「あっ、か、会長……！　私の分も飲み物買って来てくれてありがとね」"

[[dialogue]]
speaker = "マトイ"
# 「う、ううん、何でもないよ！　あっちのビーチに戻ろっかっ。あははは……」
line = "「う、ううん、何でもないよ！　あっちのビーチに戻ろっかっ。あははは……」"

[[dialogue]]
speaker = "マトイ"
# 「じ～っ……」
line = "「じ～っ……」"

[[dialogue]]
speaker = "unk"
# （なんか、ずっと顔を見られてる気が……）
line = "（なんか、ずっと顔を見られてる気が……）"

[[dialogue]]
speaker = "マトイ"
# 「う、うん？　なに、会長？」
line = "「う、うん？　なに、会長？」"

[[dialogue]]
speaker = "マトイ"
# 「――え！？　い、いや、顔には何も付いてないよ！　ちょっと、ぼーっとしちゃってただけで……」
line = "「――え！？　い、いや、顔には何も付いてないよ！　ちょっと、ぼーっとしちゃってただけで……」"

[[dialogue]]
speaker = "マトイ"
# 「って、ひゃっ！？　会長の手がおでこに……！」
line = "「って、ひゃっ！？　会長の手がおでこに……！」"

[[dialogue]]
speaker = "マトイ"
# 「――顔が赤くなってる？　ね、熱とかがあるわけじゃないから、大丈夫だよ！」
line = "「――顔が赤くなってる？　ね、熱とかがあるわけじゃないから、大丈夫だよ！」"

[[dialogue]]
speaker = "マトイ"
# （い、今そんなに顔を近くから覗かれたりしたら、ますます意識しちゃうよ～！）
line = "（い、今そんなに顔を近くから覗かれたりしたら、ますます意識しちゃうよ～！）"

[[dialogue]]
speaker = "マトイ"
# 「そ、そろそろ休憩終わりにして、また海に入ろっか！」
line = "「そ、そろそろ休憩終わりにして、また海に入ろっか！」"

[[dialogue]]
speaker = "マトイ"
# 「いや～、それにしても、夏はもう過ぎたのに、リゾート結界は人気だね～……チラッ」
line = "「いや～、それにしても、夏はもう過ぎたのに、リゾート結界は人気だね～……チラッ」"

[[dialogue]]
speaker = "マトイ"
# 「やっぱり近場で、常夏の海が時期問わず楽しめるっていうのは強いよね～……チラッ」
line = "「やっぱり近場で、常夏の海が時期問わず楽しめるっていうのは強いよね～……チラッ」"

[[dialogue]]
speaker = "unk"
# （やっぱり挙動不審だな……）
line = "（やっぱり挙動不審だな……）"

[[dialogue]]
speaker = "マトイ"
# 「会長、海で何して遊ぶ？　――え？　少し離れた場所に行きたい？」
line = "「会長、海で何して遊ぶ？　――え？　少し離れた場所に行きたい？」"

[[dialogue]]
speaker = "マトイ"
# 「し、静かな場所だね～……浅瀬で波も穏やかだし……」
line = "「し、静かな場所だね～……浅瀬で波も穏やかだし……」"

[[dialogue]]
speaker = "マトイ"
# （会長の後に付いて、人気のないところまで来たけど……こ、これってもしかして……）
line = "（会長の後に付いて、人気のないところまで来たけど……こ、これってもしかして……）"

[[dialogue]]
speaker = "マトイ"
# （こ、恋人同士の、そういうことをしちゃう流れだったり……！？）
line = "（こ、恋人同士の、そういうことをしちゃう流れだったり……！？）"

[[dialogue]]
speaker = "unk"
# マトイ
line = "マトイ"

[[dialogue]]
speaker = "マトイ"
# 「ひ、ひゃいっ！」
line = "「ひ、ひゃいっ！」"

[[dialogue]]
speaker = "マトイ"
# （あああ、噛んだ！　いざとなると心の準備が……！　心臓がドキドキしちゃうよぉ～……！）
line = "（あああ、噛んだ！　いざとなると心の準備が……！　心臓がドキドキしちゃうよぉ～……！）"

[[dialogue]]
speaker = "マトイ"
# （あっ<emoji=heart04>　会長の両手が肩に置かれて……！　や、やっぱりこれって……）
line = "（あっ<emoji=heart04>　会長の両手が肩に置かれて……！　や、やっぱりこれって……）"

[[dialogue]]
speaker = "マトイ"
# （そ、そうだよね……私達、カップルなんだし……キスくらい普通――）
line = "（そ、そうだよね……私達、カップルなんだし……キスくらい普通――）"

[[dialogue]]
speaker = "unk"
# どういうことか分からないから、教えて欲しい
line = "どういうことか分からないから、教えて欲しい"

[[dialogue]]
speaker = "マトイ"
# 「え？」
line = "「え？」"

[[dialogue]]
speaker = "マトイ"
# 「――わ、私が何か言いたげだったから、静かに話を出来る場所に誘った？」
line = "「――わ、私が何か言いたげだったから、静かに話を出来る場所に誘った？」"

[[dialogue]]
speaker = "マトイ"
# 「つ、つまり私の、勘違い……？　は――」
line = "「つ、つまり私の、勘違い……？　は――」"

[[dialogue]]
speaker = "マトイ"
# 「恥ずかしいぃぃぃ～～～っ！！！　ス、スケベでごめんなさいぃぃぃ～～～っ！」
line = "「恥ずかしいぃぃぃ～～～っ！！！　ス、スケベでごめんなさいぃぃぃ～～～っ！」"

[[dialogue]]
speaker = "unk"
# いきなりどうした！？
line = "いきなりどうした！？"

[[dialogue]]
speaker = "マトイ"
# 「わ、私……実は――」
line = "「わ、私……実は――」"

[[dialogue]]
speaker = "unk"
# カップルがキスしているのを見て、強く意識してしまっていたと、マトイから打ち明けられた――
line = "カップルがキスしているのを見て、強く意識してしまっていたと、マトイから打ち明けられた――"

[[dialogue]]
speaker = "マトイ"
# 「会長に気を遣わせて、私１人で舞い上がっちゃって……うぅ……凄く恥ずかしい……。穴があったら入りたい……」
line = "「会長に気を遣わせて、私１人で舞い上がっちゃって……うぅ……凄く恥ずかしい……。穴があったら入りたい……」"

[[dialogue]]
speaker = "unk"
# そうだったのか……なら――
line = "そうだったのか……なら――"

[[dialogue]]
speaker = "マトイ"
# 「え？　会長……？」
line = "「え？　会長……？」"

[[dialogue]]
speaker = "マトイ"
# 「あ……唇、触れちゃ――」
line = "「あ……唇、触れちゃ――」"

[[dialogue]]
speaker = "マトイ"
# 「ん……<emoji=heart04>」
line = "「ん……<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
# 「んん……<emoji=heart04>　ぷはっ……はあぁ……<emoji=heart04>」
line = "「んん……<emoji=heart04>　ぷはっ……はあぁ……<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
# 「会長と……本当にキス、しちゃった……<emoji=heart04>　初めてのキス<emoji=heart04>」
line = "「会長と……本当にキス、しちゃった……<emoji=heart04>　初めてのキス<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
# 「唇を触れ合わせただけなのに……こんなに気持ちいいんだね……キスって……」
line = "「唇を触れ合わせただけなのに……こんなに気持ちいいんだね……キスって……」"

[[dialogue]]
speaker = "マトイ"
# 「ね、ねぇ……会長……もう１回、しちゃダメ……？」
line = "「ね、ねぇ……会長……もう１回、しちゃダメ……？」"

[[dialogue]]
speaker = "unk"
# 好きだ、マトイ
line = "好きだ、マトイ"

[[dialogue]]
speaker = "マトイ"
# 「ん……<emoji=heart04>　会長……<emoji=heart04>　私も……ちゅっ……<emoji=heart04>」
line = "「ん……<emoji=heart04>　会長……<emoji=heart04>　私も……ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
# 「ちゅっ<emoji=heart04>　ちゅっ……はぁぁ……会長、好き……<emoji=heart04>　ちゅっ……大好きだよ……<emoji=heart04>」
line = "「ちゅっ<emoji=heart04>　ちゅっ……はぁぁ……会長、好き……<emoji=heart04>　ちゅっ……大好きだよ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 初めてのキスはとろけるように甘くて、その後も何度も、数え切れないくらい続けてしまうのだった――
line = "初めてのキスはとろけるように甘くて、その後も何度も、数え切れないくらい続けてしまうのだった――"
