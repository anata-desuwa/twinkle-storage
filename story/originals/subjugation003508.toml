[[dialogue]]
speaker = "unk"
# ミルフィーの一撃がとどめとなって、巨大ゾンビ型幽霊は断末魔と共にかき消えた。
line = "ミルフィーの一撃がとどめとなって、巨大ゾンビ型幽霊は断末魔と共にかき消えた。"

[[dialogue]]
speaker = "ミルフィー"
# 「やった……やったよトリシャさん！　私たちの勝ちだよっ」
line = "「やった……やったよトリシャさん！　私たちの勝ちだよっ」"

[[dialogue]]
speaker = "トリシャ"
# 「フフ……さすがに疲れました……でも心地よい疲労です……」
line = "「フフ……さすがに疲れました……でも心地よい疲労です……」"

[[dialogue]]
speaker = "ミルフィー"
# 「ゾンビ型幽霊を集めて、さらに巨大化したゾンビ型幽霊ともぴょんぴょんしながら戦ってたもんね。本当にお疲れさまだよ」
line = "「ゾンビ型幽霊を集めて、さらに巨大化したゾンビ型幽霊ともぴょんぴょんしながら戦ってたもんね。本当にお疲れさまだよ」"

[[dialogue]]
speaker = "トリシャ"
# 「ミルフィーさんも……八面六臂の大活躍でした……見惚れてしまうくらいに……」
line = "「ミルフィーさんも……八面六臂の大活躍でした……見惚れてしまうくらいに……」"

[[dialogue]]
speaker = "ミルフィー"
# 「そんなことないよぉ。私なんて全然ダメで……って言うのは、さすがに失礼だよね。トリシャさんにも、自分にも、一緒に戦ったみんなにも」
line = "「そんなことないよぉ。私なんて全然ダメで……って言うのは、さすがに失礼だよね。トリシャさんにも、自分にも、一緒に戦ったみんなにも」"

[[dialogue]]
speaker = "トリシャ"
# 「自信を持ってください……ミルフィーさんは立派でした……かっこいい、と思います……」
line = "「自信を持ってください……ミルフィーさんは立派でした……かっこいい、と思います……」"

[[dialogue]]
speaker = "ミルフィー"
# 「うん……でもトリシャさんも同じくらいかっこよかったよ……ほんと、ずっと私の背中を守ってくれてありがとね」
line = "「うん……でもトリシャさんも同じくらいかっこよかったよ……ほんと、ずっと私の背中を守ってくれてありがとね」"

[[dialogue]]
speaker = "トリシャ"
# 「にへへ……私は自分の役目を果たしただけ、ですよ……」
line = "「にへへ……私は自分の役目を果たしただけ、ですよ……」"

[[dialogue]]
speaker = "ミルフィー"
# 「うんっ、知ってる。でもお礼を言いたいの」
line = "「うんっ、知ってる。でもお礼を言いたいの」"

[[dialogue]]
speaker = "unk"
# 心があったかいよ
line = "心があったかいよ"

[[dialogue]]
speaker = "unk"
# てぇてぇ……
line = "てぇてぇ……"

[[dialogue]]
speaker = "ソフィア"
# 「はい……とてもてぇてぇです……」
line = "「はい……とてもてぇてぇです……」"

[[dialogue]]
speaker = "舞亜"
# 「ソフィまでそんなこと言って……」
line = "「ソフィまでそんなこと言って……」"

[[dialogue]]
speaker = "ソフィア"
# 「ミルフィーさんとトリシャさんを見て、私もそう感じたから……なるほど、これがてぇてぇというものですか」
line = "「ミルフィーさんとトリシャさんを見て、私もそう感じたから……なるほど、これがてぇてぇというものですか」"

[[dialogue]]
speaker = "舞亜"
# 「まあ、言いたいことはわかるけどさぁ」
line = "「まあ、言いたいことはわかるけどさぁ」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆゆゆ……余の手下になるはずだったのに、全滅しちゃったゆ……」
line = "「ゆゆゆ……余の手下になるはずだったのに、全滅しちゃったゆ……」"

[[dialogue]]
speaker = "ウズメイア"
# 「ええっ？　ここに来てゾンビ型幽霊の方に共感しちゃってるの？」
line = "「ええっ？　ここに来てゾンビ型幽霊の方に共感しちゃってるの？」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ちょびっともったいないことしたの」
line = "「ちょびっともったいないことしたの」"

[[dialogue]]
speaker = "舞亜"
# 「そもそも最初にジャクリーヌちゃんが逃げなければ、こんなことにはならなかったと思うんだけど」
line = "「そもそも最初にジャクリーヌちゃんが逃げなければ、こんなことにはならなかったと思うんだけど」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「次はうまくやるの。２度と同じ失敗はしないの」
line = "「次はうまくやるの。２度と同じ失敗はしないの」"

[[dialogue]]
speaker = "舞亜"
# 「懲りないなぁ」
line = "「懲りないなぁ」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆーっゆっゆっゆ♪」
line = "「ゆーっゆっゆっゆ♪」"

[[dialogue]]
speaker = "ソフィア"
# 「もう、ちょっとは反省しなさい！」
line = "「もう、ちょっとは反省しなさい！」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆゆゆ～……」
line = "「ゆゆゆ～……」"

[[dialogue]]
speaker = "ウズメイア"
# 「あはははっ、ソフィに叱られてちっちゃくなってるし」
line = "「あはははっ、ソフィに叱られてちっちゃくなってるし」"

[[dialogue]]
speaker = "unk"
# ジャクリーヌのおかげで倒せたわけだし
line = "ジャクリーヌのおかげで倒せたわけだし"

[[dialogue]]
speaker = "unk"
# そのくらいで許してあげよう
line = "そのくらいで許してあげよう"

[[dialogue]]
speaker = "舞亜"
# 「知ってる？　こういうのをマッチポンプって言うんだよ」
line = "「知ってる？　こういうのをマッチポンプって言うんだよ」"

[[dialogue]]
speaker = "ソフィア"
# 「そうですね」
line = "「そうですね」"

[[dialogue]]
speaker = "ミルフィー"
# 「みんなもお疲れさま！　今日はいっぱい頑張ってくれてありがとう」
line = "「みんなもお疲れさま！　今日はいっぱい頑張ってくれてありがとう」"

[[dialogue]]
speaker = "マトイ"
# 「無事解決しましたし、このあとみんなで打ち上げなんてどうかな？」
line = "「無事解決しましたし、このあとみんなで打ち上げなんてどうかな？」"

[[dialogue]]
speaker = "ウズメイア"
# 「さんせーい！」
line = "「さんせーい！」"

[[dialogue]]
speaker = "ミルフィー"
# 「もちろんトリシャさんも一緒だよ。自分には関係ないって顔してたでしょ？」
line = "「もちろんトリシャさんも一緒だよ。自分には関係ないって顔してたでしょ？」"

[[dialogue]]
speaker = "トリシャ"
# 「そんなこと、ない……ですけど……そう見えましたか？」
line = "「そんなこと、ない……ですけど……そう見えましたか？」"

[[dialogue]]
speaker = "ミルフィー"
# 「うん、ちょっとだけ寂しそうだった。どうしてそう思っちゃったの？」
line = "「うん、ちょっとだけ寂しそうだった。どうしてそう思っちゃったの？」"

[[dialogue]]
speaker = "トリシャ"
# 「それは……事件が解決しましたから、私もミルフィーさんのオトモダチである必要はなくなって……だから、その……」
line = "「それは……事件が解決しましたから、私もミルフィーさんのオトモダチである必要はなくなって……だから、その……」"

[[dialogue]]
speaker = "ミルフィー"
# 「オトモじゃなくなるから、オトモダチもおしまいってこと？」
line = "「オトモじゃなくなるから、オトモダチもおしまいってこと？」"

[[dialogue]]
speaker = "トリシャ"
# 「…………はい、そうかな、って。そう思ったら、寂しくなってしまって……」
line = "「…………はい、そうかな、って。そう思ったら、寂しくなってしまって……」"

[[dialogue]]
speaker = "ミルフィー"
# 「おしまいじゃないよ。オトモダチは、これからも継続だから」
line = "「おしまいじゃないよ。オトモダチは、これからも継続だから」"

[[dialogue]]
speaker = "ミルフィー"
# 「トリシャさんが嫌じゃなければ、だけどね」
line = "「トリシャさんが嫌じゃなければ、だけどね」"

[[dialogue]]
speaker = "トリシャ"
# 「い、嫌じゃないです！　私も……もっとミルフィーさんとオトモダチで……いたい、です……」
line = "「い、嫌じゃないです！　私も……もっとミルフィーさんとオトモダチで……いたい、です……」"

[[dialogue]]
speaker = "ミルフィー"
# 「私もだよ。これからもよろしくね、トリシャさん」
line = "「私もだよ。これからもよろしくね、トリシャさん」"

[[dialogue]]
speaker = "トリシャ"
# 「は、はいっ」
line = "「は、はいっ」"

[[dialogue]]
speaker = "unk"
# 新たな友達を得たトリシャさんは満面の笑顔を浮かべている。
line = "新たな友達を得たトリシャさんは満面の笑顔を浮かべている。"

[[dialogue]]
speaker = "unk"
# そして、ミルフィーもまた、トリシャさんを始めソフィア、舞亜、ウズメといった新たな友達を得た。
line = "そして、ミルフィーもまた、トリシャさんを始めソフィア、舞亜、ウズメといった新たな友達を得た。"

[[dialogue]]
speaker = "unk"
# こうして──ジャクリーヌが起こしたちょっとした騒動は結果的に大団円で幕を下ろしたのだった。
line = "こうして──ジャクリーヌが起こしたちょっとした騒動は結果的に大団円で幕を下ろしたのだった。"
