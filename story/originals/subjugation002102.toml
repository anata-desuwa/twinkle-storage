[[dialogue]]
speaker = "市民"
# 「追突してきた車が邪魔だ。運転手は──逃げやがった！　これじゃ救急車が入ってこれないじゃないか！」
line = "「追突してきた車が邪魔だ。運転手は──逃げやがった！　これじゃ救急車が入ってこれないじゃないか！」"

[[dialogue]]
speaker = "メテオラ"
# 「あの車、おジャマなんだな？　どかした方がいいな？」
line = "「あの車、おジャマなんだな？　どかした方がいいな？」"

[[dialogue]]
speaker = "unk"
# 危ない！　離れて！
