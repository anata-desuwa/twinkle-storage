[[dialogue]]
speaker = "unk"
# それは下校中の出来事だった。
line = "それは下校中の出来事だった。"

[[dialogue]]
speaker = "？？？"
# 「うううー？　ここはどこなんだぞ……？」
line = "「うううー？　ここはどこなんだぞ……？」"

[[dialogue]]
speaker = "？？？"
# 「あれれ？　目印の赤い車もいなくなっちゃった……もしかして、あたし、迷子になっちゃったのかー！？」
line = "「あれれ？　目印の赤い車もいなくなっちゃった……もしかして、あたし、迷子になっちゃったのかー！？」"

[[dialogue]]
speaker = "？？？"
# 「うわーん！　誰かー！　助けてくれー！」
line = "「うわーん！　誰かー！　助けてくれー！」"

[[dialogue]]
speaker = "unk"
# えーと……大丈夫？
line = "えーと……大丈夫？"

[[dialogue]]
speaker = "迷子"
# 「だいじょばないぞー！　ここはどこなんだー！　ドーナツ屋はどこにあるんだー！」
line = "「だいじょばないぞー！　ここはどこなんだー！　ドーナツ屋はどこにあるんだー！」"

[[dialogue]]
speaker = "迷子"
# 「あたしの友達がドーナツ大好きだからな！　チョーおいしいドーナツを買ってってあげようとしたんだぞ！」
line = "「あたしの友達がドーナツ大好きだからな！　チョーおいしいドーナツを買ってってあげようとしたんだぞ！」"

[[dialogue]]
speaker = "迷子"
# 「そしたら、今、どこにいるのかわかんなくなっちゃった……リューセー市国はややこしいぞ……」
line = "「そしたら、今、どこにいるのかわかんなくなっちゃった……リューセー市国はややこしいぞ……」"

[[dialogue]]
speaker = "unk"
# 道案内しようか？
line = "道案内しようか？"

[[dialogue]]
speaker = "unk"
# （騒がしいけど悪い子じゃなさそうだ……）
line = "（騒がしいけど悪い子じゃなさそうだ……）"

[[dialogue]]
speaker = "迷子"
# 「ホントか！？　助かるぞ！　おまえ、いいやつだな！　ここのドーナツ屋なんだけどなー？」
line = "「ホントか！？　助かるぞ！　おまえ、いいやつだな！　ここのドーナツ屋なんだけどなー？」"

[[dialogue]]
speaker = "unk"
# そのドーナツ屋は、駅を挟んでまったくの逆方向だった。
line = "そのドーナツ屋は、駅を挟んでまったくの逆方向だった。"

[[dialogue]]
speaker = "unk"
# 俺が新星学園に転入する前にバイトしていた場所の１つでもある。
line = "俺が新星学園に転入する前にバイトしていた場所の１つでもある。"

[[dialogue]]
speaker = "迷子"
# 「やったー！　ドーナツいっぱい買えたー！　ありがとうな！」
line = "「やったー！　ドーナツいっぱい買えたー！　ありがとうな！」"

[[dialogue]]
speaker = "メテオラ"
# 「あ、そうだ、まだ名前を言ってなかったな。あたしはメテオラだ！」
line = "「あ、そうだ、まだ名前を言ってなかったな。あたしはメテオラだ！」"

[[dialogue]]
speaker = "メテオラ"
# 「はー……できたてドーナツ、アツアツでチョーうまそーだなー！　いっただきま──」
line = "「はー……できたてドーナツ、アツアツでチョーうまそーだなー！　いっただきま──」"

[[dialogue]]
speaker = "メテオラ"
# 「はっ──このドーナツはエンジュの分だった！　まだ食べちゃダメ……食べちゃダメ……ガマン、ガマンだぞ……」
line = "「はっ──このドーナツはエンジュの分だった！　まだ食べちゃダメ……食べちゃダメ……ガマン、ガマンだぞ……」"

[[dialogue]]
speaker = "メテオラ"
# 「うぅ……エンジュ、どこ行っちゃったんだー？　エンジュも迷子になっちゃったのかー？」
line = "「うぅ……エンジュ、どこ行っちゃったんだー？　エンジュも迷子になっちゃったのかー？」"

[[dialogue]]
speaker = "unk"
# メテオラは流星市国に来たばっかり？
line = "メテオラは流星市国に来たばっかり？"

[[dialogue]]
speaker = "メテオラ"
# 「ああ、そうだぞ。昨日着いたところなんだ」
line = "「ああ、そうだぞ。昨日着いたところなんだ」"

[[dialogue]]
speaker = "メテオラ"
# 「あたしはな、悪いやつをぶっとばしに来たんだぞ！　エラいだろ！　えっへん！」
line = "「あたしはな、悪いやつをぶっとばしに来たんだぞ！　エラいだろ！　えっへん！」"

[[dialogue]]
speaker = "unk"
# （警察には見えないけど……公安委員会の関係者？）
line = "（警察には見えないけど……公安委員会の関係者？）"

[[dialogue]]
speaker = "unk"
