line = "「なんだ、今の音は、それにこの騒ぎ……イヤな予感しかしないな……」"

[[dialogue]]
speaker = "？？？"
# 「メテオラから目を離すと、だいたいあいつが原因で騒ぎが起こるんだよな……おーい、メテオラー！　どこだー！」
line = "「メテオラから目を離すと、だいたいあいつが原因で騒ぎが起こるんだよな……おーい、メテオラー！　どこだー！」"
