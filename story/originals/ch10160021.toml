[[dialogue]]
speaker = "unk"
# 第１話,てぇてぇカップリング,P
line = "第１話,てぇてぇカップリング,P"

[[dialogue]]
speaker = "unk"
# ヒトリと恋人として付き合うようになってしばらく経った、とある休日。
line = "ヒトリと恋人として付き合うようになってしばらく経った、とある休日。"

[[dialogue]]
speaker = "unk"
# 俺は最近完結して話題になった『百合漫画』を返しに、新星寮へとやって来ていた。
line = "俺は最近完結して話題になった『百合漫画』を返しに、新星寮へとやって来ていた。"

[[dialogue]]
speaker = "ヒトリ"
# 「会長さん、それで……どうだったでしょうか？」
line = "「会長さん、それで……どうだったでしょうか？」"

[[dialogue]]
speaker = "unk"
# 神妙な面持ちをした彼女に、俺は拝むように両手を合わせ――
line = "神妙な面持ちをした彼女に、俺は拝むように両手を合わせ――"

[[dialogue]]
speaker = "unk"
# 実に――てぇてぇ作品でした
line = "実に――てぇてぇ作品でした"

[[dialogue]]
speaker = "ヒトリ"
# 「ですよねっ！　百合史に残る神作品の誕生です……！」
line = "「ですよねっ！　百合史に残る神作品の誕生です……！」"

[[dialogue]]
speaker = "ヒトリ"
# 「わたし、それはもう、すごく感動して……！」
line = "「わたし、それはもう、すごく感動して……！」"

[[dialogue]]
speaker = "unk"
# ヒトリは興奮したように、俺の手を取ると――
line = "ヒトリは興奮したように、俺の手を取ると――"

[[dialogue]]
speaker = "ヒトリ"
# 「こう手を取って、告白するシーンは、それはもう宗教画のようで……！　わたし、そのページを引き延ばして印刷して、部屋にポスターとして貼ってあるんですよ！」
line = "「こう手を取って、告白するシーンは、それはもう宗教画のようで……！　わたし、そのページを引き延ばして印刷して、部屋にポスターとして貼ってあるんですよ！」"

[[dialogue]]
speaker = "ヒトリ"
# 「って、はっ……！？　ご、ごめんなさい、会長さん！　つい、興奮して、手を握ってしまって……！」
line = "「って、はっ……！？　ご、ごめんなさい、会長さん！　つい、興奮して、手を握ってしまって……！」"

[[dialogue]]
speaker = "unk"
# 俺たちは恋人同士なんだから
line = "俺たちは恋人同士なんだから"

[[dialogue]]
speaker = "unk"
# 全然構わないよ。
line = "全然構わないよ。"

[[dialogue]]
speaker = "ヒトリ"
# 「は、はい♪　じゃあ……えへへ♪」
line = "「は、はい♪　じゃあ……えへへ♪」"

[[dialogue]]
speaker = "unk"
# 彼女はそっと俺の手を握り直して、はにかむ。
line = "彼女はそっと俺の手を握り直して、はにかむ。"

[[dialogue]]
speaker = "ゆーちゃん"
# 「てーてー♪」
line = "「てーてー♪」"

[[dialogue]]
speaker = "unk"
# ヒトリが常に連れている幽霊のゆーちゃんも、俺たちを祝福してくれているようだった。
line = "ヒトリが常に連れている幽霊のゆーちゃんも、俺たちを祝福してくれているようだった。"

[[dialogue]]
speaker = "アナ"
# 「おや？　会長、おはようございます。朝から寮で会うとは珍しいですね」
line = "「おや？　会長、おはようございます。朝から寮で会うとは珍しいですね」"

[[dialogue]]
speaker = "ヒトリ"
# 「あっ、アナさん、おはようございます……！」
line = "「あっ、アナさん、おはようございます……！」"

[[dialogue]]
speaker = "アナ"
# 「はい、おはようございます。ヒトリさん」
line = "「はい、おはようございます。ヒトリさん」"

[[dialogue]]
speaker = "unk"
# ２人もいつの間にか、仲良くなったな
line = "２人もいつの間にか、仲良くなったな"

[[dialogue]]
speaker = "アナ"
# 「ええ。入学してから大分時間も経ちましたしね。とはいえ、会長の影響だと思いますよ」
line = "「ええ。入学してから大分時間も経ちましたしね。とはいえ、会長の影響だと思いますよ」"

[[dialogue]]
speaker = "アナ"
# 「ヒトリさん、会長と付き合い始めてから、性格が前より明るくなりましたから」
line = "「ヒトリさん、会長と付き合い始めてから、性格が前より明るくなりましたから」"

[[dialogue]]
speaker = "ヒトリ"
# 「えへへ。そう思ってもらえてるなら、嬉しい、です……」
line = "「えへへ。そう思ってもらえてるなら、嬉しい、です……」"

[[dialogue]]
speaker = "ヒトリ"
# 「会長さんが、星騎士の皆さんや、守護天使や魔女の人たちとも絆を結んで、信頼し合える関係を作って行く姿が、本当にてぇてぇと……思ったんです」
line = "「会長さんが、星騎士の皆さんや、守護天使や魔女の人たちとも絆を結んで、信頼し合える関係を作って行く姿が、本当にてぇてぇと……思ったんです」"

[[dialogue]]
speaker = "ヒトリ"
# 「だからわたしも……少しでいいから、そんな風になれるように頑張れたらなって」
line = "「だからわたしも……少しでいいから、そんな風になれるように頑張れたらなって」"

[[dialogue]]
speaker = "ヒトリ"
# 「同じようには、できないかもしれませんけど……まずはやってみようと思わないと、信頼は得られませんから」
line = "「同じようには、できないかもしれませんけど……まずはやってみようと思わないと、信頼は得られませんから」"

[[dialogue]]
speaker = "unk"
# そういう頑張り屋なところが、俺は好きだぞ
line = "そういう頑張り屋なところが、俺は好きだぞ"

[[dialogue]]
speaker = "ヒトリ"
# 「え、えへへ♪　わたしも、会長さんのこと、大好きです……<emoji=heart04>」
line = "「え、えへへ♪　わたしも、会長さんのこと、大好きです……<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
# 「なるほど。これが『てぇてぇ』……」
line = "「なるほど。これが『てぇてぇ』……」"

[[dialogue]]
speaker = "ゆーちゃん"
# 「てーてー♪」
line = "「てーてー♪」"

[[dialogue]]
speaker = "アナ"
# 「そういえば……前から気になっていたのですが、会長とヒトリさんはどのようにして、お付き合いを始めたんですか？」
line = "「そういえば……前から気になっていたのですが、会長とヒトリさんはどのようにして、お付き合いを始めたんですか？」"

[[dialogue]]
speaker = "ヒトリ"
# 「え？　ど、どのようにと言いますと……」
line = "「え？　ど、どのようにと言いますと……」"

[[dialogue]]
speaker = "アナ"
# 「それはもちろん、どちらから先に好きとか付き合いたいとか、告白したかというアレですね。興味があります。むふ～」
line = "「それはもちろん、どちらから先に好きとか付き合いたいとか、告白したかというアレですね。興味があります。むふ～」"

[[dialogue]]
speaker = "ヒトリ"
# 「え、えっと……それは……そのぉ……」
line = "「え、えっと……それは……そのぉ……」"

[[dialogue]]
speaker = "unk"
# 恥ずかしそうに、自身の両手の人差し指を突き合わせて、もじもじするヒトリ。
line = "恥ずかしそうに、自身の両手の人差し指を突き合わせて、もじもじするヒトリ。"

[[dialogue]]
speaker = "unk"
# あの日は、放課後に空き教室へ来て欲しいと、俺の方からヒトリにお願いをしていた。
line = "あの日は、放課後に空き教室へ来て欲しいと、俺の方からヒトリにお願いをしていた。"

[[dialogue]]
speaker = "ヒトリ"
# 「し、失礼します……」
line = "「し、失礼します……」"

[[dialogue]]
speaker = "unk"
# 来てくれて、ありがとう
line = "来てくれて、ありがとう"

[[dialogue]]
speaker = "ヒトリ"
# 「い、いえ。会長さんのお願いでしたら、何でも喜んで聞きますよ……♪」
line = "「い、いえ。会長さんのお願いでしたら、何でも喜んで聞きますよ……♪」"

[[dialogue]]
speaker = "ヒトリ"
# 「でも、今日は一体、何のお話でしょう……？」
line = "「でも、今日は一体、何のお話でしょう……？」"

[[dialogue]]
speaker = "unk"
# 俺は１度深呼吸をして、気持ちを落ち着かせてから告げる。
line = "俺は１度深呼吸をして、気持ちを落ち着かせてから告げる。"

[[dialogue]]
speaker = "unk"
# ヒトリのことが好きだ。付き合って欲しい
line = "ヒトリのことが好きだ。付き合って欲しい"

[[dialogue]]
speaker = "ヒトリ"
# 「え……」
line = "「え……」"

[[dialogue]]
speaker = "ゆーちゃん"
# 「……！　ゆー！」
line = "「……！　ゆー！」"

[[dialogue]]
speaker = "ヒトリ"
# 「会長さんが……わたしのことを、好き……？　付き合うって――」
line = "「会長さんが……わたしのことを、好き……？　付き合うって――」"

[[dialogue]]
speaker = "ヒトリ"
# 「……えっ！？　えええぇぇぇ～～～っ！？！？」
line = "「……えっ！？　えええぇぇぇ～～～っ！？！？」"

[[dialogue]]
speaker = "ヒトリ"
# 「こ、これは何かのドッキリですか……！？」
line = "「こ、これは何かのドッキリですか……！？」"

[[dialogue]]
speaker = "unk"
# いや、マジです
line = "いや、マジです"

[[dialogue]]
speaker = "ヒトリ"
# 「で、でもわたしを好きだなんて……！　わたしは、会長さんの周りにいる人たちと比べて、人見知りだし、暗いし……」
line = "「で、でもわたしを好きだなんて……！　わたしは、会長さんの周りにいる人たちと比べて、人見知りだし、暗いし……」"

[[dialogue]]
speaker = "ヒトリ"
# 「会長さんとは、とても釣り合わないっていうか……」
line = "「会長さんとは、とても釣り合わないっていうか……」"

[[dialogue]]
speaker = "unk"
# そんなことない。ヒトリは可愛い
line = "そんなことない。ヒトリは可愛い"

[[dialogue]]
speaker = "unk"
# それに、ヒトリは幽霊たちの為に優しくできる心を持っている。人と接するのが苦手でも、俺が協力して欲しいとお願いすれば、プリマステラとして駆け付けてくれる。
line = "それに、ヒトリは幽霊たちの為に優しくできる心を持っている。人と接するのが苦手でも、俺が協力して欲しいとお願いすれば、プリマステラとして駆け付けてくれる。"

[[dialogue]]
speaker = "unk"
# ヒトリは自分が思っているよりもずっと、魅力的で可愛い女の子だ。俺は、そんなヒトリともっと仲良くなりたいと思っていることを告白した。
line = "ヒトリは自分が思っているよりもずっと、魅力的で可愛い女の子だ。俺は、そんなヒトリともっと仲良くなりたいと思っていることを告白した。"

[[dialogue]]
speaker = "unk"
# ヒトリは、嫌かな？
line = "ヒトリは、嫌かな？"

[[dialogue]]
speaker = "ヒトリ"
# 「そ、そんなことないですっ……！」
line = "「そ、そんなことないですっ……！」"

[[dialogue]]
speaker = "ヒトリ"
# 「嫌じゃない、です……。わたしも、会長さんともっと、な、仲良く……なりたいです！」
line = "「嫌じゃない、です……。わたしも、会長さんともっと、な、仲良く……なりたいです！」"

[[dialogue]]
speaker = "ヒトリ"
# 「で、でもその……わたし、男女のお付き合いとかは……初めてで。わからないことだらけなので……」
line = "「で、でもその……わたし、男女のお付き合いとかは……初めてで。わからないことだらけなので……」"

[[dialogue]]
speaker = "ヒトリ"
# 「ま、まずは慣れて行くところから、お願いしたいです……」
line = "「ま、まずは慣れて行くところから、お願いしたいです……」"

[[dialogue]]
speaker = "unk"
# 改めて、これからよろしく
line = "改めて、これからよろしく"

[[dialogue]]
speaker = "unk"
# ああ、わかった。
line = "ああ、わかった。"

[[dialogue]]
speaker = "unk"
# 嬉しくなって、俺が彼女の手を取ると――
line = "嬉しくなって、俺が彼女の手を取ると――"

[[dialogue]]
speaker = "ヒトリ"
# 「ひゃあっ！？　か、かか、会長さん、距離がいきなり近いですぅ！」
line = "「ひゃあっ！？　か、かか、会長さん、距離がいきなり近いですぅ！」"

[[dialogue]]
speaker = "unk"
# えっ！？　握手しただけで！？
line = "えっ！？　握手しただけで！？"

[[dialogue]]
speaker = "ヒトリ"
# 「そ、それは恋人になったので、前よりも意識してしまうというか……」
line = "「そ、それは恋人になったので、前よりも意識してしまうというか……」"

[[dialogue]]
speaker = "ヒトリ"
# 「と、とりあえず２メートルくらいの距離からで……」
line = "「と、とりあえず２メートルくらいの距離からで……」"

[[dialogue]]
speaker = "unk"
# 距離感が遠くなってる！？
line = "距離感が遠くなってる！？"

[[dialogue]]
speaker = "unk"
# 付き合う前より
line = "付き合う前より"

[[dialogue]]
speaker = "アナ"
# 「――で、そんなことがありつつも、あっという間に今のようなラブラブの距離感になったと」
line = "「――で、そんなことがありつつも、あっという間に今のようなラブラブの距離感になったと」"

[[dialogue]]
speaker = "ヒトリ"
# 「さ、最初はすごく緊張してたんですけど、会長さん優しいので……どんどん好きになってしまったというか……えへへ♪」
line = "「さ、最初はすごく緊張してたんですけど、会長さん優しいので……どんどん好きになってしまったというか……えへへ♪」"

[[dialogue]]
speaker = "unk"
# 百合のてぇてぇを分かち合う仲だ
line = "百合のてぇてぇを分かち合う仲だ"

[[dialogue]]
speaker = "unk"
# フッ……今ではすっかり、
line = "フッ……今ではすっかり、"

[[dialogue]]
speaker = "アナ"
# 「いや、そこに関しては、どうしてこうなったって感じですが」
line = "「いや、そこに関しては、どうしてこうなったって感じですが」"

[[dialogue]]
speaker = "unk"
# ちなみに俺は、アニマ先輩×アナ推しだ
line = "ちなみに俺は、アニマ先輩×アナ推しだ"

[[dialogue]]
speaker = "unk"
# アナ……百合はいいぞ。
line = "アナ……百合はいいぞ。"

[[dialogue]]
speaker = "アナ"
# 「なぜ私がアニマ先輩と！？」
line = "「なぜ私がアニマ先輩と！？」"

[[dialogue]]
speaker = "ゆーちゃん"
# 「ゆー♪」
line = "「ゆー♪」"

[[dialogue]]
speaker = "ヒトリ"
# 「わかり味が深いです……！」
line = "「わかり味が深いです……！」"

[[dialogue]]
speaker = "アナ"
# 「いや全然分からないんですけど……！？」
line = "「いや全然分からないんですけど……！？」"

[[dialogue]]
speaker = "unk"
# 俺とヒトリがうんうんと頷き合う横で、全力でツッコミを入れるアナなのであった――
line = "俺とヒトリがうんうんと頷き合う横で、全力でツッコミを入れるアナなのであった――"
