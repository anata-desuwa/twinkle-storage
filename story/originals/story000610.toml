[[dialogue]]
speaker = "unk"
# 翌日、大聖堂カフェテリアにて――
line = "翌日、大聖堂カフェテリアにて――"

[[dialogue]]
speaker = "セシア"
# 「マム～♪　セシアにあ～んってして～♪」
line = "「マム～♪　セシアにあ～んってして～♪」"

[[dialogue]]
speaker = "マハムート"
# 「やれやれ、仕方ないわね。今回は特別だけど、甘えてばかりじゃダメよ、セシア」
line = "「やれやれ、仕方ないわね。今回は特別だけど、甘えてばかりじゃダメよ、セシア」"

[[dialogue]]
speaker = "マハムート"
# 「ほら、畏怖をもって口を開けなさい。この私が食べさせてあげるんだから」
line = "「ほら、畏怖をもって口を開けなさい。この私が食べさせてあげるんだから」"

[[dialogue]]
speaker = "セシア"
# 「は～い♪　あ～ん♪　……もぐもぐ、えへへ～♪　マムに食べさせてもらうクリスマスケーキ、とっても美味しいわ♪」
line = "「は～い♪　あ～ん♪　……もぐもぐ、えへへ～♪　マムに食べさせてもらうクリスマスケーキ、とっても美味しいわ♪」"

[[dialogue]]
speaker = "マハムート"
# 「――ん？　なにかしら、会長？　言いたいことありげな顔をしているけれど？」
line = "「――ん？　なにかしら、会長？　言いたいことありげな顔をしているけれど？」"

[[dialogue]]
speaker = "unk"
# えっと……
line = "えっと……"

[[dialogue]]
speaker = "マハムート"
# 「――なんで正座させられてるのかって？　あら、なにか文句でも？」
line = "「――なんで正座させられてるのかって？　あら、なにか文句でも？」"

[[dialogue]]
speaker = "マハムート"
# 「それとも、別のお仕置きの方がよかったかしら？」
line = "「それとも、別のお仕置きの方がよかったかしら？」"

[[dialogue]]
speaker = "unk"
# やっぱり正座で結構です！
line = "やっぱり正座で結構です！"

[[dialogue]]
speaker = "マハムート"
# 「よろしい。畏怖をもって跪きなさい」
line = "「よろしい。畏怖をもって跪きなさい」"

[[dialogue]]
speaker = "紅明"
# 「いや～、それにしてもセッシー、マムにあっという間に懐いちゃったな～。まあ、どう考えてもアタシが負け確の流れだったけども！」
line = "「いや～、それにしてもセッシー、マムにあっという間に懐いちゃったな～。まあ、どう考えてもアタシが負け確の流れだったけども！」"

[[dialogue]]
speaker = "セシア"
# 「そんなことないわ。セシアは紅明ママのことも好きよ？　ママはどれだけ多くても困らないもの♪」
line = "「そんなことないわ。セシアは紅明ママのことも好きよ？　ママはどれだけ多くても困らないもの♪」"

[[dialogue]]
speaker = "紅明"
# 「んモー、甘えん坊だな、セッシーは～☆　ならアタシも、マムに負けじとセッシーにあ～んしちゃおっかな～♪」
line = "「んモー、甘えん坊だな、セッシーは～☆　ならアタシも、マムに負けじとセッシーにあ～んしちゃおっかな～♪」"

[[dialogue]]
speaker = "セシア"
# 「わ～い♪　ママ２人からの『ダブルあ～ん』はとっても素敵ね♪」
line = "「わ～い♪　ママ２人からの『ダブルあ～ん』はとっても素敵ね♪」"

[[dialogue]]
speaker = "unk"
# 新星寮に住むことになったんだって？
line = "新星寮に住むことになったんだって？"

[[dialogue]]
speaker = "unk"
# ところで、セシアは
line = "ところで、セシアは"

[[dialogue]]
speaker = "セシア"
# 「ええ、そうなの。寮に住めば、沢山マムに会えるでしょう？」
line = "「ええ、そうなの。寮に住めば、沢山マムに会えるでしょう？」"

[[dialogue]]
speaker = "マハムート"
# 「やれやれ、困った子ね……まぁ、学園に通うというのなら、面倒は見るけれど」
line = "「やれやれ、困った子ね……まぁ、学園に通うというのなら、面倒は見るけれど」"

[[dialogue]]
speaker = "セシア"
# 「えへへ～♪　マム、ありがと～♪」
line = "「えへへ～♪　マム、ありがと～♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そのことはいいんだけど――」
line = "「そのことはいいんだけど――」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ねぇ、昨日みんなで新星寮に忍び込んだって本当！？　ダメじゃない！」
line = "「ねぇ、昨日みんなで新星寮に忍び込んだって本当！？　ダメじゃない！」"

[[dialogue]]
speaker = "ヨミ"
# 「申し訳ありません、お嬢様。反対はしてたんですが、結局止めることができなくて……」
line = "「申し訳ありません、お嬢様。反対はしてたんですが、結局止めることができなくて……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そんな面白そうなこと、私も誘ってくれないと！」
line = "「そんな面白そうなこと、私も誘ってくれないと！」"

[[dialogue]]
speaker = "ヨミ"
# 「って、そっちですか！？」
line = "「って、そっちですか！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「深夜だったら私だって参加できたもの！　あ～、潜入ミッション、私もやりたかったわ……」
line = "「深夜だったら私だって参加できたもの！　あ～、潜入ミッション、私もやりたかったわ……」"

[[dialogue]]
speaker = "紅明"
# 「あははは！　来年はじゃあ、ヴィナちーを加えて５人でクリスマスプレゼントを配ろうぜ☆」
line = "「あははは！　来年はじゃあ、ヴィナちーを加えて５人でクリスマスプレゼントを配ろうぜ☆」"

[[dialogue]]
speaker = "ヨミ"
# 「もう！　来年もやるなら、無断侵入はなしですからね！」
line = "「もう！　来年もやるなら、無断侵入はなしですからね！」"

[[dialogue]]
speaker = "紅明"
# 「おっ？　ヨミヨミ、否定はしないってことは、ノリ気ってことでいいのかな～？」
line = "「おっ？　ヨミヨミ、否定はしないってことは、ノリ気ってことでいいのかな～？」"

[[dialogue]]
speaker = "ヨミ"
# 「この衣装をまた着るのはちょっと恥ずかしいですけど……」
line = "「この衣装をまた着るのはちょっと恥ずかしいですけど……」"

[[dialogue]]
speaker = "ヨミ"
# 「今回プレゼントを配ってみて、みんなの喜んでくれる顔を見られるのは、素敵だなって思ったので……いいですよ？」
line = "「今回プレゼントを配ってみて、みんなの喜んでくれる顔を見られるのは、素敵だなって思ったので……いいですよ？」"

[[dialogue]]
speaker = "紅明"
# 「マジか！　うんっ♪　来年も一緒にやろうぜ、ヨミヨミ♪」
line = "「マジか！　うんっ♪　来年も一緒にやろうぜ、ヨミヨミ♪」"

[[dialogue]]
speaker = "セシア"
# 「ヨミヨミ、今のはわたくし的にプラス１ポイントね」
line = "「ヨミヨミ、今のはわたくし的にプラス１ポイントね」"

[[dialogue]]
speaker = "ヨミ"
# 「なので、紅明先輩、まずは今年のサンタ大作戦をちゃんと終わらせるところからです」
line = "「なので、紅明先輩、まずは今年のサンタ大作戦をちゃんと終わらせるところからです」"

[[dialogue]]
speaker = "紅明"
# 「え？　どゆこと？」
line = "「え？　どゆこと？」"

[[dialogue]]
speaker = "ヨミ"
# 「はい。これ、私たち４人から、紅明先輩にクリスマスプレゼントです」
line = "「はい。これ、私たち４人から、紅明先輩にクリスマスプレゼントです」"

[[dialogue]]
speaker = "紅明"
# 「プレゼント……アタシに？」
line = "「プレゼント……アタシに？」"

[[dialogue]]
speaker = "ヨミ"
# 「学園のみんなにプレゼントを配るっていうなら――」
line = "「学園のみんなにプレゼントを配るっていうなら――」"

[[dialogue]]
speaker = "ヨミ"
# 「紅明先輩にもプレゼントを渡さないと。……でしょう？」
line = "「紅明先輩にもプレゼントを渡さないと。……でしょう？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私も貰ったしね♪　ヨミヨミたちから相談を受けて、九浄家パワーを使って特急で用意したわ！」
line = "「私も貰ったしね♪　ヨミヨミたちから相談を受けて、九浄家パワーを使って特急で用意したわ！」"

[[dialogue]]
speaker = "セシア"
# 「サンタさん、わたくしにクリスマスの楽しさを教えてくれてありがとう」
line = "「サンタさん、わたくしにクリスマスの楽しさを教えてくれてありがとう」"

[[dialogue]]
speaker = "unk"
# 紅明、メリークリスマス！
line = "紅明、メリークリスマス！"

[[dialogue]]
speaker = "紅明"
# 「あ……！　っ～～～！！」
line = "「あ……！　っ～～～！！」"

[[dialogue]]
speaker = "紅明"
# 「んモー、こんなサプライズ、感激不可避っしょ～～っ！！」
line = "「んモー、こんなサプライズ、感激不可避っしょ～～っ！！」"

[[dialogue]]
speaker = "ヨミ"
# 「わぷっ、紅明先輩！？　ハグするのは別にいいんですけど、お、おっぱいで息が苦しい……！」
line = "「わぷっ、紅明先輩！？　ハグするのは別にいいんですけど、お、おっぱいで息が苦しい……！」"

[[dialogue]]
speaker = "紅明"
# 「セッシーにもハグ～♪」
line = "「セッシーにもハグ～♪」"

[[dialogue]]
speaker = "セシア"
# 「ふふっ、紅明ママに喜んでもらえて、セシアも嬉しいわ♪」
line = "「ふふっ、紅明ママに喜んでもらえて、セシアも嬉しいわ♪」"

[[dialogue]]
speaker = "紅明"
# 「ヴィナちーにも～♪」
line = "「ヴィナちーにも～♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「紅明、私にもクリスマスプレゼントくれて、ありがとう！　あなたは学園のみんなに元気を与えてくれる、すごくて素敵な星騎士だわ♪」
line = "「紅明、私にもクリスマスプレゼントくれて、ありがとう！　あなたは学園のみんなに元気を与えてくれる、すごくて素敵な星騎士だわ♪」"

[[dialogue]]
speaker = "紅明"
# 「ダーリンには～、ほっぺに……チュッ<emoji=heart04>」
line = "「ダーリンには～、ほっぺに……チュッ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ！？
line = "！？"

[[dialogue]]
speaker = "ヨミ"
# 「ちょっ、なにやってんですか！？　紅明先輩！？」
line = "「ちょっ、なにやってんですか！？　紅明先輩！？」"

[[dialogue]]
speaker = "紅明"
# 「だって、ダーリンはダーリンだし♪　あ～、ひょっとしてヨミヨミ、ヤキモチ焼いちゃったりとか～？」
line = "「だって、ダーリンはダーリンだし♪　あ～、ひょっとしてヨミヨミ、ヤキモチ焼いちゃったりとか～？」"

[[dialogue]]
speaker = "ヨミ"
# 「こやっ！？　ちちち、違います！　そんなんじゃありませんからっ！」
line = "「こやっ！？　ちちち、違います！　そんなんじゃありませんからっ！」"

[[dialogue]]
speaker = "紅明"
# 「そういうことなら、言ってくれればヨミヨミのほっぺにも喜んでキスしちゃうぜ？　ん～<emoji=heart04>」
line = "「そういうことなら、言ってくれればヨミヨミのほっぺにも喜んでキスしちゃうぜ？　ん～<emoji=heart04>」"

[[dialogue]]
speaker = "ヨミ"
# 「そっち！？　ちょっ、違いますって！　近い近い近い！」
line = "「そっち！？　ちょっ、違いますって！　近い近い近い！」"

[[dialogue]]
speaker = "紅明"
# 「あはははっ☆」
line = "「あはははっ☆」"

[[dialogue]]
speaker = "紅明"
# 「よ～し、今日はアタシがみんなに奢っちゃうぜ！　このままカフェテリアでひと足早いクリスマスパーティーを開催するっしょ～！」
line = "「よ～し、今日はアタシがみんなに奢っちゃうぜ！　このままカフェテリアでひと足早いクリスマスパーティーを開催するっしょ～！」"

[[dialogue]]
speaker = "紅明"
# 「ウェ～イ♪」
line = "「ウェ～イ♪」"

[[dialogue]]
speaker = "unk"
# 元気なサンタクロースは、満面の笑顔を浮かべながら、ピースサインを掲げるのだった。
line = "元気なサンタクロースは、満面の笑顔を浮かべながら、ピースサインを掲げるのだった。"
