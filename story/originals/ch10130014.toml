[[dialogue]]
speaker = "unk"
# 第４話,ユウリとフィオナ,P
line = "第４話,ユウリとフィオナ,P"

[[dialogue]]
speaker = "ユウリ"
# 「納得いくまで稽古つけてたら、こんな時間になっちまったな。ま、背中を預けられるくらいには強くなったかな」
line = "「納得いくまで稽古つけてたら、こんな時間になっちまったな。ま、背中を預けられるくらいには強くなったかな」"

[[dialogue]]
speaker = "unk"
# お疲れさま
line = "お疲れさま"

[[dialogue]]
speaker = "ユウリ"
# 「おう。次は新星星徒会の番だからな、よろしく頼むぜ、会長さん」
line = "「おう。次は新星星徒会の番だからな、よろしく頼むぜ、会長さん」"

[[dialogue]]
speaker = "ユウリ"
# 「ん？　どうした？　そんなにじっと見て、あたしの顔に何か付いてるか？」
line = "「ん？　どうした？　そんなにじっと見て、あたしの顔に何か付いてるか？」"

[[dialogue]]
speaker = "ユウリ"
# 「……口紅？　ちげーよ。色付きのリップクリーム。汗かいたから塗り直したんだよ」
line = "「……口紅？　ちげーよ。色付きのリップクリーム。汗かいたから塗り直したんだよ」"

[[dialogue]]
speaker = "ユウリ"
# 「でも、気付いてくれてありがとな」
line = "「でも、気付いてくれてありがとな」"

[[dialogue]]
speaker = "ユウリ"
# 「だけど悪いな、流星の星徒会長が忙しくてこっち来られなくて。その分あたしが稽古つけたつもりだけど」
line = "「だけど悪いな、流星の星徒会長が忙しくてこっち来られなくて。その分あたしが稽古つけたつもりだけど」"

[[dialogue]]
speaker = "ユウリ"
# 「フィオナと仲がいい？　ああ、今は星徒会関係なくダチだぜ。初めて会ったのは確か……フィオナが星徒会長になって少ししたぐらいの頃か」
line = "「フィオナと仲がいい？　ああ、今は星徒会関係なくダチだぜ。初めて会ったのは確か……フィオナが星徒会長になって少ししたぐらいの頃か」"

[[dialogue]]
speaker = "ニャリオン"
# 『ニャ～……どこ行ったニャ、フィオナ嬢……』
line = "『ニャ～……どこ行ったニャ、フィオナ嬢……』"

[[dialogue]]
speaker = "ユウリ"
# 『なんだお前？　飛んでしゃべる猫……いや、しゃべる野良猫？』
line = "『なんだお前？　飛んでしゃべる猫……いや、しゃべる野良猫？』"

[[dialogue]]
speaker = "ニャリオン"
# 『ワガハイは野良猫じゃないニャ！　誇り高きフィオナ嬢の使い魔ニャン！』
line = "『ワガハイは野良猫じゃないニャ！　誇り高きフィオナ嬢の使い魔ニャン！』"

[[dialogue]]
speaker = "ユウリ"
# 『使い魔～？　確かに星騎士にはそういうので戦うやつもいるが……あれ、フィオナって星徒会長のことだっけ。そういやお前も見たことあるような』
line = "『使い魔～？　確かに星騎士にはそういうので戦うやつもいるが……あれ、フィオナって星徒会長のことだっけ。そういやお前も見たことあるような』"

[[dialogue]]
speaker = "ニャリオン"
# 『このニャリオンを知らないとは失敬ニャ。星見家の息女たるフィオナ嬢第一のしもべニャン！』
line = "『このニャリオンを知らないとは失敬ニャ。星見家の息女たるフィオナ嬢第一のしもべニャン！』"

[[dialogue]]
speaker = "ユウリ"
# 『そのしもべが主をほっぽって何してるんだよ』
line = "『そのしもべが主をほっぽって何してるんだよ』"

[[dialogue]]
speaker = "ニャリオン"
# 『それは……いつの間にかフィオナ嬢とはぐれてしまったのニャ。呼びかけても反応してくれニャくて……』
line = "『それは……いつの間にかフィオナ嬢とはぐれてしまったのニャ。呼びかけても反応してくれニャくて……』"

[[dialogue]]
speaker = "ユウリ"
# 『それでよく家来とか言えたな。じゃあ行くぞ』
line = "『それでよく家来とか言えたな。じゃあ行くぞ』"

[[dialogue]]
speaker = "ニャリオン"
# 『行くってどこニャン？』
line = "『行くってどこニャン？』"

[[dialogue]]
speaker = "ユウリ"
# 『お前の飼い主を探しにだよ。モンスターも出てないしどうせ学園のどこかにいるだろ。それに、ペットは飼い主が見つからないと大変なことになるだろうが』
line = "『お前の飼い主を探しにだよ。モンスターも出てないしどうせ学園のどこかにいるだろ。それに、ペットは飼い主が見つからないと大変なことになるだろうが』"

[[dialogue]]
speaker = "ニャリオン"
# 『ワガハイはペットじゃないニャ！』
line = "『ワガハイはペットじゃないニャ！』"

[[dialogue]]
speaker = "ユウリ"
# 『うっせえ、文句言ってないでついてこい』
line = "『うっせえ、文句言ってないでついてこい』"

[[dialogue]]
speaker = "ユウリ"
# 『意外といねーな。どこ行ったんだ？』
line = "『意外といねーな。どこ行ったんだ？』"

[[dialogue]]
speaker = "ニャリオン"
# 『こいつについてきたのは間違いだったかもしれないニャ……』
line = "『こいつについてきたのは間違いだったかもしれないニャ……』"

[[dialogue]]
speaker = "ユウリ"
# 『あんだと？』
line = "『あんだと？』"

[[dialogue]]
speaker = "フィオナ"
# 『ふぅ……』
line = "『ふぅ……』"

[[dialogue]]
speaker = "ニャリオン"
# 『フィオナ嬢！』
line = "『フィオナ嬢！』"

[[dialogue]]
speaker = "フィオナ"
# 『あれ？　あ、ニャリオン、いつの間に……？』
line = "『あれ？　あ、ニャリオン、いつの間に……？』"

[[dialogue]]
speaker = "ユウリ"
# 『あんた、あの有名な会長さんだろ。ペットが迷子になってたから連れてきてやったぜ』
line = "『あんた、あの有名な会長さんだろ。ペットが迷子になってたから連れてきてやったぜ』"

[[dialogue]]
speaker = "ユウリ"
# 『こんなところで何してたんだ？　フィーニスの塔は立ち入り禁止だろ。入口が開いてないから入ろうと思っても入れないけどな』
line = "『こんなところで何してたんだ？　フィーニスの塔は立ち入り禁止だろ。入口が開いてないから入ろうと思っても入れないけどな』"

[[dialogue]]
speaker = "フィオナ"
# 『少し１人になりたくて……すみません、私の使い魔がお世話になったみたいですね』
line = "『少し１人になりたくて……すみません、私の使い魔がお世話になったみたいですね』"

[[dialogue]]
speaker = "ユウリ"
# 『ふーん……』
line = "『ふーん……』"

[[dialogue]]
speaker = "フィオナ"
# 『あの……そんなにまじまじと見つめてどうしました？』
line = "『あの……そんなにまじまじと見つめてどうしました？』"

[[dialogue]]
speaker = "ユウリ"
# 『あんた、めちゃくちゃ顔色悪いぞ。……よし、そんなに困ってんなら手伝ってやるよ』
line = "『あんた、めちゃくちゃ顔色悪いぞ。……よし、そんなに困ってんなら手伝ってやるよ』"

[[dialogue]]
speaker = "フィオナ"
# 『え……？』
line = "『え……？』"

[[dialogue]]
speaker = "ユウリ"
# 『あたしが星徒会に入るって言ってんだ。人手は多いに越したことはないだろ』
line = "『あたしが星徒会に入るって言ってんだ。人手は多いに越したことはないだろ』"

[[dialogue]]
speaker = "ユウリ"
# 『書類仕事は自信ないが、モンスターの相手なら任せとけ。あんたが元気じゃない間は全部あたしがぶっ飛ばしてやる』
line = "『書類仕事は自信ないが、モンスターの相手なら任せとけ。あんたが元気じゃない間は全部あたしがぶっ飛ばしてやる』"

[[dialogue]]
speaker = "ユウリ"
# 「――ってな感じで星徒会に入ったんだよ。フィオナは最初驚いてたけどな」
line = "「――ってな感じで星徒会に入ったんだよ。フィオナは最初驚いてたけどな」"

[[dialogue]]
speaker = "ユウリ"
# 「あの時はたまたまセーラさんが風邪ひいて寝込んでて、しかも部活や行事のあれやこれやでてんてこまいでさ。こりゃフィオナが元気ないのも無理ねーって思ったぜ」
line = "「あの時はたまたまセーラさんが風邪ひいて寝込んでて、しかも部活や行事のあれやこれやでてんてこまいでさ。こりゃフィオナが元気ないのも無理ねーって思ったぜ」"

[[dialogue]]
speaker = "ユウリ"
# 「よくよく考えれば、あたしがフィオナと出会ったのはニャリオンがきっかけだったんだな。ま、そういう意味じゃあのアホ猫には感謝してもいいかもな」
line = "「よくよく考えれば、あたしがフィオナと出会ったのはニャリオンがきっかけだったんだな。ま、そういう意味じゃあのアホ猫には感謝してもいいかもな」"

[[dialogue]]
speaker = "unk"
# どうしてそんなに人を助けるんだ？
line = "どうしてそんなに人を助けるんだ？"

[[dialogue]]
speaker = "ユウリ"
# 「どうして……って、そりゃ困ってるやつは少ない方がいいだろ。だからあたしの手の届く限り助ける。それだけだ」
line = "「どうして……って、そりゃ困ってるやつは少ない方がいいだろ。だからあたしの手の届く限り助ける。それだけだ」"

[[dialogue]]
speaker = "ユウリ"
# 「あたしにはそれしかないからな」
line = "「あたしにはそれしかないからな」"

[[dialogue]]
speaker = "unk"
# とてもすごいことだと思うけど
line = "とてもすごいことだと思うけど"

[[dialogue]]
speaker = "ユウリ"
# 「そうか～？　誰でも困ってるやつがいたら見過ごせないだろ」
line = "「そうか～？　誰でも困ってるやつがいたら見過ごせないだろ」"

[[dialogue]]
speaker = "ユウリ"
# 「……誰でもじゃない？　ふーん……そういうもんかね。でもあたしはこの性格を損だって思ったことはないぞ」
line = "「……誰でもじゃない？　ふーん……そういうもんかね。でもあたしはこの性格を損だって思ったことはないぞ」"

[[dialogue]]
speaker = "ユウリ"
# 「自分の損得考えて助けるか助けないか迷う方が、よっぽど時間の無駄だぜ」
line = "「自分の損得考えて助けるか助けないか迷う方が、よっぽど時間の無駄だぜ」"

[[dialogue]]
speaker = "unk"
# ユウリらしい
line = "ユウリらしい"

[[dialogue]]
speaker = "ユウリ"
# 「はっ、誉め言葉として受け取っとくよ。会長さんも何か頼みがあるなら聞くぜ？」
line = "「はっ、誉め言葉として受け取っとくよ。会長さんも何か頼みがあるなら聞くぜ？」"

[[dialogue]]
speaker = "ユウリ"
# 「あの時見てた服を着てほしい？　そういうのは別だバカ！」
line = "「あの時見てた服を着てほしい？　そういうのは別だバカ！」"

[[dialogue]]
speaker = "ユウリ"
# 「……どうしても着てほしいか？　あ、そう、そんなに……」
line = "「……どうしても着てほしいか？　あ、そう、そんなに……」"

[[dialogue]]
speaker = "ユウリ"
# 「じゃあ今度ついてこいよ。試着ならしてやるから、もし似合ってたらあんたに買ってもらうからな」
line = "「じゃあ今度ついてこいよ。試着ならしてやるから、もし似合ってたらあんたに買ってもらうからな」"
