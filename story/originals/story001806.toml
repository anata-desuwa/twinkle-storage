[[dialogue]]
speaker = "unk"
# フニが高熱を出して倒れてしまった翌日。
line = "フニが高熱を出して倒れてしまった翌日。"

[[dialogue]]
speaker = "unk"
# あれから、病院の先生を呼んだり、両学園の強力な回復星術を使える生徒にお願いしたりと手は尽くしているが、未だに彼女は目覚めていなかった。
line = "あれから、病院の先生を呼んだり、両学園の強力な回復星術を使える生徒にお願いしたりと手は尽くしているが、未だに彼女は目覚めていなかった。"

[[dialogue]]
speaker = "ルルカ"
# 「まさか、こんなことになるなんて……」
line = "「まさか、こんなことになるなんて……」"

[[dialogue]]
speaker = "ルルカ"
# 「これって多分、フニちゃんの中にいるっていう不死鳥……ホウちゃんの影響だよね？」
line = "「これって多分、フニちゃんの中にいるっていう不死鳥……ホウちゃんの影響だよね？」"

[[dialogue]]
speaker = "ルルカ"
# 「お医者さんも、魔獣がヒトの体の中に共生しているケースなんて聞いたことがないから、すぐには解決方法がわからないって言ってた……」
line = "「お医者さんも、魔獣がヒトの体の中に共生しているケースなんて聞いたことがないから、すぐには解決方法がわからないって言ってた……」"

[[dialogue]]
speaker = "ルルカ"
# 「一体、どうしたら……」
line = "「一体、どうしたら……」"

[[dialogue]]
speaker = "セシア"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "セシア"
# 「もしかしたら、わかるかもしれないわ」
line = "「もしかしたら、わかるかもしれないわ」"

[[dialogue]]
speaker = "ルルカ"
# 「え？」
line = "「え？」"

[[dialogue]]
speaker = "セシア"
# 「昨日、フニが倒れて、そのおでこに触れた時……」
line = "「昨日、フニが倒れて、そのおでこに触れた時……」"

[[dialogue]]
speaker = "セシア"
# 「わたくしのことを呼ぶ声が聞こえたの。最初はフニが言っているのかと思っていたのだけれど……」
line = "「わたくしのことを呼ぶ声が聞こえたの。最初はフニが言っているのかと思っていたのだけれど……」"

[[dialogue]]
speaker = "セシア"
# 「今、この流星寮のロビーまで来てわかったわ。フニの部屋の方から、別の気配が伝わってきてる」
line = "「今、この流星寮のロビーまで来てわかったわ。フニの部屋の方から、別の気配が伝わってきてる」"

[[dialogue]]
speaker = "ルルカ"
# 「それってもしかして……」
line = "「それってもしかして……」"

[[dialogue]]
speaker = "unk"
# 不死鳥の……？
line = "不死鳥の……？"

[[dialogue]]
speaker = "セシア"
# 「ええ。多分……わたくしは、もしかしたら――」
line = "「ええ。多分……わたくしは、もしかしたら――」"

[[dialogue]]
speaker = "セシア"
# 「転生する前、アウクセシアだった時に、その不死鳥に会ったことがあるのかもしれないわ」
line = "「転生する前、アウクセシアだった時に、その不死鳥に会ったことがあるのかもしれないわ」"

[[dialogue]]
speaker = "unk"
# それから俺たちは、フニの様子を見に、彼女の部屋を訪れる。
line = "それから俺たちは、フニの様子を見に、彼女の部屋を訪れる。"

[[dialogue]]
speaker = "unk"
# セシアが近づいて、フニの額にそっと触れると――
line = "セシアが近づいて、フニの額にそっと触れると――"

[[dialogue]]
speaker = "ルルカ"
# 「えっ、何これ……！？ 一体何が起こってるの……！？」
line = "「えっ、何これ……！？ 一体何が起こってるの……！？」"

[[dialogue]]
speaker = "セシア"
# 「これは……」
line = "「これは……」"

[[dialogue]]
speaker = "unk"
# 視界が開けると、そこには見知らぬ景色が広がっていた。
line = "視界が開けると、そこには見知らぬ景色が広がっていた。"

[[dialogue]]
speaker = "ルルカ"
# 「な、何ここ……！？」
line = "「な、何ここ……！？」"

[[dialogue]]
speaker = "セシア"
# 「多分これは――フニの中の『精神世界』よ。そして、この風景の元となった場所は魔界……わたくし、何となくだけど、この風景の場所へ来たことがある気がするわ」
line = "「多分これは――フニの中の『精神世界』よ。そして、この風景の元となった場所は魔界……わたくし、何となくだけど、この風景の場所へ来たことがある気がするわ」"

[[dialogue]]
speaker = "ルルカ"
# 「それにあたし達、なんか勝手にクリスマスフォームに変身してるよ！？ これって……？」
line = "「それにあたし達、なんか勝手にクリスマスフォームに変身してるよ！？ これって……？」"

[[dialogue]]
speaker = "セシア"
# 「それはおそらく――」
line = "「それはおそらく――」"

[[dialogue]]
speaker = "フェニックス"
# 「お待ちしていました。守護天使アウクセシア」
line = "「お待ちしていました。守護天使アウクセシア」"

[[dialogue]]
speaker = "unk"
# 声は、空から聞こえてきた。
line = "声は、空から聞こえてきた。"

[[dialogue]]
speaker = "unk"
# 俺たちが見上げると、大きな翼を広げた影が俺たちの前へと降り立つ。
line = "俺たちが見上げると、大きな翼を広げた影が俺たちの前へと降り立つ。"

[[dialogue]]
speaker = "フェニックス"
# 「初めまして、ルルカ。そして、お久しぶりです、アウクセシア、ラクシス――いえ、今はセシアとクロト、でしたか」
line = "「初めまして、ルルカ。そして、お久しぶりです、アウクセシア、ラクシス――いえ、今はセシアとクロト、でしたか」"

[[dialogue]]
speaker = "フェニックス"
# 「フニから話に聞いていると思いますが、私がヒトに呼ばれる不死鳥――魔獣『フェニックス』です」
line = "「フニから話に聞いていると思いますが、私がヒトに呼ばれる不死鳥――魔獣『フェニックス』です」"

[[dialogue]]
speaker = "セシア"
# 「その姿……フニは今、あなたの中にいるのね」
line = "「その姿……フニは今、あなたの中にいるのね」"

[[dialogue]]
speaker = "ルルカ"
# 「えっ！？」
line = "「えっ！？」"

[[dialogue]]
speaker = "フェニックス"
# 「……ええ、その通りです。ここ最近で、私との融合が加速度的に進んでいます」
line = "「……ええ、その通りです。ここ最近で、私との融合が加速度的に進んでいます」"

[[dialogue]]
speaker = "フェニックス"
# 「単刀直入に言いましょう、セシア。あなたをここに呼んだのは他でもありません――」
line = "「単刀直入に言いましょう、セシア。あなたをここに呼んだのは他でもありません――」"

[[dialogue]]
speaker = "フェニックス"
# 「あなたの守護天使の力で、私を消して欲しいのです」
line = "「あなたの守護天使の力で、私を消して欲しいのです」"

[[dialogue]]
speaker = "unk"
# 不死鳥は落ち着きながらもはっきりとした声で、そう告げるのだった――
line = "不死鳥は落ち着きながらもはっきりとした声で、そう告げるのだった――"
