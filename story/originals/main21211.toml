[[dialogue]]
speaker = "unk"
# 第１１話,平行世界との戦争,B
line = "第１１話,平行世界との戦争,B"

[[dialogue]]
speaker = "チナ"
# 「今さらだけど、アタシたちの星徒会室。バカみたいに広いよな」
line = "「今さらだけど、アタシたちの星徒会室。バカみたいに広いよな」"

[[dialogue]]
speaker = "ベアトリス"
# 「だよね。もっと小さくしようってお願いしてたんだけど」
line = "「だよね。もっと小さくしようってお願いしてたんだけど」"

[[dialogue]]
speaker = "グレイス"
# 「デネブの救世主、ルヴィが使うお部屋ですから。こじんまりしてたら格好がつかないって、建築家の方が仰ってました！」
line = "「デネブの救世主、ルヴィが使うお部屋ですから。こじんまりしてたら格好がつかないって、建築家の方が仰ってました！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「これでもかなり口出ししたのよ？　会長と副会長は、特別に個室も造ろうだなんて話もあったくらい」
line = "「これでもかなり口出ししたのよ？　会長と副会長は、特別に個室も造ろうだなんて話もあったくらい」"

[[dialogue]]
speaker = "ベアトリス"
# 「そ、そんなのいらないよ～……ありがとルヴィ、断ってくれて」
line = "「そ、そんなのいらないよ～……ありがとルヴィ、断ってくれて」"

[[dialogue]]
speaker = "レティシア"
# 「それでルヴィ、話って何かしら？」
line = "「それでルヴィ、話って何かしら？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……平行世界の話よ。あなたたちには、何度も伝えてきたと思うけれど」
line = "「……平行世界の話よ。あなたたちには、何度も伝えてきたと思うけれど」"

[[dialogue]]
speaker = "ルヴィネ"
# 「私たちが住むのがデネブ。すでに滅んでしまって、今はない世界がベガ。そして──」
line = "「私たちが住むのがデネブ。すでに滅んでしまって、今はない世界がベガ。そして──」"

[[dialogue]]
speaker = "チナ"
# 「あの裏切り者が逃げた先が、アルタイル。よーく覚えてるよ」
line = "「あの裏切り者が逃げた先が、アルタイル。よーく覚えてるよ」"

[[dialogue]]
speaker = "グレイス"
# 「…………緋宮、クロト」
line = "「…………緋宮、クロト」"

[[dialogue]]
speaker = "ルヴィネ"
# 「先日、女神様から新たな言葉を賜ったわ。とてもよくないニュースよ」
line = "「先日、女神様から新たな言葉を賜ったわ。とてもよくないニュースよ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「女神様が仰るには、いま世界は非常に危うい状況にある」
line = "「女神様が仰るには、いま世界は非常に危うい状況にある」"

[[dialogue]]
speaker = "ルヴィネ"
# 「本来、『近似世界』は２つや３つに別れて、長期間に渡って存在するはずはない」
line = "「本来、『近似世界』は２つや３つに別れて、長期間に渡って存在するはずはない」"

[[dialogue]]
speaker = "ベアトリス"
# 「きんじ、世界……？」
line = "「きんじ、世界……？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「理論上、平行世界そのものは無限に存在するとされているわ。もはや異世界と言っても過言ではないほど、似ても似つかない『遠い世界』は存在する」
line = "「理論上、平行世界そのものは無限に存在するとされているわ。もはや異世界と言っても過言ではないほど、似ても似つかない『遠い世界』は存在する」"

[[dialogue]]
speaker = "ルヴィネ"
# 「でも、デネブ・アルタイル・ベガの３つは、そうした無数に存在する平行世界とは性質が異なっているの。同じ世界から分岐した、根を同じにする『近似世界』」
line = "「でも、デネブ・アルタイル・ベガの３つは、そうした無数に存在する平行世界とは性質が異なっているの。同じ世界から分岐した、根を同じにする『近似世界』」"

[[dialogue]]
speaker = "ルヴィネ"
# 「女神様は宇宙そのものを管理されているわけだけど、現在、私たちの宇宙には『複数の可能性』が重なり合うようにして存在している」
line = "「女神様は宇宙そのものを管理されているわけだけど、現在、私たちの宇宙には『複数の可能性』が重なり合うようにして存在している」"

[[dialogue]]
speaker = "ルヴィネ"
# 「ベガはもうないけれど、デネブとアルタイルという２つの可能性は、依然として並列に存在している。これはとてつもないイレギュラーということよ」
line = "「ベガはもうないけれど、デネブとアルタイルという２つの可能性は、依然として並列に存在している。これはとてつもないイレギュラーということよ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「１つの宇宙に、『<ruby=せかい>可能性の幹</ruby>』は１つでなければならない。本来あり得ない枝分かれをしてしまった世界は、どちらかが滅ばなくては存続できない……」
line = "「１つの宇宙に、『<ruby>可能性の幹<rt>せかい</rt></ruby>』は１つでなければならない。本来あり得ない枝分かれをしてしまった世界は、どちらかが滅ばなくては存続できない……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「その影響として、デネブでリクリエを退けると、それだけアルタイルでアステラの活動が活発になるらしいの」
line = "「その影響として、デネブでリクリエを退けると、それだけアルタイルでアステラの活動が活発になるらしいの」"

[[dialogue]]
speaker = "ベアトリス"
# 「え……そ、それって……」
line = "「え……そ、それって……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「デネブの私たちが戦うたびに、平行世界アルタイルの戦況は悪くなるということ」
line = "「デネブの私たちが戦うたびに、平行世界アルタイルの戦況は悪くなるということ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「逆を言えば、アルタイルの星騎士たちがリクリエを退けると、それだけデネブにリクリエが近づく」
line = "「逆を言えば、アルタイルの星騎士たちがリクリエを退けると、それだけデネブにリクリエが近づく」"

[[dialogue]]
speaker = "チナ"
# 「……ええと。そうやってバランスを取ってて、いつか世界は１つだけになりたがってるってことで……合ってるか？」
line = "「……ええと。そうやってバランスを取ってて、いつか世界は１つだけになりたがってるってことで……合ってるか？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「ええ。私たちは平行世界間において、知らないうちに生存をかけた戦争をしていた──ということよ」
line = "「ええ。私たちは平行世界間において、知らないうちに生存をかけた戦争をしていた──ということよ」"

[[dialogue]]
speaker = "ベアトリス"
# 「う、嘘……？　私たちが戦えば戦うほど、アルタイルの人達が、く、苦しい状況になってたってこと……？」
line = "「う、嘘……？　私たちが戦えば戦うほど、アルタイルの人達が、く、苦しい状況になってたってこと……？」"

[[dialogue]]
speaker = "レティシア"
# 「ベアトは相変わらず人がいいのね。いいじゃない。裏切り者が逃げ出した先なんて、別にどうなっても」
line = "「ベアトは相変わらず人がいいのね。いいじゃない。裏切り者が逃げ出した先なんて、別にどうなっても」"

[[dialogue]]
speaker = "ベアトリス"
# 「そ、そんな風に割り切れないよ！　ルヴィ、本当なの？　本当に女神様はそう仰ったの……！？」
line = "「そ、そんな風に割り切れないよ！　ルヴィ、本当なの？　本当に女神様はそう仰ったの……！？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「ええ。『近似世界』は１つ以上存在してはならない。すでにベガは滅びた。続いてアルタイルとデネブ、どちらかが滅ばなければ……」
line = "「ええ。『近似世界』は１つ以上存在してはならない。すでにベガは滅びた。続いてアルタイルとデネブ、どちらかが滅ばなければ……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「世界はどうなるかわからない──そうお聞きしたわ」
line = "「世界はどうなるかわからない──そうお聞きしたわ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「今、女神様に平行世界を渡るための方法を模索してもらっているわ。いつかアルタイルに、私たちが乗り込むために」
line = "「今、女神様に平行世界を渡るための方法を模索してもらっているわ。いつかアルタイルに、私たちが乗り込むために」"

[[dialogue]]
speaker = "ベアトリス"
# 「そ、そんなっ！？」
line = "「そ、そんなっ！？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……極星学園は明日、開校する。私は星徒会長として演説をすることになっているわ」
line = "「……極星学園は明日、開校する。私は星徒会長として演説をすることになっているわ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「そこでこの世界の秘密を、デネブの人達に伝えようと思う。みんなで一丸となって戦わないと、アルタイルには──いいえ」
line = "「そこでこの世界の秘密を、デネブの人達に伝えようと思う。みんなで一丸となって戦わないと、アルタイルには──いいえ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「緋宮クロトには勝てないわ」
line = "「緋宮クロトには勝てないわ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「デネブの人達に伝える前に、まずはあなたたちに伝えたかったの。私とずっと一緒にいた、この５人の足並みをそろえておきたくて」
line = "「デネブの人達に伝える前に、まずはあなたたちに伝えたかったの。私とずっと一緒にいた、この５人の足並みをそろえておきたくて」"

[[dialogue]]
speaker = "チナ"
# 「……そーゆーことか」
line = "「……そーゆーことか」"

[[dialogue]]
speaker = "ベアトリス"
# 「ま、待ってよルヴィ。私、誰かを守るためならいくらでも戦えるよ？　でもっ……そんな、同じ星騎士同士で争いだなんて……！」
line = "「ま、待ってよルヴィ。私、誰かを守るためならいくらでも戦えるよ？　でもっ……そんな、同じ星騎士同士で争いだなんて……！」"

[[dialogue]]
speaker = "ベアトリス"
# 「他の方法はないの！？　だってアルタイルにも、デネブと同じように普通の人達がいっぱい暮らしてるんでしょ……？」
line = "「他の方法はないの！？　だってアルタイルにも、デネブと同じように普通の人達がいっぱい暮らしてるんでしょ……？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「ええ、その通りよ」
line = "「ええ、その通りよ」"

[[dialogue]]
speaker = "グレイス"
# 「……アルタイルを滅ぼさなければ、デネブが滅ぶ。それが正しいことなら、私たちは……アルタイルの住人にとってリクリエそのものではないですか」
line = "「……アルタイルを滅ぼさなければ、デネブが滅ぶ。それが正しいことなら、私たちは……アルタイルの住人にとってリクリエそのものではないですか」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……そういう見方もできるわね」
line = "「……そういう見方もできるわね」"

[[dialogue]]
speaker = "レティシア"
# 「グレイスは面白い考えをするのね。優しい子」
line = "「グレイスは面白い考えをするのね。優しい子」"

[[dialogue]]
speaker = "レティシア"
# 「──ねえルヴィ、私は何をすればいいかしら？　何でも命じてちょうだい？」
line = "「──ねえルヴィ、私は何をすればいいかしら？　何でも命じてちょうだい？」"

[[dialogue]]
speaker = "ベアトリス"
# 「レティシアちゃん……！？」
line = "「レティシアちゃん……！？」"

[[dialogue]]
speaker = "チナ"
# 「アタシもやる。ルヴィが女神様から賜ったお言葉だ……そうしなきゃ、どうしようもないんだろ？　だったら、やる」
line = "「アタシもやる。ルヴィが女神様から賜ったお言葉だ……そうしなきゃ、どうしようもないんだろ？　だったら、やる」"

[[dialogue]]
speaker = "チナ"
# 「それにアルタイルは、あの裏切り者もいるんだ。ちょうどいい。父さんと母さんの無念も、まとめて晴らしてやる……！」
line = "「それにアルタイルは、あの裏切り者もいるんだ。ちょうどいい。父さんと母さんの無念も、まとめて晴らしてやる……！」"

[[dialogue]]
speaker = "ベアトリス"
# 「待って、ダメ！　そんなのダメだよチナちゃん！　平行世界ってことは……む、向こうにもチナちゃんのお父さんたちがいるかもしれないんだよ！？」
line = "「待って、ダメ！　そんなのダメだよチナちゃん！　平行世界ってことは……む、向こうにもチナちゃんのお父さんたちがいるかもしれないんだよ！？」"

[[dialogue]]
speaker = "チナ"
# 「そう……なのか、ルヴィ？」
line = "「そう……なのか、ルヴィ？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「時の進みが同じかはわからない。細かなズレが大きな違いを生むこともあるわ」
line = "「時の進みが同じかはわからない。細かなズレが大きな違いを生むこともあるわ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「デネブでは起きたことが、アルタイルでは起きていないこともあるでしょう……でも可能性は否定できない」
line = "「デネブでは起きたことが、アルタイルでは起きていないこともあるでしょう……でも可能性は否定できない」"

[[dialogue]]
speaker = "ルヴィネ"
# 「チナのご両親も……グレイスのご両親も存命である可能性は、大いにあるでしょう」
line = "「チナのご両親も……グレイスのご両親も存命である可能性は、大いにあるでしょう」"

[[dialogue]]
speaker = "チナ"
# 「──っ！」
line = "「──っ！」"

[[dialogue]]
speaker = "グレイス"
# 「お父さんたちが……生きてる、かもしれない……？」
line = "「お父さんたちが……生きてる、かもしれない……？」"

[[dialogue]]
speaker = "ベアトリス"
# 「ほ、ほらっ。冷静になって、もう１回考えてみよう？　女神様にお願いしたら、もっと違う解決策だって……！」
line = "「ほ、ほらっ。冷静になって、もう１回考えてみよう？　女神様にお願いしたら、もっと違う解決策だって……！」"

[[dialogue]]
speaker = "レティシア"
# 「ベアト。ルヴィを困らせてはダメよ」
line = "「ベアト。ルヴィを困らせてはダメよ」"

[[dialogue]]
speaker = "レティシア"
# 「そんな方法があったら、私たちへ教える前に確認してるはずでしょう。ルヴィの頭の良さは、あなたが一番よく知ってるはずだわ」
line = "「そんな方法があったら、私たちへ教える前に確認してるはずでしょう。ルヴィの頭の良さは、あなたが一番よく知ってるはずだわ」"

[[dialogue]]
speaker = "ベアトリス"
# 「それは……でも……」
line = "「それは……でも……」"

[[dialogue]]
speaker = "レティシア"
# 「私はやるわ。もしもチナたちが気乗りしないようであれば、全部私がやればいいだけのこと」
line = "「私はやるわ。もしもチナたちが気乗りしないようであれば、全部私がやればいいだけのこと」"

[[dialogue]]
speaker = "レティシア"
# 「この５人とデネブが守れるなら、平行世界なんていくらでも滅ぼしてあげる。だからルヴィ。して欲しいことがあったら何でも言ってね」
line = "「この５人とデネブが守れるなら、平行世界なんていくらでも滅ぼしてあげる。だからルヴィ。して欲しいことがあったら何でも言ってね」"

[[dialogue]]
speaker = "ベアトリス"
# 「私は反対だよ……絶対に嫌！　何か方法はあるはずだもん……！」
line = "「私は反対だよ……絶対に嫌！　何か方法はあるはずだもん……！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「２人の反応は予想どおりね……チナ、グレイス。あなたたちは？」
line = "「２人の反応は予想どおりね……チナ、グレイス。あなたたちは？」"

[[dialogue]]
speaker = "グレイス"
# 「……すみません。少し時間をください」
line = "「……すみません。少し時間をください」"

[[dialogue]]
speaker = "チナ"
# 「……アタシも」
line = "「……アタシも」"

[[dialogue]]
speaker = "ルヴィネ"
# 「わかったわ。それじゃあ、今日はこれで解散しましょう。開校前日に嫌なことを伝えてしまって、ごめんなさい」
line = "「わかったわ。それじゃあ、今日はこれで解散しましょう。開校前日に嫌なことを伝えてしまって、ごめんなさい」"

[[dialogue]]
speaker = "グレイス"
# 「参りましたねチナ。ルヴィもベアトもレティシアも、天涯孤独の身ですが……」
line = "「参りましたねチナ。ルヴィもベアトもレティシアも、天涯孤独の身ですが……」"

[[dialogue]]
speaker = "チナ"
# 「アルタイルでは、アタシらの両親は生きてる……かもしれない」
line = "「アルタイルでは、アタシらの両親は生きてる……かもしれない」"

[[dialogue]]
speaker = "グレイス"
# 「それだけじゃないですよ。友達だっているかも。新星学園も、流星学園も滅びていないかもしれません」
line = "「それだけじゃないですよ。友達だっているかも。新星学園も、流星学園も滅びていないかもしれません」"

[[dialogue]]
speaker = "チナ"
# 「あっちの世界じゃ、あの『仮面の女』を倒したって？　そんなわけないだろ」
line = "「あっちの世界じゃ、あの『仮面の女』を倒したって？　そんなわけないだろ」"

[[dialogue]]
speaker = "グレイス"
# 「観測できない以上、どうなっているかはわかりません。ですが……」
line = "「観測できない以上、どうなっているかはわかりません。ですが……」"

[[dialogue]]
speaker = "チナ"
# 「ああ。女神様とルヴィが言う以上、正しいんだろ。デネブのためにアルタイルを滅ぼす以外に……」
line = "「ああ。女神様とルヴィが言う以上、正しいんだろ。デネブのためにアルタイルを滅ぼす以外に……」"

[[dialogue]]
speaker = "グレイス"
# 「私たちが生き延びる方法はないのでしょうね。……だったら、やるしかありません」
line = "「私たちが生き延びる方法はないのでしょうね。……だったら、やるしかありません」"

[[dialogue]]
speaker = "チナ"
# 「……ああ」
line = "「……ああ」"

[[dialogue]]
speaker = "チナ"
# 「なぁグレイス。やるしかないなら……覚悟を決めるぞ」
line = "「なぁグレイス。やるしかないなら……覚悟を決めるぞ」"

[[dialogue]]
speaker = "チナ"
# 「ルヴィとレティシアだけになんて、やらせねえ。世界を滅ぼす汚れ役を、親友に任せて自分だけ逃げるだなんて、アタシにはできない」
line = "「ルヴィとレティシアだけになんて、やらせねえ。世界を滅ぼす汚れ役を、親友に任せて自分だけ逃げるだなんて、アタシにはできない」"

[[dialogue]]
speaker = "チナ"
# 「ルヴィだって辛いはずだ。あいつは優しいやつだよ。罪もない人達を簡単に切り捨てられるようなやつじゃない」
line = "「ルヴィだって辛いはずだ。あいつは優しいやつだよ。罪もない人達を簡単に切り捨てられるようなやつじゃない」"

[[dialogue]]
speaker = "グレイス"
# 「はい。私たちはルヴィの献身を、ずっとこの目で見てきました……きっとルヴィにとっても苦渋の決断でしょう」
line = "「はい。私たちはルヴィの献身を、ずっとこの目で見てきました……きっとルヴィにとっても苦渋の決断でしょう」"

[[dialogue]]
speaker = "グレイス"
# 「私の考えは、どちらかというとベアト寄りです。何か方法があるなら探したい。そのためにベアトに協力したいとも思っています」
line = "「私の考えは、どちらかというとベアト寄りです。何か方法があるなら探したい。そのためにベアトに協力したいとも思っています」"

[[dialogue]]
speaker = "チナ"
# 「ああ、お前も納得するまで自分の意見をぶつけろよ」
line = "「ああ、お前も納得するまで自分の意見をぶつけろよ」"

[[dialogue]]
speaker = "グレイス"
# 「はい。でも……ほかに手段はない。どうにもならないってわかったら、その時は──」
line = "「はい。でも……ほかに手段はない。どうにもならないってわかったら、その時は──」"

[[dialogue]]
speaker = "グレイス"
# 「アルタイルを滅ぼします。ルヴィだけにはやらせません。泥をかぶるなら、一緒にです」
line = "「アルタイルを滅ぼします。ルヴィだけにはやらせません。泥をかぶるなら、一緒にです」"

[[dialogue]]
speaker = "unk"
# ──翌日。ルヴィネの就任演説の前に、チナたちは考えを伝えた。
line = "──翌日。ルヴィネの就任演説の前に、チナたちは考えを伝えた。"

[[dialogue]]
speaker = "unk"
# どうにもならない時は、デネブのためにアルタイルを滅ぼす──その答えに、ルヴィネは目を伏して、頭を下げて礼を言ったのだった。
line = "どうにもならない時は、デネブのためにアルタイルを滅ぼす──その答えに、ルヴィネは目を伏して、頭を下げて礼を言ったのだった。"
