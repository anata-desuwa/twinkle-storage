[[dialogue]]
speaker = "unk"
# 第３話,新星学園星徒会長,B
line = "第３話,新星学園星徒会長,B"

[[dialogue]]
speaker = "unk"
# ブー……ブー……
line = "ブー……ブー……"

[[dialogue]]
speaker = "クロト"
# 「ん……？」
line = "「ん……？」"

[[dialogue]]
speaker = "unk"
# チャイムとも違う音色が鳴った。これは……
line = "チャイムとも違う音色が鳴った。これは……"

[[dialogue]]
speaker = "ヴィーナス"
# 「──ぇー……ん──ぁー……マイクマイク、只今マイクのテスト中。わたしは俳句に無我夢中」
line = "「──ぇー……ん──ぁー……マイクマイク、只今マイクのテスト中。わたしは俳句に無我夢中」"

[[dialogue]]
speaker = "マトイ"
# 「会長……？」
line = "「会長……？」"

[[dialogue]]
speaker = "unk"
# 校内放送から響く女性の声。
line = "校内放送から響く女性の声。"

[[dialogue]]
speaker = "unk"
# 何の放送かと思ったが、その疑問は問いかけるまでもなく氷解した。
line = "何の放送かと思ったが、その疑問は問いかけるまでもなく氷解した。"

[[dialogue]]
speaker = "ヴィーナス"
# 「えー、２年Ｂ組！　緋宮クロト！　今すぐ星徒会室までダッシュで来なさーいっ」
line = "「えー、２年Ｂ組！　緋宮クロト！　今すぐ星徒会室までダッシュで来なさーいっ」"

[[dialogue]]
speaker = "クロト"
# 「へー緋宮くん…………って俺？」
line = "「へー緋宮くん…………って俺？」"

[[dialogue]]
speaker = "unk"
# 突然の呼び出しに教室内のざわめきが広がる。
line = "突然の呼び出しに教室内のざわめきが広がる。"

[[dialogue]]
speaker = "unk"
# それが異例の放送であることは新参の俺にも察しがついた。
line = "それが異例の放送であることは新参の俺にも察しがついた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「あれ？　ねえねえマイクってどこで切るんだっけ、アナー」
line = "「あれ？　ねえねえマイクってどこで切るんだっけ、アナー」"

[[dialogue]]
speaker = "サーシャ"
# 「ふふっ、ヴィーナスちゃんったらおっちょこちょいね。ここよ」
line = "「ふふっ、ヴィーナスちゃんったらおっちょこちょいね。ここよ」"

[[dialogue]]
speaker = "アナ"
# 「違いますそこはアンプ入力──あぁ」
line = "「違いますそこはアンプ入力──あぁ」"

[[dialogue]]
speaker = "unk"
# ブツッ。
line = "ブツッ。"

[[dialogue]]
speaker = "unk"
# 最後にはよくわからないやり取りを残して、そのゲリラ放送は終了した。
line = "最後にはよくわからないやり取りを残して、そのゲリラ放送は終了した。"

[[dialogue]]
speaker = "unk"
# というか、聞き覚えのある声だったような気も……。
line = "というか、聞き覚えのある声だったような気も……。"

[[dialogue]]
speaker = "クラスの女子Ａ"
# 「い──今のが九浄さんだよ、緋宮くん！　知り合いだったの！？」
line = "「い──今のが九浄さんだよ、緋宮くん！　知り合いだったの！？」"

[[dialogue]]
speaker = "クロト"
# 「いや──会ったことはない。はずだ。でも、声はなんとなく聞いたことがあるような……」
line = "「いや──会ったことはない。はずだ。でも、声はなんとなく聞いたことがあるような……」"

[[dialogue]]
speaker = "クラスの女子Ｂ"
# 「転入生だから挨拶とか？　んでも、一々そんなことするのかな……？」
line = "「転入生だから挨拶とか？　んでも、一々そんなことするのかな……？」"

[[dialogue]]
speaker = "クロト"
# 「マトイ。どういうことかわかるか」
line = "「マトイ。どういうことかわかるか」"

[[dialogue]]
speaker = "マトイ"
# 「わからない。でも……星徒会室なら、連れてってあげる」
line = "「わからない。でも……星徒会室なら、連れてってあげる」"

[[dialogue]]
speaker = "unk"
# 廊下を渡って、中庭を通って、階段を昇って……
line = "廊下を渡って、中庭を通って、階段を昇って……"

[[dialogue]]
speaker = "unk"
# マトイの案内もありつつようやく、俺はその一室にたどり着いた。
line = "マトイの案内もありつつようやく、俺はその一室にたどり着いた。"

[[dialogue]]
speaker = "クロト"
# 「──し、失礼します」
line = "「──し、失礼します」"

[[dialogue]]
speaker = "マトイ"
# 「会長？　緋宮くんを連れてきたけど……」
line = "「会長？　緋宮くんを連れてきたけど……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「──来たわね」
line = "「──来たわね」"

[[dialogue]]
speaker = "unk"
# 奥にある机からくるりと椅子を回転させて……一人の女性が向かい立つ。
line = "奥にある机からくるりと椅子を回転させて……一人の女性が向かい立つ。"

[[dialogue]]
speaker = "ヴィーナス"
# 「案内ありがとう、マトイ。下がっていいわ」
line = "「案内ありがとう、マトイ。下がっていいわ」"

[[dialogue]]
speaker = "マトイ"
# 「はい……それは構わないけど……どういう用……？」
line = "「はい……それは構わないけど……どういう用……？」"

[[dialogue]]
speaker = "unk"
# ここまで一緒に来てくれたマトイも、これがどういう事態か飲み込めていない様子だった。
line = "ここまで一緒に来てくれたマトイも、これがどういう事態か飲み込めていない様子だった。"

[[dialogue]]
speaker = "unk"
# 無論、当事者の俺はさらに飲み込めていない。
line = "無論、当事者の俺はさらに飲み込めていない。"

[[dialogue]]
speaker = "クロト"
# 「（あそこにいるのは……昨日の……）」
line = "「（あそこにいるのは……昨日の……）」"

[[dialogue]]
speaker = "unk"
# ふと傍らを見やれば、天使と魔族の女の子がひとりずつこちらを見守っていた。
line = "ふと傍らを見やれば、天使と魔族の女の子がひとりずつこちらを見守っていた。"

[[dialogue]]
speaker = "unk"
# 恐らくは彼女たちが残る星徒会のメンバーか。
line = "恐らくは彼女たちが残る星徒会のメンバーか。"

[[dialogue]]
speaker = "unk"
# となると……
line = "となると……"

[[dialogue]]
speaker = "クロト"
# 「その声──あなたが、俺を呼び出した会長さん……でしょうか」
line = "「その声──あなたが、俺を呼び出した会長さん……でしょうか」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふふ、その通り。観察眼はそれなりのようね」
line = "「ふふ、その通り。観察眼はそれなりのようね」"

[[dialogue]]
speaker = "unk"
# 俺の言葉を満足げに聞き届ける女性。
line = "俺の言葉を満足げに聞き届ける女性。"

[[dialogue]]
speaker = "unk"
# 会長──つまりは新星学園星徒会、全学生の頂点に立つ存在ということ。
line = "会長──つまりは新星学園星徒会、全学生の頂点に立つ存在ということ。"

[[dialogue]]
speaker = "クロト"
# 「お初にお目にかかります。昨日からこの学園に転入してきた──」
line = "「お初にお目にかかります。昨日からこの学園に転入してきた──」"

[[dialogue]]
speaker = "ヴィーナス"
# 「自己紹介は結構。あなたを呼んだのはそんなチンケな用じゃないわ」
line = "「自己紹介は結構。あなたを呼んだのはそんなチンケな用じゃないわ」"

[[dialogue]]
speaker = "unk"
# 挨拶の言葉を遮られる。
line = "挨拶の言葉を遮られる。"

[[dialogue]]
speaker = "unk"
# どうも彼女から言いたいことがあるようだった。
line = "どうも彼女から言いたいことがあるようだった。"

[[dialogue]]
speaker = "ヴィーナス"
# 「聞きなさい。これは決定事項……この私が命じる限りね」
line = "「聞きなさい。これは決定事項……この私が命じる限りね」"

[[dialogue]]
speaker = "unk"
# はつらつな声が凛と響く。
line = "はつらつな声が凛と響く。"

[[dialogue]]
speaker = "unk"
# 星徒会の権力は絶大。となると、俺の待遇なんかも胸三寸だったりするのか。
line = "星徒会の権力は絶大。となると、俺の待遇なんかも胸三寸だったりするのか。"

[[dialogue]]
speaker = "クロト"
# 「（もしかして、許可も得ずモンスターを退治していたのがバレた……？）」
line = "「（もしかして、許可も得ずモンスターを退治していたのがバレた……？）」"

[[dialogue]]
speaker = "unk"
# 今になって入学を取り消されたりすると困る──
line = "今になって入学を取り消されたりすると困る──"

[[dialogue]]
speaker = "ヴィーナス"
# 「──ん……しょっと」
line = "「──ん……しょっと」"

[[dialogue]]
speaker = "unk"
# しかし、彼女の行動はそんな予想の何もかもを裏切ってきた。
line = "しかし、彼女の行動はそんな予想の何もかもを裏切ってきた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「はい」
line = "「はい」"

[[dialogue]]
speaker = "クロト"
# 「っ……？　これは……？」
line = "「っ……？　これは……？」"

[[dialogue]]
speaker = "unk"
# 彼女は自らの制服につけていたマントを外して──
line = "彼女は自らの制服につけていたマントを外して──"

[[dialogue]]
speaker = "unk"
# それをそのまま、俺の背中へ装着させた。
line = "それをそのまま、俺の背中へ装着させた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「あなたを今日付けでここ、新星学園星徒会──星徒会長に任命するわ。そして」
line = "「あなたを今日付けでここ、新星学園星徒会──星徒会長に任命するわ。そして」"

[[dialogue]]
speaker = "ヴィーナス"
# 「緋宮クロト──あなたは魔王となって、この世界を救うのよ！」
line = "「緋宮クロト──あなたは魔王となって、この世界を救うのよ！」"
