[[dialogue]]
speaker = "unk"
# 第２話,類は友を呼ぶ,P
line = "第２話,類は友を呼ぶ,P"

[[dialogue]]
speaker = "unk"
# メルエルと再会してから２週間ほど。彼女は毎日のように俺の教室を訪ねては、他愛のない雑談をして行くようになっていた。
line = "メルエルと再会してから２週間ほど。彼女は毎日のように俺の教室を訪ねては、他愛のない雑談をして行くようになっていた。"

[[dialogue]]
speaker = "メルエル"
# 「──それでね、マトイちゃんから美味しいケーキ屋さんを教えてもらったんだ。もしよかったら今度、２人で食べに行かない？」
line = "「──それでね、マトイちゃんから美味しいケーキ屋さんを教えてもらったんだ。もしよかったら今度、２人で食べに行かない？」"

[[dialogue]]
speaker = "unk"
# 一応、俺も男である。……幼なじみとはいえ、彼女の態度を見ていると、少なからず頭を過ぎることもあるわけで──
line = "一応、俺も男である。……幼なじみとはいえ、彼女の態度を見ていると、少なからず頭を過ぎることもあるわけで──"

[[dialogue]]
speaker = "unk"
# （もしかして俺、好かれてる……？）
line = "（もしかして俺、好かれてる……？）"

[[dialogue]]
speaker = "メルエル"
# 「うん？　会長くん、どうかした？」
line = "「うん？　会長くん、どうかした？」"

[[dialogue]]
speaker = "メルエル"
# 「──何でもない？　ふふっ、変なの♪」
line = "「──何でもない？　ふふっ、変なの♪」"

[[dialogue]]
speaker = "unk"
# （変に浮かれないように、気を付けよう）
line = "（変に浮かれないように、気を付けよう）"

[[dialogue]]
speaker = "unk"
# （いやいやいや、都合良すぎる考えだ……）
line = "（いやいやいや、都合良すぎる考えだ……）"

[[dialogue]]
speaker = "ヴィーナス"
# 「たるんでるわよ、クロト！」
line = "「たるんでるわよ、クロト！」"

[[dialogue]]
speaker = "メルエル"
# 「わっ……九浄さん！？」
line = "「わっ……九浄さん！？」"

[[dialogue]]
speaker = "unk"
# ヴィーナス、どうしたんだいきなり？
line = "ヴィーナス、どうしたんだいきなり？"

[[dialogue]]
speaker = "ヴィーナス"
# 「このところ、そこの女子と暇さえあれば雑談しているでしょう。会長になってまだ日も浅いのに、だらしがないわ！」
line = "「このところ、そこの女子と暇さえあれば雑談しているでしょう。会長になってまだ日も浅いのに、だらしがないわ！」"

[[dialogue]]
speaker = "メルエル"
# 「ごめんね、九浄さん……そうだよね、会長くんも星徒会長になったばかりで忙しいのに。私が押し掛けてたせいで、時間を使わせちゃってたよね……」
line = "「ごめんね、九浄さん……そうだよね、会長くんも星徒会長になったばかりで忙しいのに。私が押し掛けてたせいで、時間を使わせちゃってたよね……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「アナタは別に悪くないわ！　クロトが女の子にチヤホヤされて、デレデレしているのが悪いのよ」
line = "「アナタは別に悪くないわ！　クロトが女の子にチヤホヤされて、デレデレしているのが悪いのよ」"

[[dialogue]]
speaker = "unk"
# 俺、そこまでデレデレしてないと思うんだが！？
line = "俺、そこまでデレデレしてないと思うんだが！？"

[[dialogue]]
speaker = "ヴィーナス"
# 「とにかく放課後になったんだし、いつまでも雑談してないでさっさと星徒会室に行くわよ！」
line = "「とにかく放課後になったんだし、いつまでも雑談してないでさっさと星徒会室に行くわよ！」"

[[dialogue]]
speaker = "メルエル"
# 「あっ、九浄さん待って。実は私、会長くんと九浄さんにお願いしようと思ってたことがあって──」
line = "「あっ、九浄さん待って。実は私、会長くんと九浄さんにお願いしようと思ってたことがあって──」"

[[dialogue]]
speaker = "ヴィーナス"
# 「？　お願いって、一体何かしら？」
line = "「？　お願いって、一体何かしら？」"

[[dialogue]]
speaker = "メルエル"
# 「あの……私も星徒会役員に加えてもらえませんかっ！」
line = "「あの……私も星徒会役員に加えてもらえませんかっ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……！？」
line = "「……！？」"

[[dialogue]]
speaker = "メルエル"
# 「会長くん、いつも忙しそうにしているでしょ？　それを見てて、手伝いたいなって思ったの。事務仕事も覚えるし、戦闘面でも役に立つと思う。だから──」
line = "「会長くん、いつも忙しそうにしているでしょ？　それを見てて、手伝いたいなって思ったの。事務仕事も覚えるし、戦闘面でも役に立つと思う。だから──」"

[[dialogue]]
speaker = "メルエル"
# 「私も星徒会に入りたいです！」
line = "「私も星徒会に入りたいです！」"

[[dialogue]]
speaker = "unk"
# メルエル、本気なのか？
line = "メルエル、本気なのか？"

[[dialogue]]
speaker = "メルエル"
# 「うんっ。私も、頑張るキミを近くで支えたいんだ」
line = "「うんっ。私も、頑張るキミを近くで支えたいんだ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「だ……ダメよ！　そう簡単に認めるわけにはいかないわ！」
line = "「だ……ダメよ！　そう簡単に認めるわけにはいかないわ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「まず、星徒会役員はアステラを攻略するだけの高い戦闘力が求められるわ。それを確かめてみないことには……」
line = "「まず、星徒会役員はアステラを攻略するだけの高い戦闘力が求められるわ。それを確かめてみないことには……」"

[[dialogue]]
speaker = "メルエル"
# 「姫咲メルエル、１年生の時からプリマステラです！　実力が問題なら、もちろんテストを受けます！」
line = "「姫咲メルエル、１年生の時からプリマステラです！　実力が問題なら、もちろんテストを受けます！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ち、力があるだけじゃダメよ。アステラ攻略を行う星徒会は、プリマステラ以上に大きな危険と責任が伴う立場で、それには強い覚悟が……」
line = "「ち、力があるだけじゃダメよ。アステラ攻略を行う星徒会は、プリマステラ以上に大きな危険と責任が伴う立場で、それには強い覚悟が……」"

[[dialogue]]
speaker = "メルエル"
# 「私のモットーは、一意専心。一度やると決めたことは、最後まで諦めずに貫き通します！」
line = "「私のモットーは、一意専心。一度やると決めたことは、最後まで諦めずに貫き通します！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ぐ……こ、これは一度、女同士で話し合わなければならないようね……」
line = "「ぐ……こ、これは一度、女同士で話し合わなければならないようね……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロト。悪いけど少しの間、席を外して貰えるかしら？」
line = "「クロト。悪いけど少しの間、席を外して貰えるかしら？」"

[[dialogue]]
speaker = "unk"
# ヴィーナス、何かムキになってないか！？
line = "ヴィーナス、何かムキになってないか！？"

[[dialogue]]
speaker = "unk"
# 待て待て！
line = "待て待て！"

[[dialogue]]
speaker = "メルエル"
# 「会長くん、私からもお願い。……私には九浄さんの気持ちが何となく分かるから、少しの間２人で話をさせて欲しいな」
line = "「会長くん、私からもお願い。……私には九浄さんの気持ちが何となく分かるから、少しの間２人で話をさせて欲しいな」"

[[dialogue]]
speaker = "unk"
# そうして、俺は１人、教室から追い出されてしまった……。
line = "そうして、俺は１人、教室から追い出されてしまった……。"

[[dialogue]]
speaker = "unk"
# しかし、やはりいつもと様子の違うヴィーナスが、なにを言い出すかも心配だ。そんなわけで、こっそり中を覗いてみると──
line = "しかし、やはりいつもと様子の違うヴィーナスが、なにを言い出すかも心配だ。そんなわけで、こっそり中を覗いてみると──"

[[dialogue]]
speaker = "メルエル"
# 「──実は私、会長くんとは幼なじみなの。でも、長い間離れてたから再会できたのが嬉しくて、ついはしゃいじゃって……ごめんなさい」
line = "「──実は私、会長くんとは幼なじみなの。でも、長い間離れてたから再会できたのが嬉しくて、ついはしゃいじゃって……ごめんなさい」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そんな事情があったのね……。確かに、昔馴染みと再会したら、嬉しくなってしまうものよね。意地悪な真似をしてしまったわ。ごめんなさい」
line = "「そんな事情があったのね……。確かに、昔馴染みと再会したら、嬉しくなってしまうものよね。意地悪な真似をしてしまったわ。ごめんなさい」"

[[dialogue]]
speaker = "メルエル"
# 「ううん、いいの。私、さっきも言ったけど……九浄さんが何で機嫌を悪くしてたのか、何となく分かるから」
line = "「ううん、いいの。私、さっきも言ったけど……九浄さんが何で機嫌を悪くしてたのか、何となく分かるから」"

[[dialogue]]
speaker = "ヴィーナス"
# 「？　……なんのことかしら？　私は別に、機嫌が悪かったなんてこともなかったわ！」
line = "「？　……なんのことかしら？　私は別に、機嫌が悪かったなんてこともなかったわ！」"

[[dialogue]]
speaker = "メルエル"
# 「あれ？　私の勘違い……だったのかな？　うー－ん、私のこの手の勘って、結構当たるんだけどなぁ」
line = "「あれ？　私の勘違い……だったのかな？　うー－ん、私のこの手の勘って、結構当たるんだけどなぁ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「何のことを言ってるのかはわからないけど、そう……クロトの幼なじみなのね。ということは、クロトが小っちゃかった時、どんな風だったも、覚えてるってこと？」
line = "「何のことを言ってるのかはわからないけど、そう……クロトの幼なじみなのね。ということは、クロトが小っちゃかった時、どんな風だったも、覚えてるってこと？」"

[[dialogue]]
speaker = "メルエル"
# 「もちろん！　あ、昔の会長くんって、今のカッコいい感じとはまたちょっと違って、すっごく可愛くてね──」
line = "「もちろん！　あ、昔の会長くんって、今のカッコいい感じとはまたちょっと違って、すっごく可愛くてね──」"

[[dialogue]]
speaker = "unk"
# （なんか笑い合ってる……？）
line = "（なんか笑い合ってる……？）"

[[dialogue]]
speaker = "unk"
# しばらくして、また教室内の様子を伺ってみると──
line = "しばらくして、また教室内の様子を伺ってみると──"

[[dialogue]]
speaker = "メルエル"
# 「ねぇ、ヴィーナスちゃん！　今日これから２人で街に遊びに出掛けない？　あっ、でも星徒会の仕事があるんだっけ……」
line = "「ねぇ、ヴィーナスちゃん！　今日これから２人で街に遊びに出掛けない？　あっ、でも星徒会の仕事があるんだっけ……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「いいわね、メルエル！　今日はもともと星徒会を休みにするつもりだったから大丈夫！　本当はそのことを伝えようと思って、ここに来たのよ」
line = "「いいわね、メルエル！　今日はもともと星徒会を休みにするつもりだったから大丈夫！　本当はそのことを伝えようと思って、ここに来たのよ」"

[[dialogue]]
speaker = "unk"
# （いつの間にか名前を呼び合うくらい仲良くなってる！？）
line = "（いつの間にか名前を呼び合うくらい仲良くなってる！？）"

[[dialogue]]
speaker = "メルエル"
# 「あはは、そうだったんだ。よし、じゃあ親交を深める為に、一緒に街へ繰り出そう♪」
line = "「あはは、そうだったんだ。よし、じゃあ親交を深める為に、一緒に街へ繰り出そう♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええ、行きましょう！　メルエルにはとっておきのスイーツ店を紹介するわ！」
line = "「ええ、行きましょう！　メルエルにはとっておきのスイーツ店を紹介するわ！」"

[[dialogue]]
speaker = "unk"
# そのまま親友のように笑い合いながら、反対側の扉から出て行ってしまう２人。
line = "そのまま親友のように笑い合いながら、反対側の扉から出て行ってしまう２人。"

[[dialogue]]
speaker = "unk"
# あれ？　なんか俺、忘れさられてない……？
line = "あれ？　なんか俺、忘れさられてない……？"
