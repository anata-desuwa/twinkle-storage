[[dialogue]]
speaker = "アニマ"
# 「フフフ、気になるなら見に来るがイイ。ではまた後でナ！」
line = "「フフフ、気になるなら見に来るがイイ。ではまた後でナ！」"

[[dialogue]]
speaker = "ロクサーナ"
# 「ふはははは！！　新しい脚本ができたぞ！　会長は双子の姉と弟の一人二役！　すぐ読み合わせだ！」
line = "「ふはははは！！　新しい脚本ができたぞ！　会長は双子の姉と弟の一人二役！　すぐ読み合わせだ！」"

[[dialogue]]
speaker = "unk"
# 後で演劇部に行くので待っててください
line = "後で演劇部に行くので待っててください"

[[dialogue]]
speaker = "レイラ"
# 「魔王さんを女の子にしたい勢力があるんですかこの学園！？」
line = "「魔王さんを女の子にしたい勢力があるんですかこの学園！？」"

[[dialogue]]
speaker = "ロクサーナ"
# 「言質はとった。必ず後で来い！　でなければ衣装の布を３０％にするからな！」
line = "「言質はとった。必ず後で来い！　でなければ衣装の布を３０％にするからな！」"

[[dialogue]]
speaker = "パルミエ"
# 「ダ～リ～ン、ヒマだから構って～。ゲーム飽きちゃった～」
line = "「ダ～リ～ン、ヒマだから構って～。ゲーム飽きちゃった～」"

[[dialogue]]
speaker = "unk"
# 間違い探しをあげます
