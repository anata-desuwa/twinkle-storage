[[dialogue]]
speaker = "unk"
# 第１話,リーダーの資質,P
line = "第１話,リーダーの資質,P"

[[dialogue]]
speaker = "unk"
# 放課後、星徒会室で来客を待っていると、ノックの音が聞こえた。
line = "放課後、星徒会室で来客を待っていると、ノックの音が聞こえた。"

[[dialogue]]
speaker = "レイラ"
# 「失礼いたします」
line = "「失礼いたします」"

[[dialogue]]
speaker = "レイラ"
# 「改めまして、<ruby=わたくし>私</ruby>はコラプサー首領、百目騎レイラと申します」
line = "「改めまして、<ruby>私<rt>わたくし</rt></ruby>はコラプサー首領、百目騎レイラと申します」"

[[dialogue]]
speaker = "レイラ"
# 「緋宮星徒会長におかれましては、本日はこのような機会を設けていただき、心から感謝を申し上げます」
line = "「緋宮星徒会長におかれましては、本日はこのような機会を設けていただき、心から感謝を申し上げます」"

[[dialogue]]
speaker = "レイラ"
# 「私たちコラプサーは星騎士の方々を傷付けたばかりか、あまつさえ命を奪おうともしました。謝って許されることではありません」
line = "「私たちコラプサーは星騎士の方々を傷付けたばかりか、あまつさえ命を奪おうともしました。謝って許されることではありません」"

[[dialogue]]
speaker = "レイラ"
# 「それでもどうか、謝罪させてください。…………申し訳ありませんでした」
line = "「それでもどうか、謝罪させてください。…………申し訳ありませんでした」"

[[dialogue]]
speaker = "unk"
# これからの話をしよう
line = "これからの話をしよう"

[[dialogue]]
speaker = "unk"
# 顔を上げて
line = "顔を上げて"

[[dialogue]]
speaker = "レイラ"
# 「はい。私たちはネビュラ<ruby=きか>麾下</ruby>に戦闘員として加えていただきました。モンスター、そしてリクリエとの戦いに邁進する所存です」
line = "「はい。私たちはネビュラ<ruby>麾下<rt>きか</rt></ruby>に戦闘員として加えていただきました。モンスター、そしてリクリエとの戦いに邁進する所存です」"

[[dialogue]]
speaker = "レイラ"
# 「ただ、コラプサーの能力は先の秋葉原の事件を経て弱体化してしまいました。星力の出力、吸収能力ともに以前ほどではありません。戦力としては未知数な部分もございます」
line = "「ただ、コラプサーの能力は先の秋葉原の事件を経て弱体化してしまいました。星力の出力、吸収能力ともに以前ほどではありません。戦力としては未知数な部分もございます」"

[[dialogue]]
speaker = "レイラ"
# 「つきましては、星騎士の皆様には、先達としてご指導ご鞭撻いただければ幸いです」
line = "「つきましては、星騎士の皆様には、先達としてご指導ご鞭撻いただければ幸いです」"

[[dialogue]]
speaker = "unk"
# コラプサーって結局何者だったんだろう？
line = "コラプサーって結局何者だったんだろう？"

[[dialogue]]
speaker = "レイラ"
# 「そうですね……私もトワ先生にお聞きして理解した部分もあるのですが」
line = "「そうですね……私もトワ先生にお聞きして理解した部分もあるのですが」"

[[dialogue]]
speaker = "レイラ"
# 「通常、星騎士は１つの星と契約し、星力を得ます。その星が守護星です」
line = "「通常、星騎士は１つの星と契約し、星力を得ます。その星が守護星です」"

[[dialogue]]
speaker = "レイラ"
# 「コラプサーもブラックホールと契約し、そこから力を得ています。ブラックホールが私たちの守護星ですので、普通の守護星を持つことはできません」
line = "「コラプサーもブラックホールと契約し、そこから力を得ています。ブラックホールが私たちの守護星ですので、普通の守護星を持つことはできません」"

[[dialogue]]
speaker = "レイラ"
# 「私やイングリットが星騎士になれなかったのもそのせいでしょう」
line = "「私やイングリットが星騎士になれなかったのもそのせいでしょう」"

[[dialogue]]
speaker = "レイラ"
# 「しかしコラプサーの力は通常は目覚めず、死によって覚醒します。条件が特殊なのは、ブラックホールが死した星の成れの果てだからでしょう」
line = "「しかしコラプサーの力は通常は目覚めず、死によって覚醒します。条件が特殊なのは、ブラックホールが死した星の成れの果てだからでしょう」"

[[dialogue]]
speaker = "レイラ"
# 「一度死に、ブラックホールに生かされていた私たちは、生きた死人ともいえる存在でした。それを生者に戻したのが、コハルコさんの魔法です」
line = "「一度死に、ブラックホールに生かされていた私たちは、生きた死人ともいえる存在でした。それを生者に戻したのが、コハルコさんの魔法です」"

[[dialogue]]
speaker = "レイラ"
# 「ただ疑問が残ります。前例のない、私たちのような存在が、どうして小規模ながらも１つの組織となるほどに集まったのか」
line = "「ただ疑問が残ります。前例のない、私たちのような存在が、どうして小規模ながらも１つの組織となるほどに集まったのか」"

[[dialogue]]
speaker = "レイラ"
# 「ここからはトワ先生の推測も含むのですが……」
line = "「ここからはトワ先生の推測も含むのですが……」"

[[dialogue]]
speaker = "レイラ"
# 「おそらくブラックホールを守護星とする者は今までもいた。けれど力に目覚めなかったのは、死したまま蘇生しなかったから」
line = "「おそらくブラックホールを守護星とする者は今までもいた。けれど力に目覚めなかったのは、死したまま蘇生しなかったから」"

[[dialogue]]
speaker = "レイラ"
# 「だけど私たちが死した瞬間、何者かが私たちに働きかけ、何らかの意図で生かした。だからコラプサーが生まれた」
line = "「だけど私たちが死した瞬間、何者かが私たちに働きかけ、何らかの意図で生かした。だからコラプサーが生まれた」"

[[dialogue]]
speaker = "レイラ"
# 「……私は、その何者かに心当たりはありませんけど」
line = "「……私は、その何者かに心当たりはありませんけど」"

[[dialogue]]
speaker = "unk"
# 魔女イザベラが変じた姿は、リクリエを教義とするバジュラ教団の亡霊に似ていた。
line = "魔女イザベラが変じた姿は、リクリエを教義とするバジュラ教団の亡霊に似ていた。"

[[dialogue]]
speaker = "unk"
# 以前エンジュとメテオラと戦った時も、イザベラのように一時正気を失っていた。
line = "以前エンジュとメテオラと戦った時も、イザベラのように一時正気を失っていた。"

[[dialogue]]
speaker = "unk"
# コラプサーに影響を与えていた『何者か』は、リクリエなのかもしれない。
line = "コラプサーに影響を与えていた『何者か』は、リクリエなのかもしれない。"

[[dialogue]]
speaker = "レイラ"
# 「ところで、魔王さ……緋宮星徒会長」
line = "「ところで、魔王さ……緋宮星徒会長」"

[[dialogue]]
speaker = "レイラ"
# 「魔王さんでいい……？　ではお言葉に甘えて……」
line = "「魔王さんでいい……？　ではお言葉に甘えて……」"

[[dialogue]]
speaker = "レイラ"
# 「魔王さんは個性豊かな星騎士を率いる組織の長です。その秘訣をご教授いただければ、と」
line = "「魔王さんは個性豊かな星騎士を率いる組織の長です。その秘訣をご教授いただければ、と」"

[[dialogue]]
speaker = "レイラ"
# 「うちのコラプサーたちは……その、あまりにもクセが強いというか、人の話を聞いてくれないというか……」
line = "「うちのコラプサーたちは……その、あまりにもクセが強いというか、人の話を聞いてくれないというか……」"

[[dialogue]]
speaker = "レイラ"
# 「大変そう……？　そう、そうなんですよ！　実際大変なんです！」
line = "「大変そう……？　そう、そうなんですよ！　実際大変なんです！」"

[[dialogue]]
speaker = "レイラ"
# 「イングリットがイニシュさんに挑みかかったり、禁止されているのにキサナがお金を賭けてポーカーやったり……」
line = "「イングリットがイニシュさんに挑みかかったり、禁止されているのにキサナがお金を賭けてポーカーやったり……」"

[[dialogue]]
speaker = "レイラ"
# 「メテオラが基地を壊したり、ヴァレリーの視線が気持ち悪いって苦情が来たり……」
line = "「メテオラが基地を壊したり、ヴァレリーの視線が気持ち悪いって苦情が来たり……」"

[[dialogue]]
speaker = "レイラ"
# 「自分から言い出したことなんですが、コラプサーのやらかしは私がまず怒られることになっているので……うぅ……っ」
line = "「自分から言い出したことなんですが、コラプサーのやらかしは私がまず怒られることになっているので……うぅ……っ」"

[[dialogue]]
speaker = "レイラ"
# 「彼女たちを御するコツがあれば、是非とも教えてください！」
line = "「彼女たちを御するコツがあれば、是非とも教えてください！」"

[[dialogue]]
speaker = "unk"
# そうは言っても、新星学園にあそこまでの問題児はいない。コツと言われても……
line = "そうは言っても、新星学園にあそこまでの問題児はいない。コツと言われても……"

[[dialogue]]
speaker = "アニマ"
# 「会長、実験の時間ダ！　今日の薬は今までより女の子タイムを増やした性転換薬だ！　しかも飲みやすい甘いシロップにしてやったゾ！」
line = "「会長、実験の時間ダ！　今日の薬は今までより女の子タイムを増やした性転換薬だ！　しかも飲みやすい甘いシロップにしてやったゾ！」"

[[dialogue]]
speaker = "unk"
# 今日はお客さんが来てるのでまた後日
