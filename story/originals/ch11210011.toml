[[dialogue]]
speaker = "パルミエ"
# 「何これ、同じ絵じゃないの？　間違いを全部見つけたらご褒美くれる？　ならやるわ～。ご褒美、約束よ～」
line = "「何これ、同じ絵じゃないの？　間違いを全部見つけたらご褒美くれる？　ならやるわ～。ご褒美、約束よ～」"

[[dialogue]]
speaker = "レイラ"
# 「今の方、もはや用事ですらなかったですね……というか、魔王さんのことダーリンて呼んでましたよね？」
line = "「今の方、もはや用事ですらなかったですね……というか、魔王さんのことダーリンて呼んでましたよね？」"

[[dialogue]]
speaker = "レイラ"
# 「あんなに傍若無人な方々に対しても一切動じないなんて……さすが星徒会長です。百目騎レイラ、感服いたしました」
line = "「あんなに傍若無人な方々に対しても一切動じないなんて……さすが星徒会長です。百目騎レイラ、感服いたしました」"

[[dialogue]]
speaker = "レイラ"
# 「然して、その秘訣とは……っ！」
line = "「然して、その秘訣とは……っ！」"

[[dialogue]]
speaker = "unk"
# 慣れ、かな……
line = "慣れ、かな……"

[[dialogue]]
speaker = "レイラ"
# 「慣れ！？　そんなんでいいんですか！？」
line = "「慣れ！？　そんなんでいいんですか！？」"

[[dialogue]]
speaker = "レイラ"
# 「ああ、魔王さんの眼から光が失われています。どれだけの修羅場をくぐりぬけてきたのでしょうか……」
line = "「ああ、魔王さんの眼から光が失われています。どれだけの修羅場をくぐりぬけてきたのでしょうか……」"

[[dialogue]]
speaker = "レイラ"
# 「魔王さんのこと尊敬します。でもその境地には至れそうにないというか、至りたくないというか……」
line = "「魔王さんのこと尊敬します。でもその境地には至れそうにないというか、至りたくないというか……」"

[[dialogue]]
speaker = "unk"
# 管理職同士（？）、苦労を分かち合えればいいなと思うのであった……。
line = "管理職同士（？）、苦労を分かち合えればいいなと思うのであった……。"
