[[dialogue]]
speaker = "キリカ"
# 「フィオナお嬢様の花嫁修業は私がつけさせていただきます。たとえお嬢様といえど、教えるからには容赦しませんのでお覚悟ください」
line = "「フィオナお嬢様の花嫁修業は私がつけさせていただきます。たとえお嬢様といえど、教えるからには容赦しませんのでお覚悟ください」"

[[dialogue]]
speaker = "フィオナ"
# 「わかってるよ、キリカ。──いえ、師匠！」
line = "「わかってるよ、キリカ。──いえ、師匠！」"

[[dialogue]]
speaker = "キリカ"
# 「花嫁が修めるべき技術は多岐に渡ります。ですがここは、その中でも特に重要なものをお教えしましょう。つまり──料理です」
line = "「花嫁が修めるべき技術は多岐に渡ります。ですがここは、その中でも特に重要なものをお教えしましょう。つまり──料理です」"

[[dialogue]]
speaker = "フィオナ"
# 「はい！　よろしくお願いします！」
line = "「はい！　よろしくお願いします！」"

[[dialogue]]
speaker = "unk"
# ところで、ドレスのまま料理するの？
line = "ところで、ドレスのまま料理するの？"

[[dialogue]]
speaker = "フィオナ"
# 「いえ、その……変身を解くことはできますが、せっかくのウェディングドレスですから、着られる分には着ていたいといいますか……」
line = "「いえ、その……変身を解くことはできますが、せっかくのウェディングドレスですから、着られる分には着ていたいといいますか……」"

[[dialogue]]
speaker = "キリカ"
# 「この姿で戦闘に臨む可能性もありますから、慣れておくべきかと思いまして……」
line = "「この姿で戦闘に臨む可能性もありますから、慣れておくべきかと思いまして……」"

[[dialogue]]
speaker = "ナミエル"
# 「そ、そうです。星騎士として訓練は必要ですから」
line = "「そ、そうです。星騎士として訓練は必要ですから」"

[[dialogue]]
speaker = "トワ先生"
# 「ふふ。みんな乙女だね」
line = "「ふふ。みんな乙女だね」"

[[dialogue]]
speaker = "キリカ"
# 「ではお嬢様はこちらに。２人でキッチンに入りますので、緋宮会長は寛いでいてください」
line = "「ではお嬢様はこちらに。２人でキッチンに入りますので、緋宮会長は寛いでいてください」"

[[dialogue]]
speaker = "キリカ"
# 「早速料理の修業に参りましょう。我々メイド隊がおりますので、お嬢様の料理の経験は多くないと存じています」
line = "「早速料理の修業に参りましょう。我々メイド隊がおりますので、お嬢様の料理の経験は多くないと存じています」"

[[dialogue]]
speaker = "キリカ"
# 「ですが、だからこそ修業のし甲斐があるというものです。星見家の令嬢の身ではありますが、今は主婦になったと思って励んでください」
line = "「ですが、だからこそ修業のし甲斐があるというものです。星見家の令嬢の身ではありますが、今は主婦になったと思って励んでください」"

[[dialogue]]
speaker = "フィオナ"
# 「主婦……緋宮会長のお嫁さん……うぅ、どうしても意識しちゃう……」
line = "「主婦……緋宮会長のお嫁さん……うぅ、どうしても意識しちゃう……」"

[[dialogue]]
speaker = "キリカ"
# 「ではまず一品、作ってみましょうか」
line = "「ではまず一品、作ってみましょうか」"

[[dialogue]]
speaker = "フィオナ"
# 「じゃあ緋宮会長が好きそうなものを……肉じゃがなんてどうかな？　あ、でも肉じゃがは結構簡単そうだし、定番すぎるかも……」
line = "「じゃあ緋宮会長が好きそうなものを……肉じゃがなんてどうかな？　あ、でも肉じゃがは結構簡単そうだし、定番すぎるかも……」"

[[dialogue]]
speaker = "キリカ"
# 「料理が簡単か難しいかということは重要なことではありません。大切なのは気持ちです」
line = "「料理が簡単か難しいかということは重要なことではありません。大切なのは気持ちです」"

[[dialogue]]
speaker = "フィオナ"
# 「気持ち？　キリカなら、てっきり技術が一番って言うかと思ってた」
line = "「気持ち？　キリカなら、てっきり技術が一番って言うかと思ってた」"

[[dialogue]]
speaker = "キリカ"
# 「もちろん技術は大事です。食材も重要です。ですが……」
line = "「もちろん技術は大事です。食材も重要です。ですが……」"

[[dialogue]]
speaker = "キリカ"
# 「美味しいものを食べてほしい。たくさん食べて栄養をつけてほしい。そんな真心が技術を生かすのです」
line = "「美味しいものを食べてほしい。たくさん食べて栄養をつけてほしい。そんな真心が技術を生かすのです」"

[[dialogue]]
speaker = "キリカ"
# 「少なくとも、私はそう想ってお嬢様に料理をお作りしています」
line = "「少なくとも、私はそう想ってお嬢様に料理をお作りしています」"

[[dialogue]]
speaker = "フィオナ"
# 「キリカ……」
line = "「キリカ……」"

[[dialogue]]
speaker = "キリカ"
# 「少々語り過ぎてしまいました。気持ちの込め方は私が教えるものではありませんので、技術の面を指導いたしましょう」
line = "「少々語り過ぎてしまいました。気持ちの込め方は私が教えるものではありませんので、技術の面を指導いたしましょう」"

[[dialogue]]
speaker = "フィオナ"
# 「うん！」
line = "「うん！」"

[[dialogue]]
speaker = "キリカ"
# 「ではまずじゃがいもを洗うところからです。水に漬けながら綺麗なたわしで擦りましょう」
line = "「ではまずじゃがいもを洗うところからです。水に漬けながら綺麗なたわしで擦りましょう」"

[[dialogue]]
speaker = "フィオナ"
# 「そこからなんだ。地道だね」
line = "「そこからなんだ。地道だね」"

[[dialogue]]
speaker = "フィオナ"
# （私の気持ち……緋宮会長への……）
line = "（私の気持ち……緋宮会長への……）"

[[dialogue]]
speaker = "フィオナ"
# （緋宮会長はたくさん私のこと助けてくれて……意外と趣味が合って……その趣味のことも人には秘密にしてくれて……）
line = "（緋宮会長はたくさん私のこと助けてくれて……意外と趣味が合って……その趣味のことも人には秘密にしてくれて……）"

[[dialogue]]
speaker = "キリカ"
# 「じゃがいもの切り方は四つ切りにしたり、乱切りにしたり、好みにもよります」
line = "「じゃがいもの切り方は四つ切りにしたり、乱切りにしたり、好みにもよります」"

[[dialogue]]
speaker = "フィオナ"
# 「大きい方が食べ応えがあるかも……ああでも大きすぎると味が染みなさそうだし、考えちゃうなぁ……」
line = "「大きい方が食べ応えがあるかも……ああでも大きすぎると味が染みなさそうだし、考えちゃうなぁ……」"

[[dialogue]]
speaker = "フィオナ"
# 「だけどこうして悩むのも、食べてくれる人のことを想うってことなのかな」
line = "「だけどこうして悩むのも、食べてくれる人のことを想うってことなのかな」"

[[dialogue]]
speaker = "フィオナ"
# （緋宮会長は、<ruby=姉さん>アポロ</ruby>のことも受け止めてくれた。私の本当の想いに気付かせてくれた）
line = "（緋宮会長は、<ruby>アポロ<rt>姉さん</rt></ruby>のことも受け止めてくれた。私の本当の想いに気付かせてくれた）"

[[dialogue]]
speaker = "フィオナ"
# （緋宮会長のこと、私は……）
line = "（緋宮会長のこと、私は……）"

[[dialogue]]
speaker = "フィオナ"
# 「肉じゃが、できました！」
line = "「肉じゃが、できました！」"

[[dialogue]]
speaker = "フィオナ"
# 「キリカほどじゃないですけど……見た目はそれなりに、味も美味しくできたと思います。どうぞ」
line = "「キリカほどじゃないですけど……見た目はそれなりに、味も美味しくできたと思います。どうぞ」"

[[dialogue]]
speaker = "unk"
# いただきます
line = "いただきます"

[[dialogue]]
speaker = "フィオナ"
# 「どうですか？」
line = "「どうですか？」"

[[dialogue]]
speaker = "unk"
# おいしい！
line = "おいしい！"

[[dialogue]]
speaker = "フィオナ"
# 「！　良かったぁ……」
line = "「！　良かったぁ……」"

[[dialogue]]
speaker = "unk"
# ほっとする味だ
line = "ほっとする味だ"

[[dialogue]]
speaker = "フィオナ"
# 「そうですかね……えへへ、褒められちゃった」
line = "「そうですかね……えへへ、褒められちゃった」"

[[dialogue]]
speaker = "フィオナ"
# 「良かったらナミエルも食べてみて。トワ先生も召し上がってください」
line = "「良かったらナミエルも食べてみて。トワ先生も召し上がってください」"

[[dialogue]]
speaker = "ナミエル"
# 「では……あむ。確かに優しいお味です」
line = "「では……あむ。確かに優しいお味です」"

[[dialogue]]
speaker = "トワ先生"
# 「どれどれ……あ～ん。ん～っ、フィオナちゃん、いいお嫁さんになるよ！」
line = "「どれどれ……あ～ん。ん～っ、フィオナちゃん、いいお嫁さんになるよ！」"

[[dialogue]]
speaker = "フィオナ"
# 「恐縮です……」
line = "「恐縮です……」"

[[dialogue]]
speaker = "キリカ"
# 「私も師として試食させていただきます」
line = "「私も師として試食させていただきます」"

[[dialogue]]
speaker = "フィオナ"
# 「う……緊張する……」
line = "「う……緊張する……」"

[[dialogue]]
speaker = "キリカ"
# 「向上の余地はまだまだあります。ですがお嬢様の、緋宮会長を想う気持ちが伝わってきました」
line = "「向上の余地はまだまだあります。ですがお嬢様の、緋宮会長を想う気持ちが伝わってきました」"

[[dialogue]]
speaker = "キリカ"
# 「ですので合格とさせていただきます。緋宮会長は幸せ者ですね」
line = "「ですので合格とさせていただきます。緋宮会長は幸せ者ですね」"

[[dialogue]]
speaker = "フィオナ"
# 「やったぁ！」
line = "「やったぁ！」"

[[dialogue]]
speaker = "unk"
# （さすがに照れる……）
line = "（さすがに照れる……）"

[[dialogue]]
speaker = "キリカ"
# 「ただし、ひとまずの合格です。厨房を預かる者は、ただ美味しい料理を作るだけでなく、栄養バランスや家計のことも考えて献立を考えなくてはなりませんから」
line = "「ただし、ひとまずの合格です。厨房を預かる者は、ただ美味しい料理を作るだけでなく、栄養バランスや家計のことも考えて献立を考えなくてはなりませんから」"

[[dialogue]]
speaker = "フィオナ"
# 「確かに……良妻への道は遠いなぁ。でも、ひとつ花嫁に近づけた気がします」
line = "「確かに……良妻への道は遠いなぁ。でも、ひとつ花嫁に近づけた気がします」"
