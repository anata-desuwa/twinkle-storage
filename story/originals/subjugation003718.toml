[[dialogue]]
speaker = "unk"
# 第１８話,星々の煌き,B
line = "第１８話,星々の煌き,B"

[[dialogue]]
speaker = "ヴィーナス"
# 「とうちゃ～く！　──って！？」
line = "「とうちゃ～く！　──って！？」"

[[dialogue]]
speaker = "アナ"
# 「おお。予想を超えるどんちゃん騒ぎですね。皆さん、会長の到着前に始めてしまったようです」
line = "「おお。予想を超えるどんちゃん騒ぎですね。皆さん、会長の到着前に始めてしまったようです」"

[[dialogue]]
speaker = "サーシャ"
# 「あらあら～、うふふ♪」
line = "「あらあら～、うふふ♪」"

[[dialogue]]
speaker = "マトイ"
# 「あはは。待ちきれなかったみたいだね」
line = "「あはは。待ちきれなかったみたいだね」"

[[dialogue]]
speaker = "エステル"
# 「ま、魔王様っ。すぐにお飲み物を用意しますね……！」
line = "「ま、魔王様っ。すぐにお飲み物を用意しますね……！」"

[[dialogue]]
speaker = "クロト"
# 「大丈夫、大丈夫！　エステルはすぐに俺の世話を焼かなくて大丈夫だから……！」
line = "「大丈夫、大丈夫！　エステルはすぐに俺の世話を焼かなくて大丈夫だから……！」"

[[dialogue]]
speaker = "フィオナ"
# 「あっ……緋宮会長！　それに極星学園の皆さんも！」
line = "「あっ……緋宮会長！　それに極星学園の皆さんも！」"

[[dialogue]]
speaker = "フィオナ"
# 「すみません、開始までまだ時間があるのに、会場のどこかで乾杯が起こってしまったようで──」
line = "「すみません、開始までまだ時間があるのに、会場のどこかで乾杯が起こってしまったようで──」"

[[dialogue]]
speaker = "セーラ"
# 「連鎖してもうこの騒ぎ。ごめんねー？」
line = "「連鎖してもうこの騒ぎ。ごめんねー？」"

[[dialogue]]
speaker = "クロト"
# 「いや、ちょうどいいよ。始まりの挨拶なんて堅苦しいし……このまま皆には楽しんでもらおう」
line = "「いや、ちょうどいいよ。始まりの挨拶なんて堅苦しいし……このまま皆には楽しんでもらおう」"

[[dialogue]]
speaker = "ルリエル"
# 「極星学園の皆さん！　ようこそなのです、飲み物をどうぞっ♪」
line = "「極星学園の皆さん！　ようこそなのです、飲み物をどうぞっ♪」"

[[dialogue]]
speaker = "グレイス"
# 「ルリエルさん、ありがとうございます！　おおぉっ……会場中に、美味しそうな食べ物がたくさん……！！」
line = "「ルリエルさん、ありがとうございます！　おおぉっ……会場中に、美味しそうな食べ物がたくさん……！！」"

[[dialogue]]
speaker = "ルリエル"
# 「給食委員会さんが総出で作ってくれたのです～！　今日は思いっきり楽しんでいってください！」
line = "「給食委員会さんが総出で作ってくれたのです～！　今日は思いっきり楽しんでいってください！」"

[[dialogue]]
speaker = "グレイス"
# 「どこから回りましょうか……どれもこれもおいしそうで迷ってしまいますね！」
line = "「どこから回りましょうか……どれもこれもおいしそうで迷ってしまいますね！」"

[[dialogue]]
speaker = "ルリエル"
# 「ふっふっふ！　ではルリエルがご案内しましょう！　お料理もスイーツも、下調べはバッチリなのです！」
line = "「ふっふっふ！　ではルリエルがご案内しましょう！　お料理もスイーツも、下調べはバッチリなのです！」"

[[dialogue]]
speaker = "グレイス"
# 「本当ですか！？　嬉しいですっ！　そうだ、マトイさんも！　私と一緒に行きましょう！！」
line = "「本当ですか！？　嬉しいですっ！　そうだ、マトイさんも！　私と一緒に行きましょう！！」"

[[dialogue]]
speaker = "マトイ"
# 「え、私も？　──わあぁああっ！？」
line = "「え、私も？　──わあぁああっ！？」"

[[dialogue]]
speaker = "ユウリ"
# 「うお。あっという間に見えなくなったな」
line = "「うお。あっという間に見えなくなったな」"

[[dialogue]]
speaker = "ソフィア"
# 「うちのルリがすみません……騒がしくしちゃって」
line = "「うちのルリがすみません……騒がしくしちゃって」"

[[dialogue]]
speaker = "レティシア"
# 「問題ないわ。でも──会場が広くって迷子になりそうね。流星学園の人達と交流もしてみたかったし……」
line = "「問題ないわ。でも──会場が広くって迷子になりそうね。流星学園の人達と交流もしてみたかったし……」"

[[dialogue]]
speaker = "チナ"
# 「ああ！　せっかくだし案内してもらえるか？　そんで、そっちの学園のこともたくさん教えてくれよ！」
line = "「ああ！　せっかくだし案内してもらえるか？　そんで、そっちの学園のこともたくさん教えてくれよ！」"

[[dialogue]]
speaker = "ユウリ"
# 「おう、いいぜ！」
line = "「おう、いいぜ！」"

[[dialogue]]
speaker = "ソフィア"
# 「じゃあ行きましょうか、チナさん、レティシアさん！」
line = "「じゃあ行きましょうか、チナさん、レティシアさん！」"

[[dialogue]]
speaker = "レティシア"
# 「ええ。サーシャ、貴女もどう？」
line = "「ええ。サーシャ、貴女もどう？」"

[[dialogue]]
speaker = "サーシャ"
# 「うふふ♪　それじゃあご一緒させてもらうわ～♪」
line = "「うふふ♪　それじゃあご一緒させてもらうわ～♪」"

[[dialogue]]
speaker = "チナ"
# 「アナも行こうぜ、ジッとしててもつまらないぞ！」
line = "「アナも行こうぜ、ジッとしててもつまらないぞ！」"

[[dialogue]]
speaker = "アナ"
# 「ラジャー。では会長、また後で合流しましょう」
line = "「ラジャー。では会長、また後で合流しましょう」"

[[dialogue]]
speaker = "クロト"
# 「ああ。楽しんで来てくれ」
line = "「ああ。楽しんで来てくれ」"

[[dialogue]]
speaker = "梨緒"
# 「──ベアト！　しばらくぶりだな！」
line = "「──ベアト！　しばらくぶりだな！」"

[[dialogue]]
speaker = "ベアトリス"
# 「梨緒ちゃん！　お邪魔してます！」
line = "「梨緒ちゃん！　お邪魔してます！」"

[[dialogue]]
speaker = "梨緒"
# 「『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』との決着の後、君はデネブに帰っていたからな……今日、会えるのを楽しみにしていたんだ」
line = "「『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』との決着の後、君はデネブに帰っていたからな……今日、会えるのを楽しみにしていたんだ」"

[[dialogue]]
speaker = "ベアトリス"
# 「私もだよ、梨緒ちゃん。それに──選管の皆も！」
line = "「私もだよ、梨緒ちゃん。それに──選管の皆も！」"

[[dialogue]]
speaker = "ナターシャ"
# 「おひさ～──って。ベアト、わざわざこっちの制服を着てるんだ？」
line = "「おひさ～──って。ベアト、わざわざこっちの制服を着てるんだ？」"

[[dialogue]]
speaker = "ベアトリス"
# 「うん！　せっかくのアルタイル訪問だし。こっちの方がしっくりくるからね！」
line = "「うん！　せっかくのアルタイル訪問だし。こっちの方がしっくりくるからね！」"

[[dialogue]]
speaker = "アポロ"
# 「選管メンバー、再集合だな！　今日は思いっきり楽しむぞ、ベアト！」
line = "「選管メンバー、再集合だな！　今日は思いっきり楽しむぞ、ベアト！」"

[[dialogue]]
speaker = "ジグ"
# 「良い情報をあげよう。アガサときたら、さっきから会場中のニンニク料理の場所ばかりチェックしていてね？」
line = "「良い情報をあげよう。アガサときたら、さっきから会場中のニンニク料理の場所ばかりチェックしていてね？」"

[[dialogue]]
speaker = "梨緒"
# 「なっ──ジグ！？」
line = "「なっ──ジグ！？」"

[[dialogue]]
speaker = "ジグ"
# 「よほど君をもてなしたかったと見える。いつになくはしゃいでいて、面白かったよ」
line = "「よほど君をもてなしたかったと見える。いつになくはしゃいでいて、面白かったよ」"

[[dialogue]]
speaker = "ベアトリス"
# 「梨緒ちゃん、そうなの！？　嬉しいっ！」
line = "「梨緒ちゃん、そうなの！？　嬉しいっ！」"

[[dialogue]]
speaker = "梨緒"
# 「ゆ、友人との再会なんだ、好物でもてなすのは当然だろう……何だジグ、その目は！」
line = "「ゆ、友人との再会なんだ、好物でもてなすのは当然だろう……何だジグ、その目は！」"

[[dialogue]]
speaker = "ジグ"
# 「別に？　アガサは単純で可愛いなって思っただけさ」
line = "「別に？　アガサは単純で可愛いなって思っただけさ」"

[[dialogue]]
speaker = "梨緒"
# 「こいつっ……！」
line = "「こいつっ……！」"

[[dialogue]]
speaker = "ベアトリス"
# 「……よかったぁ、梨緒ちゃんに、そんなに楽しみにしてもらえて」
line = "「……よかったぁ、梨緒ちゃんに、そんなに楽しみにしてもらえて」"

[[dialogue]]
speaker = "梨緒"
# 「……？　何言ってるんだ、ベアト」
line = "「……？　何言ってるんだ、ベアト」"

[[dialogue]]
speaker = "ベアトリス"
# 「だって私、デネブの星騎士だから……基本は向こうで暮らすことになるわけだし……」
line = "「だって私、デネブの星騎士だから……基本は向こうで暮らすことになるわけだし……」"

[[dialogue]]
speaker = "ベアトリス"
# 「会えない時間が増えていったら、距離が開いちゃうかも～って……」
line = "「会えない時間が増えていったら、距離が開いちゃうかも～って……」"

[[dialogue]]
speaker = "梨緒"
# 「馬鹿を言うな！　ベアトは、選管の大切なメンバーだ。君の席はいつだって空けてある」
line = "「馬鹿を言うな！　ベアトは、選管の大切なメンバーだ。君の席はいつだって空けてある」"

[[dialogue]]
speaker = "梨緒"
# 「新しい転送装置による世界間移動は、ようやく安定したと聞いている。これからアルタイルとデネブは、密に連絡を取り合うことになるだろう」
line = "「新しい転送装置による世界間移動は、ようやく安定したと聞いている。これからアルタイルとデネブは、密に連絡を取り合うことになるだろう」"

[[dialogue]]
speaker = "アポロ"
# 「そうだぞ！　合同訓練とか、合宿とか、色々できるさ！」
line = "「そうだぞ！　合同訓練とか、合宿とか、色々できるさ！」"

[[dialogue]]
speaker = "梨緒"
# 「準備さえすればいつでも会える。私たちがよそよそしくなるだなんて、あり得ないな」
line = "「準備さえすればいつでも会える。私たちがよそよそしくなるだなんて、あり得ないな」"

[[dialogue]]
speaker = "梨緒"
# 「アルタイルは、ベアトの第二の故郷だ。いつでも訪ねてくれていいし……」
line = "「アルタイルは、ベアトの第二の故郷だ。いつでも訪ねてくれていいし……」"

[[dialogue]]
speaker = "ナターシャ"
# 「私たちがデネブに行くんだったら、もっと簡単に会えるでしょ？　同一存在と同時にくぐらなくていいわけだからねー」
line = "「私たちがデネブに行くんだったら、もっと簡単に会えるでしょ？　同一存在と同時にくぐらなくていいわけだからねー」"

[[dialogue]]
speaker = "ベアトリス"
# 「み……みんなぁっ……！！」
line = "「み……みんなぁっ……！！」"

[[dialogue]]
speaker = "梨緒"
# 「さ、行こうベアト。めでたい席だ、涙は似合わないぞ」
line = "「さ、行こうベアト。めでたい席だ、涙は似合わないぞ」"

[[dialogue]]
speaker = "ベアトリス"
# 「──うん！！」
line = "「──うん！！」"

[[dialogue]]
speaker = "アポロ"
# 「悪いなルヴィネ、ベアトを借りていくぞっ！」
line = "「悪いなルヴィネ、ベアトを借りていくぞっ！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「ええ。行ってらっしゃい、ベアト」
line = "「ええ。行ってらっしゃい、ベアト」"

[[dialogue]]
speaker = "ベアトリス"
# 「ありがとうルヴィ！　また後でね！」
line = "「ありがとうルヴィ！　また後でね！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「…………とても賑やかね、魔王」
line = "「…………とても賑やかね、魔王」"

[[dialogue]]
speaker = "クロト"
# 「ああ、平和だな──」
line = "「ああ、平和だな──」"

[[dialogue]]
speaker = "unk"
# ──会場中で騒いでいる皆を見ると、思わず笑みがこぼれてしまう。
line = "──会場中で騒いでいる皆を見ると、思わず笑みがこぼれてしまう。"

[[dialogue]]
speaker = "unk"
# 共に『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』の脅威を退けた仲間たち。
line = "共に『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』の脅威を退けた仲間たち。"

[[dialogue]]
speaker = "unk"
# 人間も天使も魔族も隔てなく──
line = "人間も天使も魔族も隔てなく──"

[[dialogue]]
speaker = "unk"
# 食べて、飲んで、騒いでいる──
line = "食べて、飲んで、騒いでいる──"

[[dialogue]]
speaker = "ルヴィネ"
# 「これが……魔王が守りたかった景色」
line = "「これが……魔王が守りたかった景色」"

[[dialogue]]
speaker = "ルヴィネ"
# 「そしてかつての私が、壊そうとしていたものなのね……」
line = "「そしてかつての私が、壊そうとしていたものなのね……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……魔王。改めて、謝らせて頂戴」
line = "「……魔王。改めて、謝らせて頂戴」"

[[dialogue]]
speaker = "クロト"
# 「──謝る？」
line = "「──謝る？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……１０年前。デネブの貴方を、私は貶めたわ」
line = "「……１０年前。デネブの貴方を、私は貶めたわ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「効率的だからって、合理的だからって……英雄であった貴方の名誉を、私は傷つけた……」
line = "「効率的だからって、合理的だからって……英雄であった貴方の名誉を、私は傷つけた……」"

[[dialogue]]
speaker = "クロト"
# 「なんだ、そんなの──」
line = "「なんだ、そんなの──」"

[[dialogue]]
speaker = "ルヴィネ"
# 「そんなの、ではないでしょう。貴方自身のことなのだから」
line = "「そんなの、ではないでしょう。貴方自身のことなのだから」"

[[dialogue]]
speaker = "unk"
# まだヒトとしての心を持っていなかった頃のルヴィネが、『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』に命じられるままに行ったことだ。
line = "まだヒトとしての心を持っていなかった頃のルヴィネが、『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』に命じられるままに行ったことだ。"

[[dialogue]]
speaker = "unk"
# 当人である俺は気にしていないんだが──
line = "当人である俺は気にしていないんだが──"

[[dialogue]]
speaker = "クロト"
# 「……うーん。だったら、エステルに決めてもらおうか」
line = "「……うーん。だったら、エステルに決めてもらおうか」"

[[dialogue]]
speaker = "エステル"
# 「えっ……？　わ、私ですかっ？」
line = "「えっ……？　わ、私ですかっ？」"

[[dialogue]]
speaker = "クロト"
# 「うん。エステルがルヴィネを許すなら──もうそれでいいかなって俺は思うんだ。どうかな？」
line = "「うん。エステルがルヴィネを許すなら──もうそれでいいかなって俺は思うんだ。どうかな？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "エステル"
# 「……め、女神様の教えに、このようなものがあります」
line = "「……め、女神様の教えに、このようなものがあります」"

[[dialogue]]
speaker = "エステル"
# 「ヒトは生きていると、必ず過ちも犯すもの。ならば大切なのは、その過ちに気づき、反省し……前を向いて生きていけるかどうかである、と」
line = "「ヒトは生きていると、必ず過ちも犯すもの。ならば大切なのは、その過ちに気づき、反省し……前を向いて生きていけるかどうかである、と」"

[[dialogue]]
speaker = "エステル"
# 「私も──同じ考えです。それに、デネブでの魔王様の名誉回復も、行われています」
line = "「私も──同じ考えです。それに、デネブでの魔王様の名誉回復も、行われています」"

[[dialogue]]
speaker = "unk"
# 話によると──エステルとグレイスによって──かなり積極的に『デネブの緋宮クロト』の最期は喧伝されているらしい。
line = "話によると──エステルとグレイスによって──かなり積極的に『デネブの緋宮クロト』の最期は喧伝されているらしい。"

[[dialogue]]
speaker = "unk"
# プラン・ジャスティスウィザードによって、デネブの『俺』の最期は伝えられてこそいたが……
line = "プラン・ジャスティスウィザードによって、デネブの『俺』の最期は伝えられてこそいたが……"

[[dialogue]]
speaker = "unk"
# それでも十分とは言えないと、エステルたちは繰り返し、デネブの『俺』のことを話してくれているのだった。
line = "それでも十分とは言えないと、エステルたちは繰り返し、デネブの『俺』のことを話してくれているのだった。"

[[dialogue]]
speaker = "ルヴィネ"
# 「その……デネブ市民に対しては、レティシアがとっさについた嘘のまま……『私も騙されていた』ということになっていて、とても居心地が悪いのだけれど……」
line = "「その……デネブ市民に対しては、レティシアがとっさについた嘘のまま……『私も騙されていた』ということになっていて、とても居心地が悪いのだけれど……」"

[[dialogue]]
speaker = "エステル"
# 「ふふっ。それについては、罰だと思って受けいれてください」
line = "「ふふっ。それについては、罰だと思って受けいれてください」"

[[dialogue]]
speaker = "ルヴィネ"
# 「私、嘘についてはちょっとしたトラウマが……いえ、だからこそ贖罪になる、ということかしら……」
line = "「私、嘘についてはちょっとしたトラウマが……いえ、だからこそ贖罪になる、ということかしら……」"

[[dialogue]]
speaker = "クロト"
# 「これに関しては、そういうことにしておこう。今更、昔のルヴィネが『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』の傀儡だった、なんて話、誰も聞きたくないだろうからな」
line = "「これに関しては、そういうことにしておこう。今更、昔のルヴィネが『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』の傀儡だった、なんて話、誰も聞きたくないだろうからな」"

[[dialogue]]
speaker = "ルヴィネ"
# 「それもそうね……わかったわ。魔王への謝意の証として、この嘘は胸に秘めると誓うわ」
line = "「それもそうね……わかったわ。魔王への謝意の証として、この嘘は胸に秘めると誓うわ」"

[[dialogue]]
speaker = "クロト"
# 「それじゃあ……どうかな、エステル？」
line = "「それじゃあ……どうかな、エステル？」"

[[dialogue]]
speaker = "エステル"
# 「はい。ルヴィネ会長のお気持ちも聞くことが出来ました。もう、何も気にしていません」
line = "「はい。ルヴィネ会長のお気持ちも聞くことが出来ました。もう、何も気にしていません」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……エステル」
line = "「……エステル」"

[[dialogue]]
speaker = "エステル"
# 「ルヴィネ会長は間違いなく……人々を愛する女神様になられる御方だと信じています、私」
line = "「ルヴィネ会長は間違いなく……人々を愛する女神様になられる御方だと信じています、私」"

[[dialogue]]
speaker = "ルヴィネ"
# 「────ありがとう」
line = "「────ありがとう」"

[[dialogue]]
speaker = "エステル"
# 「はい。せっかくのパーティーですし……みなさんで乾杯しましょう！　ちょっと待っていてくださいね！」
line = "「はい。せっかくのパーティーですし……みなさんで乾杯しましょう！　ちょっと待っていてくださいね！」"

[[dialogue]]
speaker = "クロト"
# 「……ってわけだ。もう気にしなくていいよ、ルヴィネ」
line = "「……ってわけだ。もう気にしなくていいよ、ルヴィネ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「レティシアから聞いていたし、私自身もそう思っていたけれど──貴方って本当にお人好しね」
line = "「レティシアから聞いていたし、私自身もそう思っていたけれど──貴方って本当にお人好しね」"

[[dialogue]]
speaker = "ルヴィネ"
# 「私は、憎まれて当たり前だと思うのだけど……」
line = "「私は、憎まれて当たり前だと思うのだけど……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふっふーん！　クロトはそんなちっちゃい魔王じゃないってことよ！」
line = "「ふっふーん！　クロトはそんなちっちゃい魔王じゃないってことよ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それよりルヴィネ！　あなたが気にするべきは、ママの仕事をちゃんと引き継げるのか～ってところだと思うわ！」
line = "「それよりルヴィネ！　あなたが気にするべきは、ママの仕事をちゃんと引き継げるのか～ってところだと思うわ！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……ええ、そうね。貴女の言う通りだわ」
line = "「……ええ、そうね。貴女の言う通りだわ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「次代の女神として……どこまでテルルの代わりになれるか、わからないけれど──」
line = "「次代の女神として……どこまでテルルの代わりになれるか、わからないけれど──」"

[[dialogue]]
speaker = "ルヴィネ"
# 「──いいえ。代わるんじゃない。受け継いで、テルルよりも立派な女神を目指さなくちゃいけないわね」
line = "「──いいえ。代わるんじゃない。受け継いで、テルルよりも立派な女神を目指さなくちゃいけないわね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ママの壁は高いわよ！　でも、その意気や良しってやつね♪」
line = "「ママの壁は高いわよ！　でも、その意気や良しってやつね♪」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……これからたくさんのことを学んで、己の糧にして」
line = "「……これからたくさんのことを学んで、己の糧にして」"

[[dialogue]]
speaker = "ルヴィネ"
# 「<ruby=姉さん>テルル</ruby>のように、生きとし生ける者すべてに愛を注げるような、そんな女神に、きっとなってみせるわ」
line = "「<ruby>テルル<rt>姉さん</rt></ruby>のように、生きとし生ける者すべてに愛を注げるような、そんな女神に、きっとなってみせるわ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「不安はあるけど、きっと大丈夫──だって、貴方たちのおかげで、私は愛を知ることができたから」
line = "「不安はあるけど、きっと大丈夫──だって、貴方たちのおかげで、私は愛を知ることができたから」"

[[dialogue]]
speaker = "ルヴィネ"
# 「私が、大好きな幼なじみと『今』を過ごせているのは──全部、貴方達のおかげよ」
line = "「私が、大好きな幼なじみと『今』を過ごせているのは──全部、貴方達のおかげよ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「だから本当に──ありがとう」
line = "「だから本当に──ありがとう」"

[[dialogue]]
speaker = "unk"
# ルヴィネは優しく、だけどどこか力強く──微笑みながらそう言うのだった。
line = "ルヴィネは優しく、だけどどこか力強く──微笑みながらそう言うのだった。"

[[dialogue]]
speaker = "ルヴィネ"
# 「魔王。それに……九浄ヴィーナス。これからも、貴方たちの力をたくさん借りることになると思う……」
line = "「魔王。それに……九浄ヴィーナス。これからも、貴方たちの力をたくさん借りることになると思う……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「もしもの時は──手伝ってくれるかしら？」
line = "「もしもの時は──手伝ってくれるかしら？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「もっちろん！　ママが託してくれた世界は、みんなで守らなきゃ！　そうでしょ、クロト！」
line = "「もっちろん！　ママが託してくれた世界は、みんなで守らなきゃ！　そうでしょ、クロト！」"

[[dialogue]]
speaker = "クロト"
# 「ああ。俺もヴィーナスも……そしてルヴィネ。君も同じだ」
line = "「ああ。俺もヴィーナスも……そしてルヴィネ。君も同じだ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「同じ……？」
line = "「同じ……？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「その通りよ♪　私たちの前では、どんな不幸も絶望も、尻尾巻いて逃げ出すしかないんだから！」
line = "「その通りよ♪　私たちの前では、どんな不幸も絶望も、尻尾巻いて逃げ出すしかないんだから！」"

[[dialogue]]
speaker = "unk"
# そう言って、ヴィーナスは天穹を示すかのように、ビッと人差し指を掲げた。
line = "そう言って、ヴィーナスは天穹を示すかのように、ビッと人差し指を掲げた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「だって私たちは、この世界を守る星々の輝き──」
line = "「だって私たちは、この世界を守る星々の輝き──」"

[[dialogue]]
speaker = "ヴィーナス"
# 「『ティンクルスターナイツ』なんだもの！」
line = "「『ティンクルスターナイツ』なんだもの！」"
