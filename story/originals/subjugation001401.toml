[[dialogue]]
speaker = "ルリエル"
# 「すっずし～いっ！　すっごく動きやすいのですぅ～！」
line = "「すっずし～いっ！　すっごく動きやすいのですぅ～！」"

[[dialogue]]
speaker = "イクシリオン"
# 「弾ける水滴……照りつける太陽……眩しい素肌……っっ……」
line = "「弾ける水滴……照りつける太陽……眩しい素肌……っっ……」"

[[dialogue]]
speaker = "unk"
# ２人とも、遊びに来たわけじゃないからね
line = "２人とも、遊びに来たわけじゃないからね"

[[dialogue]]
speaker = "ルリエル"
# 「わかってますよぉ～！　ヘレナさんのためにも、わたし自身の実力コージョーのためにも頑張ります！」
line = "「わかってますよぉ～！　ヘレナさんのためにも、わたし自身の実力コージョーのためにも頑張ります！」"

[[dialogue]]
speaker = "イクシリオン"
# 「新たな力を使いこなせるようになれば、誰かを救う術も増えますからね。私も精一杯、努力させていただきますっ」
line = "「新たな力を使いこなせるようになれば、誰かを救う術も増えますからね。私も精一杯、努力させていただきますっ」"

[[dialogue]]
speaker = "unk"
# ルリエルとイクシリオンが力強く頷き返す。
line = "ルリエルとイクシリオンが力強く頷き返す。"

[[dialogue]]
speaker = "unk"
# 事の始まりは──ヘレナさんの呼びかけだった。
line = "事の始まりは──ヘレナさんの呼びかけだった。"

[[dialogue]]
speaker = "フィオナ"
# 「人工戦闘服のテスター募集……ですか」
line = "「人工戦闘服のテスター募集……ですか」"

[[dialogue]]
speaker = "ヘレナ"
# 「うむ。諸君らに集まってもらったのはそのためだ」
line = "「うむ。諸君らに集まってもらったのはそのためだ」"

[[dialogue]]
speaker = "ヘレナ"
# 「噂には聞いているかもしれんが、現在、九浄家では人工戦闘服の開発を進めていてな。その試作品の被験者を流星・新星両校の生徒たちから１名ずつ募りたい」
line = "「噂には聞いているかもしれんが、現在、九浄家では人工戦闘服の開発を進めていてな。その試作品の被験者を流星・新星両校の生徒たちから１名ずつ募りたい」"

[[dialogue]]
speaker = "ヘレナ"
# 「個人で戦闘服を調整できる者もいるが、それは少数だ。しかしこの人工戦闘服を使えば、それができない者も気軽にフォームチェンジできる。戦術の幅も広がるだろう」
line = "「個人で戦闘服を調整できる者もいるが、それは少数だ。しかしこの人工戦闘服を使えば、それができない者も気軽にフォームチェンジできる。戦術の幅も広がるだろう」"

[[dialogue]]
speaker = "ヘレナ"
# 「何より装いを新たにすると気分がいい。身に付けるものひとつで世界の見え方も気分も変わるからな。潜在能力を引き出せるというものだ」
line = "「何より装いを新たにすると気分がいい。身に付けるものひとつで世界の見え方も気分も変わるからな。潜在能力を引き出せるというものだ」"

[[dialogue]]
speaker = "ヘレナ"
# 「今回は水着をベースにした戦闘服だ。先日ネビュラで運用したデータをもらってな。そのフィードバックも兼ねてというわけだ」
line = "「今回は水着をベースにした戦闘服だ。先日ネビュラで運用したデータをもらってな。そのフィードバックも兼ねてというわけだ」"

[[dialogue]]
speaker = "ルリエル"
# 「水着──水着ですか！　はいはい！　でしたら流星学園からは、わたしが立候補します！」
line = "「水着──水着ですか！　はいはい！　でしたら流星学園からは、わたしが立候補します！」"

[[dialogue]]
speaker = "ヘレナ"
# 「ほう……自ら名乗り出るとは感心だな。その積極的な態度は好ましいぞ」
line = "「ほう……自ら名乗り出るとは感心だな。その積極的な態度は好ましいぞ」"

[[dialogue]]
speaker = "セーラ"
# 「ちょい待った。ルリちーって泳げないんじゃなかったっけ？」
line = "「ちょい待った。ルリちーって泳げないんじゃなかったっけ？」"

[[dialogue]]
speaker = "ユウリ"
# 「無理に星徒会から立候補者を出す必要はないんだぞ？　他にもテスターになりたいやつはいるだろーし」
line = "「無理に星徒会から立候補者を出す必要はないんだぞ？　他にもテスターになりたいやつはいるだろーし」"

[[dialogue]]
speaker = "ルリエル"
# 「無理なんかしてませんよぉ。わたし、ずっと涼しい戦闘服が欲しかったんです！　星徒会メンバーでわたしだけですもん、夏用の戦闘服がないの！」
line = "「無理なんかしてませんよぉ。わたし、ずっと涼しい戦闘服が欲しかったんです！　星徒会メンバーでわたしだけですもん、夏用の戦闘服がないの！」"

[[dialogue]]
speaker = "ルリエル"
# 「フィオナ会長は既に水着フォームがありますし、セーラ先輩とユウリ先輩にはバニーがあるじゃないですか！　ソフィアは素の戦闘服の時点で、おへそも背中も丸出しですし！」
line = "「フィオナ会長は既に水着フォームがありますし、セーラ先輩とユウリ先輩にはバニーがあるじゃないですか！　ソフィアは素の戦闘服の時点で、おへそも背中も丸出しですし！」"

[[dialogue]]
speaker = "フィオナ"
# 「別に夏用の戦闘服として水着フォームを会得したわけじゃないけど……。確かにルリエルの戦闘服は厚手な方だもんね」
line = "「別に夏用の戦闘服として水着フォームを会得したわけじゃないけど……。確かにルリエルの戦闘服は厚手な方だもんね」"

[[dialogue]]
speaker = "ソフィア"
# 「というかルリ。人を露出狂みたいに言わないで。フィギュアの衣装は華やかなだけ」
line = "「というかルリ。人を露出狂みたいに言わないで。フィギュアの衣装は華やかなだけ」"

[[dialogue]]
speaker = "ルリエル"
# 「夏場でも涼しいのは事実じゃないですか！　わたしなんて、戦う度に汗びっしょびしょ、全身蒸れっ蒸れのサウナ状態なんですから！」
line = "「夏場でも涼しいのは事実じゃないですか！　わたしなんて、戦う度に汗びっしょびしょ、全身蒸れっ蒸れのサウナ状態なんですから！」"

[[dialogue]]
speaker = "ルリエル"
# 「なのでお願いです、ヘレナさん……！　どうかわたしにテスターをやらせてください！」
line = "「なのでお願いです、ヘレナさん……！　どうかわたしにテスターをやらせてください！」"

[[dialogue]]
speaker = "ヘレナ"
# 「理由はどうあれ貪欲に望みを叶えようとする気概は嫌いではない。では流星学園のテスターは貴殿に任せよう」
line = "「理由はどうあれ貪欲に望みを叶えようとする気概は嫌いではない。では流星学園のテスターは貴殿に任せよう」"

[[dialogue]]
speaker = "ルリエル"
# 「えっ！？　ホントにいいんですか！？　わーい、言ってみるものですね！」
line = "「えっ！？　ホントにいいんですか！？　わーい、言ってみるものですね！」"

[[dialogue]]
speaker = "ヘレナ"
# 「新星学園側はどうだ？　チャンスとは自ら掴みに行くものだぞ？」
line = "「新星学園側はどうだ？　チャンスとは自ら掴みに行くものだぞ？」"

[[dialogue]]
speaker = "イクシリオン"
# 「で──でしたら是非、私に！」
line = "「で──でしたら是非、私に！」"

[[dialogue]]
speaker = "フロレンシア"
# 「珍しいですね。イクシーさんが前のめりに挙手されるなんて」
line = "「珍しいですね。イクシーさんが前のめりに挙手されるなんて」"

[[dialogue]]
speaker = "イクシリオン"
# 「だって水着ですよっ？　合法的に下着同然で歩ける魔法の衣装じゃありませんか……！」
line = "「だって水着ですよっ？　合法的に下着同然で歩ける魔法の衣装じゃありませんか……！」"

[[dialogue]]
speaker = "フロレンシア"
# 「へ……？」
line = "「へ……？」"

[[dialogue]]
speaker = "unk"
# イクシー、流石にその理由は……
line = "イクシー、流石にその理由は……"

[[dialogue]]
speaker = "イクシリオン"
# 「ハっ！　じょ、冗談ですよ冗談。保健委員たる者、あらゆる場所での活動を想定せねばいけませんからね……！」
line = "「ハっ！　じょ、冗談ですよ冗談。保健委員たる者、あらゆる場所での活動を想定せねばいけませんからね……！」"

[[dialogue]]
speaker = "イクシリオン"
# 「水着の戦闘服があれば、水難救助の際に役立つはずです。ライフセーバーですよ、ライフセーバー！」
line = "「水着の戦闘服があれば、水難救助の際に役立つはずです。ライフセーバーですよ、ライフセーバー！」"

[[dialogue]]
speaker = "フロレンシア"
# 「なるほど──流石はイクシーさんです、保健委員の鑑ですね！　でも、それなら治療の星術が得意な私が被験者になった方が──」
line = "「なるほど──流石はイクシーさんです、保健委員の鑑ですね！　でも、それなら治療の星術が得意な私が被験者になった方が──」"

[[dialogue]]
speaker = "イクシリオン"
# 「い、いえっ！　水難救助は特に体力が必要になる仕事！　これは私の担当ですよ！」
line = "「い、いえっ！　水難救助は特に体力が必要になる仕事！　これは私の担当ですよ！」"

[[dialogue]]
speaker = "フロレンシア"
# 「そ、そうですか。イクシーさんがそこまで仰るなら……」
line = "「そ、そうですか。イクシーさんがそこまで仰るなら……」"

[[dialogue]]
speaker = "ヘレナ"
# 「ふむ。他の生徒たちにも異論はないようだな。それでは２人に頼むとしよう」
line = "「ふむ。他の生徒たちにも異論はないようだな。それでは２人に頼むとしよう」"

[[dialogue]]
speaker = "ヘレナ"
# 「最初に言った通り、この人工戦闘服はまだ試作段階だ。力を使いこなせるようになるには訓練が必要になる」
line = "「最初に言った通り、この人工戦闘服はまだ試作段階だ。力を使いこなせるようになるには訓練が必要になる」"

[[dialogue]]
speaker = "ヘレナ"
# 「訓練場所には九浄家が経営する海水浴場を使ってくれ。ちょうど海開きをしたところでな。特訓ついでにビーチの警備も頼みたい」
line = "「訓練場所には九浄家が経営する海水浴場を使ってくれ。ちょうど海開きをしたところでな。特訓ついでにビーチの警備も頼みたい」"

[[dialogue]]
speaker = "ルリエル"
# 「海！？　海に行けるんですかっ！？　『ＹＡＫＩＳＯＢＡ』とか『ＫＡＫＩＧＯＲＩ』とかで有名なあの海にっ！？」
line = "「海！？　海に行けるんですかっ！？　『ＹＡＫＩＳＯＢＡ』とか『ＫＡＫＩＧＯＲＩ』とかで有名なあの海にっ！？」"

[[dialogue]]
speaker = "イクシリオン"
# 「ビーチで……特訓……。岩場の影でこっそり……」
line = "「ビーチで……特訓……。岩場の影でこっそり……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……なんだか２人とも様子がおかしいけれど」
line = "「……なんだか２人とも様子がおかしいけれど」"

[[dialogue]]
speaker = "フィオナ"
# 「あくまで訓練だからね……？　わかってる……？」
line = "「あくまで訓練だからね……？　わかってる……？」"

[[dialogue]]
speaker = "unk"
# 俺もついて行こうか？
line = "俺もついて行こうか？"

[[dialogue]]
speaker = "ヘレナ"
# 「元よりそのつもりだ。訓練中の星騎士２人にビーチの警備を丸ごと任せるわけにもいくまい。警備監督兼、訓練教官は必須だろう」
line = "「元よりそのつもりだ。訓練中の星騎士２人にビーチの警備を丸ごと任せるわけにもいくまい。警備監督兼、訓練教官は必須だろう」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ま、クロトなら２人と仲も良いしね。適任じゃないかしら」
line = "「ま、クロトなら２人と仲も良いしね。適任じゃないかしら」"

[[dialogue]]
speaker = "フィオナ"
# 「ルリエルのこと、お願いしますね。少し手がかかるかもしれませんけど……」
line = "「ルリエルのこと、お願いしますね。少し手がかかるかもしれませんけど……」"

[[dialogue]]
speaker = "ルリエル"
# 「ふふん、心配ありません！　ルリエル、やる気モリモリ、バーベキューなのです！」
line = "「ふふん、心配ありません！　ルリエル、やる気モリモリ、バーベキューなのです！」"

[[dialogue]]
speaker = "イクシリオン"
# 「私もかつてないほど身体が火照ってます……！　はぁはぁ……エネルギー全開です……！　会長と一緒だと聞いて尚更、んっ……！」
line = "「私もかつてないほど身体が火照ってます……！　はぁはぁ……エネルギー全開です……！　会長と一緒だと聞いて尚更、んっ……！」"

[[dialogue]]
speaker = "unk"
# ……それじゃよろしくな？
line = "……それじゃよろしくな？"

[[dialogue]]
speaker = "２人"
# 「はい！」
line = "「はい！」"

[[dialogue]]
speaker = "unk"
# ２人とも優秀な星騎士だから、水着戦闘服もきっと使いこなしてくれるはず。
line = "２人とも優秀な星騎士だから、水着戦闘服もきっと使いこなしてくれるはず。"

[[dialogue]]
speaker = "unk"
# そう思うものの、一抹の不安が拭えないのだった──
line = "そう思うものの、一抹の不安が拭えないのだった──"
