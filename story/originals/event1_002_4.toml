# 「それ褒めてる！？」
line = "「それ褒めてる！？」"

[[dialogue]]
speaker = "リップル"
# 「ワタシはマトイのことスキですよ！　その証拠にハグして、キスしちゃいま～す♪」
line = "「ワタシはマトイのことスキですよ！　その証拠にハグして、キスしちゃいま～す♪」"

[[dialogue]]
speaker = "リップル"
# 「ちゅっ<emoji=heart04>」
line = "「ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
# 「きゃっ！？　私も本当に頬っぺたにキスされた！？　リップル、ひょっとして割と見境ない！？」
line = "「きゃっ！？　私も本当に頬っぺたにキスされた！？　リップル、ひょっとして割と見境ない！？」"

[[dialogue]]
speaker = "リップル"
# 「ソンナことありません！　カイチョーもマトイも、ここに居る皆も、一緒に居るとハッピーな気持ちになって、同じくらいダイスキになっちゃったダケで～す♪」
line = "「ソンナことありません！　カイチョーもマトイも、ここに居る皆も、一緒に居るとハッピーな気持ちになって、同じくらいダイスキになっちゃったダケで～す♪」"

[[dialogue]]
speaker = "リップル"
# 「だからダイジョーブ、マトイが会長スキでも、ワタシは全然気にしません！」
line = "「だからダイジョーブ、マトイが会長スキでも、ワタシは全然気にしません！」"

[[dialogue]]
speaker = "マトイ"
# 「ちょっと待って、勘違いしてるから！　わ、私は別に、そういうのじゃないから！」
line = "「ちょっと待って、勘違いしてるから！　わ、私は別に、そういうのじゃないから！」"

[[dialogue]]
speaker = "リップル"
# 「そうだ、ワタシ、イイこと思い付きました！　皆カイチョーがスキなら、皆で一緒に家族になればイイのです！」
line = "「そうだ、ワタシ、イイこと思い付きました！　皆カイチョーがスキなら、皆で一緒に家族になればイイのです！」"

[[dialogue]]
speaker = "マトイ"
# 「ちょっ！？　それって……」
line = "「ちょっ！？　それって……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「つまり、ハーレムってことね！　それなら学園を卒業しても、このメンバーで一緒にいられるわ！」
line = "「つまり、ハーレムってことね！　それなら学園を卒業しても、このメンバーで一緒にいられるわ！」"

[[dialogue]]
speaker = "サーシャ"
# 「あら～♪　それなら確かに、皆を私の妹と弟に出来るわね～。うふふ♪」
line = "「あら～♪　それなら確かに、皆を私の妹と弟に出来るわね～。うふふ♪」"

[[dialogue]]
speaker = "アナ"
# 「なるほど。それならリップルさんにいつでも和菓子を作ってもらえるので、合理的です」
line = "「なるほど。それならリップルさんにいつでも和菓子を作ってもらえるので、合理的です」"

[[dialogue]]
speaker = "マトイ"
# 「まさかのハーレム容認！？」
line = "「まさかのハーレム容認！？」"

[[dialogue]]
speaker = "マトイ"
# 「いやいやいや、フィオナさんも何か言ってやって下さい！」
line = "「いやいやいや、フィオナさんも何か言ってやって下さい！」"

[[dialogue]]
speaker = "フィオナ"
# 「ち、ちょっと楽しそうかもと思っちゃいましたけど、まずは家族に相談してみないといけないですし……緋宮会長のお気持ちもありますから……」
line = "「ち、ちょっと楽しそうかもと思っちゃいましたけど、まずは家族に相談してみないといけないですし……緋宮会長のお気持ちもありますから……」"

[[dialogue]]
speaker = "マトイ"
# 「満更でもないご様子！？」
line = "「満更でもないご様子！？」"

[[dialogue]]
speaker = "サーシャ"
# 「ふふっ、ぶっちゃけトークで、フィオナちゃんもハイテンションになってるみたいね～♪」
line = "「ふふっ、ぶっちゃけトークで、フィオナちゃんもハイテンションになってるみたいね～♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ただ、フィオナの言う通り、クロトの意見も聞く必要があるわね」
line = "「ただ、フィオナの言う通り、クロトの意見も聞く必要があるわね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「さあ、いよいよ最後は、皆が期待してたクロトの番よ！」
line = "「さあ、いよいよ最後は、皆が期待してたクロトの番よ！」"

[[dialogue]]
speaker = "リップル"
# 「待ってましたで～す♪　カイチョーはどんな女の子が好きなのか、聞かせてクダさ～い！」
line = "「待ってましたで～す♪　カイチョーはどんな女の子が好きなのか、聞かせてクダさ～い！」"

[[dialogue]]
speaker = "unk"
# えっと、やっぱり……言わなきゃダメ？
line = "えっと、やっぱり……言わなきゃダメ？"

[[dialogue]]
speaker = "アナ"
# 「ダメですね」
line = "「ダメですね」"

[[dialogue]]
speaker = "サーシャ"
# 「うふふ♪　私達だって正直に喋ったんだもの～。ね？　フィオナちゃん」
line = "「うふふ♪　私達だって正直に喋ったんだもの～。ね？　フィオナちゃん」"

[[dialogue]]
speaker = "フィオナ"
# 「そ、そうですね。ここで何も言わないのは、不公平な気がします」
line = "「そ、そうですね。ここで何も言わないのは、不公平な気がします」"

[[dialogue]]
speaker = "マトイ"
# 「私だって恥ずかしい思いしたんだから、こうなった以上、道連れよ！」
line = "「私だって恥ずかしい思いしたんだから、こうなった以上、道連れよ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふふふ、逃がさないわよ。大人しくぶっちゃけなさい！」
line = "「ふふふ、逃がさないわよ。大人しくぶっちゃけなさい！」"

[[dialogue]]
speaker = "リップル"
# 「カイチョーは、ワタシ達のことダイスキですか～？」
line = "「カイチョーは、ワタシ達のことダイスキですか～？」"

[[dialogue]]
speaker = "unk"
# その後、俺は好きな女の子のタイプについて根掘り葉掘り聞かれ、一晩中イジられる羽目になるのだった――
line = "その後、俺は好きな女の子のタイプについて根掘り葉掘り聞かれ、一晩中イジられる羽目になるのだった――"
